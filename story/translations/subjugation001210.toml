[[dialogue]]
speaker = "unk"
original = "新星学園、オープンキャンパスの夜──急遽開催が決定された、学園生のアイドルユニット『アーネスト』のライブは、超満員での幕開けとなった。"
translation = "신성학원, 오픈 캠퍼스의 밤── 급거 개최가 결정된 학원생 아이돌 유닛 『어니스트』의 라이브는, 초만원 상태로 막을 올렸다."

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「みんな、今日は私たちのライブを観に来てくれて……ありがとうっ……！！」"
translation = "「여러분, 오늘 저희 라이브를 보러 와주셔서…… 고마워요……!!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「オープンキャンパス、楽しんでもらえたかな……！？\u3000少しでも新星学園を受けてみたいって思ってくれたら、嬉しいな！」"
translation = "「오픈 캠퍼스, 즐거우셨나요……!? 조금이라도 신성학원에 오고 싶다는 생각이 드셨다면 기쁠 거예요!」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「私たちは『アーネスト』！\u3000新星学園生で結成した、今夜だけのアイドルユニットです！」"
translation = "「저희는 『어니스트』! 신성학원생으로 결성한, 오늘 밤만의 아이돌 유닛입니다!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「新星学園は、モンスターとリクリエに対抗するために設立された星騎士育成機関！\u3000だけど……戦うだけじゃないんだよ！」"
translation = "「신성학원은 몬스터와 리크리에에 대항하기 위해 설립된 성기사 육성 기관! 하지만…… 싸우기만 하는 곳이 아니에요!」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「学生らしく恋愛をしたり！\u3000遊んだり！\u3000歌ったり！\u3000青春を過ごす場所で……！」"
translation = "「학생답게 연애도 하고! 놀기도 하고! 노래도 부르며! 청춘을 보내는 곳이라서……!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「私たちはこの学園が大好きです！\u3000一緒に通う友達も、先生も、みんなが大好き！！」"
translation = "「저희는 이 학원을 정말 좋아해요! 같이 다니는 친구들도, 선생님도, 모두 정말 좋아해요!!」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「私たちが歌っているところ、踊っているところを見て……ああ、この学園はこんなにも楽しい場所なんだって思ってもらえたら……！」"
translation = "「저희가 노래하는 모습, 춤추는 모습을 보고…… 아아, 이 학원은 이렇게나 즐거운 곳이구나 하고 느껴주신다면……!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「この会場に来てくれたみんなに、この学園を好きになってもらえたら……とっても嬉しいです！！」"
translation = "「이 회장에 와주신 여러분이 이 학원을 좋아하게 되어주신다면…… 정말 기쁠 것 같아요!!」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「キラキラの学園生活は、新星学園とアーネストにお任せ！！」"
translation = "「반짝반짝 빛나는 학원 생활은, 신성학원과 어니스트에게 맡겨줘!!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「それじゃあ、いっくよー！\u3000ライブスタート！！」"
translation = "「그럼, 갑니다~! 라이브 스타트!!」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「アーネストの最初の曲名は──」"
translation = "「어니스트의 첫 번째 곡명은──」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「『アイドルスターナイト・フィーバー！』」"
translation = "「『아이돌 스타 나이트 피버!』」"

[[dialogue]]
speaker = "unk"
original = "──１日限りの、アーネストのライブは大盛況で幕を閉じた。"
translation = "──단 하룻밤의 어니스트 라이브는 대성황 속에 막을 내렸다."

[[dialogue]]
speaker = "unk"
original = "洪水のように慌ただしい日々はようやく終わり、俺は普段通りの穏やかな生活に──"
translation = "홍수처럼 정신없던 나날이 드디어 끝나고, 나는 평소처럼 평온한 생활로──"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「戻れると思っていたのですか、会長。各部活動からの申請書類をどうぞ」"
translation = "「돌아갈 수 있을 거라 생각하셨나요, 회장. 각 동아리에서 온 신청 서류입니다. 받으시죠.」"

[[dialogue]]
speaker = "unk"
original = "何だこの書類の束……！？"
translation = "이 서류 뭉치는 다 뭐야……!?"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「先日のアーネストの貸し切りライブを受けて、どこもかしこも羨ましがってる。アリーナの使用申請がわんさか」"
translation = "「지난번 어니스트의 단독 라이브를 보고, 여기저기서 다들 부러워하고 있습니다. 아레나 사용 신청이 넘쳐나네요.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そちらの、ラメ加工と七色のマーカーで目立ってるのは薙刀部。どうしても使いたいそうです」"
translation = "「그쪽의, 반짝이 가공과 무지개색 마커로 눈에 띄는 건 치도부입니다. 어떻게든 쓰고 싶다는군요.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「また薙刀部！？\u3000いったい何をするの、アリーナで！」"
translation = "「또 치도부!? 대체 뭘 하려는 거야, 아레나에서!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「購買部から箱詰めのドリンクが届いてるわよ～♪\u3000朝昼晩と１本ずつ飲んで、性別が変わった時は連絡をちょうだい、だって♪」"
translation = "「구매부에서 박스에 담긴 드링크가 도착했어~♪ 아침 점심 저녁으로 한 병씩 마시고, 성별이 바뀌면 연락 달래♪」"

[[dialogue]]
speaker = "unk"
original = "今後不定期で女の子化するの！？"
translation = "앞으로 비정기적으로 여자애가 되는 거야!?"

[[dialogue]]
speaker = "unk"
original = "ええええぇ！？"
translation = "에에에에에엑!?"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「だ、大丈夫だよ会長。私、可愛い男の娘の相手は慣れてるから……！」"
translation = "「괴, 괜찮아 회장. 난 귀여운 남장 여자 상대하는 건 익숙하니까……!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「マトイ先輩、そういう問題では……」"
translation = "「마토이 선배, 그런 문제가 아니라고 보는데요……」"

[[dialogue]]
speaker = "unk"
original = "そんなことをしていると――"
translation = "그러고 있는데──"

[[dialogue]]
speaker = "unk"
original = "ちょっと失礼！"
translation = "잠시 실례!"

[[dialogue]]
speaker = "unk"
original = "あ、レミカたちから連絡だ……！"
translation = "아, 레미카 일행한테서 연락이다……!"

[[dialogue]]
speaker = "unk"
original = "や、２人とも"
translation = "여어, 둘 다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あっ、会長くん！\u3000お疲れ様……！\u3000昨日は本当にありがとう！\u3000改めてお礼を言おうってレミカちゃんと話してたんだ！」"
translation = "「앗, 회장군! 수고했어……! 어제는 정말 고마웠어! 다시 한번 감사 인사를 하자고 레미카짱이랑 이야기했거든!」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「あんなに素敵なステージで踊れたのも、会長のおかげだよ……ありがとう！」"
translation = "「그렇게 멋진 스테이지에서 춤출 수 있었던 것도 회장 덕분이야…… 고마워!」"

[[dialogue]]
speaker = "unk"
original = "俺はアーネストのプロデューサーだから"
translation = "나는 어니스트의 프로듀서니까."

[[dialogue]]
speaker = "unk"
original = "気にしないでいいよ"
translation = "신경 쓰지 않아도 돼."

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「ぷっ……ぷふっ……ふふっ……！」"
translation = "「풉…… 푸흡…… 후후훗……!」"

[[dialogue]]
speaker = "unk"
original = "何で笑うんだ！？"
translation = "왜 웃는 거야!?"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あはは……２人で話してたの。ありがとうって言ったら、会長くんは何て返してくるかなって」"
translation = "「아하하…… 둘이서 얘기했거든. 고맙다고 하면 회장군은 뭐라고 대답할까 하고.」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「ふふっ……よ、予想通りの返事だったから、つい……いや、うんっ……ふふっ……笑ってなんか、ないんだけど……！」"
translation = "「후훗…… 예, 예상했던 대답이라 그만…… 아니, 응…… 후훗…… 웃는 거, 아닌데……!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「その言い訳は無理があるような……ねえレミカちゃん、会長くんにお願いしたいことがあるんじゃないの？」"
translation = "「그 변명은 좀 무리가 있지 않을까…… 그보다 레미카짱, 회장군에게 부탁하고 싶은 게 있지 않아?」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「ん、んんっ、そうだった。会長、メルエルの説得を手伝ってくれない？\u3000アーネストの再結成をしたいんだけど、うんって言ってくれないんだよね」"
translation = "「음, 흠흠, 그랬지. 회장, 메르엘 설득하는 것 좀 도와주지 않을래? 어니스트 재결성을 하고 싶은데, 도통 응해주질 않네.」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ええっ、そんな相談をするつもりだったの！？\u3000というか、私をアイドルのしがらみに巻き込まないための１日限定ユニットだって、かっこよく言ってたよね！？」"
translation = "「에엣, 그런 상담을 할 생각이었어!? 그보다 나를 아이돌의 굴레에 얽매이지 않게 하기 위한 1일 한정 유닛이라고 멋있게 말했었잖아!?」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「そんな昔のこと、ライブの熱気で全部忘れちゃったよ」"
translation = "「그런 옛날 일은 라이브의 열기 때문에 다 잊어버렸어.」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「私は星騎士の訓練もあるし、本格的にアイドルを始めたら、会長くんと会う時間も少なくなっちゃうからダメって……！」"
translation = "「나는 성기사 훈련도 있고, 본격적으로 아이돌을 시작하면 회장군이랑 만날 시간도 줄어드니까 안 된다고……!」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「こんな感じで、なかなかＯＫしてくれないんだよね」"
translation = "「이런 느낌이라 좀처럼 OK를 안 해주네.」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「私の意見は変わらないよっ！\u3000……って、ああっ、なんか恥ずかしいことを言っちゃった気がする！？」"
translation = "「내 의견은 변함없어! ……랄까, 아앗, 왠지 부끄러운 소리를 해버린 것 같아!?」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「そ、そうだ～、そろそろボランティア部のお仕事の時間だったような……！\u3000それじゃあね会長くん。また今度！」"
translation = "「그, 그래~ 슬슬 봉사부 활동 시간이었던 것 같은데……! 그럼 안녕 회장군. 다음에 봐!」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「あ、行っちゃった……はぁ、残念。メルエルとなら絶対にカワイイ系アイドルのてっぺんを取れる気がするんだけどな」"
translation = "「아, 가버렸네…… 하아, 아쉽다. 메르엘이랑 함께라면 분명 귀염뽀짝 아이돌의 정점을 찍을 수 있을 것 같은데.」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「……わかってるよ、会長。本人が嫌がってるのに無理は言わないから」"
translation = "「……알고 있어, 회장. 본인이 싫다는데 억지로 시키지는 않을게.」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「──改めて今回の件はありがとう。会長には本当にお世話になっちゃったね」"
translation = "「──다시 한번 이번 일은 고마워. 회장한테는 정말 신세를 많이 졌네.」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「私のアイドルフォーム、戦闘服として安定して覚醒するようになったから。力になれそうな時はいつでも呼んで」"
translation = "「내 아이돌 폼, 전투복으로서 안정적으로 각성할 수 있게 됐으니까. 힘이 필요할 때는 언제든 불러.」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「あと……これ、受け取ってくれるかな。今度うちの事務所でやるライブのチケット。２席とっておいたから、メルエル誘って見に来てよ」"
translation = "「그리고…… 이거, 받아줄래? 다음에 우리 소속사에서 하는 라이브 티켓이야. 두 자리 빼놨으니까, 메르엘 꼬셔서 보러 와.」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「そ。あの子、すごく頑張ってくれたから。打ち上げ感覚でデートに誘ってあげて。きっと喜ぶと思うから」"
translation = "「그래. 그 애, 정말 열심히 해줬으니까. 뒤풀이 느낌으로 데이트 신청해 봐. 분명 기뻐할 거야.」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「うん。それじゃあ、また……！」"
translation = "「응. 그럼 또 봐……!」"

[[dialogue]]
speaker = "unk"
original = "アイドルらしい満面の笑みを浮かべて、レミカは去って行った。"
translation = "아이돌다운 만면의 미소를 띄우며 레미카는 떠나갔다."

[[dialogue]]
speaker = "unk"
original = "アーネストが１日かぎりで解散してしまうのは残念だけれど、未来はどうなるかはわからない。"
translation = "어니스트가 하루 만에 해산해 버리는 것은 아쉽지만, 미래가 어떻게 될지는 모르는 법이다."

[[dialogue]]
speaker = "unk"
original = "数年後に思い出話となるのか、はたまたメルエルとレミカのユニットライブを再び見られる日が来るのか……"
translation = "몇 년 뒤에 추억거리가 될지, 아니면 메르엘과 레미카의 유닛 라이브를 다시 볼 날이 올지……"

[[dialogue]]
speaker = "unk"
original = "２人の素敵なアイドルからもらったパワーで今日も頑張ろう。"
translation = "두 명의 멋진 아이돌에게 받은 파워로 오늘도 힘내보자."

[[dialogue]]
speaker = "unk"
original = "とりあえず書類をびしばし片付けて、スケジュールを空けて。もらったチケットでメルエルをデートに誘おうと思うのだった──"
translation = "일단 서류를 팍팍 처리해서 스케줄을 비우고, 받은 티켓으로 메르엘에게 데이트 신청을 해야겠다고 생각했다──"

