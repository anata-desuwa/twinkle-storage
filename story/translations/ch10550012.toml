[[dialogue]]
speaker = "unk"
original = "第２話,駄菓子、気になりますわ……！,P"
translation = "제2화, 막과자, 궁금합니다……!"

[[dialogue]]
speaker = "unk"
original = "夜も更けて、さぁ後は眠るだけ──そんな折に空腹が気になってしまった。しかし自宅のキッチンで食べていたら、母さんを起こしてしまうかも。"
translation = "밤도 깊어지고, 자 이제 잠만 자면 돼── 그럴 때 문득 공복이 신경 쓰였다. 하지만 집 부엌에서 먹으면, 엄마를 깨울지도 모른다."

[[dialogue]]
speaker = "unk"
original = "そう考えた俺はコンビニでも行こうかと思いながら、繁華街まで足を伸ばすことにしたのだった。"
translation = "그렇게 생각한 나는 편의점이라도 갈까 생각하며, 번화가까지 발걸음을 옮기기로 했다."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ささっ……！」"
translation = "「사사삭……!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ささささっ……！」"
translation = "「사사사사삭……!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「一体どこにありますの……どこに……うぅ……」"
translation = "「도대체 어디에 있습니까…… 어디에…… 으윽……」"

[[dialogue]]
speaker = "unk"
original = "……エルゼ？"
translation = "……엘제?"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「──きゃっ！？\u3000会長様……！？」"
translation = "「──꺅!? 회장님……!?」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「き、奇遇ですわねっ。まさかこんなところでお会いするとは……」"
translation = "「기, 기막힌 우연이군요. 설마 이런 곳에서 만날 줄이야……」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「私は……あの。ちょっと夜のお散歩を……しておりまして……！」"
translation = "「저는…… 그게. 잠깐 밤 산책을…… 하고 있었습니다……!」"

[[dialogue]]
speaker = "unk"
original = "学生寮って門限があるよね……？"
translation = "학생 기숙사는 통금 시간이 있지……?"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ぁ──う。そう……です。はい……お察しのとおりです。流星学園の寮を、こっそりと抜け出してきたのですわ」"
translation = "「아──윽. 그렇습니다. 네…… 짐작하신 대로입니다. 유성 학원의 기숙사를, 몰래 빠져나왔습니다.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「お願いします、会長様！\u3000どうか夜間外出のことは、寮長にはご内密に……！」"
translation = "「부탁드립니다, 회장님! 부디 야간 외출에 대해서는, 사감에게는 비밀로……!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ぇ……構わない、のですか？\u3000良かったですわ……会長様はお優しいのですね」"
translation = "「에…… 괜찮은, 겁니까? 다행입니다…… 회장님은 상냥하시군요.」"

[[dialogue]]
speaker = "unk"
original = "でも外出の理由は知りたいかな"
translation = "하지만 외출 이유는 알고 싶은데"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「あ、はい……実は今日のお昼に──」"
translation = "「아, 네…… 실은 오늘 점심에──」"

[[dialogue]]
speaker = "フィオナ"
original = "「アムさん。その鞄に付いているキーホルダーはもしかして？」"
translation = "「아무 씨. 그 가방에 달려 있는 열쇠고리는 혹시?」"

[[dialogue]]
speaker = "アム"
original = "「これですか？\u3000はい、この間買った駄菓子のおまけなんです。カッコいいからあたしにぴったりかな～って」"
translation = "「이거요? 네, 얼마 전에 산 막과자 사은품이에요. 멋있으니까 나한테 딱 맞을까ー 하고.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「……だがし？\u3000おまけ……？」"
translation = "「……막과자? 사은품……?」"

[[dialogue]]
speaker = "アム"
original = "「でもこれ、フィオナ会長、良く知ってましたね？\u3000これって少年誌の漫画が原作なのに」"
translation = "「근데 이거, 피오나 회장, 잘 알고 계시네요? 이거 소년지 만화가 원작인데.」"

[[dialogue]]
speaker = "フィオナ"
original = "「えぇ私も大ファンで──ぁ、いえっ！\u3000そのー……一般教養ですから！\u3000お買い物してる時にちらっと見たことがあって」"
translation = "「네, 저도 광팬이라──아, 아니요! 그ー…… 일반 교양이니까요! 쇼핑할 때 슬쩍 본 적이 있어서.」"

[[dialogue]]
speaker = "アム"
original = "「ふーん、そうなんですか。ねぇエルゼはこの漫画知ってる？\u3000最近めっちゃ熱いんだけど──」"
translation = "「흐음, 그렇습니까. 저기 엘제는 이 만화 알아? 요즘 엄청 뜨거운데──」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「アム。その前に、駄菓子とは一体何なのです？」"
translation = "「아무. 그전에, 막과자란 도대체 무엇입니까?」"

[[dialogue]]
speaker = "アム"
original = "「え」"
translation = "「에」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「お菓子とはケーキやクッキーなどを指すはずですわ。主体はスイーツそのもの。それなのに、キーホルダーが付くとは……一体？」"
translation = "「과자란 케이크나 쿠키 등을 가리키는 것일 겁니다. 주체는 디저트 그 자체. 그런데, 열쇠고리가 붙다니…… 도대체?」"

[[dialogue]]
speaker = "アム"
original = "「あ～。そこからつまずく？\u3000流石はエルゼ……」"
translation = "「아ー. 거기서부터 막혀? 역시 엘제……」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「気になりますわ……！\u3000一体、駄菓子とはどんなスイーツなんですの？」"
translation = "「궁금합니다……! 도대체, 막과자란 어떤 디저트입니까?」"

[[dialogue]]
speaker = "フィオナ"
original = "「エルゼ。駄菓子と言うのは……」"
translation = "「엘제. 막과자라고 하는 것은……」"

[[dialogue]]
speaker = "アム"
original = "「あ、待って待って。フィオナ会長。詳しく教えない方が面白そう」"
translation = "「아, 잠깐 잠깐. 피오나 회장. 자세히 안 알려주는 게 더 재미있을 것 같아.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「もう。意地悪しないでください、アム！\u3000駄菓子とはどこのパティスリーで売っていますの？\u3000それだけでも……」"
translation = "「정말. 심술 부리지 마세요, 아무! 막과자란 어느 파티스리에서 팝니까? 그것만이라도……」"

[[dialogue]]
speaker = "アム"
original = "「パティスリーって……！\u3000あはは！\u3000あはははっ！」"
translation = "「파티스리라니……! 아하하! 아하하하!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「笑ってないで答えてくださいませ！\u3000駄菓子って、どんなものなんですのっ？\u3000興味津々、ですわ～っ！」"
translation = "「웃지 말고 대답해 주세요! 막과자란, 어떤 것입니까? 흥미진진합니다!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「結局、アムは最後まで教えてくれませんでしたの。私が常識はずれなことを言うといつもこうなんです」"
translation = "「결국, 아무는 끝까지 알려주지 않았습니다. 제가 상식 밖의 이야기를 하면 항상 이렇습니다.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「でも流星市国のスイーツショップは網羅しております。すでに１０件回って収穫はゼロですが諦めませんわ」"
translation = "「하지만 유성 시국의 디저트 가게는 모두 훑어봤습니다. 이미 10곳을 돌았고 수확은 제로이지만 포기하지 않을 겁니다.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「夜の外出は初めてではありませんので、まだまだ当てはありますの……！」"
translation = "「밤 외출은 처음이 아니므로, 아직 희망은 있습니다……!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ぁ──こ、これもご内密にお願いいたします。私、夜間にこっそり抜け出すのが、その……趣味、と言いますか」"
translation = "「아──이, 이것도 비밀로 부탁드립니다. 저는, 야간에 몰래 빠져나가는 것이, 그…… 취미라고 할까요.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「実家がとても厳しかったのです。娯楽は遠ざけられ、分刻みで学業と鍛錬のスケジュールを組まれ……」"
translation = "「친가가 매우 엄격했습니다. 오락은 멀리하고, 분 단위로 학업과 단련 스케줄이 짜여져……」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「社会勉強の一貫、ということで流星寮で暮らし始めてからというもの……」"
translation = "「사회 공부의 일환, 이라는 것으로 유성 기숙사에서 살기 시작한 이후로……」"

[[dialogue]]
speaker = "unk"
original = "羽目を外す機会が増えたんだ？"
translation = "마음껏 즐길 기회가 늘어난 거야?"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「はい……。飲食店や映画館など、興味があっても手が出せなかったことを、夜間外出しながら経験しているのです」"
translation = "「네……. 음식점이나 영화관 등, 흥미가 있어도 손댈 수 없었던 것을, 야간 외출을 하면서 경험하고 있습니다.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「今日の外出のテーマは『駄菓子を探せ！』なのですわ。アムは『心当たりのあるパティスリーをめぐってみたら？』と言うばかりで」"
translation = "「오늘 외출의 테마는 『막과자를 찾아라!』입니다. 아무는 『짐작 가는 파티스리를 돌아다녀 보는 게 어때?』라고 말할 뿐이고.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「……え？\u3000会長様、ご存じなのですか？\u3000流石は新星学園の会長様です。ご慧眼をお持ちですのね！」"
translation = "「……에? 회장님, 알고 계십니까? 역시 신성 학원의 회장님입니다. 혜안을 가지고 계시군요!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「はい、付いて行きます……って。コンビニへ向かうのですか？\u3000駄菓子はパティスリーにあるのでは……」"
translation = "「네, 따라가겠습니다……라고. 편의점으로 향하는 겁니까? 막과자는 파티스리에 있는 것 아닙니까……」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「アム……許しません……許しませんわ……！\u3000今日伺ったパティスリー、恥ずかしくて当分行けないではないですか……！」"
translation = "「아무…… 용서하지 않겠습니다…… 용서하지 않겠어요……! 오늘 찾아간 파티스리, 부끄러워서 당분간 못 가지 않습니까……!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「でも会長様には感謝いたします。おかげ様で私、駄菓子とは何なのか、学ぶことができました」"
translation = "「하지만 회장님께는 감사드립니다. 덕분에 저는, 막과자란 무엇인지, 배울 수 있었습니다.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「会席や贈答の場で嗜むことを目的としない、子どもに向けて製造される安価なお菓子。はい──覚えました」"
translation = "「회식이나 증정품 자리에서 즐기는 것을 목적으로 하지 않는, 아이들을 위해 제조되는 저렴한 과자. 네── 외웠습니다.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「しかし悔しいですわ……アムに何か仕返しはできないでしょうか」"
translation = "「하지만 분합니다…… 아무에게 뭔가 복수를 할 수는 없을까요.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「……あれ。おまけのキーホルダー、金色ですね。外箱に記載のないようですが……？」"
translation = "「……어라. 사은품 열쇠고리, 금색이군요. 겉 상자에 기재되어 있지 않은 것 같은데……?」"

[[dialogue]]
speaker = "unk"
original = "後日。エルデリーゼが当てたシークレットの激レアキーホルダーを見たアムは、羨ましいやら悔しいやらで呻いたらしい──"
translation = "훗날. 엘데리제가 뽑은 시크릿 초희귀 열쇠고리를 본 아무는, 부럽기도 하고 분하기도 해서 신음했다고 한다──"

