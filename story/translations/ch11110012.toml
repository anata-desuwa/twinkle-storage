[[dialogue]]
speaker = "unk"
original = "第２話,吸血鬼ＶＳ吸血鬼？,P"
translation = "제2화, 흡혈귀 VS 흡혈귀?, P"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「はわわ……」"
translation = "「하와와……」"

[[dialogue]]
speaker = "unk"
original = "放課後、一休みしようとカフェテリアに向かうと、ソフレとベアトリスの２人がいた。"
translation = "방과 후, 잠시 쉬려고 카페테리아로 향하니, 소프레와 베아트리스 두 사람이 있었다."

[[dialogue]]
speaker = "unk"
original = "ソフレはいつも通りのローテンションだが、ベアトリスはヘビににらまれたカエルのようにすくみ上っていた。"
translation = "소프레는 평소처럼 텐션이 낮았지만, 베아트리스는 뱀 앞의 개구리처럼 얼어붙어 있었다."

[[dialogue]]
speaker = "unk"
original = "２人は知り合い？"
translation = "두 사람은 아는 사이야?"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「全く知らないのだわ」"
translation = "「전혀 모르는 거예요」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ああいえ、初対面です……」"
translation = "「아아 아뇨, 초면입니다……」"

[[dialogue]]
speaker = "unk"
original = "初対面なんだ……"
translation = "초면이구나……"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「でも無関係ではないわ。こいつ、ソフレと同族なのだわ」"
translation = "「하지만 무관하지는 않아. 이 녀석, 소프레와 동족인 거예요」"

[[dialogue]]
speaker = "unk"
original = "同族っていうと……吸血鬼？"
translation = "동족이라니…… 흡혈귀?"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「はい、私も吸血鬼なんです。ほら、牙とか羽とか付いてますよね？\u3000パタパタ」"
translation = "「네, 저도 흡혈귀예요. 보세요, 송곳니나 날개 같은 게 달려있죠? 파닥파닥」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ソフレ様とは違い、私たちの一族は暗い洞窟で暮らしているのですが……同じ吸血鬼なのでソフレ様のことは有名でした」"
translation = "「소프레 님과는 다르게, 저희 일족은 어두운 동굴에서 살고 있습니다만…… 같은 흡혈귀라서 소프레 님의 성함은 유명했어요」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「『暴虐の吸血鬼』と恐れられる存在で、子どもが言うことを聞かないと『ソフレ様に食べられるぞ』って脅すんです」"
translation = "「『폭학의 흡혈귀』라며 두려워하는 존재라서, 아이들이 말을 안 들으면 『소프레 님에게 잡아먹힌다』라고 겁을 주거든요」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「普通に失礼ね、それ」"
translation = "「평범하게 실례네, 그거」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「でもその吸血鬼が、どうして昼日中にこんなところにいるのかしら」"
translation = "「그런데 그 흡혈귀가, 어째서 대낮에 이런 곳에 있는 것일까」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「ソフレは日光を克服した吸血鬼『デイマスター』。だけど普通の吸血鬼は日の光を浴びると肌を焼かれるし、最悪死ぬのだわ」"
translation = "「소프레는 햇빛을 극복한 흡혈귀 『데이 마스터』. 하지만 평범한 흡혈귀는 햇빛을 받으면 피부가 타버리고, 최악의 경우 죽는 거예요」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「私はデイマスターじゃないけど、星力がある間は日光も大丈夫なんです。逆に言えば星力がないとダメなんですけど」"
translation = "「저는 데이 마스터는 아니지만, 성력이 있는 동안은 햇빛도 괜찮아요. 반대로 말하면 성력이 없으면 안 되지만요」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「なので、星騎士じゃなくなったら故郷の洞窟に帰るつもりです」"
translation = "「그래서, 성기사가 아니게 되면 고향 동굴로 돌아갈 생각이에요」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「なるほど、そういうのもありなのね」"
translation = "「과연, 그런 것도 있구나」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「でもお前とソフレは故郷が近いだけの赤の他人。放っておいてほしいのだわ」"
translation = "「하지만 너와 소프레는 고향이 가까울 뿐인 남남. 내버려 뒀으면 좋겠는 거예요」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「そんな～っ、同じ吸血鬼同士仲良くしましょうよ～っ！\u3000流星市国には他に吸血鬼がいないから心細いんですよっ」"
translation = "「너무해요～, 같은 흡혈귀끼리 사이좋게 지내요～! 유성시국에는 다른 흡혈귀가 없어서 외롭단 말이에요」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「ソフレをなまはげ呼ばわりしたお前には言われたくないのだわ」"
translation = "「소프레를 나마하게 취급한 너에게는 듣고 싶지 않은 거예요」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ひぃっ……！？\u3000ごめんなさ～いっ！？」"
translation = "「히익……!? 죄송해용～!?」"

[[dialogue]]
speaker = "unk"
original = "ちなみになまはげは神の使いであり、子どもは食べない……らしい。"
translation = "참고로 나마하게는 신의 사자이며, 아이를 잡아먹지는 않는다……고 한다."

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「ま、お前のことはどうでもいいけど、ソフレ様はやめなさい。一応同学年なんだから普通にソフレでいいのだわ」"
translation = "「뭐, 너는 아무래도 좋지만, 소프레 님은 그만둬. 일단 같은 학년이니까 평범하게 소프레라고 부르면 되는 거예요」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「は、はい……わかりました……」"
translation = "「네, 네…… 알겠습니다……」"

[[dialogue]]
speaker = "unk"
original = "ちなみに２人は何を食べてるの？"
translation = "참고로 두 사람은 뭘 먹고 있어?"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「ソフレはパンケーキよ。ここのパンケーキは雲みたいにふわふわで悪くないのだわ」"
translation = "「소프레는 팬케이크야. 여기 팬케이크는 구름처럼 폭신폭신해서 나쁘지 않은 거예요」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「私はラズベリーのケーキと紅茶にしました。これから食べるところなんですけど」"
translation = "「저는 라즈베리 케이크랑 홍차로 했어요. 이제 막 먹으려던 참인데요」"

[[dialogue]]
speaker = "unk"
original = "２人とも血じゃない！"
translation = "둘 다 피가 아니야!"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「当然でしょ。カフェテリアで血が出るわけないし。吸血鬼といっても、血液で栄養を摂っているわけじゃないのだわ」"
translation = "「당연하잖아. 카페테리아에서 피가 나올 리 없고. 흡혈귀라고 해도, 혈액으로 영양을 섭취하는 건 아닌 거예요」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「もし血だけで生きようとしたら、たっくさんの血液が要りますからね。そんなに血ばかり飲んでいたら、吸血鬼が討伐されちゃいますよ」"
translation = "「만약 피로만 살아가려고 하면, 어마어마한 혈액이 필요하니까요. 그렇게 피만 마시고 다녔다간, 흡혈귀가 토벌당해버릴 거예요」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「でもこのケーキ、血のように真っ赤で……美味しそうです……」"
translation = "「하지만 이 케이크, 피처럼 새빨개서…… 맛있어 보여요……」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「はしたないのだわ……」"
translation = "「천박한 거예요……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「いえ、普通に美味しそうだなって思ってるだけですよ！？」"
translation = "「아뇨, 그냥 맛있어 보인다고 생각했을 뿐이라니까요!?」"

[[dialogue]]
speaker = "unk"
original = "どういう意味……？"
translation = "무슨 의미야……?"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「あ～いえいえいえ！\u3000本当に他意なんてないですから！\u3000ケーキ美味しそうですよね！\u3000ね！？」"
translation = "「아~ 아뇨아뇨아뇨! 정말 딴 뜻은 없으니까요! 케이크 맛있어 보이죠! 그쵸!?」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「吸血鬼は、吸血によって異性を自分の眷属にすることができる。眷属を作るということは、同族を増やすということ。つまり──」"
translation = "「흡혈귀는, 흡혈을 통해 이성을 자신의 권속으로 만들 수 있지. 권속을 만든다는 것은, 동족을 늘린다는 것. 즉──」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「生殖よ」"
translation = "「생식이와요」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「！？」"
translation = "「!!?」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「こいつ、赤いケーキを見て欲情しているのだわ……」"
translation = "「이 녀석, 빨간 케이크를 보고 발정하고 있는 거예요……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ちち、違いますから！\u3000私そんなむっつりじゃないですから！」"
translation = "「트, 틀리다니까요! 저 그렇게 음란하지 않거든요!」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「じゃあ会長の目を見て違うって言える？\u3000年頃の異性の顔を見ながらでも言えるの？」"
translation = "「그럼 회장의 눈을 보고 아니라고 말할 수 있어? 한창때의 이성의 얼굴을 보면서도 말할 수 있는 거야?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「も、もちろん言えますよ！\u3000会長さん、じっとしててくださいね！」"
translation = "「무, 물론 말할 수 있죠! 회장님, 가만히 계셔주세요!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「やっぱり無理です、ごめんなさ～いっ！！」"
translation = "「역시 무리예요, 죄송해용～～!!」"

[[dialogue]]
speaker = "unk"
original = "……行っちゃった"
translation = "……가버렸네"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「まったく、卑しい吸血鬼なのだわ」"
translation = "「정말이지, 천박한 흡혈귀라니까」"

[[dialogue]]
speaker = "unk"
original = "それからしばらく、ベアトリスは俺を見ると逃げるようになってしまった。"
translation = "그 후 한동안, 베아트리스는 나를 보면 도망치게 되어 버렸다."

[[dialogue]]
speaker = "unk"
original = "……ちなみにベアトリスのケーキはソフレが美味しくいただきました。"
translation = "……참고로 베아트리스의 케이크는 소프레가 맛있게 먹었습니다."

