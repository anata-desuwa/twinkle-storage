[[dialogue]]
speaker = "プトラ"
original = "「プトラアターック！」"
translation = "「푸트라 어택!」"

[[dialogue]]
speaker = "unk"
original = "プトラが水の槍を振り回し、クマロボたちをまとめてなぎ倒す。"
translation = "푸트라가 물의 창을 휘둘러 곰 로봇들을 한꺼번에 쓸어버린다."

[[dialogue]]
speaker = "unk"
original = "一方では──"
translation = "한편으로는──"

[[dialogue]]
speaker = "アルテ"
original = "「ローズブレード！」"
translation = "「로즈 블레이드!」"

[[dialogue]]
speaker = "クマロボ"
original = "「クマァーーーーーーーーーー！！！！？？」"
translation = "「쿠마아아아아아아아아아아!!!!?」"

[[dialogue]]
speaker = "アルテ"
original = "「ふむ……いい感じですね、さすが私です」"
translation = "「흠…… 느낌 좋네요, 역시 저답습니다.」"

[[dialogue]]
speaker = "unk"
original = "流麗な足さばきでクマロボの懐に入り込むと、一閃して鋼の胴体を切り払う。"
translation = "유려한 발놀림으로 곰 로봇의 품속으로 파고들더니, 일섬하며 강철 몸체를 베어 넘긴다."

[[dialogue]]
speaker = "unk"
original = "２人の加勢もあって、戦いはすぐに収束した。"
translation = "두 사람의 가세 덕분에 싸움은 금방 마무리되었다."

[[dialogue]]
speaker = "アポロ"
original = "「おーい、そっちは大丈夫だったか？」"
translation = "「어이, 그쪽은 괜찮았어?」"

[[dialogue]]
speaker = "アルテ"
original = "「もちろん。この私が後れを取ることなどありえません」"
translation = "「물론이죠. 이 제가 뒤처지는 일 따위 있을 수 없습니다.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「すごいわね、２人とも！」"
translation = "「대단하네, 둘 다!」"

[[dialogue]]
speaker = "プトラ"
original = "「えへへ、みんなの変身を見て、かっこいいって思ってたんだ。だから、あたしも出来てうれしいよ♪」"
translation = "「에헤헤, 모두의 변신을 보고 멋지다고 생각했어. 그래서 나도 할 수 있게 돼서 기뻐♪」"

[[dialogue]]
speaker = "アルテ"
original = "「それで──敵の襲撃を退けたわけですが、私たちが元の世界に戻る気配はありませんね」"
translation = "「그런데── 적의 습격을 물리쳤음에도 우리가 원래 세계로 돌아갈 기미는 없네요.」"

[[dialogue]]
speaker = "アポロ"
original = "「あたしのフォームも解除される気配はないな。まあ、あたしはこのフォームも好きだけど」"
translation = "「내 폼도 해제될 기미가 없네. 뭐, 난 이 폼도 좋아하지만.」"

[[dialogue]]
speaker = "フィオナ"
original = "「先ほど倒したクマのロボットたちは尖兵のようですし、やはりこの異変を引き起こした元凶を倒さないと、元の世界には戻れないということなのでしょうね」"
translation = "「방금 쓰러뜨린 곰 로봇들은 정찰병 같은 느낌이고, 역시 이 이변을 일으킨 원흉을 쓰러뜨리지 않으면 원래 세계로 돌아갈 수 없다는 뜻이겠죠.」"

[[dialogue]]
speaker = "unk"
original = "あの黒い衣装を来た女の子……"
translation = "그 검은 옷을 입은 여자아이……"

[[dialogue]]
speaker = "黒ベア子"
original = "『わたしは黒ベア子！\u3000異世界に送ったお仲間さんたちも、ちゃんと向こうの人と合流できてるよ』"
translation = "『나는 흑베아코! 이세계로 보낸 동료들도 제대로 그쪽 사람들이랑 합류했어』"

[[dialogue]]
speaker = "黒ベア子"
original = "『そしてっ、なぜこんなことをしたか！\u3000それはぁ……お祭りっくま～～♪♪』"
translation = "『그리고오, 왜 이런 짓을 했느냐! 그건 바로…… 축제다곰~~♪♪』"

[[dialogue]]
speaker = "黒ベア子"
original = "『普段は一緒に遊べないお仲間さんたちと、いーーーっぱい盛り上がって欲しいくまっ！』"
translation = "『평소엔 같이 놀 수 없는 동료들이랑 마아아아니 즐겨줬으면 좋겠다곰!』"

[[dialogue]]
speaker = "ヴィーナス"
original = "「じゃあ、その肝心の黒ベア子はどこにいるの、って話よ」"
translation = "「그럼 그 중요한 흑베아코는 어디에 있느냐는 거지.」"

[[dialogue]]
speaker = "フィオナ"
original = "「それはわかりません。愉快犯のようですから、しばらくこの状況を愉しむつもりかもしれません」"
translation = "「그건 모르겠어요. 유쾌범 같으니 한동안 이 상황을 즐길 생각일지도 몰라요.」"

[[dialogue]]
speaker = "アルテ"
original = "「やれやれ、アテネスに帰れるのはもう暫く先になりそうですね」"
translation = "「이런이런, 아테네스로 돌아가는 건 좀 더 나중 일이 되겠네요.」"

[[dialogue]]
speaker = "アルテ"
original = "「ま、そんなことよりご飯です！\u3000水を差されてしまいましたが美味しいお肉を食べに行きましょう！」"
translation = "「뭐, 그것보다 밥이에요! 방해를 받긴 했지만 맛있는 고기를 먹으러 가자고요!」"

[[dialogue]]
speaker = "プトラ"
original = "「お魚もーっ♪」"
translation = "「생선도~!♪」"

[[dialogue]]
speaker = "プトラ"
original = "「はーっ、食べた食べた♪\u3000お魚美味しかった～♪\u3000それであたしがこれからお世話になるのって……」"
translation = "「하아~ 잘 먹었다 잘 먹었어♪ 생선 맛있었어~♪ 그래서 내가 앞으로 신세 지게 될 곳이……」"

[[dialogue]]
speaker = "アポロ"
original = "「あれだ。教皇庁」"
translation = "「저거다. 교황청.」"

[[dialogue]]
speaker = "プトラ"
original = "「えええええ……！？\u3000あれがフィオナとアポロのおうち……！？」"
translation = "「에에에에에……!? 저게 피오나랑 아폴로의 집……!?」"

[[dialogue]]
speaker = "フィオナ"
original = "「いえ、私たちが住んでいるのは、裏の邸宅の方なんですが……」"
translation = "「아뇨, 저희가 사는 곳은 뒤쪽에 있는 저택 쪽입니다만……」"

[[dialogue]]
speaker = "プトラ"
original = "「それでもすっごい豪邸じゃない！？\u3000も、もしかしてフィオナとアポロってすっごいお嬢様だったりする？」"
translation = "「그래도 엄청난 저택 아니야!? 호, 혹시 피오나랑 아폴로는 엄청난 아가씨였던 거야?」"

[[dialogue]]
speaker = "アポロ"
original = "「この流星市国で一番偉いのが、流星教皇。んで、あたしたちはその娘だ」"
translation = "「이 유성시국에서 가장 높은 분이 유성 교황. 그리고 우린 그 딸이야.」"

[[dialogue]]
speaker = "プトラ"
original = "「ってことは、フィオナとアポロってお姫様……！？\u3000ひゃ～っ……すっごーい……っ！」"
translation = "「그 말은 피오나랑 아폴로는 공주님……!? 히야아~…… 대단해……!」"

[[dialogue]]
speaker = "アポロ"
original = "「ま、姫といえなくもないかな」"
translation = "「뭐, 공주라고 할 수도 있겠네.」"

[[dialogue]]
speaker = "フィオナ"
original = "「いえそんな、お姫様なんて……同年代なんですし、普通に接してください」"
translation = "「아뇨 그런, 공주님이라니요…… 동갑이니까 편하게 대해주세요.」"

[[dialogue]]
speaker = "プトラ"
original = "「う、うん……頑張る……」"
translation = "「으, 응…… 노력해 볼게……」"

[[dialogue]]
speaker = "キリカ"
original = "「お嬢様、お部屋の準備が整いました」"
translation = "「아가씨, 방 준비가 끝났습니다.」"

[[dialogue]]
speaker = "プトラ"
original = "「わっ！？\u3000メイドさんだ！！」"
translation = "「왓!? 메이드 언니다!!」"

[[dialogue]]
speaker = "キリカ"
original = "「プトラ様、お荷物がありましたらお預かりします」"
translation = "「푸트라 님, 짐이 있으시면 맡아드리겠습니다.」"

[[dialogue]]
speaker = "プトラ"
original = "「だ、大丈夫！\u3000何にも持たずにこっちの世界にきちゃったから、荷物なんてないよ！」"
translation = "「다, 괜찮아! 아무것도 안 들고 이쪽 세계로 와버려서 짐 같은 건 없어!」"

[[dialogue]]
speaker = "キリカ"
original = "「かしこまりました。では、お部屋までご案内させて頂きます」"
translation = "「알겠습니다. 그럼 방까지 안내해 드리겠습니다.」"

[[dialogue]]
speaker = "プトラ"
original = "「は、はいぃ……」"
translation = "「네, 네에……」"

[[dialogue]]
speaker = "アポロ"
original = "「おーい、プトラ。手と足が同時に出ちゃってるぞ～」"
translation = "「어이, 푸트라. 손이랑 발이 같이 나가고 있다고~」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふふ……キリカ、プトラさんが緊張してしまっているから、もう少しフランクに接してあげて」"
translation = "「후후…… 키리카, 푸트라 씨가 긴장하고 있으니까 조금 더 편하게 대해줘.」"

[[dialogue]]
speaker = "キリカ"
original = "「かしこまりました、お嬢様。では参りましょう、プトラさん」"
translation = "「알겠습니다, 아가씨. 그럼 가실까요, 푸트라 씨.」"

[[dialogue]]
speaker = "プトラ"
original = "「あううう、素敵な笑顔～！\u3000でもすっごく上品だよ～！\u3000こんなメイドさんがいるなんて、やっぱりすごい家なんだ～～！！」"
translation = "「아우우우, 멋진 미소~! 하지만 엄청 품위 있어~! 이런 메이드 언니가 있다니 역시 대단한 집이구나~~!!」"

