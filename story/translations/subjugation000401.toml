[[dialogue]]
speaker = "unk"
original = "ハロウィンの時期が迫ってきたある日のこと。"
translation = "할로윈 시기가 다가오던 어느 날의 일."

[[dialogue]]
speaker = "unk"
original = "セナリィから秘密結社『ゴールデングース』の定例会議に参加して欲しいと、大聖堂カフェテリアへ呼び出された。"
translation = "세나리로부터 비밀결사 『골든 구스』의 정례 회의에 참석해 달라는 요청을 받고 대성당 카페테리아로 불려 나갔다."

[[dialogue]]
speaker = "セナリィ"
original = "「ズバリ、ハロウィンはお金を稼ぐ、絶好のチャンスだと思いますの！」"
translation = "「단언컨대, 할로윈은 돈을 벌 절호의 기회라고 생각해요!」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「にひひ♪\u3000セナリィのことだから、そう言い出すだろうと思ってたよ」"
translation = "「니히히♪ 세나리 성격상 그렇게 말할 줄 알았어.」"

[[dialogue]]
speaker = "unk"
original = "それはいいけど、なんで俺まで……？"
translation = "그건 그렇다 치고, 왜 나까지……?"

[[dialogue]]
speaker = "セナリィ"
original = "「ふふっ、会長様に声をかけるのは当然ですわ」"
translation = "「후훗, 회장님께 말을 거는 건 당연해요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「なんせ我が社の重要な、幹部の１人ですもの♪」"
translation = "「무려 저희 회사의 중요한 간부 중 한 분이시니까요♪」"

[[dialogue]]
speaker = "unk"
original = "いつの間に！？"
translation = "어느 사이에!?"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「私も別に、ゴールデングースに所属するなんて、まだ約束してないんだけどね～」"
translation = "「나도 딱히 골든 구스에 소속되겠다고 아직 약속하진 않았는데 말이지~」"

[[dialogue]]
speaker = "セナリィ"
original = "「あら、マインだって、面白いものが見られるんじゃないかと期待しているからこそ、ここにいるのではなくて？」"
translation = "「어머, 마인 또한 재미있는 것을 볼 수 있지 않을까 기대하기에 이곳에 있는 것 아니겠어요?」"

[[dialogue]]
speaker = "セナリィ"
original = "「あなたは本当に興味がないなら、何やかんやとはぐらかして断る。そういう女でしょう？」"
translation = "「당신은 정말 관심이 없다면 이런저런 핑계를 대며 거절할, 그런 여자잖아요?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「はてさて、どうだかね～」"
translation = "「글쎄, 어떠려나~.」"

[[dialogue]]
speaker = "セナリィ"
original = "「まあ、ノリ気ならなんでもいいですわ。ともかく、今日の議題はハロウィンの計画についてですの！」"
translation = "「뭐, 의욕이 있다면 뭐든 좋아요. 어쨌든 오늘 의제는 할로윈 계획에 대해서에요!」"

[[dialogue]]
speaker = "unk"
original = "彼女は新星学園２年生、人呼んで『バンデッド・セナリィ』。"
translation = "그녀는 신성학원 2학년, 별명 '밴디드 세나리'."

[[dialogue]]
speaker = "unk"
original = "幼い頃から武器商人の下で戦場を渡り歩いてきた本物の傭兵であり、学園には九浄家のスカウトを受けてやってきた。"
translation = "어릴 적부터 무기 상인 밑에서 전장을 누벼온 진짜 용병이며, 학원에는 쿠죠 가문의 스카우트를 받고 왔다."

[[dialogue]]
speaker = "unk"
original = "現在は秘密結社『ゴールデングース』の総帥を名乗り、今回のようなお金稼ぎのチャンスを見つけては、積極的に活動を行っている。"
translation = "현재는 비밀결사 『골든 구스』의 총수를 자처하며, 이번처럼 돈 벌 기회를 찾아내서는 적극적으로 활동하고 있다."

[[dialogue]]
speaker = "unk"
original = "悪戯な笑みを浮かべるもう１人は、新星学園１年の<ruby>立朽<rt>たちくち</rt></ruby>ネーゼマイン。"
translation = "장난스러운 미소를 짓는 또 다른 한 명은 신성학원 1학년인 타치쿠치 네제마인."

[[dialogue]]
speaker = "unk"
original = "学園の秘密組織『公安委員会』に所属するエージェントで、トラップ設置による妨害工作と、弁護士である父親譲りの交渉術を得意としている。"
translation = "학원의 비밀 조직 『공안위원회』에 소속된 에이전트로, 트랩 설치를 통한 방해 공작과 변호사인 아버지에게 물려받은 교섭술이 특기다."

[[dialogue]]
speaker = "unk"
original = "セナリィは公安委員会の外注エージェントとして活動もしており、ネーゼマインとは仕事をする際にバディを組む仲だ。"
translation = "세나리는 공안위원회의 외주 에이전트로도 활동하고 있어 네제마인과는 업무 시 버디를 이루는 사이다."

[[dialogue]]
speaker = "ネーゼマイン"
original = "「――ふ～ん、学園のハロウィンパーティー当日に、お菓子の販売ねぇ」"
translation = "「──흠, 학원 할로윈 파티 당일에 과자를 판매한다라.」"

[[dialogue]]
speaker = "セナリィ"
original = "「そう！\u3000ハロウィンといえばお菓子ですわ！\u3000各お菓子メーカーもハロウィン仕様の限定パッケージで販売したりするでしょう？」"
translation = "「네! 할로윈 하면 과자입니다! 각 과자 제조사도 할로윈 사양의 한정 패키지로 판매하곤 하잖아요?」"

[[dialogue]]
speaker = "セナリィ"
original = "「これを逃がす手はありませんの！\u3000ハロウィンパーティー開催中に、その場で美味しいお菓子を販売すれば、大儲け間違いなしですわ！」"
translation = "「이걸 놓칠 수는 없네요! 할로윈 파티 개최 중에 그 자리에서 맛있는 과자를 판매하면 대박은 따 놓은 당상입니다!」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「大儲けね～。……簡単に言うけど、セナリィなら当然知ってるでしょ？」"
translation = "「대박이라니~. ……쉽게 말하지만 세나리라면 당연히 알고 있겠지?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「学園のハロウィンパーティーは、新星学園と流星学園の共同開催。その為、会場は毎年――」"
translation = "「학원 할로윈 파티는 신성학원과 유성학원의 공동 개최. 그래서 회장은 매년──」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ここ、大聖堂カフェテリアになるってこと」"
translation = "「여기 대성당 카페테리아가 된다는 거.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「当日はカフェテリアの方からも、バイキング形式でお菓子が提供される。そして周知の通り、カフェテリアの料理はどれも美味しいって評判が高い」"
translation = "「당일엔 카페테리아 쪽에서도 뷔페 형식으로 과자가 제공돼. 그리고 알다시피 카페테리아 요리는 다 맛있기로 평판이 자자하잖아.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「聞けば、毎年ハロウィンパーティーで出されるお菓子も美味しいっていうよ？\u3000しかも、今年は――」"
translation = "「듣기로는 매년 할로윈 파티에서 나오는 과자도 맛있다던데? 게다가 올해는──」"

[[dialogue]]
speaker = "セナリィ"
original = "「今や学園では知らぬ者はいない程に有名な料理人、新星学園２年の<ruby>東雲蛍火<rt>しののめけいか</rt></ruby>様がいる、でしょう？」"
translation = "「지금은 학원에서 모르는 이가 없을 정도로 유명한 요리사, 신성학원 2학년인 시노노메 케이카 님이 계시잖아요?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ただでさえ美味しいと評判だった大聖堂カフェテリアの料理が、彼女が厨房に立つようになってから、更に２段階上の次元に引き上げられたとまで言われてるよね」"
translation = "「안 그래도 맛있다고 소문난 대성당 카페테리아 요리가 그녀가 주방에 서기 시작한 뒤로 두 단계는 위의 차원으로 끌어올려졌다는 말까지 나오니까.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「東雲先輩の料理の腕前はジャンルを問わないそうだし、ハロウィンのお菓子も作る可能性が高いと思うけど、そこら辺は考えてあるのかな？」"
translation = "「시노노메 선배의 요리 실력은 장르를 가리지 않는다고 하고, 할로윈 과자도 만들 가능성이 높은데 그 부분은 생각해 뒀어?」"

[[dialogue]]
speaker = "セナリィ"
original = "「ふふふ、もちろん勝算あっての提案ですわ。確かに東雲様の作り出す料理はどれもプロ級と有名……」"
translation = "「후후후, 물론 승산이 있기에 드리는 제안드려요. 확실히 시노노메 님이 만들어내는 요리는 전부 프로급으로 유명……」"

[[dialogue]]
speaker = "セナリィ"
original = "「しかし、お菓子は決して得意ジャンルではないとリサーチ済みですの。特に<b>洋菓子</b>に関しては、彼女をも上回る腕前の持ち主がいることも」"
translation = "「하지만 과자는 결코 특기 장르가 아니라는 사실을 조사해 뒀어요. 특히 <b>서양</b> <b>과자</b>에 관해서는 그녀마저 능가하는 솜씨의 소유자가 있다는 사실도요.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「あ～、そうきたか～。プロのパティシエ級にお菓子作りが上手いっていうと――」"
translation = "「아~ 그렇게 나오는구나. 프로 파티시에급으로 과자를 잘 만든다고 하면──」"

[[dialogue]]
speaker = "セナリィ"
original = "「新星学園２年生、<ruby>桜十路<rt>さくらじゅうじ</rt></ruby>サラン様ですわ」"
translation = "「신성학원 2학년, 사쿠라코지 사란 님이에요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「まだ直接、桜十路様のお菓子を口にしたことはありませんけれど、東雲様本人に聞いても、お菓子作りに関しては自分よりも上だと言っていたから、間違いありませんわ！」"
translation = "「아직 직접 사쿠라코지 님의 과자를 먹어보지는 못했습니다만, 시노노메 님 본인에게 물어봐도 과자 만들기에 관해서는 자신보다 위라고 말했으니 틀림없어요!」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「そこでわざわざ本人に聞いちゃうのが、セナリィって感じだよね～」"
translation = "「거기서 굳이 본인에게 직접 물어보는 게 딱 세나리답네~.」"

[[dialogue]]
speaker = "セナリィ"
original = "「ほほほ♪\u3000悪とは邪道を駆使することですもの。それに今回は商売敵になってしまいますけれど、東雲様はビジネスパートナーとしても是非、懇意にしたい相手」"
translation = "「호호호♪ 악이란 사도를 구사하는 것이니까요. 게다가 이번엔 장사 라이벌이 되겠지만 시노노메 님은 비즈니스 파트너로서도 꼭 친분을 쌓고 싶은 상대.」"

[[dialogue]]
speaker = "セナリィ"
original = "「顔見知りになっておいて損はありませんわ。ただ、かなり警戒心の強い方でしたから、いずれ改めてご挨拶し直したいところですけれど……」"
translation = "「안면을 터 둬서 손해 볼 건 없어요 다만 꽤 경계심이 강한 분이었으니 조만간 다시 정식으로 인사드리고 싶습니다만……」"

[[dialogue]]
speaker = "セナリィ"
original = "「ともあれ、今回の販売計画の要となるのは、桜十路様ですの」"
translation = "「어찌 됐든 이번 판매 계획의 핵심은 사쿠라코지 님이에요」"

[[dialogue]]
speaker = "セナリィ"
original = "「そして、彼女が実は、既に会長様と交友関係があることもリサーチ済みですわ！」"
translation = "「그리고 그녀가 사실 이미 회장님과 친분이 있다는 것도 조사 완료했습니다!」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「そんなことだろうと思った。会長ってば、肩書き抜きにしても、本当に顔が広いよね～」"
translation = "「그럴 줄 알았어. 회장은 직함을 빼더라도 정말 발이 넓다니까~.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「特に女の子。私が紹介する前に、セナリィとも知り合いだったしさ～」"
translation = "「특히 여자애들 쪽으로. 내가 소개하기 전부터 세나리랑도 아는 사이였고 말이야~.」"

[[dialogue]]
speaker = "セナリィ"
original = "「それを言うなら、いつの間にか会長様に、マインの正体と公安委員会の存在がバレてたのも驚きましたわよ」"
translation = "「그걸 말하자면 어느샌가 회장님께 마인의 정체와 공안위원회의 존재가 들통나 있던 것도 놀라웠습니다에요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「で、会長様には、その広い人脈を活かして、今回の販売計画について、桜十路様との間を取り持って頂きたいのですわ」"
translation = "「그래서 회장님께는 그 넓은 인맥을 활용해 이번 판매 계획에 대해 사쿠라코지 님과의 사이를 중재해 주셨으면 좋겠어요」"

[[dialogue]]
speaker = "unk"
original = "いいけど、サランが頷くかはわからないぞ？"
translation = "상관없지만, 사란이 수락할지는 모른다고?"

[[dialogue]]
speaker = "セナリィ"
original = "「そこは我が社の顧問交渉人である、マインの出番ですわ♪」"
translation = "「그 부분은 저희 회사의 고문 교섭인인 마인이 나설 차례입니다♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「顧問になった覚えはないんだけど……う～ん」"
translation = "「고문이 된 기억은 없는데…… 으음.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「桜十路先輩かぁ……」"
translation = "「사쿠라코지 선배라……」"

[[dialogue]]
speaker = "サラン"
original = "「――ハロウィンパーティーで、お菓子を売るの～？」"
translation = "「──할로윈 파티에서 과자를 파는 거야~?」"

[[dialogue]]
speaker = "サラン"
original = "「わ～♪\u3000面白そう～♪」"
translation = "「와~♪ 재밌겠다~♪」"

[[dialogue]]
speaker = "サラン"
original = "「サランも一緒にやりた～い♪\u3000まぜてまぜて～♪」"
translation = "「사란도 같이 하고 싶어~♪ 끼워줘 끼워줘~♪」"

[[dialogue]]
speaker = "unk"
original = "まさかの即決！"
translation = "설마 했던 즉답!"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「あらら、マジか～」"
translation = "「어라라, 진짜야?」"

[[dialogue]]
speaker = "セナリィ"
original = "「ふふふ、あしなに♪\u3000交渉成立ですわね」"
translation = "「후후후, 보셨나요♪ 교섭 성립이네요」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「私の出る幕、なかったけどね」"
translation = "「내 차례는 없었지만 말이야.」"

[[dialogue]]
speaker = "セナリィ"
original = "「運がこちらに向いているということですわ。なんにしても、これで前提条件はクリア――」"
translation = "「운이 이쪽을 향하고 있다는 증거네요. 어쨌든 이걸로 전제 조건은 클리어──」"

[[dialogue]]
speaker = "セナリィ"
original = "「そうと決まれば、悪・即・善♪\u3000楽しいハロウィン計画の始まりですわよ～！」"
translation = "「결정됐으면 악·즉·선♪ 즐거운 할로윈 계획의 시작이에요~!」"

[[dialogue]]
speaker = "サラン"
original = "「お～♪」"
translation = "「오~♪」"

[[dialogue]]
speaker = "unk"
original = "こうして、ここにいる皆でハロウィンパーティーでお菓子販売をすることに決まったのだった。"
translation = "이렇게 해서 이곳에 있는 모두가 할로윈 파티에서 과자 판매를 하기로 결정된 것이었다."

