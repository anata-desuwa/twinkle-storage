[[dialogue]]
speaker = "unk"
original = "第２話,何も起きないはずがなく……！,P"
translation = "제2화, 아무 일도 일어나지 않을 리가 없고……!, P"

[[dialogue]]
speaker = "イクシリオン"
original = "「し、失礼します！\u3000星徒会の皆様……！」"
translation = "「시, 실례합니다! 성도회 여러분……!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あら？\u3000保健委員の子ね。確か……」"
translation = "「어라? 보건위원 아이네. 분명……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「イ、イクシリオンと申します。以後、お見知りおきのほどを……！」"
translation = "「이, 익실리온이라고 합니다. 앞으로 잘 부탁드립니다……!」"

[[dialogue]]
speaker = "イクシリオン"
original = "「え、えと、保健委員から、星徒会長宛ての書類をいくつか、お持ちしまして……」"
translation = "「저, 저기, 보건위원에서 성도회장 앞으로 된 서류를 몇 가지 가져왔는데요……」"

[[dialogue]]
speaker = "unk"
original = "ありがとう、イクシー"
translation = "고마워, 이크시"

[[dialogue]]
speaker = "イクシリオン"
original = "「どうぞっ！\u3000ご査収くださいませ……！」"
translation = "「여기요! 확인해 주십시오……!」"

[[dialogue]]
speaker = "マトイ"
original = "「あはは。緊張しちゃってるのかな。普通にリラックスしてくれて大丈夫だよ？」"
translation = "「아하하. 긴장한 걸까. 그냥 편하게 있어도 괜찮아?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そうそう。新星星徒会はアットホームな職場なんだから」"
translation = "「그래 그래. 신성 성도회는 화목한 직장 같은 곳이니까」"

[[dialogue]]
speaker = "サーシャ"
original = "「うふふ、いらっしゃ～い。未経験者も大歓迎よ～」"
translation = "「우후후, 어서 와～. 미경험자도 대환영이야～」"

[[dialogue]]
speaker = "アナ"
original = "「職場ではないですし今は募集もしてません」"
translation = "「직장도 아니고 지금은 모집하고 있지도 않아요」"

[[dialogue]]
speaker = "イクシリオン"
original = "「お、お気遣いありがとうございます……」"
translation = "「배, 배려해 주셔서 감사합니다……」"

[[dialogue]]
speaker = "イクシリオン"
original = "（と、とうとう……入ってしまいました。新星学園の星徒会室……！）"
translation = "（드, 드디어…… 들어와 버렸습니다. 신성 학원의 성도회실……!）"

[[dialogue]]
speaker = "イクシリオン"
original = "（う、噂通りです、本当にお綺麗な方ばっかり……！\u3000それに……）"
translation = "（소문대로예요, 정말 예쁜 분들뿐……! 게다가……）"

[[dialogue]]
speaker = "イクシリオン"
original = "（おふたりのおっぱいが！\u3000大きい！！）"
translation = "（두 분의 가슴이! 커!!）"

[[dialogue]]
speaker = "イクシリオン"
original = "（私もそれなりだとは思っていますが、ヴィーナスさんとサーシャさんもすごいですね……！）"
translation = "（저도 나름대로는 된다고 생각합니다만, 비너스 씨와 사샤 씨도 대단하시네요……!）"

[[dialogue]]
speaker = "サーシャ"
original = "「あらら？\u3000どこ見てるの～？」"
translation = "「어라라? 어딜 보고 있는 거니～?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「いい、いえっ、やましいことなんて何もありませんよ？\u3000イクシリオンは健全な天使でありまするのでっ」"
translation = "「아, 아니요, 켕기는 것 따윈 아무것도 없다고요? 익실리온은 건전한 천사이기 때문이옵니다!」"

[[dialogue]]
speaker = "サーシャ"
original = "「語尾がおかしくなってるけど、そうなのね～」"
translation = "「말투가 이상해졌지만, 그렇구나～」"

[[dialogue]]
speaker = "イクシリオン"
original = "（男性は会長１人だけ……！）"
translation = "（남성은 회장 한 명뿐……!）"

[[dialogue]]
speaker = "イクシリオン"
original = "（まるで漫画のようなシチュエーションです！\u3000密室に若い男女がこんなにいて、何も起きないはずがなく……！）"
translation = "（마치 만화 같은 상황이에요! 밀실에 젊은 남녀가 이렇게나 있는데, 아무 일도 일어나지 않을 리가 없고……!）"

[[dialogue]]
speaker = "イクシリオン"
original = "（会長は毎日女の子をとっかえひっかえ……いえ、同時に何人か相手をしたり……まさか全員一緒に！？）"
translation = "（회장은 매일 여자아이를 바꿔가며…… 아니, 동시에 몇 명이나 상대하거나…… 설마 전부 다 같이!?）"

[[dialogue]]
speaker = "イクシリオン"
original = "「あわわ……！？\u3000めくるめく世界が広がっています……！」"
translation = "「아와와……!? 어질어질한 세계가 펼쳐지고 있습니다……!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふやけた顔しちゃってるけど、どうしちゃったのかしら、この子。お～い」"
translation = "「멍하니 풀린 얼굴을 하고 있는데, 어떻게 된 걸까나, 이 아이. 어~이」"

[[dialogue]]
speaker = "イクシリオン"
original = "「──ふあっ！？\u3000すみません、私ったらまたはしたない……」"
translation = "「──후앗!? 죄송합니다, 저도 참 또 천박하게……」"

[[dialogue]]
speaker = "unk"
original = "（はしたない……？）"
translation = "（천박해……?）"

[[dialogue]]
speaker = "ヴィーナス"
original = "「疲れちゃってるのかしら？\u3000だったらちょうどいいわ、今からお楽しみタイムなの。あなたも混ざっていって！」"
translation = "「지쳐 있는 걸까나? 그렇다면 마침 잘 됐네, 지금부터 즐거운 시간(오타노시미 타임)이야. 너도 끼어들도록 해!」"

[[dialogue]]
speaker = "イクシリオン"
original = "「お楽しみタイム……！？\u3000わ、私も……！？」"
translation = "「즐거운 시간……!? 저, 저도……!?」"

[[dialogue]]
speaker = "マトイ"
original = "「いいね！\u3000たまには星徒会以外の人もいたら楽しそう♪」"
translation = "「좋네! 가끔은 성도회 이외의 사람도 있으면 즐거울 것 같아♪」"

[[dialogue]]
speaker = "イクシリオン"
original = "「は、はわわわ！\u3000いつもは星徒会役員のみなさんで！？\u3000や、やはり星徒会は……会長の……！？」"
translation = "「하, 하와와와! 평소에는 성도회 임원 여러분끼리!? 여, 역시 성도회는…… 회장님의……!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「え～っと、今日は誰が入れる？」"
translation = "「에~또, 오늘은 누가 넣을래?」"

[[dialogue]]
speaker = "イクシリオン"
original = "（入れる！？\u3000星徒会でそんなあけすけな言い方を……！？）"
translation = "（넣어!? 성도회에서 그렇게 노골적인 말투를……!?）"

[[dialogue]]
speaker = "サーシャ"
original = "「この前は私だったわね～」"
translation = "「저번에는 나였지~」"

[[dialogue]]
speaker = "イクシリオン"
original = "（完全に常態化しています！？\u3000ただれた星徒会室……そんな……漫画だけの世界じゃなかったのですね……ごくりっ……！）"
translation = "（완전히 상습화되어 있어요!? 문란한 성도회실…… 그런…… 만화 속 세상만이 아니었던 거군요…… 꿀꺽……!）"

[[dialogue]]
speaker = "サーシャ"
original = "「そうねぇ～、イクシーちゃん、やってみる？」"
translation = "「그렇네~, 익시 짱, 해 볼래?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「わわ、私ですか！？」"
translation = "「와와, 저 말인가요!?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「私には早いといいますか、心の準備ができていないといいますか……」"
translation = "「저에게는 이르다고 할까, 마음의 준비가 되지 않았다고 할까……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「きょ、今日のところは失礼いたします～～～～っ！」"
translation = "「오, 오늘은 이만 실례하겠습니다~~~~앗!」"

[[dialogue]]
speaker = "unk"
original = "行っちゃった……"
translation = "가 버렸다……"

[[dialogue]]
speaker = "サーシャ"
original = "「お茶を入れるのってそんなに難しくないのよ～……って、遅かったわね～」"
translation = "「차를 타는 건 그렇게 어렵지 않은데 말이야~…… 어라, 늦어 버렸네~」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あらら。紅茶嫌いだったのかしら？」"
translation = "「어라라. 홍차를 싫어했던 걸까나?」"

[[dialogue]]
speaker = "マトイ"
original = "「おいしいお茶菓子があったのに……もったいない」"
translation = "「맛있는 찻과자가 있었는데…… 아깝네」"

[[dialogue]]
speaker = "アナ"
original = "「きっと何かご事情があったのでしょう。お菓子いただきます。はむ」"
translation = "「분명 무슨 사정이 있었겠죠. 과자 잘 먹겠습니다. 함」"

