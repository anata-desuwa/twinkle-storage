[[dialogue]]
speaker = "unk"
original = "第１３話,破滅を呼ぶ者,B"
translation = "제13화, 파멸을 부르는 자, B"

[[dialogue]]
speaker = "スレイプニル"
original = "「ブルルル……！」"
translation = "「부르르르……!」"

[[dialogue]]
speaker = "unk"
original = "猛る神馬が<ruby>嘶<rt>いなな</rt></ruby>く。"
translation = "날뛰는 신마가 히히힝 하고 울부짖는다."

[[dialogue]]
speaker = "unk"
original = "蹄が建物を蹴り砕き、鋭い刃が地面を抉る。"
translation = "발굽이 건물을 걷어차 부수고 날카로운 칼날이 지면을 파헤친다."

[[dialogue]]
speaker = "クロト"
original = "「こいつ……強い……！」"
translation = "「이 녀석…… 강해……!」"

[[dialogue]]
speaker = "unk"
original = "今までフィーニスの塔で戦ってきたガーディアンとは、スピード、パワー、耐久力、どれも段違いだ。"
translation = "지금까지 피니스의 탑에서 싸워온 가디언과는 스피드, 파워, 내구력 모두 차원이 다르다."

[[dialogue]]
speaker = "unk"
original = "それでも……！"
translation = "그래도……!"

[[dialogue]]
speaker = "クロト"
original = "「ディマイズ──ブレイカー！」"
translation = "「디마이즈── 브레이커!」"

[[dialogue]]
speaker = "スレイプニル"
original = "「ブルル……！？」"
translation = "「부르르……!?」"

[[dialogue]]
speaker = "unk"
original = "星力を込めた拳の一撃がガーディアンを貫く。"
translation = "성력을 담은 주먹 일격이 가디언을 관통한다."

[[dialogue]]
speaker = "unk"
original = "打ち込む拳の数は三ではなく一。魔王の力を抑えた純粋な星騎士としての拳が、暴威を振るうガーディアンを打ち倒した。"
translation = "내지르는 주먹의 수는 셋이 아닌 하나. 마왕의 힘을 억제한 순수한 성기사로서의 주먹이 폭위를 떨치는 가디언을 쓰러뜨렸다."

[[dialogue]]
speaker = "マトイ"
original = "「はぁ、はぁ、はぁ……何とか倒せた……」"
translation = "「하아, 하아, 하아…… 어떻게든 쓰러뜨렸다……」"

[[dialogue]]
speaker = "サーシャ"
original = "「でも流星市国全域で同じガーディアンが暴れているみたいね」"
translation = "「하지만 유성시국 전역에서 똑같은 가디언이 날뛰고 있는 모양이야.」"

[[dialogue]]
speaker = "マトイ"
original = "「！\u3000そんな……星徒会でも苦戦するようなのが、そんな何体も出てきたら……」"
translation = "「! 그럴 수가…… 성도회도 고전할 만한 녀석이 그렇게 몇 마리나 나온다면……」"

[[dialogue]]
speaker = "アナ"
original = "「今はまだプリマステラが持ちこたえていますが、非常に危うい状態です。私たちで支援しましょう」"
translation = "「지금은 아직 프리마스텔라가 버티고 있습니다만 매우 위태로운 상태입니다. 저희가 지원하죠.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「どうしてガーディアンが暴れてるのかわからないけど、許さないわ！\u3000行くわよ、クロ──」"
translation = "「왜 가디언이 날뛰고 있는지는 모르겠지만 용서 못 해! 가자, 쿠로──」"

[[dialogue]]
speaker = "？？？"
original = "「カラミティ──バスターーーッ！！！」"
translation = "「칼라미티── 버스터어어어어!!!」"

[[dialogue]]
speaker = "マトイ"
original = "「──！？」"
translation = "「──!?」"

[[dialogue]]
speaker = "unk"
original = "嵐をまとった槍が、弾丸となって迸る。"
translation = "폭풍을 두른 창이 탄환이 되어 쏟아진다."

[[dialogue]]
speaker = "マトイ"
original = "「く──！！」"
translation = "「큭──!!」"

[[dialogue]]
speaker = "unk"
original = "ギリギリでマトイの反応が間に合い、直線的な破壊力を盾で逸らした。"
translation = "간발의 차로 마토이의 반응이 늦지 않아 직선적인 파괴력을 방패로 흘려냈다."

[[dialogue]]
speaker = "unk"
original = "もし一瞬でも遅れていれば、上半身が吹き飛んでいたかもしれない。"
translation = "만약 찰나라도 늦었다면 상반신이 날아갔을지도 모른다."

[[dialogue]]
speaker = "？？？"
original = "「チッ、仕留めそこなったか」"
translation = "「치읓, 놓쳤나.」"

[[dialogue]]
speaker = "マトイ"
original = "「はぁ、はぁ……何とか、耐えた……」"
translation = "「하아, 하아…… 어떻게든 버텼어…….」"

[[dialogue]]
speaker = "クロト"
original = "「誰だ……！？」"
translation = "「누구냐……!?」"

[[dialogue]]
speaker = "unk"
original = "嵐が止むと、そこにいたのは小柄な人影で──"
translation = "폭풍이 멎자 그곳에 있던 것은 왜소한 인영이었고──"

[[dialogue]]
speaker = "チナ"
original = "「アタシはチナ。お前らの……敵だ」"
translation = "「난 치나. 너희들의…… 적이다.」"

