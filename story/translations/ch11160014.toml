[[dialogue]]
speaker = "unk"
original = "第４話,ぎゅーってしたくなっちゃうんだ,P"
translation = "제4화, 꽉 안아주고 싶어진다구, P"

[[dialogue]]
speaker_original = "エンジュ"
speaker_translation = "엔쥬"
original = "「魔王、頼みがある」"
translation = "「마왕, 부탁이 있다.」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「お願いしますだぞ！」"
translation = "「부탁드립니다라구!」"

[[dialogue]]
speaker_original = "エンジュ"
speaker_translation = "엔쥬"
original = "「メテオラがなんでもかんでも壊さないよう、稽古をつけてやってくれないか。親や施設の先生には無理でも、魔王なら何とかできるかもしれない」"
translation = "「메테오라가 아무것이나 부수지 않도록 훈련을 시켜주지 않겠나. 부모님이나 시설 선생님에게는 무리여도, 마왕이라면 어떻게든 할 수 있을지도 몰라.」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「あたしも壊してばっかじゃダメだしなー。ドーナツ作る時も、べちゃべちゃにしちゃったしなー。次はひとりで作れるようになりたいぞ！」"
translation = "「나도 부수기만 해서는 안 되니까 말이야—. 도넛 만들 때도 끈적끈적하게 만들어버렸고 말이야—. 다음엔 혼자서 만들 수 있게 되고 싶어!」"

[[dialogue]]
speaker = "unk"
original = "２人からの提案には大賛成だ。"
translation = "두 사람의 제안에는 대찬성이다."

[[dialogue]]
speaker = "unk"
original = "メテオラが力加減を覚えてくれれば、街中の物は壊されなくなるし、気軽に力仕事も頼めるようになるだろう。メリットは大きい。"
translation = "메테오라가 힘 조절을 익혀준다면 거리의 물건들이 부서지지 않을 것이고, 가볍게 힘쓰는 일도 부탁할 수 있게 될 것이다. 메리트는 크다."

[[dialogue]]
speaker = "unk"
original = "というわけで、俺たち３人は地下トレーニング施設へやってきた。"
translation = "그리하여 우리 세 사람은 지하 트레이닝 시설로 왔다."

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「よーし、トレーニングするぞー！\u3000えいえいおー！」"
translation = "「좋아—, 트레이닝할 거야—! 에이에이오—!」"

[[dialogue]]
speaker_original = "エンジュ"
speaker_translation = "엔쥬"
original = "「力を入れないようにする訓練なんだから、気合を入れるのも控えめにな」"
translation = "「힘을 주지 않도록 하는 훈련이니까 기합 넣는 것도 적당히 해.」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「そ、そうだな！\u3000ぇ……ぇぃぇぃぉー」"
translation = "「그, 그렇네! 에…… 에이에이오—」"

[[dialogue]]
speaker_original = "エンジュ"
speaker_translation = "엔쥬"
original = "「それじゃ魔王、メテオラと手合わせしてやってくれ。メテオラは力をセーブして戦うんだ」"
translation = "「그럼 마왕, 메테오라와 대련해 줘. 메테오라는 힘을 세이브해서 싸우는 거야.」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「せーぶ……せーぶだな……せーぶするぞ」"
translation = "「세이브…… 세이브네…… 세이브할게.」"

[[dialogue]]
speaker = "unk"
original = "俺とメテオラは、しばらくの間、手加減しながら手合わせをしていたのだが──"
translation = "나와 메테오라는 한동안 힘을 빼고 대련을 하고 있었는데──"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「うぅぅ、守りを崩しきれないぞ！\u3000さすがは魔王だな！\u3000でゃああぁぁーっ！」"
translation = "「으으으, 수비를 다 무너뜨릴 수 없어! 역시 마왕이네! 데랴아아아—!」"

[[dialogue]]
speaker_original = "エンジュ"
speaker_translation = "엔쥬"
original = "「待て、メテオラ、思いっきり力が入っている。セーブしろって言っただろ」"
translation = "「잠깐, 메테오라, 잔뜩 힘이 들어갔어. 세이브하라고 했잖아.」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「うわー、そうだったー！\u3000魔王と戦ってると、どうしても力が入っちゃうぞー！」"
translation = "「우와— 그랬지—! 마왕이랑 싸우고 있으면 아무래도 힘이 들어가 버린다구—!」"

[[dialogue]]
speaker_original = "エンジュ"
speaker_translation = "엔쥬"
original = "「魔王もちょっと本気になりかけてたな。メテオラが相手だと手加減し続けるのは難しいか？」"
translation = "「마왕도 조금 진심이 되려 하고 있었네. 메테오라가 상대라면 계속 힘을 빼는 건 어려운가?」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「やっぱ無理かなー？\u3000うぅ、ごめんだぞ……」"
translation = "「역시 무리일까—? 으으, 미안하다구……」"

[[dialogue]]
speaker_original = "エンジュ"
speaker_translation = "엔쥬"
original = "「魔王、手伝ってくれたのは感謝する。だが別の手を考えるか……」"
translation = "「마왕, 도와준 건 고맙다. 하지만 다른 방법을 생각해야겠어……」"

[[dialogue]]
speaker = "unk"
original = "俺はまだ諦めるつもりはない"
translation = "나는 아직 포기할 생각은 없어."

[[dialogue]]
speaker = "unk"
original = "待って！"
translation = "기다려봐!"

[[dialogue]]
speaker_original = "エンジュ"
speaker_translation = "엔쥬"
original = "「いいアイデアでもあるのか？」"
translation = "「좋은 아이디어라도 있는 거야?」"

[[dialogue]]
speaker = "unk"
original = "よし、メテオラ！\u3000俺をハグするんだ！"
translation = "좋아, 메테오라! 나를 허그하는 거야!"

[[dialogue]]
speaker_original = "エンジュ"
speaker_translation = "엔쥬"
original = "「正気か！？\u3000メテオラに抱きしめられたりしたら、全身がバラバラになるぞ！」"
translation = "「제정신이야!? 메테오라에게 안기기라도 했다간 전신이 산산조각 날 거다!」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「そうだぞ！？\u3000魔王の体、ぶっ壊れちゃうぞ！？」"
translation = "「맞아—! 마왕의 몸, 박살 나버린다구!?」"

[[dialogue]]
speaker = "unk"
original = "壊れない程度に加減する訓練だからね？"
translation = "부서지지 않을 정도로 조절하는 훈련이니까, 알았지?"

[[dialogue]]
speaker = "unk"
original = "鍛えてるから大丈夫！"
translation = "단련하고 있으니까 괜찮아!"

[[dialogue]]
speaker_original = "エンジュ"
speaker_translation = "엔쥬"
original = "「命知らずだな……」"
translation = "「목숨이 아깝지 않은 모양이군……」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「こ、壊しちゃわないように、そーっとだな？\u3000そーっと、そーっと……」"
translation = "「부, 부수지 않도록 살살이지? 살살, 살살……」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「ぎゅーーーーっ！」"
translation = "「규우우우우—!」"

[[dialogue]]
speaker = "unk"
original = "背骨がーーーっ！？"
translation = "등뼈가—!?"

[[dialogue]]
speaker = "unk"
original = "ぎゃーーっ！？"
translation = "갸아악—!?"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「わーっ！\u3000ごめんだぞー！」"
translation = "「와앗! 미안하다구—!」"

[[dialogue]]
speaker_original = "エンジュ"
speaker_translation = "엔쥬"
original = "「言わんこっちゃない。メテオラは人との触れ合いに慣れていないからな」"
translation = "「거봐, 내 말 맞지. 메테오라는 사람과의 스킨십에 익숙하지 않으니까.」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「うぅ……どんな風に触ればいいのかわかんないんだ……好きなものほど、ぎゅーってしたくなっちゃうんだぞ……」"
translation = "「으으…… 어떤 식으로 만져야 할지 모르겠다구…… 좋아하는 것일수록 꽉 안아주고 싶어진다구……」"

[[dialogue]]
speaker = "unk"
original = "メテオラの生い立ちを聞いた限り、ハグをされたり、愛情を注いでもらった経験そのものが乏しいのかもしれない。なら──"
translation = "메테오라의 성장 배경을 들은 바로는 허그를 받거나 애정을 받은 경험 자체가 부족할지도 모른다. 그렇다면──"

[[dialogue]]
speaker = "unk"
original = "おいで、メテオラ"
translation = "이리 와, 메테오라."

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「うん？\u3000なんだ？」"
translation = "「응? 뭐야?」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「ひゃあっ……！？\u3000魔王にギューってされてる……！？」"
translation = "「히얏……!? 마왕에게 규우— 당하고 있어……!?」"

[[dialogue]]
speaker_original = "エンジュ"
speaker_translation = "엔쥬"
original = "「なっ……！？」"
translation = "「뭐……!?」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「ふわぁ……魔王のギューは優しいな……？\u3000優しいのにポカポカあったかくて……ホワッとするぞ」"
translation = "「후와아…… 마왕의 규우—는 다정하네……? 다정한데 포근포근 따뜻해서…… 마음이 놓인다구.」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「そっか……わかったぞ……魔王のくらい、ソーッとギューして、ポカポカして、ホワッとすればいいんだな……？」"
translation = "「그렇구나…… 알겠어…… 마왕의 지위라는 건, 살며~시 꼬옥 하고, 따끈따끈하게 해서, 화사하게 하면 되는 거구나……?」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「ぎゅ、ぎゅーっ……」"
translation = "「꼬, 꼬오옥……」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「こ、これなら大丈夫か、魔王……？」"
translation = "「이, 이정도면 괜찮은 거야, 마왕……?」"

[[dialogue]]
speaker_original = "エンジュ"
speaker_translation = "엔쥬"
original = "「……ちょっと苦しそうだけど、大丈夫そうだな」"
translation = "「……조금 괴로워 보이지만, 괜찮은 것 같네」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「ホントか……！\u3000やったー！\u3000あたしも優しいぎゅーができたぞー！」"
translation = "「정말이야……! 만세! 나도 상냥하게 꼬옥 안아주기를 할 수 있게 됐어!」"

[[dialogue]]
speaker = "unk"
original = "くっきりと痕が残りそうなくらい強めのハグだけど、さっきより加減ができるようになっている。ゆっくりだけど、この分ならいつかは──"
translation = "선명하게 자국이 남을 정도로 강한 포옹이지만, 아까보다는 힘 조절을 할 수 있게 되었다. 느리지만, 이 기세라면 언젠가는──"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「魔王、ありがとな！\u3000大好きだぞ！\u3000ぎゅーーーーっ！」"
translation = "「마왕, 고마워! 정말 좋아해! 꼬오오오옥!」"

[[dialogue]]
speaker = "unk"
original = "脊髄がーーーーっ！！"
translation = "척추가아아아아아!!"

[[dialogue]]
speaker = "unk"
original = "んぎゃーーーっ！"
translation = "응갸아아아아아!"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「わーーーっ！\u3000ごめんだぞ、魔王ーーーっ！」"
translation = "「와아아아아! 미안해, 마왕!」"

[[dialogue]]
speaker = "unk"
original = "体を張った甲斐もあり、ほんの少～しだけ、メテオラは力加減というものを覚えられた……と思う。"
translation = "몸을 던진 보람이 있어, 아주 조~금이지만, 메테오라는 힘 조절이라는 것을 배우게 되었다……고 생각한다."

