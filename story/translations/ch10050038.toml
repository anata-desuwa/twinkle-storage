[[dialogue]]
speaker = "unk"
original = "リップルのリゾート結界へ遊びに来た俺とソフィア。"
translation = "리플의 리조트 결계로 놀러 온 나와 소피아."

[[dialogue]]
speaker = "unk"
original = "それぞれ両星徒会のメンバーと一緒に来ており、反対側の砂浜からはわいわいはしゃぐ声が聞こえてくる……。"
translation = "각각 양 성도회의 멤버들과 함께 왔으며, 반대편 백사장에서는 왁자지껄 떠드는 소리가 들려온다……."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「──ふぅ。泳ぐのは楽しいですけど、なかなか疲れますね。やっぱり浮き袋に乗っているのが一番です」"
translation = "「──후우. 수영하는 건 즐겁지만, 꽤 지치네요. 역시 튜브를 타고 있는 게 최고예요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ん？\u3000他の皆さんと合流──ですか？\u3000そうですね。どうしましょうか……えっと……」"
translation = "「응? 다른 분들과 합류── 말인가요? 그러게요. 어떻게 할까요…… 음……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「みんなと遊ぶのもいいですが、もう少し２人でいませんか？」"
translation = "「모두와 노는 것도 좋지만, 조금만 더 둘이서 있지 않을래요?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「いえ、ここで──ではなく。もっと……人気のないところで。ほら、落ち着いて休憩も大事じゃないですか」"
translation = "「아니요, 여기서── 가 아니라. 좀 더…… 인적이 없는 곳에서요. 봐요, 진득하게 휴식하는 것도 중요하잖아요.」"

[[dialogue]]
speaker = "unk"
original = "そうして、ソフィアに連れられて岩場の陰まで移動した。"
translation = "그렇게 해서, 소피아에게 이끌려 바위 그늘까지 이동했다."

[[dialogue]]
speaker = "unk"
original = "そこは、みんなのはしゃぐ声も聞こえないほど静かで、人の気配もなく……"
translation = "그곳은, 모두가 떠드는 소리도 들리지 않을 만큼 정적이었고, 사람의 기척도 없어서……"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「こうして見ると……会長さんの体は、男の人──って感じですね。胸板は厚いですし、私の体よりずっと硬い……」"
translation = "「이렇게 보니…… 회장님의 몸은, 남자──라는 느낌이네요. 가슴팍은 두툼하고, 제 몸보다 훨씬 단단하고……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「水着になると一段と引き締まって見えるから不思議です……」"
translation = "「수영복을 입으니까 한층 더 탄탄해 보여서 신기해요……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「あの……会長さんの体を見ていたら──なんだか、その……私も、火照ってきた、と申しますか……うん……」"
translation = "「저기…… 회장님의 몸을 보고 있으니까── 왠지, 그…… 저도, 몸이 달아올랐다고나 할까…… 응……」"

[[dialogue]]
speaker = "unk"
original = "ソフィアはもじもじと脚をすり合わせた。"
translation = "소피아는 머뭇거리며 다리를 비벼댔다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「あっ──会長さん。……あの……えぇと。今日は……私のほうから、しても、いいですか？」"
translation = "「앗── 회장님. ……저기…… 음. 오늘은…… 제가 먼저, 해도, 될까요?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「んっ──ぁっ……<emoji=heart04>\u3000んっ、ふぅっ……ぁっ……<emoji=heart04>\u3000はい、そのまま──ぁっ、会長さんは──動かなくて、大丈夫ですから……っ<emoji=heart04>」"
translation = "「응── 아앗……<emoji=heart04> 응, 후우…… 아앗……<emoji=heart04> 네, 그대로── 앗, 회장님은── 움직이지 않아도, 괜찮으니까요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ソフィアに言われるがまま水着を脱ぎ、岩場へと腰掛けた俺。"
translation = "소피아가 시키는 대로 수영복을 벗고, 바위 위에 걸터앉은 나."

[[dialogue]]
speaker = "unk"
original = "彼女は正面からこちらへまたがってきて、そのまま秘部と秘部をこすり合わせるような体勢を取った。"
translation = "그녀는 정면에서 이쪽으로 올라타서, 그대로 비부와 비부를 문지르는 듯한 자세를 취했다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「──ぁっ、んっ……いつも──私ばかりが──会長さんから、気持ちよくしてもらっていますから──ぁっ……んっ、ぁっ……<emoji=heart04>」"
translation = "「──앗, 응…… 항상── 저만── 회장님 덕분에, 기분 좋아지고 있으니까요── 앗…… 응, 아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「たまには、私から──んっ、ぁっ……<emoji=heart04>\u3000会長さんのこと──気持ちよくしてあげたいなって……ぁっ、思って……んっ……<emoji=heart04>」"
translation = "「가끔은, 제가── 응, 아앗……<emoji=heart04> 회장님을── 기분 좋게 해주고 싶다고…… 앗, 생각해서…… 응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "素股のような体勢となって、不器用に腰を揺さぶるソフィア。"
translation = "스마타 같은 자세가 되어, 서투르게 허리를 흔드는 소피아."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「最初からそのつもりだったの？」"
translation = "「처음부터 그럴 생각이었어?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「え、と……んっ、ぁっ……<emoji=heart04>\u3000えぇ──んっ、最近、考えていたことです──ぁっ、んっ……<emoji=heart04>」"
translation = "「그, 게…… 응, 아앗……<emoji=heart04> 네── 응, 최근에, 생각하고 있었던 거예요── 앗, 응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「私ばかり、優しくしてもらっていてはダメだと……んぁっ<emoji=heart04>\u3000……んっ、どうですか……？\u3000ぁっ、んっ……<emoji=heart04>」"
translation = "「저만, 다정하게 대해주시는 건 안 된다고…… 응아앗<emoji=heart04> ……응, 어때요……? 앗, 응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "いつもは脱衣という工程を経て性交へ至るところ──"
translation = "평소에는 탈의라는 공정을 거쳐 성교에 이르는 법이지만──"

[[dialogue]]
speaker = "unk"
original = "しかし今回は、さっきまで堂々と着用されていた秘部の布地を、そのまま剥き出しのペニスに押しつけられている。"
translation = "하지만 이번에는, 방금 전까지 당당하게 착용하고 있던 비부의 천 조각을, 그대로 노출된 자지에 짓누르고 있다."

[[dialogue]]
speaker = "unk"
original = "日常と蜜月の狭間にあるようなその行為に、俺は妙な興奮を覚えていった。"
translation = "일상과 밀월의 틈새에 있는 듯한 그 행위에, 나는 묘한 흥흥을 느끼기 시작했다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ふふっ──ですが……ぁっ……<emoji=heart04>\u3000返事を聞かなくても──んぁっ……おち○ちんが……ぁっ、ガチガチになって、教えてくれてますね……ふふ……<emoji=heart04>」"
translation = "「후후── 하지만…… 앗……<emoji=heart04> 대답을 듣지 않아도── 응앗…… 자지가…… 앗, 딱딱하게 발기해서, 알려주고 있네요…… 후후……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「この調子で──んっ、ぁっ<emoji=heart04>\u3000今日は──私から会長さんへの、ご奉仕を──んっ、ぁっ、んぅぅっ……<emoji=heart04>\u3000はぁ、はぁ……っ……<emoji=heart04>」"
translation = "「이 기세로── 응, 앗<emoji=heart04> 오늘은── 제가 회장님께 드리는, 봉사를── 응, 앗, 응으으윽……<emoji=heart04> 하아, 하아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「え──私も、濡れてきた……？\u3000っっ……い、言わなくていいんですっ、そういうのは──ぁっ、んっ……ん、ふぅっ……<emoji=heart04>」"
translation = "「에── 저도, 젖어버렸다니……? 읏…… 마, 말하지 않아도 돼요, 그런 건── 앗, 응…… 응, 후우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "乾きかけていた水着の一部が、股間のところだけじんわりと濃く変色していた。"
translation = "말라가던 수영복의 일부가, 가랑이 부분만 서서히 진하게 변색되어 있었다."

[[dialogue]]
speaker = "unk"
original = "男のように可視化されないはずの、女の興奮が目に見えてわかる。"
translation = "남자처럼 가시화되지 않을 터인, 여자의 흥분이 눈에 보여 이해된다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「んぅっ……ちが……っ、こ、これは──汗──汗もありますからっ……<emoji=heart04>\u3000ビーチは暑いですし、日差しもありますし……っ<emoji=heart04>」"
translation = "「응으윽…… 아니…… 윽, 이, 이건── 땀── 땀 때문이기도 하니까요……<emoji=heart04> 비치는 덥고, 햇살도 강하니까……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「もう──そんなこと言うようでしたら──っ、いいですよ……元々──んっ、そのつもり、でしたから──はぁ、はぁ……っ……<emoji=heart04>」"
translation = "「정말── 그런 말씀을 하신다면── 읏, 됐어요…… 원래── 응, 그럴 생각이었으니까요── 하아, 하아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "するとソフィアは、濡れた水着をくいっとずらして……"
translation = "그러자 소피아는, 젖은 수영복을 슥 비껴내고는……"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「じゃあ──んっ……おち○ちん、おま○こに挿れちゃい、ますね──ぁっ、んぅぅぅっっ…………<emoji=heart04>」"
translation = "「그럼── 응…… 자지, 보지에 삽입해, 버릴게요── 앗, 응으으으윽…………<emoji=heart04>」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ぁっ──んんんんんんっっっっ…………！」"
translation = "「앗── 응응응응응읏…………!」"

[[dialogue]]
speaker = "unk"
original = "腰を落とすようにして、挿入──ペニスはぎゅうぎゅうの膣内へ飲み込まれた。"
translation = "허리를 내리듯이 하여, 삽입── 페니스는 꽉 조이는 질 안으로 삼켜졌다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「あぁあ、あったかい……です。会長さんの、おち○ちん、身体の芯から私のこと……温めてくれてます、んんんっ……<emoji=heart04>」"
translation = "「아아아, 따뜻해……요. 회장님의, 자지, 몸속 깊은 곳부터 저를…… 데워주고 있어요, 응응읏……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「はぁっ、んっ、んんぅっ……会長、さんっ……んっ<emoji=heart04>\u3000はぁ、はぁ──んっ……ええ、そのままで──ぁっ、私のほうが、んっ、動きますから……っ<emoji=heart04>」"
translation = "「하앗, 응, 응으읏…… 회장, 님…… 응<emoji=heart04> 하아, 하아── 응…… 네, 그대로── 앗, 제가, 응, 움직일 테니까……요<emoji=heart04>」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「はぁ、ふぅ、はぁ……おま○こ、しっかり締めて……会長さんのおち○ちんを、ごし、ごしっ、って……はぁ、ぅ、んんんっ……<emoji=heart04>」"
translation = "「하아, 후우, 하아…… 보지, 꽉 조여서…… 회장님의 자지를, 비비, 비비적, 하고…… 하아, 으, 응응읏……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「んぁぁっ──……！\u3000はぁ、はぁっ……んっ……こ、これで──ど、どうですか……？\u3000ぁっ、気持ちよく、なれてますか──ぁっ……？」"
translation = "「응아앗──……! 하아, 하앗…… 응…… 이, 이걸로── 어, 어때요……? 앗, 기분 좋게, 되고 있나요── 앗……?」"

[[dialogue]]
speaker = "unk"
original = "こちらの胸板に手をついて、自ら積極的に腰を振るソフィア。"
translation = "이쪽의 가슴팍에 손을 얹고, 스스로 적극적으로 허리를 흔드는 소피아."

[[dialogue]]
speaker = "unk"
original = "今日は自分から──という言葉に嘘はないようで、あくまで彼女のほうが行為をリードするつもりのようだ。"
translation = "오늘은 자신이 먼저──라는 말에 거짓은 없는 듯, 어디까지나 그녀가 행위를 리드할 생각인 모양이다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「今日のソフィアは、大胆だね……」"
translation = "「오늘의 소피아는, 대담하네……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ふふ……だって、ずっと考えてたんです……会長さんに、大人なところ、見せたいって……んんっ、あ……<emoji=heart04>」"
translation = "「후후…… 그게, 계속 생각했거든요…… 회장님께, 어른스러운 모습, 보여드리고 싶다고…… 응응, 아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「とはいえ──ぁっ、っ……こんな、外で──いやらしい行為に、及ぶなんて……ぁっ<emoji=heart04>\u3000思って、ませんでしけど──ぁっ、んぅぅっ……！」"
translation = "「그렇다고는 해도── 앗, 읏…… 이런, 밖에서── 음란한 행위에, 이를 줄은…… 앗<emoji=heart04> 생각지도, 못했지만요── 앗, 응으으윽……!」"

[[dialogue]]
speaker = "unk"
original = "ソフィアの秘所はすっかり抵抗なく肉棒を受け入れていた。"
translation = "소피아의 비소는 완전히 저항 없이 육봉을 받아들이고 있었다."

[[dialogue]]
speaker = "unk"
original = "羞恥がかえってスパイスとなっているのか、むしろいつもより潤沢に濡れているように思える。"
translation = "수치심이 오히려 향신료가 된 것인지, 오히려 평소보다 윤택하게 젖어 있는 것처럼 느껴진다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「んぁっ──ぁっ、ふぅっ……んっ……！\u3000み、見られるの──っ、恥ずかしい、ですけど──ぁっ、会長さんになら……んっ……<emoji=heart04>」"
translation = "「응아앗── 앗, 후우…… 응……! 보, 보여지는 거── 읏, 부끄럽지만── 앗, 회장님이라면…… 응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いやらしいよ、ソフィア」"
translation = "「음란해, 소피아」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「～～っ……そんな──あぁあ、んぅ……いじわる言うのは──ぁっ、やめてくださいっ……<emoji=heart04>\u3000いやらしくなんて──アッ、んぁっ<emoji=heart04>」"
translation = "「～～읏…… 그런── 아아아, 응으…… 짓궂은 말씀은── 앗, 하지 말아 주세요……<emoji=heart04> 음란하다니── 앗, 응아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「私は──ぁっ、んっ……ふつうですっ、もしくは会長さんのせいです──っ……<emoji=heart04>」"
translation = "「저는── 앗, 응…… 평범해요, 아니면 회장님 탓이에요── 읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "普段、真面目な彼女を知っているだけに、雄にまたがって腰を振っている様がいっそう淫猥に見える。"
translation = "평소 성실한 그녀를 알고 있는 만큼, 수컷 위에 올라타 허리를 흔들고 있는 모습이 한층 더 음란해 보인다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「んぁぁっ……<emoji=heart04>\u3000はぁっ、んっ、はぁっ……<emoji=heart04>\u3000あれ、私──んっ……<emoji=heart04>\u3000変、かもです……<emoji=heart04>」"
translation = "「응아앗……<emoji=heart04> 하앗, 응, 하앗……<emoji=heart04> 어라, 저── 응……<emoji=heart04> 이상할지도, 몰라요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「おま○こ……すごく、熱くなってて……ぁっ、いきなり、こんな──感じる、なんて──ぁっ……<emoji=heart04>」"
translation = "「보지…… 너무, 뜨거워져서…… 앗, 갑자기, 이렇게── 느끼다니── 앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「はぁ、はぁ──んぅっ……<emoji=heart04>\u3000で、ですが──ぁっ、会長さんは、そのままで──んっ、いいんですからね……？\u3000今日は、ぜんぶ、私に任せて──んぁぁっ<emoji=heart04>」"
translation = "「하아, 하아── 응으윽……<emoji=heart04> 하, 하지만── 앗, 회장님은, 그대로── 응, 계시면 되니까요……? 오늘은, 전부, 저에게 맡기고── 응아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "水着をずらして胸をはだけたり、その乳首を自ら指でつまんでみたりと──"
translation = "수영복을 비껴내어 가슴을 드러내거나, 그 유두를 스스로 손가락으로 꼬집어 보기도 하며──"

[[dialogue]]
speaker = "unk"
original = "いつになく快感への貪欲さがうかがえる、ソフィアの姿。"
translation = "여느 때와 달리 쾌감에 대한 탐욕이 엿보이는, 소피아의 모습."

[[dialogue]]
speaker = "unk"
original = "常夏のビーチというものはやはり、人を開放的にさせるのだろうか──"
translation = "한여름의 비치라는 곳은 역시, 사람을 개방적으로 만드는 것일까──"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「──んぁぁぁっ<emoji=heart04>\u3000ぁっ、はぁっ、やめ──ぁっ、んぅぅっ、んぁぁっ！\u3000んぅっ、ぁっ、んぁぁっ！\u3000い、いきなり──んぁっ<emoji=heart04>\u3000はぁっ<emoji=heart04>」"
translation = "「──응아아앗<emoji=heart04> 앗, 하앗, 그만── 앗, 응으으윽, 응아앗! 응으윽, 앗, 응아앗! 가, 갑자기── 응아앗<emoji=heart04> 하앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「か、会長さんは動かなくていいと──あっ！\u3000んっ！\u3000言ったはず、です──んぁぁっ……今日は、私があなたを──んぅぅっ……！\u3000ぁっ……！」"
translation = "「회, 회장님은 움직이지 않아도 된다고── 앗! 응! 말했을, 터예요── 응아앗…… 오늘은, 제가 당신을── 응으으윽……! 앗……!」"

[[dialogue]]
speaker = "unk"
original = "そう言われても、腰のほうが勝手に動いてしまうのだった。"
translation = "그렇게 들어도, 허리가 제멋대로 움직여 버리는 것이었다."

[[dialogue]]
speaker = "unk"
original = "目と鼻の先で乱れるソフィアの姿を見て、衝動を抑えろというほうが無理な話で。"
translation = "눈앞에서 흐트러지는 소피아의 모습을 보고, 충동을 억제하라는 쪽이 무리인 이야기라."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ぁっぁっ──んっ、んぁぁぁっ！\u3000ぁっ、はぁっ、だ、だめです──んっ、会長さんに、動かれたら──ぁっ……んぅぅっ……！」"
translation = "「앗앗── 응, 응아아앗! 앗, 하앗, 아, 안 돼요── 응, 회장님이, 움직이시면── 앗…… 응으으윽……!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「会長さんのおち○ちんが、私の弱いことろ、ズンズンこすってきて……あああっ、ん、あぁあ……これじゃ、ダメ、ダメなんですぅっ！」"
translation = "「회장님의 자지가, 제 약한 곳을, 푹푹 문질러 와서…… 아아앗, 응, 아아아…… 이러면, 안 돼, 안 된단 말이에요!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「わ、私のほうが──んぅぅっ……<emoji=heart04>\u3000ご奉仕どころじゃ──ぁっ、なくなって、しまいますから──ぅぅっ、ぁっ、んぁぁっ……<emoji=heart04>\u3000ひっ、んぅっ！」"
translation = "「제, 제가── 응으으윽……<emoji=heart04> 봉사는커녕── 앗, 정신이 없어져, 버리니까요── 으으윽, 앗, 응아앗……<emoji=heart04> 히익, 응으윽!」"

[[dialogue]]
speaker = "unk"
original = "こちらのピストンとソフィアの前後動がちょうどよいタイミングでシンクロし、快感が倍増していく。"
translation = "이쪽의 피스톤과 소피아의 전후 운동이 딱 좋은 타이밍에 싱크로 되어, 쾌감이 배가되어 간다."

[[dialogue]]
speaker = "unk"
original = "それは、向こうも同じなようで……"
translation = "그것은, 상대방도 마찬가지인 듯하여……"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ぁっぁっ──む、むりですこれ──ぁっ、んぅぅっ……<emoji=heart04>\u3000ふ、２人とも動いたら、すごすぎて──ぁっ、んぁぁっぁぁぁっっ──っ……！」"
translation = "「앗앗── 무, 무리예요 이거── 앗, 응으으윽……<emoji=heart04> 두, 둘 다 움직이면, 너무 굉장해서── 앗, 응아앗아아앗── 읏……!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「おち○ちんとおま○こ、こすれあって、からみあって……！\u3000んんっ、あっ、ああぁあ、あ、あああっ……<emoji=heart04>」"
translation = "「자지와 보지, 서로 문질러지고, 얽혀서……! 응응, 앗, 아아아아, 아, 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「こんなのっ、ぁぅっ、こんな、のっ、あ、ああっ、い、いぐっ……！\u3000ぁっ、んぁっ、んはぁっっっっっ<emoji=heart04>\u3000ッ、ッッ～～～～～…………！！」"
translation = "「이런 거, 아윽, 이런 거, 아, 아앗, 가, 가버렷……! 앗, 응아앗, 응하앗<emoji=heart04> 읏, 읏～～～～～…………!!」"

[[dialogue]]
speaker = "unk"
original = "こちらの胸板についた手の先から、強めの力が伝わった。小さく達したようだった。"
translation = "이쪽의 가슴팍에 댄 손끝에서, 강한 힘이 전해졌다. 작게 절정에 달한 듯했다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「はぁ、はぁ、ふぅっ<emoji=heart04>\u3000んぁっ、んぁっ……<emoji=heart04>\u3000ふぅ、ふぅ……もう……っ……<emoji=heart04>\u3000こちらの予期しない動きされたら、こ、困りますっ……<emoji=heart04>」"
translation = "「하아, 하아, 후우<emoji=heart04> 응아앗, 응아앗……<emoji=heart04> 후우, 후우…… 정말…… 읏……<emoji=heart04> 이렇게 예기치 못한 움직임을 하시면, 고, 곤란해요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「いいですか──私には、私のペースがですね──ぁっ、んぁぁっ！？\u3000ぁっ、んぁっ、んぁぁぁぅっ！\u3000はぁ、はぁ──っ……<emoji=heart04>」"
translation = "「알겠나요── 저에게는, 저만의 페이스가 있다고요── 앗, 응아앗!? 앗, 응아앗, 응아아아으윽! 하아, 하아── 읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それでも、こちらは責め手をやめず──"
translation = "그럼에도, 이쪽은 공격을 멈추지 않고──"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ぁっぁっぁっ──んぁっ、待って、くださ──っっ…………<emoji=heart04><emoji=heart04>\u3000今日は、私があなたを気持ちよくする番なんですっ……！」"
translation = "「앗앗앗── 응아앗, 기다려, 주세── 읏…………<emoji=heart04><emoji=heart04> 오늘은, 제가 당신을 기분 좋게 할 차례란 말이에요!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「私のおま○こで、あなたのおち○ちんを気持ちよくして……んんぅうっ……！\u3000びゅっびゅってさせるんですっ、んんっ、あっ、ぁっ、んぁぁっ、ふぁぁっ<emoji=heart04>」"
translation = "「제 보지로, 당신의 자지를 기분 좋게 해서…… 응응으윽……! 뷰릇뷰릇하게 만들 거란 말이에요, 응응, 앗, 앗, 응아앗, 하아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ソフィアの反論などどこ吹く風と、じっくり重く腰を打ちつけていく。"
translation = "소피아의 반론 따위는 아랑곳하지 않고, 묵직하고 무겁게 허리를 쳐올려 간다."

[[dialogue]]
speaker = "unk"
original = "身軽なソフィアの自重ごと味わうようにピストンすると、もとより窮屈な彼女の膣内がさらにペニスを締めつけてきた。思わず出しかねないほどの快感。"
translation = "가냘픈 소피아의 체중까지 맛보듯이 피스톤하자, 원래부터 비좁은 그녀의 질 내부가 더욱 페니스를 조여왔다. 나도 모르게 싸버릴 것만 같은 쾌감."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ん～～～～～っっ……！\u3000ぁっ、ふぅっ──はぁ、はぁっ、んぅっ<emoji=heart04>\u3000わ、私も──んぁっ、やめません、からね──ぁっ、んぁぁっ、はぁっ<emoji=heart04>」"
translation = "「응～～～～～읏……! 앗, 후우── 하아, 하앗, 응으윽<emoji=heart04> 저, 저도── 응아앗, 그만두지, 않을 거니까요── 앗, 응아앗, 하앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ふぅっ、ふぅっ……<emoji=heart04>\u3000ぁっ<emoji=heart04>\u3000んぁっ<emoji=heart04>\u3000んぁぁぁっ<emoji=heart04>\u3000はぁ、はぁ──んぅぅっ……！」"
translation = "「후우, 후우……<emoji=heart04> 앗<emoji=heart04> 응아앗<emoji=heart04> 응아아앗<emoji=heart04> 하아, 하아── 응으으윽……!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「んん、あっ、あ、あぁあっ、れ、れもっ……これ──きもち、よすぎ、ます──ぅっ！\u3000んんっ、あっ、あ、あ、や、あ、あああっ……！！」"
translation = "「응응, 앗, 아, 아아앗, 그, 그래도…… 이거── 기분, 너무, 좋아요── 윽! 응응, 앗, 아, 아, 야, 아, 아아앗……!!」"

[[dialogue]]
speaker = "unk"
original = "それでいて、彼女も彼女で律儀に腰をグラインドさせ続ける。"
translation = "그러면서도, 그녀는 그녀대로 성실하게 허리를 계속해서 회전시킨다."

[[dialogue]]
speaker = "unk"
original = "ひとつがいの男と女が、ただただ性的な快楽をむさぼるだけの、浅ましい交尾──"
translation = "한 쌍의 남녀가, 그저 성적인 쾌락만을 탐닉하는, 천박한 교미──"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「んぁぁぁっぁ──ぅっ、も、もうだめ──で、すっ……<emoji=heart04>\u3000会長さん──ぁっ、ふぁぁっ、一緒に──んぁっ、んっ、んんぁぁっ──！」"
translation = "「응아아아앗── 윽, 이, 이제 한계── 예요……<emoji=heart04> 회장님── 앗, 하아앗, 같이── 응아앗, 응, 응응아아앗──!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「はぁっ、はぁぁっ、んっ、いくっ、いきます──っ……！\u3000そこに──そこにいて、ください──ぁっ、ぁっぁっ、んんぁぁぁ……っ……！！」"
translation = "「하앗, 하아앗, 응, 가요, 갈게요── 읏……! 거기에── 거기에 있어 주세요── 앗, 앗앗, 응응아아아…… 읏……!!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「あ、あ、あ……！\u3000あっ、んぁっ、んんんんんんんん──────<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아, 아, 아……! 앗, 응아앗, 응응응응응응응응──────<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺も、ソフィアも、がむしゃらに快楽をむさぼっては昇りつめていき、そして──"
translation = "나도, 소피아도, 필사적으로 쾌락을 탐하며 절정에 올라갔고, 그리고──"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ぁっ──んああああぁぁああぁあぁあぁあぁあああぁぁあぁぁぁ～～～～～～っっっっっ………………！！！」"
translation = "「앗── 응아아아아아아아아아아아아아아아아아아아아아아아아아아아아～～～～～～읏………………!!!」"

[[dialogue]]
speaker = "unk"
original = "目の前がチカチカするほどの悦びが爆ぜる。"
translation = "앞이 번쩍거릴 정도의 희열이 터진다."

[[dialogue]]
speaker = "unk"
original = "遠くなりそうな意識を必死で保ち、襲いくる熾烈な快楽に悶えた。"
translation = "멀어질 것 같은 의식을 필사적으로 붙잡으며, 덮쳐오는 치열한 쾌감에 몸부림쳤다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「～～～～～～っっっっっっ…………！！\u3000ぁっ、はぁっ、んぁぁっ──っ……<emoji=heart04>\u3000ふぅっ、ふぅっ……<emoji=heart04>\u3000～～～～っ…………<emoji=heart04>」"
translation = "「～～～～～～읏…………!! 앗, 하앗, 응아아앗── 읏……<emoji=heart04> 후우, 후우……<emoji=heart04> ～～～～읏…………<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ひとしきりエクスタシーを味わったソフィアの体が、糸の切れたようにしなだれてくる──"
translation = "한바탕 엑스타시를 맛본 소피아의 몸이, 실 끊긴 인형처럼 늘어져 온다──"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ああっ、あ、あああ……ぁあああ、あ、ああ……んんぅぅぅうんっ……<emoji=heart04>\u3000んん、あ、ふぁあ……<emoji=heart04>」"
translation = "「아앗, 아, 아아아…… 아아아아, 아, 아아…… 응응으으으응읏……<emoji=heart04> 응응, 아, 하아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「はぁ、はぁっ……っ……もうっ……結局──んっ、私まで……ぁっ、いかされちゃいました……むぅっ……会長さんってば、おとなしくしてくれないんですから……<emoji=heart04>」"
translation = "「하아, 하앗…… 읏…… 정말…… 결국── 응, 저까지…… 앗, 가버리고 말았어요…… 무우…… 회장님도 참, 얌전히 있어 주시지 않으니까요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "絶頂の余韻に打ち震えながら、ソフィアはむすっとした顔を向けていた。"
translation = "절정의 여운에 몸을 떨며, 소피아는 뾰로통한 얼굴을 향하고 있었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「大人しくしていられないくらい、ソフィアが気持ちよくしてくれたからだよ」"
translation = "「얌전히 있을 수 없을 정도로, 소피아가 기분 좋게 해줬으니까 그렇지」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「むぅ──そういうことなら……って、騙されませんよ……<emoji=heart04>\u3000聞き分けのない子は、いけません……」"
translation = "「무우── 그런 거라면…… 아니, 속지 않아요……<emoji=heart04> 말 안 듣는 아이는, 안 돼요……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「でも……確かに……お互いが動いた時のほうが……すごかった、ですよね……<emoji=heart04>\u3000あのまま溶けちゃうんじゃないかってくらい……っ……<emoji=heart04>」"
translation = "「하지만…… 확실히…… 서로 움직였을 때가…… 더 굉장했, 지요……<emoji=heart04> 이대로 녹아버리는 게 아닐까 싶을 정도로…… 읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ソフィアは、今に達したオーガズムを思い出したのか、再び俺の上で肢体を震わせた。"
translation = "소피아는, 방금 도달한 오르가슴을 떠올렸는지, 다시 내 위에서 사지를 떨었다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「じゃあ、また──２人で動いたら……今のと同じくらい……気持ちよくなれちゃうって、ことでしょうか……？」"
translation = "「그럼, 또── 둘이서 움직이면…… 지금이랑 비슷할 정도로…… 기분 좋아질 수 있다는, 걸까요……?」"

[[dialogue]]
speaker = "unk"
original = "きっとそうだろう、と頷く。"
translation = "분명 그럴 거라고, 고개를 끄덕인다."

[[dialogue]]
speaker = "unk"
original = "ソフィアは、期待と怯えが混ざったふうな表情を浮かべた。"
translation = "소피아는, 기대와 두려움이 섞인 듯한 표정을 지었다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「もしかして私たち……深い沼に踏み入れてしまったのではないでしょうか……？」"
translation = "「혹시 저희…… 깊은 늪에 발을 들여버린 게 아닐까요……?」"

[[dialogue]]
speaker = "unk"
original = "快感という名の沼に、俺もソフィアも沈んでいく──"
translation = "쾌감이라는 이름의 늪에, 나도 소피아도 가라앉아 간다──"

[[dialogue]]
speaker = "unk"
original = "それもそれで悪くないと思う１日なのだった。"
translation = "그것도 그것대로 나쁘지 않다고 생각하는 하루였다."

