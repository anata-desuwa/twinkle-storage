[[dialogue]]
speaker = "unk"
original = "第１１話,平行世界との戦争,B"
translation = "제11화, 평행세계와의 전쟁, B"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「今さらだけど、アタシたちの星徒会室。バカみたいに広いよな」"
translation = "「이제 와서 하는 말이지만, 우리 성도회실. 바보같이 넓네」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「だよね。もっと小さくしようってお願いしてたんだけど」"
translation = "「그치. 좀 더 작게 해달라고 부탁했었는데」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「デネブの救世主、ルヴィが使うお部屋ですから。こじんまりしてたら格好がつかないって、建築家の方が仰ってました！」"
translation = "「데네브의 구세주, 루비 님이 쓰시는 방이니까요. 아담하면 모양새가 안 난다고 건축가분이 말씀하셨어요!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「これでもかなり口出ししたのよ？\u3000会長と副会長は、特別に個室も造ろうだなんて話もあったくらい」"
translation = "「이래 봬도 꽤 참견한 거야. 회장과 부회장은 특별히 개인실도 만들자는 이야기까지 있었을 정도니까」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「そ、そんなのいらないよ～……ありがとルヴィ、断ってくれて」"
translation = "「그, 그런 건 필요 없어~…… 고마워 루비, 거절해줘서」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「それでルヴィ、話って何かしら？」"
translation = "「그래서 루비, 이야기는 뭐야?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……平行世界の話よ。あなたたちには、何度も伝えてきたと思うけれど」"
translation = "「……평행세계 이야기야. 당신들에게는 몇 번이나 전해왔다고 생각하지만」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「私たちが住むのがデネブ。すでに滅んでしまって、今はない世界がベガ。そして──」"
translation = "「우리가 사는 곳이 데네브. 이미 멸망해버려서 지금은 없는 세계가 베가. 그리고──」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「あの裏切り者が逃げた先が、アルタイル。よーく覚えてるよ」"
translation = "「그 배신자가 도망친 곳이 알타이르. 아주 잘 기억하고 있어」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「…………緋宮、クロト」"
translation = "「…………히노미야, 쿠로토」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「先日、女神様から新たな言葉を賜ったわ。とてもよくないニュースよ」"
translation = "「얼마 전, 여신님으로부터 새로운 말씀을 하사받았어. 아주 좋지 않은 뉴스야」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「女神様が仰るには、いま世界は非常に危うい状況にある」"
translation = "「여신님 말씀으로는, 지금 세계는 매우 위태로운 상황에 처해 있다고 해」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「本来、『近似世界』は２つや３つに別れて、長期間に渡って存在するはずはない」"
translation = "「본래 『근사 세계』는 두세 개로 나뉘어 장기간에 걸쳐 존재할 수는 없어」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「きんじ、世界……？」"
translation = "「근사, 세계……?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「理論上、平行世界そのものは無限に存在するとされているわ。もはや異世界と言っても過言ではないほど、似ても似つかない『遠い世界』は存在する」"
translation = "「이론상 평행세계 그 자체는 무한히 존재한다고 여겨져. 이미 이세계라고 해도 과언이 아닐 정도로, 닮은 구석이라곤 없는 『먼 세계』는 존재하지」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「でも、デネブ・アルタイル・ベガの３つは、そうした無数に存在する平行世界とは性質が異なっているの。同じ世界から分岐した、根を同じにする『近似世界』」"
translation = "「하지만 데네브·알타이르·베가 이 세 곳은 그렇게 무수히 존재하는 평행세계와는 성질이 달라. 같은 세계에서 분기된, 뿌리를 같이 하는 『근사 세계』야」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「女神様は宇宙そのものを管理されているわけだけど、現在、私たちの宇宙には『複数の可能性』が重なり合うようにして存在している」"
translation = "「여신님께서는 우주 그 자체를 관리하고 계시지만, 현재 우리 우주에는 『복수의 가능성』이 겹쳐지듯 존재하고 있어」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ベガはもうないけれど、デネブとアルタイルという２つの可能性は、依然として並列に存在している。これはとてつもないイレギュラーということよ」"
translation = "「베가는 이제 없지만, 데네브와 알타이르라는 두 가능성은 여전히 병렬로 존재하고 있지. 이건 엄청난 이레귤러라는 뜻이야」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「１つの宇宙に、『<ruby>可能性の幹<rt>せかい</rt></ruby>』は１つでなければならない。本来あり得ない枝分かれをしてしまった世界は、どちらかが滅ばなくては存続できない……」"
translation = "「하나의 우주에, 『<ruby>가능성의 줄기<rt>세계</rt></ruby>』는 하나여야만 해. 본래 있을 수 없는 가지치기를 해버린 세계는, 어느 한쪽이 멸망하지 않으면 존속할 수 없어……」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「その影響として、デネブでリクリエを退けると、それだけアルタイルでアステラの活動が活発になるらしいの」"
translation = "「그 영향으로, 데네브에서 리크리에를 물리치면 그만큼 알타이르에서 아스테라의 활동이 활발해진다고 해」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「え……そ、それって……」"
translation = "「에…… 그, 그건……」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「デネブの私たちが戦うたびに、平行世界アルタイルの戦況は悪くなるということ」"
translation = "「데네브의 우리가 싸울 때마다, 평행세계 알타이르의 전황은 악화된다는 뜻이야」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「逆を言えば、アルタイルの星騎士たちがリクリエを退けると、それだけデネブにリクリエが近づく」"
translation = "「반대로 말하면, 알타이르의 성기사들이 리크리에를 물리치면 그만큼 데네브에 리크리에가 가까워져」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「……ええと。そうやってバランスを取ってて、いつか世界は１つだけになりたがってるってことで……合ってるか？」"
translation = "「……어라. 그렇게 균형을 맞추다가, 언젠가 세계는 하나만 남고 싶어 한다는 거네…… 맞나?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ええ。私たちは平行世界間において、知らないうちに生存をかけた戦争をしていた──ということよ」"
translation = "「응. 우리는 평행세계 사이에서, 모르는 사이에 생존을 건 전쟁을 하고 있었다──는 거야」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「う、嘘……？\u3000私たちが戦えば戦うほど、アルタイルの人達が、く、苦しい状況になってたってこと……？」"
translation = "「거, 거짓말……? 우리가 싸우면 싸울수록, 알타이르 사람들이, 괴, 괴로운 상황에 처했다는 거야……?」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「ベアトは相変わらず人がいいのね。いいじゃない。裏切り者が逃げ出した先なんて、別にどうなっても」"
translation = "「베아토는 여전히 사람이 좋네. 상관없잖아. 배신자가 도망친 곳 따위, 어떻게 되든」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「そ、そんな風に割り切れないよ！\u3000ルヴィ、本当なの？\u3000本当に女神様はそう仰ったの……！？」"
translation = "「그, 그렇게 딱 잘라 말할 수 없어! 루비, 정말이야? 정말로 여신님이 그렇게 말씀하신 거야……!?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ええ。『近似世界』は１つ以上存在してはならない。すでにベガは滅びた。続いてアルタイルとデネブ、どちらかが滅ばなければ……」"
translation = "「응. 『근사 세계』는 하나 이상 존재해서는 안 돼. 이미 베가는 멸망했어. 이어서 알타이르와 데네브, 둘 중 하나가 멸망하지 않으면……」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「世界はどうなるかわからない──そうお聞きしたわ」"
translation = "「세계가 어떻게 될지 모른다── 그렇게 들었어」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「今、女神様に平行世界を渡るための方法を模索してもらっているわ。いつかアルタイルに、私たちが乗り込むために」"
translation = "「지금 여신님께 평행세계를 건너기 위한 방법을 모색해달라고 하고 있어. 언젠가 알타이르에 우리가 쳐들어 가기 위해서」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「そ、そんなっ！？」"
translation = "「그, 그럴 수가!?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……極星学園は明日、開校する。私は星徒会長として演説をすることになっているわ」"
translation = "「……극성학원은 내일 개교해. 나는 성도회장으로서 연설을 하게 되어 있어」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「そこでこの世界の秘密を、デネブの人達に伝えようと思う。みんなで一丸となって戦わないと、アルタイルには──いいえ」"
translation = "「거기서 이 세계의 비밀을 데네브 사람들에게 전하려고 해. 다 함께 하나가 되어 싸우지 않으면, 알타이르에는── 아니」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「緋宮クロトには勝てないわ」"
translation = "「히노미야 쿠로토에게는 이길 수 없어」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「デネブの人達に伝える前に、まずはあなたたちに伝えたかったの。私とずっと一緒にいた、この５人の足並みをそろえておきたくて」"
translation = "「데네브 사람들에게 전하기 전에, 우선 당신들에게 전하고 싶었어. 나와 계속 함께해온 이 다섯 명의 발맞춤을 맞춰두고 싶어서」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「……そーゆーことか」"
translation = "「……그렇게 된 건가」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ま、待ってよルヴィ。私、誰かを守るためならいくらでも戦えるよ？\u3000でもっ……そんな、同じ星騎士同士で争いだなんて……！」"
translation = "「기, 기다려 루비. 나, 누군가를 지키기 위해서라면 얼마든지 싸울 수 있어. 하지만…… 그런, 같은 성기사끼리 다투다니……!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「他の方法はないの！？\u3000だってアルタイルにも、デネブと同じように普通の人達がいっぱい暮らしてるんでしょ……？」"
translation = "「다른 방법은 없는 거야!? 알타이르에도 데네브처럼 평범한 사람들이 잔뜩 살고 있을 거 아냐……?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ええ、その通りよ」"
translation = "「응, 맞아」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「……アルタイルを滅ぼさなければ、デネブが滅ぶ。それが正しいことなら、私たちは……アルタイルの住人にとってリクリエそのものではないですか」"
translation = "「……알타이르를 멸망시키지 않으면 데네브가 멸망한다. 그것이 옳은 일이라면, 우리는…… 알타이르 주민들에게 있어서 리크리에 그 자체가 아닌가요」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……そういう見方もできるわね」"
translation = "「……그런 시각으로도 볼 수 있겠네」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「グレイスは面白い考えをするのね。優しい子」"
translation = "「그레이스는 재미있는 생각을 하네. 착한 아이」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「──ねえルヴィ、私は何をすればいいかしら？\u3000何でも命じてちょうだい？」"
translation = "「──있지 루비, 나는 뭘 하면 될까? 뭐든 명해줘」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「レティシアちゃん……！？」"
translation = "「레티시아짱……!?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「アタシもやる。ルヴィが女神様から賜ったお言葉だ……そうしなきゃ、どうしようもないんだろ？\u3000だったら、やる」"
translation = "「나도 하겠어. 루비가 여신님께 하사받은 말씀이다…… 그렇게 하지 않으면 어쩔 수 없는 거잖아? 그렇다면 하겠어」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「それにアルタイルは、あの裏切り者もいるんだ。ちょうどいい。父さんと母さんの無念も、まとめて晴らしてやる……！」"
translation = "「게다가 알타이르에는 그 배신자도 있어. 마침 잘됐네. 아버지와 어머니의 원한도 한꺼번에 풀어주겠어……!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「待って、ダメ！\u3000そんなのダメだよチナちゃん！\u3000平行世界ってことは……む、向こうにもチナちゃんのお父さんたちがいるかもしれないんだよ！？」"
translation = "「기다려, 안 돼! 그러면 안 돼 치나짱! 평행세계라는 건…… 저, 저쪽에도 치나짱의 부모님이 계실지도 모른단 말이야!?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「そう……なのか、ルヴィ？」"
translation = "「그래…… 그런 거야, 루비?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「時の進みが同じかはわからない。細かなズレが大きな違いを生むこともあるわ」"
translation = "「시간의 흐름이 같을지는 모르겠어. 미세한 어긋남이 큰 차이를 낳기도 하니까」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「デネブでは起きたことが、アルタイルでは起きていないこともあるでしょう……でも可能性は否定できない」"
translation = "「데네브에서 일어난 일이 알타이르에서는 일어나지 않았을 수도 있겠지…… 하지만 가능성을 부정할 수는 없어」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「チナのご両親も……グレイスのご両親も存命である可能性は、大いにあるでしょう」"
translation = "「치나의 부모님도…… 그레이스의 부모님도 살아계실 가능성은 충분히 있겠지」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「──っ！」"
translation = "「──윽!」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「お父さんたちが……生きてる、かもしれない……？」"
translation = "「아버지가…… 살아계실지도, 모른다고요……?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ほ、ほらっ。冷静になって、もう１回考えてみよう？\u3000女神様にお願いしたら、もっと違う解決策だって……！」"
translation = "「보, 봐봐. 진정하고 다시 한번 생각해보자? 여신님께 부탁드리면 더 다른 해결책이라도……!」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「ベアト。ルヴィを困らせてはダメよ」"
translation = "「베아토. 루비를 곤란하게 하면 안 돼」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「そんな方法があったら、私たちへ教える前に確認してるはずでしょう。ルヴィの頭の良さは、あなたが一番よく知ってるはずだわ」"
translation = "「그런 방법이 있었다면 우리에게 가르쳐주기 전에 확인했을 거야. 루비의 명석함은 네가 제일 잘 알고 있잖아」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「それは……でも……」"
translation = "「그건…… 하지만……」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「私はやるわ。もしもチナたちが気乗りしないようであれば、全部私がやればいいだけのこと」"
translation = "「나는 하겠어. 만약 치나 일행이 내키지 않는다면 전부 내가 하면 그만이야」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「この５人とデネブが守れるなら、平行世界なんていくらでも滅ぼしてあげる。だからルヴィ。して欲しいことがあったら何でも言ってね」"
translation = "「이 다섯 명과 데네브를 지킬 수 있다면 평행세계 따위 얼마든지 멸망시켜 줄게. 그러니까 루비. 하고 싶은 일이 있으면 뭐든 말해줘」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「私は反対だよ……絶対に嫌！\u3000何か方法はあるはずだもん……！」"
translation = "「나는 반대야…… 절대 싫어! 분명 방법이 있을 거야……!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「２人の反応は予想どおりね……チナ、グレイス。あなたたちは？」"
translation = "「두 사람의 반응은 예상대로네…… 치나, 그레이스. 당신들은?」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「……すみません。少し時間をください」"
translation = "「……죄송합니다. 조금 시간을 주세요」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「……アタシも」"
translation = "「……나도」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「わかったわ。それじゃあ、今日はこれで解散しましょう。開校前日に嫌なことを伝えてしまって、ごめんなさい」"
translation = "「알았어. 그럼 오늘은 이만 해산하자. 개교 전날에 좋지 않은 이야기를 전해서 미안해」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「参りましたねチナ。ルヴィもベアトもレティシアも、天涯孤独の身ですが……」"
translation = "「난처하게 되었네요, 치나. 루비도 베아토도 레티시아도 천애고독의 몸이지만……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「アルタイルでは、アタシらの両親は生きてる……かもしれない」"
translation = "「알타이르에서는 우리 부모님이 살아계실……지도 몰라」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「それだけじゃないですよ。友達だっているかも。新星学園も、流星学園も滅びていないかもしれません」"
translation = "「그뿐만이 아니에요. 친구도 있을지도. 신성학원도 유성학원도 멸망하지 않았을지도 모릅니다」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「あっちの世界じゃ、あの『仮面の女』を倒したって？\u3000そんなわけないだろ」"
translation = "「저쪽 세계에선 그 『가면의 여자』를 쓰러뜨렸다고? 그럴 리가 없잖아」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「観測できない以上、どうなっているかはわかりません。ですが……」"
translation = "「관측할 수 없는 이상 어떻게 되었는지는 알 수 없습니다. 하지만……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ああ。女神様とルヴィが言う以上、正しいんだろ。デネブのためにアルタイルを滅ぼす以外に……」"
translation = "「아아. 여신님과 루비가 말하는 이상 사실이겠지. 데네브를 위해 알타이르를 멸망시키는 것 외에……」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「私たちが生き延びる方法はないのでしょうね。……だったら、やるしかありません」"
translation = "「우리가 살아남을 방법은 없겠죠. ……그렇다면 할 수밖에 없습니다」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「……ああ」"
translation = "「……아아」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「なぁグレイス。やるしかないなら……覚悟を決めるぞ」"
translation = "「있지 그레이스. 할 수밖에 없다면…… 각오를 다지자」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ルヴィとレティシアだけになんて、やらせねえ。世界を滅ぼす汚れ役を、親友に任せて自分だけ逃げるだなんて、アタシにはできない」"
translation = "「루비와 레티시아에게만 시키지는 않겠어. 세계를 멸망시키는 악역을 절친에게 맡기고 나만 도망치는 짓 따위, 난 못 해」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ルヴィだって辛いはずだ。あいつは優しいやつだよ。罪もない人達を簡単に切り捨てられるようなやつじゃない」"
translation = "「루비도 괴로울 거야. 그 녀석은 다정한 녀석이라고. 죄 없는 사람들을 쉽게 저버릴 수 있는 녀석이 아니야」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「はい。私たちはルヴィの献身を、ずっとこの目で見てきました……きっとルヴィにとっても苦渋の決断でしょう」"
translation = "「네. 우리는 루비의 헌신을 계속 지켜봐 왔습니다…… 분명 루비에게도 고뇌에 찬 결단이겠죠」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「私の考えは、どちらかというとベアト寄りです。何か方法があるなら探したい。そのためにベアトに協力したいとも思っています」"
translation = "「제 생각은 어느 쪽인가 하면 베아토 쪽에 가깝습니다. 뭔가 방법이 있다면 찾고 싶어요. 그걸 위해 베아토를 돕고 싶다고도 생각하고 있습니다」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ああ、お前も納得するまで自分の意見をぶつけろよ」"
translation = "「아아, 너도 납득할 때까지 네 의견을 부딪쳐봐」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「はい。でも……ほかに手段はない。どうにもならないってわかったら、その時は──」"
translation = "「네. 하지만…… 달리 수단이 없다. 어쩔 도리가 없다는 걸 알게 되면 그때는──」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「アルタイルを滅ぼします。ルヴィだけにはやらせません。泥をかぶるなら、一緒にです」"
translation = "「알타이르를 멸망시키겠습니다. 루비에게만 시키지 않겠어요. 진흙탕을 뒤집어쓴다면 함께입니다」"

[[dialogue]]
speaker = "unk"
original = "──翌日。ルヴィネの就任演説の前に、チナたちは考えを伝えた。"
translation = "──다음 날. 루비네의 취임 연설 전에 치나 일행은 생각을 전했다."

[[dialogue]]
speaker = "unk"
original = "どうにもならない時は、デネブのためにアルタイルを滅ぼす──その答えに、ルヴィネは目を伏して、頭を下げて礼を言ったのだった。"
translation = "어쩔 수 없을 때는 데네브를 위해 알타이르를 멸망시킨다── 그 대답에 루비네는 눈을 내리깔고 고개를 숙여 감사를 표했다."

