[[dialogue]]
speaker = "unk"
original = "幾度目かの世界崩壊の窮地を食い止め、守護天使オオヒメの解放に成功してからしばらく──今日は大晦日。"
translation = "몇 번인가의 세계 붕괴 위기를 막아내고, 수호천사 오오히메의 해방에 성공한 지 얼마 후── 오늘은 섣달그믐날."

[[dialogue]]
speaker = "unk"
original = "作戦に参加した星騎士たちは、当主のヘレナさんに呼び出され、九浄家に集っていた。"
translation = "작전에 참가했던 성기사들은 당주인 헬레나 씨의 부름을 받고 쿠죠 가문에 모여 있었다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「どうしたの、ヘレナちゃん？\u3000みんなにお年玉でも配ってくれるの？」"
translation = "「무슨 일이야, 헬레나 짱? 모두에게 세뱃돈이라도 뿌려주는 거야?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「残念ながら、お年玉は新年が明けてからだ。此度の用件は別である」"
translation = "「안타깝게도 세뱃돈은 새해가 밝은 뒤다. 이번 용건은 따로 있다.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「先日の魔界への遠征、ご苦労であった。改めて皆には礼を述べよう。世界を救ってくれて感謝する」"
translation = "「지난번 마계 원정, 고생 많았다. 다시 한번 모두에게 감사를 표하마. 세계를 구해주어 고맙다.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「そして、今日は皆に会わせたい者がいる。さ、ビクビクしていないで入るがよい」"
translation = "「그리고 오늘은 모두에게 소개하고 싶은 자가 있다. 자, 겁먹지 말고 들어오너라.」"

[[dialogue]]
speaker = "オオヒメ"
original = "「し、失礼する……」"
translation = "「시, 실례하마……」"

[[dialogue]]
speaker = "ソフィア"
original = "「もしかして……オオヒメさんですか……！？」"
translation = "「설마…… 오오히메 씨인가요……!?」"

[[dialogue]]
speaker = "オオヒメ"
original = "「いかにも……守護天使《天恵》のオオヒメだ。他の守護天使たちと同様、アニマ殿の義体により肉体を得た」"
translation = "「그렇다…… 수호천사 《천혜》의 오오히메다. 다른 수호천사들과 마찬가지로 아니마 공의 의체를 통해 육신을 얻었다.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「解放に尽力してくれた皆に、直々の謝罪と礼を告げたいとのことでな。こうやって集まってもらったというわけだ」"
translation = "「해방에 힘써준 모두에게 직접 사죄와 감사를 전하고 싶다더군. 그래서 이렇게 모인 것이다.」"

[[dialogue]]
speaker = "オオヒメ"
original = "「本当に……本当に、この度はお騒がせした。合わせる顔もないのだが恥を忍び、この場を借りて、皆の前で謝罪をしたい」"
translation = "「정말로…… 정말로 이번에는 소란을 피워 미안하다. 볼 낯이 없으나 염치를 불구하고 이 자리를 빌려 모두 앞에서 사죄하고 싶다.」"

[[dialogue]]
speaker = "オオヒメ"
original = "「申し訳、ございませんでしたーーーっ！」"
translation = "「죄송했습니다아아아아앗!」"

[[dialogue]]
speaker = "unk"
original = "守護天使様が土下座なさったー！"
translation = "「수호천사 님이 도게자를 하셨어!」"

[[dialogue]]
speaker = "舞亜"
original = "「お手本にしたくなるような清々しい土下座だね」"
translation = "「본보기로 삼고 싶을 정도로 청량한 도게자네♥」"

[[dialogue]]
speaker = "ソフィア"
original = "「土下座をお手本にする機会なんて、ないに越したことないですけどね」"
translation = "「도게자를 본보기로 삼을 기회는 없는 게 제일 좋지만요.」"

[[dialogue]]
speaker = "オオヒメ"
original = "「すまない……本当にすまない……謝ったところで許されるはずもないが……」"
translation = "「미안하다…… 정말 미안하다…… 사과한다고 해서 용서받을 수 있을 리 없겠지만……」"

[[dialogue]]
speaker = "オオヒメ"
original = "「煮るなり焼くなり好きにしてくれて構わない。この身にできることならば、どのような処罰でも辱めでも受けよう……」"
translation = "「삶든 굽든 마음대로 해도 상관없다. 이 몸이 할 수 있는 일이라면 어떤 처벌이든 치욕이든 달게 받겠다……」"

[[dialogue]]
speaker = "フィオナ"
original = "「オオヒメ様って、わりと打たれ弱い方なんですね……？」"
translation = "「오오히메 님은 의외로 멘탈이 약하신 분이었군요……?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「とまぁ、謝罪の一点張りでな。皆の者、彼女の処遇を如何にする？」"
translation = "「뭐, 이렇게 사죄만 고집하고 있다네. 여러분, 그녀의 처우를 어떻게 하겠나?」"

[[dialogue]]
speaker = "舞亜"
original = "「どうすると言われても……ねえ？」"
translation = "「어떻게 하냐니…… 그치?♥」"

[[dialogue]]
speaker = "ウズメイア"
original = "「うんうん、みんなの気持ちはおんなじだよね～」"
translation = "「응응, 다들 마음은 똑같다구~」"

[[dialogue]]
speaker = "unk"
original = "顔を上げてください"
translation = "「고개를 들어주세요.」"

[[dialogue]]
speaker = "オオヒメ"
original = "「う、うむ……処遇は決まっただろうか。石抱でも、島流しでも、キツめの折檻でも耐えてみせよう……」"
translation = "「으, 음…… 처우는 결정되었는가. 돌 안기든, 귀양보내기든, 지독한 매질이든 견뎌내 보마……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「拷問なんてしないわよ！\u3000オオヒメはこれから私たちの仲間！\u3000いい？」"
translation = "「고문 같은 거 안 한다니까! 오오히메는 이제부터 우리의 동료! 알았지?」"

[[dialogue]]
speaker = "オオヒメ"
original = "「は……？\u3000今、なんと……？\u3000私を許すというのか……！？」"
translation = "「하……? 지금 뭐라고……? 나를 용서한다는 것인가……!?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「許すも、許さないも……ね～？\u3000過ぎたことだし～？」"
translation = "「용서고 자시고…… 그치~? 지난 일이고 말이야~?」"

[[dialogue]]
speaker = "トリシャ"
original = "「結果何事もなく、無事解決しましたし……皆の絆も育まれました……。私の占いの精度も……研ぎ澄まされたように思えます……」"
translation = "「결과적으로 아무 일 없이 무사히 해결되었고…… 모두의 유대도 깊어졌습니다…… 제 점괘의 정밀도도…… 더 날카로워진 것 같고요……」"

[[dialogue]]
speaker = "舞亜"
original = "「私もオオヒメさんのおかげで、私の演技にも磨きがかかったし。引退するのはもうちょっと先伸ばしになったかな」"
translation = "「나도 오오히메 씨 덕분에 내 연기가 더 다듬어졌고. 은퇴하는 건 좀 더 뒤로 미루게 됐나 봐♥」"

[[dialogue]]
speaker = "ソフィア"
original = "「そのせいで、私のライバルがより強大な存在になってしまったのは複雑ですが……オオヒメさんが仲間になるのはいいことです」"
translation = "「그 때문에 제 라이벌이 더 강력한 존재가 되어버린 건 복잡한 기분이지만…… 오오히메 씨가 동료가 되는 건 좋은 일이에요.」"

[[dialogue]]
speaker = "オオヒメ"
original = "「い、いいのか？\u3000本当に？\u3000私の引きこもりで、世界が崩壊する寸前だったのだぞ……？」"
translation = "「정, 정말 괜찮은 건가? 정말로? 내가 틀어박힌 탓에 세계가 붕괴할 뻔했는데……?」"

[[dialogue]]
speaker = "unk"
original = "世界の窮地は何度もあったので"
translation = "「세계의 위기는 몇 번이나 있었으니까요.」"

[[dialogue]]
speaker = "フィオナ"
original = "「あはは……そう言ってしまうと、私たち、とんでもないことの繰り返しですね」"
translation = "「아하하…… 그렇게 말하니 저희, 엄청난 일을 반복하고 있네요.」"

[[dialogue]]
speaker = "舞亜"
original = "「じゃ、これにて一件落着、めでたしめでたしだね」"
translation = "「자, 이걸로 사건 해결, 메데타시 메데타시네♥」"

[[dialogue]]
speaker = "ヘレナ"
original = "「皆にわざわざ足を運んでもらったのは、これだけではない。このまま年越しと行こうではないか」"
translation = "「모두가 일부러 발걸음을 해준 것은 이것뿐만이 아니다. 이대로 해넘이를 하도록 하지 않겠나.」"

[[dialogue]]
speaker = "蘭美"
original = "「年越しそばも用意しているわ。みんなも食べていきなさい」"
translation = "「토시코시 소바도 준비했어요. 다들 먹고 가세요.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「もっと馳走を用意させようかと思ったが、それは新年にとっておくことにした。年越しならばこれだろう」"
translation = "「더 진수성찬을 준비할까 했지만, 그건 신년으로 아껴두기로 했다. 해넘이라면 역시 이것이지.」"

[[dialogue]]
speaker = "フィオナ"
original = "「ありがとうございます。ふふ、大晦日には欠かせませんね」"
translation = "「감사합니다. 후후, 섣달그믐날에 빠질 수 없죠.」"

[[dialogue]]
speaker = "フィオナ"
original = "「緋宮会長、今年１年大変お世話になりました。また来年もよろしくお願いしますね」"
translation = "「히노미야 회장님, 올 한 해 정말 신세 많이 졌습니다. 내년에도 잘 부탁드려요.」"

[[dialogue]]
speaker = "舞亜"
original = "「私も。いろいろありがとね、会長さん。来年の私の活躍にも期待してて」"
translation = "「나도. 여러모로 고마워, 회장님. 내년의 내 활약도 기대해 줘♥」"

[[dialogue]]
speaker = "unk"
original = "こちらこそ、来年もよろしく"
translation = "「나야말로, 내년에도 잘 부탁해.」"

[[dialogue]]
speaker = "トリシャ"
original = "「友達と年越し……死ぬまでにやっておきたいことのひとつ……友達のおかげで、叶ってしまいました……にへへ」"
translation = "「친구와 해넘이…… 죽기 전에 해보고 싶었던 일 중 하나…… 친구 덕분에 이루어졌습니다…… 니헤헤.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「除夜の鐘が始まったわね！\u3000新年を迎えるまで、もうちょっとよ。いくつになってもこの瞬間はワクワクするわ！」"
translation = "「제야의 종소리가 시작됐네! 새해를 맞이하기까지 조금 남았어. 몇 살이 되어도 이 순간은 설렌다니까!」"

[[dialogue]]
speaker = "ソフィア"
original = "「ふぁあぁぁ……むにゃ……もうこんな時間……眠いわけです……」"
translation = "「후아아아…… 으냐…… 벌써 이런 시간…… 졸릴 만도 하네요……」"

[[dialogue]]
speaker = "舞亜"
original = "「ソフィ、眠いんじゃない？」"
translation = "「소피, 졸린 거 아냐?♥」"

[[dialogue]]
speaker = "ソフィア"
original = "「ね、眠くなんてないから……！\u3000子ども扱い、しない、で……」"
translation = "「조, 졸리지 않으니까……! 애 취급, 하지, 마……」"

[[dialogue]]
speaker = "舞亜"
original = "「年が明けたら起こすからねー」"
translation = "「해 바뀌면 깨워줄게~♥」"

[[dialogue]]
speaker = "ソフィア"
original = "「って普通に起こして！\u3000明けたら意味ないから！」"
translation = "「아니 그냥 깨워달라고! 해 바뀌고 깨우면 의미 없잖아!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「あはは、ツッコミで起きたし！」"
translation = "「아하하, 츳코미 하느라 깼네!」"

[[dialogue]]
speaker = "unk"
original = "やがて除夜の鐘も１０７回まで鳴り終わり、年の切り替わる瞬間が差し迫った。"
translation = "이윽고 제야의 종도 107번까지 다 울리고, 해가 바뀌는 순간이 코앞으로 다가왔다."

[[dialogue]]
speaker = "unk"
original = "１０秒前だ！"
translation = "「10초 전이야!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それじゃ、みんなー！\u3000カウントダウンよ！」"
translation = "「그럼 다들~! 카운트다운이야!」"

[[dialogue]]
speaker = "ソフィア"
original = "「５っ！」"
translation = "「5!」"

[[dialogue]]
speaker = "トリシャ"
original = "「よ、４……！」"
translation = "「사, 4……!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「さーん！」"
translation = "「3!」"

[[dialogue]]
speaker = "舞亜"
original = "「にーぃ」"
translation = "「2이♥」"

[[dialogue]]
speaker = "フィオナ"
original = "「１っ！」"
translation = "「1!」"

[[dialogue]]
speaker = "みんな"
original = "「あけまして、おめでとうございまーす！」"
translation = "「새해 복 많이 받으세요~!」"

[[dialogue]]
speaker = "unk"
original = "年が明けると同時、最後の１０８回目の鐘が鳴る。"
translation = "해가 바뀜과 동시에 마지막 108번째 종소리가 울린다."

[[dialogue]]
speaker = "unk"
original = "新たな年は、例年以上に賑々しく幕を開けた。"
translation = "새로운 해는 평년 이상으로 떠들썩하게 막을 열었다."

[[dialogue]]
speaker = "unk"
original = "今年も良い年でありますように。"
translation = "「올해도 좋은 해가 되기를.」"

