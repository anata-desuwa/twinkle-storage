[[dialogue]]
speaker = "unk"
original = "第１話,娯楽を体験しよう～遊園地デート編～,P"
translation = "제1화, 오락을 체험하자 ~유원지 데이트 편~, P"

[[dialogue]]
speaker = "unk"
original = "セナリィと恋愛パートナー契約を結んでしばらく経った、とある休日──"
translation = "세너리와 연애 파트너 계약을 맺고 얼마간의 시간이 흐른 어느 휴일──"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「なるほど、これが遊園地……。広い園内にアトラクションの数々。道行く人は誰もかれも浮かれてばかり」"
translation = "「과연, 이것이 유원지……. 넓은 원내에 수많은 어트랙션. 길을 가는 사람들은 너나 할 것 없이 들떠 있군요」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「まさか悪の総帥である私が遊園地デートをすることになるだなんて思いませんでしたわ」"
translation = "「설마 악의 총수인 제가 유원지 데이트를 하게 될 줄은 생각도 못 했습니다わ」"

[[dialogue]]
speaker = "unk"
original = "遊園地に行ったことがないって聞いたから"
translation = "유원지에 가본 적이 없다고 들었으니까"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ええ。幼少の頃から、武器商人の元で生きてきた私です」"
translation = "「예. 어린 시절부터 무기 상인의 밑에서 살아온 저입니다」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「いわゆる普通の女性が経験するようなことは、未経験なことがほとんど。それは否定しませんわ」"
translation = "「이른바 평범한 여성이 경험하는 일들은 미경험인 것이 대부분. 그것은 부정하지 않겠어요」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「けれど本当に大丈夫でしょうか……？\u3000戦場で数え切れないほど命のやり取りをし、この世の酸いも甘いも知り尽くしている私ですわよ？」"
translation = "「하지만 정말 괜찮을까요……? 전장에서 셀 수 없을 정도로 목숨을 주고받으며, 이 세상의 산전수전을 다 겪은 저라고요?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「期待されているリアクションは、できないかもしれません。私がはしゃがなければ、誘った会長様も面白くないのではありませんか？」"
translation = "「기대하시는 리액션은 하지 못할지도 모릅니다. 제가 즐거워하지 않으면, 권유하신 회장님도 재미없지 않겠어요?」"

[[dialogue]]
speaker = "unk"
original = "バッチリ楽しませてみせるよ"
translation = "확실히 즐겁게 해줄게"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「あら……ふふふっ♪\u3000では会長様のエスコート、期待していますわ」"
translation = "「어머…… 후후후♪ 그럼 회장님의 에스코트, 기대하고 있겠어요」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「裏世界を股にかける私、バンデット・セナリィを満足させるアトラクションがあるかどうかは甚だ疑問ですが……」"
translation = "「뒷세계를 주름잡는 저, 밴디트 세너리를 만족시킬 어트랙션이 있을지는 심히 의문입니다만……」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「せっかくの恋人とのお出かけですし、羽を伸ばすことにいたしましょう♪」"
translation = "「모처럼 연인과의 외출이니, 기분 전환을 하도록 하죠♪」"

[[dialogue]]
speaker = "unk"
original = "まず、遊園地の目玉であるジェットコースターに誘ってみた結果──"
translation = "우선, 유원지의 꽃인 제트 코스터로 유인해 본 결과──"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「すっげ～迫力でしたわッ！\u3000何ですのあのコースター！\u3000座るのではなく立ったまま固定して、背面走行だなんて予想外ですわ～！」"
translation = "「엄청난 박력이었습니다わ! 뭡니까 저 코스터! 앉는 게 아니라 선 채로 고정해서 후면 주행이라니 예상 밖이에요~!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「直立したまま全身で風を受けつつ、背面走行ゆえにどのような動きになるかもわからない……スリルとサプライズがタップリで……！」"
translation = "「직립한 채 온몸으로 바람을 맞으며, 후면 주행이라 어떤 움직임이 될지도 알 수 없는…… 스릴과 서프라이즈가 가득해서……!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「後半を過ぎたあたりからの４連続ループ……クセになりそうなほどの刺激がありましたわ。ああ、まだ足元がフワフワする……！」"
translation = "「후반을 지날 무렵부터의 4연속 루프…… 버릇이 될 정도의 자극이 있었습니다わ. 아아, 아직 발밑이 둥실둥실해……!」"

[[dialogue]]
speaker = "unk"
original = "楽しんでくれてよかった"
translation = "즐거워해 주니 다행이야"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「──ファっ！？\u3000い、いえいえ。ちょっぴり新鮮な刺激だっただけで……ふふん。ま、まぁまぁでしたわ！\u3000よいチョイスでしたわよ！」"
translation = "「──화앗!? 아, 아니아니요. 조금 신선한 자극이었을 뿐이지…… 흐흥. 뭐, 뭐어뭐어했습니다わ! 좋은 초이스였어요!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「それで次はどこに……え？\u3000お化け屋敷に行く？\u3000まぁ……それは構いませんが」"
translation = "「그래서 다음은 어디로…… 에? 귀신의 집으로 간다고요? 뭐…… 그건 상관없습니다만」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ジェットコースターと違って、オバケの被り物をしたスタッフが驚かせてくるだけでしょう？」"
translation = "「제트 코스터와 달리 귀신 탈을 쓴 스태프가 놀라게 할 뿐이겠죠?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「私、五感は鋭いですから。スタッフが近づけば気配ですぐにわかってしまいます。流石に楽しめないと思いますが……あら？」"
translation = "「저, 오감은 날카로우니까요. 스태프가 다가오면 기척으로 금방 알아버립니다. 역시 즐기기는 어렵다고 생각합니다만…… 어라?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「へぇ……入場する時、手首にバンドを付けて心拍数を計測する仕組みですって？\u3000なるほど。どれほどビビったのかが可視化されるわけですわね」"
translation = "「헤에…… 입장할 때 손목에 밴드를 차고 심박수를 측정하는 시스템이라고요? 과연. 얼마나 겁을 먹었는지 가시화되는 셈이군요」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「では、心拍数が高かった方が昼食を奢るというのはいかがです？\u3000ちょっとしたゲームですわ！」"
translation = "「그럼 심박수가 더 높았던 쪽이 점심을 사는 건 어때요? 가벼운 게임입니다わ!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「──受けていただけるんですね？\u3000では事前に宣言させてもらいましょう。ランチご馳走様ですわ、会長様！！」"
translation = "「──받아들여 주시는 거군요? 그럼 미리 선언하도록 하죠. 런치 잘 먹겠습니다, 회장님!!」"

[[dialogue]]
speaker = "unk"
original = "受付で渡された心拍測定器を着け、お化け屋敷を踏破した結果──"
translation = "접수처에서 받은 심박 측정기를 착용하고 귀신의 집을 답파한 결과──"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「やややややっ──やっべぇですわ～！？\u3000あのお化け屋敷、尋常じゃないクオリティなんですがっ！？」"
translation = "「야야야야얏── 야배배입니다わ~!? 저 귀신의 집, 심상치 않은 퀄리티인데요!?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「実際にあった廃病院を改築して、リアリティを極限まで高めたって……看板に偽り無しではないですか！\u3000普通にチビりそうでしたわ！？」"
translation = "「실제로 있었던 폐병원을 개축해서 리얼리티를 극한까지 높였다니…… 간판에 거짓이 없지 않습니까! 평범하게 지릴 뻔했다고요!?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「しかも！\u3000あの驚かせてきたスタッフ、気配がありませんでした！\u3000私の五感で捉えられないだなんて！？」"
translation = "「게다가! 저 놀라게 한 스태프, 기척이 없었습니다! 제 오감으로 포착할 수 없다니!?」"

[[dialogue]]
speaker = "unk"
original = "彼女、ステルス能力を持ってるからね"
translation = "그녀, 스텔스 능력을 갖추고 있으니까"

[[dialogue]]
speaker = "unk"
original = "俺の友人の星騎士がバイトしてるんだ"
translation = "내 친구인 성기사가 아르바이트하고 있어"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「あんまりじゃありません！？\u3000油断していたところへ不意打ちされて、めちゃくちゃ叫んじゃいましたわよ！？」"
translation = "「너무하지 않나요!? 방심하고 있던 차에 기습당해서 엄청나게 비명을 질러버렸잖아요!?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「そして心拍数が……ああ！」"
translation = "「그리고 심박수가…… 아아!」"

[[dialogue]]
speaker = "unk"
original = "セナリィ、お昼ご飯よろしく！"
translation = "세너리, 점심 밥 잘 부탁해!"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「うぐぅ！\u3000しかし負けは負けっ……！\u3000悪の総帥に二言はありませんわ。レストランへ参りましょう！」"
translation = "「우그으! 하지만 패배는 패배……! 악의 총수에게 두말은 없습니다わ. 레스토랑으로 가죠!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「えぇぇえ！？\u3000オムライスが３０００テルス！？\u3000ステーキセットは５０００テルス！？」"
translation = "「에에에에!? 오므라이스가 3000텔스!? 스테이크 세트는 5000텔스!?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「何ですのこれ、ダイヤでも入ってますの……！？\u3000これが世に聞く遊園地価格！？」"
translation = "「뭡니까 이건, 다이아라도 들어있나요……!? 이것이 세상에 말로만 듣던 유원지 가격!?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「でも約束を反故にはできません。す、好きなものをお頼みなさい！」"
translation = "「하지만 약속을 어길 수는 없죠. 조, 좋아하는 걸로 시키세요!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「──ってぇ！？\u3000ちょっと、ステーキにドリンクにデザートまで！？\u3000容赦なさすぎですわっ！？」"
translation = "「──라니!? 잠깐, 스테이크에 음료에 디저트까지!? 너무 가차 없잖아요!?」"

[[dialogue]]
speaker = "unk"
original = "こうして賑やかな遊園地デートは陽が傾くまで続いて……"
translation = "이렇게 시끌벅적한 유원지 데이트는 해가 저물 때까지 계속되어……"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「会長様……訂正いたしますわ」"
translation = "「회장님…… 정정하겠습니다わ」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「頭で考えていた以上に、実際に体験する遊園地はとても素敵でした」"
translation = "「머리로 생각했던 것 이상으로, 실제로 체험하는 유원지는 무척 멋졌어요」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「傭兵稼業や星騎士の学園生活だけでは体験できない、新鮮なスリルと興奮がありましたし……」"
translation = "「용병 가업이나 성기사의 학원 생활만으로는 체험할 수 없는 신선한 스릴과 흥분이 있었고……」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「想い人の貴方と一緒にめぐると、遊園地ってこんなにも素敵な場所だったのですね……」"
translation = "「연모하는 당신과 함께 둘러보니, 유원지란 이렇게나 멋진 장소였군요……」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「よろしければまたお誘いいただけます？\u3000今日みたいに私の知らない、普通の学生が経験する娯楽……もっと教えていただきたいですわ」"
translation = "「괜찮으시다면 다시 권유해 주시겠어요? 오늘처럼 제가 모르는, 평범한 학생이 경험하는 오락…… 좀 더 가르쳐 주셨으면 합니다わ」"

[[dialogue]]
speaker = "unk"
original = "もちろんだよ"
translation = "물론이지"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「あ……ふふ♪\u3000会長様ったら……<emoji=heart04>\u3000ええ、私もキスしたいですわ……<emoji=heart04>」"
translation = "「아…… 후후♪ 회장님도 참……<emoji=heart04> 네, 저도 키스하고 싶어요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ん──ちゅっ<emoji=heart04>」"
translation = "「응── 츄웁<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "始めこそ渋っていたセナリィだったが、楽しんでもらえたようで何よりだ。"
translation = "처음에는 내켜 하지 않던 세너리였지만, 즐거워해 준 것 같아 다행이다."

[[dialogue]]
speaker = "unk"
original = "傭兵という特殊な出自の彼女に、これからも色々なことを経験してもらいたいなと思う俺なのだった──"
translation = "용병이라는 특수한 출신인 그녀가 앞으로도 여러 가지를 경험했으면 좋겠다고 생각하는 나였다──"

