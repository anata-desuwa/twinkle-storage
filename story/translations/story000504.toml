[[dialogue]]
speaker = "フィオナ"
original = "「ルリエルーっ。いるなら返事をしてくださーいっ」"
translation = "「루리엘ー. 있다면 대답해 주세ー요」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「この辺りにはいないみたいね……」"
translation = "「이 근처에는 없는 것 같네……」"

[[dialogue]]
speaker = "マグダレナ"
original = "「具体的な位置まで絞り込めれば良かったのですが……」"
translation = "「구체적인 위치까지 좁힐 수 있었다면 좋았을 텐데……」"

[[dialogue]]
speaker = "聖沙"
original = "「天使の羽根と輪っかを付けた小柄な女の子よね？\u3000近くを回ってみたけど、見当たらなかったわ……」"
translation = "「천사의 날개와 링을 단 작은 여자애 맞지? 근처를 돌아봤지만, 보이지 않았어……」"

[[dialogue]]
speaker = "リア"
original = "「となると中心街の方にいるのかな。てっきりフィーニスの塔の近くにいるかと思ったんだけど」"
translation = "「그렇다면 중심가 쪽에 있는 걸까. 당연히 피니스 탑 근처에 있을 거라고 생각했는데」"

[[dialogue]]
speaker = "unk"
original = "町の方へ行ってみようか"
translation = "마을 쪽으로 가볼까"

[[dialogue]]
speaker = "リア"
original = "「だね。ちょうどお昼時だし、もしかしたら何か食べに行ってるのかも」"
translation = "「그러게. 마침 점심시간이고, 어쩌면 뭐라도 먹으러 갔을지도」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「異世界に迷い込んでおいて能天気な……いえ。あの子なら有り得るのかしら……」"
translation = "「이세계에 길을 잃고 들어와서 태평한…… 아니. 그 아이라면 그럴 수도 있는 걸까……」"

[[dialogue]]
speaker = "フィオナ"
original = "「良くも悪くも素直でマイペースな子なので……あはは」"
translation = "「좋든 나쁘든 솔직하고 마이페이스인 아이라서…… 아하하」"

[[dialogue]]
speaker = "聖沙"
original = "「なら決まりね。私たちも何か食べましょ。腹が減っては戦もできないわ」"
translation = "「그럼 결정이네. 우리도 뭐라도 먹자. 배가 고파서는 싸움도 할 수 없어」"

[[dialogue]]
speaker = "リア"
original = "「じゃあ夕霧庵に行こっか♪\u3000ナナカちゃん──うちの生徒会の会計さんのご実家がソバ屋さんなの♪」"
translation = "「그럼 유우기리안에 갈까♪ 나나카짱── 우리 학생회 회계 씨의 본가가 소바 가게거든♪」"

[[dialogue]]
speaker = "マグダレナ"
original = "「これがおソバ、ですか……」"
translation = "「이것이 소바, 인가요……」"

[[dialogue]]
speaker = "リア"
original = "「なんだか不思議だね。守護天使様とこうして並んでご飯を食べているなんて」"
translation = "「왠지 신기하네. 수호 천사님과 이렇게 나란히 밥을 먹고 있다니」"

[[dialogue]]
speaker = "マグダレナ"
original = "「マグダレナで構いませんよ。皆さまからもそうお呼びいただいていますから」"
translation = "「막달레나로 괜찮습니다. 여러분께서도 그렇게 불러주고 계시니까요」"

[[dialogue]]
speaker = "聖沙"
original = "「さて、会長さん。おソバ屋さんに来たからにはもうわかってるわよね？」"
translation = "「자, 회장 씨. 소바 가게에 왔으니 이제 알고 있겠지?」"

[[dialogue]]
speaker = "unk"
original = "まさか"
translation = "설마"

[[dialogue]]
speaker = "聖沙"
original = "「ふふ、そのまさかよ。言ったでしょ、腹が減っては戦もできないって」"
translation = "「후후, 그 설마야. 말했잖아, 배가 고파서는 싸움도 할 수 없다고」"

[[dialogue]]
speaker = "聖沙"
original = "「ルリエルさん探しに備えるためにも──勝負よ！\u3000どちらがより多くのソバを平らげることができるか競おうじゃない！」"
translation = "「루리엘 씨 찾기에 대비하기 위해서도── 승부야! 누가 더 많은 소바를 해치울 수 있는지 겨뤄보자고!」"

[[dialogue]]
speaker = "聖沙"
original = "「ぐ、ぐぬぬ。お腹が、もう……！」"
translation = "「크, 크으으. 배가, 벌써……!」"

[[dialogue]]
speaker = "unk"
original = "俺もお腹いっぱいだ"
translation = "나도 배불러"

[[dialogue]]
speaker = "聖沙"
original = "「そ、そう。ならこの勝負は引き分けね。あなたも中々良い食べっぷりだったじゃない」"
translation = "「그, 그래. 그럼 이 승부는 무승부네. 너도 꽤 잘 먹던데」"

[[dialogue]]
speaker = "聖沙"
original = "「にしても本当にルリエルさんはこの世界に来ているのかしら。天使が町を歩いていたら大騒ぎになりそうなものだけど……」"
translation = "「그나저나 정말로 루리엘 씨는 이 세계에 와 있는 걸까. 천사가 마을을 걷고 있다면 난리가 날 것 같은데……」"

[[dialogue]]
speaker = "リア"
original = "「確かにそうだよね。私も未だにマグダレナさんの姿が気になっちゃうし」"
translation = "「확실히 그렇네. 나도 아직까지 막달레나 씨의 모습이 신경 쓰이고」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そんなものなの？\u3000流星市国じゃ天使も魔族も人間も普通に暮らしてるから、よくわからないわ」"
translation = "「그런 건가? 유성 시국에선 천사도 마족도 인간도 평범하게 살고 있으니까, 잘 모르겠어」"

[[dialogue]]
speaker = "フィオナ"
original = "「そう考えると奇妙ですね。マグダレナ様を見かけるだけでも騒ぎになりそうなものですが」"
translation = "「그렇게 생각하니 이상하네요. 막달레나 님을 보기만 해도 소란이 일어날 것 같은데요」"

[[dialogue]]
speaker = "リア"
original = "「あ、言われてみればそうだね。どうしてだろう？」"
translation = "「아, 듣고 보니 그렇네. 왜일까?」"

[[dialogue]]
speaker = "マグダレナ"
original = "「それも境界の乱れによるものでしょう。何かしらの理由でリクリエの持つ世界を改変する力が働いてしまっているのかもしれません」"
translation = "「그것도 경계의 혼란으로 인한 것이겠죠. 어떤 이유로든 리크리에가 가진 세계를 개변하는 힘이 작용하고 있을지도 모릅니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そう言われると恐ろしくなってくるわね……。あまりこの世界に留まり続けるのは危険かもしれないわ」"
translation = "「그렇게 말하니 무서워지네……. 너무 이 세계에 계속 머무르는 건 위험할지도 모르겠어」"

[[dialogue]]
speaker = "フィオナ"
original = "「一刻も早くルリエルを見つけて、元の世界に戻るべきですね」"
translation = "「한시라도 빨리 루리엘을 찾아서, 원래 세계로 돌아가야겠네요」"

[[dialogue]]
speaker = "聖沙"
original = "「そうと決まれば、みんなおかわりよ！\u3000たっぷり食べて、エネルギーを補給しなくっちゃ！」"
translation = "「그렇게 결정됐으면, 다들 추가 주문이야! 잔뜩 먹고, 에너지를 보급해야지!」"

[[dialogue]]
speaker = "？？？"
original = "「ガツガツガツ！！\u3000モグモグモグ！！」"
translation = "「우걱우걱우걱!! 냠냠냠!!」"

[[dialogue]]
speaker = "聖沙"
original = "「わ……隣の人、ものすごい勢いね。負けていられないわ」"
translation = "「와…… 옆 사람, 엄청난 기세네. 질 수 없어」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「しかしなんとまぁ品のない食べ方を……」"
translation = "「하지만 정말이지 품위 없는 식사 방식이네요……」"

[[dialogue]]
speaker = "フィオナ"
original = "「もし我が校に在籍していたら、礼儀作法から教育しているところです」"
translation = "「만약 우리 학교에 재적하고 있었다면, 예의범절부터 교육하고 있을 겁니다」"

[[dialogue]]
speaker = "ルリエル"
original = "「ズズズズぅ──ぷっはぁ～！！\u3000大満足れふぅ～……」"
translation = "「후루루루룩── 푸하아～!! 대만족이예후～……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「えっ！？」"
translation = "「엣!?」"

[[dialogue]]
speaker = "フィオナ"
original = "「へっ！？」"
translation = "「헷!?」"

[[dialogue]]
speaker = "unk"
original = "ルリエル！？"
translation = "루리엘!?"

[[dialogue]]
speaker = "ヴィーナス"
original = "「無事だったのね！\u3000探したのよ！」"
translation = "「무사했구나! 찾았다고!」"

[[dialogue]]
speaker = "フィオナ"
original = "「元気そうで安心しましたが……コホン、後でお話があります」"
translation = "「건강해 보여서 안심했지만…… 콜록, 나중에 할 이야기가 있습니다」"

[[dialogue]]
speaker = "ルリエル"
original = "「ええと……？\u3000どちら様ですか？」"
translation = "「에에또……? 누구신가요?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「はぁ？\u3000何を言ってるのよ」"
translation = "「하아? 무슨 소리 하는 거야」"

[[dialogue]]
speaker = "フィオナ"
original = "「言い訳は無用ですよ。お箸の持ち方からみっちり教えますからね？」"
translation = "「변명은 필요 없습니다. 젓가락 잡는 법부터 꼼꼼하게 가르쳐 드릴 테니까요?」"

[[dialogue]]
speaker = "ルリエル"
original = "「ほえぇ……？」"
translation = "「호에에……?」"

[[dialogue]]
speaker = "unk"
original = "まさか本当にわからないのか？"
translation = "설마 정말로 모르는 건가?"

[[dialogue]]
speaker = "ルリエル"
original = "「わからないも何も、あなた方とは初対面ですし……」"
translation = "「모른다니 뭐라니, 당신들과는 초면이고요……」"

[[dialogue]]
speaker = "聖沙"
original = "「ええと……どういうこと？」"
translation = "「에에또…… 무슨 뜻이야?」"

[[dialogue]]
speaker = "リア"
original = "「彼女がルリエルさんじゃないの？」"
translation = "「그녀가 루리엘 씨가 아니야?」"

[[dialogue]]
speaker = "ルリエル"
original = "「あっ──副会長さんに先輩さんっ！」"
translation = "「앗── 부회장 씨랑 선배 씨!」"

[[dialogue]]
speaker = "聖沙"
original = "「えっ、私たちのこと！？\u3000あなたはあちらの世界の星徒会役員なんじゃ……」"
translation = "「엣, 우리 말이야!? 당신은 저쪽 세계의 성도회 임원이잖아……」"

[[dialogue]]
speaker = "ルリエル"
original = "「ややっ！？\u3000どーしてそんな寂しいこと言うんですかぁ！？\u3000同じ生徒会の仲間ですよね！？」"
translation = "「야얏!? 왜 그런 섭섭한 말을 하는 거예요!? 같은 학생회 동료잖아요!?」"

[[dialogue]]
speaker = "リア"
original = "「わたしたちはあなたとは初対面のはずだけど……」"
translation = "「우리는 당신과는 초면일 텐데……」"

[[dialogue]]
speaker = "ルリエル"
original = "「なななな、なんと、先輩さんまで！？\u3000このルリエル・ローゼンクロイツを忘れたとでも言うんですかぁ～！？」"
translation = "「나나나나, 뭐어, 선배 씨까지!? 이 루리엘 로젠크로이츠를 잊었다고라도 말하는 거예요～!?」"

[[dialogue]]
speaker = "聖沙"
original = "「ローゼンクロイツって、それはロロットさんの……」"
translation = "「로젠크로이츠라니, 그건 로롯토 씨의……」"

[[dialogue]]
speaker = "リア"
original = "「そう言えばロロットちゃんは？\u3000最近、姿を見ていないけど……」"
translation = "「그러고 보니 로롯토짱은? 요즘, 모습을 못 봤는데……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「一体何が起こってるの？\u3000ルリエルったら、まるでちぐはぐだわ……」"
translation = "「대체 무슨 일이 벌어지고 있는 거야? 루리엘은, 완전히 앞뒤가 안 맞잖아……」"

[[dialogue]]
speaker = "フィオナ"
original = "「ええ。私たちのことは忘れてしまっているのに、聖沙さんやリアさんのことは本当の先輩のように慕っていて……」"
translation = "「네. 저희는 잊어버렸는데, 미사 씨나 리아 씨는 정말 선배처럼 따르고 있고……」"

[[dialogue]]
speaker = "マグダレナ"
original = "「やはり、この気配は……」"
translation = "「역시, 이 기운은……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「どうしたのマグダレナ？」"
translation = "「왜 그래 막달레나?」"

[[dialogue]]
speaker = "マグダレナ"
original = "「彼女の気配が妙だとは思っていたのです。しかし直接会って……確信しました」"
translation = "「그녀의 기운이 이상하다고는 생각했습니다. 하지만 직접 만나서…… 확신했습니다」"

[[dialogue]]
speaker = "マグダレナ"
original = "「この気配は、リクリエです。彼女の中にリクリエの気配が混じっています」"
translation = "「이 기운은, 리크리에입니다. 그녀 안에 리크리에의 기운이 섞여 있습니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「リクリエ、の？」"
translation = "「리크리에, 의?」"

[[dialogue]]
speaker = "マグダレナ"
original = "「詳しいことはわかりません。ただ事実として、彼女を中心に世界の認識が改変されています」"
translation = "「자세한 것은 알 수 없습니다. 다만 사실로서, 그녀를 중심으로 세계의 인식이 개변되고 있습니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それじゃこの世界の住人が私たちの姿を見て大騒ぎしなかったのも……。ルリエルがリアさんたちの後輩面をするのも……」"
translation = "「그럼 이 세계 주민들이 우리 모습을 보고 난리를 피우지 않았던 것도……. 루리엘이 리아 씨들의 후배 행세를 하는 것도……」"

[[dialogue]]
speaker = "マグダレナ"
original = "「彼女の仕業でしょう。まだリアさま方には作用していない様子ですが……」"
translation = "「그녀의 소행이겠죠. 아직 리아 님들께는 작용하고 있지 않은 듯합니다만……」"

[[dialogue]]
speaker = "フィオナ"
original = "「その言い方だと、時間が経てばリアさんたちもルリエルを後輩だと認識するように聞こえますが」"
translation = "「그렇게 말씀하시면, 시간이 지나면 리아 씨들도 루리엘을 후배라고 인식하게 될 것처럼 들리는데요」"

[[dialogue]]
speaker = "マグダレナ"
original = "「可能性はあります。それどころか──」"
translation = "「가능성은 있습니다. 그뿐만 아니라──」"

[[dialogue]]
speaker = "unk"
original = "……俺たちも？"
translation = "……우리들도?"

[[dialogue]]
speaker = "マグダレナ"
original = "「はい……何かしら認識を改変されかねません」"
translation = "「네…… 어떤 식으로든 인식이 개변될 수 있습니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そんな馬鹿な……と言いたいところだけど、マグダレナの言葉だものね」"
translation = "「말도 안 돼…… 라고 하고 싶지만, 막달레나의 말이니」"

[[dialogue]]
speaker = "フィオナ"
original = "「ええ、早急に解決しなければ……。リクリエに化かされたとあっては、我ら流星クルセイダースの名が泣きます」"
translation = "「네, 조속히 해결해야 합니다……. 리크리에에게 속았다고 한다면, 우리 유성 크루세이더스의 이름이 울겠네요」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そうね。私たち、流星クルセイダースの威信にかけて、ルリエルを正気に戻すわよ！」"
translation = "「그렇지. 우리, 유성 크루세이더스의 위신을 걸고, 루리엘을 제정신으로 되돌릴 거야!」"

[[dialogue]]
speaker = "unk"
original = "ああ。俺たち、流星クルセイダースの──って"
translation = "아아. 우리, 유성 크루세이더스의── 라고"

[[dialogue]]
speaker = "フィオナ"
original = "「ハっ！\u3000私いま、自分を流星クルセイダースの一員だと思い込んでしまっていて……！」"
translation = "「핫! 나 지금, 나 자신을 유성 크루세이더스의 일원이라고 착각하고 있었고……!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私もよ……！\u3000どうして、そんな勘違いを……」"
translation = "「나도야……! 어째서, 그런 착각을……」"

[[dialogue]]
speaker = "マグダレナ"
original = "「これは……想像以上に危うい状況ですね。ルリエルさまに近づき過ぎました」"
translation = "「이것은…… 상상 이상으로 위험한 상황이네요. 루리엘 님께 너무 가까이 다가갔습니다」"

[[dialogue]]
speaker = "マグダレナ"
original = "「急いでこの場を離れましょう。早くしないと私たちまで、この世界の住人に──」"
translation = "「서둘러 이 자리를 떠납시다. 빨리 하지 않으면 우리까지, 이 세계의 주민으로──」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ダ、ダメ。もう遅い、かも……。急に、眠気が……」"
translation = "「아, 안 돼. 이미 늦었을, 지도……. 갑자기, 졸음이……」"

[[dialogue]]
speaker = "フィオナ"
original = "「睡魔に抗え……ません……。食後にすぐ寝るのは、身体に良くありません、のに……」"
translation = "「수마에 저항할…… 수 없습니다……. 식후에 바로 자는 것은, 몸에 좋지 않습니다, 만……」"

[[dialogue]]
speaker = "マグダレナ"
original = "「いけません、皆さま……。意識を、強く……保つの、です……」"
translation = "「안 됩니다, 여러분……. 의식을, 강하게…… 유지하는, 거예요……」"

[[dialogue]]
speaker = "unk"
original = "っっ……"
translation = "크읏……"

