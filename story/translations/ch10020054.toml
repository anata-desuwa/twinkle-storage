[[dialogue]]
speaker = "unk"
original = "第４話,お姉ちゃんと癒されたい,P"
translation = "제4화, 누나와 힐링하고 싶어"

[[dialogue]]
speaker = "unk"
original = "その日、俺はトレーニング施設で長い時間訓練した後、星徒会室に戻ってきていた。"
translation = "그날 나는 트레이닝 시설에서 오랜 시간 훈련한 후 성도회실로 돌아와 있었다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あらっ、会長くん、おかえりなさ～い♪」"
translation = "「어머, 회장군, 어서 와~♪」"

[[dialogue]]
speaker = "unk"
original = "星徒会室に入ると明かりが点いており、遅い時間にも関わらず、サーシャさんが１人で待っていた。"
translation = "성도회실에 들어가니 불이 켜져 있었고, 늦은 시간임에도 불구하고 사샤 씨가 혼자 기다리고 있었다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「会長くん、フラフラでお疲れの顔をしているわ。大丈夫？」"
translation = "「회장군, 비틀비틀하며 피곤한 얼굴을 하고 있네. 괜찮아?」"

[[dialogue]]
speaker = "unk"
original = "新しい力の制御がなかなか上手く行かなくて"
translation = "새로운 힘의 제어가 좀처럼 잘 되지 않아서"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そう、それでずっと頑張ってたのね。よしよし♪」"
translation = "「그래, 그래서 계속 노력했구나. 착하다 착해♪」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ねぇ、会長くん、もうみんな帰っちゃったし、２人きりの時ぐらい、お姉ちゃんに甘えていいのよ？」"
translation = "「있지, 회장군, 이제 다들 돌아갔으니까 둘이 있을 때만큼은 누나한테 어리광 부려도 된다구?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「――ふふっ、違うでしょ、会長くん？\u3000サーシャさんじゃなくて、お姉ちゃんに甘えたい時は、なんて言うんだっけ？」"
translation = "「──후후, 아니지, 회장군? 사샤 씨가 아니라 누나한테 어리광 부리고 싶을 때는 뭐라고 말하더라?」"

[[dialogue]]
speaker = "unk"
original = "お、お姉ちゃん……"
translation = "누, 누나……"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「は～い<emoji=heart04>\u3000よくできました<emoji=heart04>」"
translation = "「네~<emoji=heart04> 참 잘했어요<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「じゃあ……会長くんが大好きなパフパフ、してあげるわね<emoji=heart04>」"
translation = "「그럼…… 회장군이 제일 좋아하는 파후파후, 해줄게<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ソファーへ移動し、サーシャさんが先に腰かける。その横に、向かい合う形で腰を下ろすと――"
translation = "소파로 이동하여 사샤 씨가 먼저 자리에 앉는다. 그 옆에 마주 보는 형태로 자리를 잡자──"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「会長くん、今日も１日お疲れ様<emoji=heart04>\u3000ぎゅぅ～っ<emoji=heart04>」"
translation = "「회장군, 오늘도 하루 수고했어<emoji=heart04> 꼬오옥~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "サーシャさんはちょっと露出した制服の胸元のネクタイを緩め、シャツのボタンを緩めると……"
translation = "사샤 씨는 살짝 노출된 제복 가슴팍의 넥타이를 풀고 셔츠 단추를 늦추더니……"

[[dialogue]]
speaker = "unk"
original = "俺の顔面をおっぱいで挟み込み、左右の乳房で顔をマッサージするように抱きかかえる。"
translation = "내 얼굴을 가슴 사이에 끼워 넣고 양쪽 유방으로 얼굴을 마사지하듯 껴안는다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「私が『お姉ちゃん』って呼ばれたいって趣味に付き合ってくれて、会長くん、本当に優しい<emoji=heart04>」"
translation = "「내가 『누나』라고 불리고 싶다는 취미에 어울려줘서 회장군, 정말 상냥해<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「恋人の好みに付き合ってくれる、優しい『弟くん』のこと、今日もたくさん癒してあげたいな～」"
translation = "「연인의 취향에 어울려주는 상냥한 『남동생 군』을 오늘도 잔뜩 힐링해주고 싶네~」"

[[dialogue]]
speaker = "unk"
original = "──別に、お姉ちゃんの趣味に付き合ってるだけじゃないよ、と俺は告げる。"
translation = "──딱히 누나의 취미에 어울려주는 것만은 아니야, 라고 나는 말한다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふふ♪\u3000ひょっとして会長くんの中でも、お姉ちゃんに甘えるの、気持ちよくなってきちゃった？」"
translation = "「후후후♪ 혹시 회장군도 누나한테 어리광 부리는 거 기분 좋아지기 시작했어?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「もしそうだったら、お姉ちゃんも嬉しい<emoji=heart04>」"
translation = "「만약 그렇다면 누나도 기뻐<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺がおっぱいの中でこくんと頷くと、サーシャさんは俺の頭を優しく撫でてきて……"
translation = "내가 가슴 속에서 끄덕이자 사샤 씨는 내 머리를 상냥하게 쓰다듬어 주며……"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そっか、そっか～<emoji=heart04>\u3000じゃあ私たち、すっごくお似合いのカップルってことね<emoji=heart04>\u3000うふふっ♪」"
translation = "「그렇구나, 그렇구나~<emoji=heart04> 그럼 우리 정말 잘 어울리는 커플이네<emoji=heart04> 우후훗♪」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あのね、このままパフパフしててもいいんだけど……お姉ちゃん、ちょっと勉強してきたことがあるの。試してみても、いい？」"
translation = "「저기 말이야, 이대로 파후파후하고 있어도 좋지만…… 누나, 조금 공부해온 게 있어. 시험해 봐도 될까?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「それじゃあ、会長くん。マッサージ行くわよ～<emoji=heart04>」"
translation = "「그러면 회장군. 마사지 들어간다~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺がソファーにうつ伏せで身を預けると、サーシャさんが腰の上にそっとまたがり、マッサージをしてくれることになった。"
translation = "내가 소파에 엎드려 몸을 맡기자 사샤 씨가 허리 위에 살짝 올라타 마사지를 해주기로 했다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あらあら、うふふっ<emoji=heart04>\u3000会長くん、可愛い声が出てるわよ？\u3000お姉ちゃんの手で触られて、気持ちよくなっちゃったのかしら～？」"
translation = "「어머어머, 우후훗<emoji=heart04> 회장군, 귀여운 소리가 나오고 있어? 누나 손길에 기분 좋아져 버린 걸까~?」"

[[dialogue]]
speaker = "unk"
original = "サーシャさんはちょっとふざけた調子で言っているが、本当に気持ちがいい。"
translation = "사샤 씨는 조금 장난스러운 어조로 말하고 있지만 정말 기분이 좋다."

[[dialogue]]
speaker = "unk"
original = "いやらしいスキンシップというわけではなく、本当に疲労回復が見込める、ちゃんとしたマッサージだった。"
translation = "야릇한 스킨십 같은 게 아니라 정말 피로 회복을 기대할 수 있는 제대로 된 마사지였다."

[[dialogue]]
speaker = "unk"
original = "かなり本格的だけど、一体どこで……？"
translation = "꽤 본격적인데 대체 어디서……?"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「実は、会長くんに喜んでほしくて、本を読んで勉強してみたの～」"
translation = "「사실 회장군이 기뻐해 줬으면 해서 책을 읽고 공부해 봤어~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「最近、会長くんが遅くまでトレーニングしてることがあるから、疲れが翌日まで残らないように、マッサージで癒せたらなって♪」"
translation = "「최근 회장군이 늦게까지 트레이닝할 때가 있으니까 피로가 다음 날까지 남지 않도록 마사지로 힐링해주고 싶어서♪」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「うふふ♪\u3000もちろん、大好きな会長くんの体を合法的に触りたい、っていう下心込みよ<emoji=heart04>」"
translation = "「우후후♪ 물론 좋아하는 회장군의 몸을 합법적으로 만지고 싶다는 흑심도 포함이야<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「疲れも取れて、イチャイチャもできるなんて、一石二鳥でしょう？」"
translation = "「피로도 풀리고 꽁냥거릴 수도 있다니 일석이조지?」"

[[dialogue]]
speaker = "unk"
original = "これ、後で俺にもやり方教えてください"
translation = "이거 나중에 저한테도 방법 가르쳐 주세요"

[[dialogue]]
speaker = "unk"
original = "気持ちよくて、本当に癒される……。"
translation = "기분 좋고 정말 힐링 된다……."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あら、どうして？」"
translation = "「어머, 왜?」"

[[dialogue]]
speaker = "unk"
original = "──今度、サーシャさんがお疲れの時は俺がやってあげたい、と伝えると、サーシャさんは嬉しそうに目を細める。"
translation = "──나중에 사샤 씨가 피곤할 때는 내가 해주고 싶다고 전하자 사샤 씨는 기쁜 듯 눈을 가늘게 뜬다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あらあら、うふふ♪\u3000すごく嬉しいわ<emoji=heart04>」"
translation = "「어머어머, 우후후♪ 정말 기뻐<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「疲労回復効果がありつつ、大好きな会長くんに体を隅々まで触ってもらえちゃうなんて……一石二鳥ね<emoji=heart04>」"
translation = "「피로 회복 효과가 있으면서 좋아하는 회장군이 몸 구석구석을 만져주다니…… 일석이조네<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "──それを言うなら俺だって、大好きなサーシャさんに合法的に触れて一石三鳥だ。そう伝えると……"
translation = "──그렇게 따지면 나도 좋아하는 사샤 씨를 합법적으로 만질 수 있어서 일석삼조다. 그렇게 전하자……"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あんっ<emoji=heart04>\u3000なんだかその台詞、すっごくキュンって来ちゃった<emoji=heart04>」"
translation = "「앙<emoji=heart04> 왠지 그 대사, 정말 심쿵해 버렸어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "サーシャさんは俺の背中に柔らかな胸を押し付けてきながら、耳元へ甘い声音でささやく。"
translation = "사샤 씨는 내 등에 부드러운 가슴을 밀착시키며 귓가에 달콤한 목소리로 속삭인다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ねぇ、会長くん……お姉ちゃん、キスしちゃってもいい？」"
translation = "「있지, 회장군…… 누나, 키스해도 돼?」"

[[dialogue]]
speaker = "unk"
original = "サーシャさんの言葉にうなずくよりも先に、俺はゆっくりと体を起こすと、腰に手を添えて視線を重ねた。"
translation = "사샤 씨의 말에 고개를 끄덕이기도 전에 나는 천천히 몸을 일으켜 허리에 손을 얹고 시선을 맞췄다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あっ……<emoji=heart04>\u3000会長くん……んっ<emoji=heart04>」"
translation = "「앗……<emoji=heart04> 회장군…… 응<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ちゅっ<emoji=heart04>\u3000はあぁ……<emoji=heart04>\u3000んちゅ<emoji=heart04>」"
translation = "「쪽<emoji=heart04> 하아……<emoji=heart04> 응츄<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふっ……お姉ちゃんがリードしたかったのに、先にキスされちゃったわ<emoji=heart04>」"
translation = "「후후…… 누나가 리드하고 싶었는데 먼저 키스당해 버렸네<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "なら今度は、お姉ちゃんからキスして下さい"
translation = "그럼 이번에는 누나가 키스해 주세요"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あらあら、本当に甘え上手になって、お姉ちゃん好みの彼氏さんになっちゃったわね<emoji=heart04>」"
translation = "「어머어머, 정말 어리광이 늘어서 누나 취향의 남자친구가 되어버렸네<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ちゅっ……<emoji=heart04>\u3000大好きよ、会長くん<emoji=heart04>」"
translation = "「쪽……<emoji=heart04> 사랑해, 회장군<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あっ……うふふっ<emoji=heart04>\u3000今度は前からマッサージ、する？」"
translation = "「앗…… 우후훗<emoji=heart04> 이번에는 앞에서 마사지해 줄까?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ほら、こことか、固くなってるわよ<emoji=heart04>\u3000お姉ちゃんが柔らかくなるまで、してあげるわね<emoji=heart04>」"
translation = "「봐봐, 여기라든가 딱딱해져 있어<emoji=heart04> 누나가 부드러워질 때까지 해줄게<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「んっ……ちゅっ<emoji=heart04>」"
translation = "「응…… 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "触れ合うぬくもりに時を忘れて、俺たちはただ、甘やかな夜に溶けていくのだった。"
translation = "맞닿은 온기에 시간을 잊고 우리들은 그저 달콤한 밤에 녹아들어 갔다."

