[[dialogue]]
speaker = "unk"
original = "第３話,何よその板は,P"
translation = "제3화, 뭐야 그 판때기는, P"

[[dialogue]]
speaker = "リィベル"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "リィベルがソファーに腰かけて漫画を読み耽っている。手にしているのは、もちろんこの前買った漫画だ。そのせいで服も変わっている。"
translation = "리벨이 소파에 걸터앉아 만화에 열중하고 있다. 손에 든 것은 물론 요전번에 산 만화다. 그 탓에 옷도 바뀌어 있다."

[[dialogue]]
speaker = "リィベル"
original = "「魔王。お茶、おかわり」"
translation = "「마왕. 차, 한 잔 더」"

[[dialogue]]
speaker = "unk"
original = "はい、どうぞ"
translation = "「네, 여기요.」"

[[dialogue]]
speaker = "リィベル"
original = "「ええ、ありがとう」"
translation = "「으응, 고마워.」"

[[dialogue]]
speaker = "unk"
original = "リィベルは俺に目もくれず、カップを受け取る。よほど集中しているようだ。"
translation = "리벨은 나에게 눈길도 주지 않고 컵을 받는다. 꽤나 집중하고 있는 모양이다."

[[dialogue]]
speaker = "リィベル"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "彼女の横で俺も漫画を読む。この静寂が心地いい。"
translation = "그녀의 옆에서 나도 만화를 읽는다. 이 정적이 기분 좋다."

[[dialogue]]
speaker = "リィベル"
original = "「……ふぅ。んん……ん…………」"
translation = "「……후우. 응으……음…………」"

[[dialogue]]
speaker = "unk"
original = "軽く伸びをして、首をひと回し。"
translation = "가볍게 기지개를 켜고, 목을 한 바퀴 돌린다."

[[dialogue]]
speaker = "リィベル"
original = "「どうしたの、私の顔に何かついてる？」"
translation = "「왜 그래, 내 얼굴에 뭐라도 묻었어?」"

[[dialogue]]
speaker = "unk"
original = "漫画版はどう？"
translation = "「만화판은 어때?」"

[[dialogue]]
speaker = "リィベル"
original = "「そうね……まず、原作で描写不足だった部分が補足されているわね。原作で唐突に出てきたキャラが事前に台詞で示唆されていたり、設定が整理されていたり、読みやすいわ」"
translation = "「글쎄…… 우선, 원작에서 묘사가 부족했던 부분이 보충되었네. 원작에서 돌연히 등장했던 캐릭터가 사전에 대사로 암시되어 있거나, 설정이 정리되어 있어서 읽기 편해.」"

[[dialogue]]
speaker = "リィベル"
original = "「次に、心理描写の掘り下げね。原作で敵対したキャラにも相応の理由が説明されて、作劇に立体感が生まれているわ。後で味方になる時も納得できたし」"
translation = "「다음으로, 심리 묘사의 심화네. 원작에서 적대했던 캐릭터에게도 그만한 이유가 설명되어서, 극의 전개에 입체감이 생겼어. 나중에 아군이 될 때도 납득할 수 있었고.」"

[[dialogue]]
speaker = "リィベル"
original = "「原作にない改変要素については、好みの別れるところかしら。あと、キャラがやたら筋肉質なのは人によっては受け付けないかも。私は慣れたけど」"
translation = "「원작에 없는 개변 요소에 대해서는 호불호가 갈릴지도 모르겠네. 그리고 캐릭터가 지나치게 근육질인 건 사람에 따라 거부감이 들 수도 있겠어. 나는 익숙해졌지만.」"

[[dialogue]]
speaker = "リィベル"
original = "「ああ、改変といえば食事の描写ね。原作ではほぼなかったけど、作者が食べ歩いて……取材しただけあって、漫画はかなり力が入っているわ。めちゃくちゃ美味しそう」"
translation = "「아아, 개변이라고 하면 식사 묘사네. 원작에서는 거의 없었지만, 작가가 맛집 탐방을 하며…… 취재한 보람이 있는지 만화는 꽤 힘이 들어가 있어. 엄청 맛있어 보여.」"

[[dialogue]]
speaker = "リィベル"
original = "「総じて、非常に丁寧な漫画化ね。人気が出るのも頷けるわ。単純に面白いし」"
translation = "「총평하자면, 굉장히 정중한 만화화네. 인기가 있는 것도 납득이 가. 단순하게 재미있고.」"

[[dialogue]]
speaker = "リィベル"
original = "「……というか、後から気付いたんだけど、これ漫画版から人気が出た作品でしょ。漫画を読んだ後に原作を読んだら、物足りないと思うわ」"
translation = "「……그나저나, 나중에 깨달은 건데 이거 만화판부터 인기가 생긴 작품이지. 만화를 읽은 뒤에 원작을 읽으면, 좀 허전하다고 생각할 거야.」"

[[dialogue]]
speaker = "リィベル"
original = "「今でも原作は面白いと思ってるし、好きだけど……薦めるなら漫画版ね。原作から入った身としては、なんというか、こう…………」"
translation = "「지금도 원작은 재미있다고 생각하고 좋아하지만…… 추천한다면 만화판이네. 원작부터 접한 입장으로서는, 뭐랄까, 음…………」"

[[dialogue]]
speaker = "unk"
original = "言葉が見つからないのか、ろくろを回すリィベル。気持ちは分かる。"
translation = "말이 떠오르지 않는지, 허공에 손을 휘저으며 고심하는 리벨. 기분은 이해한다."

[[dialogue]]
speaker = "リィベル"
original = "「複雑だわ」"
translation = "「복잡해.」"

[[dialogue]]
speaker = "unk"
original = "漫画版と原作の比較は置いておいて、しっかり楽しんでくれたようで何よりだ。一緒に買いに行ってよかった。"
translation = "만화판과 원작의 비교는 제쳐두고, 충분히 즐겨준 것 같아 다행이다. 같이 사러 가길 잘했다."

[[dialogue]]
speaker = "リィベル"
original = "「ところで、さっきからあなたが持っている板は何？」"
translation = "「그런데, 아까부터 당신이 들고 있는 판은 뭐야?」"

[[dialogue]]
speaker = "unk"
original = "これはタブレット端末だよ"
translation = "「이건 태블릿 단말기야.」"

[[dialogue]]
speaker = "リィベル"
original = "「ふぅん……大きなＤＩＳＣみたいなもの？\u3000そんな面倒なもの、よく使うわね」"
translation = "「흐응…… 커다란 DISC 같은 거야? 그런 번거로운 걸 잘도 쓰네.」"

[[dialogue]]
speaker = "unk"
original = "俺は面倒とは思わないけど、リィベルには機械の操作が難しいのかもしれない。ＤＩＳＣも持っているのは見たことがない。"
translation = "나는 번거롭다고 생각하지 않지만, 리벨에게는 기계 조작이 어려울지도 모른다. DISC도 가지고 있는 걸 본 적이 없다."

[[dialogue]]
speaker = "リィベル"
original = "「私のＤＩＳＣ？\u3000学園から支給されたのがあるけど、邪魔だから部屋に置いてあるわ。流星市国内ならモンスターが出ても感知できるし」"
translation = "「내 DISC? 학원에서 지급받은 게 있지만, 거추장스러워서 방에 뒀어. 유성시 국내라면 몬스터가 나타나도 감지할 수 있으니까.」"

[[dialogue]]
speaker = "unk"
original = "以前、リィベルが誰よりも早くモンスター退治に駆け付けていたけど、そうだったのか。"
translation = "이전에 리벨이 누구보다 빠르게 몬스터 퇴치에 달려왔었는데, 그랬던 건가."

[[dialogue]]
speaker = "リィベル"
original = "「それより、そのタブレットとやらで何を見ていたの？」"
translation = "「그보다, 그 태블릿인지 뭔지로 뭘 보고 있었어?」"

[[dialogue]]
speaker = "unk"
original = "リィベルが読んでたのと同じ漫画"
translation = "「리벨이 읽던 거랑 같은 만화.」"

[[dialogue]]
speaker = "リィベル"
original = "「は？\u3000その板で漫画が読めるってこと？」"
translation = "「하? 그 판으로 만화를 읽을 수 있다는 거야?」"

[[dialogue]]
speaker = "unk"
original = "リィベルが熱心に読んでいるので、俺も電子で読み始めていた。"
translation = "리벨이 열성적으로 읽고 있기에, 나도 전자책으로 읽기 시작했었다."

[[dialogue]]
speaker = "リィベル"
original = "「まさか、まさか…………小説もその板で読めるって言うんじゃないでしょうね……？」"
translation = "「설마, 설마………… 소설도 그 판으로 읽을 수 있다는 건 아니겠지……?」"

[[dialogue]]
speaker = "unk"
original = "もちろん読める"
translation = "「물론 읽을 수 있지.」"

[[dialogue]]
speaker = "リィベル"
original = "「はあ～～～～～～～～～～～～！？」"
translation = "「하아~~~~~~~~~~~~~~~~~~~~!?」"

[[dialogue]]
speaker = "リィベル"
original = "「平たいのにどうやってページをめくるの！？\u3000そもそもどうやってこの中に本が入ってるのよ！？」"
translation = "「평평한데 어떻게 페이지를 넘기는 거야!? 애초에 어떻게 이 안에 책이 들어있는 거냐고!?」"

[[dialogue]]
speaker = "unk"
original = "どうと言われても困るが、実際にやってみせる。"
translation = "어떻게냐고 물어도 곤란하지만, 실제로 해 보여준다."

[[dialogue]]
speaker = "リィベル"
original = "「指を滑らせて、次のページへ進む？\u3000たっぷもできる？\u3000そもそもそのたっぷってなんなのっ！？」"
translation = "「손가락을 미끄러뜨려서 다음 페이지로 넘어가? 태쁘도 할 수 있어? 애초에 그 태쁘라는 게 뭔데!」"

[[dialogue]]
speaker = "リィベル"
original = "「電子データだから、容量が足りなければ削除して後からだうんろーどもできる？\u3000だからだうんろーどって何！？」"
translation = "「전자 데이터니까 용량이 부족하면 삭제하고 나중에 다운로오드도 할 수 있다고? 그러니까 다운로오드가 뭐냐니까!」"

[[dialogue]]
speaker = "リィベル"
original = "「分からない……分からないわ……」"
translation = "「모르겠어…… 모르겠다고……」"

[[dialogue]]
speaker = "リィベル"
original = "「本には、厚みがあって、重さがあって、手触りがあって…………そこに『ある』もの」"
translation = "「책이란 건, 두께가 있고, 무게가 있고, 감촉이 있고………… 그곳에 『있는』 것이잖아.」"

[[dialogue]]
speaker = "リィベル"
original = "「生まれたばかりの本には初々しさがあって、時を経た本には歴史が刻まれている…………そういうものよ」"
translation = "「막 태어난 책에는 풋풋함이 있고, 시간이 흐른 책에는 역사가 새겨져 있는………… 그런 것이라고.」"

[[dialogue]]
speaker = "リィベル"
original = "「なのに、この板にも代わりができるっていうの？\u3000しかも後から入れたり消したりできる…………なんてことなの」"
translation = "「그런데 이 판때기가 대신할 수 있다는 거야? 게다가 나중에 넣었다 지웠다 할 수 있다니………… 말도 안 돼.」"

[[dialogue]]
speaker = "リィベル"
original = "「これは、その、なんというか…………」"
translation = "「이건, 그, 뭐랄까…………」"

[[dialogue]]
speaker = "リィベル"
original = "「便利だわ」"
translation = "「편리하네.」"

[[dialogue]]
speaker = "unk"
original = "意外と肯定的！？"
translation = "의외로 긍정적!?"

[[dialogue]]
speaker = "リィベル"
original = "「モネあたりなら匂いがしないとか言うんでしょうけど、本の本体は文字や図よ。それをいつでもどこでも閲覧できるなら、便利という他ないわ」"
translation = "「모네 같은 애라면 냄새가 안 난다느니 뭐라느니 하겠지만, 책의 본체는 글자와 그림이야. 그걸 언제 어디서든 열람할 수 있다면 편리하다고 할 수밖에 없지.」"

[[dialogue]]
speaker = "リィベル"
original = "「もちろん、私としては紙の本こそが本だと思うわ。けれど、それはこの……タブレットとやらの利便性を否定する理由にはならないし」"
translation = "「물론 나로서는 종이책이야말로 책이라고 생각하지만. 그렇다고 해서 이…… 태블릿인지 뭔지의 편리성을 부정할 이유는 되지 않고.」"

[[dialogue]]
speaker = "リィベル"
original = "「それに、両方あってもいいんだし……例えば、家では紙の本を読んで、出先ではタブレットで同じ本を読むこともできる。そうでしょう？」"
translation = "「게다가 양쪽 다 있어도 되는 거니까…… 예를 들어 집에서는 종이책을 읽고, 밖에서는 태블릿으로 같은 책을 읽을 수도 있겠지. 그렇지?」"

[[dialogue]]
speaker = "リィベル"
original = "「え、映像も観られるの？\u3000映像ってテレビで見るものだと思ってたわ。……ふぅん、何でもできるのね、タブレットって」"
translation = "「어, 영상도 볼 수 있어? 영상이란 건 텔레비전으로 보는 거라고 생각했어. ……흐응, 뭐든 다 되는구나, 태블릿이란 건.」"

[[dialogue]]
speaker = "unk"
original = "ちょっと触ってみる？"
translation = "「조금 만져볼래?」"

[[dialogue]]
speaker = "リィベル"
original = "「えっと、じゃあ、少しだけ…………つんつん」"
translation = "「엣, 그럼 아주 조금만………… 쿡쿡.」"

[[dialogue]]
speaker = "unk"
original = "おそるおそるタブレット端末をつつくリィベル。俺はそれを眺めながら、お茶とお菓子を用意するのだった。"
translation = "조심조심 태블릿 단말기를 찔러보는 리벨. 나는 그 모습을 바라보며 차와 과자를 준비했다."

