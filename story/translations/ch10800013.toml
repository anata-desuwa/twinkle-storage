[[dialogue]]
speaker = "unk"
original = "第３話,女子力全開、メイクアップ！,P"
translation = "제3화, 여자력 전개, 메이크업!"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「じーーーっ……」"
translation = "「빤─히……」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「ど、どうしたんですか、フランさん。私の顔に何かついてます……？」"
translation = "「무, 무슨 일인가요, 프랑 씨. 제 얼굴에 뭐라도 묻었나요……?」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「いや、何もついてねえ。綺麗なもんだ。だけど何もついてねえのが気になるんだよ」"
translation = "「아니, 아무것도 안 묻었어. 아주 깨끗해. 그런데 아무것도 안 묻어있는 게 신경 쓰인단 말이지.」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「何もついていないなら良いことなのではないですか？」"
translation = "「아무것도 안 묻어있다면 좋은 거 아닌가요?」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「世の中には、ついてて当たり前のものもあるんだよ。グロリアは化粧っ気なさすぎだ」"
translation = "「세상엔 묻어있는 게 당연한 것도 있다고. 글로리아는 화장기가 너무 없어.」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「お化粧……ですか？\u3000したことがありませんね」"
translation = "「화장…… 인가요? 해본 적이 없네요.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「マジかよ！\u3000スキンケアもか？」"
translation = "「실화냐! 스킨케어도 안 해?」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「毎朝、石鹸で顔を洗うくらいです。必要なことなのでしょうか？」"
translation = "「매일 아침 비누로 세수하는 정도예요. 필요한 일인가요?」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「あー……そっか……」"
translation = "「아─…… 그렇구나……」"

[[dialogue]]
speaker = "unk"
original = "（グロリアのお母さんは、小さい頃に……）"
translation = "(글로리아의 어머니는 어릴 적에……)"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「よし、ならオレが化粧の仕方を教えてやる！」"
translation = "「좋아, 그럼 내가 화장하는 법을 가르쳐주지!」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「フランさん？」"
translation = "「프랑 씨?」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「グロリアだって年頃の女なんだからな。化粧のひとつも覚えておいて損はねえ。いや、覚えておかなきゃダメだ」"
translation = "「글로리아도 한창때의 여자애니까 말이야. 화장법 하나쯤 알아둬서 손해 볼 거 없어. 아니, 알아둬야만 해.」"

[[dialogue]]
speaker = "unk"
original = "フラン、化粧できるのか？"
translation = "프랑, 화장할 줄 알아?"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「おいおい、オレを見くびってるみてえだな？\u3000とくと見ろよ、オレのメイクアップテクをな！」"
translation = "「어이어이, 날 우습게 보는 모양이군? 똑똑히 보라고, 내 메이크업 테크닉을 말이야!」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「あの……お化粧は大人がするものでは……？」"
translation = "「저기…… 화장은 어른들이 하는 게 아닌가요……?」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「デカい体しといて何言ってんだ。グロリアは十分に大人だろ」"
translation = "「덩치는 산만 해서 무슨 소리야. 글로리아는 충분히 어른이라고.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「んー……コンシーラーとリキッドファンデ……あとはアイブロウくらいでいいか。トドメにリップを塗れば印象がグッと変わるはずだ」"
translation = "「음─…… 컨실러랑 리퀴드 파운데이션…… 나머지는 아이브로우 정도면 되겠나. 마지막으로 립스틱을 바르면 인상이 확 바뀔 거야.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「グロリアは元が抜群にいいからな。派手になり過ぎないようナチュラルメイクで仕上げるぜ」"
translation = "「글로리아는 원판이 워낙 좋으니까 말이야. 너무 화려해지지 않게 내추럴 메이크업으로 완성해주지.」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「フランさん、手際がいいですね」"
translation = "「프랑 씨, 손놀림이 능숙하시네요.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「そりゃほぼ毎日やってっからな。自然に上手くもなるってもんだ。んじゃ、行くぜ」"
translation = "「그야 거의 매일 하고 있으니까 말이야. 자연스럽게 실력이 느는 법이지. 그럼 간다.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「うお……グロリアの肌、化粧ノリがすっげえいいな……羨ましいくらいだぜ」"
translation = "「오…… 글로리아 피부, 화장이 엄청 잘 먹는데…… 부러울 정도라고.」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「んっ……！\u3000ちょっとくすぐったいです……」"
translation = "「응……! 조금 간지러워요……」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「それは我慢しろ。もうちっと元気良さそうな色味にするかな。ほっぺに少しピンクを足して……」"
translation = "「그건 좀 참아. 조금 더 생기 있어 보이는 색감으로 할까. 볼에 핑크를 좀 더해서……」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「んふっ、ふふ、んふふふっ……！」"
translation = "「응훗, 후후, 응후후후……!」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「だからじっとしてろって！\u3000ジタバタすんな、このくすぐったがり！」"
translation = "「그러니까 가만히 있으라니까! 버둥대지 마, 이 간지럼쟁이야!」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「おっ、いい感じじゃねえ？\u3000どうよ、会長」"
translation = "「오, 느낌 좋은데? 어때, 회장.」"

[[dialogue]]
speaker = "unk"
original = "上手いもんだな"
translation = "솜씨 좋네"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「サンキュー。……って、オレの化粧の腕じゃなくて、グロリアを褒めてやれよ」"
translation = "「땡큐. ……그게 아니라, 내 화장 솜씨가 아니라 글로리아를 칭찬해주라고.」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「フランさんはお化粧もお上手だなんて、正直に言って意外でした」"
translation = "「프랑 씨는 화장도 잘하신다니 솔직히 말해 의외였어요.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「はは、応援団仲間にもよく言われるんだよな。オレってガサツに見えるだろ」"
translation = "「하하, 응원단 동료들에게도 자주 듣는 소리야. 내가 좀 거칠어 보이긴 하지.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「こう見えて……いや、違ぇな、こう見えるからこそ、身だしなみには気をつけてるんだよ」"
translation = "「이래 보여도…… 아니, 틀려, 이렇게 보이기 때문에 더욱 용모 단정에는 신경 쓰고 있다고.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「見た目がだらしねえやつよりは、ちゃんとしてるやつに応援される方が気分良いだろ？」"
translation = "「겉모습이 지저분한 녀석보다는 제대로 된 녀석이 응원해주는 쪽이 기분 좋잖아?」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「そうでしょうか？\u3000真心や熱意があれば伝わると思いますが……」"
translation = "「그런가요? 진심이나 열의가 있다면 전해질 거라 생각합니다만……」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「熱意が必要ならなおさらだ。みすぼらしい格好じゃ本気に見えねえだろ」"
translation = "「열의가 필요하다면 더더욱 그렇지. 초라한 차림으로는 진심으로 안 보인다고.」"

[[dialogue]]
speaker = "unk"
original = "俺もフランみたいに綺麗な子に応援されたいな"
translation = "나도 프랑처럼 예쁜 애한테 응원받고 싶네"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「はあ！？\u3000いきなり何言い出すんだよ！\u3000手元が狂っちまうだろうが！」"
translation = "「하아!? 갑자기 무슨 소릴 하는 거야! 손이 미끄러질 뻔했잖아!」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「あの、フランさん？\u3000口紅がほっぺの方をなぞった気がするんですけど……」"
translation = "「저기, 프랑 씨? 립스틱이 볼 쪽을 훑은 것 같은데요……」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「わ、悪ぃ、悪ぃ。すぐに直すよ」"
translation = "「미, 미안, 미안. 금방 고칠게.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「ったく……会長よぉ、不意打ちとかズリぃぞ……」"
translation = "「나 원 참…… 회장님아, 기습은 반칙이라고……」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「格好いいとかは言われ慣れてるけどよ……き、綺麗とか……そんなのオレに使う言葉じゃねえだろ」"
translation = "「멋있다느니 하는 말은 듣는 게 익숙하지만 말이야…… 예, 예쁘다니…… 그런 건 나한테 쓰는 말이 아니잖아.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「ハッ！？\u3000これが会長の人たらしスキルか……！」"
translation = "「핫!? 이것이 회장의 마성 스킬인가……!」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「オレはチョロい女じゃねえからな。簡単に騙されたりしねえぞ、騙されねえからな……」"
translation = "「난 호락호락한 여자가 아니니까 말이야. 쉽게 속거나 하지 않는다고, 안 속으니까 말이야……」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「あ、あの、フランさん？\u3000そこはほっぺではないのですけど……」"
translation = "「저, 저기, 프랑 씨? 거기는 볼이 아닌데요……」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「ハッ！？\u3000クソ、会長のせいだ！\u3000ちょっと待ってろ……」"
translation = "「핫!? 젠장, 회장 때문이야! 잠깐 기다려봐……」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「よし、いろいろあったけど完成だ！\u3000どうだ、グロリア。綺麗になったろ！」"
translation = "「좋아, 우여곡절 끝에 완성이다! 어때, 글로리아. 예뻐졌지!」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「わぁ……ありがとうございます……！」"
translation = "「와아…… 감사합니다……!」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「もののついでだしよ、会長も化粧するか？\u3000最近は男のメイクも流行ってんだぜ」"
translation = "「하는 김에 회장도 화장해볼래? 요즘은 남자 메이크업도 유행이라고.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「その……もっとイケメンにしてやるよ」"
translation = "「그…… 더 꽃미남으로 만들어줄게.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「別にいい？\u3000そ、そっか。それ以上格好よくなっちまったら、学園の女連中が放っておかねえもんな。んじゃ必要になったら、声かけてくれよな」"
translation = "「별로라고? 그, 그렇겠지. 그 이상 멋있어졌다간 학원 여편네들이 가만두지 않을 테니까. 그럼 필요해지면 말해줘.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「よーし！\u3000グロリアが綺麗になったところで、カツ丼でも食いに行こうぜ！」"
translation = "「조아쓰! 글로리아가 예뻐진 기념으로 돈가스 덮밥이라도 먹으러 가자고!」"

[[dialogue]]
speaker = "unk"
original = "メイク後にカツ丼！？"
translation = "화장하고 돈가스 덮밥!?"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「ん？\u3000飯食いに行くっつったら、カツ丼に決まってるだろ。勝負前のゲン担ぎだよ」"
translation = "「응? 밥 먹으러 간다면 돈가스 덮밥인 게 당연하잖아. 승부 전의 액땜이라고.」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「ふふ、やっぱり、フランさんはフランさんですね」"
translation = "「후후, 역시 프랑 씨는 프랑 씨네요.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「そりゃオレはオレだろ。何言ってんだ」"
translation = "「그야 나는 나지. 무슨 소릴 하는 거야.」"

[[dialogue]]
speaker = "unk"
original = "美味しい店、教えてくれ"
translation = "맛있는 가게, 알려줘"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「ああ、もちろんだ！\u3000ほっぺた落ちても知らねえぞ」"
translation = "「아아, 물론이지! 볼때기가 떨어져 나가도 모른다고.」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「まあ、それは怖いです」"
translation = "「뭐, 그건 무섭네요.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「ま、心配すんな。ほっぺの化粧が落ちたら、また直してやるからさ！」"
translation = "「뭐, 걱정하지 마. 볼 화장이 지워지면 다시 고쳐줄 테니까!」"

