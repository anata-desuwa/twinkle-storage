[[dialogue]]
speaker = "unk"
original = "第９話,道しるべを信じて,B"
translation = "제9화, 길잡이를 믿고, B"

[[dialogue]]
speaker = "ヴィーナス"
original = "「《流れ星の魔王》を<ruby>縛<rt>いまし</rt></ruby>めから解き放つんだって──ちゃんと書いてあったじゃない……！？」"
translation = "「《유성의 마왕》을 속박에서 해방시킨다고── 제대로 쓰여 있었잖아……!?」"

[[dialogue]]
speaker = "unk"
original = "必死に日誌をめくるヴィーナス。"
translation = "필사적으로 일지를 넘기는 비너스."

[[dialogue]]
speaker = "unk"
original = "しかし、やはり天からの返答はなかった。"
translation = "하지만, 역시 하늘로부터의 대답은 없었다."

[[dialogue]]
speaker = "マトイ"
original = "「えっと──何もない……の？」"
translation = "「음── 아무것도…… 없는 거야?」"

[[dialogue]]
speaker = "ニャリオン"
original = "「そりゃまた最悪ニャン……骨折り損にも程があるニャンよ」"
translation = "「그거 참 최악이냥…… 헛수고도 정도가 있냥」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ち、違うの！\u3000いつもならホントは、次に進むための鍵があるの！」"
translation = "「아, 아니야! 평소라면 사실은, 다음으로 나아가기 위한 열쇠가 있어!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「せっかくみんなで必死に戦ったのに──何もないなんて、ありえないわ」"
translation = "「모두가 열심히 싸웠는데── 아무것도 없다니, 말도 안 돼」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「このままで終わっちゃうなら、フィオナは──フィオナのお姉さんはどうなるの？」"
translation = "「이대로 끝나버린다면, 피오나는── 피오나 언니는 어떻게 되는 거야?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「どうして──どうして何も答えてくれないのよ……っ！」"
translation = "「어째서── 어째서 아무것도 대답해 주지 않는 거야……!」"

[[dialogue]]
speaker = "フィオナ"
original = "「ヴィーナス、さん……」"
translation = "「비너스, 씨……」"

[[dialogue]]
speaker = "unk"
original = "せっかくの苦労が何も報われず──ただただ希望の光が打ち砕かれたことに、ヴィーナスは取り乱していた。"
translation = "모처럼의 고생이 아무 보상도 받지 못하고── 그저 희망의 빛이 산산조각 난 것에, 비너스는 당황하고 있었다."

[[dialogue]]
speaker = "クロト"
original = "「……落ち着いて。何かを失ったわけじゃないんだ、プラスに捉えよう」"
translation = "「……진정해. 무언가를 잃은 건 아니잖아, 긍정적으로 생각하자」"

[[dialogue]]
speaker = "クロト"
original = "「ここにいた竜は──いずれ外界にも飛び出しかねない脅威だった。それを打ち倒せただけでも、今は十分じゃないか？」"
translation = "「여기에 있던 용은── 언젠가 외부에 뛰쳐나올 수도 있는 위협이었다. 그것을 쓰러뜨린 것만으로도, 지금은 충분하지 않나?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「──十分なはずないわ。リクリエだって、アポロだって、何も解決していないもの」"
translation = "「──충분할 리 없어. 리크리에도, 아폴로도, 아무것도 해결되지 않았는걸」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「せっかく、クロトが体を張って私を助けてくれたのに──手がかりのひとつもくれないなんて……！」"
translation = "「모처럼, 쿠로토가 몸을 던져 나를 구해줬는데── 단서 하나 주지 않다니……!」"

[[dialogue]]
speaker = "クロト"
original = "「確かに──進展はあったほうがいいに決まってる。……でもそんなのは、もともと保証のないことだろう」"
translation = "「확실히── 진전이 있는 편이 좋은 건 당연하다. ……하지만 그런 건, 원래 보장이 없는 일이었잖아」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「保証はあるわよ！\u3000日誌にちゃんと書かれてたんだから！」"
translation = "「보장은 있어! 일지에 제대로 쓰여 있었으니까!」"

[[dialogue]]
speaker = "unk"
original = "俺には彼女の気持ちがわかる気がした。"
translation = "나는 그녀의 마음을 알 것 같았다."

[[dialogue]]
speaker = "unk"
original = "そして、だからこそ、伝えてやらなきゃいけなかった。"
translation = "그리고, 그렇기에, 전해줘야만 했다."

[[dialogue]]
speaker = "クロト"
original = "「ヴィーナス」"
translation = "「비너스」"

[[dialogue]]
speaker = "クロト"
original = "「日誌を頼るのは、もうやめよう」"
translation = "「일지에 의지하는 건, 이제 그만두자」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「────」"
translation = "「────」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「なんで……どうして？」"
translation = "「왜…… 어째서?」"

[[dialogue]]
speaker = "クロト"
original = "「危険だからだ。確証のない情報に踊らされることは」"
translation = "「위험하기 때문이다. 확신 없는 정보에 춤추는 것은」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「危険……って。そんなことないわ──何もないより、方針のあったほうがいいでしょ？」"
translation = "「위험…… 이라니. 그렇지 않아── 아무것도 없는 것보다, 방침이 있는 편이 좋잖아?」"

[[dialogue]]
speaker = "クロト"
original = "「いいや、危険だ。君はさっき──わざわざ逆鱗を狙うために煌竜の喉元にまで迫った。そこが弱点と聞いていたから」"
translation = "「아니, 위험하다. 너는 방금── 일부러 역린을 노리기 위해 황룡의 목덜미까지 다가갔다. 그곳이 약점이라고 들었기 때문에」"

[[dialogue]]
speaker = "クロト"
original = "「でも実際には違った。あの行為は──竜にとって、ブレスの格好の餌食だった」"
translation = "「하지만 실제로는 달랐다. 그 행위는── 용에게 있어서, 브레스의 좋은 먹잇감이었다」"

[[dialogue]]
speaker = "アナ"
original = "「……そうですね。前会長はあの場面、明らかな悪手を選んでいました」"
translation = "「……그렇습니다. 전 회장님은 그 장면에서, 명백한 악수를 선택하고 있었습니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私が……間違ってたっていうの……？」"
translation = "「내가…… 틀렸다는 거야……?」"

[[dialogue]]
speaker = "クロト"
original = "「間違ってたのはヴィーナスじゃない。その本だ」"
translation = "「틀린 건 비너스가 아니다. 그 책이다」"

[[dialogue]]
speaker = "クロト"
original = "「これからは誰にとっても予想のできない未来が待ってる。日誌の記述が現実と食い違ってきているのも、その兆候だろう」"
translation = "「앞으로는 누구에게도 예측할 수 없는 미래가 기다리고 있다. 일지의 기술이 현실과 어긋나기 시작한 것도, 그 징조겠지」"

[[dialogue]]
speaker = "クロト"
original = "「だからこそ──俺たちは自分の足で歩いてかなきゃならないんだ」"
translation = "「그러니까── 우리는 우리 발로 걸어가야만 한다」"

[[dialogue]]
speaker = "セーラ"
original = "「ま……未来なんて元々、誰にもわかんないもんだしね」"
translation = "「뭐…… 미래란 건 원래, 아무도 모르는 거니까」"

[[dialogue]]
speaker = "フィオナ"
original = "「はい。私も──いかなる未知とも向き合う覚悟はできています」"
translation = "「네. 저도── 어떠한 미지라도 마주할 각오는 되어 있습니다」"

[[dialogue]]
speaker = "unk"
original = "これからは自分たちの手で道を切り開いていく──"
translation = "앞으로는 자신들의 손으로 길을 개척해 나간다──"

[[dialogue]]
speaker = "unk"
original = "そんな、ともすれば当たり前の決意を告げられ、ヴィーナスの顔は青ざめていた。"
translation = "그런, 자칫 당연할 수도 있는 결의를 듣고, 비너스의 얼굴은 새파랗게 질려 있었다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「ま……待って、みんな。そうじゃないわ」"
translation = "「자…… 잠깐만, 모두. 그렇지 않아」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「日誌は──何も悪くないの。だってこれまで、たくさんの未来を当ててきたのは──アナも知ってるでしょ？」"
translation = "「일지는── 아무 잘못 없어. 왜냐하면 지금까지, 수많은 미래를 맞혀 온 건── 아나도 알고 있잖아?」"

[[dialogue]]
speaker = "アナ"
original = "「……確かに。今までも、超常的な予言を的中させていたのは知っています」"
translation = "「……확실히. 지금까지도, 초자연적인 예언을 적중시켰던 것은 알고 있습니다」"

[[dialogue]]
speaker = "アナ"
original = "「ですが──少しでも裏切られる恐れがあるなら、頭から信じ込むのは危険でしょう」"
translation = "「하지만── 조금이라도 배신당할 우려가 있다면, 처음부터 믿어버리는 것은 위험하겠죠」"

[[dialogue]]
speaker = "マトイ"
original = "「うん……私にも、わかるよ。さっきのヴィーナス──ホントに危なかったし」"
translation = "「응…… 나도, 알아. 방금 비너스── 정말 위험했고」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「っ……でも、だからって日誌を無視するなんて──！」"
translation = "「크읏…… 하지만, 그렇다고 일지를 무시하다니──!」"

[[dialogue]]
speaker = "クロト"
original = "「フィーニスの塔が気にかかってるのは俺もそうだった。日誌のナビゲートがなくたって、前に進むことは可能だ」"
translation = "「피니스의 탑이 마음에 걸리는 건 나도 마찬가지였다. 일지의 안내가 없더라도, 앞으로 나아가는 것은 가능하다」"

[[dialogue]]
speaker = "ユウリ"
original = "「そうだな──何も、従わなくちゃって決まりがあるわけでもないんだろ」"
translation = "「그렇지── 아무것도, 따라야만 한다는 규칙이 있는 것도 아니잖아」"

[[dialogue]]
speaker = "ユウリ"
original = "「だったら素直に行動しようぜ。うちの会長はフィオナだけど──ここまできたら運命共同体ってもんだしよ」"
translation = "「그렇다면 솔직하게 행동하자고. 우리 회장은 피오나지만── 여기까지 왔으면 운명 공동체라는 거지」"

[[dialogue]]
speaker = "セーラ"
original = "「そーそー。むしろさ、何にも縛られないほうが自由でいいじゃん？」"
translation = "「그렇지 그렇지. 오히려 말이야, 아무것에도 얽매이지 않는 편이 자유롭고 좋지 않아?」"

[[dialogue]]
speaker = "サーシャ"
original = "「ふふふ。先がわからないくらいのほうが、面白いものね♪」"
translation = "「후후후. 앞을 알 수 없을 정도가, 재미있는 법이지♪」"

[[dialogue]]
speaker = "unk"
original = "みんながヴィーナスを励まそうとする。"
translation = "모두가 비너스를 격려하려고 한다."

[[dialogue]]
speaker = "unk"
original = "しかしそんなエールは、彼女の表情をますます曇らせていった。"
translation = "하지만 그런 응원은, 그녀의 표정을 더욱 흐리게 만들었다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「……無理よ」"
translation = "「……무리야」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「日誌に書かれたことを無視するなんて……そんなの、私には出来っこないわ」"
translation = "「일지에 쓰인 것을 무시하다니…… 그런 건, 나는 할 수 없을 거야」"

[[dialogue]]
speaker = "クロト"
original = "「今回みたいな危険があるとしてもか？」"
translation = "「이번 같은 위험이 있다 해도 말인가?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「……ええ。そうよ。幻滅するかもしれないけど」"
translation = "「……응. 그래. 실망할지도 모르겠지만」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私……一人じゃなんにも、決められないのよ」"
translation = "「나는…… 혼자서는 아무것도, 결정할 수 없어」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「だって私には──他に頼れるものなんて、ないんだから」"
translation = "「왜냐하면 나에게는── 달리 의지할 만한 것이, 없으니까」"

[[dialogue]]
speaker = "フィオナ"
original = "「ヴィーナス、さん……」"
translation = "「비너스, 씨……」"

[[dialogue]]
speaker = "クロト"
original = "（……やっぱりな）"
translation = "（……역시나）"

[[dialogue]]
speaker = "unk"
original = "これまでヴィーナスとの付き合いを通じて、ほんのり抱いていた違和感が氷解する気がした。"
translation = "지금까지 비너스와의 교제를 통해, 희미하게 품고 있던 위화감이 해소되는 기분이었다."

[[dialogue]]
speaker = "unk"
original = "普通──人間は誰しも未知の選択をする。"
translation = "보통── 인간은 누구나 미지의 선택을 한다."

[[dialogue]]
speaker = "unk"
original = "そうやってたくさん、失敗も回り道も経験する。"
translation = "그렇게 수없이, 실패도 돌아가는 길도 경험한다."

[[dialogue]]
speaker = "unk"
original = "だけど、ヴィーナスは普通じゃなかった。"
translation = "하지만, 비너스는 보통이 아니었다."

[[dialogue]]
speaker = "unk"
original = "彼女の手元にはいつも『日誌』があった。"
translation = "그녀의 손에는 항상 『일지』가 있었다."

[[dialogue]]
speaker = "unk"
original = "あれが言わば攻略本として、常に彼女を最短ルートでの正解へ導いてきた。"
translation = "그것이 말하자면 공략본으로서, 항상 그녀를 최단 루트의 정답으로 이끌어 왔다."

[[dialogue]]
speaker = "unk"
original = "そのせいでヴィーナスは……必要以上に、決断を下すことさえも恐れてしまっている。"
translation = "그 때문에 비너스는…… 필요 이상으로, 결단을 내리는 것조차 두려워하고 있다."

[[dialogue]]
speaker = "unk"
original = "それは確かに──彼女が歩んできた人生からすれば、仕方のないことだったのかもしれない。"
translation = "그것은 확실히── 그녀가 걸어온 인생으로서는, 어쩔 수 없는 일이었을지도 모른다."

