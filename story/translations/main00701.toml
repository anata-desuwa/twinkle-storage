[[dialogue]]
speaker = "unk"
original = "第１話,臨時招集,B"
translation = "제1화, 임시 소집, B"

[[dialogue]]
speaker = "unk"
original = "クロトら一行が組織『ネビュラ』と接触していた、そのとき。"
translation = "쿠로토 일행이 조직 『네뷸라』와 접촉하고 있던, 그때."

[[dialogue]]
speaker = "リノ"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "天蓋は晴れ、空が戻った。"
translation = "천개는 걷히고, 하늘이 돌아왔다."

[[dialogue]]
speaker = "unk"
original = "高層マンションの一室からその様子を眺め、リノはふうとため息をつく。"
translation = "고층 맨션의 한 방에서 그 모습을 바라보며, 리노는 후우 하고 한숨을 쉰다."

[[dialogue]]
speaker = "unk"
original = "星術の使えなかったほんの一瞬、街中にきらめいた魔の焔を──彼女は決して見逃さない。"
translation = "성술을 사용할 수 없었던 아주 짧은 한순간, 길거리에 반짝였던 마의 불꽃을── 그녀는 결코 놓치지 않는다."

[[dialogue]]
speaker = "リノ"
original = "「無事に済んだのかしら。あなたに今さら、こんなこと言うのは無駄かもしれないけれど」"
translation = "「무사히 끝난 걸까. 너에게 이제 와서, 이런 말을 하는 건 소용없을지도 모르겠지만」"

[[dialogue]]
speaker = "リノ"
original = "「あまり……手厳しくしないでもらいたいわね。セドナ」"
translation = "「너무…… 엄하게 대하지는 말아 줬으면 좋겠네. 세드나」"

[[dialogue]]
speaker = "unk"
original = "一方──"
translation = "한편──"

[[dialogue]]
speaker = "セイファート"
original = "「出席ご苦労──諸君。新星学園学園長、セイファートだ」"
translation = "「출석 수고했다── 제군. 신성 학원 학원장, 세이퍼트다」"

[[dialogue]]
speaker = "セイファート"
original = "「これよりは両学園合同による緊急会議を始める。議題は無論のこと、近日国内で起きている特殊な『異変』についてだ」"
translation = "「지금부터는 양 학원 합동 긴급 회의를 시작한다. 의제는 물론, 근일 국내에서 일어나고 있는 특수한 『이변』에 대해서다」"

[[dialogue]]
speaker = "クロト"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "『ネビュラ』の基地でひと悶着あった後。"
translation = "『네뷸라』의 기지에서 한바탕 소동이 있은 후."

[[dialogue]]
speaker = "unk"
original = "俺は学園長から緊急の呼び出しに応じ、帰投してすぐこの場へ赴いていた。"
translation = "나는 학원장으로부터의 긴급 호출에 응하여, 귀환하자마자 이 자리로 향했다."

[[dialogue]]
speaker = "セイファート"
original = "「流星の学園長──ラティエ殿にも、本来は出席してもらうべきなのだが。例によってあの御仁は今も放浪中でな」"
translation = "「유성 학원장── 라티에 님에게도, 본래는 출석해 주셔야 하지만. 예의 그분은 지금도 방랑 중이라서 말이지」"

[[dialogue]]
speaker = "セイファート"
original = "「代わって星見会長には、会議後、全体への通達もお願いしたい。よいかな？」"
translation = "「대신 호시미 회장에게는, 회의 후, 전체 통지도 부탁하고 싶다. 괜찮겠나?」"

[[dialogue]]
speaker = "フィオナ"
original = "「──はい」"
translation = "「──네」"

[[dialogue]]
speaker = "unk"
original = "フィオナは俺の隣で起立し、凛々しく返事をした。"
translation = "피오나는 내 옆에서 기립하여, 늠름하게 대답했다."

[[dialogue]]
speaker = "クロト"
original = "（流星の学園長……か）"
translation = "（유성 학원장……인가）"

[[dialogue]]
speaker = "unk"
original = "そういえば顔を合わせた覚えもないな。どんな人なのだろう。"
translation = "그러고 보니 얼굴을 마주친 기억도 없군. 어떤 사람일까."

[[dialogue]]
speaker = "unk"
original = "国内にはいないような口ぶりだったけど……今は気にすることでもないか。"
translation = "국내에는 없는 듯한 말투였지만…… 지금은 신경 쓸 일도 아니겠지."

[[dialogue]]
speaker = "セイファート"
original = "「諸君らも周知の通り──現在、流星市国には様々な異変が取り巻いている」"
translation = "「제군들도 주지하는 바와 같이── 현재, 유성 시국에는 다양한 이변이 둘러싸고 있다」"

[[dialogue]]
speaker = "セイファート"
original = "「これまでのリクリエ余波とは一線を画する、予断を許さない状況だ」"
translation = "「지금까지의 리크리에 여파와는 선을 긋는, 예단을 불허하는 상황이다」"

[[dialogue]]
speaker = "セイファート"
original = "「エスメラルダ女史。今の状況をまとめてくれ」"
translation = "「에스메랄다 여사. 지금의 상황을 정리해 주게」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「は。先ほど１５時１０分すぎより大規模なアステライトとモンスターの発生──」"
translation = "「예. 방금 15시 10분경부터 대규모 아스테라이트와 몬스터의 발생──」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「それから３０分後には全世界から星術の実行が不可能化するという、停電にも似た現象が発生。しかしこれは、およそ３分で復旧しました」"
translation = "「그리고 30분 후에는 전 세계에서 성술의 실행이 불가능해지는, 정전과도 비슷한 현상이 발생. 하지만 이것은, 대략 3분 만에 복구되었습니다」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「また、先日の『星読事変』と同様に『仮面の少女』なる存在も確認されており……」"
translation = "「또한, 지난번 『별 읽기 사변』과 마찬가지로 『가면의 소녀』라는 존재도 확인되었으며……」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「リクリエの接近に伴って、異常事態の活性化が進んでいることは明白と考えられます」"
translation = "「리크리에의 접근에 따라, 이상 사태의 활성화가 진행되고 있는 것은 명백하다고 생각됩니다」"

[[dialogue]]
speaker = "セイファート"
original = "「ふむ。市街地の被害も尋常ではないと聞く」"
translation = "「흠. 시가지의 피해도 심상치 않다고 듣네」"

[[dialogue]]
speaker = "クロト"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "淡々としたエスメラルダ先生の説明を黙して聞く。"
translation = "담담한 에스메랄다 선생님의 설명을 잠자코 듣는다."

[[dialogue]]
speaker = "unk"
original = "俺の隣にはフィオナ──その周りには、両学園の先生方がずらりと顔を揃えていた。"
translation = "내 옆에는 피오나── 그 주위에는, 양 학원의 선생님들이 줄지어 얼굴을 마주하고 있었다."

[[dialogue]]
speaker = "unk"
original = "──『臨時招集』。"
translation = "──『임시 소집』."

[[dialogue]]
speaker = "unk"
original = "そう称されたこの会合には、主に両学園の先生たちのみが出席を許されており、ものものしい雰囲気だ。"
translation = "그렇게 칭해진 이 회합에는, 주로 양 학원의 선생님들만이 출석이 허용되었으며, 삼엄한 분위기다."

[[dialogue]]
speaker = "unk"
original = "星徒会でさえ出席できたのは会長職である俺とフィオナの２人だけ──"
translation = "성도회에서조차 출석할 수 있었던 것은 회장직인 나와 피오나 두 사람뿐──"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは大層首を突っ込みたがっていたが、もう会長を降りた身なのでやむなく待機してもらった。"
translation = "비너스는 몹시 끼어들고 싶어 했지만, 이미 회장직에서 물러난 몸이기에 어쩔 수 없이 대기하도록 했다."

[[dialogue]]
speaker = "クロト"
original = "（重々しいな……当然だが）"
translation = "（엄숙하군…… 당연하지만）"

[[dialogue]]
speaker = "フィオナ"
original = "（臨時招集は滅多にかかるものではありません。当代になってからは、初めてです）"
translation = "（임시 소집은 좀처럼 열리는 것이 아닙니다. 현대로 들어서는, 처음입니다）"

[[dialogue]]
speaker = "unk"
original = "それほどの緊急事態ということだろう。"
translation = "그만큼의 긴급 사태라는 것이겠지."

[[dialogue]]
speaker = "unk"
original = "アポロの出現だけならまだしも、彼女の行使した『星術の停止』は俺たちの存在意義をも危ぶませるものだった。"
translation = "아폴로의 출현만이라면 모를까, 그녀가 행사한 『성술의 정지』는 우리의 존재 의의마저 위태롭게 하는 것이었다."

[[dialogue]]
speaker = "セイファート"
original = "「なれば実際に最前線へ立ち、脅威を退けた彼らに話を聞こう。両星徒会、会長の諸君──」"
translation = "「그렇다면 실제로 최전선에 서서, 위협을 물리친 그들에게 이야기를 들어보자. 양 성도회, 회장 제군──」"

[[dialogue]]
speaker = "フィオナ"
original = "「──はい。状況を説明します」"
translation = "「──네. 상황을 설명하겠습니다」"

[[dialogue]]
speaker = "unk"
original = "フィオナは立ち上がると、毅然とした面持ちで今回の交戦について報告した。"
translation = "피오나는 일어서더니, 의연한 표정으로 이번 교전에 대해 보고했다."

[[dialogue]]
speaker = "unk"
original = "見たこともない魔獣が出てきたことや、アポロとギエルという指揮者が存在していたことについてだ。"
translation = "본 적도 없는 마수가 나타난 것과, 아폴로와 기엘이라는 지휘자가 존재했다는 것에 대해서다."

[[dialogue]]
speaker = "クロト"
original = "「同じく新星会長、緋宮からも。この前の『星読』と合わせて得た知見をご報告します」"
translation = "「마찬가지로 신성 회장, 히노미야에게서도. 지난번 『별 읽기』와 합쳐 얻은 식견을 보고하겠습니다」"

[[dialogue]]
speaker = "unk"
original = "俺は前回と今回に共通していたこと、また新たに確認された事項について話した。"
translation = "나는 지난번과 이번에 공통되었던 것, 그리고 새롭게 확인된 사항에 대해 이야기했다."

[[dialogue]]
speaker = "セイファート"
original = "「アポロ──ギエル──ふむ。後者の脅威度は低いようだが、マークしておくに越したことはないだろう」"
translation = "「아폴로── 기엘── 흠. 후자의 위협도는 낮은 듯하지만, 주시해 두는 것이 좋을 것이다」"

[[dialogue]]
speaker = "セイファート"
original = "「聞く限り、その少女が台風の目であるようだ。それに……『天蓋』、か」"
translation = "「듣자 하니, 그 소녀가 태풍의 눈인 듯하다. 게다가…… 『천개』, 인가」"

[[dialogue]]
speaker = "トワ先生"
original = "「あの時はわたしも本当にパニックでしたぁ～……。星術が使えなくなっちゃったら、もうどうしたらいいか……！」"
translation = "「그때는 저도 정말 패닉이었어요~……. 성술을 쓸 수 없게 되어 버리면, 이제 어떻게 해야 할지……!」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「当時の状況を分析した結果──流星市国の星騎士たち全て、星との交信そのものが途絶えていたことが明らかになっています」"
translation = "「당시의 상황을 분석한 결과── 유성 시국의 성기사들 전부, 별과의 교신 자체가 끊겨 있었다는 것이 밝혀졌습니다」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「言わずもがな、星術には守護星との交信が欠かせません。星とリンクできなければ星騎士としての能力は事実上すべて封じられます」"
translation = "「말할 것도 없이, 성술에는 수호성과의 교신이 필수적입니다. 별과 연결될 수 없다면 성기사로서의 능력은 사실상 모두 봉쇄됩니다」"

[[dialogue]]
speaker = "セイファート"
original = "「天蓋──その名の通り、我々に対するフタというところか。由々しき事態だな」"
translation = "「천개── 그 이름대로, 우리에 대한 뚜껑이라는 건가. 중대한 사태로군」"

[[dialogue]]
speaker = "unk"
original = "これまでとは比べ物にならないアポロの脅威に、議論は白熱していく。"
translation = "지금까지와는 비교도 안 되는 아폴로의 위협에, 논의는 백열된다."

[[dialogue]]
speaker = "unk"
original = "そうして、最終的に導き出された結論は……"
translation = "그렇게 해서, 최종적으로 도출된 결론은……"

[[dialogue]]
speaker = "セイファート"
original = "「これまでの情報を総合して──我々の取るべき手段はひとつ。仮面の少女──『アポロ』を抹殺することだ」"
translation = "「지금까지의 정보를 종합하여── 우리가 취해야 할 수단은 하나. 가면의 소녀── 『아폴로』를 말살하는 것이다」"

[[dialogue]]
speaker = "クロト"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker = "フィオナ"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "学園長は強い語気で、そう断言した。"
translation = "학원장은 강한 어조로, 그렇게 단언했다."

[[dialogue]]
speaker = "セイファート"
original = "「アステラを始めとするリクリエ現象は──これからますます激化していくだろう」"
translation = "「아스테라를 비롯한 리크리에 현상은── 앞으로 더욱 격화될 것이다」"

[[dialogue]]
speaker = "セイファート"
original = "「もし、また同じ手段で我々の力がもがれてしまうようなら──なすすべなく壊滅の憂き目に遭いかねない。これまでの苦労など水泡となって」"
translation = "「만약, 또 같은 수단으로 우리의 힘이 꺾여 버린다면── 속수무책으로 괴멸의 곤경에 처할 수도 있다. 지금까지의 고생 따위 물거품이 되어」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「ええ。なるべく速やかに排除しなくては、星騎士そのものの存亡にかかわります」"
translation = "「네. 가능한 한 신속하게 배제하지 않으면, 성기사 그 자체의 존망에 관련됩니다」"

[[dialogue]]
speaker = "unk"
original = "その決定に異を挟む者はいなかった。"
translation = "그 결정에 이의를 제기하는 자는 없었다."

[[dialogue]]
speaker = "unk"
original = "だが、まだ……彼らは知らない。"
translation = "하지만, 아직…… 그들은 모른다."

[[dialogue]]
speaker = "unk"
original = "仮面の少女アポロ──彼女の本当の<b>正体</b>については。"
translation = "가면의 소녀 아폴로── 그녀의 진짜 <b>정체</b>에 대해서는."

