[[dialogue]]
speaker = "unk"
original = "第１０話,帰還,B"
translation = "제10화, 귀환, B"

[[dialogue]]
speaker_original = "ブヒモス"
speaker_translation = "부히모스"
original = "「──グラアアァァッ！！」"
translation = "「──그라아아아악!!」"

[[dialogue]]
speaker_original = "スクアルス"
speaker_translation = "스쿠알스"
original = "「──サァァァァモン！！」"
translation = "「──사아아아몬!!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「あーもうどーしよどーしよ──倒しても倒してもモンスターが減らないよっ！？」"
translation = "「아ー 정말 어떡해 어떡해── 쓰러뜨려도 쓰러뜨려도 몬스터가 줄지 않아욧!?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「おおお落ち着いてくださいトワちゃん先生！\u3000こここここは冷静にこのルリエルが三枚おろしにしてみせますっ！」"
translation = "「저저저 진정하세요 토와짱 선생님! 이이이이곳은 냉정하게 이 루리엘이 삼장 뜨기로 만들어 보이겠습니다!」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「あなたが落ち着いてください、ルリエルさん。というか、なんなんですかあのシャケみたいなモンスターは……？」"
translation = "「당신이 진정하세요, 루리엘 씨. 그보다, 대체 뭐예요 저 연어 같은 몬스터는……?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「でも、さすがに人手が足りなくなってきたカンジかな──」"
translation = "「하지만, 역시 일손이 부족해진 느낌이려나──」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「厳しいですね。プリマステラ達は流星市国外にも出動していますから、これ以上の応援は望めませんし──」"
translation = "「힘들군요. 프리마 스텔라들은 유성 시국 밖으로도 출동하고 있으니, 이 이상의 응원은 기대할 수 없고──」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「うぅ……このままなんとか持ちこたえるしか……！」"
translation = "「으윽…… 이대로 어떻게든 버틸 수밖에……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ふぅ──っと」"
translation = "「후우──」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「到着──ってね！」"
translation = "「도착──이네!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「……って…………えええぇぇ！？\u3000緋宮くんたち！？\u3000星徒会のみんな！？」"
translation = "「……라니………… 에에에에엣!? 히노미야 군들!? 성도회 모두!?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あーやっと戻ってこれたー！！\u3000ほっ……」"
translation = "「아ー 드디어 돌아왔다ー!! 휴우……」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ん～～～！\u3000こっちも大分やばそうではあるけど──学園に戻ると安心するよな」"
translation = "「음~~~! 여기도 상당히 위험해 보이긴 하지만── 학원에 돌아오니 안심되네」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふっ、なんだか懐かしい気がしちゃうわね」"
translation = "「후훗, 왠지 모르게 그리운 기분이 드네」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ちょっとした里帰りだったと思えば、悪くなかったでしょうか」"
translation = "「잠깐의 귀향이었다고 생각하면, 나쁘지 않았을까요」"

[[dialogue]]
speaker = "unk"
original = "フィーニスの塔を出ると、そこは見慣れた学園の敷地内だった。"
translation = "피니스의 탑을 나서자, 그곳은 익숙한 학원 부지 내였다."

[[dialogue]]
speaker = "unk"
original = "そして、偶然にもその場では見知った面々が戦ってくれていて……"
translation = "그리고, 우연히도 그곳에서는 아는 얼굴들이 싸워주고 있었는데……"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ヴィ……ヴィーナスさんがいますうぅぅ～～～！！」"
translation = "「비…… 비너스 씨가 있어요오오오~~~!!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ほんとだ♪\u3000あー……ようやくホッとした感じ。誰も欠けてないっぽいね」"
translation = "「정말이다♪ 아ー…… 드디어 안심이 되는 느낌. 아무도 빠지지 않은 것 같네」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「泣きすぎだって、ルリエル。セーラさんも、心配かけちゃってごめんね」"
translation = "「너무 울지 마, 루리엘. 세라 씨도, 걱정 끼쳐서 미안해」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「ニャーッニャッニャッニャッ！\u3000ルリエルは泣き虫ニャンねえ！」"
translation = "「냐ー앗 냐냐냐! 루리엘은 울보냥이네!」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは泣いて駆け寄るルリエルをよしよしと慰めつつ、自分もセーラさんによしよしと慰められていた。"
translation = "비너스는 울면서 달려드는 루리엘을 쓰다듬으며 위로하는 동시에, 자신도 세라 씨에게 쓰다듬어지며 위로받고 있었다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「──お勤めご苦労さまです、叔父貴。信じていましたよ」"
translation = "「──임무 수고하셨습니다, 숙부님. 믿고 있었습니다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「こらこら、出所じゃないんだよ。……でも、ありがとうな」"
translation = "「이봐 이봐, 출소한 게 아니잖아. ……하지만, 고맙다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……はい」"
translation = "「……네」"

[[dialogue]]
speaker = "unk"
original = "アナの表情に心からの安堵が浮かんだ。"
translation = "아나의 표정에 진심 어린 안도가 떠올랐다."

[[dialogue]]
speaker = "unk"
original = "アナのことだからきっと取り乱したりはしなくとも、ずっと心配してくれていたんだろう。"
translation = "아나니까 분명 당황하지는 않았겠지만, 계속 걱정하고 있었을 것이다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「──ご無事で何よりです、フィオナ様。他の皆さまも」"
translation = "「──무사하셔서 다행입니다, 피오나 님. 다른 모든 분들도요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ええ。留守の間、守ってくれてありがとう──キリカ」"
translation = "「네. 자리를 비운 동안, 지켜줘서 고마워── 키리카」"

[[dialogue]]
speaker = "unk"
original = "互いの無事に安堵する……が、状況は予断を許さなかった。"
translation = "서로의 무사에 안도하지만…… 상황은 낙관할 수 없었다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「帰って早速で恐縮なのですが、緊急事態です。それも人間界全域規模で」"
translation = "「돌아오자마자 죄송하지만, 긴급사태입니다. 그것도 인간계 전역 규모로요」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ──やばいのは把握してる。だから無理して戻ってきた」"
translation = "「아아── 위험하다는 건 알고 있어. 그래서 무리해서 돌아왔다」"

[[dialogue]]
speaker = "unk"
original = "俺は、通ってきた『うろ』が封鎖されたことやフィーニスの塔を利用したことを手短に話した。"
translation = "나는, 통과해 온 『우로』가 봉쇄된 것이나 피니스의 탑을 이용한 것을 간단히 이야기했다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「なるほど──すべて折り込み済みだったとすると、<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>のジャックもやはり確信的なもののようですね」"
translation = "「과연── 모든 것을 예상하고 있었다고 한다면, <ruby>경계의 호수<rt>라고 시에로</rt></ruby>의 장악 역시 확신적인 것 같군요」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ネビュラの狙いは正直、わからない。ただ……今まで隠れていた魔女たちがこれを機に<b>動いた</b>。それは間違いない」"
translation = "「네뷸라의 목적은 솔직히, 모르겠다. 다만…… 지금까지 숨어 있던 마녀들이 이것을 기회로 <b>움직였다</b>. 그것은 틀림없어」"

[[dialogue]]
speaker = "unk"
original = "果たして彼女たちの目的は何なのか？"
translation = "과연 그녀들의 목적은 무엇인가?"

[[dialogue]]
speaker = "unk"
original = "その真意を知るためには……母さんを頼る必要があるかもしれない。"
translation = "그 진의를 알기 위해서는…… 어머니를 의지할 필요가 있을지도 모른다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「現在、人間界には尋常でない数のアステラとモンスターが出現しています。それだけならまだよいのですが」"
translation = "「현재, 인간계에는 심상치 않은 수의 아스테라와 몬스터가 출현하고 있습니다. 그것만이라면 아직 괜찮지만요」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「フィヴォス流星群──そう名付けられた流れ星の雨が、次々と地上へ降りかかっています」"
translation = "「필보스 유성군── 그렇게 이름 붙여진 별똥별의 비가, 차례차례 지상으로 쏟아지고 있습니다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「！\u3000なるほど……トリシャさんが警告してたものの正体だな」"
translation = "「! 과연…… 트리샤 씨가 경고했던 것의 정체로군」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「流れ星──って要は隕石だろ？\u3000やばすぎねえか」"
translation = "「별똥별──이라는 건 요컨대 운석이잖아? 너무 위험한 거 아냐」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「それに、流星群といえば……確か３０００年前のリクリエ時にも観測されていた現象のはずです」"
translation = "「게다가, 유성군이라고 하면…… 분명 3000년 전의 리크리에 때에도 관측되었던 현상일 것입니다」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「間違いないニャ。いよいよ本番ということニャ」"
translation = "「틀림없다냥. 드디어 본 무대라는 거다냥」"

[[dialogue]]
speaker = "unk"
original = "俺たち星騎士の本懐を果たすべき時が、すぐそこにまで来ている。"
translation = "우리 성기사의 본분을 다해야 할 때가, 바로 코앞까지 다가왔다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「それに、この空って……」"
translation = "「게다가, 이 하늘은……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ええ──いるようですね。どこかに」"
translation = "「네── 있는 것 같군요. 어딘가에」"

[[dialogue]]
speaker = "unk"
original = "見上げた天空に広がっているのは、いつかも仰いだ落書き模様──彼女が君臨している証拠だ。"
translation = "올려다본 하늘에 펼쳐져 있는 것은, 언젠가도 올려다보았던 낙서 모양── 그녀가 군림하고 있다는 증거다."

[[dialogue]]
speaker = "unk"
original = "というところで──"
translation = "라고 하는 순간──"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「おお、星徒会の諸君──よくぞ戻ってきタ。しかしいきなりだがまずい事態ダ。新たに流星の予兆が３発も確認されていル」"
translation = "「오오, 성도회 제군들── 잘 돌아왔다. 하지만 갑작스럽지만 곤란한 사태다. 새로 유성의 예조가 3발이나 확인되었 다」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「アニマ先輩──」"
translation = "「아니마 선배──」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「って、さっき撃退したばかりなのに、また……！？」"
translation = "「라니, 방금 막 격퇴했는데, 또……!?」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「文字通り星の数ほど──というわけですね」"
translation = "「문자 그대로 별의 수만큼──이라는 것이군요」"

[[dialogue]]
speaker = "unk"
original = "アニマ先輩は改造されたらしき天文盤を手元でいくつも操作していた。"
translation = "아니마 선배는 개조된 듯한 천문반을 손으로 여러 개 조작하고 있었다."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「落下予測地点は駅前、繁華街、それからここダ。今から３チームに分かれて出動すル」"
translation = "「낙하 예측 지점은 역 앞, 번화가, 그리고 여기다. 지금부터 3팀으로 나뉘어 출동한다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「流星の撃退……か。わかった。任せてくれ」"
translation = "「유성 격퇴……인가. 알겠다. 맡겨줘」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「ム？\u3000待つのダ、まだ詳しい手順の説明が──」"
translation = "「음? 기다려라, 아직 자세한 절차 설명이──」"

[[dialogue]]
speaker = "unk"
original = "俺は勢いよくその場を蹴り、一気に大気圏まで飛翔する。"
translation = "나는 힘차게 그 자리를 박차고, 단숨에 대기권까지 비상한다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（前回のリクリエで──ラクシスはセレーネ流星群を跳ね除けた。これが、あの時と同じだっていうんなら──）"
translation = "（지난번 리크리에에서── 라크시스는 셀레네 유성군을 튕겨냈다. 이것이, 그때와 같다고 한다면──）"

[[dialogue]]
speaker = "unk"
original = "キラリと瞬く<ruby>碧<rt>あお</rt></ruby>色の尾っぽは──流れ星の証。"
translation = "반짝하고 빛나는 푸른색 꼬리는── 별똥별의 증거."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──おおおおっっ！」"
translation = "「──오오오오옷!」"

[[dialogue]]
speaker = "unk"
original = "放つ渾身の拳──その一振りは、枝分かれする流星のことごとくを撃ち砕いた！"
translation = "날리는 혼신의 주먹── 그 한 번의 휘두름은, 가지를 치는 유성들을 모조리 쳐부쉈다!"

[[dialogue]]
speaker = "unk"
original = "しかし、破砕した破片のうち、燃焼しきらなかった一部は地上へとすり抜ける──"
translation = "하지만, 부서진 파편 중, 연소되지 못한 일부는 지상으로 빠져나가는데──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──フィオナ、地上を頼む！」"
translation = "「──피오나, 지상을 부탁한다!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「任されました──」"
translation = "「맡겨주세요──」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──っと」"
translation = "「──읏」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ご対処ありがとうございます、緋宮会長」"
translation = "「대처해 주셔서 감사합니다, 히노미야 회장」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いや、こちらこそだ。次はちゃんと破片も残さないようにする」"
translation = "「아니, 나야말로 고맙다. 다음엔 제대로 파편도 남기지 않도록 하지」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「な、ななな……！\u3000緋宮会長、さらにパワーアップしてますっ！」"
translation = "「나, 나나나……! 히노미야 회장, 더욱 파워업했어요!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「フィオナちゃんも、霊力ってやつすっかり使いこなしてんねー」"
translation = "「피오나짱도, 영력이라는 거 완전히 잘 다루네ー」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「オ、オオ？\u3000まだ説明もしてないのニ完璧な対処を……もしや星落としのアルバイトでもしていたのかナ？」"
translation = "「무? 아직 설명도 안 했는데 완벽하게 대처를…… 혹시 별 떨구기 아르바이트라도 했던 거냐?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いえ……これは、たまたま体が覚えていた動きというだけです」"
translation = "「아뇨…… 이건, 우연히 몸이 기억하고 있던 움직임일 뿐입니다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（３０００年前の俺も──こうして流星群に対処した。今回だって、やってやれない道理はない）"
translation = "（3000년 전의 나도── 이렇게 유성군에 대처했다. 이번이라고, 해내지 못할 리는 없다）"

[[dialogue]]
speaker = "unk"
original = "拳にみなぎる魔力に霊力、それから星力とを入念に固める。"
translation = "주먹에 넘치는 마력에 영력, 그리고 성력을 공들여 굳힌다."

[[dialogue]]
speaker = "unk"
original = "あの覚醒からしばらく経って……かなりコントロールが効くようになってきた。"
translation = "그 각성으로부터 잠시 시간이 지나…… 상당히 컨트롤이 잘 되게 되었다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「どうする？\u3000クロト」"
translation = "「어떻게 할 거야? 쿠로토」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「まずは起きている事象に対して人命第一で対処する。残ったメンバーで、アポロとネビュラを当たろう」"
translation = "「우선 일어나고 있는 사태에 대해 인명 최우선으로 대처한다. 남은 멤버로, 아폴로와 네뷸라를 상대하자」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「どっちも見逃せないものね」"
translation = "「둘 다 놓칠 수 없는 상대네」"

[[dialogue]]
speaker = "unk"
original = "もちろん時間的余裕はない。俺はネビュラを、フィオナにはアポロを追ってもらう形になるだろう。"
translation = "물론 시간적 여유는 없다. 나는 네뷸라를, 피오나는 아폴로를 쫓게 되는 형태가 될 것이다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「姉さんは、どこに？」"
translation = "「언니는, 어디에 있나요?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「上です。ここから市街地のほうへ進んだ先の、遥か上空に反応があります」"
translation = "「위입니다. 여기서 시가지 쪽으로 나아간 앞, 아득히 상공에 반응이 있습니다」"

[[dialogue]]
speaker = "unk"
original = "アナは人差し指をぴんと立て、天を示した。"
translation = "아나는 검지를 꼿꼿이 세우고, 하늘을 가리켰다."

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「上か──一度も降りてきてないのか？」"
translation = "「위인가── 한 번도 내려오지 않은 건가?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はい。少なくとも今回、少女の目撃情報はありません。ただオーラの反応からして<b>居る</b>のは間違いないかと」"
translation = "「네. 적어도 이번에, 소녀의 목격 정보는 없습니다. 다만 오라의 반응으로 보아 <b>있는</b> 것은 틀림없을 겁니다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「アポロが空から見下ろしてくるのは前例通りだ──けど」"
translation = "「아폴로가 하늘에서 내려다보는 건 전례대로다── 하지만」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「今までのように暴れ回ってはいない……ってのは、気になるな」"
translation = "「지금까지처럼 날뛰고 있지는 않다……는 건, 신경 쓰이네」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はい。現状、地上は相当なパニックですし、襲撃されればひとたまりもないのですが」"
translation = "「네. 현재, 지상은 상당한 패닉 상태이고, 습격당하면 속수무책일 텐데요」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「アポロがどんな状態かは不明なので……こちらから出向く必要があるかと」"
translation = "「아폴로가 어떤 상태인지는 불명이므로…… 저희 쪽에서 나설 필요가 있을까 합니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「フィオナ会長……」"
translation = "「피오나 회장……」"

[[dialogue]]
speaker = "unk"
original = "フィオナは沈鬱な面持ちで、彩られた暗天を見上げていた……。"
translation = "피오나는 침울한 표정으로, 채색된 어두운 하늘을 올려다보고 있었다……."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "（姉さん……）"
translation = "（언니……）"

