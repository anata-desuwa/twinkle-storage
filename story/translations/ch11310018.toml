[[dialogue]]
speaker = "シズル"
original = "「うあっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁぁんっ<emoji=heart04>\u3000はぁっ、はぁっ、はぁっ、こんなに気持ちいいと……お試しじゃなくなっちゃいそうです<emoji=heart04>」"
translation = "「우앗<emoji=heart04> 앙<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 하아아앙<emoji=heart04> 하아, 하아, 하아, 이렇게 기분 좋으면…… 테스트가 아니게 될 것 같아요<emoji=heart04>」"

[[dialogue]]
speaker = "シズル"
original = "「魔王さんっ<emoji=heart04>\u3000好き<emoji=heart04>\u3000好きぃ<emoji=heart04>\u3000魔王ち○ぽしゅきぃ<emoji=heart04>\u3000こんなっ、はしたなくてごめんなさいっ<emoji=heart04>\u3000でもっ<emoji=heart04>\u3000せっくす気持ちよすぎてっ<emoji=heart04>」"
translation = "「마왕님!<emoji=heart04> 좋아해<emoji=heart04> 좋아해애<emoji=heart04> 마왕 자지 좋아아<emoji=heart04> 이렇게 천박해서 미안해요! 하지만!<emoji=heart04> 섹스 너무 기분 좋아서!」"

