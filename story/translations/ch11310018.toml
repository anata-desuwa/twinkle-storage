[[dialogue]]
speaker = "シズル"
original = "「魔王さんっ<emoji=heart04>\u3000好き<emoji=heart04>\u3000しゅきっ<emoji=heart04>\u3000ざーめん出してっ<emoji=heart04>\u3000魔王さんの子種欲しいっ<emoji=heart04>\u3000子宮が求めてるんですっ<emoji=heart04>\u3000魔王さんの子種で孕みたいって<emoji=heart04>」"
