translation = "「음응~<emoji=heart04> 후아<emoji=heart04> 앙<emoji=heart04> 기뻐요<emoji=heart04> 응앗<emoji=heart04> 앗<emoji=heart04> 저도!<emoji=heart04> 좋아해<emoji=heart04> 좋아해요 마왕님!<emoji=heart04> 좋아좋아좋아!<emoji=heart04><emoji=heart04><emoji=heart04>」"

