[[dialogue]]
speaker = "シズル"
original = "「んおおっ<emoji=heart04>\u3000ふおっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000おんっ<emoji=heart04>\u3000ち○ぽしゅご<emoji=heart04>\u3000魔王さん<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000んあぁっっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000好き<emoji=heart04>\u3000好きぃ<emoji=heart04>」"
