[[dialogue]]
speaker = "シズル"
original = "「んあぁぁ～～っ<emoji=heart04>\u3000はぁん<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふあぁぁっ<emoji=heart04>\u3000もう無理っ<emoji=heart04>\u3000けものみたいにはしたなく声出してっ、魔王さんのち○ぽに夢中になっちゃいますっ<emoji=heart04>」"
translation = "「응아아아~~앗<emoji=heart04> 하앙<emoji=heart04> 앗<emoji=heart04> 후아아앗<emoji=heart04> 이제 무리! 짐승처럼 천박하게 소리 지르며 마왕님 자지에 빠져버릴게요!<emoji=heart04>」"

[[dialogue]]
speaker = "シズル"
original = "「んおっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000奥刺さるっ<emoji=heart04>\u3000ち○ぽっ<emoji=heart04>\u3000しゅごっ<emoji=heart04>\u3000もっと気持ちよくなりたいっ<emoji=heart04>\u3000魔王さんっ<emoji=heart04>\u3000魔王さんっ<emoji=heart04>\u3000好き<emoji=heart04>\u3000好きぃ～～～っ<emoji=heart04>」"
translation = "「응옷<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 깊숙이 박혀!<emoji=heart04> 고추!<emoji=heart04> 죽여줘!<emoji=heart04> 더 기분 좋아지고 싶어! 마왕님!<emoji=heart04> 마왕님!<emoji=heart04> 좋아해<emoji=heart04> 좋아해애에~~~!<emoji=heart04>」"

[[dialogue]]
