translation = "「시즈루 씨!<emoji=heart04> 시즈루 씨!<emoji=heart04> 시즈루~~!<emoji=heart04>」"

[[dialogue]]
speaker = "シズル"
original = "「んんぅ～～～～っ<emoji=heart04>\u3000イぐっ<emoji=heart04>\u3000イぐうっ<emoji=heart04>\u3000名前呼ばれてイっちゃううぅ～～～っ<emoji=heart04>\u3000魔王さんっ<emoji=heart04>\u3000魔王さんっ<emoji=heart04>\u3000好きですっ<emoji=heart04>\u3000好き好き好きぃっ<emoji=heart04>」"
translation = "「음응으~~~~앗<emoji=heart04> 가버려<emoji=heart04> 가버려엇<emoji=heart04> 이름 불려서 가버려어어~~~!<emoji=heart04> 마왕님!<emoji=heart04> 마왕님!<emoji=heart04> 좋아해요!<emoji=heart04> 좋아좋아좋아아!<emoji=heart04>」"

[[dialogue]]
speaker = "シズル"
original = "「もうっ、私イくからっ<emoji=heart04>\u3000魔王さんもっ<emoji=heart04>\u3000ざーめん<emoji=heart04>\u3000ざーめん出してぇっ<emoji=heart04>\u3000私に出してっ<emoji=heart04>\u3000私のおま○こにざーめん出してぇぇ～っ<emoji=heart04>」"
translation = "「이제 나 갈 거니까!<emoji=heart04> 마왕님도!<emoji=heart04> 정액<emoji=heart04> 정액 싸줘엇!<emoji=heart04> 나한테 싸줘!<emoji=heart04> 내 보지에 정액 싸줘어어~~!<emoji=heart04>」"

[[dialogue]]
speaker = "シズル"
original = "「んおっ<emoji=heart04>\u3000おおっ<emoji=heart04>\u3000んおっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000イぐ<emoji=heart04>\u3000おっきいの来る<emoji=heart04>\u3000イぐっ<emoji=heart04>\u3000もう無理ぃぃ～っ<emoji=heart04>\u3000魔王さんっ<emoji=heart04>\u3000イきますっ<emoji=heart04>\u3000イぐイぐイぐイぐぅっっ<emoji=heart04>」"
translation = "「응옷<emoji=heart04> 오옷<emoji=heart04> 응옷<emoji=heart04> 앗<emoji=heart04> 간다<emoji=heart04> 큰 거 온다<emoji=heart04> 가버려!<emoji=heart04> 이제 무리이이~~!<emoji=heart04> 마왕님!<emoji=heart04> 가요! 가가가가앗!!<emoji=heart04>」"

[[dialogue]]
speaker = "シズル"
original = "「んおおおおおぉ～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응오오오오오오오~~~~~~~~~~~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "シズル"
original = "「んぐっ<emoji=heart04>\u3000すごっ<emoji=heart04>\u3000ざーめん出てるっ<emoji=heart04>\u3000とどめ刺すみたいにっ<emoji=heart04>\u3000びゅるびゅる出てるっ<emoji=heart04>\u3000私がせっくす教えるつもりだったのにっ<emoji=heart04>」"
translation = "「응긋<emoji=heart04> 대박<emoji=heart04> 정액 나오고 있어!<emoji=heart04> 확인 사살하는 것처럼!<emoji=heart04> 울컥울컥 나오고 있어!<emoji=heart04> 내가 섹스 가르쳐주려던 거였는데!」"

[[dialogue]]
speaker = "シズル"
original = "「魔王さんのざーめんでっ<emoji=heart04>\u3000イかされてるっ<emoji=heart04>\u3000んおおおおっ<emoji=heart04>\u3000おほっ<emoji=heart04>\u3000ほっ<emoji=heart04>\u3000多すぎっ<emoji=heart04>\u3000全部っ<emoji=heart04>\u3000子宮にっっ<emoji=heart04>\u3000こんなの入りきらないっ<emoji=heart04>」"
translation = "「마왕님의 정액으로!<emoji=heart04> 가버리고 있어! 응오오오옷<emoji=heart04> 오홋<emoji=heart04> 홋<emoji=heart04> 너무 많아!<emoji=heart04> 전부 다!<emoji=heart04> 자궁에에!!<emoji=heart04> 이런 거 다 안 들어가앗!<emoji=heart04>」"

[[dialogue]]
speaker = "シズル"
original = "「はぁぁ～～っ<emoji=heart04>\u3000あはぁっ<emoji=heart04>\u3000はぁ<emoji=heart04>\u3000はぁ<emoji=heart04>\u3000んんん～～～っ<emoji=heart04>\u3000まだ出るの？\u3000ううっ、こんなに出されたらおかしくなっちゃいますっ<emoji=heart04>」"
translation = "「하아아~~앗<emoji=heart04> 아하앗<emoji=heart04> 하아<emoji=heart04> 하아<emoji=heart04> 응응응~~~앗<emoji=heart04> 아직도 나와요? 으으, 이렇게나 싸버리면 이상해져 버려요!<emoji=heart04>」"

[[dialogue]]
speaker = "シズル"
original = "「魔王さんっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000好き……です<emoji=heart04>\u3000こんなせっくすしたら、好きになっちゃいます<emoji=heart04>\u3000ダメなのにっ、ううう～っ、しゅきぃ<emoji=heart04>」"
translation = "「마왕님!<emoji=heart04> 응읏<emoji=heart04> 좋아……해요<emoji=heart04> 이런 섹스하면 좋아하게 돼버려요<emoji=heart04> 안 되는데, 으으으~, 좋아해애<emoji=heart04>」"

[[dialogue]]
speaker = "シズル"
original = "「はぁっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000犯してたはずなのに……ふふっ、犯されてしまった後みたいです……<emoji=heart04>」"
translation = "「하앗<emoji=heart04> 하앗<emoji=heart04> 하앗<emoji=heart04> 범하고 있었을 텐데…… 후훗, 범해져 버린 뒤 같네요……<emoji=heart04>」"

[[dialogue]]
speaker = "シズル"
original = "「ううっ……ふぅぅ～～～っ<emoji=heart04>\u3000ようやく……射精終わりましたか……んもう、長すぎですよ<emoji=heart04>\u3000どれだけ出すんですか<emoji=heart04>\u3000こんなに出したら、孕んでも知りませんよ<emoji=heart04>」"
translation = "「으으…… 후우우우~~~<emoji=heart04> 드디어…… 사정 끝났나요…… 정말이지, 너무 길어요<emoji=heart04> 얼마나 싸는 건가요<emoji=heart04> 이렇게 싸버리면 임신해도 모른다고요<emoji=heart04>」"

[[dialogue]]
speaker = "シズル"
original = "「んふぅぅ～～～～っ<emoji=heart04>\u3000はぁ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000おち○ぽ抜きましたよ……わぁ、どろっどろでスケベですね<emoji=heart04>」"
translation = "「응후우우우~~~~앗<emoji=heart04> 하아<emoji=heart04> 하앗<emoji=heart04> 자지 뺐어요…… 와아, 질척질척하고 야하네요<emoji=heart04>」"

[[dialogue]]
speaker = "シズル"
original = "「ううっ、抜いたらぶりゅぶりゅ出てきます<emoji=heart04>\u3000ほとんど固形じゃないですか<emoji=heart04>\u3000もお、量も多いですが、濃すぎ<emoji=heart04>\u3000魔王ともなると、繁殖力も桁違いなんですね<emoji=heart04>」"
translation = "「으으, 빼니까 꿀렁꿀렁 흘러나와요<emoji=heart04> 거의 고형물 수준이잖아요<emoji=heart04> 정말이지 양도 많지만 너무 진해요<emoji=heart04> 마왕이라 그런지 번식력도 차원이 다르네요<emoji=heart04>」"

[[dialogue]]
speaker = "シズル"
original = "「こんなの……せつな１人では太刀打ち出来るはずありませんね……もう、スケベ<emoji=heart04>」"
translation = "「이런 건…… 세츠나 혼자서는 상대가 될 리가 없네요…… 정말, 변태<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ごめん……自分でもここまでとは思わなくて……」"
translation = "「미안…… 나도 이 정도일 줄은 몰랐어……」"

[[dialogue]]
speaker = "シズル"
original = "「魔王さんは、好き好き言いながらのせっくすがツボだったみたいですね<emoji=heart04>」"
translation = "「마왕님은 좋아해 좋아해 말하면서 하는 섹스가 취향이었나 보네요<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「否定しないよ。めちゃくちゃ興奮した」"
translation = "「부정하지 않을게. 엄청나게 흥분했어」"

[[dialogue]]
speaker = "シズル"
original = "「私も……途中から房中術を忘れて本気せっくすしちゃいましたから、おあいこですよ<emoji=heart04>」"
translation = "「저도…… 도중에 방중술은 잊고 진심으로 섹스해버렸으니까, 비긴 걸로 해요<emoji=heart04>」"

[[dialogue]]
speaker = "シズル"
original = "「でも、少し悔しいですね。魔王さんのおち○ぽを、私のおま○この虜にさせたかったのに<emoji=heart04>」"
translation = "「하지만 조금 분하네요. 마왕님 자지를 제 보지의 노예로 만들고 싶었는데<emoji=heart04>」"

[[dialogue]]
speaker = "シズル"
original = "「あっ、もう虜になってる、とか言わなくていいですからね<emoji=heart04>\u3000私が言いたいのは、そういうことではなくて……」"
translation = "「앗, 이미 노예가 됐어, 같은 말은 안 해도 되니까요<emoji=heart04> 제가 말하고 싶은 건 그런 게 아니라……」"

[[dialogue]]
speaker = "シズル"
original = "「魔王さんとのせっくす、とっても素敵だったから……もう１戦、お相手してくれませんか<emoji=heart04>」"
translation = "「마왕님과의 섹스, 너무 멋졌으니까…… 한 판 더, 상대해 주지 않을래요?<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「こちらこそ、是非お願いしますっ！」"
translation = "「저야말로, 부디 부탁드립니다!」"

[[dialogue]]
speaker = "シズル"
original = "「うふふっ、ではこれから房中術を駆使して、魔王さんをメロメロにさせちゃいますね<emoji=heart04>」"
translation = "「우후훗, 그럼 이제부터 방중술을 구사해서 마왕님을 헤롱헤롱하게 만들어버릴게요<emoji=heart04>」"

[[dialogue]]
speaker = "シズル"
original = "「そして……何度も何度も、シズル<emoji=heart04>\u3000好き<emoji=heart04>\u3000って言わせるんですからっ」"
translation = "「그리고…… 몇 번이고 몇 번이고, 시즈루 좋아해 라고 말하게 할 거니까요!」"

[[dialogue]]
speaker = "クロト"
original = "「シズル<emoji=heart04>\u3000好き<emoji=heart04>」"
translation = "「시즈루, 좋아해<emoji=heart04>」"

[[dialogue]]
speaker = "シズル"
original = "「もうっ、今言わなくていいんですっ<emoji=heart04>\u3000ハメっこしながら言うのが、一番気持ちいいんですからぁ～～～っ<emoji=heart04>」"
translation = "「정말, 지금 말할 필요 없다고요!<emoji=heart04> 박으면서 말하는 게 제일 기분 좋으니까아아~~~!<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "こうして俺とシズルさんは、好き好き言い合いながら、ひたすら肉欲を貪るのだった。"
