[[dialogue]]
speaker = "シズル"
original = "「ふぉぉ～～<emoji=heart04>\u3000おおっ<emoji=heart04>\u3000魔王さんのち○ぽ強すぎぃ<emoji=heart04>\u3000ううっ<emoji=heart04>\u3000んうっ<emoji=heart04>\u3000わ、私のま○こと相性ばっちりです<emoji=heart04>\u3000房中術のお試しのつもりなのにっ<emoji=heart04>」"
