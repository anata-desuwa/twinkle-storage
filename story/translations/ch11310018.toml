[[dialogue]]
speaker = "unk"
original = "すっかり油断していた俺は、あろうことかシズルさんに一服盛られてしまった！"
translation = "완전히 방심하고 있던 나는, 설마 했던 시즈루 씨에게 약을 먹히고 말았다!"

[[dialogue]]
speaker = "unk"
original = "股間はズキズキするほど膨らみ、脳内はピンクのヴェールがかかったみたいに霞がかる。"
translation = "가랑이는 욱신거릴 정도로 부풀어 오르고, 머릿속은 핑크색 베일을 쓴 것처럼 흐릿해진다."

[[dialogue]]
speaker = "シズル"
original = "「ふふふっ、秘薬もしっかり効いてきたみたいですね<emoji=heart04>」"
translation = "「후후후, 비약이 확실히 잘 듣는 모양이네요<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「シズルさん……こ、これは……どういうつもりですか？」"
translation = "「시즈루 씨…… 이, 이건…… 무슨 속셈인가요?」"

[[dialogue]]
speaker = "シズル"
original = "「野暮なことを訊かないで下さい。ここにいるのは一対のオスとメス。することなんて１つしかありません」"
translation = "「야박하게 묻지 마세요. 여기 있는 건 한 쌍의 수컷과 암컷. 할 일은 하나밖에 없답니다」"

[[dialogue]]
speaker = "シズル"
original = "「さあ、参りましょう。恐がらないで……身も心も私に委ねて下さい」"
translation = "「자, 가죠. 무서워하지 말고…… 몸도 마음도 제게 맡겨주세요」"

[[dialogue]]
speaker = "シズル"
original = "「弟子のせつなに代わって、師の私が房中術を味わわせてあげますね<emoji=heart04>」"
translation = "「제자인 세츠나 대신에, 스승인 제가 방중술을 맛보게 해드릴게요<emoji=heart04>」"

[[dialogue]]
speaker = "シズル"
original = "「うふふ～、このままでもいいですが、も～っと気持ちよくするために、秘薬の香を焚きましょう」"
translation = "「우후후~, 이대로도 좋지만 더~ 기분 좋게 만들기 위해서 비약의 향을 피울게요」"

[[dialogue]]
speaker = "シズル"
original = "「これでよし。ささ、魔王さん……行きますよ～」"
translation = "「이걸로 됐어. 자자, 마왕님…… 갑니다~」"

[[dialogue]]
speaker = "シズル"
original = "「どぉーんっ<emoji=heart04>」"
translation = "「둥~!<emoji=heart04>」"

[[dialogue]]
speaker = "シズル"
original = "「大人しくして下さいね～、抵抗しちゃ嫌ですよ。じっとしていたら、す～ぐ気持ちよくなりますからね～♪」"
translation = "「얌전히 계세요~, 저항하면 싫어요. 가만히 있으면 금~방 기분 좋아질 테니까요~♪」"

[[dialogue]]
speaker = "クロト"
original = "「クッ、動けないっ……」"
translation = "「큭, 움직일 수 없어……」"

[[dialogue]]
speaker = "シズル"
original = "「忍の体術で押さえつけていますから、逃げられるとは思わないことです<emoji=heart04>」"
translation = "「닌자의 체술로 억누르고 있으니, 도망칠 수 있다고는 생각하지 마세요<emoji=heart04>」"

[[dialogue]]
speaker = "シズル"
original = "「ねえ、魔王さん、そんなに嫌ですか？\u3000おち○ぽをこんなにギンギンにさせてるのに～」"
translation = "「저기, 마왕님, 그렇게 싫으세요? 자지를 이렇게나 꼿꼿하게 세우고 계시면서~」"

[[dialogue]]
speaker = "シズル"
original = "「こっちはとっても素直なのに……ねぇ？」"
translation = "「이쪽은 아주 솔직한데…… 그쵸?」"

[[dialogue]]
speaker = "シズル"
original = "「房中術のお試しみたいなものですよ。ほら～、気持ちよくないですか？\u3000ちっちゃくてぷにぷにの割れ目に押し当てられて……むにゅ～って……」"
translation = "「방중술 테스트 같은 거예요. 봐요~, 기분 좋지 않나요? 작고 말랑말랑한 갈라진 틈에 짓눌려서…… 뭉클~ 하게……」"

[[dialogue]]
speaker = "クロト"
original = "「き、気持ちいいけどっ……」"
translation = "「기, 기분 좋긴 하지만……」"

[[dialogue]]
speaker = "シズル"
original = "「なら、いいじゃないですか。もっと本能に従いましょ？\u3000魔王さんも気持ちよくなって、私も気持ちよくなって……まさにうぃんうぃんです♪」"
translation = "「그럼 됐잖아요. 좀 더 본능에 따르자고요? 마왕님도 기분 좋아지고, 저도 기분 좋아지고…… 그야말로 윈윈이에요♪」"

[[dialogue]]
speaker = "シズル"
original = "「うふふ……おち○ぽビクンってしましたね。魔王さん、えろ～い<emoji=heart04>\u3000こんなでっかいおち○ぽなんですから、使わないと勿体ないですよ～♪」"
translation = "「우후후…… 자지가 파르르 떨렸네요. 마왕님, 야해라<emoji=heart04> 이런 커다란 자지니까 쓰지 않으면 아깝다고요~♪」"

[[dialogue]]
speaker = "シズル"
original = "「というか、こっちが我慢できなくなってきました。自分で作った秘薬ですけど、ほんと効果抜群ですね」"
translation = "「그보다, 이쪽이 참을 수 없게 됐어요. 직접 만든 비약이지만 정말 효과 발군이네요」"

[[dialogue]]
speaker = "シズル"
original = "「ほら、見て下さい。魔王さんのおち○ぽがくっついてるとこ……私のおま○こ、もうこんなに濡れちゃってますよ……」"
translation = "「자, 보세요. 마왕님 자지가 닿아있는 곳…… 제 보지, 벌써 이렇게 젖어버렸어요……」"

[[dialogue]]
speaker = "シズル"
original = "「魔王さんのかっこいいち○ちん食べたいよ～ってうずうずしてるんです。こ～んなえっちなよだれを垂らして……んんっ、ま○ずり気持ちいい……本気になっちゃう……」"
translation = "「마왕님의 멋진 고추 먹고 싶어~ 라며 근질근질해하고 있어요. 이~렇게 야한 침을 흘리면서…… 응읏, 보지 비비기 기분 좋아…… 진심이 돼버려……」"

[[dialogue]]
speaker = "シズル"
original = "「くちゅっ、くちゅって……やらしー音してるの聞こえますか？\u3000魔王さんの竿もぬるぬるになってますよ～。ごめんなさい、スケベ汁なすりつけちゃって<emoji=heart04>」"
translation = "「질척, 질척하고…… 야한 소리 나는 거 들리세요? 마왕님의 기둥도 미끈미끈해졌어요. 미안해요, 음란한 즙을 문질러버려서<emoji=heart04>」"

[[dialogue]]
speaker = "シズル"
original = "「こんなになっちゃうくらい、魔王さんのおち○ぽが欲しいんです<emoji=heart04>\u3000ねえ、魔王さん<emoji=heart04>\u3000ねえってば<emoji=heart04>\u3000してもいいよね？\u3000ち○ちんハメてもいいよね？」"
translation = "「이렇게 되어버릴 만큼 마왕님 자지가 갖고 싶어요<emoji=heart04> 저기, 마왕님<emoji=heart04> 저기요<emoji=heart04> 해도 되죠? 고추 박아도 되죠?」"

[[dialogue]]
speaker = "シズル"
original = "「やだって言っても、ハメちゃうんですからっ<emoji=heart04>\u3000えへへへ～」"
translation = "「싫다고 해도 박아버릴 거니까요<emoji=heart04> 에헤헤헤~」"

[[dialogue]]
speaker = "シズル"
original = "「暴れたって逃がしませんよ～。魔王さんはここで私に無理矢理食べられちゃうんです<emoji=heart04>」"
translation = "「날뛰어도 안 놓칠 거예요~. 마왕님은 여기서 제게 억지로 먹혀버리는 거예요<emoji=heart04>」"

[[dialogue]]
speaker = "シズル"
original = "「後はただ、気持ちよくなって、どぴゅ～ってすることだけ考えて……私の体を感じて下さい……<emoji=heart04>」"
translation = "「나중엔 그저 기분 좋아져서, 푸슉~ 하고 싸는 것만 생각하고…… 제 몸을 느껴주세요……<emoji=heart04>」"

[[dialogue]]
speaker = "シズル"
original = "「じゃあ、挿れますね<emoji=heart04>\u3000ち○ちん食べちゃいます<emoji=heart04>\u3000私のちびま○こに……むにゅう～～～って……頂きまぁす<emoji=heart04>」"
translation = "「그럼, 넣을게요<emoji=heart04> 고추 먹어버릴게요<emoji=heart04> 제 꼬마 보지에…… 쭈욱~~~~ 하고…… 잘 먹겠습니다<emoji=heart04>」"

[[dialogue]]
speaker = "シズル"
original = "「んあぁぁっ！\u3000はぁっ！\u3000あっ……おっきい<emoji=heart04>\u3000魔王さんのおち○ぽ、すごくいいですよ～<emoji=heart04>」"
translation = "「응아아앗! 하앗! 앗…… 커어<emoji=heart04> 마왕님 자지, 너무 좋아요~<emoji=heart04>」"

[[dialogue]]
speaker = "シズル"
original = "「ごめんなさい、全部は入りませんでしたぁ<emoji=heart04>\u3000これほどのち○ぽ、きっとせつなでは持て余すでしょうね」"
translation = "「미안해요, 다 안 들어갔어요<emoji=heart04> 이 정도의 고추, 분명 세츠나라면 감당 못 하겠네요」"

[[dialogue]]
speaker = "シズル"
original = "「でも、私なら大丈夫ですよ。おま○こ小さすぎて無理だって思うかもしれませんけど、房中術を使えば……ちゃ～んと根元までぱっくん出来ますから<emoji=heart04>」"
translation = "「하지만 저라면 괜찮아요. 보지가 너무 작아서 무리라고 생각할지도 모르지만, 방중술을 쓰면…… 제~대로 뿌리까지 꿀꺽할 수 있으니까요<emoji=heart04>」"

[[dialogue]]
speaker = "シズル"
original = "「んんぅっ……<emoji=heart04>\u3000おっき<emoji=heart04>\u3000子袋押し上げられちゃいます<emoji=heart04>\u3000も～、全然興味なさそうなこと言ってて、えっぐいち○ちんですね～。こんなの女の子は一発で堕ちちゃいますよ<emoji=heart04>」"
translation = "「음응읏……<emoji=heart04> 커어<emoji=heart04> 아기집까지 밀려 올라가 버려요<emoji=heart04> 정말, 전혀 관심 없는 척하더니 흉악한 고추네요~. 이런 거 여자애들은 한 방에 타락해버릴걸요<emoji=heart04>」"

[[dialogue]]
speaker = "シズル"
original = "「私は房中術の使い手ですから、いくら魔王さんのおち○ぽが女殺しでも、絶対負けませんよ～<emoji=heart04>」"
translation = "「저는 방중술사니까, 아무리 마왕님 자지가 여자 킬러라도 절대 안 져요~<emoji=heart04>」"

[[dialogue]]
speaker = "シズル"
original = "「魔王さんのイケちんと……あんっ<emoji=heart04>\u3000房中術の使い手のえっちま○こ<emoji=heart04>\u3000どっちがつよいか、勝負しましょうね～<emoji=heart04>」"
translation = "「마왕님의 멋진 고추랑…… 앙<emoji=heart04> 방중술사의 야한 보지<emoji=heart04> 어느 쪽이 더 강한지 승부하자고요~<emoji=heart04>」"

[[dialogue]]
speaker = "シズル"
original = "「ふふふ、私の肉壺も、ようやく魔王さんのデカちんに馴染んできましたね～<emoji=heart04>\u3000どうですか～、根元までずっぽり入ってますよ～<emoji=heart04>」"
translation = "「후후후, 제 고기 항아리도 겨우 마왕님의 대물 고추에 길들여졌네요~<emoji=heart04> 어때요~, 뿌리까지 쑥 들어갔어요~<emoji=heart04>」"

[[dialogue]]
speaker = "シズル"
original = "「ぬるぬるでプリプリの膣襞で気持ちよ～く……しこ<emoji=heart04>\u3000しこ<emoji=heart04>\u3000してあげますからね～<emoji=heart04>」"
translation = "「미끈미끈하고 탱글탱글한 질 벽으로 기분 좋~게…… 슥<emoji=heart04> 삭<emoji=heart04> 해드릴게요~<emoji=heart04>」"

[[dialogue]]
speaker = "シズル"
original = "「んしょ<emoji=heart04>\u3000んしょ<emoji=heart04>\u3000えへへ～、気持ちいい上下運動ですね～<emoji=heart04>\u3000こうしてゆ～っくり、出したり入れたりして～<emoji=heart04>\u3000んふっ<emoji=heart04>\u3000気持ちいい<emoji=heart04>\u3000もっとぬぽぬぽしますね<emoji=heart04>」"
translation = "「영차<emoji=heart04> 영차<emoji=heart04> 에헤헤~, 기분 좋은 상하 운동이네요~<emoji=heart04> 이렇게 천~천히 넣었다 뺐다 하며~<emoji=heart04> 응훗<emoji=heart04> 기분 좋아<emoji=heart04> 더 찌걱찌걱할게요<emoji=heart04>」"

[[dialogue]]
speaker = "シズル"
original = "「魔王さんはどうですか～？\u3000ち○ちん気持ちいいですか～？\u3000私のおま○こ、気に入ってくれるといいんですが……」"
translation = "「마왕님은 어떠세요~? 고추 기분 좋은가요~? 제 보지, 맘에 들어 해주시면 좋겠는데……」"

[[dialogue]]
speaker = "クロト"
original = "「き、気持ちいい……よっ」"
translation = "「기, 기분 좋아……」"

[[dialogue]]
speaker = "シズル"
original = "「ふふふっ、当然ですよね～。男の子のおち○ちんは、おま○こに挿れるのがいちば～ん気持ちいいんですから<emoji=heart04>」"
translation = "「후후훗, 당연하죠~. 남자애 고추는 보지에 박는 게 가~장 기분 좋으니까요<emoji=heart04>」"

[[dialogue]]
speaker = "シズル"
original = "「おち○ちんはおま○こに勝てなくてぇ<emoji=heart04>\u3000でもでもっ、おま○こも……おち○ちんには勝てないんですよ<emoji=heart04>\u3000これ、大事なことですから覚えて下さいね<emoji=heart04>」"
translation = "「고추는 보지를 이길 수 없고<emoji=heart04> 하지만 하지만! 보지도…… 고추에게는 못 이긴답니다<emoji=heart04> 이거 중요한 거니까 기억해 두세요<emoji=heart04>」"

[[dialogue]]
speaker = "シズル"
original = "「んふっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000やだ<emoji=heart04>\u3000気持ちよくてえっちな声出ちゃう<emoji=heart04>\u3000魔王さん<emoji=heart04>\u3000魔王さん～っ<emoji=heart04>」"
translation = "「응훗<emoji=heart04> 아앙<emoji=heart04> 싫어<emoji=heart04> 기분 좋아서 야한 목소리가 나와버려<emoji=heart04> 마왕님<emoji=heart04> 마왕님~!<emoji=heart04>」"

[[dialogue]]
speaker = "シズル"
original = "「はぁ<emoji=heart04>\u3000はぁ<emoji=heart04>\u3000こんな風に生殖器同士をぬぷ<emoji=heart04>\u3000ぬぷ<emoji=heart04>\u3000擦り合ってたら……好きになっちゃいそうですよね～<emoji=heart04>」"
translation = "「하아<emoji=heart04> 하아<emoji=heart04> 이런 식으로 생식기끼리 질척<emoji=heart04> 질척<emoji=heart04> 비비고 있으면…… 좋아하게 돼버릴 것 같아요~<emoji=heart04>」"

[[dialogue]]
speaker = "シズル"
original = "「ふふっ、恐がらないで下さい<emoji=heart04>\u3000ぜ～んぶ本能のせいですから<emoji=heart04>\u3000気持ちい～いえっちすると、遊びのハメっこでも好きになっちゃうんですよ～<emoji=heart04>」"
translation = "「후후, 겁내지 마세요<emoji=heart04> 전~부 본능 때문이니까요<emoji=heart04> 기분 좋~게 섹스하면 놀이로 하는 관계라도 좋아하게 되는 법이에요~<emoji=heart04>」"

[[dialogue]]
speaker = "シズル"
original = "「さぁ、魔王さん……シズル<emoji=heart04>\u3000って呼んで下さい<emoji=heart04>\u3000シズル好き<emoji=heart04>\u3000って言って<emoji=heart04>\u3000好き好き言い合いながらするせっくすがどれだけ気持ちいいか教えてあげます<emoji=heart04>」"
translation = "「자, 마왕님…… 시즈루<emoji=heart04> 라고 불러주세요<emoji=heart04> 시즈루 좋아해<emoji=heart04> 라고 말해줘요<emoji=heart04> 좋아한다 말하며 나누는 섹스가 얼마나 기분 좋은지 가르쳐드릴게요<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ううっ……シズルさん……」"
translation = "「으으…… 시즈루 씨……」"

[[dialogue]]
speaker = "シズル"
original = "「はい、魔王さん<emoji=heart04>\u3000えっちなシズルさんですよ<emoji=heart04>\u3000魔王さんのち○ちん気持ちよくしてくれる、えっちえっちなシズルさんですよ～<emoji=heart04>」"
translation = "「네, 마왕님<emoji=heart04> 야한 시즈루 씨예요<emoji=heart04> 마왕님 고추를 기분 좋게 해줄 음란하고 야한 시즈루 씨예요~<emoji=heart04>」"

[[dialogue]]
speaker = "シズル"
original = "「魔王さん<emoji=heart04>\u3000好き<emoji=heart04>\u3000魔王さんっ<emoji=heart04>\u3000好きぃ<emoji=heart04>\u3000んんん～っ、すっご<emoji=heart04>\u3000おち○ぽおっきくなりましたぁ<emoji=heart04>」"
translation = "「마왕님<emoji=heart04> 좋아해<emoji=heart04> 마왕님!<emoji=heart04> 좋아해요오<emoji=heart04> 응응응~, 대박<emoji=heart04> 자지가 더 커졌어요<emoji=heart04>」"

[[dialogue]]
speaker = "シズル"
original = "「さぁ、魔王さんも<emoji=heart04>\u3000好きって言って<emoji=heart04>\u3000私がぬぷぬぷするのに合わせてっ<emoji=heart04>\u3000好きって言って<emoji=heart04>」"
translation = "「자, 마왕님도<emoji=heart04> 좋아한다고 말해줘요<emoji=heart04> 제가 찌걱거리는 박자에 맞춰서<emoji=heart04> 좋아한다고 해줘요<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「シズルさんっ、好き<emoji=heart04>\u3000好きっ<emoji=heart04>\u3000好きだっ<emoji=heart04>」"
