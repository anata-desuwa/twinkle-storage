[[dialogue]]
speaker = "シズル"
original = "「これするとすぐどぴゅってしちゃうのに<emoji=heart04>\u3000もう無理<emoji=heart04>\u3000これ以上我慢できませんっ<emoji=heart04>\u3000魔王さんっ<emoji=heart04>\u3000好き<emoji=heart04>\u3000本気で動きますね<emoji=heart04>\u3000ざーめん出すまで止めませんからっ<emoji=heart04>」"
