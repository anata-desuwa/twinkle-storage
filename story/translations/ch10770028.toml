[[dialogue]]
speaker = "unk"
original = "忙しかったクリスマスも終わりを迎えた翌日。今日はこの後、数日ぶりに蘭美と会う約束をしており、星徒会室には他の役員は誰も来ない。"
translation = "바빴던 크리스마스도 끝을 맞이한 다음 날. 오늘은 이따가, 며칠 만에 라비와 만날 약속을 했으며, 성도회실에는 다른 임원은 아무도 오지 않는다."

[[dialogue]]
speaker = "unk"
original = "少しだけ残っていた仕事も片づけて、約束の時間まではあと少しだけある。これなら少しくらい仮眠を取っても大丈夫だろう、そんな風に考えてうとうとしていた時のことだった。"
translation = "조금 남아있던 일도 정리하고, 약속 시간까지는 아주 조금 남아있다. 이 정도면 잠깐 눈을 붙여도 괜찮겠지, 그렇게 생각하며 꾸벅꾸벅 졸고 있을 때였다."

[[dialogue]]
speaker = "蘭美"
original = "「はぁっ、はぁっ……んっ、会長<emoji=heart04>」"
translation = "「하앗, 하앗……응, 회장<emoji=heart04>」"

[[dialogue]]
speaker = "蘭美"
original = "「会長が寝ちゃうのが……っ、悪いんだから……ん……っ」"
translation = "「회장이 잠들어 버린 게……윽, 나쁜 거니까……응……윽」"

[[dialogue]]
speaker = "蘭美"
original = "「はぁぁぁん<emoji=heart04>\u3000あぁぁぁっ、おち○ぽ<emoji=heart04>\u3000会長のおち○ぽだわっ<emoji=heart04>」"
translation = "「하아아앙<emoji=heart04> 아아아앗, 자지<emoji=heart04> 회장의 자지야앗<emoji=heart04>」"

[[dialogue]]
speaker = "蘭美"
original = "「も、もう、我慢できないわ<emoji=heart04>\u3000あぁぁぁ、会長、ごめんなさいっ<emoji=heart04>\u3000エッチなことで頭がいっぱいで、はぁぁん<emoji=heart04>\u3000もう、これ以上は無理なのぉ<emoji=heart04>」"
translation = "「모, 이제, 참을 수 없어<emoji=heart04> 아아아, 회장, 미안해엣<emoji=heart04> 야한 생각으로 머리가 가득 차서, 하아아앙<emoji=heart04> 이제, 더 이상은 무리야아<emoji=heart04>」"

[[dialogue]]
speaker = "蘭美"
original = "「はぁ<emoji=heart04>\u3000はぁ<emoji=heart04>\u3000はぁ<emoji=heart04>\u3000おち○ぽ、会長のおち○ぽ<emoji=heart04>\u3000びちょびちょのおま○こに当たってるぅぅ<emoji=heart04>\u3000あはぁぁ<emoji=heart04>」"
translation = "「하아<emoji=heart04> 하아<emoji=heart04> 하아<emoji=heart04> 자지, 회장의 자지<emoji=heart04> 축축한 보지에 닿고 있어으으<emoji=heart04> 아하아아<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「えっ！？\u3000ら、蘭美……！？」"
translation = "「엣!? 라, 라비……!?」"

[[dialogue]]
speaker = "蘭美"
original = "「か、会長<emoji=heart04>\u3000ようやく、起きたのねっ<emoji=heart04>\u3000あぁぁん<emoji=heart04>\u3000おち○ぽ、入り口に擦れるだけで、気持ちいい……<emoji=heart04>」"
translation = "「카, 회장<emoji=heart04> 드디어, 일어났구나앗<emoji=heart04> 아아앙<emoji=heart04> 자지, 입구에 스치는 것만으로, 기분 좋아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "うたた寝から目を覚ますと、なぜかズボンははぎ取られ、恋人が興奮で顔を真っ赤にしながら、素股をしていた。"
translation = "선잠에서 눈을 뜨자, 어째선지 바지는 벗겨져 있고, 연인이 흥분으로 얼굴을 새빨갛게 물들이며, 스마타를 하고 있었다."

[[dialogue]]
speaker = "蘭美"
original = "「発情抑制薬は、どうしたのかって……？\u3000はぁぁぁ<emoji=heart04>\u3000わ、忘れちゃったのぉ<emoji=heart04>」"
translation = "「발정 억제약은, 어떻게 했냐고……? 하아아아<emoji=heart04> 와, 잊어버렸어어<emoji=heart04>」"

[[dialogue]]
speaker = "蘭美"
original = "「か、会長が、悪いんだからねっ<emoji=heart04>\u3000私の種族は、はぁぁん<emoji=heart04>\u3000万年発情期で、性欲も繁殖力も強いって……言ってあったのにぃ<emoji=heart04>\u3000はぁぁ<emoji=heart04>」"
translation = "「카, 회장이, 나쁜 거라구웃<emoji=heart04> 내 종족은, 하아앙<emoji=heart04> 만년 발정기라서, 성욕도 번식력도 강하다고……말해뒀는데에<emoji=heart04> 하아아<emoji=heart04>」"

[[dialogue]]
speaker = "蘭美"
original = "「通年で、抑制薬を飲んでたって……好きな人が出来たら、あぁぁん<emoji=heart04>\u3000時折エッチがしたくなっちゃう、エッチな魔族なのにぃ<emoji=heart04>」"
translation = "「일 년 내내, 억제약을 마셨다고 해도……좋아하는 사람이 생기면, 아아앙<emoji=heart04> 때때로 야한 짓을 하고 싶어지는, 야한 마족인데에<emoji=heart04>」"

[[dialogue]]
speaker = "蘭美"
original = "「はぁぁ、はぁぁん<emoji=heart04>\u3000いくらお互いに、忙しいからってぇ<emoji=heart04>\u3000３日も私のこと、ほったらかして<emoji=heart04>\u3000んんんっ<emoji=heart04>」"
translation = "「하아아, 하아앙<emoji=heart04> 아무리 서로, 바쁘다고 해두<emoji=heart04> 3일이나 나를, 내버려두고<emoji=heart04> 응응응윽<emoji=heart04>」"

[[dialogue]]
speaker = "蘭美"
original = "「毎日朝夕、ＤＩＳＣで連絡くれるだけで、キスはおろか、会うこともできない、なんてっ<emoji=heart04>\u3000はぅぅん<emoji=heart04>」"
translation = "「매일 아침저녁, 디스크로 연락만 해줄 뿐, 키스는커녕, 만날 수도 없다니잇<emoji=heart04> 하우웅<emoji=heart04>」"

[[dialogue]]
speaker = "蘭美"
original = "「あああっ<emoji=heart04>\u3000そんな風に、貴方のことばっかり、考えちゃってた、からぁ<emoji=heart04>\u3000毎日飲まなきゃいけない発情抑制薬<emoji=heart04>\u3000飲み忘れちゃったのぉ<emoji=heart04>」"
translation = "「아아앗<emoji=heart04> 그런 식으로, 너만, 생각하고 있었으니까아<emoji=heart04> 매일 마셔야 하는 발정 억제약<emoji=heart04> 깜빡하고 안 마셔버렸어어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "発情した蘭美は本当に正気を失う一歩手前というほどに興奮しており、息遣いは荒く、口元は緩んでぽたぽたとよだれを垂らしていた。"
translation = "발정한 라비는 정말로 이성을 잃기 직전일 정도로 흥분해 있었고, 숨결은 거칠고, 입가는 풀려서 뚝뚝 침을 흘리고 있었다."

[[dialogue]]
speaker = "unk"
original = "普段は理性的な恋人のそんな姿にあてられて、俺の方まで異様な興奮に包まれる。"
translation = "평소에는 이성적인 연인의 그런 모습에 전염되어, 나까지 이상한 흥분에 휩싸인다."

[[dialogue]]
speaker = "蘭美"
original = "「本当は……あぁぁっ<emoji=heart04>\u3000昨日渡せなかったプレゼントと、クリスマスケーキを届けるために<emoji=heart04>\u3000んんっ<emoji=heart04>」"
translation = "「사실은……아아앗<emoji=heart04> 어제 전해주지 못했던 선물과, 크리스마스 케이크를 전해주기 위해서<emoji=heart04> 응응윽<emoji=heart04>」"

[[dialogue]]
speaker = "蘭美"
original = "「はぁっ、はぁっ、はぁぁっ<emoji=heart04>\u3000可愛いって褒めてくれた、このサンタコスでご奉仕、しようと思ってたのにぃ<emoji=heart04>」"
translation = "「하앗, 하앗, 하아앗<emoji=heart04> 귀엽다고 칭찬해 줬던, 이 산타 코스튬으로 봉사, 하려고 했었는데에<emoji=heart04>」"

[[dialogue]]
speaker = "蘭美"
original = "「あああっ<emoji=heart04>\u3000もうダメっ<emoji=heart04>\u3000本当にこれ以上は、もうおち○ぽ、我慢できないのぉ<emoji=heart04><emoji=heart04>\u3000はぁぁん<emoji=heart04>」"
translation = "「아아앗<emoji=heart04> 이제 안 돼엣<emoji=heart04> 정말로 더 이상은, 이제 자지, 참을 수 없어어<emoji=heart04><emoji=heart04> 하아앙<emoji=heart04>」"

[[dialogue]]
speaker = "蘭美"
original = "「んっ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ああああっ<emoji=heart04>\u3000おち○ぽ来たぁぁぁぁぁ～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응읏~~~윽<emoji=heart04><emoji=heart04><emoji=heart04> 아아아앗<emoji=heart04> 자지 왔다아아아아아~~~~~~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "蘭美"
original = "「じゅぷじゅぷじゅぷ～～ってぇ<emoji=heart04>\u3000はぁぁぁん<emoji=heart04>\u3000ああああっ<emoji=heart04>\u3000き、気持ちよすぎるぅぅ～～<emoji=heart04><emoji=heart04>\u3000ふわぁぁん<emoji=heart04>」"
translation = "「주웁주웁주웁~~하고오<emoji=heart04> 하아아앙<emoji=heart04> 아아아앗<emoji=heart04> 키, 기분 너무 좋아아~~<emoji=heart04><emoji=heart04> 후와아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "蘭美は辛抱たまらないといった感じで、一心不乱に腰を上下に振りたくる。"
translation = "라비는 더 이상 참을 수 없다는 듯한 느낌으로, 정신없이 허리를 위아래로 흔들어댄다."

[[dialogue]]
speaker = "蘭美"
original = "「あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あぁぁん<emoji=heart04>\u3000ふわぁぁん<emoji=heart04>\u3000あぁぁぁっ、こんなっ、逆レイプみたいな、セックスじゃなくてぇ<emoji=heart04>\u3000んんんっ<emoji=heart04>」"
translation = "「앙읏<emoji=heart04> 앙읏<emoji=heart04> 아아앙<emoji=heart04> 후와아앙<emoji=heart04> 아아아앗, 이런, 역강간 같은, 섹스가 아니라아<emoji=heart04> 응응응윽<emoji=heart04>」"

[[dialogue]]
speaker = "蘭美"
original = "「本当はっ<emoji=heart04>\u3000んふぅぅ<emoji=heart04>\u3000いっぱいサービスしてぇ<emoji=heart04>\u3000んふぅぅ<emoji=heart04>\u3000褒めてもらってぇ<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000ラブラブセックス、したかったのにぃ<emoji=heart04>」"
translation = "「사실은앗<emoji=heart04> 응후우<emoji=heart04> 잔뜩 서비스하고오<emoji=heart04> 응후우<emoji=heart04> 칭찬받고오<emoji=heart04> 아아앗<emoji=heart04> 러브러브 섹스, 하고 싶었는데에<emoji=heart04>」"

[[dialogue]]
speaker = "蘭美"
original = "「我慢、できないのっ<emoji=heart04>\u3000おま○こ疼いてっ<emoji=heart04>\u3000おち○ぽ突っ込んでもらうことしかっ<emoji=heart04>\u3000ああああっ<emoji=heart04>\u3000考えられないっ<emoji=heart04>\u3000あっ、あっ、あっ、ああっ<emoji=heart04>」"
translation = "「참을, 수 없어엇<emoji=heart04> 보지가 쑤셔서엇<emoji=heart04> 자지 박아 넣는 것밖에엣<emoji=heart04> 아아아앗<emoji=heart04> 생각할 수 없어엇<emoji=heart04> 앗, 앗, 앗, 아앗<emoji=heart04>」"

[[dialogue]]
speaker = "蘭美"
original = "「これがっ、発情っ<emoji=heart04>\u3000私、勘違いしてたっ<emoji=heart04>\u3000薬を飲んでるのは発情じゃないっ<emoji=heart04>\u3000こんなスケベなことで、頭いっぱいにならないっ<emoji=heart04>\u3000あぁぁん<emoji=heart04>」"
translation = "「이게엣, 발정앗<emoji=heart04> 나, 착각하고 있었어엇<emoji=heart04> 약을 마시고 있는 건 발정이 아니야앗<emoji=heart04> 이렇게 야한 생각으로, 머리가 가득 차지 않아앗<emoji=heart04> 아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "本能と性感を同時に満たされた蘭美の口元はだらしなくにやけており、否定的な言葉を繰り返しながらも、その声色は喜びに満ち満ちている。"
translation = "본능과 성감을 동시에 충족시킨 라비의 입가는 헤실헤실 풀려 있었고, 부정적인 말을 반복하면서도, 그 목소리에는 기쁨이 가득 차 있었다."

[[dialogue]]
speaker = "蘭美"
original = "「バカになっちゃうぅ<emoji=heart04>\u3000おま○こでおち○ぽ咥えるだけで、幸せぇ<emoji=heart04>\u3000気持ち良くてぇ、幸せなのぉ<emoji=heart04><emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はぁぁん<emoji=heart04>」"
translation = "「바보가 되어버려으<emoji=heart04> 보지로 자지 물고 있는 것만으로, 행복해에<emoji=heart04> 기분 좋아서어, 행복한 거야아<emoji=heart04><emoji=heart04> 앙읏<emoji=heart04> 하아앙<emoji=heart04>」"

[[dialogue]]
speaker = "蘭美"
original = "「こんなの覚えたらっ<emoji=heart04>\u3000本物のウサギになっちゃう<emoji=heart04>\u3000会長のおち○ぽ咥えるのだけが生きがいのぉ、おま○こになっちゃうのぉ<emoji=heart04>\u3000んふぅぅぅん<emoji=heart04>」"
translation = "「이런 걸 알아버리면앗<emoji=heart04> 진짜 토끼가 되어버려<emoji=heart04> 회장의 자지 물고 있는 것만이 삶의 낙인, 보지가 되어버릴 거야아<emoji=heart04> 응후우우응<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "一往復ごとに蘭美のおま○こからは大量の愛液が溢れ、腰の動きに合わせてじゅぷじゅぷと卑猥な水音が星徒会室に響き渡る。"
translation = "한 번 왕복할 때마다 라비의 보지에서는 대량의 애액이 넘쳐흐르고, 허리의 움직임에 맞춰 주웁주웁하고 외설적인 물소리가 성도회실에 울려 퍼진다."

[[dialogue]]
speaker = "unk"
original = "体質のせいではあっても、好きな人がここまで自分のペニスに夢中になってくれている状況に、俺の背筋もゾクゾクとした快感が走ってしまう。"
translation = "체질 탓이라고는 해도, 좋아하는 사람이 이렇게까지 자신의 페니스에 열중해 주고 있는 상황에, 나의 등골도 오싹오싹한 쾌감이 달려버린다."

[[dialogue]]
speaker = "蘭美"
original = "「うわぁぁぁん<emoji=heart04>\u3000はぁぁっ<emoji=heart04>\u3000どうしよぉ<emoji=heart04><emoji=heart04>\u3000それがとっても幸せそうでぇ、あぁぁん<emoji=heart04>\u3000バカになっちゃいたくなってるぅ<emoji=heart04>\u3000んふぅぅぅん<emoji=heart04>」"
translation = "「우와아아앙<emoji=heart04> 하아앗<emoji=heart04> 어떡해애<emoji=heart04><emoji=heart04> 그게 너무 행복해 보여서어, 아아앙<emoji=heart04> 바보가 되어버리고 싶어졌어으<emoji=heart04> 응후우우응<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「蘭美は大丈夫っ。蘭美はまた、完璧で最速のメイドに戻れるよ」"
translation = "「라비는 괜찮아. 라비는 다시, 완벽하고 최속의 메이드로 돌아올 수 있어」"

[[dialogue]]
speaker = "蘭美"
original = "「あぁぁん<emoji=heart04>\u3000ふわぁぁん<emoji=heart04>\u3000はぁ<emoji=heart04>\u3000はぁ<emoji=heart04>\u3000はぁぁん<emoji=heart04>\u3000会長っ、本当ぉ？\u3000私、ちゃんとヒトに戻れる、かしらぁっ<emoji=heart04>」"
translation = "「아아앙<emoji=heart04> 후와아앙<emoji=heart04> 하아<emoji=heart04> 하아<emoji=heart04> 하아앙<emoji=heart04> 회장앗, 정말이이? 나, 제대로 사람으로 돌아올 수, 있을까아앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「絶対に大丈夫。その代わり、俺と２人きりの時だけは、思いっきりバカになって、ち○ぽで気持ち良くなってほしい」"
translation = "「절대로 괜찮아. 그 대신, 나와 단둘이 있을 때만은, 마음껏 바보가 되어서, 자지로 기분 좋아졌으면 좋겠어」"

[[dialogue]]
speaker = "蘭美"
original = "「あ<emoji=heart04>\u3000……あぁぁぁぁっ<emoji=heart04>\u3000ふわぁぁぁぁん<emoji=heart04>\u3000はぁぁぁっ<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000好きぃ<emoji=heart04>\u3000会長、だいしゅきなのぉ<emoji=heart04>\u3000あぁぁぁぁっ、なりゅっ<emoji=heart04>\u3000なりましゅぅぅ<emoji=heart04>」"
translation = "「아<emoji=heart04> ……아아아아앗<emoji=heart04> 후와아아아앙<emoji=heart04> 하아아앗<emoji=heart04> 아아앗<emoji=heart04> 좋아아<emoji=heart04> 회장, 너무 좋아아<emoji=heart04> 아아아아앗, 될게엣<emoji=heart04> 될게요오오<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "蘭美が「好き」と口にするたびに、おま○こはきゅうきゅうとペニスに吸い付き、より深く快感を貪ろうとしてくる。"
translation = "라비가 「좋아」라고 말할 때마다, 보지는 꽉꽉 페니스에 달라붙어, 더욱 깊은 쾌감을 탐하려 든다."

[[dialogue]]
speaker = "蘭美"
original = "「はぁ<emoji=heart04>\u3000はぁ<emoji=heart04>\u3000はぁぁぁん<emoji=heart04>\u3000会長と２人きりのときだけはぁ<emoji=heart04>\u3000バカになりゅ<emoji=heart04>\u3000おち○ぽで幸せ感じちゃう、おま○こになりゅのぉぉ<emoji=heart04>\u3000はぁぁぁん<emoji=heart04>」"
translation = "「하아<emoji=heart04> 하아<emoji=heart04> 하아아앙<emoji=heart04> 회장과 단둘이 있을 때만은아<emoji=heart04> 바보가 될게<emoji=heart04> 자지로 행복을 느껴버리는, 보지가 될 거야아아<emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "蘭美"
original = "「あはぁぁぁん<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000ふわぁぁぁぁぁぁ～～～～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아하아아앙<emoji=heart04> 아아앗<emoji=heart04> 후와아아아아아아~~~~~~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "また一段、蘭美の興奮にギアが入った。腰を振るスピードが早くなり、より強く、より深いところまでペニスを自分のおま○こに打ち付ける。"
translation = "다시 한 단계, 라비의 흥분에 기어가 들어갔다. 허리를 흔드는 속도가 빨라지고, 더욱 강하게, 더욱 깊은 곳까지 페니스를 자신의 보지에 박아 넣는다."

[[dialogue]]
speaker = "蘭美"
original = "「あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000ふわぁぁぁん<emoji=heart04>\u3000んんんん～～っ<emoji=heart04>\u3000んあぁぁぁっ<emoji=heart04>\u3000うあっ<emoji=heart04>\u3000あ<emoji=heart04>\u3000ああぁぁっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앙읏<emoji=heart04> 앙읏<emoji=heart04> 아앙읏<emoji=heart04> 후와아아앙<emoji=heart04> 응응응응~~윽<emoji=heart04> 응아아아앗<emoji=heart04> 우앗<emoji=heart04> 아<emoji=heart04> 아아아앗앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "蘭美"
original = "「おま○こ振り振りっ<emoji=heart04>\u3000早くなっちゃうぅぅぅ<emoji=heart04>\u3000はぁぁぁぁん<emoji=heart04>\u3000おち○ぽ奥まで、咥えこんじゃってるのぉぉ<emoji=heart04>\u3000くふぅぅぅん<emoji=heart04>」"
translation = "「보지 흔들흔들앗<emoji=heart04> 빨라져버려으으으<emoji=heart04> 하아아아앙<emoji=heart04> 자지 안쪽까지, 물어버리고 있는 거야아아<emoji=heart04> 쿠후우우응<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "蘭美の腰振りはただ乱暴なだけではなく、亀頭の擦りあげる膣壁が、どこが一番気持ちいいのかを自ら探究する貪欲さがあった。"
translation = "라비의 허리 흔들기는 그저 난폭하기만 한 것이 아니라, 귀두가 문지르는 질벽이, 어디가 가장 기분 좋은지를 스스로 탐구하는 탐욕스러움이 있었다."

[[dialogue]]
speaker = "unk"
original = "そうして細かく角度を調整しながらおま○こを激しく上下に振るせいで、ペニスが感じる刺激も常に新鮮で気持ちがいい。"
translation = "그렇게 세밀하게 각도를 조정하면서 보지를 격렬하게 위아래로 흔드는 탓에, 페니스가 느끼는 자극도 항상 신선하고 기분이 좋다."

[[dialogue]]
speaker = "蘭美"
original = "「ふぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000おま○この奥っ<emoji=heart04>\u3000会長のおち○ぽ、届いてるっ<emoji=heart04>\u3000はぁぁぁぁん<emoji=heart04>」"
translation = "「화앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 아아앗<emoji=heart04> 보지의 안쪽앗<emoji=heart04> 회장의 자지, 닿고 있어엇<emoji=heart04> 하아아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "蘭美"
original = "「もっと、奥までっ<emoji=heart04>\u3000じゅぼじゅぼっ<emoji=heart04>\u3000ズプズプするのぉぉ<emoji=heart04>\u3000子宮口、ポルチオっ<emoji=heart04>\u3000刺激されてるぅぅ<emoji=heart04>\u3000きもちっ、きもちぃぃ<emoji=heart04><emoji=heart04>」"
translation = "「더, 안쪽까지잇<emoji=heart04> 주웁주웁앗<emoji=heart04> 즈웁즈웁 하는 거야아아<emoji=heart04> 자궁구, 포르치오옷<emoji=heart04> 자극받고 있어으으<emoji=heart04> 기분 좋앗, 기분 좋아아<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "亀頭の先が、ついに子宮口に当たり始める。柔らかく締め付けるような膣の奥に、固い子宮口の刺激がアクセントとなって、俺の方まで快感に飲まれそうになる。"
translation = "귀두 끝이, 마침내 자궁구에 닿기 시작한다. 부드럽게 조여오는 듯한 질의 안쪽에, 단단한 자궁구의 자극이 악센트가 되어, 나까지 쾌감에 삼켜질 것만 같다."

[[dialogue]]
speaker = "蘭美"
original = "「もっとっ、もっとぉ<emoji=heart04>\u3000きもちくて、幸せぇ<emoji=heart04>\u3000あはぁぁぁん<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000ふわぁぁぁん<emoji=heart04>」"
translation = "「더엇, 더어어<emoji=heart04> 기분 좋고, 행복해에<emoji=heart04> 아하아아앙<emoji=heart04> 아아앗<emoji=heart04> 후와아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "蘭美"
original = "「あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000会長もっ、一緒にぃ<emoji=heart04>\u3000突いてぇ<emoji=heart04>\u3000おま○こ壊れちゃうくらいっ<emoji=heart04>\u3000私の頭、幸せで壊してぇっ<emoji=heart04>」"
translation = "「앙읏<emoji=heart04> 앙읏<emoji=heart04> 앙읏<emoji=heart04> 회장도옷, 함께이<emoji=heart04> 찔러줘어<emoji=heart04> 보지 망가져버릴 정도로옷<emoji=heart04> 내 머리, 행복으로 망가뜨려줘어엇<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "蘭美の腰振りだけでも射精しそうなほど気持ち良かったが、必死に腰に力を入れて、俺も蘭美の動きに合わせてペニスを突き上げる。"
translation = "라비의 허리 흔들기만으로도 사정할 것 같을 정도로 기분 좋았지만, 필사적으로 허리에 힘을 주어, 나도 라비의 움직임에 맞춰 페니스를 쳐 올린다."

[[dialogue]]
speaker = "蘭美"
original = "「んはぁぁぁぁ～～～ん<emoji=heart04>\u3000ああああっ<emoji=heart04>\u3000それ、それ、それぇ<emoji=heart04>\u3000あぁぁぁん<emoji=heart04>\u3000おち○ぽ奥まで、来てるぅぅぅ～～<emoji=heart04>\u3000ああああっ<emoji=heart04>\u3000はぁぁぁん<emoji=heart04>」"
translation = "「응하아아아~~~앙<emoji=heart04> 아아아앗<emoji=heart04> 그거, 그거, 그거어<emoji=heart04> 아아아앙<emoji=heart04> 자지 안쪽까지, 오고 있어으으으~~<emoji=heart04> 아아아앗<emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "蘭美"
original = "「奥いっぱいっ<emoji=heart04>\u3000んあぁぁぁっ<emoji=heart04>\u3000壊れちゃうくらい、激しくぅ<emoji=heart04>\u3000……あ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あはぁぁぁん<emoji=heart04>」"
translation = "「안쪽 가득앗<emoji=heart04> 응아아아앗<emoji=heart04> 망가져버릴 정도로, 격렬하게에<emoji=heart04> ……아<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 아하아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "蘭美"
original = "「そこぉっ<emoji=heart04>\u3000んんんっ<emoji=heart04>\u3000おち○ぽでコツコツたたかれるの、好きっ<emoji=heart04>\u3000しゅきしゅきしゅきぃっ<emoji=heart04>\u3000ふわぁぁぁん<emoji=heart04>」"
translation = "「거기잇<emoji=heart04> 응응응윽<emoji=heart04> 자지로 톡톡 두드려지는 거, 좋아앗<emoji=heart04> 좋아좋아좋아앗<emoji=heart04> 후와아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "パンッ、パンッ、パンッ、と。蘭美のお尻と俺の太ももがリズミカルにぶつかって、激しい音を立てる。"
translation = "팡, 팡, 팡, 하고. 라비의 엉덩이와 나의 허벅지가 리드미컬하게 부딪히며, 격렬한 소리를 낸다."

[[dialogue]]
speaker = "unk"
original = "愛液とカウパーの交じり合った水音も激しさを増し、愛液は白く泡立っていた。"
translation = "애액과 쿠퍼액이 뒤섞인 물소리도 격렬함을 더하고, 애액은 하얗게 거품이 일고 있었다."

[[dialogue]]
speaker = "蘭美"
original = "「あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あぁん<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000おま○こ喜んでる<emoji=heart04>\u3000はぁぁぁん<emoji=heart04>\u3000頭奥までパチパチしてぇ<emoji=heart04>\u3000幸せ溢れてきちゃうぅぅ～～～<emoji=heart04><emoji=heart04>」"
translation = "「앙읏<emoji=heart04> 앙읏<emoji=heart04> 아앙<emoji=heart04> 기분 좋아앗<emoji=heart04> 보지가 기뻐하고 있어<emoji=heart04> 하아아앙<emoji=heart04> 머리 안쪽까지 짝짝 때려줘어<emoji=heart04> 행복이 넘쳐흘러버려으으~~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "蘭美"
original = "「あぁぁん<emoji=heart04>\u3000しゅごいっ<emoji=heart04>\u3000会長っ、上手すぎりゅぅっ<emoji=heart04>\u3000きもちぃところ、全部こすれてっ<emoji=heart04>\u3000おかしくなっちゃうよぉぉ<emoji=heart04>\u3000くふぅぅぅん<emoji=heart04>」"
translation = "「아아앙<emoji=heart04> 대단해엣<emoji=heart04> 회장앗, 너무 잘해애<emoji=heart04> 기분 좋은 곳, 전부 문질러져서엇<emoji=heart04> 이상해져버려어어<emoji=heart04> 쿠후우우응<emoji=heart04>」"

[[dialogue]]
speaker = "蘭美"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あぁぁぁっ<emoji=heart04>\u3000会長っ、しゅきぃ<emoji=heart04>\u3000おま○こもっ、体もぉ、心だってぇ<emoji=heart04>\u3000全部捧げましゅぅぅ<emoji=heart04>\u3000ああああんっ<emoji=heart04>\u3000ご主人様ぁ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 아아아앗<emoji=heart04> 회장앗, 좋아아<emoji=heart04> 보지도옷, 몸도오, 마음까지도오<emoji=heart04> 전부 바칠게요오오<emoji=heart04> 아아아앙읏<emoji=heart04> 주인님아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "普段は隠されたＭ心が疼くのか、蘭美はエッチが激しくなってきた時だけ「ご主人様」と呼んでくれる。それが可愛くて、心地よくて、俺は一層激しく腰を打ち付けてしまう。"
translation = "평소에는 숨겨진 M 기질이 쑤시는 건지, 라비는 야한 짓이 격렬해졌을 때만 「주인님」이라고 불러준다. 그것이 귀엽고, 기분 좋아서, 나는 더욱 격렬하게 허리를 박아 넣고 만다."

[[dialogue]]
speaker = "蘭美"
original = "「だいしゅきっ<emoji=heart04>\u3000はぁぁん<emoji=heart04>\u3000だいしゅきぃ<emoji=heart04>\u3000ふわぁぁん<emoji=heart04>\u3000はぁぁ<emoji=heart04>\u3000あぁぁぁん<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000はぁん<emoji=heart04>\u3000ふぁぁぁ<emoji=heart04>」"
translation = "「너무 좋아앗<emoji=heart04> 하아앙<emoji=heart04> 너무 좋아아<emoji=heart04> 후와아앙<emoji=heart04> 하아아<emoji=heart04> 아아아앙<emoji=heart04> 아아앗<emoji=heart04> 하앙<emoji=heart04> 화아아<emoji=heart04>」"

[[dialogue]]
speaker = "蘭美"
original = "「ご主人様っ<emoji=heart04>\u3000ご主人様ぁぁ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000すき、すき、すきぃ<emoji=heart04>\u3000ああぁぁあぁんっ<emoji=heart04>」"
translation = "「주인님앗<emoji=heart04> 주인님아아<emoji=heart04> 앙읏<emoji=heart04> 앙읏<emoji=heart04> 아앙읏<emoji=heart04> 좋아, 좋아, 좋아아<emoji=heart04> 아아아아아앙읏<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「俺も好きだっ、蘭美っ！」"
translation = "「나도 좋아한다앗, 라비잇!」"

[[dialogue]]
speaker = "蘭美"
original = "「ふわぁぁぁん<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あぁん<emoji=heart04>\u3000はぁぁん<emoji=heart04>\u3000嬉しいっ<emoji=heart04>\u3000んふぅぅぅん<emoji=heart04>\u3000私もだいしゅきぃ<emoji=heart04>\u3000ご主人様ぁ<emoji=heart04>\u3000んんん～～っ<emoji=heart04>」"
translation = "「후와아아앙<emoji=heart04> 앙읏<emoji=heart04> 아앙<emoji=heart04> 하아앙<emoji=heart04> 기뻐엇<emoji=heart04> 응후우우응<emoji=heart04> 나도 너무 좋아아<emoji=heart04> 주인님아<emoji=heart04> 응응응~~윽<emoji=heart04>」"

[[dialogue]]
speaker = "蘭美"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁっ……んんんっ<emoji=heart04>\u3000はぁぁん<emoji=heart04>\u3000おち○ぽっ<emoji=heart04>\u3000ご主人様のおち○ぽ<emoji=heart04>\u3000膨らんできたの、分かるっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 하앗……응응응윽<emoji=heart04> 하아앙<emoji=heart04> 자지잇<emoji=heart04> 주인님의 자지<emoji=heart04> 부풀어 오른 거, 알겠어엇<emoji=heart04>」"

[[dialogue]]
speaker = "蘭美"
original = "「ご主人様、イっちゃうの？\u3000くふぅぅぅん<emoji=heart04>\u3000ふわぁ<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000だったら、私もっ<emoji=heart04>\u3000私もイクっ<emoji=heart04>\u3000ああぁぁあぁんっ<emoji=heart04>」"
translation = "「주인님, 가버릴 거야? 쿠후우우응<emoji=heart04> 후와아<emoji=heart04> 아아앗<emoji=heart04> 그렇다면, 나도옷<emoji=heart04> 나도 갈게엣<emoji=heart04> 아아아아아앙읏<emoji=heart04>」"

[[dialogue]]
speaker = "蘭美"
original = "「だから、もうちょっとっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はぁぁん<emoji=heart04>\u3000一緒にっ<emoji=heart04>\u3000一緒にイこっ<emoji=heart04>」"
translation = "「그러니까, 조금만 더엇<emoji=heart04> 앙읏<emoji=heart04> 앙읏<emoji=heart04> 하아앙<emoji=heart04> 함께엣<emoji=heart04> 함께 가자앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ついに細やかなコントロールさえも失って、蘭美はただただ乱暴におま○こを打ち付けてくる。膣の締まりも強くなり、精液を搾り取ろうとひだの１枚１枚が絡みついてくる。"
translation = "마침내 세밀한 컨트롤마저도 잃고, 라비는 그저 난폭하게 보지를 박아 넣는다. 질의 조임도 강해져, 정액을 짜내려고 주름 한 겹 한 겹이 휘감겨 온다."

[[dialogue]]
speaker = "蘭美"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000奥っ、奥でっ<emoji=heart04>\u3000出してぇ<emoji=heart04>\u3000おま○こにっ、ご主人様せーしっ<emoji=heart04>\u3000いっぱい注いでっ<emoji=heart04>\u3000出してぇ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 아아앗<emoji=heart04> 안쪽앗, 안쪽에서앗<emoji=heart04> 싸줘어<emoji=heart04> 보지에엣, 주인님 정액앗<emoji=heart04> 잔뜩 부어줘엇<emoji=heart04> 싸줘어<emoji=heart04>」"

[[dialogue]]
speaker = "蘭美"
original = "「おち○ぽ、まだ膨らんでっ<emoji=heart04>\u3000あ<emoji=heart04>\u3000あ<emoji=heart04>\u3000あぁっ<emoji=heart04>\u3000おま○こ擦れるっ<emoji=heart04>\u3000くふぅぅぅ<emoji=heart04>\u3000気持ちいい、気持ちいい、気持ちいいぃぃっ<emoji=heart04>\u3000ひゃぁぁぁ～っ<emoji=heart04>」"
translation = "「자지, 아직 부풀어올라앗<emoji=heart04> 아<emoji=heart04> 아<emoji=heart04> 아앗<emoji=heart04> 보지 문질러져엇<emoji=heart04> 쿠후우우<emoji=heart04> 기분 좋아, 기분 좋아, 기분 좋아아앗<emoji=heart04> 햐아아아~앗<emoji=heart04>」"

[[dialogue]]
speaker = "蘭美"
original = "「おま○こ、ぐじゅぐじゅっ<emoji=heart04>\u3000ゴシゴシされてりゅぅぅぅ<emoji=heart04>\u3000ふわぁぁぁん<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000ご主人様ぁ<emoji=heart04>\u3000ああぁぁっ<emoji=heart04>\u3000来ちゃう、来ちゃってるぅぅ～～<emoji=heart04>」"
translation = "「보지, 질척질척앗<emoji=heart04> 쓱싹쓱싹 당하고 있어으으으<emoji=heart04> 후와아아앙<emoji=heart04> 아아앗<emoji=heart04> 주인님아<emoji=heart04> 아아아앗<emoji=heart04> 가버려, 가버리고 있어으으~~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "もういつでも射精できそうな快感の中、蘭美の絶頂のタイミングを計る。膣はビクビクと痙攣して、あと少しであることを知らせていた。"
translation = "이제 언제라도 사정할 수 있을 것 같은 쾌감 속에서, 라비의 절정 타이밍을 잰다. 질은 움찔움찔 경련하며, 이제 조금 남았음을 알리고 있었다."

[[dialogue]]
speaker = "蘭美"
original = "「くふぅぅぅん<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000イク<emoji=heart04>\u3000イっちゃう<emoji=heart04>\u3000イカせてくださぁぁい<emoji=heart04><emoji=heart04>」"
translation = "「쿠후우우응<emoji=heart04> 아아앗<emoji=heart04> 앙읏<emoji=heart04> 앙읏<emoji=heart04> 앙읏<emoji=heart04> 갈게<emoji=heart04> 가버려<emoji=heart04> 가게 해 주세여어어<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "蘭美"
original = "「あああああああっ<emoji=heart04>\u3000しゅごいっ<emoji=heart04>\u3000イク<emoji=heart04>\u3000イクイクっ<emoji=heart04>\u3000ああああっ<emoji=heart04>\u3000イクイクイっクぅ～～～～～<emoji=heart04><emoji=heart04>」"
translation = "「아아아아아아앗<emoji=heart04> 대단해엣<emoji=heart04> 갈게<emoji=heart04> 가가앗<emoji=heart04> 아아아앗<emoji=heart04> 가가가앗쿠우~~~~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "蘭美"
original = "「ふあぁぁあぁぁーーーっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イックうぅぅぅぅぅぅぅ～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아아아~~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 가아아아아아아아아~~~~~~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "蘭美"
original = "「んあぁぁぁ～～っ<emoji=heart04><emoji=heart04>\u3000ご主人様のせーし、子宮の中、入ってくるぅぅ～～～<emoji=heart04>\u3000はあああぁぁぁ～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「응아아아~~앗<emoji=heart04><emoji=heart04> 주인님의 정액, 자궁 속, 들어와으으~~<emoji=heart04> 하아아아아아~~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "蘭美"
original = "「んんっ<emoji=heart04>\u3000ああぁぁぁ～～っ<emoji=heart04>\u3000す、すごぉい<emoji=heart04>\u3000射精止まらないっ<emoji=heart04>\u3000さすがご主人様ぁ<emoji=heart04>」"
translation = "「응응윽<emoji=heart04> 아아아아~~앗<emoji=heart04> 스, 대단해애<emoji=heart04> 사정 멈추지 않아앗<emoji=heart04> 역시 주인님아<emoji=heart04>」"

[[dialogue]]
speaker = "蘭美"
original = "「ふぁぁ……っ、あぁぁ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000はぁ、はぁ……はぁぁっ<emoji=heart04>」"
translation = "「화아……윽, 아아아<emoji=heart04> 응응윽<emoji=heart04> 하아, 하아……하아앗<emoji=heart04>」"

[[dialogue]]
speaker = "蘭美"
original = "「ああぁっ<emoji=heart04>\u3000あ……ご主人様のおち○ぽも、満足してくれた、のかしら……<emoji=heart04>」"
translation = "「아아앗<emoji=heart04> 아……주인님의 자지도, 만족해 준, 걸까……<emoji=heart04>」"

[[dialogue]]
speaker = "蘭美"
original = "「あぁぁん<emoji=heart04>\u3000ご主人様のおち○ぽ、抜けちゃった<emoji=heart04>\u3000ソファに垂れちゃう……っ<emoji=heart04>」"
translation = "「아아앙<emoji=heart04> 주인님의 자지, 빠져버렸어<emoji=heart04> 소파에 흘러내려……윽<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「発情、ちょっとは落ち着いた……？」"
translation = "「발정, 좀 진정됐어……?」"

[[dialogue]]
speaker = "蘭美"
original = "「え、ええっ。恥ずかしいところ、見せちゃったわね……」"
translation = "「에, 에엣. 부끄러운 모습, 보여줬네……」"

[[dialogue]]
speaker = "蘭美"
original = "「完全になくなったかっていうと、そういうわけでもないのだけれど……少なくとも、前後不覚になって貴方を襲っちゃうほどでは、なくなったわ」"
translation = "「완전히 사라졌냐고 하면, 그런 건 아니지만……적어도, 정신을 못 차리고 너를 덮칠 정도는, 아니게 됐어」"

[[dialogue]]
speaker = "クロト"
original = "「でも、まだムラムラはしてる感じ……？」"
translation = "「하지만, 아직 울렁거리긴 하는 느낌……?」"

[[dialogue]]
speaker = "蘭美"
original = "「そ、それは……まあ、そりゃあっ<emoji=heart04>」"
translation = "「소, 그건……뭐, 당연히이앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「俺は男だから、好きな女の子に襲われるのも、エッチに乱れてるところも、全然嫌じゃないよ。むしろ、もっと好きになっちゃったかも」"
translation = "「나는 남자니까, 좋아하는 여자애에게 덮쳐지는 것도, 야하게 흐트러진 모습도, 전혀 싫지 않아. 오히려, 더 좋아하게 됐을지도」"

[[dialogue]]
speaker = "蘭美"
original = "「も、もう……本当に女たらしなんだから、うちのご主人様は<emoji=heart04>」"
translation = "「모, 정말……진짜 바람둥이라니까, 우리 주인님은<emoji=heart04>」"

[[dialogue]]
speaker = "蘭美"
original = "「その……ね？\u3000してる最中は、自分が自分じゃなくなるんじゃないかってくらい発情しまくってて、ちょっと怖かったんだけど……」"
translation = "「그게……있잖아? 하는 중에는, 내가 내가 아니게 되는 게 아닐까 싶을 정도로 발정해대서, 조금 무서웠는데……」"

[[dialogue]]
speaker = "蘭美"
original = "「それと同時に……発情セックス、頭がおかしくなるくらい、気持ち良かったの<emoji=heart04>」"
translation = "「그것과 동시에……발정 섹스, 머리가 이상해질 정도로, 기분 좋았어<emoji=heart04>」"

[[dialogue]]
speaker = "蘭美"
original = "「だから、ね？\u3000ご主人様が嫌じゃないなら……今後は計画的に、お休みの日にお薬止めて、全力発情セックス、しちゃったり、する？」"
translation = "「그러니까, 있지? 주인님이 싫지 않다면……앞으로는 계획적으로, 쉬는 날에 약을 끊고, 전력 발정 섹스, 해버리거나, 할까?」"

[[dialogue]]
speaker = "クロト"
original = "「正直、めちゃくちゃ興奮する」"
translation = "「솔직히, 엄청 흥분돼」"

[[dialogue]]
speaker = "蘭美"
original = "「うふふっ<emoji=heart04>\u3000流石はエッチなウサギのご主人様だわ<emoji=heart04>」"
translation = "「우후훗<emoji=heart04> 역시 야한 토끼의 주인님이야<emoji=heart04>」"

[[dialogue]]
speaker = "蘭美"
original = "「それじゃあさっそく、２回戦をお願いしちゃおうかしら？」"
translation = "「그럼 바로, 2차전을 부탁해 볼까?」"

[[dialogue]]
speaker = "unk"
original = "エッチで可愛いおねだりをするメイドさんを、俺は今度はソファに押し倒す。"
translation = "야하고 귀여운 조름을 하는 메이드 아가씨를, 나는 이번에는 소파에 밀어 넘어뜨린다."

[[dialogue]]
speaker = "蘭美"
original = "「きゃん<emoji=heart04>\u3000すごいわ、ご主人様<emoji=heart04>\u3000おち○ぽ、もう完全復活しちゃってる……<emoji=heart04>」"
translation = "「꺅<emoji=heart04> 대단해, 주인님<emoji=heart04> 자지, 벌써 완전히 부활해 버렸어……<emoji=heart04>」"

[[dialogue]]
speaker = "蘭美"
original = "「あのね、変なことを言うようだけれど……こんな私を受け入れてくれて、ありがとう<emoji=heart04>」"
translation = "「있잖아, 이상한 말을 하는 것 같지만……이런 나를 받아들여 줘서, 고마워<emoji=heart04>」"

[[dialogue]]
speaker = "蘭美"
original = "「心の底から、大好きよ<emoji=heart04>」"
translation = "「마음속 깊이, 정말 좋아해<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "蘭美がほほ笑みながら、体を預けてくる。"
translation = "라비가 미소 지으며, 몸을 맡겨 온다."

[[dialogue]]
speaker = "unk"
original = "後片付けとか、残ってる仕事とか、あとできっと大変な思いをするのかもしれない。けれど──"
translation = "뒷정리라든가, 남아 있는 일이라든가, 나중에 분명 힘든 일을 겪을지도 모른다. 하지만──"

[[dialogue]]
speaker = "unk"
original = "今だけは、二人の時間を大切にしよう。そう思って、俺は小さな蘭美の体をぎゅっと抱きしめるのだった。"
translation = "지금만은, 두 사람의 시간을 소중히 하자. 그렇게 생각하며, 나는 작은 라비의 몸을 꽉 끌어안는 것이었다."

