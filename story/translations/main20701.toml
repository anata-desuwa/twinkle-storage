[[dialogue]]
speaker = "unk"
original = "第１話,守護天使ラクシャ,B"
translation = "제1화, 수호천사 락샤, B"

[[dialogue]]
speaker = "unk"
original = "俺たちは平行世界デネブへと渡り、そこで極星学園の星徒会長・ルヴィネと、彼女に対抗するレジスタンスと出会った。"
translation = "우리들은 평행세계 데네브로 건너가, 그곳에서 극성학원의 성도회장 루비네와 그녀에게 대항하는 레지스탕스를 만났다."

[[dialogue]]
speaker = "unk"
original = "平行世界デネブで何が起きたのか、説明を聞こうとしていたところに現れたのが──"
translation = "평행세계 데네브에서 무슨 일이 일어났는지 설명을 들으려던 참에 나타난 것이──"

[[dialogue]]
speaker = "unk"
original = "俺のかつてのバイト仲間・市倉環。"
translation = "나의 예전 알바 동료, 이치쿠라 타마키."

[[dialogue]]
speaker = "unk"
original = "その正体は、守護天使《円環》のラクシャだ。"
translation = "그 정체는 수호천사 《원환》인 락샤다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「どうして環がデネブにいるのよ？\u3000ていうか今デネブの話を聞くところだったのに、邪魔しないでくれる？」"
translation = "「왜 타마키가 데네브에 있는 거야? 그보다 지금 데네브 이야기를 들으려던 참이었는데, 방해하지 말아 줄래?」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「あ、そうなんだ。ボクも<ruby>デネブ<rt>こっち</rt></ruby>に戻ってきて間もないし、よければ聞かせてほしいんだけど」"
translation = "「아, 그렇구나. 나도 데네브로 돌아온 지 얼마 안 됐는데, 괜찮다면 같이 듣고 싶은걸」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「お前が本当に敵じゃないかを確認してからだ。魔王たちとはいろいろあったみたいだからな」"
translation = "「네가 정말로 적이 아닌지 확인한 다음이다. 마왕 일행과는 여러 일이 있었던 모양이니까」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「それもそうか。じゃあ改めて名乗らせてもらうよ」"
translation = "「그것도 그렇네. 그럼 다시 한번 통성명을 하도록 할게」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「ボクは守護天使の一柱、《円環》のラクシャ。前はわけあって、市倉環って名前で学生をやってたけどね」"
translation = "「난 수호천사의 일주(一柱), 《원환》의 락샤. 전에는 사정이 있어서 이치쿠라 타마키라는 이름으로 학생 노릇을 했었지만 말이야」"

[[dialogue]]
speaker = "unk"
original = "そう、俺やヴィーナスにとって、彼女は同じ新星学園の生徒のはずだった。"
translation = "그래, 나와 비너스에게 있어 그녀는 같은 신성학원의 학생이어야 했다."

[[dialogue]]
speaker = "unk"
original = "だが──"
translation = "하지만──"

[[dialogue]]
speaker = "unk"
original = "セイファート元学園長にヴィーナスがさらわれ、救出のために魔界に赴いた時。"
translation = "세이파트 전 학원장에게 비너스가 납치되어, 구출을 위해 마계로 향했을 때."

[[dialogue]]
speaker = "unk"
original = "ヴィーナスの元に向かう俺たちの前に、環が立ちはだかった。"
translation = "비너스에게 향하는 우리 앞을 타마키가 가로막았다."

[[dialogue]]
speaker = "unk"
original = "戦闘の結果は、俺たちが勝利。"
translation = "전투 결과는 우리의 승리."

[[dialogue]]
speaker = "unk"
original = "『世界が無事なら、また会えるかも』という言葉を遺して消滅したが──"
translation = "『세계가 무사하다면, 다시 만날지도』라는 말을 남기고 소멸했었지만──"

[[dialogue]]
speaker = "unk"
original = "『あの時消えた環がどうして俺たちの前にいるのか？』『環はどうしてセイファートに与していたのか？』『どうやって平行世界デネブに来たのか？』"
translation = "『그때 사라진 타마키가 왜 우리 앞에 있는 거지?』 『타마키는 왜 세이파트 편에 섰던 걸까?』 『어떻게 평행세계 데네브에 온 거지?』"

[[dialogue]]
speaker = "unk"
original = "彼女に聞きたいことはいくらでもあって、疑問は尽きない。"
translation = "그녀에게 묻고 싶은 것은 산더미 같았고, 의문은 끝이 없었다."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「《円環》のラクシャ……守護する摂理は流転ね。万物の循環を司る存在だわ」"
translation = "「《원환》의 락샤…… 수호하는 섭리는 유전(流転)이네. 만물의 순환을 관장하는 존재야」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「魂の輪廻も彼女の管轄。転生の天使といっても過言じゃないわね」"
translation = "「영혼의 윤회도 그녀의 관할. 전생의 천사라고 해도 과언이 아니겠네」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「そ。さすが長生きな魔女さん、よく知ってるね」"
translation = "「그렇지. 역시 오래 산 마녀님이라 그런지 잘 아네」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「守護天使に長生きとは言われたくないんだけど。悠久の時を生きる守護天使に比べたら、５００歳の魔女だってミジンコみたいなものだわ」"
translation = "「수호천사한테 오래 살았다는 소리는 듣고 싶지 않은데. 유구한 시간을 사는 수호천사에 비하면, 500살 먹은 마녀 따위 짚신벌레 같은 거니까」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「ははは。それもそうだ」"
translation = "「하하하. 그것도 그렇네」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「改めて言っておくけど、ボクは敵じゃないよ。最初から今までずっとね」"
translation = "「다시 한번 말해두겠는데, 난 적이 아니야. 처음부터 지금까지 쭉 말이야」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「じゃあ、なんで環はセイファートと一緒にいたの？\u3000敵じゃないってどの口で言うのよ」"
translation = "「그럼 왜 타마키는 세이파트랑 같이 있었던 거야? 적이 아니라는 말이 잘도 나오네!」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「それには理由があるんだけど……う～ん……どの順番で話すかなぁ……」"
translation = "「거기엔 이유가 있는데…… 음…… 어느 순서부터 이야기할까나……」"

[[dialogue]]
speaker = "unk"
original = "環はしばし逡巡した後、少し真剣な顔になって語り始める。"
translation = "타마키는 잠시 머뭇거리더니, 조금 진지한 표정이 되어 이야기하기 시작한다."

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「まず、ボクがセイファートに与したのは、彼が緋宮クロトを殺めるのを避けるためだ」"
translation = "「우선, 내가 세이파트 편에 섰던 건, 그가 히노미야 쿠로토를 죽이는 걸 피하기 위해서였어」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「彼が女神の力を奪い、敵になったのは、ボクの想定外の事態だった」"
translation = "「그가 여신의 힘을 빼앗아 적이 된 건 내 예상 밖의 사태였지」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「あの時点では、まだ魔王よりセイファートの方が強かった。でもリクリエを阻止するためには魔王を失うわけにはいかない」"
translation = "「그 시점에서는 아직 마왕보다 세이파트 쪽이 더 강했어. 하지만 리크리에를 저지하기 위해서는 마왕을 잃을 수는 없었거든」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「そういうわけで、セイファートと魔王がぶつからないように奔走してたってわけ。ボクにとっても苦肉の策だったんだよ」"
translation = "「그런 이유로 세이파트와 마왕이 부딪히지 않도록 분주하게 움직였던 거야. 나로서도 고육지책이었어」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「なんか言い訳っぽいわね」"
translation = "「왠지 변명처럼 들리네」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「まぁ言い訳は言い訳だね。ヴィーナスに危険が及ぶことになったのは、悪いと思ってるよ」"
translation = "「뭐, 변명이라면 변명이지. 비너스에게 위험이 닥치게 된 건 미안하게 생각하고 있어」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「肉体をもう１つ近くに忍ばせておいて、いざとなったらヴィーナスを助けるつもりだった。成功する可能性は低かったけどね」"
translation = "「육체를 하나 더 근처에 숨겨두고, 유사시에는 비너스를 구할 생각이었어. 성공할 가능성은 낮았지만 말이야」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「魔界で魔王の前に立ちふさがったのは、魔王の力を試すため」"
translation = "「마계에서 마왕 앞을 가로막은 건 마왕의 힘을 시험하기 위해서였어」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「直接戦って、これならセイファートに勝てるかもしれないと感じた。だから<ruby>霊屑<rt>クロスダスト</rt></ruby>を託し、魔王が覚醒する可能性に賭けた」"
translation = "「직접 싸워보고, 이 정도라면 세이파트에게 이길 수 있을지도 모른다고 느꼈지. 그래서 <ruby>영설<rt>크로스 더스트</rt></ruby>을 맡기고 마왕이 각성할 가능성에 걸었던 거야」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「結果として……魔王は見事覚醒を果たし、期待以上の成果を得られた。それはキミたちも知っての通り」"
translation = "「결과적으로…… 마왕은 훌륭하게 각성을 완수했고, 기대 이상의 성과를 얻었어. 그건 너희도 알다시피」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それは……そうだけど」"
translation = "「그건…… 그렇지만」"

[[dialogue]]
speaker = "unk"
original = "環の行動は俺の魔王としての覚醒に繋がり、それはリクリエの阻止にも寄与した。"
translation = "타마키의 행동은 나의 마왕으로서의 각성으로 이어졌고, 그것은 리크리에의 저지에도 기여했다."

[[dialogue]]
speaker = "unk"
original = "確かに、結果だけ見れば環は俺たちの味方といえるだろう。"
translation = "확실히 결과만 놓고 보면 타마키는 우리의 아군이라 할 수 있을 것이다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「セイファート元学園長に味方していたことについては、ひとまず説明を信じよう」"
translation = "「세이파트 전 학원장 편을 들었던 것에 대해서는 일단 설명을 믿도록 할게」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だけど君は何者なんだ？\u3000他の守護天使とは明らかに違う」"
translation = "「하지만 너는 정체가 뭐지? 다른 수호천사와는 명백히 달라」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「うん、ボクもそれをこれから話そうと思っていたところ」"
translation = "「응, 나도 이제 그 이야기를 하려던 참이었어」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「キミやヴィーナスとはアルタイルで出会った。だけどボクはアルタイルのラクシャじゃない。デネブのラクシャだ」"
translation = "「너나 비너스와는 알타이르에서 만났지. 하지만 난 알타이르의 락샤가 아니야. 데네브의 락샤지」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「環もデネブから……！？」"
translation = "「타마키도 데네브에서……!?」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「うん。だってボクはヴィーナスと一緒にアルタイルに来たからね」"
translation = "「응. 그야 난 비너스와 함께 알타이르에 왔으니까」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ええっ！？」"
translation = "「에엣!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ヴィーナスと環が一緒に……？」"
translation = "「비너스와 타마키가 함께……?」"

[[dialogue]]
speaker = "unk"
original = "正直、俺も驚きを禁じ得ない。"
translation = "솔직히 나도 놀라움을 금치 못했다."

[[dialogue]]
speaker = "unk"
original = "環がアルタイルのラクシャでない可能性は薄々考えていたが、ヴィーナスと環にそこまで密接な関係があるとは思わなかった。"
translation = "타마키가 알타이르의 락샤가 아닐 가능성은 어렴풋이 생각하고 있었지만, 비너스와 타마키에게 그 정도로 밀접한 관계가 있을 줄은 몰랐다."

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「どうしてそんなことになったのか、時間を遡って説明するよ。デネブは今、森羅暦３０１２年だから……十年以上前の出来事だね」"
translation = "「어쩌다 그렇게 됐는지 시간을 거슬러 올라가 설명해 줄게. 데네브는 지금 삼라력 3012년이니까…… 10년도 더 전의 일이네」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「女神テルルは憂いていた。リクリエは魔王ラクシスによって退けられたが、次のリクリエはより激しいものになるだろうと」"
translation = "「여신 테루루는 우려하고 있었어. 리크리에는 마왕 락시스에 의해 물러갔지만, 다음 리크리에는 더욱 격렬해질 것이라고」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「テルルは世界の滅びを避けようとしたが、彼女は現世に強く干渉することができない。そのままじゃ存在が大きすぎるんだ」"
translation = "「테루루는 세계의 멸망을 피하려 했지만, 그녀는 현세에 강하게 간섭할 수가 없어. 그대로는 존재가 너무 거대하거든」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「だからテルルは考えた。神ではなく、人として関与することはできないかと」"
translation = "「그래서 테루루는 생각했지. 신이 아니라 인간으로서 관여할 수는 없을까 하고」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「そこでテルルからボクに声がかかった。流転──魂と物質の循環を司るボクは、守護天使の中でも現世に干渉しやすいからね」"
translation = "「그때 테루루가 나를 불렀어. 유전── 영혼과 물질의 순환을 관장하는 나는 수호천사 중에서도 현세에 간섭하기 쉬우니까」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「そして流転を司るボクは、女神の魂の一部を切り離し、人間として転生させた」"
translation = "「그리고 유전을 관장하는 나는 여신의 영혼 일부를 떼어내어 인간으로 전생시켰어」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「！\u3000まさか──」"
translation = "「! 설마──」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「そう。それがヴィーナス──キミの母親だ」"
translation = "「그래. 그게 비너스── 네 어머니야」"

