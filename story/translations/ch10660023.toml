[[dialogue]]
speaker = "unk"
original = "第３話,ナイトプールへの招待,P"
translation = "제3화, 나이트 풀에의 초대, P"

[[dialogue]]
speaker = "unk"
original = "遊園地が拡張されて出来た新しいプール、その名も『チェリークルーズ』。"
translation = "유원지가 확장되어 새로 생긴 수영장, 그 이름도 『체리 크루즈』."

[[dialogue]]
speaker = "unk"
original = "そこは夜も営業していて、ムーディーな雰囲気にライトアップされる。"
translation = "그곳은 밤에도 영업을 해서 묘한 분위기로 조명이 켜진다."

[[dialogue]]
speaker = "ラティエ"
original = "「エルデリーゼ嬢から話を聞いて、夜のプールに遊びに来てみたのだが……」"
translation = "「엘데리제 양에게 이야기를 듣고 밤 수영장에 놀러 와 봤네만……」"

[[dialogue]]
speaker = "ラティエ"
original = "「昼間の様子とはまた違った雰囲気で良いものだな」"
translation = "「낮의 모습과는 또 다른 분위기라 좋군」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「そうなんですの！\u3000昼間とは違ってちょっぴり大人な雰囲気なのですわ～」"
translation = "「그렇습니다와! 낮과는 다르게 조금은 어른스러운 분위기입니다와~」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「なんだかいけないことをしているみたいで、ドキドキしてしまいます」"
translation = "「왠지 나쁜 짓을 하고 있는 것 같아서 두근두근해 버려요」"

[[dialogue]]
speaker = "unk"
original = "思いっきりいけないことしてるよね！"
translation = "완전 나쁜 짓 하고 있는 거잖아!"

[[dialogue]]
speaker = "unk"
original = "……っていうか無断外泊だよね？"
translation = "……그보다 무단외박이지?"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「わわわっ！\u3000会長様、しーーーっ、ですわ！」"
translation = "「와와왓! 회장님, 쉬잇──! 입니다와!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「私が<ruby>流星寮<rt>イルソーレ</rt></ruby>を抜け出して遊びに来ていること、学園長様には内緒にしておいてくださいませっ！」"
translation = "「제가 유성 기숙사를 빠져나와 놀러 온 것, 학원장님께는 비밀로 해주세요!」"

[[dialogue]]
speaker = "ラティエ"
original = "「ほう……無許可でこんな夜中に外出して遊びまわっていると……悪い子だな、きみは」"
translation = "「호오…… 허가 없이 이런 밤중에 외출해서 놀러 다니고 있다니…… 나쁜 아이군, 자네는」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「はうううううっ！！？\u3000き、聞かれてしまいましたわっ！！」"
translation = "「하우우우우우!!? 드, 들려버렸습니다와!!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「お願いですわ、学園長様！\u3000どうか見逃してくださいませっ！！」"
translation = "「부탁이에요, 학원장님! 제발 못 본 척 해주세요!!」"

[[dialogue]]
speaker = "ラティエ"
original = "「さて、どうしたものかな……」"
translation = "「음, 어쩔까나……」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ぅぅぅ～～～……」"
translation = "「으으으으~~……」"

[[dialogue]]
speaker = "ラティエ"
original = "「まあいいだろう」"
translation = "「뭐, 좋겠지」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「っっ！！！\u3000あ、ありがとうございますわっ！！！」"
translation = "「!!! 아, 감사합니다와!!!」"

[[dialogue]]
speaker = "ラティエ"
original = "「私もよく学園長室を無断で抜け出しているからな、似た者同士のよしみだ」"
translation = "「나도 자주 학원장실을 무단으로 빠져나오곤 하니까 말이야, 비슷한 처지끼리 돕고 살아야지」"

[[dialogue]]
speaker = "ラティエ"
original = "「万が一見つかって注意を受けたら、学園長の許可を貰って外出したということにしておけばいい」"
translation = "「만약 들켜서 주의를 받으면 학원장의 허가를 받고 외출했다고 해두면 되네」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「な、なんてお話のわかる学園長様ですの！！！」"
translation = "「어, 어쩜 이렇게 말이 통하는 학원장님이신지!!!」"

[[dialogue]]
speaker = "unk"
original = "最近は息を吸うように寮を抜け出して遊びに出かけているエルゼ。"
translation = "최근에는 숨 쉬듯이 기숙사를 빠져나와 놀러 다니는 엘제."

[[dialogue]]
speaker = "unk"
original = "その夜遊びを見逃しまくっている俺が言えたことではないが、学園長も大概甘かった。"
translation = "그 밤놀이를 계속 눈감아주고 있는 내가 할 말은 아니지만, 학원장도 꽤나 무른 편이었다."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「それにしても会長様、近ごろはずっと学園長様と一緒におられるように思いますわ」"
translation = "「그건 그렇고 회장님, 요즘 계속 학원장님과 함께 계시는 것 같네요」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「先日のデートの件は結局、ヘレナ様の差し金だったとお伺いしたのですが……本当にそれだけなのでしょうか？」"
translation = "「지난번 데이트 건은 결국 헬레나 님의 사주였다고 들었습니다만…… 정말 그것뿐인 건가요?」"

[[dialogue]]
speaker = "unk"
original = "そ、それは……"
translation = "그, 그건……"

[[dialogue]]
speaker = "ラティエ"
original = "「そうか……きみは彼と私の関係を特別なものと疑っているのだな？」"
translation = "「그렇군…… 자네는 그와 나의 관계를 특별한 것이라고 의심하고 있군?」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「はい、もしかしたら……その……恋人、とか……」"
translation = "「네, 혹시…… 그…… 연인이라든가……」"

[[dialogue]]
speaker = "ラティエ"
original = "「はっはっは、残念ながら私たちはそういった特別な関係ではないんだ」"
translation = "「하하하, 유감스럽게도 우리는 그런 특별한 관계가 아니네」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「あら、そうなんですの……？」"
translation = "「어머, 그랬나요……?」"

[[dialogue]]
speaker = "ラティエ"
original = "「だが気持ちを伝えられはしたがね、現在保留中ということになっている」"
translation = "「하지만 마음을 전해 받기는 했지, 현재 보류 중이라는 상태가 되어 있네」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「本当ですの、会長様っ！？\u3000学園長様に告白されましたの！？」"
translation = "「정말인가요, 회장님! 학원장님께 고백받으셨나요!?」"

[[dialogue]]
speaker = "unk"
original = "一応、気持ちは伝えたよ"
translation = "일단 마음은 전했어."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「まあ！\u3000それは素晴らしいことですわ！」"
translation = "「어머! 그건 멋진 일이네요!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ですが、保留中なのですね……それはやはり教師と生徒だから、ということでしょうか？」"
translation = "「하지만 보류 중인 거군요…… 그건 역시 교사와 제자니까, 라는 이유일까요?」"

[[dialogue]]
speaker = "ラティエ"
original = "「いいや、そういうことは気にしない。私が求めているのは、隣に並び立てるだけの強さだ」"
translation = "「아니, 그런 건 신경 쓰지 않네. 내가 요구하는 건 곁에 나란히 설 수 있을 만큼의 강함이지」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「強さ……」"
translation = "「강함……」"

[[dialogue]]
speaker = "unk"
original = "考えてくれるって"
translation = "생각해 준다더라."

[[dialogue]]
speaker = "unk"
original = "もっと強い男になれたなら"
translation = "더 강한 남자가 된다면."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「つまり脈ありということではありませんの！」"
translation = "「그 말은 가망이 있다는 거 아니겠습니까와!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「頑張ってください、会長様！\u3000私、全力で応援させていただきますのよ！\u3000何を隠そう、私、応援は大得意なのですわ！」"
translation = "「힘내세요, 회장님! 저, 전력으로 응원해 드릴게요! 사실 저, 응원은 아주 특기거든요!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「…………あれ、少々お待ちくださいませ？」"
translation = "「…………어라, 잠시만 기다려 보세요?」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「会長様は学園長様に見合う強い男にならねばならないのですよね？」"
translation = "「회장님은 학원장님께 어울리는 강한 남자가 되어야 하는 거죠?」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「なのにどうしてプールでのんびり遊んでいるのです！」"
translation = "「그런데 왜 수영장에서 느긋하게 놀고 계신 건가요!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「たるんでます！\u3000たるみすぎですわ、会長様！\u3000学園長様を射止めたいのであれば、もっと努力するべきです」"
translation = "「해이합니다! 너무 해이해졌어요, 회장님! 학원장님을 사로잡고 싶다면 더 노력해야 한다고요!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「仕方ありませんわ、私が会長様の鍛錬の相手になってさしあげます！」"
translation = "「어쩔 수 없네요, 제가 회장님의 단련 상대가 되어 드리겠습니다!」"

[[dialogue]]
speaker = "ラティエ"
original = "「いいじゃないか。たまには私以外の相手と戦ってみるのも悪くない」"
translation = "「좋지 않나. 가끔은 나 이외의 상대와 싸워보는 것도 나쁘지 않아」"

[[dialogue]]
speaker = "ラティエ"
original = "「私はここで優雅に水と戯れているから、しっかり鍛えてもらいたまえ」"
translation = "「나는 여기서 우아하게 물놀이나 하고 있을 테니 제대로 단련받도록 하게」"

[[dialogue]]
speaker = "unk"
original = "ちょ、ちょっと待って……"
translation = "잠, 잠시만……"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「いざ勝負です！！！！」"
translation = "「승부입니다!!!!」"

[[dialogue]]
speaker = "unk"
original = "プールに遊びに来ただけだったのに。"
translation = "수영장에 놀러 온 것뿐이었는데."

[[dialogue]]
speaker = "unk"
original = "こうして何故かエルデリーゼを相手に修行をすることになってしまった。"
translation = "이렇게 해서 왠지 엘데리제를 상대로 수행을 하게 되어 버렸다."

