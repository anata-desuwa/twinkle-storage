[[dialogue]]
speaker = "unk"
original = "シャドウマリオンとの戦いの舞台となる仮想空間――渋谷。"
translation = "섀도 마리온과의 싸움 무대가 되는 가상 공간――시부야."

[[dialogue]]
speaker = "トワ先生（覚醒）"
original = "「よ～し。先生、今日は頑張っちゃうぞ～！」"
translation = "「좋아~. 선생님, 오늘은 힘낼 거야~!」"

[[dialogue]]
speaker = "トワ先生（覚醒）"
original = "「というわけで、協力よろしくね、リーリアちゃん♪」"
translation = "「그런 의미에서 협력 잘 부탁해, 리리아 짱♪」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「協力するのはいいんですけど～……マリオンさんのシャドウ、絶対にマジカル強いんで、果たして勝てるかどうか……」"
translation = "「협력하는 건 좋은데~…… 마리온 씨의 섀도, 절대적으로 매지컬 강할 텐데 과연 이길 수 있을지……」"

[[dialogue]]
speaker = "トワ先生（覚醒）"
original = "「大丈夫！\u3000マリオンに直接聞いたけど、リーリアちゃん、魔女としてもすごく強いんでしょ？」"
translation = "「괜찮아! 마리온에게 직접 들었는데, 리리아 짱, 마녀로서도 엄청 강하다며?」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「まあ、これでも一応、二つ名持ちですし？\u3000学園に潜入するエージェントとして戦闘力込みでセドナ長官から指名を受けたんで、強い方だとは思いますけど……」"
translation = "「뭐, 이래 봬도 일단 이명 보유자이기도 하고요? 학원에 잠입하는 에이전트로서 전투력 포함해서 세드나 장관님께 지명을 받았으니 강한 편이라고는 생각하지만요……」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「でも、強いと言うならマリオンさんの方が別格ですよ。クラウディア様に戦い方の指導をしたのも、あの人ですし……」"
translation = "「하지만 강하다고 한다면 마리온 씨 쪽이 별격이에요. 클라우디아 님께 싸우는 법을 지도한 것도 그분이고……」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「今のクラウディア様が本気で戦ったとしても、マリオンさんが負けるビジョンが、私には思い浮かびません」"
translation = "「지금의 클라우디아 님이 진심으로 싸운다고 해도 마리온 씨가 지는 비전이 제게는 떠오르지 않아요」"

[[dialogue]]
speaker = "トワ先生（覚醒）"
original = "「うん。マリオンの強さは、流星学園で同期だった私もよく知ってる」"
translation = "「응. 마리온의 강함은 유성학원에서 동기였던 나도 잘 알아」"

[[dialogue]]
speaker = "トワ先生（覚醒）"
original = "「だからこそ、もう１度挑戦してみたいんだ。先生も現役の星騎士だから」"
translation = "「그렇기에 다시 한번 도전해 보고 싶어. 선생님도 현역 성기사니까」"

[[dialogue]]
speaker = "トワ先生（覚醒）"
original = "「リーリアちゃんだけじゃなくて、みんなも一緒に来てくれてありがとね♪」"
translation = "「리리아 짱뿐만 아니라 모두들 같이 와줘서 고마워♪」"

[[dialogue]]
speaker = "アナ（覚醒）"
original = "「ノープロブレムです。同じクラスのグループでどこに挑戦しようかと話し合っていたところだったので、ちょうどいいタイミングでした」"
translation = "「노 프로블럼입니다. 같은 반 그룹에서 어디에 도전할까 논의하던 참이었기에 딱 좋은 타이밍이었습니다」"

[[dialogue]]
speaker = "ルルカ"
original = "「そうそう。それに、リーリアちゃんの覚醒した新フォームの力も見てみたかったし♪」"
translation = "「그래 그래. 게다가 리리아 짱의 각성한 신 폼의 힘도 보고 싶었고♪」"

[[dialogue]]
speaker = "メイプル"
original = "「お兄ちゃんのところに行こうかとも思ったんだけど、それは後でもいいしね。トワ先生が頑張りたいって思ってるなら、喜んで協力するよ！」"
translation = "「오라버니가 계신 곳으로 갈까도 생각했는데 그건 나중에 해도 되고. 토와 선생님이 힘내고 싶어 하신다면 기꺼이 협력할게!」"

[[dialogue]]
speaker = "ヨミ"
original = "「私もです。この前の一件でトワ先生とは仲良くなったことですし、一緒に頑張りましょう！」"
translation = "「저도예요. 지난번 일로 토와 선생님과는 친해졌기도 하고 함께 힘내요!」"

[[dialogue]]
speaker = "トワ先生（覚醒）"
original = "「うんっ♪」"
translation = "「응♪」"

[[dialogue]]
speaker = "マリオン（覚醒）"
original = "「ふふっ、最近のトワは学生の頃に戻ったように可愛くなりましたね♪」"
translation = "「후훗, 최근의 토와는 학생 시절로 돌아간 것처럼 귀여워졌네요♪」"

[[dialogue]]
speaker = "トワ先生（覚醒）"
original = "「いや、先生は戻るも何もそもそも若いから！\u3000って、シャドウじゃなくて本物のマリオン！？」"
translation = "「아니, 선생님은 돌아가고 말고 할 거 없이 원래 젊거든! 그보다 섀도가 아니라 진짜 마리온!?」"

[[dialogue]]
speaker = "マリオン（覚醒）"
original = "「はい♪\u3000トワの様子が気になって、見学しに来ちゃいました♪\u3000それと――」"
translation = "「네♪ 토와의 모습이 신경 쓰여서 구경하러 와버렸답니다♪ 그리고――」"

[[dialogue]]
speaker = "マリオン（覚醒）"
original = "「今日はリーリアさんの<b>本気</b>も見られそうですしね♪」"
translation = "「오늘은 리리아 씨의 <b>진심</b>도 볼 수 있을 것 같으니까요♪」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「あ、あはは～。ご期待に添えるかどうか分かりませんが……」"
translation = "「아, 아하하~. 기대에 부응할 수 있을지 모르겠지만요……」"

[[dialogue]]
speaker = "ルルカ"
original = "「ねぇ、あたし、今朝からずっと思ってたんだけど……」"
translation = "「저기, 나 오늘 아침부터 계속 생각했는데……」"

[[dialogue]]
speaker = "ルルカ"
original = "「なんか今日のリーリアちゃん、いつもより自信がなさそうな感じじゃない？」"
translation = "「왠지 오늘 리리아 짱, 평소보다 자신이 없어 보이는 느낌 아냐?」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「え゛」"
translation = "「에」"

[[dialogue]]
speaker = "ヨミ"
original = "「確かに、私も思ってました。どこか不安そうっていうか……」"
translation = "「확실히 저도 생각했어요. 어딘가 불안해 보인달까……」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「う……それは……」"
translation = "「으…… 그건……」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「その……ネビュラから潜入してたスパイだって、学園のみんなの前で改めて言ったじゃない？\u3000その上、ボス役にまで抜擢されて……」"
translation = "「그게…… 네뷸라에서 잠입했던 스파이라고 학원 모두 앞에서 다시 한번 말했잖아? 게다가 보스 역할까지 맡게 되어서……」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「みんなからどんな風に思われるか、やっぱり気になるというか……今は協力体制にあっても、私はこれまでずっとみんなを騙してたわけだし……」"
translation = "「모두에게 어떤 식으로 생각될지 역시 신경 쓰인달까…… 지금은 협력 체제에 있어도 나는 지금까지 계속 모두를 속여왔던 거니까……」"

[[dialogue]]
speaker = "アナ（覚醒）"
original = "「良く思わないヒトは、やはりいるでしょうね。ですが――」"
translation = "「좋게 생각하지 않는 사람은 역시 있겠죠. 하지만――」"

[[dialogue]]
speaker = "アナ（覚醒）"
original = "「リーリアさんが今更周りの目を気にしてぶりっ子を止めてしまったら、面白さ９割減、あんこ餅のあんこ抜きみたいなものです」"
translation = "「리리아 씨가 이제 와서 주변 눈치를 보느라 내숭을 떨지 않게 된다면, 재미가 9할 감소, 앙금 없는 단팥빵 같은 것입니다」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「ん……？」"
translation = "「응……?」"

[[dialogue]]
speaker = "メイプル"
original = "「確かに！\u3000ぜんっぜん面白くないよね！\u3000リーリアはあたしたちの前でも突然かわい子ぶったりするから面白いのに！\u3000あとパッド！」"
translation = "「확실히! 저어언혀 재미없지! 리리아는 우리 앞에서도 갑자기 예쁜 척하거나 하니까 재밌는데! 그리고 패드!」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「ちょっと待って！？\u3000そもそも私、面白キャラを目指してるわけじゃないんだけど！？\u3000あとパッド言うな！！」"
translation = "「잠깐 기다려!? 애초에 나, 개그 캐릭터를 목표로 하는 게 아니거든!? 그리고 패드라고 하지 마!!」"

[[dialogue]]
speaker = "ヨミ"
original = "「えっ、そうなんですか！？\u3000私は、明るくて可愛くて面白いと三拍子揃ってるリーリアさんは、爆裂ステキだなってずっと思ってましたけど……」"
translation = "「엣, 그랬나요!? 저는 밝고 귀엽고 재미있기까지 한 삼박자를 다 갖춘 리리아 씨가 폭렬 멋지다고 계속 생각했었는데요……」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「ヨミヨミちゃん！\u3000ありがとう！\u3000可愛い！\u3000尻尾モフモフ！」"
translation = "「요미요미 짱! 고마워! 귀여워! 꼬리 폭신폭신!」"

[[dialogue]]
speaker = "ヨミ"
original = "「こやや！？\u3000可愛いだなんて、そんな……」"
translation = "「코야야!? 귀엽다니, 그런……」"

[[dialogue]]
speaker = "ルルカ"
original = "「あたし的には、胸のパッドはそこまで盛らなくてもいいんじゃないかなって思うな～」"
translation = "「나로서는 가슴 패드는 그렇게까지 채우지 않아도 되지 않을까 싶은데~」"

[[dialogue]]
speaker = "ルルカ"
original = "「バズりネタとしては羨ましいくらい面白いけど、リーリアちゃんはもっと自信持っていいと思うよ！」"
translation = "「이슈거리로는 부러울 만큼 재밌지만 리리아 짱은 좀 더 자신감을 가져도 좋다고 생각해!」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「ネタで付けてるわけじゃないんだけど！？」"
translation = "「웃기려고 넣는 거 아니거든!?」"

[[dialogue]]
speaker = "ヨミ"
original = "「そうなんですか！？\u3000私、てっきり……」"
translation = "「그랬나요!? 저는 당연히……」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「ヨミヨミちゃん！？」"
translation = "「요미요미 짱!?」"

[[dialogue]]
speaker = "アナ（覚醒）"
original = "「ぶふっ……コホン」"
translation = "「부훗…… 큼」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「アナちゃん、今ちょっと笑いそうになったでしょ！？\u3000普通に失礼！！」"
translation = "「아나 짱, 방금 좀 웃으려고 했지!? 평범하게 실례거든!!」"

[[dialogue]]
speaker = "アナ（覚醒）"
original = "「いえ、気のせいです」"
translation = "「아니요, 기분 탓입니다」"

[[dialogue]]
speaker = "メイプル"
original = "「はっ……閃いた！」"
translation = "「핫…… 번뜩였다!」"

[[dialogue]]
speaker = "メイプル"
original = "「名づけて、虚飾の聖域――『ヴァニティ・サンクチュアリ』……！\u3000パッドの幻影魔法の名前にどう？\u3000カッコ良くない！？」"
translation = "「이름하여 허식의 성역―― 『배니티 생츄어리』……! 패드의 환영 마법 이름으로 어때? 멋지지 않아!?」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「欲しいのはカッコ良さじゃなくて大きさッ！！！」"
translation = "「원하는 건 멋짐이 아니라 크기라고!!!」"

[[dialogue]]
speaker = "アナ（覚醒）"
original = "「ぶふっ……！\u3000ふふふっ！」"
translation = "「부훗……! 후후훗!」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「やっぱ笑ってんじゃん！！」"
translation = "「역시 웃고 있잖아!!」"

[[dialogue]]
speaker = "unk"
original = "と、その時。"
translation = "그때였다."

[[dialogue]]
speaker = "シャドウマリオン"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "トワ先生（覚醒）"
original = "「みんな、シャドウが現れたよ！」"
translation = "「모두들, 섀도가 나타났어!」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「ああ、もう！\u3000なんか不安に思ってるのが馬鹿らしくなってきた！」"
translation = "「아아, 정말! 왠지 불안해하고 있던 게 바보 같아졌어!」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「こうなったら――マジカル可愛く大活躍して、みんなからチヤホヤされまくってやるんだから！」"
translation = "「이렇게 된 이상―― 매지컬 귀엽게 대활약해서 모두에게 잔뜩 떠받들어질 거니까!」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「この、私とセンパイの絆から生まれた新しい力『アルカンシェルフォーム』で！」"
translation = "「이 나와 선배의 유대에서 태어난 새로운 힘 『아르캉시엘 폼』으로!」"

[[dialogue]]
speaker = "unk"
original = "アナは、ふっと口元を小さく微笑ませて──"
translation = "아나는 훗 하고 입가에 작은 미소를 띠며──"

[[dialogue]]
speaker = "アナ（覚醒）"
original = "「それでこそリーリアさんです」"
translation = "「그래야 리리아 씨답죠」"

[[dialogue]]
speaker = "ルルカ"
original = "「だね♪\u3000よ～し、クラスメイトと先生で仲良く頑張っちゃおう！\u3000お～！！」"
translation = "「그렇지♪ 좋아~, 반 친구들이랑 선생님이랑 사이좋게 힘내보자! 오~!!」"

[[dialogue]]
speaker = "unk"
original = "そうして、トワとリーリア達クラスメイトチームは、シャドウマリオンに勝負を挑むのだった――"
translation = "그렇게 토와와 리리아 등 반 친구들 팀은 섀도 마리온에게 승부를 거는 것이었다――"

