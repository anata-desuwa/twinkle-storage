[[dialogue]]
speaker = "unk"
original = "第２話,どっちが好き？（前編）,P"
translation = "제2화, 어느 쪽이 좋아? (전편), P"

[[dialogue]]
speaker = "アニマ"
original = "「ついに試作品ができたゾ、会長！」"
translation = "「드디어 시제품이 완성됐다구, 회장!」"

[[dialogue]]
speaker = "unk"
original = "ある日突然、アニマ先輩がテンション高く、星徒会室にやって来た。何事かと聞き返すと――"
translation = "어느 날 갑자기 아니마 선배가 텐션 높게 성도회실로 찾아왔다. 무슨 일이냐고 되묻자――"

[[dialogue]]
speaker = "アニマ"
original = "「ほらこの前、新種モンスターと戦った後に、会長としての仕事があるから、附属校に通い続けるのは難しいと言っていたダロウ？」"
translation = "「보라구 요전에 신종 몬스터와 싸운 뒤에 회장으로서의 일이 있으니까 부속교에 계속 다니는 건 어렵다고 말했었지?」"

[[dialogue]]
speaker = "unk"
original = "アルモと同じ理由で、俺も一時的に附属生女子のアバターに魂を移して、附属校に通ったことがあったのだが、その時の話らしい。"
translation = "알모와 같은 이유로 나도 일시적으로 부속생 여자의 아바타에 혼을 옮겨 부속교에 다닌 적이 있었는데 그때 이야기인 모양이다."

[[dialogue]]
speaker = "アニマ"
original = "「そこでアニマは考えた。魂が２つあれば、二役を同時にこなすことも可能ではナイかと！\u3000というわけで……これダ！」"
translation = "「그래서 아니마는 생각했다. 혼이 두 개 있으면 두 역할을 동시에 해내는 것도 가능하지 않겠나 하고! 그런 고로…… 이거다!」"

[[dialogue]]
speaker = "アニマ"
original = "「<ruby>魂<rt>たましい</rt></ruby><ruby>分裂薬<rt>ぶんれつやく</rt></ruby>～！」"
translation = "「영혼 분열약~!」"

[[dialogue]]
speaker = "unk"
original = "またとんでもないものを作り出してる！？"
translation = "또 엄청난 걸 만들어 냈어!?"

[[dialogue]]
speaker = "アニマ"
original = "「フヒ♪\u3000例によって何かしら副作用はあるだろうガ……安心したまえ。今日は会長に試してもらおうとは思っていナイ」"
translation = "「후히♪ 예에 따라 뭔가 부작용은 있겠지만…… 안심하게나. 오늘은 회장에게 시험해 보게 할 생각은 없으니까.」"

[[dialogue]]
speaker = "アニマ"
original = "「それよりも、こうした方が面白そうだと思ったのでネ――というわけで、出番ダ、アルモたん！」"
translation = "「그것보다 이렇게 하는 게 더 재밌을 것 같다고 생각해서 말이지―― 그런 고로 차례다, 알모땅!」"

[[dialogue]]
speaker = "アルモたん"
original = "「じゃ～ん♪\u3000なのだ！」"
translation = "「쨔잔♪ 인 것이다!」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「ふふっ、どうだ？\u3000人の子よ」"
translation = "「후후, 어떠냐? 사람의 아이여.」"

[[dialogue]]
speaker = "unk"
original = "アルモが２人……！？"
translation = "알모가 두 명……!?"

[[dialogue]]
speaker = "unk"
original = "え、えええぇぇぇーーっ！！？"
translation = "에, 에에에에엑!!?"

[[dialogue]]
speaker = "アニマ"
original = "「そう、魂を分裂させたことで、２つの体を同時に動かせるようになったというわけダ！」"
translation = "「그래, 혼을 분열시킨 것으로 두 개의 몸을 동시에 움직일 수 있게 되었다는 것이다!」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「自身がもう１人横にいるというのは不思議な感じだが、人の子が喜ぶというなら、我も嬉しいぞ」"
translation = "「자신이 또 한 명 옆에 있다는 건 이상한 기분이지만 사람의 아이가 기뻐한다면 나도 기쁘구나.」"

[[dialogue]]
speaker = "アルモたん"
original = "「両方のアルモたんが楽しめて、お得だな♪」"
translation = "「양쪽의 알모땅이 즐길 수 있어서 이득이네♪」"

[[dialogue]]
speaker = "アニマ"
original = "「フヒ、会長としては、恋人２人に囲まれて、まさに両手に花、夢の合法的ハーレムというやつダ♪\u3000嬉しいダロウ？」"
translation = "「후히, 회장으로서는 연인 두 명에게 둘러싸여서 그야말로 양손의 꽃, 꿈의 합법적 하렘이라는 거다♪ 기쁘지?」"

[[dialogue]]
speaker = "unk"
original = "嬉しいけど、正直困る……！"
translation = "기쁘긴 한데 솔직히 곤란해……!"

[[dialogue]]
speaker = "アルモたん"
original = "「そうなのか？\u3000――どっちかを贔屓にすると、もう片方に罪悪感が湧くから？」"
translation = "「그런가? ――어느 한쪽을 편애하면 다른 한쪽에게 죄책감이 들어서?」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「ふふっ、確かに他の女子が相手であれば、嫉妬の炎を燃やしてしまうだろうが、相手がもう１人の我というならば――」"
translation = "「후후, 확실히 다른 여자가 상대라면 질투의 불꽃을 태우겠지만 상대가 또 하나의 나라면――」"

[[dialogue]]
speaker = "アルモたん"
original = "「えへへ、会長のそういう優しいところは好きなのだ♪」"
translation = "「에헤헤, 회장의 그런 다정한 점은 좋아하는 것이다♪」"

[[dialogue]]
speaker = "アルモたん"
original = "「ぎゅ～っ♪\u3000すりすり<emoji=heart04>」"
translation = "「꼬옥~♪ 부비부비<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「って、こら！\u3000もう１人の我よ、何を勝手にくっ付いているのだ！\u3000そういうことをするなら、同時にしないと不公平であろう！」"
translation = "「잠깐, 이봐! 또 하나의 나여, 뭘 마음대로 달라붙어 있는 거냐! 그런 짓을 할 거면 동시에 하지 않으면 불공평하잖아!」"

[[dialogue]]
speaker = "アルモたん"
original = "「え？\u3000相手がもう１人の自分なら、遠慮する必要がないのだ。こういうのは早い者勝ちなのだ♪」"
translation = "「에? 상대가 또 하나의 자신이라면 사양할 필요가 없는 것이다. 이런 건 선착순인 것이다♪」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「なっ！？\u3000む、むむっ……！」"
translation = "「뭐라고!? 으, 으으음……!」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「人の子よ、こちらを向くがよい！」"
translation = "「사람의 아이여, 이쪽을 보거라!」"

[[dialogue]]
speaker = "unk"
original = "え？\u3000――わぷっ！？"
translation = "에? ――와푸!?"

[[dialogue]]
speaker = "アルモタヘル"
original = "「ほら<emoji=heart04>\u3000そんな、ぺったんこのちんちくりんボディより、大きい方がいいであろう？」"
translation = "「보아라<emoji=heart04> 그런 빈약한 꼬맹이 바디보다 큰 쪽이 더 좋지 않으냐?」"

[[dialogue]]
speaker = "アルモたん"
original = "「なぁっ！？\u3000まさかの自分にディスられたのだ！？\u3000というか、胸を使うのは卑怯なのだ！」"
translation = "「뭐어!? 설마 했던 자신에게 디스당한 것이다!? 그보다 가슴을 쓰는 건 비겁한 것이다!」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「ふふん♪\u3000先に抜け駆けをしたのは、お前の方であろう？\u3000ならば、こちらも弱肉強食のあり方を見せつけるまで」"
translation = "「후훈♪ 먼저 새치기를 한 건 네 쪽이지 않으냐? 그렇다면 이쪽도 약육강식의 도리를 보여줄 뿐.」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「ステーキは肉厚な方がいいに決まっているからな。――そうであろう？\u3000人の子よ」"
translation = "「스테이크는 고기가 두툼한 쪽이 좋은 게 당연하니까 말이다. ――그렇지 않으냐? 사람의 아이여.」"

[[dialogue]]
speaker = "アルモたん"
original = "「はぁ！？\u3000そんなことないのだ！\u3000最近の会長はずっと、アルモたんとラブラブだったのだ！」"
translation = "「하아!? 그렇지 않은 것이다! 최근의 회장은 계속 알모땅과 러브러브였던 것이다!」"

[[dialogue]]
speaker = "アルモたん"
original = "「賞味期限切れのお肉より、新鮮なお肉の方が美味に決まっているのだ！」"
translation = "「유통기한 지난 고기보다 신선한 고기가 맛있는 게 당연한 것이다!」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「誰が賞味期限切れだ！？\u3000熟成肉は美味であると、お前も知っているであろう！」"
translation = "「누가 유통기한 지났다는 거냐!? 숙성육은 맛있다는 걸 너도 알고 있지 않으냐!」"

[[dialogue]]
speaker = "アルモたん"
original = "「会長の好みは違うのだ♪\u3000この前デートに行った時も、アルモたんのことを好きだって言ってくれたのだ！」"
translation = "「회장의 취향은 다른 것이다♪ 요전에 데이트 갔을 때도 알모땅을 좋아한다고 말해준 것이다!」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「それは最近ずっと、そっちのアバターで活動していたからであろう！」"
translation = "「그건 최근 계속 그쪽 아바타로 활동하고 있었기 때문이겠지!」"

[[dialogue]]
speaker = "アルモたん"
original = "「最近はよく、アルモたんとキスだってしているのだ♪」"
translation = "「최근에는 자주 알모땅과 키스도 하고 있는 것이다♪」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「っ……！\u3000ふ……ふふふ……！」"
translation = "「윽……! 후…… 후후후……!」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「――アニマよ、悪いが会長は連れていくぞ！」"
translation = "「――아니마여, 미안하지만 회장은 데려가겠다!」"

[[dialogue]]
speaker = "unk"
original = "え！？\u3000おわぁ～っ！？"
translation = "에!? 으와아~!"

[[dialogue]]
speaker = "アルモたん"
original = "「なっ！？\u3000会長を担いで逃げたのだ！？\u3000待つのだ～～～っ！」"
translation = "「뭐라고!? 회장을 들쳐 메고 도망친 것이다!? 기다리는 것이다~~~!」"

[[dialogue]]
speaker = "アニマ"
original = "「ごゆっくり～♪」"
translation = "「천천히 즐기라구~♪」"

[[dialogue]]
speaker = "アニマ"
original = "「後で何があったか、報告を聞くのが楽しみだナ。……フヒ♪」"
translation = "「나중에 무슨 일이 있었는지 보고를 듣는 게 기대되는군. ……후히♪」"

[[dialogue]]
speaker = "unk"
original = "こうして、俺は大きな方のアルモに連れ去られることになるのだった――"
translation = "이렇게 나는 큰 쪽의 알모에게 끌려가게 되는 것이었다――"

