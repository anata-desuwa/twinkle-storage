[[dialogue]]
speaker = "unk"
original = "セナリィと愉快な仲間たちの即席パーティーで挑んだ対戦の行方は――"
translation = "세나리와 유쾌한 동료들의 즉석 파티로 도전한 대전의 행방은――"

[[dialogue]]
speaker = "シャドウリーリア"
original = "「…………！」"
translation = "「…………!」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
original = "「倒しましたわ……！\u3000けど――」"
translation = "「쓰러뜨렸네요……! 하지만――」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
original = "「渋谷リーリア、クッソ強ぇですわ！？\u3000なんなんですの、あの魔弾って！？」"
translation = "「시부야 리리아, 더럽게 강하네요!? 뭐예요, 저 마탄은!?」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
original = "「１発でも直撃したらアウトな必殺威力を早撃ち連射できるのは、ハッキリ言ってチートですわ！？」"
translation = "「한 발이라도 직격하면 아웃인 필살 위력을 속사로 연사할 수 있는 건 솔직히 말해서 치트잖아요!?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「にひひ♪\u3000セナリィ、余裕こいてたのに、終わってみればエンプレスフォーム、ボロボロだね～」"
translation = "「니히히♪ 세나리, 여유 부리더니 끝나고 보니까 엠프레스 폼이 너덜너덜하네~」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
original = "「体も明日絶対、筋肉痛確定ですわ！\u3000うぅ……こんなはずでは……！」"
translation = "「몸도 내일 분명 근육통 확정이에요! 으으…… 이럴 리가 없는데……!」"

[[dialogue]]
speaker = "クーシェン"
original = "「セナリィ！\u3000すごいよ！！\u3000めっちゃ強いじゃん！」"
translation = "「세나리! 대단해!! 진짜 강하잖아!」"

[[dialogue]]
speaker = "クーシェン"
original = "「なんかポンコツっぽい雰囲気出してたから、本当に強いのかな～って、正直ちょっと疑ってたんだけど――」"
translation = "「왠지 푼수 같은 분위기를 풍겨서 정말 강한 걸까~ 하고 솔직히 좀 의심했었는데――」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
original = "「ポンコツ！？」"
translation = "「푼수라니!?」"

[[dialogue]]
speaker = "クーシェン"
original = "「ダメージ受け始めたら段々と闘争心剥き出しになって、動きがキレッキレになったのは、ボクすっごくウキウキしたよ！！」"
translation = "「데미지를 입기 시작하니까 점점 투쟁심을 드러내며 움직임이 날카로워진 건 나 정말 두근두근했다고!!」"

[[dialogue]]
speaker = "クーシェン"
original = "「だから――この後はボクと勝負しよう！！！」"
translation = "「그러니까―― 이다음엔 나랑 승부하자!!!」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
original = "「しませんわよ！？\u3000このボロボロな状態でやったら、筋肉痛通り越して死にますわ！」"
translation = "「안 한다고요!? 이 너덜너덜한 상태로 하면 근육통을 넘어서 죽어요!」"

[[dialogue]]
speaker = "クーシェン"
original = "「え～？\u3000お互いボロボロな状態で戦うから面白いのに～」"
translation = "「에~? 서로 너덜너덜한 상태로 싸우니까 재밌는 건데~」"

[[dialogue]]
speaker = "ミネコ"
original = "「バンデット・セナリィ……まさかあれ程とはね。これまで敵として鉢合わせなくて、運がよかったよ～」"
translation = "「밴디트 세나리…… 설마 저 정도일 줄이야. 그동안 적으로 마주치지 않아서 운이 좋았네~」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「そうでしょ～？\u3000セナリィはああ見えて、受けた依頼は完遂する女だからね」"
translation = "「그렇지~? 세나리는 저래 봬도 받은 의뢰는 완수하는 여자니까」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「仕事であれば、大怪盗であろうとも撃ち抜くから、気を付けたほうがいいよ？」"
translation = "「일이라면 대괴도라 할지라도 쏴버릴 테니까 조심하는 게 좋을걸?」"

[[dialogue]]
speaker = "ミネコ"
original = "「あはは♪\u3000覚えておくよ。それに、キミもどうやら、なかなかの曲者みたいだからね。お近づきの印に、マインって呼んでも？」"
translation = "「아하하♪ 기억해 둘게. 게다가 너도 아무래도 보통내기가 아닌 것 같으니까. 친해진 기념으로 마인이라고 불러도 돼?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「オッケ～♪\u3000私もミネコって呼ぶね。というか、公安委員会で仕事してみる気はない？」"
translation = "「오케이~♪ 나도 미네코라고 부를게. 그나저나 공안위원회에서 일해볼 생각 없어?」"

[[dialogue]]
speaker = "ミネコ"
original = "「ふふふ、遠慮しておくよ。私は趣味に生きたい人間なんでね」"
translation = "「후후후, 사양할게. 난 취미에 살고 싶은 인간이라 말이야」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「フラれちゃったか～。でもまぁ、交渉の余地はありそうな気はしてるけどね～。にひひ♪」"
translation = "「차여버렸나~. 하지만 뭐, 협상의 여지는 있을 것 같은 기분이 드는데 말이지~. 니히히♪」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
original = "「というか、戦いよりも私、気になったことがありますのよ！\u3000ジュエリー様！！」"
translation = "「그보다 싸움보다도 저, 신경 쓰이는 게 생겼어요! 주얼리 님!!」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「おや、私かい？」"
translation = "「오야, 나 말인가?」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
original = "「戦闘中、瞬時に相手の思考を推理し、術の発動を無効化する手際、お見事でしたわ！\u3000それで私、思いましたの！」"
translation = "「전투 중 순식간에 상대의 사고를 추리해 술법의 발동을 무효화하는 솜씨, 훌륭했어요! 그래서 저, 생각했거든요!」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
original = "「それってもしや――カジノのポーカーにも活かせるんじゃありませんの？」"
translation = "「그거 혹시―― 카지노의 포커에도 활용할 수 있는 거 아니에요?」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「ふむ……カジノで試したことはないけれど、そういったゲームは確かに得意だね。まさかとは思うけど……そういうことかい？」"
translation = "「흠…… 카지노에서 시험해 본 적은 없지만 그런 종류의 게임은 확실히 특기지. 설마 싶긴 한데…… 그런 뜻인가?」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
original = "「ええ！\u3000その能力、ゴールデングースでお金に換えてみる気はありませんこと！？\u3000是非！」"
translation = "「네! 그 능력, 골든 구스에서 돈으로 바꿔볼 생각 없으세요!? 부디!」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「う～ん、あいにく、私はあまりお金に対する興味は持ち合わせていなくてね」"
translation = "「으음, 안타깝게도 난 별로 돈에 대한 흥미는 가지고 있지 않아서 말이야」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「私は『謎』を見つけて、それを解くことが好きなんだ」"
translation = "「나는 『수수께끼』를 찾아서 그걸 푸는 걸 좋아해」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
original = "「でしたら是非、解いて欲しい大きな謎がありますわ！」"
translation = "「그렇다면 부디 풀어주셨으면 하는 큰 수수께끼가 있어요!」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
original = "「私が『一体どうやったらお金持ちになることができるのか』。それをズバリ、解き明かして頂きたいですわ！」"
translation = "「제가 『대체 어떻게 하면 부자가 될 수 있는가』. 그걸 딱 명쾌하게 풀어내 주셨으면 해요!」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「ふっ……ふふっ♪\u3000すごいね、セナリィさん。その発想は思いつかなかったよ」"
translation = "「훗…… 후후♪ 대단하네, 세나리 씨. 그런 발상은 생각지도 못했어」"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "「あはは♪\u3000さすがセナっち！\u3000面白いこと考えるな～」"
translation = "「아하하♪ 역시 세나치! 재밌는 걸 생각하네~」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「紅明さん、キミの言っていた通りだったね」"
translation = "「코우메이 씨, 당신이 말했던 대로였어」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「確かに、ここに集まったのは『癖のある面白いヒトたち』ばかりだよ。キミも含めてね」"
translation = "「과연 이곳에 모인 건 『버릇 있는 재미있는 사람들』뿐이네. 당신을 포함해서 말이야」"

[[dialogue]]
speaker = "unk"
original = ""
translation = ""

[[dialogue]]
speaker = "紅明（羅刹）"
original = "「うしし、サンキュー、ジュエりん♪\u3000そいつはタレントとして、最高に嬉しい褒め言葉だぜ☆」"
translation = "「우시시, 땡큐, 쥬얼링♪ 그건 탤런트로서 최고로 기쁜 칭찬이라구☆」"

[[dialogue]]
speaker = "unk"
original = "こうして、紅明の引き合わせによって、また新たな交友関係が生まれたのだった――"
translation = "이렇게 코우메이의 주선에 의해 또 새로운 교우 관계가 태어난 것이었다――"

