[[dialogue]]
speaker = "unk"
original = "第２話,一緒にゲームしよっ,P"
translation = "제2화, 같이 게임 하자, P"

[[dialogue]]
speaker = "unk"
original = "ミネコが選星者３人のお泊り会を提案してから迎えた週末。"
translation = "미네코가 선성자 3명의 파자마 파티를 제안하고 맞이한 주말."

[[dialogue]]
speaker = "unk"
original = "さすがに俺まで泊まったりしないものの、彼女たちのレクリエーションには参加することになった。"
translation = "차마 자고 가지는 못하지만 그녀들의 레크리에이션에는 참가하게 되었다."

[[dialogue]]
speaker = "ミネコ"
original = "「――というわけで、大怪盗主催の『第２回ボードゲーム会』を開催しま～す♪」"
translation = "「──그런 이유로 대괴도 주최 『제2회 보드게임 모임』을 개최하겠습니당~♪」"

[[dialogue]]
speaker = "フェリシー"
original = "「わ～♪\u3000ぱちぱち～♪」"
translation = "「와~♪ 짝짝짝~♪」"

[[dialogue]]
speaker = "ジュエリー"
original = "「嫌な予感しかしないのだが……」"
translation = "「안 좋은 예감밖에 안 듭니다만……」"

[[dialogue]]
speaker = "ミネコ"
original = "「今回のボードゲームはこれ♪\u3000タイトルはズバリ『魔王を倒した勇者が死んでから』！」"
translation = "「이번 보드게임은 이거야♪ 타이틀은 바로 『마왕을 쓰러뜨린 용사가 죽고 나서』!」"

[[dialogue]]
speaker = "ミネコ"
original = "「簡単に内容を言うと、魔王を復活させたい闇の勢力と、勇者の元パーティーメンバー側に別れて、どちらが勝つかを競うゲームで～す♪」"
translation = "「내용을 간단히 말하자면 마왕을 부활시키려는 어둠의 세력과 용사의 전 동료 팀으로 나뉘어 어느 쪽이 이길지 겨루는 게임이야~♪」"

[[dialogue]]
speaker = "ミネコ"
original = "「今回は４人でプレイするから、２対２のチームに分かれて勝負しよ～♪」"
translation = "「이번엔 4명이서 플레이하니까 2 대 2 팀으로 나눠서 승부하자~♪」"

[[dialogue]]
speaker = "ミネコ"
original = "「ってことで、まずはチーム分けから！\u3000はい、『グーとパーで分かれましょう』をするよ～♪\u3000はいっ、グーとッパ――」"
translation = "「그럼 우선 팀 나누기부터! 자, 『주먹이랑 보로 나누기』 할 거야~♪ 자, 주먹이랑 뽀──」"

[[dialogue]]
speaker = "ミネコ"
original = "「――それじゃあ、チーム分けは私と会長で魔王側、ジュエリーとフェリシーは勇者側ってことで決定～♪」"
translation = "「──그럼 팀 나누기는 나랑 회장이 마왕 팀, 주얼리랑 펠리시는 용사 팀으로 결정~♪」"

[[dialogue]]
speaker = "ジュエリー"
original = "「むぅ。ゲームとはいえ、助手と敵対することになってしまうとは……」"
translation = "「무으. 게임이라곤 해도 조수와 적대하게 되다니……」"

[[dialogue]]
speaker = "フェリシー"
original = "「まあまあ、こういうのは１戦終わるごとに、組む相手を交代しながら楽しむものだから、一緒に頑張ろうよ♪」"
translation = "「자자, 이런 건 한 판 끝날 때마다 팀원을 바꿔가며 즐기는 거니까 같이 힘내보자♪」"

[[dialogue]]
speaker = "ミネコ"
original = "「会長、よろしくね～♪\u3000私がこのゲームの面白さ、じっくりと教えてあげるから、楽しみにしててね？\u3000ふふふっ☆」"
translation = "「회장, 잘 부탁해~♪ 내가 이 게임의 재미를 듬뿍 알려줄 테니까 기대하고 있으라구? 후후후☆」"

[[dialogue]]
speaker = "unk"
original = "そうして、ミネコにルールを教わりながら、ゲームが始まったのだが――"
translation = "그렇게 미네코에게 규칙을 배우며 게임이 시작되었는데──"

[[dialogue]]
speaker = "ミネコ"
original = "「ふふふ♪\u3000<b>これで３連勝</b>だね、ジュエリー、フェリシー♪」"
translation = "「후후후♪ <b>이걸로</b> <b>3연승</b>이네, 주얼리, 펠리시♪」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ミネコ、キミというやつは……」"
translation = "「미네코, 너라는 녀석은……」"

[[dialogue]]
speaker = "ジュエリー"
original = "「確かに、このゲームに特別強い組み合わせは存在しない。しかし――」"
translation = "「분명 이 게임에 특별히 강한 조합은 존재하지 않는다. 하지만──」"

[[dialogue]]
speaker = "ミネコ"
original = "「いや～、やっぱり理不尽に強いな～、勇者側の『長寿エルフ』と『弟子の見習い賢者』のコンビは♪\u3000熟練者の私でも、１回も勝てないとはね～♪」"
translation = "「이야~ 역시 불합리하게 강하네~, 용사 팀의 『장수 엘프』와 『제자 견습 현자』 콤비는♪ 숙련자인 나조차 한 번도 못 이기다니 말이야~♪」"

[[dialogue]]
speaker = "unk"
original = "そう、俺とミネコは、ゲームを覚えたばかりのジュエリーとフェリシーに、フルボッコで３連敗を喫していた。"
translation = "그렇다. 나와 미네코는 게임을 막 익힌 주얼리와 펠리시에게 처참하게 3연패를 당하고 있었다."

[[dialogue]]
speaker = "ミネコ"
original = "「このゲーム、基本的にはよく出来てるんだけど、勇者側のその組み合わせだけはバグみたいに最強なんだよね～♪\u3000いや、もうこれ、長寿エルフ誰が倒せんのっていうね♪」"
translation = "「이 게임 기본적으로는 잘 만들어졌는데, 용사 팀의 그 조합만큼은 버그처럼 최강이거든~♪ 아니, 진짜 이거 장수 엘프 누가 잡냐고♪」"

[[dialogue]]
speaker = "フェリシー"
original = "「それがわかってて、３回も選んだの！？」"
translation = "「그걸 알고도 세 번이나 고른 거야!?」"

[[dialogue]]
speaker = "ミネコ"
original = "「ふふふ……だって、フェリシー」"
translation = "「후후후…… 그치만 펠리시.」"

[[dialogue]]
speaker = "ミネコ"
original = "「――ゲームの難易度はマゾければマゾいほど、気持ちいいじゃん？」"
translation = "「──게임 난이도는 마조하면 마조할수록 기분 좋잖아?」"

[[dialogue]]
speaker = "フェリシー"
original = "「今、気持ちいいって言った！？」"
translation = "「지금 기분 좋다고 했어!?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「フェリシー。ミネコは理不尽が好きな『クソゲーマニア』なんだ……」"
translation = "「펠리시. 미네코는 부당함을 즐기는 『쿠소게 마니아』야……」"

[[dialogue]]
speaker = "フェリシー"
original = "「変態さんってことぉ！？」"
translation = "「변태라는 소리야!?」"

[[dialogue]]
speaker = "ミネコ"
original = "「まるで私が、痛めつけられるのが好きなだけのドＭ、みたいな理解は心外かな。私はね……クソゲーで悶えている他人を見るのも、とっても大好きだよ☆」"
translation = "「마치 내가 괴롭힘당하는 것만 좋아하는 진성 M인 것처럼 오해하면 섭섭하지. 나는 말이야…… 쿠소게로 괴로워하는 타인을 보는 것도 정말정말 좋아해☆」"

[[dialogue]]
speaker = "フェリシー"
original = "「何を言ってるか全然わからないよ……！？」"
translation = "「무슨 소리를 하는 건지 전혀 모르겠어……!?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「明解に換言すれば、超変態ということだ」"
translation = "「명쾌하게 환언하자면 초변태라는 뜻이다.」"

[[dialogue]]
speaker = "ミネコ"
original = "「ただ、私はクソゲーを楽しんでるけど、一緒のチームをやってる会長はそうじゃないだろうし、そろそろチームシャッフルして、今度は普通の勝負を――」"
translation = "「다만 나는 쿠소게를 즐기고 있지만 같이 팀을 하는 회장은 그렇지 않을 테고, 슬슬 팀을 섞어서 이번엔 제대로 된 승부를──」"

[[dialogue]]
speaker = "unk"
original = "いいや、同じ組み合わせでもう１回やろう！"
translation = "아니, 똑같은 조합으로 한 번 더 하자!"

[[dialogue]]
speaker = "ミネコ"
original = "「って、会長？」"
translation = "「어, 회장?」"

[[dialogue]]
speaker = "ミネコ"
original = "「あれ……もしかして、負けっぱなしで逆に闘志に火が点いちゃった感じ？」"
translation = "「어라…… 혹시 계속 져서 역으로 투지에 불이 붙어버린 느낌?」"

[[dialogue]]
speaker = "unk"
original = "それから俺は、これまでの敗北で学んだ経験を元に、全力でミネコをサポートして――"
translation = "그 후 나는 지금까지의 패배로 배운 경험을 바탕으로 전력을 다해 미네코를 서포트했고──"

[[dialogue]]
speaker = "ミネコ"
original = "「えっ、ウソ……！？」"
translation = "「에, 거짓말……!?」"

[[dialogue]]
speaker = "ミネコ"
original = "「す……すごいすごいっ！\u3000まさか運も味方したとはいえ、最強の組み合わせに勝てるなんて！\u3000会長、本当にすごいよ！」"
translation = "「대…… 대단해 대단해! 설마 운도 따라줬다지만 최강 조합을 이기다니! 회장, 진짜 대단해!」"

[[dialogue]]
speaker = "unk"
original = "１回もミスしないように集中して、精神力を限界まで使ってヘトヘトになりながら、ぐっと親指をサムズアップしてみせる。"
translation = "단 한 번의 실수도 하지 않도록 집중해서 정신력을 한계까지 쏟아붓고 기진맥진해진 채로 엄지를 척 올려 보였다."

[[dialogue]]
speaker = "unk"
original = "クソゲーを攻略してやったぜ……！"
translation = "쿠소게를 공략해냈다고……!"

[[dialogue]]
speaker = "ミネコ"
original = "「会長、めっちゃカッコよかったよ♪\u3000怪盗の私が、ハート盗まれちゃいそうかも♪\u3000……なんてね、ふふふっ☆」"
translation = "「회장, 진짜 멋있었어♪ 괴도인 내가 마음을 뺏겨버릴 것 같을지도♪ ……랄까나, 후후후☆」"

[[dialogue]]
speaker = "ミネコ"
original = "「とりあえず、これで心置きなく、チームシャッフルができるね♪」"
translation = "「일단 이걸로 미련 없이 팀 셔플을 할 수 있겠네♪」"

[[dialogue]]
speaker = "ジュエリー"
original = "「いや、待ちたまえ」"
translation = "「아니, 기다리게나.」"

[[dialogue]]
speaker = "フェリシー"
original = "「……もう１回」"
translation = "「……한 번 더.」"

[[dialogue]]
speaker = "unk"
original = "え？"
translation = "에?"

[[dialogue]]
speaker = "フェリシー"
original = "「もう１回やろう！\u3000会長くん！\u3000だって、こんなカッコいい勝ち方されて、そのまま終わりだなんて悔しすぎるもん！」"
translation = "「한 번 더 하자! 회장군! 이렇게 멋있게 이겨버리고 그대로 끝이라니 너무 분하단 말이야!」"

[[dialogue]]
speaker = "ジュエリー"
original = "「そういうことだ。助手、キミなら私たちの思いに応えてくれるだろう？」"
translation = "「그렇게 된 거다. 조수, 너라면 우리의 염원에 응해주겠지?」"

[[dialogue]]
speaker = "ミネコ"
original = "「おやおや、これはどうやら――難易度が更に上がっちゃったみたいだね♪」"
translation = "「이런 이런, 아무래도── 난이도가 더 올라버린 모양이네♪」"

[[dialogue]]
speaker = "unk"
original = "もう勘弁して！！！"
translation = "제발 살려줘!!!"

[[dialogue]]
speaker = "ミネコ"
original = "「ふふっ♪\u3000会長、もう１戦――私と一緒にクソゲーしよ<emoji=heart04>」"
translation = "「후후♪ 회장, 한 판 더── 나랑 같이 쿠소게 하자<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言って、楽しそうに笑うミネコなのだった――"
translation = "그렇게 말하며 즐겁게 웃는 미네코였다──"

