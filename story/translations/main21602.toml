[[dialogue]]
speaker = "unk"
original = "第２話,制覇者,B"
translation = "제2화, 제패자, B"

[[dialogue]]
speaker = "unk"
original = "リクリエの使徒に不覚を取り、目覚めてから──さらに１ヵ月の時が過ぎた。"
translation = "리크리에의 사도에게 실수를 범하고 깨어난 지── 다시 한 달의 시간이 흘렀다."

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「お父様。あまり無理をなされない方が……」"
translation = "「아버님. 너무 무리하지 않으시는 편이……」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「そうも言っていられない。何とか剣を振るえるほどには回復した……一刻も早く人間界へ帰還しなくては」"
translation = "「그렇게 말하고 있을 수도 없다. 어떻게든 검을 휘두를 수 있을 정도로는 회복했다…… 한시라도 빨리 인간계로 귀환해야 해」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「使徒が魔界を離れてもう２ヵ月……まさか未だに、人間界で戦いを続けている、ということはないだろう……」"
translation = "「사도가 마계를 떠난 지 벌써 두 달…… 설마 아직까지 인간계에서 싸움을 계속하고 있지는 않겠지……」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「……はい。きっと両学園と──魔王が。防衛に成功したのだと思います」"
translation = "「……네. 분명 양 학원과── 마왕이 방위에 성공했을 거예요」"

[[dialogue]]
speaker = "unk"
original = "魔界の<ruby>頽廃<rt>たいはい</rt></ruby>都市キュリオスは壊滅し、大小さまざまな街が地図から消えた──だが未だ世界は滅びていない。"
translation = "마계의 퇴폐도시 큐리오스는 괴멸했고 크고 작은 다양한 마을이 지도에서 사라졌다── 하지만 아직 세계는 멸망하지 않았다."

[[dialogue]]
speaker = "unk"
original = "朝が来れば太陽が昇り、夜になれば月が照らす。再創生の<ruby>本波<rt>ほんぱ</rt></ruby>はこの世界を覆わなかったのだ。"
translation = "아침이 오면 태양이 뜨고 밤이 되면 달이 비춘다. 재창생의 본파는 이 세계를 덮치지 않은 것이다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "（……私の不覚の尻ぬぐいを、少年がしてくれたのだろう。彼には世話になってばかりだ）"
translation = "(……내 실수를 그 소년이 수습해 준 것이겠지. 그에게는 신세만 지는군)"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「人間界へ向かおう。マルキア、アニュラス」"
translation = "「인간계로 향하자. 마르키아, 아뉴라스」"

[[dialogue]]
speaker = "unk"
original = "そうして私たち一家はレゾフからシャリオン地方へと取って返した。"
translation = "그렇게 우리 가족은 레조프에서 샤리온 지방으로 되돌아갔다."

[[dialogue]]
speaker = "unk"
original = "幾日もの旅──モンスターや魔界の原生生物を相手とした戦いこそあったが、使徒に比べれば何ということはない。"
translation = "며칠간의 여행── 몬스터나 마계의 원생생물을 상대로 한 전투는 있었지만 사도에 비하면 아무것도 아니었다."

[[dialogue]]
speaker = "unk"
original = "マルキアとアニュラス。愛しい２人とのかけがえのない刻を過ごしながら、西へ、西へ──"
translation = "마르키아와 아뉴라스. 사랑하는 두 사람과 함께 소중한 시간을 보내며 서쪽으로, 서쪽으로──"

[[dialogue]]
speaker = "unk"
original = "そうしてシャリオン地方にある、魔界のフィーニスの塔内部へ、再び足を踏み入れた。"
translation = "그렇게 샤리온 지방에 있는 마계의 피니스의 탑 내부로 다시 발을 들여놓았다."

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「塔の内部には変わらずガーディアンが出現するはずです。道中、気を付けて進みましょう」"
translation = "「탑 내부에는 변함없이 가디언이 출현할 것입니다. 도중에 주의해서 나아갑시다」"

[[dialogue]]
speaker_original = "マルキア"
speaker_translation = "마르키아"
original = "「そうね。あなた、まだ本調子ではないのですから……」"
translation = "「그래요. 당신, 아직 몸이 정상이 아니니까……」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「……ああ。無理をしないと約束しよう。行くぞ！」"
translation = "「……아아. 무리하지 않겠다고 약속하마. 가자!」"

[[dialogue]]
speaker = "unk"
original = "襲い来るガーディアンを切り捨てながら、塔を攻略していく。"
translation = "습격해 오는 가디언을 베어 넘기며 탑을 공략해 나간다."

[[dialogue]]
speaker = "unk"
original = "一太刀を振るうたびに体がきしみ、悲鳴を上げる──この体たらくでは、完全に復調するまで幾日を要することか。"
translation = "일태도를 휘두를 때마다 몸이 삐걱거리며 비명을 지른다── 이 꼴로는 완전히 복구될 때까지 며칠이 걸릴 것인가."

[[dialogue]]
speaker = "unk"
original = "負傷によって落ちた体力に歯噛みしながらも、２人のサポートを受け、私たち家族はとうとう人間界への出口までやってきたのだが……"
translation = "부상으로 떨어진 체력에 분해하면서도 두 사람의 서포트를 받으며 우리 가족은 드디어 인간계로의 출구까지 왔으나……"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「これは一体……！？」"
translation = "「이건 대체……!?」"

[[dialogue]]
speaker = "unk"
original = "フィーニスの塔と人間界を繋ぐ境い目に、不可思議な時空のねじれがあった。"
translation = "피니스의 탑과 인간계를 잇는 경계에 불가사의한 시공의 뒤틀림이 있었다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「どういうことだ？\u3000これは誰が、何のために……」"
translation = "「어찌 된 일이냐? 이건 누가 무엇을 위해……」"

[[dialogue]]
speaker = "unk"
original = "空間が歪み、黒とも透明とも言えない奇怪な断裂が、人間界への出入り口を覆っている。"
translation = "공간이 일그러지고 검은색인지 투명한지도 알 수 없는 기괴한 단열이 인간계로의 출입구를 덮고 있다."

[[dialogue]]
speaker = "unk"
original = "剣の切っ先を軽く差し向けると、磁力が反発するような反動が発生し、押し戻される。"
translation = "검끝을 살짝 들이밀자 자력이 반발하는 듯한 반동이 발생하며 밀려났다."

[[dialogue]]
speaker_original = "マルキア"
speaker_translation = "마르키아"
original = "「無理に進めば、どうなることか……突破は難しそうね」"
translation = "「무리하게 나아가면 어떻게 될지…… 돌파는 힘들 것 같네」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「ど、どうしましょう。お父様？」"
translation = "「어, 어쩌죠 아버님?」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「……致し方ない。このままさらに上層を目指そう。人間界で何が起こったのか──もはや女神に訊ねるしかあるまい」"
translation = "「……어쩔 수 없다. 이대로 더 상층을 노리자. 인간계에서 무슨 일이 일어난 건지── 이제 여신님께 여쭤볼 수밖에 없겠어」"

[[dialogue]]
speaker = "unk"
original = "私たち一家は、フィーニスの塔の上層を目指した。"
translation = "우리 가족은 피니스의 탑 상층을 향했다."

[[dialogue]]
speaker = "unk"
original = "補給もままならない過酷な<ruby>道程<rt>みちのり</rt></ruby>──地獄のような道中を、私たち家族は執念で登り続け……"
translation = "보급도 여의치 않은 가혹한 여정── 지옥 같은 길을 우리 가족은 집념으로 계속 올라갔고……"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『英雄ジェラルド。そしてその２人の縁者よ。よく、ここまでたどり着きました』"
translation = "『영웅 제랄드. 그리고 그 두 명의 인척이여. 잘 여기까지 도달했습니다』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「……許可も得ず禁域の塔を登り、拝謁する無礼をご容赦願いたい」"
translation = "「……허가도 없이 금역의 탑을 올라 배알하는 무례를 용서해 주시길」"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『許しましょう。今が緊急事態であること、私も承知しております』"
translation = "『용서하죠. 지금이 긴급사태라는 것, 저도 알고 있습니다』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「女神の寛大な心、感謝申し上げる。……その緊急事態について、我々に真実を教えていただきたい！」"
translation = "「여신의 관대한 마음, 감사드립니다. ……그 긴급사태에 대해 우리에게 진실을 가르쳐 주셨으면 합니다!」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「私たちの世界は今、どうなっているのだ！？\u3000不可解な出来事が、立て続けに起こっている……！」"
translation = "「우리의 세계는 지금 어떻게 된 것입니까!? 불가해한 일들이 연달아 일어나고 있습니다……!」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「人間界は……星騎士の学園は！？\u3000私の教え子たちは無事なのか！？」"
translation = "「인간계는…… 성기사 학원은!? 제 제자들은 무사한 것입니까!?」"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『…………新星学園、そして流星学園の星騎士たちは、そのほとんどが亡くなりました』"
translation = "『…………신성학원, 그리고 유성학원의 성기사들은 그 대부분이 죽었습니다』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「なっ！？」"
translation = "「뭣!?」"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『英雄ジェラルド。貴方が魔界にて交戦したリクリエの使徒……彼女の手で、殺戮されたのです』"
translation = "『영웅 제랄드. 귀하가 마계에서 교전한 리크리에의 사도…… 그녀의 손에 살륙된 것입니다』"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『ですがその使徒も……今はもういません。緋宮クロトが、その身と引き換えに、刺し違えました』"
translation = "『하지만 그 사도도…… 이제는 없습니다. 히노미야 쿠로토가 그 몸과 맞바꾸어 동귀어진했습니다』"

[[dialogue]]
speaker = "unk"
original = "全てが、遅かった……？"
translation = "모든 것이 늦었던 것인가……?"

[[dialogue]]
speaker = "unk"
original = "私が生死の境をさまよっているさなかに、人間界はひどい戦禍に巻き込まれ──少年すらも、死んだだと？"
translation = "내가 사경을 헤매고 있는 사이에 인간계는 끔찍한 전화에 휩싸였고── 소년조차 죽었다고?"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「そんな馬鹿なことが……とても信じられません！\u3000人間界には、魔界へ赴いた討伐隊以上の戦力がいたはずです！！」"
translation = "「그런 말도 안 되는 일이…… 도저히 믿기지 않습니다! 인간계에는 마계로 향한 토벌대 이상의 전력이 있었을 터입니다!!」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「女神よ、嘘だと言ってくれ……教え子たちが皆、死んだなどと……」"
translation = "「여신이여, 거짓말이라고 해다오…… 제자들이 모두 죽었다니……」"

[[dialogue]]
speaker_original = "マルキア"
speaker_translation = "마르키아"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『──マルキア。貴女だけは、疑いを持っていないようですね』"
translation = "『──마르키아. 당신만은 의심을 품지 않는 것 같군요』"

[[dialogue]]
speaker_original = "マルキア"
speaker_translation = "마르키아"
original = "「女神様。あれは、悪い夢ではなかったのですか……？」"
translation = "「여신님. 그것은 나쁜 꿈이 아니었던 건가요……?」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「ど、どういうことだ……？」"
translation = "「어, 어떻게 된 거냐……?」"

[[dialogue]]
speaker_original = "マルキア"
speaker_translation = "마르키아"
original = "「眠っている間、私は……ずっと夢を見ていたの。ひどい夢……でもあれは、ただの悪い夢だとばかり……」"
translation = "「잠들어 있는 동안 나는…… 계속 꿈을 꾸고 있었어. 끔찍한 꿈…… 하지만 그건 그저 나쁜 꿈일 뿐이라고만 생각했는데……」"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『マルキア。貴女が見ていたのは、夢ではありません』"
translation = "『마르키아. 당신이 보고 있었던 것은 꿈이 아닙니다』"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『平行世界の、同一存在ゆえに……貴女にも記憶が共有されていたのでしょう……』"
translation = "『평행세계의 동일 존재이기에…… 당신에게도 기억이 공유되었던 것이겠죠……』"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『あまりに凄惨な現実ではありますが、隠したままではいられません。ジェラルド、そしてアニュラス……貴方たちにも共有いたします』"
translation = "『너무나 처참한 현실입니다만, 숨긴 채로 있을 수는 없습니다. 제랄드, 그리고 아뉴라스…… 당신들에게도 공유하겠습니다』"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『マルキア──よろしいですか？』"
translation = "『마르키아── 괜찮겠습니까?』"

[[dialogue]]
speaker_original = "マルキア"
speaker_translation = "마르키아"
original = "「…………はい。女神様」"
translation = "「…………네. 여신님」"

[[dialogue]]
speaker = "unk"
original = "そうして女神に見せられたのは、あまりにもおぞましい光景だった。"
translation = "그렇게 여신이 보여준 것은 너무나도 끔찍한 광경이었다."

[[dialogue]]
speaker = "unk"
original = "私たち家族は、不気味な仮面を被り、正気を失ったマルキアが殺戮を繰り返す光景を見た。"
translation = "우리 가족은 기괴한 가면을 쓰고 이성을 잃은 마르키아가 살륙을 반복하는 광경을 보았다."

[[dialogue]]
speaker = "unk"
original = "まずは天界の聖庭園で──"
translation = "우선 천계의 성정원에서──"

[[dialogue]]
speaker = "unk"
original = "次は魔界。"
translation = "다음은 마계."

[[dialogue]]
speaker = "unk"
original = "私を下した後、使徒は瞬く間にキュリオスを襲撃し、煌嶺の首級をあげた──"
translation = "나를 쓰러뜨린 후 사도는 순식간에 큐리오스를 습격해 코우레이의 목을 쳤다──"

[[dialogue]]
speaker = "unk"
original = "そしてとうとう、魔の手は人間界にまで及んだ。"
translation = "그리고 드디어 마수는 인간계에까지 뻗쳤다."

[[dialogue]]
speaker = "unk"
original = "自在にアステラを生み出し、モンスターを使役する仮面のマルキア。"
translation = "자재로 아스테라를 만들어내고 몬스터를 사역하는 가면의 마르키아."

[[dialogue]]
speaker = "unk"
original = "この虐殺を行ったリクリエの使徒は、マルキア・セイファートに他ならないと女神は言う。"
translation = "이 학살을 행한 리크리에의 사도는 마르키아 세이퍼트에 다름없다고 여신은 말한다."

[[dialogue]]
speaker = "unk"
original = "デネブ、アルタイル、ベガ──３つの平行世界が存在するという荒唐無稽な事実。リクリエの使徒となったのは『アルタイル出身のマルキア』だと……"
translation = "데네브, 알타이르, 베가── 세 개의 평행세계가 존재한다는 황당무계한 사실. 리크리에의 사도가 된 것은 『알타이르 출신의 마르키아』라고……"

[[dialogue]]
speaker = "unk"
original = "矢継ぎ早に紡がれる話ではあったが、信じざるを得なかった。"
translation = "숨 가쁘게 이어지는 이야기였지만 믿을 수밖에 없었다."

[[dialogue]]
speaker = "unk"
original = "妻マルキアの謎の昏睡も、他人の空似とは思えないほどに似た使徒の外見も──その全てに説明がついたからだ。"
translation = "아내 마르키아의 의문의 혼수상태도, 남이라고는 생각되지 않을 정도로 닮은 사도의 외모도── 그 모든 것에 설명이 붙었기 때문이다."

[[dialogue]]
speaker = "unk"
original = "そうして少年と、操られた妻の決戦の光景を見た。"
translation = "그렇게 소년과 조종당하는 아내의 결전 광경을 보았다."

[[dialogue]]
speaker = "unk"
original = "一進一退の攻防を続けていたが……彼の執念が、使徒の力を上回り始めたその時に異変は起こった。"
translation = "일진일퇴의 공방을 계속하고 있었으나…… 그의 집념이 사도의 힘을 상회하기 시작했을 때 이변이 일어났다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……っ！？\u3000何だ、頭の中で……声が！？」"
translation = "「……윽!? 뭐야, 머릿속에서…… 목소리가!?」"

[[dialogue]]
speaker = "unk"
original = "目には見えない、しかし『何か圧倒的な存在』が、少年に働きかけている──？"
translation = "눈에는 보이지 않는, 하지만 『무언가 압도적인 존재』가 소년에게 작용하고 있다──?"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「みんなとまた出会いたければ……世界を、壊せ……！？\u3000滅ぼせ……！？」"
translation = "「모두와 다시 만나고 싶다면…… 세계를 부수어라……!? 멸망시켜라……!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くそ……やめろ！！\u3000貴様の言いなりになんて、なってたまるか！！」"
translation = "「제장…… 그만둬!! 네놈이 시키는 대로 할 줄 아느냐!!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「もう少しだと思ったんだが……残念ながら俺は、ここまでのようだ……」"
translation = "「조금만 더 하면 될 것 같았는데…… 유감스럽지만 나는 여기까지인 모양이군……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「<ruby>娘<rt>ヴィーナス</rt></ruby>を頼んだぞ……ラクシャ」"
translation = "「<ruby>딸<rt>비너스</rt></ruby>을 부탁한다…… 락샤」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「待ってよ、魔王！\u3000まだ何か、方法がっ！」"
translation = "「기다려, 마왕! 아직 뭔가, 방법이!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「時間がない！\u3000このままだと俺も、ディザスターハンドになってしまう……！」"
translation = "「시간이 없어! 이대로라면 나도, 디재스터 핸드가 되어버려……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺はここにいちゃいけない……だが、このリクリエの使徒も残しておけないっ！\u3000刺し違えてでも連れていく！！」"
translation = "「난 여기 있으면 안 돼…… 하지만, 이 리크리에의 사도도 남겨둘 순 없지! 같이 죽는 한이 있어도 데려가겠다!!」"

[[dialogue]]
speaker = "unk"
original = "少年が使徒と距離を詰め、その利き腕で仮面を掴み──"
translation = "소년이 사도와 거리를 좁히고, 그 오른손으로 가면을 움켜쥐며──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「すみません、マルキアさん……セイファート学園長……」"
translation = "「죄송합니다, 마르키아 씨…… 세이파트 학원장님……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺、世界を……守り切れませんでした──」"
translation = "「저, 세계를…… 지켜내지 못했어요──」"

[[dialogue]]
speaker = "unk"
original = "少年は──跡形もなく、消え去った。"
translation = "소년은── 흔적도 없이, 사라졌다."

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『緋宮クロトは、自身の力を意図的に暴走させ、爆散による特攻で使徒を消滅させました……』"
translation = "『히노미야 쿠로토는, 자신의 힘을 의도적으로 폭주시켰고, 폭산에 의한 특공으로 사도를 소멸시켰습니다……』"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『同時に作り出した平行世界のゲートを通り、ラクシャがヴィーナスを、アルタイルの世界へ運んだのです……』"
translation = "『동시에 만들어낸 평행세계의 게이트를 통해, 락샤가 비너스를 알타이르의 세계로 운반한 것입니다……』"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『そして……その代償として残ったのが、この次元の裂け目です』"
translation = "『그리고…… 그 대가로서 남은 것이, 이 차원의 균열입니다』"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『本来ヒトの身では成し得ない平行世界間の移動……それを強引に行った結果、デネブの世界には取り返しのつかない爪痕が残ってしまいました』"
translation = "『본래 인간의 몸으로는 이룰 수 없는 평행세계 간의 이동…… 그것을 억지로 행한 결과, 데네브의 세계에는 돌이킬 수 없는 손톱자국이 남고 말았습니다』"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『最も大きく穿たれたのは教皇庁前ですが……その余波は流星市国の全域にまで広がっています』"
translation = "『가장 크게 구멍이 뚫린 곳은 교황청 앞입니다만…… 그 여파는 유성시국 전역에까지 퍼져 있습니다』"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『貴方たちが人間界の土を踏めないのも、その影響です……余波の『壁』は、いずれ時間が解決するとは思いますが……』"
translation = "『당신들이 인간계의 땅을 밟지 못하는 것도, 그 영향입니다…… 여파의 『벽』은, 조만간 시간이 해결해 주리라 생각합니다만……』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「我々は負けた……もう、終わりなのか？\u3000女神よ」"
translation = "「우리는 졌다…… 이제, 끝인 것인가? 여신이여」"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『……いいえ。この宇宙はまだ、終わっていません』"
translation = "『……아니요. 이 우주는 아직, 끝나지 않았습니다』"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『ベガは滅びた。デネブも崩壊の寸前まで追い込まれていますが……まだアルタイルが残っています』"
translation = "『베가는 멸망했습니다. 데네브도 붕괴 직전까지 몰려 있습니다만…… 아직 알타이르가 남아 있습니다』"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『アルタイルの森羅歴は２９９２年。平行世界ではおおよそ、同じ出来事が同じタイミングで起こります』"
translation = "『알타이르의 신라력은 2992년. 평행세계에서는 대체로, 같은 일이 같은 타이밍에 일어납니다』"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『今から約１０年後に、アルタイルでもリクリエの使徒が現れ、流星群が発生します』"
translation = "『지금으로부터 약 10년 후에, 알타이르에서도 리크리에의 사도가 나타나고, 유성우가 발생합니다』"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『３人目の、最後の魔王が倒れる時。その時こそが、真に“今回の宇宙”が終わる時です──』"
translation = "『세 번째인, 최후의 마왕이 쓰러질 때. 그때야말로, 진정으로 “이번 우주”가 끝날 때입니다──』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「…………そうか」"
translation = "「…………그렇군」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「女神よ。ではデネブの私たちは、何をすればよいのだろうか……？」"
translation = "「여신이여. 그럼 데네브의 우리는, 무엇을 하면 좋겠는가……?」"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『英雄ジェラルド。あなたに、託したいものがあります』"
translation = "『영웅 제랄드. 당신에게, 기탁하고 싶은 것이 있습니다』"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『来たるべき決戦の日までに、私の全存在を懸け、一振りの剣をあなたに贈りましょう』"
translation = "『다가올 결전의 날까지, 나의 전 존재를 걸어, 한 자루의 검을 당신에게 선물하지요』"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『これは一太刀を浴びせるたびに、■■■の存在次元に楔を打ち込むことができます。より低い次元へと堕落させる、抹殺の剣……』"
translation = "『이것은 일격을 가할 때마다, ■■■의 존재 차원에 쐐기를 박아 넣을 수 있습니다. 보다 낮은 차원으로 타락시키는, 말살의 검……』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「……待て。今、何と言った？\u3000誰を斬れ、と？」"
translation = "「……잠깐. 방금 뭐라고 했지? 누구를 베라고?」"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『私は、■■■に名を付けることができません。許可をされていないのです……』"
translation = "『저는, ■■■에 이름을 붙일 수 없습니다. 허가되지 않은 것입니다……』"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『間接的に情報を伝えることができているのも、この場が私の領域であるフィーニスの塔であるが故。本当に、申し訳なく思います』"
translation = "『간접적으로 정보를 전할 수 있는 것도, 이곳이 나의 영역인 피니스의 탑이기 때문. 정말로, 송구스럽게 생각합니다』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「…………女神テルル。まさかそれは……あなたよりも、高位の存在がいるということなのか？」"
translation = "「…………여신 테를르. 설마 그것은…… 당신보다도, 고위의 존재가 있다는 뜻인가?」"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『…………答えることが、できません』"
translation = "『…………답할 수, 없습니다』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「──なるほど。あなたは、その何者か……先ほど、少年の精神に語り掛けていた存在を、語ることができないのだな？」"
translation = "「──과연. 당신은, 그 누군가…… 조금 전, 소년의 정신에 말을 걸고 있던 존재를, 말할 수 없는 것이로군?」"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『…………肯定も否定も、私には許されていません』"
translation = "『…………긍정도 부정도, 제게는 허락되지 않았습니다』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「──理解した。相当な強者が、相手のようだな……」"
translation = "「──이해했다. 상당한 강자가, 상대인 모양이군……」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「……アニュラス、マルキア。少し席を外してもらえるか？\u3000女神と２人で話したいことがある」"
translation = "「……아뉴라스, 마르키아. 잠시 자리를 비켜주겠나? 여신과 둘이서 이야기하고 싶은 것이 있다」"

[[dialogue]]
speaker_original = "マルキア"
speaker_translation = "마르키아"
original = "「わかりました。アニュラス、こちらへ」"
translation = "「알겠습니다. 아뉴라스, 이쪽으로」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「は、はい。お母様……」"
translation = "「네, 네. 어머니……」"

[[dialogue]]
speaker = "unk"
original = "妻と娘が離れたところで、私は女神に疑問をぶつけた。"
translation = "아내와 딸이 멀어진 곳에서, 나는 여신에게 의문을 던졌다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「女神よ。あなたの目論見は理解した。だが……私は適任ではない」"
translation = "「여신이여. 당신의 의도는 이해했다. 하지만…… 나는 적임자가 아니다」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「私はすでに星騎士としてのピークを過ぎている。ここからさらに１０年もの時を経れば、今よりも弱くなるのは必定だ」"
translation = "「나는 이미 성기사로서의 전성기를 지났다. 여기서 다시 10년의 세월이 흐르면, 지금보다 약해지는 것은 필정이다」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「アルタイルにいる、より若く強い、ジェラルド・セイファートにこそ頼むのが筋ではないか？」"
translation = "「알타이르에 있는, 보다 젊고 강한 제랄드 세이파트에게야말로 부탁하는 것이 도리가 아닌가?」"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『それは叶いません。アルタイルのジェラルド・セイファートは、悪の道に堕ちてしまいました』"
translation = "『그것은 이뤄질 수 없습니다. 알타이르의 제랄드 세이파트는, 악의 길로 타락하고 말았습니다』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「──っ！？」"
translation = "「──윽!?」"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『彼は私から霊力を簒奪し、リクリエを望む黒き騎士へと成り果ててしまったのです……』"
translation = "『그는 나로부터 영력을 찬탈하여, 리크리에를 바라는 검은 기사로 전락해 버린 것입니다……』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「…………そんな」"
translation = "「…………그럴 수가」"

[[dialogue]]
speaker = "unk"
original = "平行世界の私は──一体何をしているのだ！？"
translation = "평행세계의 나는── 도대체 무엇을 하고 있는 것인가!"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『そこで、貴方にしかできないお願いがあります』"
translation = "『그래서, 당신만이 할 수 있는 부탁이 있습니다』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「私にしかできない……？」"
translation = "「나만이 할 수 있는……?」"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『はい。アルタイルにいるジェラルド・セイファートが私から霊力を奪った結果、それは悪しき心根によって干渉を受けた、魔の霊力となりました』"
translation = "『네. 알타이르에 있는 제랄드 세이파르트가 나로부터 영력을 빼앗은 결과, 그것은 사악한 마음씨에 의해 간섭을 받은, 마의 영력이 되었습니다』"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『その魔の霊力と適合できるのは、それを生み出したジェラルド・セイファートのみ』"
translation = "『그 마의 영력과 적합할 수 있는 것은, 그것을 만들어낸 제랄드 세이파트뿐』"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『だから、デネブにいるあなたと、平行世界の地で悪に堕ちたジェラルド・セイファートの意識をリンクさせる──』"
translation = "『그래서, 데네브에 있는 당신과, 평행세계의 땅에서 악으로 타락한 제랄드 세이파트의 의식을 링크시킨다──』"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『その同調に打ち克ち、健全な精神のまま、魔の霊力を操るすべを手に入れてほしいのです』"
translation = "『그 동조를 이겨내고, 건전한 정신 그대로 마의 영력을 다루는 법을 손에 넣길 바라는 것입니다』"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『いずれ黒騎士は、アルタイルの魔王と決着をつけるでしょう……その際、敗れた黒騎士から霊力を回収するようラクシャに命じています』"
translation = "『머지않아 흑기사는, 알타이르의 마왕과 결판을 내겠지요…… 그때, 패배한 흑기사로부터 영력을 회수하도록 락샤에게 명해 두었습니다』"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『その力さえあれば、１０年後であったとしても、あなたは十全の騎士となれるでしょう』"
translation = "『그 힘만 있다면, 10년 후라 할지라도, 당신은 완전한 기사가 될 수 있겠지요』"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『酷なお願いをすることになってしまいますが……試練を受けていただけないでしょうか？\u3000デネブの英雄、ジェラルド』"
translation = "『가혹한 부탁을 하게 되었습니다만…… 시련을 받아주시지 않겠습니까? 데네브의 영웅, 제랄드』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「平行世界の私が悪に堕ちた……もしそれが真実ならば、その業は私も背負わなければならないのだろうな……」"
translation = "「평행세계의 내가 악으로 타락했다…… 만약 그것이 진실이라면, 그 업보는 나도 짊어져야만 하겠지……」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「いいだろう、女神よ。見せてくれ……！！」"
translation = "「좋다, 여신이여. 보여다오……!!」"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『感謝します。気を強く、保ってください──』"
translation = "『감사합니다. 마음을 강하게, 유지해 주세요──』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「……ぐ、ぅ──！？」"
translation = "「……구, 윽──!?」"

[[dialogue]]
speaker = "unk"
original = "雪崩れ込んでくる──アルタイルの私が抱いた絶望が。"
translation = "밀려들어 온다── 알타이르의 내가 품었던 절망이."

[[dialogue]]
speaker = "unk"
original = "手の届かない場所に行ってしまった妻が、万を超える命を虐殺していく光景を見る。"
translation = "손이 닿지 않는 곳으로 가버린 아내가, 만을 넘는 생명을 학살해 가는 광경을 본다."

[[dialogue]]
speaker = "unk"
original = "……それをただ、見ていることしかできない苦痛。"
translation = "……그것을 그저, 바라보고 있을 수밖에 없는 고통."

[[dialogue]]
speaker = "unk"
original = "妻を『リクリエの使徒』などという防ぎようもない理不尽によって奪われた。"
translation = "아내를 『리크리에의 사도』라는 방어할 방법도 없는 불합리에 의해 빼앗겼다."

[[dialogue]]
speaker = "unk"
original = "取り返す手段は、ない。"
translation = "되찾을 수단은, 없다."

[[dialogue]]
speaker = "unk"
original = "──にも関わらず、世界の守護者としての責務を期待され続けた。"
translation = "──그럼에도 불구하고, 세계의 수호자로서의 책무를 계속해서 기대받았다."

[[dialogue]]
speaker_original = "流星教皇"
speaker_translation = "유성 교황"
original = "「──これは流星の騎士である君にしか、頼めないことなのだ」"
translation = "「──이것은 유성의 기사인 자네밖에, 부탁할 수 없는 일이라네」"

[[dialogue]]
speaker_original = "流星市国民"
speaker_translation = "유성시 국민"
original = "「さすが英雄ジェラルド・セイファート！\u3000あなたがいれば、リクリエなんて怖くないぞ！」"
translation = "「역시 영웅 제랄드 세이파트! 당신이 있다면, 리크리에 따위 무섭지 않아!」"

[[dialogue]]
speaker_original = "女性職員"
speaker_translation = "여성 직원"
original = "「セイファートさん！\u3000あなたのお陰で、夫が無事に帰ってくることができました！」"
translation = "「세이파트 씨! 당신 덕분에 남편이 무사히 돌아올 수 있었어요!」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "（ああ……。私はこれからも、妻無き世界で『英雄の振る舞い』を求められ続けるのか……）"
translation = "（아아…… 나는 앞으로도, 아내 없는 세계에서 『영웅의 행세』를 계속 요구받아야 하는 것인가……）"

[[dialogue]]
speaker_original = "マルキア"
speaker_translation = "마르키아"
original = "（……お願い、あなた！\u3000早く私を……殺して……）"
translation = "（……부탁이야, 당신! 빨리 나를…… 죽여줘……）"

[[dialogue]]
speaker_original = "マルキア"
speaker_translation = "마르키아"
original = "（どうして殺しに来てくれないの？\u3000どうして、どうして、どうして、どうして──？）"
translation = "（어째서 죽이러 와주지 않는 거야? 어째서, 어째서, 어째서, 어째서──?）"

[[dialogue]]
speaker_original = "マルキア"
speaker_translation = "마르키아"
original = "（──殺セ。殺セ。殺セ、殺セ、殺セ殺セ殺セ殺セ！！）"
translation = "（──죽여라. 죽여라. 죽여라, 죽여라, 죽여라죽여라죽여라죽여라!!）"

[[dialogue]]
speaker_original = "マルキア"
speaker_translation = "마르키아"
original = "（壊セ創レ、壊セ創レ、壊セ壊セ、創レ創レ創レ、壊セ壊セ壊セ壊セ────）"
translation = "（부수어라창조해라, 부수어라창조해라, 부수어라부수어라, 창조해라창조해라창조해라, 부수어라부수어라부수어라부수어라────）"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "（叶うものなら、私のこの手で、愛する妻の凶行を止めたかった）"
translation = "（이루어질 수 있다면, 나의 이 손으로, 사랑하는 아내의 흉행을 멈추고 싶었다）"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "（しかし──平行世界間の移動は、女神の手をもってしても叶わないという……）"
translation = "（하지만── 평행세계 간의 이동은, 여신의 손을 빌려도 이루어질 수 없다고 한다……）"

[[dialogue]]
speaker = "unk"
original = "ならばせめて、せめて……"
translation = "그렇다면 적어도, 적어도……"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "（愛するマルキアの罪を『なかったことにしたい』……）"
translation = "（사랑하는 마르키아의 죄를 『없었던 일로 하고 싶다』……）"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "（三界の者たちから恨まれる殺戮者としての汚名を晴らしたい──そのためには、全ての元凶に魂を売ってでも『<ruby>リクリエを起こす<rt>なかったことにする</rt></ruby>』しかない……）"
translation = "（삼계의 자들로부터 원망받는 살육자로서의 오명을 씻고 싶다── 그러기 위해서는, 모든 원흉에게 혼을 팔아서라도 『<ruby>리크리에를 일으킬<rt>없었던 일로 할</rt></ruby>』 수밖에 없다……）"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "（そうか……平行世界の私は……そうやって、狂ってしまったのだな──）"
translation = "（그렇군…… 평행세계의 나는…… 그렇게, 미쳐버렸던 것이로군──）"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "（──だが、こちらの私は……絶望に膝を折ることはない）"
translation = "（──하지만, 이쪽의 나는…… 절망에 무릎 꿇지 않는다）"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "（妻は生きている。取り返しがつくのだ。そして……）"
translation = "（아내는 살아있다. 되돌릴 수 있다. 그리고……）"

[[dialogue]]
speaker = "unk"
original = "娘のアニュラスを思いやることができなかったこと。"
translation = "딸인 아뉴라스를 보살펴주지 못했던 것."

[[dialogue]]
speaker = "unk"
original = "教え子である学園の生徒たちを信じきれなかったこと──"
translation = "제자인 학원의 학생들을 끝까지 믿지 못했던 것──"

[[dialogue]]
speaker = "unk"
original = "アルタイルの私の後悔を<ruby>掬<rt>すく</rt></ruby>い取り、呑み込む。"
translation = "알타이르의 나의 후회를 건져 올려, 집어삼킨다."

[[dialogue]]
speaker = "unk"
original = "破滅の光景を視て、未来へ希望を繋ぐことを放棄した、己の弱さを見つめ直す──"
translation = "파멸의 광경을 보고, 미래로 희망을 잇는 것을 포기했던, 자신의 약함을 다시금 돌아본다──"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「…………これで、よいのか？」"
translation = "「…………이것으로, 된 것인가?」"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『ありがとうございます……そして、この上ない賞賛を。よくぞ耐えてくれました……今の貴方になら、託すことができます』"
translation = "『감사합니다…… 그리고, 더할 나위 없는 찬사를. 잘 참아주셨습니다…… 지금의 당신이라면, 맡길 수 있습니다』"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『私は来たるべきその時まで、剣の錬成と……ベガより飛来するディザスターハンドを食い止めることに全力を尽くします』"
translation = "『저는 다가올 그날까지, 검의 연성과…… 베가로부터 비래하는 디재스터 핸드를 막아내는 것에 전력을 다하겠습니다』"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『すべては１０年後。また見えましょう、英雄ジェラルド……！』"
translation = "『모든 것은 10년 후. 다시 뵙지요, 영웅 제랄드……!』"

[[dialogue]]
speaker = "unk"
original = "この日より、私たち一家は身元を隠し、魔界で<ruby>雌伏<rt>しふく</rt></ruby>の時を過ごした。"
translation = "이날부터 우리 가족은 신분을 숨기고, 마계에서 도광양회의 시간을 보냈다."

[[dialogue]]
speaker = "unk"
original = "姓も名も偽り、魔界の片隅で暮らすことで、ルヴィネという謎の天使の目をかいくぐり──鍛錬に次ぐ鍛錬の日々を送った。"
translation = "성도 이름도 위조하고, 마계의 한구석에서 살아가며, 루비네라는 수수께끼의 천사의 눈을 피해── 단련에 단련을 거듭하는 나날을 보냈다."

[[dialogue]]
speaker = "unk"
original = "平行世界の妻の、そして教え子たちの仇を討つ。そのことだけを胸に、１０年を過ごした。"
translation = "평행세계의 아내의, 그리고 제자들의 원수를 갚는다. 오직 그 마음만을 가슴에 품고, 10년을 보냈다."

[[dialogue]]
speaker = "unk"
original = "そして──"
translation = "그리고──"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「──時は満ちた。あなたが、守護天使ラクシャだな？」"
translation = "「──때가 되었다. 당신이, 수호천사 락샤인가?」"

[[dialogue]]
speaker = "unk"
original = "ラクシャが回収していた、平行世界アルタイルの私によって汚染された、魔の霊力を継承したのだ──"
translation = "락샤가 회수하고 있던, 평행세계 알타이르의 나에 의해 오염된, 마의 영력을 계승한 것이다──"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「遅れてすまなかった……始めるぞ、少年」"
translation = "「늦어서 미안하군…… 시작하자, 소년」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「全ての世界を救う……現代の魔王の物語を！！」"
translation = "「모든 세계를 구하는…… 현대 마왕의 이야기를!!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「セイファート──学園長！！！」"
translation = "「세이파트── 학원장님!!!」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「……まだ私のことを、そう呼んでくれるのだな、少年」"
translation = "「……아직 나를, 그렇게 불러 주는구나, 소년」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「これより高次元存在の悪神を堕落させる──見ていてくれ。流星の騎士の戦いを！！」"
translation = "「지금부터 고차원 존재인 악신을 타락시키겠다── 지켜봐 다오. 유성의 기사의 전투를!!」"

