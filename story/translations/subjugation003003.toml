[[dialogue]]
speaker = "unk"
original = "アムとナミエルは物理的に離れられない二人三脚状態の為、その日の夜から、星見家内にあるナミエルの部屋で、一緒に寝泊りすることになった。"
translation = "아무와 나미엘은 물리적으로 떨어질 수 없는 이인삼각 상태였기에, 그날 밤부터 호시미 가문 내에 있는 나미엘의 방에서 함께 지내게 되었다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ここが私の部屋です。どうぞ……」"
translation = "「여기가 제 방입니다. 들어오세요……」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「お邪魔しま～す♪\u3000わぁっ、すごい！\u3000ぬいぐるみがめっちゃ沢山ある～♪」"
translation = "「실례합니다~♪ 와앗, 대단해! 인형이 진짜 엄청 많아~♪」"

[[dialogue]]
speaker_original = "スノーマン"
speaker_translation = "스노우맨"
original = "「ほんとだ。数え切れないくらい、ぬいぐるみいっぱい♪」"
translation = "「정말이다. 셀 수 없을 정도로 인형이 가득해♪」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「ナミエル、ぬいぐるみが好きなの？」"
translation = "「나미엘, 인형 좋아해?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「えっと……まぁ、はい……」"
translation = "「저기…… 뭐, 네……」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "（状況が状況なので仕方ありませんが、まさか自分の部屋に誰かを泊めることになるなんて……）"
translation = "‘상황이 상황이라 어쩔 수 없지만, 설마 내 방에 누군가를 재우게 될 줄이야……’"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "（おかげで、部屋の中がぬいぐるみだらけなのを見られることに……。うぅ……恥ずかしい……！）"
translation = "‘덕분에 방 안이 인형투성이인 걸 들켜버렸어. 으으…… 부끄러워……!’"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「ってことは、アレだ！\u3000ナミエル、もしかしてクールで真面目だけど、実は『可愛いもの』が好きだったりする……！？」"
translation = "「그렇다는 건, 그거네! 나미엘, 혹시 쿨하고 성실하지만 사실은 『귀여운 것』을 좋아한다거나……!?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「そ、その……」"
translation = "「그, 그게……」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あっ、その反応！\u3000やっぱりそうなんだ～♪」"
translation = "「앗, 그 반응! 역시 그렇구나~♪」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「うぅ……！\u3000わ、悪いですかっ！？\u3000可愛いものが好きだったら……！」"
translation = "「으으……! 나, 나쁜가요!? 귀여운 걸 좋아하면……!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「え？\u3000いや、全然？」"
translation = "「에? 아니, 전혀?」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「好きなものは人それぞれだし、いいと思うよ♪\u3000それに、人の好きなものをバカにするなんて、カッコよくないしね！」"
translation = "「좋아하는 건 사람마다 다른 법이고, 좋다고 생각해♪ 게다가 남이 좋아하는 걸 바보 취급 하는 건 멋있지 않으니까!」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「そ、そうですか……ちょっと意外な反応……」"
translation = "「그, 그런가요…… 좀 의외의 반응……」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あっ！\u3000そうだ、あたしもゲームセンターでたまにぬいぐるみを取ったりするよ？\u3000ほら、この間クレーンゲームでゲットしたぬいぐるみ、ＳＮＳに写真をアップしたんだ～」"
translation = "「앗! 맞다, 나(あたし)도 게임 센터에서 가끔 인형을 뽑기도 한다구? 봐봐, 저번에 인형 뽑기에서 겟한 인형, SNS에 사진 올렸었어~」"

[[dialogue]]
speaker = "unk"
original = "アムはＤＩＳＣを取り出し、ナミエルに写真を見せる。"
translation = "아무는 DISC를 꺼내 나미엘에게 사진을 보여준다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「……！\u3000こ、これは、なかなか可愛いですね……私もちょっと欲しいかも……」"
translation = "「……! 이, 이건 상당히 귀엽네요…… 저도 조금 갖고 싶을지도……」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "（というか、アム先輩もやっぱり『マイ・スターグラム』やってるんだ……）"
translation = "‘그나저나 아무 선배님도 역시 『마이 스타그램』을 하시는구나……’"

[[dialogue]]
speaker = "unk"
original = "ちなみに、マイ・スターグラム――通称『マイスタ』は、写真や動画の投稿をメインとしたＳＮＳである。"
translation = "참고로 마이 스타그램―― 통칭 『마이스타』는 사진이나 동영상 투고를 메인으로 하는 SNS이다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「そういえば、ナミエルはマイスタやってないの？\u3000もしやってるなら、フォローするからアカウント教えて教えて♪」"
translation = "「그러고 보니 나미엘은 마이스타 안 해? 만약 하고 있다면 팔로우할 테니까 계정 알려줘 알려줘♪」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「あっ、えっと……」"
translation = "「앗, 저기……」"

[[dialogue]]
speaker = "unk"
original = "ナミエルはどうするか悩むが……アムの無邪気そうに言ってくる笑顔を見たら、なんだか気持ちがソワソワしてきてしまって。"
translation = "나미엘은 어떻게 할지 고민하지만…… 아무의 천진난만해 보이는 웃는 얼굴을 보니 왠지 마음이 싱숭생숭해져서."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「……わ、わかりました。アカウントは……これです」"
translation = "「……아, 알겠습니다. 계정은…… 이거예요.」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「サンキュ～♪\u3000どれどれ～？\u3000――わあっ♪\u3000ぬいぐるみ以外にも、可愛いものの写真が沢山投稿してあるじゃん！\u3000このスイーツとか、めっちゃ映えてる～！」"
translation = "「땡큐~♪ 어디 어디~? ――와아♪ 인형 말고도 귀여운 것들 사진이 잔뜩 올라와 있잖아! 이 디저트 같은 거, 완전 잘 찍혔다~!」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「そ、そうですか？\u3000このケーキは先日、流星市国内に新しくできたカフェで見つけたもので……」"
translation = "「그, 그런가요? 이 케이크는 며칠 전 유성 시국 내에 새로 생긴 카페에서 발견한 건데……」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「えっ、そうなの！？\u3000あたしも行ってみたいっ♪\u3000今度一緒に行こうよ！」"
translation = "「엣, 정말!? 나도 가보고 싶어♪ 다음에 같이 가자!」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「い、一緒にですか？\u3000まあ……別に、構いませんけど……」"
translation = "「가, 같이요? 뭐…… 딱히 상관없긴 합니다만……」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「よしっ、それじゃあ約束ね♪\u3000あっ、その時はもちろん、スノーマンも一緒にね！」"
translation = "「좋아, 그럼 약속한 거다♪ 앗, 그때는 물론 스노맨도 같이 가야 해!」"

[[dialogue]]
speaker_original = "スノーマン"
speaker_translation = "스노우맨"
original = "「え？\u3000ボクも？」"
translation = "「에? 나(ボク)도?」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「うんっ！\u3000せっかく知り合ったわけだしさ、仲を深める為にみんなでお出かけしようよ♪」"
translation = "「응! 어렵게 알게 된 사이잖아, 사이를 돈독히 하기 위해서 다 같이 놀러 가자♪」"

[[dialogue]]
speaker_original = "スノーマンL"
speaker_translation = "스노우맨 L"
original = "「みんなでお出かけ……うん！\u3000楽しそう♪」"
translation = "「다 같이 나들이…… 응! 재밌을 것 같아♪」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「そうだ！\u3000せっかくだし、３人で写真を撮らない？」"
translation = "「그렇지! 기왕 이렇게 된 거, 셋이서 사진 찍지 않을래?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「えっ、い、今ですか？\u3000この衣装ですし、顔が映るのはちょっと……」"
translation = "「엣, 지, 지금요? 이런 복장이기도 하고, 얼굴이 찍히는 건 좀……」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「大丈夫！\u3000ＳＮＳとかに載せるわけじゃなくて、これは仲良くなった記念だから♪」"
translation = "「괜찮아! SNS 같은 데 올리려는 게 아니라, 이건 친해진 기념이니까♪」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「な、仲良くって……」"
translation = "「치, 친해진 거라니……」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「ほら、スノーマンもこっちに寄って寄って！」"
translation = "「자, 스노맨도 이쪽으로 붙어 붙어!」"

[[dialogue]]
speaker_original = "スノーマン"
speaker_translation = "스노우맨"
original = "「わかった。こんな感じ……？」"
translation = "「알았어. 이런 느낌……?」"

[[dialogue]]
speaker = "unk"
original = "それから、スノーマンと一緒に写真を撮ろうとする２人。しかし――"
translation = "그러고 나서 스노맨과 함께 사진을 찍으려는 두 사람. 하지만――"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あれ？\u3000スノーマンがカメラに映ってない……？」"
translation = "「어라? 스노맨이 카메라에 안 찍혀……?」"

[[dialogue]]
speaker = "unk"
original = "ＤＩＳＣの画面には、アムとナミエルの姿しか映っていなかった。"
translation = "DISC 화면에는 아무와 나미엘의 모습밖에 보이지 않았다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「あっ……！\u3000スノーマンの姿は私たちにしか見えていないから、カメラにも……」"
translation = "「앗……! 스노맨의 모습은 저희에게만 보이니까, 카메라에도……」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「そっか、あたし達には普通に見えているから、すっかり忘れちゃってた……！」"
translation = "「그렇구나, 우리한테는 평범하게 보이니까 깜빡 잊고 있었어……!」"

[[dialogue]]
speaker_original = "スノーマン"
speaker_translation = "스노우맨"
original = "「ってことは、ボク、２人と写真撮れないんだ……残念……」"
translation = "「그 말은, 나, 두 사람이랑 사진 못 찍는구나…… 아쉽다……」"

[[dialogue]]
speaker = "unk"
original = "ションボリと頭を垂れるスノーマン。"
translation = "시무룩하게 고개를 떨구는 스노맨."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ごめんなさい。気づかなくて……」"
translation = "「미안해요. 눈치채지 못해서……」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「う～ん……よし！\u3000ねぇ、ナミエル！」"
translation = "「으~음…… 좋아! 저기, 나미엘!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あたし達で、スノーマンの体を作ってあげない？」"
translation = "「우리가 스노맨의 몸을 만들어주지 않을래?」"

