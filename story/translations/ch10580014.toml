[[dialogue]]
speaker = "unk"
original = "第４話,九浄ヘレナの青春,P"
translation = "제4화, 쿠죠 헤레나의 청춘, P"

[[dialogue]]
speaker = "unk"
original = "夜遅くまで残業することになってしまったある日。星徒会室で１人、頭を悩ませていると――"
translation = "밤늦게까지 잔업을 하게 된 어느 날. 성도회실에서 혼자 고민하고 있자니――"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「失礼するぞ。ヴィーナスの心配していた通り、まだ残っていたか」"
translation = "「실례하마. 비너스가 걱정하던 대로 아직 남아 있었군」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「こんな遅くまでする必要のある残業ならば、１人でやらず、周りに相談すればよいものを……」"
translation = "「이렇게 늦게까지 할 필요가 있는 잔업이라면, 혼자 하지 말고 주변에 상의하면 좋았을 것을……」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「――自分のスケジュールミスだから、自分でカバーしようと思った？\u3000やれやれ、貴殿はたまに、そうやって背負い込みすぎる時があるな」"
translation = "「――자신의 스케줄 실수니까 스스로 커버하려 했다고? 야레야레, 귀하는 가끔 그렇게 혼자 다 짊어지려 할 때가 있군」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「それは貴殿の悪癖だぞ。もっと周りに相談せよ。私もいるであろう」"
translation = "「그건 귀하의 나쁜 버릇이다. 좀 더 주변에 의지하도록 해. 나도 있지 않나」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「……大人だからと距離を置かれるのは寂しいものだ。特に、貴殿にはな」"
translation = "「……어른이라고 거리를 두는 건 쓸쓸한 법이다. 특히 귀하에게는 말이지」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「見たところ、行き詰った顔をしているし、少し気晴らしにでもいかないか？」"
translation = "「보아하니 막다른 길에 부딪힌 얼굴인데, 기분 전환이라도 하러 가지 않겠나?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「――なに、ちょっとした大人の夜デートというやつだ」"
translation = "「――뭐, 자그마한 어른의 밤 데이트라는 거다」"

[[dialogue]]
speaker = "unk"
original = "そんな風にヘレナちゃんから誘われて、夜の校舎を散歩することになった――"
translation = "그런 식으로 헤레나짱의 권유를 받아 밤의 교사를 산책하게 되었다――"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「夜の学園というのも、こうして２人で歩くと、なかなかに雰囲気があってよいものであろう？」"
translation = "「밤의 학원이라는 것도 이렇게 둘이서 걸으니 꽤 분위기 있고 좋지 않나?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ちょうど周りの目もなく、よい機会だ。この前のデートではすっかり忘れてしまっていたが――」"
translation = "「마침 주변의 눈도 없고 좋은 기회다. 저번 데이트에서는 깜빡 잊고 있었지만――」"

[[dialogue]]
speaker = "unk"
original = "そう言って、ヘレナちゃんは俺の前に手を差し出す。"
translation = "그렇게 말하며 헤레나짱은 내 앞에 손을 내민다."

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「男女のデートといえば、手を繋ぐのが定番であろう？\u3000せっかくだから、試してみぬか？」"
translation = "「남녀의 데이트라고 하면 손을 잡는 게 정석이지 않나? 기왕 이렇게 된 거 시험해 보지 않겠나?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「今度の時は、エスコートしてくれるとも言っていたしな？\u3000ふふっ」"
translation = "「다음번엔 에스코트해 준다고 말하기도 했고 말이야? 후훗」"

[[dialogue]]
speaker = "unk"
original = "俺はちょっと緊張しながら、手を繋ぐ。九浄家当主として大きなオーラを纏っている彼女だが、実際にその手を取ると、女性らしく小さくて――"
translation = "나는 조금 긴장하며 손을 잡는다. 쿠죠가의 당주로서 커다란 오라를 두르고 있는 그녀지만, 실제로 그 손을 잡으니 여성스럽고 작아서――"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ふむ、こうして手を取り合うと、貴殿は確かに男なのだな。可愛い顔立ちをしているのに、手も、背丈も、大人の私より大きいのだと実感させられる」"
translation = "「흐음, 이렇게 손을 마주 잡으니 귀하는 확실히 남자구나. 귀여운 얼굴을 하고 있는데도 손도, 키도 어른인 나보다 크다는 걸 실감하게 돼」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「さあ、このまま少し、歩いてみようではないか」"
translation = "「자, 이대로 조금 걸어보지 않겠나」"

[[dialogue]]
speaker = "unk"
original = "そのままヘレナちゃんの手を引きながら、校舎内を歩いていると――"
translation = "그대로 헤레나짱의 손을 이끌며 교내를 걷고 있자니――"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「……♪」"
translation = "「……♪」"

[[dialogue]]
speaker = "unk"
original = "ふと、ヘレナちゃんが俺の腕を組むように身を寄せてきて、ドキッとしてしまう。"
translation = "문득 헤레나짱이 내 팔짱을 끼듯이 몸을 밀착해 와서 가슴이 두근거리고 만다."

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ふふっ、驚かせてしまったか。気分が高揚して、つい、な。……嫌だったか？」"
translation = "「후훗, 놀라게 했나? 기분이 고양되어서 그만. ……싫었나?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「――嫌でないのなら、よかった。なに、良い匂いがしてドキドキする？」"
translation = "「――싫지 않다면 다행이군. 뭐, 좋은 향기가 나서 두근거린다고?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「お香を炊くのが趣味の１つでな。匂いも趣味が合うようで、嬉しいぞ」"
translation = "「향을 피우는 게 취미 중 하나라서 말이야. 향기 취향도 맞는 것 같아 기쁘구나」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「魔王よ、もう１つワガママを言ってもよいか？」"
translation = "「마왕이여, 한 가지만 더 어리광을 부려도 되겠나?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「手の繋ぎ方を変えてみたいのだが、よいか？\u3000恋人繋ぎというのがあるであろう？」"
translation = "「손을 잡는 방식을 바꿔보고 싶은데 괜찮겠나? 연인 잡기라는 게 있지 않나?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「どんなものなのか、試してみたいのだ。……ダメか？」"
translation = "「어떤 느낌인지 시험해 보고 싶다. ……안 될까?」"

[[dialogue]]
speaker = "unk"
original = "俺はそれを了承して、ヘレナちゃんと指を絡めて、繋ぎ直す。"
translation = "나는 그것을 수락하고 헤레나짱과 손가락을 얽어 다시 고쳐 잡는다."

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「――んっ……<emoji=heart04>\u3000これは、なるほど。普通に繋ぐのとは全然違うな」"
translation = "「――음……<emoji=heart04> 이건 과연. 평범하게 잡는 것과는 전혀 다르군」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ふふっ……九浄ヘレナとあろう者が、手汗をかいてしまっている」"
translation = "「후훗…… 쿠죠 헤레나나 되는 자가 손에 땀을 쥐고 말이야」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「これが男女の仲を深めるということか。悪くないが……」"
translation = "「이것이 남녀의 사이를 깊게 한다는 것인가. 나쁘지 않지만……」"

[[dialogue]]
speaker = "unk"
original = "そこで彼女は、パッと手を離した。"
translation = "거기서 그녀는 탁 하고 손을 뗐다."

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「しかし、学生相手に少々やり過ぎた。頭を冷やすとしよう」"
translation = "「하지만 학생을 상대로 조금 과했군. 머리를 좀 식혀야겠어」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ふぅ……調子に乗ってすまなかったな、魔王よ。貴殿といると、つい己の立場を忘れてしまいがちになる」"
translation = "「후우…… 분위기에 휩쓸려 미안하구나, 마왕이여. 귀하와 있으면 그만 자신의 입장을 잊어버리게 되는군」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「……最近、私も貴殿と同じくらいの年で学生だったなら、と思うことがあるよ」"
translation = "「……최근 나도 귀하와 비슷한 나이의 학생이었다면, 하고 생각할 때가 있어」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「まあ、青春とは得てして、こうやって後になってから羨み、望むものなのかもしれぬが……」"
translation = "「뭐, 청춘이란 대개 이렇게 나중이 되어서야 부러워하고 바라는 것일지도 모르겠지만……」"

[[dialogue]]
speaker = "unk"
original = "これも青春じゃない？"
translation = "이것도 청춘 아니야?"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker = "unk"
original = "俺はヘレナちゃんと出会ってから、楽しいと感じている。最初は、九浄家のご当主様だし、年上の女の人だしと、確かに距離を感じていたけど……今は――"
translation = "나는 헤레나짱과 만난 뒤로 즐겁다고 느끼고 있다. 처음엔 쿠죠가의 당주님이시고 연상의 여성이라 확실히 거리를 느끼고 있었지만…… 지금은――"

[[dialogue]]
speaker = "unk"
original = "女の人だって意識してるし……"
translation = "한 명의 여자로 의식하고 있고……"

[[dialogue]]
speaker = "unk"
original = "「だから、その……」と言いかけたところで、俺の唇にそっと、彼女の人差し指が触れた。"
translation = "「그러니까, 그……」라고 말을 꺼내려던 찰나, 내 입술에 살며시 그녀의 검지 손가락이 닿았다."

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「……今日のところは、そこまでにしておくがよい」"
translation = "「……오늘은 거기까지만 해 두도록 해라」"

[[dialogue]]
speaker = "unk"
original = "暗くてはっきりとはわからないが、ヘレナちゃんの顔を見ると、赤くなっているような気がして――"
translation = "어두워서 확실히는 알 수 없지만, 헤레나짱의 얼굴을 보니 빨개져 있는 것 같은 기분이 들어――"

[[dialogue]]
speaker = "unk"
original = "もしかして、ヘレナちゃん――"
translation = "설마 헤레나짱――"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「それ以上、言うでない」"
translation = "「더 이상 말하지 말거라」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「……誰にでも、初心なことはあるであろう？」"
translation = "「……누구에게나 처음이라는 건 있지 않겠나?」"

[[dialogue]]
speaker = "unk"
original = "俺は思わず、吹き出してしまう。"
translation = "나는 나도 모르게 웃음을 터뜨리고 만다."

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「なっ……！\u3000こら！\u3000貴殿、なにを笑っているのだ！\u3000女性相手に失礼だぞ！？」"
translation = "「나앗……! 이봐! 귀하, 무엇을 웃는 것이냐! 여성에게 실례라고!?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「笑うでない！\u3000私だって怒るんだぞ、魔王……！？」"
translation = "「웃지 말거라! 나도 화낼 줄 안다구, 마왕……!?」"

[[dialogue]]
speaker = "unk"
original = "そう言って、普通の女の子みたいに恥ずかしがるヘレナちゃんを、やっぱり可愛いと思ってしまうのだった――"
translation = "그렇게 말하며 평범한 여자아이처럼 부끄러워하는 헤레나짱을 역시 귀엽다고 생각하게 되는 것이었다――"

