[[dialogue]]
speaker = "unk"
original = "合宿７日目。"
translation = "합숙 7일째."

[[dialogue]]
speaker = "unk"
original = "リップルが毎日コツコツと作り続けていたリゾート結界。それがついに――"
translation = "리플이 매일 꾸준히 만들어오던 리조트 결계. 그것이 마침내――"

[[dialogue]]
speaker = "リップル"
original = "「ついに、カタチになりました……！」"
translation = "「드디어 형태가 되었슴다……!」"

[[dialogue]]
speaker = "リップル"
original = "「まだまだなところもタクサンあると思います。でも、皆から意見を聞いて、ちゃんと最後まで仕上げることがデキました！」"
translation = "「부족한 부분도 많이 있겠지만, 모두에게 의견을 듣고 제대로 끝까지 마무리할 수 있었슴다!」"

[[dialogue]]
speaker = "リップル"
original = "「ワタシの海の家が……リゾートが完成したんです！」"
translation = "「저의 바다의 집이…… 리조트가 완성된 검다!」"

[[dialogue]]
speaker = "unk"
original = "おめでとう、リップル"
translation = "「축하해, 리플.」"

[[dialogue]]
speaker = "リップル"
original = "「カイチョー、アリガトございます！」"
translation = "「회장님, 감사함다!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「おめでとう！\u3000リップルならきっと上手く行くと思ってたわ！」"
translation = "「축하해! 리플이라면 분명 잘해낼 거라고 생각했어!」"

[[dialogue]]
speaker = "マトイ"
original = "「もともと来た時から楽園みたいに素敵な場所だったしね」"
translation = "「원래 왔을 때부터 낙원처럼 멋진 곳이었으니까.」"

[[dialogue]]
speaker = "サーシャ"
original = "「よく頑張ったわね～。リップルちゃん、偉い偉い♪」"
translation = "「정말 열심히 했네~. 리플 짱, 장하다 장해♪」"

[[dialogue]]
speaker = "アナ"
original = "「おめでとうございます。１つ１つにしっかりとコンセプトが感じられて、グッジョブです」"
translation = "「축하드립니다. 하나하나에 확실한 컨셉이 느껴져서 굿 잡입니다.」"

[[dialogue]]
speaker = "フィオナ"
original = "「ここに来れたおかげで、私は夏の海の楽しさを知ることが出来ました」"
translation = "「여기에 올 수 있었던 덕분에 저는 여름 바다의 즐거움을 알 수 있었어요.」"

[[dialogue]]
speaker = "フィオナ"
original = "「ですから、リップルさんがこのリゾート結界に込めた想いは、ちゃんと伝わる場所になっていると、私は思います」"
translation = "「그러니까 리플 씨가 이 리조트 결계에 담은 마음은 제대로 전해지는 장소가 되었다고 저는 생각해요.」"

[[dialogue]]
speaker = "リップル"
original = "「フィオナ……！\u3000皆もアリガトございます！」"
translation = "「피오나……! 여러분도 감사함다!」"

[[dialogue]]
speaker = "リップル"
original = "「……これまでずっと悩んでイタのに、皆が来てくれてから、ウソみたいに手が進んで、カンセイできちゃいました」"
translation = "「……지금까지 계속 고민하고 있었는데, 여러분이 와주시고 나서 거짓말처럼 작업이 진척되어 완성할 수 있었슴다.」"

[[dialogue]]
speaker = "リップル"
original = "「それで気付いたんです。海の家は……ワタシが思い描いていた夏の海は、楽しんでくれる人がいてコソだって」"
translation = "「그래서 깨달았슴다. 바다의 집은…… 제가 그리던 여름 바다는 즐겨주는 사람이 있어야 비로소 존재한다는 걸여.」"

[[dialogue]]
speaker = "リップル"
original = "「だから、ワタシ１人が考え込んでいるダケじゃ、いつまでも理想に近付けなくてアタリマエだったんです」"
translation = "「그러니 저 혼자 고민하고만 있어서는 언제까지고 이상에 가까워지지 못하는 게 당연했슴다.」"

[[dialogue]]
speaker = "リップル"
original = "「皆がここにやって来てくれて、去年の海で味わったハッピーな気持ちや、感動を思い出せたから、そのことに気付くことがデキました！」"
translation = "「모두가 이곳에 와주어서 작년 바다에서 맛보았던 해피한 기분이나 감동을 떠올릴 수 있었기에 그 사실을 깨달을 수 있었슴다!」"

[[dialogue]]
speaker = "リップル"
original = "「ワタシと出会ってくれて、本当にアリガトございます！」"
translation = "「저와 만나주셔서 정말 감사함다!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふふっ、それを言うなら、私達もリップルと出会えて良かったわ」"
translation = "「후후, 그렇게 따지면 우리도 리플과 만나서 다행이야.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「刺激的で楽しいサプライズ合宿になったし、水着フォームという新たな力も手に入れられたしね！」"
translation = "「자극적이고 즐거운 서프라이즈 합숙이 되었고, 수영복 폼이라는 새로운 힘도 손에 넣었으니까!」"

[[dialogue]]
speaker = "マトイ"
original = "「サバイバルも回避出来て、温泉に入れて、料理も美味しい……控え目に言って最高だったよ！」"
translation = "「서바이벌도 회피하고 온천도 들어가고 요리도 맛있고…… 겸손하게 말해서 최고였어!」"

[[dialogue]]
speaker = "サーシャ"
original = "「うふふ♪\u3000マトイちゃん、そればっかり～」"
translation = "「우후후♪ 마토이 짱, 그것만 말하네~」"

[[dialogue]]
speaker = "アナ"
original = "「よっぽどサバイバルが嫌だったんですね」"
translation = "「어지간히 서바이벌이 싫었나 보군요.」"

[[dialogue]]
speaker = "フィオナ"
original = "「でも、今度は是非、サバイバルも体験してみたいです」"
translation = "「하지만 다음에는 부디 서바이벌도 체험해 보고 싶어요.」"

[[dialogue]]
speaker = "unk"
original = "なら、その時は俺が教えるよ"
translation = "「그럼 그때는 내가 가르쳐 줄게.」"

[[dialogue]]
speaker = "フィオナ"
original = "「はい、是非♪\u3000――ただしお手柔らかに、ですか？\u3000ふふっ、分かりました」"
translation = "「네, 부디♪ ――다만 살살 부탁드려요, 일까요? 후후, 알겠습니다.」"

[[dialogue]]
speaker = "サーシャ"
original = "「あ、そうだわ。リップルちゃんの結界完成のお祝いで言うの忘れちゃってたけど、皆、ちょっとビーチの方まで来て欲しいの～」"
translation = "「아, 맞다. 리플 짱의 결계 완성 축하로 말하는 걸 잊어버렸는데, 얘들아, 잠깐 비치 쪽까지 와줬으면 해~」"

[[dialogue]]
speaker = "リップル"
original = "「サーシャ？\u3000ビーチに何かあるんデスかー？」"
translation = "「사샤 씨? 비치에 뭐가 있슴까?」"

[[dialogue]]
speaker = "サーシャ"
original = "「実はね～」"
translation = "「실은 말이야~」"

[[dialogue]]
speaker = "マトイ"
original = "「えぇっ！？\u3000このビーチの先にある洞窟で、アステライトを見つけた！？」"
translation = "「에엣!? 이 비치 끝에 있는 동굴에서 아스테라이트를 발견했다고!?」"

[[dialogue]]
speaker = "フィオナ"
original = "「それは本当なんですか……！？\u3000何でそんな……！」"
translation = "「그게 정말인가요……!? 어째서 그런 게……!」"

[[dialogue]]
speaker = "サーシャ"
original = "「私、毎朝の日課で島のあちこちを探検していたんだけど、今日は洞窟の奥まで行ってみようと思って、足を踏み入れたの。そしたら～」"
translation = "「나, 매일 아침 일과로 섬 여기저기를 탐험하고 있었는데, 오늘은 동굴 안쪽까지 가보려고 발을 들였거든. 그랬더니~」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「洞窟の奥にアステラを見つけたというわけね。……モンスターは？」"
translation = "「동굴 안쪽에 아스테라를 발견했다는 거네. ……몬스터는?」"

[[dialogue]]
speaker = "サーシャ"
original = "「たくさんいたわ～。でも不思議なことに、洞窟の入り口から外には見えない壁で遮られて、出られないみたいで……」"
translation = "「많이 있었어~. 하지만 신기하게도 동굴 입구에서 밖으로는 보이지 않는 벽으로 가로막혀서 못 나오는 것 같더라고……」"

[[dialogue]]
speaker = "アナ"
original = "「ふむ。もしかしたら……それがリゾート結界から出られない原因だったりするのでは？」"
translation = "「흠. 어쩌면…… 그것이 리조트 결계에서 나가지 못하는 원인이 아닐까요?」"

[[dialogue]]
speaker = "マトイ"
original = "「アナ、どういうこと？」"
translation = "「아나, 무슨 소리야?」"

[[dialogue]]
speaker = "アナ"
original = "「アステラが出現した際、その付近にある空間が歪んでおかしくなる現象――『バグ化』がありますよね？\u3000結界の壁が歪んだのは、その影響じゃないかと思ったんです」"
translation = "「아스테라가 출현했을 때 그 부근의 공간이 뒤틀려 이상해지는 현상―― 『버그화』가 있지 않습니까? 결계의 벽이 뒤틀린 건 그 영향이 아닐까 생각했습니다.」"

[[dialogue]]
speaker = "フィオナ"
original = "「なるほど。リップルさんが無人島をコピーしてリゾート結界を作っていたところ、現実世界の洞窟にアステライトが発生」"
translation = "「과연. 리플 씨가 무인도를 복사해서 리조트 결계를 만들고 있던 도중, 현실 세계의 동굴에 아스테라이트가 발생.」"

[[dialogue]]
speaker = "フィオナ"
original = "「その際に結界と干渉して、アステラが結界内に取り込まれてしまった。結果、不純物が入り込んだことで結界に想定外の歪みが生じてしまった、と」"
translation = "「그때 결계와 간섭하여 아스테라가 결계 내로 흡수되어 버렸다. 결과적으로 불순물이 섞이면서 결계에 예상치 못한 뒤틀림이 생겨버렸다, 는 거군요.」"

[[dialogue]]
speaker = "アナ"
original = "「その通りです。それなら、リップルさんが途中から結界の外に出られなくなったこととも辻褄が合います」"
translation = "「그 말대로입니다. 그렇다면 리플 씨가 도중에 결계 밖으로 나갈 수 없게 된 것과도 앞뒤가 맞습니다.」"

[[dialogue]]
speaker = "アナ"
original = "「サーシャ先輩の言った、モンスターが洞窟から出て来れないという現象は――」"
translation = "「사샤 선배가 말한 몬스터가 동굴에서 나오지 못한다는 현상은――」"

[[dialogue]]
speaker = "アナ"
original = "「おそらくリゾート結界の壁に歪みが生じているように、アステラ側にも何らかの歪みが生じているからだと推察できます」"
translation = "「아마 리조트 결계의 벽에 뒤틀림이 생긴 것처럼 아스테라 측에도 어떠한 뒤틀림이 생겼기 때문이라고 추측할 수 있습니다.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「サーシャさん、洞窟に足を踏み入れたって言ってたけど、こっちからは洞窟内に出入り可能ってことでいいのかしら？」"
translation = "「사샤 씨, 동굴에 발을 들였다고 했는데 이쪽에서는 동굴 안으로 출입이 가능하다는 뜻으로 봐도 될까?」"

[[dialogue]]
speaker = "サーシャ"
original = "「ええ。見えない壁を通る時に強い抵抗があるけど、星力を最大出力にしたら、通り抜けることが出来たわ」"
translation = "「응. 보이지 않는 벽을 통과할 때 강한 저항이 있지만, 성력을 최대 출력으로 하면 빠져나갈 수 있었어.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ということは、そのアステラを攻略出来れば、結界の歪みも直って、外に出られるようになるってことね！」"
translation = "「그렇다는 건 그 아스테라를 공략하면 결계의 뒤틀림도 고쳐지고 밖으로 나갈 수 있게 된다는 거네!」"

[[dialogue]]
speaker = "リップル"
original = "「アステラとモンスター……それはニュースでもよく見かけてたからシッテます。まさか、いつの間にかそれが結界の中に出来てたなんて……！」"
translation = "「아스테라와 몬스터…… 그건 뉴스에서도 자주 봐서 알고 있슴다. 설마 어느샌가 그게 결계 안에 생겨 있었다니……!」"

[[dialogue]]
speaker = "リップル"
original = "「洞窟は元の無人島で見た時、シンピ的な場所で気に入ってたので、そのままにしてアッタんです……」"
translation = "「동굴은 원래 무인도에서 봤을 때 신비로운 장소라 마음에 들어서 그대로 두었었슴다……」"

[[dialogue]]
speaker = "マトイ"
original = "「向こうからも出て来れないから、今まで気付かなかったのね。実際、私達もこの１週間気付いてなかったし……」"
translation = "「저쪽에서도 못 나오니까 지금까지 몰랐던 거네. 실제로 우리도 이 일주일 동안 몰랐고……」"

[[dialogue]]
speaker = "リップル"
original = "「つまり、ワタシのスランプは思い込みだったということですね……ハンセーします」"
translation = "「즉 저의 슬럼프는 착각이었다는 거네여…… 반성하겠슴다.」"

[[dialogue]]
speaker = "リップル"
original = "「でも！\u3000そのおかげでカイチョー達と出会えて、大切なことに気付くことがデキました。それはＢＩＧラッキーだったとオモイます！」"
translation = "「하지만! 그 덕분에 회장님 일행과 만나서 소중한 걸 깨달을 수 있었슴다. 그건 BIG 럭키였다고 생각함다!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「立ち直りが早いわね。でも、それでこそリップルらしいわ！」"
translation = "「재기가 빠르네. 하지만 그래서야말로 리플답지!」"

[[dialogue]]
speaker = "リップル"
original = "「ハイ！\u3000クヨクヨしているのはダメだって、モッタイないって、シショーにも教わりましたから！」"
translation = "「하이! 우물쭈물하고 있는 건 안 된다고, 아깝다고 스승님에게도 배웠으니까여!」"

[[dialogue]]
speaker = "リップル"
original = "「ワタシ自身も夏の海みたいに、いつも明るく皆をハッピーにデキる存在になりたいとオモっています♪」"
translation = "「저 자신도 여름 바다처럼 언제나 밝게 모두를 해피하게 만들 수 있는 존재가 되고 싶다고 생각함다♪」"

[[dialogue]]
speaker = "リップル"
original = "「ですが、結界から出たら皆とはお別れなんデスよね……それは、寂しくオモいます」"
translation = "「하지만 결계에서 나가면 모두와는 작별인 거네여…… 그건 쓸쓸하게 생각함다.」"

[[dialogue]]
speaker = "リップル"
original = "「って、カイチョー？\u3000ドウかしましたか？」"
translation = "「어라, 회장님? 왜 그러심까?」"

[[dialogue]]
speaker = "リップル"
original = "「――提案？\u3000ワタシに、デスか？」"
translation = "「――제안? 저에게 말이져?」"

[[dialogue]]
speaker = "unk"
original = "リップル、一緒に新星学園へ来ないか？"
translation = "「리플, 같이 신성 학원으로 오지 않을래?」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふふっ……私も結界から出たら勧誘しようと思ってたのに、緋宮会長に先を越されてしまいました」"
translation = "「후후…… 저도 결계에서 나가면 권유하려고 했는데 히노미야 회장님에게 선수 뺏겨버렸네요.」"

[[dialogue]]
speaker = "リップル"
original = "「ワタシが、カイチョー達の通うガクエンに……？」"
translation = "「제가 회장님 일행이 다니는 학원에……?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「クロトならそう言うと思ってたわ！\u3000リップル、そこには私達みたいに星力を持っている仲間がたくさん居て、色んなことを学べるのよ」"
translation = "「쿠로토라면 그렇게 말할 줄 알았어! 리플, 거기에는 우리처럼 성력을 가진 동료가 많이 있고 여러 가지를 배울 수 있어.」"

[[dialogue]]
speaker = "マトイ"
original = "「リクリエ阻止を目指す星騎士になる為の場所だけど、だからこそ普通じゃない人達がたくさん集まってるしね」"
translation = "「리크리에 저지를 목표로 하는 성기사가 되기 위한 장소지만, 그래서 더 평범하지 않은 사람들이 잔뜩 모여 있거든.」"

[[dialogue]]
speaker = "リップル"
original = "「でもワタシ、今まで１度もガクエンに通ったことがなくて……」"
translation = "「하지만 저, 지금까지 한 번도 학원에 다녀본 적이 없어서……」"

[[dialogue]]
speaker = "サーシャ"
original = "「そこは大丈夫よ。困った時は私達が相談に乗るし、力になるわ～」"
translation = "「그건 걱정 마~. 곤란할 때는 우리가 상담해 주고 힘이 되어줄게~」"

[[dialogue]]
speaker = "アナ"
original = "「ノープロブレム。１人で抱え込む必要はありません」"
translation = "「노 프로블럼. 혼자서 껴안을 필요는 없습니다.」"

[[dialogue]]
speaker = "フィオナ"
original = "「リップルさんが私に新しい趣味を――サーフィンを教えてくれたのと一緒です」"
translation = "「리플 씨가 저에게 새로운 취미를―― 서핑을 가르쳐 주신 것과 마찬가지예요.」"

[[dialogue]]
speaker = "フィオナ"
original = "「リップルさんも、新しいことに挑戦してみませんか？」"
translation = "「리플 씨도 새로운 것에 도전해 보지 않겠어요?」"

[[dialogue]]
speaker = "unk"
original = "それに何より――"
translation = "「그리고 무엇보다――」"

[[dialogue]]
speaker = "unk"
original = "理想のリゾートは、１人じゃ実現できないって分かったんだろう？"
translation = "「이상의 리조트는 혼자서는 실현할 수 없다는 걸 알았잖아?」"

[[dialogue]]
speaker = "unk"
original = "俺はそうリップルに伝えた。"
translation = "나는 그렇게 리플에게 전했다."

[[dialogue]]
speaker = "リップル"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "リップル"
original = "「ハイ、そうです！\u3000ワタシ、もっと色んな人達をリゾート結界に招いて、意見を聞いてミタイです！」"
translation = "「하이, 그렇슴다! 저, 더 많은 사람을 리조트 결계에 초대해서 의견을 들어보고 싶슴다!」"

[[dialogue]]
speaker = "リップル"
original = "「だからワタシ……皆とガクエンに行きます！」"
translation = "「그러니까 저…… 모두와 학원에 가겠슴다!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「決まりね！\u3000それじゃあ、強化合宿の締め括りとして――」"
translation = "「결정됐네! 그럼 강화 합숙의 마무리로서――」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「皆で洞窟のアステライトを攻略するわよ！」"
translation = "「다 같이 동굴의 아스테라이트를 공략하자고!」"

[[dialogue]]
speaker = "unk"
original = "星徒会、出撃だ！"
translation = "「성도회, 출격이다!」"

[[dialogue]]
speaker = "全員"
original = "「おー！」"
translation = "「오-!」"

