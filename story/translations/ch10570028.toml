[[dialogue]]
speaker = "unk"
original = "新年デートの後、トリシャさんが今お世話になっている九浄家に帰ってきた。"
translation = "신년 데이트 후, 트리샤 씨가 지금 신세를 지고 있는 쿠죠 가문으로 돌아왔다."

[[dialogue]]
speaker = "unk"
original = "今日はとりわけ風が冷たく、体の芯まで凍るようだ。"
translation = "오늘은 유난히 바람이 차가워 뼛속까지 얼어붙을 것만 같다."

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「風は冷たかったですが……くっついていれば、温かかったですね……やはり冬場に温め合うのは人肌が最良……」"
translation = "「바람은 차가웠지만…… 붙어 있으면 따뜻했네요…… 역시 겨울철에 서로를 데우는 건 사람의 피부가 최상……」"

[[dialogue]]
speaker = "unk"
original = "雪山で遭難した時の豆知識はさておき、いつも以上に露出の激しい晴れ着姿のトリシャさんとずっとくっついていたせいで、俺の下半身の一部は熱を宿していた。"
translation = "설산에서 조난당했을 때의 상식은 차치하고, 평소 이상으로 노출이 심한 나들이옷 차림의 트리샤 씨와 계속 붙어 있었던 탓에 내 하반신의 일부는 열기를 머금고 있었다."

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「おや……前かがみになられて……どうかしました？」"
translation = "「어라…… 몸을 앞으로 숙이시고…… 무슨 일인가요?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「分かってやってますよね……？\u3000周りの人にバレないように隠すの、結構大変だったんですよ」"
translation = "「알면서 그러는 거지? 주변 사람들에게 들키지 않게 숨기는 거 꽤 힘들었다고.」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ええ、まあ……私と寄り添い……腕を組んでいただけで、股間が膨らんでしまって……もちろん気づいてたよ、フフフ<emoji=heart04>」"
translation = "「에에, 뭐…… 나와 바짝 붙어서…… 팔짱을 끼고 있었던 것만으로 가랑이가 부풀어 올라 버려서…… 물론 눈치채고 있었어, 후후후 <emoji=heart04>」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「愛しいあなたが……私に女を感じてくれたなら……喜びこそすれ、嫌悪など覚えるはずもなく……ただ嬉しいだけ……<emoji=heart04>」"
translation = "「사랑스러운 당신이…… 나에게서 여자를 느껴 주었다면…… 기쁘면 기뻤지, 혐오감 따위 느낄 리가 없고…… 그저 기쁠 뿐…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "より一層距離を詰めてきたトリシャさんは、俺の股間の盛り上がりを愛おしそうに、慣れた手つきで撫で回す。"
translation = "더욱 거리를 좁혀온 트리샤 씨는 내 가랑이의 불룩함을 사랑스럽다는 듯, 익숙한 손놀림으로 쓰다듬는다."

[[dialogue]]
speaker = "unk"
original = "耳に届く声も、俺と２人きりの時だけの、甘く砕けた言葉遣いに変わっていた。"
translation = "귀에 닿는 목소리도 나와 둘이서만 있을 때의 달콤하고 격식 없는 말투로 바뀌어 있었다."

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「恋人のおち○ちんが勃起してしまった時は……どうすればいいかわかってるよ……」"
translation = "「연인의 자지가 발기해 버렸을 때는…… 어떻게 해야 할지 알고 있어……」"

[[dialogue]]
speaker = "unk"
original = "彼女に触れられてしまったら、もう駄目だ。吐き出さないと落ち着かない。"
translation = "그녀가 손을 대 버리면 이제 끝이다. 쏟아내지 않으면 진정이 되지 않는다."

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「口や乳房や性器……全身のありとあらゆる部位を用いて、射精に導き、鎮める……」"
translation = "「입이나 유방이나 성기…… 전신의 온갖 부위를 사용해서 사정으로 인도하고, 진정시킨다……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「股間を勃たせっぱなしにしておくなんて恋人失格……愛しいあなたに恥をかかせるわけにはいかないよね……」"
translation = "「가랑이를 계속 세워두게 하다니 연인 실격…… 사랑스러운 당신에게 창피를 줄 수는 없으니까……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「さ、あなたも脱いで……<emoji=heart04>\u3000勃起しちゃったおち○ちん、私に見せつけて……<emoji=heart04>」"
translation = "「자, 당신도 벗어…… <emoji=heart04> 발기해 버린 자지, 나에게 보여줘…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "逃げ込むように、トリシャさんが使っている部屋に入って……"
translation = "도망치듯 트리샤 씨가 사용하는 방으로 들어가서……"

[[dialogue]]
speaker = "unk"
original = "晴れ着はまるで滑り落ちるようにはだけ、トリシャさんの雪のような白い乳房が露わになる。"
translation = "나들이옷은 마치 미끄러지듯 풀어헤쳐지고, 트리샤 씨의 눈처럼 하얀 유방이 드러난다."

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「とりわけ、あなたはおっぱいが──特にパイズリと呼ばれる行為が……好きなんだね」"
translation = "「특히 당신은 가슴이── 특히 파이즈리라고 불리는 행위가…… 좋은 거구나.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「どこで知ったの！？」"
translation = "「어디서 알았어!?」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「星が……導いてくれました。あなたが好きな物……好きな行為……よく使用するオカズ……」"
translation = "「별이…… 인도해 주었어. 당신이 좋아하는 것…… 좋아하는 행위…… 자주 사용하는 반찬……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺の性癖をわざわざ星に導いてほしくはなかったな……」"
translation = "「내 성벽을 굳이 별이 인도해 주길 바라지는 않았는데……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「パイズリは嫌い……？\u3000いざという時のため、バナナなどの長物を使って、練習もしてたけど……」"
translation = "「파이즈리는 싫어……? 만약의 경우를 대비해서 바나나 같은 긴 물건을 사용해 연습도 했었는데……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「左右の乳房で、おち○ちんを挟み込み……上下に摩擦することで、おま○こに挿入するような刺激を得られる……」"
translation = "「좌우의 유방으로 자지를 끼워 넣고…… 상하로 마찰함으로써 보지에 삽입하는 것 같은 자극을 얻을 수 있어……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「私のおっぱいとおっぱいの谷間に……びゅーっびゅーっびゅーって、溜め込んでいる精液を吐き出して……どろどろに汚す……」"
translation = "「내 가슴과 가슴 사이 골짜기에…… 뷰웃 뷰웃 뷰웃 하고, 쌓아두고 있는 정액을 쏟아내서…… 걸쭉하게 더럽혀줘……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「生殖のためではなく……無駄に子種を吐き散らす……快楽を得るためだけの実に背徳的な行為……嫌ならば他の方法でも構わないけど──」"
translation = "「생식을 위해서가 아니라…… 헛되이 씨앗을 흩뿌리는…… 쾌락을 얻기 위해서만 하는 실로 배덕적인 행위…… 싫다면 다른 방법이라도 상관없지만──」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……お願いします」"
translation = "「……부탁합니다.」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「だよね……おち○ちん、びくびく震えたし……私のおっぱい、精液まみれにしたいんだ……？\u3000にへへ」"
translation = "「그렇지…… 자지가 움찔움찔 떨리고 있고…… 내 가슴, 정액투성이로 만들고 싶은 거지……? 니헤헤.」"

[[dialogue]]
speaker = "unk"
original = "まんまと正直に告白した俺の懇願に、トリシャはにんまりと笑みを浮かべる。"
translation = "홀린 듯 솔직하게 고백한 나의 간청에 트리샤는 싱긋 미소를 짓는다."

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「早速、始めましょう。さぁ、この乳房の間に……あなたの大きくなったおち○ちんを……ずぷずぷぅと……」"
translation = "「당장 시작하자. 자, 이 유방 사이에…… 당신의 커진 자지를…… 즈푸즈푸우 하고……」"

[[dialogue]]
speaker = "unk"
original = "くぱぁと導くように開かれたおっぱいの穴に、我慢汁を滴らせるペニスをあてがった。"
translation = "쿠파 하고 인도하듯 벌려진 가슴 구멍에 쿠퍼액을 흘리는 페니스를 갖다 대었다."

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「あっ……挿入って、きた……」"
translation = "「앗…… 삽입, 해왔어……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「フフ……すごい……おち○ちん、とっても大きくなってる……」"
translation = "「후후…… 굉장해…… 자지, 정말 커져 있어……」"

[[dialogue]]
speaker = "unk"
original = "トリシャさんほどの長乳だと、パイズリも挟むのではなく挿入だ。"
translation = "트리샤 씨 정도의 긴 가슴이라면 파이즈리도 끼우는 게 아니라 삽입이다."

[[dialogue]]
speaker = "unk"
original = "硬く熱いペニスが、柔らかくてふわっふわの乳肉に包みこまれる。"
translation = "단단하고 뜨거운 페니스가 부드럽고 폭신폭신한 젖살에 감싸인다."

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「おち○ちん……私の体温よりも熱く、とっても硬い……雄々しく、猛々しく……」"
translation = "「자지…… 내 체온보다 뜨겁고, 아주 단단해…… 웅장하고, 맹렬하게……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「はぁん……<emoji=heart04>\u3000愛しい恋人が、こんなにも立派なおち○ちんの持ち主だなんて……誇らしく感じる……皆に触れ回りたいくらい……」"
translation = "「하앙…… <emoji=heart04> 사랑스러운 연인이 이렇게나 훌륭한 자지의 소유자라니…… 자랑스럽게 느껴져…… 모두에게 떠벌리고 싶을 정도로……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「い、言い触らさないでくださいね？」"
translation = "「떠, 떠벌리지 마세요?」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「はい、私だけのおち○ちんだから……私だけが知っている恋人だけの秘め事……独り占めだから……」"
translation = "「응, 나만의 자지니까…… 나만이 알고 있는 연인만의 비밀…… 독점이니깐……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「私のいやらしいおっぱい穴で、たっぷり気持ちよくなって……射精してね……<emoji=heart04>」"
translation = "「내 야한 가슴 구멍에서 잔뜩 기분 좋아져서…… 사정해줘…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「まずは、ゆぅっくりと……にゅぅっぽにゅっぽ……にゅぅっぽにゅっぽ……」"
translation = "「우선은 처어언천히…… 늅포늅포…… 늅포늅포……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「先っぽをじっくりと……焦らすように……ずりぃ、ずりぃ……おっぱいの中で、擦る……」"
translation = "「끝부분을 정성스럽게…… 애태우듯이…… 즈리이, 즈리이…… 가슴 안에서 문질러……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ふふっ、往復する毎に……先っぽから我慢汁が、じわぁ……と滲み出てるのが分かる……私のおっぱい、そんなに気持ちいい……？」"
translation = "「후후, 왕복할 때마다…… 끝에서 쿠퍼액이 지와아…… 하고 배어 나오는 게 느껴져…… 내 가슴, 그렇게 기분 좋아……?」"

[[dialogue]]
speaker = "unk"
original = "ずっと密着して焦らされていただけに、ちょっと気を抜いただけで暴発してしまいそうな程の快感が下半身を巡る。"
translation = "계속 밀착해서 애태워지기만 했던 만큼, 조금만 정신을 놓아도 폭발해 버릴 것 같은 쾌감이 하반신을 맴돈다."

[[dialogue]]
speaker = "unk"
original = "あまりの快感に膝が震えてしまい、立っているのすらつらい。今にも膝を折ってしまいそうになるが、支えになっているトリシャさんの体がそれを許さない。"
translation = "너무나 큰 쾌감에 무릎이 떨려 서 있는 것조차 힘들다. 금방이라도 무릎을 꺾어버릴 것 같지만, 지탱해 주는 트리샤 씨의 몸이 그것을 허락하지 않는다."

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「はぁっ、はぁん……たくましい勃起が出たり入ったり……出たり入ったりぃ……」"
translation = "「하앗, 하앙…… 늠름한 발기가 들락날락…… 들락날락거려어……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「おち○ちんに、おっぱいを犯されてるみたいで、とってもいやらしい……想像以上……んふぅっ……ん、んっ……<emoji=heart04>\u3000んぁ、はぁんっ……<emoji=heart04>」"
translation = "「자지한테 가슴을 범해지는 것 같아서 정말 야해…… 상상 이상…… 응후으…… 응, 응…… <emoji=heart04> 응아, 하앙…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「どう……？\u3000気持ちよくなれて、る……？\u3000はっ、んぁ……おち○ちんにパイズリ奉仕……<emoji=heart04>」"
translation = "「어때……? 기분 좋아지고 있어……? 핫, 응아…… 자지에게 파이즈리 봉사…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "言葉を発する余裕もなく、黙って頷く。"
translation = "말을 내뱉을 여유도 없이 묵묵히 고개를 끄덕인다."

[[dialogue]]
speaker = "unk"
original = "でもそれ以上に正直なのは、より硬さと熱を増す股間の反応だ。"
translation = "하지만 그보다 더 솔직한 것은 더욱 단단함과 열기를 더하는 가랑이의 반응이다."

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「おち○ちんから直に、あなたの興奮が……伝わってくる……んふぅっ……<emoji=heart04>\u3000んぁっ、ふぅ、んっ……んぁ、はふ……はっ、はーっ<emoji=heart04>」"
translation = "「자지에서 직접 당신의 흥분이…… 전해져 와…… 응후으…… <emoji=heart04> 응앗, 후우, 응…… 응아, 하후…… 핫, 하아아 <emoji=heart04>」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「おち○ちんの熱を感じてるだけで……私の乳首も勃って……はぁ……こりこり、擦れて……んっ……<emoji=heart04>\u3000パイズリ、きもちいい……<emoji=heart04>」"
translation = "「자지의 열기를 느끼는 것만으로…… 내 유두도 서서…… 하아…… 오돌토돌하게 스쳐서…… 응…… <emoji=heart04> 파이즈리, 기분 좋아…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ほら……私の顔、見下ろして……あなたがパイズリで気持ちよくなってる顔、見せて……<emoji=heart04>」"
translation = "「자…… 내 얼굴, 내려다봐줘…… 당신이 파이즈리로 기분 좋아하고 있는 얼굴, 보여줘…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「あなたの、気持ち良くなってる顔……好き……<emoji=heart04>\u3000はぁ……余裕がなくて、切羽詰まってる顔……かわいい……<emoji=heart04>」"
translation = "「당신의 기분 좋아하고 있는 얼굴…… 좋아…… <emoji=heart04> 하아…… 여유가 없어서 막다른 곳에 몰린 얼굴…… 귀여워…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「あ……<emoji=heart04>\u3000おち○ちん、どっくんどっくんと激しく脈打って……私の心臓も、あなたと同じように脈打っているの……伝わってる……？」"
translation = "「아…… <emoji=heart04> 자지, 두근두근하고 격렬하게 맥동해서…… 내 심장도 당신과 똑같이 맥동하고 있는 거…… 전해져……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「はい……トリシャさんと俺の鼓動が……一緒になってるみたい……！」"
translation = "「네…… 트리샤 씨와 내 고동이…… 하나가 된 것 같아요!」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「私たちの体……繋がってるみたいだね……一蓮托生……これはもう、運命の恋人……<emoji=heart04>」"
translation = "「우리들의 몸…… 이어져 있는 것 같네…… 일련탁생…… 이건 이제 운명의 연인…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「にゅぽにゅぽ……ぐちゅぐちゅ……はぁ、はぅん……おち○ちん……もっと、もっと気持ちよくなって……私で興奮して……<emoji=heart04>」"
translation = "「늅포늅포…… 구츄구츄…… 하아, 하운…… 자지…… 좀 더, 좀 더 기분 좋아져서…… 나 때문에 흥분해줘…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「んっ……！？」"
translation = "「응……!?」"

[[dialogue]]
speaker = "unk"
original = "トリシャさんに煽られて、腰の動きは無意識に加速していた。"
translation = "트리샤 씨에게 부추겨져 허리 움직임은 무의식적으로 가속하고 있었다."

[[dialogue]]
speaker = "unk"
original = "前後にピストンする度、乳肉に下腹部がぶつかり、パンパンとセックスの時と同じような打音が響く。"
translation = "전후로 피스톤할 때마다 젖살에 아랫배가 부딪히며 팡팡 하고 섹스 때와 같은 타격음이 울려 퍼진다."

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「乱暴で荒々しい腰使い……まるでセックスのよう……<emoji=heart04>\u3000いつも、こんな風に……私のおま○こにおち○ちんを打ちつけてるよね……<emoji=heart04>」"
translation = "「난폭하고 거친 허리 놀림…… 마치 섹스 같아…… <emoji=heart04> 항상 이런 식으로…… 내 보지에 자지를 때려 박고 있지…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「まるで性玩具のように、私のおっぱいを弄んで……はぁ、んぁ……私も、興奮しちゃう……<emoji=heart04>」"
translation = "「마치 성인용품처럼 내 가슴을 농락하고…… 하아, 응아…… 나도 흥분해 버려…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ごめん、気持ち良すぎて……止まらないですっ……！」"
translation = "「미안, 너무 기분 좋아서…… 멈추질 않아요!」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「謝る必要なんて、ないよ……私のこと、いっぱい気持ちよくしてくれるおち○ちん……好きっ……好きぃ……はぁ、はふっ……んっ……<emoji=heart04>」"
translation = "「사과할 필요 따위 없어…… 나를 잔뜩 기분 좋게 해주는 자지…… 좋아…… 좋아아…… 하아, 하후…… 응…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "バックから突いている時みたいに乳肉が波打つ。"
translation = "뒤에서 박고 있을 때처럼 젖살이 파도친다."

[[dialogue]]
speaker = "unk"
original = "街で誰もが振り返り、見惚れていたトリシャさんの体を俺だけが好き放題できる。その優越感は興奮へと置換された。"
translation = "거리에서 누구나 돌아보고 넋을 잃던 트리샤 씨의 몸을 나만이 마음껏 할 수 있다. 그 우월감은 흥분으로 치환되었다."

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「はっ、んぅっ……おち○ちん、ぷくぅって膨らんで、カチカチに……あつぅくなってきた……<emoji=heart04>」"
translation = "「핫, 응으…… 자지, 푸쿠우 하고 부풀어서 딱딱하게…… 뜨거워졌어…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「もうそろそろ、イッちゃいそうだね？\u3000私のおっぱい、どろどろの精液で汚しちゃう……？」"
translation = "「이제 슬슬 가버릴 것 같지? 내 가슴, 걸쭉한 정액으로 더럽혀 버릴 거야……?」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「いつでもいいよ……はぁ、はふ、はぁ……んっ、好き、好きぃ……大好きだよぉっ……<emoji=heart04>」"
translation = "「언제든 좋아…… 하아, 하후, 하아…… 응, 좋아, 좋아…… 너무 좋아해애…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺も、好きです……トリシャさん、トリシャさんっ……！」"
translation = "「저도 좋아해요…… 트리샤 씨, 트리샤 씨!」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「うん、おち○ちんから好き好きが伝わってくるよ……どぷどぷ出しちゃお……<emoji=heart04>」"
translation = "「응, 자지에서 좋아한다는 게 전해져 와…… 도푸도푸 내보내자…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「このまま……おっぱいま○こに中出し、しよ……<emoji=heart04>\u3000気持ちよーく、びゅーっ、びゅーっ、びゅーっ<emoji=heart04>」"
translation = "「이대로…… 가슴 보지에 질내사정<rt>나카다시</rt></ruby> 하자…… <emoji=heart04> 기분 좋게, 뷰웃, 뷰웃, 뷰웃 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "甘く耳に注がれた、卑猥すぎる言葉が一気に俺を追い詰めた。"
translation = "달콤하게 귓가에 쏟아진 너무나 비속한 말이 단숨에 나를 몰아붙였다."

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「はぁ、はっ……フフフ、かけられたら、せっかくの晴れ着が汚れちゃうから……私のおっぱいに……いっぱい、いっぱい……欲望をぶつけて……<emoji=heart04>」"
translation = "「하아, 핫…… 후후후, 뿌려지면 모처럼의 나들이옷이 더러워지니까…… 내 가슴에…… 잔뜩, 잔뜩…… 욕망을 부딪쳐줘…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「出して、私のおっぱいま○こを……孕ませるくらい……たぁっぷり、出して、出して、出してっ……<emoji=heart04>」"
translation = "「내보내줘, 내 가슴 보지를…… 임신시킬 정도로…… 타아압뿍, 내보내, 내보내, 내보내줘어…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "もう止まらない。気持ちいいこと以外、何も考えられない。ひたすらピストンを加速させ、ペニスを絶頂に追い込むだけ。"
translation = "이제 멈추지 않는다. 기분 좋다는 것 외에는 아무것도 생각할 수 없다. 오로지 피스톤을 가속시켜 페니스를 절정으로 몰아넣을 뿐."

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「はぁ、はっ……あなたのイキそうな顔……かわいい……とってもかわいい……おち○ちんで突かれてるおっぱいの奥が、キュンキュンしちゃうっ……<emoji=heart04>」"
translation = "「하아, 핫…… 당신의 갈 것 같은 얼굴…… 귀여워…… 정말 귀여워…… 자지로 찔리고 있는 가슴 깊은 곳이 큥큥거려…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「あなたのイキ顔……じーっと見ててあげるから……ヨダレ垂らして、泣き出しちゃいそうな切ない顔……<emoji=heart04>」"
translation = "「당신의 이키가오…… 뚫어지게 봐 줄 테니까…… 침 흘리며 울음을 터뜨릴 것 같은 애절한 얼굴…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あ、あ、ぁっ……イクッ……！」"
translation = "「아, 아, 아…… 가버려!」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「いいよ、イッちゃって……イッて、イッちゃえっ……<emoji=heart04>\u3000おっぱいま○こに、中出ししちゃえっ……<emoji=heart04>」"
translation = "「좋아, 가버려…… 가, 가버려어…… <emoji=heart04> 가슴 보지에 질내사정 해버려어…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「あっ……<emoji=heart04>\u3000どくんどくんって、精液せり上がってきて……おち○ちんが出そうとしてるの、伝わってぇ……<emoji=heart04>」"
translation = "「앗…… <emoji=heart04> 도큰도큰 하고 정액이 치밀어 올라와서…… 자지가 내보내려 하고 있는 거 전해져어…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「キてる……精液が、すぐ、そこまで……出してっ、出してっ、おっぱいま○こに中出しちょうだぁい……<emoji=heart04>」"
translation = "「오고 있어…… 정액이 바로 저기까지…… 내보내줘, 내보내줘, 가슴 보지에 질내사정 해줘어…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「はぁ、はっ、はぁぁっ……あっ、あっ！\u3000びくびくって、昇ってっ──！」"
translation = "「하아, 핫, 하아아앗…… 앗, 앗! 비쿠비쿠 하고 올라와서──!」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「あ、ぅうぅんっ……<emoji=heart04>\u3000んぁはぁあぁっ……<emoji=heart04>」"
translation = "「아, 으으응…… <emoji=heart04> 응아하아아앗…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "白くて柔らかなマシュマロおっぱいの谷間に、俺の白濁がたっぷりと注がれる。"
translation = "하얗고 부드러운 마시멜로 가슴 골짜기에 나의 백탁이 듬뿍 쏟아진다."

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「あ……あっ……すごい……どっくんどっくんって……おっぱいの中で、暴れて……ふふふ……<emoji=heart04>」"
translation = "「아…… 앗…… 굉장해…… 도큰도큰 하고…… 가슴 안에서 날뛰어서…… 후후후…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ぁ、はっ……ふぁ……おもらしみたいにたぁっぷり……どぷっどぷっ出てる……おち○ちんとっても元気、元気……素敵ぃ……カッコいい……<emoji=heart04>」"
translation = "「아, 핫…… 화아…… 오줌 싸는 것처럼 듬뿍…… 도퓻도퓻 나오고 있어…… 자지 정말 기운차네, 기운차…… 멋져…… 멋있어…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺が射精している間も、トリシャさんはうっとりと蕩けた瞳で俺を見上げていた。"
translation = "내가 사정하고 있는 동안에도 트리샤 씨는 황홀하게 풀린 눈동자로 나를 올려다보고 있었다."

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「はぁ、ふぁ……そのまま……おとなしく……じっとしててね……出し切るまで……ずっと……びゅーっ……びゅーっ……びゅーっ……<emoji=heart04>」"
translation = "「하아, 화아…… 그대로…… 얌전하게…… 가만히 있어줘…… 다 쏟아낼 때까지…… 계속…… 뷰웃…… 뷰웃…… 뷰웃…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスから残りを搾り出すように、トリシャさんがおっぱいで挟んだまま体を揺らす。"
translation = "페니스에서 나머지를 짜내듯 트리샤 씨가 가슴으로 끼운 채 몸을 흔든다."

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「まだびくびくしてる……はぁ……私の汗と、あなたの精液が、ぐちょぐちょに混ざって、えっちな音が響いて──ぁんっ！？」"
translation = "「아직 움찔거리고 있어…… 하아…… 내 땀이랑 당신의 정액이 질척질척하게 섞여서 야한 소리가 울리고── 앙!?」"

[[dialogue]]
speaker = "unk"
original = "粘液で滑ったペニスは、トリシャさんの谷間から飛び出ると、尿道の残り汁を乳房にまき散らした。"
translation = "점액으로 미끄러진 페니스는 트리샤 씨의 골짜기에서 튀어나오더니, 요도의 남은 찌꺼기를 유방에 흩뿌렸다."

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「あっ、ひゃっ……精液、勢いよすぎ……ぶっかけちゃだめぇっ……<emoji=heart04>」"
translation = "「앗, 히얏…… 정액, 기세가 너무 좋아…… 뿌려버리면 안 돼애…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「はぁっ、はぁ……とても濃厚なオスの臭い……<emoji=heart04>\u3000メスを発情させる罪深い芳香……晴れ着に染みついちゃう……<emoji=heart04>」"
translation = "「하앗, 하아…… 정말 농후한 수컷의 냄새…… <emoji=heart04> 암컷을 발정시키는 죄 깊은 향기…… 나들이옷에 배어버리겠어…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「はぁ、はぁん……精液でおっぱいの間、べっとべとに……いやらしい香りが、立ち上って……すぅ、はぁぁ……<emoji=heart04>\u3000味見もしちゃお……」"
translation = "「하아, 하앙…… 정액으로 가슴 사이가 끈적끈적하게…… 야한 향기가 피어올라서…… 씁, 하아아…… <emoji=heart04> 맛도 봐야지……」"

[[dialogue]]
speaker = "unk"
original = "おっぱりにまとわりつく精液を指ですくい、愛おしそうに口に含む。"
translation = "유방에 들러붙은 정액을 손가락으로 훑어 사랑스럽다는 듯 입에 머금는다."

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ちゅばっ……んぅ……れろぉ……ちゅぱ、ちゅぴぅ……んはぁ……精液、ねっとり濃ゆくて、口にまとわりついて……美味ひい……<emoji=heart04>」"
translation = "「츄바…… 응으…… 레로오…… 츄파, 츄피우…… 은하아…… 정액, 끈적하고 진해서 입안에 달라붙어…… 마시써…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "精液を心底美味しそうに味わうトリシャさんが淫靡で、吐き出したばかりのペニスが再び天井を突くように反り返る。"
translation = "정액을 진심으로 맛있다는 듯 맛보는 트리샤 씨가 음란해서, 방금 쏟아낸 페니스가 다시 천장을 찌를 듯이 젖혀진다."

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「あ……<emoji=heart04>\u3000私のおっぱいま○こ、もっと味わいたい……？」"
translation = "「아…… <emoji=heart04> 내 가슴 보지, 좀 더 맛보고 싶어……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「はい……」"
translation = "「네……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「なら来て……<emoji=heart04>\u3000私のおっぱいも、あなたをもっと味わいたいって、言ってるから……<emoji=heart04>」"
translation = "「그럼 와…… <emoji=heart04> 내 가슴도 당신을 좀 더 맛보고 싶다고 말하고 있으니까…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そして衝動をぶつけ、足腰立たなくなるまでトリシャさんの胸に欲望を吐き出したのだった。"
translation = "그리고 충동을 부딪치며, 팔다리에 힘이 풀릴 때까지 트리샤 씨의 가슴에 욕망을 쏟아낸 것이었다."

