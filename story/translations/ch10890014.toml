[[dialogue]]
speaker = "unk"
original = "第４話,誰にも言えない,P"
translation = "제4화, 누구에게도 말할 수 없어, P"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「他のヤツには絶対に言うなよ？」"
translation = "「다른 녀석들한테는 절대 말하지 마라?」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「あたしは流星学園時代、ウィステリアに会っている。会っているどころか、模擬試合を挑んだことすらあるんだ」"
translation = "「나는 유성학원 시절에 위스테리아를 만난 적이 있어. 만난 정도가 아니라 모의 시합을 도전한 적조차 있다고」"

[[dialogue]]
speaker = "unk"
original = "向こうは覚えてなかったみたいだけど？"
translation = "그쪽은 기억 못 하는 것 같던데요?"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「……瞬殺されたんだよ」"
translation = "「……순살당했거든」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「昔のあたしは強くて格好いい、誰からも憧れられるようなキラキラした星騎士を目指してたんだけどよ」"
translation = "「옛날의 나는 강하고 멋진, 누구라도 동경할 법한 반짝거리는 성기사를 목표로 했었지만 말이야」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「若かった……勇敢と無謀をはき違えてたんだ」"
translation = "「어렸지…… 용감함과 무모함을 착각하고 있었어」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「ウィステリアの模擬戦１００人抜きは、このあたしが止めてみせる！\u3000今日、ここからあたしの星騎士伝説が始まるんだ！」"
translation = "「위스테리아의 모의전 100인 베기는 이 내가 멈춰 보이겠어! 오늘 여기서부터 나의 성기사 전설이 시작되는 거야!」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「行くぜ、ウィステリア！\u3000先手必勝――」"
translation = "「간다, 위스테리아! 선제필승──」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「シャドウメイルストラム！」"
translation = "「섀도 메일스트롬!」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「ぐぁああああぁああぁっ！」"
translation = "「구아아아아아아아악!」"

[[dialogue]]
speaker = "unk"
original = "早ーっ！？"
translation = "빠르다ー!?"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「メチャクチャ格好悪ぃ。恥ずかしい。死にてえ」"
translation = "「더럽게 꼴사납고 창피해서 죽고 싶더군」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「ゴングが鳴って、まばたきをした次の瞬間にはふっ飛ばされてた。ぐうの音も出ないほどの完敗だった」"
translation = "「공이 울리고 눈을 깜빡인 다음 순간에는 날아가 있었어. 대꾸조차 할 수 없는 완패였지」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「負けたのは、ウィステリアだけじゃない。モンスターにやられて、危うく再起不能寸前。死にかけたりしてよ」"
translation = "「패배한 건 위스테리아뿐만이 아냐. 몬스터한테 당해서 하마터면 재기 불능 직전까지 갔었어. 죽을 뻔하기도 했고」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「そこをキリカのやつに救われたこともある。まざまざと実力を――あたしの未熟さと才能のなさを見せつけられたんだ」"
translation = "「그걸 키리카 그 녀석이 구해준 적도 있지. 실력을── 내 미숙함과 재능 없음을 뼈저리게 실감하게 된 거야」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「……慰めはいらねえよ。自分のことは自分が一番よくわかってる」"
translation = "「……위로는 필요 없어. 내 일은 내가 제일 잘 아니까」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「大怪我して入院してる時に、あたしはみんなの憧れの的になるような星騎士の道は諦めたんだ」"
translation = "「크게 다쳐서 입원해 있을 때, 나는 모두의 동경의 대상이 되는 성기사의 길은 포기했어」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「今後の身の振り方に迷って、ちょっとやさぐれてたところを、どこから嗅ぎつけたのか公安委員会にスカウトされてよ」"
translation = "「앞으로 어떡할지 고민하며 조금 엇나가 있던 찰나에 어디서 냄새를 맡았는지 공안위원회에서 스카우트하러 오더라고」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「地味で目立たない裏方仕事に従事するようになったんだ」"
translation = "「수수하고 눈에 띄지 않는 뒷바라지 업무에 종사하게 된 거지」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「そっちは案外、あたしの性に合っててさ。結構な実績を残せてたんだ。あたしにも活躍できる場があるんだって、調子に乗っちまってた」"
translation = "「그쪽은 의외로 내 적성에 맞아서 말이야. 꽤 많은 실적을 남길 수 있었어. 나한테도 활약할 장소가 있다며 우쭐해 하기도 했지」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「でも、しばらく経ってから、公安委員会の仕事ってすげえ面倒なことに気付いちまってさ」"
translation = "「하지만 시간이 지나면서 공안위원회 일이 엄청나게 귀찮다는 걸 깨닫게 됐어」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「もちろん、諜報活動なんてのは表には出ない。人知れず活躍したところで、ちやほやされることもない」"
translation = "「물론 첩보 활동 같은 건 겉으로 드러나지 않아. 남몰래 활약해봤자 대접받을 일도 없지」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「一手間違えただけで、誰にも助けを求められないまま、死んじまうような危険な任務も山ほどある」"
translation = "「한 수만 틀려도 누구에게 도움도 요청하지 못한 채 죽어버릴 법한 위험한 임무도 산더미처럼 쌓여있어」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「いつか命中しちまうまで、引き金を引き続けるロシアンルーレットみたいなもんだよ」"
translation = "「언젠가 명중할 때까지 방아쇠를 계속 당기는 러시안룰렛 같은 거야」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「ヤバさに気付いたからって、抜けるには時すでに遅しだ。そこそこ使えるから重宝がられてたし、内側を知りすぎていた。奥まで踏み込みすぎちまってたんだ」"
translation = "「위험함을 깨달았을 때는 이미 빠져나가기엔 늦었어. 어느 정도 쓸모 있으니 중용되었고, 내부 사정을 너무 많이 알고 있었거든. 너무 깊이 발을 들인 거지」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「抜ける機会を探っている内に、皮肉なことにますます実績を積んじまった」"
translation = "「그만둘 기회를 찾는 와중에 아이러니하게도 실적은 점점 더 쌓여갔고」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「それで辞めるに辞められないエージェント業を続けて、今に至ってるってわけだ。不器用すぎて笑えるだろ？」"
translation = "「그래서 그만두고 싶어도 그만두지 못하고 에이전트 업무를 계속하며 지금에 이르게 된 거야. 너무 서툴러서 웃음이 나오지?」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「人知れずどころか、本当の名前まで捨てて、何やってんだかって感じだよ、ハハ」"
translation = "「남모르는 활약은커녕 진짜 이름까지 버리고 대체 뭘 하고 있는 건가 싶다니까, 하하」"

[[dialogue]]
speaker = "unk"
original = "本当の名前？"
translation = "진짜 이름요?"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「ああ。前に言わなかったか？\u3000いや、ネーゼマインのヤツが口を滑らせたんだったな……ったく、アイツ、余計なことばかりしやがる」"
translation = "「아아. 전에 말 안 했나? 아니, 네제마인 그 녀석이 입을 놀린 거였지…… 나 원 참, 그 녀석 쓸데없는 짓만 골라 해요」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「シアン・ユーゼリアってのは偽名だよ。<ruby>新星<rt>こっち</rt></ruby>に来てから使ってる名前だ」"
translation = "「시안 유제리아라는 건 가명이야. 신성에 오고 나서부터 쓰는 이름이지」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「っと、本名は言えねえからな！\u3000諜報員にとっちゃ本名なんて、何よりの弱みなんだから──」"
translation = "「앗, 본명은 말 못 한다고! 첩보원에게 본명이란 무엇보다 큰 약점이니까──」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「──って、会長さんに言っちまったら駄目か！\u3000詐称の暴露じゃねえか！」"
translation = "「──어라, 회장님한테 말해버리면 안 되나! 사칭 폭로잖아!」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「確か、星徒会長には問題のある生徒を退学させる権限すらあるんだよな……？」"
translation = "「확실히 성도회장은 문제 있는 학생을 퇴학시킬 권한까지 있다고 들었는데……?」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「はー……なんなんだ、さっきから格好悪ぃミスばっかり……なんで、よりによってあんたの前でやっちまうかな」"
translation = "「하아…… 뭐야 아까부터 꼴사나운 실수만…… 왜 하필이면 당신 앞에서 저질러버리는 거냐고」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「滅多にやらかさねえのが売りだってのによ……こんなんじゃ公安失格だぜ」"
translation = "「웬만해선 실수하지 않는 게 장점인데 말이지…… 이래선 공안 실격이야」"

[[dialogue]]
speaker = "unk"
original = "たまに失敗するくらいの方が可愛いですよ"
translation = "가끔 실수하는 게 더 귀여워요"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「んなっ……！？\u3000おまっ……面と向かって、そういう、可愛、っとか……んなぁっ……！？」"
translation = "「무슨……!? 너 말이야…… 대놓고 그런, 귀엽, 다느니…… 으아아앗……!?」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「ったく……ズリいぞ、会長さん。大した人たらしだぜ……あんたの方がよっぽど公安に向いてるんじゃねえのか」"
translation = "「나 원 참…… 치사하다고, 회장님. 엄청난 사람 홀리는 솜씨군…… 당신이 훨씬 공안에 어울리는 거 아냐?」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「……シーナ」"
translation = "「……시나」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「あたしの本名だよ。姓はない。ただのシーナだ」"
translation = "「내 본명이야. 성은 없어. 그냥 시나다」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「新星じゃ、あたしの本名は誰にも教えてない。こっちに来た時に捨てたつもりでさえいたんだ」"
translation = "「신성에서는 내 본명을 아무에게도 가르쳐주지 않았어. 이쪽으로 올 때 버렸다고 생각했을 정도니까」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「まあ……なんだ。あんたへの信愛の証だとでも思ってくれよ」"
translation = "「뭐…… 그거다. 당신에 대한 신뢰의 증표라고 생각해 줘」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「正直に言ったんだからな。おとがめはなしで頼むぜ」"
translation = "「솔직하게 말했으니까 말이야. 처벌 없는 거로 부탁한다고」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「それとな。絶対に、人前で、あたしを本名で呼ぶんじゃねえぞ？\u3000いいな？」"
translation = "「그리고 말이야. 절대 남들 앞에서 나를 본명으로 부르지 마라? 알겠지?」"

