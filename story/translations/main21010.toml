[[dialogue]]
speaker = "unk"
original = "第１０話,レティシア,B"
translation = "제10화, 레티시아, B"

[[dialogue]]
speaker = "アポロ"
original = "「はぁ、はぁ……このぉおおっ！！」"
translation = "「하아, 하아…… 이녀석이이잇!!」"

[[dialogue]]
speaker = "スレイプニル"
original = "「ヒィン……！」"
translation = "「히잉……!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「止まって、レティシアちゃん！」"
translation = "「멈춰줘, 레티시아짱!」"

[[dialogue]]
speaker = "レティシア"
original = "「──」"
translation = "「──」"

[[dialogue]]
speaker = "unk"
original = "神殿の空中でレティシアと激戦を繰り広げるアポロたち。"
translation = "신전의 공중에서 레티시아와 격전을 벌이는 아폴로 일행."

[[dialogue]]
speaker = "レティシア"
original = "「ずいぶんと息が上がってきたわね。まだ諦めない？」"
translation = "「제법 숨이 가빠졌네. 아직 포기 안 해?」"

[[dialogue]]
speaker = "アポロ"
original = "「へっ……まだまだ元気いっぱいだっての！！」"
translation = "「헷…… 아직 기운이 넘친다니까!!」"

[[dialogue]]
speaker = "レティシア"
original = "「それなら、もっと出力を上げるわ──ルヴィ、力を貸して」"
translation = "「그렇다면, 출력을 더 높이겠어── 루비, 힘을 빌려줘.」"

[[dialogue]]
speaker = "unk"
original = "レティシアの持つ緋色のセレスティアが輝く──"
translation = "레티시아가 가진 비색의 셀레스티아가 빛난다──"

[[dialogue]]
speaker = "アポロ"
original = "「なっ──！？」"
translation = "「나앗──!?」"

[[dialogue]]
speaker = "レティシア"
original = "「よく止めたわね。流石は魔王の血統、ということかしら」"
translation = "「잘 막아냈네. 과연 마왕의 혈통, 이라는 걸까.」"

[[dialogue]]
speaker = "アポロ"
original = "「何なんだこいつっ……いきなり星力があり得ないくらい跳ね上がって……！？」"
translation = "「뭐야 이 녀석은…… 갑자기 성력이 말도 안 될 정도로 치솟아서……!?」"

[[dialogue]]
speaker = "アポロ"
original = "「いや、星力じゃない──この力……まさかっ！？」"
translation = "「아니, 성력이 아니야── 이 힘…… 설마!?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「レティシアちゃん、ダメ！\u3000それは使ったらダメだよ！！」"
translation = "「레티시아짱, 안 돼! 그건 쓰면 안 된다고!!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ルヴィも言ってたでしょ！？\u3000セレスティアのその機能は、霊力を無理やり体に帯びるもの……！」"
translation = "「루비도 말했잖아!? 셀레스티아의 그 기능은, 영력을 억지로 몸에 두르는 것……!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「肉体の損傷は避けられないから、滅多なことがない限り使うなって……！」"
translation = "「육체의 손상은 피할 수 없으니까, 웬만한 일이 없는 한 쓰지 말라고……!」"

[[dialogue]]
speaker = "レティシア"
original = "「そうね。でも、今は使うべきと判断するわ。私の仲間を騙している敵との戦いだもの……死力を尽くさないとね」"
translation = "「그렇네. 하지만, 지금은 써야 할 때라고 판단해. 내 동료를 속이고 있는 적과의 싸움인걸…… 사력을 다해야지.」"

[[dialogue]]
speaker = "アポロ"
original = "「肉体の損傷と引き換えに、戦闘力を上げるセレスティア……！？\u3000くっそ、無駄にカッコいいもん使いやがって……！」"
translation = "「육체의 손상을 대가로 전투력을 높이는 셀레스티아……!? 젠장, 쓸데없이 멋진 걸 쓰고 자빠졌네……!」"

[[dialogue]]
speaker = "アポロ"
original = "「けど力を使うたびに傷つくなら、こっちにも勝機が……！」"
translation = "「하지만 힘을 쓸 때마다 상처 입는다면, 이쪽에도 승기가……!」"

[[dialogue]]
speaker = "レティシア"
original = "「──<ruby>勝機なんて<rt>そんな</rt></ruby>もの、存在しないわ」"
translation = "「──<ruby>승기 같은<rt>그런</rt></ruby> 건 존재하지 않아.」"

[[dialogue]]
speaker = "unk"
original = "互いに小さくないダメージが蓄積しているが、レティシアは自身が傷つくのもいとわず、アポロに猛攻を仕掛け続ける。"
translation = "서로 적지 않은 데미지가 축적되어 있지만, 레티시아는 자신이 상처 입는 것도 마다하지 않고 아폴로에게 맹공을 계속 퍼붓는다."

[[dialogue]]
speaker = "アポロ"
original = "「コイツ、ボロボロなのにっ、血を吐いてるのに全然止まらない……！\u3000痛くないのかよ……！？」"
translation = "「이 녀석, 만신창이인데도, 피를 토하고 있는데도 전혀 멈추질 않아……! 아프지도 않은 거냐고……!?」"

[[dialogue]]
speaker = "レティシア"
original = "「とても痛いわ。でもそれは、戦いをやめる理由にはならないでしょう？」"
translation = "「무척 아파. 하지만 그게 싸움을 그만둘 이유가 되지는 않잖아?」"

[[dialogue]]
speaker = "レティシア"
original = "「アルタイルを滅ぼす。ベアトとチナを連れ戻す。そのことの方がずうっと大切だもの」"
translation = "「알타이르를 멸망시킨다. 베아토와 치나를 데려온다. 그게 훨씬 더 소중한걸.」"

[[dialogue]]
speaker = "アポロ"
original = "「ちくしょうっ……リクリエの使徒とはまた違った、話の通じなさだな──！」"
translation = "「제기랄…… 리크리에의 사도와는 또 다른 의미로 말이 안 통하는군──!」"

[[dialogue]]
speaker = "レティシア"
original = "「お喋りしてる暇があるのかしら？\u3000もうすぐあなたの喉元に刃が届くわ」"
translation = "「수다 떨 틈이 있을까? 곧 네 목덜미에 칼날이 닿을 텐데.」"

[[dialogue]]
speaker = "アポロ"
original = "「──くっそぉぉおっ！」"
translation = "「──제기라아아알!」"

[[dialogue]]
speaker = "unk"
original = "ルヴィネが擁する中でも最強の戦力であるとの自負に違わぬ、レティシアの斬撃の嵐。"
translation = "루비네가 거느린 중에서도 최강의 전력이라는 자부심에 걸맞은, 레티시아의 참격 폭풍."

[[dialogue]]
speaker = "unk"
original = "同じ剣という得物を操るアポロだったが、戦闘経験の格差、そして何よりも不規則に突発的に跳ね上がるレティシアの霊力に劣勢が続き──"
translation = "같은 검이라는 무기를 다루는 아폴로였지만, 전투 경험의 격차, 그리고 무엇보다 불규칙하고 돌발적으로 치솟는 레티시아의 영력에 열세가 이어지며──"

[[dialogue]]
speaker = "アポロ"
original = "「しまっ──！？」"
translation = "「아차──!?」"

[[dialogue]]
speaker = "レティシア"
original = "「──取ったわ。おやすみなさい」"
translation = "「──잡았다. 잘 자렴.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「やらせないっ──！！」"
translation = "「하게 두지 않아──!!」"

[[dialogue]]
speaker = "アポロ"
original = "「悪い、ベアトっ──助かった！」"
translation = "「미안, 베아토── 살았어!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ううんっ、無事でよかった……！」"
translation = "「아니야, 무사해서 다행이야……!」"

[[dialogue]]
speaker = "レティシア"
original = "「ベアト……あまり邪魔をしないでちょうだい？\u3000あなたを殺さないようにしながら、この子だけを殺すのは骨が折れるのよ？」"
translation = "「베아토…… 너무 방해하지 말아 줄래? 너를 죽이지 않으면서 이 아이만 죽이는 건 꽤 고된 일이거든?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「何回だって邪魔するよ！\u3000アポロちゃんもレティシアちゃんも、大切なお友達だもん！」"
translation = "「몇 번이고 방해할 거야! 아폴로짱도 레티시아짱도 소중한 친구인걸!」"

[[dialogue]]
speaker = "レティシア"
original = "「……困ったわね。本当に頑固な子」"
translation = "「……곤란하네. 정말 고집 센 아이라니까.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ごめんなさいっ、でも──これが私だから！」"
translation = "「미안해, 하지만── 이게 나니까!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ルヴィから、平行世界同士は争うしかないって、そう教えられた時から……私はずっと探してたの！」"
translation = "「루비한테 평행세계끼리는 서로 싸울 수밖에 없다고 배웠을 때부터…… 나는 계속 찾고 있었어!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「デネブとアルタイル、どっちも滅ばずに済む方法はないかって……それがようやく見つかりそうなの。だから絶対に諦められない！！」"
translation = "「데네브와 알타이르, 둘 다 멸망하지 않고 끝날 방법은 없을까 하고…… 그걸 드디어 찾아낼 수 있을 것 같아. 그러니까 절대로 포기 못 해!!」"

[[dialogue]]
speaker = "レティシア"
original = "「私はルヴィを信じてるわ。平行世界同士は争うしかない。だったら滅ぶのはアルタイルしかあり得ない」"
translation = "「나는 루비를 믿어. 평행세계끼리는 싸울 수밖에 없어. 그렇다면 멸망하는 건 알타이르일 수밖에 없지.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「させない……！\u3000アルタイルが滅んだら、今度はデネブの番……！\u3000ルヴィに、そんなひどいこと、絶対にさせちゃいけないの……！」"
translation = "「하게 두지 않아……! 알타이르가 멸망하면 다음은 데네브 차례야……! 루비가 그런 심한 짓을 하게 절대로 둬선 안 돼……!」"

[[dialogue]]
speaker = "レティシア"
original = "「平行線ね。ごめんねベアト、勝つためにはあなたの動きを封じる必要がありそう……本当はやりたくないの。許してちょうだい？」"
translation = "「평행선이네. 미안해 베아토, 이기기 위해서는 네 움직임을 봉쇄할 필요가 있겠어…… 사실은 하고 싶지 않지만. 용서해 주겠니?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「──っ！？」"
translation = "「──윽!?」"

[[dialogue]]
speaker = "unk"
original = "レティシアの流麗な太刀筋が、嵐となってベアトリスに押し寄せる。"
translation = "레티시아의 유려한 칼날이 폭풍이 되어 베아트리스에게 몰아친다."

[[dialogue]]
speaker = "unk"
original = "鮮血色の槍を振るい、正面からレティシアと切り結ぶベアトリス──しかし、力の差は歴然としていた。"
translation = "선혈색 창을 휘두르며 정면에서 레티시아와 합을 겨루는 베아트리스── 하지만 실력 차이는 역력했다."

[[dialogue]]
speaker = "アリコーン"
original = "「ブルルル！」"
translation = "「부르르르!」"

[[dialogue]]
speaker = "アポロ"
original = "「くそっ……！？\u3000こいつら、まだ動けたのか……邪魔だ！！」"
translation = "「젠장……!? 이 녀석들, 아직 움직일 수 있었나…… 방해된다!!」"

[[dialogue]]
speaker = "unk"
original = "アポロの動きが神殿のガーディアンによって阻まれる。一刀のもと切り捨てるが、ベアトリスの救援はとても間に合わない。"
translation = "아폴로의 움직임이 신전의 가디언에 의해 가로막힌다. 단칼에 베어 넘기지만, 베아트리스를 구하러 가기엔 도저히 맞출 수 없다."

[[dialogue]]
speaker = "レティシア"
original = "「ベアトじゃ私には勝てないわ。訓練でも一度も勝てたことがないでしょう？」"
translation = "「베아토로는 나를 이길 수 없어. 훈련에서도 한 번도 이긴 적 없잖아?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「それでも……私は……！！」"
translation = "「그래도…… 나는……!!」"

[[dialogue]]
speaker = "レティシア"
original = "「命は取らないわ。気を失わせるだけ。だから大人しくしていてちょうだい」"
translation = "「목숨은 뺏지 않을게. 정신을 잃게 할 뿐이야. 그러니까 얌전히 있어 주렴.」"

[[dialogue]]
speaker = "unk"
original = "レティシアの刃がベアトリスに迫る──"
translation = "레티시아의 칼날이 베아트리스에게 육박한다──"

[[dialogue]]
speaker = "unk"
original = "だがそこに一筋の稲妻が走り、レティシアの刃を弾いた。"
translation = "하지만 그곳에 한 줄기 번개가 달려와 레티시아의 칼날을 튕겨냈다."

[[dialogue]]
speaker = "チナ"
original = "「はぁ、はぁ……久しぶりだな、レティシア……！」"
translation = "「하아, 하아…… 오랜만이네, 레티시아……!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「チナちゃん！？」"
translation = "「치나짱!?」"

[[dialogue]]
speaker = "アポロ"
original = "「オマエ、極星星徒会の……！？」"
translation = "「너, 극성성도회의……!?」"

[[dialogue]]
speaker = "レティシア"
original = "「──チナ。新星学園に拘束されていると聞いていたのだけど……？」"
translation = "「──치나. 신성학원에 구속되어 있다고 들었는데……?」"

[[dialogue]]
speaker = "unk"
original = "極星星徒会同士の戦い──そこに割って入ったのは、同じく極星星徒会のチナだった。"
translation = "극성성도회끼리의 싸움── 그곳에 끼어든 것은 똑같이 극성성도회 소속인 치나였다."

[[dialogue]]
speaker = "unk"
original = "意外な参戦に、敵味方関係なく３人が驚く。"
translation = "의외의 참전에 적과 아군 상관없이 세 사람이 놀란다."

[[dialogue]]
speaker = "アポロ"
original = "（何をしに来たんだ……？\u3000レティシアに加勢しに来たのか？）"
translation = "（무슨 일을 하러 온 거지……? 레티시아를 가세하러 온 건가?）"

[[dialogue]]
speaker = "unk"
original = "チナはかつてアルタイルを滅ぼそうとした敵だ。"
translation = "치나는 과거 알타이르를 멸망시키려 했던 적이다."

[[dialogue]]
speaker = "unk"
original = "今ベアトリスを助けたばかりとはいえ、警戒せざるを得ない。"
translation = "방금 베아트리스를 구해주긴 했지만, 경계할 수밖에 없다."

[[dialogue]]
speaker = "チナ"
original = "「新星学園の学園長ってやつと話をした。それで思った」"
translation = "「신성학원의 학원장이라는 녀석과 이야기를 했어. 그리고 생각했지.」"

[[dialogue]]
speaker = "チナ"
original = "「アタシはアルタイルを滅ぼしたくない。十年前失ったものを、できるなら守りたい」"
translation = "「아타시는 알타이르를 멸망시키고 싶지 않아. 10년 전 잃어버린 것들을 할 수 있다면 지키고 싶어.」"

[[dialogue]]
speaker = "チナ"
original = "「だけど、アタシが何より守りたいのはデネブだ。デネブを守るために必要なら、アタシはアルタイルを滅ぼす。今もその覚悟は変わらない」"
translation = "「하지만 아타시가 무엇보다 지키고 싶은 건 데네브다. 데네브를 지키기 위해 필요하다면 아타시는 알타이르를 멸망시키겠어. 지금도 그 각오는 변함없어.」"

[[dialogue]]
speaker = "アポロ"
original = "（コイツ、まだアルタイルを滅ぼす気なのか……？\u3000それなら相手になるぞ……！）"
translation = "（이 녀석, 아직 알타이르를 멸망시킬 생각인가……? 그렇다면 상대해 주지……!）"

[[dialogue]]
speaker = "unk"
original = "レティシアだけでなく、チナとも戦う覚悟を心の中で固めるアポロ。"
translation = "레티시아뿐만 아니라 치나와도 싸울 각오를 마음속으로 다지는 아폴로."

[[dialogue]]
speaker = "unk"
original = "いつでも攻撃を仕掛けられるよう出方を伺う。"
translation = "언제든 공격을 가할 수 있도록 기회를 엿본다."

[[dialogue]]
speaker = "チナ"
original = "「アタシにとって一番大事なのは、デネブを守ること」"
translation = "「아타시에게 가장 중요한 건 데네브를 지키는 것.」"

[[dialogue]]
speaker = "チナ"
original = "「だからアタシは、デネブを守るためなら誰とでも戦う！\u3000それがたとえルヴィでもだ！」"
translation = "「그러니까 아타시는 데네브를 지키기 위해서라면 누구와도 싸우겠어! 그게 설령 루비라 해도!」"

[[dialogue]]
speaker = "レティシア"
original = "「……あなたまで、そんなことを」"
translation = "「……너까지 그런 소리를.」"

[[dialogue]]
speaker = "チナ"
original = "「ルヴィが本当は何をする気なのか、アタシにはわからない」"
translation = "「루비가 정말로 뭘 할 생각인지 아타시는 몰라.」"

[[dialogue]]
speaker = "チナ"
original = "「だからアタシは、ルヴィがリクリエを起こす気なのか、ベアトと一緒に確かめる！」"
translation = "「그러니까 아타시는 루비가 리크리에를 일으킬 생각인지 베아토와 함께 확인할 거야!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「チナちゃん！」"
translation = "「치나짱!」"

[[dialogue]]
speaker = "レティシア"
original = "「……チナも敵になるのは、考えていなかったわね」"
translation = "「……치나까지 적이 될 줄은 생각지 못했네.」"

[[dialogue]]
speaker = "レティシア"
original = "「人間界から救出する手間は省けたけれど……困ったわ」"
translation = "「인간계에서 구출할 수고는 덜었지만…… 곤란하게 됐어.」"

[[dialogue]]
speaker = "レティシア"
original = "「さらに霊力の出力を上げないとこの状況は覆せない──持つかしら、私の体」"
translation = "「영력 출력을 더 올리지 않으면 이 상황을 뒤집을 수 없겠네── 버텨줄까, 내 몸이.」"

[[dialogue]]
speaker = "アポロ"
original = "「なっ──オマエ、まだやる気なのか……！？」"
translation = "「뭐── 너, 아직 더 할 생각인 거냐……!?」"

[[dialogue]]
speaker = "レティシア"
original = "「ええ。私の仲間は騙されているもの。みんなをアルタイルから救い出して、ルヴィの元へ届けてあげないといけないわ」"
translation = "「응. 내 동료들은 속고 있는걸. 모두를 알타이르에서 구해내서 루비 곁으로 데려다줘야 해.」"

[[dialogue]]
speaker = "レティシア"
original = "「５人みんなでデネブに戻る──そのためなら、死の危険なんて些細なことね」"
translation = "「다섯 명 모두 함께 데네브로 돌아간다── 그러기 위해서라면 죽음의 위험 따윈 사소한 일이야.」"

[[dialogue]]
speaker = "unk"
original = "レティシアは己の限界をさらに超えて、セレスティアから霊力を引き出し、刀を構えた。"
translation = "레티시아는 자신의 한계를 더욱 뛰어넘어 셀레스티아에서 영력을 끌어내며 도를 겨누었다."

[[dialogue]]
speaker = "チナ"
original = "「悪いなレティシア！\u3000今はベアトの側につかせてもらう！」"
translation = "「미안하게 됐네, 레티시아! 지금은 베아토 편에 서겠어!」"

[[dialogue]]
speaker = "unk"
original = "全身に紫炎をまとったレティシアが、ベアトリスとチナに向かって突進する──！"
translation = "전신에 자색 불꽃을 두른 레티시아가 베아트리스와 치나를 향해 돌진한다──!"

[[dialogue]]
speaker = "チナ"
original = "「ベアト、合わせるぞ！」"
translation = "「베아토, 맞춘다!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「うん！」"
translation = "「응!」"

[[dialogue]]
speaker = "unk"
original = "ベアトリスとチナの星力が重なり、赤い槍にバチバチと稲妻が宿る。"
translation = "베아트리스와 치나의 성력이 겹쳐지며 붉은 창에 지지직하고 번개가 깃든다."

[[dialogue]]
speaker = "レティシア"
original = "「はぁぁああああッ──！」"
translation = "「하아아아아아앗──!」"

[[dialogue]]
speaker = "チナ"
original = "「行けーっ、ベアトーーっ！！」"
translation = "「가라아, 베아토오오!!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ブラッディ──インベイション！！」"
translation = "「블러디── 인베이전!!」"

[[dialogue]]
speaker = "レティシア"
original = "「──ッ！！」"
translation = "「──윽!!」"

[[dialogue]]
speaker = "unk"
original = "ベアトリスの槍が斬撃を打ち破り、紫炎を吹き飛ばす。"
translation = "베아트리스의 창이 참격을 타파하고 자색 불꽃을 날려버린다."

[[dialogue]]
speaker = "unk"
original = "そしてレティシアがとうとう限界を迎え、ルヴィネから与えられたセレスティアも砕けた。"
translation = "그리고 레티시아가 드디어 한계에 도달하며 루비네에게 받은 셀레스티아도 산산조각 났다."

[[dialogue]]
speaker = "アポロ"
original = "「おっと！」"
translation = "「어이쿠!」"

[[dialogue]]
speaker = "unk"
original = "力を失って落下しそうになったレティシアを、アポロが受け止める。"
translation = "힘을 잃고 추락하려던 레티시아를 아폴로가 받아낸다."

[[dialogue]]
speaker = "ベアトリス"
original = "「ありがとう、アポロちゃん！\u3000レティシアちゃんは……」"
translation = "「고마워, 아폴로짱! 레티시아짱은……」"

[[dialogue]]
speaker = "レティシア"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "アポロ"
original = "「気絶してるだけみたいだな。あんなに暴れたのに頑丈なこった」"
translation = "「기절했을 뿐인 것 같군. 그렇게 날뛰고도 튼튼하긴.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ふぅ……よかった……」"
translation = "「후우…… 다행이다……」"

[[dialogue]]
speaker = "アポロ"
original = "「ガーディアンも極星従騎も片付けたし……こっちは何とかなったみたいだな」"
translation = "「가디언도 극성종기도 정리했고…… 이쪽은 어떻게든 해결된 모양이네.」"

[[dialogue]]
speaker = "アポロ"
original = "「でもまさかチナが一緒に戦ってくれるとは思わなかったぞ！」"
translation = "「그나저나 설마 치나가 같이 싸워줄 줄은 몰랐다고!」"

[[dialogue]]
speaker = "チナ"
original = "「別にお前らのためじゃない。デネブを守るのに、こうした方がいいと思っただけだ」"
translation = "「딱히 너희를 위해서가 아냐. 데네브를 지키는 데 이렇게 하는 게 낫겠다고 생각했을 뿐이다.」"

[[dialogue]]
speaker = "アポロ"
original = "「ツンデレか」"
translation = "「츤데레냐.」"

[[dialogue]]
speaker = "チナ"
original = "「んだとー！\u3000誰がツンデレだ！」"
translation = "「뭐라고오! 누가 츤데레라는 거야!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「あはははっ、仲良くなれそうだね♪」"
translation = "「아하하하, 사이좋게 지낼 수 있을 것 같네♪」"

