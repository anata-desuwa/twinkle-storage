[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「――ふぅ、今日はここまでにしとこうかな」"
translation = "「──후우, 오늘은 여기까지만 할까」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「あー、もう、つっかれた～！\u3000こんな時間になっちゃって、急がないとお店が閉まっちゃうよ」"
translation = "「아 정말 피곤해~! 벌써 시간이 이렇게 됐네, 서두르지 않으면 가게 문 닫겠어」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「さっさと片付けして帰ろ～っと」"
translation = "「얼른 정리하고 가야지~」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「いつも遅くなっちゃって、メイプルちゃんに申し訳ないなぁ」"
translation = "「매번 늦어져서 메이플 짱한테 미안하네」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ノヴァフォームの経験を活かしてウェディングフォームの研究を進められるかも、なんて期待してたけど……そう上手くはいかないね」"
translation = "「노바 폼의 경험을 살려서 웨딩 폼 연구를 진행할 수 있지 않을까 기대했는데…… 그렇게 쉽게는 안 되네」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「でも新フォームの謎が解明できたらみんなの戦力アップに繋がるんだし、頑張らなくちゃ！」"
translation = "「그래도 새 폼의 수수께끼가 풀리면 모두의 전력 향상으로 이어지는 거니까 열심히 해야지!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「それにしても……もう６月……ジューンブライドの季節か～……」"
translation = "「그나저나…… 벌써 6월…… 준 브라이드 시즌인가~……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「研究してるテーマがテーマだからつい考えちゃうな。わたしもいつかウェディングドレスを着る日が来るのかな、なーんて……」"
translation = "「연구하는 테마가 테마이다 보니 자꾸 생각하게 되네. 나도 언젠가 웨딩드레스를 입는 날이 올까, 라니……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「そのためにまずは結婚しなきゃなんだけど……でもお相手もいないし、どんどん歳を取っていっちゃうし──」"
translation = "「그러려면 우선 결혼부터 해야 하는데…… 하지만 상대도 없고 나이만 계속 먹어가고──」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「うわああああ～～～ん、わたしも結婚したいよおおお～～！！」"
translation = "「우와아아아아앙~~~ 나도 결혼하고 싶어어어어~~!!」"

[[dialogue]]
speaker = "unk"
original = "ある日の放課後、ヘレナに呼び出されたクロトとマトイは九浄家に向かっていた。"
translation = "어느 날 방과 후, 헬레나에게 불려간 쿠로토와 마토이는 쿠죠 가문으로 향하고 있었다."

[[dialogue]]
speaker = "unk"
original = "これまでも突然呼び出されることはあったが、今日は珍しいメンバーがもう１人──"
translation = "지금까지도 갑자기 불려간 적은 있었지만 오늘은 드문 멤버가 한 명 더──"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「会長くんとマトイちゃんはどうして理事長に呼び出されたの？」"
translation = "「회장 군이랑 마토이 짱은 어째서 이사장님한테 불려간 거야?」"

[[dialogue]]
speaker = "unk"
original = "いつものように何も聞かされてません"
translation = "늘 그렇듯 아무것도 듣지 못했습니다"

[[dialogue]]
speaker = "unk"
original = "来てからのお楽しみだそうで"
translation = "오고 나서의 즐거움이라고 하시더라고요"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「トワちゃん先生はどんな用事で呼ばれたんですか？」"
translation = "「토와 짱 선생님은 어떤 용무로 불려오신 건가요?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「うーん……わたしもおんなじで、何も聞かされてないんだよね～」"
translation = "「으음…… 나도 마찬가지로 아무것도 듣지 못했어~」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「でも多分あれじゃないかなって心当たりは一応あるんだよ」"
translation = "「근데 아마 그거 아닐까 하는 짐작은 일단 있거든」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「え、そうなんですか？」"
translation = "「에, 정말인가요?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「うん。ずっと前から研究してることがあって、それについての報告を求められるんじゃないかな、って……もう６月になっちゃったしね」"
translation = "「응. 오래전부터 연구하고 있는 게 있는데 그거에 대한 보고를 요구받는 게 아닐까 싶어서…… 벌써 6월이 되기도 했고」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「６月って言ったら、マトイちゃんは何を思い浮かべる？」"
translation = "「6월이라고 하면 마토이 짱은 뭐가 떠올라?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「えっ？\u3000ええと、やっぱり……ジューンブライド？」"
translation = "「에? 에또, 역시…… 준 브라이드?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「はい、正解」"
translation = "「네, 정답」"

[[dialogue]]
speaker = "unk"
original = "ウェディングフォームのこと？"
translation = "웨딩 폼 말이야?"

[[dialogue]]
speaker = "unk"
original = "あ、もしかして……"
translation = "아, 설마……"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「そうなんだよ～。星見家で起きたウェディングフォーム騒動があったでしょ？」"
translation = "「그렇단다~. 호시미 가문에서 일어난 웨딩 폼 소동 있었지?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「あれからずっとあの現象について調べてるんだよ。理事長もウェディングフォームを人工戦闘服で作れないかって研究をしてるから協力してね」"
translation = "「그때부터 계속 그 현상에 대해 조사하고 있어. 이사장님도 웨딩 폼을 인공 전투복으로 만들 수 없을까 연구하고 있으니까 협력해 줘」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ヘレナさん、人工戦闘服の開発にすごく力を入れてますもんね。でも……ウェディングフォームか～、いいなぁ」"
translation = "「헬레나 씨, 인공 전투복 개발에 굉장히 힘쓰고 계시니까요. 하지만…… 웨딩 폼인가~ 좋겠다」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「フィオナさんたちのウェディングフォーム、すごく綺麗だったし……私も着てみたいな～」"
translation = "「피오나 씨들의 웨딩 폼, 정말 예뻤고…… 저도 입어보고 싶네요~」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「あはは、あのフォームについてはまだまだ未知数なところだらけなんだよね。早く解明したいんだけどなかなか上手くいかなくて」"
translation = "「아하하, 그 폼에 대해서는 아직 미지수인 것들투성이거든. 빨리 해명하고 싶은데 좀처럼 잘 안 되네」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そうなんですね。残念……」"
translation = "「그렇군요. 아쉽네요……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「あ、けど九浄家でも独自に研究を進めてるみたいだから、もしかすると向こうで何か発見があったのかも？」"
translation = "「아, 그래도 쿠죠 가문에서도 독자적으로 연구를 진행하는 것 같으니까 어쩌면 저쪽에서 뭔가 발견이 있었을지도?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「もしかしたら試作品が完成した～、みたいな話かもしれないし……そしたらマトイちゃん、着せてもらったらいいんじゃない？」"
translation = "「어쩌면 시제품이 완성됐다~ 같은 이야기일지도 모르고…… 그러면 마토이 짱, 한번 입어보면 어때?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「わ、私がですか？\u3000それだったらトワちゃん先生の方が先じゃないですか？」"
translation = "「저, 제가요? 그럴 거면 토와 짱 선생님이 먼저잖아요?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「いやいや、さすがにわたしはないよ～。先生だもん」"
translation = "「아니 아니, 설마 나는 아니지~ 선생님인걸」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「トワちゃん先生のウェディングドレス姿、絶対似合うと思いますけどね」"
translation = "「토와 짱 선생님의 웨딩드레스 차림, 분명 잘 어울릴 거라고 생각하는데요」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「またまた～。優しいね、マトイちゃんは。お世辞でも嬉しいよ」"
translation = "「또 그런다~. 상냥하네, 마토이 짱은. 빈말이라도 기뻐」"

[[dialogue]]
speaker = "unk"
original = "アステラだ！"
translation = "아스텔라다!"

[[dialogue]]
speaker = "unk"
original = "待って、２人とも！"
translation = "잠깐만, 둘 다!"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「私たちで対処しましょう！\u3000先生、許可をお願いします！」"
translation = "「저희가 대처하죠! 선생님, 허가 부탁드립니다!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「うん！\u3000わたしも一緒に戦うよ！」"
translation = "「응! 나도 같이 싸울게!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ここだよ！\u3000しばらく持ちこたえれば、援軍も来てくれるはず！\u3000頑張ろう、２人とも！」"
translation = "「여기야! 잠시만 버티면 원군도 올 거야! 힘내자, 둘 다!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「さあ、行くよっ！」"
translation = "「자, 간다!」"

[[dialogue]]
speaker = "unk"
original = "……………………"
translation = "……………………"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「………………」"
translation = "「………………」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「え……？\u3000どうしたの２人とも、ぼーっとしてたら危ないよ？」"
translation = "「어……? 왜 그래 둘 다, 멍하니 있으면 위험해?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ええと、すみません……ちょっと現実に追いつけなくって」"
translation = "「저기, 죄송해요…… 좀 현실을 못 따라가겠어서」"

[[dialogue]]
speaker = "unk"
original = "自分の格好を見てみて"
translation = "자기 모습 좀 봐봐"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「え？\u3000わたしの格好がどうかした……の……」"
translation = "「에? 내 모습이 어때서…… 서……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「って、ええええ！！？\u3000なんなの、これ～～～～っ！！？」"
translation = "「그게, 에에에에!!? 뭐야, 이거~~~~!!?」"

