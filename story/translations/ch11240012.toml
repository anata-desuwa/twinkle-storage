[[dialogue]]
speaker = "unk"
original = "第２話,再びアルタイルへ,P"
translation = "제2화, 다시 알타이르로, P"

[[dialogue]]
speaker = "unk"
original = "『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』との決戦準備のために、アルタイルへ移動した俺たち。"
translation = "『<ruby>ＸＥＬＯＳ<rt>제로스</rt></ruby>』와의 결전 준비를 위해, 알타이르로 이동한 우리들."

[[dialogue]]
speaker = "unk"
original = "しかし、まだデネブ防衛戦での傷が癒えていないため、今日は休養日──ということで、俺と環は遊園地デートに訪れていた。"
translation = "하지만 아직 데네브 방위전에서의 상처가 아물지 않았기에, 오늘은 휴일── 그리하여, 나와 타마키는 유원지 데이트를 즐기러 왔다."

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「ほらほら、次はあっちのコースター！\u3000休んでる暇はないよ、会長！」"
translation = "「자자, 다음은 저쪽 코스터! 쉬고 있을 틈은 없어, 회장!」"

[[dialogue]]
speaker = "unk"
original = "ああ！！"
translation = "아아!!"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「今日はぜーんぶキミの奢りだからね。目指せ、全アトラクション制覇！\u3000行っくよー！」"
translation = "「오늘은 저언부 네가 쏘는 거니까 말이야. 목표는, 전 어트랙션 제패! 가자아─!」"

[[dialogue]]
speaker_original = "スタッフの女性"
speaker_translation = "여성 스태프"
original = "「２名様ですね──って、あれ！？\u3000市倉さんに、緋宮くんじゃないですか！？」"
translation = "「두 분이시군요── 어라!? 이치쿠라 씨에, 히노미야 군 아니에요!?」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「やっほー。久しぶりだね。まだここでバイトしてたんだ？」"
translation = "「안녕. 오랜만이네. 아직 여기서 알바하고 있었어?」"

[[dialogue]]
speaker_original = "スタッフの女性"
speaker_translation = "여성 스태프"
original = "「ええ。ありがたいことに先月から正社員になって……って。２人はもしかして──」"
translation = "「네. 감사하게도 지난달부터 정직원이 되어서…… 그보다. 두 분, 설마──」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「うん。デートしてるんだ。会長が全部奢ってくれる約束しててさ♪」"
translation = "「응. 데이트하고 있어. 회장이 전부 다 사준다고 약속했거든♪」"

[[dialogue]]
speaker_original = "スタッフの女性"
speaker_translation = "여성 스태프"
original = "「へぇ～！\u3000びっくり──でもないですね。２人とも、アルバイトしてた時から息がぴったりでしたし」"
translation = "「헤에~! 놀랍── 지도 않네요. 두 사람 다, 아르바이트했을 때부터 호흡이 척척 맞았으니까요」"

[[dialogue]]
speaker_original = "スタッフの女性"
speaker_translation = "여성 스태프"
original = "「もしかして……ふふ♪\u3000ここで働いてた時からお付き合いしてました？」"
translation = "「설마…… 후후♪ 여기서 일했을 때부터 사귀고 있었나요?」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「ううん。会長と付き合いだしたのは、新星学園で再会してからだよ。付き合い始めてからは、まだそんなに時間が経ってなくてさ」"
translation = "「으응. 회장이랑 사귀기 시작한 건, 신성학원에서 재회하고 나서야. 사귄 지는 아직 그렇게 오래되지 않았어」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「今日は楽しませてもらうよ。頑張ってね！」"
translation = "「오늘은 즐겁게 놀다 갈게. 수고해!」"

[[dialogue]]
speaker = "unk"
original = "古巣のバイト先だからもしかしたらと思ったけれど、ちらほらと顔見知りを見つけた俺と環。"
translation = "이전에 일했던 알바처라 혹시나 했는데, 여기저기서 아는 얼굴을 발견한 나와 타마키."

[[dialogue]]
speaker = "unk"
original = "今さらだけど、俺には『環をただの天使だ』と思っていた時の思い出もたくさん存在している。"
translation = "새삼스럽지만, 나에게는 『타마키를 평범한 천사다』라고 생각했던 시절의 추억도 많이 존재한다."

[[dialogue]]
speaker = "unk"
original = "黒騎士となった学園長との戦いを機に環の正体を知り、離ればなれになっていたけれど──"
translation = "흑기사가 된 학원장과의 싸움을 계기로 타마키의 정체를 알게 되고, 한동안 떨어져 있었지만──"

[[dialogue]]
speaker = "unk"
original = "そう思うと、今こうして一緒に遊べていることが、よりかけがえのないものに感じるのだった──"
translation = "그렇게 생각하니, 지금 이렇게 함께 놀 수 있다는 것이 더욱 소중하게 느껴지는 것이었다──"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「はー、遊んだ、遊んだ♪\u3000戦い続きでフラストレーション溜まってたから、いい気分転換になったよ」"
translation = "「하아─, 잘 놀았다, 잘 놀았어♪ 계속된 전투로 스트레스 쌓였었는데, 좋은 기분 전환이 됐어」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「うん……それじゃあへそを曲げるのも、このくらいにしておいてあげよっかな。会長、迎えに来なかった件はこれでチャラね♪」"
translation = "「응…… 그럼 삐쳐 있었던 것도 이 정도로 해줄까나. 회장, 데리러 오지 않았던 건 이걸로 퉁치기로 해♪」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「──なんて。もうとっくに怒ってなんていないんだけど。会長がやけにオマケしてくれるから、ガラにもなく引きずったふりしちゃった」"
translation = "「──랄까. 벌써 옛저녁에 화 풀렸었지만 말이야. 회장이 워낙 잘해주길래, 평소답지 않게 뒤끝 있는 척 좀 해봤어」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「お詫びに今日からしばらく、ボクがお返しするよ。遊びでもご飯でも、何でもリクエストどうぞ～！」"
translation = "「답례로 오늘부터 한동안은 내가 보답할게. 놀이든 밥이든, 뭐든 리퀘스트해 줘~!」"

[[dialogue]]
speaker = "unk"
original = "大丈夫だよ。環には世話になってるから"
translation = "괜찮아. 타마키에게는 신세 지고 있으니까"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「世話になってるって……そうかなぁ？」"
translation = "「신세 지고 있다니…… 그랬나~?」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスが無事に成長できたのも……"
translation = "비너스가 무사히 성장할 수 있었던 것도……"

[[dialogue]]
speaker = "unk"
original = "昔から俺のバイト先に現れてたのだって……"
translation = "옛날부터 내 알바처에 나타나 줬던 것도……"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「ああ、そういうこと？\u3000気にしないでよ。アルタイルのキミとヴィーナスを見守ることは、テルルからのお願いだったからね」"
translation = "「아아, 그런 거야? 신경 쓰지 마. 알타이르의 너와 비너스를 지켜보는 건, 텔루르의 부탁이었으니까 말이야」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』から３つの世界を守るためだったんだ──気にしないで」"
translation = "「『<ruby>ＸＥＬＯＳ<rt>제로스</rt></ruby>』로부터 세 세계를 지키기 위해서였어── 신경 쓰지 마」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「むしろ、不愉快に思ってない？\u3000仕方なかったとはいえ、ボクはずっと嘘を吐いてたわけだし……」"
translation = "「오히려, 불쾌하게 생각 안 해? 어쩔 수 없었다지만, 난 계속 거짓말을 해왔던 셈이고……」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「実際、キミに告白された時だって、ボクは真実を明かさないでＯＫしたわけだしね──」"
translation = "「실제로, 네가 고백했을 때도, 나는 진실을 밝히지 않은 채 OK 했으니까 말이야──」"

[[dialogue]]
speaker = "unk"
original = "──あれは、俺が会長に就任して間もない頃だったか。"
translation = "──그건, 내가 회장에 취임한 지 얼마 되지 않았을 때였던가."

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「おーっす。どしたの、急に呼び出して？」"
translation = "「안녕─. 무슨 일이야, 갑자기 불러내고?」"

[[dialogue]]
speaker = "unk"
original = "ようやく入学できた新星学園で、かつてのバイト仲間である環と再会を果たした俺。"
translation = "겨우 입학할 수 있었던 신성학원에서, 예전 알바 동료였던 타마키와 재회한 나."

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「もしかして──愛の告白とか？\u3000なんちゃって」"
translation = "「설마── 사랑 고백이라든가? 농담이야」"

[[dialogue]]
speaker = "unk"
original = "苦楽を共にした友人とばかり思っていた。"
translation = "고락을 함께한 친구라고만 생각했다."

[[dialogue]]
speaker = "unk"
original = "けれど俺は、環と再会してから、どんどん彼女のことを異性として意識するようになっていった──"
translation = "하지만 나는, 타마키와 재회하고 나서 점점 그녀를 이성으로 의식하게 되었다──"

[[dialogue]]
speaker = "unk"
original = "俺と付き合ってくれないか？"
translation = "나와 사귀어 주지 않을래?"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「えっ……！？\u3000あー、本当にそういう呼び出しだったんだ？」"
translation = "「엣……!? 아─, 정말로 그런 호출이었어?」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「……本当にいいの？\u3000ボク、キミが思ってるような女の子じゃないかもしれないよ？」"
translation = "「……정말 괜찮겠어? 나, 네가 생각하는 그런 여자애가 아닐지도 모른다고?」"

[[dialogue]]
speaker = "unk"
original = "環は環だろ？\u3000君のことが好きなんだ"
translation = "타마키는 타마키잖아? 널 좋아해"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「…………そっか」"
translation = "「…………그렇구나」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「──うん。ボクもキミのこと……好きだよ。これは、本当の本当。嘘じゃないからね」"
translation = "「──응. 나도 너…… 좋아해. 이건, 진짜진짜야. 거짓말 아니니까 말이야」"

[[dialogue]]
speaker = "unk"
original = "あの時は何を言っているのかわからなかったけれど──今なら分かる。"
translation = "그때는 무슨 소린가 했었지만── 지금이라면 알 수 있다."

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「ボクが守護天使だって真実を知ってから、キミの気持ちを確認するの、怖かったんだ」"
translation = "「내가 수호천사라는 진실을 알고 나서, 네 마음을 확인하는 거, 무서웠거든」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「なのに例の件で拗ねたら、キミは『機嫌を直してくれー』ってあたふたしてくれて……だから、嬉しくて引っ張っちゃったんだ。ごめんね」"
translation = "「그런데 그 일로 토라졌더니, 네가 『기분 좀 풀어줘─』라며 허둥지둥해 줘서…… 그래서, 기뻐서 좀 더 끌어봤어. 미안해」"

[[dialogue]]
speaker = "unk"
original = "真実を知っても俺の気持ちは変わらない"
translation = "진실을 알아도 내 마음은 변하지 않아"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「…………会長」"
translation = "「…………회장」"

[[dialogue]]
speaker = "unk"
original = "環はずっと俺を見守ってくれていた"
translation = "타마키는 계속 나를 지켜봐 줬어"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「……うん。キミ、しょっちゅう色んなアルバイトを始めるから、追いかけるの大変だったな」"
translation = "「……응. 너, 시도 때도 없이 온갖 아르바이트를 시작하니까, 쫓아다니느라 힘들었다고」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「星騎士として戦えないのに、モンスターを惹きつけちゃうし……」"
translation = "「성기사로서 싸울 수도 없으면서, 몬스터는 끌어당기고 말이야……」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「でも──大変だったけど、キミと一緒に過ごした時間は、すごく楽しかった。本当の本当に。嘘じゃないよ」"
translation = "「그래도── 힘들었지만, 너와 함께 보낸 시간은 무척 즐거웠어. 진짜진짜로. 거짓말 아냐」"

[[dialogue]]
speaker = "unk"
original = "何があっても、その想いは変わらない"
translation = "무슨 일이 있어도, 그 생각은 변하지 않아"

[[dialogue]]
speaker = "unk"
original = "君のことが好きだ、環"
translation = "좋아해, 타마키"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「……うん」"
translation = "「……응」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「ボクも同じ気持ちだよ、会長──キミのことが、大好き」"
translation = "「나도 같은 마음이야, 회장── 널 정말 좋아해」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「──んちゅっ<emoji=heart04>」"
translation = "「──응츄<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "全てを知って、その上で──俺たちは改めて、恋人同士になったのだった。"
translation = "모든 것을 알고, 그 위에서── 우리는 다시금 연인 사이가 된 것이었다."

