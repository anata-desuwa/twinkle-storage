[[dialogue]]
speaker = "unk"
original = "ミネコと初めて会った日から少し経った、ある日のこと。彼女から「一緒に遊ぼう♪」という連絡があった。"
translation = "미네코와 처음 만난 날로부터 조금 지난 어느 날. 그녀로부터 「같이 놀자♪」라는 연락이 왔다."

[[dialogue]]
speaker = "unk"
original = "これまたいつの間にか彼女が住み始めているらしい流星寮へと呼び出されて、足を運ぶと――"
translation = "이 또한 어느샌가 그녀가 살기 시작했다는 유성 기숙사로 불려가 발을 옮기니──"

[[dialogue]]
speaker = "ミネコ"
original = "「おっ、ジュエリー、会長！\u3000こっちこっち～♪」"
translation = "「오, 주얼리, 회장님! 여기 여기~♪」"

[[dialogue]]
speaker = "unk"
original = "並んでいるテーブルの一席に腰かけて、明るくぶんぶんと手を振っている彼女のところへ向かう。"
translation = "나란히 놓인 테이블의 한 좌석에 걸터앉아 밝게 붕붕 손을 흔들고 있는 그녀에게로 향한다."

[[dialogue]]
speaker = "ジュエリー"
original = "「ミネコ、今日は一体何の用だい？\u3000私はキミと仲よくするよりも、助手と愛を深めるので忙しいのだが……」"
translation = "「미네코, 오늘은 대체 무슨 용건이지? 나는 너와 친하게 지내기보다 조수와 사랑을 키우느라 바쁘다만……」"

[[dialogue]]
speaker = "ジュエリー"
original = "「って、そのテーブルの上に置いてあるのは……？」"
translation = "「어라, 그 테이블 위에 놓인 건……?」"

[[dialogue]]
speaker = "ミネコ"
original = "「ふっふっふ……よくぞ聞いてくれたね、名探偵！\u3000実は２人と仲良くなろうと思って――」"
translation = "「훗훗후…… 잘 물어봐 줬어, 명탐정! 사실은 둘과 친해지려고──」"

[[dialogue]]
speaker = "ミネコ"
original = "「趣味のボドゲを持ってきたんだ～♪\u3000３人でやろうよ☆」"
translation = "「취미인 보드게임을 가져왔어~♪ 셋이서 하자☆」"

[[dialogue]]
speaker = "unk"
original = "ボードゲームを……？"
translation = "보드게임을……?"

[[dialogue]]
speaker = "unk"
original = "大怪盗の彼女からの呼び出しで内心警戒していたのだが、なんだか拍子抜けしてしまう。"
translation = "대괴도인 그녀가 불러내어 내심 경계하고 있었는데, 왠지 맥이 빠져버린다."

[[dialogue]]
speaker = "ミネコ"
original = "「ジュエリーの趣味を聞き出したら、なんとゲームが好きだって言うじゃん？\u3000ってことは、まさかの偶然！\u3000私たち趣味が合うじゃん♪」"
translation = "「주얼리의 취미를 캐냈더니 글쎄 게임을 좋아한다잖아? 그건 즉 설마 했던 우연! 우리 취미가 맞네♪」"

[[dialogue]]
speaker = "ミネコ"
original = "「それなら善は急げでしょ！\u3000ってことで、お気に入りのやつを持ってきたんだ～♪」"
translation = "「그렇다면 쇠뿔도 단김에 빼랬다고! 그래서 아끼는 녀석을 가져왔지~♪」"

[[dialogue]]
speaker = "ジュエリー"
original = "「確かにキミの、『ヘイ彼女、好きなもの教えてよ』というナンパのようなノリに付き合って、ゲームと助手の２つを答えたとも」"
translation = "「확실히 네 『헤이 아가씨, 좋아하는 것 좀 알려줘』라는 헌팅 같은 분위기에 장단 맞춰서 게임과 조수 두 가지를 대답하긴 했다만.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「しかしあいにく、私が好きなのは、『電子ゲーム』の方だよ。世界的に売れてる家庭用ゲーム機があるだろう？」"
translation = "「하지만 아쉽게도 내가 좋아하는 건 『전자 게임』 쪽이야. 세계적으로 팔리는 가정용 게임기 있잖아?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「それの新作ソフトが出る度、発売日にダウンロードして、徹夜でプレイして最速攻略し――」"
translation = "「그것의 신작 소프트가 나올 때마다 발매일에 다운로드해서 밤새 플레이하며 최속 공략하고──」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ネットの盛り上がりを眺めながらゲームの『批評』をするのが好きな、ライトユーザーさ」"
translation = "「인터넷의 열기를 바라보며 게임 『비평』을 하는 걸 좋아하는 라이트 유저지.」"

[[dialogue]]
speaker = "ミネコ"
original = "「それはライトなのかな……？」"
translation = "「그게 라이트한 걸까……?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ボードゲームもプレイするのは嫌いじゃないが、あまり積極的に嗜まないね」"
translation = "「보드게임도 플레이하는 걸 싫어하지는 않지만 그리 적극적으로 즐기지는 않아.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「チェスは好きだけど、それもするなら基本、パソコン上でのオンライン対戦がメインだよ」"
translation = "「체스는 좋아하지만 그것도 한다면 기본적으로 컴퓨터상의 온라인 대전이 메인이야.」"

[[dialogue]]
speaker = "ミネコ"
original = "「ふふふっ♪\u3000大丈夫、私も電子ゲームはよくプレイしてるから♪\u3000そっちのフレンド登録とオンライン対戦については、また後でのお楽しみとして――」"
translation = "「후후훗♪ 괜찮아, 나도 전자 게임은 자주 플레이하니까♪ 그쪽 친구 등록이랑 온라인 대전은 나중에 즐기는 걸로 하고──」"

[[dialogue]]
speaker = "ミネコ"
original = "「まずはリアルに顔を合わせてるわけだし、ボドゲで遊ぶところから始めようよ♪」"
translation = "「우선은 실제로 얼굴을 마주한 거니까 보드게임으로 노는 것부터 시작하자♪」"

[[dialogue]]
speaker = "ミネコ"
original = "「それに、ジュエリーは少なからず興味あると思うよ～？\u3000何故なら――」"
translation = "「게다가 주얼리는 적잖이 관심 있을걸~? 왜냐하면──」"

[[dialogue]]
speaker = "ミネコ"
original = "「このボドゲ、ジュエリーが好きだって言ってたゲームクリエイターが、若い頃に手がけた作品だからね♪」"
translation = "「이 보드게임, 주얼리가 좋아한다고 했던 게임 크리에이터가 젊었을 적에 만든 작품이거든♪」"

[[dialogue]]
speaker = "ジュエリー"
original = "「……！\u3000まさか、同人作品で出回った数が少ないから、数十万テルスのプレミアが付いているっていう噂の……！？」"
translation = "「……! 설마 동인 작품이라 유통된 수가 적어서 수십만 텔루스의 프리미엄이 붙어 있다는 그 소문의……!?」"

[[dialogue]]
speaker = "ミネコ"
original = "「そう、今ではなかなか手に入らないレア物ボードゲーム。それがこれだよ♪\u3000値段もさることながら、そもそも数が少ないせいで、市場に出回ってないんだよね～」"
translation = "「맞아, 지금은 좀처럼 구하기 힘든 레어 보드게임. 그게 바로 이거야♪ 가격도 가격이지만 애초에 숫자가 적어서 시장에 잘 안 나오거든~」"

[[dialogue]]
speaker = "ミネコ"
original = "「ああ、一応言っとくけど、これは盗んだわけじゃなく、ちゃんと買ったやつだから、安心してね」"
translation = "「아, 일단 말해두는데 이건 훔친 게 아니라 정식으로 산 거니까 안심해.」"

[[dialogue]]
speaker = "ミネコ"
original = "「レア物とはいえ、お金を出せば買える程度の量産品を盗むのは、私の主義じゃないんで♪」"
translation = "「레어템이라고는 해도 돈만 주면 살 수 있는 정도의 양산품을 훔치는 건 내 주의가 아니라서♪」"

[[dialogue]]
speaker = "ミネコ"
original = "「で、どうかな、ジュエリー？\u3000有名クリエイターが若かりし頃に手がけたゲーム……遊んでみたくない？」"
translation = "「자, 어때, 주얼리? 유명 크리에이터가 젊은 시절에 만든 게임…… 해보고 싶지 않아?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ごくり……」"
translation = "「꿀꺽……」"

[[dialogue]]
speaker = "ジュエリー"
original = "「……いいだろう。キミの思考の癖をトレースするのにも役立つだろうし、そこまで言うなら付き合おうじゃないか」"
translation = "「……좋다. 네 사고 습관을 트레이스하는 데도 도움이 될 테고, 그렇게까지 말한다면 어울려 주지.」"

[[dialogue]]
speaker = "unk"
original = "（遊んでみたくなったんだな……）"
translation = "(해보고 싶어진 거구나……)"

[[dialogue]]
speaker = "ミネコ"
original = "「ふふっ。じゃあ、決まりだね♪\u3000このボードゲームのタイトルは、おあつらえ向きに『名探偵と大怪盗』！」"
translation = "「후훗. 그럼 결정됐네♪ 이 보드게임의 타이틀은 딱 어울리게도 『명탐정과 대괴도』!」"

[[dialogue]]
speaker = "ミネコ"
original = "「今日は立場を忘れて、楽しく勝負と行こうじゃないか、名探偵！」"
translation = "「오늘은 입장을 잊고 즐겁게 승부를 겨뤄보자고, 명탐정!」"

[[dialogue]]
speaker = "unk"
original = "それからミネコにルールを教えてもらい、ゲームをプレイする俺たちだったが――"
translation = "그러고는 미네코에게 규칙을 배워 게임을 플레이하는 우리였으나──"

[[dialogue]]
speaker = "ミネコ"
original = "「あはははははっ♪\u3000ざんね～ん！\u3000また『大怪盗』の勝ち～！\u3000お宝、も～らいっ♪」"
translation = "「아하하하하하♪ 아쉽네~! 또 『대괴도』의 승리~! 보물은 내가 가져갈게♪」"

[[dialogue]]
speaker = "ジュエリー"
original = "「くうぅっ。さ、３連敗……！」"
translation = "「크으윽. 3, 3연패……!」"

[[dialogue]]
speaker = "unk"
original = "ジュエリーが珍しく、眉間に皺を寄せながら悔しそうな顔を浮かべていた。"
translation = "주얼리가 드물게 미간을 찌푸리며 분한 표정을 짓고 있었다."

[[dialogue]]
speaker = "ミネコ"
original = "「いや～、ごめんね～♪\u3000本当の名探偵が相手だから、手加減できなくってさ～」"
translation = "「이런~ 미안해~♪ 진짜 명탐정이 상대니까 봐줄 수가 없어서 말이야~」"

[[dialogue]]
speaker = "ジュエリー"
original = "「というかこれ、ゲームバランスおかしくないかい！？\u3000どう考えても怪盗側が有利なゲームだろう！？」"
translation = "「그보다 이거 게임 밸런스가 이상하지 않아!? 아무리 생각해도 괴도 측이 유리한 게임이잖아!?」"

[[dialogue]]
speaker = "ミネコ"
original = "「あはははっ♪\u3000やっぱ気づいた？\u3000実はそうなんだよね～」"
translation = "「아하하핫♪ 역시 눈치챘어? 사실 그렇거든~」"

[[dialogue]]
speaker = "ミネコ"
original = "「ほら、３人目のプレイヤーである会長は、探偵の助手としてサポート役になるわけじゃない？」"
translation = "「자, 세 번째 플레이어인 회장님은 탐정의 조수로서 서포트역이 되잖아?」"

[[dialogue]]
speaker = "ミネコ"
original = "「一方で、怪盗は常に単独プレイを迫られるから、変装システムでパワーバランスを取ろうとしてるわけだけど――」"
translation = "「한편 괴도는 항상 단독 플레이를 강요받으니까 변장 시스템으로 파워 밸런스를 맞추려고 한 건데──」"

[[dialogue]]
speaker = "ミネコ"
original = "「この変装がぶっ壊れで、しかも探偵側の助手が増えれば増えるだけ使用可能な回数が増えて、怪盗側有利になるっていうね！」"
translation = "「이 변장이 씹사기급이라 게다가 탐정 측 조수가 늘어나면 늘어날수록 사용 가능한 횟수가 늘어나서 괴도 측이 유리해진다는 거지!」"

[[dialogue]]
speaker = "ジュエリー"
original = "「クソゲーじゃないか！\u3000ゲーム状況見ながら、助手の行動が実は変装でしたって後出しできるのは、推理のしようがないぞ！？」"
translation = "「망겜이잖아! 게임 상황 보면서 조수의 행동이 사실은 변장이었다고 나중에 내놓는 건 추리할 방법이 없다고!?」"

[[dialogue]]
speaker = "ミネコ"
original = "「ふふっ……ふふふっ♪」"
translation = "「후훗…… 후후훗♪」"

[[dialogue]]
speaker = "ミネコ"
original = "「そう、ジュエリー、これは『クソゲー』なんだよ……！\u3000だからこそ、再販なんてされてなくて、プレミアが付いてるってわけ♪」"
translation = "「그래, 주얼리, 이건 『망겜』이야……! 그렇기에 재판 같은 건 안 돼서 프리미엄이 붙어 있는 거지♪」"

[[dialogue]]
speaker = "ミネコ"
original = "「でも――」"
translation = "「하지만──」"

[[dialogue]]
speaker = "ミネコ"
original = "「そんな理不尽なクソゲーだからこそ、もし探偵側で勝てたら、とんでもないエクスタシーが生まれると思わない……！？」"
translation = "「그런 불합리한 망겜이기에 만약 탐정 측에서 이긴다면 엄청난 엑스터시가 생겨날 거라 생각지 않아……!?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「いや、無理だろう……ゲーム内容を理解すれば理解する程、逆転が難しくなるイメージしか湧かないんだが……」"
translation = "「아니, 무리겠지…… 게임 내용을 이해하면 이해할수록 역전이 어려워지는 이미지밖에 안 떠오르는데……」"

[[dialogue]]
speaker = "ミネコ"
original = "「なら役を交代してみる？」"
translation = "「그럼 역할을 바꿔볼까?」"

[[dialogue]]
speaker = "ミネコ"
original = "「ふふっ♪\u3000理不尽に私がどう立ち向かうのか、しっかりと見ときなよ～！」"
translation = "「후훗♪ 불합리에 내가 어떻게 맞서는지 똑똑히 지켜보라고~!」"

[[dialogue]]
speaker = "unk"
original = "そうして、お互いの役を交換した結果――"
translation = "그렇게 서로의 역할을 교환한 결과──"

[[dialogue]]
speaker = "ジュエリー"
original = "「……よし、私の勝ちだっ！」"
translation = "「……좋아, 나의 승리다!」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ほら見たまえ！\u3000やっぱり、このゲームは熟練者でも怪盗には勝てないじゃないか。ふふふっ」"
translation = "「자 보라고! 역시 이 게임은 숙련자라도 괴도를 이길 수 없지 않은가. 후후후」"

[[dialogue]]
speaker = "unk"
original = "ようやく勝ったからだろう。ジュエリーは小さくガッツポーズの手をしながら、嬉しそうに言う。"
translation = "드디어 이겼기 때문일까. 주얼리는 작게 주먹을 쥐어 보이면서 기쁜 듯이 말한다."

[[dialogue]]
speaker = "unk"
original = "一方の敗北したミネコはというと――"
translation = "한편 패배한 미네코는──"

[[dialogue]]
speaker = "ミネコ"
original = "「ふっ……ふふふふふふっ♪\u3000ああ……やっぱり――」"
translation = "「훗…… 후후후후후후훗♪ 아아…… 역시──」"

[[dialogue]]
speaker = "ミネコ"
original = "「クソゲーって、すごくイイよね……♪」"
translation = "「망겜은 정말 좋네……♪」"

[[dialogue]]
speaker = "ジュエリー"
original = "「は？」"
translation = "「하?」"

[[dialogue]]
speaker = "ミネコ"
original = "「どうしようもない理不尽に打ちのめされて、敗北を突き付けられるこの瞬間……！」"
translation = "「어찌할 수 없는 불합리에 짓눌려 패배를 선고받는 이 순간……!」"

[[dialogue]]
speaker = "ミネコ"
original = "「はあぁ……<emoji=heart04>\u3000すごく――ゾクゾクする<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 정말── 짜릿해<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「なんで嬉しそうなんだ、キミは……？」"
translation = "「넌 왜 기뻐하는 거지……?」"

[[dialogue]]
speaker = "ミネコ"
original = "「それと同じくらい、他人が同じ理不尽な状況を味わって、感情的に悶える姿を見るのもまたイイ……♪」"
translation = "「그만큼 타인이 같은 불합리한 상황을 맛보며 감정적으로 번민하는 모습을 보는 것도 좋아……♪」"

[[dialogue]]
speaker = "ミネコ"
original = "「だって、あのいつも冷静に私を追い詰めてくる名探偵のジュエリーが、理不尽にフルボッコにされて、悔しそうな顔を見せるんだよ……？」"
translation = "「그야 그 항상 냉정하게 나를 몰아붙이는 명탐정 주얼리가 불합리하게 처발려서 분해하는 얼굴을 보여주는걸……?」"

[[dialogue]]
speaker = "ミネコ"
original = "「そんなの、ゲームバランス崩壊してるクソゲーじゃなきゃ味わえないじゃん<emoji=heart04>」"
translation = "「그런 건 게임 밸런스 붕괴된 망겜이 아니면 맛볼 수 없잖아<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「だからクソゲーは、自分でプレイするのも、他人のプレイを見るのも、大っ好きなんだよ♪」"
translation = "「그래서 망겜은 직접 플레이하는 것도 남이 플레이하는 걸 보는 것도 너~무 좋아해♪」"

[[dialogue]]
speaker = "unk"
original = "えぇ……"
translation = "에휴……"

[[dialogue]]
speaker = "ジュエリー"
original = "「これは批評し難い性癖が出てきたな……」"
translation = "「이건 비평하기 힘든 성벽이 튀어나왔군……」"

[[dialogue]]
speaker = "ミネコ"
original = "「じゃあ次は、会長が探偵役でプレイする番ね♪\u3000私が助手になるから、一緒に極上の理不尽を味わおう<emoji=heart04>」"
translation = "「자, 다음은 회장님이 탐정 역으로 플레이할 차례야♪ 내가 조수가 될 테니까 같이 극상의 불합리를 맛보자<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "勝つのが目的じゃなくなってるんだけど！？"
translation = "이기는 게 목적이 아니게 됐는데!?"

[[dialogue]]
speaker = "ミネコ"
original = "「ジュエリー？\u3000ドン引きしてる場合じゃないよ！\u3000愛する助手がクソゲーに苦しめられるところ、見たくない？」"
translation = "「주얼리? 정색하고 있을 때가 아니야! 사랑하는 조수가 망겜에 괴로워하는 모습 보고 싶지 않아?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「助手の悔しがる顔……ごくり」"
translation = "「조수의 분해하는 얼굴…… 꿀꺽.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「――仕方ない。もう１度勝負してやろう、ミネコ」"
translation = "「──어쩔 수 없지. 한 번 더 승부해 주마, 미네코.」"

[[dialogue]]
speaker = "unk"
original = "ジュエリーさん！？"
translation = "주얼리 씨!?"

[[dialogue]]
speaker = "ミネコ"
original = "「ふっふっふっ♪\u3000さあ、クソゲーを思う存分楽しもう～！」"
translation = "「훗훗훗♪ 자, 망겜을 마음껏 즐겨보자고~!」"

[[dialogue]]
speaker = "unk"
original = "その後、理不尽なゲームバランスに阿鼻叫喚しながら、なんだかんだ繰り返しボードゲームを楽しむ俺たちなのだった――"
translation = "그 후 불합리한 게임 밸런스에 아비규환하면서도 이런저런 반복하며 보드게임을 즐기는 우리였다──"

