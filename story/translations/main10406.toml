[[dialogue]]
speaker = "unk"
original = "第６話,天国と地獄,B"
translation = "제6화, 천국과 지옥, B"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「ふふふ、読み通りです……ディーラーさんのバーストですね！」"
translation = "「후후후, 예상대로입니다…… 딜러님의 버스트네요!」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「おおお～！\u3000すごい、またウェンディさんの勝ち～！」"
translation = "「오오오~! 대단해, 또 웨디 씨가 이겼어~!」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「ねえねえ、どうしてディーラーさんがバーストするってわかったの？」"
translation = "「저기 저기, 어떻게 딜러님이 버스트할 줄 알았어?」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「確率の問題ですよ。すでに開かれたカードの枚数的に、絵札が配られる可能性は高かったですから」"
translation = "「확률 문제예요. 이미 오픈된 카드의 장수 상, 그림 카드가 배분될 가능성이 높았으니까요.」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「すごい！\u3000やっぱり数字に強い人がギャンブルに強いって本当なんだ！」"
translation = "「대단해! 역시 숫자에 강한 사람이 도박에 강하다는 건 진짜였구나!」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「ブラックジャックは特にそうかもしれませんね」"
translation = "「블랙잭은 특히 그럴지도 모르겠네요.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「ですが……まあ、今まで目を向けてなかったのですが、自分にこんな才能があったのかと驚いてます」"
translation = "「하지만…… 뭐, 지금까지 눈여겨보지 않았습니다만, 제게 이런 재능이 있었나 싶어 놀랍습니다.」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「よーし！\u3000このまま億万長者を目指して突っ走ろー♪」"
translation = "「좋아! 이대로 억만장자를 목표로 달려가자~♪」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「いえいえ、いけませんよ。勝利に酔って、冷静な判断を失っては」"
translation = "「아니 아니, 안 돼요. 승리에 취해 냉정한 판단을 잃어서는.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「ここで調子に乗ってしまうから、多くの者は結局損をしてしまうのです」"
translation = "「여기서 우쭐해져 버리기 때문에 많은 이들이 결국 손해를 보는 겁니다.」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「そっか～、さすがウェンディさんだね。じゃあ今日はここまでにしとくの？」"
translation = "「그렇구나~, 역시 웨디 씨네. 그럼 오늘은 여기까지 할 거야?」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「……いえ、あと一回だけ様子を見ましょう」"
translation = "「……아니요, 딱 한 번만 더 상황을 보죠.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「何となく次も、いける気がするんです♪」"
translation = "「왠지 다음도 될 것 같은 기분이 들거든요♪」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「おお～、ウェンディさんなら行ける！\u3000やっちゃえやっちゃえ～♪」"
translation = "「오오~, 웨디 씨라면 할 수 있어! 해버려 해버려~♪」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "（ギャンブルは数字に強い人間が強い、ですか……確かにその通りですね）"
translation = "（도박은 숫자에 강한 인간이 강하다, 인가요…… 확실히 그렇군요.）"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "（ゲームに使用されているカードの枚数は２パックの１０４枚）"
translation = "（게임에 사용되는 카드의 장수는 2팩인 104장.）"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "（つまりゲームが進めば進むほど、次のカードを予想しやすくなる）"
translation = "（즉 게임이 진행되면 진행될수록 다음 카드를 예상하기 쉬워진다.）"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "（カードカウンティングという技術があるそうですが、私ならばそれをもっと高い精度で実行できる）"
translation = "（카드 카운팅이라는 기술이 있다고 합니다만, 저라면 그것을 훨씬 높은 정밀도로 실행할 수 있습니다.）"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "（今までに使用された全てのカードの枚数を記憶していれば、次に引くカードの確率をより正確にはじき出せる）"
translation = "（지금까지 사용된 모든 카드의 장수를 기억하고 있다면, 다음에 뽑을 카드의 확률을 더 정확하게 산출해낼 수 있죠.）"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "（ほんのお遊びで、ネビュラの資金の足しになるほどではありませんが、でも……）"
translation = "（그저 가벼운 놀이일 뿐이라 네뷸라의 자금에 보탬이 될 정도는 아닙니다만, 그래도……）"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "（あぁ……お金が増えるのって、キモチイイ……<emoji=heart04><emoji=heart04><emoji=heart04>）"
translation = "（아아…… 돈이 늘어난다는 건, 기분 좋아……<emoji=heart04><emoji=heart04><emoji=heart04>）"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「たはは、こりゃまた珍しいメンバーに会うもんだねぇ」"
translation = "「타하하, 이거 참 희한한 멤버를 다 만나네.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「な……！？\u3000ツェツィーリエ！？」"
translation = "「나……!? 체칠리에!?」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「わ～♪\u3000ツェツィも遊びに来たの？」"
translation = "「와~♪ 체칠도 놀러 왔어?」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「そうそう。アイデア探しに街をぶらぶらしてたら、面白そうな建物があったんで入ってみたんだよ」"
translation = "「그래그래. 아이디어 찾으러 거리 좀 돌아다니다가 재밌어 보이는 건물이 있길래 들어와 봤지.」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「に、しても……」"
translation = "「그건 그렇고……」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「他人には節約節約言ってるクセに、自分はこんなところで豪遊してるんだね～、ニヤニヤ♪」"
translation = "「남들한테는 절약 절약 노래를 부르면서, 자기는 이런 데서 호화롭게 놀고 있었네~, 히죽히죽♪」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「ち、違います！\u3000これは本当に今日、たまたま……」"
translation = "「티, 틀립니다! 이건 정말 오늘 어쩌다가……」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「別に悪いことしてるわけじゃないんだから、そんなに慌てなくてもいいでしょ」"
translation = "「딱히 나쁜 짓 하는 것도 아닌데 그렇게 당황할 것 없잖아.」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「ウェンディさん凄いんだよ、さっきからずっと勝ちまくりなんだから♪」"
translation = "「웨디 씨 대단하다구, 아까부터 계속 이기기만 하거든♪」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「そーなのね。じゃ、その幸運にアタシもあやからせてもらおうかなっと」"
translation = "「그래애? 그럼 그 행운에 나도 좀 숟가락 좀 얹어볼까나.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「同じテーブルで遊ぶつもりですか？」"
translation = "「같은 테이블에서 놀 생각인가요?」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「ふんふん……ブラックジャックね。カードを引いて２１に近い数字を作ればいいわけだ」"
translation = "「흠흠…… 블랙잭이네. 카드를 뽑아서 21에 가까운 숫자를 만들면 되는 거지.」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「そうだよ～。でも数字が２１をオーバーしたらバーストっていって負けになっちゃうの」"
translation = "「맞아~. 하지만 숫자가 21을 넘기면 버스트라고 해서 지게 돼.」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「あとね、絵札は全部１０点扱いで、『Ａ』は１点としても１１点としても使えるよ」"
translation = "「그리고 그림 카드는 전부 10점 취급이고, 『A』는 1점으로도 11점으로도 쓸 수 있어.」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「あんがと、だいたいルールは分かった」"
translation = "「고마워, 대충 룰은 알겠어.」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「ツェツィ、ファイト～♪」"
translation = "「체칠, 화이팅~♪」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "（何でしょう……なんだか猛烈に、嫌な予感がします……）"
translation = "（무슨 일일까요…… 왠지 강렬하게 불길한 예감이 듭니다……）"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「おー、また勝った。結構、勝てるもんだねぇ」"
translation = "「오ー, 또 이겼다. 제법 잘 벌리네.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「く……何故……」"
translation = "「큭…… 어째서……」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「ツェツィも凄いよ～！\u3000ウェンディさんも負けるな～！」"
translation = "「체칠도 대단해~! 웨디 씨도 지지 마~!」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「だ、大丈夫です。確率の勝負なのですから、時には裏を引くことだってあります！」"
translation = "「괘, 괜찮습니다. 확률 싸움이니까 가끔은 꽝을 뽑을 때도 있는 법이에요!」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「へ～、じゃあウェンディって結構、運が悪いってことなんだね」"
translation = "「헤~, 그럼 웨디는 제법 운이 없다는 거네.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「少し黙っていてください！\u3000集中が乱れます！」"
translation = "「잠자코 좀 있으세요! 집중력이 흐트러집니다!」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「はーい♪」"
translation = "「네에~♪」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "（山札も半分近くが消費されました。そろそろ山札が交換されるタイミングですね）"
translation = "（카드 덱도 절반 가까이 소비되었습니다. 슬슬 덱이 교체될 타이밍이군요.）"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "（私のハンドは『６』と『４』の１０点。オープンになっているディーラーのカードは『７』）"
translation = "（제 핸드는 『6』과 『4』로 10점. 오픈되어 있는 딜러의 카드는 『7』.）"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "（『Ａ』を引ければ２１点で負けはなくなりますし、好都合なことにその『Ａ』は山にまるまる残っています）"
translation = "（『A』를 뽑으면 21점으로 패배할 일이 없어지고, 다행히 그 『A』는 덱에 고스란히 남아 있습니다.）"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "（８枚もあれば『Ａ』を引ける可能性はかなり高い……勝算は十分でしょう）"
translation = "（8장이나 있으면 『A』를 뽑을 가능성은 상당히 높죠…… 승산은 충분합니다.）"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「うーん……」"
translation = "「으음……」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "（ツェツィーリエ、何を悩んでいるんでしょう？\u3000ハンドは『３』と『５』の８点だから間違いなくヒットでしょうに）"
translation = "（체칠리에, 뭘 고민하는 거죠? 핸드는 『3』과 『5』로 8점이니까 틀림없이 히트일 텐데.）"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「ヒット～♪」"
translation = "「히트~♪」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "（う、『Ａ』を引かれましたか……。仕方ありません、まだ７枚残っていますし、それを引けることに期待しましょう）"
translation = "（으, 『A』를 뽑아갔나요……. 어쩔 수 없죠, 아직 7장 남아있으니 그걸 뽑기를 기대해 봅시다.）"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "（１１点加算して１９点、ツェツィーリエはスタンドですね──）"
translation = "（11점 가산해서 19점, 체칠리에는 스탠드겠네요──）"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「ヒット～♪」"
translation = "「히트~♪」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「は！？」"
translation = "「하아!?」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「ん、どしたの？」"
translation = "「응, 왜 그래?」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「１９点ですよ！？\u3000どうしてヒットなんですか！！」"
translation = "「19점이라구요!? 어째서 히트인 건가요!!」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「ん～、何となくなんだよね～。ダメなの？」"
translation = "「음~, 왠지 그런 기분이 들었거든~. 안 돼?」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「だ、ダメではありませんけど……」"
translation = "「아, 안 되는 건 아니지만……」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「じゃいいじゃん、ヒット～♪」"
translation = "「그럼 됐잖아, 히트~♪」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「な……！？\u3000また『Ａ』！？」"
translation = "「나……!? 또 『A』!?」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "（『Ａ』を１点として加算して２０点……ぐぅぅ、貴重な『Ａ』を浪費して……）"
translation = "（『A』를 1점으로 가산해서 20점…… 구우우, 귀중한 『A』를 낭비하다니……）"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "（浪費、浪費、浪費っ！\u3000あぁあああっ、私がいっちばん嫌いな言葉ですっ！！！！）"
translation = "（낭비, 낭비, 낭비! 아아아아악, 제가 가~장 싫어하는 말이에요!!!!）"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「もいっかいヒット～♪」"
translation = "「한 번 더 히트~♪」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「はぁああああ！！！？\u3000何でぇえええ！？！？」"
translation = "「하아아아아아!!!? 어째서어어어어!?!?」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「ん～、何となく♪」"
translation = "「음~, 왠지♪」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「２０点なんですよ！\u3000『Ａ』を引けないと２１をオーバーしちゃうんですよ！\u3000どう考えてもスタンドでしょう？」"
translation = "「20점이라구요! 『A』를 뽑지 못하면 21을 오버해 버린단 말이에요! 아무리 생각해도 스탠드잖아요?」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「でもさ～、カードをいっぱい引けた方が楽しいよね～」"
translation = "「그치만 말야~, 카드를 잔뜩 뽑는 편이 더 즐겁잖아~」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「すごーい、ツェツィ！\u3000これが魅せるプレイってやつだね？」"
translation = "「대단해, 체칠! 이게 바로 보여주는 플레이라는 거네?」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「たはは、そーいうことよ～♪」"
translation = "「타하하, 바로 그거야~♪」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「こっちはいい迷惑です！！！」"
translation = "「이쪽은 민폐라구요!!!」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「さあ、お次のカードは……あらら、『２』だって。残念」"
translation = "「자아, 다음 카드는…… 어라라, 『2』네. 아쉽다」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「当然ですよ！\u3000せっかくほぼ勝ち確定だったのに……これであなたの点数は１２点です」"
translation = "「당연하죠! 어렵사리 거의 승리 확정이었는데…… 이걸로 당신의 점수는 12점이에요」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「１２点か～、じゃあ、もっと引きまくれるってことね」"
translation = "「12점인가~, 그럼 더 마음껏 뽑을 수 있다는 소리네」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「ヒット～♪\u3000ヒット～♪\u3000もいっかいおまけにヒット～♪」"
translation = "「히트~♪ 히트~♪ 한 번 더 덤으로 히트~♪」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「そ、そんな馬鹿なこと……」"
translation = "「그, 그런 바보 같은 짓을……」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「２０点かー。もう山に『Ａ』は残ってないし、これでスタンドかな。はい、次はウェンディの番だよ」"
translation = "「20점인가ー. 이제 덱에 『A』는 안 남았고, 이걸로 스탠드일까나. 자, 다음은 웨디 차례야」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「く……」"
translation = "「큭……」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "（無駄にカードを引きまくって、『Ａ』を全部持っていくなんて……！）"
translation = "（무의미하게 카드를 마구 뽑아서, 『A』를 전부 가져가 버리다니……!）"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「どうするの、ウェンディさん」"
translation = "「어떻게 할 거야, 웨디 씨」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「ヒット……です……」"
translation = "「히트…… 입니다……」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "（……引いてきたカードは『５』。フラットな確率で考えれば、もう一度ヒットでしょう……）"
translation = "（……뽑아온 카드는 『5』. 평범한 확률로 생각하면, 한 번 더 히트겠죠……）"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "（そう……フラットな確率ならばヒット。けれど残りのカードは──）"
translation = "（그래…… 평범한 확률이라면 히트. 하지만 남은 카드는──）"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "（『Ａ』が０、『２』が１、『３』が３、『４』が２、『５』が４、『６』が１、『７』が６、『８』が６、『９』が４、『１０』が６、『Ｊ』『Ｑ』『Ｋ』が５、７、５――）"
translation = "（『A』가 0, 『2』가 1, 『3』이 3, 『4』가 2, 『5』가 4, 『6』이 1, 『7』이 6, 『8』이 6, 『9』가 4, 『10』이 6, 『J』『Q』『K』가 5, 7, 5――）"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "（２１点内に収まる『２』～『６』のカードを引ける確率は２２％）"
translation = "（21점 이내로 들어오는 『2』~『6』 카드를 뽑을 확률은 22%）"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "（となると確率的には、バースト回避でスタンドの方がいいのでしょう。勝負するには危う過ぎる……ここはスタンドが当然……）"
translation = "（그렇게 되면 확률적으로는, 버스트 회피를 위해 스탠드인 편이 낫겠죠. 승부하기엔 너무 위험해…… 여기선 스탠드가 당연……）"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「どうするの、ウェンディさん？」"
translation = "「어떻게 할 거야, 웨디 씨?」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「……スタン――」"
translation = "「……스탠――」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「～～～♪」"
translation = "「～～～♪」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「く……！！」"
translation = "「큭……!!」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "（さっきのメチャクチャな引き。狙ってのことではないでしょう……）"
translation = "（방금 전의 엉망진창인 드로우. 노린 건 아니겠죠……）"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "（けれどどうして、さっきから――ツェツィーリエの挑発するような笑みが離れないんですか！）"
translation = "（하지만 어째서, 아까부터── 체칠리에의 도발하는 듯한 미소가 머릿속을 떠나지 않는 건가요!）"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "（それが……それが――）"
translation = "（그게…… 그게──）"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「どうしても気に障るんですよっ！！！\u3000ヒットですっ！！！」"
translation = "「도저히 거슬려서 못 참겠단 말이에요!!! 히트입니다!!!」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「おお～！\u3000いったね～」"
translation = "「오오~! 질렀네~」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「ワクワク♪」"
translation = "「두근두근♪」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「……………………『６』……２１点、です……」"
translation = "「……………………『6』…… 21점, 입니다……」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「やったー！\u3000やったよウェンディさん！！」"
translation = "「해냈다! 해냈어 웨디 씨!!」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「は……はは……ははは……」"
translation = "「하…… 하하…… 하하하……」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「スタンドにしかけてやめてヒットにしたみたいだけど、ウェンディさん的には何かあったの？」"
translation = "「스탠드 하려다 말고 히트로 바꾼 것 같은데, 웨디 씨 나름대로 무슨 일 있었어?」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「本当は……バーストの危険性が、かなり高かったんですけど……」"
translation = "「사실은…… 버스트의 위험성이 상당히 높았습니다만……」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「でも、確率を超えた何かを感じ取ったので……勝負しました」"
translation = "「하지만, 확률을 초월한 무언가를 느꼈기에…… 승부했습니다」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「いいね～、そういうの好きだよ～♪」"
translation = "「좋네~, 그런 거 좋아해~♪」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「ウェンディのことちょっと見直しちゃったな。こんな痺れるような勝負が出来るんだって」"
translation = "「웨디를 조금 다시 보게 됐는걸. 이런 짜릿한 승부를 할 수 있다니」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「ほんのり上から目線なのがやっぱり気に食わないのですが……でもまあ、面白い勝負でしたよ」"
translation = "「은근히 위에서 내려다보는 말투가 역시 마음에 안 듭니다만…… 뭐, 재미있는 승부였어요」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「勝った気になるのは早いのではないか？\u3000まだディーラーのカードがオープンになっていないだろう？」"
translation = "「이겼다고 생각하기엔 이르지 않나? 아직 딜러의 카드가 오픈되지 않았을 텐데?」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「そうですね、ドローの可能性はあります！\u3000ではディーラー、伏せられたカードのオープンを……って、あれ？」"
translation = "「그렇네요, 드로우 가능성은 있습니다! 그럼 딜러, 엎어둔 카드를 오픈을…… 어, 어라?」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ずいぶんと盛り上がっていたようだな」"
translation = "「꽤나 분위기가 달아올랐던 모양이군」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「せせせ、セドナ長官っ！！！？」"
translation = "「세세세, 세드나 장관님!!!?」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「たはは、これまた珍しいねぇ。長官も遊びに来たんですか？」"
translation = "「타하하, 이거 또 희한하네. 장관님도 놀러 오셨나요?」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「そんなわけないでしょう！」"
translation = "「그럴 리가 없잖아요!」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「カジノでバカ勝ちしている者がいると聞いて来てみたが、貴殿の組織の娘であったか」"
translation = "「카지노에서 엄청나게 따고 있는 자가 있다는 소문을 듣고 와 보았다만, 귀공의 조직 아이들이었나」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「先ほどの勝負、一部始終を見させてもらったぞ。我がカジノの歴史に残るほどの名勝負であった！」"
translation = "「방금 전의 승부, 처음부터 끝까지 지켜보았다. 우리 카지노 역사에 남을 만한 명승부였느니라!」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「あ、あなたは……？\u3000我がカジノって、ここのオーナー……ということは……」"
translation = "「다, 당신은……? 우리 카지노라니, 여기 오너…… 그렇다는 건……」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「うむ、お察しの通りだ！」"
translation = "「음, 짐작한 대로다!」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「立てばプリティ、座ればゴージャス。カジノオーナーにして九浄家二十六代目当主・九浄ヘレナちゃんとは、私のことであるっ！」"
translation = "「서면 프리티, 앉으면 고저스. 카지노 오너이자 쿠죠 가 26대 당주·쿠죠 헬레나짱이란, 바로 나를 말함이니라!」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「うわー、すっごいヒト、出てきちゃった……」"
translation = "「우와ー, 엄청난 사람, 나와 버렸다……」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「こんにちは～♪\u3000カジノ、楽しませてもらってるよん♪」"
translation = "「안녕~♪ 카지노, 즐겁게 이용하고 있어용♪」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「うむうむ、それは結構！」"
translation = "「음음, 그거 좋구나!」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「ば、バカっ！\u3000どこまで怖いもの知らずなんですか、あなたは！」"
translation = "「바, 바보! 어디까지 겁이 없는 건가요, 당신은!」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「え～」"
translation = "「에~」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ウェンディ」"
translation = "「웨디」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「ひゃいっ！！」"
translation = "「히익!!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「時には息抜きもいいだろう。だがあまり熱くなりすぎるなよ」"
translation = "「때로는 휴식도 좋겠지. 하지만 너무 열중하지는 마라」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「りょ、了解でありますっ！\u3000さ！\u3000アイリーン、ツェツィーリエ！\u3000帰りますよっ！」"
translation = "「라, 라져입니다! 자! 아이린, 체칠리에! 돌아가요!」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「わわわ、ちょっと待ってよ！\u3000まだ勝負の途中だし、配当も貰ってないからーっ！！」"
translation = "「와와와, 잠깐 기다려 봐! 아직 승부 도중이고, 배당금도 못 받았단 말야ー!」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「お先に失礼しまーす♪」"
translation = "「먼저 실례하겠습니다~♪」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「咎めるつもりはなかったのだがな……この場を捨て行くとは」"
translation = "「나무랄 생각은 없었다만…… 이 자리를 버리고 가다니」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「部下が失礼をした、申し訳ない」"
translation = "「부하가 실례를 범했다, 미안하군」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「なんの、気にせずともよい」"
translation = "「아니라, 신경 쓰지 않아도 좋다」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「この不始末は私が引き継ごう……さあディーラー、その伏せられたカードをめくってくれ」"
translation = "「이 뒤처리는 내가 인계받지…… 자 딜러, 그 엎어둔 카드를 넘겨주게」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「……………………」"
translation = "「……………………」"

