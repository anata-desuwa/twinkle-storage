[[dialogue]]
speaker = "unk"
original = "第４話,魔王と光の魔女,P"
translation = "제4화, 마왕과 빛의 마녀, P"

[[dialogue]]
speaker = "unk"
original = "ある冬の日──"
translation = "어느 겨울날──"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「うー寒い寒い……しかし、この環境にもなんとか慣れてきたぞ」"
translation = "「우우 추워 추워…… 하지만 이 환경에도 어떻게든 익숙해졌느니라」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「魔王のくれたカイロもぽっかぽかだ！\u3000うぅ、余はもうこれが手放せん体になってしまった……」"
translation = "「마왕이 준 핫팩도 뜨끈뜨끈하구나! 으으, 여는 이제 이것 없이는 살 수 없는 몸이 되어버렸느니라……」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「──ああっ、困りました困りました！\u3000急がないと……！」"
translation = "「──아앗, 큰일 났어요 큰일 났어! 서두르지 않으면……!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「む……ウェンディ？\u3000どうしたのだ」"
translation = "「음…… 웬디? 무슨 일이냐」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「──あ、クラウディア様！\u3000実は完成したばかりの資料が、輸送中、モンスターに襲われちゃったらしくって」"
translation = "「──아, 클라우디아 님! 사실 방금 완성된 자료가 수송 중에 몬스터에게 습격당해 버린 모양이라서요」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「急いでこの新しい資料を学園に届けなくちゃならないんです！\u3000では、失礼します～！」"
translation = "「서둘러 이 새로운 자료를 학원에 전달해야 해요! 그럼 실례하겠습니다~!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「とらぶるか。それにしても、まったくウェンディときたらいつも慌てておるのう」"
translation = "「트러블인가. 그나저나 정말이지 웬디는 언제나 당황하고 있구나」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「少しは余を見習って堂々と落ち着いておればよいのだ！\u3000なあ？」"
translation = "「조금은 여를 본받아 당당하고 침착하게 있으면 될 것을! 그렇지?」"

[[dialogue]]
speaker = "unk"
original = "ネビュラが立ち行かない"
translation = "네뷸라가 돌아가지 않아"

[[dialogue]]
speaker = "unk"
original = "みんながその調子だと"
translation = "모두가 그 모양이면"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「はっはっは、それを言うでない。ドンと構えていればなんとかなるというものだ」"
translation = "「핫핫하, 그런 말 말거라. 떡 하니 버티고 있으면 어떻게든 되는 법이니라」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「しかし、魔女がこうも堂々と外界を出歩く日がくるとは……ふふ、すっかり馴染んでおるな」"
translation = "「하지만 마녀가 이렇게도 당당하게 바깥세상을 나다니는 날이 올 줄이야…… 후후, 완전히 녹아들었구나」"

[[dialogue]]
speaker = "unk"
original = "クラウディアのおかげ"
translation = "클라우디아 덕분이야"

[[dialogue]]
speaker = "unk"
original = "今までじゃ考えられなかった"
translation = "전까지는 생각도 못 했어"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ん？\u3000ああ、知っていたのか」"
translation = "「응? 아아, 알고 있었느냐」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「そうだ。ネビュラに開国を──と求めたのはもとより余でな」"
translation = "「그렇다. 네뷸라에 개국을── 요구한 것은 원래 여였으니 말이다」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「これでせっかく好きに出歩けると思っていたのに、その当人がまだ監視されるはめになるというのは計算外だったが……」"
translation = "「이것으로 마음껏 나다닐 수 있을 거라 생각했거늘, 정작 당사자가 아직 감시받는 신세가 된다는 것은 계산 밖이었다만……」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ともかくネビュラは今、新しい道を切り拓こうとしておる」"
translation = "「어찌 됐든 네뷸라는 지금, 새로운 길을 개척하려 하고 있느니라」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「余もそうだ。余の役目はずっと……グレートウォール計画を成功させるためのものであった」"
translation = "「여도 마찬가지니라. 여의 역할은 줄곧…… 그레이트 월 계획을 성공시키기 위한 것이었지」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「だが、今はもうその役目はなくなってしまった。そして、役目の無くなった世界はこれから先も続いていく」"
translation = "「하지만, 이제 그 역할은 사라지고 말았느니라. 그리고 역할이 없어진 세계는 앞으로도 계속 이어져 가겠지」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「余が当代唯一の光の魔女というのには変わりない。だが、これからはそれに加えてネビュラ総帥としての在り方を模索しなくてはならん」"
translation = "「여가 당대 유일한 빛의 마녀라는 사실에는 변함이 없느니라. 하지만, 이제부터는 그에 더해 네뷸라 총수로서의 존재 방식을 모색해야만 하느니라」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「開国は、その一歩だ。魔女の常識を打ち破らねば、先には進めんと思ってな」"
translation = "「개국은 그 첫걸음이니라. 마녀의 상식Object를 타파하지 않으면, 앞으로 나아갈 수 없다고 생각해서 말이다」"

[[dialogue]]
speaker = "unk"
original = "色々考えてたんだな"
translation = "여러 가지로 생각하고 있었구나"

[[dialogue]]
speaker = "unk"
original = "クラウディアなりに……"
translation = "클라우디아 나름대로……"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ふふん。余とて捨てたものではなかろう？」"
translation = "「후훙. 여라고 해서 버린 몸은 아니지 않느냐?」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「とはいえ……いざ道を切り拓いても、この先をどう進むべきかは未だ悩ましい」"
translation = "「그렇다고는 해도…… 막상 길을 개척했어도, 이 앞을 어떻게 나아가야 할지는 여전히 고민스럽구나」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「セドナも忙しなさそうに動いておるし、余だけで何もかも決められるわけではない」"
translation = "「세드나도 분주하게 움직이고 있고, 여 혼자서 모든 것을 결정할 수 있는 것도 아니니 말이다」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「となれば、いつも余の隣にいて、共に導いてくれる存在が欲しいものだ」"
translation = "「그렇게 되면, 언제나 여의 곁에 머물며 함께 이끌어 줄 존재가 갖고 싶어지는 법이지」"

[[dialogue]]
speaker = "unk"
original = "俺のこと？"
translation = "내 이야기야?"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「──無論だ！\u3000余と相思相愛、唯一無二のぱーとなー！」"
translation = "「──물론이다! 여와 상사상애, 유일무이한 파트너!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「光の魔女と魔王だぞ？\u3000まさに最強無敵のカップリングではないか！\u3000余らが揃えば、何が起きても平気だと思えるのだ」"
translation = "「빛의 마녀와 마왕이라구? 그야말로 최강무적의 커플링이 아니더냐! 여들이 함께라면 무엇이 일어나도 괜찮을 것만 같느니라」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「これからの未来も共に歩んでいこうぞ、魔王！」"
translation = "「앞으로의 미래도 함께 걸어가자꾸나, 마왕!」"

[[dialogue]]
speaker = "unk"
original = "これから待ち受ける冒険に向けて、いつまでも共にと誓い合う俺たちだった……。"
translation = "앞으로 기다리고 있을 모험을 향해, 언제까지나 함께할 것을 맹세하는 우리였다……."

