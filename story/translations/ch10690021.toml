[[dialogue]]
speaker = "unk"
original = "第１話,セシアの明るい家族計画,P"
translation = "제1화, 세시아의 밝은 가족 계획, P"

[[dialogue]]
speaker = "unk"
original = "以前、セシアと初めてのデートに出かけた日から、しばらくして――"
translation = "이전, 세시아와 첫 데이트를 나갔던 날로부터 며칠이 지나──"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「会長、お待ちどおさま」"
translation = "「회장님, 오래 기다리셨어요」"

[[dialogue]]
speaker = "unk"
original = "とある週末、俺はセシアに招かれて、新星寮へとやって来ていた。"
translation = "어느 주말, 나는 세시아의 초대를 받아 신성료로 찾아왔다."

[[dialogue]]
speaker = "unk"
original = "何やら、今日はセシアが手作り料理を披露してくれるとのことで――"
translation = "무슨 일인지 오늘은 세시아가 직접 만든 요리를 선보여 주겠다고 해서──"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「じゃ～ん♪\u3000旗付きチキンライスよ♪」"
translation = "「짜잔♪ 깃발이 꽂힌 치킨라이스예요♪」"

[[dialogue]]
speaker = "unk"
original = "おおっ、すごい！\u3000これをセシアが！？"
translation = "오오, 대단해! 이걸 세시아가!?"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ええ。紅明ママに料理を教わって、作ったの♪」"
translation = "「네. 코우메이 마마에게 요리를 배워서 만들었어요♪」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「おうよ☆\u3000ふっふっふ、アタシはこう見えてちゃんと、料理ができるんだぜ、ダーリン♪\u3000『昔取った<ruby>杵柄<rt>きねづか</rt></ruby>』ってやつで♪」"
translation = "「그럼☆ 훗훗훗, 나 이래 봬도 제대로 요리할 줄 안다구, 달링♪ 『서당 개 삼 년에 풍월 읊는다』는 거라구♪」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「セッシーもさすが『蓄積』を司る『守護天使』なだけあるよ。アタシが教えたこと、１回ですんなり覚えちゃうんだから♪\u3000いいこいいこ♪」"
translation = "「세시도 역시 『축적』을 관장하는 『수호천사』답네. 내가 가르쳐준 거 한 번에 쓱 외워버리니까 말야♪ 착하다 착해♪」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「えへへ～♪\u3000紅明ママに褒められちゃった<emoji=heart04>」"
translation = "「에헤헤~♪ 코우메이 마마한테 칭찬받았다<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「そういうわけで、会長。冷めない内に、どうぞ召し上がれ♪」"
translation = "「그런 고로 회장님. 식기 전에 어서 드세요♪」"

[[dialogue]]
speaker = "unk"
original = "俺は「いただきます」と手を合わせて、チキンライスを食べる。"
translation = "나는 「잘 먹겠습니다」라며 손을 모으고 치킨라이스를 먹는다."

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「――お味は……どうかしら？」"
translation = "「──맛은…… 어떤가요?」"

[[dialogue]]
speaker = "unk"
original = "うまい！"
translation = "맛있어!"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「……！\u3000えへへ♪\u3000よかった♪\u3000わたくし、とっても嬉しいわ♪」"
translation = "「……! 에헤헤♪ 다행이다♪ 저, 정말 기뻐요♪」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「やったな、セッシー！\u3000ダーリンの胃袋をハートキャッチだぜ☆\u3000イェーイ！」"
translation = "「해냈네, 세시! 달링의 위장을 하트 캐치라구☆ 예이!」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「いぇーいっ♪」"
translation = "「예이~♪」"

[[dialogue]]
speaker = "unk"
original = "セシアは可愛くぴょんと跳ねて、紅明をハイタッチをする。"
translation = "세시아는 귀엽게 뿅 하고 뛰며 코우메이와 하이파이브를 한다."

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「それで、会長――わたくしと恋人として、お付き合いしてくれる気になったかしら？」"
translation = "「그래서 회장님── 저랑 연인으로서 사귀어 줄 마음이 생겼나요?」"

[[dialogue]]
speaker = "unk"
original = "！？\u3000ゴホッ……ゴホッ……！"
translation = "!? 컥…… 컥……!"

[[dialogue]]
speaker = "unk"
original = "チキンライスを食べている途中で、思わずむせてしまう。"
translation = "치킨라이스를 먹던 도중, 나도 모르게 사레가 들리고 말았다."

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「？\u3000どうしてそんなに、驚いた顔をするの？」"
translation = "「? 왜 그렇게 놀란 표정을 짓나요?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「この前、わたくしと初めてデートをした時にも、伝えたじゃない？」"
translation = "「저번에 저랑 처음 데이트했을 때도 말했잖아요?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「会長と、これから恋人として恋愛を体験していきたい、って」"
translation = "「회장님이랑 앞으로 연인으로서 연애를 체험해 가고 싶다고」"

[[dialogue]]
speaker = "unk"
original = "た、確かに言われたけども……"
translation = "확실히 듣긴 했지만……"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「どうやら、その様子を見るに、心の準備はまだできていないみたいね」"
translation = "「아무래도 그 모습을 보니 마음의 준비가 아직 안 된 모양이네요」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「わたくし、この前のデートで気づいたの」"
translation = "「저, 저번 데이트에서 깨달았어요」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「わたくしは会長と恋人になる準備ができているのに、あなたがまだそのつもりじゃないのは、なんだか『とても寂しい』って」"
translation = "「저는 회장님이랑 연인이 될 준비가 됐는데, 당신이 아직 그럴 마음이 아니라는 건 왠지 『무척 외롭다』고」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「だから、早く心の準備をしてもらえるように、会長からのプラスポイントを『蓄積』することにしたのよ」"
translation = "「그래서 빨리 마음의 준비를 할 수 있도록, 회장님으로부터의 플러스 포인트를 『축적』하기로 한 거예요」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「要するに、セッシーが実はダーリンに対して片想いだったことが判明したんで――」"
translation = "「요컨대 세시가 사실은 달링에 대해 짝사랑이었다는 게 판명돼서──」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「自分のことを好きになってもらおうと、『好感度』を上げる為に猛烈アプローチ中、ってわけだな☆」"
translation = "「자기를 좋아하게 만들려고 『호감도』를 올리기 위해 맹렬하게 어프로치 중이라는 거지☆」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ただ……」"
translation = "「다만……」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「わたくしがもし、勝手に勘違いしているだけだったらと、不安なことが１つあって……」"
translation = "「제가 혹시 마음대로 착각하고 있는 것뿐이라면 어쩌나 하고, 불안한 게 하나 있어서……」"

[[dialogue]]
speaker = "unk"
original = "不安なこととは何だろうかと俺が首を傾げていると、セシアは両手の指を突き合わせて、もじもじさせながら――"
translation = "불안한 게 뭘까 하고 내가 고개를 갸웃거리고 있자, 세시아는 양손 검지를 맞대고 꼼지락거리며──"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「会長がわたくしのこと、そもそも女の子として全く好きじゃなかったりしたら、どうしようって……」"
translation = "「회장님이 저를 애초에 여자애로서 전혀 좋아하지 않는다면 어떡하지 하고……」"

[[dialogue]]
speaker = "unk"
original = "それは絶対にない！"
translation = "그럴 리 없어!"

[[dialogue]]
speaker = "unk"
original = "俺がセシアを嫌いなわけがない。それだけは、迷わず即答することができた。"
translation = "내가 세시아를 싫어할 리가 없다. 그것만큼은 망설임 없이 즉답할 수 있었다."

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「よかった……♪\u3000ならわたくし、会長の迷惑にはなっていないのね」"
translation = "「다행이다……♪ 그럼 전 회장님께 민폐가 되지 않는 거군요」"

[[dialogue]]
speaker = "unk"
original = "もちろんだ、と頷く。"
translation = "물론이지, 하고 고개를 끄덕인다."

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ふふっ、ダーリンならそう言うと思ってたぜ♪\u3000これでみんな仲良し『ハッピーハーレム』に１歩前進だな、セッシー！」"
translation = "「후후, 달링이라면 그렇게 말할 줄 알았어♪ 이걸로 모두 사이좋은 『해피 하렘』에 한 걸음 전진이네, 세시!」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「うん♪\u3000紅明ママ♪」"
translation = "「응♪ 코우메이 마마♪」"

[[dialogue]]
speaker = "unk"
original = "とんでもない言葉が聞こえたんだけど！？"
translation = "말도 안 되는 소리가 들린 것 같은데!?"

[[dialogue]]
speaker = "unk"
original = "ちょっと待って！\u3000なんか今、"
translation = "잠깐만! 방금 뭔가,"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「え？\u3000『ハッピーハーレム』のこと？」"
translation = "「어? 『해피 하렘』 말이야?」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ふっふっふ、説明しよう。ぶっちゃけ、ダーリンはこれまで出会った女の子たちから全員、好意を向けられてもおかしくないくらいモテるじゃろ？」"
translation = "「훗훗훗, 설명해주지. 솔직히 달링은 지금까지 만난 여자애들 전부한테 호감을 사도 이상하지 않을 정도로 인기 많잖아?」"

[[dialogue]]
speaker = "unk"
original = "そ、それはどうかわからないけど……"
translation = "그, 그건 어떨지 모르겠지만……"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んモー、またまた～♪\u3000まぁ、そういう謙虚なところがまた好きなんだけどね<emoji=heart04>」"
translation = "「정마알, 또 그런다~♪ 뭐, 그런 겸손한 점이 또 좋지만 말야<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「会長は素敵な男性だと思うわ。初めての恋人を作るなら会長がいいって、わたくしも思ったもの」"
translation = "「회장님은 멋진 남성이라고 생각해요. 첫 연인을 만든다면 회장님이 좋겠다고 저도 생각했는걸요」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「うんうん♪\u3000それで少なくとも、このままだとアタシとセッシーがダーリンを取り合って、ドロドロの昼ドラ展開を繰り広げることになってしまう」"
translation = "「응응♪ 그래서 적어도 이대로라면 나랑 세시가 달링을 두고 싸워서 질척질척한 낮 드라마 전개를 펼치게 되고 말아」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「仲良い子とそんな風になるのは、やっぱ嫌じゃん？\u3000それでアタシは考えた。みんな笑顔でハッピーな将来を目指すなら――」"
translation = "「친한 애랑 그렇게 되는 건 역시 싫잖아? 그래서 난 생각했지. 모두 웃는 얼굴로 행복한 미래를 목표로 한다면──」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ズバリ、ハーレムしかないっしょ☆\u3000ってね！\u3000な？\u3000セッシー♪」"
translation = "「정답은 하렘밖에 없잖아☆ 라는 거지! 그치? 세시♪」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「うん♪」"
translation = "「응♪」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「わたくしも、紅明ママの考えを聞いて大賛成だったわ。だって――」"
translation = "「저도 코우메이 마마의 생각을 듣고 대찬성이었어요. 왜냐면──」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ハーレムなら、会長との家庭を築きつつ、沢山のママと一緒に暮らせるわけでしょう？\u3000それって、これ以上ないくらい、とっても素敵なことだもの♪」"
translation = "「하렘이라면 회장님과 가정을 꾸리면서 많은 마마와 함께 살 수 있는 거잖아요? 그건 더할 나위 없이 정말 멋진 일인걸요♪」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「というわけで、ダーリンとセッシーの仲はアタシも全力で応援して行くから、よろしくな！\u3000ダーリン☆」"
translation = "「그런 고로 달링과 세시 사이는 나도 전력으로 응원해 갈 테니까 잘 부탁해! 달링☆」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「あっ、もちろんアタシとの仲もね♪\u3000んふっ<emoji=heart04>」"
translation = "「앗, 물론 나랑 사이도 말야♪ 응훗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言って、俺の腕に抱き着き豊かな胸を押し付けて来る紅明。"
translation = "그렇게 말하며 내 팔에 매달려 풍만한 가슴을 밀어붙여 오는 코우메이."

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「素敵な<ruby>未来<rt>ハーレム</rt></ruby>を目指して、一緒に過程を蓄積して行きましょう♪」"
translation = "「멋진 미래를 목표로 함께 과정을 축적해 가요♪」"

[[dialogue]]
speaker = "unk"
original = "反対側の腕にもセシアが抱き着いて、ぴとっと顔をくっ付けて来る。"
translation = "반대쪽 팔에도 세시아가 매달려 얼굴을 바싹 갖다 댄다."

[[dialogue]]
speaker = "unk"
original = "それに関して俺の意思は！？"
translation = "거기에 내 의사는!?"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「大丈夫！\u3000ダーリンがそれで幸せになれるって確信を持って貰えるよう、アタシたち頑張ってアプローチして行くから！」"
translation = "「괜찮아! 달링이 그걸로 행복해질 수 있다고 확신할 수 있게 우리들이 열심히 어프로치 할 거니까!」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「だから、わたくしたちのこと、ちゃんと見ていてね。会長♪」"
translation = "「그러니까 저희를 제대로 지켜봐 주세요. 회장님♪」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「うしし<emoji=heart04>」"
translation = "「우시시<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ふふっ♪」"
translation = "「후훗♪」"

[[dialogue]]
speaker = "unk"
original = "２人にそんな風に挟まれて、内心ドキドキしてしまう俺なのだった――"
translation = "두 사람 사이에 끼여서 내심 두근거리고 마는 나였다──"

