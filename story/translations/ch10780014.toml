[[dialogue]]
speaker = "unk"
original = "第４話,木苺ジャムのティータイム,P"
translation = "제4화, 산딸기 잼의 티타임"

[[dialogue]]
speaker = "unk"
original = "持つべきは心優しい錬金術師の先輩だ。"
translation = "마음씨 착한 연금술사 선배는 두고 볼 일이다."

[[dialogue]]
speaker = "unk"
original = "『試作段階だがそれでも数時間は持つだろウ』。そう言われて貸し出された新型の義体の効果は──"
translation = "『시작 단계지만 그래도 몇 시간은 버티겠지』. 그렇게 말하며 빌려준 신형 의체의 효과는──"

[[dialogue]]
speaker = "トリュファイナ"
original = "「あぁ……！\u3000素敵です、素晴らしいです、魔王様！」"
translation = "「아아……! 멋져요, 훌륭해요, 마왕님!」"

[[dialogue]]
speaker = "unk"
original = "義体の調子、よさそうですね"
translation = "의체 상태, 좋아 보이네요."

[[dialogue]]
speaker = "トリュファイナ"
original = "「ええ！\u3000頬をなでる風の強さも、道行く人の香り温かみも……手に取るように感じられます」"
translation = "「네! 뺨을 스치는 바람의 강도도, 길 가는 사람의 향기와 온기도…… 손에 잡힐 듯이 느껴져요.」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「アニマ様は素晴らしいお方ですね。またお礼を言わなければ……！」"
translation = "「아니마 님은 정말 훌륭한 분이시네요. 다시 감사를 드려야겠어요……!」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「しかし少々困ってしまいますね。自由に触れることができると思うと、いったいどこから回ればよいのでしょう……！」"
translation = "「하지만 조금 곤란해지네요. 자유롭게 만질 수 있다고 생각하니, 도대체 어디부터 돌아봐야 할지……!」"

[[dialogue]]
speaker = "unk"
original = "じゃあエスコートしますよ"
translation = "그럼 에스코트해 드릴게요."

[[dialogue]]
speaker = "トリュファイナ"
original = "「よろしいのですか……え、もっと近くに？」"
translation = "「괜찮으신가요…… 에, 좀 더 가까이?」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「あ……手を握られて……ふふ♪\u3000はい。本日はどうぞよろしくお願いいたします、魔王様」"
translation = "「아…… 손을 잡으시고…… 후후♪ 네. 오늘은 부디 잘 부탁드립니다, 마왕님.」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「ここは衣装を売られているお店なのですね。まぁ……手触りのよい生地……♪」"
translation = "「여기는 의상을 파는 가게로군요. 어머…… 촉감이 좋은 원단……♪」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「この衣装もきっと魔法で編まれた──なんて。ふふ、冗談です。これも技術で作られているのでしょう？」"
translation = "「이 의상도 분명 마법으로 짜인──이라니. 후후, 농담이에요. 이것도 기술로 만들어진 거죠?」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「少しずつですがわかってまいりました。３０００年の時を経て、魔力や霊力に依存しない、そんな術を人々は身に付けられている」"
translation = "「금금씩 알 것 같아요. 3000년의 시간을 거쳐 마력이나 영력에 의존하지 않는 그런 술법을 사람들은 익히셨군요.」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「あっ、あちらのスカートも可愛らしい……！\u3000はぁ、試着、というものもできるのですか」"
translation = "「앗, 저기 있는 스커트도 귀여워라……! 하아, 시착이라는 것도 할 수 있나요.」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「──はい、私、やってみたいです！\u3000魔王様！」"
translation = "「──네, 저, 해보고 싶어요! 마왕님!」"

[[dialogue]]
speaker = "unk"
original = "伝説の７代目・光の魔女様だとか。３０００年前に魔王の因子がこの世に残るよう禁術を用いた聖女だとか──そういうことは今、関係ない。"
translation = "전설의 7대 빛의 마녀라든가. 3000년 전에 마왕 인자가 이 세상에 남도록 금술을 사용한 성녀라든가── 그런 건 지금 상관없다."

[[dialogue]]
speaker = "unk"
original = "魔王ラクシスが守ったこの現代を、トリュファイナさんが肩の力を抜いて楽しめるように。俺はそれだけを願って色々な店を練り歩いた──"
translation = "마왕 라크시스가 지킨 이 현대를 트리파이나 씨가 어깨의 힘을 빼고 즐길 수 있도록. 나는 그것만을 바라며 여러 가게를 돌아다녔다──"

[[dialogue]]
speaker = "トリュファイナ"
original = "「ふふ、メニューがたくさんあって迷います。どれを注文いたしましょうか……♪」"
translation = "「후후, 메뉴가 많아서 고민돼요. 무엇을 주문할까요……♪」"

[[dialogue]]
speaker = "unk"
original = "お茶の場所、本当にここでいいんですか？"
translation = "찻집, 정말 여기로 괜찮아요?"

[[dialogue]]
speaker = "トリュファイナ"
original = "「ええ！\u3000私、身体を持てるようになったらまず、学園のカフェでお茶をしたかったのです」"
translation = "「네! 저, 몸을 가질 수 있게 되면 우선 학원 카페에서 차를 마시고 싶었어요.」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「私と縁のある皆様がくつろぐこの場所で、共に時間を過ごしたかったので……」"
translation = "「저와 인연이 있는 여러분이 쉬어가는 이곳에서 함께 시간을 보내고 싶었기에……」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「あ──魔王様、このロシアンティーというのは何なのでしょうか？」"
translation = "「아── 마왕님, 이 러시안 티라는 건 무엇인가요?」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「砂糖の代わりに、ジャムを入れていただくお紅茶のこと……？」"
translation = "「설탕 대신 잼을 넣어 마시는 홍차라고요……?」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「では私、これにいたします。ふふ、ジャムは好物なのです。魔女の森でもよく木苺を摘んで作っておりました」"
translation = "「그럼 저, 이걸로 할게요. 후후, 잼은 제가 좋아하는 거예요. 마녀의 숲에서도 자주 산딸기를 따서 만들곤 했거든요.」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「そうですよ？\u3000３０００年前でもジャムはございますからね？」"
translation = "「그럼요? 3000년 전에도 잼은 있었으니까요?」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「お近くの店員様をお呼びして……すみません。こちらのお紅茶を１つ。木苺のジャムでお願いいたします♪」"
translation = "「가까운 점원분을 불러서…… 저기요. 여기 홍차 하나. 산딸기 잼으로 부탁드립니다♪」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「はぁー……人心地、つけましたね。今日はエスコートしていただき、ありがとうございました」"
translation = "「하아…… 한숨 돌렸네요. 오늘은 에스코트해 주셔서 감사합니다.」"

[[dialogue]]
speaker = "unk"
original = "ずいぶん連れまわしちゃいましたね"
translation = "꽤 많이 데리고 다녀버렸네요."

[[dialogue]]
speaker = "トリュファイナ"
original = "「お気になさらず。むしろ嬉しかったです。光の魔女の任を持っていた時は、それはそれは厳重に囲われておりましたので」"
translation = "「신경 쓰지 마세요. 오히려 기뻤어요. 빛의 마녀의 임무를 맡고 있을 때는 아주 엄중하게 갇혀 지냈으니까요.」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「どこかへ行く時もお忍びで、窮屈な旅が多かったのです。このように自由に、ぶらつくお散歩は憧れでした」"
translation = "「어딘가 갈 때도 몰래 가느라 답답한 여행이 많았어요. 이렇게 자유롭게 돌아다니는 산책은 동경해 왔답니다.」"

[[dialogue]]
speaker = "unk"
original = "立場のある人は大変ですね"
translation = "입장이 있는 사람은 힘들겠네요."

[[dialogue]]
speaker = "トリュファイナ"
original = "「ええ──しかしそれも力を持って生まれたものの責務。魔王様、あなたと同じです」"
translation = "「네── 하지만 그것도 힘을 갖고 태어난 자의 책무. 마왕님, 당신과 같아요.」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「……？\u3000ご自分が責務を果たせているかどうか、ご不安なのですか？」"
translation = "「……? 스스로가 책무를 다하고 있는지 불안하신가요?」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「そう謙遜なさらずとも。あなた様は、ご立派に魔王としての務めを果たしているではないですか」"
translation = "「그렇게 겸손해하지 않으셔도. 당신은 훌륭하게 마왕으로서의 소임을 다하고 있지 않습니까.」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「本当ですよ？\u3000生まれ変わり、名こそ変われど……あなた様は少しも変わっておりません」"
translation = "「정말이에요. 다시 태어나 이름은 바뀌었을지언정…… 당신은 조금도 변하지 않았습니다.」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「ご自身のことよりも周りの人を愛す。これは簡単なようで、とても難しいこと……」"
translation = "「자신보다 주변 사람을 사랑한다. 이것은 쉬워 보여도 매우 어려운 일……」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「救世の英雄には、優れた武力よりも大切なことがございます。それは──愛。他者への優しさに他なりません」"
translation = "「구세의 영웅에게는 뛰어난 무력보다 소중한 것이 있습니다. 그것은── 사랑. 타인을 향한 다정함에 다름없습니다.」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「霊体となった私に気づいて手を握ってくださった。交流の輪を次々に広げて、奇異の目も気にせず現代のことを教えていただけた……」"
translation = "「영체가 된 저를 알아차리고 손을 잡아주셨어요. 교류의 고리를 차례차례 넓히고, 기이한 눈초리도 개의치 않고 현대에 대해 가르쳐 주셨지요……」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「平和な街を歩く喜びを伝えてくださり、今も甘い紅茶を楽しめる午後のひと時を与えてくださっています」"
translation = "「평화로운 거리를 걷는 기쁨을 전해주시고, 지금도 달콤한 홍차를 즐길 수 있는 오후의 한때를 주고 계십니다.」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「世界を救うほどのお力を持つ御方に、これ以上ない優しさと愛情が備わっている。これほど嬉しいことはないではありませんか」"
translation = "「세계를 구할 정도의 힘을 가진 분에게 더할 나위 없는 다정함과 애정이 갖춰져 있다. 이보다 기쁜 일은 없지 않겠습니까.」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「……当然のことをしているだけ、ですか？\u3000ふふ。やっぱりあなた様はお変わりありませんね」"
translation = "「……당연한 일을 하고 있을 뿐이라고요? 후후. 역시 당신은 변함없으시네요.」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「私、この身が潰えるまであなたのお傍におります。どうかもう一度、３０００年の時を超えた、救世の英雄譚を見せてくださいませ」"
translation = "「저, 이 몸이 다할 때까지 당신의 곁에 있겠습니다. 부디 다시 한번, 3000년의 시간을 넘은 구세의 영웅담을 보여주십시오.」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「それが限定的な再誕を果たした光の魔女の、たった１つの希望です」"
translation = "「그것이 한정적인 재탄을 이룬 빛의 마녀의 단 하나의 희망입니다.」"

[[dialogue]]
speaker = "unk"
original = "三界の、三種族すべてが平和に暮らせる時代が来て欲しい。そう願うトリュファイナさんに俺は応えたいと思う。"
translation = "삼계의 세 종족 모두가 평화롭게 살 수 있는 시대가 오길 바란다. 그렇게 바라는 트리파이나 씨에게 나는 응답하고 싶다고 생각한다."

[[dialogue]]
speaker = "unk"
original = "三種族だけじゃなく、魔女のみんなも一緒に平和に──そう伝えると、これ以上ないほどに可愛らしいはにかみを彼女は返してくれたのだった。"
translation = "세 종족뿐만 아니라 마녀들 모두 함께 평화롭게── 그렇게 전하자, 더할 나위 없이 사랑스러운 수줍은 미소를 그녀는 돌려주었다."

