[[dialogue]]
speaker = "unk"
original = "サバイバル合宿もあっという間に４日目――最終日を迎えた。"
translation = "서바이벌 합숙도 어느덧 4일째―― 마지막 날을 맞이했다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あら♪\u3000いい手応えが来たわ。これは大きいかも～♪」"
translation = "「어머♪ 손맛이 좋네. 이건 클지도 몰라~♪」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「釣り糸がかなり荒ぶってますね。お姉ちゃん……じゃなかったサーシャ先輩、手伝いましょうか？」"
translation = "「낚싯줄이 꽤 거칠게 날뛰네요. 언니…… 가 아니라 사샤 선배, 도와드릴까요?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「大丈夫よ。見てて……え～いっ！」"
translation = "「괜찮아. 봐봐…… 영~차!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「取ったど～♪」"
translation = "「잡았다~♪」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「おぉ～っ、お見事……！\u3000この魚は凄いですよ……！」"
translation = "「오오~ 훌륭합니다……! 이 물고기는 대단하네요……!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「この合宿１番の大物です。写真を撮っておくべきかと」"
translation = "「이번 합숙 최대어입니다. 사진을 찍어둬야겠는데요」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「本当？\u3000嬉しいわ～♪\u3000じゃあ、アナちゃんも会長くんも一緒に、記念撮影しましょ♪」"
translation = "「정말? 기쁘네~♪ 그럼 아나짱이랑 회장군도 같이 기념사진 찍자♪」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「それでは、ＤＩＳＣのセットは私が。２人共並んで下さい」"
translation = "「그럼 DISC 세팅은 제가 하죠. 두 분 나란히 서주세요」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はい、５秒カウント行きますよ～」"
translation = "「자, 5초 카운트 갑니다~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「いぇ～い♪\u3000２人共、ぎゅ～っ<emoji=heart04>」"
translation = "「이예이~♪ 둘 다 꼬옥~ <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "サーシャさん、胸が顔に当たってます、胸が！"
translation = "사샤 씨, 가슴이 얼굴에 닿고 있어요, 가슴이!"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「チーズです。ぶい」"
translation = "「치즈입니다. 브이」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「――よし、ついに上手く焼けましたよ。見て下さい、サーシャ先輩」"
translation = "「――좋아, 드디어 잘 구워졌어요. 보세요, 사샤 선배」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あら～♪\u3000おめでとう、アナちゃん。焼き魚、成功ね～！」"
translation = "「어머나~♪ 축하해, 아나짱. 생선구이 성공이네~!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「いただきます。……もぐもぐ」"
translation = "「잘 먹겠습니다. ……우물우물」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「おぉ～……自分で焼いた魚、何だか美味しく感じます」"
translation = "「오오~…… 직접 구운 생선, 왠지 더 맛있게 느껴져요」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「和菓子を初めて口にした時のような、感動の味です……！」"
translation = "「화과자를 처음 입에 대었을 때 같은 감동적인 맛입니다……!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「うふふ♪\u3000自分で上手く料理が出来ると、嬉しいわよね～。今度は和菓子の手作りとか、一緒にやってみる？」"
translation = "「우후후♪ 직접 요리를 잘하게 되면 기쁘지. 다음엔 화과자 만들기 같은 거 같이 해볼래?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「なるほど。頑張れば自分でも料理が出来ると分かった以上、和菓子を作らないという選択肢はないです」"
translation = "「과연. 노력하면 저도 요리를 할 수 있다는 걸 안 이상, 화과자를 만들지 않는다는 선택지는 없습니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「今度、是非教えて下さい」"
translation = "「다음에 꼭 가르쳐 주세요」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ならヴィーナスちゃんとマトイちゃんも誘って、皆でやりましょうか。マトイちゃんはお菓子作り得意だから、頼りになるはずよ」"
translation = "「그럼 비너스짱이랑 마토이짱도 불러서, 다 같이 할까요? 마토이짱은 과자 만들기가 특기니까 든든할 거예요.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「もちろん会長くんもね。和菓子作りも、実はやったことあるんじゃないかしら？」"
translation = "「물론 회장군도 말이야. 화과자 만들기, 사실 해본 적 있지 않니?」"

[[dialogue]]
speaker = "unk"
original = "任せて下さい。バイトで経験あるので！"
translation = "맡겨 주세요. 아르바이트로 경험이 있으니까요!"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「うふふ、やっぱり～♪」"
translation = "「우후후, 역시나~♪」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「なんと……！\u3000会長、和菓子を手作り出来るんですか……！？」"
translation = "「이럴 수가……! 회장, 화과자를 직접 만들 수 있는 건가요……!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「会長が急に男性として、魅力的に思えてきました」"
translation = "「회장이 갑자기 남성으로서 매력적으로 느껴지기 시작했습니다.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あらあら、現金ね～♪」"
translation = "「어머어머, 속물적이네~♪」"

[[dialogue]]
speaker = "unk"
original = "そんなこんなで昼食を終えた後。"
translation = "이러저러해서 점심 식사를 마친 뒤."

[[dialogue]]
speaker = "unk"
original = "合宿を終わらせる為、数日過ごしたテントを片付けることになった。"
translation = "합숙을 끝내기 위해 며칠간 지냈던 텐트를 정리하게 되었다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「サバイバル合宿、気付けばあっという間に終わっちゃったわね～」"
translation = "「서바이벌 합숙, 어느샌가 눈 깜짝할 사이에 끝나버렸네~」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ええ。充実した数日間でした」"
translation = "「네. 충실한 며칠간이었습니다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「サーシャ先輩は、どうでしたか？\u3000サバイバルの雰囲気だけでも、楽しむことができましたか？」"
translation = "「사샤 선배는 어떠셨나요? 서바이벌 분위기만이라도 즐기실 수 있었나요?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「それはもう♪\u3000最初は冗談のつもりで口にしたサバイバル合宿だったけど、やってみたかったのは本当だったし――」"
translation = "「그럼 당연하지♪ 처음에는 농담 삼아 꺼냈던 서바이벌 합숙이었지만, 해보고 싶었던 건 진심이었는걸――」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「アナちゃんがしようって誘ってくれたおかげで、夏の楽しい思い出ができたわ。ありがとう♪」"
translation = "「아나짱이 하자고 권해준 덕분에 여름의 즐거운 추억이 생겼어. 고마워♪」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「それなら良かったです。そのついでといっては何ですが――」"
translation = "「그렇다면 다행입니다. 그 덤이라고 하긴 뭣하지만――」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「サーシャ先輩、会長。もう１つだけ、私のやりたいことに付き合って頂けませんか？」"
translation = "「사샤 선배, 회장. 한 가지만 더, 제가 하고 싶은 일에 동참해 주시지 않겠습니까?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「え？」"
translation = "「어?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「最後のレクリエーションがあるんです」"
translation = "「마지막 레크리에이션이 있거든요.」"

