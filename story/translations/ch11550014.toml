[[dialogue]]
speaker = "unk"
original = "第４話,それぞれの世界へ,P"
translation = "제4화, 각자의 세계로"

[[dialogue]]
speaker = "unk"
original = "トレジアンナからの連絡を受けて、いろは、花織、ここあの３人は渋谷へと向かう。"
translation = "트레지아나로부터 연락을 받고 이로하, 카오리, 코코아 세 사람은 시부야로 향한다."

[[dialogue]]
speaker = "unk"
original = "そこは彼女たちが、異世界より最初にたどり着いた場所だった。"
translation = "그곳은 그녀들이 이세계에서 처음 도달했던 장소였다."

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「──戻って来たようです！」"
translation = "「──돌아온 모양입니다!」"

[[dialogue]]
speaker = "unk"
original = "トレジアンナがそう発した直後、目の前の空間が歪んだ。"
translation = "트레지아나가 그렇게 말한 직후, 눈앞의 공간이 일그러졌다."

[[dialogue]]
speaker = "unk"
original = "そして次の瞬間、オムニスを抱えた、いろはたちのよく知る陽彩の姿が現れた。"
translation = "그리고 다음 순간, 옴니스를 안은 이로하 일행이 잘 아는 히요리의 모습이 나타났다."

[[dialogue]]
speaker_original = "陽彩"
speaker_translation = "히이로"
original = "「ごめん、みんな……心配をかけた」"
translation = "「미안, 얘들아…… 걱정 끼쳤어」"

[[dialogue]]
speaker = "unk"
original = "陽彩は寄生していた悪魔から、無事に解放された。"
translation = "히요리는 기생해 있던 악마로부터 무사히 해방되었다."

[[dialogue]]
speaker = "unk"
original = "事の顛末を陽彩の口から聞いた後、いよいよいろはたちは元の世界へと戻ることになった。"
translation = "사건의 전말을 히요리에게 들은 후, 드디어 이로하 일행은 원래 세계로 돌아가게 되었다."

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「いろは、帰りの準備はちゃんと出来てる？\u3000忘れ物してても取りには戻れないんだからね？」"
translation = "「이로하, 돌아갈 준비는 제대로 됐어? 물건 두고 가도 다시 가지러 올 수 없으니까 말이야?」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「わかってるってば。でも忘れて困るって言ったら、スマホくらいじゃない？\u3000こっちには何も持たずに来たんだから」"
translation = "「알고 있다니까. 하지만 잊어버려서 곤란할 거라곤 스마트폰 정도 아냐? 여긴 아무것도 안 들고 왔으니까」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「あ、でも心残りがあるとしたら、もう１回くらい、トレちぇりを観ておきたかったな～。できればオムオムと一緒に！」"
translation = "「아, 그래도 미련이 남는다면 한 번 정도 더 트레체리를 봐두고 싶었네~. 가능하면 옴옴이랑 같이!」"

[[dialogue]]
speaker_original = "オムニス"
speaker_translation = "옴니스"
original = "「俺も異世界のアニメは興味あるけど、さすがにアニメのために滞在期間は伸ばせないぞ……」"
translation = "「나도 이세계 애니메이션은 관심 있지만, 역시 애니메이션 때문에 체류 기간을 늘릴 순 없어……」"

[[dialogue]]
speaker_original = "ここあ"
speaker_translation = "코코아"
original = "「いろはすも好きだね～。あれだけアンナちんのところに入り浸って、アニメ見まくってたのに」"
translation = "「이로하스도 참 좋아하네~. 그렇게나 안나칭네 집에 드나들면서 애니메이션 엄청 봤으면서」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「何らかの記録媒体に保存して持ち帰ることが出来たらよかったのですが、そちらの世界できちんと再生できるかどうかはわかりませんし」"
translation = "「어떤 기록 매체에 저장해서 가져갈 수 있다면 좋았겠지만, 그쪽 세계에서 제대로 재생될 수 있을지는 모르겠고요」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「それにそもそも、この世界のものを持って転移した時の影響がわかりませんからね～」"
translation = "「게다가 애초에 이 세계의 물건을 가지고 전이했을 때의 영향도 모르니까요~」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「変なものを持っていった影響で、何か起こっちゃったら大変じゃないですか……」"
translation = "「이상한 걸 가져간 영향으로 무슨 일이라도 생기면 큰일이잖아요……」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「うう～、わかってるよ～」"
translation = "「으으~, 알고 있어~」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「うーむ……ここ数日でサチといろははすっかり打ち解けたようじゃな」"
translation = "「으음…… 요 며칠 사이에 사치와 이로하는 완전히 허물없어진 모양이구나」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「容赦なくツッコミするようになってるね」"
translation = "「가차 없이 츳코미를 날리게 됐네」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「いろはさん、目を離すと何かやらかしそうで、どうしても気になってしまうというか……」"
translation = "「이로하 씨, 눈을 떼면 뭔가 저지를 것 같아서 아무래도 신경 쓰인다고나 할까……」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「今となっては花織さんの気持ちがとてもよくわかります……」"
translation = "「지금은 카오리 씨의 마음을 아주 잘 이해해요……」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「ううっ……まさか異世界でウチの苦労をこんなにも理解してくれる人が現れるなんて……」"
translation = "「으으…… 설마 이세계에서 내 고생을 이렇게나 이해해 주는 사람이 나타날 줄이야……」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「元の世界に戻っても頑張ってくださいね、花織さんっ！」"
translation = "「원래 세계에 돌아가서도 힘내세요, 카오리 씨!」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「ありがとう、サチちゃんっ！」"
translation = "「고마워, 사치짱!」"

[[dialogue]]
speaker_original = "オムニス"
speaker_translation = "옴니스"
original = "「俺がいない間、みんなのことをありがとう」"
translation = "「내가 없는 동안 모두를 챙겨줘서 고마워」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「とんでもありません。みなさんと知り合えて本当によかったです……ありがとうございました」"
translation = "「별말씀을요. 여러분과 알게 되어 정말 좋았습니다…… 감사합니다」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「みなさんが立ち向かっているもの……悪魔についての話を、いろいろ聞かせてもらいました」"
translation = "「여러분이 맞서 싸우고 있는 것…… 악마에 대한 이야기를 여러 가지 들었습니다」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「これから先、大変なことがいろいろ待ち受けているでしょう。ですが、挫けずに頑張ってください！」"
translation = "「앞으로 힘든 일이 여러 가지 기다리고 있겠죠. 하지만 굴하지 말고 힘내세요!」"

[[dialogue]]
speaker_original = "オムニス"
speaker_translation = "옴니스"
original = "「ああ、頑張るよ」"
translation = "「아아, 힘낼게」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「大丈夫だよ！\u3000みんなで力を合わせて、世界を守って見せるから！」"
translation = "「괜찮아! 다 같이 힘을 합쳐서 세계를 지켜 보일 테니까!」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「だから、みんなも……頑張ってね」"
translation = "「그러니까 모두도…… 힘내」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「あたしたちも、この世界のこと……いろいろ聞かせてもらった」"
translation = "「우리도 이 세계에 대해…… 여러 가지 들었어」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「リクリエ、ロストアイテム、他にもいろいろ……すっごく平和そうに見えるこの世界も、たくさんの危険を抱えてるんだって」"
translation = "「리크리에, 로스트 아이템, 그 외에도 여러 가지…… 엄청 평화로워 보이는 이 세계도 많은 위험을 안고 있다고」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「そういう危険から、この世界を守ってあげて！」"
translation = "「그런 위험으로부터 이 세계를 지켜줘!」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「また絶対に会いたいから、また一緒に遊びたいから……だからお互いに、自分たちの世界を一生懸命守ろ！」"
translation = "「또 꼭 만나고 싶으니까, 또 같이 놀고 싶으니까…… 그러니까 서로 자기들의 세계를 열심히 지키자!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ええ、もちろんです」"
translation = "「네, 물론이죠」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「『えへへ、約束だよ☆』」"
translation = "「『에헤헤, 약속이야☆』」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「『バーカ、お前こそ約束だぞ。破ったら承知しねぇから』」"
translation = "「『바ー보, 너야말로 약속이다. 어기면 가만 안 둘 테니까』」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「……何のやりとりですか、それ？」"
translation = "「……무슨 대화인가요, 그건?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「わからない人はスルーで大丈夫ですよ。ね、いろはさん☆」"
translation = "「모르는 사람은 그냥 넘기셔도 괜찮아요. 그쵸, 이로하 씨☆」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「そゆこと♪」"
translation = "「그런 거지♪」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「こういうのはもっと普通でいいと思いますけど……」"
translation = "「이런 건 좀 더 평범한 게 좋다고 생각합니다만……」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「さ、それでは名残惜しいとは思いますが、そろそろ始めましょうか」"
translation = "「자, 그럼 아쉽겠지만 이제 슬슬 시작해 볼까요」"

[[dialogue]]
speaker_original = "オムニス"
speaker_translation = "옴니스"
original = "「そうだな。トレジアンナさん、お願いします」"
translation = "「그렇군. 트레지아나 씨, 부탁합니다」"

[[dialogue]]
speaker = "unk"
original = "──こうして、突然始まったいろはたちの異世界生活は幕を閉じた。"
translation = "──이렇게 갑자기 시작된 이로하 일행의 이세계 생활은 막을 내렸다."

[[dialogue]]
speaker = "unk"
original = "再び、魔法少女たちがまみえる可能性は限りなく低い。"
translation = "다시 마법소녀들이 마주할 가능성은 한없이 낮다."

[[dialogue]]
speaker = "unk"
original = "だが、ゼロではないその可能性を信じて、２つの世界の魔法少女たちは、それぞれに立ちはだかる試練に向かって挑んでいくのだった。"
translation = "하지만 제로가 아닌 그 가능성을 믿으며, 두 세계의 마법소녀들은 각자 가로막는 시련을 향해 도전해 나가는 것이었다."

