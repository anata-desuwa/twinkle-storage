[[dialogue]]
speaker = "unk"
original = "第４話,ただのにゃんこ,P"
translation = "제4화, 평범한 고양이"

[[dialogue]]
speaker = "unk"
original = "シズルさんが流星市国に来た日から数日。"
translation = "시즈루 씨가 유성시국에 온 날로부터 며칠."

[[dialogue]]
speaker = "unk"
original = "嵐のような日々は過ぎ去ってようやく落ち着きを取り戻したある日、俺はせつなを自宅に招いた。"
translation = "폭풍 같은 나날이 지나가고 겨우 평온을 되찾은 어느 날, 나는 세츠나를 집으로 초대했다."

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「はぁぁ～～、どっと疲れたでござる……」"
translation = "「하아아~~, 피로가 확 몰려오오……」"

[[dialogue]]
speaker = "unk"
original = "シズルさん、楽しそうだったね"
translation = "시즈루 씨, 즐거워 보였지"

[[dialogue]]
speaker = "unk"
original = "お疲れさま"
translation = "수고했어"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「師匠ははしゃぎすぎでござる。流星市国は初めてかと思ったら、実はそんなこと無かったみたいでござるし……」"
translation = "「스승님은 너무 들뜨셨소. 유성시국은 처음인 줄 알았더니, 사실은 그렇지도 않았던 모양이고……」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「途中から逆にせつなたちをリードして……もうわけがわからなくなったでござる」"
translation = "「도중부터는 거꾸로 세츠나 일행을 리드해서…… 이젠 뭐가 뭔지 모르게 되었소.」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「せっかく師匠が遊びに来てくれたのだから、ゆっくり甘えて過ごそうと思っていたのに、ずっと圧倒されっぱなしだったでござるよ」"
translation = "「기껏 스승님이 놀러 오셨으니, 느긋하게 어리광 부리며 지내려고 생각했는데, 내내 압도당하기만 했소.」"

[[dialogue]]
speaker = "unk"
original = "せつなもゆっくり休んで"
translation = "세츠나도 푹 쉬어"

[[dialogue]]
speaker = "unk"
original = "あれは仕方ないよ"
translation = "그건 어쩔 수 없었어"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「お言葉に甘えて、お膝でのんびりさせてもらうでござる～」"
translation = "「말씀하신 대로, 무릎에서 느긋하게 쉬도록 하겠소~」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「うにゃ～～、主様、ぬくぬくでござる～♪」"
translation = "「우냐~~, 주군, 따끈따끈하오~♪」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「師匠もせつなと主様をくっつけるようなことばかりして……」"
translation = "「스승님도 세츠나와 주군을 엮어주려는 짓만 하고……」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「忍としてしっかりお勤めしたかったのに、にゃあにゃあ叫んでばかりだったでござるよ……」"
translation = "「닌자로서 확실히 임무를 수행하고 싶었는데, 냐아냐아 소리만 지르고 있었소……」"

[[dialogue]]
speaker = "unk"
original = "もっと言って欲しい"
translation = "더 말해줬으면 좋겠어"

[[dialogue]]
speaker = "unk"
original = "にゃあにゃあかわいかった"
translation = "냐아냐아 귀여웠어"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「そんなこと言っても……無理にゃ<emoji=heart04>」"
translation = "「그런 말을 들어도…… 무리냐 <emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「うう～っ、また語尾が甘くなってるって冷やかされるでござる……」"
translation = "「우우~, 또 어미가 달콤해졌다고 놀림받을 것이오……」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "（でもでもっ、師匠が言うには、もっともっとかわいく攻めろ、と……そんなのせつなには難しいでござるよ……）"
translation = "(하지만 하지만, 스승님이 말하기를, 좀 더 좀 더 귀엽게 공략해라, 라고…… 그런 건 세츠나에게 어렵소……)"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "（しかしっ、師匠は房中術の使い手にして、恋愛術の達人！\u3000これを用いれば、主様もせつなにメロメロに……）"
translation = "(하지만! 스승님은 방중술의 구사자이자, 연애술의 달인! 이것을 이용하면, 주군도 세츠나에게 헤롱헤롱하게……)"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「ふにゃあああ～～～っ！」"
translation = "「후냐아아아~~~!」"

[[dialogue]]
speaker = "unk"
original = "グリグリしてきてびっくりした"
translation = "부비부비해 와서 깜짝 놀랐어"

[[dialogue]]
speaker = "unk"
original = "急にどうしたの？"
translation = "갑자기 왜 그래?"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「うっ、済まないでござる。せつなにもいろいろ思うところがあるでござるよ」"
translation = "「윽, 미안하오. 세츠나에게도 여러 가지 생각이 있소.」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「でも……せっかく主様に甘えているところでござるし……２人きりで誰も見てないし……」"
translation = "「하지만…… 기껏 주군에게 어리광 부리고 있는 중이고…… 둘뿐이라 아무도 안 보고 있고……」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「もうちょっとだけ……主様にじゃれついてもいいかにゃ？」"
translation = "「조금만 더…… 주군에게 재롱을 부려도 되겠냐?」"

[[dialogue]]
speaker = "unk"
original = "か、かわいすぎる"
translation = "너, 너무 귀엽다"

[[dialogue]]
speaker = "unk"
original = "うっ！"
translation = "윽!"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「せつなはかわいくないにゃー！」"
translation = "「세츠나는 안 귀엽냐-!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「でも……主様は、せつながかわいいほうがいいにゃ？」"
translation = "「하지만…… 주군은, 세츠나가 귀여운 편이 좋냐?」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「せつなは忍だけど……すき、って言ってくれるかにゃ？」"
translation = "「세츠나는 닌자지만…… 좋아, 라고 말해줄 거냐?」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「ま、待って待って～～っ！\u3000今のなし！\u3000なしでござるよ～～っ！！」"
translation = "「자, 잠깐 잠깐~~! 방금 건 취소! 취소요~~!!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「ぬあああ～～っ、せつなは血迷ったでござる！\u3000ほんのちょっとの出来心だったでござるよ～～っ！！」"
translation = "「누아아아~~, 세츠나가 정신이 나갔었소! 아주 잠깐 딴마음을 먹었을 뿐이오~~!!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「それもこれも師匠のせいでござる！\u3000師匠が恋愛術なんて教えるからっ」"
translation = "「이것도 저것도 다 스승님 때문이오! 스승님이 연애술 같은 걸 가르치니까!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「しかし、初心忘るべからず！\u3000これまで通り、せつなは房中術を極めるでござるよ、主様」"
translation = "「하지만, 초심을 잊어서는 안 되는 법! 지금까지처럼, 세츠나는 방중술을 연마하겠소, 주군.」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「そもそも、このせつなに恋愛を極めるなど無理にござる。どんなものかもよくわかってないのに……」"
translation = "「애초에, 이 세츠나에게 연애를 마스터하라는 건 무리요. 어떤 것인지도 잘 모르는데……」"

[[dialogue]]
speaker = "unk"
original = "せつなはいつも通りでいい"
translation = "세츠나는 평소대로면 돼"

[[dialogue]]
speaker = "unk"
original = "無理にわかろうとしなくていいよ"
translation = "억지로 알려고 하지 않아도 돼"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「主様ぁ～～<emoji=heart04>」"
translation = "「주군~~ <emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「ううっ、やっぱり主様はせつなが欲しい言葉をくれるにゃ……」"
translation = "「우우, 역시 주군은 세츠나가 듣고 싶은 말을 해주는냐……」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「これぞせつなが主に認めたお方！\u3000せつなは……せつなは主様を……」"
translation = "「이것이야말로 세츠나가 주군으로 인정한 분! 세츠나는…… 세츠나는 주군을……」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「お、お、お慕い……申し上げて……っっ」"
translation = "「여, 여, 연모…… 하고…… 있……」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「こんなのせつなじゃないでござる～～っ！！」"
translation = "「이런 건 세츠나가 아니오~~!!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「好きにゃ<emoji=heart04>\u3000主様だいすきにゃあ～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「좋아하냐 <emoji=heart04> 주군 정말 좋아하냐아~~~~ <emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「はぁはぁはぁ……回りくどいのは好きじゃないでござるよ。取り繕った言葉より、思いの丈をまっすぐに……あれ？」"
translation = "「하아 하아 하아…… 돌려 말하는 건 좋아하지 않소. 꾸며낸 말보다, 마음속 깊은 곳을 솔직하게…… 어라?」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「しまった！\u3000つい！\u3000今の取り消し！\u3000聞かなかったことにして欲しいにゃあああああっ！！」"
translation = "「아차! 그만! 방금 건 취소! 못 들은 걸로 해줬으면 좋겠냐아아아앗!!」"

[[dialogue]]
speaker = "unk"
original = "逃げないで、せつな<emoji=heart04>"
translation = "도망치지 마, 세츠나<emoji=heart04>"

[[dialogue]]
speaker = "unk"
original = "ぎゅ～～～っ<emoji=heart04>"
translation = "꼬옥～～～<emoji=heart04>"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「ふにゃっ！\u3000ギュッてするにゃあああ～～～っ！」"
translation = "「후냐앗! 꼬옥 하는 거냐아아아～～～!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「んなあああっ！\u3000尻尾のとこ、トントンしちゃ嫌にゃ！\u3000こんなことされたらせつなは……せつなはっ……」"
translation = "「느아아앗! 꼬리 쪽, 톡톡 치면 싫으냐! 이런 짓 당하면 세츠나는…… 세츠나는……!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「忍者じゃなくて、ただのにゃんこになっちゃうにゃあああ～～～～っ！」"
translation = "「닌자가 아니라, 그냥 고양이가 되어버린다냐아아아～～～～!」"

[[dialogue]]
speaker = "unk"
original = "こうして俺は、せつながただのにゃんこになるまで、たっぷりと可愛がるのだった。"
translation = "이렇게 나는, 세츠나가 그냥 고양이가 될 때까지 듬뿍 귀여워해 주는 것이었다."

