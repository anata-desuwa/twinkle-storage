[[dialogue]]
speaker = "unk"
original = "第４話,リーナの気持ち,P"
translation = "제4화, 리나의 마음, P"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「死ね！」"
translation = "「죽어!」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「死ね！」"
translation = "「죽어!」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「はぁ、はぁ、はぁ……っ……死ね死ね死ね！\u3000死んじゃえぇーーーーっ！！！」"
translation = "「하아, 하아, 하아……윽…… 죽어 죽어 죽어! 죽어버리라고오오오오!!!!」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "（自分のこと、ぼんやりしてよくわからないけど、ちょっと思い出した）"
translation = "(자신에 대해, 멍해서 잘 모르겠지만, 조금 떠올랐어)"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "（リーナを助けてくれるお兄ちゃんが欲しかった。リーナに優しくしてくれるお兄ちゃんが欲しかった）"
translation = "(리나를 도와주는 오빠가 갖고 싶었어. 리나에게 다정하게 대해주는 오빠가 갖고 싶었어)"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "（本当にお兄ちゃんがいてくれたらいいのに、って何度も思った）"
translation = "(정말로 오빠가 있어 줬으면 좋겠다고, 몇 번이나 생각했어)"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "（でもそれ以上にお兄ちゃんを──）"
translation = "(하지만 그 이상으로 오빠를──)"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「ズタズタにしたかったんだ！！」"
translation = "「갈가리 찢어버리고 싶었어!!」"

[[dialogue]]
speaker = "unk"
original = "リーナ！"
translation = "리나!"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「アハッ、アハハハッ♪\u3000来てくれてありがとう、お兄ちゃん♪\u3000リーナ、自分のやりたいことがわかったの」"
translation = "「아핫, 아하하핫♪ 와줘서 고마워, 오빠♪ 리나, 자신이 하고 싶은 게 뭔지 알았어」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「もっとこっちに来て？\u3000お兄ちゃんなんだから、リーナのお願い聞いてくれるよね？」"
translation = "「좀 더 이쪽으로 올래? 오빠니까, 리나의 부탁 들어줄 거지?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「近寄っちゃダメです、お兄さん！\u3000彼女はお兄さんに危害を与えるつもりです！」"
translation = "「다가가면 안 돼요, 오빠! 그녀는 오빠에게 해를 입힐 생각이에요!」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「リーナね、お兄ちゃんのこと好きだけど嫌いなの。だからリーナの手でズタズタにするの」"
translation = "「리나 말야, 오빠를 좋아하지만 싫어해. 그러니까 리나의 손으로 갈가리 찢어버릴 거야」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「でもお兄ちゃんだけ逝かせないよ？\u3000リーナ、お兄ちゃんのこと大好きだから。ずっと一緒だよ」"
translation = "「하지만 오빠만 보내주지 않을 거야? 리나, 오빠를 정말 좋아하니까. 계속 함께야」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「だから一緒に──」"
translation = "「그러니까 같이──」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「死んで」"
translation = "「죽어줘」"

[[dialogue]]
speaker = "unk"
original = "ダメだ"
translation = "안 돼"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「だよね。だってお兄ちゃんは、リーナのお兄ちゃんじゃ──」"
translation = "「그렇지. 그치만 오빠는, 리나의 오빠가 아──」"

[[dialogue]]
speaker = "unk"
original = "俺はリーナのお兄ちゃんだから、リーナを守らないと"
translation = "나는 리나의 오빠니까, 리나를 지켜야 해"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「お兄、ちゃん……」"
translation = "「오, 빠……」"

[[dialogue]]
speaker = "unk"
original = "お兄ちゃんがリーナの全部を受け止めるよ"
translation = "오빠가 리나의 전부를 받아줄게"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「う……うぅ……」"
translation = "「으…… 으으……」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「うわああああああっ！！！」"
translation = "「으와아아아아아앙!!!」"

[[dialogue]]
speaker = "unk"
original = "サチの協力もあって、遊園地のモンスターは無事討伐できた。"
translation = "사치의 협력도 있어서, 유원지의 몬스터는 무사히 토벌할 수 있었다."

[[dialogue]]
speaker = "unk"
original = "あれからしばらく経って──"
translation = "그로부터 시간이 좀 지나서──"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「お兄ちゃ～ん♪\u3000一緒にゲームしよ♪」"
translation = "「오빠아~♪ 같이 게임 하자♪」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「あ、でもこの前使ってたキャラは禁止だからね。あれ強すぎるもんっ。あんなのズルだよズル」"
translation = "「아, 근데 저번에 썼던 캐릭터는 금지야. 그건 너무 강하단 말야. 저런 건 반칙이야 반칙」"

[[dialogue]]
speaker = "unk"
original = "リーナは今も俺をお兄ちゃんだと思っている。"
translation = "리나는 지금도 나를 오빠라고 생각하고 있다."

[[dialogue]]
speaker = "unk"
original = "ズタズタに引き裂かれたリーナの心が癒えるまで、俺はお兄ちゃんでいようと思う。"
translation = "갈가리 찢겨 나간 리나의 마음이 치유될 때까지, 나는 오빠로 있어 주려고 한다."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「あ、お兄ちゃんのシャツ、ボタン取れかかってる。リーナお裁縫得意だから直してあげるね」"
translation = "「아, 오빠 셔츠, 단추 떨어지려고 해. 리나 바느질 잘하니까 고쳐줄게」"

[[dialogue]]
speaker = "unk"
original = "じゃあお願いしようかな"
translation = "「그럼 부탁할까」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「ひゃっ！？」"
translation = "「히얏!?」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「ご、ごめん……お兄ちゃんが目の前でシャツ脱いだら、ビックリしちゃって……なんでだろ」"
translation = "「미, 미안…… 오빠가 눈앞에서 셔츠를 벗으니까, 깜짝 놀라버려서…… 왜일까」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「今ボタン直すから待っててね……」"
translation = "「금방 단추 고칠 테니까 기다려 줘……」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「はい、できた！\u3000どうぞ、お兄ちゃん♪」"
translation = "「자, 다 됐어! 여기, 오빠♪」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「バッチリ？\u3000えへへへ♪\u3000これからもボタンが取れたり、服が破れたりしたら言ってね。リーナが直してあげるよ」"
translation = "「완벽해? 에헤헤♪ 앞으로도 단추가 떨어지거나 옷이 찢어지면 말해줘. 리나가 고쳐줄게」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「お兄ちゃん、ぎゅ～っ<emoji=heart04>」"
translation = "「오빠, 꼬옥~<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「えへへ<emoji=heart04>\u3000お兄ちゃん大好き……<emoji=heart04>」"
translation = "「에헤헤<emoji=heart04> 오빠 너무 좋아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「でも……」"
translation = "「하지만……」"

[[dialogue]]
speaker = "unk"
original = "どうしたの？"
translation = "「왜 그래?」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「あのね、最近、こうしてお兄ちゃんにぎゅ～ってしたり、してもらったりするとドキドキするの……」"
translation = "「저기 말이야, 요새 이렇게 오빠한테 꼬옥 붙어 있거나, 오빠가 안아주면 두근거려……」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「これって病気なのかな？\u3000胸がきゅってなって、ふわふわして……でも嫌じゃないし、変な気持ち……」"
translation = "「이거 병인 걸까? 가슴이 찡하고, 붕 뜬 기분이라…… 하지만 싫지 않고, 이상한 기분……」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「お兄ちゃん……リーナね、もしかしたらお兄ちゃんのこと──」"
translation = "「오빠…… 리나는 말이야, 어쩌면 오빠를──」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「ひゃっ！？\u3000で、電話！？」"
translation = "「히얏!? 저, 전화!?」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「星徒会のお仕事かな？\u3000お兄ちゃん忙しいから仕方ないよね」"
translation = "「성도회 일일까? 오빠는 바쁘니까 어쩔 수 없네」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「電話の相手は……ひめさき……メル……エル……？」"
translation = "「전화 상대는…… 히메사키…… 메루…… 엘……?」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「お兄ちゃん……その女の人、誰？」"
translation = "「오빠…… 그 여자, 누구야?」"

