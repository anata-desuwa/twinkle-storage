[[dialogue]]
speaker = "unk"
original = "第３話,ウェンディの経済講座,P"
translation = "제3화, 웬디의 경제 강좌, P"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「私に相談事があると聞いて来てみれば……試験のために、社会科の勉強を私に教わりたいと？」"
translation = "「저에게 상담할 일이 있다고 해서 와봤더니…… 시험을 위해서 사회 공부를 저에게 배우고 싶다고요?」"

[[dialogue]]
speaker = "unk"
original = "やっぱりダメ？"
translation = "역시 안 돼?"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「いいえ、分野が金融・経済となれば私が適任でしょう。本格的な経済学を教えるには時間が足りませんが、授業に出るくらいなら十分です」"
translation = "「아니요, 분야가 금융·경제라면 제가 적임자겠죠. 본격적인 경제학을 가르치기엔 시간이 부족하지만, 수업에 들어갈 정도라면 충분합니다」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「私は魔女の森で銀行を作ろうとして追放されかけたくらいですからね」"
translation = "「저는 마녀의 숲에서 은행을 만들려다 추방당할 뻔했을 정도니까요」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「実は、ネビュラ内で銀行を設立して通貨を発行しようという案も出したんです。通貨を“セドナ”にしようとして却下されましたが」"
translation = "「실은, 네뷸라 내에 은행을 설립해서 통화를 발행하자는 안도 냈었답니다. 통화 이름을 “세드나”로 하려다 기각당했지만요」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「まぁ実際に通貨を作ったとしても、いろいろな問題で機能しなかったでしょうが」"
translation = "「뭐, 실제로 통화를 만들었다 해도 여러 문제로 기능하지 않았겠지만요」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「……というわけで、私の失敗を踏まえつつ試験範囲の為替について学んでいきましょう」"
translation = "「……그런 고로, 저의 실패를 본보기 삼아 시험 범위인 환율에 대해 배워보도록 하죠」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「例えばＡ国がＡテルス、Ｂ国がＢテルスという通貨を持っていたとします」"
translation = "「예를 들어 A국이 A텔스, B국이 B텔스라는 통화를 가지고 있다고 칩시다」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「１Ａテルス＝１００Ｂテルスとしましょう。この交換レートを為替相場といいます。なぜこの為替相場の変動が起こるかですが──」"
translation = "「1A텔스=100B텔스라고 하죠. 이 교환 비율을 환율이라고 합니다. 왜 이 환율 변동이 일어나는가 하면──」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「Ａ国の商品やサービスを購入するには、Ａテルスが必要です。Ｂ国のＢテルスも同様です」"
translation = "「A국의 상품이나 서비스를 구입하려면 A텔스가 필요합니다. B국의 B텔스도 마찬가지죠」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「たとえば、Ａ国は高品質な商品やバラエティ豊富なサービスがあり、また観光においても魅力のある国とします」"
translation = "「예를 들어, A국은 고품질 상품이나 버라이어티 풍부한 서비스가 있고, 또 관광에 있어서도 매력이 있는 나라라고 칩시다」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「Ａ国のものが欲しい。Ａ国に行って美味しいものが食べたい。そのためにはＡ国の通貨であるＡテルスが欲しい」"
translation = "「A국의 물건을 갖고 싶다. A국에 가서 맛있는 것을 먹고 싶다. 그러기 위해서는 A국의 통화인 A텔스가 갖고 싶다」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「みんながＡテルスが求めるようになったらどうなるか……」"
translation = "「모두가 A텔스를 원하게 되면 어떻게 될까요……」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「いえ、言い方を変えましょう。自分はＡテルスを持っている。たくさんの人がＡテルスが欲しいと言っている」"
translation = "「아니요, 표현을 바꾸죠. 자신은 A텔스를 가지고 있다. 많은 사람이 A텔스를 원한다고 말하고 있다」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「あなたならどうしますか？」"
translation = "「당신이라면 어떻게 하겠습니까?」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「会長さんならそのまま１００Ｂテルスで交換しそうですね。でも私ならそう──高いお金を出した人にＡテルスを交換します」"
translation = "「회장님이라면 그대로 100B텔스로 바꿔줄 것 같네요. 하지만 저라면 그래요── 비싼 돈을 내는 사람에게 A텔스를 바꿔줄 겁니다」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「するとＡテルスの価格が上がります。たとえば１Ａテルスを手に入れるのに、１１０Ｂテルスが必要になります」"
translation = "「그러면 A텔스의 가격이 오릅니다. 예를 들어 1A텔스를 손에 넣는 데 110B텔스가 필요해지죠」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「これがＡテルス高、Ｂテルス安ですね」"
translation = "「이것이 A텔스화 강세, B텔스화 약세네요」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「需要が上がると価格も上がる。需要が下がると価格も下がる。それが原則と思ってください」"
translation = "「수요가 오르면 가격도 오른다. 수요가 내려가면 가격도 내려간다. 그것이 원칙이라고 생각해주세요」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「なお、為替相場は金利の影響も大きいです」"
translation = "「또한, 환율은 금리의 영향도 큽니다」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「金利というのは、銀行に預けたお金や、貸し借りしたお金の利息の割合のことです」"
translation = "「금리라는 것은 은행에 맡긴 돈이나, 빌리고 빌려준 돈의 이자 비율을 말합니다」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「景気というのはよく使われる言葉の割にぼんやりとした概念ですが、今は景気が良くなると金利が上がる、くらいに考えてください」"
translation = "「경기라는 건 자주 쓰이는 말치고는 막연한 개념입니다만, 지금은 경기가 좋아지면 금리가 오른다, 정도로 생각해주세요」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「例えばＢ国が好景気で、Ｂ国の銀行に預けると、Ａ国よりお金が増えるとします。するとＡ国の人はＢ国に預けたくなりますよね」"
translation = "「예를 들어 B국이 호경기라서 B국의 은행에 맡기면 A국보다 돈이 불어난다고 칩시다. 그러면 A국 사람은 B국에 예금하고 싶어지겠죠」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「今度はさっきとは逆に、ＡテルスをＢテルスに交換する需要が増えます。つまりＡテルス安、Ｂテルス高になります」"
translation = "「이번에는 아까와 반대로, A텔스를 B텔스로 바꾸려는 수요가 늘어납니다. 즉 A텔스화 약세, B텔스화 강세가 됩니다」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「このように、為替相場は国の経済を表す指標になりうるのです」"
translation = "「이처럼 환율은 국가의 경제를 나타내는 지표가 될 수 있는 것입니다」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「また情勢不安も通貨下落の原因になります。国がなくなればお金も価値を失くしますから」"
translation = "「또한 정세 불안도 통화 하락의 원인이 됩니다. 국가가 없어지면 돈도 가치를 잃으니까요」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「そういう意味では、あなたたち星騎士の活動も影響します」"
translation = "「그런 의미에서는 당신들 성기사의 활동도 영향을 줍니다」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「もし“星騎士が世界を守れない”と思われれば、保有資産を現金化して消費する動きも出るでしょう。経済の混乱が予想されます」"
translation = "「만약 “성기사가 세계를 지킬 수 없다”고 여겨지면, 보유 자산을 현금화해서 소비하는 움직임도 나오겠죠. 경제 혼란이 예상됩니다」"

[[dialogue]]
speaker = "unk"
original = "俺たちは経済も守っているのか……"
translation = "우리들은 경제도 지키고 있는 건가……"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「そうですそうです。ふふ、責任重大ですね」"
translation = "「그렇습니다, 그렇고요. 후후, 책임이 중대하네요」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「さっきまでのネビュラと人間界に当てはめると……」"
translation = "「방금 전까지의 이야기를 네뷸라와 인간계에 대입해 보면……」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「ネビュラの側には魅力的な商品はあまりありません。経済的な基盤も脆弱です」"
translation = "「네뷸라 쪽에는 매력적인 상품이 별로 없습니다. 경제적인 기반도 취약하죠」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「一方、人間界には様々な商品があります。テルスの使い道はいくらでもあります」"
translation = "「반면, 인간계에는 다양한 상품이 있습니다. 텔스의 용도는 얼마든지 있죠」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「給金をセドナで支払っても、ネビュラ構成員はすぐにテルスに換金しようとするでしょう」"
translation = "「급료를 세드나로 지불해도, 네뷸라 구성원은 즉시 텔스로 환전하려고 할 겁니다」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「するとセドナとテルスの為替相場はどうなると思います？」"
translation = "「그러면 세드나와 텔스의 환율은 어떻게 될 거라 생각하세요?」"

[[dialogue]]
speaker = "unk"
original = "セドナ安のテルス高？"
translation = "세드나화 약세에 텔스화 강세?"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「その通り。テルスに対して圧倒的セドナ安になるでしょう」"
translation = "「정답. 텔스에 대해 압도적인 세드나화 약세가 되겠죠」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「セドナ長官を尊敬する身として、そんなの認められません！」"
translation = "「세드나 장관님을 존경하는 몸으로서, 그런 건 인정할 수 없습니다!」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「いずれ正式に銀行を設立する際は、ちゃんと通用する通貨にしてみせます！」"
translation = "「언젠가 정식으로 은행을 설립할 때는, 제대로 통용되는 통화로 만들어 보이겠어요!」"

[[dialogue]]
speaker = "unk"
original = "やっぱり諦めてないんだ……"
translation = "역시 포기하지 않았구나……"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「当然です。偉大な経営者は、何度失敗しても諦めずに挑戦し続けてきました」"
translation = "「당연합니다. 위대한 경영자는 몇 번을 실패해도 포기하지 않고 계속 도전해 왔습니다」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「息をするように人に迷惑をかけるサイコパスで、虫のような生命力で蘇り、最後には成功を強引に掴み取るんです！」"
translation = "「숨 쉬듯이 남에게 폐를 끼치는 사이코패스이자, 벌레 같은 생명력으로 되살아나, 마지막에는 성공을 억지로 움켜쥐는 겁니다!」"

[[dialogue]]
speaker = "unk"
original = "人として最悪じゃないかな！？"
translation = "사람으로서 최악 아닌가!?"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「成功する経営者とはそういうものなんです！」"
translation = "「성공하는 경영자란 그런 법이에요!」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「よし！\u3000せっかくの勉強の機会ですから、世界を変えた名だたる経営者について、会長さんに教えてあげましょう！」"
translation = "「좋아! 기왕 공부할 기회니까, 세계를 바꾼 이름난 경영자들에 대해 회장님께 가르쳐 드릴게요!」"

[[dialogue]]
speaker = "unk"
original = "ええ～～～～～～っ！？"
translation = "에에~~~~~~!? 코!"

