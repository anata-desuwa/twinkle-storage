[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「へい会長さんっ！\u3000トス、トースっ！\u3000わたしの華麗なアタックで決めてみせますよぉ～！」"
translation = "「헤이 회장님! 토스, 토스으! 제 화려한 어택으로 결정짓겠어욧~!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「させませんっ！\u3000んんっっ……！！\u3000アグレッシブに動くと、はぁはぁ、ハイレグ部分がどんどん食い込んできて……」"
translation = "「안 돼요어! 으으으음……!! 공격적으로 움직이면, 하아하아, 하이레그 부분이 점점 파고들어서어……」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「ボーッとしてちゃダメよ、イクシーさんっ。すぐに次が──」"
translation = "「멍하니 있으면 안 돼, 익시 씨. 바로 다음이──」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「ぶふぅ！？」"
translation = "「부훩!?」"

[[dialogue]]
speaker = "unk"
original = "すみませんっ、顔面に……！"
translation = "죄송해요, 정면에……!"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「い、いいのよ。わざとじゃないのはわかってるから」"
translation = "「개, 괜찮아. 일부러 그런 게 아니라는 건 아니까」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「えへへっ、海って楽しいですね～！\u3000ビーチバレーにスイカ割り、砂のお城作りに日光浴！」"
translation = "「에헤헤, 바다는 즐겁네욧! 비치발리볼에 수박 깨기, 모래성 쌓기에 일광욕!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「浜辺で摂る食事も格別です。新鮮な魚介類はもちろん、いつも街で食べてるようなホットスナックも一段と美味しくて」"
translation = "「해변에서 먹는 식사도 각별해요어. 신선한 해산물은 물론이고, 평소 거리에서 먹던 핫 스낵도 한층 더 맛있어서어」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「こーいうのを求めてたんですよぉ～。ルリエル、ちょっと周りを探検してきます！」"
translation = "「이런 걸 원했다구욧~. 루리에르, 잠깐 주변을 탐험하고 올게욧!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「私もご一緒します。少々食べ過ぎてしまったので身体を動かさなくては」"
translation = "「저도 함께 갈게요어. 조금 과식해 버려서 몸을 움직여야겠어요어」"

[[dialogue]]
speaker = "unk"
original = "いや、流石に遊びすぎ──"
translation = "아니, 아무리 그래도 너무 노는 거──"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「ふふ、行かせてあげなさい。そう根を詰めて特訓するものでもないわ」"
translation = "「후후, 보내주렴. 그렇게 너무 몰두해서 특훈할 것만도 아니야」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「２人とも海に来るのも、水着を着るのも初めてなんでしょ？\u3000なら、しばらくは好きに遊ばせてあげたらいいの」"
translation = "「둘 다 바다에 오는 것도, 수영복을 입는 것도 처음이지? 그럼 당분간은 마음껏 놀게 해주면 돼」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「会長くんは今回２人の教官役も任されてるって話だったもんね。焦っちゃう気持ちもわかるわ」"
translation = "「회장 군은 이번에 두 사람의 교관 역할도 맡았다는 이야기였지. 조바심이 나는 마음도 이해해」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「でも、だからこそ、まずは生徒たちに心のゆとりを持たせてあげなくちゃ。今一番焦ってるのは、誰でもないあの２人なんだから」"
translation = "「하지만 그렇기에 더욱, 우선은 학생들에게 마음의 여유를 갖게 해줘야지. 지금 가장 조바심을 내는 건 다른 누구도 아닌 저 두 사람이니까」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「あの２人は優秀な星騎士だけど、そんな彼女たちでも、思うように力を扱えず内心戸惑ってるはずよ。そんな状態で特訓なんてしても逆効果になるだけだわ」"
translation = "「저 두 사람은 우수한 성기사지만, 그런 그녀들이라도 뜻대로 힘을 다루지 못해 내심 당황하고 있을 거야. 그런 상태에서 특훈 같은 걸 해봤자 역효과만 날 뿐이야」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「指導者に大切なのは、特訓を付けることじゃなくて、教え導くことよ。教え子たちが自然と実力を開花させられるように、ね？」"
translation = "「지도자에게 중요한 건 특훈을 시키는 게 아니라, 가르치고 이끄는 거야. 제자들이 자연스럽게 실력을 꽃피울 수 있도록, 말이야?」"

[[dialogue]]
speaker = "unk"
original = "なるほど……"
translation = "과연……"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「ごめんなさい。説教臭くなっちゃったかしら。会長くんも教官役に戸惑ってる１人なのに」"
translation = "「미안해. 설교조가 되어버렸나 보네. 회장 군도 교관 역할에 당황하고 있는 한 명인데」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「でも、あの子たちなら大丈夫よ。ただ遊び呆けているわけじゃないわ。ほら──見てみなさい？」"
translation = "「하지만 저 아이들이라면 괜찮아. 그냥 놀기만 하는 게 아니거든. 봐── 보렴?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「海で泳ぐ時はくれぐれも足が付くところまでにしてくださいねっ？\u3000おとーさんやおかーさんの目の届かない場所にも行っちゃいけませんよぉ～？」"
translation = "「바다에서 수영할 때는 꼭 발이 닿는 곳까지만 가야 해욧? 아빠나 엄마의 눈이 닿지 않는 장소에는 가면 안 돼욧~!」"

[[dialogue]]
speaker_original = "子どもたち"
speaker_translation = "아이들"
original = "「はーいっ！」"
translation = "「네─!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「えへへ、いい返事です！\u3000ではでは、お渡しした法螺貝を構えてください！\u3000みんなで法螺貝コンサートといきましょう！」"
translation = "「에헤헤, 대답 잘하네욧! 그럼 자, 나눠준 소라나팔을 잡으세욧! 다 같이 소라나팔 콘서트를 열어봐요어!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「ご無事ですかっ？\u3000もう大丈夫ですよ、掴まってください」"
translation = "「무사하신가요어? 이제 괜찮아요어, 잡으세요어」"

[[dialogue]]
speaker_original = "女性客"
speaker_translation = "여성 손님"
original = "「はぁはぁ、ありがとうございます。急に足が攣ってしまって、もうダメかと……」"
translation = "「하아하아, 감사합니다. 갑자기 다리에 쥐가 나서, 이제 틀렸나 싶었는데……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「安心してください。常に目を光らせていますから。ですが海に入る前は、みっちり柔軟をして備えてくださいね？」"
translation = "「안심하세요어. 항상 감시하고 있으니까요어. 하지만 바다에 들어가기 전에는 충분히 유연체조를 해서 대비하세요어?」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「ふふ、流石はプリマステラね。誰に命じられたわけでもなく、ビーチにいるお客さんのために動き回って」"
translation = "「후후, 역시 프리마스텔라네. 누가 시킨 것도 아닌데 비치에 있는 손님들을 위해 돌아다니고」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「水着になってもあの子たちはあの子たち。星騎士に必要なものはもうとっくに身に付けているわ。今はただ慣れない姿や力に緊張しちゃっているだけ」"
translation = "「수영복 차림이 되어도 저 아이들은 저 아이들이야. 성기사에게 필요한 건 이미 옛저녁에 갖추고 있어. 지금은 그저 낯선 모습이나 힘에 긴장하고 있을 뿐」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「緊張さえ解ければ、自ずと力も使いこなせるようになってるはずよ。だから会長くんも、彼女たちを信じて見守ってあげなさい」"
translation = "「긴장만 풀리면 저절로 힘도 다룰 수 있게 될 거야. 그러니까 회장 군도 그녀들을 믿고 지켜봐 주렴」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「それでももし悩んでいるようなら『自信を持て』って励ましてあげて？\u3000その言葉が彼女たちにとって何より心の支えになるはずだから」"
translation = "「그런데도 만약 고민하고 있는 것 같다면 『자신을 가져』라고 격려해 줘. 그 말이 그녀들에게 무엇보다 큰 마음의 지탱이 될 테니까」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「彼女たちもまた、会長くんを信じているからこそ──ね？」"
translation = "「그녀들도 또한 회장 군을 믿고 있으니까── 그치?」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「って、司書の私が何を偉そうに話してるのかしら。やだわ、先輩面でくどくど喋っちゃって」"
translation = "「그나저나 사서인 내가 뭘 이리 거들먹거리며 말하는 걸까. 싫다, 선배 노릇 하며 구시렁구시렁 떠들어버리고」"

[[dialogue]]
speaker = "unk"
original = "いえ、すごく参考になりました"
translation = "아니요, 정말 참고가 되었습니다."

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「……そう？\u3000口うるさい大人だなって思わない？」"
translation = "「……그래? 잔소리 많은 어른이라고 생각하지 않아?」"

[[dialogue]]
speaker = "unk"
original = "ウィステリアさんの言葉が俺にとっての支えですよ"
translation = "위스테리아 씨의 말씀이 저에게는 큰 지탱이에요."

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「お、大袈裟よ。大層なことは言ってないわ」"
translation = "「과, 과장이야. 대단한 말은 안 했어」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "（こんなに尊敬の眼差しを向けてくれるなんて……。先輩風を吹かせるのもたまには悪くないかもしれないわね……）"
translation = "（이렇게 존경 어린 시선을 보내주다니……. 선배 행세를 하는 것도 가끔은 나쁘지 않을지도 모르겠네……）"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "（憧れは恋に似てるって聞くし……。こうして頼れるお姉さんらしさを出して行けば、会長くんに惹かれてもらえるかも……）"
translation = "（동경은 사랑과 닮았다고 들었고……. 이렇게 의지할 수 있는 누님다운 면모를 보여주면 회장 군이 끌려줄지도……）"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "（って、ダメダメ！\u3000何を考えてるの！\u3000生徒相手に不純な気持ちを抱いちゃいけないわ……！）"
translation = "（아니, 안 돼 안 돼! 무슨 생각을 하는 거야! 학생 상대로 불순한 마음을 품으면 안 돼……!）"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "（……でも、ここは学園じゃないし。私は今休暇中だし。大胆な水着も着ちゃってるし……）"
translation = "（……하지만 여긴 학원이 아니고. 난 지금 휴가 중이고. 대담한 수영복도 입고 있고……）"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "（このままそれとなく大人の余裕と色気を見せながら、慣れない仕事に悩む会長くんをそっと励ましてあげれば──）"
translation = "（이대로 은근슬쩍 어른의 여유와 섹시함을 보여주면서, 낯선 업무로 고민하는 회장 군을 살며시 격려해 주면──）"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「教師と生徒……暑いビーチで燃え上がる禁断の恋……ですね」"
translation = "「교사와 학생…… 뜨거운 비치에서 타오르는 금단 로맨스……군요어」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「ひぃあ！？\u3000イ、イクシーさん……！？」"
translation = "「히이익!? 이, 익시 씨……!?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「なんだかウィステリアさん、さっきよりも会長さんとの距離近くないですか？」"
translation = "「왠지 위스테리아 씨, 아까보다 회장님과의 거리가 가깝지 않아욧?」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「こここ、これは話している間につい近づいちゃっただけよ……！\u3000潮風で声が聞き取りづらかったものだから……！\u3000それに私教師じゃなくて司書だしっ」"
translation = "「이, 이, 이건 이야기하는 사이에 그만 가까워진 것뿐이야……! 해풍 때문에 목소리가 잘 안 들려서……! 게다가 난 교사가 아니라 사서라고옷」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「……やはり、あのくらい露出が高い方が殿方は嬉しいのでしょうか。しかし私には、あんな過激すぎる格好はとても……」"
translation = "「……역시 저 정도로 노출이 높은 게 남성분들은 기쁜 걸까요어. 하지만 저에게는 저렇게 과격한 차림은 도저히……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「というかズルいのです！\u3000ルリエルも会長さんとお話したいのです！\u3000独り占めしないでくださ～いっ！」"
translation = "「그보다 치사해욧! 루리에르도 회장님이랑 이야기하고 싶단 말이에욧! 독차지하지 말아주세욧~!」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「ひひひ、独り占めなんてしてないわ。私はあくまで先輩として、慣れない教官役に抜擢された会長くんに大人のアドバイスを──」"
translation = "「히히히, 독차지 같은 건 안 했어. 난 어디까지나 선배로서, 낯선 교관 역할을 맡게 된 회장 군에게 어른스러운 조언을──」"

[[dialogue]]
speaker_original = "水着フワッチ"
speaker_translation = "수영복 후왓치"
original = "「イーーーーーッ」"
translation = "「이~~~~~잇」"

[[dialogue]]
speaker = "unk"
original = "みんなっ！"
translation = "다들!"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「は、はいっ！\u3000さっきのモンスターですぅ！」"
translation = "「네, 네엣! 아까 그 몬스터예욧!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「すぐに行きましょう！\u3000モンスターの好き気勝手にはさせません！」"
translation = "「바로 가죠어! 몬스터 마음대로 하게 두지 않겠어요어!」"

