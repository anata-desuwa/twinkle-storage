[[dialogue]]
speaker = "unk"
original = "第２話,流星ライダー鑑賞会,P"
translation = "제2화, 유성 라이더 감상회"

[[dialogue]]
speaker = "unk"
original = "アポロが目覚め、そしてこの世界で生きていくことを決めて数週間が経った。"
translation = "아폴로가 깨어나고 이 세계에서 살아가기로 결정한 지 수 주일이 지났다."

[[dialogue]]
speaker = "unk"
original = "衰弱していた体もすっかり回復し、もう少し時間が経てば流星学園の附属校への転入手続きも取られるらしい。"
translation = "쇠약해졌던 몸도 완전히 회복되었고, 조금 더 시간이 지나면 유성 학원 부속 학교로의 편입 절차도 밟을 모양이다."

[[dialogue]]
speaker = "unk"
original = "これからアポロは、５年間のブランクを埋めていく。彼女がどのように成長していくのか……俺も近くで見守っていきたい。"
translation = "이제부터 아폴로는 5년간의 공백을 메워나갈 것이다. 그녀가 어떻게 성장해 나갈지…… 나도 가까이서 지켜보고 싶다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「魔王。一大事だ！\u3000今度の連休は空いてるか？\u3000暇ならあたしの部屋に来てくれ！」"
translation = "「마왕, 큰일이다! 이번 연휴에 시간 비어 있어? 한가하면 내 방으로 와줘!」"

[[dialogue]]
speaker = "unk"
original = "だからこそアポロから呼び出されれば駆けつけないわけにはいかない。ずいぶんと真面目な口調だったし、何かの相談かな……？"
translation = "그렇기에 아폴로가 불러내면 달려가지 않을 수 없다. 꽤나 진지한 어조였고, 무슨 상담이라도 있는 걸까……?"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「これから流星ライダーシリーズの一気鑑賞会を行います！」"
translation = "「지금부터 유성 라이더 시리즈 정주행 감상회를 시작하겠습니다!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ひゃっほーい！\u3000この時を待ってたぜー！！」"
translation = "「햐호! 이 순간을 기다렸다구!!」"

[[dialogue]]
speaker = "unk"
original = "どういうこと！？"
translation = "어떻게 된 거야!?"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「あたしが頼んだんだ！\u3000５年も眠ってたからな、知らない流星ライダーがたっぷりリリースされているだろ？」"
translation = "「내가 부탁했어! 5년이나 잠들어 있었으니까, 모르는 유성 라이더가 잔뜩 출시됐을 거 아냐?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「体調もばっちり回復したからな。今日は見たことのないライダーを一気見するんだ！」"
translation = "「컨디션도 완전히 회복됐으니까 말이야. 오늘은 본 적 없는 라이더를 한꺼번에 다 볼 거야!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「──私もこの時を待っていました。いつか姉さんと鑑賞できることを信じ、全作品、完全版コンプリートパックを揃えています……！」"
translation = "「──저도 이 순간을 기다려 왔어요. 언젠가 언니와 함께 감상할 수 있을 거라 믿고 전 작품 완전판 컴플리트 팩을 갖춰 두었답니다……!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「魔王も流星ライダーを全部はチェックしていないだろ？\u3000一緒に見て盛り上がろうぜ！」"
translation = "「마왕도 유성 라이더를 전부 체크하진 않았지? 같이 보면서 분위기 띄워보자고!」"

[[dialogue]]
speaker = "unk"
original = "いいね、面白そうだ！"
translation = "좋네, 재미있겠어!"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「いい返事だ！\u3000それじゃあフィオナ、再生を頼む！」"
translation = "「좋은 대답이야! 그럼 피오나, 재생 부탁해!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「任されました！\u3000では──スタートです！」"
translation = "「맡겨주세요! 그럼── 스타트입니다!」"

[[dialogue]]
speaker = "unk"
original = "こうして３人で並び、星見家のホームシアターで流星ライダーシリーズを一気見することになり──"
translation = "이렇게 셋이 나란히 앉아 호시미 가문의 홈시어터에서 유성 라이더 시리즈를 정주행하게 되었는데──"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「な、なにぃっ……！？\u3000２人同時にベルトを起動して……１人のライダーに変身するだと！？」"
translation = "「뭐, 뭐야……!? 둘이 동시에 벨트를 가동해서…… 한 명의 라이더로 변신한다고!?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はい！\u3000本作品の流星ライダーは双子で力を合わせて、１人のライダーになるんです！\u3000姉さんとこの神作を見る機会が来るだなんて……！」"
translation = "「네! 이 작품의 유성 라이더는 쌍둥이가 힘을 합쳐 한 명의 라이더가 되는 거예요! 언니와 이 갓작을 볼 기회가 오다니……!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「おぉっ！\u3000それぞれ異なる属性攻撃を……！？\u3000なんだこれは……カッコ良すぎるぞっ……！！」"
translation = "「오오! 각자 다른 속성 공격을……!? 뭐야 이거…… 너무 멋있잖아……!!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「まだまだ！\u3000盛り上がるのはここからですよ、姉さん！\u3000刮目してください！」"
translation = "「아직 멀었어요! 분위기가 달아오르는 건 이제부터예요, 언니! 괄목해 주세요!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「いけー、ライダー！\u3000トルネードフォームで悪党をぶっ倒すんだー！」"
translation = "「가라, 라이더! 토네이도 폼으로 악당들을 쓰러뜨려 버려!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「このシリーズは……科学者が流星ライダーになるのか！？\u3000てっきりあの若いやつが主人公かと思ってたぞ！」"
translation = "「이 시리즈는…… 과학자가 유성 라이더가 되는 거야!? 난 당연히 저 젊은 애가 주인공인 줄 알았어!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ええ！\u3000権威と学識のある壮年の男性が主人公なんです！\u3000クレバーな戦い方とシリアスな展開がたまらないんですよ！」"
translation = "「네! 권위와 학식 있는 장년 남성이 주인공이에요! 영리한 싸움 방식과 시리어스한 전개가 일품이라니까요!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「何の力もない若者が巻き込まれて──という展開は王道ゆえにオツだが。これもいいな！\u3000続きが気になる……早く次の話を頼む！」"
translation = "「아무런 힘도 없는 젊은이가 휘말려서──라는 전개는 왕도라 좋지만, 이것도 괜찮네! 다음 내용이 궁금해…… 빨리 다음 화 틀어줘!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はいっ、姉さん！」"
translation = "「네, 언니!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「この新シリーズも熱いな！\u3000バトルが手に汗握るぜ！\u3000やっぱり１話からドンパチやってくれないとな！」"
translation = "「이 신시리즈도 뜨거운데! 배틀이 손에 땀을 쥐게 해! 역시 1화부터 팡팡 터져줘야지!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「バトルシーンが多めの流星ライダーはやはり見ごたえがありますね！」"
translation = "「배틀 신이 많은 유성 라이더는 역시 볼만하네요!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「しかし１話の最後……あいつは仲間なんだろう？\u3000なぜ主人公の助太刀をせず、見てるだけだったんだ？」"
translation = "「근데 1화 마지막에…… 저 녀석은 동료잖아? 왜 주인공을 돕지 않고 보고만 있었던 거야?」"

[[dialogue]]
speaker = "unk"
original = "なぜ見てたんだろう……？"
translation = "왜 보고만 있었을까……?"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「そ、それはのちのち明かされますから……いま語ってはネタバレになってしまいます。さあ、続きを──！」"
translation = "「그, 그건 나중에 밝혀지니까요…… 지금 말하면 스포일러가 되어버려요. 자, 다음을──!」"

[[dialogue]]
speaker = "unk"
original = "正義と悪のぶつかり合い。笑いあり涙ありのエンターテインメントを、俺たちはたっぷりと楽しんだ。"
translation = "정의와 악의 충돌. 웃음과 눈물이 있는 엔터테인먼트를 우리들은 듬뿍 즐겼다."

[[dialogue]]
speaker = "unk"
original = "連休を利用しての夜更かしお泊まり鑑賞は続き──"
translation = "연휴를 이용한 밤샘 숙박 감상은 계속되어──"

[[dialogue]]
speaker = "unk"
original = "アポロの見たことのない流星ライダーシリーズ、その最終話を見終わったのは、連休最終日の夕方を過ぎた頃だった──"
translation = "아폴로가 본 적 없는 유성 라이더 시리즈, 그 최종화 시청을 마친 것은 연휴 마지막 날 오후가 지났을 무렵이었다──"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「終わった……太陽がいやにまぶしいぜ……！」"
translation = "「끝났다…… 태양이 유난히 눈부시네……!」"

[[dialogue]]
speaker = "unk"
original = "ほとんど睡眠ゼロで駆け抜けたからね……"
translation = "거의 잠도 안 자고 달려왔으니까……"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ですが素晴らしかったです……やはり流星ライダーは不滅の作品ですね……！」"
translation = "「하지만 훌륭했어요…… 역시 유성 라이더는 불멸의 작품이네요……!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「毎週楽しみに待つのもいいが、こうやって一気見するのも楽しいな！\u3000くぅっ……どのライダーも最高だった……！」"
translation = "「매주 설레며 기다리는 것도 좋지만, 이렇게 몰아보는 것도 즐겁네! 크으…… 어느 라이더든 최고였어……!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「魔王、お前はどのシリーズがよかった？」"
translation = "「마왕, 너는 어느 시리즈가 좋았어?」"

[[dialogue]]
speaker = "unk"
original = "アポロシリーズかなぁ"
translation = "아폴로 시리즈려나"

[[dialogue]]
speaker = "unk"
original = "どれも捨てがたいけど"
translation = "어느 것 하나 버릴 게 없지만"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「わかる！\u3000『流星ライダー・アポロ』はやっぱり傑作だからな！\u3000今回唯一見なかったシリーズだが……」"
translation = "「알지! 『유성 라이더 아폴로』는 역시 걸작이니까! 이번에 유일하게 안 본 시리즈지만……」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「……む。話をしたらアポロシリーズも見たくなってきたぞ」"
translation = "「……음. 이야기를 하니까 아폴로 시리즈도 보고 싶어졌어」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「それじゃあまた次のお休みの日にしましょうか」"
translation = "「그럼 또 다음 휴일에 할까요?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「何を言ってるんだ！\u3000まだ連休は終わっていない！」"
translation = "「무슨 소리야! 아직 연휴는 끝나지 않았어!」"

[[dialogue]]
speaker = "unk"
original = "じゃ、じゃあ俺はそろそろお暇して──"
translation = "그, 그럼 난 슬슬 실례를──"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「魔王、お前も一緒だ！\u3000逃がさんぞ！」"
translation = "「마왕, 너도 함께야! 안 놓아줄 거라구!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ね、姉さん。緋宮会長には今まで付き合っていただいたじゃないですか。今日はこのくらいで──」"
translation = "「어, 언니. 히노미야 회장님은 지금까지 함께해주셨잖아요. 오늘은 이쯤에서──」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「い～や～だ～っ！\u3000アポロシリーズを今から見たいし、魔王も一緒がいい！\u3000なぁ、いいだろー？」"
translation = "「싫어 싫어! 아폴로 시리즈를 지금부터 보고 싶고, 마왕도 같이 있는 게 좋아! 응, 괜찮지?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「それともなんだ。あたしと一緒に見たくないってゆーのか、お前は？」"
translation = "「아니면 뭐야. 나랑 같이 보기 싫다는 거야, 너?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「姉さん、そんな言い方をしたら困らせてしまいますよ……！」"
translation = "「언니, 그런 식으로 말하면 곤란하게 만들 뿐이에요……!」"

[[dialogue]]
speaker = "unk"
original = "最後まで付き合うよ！"
translation = "끝까지 함께할게!"

[[dialogue]]
speaker = "unk"
original = "──わかった！"
translation = "──알았어!"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ひゃっほーう！\u3000それじゃあ流星ライダーの原点！\u3000アポロシリーズ再生だぜ～！」"
translation = "「햐호! 그럼 유성 라이더의 원점! 아폴로 시리즈 재생이다~!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「うちの姉さんがすみません、緋宮会長……」"
translation = "「우리 언니가 죄송해요, 히노미야 회장님……」"

[[dialogue]]
speaker = "unk"
original = "そうしてアポロのわがままを聞く形で、流星ライダー・アポロのシリーズを鑑賞することになり。"
translation = "그렇게 아폴로의 떼를 들어주는 형태로 유성 라이더 아폴로 시리즈를 감상하게 되었고."

[[dialogue]]
speaker = "unk"
original = "日付けが変わったところで物語が盛り上がり、止めどころがなくなって──"
translation = "날짜가 바뀌었을 즈음 이야기가 절정에 달해 멈출 수 없게 되어──"

[[dialogue]]
speaker = "unk"
original = "明け方近くに最終話を見終わって……俺たち３人の意識はそこで途絶えた。"
translation = "새벽녘이 다 되어서야 최종화를 다 보고…… 우리 세 명의 의식은 거기서 끊겼다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「失礼します。お嬢様方、そろそろ学園のご支度を……」"
translation = "「실례합니다. 아가씨들, 슬슬 학원 갈 채비를……」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「って、これは一体何が……！\u3000全員、床で寝るだなんてお行儀の悪い……！」"
translation = "「어머, 이게 대체 무슨……! 전원 바닥에서 자다니 예의 없게……!」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「はぁ。起きたら全員お説教ですね……。ですが──」"
translation = "「하아. 일어나면 다들 설교군요……. 하지만──」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「すー……すー……」"
translation = "「새근…… 새근……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「すー……すー……」"
translation = "「새근…… 새근……」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「……ようやく一緒にいられるのですものね。羽目を外すのも、仕方がないのかもしれません」"
translation = "「……겨우 함께 있을 수 있게 된 것이니까요. 조금 도를 넘는 것도 어쩔 수 없을지도 모르겠네요」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「お説教は軽いお小言に留めておくことにしましょう。それと……」"
translation = "「설교는 가벼운 잔소리 정도로 해두기로 하죠. 그리고……」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「緋宮会長も、お付き合いいただきありがとうございました──」"
translation = "「히노미야 회장님도 함께해주셔서 감사합니다──」"

