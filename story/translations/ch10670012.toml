[[dialogue]]
speaker = "unk"
original = "第２話,退かない、媚びない、省みない！,P"
translation = "제2화, 물러나지 않고, 아부하지 않고, 뒤돌아보지 않는다!, P"

[[dialogue]]
speaker = "アナ"
original = "「なるほど。この方が前会長が話していたクルセイダースの……」"
translation = "「과연. 이분이 전 회장님이 말씀하셨던 크루세이더스의……」"

[[dialogue]]
speaker = "マトイ"
original = "「大昔の英雄って言うから、もっと怖そうな人を想像してたけど、私たちとそう見た目も変わらないね？\u3000同年代くらいかも……」"
translation = "「먼 옛날의 영웅이라고 해서 좀 더 무서운 사람을 상상했는데, 우리랑 겉모습도 별로 다르지 않네? 동년배일지도……」"

[[dialogue]]
speaker = "サーシャ"
original = "「確かにイメージとは違うわね～。肖像画なんかだとビシっと描かれてるから～」"
translation = "「확실히 이미지랑은 다르네~. 초상화 같은 데서는 늠름하게 그려져 있으니까~」"

[[dialogue]]
speaker = "聖沙"
original = "「デジャブを感じるわ……。クルセイダースって、この世界じゃそんなに物珍しい存在なのかしら……。これじゃパンダどころか珍獣扱いよ……」"
translation = "「데자뷔가 느껴져……. 크루세이더스가 이 세계에선 그렇게 신기한 존재인 걸까……. 이건 판다를 넘어서 희귀동물 취급이야……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ほらほら、みんな！\u3000あんまりジロジロみたら失礼でしょ。せっかく聖沙が我ら新星学園星徒会を訪ねてきてくれたんだから、まずは自己紹介よ！」"
translation = "「자자, 다들! 너무 빤히 보면 실례잖아. 어렵게 미사가 우리 신성학원 성도회를 찾아와 줬으니까 우선은 자기소개야!」"

[[dialogue]]
speaker = "サーシャ"
original = "「そうね～。私は奏サーシャ。前に少しだけお話したかしら～？」"
translation = "「그렇네~. 나는 카나데 사샤. 전에 잠깐 이야기했었나~?」"

[[dialogue]]
speaker = "聖沙"
original = "「あ、その節はパッキーさんがご迷惑を……。本人にはきつーいお仕置きをしておきましたから！」"
translation = "「아, 그때는 팟키 씨가 폐를 끼쳐서……. 본인에게는 아주 매서~운 벌을 줬으니까요!」"

[[dialogue]]
speaker = "アナ"
original = "「私はアナです。聖沙・<ruby>Ｂ<rt>ブリリアント</rt></ruby>・アリストテレスさんですよね？\u3000とても頼りになる方だと会長たちから伺っています」"
translation = "「저는 아나입니다. 미사 B 아리스토텔레스 씨 맞죠? 아주 의지가 되는 분이라고 회장님들께 들었습니다」"

[[dialogue]]
speaker = "マトイ"
original = "「詠野マトイです！\u3000星徒会では書記を担当しています！\u3000クルセイダースさまにお会いできるなんて光栄です！」"
translation = "「에이노 마토이입니다! 성도회에서는 서기를 담당하고 있습니다! 크루세이더스 님을 뵙게 되어 영광입니다!」"

[[dialogue]]
speaker = "聖沙"
original = "「サーシャさんに、アナさん、それにマトイさんね？\u3000それと──」"
translation = "「사샤 씨에, 아나 씨, 그리고 마토이 씨지? 그리고──」"

[[dialogue]]
speaker = "unk"
original = "何を隠そう新星学園の星徒会長です"
translation = "뭘 숨기랴 신성학원의 성도회장입니다"

[[dialogue]]
speaker = "聖沙"
original = "「え、ええ。改めてよろしくね。そう無駄に胸を張ってもらわなくてもいいけれど……」"
translation = "「어, 어어. 새삼스럽지만 잘 부탁해. 그렇게 쓸데없이 가슴을 펴지 않아도 되지만……」"

[[dialogue]]
speaker = "聖沙"
original = "「それで今日は何用かしら？\u3000何か私に頼み事がある、という話だったけれど」"
translation = "「그래서 오늘은 무슨 일이지? 나한테 부탁할 게 있다는 이야기였는데」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「聖沙には私たちの稽古を付けてもらおうと思って。平行世界の、とはいえ伝説の英雄とお手合わせできる機会なんて滅多にないもの！」"
translation = "「미사한테 우리 연습 좀 도와달라고 하려고. 평행세계의, 그것도 전설의 영웅이랑 대련할 기회는 좀처럼 없으니까!」"

[[dialogue]]
speaker = "聖沙"
original = "「つまり──勝負ということね！\u3000望むところだわ！」"
translation = "「즉── 승부라는 거구나! 바라던 바야!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「流石は聖沙！\u3000それじゃ各自変身して、トレーニングルームへ集合よ！\u3000特にマトイ！\u3000同じ雷属性の使い手として、みっちり揉んでもらいなさい！」"
translation = "「역시 미사! 그럼 각자 변신해서 트레이닝 룸으로 집합이야! 특히 마토이! 똑같은 번개 속성 사용자로서 아주 빡빡하게 도움받으라고!」"

[[dialogue]]
speaker = "マトイ"
original = "「う、うん！\u3000英雄さまの胸をお借りするつもりで頑張るね！」"
translation = "「으, 응! 영웅님의 가르침을 받는다는 마음으로 열심히 할게!」"

[[dialogue]]
speaker = "マトイ"
original = "「むぎゅぅ～……（バタリ）」"
translation = "「므규우~…… (털썩)」"

[[dialogue]]
speaker = "聖沙"
original = "「あ、大丈夫……！？\u3000マトイさん……！？」"
translation = "「아, 괜찮아……!? 마토이 씨……!?」"

[[dialogue]]
speaker = "unk"
original = "瞬殺……！"
translation = "순살……!"

[[dialogue]]
speaker = "マトイ"
original = "「あはは……。やっぱり英雄さまはお強いんですね……。普通な私が太刀打ちできるわけありませんでした……」"
translation = "「아하하……. 역시 영웅님은 강하시네요……. 평범한 제가 당해낼 수 있을 리가 없었어요……」"

[[dialogue]]
speaker = "聖沙"
original = "「そんなことないわよ。私だってなんの変哲もない普通の女の子よ。あなたと一緒だわ」"
translation = "「그렇지 않아. 나도 아무런 특징 없는 평범한 여자애야. 너랑 똑같다고」"

[[dialogue]]
speaker = "聖沙"
original = "「ヴィーナスさんに聞いたわよ。マトイさんは普通な自分をコンプレックスに思っているって。だからこそ誰よりも努力して、才能ある人についていこうとしてるって」"
translation = "「비너스 씨한테 들었어. 마토이 씨는 평범한 자신에 대해 콤플렉스를 가지고 있다고. 그렇기에 누구보다 노력해서 재능 있는 사람들을 따라가려 한다고 말이야」"

[[dialogue]]
speaker = "聖沙"
original = "「私は、好きよ。あなたみたいな人。私も何度勝負してもちっとも勝てない人がいるからよくわかるわ」"
translation = "「나는 좋아해, 너 같은 사람. 나도 몇 번을 승부해도 도무지 이길 수 없는 사람이 있어서 잘 알거든」"

[[dialogue]]
speaker = "マトイ"
original = "「え、英雄さまにそう言ってもらえると励みになります」"
translation = "「영, 영웅님께 그런 말을 들으니 힘이 나요」"

[[dialogue]]
speaker = "聖沙"
original = "「その英雄さまっていうのやめなさい。私とあなたは一緒って言ったでしょ？\u3000マトイさん、いえ、マトイ。あなたに足りないのは負けん気だわ」"
translation = "「그 영웅님이라는 거 그만둬. 나랑 너는 똑같다고 했지? 마토이 씨, 아니, 마토이. 너에게 부족한 건 오기야」"

[[dialogue]]
speaker = "聖沙"
original = "「私に負けて悔しくないの？\u3000いいえ、悔しいはずよ！\u3000なら立ち上がって何度でも挑んできなさい！\u3000それともたった一度の敗北であなたは諦めるのかしら？」"
translation = "「나한테 져서 분하지 않아? 아니, 분할 거야! 그러면 일어나서 몇 번이고 도전해! 아니면 단 한 번의 패배로 너는 포기할 셈이야?」"

[[dialogue]]
speaker = "マトイ"
original = "「！！\u3000あ、諦めません！\u3000もう一度お願いします！！」"
translation = "「!! 포, 포기하지 않아요! 한 번 더 부탁드립니다!!」"

[[dialogue]]
speaker = "聖沙"
original = "「ふふ、その意気よ！\u3000それじゃあ改めて──勝負よ！」"
translation = "「후후, 그 기세야! 그럼 다시── 승부야!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「どうやら上手くいったみたいね。聖沙とマトイは気が合うと思ってたの。私の目に狂いはなかったわ♪」"
translation = "「아무래도 잘 된 모양이네. 미사랑 마토이는 잘 맞을 거라고 생각했어. 내 눈은 틀리지 않았네♪」"

[[dialogue]]
speaker = "アナ"
original = "「確かに聖沙さんも努力の人に見えます。凛々しく誇り高いオーラを身に纏いながらも、心のうちに稲妻のような闘争心を秘めておられて……」"
translation = "「확실히 미사 씨도 노력하는 분으로 보여요. 늠름하고 긍지 높은 아우라를 두르고 계시면서도, 마음속에는 번개 같은 투쟁심을 숨기고 계셔서……」"

[[dialogue]]
speaker = "サーシャ"
original = "「ふふ、マトイちゃんは常に一歩引いちゃうクセがあるものね～。聖沙ちゃんとの訓練で変われるといいけれど～」"
translation = "「후후, 마토이짱은 항상 한 걸음 물러나는 버릇이 있으니까~. 미사짱과의 훈련으로 바뀔 수 있으면 좋겠는데~」"

[[dialogue]]
speaker = "聖沙"
original = "「ダメよ、マトイ！\u3000誰が相手でも媚びたり退いたりしちゃダメ！\u3000たとえ敗北を喫しても、心から敗北を認めることだけはしちゃいけないわ！」"
translation = "「안 돼, 마토이! 상대가 누구든 아부하거나 물러나면 안 돼! 비록 패배를 맛보더라도 마음으로 패배를 인정하는 것만큼은 하면 안 돼!」"

[[dialogue]]
speaker = "マトイ"
original = "「は、はい聖沙さん！\u3000いえ、お姉様と呼ばせてください……！」"
translation = "「네, 네 미사 씨! 아니, 언니라고 부르게 해주세요……!」"

[[dialogue]]
speaker = "聖沙"
original = "「お姉様、か。紫央のことを思い出すわね……。いいわ、そこまで私を頼りにしてくれるのなら、トコトン付き合ってあげる！」"
translation = "「언니, 라. 시오를 떠올리게 하네……. 좋아, 그 정도로 나를 의지해 준다면 끝까지 어울려 주지!」"

[[dialogue]]
speaker = "unk"
original = "そして２人の訓練は夜遅くまで続き──"
translation = "그리고 두 사람의 훈련은 밤늦게까지 이어져──"

[[dialogue]]
speaker = "聖沙"
original = "「よしよし。お疲れ様、マトイ。喉渇いたでしょ？\u3000ドリンクをあげるわ」"
translation = "「자자. 수고했어, 마토이. 목마르지? 드링크 줄게」"

[[dialogue]]
speaker = "マトイ"
original = "「ありがとうございま──じゃなくて！\u3000ほ、施しは受けません！\u3000ドリンクくらい自分で持ってきていますから！」"
translation = "「감사합니── 가 아니라! 배, 배풀어주는 건 받지 않겠습니다! 드링크 정도는 저도 챙겨왔으니까요!」"

[[dialogue]]
speaker = "聖沙"
original = "「ふふ！\u3000いいじゃない！\u3000そうよ、素直に受け取っちゃダメ！\u3000相手に弱みを見せた時点で勝負は負けなんだから！」"
translation = "「후후! 좋네! 그래, 순순히 받으면 안 돼! 상대에게 약점을 보여준 시점에서 승부는 진 거니까!」"

[[dialogue]]
speaker = "マトイ"
original = "「はい、お姉様！」"
translation = "「네, 언니!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「……ええと。これはどういうことかしら。聖沙の影響を受けてるのは間違いなさそうだけど……」"
translation = "「……에또. 이건 어떻게 된 일일까. 미사의 영향을 받고 있는 건 틀림없어 보이지만……」"

[[dialogue]]
speaker = "マトイ"
original = "「ふんだ、ヴィーナスってばちょっと強いからってあんまり調子に乗らないでよね！\u3000今に見てなさい、すぐに追い越してあげるんだから！」"
translation = "「흥, 비너스라고 해서 좀 강하다고 너무 잘난 척하지 마! 두고 봐, 금방 앞질러 줄 테니까!」"

[[dialogue]]
speaker = "unk"
original = "見事なまでのツンデレ台詞だ"
translation = "그야말로 훌륭한 츤데레 대사다"

[[dialogue]]
speaker = "ヴィーナス"
original = "「いやデレられてはいないわよ、デレられては……。一体どの方向で影響を受けてるのよ……」"
translation = "「아니 데레는 없다고, 데레는……. 대체 어느 방향으로 영향을 받고 있는 거야……」"

[[dialogue]]
speaker = "聖沙"
original = "「そうよ、マトイ！\u3000相手が実力者だからって臆しちゃいけないわ！\u3000常に自分に自信を持つの！\u3000あなたなら必ずヴィーナスさんを追い越せるわ！」"
translation = "「그래, 마토이! 상대가 실력자라고 해서 겁먹으면 안 돼! 항상 자신감을 가져! 너라면 반드시 비너스 씨를 추월할 수 있어!」"

[[dialogue]]
speaker = "マトイ"
original = "「ああ、お姉様……！\u3000私、もっと頑張ります！\u3000ヴィーナスなんてすぐにケチョンケチョンにしてみせますね！」"
translation = "「아아, 언니……! 저 더 열심히 할게요! 비너스 따위 금방 아주 박살을 내버릴 테니까요!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ま──ふふ、そこまで言うならやってみなさいよ♪\u3000返り討ちにしてあげるわ♪」"
translation = "「뭐── 후후, 그렇게까지 말한다면 해보라고♪ 아주 혼쭐을 내줄 테니까♪」"

[[dialogue]]
speaker = "聖沙"
original = "「むむ！\u3000挑発されたわよ、マトイ！\u3000生まれ変わったあなたの姿を見せてあげなさい！」"
translation = "「무무! 도발당했어, 마토이! 다시 태어난 너의 모습을 보여주렴!」"

[[dialogue]]
speaker = "マトイ"
original = "「いざ尋常に勝負だよ、ヴィーナス！\u3000お姉様との訓練の成果、見せてあげるから！」"
translation = "「자 정정당당하게 승부야, 비너스! 언니와의 훈련 성과를 보여줄 테니까!」"

