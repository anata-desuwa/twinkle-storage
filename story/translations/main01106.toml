[[dialogue]]
speaker = "unk"
original = "第８話,最後のピース,B"
translation = "제8화, 마지막 조각, B"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「やーらーれーたー」"
translation = "「져ー버ー렸ー네ー」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「もうっ、ふざけてるの！？」"
translation = "「정말, 장난치는 거야!?」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「いやいや、ふざけてないって。マジで限界なんだってば」"
translation = "「아니아니, 장난치는 거 아니라고. 진심으로 한계라니까.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「っ、ふぅ──ふぅ……なんとか……」"
translation = "「큭, 후우── 후우…… 어떻게든……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ええ──さすがは守護天使……やりづらいったらなかったわね……」"
translation = "「네에── 역시 수호 천사…… 상대하기 까다롭기 그지없었네요……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「悪いな、環──俺たちは先を急がせてもらう」"
translation = "「미안하다, 타마키── 우리는 서둘러 가도록 하겠다.」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「負けちゃったからには仕方ない。あの森はこの先だよ」"
translation = "「져 버렸으니 어쩔 수 없지. 그 숲은 이 앞이야.」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「本来なら誰も立ち入れない禁忌の領域だ。何せ、どんな物でも生き物でもぐちゃぐちゃにされちゃうからね」"
translation = "「본래라면 아무도 들어갈 수 없는 금기의 영역이지. 왜냐하면, 어떤 물건이든 생물이든 엉망진창으로 만들어 버리니까.」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「でも今日ならそんな侵食も全てが<b>凍てついてる</b>。最大のチャンスだ」"
translation = "「하지만 오늘이라면 그런 침식도 모든 것이 <b>얼어붙어</b> 있어. 최대의 기회야.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「やはり──ヴィーナスさんの読み通り……」"
translation = "「역시── 비너스 씨의 예상대로……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「それに、これだけ強くなった私たちなら……！」"
translation = "「게다가, 이렇게 강해진 우리들이라면……!」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「はは……確かにキミたちの成長は……確かめさせて、もらったよ。大したもんだ……」"
translation = "「하하…… 확실히 너희들의 성장은…… 확인시켜, 줬어. 대단하네……」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「でも……それだけじゃ、彼には勝てない……」"
translation = "「하지만…… 그것만으로는, 그를 이길 수 없어……」"

[[dialogue]]
speaker = "unk"
original = "仰向けに倒れた環は、遠い目をしてそう呟く。"
translation = "천장을 보고 쓰러진 타마키는, 먼 눈을 하며 그렇게 중얼거린다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「なら──俺たちに欠けているものは何だ？」"
translation = "「그렇다면── 우리들에게 부족한 것은 뭐지?」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「さぁ？\u3000でも、今度の相手は、モンスターなんかじゃないからね……」"
translation = "「글쎄? 하지만, 이번 상대는, 몬스터 같은 게 아니니까……」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「ただ……このまま邪魔者として退散していくのも、癪だしさ……少しくらいは力を貸すよ」"
translation = "「단지…… 이대로 방해꾼으로서 퇴장하는 것도, 분하니까…… 조금 정도는 힘을 빌려줄게.」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「まあ……これだけじゃ到底、足りないだろうけどね……」"
translation = "「뭐…… 이것만으로는 도저히, 부족하겠지만 말이야……」"

[[dialogue]]
speaker = "unk"
original = "そう言って、彼女がその場に取り出したものは──儚い輝石のカケラだった。"
translation = "그렇게 말하며, 그녀가 그 자리에 꺼내 보인 것은── 덧없는 휘석의 조각이었다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「これは──<ruby>霊屑<rt>クロスダスト</rt></ruby>……！」"
translation = "「이것은── 영설……!」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「あれ──なんだ、知ってるの……？」"
translation = "「어라── 뭐야, 알고 있어……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「マグダレナさん──それからアルモタヘルさんの分も預かってる。<ruby>黒騎士<rt>やつ</rt></ruby>に対抗するための力としてな」"
translation = "「막달레나 씨── 그리고 아르모타헬 씨의 몫도 맡아뒀다. 검은 기사에게 대항하기 위한 힘으로서 말이다.」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「あはは……なんだ。それなら──万に一つくらいは……なんとかなるかも……ね……」"
translation = "「아하하…… 뭐야. 그렇다면── 만에 하나 정도는…… 어떻게든 될지도…… 모르겠네……」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「それじゃ……世界が無事なら、また会えるかもね──」"
translation = "「그럼…… 세계가 무사하다면, 다시 만날지도 모르겠네──」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「い……市倉さん……！？」"
translation = "「이…… 이치쿠라 씨……!?」"

[[dialogue]]
speaker = "unk"
original = "環は最後にそう言い残すと。"
translation = "타마키는 마지막으로 그렇게 말하고는."

[[dialogue]]
speaker = "unk"
original = "眠るように目を閉じて、そのまま──"
translation = "잠들듯이 눈을 감고, 그대로──"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「消え……ちゃった……？」"
translation = "「사라……져 버렸어……?」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「マグダレニャのようニャ──依り代だったみたいニャンね」"
translation = "「막달레냐와 같은 냐── 의탁체였던 모양이냥네.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「人騒がせなやつだ……友人として、俺からも謝っておくよ。悪いな、みんな」"
translation = "「사람을 소란스럽게 하는 녀석이군…… 친구로서, 나도 사과하겠다. 미안하다, 모두.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「彼女の事情については──今、詮索している場合ではありませんね」"
translation = "「그녀의 사정에 대해서는── 지금, 캐묻고 있을 때가 아니네요.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「それよりも、大事なのは……」"
translation = "「그것보다, 중요한 것은……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。三人目の守護天使からも力を託された──俺たちはそれに応えるだけだ」"
translation = "「아아. 세 번째 수호 천사에게서도 힘을 위탁받았다── 우리는 그것에 응할 뿐이다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「どんなモンスターも──魔獣も──守護天使も──俺たちは乗り越えてきた。この先に待ち受けるものだって、きっと超えられる」"
translation = "「어떤 몬스터도── 마수도── 수호 천사도── 우리는 극복해 왔다. 이 앞에 기다리는 것도, 분명 뛰어넘을 수 있다.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ええ。レゾフに残した２人のためにも──負けられないわ」"
translation = "「네. 레조프에 남긴 두 사람을 위해서라도── 질 수 없어요.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「私だって、星徒会の一員なんだから……！」"
translation = "「나도, 성도회의 일원이니까……!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ヴィーナスさんのいる冥森林ネメシスへ──最後の一直線です！」"
translation = "「비너스 씨가 있는 명삼림 네메시스로── 마지막 일직선입니다!」"

