[[dialogue]]
speaker = "unk"
original = "第３話,陰陽師ＶＳ大怪盗,P"
translation = "제3화, 음양사 VS 대괴도, P"

[[dialogue]]
speaker = "unk"
original = "その日、俺はミヤハルと昼食をしに、大聖堂カフェテリアへとやって来ていた。"
translation = "그날, 나는 미야하루와 점심을 먹으러 대성당 카페테리아에 왔다."

[[dialogue]]
speaker = "ミヤハル"
original = "「会長はん、お隣ごめんやす<emoji=heart04>」"
translation = "「회장님, 옆자리 실례할게예<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ミヤハル、ここで腕に抱き着かれると……"
translation = "미야하루, 여기서 팔에 매달리면……"

[[dialogue]]
speaker = "ミヤハル"
original = "「ふふっ<emoji=heart04>\u3000周りの視線が気になります？」"
translation = "「후훗<emoji=heart04> 주변 시선이 신경 쓰입니까?」"

[[dialogue]]
speaker = "ミヤハル"
original = "「うちは人に見られると、むしろ興奮してまうから構わへんのやけど<emoji=heart04>」"
translation = "「내는 남이 보면 오히려 흥분해 버려서 상관없긴 한데예<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そんな風にくっ付きあって席に着きながら、昼食をしていると――"
translation = "그런 식으로 달라붙어 자리에 앉아 점심을 먹고 있자니――"

[[dialogue]]
speaker = "ミネコ"
original = "「やあ、会長。ごきげんよう♪」"
translation = "「안녕, 회장. 평안하신가요♪」"

[[dialogue]]
speaker = "unk"
original = "声を掛けてきたのは、流星学園１年生のミネコ・フランボワーズだった。"
translation = "말을 걸어온 것은 유성 학원 1학년인 미네코 프랑부아즈였다."

[[dialogue]]
speaker = "ミネコ"
original = "「おや？\u3000そちらの美人さんは、もしかして……」"
translation = "「어라? 그쪽 미인분은 혹시……」"

[[dialogue]]
speaker = "ミネコ"
original = "「<b>選星者</b>『陰陽師』の、安倍野ミヤハルさん――ですよね？」"
translation = "「<b>선성자</b> 『음양사』인 아베노 미야하루 씨―― 맞죠?」"

[[dialogue]]
speaker = "ミヤハル"
original = "「あら、うちが選星者やってこと、知ってはるん？\u3000それじゃあ、もしかして――」"
translation = "「어머, 내 가 선성자라는 거 알고 있었나 보네? 그렇다면 혹시――」"

[[dialogue]]
speaker = "ミネコ"
original = "「はい♪\u3000私も同じく選星者なので」"
translation = "「네♪ 저도 마찬가지로 선성자거든요」"

[[dialogue]]
speaker = "ミネコ"
original = "「私は、ミネコ・フランボワーズ。またの名を、大怪盗フランボウ。選星者の１人『大怪盗』を承っている者だよ☆\u3000以後お見知りおきを♪」"
translation = "「저는 미네코 프랑부아즈. 또 다른 이름은 대괴도 프랑보. 선성자 중 한 명인 『대괴도』를 맡고 있는 사람이야☆ 앞으로 잘 부탁해♪」"

[[dialogue]]
speaker = "unk"
original = "選星者とは、女神から世界に必要な『<ruby>役職<rt>ロール</rt></ruby>』を授けられた者のことを指す。"
translation = "선성자란, 여신으로부터 세계에 필요한 『역할』을 부여받은 자를 가리킨다."

[[dialogue]]
speaker = "unk"
original = "彼らは天からの啓示により、生まれながらにそのことを自覚し、役職に応じた特殊な能力を与えられている。"
translation = "그들은 하늘의 계시를 통해 태어날 때부터 그 사실을 자각하고, 역할에 따른 특수 능력을 부여받는다."

[[dialogue]]
speaker = "unk"
original = "そして、実は『陰陽師』であるミヤハルも、その１人だ。"
translation = "그리고 사실 『음양사』인 미야하루도 그중 한 명이다."

[[dialogue]]
speaker = "ミネコ"
original = "「かの有名な安倍晴明の子孫で、しかもこんな美人な女性と知り合えるなんて、とっても光栄だよ☆」"
translation = "「그 유명한 아베노 세이메이의 후손이고, 게다가 이렇게 미인인 여성과 알게 되다니 정말 영광이야☆」"

[[dialogue]]
speaker = "ミヤハル"
original = "「あら、お上手やねぇ<emoji=heart04>\u3000うちも会長はんから聞かされとったけど、ミネコはん、名探偵のジュエリーはんと会長はんを取り合う仲なんやろ？」"
translation = "「어머, 말솜씨가 좋네<emoji=heart04> 나도 회장님한테 들었는데, 미네코 씨는 명탐정 주얼리 씨랑 회장님을 두고 다투는 사이라며?」"

[[dialogue]]
speaker = "ミネコ"
original = "「ああ、ジュエリーの言う『愛』というのを知りたくてね。その為に会長の心を盗もうと攻略の最中なんだ♪」"
translation = "「아아, 주얼리가 말하는 『사랑』이라는 걸 알고 싶어서 말이야. 그러기 위해서 회장의 마음을 훔치려고 공략하는 중이야♪」"

[[dialogue]]
speaker = "ミヤハル"
original = "「なるほどなぁ。つまりはミネコはんも……会長はんの<b>体狙い</b>っていうわけやね<emoji=heart04>」"
translation = "「그렇구나. 그러니까 미네코 씨도…… 회장님의 <b>몸을</b> <b>노린다</b>는 뜻이네<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「体狙い！？」"
translation = "「몸을 노린다고!?」"

[[dialogue]]
speaker = "ミヤハル"
original = "「アカン、ポロッとストレートに言うてもうたわぁ<emoji=heart04>」"
translation = "「안 되겠다, 나도 모르게 너무 직설적으로 말해버렸네<emoji=heart04>」"

[[dialogue]]
speaker = "ミヤハル"
original = "「でも――ふふっ<emoji=heart04>\u3000『愛』って言ったら、やっぱり心だけやのうて、そっちの意味も含みますやろ？」"
translation = "「하지만―― 후훗<emoji=heart04> 『사랑』이라고 하면 역시 마음뿐만이 아니라 그쪽 의미도 포함되는 거잖아?」"

[[dialogue]]
speaker = "ミネコ"
original = "「い、いや、間違ってはないけど……！\u3000でも私は、もっと愛という名のロマンを追い求めているというか……」"
translation = "「아, 아니, 틀린 말은 아니지만……! 하지만 나는 좀 더 사랑이라는 이름의 로망을 추구하고 있달까……」"

[[dialogue]]
speaker = "unk"
original = "（あのミネコが動揺している……！？）"
translation = "（그 미네코가 동요하고 있어……!?）"

[[dialogue]]
speaker = "ミヤハル"
original = "「あら、もしかして恥ずかしがっとりますの？\u3000大怪盗はん、意外とウブなんやねぇ<emoji=heart04>」"
translation = "「어머, 혹시 부끄러워하는 거야? 대괴도 씨, 의외로 순진하네<emoji=heart04>」"

[[dialogue]]
speaker = "ミヤハル"
original = "「うちはもう、会長はんのそっちの方も盗む気満々やよ<emoji=heart04>」"
translation = "「나는 이미 회장님의 그쪽 부분도 훔칠 생각 가득이야<emoji=heart04>」"

[[dialogue]]
speaker = "ミヤハル"
original = "「はよ盗みとうて、想像するとうち――<b>濡れて</b>きてまうわぁ<emoji=heart04>」"
translation = "「얼른 훔치고 싶어서 상상만 해도 나―― <b>젖어</b>버려<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「ちょっ！？\u3000公の場でこの人、なに言ってんの！？」"
translation = "「잠깐!? 공공장소에서 이 사람, 대체 무슨 소릴 하는 거야!?」"

[[dialogue]]
speaker = "unk"
original = "慌てたミネコが、指パッチンをして星術を発動する。"
translation = "당황한 미네코가 손가락을 튕겨 성술을 발동한다."

[[dialogue]]
speaker = "unk"
original = "ミヤハルの発言で集まっていた生徒たちから視線――注目が、何事もなかったのように霧散して、元に戻っていく。"
translation = "미야하루의 발언으로 모여들던 학생들의 시선―― 주목이 아무 일도 없었다는 듯이 흩어져 원래대로 돌아간다."

[[dialogue]]
speaker = "ミヤハル"
original = "「……！\u3000驚いたわぁ。会長はんからも聞いてたけど、これが大怪盗の能力なん？」"
translation = "「……! 놀라워라. 회장님한테 듣긴 했지만, 이게 대괴도의 능력이야?」"

[[dialogue]]
speaker = "ミネコ"
original = "「そう。選星者として与えられた能力『情報改竄』……って、変なことで力を使わせないでよ！」"
translation = "「맞아. 선성자로서 부여받은 능력 『정보 개찬』…… 그보다, 이상한 일에 힘 쓰게 하지 마!」"

[[dialogue]]
speaker = "ミヤハル"
original = "「羨ましいわぁ。これって、相手に認識されてる自分の情報を操作すれば、透明人間みたいにもなれるってことやろ？\u3000つまり――」"
translation = "「부럽네. 이거 상대에게 인식되는 자신의 정보를 조작하면 투명 인간처럼 될 수도 있다는 거지? 즉――」"

[[dialogue]]
speaker = "ミヤハル"
original = "「全裸でお散歩したり、野外プレイもし放題ってことやろ？」"
translation = "「전라로 산책하거나 야외 플레이도 마음껏 할 수 있다는 거잖아?」"

[[dialogue]]
speaker = "ミネコ"
original = "「そんな使い方はしないよ！？\u3000というか、さっきから発言がポロリしまくってるんだけど！？」"
translation = "「그런 용도로 안 써!? 그보다 아까부터 발언이 너무 노골적이라고!?」"

[[dialogue]]
speaker = "ミヤハル"
original = "「ふふっ<emoji=heart04>\u3000どうせ無かったことにできると思うたら、つい<emoji=heart04>」"
translation = "「후훗<emoji=heart04> 어차피 없었던 일로 만들 수 있다고 생각하니 그만<emoji=heart04>」"

[[dialogue]]
speaker = "ミヤハル"
original = "「でも、ほんまに羨ましいわぁ。うちの陰陽術と交換して欲しいわぁ、その<b>露出能力</b><emoji=heart04>」"
translation = "「그래도 정말 부럽네. 내 음양술이랑 바꾸고 싶다, 그 <b>노출</b> <b>능력</b><emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「その言い方は止めてくれるかな！？」"
translation = "「그렇게 부르는 건 관둬 줄래!?」"

[[dialogue]]
speaker = "ミネコ"
original = "「噂には聞いてたけど、ミヤハルさんって、ほんとにエロトークが止まらないね……」"
translation = "「소문은 들었지만, 미야하루 씨는 정말 음담패설이 멈추질 않네……」"

[[dialogue]]
speaker = "ミヤハル"
original = "「ふふふっ<emoji=heart04>\u3000堪忍しておくれやす<emoji=heart04>\u3000うちはえっちなこと大好きで、『歩く１８禁』って言われとるドスケベ陰陽師やから<emoji=heart04>」"
translation = "「후후훗<emoji=heart04> 용서해 줘<emoji=heart04> 나는 야한 거 너무 좋아해서 『걸어 다니는 19금』이라 불리는 초변태 음양사니까<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「自分で言っちゃうのそれ！？」"
translation = "「그걸 본인 입으로 말해!?」"

[[dialogue]]
speaker = "ミヤハル"
original = "「あっ、スケベトークついでになんやけど、ミネコはんのえっちな性癖を聞いてもええやろか？」"
translation = "「앗, 변태 토크 하는 김에 묻는 건데, 미네코 씨의 야한 성벽을 물어봐도 될까?」"

[[dialogue]]
speaker = "ミネコ"
original = "「趣味を聞くみたいなノリで！？」"
translation = "「취미 물어보는 텐션으로!?」"

[[dialogue]]
speaker = "ミヤハル"
original = "「ふふふっ<emoji=heart04>\u3000うち、最近他人との仲良くなり方が少し分かって来たんよ～」"
translation = "「후후훗<emoji=heart04> 나 요즘 타인이랑 친해지는 법을 조금 알 것 같아~」"

[[dialogue]]
speaker = "ミネコ"
original = "「その仲良くなり方は果たして合ってるのかな！？」"
translation = "「그 친해지는 법이 과연 맞는 걸까!?」"

[[dialogue]]
speaker = "ミヤハル"
original = "「ちなみにうちは、露出癖があってな？」"
translation = "「참고로 나는 노출증이 있거든?」"

[[dialogue]]
speaker = "ミネコ"
original = "「か、会長～～っ！\u3000ヘルプッ！\u3000この先輩のセクハラを止めてぇ～～～っ！！！」"
translation = "「회, 회장님~~! 헬프! 이 선배의 성희롱 좀 멈춰줘요~~~!!!」"

[[dialogue]]
speaker = "unk"
original = "ミヤハル、めっ！"
translation = "미야하루, 안 돼!"

[[dialogue]]
speaker = "ミヤハル"
original = "「あんっ<emoji=heart04>\u3000会長はんに怒られてもうた<emoji=heart04>」"
translation = "「앙<emoji=heart04> 회장님한테 혼나버렸다<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺がポンと頭に手を置くと、ちろっと舌を出して、悪戯っぽく微笑むミヤハルなのだった――"
translation = "내가 툭 하고 머리에 손을 얹자, 살짝 혀를 내밀며 장난스럽게 미소 짓는 미야하루였다――"

