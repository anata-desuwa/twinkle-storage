[[dialogue]]
speaker = "unk"
original = "魔界から九浄家へと戻った編成隊は、再び作戦会議の席に着いた。"
translation = "마계에서 쿠죠 가문으로 돌아온 편성 부대는 다시 작전 회의석에 앉았다."

[[dialogue]]
speaker = "トリシャ"
original = "「あと一歩、届きませんでしたか……守護天使様は一筋縄ではいきませんね……」"
translation = "「한 끝 차이로 닿지 않았나요…… 수호천사 님은 역시 호락호락하지 않군요……」"

[[dialogue]]
speaker = "ウズメイア"
original = "「でもでも！\u3000アイドルの２人を呼んでくれたのはマジ最高だったよ！\u3000あたしもめーっちゃアガったし！」"
translation = "「그래도 그래도! 아이돌 두 분을 불러준 건 진짜 최고였어! 나도 완전 기분 좋았고!」"

[[dialogue]]
speaker = "フィオナ"
original = "「私が冷えさせてしまった場を見事に温めて──うぅ……思い出すだけで恥ずかしさと申し訳なさがこみ上げてきます……」"
translation = "「제가 식혀버린 분위기를 멋지게 데워주시고── 으으…… 생각만 해도 부끄러움과 죄송함이 몰려와요……」"

[[dialogue]]
speaker = "舞亜"
original = "「ごめんなさい。やっぱり私の表現力が足りてなかったみたいだね」"
translation = "「미안해. 역시 내 표현력이 부족했나 봐♥」"

[[dialogue]]
speaker = "ソフィア"
original = "「そんなことない！\u3000舞亜は完璧だった。悔しいけど、あれを超える個人技なんて私には考えつかないよ……」"
translation = "「그렇지 않아! 마아는 완벽했어. 분하지만 저걸 뛰어넘는 개인 기술은 나로서는 생각도 못 해……」"

[[dialogue]]
speaker = "マグダレナ"
original = "「はい、悲観することはありません。あと少しでオオヒメが姿を現すところまでいっていました。実に惜しかったです」"
translation = "「네, 비관할 것 없습니다. 조금만 더 하면 오오히메가 모습을 드러낼 뻔했습니다. 참으로 아쉬웠어요.」"

[[dialogue]]
speaker = "舞亜"
original = "「ほんと？」"
translation = "「정말?♥」"

[[dialogue]]
speaker = "マグダレナ"
original = "「舞亜さまの演技は見事なものでした。その場にいた誰もが心を奪われるほどに」"
translation = "「마아 님의 연기는 훌륭했습니다. 그 자리에 있던 누구라도 마음을 빼앗길 정도로요.」"

[[dialogue]]
speaker = "マグダレナ"
original = "「むしろ舞亜さまのパフォーマンスが素晴らしかったからこそ、より高みを求めたのだと思います。オオヒメは貪欲が過ぎます」"
translation = "「오히려 마아 님의 퍼포먼스가 뛰어났기 때문에 더 높은 경지를 원했던 것이라 생각합니다. 오오히메는 탐욕이 지나치군요.」"

[[dialogue]]
speaker = "舞亜"
original = "「高み……か」"
translation = "「높은 경지……라♥」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それなら簡単ね。さっきのを超えた、もっともーっと素晴らしい演技をすればいいだけよ！」"
translation = "「그럼 간단하네. 방금 전을 뛰어넘는, 훨씬 훨씬 훌륭한 연기를 하면 되는 것뿐이야!」"

[[dialogue]]
speaker = "ソフィア"
original = "「『だけ』って簡単に言いますけど、そんな簡単にできるわけありません！\u3000金メダルを更に超えるとなると──」"
translation = "「『뿐』이라고 간단히 말씀하시지만, 그렇게 쉽게 될 리가 없잖아요! 금메달을 더 뛰어넘으려면──」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「宇宙レベルってことかしら。それこそ星騎士に相応しい到達点だわ！」"
translation = "「우주 레벨이라는 거겠지. 그야말로 성기사에 어울리는 도달점이야!」"

[[dialogue]]
speaker = "舞亜"
original = "「ふふ、簡単に言ってくれちゃうね。悩んでるこっちが馬鹿馬鹿しくなっちゃう」"
translation = "「후후, 말은 참 쉽게 한다니까. 고민하고 있는 내가 바보 같아지네♥」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「馬鹿馬鹿しいくらいで良いのよ。だって、隠し芸大会なんだから！」"
translation = "「바보 같을 정도로 좋은 거야. 왜냐면, 장기 자랑 대회니까!」"

[[dialogue]]
speaker = "舞亜"
original = "「そうだね。新しいプログラムを組み立てるには、ヴィーナスさんみたいな自由で柔軟な発想を忘れちゃいけない……うーん、もう少しで閃けそうなんだけど」"
translation = "「그렇네. 새로운 프로그램을 짜려면 비너스 씨 같은 자유롭고 유연한 발상을 잊어서는 안 돼…… 으음, 조금만 더 하면 떠오를 것 같은데♥」"

[[dialogue]]
speaker = "ヘレナ"
original = "「そんなこともあろうかとー！」"
translation = "「그럴 줄 알고~!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ヘレナちゃん！？」"
translation = "「헬레나 짱!?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「我が魂の囁きに応じて、追加衣装を用意した！\u3000巫女装束の新春フォームである。舞亜、貴殿にこれを託そう」"
translation = "「내 영혼의 속삭임에 응하여 추가 의상을 준비했다! 무녀복 형태의 신춘 폼이다. 마아, 그대에게 이것을 맡기지.」"

[[dialogue]]
speaker = "舞亜"
original = "「え、ありがとうございます」"
translation = "「엣, 감사합니다♥」"

[[dialogue]]
speaker = "ヘレナ"
original = "「守護天使は女神を補佐する神聖なる存在。つまり神殿にて奉納する舞とは神楽だ。神楽舞を奉納するならば、この衣装こそが最適解であろう」"
translation = "「수호천사는 여신을 보좌하는 신성한 존재. 즉 신전에서 봉납하는 춤이란 카구라다. 카구라 춤을 봉납한다면 이 의상이야말로 최적의 해답이겠지.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「そして、最も舞を愛する貴殿に相応しいプリティーな代物であろう？\u3000蘭美、着付けを」"
translation = "「그리고 가장 춤을 사랑하는 그대에게 어울리는 프리티한 물건 아니겠나? 라비, 착용을 도와라.」"

[[dialogue]]
speaker = "蘭美"
original = "「お任せください。さあ舞亜様、行くわよ」"
translation = "「맡겨주십시오. 자 마아 님, 가시죠.」"

[[dialogue]]
speaker = "舞亜"
original = "「え、いいよ。脱がされるの、ちょっと恥ずかしいし」"
translation = "「에, 괜찮아. 옷 벗겨지는 거 좀 부끄러운걸♥」"

[[dialogue]]
speaker = "蘭美"
original = "「自分で和服を着たことあるかしら？\u3000ちゃんと締めないとだらしないことになるわよ」"
translation = "「혼자서 화복을 입어본 적 있나요? 제대로 조이지 않으면 꼴불견이 될 거예요.」"

[[dialogue]]
speaker = "舞亜"
original = "「あ、それは勘弁。じゃあお願いしようかな」"
translation = "「아, 그건 사양할게. 그럼 부탁할까나♥」"

[[dialogue]]
speaker = "蘭美"
original = "「心配しなくても大丈夫よ、そんなに時間はかけないから」"
translation = "「걱정 마세요, 그렇게 시간 오래 걸리지 않으니까요.」"

[[dialogue]]
speaker = "unk"
original = "俺、ちょっと外すね……"
translation = "「나, 잠깐 자리를 피할게…….」"

[[dialogue]]
speaker = "舞亜"
original = "「あ、見ていかないんだ、会長さん？」"
translation = "「아, 안 보고 갈 거야, 회장님?♥」"

[[dialogue]]
speaker = "unk"
original = "見ていくわけないでしょ！？"
translation = "「보고 갈 리가 없잖아!?」"

[[dialogue]]
speaker = "舞亜"
original = "「はは、冗談冗談。じゃ、また後でね」"
translation = "「하하, 농담 농담. 그럼 나중에 봐♥」"

[[dialogue]]
speaker = "unk"
original = "舞亜の着替えを待つこと少し──"
translation = "마아의 옷 갈아입기를 기다린 지 잠시 후──"

[[dialogue]]
speaker = "蘭美"
original = "「どう、あっという間だったでしょう？\u3000それでどうかしら、自分の巫女装束を見てみて」"
translation = "「어때요, 순식간이었죠? 그럼 어때요, 자신의 무녀복 차림을 본 소감은.」"

[[dialogue]]
speaker = "舞亜"
original = "「うん、いつもと全然違うから、とても新鮮。スタイリッシュだと思うけど、どうかな？」"
translation = "「응, 평소랑 전혀 달라서 아주 신선해. 스타일리시하다고 생각하는데, 어때?♥」"

[[dialogue]]
speaker = "unk"
original = "すごく綺麗だね"
translation = "「정말 예쁘네.」"

[[dialogue]]
speaker = "ソフィア"
original = "「に、似合ってると思いますよ。舞亜のためだけに作られたような仕上がりで、すごく、とても……」"
translation = "「어, 어울린다고 생각해요. 마아만을 위해 만들어진 것 같은 완성도라, 정말로, 아주……」"

[[dialogue]]
speaker = "ウズメイア"
original = "「舞亜きゃわわ～♪\u3000これ着て踊ったら、オオヒメ様だってイチコロでしょ～！」"
translation = "「마아 짱 귀여워~♪ 이거 입고 춤추면 오오히메 님도 한 방이라니까~!」"

[[dialogue]]
speaker = "ヘレナ"
original = "「うむ！\u3000やはり我が魂の囁きは確かであった！\u3000守護天使であろうと秒で顔を出すであろう！」"
translation = "「음! 역시 내 영혼의 속삭임은 정확했군! 수호천사라 할지라도 몇 초 만에 얼굴을 내밀 것이다!」"

[[dialogue]]
speaker = "舞亜"
original = "「ありがとう、ヘレナさん。……だけどこれだけじゃ足りないかも。私だけの力じゃなくて……」"
translation = "「고마워, 헬레나 씨. ……하지만 이것만으로는 부족할지도 몰라. 나만의 힘이 아니라……♥」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ふむ、何か閃いたようだな。新しい着想たり得たか」"
translation = "「흠, 뭔가 떠오른 모양이구나. 새로운 착상이 되었느냐.」"

[[dialogue]]
speaker = "舞亜"
original = "「うん。今までにやったことのないパフォーマンスができそう。一度失敗したのは無駄じゃなかったかも」"
translation = "「응. 지금까지 해본 적 없는 퍼포먼스를 할 수 있을 것 같아. 한 번 실패한 게 헛수고는 아니었나 봐♥」"

[[dialogue]]
speaker = "舞亜"
original = "「ソフィ、ウズメ、ちょっと手伝ってくれる？」"
translation = "「소피, 우즈메, 좀 도와줄래?♥」"

[[dialogue]]
speaker = "ソフィア"
original = "「え……は、はい。私にできることなら」"
translation = "「엣…… 네, 네. 제가 할 수 있는 일이라면요.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「面白いこと見つけちゃったカンジ？\u3000なんでも言って！」"
translation = "「재미있는 거라도 찾은 느낌? 뭐든지 말해!」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ふふ、仲の良いことだ。貴殿らの打開策と救世に期待しておるぞ」"
translation = "「후후, 사이가 좋구나. 그대들의 타개책과 구세에 기대하마.」"

