[[dialogue]]
speaker = "unk"
original = "第３話,アイドルの沸点,P"
translation = "제3화, 아이돌의 비점, P"

[[dialogue]]
speaker = "unk"
original = "レミカと仲良くなってから、時間が合った時は、戦闘訓練も一緒にすることが多くなっていた――"
translation = "레미카와 친해진 뒤로, 시간이 맞을 때는 전투 훈련도 함께하는 일이 많아졌다――"

[[dialogue]]
speaker = "レミカ"
original = "「ふぅ……さっきの戦闘時の連携、パーフェクト、かな？」"
translation = "「후우…… 방금 전투 때의 연계, 퍼펙트했지?」"

[[dialogue]]
speaker = "レミカ"
original = "「――ん？\u3000アイドルなのに星騎士としても努力してるのは、凄い？」"
translation = "「――응? 아이돌이면서 성기사로서도 노력하는 게 대단하다고?」"

[[dialogue]]
speaker = "レミカ"
original = "「元々は家庭の事情で、星力持ちなら学費がかからないからっていう、現金な入学理由だったんだけどね」"
translation = "「원래는 가정 사정으로 성력 소지자라면 학비가 안 든다는 타산적인 입학 이유였지만 말이야」"

[[dialogue]]
speaker = "レミカ"
original = "「でも、私が思い描くアイドルは、自分に戦える力があるなら、皆の笑顔の為にリクリエから決して逃げたりしない――」"
translation = "「하지만 내가 그리는 아이돌은, 자신에게 싸울 힘이 있다면 모두의 미소를 위해 리크리에로부터 결코 도망치지 않아――」"

[[dialogue]]
speaker = "レミカ"
original = "「だから私は、歌って踊って戦える、完全無欠――最高で最強のトップアイドルを目指してるんだ」"
translation = "「그래서 나는 노래하고 춤추며 싸울 수 있는 완전무결―― 최고이자 최강의 톱 아이돌을 목표로 하고 있어」"

[[dialogue]]
speaker = "unk"
original = "俺も歌いながら戦ってみるかな"
translation = "나도 노래하면서 싸워볼까"

[[dialogue]]
speaker = "レミカ"
original = "「なんで？\u3000――戦闘中の私の歌で、力が湧いた気がするから？」"
translation = "「왜? ――전투 중인 내 노래로 힘이 솟는 기분이 들어서?」"

[[dialogue]]
speaker = "レミカ"
original = "「いやそれ、戦闘時の私の歌は星術だし。というか、歌で戦うんじゃなくて、歌いながら殴りかかるって……」"
translation = "「아니 그건 전투 중의 내 노래는 성술이니까. 그보다 노래로 싸우는 게 아니라 노래하면서 때리러 간다니……」"

[[dialogue]]
speaker = "レミカ"
original = "「ぷっ……ふ、ふふっ……！」"
translation = "「풉…… 후, 후후……!」"

[[dialogue]]
speaker = "unk"
original = "あ、ツボった"
translation = "아, 터졌다"

[[dialogue]]
speaker = "レミカ"
original = "「……すぅ～……はぁ……ふぅ。いや、別に笑ってないから」"
translation = "「……쓰읍…… 하아…… 후우. 아니, 딱히 웃은 거 아니니까」"

[[dialogue]]
speaker = "レミカ"
original = "「アイドルはそんな程度で笑ったりしない」"
translation = "「아이돌은 그 정도로 웃거나 하지 않아」"

[[dialogue]]
speaker = "unk"
original = "レミカって笑いの沸点低いよね"
translation = "레미카는 웃음보가 되게 낮네"

[[dialogue]]
speaker = "レミカ"
original = "「は？\u3000何言ってんの？\u3000そんなわけないじゃん」"
translation = "「하? 무슨 소리야? 그럴 리가 없잖아」"

[[dialogue]]
speaker = "レミカ"
original = "「今のはちょっと間が悪く、くしゃみしそうになっただけだから。会長の勘違いだよ」"
translation = "「방금 건 좀 타이밍 나쁘게 재채기가 나오려고 했을 뿐이니까. 회장의 착각이야」"

[[dialogue]]
speaker = "レミカ"
original = "「って、何その疑いの眼差しは？\u3000違うから。私の沸点は低くない」"
translation = "「그보다 뭐야 그 의심스러운 눈초리는? 아니라니까. 내 웃음보는 낮지 않아」"

[[dialogue]]
speaker = "レミカ"
original = "「――え？\u3000何？\u3000ヴィーナスのモノマネをする？\u3000いきなりどういう……」"
translation = "「――에? 뭐야? 비너스 성대모사를 한다고? 갑자기 무슨……」"

[[dialogue]]
speaker = "unk"
original = "困った時のファンこそ、真のファンってことよね！"
translation = "곤란할 때의 팬이야말로 진짜 팬인 법이지!"

[[dialogue]]
speaker = "レミカ"
original = "「っ……！！！！！！\u3000っ……！！\u3000はぁぁぁ！\u3000くっっ！\u3000ふふっ…………んふぅっっっ！！！」"
translation = "「윽……!!!!!! 윽……!! 하아아! 큭큭! 후훗………… 응훕흣!!!」"

[[dialogue]]
speaker = "レミカ"
original = "「すぅぅ～～～……はぁぁ～～…………。ん、全然似てない」"
translation = "「쓰으으~~…… 하아아~~………… 응, 전혀 안 비슷해」"

[[dialogue]]
speaker = "unk"
original = "……やっぱり沸点低いよね？"
translation = "……역시 웃음보 낮지?"

[[dialogue]]
speaker = "レミカ"
original = "「絶対にそんなことない。アイドルはそんな簡単に笑ったりしない」"
translation = "「절대로 그렇지 않아. 아이돌은 그렇게 쉽게 웃지 않아」"

[[dialogue]]
speaker = "レミカ"
original = "「今のは運動した後によくある、脇腹ちょっと痛くなるやつが来ただけから」"
translation = "「방금 건 운동한 뒤에 자주 있는, 옆구리가 좀 아픈 게 왔을 뿐이니까」"

[[dialogue]]
speaker = "unk"
original = "（歌いながら戦うフリを見せる）"
translation = "（노래하면서 싸우는 시늉을 보여준다）"

[[dialogue]]
speaker = "レミカ"
original = "「ぐふっ……！\u3000ちょっ、またそれ……ぷっ……ふっ……ふふ……ふふふっ……！」"
translation = "「구흣……! 잠깐, 또 그거…… 풉…… 훗…… 후후…… 후후훗……!」"

[[dialogue]]
speaker = "レミカ"
original = "「い、いや……笑ってない……私は何も見てないから……ふふふっ……！」"
translation = "「아, 아니…… 안 웃었어…… 난 아무것도 안 봤으니까…… 후후훗……!」"

[[dialogue]]
speaker = "レミカ"
original = "「って、まだ続けるの？\u3000シュール過ぎて、そんなの絶対に笑えないから、いくら続けても、む、無駄だから……くっ……ふふっ……ふっ……！」"
translation = "「그보다 아직도 계속하는 거야? 너무 슈르해서 그런 거 절대로 안 웃기니까, 아무리 계속해도 무, 소용없으니까…… 큭…… 후후…… 훗……!」"

[[dialogue]]
speaker = "レミカ"
original = "「ああもう、とにかくそれ禁止っ、禁止だからっ」"
translation = "「아아 정말, 어쨌든 그거 금지, 금지니까!」"

[[dialogue]]
speaker = "レミカ"
original = "「え～、とか言わない。私をからかって遊んでるでしょ」"
translation = "「에~ 라니 하지 마. 나 놀리면서 즐기고 있지?」"

[[dialogue]]
speaker = "unk"
original = "反応が面白いから、もっと見たかった……"
translation = "반응이 재미있어서 더 보고 싶었는데……"

[[dialogue]]
speaker = "レミカ"
original = "「いや、面白いとかないから。アイドルはお笑い芸人じゃないんだよ」"
translation = "「아니, 재미있다니 그런 거 없어. 아이돌은 코미디언이 아니라고」"

[[dialogue]]
speaker = "レミカ"
original = "「――そこにこだわる必要があるのかって？\u3000だって……私の目指すアイドルはカッコ可愛いものだから」"
translation = "「――거기에 집착할 필요가 있냐고? 그야…… 내가 목표로 하는 아이돌은 멋지고 귀여운 거니까」"

[[dialogue]]
speaker = "レミカ"
original = "「ちょっとしたことですぐツボるとか、カッコよくないし……」"
translation = "「사소한 일로 금방 빵 터진다니, 멋지지 않고……」"

[[dialogue]]
speaker = "unk"
original = "ギャップがあって可愛いと思うけどなぁ"
translation = "갭이 있어서 귀엽다고 생각하는데 말이야"

[[dialogue]]
speaker = "レミカ"
original = "「ふ～ん、可愛い……って、はぁ！？」"
translation = "「흐~응, 귀엽…… 다고, 하아!?」"

[[dialogue]]
speaker = "レミカ"
original = "「い、いきなり何言ってんの！？\u3000ば、バカじゃないの、会長……っ」"
translation = "「갑, 갑자기 무슨 소리야!? 바, 바보 아니야, 회장……!」"

[[dialogue]]
speaker = "レミカ"
original = "「変なことばかり言うから、恥ずかしくなってきたじゃん。負けてるみたいで、なんか悔しいんだけど……」"
translation = "「이상한 소리만 하니까 부끄러워졌잖아. 지는 것 같아서 왠지 분한데……」"

[[dialogue]]
speaker = "レミカ"
original = "「っ……こうなったら……会長も同じ目にあってもらうから……！」"
translation = "「윽…… 이렇게 되면…… 회장도 똑같이 당하게 해줄 테니까……!」"

[[dialogue]]
speaker = "レミカ"
original = "「――どういうことって……こういうことっ」"
translation = "「――무슨 소리냐니…… 이런 소리!」"

[[dialogue]]
speaker = "unk"
original = "ちょっ……くすぐったい！\u3000あははははは！"
translation = "잠깐…… 간지러워! 아하하하하하!"

[[dialogue]]
speaker = "レミカ"
original = "「こちょこちょこちょこちょこちょ～」"
translation = "「간질간질간질간질간질~」"

[[dialogue]]
speaker = "レミカ"
original = "「散々笑わせようとしてきた、お返し。簡単には許さないから」"
translation = "「잔뜩 웃기려고 했던 보답이야. 쉽게 용서 안 할 거니까」"

[[dialogue]]
speaker = "レミカ"
original = "「あ、でも……これちょっと楽しい、かも♪」"
translation = "「아, 하지만…… 이거 좀 즐거울지도♪」"

[[dialogue]]
speaker = "unk"
original = "ご、ゴメン、謝るから許して……！"
translation = "미, 미안, 사과할 테니까 용서해줘……!"

[[dialogue]]
speaker = "unk"
original = "その後も楽しそうに、中々くすぐりを止めてくれないレミカなのだった――"
translation = "그 뒤로도 즐거운 듯이 좀처럼 간지럽히기를 멈춰주지 않는 레미카였다――"

