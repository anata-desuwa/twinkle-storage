[[dialogue]]
speaker = "unk"
original = "第２話,守護天使の休日？,P"
translation = "제2화, 수호천사의 휴일?, P"

[[dialogue]]
speaker = "マグダレナ"
original = "「私のわがままにお付き合いいただいてすみません。この世界を自分の目で見てみたいなどと……」"
translation = "「제 이기심에 어울려 주셔서 죄송해요. 이 세계를 제 눈으로 보고 싶다니……」"

[[dialogue]]
speaker = "unk"
original = "全然大丈夫です"
translation = "전혀 괜찮습니다."

[[dialogue]]
speaker = "マグダレナ"
original = "「ふふ、そう言っていただけてありがたいです」"
translation = "「후후, 그렇게 말씀해 주시니 감사해요.」"

[[dialogue]]
speaker = "ソフィア"
original = "「流星と新星の星徒会で案内することになりましたけど、ちょっと珍しい組み合わせですね。私と新星の会長さんとヴィーナスさんですから」"
translation = "「유성과 신성의 성도회에서 안내하게 되었습니다만, 조금 희귀한 조합이네요. 저랑 신성의 회장님이랑 비너스 씨니까요.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ところでその前に聞いておきたいんだけど、どうして私が御子なの？」"
translation = "「그런데 그전에 물어보고 싶은 게 있는데, 어째서 내가 무녀인 거야?」"

[[dialogue]]
speaker = "マグダレナ"
original = "「御子――いえ、今はヴィーナスさまとお呼びしましょう」"
translation = "「무녀―― 아니요, 지금은 비너스 님이라고 부르기로 하죠.」"

[[dialogue]]
speaker = "マグダレナ"
original = "「今はこの身の堕天を防ぐため、本体とのリンクは絶っている状態です。正気を失った守護天使マグダレナの中の、わずかに残った理性。それを切り取ったものが私です」"
translation = "「지금은 이 몸의 타천을 막기 위해, 본체와의 링크는 끊어둔 상태입니다. 제정신을 잃은 수호천사 막달레나 속에서, 근소하게 남은 이성. 그것을 잘라낸 것이 저입니다.」"

[[dialogue]]
speaker = "マグダレナ"
original = "「ですから申し訳ありません。今この体の私が持っている情報は完全ではなく、あの時フィーニスの塔で話した以上のことはわからないのです」"
translation = "「그러니 죄송합니다. 지금 이 몸의 제가 가진 정보는 완전하지 않아서, 그때 피니스의 탑에서 이야기한 것 이상의 일은 알 수 없어요.」"

[[dialogue]]
speaker = "ソフィア"
original = "「コンピューターで言うなら、データの一部だけを移植した状態……ということでしょうか。やはり力も万全ではないのですか？」"
translation = "「컴퓨터로 치자면, 데이터의 일부만 이식한 상태……라는 걸까요. 역시 힘도 만전은 아닌 건가요?」"

[[dialogue]]
speaker = "マグダレナ"
original = "「はい。元々、守護天使は女神様から力を与えられた存在ですが、今はそのごく一部しか発揮できません」"
translation = "「네. 원래 수호천사는 여신님께 힘을 부여받은 존재입니다만, 지금은 그 아주 일부분밖에 발휘할 수 없습니다.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「でもなんだかんだ言って強いんでしょ？\u3000それなら十分よ。マグダレナの本体もそのうち取り返してあげるわ！」"
translation = "「그래도 이래저래 해도 강하잖아? 그렇다면 충분해. 막달레나의 본체도 조만간 되찾아 줄게!」"

[[dialogue]]
speaker = "マグダレナ"
original = "「ふふっ、ありがとうございます。心強いです」"
translation = "「후훗, 감사합니다. 든든하네요.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「せっかくなんだから今はこの世界を楽しみましょ。今日の予定は？\u3000どこか行きたいところある？」"
translation = "「모처럼이니까 지금은 이 세계를 즐기자. 오늘 예정은? 어디 가고 싶은 곳 있어?」"

[[dialogue]]
speaker = "マグダレナ"
original = "「それが、今の私には右も左もわからない状態でして……」"
translation = "「그게, 지금의 저로서는 동서남북도 모르는 상태라서요……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「じゃあ映画にしましょ！\u3000とびっきりロマンチックなやつ！」"
translation = "「그럼 영화로 하자! 엄청 로맨틱한 녀석으로!」"

[[dialogue]]
speaker = "ソフィア"
original = "「ならパンケーキのお店にしましょう。最近評判のお店があってですね」"
translation = "「그럼 팬케이크 가게로 하죠. 최근 평판이 좋은 가게가 있거든요.」"

[[dialogue]]
speaker = "マグダレナ"
original = "「ええと……会長さまのおすすめはありますでしょうか？」"
translation = "「저기…… 회장님의 추천은 있으실까요?」"

[[dialogue]]
speaker = "unk"
original = "のんびりお散歩とか？"
translation = "느긋하게 산책이라든가?"

[[dialogue]]
speaker = "マグダレナ"
original = "「ふふ……そうですね、私にはそれが性に合っているのかもしれません」"
translation = "「후후…… 그렇네요, 저에게는 그것이 적성에 맞을지도 모르겠어요.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「オッケー。たまにはあてもなくブラブラしましょうか」"
translation = "「오케이. 가끔은 목적 없이 빈둥거려 볼까.」"

[[dialogue]]
speaker = "マグダレナ"
original = "「メロンパン、というのですね。甘くて香ばしくて、それにとても食感が良いです」"
translation = "「메론빵, 이라고 하는군요. 달콤하고 고소하고, 게다가 식감이 아주 좋아요.」"

[[dialogue]]
speaker = "ソフィア"
original = "「ヴィーナスさんとマグダレナさん、とても美人ですからとても目立ってますね。しかも……」"
translation = "「비너스 씨랑 막달레나 씨, 아주 미인이시라 눈에 확 띄네요. 게다가……」"

[[dialogue]]
speaker = "ソフィア"
original = "（抜群のプロポーション……！\u3000私が男だったら振り返らない自信はないかもしれません……）"
translation = "(발군의 프로포션……! 내가 남자였다면 돌아보지 않을 자신은 없을지도 몰라요……)"

[[dialogue]]
speaker = "ウィステリア"
original = "「はぁ～……」"
translation = "「하아~……」"

[[dialogue]]
speaker = "マグダレナ"
original = "「あら……あなたは確か、司書のウィステリアさま。何かお悩みがあれば聞かせてください。微力ながらお力になりますよ」"
translation = "「어라…… 당신은 분명, 사서인 위스테리아 님. 무슨 고민이라도 있다면 들려주세요. 미력하나마 힘이 되어 드릴게요.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「えっ？\u3000守護天使……さん？\u3000いえそんな、大したことじゃないですし、わざわざお話するようなことじゃ……」"
translation = "「엣? 수호천사…… 씨? 아니 그런, 대단한 일도 아니고, 굳이 말씀드릴 만한 게……」"

[[dialogue]]
speaker = "マグダレナ"
original = "「お気になさらず。永きにわたって世界を見守ってきた守護天使にとって、この世界に生きる者は皆我が子のようなもの」"
translation = "「신경 쓰지 마세요. 오랫동안 세계를 지켜봐 온 수호천사에게 있어, 이 세계를 살아가는 자는 모두 내 아이와 같은 것.」"

[[dialogue]]
speaker = "マグダレナ"
original = "「小さなことでも大きなことでも、子の苦しみに寄り添い、良き方向へ導くのは当然のことではありませんか」"
translation = "「작은 일이든 큰 일이든, 아이의 고통에 곁을 지키고, 좋은 방향으로 인도하는 것은 당연한 일이 아니겠습니까.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「マグダレナさん……」"
translation = "「막달레나 씨……」"

[[dialogue]]
speaker = "マグダレナ"
original = "「まずは落ち着いてください。メロンパンをどうぞ」"
translation = "「우선 진정하세요. 메론빵 드세요.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ありがとうございます。……あ、おいしい」"
translation = "「감사합니다. ……아, 맛있다.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「実はいつのまにか冷蔵庫が壊れてて、中身が全滅して……修理を頼もうにも時間がかかるし、でも新品は高いし……」"
translation = "「사실 어느샌가 냉장고가 고장 나서, 내용물이 전멸해 버려서…… 수리를 맡기려 해도 시간이 걸리고, 그렇다고 새것은 비싸고……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「仕方ないから当分はコンビニと外食で済ませようと思ったけど、家の近くのコンビニが改装で休業しちゃって……」"
translation = "「어쩔 수 없으니 당분간은 편의점이랑 외식으로 때우려고 했는데, 집 근처 편의점이 개조 공사로 휴업해 버려서……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「下ろしたばっかりの現金も落としちゃうし……最近こんなのばっかり……給料日まだ遠いのに……」"
translation = "「방금 찾은 현금도 떨어뜨려 버리고…… 요즘 계속 이런 식이에요…… 월급날은 아직 먼데……」"

[[dialogue]]
speaker = "ソフィア"
original = "（思ったより切実だった……）"
translation = "(생각보다 절실했어……)"

[[dialogue]]
speaker = "マグダレナ"
original = "「大丈夫です、ウィステリアさま。確かに不運が重なることはあります。ですが人生は長いのです」"
translation = "「괜찮습니다, 위스테리아 님. 확실히 불운이 겹칠 때도 있습니다. 하지만 인생은 길답니다.」"

[[dialogue]]
speaker = "マグダレナ"
original = "「不運が続くように感じても、一生の中では一瞬なのです。必ず良いことはあります」"
translation = "「불운이 계속되는 것처럼 느껴져도, 일생 중에서는 한순간일 뿐입니다. 반드시 좋은 일은 생겨요.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「いつも赤信号に引っ掛かったり、おみくじで凶か大凶しか引いたことがなかったとしても……？」"
translation = "「항상 빨간불에 걸리거나, 운세 뽑기에서 흉이나 대흉밖에 뽑아본 적이 없어도요……?」"

[[dialogue]]
speaker = "マグダレナ"
original = "「はい」"
translation = "「네.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「業者の手違いで水道とガスと電気が同時に止められてもですか……？」"
translation = "「업체의 실수로 수도랑 가스랑 전기가 동시에 끊겨도 말인가요……?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "（この人こんなに運悪かったんだ……！）"
translation = "(이 사람 이렇게 운이 없었구나……!)"

[[dialogue]]
speaker = "マグダレナ"
original = "「それでもです。時に打ちひしがれてもかまいません。立ち止まるのも良いでしょう」"
translation = "「그래도입니다. 때로는 낙담해도 괜찮습니다. 멈춰 서는 것도 좋겠지요.」"

[[dialogue]]
speaker = "マグダレナ"
original = "「ですが時が傷を少し癒してくれたなら、ちゃんと顔を上げて前を向くのが幸福に近づく第一歩です」"
translation = "「하지만 시간이 상처를 조금 치유해 주었다면, 제대로 고개를 들고 앞을 향하는 것이 행복에 다가가는 첫걸음입니다.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「守護天使さま……！」"
translation = "「수호천사 님……!」"

[[dialogue]]
speaker = "ソフィア"
original = "「それで、冷蔵庫はどうするんですか？」"
translation = "「그래서, 냉장고는 어떻게 하실 건가요?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「あ～……後で考える。今はマグダレナさんに話聞いてもらえるだけでいいや……」"
translation = "「아~…… 나중에 생각할래. 지금은 막달레나 씨가 이야기를 들어주는 것만으로도 됐어……」"

[[dialogue]]
speaker = "unk"
original = "何も解決してないけど……"
translation = "아무것도 해결되지 않았지만……"

[[dialogue]]
speaker = "unk"
original = "本人がそう言うならいいか！"
translation = "본인이 그렇다면 된 건가!"

[[dialogue]]
speaker = "マグダレナ"
original = "「ふふふふっ♪」"
translation = "「후후후후훗♪」"

