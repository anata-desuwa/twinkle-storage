[[dialogue]]
speaker = "unk"
original = "第７話,救世主の天使,B"
translation = "제7화, 구세주의 천사"

[[dialogue]]
speaker = "天使の少女"
original = "「……うん。すりむいてる程度ね、よかった」"
translation = "「……응. 긁힌 정도네, 다행이야.」"

[[dialogue]]
speaker = "チナ"
original = "「あ、あの……え……？」"
translation = "「저, 저기…… 에……?」"

[[dialogue]]
speaker = "unk"
original = "あの凶悪なモンスターを倒したのは、自分とそう変わらない年齢の天使の少女。"
translation = "그 흉악한 몬스터를 쓰러뜨린 것은 자신과 별반 다르지 않은 나이의 천사 소녀."

[[dialogue]]
speaker = "unk"
original = "純白を基調とした神々しいフォーム。幾本もの光の羽根が宙に浮かび、天使の少女を守るように周回している。"
translation = "순백을 기조로 한 신성한 폼. 여러 개의 빛의 날개가 허공에 떠서 천사 소녀를 지키듯 주위를 돌고 있었다."

[[dialogue]]
speaker = "チナ"
original = "「おまえ……星騎士、なのか？」"
translation = "「너…… 성기사, 인 거야?」"

[[dialogue]]
speaker = "天使の少女"
original = "「……ええ。安心して。怖かったでしょう。もう大丈夫よ」"
translation = "「……네. 안심하세요. 무서웠죠. 이제 괜찮아요.」"

[[dialogue]]
speaker = "unk"
original = "信じられない。天使の少女は、星力を発現している。それだけでなく、セレスティアで変身してモンスターを倒していた。"
translation = "믿을 수 없다. 천사 소녀는 성력을 발현하고 있다. 그뿐만 아니라, 셀레스티아로 변신해서 몬스터를 쓰러뜨리고 있었다."

[[dialogue]]
speaker = "チナ"
original = "「あ、ありがとう……」"
translation = "「고, 고마워……」"

[[dialogue]]
speaker = "天使の少女"
original = "「どういたしまして──あら？」"
translation = "「천만에요── 어라?」"

[[dialogue]]
speaker = "魔族の少女"
original = "「ルヴィネちゃん！\u3000はぁっ、はぁっ……ようやく追いつけた……！\u3000もう倒しちゃった！？」"
translation = "「루비네짱! 하아, 하아…… 겨우 따라잡았다……! 벌써 쓰러뜨린 거야!?」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「ええ。ベアトリスさん。そっちも終わったみたいね」"
translation = "「네. 베아트리스 씨. 그쪽도 끝난 모양이네요.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「うん、何とかっ……」"
translation = "「응, 어떻게든……!」"

[[dialogue]]
speaker = "チナ"
original = "「う、うそ……？」"
translation = "「거, 거짓말……?」"

[[dialogue]]
speaker = "unk"
original = "黒と赤に彩られた槍を持つ、またチナと歳の変わらない魔族の少女が現れた。"
translation = "검정과 빨강으로 채색된 창을 든, 또 치나와 나잇대가 비슷한 마족 소녀가 나타났다."

[[dialogue]]
speaker = "unk"
original = "この少女も星騎士なのか。ありえないものを見続けて、とうとうチナはぽかんと口を開けてしまう。"
translation = "이 소녀도 성기사인 걸까. 믿기지 않는 광경을 계속 목격한 치나는 결국 멍하니 입을 벌리고 만다."

[[dialogue]]
speaker = "ベアトリス"
original = "「アステラもこわしたし、もう平気かな……今日はかえろっか？」"
translation = "「아스테라도 파괴했고, 이제 괜찮으려나…… 오늘은 돌아갈까?」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「そうね。あなたもついてきて。大したもてなしもできないけれど、ここにいるよりは安全なはずだから」"
translation = "「그렇네요. 당신도 따라오세요. 거창한 대접은 못 해드리지만, 여기 있는 것보다는 안전할 테니까요.」"

[[dialogue]]
speaker = "unk"
original = "そうしてチナは、流星市国のシンボルだったファリス大聖堂へと連れていかれた。"
translation = "그렇게 치나는 유성시국의 상징이었던 파리스 대성당으로 끌려갔다."

[[dialogue]]
speaker = "unk"
original = "日曜日にお祈りに訪れていた、<ruby>静謐<rt>せいひつ</rt></ruby>かつ<ruby>荘厳<rt>そうごん</rt></ruby>な大聖堂は、見るも無残に半壊している。"
translation = "일요일에 기도를 드리러 방문하곤 했던, 정밀하고도 장엄한 대성당은 형체도 없이 처참하게 반파되어 있다."

[[dialogue]]
speaker = "unk"
original = "そこには傷ついた一般市民が数十人、身を寄せ合っていた……"
translation = "그곳에는 상처 입은 일반 시민 수십 명이 서로 몸을 맞대고 모여 있었다……"

[[dialogue]]
speaker = "ベアトリス"
original = "「……ど、どうかな？\u3000少しは落ち着いた？」"
translation = "「……어, 어때? 조금은 진정됐어?」"

[[dialogue]]
speaker = "チナ"
original = "「……うん。ありがと……助けてくれて……」"
translation = "「……응. 고마워…… 구해줘서……」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「気にしないで。困った時はお互い様と言うでしょう？」"
translation = "「신경 쓰지 마세요. 어려울 때는 서로 돕는 법이라고 하잖아요?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「でもよかった。ひどいケガもなくて……」"
translation = "「그래도 다행이다. 심한 상처도 없어서……」"

[[dialogue]]
speaker = "チナ"
original = "「な、なあ。いま、どういう状況なんだ……？」"
translation = "「저, 저기. 지금 어떻게 된 상황이야……?」"

[[dialogue]]
speaker = "チナ"
original = "「アタシ、シェルターにずっといて……今日、外に出たらさ。星騎士の人たち、ぜんぜんいなくて……モンスターばっかり……」"
translation = "「나, 계속 쉘터에만 있다가…… 오늘 밖으로 나왔더니 말이야. 성기사 사람들은 전혀 없고…… 몬스터뿐이라……」"

[[dialogue]]
speaker = "チナ"
original = "「それにあの『仮面の女』は？\u3000あいつ、ま、まだ生きてるのか……？」"
translation = "「게다가 그 『가면을 쓴 여자』는? 그 녀석, 아, 아직 살아있는 거야……?」"

[[dialogue]]
speaker = "unk"
original = "──そして魔王クロトはどこに？"
translation = "──그리고 마왕 쿠로토는 어디에?"

[[dialogue]]
speaker = "unk"
original = "あのジェラルド・セイファートが魔界で散ったとのニュースが流星市国に入ってきたのは、少し前のこと。"
translation = "그 제럴드 세이퍼트가 마계에서 전사했다는 뉴스가 유성시국에 들어온 것은 조금 전의 일."

[[dialogue]]
speaker = "unk"
original = "それ以降、激化する人間界での戦闘を最前線で指揮していたのは、『魔王』を自称する緋宮クロトだった。"
translation = "그 이후, 격화되는 인간계에서의 전투를 최전선에서 지휘하고 있었던 것은 『마왕』을 자처하는 히노미야 쿠로토였다."

[[dialogue]]
speaker = "unk"
original = "彼は人類最後の希望だった。新星学園、最強の星騎士。彼が敗北すればリクリエが起こると、シェルターの中では幾度も噂されていた。"
translation = "그는 인류 마지막 희망이었다. 신성학원 최강의 성기사. 그가 패배하면 리크리에가 일어난다는 소문이 쉘터 안에서 몇 번이고 돌고 있었다."

[[dialogue]]
speaker = "ルヴィネ"
original = "「『仮面の女』はもういない……私が倒したから」"
translation = "「『가면을 쓴 여자』는 이제 없어요…… 제가 쓰러뜨렸으니까요.」"

[[dialogue]]
speaker = "チナ"
original = "「…………え？」"
translation = "「…………에?」"

[[dialogue]]
speaker = "unk"
original = "この女の子が『仮面の女』を──何かの悪い冗談か。チナは辺りを見回すが、魔族の少女も、傷ついた避難民もこぞって首を縦に振った。"
translation = "이 여자애가 『가면을 쓴 여자』를── 무슨 질 나쁜 농담인가. 치나는 주변을 둘러보지만, 마족 소녀도, 상처 입은 피난민들도 일제히 고개를 끄덕였다."

[[dialogue]]
speaker = "チナ"
original = "「ほ、本当に……？\u3000悪いやつ、もういないのか……？」"
translation = "「정, 정말로……? 나쁜 녀석, 이제 없는 거야……?」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「ええ。安心して。空を覆っていた流星群も、今はないでしょう？\u3000それが証拠になればいいのだけど……」"
translation = "「네. 안심하세요. 하늘을 뒤덮고 있던 유성우도 지금은 없잖아요? 그것이 증거가 된다면 좋겠는데……」"

[[dialogue]]
speaker = "チナ"
original = "「う、うん……普通の空に、なってる……」"
translation = "「으, 응…… 평범한 하늘이, 되어 있어……」"

[[dialogue]]
speaker = "チナ"
original = "「でもモンスターはまだ、消えてないよな……？」"
translation = "「하지만 몬스터는 아직 사라지지 않았지……?」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「ええ。あの女と一緒に、アステラやモンスターも綺麗に消えればよかったのだけど……」"
translation = "「네. 그 여자와 함께 아스테라나 몬스터도 깨끗이 사라졌으면 좋았을 텐데……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「アステラは今でも生み出されちゃうみたいなの。だから私たち、戦ってるんだ」"
translation = "「아스테라는 지금도 계속 생겨나는 모양이야. 그래서 우리, 싸우고 있는 거야.」"

[[dialogue]]
speaker = "チナ"
original = "「戦うって……あ、あんたら、そうだよ。すごいんだな……アタシとそう変わんない歳で、もう星騎士なんだ……？」"
translation = "「싸운다니…… 너, 너희들, 그렇구나. 대단하네…… 나랑 별반 다르지 않은 나이에 벌써 성기사인 거야……?」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「正式なものではないのだけれどね」"
translation = "「정식인 것은 아니지만요.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「あはは……私たちが使ってるセレスティア、その……借りものだから」"
translation = "「아하하…… 우리가 쓰고 있는 셀레스티아, 그게…… 빌린 거라서.」"

[[dialogue]]
speaker = "unk"
original = "２人は守護星を得ているが、星騎士として変身するセレスティアは、道端で事切れていた星騎士のものを拝借しているらしい。"
translation = "두 사람은 수호성을 얻었지만, 성기사로서 변신하는 셀레스티아는 길가에서 숨이 끊어져 있던 성기사의 것을 빌려 쓰고 있는 모양이다."

[[dialogue]]
speaker = "ベアトリス"
original = "「あ……自己紹介、まだだったね。私はベアトリス・シェイド。魔界の吸血鬼だけど、血を飲まなくても平気だから。安心してね？」"
translation = "「아…… 자기소개, 아직이었네. 나는 베아트리스 셰이드. 마계의 흡혈귀지만, 피를 마시지 않아도 괜찮으니까. 안심해, 알았지?」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「ルヴィネよ。天界生まれの天使。これからよろしく──あなたは？」"
translation = "「루비네예요. 천계 태생의 천사. 앞으로 잘 부탁해요── 당신은?」"

[[dialogue]]
speaker = "チナ"
original = "「……チナ。香堂、チナ」"
translation = "「……치나. 코도 치나.」"

[[dialogue]]
speaker = "unk"
original = "ようやくそれだけ絞り出したチナは──"
translation = "겨우 그 말만 쥐어짜 낸 치나는──"

[[dialogue]]
speaker = "チナ"
original = "「あ……！」"
translation = "「아……!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「ふふ、大きな音」"
translation = "「후후, 큰 소리네.」"

[[dialogue]]
speaker = "チナ"
original = "「う、うるさいなぁっ……！」"
translation = "「시, 시끄러워……!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ご飯にしよっか？\u3000お腹いっぱいには、できないと思うけど……」"
translation = "「밥 먹을까? 배불리 먹지는 못하겠지만……」"

[[dialogue]]
speaker = "unk"
original = "その後、焚き火で温められた豆と肉の缶詰を、３人で分け合って食べた。"
translation = "그 후, 모닥불에 데운 콩과 고기 통조림을 셋이서 나누어 먹었다."

[[dialogue]]
speaker = "unk"
original = "詳しい自己紹介を交わしていくと、ルヴィネとベアトリスは同い年で、チナは２人よりも１歳年下であることがわかった。"
translation = "자세한 자기소개를 나누다 보니 루비네와 베아트리스는 동갑이고, 치나는 두 사람보다 한 살 어리다는 것을 알게 되었다."

[[dialogue]]
speaker = "unk"
original = "他愛のない雑談を交わしながら、笑ってしまうくらいわずかな量の食事をとった。しかし、チナの心は満たされたのだった。"
translation = "실없는 잡담을 나누며, 웃음이 나올 정도로 적은 양의 식사를 했다. 하지만 치나의 마음은 채워졌다."

[[dialogue]]
speaker = "チナ"
original = "「なあ、アタシも救助活動、手伝うよ……！」"
translation = "「저기, 나도 구조 활동 도울게……!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「本当！？\u3000よかったぁ、わたしもルヴィネちゃんも、ついこのあいだ、人間界に来たばっかりで……」"
translation = "「정말!? 다행이다, 나도 루비네짱도 요전번에 막 인간계에 온 참이라……」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「ええ。避難民のシェルターがどこにあるのかも、食料品店や薬局の場所も、ほとんどわからないから、助かるわ」"
translation = "「네. 피난민 쉘터가 어디에 있는지, 식료품점이나 약국의 위치도 거의 모르니까 도움이 되겠네요.」"

[[dialogue]]
speaker = "チナ"
original = "「アタシ、流星市国のことならなんでも知ってるぞ！\u3000まかせてくれよ！」"
translation = "「나, 유성시국에 대해서라면 뭐든지 알고 있어! 맡겨달라고!」"

[[dialogue]]
speaker = "unk"
original = "両親から、緊急時の手ほどきは受けていた。"
translation = "부모님으로부터 비상시의 대처법을 배워두었다."

[[dialogue]]
speaker = "unk"
original = "市国中に分布しているシェルターの位置も、食料品を扱っている店の場所も、自動販売機が緊急時はお金を使わずに飲み物を出せることだって知っている。"
translation = "시국 전체에 분포된 쉘터의 위치도, 식료품을 취급하는 가게의 장소도, 자동판매기가 비상시에는 돈을 쓰지 않고 음료를 내보낼 수 있다는 것까지 알고 있다."

[[dialogue]]
speaker = "チナ"
original = "（暗い顔、してちゃダメだ……）"
translation = "(어두운 표정 짓고 있으면 안 돼……)"

[[dialogue]]
speaker = "チナ"
original = "（すぐに助けは来る。だって流星市国は、日本国内にあるんだ。明日にでも、水や食料を積んだ車がかけつけてくれる）"
translation = "(곧 도움은 올 거야. 왜냐면 유성시국은 일본 국내에 있으니까. 내일이라도 물이나 식량을 실은 차가 달려와 줄 거야.)"

[[dialogue]]
speaker = "チナ"
original = "（悪いやつはいなくなったんだ。このルヴィネって子が、本当に倒したのかは分かんないけど……でもたしかに流星群は止まってるし）"
translation = "(나쁜 녀석은 없어졌어. 이 루비네라는 애가 정말로 쓰러뜨린 건지는 모르겠지만…… 하지만 확실히 유성우는 멈췄고.)"

[[dialogue]]
speaker = "チナ"
original = "（ってことは。もうすぐお父さんたちに会える。その時にベソかいてたら……）"
translation = "(그렇다는 건. 곧 엄마 아빠를 만날 수 있어. 그때 울고 있으면……)"

[[dialogue]]
speaker = "unk"
original = "両親にがっかりされてしまう。だからしっかりしよう。"
translation = "부모님이 실망하실 거야. 그러니까 정신 차리자."

[[dialogue]]
speaker = "unk"
original = "いつも宿題をさぼったり、朝寝坊をしたり、ワガママを言って困らせていたけれど……これからは心を入れ替える。"
translation = "항상 숙제를 빼먹거나, 늦잠을 자거나, 억지를 부려 곤란하게 만들었지만…… 이제부터는 마음을 고쳐먹을 거야."

[[dialogue]]
speaker = "unk"
original = "もう二度と両親を困らせたりしない。お手伝いもたくさんする。誕生日に高いゲーム機を買って欲しいだなんて言わない。"
translation = "다시는 부모님을 곤란하게 하지 않을 거야. 심부름도 많이 할 거야. 생일에 비싼 게임기를 사달라는 말도 안 할 거야."

[[dialogue]]
speaker = "unk"
original = "晩御飯の前に肉まんを食べて、お腹がいっぱいだなんて絶対に言わない。苦手な勉強もたくさんする。友達とケンカもしない。いい子になるから。"
translation = "저녁 먹기 전에 고기 만두를 먹고 배부르다는 소리 절대 안 할 거야. 싫어하는 공부도 많이 할 거야. 친구랑 싸우지도 않을 거야. 착한 아이가 될 테니까."

[[dialogue]]
speaker = "unk"
original = "だから早く、大好きな両親に会いたい──"
translation = "그러니까 빨리, 사랑하는 부모님을 만나고 싶어──"

[[dialogue]]
speaker = "チナ"
original = "「がんばろーぜ、２人とも！」"
translation = "「힘내자고, 둘 다!」"

[[dialogue]]
speaker = "unk"
original = "けれど──それから幾日が過ぎても、助けは来なかった。"
translation = "하지만── 그로부터 며칠이 지나도 도움은 오지 않았다."

