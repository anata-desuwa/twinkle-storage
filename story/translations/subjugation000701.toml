[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「きゃああああああッ！！」"
translation = "「꺄아아아아악!!」"

[[dialogue]]
speaker = "？？？"
original = "「んだよ、呆気ねえな。星騎士ってのはこの程度かよ。拍子抜けもいいところだぜ」"
translation = "「뭐야, 맥빠지는구만. 성기사라는 게 고작 이 정도냐. 김새기 짝이 없구먼」"

[[dialogue]]
speaker = "？？？"
original = "「星騎士は正義の味方なんじゃなかったのか？\u3000そのザマで何が守れるっつうんだよ」"
translation = "「성기사는 정의의 편 아니었냐? 그 꼴로 뭘 지키겠다는 거야」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「くっ……！\u3000はぁあああっ！！」"
translation = "「큭……! 하아아앗!!」"

[[dialogue]]
speaker = "？？？"
original = "「フン。効かねえよ」"
translation = "「흥. 안 통해」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「ボルテクス・オラージュ！」"
translation = "「볼텍스 오라쥬!」"

[[dialogue]]
speaker = "？？？"
original = "「だから効かねえって──」"
translation = "「그러니까 안 통한다고──」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「皆さん逃げてくださいっ！」"
translation = "「여러분 도망치세요!」"

[[dialogue]]
speaker = "？？？"
original = "「チッ、目眩ましか。正義の味方のくせにずいぶん姑息なマネすんじゃねえか……」"
translation = "「칫, 연막인가. 정의의 편 주제에 꽤 비겁한 짓을 하는구만……」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「はぁはぁ、皆さんに伝え、ないと……！\u3000危険な、敵が──……」"
translation = "「하아 하아, 모두에게 전해, 야 하는데……! 위험한, 적이──……」"

[[dialogue]]
speaker = "unk"
original = "エリスが襲われたって！？"
translation = "에리스가 습격당했다고!?"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はい、昨夜何者かに……」"
translation = "「네, 어젯밤 누군가에게……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「正確には、他の星騎士が襲われていたところに偶然居合わせて、助けに入ったそうです。そしてその星騎士を逃がそうとして負傷を……」"
translation = "「정확히는, 다른 성기사가 습격당하던 곳에 우연히 같이 있다가, 도와주러 들어갔다고 해요. 그리고 그 성기사를 도망치게 하려다 부상을……」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「詳しくは、私から話しま……ぐっ！」"
translation = "「자세한 건, 제가 이야기하…… 윽!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あっ、まだ起き上がらないでください」"
translation = "「앗, 아직 일어나지 마세요」"

[[dialogue]]
speaker = "unk"
original = "エリスをここまで追い詰めるなんて……"
translation = "에리스를 이 정도로 몰아붙이다니……"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「ええ。どうやら相手は相当の手練れみたいね」"
translation = "「네. 아무래도 상대는 상당한 실력자인 모양이야」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「だけど臆するわけにはいかないわ！\u3000<ruby>天網恢々<rt>てんもうかいかい</rt></ruby><ruby>疎<rt>そ</rt></ruby>にして漏らさず──風紀委員の威信にかけて、必ず取っ捕まえてやるんだから！」"
translation = "「하지만 겁먹고 있을 수는 없어! 천망회회 소이불루── 풍기위원의 위신을 걸고, 반드시 잡아낼 거니까!」"

[[dialogue]]
speaker = "unk"
original = "附属生？"
translation = "부속생?"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「だーかーらー！\u3000私は附属生じゃないもん！\u3000<ruby>歴<rt>れっき</rt></ruby>とした新星学園の一年生！\u3000風紀委員の<ruby>百合崎<rt>ゆりさき</rt></ruby>ミア！」"
translation = "「그러니까! 나는 부속생이 아니래도! 번듯한 신성학원의 1학년! 풍기위원인 백합자키 미아!」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「何度同じ間違いをしたら気が済むのっ。ちょっぴり見た目が幼いからって子ども扱いしないでもらえるっ？」"
translation = "「몇 번을 똑같은 실수를 해야 속이 시원하겠어. 조금 겉모습이 어려 보인다고 아이 취급하지 말아줄래?」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「まぁまぁ。お見舞いのお菓子でよければどうぞ」"
translation = "「자자. 병문안 과자라도 괜찮다면 드세요」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「これ、有名店のクッキー……！\u3000えへへ、バターたっぷりで美味しい……」"
translation = "「이거, 유명한 집의 쿠키……! 에헤헤, 버터가 듬뿍 들어서 맛있어……」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「じゃなくて！\u3000私は新星学園の風紀委員代表として、エリス先輩のお見舞いと聞き取り調査に来たのっ！！」"
translation = "「그게 아니라! 나는 신성학원의 풍기위원 대표로서, 에리스 선배의 병문안과 탐문 조사를 하러 온 거야!!」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「大丈夫ですか、エリス先輩？\u3000手酷くやられちゃったって聞きましたけど……」"
translation = "「괜찮으세요, 에리스 선배? 호되게 당하셨다고 들었습니다만……」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「ええ、なんとか。幸い深手は負っていませんので、しばらく休めば復帰できると思います」"
translation = "「네, 어떻게든요. 다행히 깊은 상처는 아니니, 당분간 쉬면 복귀할 수 있을 것 같습니다」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「エリス先輩はいつも頑張っているんですから、無理せず休んでください。後は私が引き継ぎますから」"
translation = "「에리스 선배는 언제나 열심히 하시니까, 무리하지 말고 쉬세요. 뒷일은 제가 이어받을 테니까요」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「二葉にして絶たざれば斧を持ちうるに至るって言いますしね。悪の芽は早めに摘んでおかなきゃですよ」"
translation = "「싹일 때 자르지 않으면 도끼를 써야 한다는 말도 있잖아요. 악의 싹은 일찌감치 잘라둬야 해요」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「ふた……？\u3000ええと、すみません。この国のことわざには疎くて……」"
translation = "「사……? 에토, 죄송합니다. 이 나라의 속담에는 어두워서……」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「木は芽のうちに取り除かないと、後で斧を使って切り倒さなくてはいけなくなる。災いは小さいうちに除かないと、後が大変という意味です」"
translation = "「나무는 싹일 때 제거하지 않으면, 나중에 도끼를 써서 베어내야 하게 된다. 재앙은 작을 때 없애지 않으면, 나중에 고생한다는 뜻이에요」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「なるほど、勉強になりました。確かにミアさんの言う通り、早急に対処しなければ」"
translation = "「과연, 공부가 되었습니다. 확실히 미아 씨 말대로, 조속히 대처해야겠군요」"

[[dialogue]]
speaker = "unk"
original = "犯人の特徴は？"
translation = "범인의 특징은?"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「私たちに近い年頃の女の子のようでした。ネコ科のような耳と尻尾があったので、恐らく獣人系の魔族の方かと」"
translation = "「저희와 비슷한 또래의 여자아이 같았습니다. 고양잇과 같은 귀와 꼬리가 있었으니, 아마도 수인계 마족 분이 아닐까 싶어요」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「ふむふむ。同じ年代で魔族ということは、学園の生徒でしょうか」"
translation = "「흠흠. 같은 나이대에 마족이라면, 학원의 학생일까요」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「星術で暴力を働く生徒を取り締まるのは風紀委員の務め。早速捕縛に行ってきます！」"
translation = "「성술로 폭력을 휘두르는 학생을 단속하는 건 풍기위원의 임무. 당장 포박하러 가겠습니다!」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「待ってください、単独行動は危険です。悔しいですが、私ですら手も足も出なかった相手ですから……」"
translation = "「기다려 주세요, 단독 행동은 위험합니다. 분하지만, 저조차 손도 발도 못 썼던 상대니까요……」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「私ですらってどういう意味ですか。私だってやれます……！\u3000ちんちくりんだからって見くびらないでください……！」"
translation = "「저조차라니 무슨 뜻인가요. 저도 할 수 있어요……! 꼬맹이라고 얕보지 마세요……!」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「い、いえ。見くびっているわけでは──」"
translation = "「아, 아니요. 얕보고 있는 게 아니라──」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「とにかく大丈夫ったら大丈夫です！\u3000エリス先輩が苦戦した相手をあっという間に捕まえて、今こそ私の実力を証明してみせますから！」"
translation = "「아무튼 괜찮다면 괜찮은 거예요! 에리스 선배가 고전한 상대를 눈 깜짝할 새 잡아내서, 이번에야말로 제 실력을 증명해 보일 테니까요!」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「あっ、ミアさ──……行ってしまいました」"
translation = "「앗, 미아 씨──…… 가버렸네요」"

[[dialogue]]
speaker = "unk"
original = "俺が追いかけるよ"
translation = "내가 쫓아갈게"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「会長さんが一緒なら安心ですね。よろしくお願いします」"
translation = "「회장님이 함께라면 안심이네요. 잘 부탁드립니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「両校の風紀委員たちもパトロールを行うそうです。２人以上──いえ、念のため３人以上で行動することを徹底させましょう」"
translation = "「양교의 풍기위원들도 순찰을 할 거래요. 2인 이상── 아니, 만약을 위해 3인 이상으로 행동하는 것을 철저히 하도록 하죠」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「ありがとうございます」"
translation = "「감사합니다」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「敗れた私が言うのもなんですが……いえ、力及ばなかった私だから言えます。相手は今までにない強敵です。くれぐれも気を付けてください」"
translation = "「패배한 제가 말하는 것도 좀 그렇습니다만…… 아니요, 힘이 부족했던 저이기에 말할 수 있습니다. 상대는 지금까지 없었던 강적입니다. 부디 조심하세요」"

