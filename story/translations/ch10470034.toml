[[dialogue]]
speaker = "unk"
original = "第４話,２４時間お泊りイチャイチャ,P"
translation = "제4화, 24시간 숙박 꽁냥꽁냥 P"

[[dialogue]]
speaker = "unk"
original = "またしばらくして──今日もすっかりお決まりになった、メルエルと家デートの日。"
translation = "또 얼마간의 시간이 흐르고── 오늘도 완전히 일과가 된 메르엘과 집 데이트 하는 날."

[[dialogue]]
speaker = "unk"
original = "今回は２連休。星徒会もその他の用事もすべて片付け、泊りがけも可能だと伝えていたのだが……"
translation = "이번에는 2연휴. 성도회도 다른 용무도 전부 정리해서 자고 가는 것도 가능하다고 전해두었는데……"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「えへへへへへぇ<emoji=heart04>\u3000会長くん、ぎゅぅううぅぅ～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「에헤헤헤헤헤에<emoji=heart04> 회장 군, 규우우우우우우~~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "最近、少しだけ甘え上手になったメルエルと、真昼間からベッドの中で抱き合っていた。"
translation = "최근, 조금 어리광을 잘 부리게 된 메르엘과 대낮부터 침대 안에서 서로 껴안고 있었다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「はぁあぁっ<emoji=heart04>\u3000会長くんと、本当に泊りがけで２４時間、ベッドの中でずっとイチャイチャしてていいなんて、夢みたいだよぉ<emoji=heart04>」"
translation = "「하아아아앗<emoji=heart04> 회장 군이랑, 정말로 자고 가면서 24시간 내내 침대에서 계속 꽁냥거려도 된다니, 꿈만 같아아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "２４時間、ずっとキスしたままだぞ"
translation = "24시간 내내 키스한 상태 그대로라고."

[[dialogue]]
speaker = "unk"
original = "それだけじゃないだろ？"
translation = "그것뿐만이 아니잖아?"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「う、うんっ<emoji=heart04>\u3000本当に、そんなにたくさん、キスしちゃっていいんだ……<emoji=heart04>」"
translation = "「으, 응<emoji=heart04> 정말로, 그렇게 많이, 키스해 버려도 되는구나……<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あっ<emoji=heart04>\u3000会長くんの方からしてくれるの……嬉しい、んんぅ、ちゅっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 회장 군 쪽에서 해주는 거야…… 기뻐, 으응, 츄<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「んーっ、ちゅ<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000んちゅ、ちゅぅっ……<emoji=heart04>\u3000えへへ、好き<emoji=heart04>\u3000会長くん……ちゅっ<emoji=heart04>\u3000しゅきぃっ<emoji=heart04>」"
translation = "「응─, 츄<emoji=heart04> 츄<emoji=heart04> 응츄, 츄우……<emoji=heart04> 에헤헤, 좋아해<emoji=heart04> 회장 군…… 츄<emoji=heart04> 죠아해에<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ベッドに横たわったまま、ハグの体勢になって、何度も浅いキスを繰り返す。"
translation = "침대에 누운 채로 허그하는 자세가 되어, 몇 번이고 가벼운 키스를 반복한다."

[[dialogue]]
speaker = "unk"
original = "俺とメルエルの鼻が何度も触れあった後、今度はお互いの鼻を擦りつけ合うようにしながら、熱い吐息を交換し合う。"
translation = "나와 메르엘의 코가 몇 번이고 맞닿은 뒤, 이번에는 서로의 코를 비비듯이 하면서 뜨거운 숨결을 교환한다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「んちゅっ<emoji=heart04>\u3000はぁあぁっ<emoji=heart04>\u3000キミとこんなに近くで抱き合いながら、ちゅっ<emoji=heart04>\u3000何度もキスするなんてぇ<emoji=heart04>」"
translation = "「응츄<emoji=heart04> 하아아아앗<emoji=heart04> 너랑 이렇게 가까이서 껴안은 채로, 츄<emoji=heart04> 몇 번이나 키스하다니이<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「嬉しすぎて、恥ずかしすぎて……<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000本当に実現しちゃう日がくるなんて、思わなかったよぉ<emoji=heart04>」"
translation = "「너무 기뻐서, 너무 부끄러워서……<emoji=heart04> 츄<emoji=heart04> 정말로 실현되는 날이 올 줄은, 생각지도 못했어어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "もちろん、２４時間ずっとキスと言っても、記録に挑戦するようなことはしない。普通に食事もするし、お風呂にも入る。"
translation = "물론, 24시간 내내 키스라고는 해도 기록에 도전하는 듯한 짓은 하지 않는다. 평범하게 식사도 하고, 목욕도 한다."

[[dialogue]]
speaker = "unk"
original = "だけど、今日と明日の食料は買い込んできたし、この２日間は母さんも帰って来ない。"
translation = "하지만, 오늘과 내일 먹을 식량은 사다 놓았고, 이 이틀 동안은 어머니도 돌아오지 않으신다."

[[dialogue]]
speaker = "unk"
original = "本当に可能な限り、ずっとイチャイチャすると２人で決めていた。"
translation = "정말로 가능한 한, 계속 꽁냥거리기로 둘이서 결정했었다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「えへへへぇ<emoji=heart04>\u3000ちゅっ……<emoji=heart04>\u3000まだ始めたばっかりなのに<emoji=heart04>\u3000んちゅ、ちゅっ<emoji=heart04>\u3000もう、メルトしちゃいそうだよぉ～<emoji=heart04>」"
translation = "「에헤헤헤에<emoji=heart04> 츄……<emoji=heart04> 이제 막 시작했을 뿐인데<emoji=heart04> 응츄, 츄<emoji=heart04> 벌써, 녹아버릴 것 같아아~<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「え？\u3000──キスしながら、頭も撫でていいかって？」"
translation = "「에? ──키스하면서, 머리도 쓰다듬어 줘도 되냐구?」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ちゅっ<emoji=heart04>\u3000そんなの、えへへっ<emoji=heart04>\u3000もちろん、いいに決まってるよぉ<emoji=heart04>\u3000んちゅ、ちゅぅっ<emoji=heart04>」"
translation = "「츄<emoji=heart04> 그런 거, 에헤헷<emoji=heart04> 물론, 당연히 좋지이<emoji=heart04> 응츄, 츄우<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「会長くん、大好き<emoji=heart04>\u3000ちゅ、ちゅっ<emoji=heart04>\u3000……はぁあぁっ<emoji=heart04>\u3000私がたくさん頭撫でてもらいたいことも、覚えててくれて……嬉しい<emoji=heart04>」"
translation = "「회장 군, 너무 좋아해<emoji=heart04> 츄, 츄<emoji=heart04> ……하아아아앗<emoji=heart04> 내가 잔뜩 머리 쓰다듬 받고 싶어 하는 것도, 기억해 줘서…… 기뻐<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「んちゅっ<emoji=heart04>\u3000ちゅうっ<emoji=heart04>\u3000ふあぁあっ<emoji=heart04>\u3000唇同士をくっつけたまま、頭なでなでされるの、幸せすぎるよぉ～～<emoji=heart04>」"
translation = "「응츄<emoji=heart04> 츄우<emoji=heart04> 후아아앗<emoji=heart04> 입술끼리 맞댄 채로 머리 쓰담쓰담 받는 거, 너무 행복해에~~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "キスをしながら、メルエルのさらさらの髪の毛を優しく撫でる。恐ろしいことに、メルエルの髪の毛は撫でているこちらまで気持ちがいい。"
translation = "키스를 하면서, 메르엘의 찰랑거리는 머리카락을 상냥하게 쓰다듬는다. 놀랍게도 메르엘의 머리카락은 쓰다듬는 이쪽까지 기분이 좋아질 정도다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「たくさん、いい子にするから<emoji=heart04>\u3000……ちゅっ<emoji=heart04>\u3000これからもいっぱい、頭なでなで、してくれる？<emoji=heart04>\u3000ちゅぅっ<emoji=heart04>」"
translation = "「잔뜩, 착한 아이로 있을 테니까<emoji=heart04> ……츄<emoji=heart04> 앞으로도 많이, 머리 쓰담쓰담, 해 줄 거야?<emoji=heart04> 츄우<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「んっ、嬉しいっ<emoji=heart04>\u3000はぁあっ、会長くん、大好きぃ<emoji=heart04>\u3000……はあぁあっ、そんなに優しくなでなでしたら、頭フワフワになっちゃうよぉ～～<emoji=heart04>」"
translation = "「응, 기뻐어<emoji=heart04> 하아앗, 회장 군, 너무 좋아아<emoji=heart04> ……하아아앗, 그렇게 상냥하게 쓰담쓰담 하면, 머릿속이 둥실둥실해져 버려어~~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "何度も何度も息継ぎをしながら、浅いキスを繰り返す。キスをしながらも、メルエルの頭を撫でる手は緩めない。"
translation = "몇 번이고 몇 번이고 숨을 고르며, 가벼운 키스를 반복한다. 키스를 하면서도 메르엘의 머리를 쓰다듬는 손은 늦추지 않는다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あぁあっ、まだまだ時間はあるのに……ちゅっ<emoji=heart04>\u3000ちゅう<emoji=heart04>\u3000幸せすぎて、おかしくなっちゃいそうだよぉ<emoji=heart04>」"
translation = "「아아앗, 아직 시간은 많은데…… 츄<emoji=heart04> 츄우<emoji=heart04> 너무 행복해서, 이상해져 버릴 것 같아아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "撫でれば撫でるほど、こちらの手も心も気持ちよくなって、俺の方も幸せ過ぎておかしくなってしまいそうな気分だった。"
translation = "쓰다듬으면 쓰다듬을수록 이쪽의 손도 마음도 기분 좋아져서, 나 또한 너무 행복한 나머지 이상해져 버릴 것 같은 기분이었다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「会長くん、会長くぅんっ<emoji=heart04>\u3000んちゅっ<emoji=heart04>\u3000ちゅぅっ<emoji=heart04>\u3000はぁあぁぁっ<emoji=heart04>」"
translation = "「회장 군, 회장 구운<emoji=heart04> 응츄<emoji=heart04> 츄우<emoji=heart04> 하아아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あのっ、あのねっ<emoji=heart04>\u3000んんぅ<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000……私に、お返しできること、ないかなぁ<emoji=heart04>」"
translation = "「저기, 저기이<emoji=heart04> 응으으<emoji=heart04> 츄<emoji=heart04> ……나한테, 보답받고 싶은 거, 없을까아<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「なんでもするよ<emoji=heart04>\u3000なんでもさせて欲しいの<emoji=heart04>\u3000ちゅ、ちゅぅっ……<emoji=heart04>\u3000会長くんにお返しできないの――切ないよぉ<emoji=heart04>」"
translation = "「뭐든지 할게<emoji=heart04> 뭐든지 하게 해 줬으면 좋겠어어<emoji=heart04> 츄, 츄우……<emoji=heart04> 회장 군한테 보답할 수 없는 건── 애절하다구우<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "『天使の羽』、触らせてほしい"
translation = "『천사의 날개』, 만지게 해 줬으면 좋겠어."

[[dialogue]]
speaker = "unk"
original = "それなら今日もメルエルの……"
translation = "그렇다면 오늘도 메르엘의……"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「うんっ<emoji=heart04>\u3000もちろん、いいよぉ<emoji=heart04>\u3000ちゅっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 물론, 좋아아<emoji=heart04> 츄<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「というか、えへへ<emoji=heart04>\u3000ちゅ、ちゅっ<emoji=heart04>\u3000キスしながら、羽を触ってもらっちゃったら……<emoji=heart04>」"
translation = "「그보다, 에헤헤<emoji=heart04> 츄, 츄<emoji=heart04> 키스하면서 날개를 만져진다면……<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ちゅっ<emoji=heart04>\u3000頭を撫でてもらう以上に、幸せになっちゃう……<emoji=heart04>\u3000んちゅっ<emoji=heart04>」"
translation = "「츄<emoji=heart04> 머리를 쓰다듬 받는 것 이상으로, 행복해져 버릴 거야……<emoji=heart04> 응츄<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「──私がいつも幸せにしてくれる分、ただのお返し？」"
translation = "「──내가 언제나 행복하게 해 주는 만큼, 그냥 보답이라고?」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「そう、なんだぁ<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000私、キミのこと、ちゃんと毎日、幸せにできてるんだねっ<emoji=heart04>\u3000だったら、すっごく嬉しいなぁ<emoji=heart04>」"
translation = "「그렇구우나아<emoji=heart04> 츄<emoji=heart04> 나, 너를 제대로 매일, 행복하게 해 주고 있었네에<emoji=heart04> 그렇다면, 정말 기쁘다아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "天使の羽は強い気持ちを込めながら触ると、その気持ちが相手に流れ込むという。"
translation = "천사의 날개는 강한 마음을 담아 만지면 그 마음이 상대에게 흘러 들어간다고 한다."

[[dialogue]]
speaker = "unk"
original = "俺はメルエルのことを『好きだ』と思う気持ちと、毎日の感謝を込めて、メルエルの腰から生えた天使の羽に触れる。"
translation = "나는 메르엘을 『좋아한다』는 마음과 매일의 감사를 담아, 메르엘의 허리에서 돋아난 천사의 날개에 손을 댄다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「～～っ<emoji=heart04><emoji=heart04>\u3000んんぅ、ふわぁあぁあぁっ<emoji=heart04><emoji=heart04>\u3000あぁあっ<emoji=heart04>\u3000んちゅっ<emoji=heart04>\u3000ちゅっ、ちゅぅ<emoji=heart04>\u3000ちゅぅうっ……<emoji=heart04><emoji=heart04>」"
translation = "「~~윽<emoji=heart04><emoji=heart04> 으응, 후아아아아앗<emoji=heart04><emoji=heart04> 아아앗<emoji=heart04> 응츄<emoji=heart04> 츄, 츄우<emoji=heart04> 츄우우우……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「――すごいよぉ、会長くぅんっ<emoji=heart04>\u3000はぁ、ちゅぅっ<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000これがキミの、『愛』なんだねぇ<emoji=heart04>」"
translation = "「──대단해에, 회장 구운<emoji=heart04> 하아, 츄우<emoji=heart04> 츄<emoji=heart04> 이게 너의, 『사랑』이구나아<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「前に触ってもらった時も、たくさんドキドキしちゃったけどぉ<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000――キスしながらだと、何千倍もすごいよぉ<emoji=heart04>」"
translation = "「전에 만져줬을 때도, 엄청 두근거렸지만아<emoji=heart04> 츄<emoji=heart04> ──키스하면서 하니까, 몇 천 배는 대단해에<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「これ以上ドキドキできないって、思うくらいっ<emoji=heart04>\u3000会長くんといると、ずっと心臓が高鳴ってる、のにぃ<emoji=heart04>」"
translation = "「이 이상 두근거릴 수 없다고 생각할 정도로오<emoji=heart04> 회장 군이랑 있으면, 계속 심장이 고동치고 있는데에<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ちゅっ<emoji=heart04>\u3000頭撫でてもらったり、キスしてもらったり、羽に触れてもらうとっ<emoji=heart04>\u3000んちゅっ<emoji=heart04>」"
translation = "「츄<emoji=heart04> 머리 쓰담쓰담 받거나, 키스받거나, 날개를 만져질 때마다앗<emoji=heart04> 응츄<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「そのたびに、会長くんのことっ<emoji=heart04>\u3000もっと好きになって<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000――もっとドキドキして、体熱く、なってきちゃうのっ<emoji=heart04>」"
translation = "「그럴 때마다, 회장 군이잇<emoji=heart04> 더 좋아져서<emoji=heart04> 츄<emoji=heart04> ──더 두근거리고, 몸이 뜨거워어, 져 버려어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "メルエルの熱烈な告白に俺の体も熱くなって、つい羽を撫でる手にも余裕がなくなってしまう。"
translation = "메르엘의 열렬한 고백에 내 몸도 뜨거워져서, 그만 날개를 쓰다듬는 손길에도 여유가 없어져 버린다."

[[dialogue]]
speaker = "unk"
original = "しかし、メルエルはそのつたない愛撫にも敏感に反応して、喉と体をビクビクと振るわせてくれる。"
translation = "하지만 메르엘은 그 서툰 애무에도 민감하게 반응하며, 목소리와 몸을 파르르 떤다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「はぁあんっ、会長くぅんっ<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000好きっ<emoji=heart04>\u3000んちゅっ<emoji=heart04>\u3000大好きぃ<emoji=heart04>」"
translation = "「하아앙, 회장 구운<emoji=heart04> 츄<emoji=heart04> 좋아해<emoji=heart04> 응츄<emoji=heart04> 너무 좋아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ちゅっ<emoji=heart04>\u3000愛してるなんて、言葉じゃ……<emoji=heart04>\u3000表現できないくらい、好きなのっ<emoji=heart04>」"
translation = "「츄<emoji=heart04> 사랑한다는 말로는……<emoji=heart04> 표현할 수 없을 정도로, 좋은걸<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「大好き……<emoji=heart04>\u3000大好き……っ<emoji=heart04>\u3000大好きだよぉ<emoji=heart04>\u3000んちゅっ<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000はぁあぁあ～……っ<emoji=heart04><emoji=heart04>」"
translation = "「너무 좋아……<emoji=heart04> 너무 좋아……<emoji=heart04> 너무 좋아해에<emoji=heart04> 응츄<emoji=heart04> 츄<emoji=heart04> 하아아아아~……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「私のこと、もっともっと溶かしてほしいのっ<emoji=heart04>\u3000ちゅうぅ<emoji=heart04>」"
translation = "「나를, 좀 더 좀 더 녹여줬으면 좋겠어어<emoji=heart04> 츄우우<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「私の心も、体もっ<emoji=heart04>\u3000ぜんぶ会長くんの色で染まった、会長くんのモノだからぁ<emoji=heart04>\u3000んちゅっ……<emoji=heart04>」"
translation = "「내 마음도, 몸도옷<emoji=heart04> 전부 회장 군의 색으로 물든, 회장 군의 것이니까아<emoji=heart04> 응츄……<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ちゅっ<emoji=heart04>\u3000私を、何度も溶かして――何度でもキミ好みの女の子に、させてくださぁい<emoji=heart04>」"
translation = "「쪽<emoji=heart04> 나를, 몇 번이고 녹여서―― 몇 번이라도 당신 취향의 여자아이로, 만들어 주세요오<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "メルエルはまるで、自分の中に渦巻く『好き』を伝える方法がなくて苦しむように、ありとあらゆる言葉で愛をささやき続ける。"
translation = "메르엘은 마치, 자신 안에 소용돌이치는 『좋아해』를 전할 방법이 없어서 괴로워하듯이, 온갖 말로 사랑을 계속 속삭인다."

[[dialogue]]
speaker = "unk"
original = "そんな彼女の頭を、羽を、唇を撫でて、『伝わってるよ』『大好きだよ』ということを、俺は返事し続けるのだった。"
translation = "그런 그녀의 머리를, 날개를, 입술을 쓰다듬으며, 『전해지고 있어』 『정말 좋아해』라는 것을, 나는 계속 대답해 주는 것이었다."

