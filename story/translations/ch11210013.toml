[[dialogue]]
speaker = "unk"
original = "第３話,レイラの悩み？,P"
translation = "제3화, 레이라의 고민?, P"

[[dialogue]]
speaker = "レイラ"
original = "「魔王さん、そいつ空中に打ち上げてください！」"
translation = "「마왕님, 저놈 공중으로 띄워주세요!」"

[[dialogue]]
speaker = "unk"
original = "わかった！"
translation = "알았어!"

[[dialogue]]
speaker = "レイラ"
original = "「闇よ、全てを喰らい尽くせ──デッドエンド・コラプサー！」"
translation = "「어둠이여, 모든 것을 삼켜라── 데드 엔드 콜랩서!」"

[[dialogue]]
speaker = "unk"
original = "レイラが生み出した極小ブラックホールが、機械型モンスターを一瞬で消滅させる。"
translation = "레이라가 만들어낸 극소 블랙홀이 기계형 몬스터를 순식간에 소멸시킨다."

[[dialogue]]
speaker = "unk"
original = "レイラの力はコラプサーの中でも規格外で、これでも弱体化したとは思えない圧倒的な破壊力だった。"
translation = "레이라의 힘은 콜랩서 중에서도 규격 외로, 이래서야 약화되었다고는 생각되지 않는 압도적인 파괴력이었다."

[[dialogue]]
speaker = "レイラ"
original = "「……ふぅ」"
translation = "「……후우.」"

[[dialogue]]
speaker = "unk"
original = "お疲れ様"
translation = "수고했어."

[[dialogue]]
speaker = "レイラ"
original = "「はい、魔王さんもお疲れ様でした」"
translation = "「네, 마왕님도 수고하셨습니다.」"

[[dialogue]]
speaker = "レイラ"
original = "「私の場合、星術の破壊力が高すぎて、戦うのは神経を使うというか、気を抜くと街を消し飛ばしてしまいそうで……」"
translation = "「제 경우엔 성술 파괴력이 너무 높아서 싸울 때 신경을 많이 쓴달까요, 방심하면 거리를 날려버릴 것 같아서……」"

[[dialogue]]
speaker = "レイラ"
original = "「だから味方を巻き込みそうで、連携も得意じゃなかったんですけど、力が弱くなったおかげで戦いやすくなった気がします」"
translation = "「그래서 아군을 휘말리게 할 것 같아 연계도 잘 못했는데, 힘이 약해진 덕분에 싸우기 편해진 기분이 들어요.」"

[[dialogue]]
speaker = "unk"
original = "最近は任務や訓練でレイラと一緒にいることが増え、こうして話す機会も多くなった。"
translation = "최근에는 임무나 훈련으로 레이라와 함께 있는 일이 늘었고, 이렇게 이야기할 기회도 많아졌다."

[[dialogue]]
speaker = "レイラ"
original = "「うーん……」"
translation = "「으음……」"

[[dialogue]]
speaker = "unk"
original = "どうしたの？"
translation = "왜 그래?"

[[dialogue]]
speaker = "レイラ"
original = "「コラプサーとは別件なんですが……ネビュラのサイバー担当になったので、デスクワークが多くなっちゃって……肩こりがひどいんです」"
translation = "「콜랩서와는 별개 건인데…… 네뷸라의 사이버 담당이 된 후로 데스크워크가 많아져서 그런지 어깨결림이 심해요.」"

[[dialogue]]
speaker = "レイラ"
original = "「肩もみ、ですか？\u3000あ、じゃあ、ちょっとだけお願いしていいですか？\u3000肩こり本当につらくて……」"
translation = "「어깨 안마요? 아, 그럼 잠시만 부탁해도 될까요? 어깨결림이 정말 고통스러워서……」"

[[dialogue]]
speaker = "unk"
original = "綺麗な髪をかき分け、レイラの肩に触れる。"
translation = "고운 머릿결을 헤치고 레이라의 어깨에 손을 얹는다."

[[dialogue]]
speaker = "unk"
original = "今まで意識していなかったが、華奢な肩幅に、異性だということを思い出してしまった。"
translation = "지금까지 의식하지 못했지만, 가녀린 어깨 폭을 느끼며 이성이라는 사실을 다시금 깨달았다."

[[dialogue]]
speaker = "レイラ"
original = "「どうしたんです？\u3000肩、揉んでくれないんですか？」"
translation = "「왜 그러세요? 어깨 안 주물러주시는 건가요?」"

[[dialogue]]
speaker = "unk"
original = "本人も望んでいることだし、と意を決して手に力を込める。"
translation = "본인도 원하는 일이라며 마음을 굳게 먹고 손에 힘을 준다."

[[dialogue]]
speaker = "レイラ"
original = "「ん、あっ……んんっ」"
translation = "「응, 앗…… 응응.」"

[[dialogue]]
speaker = "レイラ"
original = "「そこそこ……あっ、魔王さん、上手すぎますっ……やってたでしょっ」"
translation = "「거기 거기…… 앗, 마왕님, 너무 잘하시는데요…… 해본 솜씨죠?」"

[[dialogue]]
speaker = "レイラ"
original = "「ああぁっ……魔王さんのが気持ちいいとこ押してきて……んっ、気持ちよすぎ……」"
translation = "「아아아앗…… 마왕님의 손길이 기분 좋은 곳을 눌러와서…… 응, 너무 기분 좋아……」"

[[dialogue]]
speaker = "レイラ"
original = "「ありがとうございます。少し楽になりました」"
translation = "「감사합니다. 조금 편해졌어요.」"

[[dialogue]]
speaker = "レイラ"
original = "「ほら、私って人よりたくさん食べるじゃないですか。だから栄養が胸に来ちゃうんですよね」"
translation = "「보세요, 제가 남들보다 많이 먹잖아요. 그래서 영양분이 가슴으로 가버리나 봐요.」"

[[dialogue]]
speaker = "レイラ"
original = "「最近またサイズが大きくなっちゃって……」"
translation = "「최근에 또 사이즈가 커져 버려서……」"

[[dialogue]]
speaker = "レイラ"
original = "「キサナやイングリットに聞いても肩こりなんて気にしたことないらしいし、メテオラにいたっては肩こりが何かすら知りませんでした」"
translation = "「키사나나 잉그리드에게 물어봐도 어깨결림 같은 건 신경 써본 적 없다 하고, 메테오라는 아예 어깨결림이 뭔지도 모르더라고요.」"

[[dialogue]]
speaker = "レイラ"
original = "「やっぱり運動の習慣をつけた方がいいんでしょうか……？」"
translation = "「역시 운동 습관을 들이는 게 좋을까요……?」"

[[dialogue]]
speaker = "レイラ"
original = "「……魔王さん？\u3000あのー、聞いてますか？」"
translation = "「……마왕님? 저기—, 듣고 계세요?」"

[[dialogue]]
speaker = "unk"
original = "ごめん、ぼーっとしてたみたい"
translation = "미안, 깜빡 멍하니 있었나 봐"

[[dialogue]]
speaker = "レイラ"
original = "「お疲れなのかもしれませんね。星徒会長はご多忙ですから。肩もみなんてさせて、すみません」"
translation = "「피곤하신 걸지도 모르겠네요. 성도회장님은 워낙 바쁘시니까요. 어깨 주무르기 같은 걸 시켜서 죄송해요」"

[[dialogue]]
speaker = "レイラ"
original = "「でも、気持ちよかったのは本当なので……すごくすっきりしました。ありがとうございます」"
translation = "「하지만 정말 기분 좋았던 건 사실이라…… 아주 개운해졌어요. 감사합니다」"

[[dialogue]]
speaker = "レイラ"
original = "「今日は早くお休みくださいね。では、また」"
translation = "「오늘은 일찍 쉬세요. 그럼, 다음에 봐요」"

[[dialogue]]
speaker = "レイラ"
original = "「──ということがあったんですけど、それ以来、魔王さんから避けられているような気がして……私、何か粗相をしてしまったのでしょうか」"
translation = "「──라는 일이 있었는데요, 그 이후로 마왕님이 저를 피하시는 것 같은 기분이 들어서…… 제가 무슨 실수라도 한 걸까요」"

[[dialogue]]
speaker = "コハルコ"
original = "「むしろ粗相しかしてないんじゃないかな？」"
translation = "「오히려 실수밖에 안 한 거 아니야?」"

[[dialogue]]
speaker = "レイラ"
original = "「ファっ！？」"
translation = "「화앗!?」"

[[dialogue]]
speaker = "コハルコ"
original = "「考えてもみて。私が会長さんに『私、胸が大きいから肩こりひどいの～』なんて言ったらおかしいでしょ？」"
translation = "「생각해 봐. 내가 회장님한테 『저, 가슴이 커서 어깨결림이 심해요~』 같은 소릴 하면 이상하잖아?」"

[[dialogue]]
speaker = "レイラ"
original = "「それはもう、やべー女じゃないですか！？」"
translation = "「그건 이미 위험한 여자 아닌가요!?」"

[[dialogue]]
speaker = "コハルコ"
original = "「やべーのはレイラだからね！？」"
translation = "「위험한 건 레이라거든!?」"

[[dialogue]]
speaker = "レイラ"
original = "「え、ウソ……私、そんなこと…………」"
translation = "「에, 거짓말…… 제가 그런 소릴…………」"

[[dialogue]]
speaker = "レイラ"
original = "『ほら、私って人よりたくさん食べるじゃないですか。だから栄養が胸に来ちゃうんですよね』"
translation = "『보세요, 제가 남들보다 많이 먹잖아요. 그래서 영양분이 가슴으로 가버리나 봐요』"

[[dialogue]]
speaker = "レイラ"
original = "『最近またサイズが大きくなっちゃって……』"
translation = "『최근에 또 사이즈가 커져 버려서……』"

[[dialogue]]
speaker = "レイラ"
original = "「言ってる～～～～～！？」"
translation = "「말했어~~~~~!」"

[[dialogue]]
speaker = "レイラ"
original = "「なんで、いつの間に！？\u3000これが叙述トリックってやつですか！？」"
translation = "「어째서, 언제 어느 사이에!? 이것이 서술 트릭이라는 건가요!?」"

[[dialogue]]
speaker = "コハルコ"
original = "「いや、レイラの距離感がバグってるだけだよ……相手は男の子なんだから、ちゃんと節度を持って接しなさい」"
translation = "「아니, 레이라의 거리감이 고장 난 것뿐이야…… 상대는 남자애니까, 제대로 절도를 지켜서 대하라고」"

[[dialogue]]
speaker = "コハルコ"
original = "「あと、ネットのノリをリアルに持ち込まないこと。ちょいちょい漏れ出てるからね。分かった？」"
translation = "「그리고 인터넷 말투를 현실로 끌어들이지 말 것. 조금씩 새어 나오고 있으니까. 알았어?」"

[[dialogue]]
speaker = "レイラ"
original = "「はい、気を付けます。……魔王さんにもちゃんと謝らなくちゃ」"
translation = "「네, 조심할게요. ……마왕님께도 제대로 사과드려야겠어요」"

[[dialogue]]
speaker = "unk"
original = "レイラとモンスターを討伐してからしばらく──"
translation = "레이라와 몬스터를 토벌하고 나서 한동안──"

[[dialogue]]
speaker = "unk"
original = "眠れない……"
translation = "잠이 안 와……"

[[dialogue]]
speaker = "レイラ"
original = "『ん、あっ……んんっ』"
translation = "『응, 앗…… 응응』"

[[dialogue]]
speaker = "レイラ"
original = "『ああぁっ……魔王さんのが気持ちいいとこ押してきて……んっ、気持ちよすぎ……』"
translation = "『아아아앗…… 마왕님의 손길이 기분 좋은 곳을 눌러와서…… 응, 너무 기분 좋아……』"

[[dialogue]]
speaker = "unk"
original = "レイラのことを思い出して眠れない夜が続く。"
translation = "레이라의 일이 생각나서 잠 못 드는 밤이 계속된다."

[[dialogue]]
speaker = "unk"
original = "レイラからメッセージだ……。"
translation = "레이라한테 메시지다……."

