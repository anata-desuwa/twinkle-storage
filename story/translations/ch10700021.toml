[[dialogue]]
speaker = "unk"
original = "第１話,新衣装を披露しちゃうし♪,P"
translation = "제1화, 새 의상을 선보여 줄게♪, P"

[[dialogue]]
speaker = "unk"
original = "流星学園のギャル天使・ウズメイアと交際をするようになってから、最初のバレンタインを数日後に控えた、ある日の放課後……"
translation = "유성학원의 갸루 천사 우즈메이야와 교제하게 된 후, 첫 발렌타인을 며칠 앞둔 어느 날 방과 후……"

[[dialogue]]
speaker = "ウズメイア"
original = "「失礼しまーす！\u3000会長くんに用事が……あ、いたいた。ちょりっす～♪」"
translation = "「실례함다! 회장군한테 볼일이…… 아, 여기 있다. 쵸릿스~♪」"

[[dialogue]]
speaker = "マトイ"
original = "「ふふっ。ウズメイアさん、今日も元気いっぱいだね」"
translation = "「후훗. 우즈메이야 씨, 오늘도 기운이 넘치네.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「元気なのが取り柄ですから！\u3000マトイ先輩もアナちゃんもこんにちは！」"
translation = "「기운찬 게 장점이니까요! 마토이 선배도 아나 짱도 안녕!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「……って、あれれ。今ってもしかしてお仕事中？\u3000お邪魔だったり～……？」"
translation = "「……어라라. 혹시 지금 업무 중? 방해되려나~……?」"

[[dialogue]]
speaker = "アナ"
original = "「ノープロブレムです。年明けに溜まっていたお仕事も片付いて、数日前から星徒会は平和そのもの」"
translation = "「노 프라블럼입니다. 연초에 밀려 있던 업무도 정리되어, 며칠 전부터 성도회는 평화 그 자체.」"

[[dialogue]]
speaker = "マトイ"
original = "「ちょうどお茶でもしようかって話してたところなんだ。ウズメイアさんも一緒にどうかな？」"
translation = "「마침 차라도 마실까 하던 참이었어. 우즈메이야 씨도 같이 어때?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「わー、ありがとうございます！\u3000ぜひぜひ！」"
translation = "「와아, 감사합니다! 꼭꼭이요!」"

[[dialogue]]
speaker = "アナ"
original = "「会長とお付き合いするようになってから、ウズメさんもすっかり新星星徒会に馴染みましたね」"
translation = "「회장과 사귀게 된 뒤로, 우즈메 씨도 완전히 신성성도회에 녹아들었네요.」"

[[dialogue]]
speaker = "マトイ"
original = "「そうだね～。いつも賑やかにしてくれるから私たちも嬉しいな。今日もゆっくりしていってね」"
translation = "「그렇네~. 언제나 활기차게 해 주니까 우리도 기뻐. 오늘도 푹 쉬다 가.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「えへへ～、それじゃあお言葉に甘えて。今日もいっぱいお喋りしちゃうし♪」"
translation = "「에헤헤~, 그럼 말씀 사양 않고. 오늘도 잔뜩 수다 떨어 버릴 거라구♪」"

[[dialogue]]
speaker = "アナ"
original = "「いつものお茶請けの話題……『今日の会長』ですが、色々と仕入れています。ウズメさんがいない時の会長エピソードはたんまり」"
translation = "「늘 있는 찻자리 화제…… 『오늘의 회장』입니다만, 여러 가지 입수해 두었습니다. 우즈메 씨가 없을 때의 회장 에피소드는 한 가득.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「マジで！？\u3000最高だし！\u3000聞かせて聞かせて！」"
translation = "「진짜!? 최고라구! 들려줘 들려줘!」"

[[dialogue]]
speaker = "アナ"
original = "「今日のネタは、かっこいい系の話題とちょっとおちゃめな話題と、錬金術同好会で大変な目にあった話題の３種があります」"
translation = "「오늘의 네타는, 멋진 계열 화제와 조금 장난스러운 화제, 그리고 연금술 동호회에서 험한 꼴을 당한 화제까지 3종류가 있습니다.」"

[[dialogue]]
speaker = "unk"
original = "最後のは思い出させないで……！"
translation = "마지막 건 떠올리게 하지 말아 줘……!"

[[dialogue]]
speaker = "ウズメイア"
original = "「えー、全部聞きたい！\u3000お付き合いしてる会長くんのことは、いっぱい知っておきたいし～♪」"
translation = "「에─, 전부 들을래! 사귀고 있는 회장군에 대해서는 잔뜩 알아 두고 싶다구~♪」"

[[dialogue]]
speaker = "ウズメイア"
original = "「教えてくれたらお礼に、今度また抹茶パフェご馳走しちゃうし！」"
translation = "「가르쳐 주면 답례로 나중에 또 말차 파르페 쏠게!」"

[[dialogue]]
speaker = "アナ"
original = "「イエス。副会長権限により、知りうる会長のデータを全て進呈しましょう」"
translation = "「예스. 부회장 권한으로, 알고 있는 회장의 데이터를 전부 진상하죠.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「イェ～イ、ハイタッチ♪」"
translation = "「예~이, 하이 터치♪」"

[[dialogue]]
speaker = "アナ"
original = "「いぇ～い」"
translation = "「이예~이.」"

[[dialogue]]
speaker = "マトイ"
original = "「あはは……まあ、楽しそうに盛り上がるのはいいことだよね」"
translation = "「아하하…… 뭐, 즐겁게 북적거리는 건 좋은 일이지.」"

[[dialogue]]
speaker = "unk"
original = "俺のプライベートはどこに？？？"
translation = "내 프라이버시는 어디에???"

[[dialogue]]
speaker = "unk"
original = "自分の話題で盛り上がられるのはちょっぴり恥ずかしいのだけど……"
translation = "내 화제로 들썩거리는 건 조금 부끄럽지만……"

[[dialogue]]
speaker = "unk"
original = "ウズメは学び舎の違う俺に会うために、わざわざ出向いてくれている。そして俺に関するどんな些細な話題でも、ニコニコと嬉しそうに聞いてくれる。"
translation = "우즈메는 배움터가 다른 나를 만나기 위해 일부러 찾아와 주고 있다. 그리고 나에 관한 어떤 사소한 화제라도 싱글벙글하며 기쁘게 들어 준다."

[[dialogue]]
speaker = "unk"
original = "それがとても嬉しいから、俺は気恥ずかしさを覚えつつも『今日の会長』なんていう話題を止めることができないのだった。"
translation = "그게 너무 고마워서, 나는 쑥스러움을 느끼면서도 『오늘의 회장』 같은 화제를 멈출 수가 없었다."

[[dialogue]]
speaker = "ウズメイア"
original = "「──って！\u3000お喋りに夢中で忘れてたし！\u3000今日はちゃんと用事があったんだった！」"
translation = "「──앗! 수다에 빠져서 잊고 있었다구! 오늘은 제대로 용건이 있어서 온 거였어!」"

[[dialogue]]
speaker = "マトイ"
original = "「そういえば部屋に入ってくる時、そんなことを言ってたね。どんなこと？」"
translation = "「그러고 보니 방에 들어올 때 그런 말을 했었지. 어떤 거야?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「実はあたし、新たな戦闘服を入手しました！\u3000ついさっき！」"
translation = "「실은 나, 새로운 전투복을 입수했습니다! 바로 조금 전에!」"

[[dialogue]]
speaker = "unk"
original = "どういうこと！？"
translation = "무슨 소리야!?"

[[dialogue]]
speaker = "アナ"
original = "「ああ……なるほど。この間から、理事長がウキウキでバレンタインフォームのデザインを作っていましたね。あれ、ウズメさんの衣装だったんですか」"
translation = "「아아…… 그렇군요. 얼마 전부터 이사장이 신이 나서 발렌타인 폼 디자인을 만들고 있었죠. 그게 우즈메 씨의 의상이었습니까.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「そうなの！\u3000んでね、さっきいきなり呼び出されて、ホイって感じでくれたの！\u3000いぇい、祝・２着目の人工戦闘服！」"
translation = "「맞아! 그래서 말야, 방금 갑자기 불려가서 휙~ 하는 느낌으로 받았어! 예이, 축·2벌째 인공 전투복!」"

[[dialogue]]
speaker = "マトイ"
original = "「そっかー。早速、会長に見てもらおうと思ってやってきたってことだね」"
translation = "「그렇구나. 곧장 회장에게 보여 주려고 달려왔다는 거네.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「はい！\u3000というわけで～……へんし～んっ！」"
translation = "「네! 그런 의미에서~…… 변시~인!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ぢゃ～ん！\u3000どうどう、めっっっちゃ可愛いっしょ～<emoji=heart04>\u3000これがあたしのバレンタインフォームだし！」"
translation = "「쨔~안! 어때어때, 처어어엄청 귀엽지~<emoji=heart04> 이게 나의 발렌타인 폼이라구!」"

[[dialogue]]
speaker = "unk"
original = "すごく可愛いっ！！"
translation = "정말 귀여워!!"

[[dialogue]]
speaker = "マトイ"
original = "「本当だね、よく似合ってる……和風喫茶のウェイトレスさんみたい！」"
translation = "「정말이네, 잘 어울려…… 일본풍 카페의 웨이트리스 분 같아!」"

[[dialogue]]
speaker = "アナ"
original = "「普段のギャルファッションと対称的ですね。清楚な格好もよくお似合いです」"
translation = "「평소의 갸루 패션과 대조적이네요. 청초한 복장도 잘 어울립니다.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「えへへ、それほどでも～。人間界に留学するまでは、露出の少ないファッションばっかりだったからかな？」"
translation = "「에헤헤, 그 정도까지는~. 인간계로 유학 오기 전까지는 노출 적은 패션뿐이라서 그런가?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「久しぶりだけど、しっくりくる感じなんだ～。こういう格好もたまにはいいかもだし！」"
translation = "「오랜만이지만 딱 맞는 느낌이야~. 이런 모습도 가끔은 좋을지도 모르겠고!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「バレンタインチョコ、この衣装で腕によりをかけて作るから！\u3000期待しててね♪」"
translation = "「발렌타인 초코, 이 의상으로 실력 발휘해서 만들 테니까! 기대해 줘♪」"

[[dialogue]]
speaker = "unk"
original = "ありがとう、すごく楽しみだよ！"
translation = "고마워, 정말 기대된다!"

[[dialogue]]
speaker = "ウズメイア"
original = "「にひひ、女子力思いっきり見せちゃうし！\u3000バレンタインデーまでにチョコ作りの練習、いっぱいしなきゃね～♪」"
translation = "「니히히, 여자력 제대로 보여 주겠다구! 발렌타인데이까지 초코 만들기 연습 잔뜩 해야지~♪」"

[[dialogue]]
speaker = "マトイ"
original = "「ウズメイアさんってお料理は得意なんだっけ？」"
translation = "「우즈메이야 씨는 요리가 특기였나?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「普段から自炊してるから、それなりって感じ……？\u3000会長くんのお弁当とか、よく作ってますから自信はあります！」"
translation = "「평소에 자취하니까 그럭저럭인 느낌……? 회장군 도시락이라든가 자주 만드니까 자신은 있어요!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「まぁでも基本和食ばっかりなんで、洋菓子はお勉強必須かも……あ、そーだっ」"
translation = "「뭐 하지만 기본적으로 일식뿐이라, 양과자는 공부 필수일지도…… 아, 맞다.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「マトイ先輩ってお菓子作り、得意ですよね？\u3000良ければご指導お願いできませんか？」"
translation = "「마토이 선배 요리 잘하시죠? 괜찮다면 지도 부탁드려도 될까요?」"

[[dialogue]]
speaker = "マトイ"
original = "「私がっ！？\u3000だ、大丈夫かな～……お菓子作りはただの趣味だし、サランさんの方が適任だと思うけど……」"
translation = "「내가!? 고, 괜찮으려나~…… 과자 만들기는 그냥 취미고, 사란 씨가 더 적임이라고 생각하는데……」"

[[dialogue]]
speaker = "アナ"
original = "「そんなことはありません。マトイ先輩は和洋問わず素晴らしいお菓子を作れます」"
translation = "「그렇지 않습니다. 마토이 선배는 한일 양식 가리지 않고 훌륭한 과자를 만들 수 있습니다.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「うんうん、だよね！\u3000さっき食べさせてもらったクッキーも超美味しかったし！」"
translation = "「응응, 맞지! 아까 먹게 해 준 쿠키도 엄청 맛있었구!」"

[[dialogue]]
speaker = "アナ"
original = "「そして何より、星徒会で何度も手料理をふるまってきた経験から、マトイ先輩は会長の舌の好みを把握しています」"
translation = "「그리고 무엇보다, 성도회에서 몇 번이고 수제 요리를 대접해 온 경험으로, 마토이 선배는 회장의 입맛을 파악하고 있습니다.」"

[[dialogue]]
speaker = "アナ"
original = "「会長に本命チョコを贈る上で、マトイ先輩はこれ以上ない指南役と言えるでしょう」"
translation = "「회장에게 본명 초코를 선물하는 데 있어, 마토이 선배는 이보다 더 좋을 수 없는 지남역이라 할 수 있겠죠.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「──言われてみればそうじゃん！？\u3000こんな近くにグランドマスターがいたことに今気づいたし！」"
translation = "「──듣고 보니 그렇잖아!? 이렇게 가까운 곳에 그랜드 마스터가 있었다는 걸 이제야 깨달았다구!」"

[[dialogue]]
speaker = "マトイ"
original = "「私が……ぐ、グランドマスター！？\u3000そんなこと……初めて言われたっ……！！」"
translation = "「내가…… 그, 그랜드 마스터!? 그런 말…… 처음 들어봤어……!!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「師匠！\u3000お願いします、あたしに会長くん好みのお菓子を作らせてくださいっ！」"
translation = "「스승님! 부탁드려요, 저에게 회장군 취향의 과자를 만들게 해 주세요!」"

[[dialogue]]
speaker = "マトイ"
original = "「師匠……！！\u3000そそ、そこまで頼りにされたら断れないよ！\u3000うん、任せて！\u3000早速、今日から一緒に練習しよっか！」"
translation = "「스승님……!! 그, 그렇게까지 의지해 준다면 거절할 수 없지! 응, 맡겨 줘! 당장 오늘부터 같이 연습할까!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「感謝感激だし～！\u3000あ、でもでも、流星学園のバレンタイン行事で、放課後はちょっとつぶれちゃうんですけど……」"
translation = "「감사 감격이라구~! 아, 그치만 그치만, 유성학원의 발렌타인 행사 때문에 방과 후는 조금 시간이 안 되는데……」"

[[dialogue]]
speaker = "マトイ"
original = "「うん、そのことは知ってるから大丈夫だよ。練習は夜からにしよっか？」"
translation = "「응, 그건 알고 있으니까 괜찮아. 연습은 밤부터 할까?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「やった～！\u3000マトイ先輩のフォローがあるなら、もう勝ち確ってやつだし！！\u3000アナちゃんも一緒にどお？」"
translation = "「나이스~! 마토이 선배의 팔로우가 있다면 이제 승리 확정이라구!! 아나 짱도 같이 어때?」"

[[dialogue]]
speaker = "アナ"
original = "「そうですね。いい機会ですしご一緒しましょう。なお私は、お菓子の味見には絶対の自信があります。お任せください」"
translation = "「그러죠. 좋은 기회니 함께하겠습니다. 참고로 저는 과자 맛보기에는 절대적인 자신이 있습니다. 맡겨 주십시오.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「えへへっ、心強い！\u3000楽しくなってきたし～♪」"
translation = "「에헤헷, 든든해! 즐거워지기 시작했다구~♪」"

[[dialogue]]
speaker = "unk"
original = "恋人のウズメがこんなにもやる気を出して、俺へのチョコレートを作ってくれるだなんて。"
translation = "연인인 우즈메가 이렇게까지 의욕을 내서 나를 위한 초콜릿을 만들어 주다니."

[[dialogue]]
speaker = "unk"
original = "バレンタイン当日にどんなチョコがもらえるのか、今から楽しみになってしまうのだった──"
translation = "발렌타인 당일에 어떤 초코를 받게 될지, 벌써부터 기대되는 것이었다──"

