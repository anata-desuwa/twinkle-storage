[[dialogue]]
speaker = "unk"
original = "第４話,海デート！,P"
translation = "제4화, 바다 데이트!, P"

[[dialogue]]
speaker = "フィオナ"
original = "「星徒会活動お疲れ様です。緋宮会長もティータイムですか？」"
translation = "「성도회 활동 수고하셨습니다. 히노미야 회장도 티타임인가요?」"

[[dialogue]]
speaker = "フィオナ"
original = "「私は今日は紅茶とビスケットを。スコーンもおすすめですよ」"
translation = "「저는 오늘은 홍차와 비스킷을. 스콘도 추천합니다.」"

[[dialogue]]
speaker = "フィオナ"
original = "「そういえば、サーフィン勝負で緋宮会長が勝ったのに、私に何をしてほしいかまだ聞いていませんね」"
translation = "「그러고 보니, 서핑 시합에서 히노미야 회장이 이겼는데, 저에게 무엇을 해줬으면 좋겠는지 아직 묻지 않으셨네요.」"

[[dialogue]]
speaker = "フィオナ"
original = "「あれは恨みっこなしの真剣勝負。私が言い出したことでもありますし、遠慮はいりませんよ」"
translation = "「그건 뒤끝 없는 진검 승부. 제가 먼저 꺼낸 말이기도 하니, 사양할 필요 없어요.」"

[[dialogue]]
speaker = "unk"
original = "俺とデートしてほしい"
translation = "나와 데이트해 줘"

[[dialogue]]
speaker = "フィオナ"
original = "「はい、デートですね。もちろん大丈夫ですよ。今週末に──」"
translation = "「네, 데이트군요. 물론 괜찮아요. 이번 주말에──」"

[[dialogue]]
speaker = "フィオナ"
original = "「デ、デート！？」"
translation = "「데, 데이트!?」"

[[dialogue]]
speaker = "フィオナ"
original = "「こ、こんにちは……」"
translation = "「아, 안녕하세요……」"

[[dialogue]]
speaker = "フィオナ"
original = "「緋宮会長と２人きりになったことは今までもありますけど、改めてデートだと思うと照れますね……」"
translation = "「히노미야 회장과 단둘이 있었던 적은 지금까지도 있지만, 새삼 데이트라고 생각하니 부끄럽네요…….」"

[[dialogue]]
speaker = "unk"
original = "ここはリップルが新たに作った、２人きりになれるデート用の結界。"
translation = "이곳은 리플이 새로 만든, 단둘이 있을 수 있는 데이트용f 결계."

[[dialogue]]
speaker = "unk"
original = "名付けて“ラブラブシーサイド結界”。"
translation = "이름하여 “러브러브 시사이드 결계”."

[[dialogue]]
speaker = "unk"
original = "なんでも「街でカップルを見て思イツキました！」とのことで、ロマンチックな雰囲気になるよう時間を夕方に固定してあるのだとか。"
translation = "뭐든지 「거리에서 커플을 보고 떠올랐슴다!」라고 해서, 낭만적인 분위기가 되도록 시간을 저녁으로 고정해 두었다고 한다."

[[dialogue]]
speaker = "フィオナ"
original = "「せっかくの海ですし、水遊びしましょうか！」"
translation = "「모처럼의 바다인데, 물놀이할까요!」"

[[dialogue]]
speaker = "フィオナ"
original = "「……って、そんな雰囲気でもないですか。あはは……」"
translation = "「……라고 해도, 그런 분위기는 아닌가요. 아하하……」"

[[dialogue]]
speaker = "フィオナ"
original = "「デートって何をすればいいんでしょうか。私、昔から使命を果たすことばかり考えていたので、そういうのには疎くて……」"
translation = "「데이트는 뭘 해야 할까요. 저는 예전부터 사명을 다하는 것만 생각해서, 그런 것에는 서툴러서…….」"

[[dialogue]]
speaker = "フィオナ"
original = "「デートに誘ったのは緋宮会長ですし……緋宮会長ならわかりますか？」"
translation = "「데이트를 신청한 건 히노미야 회장이니…… 히노미야 회장이라면 아나요?」"

[[dialogue]]
speaker = "unk"
original = "俺もよくわからない"
translation = "나도 잘 모르겠다"

[[dialogue]]
speaker = "フィオナ"
original = "「わからないんですかっ」"
translation = "「모르는 건가요!」"

[[dialogue]]
speaker = "unk"
original = "それでもフィオナとデートしたかったから"
translation = "그래도 피오나와 데이트하고 싶었으니까"

[[dialogue]]
speaker = "フィオナ"
original = "「！？\u3000そんなこと言われたら……うぅ、ずるいです……」"
translation = "「!? 그런 말을 들으면…… 으으, 치사해요…….」"

[[dialogue]]
speaker = "unk"
original = "一緒にデートらしいことを考えていこう"
translation = "함께 데이트다운 것을 생각해 보자"

[[dialogue]]
speaker = "フィオナ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふふ、そうですね。わからないなら模索していけばいいんですから」"
translation = "「후후, 그렇네요. 모른다면 모색해 나가면 되는 거니까요.」"

[[dialogue]]
speaker = "フィオナ"
original = "「じゃあ……手をつなぎませんか？\u3000これは間違いなくデートっぽいですよ。では失礼して……」"
translation = "「그럼…… 손잡지 않을래요? 이건 틀림없이 데이트 같아요. 그럼 실례해서……」"

[[dialogue]]
speaker = "フィオナ"
original = "「にぎにぎ」"
translation = "「꼬옥」"

[[dialogue]]
speaker = "フィオナ"
original = "「緋宮会長の手、大きくてたくましいですね。男性の手です」"
translation = "「히노미야 회장의 손, 크고 듬직하네요. 남자의 손이에요.」"

[[dialogue]]
speaker = "フィオナ"
original = "「緋宮会長は拳で戦いますから、この手が世界を守ってるんですよね。ふふふ、この手にはいつも助けられてます。ありがとうございます」"
translation = "「히노미야 회장은 주먹으로 싸우니까, 이 손이 세계를 지키고 있는 거네요. 후후후, 이 손에는 항상 도움받고 있어요. 감사합니다.」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふむふむ、思ったより硬い手触りなんですね。不思議と安心できて……この感触、私好きです」"
translation = "「흠흠, 생각보다 단단한 감촉이네요. 신기하게도 안심이 되고…… 이 감촉, 저는 좋아요.」"

[[dialogue]]
speaker = "フィオナ"
original = "「──って、いつまで握ってるんだって感じですよね……」"
translation = "「──라고 해도, 언제까지 잡고 있을 거냐는 느낌이죠…….」"

[[dialogue]]
speaker = "フィオナ"
original = "「え？\u3000デートなんだからずっと握っていてもいい……？\u3000それなら遠慮なく……」"
translation = "「네? 데이트니까 계속 잡고 있어도 된다고요……? 그렇다면 사양하지 않고……」"

[[dialogue]]
speaker = "フィオナ"
original = "「にぎにぎ……にぎにぎ……えへへ。いいですね、デート」"
translation = "「꼬옥…… 꼬옥…… 에헤헤. 좋네요, 데이트.」"

[[dialogue]]
speaker = "フィオナ"
original = "「次は……ビーチを散歩？\u3000確かにデートらしいです。せっかくですから、手をつないだまま、ゆっくり歩きましょうか」"
translation = "「다음은…… 해변 산책? 확실히 데이트답네요. 모처럼이니, 손을 잡은 채로, 천천히 걸을까요.」"

[[dialogue]]
speaker = "フィオナ"
original = "「ビーチをぐるりと一周しましたけど、小さな島になっていて、本当に私たちしかいないんですね。結界の主であるリップルさんはどこかにいるのかもしれませんが」"
translation = "「해변을 빙 둘러 한 바퀴 돌았는데, 작은 섬이 되어 있어서, 정말 우리밖에 없네요. 결계의 주인인 리플 씨는 어딘가에 있을지도 모르겠지만요.」"

[[dialogue]]
speaker = "フィオナ"
original = "「夕暮れの海で２人きり……この広い世界で私とあなただけになってしまったみたいです」"
translation = "「해 질 녘 바다에서 단둘이…… 이 넓은 세상에 저와 당신만 남게 된 것 같아요.」"

[[dialogue]]
speaker = "フィオナ"
original = "「こんなシチュエーションだとつい大胆になってしまうかもしれません。たとえば……」"
translation = "「이런 상황이라면 저도 모르게 대담해질지도 모릅니다. 예를 들면……」"

[[dialogue]]
speaker = "フィオナ"
original = "「緋宮会長を閉じ込めて独り占めしてしまうとか」"
translation = "「히노미야 회장을 가둬 두고 독차지해 버린다든가.」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふふ♪\u3000そんなに驚かないでください、冗談ですよ。そういうのじゃなくて──」"
translation = "「후후♪ 그렇게 놀라지 마세요, 농담이에요. 그런 게 아니라──」"

[[dialogue]]
speaker = "フィオナ"
original = "「ちゅっ」"
translation = "「쪽」"

[[dialogue]]
speaker = "unk"
original = "！？"
translation = "!?」"

[[dialogue]]
speaker = "フィオナ"
original = "「緋宮会長の希望でデートしたんですから、ちゃんとドキッとしてもらわないといけません」"
translation = "「히노미야 회장의 희망으로 데이트한 거니까, 제대로 두근거리게 해 드려야죠.」"

[[dialogue]]
speaker = "フィオナ"
original = "「今日のデート、満足していただけましたか？」"
translation = "「오늘 데이트, 만족하셨나요?」"

[[dialogue]]
speaker = "unk"
original = "……もちろん"
translation = "……물론이지"

[[dialogue]]
speaker = "フィオナ"
original = "「さすがの緋宮会長も照れていますね。そうでなくては女の子として自信をなくしてしまいます。私だって恥ずかしかったんですから」"
translation = "「역시 히노미야 회장도 부끄러워하네요. 그렇지 않으면 여자로서 자신감을 잃어버려요. 저도 부끄러웠으니까요.」"

[[dialogue]]
speaker = "フィオナ"
original = "「……私も緋宮会長とのデート、とても楽しかったです」"
translation = "「……저도 히노미야 회장과의 데이트, 정말 즐거웠어요.」"

[[dialogue]]
speaker = "フィオナ"
original = "「勝負とは関係なく、海でも他の場所でも……またデートに行きましょうね」"
translation = "「승부와 상관없이, 바다에서도 다른 장소에서도…… 또 데이트하러 가요.」"

