[[dialogue]]
speaker = "unk"
original = "第１話,ルルカの新衣装,P"
translation = "제1화, 루루카의 새 의상, P"

[[dialogue]]
speaker = "unk"
original = "とある平日の午後──俺はルルカと共に、リップルが作り出したリゾート結界を訪れていた。"
translation = "어느 평일 오후── 나는 루루카와 함께, 리플이 만들어낸 리조트 결계를 방문했다."

[[dialogue]]
speaker = "unk"
original = "リゾート結界は観光地としても有名になってしまったが、リップルに頼めば別空間のプライベートビーチに入れてもらうこともできる。"
translation = "리조트 결계는 관광지로도 유명해져 버렸지만, 리플에게 부탁하면 별도 공간의 프라이빗 비치에 들어가게 해줄 수도 있다."

[[dialogue]]
speaker = "unk"
original = "Ｖチューバー関連の打ち合わせをするにはもってこいの場所なのだ。"
translation = "VTuber 관련 회의를 하기에는 안성맞춤인 장소인 것이다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「──で、これが今度の新曲と一緒に披露する、ルカルカの新衣装のラフイラストだよ！」"
translation = "「──그래서, 이게 이번 신곡과 함께 선보일, 루카루카의 새 의상 러프 일러스트야!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「とっても素敵な水着姿をデザインしてもらったんだぁ。このイルカの浮き輪も可愛いよね～♪」"
translation = "「정말 멋진 수영복 차림을 디자인 받았어어. 이 돌고래 튜브도 귀엽지~♪」"

[[dialogue]]
speaker = "unk"
original = "もう夏は過ぎてるのに水着？"
translation = "벌써 여름은 지났는데 수영복?"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ぅぐっ──！\u3000そ、それはあの、えっとー……あたしのスタートダッシュが遅かったと言うか、何と言うか……」"
translation = "「으윽──! 그, 그건 저기, 에또─…… 나의 스타트 대시가 늦었다고 할까, 뭐라고 할까……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「本当は夏に間に合わせるつもりだったんだけど、予想以上に時間がかかっちゃって……」"
translation = "「사실은 여름에 맞출 생각이었는데, 예상보다 시간이 걸려버려서……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「配信とかで忙しくてついつい後回しになって……ようやくラフが上がってきたのが今だったの……」"
translation = "「방송 같은 걸로 바빠서 그만 뒷전이 됐다가…… 겨우 러프가 올라온 게 지금이었어……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「で、でもＶチューバーが夏でない時期に水着になっちゃいけないって法律はないし！\u3000ないよねっ！？」"
translation = "「하, 하지만 VTuber가 여름이 아닌 시기에 수영복을 입으면 안 된다는 법은 없고! 없지!?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「それにクオリティの高い動画でさえあれば何も問題ない、はず……！」"
translation = "「게다가 퀄리티 높은 영상이기만 하다면 아무 문제 없을, 터……!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「新曲もすっごく自信のあるやつだし、動画編集もいつもの人にお願いする予定だし……きっとみんなに気に入ってもらえると思うんだ！」"
translation = "「신곡도 정말 자신 있는 곡이고, 영상 편집도 평소 분에게 부탁할 예정이고…… 분명 다들 마음에 들어 할 거라고 생각해!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「──って、脱線しちゃったね。とりあえず水着の感想が欲しいの。お兄ちゃんはどう思う？」"
translation = "「──앗, 이야기가 샜네. 일단 수영복 감상을 원해. 오빠는 어떻게 생각해?」"

[[dialogue]]
speaker = "unk"
original = "すごく可愛いと思う。それに……"
translation = "정말 귀엽다고 생각해. 그리고……"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「それに？」"
translation = "「그리고?」"

[[dialogue]]
speaker = "unk"
original = "公開前の衣装が見られるのが嬉しい"
translation = "공개 전의 의상을 볼 수 있어서 기뻐"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「えへへ♪\u3000それはもちろん、お兄ちゃんは『汐ルカルカ』の秘密を共有するパートナーだもん！」"
translation = "「에헤헤♪ 그건 물론, 오빠는 『시오 루카루카』의 비밀을 공유하는 파트너니까!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「それにー……あ、あたしの彼氏さんでもあるし？\u3000こ、このくらいの特別扱いは良いかなぁ～って……」"
translation = "「게다가─…… 나, 나의 남자친구이기도 하고? 이, 이 정도의 특별 대우는 괜찮으려나~ 싶어서……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ふふ～♪\u3000今でも信じられないよ～。まさかお兄ちゃんに告白をＯＫしてもらえるって思ってなかったから」"
translation = "「후후~♪ 지금도 믿기지 않아~. 설마 오빠에게 고백 승낙을 받을 수 있을 거라곤 생각 못 했으니까」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「お兄ちゃん、覚えてる？\u3000あたしが告白したのも、このリゾート結界の中だったよね？」"
translation = "「오빠, 기억나? 내가 고백한 것도, 이 리조트 결계 안이었지?」"

[[dialogue]]
speaker = "unk"
original = "もちろん覚えている。あれは数カ月前。リゾート結界でいつものようにルルカの歌の練習に付き合った帰り道のこと──"
translation = "물론 기억하고 있다. 그것은 몇 달 전. 리조트 결계에서 평소처럼 루루카의 노래 연습을 도와주고 돌아가는 길의 일──"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「お、お兄ちゃんって、今はお付き合いしてる人、いないよね！？」"
translation = "「오, 오빠는, 지금 사귀는 사람, 없지!?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「も、もしよかったら……あたしの恋人になって欲しいのっ！」"
translation = "「호, 혹시 괜찮다면…… 나의 연인이 되어줬으면 좋겠어!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あたしが落ち込んだ時、いつも自分のことみたいに考えてくれる優しいお兄ちゃんのことが、すごくすごく、大好きなの……」"
translation = "「내가 우울할 때, 언제나 자기 일처럼 생각해주는 상냥한 오빠가, 정말 정말, 너무 좋아……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「それにお兄ちゃんって魔王なんでしょ？\u3000これからどんどん危ない戦いに立ち向かっていかなきゃいけないんだよね？」"
translation = "「게다가 오빠는 마왕이잖아? 앞으로 점점 위험한 싸움에 맞서 나가야 하는 거지?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あたし、星騎士としてだけじゃなくて、恋人としてもお兄ちゃんのことを支えたいって思ってるんだ……」"
translation = "「나, 성기사로서뿐만 아니라, 연인으로서도 오빠를 지탱하고 싶다고 생각하고 있어……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「星徒会の人みたいに優秀じゃないし、可愛くもないかもだけど……お兄ちゃんを想う気持ちなら誰にも負けないから！」"
translation = "「성도회 사람들처럼 우수하지 않고, 귀엽지도 않을지 모르지만…… 오빠를 생각하는 마음이라면 누구에게도 지지 않으니까!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「お兄ちゃんの隣に立てるように頑張るから……だから、えっと……お、お返事、聞かせてくれる？」"
translation = "「오빠 옆에 설 수 있도록 노력할 테니까…… 그러니까, 에또…… 대, 대답, 들려줄래?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「……え？\u3000付き合ってもいいけど、１つだけお願いがある……？」"
translation = "「……에? 사귀어도 좋지만, 한 가지 부탁이 있다고……?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「う、うん！\u3000いいよっ！\u3000お兄ちゃんとお付き合いできるなら、何でも言って！\u3000どんなこと！？」"
translation = "「으, 응! 좋아! 오빠랑 사귈 수 있다면 뭐든지 말해! 어떤 거야!?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あの時、すっごく緊張してたし不安だったけど、その後のお願いを聞いて一気に肩の力が抜けたんだよね～」"
translation = "「그때, 정말 긴장했고 불안했지만, 그 뒤의 부탁을 듣고 단번에 어깨의 힘이 빠졌었지~」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「驚いたよ～。まさか恋人になった後も『お兄ちゃん』って呼んで欲しいって言われると思ってなかったもん」"
translation = "「놀랐어~. 설마 연인이 된 후에도 『오빠』라고 불러줬으면 좋겠다는 말을 들을 줄은 몰랐거든」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「──ううん、嫌じゃないよ？\u3000あたしもお兄ちゃんのこと、お兄ちゃんって呼ぶの、好きだから」"
translation = "「──으응, 싫지 않아? 나도 오빠를 오빠라고 부르는 거, 좋아하니까」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ただ呼び方を変えてないから、未だにあたしとお兄ちゃんがお付き合いしてないって思ってる友達も、けっこういるんだよね……」"
translation = "「다만 호칭을 바꾸지 않아서, 아직도 나랑 오빠가 사귀지 않는다고 생각하는 친구들도 꽤 있단 말이지……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「でも時間が解決してくれるよね。ふふ♪\u3000学園でもいつもいちゃいちゃしてるもん、あたしたち」"
translation = "「하지만 시간이 해결해주겠지. 후후♪ 학원에서도 언제나 꽁냥거리고 있으니까, 우리들」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「……で！\u3000実はまだお兄ちゃんに見せたいものがあるんだ～。よーく見ててね！」"
translation = "「……그래서! 사실 아직 오빠에게 보여주고 싶은 게 있어~. 잘 보고 있어야 해!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「いくよー……変身っ！」"
translation = "「간다─…… 변신!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「じゃーんっ！\u3000どうかな、どうかなー♪\u3000驚いた、お兄ちゃん？」"
translation = "「짠! 어때, 어때─♪ 놀랐어, 오빠?」"

[[dialogue]]
speaker = "unk"
original = "さっきのイラストと同じ水着……！？"
translation = "방금 전 일러스트랑 똑같은 수영복……!?"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「そう！\u3000あたしの普段の戦闘服って、Ｖチューバーのアバターとおんなじデザインでしょ？」"
translation = "「응! 나의 평소 전투복도 VTuber 아바타랑 똑같은 디자인이잖아?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「イメージから引っ張られてるんだと思うんだけど……だったら水着でも同じ効果が得られるんじゃないかなって思って」"
translation = "「이미지에서 끌어오는 거라고 생각하는데…… 그렇다면 수영복이라도 같은 효과를 얻을 수 있지 않을까 싶어서」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「アナちゃんやサーシャ先輩も、リゾート結界で水着フォームを獲得したって聞いたから、昨日試したんだ～♪」"
translation = "「아나짱이나 사샤 선배도, 리조트 결계에서 수영복 폼을 획득했다고 들었으니까, 어제 시험해봤어~♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「モンスターとの戦いよりも先に、大好きなお兄ちゃんに水着フォームを見て欲しかったの♪」"
translation = "「몬스터와의 싸움보다 먼저, 정말 좋아하는 오빠에게 수영복 폼을 보여주고 싶었어♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ど、どうかな。変じゃないかなぁ……？」"
translation = "「어, 어때. 이상하지 않아……?」"

[[dialogue]]
speaker = "unk"
original = "Ｖチューバーのアバターより可愛い！"
translation = "VTuber 아바타보다 귀여워!"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「そ、それは褒めすぎじゃないかな……！\u3000でへへぇ、でもありがと♪」"
translation = "「그, 그건 너무 칭찬하는 거 아냐……! 데헤헤, 그래도 고마워♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ここで提案なんだけど。お兄ちゃん。今日は打ち合わせの前に、ちょっとだけ海で遊んで行かない？」"
translation = "「여기서 제안인데. 오빠. 오늘은 회의하기 전에, 잠깐만 바다에서 놀다 가지 않을래?」"

[[dialogue]]
speaker = "unk"
original = "それもいいけど、その前に……"
translation = "그것도 좋지만, 그 전에……"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「わ。あ、あはは<emoji=heart04>\u3000お兄ちゃん、お顔近いよぉ……？\u3000ルルカが可愛くて我慢できなくなっちゃった？」"
translation = "「와. 아, 아하하<emoji=heart04> 오빠, 얼굴 가까워어……? 루루카가 귀여워서 참을 수 없게 돼버렸어?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「んー……キスしてもいいかって、そ、そういうこと、聞かなくてもいいんだよ？」"
translation = "「음─…… 키스해도 되냐고, 그, 그런 거, 묻지 않아도 된다니까?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「汐ルカルカはみんなのアイドルだけど、ルルカはお兄ちゃんだけの恋人なんだから」"
translation = "「시오 루카루카는 모두의 아이돌이지만, 루루카는 오빠만의 연인이니까」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「んっ……ちゅっ<emoji=heart04>\u3000ちゅ、んちゅぅっ……ちゅっ……<emoji=heart04>」"
translation = "「음…… 츄<emoji=heart04> 츄, 응츄우…… 츄……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「えへへ……うん。いっぱい可愛いって言って？\u3000お兄ちゃん、好きっ……んちゅ、ちゅぅっ……ちゅっ<emoji=heart04>」"
translation = "「에헤헤…… 응. 잔뜩 귀엽다고 해줘? 오빠, 좋아해…… 응츄, 츄우…… 츄<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ふぅっ──学園と違って、ここだと誰もいないから、いっぱいキスできるね？」"
translation = "「후우── 학원이랑 다르게, 여기는 아무도 없으니까, 잔뜩 키스할 수 있네?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「でもあんまりキスばっかりしてたら、海に泳ぎに行けないよ……？」"
translation = "「하지만 너무 키스만 하고 있으면, 바다에 수영하러 못 가는데……?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あ──んんっ<emoji=heart04>\u3000ちゅぅっ……ちゅ、ちゅぅーっ……<emoji=heart04>」"
translation = "「아── 응응<emoji=heart04> 츄우…… 츄, 츄우─……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「もぉ……しょうがないお兄ちゃん。えへ……ん、ちゅぅ<emoji=heart04>」"
translation = "「정말…… 어쩔 수 없는 오빠라니까. 에헤…… 응, 츄우<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "水着姿のルルカがあまりに可愛くて、愛おしくて。俺はいつまでも恋人である彼女を抱き寄せ、キスをしてしまうのだった──"
translation = "수영복 차림의 루루카가 너무나도 귀엽고, 사랑스러워서. 나는 언제까지고 연인인 그녀를 끌어안고 키스를 해버리는 것이었다──"

