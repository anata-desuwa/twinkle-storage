[[dialogue]]
speaker = "unk"
original = "第１４話,女帝ＶＳ元星徒会,B"
translation = "제14화, 여제 VS 전 성도회, B"

[[dialogue]]
speaker = "シノ"
original = "「この映像は先日、新星星徒会がフィーニスの塔に登った際、ＤＩＳＣの自動撮影機能で録画したものです」"
translation = "「이 영상은 요전번 신성성도회가 피니스의 탑에 올랐을 때, DISC의 자동 촬영 기능으로 녹화된 것입니다.」"

[[dialogue]]
speaker = "シノ"
original = "「未だ正体は不明ですが、新星星徒会によれば、このディザスターハンドがベガを滅亡させたとのことです」"
translation = "「아직 정체는 불명입니다만, 신성성도회에 따르면 이 디재스터 핸드가 베가를 멸망시켰다고 합니다.」"

[[dialogue]]
speaker = "シノ"
original = "「その力は、極星学園の刺客である香堂チナはもちろん、リクリエの使徒であったアポロよりも遥かに強大です」"
translation = "「그 힘은 극성학원의 자객인 코도 치나는 물론, 리크리에의 사도였던 아폴로보다도 훨씬 강력합니다.」"

[[dialogue]]
speaker = "シノ"
original = "「残念ながら、私の言葉ではこの<b>手</b>の脅威を正確に表すに足りません。それほど桁外れに危険な存在です。ですが──」"
translation = "「안타깝게도 제 말로는 이 <b>손</b>의 위협을 정확히 표현하기에 부족합니다. 그만큼 규격 외로 위험한 존재입니다. 하지만──」"

[[dialogue]]
speaker = "シノ"
original = "「煌嶺殿はその力でキュリオスを統べる強者。他の誰でもないあなたが、この場で一番あれの脅威を理解しているのではないですか？」"
translation = "「코레이 공은 그 힘으로 큐리오스를 통치하는 강자. 다른 누구도 아닌 당신이 이 자리에서 가장 저것의 위협을 이해하고 있지 않습니까?」"

[[dialogue]]
speaker = "煌嶺"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "煌嶺は眉根を寄せてスクリーンを見つめたまま動かない。"
translation = "코레이는 미간을 찌푸린 채 스크린을 응시하며 움직이지 않는다."

[[dialogue]]
speaker = "unk"
original = "シノの言う通り、映像越しでもその危険性を察したようだ。"
translation = "시노의 말대로 영상을 통해서도 그 위험성을 감지한 듯했다."

[[dialogue]]
speaker = "シノ"
original = "「ですが新星星徒会は、あのディザスターハンドを倒すつもりです」"
translation = "「하지만 신성성도회는 저 디재스터 핸드를 쓰러뜨릴 생각입니다.」"

[[dialogue]]
speaker = "煌嶺"
original = "「ほう……？」"
translation = "「호오……?」"

[[dialogue]]
speaker = "シノ"
original = "「ディザスターハンドとの戦いは、デネブに勝つよりも困難かもしれません」"
translation = "「디재스터 핸드와의 싸움은 데네브를 이기는 것보다 곤란할지도 모릅니다.」"

[[dialogue]]
speaker = "シノ"
original = "「そのうえで、改めて煌嶺殿にお聞きします」"
translation = "「그 점을 밟아, 다시 한번 코레이 공에게 묻겠습니다.」"

[[dialogue]]
speaker = "シノ"
original = "「ディザスターハンドに潰されるのに怯えながらデネブと戦うか、それとも<ruby>厄災<rt>リクリエ</rt></ruby>の化身たるディザスターハンドと戦うか。煌嶺殿はどちらがお好みですか？」"
translation = "「디재스터 핸드에게 짓눌리는 것을 겁내며 데네브와 싸울 것인가, 아니면 <ruby>재앙<rt>리크리에</rt></ruby>의 화신인 디재스터 핸드와 싸울 것인가. 코레이 공은 어느 쪽이 취향이십니까?」"

[[dialogue]]
speaker = "シノ"
original = "「強大な敵から逃げ、弱い方を潰す……あなたが星騎士に求める強さとは、そんなものですか？」"
translation = "「강대한 적에게서 도망쳐 약한 쪽을 짓부순다…… 당신이 성기사에게 요구하는 강함이란 그런 것입니까?」"

[[dialogue]]
speaker = "unk"
original = "真っ直ぐ煌嶺を見据え、シノは普段と変わらぬ平静さで問う。"
translation = "똑바로 코레이를 쏘아보며 시노는 평소와 다름없는 평온함으로 묻는다."

[[dialogue]]
speaker = "unk"
original = "一方煌嶺は、くつくつと笑ってていた。"
translation = "한편 코레이는 큭큭거리며 웃고 있었다."

[[dialogue]]
speaker = "煌嶺"
original = "「ふふ……くっくっく……言うではないか、シノとやら。つまり貴殿は、ディザスターハンドと戦う方が、星騎士がより輝くと言うのだな？」"
translation = "「후후…… 큭큭큭…… 말 한 번 잘하는구나, 시노라고 했느냐. 즉 귀공은 디재스터 핸드와 싸우는 편이 성기사가 더 빛날 것이라 말하는 것이지?」"

[[dialogue]]
speaker = "煌嶺"
original = "「ふふふ……これは予想外だ。人間界の経営者などつまらぬものと思っていたが、なかなか酔狂ではないか」"
translation = "「후후후…… 이건 예상 밖이로다. 인간계의 경영자 따위 지루한 존재라 생각했다만, 꽤나 취향이 독특하지 않느냐.」"

[[dialogue]]
speaker = "煌嶺"
original = "「だが口先だけでは無意味。守る戦いが星騎士の本質というならば、妾が直々にその輝きを試してやろう」"
translation = "「하지만 말뿐이라면 무의미. 지키는 싸움이 성기사의 본질이라 한다면 소첩이 직접 그 광채를 시험해 주겠노라.」"

[[dialogue]]
speaker = "煌嶺"
original = "「ただしノヴァフォームはなしだ。あれは魔王の力の一端ゆえに、星騎士の輝きを見るには適さぬ」"
translation = "「단, 노바 폼은 없느니라. 그것은 마왕의 힘의 일단이기에 성기사의 광채를 보기엔 적합하지 않느니라.」"

[[dialogue]]
speaker = "シノ"
original = "「そう仰ると思っていました。では──シルヴィさん」"
translation = "「그렇게 말씀하실 줄 알았습니다. 그럼── 실비 씨.」"

[[dialogue]]
speaker = "シルヴィ"
original = "「はーい！\u3000シルヴィ・グリムランド、いきまーす！」"
translation = "「네에~! 실비 그림랜드, 갑니다~!」"

[[dialogue]]
speaker = "unk"
original = "狭い会議室からアリーナへと場所を移し、煌嶺にシルヴィが対峙する。"
translation = "좁은 회의실에서 아레나로 장소를 옮겨 코레이와 실비가 대치한다."

[[dialogue]]
speaker = "煌嶺"
original = "「こやつは？」"
translation = "「이 자는 누구냐?」"

[[dialogue]]
speaker = "シノ"
original = "「前年度の星徒会において、副会長を務めたシルヴィ・グリムランドさんです」"
translation = "「전년도 성도회에서 부회장을 맡았던 실비 그림랜드 씨입니다.」"

[[dialogue]]
speaker = "シノ"
original = "「一時、分校の星騎士の指導のために学園を離れていましたが、その実力は指折り。新星学園を背負うに相応しい星騎士の１人と言えるでしょう」"
translation = "「잠시 분교 성기사 지도를 위해 학원을 떠나 있었습니다만, 그 실력은 손꼽히는 수준. 신성학원을 짊어지기에 어울리는 성기사 중 한 명이라 할 수 있죠.」"

[[dialogue]]
speaker = "シルヴィ"
original = "「いやー、そこまで言われると照れちゃうなー」"
translation = "「이야~ 그렇게까지 말해주니 쑥스러운데~」"

[[dialogue]]
speaker = "シルヴィ"
original = "「魔界のお偉いさんと戦ってって頼まれた時はびっくりしちゃったけど、新星学園がかかってるならやるっきゃないね！」"
translation = "「마계의 높으신 분이랑 싸워달라고 부탁받았을 땐 깜짝 놀랐지만, 신성학원이 걸려 있다면 해야지!」"

[[dialogue]]
speaker = "シノ"
original = "「頼みますね、シルヴィさん」"
translation = "「부탁드려요, 실비 씨.」"

[[dialogue]]
speaker = "シルヴィ"
original = "「うん、任せといて！」"
translation = "「응, 맡겨줘!」"

[[dialogue]]
speaker = "シルヴィ"
original = "「で、あたしはどうすればいいの？」"
translation = "「그래서, 난 어떻게 하면 돼?」"

[[dialogue]]
speaker = "煌嶺"
original = "「妾を打ち負かす必要はない。それは貴様ごときには不可能だ」"
translation = "「소첩을 굴복시킬 필요는 없느니라. 그건 네놈 따위에겐 불가능하니라.」"

[[dialogue]]
speaker = "シルヴィ"
original = "「カッチーン！\u3000ムカつくー！」"
translation = "「욱하네! 짜증 나~!」"

[[dialogue]]
speaker = "シルヴィ"
original = "「……って言いたいところだけど、そう言うだけの力はあるね。今まで戦った相手の中で一番強いって、見ただけでわかるよ」"
translation = "「……라고 말하고 싶지만, 그렇게 말할 만한 힘은 있네. 지금까지 싸운 상대 중에서 가장 강하다는 건 보기만 해도 알겠어.」"

[[dialogue]]
speaker = "煌嶺"
original = "「一撃だ。それだけ妾の術に耐えてみせよ。それで星騎士の輝きを量る」"
translation = "「일격이니라. 그만큼만 소첩의 술법을 견뎌 보거라. 그것으로 성기사의 광채를 가늠하겠노라.」"

[[dialogue]]
speaker = "シルヴィ"
original = "「オッケー！\u3000いつでも来い！」"
translation = "「오케이! 언제든 와!」"

[[dialogue]]
speaker = "煌嶺"
original = "「フ──」"
translation = "「후──」"

[[dialogue]]
speaker = "unk"
original = "煌嶺は手に持った扇を軽く横に払った。ただそれだけ。"
translation = "코레이는 손에 든 부채를 가볍게 옆으로 휘둘렀다. 단지 그것뿐."

[[dialogue]]
speaker = "シルヴィ"
original = "「！？」"
translation = "「!?」"

[[dialogue]]
speaker = "unk"
original = "その瞬間、爆炎がシルヴィを包み込んだ。"
translation = "그 순간, 폭염이 실비를 감쌌다."

[[dialogue]]
speaker = "unk"
original = "劫火に呑み込まれ、シルヴィの姿が一瞬消えるが──"
translation = "겁화에 삼켜져 실비의 모습이 순식간에 사라지지만──"

[[dialogue]]
speaker = "シルヴィ"
original = "「アチチチ……ローストチキンの気分だよ～」"
translation = "「뜨거거거…… 로스트치킨이 된 기분이야~」"

[[dialogue]]
speaker = "unk"
original = "並の星騎士なら消し炭になる炎を、シルヴィは瞬時に星力の障壁を生み出して防御した。"
translation = "평범한 성기사라면 재가 되었을 불꽃을 실비는 순식간에 성력 장벽을 생성해 방어했다."

[[dialogue]]
speaker = "unk"
original = "守りに長けたシルヴィでなければ、今の一撃で絶命していただろう。"
translation = "방어에 능한 실비가 아니었다면 방금 일격으로 절명했을 것이다."

[[dialogue]]
speaker = "シルヴィ"
original = "「はい、一撃耐えたよ。これで終わり──」"
translation = "「자, 일격 견뎠어. 이걸로 끝──」"

[[dialogue]]
speaker = "unk"
original = "シルヴィの表情が緩んだ瞬間、再び劫火がシルヴィを襲った。"
translation = "실비의 표정이 풀린 순간, 다시 겁화가 실비를 덮쳤다."

[[dialogue]]
speaker = "煌嶺"
original = "「すまぬ、さっきのはくしゃみだ」"
translation = "「미안하구나, 방금 건 재채기였느니라.」"

[[dialogue]]
speaker = "unk"
original = "先ほどより激しく燃える炎がシルヴィを焼く。"
translation = "방금보다 격렬하게 타오르는 불꽃이 실비를 태운다."

[[dialogue]]
speaker = "unk"
original = "だが──"
translation = "하지만──"

[[dialogue]]
speaker = "シルヴィ"
original = "「ふーっ、ギリギリセーフ！」"
translation = "「후우, 아슬아슬하게 세이프!」"

[[dialogue]]
speaker = "シルヴィ"
original = "「シノが『煌嶺はひねくれてるから気を付けろ』って、前もって言ってくれたおかげで助かったよ」"
translation = "「시노가 『코레이는 비뚤어졌으니까 조심해』라고 미리 말해준 덕분에 살았어.」"

[[dialogue]]
speaker = "unk"
original = "煌嶺は一撃と言ったが、それはシルヴィの力を見るための方便に過ぎなかった。"
translation = "코레이는 일격이라 말했지만, 그것은 실비의 힘을 보기 위한 방편에 불과했다."

[[dialogue]]
speaker = "unk"
original = "己が欲のままに生き、奪う。それが頽廃都市キュリオスの女帝・煌嶺であり、つまるところ彼女を満足させなければ意味がない。"
translation = "자신의 욕망대로 살고 빼앗는다. 그것이 퇴폐 도시 큐리오스의 여제 코레이이며, 결국 그녀를 만족시키지 못하면 의미가 없다."

[[dialogue]]
speaker = "unk"
original = "だがシノは煌嶺がどう動くかを予測し、シルヴィに助言を与えていた。"
translation = "하지만 시노는 코레이가 어떻게 움직일지 예측하고 실비에게 조언을 해두었다."

[[dialogue]]
speaker = "シルヴィ"
original = "「ま、くしゃみならうっかり出ちゃっても仕方ないね。大丈夫？\u3000鼻水出てない？」"
translation = "「뭐, 재채기라면 실수로 나올 수도 있으니 어쩔 수 없네. 괜찮아? 콧물 안 나왔어?」"

[[dialogue]]
speaker = "シルヴィ"
original = "「あたしは一発なんてセコセコしたこと言わないからさ。気が済むまでくしゃみするといいよ、女帝陛下」"
translation = "「난 한 방이니 뭐니 쩨쩨한 소리 안 할 테니까. 마음이 풀릴 때까지 재채기해도 좋아, 여제 폐하.」"

[[dialogue]]
speaker = "煌嶺"
original = "「フッ──ではそうさせてもらおうか」"
translation = "「훗── 그럼 그렇게 하도록 할까.」"

[[dialogue]]
speaker = "シルヴィ"
original = "「くぅっ……！」"
translation = "「크윽……!」"

[[dialogue]]
speaker = "unk"
original = "煌嶺が遊ぶように扇を振るう度、骨も残さぬ劫火が巻き起こる。"
translation = "코레이가 놀이하듯 부채를 휘두를 때마다 뼈도 남기지 않을 겁화가 몰아친다."

[[dialogue]]
speaker = "unk"
original = "シルヴィは雷をまとわせたメイスで炎を相殺しつつ、星術の障壁で受け止めるが、その度に大量の星力を消耗し、顔から血の気が失われていく。"
translation = "실비는 번개를 두른 메이스로 불꽃을 상쇄하면서 성술 장벽으로 받아내지만, 그때마다 대량의 성력을 소모해 얼굴에서 핏기가 가셔 간다."

[[dialogue]]
speaker = "シルヴィ"
original = "（うっへぇ……火力ヤバッ！\u3000ちょっとでも気を抜いたら丸焼きだよ！）"
translation = "(우와아…… 화력 장난 아냐! 조금이라도 방심하면 통구이겠어!)"

[[dialogue]]
speaker = "シルヴィ"
original = "（ちゃんと防御してるはずなのに、その上から焼かれてヒリヒリするし、星力もめっちゃ使うし、かなりキツい……！）"
translation = "(제대로 방어하고 있을 텐데도 그 위로 타올라서 따끔거리고, 성력도 엄청 써서 꽤 힘들어……!)"

[[dialogue]]
speaker = "シルヴィ"
original = "（でもシノさんに声をかけられたのが、あたしでよかった。こんなに熱くてしんどい思いするのが、他の子じゃなくてよかった）"
translation = "(그래도 시노 씨가 말을 건 게 나라서 다행이야. 이렇게 뜨겁고 고통스러운 경험을 하는 게 다른 애들이 아니라서 다행이야.)"

[[dialogue]]
speaker = "シルヴィ"
original = "「はぁ、はぁ……はあぁ……」"
translation = "「하아, 하아…… 하아아……」"

[[dialogue]]
speaker = "煌嶺"
original = "「どうした、息が切れているぞ。妾の気が済むまで付き合ってくれるのではなかったかな？」"
translation = "「왜 그러느냐, 숨이 가쁘구나. 소첩의 마음이 풀릴 때까지 함께해 주겠다고 하지 않았느냐?」"

[[dialogue]]
speaker = "シルヴィ"
original = "「大丈夫、全然へっちゃら！\u3000これならドラム叩く方が疲れるよ！」"
translation = "「괜찮아, 완전 끄떡없어! 이 정도면 드럼 치는 게 더 힘들어!」"

[[dialogue]]
speaker = "煌嶺"
original = "「そうかそうか。もう終いかと心配したが、妾の杞憂であったようだな。そぅら、たらふく食らえ」"
translation = "「그러냐 그러냐. 벌써 끝인가 걱정했다만 소첩의 기우였던 모양이로구나. 자, 배불리 먹거라.」"

[[dialogue]]
speaker = "シルヴィ"
original = "「ッ……！！」"
translation = "「윽……!!」"

[[dialogue]]
speaker = "シルヴィ"
original = "（また火力が上がった……！\u3000割とマジで人生最大の危機かも……！）"
translation = "(또 화력이 올라갔어……! 이건 진짜로 인생 최대의 위기일지도……!)"

[[dialogue]]
speaker = "シルヴィ"
original = "（でも──）"
translation = "(하지만──)"

[[dialogue]]
speaker = "シルヴィ"
original = "「新星学園を守ってほしいってどういうこと？\u3000しかも今の星徒会じゃなくて、あたしに？」"
translation = "「신성학원을 지켜달라니 그게 무슨 소리야? 게다가 지금 성도회가 아니라 나한테?」"

[[dialogue]]
speaker = "シノ"
original = "「ええ。シルヴィ・グリムランドさん──あなたが最適だと、私は判断しました」"
translation = "「네. 실비 그림랜드 씨── 당신이 최적이라고 저는 판단했습니다.」"

[[dialogue]]
speaker = "シノ"
original = "「このまま煌嶺さんが学園長になれば、新星学園の星騎士たちは、彼女の私兵としてデネブとの戦いに投入されるでしょう」"
translation = "「이대로 코레이 씨가 학원장이 되면 신성학원의 성기사들은 그녀의 사병으로서 데네브와의 싸움에 투입되겠죠.」"

[[dialogue]]
speaker = "シノ"
original = "「生徒の皆さんが何と戦うかは、みなさんが決めて、それが尊重される必要があると思うのです」"
translation = "「학생 여러분이 무엇과 싸울지는 여러분이 결정하고, 그것이 존중받을 필요가 있다고 생각해요.」"

[[dialogue]]
speaker = "シノ"
original = "「しかし煌嶺さんが言葉だけで納得する確率はかなり低い。何らかの形で実力を試してくるはずです」"
translation = "「하지만 코레이 씨가 말만으로 납득할 확률은 상당히 낮습니다. 어떤 식으로든 실력을 시험하려 들겠죠.」"

[[dialogue]]
speaker = "シノ"
original = "「だから──あなたの力が必要なんです」"
translation = "「그러니까── 당신의 힘이 필요한 거예요.」"

[[dialogue]]
speaker = "シルヴィ"
original = "（学園長候補から呼ばれて、煌嶺の相手をしてほしいって言われた時はビックリしちゃった）"
translation = "(학원장 후보한테 불려가서 코레이의 상대가 되어달라는 말을 들었을 땐 깜짝 놀랐어.)"

[[dialogue]]
speaker = "シルヴィ"
original = "（でも新星学園をあんなやつの好きにはさせない。会長くんやサーシャが星徒会として頑張っているんだから）"
translation = "(하지만 신성학원을 저런 녀석 마음대로 하게 두진 않아. 회장 군이나 사샤가 성도회로서 노력하고 있으니까.)"

[[dialogue]]
speaker = "シルヴィ"
original = "（それにあたしは、みんなを守るために戦ってる）"
translation = "(게다가 나는 모두를 지키기 위해 싸우고 있어.)"

[[dialogue]]
speaker = "シルヴィ"
original = "（サーシャの隣で女神様に誓ったんだ。あたしがみんなを守るって……！）"
translation = "(사샤의 곁에서 여신님께 맹세했어. 내가 모두를 지키겠다고……!)"

[[dialogue]]
speaker = "シルヴィ"
original = "「はぁ、はぁ……もう終わり？\u3000アンコールならまだまだ受け付けてるよ」"
translation = "「하아, 하아…… 벌써 끝이야? 앙코르라면 얼마든지 더 받을 수 있는데.」"

[[dialogue]]
speaker = "unk"
original = "本来ならとうに限界を迎えているはずのシルヴィ。"
translation = "본래라면 이미 한계를 맞이했을 실비."

[[dialogue]]
speaker = "unk"
original = "全身は煤で汚れ、火傷を負っていない箇所がないくらいだが、シルヴィは気力と星力を振り絞って立ち続ける。"
translation = "전신은 그을음으로 더러워지고, 화상을 입지 않은 곳이 없을 정도였지만, 실비는 기력과 성력을 쥐어짜며 계속 서 있다."

[[dialogue]]
speaker = "煌嶺"
original = "「ほう、なかなか持ちこたえるではないか。キュリオスでもここまで頑健な者はそういない」"
translation = "「호오, 제법 잘 버티는구나. 큐리오스에서도 이 정도로 완강한 자는 그리 흔치 않느니라.」"

[[dialogue]]
speaker = "シルヴィ"
original = "「へへっ、そいつはどうも。でも引き抜きはお断りだから」"
translation = "「헤헤, 그거 고맙네. 하지만 스카우트는 거절이니까.」"

[[dialogue]]
speaker = "煌嶺"
original = "「ではこれで最後だ。これまでは児戯。妾の<b>一撃</b>をくれてやる」"
translation = "「그럼 이것으로 마지막이로다. 지금까지는 어린애 장난. 소첩의 <b>일격</b>을 선사해주마.」"

[[dialogue]]
speaker = "unk"
original = "九尾の１つから火の玉が放たれ、空中で弾けた。"
translation = "아홉 개의 꼬리 중 하나에서 불덩어리가 뿜어져 나와 공중에서 터졌다."

[[dialogue]]
speaker = "シルヴィ"
original = "「アステラ……！？\u3000どうしてここに……！？」"
translation = "「아스테라……!? 어째서 여기에……!?」"

[[dialogue]]
speaker = "煌嶺"
original = "「あれは先日、我が尾に吸収したアステラだ」"
translation = "「저것은 요전날, 나의 꼬리에 흡수한 아스테라니라.」"

[[dialogue]]
speaker = "煌嶺"
original = "「あのアステラを圧縮して貴様に叩き落とす。まともに受ければ跡形もなく消し飛ぶだろう」"
translation = "「저 아스테라를 압축해서 귀공에게 내리꽂으마. 정면으로 받으면 흔적도 없이 날아가 버리겠지.」"

[[dialogue]]
speaker = "煌嶺"
original = "「どうする？\u3000ここで妾に頭を垂れるなら、アステラを尾に戻してやるが」"
translation = "「어찌하겠느나? 여기서 소첩에게 머리를 조아린다면, 아스테라를 꼬리로 되돌려주겠다만.」"

[[dialogue]]
speaker = "シルヴィ"
original = "「答えは決まってる」"
translation = "「대답은 정해져 있어.」"

[[dialogue]]
speaker = "シルヴィ"
original = "「──来いっ！！」"
translation = "「──와라!!」"

[[dialogue]]
speaker = "煌嶺"
original = "「フ──よく言った」"
translation = "「후── 잘 말하였도다.」"

[[dialogue]]
speaker = "煌嶺"
original = "「さぁ、星の加護を受けし戦士よ。妾に抗ってみせよ──！」"
translation = "「자, 별의 가호를 받은 전사여. 소첩에게 저항해 보아라──!」"

[[dialogue]]
speaker = "シルヴィ"
original = "（っ……くっ……体が、バラバラになりそう……！\u3000でも新星学園のみんなのために、倒れるわけにはいかない……！）"
translation = "(윽…… 큭…… 몸이, 갈기갈기 찢어질 것 같아……! 하지만 신성학원의 모두를 위해서, 쓰러질 수는 없어……!)"

[[dialogue]]
speaker = "シルヴィ"
original = "（我が守護星アヴィオールよ……！\u3000サーシャ、蛍火ちゃん、みんな……力を貸して！）"
translation = "(나의 수호성 아비올이여……! 사샤, 케이카짱, 모두들…… 힘을 빌려줘!)"

[[dialogue]]
speaker = "シルヴィ"
original = "「おおおーーーーーっ！！」"
translation = "「오오오오오───앗!!」"

[[dialogue]]
speaker = "unk"
original = "星騎士同士の戦いを想定して作られたアリーナの地面を、深々と抉る一撃。"
translation = "성기사끼리의 전투를 상정하고 만들어진 아레나의 지면을 깊숙이 파헤치는 일격."

[[dialogue]]
speaker = "unk"
original = "だがクレーターのその中心で、傷だらけになりながらもシルヴィは立っていた。"
translation = "하지만 크레이터의 중심에서, 상처투성이가 되면서도 실비는 서 있었다."

[[dialogue]]
speaker = "シルヴィ"
original = "「ふぅ、はぁ、はぁ……どんなもんだいっ！」"
translation = "「후우, 하아, 하아…… 어떠냐!」"

[[dialogue]]
speaker = "煌嶺"
original = "「──フ」"
translation = "「──후.」"

[[dialogue]]
speaker = "煌嶺"
original = "「フハハハハッ！\u3000よくぞ大欲の女帝から新星学園を守り切った！」"
translation = "「후하하하하! 장하도다, 대욕의 여제로부터 신성학원을 훌륭히 지켜냈구나!」"

[[dialogue]]
speaker = "煌嶺"
original = "「シルヴィちゃん、カッコよかった！\u3000星騎士のこと見直しちゃったよ！」"
translation = "「실비짱, 멋있었어! 성기사를 다시 보게 됐는걸!」"

[[dialogue]]
speaker = "シルヴィ"
original = "「うわ！？\u3000キャラ変わった！？」"
translation = "「우와!? 캐릭터 바뀌었어!?」"

[[dialogue]]
speaker = "煌嶺"
original = "「女の子にはいろんな顔があるからね～。ていうかいつも女帝モードだと、肩凝っちゃうでしょ」"
translation = "「여자애한테는 여러 얼굴이 있는 법이니까~. 그보다 맨날 여제 모드면 어깨 결리잖아.」"

[[dialogue]]
speaker = "シルヴィ"
original = "「そういうもんなのかー……」"
translation = "「그런 건가─……」"

[[dialogue]]
speaker = "煌嶺"
original = "「守る戦いは理解できないけど、確かにあなたは輝いていた。だから学園長になるのはやめとくよ」"
translation = "「지키는 싸움은 이해할 수 없지만, 확실히 당신은 빛나고 있었어. 그러니까 학원장이 되는 건 관둘게.」"

[[dialogue]]
speaker = "煌嶺"
original = "「“欲しいものは手に入れる”──それが私の流儀だけど、手に入れるなら最高の状態じゃないと意味ないからね」"
translation = "「“원하는 것은 손에 넣는다”── 그것이 나의 방식이지만, 손에 넣는다면 최고의 상태가 아니면 의미 없으니까 말이야.」"

[[dialogue]]
speaker = "シルヴィ"
original = "「へへっ、そっかそっか。それじゃ、あたしがあぶり焼きになった甲斐があるってもんだ！」"
translation = "「헤헤, 그렇구나 그렇구나. 그럼 내가 통구이가 된 보람이 있네!」"

[[dialogue]]
speaker = "シノ"
original = "「ありがとうございます、シルヴィさん。あなたのおかげで新星学園は守られました。ですがお怪我の方は……」"
translation = "「감사합니다, 실비 씨. 당신 덕분에 신성학원은 지켜졌습니다. 하지만 부상 쪽은……」"

[[dialogue]]
speaker = "シルヴィ"
original = "「大丈夫、フライドチキン食べて寝たら治るから！\u3000現役の星徒会に怪我させるわけにはいかないし、あたしでよかったよ！」"
translation = "「괜찮아, 프라이드치킨 먹고 자면 나으니까! 현역 성도회에게 부상을 입힐 수는 없으니, 나라서 다행이야!」"

[[dialogue]]
speaker = "シノ"
original = "「それならよかったです。お元気そうで安心しました」"
translation = "「그렇다면 다행이네요. 정정해 보이셔서 안심했습니다.」"

[[dialogue]]
speaker = "シルヴィ"
original = "「あたしは元気が取り柄だからね。ま、煌嶺が本気出してたら、あたしは今頃黒焦げになってただろうけど」"
translation = "「난 건강한 게 장점이니까. 뭐, 코레이가 진심을 냈다면 난 지금쯤 숯덩이가 됐겠지만.」"

[[dialogue]]
speaker = "unk"
original = "満身創痍のシルヴィに対し、煌嶺はあれだけの星術を使い、アステラさえ操ってみせたのに涼しい顔をしていた。"
translation = "만신창이인 실비에 비해, 코레이는 그만한 성술을 쓰고 아스테라까지 다루어 보였음에도 태연한 얼굴을 하고 있었다."

[[dialogue]]
speaker = "unk"
original = "煌嶺にとっては、あれも準備運動程度でしかないのだろう。"
translation = "코레이에게는 저것도 준비운동 정도에 불과한 것이리라."

[[dialogue]]
speaker = "シノ"
original = "「ところで煌嶺さんは、本当は平行世界を滅ぼす気はなかったのでしょう？\u3000デネブを掌中に収めることこそあなたの目論見だった」"
translation = "「그런데 코레이 씨는, 사실은 평행세계를 멸망시킬 생각은 없으셨죠? 데네브를 손에 넣는 것이야말로 당신의 목적이었어요.」"

[[dialogue]]
speaker = "煌嶺"
original = "「な～んだ、バレてたんだ。そだよ、平行世界なんて“欲しい”に決まってるじゃん」"
translation = "「나 원 참, 들켰네. 맞아, 평행세계 같은 건 당연히 “갖고 싶기” 마련이잖아.」"

[[dialogue]]
speaker = "unk"
original = "女の子の顔をした女帝がおかしそうに笑う。"
translation = "소녀의 얼굴을 한 여제가 즐거운 듯이 웃는다."

[[dialogue]]
speaker = "unk"
original = "年相応の女の子の姿をしていても、その本質は大欲の権化に他ならない。"
translation = "나이에 걸맞은 소녀의 모습을 하고 있어도, 그 본질은 대욕의 권화에 다름없다."

[[dialogue]]
speaker = "ヘレナ"
original = "「煌嶺殿は辞退し、学園長の立候補者は十六夜シノ殿だけになった。では規則に則り、信任に足るか理事の投票を行う」"
translation = "「코레이 공은 사퇴하였고, 학원장 입후보자는 이자요이 시노 공뿐이로다. 그럼 규칙에 따라 신임할 만한지 이사의 투표를 행하겠느니라.」"

[[dialogue]]
speaker = "unk"
original = "候補者は１人に絞られ、奇しくも星徒会長と同じく信任投票となった。"
translation = "후보자는 한 명으로 좁혀졌고, 기묘하게도 성도회장과 마찬가지로 신임 투표가 되었다."

[[dialogue]]
speaker = "unk"
original = "煌嶺と渡り合ったシノを拒む者はおらず、満票を得て、学園長に就任が決定したのだった。"
translation = "코레이와 대등하게 맞선 시노를 거부하는 자는 없었고, 만표를 얻어 학원장 취임이 결정된 것이었다."

