[[dialogue]]
speaker = "unk"
original = "第４話,悪との付き合い方,P"
translation = "제4화, 악과 사귀는 법, P"

[[dialogue]]
speaker = "unk"
original = "マインの『悪いこと』をしたいという発作を知った俺は、定期的に『何でも言うことを聞く日』を作って、ストレス解消に付き合うようになっていたのだが――"
translation = "마인의 『나쁜 짓』을 하고 싶다는 발작을 알게 된 나는 정기적으로 『무엇이든 말을 듣는 날』을 만들어 스트레스 해소를 도와주게 되었는데――"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「いや～、今更だけど、我ながら予想外だったな～。まさか会長と、こんな風に２人で出かけたりするようになるなんてね」"
translation = "「이야~, 이제 와서 하는 말이지만 나로서도 예상 밖이었어~. 설마 회장님과 이렇게 둘이서 외출하거나 하게 될 줄은 말이야」"

[[dialogue]]
speaker = "unk"
original = "言っておくけど、正義感とかじゃないから"
translation = "말해두지만 정의감 같은 게 아니니까"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「にひひ♪\u3000最初の頃はそうかなって思ってたけど、ここまで飽きもせず付き合うんだもんな～」"
translation = "「니히히♪ 처음에는 그럴까 싶었는데, 이렇게 질리지도 않고 어울려주다니 말이야~」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「それとも、私と遊んでいるうちに、マゾに目覚めちゃったとか？」"
translation = "「아니면 나랑 놀면서 마조에 눈을 떠버렸다든가?」"

[[dialogue]]
speaker = "unk"
original = "責任を取って貰わないとな"
translation = "책임을 져줘야겠어"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「きゃははは♪\u3000会長も言うようになったね～」"
translation = "「꺄하하하♪ 회장님도 말 다 했네~」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「なら、お言葉に甘えて、今日も私のストレス解消に付き合ってもらうから♪」"
translation = "「그럼 사양 않고 오늘도 내 스트레스 해소에 어울려줘야겠어♪」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ん？\u3000何故今日は外に出掛けるのか？\u3000はは～ん、さては会長、いつもみたいに室内で２人きりの方が良かったのかな？\u3000もう、変態さんなんだから～♪」"
translation = "「응? 왜 오늘은 밖으로 나가는 거냐고? 하하~응, 보아하니 회장님, 평소처럼 실내에서 둘만 있는 게 좋았던 걸까나? 정말, 변태님이라니까~♪」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「きゃははっ、嘘ウソ♪\u3000別に会長との『ごっこ遊び』に飽きたわけじゃないよ。ただ今日は、試したいことがあってね☆\u3000それじゃあ、しゅっぱ～つ♪」"
translation = "「꺄하핫, 거짓말 거짓말♪ 딱히 회장님과의 『역할 놀이』가 질린 건 아니야. 그냥 오늘은 시험해 보고 싶은 게 있어서 말이지☆ 그럼, 출바~알♪」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「見て見て、会長。この服良くない？\u3000病みかわいい～♪」"
translation = "「봐봐 봐봐, 회장님. 이 옷 좋지 않아? 야미카와이~♪」"

[[dialogue]]
speaker = "unk"
original = "マインはそれ系好きだよな"
translation = "마인은 그런 계열 좋아하지"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「まぁね～。といっても、私はセナリィのゴシック趣味に比べれば、ニワカみたいなものだけど。好きっていうよりも、悪くないっていう感覚かな」"
translation = "「뭐 그렇지~. 그렇다고 해도 나는 세나리의 고딕 취향에 비하면 초보 수준이지만. 좋아한다기보다 나쁘지 않다는 느낌일까나」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ちょっと病んでる風のデザインが心惹かれるかな～？\u3000でも一般的かどうかはともかく、可愛いの範疇でしょ？\u3000会長的にはどう？」"
translation = "「조금 병약한 느낌의 디자인이 마음을 끄네~. 근데 일반적인지는 차치하고 귀여운 범주잖아? 회장님 생각은 어때?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「にひひ、会長が似合うって言うなら、この服試着してみようかな♪\u3000あっ、そうだ、会長も試着室入る？\u3000着替え手伝って貰うのも、面白そうかも♪」"
translation = "「니히히, 회장님이 어울린다고 하면 이 옷 시착해 볼까나♪ 앗, 맞다, 회장님도 시착실 들어올래? 옷 갈아입는 거 도와달라고 하는 것도 재미있을 것 같아♪」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あ～！\u3000今、少し否定するまでに間があったぞ～？\u3000スケベな妄想したでしょ～？\u3000きゃはははは♪」"
translation = "「아~! 방금 조금 부정하기까지 틈이 있었다~! 야한 망상 했지~? 꺄하하하하♪」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ん～、やっぱここの四川麻婆豆腐は、心トキめくよ～<emoji=heart04>」"
translation = "「음~, 역시 여기 사천 마파두부는 가슴이 설레~♥」"

[[dialogue]]
speaker = "unk"
original = "麻婆豆腐が好物だったのか"
translation = "마파두부가 좋아하는 음식이었나"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「市販の麻婆豆腐は別に好きじゃないんだけどね。ここのは特別。１度食べたら忘れられなくて、もう病みつきなんだよね～」"
translation = "「시판 마파두부는 딱히 좋아하지 않지만 여기 건 특별해. 한 번 먹으면 잊을 수가 없어서 벌써 중독이라니까~」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ほら、会長も食べて食べて。１口食べてみれば分かるから！」"
translation = "「자, 회장님도 먹어봐 먹어봐. 한 입 먹어보면 알 거야!」"

[[dialogue]]
speaker = "unk"
original = "これ、美味しいけど激辛！！！"
translation = "이거, 맛있지만 엄청 매워!!!"

[[dialogue]]
speaker = "unk"
original = "か、辛ぁぁぁあああ――――――ッ！！？"
translation = "매, 매워어어어어어어어――――――어!!?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「きゃははははは！\u3000会長の反応、めっちゃ良い！\u3000ゾクゾクして写真撮る手が止まらないよ～！」"
translation = "「꺄하하하하하! 회장님 반응 진짜 좋아! 짜릿해서 사진 찍는 손이 멈추질 않아~!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ここの激辛麻婆豆腐、心をグサッと貫くような辛さなんだよね～。それでいて、ただ辛さを盛っただけとは違う、試行錯誤の果てに作り上げたであろう上質な旨味！」"
translation = "「여기 매운 마파두부, 심장을 푹 찌르는 것 같은 매운맛이거든~. 그러면서도 그냥 맵기만 한 거랑은 다른, 시행착오 끝에 만들어낸 듯한 상급의 감칠맛!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「これを初めて食べた時、私は辛さこそ至高の味覚だと知ったよ。それ以来、心トキめく激辛料理を探して、食べ歩くのが趣味なんだ～」"
translation = "「이걸 처음 먹었을 때 나는 매운맛이야말로 지고의 미각이라는 걸 알았어. 그 뒤로 가슴 설레는 매운 요리를 찾아다니며 먹는 게 취미야~」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「てなわけで、会長。冷めないうちにどんどん食べてね♪\u3000大丈夫、どうしても無理な時は、後で私がしっかり頂いちゃうから。それまでは……にひひ♪」"
translation = "「그런 고로 회장님. 식기 전에 얼른 먹어♪ 괜찮아, 정말 못 먹겠을 때는 나중에 내가 다 먹어버릴 테니까. 그때까지는…… 니히히♪」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「いや～、会長の限界ギリギリな表情、いっぱい堪能させてもらっちゃった～♪\u3000でもまさか、完食しちゃうなんて驚いたよ」"
translation = "「이야~, 회장님의 한계 직전인 표정, 잔뜩 만끽해 버렸어~♪ 근데 설마 다 먹어버릴 줄이야 놀랐는걸」"

[[dialogue]]
speaker = "unk"
original = "でも、確かに滅茶苦茶美味しかった"
translation = "하지만 확실히 무척 맛있었어"

[[dialogue]]
speaker = "unk"
original = "か、辛さで死ぬかと思った……"
translation = "매, 매워서 죽는 줄 알았어……"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「そっか～、美味しかったのか～。ならまた今度、一緒に行く？\u3000きゃはははっ、その苦い顔！\u3000ひーっ、今日は笑い過ぎて、お腹痛い♪」"
translation = "「그래~? 맛있었구나~. 그럼 다음에 또 같이 갈래? 꺄하하핫, 그 떫은 표정! 히히, 오늘은 너무 웃어서 배 아파♪」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「……ふぅ、ひとしきり笑ったところで、次はどこ行こっか？\u3000最近話題のホラー映画を観るのもいいし～、ゲームセンターで遊ぶのも捨て難いな～」"
translation = "「……후우, 한바탕 웃었으니 다음은 어디 갈까? 요즘 화제인 공포 영화를 보는 것도 좋고~, 게임 센터에서 노는 것도 버리기 아깝네~」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「とりあえず、歩きながら決めよっか。休日なのもあって、さすがにこの辺りは人多いよね～」"
translation = "「일단 걸으면서 결정할까. 휴일이라 그런지 역시 이 근처는 사람이 많네~」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「私さ、悪戯好きだから、ついつい思っちゃうんだよね～。こういう人ごみの中で、周りにバレないように恥ずかしいことをするのって良くない？」"
translation = "「나 말이야, 장난치는 걸 좋아해서 나도 모르게 생각하게 된단 말이지~. 이런 인파 속에서 주변에 들키지 않게 부끄러운 짓을 하는 거 좋지 않아?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「例えばこうやって、人ごみを利用して体を密着したり……耳元で小声で喋ったりとか……<emoji=heart04>」"
translation = "「예를 들어 이렇게 인파를 이용해서 몸을 밀착하거나…… 귓가에서 작은 목소리로 속삭이거나 말이야……♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「下の方で、こっそり手を繋いでみたりとか……ね<emoji=heart04>\u3000にひひ……♪」"
translation = "「밑에서 몰래 손을 잡아본다거나…… 말이지♥ 니히히……♪」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「会長、ひょっとしてドキドキしてる？\u3000顔赤いよ？\u3000激辛麻婆豆腐のせい？\u3000ふふっ……そういうことにしておいてあげる♪」"
translation = "「회장님, 혹시 두근거리고 있어? 얼굴 빨개졌어? 매운 마파두부 때문이야? 후훗…… 그런 걸로 해줄게♪」"

[[dialogue]]
speaker = "unk"
original = "（どちらかというと、デートな気が……）"
translation = "(어느 쪽인가 하면 데이트 같은 기분이……)"

[[dialogue]]
speaker = "unk"
original = "（今更だけど、今日のこれって）"
translation = "(이제 와서지만 오늘 이거)"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「なに、会長？\u3000私の顔、じーっと見て。改めて異性として意識しちゃった？\u3000にひひ♪」"
translation = "「왜 그래 회장님? 내 얼굴을 빤히 쳐다보고. 새삼스럽게 이성으로 의식해 버렸어? 니히히♪」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「何でもないって、え～？\u3000気になるな～。正直に吐かないなら、脇腹くすぐっちゃおうかな～？\u3000つんつん<emoji=heart04>」"
translation = "「아무것도 아니라고? 에~? 궁금하네~. 솔직하게 불지 않으면 옆구리 간질어버릴 거야~? 쿡쿡♥」"

[[dialogue]]
speaker = "unk"
original = "『悪いこと』の発散は……出来てる？"
translation = "『나쁜 짓』의 발산은…… 되고 있어?"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ん？\u3000ああ、そういうことね。うん、大丈夫だよ」"
translation = "「응? 아, 그런 거였구나. 응, 괜찮아」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「私は会長となら、普通の女の子みたいなデートが楽しめるのかって実験だったんだけど」"
translation = "「나는 회장님과라면 평범한 여자애 같은 데이트를 즐길 수 있을지 실험해 본 거였는데」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「気のせいじゃなかったみたい。だって、みんなの星徒会長様を私が独占出来てるんだもん――」"
translation = "「기분 탓이 아니었던 것 같아. 왜냐면 모두의 성도회장님을 내가 독점하고 있잖아――」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「今、すっごく悪いことをしてる気分だよ♪\u3000にひひ♪」"
translation = "「지금 엄청나게 나쁜 짓을 하고 있는 기분이야♪ 니히히♪」"

[[dialogue]]
speaker = "unk"
original = "そう言ってマインは、心から楽しそうに、年頃の女の子らしい可愛い笑顔を浮かべるのだった。"
translation = "그렇게 말하며 마인은 진심으로 즐거운 듯이, 또래 여자애다운 귀여운 미소를 짓는 것이었다."

