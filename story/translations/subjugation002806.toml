[[dialogue]]
speaker = "ジャクリーヌ"
original = "「トリックオアトリートだゆ～♪」"
translation = "「트릭 오어 트릿이라유~♪」"

[[dialogue]]
speaker = "ウズメイア"
original = "「お菓子をくれなきゃイタズラしちゃうし～！」"
translation = "「과자를 주지 않으면 장난쳐버린다구~!」"

[[dialogue]]
speaker = "ソフィア"
original = "「ほかほかのパンケーキを隠していませんか？\u3000もしあるなら速やかに出してください」"
translation = "「따끈따끈한 팬케이크를 숨기고 있지 않나요? 만약 있다면 신속하게 내놓으세요.」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「なんだかあっという間に時間がすぎてしまったゆ」"
translation = "「왠지 순식간에 시간이 지나가 버렸다유.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ほんとだ、もう日が沈みかかってるし」"
translation = "「정말이네, 벌써 해가 지려고 한다구.」"

[[dialogue]]
speaker = "ソフィア"
original = "「時間が過ぎるのを早く感じるというのは、それだけ楽しかったということですよ」"
translation = "「시간이 지나가는 게 빠르게 느껴진다는 건, 그만큼 즐거웠다는 뜻이에요.」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「２人とも楽しかったゆ？\u3000だったら余も嬉しいゆ♪」"
translation = "「둘 다 즐거웠냐유? 그렇다면 여도 기쁘다유♪」"

[[dialogue]]
speaker = "ウズメイア"
original = "「もうサイコーだし！\u3000そういうゆゆ姫ちゃんはどうだった？」"
translation = "「완전 최고라구! 그런 유유히메 짱은 어땠어?」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「余も楽しかったゆ！\u3000また次のハロウィンも一緒に遊びたいゆ！」"
translation = "「여도 즐거웠다유! 또 다음 할로윈 때도 같이 놀고 싶다유!」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
original = "「私たちもソフィア様やウズメイア様と仲良くなれて良かったですわ！」"
translation = "「저희도 소피아 님이나 우즈메이야 님과 친해질 수 있어서 좋았어요!」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「私たちともまた一緒に遊んでね～」"
translation = "「우리랑도 나중에 또 같이 놀자~」"

[[dialogue]]
speaker = "ウズメイア"
original = "「もちろんだし！\u3000えへへ、みんなで楽しくなれてよかったし♪」"
translation = "「물론이라구! 에헤헤, 다 같이 즐거워질 수 있어서 좋았다구♪」"

[[dialogue]]
speaker = "ソフィア"
original = "「ヒトリさんも１日付き合わせてしまいました。本当にありがとうございます」"
translation = "「히토리 씨도 하루 종일 어울려주게 했네요. 정말 고맙습니다.」"

[[dialogue]]
speaker = "ヒトリ"
original = "「そ、そんな……っ！\u3000わたしはみなさんのてぇてぇ様子を見られただけでもう、ただただ感謝といいますか……ねえ、ゆーちゃん」"
translation = "「그, 그런……! 저는 여러분의 테에테에한 모습을 볼 수 있었던 것만으로도 그냥, 그저 감사하다고나 할까요…… 그치, 유짱.」"

[[dialogue]]
speaker = "ゆーちゃん"
original = "「ゆ～♪」"
translation = "「유~♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「それじゃ、今度こそ２人の姿を元に戻すゆ！」"
translation = "「그럼, 이번에야말로 두 사람의 모습을 원래대로 되돌리겠다유!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「いけそうなの？」"
translation = "「될 것 같아?」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「いける気しかしないゆ！」"
translation = "「될 것 같은 기분밖에 안 든다유!」"

[[dialogue]]
speaker = "unk"
original = "がんばれ、ジャクリーヌ"
translation = "힘내라, 자클린."

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「わかったゆ！」"
translation = "「알았다유!」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「それじゃ……むむむ……ゆーーーーーーっ！！！！」"
translation = "「그럼…… 으으으…… 유-------!!!!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「おお～、元の姿に戻った！\u3000成功だし！」"
translation = "「오오~, 원래 모습으로 돌아왔어! 성공이라구!」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「よかったゆ♪\u3000これで安心──」"
translation = "「다행이다유♪ 이걸로 안심──」"

[[dialogue]]
speaker = "ヒトリ"
original = "「っ……！？\u3000ま、待ってください！\u3000これは……」"
translation = "「윽……!? 기, 기다려주세요! 이건……」"

[[dialogue]]
speaker = "ソフィア"
original = "「ヒトリさんの棺桶が光って……」"
translation = "「히토리 씨의 관이 빛나고……」"

[[dialogue]]
speaker = "ヒトリ"
original = "「一度は減少したハロウィンパワーが、またすごい勢いで増大してます……っ！」"
translation = "「한때 줄어들었던 할로윈 파워가 다시 엄청난 기세로 증대하고 있어요……!」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ど、どうしてだゆ！？」"
translation = "「어, 어째서냐유!?」"

[[dialogue]]
speaker = "ヒトリ"
original = "「こ、この感じ……もしかして……きゃああっ！！？」"
translation = "「이, 이 느낌…… 설마…… 꺄악!!?」"

[[dialogue]]
speaker = "ジャック"
original = "「ケラケラケラ♪」"
translation = "「케라케라케라♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「パパ！！」"
translation = "「아빠!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「パパ？\u3000っていうことは……」"
translation = "「아빠? 그렇다는 건……」"

[[dialogue]]
speaker = "ヒトリ"
original = "「ジャクリーヌちゃんのお父さんであり、ハロウィンの化身でもあるジャックさんです」"
translation = "「자클린 짱의 아버지이자 할로윈의 화신이기도 한 잭 씨예요.」"

[[dialogue]]
speaker = "ジャック"
original = "「ケラケラケラ♪」"
translation = "「케라케라케라♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「どうしたんだゆ？\u3000パパの事なんか誰も呼んでないゆ」"
translation = "「어쩐 일이냐유? 아빠 같은 건 아무도 안 불렀다유.」"

[[dialogue]]
speaker = "ソフィア"
original = "「その言い方は酷いですよ、ジャクリーヌさん」"
translation = "「그 말투는 너무해요, 자클린 씨.」"

[[dialogue]]
speaker = "ヒトリ"
original = "「でも、どうしていきなりジャックさんが召喚されてしまったのでしょう？」"
translation = "「하지만 어째서 갑자기 잭 씨가 소환되어 버린 걸까요?」"

[[dialogue]]
speaker = "ジャック"
original = "「ケラケラケラ♪」"
translation = "「케라케라케라♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「余たちが楽しそうなことをしてるから、様子を見に来たみたいゆ」"
translation = "「여들이 즐거운 일을 하고 있어서 구경 온 모양이다유.」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「でももう夕方だゆ。ハロウィンも終わりだから、大人しく魔界に帰るゆ！」"
translation = "「하지만 벌써 저녁이다유. 할로윈도 끝이니까 얌전히 마계로 돌아가라유!」"

[[dialogue]]
speaker = "ジャック"
original = "「ケラケラケラ♪」"
translation = "「케라케라케라♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「笑ってごまかそうとしてもダメゆ！」"
translation = "「웃으면서 얼버무려도 안 된다유!」"

[[dialogue]]
speaker = "ソフィア"
original = "「えっ……！？」"
translation = "「엣……!?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「あらら、またハロウィンフォームに戻っちゃったし」"
translation = "「어라라, 다시 할로윈 폼으로 돌아가 버렸다구.」"

