[[dialogue]]
speaker = "トリシャ"
original = "「──ふぅ……やりました」"
translation = "「──후우…… 해냈어요」"

[[dialogue]]
speaker = "トリシャ"
original = "「２ｍほど泳ぐことができました……これは非常に大きな進歩です……」"
translation = "「2m 정도 헤엄칠 수 있었어요…… 이것은 굉장히 큰 진보예요……」"

[[dialogue]]
speaker = "クロト"
original = "「ええ。順調ですよ、トリシャさん」"
translation = "「네. 순조롭군요, 트리샤 씨」"

[[dialogue]]
speaker = "unk"
original = "──ある日のこと。"
translation = "──어느 날의 일."

[[dialogue]]
speaker = "unk"
original = "俺はトリシャさんに、軽く泳ぎのレクチャーをしていた。"
translation = "나는 트리샤 씨에게 가볍게 수영 강의를 해주고 있었다."

[[dialogue]]
speaker = "unk"
original = "最初は海に入ることさえおっかなびっくりだった彼女だが、今では躊躇なく腰までは浸かれるようになっていた。"
translation = "처음에는 바다에 들어가는 것조차 무서워하던 그녀였지만, 지금은 주저 없이 허리까지는 담글 수 있게 되었다."

[[dialogue]]
speaker = "トリシャ"
original = "「あなたのおかげで……ジャンボ浮き輪からノーマル浮き輪にサイズダウンできました」"
translation = "「당신 덕분에…… 점보 튜브에서 노멀 튜브로 사이즈 다운할 수 있었어요」"

[[dialogue]]
speaker = "トリシャ"
original = "「この調子で上達していけば……いずれミニマム浮き輪でも平気になるはず……」"
translation = "「이 기세로 실력이 늘면…… 언젠가는 미니멈 튜브라도 괜찮아지겠죠……」"

[[dialogue]]
speaker = "クロト"
original = "「できれば浮き輪なしでも泳げるようになってほしい……」"
translation = "「가능하면 튜브 없이도 수영할 수 있게 되면 좋겠는데……」"

[[dialogue]]
speaker = "unk"
original = "そうして、俺たちはスイムの練習を再開した。"
translation = "그렇게, 우리들은 수영 연습을 재개했다."

[[dialogue]]
speaker = "クロト"
original = "「泳ぐ時は、もっと思い切って体を前に倒しちゃったほうがいいですよ」"
translation = "「수영할 때는 좀 더 과감하게 몸을 앞으로 숙이는 편이 좋아요」"

[[dialogue]]
speaker = "トリシャ"
original = "「……こうですか？」"
translation = "「……이렇게인가요?」"

[[dialogue]]
speaker = "クロト"
original = "「はい、いい感じです」"
translation = "「네, 좋은 느낌이에요」"

[[dialogue]]
speaker = "トリシャ"
original = "「水が顔につくのは……怖いですね……」"
translation = "「물이 얼굴에 닿는 건…… 무섭네요……」"

[[dialogue]]
speaker = "unk"
original = "浮き輪を着用したまま、海原へ向かって着水するトリシャさん。"
translation = "튜브를 착용한 채, 바다를 향해 몸을 담그는 트리샤 씨."

[[dialogue]]
speaker = "クロト"
original = "「あ……ちょっと待ってください」"
translation = "「아…… 잠시만 기다려 주세요」"

[[dialogue]]
speaker = "トリシャ"
original = "「？\u3000何か……？」"
translation = "「? 뭔가……?」"

[[dialogue]]
speaker = "クロト"
original = "「海藻が絡まってました」"
translation = "「해초가 엉켜 있었어요」"

[[dialogue]]
speaker = "トリシャ"
original = "「なんと……フフ。恥ずかしい……これも何かの吉兆であればよいのですが……」"
translation = "「이런…… 후후. 부끄러워라…… 이것도 무슨 길조라면 좋으련만……」"

[[dialogue]]
speaker = "クロト"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "さっきまで藻屑のついていたトリシャさんの水着──ボトムのほう──に、俺は目を奪われていた。"
translation = "조금 전까지 해초가 붙어 있던 트리샤 씨의 수영복──하의 쪽──에, 나는 눈을 빼앗기고 있었다."

[[dialogue]]
speaker = "unk"
original = "無防備にもこちらへお尻を突き出し、練習を再開しようとするトリシャさん。"
translation = "무방비하게 이쪽으로 엉덩이를 내밀고 연습을 재개하려는 트리샤 씨."

[[dialogue]]
speaker = "unk"
original = "俺は気づくと指先を伸ばして、その水着をずらして……"
translation = "나는 어느샌가 손가락을 뻗어 그 수영복을 비껴내고……"

[[dialogue]]
speaker = "トリシャ"
original = "「……？\u3000あの……私のお尻に、まだ何かついていましたか……？」"
translation = "「……? 저기…… 제 엉덩이에 아직 뭐가 붙어 있나요……?」"

[[dialogue]]
speaker = "トリシャ"
original = "「ぁっ、んぁぁんっ……<emoji=heart04>\u3000な、何をして──んっ……いるんですか……っ<emoji=heart04>\u3000んっ、んん──っっ……！」"
translation = "「앗, 응아아앗……<emoji=heart04> 무, 무엇을──응…… 하고 있는 건가요……윽<emoji=heart04> 응, 으응──윽……!」"

[[dialogue]]
speaker = "トリシャ"
original = "「こ──これっ……んっ、んんっ<emoji=heart04>\u3000ぁっ……何か、当たってます……んぅ……当てて、ますよね……っ……？\u3000ぁっ、んんぁぁ──っっ……<emoji=heart04>」"
translation = "「이──이거…… 응, 으응<emoji=heart04> 앗…… 뭔가 닿고 있어요…… 응으…… 닿게 하고, 있는 거죠……? 앗, 응으아아──윽……<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「たぶん、これ、分かります……んっ……これは、会長さんの──おち○ちん、では……んんっ……<emoji=heart04>」"
translation = "「아마 이거, 알 것 같아요…… 응…… 이것은 회장님의──자지, 인가요…… 으응<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「そうですね……」"
translation = "「그렇네요……」"

[[dialogue]]
speaker = "トリシャ"
original = "「やっぱり、です……こんな立派な……おち○ちん……すぐに分かってしまいますっ……会長さんの、おち○ちんだって……」"
translation = "「역시, 예요…… 이렇게 훌륭한…… 자지…… 금방 알아버려요…… 회장님의 자지라는 걸……」"

[[dialogue]]
speaker = "トリシャ"
original = "「でも、どうしていきなり、こんなことっ……はぁ、はぁ……っ……<emoji=heart04>\u3000あ、あの──んっ、んんっ……<emoji=heart04>\u3000これでは、泳ぐどころでは……っ<emoji=heart04>」"
translation = "「하지만 어째서 갑자기 이런 짓을…… 하아, 하아……윽……<emoji=heart04> 저, 저기──응, 으응……<emoji=heart04> 이래서는 수영은커녕……윽<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「んっ、ふぅっ……も、もしかして、これも泳ぎの練習……なので、しょうか……？」"
translation = "「응, 후우…… 호, 혹시 이것도 수영 연습……인 걸까요……?」"

[[dialogue]]
speaker = "クロト"
original = "「……いや」"
translation = "「……아니요」"

[[dialogue]]
speaker = "クロト"
original = "「これは……ただ、俺のほうが我慢できなかっただけです」"
translation = "「이건…… 그저 제 쪽이 참을 수 없었을 뿐이에요」"

[[dialogue]]
speaker = "トリシャ"
original = "「そんな、急な──んっ、んぁっ……<emoji=heart04>\u3000こ……困った方……です……んっ……！\u3000ぁっ、んぁっ……っ……<emoji=heart04>」"
translation = "「그런, 갑자기──응, 응앗……<emoji=heart04> 고…… 곤란한 분……이에요…… 응……! 앗, 응앗……윽……<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「んぅぅぅぅ──っっっ……！？」"
translation = "「응으으으으──윽……!?」"

[[dialogue]]
speaker = "unk"
original = "波に揺れるトリシャさんのお尻を両手で固定し、欲望のままにペニスを突き入れる。"
translation = "파도에 흔들리는 트리샤 씨의 엉덩이를 양손으로 고정하고, 욕망이 가는 대로 페니스를 찔러 넣는다."

[[dialogue]]
speaker = "unk"
original = "見えている光景は先ほどまでのレクチャー時と変わらないのに、性器だけが絡みつく快感に包まれている──"
translation = "보이는 광경은 조금 전까지의 강의 때와 다름없는데, 성기만이 얽혀드는 쾌감에 휩싸여 있다──"

[[dialogue]]
speaker = "unk"
original = "いやしい形での性欲の昇華に、俺の興奮はますます高まっていった。"
translation = "비열한 형태의 성욕 승화에 나의 흥분은 점점 고조되어 갔다."

[[dialogue]]
speaker = "トリシャ"
original = "「あっ、うっ、そう動かれては──ぁっぁっ……<emoji=heart04>\u3000ゆ、揺さぶらないで、ください──っ……んっ、んんぅっ、ぁぁっ……<emoji=heart04>\u3000ァッ、はぁっ……<emoji=heart04>」"
translation = "「앗, 윽, 그렇게 움직이면──앗앗……<emoji=heart04> 흔, 흔들지 말아 주세요──윽…… 응, 응으윽, 아앗……<emoji=heart04> 앗, 하앗……<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「んんっ──んっ、んぅっ……これでは……ぁっ<emoji=heart04>\u3000スイムの練習に──んっ、なりません……<emoji=heart04>\u3000ひどい、です……っ……<emoji=heart04>」"
translation = "「으응──응, 응윽…… 이래서는…… 앗<emoji=heart04> 수영 연습이──응, 안 돼요……<emoji=heart04> 너무해요……윽……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ごめんなさい、トリシャさん」"
translation = "「미안해요, 트리샤 씨」"

[[dialogue]]
speaker = "クロト"
original = "「でも……あなたの水着姿が、あまりに魅力的で」"
translation = "「하지만…… 당신의 수영복 차림이 너무나도 매력적이라서」"

[[dialogue]]
speaker = "トリシャ"
original = "「──ぁっ……<emoji=heart04>\u3000そ、そうやって褒めてごまかそうとするのも──ぁっ、んぅっ……<emoji=heart04>\u3000ず、ずるいと思います──んっ、んぅっ……ぁっ……<emoji=heart04>」"
translation = "「──앗……<emoji=heart04> 그, 그렇게 칭찬해서 얼버무리려는 것도──앗, 응윽……<emoji=heart04> 치, 치사하다고 생각해요──응, 응윽…… 앗……<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「私の体も──んっ、反応したく、ないのに……ぁっ<emoji=heart04>\u3000あなたの声を聞くと……感じて、しまいます──んっ、んんんっっ……<emoji=heart04>\u3000ぁっ、はぁっ……<emoji=heart04>」"
translation = "「제 몸도──응, 반응하고 싶지 않은데…… 앗<emoji=heart04> 당신의 목소리를 들으면…… 느껴버려요──응, 응으윽……<emoji=heart04> 앗, 하앗……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「水着コンテストでも──みんな、トリシャさんに注目してたじゃないですか」"
translation = "「수영복 콘테스트에서도── 다들 트리샤 씨에게 주목했었잖아요」"

[[dialogue]]
speaker = "クロト"
original = "「それくらい……トリシャさんの体は、素敵なんです。俺が魅了されても仕方ないくらいに」"
translation = "「그 정도로…… 트리샤 씨의 몸은 멋져요. 내가 매료되어도 어쩔 수 없을 정도로」"

[[dialogue]]
speaker = "トリシャ"
original = "「んんぅっ──ぁっ、ぅっ、ふぁぁっ……<emoji=heart04>\u3000そ、そんなこと言いながら──ぁっ、腰を、振らないで……んっ、んんっ……ぁっ──<emoji=heart04>」"
translation = "「응으윽──앗, 윽, 후아앗……<emoji=heart04> 그, 그런 말을 하면서──앗, 허리를 흔들지 마요…… 응, 으응…… 앗──<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「素敵な体──なんて言って……ぁっ<emoji=heart04>\u3000私の、おま○こを使いたいだけなんじゃ……んっ、んんぅっ<emoji=heart04>\u3000はぁ、はぁ──っ、んんんっ……！」"
translation = "「멋진 몸──이라니 말하고…… 앗<emoji=heart04> 제 보지를 쓰고 싶을 뿐인 게…… 응, 응으윽<emoji=heart04> 하아, 하아──윽, 응으윽……!」"

[[dialogue]]
speaker = "unk"
original = "ぐっ、ぐっ……と、男根をトリシャさんに押し込んでいく。"
translation = "꾹, 꾹…… 하고 남근을 트리샤 씨에게 밀어 넣는다."

[[dialogue]]
speaker = "unk"
original = "幾度かのまぐわいを経て、彼女の膣はすっかり俺のペニスに馴染みきっていた。"
translation = "몇 번의 정사를 거치며 그녀의 질은 완전히 내 페니스에 길들여져 있었다."

[[dialogue]]
speaker = "トリシャ"
original = "「それに──ぁっ、んっ……<emoji=heart04>\u3000こんな──野外で、交わるなんて……ぁっ<emoji=heart04>\u3000は、恥ずかしいです──んっ、んんっ……ぁっ……！」"
translation = "「게다가──앗, 응……<emoji=heart04> 이런──야외에서 맺어지다니…… 앗<emoji=heart04> 부, 부끄러워요──응, 으응…… 앗……!」"

[[dialogue]]
speaker = "クロト"
original = "「大丈夫──プライベート結界だから、今日は俺たち以外誰も来ません」"
translation = "「괜찮아요──프라이빗 결계니까 오늘은 우리 말고 아무도 안 와요」"

[[dialogue]]
speaker = "トリシャ"
original = "「んぁっ、だとしても──んっ、んんっ……！\u3000こ、心の準備というものが──ぁっ、んぁぁっ……っ、ふぅっ……んっ、んんっ……！\u3000ぁっ──<emoji=heart04>」"
translation = "「응앗, 그렇다 해도──응, 으응……! 마, 마음의 준비라는 게──앗, 응아앗……윽, 후우…… 응, 으응……! 앗──<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「こんな場所で──ぁっ、おち○ちん挿れられるの……変な感じ、です……っ<emoji=heart04>」"
translation = "「이런 장소에서──아윽, 자지 삽입당하는 거…… 이상한 기분, 이에요……윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "青い空、白い雲──"
translation = "푸른 하늘, 하얀 구름──"

[[dialogue]]
speaker = "unk"
original = "開放的なロケーションに相反する秘めた行為に、トリシャさんは終始悶えていた。"
translation = "개방적인 로케이션에 상반되는 은밀한 행위에, 트리샤 씨는 내내 몸부림치고 있었다."

[[dialogue]]
speaker = "トリシャ"
original = "「あなたの顔が──んっ、見えないのも……ぁっ……切ない、です……んっ……<emoji=heart04>\u3000ぁっ──はぁっ、ふっ──んっ、んんんっ──っ……！」"
translation = "「당신의 얼굴이──응, 보이지 않는 것도……아윽…… 애달파, 요……응……<emoji=heart04> 아윽──하아, 윽──응, 응응응──윽……!」"

[[dialogue]]
speaker = "クロト"
original = "「俺はずっとここにいますから……」"
translation = "「전 계속 여기에 있을 테니까요……」"

[[dialogue]]
speaker = "トリシャ"
original = "「んぁぁぁっ──<emoji=heart04>\u3000そ、そういう問題では──んっ、んんんっ……！\u3000ぁっ、はぁっ──ふぅ、ふぅっ……<emoji=heart04>\u3000ぁっ、んんっ……<emoji=heart04>\u3000ぁっ<emoji=heart04>」"
translation = "「응아아아윽──<emoji=heart04> 그, 그런 문제가──응, 응응윽……! 아윽, 하아──후우, 후우……<emoji=heart04> 아윽, 응윽……<emoji=heart04> 아윽<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「後ろから──んっ、んんぅっ！\u3000見えないのに──ァッ、おち○ちん──んっ、奥までぇっ……入って、きます──っ……<emoji=heart04>\u3000んっ、んんっ……っ……！」"
translation = "「뒤에서──응, 응으윽! 보이지 않는데──아윽, 자지──응, 안쪽까지이…… 들어, 와요──윽……<emoji=heart04> 응, 응윽……윽……!」"

[[dialogue]]
speaker = "unk"
original = "トリシャさんが恥ずかしがって身をよじる度に、きゅっと腟内が切なく締まる。"
translation = "트리샤 씨가 부끄러워하며 몸을 비틀 때마다, 꽉 하고 질 내부가 애처롭게 조여진다."

[[dialogue]]
speaker = "unk"
original = "その搾り取られるような気持ちよさをもっと味わいたくて、俺の動きは少しずつ激しさを増していく。"
translation = "그 쥐어짜이는 듯한 기분 좋음을 좀 더 맛보고 싶어서, 내 움직임은 조금씩 격렬함을 더해간다."

[[dialogue]]
speaker = "トリシャ"
original = "「はぁ、はぁ……っ、はぁ……んっ……<emoji=heart04>\u3000ぁっ──はぁっ、はぁっ……ぅっ、んぅぅっ……<emoji=heart04>\u3000んっ、んんんっ──っ──！」"
translation = "「하아, 하아……윽, 하아……응……<emoji=heart04> 아윽──하아, 하아……윽, 응으윽……<emoji=heart04> 응, 응응응──윽──!」"

[[dialogue]]
speaker = "トリシャ"
original = "「ふーっ、ふーっ……あなたに、こんな強引な面があったなんて──んぁっ<emoji=heart04>\u3000知りませんでした──ぁっ、ふぁぁっ、んっ……<emoji=heart04>\u3000えっち、ですっ……<emoji=heart04>」"
translation = "「후우, 후우…… 당신에게, 이런 강압적인 면이 있었다니──응아윽<emoji=heart04> 몰랐어요──아윽, 하아아, 응……<emoji=heart04> 야해요……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「すみません。その代わり、ちゃんと気持ちよくしますから」"
translation = "「죄송해요. 그 대신, 제대로 기분 좋게 해 드릴 테니까요」"

[[dialogue]]
speaker = "トリシャ"
original = "「んぁぁぁぁぁっっっ────<emoji=heart04><emoji=heart04>\u3000んっ、ふぁっ、んんぁっっ……<emoji=heart04>」"
translation = "「응아아아아아윽윽윽────<emoji=heart04><emoji=heart04> 응, 하윽, 응아윽윽……<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「ま……待って、ください──っ……<emoji=heart04>\u3000そ、そこ突かれたら──んっ、ひぅっ、んんんぅぅっ……<emoji=heart04>\u3000ぁっ……はっ、はぁっ……っ……<emoji=heart04>」"
translation = "「기……기다려, 주세요──윽……<emoji=heart04> 거, 거기 찔리면──응, 히윽, 응응응으윽……<emoji=heart04> 아윽……하, 하아……윽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "トリシャさんの戸惑いを快感で流してしまうように激しく、何度も亀頭で腟内をかき回す。"
translation = "트리샤 씨의 당혹감을 쾌감으로 흘려보내 버리듯 격렬하게, 몇 번이고 귀두로 질 내부를 휘젓는다."

[[dialogue]]
speaker = "unk"
original = "ピストンの度に柔らかな<ruby>臀部<rt>でんぶ</rt></ruby>がぺちん、ぺちんとこちらの太ももにぶつかって、肉感的にも気持ちよかった。"
translation = "피스톤질을 할 때마다 부드러운 둔부가 찰싹, 찰싹 하고 이쪽 허벅지에 부딪혀서, 육감적으로도 기분 좋았다."

[[dialogue]]
speaker = "トリシャ"
original = "「んッ……んんんぅっ──ぁっ<emoji=heart04>\u3000はぁっ……はぁっ……んっ、ふぅっ……<emoji=heart04>\u3000ひゃぁぅっ……んっ、んんんっ……<emoji=heart04>\u3000ぁっ、はぁっ……<emoji=heart04>」"
translation = "「응윽……응응응윽──아윽<emoji=heart04> 하아……하아……응, 후우……<emoji=heart04> 히야아윽……응, 응응응……<emoji=heart04> 아윽, 하아……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「トリシャさん……感じてきてます？」"
translation = "「트리샤 씨…… 느끼고 있어요?」"

[[dialogue]]
speaker = "トリシャ"
original = "「～～～～っっ……！？\u3000そ、そんなことは──ぁっ<emoji=heart04>\u3000ありま、せん──んっ<emoji=heart04>\u3000あ、あなたが……ぁっ、無理やり、挿入──するから……んんっ<emoji=heart04>」"
translation = "「～～～～윽윽……!? 그, 그런 일은──아윽<emoji=heart04> 없습, 니다──응<emoji=heart04> 다, 당신이……아윽, 억지로, 삽입──하니까……응응<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「私は──っ……あくまで、泳ぎの練習を、していただけですから──ぁっ<emoji=heart04>\u3000感じるなんて……っ、ありえま……せん……んっ、んんん──っ……<emoji=heart04>」"
translation = "「저는──윽…… 어디까지나, 수영 연습을, 하고 있었을 뿐이니까요──아윽<emoji=heart04> 느끼다니……윽, 그럴 리가……없어……요……응, 응응응──윽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "口ではそう言いつつも、むしろねだるようにこちらへ秘部を押しつけてくるトリシャさん。"
translation = "입으로는 그렇게 말하면서도, 오히려 조르듯이 이쪽으로 비부를 밀어붙여 오는 트리샤 씨."

[[dialogue]]
speaker = "unk"
original = "出し入れするその口は、明らかに海水とは異なる、ぬめった湿り気を帯びていた。"
translation = "드나드는 그 입구는, 명백히 바닷물과는 다른, 미끈거리는 습기를 머금고 있었다."

[[dialogue]]
speaker = "トリシャ"
original = "「こんな──んっ！\u3000動物みたいな……ぁっ、体勢……<emoji=heart04>\u3000恥ずかしい、だけ──ですから──っ……<emoji=heart04>\u3000ぁっ、そこだめですっ<emoji=heart04>」"
translation = "「이런──응! 짐승 같은……아윽, 자세……<emoji=heart04> 부끄러울, 뿐──이니까요──윽……<emoji=heart04> 아윽, 거기 안 돼요<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「んーっ、んーっ！\u3000お……奥ばっかりねちっこくやるのは──ぁっぁっ<emoji=heart04>\u3000ず、ずるいです、んぅぁっ！\u3000ぁっぁっ、んぅぅぅ──っっ！」"
translation = "「응윽, 응윽! 안……안쪽만 끈덕지게 하는 건──아윽아윽<emoji=heart04> 치, 치사해요, 응으아윽! 아윽아윽, 응으으으──윽윽!」"

[[dialogue]]
speaker = "unk"
original = "奥までぐっと押し込むたび、ぎゅっとすぼんだ膣の輪が肉棒を捉えて放さない。"
translation = "안쪽까지 꾹 밀어 넣을 때마다, 꽉 오므라든 질의 고리가 육봉을 붙잡고 놓아주지 않는다."

[[dialogue]]
speaker = "unk"
original = "足腰が震えてくるほどの快感に、俺は我を忘れて腰を打ちつけていた。"
translation = "허리와 다리가 떨려올 정도의 쾌감에, 나는 정신을 잃고 허리를 두드리고 있었다."

[[dialogue]]
speaker = "トリシャ"
original = "「わ……私のおま○こっ、何度もほじくられてぇっ……ぁっぁっ！\u3000んっ、ふぁぁっ、ふぇぁぁっ……<emoji=heart04>\u3000んぁっ、んっ、ふぅぅっ──っ……！」"
translation = "「제……제 보지가, 몇 번이나 파헤쳐져서어윽……아윽아윽! 응, 하아아윽, 헤아아윽……<emoji=heart04> 응아윽, 응, 후우우윽──윽……!」"

[[dialogue]]
speaker = "トリシャ"
original = "「ぁぁっ、んんぅっ、んぅぁっ！\u3000はぁっ、んぅっ、んふぅっ──ぁぅ……<emoji=heart04>\u3000ァッ、ハァッ、んんんんっっ……！\u3000ぅっ、ふぅっ、んんぅぅっ<emoji=heart04>」"
translation = "「아아윽, 응응윽, 응으아윽! 하아, 응윽, 응후윽──아우……<emoji=heart04> 아윽, 하아, 응응응응윽윽……! 윽, 후우, 응응으윽<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「んんっ、あっ……ああああああんっ──！！！」"
translation = "「응응, 앗…… 아아아아아앙──!!!」"

[[dialogue]]
speaker = "トリシャ"
original = "「ぁっ、んんん──っ……！\u3000ぁっ、はぁっっ……！\u3000っ、っっ……<emoji=heart04>\u3000ふぅ、ふぅ、ふぅっ──っ……<emoji=heart04>\u3000ぁっ、はぁっ、んぁぁっ……<emoji=heart04>」"
translation = "「아윽, 응응응──윽……! 아윽, 하아윽……! 윽, 윽윽……<emoji=heart04> 후우, 후우, 후우윽──윽……<emoji=heart04> 아윽, 하아, 응아아윽……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「トリシャさん……イッた？」"
translation = "「트리샤 씨…… 갔어요?」"

[[dialogue]]
speaker = "トリシャ"
original = "「～～～～っっ……！\u3000し、仕方がないでは……んんっ……ありませんかっ<emoji=heart04>\u3000あなたに求められてっ、気持ちよくさせられてっ<emoji=heart04>」"
translation = "「～～～～윽윽……! 어, 어쩔 수 없지……응응……않습니까아<emoji=heart04> 당신이 원해서, 기분 좋게 만들어져서어<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「こんな……んんっ、あっ、あっ……無理やりされても……身体が自然に悦んでっ……ああっ、あっ、あああんっっ<emoji=heart04>」"
translation = "「이런……응응, 앗, 앗…… 억지로 당해도…… 몸이 자연스럽게 기뻐해서어…… 아아윽, 앗, 아아앙윽윽<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「んっ、んんぅぅぅっ……<emoji=heart04>\u3000ぁっ……はぁっ、はぁっ……や、あ……待って、くださいっ……ちょっとは休憩を──んぁぁぁぁっっっっ<emoji=heart04>」"
translation = "「응, 응응으으윽……<emoji=heart04> 아윽……하아, 하아…… 기, 다……기다려, 주세요…… 조금은 휴식을──응아아아아윽윽윽윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "亀頭をこすりつけるように、奥を小刻みに揺さぶってやると、トリシャさんはさらに甲高い声で鳴いた。"
translation = "귀두를 문지르듯이, 안쪽을 잘게 흔들어 대자, 트리샤 씨는 더욱 날카로운 목소리로 울었다."

[[dialogue]]
speaker = "unk"
original = "その軽い絶頂をきっかけに、トリシャさんはさらなる高みへと昇りつめていく。"
translation = "그 가벼운 절정을 계기로, 트리샤 씨는 한층 더 높은 곳으로 올라간다."

[[dialogue]]
speaker = "トリシャ"
original = "「ぁっぁっ──い、いけません──っ──こ、このままでは、またっ……ぁっ<emoji=heart04>\u3000ァッ<emoji=heart04>\u3000ひぅっ<emoji=heart04>\u3000んんんっっ──っ──！」"
translation = "「아윽아윽──아, 안 돼요──윽──이, 이대로는, 또……아윽<emoji=heart04> 아윽<emoji=heart04> 히윽<emoji=heart04> 응응응윽윽──윽──!」"

[[dialogue]]
speaker = "トリシャ"
original = "「こんな場所なのに……いやらしい声を上げて、ああんっ！\u3000また、またっ、私っ、あっ……イッちゃいますっ……！」"
translation = "「이런 장소인데…… 음란한 목소리를 내고, 아앙! 또, 또, 저, 앗…… 가버려요……!」"

[[dialogue]]
speaker = "クロト"
original = "「いいんですよ……俺にしか聞けないトリシャさんの声、たくさん聞かせてください」"
translation = "「괜찮아요…… 나밖에 들을 수 없는 트리샤 씨의 목소리, 많이 들려주세요」"

[[dialogue]]
speaker = "トリシャ"
original = "「ぁぁぁっ……んっ、んぅぁっ……<emoji=heart04>\u3000も、もうっ……うまく、立てません──ぁっぁっぁっ……！\u3000んぅっ、はぅぅっっ──っ──……！」"
translation = "「아아아윽……응, 응으아윽……<emoji=heart04> 이, 이제…… 제대로, 서 있을 수 없어요──아윽아윽아윽……! 응윽, 하으윽윽──윽──……!」"

[[dialogue]]
speaker = "unk"
original = "トリシャさんは感じすぎて、両脚をがくがくと震わせていた。"
translation = "트리샤 씨는 너무 느낀 나머지, 양다리를 가닥가닥 떨고 있었다."

[[dialogue]]
speaker = "unk"
original = "ここが水中でなかったら、もう自重で倒れ込んでしまっていたかもしれない。"
translation = "여기가 수중이 아니었다면, 이미 자기 무게를 못 이기고 쓰러져 버렸을지도 모른다."

[[dialogue]]
speaker = "トリシャ"
original = "「だっ、だめです──っ、わ、私──おかしくなってしまいます……っ……！\u3000んぁぁっ、はぁっ、んぅぅっ──<emoji=heart04>\u3000ァッ、はぁっ、んぁぁっ！」"
translation = "「아, 안 돼요──윽, 저── 이상해져 버려요……윽……! 응아아윽, 하아, 응으윽──<emoji=heart04> 아윽, 하아, 응아아윽!」"

[[dialogue]]
speaker = "クロト"
original = "「っ……」"
translation = "「윽……」"

[[dialogue]]
speaker = "unk"
original = "俺のほうも──かなり限界が近づいていた。"
translation = "나 또한── 상당히 한계가 다가오고 있었다."

[[dialogue]]
speaker = "unk"
original = "水面よりもうねるトリシャさんの膣内に翻弄され、いつ暴発してもおかしくない快楽の渦に呑まれる。"
translation = "수면보다도 요동치는 트리샤 씨의 질 내부에 농락당해, 언제 폭발해도 이상하지 않을 쾌락의 소용돌이에 삼켜진다."

[[dialogue]]
speaker = "unk"
original = "しかし、トリシャさんが達するまでは果てられない──"
translation = "하지만, 트리샤 씨가 갈 때까지는 끝낼 수 없다──"

[[dialogue]]
speaker = "トリシャ"
original = "「はっ、ふっ、んっ──も、もう……だめ、です──イ、イキますっ……おま○こ、おかしくなっちゃいます──ぅぅっ、ぁぁぁっっ……<emoji=heart04>」"
translation = "「하아, 후우, 응── 이, 이제…… 안 돼요── 가, 가요…… 보지, 이상해져 버려요──으으윽, 아아아윽윽……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「俺も──トリシャ、さん──っ……！」"
translation = "「나도── 트리샤, 씨──윽……!」"

[[dialogue]]
speaker = "unk"
original = "我慢に我慢を重ねるも、ついに限界が訪れる。"
translation = "참고 참았으나, 마침내 한계가 찾아온다."

[[dialogue]]
speaker = "unk"
original = "腰から下が溶けてなくなりそうな快感に、意識まで委ねて──"
translation = "허리 아래가 녹아 없어질 듯한 쾌감에, 의식까지 맡기고──"

[[dialogue]]
speaker = "トリシャ"
original = "「あっ、あっ、あっ、あ……あぁあ、あっ、んっ、あっああっ……<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ああっ……<emoji=heart04>\u3000あ、あああっ、あ、んんぅ、ぁ、んんんっ……<emoji=heart04>」"
translation = "「앗, 앗, 앗, 아…… 아아아, 앗, 응, 앗아아앗……<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 아아앗……<emoji=heart04> 아, 아아아앗, 아, 응응으, 아, 응응응윽……<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「ぁっ……んんんんんんんんんんんんんんんんんん～～～～～～～～～～～～～～っっっっっ──────！！！」"
translation = "「아윽……응응응응응응응응응응응응응응응응응～～～～～～～～～～～～～～윽윽윽윽윽──────!!!」"

[[dialogue]]
speaker = "トリシャ"
original = "「んあああああぁぁぁぁぁぁっっっっ………………<emoji=heart04><emoji=heart04><emoji=heart04>\u3000っ、っっっ………………<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응아아아아아아아아아윽윽윽윽윽………………<emoji=heart04><emoji=heart04><emoji=heart04> 윽, 윽윽윽………………<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「っ──」"
translation = "「윽──」"

[[dialogue]]
speaker = "unk"
original = "勢いよくこちらにお尻を密着させ、全身を震わせるトリシャさん──"
translation = "기세 좋게 이쪽에 엉덩이를 밀착시키고, 전신을 떨고 있는 트리샤 씨──"

[[dialogue]]
speaker = "unk"
original = "その柔らかな肉をがっしりと掴みながら、これでもかというくらい奥へと精液を放った。"
translation = "그 부드러운 살집을 꽉 움켜쥐면서, 보란 듯이 안쪽 깊숙이 정액을 뿜어냈다."

[[dialogue]]
speaker = "トリシャ"
original = "「ぁっ──っ、っ、っ…………<emoji=heart04>\u3000んっ、ふぅぅぅっっ──んっ…………ァッ、はぁっ、はぁっ……<emoji=heart04>\u3000んっ、んんんっ……っ…………！！」"
translation = "「아윽──윽, 윽, 윽…………<emoji=heart04> 응, 후우우우윽윽──응…………아윽, 하아, 하아……<emoji=heart04> 응, 응응응윽……윽…………!!」"

[[dialogue]]
speaker = "unk"
original = "散々こらえてからの射精は、この開放的な景色にも負けないくらい気持ちよくて──"
translation = "한참을 참은 뒤의 사정은, 이 개방적인 경치에 지지 않을 정도로 기분 좋아서──"

[[dialogue]]
speaker = "トリシャ"
original = "「──っはぁ、はぁ、ふぅっ……っ……<emoji=heart04>\u3000も、もう……あなたという人は……っ……<emoji=heart04>\u3000ぁっ──んっ、本当に、困ったものです……んっ……<emoji=heart04>」"
translation = "「──윽하아, 하아, 후우윽……윽……<emoji=heart04> 이, 이제…… 당신이란 사람은……윽……<emoji=heart04> 아윽──응, 정말이지, 곤란한 분이에요……응……<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「結局、最後までしてしまうなんて……っ……<emoji=heart04>\u3000泳ぎの練習は……どこにいったというんですか……っ……<emoji=heart04>」"
translation = "「결국, 끝까지 해버리다니……윽……<emoji=heart04> 수영 연습은…… 어디로 갔다는 건가요……윽……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ごめん、トリシャさん……我慢できなくて」"
translation = "「미안해요, 트리샤 씨…… 참을 수가 없어서」"

[[dialogue]]
speaker = "トリシャ"
original = "「謝ればいいというものでは……ぁっ<emoji=heart04>」"
translation = "「사과하면 다 되는 게……아윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスを引き抜いた膣口から、とろりと白濁液が垂れてきた。"
translation = "페니스를 뽑아낸 질구에서, 걸쭉하게 백탁액이 흘러내렸다."

[[dialogue]]
speaker = "unk"
original = "愛液と、精液と、俺たちの汗とでぐちゃぐちゃになった粘液が、そのまま波にさらわれていく……。"
translation = "애액과, 정액과, 우리들의 땀으로 범벅이 된 점액이, 그대로 파도에 휩쓸려 간다……."

[[dialogue]]
speaker = "クロト"
original = "「……ごめん。トリシャさん。もう１回」"
translation = "「……미안해요. 트리샤 씨. 한 번 더」"

[[dialogue]]
speaker = "トリシャ"
original = "「！？\u3000きょ、許可しません──んぁぁっ<emoji=heart04>\u3000お、泳ぎのほうは──んぁぁっ」"
translation = "「!? 허, 허가하지 않겠──응아아윽<emoji=heart04> 수, 수영 쪽은──응아아윽」"

[[dialogue]]
speaker = "unk"
original = "そうして、歯止めの利かなくなった俺たちは──"
translation = "그렇게, 제동이 걸리지 않게 된 우리들은──"

[[dialogue]]
speaker = "unk"
original = "２人きりのビーチで、いつまでも享楽にふけってしまうのだった……。"
translation = "둘만의 해변에서, 언제까지나 향락에 빠져버리는 것이었다……."

