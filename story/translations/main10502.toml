[[dialogue]]
speaker = "unk"
original = "第２話,第二次サンタ計画だぴょん！,B"
translation = "제2화, 제2차 산타 계획이다뿅!, B"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「さて……と。有言実行、急がなければならないわね……」"
translation = "「자…… 그럼. 유언실행, 서둘러야겠어……」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "（せっかくこんなに素敵な戦闘服を頂いたのだから、速やかに使いこなせるようになりたいものだけれど）"
translation = "(기껏 이렇게 멋진 전투복을 받았으니, 신속하게 다룰 수 있게 되고 싶지만)"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "（『テーマ』……）"
translation = "(『테마』……)"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "（人工戦闘服の力を引き出すためには、その戦闘服に込められたテーマにアクセスする必要があるわ）"
translation = "(인공 전투복의 힘을 끌어내기 위해서는, 그 전투복에 담긴 테마에 액세스할 필요가 있어)"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "（それが出来なければ、戦闘服として起動することすらできない）"
translation = "(그게 안 된다면, 전투복으로서 기동하는 것조차 할 수 없어)"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "（人によっては身に着けてすぐに機能することもあるという話だけど……どうやら私の場合、上手くはいかなかったようね）"
translation = "(사람에 따라서는 몸에 익히자마자 기능하는 경우도 있다고 하지만…… 아무래도 내 경우엔, 잘 풀리지 않은 모양이네)"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ふっ、いいじゃない……燃えてきたわ！\u3000このクリスマスフォーム、必ず自分のものにしてしてやるんだから！！」"
translation = "「훗, 좋잖아…… 불타오르네! 이 크리스마스 폼, 반드시 내 것으로 만들고 말 테니까!!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「テーマは当然『クリスマス』よね。だとしたら、クリスマスへのアプローチ……うーん……」"
translation = "「테마는 당연히 『크리스마스』겠지. 그렇다면, 크리스마스에 대한 접근…… 으음……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あれ、あなた蘭美？\u3000誰かと思ったじゃない」"
translation = "「어라, 너 라비? 누군가 했잖아」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「あ、お嬢様。お戻りになられていたのね？」"
translation = "「아, 아가씨. 돌아오신 거군요?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ええ、ついさっき帰ったばかりよ。そんなことよりどうしたの、その可愛すぎる格好？\u3000もしかして……」"
translation = "「응, 방금 막 돌아왔어. 그것보다 어떻게 된 거야, 그 너무 귀여운 차림은? 설마……」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「人工戦闘服のクリスマスフォーム、つい先ほどヘレナ様から頂いたばかりよ」"
translation = "「인공 전투복 크리스마스 폼, 방금 헬레나 님께 받은 참이야」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふーん、そうなんだ。去年のヨミヨミのも可愛かったけど、蘭美のも可愛いわね～」"
translation = "「흐응, 그렇구나. 작년 요미요미 것도 귀여웠지만, 라비 것도 귀엽네~」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「それは至極当然ね。ヘレナ様の作る可愛い服に、私の可愛さが合わされば、それ即ち最強だから！」"
translation = "「그건 지극히 당연하지. 헬레나 님이 만드신 귀여운 옷에, 나의 귀여움이 합쳐지면, 그것은 즉 최강이니까!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「最強ねぇ……ふふ、そうなってくると今度は強さの方が気になってくるわ」"
translation = "「최강이라니…… 후후, 그렇게 나오면 이번엔 강함 쪽이 궁금해지네」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「残念ながらまだ戦闘服を起動するには至っていないの。ちょうど今、そのことについて考えていたところよ」"
translation = "「안타깝게도 아직 전투복을 기동하기에는 이르지 못했어. 마침 지금, 그 점에 대해 생각하던 중이야」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「けれど心配には及ばないわ！\u3000だって私は光速のメイドマスター！\u3000戦闘服の覚醒だって一瞬なんだから！」"
translation = "「하지만 걱정할 필요 없어! 왜냐면 나는 광속의 메이드 마스터! 전투복 각성 따위 순식간이니까!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「その意気よ、蘭美！\u3000……あ、そうだ、だったら私も協力するわ！」"
translation = "「그 기세야, 라비! ……아, 맞다, 그렇다면 나도 협력할게!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「あら？\u3000お嬢様には何か良い考えがあるのかしら？」"
translation = "「어머? 아가씨께 무슨 좋은 생각이라도 있으신 걸까?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ええ、任せてちょうだい！」"
translation = "「응, 맡겨줘!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「人工戦闘服を覚醒させるためには、テーマに対する精神的なアプローチが必要になってくるのよね？」"
translation = "「인공 전투복을 각성시키기 위해서는, 테마에 대한 정신적인 접근이 필요한 거지?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「だったらつまり……クリスマスの気持ちになって、クリスマスっぽいことをすればいいのよ！」"
translation = "「그렇다면 즉…… 크리스마스 기분이 되어서, 크리스마스다운 일을 하면 되는 거야!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「！！？」"
translation = "「!!?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ふっふっふ……お嬢様、私にもピーンと来たわ。ズバリ、私がこの服を着て、みんなにクリスマスプレゼントを配ればいいのね？」"
translation = "「훗훗훗…… 아가씨, 저도 느낌이 딱 왔어요. 바로, 제가 이 옷을 입고, 모두에게 크리스마스 선물을 나눠주면 되는 거죠?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「さすがは蘭美ね、理解が速くてビックリしちゃった」"
translation = "「역시 라비네, 이해가 빨라서 깜짝 놀랐어」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「このくらい当然よ。スピードで私の右に出る者なんていないんだから」"
translation = "「이 정도는 당연하지. 스피드에서 내 오른쪽에 설 자는 없으니까」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「そうと決まったら早速、プレゼントを考えないといけないわね」"
translation = "「그렇게 정했으면 당장, 선물을 생각해야겠어」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「せっかくプレゼントを渡すのだから、ちゃんと喜んでもらえるものにしたいわ」"
translation = "「기껏 선물을 주는 거니까, 제대로 기뻐해 줄 만한 걸로 하고 싶어」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふふっ♪\u3000去年はプレゼント配りに参加できなかったからね。リベンジ出来ると思うと楽しみで仕方がないんだけど♪」"
translation = "「후후♪ 작년에는 선물 나누기에 참가하지 못했으니까 말이야. 리벤지할 수 있다고 생각하니 기대돼서 견딜 수가 없는데♪」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「……お嬢様、もしかして去年もこんなノリで、あの大騒ぎを起こしたのかしら……？」"
translation = "「……아가씨, 설마 작년에도 이런 기세로, 그 대소동을 일으키신 걸까……?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「安心して！\u3000マムにこってり叱られて、さすがに反省したから！\u3000新星寮に手は出さないでおくわ！」"
translation = "「안심해! 맘에게 호되게 혼나서, 나도 반성했으니까! 신성료에는 손대지 않을게!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「あのお嬢様に反省させるなんて……なんて恐ろしい人なのかしら」"
translation = "「그 아가씨를 반성하게 만들다니…… 얼마나 무서운 분인 걸까」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「今回は九浄家のお屋敷に勤めている人たちをターゲットにしましょう、それなら問題ないでしょう？」"
translation = "「이번에는 쿠죠 가 저택에서 일하는 사람들을 타겟으로 삼자, 그거라면 문제없겠지?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ええ、問題ないわ。それじゃ何をプレゼントするかについて作戦会議を始めましょう」"
translation = "「응, 문제없어. 그럼 무엇을 선물할지 작전 회의를 시작하자」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「まずは考えやすいところからメイド隊のメンバーからいってみる？」"
translation = "「우선은 생각하기 쉬운 메이드대 멤버들부터 가볼까?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ヨミ、閃、せつな、美鶴…………美鶴についてはアイデアがあるわ。美鶴は──」"
translation = "「요미, 센, 세츠나, 미츠루………… 미츠루에 대해서는 아이디어가 있어. 미츠루는──」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「いいわね！\u3000それならヨミヨミはこういうのでどうかしら──」"
translation = "「좋네! 그럼 요미요미는 이런 건 어떨까──」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「……ふふふ」"
translation = "「……후후후」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「さて……今年は何事も起こらなければ良いが……果たしてどうなるかな……？」"
translation = "「자…… 올해는 아무 일도 일어나지 않으면 좋겠다만…… 과연 어떻게 될까나……?」"

