[[dialogue]]
speaker = "unk"
original = "第３話,神隠しと神殺し,B"
translation = "제3화, 신 감추기와 신 죽이기, B"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「無事でいてくれ、マルキア──」"
translation = "「무사해야 한다, 마르키아──」"

[[dialogue]]
speaker = "unk"
original = "彼女の身に何が起きたのか……私はあらゆる可能性を考えた。"
translation = "그녀에게 무슨 일이 일어났는지…… 나는 모든 가능성을 생각했다."

[[dialogue]]
speaker = "unk"
original = "愛する幼き<ruby>娘<rt>アニュラス</rt></ruby>を残して消えた、ということは、彼女の自発的な行動ではありえない。"
translation = "사랑하는 어린 딸을 남기고 사라졌다는 것은, 그녀의 자발적인 행동일 리가 없다."

[[dialogue]]
speaker = "unk"
original = "さらわれたか。事故にあったか。何らかの危険に巻き込まれた恐れは高かった。"
translation = "납치되었을까. 사고를 당했을까. 어떤 위험에 휘말렸을 가능성이 높았다."

[[dialogue]]
speaker = "unk"
original = "私は必死になって三界のすべてを駆けずり回ったが、全て無為に終わった。"
translation = "나는 필사적으로 삼계의 모든 곳을 뛰어다녔지만, 모든 것이 헛되이 끝났다."

[[dialogue]]
speaker = "unk"
original = "学生時代の仲間のいかなる星術を用いても、彼女の行方は知れなかった。"
translation = "학생 시절 동료들의 어떤 성술을 사용해도, 그녀의 행방은 알 수 없었다."

[[dialogue]]
speaker = "unk"
original = "神隠し──あまりに不自然なその蒸発は、そう称されることもあった。"
translation = "신 감추기── 너무나 부자연스러운 그 증발은, 그렇게 칭해지기도 했다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「……マルキア。どこだ。一体、どこへ行ってしまったのだ」"
translation = "「……마르키아. 어디냐. 대체, 어디로 가버린 거냐.」"

[[dialogue]]
speaker = "unk"
original = "幾日、幾月、幾年と……長い時を経ても妻が帰ってくることはなかった。"
translation = "며칠, 몇 달, 몇 년을…… 오랜 시간이 지나도 아내는 돌아오지 않았다."

[[dialogue]]
speaker = "unk"
original = "もはや通常の手段では叶わぬ願い。"
translation = "더 이상 통상적인 수단으로는 이룰 수 없는 소원."

[[dialogue]]
speaker = "unk"
original = "そう覚悟した末に、私が辿り着いたのは……"
translation = "그렇게 각오한 끝에, 내가 다다른 곳은……"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「フィーニスの、塔……」"
translation = "「피니스의, 탑……」"

[[dialogue]]
speaker = "unk"
original = "流星市国の神聖なるシンボル──<ruby>何人<rt>なんぴと</rt></ruby>も<ruby>侵<rt>おか</rt></ruby>せぬ女神の禁域だった。"
translation = "유성 시국의 신성한 상징── 누구도 침범할 수 없는 여신의 금역이었다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "（妻は神隠しに遭った。なら……その行方を知る者は、必然……）"
translation = "（아내는 신 감추기를 당했다. 그렇다면…… 그 행방을 아는 자는, 필연적으로……）"

[[dialogue]]
speaker = "unk"
original = "フィーニスの塔には女神と、その配下である守護天使たちが住まう。"
translation = "피니스의 탑에는 여신과, 그 수하인 수호 천사들이 머문다."

[[dialogue]]
speaker = "unk"
original = "たとえ神聖な禁域に踏み入る行為であっても、妻を失った私に退くという選択肢はなかった。"
translation = "설령 신성한 금역에 발을 들이는 행위라 할지라도, 아내를 잃은 나에게 물러선다는 선택지는 없었다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「ここは……」"
translation = "「여기는……」"

[[dialogue]]
speaker = "unk"
original = "そこには未知の空間が広がっていた。"
translation = "그곳에는 미지의 공간이 펼쳐져 있었다."

[[dialogue]]
speaker = "unk"
original = "アンティークな回廊、よどむ濃紫色の瘴気、徘徊するメカニカルな守護機兵……"
translation = "앤티크한 회랑, 고여 있는 짙은 보랏빛 장기, 배회하는 기계식 수호 기병……"

[[dialogue]]
speaker = "？？？"
original = "『お待ちなさい……人の子よ。この塔は今、深刻な瘴気に冒されています。命が惜しければ、それ以上立ち入らぬことです』"
translation = "『기다리세요…… 인간의 아이여. 이 탑은 지금, 심각한 장기에 노출되어 있습니다. 목숨이 아깝다면, 더 이상 들어서지 마십시오.』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「構わぬ。もはやこの身に恐れなど存在しない──身勝手を貫かせてもらう」"
translation = "「상관없다. 더 이상 이 몸에 두려움 따위는 존재하지 않는다── 제멋대로 관철하겠다.」"

[[dialogue]]
speaker = "unk"
original = "行く手を遮る謎の声も私は無視した。"
translation = "앞길을 가로막는 수수께끼의 목소리도 나는 무시했다."

[[dialogue]]
speaker = "unk"
original = "妻に会いたい。ただそれだけの願望に突き動かされて、私はフィーニスの塔を昇りつめた。"
translation = "아내를 만나고 싶다. 단지 그 소망에만 이끌려, 나는 피니스의 탑을 끝까지 올랐다."

[[dialogue]]
speaker = "unk"
original = "そこで私は……いくつもの真実を知った。"
translation = "그곳에서 나는…… 여러 진실을 알게 되었다."

[[dialogue]]
speaker = "unk"
original = "リクリエの本当の意義──繰り返す世界の再創生。"
translation = "리크리에의 진정한 의의── 반복되는 세계의 재창생."

[[dialogue]]
speaker = "unk"
original = "月と太陽の壁画の正体──救世の魔王と偽りの真実。"
translation = "달과 태양의 벽화의 정체── 구세의 마왕과 거짓된 진실."

[[dialogue]]
speaker = "unk"
original = "かつて滅ぼされた異なる暦の世界──そして破滅を防いだ森羅暦。"
translation = "예전에 멸망했던 다른 역법의 세계── 그리고 파멸을 막은 신라력."

[[dialogue]]
speaker = "unk"
original = "私は執念でフィーニスの塔を昇り続け、やがて……その頂点へと至った。"
translation = "나는 집념으로 피니스의 탑을 계속 올라, 이윽고…… 그 정점까지 다다랐다."

[[dialogue]]
speaker = "unk"
original = "『ようこそ。フィーニスの塔──その終点へ』"
translation = "『어서 오세요. 피니스의 탑── 그 종착점으로.』"

[[dialogue]]
speaker = "unk"
original = "『それにしても……驚きました。よもや本当に、人の身でここまで辿り着いてしまうとは』"
translation = "『그렇다 하더라도…… 놀랐습니다. 설마 정말로, 인간의 몸으로 여기까지 도달할 줄이야.』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「再三の忠告、痛み入る。だが……どうしても立ち止まるわけにはいかなかった」"
translation = "「거듭된 충고, 감사히 받는다. 하지만…… 도저히 멈춰 설 수는 없었다.」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「あなたの命に反してもだ。──女神テルル」"
translation = "「당신의 명령에 반해서라도 말이다.── 여신 테루루.」"

[[dialogue]]
speaker = "unk"
original = "『なるほど……私の正体にも思い至りましたか。やはり聡明なご様子』"
translation = "『과연…… 저의 정체까지 짐작하셨군요. 역시 총명하신 듯합니다.』"

[[dialogue]]
speaker = "unk"
original = "彼女の声は塔の内部で何度も反響し続けていた。"
translation = "그녀의 목소리는 탑 내부에서 몇 번이고 계속 울려 퍼지고 있었다."

[[dialogue]]
speaker = "unk"
original = "そして、この塔が女神の住まう地であるというなら、その答えも必然。"
translation = "그리고, 이 탑이 여신이 머무는 곳이라고 한다면, 그 답도 필연적이다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「私がここへ来た目的はひとつ。存在をかき消された妻──マルキアの行方を知るためだ」"
translation = "「내가 여기에 온 목적은 하나. 존재가 지워진 아내── 마르키아의 행방을 알기 위해서다.」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「神隠しの行く末。<ruby>女神<rt>あなた</rt></ruby>なら知っていよう」"
translation = "「신 감추기의 행방. 여신이라면 알고 있겠지.」"

[[dialogue]]
speaker = "unk"
original = "『……神隠し、ですか。生憎ながら……そのような現象に覚えはありません』"
translation = "『……신 감추기, 말입니까. 공교롭게도…… 그러한 현상은 기억에 없습니다.』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「……そうだろうな。神隠しなどというのは、あくまで古い云われにすぎない」"
translation = "「……그렇겠지. 신 감추기 따위는, 어디까지나 오래된 전설에 불과하다.」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「だが──だとしてもあなたならわかるはずだ。マルキアは今、どこにいる？」"
translation = "「하지만── 그렇다 하더라도 당신이라면 알 수 있을 터. 마르키아는 지금, 어디에 있는가?」"

[[dialogue]]
speaker = "unk"
original = "『残念ながら……それについても、こう答えるほかありません』"
translation = "『유감스럽게도…… 그것에 대해서도, 이렇게 대답할 수밖에 없습니다.』"

[[dialogue]]
speaker = "unk"
original = "『どこにもいない──と』"
translation = "『어디에도 없다──고.』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「……なんだと？\u3000ならば、ヒトが一人、こつ然と消え失せたとでもいうのか？」"
translation = "「……뭐라고? 그렇다면, 사람이 한 명, 홀연히 사라졌다고라도 말하는 건가?」"

[[dialogue]]
speaker = "unk"
original = "『……ええ』"
translation = "『……예.』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「なぜだ？\u3000この世に、女神にもわからぬことがあるというのか？」"
translation = "「왜지? 이 세상에, 여신조차 모르는 일이 있다는 건가?」"

[[dialogue]]
speaker = "unk"
original = "『…………』"
translation = "『…………』"

[[dialogue]]
speaker = "unk"
original = "女神は沈黙した。"
translation = "여신은 침묵했다."

[[dialogue]]
speaker = "unk"
original = "それは肯定というよりも、どこかはぐらかされている気がした。"
translation = "그것은 긍정이라기보다는, 어딘가 얼버무려지고 있다는 느낌이 들었다."

[[dialogue]]
speaker = "unk"
original = "私は憤りを抑えながら、真円に広がる雄大な空間の淵に立ち、外を覗いた。"
translation = "나는 분노를 억누르며, 진원형으로 펼쳐진 웅장한 공간의 가장자리에 서서, 밖을 내다보았다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「ここはフィーニスの塔の頂上──そのはずだな」"
translation = "「여기는 피니스의 탑의 정상── 그럴 터인데.」"

[[dialogue]]
speaker = "unk"
original = "『はい。それが……？』"
translation = "『예. 그런데……?』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「頂というからにはてっきり、ここからなら豆粒のような地上が見えるものだと思っていた」"
translation = "「정상이라고 하니 당연히, 여기에서라면 콩알만 한 지상이 보일 것이라 생각했다.」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「だが……なんだ？\u3000この──移り変わる様々な景観は」"
translation = "「하지만…… 뭐지? 이── 끊임없이 바뀌는 다양한 경관은.」"

[[dialogue]]
speaker = "unk"
original = "そこからはいくつもの光景が見通せた。"
translation = "그곳에서는 여러 광경이 내다보였다."

[[dialogue]]
speaker = "unk"
original = "さながら走馬灯のように切り替わっていく地上の景色の数々。"
translation = "마치 주마등처럼 바뀌어 가는 지상의 풍경들."

[[dialogue]]
speaker = "unk"
original = "さらに言えば、私も訪れたことのない魔界や天界らしき様子まで──"
translation = "게다가, 나조차 방문한 적 없는 마계나 천계 같은 모습까지──"

[[dialogue]]
speaker = "unk"
original = "ただ空間の淵に立つだけで、三界のあらゆる様子がシャボン玉のごとく浮かんできた。"
translation = "그저 공간의 가장자리에 서 있는 것만으로, 삼계의 모든 모습이 비눗방울처럼 떠올랐다."

[[dialogue]]
speaker = "unk"
original = "『それは……この地が、そういうものだからです』"
translation = "『그것은…… 이 땅이, 그런 곳이기 때문입니다.』"

[[dialogue]]
speaker = "unk"
original = "『フィーニスの塔。その頂点。それは──分かたれし<ruby>総<rt>すべ</rt></ruby>ての世界線を望むことのできる、唯一の<ruby>視座<rt>しざ</rt></ruby>なのですから』"
translation = "『피니스의 탑. 그 정점. 그것은── 나뉘어진 모든 세계선을 바라볼 수 있는, 유일한 시좌이니까요.』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「三界のどこでも……ということか」"
translation = "「삼계의 어디든…… 이라는 건가.」"

[[dialogue]]
speaker = "unk"
original = "私はそう納得しかけた──が、次いで驚くべき光景も目に飛び込んできた。"
translation = "나는 그렇게 납득하려 했다── 하지만, 이어서 놀라운 광경도 눈에 들어왔다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「……！？\u3000なんだ、この<ruby>頽廃<rt>たいはい</rt></ruby>した光景は──……？」"
translation = "「……!? 뭐지, 이 퇴폐한 광경은──……?」"

[[dialogue]]
speaker = "unk"
original = "『ああ……覗かれてしまったのですね』"
translation = "『아아…… 엿보게 되셨군요.』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「こんな破滅的な場所は見たことがない。魔界の一部か……？」"
translation = "「이런 파멸적인 장소는 본 적이 없다. 마계의 일부인가……?」"

[[dialogue]]
speaker = "unk"
original = "『いいえ。そちらは魔界ではなく……人間界』"
translation = "『아닙니다. 그곳은 마계가 아니라…… 인간계.』"

[[dialogue]]
speaker = "unk"
original = "『あなたもよく知る──流星市国の成れの果てです。もっとも、あなたの存在していた世界線とは異なる領域にありますが』"
translation = "『당신도 잘 아는── 유성 시국의 말로입니다. 물론, 당신이 존재했던 세계선과는 다른 영역에 있지만요.』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「っ……！？\u3000これが流星市国だと──？」"
translation = "「……!? 이것이 유성 시국이라고──?」"

[[dialogue]]
speaker = "unk"
original = "私は驚愕を隠せなかった。しかし、女神の言葉に嘘偽りはないと思えた。"
translation = "나는 경악을 감출 수 없었다. 하지만, 여신의 말에 거짓은 없다고 생각되었다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「私の存在していた世界とは違う──別の人間界があるというのか……？」"
translation = "「내가 존재했던 세계와는 다른── 별개의 인간계가 있다는 건가……?」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「──待て。もしや、先に言っていた<b>総ての世界線</b>というのは──」"
translation = "「──잠깐. 혹시, 이전에 말했던 <ruby>모든 세계선<rt>・・ ・・・</rt></ruby>이라는 것은──」"

[[dialogue]]
speaker = "unk"
original = "『察しがよいですね。<ruby>頂上<rt>ここ</rt></ruby>は視座──分かたれし三つの世界線を観測可能な、唯一の地点なのです』"
translation = "『짐작이 빠르시군요. 정상은 시좌── 나뉘어진 세 개의 세계선을 관측 가능한, 유일한 지점입니다.』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「分かたれし三つの世界線……三界のことではなく？」"
translation = "「나뉘어진 세 개의 세계선…… 삼계가 아니라?」"

[[dialogue]]
speaker = "unk"
original = "『はい。領域的な区分ではなく、可能性的に共存している三種の宇宙』"
translation = "『예. 영역적인 구분이 아니라, 가능성적으로 공존하고 있는 세 종류의 우주.』"

[[dialogue]]
speaker = "unk"
original = "『デネブ──アルタイル──ベガ──枝分かれしたそれぞれの可能性をそう呼び習わします』"
translation = "『데네브── 알타이르── 베가── 가지를 친 각각의 가능성을 그렇게 부릅니다.』"

[[dialogue]]
speaker = "unk"
original = "『平行世界──などと呼び換えれば、座りもよいでしょうか』"
translation = "『평행 세계── 등으로 바꿔 부르면, 이해하기 쉬울까요.』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「平行、世界……」"
translation = "「평행, 세계……」"

[[dialogue]]
speaker = "unk"
original = "にわかには信じがたい話だったが、相手は女神。"
translation = "당장에는 믿기 어려운 이야기였지만, 상대는 여신."

[[dialogue]]
speaker = "unk"
original = "これまでの層で得てきた真実と照らし合わせても、頭ごなしに否定はできなかった。"
translation = "지금까지의 층에서 얻어온 진실과 비춰보아도, 무턱대고 부정할 수는 없었다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「魔界のいずこかで──そんな言い伝えを聞いたことがある。その時は、とんだ迷信だと思っていた」"
translation = "「마계 어딘가에서── 그런 전설을 들은 적이 있다. 그때는, 터무니없는 미신이라고 생각했지.」"

[[dialogue]]
speaker = "unk"
original = "『無理からぬことです』"
translation = "『무리도 아닙니다.』"

[[dialogue]]
speaker = "unk"
original = "三界とは別に、三つの異なる世界線が存在する。"
translation = "삼계와는 별도로, 세 개의 다른 세계선이 존재한다."

[[dialogue]]
speaker = "unk"
original = "その理屈を真に受ければ──三種の魔界、三種の天界、三種の人間界という、計九つの場所をこの視座は見通せることになる。"
translation = "그 이치를 곧이곧대로 받아들이면── 세 종류의 마계, 세 종류의 천계, 세 종류의 인간계라는, 총 아홉 곳을 이 시좌는 내다볼 수 있게 된다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「確かに平行世界という理論は存在する。その場合、未来は無限に枝分かれしていくはずだが」"
translation = "「확실히 평행 세계라는 이론은 존재한다. 그럴 경우, 미래는 무한히 가지를 쳐 나갈 터인데.」"

[[dialogue]]
speaker = "unk"
original = "『私が管理するこの宇宙において、共存できる世界の総数は<b>三つに限られて</b>います』"
translation = "『제가 관리하는 이 우주에서, 공존할 수 있는 세계의 총수는 <ruby>세 개로 한정되어<rt>・ ・・ ・・・・</rt></ruby> 있습니다.』"

[[dialogue]]
speaker = "unk"
original = "『より正確に言うなれば、無限に存在する平行世界を支える幹の数が、ですが……』"
translation = "『더 정확히 말하자면, 무한히 존재하는 평행 세계를 지탱하는 줄기의 수가, 말입니다만……』"

[[dialogue]]
speaker = "unk"
original = "『ともあれ今重要なのは、この宇宙の命運を握る三つの世界線のお話です』"
translation = "『어쨌든 지금 중요한 것은, 이 우주의 명운을 쥔 세 개의 세계선에 대한 이야기입니다.』"

[[dialogue]]
speaker = "unk"
original = "『デネブ・アルタイル・ベガ──全三種の世界線をそう呼びます』"
translation = "『데네브・알타이르・베가── 총 세 종류의 세계선을 그렇게 부릅니다.』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「……夏の大三角、か」"
translation = "「……여름의 대삼각형, 인가.」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「なら……私のいた人間界はどれにあたる？」"
translation = "「그렇다면…… 내가 있던 인간계는 어디에 해당하지?」"

[[dialogue]]
speaker = "unk"
original = "『アルタイル。同様に、あなたの知る魔界や天界も含めて、そのすべてで一つの宇宙を織りなしています』"
translation = "『알타이르. 마찬가지로, 당신이 아는 마계나 천계도 포함하여, 그 모든 것이 하나의 우주를 이루고 있습니다.』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「ならば……デネブやベガといった世界にも、私と同じセイファートがいるということになるのか？」"
translation = "「그렇다면…… 데네브나 베가 같은 세계에도, 나와 같은 세이퍼트가 있다는 말이 되는 건가?」"

[[dialogue]]
speaker = "unk"
original = "『ええ、その通りです』"
translation = "『예, 그렇습니다.』"

[[dialogue]]
speaker = "unk"
original = "当然の帰結だった。世界が三股に分かれているなら、内部に包括される生命もまた平行して存在する。"
translation = "당연한 귀결이었다. 세계가 세 갈래로 나뉘어 있다면, 내부에 포괄되는 생명 또한 평행하게 존재한다."

[[dialogue]]
speaker = "unk"
original = "だが──"
translation = "하지만──"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「……あの世界でもか？」"
translation = "「……저 세계에서도인가?」"

[[dialogue]]
speaker = "unk"
original = "『それは……不明です。他世界のあなたが無事である保証は、どこにもありません』"
translation = "『그것은…… 불명입니다. 다른 세계의 당신이 무사하다는 보장은, 어디에도 없습니다.』"

[[dialogue]]
speaker = "unk"
original = "私は再び例の頽廃した光景へ目をやった。"
translation = "나는 다시금 그 퇴폐한 광경으로 시선을 돌렸다."

[[dialogue]]
speaker = "unk"
original = "女神が人間界、流星市国と称したその地は、もはや生命の息吹さえ感じぬほどに枯れ果てている。"
translation = "여신이 인간계, 유성 시국이라 칭했던 그 땅은, 더 이상 생명의 숨결조차 느껴지지 않을 정도로 메말라 있다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「先の三種の世界線になぞらえて言うと──ここは？」"
translation = "「앞서 말한 세 종류의 세계선에 빗대어 말하자면── 여기는?」"

[[dialogue]]
speaker = "unk"
original = "『そこはベガの世界。悪しき覚醒を遂げた魔王が、滅亡させた地球の末路』"
translation = "『그곳은 베가의 세계. 사악한 각성을 이룬 마왕이, 멸망시킨 지구의 말로.』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「ベガ……魔王……」"
translation = "「베가…… 마왕……」"

[[dialogue]]
speaker = "unk"
original = "私はその言葉を胸に刻んだ。"
translation = "나는 그 말을 가슴에 새겼다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「今現在……これに比べると、こちらの地球はまだ無事だ。なぜこれほど差が生じている？」"
translation = "「지금 현재…… 이것에 비하면, 이쪽 지구는 아직 무사하다. 왜 이토록 차이가 생기는 거지?」"

[[dialogue]]
speaker = "unk"
original = "『異なる三つの世界線にはわずかに時間のズレが生じます。それも宇宙規模で言えば、些細な誤差ですが』"
translation = "『서로 다른 세 개의 세계선에는 미세하게 시간의 오차가 발생합니다. 그것도 우주 규모로 말하자면, 사소한 오차입니다만.』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「なら、いずれ<ruby>アルタイル<rt>こちら</rt></ruby>が<b>こうなる</b>こともありえる──と」"
translation = "「그렇다면, 언젠가 알타이르가 <ruby>이렇게 될<rt>・・・ ・</rt></ruby> 수도 있다는 건가──.」"

[[dialogue]]
speaker = "unk"
original = "『ええ。無論──未来に絶対はありませんが』"
translation = "『예. 물론── 미래에 절대는 없습니다만.』"

[[dialogue]]
speaker = "unk"
original = "この世界──宇宙と呼ぶべきか──には常に、三種の<b>可能性</b>が存在する。"
translation = "이 세계── 우주라고 불러야 할까── 에는 항상, 세 종류의 <b>가능성</b>이 존재한다."

[[dialogue]]
speaker = "unk"
original = "そして、私の知る<ruby>現実<rt>アルタイル</rt></ruby>とは異なり、どこかで分岐を違えた末路がこの有り様なのだろう。"
translation = "그리고, 내가 아는 현실과는 달리, 어딘가에서 분기를 달리한 말로가 이 모양인 것이겠지."

[[dialogue]]
speaker = "unk"
original = "あまりの凄惨さに、私は<ruby>頭<rt>かぶり</rt></ruby>を振って光景から目を逸らした。"
translation = "너무나 참혹함에, 나는 고개를 저으며 광경에서 눈을 돌렸다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「平行世界というのは……どうにもならないのか？」"
translation = "「평행 세계라는 것은…… 어떻게 할 수 없는 건가?」"

[[dialogue]]
speaker = "unk"
original = "『はい。交わらぬ世界線同士は、交わらぬからこそ平行と称します』"
translation = "『예. 서로 섞이지 않는 세계선끼리는, 섞이지 않기에 평행이라 칭합니다.』"

[[dialogue]]
speaker = "unk"
original = "『よって本来──人の子が平行世界を覗くことさえ、ありえぬことなのです。これらは総て、世界の裏側とでも呼ぶべき事情』"
translation = "『따라서 본래── 인간의 아이가 평행 세계를 엿보는 것조차, 있을 수 없는 일입니다. 이것들은 모두, 세계의 뒷면이라고 불러야 할 사정.』"

[[dialogue]]
speaker = "unk"
original = "『ですがジェラルド・セイファート。あなたにはフィーニスの塔の“制覇者”として……この理を知る権利があります』"
translation = "『하지만 제럴드 세이퍼트. 당신에게는 피니스의 탑의 “제패자”로서…… 이 이치를 알 권리가 있습니다.』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「制覇者……か。フ──光栄なことだ」"
translation = "「제패자…… 인가. 훗── 영광스러운 일이군.」"

[[dialogue]]
speaker = "unk"
original = "これまでも私は、塔を昇るごとに新たな真実を得てきた。"
translation = "지금까지도 나는, 탑을 오를 때마다 새로운 진실을 얻어왔다."

[[dialogue]]
speaker = "unk"
original = "頂上では女神から直々に世界の裏側を聞かされるなど、<ruby>次期教皇<rt>マリウス</rt></ruby>が飛んで喜びそうな話ではないか。"
translation = "정상에서는 여신에게 직접 세계의 뒷면을 듣다니, 차기 교황이 날뛰며 기뻐할 만한 이야기가 아닌가."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「だが──ここまで来たことで、私は新たな疑問を抱いた」"
translation = "「하지만── 여기까지 온 것으로, 나는 새로운 의문을 품었다.」"

[[dialogue]]
speaker = "unk"
original = "『……それは？』"
translation = "『……그것은요?』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「<b>あなたの姿が見えないこと</b>だ。フィーニスの塔は女神の住まう場所であると聞いたが」"
translation = "「<ruby>당신의 모습이 보이지 않는다는 것<rt>・・・ ・・・ ・・・ ・・・・ ・</rt></ruby>이다. 피니스의 탑은 여신이 머무는 장소라고 들었는데.」"

[[dialogue]]
speaker = "unk"
original = "私の問いに声は──女神は押し黙った。"
translation = "나의 물음에 목소리는── 여신은 입을 다물었다."

[[dialogue]]
speaker = "unk"
original = "さらに言えば、今しがた見渡した平行世界のどれにも彼女らしき存在は見受けられなかった。"
translation = "게다가, 방금 전 둘러본 평행 세계 중 어디에도 그녀다운 존재는 찾아볼 수 없었다."

[[dialogue]]
speaker = "unk"
original = "女神はこの頂点に座してなお、声だけの存在にある。"
translation = "여신은 이 정점에 자리하고서도, 여전히 목소리만의 존재로 있다."

[[dialogue]]
speaker = "unk"
original = "なぜか？"
translation = "왜일까?"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「私が初めてこの塔へ立ち入ったとき──あなたは言った。塔の内部は今、深刻な瘴気に冒されていると」"
translation = "「내가 처음 이 탑에 들어섰을 때── 당신은 말했다. 탑 내부는 지금, 심각한 장기에 노출되어 있다고.」"

[[dialogue]]
speaker = "unk"
original = "『……ええ』"
translation = "『……예.』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「そして頂上まで上り詰めた今も、あなたの姿は見えないまま。これが何を意味しているのか」"
translation = "「그리고 정상까지 올라온 지금도, 당신의 모습은 보이지 않는 채. 이것이 무엇을 의미하는가.」"

[[dialogue]]
speaker = "unk"
original = "私は続ける。女神は押し黙ったまま話を聞いていた。"
translation = "나는 말을 이었다. 여신은 입을 다문 채 이야기를 듣고 있었다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「私はこの塔を巡る上で多くのことを知った」"
translation = "「나는 이 탑을 돌면서 많은 것을 알았다.」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「リクリエは世界のリセット機構──その真実を聞いて、私は当初、それは女神の意図によるものなのではないかと疑った」"
translation = "「리크리에는 세계의 리셋 기구── 그 진실을 듣고, 나는 당초, 그것이 여신의 의도에 의한 것이 아닐까 의심했다.」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「だが、違うようだ。この塔までもがリクリエの瘴気に蝕まれているのなら」"
translation = "「하지만, 아닌 것 같다. 이 탑마저도 리크리에의 장기에 침식당하고 있다면.」"

[[dialogue]]
speaker = "unk"
original = "破滅しきった──もはや手遅れとなったベガの世界を見て私は確信した。"
translation = "파멸해 버린── 더 이상 손쓸 수 없게 된 베가의 세계를 보고 나는 확신했다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「女神よ。あなたはもはや……姿かたちも保てないほどに、脆弱化しているのではあるまいか」"
translation = "「여신이여. 당신은 더 이상…… 모습조차 유지할 수 없을 정도로, 취약해진 것이 아닌가.」"

[[dialogue]]
speaker = "unk"
original = "『……あなたの眼は誤魔化せませんか』"
translation = "『……당신의 눈은 속일 수 없군요.』"

[[dialogue]]
speaker = "unk"
original = "己が弱っていることを女神は──女神の声は──認めた。"
translation = "자신이 약해지고 있다는 것을 여신은── 여신의 목소리는── 인정했다."

[[dialogue]]
speaker = "unk"
original = "『リクリエという現象は──宇宙という太極が定めた周期の終わり。その起動は阻止できず、私にできるのはうねりをコントロールすることのみ』"
translation = "『리크리에라는 현상은── 우주라는 태극이 정한 주기의 끝. 그 기동은 저지할 수 없으며, 제가 할 수 있는 것은 물결을 통제하는 것뿐.』"

[[dialogue]]
speaker = "unk"
original = "『ですが、今回は……そのコントロールする権限さえ奪われてしまいました』"
translation = "『하지만, 이번에는…… 그 통제할 권한마저 빼앗겨 버렸습니다.』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "unk"
original = "『私は三界の管理者として……この世界に存在しています。かの機構にとって、私はまず排除すべき障害だったのでしょう』"
translation = "『저는 삼계의 관리자로서…… 이 세계에 존재하고 있습니다. 그 기구에게 있어, 저는 우선 배제해야 할 장애물이었겠지요.』"

[[dialogue]]
speaker = "unk"
original = "リクリエは世界をまっさらにしたかった。"
translation = "리크리에는 세계를 완전히 초기화하고 싶었다."

[[dialogue]]
speaker = "unk"
original = "その上で、三界を統べている女神の存在が邪魔だった。だからまず女神を封じた。"
translation = "그 위에, 삼계를 통솔하고 있는 여신의 존재가 방해였다. 그래서 먼저 여신을 봉인했다."

[[dialogue]]
speaker = "unk"
original = "それが、玄武暦とも朱雀暦とも異なる、現リクリエだけの暴走的特異性。"
translation = "그것이, 현무력과도 주작력과도 다른, 현 리크리에만의 폭주적인 특이성."

[[dialogue]]
speaker = "unk"
original = "『本来であれば……私はこの頂から、デネブ・アルタイル・ベガ──あらゆる世界の可能性を<b>活かす</b>必要がありました』"
translation = "『본래라면…… 저는 이 정상에서, 데네브・알타이르・베가── 모든 세계의 가능성을 <b>살릴</b> 필요가 있었습니다.』"

[[dialogue]]
speaker = "unk"
original = "『しかし今、霊力を奪われ、人の子らに星力を分け与えた身では……こうして念話を送るのが精々』"
translation = "『하지만 지금, 영력을 빼앗기고, 인간의 아이들에게 성력을 나눠준 몸으로는…… 이렇게 염화를 보내는 것이 고작입니다.』"

[[dialogue]]
speaker = "unk"
original = "『それどころか──平行世界の一角が崩れたことで、私という存在の絶対性はこのアルタイルにおいても揺らいでいます』"
translation = "『게다가── 평행 세계의 한 부분이 무너짐으로써, 저라는 존재의 절대성이 이 알타이르에서도 흔들리고 있습니다.』"

[[dialogue]]
speaker = "unk"
original = "ベガの世界はもう手遅れ。"
translation = "베가의 세계는 이미 늦었다."

[[dialogue]]
speaker = "unk"
original = "いわば、女神はリクリエとの陣取り合戦において、すでに一世界分負けている──ということらしい。"
translation = "말하자면, 여신은 리크리에와의 진지 쟁탈전에서, 이미 한 세계분 패배했다는 것 같다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「声だけを辛うじて届けられる。それほどまでに弱っている──と……」"
translation = "「목소리만을 간신히 전할 수 있다. 그 정도로 약해져 있다는 건가──……」"

[[dialogue]]
speaker = "unk"
original = "『ええ。不甲斐ない限りです。守護天使にも、あなた方にも苦労をかけていることでしょう』"
translation = "『예. 한심하기 그지없습니다. 수호 천사에게도, 당신들에게도 고생을 시키고 있겠지요.』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「……なるほどな。ならば星騎士は──アルタイルにとっての防波堤だったわけか」"
translation = "「……과연 그렇군. 그렇다면 성기사는── 알타이르에게 있어서의 방파제였던 셈인가.」"

[[dialogue]]
speaker = "unk"
original = "『ええ。私にとって、人の子らの奮闘は感謝すべきものです』"
translation = "『예. 저에게 있어, 인간 아이들의 분투는 감사해야 할 일입니다.』"

[[dialogue]]
speaker = "unk"
original = "女神はここからずっと、星騎士たちの戦いを見てきたようだ。"
translation = "여신은 이곳에서 줄곧, 성기사들의 싸움을 지켜봐 온 것 같다."

[[dialogue]]
speaker = "unk"
original = "その上で……と彼女は告げる。"
translation = "그 위에……라고 그녀는 고한다."

[[dialogue]]
speaker = "unk"
original = "『制覇者ジェラルド・セイファート。あなたは──力を渇望して生きてきたはずです。人々を守る、流星の騎士として』"
translation = "『제패자 제럴드 세이퍼트. 당신은── 힘을 갈망하며 살아왔을 것입니다. 사람들을 지키는, 유성의 기사로서.』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「……ああ。そうだな」"
translation = "「……아아. 그렇군.」"

[[dialogue]]
speaker = "unk"
original = "『なれば、授けましょう。あなたに……このアルタイルを救うための力を』"
translation = "『그렇다면, 드리겠습니다. 당신에게…… 이 알타이르를 구할 힘을.』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker = "unk"
original = "目の前に聖なる光の球体が浮かび、ゆらゆらと私の胸に吸い込まれていった。"
translation = "눈앞에 성스러운 빛의 구체가 떠오르더니, 흔들흔들 내 가슴으로 빨려 들어갔다."

[[dialogue]]
speaker = "unk"
original = "『私に残された最後の霊力──その半分をあなたに分け与えます』"
translation = "『저에게 남겨진 마지막 영력── 그 절반을 당신에게 나눠 드립니다.』"

[[dialogue]]
speaker = "unk"
original = "『この力は……平行する時空の<ruby>理<rt>ことわり</rt></ruby>を知る者にしか、その真価を引き出せません』"
translation = "『이 힘은…… 평행하는 시공의 이치를 아는 자만이, 그 진가를 끌어낼 수 있습니다.』"

[[dialogue]]
speaker = "unk"
original = "『もし、あなたほどの戦士がこれを扱えたなら……リクリエによる<ruby>禍<rt>わざわい</rt></ruby>も必ずや跳ね除けられるでしょう』"
translation = "『만약, 당신 정도의 전사가 이것을 다룰 수 있다면…… 리크리에로 인한 재앙도 반드시 물리칠 수 있을 것입니다.』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「よいのか。そんなことをすれば、あなた自身がさらに弱ってしまうのではないか」"
translation = "「괜찮은 건가. 그런 짓을 하면, 당신 자신이 더욱 약해져 버리는 것이 아닌가.」"

[[dialogue]]
speaker = "unk"
original = "『よいのです。あなたがここまで昇ってきたこともまた運命。既に希薄化した私より、地上に生きる戦士のほうが大事でしょう』"
translation = "『괜찮습니다. 당신이 여기까지 올라온 것 또한 운명. 이미 희박해진 저보다, 지상에 사는 전사가 더 중요하겠지요.』"

[[dialogue]]
speaker = "unk"
original = "得体の知れない、けれど清らかなる力が体の底からみなぎってきた。"
translation = "정체를 알 수 없지만, 맑고 깨끗한 힘이 몸속 깊은 곳에서부터 넘쳐흘러 나왔다."

[[dialogue]]
speaker = "unk"
original = "霊力──これまでに掴んだ真実からすれば、かつて失われた旧世界の法だ。"
translation = "영력── 지금까지 파악한 진실로 미루어 볼 때, 예전에 상실된 구세계의 법이다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「平行世界という裏の<ruby>理<rt>ことわり</rt></ruby>に、旧世界の力……か。フィーニスの塔を昇りきったとはいえ、あまりに厚い待遇だな」"
translation = "「평행 세계라는 이면의 이치에, 구세계의 힘…… 인가. 피니스의 탑을 완전히 올랐다고는 해도, 너무나 후한 대우로군.」"

[[dialogue]]
speaker = "unk"
original = "『あなたにはそれを受け取る権利があります。勇猛なる戦士ジェラルド──これまでも幾多の<ruby>禍<rt>わざわい</rt></ruby>を滅ぼしてきたあなたなら』"
translation = "『당신에게는 그것을 받을 권리가 있습니다. 용맹한 전사 제럴드── 지금까지도 수많은 재앙을 멸해 온 당신이라면.』"

[[dialogue]]
speaker = "unk"
original = "『──さあ、ジェラルド！\u3000残されたアルタイルの世界を救うためにも……その力をもって、厄災の波を打ち払うのです』"
translation = "『──자, 제럴드! 남겨진 알타이르의 세계를 구하기 위해서라도…… 그 힘을 가지고, 액재의 파도를 물리치세요.』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "『……どうされましたか？\u3000地上へは、そちらに空けたホールから──』"
translation = "『……무슨 일이십니까? 지상으로는, 그쪽에 뚫어 놓은 홀에서──』"

[[dialogue]]
speaker = "unk"
original = "女神は頂きからの退出を促す──が、私は立ち止まった。"
translation = "여신은 정상으로부터의 퇴출을 재촉한다── 하지만 나는 멈춰 섰다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「妙だな」"
translation = "「이상하군.」"

[[dialogue]]
speaker = "unk"
original = "『妙……？』"
translation = "『이상하다……고요?』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「ああ。実に妙だ。私を制覇者などと呼んで<ruby>寿<rt>ことほ</rt></ruby>ぎ、平行世界という裏の理まで告げたにもかかわらず、なぜ妻の行方だけがわからない？」"
translation = "「아아. 실로 이상하다. 나를 제패자라고 부르며 칭송하고, 평행 세계라는 이면의 이치까지 알려주었음에도 불구하고, 어째서 아내의 행방만은 모르는 거지?」"

[[dialogue]]
speaker = "unk"
original = "『……！』"
translation = "『……!』"

[[dialogue]]
speaker = "unk"
original = "『……私も全知全能ではありません。今はリクリエにより、どの世界にも異常が生じている状態ですから』"
translation = "『……저도 전지전능하지는 않습니다. 지금은 리크리에로 인해, 어느 세계에도 이상이 생기고 있는 상태이니까요.』"

[[dialogue]]
speaker = "unk"
original = "『あなたもそんな世界を救うために──流星の騎士となったはずです』"
translation = "『당신도 그런 세계를 구하기 위해── 유성의 기사가 되었을 것입니다.』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「ふ……ふふ」"
translation = "「후…… 후후.」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「私をあまり──買いかぶらないでいただこう。私は決して、英雄となるために<ruby>頂上<rt>ここ</rt></ruby>へ来たのではない」"
translation = "「나를 너무── 과대평가하지 말아줬으면 좋겠군. 나는 결코, 영웅이 되기 위해 정상에 온 것이 아니다.」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「民の、人間界の、平行世界の平和などより……失った妻に焦がれる気持ちのほうが大きい」"
translation = "「백성의, 인간계의, 평행 세계의 평화 따위보다…… 잃어버린 아내를 갈망하는 마음이 더 크다.」"

[[dialogue]]
speaker = "unk"
original = "神隠し──それは確かに女神の仕業ではないのだろう。だが、彼女は何かを隠している。"
translation = "신 감추기── 그것은 확실히 여신의 소행은 아닐 것이다. 하지만, 그녀는 무언가를 숨기고 있다."

[[dialogue]]
speaker = "unk"
original = "恐らくは私にとって……不都合な真実を！"
translation = "아마도 나에게 있어서…… 불리한 진실을!"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「既に破滅を迎えたベガ──私たちの立つアルタイル──なら他にはもうひとつ、まだ覗けていない世界があるはずだ」"
translation = "「이미 파멸을 맞이한 베가── 우리가 서 있는 알타이르── 라면 그 외에 하나 더, 아직 들여다보지 못한 세계가 있을 것이다.」"

[[dialogue]]
speaker = "unk"
original = "──デネブ。"
translation = "──데네브."

[[dialogue]]
speaker = "unk"
original = "ここが総てを見通す視座だというなら、覗けぬ可能性はないはずだ。"
translation = "이곳이 모든 것을 꿰뚫어 보는 시좌라고 한다면, 들여다볼 수 없는 가능성은 없을 것이다."

[[dialogue]]
speaker = "unk"
original = "『待ちなさい。それ以上の干渉は禁じます──ジェラルド』"
translation = "『기다리세요. 그 이상의 간섭은 금지합니다── 제럴드.』"

[[dialogue]]
speaker = "unk"
original = "『あなたにベガを見せたのはあくまでも理の理解のため。本来、平行する世界は決して交わらぬものなのです』"
translation = "『당신에게 베가를 보여준 것은 어디까지나 이치의 이해를 위해서입니다. 본래, 평행하는 세계는 결코 교차하지 않는 것입니다.』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「平行世界には決して干渉できないのだろう？\u3000ただ覗くだけだ。問題はない」"
translation = "「평행 세계에는 결코 간섭할 수 없는 것이겠지? 그저 들여다볼 뿐이다. 문제는 없다.」"

[[dialogue]]
speaker = "unk"
original = "『……無為なことです。そこでのあなたは、違う妻を<ruby>娶<rt>めと</rt></ruby>っているかもしれませんよ』"
translation = "『……무의미한 일입니다. 그곳에서의 당신은, 다른 아내를 맞이하고 있을지도 모릅니다.』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「構わぬ。私は妻を探しに来たのだ──あらゆる世界の可能性が広がっているのなら、その総てを見通さねばならない」"
translation = "「상관없다. 나는 아내를 찾으러 온 것이다── 모든 세계의 가능성이 펼쳐져 있다면, 그 모든 것을 꿰뚫어 봐야 한다.」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「どこだ──ここか──こちらか！」"
translation = "「어디냐── 여기인가── 이쪽인가!」"

[[dialogue]]
speaker = "unk"
original = "『っ……やめなさい！\u3000それ以上は──人の子の踏み込んでよい領域ではありません！』"
translation = "『읏…… 그만두세요! 그 이상은── 인간의 아이가 발을 들여놓아도 될 영역이 아닙니다!』"

[[dialogue]]
speaker = "unk"
original = "私は再び塔の淵へ立った。"
translation = "나는 다시 탑의 가장자리로 섰다."

[[dialogue]]
speaker = "unk"
original = "すでに女神の力、その半分を受け取った私にとって、彼女の制止を振り切ることは容易かった。まさに神をも恐れぬ所業だろう。"
translation = "이미 여신의 힘, 그 절반을 받은 나에게 있어, 그녀의 제지를 뿌리치는 것은 쉬웠다. 그야말로 신조차 두려워하지 않는 소행일 것이다."

[[dialogue]]
speaker = "unk"
original = "そうだ。私は確かめなくてはならない。"
translation = "그렇다. 나는 확인해야만 한다."

[[dialogue]]
speaker = "unk"
original = "この世界に果たして──<b>救う価値があるのかどうか</b>。"
translation = "이 세계에 과연── <ruby>구할 가치가 있는지 어떤지를<rt>・・ ・・・ ・・・ ・・・・</rt></ruby>."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "（これがデネブの世界……どうやら、<ruby>アルタイル<rt>こちら</rt></ruby>と変わらずまだ無事のようだが……）"
translation = "（이것이 데네브의 세계…… 아무래도, 알타이르와 다름없이 아직 무사한 것 같지만……）"

[[dialogue]]
speaker = "unk"
original = "すでに滅亡していたベガと違って──デネブの流星市国は幾分か落ち着いていた。"
translation = "이미 멸망했던 베가와 달리── 데네브의 유성 시국은 어느 정도 진정되어 있었다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "（それもそのはずか。いくら平行世界とはいえ根は同じ……大きく運命が隔たっているほうがおかしいのだ）"
translation = "（그것도 당연한가. 아무리 평행 세계라고 해도 근본은 같다…… 크게 운명이 멀리 떨어져 있는 쪽이 이상한 것이다.）"

[[dialogue]]
speaker = "unk"
original = "変わらぬ風景に安堵したのもつかの間。その雲行きも次第に怪しくなっていく。"
translation = "변함없는 풍경에 안도한 것도 잠시. 그 구름의 움직임도 점차 수상해져 간다."

[[dialogue]]
speaker = "unk"
original = "こちらの世界のリクリエ余波は私の知るそれよりも数段激しく、星騎士も追いつかないほどの厄災に見舞われていた。"
translation = "이쪽 세계의 리크리에 여파는 내가 아는 그것보다 몇 단계나 격렬하여, 성기사도 따라잡지 못할 정도의 액재를 겪고 있었다."

[[dialogue]]
speaker = "unk"
original = "やがて……見つめていたデネブ世界では十数年の時が経過していた。"
translation = "이윽고…… 지켜보던 데네브 세계에서는 십수 년의 시간이 경과해 있었다."

[[dialogue]]
speaker = "unk"
original = "様相は、ますます退廃の色を濃くしていく。"
translation = "양상은, 더욱더 퇴폐의 색을 짙게 해 간다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "（やはり世界は滅ぶ運命なのか──？\u3000それより、こちらの世界の私は何をしているのだ……！）"
translation = "（역시 세계는 멸망할 운명인가──? 그보다, 이쪽 세계의 나는 무엇을 하고 있는 거지……!）"

[[dialogue]]
speaker = "unk"
original = "やきもきしながら平行世界の行く末を観察していると、人々が口々に囁いているのが聞こえた。"
translation = "안달하며 평행 세계의 앞날을 관찰하고 있자니, 사람들이 입을 모아 속삭이는 것이 들렸다."

[[dialogue]]
speaker = "unk"
original = "「使徒がきた」"
translation = "「사도가 왔다.」"

[[dialogue]]
speaker = "unk"
original = "「仮面の女だ」"
translation = "「가면을 쓴 여자다.」"

[[dialogue]]
speaker = "unk"
original = "「とにかく逃げろ。殺される」"
translation = "「어쨌든 도망쳐. 살해당할 거야.」"

[[dialogue]]
speaker = "unk"
original = "人々が恐れおののき、逃げ惑う。"
translation = "사람들이 두려워 떨며, 도망쳐 헤맨다."

[[dialogue]]
speaker = "unk"
original = "アステラか。モンスターか。どんなに強大な敵が現れたのかと、私はデネブ世界の行方を見守った。"
translation = "아스테라인가. 몬스터인가. 얼마나 강대한 적이 나타났을까 하고, 나는 데네브 세계의 앞날을 지켜보았다."

[[dialogue]]
speaker = "unk"
original = "だが。"
translation = "하지만."

[[dialogue]]
speaker = "unk"
original = "私がそこで見たのは……あまりにも衝撃的な光景だった。"
translation = "내가 그곳에서 본 것은…… 너무나도 충격적인 광경이었다."

[[dialogue]]
speaker = "unk"
original = "謎の仮面を被った女が──街を襲っている。"
translation = "수수께끼의 가면을 쓴 여자가── 마을을 습격하고 있다."

[[dialogue]]
speaker = "unk"
original = "モンスターを従え、<ruby>戦斧<rt>せんぷ</rt></ruby>を振るい、リクリエの到来を叫んで人々を恐怖に陥れている。"
translation = "몬스터를 거느리고, 전투 도끼를 휘두르며, 리크리에의 도래를 외치며 사람들을 공포에 빠뜨리고 있다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「マル……キア？」"
translation = "「마르……키아?」"

[[dialogue]]
speaker = "unk"
original = "その姿を見間違えようはずもなかった。"
translation = "그 모습을 착각할 리가 없었다."

[[dialogue]]
speaker = "unk"
original = "あれは紛れもなく──私の妻であったマルキアだ！"
translation = "저것은 틀림없이── 나의 아내였던 마르키아다!"

[[dialogue]]
speaker = "unk"
original = "『ああ……視てしまったのですね』"
translation = "『아아…… 보시고 말았군요.』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「な……なんだ……どういう、ことだ……これは……」"
translation = "「나, 나…… 뭐지…… 무슨, 일이지…… 이건……」"

[[dialogue]]
speaker = "unk"
original = "『本当なら……あなたに告げたくはありませんでした。この残酷な真実を』"
translation = "『사실은…… 당신에게 알리고 싶지 않았습니다. 이 잔혹한 진실을.』"

[[dialogue]]
speaker = "unk"
original = "『平行世界は決して交わらぬ平行線。しかし……その大原則さえ、リクリエによってかき混ぜられているのです』"
translation = "『평행 세계는 결코 교차하지 않는 평행선. 하지만…… 그 대원칙마저, 리크리에에 의해 뒤섞이고 있는 것입니다.』"

[[dialogue]]
speaker = "unk"
original = "『デネブの人間がベガに──ベガの魔獣がアルタイルに──そんな、本来ありえぬ現象が、巻き起こっています』"
translation = "『데네브의 인간이 베가로── 베가의 마수가 알타이르로── 그런, 본래 있을 수 없는 현상이, 일어나고 있습니다.』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「マルキア──私の妻も、それに巻き込まれたと……？」"
translation = "「마르키아── 나의 아내도, 거기에 휘말렸다고……?」"

[[dialogue]]
speaker = "unk"
original = "マルキアは消えたのではなかった。"
translation = "마르키아는 사라진 것이 아니었다."

[[dialogue]]
speaker = "unk"
original = "ただ、平行にあるはずの別世界へ転移してしまった。摂理の再構築どころではない──異世界への強引な転移。それが神隠しの正体だ。"
translation = "그저, 평행하게 존재해야 할 다른 세계로 전이해 버렸다. 섭리의 재구축 정도가 아니다── 이세계로의 강제적인 전이. 그것이 신 감추기의 정체다."

[[dialogue]]
speaker = "unk"
original = "『それだけではありません……とりわけヒトの異動については、さらに奇怪な思惑がみられるのです』"
translation = "『그것만이 아닙니다…… 특히 인간의 이동에 대해서는, 더욱 기괴한 속셈이 보이는 것입니다.』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「それは──」"
translation = "「그것은──」"

[[dialogue]]
speaker = "unk"
original = "『……<ruby>拐<rt>さら</rt></ruby>われてしまうのです』"
translation = "『……채여 버리는 것입니다.』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「拐われ──る……？」"
translation = "「채여── 간다고……?」"

[[dialogue]]
speaker = "unk"
original = "『はい。平行世界へ転移させられた者は──謎の仮面によって、存在そのものが乗っ取られてしまうのです』"
translation = "『예. 평행 세계로 전이된 자는── 수수께끼의 가면으로 인해, 존재 자체가 강탈당해 버리는 것입니다.』"

[[dialogue]]
speaker = "unk"
original = "『──<b>リクリエの使徒</b>として』"
translation = "『──<ruby=・・・・・>리크리에의 사도로서.』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「リクリエの──使徒……なんなのだ、それは……！」"
translation = "「리크리에의── 사도…… 대체 뭐지, 그건……!」"

[[dialogue]]
speaker = "unk"
original = "私は何度もデネブのマルキアを見た。"
translation = "나는 몇 번이고 데네브의 마르키아를 보았다."

[[dialogue]]
speaker = "unk"
original = "変わり果てた妻の姿。<ruby>楚々<rt>そそ</rt></ruby>として美しかった彼女が、まるで厄災の<ruby>権化<rt>ごんげ</rt></ruby>かのようではないか。"
translation = "완전히 변해 버린 아내의 모습. 청초하고 아름다웠던 그녀가, 마치 액재의 화신인 것 같지 않은가."

[[dialogue]]
speaker = "unk"
original = "『細かいことは判明しておりませんが……あの仮面に乗っ取られた人物は、リクリエの到来を謳い、モンスターを従えるようになります』"
translation = "『자세한 것은 판명되지 않았습니다만…… 그 가면에게 강탈당한 인물은, 리크리에의 도래를 노래하며, 몬스터를 거느리게 됩니다.』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「ならば私も──私もあの世界へ連れて行ってくれ！\u3000デネブとやら……この身ならいくらでも捧げる！」"
translation = "「그렇다면 나도── 나도 저 세계로 데려가 줘! 데네브인가 뭔가 하는 곳…… 이 몸이라면 얼마든지 바치겠다!」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「私は妻を探し求めてここまで来た。ここから、彼女を救い出す方法は──」"
translation = "「나는 아내를 찾아 헤매 여기까지 왔다. 이곳에서, 그녀를 구해낼 방법은──」"

[[dialogue]]
speaker = "unk"
original = "無言が訪れた。女神テルルの姿は実際には見えないが──首を振った──ような間があった。"
translation = "침묵이 찾아왔다. 여신 테루루의 모습은 실제로는 보이지 않지만── 고개를 저었다── 와 같은 틈이 있었다."

[[dialogue]]
speaker = "unk"
original = "『残念ながら……不可能です。たとえ私が本来の力を取り戻したとて、アルタイルのあなたを動かすことはできません』"
translation = "『유감스럽게도…… 불가능합니다. 설령 제가 본래의 힘을 되찾는다 하더라도, 알타이르의 당신을 움직일 수는 없습니다.』"

[[dialogue]]
speaker = "unk"
original = "『平行世界は……交わらぬ可能性の並列構造。あなたがキングであれ──クイーンであれ──別の盤上へ移動することは、叶いません』"
translation = "『평행 세계는…… 교차하지 않는 가능성의 병렬 구조. 당신이 킹이든── 퀸이든── 다른 판 위로 이동하는 것은, 이루어지지 않습니다.』"

[[dialogue]]
speaker = "unk"
original = "『これは宇宙の定めた大原則なのです。たとえ三界を司る<ruby>女神<rt>わたし</rt></ruby>であっても、覆すことは不可能です』"
translation = "『이것은 우주가 정한 대원칙입니다. 설령 삼계를 관장하는 여신라 할지라도, 뒤집는 것은 불가능합니다.』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「どうにも──ならない、と……？」"
translation = "「어떻게도── 안 된다는, 건가……?」"

[[dialogue]]
speaker = "unk"
original = "絶望する私の目の前で、仮面を被ったマルキアが<ruby>異世界<rt>デネブ</rt></ruby>の<ruby>安寧<rt>あんねい</rt></ruby>を蹂躙していく。"
translation = "절망하는 나의 눈앞에서, 가면을 쓴 마르키아가 이세계의 안녕을 유린해 간다."

[[dialogue]]
speaker = "unk"
original = "戦姫──そう謳われた実力はさらに研ぎ澄まされ、闇のオーラをまとった戦斧を振るう。"
translation = "전희── 그렇게 칭송받던 실력은 더욱더 연마되어, 어둠의 오라를 두른 전투 도끼를 휘두른다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "（やめろ……その体は、おまえのものではない……！）"
translation = "（그만둬…… 그 몸은, 네 것이 아니다……!）"

[[dialogue]]
speaker = "unk"
original = "なんだ。なんなのだあれは。あれが本当に私の愛した妻の姿なのか。"
translation = "뭐지. 대체 뭐지 저건. 저것이 정말로 내가 사랑했던 아내의 모습인가."

[[dialogue]]
speaker = "unk"
original = "やめろ──私のマルキアを返してくれ！"
translation = "그만둬── 나의 마르키아를 돌려줘!"

[[dialogue]]
speaker = "unk"
original = "しかし、私がいくら喚こうとも<ruby>異世界<rt>デネブ</rt></ruby>へ手を伸ばすことは敵わなかった。"
translation = "하지만, 내가 아무리 외쳐도 이세계로 손을 뻗는 것은 불가능했다."

[[dialogue]]
speaker = "unk"
original = "やがて仮面の戦姫は街ひとつふたつをゆうに消し飛ばし、殺戮の限りを尽くしてから星空へと消える。"
translation = "이윽고 가면을 쓴 전희는 마을 한두 개를 거뜬히 날려버리고, 살육을 다한 뒤 별이 빛나는 하늘로 사라진다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「……くくっ。はははははっ！」"
translation = "「……크크. 하하하하하!」"

[[dialogue]]
speaker = "unk"
original = "あまりの滑稽さに笑いがこぼれた。"
translation = "너무나도 우스꽝스러움에 웃음이 터져 나왔다."

[[dialogue]]
speaker = "unk"
original = "なんたる末路。なんたる未来！"
translation = "이 무슨 말로인가. 이 무슨 미래인가!"

[[dialogue]]
speaker = "unk"
original = "私はこれまでリクリエを、世の終わりを果たさせまいと抗ってきた。<ruby>辛酸<rt>しんさん</rt></ruby>を<ruby>嘗<rt>な</rt></ruby>めつつも五里霧中を切り開いてきた。"
translation = "나는 지금까지 리크리에를, 세상의 종말을 이루지 못하게 하려고 맞서 왔다. 고생을 겪으면서도 오리무중을 헤쳐 나왔다."

[[dialogue]]
speaker = "unk"
original = "しかし、そんな霧の向こうに見えた景色がこれとは──なんとも大した仕打ちじゃないか。"
translation = "하지만, 그런 안개 너머로 보인 광경이 이것이라니── 참으로 대단한 처사 아닌가."

[[dialogue]]
speaker = "unk"
original = "今まで必死に<ruby>現実<rt>アルタイル</rt></ruby>を守ろうとしていたのが途端に馬鹿らしく思えた。"
translation = "지금까지 필사적으로 현실을 지키려 했던 것이 갑자기 바보같이 느껴졌다."

[[dialogue]]
speaker = "unk"
original = "何より大切だった最愛の人は、女神すら手の届かないところにたやすく消えてしまった。"
translation = "무엇보다 소중했던 가장 사랑하는 사람은, 여신조차 손이 닿지 않는 곳으로 쉽게 사라져 버렸다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「私の妻は──そうか……リクリエの使徒と化してしまったのか。ハハ、なるほどなるほど」"
translation = "「나의 아내는── 그런가…… 리크리에의 사도로 변해 버린 건가. 하하, 과연 그렇군.」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「ならば……つまり、そういうことだな。私が<ruby>この世界<rt>アルタイル</rt></ruby>に生きている限り、彼女との再会は果たされない」"
translation = "「그렇다면…… 즉, 그런 것이로군. 내가 이 세계에 살아있는 한, 그녀와의 재회는 이루어지지 않는다.」"

[[dialogue]]
speaker = "unk"
original = "『……はい』"
translation = "『……예.』"

[[dialogue]]
speaker = "unk"
original = "女神は嘘をつかない。<ruby>総<rt>すべ</rt></ruby>ては真実なのだろう。"
translation = "여신은 거짓말을 하지 않는다. 모든 것은 진실일 것이다."

[[dialogue]]
speaker = "unk"
original = "彼女をもってしても抗えないほどに、リクリエという厄災は強大なのだ。"
translation = "그녀로서는 맞설 수 없을 정도로, 리크리에라는 액재는 강대한 것이다."

[[dialogue]]
speaker = "unk"
original = "世界のリセット──ただそれだけを求めて駆動し続ける無限の歯車。それはもはや、意思ある存在が立ち向かえる相手ではないのかもしれない。"
translation = "세계의 리셋── 오직 그것만을 추구하며 계속 구동하는 무한의 톱니바퀴. 그것은 이제, 의지 있는 존재가 맞설 수 있는 상대가 아닐지도 모른다."

[[dialogue]]
speaker = "unk"
original = "『これから先……同様の事象が起きる可能性は少なくありません。デネブからアルタイルへの逆流という形さえありえるでしょう』"
translation = "『앞으로…… 유사한 현상이 일어날 가능성은 적지 않습니다. 데네브에서 알타이르로의 역류라는 형태조차 있을 수 있겠지요.』"

[[dialogue]]
speaker = "unk"
original = "『ですが、私は今──ベガからの侵蝕を食い止めるのに力のほとんどを費やしてしまっています』"
translation = "『하지만, 저는 지금── 베가로부터의 침식을 막는 데 힘의 대부분을 써 버리고 말았습니다.』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「……ゆえに……アルタイルには……私が必要と、いうわけか」"
translation = "「……그러므로…… 알타이르에는…… 내가 필요하다는, 말이군.」"

[[dialogue]]
speaker = "unk"
original = "『はい。リクリエに抗えるとすれば……勇猛なるジェラルド、あなたしかいません』"
translation = "『예. 리크리에에 맞설 수 있다고 한다면…… 용맹한 제럴드, 당신밖에 없습니다.』"

[[dialogue]]
speaker = "unk"
original = "私はすべてを理解した。"
translation = "나는 모든 것을 이해했다."

[[dialogue]]
speaker = "unk"
original = "この宇宙の裏側も、リクリエという厄災の真実も、そして何より焦がれていた妻の行方も。"
translation = "이 우주의 이면도, 리크리에라는 액재의 진실도, 그리고 무엇보다 갈망하던 아내의 행방도."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「……わかった。なれば、こうだ」"
translation = "「……알겠다. 그렇다면, 이렇다.」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「デネブ──アルタイル──ベガ──それら全ての世界線を束ねることができたならば、私は妻に会える」"
translation = "「데네브── 알타이르── 베가── 그것들 모든 세계선을 하나로 묶을 수 있다면, 나는 아내를 만날 수 있다.」"

[[dialogue]]
speaker = "unk"
original = "『……！？\u3000お待ちなさい、何を考えているのです──』"
translation = "『……!? 기다리세요, 무슨 생각을 하고 계신 겁니까──』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「簡単なことだ──女神テルル。交わらぬはずの世界だろうとなんだろうと、<b>まとめて再創生</b>してしまえばいい」"
translation = "「간단한 일이다── 여신 테루루. 교차하지 않을 세계든 뭐든, <b>모두</b> <b>재창생</b>해 버리면 된다.」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「<b>よりよき新世界</b>を望むのだよ。あいにく、今の世界には救う価値を感じぬのでな」"
translation = "「<ruby>더 나은 신세계<rt>・ ・・ ・・・</rt></ruby>를 바라는 것이다. 공교롭게도, 지금의 세계에는 구할 가치를 느끼지 못해서 말이지.」"

[[dialogue]]
speaker = "unk"
original = "『私も、守護天使も、今ある世界を守るべく全霊を尽くしています。流星の騎士──あなたも平和を願ってここまで来たはずです』"
translation = "『저도, 수호 천사도, 지금 있는 세계를 지키기 위해 전력을 다하고 있습니다. 유성의 기사── 당신도 평화를 바라며 여기까지 왔을 것입니다.』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「買いかぶるなと言ったはずだ。今の私にとって、重要なのは妻の行方のみ」"
translation = "「과대평가하지 말라고 했을 텐데. 지금의 나에게 있어, 중요한 것은 아내의 행방뿐이다.」"

[[dialogue]]
speaker = "unk"
original = "『……！？\u3000やめ──何をしようと──しているのですっ……ジェラルド、セイファート──！』"
translation = "『……!? 그만── 무엇을 하려고── 하는 겁니까…… 제럴드, 세이퍼트──!』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「あなたに残った霊力の半分──確かにいただいた。だが、足りぬ。到底足りぬぞこんなものでは」"
translation = "「당신에게 남은 영력의 절반── 확실히 받았다. 하지만, 부족하다. 도저히 부족해 이런 것으로는.」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「女神テルルよ──<b>貴様に残ったもう片割れの力</b>もよこすがいい！」"
translation = "「여신 테루루여── <ruby>네놈에게 남은 나머지 절반의 힘<rt>・・・・ ・・ ・・・ ・・・ ・</rt></ruby>도 내놓는 게 좋을 것이다!」"

[[dialogue]]
speaker = "unk"
original = "『くっ──あっ……！\u3000よしなさ──あぁぁぁぁぁっっっ…………！！！』"
translation = "『크윽── 앗……! 그만두세── 아아아아아아앗…………!!!』"

[[dialogue]]
speaker = "unk"
original = "神をも恐れぬ私は、女神テルルに残された最後の力を<ruby>簒奪<rt>さんだつ</rt></ruby>した。"
translation = "신조차 두려워하지 않는 나는, 여신 테루루에게 남겨진 마지막 힘을 찬탈했다."

[[dialogue]]
speaker = "unk"
original = "霊妙なる力の根源──なけなしの一滴まで搾り取ったが最後、女神の声が塔に響くことはなかった。"
translation = "신령스러운 힘의 근원── 얼마 남지 않은 한 방울까지 짜낸 끝에, 여신의 목소리가 탑에 울려 퍼지는 일은 없었다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "（もはや後戻りはできない。今の私は、神をも<ruby>弑<rt>しい</rt></ruby>した反逆者だ）"
translation = "（더 이상 되돌릴 수 없다. 지금의 나는, 신조차 시해한 반역자다.）"

[[dialogue]]
speaker = "unk"
original = "確かにこの世界の命運はまだ定まっていない。"
translation = "확실히 이 세계의 운명은 아직 정해지지 않았다."

[[dialogue]]
speaker = "unk"
original = "ベガとは違って、こちらではリクリエの侵攻を防ぐこともありうるのかもしれない。"
translation = "베가와는 달리, 이쪽에서는 리크리에의 침공을 막는 것도 있을 수 있을지도 모른다."

[[dialogue]]
speaker = "unk"
original = "だが、そんな未来は私には不要だった。"
translation = "하지만, 그런 미래는 나에게는 불필요했다."

[[dialogue]]
speaker = "unk"
original = "愛すべき妻が永劫に戻ってこないのなら──こんな世界にしがみつく必要が、どこにあろうか？"
translation = "사랑해야 할 아내가 영원히 돌아오지 않는다면── 이런 세계에 매달릴 필요가, 어디에 있겠는가?"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "（ああ……そうだ。救いの糸は最初から垂らされていた。よりよき世界への刷新──なんと甘美なことか！）"
translation = "（아아…… 그렇다. 구원의 실마리는 처음부터 드리워져 있었다. 더 나은 세계로의 쇄신── 이 얼마나 감미로운가!）"

