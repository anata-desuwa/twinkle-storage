[[dialogue]]
speaker = "unk"
original = "第一次試験を終えた週明け──月曜日。"
translation = "1차 시험을 마친 주 초── 월요일."

[[dialogue]]
speaker = "セナリィ"
original = "「２人とも時間通りに揃いましたわね。では、第二次試験を始めさせていただきます」"
translation = "「둘 다 시간 맞춰 모였군요. 그럼, 2차 시험을 시작하겠습니다.」"

[[dialogue]]
speaker = "セナリィ"
original = "「第二次試験の内容は──資金調達ですわ！」"
translation = "「2차 시험의 내용은── 자금 조달입니다!」"

[[dialogue]]
speaker = "ミウ"
original = "「資金調達、ですか？」"
translation = "「자금 조달, 인가요?」"

[[dialogue]]
speaker = "セナリィ"
original = "「ええ、金は天下の回り物。円滑な会社経営は、潤沢な資金から」"
translation = "「네, 돈은 세상의 도는 것. 원활한 회사 경영은 넉넉한 자금으로부터.」"

[[dialogue]]
speaker = "セナリィ"
original = "「『幸せはお金で買えない』などと綺麗ごとを宣う輩もいますが、お金で買える幸せも数多く存在してます。むしろ、幸せ＝お金までありますわ」"
translation = "「『행복은 돈으로 살 수 없다』 같은 입바른 소리를 지껄이는 부류도 있습니다만, 돈으로 살 수 있는 행복도 수없이 존재한답니다. 오히려 행복=돈이기까지 하죠.」"

[[dialogue]]
speaker = "ミウ"
original = "「セナリィ社長が常々仰っている『悪即善』ですね」"
translation = "「세나리 사장님이 늘 말씀하시는 『악즉선』이군요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「わずかなお金がないばかりに、公園で水道水をすすり、コンビニの廃棄弁当を漁ることで空腹を満たす同業がどれだけいることやら……クゥゥッ……！」"
translation = "「단돈 푼돈이 없어서 공원에서 수돗물을 들이켜고 편의점 폐기 도시락을 뒤져서 허기를 채우는 동업자가 얼마나 많은지…… 크으으윽……!」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「えーと……資金調達をするっていう話ですよね？」"
translation = "「저기…… 자금 조달을 한다는 이야기죠?」"

[[dialogue]]
speaker = "セナリィ"
original = "「ハッ、そうでしたわ。ヒマワリ、あなたには３０万テルスをお渡ししますわ」"
translation = "「핫, 그랬죠. 히마와리, 당신에게는 30만 텔루스를 건네주겠어요.」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「え、お小遣いですか？\u3000やったー！」"
translation = "「에, 용돈인가요? 신난다!」"

[[dialogue]]
speaker = "セナリィ"
original = "「そんなわけがないでしょう！？\u3000これはあなたへの投資です。手段は問いません、この元金を増やして、週末までに返却なさい！」"
translation = "「그럴 리가 없잖아요!? 이것은 당신에 대한 투자입니다. 수단은 묻지 않겠어요, 이 원금을 불려서 주말까지 반납하세요!」"

[[dialogue]]
speaker = "セナリィ"
original = "「いくらでも構いませんが、増えた金額に応じて、採用・不採用を決めさせていただきます」"
translation = "「얼마든 상관없습니다만, 불어난 금액에 따라 채용 여부를 결정하겠습니다.」"

[[dialogue]]
speaker = "セナリィ"
original = "「もちろん、無一文になってしまったら失格。度を越した違法行為も失格ですわ。３０万テルスを失った場合、なんとしてでも取り立てさせてもらいます」"
translation = "「물론 빈털터리가 된다면 실격. 도를 넘은 불법 행위도 실격입니다. 30만 텔루스를 잃었을 경우 수단과 방법을 가리지 않고 징수하겠어요.」"

[[dialogue]]
speaker = "セナリィ"
original = "（こんなチビッ子に３０万テルスもの大金を託すなんて、無茶ぶりが過ぎるけど……フフフ、ゴールデングースの厳しさ、思い知りなさい）"
translation = "(이런 꼬마에게 30만 텔루스라는 큰돈을 맡기다니 무리한 요구가 과하지만…… 후후후, 골든 구스의 엄격함을 깨닫도록 하렴.)"

[[dialogue]]
speaker = "セナリィ"
original = "（もちろん、金額が変動していなければ問題外。子どものお小遣い程度の額が増えていたところで不採用よ）"
translation = "(물론 금액에 변동이 없다면 논외. 아이 용돈 정도의 금액이 늘어난 걸로는 불채용이야.)"

[[dialogue]]
speaker = "ヒマワリ"
original = "「そんな簡単でいいんだー！\u3000やっぱり社長はスゴい上に優しいんですねー！」"
translation = "「그렇게 간단해도 되는 거야! 역시 사장님은 대단하신 데다 상냥하시네요!」"

[[dialogue]]
speaker = "セナリィ"
original = "「フフフ、そう、とても簡単──え？」"
translation = "「후후후, 그래요, 아주 간단── 에?」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「手段は問わないんですよね……それなら、あたし的に手堅いのは、やっぱり株式投資かな。週明けから週末ならタイミング的にもバッチシですし」"
translation = "「수단은 묻지 않는 거죠…… 그렇다면 제 입장에서 확실한 건 역시 주식 투자려나. 주초부터 주말이라면 타이밍도 딱 맞고요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「え、ええ、もちろん構わないけれど……でも、その、株式投資って……とても難しいのではなくて？」"
translation = "「어, 에에, 물론 상관없지만…… 하지만 그, 주식 투자라는 건…… 아주 어렵지 않나요?」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「そんなことないですよー。流れを見てれば、なんとな～くわかりますし。カジノみたいに最終的に胴元が儲かる仕組みでもないですから」"
translation = "「그렇지 않아요ー. 흐름을 보고 있으면 왠지 모르게 알 수 있거든요. 카지노처럼 최종적으로 운영자만 버는 구조도 아니니까요.」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「でも、せっかく増やすんなら３０万テルスじゃちょっとなぁ……社長、あたしの資産も入れてもいいですか？\u3000あたしもリスクを背負った方が、緊張感あって面白いんで！」"
translation = "「하지만 모처럼 불리는 거라면 30만 텔루스는 좀 적은데…… 사장님, 제 자산도 합쳐도 될까요? 저도 리스크를 짊어지는 게 긴장감 있어서 재밌거든요!」"

[[dialogue]]
speaker = "セナリィ"
original = "「え？\u3000ええ、まあ、構いませんけれど……」"
translation = "「에? 에에, 뭐, 상관없습니다만……」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「それじゃ今日から１週間ですね！\u3000頑張るぞー！」"
translation = "「그럼 오늘부터 일주일이네요! 파이팅!」"

[[dialogue]]
speaker = "ミウ"
original = "「ヒマワリちゃん、私に手伝えることがあったら、なんでも言ってね」"
translation = "「히마와리짱, 내가 도울 수 있는 게 있으면 뭐든 말해줘.」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「んー、ポチポチするだけだし、特に手伝ってもらうようなこともないかなー。急に世界的大恐慌が来ないことだけ、祈っといて」"
translation = "「음~ 버튼만 누르는 거라 딱히 도와줄 건 없으려나ー. 갑자기 세계 대공황이 오지 않기만을 기도해줘.」"

[[dialogue]]
speaker = "unk"
original = "そして、ただ静かに、第二次試験〆切の金曜日を迎えた。"
translation = "그리고 조용히, 2차 시험 마감일인 금요일을 맞이했다."

[[dialogue]]
speaker = "セナリィ"
original = "「ヒマワリさん、第二次試験の締め日です。預けたお金はどうなりました？」"
translation = "「히마와리 씨, 2차 시험 마감일입니다. 맡긴 돈은 어떻게 되었죠?」"

[[dialogue]]
speaker = "セナリィ"
original = "（つい勢いで彼女に大金を投資してしまったけど、もし無一文になってたら弊社は大損害よ……？）"
translation = "(무심결에 기세로 그녀에게 거금을 투자해 버렸지만, 만약 빈털터리가 됐다면 우리 회사는 대손해라구……?)"

[[dialogue]]
speaker = "ヒマワリ"
original = "「どーなったかなー……ポチッとな」"
translation = "「어떻게 됐으려나ー…… 클릭.」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「うん、やっぱりねー。今期の決算報告いい感じだったし、午後から伸びると思ったんだー。カタカタカタ、ッターン！」"
translation = "「응, 역시나네ー. 이번 분기 결산 보고가 느낌 좋았고, 오후부터 오를 거라고 생각했거든. 타닥타닥타닥, 탁!」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「はい、セナリィ社長、１３７万テルスで利確しました！\u3000お預かりした３０万テルス、手数料プラス税金を差し引いても３倍以上になりましたよー」"
translation = "「자, 세나리 사장님, 137만 텔루스로 익절했습니다! 맡겨주신 30만 텔루스, 수수료 플러스 세금을 제외해도 3배 이상이 되었어요ー.」"

[[dialogue]]
speaker = "セナリィ"
original = "「はっ？\u3000さ、３倍っ！？\u3000ほ、本当ですわ……３０万が、１００万になってる……！？」"
translation = "「하? 3, 3배!? 저, 정말이군요…… 30만이 100만이 되어 있어……!?」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「最後の最後でちょっぴり下げちゃったのが残念ですけど、ま、上手くいったから結果オーライですよね？」"
translation = "「마지막에 마지막에 조금 떨어져 버린 게 아쉽지만, 뭐, 잘 풀렸으니까 결과적으론 괜찮겠죠?」"

[[dialogue]]
speaker = "セナリィ"
original = "「え、ええ、もちろんですわ……！\u3000あなた、なかなかやりますわね」"
translation = "「어, 에에, 물론이죠……! 당신, 제법 하네요.」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「えへへー、ありがとうございます♪」"
translation = "「에헤헤ー, 감사합니다♪」"

[[dialogue]]
speaker = "セナリィ"
original = "「あの……ミウさん？\u3000ヒマワリさんは、どういった方なんですの……？」"
translation = "「저기…… 미우 씨? 히마와리 씨는 대체 어떤 분이죠……?」"

[[dialogue]]
speaker = "ミウ"
original = "「ヒマワリちゃんのお父さんって、ベンチャー企業の社長さんなんです。それでヒマワリちゃんも小さい頃からお金の扱いや情勢の読み方を叩きこまれたそうで」"
translation = "「히마와리짱의 아버지가 벤처 기업 사장님이시거든요. 그래서 히마와리짱도 어릴 때부터 돈을 다루는 법이나 정세를 읽는 법을 철저히 배웠다고 해요.」"

[[dialogue]]
speaker = "ミウ"
original = "「ヒマワリちゃん、お小遣いを元手に増やした個人資産も結構あるみたいで。もう一生働かなくても食べていけるんじゃないかな」"
translation = "「히마와리짱, 용돈을 밑천으로 불린 개인 자산도 꽤 있는 모양이라. 이제 평생 일하지 않아도 먹고 살 수 있지 않을까요.」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「そこまでじゃないよー。あたしの個人資産なんて、ちょっと贅沢したら、あっという間に使い切っちゃうってー」"
translation = "「그 정도는 아니야ー. 내 개인 자산 같은 건 조금 사치 부리면 순식간에 다 써버릴 거라고ー.」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「それでも将来の旦那様を養ってあげるくらいはできるかな、えへへ♪」"
translation = "「그래도 장래의 남편분을 먹여 살릴 정도는 할 수 있으려나, 에헤헤♪」"

[[dialogue]]
speaker = "セナリィ"
original = "（そんな資産を持った子が、どうしてゴールデングースへ……？\u3000危険な仕事で一攫千金を夢見ているわけではないの……？）"
translation = "(그런 자산을 가진 아이가 어째서 골든 구스에……? 위험한 일로 일확천금을 꿈꾸는 게 아니란 말인가……?)"

[[dialogue]]
speaker = "ヒマワリ"
original = "「それでセナリィ社長！\u3000あたしたちの試験結果は！？」"
translation = "「그래서 세나리 사장님! 저희 시험 결과는요!?」"

[[dialogue]]
speaker = "ミウ"
original = "「合格ですか！？\u3000不合格ですか！？」"
translation = "「합격인가요!? 불합격인가요!?」"

[[dialogue]]
speaker = "セナリィ"
original = "（ああっ、もう！\u3000そんなキラキラした目で見ないで！）"
translation = "(아앗, 정말! 그런 반짝이는 눈으로 보지 마!)"

[[dialogue]]
speaker = "セナリィ"
original = "（難癖をつけることもできるけど……１００点満点以上の結果を叩き出したというのに、そんな不正は私の流儀に反するわ）"
translation = "(트집을 잡을 수도 있겠지만…… 100점 만점 이상의 결과를 냈는데 그런 부정은 내 방식에 어긋나.)"

[[dialogue]]
speaker = "セナリィ"
original = "「し、仕方ないですわね。２人とも文句なしの合格です。まずは見習いとして雇って差し上げますわ！」"
translation = "「시, 어쩔 수 없군요. 둘 다 두말할 것 없는 합격입니다. 우선 견습으로서 채용해 드리겠어요!」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「セナリィ社長の元で働けるー！\u3000やったね、ミウ！」"
translation = "「세나리 사장님 밑에서 일할 수 있어ー! 잘 됐다, 미우!」"

[[dialogue]]
speaker = "ミウ"
original = "「ありがとうございます、社長！\u3000やったね、ヒマワリちゃん！」"
translation = "「감사합니다, 사장님! 잘 됐네, 히마와리짱!」"

[[dialogue]]
speaker = "unk"
original = "こうして本日付けで、秘密結社ゴールデングースの社員は今までの３倍に増えたのであった。"
translation = "이렇게 오늘 자로 비밀 결사 골든 구스의 사원은 지금까지의 3배로 늘어난 것이었다."

