[[dialogue]]
speaker = "unk"
original = "星徒会室で仕事をしていると、突然スマホから呼び出し音が鳴った。"
translation = "성도회실에서 일을 하고 있는데 갑자기 스마트폰에서 호출음이 울렸다."

[[dialogue]]
speaker = "クロト"
original = "「はい、もしもし？」"
translation = "「네, 여보세요?」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "『魔王ちゃん、大ピンチだ！』"
translation = "『마왕 짱, 대위기야!』"

[[dialogue]]
speaker = "クロト"
original = "「え……どうしたの？」"
translation = "「어…… 무슨 일이야?」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "『可愛い彼女からのエマージェンシーコールだよ。急いでネビュラ基地のアタシの部屋まで来て欲しいんだ』"
translation = "『귀여운 여자친구의 이머전시 콜이야. 급히 네뷸라 기지의 내 방까지 와줬으면 해.』"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "『お願い……もう、長くはもたないかもしれない……』"
translation = "『부탁이야…… 이제 오래 못 버틸지도 몰라……』"

[[dialogue]]
speaker = "クロト"
original = "「ツェツィ！？」"
translation = "「체칠!?」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "『基地に入ってから部屋までの道順は送っておいたよ。その通りに進めば、誰にも見つからずにたどり着けるはずだから』"
translation = "『기지에 들어와서 방까지 오는 경로는 보내뒀어. 그대로 오면 아무에게도 들키지 않고 도착할 수 있을 거야.』"

[[dialogue]]
speaker = "クロト"
original = "「誰にも見つからずって、基地で今、何が起きてるの！」"
translation = "「아무에게도 들키지 않다니, 기지에서 지금 무슨 일이 일어나고 있는 거야!」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "『助けに来てくれるって信じてるからね、魔王ちゃん！』"
translation = "『구하러 와줄 거라 믿을게, 마왕 짱!』"

[[dialogue]]
speaker = "クロト"
original = "「あ……切れた」"
translation = "「아…… 끊겼다.」"

[[dialogue]]
speaker = "unk"
original = "どういう事なんだろうと首を傾げつつも、急いでネビュラの基地へと向かう。"
translation = "무슨 일일까 고개를 갸우뚱하면서도 서둘러 네뷸라 기지로 향한다."

[[dialogue]]
speaker = "unk"
original = "基地の様子は静かなもので、特に何か事件が起こった様子もなかったが、用心しながらツェツィに指示された通りに通路を進んでいく。"
translation = "기지 분위기는 조용했고 딱히 사건이 일어난 기색도 없었지만 조심하며 체칠이 지시한 대로 통로를 나아간다."

[[dialogue]]
speaker = "unk"
original = "ようやくツェツィの部屋にたどり着くと、俺を待っていたのは満面の笑みを浮かべたツェツィだった。"
translation = "마침내 체칠의 방에 도착하자 나를 기다리고 있던 건 만면에 미소를 띤 체칠이었다."

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「よく来てくれたね。じゃあ早速始めようか<emoji=heart04>」"
translation = "「잘 와줬어. 그럼 바로 시작할까❤️」"

[[dialogue]]
speaker = "クロト"
original = "「ツェツィ……もしかして、これが目的で呼び出したの？」"
translation = "「체칠…… 설마 이것 때문에 불러낸 거야?」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「なんだろうねぇ、その呆れた様な口ぶりは。唐突に男女の交わりについて研究したくなっただけなのに」"
translation = "「글쎄, 그 어이없다는 말투는 뭐야. 갑자기 남녀의 성교에 대해 연구하고 싶어졌을 뿐인데.」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「いいかい？\u3000ずっと机に向かっていたらムラムラが抑えきれなくなった、とかでは断じてないよ」"
translation = "「알겠어? 계속 책상 앞에만 있었더니 욕구가 억눌러지지 않게 됐다거나 하는 건 결단코 아니야.」"

[[dialogue]]
speaker = "クロト"
original = "「何事かと思って飛んできたのに……」"
translation = "「무슨 일인가 해서 달려왔는데……」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「不満がありそうだねぇ。でも、キミのこちらはちゃんと研究の準備が整ってるみたいだけど？」"
translation = "「불만이 많은 모양이네. 하지만 너의 여기는 제대로 연구 준비가 되어 있는 것 같은데?」"

[[dialogue]]
speaker = "クロト"
original = "「うっ……」"
translation = "「으윽……」"

[[dialogue]]
speaker = "unk"
original = "おま○こに擦りあてているものを、優しくなぞり上げられる。"
translation = "보지에 문지르고 있는 것을 부드럽게 훑어 올린다."

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「急に呼び出したから、もしかしたらタイミングが悪くて元気がない、なんてこともあるかと思ったけど」"
translation = "「갑자기 불러서 혹시 타이밍이 안 좋아 기운이 없거나 하는 일도 있을까 생각했지만.」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「そんな心配は全然なさそうだね……<emoji=heart04>」"
translation = "「그런 걱정은 전혀 필요 없을 것 같네……❤️」"

[[dialogue]]
speaker = "unk"
original = "ツェツィの指先が裏筋を這いあがるたび、背筋が震えるような快感が走る。"
translation = "체칠의 손가락 끝이 요도 능선을 타고 올라올 때마다 등줄기가 떨리는 쾌감이 달린다."

[[dialogue]]
speaker = "unk"
original = "興奮を煽り立てられるたびに、下半身のそれはどんどん硬く大きくなっていった。"
translation = "흥분이 고조될 때마다 하반신의 그것은 점점 단단하고 크게 부풀어 올랐다."

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「ペニス……いや、こういう状況でその言い方は味気ないかな……」"
translation = "「페니스…… 아니, 이런 상황에서 그런 말은 운치 없으려나……」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「魔王ちゃんのチ○ポ、もうすっかりバキバキじゃないのさ。さすがは魔王ちゃんだねえ<emoji=heart04>」"
translation = "「마왕짱의 자지, 벌써 완전히 발기했잖아. 역시 마왕짱이네 <emoji=heart04>」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「はぁあ……かたぁい……<emoji=heart04>\u3000魔王チ○ポ、アタシのこと求めて、すっごく興奮してる……<emoji=heart04>」"
translation = "「하아아…… 딱딱해…… <emoji=heart04> 마왕 자지, 나를 원하면서 엄청 흥분하고 있어…… <emoji=heart04>」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「ふふ……ちょっと触っただけなのにビクビクさせて……キミはそれで研究なんて出来るの？」"
translation = "「후후…… 살짝 만졌을 뿐인데 움찔거리게 만들고…… 너는 그래서 연구 같은 걸 할 수 있겠어?」"

[[dialogue]]
speaker = "クロト"
original = "「わ、分かってるだろ……こんな挑発されて……理性的でいるなんて無理だ」"
translation = "「아, 알고 있잖아…… 이런 도발을 당하고…… 이성적으로 있는 건 무리다」"

[[dialogue]]
speaker = "unk"
original = "今すぐにでも、ツェツィのギュウギュウに締まった膣内にペニスをねじ込んで、ため込んだ子種を吐き出したい。"
translation = "당장이라도 체칠리에의 꽉 조이는 질 안에 페니스를 처박고, 쌓아온 씨앗을 쏟아내고 싶다."

[[dialogue]]
speaker = "unk"
original = "そんな欲望が脳内で渦巻いて爆発しそうになっている。"
translation = "그런 욕망이 뇌내에서 소용돌이치며 폭발할 것만 같다."

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「仕方ないねぇ。分析は私がするから……キミは思うままにアタシを求めてくれればいいよ……」"
translation = "「어쩔 수 없네. 분석은 내가 할 테니까…… 너는 마음 가는 대로 나를 원해주면 돼……」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「それじゃ今日も、より満足度の高い性交について……２人で研究を深めていこーね……<emoji=heart04>」"
translation = "「그럼 오늘도, 보다 만족도 높은 성교에 대해서…… 둘이서 연구를 심화해 보자…… <emoji=heart04>」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「んんっ……ぁあああんっっっ！！」"
translation = "「응읏…… 아아아앙!!!」"

[[dialogue]]
speaker = "unk"
original = "脚を持ち上げられてぱっくり開いたツェツィのおま○こにペニスをあてがうと、そのまま一気に奥まで刺し貫く。"
translation = "다리를 들어 올려 쩍 벌어진 체칠리에의 보지에 페니스를 갖다 대고는, 그대로 단숨에 안쪽까지 꿰뚫는다."

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「はぁ、ん……いきなり、奥まで入れちゃうなんて……アタシの準備が整っていなかったらどうするの？」"
translation = "「하아, 응…… 갑자기 안쪽까지 넣어버리다니…… 내 준비가 갖춰지지 않았으면 어쩌려고?」"

[[dialogue]]
speaker = "クロト"
original = "「準備が整ってない、なんてことはないよ……こんなにおま○こをトロトロに濡らしちゃって……」"
translation = "「준비가 안 됐다니, 그럴 리 없잖아…… 이렇게 보지를 걸쭉하게 적셔놓고선……」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「んぅ……そうだね……前戯されるまでもなく……キミのチ○ポを受け入れる準備はできてる……」"
translation = "「응으…… 그렇네…… 전희를 할 것도 없이…… 네 자지를 받아들일 준비는 돼 있어……」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「それに……あっ、んっ……<emoji=heart04>\u3000いきなり奥の方を突かれるのも……いいかも……<emoji=heart04>\u3000また新しい発見があったねぇ……」"
translation = "「거기에…… 앗, 응…… <emoji=heart04> 갑자기 깊숙한 곳을 찔리는 것도…… 좋을지도…… <emoji=heart04> 또 새로운 발견이네……」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「はぁ……ぁ……はぁ……いいよ……そのまま、続けて……好きに攻めてくれて……」"
translation = "「하아…… 아…… 하아…… 좋아…… 그대로 계속해…… 마음껏 공격해줘……」"

[[dialogue]]
speaker = "unk"
original = "深く、だけどゆっくりと、先端を膣奥に押し当てるように揺さぶり動かす。"
translation = "깊게, 하지만 천천히, 끝부분을 질 안쪽으로 밀어 넣듯이 흔들어 움직인다."

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「あっ、あ……いい……<emoji=heart04>\u3000キミのチ○ポを受けて入れて、子宮が悦んでるのがわかるよ……」"
translation = "「앗, 아…… 좋아…… <emoji=heart04> 네 자지를 받아들이고, 자궁이 기뻐하는 게 느껴져……」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「チ○ポの先の膨らんだところが、アタシのきもちいいところと擦れて……んんんっ……<emoji=heart04>」"
translation = "「자지 끝의 부푼 부분이, 내 기분 좋은 곳과 비벼져서…… 응응읏…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "お尻の形が歪むほど身体を押し付けるたび、ツェツィのおま○こが反応する。"
translation = "엉덩이 모양이 일그러질 정도로 몸을 밀착시킬 때마다, 체칠리에의 보지가 반응한다."

[[dialogue]]
speaker = "unk"
original = "敏感な反応から、そこが弱いのだということはすぐに察することが出来た。"
translation = "민감한 반응을 보아, 그곳이 약점이라는 것을 금방 눈치챌 수 있었다."

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「また……見つけられちゃったみたいだね……」"
translation = "「또…… 들켜버린 모양이네……」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「んっ、あ……んぅ……次々と、アタシの悦ぶところを見つけて……キミは本当に、熱心な研究員だよ……」"
translation = "「응, 아…… 응으…… 차례차례 내 기분 좋은 곳을 찾아내고…… 너는 정말로 열성적인 연구원이야……」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「はぁ、はぁ、あ……んぅ……<emoji=heart04>\u3000その調子で……もっとアタシの身体を調べて……明らかにしていってくれ……」"
translation = "「하아, 하아, 아…… 응으…… <emoji=heart04> 그 기세로…… 좀 더 내 몸을 조사해서…… 밝혀내 줘……」"

[[dialogue]]
speaker = "クロト"
original = "「ツェツィがこんなに……性欲旺盛になるなんて思わなかったよ……」"
translation = "「체칠리에가 이렇게…… 성욕이 왕성해질 줄은 몰랐어……」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「最初は好奇心からだったけど……何事も試してみるものだね……」"
translation = "「처음에는 호기심 때문이었지만…… 뭐든 시도해 볼 일이네……」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「キミと、キミのチ○ポは……んんっ……あっという間に、アタシを虜にしてしまった……」"
translation = "「너와, 네 자지는…… 응읏…… 순식간에 나를 포로로 만들어 버렸어……」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「たはは……何なの、かな、キミのこれ……何か不思議な力でも宿ってるみたいだよ……んんっ！」"
translation = "「타하하…… 뭐야, 이건, 네 이거…… 뭔가 신기한 힘이라도 깃들어 있는 것 같아…… 응읏!」"

[[dialogue]]
speaker = "クロト"
original = "「それを言うなら、ツェツィのおま○こだって……魔力を秘めてるみたいに、俺を虜にして放さないだろ……」"
translation = "「그렇게 따지면 체칠리에의 보지도…… 마력을 숨긴 것처럼 나를 사로잡아 놓아주질 않잖아……」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「魔力じゃないよ……んっ、あ……身体が自然に反応して……キミを気持ちよくしようとしてるだけ……」"
translation = "「마력이 아니야…… 응, 아…… 몸이 자연스럽게 반응해서…… 너를 기분 좋게 해주려는 것뿐……」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「これは、欲しいという気持ちかな<emoji=heart04>\u3000キミとの交わりの証を求める……女としての欲望……」"
translation = "「이건 갖고 싶다는 마음일까 <emoji=heart04> 너와의 교미의 증표를 원하는…… 여자로서의 욕망……」"

[[dialogue]]
speaker = "クロト"
original = "「ツェツィは、欲しいの……？」"
translation = "「체칠리에는, 원해……?」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「欲しいよ、欲しいに決まってる……」"
translation = "「원해, 원하는 게 당연하잖아……」"

[[dialogue]]
speaker = "クロト"
original = "「く……ツェツィのおま○こ、今、すごく締まった……」"
translation = "「큭…… 체칠리에의 보지, 지금 엄청나게 조였어……」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「キミが……んんぅ……切なくなるようなこと、言わせるからじゃないか……」"
translation = "「네가…… 응응으…… 애절해지는 소리를 하게 만드니까 그렇지……」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「はぁ……ぁ……言葉だけで、アタシの身体はこんなに悦んでしまう……つくづく不思議だね……んんんっ……」"
translation = "「하아…… 아…… 말뿐인데도 내 몸은 이렇게 기뻐하고 말아…… 참으로 신기하네…… 응응응……」"

[[dialogue]]
speaker = "クロト"
original = "「あげるよ、ツェツィの欲しがってるもの……この可愛いお腹のなかにたっぷり注いであげる」"
translation = "「줄게, 체칠리에가 원하는 것…… 이 귀여운 배 속에 듬뿍 부어줄게」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「あぁあ、すごい……子宮が疼いてしかたないよ……魔王ちゃん……<emoji=heart04>」"
translation = "「아아아, 굉장해…… 자궁이 욱신거려서 참을 수가 없어…… 마왕짱…… <emoji=heart04>」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「貰ってもいい？\u3000キミの濃厚な、精液を……んんっ……アタシの、ここに……壊れるくらい注いで……」"
translation = "「받아도 돼? 네 농후한 정액을…… 응읏…… 나의 여기에…… 망가질 정도로 부어줘……」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「あぁあっ！\u3000んんっ、あ、ああっ……んんぅ……ぁ……あああっ……<emoji=heart04>」"
translation = "「아아앗! 응읏, 아, 아앗…… 응응으…… 아…… 아아앗…… <emoji=heart04>」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「はぁ、あ……んぅ……激しい、ね……<emoji=heart04>\u3000んんっ、あっ、ああっ……普段は、優しすぎるくらい、なのに……んんっ……！！」"
translation = "「하아, 아…… 응으…… 격렬하네…… <emoji=heart04> 응읏, 앗, 아앗…… 평소엔 너무 상냥할 정도인데…… 응읏……!!」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「いいよ……アタシの、身体も……悦んでる……<emoji=heart04>\u3000淫液が、洪水みたいにあふれてくるの……止められない……あ、ああっ<emoji=heart04>」"
translation = "「좋아…… 내 몸도…… 기뻐하고 있어…… <emoji=heart04> 음액이 홍수처럼 넘쳐흘러…… 멈출 수 없어…… 아, 아앗 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "暴力的なまでに、強く速く身体を打ち当てる。"
translation = "폭력적일 정도로 강하고 빠르게 몸을 부딪친다."

[[dialogue]]
speaker = "unk"
original = "肉と肉が衝突し快音を鳴らす。同時に結合部で粘性を帯びた水音が響く。"
translation = "살과 살이 충돌하며 쾌음을 울린다. 동시에 결합부에서 점성을 띤 물소리가 울려 퍼진다."

[[dialogue]]
speaker = "unk"
original = "ツェツィの中に欲望を吐き出したい、そんな熱が身体の芯から沸き立ってくる。"
translation = "체칠리에의 안에 욕망을 쏟아내고 싶다, 그런 열기가 몸속 깊은 곳에서부터 끓어오른다."

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「あっ、あっ、あ、んんっ、あぁあっ……あ、あああっ！！」"
translation = "「앗, 앗, 아, 응읏, 아아앗…… 아, 아아앗!!」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「本意、だね……んあっ、あ……<emoji=heart04>\u3000アタシの、こと……本気で、孕ませようと、してるっ！」"
translation = "「본심이네…… 응앗, 아…… <emoji=heart04> 나를…… 진심으로 임신시키려고 하고 있어!」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「んんっ、あっ、あ……はぁ、あ……幸い、アタシは、戦闘要員じゃ、ない……んんっ、ん、はぁっ<emoji=heart04>」"
translation = "「응읏, 앗, 아…… 하아, 아…… 다행히 나는 전투 요원이 아니니까…… 응읏, 응, 하앗 <emoji=heart04>」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「研究員、だから……ああっ、ん、はぁっ……でき、ちゃっても……大きな問題には、ならないよね……ああうっ！！」"
translation = "「연구원이니까…… 아앗, 응, 하앗…… 생겨버려도…… 큰 문제는 안 되겠지…… 아아웃!!」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「お腹、大きくなってても、んんっ！\u3000研究は、できる、から……んんっ、あ、ああっ！」"
translation = "「배가 불러와도, 응읏! 연구는 할 수 있으니까…… 응읏, 아, 아앗!」"

[[dialogue]]
speaker = "クロト"
original = "「いいの……本当に……っ……！」"
translation = "「괜찮은 거야…… 정말로……!」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「魔王ちゃんは、欲しくない……？\u3000んんっ、うっ、は……キミと……ああっ……アタシ、のっ……交わりの、証っ……あ、ああっ<emoji=heart04>」"
translation = "「마왕짱은 원하지 않아……? 응읏, 윽, 하…… 너와…… 아앗…… 나의…… 교미의 증표…… 아, 아앗 <emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「それは、欲しい……俺だって……！」"
translation = "「그건 원해…… 나도……!」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「だったら、絶対に……あっ、あああっ……孕ませてっ<emoji=heart04>\u3000容赦なく、んんっ、あ、魔王チ○ポで、アタシのなかを蹂躙してっ<emoji=heart04>」"
translation = "「그렇다면 절대로…… 앗, 아아앗…… 임신시켜줘 <emoji=heart04> 용서 없이, 응읏, 아, 마왕 자지로 내 안을 유린해줘 <emoji=heart04>」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「ああっ、あっ、あ<emoji=heart04>\u3000んんっ、はぁっ、あっ<emoji=heart04>\u3000濃厚な、精液を……アタシに……あああっ！！」"
translation = "「아앗, 앗, 아 <emoji=heart04> 응읏, 하앗, 앗 <emoji=heart04> 농후한 정액을…… 나에게…… 아아앗!!」"

[[dialogue]]
speaker = "unk"
original = "ツェツィの言葉にピストンを更に速めると、せがむように膣内がペニスに絡みついてくる。"
translation = "체칠리에의 말에 피스톤을 더욱 빠르게 하자, 조르듯이 질 내부가 페니스를 옭아맨다."

[[dialogue]]
speaker = "クロト"
original = "「っ……ぁ……ツェツィ、すごく……締め付けて、来てる……」"
translation = "「윽…… 아…… 체칠리에, 엄청…… 조여오고 있어……」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「んっ、あっ……ああ、あ……<emoji=heart04>\u3000キミの、チ○ポが……気持ちよすぎるからっ！」"
translation = "「응읏, 앗…… 아아, 아…… <emoji=heart04> 네 자지가…… 너무 기분 좋으니까!」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「はぁっ、あっ、はぁっ……すごい、満たされてる……アタシ、んっ、あっ……んんっ、あ、あああっ！！」"
translation = "「하앗, 앗, 하앗…… 엄청 충만해져…… 나, 응읏, 앗…… 응응읏, 아, 아아앗!!」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「どうして、こんなっ……気持ちよく、なれるのか……ああっ、あ、あああっ！\u3000わからなっ、んん、あ、ああああっ！！！」"
translation = "「어째서 이렇게…… 기분 좋아질 수 있는 건지…… 아앗, 아, 아아앗! 모르겠어, 응응, 아, 아아아앗!!!」"

[[dialogue]]
speaker = "unk"
original = "感じすぎて、ツェツィももう、研究どころではないようだった。"
translation = "너무 느낀 나머지 체칠리에도 이제 연구는 뒷전인 모양이었다."

[[dialogue]]
speaker = "unk"
original = "嬌声をあげながら、押し寄せてくる快感に身を任せている。"
translation = "교성을 지르며 밀려오는 쾌감에 몸을 맡기고 있다."

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「あっ、あ、んんっ、ん、あ、ああっ<emoji=heart04>\u3000ん、あ……はあっ、あ、や、んんっ、あっ、あ、あ、あああっ！！」"
translation = "「앗, 아, 응읏, 응, 아, 아앗 <emoji=heart04> 응, 아…… 하앗, 아, 야, 응읏, 앗, 아, 아, 아아앗!!」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「あああっ<emoji=heart04>\u3000あっ、あっ<emoji=heart04>\u3000んぁ、ん、ああっ<emoji=heart04>\u3000は、ああっ<emoji=heart04>\u3000んん、あ、ああっ……あ、あ、あ、あぁああんっ<emoji=heart04>」"
translation = "「아아앗 <emoji=heart04> 앗, 앗 <emoji=heart04> 응아, 응, 아아앗 <emoji=heart04> 하, 아아앗 <emoji=heart04> 응응, 아, 아아앗…… 아, 아, 아, 아아앙 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ツェツィの声の高まりに乗じるように、俺の下半身の熱も上がってくる。"
translation = "체칠리에의 목소리가 고조되는 것에 가세하듯, 내 하반신의 열기도 달아오른다."

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「や、んんぅ、あっ、だ、めぇ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000ん、ぅ、もう、んんっ、いき、そうっ<emoji=heart04>\u3000んんっ、あ、あああっ！！！」"
translation = "「야, 응응으, 앗, 안 돼 <emoji=heart04> 응응읏 <emoji=heart04> 응, 으, 이제, 응응읏, 갈 것 같아 <emoji=heart04> 응응읏, 아, 아아앗!!!」"

[[dialogue]]
speaker = "クロト"
original = "「っ……ツェツィ……！\u3000俺も、このまま……ツェツィの中にっ……！！」"
translation = "「윽…… 체칠리에……! 나도 이대로…… 체칠리에의 안에……!!」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「んっ、うんっ、うんっ、来てっ、来てっ、来てぇっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000アタシの、なかっ、いっぱいにしてっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응, 응, 응, 와줘, 와줘, 와줘 <emoji=heart04><emoji=heart04><emoji=heart04> 내 안을 가득 채워줘 <emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「ああっ、あっ、ん、あ、あああっ<emoji=heart04>\u3000あぁあ、ん、あ、あ、ああっ<emoji=heart04>\u3000ん、や、は、ああっ、く、っ……い、く、っん、おま○こ、いくぅっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아앗, 앗, 응, 아, 아아앗 <emoji=heart04> 아아아, 응, 아, 아, 아앗 <emoji=heart04> 응, 야, 하, 아아앗, 윽, 윽…… 가, 가, 응, 보지 가버려 <emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「あ……んんっ、あっ、あっ、あ、あ、んぅう<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000あ、ああっ、あ<emoji=heart04>\u3000……あ、あああっ、あ、ああああ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아…… 응응읏, 앗, 앗, 아, 아, 응으으 <emoji=heart04> 응응읏 <emoji=heart04> 아, 아아앗, 아 <emoji=heart04> ……아, 아아앗, 아, 아아아아…… <emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「あ゛っ──あ、ぁああああああああああああああああっ！！！！！！！」"
translation = "「아아── 아, 아아아아아아아아아아아아아아앗!!!!!!!」"

[[dialogue]]
speaker = "unk"
original = "絶頂の叫びと共に、ツェツィの細い身体が反り上がる。"
translation = "절정의 비명과 함께 체칠리에의 가느다란 몸이 휘어진다."

[[dialogue]]
speaker = "unk"
original = "膣内がギュッとすぼまって、下半身に渦巻いた欲望を一気に吸い上げてくる。"
translation = "질 내부가 꽉 오므라들며 하반신에 소용돌이치던 욕망을 단숨에 빨아 올린다."

[[dialogue]]
speaker = "unk"
original = "その吸引に任せて思いっきり、ツェツィの中に真っ白な子種を解き放った。"
translation = "그 흡인력에 맡겨 온 힘을 다해 체칠리에의 안에 새하얀 씨앗을 해방했다."

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「あぁあっ、あっ、んんっ、う……ぁ、あああっ、ああ……んんんっ！！\u3000んんっ、あっ、ふぁ、あ、ああああっ……！！」"
translation = "「아아앗, 앗, 응응읏, 우…… 아, 아아앗, 아아…… 응응응!! 응읏, 앗, 하아, 아, 아아아앗……!!」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「アタシの、なかで……チ○ポ……まだ、ずっと……びくびくいってて……んんっ……！」"
translation = "「내 안에서…… 자지가…… 아직도 계속…… 움찔움찔거려서…… 응읏……!」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「熱いの……ずっと、ずっと……注がれ続けてるぅ……んんぅ……はぁああぁ……気持ち、いぃいよぉ……んんんっ……」"
translation = "「뜨거워…… 계속, 계속…… 쏟아지고 있어…… 응응으…… 하아아아…… 기분 좋아…… 응응응……」"

[[dialogue]]
speaker = "unk"
original = "俺のペニスの脈動を感じながら、ツェツィはビクンビクンと全身を震わせる。"
translation = "내 페니스의 맥동을 느끼며 체칠리에는 움찔움찔 전신을 떤다."

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「はぁ、ん……はぁああ……んぅ……はぁ……はぁ……」"
translation = "「하아, 응…… 하아아아…… 응으…… 하아…… 하아……」"

[[dialogue]]
speaker = "unk"
original = "乱れた呼吸が少しずつ落ち着くと共に、ツェツィの身体から徐々に力が抜けてきた。"
translation = "거친 호흡이 조금씩 진정되면서 체칠리에의 몸에서 서서히 힘이 빠졌다."

[[dialogue]]
speaker = "unk"
original = "俺は絶頂時の体勢から身を固め、彼女が崩れ落ちないようにしっかりと支える。"
translation = "나는 절정 때의 자세에서 몸을 굳혀 그녀가 쓰러지지 않도록 단단히 지탱한다."

[[dialogue]]
speaker = "クロト"
original = "「途中からツェツィも研究そっちのけになっちゃってたな」"
translation = "「도중부터는 체칠리에 너도 연구는 뒷전이었지」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「実はそれは建前で、普通にキミとセックスしたかっただけなのだよ」"
translation = "「사실 그건 핑계고, 그냥 너랑 섹스하고 싶었을 뿐이라네」"

[[dialogue]]
speaker = "クロト"
original = "「言っちゃった……分かってたけど」"
translation = "「말해버렸네…… 알고 있었지만」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「けれど思いっきり気持ちよくしてもらったおかげで、もやもやしていた頭の中がすっきりしたよ」"
translation = "「그렇지만 마음껏 기분 좋게 해준 덕분에, 답답하던 머릿속이 시원해졌어」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「おかげでまた研究に没頭できそうだ、ありがとう」"
translation = "「덕분에 다시 연구에 몰두할 수 있겠어, 고마워」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「行為の時にアドレナリンが出るからかな？\u3000キミとした後はいいアイデアが浮かぶことが多いんだ」"
translation = "「행위 때 아드레날린이 나와서 그런가? 너랑 하고 나면 좋은 아이디어가 떠오를 때가 많거든」"

[[dialogue]]
speaker = "クロト"
original = "「お役に立てているようで何よりだよ」"
translation = "「도움이 된 것 같아 다행이네」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「今後もムラムラしたらキミのことを、こんな風に呼ぶかもしれない」"
translation = "「앞으로도 하고 싶어지면 너를 이런 식으로 부를지도 몰라」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「その時はすぐに駆け付けてくれるかな？」"
translation = "「그때는 바로 달려와 줄 거지?」"

[[dialogue]]
speaker = "クロト"
original = "「……忙しくなければね」"
translation = "「……바쁘지 않다면 말이야」"

[[dialogue]]
speaker = "unk"
original = "素っ気なく返しつつも、またツェツィに呼び出してもらえることを、密かに期待してしまうのだった。"
translation = "무심하게 대답하면서도 다시 체칠리에가 불러주기를 남몰래 기대하게 되는 것이었다."

