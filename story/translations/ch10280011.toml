[[dialogue]]
speaker = "unk"
original = "第１話,その可憐な美少女は……,P"
translation = "제1화, 그 가련한 미소녀는……, P"

[[dialogue]]
speaker = "unk"
original = "ある日の放課後、マトイと星徒会の仕事をしていた時のこと――"
translation = "어느 날 방과 후, 마토이와 성도회 일을 하고 있었을 때의 일──"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「お仕事中に、失礼致します」"
translation = "「업무 중에 실례하겠습니다」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「えっ、トマル！？\u3000こっちに来るなんて、一体どうしたの？」"
translation = "「엣, 토마루!? 여기에 오다니 도대체 무슨 일이야?」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「姉さまが珍しく忘れ物をされていたので、届けにきたんです」"
translation = "「누님이 드물게 잊으신 물건이 있어서 전해드리러 왔어요」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「う～ん、忘れ物がないのは私の数少ない長所だったんだけどなぁ……。あっ、それってお母さんが今朝渡すって言ってたやつ」"
translation = "「으음, 잊어버리는 물건이 없는 게 내 몇 안 되는 장점이었는데…… 아, 그거 엄마가 오늘 아침에 준다고 했던 거네」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「はい。正確には母さまが渡すのを忘れてたんですけど、星徒会の皆さまと食べて欲しいと言っていたお菓子セットです」"
translation = "「네. 정확히는 어머니께서 주시는 걸 잊으셨던 거지만, 성도회 분들과 함께 드시라고 하셨던 과자 세트예요」"

[[dialogue]]
speaker = "unk"
original = "初めまして。マトイのご家族の方かな？"
translation = "처음 뵙겠습니다. 마토이의 가족분인가요?"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「ご挨拶が遅れて申し訳ございません、新しい会長さま。私は――あっ……！」"
translation = "「인사가 늦어서 죄송합니다, 새로운 회장님. 저는── 앗……!」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「あなた様は、あの時の……！」"
translation = "「당신은 그때의……!」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "（２年程前に、親戚の神社で行われた地域振興イベントの時、巫女をやっていた私は、迷子の子を見つけて対応することになりました）"
translation = "（2년 전쯤에 친척 신사에서 열린 지역 진흥 이벤트 때, 무녀를 하고 있던 저는 미아를 발견해 대응하게 되었습니다）"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "（しかし、保護者の方はなかなか見つからず、その子も泣き出してしまって……その場に居合わせた大人の男性にも、泣き止ませろと怒鳴られてしまいました）"
translation = "（하지만 보호자는 좀처럼 나타나지 않고 그 아이도 울기 시작해서…… 그 자리에 있던 성인 남성에게도 울음 그치게 하라고 호통을 들었습니다）"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "（そんな時、パニックになっている私の前に現れたのが――）"
translation = "（그런 때, 패닉에 빠진 제 앞에 나타난 것이──）"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "（その会場でイベント設営のバイトをなさっていた、会長さまでした）"
translation = "（그 회장에서 이벤트 설치 아르바이트를 하고 계셨던 회장님이었습니다）"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "（あなた様は、子供を優しく泣き止ませ、怒鳴っていた男性もなだめて、その場の雰囲気を変えて下さいました）"
translation = "（당신은 아이를 상냥하게 달래 울음을 그치게 하고, 호통치던 남성도 진정시켜 그 자리의 분위기를 바꿔 주셨습니다）"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "（そして迷子の保護者様も一緒に探して下さって、私が助けて頂いたお礼を伝えると……）"
translation = "（그리고 미아의 보호자도 함께 찾아 주셔서 제가 도움받은 감사를 전하자……）"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "（困っている人が居たら、お互い様だよ、と優しく微笑んで見せたのです。その言葉は、心からの本音だと分かる、それはそれは素敵な笑顔で――）"
translation = "（곤란한 사람이 있으면 서로 돕는 거야, 라며 상냥하게 미소 지어 보이셨습니다. 그 말은 진심에서 우러나온 본심이라는 걸 알 수 있는, 정말이지 멋진 미소로──）"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "（私はその時に、初めて恋というものを知ったのです）"
translation = "（저는 그때 처음으로 사랑이라는 것을 알게 되었습니다）"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "（初めて知る感情に戸惑って、その場では連絡先を聞くことも、名前を聞くことも出来ずに、別れてしまいましたが……）"
translation = "（처음 느끼는 감정에 당황해서 그 자리에서는 연락처를 묻는 것도 이름을 묻는 것도 하지 못한 채 헤어져 버렸습니다만……）"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "（まさかあの時の方が、最近姉さまのよく話す、新しい会長さまだったなんて……！）"
translation = "（설마 그때 그분이 최근 누님이 자주 이야기하는 새로운 회장님이었다니……!）"

[[dialogue]]
speaker = "unk"
original = "キミはもしかして、以前に神社で会った――"
translation = "너는 혹시 이전에 신사에서 만났던──"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「は、はい！\u3000あの時お世話になった、巫女をやっていた者です……！」"
translation = "「네, 네! 그때 도움을 받았던, 무녀를 하고 있던 사람입니다……!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「えっ、何？\u3000会長って、私の弟とまさか顔見知りだったの！？」"
translation = "「엣, 뭐야? 회장은 내 남동생이랑 설마 아는 사이였어!?」"

[[dialogue]]
speaker = "unk"
original = "そうか、この子はマトイの……ん？"
translation = "그렇구나, 이 아이는 마토이의…… 응?"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「わ、私、急用を思い出したので、これにて失礼致しますっ」"
translation = "「저, 저, 급한 일이 생각나서 이만 실례하겠습니다!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あっ、ちょっ、トマル！？\u3000いきなりどうしたのよ？\u3000トマル～～～っ！」"
translation = "「앗, 잠깐, 토마루!? 갑자기 왜 그래? 토마루~~~!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あの子があんな反応するの、初めて見たかも……えっと、会長は何か前に会ったことがあるみたいだけど――」"
translation = "「저 애가 저런 반응을 하는 거 처음 봤을지도…… 저기, 회장은 뭔가 이전에 만난 적이 있는 모양인데──」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あの子の名前は、<ruby>詠野<rt>よみの</rt></ruby>トマル。流星学園の附属校に通っている３年生で、さっきも言った通り――」"
translation = "「저 애의 이름은 에이노 토마루. 유성학원 부속 학교에 다니고 있는 3학년이고, 아까도 말했듯이──」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「可愛くて、普通じゃない、私の自慢の<b>弟</b>よ」"
translation = "「귀엽고 평범하지 않은, 내 자랑스러운 <b>남동생</b>이야」"

[[dialogue]]
speaker = "unk"
original = "……めっちゃ可愛かったけど、弟なの？"
translation = "……엄청 귀여웠는데 남동생이야?"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「めっちゃ可愛いけど、実は男よ！」"
translation = "「엄청 귀엽지만 사실 남자야!」"

[[dialogue]]
speaker = "unk"
original = "翌日の放課後――"
translation = "다음 날 방과 후──"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「あの……失礼致します……！」"
translation = "「저기…… 실례하겠습니다……!」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「き、昨日はあなた様にまともな挨拶も出来ず、突然立ち去ってしまい、大変申し訳ありませんでした……」"
translation = "「어, 어제는 당신께 제대로 된 인사도 드리지 못하고 갑자기 떠나버려서 정말 죄송했습니다……」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「まさか、あの時の方と再会できるとは思わず、動揺してしまいまして……」"
translation = "「설마 그때 그분과 재회할 수 있을 줄은 몰라서 동요해 버려서……」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「改めまして、マトイ姉さまの弟、詠野トマルと申します。日頃、姉さまがお世話になっております」"
translation = "「다시 인사드리겠습니다. 마토이 누님의 남동생, 에이노 토마루라고 합니다. 평소 누님이 신세를 지고 있습니다」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「姉さまからも既に聞いているかとは思いますが、私、恥ずかしながら性別は男でして……」"
translation = "「누님께 이미 들으셨을 거라 생각합니다만, 저, 부끄럽게도 성별은 남자라서……」"

[[dialogue]]
speaker = "unk"
original = "う～ん、やっぱり美少女にしか見えない……！"
translation = "으음, 역시 미소녀로밖에 안 보여……!"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「あ、ありがとうございます……そう言って頂けて、嬉しいです……」"
translation = "「고, 고맙습니다…… 그렇게 말씀해 주시니 기뻐요……」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「姉さまのような、素敵な女の子になることが、私の目標ですので」"
translation = "「누님 같은 멋진 여자가 되는 것이 제 목표니까요」"

[[dialogue]]
speaker = "unk"
original = "これからまた、よろしくね"
translation = "앞으로 잘 부탁해"

[[dialogue]]
speaker = "unk"
original = "また会えるなんて、不思議な縁を感じるな"
translation = "다시 만나다니 신기한 인연을 느끼네"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「はい！\u3000こちらこそ、よろしくお願い致します。会長さま♪」"
translation = "「네! 저야말로 잘 부탁드립니다. 회장님♪」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「失礼します！\u3000お兄さん、急ぎでお願いしたいことが！」"
translation = "「실례합니다! 오빠, 급하게 부탁하고 싶은 일이!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「……って、トマルくん？\u3000どうしてここに？」"
translation = "「……어라, 토마루 군? 왜 여기에?」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「サチさまこそ、どうかなさったんですか？\u3000もしかして――」"
translation = "「사치 님이야말로 어쩐 일이세요? 혹시──」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「トマルくんもいるなら、ちょうどいいです！\u3000実は新星学園の校舎に、新しいロストアイテムが現れたんです！」"
translation = "「토마루 군도 있다면 마침 잘됐어요! 사실 신성학원 교사에 새로운 로스트 아이템이 나타났어요!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「お２人共、協力してくれませんか！」"
translation = "「두 분 다 협력해 주지 않겠나요!」"

[[dialogue]]
speaker = "unk"
original = "第２話へつづく――"
translation = "제2화로 계속──"

