[[dialogue]]
speaker = "unk"
original = "第１話,ルヴィネ追跡計画,B"
translation = "제1화, 루비네 추적 계획, B"

[[dialogue]]
speaker = "unk"
original = "デネブの救世主にして、極星学園の頂点に立つ星徒会長・ルヴィネ。"
translation = "데네브의 구세주이자 극성학원의 정점에 선 성도회장 루비네."

[[dialogue]]
speaker = "unk"
original = "極星学園と力を合わせてリクリエと戦うためには、謎が多い彼女についてもっと知る必要があるだろう。"
translation = "극성학원과 힘을 합쳐 리크리에와 싸우기 위해서는 수수께끼가 많은 그녀에 대해 더 알 필요가 있을 것이다."

[[dialogue]]
speaker = "unk"
original = "そのためにナターシャが提案したのは──"
translation = "그것을 위해 나타샤가 제안한 것은──"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「尾行……？」"
translation = "「미행……?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「そ、尾行。情報は足で稼ぐのが基本でしょ？\u3000徹底的に追跡すれば、何かわかるかもと思って」"
translation = "「네, 미행. 정보는 발로 뛰어서 얻는 게 기본이잖아요? 철저하게 추적하면 뭔가 알 수 있을지도 몰라서요.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ふむ。ルヴィネの追跡か……あたしたちも試みたことがあったが、人手が足りなくて上手くいかなかったな」"
translation = "「흠. 루비네 추적인가…… 우리도 시도해 본 적이 있었지만 인력이 부족해서 잘 안 됐었지.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「バックアップメンバーも極星学園の動向は監視しているが、追いきれないこともある」"
translation = "「백업 멤버들도 극성학원의 동향을 감시하고 있지만 다 쫓지 못할 때도 있어.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「だが、これだけ人数がいるなら何か掴めるかもしれない。たまには愚直な手を使ってみるか」"
translation = "「하지만 이 정도 인원이라면 뭔가 잡을 수 있을지도 모르겠군. 가끔은 우직한 수법을 써 볼까.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「でも、気になることがあれば私がルヴィに聞いてくればいいんじゃない？」"
translation = "「하지만 궁금한 게 있으면 내가 루비에게 물어보고 오면 되지 않을까?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「それはやめといた方がいいんじゃない？\u3000ベアトのことは仲間だと思ってるけど、ルヴィネに聞かれたら言っちゃいけないことポロッと言っちゃいそう」"
translation = "「그건 관두는 게 좋지 않을까요? 베아토를 동료라고 생각하지만, 루비네가 물어보면 말하면 안 되는 걸 훌쩍 말해버릴 것 같거든요.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「う……確かに自信ない……」"
translation = "「으…… 확실히 자신 없어……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「それにふらりと帰ってきた君を信用するとも限らない。危害を加えられることはなくとも、監視を付けたり、一時的に拘束されるかもしれない」"
translation = "「게다가 불쑥 돌아온 너를 신용한다고 장담할 수도 없어. 위해를 가하지는 않더라도 감시를 붙이거나 일시적으로 구속할지도 몰라.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「あぁ～……ルヴィならやりそう……」"
translation = "「아아~…… 루비라면 그럴 것 같아……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「久しぶりに会いたいけど、やめといた方が良さそうだね……はい、諦めます」"
translation = "「오랜만에 만나고 싶지만 관두는 게 좋겠네…… 네, 포기할게요.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「すまない。そうしてくれると助かる」"
translation = "「미안하다. 그렇게 해주면 도움이 되겠어.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「敵のボスを尾行するってなんだか楽しそうね。やってみましょうよ」"
translation = "「적의 보스를 미행한다니 왠지 재밌겠네. 해보자고.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「試してみる価値はあるかもしれませんね。ですが具体的にどう尾行するのでしょう？」"
translation = "「시도해 볼 가치는 있을지도 모르겠네요. 하지만 구체적으로 어떻게 미행하는 거죠?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「尾行とか追跡は私の専門分野だし、私が中心になってやろうかなって思ってるよ」"
translation = "「미행이나 추적은 제 전문 분야니까 제가 중심이 되어 해볼까 생각 중이에요.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「だけど１人だと何かあった時怖いし、かといって大人数でゾロゾロってわけにもいかないし、２人一組がいいかな」"
translation = "「하지만 혼자라면 무슨 일이 생겼을 때 무섭고, 그렇다고 대인원이 우르르 몰려다닐 수도 없으니 2인 1조가 좋겠네요.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「それじゃ、ナターシャ＋１人と、あたし＋１人のペアで回していくか。レジスタンス活動のおかげで、あたしも隠密行動に覚えがある」"
translation = "「그럼 나타샤+1명과 나+1명 페어로 돌려볼까. 레지스탕스 활동 덕분에 나도 은밀 행동에는 일가견이 있으니까.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「もしかして、２４時間ずっと尾行するつもり……？」"
translation = "「설마 24시간 내내 미행할 생각이야……?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「そりゃそうだよ。徹底的にって言ったでしょ」"
translation = "「당연하죠. 철저하게라고 했잖아요.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「でも夜は必要ないんじゃ？\u3000ルヴィは寮住まいだよ？」"
translation = "「하지만 밤에는 필요 없지 않아? 루비는 기숙사 생활을 한다고?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いや、深夜に寮を抜け出す生徒もいないわけじゃない。夜も監視が必要だと思う」"
translation = "「아니, 심야에 기숙사를 빠져나가는 학생이 없는 것도 아니야. 밤에도 감시가 필요하다고 생각해.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「うーん、ルヴィはそんなことしないと思うけどなぁ……」"
translation = "「으음, 루비는 그런 짓 안 할 것 같지만 말이야……」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「だからこそだよ。思わぬ収穫があるかもしれないからね」"
translation = "「그러니까 더더욱 하는 거예요. 뜻밖의 수확이 있을지도 모르니까요.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「よし、じゃあローテーションを組むぞ」"
translation = "「좋아, 그럼 로테이션을 짜자.」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「なんかバイトのシフトみたいだなー」"
translation = "「왠지 알바 시프트 같네~」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「確かに警備のバイトはこんな感じだったかも」"
translation = "「확실히 경비 알바는 이런 느낌이었을지도.」"

[[dialogue]]
speaker = "unk"
original = "ナターシャとアポロを中心に、交代のタイミングを考えつつ、ローテーションの組み合わせを構築していく。"
translation = "나타샤와 아폴로를 중심으로 교대 타이밍을 고려하며 로테이션 조합을 구성해 나간다."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「じゃあ私は基地の維持と、隠蔽魔法をかける担当ね。あとアポロちゃんがいない時の料理も私に任せて！」"
translation = "「그럼 난 기지 유지랑, 은폐 마법을 거는 담당이네. 그리고 아폴로 짱이 없을 때 요리도 나한테 맡겨줘!」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「それは待て。長時間の尾行から帰ってきた時にリノの料理が待ってたんじゃ気が滅入る」"
translation = "「그건 기다려. 장시간 미행하고 돌아왔을 때 리노의 요리가 기다리고 있다면 기운이 빠질 테니까.」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「アポロちゃんひど～い！」"
translation = "「아폴로 짱 너무해~!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「はは……そっちもローテーションを考えてもいいかもな」"
translation = "「하하…… 그쪽도 로테이션을 고려해 보는 게 좋을지도 모르겠네.」"

[[dialogue]]
speaker = "unk"
original = "バイト経験のおかげで、料理なら俺もそれなりにできる。"
translation = "알바 경험 덕분에, 요리라면 나도 어느 정도 할 수 있다."

[[dialogue]]
speaker = "unk"
original = "今までアポロに頼りっぱなしだったし、俺もできるだけ手伝おう。"
translation = "지금까지 아폴로에게만 의지해 왔으니, 나도 가능한 한 돕자."

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「よし、作戦開始は明日からだ。ちゃんとルヴィネを尾行するためにも、今日はゆっくり体を休めてくれ」"
translation = "「좋아, 작전 개시는 내일부터다. 제대로 루비네를 미행하기 위해서라도, 오늘은 푹 쉬어둬.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はい。尾行には体力が必要ですからね」"
translation = "「네. 미행에는 체력이 필요하니까요.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あいつの秘密を暴いてやるわ！」"
translation = "「그 녀석의 비밀을 폭로해 주겠어!」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「あ～あ、明日からまたバイトかー」"
translation = "「아~아, 내일부터 다시 알바인가~」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「バイトじゃないだろう……」"
translation = "「알바가 아닐 텐데……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「隠れて後をつけるのは気が進まないけど……終わったら謝るからね、ルヴィ」"
translation = "「숨어서 뒤를 쫓는 건 내키지 않지만…… 끝나면 사과할게, 루비.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「さて、エージェントらしく仕事するとしますか」"
translation = "「자, 에이전트답게 일 좀 해볼까.」"

[[dialogue]]
speaker = "unk"
original = "こうして明日からの行動を決め、それぞれ部屋に戻って休んだのだった。"
translation = "이렇게 내일부터의 행동을 정하고, 각자 방으로 돌아가 쉬었다."

