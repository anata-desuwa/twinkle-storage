[[dialogue]]
speaker = "ヒルディオーネ"
original = "「あっ<emoji=heart04>\u3000しゅごいっ<emoji=heart04>\u3000おち○ぽ様、中で更に大きく膨らんでましゅわっ<emoji=heart04>」"
translation = "「앗<emoji>heart04</emoji> 대단해읏<emoji>heart04</emoji> 자지님, 안에서 더욱 크게 부풀어 오르데시와읏<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、もうそろそろイキそうだっ……！」"
translation = "「아아, 이제 곧 갈 것 같아읏……!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「はああぁっ<emoji=heart04><emoji=heart04>\u3000来て下しゃいましっ<emoji=heart04>\u3000どうか私の中にいっぱい、旦那様の子種を恵んで欲しいでしゅのぉ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000ふあああぁっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하아아아읏<emoji>heart04</emoji><emoji>heart04</emoji> 와 주세요읏<emoji>heart04</emoji> 부디 제 안에 잔뜩, 남편님의 씨앗을 내려 주슈노오<emoji>heart04</emoji> 앗<emoji>heart04</emoji> 응우으읏<emoji>heart04</emoji> 후아아아읏<emoji>heart04</emoji><emoji>heart04</emoji><emoji>heart04</emoji>」"

[[dialogue]]
speaker = "unk"
original = "ヒルディーの膣内がおねだりするように収縮し、子宮口が下りて亀頭の先にちゅっちゅっと吸い付いてくる。"
translation = "힐디의 질내가 애원하듯이 수축하고, 자궁구가 내려와 귀두 끝에 쪽쪽 빨아당긴다."

[[dialogue]]
speaker = "unk"
original = "射精へ導かんとするその気持ち良さに、俺は堪らず腰を限界まで激しく突き上げる。"
translation = "사정으로 이끌려는 그 기분 좋음에, 나는 참지 못하고 허리를 한계까지 격렬하게 찔러 올린다."

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「あっ――<emoji=heart04><emoji=heart04>\u3000んあああぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000おち○ぽ様、しゅごいっ<emoji=heart04><emoji=heart04>\u3000しゅごいですのぉっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はぁんっ<emoji=heart04><emoji=heart04>\u3000ふああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「앗――<emoji>heart04</emoji><emoji>heart04</emoji> 응아아아아～～～읏<emoji>heart04</emoji><emoji>heart04</emoji><emoji>heart04</emoji> 자지님, 대단해읏<emoji>heart04</emoji><emoji>heart04</emoji> 대단하데시노오읏<emoji>heart04</emoji><emoji>heart04</emoji><emoji>heart04</emoji> 앗<emoji>heart04</emoji> 앙읏<emoji>heart04</emoji> 하앙읏<emoji>heart04</emoji><emoji>heart04</emoji> 후아아앙읏<emoji>heart04</emoji><emoji>heart04</emoji>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ふああああぁっ<emoji=heart04><emoji=heart04>\u3000気持ちっ<emoji=heart04>\u3000気持ちいぃでしゅわぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000おま○こ天国でしゅのぉっ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「후아아아아읏<emoji>heart04</emoji><emoji>heart04</emoji> 기분읏<emoji>heart04</emoji> 기분 좋으이데시와아읏<emoji>heart04</emoji><emoji>heart04</emoji><emoji>heart04</emoji> 보지 천국데시노오읏<emoji>heart04</emoji><emoji>heart04</emoji> 앗<emoji>heart04</emoji> 응아아읏<emoji>heart04</emoji> 후아아읏<emoji>heart04</emoji> 하아아아앙읏<emoji>heart04</emoji><emoji>heart04</emoji>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「んあああぁっ<emoji=heart04><emoji=heart04>\u3000もう来ちゃうっ<emoji=heart04>\u3000きちゃいましゅのぉっ<emoji=heart04>\u3000気持ち良しゅぎて、しゅごいのがぁっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「응아아아읏<emoji>heart04</emoji><emoji>heart04</emoji> 이제 곧 나와읏<emoji>heart04</emoji> 나와 버리데시노오읏<emoji>heart04</emoji> 기분 좋으슈기데, 대단한 것이이읏<emoji>heart04</emoji> 응우으읏<emoji>heart04</emoji> 하아아읏<emoji>heart04</emoji> 응아아앙읏<emoji>heart04</emoji><emoji>heart04</emoji>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「あっ<emoji=heart04>\u3000来たっ<emoji=heart04><emoji=heart04>\u3000きましたわぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふあああぁっ<emoji=heart04><emoji=heart04>\u3000イクっ<emoji=heart04><emoji=heart04>\u3000イクイクイクっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji>heart04</emoji> 왔읏<emoji>heart04</emoji><emoji>heart04</emoji> 왔습니다요오읏<emoji>heart04</emoji><emoji>heart04</emoji><emoji>heart04</emoji> 후아아아읏<emoji>heart04</emoji><emoji>heart04</emoji> 이크읏<emoji>heart04</emoji><emoji>heart04</emoji> 이크 이크 이크읏<emoji>heart04</emoji><emoji>heart04</emoji><emoji>heart04</emoji>」"

[[dialogue]]
speaker = "クロト"
original = "「っ――ヒルディー、もう出るっ！！！」"
translation = "「읏――힐디, 이제 나온다읏!!!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「私もイっちゃいましゅのぉっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あああああああっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イイクイクイクイクイクっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イっ――<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「저도 가 버리데시노오읏<emoji>heart04</emoji><emoji>heart04</emoji><emoji>heart04</emoji> 아아아아아아아읏<emoji>heart04</emoji><emoji>heart04</emoji><emoji>heart04</emoji> 이크 이크 이크 이크 이크읏<emoji>heart04</emoji><emoji>heart04</emoji><emoji>heart04</emoji> 이읏――<emoji>heart04</emoji><emoji>heart04</emoji><emoji>heart04</emoji><emoji>heart04</emoji>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「イクうううぅぅぅーーーーーーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふあああぁぁぁ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「이크으으으으으으ーーーーーーーーー읏<emoji>heart04</emoji><emoji>heart04</emoji><emoji>heart04</emoji><emoji>heart04</emoji><emoji>heart04</emoji> 후아아아아아아아아～～～～～～～～～읏<emoji>heart04</emoji><emoji>heart04</emoji><emoji>heart04</emoji><emoji>heart04</emoji><emoji>heart04</emoji>」"

[[dialogue]]
speaker = "unk"
original = "俺はヒルディーの子宮口にペニスの先端を強く押し付けると、限界まで溜め込んだ快楽と共に、大量の精を吐き出す。"
translation = "나는 힐디의 자궁구에 페니스 끝을 강하게 밀어붙이자, 한계까지 모아둔 쾌락과 함께, 대량의 정액을 토해낸다."

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「はああああああぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000旦那様の精液、私の中にいっぱい注がれてましゅのぉ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000んうぅ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「하아아아아아아아～～～읏<emoji>heart04</emoji><emoji>heart04</emoji><emoji>heart04</emoji> 남편님의 정액, 제 안에 잔뜩 쏟아지데시노오～～～읏<emoji>heart04</emoji><emoji>heart04</emoji><emoji>heart04</emoji> 응우으～～읏<emoji>heart04</emoji><emoji>heart04</emoji>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「んあああぁんっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000子宮にどぴゅどぴゅ熱い愛が注がれて、連続でイっちゃいましゅのぉ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000んんぅっ<emoji=heart04><emoji=heart04>\u3000ふうぅ～っ<emoji=heart04><emoji=heart04>\u3000はあぁ～っ<emoji=heart04><emoji=heart04>」"
translation = "「응아아아앙읏<emoji>heart04</emoji><emoji>heart04</emoji><emoji>heart04</emoji> 자궁에 푹푹 뜨거운 사랑이 쏟아져서, 연속으로 가 버리데시노오<emoji>heart04</emoji><emoji>heart04</emoji><emoji>heart04</emoji> 응응으읏<emoji>heart04</emoji><emoji>heart04</emoji> 후우으～읏<emoji>heart04</emoji><emoji>heart04</emoji> 하아아～읏<emoji>heart04</emoji><emoji>heart04</emoji>」"

[[dialogue]]
speaker = "unk"
original = "そうして、快楽に身をよじりながら、ヒルディーは俺の精液を最後の一滴まで子宮で飲み込んで――"
translation = "그렇게, 쾌락에 몸을 비틀면서, 힐디는 나의 정액을 마지막 한 방울까지 자궁으로 삼키고――"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「んうぅっ……<emoji=heart04>\u3000ふうぅ～っ<emoji=heart04>\u3000んん～っ……<emoji=heart04>」"
translation = "「응우으읏……<emoji>heart04</emoji> 후우으～읏<emoji>heart04</emoji> 응응～읏……<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "unk"
original = "ちゅぽんっ<emoji=heart04>\u3000という淫らな水音と共に、彼女の膣穴からペニスが抜ける。"
translation = "쪽<emoji>heart04</emoji> 하는 음란한 물소리와 함께, 그녀의 질 구멍에서 페니스가 빠진다."

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「あんっ……<emoji=heart04>\u3000はあぁ……<emoji=heart04>\u3000ふうぅ……<emoji=heart04>」"
translation = "「앙읏……<emoji>heart04</emoji> 하아아……<emoji>heart04</emoji> 후우으……<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「んっ……<emoji=heart04>\u3000相変わらず、凄い子種の量ですわ<emoji=heart04>\u3000入り切らなくて、沢山溢れてきてしまってますの……<emoji=heart04>」"
translation = "「응읏……<emoji>heart04</emoji> 변함없이, 엄청난 씨앗의 양입니다요<emoji>heart04</emoji> 다 들어가지 못하고, 잔뜩 흘러넘치고 있습니다요……<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "unk"
original = "それからしばし、お互いに呼吸を落ち着かせたところで――"
translation = "그 후 잠시, 서로 호흡을 진정시킨 뒤――"

[[dialogue]]
speaker = "クロト"
original = "「……ヒルディー、どうだった？」"
translation = "「……힐디, 어땠어?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「はあぁ……<emoji=heart04>\u3000す、すごく……気持ち良かったですわ……<emoji=heart04>」"
translation = "「하아아……<emoji>heart04</emoji> 느, 너무…… 기분 좋았습니다요……<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「こういう人が居ない場所でしたら……その……たまには、悪くないかもしれませんわね……<emoji=heart04>」"
translation = "「이런 사람이 없는 장소라면…… 그…… 가끔은, 나쁘지 않을지도 모르겠습니다요……<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "クロト"
original = "「たまにはってことは……じゃあ、もう今日はこれで打ち止めにしちゃう？」"
translation = "「가끔은이라니…… 그럼, 오늘은 이걸로 끝낼까?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「っ……！\u3000も、もう……」"
translation = "「읏……! 이, 이제……」"

[[dialogue]]
speaker = "unk"
original = "ヒルディオーネは腰を屈めて胸を押し付け、俺に顔を近づけながら言う。"
translation = "힐디 오네는 허리를 굽혀 가슴을 밀어붙이고, 나에게 얼굴을 가까이하며 말한다."

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「わかっているのに、そんな意地悪しないで下さいまし……旦那様<emoji=heart04>」"
translation = "「알고 있으면서, 그런 심술 부리지 말아 주세요…… 남편님<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「んっ……ちゅっ<emoji=heart04>」"
translation = "「응읏…… 츄읏<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "unk"
original = "その後も、俺たちは海に入らず、お互いの体力が尽きるまで砂浜で汗だくになって遊び続けてしまうのだった――"
translation = "그 후로도, 우리는 바다에 들어가지 않고, 서로의 체력이 다할 때까지 모래사장에서 땀투성이가 되어 계속 노는 것이었다――"

