[[dialogue]]
speaker = "unk"
original = "とある休日、俺は恋人のヒルディオーネ先輩と、リゾート結界へと遊びにやって来ていた。"
translation = "어떤 휴일, 나는 연인인 힐디 오네 선배와 리조트 결계로 놀러 와 있었다."

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「ほ、本当にここでなさいますの……？」"
translation = "「흐, 정말 여기서 하실 건가요……?」"

[[dialogue]]
speaker = "unk"
original = "２人でイチャイチャしているうちに<b>そういう</b>気分になって、プライベートビーチに移動してきたところで、先輩は恥ずかしそうに言う。"
translation = "둘이서 끈적하게 굴다 보니 <b>그런</b> 기분이 들어서, 프라이빗 비치로 이동해 왔을 때, 선배는 부끄러운 듯이 말한다."

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「しかも、この衣装でしたいだなんて……」"
translation = "「게다가, 이 의상으로 하고 싶다니……」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「――プライベートビーチで、他の人は誰も来ないから大丈夫？\u3000そ、それはそうなのですけれど……」"
translation = "「――프라이빗 비치이고, 다른 사람은 아무도 오지 않으니 괜찮다고요? 그, 그것은 그렇습니다만……」"

[[dialogue]]
speaker = "unk"
original = "俺は彼女の耳元で囁く。"
translation = "나는 그녀의 귓가에 속삭인다."

[[dialogue]]
speaker = "クロト"
original = "「これは命令だよ、<b>ヒルディー</b>」"
translation = "「이건 명령이야, <b>힐디</b>」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「っ……！\u3000わ、わかりましたわ――」"
translation = "「읏……! 아, 알겠습니다요――」"

[[dialogue]]
speaker = "unk"
original = "顔を赤く染めながら、彼女はこくりと頷いて言う。"
translation = "얼굴을 붉게 물들이며, 그녀는 끄덕이고 말한다."

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「<b>旦那様</b>……<emoji=heart04>」"
translation = "「<b>남편님</b>……<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "unk"
original = "砂浜に敷いたビーチマットの上で、仰向けに寝転がった俺の上に、ヒルディーは馬乗りの体勢になる。"
translation = "모래사장에 깔아둔 비치 매트 위에서, 똑바로 누워 있는 내 위에 힐디는 올라탄 자세가 된다."

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「んっ……<emoji=heart04>\u3000はあぁ……ふうぅ……<emoji=heart04>\u3000仰る通り、騎乗位になりましたわ……<emoji=heart04>」"
translation = "「응읏……<emoji>heart04</emoji> 하아아…… 후우으……<emoji>heart04</emoji> 말씀하신 대로, 기승위가 되었습니다요……<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "クロト"
original = "「それじゃあ、挿れる準備をお願いしてもいいかな？」"
translation = "「그럼, 넣을 준비를 부탁해도 될까?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「は、はいですわ……<emoji=heart04>\u3000んんっ……<emoji=heart04>」"
translation = "「네, 네입니다요……<emoji>heart04</emoji> 응응읏……<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "unk"
original = "彼女は恥ずかしそうに顔を赤くしながらも、こくりと頷いて、秘部をペニスに擦り付け始める。"
translation = "그녀는 부끄러운 듯이 얼굴을 붉히면서도, 끄덕이고는 은밀한 부위를 페니스에 문지르기 시작한다."

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「あっ<emoji=heart04>\u3000んっ……<emoji=heart04>\u3000ふうぅ……<emoji=heart04>」"
translation = "「앗<emoji>heart04</emoji> 응읏……<emoji>heart04</emoji> 후우으……<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "クロト"
original = "「ヒルディーのおま○こ、ちょっと擦り付けただけで愛液が溢れてきて、すごいことになってるよ」"
translation = "「힐디 보지, 살짝 문지른 것만으로 애액이 넘쳐흘러서, 대단하게 됐네」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「だ、だってそれは……はあぁ……<emoji=heart04>\u3000んうぅ……<emoji=heart04>」"
translation = "「하, 하지만 그건…… 하아아……<emoji>heart04</emoji> 응우으……<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「旦那様のおち○ぽ、いつも逞しくて立派なんですもの……<emoji=heart04>\u3000あっ……<emoji=heart04>\u3000んふぅ……<emoji=heart04>」"
translation = "「남편님 자지, 언제나 늠름하고 훌륭한걸요……<emoji>heart04</emoji> 앗……<emoji>heart04</emoji> 응후으……<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「目にしただけで、女としての本能が疼いて、おま○こがキュンって反応してしまうのですわ……<emoji=heart04>」"
translation = "「눈에 담는 것만으로, 여자로서의 본능이 욱신거려서, 보지가 큥 하고 반응해 버리는 것입니다요……<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「はあぁ……<emoji=heart04>\u3000だ、だから、その……<emoji=heart04>\u3000<ruby>私<rt>わたくし</rt></ruby>、もう準備は出来ておりまして……<emoji=heart04>」"
translation = "「하아아……<emoji>heart04</emoji> 그, 그러니까, 그게……<emoji>heart04</emoji> 저, 이미 준비는 되어 있습니다요……<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "クロト"
original = "「わかった。じゃあ、自分で挿れてごらん」"
translation = "「알았어. 그럼, 스스로 넣어 봐」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「は、はいですわ<emoji=heart04>\u3000失礼致しますの……<emoji=heart04>」"
translation = "「네, 네입니다요<emoji>heart04</emoji> 실례하겠습니다요……<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "unk"
original = "そう言って、ヒルディーはゆっくりと腰を下ろして――"
translation = "그렇게 말하고, 힐디는 천천히 허리를 내리고――"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「んっ……<emoji=heart04>\u3000あっ――<emoji=heart04>」"
translation = "「응읏……<emoji>heart04</emoji> 앗――<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「はあああぁ～～っ……<emoji=heart04><emoji=heart04>」"
translation = "「하아아아아아～～읏……<emoji>heart04</emoji><emoji>heart04</emoji>」"

[[dialogue]]
speaker = "unk"
original = "ペニスを膣内に挿入すると、ゆっくり動き始めた。"
translation = "페니스를 질 내에 삽입하자, 천천히 움직이기 시작했다."

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んっ……ふうぅっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000あんっ……<emoji=heart04>」"
translation = "「앗<emoji>heart04</emoji> 앙읏<emoji>heart04</emoji> 응읏…… 후우읏<emoji>heart04</emoji> 응우읏<emoji>heart04</emoji> 앗<emoji>heart04</emoji> 하아읏<emoji>heart04</emoji> 앙읏……<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ふあぁっ<emoji=heart04>\u3000旦那様のおち○ぽ、すごいですわ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んふぅっ……<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁんっ……<emoji=heart04>」"
translation = "「후아읏<emoji>heart04</emoji> 남편님 자지, 대단합니다요<emoji>heart04</emoji> 응읏<emoji>heart04</emoji> 응후으읏……<emoji>heart04</emoji> 하아읏<emoji>heart04</emoji> 응응읏<emoji>heart04</emoji> 앗<emoji>heart04</emoji> 하앙읏……<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "クロト"
original = "「ヒルディー、ビーチに人が集まってきちゃってるよ」"
translation = "「힐디, 비치에 사람들이 모여들고 있어」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ふえっ！？」"
translation = "「후엣!?」"

[[dialogue]]
speaker = "unk"
original = "一瞬ビクッと体を震わせるヒルディー。"
translation = "순간 움찔하고 몸을 떠는 힐디."

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「んっ<emoji=heart04>\u3000はああぁ～っ<emoji=heart04>\u3000だ、旦那様、そんなっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000いけませんわ<emoji=heart04>」"
translation = "「응읏<emoji>heart04</emoji> 하아아아읏<emoji>heart04</emoji> 나, 남편님, 그런<emoji>heart04</emoji> 앗<emoji>heart04</emoji> 안 됩니다요<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "unk"
original = "ここはプライベートビーチであり、俺が言ったのは<b>明らかに嘘</b>なのだが、彼女のおま○こは反応して、きゅうきゅうと気持ち良く締め付けてくる。"
translation = "여기는 프라이빗 비치이며, 내가 말한 것은 <ruby>명백한 거짓말<rt>・・・ ・・・</rt></ruby>이지만, 그녀의 보지는 반응해서, 꽉꽉 기분 좋게 조여 온다."

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「んふぅっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000こんなところを誰かに見られたりしたら<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000私、恥ずかしくて死んでしまいますの<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふうぅっ……<emoji=heart04>」"
translation = "「응후으읏<emoji>heart04</emoji> 후우으읏<emoji>heart04</emoji> 이런 곳을 누군가에게 보이기라도 한다면<emoji>heart04</emoji> 앗<emoji>heart04</emoji> 앙읏<emoji>heart04</emoji> 저, 부끄러워서 죽어 버릴 것입니다요<emoji>heart04</emoji> 하아읏<emoji>heart04</emoji> 응읏<emoji>heart04</emoji> 후우으읏……<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "クロト"
original = "「そんなこと言いながら、腰はさっきよりも動いちゃってるみたいだよ？」"
translation = "「그런 말 하면서, 허리는 아까보다 더 움직이고 있는 것 같은데?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「そ、それはぁ<emoji=heart04>\u3000だってぇ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000あっ……んふぅっ<emoji=heart04>」"
translation = "「그, 그건요오<emoji>heart04</emoji> 왜냐하면요오<emoji>heart04</emoji> 응우으읏<emoji>heart04</emoji> 앗…… 응후으읏<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "クロト"
original = "「ほら、流星寮の子たちが木の陰からこっち覗いているよ？」"
translation = "「봐, 유성 기숙사 아이들이 나무 그늘에서 이쪽을 엿보고 있어?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ふああぁっ<emoji=heart04><emoji=heart04>\u3000ダメっ<emoji=heart04>\u3000そんなのはいけませんの<emoji=heart04>\u3000あっ<emoji=heart04>\u3000先輩のこんな淫らな姿、見ちゃダメですのぉ<emoji=heart04>\u3000んっ……ふぅんっ<emoji=heart04>」"
translation = "「후아아아읏<emoji>heart04</emoji><emoji>heart04</emoji> 안 돼읏<emoji>heart04</emoji> 그런 건 안 됩니다요<emoji>heart04</emoji> 앗<emoji>heart04</emoji> 선배의 이런 음란한 모습, 보면 안 됩니다요오<emoji>heart04</emoji> 응읏…… 후응읏<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "クロト"
original = "「みんなの憧れのお姉様が、羞恥心よりも快楽に負けて、はしたなく腰を振っちゃってるところ？」"
translation = "「모두의 동경의 대상인 언니가, 수치심보다 쾌락에 져서, 천박하게 허리를 흔들고 있는 모습?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「あぁんっ<emoji=heart04>\u3000言わないで下さいまし<emoji=heart04>\u3000恥ずかしさで私、頭が熱くなって、どうにかなっちゃいそうですのぉ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000はあぁっ……んうぅっ<emoji=heart04>」"
translation = "「아앙읏<emoji>heart04</emoji> 말하지 말아 주세요<emoji>heart04</emoji> 부끄러움에 저, 머리가 뜨거워져서, 어떻게 돼 버릴 것 같습니다요오<emoji>heart04</emoji> 앗<emoji>heart04</emoji> 응응읏<emoji>heart04</emoji> 하아아읏…… 응우으읏<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "クロト"
original = "「覚醒フォームにもなったのに、ち○ぽにはすぐに負けちゃうエッチなヒルディー、見られちゃってるよ」"
translation = "「각성 폼까지 됐는데, 자지에는 금방 져 버리는 야한 힐디, 들켜 버리고 있어」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「んはああぁっ<emoji=heart04><emoji=heart04>\u3000ダメぇ<emoji=heart04>\u3000言われると想像して、周りが見られなくなっちゃいますわぁ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んふぅっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>」"
translation = "「응하아아아읏<emoji>heart04</emoji><emoji>heart04</emoji> 안 돼애<emoji>heart04</emoji> 말을 들으니 상상하게 돼서, 주변이 보이지 않게 돼 버립니다요오<emoji>heart04</emoji> 앗<emoji>heart04</emoji> 응후으읏<emoji>heart04</emoji> 응아아읏<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「沢山の視線が集まっているような気がして、背中がゾクゾクしてぇ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000はああぁっ<emoji=heart04>」"
translation = "「많은 시선이 모여 있는 것 같은 기분이 들어서, 등골이 오싹하고오<emoji>heart04</emoji> 앗<emoji>heart04</emoji> 후아아읏<emoji>heart04</emoji> 하아아아읏<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「外でこんなにもはしたなく腰を振って恥ずかしいのに<emoji=heart04>\u3000私、おま○こキュンキュンして、すごく感じちゃいますのぉ<emoji=heart04>」"
translation = "「밖에서 이렇게나 천박하게 허리를 흔들고 부끄러운데<emoji>heart04</emoji> 저, 보지가 큥큥거려서, 엄청 느끼고 있습니다요오<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「あっ<emoji=heart04>\u3000ダメっ<emoji=heart04>\u3000気持ちいいの登って来てしまいますの<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふあああぁっ<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji>heart04</emoji> 안 돼읏<emoji>heart04</emoji> 기분 좋은 것이 올라와 버립니다요<emoji>heart04</emoji> 앗<emoji>heart04</emoji> 앙읏<emoji>heart04</emoji> 하아아읏<emoji>heart04</emoji> 후아아아아읏<emoji>heart04</emoji><emoji>heart04</emoji>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「あっ<emoji=heart04>\u3000んあぁっ<emoji=heart04><emoji=heart04>\u3000イっ――<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji>heart04</emoji> 응아아읏<emoji>heart04</emoji><emoji>heart04</emoji> 이읏――<emoji>heart04</emoji><emoji>heart04</emoji><emoji>heart04</emoji>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「んああああああぁ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응아아아아아아아아～～～～～～읏<emoji>heart04</emoji><emoji>heart04</emoji><emoji>heart04</emoji>」"

[[dialogue]]
speaker = "unk"
original = "次の瞬間、ヒルディーは体をビクビクと震わせ、おま○こがひと際強くペニスを締め付けて来る。"
translation = "다음 순간, 힐디는 몸을 움찔움찔 떨며, 보지가 유난히 강하게 페니스를 조여 온다."

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「あっ……はあぁっ<emoji=heart04>\u3000んっ……ふうぅっ……<emoji=heart04>\u3000イってしまいましたわぁ……<emoji=heart04>」"
translation = "「앗…… 하아아읏<emoji>heart04</emoji> 응읏…… 후우으읏……<emoji>heart04</emoji> 가 버렸습니다요오……<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「あっ！？\u3000ふあああああああああぁっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗!? 후아아아아아아아아아읏<emoji>heart04</emoji><emoji>heart04</emoji><emoji>heart04</emoji>」"

[[dialogue]]
speaker = "unk"
original = "俺は下から腰を動かし始めた。"
translation = "나는 아래에서 허리를 움직이기 시작했다."

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「だ、旦那様っ、お待ちになって<emoji=heart04><emoji=heart04>\u3000私、イキましたのっ<emoji=heart04><emoji=heart04>\u3000今イったばかりですのぉ～～っ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふあぁんっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04><emoji=heart04>」"
