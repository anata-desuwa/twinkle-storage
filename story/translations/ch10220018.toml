[[dialogue]]
speaker = "モネ"
original = "「こんなところで……いけません……」"
translation = "「이런 곳에서…… 안 돼요……」"

[[dialogue]]
speaker = "unk"
original = "人気のない書庫に、羞恥と緊張を帯びた声が響く。"
translation = "인적 없는 서고에, 수치와 긴장을 띤 목소리가 울려 퍼진다."

[[dialogue]]
speaker = "モネ"
original = "「嫌なんだ。じゃあ俺のこと好きじゃないんだな」"
translation = "「싫은 거냐. 그럼 날 좋아하지 않는 거네」"

[[dialogue]]
speaker = "モネ"
original = "「そ、そんなことありません。でもここは図書館の書庫ですから……」"
translation = "「그, 그렇지 않아요. 하지만 여기는 도서관 서고니까……」"

[[dialogue]]
speaker = "モネ"
original = "「ここなら人が来ないしちょうどいいじゃないか。モネは俺の彼女なんだろ？\u3000なら俺の頼みを聞いてくれるよな？」"
translation = "「여기라면 사람도 안 오고 딱 좋잖아. 모네는 내 여자친구지? 그럼 내 부탁 들어줄 거지?」"

[[dialogue]]
speaker = "モネ"
original = "「う……は、はい……」"
translation = "「우…… 네, 네……」"

[[dialogue]]
speaker = "モネ"
original = "「あまり見ないでください……」"
translation = "「너무 쳐다보지 말아 주세요……」"

[[dialogue]]
speaker = "モネ"
original = "「恋人なのに？\u3000俺に見られたくないのか？」"
translation = "「연인인데도? 나한테 보여주기 싫은 거야?」"

[[dialogue]]
speaker = "モネ"
original = "「い、いえ……モネのおっぱいも、おま○こも見てください……」"
translation = "「아, 아니요…… 모네의 가슴도, 보지도 봐 주세요……」"

[[dialogue]]
speaker = "unk"
original = "形のいい胸を露わにしながら、おずおずと足を開くモネ。"
translation = "모양 좋은 가슴을 드러내며, 머뭇머뭇 다리를 벌리는 모네."

[[dialogue]]
speaker = "unk"
original = "手には官能小説の文庫本を持っていて、モネは主人公の名前を自分に置き換えて朗読していた。"
translation = "손에는 관능 소설 문고본을 들고 있었고, 모네는 주인공의 이름을 자신으로 바꾸어 낭독하고 있었다."

[[dialogue]]
speaker = "モネ"
original = "「モネが会長に言われるまま下着を脱ぐと、会長も見せつけるように性器を露わにした」"
translation = "「모네가 회장이 시키는 대로 속옷을 벗자, 회장도 과시하듯 성기를 드러냈다」"

[[dialogue]]
speaker = "モネ"
original = "「雄を主張する、たくましくて赤黒いペニス。あれに何度貫かれたか、思い出すだけで体が熱くなってしまう」"
translation = "「수컷임을 주장하는, 늠름하고 검붉은 페니스. 저것에 몇 번이나 꿰뚫렸는지, 떠올리는 것만으로도 몸이 뜨거워져 버린다」"

[[dialogue]]
speaker = "unk"
original = "モネは文庫本に視線を注ぎながらも、赤い顔でちらちらと俺のペニスを見やる。"
translation = "모네는 문고본에 시선을 고정하면서도, 붉어진 얼굴로 힐끔힐끔 내 페니스를 훔쳐본다."

[[dialogue]]
speaker = "モネ"
original = "「モネはただの本好きの、目立たない図書委員だ。一方、会長は文武両道で友人も多く、常に話題の中心にいる」"
translation = "「모네는 그저 책을 좋아하는, 눈에 띄지 않는 도서위원이다. 한편, 회장은 문무를 겸비하고 친구도 많아, 항상 화제의 중심에 있다」"

[[dialogue]]
speaker = "モネ"
original = "「モネは密かに会長に憧れていたが、彼は手の届かない遠い存在。同じ学園に在籍していても２人が交わることはない──はずだった」"
translation = "「모네는 남몰래 회장을 동경하고 있었지만, 그는 손이 닿지 않는 먼 존재. 같은 학원에 재적하고 있어도 두 사람이 섞일 일은 없다── 없어야 했다」"

[[dialogue]]
speaker = "モネ"
original = "「しかしモネはある日突然呼び出されて会長に告白される。モネは承諾の返事をしたが、即座に肉体関係を迫られた」"
translation = "「하지만 모네는 어느 날 갑자기 호출되어 회장에게 고백받는다. 모네는 승낙의 대답을 했지만, 즉시 육체관계를 강요당했다」"

[[dialogue]]
speaker = "モネ"
original = "「困惑しながらも、相手はあの会長なのだからと体を許してしまう」"
translation = "「당혹스러워하면서도, 상대는 그 회장이니까라며 몸을 허락하고 만다」"

[[dialogue]]
speaker = "モネ"
original = "「それ以来、たびたび会長に体を求められた。滅多に人の来ない書庫は都合が良く、会長にとって図書館は肉欲を満たすための場所になっていた」"
translation = "「그 이후로, 수시로 회장에게 몸을 요구받았다. 좀처럼 사람이 오지 않는 서고는 형편이 좋았고, 회장에게 도서관은 육욕을 채우기 위한 장소가 되어 있었다」"

[[dialogue]]
speaker = "モネ"
original = "「あの……学園でこういうことするのって、やっぱり良くないと思うんです……」"
translation = "「저기…… 학원에서 이런 짓을 하는 건, 역시 좋지 않다고 생각해요……」"

[[dialogue]]
speaker = "モネ"
original = "「何度もしてるんだから今さらだろ。モネだって期待してるくせに」"
translation = "「몇 번이나 했으면서 이제 와서 새삼스럽게. 모네 너도 기대하고 있는 주제에」"

[[dialogue]]
speaker = "モネ"
original = "「会長の言う通り、まだ触られていないにもかかわらず、モネの秘裂は蜜で濡れていた。逃げられないとモネの体はすでに悟っているのだ」"
translation = "「회장의 말대로, 아직 만져지지 않았음에도 불구하고, 모네의 비열은 꿀로 젖어 있었다. 도망칠 수 없다고 모네의 몸은 이미 깨닫고 있는 것이다」"

[[dialogue]]
speaker = "unk"
original = "小説の中の彼女になりきるように、モネの陰裂からにじんだ愛液がわずかに光る。"
translation = "소설 속의 그녀가 된 것처럼, 모네의 음열에서 배어 나온 애액이 희미하게 빛난다."

[[dialogue]]
speaker = "unk"
original = "それを見ただけで、俺のペニスが脈打ってさらに屹立した。"
translation = "그것을 본 것만으로도, 내 페니스가 맥동하며 더욱 우뚝 솟았다."

[[dialogue]]
speaker = "モネ"
original = "「もし見つかったら大変ですし……その……せめて他の場所で……」"
translation = "「만약 들키면 큰일이고…… 그…… 적어도 다른 장소에서……」"

[[dialogue]]
speaker = "モネ"
original = "「口では止めようとするものの、抵抗らしい抵抗を見せないモネ。会長はそれを見透かし、いきり立った肉棒を突き立てた──」"
translation = "「입으로는 멈추려 하지만, 저항다운 저항을 보이지 않는 모네. 회장은 그것을 꿰뚫어 보고, 발기한 육봉을 들이밀었다──」"

[[dialogue]]
speaker = "モネ"
original = "「んん～っ……怒張したペニスが、媚肉をかき分けて……モネの中に……んっ……はぁ……入って、いく……」"
translation = "「응응~…… 노장한 페니스가, 미육을 헤치고…… 모네의 안에…… 응…… 하아…… 들어, 가……」"

[[dialogue]]
speaker = "unk"
original = "小説を再現するようにモネの中に侵入していくと、小さな口から甘い嬌声が漏れる。"
translation = "소설을 재현하듯 모네의 안으로 침입해 들어가자, 작은 입에서 달콤한 교성이 새어 나온다."

[[dialogue]]
speaker = "モネ"
original = "「モネの中を押し広げる、熱くて硬い感触。体がよく知っている男の肉棒の味だ」"
translation = "「모네의 안을 밀어 넓히는, 뜨겁고 단단한 감촉. 몸이 잘 알고 있는 남자의 육봉 맛이다」"

[[dialogue]]
speaker = "モネ"
original = "「蜜壺を埋める肉の感触に、体が歓喜し……んっ……きゅぅっと膣が締まるのが自分でもわかった」"
translation = "「꿀단지를 채우는 살의 감촉에, 몸이 환희하고…… 응…… 꽉 질이 조여지는 것을 스스로도 알 수 있었다」"

[[dialogue]]
speaker = "unk"
original = "読むのと同時にモネの中が収縮し、肉壁がペニスを締め付けた。"
translation = "읽는 것과 동시에 모네의 안이 수축하며, 육벽이 페니스를 조여 왔다."

[[dialogue]]
speaker = "unk"
original = "蜜で潤った膣は熱く、柔らかな肉に包まれて快感が駆け上る。"
translation = "꿀로 윤기 나는 질은 뜨겁고, 부드러운 살에 감싸여 쾌감이 치달았다."

[[dialogue]]
speaker = "モネ"
original = "「自身の中に押し込まれた、雄々しいペニスの硬さに下半身が疼く。あ……はぁ……呼吸すると膣が締まり、膨らんだカリの形まで感じ取れた」"
translation = "「자신 안에 밀어 넣어지는, 웅장한 페니스의 단단함에 하반신이 욱신거린다. 아…… 하아…… 호흡하면 질이 조여지고, 부풀어 오른 귀두의 모양까지 느껴졌다」"

[[dialogue]]
speaker = "モネ"
original = "「んっ……ふ……ぁん……会長が腰を揺らす度に、肉棒と粘膜が擦れ合う。んぁっ、あんっ……ペニスが肉ひだをなぞり……快楽の熱がモネの思考を溶かしていく」"
translation = "「응…… 후…… 앙…… 회장이 허리를 흔들 때마다, 육봉과 점막이 서로 스친다. 응앗, 앙…… 페니스가 살주름을 덧그리고…… 쾌락의 열기가 모네의 사고를 녹여 간다」"

[[dialogue]]
speaker = "モネ"
original = "「ほら、やっぱり悦んでるじゃ、ないか。嬉しそうに……締め付けてくる」"
translation = "「봐, 역시 기뻐하고 있잖아. 기쁜 듯이…… 조여 오고 있어」"

[[dialogue]]
speaker = "モネ"
original = "「そ、そんなこと言わないでください……んっ……ふあぁっ……<emoji=heart04>\u3000はぁ、はぁ……あ……んんっ……<emoji=heart04>」"
translation = "「그, 그런 말씀 하지 마세요…… 응…… 후아앗……<emoji=heart04> 하아, 하아…… 아…… 응응……<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「ん……はぁ……いつでもセックスできる都合のいい女として使われていることは、モネも薄々理解していた」"
translation = "「응…… 하아…… 언제든 섹스할 수 있는 형편 좋은 여자로 이용당하고 있다는 것을, 모네도 어렴풋이 이해하고 있었다」"

[[dialogue]]
speaker = "モネ"
original = "「しかしモネは恋人という関係に縋りたくて……会長を拒絶できないでいた」"
translation = "「하지만 모네는 연인이라는 관계에 매달리고 싶어서…… 회장을 거절하지 못하고 있었다」"

[[dialogue]]
speaker = "unk"
original = "小説の中の２人は架空の人物だが、ペニスでつながっている感触は紛れもなく本物で、ピストンを繰り返すうちに蜜の量も増していく。"
translation = "소설 속의 두 사람은 가공의 인물이지만, 페니스로 이어져 있는 감촉은 틀림없는 진짜로, 피스톤을 반복하는 동안 꿀의 양도 늘어간다."

[[dialogue]]
speaker = "モネ"
original = "「はっ、あっ……んん～っ……<emoji=heart04>\u3000会長は、使い勝手は知っていると言わんばかりに……何度も肉棒を抜き挿しして、道具を使うように、モネの蜜壺を味わう……んっ<emoji=heart04>」"
translation = "「핫, 앗…… 응응~……<emoji=heart04> 회장은, 사용법은 알고 있다는 듯이…… 몇 번이고 육봉을 넣었다 뺐다 하며, 도구를 사용하듯, 모네의 꿀단지를 맛본다…… 응<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「会長に突かれ、柔らかそうな胸が、ふるふると揺れる……ん──んんっ<emoji=heart04>\u3000モネは声を殺そうとするが……はぁ……甘い喘ぎは抑えきれて、いなかった……あんっ……<emoji=heart04>」"
translation = "「회장에게 찔려, 부드러워 보이는 가슴이, 흔들흔들 흔들린다…… 응──응응<emoji=heart04> 모네는 목소리를 죽이려 하지만…… 하아…… 달콤한 신음은 억누르지 못하고 있었다…… 앙……<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「ふぁああっ……あっ……はっ、はんっ<emoji=heart04>\u3000肉棒を受け入れる穴は、いつの間にか蜜が洪水のように溢れ……ふあぁ……いやらしい音を、響かせる……っ<emoji=heart04>」"
translation = "「후아아앗…… 앗…… 핫, 한<emoji=heart04> 육봉을 받아들이는 구멍은, 어느새 꿀이 홍수처럼 넘쳐…… 후아아…… 천박한 소리를, 울려 퍼뜨린다……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "下半身に意識を集中させると、モネの中の感触を強く感じる。"
translation = "하반신에 의식을 집중하자, 모네의 안의 감촉이 강하게 느껴진다."

[[dialogue]]
speaker = "モネ"
original = "「はあぁ、はぁ……はぁっ……激しいです、会長……あっ……ん……ふああっ<emoji=heart04>」"
translation = "「하아아, 하아…… 하앗…… 격렬해요, 회장님…… 앗…… 응…… 후아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "蜜で蕩けた粘膜がペニスに絡みつき、男を悦ばせるようにきゅっと繰り返し収縮する。"
translation = "꿀로 녹아내린 점막이 페니스에 휘감기며, 남자를 기쁘게 하려는 듯 꽉꽉 반복해서 수축한다."

[[dialogue]]
speaker = "unk"
original = "すると肉ひだが隙間なく密着し、柔らかな肉に圧迫されて快感を生んだ。"
translation = "그러자 살주름이 빈틈없이 밀착되고, 부드러운 살에 압박되어 쾌감을 낳았다."

[[dialogue]]
speaker = "モネ"
original = "「くっ……具合が、良くなってきたな。相変わらず、ここの使い心地は最高だ」"
translation = "「큭…… 기분이 좋아졌군. 여전히, 여기의 사용감은 최고야」"

[[dialogue]]
speaker = "モネ"
original = "「そんな……ひどい、です……ん──ひやああっ<emoji=heart04>\u3000はぁ、はんっ……ふ……ふぁああっ<emoji=heart04>」"
translation = "「그런…… 너무해, 요…… 응──히야아앗<emoji=heart04> 하아, 한…… 후…… 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "会長の心無い扱いに涙をにじませるモネ。"
translation = "회장의 무정한 취급에 눈물을 글썽이는 모네."

[[dialogue]]
speaker = "unk"
original = "だが……"
translation = "하지만……"

[[dialogue]]
speaker = "モネ"
original = "「ひあぁっ<emoji=heart04>\u3000会長が胸の先端に触れると……快感を示すように、モネの乳首は硬く、なっていた……はぁはぁ……はっ、んんっ……<emoji=heart04>」"
translation = "「히아앗<emoji=heart04> 회장이 가슴 끝을 만지자…… 쾌감을 나타내듯, 모네의 유두는 딱딱하게 되어 있었다…… 하아하아…… 핫, 응응……<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「ふぁっ、あっ、んっ<emoji=heart04>\u3000乳首をいやらしく立たせているモネを見て、会長は、嘲笑を……浮かべる……ひぁっ、はぁ……あっ──んぅ──っ<emoji=heart04>」"
translation = "「후앗, 앗, 응<emoji=heart04> 유두를 음란하게 세우고 있는 모네를 보고, 회장은, 비웃음을…… 띄운다…… 히앗, 하아…… 앗──응으──읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "小説をなぞってモネの乳首をいじると、確かにツンと硬くなっていた。"
translation = "소설을 따라 모네의 유두를 만지자, 확실히 꼿꼿하게 굳어 있었다."

[[dialogue]]
speaker = "unk"
original = "ピンク色の先端を押しつぶすように摘まんでやる。"
translation = "분홍색 끝부분을 짓누르듯 집어 준다."

[[dialogue]]
speaker = "モネ"
original = "「ほら……乳首もこんなになってるぞ……下も、ずぶ濡れだ」"
translation = "「봐…… 유두도 이렇게 됐어…… 아래도, 흠뻑 젖었네」"

[[dialogue]]
speaker = "モネ"
original = "「はぁ、あっ……んんっ<emoji=heart04>\u3000言わないで、くださ……いっ……はぁ、はっ、あっ──あんっ<emoji=heart04>」"
translation = "「하아, 앗…… 응응<emoji=heart04> 말하지 말아 주세…… 요…… 하아, 핫, 앗──앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "胸を刺激されてさらにあふれ出す蜜。"
translation = "가슴을 자극받아 더욱 넘쳐흐르는 꿀."

[[dialogue]]
speaker = "unk"
original = "ほど良い大きさの乳房を揉みしだきながら、ペニスを膣壁に擦りつける。"
translation = "적당한 크기의 유방을 주무르면서, 페니스를 질벽에 문지른다."

[[dialogue]]
speaker = "モネ"
original = "「ひぁっ……おっぱい、触られて……あっ、ん……会長の、大きいです……っ<emoji=heart04>\u3000中、かき混ぜられて……そんなに、突かれたら……はぁ、あぁっ──ああぁ～っ<emoji=heart04>」"
translation = "「히앗…… 가슴, 만져져서…… 앗, 응…… 회장님 거, 커요……<emoji=heart04> 안쪽, 휘저어져서…… 그렇게, 찔리면…… 하아, 아앗──아아아~<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「はぁっ、あっ……会長は、モネを征服するように、唇に荒々しく舌を差し入れる……」"
translation = "「하앗, 앗…… 회장은, 모네를 정복하듯, 입술에 거칠게 혀를 밀어 넣는다……」"

[[dialogue]]
speaker = "モネ"
original = "「んっちゅっ、ちゅぱっ、ちゅる<emoji=heart04>\u3000んれるれる、れぇろ……んっ、れる、ちゅぱっ、ぴちゃ、じゅるるるっ<emoji=heart04>」"
translation = "「응쮸, 쮸빠, 쮸르<emoji=heart04> 응레로레로, 레에로…… 응, 레로, 쮸빠, 삐쨔, 쥬르르르<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「ちゅくるっ、ちゅっ、ちゅるっ、じゅくっ<emoji=heart04>\u3000んふ、れろ、れる……ちゅぱっ、ちゅくっ……んんっ……れろれろれろ、じゅるるんっ<emoji=heart04>」"
translation = "「쮸쿠르, 쮸, 쮸르, 쥬쿠<emoji=heart04> 응후, 레로, 레로…… 쮸빠, 쮸쿠…… 응응…… 레로레로레로, 쥬르른<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「ぷぁ……モネの口内を無遠慮に舐め回す、蹂躙するようなキス……」"
translation = "「푸하…… 모네의 구강을 사정없이 핥아대는, 유린하는 듯한 키스……」"

[[dialogue]]
speaker = "モネ"
original = "「なのに情欲の火はさらに燃え、モネの体を疼かせる……」"
translation = "「그런데도 정욕의 불길은 더욱 타올라, 모네의 몸을 욱신거리게 한다……」"

[[dialogue]]
speaker = "モネ"
original = "「ふわぁっ、あっ、はぁんっ……あそこ、熱くて……おかしく、なって……しまいます……んん～～っ<emoji=heart04>」"
translation = "「후아앗, 앗, 하앙…… 거기, 뜨거워서…… 이상해져, 버려요…… 응응~~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "朗読に嬌声が混じり、小説のセリフか、それとも本物の喘ぎか区別がつかない。"
translation = "낭독에 교성이 섞여, 소설의 대사인지, 아니면 진짜 신음인지 구분이 가지 않는다."

[[dialogue]]
speaker = "unk"
original = "声を上げるモネをさらに責め立てるように、奥めがけてペニスを突き入れる。"
translation = "소리를 지르는 모네를 더욱 몰아붙이듯, 안쪽을 향해 페니스를 찔러 넣는다."

[[dialogue]]
speaker = "モネ"
original = "「ひぁ～～～～～っ<emoji=heart04>\u3000ふぁっ、あっ、ああぁっ……<emoji=heart04>\u3000あっ、はぁ、はんっ……あ──ひやぁああっ<emoji=heart04><emoji=heart04>」"
translation = "「히아~~~~~<emoji=heart04> 후앗, 앗, 아아앗……<emoji=heart04> 앗, 하아, 한…… 아──히야아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "会長役を交代し、あえて冷たい声を作ってモネを問い詰める。"
translation = "회장 역을 교대하여, 일부러 차가운 목소리를 만들어 모네를 추궁한다."

[[dialogue]]
speaker = "クロト"
original = "「ずいぶんいい声を出すじゃないか。大人しそうな顔してるくせして、強引に迫られてよがるなんて変態だな」"
translation = "「제법 좋은 소리를 내잖아. 얌전한 얼굴을 하고선, 강제로 몰아붙여지니 느끼다니 변태로군」"

[[dialogue]]
speaker = "モネ"
original = "「ち、違いま──あっ──はぁ、はっ、はんっ……ぁ──んん～～っ<emoji=heart04>」"
translation = "「아, 아니에──앗──하아, 핫, 한…… 아──응응~~<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「正直に言わないとやめるぞ？」"
translation = "「솔직하게 말하지 않으면 그만두겠어」"

[[dialogue]]
speaker = "モネ"
original = "「っ──！？\u3000ダメ……ダメです……っ<emoji=heart04>\u3000あ、んっ……会長の恋人だから、ちゃんとエッチ、しないと……んんっ<emoji=heart04>」"
translation = "「──!? 안 돼…… 안 돼요……<emoji=heart04> 아, 응…… 회장님의 연인이니까, 제대로 섹스, 해야 하니까…… 응응<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「ふぁああっ、あっ、あっ、あんっ<emoji=heart04>\u3000気持ちいい……はぁ、あっ、あんっ……会長のおち○ちん、気持ちいいですぅ……っ<emoji=heart04>」"
translation = "「후아아앗, 앗, 앗, 앙<emoji=heart04> 기분 좋아…… 하아, 앗, 앙<emoji=heart04> 회장님 자지, 기분 좋아요……<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「おま○こ熱いぃっ……<emoji=heart04>\u3000あっ、はっ、はんっ……会長のおち○ちんで、おま○こ気持ちいいっ……んぁああっ<emoji=heart04>\u3000おち○ちん、抜いちゃダメぇ……<emoji=heart04>」"
translation = "「보지 뜨거워어……<emoji=heart04> 앗, 핫, 한…… 회장님 자지로, 보지 기분 좋아…… 응아아앗<emoji=heart04> 자지, 빼면 안 돼애……<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「はっ……ぁんっ……会長に媚びるように、甘い声で喘ぎ……卑猥な言葉で肉棒に縋るモネ……」"
translation = "「핫…… 앙…… 회장에게 아양 떨듯, 달콤한 목소리로 신음하며…… 비속한 말로 육봉에 매달리는 모네……」"

[[dialogue]]
speaker = "モネ"
original = "「だが、膣壁は、悦びを表すように……震えながら、ペニスを締め付ける……ふぁ、あっ、はあぁっ<emoji=heart04>」"
translation = "「하지만, 질벽은, 기쁨을 나타내듯…… 떨면서, 페니스를 조여 온다…… 후아, 앗, 하아아<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「もっと、もっとぉ……もっと突いてぇ……っ<emoji=heart04>\u3000あ、あ、あ──は──んんっ<emoji=heart04>\u3000モネのおま○こ、たくさん使ってくださいぃ……っ<emoji=heart04>」"
translation = "「더, 더어…… 더 찔러 줘요……<emoji=heart04> 아, 아, 아──하──응응<emoji=heart04> 모네의 보지, 잔뜩 사용해 주세요……<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「もはや……会長の恋人など、関係ない……何度も会長の肉棒を受け入れ、モネは快楽の奴隷になって、いた……っ<emoji=heart04>」"
translation = "「이제는…… 회장의 연인 따위, 상관없다…… 몇 번이고 회장의 육봉을 받아들여, 모네는 쾌락의 노예가 되어 있었다……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺も小説の会長になったようにモネの体を貪る。"
translation = "나도 소설 속의 회장이 된 것처럼 모네의 몸을 탐한다."

[[dialogue]]
speaker = "unk"
original = "俺もモネも、快楽を得ることしか考えられなくなって、しゃにむに腰を振っていた。"
translation = "나도 모네도, 쾌락을 얻는 것밖에 생각할 수 없게 되어, 정신없이 허리를 흔들고 있었다."

[[dialogue]]
speaker = "モネ"
original = "「ん、ん、ん──んぅ～～っ<emoji=heart04>\u3000会長のおち○ちん気持ちいいですっ……<emoji=heart04>\u3000いっぱい突かれてっ……おち○ちん、好きですぅ<emoji=heart04>」"
translation = "「응, 응, 응──응으~~<emoji=heart04> 회장님 자지 기분 좋아요……<emoji=heart04> 잔뜩 찔려서…… 자지, 좋아해요<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「はぁっ、はぁっ、はっ……あぁんっ<emoji=heart04>\u3000はっ、はっ、んっ……あ──んん……っ！？\u3000今、お腹の中で、おち○ちんビクッてしましたぁ……っ<emoji=heart04>」"
translation = "「하앗, 하앗, 핫…… 아앙<emoji=heart04> 핫, 핫, 응…… 아──응응……!? 지금, 배 속에서, 자지가 움찔했어요……<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「はぁはぁ……んっ……会長のペニスが、モネの中で、ドクドクと、跳ねる……限界が近づいている、合図だ……」"
translation = "「하아하아…… 응…… 회장의 페니스가, 모네의 안에서, 움찔움찔하며, 뛴다…… 한계가 다가오고 있다는, 신호다……」"

[[dialogue]]
speaker = "モネ"
original = "「男の……雄の……種を植え付けるという本能が……はぁ……モネを、征服しようと、していた……っ」"
translation = "「남자의…… 수컷의…… 씨를 심는다는 본능이…… 하아…… 모네를, 정복하려 하고 있었다……」"

[[dialogue]]
speaker = "モネ"
original = "「あぁっ、あっ、ふぁああっ<emoji=heart04>\u3000はっ、はっ、はっ──ああぁんっ<emoji=heart04>\u3000会長の精液、中に、出してくださいっ……私の、お腹の、中に──っ<emoji=heart04>」"
translation = "「아앗, 앗, 후아아앗<emoji=heart04> 핫, 핫, 핫──아아앙<emoji=heart04> 회장님 정액, 안에, 내보내 주세요…… 제, 배, 안에──<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「いつもみたいに、奥に……あ、あんっ<emoji=heart04>\u3000モネの、子宮に、思い切り射精してくださいっ<emoji=heart04><emoji=heart04>」"
translation = "「평소처럼, 깊숙이…… 아, 앙<emoji=heart04> 모네의, 자궁에, 마음껏 사정해 주세요<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「はぁ、はぁ、あんっ……<emoji=heart04>\u3000会長は雄の本能に従うように、爆発寸前の肉棒で、子宮を荒々しく、突き上げ、る……っ<emoji=heart04>」"
translation = "「하아, 하아, 앙……<emoji=heart04> 회장은 수컷의 본능에 따르듯, 폭발 직전의 육봉으로, 자궁을 거칠게, 찔러 올린다……<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「あ、あ、あ──おち○ちん、奥、当たって──ふぁああっ<emoji=heart04>\u3000あ──あ──ん──おま○こイッちゃいますぅっ──」"
translation = "「아, 아, 아── 자지, 안쪽, 닿아서── 후아아앗<emoji=heart04> 아── 아── 응── 보지 가 버려요──」"

[[dialogue]]
speaker = "モネ"
original = "「ひやぁあああ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あっ──はっ──んんぅ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「히야아아아~~~~~~~~~~~~~~~~~<emoji=heart04><emoji=heart04><emoji=heart04> 앗── 핫── 응응으~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「モネの中でペニスが脈打ち、会長の欲望がほとばし……る……っ<emoji=heart04>\u3000ふああぁっ、あっ……んっ……んっ……んぅ～っ<emoji=heart04>」"
translation = "「모네의 안에서 페니스가 맥동하고, 회장의 욕망이 뿜어져…… 나온다……<emoji=heart04> 후아아앗, 앗…… 응…… 응…… 응으~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "奥深くで射精を受け止め、足を大きく開いたまま震えるモネ。"
translation = "깊숙한 곳에서 사정을 받아내고, 다리를 크게 벌린 채 떨고 있는 모네."

[[dialogue]]
speaker = "unk"
original = "普段はおとなしくて控えめなモネが、激しく乱れるのがひどくいやらしい。"
translation = "평소에는 얌전하고 조심스러운 모네가, 격렬하게 흐트러지는 것이 몹시 음란하다."

[[dialogue]]
speaker = "モネ"
original = "「んっ……はっ、はぁ……膣が生き物のようにうねり……精液をねだるように、肉棒を締め付け──る……っ<emoji=heart04>」"
translation = "「응…… 핫, 하아…… 질이 생물처럼 꿈틀거리며…… 정액을 조르듯, 육봉을 조여──온다……<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「亀頭が、子宮口に、密着し……熱くたぎった精液を……はぁっ……<emoji=heart04>\u3000無遠慮に、モネの子宮に注ぎ込む……っ<emoji=heart04>」"
translation = "「귀두가, 자궁구에, 밀착되어…… 뜨겁게 끓어오른 정액을…… 하앗……<emoji=heart04> 사정없이, 모네의 자궁에 쏟아붓는다……<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「はあぁっ、はぁっ……モネは、体の内側から焼かれるような快感に悶え……雌の本能に、打ち震えて、いた…………ん……っ<emoji=heart04>」"
translation = "「하아아앗, 하아앗…… 모네는, 몸 안쪽에서 타오르는 듯한 쾌감에 몸부림치며…… 암컷의 본능에, 전율하고 있었다………… 응……<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「はぁ……はぁ……会長ので……お腹いっぱい……ですぅ……<emoji=heart04>」"
translation = "「하아…… 하아…… 회장님 걸로…… 배가 가득…… 차 버렸어요……<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「モネは、子宮に溜まった会長の熱を感じながら……満足そうに、快楽の余韻に<ruby>揺蕩<rt>たゆた</rt></ruby>っていた……」"
translation = "「모네는, 자궁에 고인 회장의 열기를 느끼며…… 만족스러운 듯, 쾌락의 여운에 잠겨 있었다……」"

[[dialogue]]
speaker = "unk"
original = "律動がようやく収まり、つながったところから白い精液が溢れてどろりと垂れてくる。"
translation = "율동이 겨우 잦아들고, 이어진 곳에서 하얀 정액이 넘쳐흘러 걸쭉하게 떨어진다."

[[dialogue]]
speaker = "unk"
original = "息が落ち着くと、ようやく役を離れて元の自分たちに戻った。"
translation = "숨이 가라앉자, 겨우 역에서 벗어나 원래의 자신들로 돌아왔다."

[[dialogue]]
speaker = "モネ"
original = "「ふぅ……すごいイッちゃいました……」"
translation = "「후우…… 엄청 가 버렸어요……」"

[[dialogue]]
speaker = "モネ"
original = "「ここだと本のみんなに見られてるみたいで、しかもあんなに恥ずかしいことまで言って……思い出すと発火しちゃいそうです……」"
translation = "「여기 있으면 책 속의 모두가 보고 있는 것 같고, 게다가 그런 부끄러운 말까지 해서…… 떠올리면 발화해 버릴 것 같아요……」"

[[dialogue]]
speaker = "unk"
original = "乱れていた時はエッチだったけど、こうして照れているところは小動物っぽくてかわいらしい。"
translation = "흐트러졌을 때는 야했지만, 이렇게 수줍어하는 모습은 소동물 같아서 사랑스럽다."

[[dialogue]]
speaker = "モネ"
original = "「でも小説の図書委員の彼女はこの後どうなるんでしょう？\u3000会長が飽きたら捨てられちゃうんでしょうか。それとも会長が彼女に本気になる可能性も……？」"
translation = "「그렇지만 소설 속 도서위원인 그녀는 이 뒤에 어떻게 될까요? 회장님이 질리면 버려지는 걸까요. 아니면 회장님이 그녀에게 진심이 될 가능성도……?」"

[[dialogue]]
speaker = "unk"
original = "激しく交わった直後なのに、小説の内容が気になるあたりさすがモネだった。"
translation = "격렬하게 섞인 직후인데도, 소설의 내용이 궁금한 점은 역시 모네다웠다."

[[dialogue]]
speaker = "unk"
original = "だけど少し不安げな表情になって俺に尋ねる。"
translation = "하지만 조금 불안한 표정이 되어 나에게 묻는다."

[[dialogue]]
speaker = "モネ"
original = "「あの……私は会長にとって都合のいい女じゃないですよね？\u3000もちろん会長はそんな人じゃないってわかってますけど……」"
translation = "「저기…… 저는 회장님께 형편 좋은 여자가 아니죠? 물론 회장님이 그런 분이 아니라는 건 알고 있지만……」"

[[dialogue]]
speaker = "モネ"
original = "「あっ、でもでも、会長からしたら私なんて釣り合わないですし、それでも仕方ないですよね……」"
translation = "「앗, 하지만 하지만, 회장님 입장에서 보면 저 같은 건 어울리지 않고, 그래도 어쩔 수 없겠죠……」"

[[dialogue]]
speaker = "クロト"
original = "「そんなことないよ」"
translation = "「그럴 리 없잖아」"

[[dialogue]]
speaker = "unk"
original = "愛しい気持ちを込めて、かわいらしい唇にキスをする。"
translation = "사랑스러운 마음을 담아, 귀여운 입술에 키스를 한다."

[[dialogue]]
speaker = "モネ"
original = "「んっ……ちゅっ……えへへ、ありがとうございます。やっぱりキスすると胸がポカポカします」"
translation = "「응…… 쮸…… 에헤헤, 감사합니다. 역시 키스하면 가슴이 포근해져요」"

[[dialogue]]
speaker = "unk"
original = "だけど軽いキスだけじゃ収まらなくて、深い口付けになっていく。"
translation = "하지만 가벼운 키스만으로는 멈추지 않고, 깊은 입맞춤으로 이어진다."

[[dialogue]]
speaker = "モネ"
original = "「んちゅっ、ちゅっ、ちゅるるっ……れろれろ……ぴちゃ、れろ、れろ、んちゅるる<emoji=heart04>\u3000ぷぁ……またエッチなキスしちゃいました<emoji=heart04>」"
translation = "「응쮸, 쮸, 쮸르르…… 레로레로…… 삐쨔, 레로, 레로, 응쮸르르<emoji=heart04> 푸하…… 또 야한 키스 해버렸네요<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「本を読みながらエッチすると、自分じゃない人になれて……なんていうかその、興奮がすごいですね」"
translation = "「책을 읽으면서 섹스하면, 자신이 아닌 사람이 될 수 있어서…… 뭐랄까 그, 흥분이 엄청나네요」"

[[dialogue]]
speaker = "モネ"
original = "「……次はどの本にしましょうか？」"
translation = "「……다음은 어떤 책으로 할까요?」"

