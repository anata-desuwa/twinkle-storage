[[dialogue]]
speaker = "unk"
original = "第２話,居候ウィステリアさん,P"
translation = "제2화, 식객 위스테리아 씨"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「うぅ……不運だわ……」"
translation = "「으으…… 불운해……」"

[[dialogue]]
speaker = "unk"
original = "魔将になったせいですか？"
translation = "마장이 된 탓인가요?"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「そうなのよ～……。実は元々住んでたマンションの部屋に、隕石が落っこちちゃって」"
translation = "「그렇다니까~……. 사실 원래 살던 맨션 방에 운석이 떨어져 버렸어」"

[[dialogue]]
speaker = "unk"
original = "隕石！？"
translation = "운석!?"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「それで私の部屋だけ住めなくなっちゃって、新しい物件が見つかるまでホテル暮らしなのよ」"
translation = "「그래서 내 방만 살 수 없게 돼서 새 매물을 찾을 때까지 호텔 생활 중이야」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「だから出費がかさむし、出勤にも時間がかかるし、踏んだり蹴ったりだわ」"
translation = "「그래서 지출도 늘어나고 출근에도 시간이 걸리고, 설상가상이라니까」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「新しい物件探しもしなくちゃいけないし、これじゃ私が世界を呪いたくなりそうよ……」"
translation = "「새로운 집도 알아봐야 하고, 이러다간 내가 세계를 저주하고 싶어질 것 같아……」"

[[dialogue]]
speaker = "unk"
original = "それならうちに来るのはどうですか？"
translation = "그렇다면 저희 집에 오는 건 어때요?"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「会長くんちに！？\u3000いいの！？」"
translation = "「회장군 집에!? 정말!?」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「それなら家賃もかからないし、通勤も短くなるし、大助かりだわ！\u3000何より会長くんと一緒にいられるしね♪」"
translation = "「그러면 집세도 안 들고 통근도 짧아지니 정말 큰 도움이 돼! 무엇보다 회장군과 함께 있을 수 있고 말이야♪」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「いや、ちょっと待って。会長くん、お母様と２人暮らしでしょ？\u3000学生ならともかく、いきなりこんな大人が上がりこんできたら、お母様が驚くわ」"
translation = "「아니, 잠깐 기다려봐. 회장군, 어머니랑 둘이 살잖아? 학생이라면 몰라도 갑자기 이런 어른이 들이닥치면 어머니께서 놀라실 거야」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「それに教師ではないとはいえ、学園職員が生徒と一緒に住むって、風紀的にいいのかしら……？」"
translation = "「게다가 교사는 아니라고 해도 학원 직원이 학생과 함께 산다는 게 풍기적으로 괜찮으려나……?」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「何かあったら怖いし、学園にも許可を取らないと……。会長くんも本当に大丈夫かどうか、お母様に聞いてみてね？」"
translation = "「무슨 일 생기면 무섭고 학원에도 허가를 받아야 하니까……. 회장군도 정말 괜찮은지 어머니께 여쭤봐 줘, 알았지?」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「何やってるの、ウィステリア。司書なのだから静かになさい」"
translation = "「뭐 하는 거지, 위스테리아. 사서니까 조용히 하도록」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「あなた、いつも私に厳しいわね。私のこと嫌いなの？」"
translation = "「당신, 언제나 나에게 엄격하네. 나 싫어해?」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「嫌いよ。あなたが英雄になればいいって、何度も言ってるのに。この怠惰魔族」"
translation = "「싫어한다. 네가 영웅이 되면 좋겠다고 몇 번이나 말했는데. 이 나태 마족」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「だからそれは無理って言ってるでしょうが。魔将システムは作ってあげたんだから、いい加減諦めなさい」"
translation = "「그러니까 그건 무리라고 말했잖아. 마장 시스템은 만들어 줬으니까 이제 그만 포기해」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「フン」"
translation = "「흥」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「まぁまぁ、リィベルさん。私も魔将の１人として頑張りますから」"
translation = "「자자, 리벨 씨. 저도 마장의 한 명으로서 열심히 할 테니까요」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「でもさっきのは少し声が大きかったので、気を付けてくださいね、ウィステリアさん」"
translation = "「하지만 방금 건 조금 목소리가 컸으니까 조심해 주세요, 위스테리아 씨」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「あ、はい、ごめんなさい……」"
translation = "「아, 네, 죄송해요……」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "（やっぱり図書館では紙屋敷さんが一番怖いわ……）"
translation = "(역시 도서관에서는 카미야시키 씨가 제일 무서워……)"

[[dialogue]]
speaker = "unk"
original = "その翌日、ウィステリアさんが我が家にやってきた。"
translation = "그 이튿날, 위스테리아 씨가 우리 집으로 찾아왔다."

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「学園の許可、出ちゃったわね……非常事態だからＯＫって言われちゃった」"
translation = "「학원 허가, 나버렸네…… 비상사태니까 OK라고 하더라고」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「会長くんのお母様も許してくれたけど、本当にいいのかしら？」"
translation = "「회장군 어머니께서도 허락해 주셨지만 정말 괜찮으려나?」"

[[dialogue]]
speaker = "unk"
original = "ようこそ我が家へ！"
translation = "우리 집에 오신 걸 환영해요!"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「ありがとう、会長くん。そこまで言われたら、遠慮するのも失礼ね。ありがたくお世話になるわ」"
translation = "「고마워, 회장군. 그렇게까지 말해주니 사양하는 것도 실례겠네. 감사히 신세 좀 질게」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「そうだ、住まわせてもらうんだから、家事とかは任せて！\u3000星見家メイド隊でバイトしてたこともあるから、こう見えても家事は得意なのよ」"
translation = "「맞다, 신세 지는 거니까 집안일 같은 건 맡겨줘! 호시미 가문 메이드대에서 아르바이트했던 적도 있으니까 이래 봬도 가사는 특기라고」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「あ、そろそろ夕飯の時間ね。腕によりをかけて作っちゃうわよ！」"
translation = "「아, 슬슬 저녁 시간이네. 솜씨 발휘해서 만들어 볼게!」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「は～い、お待たせ。あるものを使ったからカレーになっちゃったけど、言ってくれたら他のものも作れるわよ」"
translation = "「자~ 오래 기다렸지. 있는 재료를 쓰다 보니 카레가 됐지만 말해주면 다른 것도 만들 수 있어」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「それじゃ……いただきます」"
translation = "「그럼…… 잘 먹겠습니다」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「ん？\u3000じっと見つめてどうしたの、会長くん？」"
translation = "「응? 빤히 쳐다보고 왜 그래, 회장군?」"

[[dialogue]]
speaker = "unk"
original = "ウィステリアさんにあ～んしてほしいです！"
translation = "위스테리아 씨가 아~앙 해줬으면 좋겠어요!"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「ええっ！？\u3000いや、あ～んするのは初めてじゃないけど、照れるわね……」"
translation = "「에엣!? 아니, 아~앙 해주는 게 처음은 아니지만 부끄럽네……」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「でも、いいわよ。君がしてほしいならもちろんしてあげるわ」"
translation = "「하지만 좋아. 네가 원한다면 물론 해줘야지」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「はい、あ～ん。……どう、美味しい？」"
translation = "「자, 아~앙. ……어때, 맛있어?」"

[[dialogue]]
speaker = "unk"
original = "程よい辛さでとっても美味しいです！"
translation = "적당히 매콤해서 정말 맛있어요!"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「ふふふ、ありがと。大人向けにピリッとする辛さにしてみたんだけど、会長くんは気に入ってくれたみたいね」"
translation = "「후후후, 고마워. 어른 입맛에 맞게 매콤하게 해봤는데 회장군 마음에 든 모양이네」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「じゃあ私も、あ～んするのお願いしていい？\u3000あ～……んっ」"
translation = "「그럼 나도 아~앙 해달라고 부탁해도 될까? 아~…… 앙」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「ふふ、自分で作ったカレーだけど、会長くんが食べさせてくれるともっと美味しいわ。ありがとね」"
translation = "「후후, 직접 만든 카레지만 회장군이 먹여주니까 훨씬 맛있네. 고마워」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「じー……」"
translation = "「지익──」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「きゃひぃっ！？\u3000リ、リノさん、いつからお戻りに！？」"
translation = "「꺄힉!? 리, 리노 씨, 언제 돌아오셨어요!?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「いいのいいの、私のことは気にせずどうぞ♪」"
translation = "「괜찮아 괜찮아, 내 쪽은 신경 쓰지 말고 계속해♪」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ちなみに、ウィステリアちゃんがあ～んしてあげてるところから見てたわよ」"
translation = "「참고로 위스테리아 양이 아~앙 해주고 있는 부분부터 보고 있었단다」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「ばっちり見られてた！？」"
translation = "「딱 걸렸어!?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「いや～、まさかクロトの彼女が、あのウィステリアちゃんだとは思わなかったわ。英雄は惹かれ合うのかしら」"
translation = "「이야~ 설마 쿠로토의 여자친구가 그 위스테리아 양일 줄은 몰랐네. 영웅은 서로 끌리는 걸까」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「いいい、いえっ、ワタクシはただのしがない司書でございますよ！？」"
translation = "「아아, 아니요! 저, 저는 그저 평범한 사서일 뿐입니다요!?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「またまた～、謙遜しなくていいのよ。『千年に一度の英雄』だもの」"
translation = "「또 또~ 겸손 떨지 않아도 된단다. 『천년에 한 번 나올 영웅』인걸」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「はぅっ！？」"
translation = "「하윽!?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「あれ、悪いこと言っちゃった？」"
translation = "「어라, 나쁜 말이라도 했니?」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「いえその、その呼び方は遠慮していただきたいと存じますか……忘れてほしいと言いますか……」"
translation = "「아니 그게, 그 호칭은 삼가 주셨으면 합니다만…… 잊어주셨으면 한다고나 할까……」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「あら、そうなの。ごめん、気を付けるようにするわ」"
translation = "「어머, 그랬구나. 미안, 조심하도록 할게」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「でも本当に驚いたのよ。ウィステリアちゃんのことは前から聞いていたけど、実際に見るとますます凄いわ」"
translation = "「하지만 정말 놀랐단다. 위스테리아 양의 이야기는 전부터 들었지만 실제로 보니 점점 더 대단하네」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「あなたの持つ魔導書には強大な魔力と呪いが宿っている。熟練の大魔女でも手に余る、国すら滅ぼしかねない呪いよ」"
translation = "「네가 가진 마도서에는 강대한 마력과 저주가 깃들어 있어. 숙련된 대마녀라도 감당하기 힘든, 나라조차 멸망시킬 수 있는 저주지」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「そんなものを若くして使いこなすなんて、天才中の天才としか言えないわ。魔王とは異なる英雄の資質ね」"
translation = "「그런 것을 젊은 나이에 다루다니 천재 중의 천재라고밖에 할 수 없구나. 마왕과는 다른 영웅의 자질이야」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「あ……ありがとうございます。でも私、英雄になりたいわけじゃないんです……」"
translation = "「아…… 감사합니다. 하지만 저, 영웅이 되고 싶은 건 아니에요……」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「あらあら。やっぱり気苦労はあるのね」"
translation = "「어머어머. 역시 고충은 있나 보구나」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「あ、そうそう。私、急な出張が決まっちゃって、しばらく家を空けるから。留守はよろしくね２人とも！」"
translation = "「아, 맞다. 나 급한 출장이 잡혀서 당분간 집을 비울 거야. 집 좀 잘 부탁해, 둘 다!」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「はい、わかりました。任せてくださ──」"
translation = "「네, 알겠습니다. 맡겨주세──」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「えええええ～～～～～っ！！？」"
translation = "「에에에에에~~~~~엣!!?」"

[[dialogue]]
speaker = "unk"
original = "こうして、ウィステリアさんと２人きりで暮らす生活が始まったのだった。"
translation = "이렇게 위스테리아 씨와 단둘이 지내는 생활이 시작된 것이었다."

