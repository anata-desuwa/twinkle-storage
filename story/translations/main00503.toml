[[dialogue]]
speaker = "unk"
original = "第４話,第二階層の主,B"
translation = "제4화, 제2계층의 주인, B"

[[dialogue]]
speaker = "マグダレナ"
original = "「御子、こちらへ！」"
translation = "「미코, 이쪽으로!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「っ……マグダレナ！？」"
translation = "「읏…… 막달레나!?」"

[[dialogue]]
speaker = "フィオナ"
original = "「緋宮会長！\u3000敵襲です……！」"
translation = "「히노미야 회장! 적습입니다……!」"

[[dialogue]]
speaker = "クロト"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "unk"
original = "フィオナの冷静な一喝で、すぐに戦闘態勢に入ることができた。"
translation = "피오나의 냉정한 일갈로, 곧바로 전투 태세에 들어갈 수 있었다."

[[dialogue]]
speaker = "unk"
original = "しかし、先ほどの攻撃はヴィーナスを庇ったマグダレナさんに直撃……"
translation = "하지만, 방금 전의 공격은 비너스를 감싼 막달레나 씨에게 직격……"

[[dialogue]]
speaker = "マグダレナ"
original = "「ぐぅっ……ご心配なく。元よりこの身は、仮初のもの……。少しばかり、退場の時間が早まっただけです」"
translation = "「크윽…… 걱정하지 마십시오. 원래부터 이 몸은, 덧없는 것……. 아주 조금, 퇴장 시간이 빨라졌을 뿐입니다」"

[[dialogue]]
speaker = "マグダレナ"
original = "「しかし、この攻撃は──」"
translation = "「하지만, 이 공격은──」"

[[dialogue]]
speaker = "クロト"
original = "「──させるか！」"
translation = "「──하게 둘까!」"

[[dialogue]]
speaker = "unk"
original = "次いで放たれた二の矢には俺も反応し、振るわれた黄金の刃を逸らす。"
translation = "이어서 발사된 두 번째 화살에는 나도 반응하여, 휘둘러진 황금의 칼날을 빗나가게 한다."

[[dialogue]]
speaker = "マグダレナ"
original = "「アルモタヘル……貴女もでしたか」"
translation = "「아르모타헬…… 당신도였습니까」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「………………」"
translation = "「………………」"

[[dialogue]]
speaker = "クロト"
original = "「なんだ……あれ」"
translation = "「뭐지…… 저건」"

[[dialogue]]
speaker = "フィオナ"
original = "「『堕天使』です。アステラに囚われていたマグダレナ様も、あのような姿をされていました」"
translation = "「『타락천사』입니다. 아스테라에 갇혀 있던 막달레나 님도, 저러한 모습을 하고 계셨습니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「え、ええっ！？\u3000じゃあ、あの見た目で守護天使ってこと……！？」"
translation = "「에, 에엣!? 그럼, 저 모습으로 수호 천사라는 말이야……!?」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「人間。人間……魔族？\u3000天使？\u3000否──何ダ、その血」"
translation = "「인간. 인간…… 마족? 천사? 아니── 뭐냐, 그 피」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「なんだ。何者ダ、オマエ。何が混じってイル！」"
translation = "「뭐냐. 누구냐, 너. 무엇이 섞여 있나!」"

[[dialogue]]
speaker = "マグダレナ"
original = "「私のことも……覚えていないようですね。仕方ありません……くっ」"
translation = "「저에 대해서도…… 기억하지 못하는 것 같군요. 어쩔 수 없습니다…… 크읏」"

[[dialogue]]
speaker = "マグダレナ"
original = "「どうやら、私の体はここまでのようです……」"
translation = "「아무래도, 제 몸은 여기까지인 것 같습니다……」"

[[dialogue]]
speaker = "マグダレナ"
original = "「無様な退場の仕方で、申し訳ございません。どうか……同胞を頼みます」"
translation = "「볼품없는 퇴장 방식으로, 죄송합니다. 부디…… 동포를 부탁드립니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「はい。任されました」"
translation = "「네. 맡겠습니다」"

[[dialogue]]
speaker = "unk"
original = "フィオナが戦闘態勢を維持したままうなずくと、マグダレナさんの体はさらさらと砂のように宙へ消えていった。"
translation = "피오나가 전투 태세를 유지한 채 고개를 끄덕이자, 막달레나 씨의 몸은 스르륵 모래처럼 허공으로 사라졌다."

[[dialogue]]
speaker = "unk"
original = "落ち着け。大丈夫だ。"
translation = "진정해. 괜찮다."

[[dialogue]]
speaker = "unk"
original = "マグダレナさんの話を聞く限り、彼女は死んだわけではなく、本体の元へ還っただけだ。"
translation = "막달레나 씨의 이야기를 듣는 한, 그녀는 죽은 것이 아니라, 본체의 곁으로 돌아갔을 뿐이다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「よくわかんないけど……守護天使っていうなら、マグダレナは仲間だったんじゃないの？」"
translation = "「잘 모르겠지만…… 수호 천사라고 한다면, 막달레나는 동료였던 거 아니야?」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「仲間……？\u3000知らヌ。邪魔者は消すノミ」"
translation = "「동료……? 모른다. 방해자는 없앨 뿐」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふーん……なんかあったま来ちゃった。ぶっ飛ばしちゃおうかしら」"
translation = "「흐음…… 뭔가 열받아 버렸네. 날려버릴까」"

[[dialogue]]
speaker = "フィオナ"
original = "「正気ではありませんが、戦闘力はガーディアンの比ではありません。冷静に行きましょう」"
translation = "「제정신은 아니지만, 전투력은 가디언에 비할 바가 아닙니다. 냉정하게 갑시다」"

[[dialogue]]
speaker = "クロト"
original = "「……了解」"
translation = "「……알겠다」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「貴様、キサマ、貴様もダ！\u3000ナンだ、その中身……モシヤ生物では、ナイのか？\u3000ア、アァァ。グッ、ヅゥッ……」"
translation = "「네놈, 네놈, 네놈도다! 뭐냐, 그 내용물…… 설마 생물은, 아닌 건가? 아, 아아아. 윽, 즈윽……」"

[[dialogue]]
speaker = "クロト"
original = "「俺、か……？」"
translation = "「나, 말인가……?」"

[[dialogue]]
speaker = "unk"
original = "言われている言葉の意味はわからない──"
translation = "듣고 있는 말의 의미는 알 수 없다──"

[[dialogue]]
speaker = "unk"
original = "が、そんなことは彼女をリクリエの瘴気から解放して、改めて聞けばいいことだ。"
translation = "하지만, 그런 것은 그녀를 리크리에의 장기에서 해방하고, 다시 물어보면 될 일이다."

[[dialogue]]
speaker = "クロト"
original = "「行こう。彼女だってこんな風になるのは本意じゃないはずだ」"
translation = "「가자. 그녀도 이렇게 되는 건 본심이 아닐 것이다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふぅぅ……。そう、よね。なるべく早く、解放してあげなくっちゃ」"
translation = "「후우우…… 그래, 그렇지. 되도록 빨리, 해방시켜 줘야지」"

[[dialogue]]
speaker = "フィオナ"
original = "「はい。このチームなら、堕天使とだって渡り合えるはずです……！」"
translation = "「네. 이 팀이라면, 타락천사와도 맞설 수 있을 겁니다……!」"

