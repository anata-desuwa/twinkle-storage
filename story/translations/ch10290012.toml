[[dialogue]]
speaker = "unk"
original = "第２話,シャルレーヌと放課後ショッピング,P"
translation = "제2화, 샤를렌과 방과 후 쇼핑, P"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「会長さんってー、普段はどんな服を着てるんですか？」"
translation = "「회장군은~ 평소에 어떤 옷을 입나요?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「トレーニングや星徒会の業務で忙しいのはわかりますけど、制服以外の服装って見たことない気がします」"
translation = "「훈련이나 성도회 업무로 바쁜 건 알지만 교복 이외의 복장은 본 적이 없는 것 같아요」"

[[dialogue]]
speaker = "unk"
original = "ファッションはあんまり詳しくなくて……"
translation = "패션은 별로 잘 몰라서……"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「はぁ～。だと思いました。会長さんって星騎士に関わらないことは本当におざなりですよね」"
translation = "「하아~. 그럴 줄 알았어요. 회장군은 성기사와 관련 없는 일은 정말 소홀하다니까요」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「ダメですよ、そんなんじゃ。星徒会長は学生の規範であり代表なんですから」"
translation = "「안 돼요, 그러면. 성도회장은 학생의 규범이자 대표니까요」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「お休みの日になった途端、だっさ～い格好してたら魔王のカリスマもあったものじゃありません」"
translation = "「쉬는 날이 되자마자 촌~스러운 차림을 하고 있으면 마왕의 카리스마도 다 깎여버릴 거예요」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「ちょうどいい機会です。今日の放課後は空いていますか？ \u3000繁華街で服を見立ててあげます」"
translation = "「마침 잘 됐네요. 오늘 방과 후에 시간 비어 있나요? 번화가에서 옷을 골라줄게요」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「会長さん１人じゃ緊張して入れない、お高～い服屋さんをいっぱい知ってるんです。しっかりエスコートしてあげますね」"
translation = "「회장군 혼자서는 긴장해서 들어가지도 못할 비~싼 옷가게를 많이 알고 있거든요. 제대로 에스코트해 줄게요」"

[[dialogue]]
speaker = "unk"
original = "──と、こんな流れで始まったショッピング。"
translation = "──그렇게 이런 흐름으로 시작된 쇼핑."

[[dialogue]]
speaker = "unk"
original = "シャルレーヌとの買い物はとても賑やかで退屈しなかった。"
translation = "샤를렌과의 쇼핑은 매우 활기차서 지루할 틈이 없었다."

[[dialogue]]
speaker = "unk"
original = "いきなり際どい下着を２つ見せられて『どっちが私に似合います？』なんてからかわれもしたが……買い物そのものは楽しめた。"
translation = "갑자기 아슬아슬한 속옷 두 개를 보여주며 『어느 쪽이 저한테 어울려요?』라며 놀림받기도 했지만…… 쇼핑 자체는 즐거웠다."

[[dialogue]]
speaker = "unk"
original = "しかし、帰り道でまさかこんなことになろうとは……！"
translation = "하지만 돌아오는 길에 설마 이런 일이 벌어질 줄이야……! "

[[dialogue]]
speaker = "シャルレーヌ"
original = "「くすくすっ♪\u3000会長さぁん、がんばれ♪\u3000がんばれっ♪\u3000ゴールの電柱はすぐそこですよ～」"
translation = "「쿠스쿠스♪ 회장구운, 힘내라♪ 힘내라♪ 골인 지점인 전봇대는 바로 저기예요~」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「会長さんってば本当によわよわだったんですね。荷物持ちを賭けたじゃんけん……５回も連続で負けちゃうだなんて♪」"
translation = "「회장군은 정말로 허약했군요. 짐 들기를 건 가위바위보…… 5번이나 연속으로 지다니♪」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「私から言い出したことだけど～、なんだかちょっぴり可哀想になってきちゃったかもー」"
translation = "「내가 먼저 꺼낸 말이지만~ 왠지 조금 불쌍해지려고 할지도ー」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「は～い……ゴールです、お疲れ様♪\u3000ふふっ、それじゃあ６回戦っ。じゃ～んけんっ、ぽんっ♪\u3000──ちょきっ♪」"
translation = "「네~ 골인입니다, 수고하셨어요♪ 후훗, 그럼 6회전. 가위, 바위, 보♪ ──가위♪」"

[[dialogue]]
speaker = "unk"
original = "ぐわあああああ！？"
translation = "으아아아아아!? "

[[dialogue]]
speaker = "シャルレーヌ"
original = "「くふふふっ♪\u3000ざぁこざこっ♪\u3000ウルトラざこ～♪\u3000はーい負け犬ちゃん、ゴールはあそこのクレープ屋さんにしましょ～<emoji=heart04>」"
translation = "「쿠후후후♪ 허~접허접♪ 울트라 허접~♪ 자, 패배자 군, 골은 저기 있는 크레이프 가게로 하죠~<emoji=heart04>」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「それにしてもー……どうやったらこんなに負けられるんでしょう？」"
translation = "「그나저나ー…… 어떻게 하면 이렇게 계속 질 수 있는 걸까요?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「ま・さ・か。真面目にやって６連敗なんて……そんなかっこ悪いわけないですよね♪」"
translation = "「설・마. 진지하게 해서 6연패라니…… 그렇게 꼴사나울 리 없겠죠♪」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「あっ！\u3000もしかして、わざと負けてくれている……とか！？」"
translation = "「앗! 혹시 일부러 져주고 있는 건가요……!?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「可愛い後輩で、おまけに飼い主の女の子に、重たい荷物は持たせられない！\u3000みたいな？」"
translation = "「귀여운 후배이자 주인인 여자아이에게 무거운 짐을 들릴 수는 없다! 같은 거?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「きゃぁ～、素敵～っ♪\u3000会長さんってとっても紳士なんですね<emoji=heart04>」"
translation = "「꺄아~ 멋져라~♪ 회장군은 정말 신사적이네요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペットになった覚えはないぞ……！"
translation = "펫이 된 기억은 없다고……! "

[[dialogue]]
speaker = "シャルレーヌ"
original = "「へー。可愛い後輩ってところは否定しないんですか。くふっ、うれし～♪」"
translation = "「헤에. 귀여운 후배라는 부분은 부정하지 않는군요. 쿠후, 기뻐라~♪」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「……サービスしてあげましょうか、会長さん」"
translation = "「……서비스해 줄까요, 회장군?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「次の勝負はノーカウントにしましょう。荷物、私が交代してあげます」"
translation = "「다음 승부는 무효로 하죠. 짐은 제가 교대해 줄게요」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「じゃんけんクソよわ～な会長さんに慈悲をあげるのも、貴族の務めですからね」"
translation = "「가위바위보 개허접~인 회장군에게 자비를 베푸는 것도 귀족의 의무니까요」"

[[dialogue]]
speaker = "unk"
original = "断る！\u3000次こそ勝つ！\u3000わからせてやる！"
translation = "거절한다! 다음엔 꼭 이긴다! 본때를 보여주지!"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「わ。すごい気合いですね。う～ん、でも本当にいいんですか？\u3000たぶん私、勝っちゃいますけど」"
translation = "「와. 기세가 대단하네요. 으음, 하지만 정말 괜찮겠어요? 아마 제가 이길 텐데」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「あ、絶対に引けないって顔してる。ほーんと男の子っておバカですよね。まあ、そこが可愛いんですけれど」"
translation = "「아, 절대 물러서지 않겠다는 얼굴이네. 정말 남자애들은 바보라니까요. 뭐, 그게 귀엽지만요」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「さ……ちょうどチェックポイントに着きました。それじゃあ……じゃーんけんっ！」"
translation = "「자…… 마침 체크포인트에 도착했네요. 그럼…… 가위바위!」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「──ぽ～んっ♪」"
translation = "「──보~♪」"

[[dialogue]]
speaker = "unk"
original = "──うわああああああああああああ！！！"
translation = "──으와아아아아아아아아아아아!!! "

[[dialogue]]
speaker = "シャルレーヌ"
original = "「あれ～？\u3000あれあれ～？\u3000次こそは勝つんじゃなかったんですかぁ？」"
translation = "「어라라~? 어라어라~? 다음엔 꼭 이긴다지 않았나요~?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「会長さんのグーじゃあ、私のパーをわからせられませんけど～？\u3000ざーこ<emoji=heart04>\u3000ざこざこざこ、ざーこっ<emoji=heart04>」"
translation = "「회장군의 주먹으로는 제 보를 이길 수 없는데요~? 허~접<emoji=heart04> 허접허접허접, 허~접<emoji=heart04>」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「まぁ、勝負は勝負です。このまま学園まで帰りましょうね～。いっちに、いっちに<emoji=heart04>」"
translation = "「뭐, 승부는 승부예요. 이대로 학원까지 돌아가죠~. 영차, 영차<emoji=heart04>」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「この辺りでお別れにしましょうか。荷物運び、ありがと～。会長さん<emoji=heart04>」"
translation = "「이쯤에서 헤어지기로 할까요. 짐 들어줘서 고마워요~ 회장군<emoji=heart04>」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「いっぱい楽しませてくれたことですし、ご褒美をあげますね」"
translation = "「잔뜩 즐겁게 해줬으니 보답을 줄게요」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「はいコレ♪\u3000会長さんみたいな、若い男の人にピッタリの香水です」"
translation = "「자, 이거♪ 회장군 같은 젊은 남자에게 딱 맞는 향수예요」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「おしゃれは服だけじゃなくて、香りも大切な要素ですから」"
translation = "「멋 부리는 건 옷뿐만 아니라 향기도 중요한 요소니까요」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「香水はディアーブルの家業なんです。今日買った服に合わせて、使ってみてくださいね♪」"
translation = "「향수는 디아블 가문의 가업이거든요. 오늘 산 옷에 맞춰서 써보세요♪」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「あ……それともう１つ♪」"
translation = "「아…… 그리고 한 가지 더♪」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「会長さんってじゃんけんの時、眉の角度で出すものが全部ばれちゃってますよ？」"
translation = "「회장군은 가위바위보 할 때 눈썹 각도로 낼 게 다 들통나고 있다고요?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「とっても弱くて、とっても楽しかったです。くふふ、また遊んであげますね。可愛い魔王様<emoji=heart04>」"
translation = "「정말 약하고 정말 즐거웠어요. 쿠후후, 또 놀아줄게요. 귀여운 마왕님<emoji=heart04>」"

