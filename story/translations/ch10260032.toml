[[dialogue]]
speaker = "unk"
original = "第２話,後輩と竜の先輩,P"
translation = "제2화, 후배와 용의 선배, P"

[[dialogue]]
speaker = "unk"
original = "とある放課後、俺はリーリアに頼まれ買い物に付き合っていた――"
translation = "어느 방과 후, 나는 리리아의 부탁으로 쇼핑에 동행하고 있었다――"

[[dialogue]]
speaker = "リーリア"
original = "「ありがとうございます、センパイ。マジカル感謝です☆\u3000おかげでいい物が見つかりました♪」"
translation = "「감사합니다, 선배. 매지컬 감사예요☆ 덕분에 좋은 물건을 찾았어요♪」"

[[dialogue]]
speaker = "リーリア"
original = "「それじゃあ私、行って来ますね！」"
translation = "「그럼 저, 다녀올게요!」"

[[dialogue]]
speaker = "unk"
original = "リーリアは自身の住んでいる場所でもある新星寮へと戻り、小さな背中に声をかける。"
translation = "리리아는 자신이 살고 있는 장소이기도 한 신성 기숙사로 돌아가, 작은 등 뒤로 말을 건다."

[[dialogue]]
speaker = "リーリア"
original = "「あの、マム、今ちょっといいですか？」"
translation = "「저기, 맘, 지금 잠깐 괜찮으신가요?」"

[[dialogue]]
speaker = "マハムート"
original = "「あら、リーリア、おかえりなさい。何かしら？」"
translation = "「어머, 리리아, 어서 오렴. 무슨 일이니?」"

[[dialogue]]
speaker = "unk"
original = "その相手は、新星学園ラルーナ寮の寮長、妃竜院マハムートであった。"
translation = "그 상대는, 신성 학원 라루나 기숙사의 사감, 히류인 마하무트였다."

[[dialogue]]
speaker = "リーリア"
original = "「あっ、はい。ただいまです。えっと……」"
translation = "「앗, 네. 다녀왔습니다. 에또……」"

[[dialogue]]
speaker = "リーリア"
original = "「実は私、マムにお礼がしたくて」"
translation = "「사실 저, 맘에게 보답을 하고 싶어서요」"

[[dialogue]]
speaker = "マハムート"
original = "「お礼？」"
translation = "「보답?」"

[[dialogue]]
speaker = "リーリア"
original = "「はい。マムには先日、アルカンシェルフォームになる為にお世話になったので……これ、どうぞ受け取って下さい」"
translation = "「네. 맘에게는 요전번에, 아르캉시엘 폼이 되기 위해 신세를 졌으니까…… 이거, 부디 받아 주세요」"

[[dialogue]]
speaker = "unk"
original = "リーリアはマムに、紙袋を渡す。"
translation = "리리아는 맘에게 종이봉투를 건넨다."

[[dialogue]]
speaker = "リーリア"
original = "「中身は、新しい『ハンドフォーク』です」"
translation = "「내용물은, 새로운 『핸드 포크』예요」"

[[dialogue]]
speaker = "unk"
original = "それは園芸用の道具で、スコップの代わりに使ったりするものだった。"
translation = "그것은 원예용 도구로, 삽 대신 사용하거나 하는 것이었다."

[[dialogue]]
speaker = "マハムート"
original = "「……私がこれを欲しがってるって、よく気づいたわね。もしかして、会長に聞いたのかしら？」"
translation = "「……내가 이걸 갖고 싶어 했다는 걸 잘도 알아챘구나. 혹시, 회장에게 들은 거니?」"

[[dialogue]]
speaker = "リーリア"
original = "「はい。マムが最近、そろそろ買い替え時かもと呟いていたとのことだったので……」"
translation = "「네. 맘이 최근에, 슬슬 교체할 때가 됐을지도 모른다고 중얼거리셨다고 해서……」"

[[dialogue]]
speaker = "マハムート"
original = "「ふっ、とんだサプライズね。趣味の園芸道具を誰かにプレゼントされたのは、初めてだわ」"
translation = "「훗, 뜻밖의 서프라이즈네. 취미인 원예 도구를 누군가에게 선물 받은 건 처음이야」"

[[dialogue]]
speaker = "リーリア"
original = "「マムは実用的な物の方が嬉しいかなと思ったんですけど……どうでしたか？」"
translation = "「맘은 실용적인 물건이 더 기쁘지 않을까 생각했는데…… 어떠셨나요?」"

[[dialogue]]
speaker = "マハムート"
original = "「合格よ。素直に感謝しておくわ、リーリア」"
translation = "「합격이야. 솔직하게 고맙게 받아 둘게, 리리아」"

[[dialogue]]
speaker = "リーリア"
original = "「いえ、喜んでもらえてよかったです」"
translation = "「아니에요, 기뻐해 주셔서 다행이에요」"

[[dialogue]]
speaker = "マハムート"
original = "「感謝を忘れないのはいい心がけね。でも、本当に私へお礼がしたいというのなら、これからは『新星学園の星騎士』として全力で活躍してみせなさい」"
translation = "「감사를 잊지 않는 건 좋은 마음가짐이네. 하지만, 정말로 나에게 보답을 하고 싶은 거라면, 앞으로는 『신성 학원의 성기사』로서 전력으로 활약해 보이렴」"

[[dialogue]]
speaker = "マハムート"
original = "「あなた、本当は強いんだから」"
translation = "「너, 사실은 강하니까」"

[[dialogue]]
speaker = "リーリア"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "マハムート"
original = "「バトルフェスタで、あなたがネビュラの魔女であり、元々はスパイであったことは、一般の星騎士まで知る事実となった」"
translation = "「배틀 페스타에서, 네가 네뷸라의 마녀였고, 원래는 스파이였다는 사실은 일반 성기사들까지 알게 되었어」"

[[dialogue]]
speaker = "マハムート"
original = "「わざわざ言いづらいことを宣言して謝罪したりせずに、こっそり元の組織に戻る選択肢はあったはずよ」"
translation = "「굳이 말하기 힘든 것을 선언하며 사죄하거나 하지 않고, 몰래 원래 조직으로 돌아가는 선택지도 있었을 텐데」"

[[dialogue]]
speaker = "マハムート"
original = "「でもあなたはここに残った。だったら、もう実力を隠したりせず堂々と活躍して、あなたを受け入れてくれたヒトたちの信頼に応えてみせなさい」"
translation = "「하지만 너는 여기에 남았어. 그렇다면, 이제 실력을 숨기지 말고 당당하게 활약해서, 너를 받아준 사람들의 신뢰에 보답해 보이렴」"

[[dialogue]]
speaker = "リーリア"
original = "「――イエス・マム。私、マムの期待にも応えられるように、頑張ります！」"
translation = "「――예스 맘. 저, 맘의 기대에도 부응할 수 있도록 열심히 할게요!」"

[[dialogue]]
speaker = "マハムート"
original = "「ふふっ、いい返事だこと。畏怖をもって精進なさい」"
translation = "「후후, 좋은 대답이구나. 경외심을 가지고 정진하렴」"

[[dialogue]]
speaker = "リーリア"
original = "「あの……マムにもう１つ、相談してもいいですか？」"
translation = "「저기…… 맘에게 한 가지 더, 상담해도 될까요?」"

[[dialogue]]
speaker = "マハムート"
original = "「もう１つ？\u3000まあ、構わないわよ。後輩の相談に乗るのは、寮長の仕事だもの」"
translation = "「한 가지 더? 뭐, 상관없어. 후배의 상담을 들어주는 건 사감의 업무니까」"

[[dialogue]]
speaker = "リーリア"
original = "「無人島の時みたいに、これからもまた訓練の指導をお願いできたりとかってしますか……？」"
translation = "「무인도 때처럼, 앞으로도 또 훈련 지도를 부탁드려도 될까요……?」"

[[dialogue]]
speaker = "unk"
original = "『無人島の時』というのは、バトルフェスタが始まる前、リーリアが覚醒フォームへ至ることを望んだ際に、マムの指導で行われた特訓のことであった。"
translation = "『무인도 때』라는 것은, 배틀 페스타가 시작되기 전, 리리아가 각성 폼에 도달하기를 원했을 때 맘의 지도로 이루어진 특훈을 말하는 것이었다."

[[dialogue]]
speaker = "マハムート"
original = "「そこまで面倒見る義理はない……と言いたいところだったけれど、いいわよ。あなたのレベルなら、私自身の訓練にもなるから、付き合ってあげるわ」"
translation = "「그렇게까지 돌봐줄 의리는 없다……고 말하고 싶었지만, 좋아. 너 정도의 레벨이라면 나 자신의 훈련도 되니까, 상대해 줄게」"

[[dialogue]]
speaker = "マハムート"
original = "「いつにするか、後で希望の予定を教えなさい。それに合わせて、私もスケジュール調整をしてあげるわ」"
translation = "「언제로 할지 나중에 희망 일정을 알려주렴. 거기에 맞춰서 나도 스케줄 조정을 해 줄 테니까」"

[[dialogue]]
speaker = "リーリア"
original = "「ありがとうございます！\u3000じゃあ――」"
translation = "「감사합니다! 그럼――」"

[[dialogue]]
speaker = "リーリア"
original = "「ついでに、今度食事とかも一緒にどうですか？\u3000せっかく仲良くなったわけですし、交流を深める為にも――」"
translation = "「하는 김에, 다음에 식사 같은 것도 같이 어떠신가요? 어렵게 친해진 사이기도 하고, 교류를 깊게 하기 위해서라도――」"

[[dialogue]]
speaker = "マハムート"
original = "「は？\u3000嫌よ」"
translation = "「하? 싫어」"

[[dialogue]]
speaker = "リーリア"
original = "「なんでですか！？\u3000ここはなんだかんだ、了承してくれる流れなんじゃないんですか！？」"
translation = "「왜인가요!? 여기서는 이러쿵저러쿵해도 승낙해 주는 흐름 아니었나요!?」"

[[dialogue]]
speaker = "マハムート"
original = "「そんなわけないでしょ。私のことを何だと思っているのよ。食事なら気の合う同級生の子たちと行けばいいじゃない」"
translation = "「그럴 리가 없잖아. 나를 뭐라고 생각하는 거니. 식사라면 마음 맞는 동급생 애들이랑 가면 되잖니」"

[[dialogue]]
speaker = "リーリア"
original = "「そりゃあ友達とも食事しますよ？\u3000てかめっちゃしてます！\u3000私たち、仲いいんですから！」"
translation = "「그야 친구랑도 식사하죠? 아니 엄청 하고 있어요! 저희들, 사이좋으니까요!」"

[[dialogue]]
speaker = "リーリア"
original = "「でも、先輩後輩で仲良くする為に食事に行くってのも、社会では大事なことですよね！？」"
translation = "「하지만, 선후배끼리 사이좋게 지내기 위해 식사하러 가는 것도 사회에서는 중요한 일이잖아요!?」"

[[dialogue]]
speaker = "マハムート"
original = "「……必要ならそうするけど、別に今、食事しながら話さなくちゃならないような案件は、特にないでしょう？」"
translation = "「……필요하다면 그렇게 하겠지만, 딱히 지금 식사하면서 이야기해야만 하는 안건은 특별히 없잖니?」"

[[dialogue]]
speaker = "リーリア"
original = "「いやいや、ウィンウィンな関係を築いて行く為には、寮長の仕事を抜きにしてプライベートな話をする機会も、時には必要ですよね！？」"
translation = "「아니아니, 윈윈인 관계를 구축해 나가기 위해서는, 사감 업무를 빼고 사적인 이야기를 할 기회도 때로는 필요하잖아요!?」"

[[dialogue]]
speaker = "マハムート"
original = "「やれやれ……全く、生意気な後輩ね」"
translation = "「이런이런…… 정말이지 건방진 후배네」"

[[dialogue]]
speaker = "マハムート"
original = "「言っておくけれど、先輩だからって奢ったりしないわよ」"
translation = "「말해두겠는데, 선배라고 해서 쏘거나 하진 않을 거야」"

[[dialogue]]
speaker = "リーリア"
original = "「大丈夫です！\u3000私の方からお願いしたんですから、むしろ払わせて頂きます☆」"
translation = "「괜찮습니다! 제가 먼저 부탁드린 거니까, 오히려 제가 내게 해 주세요☆」"

[[dialogue]]
speaker = "マハムート"
original = "「は？\u3000それじゃあ私の面子が立たないじゃない。折半に決まってるでしょ」"
translation = "「하? 그러면 내 체면이 안 서잖니. 각자 부담하는 걸로 정해졌어」"

[[dialogue]]
speaker = "unk"
original = "後日。約束通り、リーリアとマムは食事に出かけたのだが――"
translation = "며칠 뒤. 약속대로 리리아와 맘은 식사를 하러 나갔는데――"

[[dialogue]]
speaker = "リーリア"
original = "「あれ？\u3000マム、お会計は折半だったはずじゃ……」"
translation = "「어라? 맘, 계산은 각자 부담하기로 했을 텐데……」"

[[dialogue]]
speaker = "マハムート"
original = "「面倒だから別にいいわ。その代わり、畏怖をもって感謝なさい」"
translation = "「귀찮으니까 됐어. 그 대신, 경외심을 가지고 감사하렴」"

[[dialogue]]
speaker = "リーリア"
original = "「……！\u3000イエス・マム！\u3000マジカルごちになります♪」"
translation = "「……! 예스 맘! 매지컬 잘 먹겠습니다♪」"

[[dialogue]]
speaker = "マハムート"
original = "「やれやれ、いい返事だこと」"
translation = "「이런이런, 좋은 대답이구나」"

[[dialogue]]
speaker = "unk"
original = "何だかんだ後輩に食事を奢ってしまうマムなのであった――"
translation = "이러쿵저러쿵해도 후배에게 밥을 사주고 마는 맘이었다――"

