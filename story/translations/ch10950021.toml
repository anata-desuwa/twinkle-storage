[[dialogue]]
speaker = "unk"
original = "第１話,シズハと初詣デート,P"
translation = "제1화, 시즈하와 새해 첫 참배 데이트"

[[dialogue]]
speaker = "unk"
original = "シズハと出会ってから初めて迎えたお正月。俺は流星寮を訪れて、彼女に告げる。"
translation = "시즈하와 만나고 처음 맞이하는 설날. 나는 유성 기숙사를 방문해 그녀에게 전한다."

[[dialogue]]
speaker = "シズハ"
original = "「えっ、私と会長で初詣に？\u3000そ、その……私たち２人きりで？」"
translation = "「엣, 저랑 회장님이랑 첫 참배를요? 그, 그게…… 우리 둘이서만요?」"

[[dialogue]]
speaker = "unk"
original = "俺が頷くと、シズハは顔を赤らめ、もじもじとしながらも、小さく頷き返してくれた。"
translation = "내가 고개를 끄덕이자, 시즈하는 얼굴을 붉히며 머뭇거리면서도 작게 고개를 끄덕여 주었다."

[[dialogue]]
speaker = "シズハ"
original = "「う、うん。わかった……じゃあ２日後にね？」"
translation = "「으, 응. 알았어…… 그럼 이틀 뒤에 봐?」"

[[dialogue]]
speaker = "unk"
original = "そうして２日後、俺とシズハは浅草で初詣をすることになった。"
translation = "그렇게 이틀 뒤, 나와 시즈하는 아사쿠사에서 첫 참배를 하게 되었다."

[[dialogue]]
speaker = "unk"
original = "晴れ着姿、今日も可愛くてよく似合ってるよ"
translation = "설빔 차림, 오늘도 귀엽고 잘 어울리네"

[[dialogue]]
speaker = "シズハ"
original = "「も、もうっ。会長ったら、初めて見せたわけじゃないのに、毎回言わなくても大丈夫だから……！」"
translation = "「정, 정말. 회장님도 참, 처음 보여드리는 것도 아닌데 매번 말해주지 않아도 괜찮으니까……!」"

[[dialogue]]
speaker = "シズハ"
original = "「べ、別に嬉しくないわけじゃないけど、毎回照れちゃうでしょ……！」"
translation = "「딱, 딱히 기쁘지 않은 건 아니지만, 매번 부끄럽단 말이야……!」"

[[dialogue]]
speaker = "unk"
original = "それでも俺は、シズハのことを異性として『可愛い』と感じていて、毎回でも伝えたいと思ってしまうのだから、仕方がない。"
translation = "그래도 나는 시즈하를 이성으로서 『귀엽다』고 느끼고 있고, 매번이라도 전하고 싶다고 생각하게 되니 어쩔 수 없다."

[[dialogue]]
speaker = "シズハ"
original = "「――き、今日も手を繋ぐの？\u3000う、うん、わかったわ。それじゃあ……」"
translation = "「――오, 오늘도 손 잡는 거야? 으, 응, 알았어. 그럼……」"

[[dialogue]]
speaker = "unk"
original = "シズハが差し出した手を、俺はそっと受け取り優しく握る。２人で並んで大きな門をくぐり、境内の方へと歩き始めた。"
translation = "시즈하가 내민 손을 나는 살며시 받아 부드럽게 쥐었다. 둘이서 나란히 커다란 문을 지나 경내 쪽으로 걷기 시작했다."

[[dialogue]]
speaker = "シズハ"
original = "（はうぅ～<emoji=heart04>\u3000遊園地デートに行ってから、会長とよくお出かけするようになったけど、いつもデートみたいな感じになっちゃってる……<emoji=heart04>）"
translation = "(하우우~<emoji=heart04> 놀이공원 데이트를 다녀온 뒤로 회장님과 자주 외출하게 됐지만, 항상 데이트 같은 느낌이 되어버려……<emoji=heart04>)"

[[dialogue]]
speaker = "シズハ"
original = "（まだお付き合いもしてないのに、２人で出かける時は手を繋ぐのが当たり前になっちゃってるし……<emoji=heart04>）"
translation = "(아직 사귀는 것도 아닌데, 둘이서 외출할 때는 손을 잡는 게 당연하게 되어버렸고……<emoji=heart04>)"

[[dialogue]]
speaker = "unk"
original = "それから俺たちがお寺の本堂へ進むと、参拝する人たちで列ができており、その最後尾に並ぶことになった。"
translation = "그 후 우리들이 절의 본당으로 향하자 참배하려는 사람들로 줄이 늘어서 있었고, 그 맨 끝에 줄을 서게 되었다."

[[dialogue]]
speaker = "シズハ"
original = "（デートばっかり意識しちゃってたけど、マイナスエネルギーの問題解決の為にも、しっかり女神様にお願いしとかないと）"
translation = "(데이트만 의식해버렸지만, 마이너스 에너지 문제 해결을 위해서라도 확실히 여신님께 빌어둬야지)"

[[dialogue]]
speaker = "シズハ"
original = "（あ、あと、他には……会長とこれからどうなりたいか、とか……）"
translation = "(아, 그리고 다른 건…… 회장님과 앞으로 어떻게 되고 싶은지라든가……)"

[[dialogue]]
speaker = "シズハ"
original = "（今年は会長との関係、ちょっと進んじゃったりして……？\u3000例えば、その……もしかしたら男女のお付き合いを始めたり、なんて……<emoji=heart04>）"
translation = "(올해는 회장님과의 관계가 조금 진전되기도 하려나……? 예를 들면, 그…… 어쩌면 남녀로 사귀기 시작한다든가……<emoji=heart04>)"

[[dialogue]]
speaker = "シズハ"
original = "（か、会長の方はどんなことお願いするんだろう……？\u3000私とのこと……お願いしてくれてたりとか、するのかな？）"
translation = "(회, 회장님 쪽은 어떤 걸 빌까……? 나에 관한 거…… 빌어주고 있거나 하려나?)"

[[dialogue]]
speaker = "unk"
original = "ん？\u3000シズハ、俺の顔を見て、どうかした？"
translation = "응? 시즈하, 내 얼굴을 보고 왜 그래?"

[[dialogue]]
speaker = "シズハ"
original = "「えっ！？\u3000あ、ううん、ごめんね！\u3000会長が何をお願いするのかな～、なんて、ちょっと考えたりしてて……」"
translation = "「엣!? 아, 아니야, 미안해! 회장님이 뭘 빌까~ 하고 조금 생각하느라……」"

[[dialogue]]
speaker = "シズハ"
original = "「――後で教えるから待ってて欲しい？\u3000そ、それってどういう……？」"
translation = "「――나중에 알려줄 테니 기다려 달라고요? 그, 그건 무슨……?」"

[[dialogue]]
speaker = "unk"
original = "俺はシズハの耳元で、周りには聞かれないくらいの小さな声で囁く。"
translation = "나는 시즈하의 귓가에 주변에는 들리지 않을 정도의 작은 목소리로 속삭였다."

[[dialogue]]
speaker = "unk"
original = "まだ秘密"
translation = "아직 비밀"

[[dialogue]]
speaker = "シズハ"
original = "「ひゃっ……！？」"
translation = "「히얏……!?」"

[[dialogue]]
speaker = "シズハ"
original = "（み、耳元でそんな甘い声で囁かれたら、ドキッとしちゃうじゃない……！）"
translation = "(귓, 귓가에서 그런 달콤한 목소리로 속삭이면 두근거려 버리잖아……!)"

[[dialogue]]
speaker = "シズハ"
original = "（しかも会長、繋いだ手をさっきよりもぎゅって、しっかり握ってきて……な、なんか今日の会長、すごく甘口じゃない！？）"
translation = "(게다가 회장님, 잡은 손을 아까보다 꽉, 확실히 쥐어 오고…… 어, 어쩐지 오늘 회장님, 엄청 달콤한데!?)"

[[dialogue]]
speaker = "unk"
original = "それから俺たちの参拝する番がきて、２人で並んで手を合わせる。"
translation = "그리고 우리들의 참배 차례가 와서 둘이 나란히 손을 모았다."

[[dialogue]]
speaker = "シズハ"
original = "（会長はどんなことをお祈りしてるんだろう……？\u3000というか、変に意識しちゃってるせいか……）"
translation = "(회장님은 어떤 걸 빌고 있을까……? 그보다 이상하게 의식해버린 탓인지……)"

[[dialogue]]
speaker = "シズハ"
original = "（横顔見てると、いつもよりカッコよく見えて、なんか胸がドキドキしちゃう……！）"
translation = "(옆얼굴을 보고 있으면 평소보다 멋있어 보여서 왠지 가슴이 두근거려……!)"

[[dialogue]]
speaker = "unk"
original = "俺がお祈りを終えて顔を上げると、横からシズハの視線を感じて振り返る。"
translation = "내가 기도를 마치고 고개를 들자 옆에서 시즈하의 시선이 느껴져 뒤돌아보았다."

[[dialogue]]
speaker = "unk"
original = "シズハのお願いは、もう終わった？"
translation = "시즈하의 소원은 이제 끝났어?"

[[dialogue]]
speaker = "シズハ"
original = "「え？\u3000う、うん……！」"
translation = "「어? 으, 응……!」"

[[dialogue]]
speaker = "シズハ"
original = "（ぜ、全然集中できなくて、お願いできなかった……！\u3000というか、ここでさり気なく、にこっと微笑みかけてくるの、ずるい……！）"
translation = "(저, 전혀 집중하지 못해서 빌지 못했어……! 그보다 여기서 자연스럽게 생긋 미소 지어 주는 거, 비겁해……!)"

[[dialogue]]
speaker = "シズハ"
original = "「か、会長……？\u3000こんな隅っこに移動して、話したいことって……？」"
translation = "「회, 회장님……? 이런 구석으로 이동해서 하고 싶은 말이란 게……?」"

[[dialogue]]
speaker = "unk"
original = "参拝でお願いを済ませ、覚悟は決めた。"
translation = "참배로 소원을 마치고 각오를 다졌다."

[[dialogue]]
speaker = "unk"
original = "俺は静かに深呼吸をしてからシズハに目を向け、ゆっくりと口を開いた。"
translation = "나는 조용히 심호흡을 한 뒤 시즈하를 바라보며 천천히 입을 열었다."

[[dialogue]]
speaker = "unk"
original = "もちろん、１人の女の子、異性として"
translation = "물론 한 명의 여자아이, 이성으로서"

[[dialogue]]
speaker = "unk"
original = "俺はシズハのことが好きだ。"
translation = "나는 시즈하를 좋아해."

[[dialogue]]
speaker = "シズハ"
original = "「……！\u3000そ、それってつまり……」"
translation = "「……! 그, 그건 즉……」"

[[dialogue]]
speaker = "unk"
original = "俺はシズハと恋人として付き合いたい、と今日まで引っ張ってきた想いを告げる。"
translation = "나는 시즈하와 연인으로서 사귀고 싶다고, 오늘까지 품어온 마음을 전했다."

[[dialogue]]
speaker = "シズハ"
original = "「～～～っ！\u3000ば、バカバカ！\u3000いきなり何告白してるの、会長っ……！」"
translation = "「~~~윽! 바, 바보바보! 갑자기 무슨 고백을 하는 거야, 회장님……!」"

[[dialogue]]
speaker = "シズハ"
original = "「――いきなりじゃなくて、これまで何度もデートをして、アピールを重ねてきたつもり？」"
translation = "「――갑자기가 아니라, 지금까지 몇 번이나 데이트를 하고 어필을 거듭해왔다고?」"

[[dialogue]]
speaker = "シズハ"
original = "「た、確かにそうかもしれないけど！\u3000少し前まで病院暮らしだったから、告白されるのなんて生まれて初めてなんだからっ！\u3000テンパっちゃうの！」"
translation = "「화, 확실히 그럴지도 모르지만! 얼마 전까지 병원 생활을 했으니까 고백받는 건 태어나서 처음이란 말이야! 당황하게 된다고!」"

[[dialogue]]
speaker = "unk"
original = "顔を赤らめて動揺しているシズハに、俺はそっと歩み寄り、その手を取って繋ぐ。"
translation = "얼굴을 붉히며 동요하고 있는 시즈하에게 나는 살며시 다가가 그 손을 잡아 연결했다."

[[dialogue]]
speaker = "シズハ"
original = "「えっ……？\u3000――返事は落ち着いてからでいい……？」"
translation = "「엣……? ――대답은 진정한 뒤에 해도 좋다고……?」"

[[dialogue]]
speaker = "unk"
original = "俺は頷く。シズハが好きだから、恋人になりたい――まずはそう伝えることで、今までの関係から新しい１歩を踏み出したかった。"
translation = "나는 고개를 끄덕였다. 시즈하를 좋아하니까 연인이 되고 싶다―― 우선 그렇게 전함으로써 지금까지의 관계에서 새로운 한 걸음을 내딛고 싶었다."

[[dialogue]]
speaker = "シズハ"
original = "「――だから落ち着いてから、私の気持ちを教えて欲しい、って……」"
translation = "「――그러니까 진정한 뒤에 내 마음을 알려달라고……」"

[[dialogue]]
speaker = "シズハ"
original = "「…………バカ、会長」"
translation = "「…………바보, 회장님」"

[[dialogue]]
speaker = "unk"
original = "シズハは顔を真っ赤にし、恥ずかしそうに視線を合わせないまま、言葉をこぼした。"
translation = "시즈하는 얼굴을 새빨갛게 물들이고 부끄러운 듯 시선을 맞추지 않은 채 말을 흘렸다."

[[dialogue]]
speaker = "シズハ"
original = "「そんなの……何度も一緒にデートに出かけてるんだから、嫌いなわけないじゃない……」"
translation = "「그런 거…… 몇 번이나 같이 데이트를 나갔는데 싫어할 리가 없잖아……」"

[[dialogue]]
speaker = "unk"
original = "じゃあ……"
translation = "그럼……"

[[dialogue]]
speaker = "シズハ"
original = "「んっ♪\u3000新年は、いけいけゴーゴーってこと……<emoji=heart04>」"
translation = "「응♪ 신년은 이케 이케 고고라는 거야……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "こくんと頷いて、口元に照れた笑みを浮かべるシズハ。"
translation = "고개를 끄덕이며 입가에 수줍은 미소를 띠는 시즈하."

[[dialogue]]
speaker = "unk"
original = "それからシズハは繋いだ手の指先を絡めると、そっと恋人繋ぎにするのだった。"
translation = "그리고 시즈하는 맞잡은 손가락을 얽히게 하더니 살며시 연인 잡기를 하는 것이었다."

