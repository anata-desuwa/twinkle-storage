[[dialogue]]
speaker = "unk"
original = "第２話,新たな力を見せるのです！,P"
translation = "제2화, 새로운 힘을 보여주는 거여요! P"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「会長さん、今日はルリエルの特訓に付き合って欲しいのです」"
translation = "「회장님, 오늘은 루리엘의 특훈을 도와줬으면 하는 거여요」"

[[dialogue]]
speaker = "unk"
original = "戦闘服からいつもと違うね"
translation = "전투복이 평소랑 다르네"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「はい。ロロットさんの服を着て変身すると、ルリエルの力も変わっちゃうみたいなのです」"
translation = "「네. 로롯 씨의 옷을 입고 변신하면, 루리엘의 힘도 변해버리는 모양인 거여요」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「いつもの角笛ならばっちりお任せなのですが、この杖を使った戦い方はまだまだなので……」"
translation = "「평소의 뿔피리라면 완벽하게 맡겨주시라지만, 이 지팡이를 사용한 싸움법은 아직이라서……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「そもそも、ルリエルの得意な光の属性すら変わっちゃってるのです。ちょっぴり不安で……」"
translation = "「애초에, 루리엘이 잘하는 빛 속성조차 변해버린 거여요. 조금 불안해서……」"

[[dialogue]]
speaker_original = "パッキー"
speaker_translation = "팟키"
original = "「ふーん。おもしれーことになってるじゃねーか。ドジ天使」"
translation = "「흐응. 재미있는 일이 벌어지고 있잖아. 덜렁이 천사」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あっ！\u3000エロパンダなのです！\u3000何しに来たのですか！」"
translation = "「앗! 에로 판다인 거여요! 뭐 하러 온 거여요!」"

[[dialogue]]
speaker_original = "パッキー"
speaker_translation = "팟키"
original = "「俺様好みのおねーちゃんを探してブラブラしてたんだよ。まったく、ツルペタしかいねえとはやれやれだぜ」"
translation = "「이 몸 취향인 누님을 찾아서 빈둥거리고 있었다고. 정말이지, 빈유밖에 없다니 참나 원」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ぐむむむ……！\u3000相っ変わらず失礼な使い魔なのです……！」"
translation = "「구무무무……! 여어어전히 무례한 사역마인 거여요……!」"

[[dialogue]]
speaker_original = "パッキー"
speaker_translation = "팟키"
original = "「ところでこっちの魔王様よ。このドジ天使、なかなか変わった属性を持ってるじゃねーか」"
translation = "「그건 그렇고 이쪽의 마왕님아. 이 덜렁이 천사, 꽤 특이한 속성을 가지고 있잖아」"

[[dialogue]]
speaker = "unk"
original = "何が起こっているのか分かる？"
translation = "무슨 일이 일어나고 있는지 알아?"

[[dialogue]]
speaker_original = "パッキー"
speaker_translation = "팟키"
original = "「当然だぜ。俺様は大賢者パッキー様だからな」"
translation = "「당연하지. 이 몸은 대현자 파키 님이시니까 말이야」"

[[dialogue]]
speaker_original = "パッキー"
speaker_translation = "팟키"
original = "「向こうの世界で霊力を長いこと浴びてただろ？\u3000その影響さ。化学変化するみてーに星力の質が変わっちまったってわけ」"
translation = "「저쪽 세계에서 영력을 오랫동안 쬐었지? 그 영향이야. 화학 변화를 일으키는 것처럼 성력의 질이 변해버렸다는 소리지」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「もしかして悪いことが起こったりしますか……？」"
translation = "「혹시 나쁜 일이 일어나기도 하나여……?」"

[[dialogue]]
speaker_original = "パッキー"
speaker_translation = "팟키"
original = "「さぁな～？\u3000でも天使の服を着てない時は普段どおりなんだろ？\u3000ゲームで言う『特殊効果のある装備品』みたいなものだと思うぜ」"
translation = "「글쎄다～? 하지만 천사 옷을 입지 않았을 때는 평소대로잖아? 게임으로 치면 『특수 효과가 있는 장비품』 같은 거라고 생각한다고」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「おぉ……！\u3000ルリエル、新たな装備品を手に入れたというわけですね。よぉし、これで大活躍なのです……！」"
translation = "「오오……! 루리엘, 새로운 장비품을 손에 넣었다는 거군여. 조아써, 이걸로 대활약인 거여요……!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「まさにこれこそ、ガイドブックに書いてあった天使の手から水が漏る、というやつですね！」"
translation = "「그야말로 이것이야말로, 가이드북에 적혀 있던 천사의 손에서 물이 샌다, 라는 거군여!」"

[[dialogue]]
speaker_original = "パッキー"
speaker_translation = "팟키"
original = "「何言ってるんだか、さっぱりわからねえ……。そんじゃ俺様はオサラバするぜ。さーて、まだ見ぬおねーちゃんたちを求めて──」"
translation = "「뭐라는 건지, 하나도 모르겠구만……. 그럼 이 몸은 이만 실례하지. 자, 아직 보지 못한 누님들을 찾아서──」"

[[dialogue]]
speaker_original = "パッキー"
speaker_translation = "팟키"
original = "「んぁ？\u3000何だ、この音」"
translation = "「응아? 뭐야, 이 소리」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「アステラ反応なのです！\u3000モンスターが現れましたっ。行きましょう、会長さん！」"
translation = "「아스테라 반응인 거여요! 몬스터가 나타났어여. 가요, 회장님!」"

[[dialogue]]
speaker = "unk"
original = "パッキーも来る？"
translation = "파키도 올래?"

[[dialogue]]
speaker_original = "パッキー"
speaker_translation = "팟키"
original = "「冗談だろ。なんで俺様が……いや。こいつらと行動をすれば星騎士のねーちゃんたちにも出会えるのか……？」"
translation = "「농담 마. 왜 이 몸이…… 아니. 이 녀석들과 행동하면 성기사 누님들도 만날 수 있는 건가……?」"

[[dialogue]]
speaker_original = "パッキー"
speaker_translation = "팟키"
original = "「ひゃっほ～、行く！\u3000行くぜ～！\u3000お前ら、俺様についてきな！」"
translation = "「히야호～, 간다! 간다고～! 너희들, 이 몸을 따르라!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「げ、現金なパンダなのですっ……！」"
translation = "「게, 속물적인 판다인 거여요……!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ルリエルたちが一番乗りみたいですね！\u3000会長さん、行きましょう！」"
translation = "「루리엘 일행이 제일 먼저 도착한 모양이네여! 회장님, 가여!」"

[[dialogue]]
speaker = "unk"
original = "ルリエルは後方支援を頼む！"
translation = "루리엘은 후방 지원을 부탁해!"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「いえ！\u3000ルリエル、どうやらこの杖を持った時は、前線で戦えるアタッカーのようなのです！」"
translation = "「아뇨! 루리엘, 아무래도 이 지팡이를 들었을 때는, 전선에서 싸울 수 있는 어태커인 모양인 거여요!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ロロットさんの武器を借りて、ルリエルの星力も乗っけてー……」"
translation = "「로롯 씨의 무기를 빌려서, 루리엘의 성력도 실어서ー……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ハイドロ・スウィールっ！」"
translation = "「하이드로 스월!」"

[[dialogue]]
speaker = "unk"
original = "すごい、一撃だ……！"
translation = "대단해, 일격이다……!"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ふっふっふー！\u3000まだまだなのです、どんどんモリモリ力が湧いてくるのですよ～っ！」"
translation = "「훗훗후! 아직 멀었어여, 점점 팍팍 힘이 솟아오르는 거여요～!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「このまま一気に退治しちゃいます！\u3000ルリエルビームっ……一斉射撃ーっ！」"
translation = "「이대로 단숨에 퇴치해버리겠어여! 루리엘 빔…… 일제 사격ー!」"

[[dialogue]]
speaker_original = "パッキー"
speaker_translation = "팟키"
original = "「お、おいおい！\u3000そんな張り切って退治されたら、まだ見ぬおねーちゃんとのアバンチュールが……！」"
translation = "「어, 어이 어이! 그렇게 기합 넣고 퇴치해버리면, 아직 보지 못한 누님과의 아방츄르가……!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「大天使ルリエルの攻撃、刮目せよ～、なのですっ！！」"
translation = "「대천사 루리엘의 공격, 괄목하라～, 인 거여요!!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「すす、すごいのです……これがルリエルの新しい力……！」"
translation = "「드, 대단한 거여요…… 이것이 루리엘의 새로운 힘……!」"

[[dialogue]]
speaker = "unk"
original = "俺の出る幕はなかったかな"
translation = "내가 나설 차례는 없었나 보네"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「いえ。頼りになる会長さんがいてくれたから、ルリエルも頑張れました。ありがとうなのです～♪」"
translation = "「아뇨. 의지가 되는 회장님이 있어 주셨으니까, 루리엘도 힘낼 수 있었어여. 고마운 거여요～♪」"

[[dialogue]]
speaker_original = "パッキー"
speaker_translation = "팟키"
original = "「ひ、ひでぇ……結局、誰も来る前に終わっちまった……新しい出会いがあると思ったのによ～」"
translation = "「너, 너무해…… 결국, 아무도 오기 전에 끝나버렸어…… 새로운 만남이 있을 줄 알았는데 말이야」"

[[dialogue]]
speaker_original = "パッキー"
speaker_translation = "팟키"
original = "「ちぇっ。俺様は帰るぜ。またサーシャちゃんのおっぱいでも揉んじゃおっかな～」"
translation = "「쳇. 이 몸은 돌아가겠어. 다시 사샤 짱의 가슴이나 주무르러 갈까나～」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「でも、杖って何だか扱いが難しいのです。角笛と違って、振るだけで攻撃が出ちゃうところなんか特に……」"
translation = "「하지만, 지팡이란 건 왠지 다루기가 어려운 거여요. 뿔피리와 달리, 휘두르는 것만으로 공격이 나가는 점이 특히……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「んっ……ふぇ、ふぇえっ……」"
translation = "「응…… 후에, 후에에……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ふぇっ……くっしょんっ！」"
translation = "「후에…… 에잇취!」"

[[dialogue]]
speaker_original = "パッキー"
speaker_translation = "팟키"
original = "「メタファっ！？」"
translation = "「메타파!?」"

[[dialogue]]
speaker = "unk"
original = "パッキー！？"
translation = "파키!?"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「は、はわわっ。くしゃみした拍子に攻撃が出ちゃったのですっ。早くしまわなきゃ……ぁ、また……へ、へ、へっくしゅっ！！」"
translation = "「하, 하와와. 재채기한 박자에 공격이 나가버린 거예요. 빨리 집어넣어야…… 아, 또…… 헤, 헤, 헤에취!!」"

[[dialogue]]
speaker_original = "パッキー"
speaker_translation = "팟키"
original = "「ほむんへ！」"
translation = "「호문헤!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あ、あぁああ！\u3000会長さん、この杖は危険なのですっ、コントロールが利かないのですよ～っ！？」"
translation = "「아, 아아아아! 회장님, 이 지팡이는 위험한 거예요, 컨트롤이 듣지 않는 거예요~!?」"

[[dialogue]]
speaker = "unk"
original = "誤射されて黒焦げになったパッキーを抱え、俺たちは学園へ帰還した。"
translation = "오사당해서 새카맣게 탄 파키를 안고, 우리들은 학원으로 귀환했다."

[[dialogue]]
speaker = "unk"
original = "ルリエルが新たな力を制御できるようになる日は、もうしばらく先のことになりそうなのだった……"
translation = "루리엘이 새로운 힘을 제어할 수 있게 되는 날은, 조금 더 미래의 일이 될 것 같았다……"

