[[dialogue]]
speaker = "unk"
original = "第１話,煌嶺陛下の懐刀,P"
translation = "제1화, 코우레이 폐하의 심복, P"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「どうした、怖じ気づいたか、魔王！」"
translation = "「어찌 된 거냐, 겁이라도 집어먹었나, 마왕!」"

[[dialogue]]
speaker = "unk"
original = "放課後のアリーナで、俺はリーエンと対峙していた。"
translation = "방과 후의 아레나에서, 나는 리엔과 대치하고 있었다."

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「おまえが来ないなら、こちらから往くぞ！」"
translation = "「네놈이 오지 않는다면, 이쪽에서 가겠다!」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「破ァァーーーーーッ！」"
translation = "「파앗~~~~~!!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ま、待ってください！\u3000まだ開始の合図は出てませんよ！」"
translation = "「기, 기다려주세요! 아직 시작 신호가 안 나왔다구요!」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「フン、命拾いしたな」"
translation = "「흥, 목숨은 건졌군」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「よかったぁ……もう、なんでこんなに血の気が多いの……」"
translation = "「다행이다…… 정말, 왜 이렇게 다혈질인 거야……」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「おい！\u3000聞こえているぞ！」"
translation = "「야! 다 들리고 있다고!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ひゃあ！\u3000すす、すみません。ごめんなさい」"
translation = "「히익! 죄, 죄송합니다. 잘못했어요」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「謝る必要はない。戦士たるもの、血の気が多いのは誇るべきことだからな」"
translation = "「사과할 필요는 없다. 전사로서 다혈질인 것은 자랑스러워해야 할 일이니까 말이다」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そ、そういうものなんだ……」"
translation = "「그, 그런 거구나……」"

[[dialogue]]
speaker = "unk"
original = "戦闘民族すぎる"
translation = "너무나 전투 민족스럽다."

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「そうだな、賞賛の言葉と受け取っておくぞ、魔王」"
translation = "「그렇군, 칭찬의 말로 받아들이도록 하지, 마왕」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「それより早く合図を出せ！\u3000あたしの刃は魔王の血に飢えてるからな！」"
translation = "「그것보다 빨리 신호를 내라! 내 칼날은 마왕의 피에 굶주려 있으니 말이다!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ひえぇぇ～～」"
translation = "「히이익~~」"

[[dialogue]]
speaker = "unk"
original = "いったいどうしてこうなった？"
translation = "도대체 어쩌다 이렇게 된 거지?"

[[dialogue]]
speaker = "unk"
original = "事の発端は少し前に遡る。"
translation = "사건의 발단은 조금 전으로 거슬러 올라간다."

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「たのもう！」"
translation = "「정정당당하게 승부를 청하노라!」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「魔王はいるか！\u3000魔界の皇妃・煌嶺陛下に仕えるリーエンだ！」"
translation = "「마왕은 있는가! 마계의 황비 코우레이 폐하를 모시는 리엔이다!」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「魔王がどれほどの武を誇るか、このあたしが直々に確かめさせてもらおう！」"
translation = "「마왕이 어느 정도의 무력을 자랑하는지, 이 내가 직접 확인해주도록 하마!」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「いざ尋常に、勝負！！」"
translation = "「자, 정정당당히, 승부다!!」"

[[dialogue]]
speaker = "unk"
original = "さすがに星徒会室で戦うわけにもいかず、アリーナを貸切にしてリーエンと模擬戦をすることになった、という流れだ。"
translation = "차마 성도회실에서 싸울 수도 없어서, 아레나를 대관하여 리엔과 모의전을 하게 되었다는 흐름이다."

[[dialogue]]
speaker = "unk"
original = "ごめん、立ち会いをお願いしちゃって"
translation = "미안, 입회를 부탁해버려서."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「気にしないで。会長たちだけにしたら、何が起こるか心配だもんね」"
translation = "「신경 쓰지 마. 회장들끼리만 두면 무슨 일이 일어날지 걱정되는걸」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「こそこそと作戦会議か？\u3000どんな策を弄しようと、あたしが噛み破ってやる」"
translation = "「속닥속닥 작전 회의냐? 어떤 잔꾀를 부리든, 내가 물어뜯어 주마」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「それとも２人がかりで来るか？\u3000あたしはそれでも一向に構わんぞ！」"
translation = "「아니면 둘이서 덤비겠나? 나는 그래도 전혀 상관없다!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「うわぁ、やる気満々だね。会長、ほんとに大丈夫？\u3000私も参加した方がいいかな？」"
translation = "「우와아, 의욕 충만이네. 회장, 정말 괜찮겠어? 나도 참가하는 게 좋을까?」"

[[dialogue]]
speaker = "unk"
original = "１人でやるよ、正々堂々とね"
translation = "혼자서 할게, 정정당당하게 말이야."

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「ほぉ……殊勝なことを言う。その心意気だけは買ってやろう」"
translation = "「호오…… 기특한 소리를 하는군. 그 기개만큼은 높이 사주마」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「より楽しみになって来たぞ。さあ来い、魔王！」"
translation = "「점점 더 기대되는군. 자, 와라, 마왕!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そ、それでは、模擬戦開始！」"
translation = "「그, 그럼, 모의전 시작!」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「破ッ！」"
translation = "「파앗!」"

[[dialogue]]
speaker = "unk"
original = "は、速いっ！？"
translation = "빠, 빠르다!? "

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「そらそらそらァッ！\u3000あたしはまだまだこんなものじゃないぞ！」"
translation = "「자 자 자 자앗! 나는 아직 이 정도가 아니라고!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「え？\u3000もっと速度が上がるの？」"
translation = "「에? 속도가 더 올라가?」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「まずは一閃！\u3000はぁぁぁぁっ！！」"
translation = "「우선은 일섬! 하아아아아아앗!!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「やった！\u3000相殺した！」"
translation = "「됐다! 상쇄했어!」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「フッ、さすがは魔王。そう容易くは折れぬか」"
translation = "「훗, 과연 마왕이군. 그렇게 쉽게 꺾이지는 않는가」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「会長、頑張って！\u3000相手の動きをよく見て！」"
translation = "「회장, 힘내! 상대의 움직임을 잘 봐!」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「おまえには友がいるが、このあたしには陛下がいる！」"
translation = "「너에게는 동료가 있지만, 이 나에게는 폐하가 계신다!」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「煌嶺陛下の懐刀として、魔王に後れを取るわけにはいかない！！」"
translation = "「코우레이 폐하의 심복으로서, 마왕에게 뒤처질 수는 없다!!」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「戦いは始まったばかりだ！\u3000さあ、往くぞ！！」"
translation = "「싸움은 이제 시작이다! 자, 가자!!」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「はぁ……はぁ……はぁ……しぶといやつめ、あたしの攻撃をここまで凌ぎきるとはな……」"
translation = "「하아…… 하아…… 하아…… 질긴 녀석이군, 내 공격을 여기까지 버텨내다니……」"

[[dialogue]]
speaker = "unk"
original = "リーエンも、想像以上に強かった"
translation = "리엔도 상상 이상으로 강했다."

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「フンッ、つまりこのあたしを舐めてかかっていたということか？」"
translation = "「흥, 즉 나를 얕잡아 보고 있었다는 뜻이냐?」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「いいだろう、あたしはまだ戦える。このまま死力を尽くして勝敗を決しようではないか！」"
translation = "「좋다, 나는 아직 싸울 수 있어. 이대로 사력을 다해 승패를 결정짓지 않겠는가!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「待って待って！\u3000アリーナの利用時間が終わっちゃうから、ここでおしまいにしよう？」"
translation = "「잠깐 잠깐! 아레나 이용 시간이 끝나버리니까, 여기서 마무리하자?」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「時間切れか……」"
translation = "「시간 제한인가……」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「このまま戦い続ければ、絶対にあたしが勝つのに……」"
translation = "「이대로 계속 싸우면 분명 내가 이길 텐데……」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「まあいい、魔王の力量は確認できた。陛下にも良い報告ができる」"
translation = "「뭐 좋아, 마왕의 기량은 확인했다. 폐하께도 좋은 보고를 드릴 수 있겠어」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「今回は引き分けで勘弁してやろう。だが、次は絶対にあたしが勝つ！」"
translation = "「이번에는 무승부로 봐주도록 하지. 하지만 다음번에는 반드시 내가 이긴다!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「え？\u3000次があるの？」"
translation = "「에? 다음이 있어?」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「当然だ。どうせ魔王も本気を見せていないのだろう？」"
translation = "「당연하다. 어차피 마왕도 본실력을 보여주지 않았을 테지?」"

[[dialogue]]
speaker = "unk"
original = "それはどうかな？"
translation = "글쎄 어떠려나?"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「フンッ」"
translation = "「흥」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そうだ、リーエンさんもノヴァフォーム使わなかったよね？」"
translation = "「맞다, 리엔 씨도 노바 폼을 사용하지 않았지?」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「必要があれば使う。だが、今の魔王にはその必要もないと判断したまでのこと」"
translation = "「필요하다면 쓴다. 하지만 지금의 마왕에게는 그럴 필요도 없다고 판단했을 뿐이다」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「あたしは武人だからな。正々堂々、相手の全力を受け止め、叩き伏せるのみだ！」"
translation = "「나는 무인이니까 말이다. 정정당당하게 상대의 전력을 받아내고 때려눕힐 뿐이다!」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「よき戦いだったぞ、魔王！\u3000あたしも存分に楽しませてもらった！」"
translation = "「좋은 싸움이었다, 마왕! 나도 마음껏 즐겼다!」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「次は、あたしが勝つ！\u3000ではさらばだ！」"
translation = "「다음은 내가 이긴다! 그럼 작별이다!」"

[[dialogue]]
speaker = "unk"
original = "こうして、リーエンは事あるごとに模擬戦を挑んでくるようになった。"
translation = "이렇게 해서 리엔은 틈만 나면 모의전을 걸어오게 되었다."

