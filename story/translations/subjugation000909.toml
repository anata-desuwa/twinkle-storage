[[dialogue]]
speaker = "unk"
original = "地下図書館の事件からしばらく経った、とある週末。"
translation = "지하 도서관 사건으로부터 시간이 좀 흐른 어느 주말."

[[dialogue]]
speaker = "unk"
original = "俺はソフレとフェリシーと一緒に、街へとやって来ていた。"
translation = "나는 소프레와 펠리시와 함께 거리로 나와 있었다."

[[dialogue]]
speaker = "ソフレ"
original = "「せっかくの休日なのに、こんなところに連れ出して、一体なんなのだわ……？」"
translation = "「귀한 휴일인데 이런 곳에 불러내다니 대체 무엇인 거예요……?」"

[[dialogue]]
speaker = "ソフレ"
original = "「しかも朝からなんて……ふわぁ～。ソフレはまだ、眠いのだわ……」"
translation = "「게다가 아침부터라니…… 후아암~. 소프레는 아직 졸린 거예요……」"

[[dialogue]]
speaker = "フェリシー"
original = "「ほら、この間、一緒に卒業旅行へ行こうって約束したでしょ？」"
translation = "「봐봐, 요전에 같이 졸업 여행 가기로 약속했잖아?」"

[[dialogue]]
speaker = "フェリシー"
original = "「その目標を現実にする為にも、形から入ろうと思って！\u3000というわけで――」"
translation = "「그 목표를 현실로 만들기 위해서라도 겉모습부터 챙기려고! 그런 의미에서──」"

[[dialogue]]
speaker = "フェリシー"
original = "「今日は東京で、ソフレの旅行バッグを選んで買っちゃおう！」"
translation = "「오늘은 도쿄에서 소프레의 여행 가방을 골라서 사버리자!」"

[[dialogue]]
speaker = "ソフレ"
original = "「いや、そもそも、ソフレはまだ、卒業旅行に行くと約束したわけじゃないのだわ！」"
translation = "「아니, 애초에 소프레는 아직 졸업 여행을 가겠다고 약속한 게 아닌 거예요!」"

[[dialogue]]
speaker = "ソフレ"
original = "「それに、どうして会長もここにいるわけ！？」"
translation = "「게다가 어째서 회장도 여기 있는 건가요!?」"

[[dialogue]]
speaker = "フェリシー"
original = "「この間の一件で、会長くんとも知り合えたわけだし、なんかこれから、３人でもっと仲よくなれそうな予感がしたんだよね！」"
translation = "「요전 일로 회장군이랑도 알게 됐고, 왠지 앞으로 세 명이서 더 친해질 수 있을 것 같은 예감이 들었거든!」"

[[dialogue]]
speaker = "フェリシー"
original = "「だから、もしよかったら一緒におでかけしないかって、誘ってみたの！」"
translation = "「그래서 혹시 괜찮으면 같이 외출하지 않겠냐고 유혹해 봤어!」"

[[dialogue]]
speaker = "unk"
original = "せっかく誘われたし、２人の邪魔でなければ"
translation = "모처럼 제안받았고, 두 사람에게 방해가 되지 않는다면."

[[dialogue]]
speaker = "ソフレ"
original = "「いや、邪魔されるほど、コイツとは仲よくないのだわ！」"
translation = "「아니, 방해받을 정도로 이 녀석과는 친하지 않은 거예요!」"

[[dialogue]]
speaker = "ソフレ"
original = "「というか、ソフレの旅行バッグ選びに付き合おうだなんて、会長も物好きなのよ……」"
translation = "「그보다 소프레의 여행 가방 고르기에 어울려주다니, 회장도 별난 사람이네……」"

[[dialogue]]
speaker = "フェリシー"
original = "「そうだ！\u3000会長くんも私たちとは同学年なんだし、よかったら卒業旅行も一緒に行く？」"
translation = "「맞다! 회장군도 우리랑 같은 학년이니까, 괜찮으면 졸업 여행도 같이 갈래?」"

[[dialogue]]
speaker = "unk"
original = "いいのか？"
translation = "괜찮겠어?"

[[dialogue]]
speaker = "フェリシー"
original = "「私は大歓迎だよ！\u3000３人でって考えると、ますます楽しみになってきたかも！」"
translation = "「나는 대환영이야! 세 명이서라고 생각하니까 점점 더 기대될지도!」"

[[dialogue]]
speaker = "フェリシー"
original = "「――会長くんも海外に行く用の旅行バッグを持ってない？\u3000なら今日、ソフレのと一緒に見繕っちゃおっか！」"
translation = "「──회장군도 해외용 여행 가방 없지? 그럼 오늘 소프레 거랑 같이 골라줄까!」"

[[dialogue]]
speaker = "ソフレ"
original = "「って、勝手に２人で盛り上がって、話を進めるんじゃないのだわ！」"
translation = "「그러니까, 멋대로 둘이서 들떠서 이야기를 진행하지 마는 거예요!──」"

[[dialogue]]
speaker = "ソフレ"
original = "「――そうこうしている内に、気づけば本当に旅行バッグを買ってしまったのよ……」"
translation = "「──이러니저러니 하는 사이에 어느샌가 정말로 여행 가방을 사버린 거예요……」"

[[dialogue]]
speaker = "フェリシー"
original = "「よかったね、ソフレ！\u3000可愛いやつが見つかって♪」"
translation = "「잘됐네, 소프레! 귀여운 걸 찾아서♪」"

[[dialogue]]
speaker = "ソフレ"
original = "「……でも、ソフレの旅行バッグなのに、なんでお前がお金を出すのよ。しかも割と高かったし……」"
translation = "「……하지만 소프레의 여행 가방인데 왜 네가 돈을 내는 거냐에요. 게다가 꽤 비쌌는데……」"

[[dialogue]]
speaker = "フェリシー"
original = "「ん？\u3000卒業旅行の言い出しっぺは私だし、あとは……ソフレの刑期が１００年短くなったお祝いの、プレゼント……みたいな？」"
translation = "「응? 졸업 여행 가자고 먼저 말한 건 나고, 그리고…… 소프레의 형기가 100년 짧아진 축하 선물…… 같은 거?」"

[[dialogue]]
speaker = "ソフレ"
original = "「なんなのよ、それ……」"
translation = "「뭔데요, 그게……」"

[[dialogue]]
speaker = "ソフレ"
original = "「でも、まぁ……その……あり――」"
translation = "「하지만, 뭐…… 그…… 고마──」"

[[dialogue]]
speaker = "フェリシー"
original = "「あっ……そうだ！」"
translation = "「앗…… 맞다!」"

[[dialogue]]
speaker = "ソフレ"
original = "「えっ？\u3000な、なに？」"
translation = "「엣? 뭐, 뭐야?」"

[[dialogue]]
speaker = "フェリシー"
original = "「ソフレと会長くんの旅行バッグを買った記念に、３人一緒に写真を撮ろうよ！」"
translation = "「소프레랑 회장군의 여행 가방을 산 기념으로 세 명이서 같이 사진 찍자!」"

[[dialogue]]
speaker = "フェリシー"
original = "「ＤＩＳＣのカメラを起動して……ほら、ソフレ、会長くん、こっちに寄って寄って～！」"
translation = "「DISC의 카메라를 켜고…… 자, 소프레, 회장군, 이쪽으로 붙어 붙어~!」"

[[dialogue]]
speaker = "ソフレ"
original = "「ちょっ、いきなりくっ付くんじゃないのだわ！\u3000お前はまた距離感が――」"
translation = "「잠깐, 갑자기 달라붙지 마는 거예요! 너는 또 거리감이──」"

[[dialogue]]
speaker = "フェリシー"
original = "「はい、チーズ♪」"
translation = "「자, 치즈♪」"

[[dialogue]]
speaker = "フェリシー"
original = "「――うん！\u3000よく撮れてるよ！\u3000ほら♪」"
translation = "「──응! 잘 찍혔어! 여기 봐♪」"

[[dialogue]]
speaker = "unk"
original = "フェリシーが見せたＤＩＳＣの画面には、３人の姿が収まっていて。"
translation = "펠리시가 보여준 DISC의 화면에는 세 사람의 모습이 담겨 있었다."

[[dialogue]]
speaker = "ソフレ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "ソフレ"
original = "「って、ソフレの顔、変な表情で写ってるじゃない！\u3000今のはナシ！\u3000撮り直すのだわ！」"
translation = "「잠깐, 소프레 얼굴 이상한 표정으로 찍혔잖아! 방금 건 무효! 다시 찍는 거예요!」"

[[dialogue]]
speaker = "フェリシー"
original = "「え～！\u3000もったいない！\u3000私はこれがいいよ～！」"
translation = "「에~! 아까워! 나는 이게 좋다구~!」"

[[dialogue]]
speaker = "unk"
original = "ソフレはその写真を見て、目の前のクラスメイトに容姿も笑い方もそっくりなアイツを思い出しながら、"
translation = "소프레는 그 사진을 보며, 눈앞의 클래스메이트와 외모도 웃는 법도 판박이인 그 녀석을 떠올리며,"

[[dialogue]]
speaker = "ソフレ"
original = "（まあ……本当にイタリアへ旅行に行けたら――）"
translation = "(뭐…… 정말로 이탈리아로 여행을 갈 수 있게 된다면──)"

[[dialogue]]
speaker = "ソフレ"
original = "（その時は……墓参りくらいはしてやってもいいのだわ）"
translation = "(그때는…… 성묘 정도는 해줘도 괜찮은 거예요)"

[[dialogue]]
speaker = "フェリーチェ"
original = "「――な？\u3000面白いこと、あっただろ？」"
translation = "「──거봐? 재미있는 일, 있었지?」"

[[dialogue]]
speaker = "unk"
original = "１００年越しに、ソフレはそんな懐かしい声を聞いた気がしたのだった――"
translation = "100년 만에 소프레는 그런 그리운 목소리를 들은 것 같은 기분이 들었다──"

