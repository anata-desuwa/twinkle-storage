[[dialogue]]
speaker = "unk"
original = "第２４話,エピローグ2,B"
translation = "제24화, 에필로그 2, B"

[[dialogue]]
speaker = "マトイ"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker = "アナ"
original = "「学園長……」"
translation = "「학원장……」"

[[dialogue]]
speaker = "マトイ"
original = "「こ、こちらにいらっしゃるなんて珍しいですね！\u3000あっ、えっと私お茶を汲んできま──」"
translation = "「거, 여기에 계시다니 드문 일이네요! 앗, 그러니까 제가 차를 떠오겠──」"

[[dialogue]]
speaker = "セイファート"
original = "「そう構わなくていい。一度、新たな会長に挨拶せねばと思っただけだ」"
translation = "「그렇게 신경 쓰지 않아도 된다. 한번, 새로운 회장에게 인사해야겠다고 생각했을 뿐이다」"

[[dialogue]]
speaker = "クロト"
original = "「……恐縮です。セイファート学園長」"
translation = "「……송구합니다. 세이퍼트 학원장」"

[[dialogue]]
speaker = "unk"
original = "そういえば……御前試合を終えて俺は気絶してしまったから、こうして会うのは初めてだった。"
translation = "그러고 보니…… 어전 시합을 끝내고 나는 기절해버렸기 때문에, 이렇게 만나는 것은 처음이었다."

[[dialogue]]
speaker = "unk"
original = "遠目にしか見ていなかったけれど、間近で見るとがっしりして背の高い御仁である。"
translation = "멀리서만 보고 있었지만, 가까이서 보니 다부지고 키가 큰 분이다."

[[dialogue]]
speaker = "セイファート"
original = "「……ふふ」"
translation = "「……후후」"

[[dialogue]]
speaker = "クロト"
original = "「？」"
translation = "「?」"

[[dialogue]]
speaker = "unk"
original = "すると、彼は俺をじっと見て微笑んで……"
translation = "그러자, 그는 나를 지그시 보며 미소 짓더니……"

[[dialogue]]
speaker = "セイファート"
original = "「<b>強くなったな</b>──少年。見違えたよ」"
translation = "「<b>강해졌구나</b>──소년. 몰라보겠군」"

[[dialogue]]
speaker = "クロト"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "セイファート"
original = "『──怪我はないか、少年』"
translation = "『──다친 곳은 없나, 소년』"

[[dialogue]]
speaker = "セイファート"
original = "『強くあれ。世界を取り込まんとする力に、決して飲まれることなきように』"
translation = "『강해져라. 세계를 집어삼키려는 힘에, 결코 잡아먹히지 않도록』"

[[dialogue]]
speaker = "unk"
original = "あれから時が経っていて、遠目にしか見ていなかったから、気づかなかった。"
translation = "그때부터 시간이 흘렀고, 멀리서만 보고 있었기 때문에, 눈치채지 못했다."

[[dialogue]]
speaker = "unk"
original = "間違いない。彼は、あの時の……"
translation = "틀림없다. 그는, 그때의……"

[[dialogue]]
speaker = "マトイ"
original = "「？」"
translation = "「?」"

[[dialogue]]
speaker = "サーシャ"
original = "「何か通じるものがあるみたいね～」"
translation = "「뭔가 통하는 게 있는 것 같네~」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私が選んだ最強の会長だもの！\u3000無理もないわ！」"
translation = "「내가 선택한 최강의 회장이니까! 무리도 아니지!」"

[[dialogue]]
speaker = "unk"
original = "５年前の俺を死地から救い、星騎士を目指すきっかけになった憧れの人の姿が、そこにあった。"
translation = "5년 전의 나를 사지에서 구하고, 성기사를 목표로 삼는 계기가 되었던 동경하던 사람의 모습이, 거기에 있었다."

[[dialogue]]
speaker = "unk"
original = "そして他でもない、その人に「強くなった」と認めてもらえた。"
translation = "그리고 다름 아닌, 그 사람에게 「강해졌다」고 인정받았다."

[[dialogue]]
speaker = "unk"
original = "人知れず涙が頬を伝う。この５年間の努力が、報われた瞬間だった──"
translation = "남몰래 눈물이 뺨을 타고 흘렀다. 이 5년간의 노력이, 보답받은 순간이었다──"

[[dialogue]]
speaker = "セイファート"
original = "「ふっ。自信は十分と言ったところか。ならばその新体制の君たちへ、新たな指令を告げよう」"
translation = "「훗. 자신감은 충분하다고 할 수 있겠군. 그렇다면 그 신체제의 너희에게, 새로운 지령을 전하겠다」"

[[dialogue]]
speaker = "セイファート"
original = "「先ほど流星市国内で新たなリクリエの予兆が確認された。出動要請だ」"
translation = "「방금 유성 시국 내에서 새로운 리크리에의 예조가 확인되었다. 출동 요청이다」"

[[dialogue]]
speaker = "クロト"
original = "「出動、要請……！」"
translation = "「출동, 요청……!」"

[[dialogue]]
speaker = "unk"
original = "俺は目頭が熱くなるのをこらえ、気持ちを切り替える。"
translation = "나는 눈시울이 뜨거워지는 것을 참고, 마음을 다잡는다."

[[dialogue]]
speaker = "マトイ"
original = "「またリクリエが……」"
translation = "「또 리크리에가……」"

[[dialogue]]
speaker = "アナ"
original = "「最近多い」"
translation = "「최근 많습니다」"

[[dialogue]]
speaker = "unk"
original = "言ったそばからというやつだった。"
translation = "말하자마자라는 것이었다."

[[dialogue]]
speaker = "unk"
original = "だが、実地経験を積むにはこの上ない機会だ。"
translation = "하지만, 실전 경험을 쌓기에는 더할 나위 없는 기회다."

[[dialogue]]
speaker = "セイファート"
original = "「場所は近隣の繁華街。付近に多数のモンスターが確認されていると聞く、至急現場に向かってくれたまえ」"
translation = "「장소는 인근 번화가다. 부근에 다수의 몬스터가 확인되었다고 들으니, 즉시 현장으로 향해주게」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「了解よ♪」"
translation = "「알겠어♪」"

[[dialogue]]
speaker = "クロト"
original = "「（なるほどな……こうやって要請を受けるわけか）」"
translation = "「（과연…… 이렇게 요청을 받는 거군）」"

[[dialogue]]
speaker = "アナ"
original = "「（いつもは教頭先生からの連絡が多いですが。学園長が直接……というのは異例）」"
translation = "「（평소에는 교감 선생님에게서 연락이 많습니다만. 학원장이 직접……이라는 것은 이례적입니다）」"

[[dialogue]]
speaker = "unk"
original = "直々の指令は今回限りのようだった。当然か。"
translation = "직접적인 지령은 이번 한 번뿐인 듯했다. 당연한가."

[[dialogue]]
speaker = "unk"
original = "ことリクリエ問題において、星騎士はさながら警察のような役割を担っている。"
translation = "리크리에 문제에 있어서, 성기사는 흡사 경찰과 같은 역할을 맡고 있다."

[[dialogue]]
speaker = "unk"
original = "俺たちの行動もそれだけ責任を伴うということだ。"
translation = "우리들의 행동도 그만큼 책임을 동반한다는 것이다."

[[dialogue]]
speaker = "サーシャ"
original = "「ん～、どうしようかしら。先日の、モンスターの大群について調査のお呼ばれがかかってたのよね～」"
translation = "「음~, 어떡해야 할까. 지난번, 몬스터 대군에 대한 조사 요청이 들어왔거든~」"

[[dialogue]]
speaker = "アナ"
original = "「あの件ですか……私もいた方がいいでしょうか？」"
translation = "「그 건 말입니까…… 저도 있는 편이 좋을까요?」"

[[dialogue]]
speaker = "サーシャ"
original = "「ううん、私一人で十分よ～。現場も見たし、風紀委員の人たちも一緒だから」"
translation = "「아니, 나 혼자서 충분해~. 현장도 봤고, 풍기 위원 사람들도 함께니까」"

[[dialogue]]
speaker = "アナ"
original = "「それではサーシャ先輩はその調査に向かってください。モンスターは新会長と私たちで行けば、事足りるかと」"
translation = "「그러면 사샤 선배는 그 조사로 향해주세요. 몬스터는 새 회장과 저희가 가면, 충분할 것 같습니다」"

[[dialogue]]
speaker = "unk"
original = "アナの言葉にうなずくサーシャ先輩。どうやら２人の話もまとまったらしい。"
translation = "아나의 말에 고개를 끄덕이는 사샤 선배. 아무래도 두 사람의 이야기도 정리된 모양이다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふふ──腕が鳴るわね。クロトがついてるって思うと」"
translation = "「후후── 팔이 근질거리는걸. 쿠로토가 함께한다고 생각하니」"

[[dialogue]]
speaker = "クロト"
original = "「緊張するな。足を引っ張らないよう頑張るよ」"
translation = "「긴장되네. 폐를 끼치지 않도록 노력할게」"

[[dialogue]]
speaker = "セイファート"
original = "「それから──何やらアステラの出現も確認されているらしい。くれぐれも油断せずに頼む」"
translation = "「그리고── 뭔가 아스테라의 출현도 확인되고 있는 듯하다. 부디 방심하지 말고 부탁한다」"

[[dialogue]]
speaker = "アナ"
original = "「なるほど。大規模なのは久しぶりです」"
translation = "「과연. 대규모인 것은 오랜만입니다」"

[[dialogue]]
speaker = "クロト"
original = "「！\u3000アステラって、もしかして……」"
translation = "「! 아스테라라고 하면, 혹시……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「来ればわかるわ。さあ、新生星徒会としての初陣──出動よ！」"
translation = "「가보면 알 거야. 자, 신생 성도회로서의 첫 출진── 출동이야!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あれ？\u3000でも新生星徒会だと、新生なのか新星なのかわかりづら……」"
translation = "「어라? 근데 신생 성도회라고 하면, 신생인지 신성인지 알기 어렵……」"

[[dialogue]]
speaker = "アナ"
original = "「早く行きますよ、前会長」"
translation = "「빨리 가시죠, 전 회장」"

[[dialogue]]
speaker = "unk"
original = "４人で出動し、繁華街へ向かった俺たち。"
translation = "네 명이 출동하여, 번화가로 향한 우리들."

[[dialogue]]
speaker = "unk"
original = "確かにこの現場において、目を見張るべきは一目瞭然だった。"
translation = "확실히 이 현장에서, 눈여겨봐야 할 것은 한눈에 명확했다."

[[dialogue]]
speaker = "クロト"
original = "「あれは……」"
translation = "「저것은……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「アステライト──通称、アステラ」"
translation = "「아스테라이트── 통칭, 아스테라」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「これから私たちが突入する、メインターゲットよ」"
translation = "「지금부터 우리가 돌입할, 메인 타깃이야」"

[[dialogue]]
speaker = "アナ"
original = "「リクリエの特異点に現れる一種の亜空間。三界を綯い交ぜにしようとした影響で生じると言われている」"
translation = "「리크리에의 특이점에 나타나는 일종의 아공간. 삼계를 뒤섞으려 한 영향으로 발생한다고 알려져 있습니다」"

[[dialogue]]
speaker = "アナ"
original = "「会長──覚えある？」"
translation = "「회장── 기억하십니까?」"

[[dialogue]]
speaker = "クロト"
original = "「ああ。流星市国に住んでたら、たまに目にするし──それに……」"
translation = "「아아. 유성 시국에 살고 있으면, 가끔 눈에 띄고── 게다가……」"

[[dialogue]]
speaker = "クロト"
original = "「以前、モンスターどもに連行されたこともあるからな」"
translation = "「이전에, 몬스터들에게 연행된 적도 있으니까」"

[[dialogue]]
speaker = "マトイ"
original = "「そう言えばそんな話してたよね……超やばそうだけど」"
translation = "「그러고 보니 그런 이야기 했었지…… 엄청 위험할 것 같지만」"

[[dialogue]]
speaker = "unk"
original = "でも、その危機がきっかけであの人──"
translation = "하지만, 그 위기가 계기가 되어 그 사람──"

[[dialogue]]
speaker = "unk"
original = "在りし日のセイファート学園長に助けてもらって、今の俺がある。"
translation = "지난날의 세이퍼트 학원장에게 도움을 받아, 지금의 내가 있다."

[[dialogue]]
speaker = "unk"
original = "そう考えると、運命というもののアヤを感じてしまった。"
translation = "그렇게 생각하니, 운명이라는 것의 묘한 이치를 느껴버렸다."

[[dialogue]]
speaker = "クロト"
original = "「ただ……この規模の巣を見かけることなんて、そうそうあることじゃなかったけど」"
translation = "「다만…… 이 규모의 둥지를 보는 일은, 그렇게 흔한 일은 아니었지만」"

[[dialogue]]
speaker = "マトイ"
original = "「星徒会も最優先で処理に当たっているからね」"
translation = "「성도회도 최우선으로 처리에 임하고 있으니까」"

[[dialogue]]
speaker = "unk"
original = "みんなの頑張りのおかげらしかった。"
translation = "모두의 노력 덕분인 듯했다."

[[dialogue]]
speaker = "unk"
original = "かつて俺が連れ去られた──モンスターの巣窟。アステライト。"
translation = "예전에 내가 끌려갔던── 몬스터의 소굴. 아스테라이트."

[[dialogue]]
speaker = "unk"
original = "今までは恐怖の記憶を呼び起こすような存在で、逃げることしかできなかったけれど……"
translation = "지금까지는 공포의 기억을 불러일으키는 듯한 존재였고, 도망치는 것밖에 할 수 없었지만……"

[[dialogue]]
speaker = "unk"
original = "今日からは違う。"
translation = "오늘부터는 다르다."

[[dialogue]]
speaker = "unk"
original = "星徒会の一員として、排除にあたる立場になったのだ。"
translation = "성도회의 일원으로서, 배제에 나서는 입장이 된 것이다."

[[dialogue]]
speaker = "アナ"
original = "「内部にはモンスターが<ruby>跋扈<rt>ばっこ</rt></ruby>してる。放置してると、ここ一帯に放出されかねない」"
translation = "「내부에는 몬스터가 발호하고 있습니다. 방치하면, 이 일대에 방출될 수도 있습니다」"

[[dialogue]]
speaker = "クロト"
original = "「亜空間──ってことは、今からあそこに飛ぶのか」"
translation = "「아공간──이라는 건, 지금부터 저기로 뛰어드는 건가」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そうよ、覚悟を決めなさい！」"
translation = "「그렇지, 각오를 다지도록 해!」"

[[dialogue]]
speaker = "unk"
original = "全員がセレスティアを構える。"
translation = "전원이 셀레스티아를 겨눈다."

[[dialogue]]
speaker = "unk"
original = "リクリエによって生み出された、モンスターの亜空間──見過ごすわけにはいかない。"
translation = "리크리에에 의해 만들어진, 몬스터의 아공간── 모른 척할 수는 없다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「よーし！\u3000新生・新星星徒会、とつげきー！」"
translation = "「좋았어! 신생・신성 성도회, 돌격!」"

[[dialogue]]
speaker = "unk"
original = "──いざゆかん。"
translation = "──자, 가자."

[[dialogue]]
speaker = "unk"
original = "そう、覚悟を決めて俺たちが一歩を踏み出したとき──"
translation = "그렇게, 각오를 다지고 우리들이 한 발을 내디뎠을 때──"

[[dialogue]]
speaker = "クロト"
original = "「！？」"
translation = "「!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふぇっ──！？」"
translation = "「훼엣──!?」"

[[dialogue]]
speaker = "unk"
original = "目の前で、アステライトそのものが消滅した。"
translation = "눈앞에서, 아스테라이트 자체가 소멸했다."

[[dialogue]]
speaker = "アナ"
original = "「……びっくり」"
translation = "「……깜짝이야」"

[[dialogue]]
speaker = "クロト"
original = "「アステライトってのは──自然に消えるものなのか？」"
translation = "「아스테라이트라는 건── 자연적으로 사라지는 건가?」"

[[dialogue]]
speaker = "マトイ"
original = "「そんなはずないわ。けど……」"
translation = "「그럴 리 없잖아. 하지만……」"

[[dialogue]]
speaker = "unk"
original = "マトイですらも驚いた事象。"
translation = "마토이조차도 놀란 현상."

[[dialogue]]
speaker = "unk"
original = "俺たちが目を見張っていると、その原因はたちまち判明する。"
translation = "우리들이 눈을 크게 뜨고 있자, 그 원인은 순식간에 판명된다."

[[dialogue]]
speaker = "フィオナ"
original = "「みんな、ご苦労さま。おかげで被害も出なかったみたい」"
translation = "「모두, 수고했어요. 덕분에 피해도 없었던 것 같네요」"

[[dialogue]]
speaker = "ルリエル"
original = "「ふえぇ、大変でしたぁ。でもでもっ、これで街の平和が守られるなら、お安いことなのですっ」"
translation = "「후에에, 힘들었어요. 하지만 하지만욧, 이걸로 마을의 평화가 지켜진다면, 싼 것인 것입니다욧」"

[[dialogue]]
speaker = "ニャリオン"
original = "「星見家がフィオナ嬢にかかればこの程度は朝飯前ニャン！\u3000たとえ家来が犬サルキジでも余裕なのニャン！」"
translation = "「호시미 가문이 피오나 아가씨에게 걸리면 이 정도는 식은 죽 먹기 냥! 설령 하인이 개 원숭이 꿩이라도 여유로운 거 냥!」"

[[dialogue]]
speaker = "ユウリ"
original = "「誰がサルだ。オメーこそなんもしてねーだろ、アホ猫」"
translation = "「누가 원숭이야. 너야말로 아무것도 안 했잖아, 바보 고양이」"

[[dialogue]]
speaker = "ニャリオン"
original = "「ニャンにゃと！？」"
translation = "「냥이얏!?」"

[[dialogue]]
speaker = "ソフィア"
original = "「喧嘩ならよそでやってください、お２人」"
translation = "「싸움이라면 다른 데 가서 하세요, 두 분」"

[[dialogue]]
speaker = "セーラ"
original = "「ま、無事に済んだんだからなんでもいいっしょ～♪」"
translation = "「뭐, 무사히 끝났으니까 아무래도 상관없잖아~♪」"

[[dialogue]]
speaker = "unk"
original = "消失したアステラから降り立ったのは──総勢５人の少女たち「（＋１匹？）」。"
translation = "소멸한 아스테라에서 내려선 것은── 총 다섯 명의 소녀들 「（＋1마리?）」."

[[dialogue]]
speaker = "unk"
original = "その誰しも、俺たちとは異なる制服に身を包んでいた。"
translation = "그 누구도, 우리들과는 다른 교복을 입고 있었다."

[[dialogue]]
speaker = "unk"
original = "彼女たちは……"
translation = "그녀들은……"

[[dialogue]]
speaker = "フィオナ"
original = "「……あら」"
translation = "「……어머」"

[[dialogue]]
speaker = "クロト"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker = "unk"
original = "首をひねっていると、そのうちの一人と目があった。"
translation = "고개를 갸웃거리고 있자, 그중 한 명과 눈이 마주쳤다."

[[dialogue]]
speaker = "unk"
original = "彼女は、俺のつけている腕章を確認すると──そのままこちらへと歩み寄ってくる。"
translation = "그녀는, 내가 차고 있는 완장을 확인하더니── 그대로 이쪽으로 걸어온다."

[[dialogue]]
speaker = "unk"
original = "そうして彼女は、魅入ってしまうほど高貴な微笑みを浮かべて……"
translation = "그리고 그녀는, 매료될 정도로 고귀한 미소를 띠우며……"

[[dialogue]]
speaker = "フィオナ"
original = "「流星学園星徒会会長、星見フィオナです」"
translation = "「유성 학원 성도회 회장, 호시미 피오나입니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「改めてよろしくお願いしますね──新星学園の、<b>新</b>星徒会長さん」"
translation = "「다시 한번 잘 부탁드려요── 신성 학원의, <b>신</b>성도 회장님」"

