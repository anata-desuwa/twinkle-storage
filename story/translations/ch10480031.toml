[[dialogue]]
speaker = "unk"
original = "第１話,寮生たちと買い出しに,P"
translation = "제1화, 기숙사생들과 장 보러"

[[dialogue]]
speaker = "unk"
original = "それは、マムと恋人関係になってから、しばらく経ったある日のこと。"
translation = "그것은 마무와 연인 관계가 되고 나서 얼마간의 시간이 흐른 어느 날의 일."

[[dialogue]]
speaker = "unk"
original = "新星寮で月に１回開催されているという『おやつ交流会』の買い出しに、俺も付き添っていたのだが――"
translation = "신성 기숙사에서 한 달에 한 번 개최된다는 『간식 교류회』의 장보기에 나도 동행하고 있었는데――"

[[dialogue]]
speaker = "クーシェン"
original = "「ねぇねぇ、ミウ、ヒマワリ！\u3000このお菓子とかどうかな？\u3000ヘンテコな味で盛り上がりそうじゃない？\u3000ウキウキ♪」"
translation = "「저기 저기, 미우, 히마와리! 이 과자 같은 건 어때? 희한한 맛이라서 분위기 살 것 같지 않아? 두근두근♪」"

[[dialogue]]
speaker = "ミウ"
original = "「クーシェンちゃん、し～。というか、その桃饅、どこで見つけて来たんですか？」"
translation = "「쿠셴 짱, 쉬잇~. 그보다 그 복숭아 만두는 어디서 찾아온 거예요?」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「とりあえず、マムにバレないように上手くやらないと……」"
translation = "「일단 마무에게 들키지 않게 잘해야 할 텐데……」"

[[dialogue]]
speaker = "マハムート"
original = "「そこの附属２年生組……あなた達、この私に隠れてこそこそと悪戯の相談とは、いい度胸ね」"
translation = "「거기 부속 2학년 팀…… 너희, 이 나 몰래 소곤소곤 장난칠 궁리를 하다니 배짱 좋네」"

[[dialogue]]
speaker = "ミウ"
original = "「ひぇっ、マム！？」"
translation = "「히익, 마무!?」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「こ、これはその～」"
translation = "「이, 이건 그게~」"

[[dialogue]]
speaker = "クーシェン"
original = "「いつの間に！？\u3000このボクが、声を掛けられるまで全然気づかないなんて……！」"
translation = "「어느 틈에!? 이 몸이 말을 걸 때까지 전혀 눈치채지 못하다니……!」"

[[dialogue]]
speaker = "マハムート"
original = "「竜たるこの私が、気配を消して背後を取る程度のことができないとでも？」"
translation = "「용인 이 내가 기척을 지우고 배후를 잡는 정도도 못 할 줄 알았니?」"

[[dialogue]]
speaker = "マハムート"
original = "「全く……畏怖が足りてないようね」"
translation = "「정말이지…… 경외심이 부족한 모양이네」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「おうおう、新人共！\u3000マムの前で勝手なことをするんじゃないゆ！」"
translation = "「오오, 신입 녀석들! 마무 앞에서 제멋대로 굴지 말라유!」"

[[dialogue]]
speaker = "クーシェン"
original = "「ジャクリーヌ！？\u3000どうしちゃったの？\u3000今日は何か、いつもと違くない？」"
translation = "「자클린!? 어떻게 된 거야? 오늘은 뭔가 평소랑 다르지 않아?」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「それは<ruby>余<rt>ゆ</rt></ruby>が新星寮ではナンバー２で、マムの配下だからなの！」"
translation = "「그건 소생이 신성 기숙사에서는 넘버 2이고, 마무의 부하이기 때문이라유!」"

[[dialogue]]
speaker = "マハムート"
original = "「あなた、誰の許可を得てナンバー２を名乗っているのかしら？」"
translation = "「너, 누구 허락을 받고 넘버 2를 자처하는 걸까?」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「それは早い者勝ちだからですゆ！\u3000誰も名乗らないから、余がマムに次ぐナンバー２を名乗ることにしたんですゆ！」"
translation = "「그건 선착순이기 때문이라유! 아무도 안 하니까 소생이 마무 다음가는 넘버 2를 맡기로 했다유!」"

[[dialogue]]
speaker = "ミウ"
original = "「あのジャクリーヌ先輩が敬語を……！？」"
translation = "「그 자클린 선배가 경어를……!?」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「なんか三下感がすごい！！」"
translation = "「왠지 삼류 악당 느낌이 엄청나!!」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「誰が三下ゆ！\u3000とにかく、マムに許可なく悪戯することは許されないの！」"
translation = "「누가 삼류라유! 암튼 마무 허락 없이 장난치는 건 용납 못 한다유!」"

[[dialogue]]
speaker = "クーシェン"
original = "「バレちゃったなら仕方ないか……。だったら、ここは……マム！\u3000ボクと勝負してよ！」"
translation = "「들켰다면 어쩔 수 없지…… 그렇다면 여기선…… 마무! 나랑 승부해!」"

[[dialogue]]
speaker = "マハムート"
original = "「勝負ですって……？」"
translation = "「승부라니……?」"

[[dialogue]]
speaker = "クーシェン"
original = "「うん！\u3000ボク、前から１度、マムと戦ってみたかったんだよね♪」"
translation = "「응! 나 전부터 한 번 마무랑 싸워보고 싶었거든♪」"

[[dialogue]]
speaker = "クーシェン"
original = "「それで、バトルしてボクが勝ったら、今回のおやつ交流会はヘンテコな味のお菓子の食べ比べ会をする！\u3000どう？」"
translation = "「그래서 배틀해서 내가 이기면, 이번 간식 교류회는 희한한 맛 과자 먹어보기 대회를 하는 거야! 어때?」"

[[dialogue]]
speaker = "マハムート"
original = "「……あなたの言うバトルは、星力を使っての実力勝負という意味かしら？」"
translation = "「……네가 말하는 배틀은 성력을 사용한 실력 승부라는 뜻일까?」"

[[dialogue]]
speaker = "クーシェン"
original = "「そう！\u3000戦う場所は空の上でいいよ！\u3000それなら街に被害が出ないし、相手に参ったって言わせたら勝ちってことで――」"
translation = "「응! 싸우는 장소는 하늘 위면 돼! 그러면 마을에 피해도 안 가고, 상대방이 항복이라고 말하게 하면 이기는 걸로――」"

[[dialogue]]
speaker = "マハムート"
original = "「クーシェン、あなた……」"
translation = "「쿠셴, 너……」"

[[dialogue]]
speaker = "マハムート"
original = "「この私と軽く喧嘩しようみたいなノリ、頭が高いわよ？」"
translation = "「나랑 가볍게 싸워보자는 식의 태도, 머리가 높구나?」"

[[dialogue]]
speaker = "クーシェン"
original = "「えっ――痛だだだだっ！？」"
translation = "「엣―― 아야야야얏!?」"

[[dialogue]]
speaker = "マハムート"
original = "「あなた、西遊記の孫悟空と同じ斉天大聖を名乗っているんだったわね？\u3000だったら、覚えておきなさい」"
translation = "「너, 서유기의 손오공과 같은 제천대성을 자처하고 있었지? 그렇다면 기억해 두렴」"

[[dialogue]]
speaker = "マハムート"
original = "「私は孫悟空の師匠である三蔵法師と同じように、こうやって手を使わずとも、あなたの頭に付けている金の輪っかを締め付けることができる。引力操作でね」"
translation = "「나는 손오공의 스승인 삼장법사와 마찬가지로, 이렇게 손을 쓰지 않고도 네 머리에 달린 금테를 조일 수 있어. 인력 조작으로 말이야」"

[[dialogue]]
speaker = "クーシェン"
original = "「こ、これ、アニメでも見た孫悟空がお仕置きされるやつ……！\u3000あっ――痛だだだだっ！？」"
translation = "「이, 이거 애니메이션에서도 봤던 손오공이 벌 받는 그거……! 앗―― 아야야야얏!?」"

[[dialogue]]
speaker = "マハムート"
original = "「で？\u3000なんだったかしら？\u3000私にバトルで勝ったら、ヘンテコなお菓子の食べ比べ会をしたいって？」"
translation = "「그래서? 뭐였더라? 나한테 배틀로 이기면 희한한 과자 먹어보기 대회를 하고 싶다고?」"

[[dialogue]]
speaker = "クーシェン"
original = "「ご、ごめんなさいぃ！\u3000やっぱ無しでいいですっ！\u3000降参！！\u3000ボクの負けですぅ～～～！！！」"
translation = "「죄, 죄송해요오! 역시 없던 일로 할게요! 항복!! 제가 졌어요오오~~~!!!」"

[[dialogue]]
speaker = "マハムート"
original = "「よろしい」"
translation = "「좋아」"

[[dialogue]]
speaker = "クーシェン"
original = "「ふにゃあ～……」"
translation = "「후냐아~……」"

[[dialogue]]
speaker = "unk"
original = "マハムートは引力操作を解放したようで、クーシェンが脱力してその場にへたり込む。"
translation = "마무는 인력 조작을 해제한 듯하고, 쿠셴이 힘이 빠져 그 자리에 주저앉는다."

[[dialogue]]
speaker = "マハムート"
original = "「次はあなた達よ、ミウ、ヒマワリ」"
translation = "「다음은 너희야, 미우, 히마와리」"

[[dialogue]]
speaker = "ミウ"
original = "「わ、私たちもですか！？\u3000とんでもないです！」"
translation = "「저, 저희도인가요!? 당치도 않아요!」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「ちゃんとマムの言うことに従います！」"
translation = "「제대로 마무 님의 말씀을 따를게요!」"

[[dialogue]]
speaker = "マハムート"
original = "「お利巧だこと。でもあなた達、<b>舐めている</b>わね」"
translation = "「착하기도 해라. 하지만 너희, <b>깔보고</b> 있구나」"

[[dialogue]]
speaker = "ミウ"
original = "「えっ！？」"
translation = "「엣!?」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「そ、そんなことは……」"
translation = "「그, 그런 건……」"

[[dialogue]]
speaker = "マハムート"
original = "「私はビジネスには詳しくないけれど、権力争いには慣れているから言っておくわ」"
translation = "「나는 비즈니스에는 밝지 않지만 권력 다툼에는 익숙하니까 말해둘게」"

[[dialogue]]
speaker = "マハムート"
original = "「頭のいい子は好きだけど、他人を値踏みするようなその目は気に入らないわ」"
translation = "「머리 좋은 아이는 좋아하지만, 타인을 가늠하는 듯한 그 눈은 마음에 들지 않아」"

[[dialogue]]
speaker = "マハムート"
original = "「今後は改めなさい。相手に誠意が伝わらないわよ」"
translation = "「앞으로는 고치렴. 상대에게 성의가 전달되지 않으니까」"

[[dialogue]]
speaker = "ミウ"
original = "「っ……！\u3000は、はい……」"
translation = "「윽……! 네, 네……」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「すみませんでした！\u3000肝に命じます……！」"
translation = "「죄송했습니다! 명심할게요……!」"

[[dialogue]]
speaker = "クーシェン"
original = "「う～、ヘンテコな味のお菓子が山ほどあれば、みんなと話が弾んで仲良くなれると思ったんだけどな～」"
translation = "「우~ 희한한 맛 과자가 산더미처럼 있으면 다들 이야기도 잘 통하고 친해질 수 있을 거라 생각했는데~」"

[[dialogue]]
speaker = "unk"
original = "マムに叱られて、シュンとなってしまう３人。"
translation = "마무에게 꾸중을 듣고 풀이 죽어버린 세 사람."

[[dialogue]]
speaker = "マハムート"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "マハムート"
original = "「やれやれ……仕方ないわね」"
translation = "「이런이런…… 어쩔 수 없네」"

[[dialogue]]
speaker = "マハムート"
original = "「１人１つずつなら、好きな物を買っていいわよ」"
translation = "「한 사람당 하나씩이라면 좋아하는 걸 사도 좋아」"

[[dialogue]]
speaker = "クーシェン"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker = "マハムート"
original = "「買い出しを手伝ってもらっているわけだし、そのお駄賃としてね」"
translation = "「장보기를 도와주고 있는 셈이니 그 수고비로 말이야」"

[[dialogue]]
speaker = "マハムート"
original = "「ただし、買った物はヘンテコな味でも責任を持って食べ切ること。他はちゃんとみんなが喜びそうなお菓子を選ぶこと。その２つが条件よ。いいわね？」"
translation = "「단, 산 물건은 희한한 맛이라도 책임지고 다 먹을 것. 나머지는 제대로 다들 기뻐할 만한 과자를 고를 것. 그 두 가지가 조건이야. 알겠니?」"

[[dialogue]]
speaker = "ミウ"
original = "「マム……！」"
translation = "「마무……!」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「厳しいけど優しい……！」"
translation = "「엄격하지만 다정해……!」"

[[dialogue]]
speaker = "マハムート"
original = "「その代わり、やるならちゃんとおやつ交流会を盛り上げてみせなさい」"
translation = "「대신 할 거라면 제대로 간식 교류회를 북돋워 보렴」"

[[dialogue]]
speaker = "クーシェン"
original = "「やった！\u3000わ～い♪」"
translation = "「만세! 와아~♪」"

[[dialogue]]
speaker = "クーシェン"
original = "「マム！\u3000ボク、マムがみんなから慕われている理由がなんだかわかった気がするよ！」"
translation = "「마무! 나 마무가 다들로부터 존경받는 이유가 뭔지 알 것 같아!」"

[[dialogue]]
speaker = "マハムート"
original = "「やれやれ、大げさね……」"
translation = "「정말이지, 과장이 심하네……」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ゆーっゆっゆっゆ♪\u3000さすがマムですゆ！\u3000飴をくれるのなら、ジャクリーヌはどこまでも付いて行きますゆ♪」"
translation = "「유후후후♪ 역시 마무라유! 사탕을 준다면 자클린은 어디까지라도 따라가겠다유♪」"

[[dialogue]]
speaker = "マハムート"
original = "「ジャクリーヌ、あなたは勝手にナンバー２を名乗った件で、後でお仕置きよ」"
translation = "「자클린, 너는 마음대로 넘버 2를 자처한 건으로 나중에 벌이야」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「何故ですゆ！？」"
translation = "「어째서라유!?」"

[[dialogue]]
speaker = "unk"
original = "（俺にもあんな時代があったなぁ……）"
translation = "（나에게도 저런 시절이 있었지……）"

[[dialogue]]
speaker = "マハムート"
original = "「さて、寮生たちへの指導が終わったところで――」"
translation = "「자, 기숙사생들에 대한 지도가 끝난 참에――」"

[[dialogue]]
speaker = "マハムート"
original = "「いつからかずっと後方腕組みで『俺にもあんな時代があった』みたいな顔してうんうんと頷いているそこの会長。言っておくけど、貴方も他人事じゃないわよ？」"
translation = "「언제부터인가 계속 뒤에서 팔짱 끼고 『나에게도 저런 시절이 있었지』 같은 얼굴로 고개를 끄덕이고 있는 거기 회장. 말해두겠는데 너도 남의 일이 아니야」"

[[dialogue]]
speaker = "unk"
original = "心が読まれている！？"
translation = "마음이 읽히고 있어!?"

[[dialogue]]
speaker = "マハムート"
original = "「会長としてまだまだ後輩への躾が出来てなかったわけだし、そこのところわかっているわよね？」"
translation = "「회장으로서 아직 후배들에 대한 훈육이 제대로 안 된 셈이고, 그 부분은 잘 알고 있겠지?」"

[[dialogue]]
speaker = "マハムート"
original = "「後でお仕置きよ」"
translation = "「나중에 벌이야」"

[[dialogue]]
speaker = "unk"
original = "鉄球以外でお願いします！"
translation = "철구 이외의 것으로 부탁합니다!"

[[dialogue]]
speaker = "マハムート"
original = "「ふふっ、さてどうしようかしら」"
translation = "「후후, 자 어떻게 해줄까」"

[[dialogue]]
speaker = "マハムート"
original = "「買い物の荷物持ちを頑張ったら、減刑も考えてあげなくもないわよ？」"
translation = "「쇼핑 짐꾼 노릇을 열심히 하면 감형을 생각해 주지 못할 것도 없는데?」"

[[dialogue]]
speaker = "unk"
original = "喜んで！"
translation = "기꺼이!"

[[dialogue]]
speaker = "unk"
original = "その後、全力で荷物持ちをやらせて頂く俺なのであった――"
translation = "그 후, 전력으로 짐꾼 노릇을 하게 되는 나였다――"

