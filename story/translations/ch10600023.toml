[[dialogue]]
speaker = "unk"
original = "第３話,愛してるゲーム……？,P"
translation = "제3화, 사랑해 게임……?"

[[dialogue]]
speaker = "unk"
original = "レミカはクールなアイドルとして一世を風靡しているが、笑いの沸点が異様に低いという意外な一面を持っている。"
translation = "레미카는 쿨한 아이돌로서 한 시대를 풍미하고 있지만, 웃음의 장벽이 이상하리만치 낮다는 의외의 일면을 가지고 있다."

[[dialogue]]
speaker = "unk"
original = "本人は頑なに認めようとしない。曰く、『完璧なアイドルはげらげら笑ったりしない』ということらしいが……"
translation = "본인은 완강히 인정하려 하지 않는다. 말하기를, 『완벽한 아이돌은 낄낄대며 웃지 않는다』라는 것 같지만……"

[[dialogue]]
speaker = "unk"
original = "ある日の休日、俺の家でくつろいでいたレミカが、ＤＩＳＣで何かの記事を見つけたようだった。"
translation = "어느 휴일, 우리 집에서 쉬고 있던 레미카가 DISC에서 어떤 기사를 발견한 모양이었다."

[[dialogue]]
speaker = "レミカ"
original = "「──あ。会長、これ見て。『愛してるゲーム』だって……ちょっと前に流行ってたみたい」"
translation = "「──아. 회장님, 이것 봐. 『사랑해 게임』이래…… 조금 전에 유행했던 것 같아」"

[[dialogue]]
speaker = "レミカ"
original = "「えーっと……カップル間での遊びの１つ。お互いが向かい合って『愛してる』って言って、照れた方が負けなんだって。面白そうじゃん」"
translation = "「음…… 커플끼리의 놀이 중 하나. 서로 마주 보고 『사랑해』라고 말해서, 부끄러워하는 쪽이 지는 거래. 재밌어 보이네」"

[[dialogue]]
speaker = "レミカ"
original = "「ちょうど暇してるし。やってみない？」"
translation = "「마침 할 일도 없는데. 해보지 않을래?」"

[[dialogue]]
speaker = "unk"
original = "レミカ、本当にできる？"
translation = "레미카, 정말 할 수 있겠어?"

[[dialogue]]
speaker = "レミカ"
original = "「え、何それ。できるよ。私、こんな簡単なゲームもできないと思われてるの？」"
translation = "「에, 뭐야 그게. 할 수 있어. 나, 이런 간단한 게임도 못 할 거라고 생각하는 거야?」"

[[dialogue]]
speaker = "レミカ"
original = "「──受けて立つよ。アイドル業で培った囁きテクで会長をメロメロにしてあげる」"
translation = "「──도전을 받아들이지. 아이돌 업무로 쌓은 속삭임 테크닉으로 회장님을 사로잡아 줄게」"

[[dialogue]]
speaker = "レミカ"
original = "「んっ……こうやって近くで向かい合って、目を合わせて……いいよ。まずは会長が先行で」"
translation = "「응…… 이렇게 가까이서 마주 보고, 눈을 맞추고…… 좋아. 일단 회장님이 먼저」"

[[dialogue]]
speaker = "unk"
original = "（じーっと見つめる）"
translation = "（빤히 바라본다）"

[[dialogue]]
speaker = "unk"
original = "それじゃあ……"
translation = "그러면……"

[[dialogue]]
speaker = "レミカ"
original = "「……へぇ、これけっこうドキドキするかも。こんな間近で見つめあうって、なかなかないし」"
translation = "「……헤에, 이거 꽤 두근거릴지도. 이렇게 가까이서 마주 보는 건 좀처럼 없으니까」"

[[dialogue]]
speaker = "レミカ"
original = "「…………ちょ、ちょっと、早く愛してるって言いなよ。そんなじーっと真面目な顔で見るだけって……」"
translation = "「…………저, 저기, 빨리 사랑한다고 말해. 그렇게 빤히 진지한 얼굴로 보기만 하고……」"

[[dialogue]]
speaker = "unk"
original = "（じーっと見つめる）"
translation = "（빤히 바라본다）"

[[dialogue]]
speaker = "レミカ"
original = "「ぷっ……ん、ふっ──ふふふふっ……！！」"
translation = "「풉…… 으, 훗── 후후후훗……！！」"

[[dialogue]]
speaker = "unk"
original = "ゲームにならないと思った"
translation = "게임이 안 된다고 생각했다"

[[dialogue]]
speaker = "unk"
original = "やっぱり！"
translation = "역시나!"

[[dialogue]]
speaker = "レミカ"
original = "「ちょ、ちょっと待って……！\u3000そんなことないから。はいっ……もう大丈夫、ほらっ……！」"
translation = "「저, 잠시만……! 그렇지 않으니까. 자…… 이제 괜찮아, 봐……!」"

[[dialogue]]
speaker = "レミカ"
original = "「黙ったまま見つめあうって、なんか変な感じ……ふふっ……」"
translation = "「입 다물고 마주 보는 거, 왠지 이상한 기분…… 후후……」"

[[dialogue]]
speaker = "レミカ"
original = "「──ぷっ！\u3000ぷふふふっ……♪\u3000だから、そんな無言でじっと見るの、ゲームと違うって……！\u3000ほら、愛してるって言わなきゃ負けにするよ……！」"
translation = "「──풉! 푸후후훗……♪ 그러니까, 그렇게 무언으로 빤히 보는 거, 게임이랑 다르다니까……! 자, 사랑한다고 말 안 하면 패배로 칠 거야……!」"

[[dialogue]]
speaker = "unk"
original = "愛してるよ、レミカ（イケボ）"
translation = "사랑해, 레미카 (꿀보이스)"

[[dialogue]]
speaker = "レミカ"
original = "「──ぶっふぅうっ！\u3000あ、あはっ……あはははっ……！」"
translation = "「──푸흡! 아, 아하…… 아하하핫……！」"

[[dialogue]]
speaker = "レミカ"
original = "「今のは卑怯っ……わざとお腹に力入れて、ヘンにいい声出してっ……！\u3000ドキドキさせるんじゃなく、笑わせようとしてるじゃん……！」"
translation = "「방금 건 비겁해…… 일부러 배에 힘주고, 이상하게 좋은 목소리 내고……! 두근거리게 만드는 게 아니라, 웃기려고 하는 거잖아……！」"

[[dialogue]]
speaker = "レミカ"
original = "「ふぅっ……ふふっ……ふふふっ……！\u3000る、ルール違反するのは勝手だけど、照れさせなきゃ勝てないんだけど……！？」"
translation = "「후우…… 후후…… 후후훗……! 루, 룰 위반하는 건 마음이지만, 부끄럽게 만들지 않으면 이길 수 없는데……!?」"

[[dialogue]]
speaker = "unk"
original = "（もっと笑わせたくなってきたな）"
translation = "（더 웃기고 싶어지는데）"

[[dialogue]]
speaker = "レミカ"
original = "「はぁっ！？\u3000なんで会長、戦闘服になってるの……！？\u3000待って待って、おかしいって！」"
translation = "「하아!? 왜 회장님, 전투태세인 거야……!? 잠깐 잠깐, 이상하다니까!」"

[[dialogue]]
speaker = "レミカ"
original = "「ちょっと、前髪かき上げるなっ……ポーズ決めないで！\u3000ん、ふふふふっ、あ、あははっ……！」"
translation = "「잠깐, 앞머리 넘기지 마…… 포즈 잡지 마! 으, 후후후후, 아, 아하핫……！」"

[[dialogue]]
speaker = "unk"
original = "愛してるよ、レミカ（イケボ）"
translation = "사랑해, 레미카 (꿀보이스)"

[[dialogue]]
speaker = "レミカ"
original = "「～～～～～～っ♪\u3000あはははっ！\u3000あははははっ！\u3000ま、待って、ほんと無理っ……！\u3000ぷふぅっ……ふぅっ……ふぅうっ……！！」"
translation = "「～～～～～～っ♪ 아하하핫! 아하하하핫! 자, 잠깐, 진짜 무리……! 푸훕…… 후우…… 후우우우……！！」"

[[dialogue]]
speaker = "unk"
original = "以前までのレミカは、笑いの沸点が低いことを『自身の目指すカッコ可愛いアイドル像』からかけ離れているため、それを隠そう、認めまいとすることが多かった。"
translation = "이전까지의 레미카는 웃음의 장벽이 낮은 것을 『자신이 지향하는 멋지고 귀여운 아이돌상』에서 동떨어져 있기 때문에, 그것을 숨기거나 인정하지 않으려 하는 경우가 많았다."

[[dialogue]]
speaker = "unk"
original = "けれど恋人関係になってから、俺の前では肩の力を抜いてくれることも多くなったと思う。大笑いしてくれるようになったのがその証拠だ。"
translation = "하지만 연인 관계가 되고 나서, 내 앞에서는 어깨의 힘을 빼주는 경우도 많아졌다고 생각한다. 크게 웃어주게 된 것이 그 증거다."

[[dialogue]]
speaker = "unk"
original = "だが調子に乗って笑わせすぎた報いは当然やってくるものだ。"
translation = "하지만 우쭐해서 너무 웃긴 대가는 당연히 찾아오는 법이다."

[[dialogue]]
speaker = "レミカ"
original = "「こちょこちょこちょこちょこちょ～っ！」"
translation = "「간질간질간질간질간질~!」"

[[dialogue]]
speaker = "unk"
original = "降参！\u3000降参します！"
translation = "항복! 항복할게!"

[[dialogue]]
speaker = "unk"
original = "待って待って待って！"
translation = "잠깐 잠깐 잠깐!"

[[dialogue]]
speaker = "レミカ"
original = "「えー。私がお腹痛いからやめてって言ったのに、笑わせ続けたのはどこの彼氏さんでしたっけー？」"
translation = "「에이. 내가 배 아프니까 그만두라고 했는데도, 계속 웃긴 게 어느 집 남자친구였더라~?」"

[[dialogue]]
speaker = "レミカ"
original = "「会長が泣くまで、くすぐるのやめないから♪\u3000ほぉら、こちょこちょこちょこちょ～っ♪」"
translation = "「회장님이 울 때까지, 간지럽히는 거 안 멈출 거니까♪ 자아, 간질간질간질간질~♪」"

[[dialogue]]
speaker = "unk"
original = "あははははははっ……！！"
translation = "아하하하하하하핫……！！"

[[dialogue]]
speaker = "レミカ"
original = "「愛してるよー、会長<emoji=heart04>\u3000ほぉら、脇腹～♪\u3000こちょこちょこちょーっ……！」"
translation = "「사랑해~, 회장님<emoji=heart04> 자아, 옆구리~♪ 간질간질간질~……！」"

[[dialogue]]
speaker = "unk"
original = "愛してるゲームはどこに行ったのか──最終的に相手をより笑わせた方が勝ちという意味不明なゲームへと変貌していて。"
translation = "사랑해 게임은 어디로 갔는지── 최종적으로 상대를 더 웃기는 쪽이 이긴다는 의미 불명의 게임으로 변모해 있었고."

[[dialogue]]
speaker = "unk"
original = "漫画や映画などの娯楽を一切使わずとも、延々と時間をつぶせる俺たちなのだった。"
translation = "만화나 영화 같은 오락을 전혀 쓰지 않고도, 끝없이 시간을 때울 수 있는 우리였다."

