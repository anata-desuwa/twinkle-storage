[[dialogue]]
speaker = "unk"
original = "第４話,フィオナの味方,P"
translation = "제4화, 피오나의 아군"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「この街はアニメや漫画のお店が多いと聞いていましたが、モンスターやアステラの対応以外で訪れたのは初めてです」"
translation = "「이 거리는 애니메이션이나 만화 가게가 많다고 들었지만, 몬스터나 아스테라 대응 외에 방문한 것은 처음이에요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「こうして見回すと本当にショップがたくさん……いろんなお店があるのですね」"
translation = "「이렇게 둘러보니 정말 숍이 잔뜩…… 여러 가게가 있네요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「この前は私ばかり語ってしまいましたけど、緋宮会長はあの漫画ではどのキャラクターがお好きですか？」"
translation = "「지난번에는 저만 이야기했지만, 히노미야 회장은 그 만화에서 어떤 캐릭터를 좋아하세요?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふむふむ……緋宮会長はあの作品では親友キャラがお好きなんですね。いつもは小心者だけど優しくて、でもいざという時は勇気を振り絞って……私も好きです」"
translation = "「흠흠…… 히노미야 회장은 그 작품에서는 친구 캐릭터를 좋아하시는군요. 평소에는 소심하지만 상냥하고, 하지만 유사시에는 용기를 쥐어짜내고…… 저도 좋아해요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「緋宮会長のベストバトルはどれですか？\u3000私は悪に堕ちて怪人になったライバルとの最後の一戦ですね」"
translation = "「히노미야 회장의 베스트 배틀은 무엇인가요? 저는 악에 타락하여 괴인이 된 라이벌과의 마지막 일전이네요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「互いを認めながらも怒りを捨てきれず、傷つけあって……胸が痛くなる戦いでした」"
translation = "「서로를 인정하면서도 분노를 버리지 못하고, 상처 입히고…… 가슴이 아픈 싸움이었어요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「でも全力でぶつかり合うことで理解し合えた。素晴らしい決着でした。……緋宮会長も同じですか？\u3000嬉しいですっ」"
translation = "「하지만 전력으로 부딪히면서 서로를 이해할 수 있었어요. 훌륭한 결착이었죠. ……히노미야 회장도 같은가요? 기쁘네요!」"

[[dialogue]]
speaker = "unk"
original = "お店に入って見てみる？"
translation = "가게에 들어가서 볼까?"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「いえ、私はグッズとかよくわからないもので……それに教皇の一人娘で流星学園の星徒会長ですから、私を知っている人もいるかもしれません」"
translation = "「아뇨, 저는 굿즈 같은 건 잘 몰라서…… 게다가 교황의 외동딸이고 유성 학원의 성도회장이니까, 저를 아는 사람도 있을지도 몰라요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「目立つかもしれませんし、こうして遠巻きに見ているだけでも楽しいですからお気になさらず……あれ、どちらに行かれるのですか？」"
translation = "「눈에 띌지도 모르고, 이렇게 멀리서 보고 있는 것만으로도 즐거우니까 신경 쓰지 마세요…… 어라, 어디로 가시는 거예요?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「何を買っていたのですか？」"
translation = "「무엇을 사고 계셨나요?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「！\u3000それは第五巻の限定版に付属していたマスコットキーホルダー！\u3000これを私に……？」"
translation = "「! 그것은 제5권 한정판에 부속되어 있던 마스코트 키홀더! 이것을 저에게……?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「まだ売っているところがあったんですか？\u3000あ、リサイクルショップもこの街にはあるのですね、なるほど」"
translation = "「아직 팔고 있는 곳이 있었나요? 아, 리사이클 숍도 이 거리에는 있군요, 과연」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「私が作品を知った時にはもうなくなっていて、諦めていたものでした。まさか手に入るとは思わなくて……ありがとうございます」"
translation = "「제가 작품을 알았을 때는 이미 없어서, 포기하고 있던 것이었어요. 설마 손에 넣을 수 있을 거라고는 생각하지 못해서…… 고맙습니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ニャリオンにも似ててかわいいですよね。……あれ、どうして引きつった笑みを浮かべてるんですか？」"
translation = "「냐리온과도 닮아서 귀엽죠. ……어라, 왜 억지웃음을 짓고 계신가요?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あっ、見てください。あちらの書店に並んでいる漫画、あれも最近のお気に入りなんです」"
translation = "「앗, 보세요. 저쪽 서점에 진열되어 있는 만화, 저것도 최근 마음에 드는 거예요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「主人公のヒーローは周りの人たちを守るために正体を隠していて、だから孤独で……」"
translation = "「주인공 히어로는 주변 사람들을 지키기 위해 정체를 숨기고 있어서, 그래서 고독하고……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「でもやむを得ず正体を明かした時、立ち上がってくれる人がいた。自分が守ってきた人々が助けてくれた。だからまた戦うことができた」"
translation = "「하지만 어쩔 수 없이 정체를 밝혔을 때, 일어서 주는 사람이 있었어요. 자신이 지켜온 사람들이 도와주었어요. 그래서 다시 싸울 수 있었죠」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「とても熱い展開で、いつの間にかページをめくるのが止まらなくなってしまいました」"
translation = "「매우 뜨거운 전개여서, 어느새 페이지를 넘기는 것을 멈출 수 없게 되었어요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「もしかして緋宮会長もこの作品をご存じなんですか？\u3000さすがですね」"
translation = "「혹시 히노미야 회장도 이 작품을 알고 계신가요? 역시 대단하네요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……えっ、この漫画の主人公が私に似てる？」"
translation = "「……엣, 이 만화의 주인공이 저를 닮았다고요?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「世界を守るために一生懸命だからって……そう言われると、ちょっと照れてしまいますね」"
translation = "「세계를 지키기 위해 열심히 하니까라고…… 그렇게 들으니, 조금 부끄러워지네요」"

[[dialogue]]
speaker = "unk"
original = "フィオナがピンチの時は俺たちが助けるよ"
translation = "피오나가 위험할 때는 우리들이 도와줄게"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふふっ、そうですね。お願いします」"
translation = "「후훗, 그렇네요. 부탁드려요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「教皇の娘として、星徒会長として……私にしかできないことがある。星見フィオナであること。それが私の使命だと思っていた」"
translation = "「교황의 딸로서, 성도회장으로서…… 저만이 할 수 있는 일이 있다. 호시미 피오나로 있는 것. 그것이 저의 사명이라고 생각했어요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「それは事実なんですけど……でも私の周りには味方がたくさんいて、みんな違う力を持っていて、みんな心強い存在で」"
translation = "「그것은 사실이지만…… 하지만 제 주변에는 아군이 잔뜩 있고, 모두 다른 힘을 가지고 있고, 모두 든든한 존재이고」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ソフィア、ユウリ、セーラさん、ルリエル……キリカたちメイド隊に、新星学園の星徒会のみなさん。もちろんあなたもその１人です」"
translation = "「소피아, 유우리, 세라 씨, 루리엘…… 키리카네 메이드 부대에, 신성 학원의 성도회 여러분. 물론 당신도 그중 한 명이에요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「わかっていたつもりでも、あなたに気付かされました」"
translation = "「알고 있었다고 생각했지만, 당신에게 깨달음을 얻었어요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……ふふふ。何のことかわからないって顔してますね。まぁあなたらしいですけど」"
translation = "「……후후후. 무슨 말인지 모르겠다는 얼굴을 하고 있네요. 뭐 당신답지만요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「今日はたまたま時間が空いていましたが、私にはいつもやるべきことがありましたし、昔から同年代の子たちより忙しかったですから」"
translation = "「오늘은 우연히 시간이 비었지만, 저에게는 항상 해야 할 일이 있었고, 옛날부터 또래 아이들보다 바빴으니까요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「だから今日は貴重な機会を頂けて、ありがとうございました」"
translation = "「그러니 오늘은 귀중한 기회를 주셔서, 고맙습니다」"

[[dialogue]]
speaker = "unk"
original = "……"
translation = "……"

[[dialogue]]
speaker = "unk"
original = "…………"
translation = "…………"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "（男性と二人きりで街に出て、楽しくお話をして、お店を見て回る……これは、これは……）"
translation = "（남성과 단둘이 거리에 나와서, 즐겁게 이야기를 하고, 가게를 둘러본다…… 이것은, 이것은……）"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "（俗に言うデートなのでは！？）"
translation = "（세간에서 말하는 데이트가 아닌가!?）"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あ、いえっ、何でもありませんっ。何でもありませんよっ」"
translation = "「아, 아니요, 아무것도 아니에요! 아무것도 아니에요!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "（どうして緋宮会長は平気そうなのーっ。それはそれでちょっと不本意というか、少しくらい気にしてもいいんじゃないの？\u3000私も一応女の子なんだし……）"
translation = "（어째서 히노미야 회장은 아무렇지도 않은 거야~. 그건 그거대로 조금 불만이라고 할까, 조금이라도 신경 써도 괜찮지 않아? 나도 일단 여자아이인데……）"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "（はっ、私は何を考えて──）"
translation = "（핫, 나는 무슨 생각을──）"

[[dialogue]]
speaker = "unk"
original = "顔が赤いけど大丈夫？"
translation = "얼굴이 빨간데 괜찮아?"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「！？」"
translation = "「!?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "（顔が近い！\u3000近いです！！\u3000そんな覗き込まないで！！）"
translation = "（얼굴이 가까워! 가까워요!! 그렇게 들여다보지 마세요!!）"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あ……う……うぅ……」"
translation = "「아…… 우…… 으윽……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "（顔が熱くて、爆発しそうなくらい胸がドキドキして……この気持ちはなんなんですか～っ）"
translation = "（얼굴이 뜨겁고, 폭발할 것 같이 가슴이 두근거리고…… 이 기분은 뭔가요~앗）"

