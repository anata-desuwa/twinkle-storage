[[dialogue]]
speaker = "unk"
original = "第４話,ルリエルのガイドブック,P"
translation = "제4화, 루리엘의 가이드북, P"

[[dialogue]]
speaker = "unk"
original = "休日の朝早くからルリエルに呼び出された俺は、流星学園の校門前に向かった。"
translation = "휴일 아침 일찍부터 루리엘에게 불려 나간 나는, 유성 학원의 교문 앞으로 향했다."

[[dialogue]]
speaker = "ルリエル"
original = "「会長さん！\u3000おはようございます～っ、来てくれて助かりました！」"
translation = "「회장님! 안녕하세요~, 와주셔서 살았어요!」"

[[dialogue]]
speaker = "ルリエル"
original = "「今日はぜひとも会長さんに、ガイドブック作りのお手伝いしてもらいたいと思いまして……！」"
translation = "「오늘은 꼭 회장님께, 가이드북 만들기를 도와주셨으면 해서요……!」"

[[dialogue]]
speaker = "unk"
original = "ガイドブックを……作る？"
translation = "가이드북을…… 만든다고?"

[[dialogue]]
speaker = "ルリエル"
original = "「はいです。いつも持ってるロロットさんのガイドブック、とっても便利なのですよ」"
translation = "「네이에요. 언제나 가지고 있는 로롯토 씨의 가이드북, 정말 편리한 거예요」"

[[dialogue]]
speaker = "ルリエル"
original = "「人間界の常識や、たくさんのことわざが載っていて素晴らしいので……それの流星市国バージョンを作りたいな～っと思ったのです！」"
translation = "「인간계의 상식이나, 수많은 속담이 실려 있어서 훌륭하니까…… 그것의 유성 시국 버전을 만들고 싶다~고 생각한 거예요!」"

[[dialogue]]
speaker = "unk"
original = "面白そうだね。手伝うよ"
translation = "재밌겠네. 도와줄게"

[[dialogue]]
speaker = "ルリエル"
original = "「ありがとうございます、なのです！\u3000今日はまず、流星と新星の両学園のページを充実させたいなと思っています～♪」"
translation = "「감사합니다, 인 거예요! 오늘은 우선, 유성과 신성 두 학원의 페이지를 충실하게 만들고 싶다고 생각하고 있어요~♪」"

[[dialogue]]
speaker = "ルリエル"
original = "「それでは、出発しましょう！」"
translation = "「그러면, 출발해요!」"

[[dialogue]]
speaker = "ルリエル"
original = "「まずは流星学園の星徒会室から。ルリエルたち星徒会メンバーがどんなお仕事をしているのか、書いちゃうのです」"
translation = "「우선 유성 학원의 성도회실부터. 루리엘들 성도회 멤버가 어떤 일을 하고 있는지, 써버리는 거예요」"

[[dialogue]]
speaker = "ルリエル"
original = "「特に、凛々しくって頼りになるフィオナ会長のことは、いっぱいページを割いて説明するのです～♪」"
translation = "「특히, 늠름하고 의지가 되는 피오나 회장님에 대해서는, 잔뜩 페이지를 할애해서 설명하는 거예요~♪」"

[[dialogue]]
speaker = "unk"
original = "ルリエルの字って……"
translation = "루리엘의 글씨는……"

[[dialogue]]
speaker = "ルリエル"
original = "「ちょ、ちょっと下手かもしれませんがっ。これはまだ下書きですから、いいのですっ！」"
translation = "「조, 조금 서툴지도 모르겠지만요. 이건 아직 초안이니까, 괜찮은 거예요!」"

[[dialogue]]
speaker = "ルリエル"
original = "「『何か困ったことがあれば、星徒会室に来るべきです……あと、お客さんには美味しいお茶菓子が出ます』……っと」"
translation = "「『뭔가 곤란한 일이 있다면, 성도회실에 와야 합니다…… 그리고, 손님에게는 맛있는 다과가 나옵니다』……라고」"

[[dialogue]]
speaker = "ルリエル"
original = "「うん、こんな感じですね。我ながらいい出来なのです。さぁ会長さん、次の場所へ行きましょう～♪」"
translation = "「응, 이런 느낌이네요. 나름대로 잘 만든 거예요. 자 회장님, 다음 장소로 가요~♪」"

[[dialogue]]
speaker = "ルリエル"
original = "「学園生活の憩いの場。カフェテリアの解説は欠かせません！\u3000特にアフタヌーンティーと一緒に出るケーキが最高なのですぅ～♪」"
translation = "「학원 생활의 휴식처. 카페테리아의 해설은 빠질 수 없어요! 특히 애프터눈 티와 함께 나오는 케이크가 최고인 거예요~♪」"

[[dialogue]]
speaker = "ルリエル"
original = "「ルリエルのおすすめもいっぱい書いちゃいます。これで初めて訪れた方も迷わずにすむのですよ」"
translation = "「루리엘의 추천도 잔뜩 써버릴 거예요. 이걸로 처음 방문하신 분도 헤매지 않아도 되는 거예요」"

[[dialogue]]
speaker = "ルリエル"
original = "「筆が乗ってきちゃいました。よぉし、お次は新星学園の方にも突撃取材です！\u3000会長さん、案内をお願いします～♪」"
translation = "「글이 술술 써지기 시작했어요. 좋았어, 다음은 신성 학원 쪽에도 돌격 취재예요! 회장님, 안내를 부탁드려요~♪」"

[[dialogue]]
speaker = "ルリエル"
original = "「新星学園の星徒会室も、広くて素敵です～♪\u3000ここは流星学園と双璧を為す学び舎で……」"
translation = "「신성 학원의 성도회실도, 넓고 멋져요~♪ 여기는 유성 학원과 쌍벽을 이루는 배움터로……」"

[[dialogue]]
speaker = "ルリエル"
original = "「あ、会長さん。ここで食べられる美味しいものって何でしょうか？」"
translation = "「아, 회장님. 여기서 먹을 수 있는 맛있는 건 뭐가 있을까요?」"

[[dialogue]]
speaker = "unk"
original = "グルメレポートになってない？"
translation = "글루메 리포트가 되어버리지 않았어?"

[[dialogue]]
speaker = "ルリエル"
original = "「大事なことなのですよっ！\u3000流星市国に来て、右も左もわからない人のためのガイドブックなのですから」"
translation = "「중요한 일인 거예요! 유성시국에 와서, 갈피를 못 잡는 분들을 위한 가이드북이니까요」"

[[dialogue]]
speaker = "ルリエル"
original = "「あちこちを歩き回ってお腹がぺこぺこの方はきっと多いのです。さー、新星学園の星徒会室で食べられる美味しいものを教えてくださいっ」"
translation = "「여기저기 돌아다녀서 배가 고픈 분들이 분명 많을 거예요. 자~, 신성학원의 성도회실에서 먹을 수 있는 맛있는 걸 알려주세요!」"

[[dialogue]]
speaker = "unk"
original = "そうして、ルリエルのガイドブック（？）作りに同伴し、学園のいろいろなところを回っているうちに、時間はあっという間に過ぎて──"
translation = "그렇게 루리에르의 가이드북(?) 만들기에 동행하여, 학원의 여러 곳을 돌아다니는 사이에 시간은 순식간에 지나가서──"

[[dialogue]]
speaker = "ルリエル"
original = "「すっかり日が暮れちゃいましたね、会長さん。でも大収穫なのです♪」"
translation = "「완전히 해가 저물어 버렸네요, 회장님. 하지만 대수확인 거예요♪」"

[[dialogue]]
speaker = "ルリエル"
original = "「学園の見どころスポットがいっぱいまとまっちゃいました。これがあればきっと、新しくやってきた天使さんも迷わずにすみますね♪」"
translation = "「학원의 볼거리 스폿이 잔뜩 정리되었어요. 이것만 있으면 분명, 새로 찾아온 천사님도 헤매지 않아도 되겠네요♪」"

[[dialogue]]
speaker = "ルリエル"
original = "「今回の事件みたいに、またリクリエの影響で異世界からやって来る方が現れるかもしれませんし……」"
translation = "「이번 사건처럼, 또 리크리에의 영향으로 이세계에서 찾아오는 분이 나타날지도 모르고……」"

[[dialogue]]
speaker = "ルリエル"
original = "「ルリエルみたいに、天界の田舎から来る子も大勢いるはずです。ふふ、その方たちにこのガイドブックを配るのです！」"
translation = "「루리에르처럼, 천계의 시골에서 오는 아이도 많이 있을 거예요. 후후, 그분들에게 이 가이드북을 나눠주는 거예요!」"

[[dialogue]]
speaker = "unk"
original = "いいアイデアだと思う"
translation = "좋은 아이디어라고 생각해"

[[dialogue]]
speaker = "ルリエル"
original = "「えへへ！\u3000田舎のじっちゃんとばっちゃんにも言われましたから。三界をつなぐ柱のような天使になれ……って」"
translation = "「에헤헤! 시골의 할배랑 할매에게도 들었거든요. 삼계를 잇는 기둥 같은 천사가 되거라…… 하고요」"

[[dialogue]]
speaker = "ルリエル"
original = "「でも今度の一件、ルリエルの考えは改まりました。三界以外の方がやってくることだってあります」"
translation = "「하지만 이번 일로, 루리에르의 생각은 바뀌었어요. 삼계 이외의 분들이 찾아오는 일도 있으니까요」"

[[dialogue]]
speaker = "ルリエル"
original = "「困っている方を少しでも手助けしたいな～って思ったんです。このガイドブック、まだまだ完成には程遠いですが……」"
translation = "「곤란해하는 분을 조금이라도 돕고 싶다~ 고 생각했어요. 이 가이드북, 아직 완성까지는 멀었지만……」"

[[dialogue]]
speaker = "ルリエル"
original = "「いつか絶対に『実話・人間界バージョン２』を完成させるのですよ。学園の外のデータも網羅した素晴らしい本にするのです♪」"
translation = "「언젠가 반드시 『실화·인간계 버전 2』를 완성시키는 거예요. 학원 밖의 데이터도 망라한 멋진 책으로 만드는 거예요♪」"

[[dialogue]]
speaker = "ルリエル"
original = "「明日からは町の各地を巡って、ページを増やしていく予定ですので。お手伝い、よろしくお願いします、なのです♪」"
translation = "「내일부터는 마을의 각지를 돌며 페이지를 늘려갈 예정이니까요. 도움, 잘 부탁드리는 거예요♪」"

[[dialogue]]
speaker = "unk"
original = "流星市国のあらゆる場所を巡って、分厚いガイドブックを作ろうと張り切るルリエル。"
translation = "유성시국의 모든 장소를 돌며, 두꺼운 가이드북을 만들려고 의욕에 찬 루리에르."

[[dialogue]]
speaker = "unk"
original = "この作業が終わるのは当分先になりそうだけれど──異世界との交流を通して、天使ルリエルは少しばかり広い視野を手に入れたみたいだ。"
translation = "이 작업이 끝나는 건 한참 뒤가 될 것 같지만── 이세계와의 교류를 통해, 천사 루리에르는 조금이나마 넓은 시야를 갖게 된 모양이다."

[[dialogue]]
speaker = "unk"
original = "俺も置いて行かれないように気合いを入れないとな、と思うのだった。"
translation = "나도 뒤처지지 않도록 기합을 넣어야겠다고 생각하는 것이었다."

