[[dialogue]]
speaker = "unk"
original = "第３話,英雄ウィステリア？,P"
translation = "제3화, 영웅 위스테리아?"

[[dialogue]]
speaker = "フィオナ"
original = "「グロリアスサマー！」"
translation = "「글로리어스 서머!」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ウンディーネラメント」"
translation = "「운디네 라멘트」"

[[dialogue]]
speaker = "unk"
original = "フィオナとウィステリアさん、２人が星術を放つと、激流がぶつかって水飛沫が弾けた。"
translation = "피오나와 위스테리아 씨, 두 사람이 성술을 내뿜자 격류가 부딪치며 물보라가 튀어 올랐다."

[[dialogue]]
speaker = "フィオナ"
original = "「お久しぶりです、ウィステリアさん」"
translation = "「오랜만입니다, 위스테리아 씨」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ええ、久しぶりね、フィオナさん。それとも、フィオナお嬢様と呼ぶべきかしら？」"
translation = "「그래, 오랜만이네, 피오나 씨. 아니면 피오나 아가씨라고 불러야 할까?」"

[[dialogue]]
speaker = "フィオナ"
original = "「やめてください。今のウィステリアさんはメイドじゃないんですから」"
translation = "「그만두세요. 지금의 위스테리아 씨는 메이드가 아니니까요」"

[[dialogue]]
speaker = "unk"
original = "なるほど、２人は知り合いなんだ"
translation = "과연, 두 사람은 아는 사이였구나"

[[dialogue]]
speaker = "ウィステリア"
original = "「ええ、昔、星見家メイド隊でバイトしてたから。といっても割とすぐ辞めちゃったから、フィオナさんは覚えてないかと思ってたけど」"
translation = "「응, 옛날에 호시미 가문 메이드대에서 아르바이트했었으니까. 그렇다고 해도 금방 그만둬버려서 피오나 씨는 기억 못 할 줄 알았는데」"

[[dialogue]]
speaker = "フィオナ"
original = "「いいえ、よく覚えていますよ。キリカととても仲が良かったですから」"
translation = "「아니요, 잘 기억하고 있어요. 키리카와 매우 사이가 좋았으니까요」"

[[dialogue]]
speaker = "ウィステリア"
original = "「う……フィオナさんまで……。全然仲良くないって言ってるのに、どうしてみんなそう言うのかしら……」"
translation = "「우…… 피오나 씨까지……. 전혀 안 친하다고 말하는데, 어째서 다들 그렇게 말하는 걸까……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「でも、２人して私に手合わせしてほしいってどういう風の吹き回し？\u3000キリカばっかり師匠呼びされるのは気に食わないから、相手するのはいいんだけど」"
translation = "「그런데 둘이서 나에게 대련을 부탁하다니 웬일이야? 키리카만 스승님이라고 불리는 건 마음에 안 드니까, 상대해 주는 건 상관없지만」"

[[dialogue]]
speaker = "フィオナ"
original = "「ウィステリアさんは在学中、“千年に一度の英雄”と呼ばれていたと、セーラさんに聞きましたから」"
translation = "「위스테리아 씨는 재학 중에 “천년에 한 번 나올 영웅”이라고 불렸다고 세라 씨에게 들었거든요」"

[[dialogue]]
speaker = "ウィステリア"
original = "「あー、そこから聞いたんだ……彼女、２つ下だから在学期間がギリギリ被ってるのよね……」"
translation = "「아~ 그쪽에서 들었구나…… 그녀는 2년 후배니까 재학 기간이 아슬아슬하게 겹치거든……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「でも私、星騎士としては邪道よ？\u3000私の戦闘力は、この魔導書の魔力があってのものだし」"
translation = "「하지만 나, 성기사로서는 사도라고? 나의 전투력은 이 마도서의 마력이 있어야 가능한 거니까」"

[[dialogue]]
speaker = "フィオナ"
original = "「と言いつつ、星力だけでもかなりの力をお持ちのようですけど。胸を借りるつもりでいきます」"
translation = "「라고 하시면서도 성력만으로도 상당한 힘을 가지고 계신 것 같네요. 한 수 배운다는 생각으로 가겠습니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「でもどうして海で、しかも水着で戦う必要があるんでしょう？\u3000ビーチの持ち主であるヘレナさんの許可は取りましたが……」"
translation = "「그런데 어째서 바다에서, 그것도 수영복 차림으로 싸울 필요가 있는 걸까요? 비치의 주인인 헬레나 씨의 허가는 받았습니다만……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「せっかくみんな水着があるんだし、着ないと損でしょ。お互い水着戦闘服を使いこなす練習も兼ねてってことで」"
translation = "「기껏 다들 수영복이 있는데 안 입으면 손해잖아. 서로 수영복 전투복을 다루는 연습도 겸해서 말이야」"

[[dialogue]]
speaker = "unk"
original = "魔導書は大丈夫ですか？"
translation = "마도서는 괜찮나요?"

[[dialogue]]
speaker = "ウィステリア"
original = "「海水ぐらい平気よ。なんてったって、呪いの書なんだもの。多分マグマに投げ入れても焦げ跡ひとつ付かないわ」"
translation = "「바닷물 정도는 괜찮아. 뭐니 뭐니 해도 저주의 서인걸. 아마 마그마에 던져 넣어도 그을음 하나 안 남을 거야」"

[[dialogue]]
speaker = "ウィステリア"
original = "「それじゃ……ビーチが消し飛ばない程度に頑張りましょうっ」"
translation = "「그럼…… 비치가 날아가지 않을 정도로만 힘내보자고」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ふぅ……こんなものかしら」"
translation = "「후우…… 이 정도일까」"

[[dialogue]]
speaker = "フィオナ"
original = "「はぁ、はぁ……さすがウィステリアさん、本当にお強かったです……」"
translation = "「하아, 하아…… 역시 위스테리아 씨, 정말 강하셨어요……」"

[[dialogue]]
speaker = "unk"
original = "もう限界です……"
translation = "이제 한계예요……"

[[dialogue]]
speaker = "ウィステリア"
original = "「ふふ、さすが星徒会長の２人だわ。私は魔導書あり、会長くんとフィオナさんは星力だけのハンデ戦だったけどね」"
translation = "「후후, 역시 성도회장 두 사람이네. 나는 마도서가 있었고, 회장군과 피오나 씨는 성력뿐인 핸디캡 매치였지만 말이야」"

[[dialogue]]
speaker = "フィオナ"
original = "「その条件でも、星徒会長２人を相手にできるのは異常な強さだと思います……」"
translation = "「그 조건에서도 성도회장 두 명을 상대할 수 있다는 건 이상할 정도의 강함이라고 생각합니다……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「でも、魔王の力を使われたら私に勝ち目ないでしょ？」"
translation = "「하지만 마왕의 힘을 사용한다면 나에게 승산은 없겠지?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「聞くところによると、会長くんとフィオナさんが持つ魔王の力は、星力・魔力・霊力を融合させ、さらに高次元のエネルギーを操ることができるとか」"
translation = "「듣기로는 회장군과 피오나 씨가 가진 마왕의 힘은 성력, 마력, 영력을 융합시켜 더욱 고차원의 에너지를 다룰 수 있다고 하던데」"

[[dialogue]]
speaker = "ウィステリア"
original = "「それに対し、私は星力と魔力をそれぞれ使えるだけ。魔王が核融合だとすれば、私はハイブリッドカーってところかしらね」"
translation = "「그에 반해 나는 성력과 마력을 각각 사용할 수 있을 뿐. 마왕이 핵융합이라면 나는 하이브리드 자동차라고나 할까」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ちなみに私の『フォビドゥンリアクター』は星力と魔力をぶつけることで爆発を起こしてるの。魔王でない者にはこれが限界ね」"
translation = "「참고로 나의 『포비든 리액터』는 성력과 마력을 충돌시켜 폭발을 일으키는 거야. 마왕이 아닌 자에게는 이게 한계지」"

[[dialogue]]
speaker = "フィオナ"
original = "「逆に言えば、魔王の血筋でないのにそこに近づいている……それがウィステリアさんの強さの秘密だったんですね」"
translation = "「반대로 말하면 마왕의 혈통이 아닌데도 그곳에 근접해 있다…… 그것이 위스테리아 씨의 강함의 비밀이었군요」"

[[dialogue]]
speaker = "ウィステリア"
original = "「まぁそういうことになるわね。魔王の力を知ったのは最近のことだし、真似したわけじゃないけど」"
translation = "「뭐, 그렇게 되는 셈이지. 마왕의 힘을 안 건 최근의 일이고, 흉내 낸 건 아니지만」"

[[dialogue]]
speaker = "unk"
original = "さすが“千年に一度の英雄”です"
translation = "역시 “천년에 한 번 나올 영웅”답네요"

[[dialogue]]
speaker = "ウィステリア"
original = "「うぅ、それはやめてってば……」"
translation = "「으으, 그건 그만두라니까……」"

[[dialogue]]
speaker = "フィオナ"
original = "「確かに、どうして“千年に一度の英雄”なんて言われたんでしょう？\u3000ウィステリアさんはお強いですが、いささか表現が大仰な気が……」"
translation = "「확실히 어째서 “천년에 한 번 나올 영웅” 같은 말을 듣게 된 걸까요? 위스테리아 씨는 강하시지만, 다소 표현이 과장된 느낌이……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「うーん、それは私もイマイチわかってないのよね。そう言われたのはアレと戦った後なんだけど……」"
translation = "「으음, 그건 나도 잘 모르겠어. 그런 말을 듣게 된 건 그 녀석과 싸운 뒤였는데……」"

[[dialogue]]
speaker = "フィオナ"
original = "「アレ？」"
translation = "「그 녀석?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「大きなトカゲ──あ、ドラゴンのことトカゲって言ったらマハムートさんに失礼ね。ドラゴンよ、ドラゴン」"
translation = "「커다란 도마뱀── 아, 드래곤을 도마뱀이라고 하면 마하무트 선배에게 실례겠네. 드래곤이야, 드래곤」"

[[dialogue]]
speaker = "ウィステリア"
original = "「なんかこう……次元のねじれ的なのに迷い込んだ先に、とっても強いドラゴンがいたのよ」"
translation = "「뭐랄까…… 차원의 뒤틀림 같은 곳에 헤매다 들어간 끝에 아주 강한 드래곤이 있었어」"

[[dialogue]]
speaker = "ウィステリア"
original = "「もし世に放たれたら世界が大変なことになる。一目でそう確信したわ」"
translation = "「만약 세상에 풀려난다면 세계가 큰일 날 거다. 한눈에 그렇게 확신했지」"

[[dialogue]]
speaker = "ウィステリア"
original = "「だけど倒そうとしたら強いのなんのって。何度も死にかけたわ」"
translation = "「하지만 쓰러뜨리려고 하니 어찌나 강한지. 몇 번이나 죽을 뻔했어」"

[[dialogue]]
speaker = "ウィステリア"
original = "「いいところまではいったけど、結局仕留め切れなくて、呪いまくって鎖で<ruby>雁字搦<rt>がんじがら</rt></ruby>めにしてやったのよ」"
translation = "「좋은 지점까지는 갔지만 결국 숨통을 끊지 못해서, 저주를 퍼붓고 사슬로 꽁꽁 묶어버렸지」"

[[dialogue]]
speaker = "ウィステリア"
original = "「それを学園に報告したら、当時いた誰かが“千年に一度の英雄”だって言い出してね」"
translation = "「그걸 학원에 보고했더니 당시에 있던 누군가가 “천년에 한 번 나올 영웅”이라고 말하기 시작하더라고」"

[[dialogue]]
speaker = "ウィステリア"
original = "「あのドラゴン、今どうなってるのかしらね？\u3000今まで見てないってことは、まだあそこにいると思うんだけど」"
translation = "「그 드래곤, 지금은 어떻게 됐으려나? 지금까지 못 본 걸 보면 아직 그곳에 있을 것 같은데」"

[[dialogue]]
speaker = "フィオナ"
original = "「ドラゴン……鎖……もしかして」"
translation = "「드래곤…… 사슬…… 설마」"

[[dialogue]]
speaker = "unk"
original = "そのドラゴン、こんなのじゃありませんでした……？"
translation = "그 드래곤, 이런 모습 아니었나요……?"

[[dialogue]]
speaker = "unk"
original = "ＤＩＳＣで記録したデータを見せると──"
translation = "DISC로 기록한 데이터를 보여주자──"

[[dialogue]]
speaker = "ウィステリア"
original = "「そう、これこれ！\u3000私が戦ったのは鎖がない時だけど……確かにこのドラゴンだったわ。これどうしたの？」"
translation = "「그래, 이거 이거! 내가 싸웠을 때는 사슬이 없을 때였지만…… 확실히 이 드래곤이었어. 이거 어떻게 된 거야?」"

[[dialogue]]
speaker = "フィオナ"
original = "「私たちがフィーニスの塔で遭遇した煌竜ヴィライアです。両星徒会のメンバーが総力をかけて倒したのですが……」"
translation = "「저희가 피니스의 탑에서 조우한 황룡 빌라이아입니다. 양 성도회 멤버가 총력을 기울여 쓰러뜨렸습니다만……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「あれを倒したの！？\u3000さすが会長くんたち、魔王の名に偽りなしね！」"
translation = "「그걸 쓰러뜨렸어!? 역시 회장군 일행, 마왕의 이름에 거짓이 없네!」"

[[dialogue]]
speaker = "フィオナ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "ウィステリア"
original = "「フィオナさん？\u3000どうしたの？」"
translation = "「피오나 씨? 왜 그래?」"

[[dialogue]]
speaker = "フィオナ"
original = "「いえ……確かに“千年に一度の英雄”と呼ばれるにふさわしいお力ですね……」"
translation = "「아니요…… 확실히 “천년에 한 번 나올 영웅”이라 불리기에 합당한 힘이시네요……」"

[[dialogue]]
speaker = "unk"
original = "さすが英雄ですね……"
translation = "역시 영웅이시네요……"

[[dialogue]]
speaker = "ウィステリア"
original = "「ええ～っ、なんで会長くんたちもそれ言うのよ～っ！？」"
translation = "「에에~, 왜 회장군 일행까지 그걸 말하는 거야~!」"

[[dialogue]]
speaker = "unk"
original = "煌竜ヴィライアは、森羅暦以前の世界で魔界を滅ぼした、災厄の化身とも言うべき魔物。"
translation = "황룡 빌라이아는 신라력 이전의 세계에서 마계를 멸망시킨, 재앙의 화신이라 불릴 만한 마물."

[[dialogue]]
speaker = "unk"
original = "詳しい経緯は不明だが、ヴィライアと渡り合ったウィステリアさんは、間違いなく“英雄”と呼ばれるに足る存在だった。"
translation = "자세한 경위는 불분명하지만, 빌라이아와 맞섰던 위스테리아 씨는 틀림없이 “영웅”이라 불리기에 충분한 존재였다."

