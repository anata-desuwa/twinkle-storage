[[dialogue]]
speaker = "unk"
original = "第１話,アニマの告白,P"
translation = "제1화, 아니마의 고백"

[[dialogue]]
speaker = "unk"
original = "先日、アニマ先輩が分裂薬で２人に増える出来事があった。"
translation = "며칠 전 아니마 선배가 분열약으로 두 명으로 늘어나는 사건이 있었다."

[[dialogue]]
speaker = "unk"
original = "そして、そのことがきっかけで、アニマ先輩が俺を異性としてどう思っているのかについて、本心を聞かされることとなった。"
translation = "그리고 그 일이 계기가 되어 아니마 선배가 나를 이성으로서 어떻게 생각하는지에 대해 본심을 듣게 되었다."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「アニマも、好きダ。キミのことが――大好きダ……！」"
translation = "「아니마도 좋아한다다. 너를── 아주 좋아한다다……!」"

[[dialogue]]
speaker = "unk"
original = "俺も、アニマ先輩のことが好きだと伝え、晴れて恋人関係になった――"
translation = "나도 아니마 선배를 좋아한다고 전하고 정식으로 연인 관계가 되었다──"

[[dialogue]]
speaker = "unk"
original = "はずだったのだが……。"
translation = "그럴 터였는데……."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「……会長、わざわざ呼び出してすまナイ。先日言ったことについてなのだが……」"
translation = "「……회장, 일부러 불러내서 미안하다다로우. 요전에 말한 것에 대해서다만……」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「その……忘れて欲しイ」"
translation = "「그…… 잊어줬으면 좋겠다다.」"

[[dialogue]]
speaker = "unk"
original = "そんな……どうしてですか？"
translation = "「그런…… 어째서인가요?」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「キミのことが好きと言ったのは嘘ではナイ。だが……アニマは、その気持ちを口にするつもりはなかったんダ」"
translation = "「너를 좋아한다고 말한 건 거짓말이 아니야. 하지만…… 아니마는, 그 마음을 입 밖으로 낼 생각은 없었단다」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「何故なら……アニマは恋人を作る資格がナイからダ」"
translation = "「왜냐하면…… 아니마는 연인을 만들 자격이 없기 때문이야」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「――アニマは、錬金術師としての夢がアル。それは……」"
translation = "「――아니마는, 연금술사로서의 꿈이 있어. 그것은……」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「『魂の根源』を明らかにすることダ」"
translation = "「『영혼의 근원』을 밝혀내는 것이란다」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「――簡単に言うと、魂とはどのように作られているのか、その成分を明らかにし、錬金術師として作り出せるようになるコト」"
translation = "「――간단히 말하자면, 영혼이란 어떻게 만들어져 있는지 그 성분을 밝혀내고, 연금술사로서 만들어낼 수 있게 되는 것」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「それはつまり、物理的な創造から、概念的な創造へとシフトする、錬金術の新たな扉を開くことでもアル」"
translation = "「그것은 즉, 물리적인 창조에서 개념적인 창조로 시프트하는, 연금술의 새로운 문을 여는 것이기도 하단다」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「そこへ辿り着くのは、決して簡単なことではナイ。最大の近道は、百聞は一見に如かずという言葉があるように、自身が『魂の感覚』を体験するコト」"
translation = "「그곳에 도달하는 것은 결코 쉬운 일이 아니야. 가장 빠른 지름길은, 백문이 불여일견이라는 말이 있듯이 스스로가 『영혼의 감각』을 체험하는 것」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「故にアニマは、最終的には肉体を捨て、魂だけの存在へとなろうと考えているんダ」"
translation = "「고로 아니마는, 최종적으로는 육체를 버리고 영혼만의 존재가 되려고 생각하고 있단다」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「つまりは、アニマはキミと恋人になったとしても、いずれ物理的に触れ合えなくナル。それは……キミにとって、決して望ましいことではないダロウ？」"
translation = "「즉, 아니마는 너와 연인이 된다고 해도, 결국 물리적으로 접촉할 수 없게 돼. 그것은…… 너에게 있어 결코 바람직한 일은 아니겠지?」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「だから、人生のパートナーとして、アニマは不適合なんダ。アニマはキミを……幸せにすることはできナイ」"
translation = "「그래서 인생의 파트너로서 아니마는 부적합하단다. 아니마는 너를…… 행복하게 해 줄 수 없어」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「好意があっても、アニマはキミの恋人になるべきではないんダ」"
translation = "「호감이 있어도, 아니마는 너의 연인이 되어서는 안 되는 거란다」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「アニマは、夢を捨てることはできナイ。その上で、キミのことが好きだと思うからこそ――」"
translation = "「아니마는 꿈을 버릴 수는 없어. 그 점을 토대로, 너를 좋아한다고 생각하기에 더더욱――」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「キミには、ちゃんと幸せになって欲しいんダ」"
translation = "「너에게는 제대로 행복해졌으면 좋겠단다」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「ほら、キミの周りには、アニマよりも女の子らしい女の子が沢山いるダロウ？\u3000だから……」"
translation = "「자, 네 주변에는 아니마보다 여자아이다운 여자아이가 많이 있잖니? 그러니까……」"

[[dialogue]]
speaker = "unk"
original = "……先輩の言いたいことはわかりました"
translation = "……선배가 하고 싶은 말은 알겠습니다"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "だけど――俺は。"
translation = "하지만―― 저는."

[[dialogue]]
speaker = "unk"
original = "俺が好きなのは、アニマ先輩です！"
translation = "제가 좋아하는 건, 아니마 선배입니다!"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「っ……！」"
translation = "「윽……!」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「キミがそう言ってくれるのは嬉しイ。だが、アニマは――」"
translation = "「네가 그렇게 말해주는 건 기뻐. 하지만 아니마는――」"

[[dialogue]]
speaker = "unk"
original = "――たとえ将来……アニマ先輩が夢を叶える為に肉体を捨てることになるのだとしても。"
translation = "――설령 장래에…… 아니마 선배가 꿈을 이루기 위해 육체를 버리게 된다고 해도."

[[dialogue]]
speaker = "unk"
original = "俺は、本気で研究に打ち込むアニマ先輩を尊敬しているし、応援したいと思っている。"
translation = "저는 진심으로 연구에 매진하는 아니마 선배를 존경하고, 응원하고 싶다고 생각해요."

[[dialogue]]
speaker = "unk"
original = "だって――俺も本気でアニマ先輩のことが好きだから。"
translation = "그야―― 저도 진심으로 아니마 선배를 좋아하니까요."

[[dialogue]]
speaker = "unk"
original = "だから、アニマ先輩が嫌じゃなければ、どうか夢を叶えるその瞬間まで、そばに居させて下さい。"
translation = "그러니까 아니마 선배가 싫지 않다면, 부디 꿈을 이루는 그 순간까지 곁에 있게 해주세요."

[[dialogue]]
speaker = "unk"
original = "俺はそう伝えた。"
translation = "나는 그렇게 전했다."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「か、会長……」"
translation = "「카, 회장……」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「せっかく断る覚悟を決めて、アニマは言いにキタというのに……」"
translation = "「겨우 거절할 각오를 다지고 아니마는 말하러 왔건만……」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「そんな真剣に言われたら……また迷ってしまうじゃナイか。将来のことを考えたら、よくないとわかってイルのに……」"
translation = "「그렇게 진지하게 말하면…… 또 망설이게 되잖니. 장래를 생각하면 좋지 않다는 걸 알고 있는데도……」"

[[dialogue]]
speaker = "unk"
original = "実験してみませんか？"
translation = "실험해보지 않겠어요?"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker = "unk"
original = "恋愛の実験です"
translation = "연애 실험이에요"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「実験……？」"
translation = "「실험……?」"

[[dialogue]]
speaker = "unk"
original = "俺は頷く。"
translation = "나는 고개를 끄덕인다."

[[dialogue]]
speaker = "unk"
original = "いつもアニマ先輩が作った薬を俺が飲んで試しているように、その効果の度合いや副作用は、実験してみないと分からない。"
translation = "항상 아니마 선배가 만든 약을 내가 마셔서 시험하고 있는 것처럼, 그 효과의 정도나 부작용은 실험해보지 않으면 알 수 없다."

[[dialogue]]
speaker = "unk"
original = "だから、俺たちの関係がどうなるかも、実際に付き合ってみないとわからないはずだと説明する。"
translation = "그러니 우리 관계가 어떻게 될지도 실제로 사귀어보지 않으면 모를 일이라고 설명한다."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「……ああ、ソウか。アニマは……どうやら臆病になってしまっていたみたいダ……」"
translation = "「……아아, 그렇구나. 아니마는…… 아무래도 겁쟁이가 되어버렸던 모양이야……」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「キミの言う通りだナ。どれだけ予測を立てても、実際にやってみなければ、結果がどうなるかはわからない。実験とはそういうものダ」"
translation = "「네 말대로란다. 아무리 예측을 세워도 실제로 해보지 않으면 결과가 어떻게 될지는 알 수 없어. 실험이란 그런 것이지」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「にも関わらず、アニマは恋愛を試してみることすら、及び腰になってしまってイタ」"
translation = "「그럼에도 불구하고 아니마는 연애를 시도해보는 것조차 주저하고 있었어」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「アニマは……キミとの恋愛に失敗して、嫌われてしまうことが怖かったんダ……」"
translation = "「아니마는…… 너와의 연애에 실패해서 미움받는 것이 무서웠단다……」"

[[dialogue]]
speaker = "unk"
original = "俺は簡単に先輩を手離したりしませんよ"
translation = "저는 쉽게 선배를 놓아주거나 하지 않아요"

[[dialogue]]
speaker = "unk"
original = "失敗したとしても、"
translation = "실패한다고 해도,"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「――それくらい、本気で好きだから……？」"
translation = "「――그 정도로 진심으로 좋아하니까……?」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「……キミは、アニマの実験にいつも本気で付き合ってくれタ」"
translation = "「……너는 아니마의 실험에 항상 진심으로 어울려 주었지」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「なのに、アニマが今更キミの気持ちを疑うのは、失礼というものだナ……」"
translation = "「그런데 아니마가 이제 와서 네 마음을 의심하는 건 실례되는 일이겠구나……」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「――アニマは、本当は……キミと恋人になってみたいと思ってイル」"
translation = "「――아니마는 사실…… 너와 연인이 되어보고 싶다고 생각하고 있어」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「恋愛に興味がアル。アニマが体験したことのない関係性を、試してみたイ」"
translation = "「연애에 흥미가 있어. 아니마가 체험해보지 못한 관계성을 시험해보고 싶어」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「……さっきも言った通り、キミとの将来がどうなるかは分からなイ。それでも、実験に付き合ってくれるというなら――」"
translation = "「……아까도 말했듯이 너와의 장래가 어떻게 될지는 알 수 없어. 그래도 실험에 어울려 주겠다면――」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「コホン……」"
translation = "「큼큼……」"

[[dialogue]]
speaker = "unk"
original = "先輩は１度咳ばらいをすると──"
translation = "선배는 한 번 헛기침을 하더니──"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「改めて、アニマと……恋人になってくれるダロウか、会長……？」"
translation = "「다시 한번, 아니마와…… 연인이 되어주겠니, 회장……?」"

[[dialogue]]
speaker = "unk"
original = "もちろん。喜んでお付き合いします"
translation = "물론이죠. 기꺼이 사귀겠습니다"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「そ、そうか……じゃあ、これで……契約は成立というわけダナ」"
translation = "「그, 그래…… 그럼 이걸로…… 계약은 성립이라는 거구나」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「な、なんだか、照れるナ……」"
translation = "「왠지 쑥스럽구나……」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「フヒ……♪」"
translation = "「후히……♪」"

[[dialogue]]
speaker = "unk"
original = "アニマ先輩の照れた顔、可愛いです"
translation = "아니마 선배의 부끄러워하는 얼굴, 귀여워요"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「な……！？\u3000き、急にそんなこと言うなんて、ずるいゾ……！」"
translation = "「뭐……!? 갑자기 그런 소릴 하다니 치사하다구……!」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「――恋人になったら、実験してみたかった？\u3000……って、ひゃんっ！？」"
translation = "「――연인이 되면 실험해보고 싶었다? ……라니, 히양!?」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「か、会長……い、いきなりアニマを抱き締めるなんて……実験には準備段階というものがあってダナ……あ、アニマ的には、スキンシップはまだ早いと……」"
translation = "「회, 회장…… 가, 갑자기 아니마를 껴안다니…… 실험에는 준비 단계라는 것이 있어서 말이지…… 아, 아니마적으로는 스킨십은 아직 이르다고……」"

[[dialogue]]
speaker = "unk"
original = "ごめんなさい。でも――"
translation = "죄송해요. 하지만――"

[[dialogue]]
speaker = "unk"
original = "俺は彼女へそっと、顔を近づけてキスをする。"
translation = "나는 그녀에게 살며시 얼굴을 가까이 대고 키스를 한다."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「あっ……会長……<emoji=heart04>」"
translation = "「앗…… 회장……♥」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「んっ……<emoji=heart04>」"
translation = "「응……♥」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「ちゅっ……<emoji=heart04>\u3000んむっ……ちゅっ……<emoji=heart04>」"
translation = "「쪽……♥ 음…… 쪽……♥」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「……はあぁ<emoji=heart04>\u3000付き合い始めたばかりなのに、すぐにキスをしてしまうナンて……<emoji=heart04>」"
translation = "「……하아아♥ 사귀기 시작한 지 얼마 안 됐는데 바로 키스를 해버리다니……♥」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「――恋人になった副作用で、好きという気持ちが抑えられナイ……？」"
translation = "「――연인이 된 부작용으로 좋아한다는 마음을 억누를 수 없어……?」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「そ、そうか……なら、仕方ない、ナ……」"
translation = "「그, 그래…… 그럼 어쩔 수 없구나……」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「恋人として、アニマが責任を持って、鎮めないと……ナ？」"
translation = "「연인으로서 아니마가 책임지고 진정시켜야……겠지?」"

[[dialogue]]
speaker = "unk"
original = "照れながら、じっと上目遣いで俺の目を見つめて来るアニマ先輩。"
translation = "부끄러워하면서도 가만히 치켜뜬 눈으로 내 눈을 빤히 바라보는 아니마 선배."

[[dialogue]]
speaker = "unk"
original = "そんな風に可愛く同意されてしまっては、我慢できるはずもなく。"
translation = "그런 식으로 귀엽게 동의해버리면 참을 수 있을 리가 없다."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「んっ……<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「응……♥ 쪽……♥」"

[[dialogue]]
speaker = "unk"
original = "俺はそれからまた、先輩と甘い実験を続けてしまうのだった――"
translation = "나는 그 후로 또 선배와 달콤한 실험을 계속하는 것이었다――"

