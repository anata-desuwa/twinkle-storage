[[dialogue]]
speaker = "unk"
original = "第１話,ハニートラップマイン,P"
translation = "제1화, 허니 트랩 마인, P"

[[dialogue]]
speaker = "unk"
original = "マインと恋人として付き合い始めてからしばらく経ち、迎えた夏のある日。"
translation = "마인과 연인으로서 사귀기 시작한 지 얼마 되지 않은, 어느 여름날."

[[dialogue]]
speaker = "unk"
original = "俺はマインとリゾート結界へ遊びに来ていた――"
translation = "나는 마인과 리조트 결계로 놀러 와 있었다──"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「にひひ♪\u3000会長～♪」"
translation = "「니히히♪ 회장님～♪」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「公安委員会の件もひと段落して、やっと２人きりで海で遊べるね♪」"
translation = "「공안위원회 일도 일단락됐고, 드디어 둘이서만 바다에서 놀 수 있겠네♪」"

[[dialogue]]
speaker = "unk"
original = "水着姿、今日も似合ってるよ"
translation = "수영복 차림, 오늘도 잘 어울려."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「にひっ、わざわざ褒め直すなんて、紳士なこと言うじゃ～ん」"
translation = "「니히잇, 새삼스럽게 칭찬하다니, 신사적인 소릴 다 하네에ー」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「――２人で海デートしに来たから、改めてちゃんと言いたかったって？」"
translation = "「──둘이서 바다 데이트하러 왔으니까, 다시 한번 제대로 말하고 싶었다고?」"

[[dialogue]]
speaker = "unk"
original = "それに、恋人フィルターを無視したとしても、マインの水着姿はついつい見惚れてしまうくらいに可愛い。"
translation = "게다가, 연인 필터를 무시하더라도, 마인의 수영복 차림은 나도 모르게 넋을 잃고 볼 정도로 귀엽다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「そこまで褒めてくれるなら、素直に受け取っておこうかな♪\u3000この水着フォームの元になったのは、私自身で選んだやつだしね」"
translation = "「그렇게까지 칭찬해 준다면, 솔직하게 받아둘까나♪ 이 수영복 폼의 모태가 된 건, 내가 직접 고른 거기도 하고 말이야.」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「それじゃあ会長、デート始めよっか<emoji=heart04>」"
translation = "「그럼 회장님, 데이트 시작할까❤️」"

[[dialogue]]
speaker = "unk"
original = "まずは２人で結界内を散歩しようとなり、ビーチを歩いていたのだが――マインは美少女で目立つ容姿をしている為、周囲から注目を浴びる。"
translation = "우선 둘이서 결계 안을 산책하기로 하여, 해변을 걷고 있었는데── 마인은 미소녀에 눈에 띄는 외모를 하고 있어서, 주변의 주목을 받는다."

[[dialogue]]
speaker = "unk"
original = "俺がちょっと目を離していると、どこぞの男がナンパして来て――"
translation = "내가 잠시 눈을 떼고 있으면, 어디선가 남자가 헌팅을 해와서──"

[[dialogue]]
speaker_original = "男"
speaker_translation = "남자"
original = "「ねぇ、キミ可愛いね～。俺と遊ばない？」"
translation = "「저기, 너 귀엽네. 나랑 놀지 않을래?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ごめんね～。残念だけど私、彼氏いるんだ～」"
translation = "「미안해~. 아쉽지만 나, 남자친구 있거든~」"

[[dialogue]]
speaker = "unk"
original = "ネーゼマインはこちらに駆け寄ると、腕に抱き着いてきて、俺は思わずドキッとしてしまう。"
translation = "네제마인은 이쪽으로 달려오더니, 팔에 매달려 왔고, 나는 나도 모르게 가슴이 두근거린다."

[[dialogue]]
speaker = "unk"
original = "水着で肌面積が多い為、マインの<b>柔らかな部分</b>の感触が、腕にダイレクトに伝わって来る。"
translation = "수영복이라 피부 노출이 많은 탓에, 마인의 <ruby>부드러운 부분<rt>・・・・ ・・</rt></ruby>의 감촉이 팔에 다이렉트로 전해져 온다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「じゃあね～」"
translation = "「그럼 안녕~」"

[[dialogue]]
speaker = "unk"
original = "恨めしそうな視線を俺に向けつつ去っていく男に、手を振って見送るマイン。"
translation = "원망스러운 시선을 나에게 보내며 떠나가는 남자에게, 손을 흔들어 배웅하는 마인."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「これくらいくっ付いてるところ見せとけば、ナンパも諦めるでしょ」"
translation = "「이 정도로 달라붙어 있는 모습을 보여주면, 헌팅도 포기하겠지.」"

[[dialogue]]
speaker = "unk"
original = "そう言うと、彼女はあっさりと俺の腕から離れる。"
translation = "그렇게 말하더니, 그녀는 산뜻하게 내 팔에서 떨어진다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「さて、散歩の続きをしよっか☆」"
translation = "「자, 산책을 계속할까☆」"

[[dialogue]]
speaker = "unk"
original = "それからしばらくして、俺とマインは海に入り、彼女の能力で作った『水風船』でバレーを行っていた。"
translation = "그로부터 얼마 후, 나와 마인은 바다에 들어가, 그녀의 능력으로 만든 『물풍선』으로 배구를 하고 있었다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「きゃははっ☆\u3000これで私の３連勝～♪\u3000会長、弱～い☆」"
translation = "「캬하하☆ 이걸로 나의 3연승~♪ 회장님, 약해애☆」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「――水風船を割らないコツが分かってきたって？\u3000本当かな～？」"
translation = "「──물풍선을 터뜨리지 않는 요령을 알 것 같다고? 진짜려나~?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「じゃあ、次の水風船行くよ～♪」"
translation = "「자, 다음 물풍선 간다~♪」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「おっと」"
translation = "「어이쿠.」"

[[dialogue]]
speaker = "unk"
original = "水風船を投げようと前のめりになって、姿勢を崩したマイン。俺は咄嗟にそれを支える。"
translation = "물풍선을 던지려고 앞으로 숙이다가, 자세를 무너뜨린 마인. 나는 급히 그녀를 지탱한다."

[[dialogue]]
speaker = "unk"
original = "マインと肌がくっ付いて、今にも唇が触れあいそうな距離。目も合って、お互いに見つめ合う。"
translation = "마인과 피부가 맞닿아, 당장이라도 입술이 닿을 듯한 거리. 눈도 마주쳐서, 서로를 가만히 바라본다."

[[dialogue]]
speaker = "unk"
original = "マイン……"
translation = "마인……"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「会長、支えてくれてありがと♪」"
translation = "「회장님, 지탱해줘서 고마워♪」"

[[dialogue]]
speaker = "unk"
original = "しかし、お礼を言って、さっと体を離すマイン。"
translation = "하지만, 고맙다는 말을 하고, 금방 몸을 떼는 마인."

[[dialogue]]
speaker = "unk"
original = "そんなことが続き、俺は彼女に正直な気持ちを伝えることにした。"
translation = "그런 일이 계속되자, 나는 그녀에게 솔직한 기분을 전하기로 했다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ん～？\u3000どうしたの、会長？」"
translation = "「응~? 왜 그래, 회장님?」"

[[dialogue]]
speaker = "unk"
original = "……マインと触れ合いたい"
translation = "……마인과 닿고 싶어."

[[dialogue]]
speaker = "unk"
original = "すると彼女は、わざとらしく悪戯っぽい笑みを浮かべて――"
translation = "그러자 그녀는, 짐짓 장난스러운 미소를 지으며──"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「にひひ♪」"
translation = "「니히히♪」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「え～？\u3000私まだ、海で遊び足りないんだけどな～？」"
translation = "「에~? 난 아직, 바다에서 더 놀고 싶은데 말이야~?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「まあ、恋人だし、会長がそういうことをしたいっていうなら仕方ないけど♪」"
translation = "「뭐, 연인이기도 하고, 회장님이 그런 걸 하고 싶다면 어쩔 수 없지만♪」"

[[dialogue]]
speaker = "unk"
original = "俺たちは他に人がいないプライベートビーチの方へと移動する。"
translation = "우리들은 다른 사람이 없는 프라이빗 비치 쪽으로 이동한다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「それで？\u3000会長はこんな誰も見ていないところに連れ込んで、私とどんなスキンシップがお望みなのかな～？」"
translation = "「그래서? 회장님은 이런 아무도 안 보는 곳으로 데려와서, 나랑 어떤 스킨십을 원하시는 걸까나~?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「――ん～？\u3000ハグしたいの？\u3000仕方ないな～♪」"
translation = "「──응~? 허그하고 싶어? 어쩔 수 없네~♪」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「じゃあ、会長の方からどうぞ♪」"
translation = "「그럼, 회장님 쪽에서 먼저 하세요♪」"

[[dialogue]]
speaker = "unk"
original = "俺は彼女の体を抱き寄せる。"
translation = "나는 그녀의 몸을 끌어안는다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んっ<emoji=heart04>\u3000にひっ……<emoji=heart04>\u3000そんな、ぎゅ～ってしたかったんだ？」"
translation = "「응❤️ 니히잇……❤️ 그렇게나, 꼬옥~ 하고 싶었어?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「水着だから、お肌の触れ合い密度マシマシだね<emoji=heart04>」"
translation = "「수영복이라서, 피부 접촉 밀도가 어마어마하네❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「きゃはっ<emoji=heart04>\u3000背中に回した手の触れ方が、なんかすごくエッチな感じがするんだけど～<emoji=heart04>」"
translation = "「캬핫❤️ 등 뒤로 두른 손이 닿는 느낌이, 왠지 엄청 야한 느낌이 드는데~❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ん？\u3000なぁに、会長、聞きたいことって？」"
translation = "「응? 뭐야, 회장님, 묻고 싶은 게 뭐야?」"

[[dialogue]]
speaker = "unk"
original = "もしかして今日、わざと誘うようにしてた？"
translation = "혹시 오늘, 일부러 유혹한 거야?"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「にひひ♪\u3000なんのことかな～？」"
translation = "「니히히♪ 무슨 소릴까나~?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「それで？\u3000会長はもう、スキンシップは満足なのかな？」"
translation = "「그래서? 회장님은 이제 스킨십은 만족하셨나?」"

[[dialogue]]
speaker = "unk"
original = "キスがしたい"
translation = "키스하고 싶어."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「仕方ないな～」"
translation = "「어쩔 수 없네~」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ん～……<emoji=heart04>」"
translation = "「응~……❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ちゅっ……<emoji=heart04>」"
translation = "「쪽……❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「はい、これでいい？\u3000――もっとしたいの？」"
translation = "「자, 이걸로 됐어? ──더 하고 싶어?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「にひひ♪\u3000会長ってばエッチ～<emoji=heart04>」"
translation = "「니히히♪ 회장님도 참 야해~❤️」"

[[dialogue]]
speaker = "unk"
original = "マインはからかいながらも、俺の要望に応えてくれる。"
translation = "마인은 놀리면서도, 나의 요청에 응해준다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ん～<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「응~❤️ 쪽❤️ 쪽……❤️」"

[[dialogue]]
speaker = "unk"
original = "それからも、俺たちは２人きりの海で、甘いスキンシップの時間を楽しむのだった――"
translation = "그 후로도, 우리들은 둘만의 바다에서, 달콤한 스킨십의 시간을 즐기는 것이었다──"

