[[dialogue]]
speaker = "ウィステリア"
original = "「よーし、じゃあ開けるわよ」"
translation = "「조아, 그럼 열게」"

[[dialogue]]
speaker = "モネ"
original = "「はい！\u3000せーの」"
translation = "「네! 하나, 둘!」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ここが、新しい区画……って、あれ？\u3000今までとあんまり変わらないわね……」"
translation = "「여기가 새로운 구역…… 어라? 지금까지랑 별반 다르지 않네……」"

[[dialogue]]
speaker = "モネ"
original = "「いえ！\u3000間違いなく新しい区画です。まだ出会ったことのない本ばかりですから！」"
translation = "「아니요! 틀림없이 새로운 구역이에요. 아직 만나본 적 없는 책들뿐이니까요!」"

[[dialogue]]
speaker = "モネ"
original = "（……でも、この感じ、何だろう？\u3000初めて出会う本たちなのに、どこかで会ったような……）"
translation = "(……하지만 이 느낌, 뭘까? 처음 만나는 책들인데 어디선가 만난 것 같은……)"

[[dialogue]]
speaker = "ウィステリア"
original = "「読んでもいないのに分かっちゃうのね。さすがというか、恐るべきというか」"
translation = "「읽지도 않았는데 알아버리는구나. 대단하다고 해야 할지, 무섭다고 해야 할지」"

[[dialogue]]
speaker = "モネ"
original = "「はい。本は友達ですから。出会った子のことはちゃんと覚えてます」"
translation = "「네. 책은 친구니까요. 만났던 아이들은 제대로 기억하고 있어요」"

[[dialogue]]
speaker = "ウィステリア"
original = "「もしかして今まで読んだ本の数とか覚えてたり？」"
translation = "「설마 지금까지 읽은 책의 권수 같은 것도 기억하고 있어?」"

[[dialogue]]
speaker = "モネ"
original = "「はい、もちろん。私が今まで読んだ本の数は──」"
translation = "「네, 물론이죠. 제가 지금까지 읽은 책의 권수는──」"

[[dialogue]]
speaker = "ウィステリア"
original = "「待って！\u3000その先は怖いから待って！」"
translation = "「잠깐! 그 뒷이야기는 무서우니까 기다려!」"

[[dialogue]]
speaker = "モネ"
original = "「……？\u3000変なウィステリアさん」"
translation = "「……? 이상한 위스테리아 씨」"

[[dialogue]]
speaker = "ウィステリア"
original = "「それにしても、紙屋敷さんは本当に本が好きなのね。私にとって本は重荷だったから、やっぱり紙屋敷さんが羨ましいわ」"
translation = "「그나저나 카미야시키 양은 정말 책을 좋아하는구나. 나한테 책은 짐이었으니까, 역시 카미야시키 양이 부러워」"

[[dialogue]]
speaker = "モネ"
original = "「重荷、ですか？」"
translation = "「짐, 인가요?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「紙屋敷さんにも言ったことあるかしら？\u3000私の家は魔界でも特別古い一族なの。それこそ図書館みたいな量の魔導書が家にあってね」"
translation = "「카미야시키 양에게도 말한 적이 있었나? 우리 집안은 마계에서도 특별히 오래된 일족이야. 그야말로 도서관만큼의 마도서가 집에 있었지」"

[[dialogue]]
speaker = "ウィステリア"
original = "「私は次期当主として生まれたものだから、子どもの頃から呪術と魔導書の扱いを叩き込まれたわ。次の世代にもそれを引き継ぐために」"
translation = "「나는 차기 당주로 태어났기 때문에 어릴 때부터 주술과 마도서를 다루는 법을 주입당했어. 다음 세대에도 그것을 물려주기 위해서 말이야」"

[[dialogue]]
speaker = "ウィステリア"
original = "「この鎖で繋がっている魔導書もそのひとつよ」"
translation = "「이 쇠사슬로 연결된 마도서도 그중 하나야」"

[[dialogue]]
speaker = "ウィステリア"
original = "「私にとって本は、終わらない人生の宿題──呪いそのものなの」"
translation = "「나에게 책은 끝나지 않는 인생의 숙제── 저주 그 자체거든」"

[[dialogue]]
speaker = "モネ"
original = "「ウィステリアさん……」"
translation = "「위스테리아 씨……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「あ、でもね、本すべてが嫌いなわけじゃないのよ。人間界に来てから好きな本にもたくさん出会えたわ」"
translation = "「아, 그래도 말이야, 책 전부가 싫은 건 아냐. 인간계에 오고 나서 좋아하는 책도 많이 만날 수 있었거든」"

[[dialogue]]
speaker = "ウィステリア"
original = "「流星学園に入って、クラスメイトに貸してもらったマンガを読んだ時は衝撃だったわ。なんてことない恋愛マンガだったんだけどね」"
translation = "「유성학원에 들어와서 클래스메이트에게 빌린 만화를 읽었을 때는 충격이었어. 별것 아닌 연애 만화였지만 말이야」"

[[dialogue]]
speaker = "ウィステリア"
original = "「田舎から都会に転校したヒロインが、いろんなトラブルを通して意中の男の子やクラスメイトの女の子と仲良くなっていくの」"
translation = "「시골에서 도시로 전학 온 여주인공이 여러 트러블을 거치며 짝사랑하는 소년이나 반 친구들과 친해지는 내용이었어」"

[[dialogue]]
speaker = "ウィステリア"
original = "「私も魔界から出てきたばかりだから、すっごく感情移入しちゃった。恋愛の描き方もそりゃもう甘酸っぱくて。今読んだら恥ずかしくて最後まで読めないかも」"
translation = "「나도 마계에서 갓 나왔을 때라 엄청 감정이입을 해버렸지. 연애 묘사도 그야말로 새콤달콤해서 말이야. 지금 읽으면 부끄러워서 끝까지 못 읽을지도 몰라」"

[[dialogue]]
speaker = "ウィステリア"
original = "「それに何より、読んでも呪われないのよ！\u3000人間界すごいって感動したわ。そんなの当たり前なのにね」"
translation = "「게다가 무엇보다, 읽어도 저주받지 않아! 인간계 대단하다고 감동했었지. 그런 건 당연한 건데 말이야」"

[[dialogue]]
speaker = "モネ"
original = "「ウィステリアさんにそんな過去があったんですね……」"
translation = "「위스테리아 씨에게 그런 과거가 있었군요……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「過去といえば、紙屋敷さんは子どものころから読書家なの？」"
translation = "「과거라고 하면, 카미야시키 양은 어릴 때부터 독서광이었어?」"

[[dialogue]]
speaker = "モネ"
original = "「はい、私も本に囲まれて育ちましたから。祖父の書斎にはたくさん本があって、幼い頃から一緒に読書をしていました」"
translation = "「네, 저도 책에 둘러싸여 자랐으니까요. 할아버지의 서재에는 책이 아주 많아서 어릴 때부터 함께 독서를 하곤 했어요」"

[[dialogue]]
speaker = "モネ"
original = "「祖父がいなくなってからもずっと、本は私と一緒にいてくれました」"
translation = "「할아버지가 돌아가신 뒤에도 줄곧 책은 저와 함께 있어 주었어요」"

[[dialogue]]
speaker = "モネ"
original = "「そのうち、本の気持ちが分かるようになって……思えば、祖父を失って寂しくしていた私に寄り添ってくれていたんですね」"
translation = "「그러다 보니 책의 마음을 알 수 있게 되어서…… 생각해보면 할아버지를 잃고 외로워하던 저를 달래주었던 거였네요」"

[[dialogue]]
speaker = "モネ"
original = "「私が嬉しい時も、悲しい時も、切ない時も……表紙を開けば、本はその世界に優しく迎え入れてくれます」"
translation = "「제가 기쁠 때도, 슬플 때도, 애틋할 때도…… 표지를 열면 책은 그 세계로 저를 다정하게 맞아주었어요」"

[[dialogue]]
speaker = "モネ"
original = "「本は私の友達であり隣人なんです。本は本であるというだけで、私には宝物です」"
translation = "「책은 저의 친구이자 이웃이에요. 책은 책이라는 것만으로 저에게는 보물이에요」"

[[dialogue]]
speaker = "モネ"
original = "「だから、本が私の友達であるように、私も本の友達でありたいんです」"
translation = "「그래서 책이 저의 친구인 것처럼 저도 책의 친구가 되고 싶어요」"

[[dialogue]]
speaker = "モネ"
original = "「世界中の本と友達になりたいですし、もし誰にも読まれず寂しい思いをしている本があったら、私が読んで一緒にいたいんです」"
translation = "「전 세계의 책들과 친구가 되고 싶고, 혹시 아무에게도 읽히지 못해 외로워하는 책이 있다면 제가 읽어서 함께 있어 주고 싶어요」"

[[dialogue]]
speaker = "ウィステリア"
original = "「なるほど。紙屋敷さんの本好きはお祖父さん譲りなのね」"
translation = "「과연. 카미야시키 양의 독서 사랑은 할아버지를 닮은 거구나」"

[[dialogue]]
speaker = "モネ"
original = "「はい。その祖父が言っていたんです。本は<ruby>足跡<rt>あしあと</rt></ruby>だって」"
translation = "「네. 그 할아버지께서 말씀하셨거든요. 책은 발자국이라고요」"

[[dialogue]]
speaker = "ウィステリア"
original = "「あしあと？」"
translation = "「발자국?」"

[[dialogue]]
speaker = "モネ"
original = "「ええ。小説や物語、絵本、歴史書、教科書や科学書、ルールブック、随筆やルポルタージュに至るまで、本は様々です」"
translation = "「네. 소설이나 이야기, 그림책, 역사서, 교과서나 과학 서적, 규칙서, 수필이나 르포르타주에 이르기까지 책은 다양해요」"

[[dialogue]]
speaker = "モネ"
original = "「けれど共通しているのは、誰かが紙と、文字と、<ruby>図<rt>え</rt></ruby>を使って残そうとしたものだということです」"
translation = "「하지만 공통점은 누군가가 종이와 문자, 그리고 그림을 사용해서 남기려고 한 것이라는 점이에요」"

[[dialogue]]
speaker = "モネ"
original = "「本は誰かの生きた証──足跡だそうです。本が消えるとき、その足跡も消えてしまうのだと」"
translation = "「책은 누군가의 살아생전 증거── 발자국이라고 해요. 책이 사라질 때 그 발자국도 사라지는 것이라고요」"

[[dialogue]]
speaker = "モネ"
original = "「幼い私は、その意味まで理解できませんでしたけど、大切な言葉として心に残っています」"
translation = "「어린 저는 그 의미까지는 이해하지 못했지만, 소중한 말씀으로 마음에 남아 있어요」"

[[dialogue]]
speaker = "ウィステリア"
original = "「本は足跡、か。私を呪っている魔導書も、誰かが残そうとしたものなのかしら……それにしては物騒すぎるけど」"
translation = "「책은 발자국, 인가. 나를 저주하고 있는 마도서도 누군가가 남기려 했던 걸까…… 그러기엔 너무 흉흉하지만」"

[[dialogue]]
speaker = "？？？"
original = "「立ち去りなさい、力なき者……」"
translation = "「물러가라, 힘없는 자여……」"

[[dialogue]]
speaker = "モネ"
original = "「どなたですか！？\u3000いつの間にっ！？」"
translation = "「누구세요!? 어느 틈에!」"

[[dialogue]]
speaker = "ウィステリア"
original = "「この気配は……っ！\u3000紙屋敷さん、ごめんなさい！\u3000強制脱出！」"
translation = "「이 기척은……! 카미야시키 양, 미안해! 강제 탈출!」"

[[dialogue]]
speaker = "モネ"
original = "「ウィステリアさんの鎖が、また私に巻き付いて……」"
translation = "「위스테리아 씨의 사슬이 다시 저에게 감겨서……」"

[[dialogue]]
speaker = "モネ"
original = "「わぁ～～～っ！」"
translation = "「와아아아～～～악!」"

[[dialogue]]
speaker = "ウィステリア"
original = "「これでよし、と。……それで、あなたは何者なのかしら、ドラゴンさん？」"
translation = "「이걸로 됐어. ……그래서, 당신은 정체가 뭐지, 드래곤 씨?」"

[[dialogue]]
speaker = "？？？"
original = "「…………」"
translation = "「…………」"

