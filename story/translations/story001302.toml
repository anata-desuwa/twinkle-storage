[[dialogue]]
speaker = "unk"
original = "マトイがマムに指導をお願いしに来たところで遭遇した、<ruby>白楯<rt>しろたて</rt></ruby>アム。俺が彼女に事情を説明すると――"
translation = "마토이가 마무에게 지도를 부탁하러 왔을 때 조우한 시로타테 아무. 내가 그녀에게 사정을 설명하자──"

[[dialogue]]
speaker = "アム"
original = "「――ふむふむ、なるほど。つまり、マトイ先輩は……あたしと同じってことですね！」"
translation = "「──흐음흐음, 그렇군요. 즉, 마토이 선배는…… 저랑 똑같다는 거네요!」"

[[dialogue]]
speaker = "アム"
original = "「実はあたしも最近、マムに訓練を見てもらってるんです！」"
translation = "「사실 저도 최근에 마무에게 훈련을 받고 있거든요!」"

[[dialogue]]
speaker = "unk"
original = "彼女は流星学園附属校３年生の白楯アム。"
translation = "그녀는 유성학원 부속교 3학년인 시로타테 아무."

[[dialogue]]
speaker = "unk"
original = "難攻不落と言われる程の盾使いとして有名であり、附属校の枠にとどまらず２つの本校を含めても、鉄壁の防御力を誇る星騎士だ。"
translation = "난공불락이라 불릴 정도의 방패 사용자로 유명하며, 부속교의 틀에 박히지 않고 두 본교를 포함해서도 철벽의 방어력을 자랑하는 성기사다."

[[dialogue]]
speaker = "unk"
original = "ヴィーナスに憧れており、本人も新星学園への進学を希望していることから、次期星徒会メンバーとしての有望株。"
translation = "비너스를 동경하고 있으며, 본인도 신성학원으로의 진학을 희망하고 있어 차기 성도회 멤버로서의 유망주."

[[dialogue]]
speaker = "unk"
original = "また、俺が御前試合でヴィーナスに勝ったことから、星徒会長になることを目標としている彼女にライバル視され、よく勝負を挑まれていたりする。"
translation = "또한 내가 어전 시합에서 비너스에게 이긴 뒤로, 성도회장이 되는 것을 목표로 하는 그녀에게 라이벌 취급당하며 자주 승부를 도전받기도 한다."

[[dialogue]]
speaker = "マトイ"
original = "「そういえばさっき言ってたけど、アムちゃんのそれって、水着フォームなの？」"
translation = "「그러고 보니 아까 말했는데, 아무 짱의 그거 수영복 폼이야?」"

[[dialogue]]
speaker = "アム"
original = "「ふっふっふ！\u3000実はそうなんですよ～♪\u3000前にヴィーナス前会長が手に入れたって聞いた時から、なにそれあたしも欲しい！\u3000ってずっと思ってて！」"
translation = "「훗훗훗! 사실 그렇답니돠~♪ 예전에 비너스 전 회장님이 손에 넣었다고 들었을 때부터, 그게 뭐야 나도 갖고 싶어! 라고 계속 생각했거든요!」"

[[dialogue]]
speaker = "アム"
original = "「リゾート結界に水着を着てきて変身を試したら、見事水着フォームの獲得に成功したというわけです！\u3000へっへ～ん♪」"
translation = "「리조트 결계에 수영복을 입고 와서 변신을 시도했더니, 멋지게 수영복 폼 획득에 성공했다는 말씀입니돠! 헤헤~엣♪」"

[[dialogue]]
speaker = "アム"
original = "「ねぇ、会長！\u3000どうどう？\u3000あたしの水着フォーム、カッコいいでしょ～♪」"
translation = "「저기, 회장님! 어때요 어때요? 제 수영복 폼, 멋지죠~♪」"

[[dialogue]]
speaker = "アム"
original = "「――ん？\u3000似合ってるけど、１つ質問がある？」"
translation = "「──음? 잘 어울리는데, 질문이 하나 있어.」"

[[dialogue]]
speaker = "unk"
original = "なんでスクール水着なんだ？"
translation = "어째서 학교 수영복인 거야?"

[[dialogue]]
speaker = "マトイ"
original = "「聞きづらいところにツッコんだ！」"
translation = "「물어보기 힘든 곳을 찔렀어!」"

[[dialogue]]
speaker = "アム"
original = "「それはだって――」"
translation = "「그건 그게──」"

[[dialogue]]
speaker = "アム"
original = "「学園指定のスク水って、ほら……カッコいいじゃん？」"
translation = "「학원 지정 스쿨 수영복은, 봐요…… 멋있잖아요?」"

[[dialogue]]
speaker = "マトイ"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker = "アム"
original = "「流星学園附属校指定の水着ということは、それすなわち星騎士であることの証！」"
translation = "「유성학원 부속교 지정 수영복이라는 건, 그것은 즉 성기사라는 증표!」"

[[dialogue]]
speaker = "アム"
original = "「この水着フォームで堂々とビーチを歩けば、リゾート結界に遊びに来た一般の人達はこう思うはず――」"
translation = "「이 수영복 폼으로 당당하게 해변을 걸으면, 리조트 결계에 놀러 온 일반인들은 이렇게 생각할 거예요──」"

[[dialogue]]
speaker = "アム"
original = "「『おっ、あの子、星騎士なんだ。しかも、水着が纏う星力から、すごく強いに違いない』って……！」"
translation = "「『오, 저 아이 성기사구나. 게다가 수영복에 깃든 성력을 보니 엄청 강한 게 틀림없어』라고……!」"

[[dialogue]]
speaker = "アム"
original = "「それってこう、想像しただけでニヤニヤしちゃうというか……ふふふ♪」"
translation = "「그건 이렇게, 상상하는 것만으로도 실실 웃음이 난달까…… 후후후♪」"

[[dialogue]]
speaker = "unk"
original = "き、気がつくかな……"
translation = "과, 과연 알아챌까……"

[[dialogue]]
speaker = "マトイ"
original = "（そもそも普通の人は星力が感知できないし、ただのスク水と思われるだけの気が……戦闘服化しちゃってるし、言わないけども……）"
translation = "(애초에 일반인은 성력을 감지할 수 없고, 그냥 스쿨 수영복이라고 생각할 뿐일 텐데…… 전투복화해 버렸으니 말은 안 하겠지만……)"

[[dialogue]]
speaker = "リップル"
original = "「ワタシはアムの水着フォーム、ＢＩＧカッコイイと思いますよ！\u3000スク水と言うのデスね！」"
translation = "「저는 아무의 수영복 폼, BIG 멋지다고 생각합니돠요! 스쿠스이(스쿨 수영복)라고 하는 것이군효!」"

[[dialogue]]
speaker = "アム"
original = "「でしょ～？\u3000えへへ♪\u3000ありがとうございます、リップル先輩！」"
translation = "「그쵸~? 에헤헤♪ 감사합니다, 리플 선배!」"

[[dialogue]]
speaker = "unk"
original = "『水着フォーム』とは、リップルのリゾート結界内において、星騎士が結界の空に作られた疑似守護星とリンクすることで変身可能となる、特殊な戦闘服のことである。"
translation = "『수영복 폼』이란, 리플의 리조트 결계 내에서 성기사가 결계 하늘에 만들어진 의사 수호성과 링크함으로써 변신 가능해지는 특수 전투복을 말한다."

[[dialogue]]
speaker = "unk"
original = "その戦闘力は決して伊達ではなく、通常戦闘服に匹敵、あるいは上回る程。"
translation = "그 전투력은 결코 겉모습만이 아니며, 통상 전투복에 필적하거나 오히려 상회할 정도다."

[[dialogue]]
speaker = "unk"
original = "更に１度水着フォームを覚醒させれば、以後はリゾート結界の外でも変身可能と、非常に強力な力である。"
translation = "게다가 한 번 수영복 폼을 각성시키면, 이후에는 리조트 결계 밖에서도 변신이 가능한 매우 강력한 힘이다."

[[dialogue]]
speaker = "unk"
original = "ただし、後の調査で、誰しもすぐ水着フォームに変身できるわけではないと判明しており、何らかの条件――水着が戦闘服化するだけの<ruby>要因<rt>インシデント</rt></ruby>が必要だということが確認されている。"
translation = "다만 이후의 조사에서 누구나 곧바로 수영복 폼으로 변신할 수 있는 것은 아니라고 판명되었으며, 어떠한 조건── 수영복이 전투복화할 만큼의 <ruby>요인<rt>인시던트</rt></ruby>이 필요하다는 것이 확인되었다."

[[dialogue]]
speaker = "アム"
original = "「とにかく、そんな感じで水着フォームを手に入れたんですけど、新しく目覚めた能力が、マムに近い感じだったんです！」"
translation = "「어쨌든 그런 느낌으로 수영복 폼을 손에 넣었는데, 새로 눈뜬 능력이 마무와 비슷한 느낌이었어요!」"

[[dialogue]]
speaker = "アム"
original = "「名付けて『重力操作』！\u3000重力バリアーを張ったり、反重力を展開して盾を浮かせることで、乗って突撃したりとかできるんですよ～！」"
translation = "「이름하여 『중력 조작』! 중력 배리어를 치거나, 반중력을 전개해서 방패를 띄워 타고 돌격하거나 할 수 있답니돠~!」"

[[dialogue]]
speaker = "マトイ"
original = "「え？\u3000そ、それってかなり強くない……？」"
translation = "「에? 그, 그거 꽤 강하지 않아……?」"

[[dialogue]]
speaker = "マトイ"
original = "「ただでさえ、『学園最硬』『歩く要塞』『盾の擬人化』とか言われてるアムちゃんが重力のバリアー張れるようになるって……突破できるイメージが湧かないんだけど……」"
translation = "「안 그래도 『학원 최강의 경도』 『걸어 다니는 요새』 『방패의 의인화』라고 불리는 아무 짱이 중력 배리어까지 칠 수 있게 된다니…… 돌파할 수 있는 이미지가 안 떠오르는데……」"

[[dialogue]]
speaker = "アム"
original = "「ま、マトイ先輩！\u3000その辺のニックネームは子供っぽいんで、個人的にはあまり呼ばないでもらえると……！」"
translation = "「마, 마토이 선배! 그쪽 닉네임은 어린애 같으니까, 개인적으로는 너무 부르지 말아 주셨으면……!」"

[[dialogue]]
speaker = "マトイ"
original = "「スク水は堂々と着るのに！？」"
translation = "「스쿨 수영복은 당당하게 입으면서!?」"

[[dialogue]]
speaker = "アム"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker = "マトイ"
original = "「い、いや、何でもない――コホン。とりあえず、重力操作が使えるようになったから、マムに指導をお願いしてたって感じかな……？」"
translation = "「아, 아니, 아무것도 아니야── 크흠. 어쨌든 중력 조작을 쓸 수 있게 되어서 마무에게 지도를 부탁하러 왔다는 느낌일까……?」"

[[dialogue]]
speaker = "アム"
original = "「はい、そういうことです！」"
translation = "「네, 맞아요!」"

[[dialogue]]
speaker = "マハムート"
original = "「全く……あなた達、この私に鍛えてもらおうだなんて、いい度胸してるわね」"
translation = "「정말이지…… 너희들, 이 나에게 단련을 받으려 하다니 배짱 한번 좋구나.」"

[[dialogue]]
speaker = "アム"
original = "「いや～、それ程でも～♪\u3000えへへ♪」"
translation = "「에이~ 그 정도까지는~♪ 에헤헤♪」"

[[dialogue]]
speaker = "マハムート"
original = "「まあ、仕方ないわ。弟子は取らないけど、寮長として寮生には、個人の戦闘力アップを常日頃求めているわけだし」"
translation = "「뭐, 어쩔 수 없지. 제자는 받지 않겠다만, 사감으로서 기숙사생에게는 개인의 전투력 향상을 늘 요구하고 있는 법이니까.」"

[[dialogue]]
speaker = "マトイ"
original = "「え？\u3000それって……」"
translation = "「에? 그건……」"

[[dialogue]]
speaker = "マハムート"
original = "「こうなったら<b>２人まとめて</b>面倒をみてあげるわ。だから、畏怖を持って感謝なさい」"
translation = "「이렇게 된 이상 <b>둘이</b> <b>한꺼번에</b> 돌봐주도록 하마. 그러니 경외를 담아 감사하도록 해.」"

[[dialogue]]
speaker = "マハムート"
original = "「強くなりたいんでしょ、マトイ？」"
translation = "「강해지고 싶은 거지, 마토이?」"

[[dialogue]]
speaker = "マトイ"
original = "「マム……！」"
translation = "「마무……!」"

[[dialogue]]
speaker = "リップル"
original = "「さすがマムでーす♪\u3000ＢＩＧ優しい、みんなのお母さんみたいデスね！」"
translation = "「역시 마무입니돠♪ BIG 친절하시네요, 모두의 어머니 같습니돠요!」"

[[dialogue]]
speaker = "マハムート"
original = "「何を言っているのかしら、リップル？\u3000私はただ、寮長としての責務を果たしているだけよ」"
translation = "「무슨 소리를 하는 거니, 리플? 나는 그저 사감으로서의 책무를 다하고 있을 뿐이야.」"

[[dialogue]]
speaker = "マハムート"
original = "「とにかく、訓練をするというなら、さっさと始めるから準備なさい。２人共、私に対しての返事は、当然わかってるわね？」"
translation = "「어쨌든 훈련을 하겠다면 당장 시작할 테니 준비하렴. 둘 다, 나에 대한 대답은 당연히 알고 있겠지?」"

[[dialogue]]
speaker = "２人"
original = "「イエス・マム！」"
translation = "「예스 마무!」"

[[dialogue]]
speaker = "マハムート"
original = "「よろしい」"
translation = "「좋아.」"

[[dialogue]]
speaker = "unk"
original = "そうして、マムによる特訓指導が始まったのだが――"
translation = "그렇게 마무에 의한 특훈 지도가 시작되었는데──"

[[dialogue]]
speaker = "マハムート"
original = "「それじゃあ、ビーチバレーを始めるわよ」"
translation = "「그럼 비치발리볼을 시작하겠어.」"

[[dialogue]]
speaker = "マトイ"
original = "「何故にビーチバレー！？」"
translation = "「어째서 비치발리볼!?」"

[[dialogue]]
speaker = "マハムート"
original = "「それが私の<b>能力</b>だからよ」"
translation = "「그것이 나의 <b>능력</b>이기 때문이야.」"

[[dialogue]]
speaker = "unk"
original = "じゃあ、マムの水着って……！"
translation = "그럼 마무의 수영복도……!"

[[dialogue]]
speaker = "マハムート"
original = "「ふふ、会長。私を一体、誰だと思っているのかしら？」"
translation = "「후후, 회장. 나를 도대체 누구라고 생각하는 거니?」"

[[dialogue]]
speaker = "マハムート"
original = "「あなた達にできて、この私が水着フォームに変身できないはずがないでしょう？」"
translation = "「너희들도 할 수 있는 걸, 이 내가 수영복 폼으로 변신하지 못할 리가 없잖아?」"

[[dialogue]]
speaker = "unk"
original = "そう言って、マムがもう片方の手を広げると、そこにもビーチボールが出現する。"
translation = "그렇게 말하며 마무가 다른 쪽 손을 펼치자, 그곳에도 비치볼이 출현한다."

[[dialogue]]
speaker = "マトイ"
original = "「って、いつの間にか私の周りに、ふわふわと宙に浮いてるビーチボールが沢山……！？」"
translation = "「앗, 어느새 내 주변에 둥실둥실 허공에 떠 있는 비치볼이 잔뜩……!?」"

[[dialogue]]
speaker = "マハムート"
original = "「私は水着フォームの武器として、ビーチボールを無数に召喚することができる。これを引力操作で操って、今から攻撃を仕掛けるわ」"
translation = "「나는 수영복 폼의 무기로서 비치볼을 무수히 소환할 수 있어. 이것을 인력 조작으로 조종해서 지금부터 공격을 가하겠다.」"

[[dialogue]]
speaker = "マハムート"
original = "「ヒルディオーネから話を聞いたけど、最近出現している新種モンスターは群れで行動するとのこと」"
translation = "「힐디오네에게 들었다만, 최근 출현하는 신종 몬스터는 무리를 지어 행동한다고 하더구나.」"

[[dialogue]]
speaker = "マハムート"
original = "「これはそれを想定した防御訓練よ。マトイ、あなたはアムと一緒に、私の攻撃を全部防げるようになりなさい」"
translation = "「이것은 그것을 상정한 방어 훈련이야. 마토이, 너는 아무와 함께 나의 공격을 전부 막아낼 수 있게 되도록 해.」"

[[dialogue]]
speaker = "マハムート"
original = "「じゃあまずは第１波、行くわよ！」"
translation = "「그럼 우선 제1파, 간다!」"

[[dialogue]]
speaker = "マハムート"
original = "「グラビトンサーブ！」"
translation = "「그라비톤 서브!」"

[[dialogue]]
speaker = "マトイ"
original = "「ちょっ！？\u3000マムのサーブ、凄まじく重い……！」"
translation = "「잠깐!? 마무의 서브, 엄청 무거워……!」"

[[dialogue]]
speaker = "マハムート"
original = "「最初の一撃に驚いている暇はないわよ、ほら！」"
translation = "「첫 일격에 놀라고 있을 틈은 없어, 자!」"

[[dialogue]]
speaker = "unk"
original = "マムが無数のビーチボールを操り、マトイの四方八方から、スパイクのごとき豪速球を絶え間なく放つ。"
translation = "마무가 무수한 비치볼을 조종하여, 마토이의 사방팔방에서 스파이크 같은 호속구를 끊임없이 날린다."

[[dialogue]]
speaker = "マトイ"
original = "「わわっ！？\u3000一発一発がサーブと同等の威力って……！\u3000いやいや、これを全部防ぎ切るのは無理～っ！」"
translation = "「와왓!? 한 발 한 발이 서브와 동등한 위력이라니……! 아니아니, 이걸 전부 막아내는 건 무리야~!」"

[[dialogue]]
speaker = "unk"
original = "数が多くて捌き切れず、マトイはかわそうとするが――"
translation = "수가 너무 많아 다 처리하지 못하고 마토이는 피하려고 하지만──"

[[dialogue]]
speaker = "アム"
original = "「あっ！\u3000マトイ先輩、気を付けて下さい！\u3000そのビーチボールは避けると――」"
translation = "「앗! 마토이 선배, 조심하세요! 그 비치볼은 피하면──」"

[[dialogue]]
speaker = "マハムート"
original = "「爆発するわよ」"
translation = "「폭발한단다.」"

[[dialogue]]
speaker = "マトイ"
original = "「え」"
translation = "「에.」"

[[dialogue]]
speaker = "マトイ"
original = "「きゃあああぁぁぁーーーーーーっ！！？」"
translation = "「꺄아아아아아아악────!!?」"

[[dialogue]]
speaker = "unk"
original = "マトイが吹っ飛んだぁぁぁーーーっ！？"
translation = "마토이가 날아갔다아아아────!?"

[[dialogue]]
speaker = "unk"
original = "こうして、初夏のビーチバレー特訓がスタートするのだった。"
translation = "이렇게 초여름의 비치발리볼 특훈이 시작되는 것이었다."

