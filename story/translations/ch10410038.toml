[[dialogue]]
speaker = "ネーゼマイン"
original = "「最近、アニマ先輩と仲良くなってさ。錬金術師のドリンク、いっぱい試作品を貰っちゃったんだよね～♪」"
translation = "「최근에 아니마 선배랑 친해져서 말야. 연금술사 드링크 시제품을 잔뜩 받아버렸거든~♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「にひひ♪\u3000これは四肢の自由を奪うドリンク。こっちは女の子に変身しちゃうドリンク……どれで会長にイタズラしちゃおっかな～<emoji=heart04>」"
translation = "「니히히♪ 이건 사지의 자유를 뺏는 드링크. 이쪽은 여자애로 변신해버리는 드링크…… 어느 걸로 회장에게 장난쳐줄까나~❤️」"

[[dialogue]]
speaker = "unk"
original = "出会ってはならない２人が出会ってしまった気がするぞ……どうしよう……"
translation = "만나선 안 될 두 사람이 만나버린 것 같은 기분이 든다…… 어쩌지……"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「そんなに警戒しなくてもいいのに～。会長に気持ちいいことができるドリンクも持ってきたんだよー？」"
translation = "「그렇게 경계하지 않아도 되는데~. 회장에게 기분 좋은 일을 할 수 있는 드링크도 가져왔다구ー?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ほら、これ！\u3000このドリンクを女の子が飲むとね、男を誘うフェロモンがブワ～って止まらなくなるんだって！」"
translation = "「봐, 이거! 이 드링크를 여자애가 마시면 말야, 남자를 유혹하는 페로몬이 부와아~ 하고 멈추지 않게 된대!」"

[[dialogue]]
speaker = "クロト"
original = "「え、マインが飲むの？」"
translation = "「어, 마인이 마시는 거야?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「そうだよ～♪\u3000にひひ、これを飲めばたちまち、私が愛おしくって仕方なくなって、会長が飛び掛かってくる代物なんだって♪」"
translation = "「그렇다구~♪ 니히히, 이걸 마시면 금방 내가 사랑스러워 견딜 수 없게 돼서 회장이 덮쳐오게 만드는 물건이래♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「というわけで……ごくごくっ♪」"
translation = "「그런 고로…… 꿀꺽꿀꺽♪」"

[[dialogue]]
speaker = "クロト"
original = "「マイン、そんな軽率に飲んだら……！？」"
translation = "「마인, 그렇게 경솔하게 마시면……!?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ぷはっ♪\u3000これで会長が狼さんになっちゃうんだよー♪」"
translation = "「푸하♪ 이걸로 회장이 늑대 씨가 되어버리는 거야ー♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「にひー♪\u3000どんな面白い姿、がっ……見ら、れぇ……？」"
translation = "「니히ー♪ 어떤 재미있는 모습, 이…… 보, 보여어……?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「あ、あれ？\u3000あれれぇ……？\u3000なんか目の前、フワフワ、するー……？」"
translation = "「어, 어라? 어라라아……? 왠지 눈앞이 붕붕 뜨는 것 가타아ー……?」"

[[dialogue]]
speaker = "unk"
original = "男を誘うフェロモンなんてものが出ているようには思えない。ただただ、マインの頬が紅潮して、眼差しが熱っぽくなっていく……？"
translation = "남자를 유혹하는 페로몬 같은 것이 나오고 있는 것 같지는 않다. 그저 마인의 뺨이 홍조를 띠고 눈빛이 뜨거워져 가는데……?"

[[dialogue]]
speaker = "unk"
original = "そして──"
translation = "그리고──"

[[dialogue]]
speaker = "クロト"
original = "「きゅ、急に変身してどうしたんだっ？」"
translation = "「가, 갑자기 변신해서 왜 그래?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「はぁー……はぁぁー……はぁー……<emoji=heart04>\u3000にひひ～……会長～……<emoji=heart04>」"
translation = "「하아ー…… 하아아ー…… 하아ー……❤️ 니히히~…… 회장~……❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「会長……えっち、しよ？」"
translation = "「회장…… 야한 거, 하자?」"

[[dialogue]]
speaker = "unk"
original = "マインが突然、とんでもないことを言い出した！\u3000アニマ先輩、これってもしかして、ただの媚薬では……！？"
translation = "마인이 갑자기, 엄청난 소리를 하기 시작했다! 아니마 선배, 이거 설마 그냥 미약이 아니라……!?"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ねー？\u3000えっち<emoji=heart04>\u3000えっちしたい<emoji=heart04>\u3000ベッドに連れてって？\u3000それでぇ、いっぱいいっぱい、私のこと、愛してー……？」"
translation = "「그치ー? 야한 거❤️ 야한 거 하고 싶어❤️ 침대로 데려가 줘? 그래서어, 가득가득, 나를, 사랑해줘ー……?」"

[[dialogue]]
speaker = "unk"
original = "どれだけ落ち着いてと言っても、マインは『イヤイヤ』と可愛く首を振って密着して来るばかり。"
translation = "아무리 진정하라고 말해도, 마인은 『싫어싫어』라며 귀엽게 고개를 저으며 밀착해올 뿐이었다."

[[dialogue]]
speaker = "unk"
original = "やがて俺も、抵抗しきれなくなって……"
translation = "이윽고 나도, 더는 저항하지 못하게 되어……"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「にひぃ～……<emoji=heart04>\u3000会長のベッドで、ぎゅぅ～<emoji=heart04>\u3000されちゃったぁー……んふー……しぁわせぇ……<emoji=heart04>」"
translation = "「니히이～……❤️ 회장의 침대에서, 꼬옥～❤️ 당해버렸어어ー…… 으음ー…… 행복해어……❤️」"

[[dialogue]]
speaker = "unk"
original = "普段の小悪魔なマインを知っているぶん、ギャップがすごい。こんなにもベタベタ甘えてくるエッチは初めてかもしれない。"
translation = "평소의 소악마 같은 마인을 알고 있는 만큼, 갭이 대단했다. 이렇게나 끈적하게 어리광 부려오는 섹스는 처음일지도 모른다."

[[dialogue]]
speaker = "ネーゼマイン"
original = "「すんすん……すんすん……<emoji=heart04>\u3000あはぁ<emoji=heart04>\u3000このシーツ、会長の匂い、するぅ……<emoji=heart04>」"
translation = "「킁킁…… 킁킁……❤️ 아하아❤️ 이 시트, 회장 냄새, 나아……❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「私ねぇ？\u3000この匂い、すっごくすっご～く、しゅきぃ～<emoji=heart04>\u3000んふー……すんすん、すんすん……<emoji=heart04>」"
translation = "「나 말이야아? 이 냄새, 너어무 너어어무, 죠아아～❤️ 으음ー…… 킁킁, 킁킁……❤️」"

[[dialogue]]
speaker = "unk"
original = "いくら恋人とはいえ、あんまり嗅がれると恥ずかしいのだけど──そうマインに伝えるも。"
translation = "아무리 연인이라지만, 너무 냄새를 맡으면 부끄러운데── 그렇게 마인에게 전해 보아도."

[[dialogue]]
speaker = "ネーゼマイン"
original = "「えへへへぇ<emoji=heart04>\u3000今はぁ、お薬で頭フワフワしてるから、隠せないけどぉ……<emoji=heart04>\u3000匂いを嗅ぐのは、いっつもしてるよぉー？」"
translation = "「에헤헤헤에❤️ 지금으은, 약 때문에 머리가 붕 떠 있으니까, 못 숨기지만마안……❤️ 냄새 맡는 거, 어언제나 하고 있어어ー?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「会長のお部屋でえっちする時ぃ、バレないようにいっつも、枕とかシーツ、くんくんしてるのぉ……<emoji=heart04>\u3000私、かいちょぉのことだいしゅき、らからぁ<emoji=heart04>」"
translation = "「회장 방에서 야한 거 할 때에, 안 들키게 언제나, 베개나 시트, 킁킁거리고 있어어……❤️ 나, 회자앙을 정말 죠아, 하니까아❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「んふぁ～……♪\u3000会長のおち○ぽ、ビクビクって震えたぁ……？\u3000えっちの準備、してくれてるんだぁ～……<emoji=heart04>」"
translation = "「으음하아～……♪ 회장 자지, 움찔움찔하고 떨렸어어……? 야한 거 할 준비, 해주고 있구나아～……❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「うれしぃ<emoji=heart04>\u3000ありがとぉ、かいちょぉ<emoji=heart04>\u3000私のおま○こに入れるために、ぼっき<emoji=heart04>\u3000してくれるだなんてぇ、マイン嬉しい……<emoji=heart04>」"
translation = "「기뻐어❤️ 고마워어, 회자앙❤️ 내 보지에 넣으려고, 발기❤️ 해 주다니이, 마인 기뻐……❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「入れる前に、お手々でさわさわ～……やぁん<emoji=heart04>\u3000すっごい、ぶっとくなってるぅ……私、会長がおっきくしてくれるとね、それだけでキュンキュンしちゃうの……<emoji=heart04>」"
translation = "「넣기 전에, 손으로 조물조물～…… 야앙❤️ 엄청, 굵어져 있어어…… 나, 회장이 커다랗게 해주면 말이야, 그것만으로도 큥큥거려버려……❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「大好きな男の子がぁ……私のえっちなところ見て、おっきくしてくれると、いつもおっぱいの奥がね、ふわ～ってあったかくなるんだぁ<emoji=heart04>」"
translation = "「정말 좋아하는 남자애가아…… 내 야한 곳 보고, 커다랗게 해주면, 언제나 가슴 안쪽이 말이야, 후아～ 하고 따뜻해져어❤️」"

[[dialogue]]
speaker = "クロト"
original = "「いつも……なのか？」"
translation = "「언제나…… 그런 거냐?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「うん、いつも、そうだよー……<emoji=heart04>\u3000いっつもえっちしてる時、イタズラばっかりしてるけど……イタズラも楽しいけど……<emoji=heart04>」"
translation = "「응, 언제나, 그래에ー……❤️ 맨날 야한 거 할 때, 장난만 치지만…… 장난도 즐겁지만……❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「会長がぼっきしてくれたり……私のおま○こで気持ちよくなってくれたり……いっぱいイってくれる時、ねぇ……？」"
translation = "「회장이 발기해 주거나…… 내 보지에서 기분 좋아져 주거나…… 잔뜩 싸줄 때, 말이야아……?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「すっごくしあわせなきもちに、なるのぉ……<emoji=heart04>」"
translation = "「정말로 행복한 기분이, 들어어……❤️」"

[[dialogue]]
speaker = "unk"
original = "──背筋がゾクゾクと震えてしまう。媚薬による発情の結果、マインが胸の内を包み隠さず喋りまくるようになっている。"
translation = "──등줄기가 오싹오싹 떨려버린다. 미약에 의한 발정의 결과, 마인이 마음속을 숨김없이 떠들어대게 되었다."

[[dialogue]]
speaker = "unk"
original = "ギャップって言うんだろうか。普段の彼女も大好きだけど、薬の力でもなければ絶対に見えなかった光景に、興奮を覚えてしまう。"
translation = "갭이라고 해야 할까. 평소의 그녀도 정말 좋아하지만, 약의 힘이 아니었다면 절대 볼 수 없었을 광경에, 흥분을 느끼고 만다."

[[dialogue]]
speaker = "ネーゼマイン"
original = "「んふぁあ♪\u3000おち○ぽ、ガッチガチぃ……ねぇ～、そろそろおま○こにいれてぇ？\u3000ずぶ～ってして、しあわせにしてぇ……<emoji=heart04>」"
translation = "「으음하아♪ 자지, 따악딱해에…… 저기이～, 슬슬 보지에 넣어줘어? 즈부읏ー 하고 해서, 행복하게 해줘어……❤️」"

[[dialogue]]
speaker = "クロト"
original = "「……おねだり、してみて」"
translation = "「……부탁해 봐」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「うん<emoji=heart04>\u3000するぅ<emoji=heart04><emoji=heart04>\u3000ウサギマインのおま○こ<emoji=heart04>\u3000会長のことだ～いしゅきな、えろうさぎのメスま○こにぃ<emoji=heart04>\u3000おち○ぽくだしゃぁい<emoji=heart04>」"
translation = "「응❤️ 할게에❤️❤️ 토끼 마인의 보지❤️ 회장을 저어어엉말 좋아하는, 야한 토끼 암컷 보지에에❤️ 자지 주세여어어❤️」"

[[dialogue]]
speaker = "unk"
original = "こんなおねだりをされたら我慢できない──トプトプと愛液を漏らす女性器に、俺はペニスを一息に挿し込む──"
translation = "이런 부탁을 받으면 참을 수 없다── 뚝뚝 애액을 흘리는 여성기에, 나는 페니스를 단숨에 삽입한다──"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「──ふゃぁぁぁ、あぁぁあ～っ<emoji=heart04><emoji=heart04>」"
translation = "「──후야아아아, 아아아아～앗❤️❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「あ、ひぃっ……ひぅぅんっ<emoji=heart04>\u3000ふわぁあ～っ……おち○ぽキたぁ……会長とぉ、ぴったり、繋がれたぁ……ひぁあぁ、しあわせぇ<emoji=heart04>」"
translation = "「아, 히잇…… 히우우응❤️ 후아아～앗…… 자지 들어왔어어…… 회장하고오, 딱, 이어졌어어…… 히아아아, 행복해어❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ん、ふぅう、ふぅう～っ<emoji=heart04>\u3000んぁあ、はあぁっ……気持ちいいよぉぉ……入れられただけで、ちょっとイっちゃった、ぁあ……<emoji=heart04>」"
translation = "「으음, 후우우, 후우우～앗❤️ 응아아, 하아앗…… 기분 좋아아아…… 넣어준 것만으로도, 조금 가버렸어, 아아……❤️」"

[[dialogue]]
speaker = "unk"
original = "マインがイけたんだったらもうやめるか──そんなことを言って、ちょっと意地悪をしてみる。"
translation = "마인이 가버렸다면 이제 그만둘까── 그런 말을 하며, 조금 심술을 부려본다."

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ふぇぇ～……！？\u3000や、やぁあ～<emoji=heart04>\u3000やだぁ<emoji=heart04>\u3000せっかくおち○ぽとおま○こ、くっついてチュー、できたのにぃ……<emoji=heart04>」"
translation = "「후에에～……!? 시, 시러어어❤️ 시러어❤️ 어렵게 자지랑 보지, 딱 붙어서 뽀뽀, 했는데에……❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「これで終わりなんてやだぁ……動いてぇ？\u3000うさぎのおま○こ、もう我慢むりぃ<emoji=heart04>\u3000いっぱいパンパン、してぇ？\u3000ねぇ、ねぇ～っ<emoji=heart04>」"
translation = "「이걸로 끝이라니 시러어…… 움직여줘어? 토끼 보지, 이제 참는 거 무리이❤️ 잔뜩 팡팡, 해줘어? 응, 저기이～앗❤️」"

[[dialogue]]
speaker = "unk"
original = "期待以上のおねだりが聞けて満足した俺は、マインの女性器にピストンを始める──"
translation = "기대 이상의 부탁을 들어 만족한 나는, 마인의 여성기에 피스톤을 시작한다──"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ふぅぁあっ<emoji=heart04>\u3000んんぁあ、あぁああっ<emoji=heart04>\u3000ひぁ、あ、あぁ、はぅうっ<emoji=heart04>\u3000んんぅ、ふぅうっ、ふぁ、ふわぁああぁっ<emoji=heart04><emoji=heart04>」"
translation = "「후우아앗❤️ 으음아아, 아아아아앗❤️ 히아, 아, 아아, 하우우앗❤️ 으음으으, 후우우앗, 후아, 후아아아아앗❤️❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「おち○ぽ、動いてくれたぁ<emoji=heart04>\u3000んんぁあ、これしゅきぃ<emoji=heart04>\u3000かいちょぉのおっきなおち○ぽで、パンパンしゅきぃ<emoji=heart04>\u3000ふわぁぁっ<emoji=heart04>」"
translation = "「자지, 움직여줬어어❤️ 으음아아, 이거 죠아아❤️ 회장의 커다란 자지로, 팡팡하는 거 죠아아❤️ 후아아아앗❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「おま○こ、思いっきり広げられて、ぐりぐりされてりゅぅ<emoji=heart04>\u3000ふやぁぁああ<emoji=heart04>\u3000気持ちいいよぉ、かいちょぉ、しゅきぃ<emoji=heart04>」"
translation = "「보지, 마음껏 벌려져서, 구리구리 당하고 이써어❤️ 후야아아아아❤️ 기분 좋아아, 회자앙, 죠아아❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「私、身長ちっちゃい、からぁ<emoji=heart04>\u3000会長のおち○ぽ、入れる時、いっつもすっごい、がんばってりゅ、のぉ<emoji=heart04>\u3000んぁあ、はぅああ<emoji=heart04>」"
translation = "「나, 키가 쪼끄마, 하니까아❤️ 회장 자지, 넣을 때, 언제나 엄청, 힘내고 이써어, 어어❤️ 응아아, 하우아아❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ぶっといおち○ぽ、全部飲み込んであげなきゃっ<emoji=heart04>\u3000大好きな会長のこと、気持ちよくしてあげなきゃ～って<emoji=heart04>\u3000がんばってりゅん、だよぉっ？」"
translation = "「굵은 자지, 전부 삼켜줘야지잇❤️ 정말 좋아하는 회장을, 기분 좋게 해줘야지～ 하고❤️ 힘내고 이따구우요옷?」"

[[dialogue]]
speaker = "unk"
original = "マイン、そんなことを普段から考えてくれてただなんて……！"
translation = "마인, 그런 것을 평소부터 생각해주고 있었다니……!"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「えへぇ<emoji=heart04>\u3000えへへぇっ<emoji=heart04>\u3000今日もがんばりゅね？\u3000マイン、おま○こいっぱい締めて、おち○ぽ気持ちよく、すりゅねぇっ<emoji=heart04>」"
translation = "「에헤에❤️ 에헤헤엣❤️ 오늘도 힘낼게에? 마인, 보지 꽉 조여서, 자지 기분 좋게, 할게에에엣❤️」"

[[dialogue]]
speaker = "unk"
original = "あまりに健気なマインの心の吐露に、ピストンにも熱が入る。腰を動かしつつ、ゆさゆさと揺れるおっぱいも揉むことにした。"
translation = "너무나도 기특한 마인의 고백에, 피스톤에도 열이 오른다. 허리를 움직이면서, 출렁출렁 흔들리는 가슴도 주무르기로 했다."

[[dialogue]]
speaker = "ネーゼマイン"
original = "「──ん、ふぅう、んんああぁあっ<emoji=heart04>\u3000かいちょぉ、おっぱい<emoji=heart04>\u3000モミモミしながら、パンパンしちゃりゃめぇ<emoji=heart04>\u3000んぁああっ<emoji=heart04>」"
translation = "「──응, 후우우, 으음아아아앗❤️ 회자앙, 가슴❤️ 조물조물하면서, 팡팡하면 안 대애❤️ 응아아앗❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ひぁぁあ<emoji=heart04>\u3000しゅきぃ<emoji=heart04>\u3000ちくび、こねこねされるのもしゅきぃっ<emoji=heart04>\u3000んあぁあっ<emoji=heart04>\u3000会長にされること、ぜんぶしゅきぃ～っ<emoji=heart04>」"
translation = "「히아아아❤️ 죠아아❤️ 꼭지, 조물조물 당하는 것도 죠아아앗❤️ 응아아앗❤️ 회장한테 당하는 거, 전부 죠아아아～앗❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ふわぁあ、あぁんんっ<emoji=heart04>\u3000ふぅう、んぅ、んぁあ、はぁ～っ<emoji=heart04>\u3000もっとしてぇ、おっぱいもおま○こも、どっちも愛してぇっ<emoji=heart04>」"
translation = "「후아아아, 아앙응❤️ 후우우, 으음으, 으음아아, 하아～앗❤️ 더 해줘어, 가슴도 보지도, 둘 다 사랑해줘어엇❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「んん、ふぅ、んん、ふぁ、あ、ああ、んんっ<emoji=heart04>\u3000ぁあ、はぁあ、でも、でもでも<emoji=heart04>\u3000これだけじゃ、足りないのぉ～……<emoji=heart04>」"
translation = "「으음응, 후우, 으음응, 후아, 아, 아아, 으음응❤️ 아아, 하아아, 그래도, 그래도그래도❤️ 이것만으론, 부족해어어～……❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「おくち<emoji=heart04>\u3000ちゅーもしてぇ<emoji=heart04>\u3000えっちなちゅーしながら、せっくしゅ……<emoji=heart04>\u3000ちゅーして、してしてしてぇ<emoji=heart04>\u3000んーっ<emoji=heart04>」"
translation = "「입술❤️ 뽀뽀도 해줘어❤️ 야한 뽀뽀 하면서, 섹슈……❤️ 뽀뽀해줘, 해줘해줘해줘어❤️ 으음ー❤️」"

[[dialogue]]
speaker = "unk"
original = "いつも俺をからかう言葉ばかりが出てくる唇から漏れるのは、砂糖みたいに甘いセリフばかり──"
translation = "언제나 나를 놀리는 말만 나오던 입술에서 새어 나오는 것은, 설탕처럼 달콤한 대사뿐──"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ふぅむぅうっ<emoji=heart04>\u3000んぅぢゅるぅ、んちゅるう、れぇえ、んれりゅれりゅ、んちゅるれるれる、んちゅるる、じゅるうぅ、れぇえ<emoji=heart04>」"
translation = "「후우무우우앗❤️ 응으쥬르으, 응츄르우, 레에에, 응레류레류, 응츄르렐렐, 응츄르르, 쥬르우우, 레에에❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「んッふぅ──んんっ、ちゅううっ……んんむぅう～っ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「으음읏후우──으음응, 츄우웃…… 으음으무우우～앗……❤️❤️❤️」"

[[dialogue]]
speaker = "unk"
original = "舌を絡めて数秒で、マインの女性器がぎちぎちと締まりを強めた──それでもエッチなウサギはキスをやめない。"
translation = "혀를 섞고 수 초 만에, 마인의 여성기가 꽉꽉 조임을 강하게 했다── 그래도 야한 토끼는 키스를 멈추지 않는다."

[[dialogue]]
speaker = "ネーゼマイン"
original = "「んぅぢゅる、ちゅぅ<emoji=heart04>\u3000んふぅ、チューしたら、嬉しくてっ<emoji=heart04>\u3000イっちゃったぁ……んちゅぅ、れるれる、んちゅるうぅ<emoji=heart04>」"
translation = "「으음으쥬르, 츄우❤️ 응후우, 뽀뽀하니까, 기뻐서어엇❤️ 가버렸어어…… 응츄우, 렐렐, 응츄르우우❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「れりゅれりゅ<emoji=heart04>\u3000かいちょぉ、だいしゅき<emoji=heart04>\u3000んるるぅ<emoji=heart04>\u3000ちゅぅ、れぇ、れぅれぅれぅ<emoji=heart04>\u3000んちゅぅ<emoji=heart04>」"
translation = "「레류레류❤️ 회자앙, 정말 죠아❤️ 응르르으❤️ 츄우, 레에, 레우레우레우❤️ 응츄우❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「れるれる<emoji=heart04>\u3000べろ、いっぱいからめよ？\u3000んちゅぅ<emoji=heart04>\u3000えっちなちゅーするから、れるん<emoji=heart04>\u3000おち○ぽきもちくなってね<emoji=heart04>\u3000んちゅる<emoji=heart04>」"
translation = "「렐렐❤️ 혀, 잔뜩 섞자아? 응츄우❤️ 야한 뽀뽀 할 거니까, 렐르응❤️ 자지 기분 좋아져어❤️ 응츄르❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ふぅむぅ<emoji=heart04>\u3000じゅるるぅ<emoji=heart04>\u3000ちゅるちゅぱっ<emoji=heart04>\u3000んちゅぅ、れうれる、んちゅるぅうっ<emoji=heart04>」"
translation = "「후우무우❤️ 쥬르르으❤️ 츄르츄팟❤️ 응츄우, 레우레우, 응츄르으우웃❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「えへぇ～……媚薬、わざと飲んで、よかったぁ<emoji=heart04><emoji=heart04>\u3000……んちゅぅ、れるれる、んちゅぅー<emoji=heart04>」"
translation = "「에헤에～…… 미약, 일부러 마셔서, 다행이야아❤️❤️ ……응츄우, 렐렐, 응츄우ー❤️」"

[[dialogue]]
speaker = "unk"
original = "──なんだって？"
translation = "──뭐라고?"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ちゅぅっ……ぷは♪\u3000あはぁっ<emoji=heart04>\u3000言っちゃった<emoji=heart04>\u3000わざと媚薬飲んだの、言っちゃったあ……<emoji=heart04>」"
translation = "「츄웃…… 푸하♪ 아하앗❤️ 말해버렸다❤️ 일부러 미약 마신 거, 말해버렸어어……❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「あのね、あのねぇっ<emoji=heart04>\u3000んんうぅぅ<emoji=heart04>\u3000ほんとはね、アニマ先輩から、ちゃーんとお薬の説明、されてたの……んふぅぅっ<emoji=heart04>」"
translation = "「저기 말이야, 저기이이잇❤️ 으음응우우우❤️ 사실은 말이야, 아니마 선배한테, 저어어언부 약 설명, 들었었어…… 응후우우읏❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「飲んだら、メロメロになってぇ……はぅぅん<emoji=heart04>\u3000思ってること全部口にでちゃう媚薬だって、説明、されてたんだよぉ<emoji=heart04>」"
translation = "「마시면, 헤롱헤롱해져서어…… 하우우웅❤️ 생각하는 거 전부 입으로 나와버리는 미약이라고, 설명, 들었었단 말이야아❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「私、いっつも会長に、いたずらばっかり……でしょ？\u3000あふぅぅ<emoji=heart04>\u3000ナマイキなことばっかり、してる、しっ……<emoji=heart04>\u3000んんうぅぅ<emoji=heart04>」"
translation = "「나, 언제나 회장한테, 장난만…… 치잖아? 아후우우❤️ 건방진 소리만, 하고오, 있꼬오……❤️ 으음응우우우❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「たまには甘えたいなって、お、思ってもね？\u3000あぁぁぁっ<emoji=heart04>\u3000やりかた、わかんなくって……だから、アニマ先輩に、作ってもらった、の<emoji=heart04>」"
translation = "「가끔은 어리광 부리고 싶다아 하고, 새, 생각해도 말이야? 아아아아앗❤️ 방법, 모오르겠어서…… 그래서, 아니마 선배한테, 만들어 달라고, 해써어❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ひ、ひねくれた性格の子が、素直になれるような、め、メロメロになっちゃう、お薬っ……特注してぇ、いっぱいお金払ってぇ、作ってもらった、のぉっ<emoji=heart04>」"
translation = "「벼, 변덕스러운 성격인 애가, 솔직해질 수 있는, 헤, 헤롱헤롱해져버리는, 약으을…… 특제해서어, 잔뜩 돈 내고오, 만들어 달라고, 해써어어엇❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「あ、あぁあぁぁぁっ<emoji=heart04><emoji=heart04>\u3000恥ずかしいよぉ、これ言うつもり、なかったのにっ<emoji=heart04>\u3000お薬で素直になっちゃって、隠し事、できないよぉ、ふわぁぁん<emoji=heart04>」"
translation = "「아, 아아아아아앗❤️❤️ 부끄러워어, 이거 말할 생각, 없었는데에잇❤️ 약 때문에 솔직해져서, 비밀, 못 지켜어, 후아아아앙❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「考えたこと、ぜんぶ口に出ちゃうぅ<emoji=heart04>\u3000かいちょ、お顔見ないでっ<emoji=heart04>\u3000あ、でも好きだからお顔見て欲しいっ<emoji=heart04>\u3000ぁあぁぁっ、ずっと一緒にいたいよぉ～っ<emoji=heart04><emoji=heart04>」"
translation = "「생각한 거, 저언부 입으로 나와버려어❤️ 회장, 얼굴 보지 마아앗❤️ 아, 하지만 좋으니까 얼굴 봐줬으면 좋겠어어❤️ 아아아아앗, 계속 같이 있고 싶어어어～엇❤️❤️」"

[[dialogue]]
speaker = "unk"
original = "はっきりと理性が焼き切れる音が聞こえた──恋人にこんなにも想われて、燃えない男がいるか！"
translation = "확실히 이성이 끊어지는 소리가 들렸다── 연인에게 이렇게나 사랑받는데, 타오르지 않을 남자가 있을까!"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「んんあああぁっ！？\u3000ふわぁぁあ<emoji=heart04><emoji=heart04>\u3000あっあっ、あぁあ、んんぅ、ふぁああぁあっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「으음응아아아앗!? 후아아아아❤️❤️ 앗앗, 아아아, 으음으, 후아아아아아앗❤️❤️❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「かいちょっ、おち○ぽ、ズンズン、すっごい速く、なった、ぁ、ぁ、あ、ぁ～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「회자앙, 자지, 즈음즈음, 엄청 빠르게, 됐어어, 어, 어, 어, 어～앗❤️❤️❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ムラムラ、きちゃったっ？\u3000私のこと、可愛くって、し、仕方ないのぉっ？\u3000んんぅ、んぁ、あっあっ<emoji=heart04>\u3000はぁあ、ふぅっ<emoji=heart04>」"
translation = "「흥분, 해버려써어? 내가, 귀여워어섯, 어, 어쩔 수 없는 거야아앗? 으음으, 응아, 앗앗❤️ 하아아, 후우❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「う、嬉しいっ<emoji=heart04>\u3000かいちょぉ、私もしゅきっ<emoji=heart04>\u3000ほんとに、ほんとにほんとにだいしゅきなのっ<emoji=heart04>」"
translation = "「기, 기뻐어❤️ 회자앙, 나도 죠아앗❤️ 정말로, 정말로정말로 정말 죠아하는 거야앗❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「んぁ、ああぁっ<emoji=heart04>\u3000いっつもイタズラしてるけど、んぅ！\u3000大好きだからしちゃうのっ<emoji=heart04>\u3000会長、ごめっ、ごめんなさいぃっ<emoji=heart04>\u3000んんうぅぅ～っ<emoji=heart04>」"
translation = "「응아, 아아아앗❤️ 언제나 장난치지만, 으음! 정말 좋아하니까 하는 거야앗❤️ 회장, 미아안, 미안해여어어엇❤️ 으음응우우우～앗❤️」"

[[dialogue]]
speaker = "unk"
original = "──謝らなくていい！\u3000小悪魔なマインも、イタズラ好きなところも、今みたいなベタ甘になっているのも、全部好きだ！"
translation = "──사과하지 않아도 돼! 소악마 같은 마인도, 장난기 많은 점도, 지금처럼 끈적하게 어리광 부리는 것도, 전부 좋아해!"

[[dialogue]]
speaker = "unk"
original = "俺は想いを込めて全力で女性器を突き込む。"
translation = "나는 마음을 담아 전력으로 여성기를 찔러 넣는다."

[[dialogue]]
speaker = "ネーゼマイン"
original = "「んんぁああっ<emoji=heart04>\u3000嬉しぃ<emoji=heart04>\u3000嬉しいよぉ<emoji=heart04>\u3000私のぜんぶ、愛してくれてっ……あ、ありがとぉ会長<emoji=heart04>\u3000しゅき、しゅきぃ、んんぅぅ！」"
translation = "「으음응아아아앗❤️ 기뻐어❤️ 기뻐어어❤️ 내 전부를, 사랑해줘서어…… 고, 고마워요 회장❤️ 죠아, 죠아아, 으음으으!」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「こ、これからは、ちょっとだけ、素直になってみる、ぅっ<emoji=heart04>\u3000んぁああっ<emoji=heart04>\u3000ふぅう、はぁ、あ、ああっあっあっあっ<emoji=heart04>」"
translation = "「이, 이제부터는, 조금만, 솔직해져 볼게에, 에에엇❤️ 응아아아앗❤️ 후우우, 하아, 아, 아앗앗앗앗❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「甘えたい時は、ちゃんと声に出して、言えるように頑張るから、ぁ、ああぁっ<emoji=heart04>\u3000ふうぅ、んんぅっ<emoji=heart04>\u3000んぁぁあっ<emoji=heart04>」"
translation = "「어리광 부리고 싶을 때는, 제대로 목소리 내서, 말할 수 있도록 힘낼 테니까아, 아, 아아아앗❤️ 후우우, 으음으읏❤️ 응아아아앗❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ぁ、あ、あ、あ、ぁ、あ、あぁっ──<emoji=heart04>\u3000おち○ぽ、すっごく速くなって、んぅ、ふぅうっ<emoji=heart04>\u3000熱い、熱いよぉおっ<emoji=heart04>」"
translation = "「아, 아, 아, 아, 아, 아, 아아앗──❤️ 자지, 엄청나게 빨라져서, 으음, 후우우읏❤️ 뜨거워, 뜨거워어어엇❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「も、もう、イっちゃう……？\u3000イっちゃうんだぁっ<emoji=heart04>\u3000あはぁ、出してっ<emoji=heart04>\u3000会長だけの、えっちなうさぎに種付けしてぇっ<emoji=heart04>」"
translation = "「버, 벌써, 가버려……? 가버리는 거야아앗❤️ 아하아, 싸줘어❤️ 회장만의, 야한 토끼한테 씨 뿌려줘어엇❤️」"

[[dialogue]]
speaker = "unk"
original = "性器以外のところもぴったりと密着して、バニーガールの愛しいマインを強く抱きしめる。"
translation = "성기 이외의 부분도 딱 밀착해서, 바니걸 모습의 사랑스러운 마인을 강하게 끌어안는다."

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ん、ふぅっ<emoji=heart04>\u3000あ、ぁあああっ<emoji=heart04>\u3000出してっ<emoji=heart04>\u3000出してぇっ<emoji=heart04>\u3000中出しっ<emoji=heart04>\u3000して、してして、してぇっ<emoji=heart04>」"
translation = "「으음, 후우웃❤️ 아, 아아아아앗❤️ 싸줘어❤️ 싸줘어어❤️ 질내사정❤️ 해줘, 해줘해줘, 해줘어어엇❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「精液ちょうだいっ<emoji=heart04>\u3000しゅき<emoji=heart04>\u3000しゅきだからっ<emoji=heart04>\u3000会長のことだいしゅきだからぁっ<emoji=heart04>\u3000いっぱい射精して<emoji=heart04>\u3000してぇっ<emoji=heart04>」"
translation = "「정액 줘어엇❤️ 죠아❤️ 죠아하니까앗❤️ 회장 정말 죠아하니까아아앗❤️ 잔뜩 사정해줘❤️ 해줘어어엇❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ん、ふぅ、んんっ！\u3000あ、ぁ、あぁあっ──イクっ<emoji=heart04>\u3000イクイクっ<emoji=heart04>\u3000イクイクイクイクっ<emoji=heart04><emoji=heart04>\u3000イク、ぅうぅうう～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「으음, 후우, 으음응! 아, 아, 아아아앗── 간다아❤️ 가 가❤️ 가 가 가 가❤️ 가, 아아아아아～～～앗❤️❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「んぁぁあぁあぁあぁああ～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응아아아아아아아아아～～～～앗❤️❤️❤️❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「あぁぁぁ、出てるぅっ……お腹の奥にっ──んぁ<emoji=heart04>\u3000やぁんんっ<emoji=heart04>\u3000会長の、精液っ<emoji=heart04>\u3000びゅるびゅる、出てるぅ、ぅうう～っ……<emoji=heart04><emoji=heart04>」"
translation = "「아아아아아, 나오고 있어어…… 배 안쪽에엣── 응아❤️ 야앙응❤️ 회장의, 정액❤️ 뷰루뷰루, 나오고 있어어, 어어어어～앗……❤️❤️」"

[[dialogue]]
speaker = "unk"
original = "射精するたびにマインの身体が可愛く震える。それに合わせて、ウサギの耳も小刻みに動いて……あまりの光景に射精が止まらない。"
translation = "사정할 때마다 마인의 몸이 귀엽게 떨린다. 그에 맞춰서, 토끼 귀도 잘게 움직이고…… 그 광경에 사정이 멈추지 않는다."

[[dialogue]]
speaker = "ネーゼマイン"
original = "「んんぅっ<emoji=heart04>\u3000ふぅう<emoji=heart04>\u3000あっ──射精、ながぁいっ……<emoji=heart04><emoji=heart04>\u3000ふぅう、はぁあ～っ……会長ぉ好き、好きぃ、好きぃいぃっ……<emoji=heart04>」"
translation = "「으음으으읏❤️ 후우우❤️ 앗── 사정, 길어어……❤️❤️ 후우우, 하아아～앗…… 회장 조아, 조아아, 조아아아아앗……❤️」"

[[dialogue]]
speaker = "unk"
original = "うわ言のように呟くマインのイキ声に、俺も眩暈を覚えてしまう。"
translation = "잠꼬대처럼 중얼거리는 마인의 신음 소리에, 나도 현기증을 느낀다."

[[dialogue]]
speaker = "unk"
original = "そのまま最後の一滴を絞り出すまで、彼女の子宮口にペニスをくっつけ続けて──"
translation = "그대로 마지막 한 방울을 짜낼 때까지, 그녀의 자궁구에 페니스를 계속 붙이고 있었다──"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「はぁっ……はあぁっ……ふうぅっ……ふわぁあ、あぁあっ……<emoji=heart04><emoji=heart04>」"
translation = "「하아앗…… 하아아앗…… 후우우읏…… 후아아아, 아아아앗……❤️❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「こんなに、いっぱい……<emoji=heart04>\u3000気持ちよくなって、くれたんだぁ……に、にひぃっ……<emoji=heart04>」"
translation = "「이렇게나, 잔뜩……❤️ 기분 좋아져, 줬구나아…… 니, 니히잇……❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「はぁあっ……はぁあ～っ……<emoji=heart04>\u3000お薬、だいぶ、切れてきた、かもぉ……<emoji=heart04>」"
translation = "「하아아앗…… 하아아～앗……❤️ 약, 거의, 다 깨가는 것, 같아아……❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「あは、なんか……今になって、めっちゃくちゃ恥ずかしく、なってきたかもぉ……<emoji=heart04>」"
translation = "「아하, 왠지…… 지금 와서, 어어어엄청나게 부끄러워, 진 것 같아아……❤️」"

[[dialogue]]
speaker = "クロト"
original = "「素直なマインも可愛かったよ」"
translation = "「솔직한 마인도 귀여웠어.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「も、もぉお……改めてそういうこと、言わないでよぉ、会長……<emoji=heart04>」"
translation = "「저, 정말이지이…… 새삼스럽게 그런 거, 말하지 마아, 회장……❤️」"

[[dialogue]]
speaker = "クロト"
original = "「どうせ今度する時は、いつもみたいに俺がイタズラされちゃうだろうし……今日はずっとこのまま、甘々でいきたいな……」"
translation = "「어차피 다음에 할 때는, 평소처럼 내가 장난이나 당하겠지…… 오늘은 계속 이대로, 끈적하게 있고 싶네……」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「にひひぃ♪\u3000りょうか～い……<emoji=heart04>\u3000それじゃあ媚薬のお代わり、飲んじゃおっかなぁ……<emoji=heart04>」"
translation = "「니히히이♪ 아라아아아앗～……❤️ 그럼 미약 한 번 더, 마셔버릴까아나아……❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「どうせだし、会長も同じ薬、飲んでみる……？\u3000２人で、ベタベタの、甘々えっち……するの<emoji=heart04>\u3000ど～ぉ……？」"
translation = "「어차피 하는 거, 회장도 똑같은 약, 마셔볼래……? 둘이서, 끈적끈적, 달콤달콤 야한 거…… 하는 거야❤️ 어때애……?」"

[[dialogue]]
speaker = "unk"
original = "その提案を受け入れ『素直になる媚薬』を半分こして飲んだ俺たちは、日が暮れるまで延々とお互いを求め、交わり続けるのだった──"
translation = "그 제안을 받아들여 『솔직해지는 미약』을 나눠 마신 우리들은, 해가 저물 때까지 끊임없이 서로를 원하며, 정사를 계속했다──"

