[[dialogue]]
speaker = "unk"
original = "第１話,第１話『バースデイムード』,B"
translation = "제1화, 제1화 『버스데이 무드』, B"

[[dialogue]]
speaker = "unk"
original = "某日──"
translation = "어느 날──"

[[dialogue]]
speaker = "クラウディア"
original = "「──へくちょんっ！」"
translation = "「──에취!」"

[[dialogue]]
speaker = "クラウディア"
original = "「うー……最近は冷えてきたのう。毛布、毛布はどこだ」"
translation = "「우으…… 요즘은 날이 차구나. 담요, 담요는 어디 있느냐.」"

[[dialogue]]
speaker = "クラウディア"
original = "「人間界のなんと寒いことか。魔女の森にいた頃は、季節の移ろいなど気にも留めなかったが……」"
translation = "「인간계가 어찌 이리 춥단 말이냐. 마녀의 숲에 있을 때는 계절의 변화 따위 신경도 쓰지 않았거늘……」"

[[dialogue]]
speaker = "クラウディア"
original = "「噂によれば人間界には『こたつ』なるアイテムがあるらしい。余の部屋にもぜひ設置してもらいたいところだ」"
translation = "「소문에 따르면 인간계에는 『코타츠』라는 아이템이 있다더구나. 짐의 방에도 꼭 설치하도록 하라.」"

[[dialogue]]
speaker = "クラウディア"
original = "「しかし……冬といえば余の誕生日ぞ！\u3000１２月２５日──かくもめでたき日を前に、ネビュラの連中は一体何をしておる」"
translation = "「하지만…… 겨울이라 하면 짐의 생일이로다! 12월 25일── 이토록 경사스러운 날을 앞두고, 네뷸라 녀석들은 대체 무엇을 하고 있는 게냐.」"

[[dialogue]]
speaker = "クラウディア"
original = "「バースデーレディであるはずの余が、なぜひとりで積み木遊びなどしていなくてはならんのだ！」"
translation = "「버스데이 레이디여야 할 짐이, 왜 혼자서 쌓기 놀이 따위나 하고 있어야 한단 말이냐!」"

[[dialogue]]
speaker = "クラウディア"
original = "「<ruby>ネビュラの魔女たち<rt>みな</rt></ruby>は……しっかり『おいわい』の準備をしておるのか？\u3000なんだか不安になってきたぞ」"
translation = "「네뷸라의 마녀들은…… 제대로 『축하』 준비를 하고 있는 것이냐? 왠지 불안해지는구나.」"

[[dialogue]]
speaker = "クラウディア"
original = "「もしかすると連中──余の誕生日など、すっかり忘れてしまっているのではあるまいな！？」"
translation = "「혹시 저 녀석들── 짐의 생일 따위, 까맣게 잊어버리고 있는 것은 아니겠지!?」"

[[dialogue]]
speaker = "クラウディア"
original = "「嫌な予感がしてきたぞ。そういえば、この前も……」"
translation = "「불길한 예감이 드는구나. 그러고 보니, 요전번에도……」"

[[dialogue]]
speaker = "クラウディア"
original = "「──わっはっは、元気か？\u3000ネビュラの魔女たちよ！」"
translation = "「──왓하하, 건강하냐? 네뷸라의 마녀들이여!」"

[[dialogue]]
speaker = "ウェンディ"
original = "「あ、クラウディア様。ご心配なく、元気にやっておりますよ」"
translation = "「아, 클라우디아 님. 걱정 마세요, 건강하게 잘 지내고 있답니다.」"

[[dialogue]]
speaker = "クラウディア"
original = "「そうか。だが、もう『としのせ』であるぞ。この時期になると色々と忙しいのではないか？」"
translation = "「그러냐. 하지만, 벌써 『연말』이로다. 이 시기가 되면 여러모로 바쁘지 않으냐?」"

[[dialogue]]
speaker = "ウェンディ"
original = "「ええ……確かに師走とあって、片付けなくちゃならない仕事は多いです」"
translation = "「네…… 확실히 세밑이라 정리해야 할 업무가 많네요.」"

[[dialogue]]
speaker = "クラウディア"
original = "「そうであろうそうであろう！\u3000なにせ１２月には、色々と催しごとが目白押しだから──なあ？」"
translation = "「그렇겠지 그렇겠지! 어쨌든 12월에는 여러 행사가 줄을 잇고 있으니── 그렇지?」"

[[dialogue]]
speaker = "ウェンディ"
original = "「ふふ、確かにそうですね」"
translation = "「후후, 확실히 그렇네요.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「ですが、年末になって慌てないよう普段から余裕をもって動いています。心配いただかずとも大丈夫ですよ、クラウディア様」"
translation = "「하지만 연말이 되어 당황하지 않도록 평소에 여유를 두고 움직이고 있습니다. 걱정하지 않으셔도 괜찮아요, 클라우디아 님.」"

[[dialogue]]
speaker = "クラウディア"
original = "「そうか……」"
translation = "「그러냐……」"

[[dialogue]]
speaker = "クラウディア"
original = "「セドナよ。お主も精が出るのう！」"
translation = "「세드나여. 너도 정진하고 있구나!」"

[[dialogue]]
speaker = "セドナ"
original = "「？\u3000どうかされましたか、姫様」"
translation = "「? 무슨 일이십니까, 공주님.」"

[[dialogue]]
speaker = "クラウディア"
original = "「いや、特に何も。ただ……日頃の労をねぎらおうと思ってな」"
translation = "「아니, 딱히 아무것도 아니다. 그저…… 평소의 노고를 치하하려 함이니라.」"

[[dialogue]]
speaker = "クラウディア"
original = "「それにしても──いやあ、もう１２月とは！\u3000時が過ぎるのは早いのう──なあ？」"
translation = "「그건 그렇고── 아니, 벌써 12월이라니! 시간이 참으로 빠르구나── 그렇지?」"

[[dialogue]]
speaker = "セドナ"
original = "「その通りです。だからこそ１分１秒を重んじ、漫然と過ぎる時を許してはならない」"
translation = "「그렇습니다. 그렇기에 1분 1초를 중히 여겨, 막연히 흘러가는 시간을 허용해서는 안 됩니다.」"

[[dialogue]]
speaker = "セドナ"
original = "「我々ネビュラが解決しなければならない任務は、まだまだ山のように積み上がっているのですから」"
translation = "「우리 네뷸라가 해결해야 할 임무는 아직 산더미처럼 쌓여 있으니까요.」"

[[dialogue]]
speaker = "クラウディア"
original = "「お、おう……」"
translation = "「어, 오오……」"

[[dialogue]]
speaker = "クラウディア"
original = "「今にして思えば誰ひとり、バースデーのバの字も口にしていないではないか」"
translation = "「지금 생각해보니 누구 하나, 버스데이의 'ㅂ'자도 입에 담지 않고 있지 않느냐.」"

[[dialogue]]
speaker = "クラウディア"
original = "「うーっ……どうにも気に食わん。かと言って、余からアピールするのもなんだか<ruby>癪<rt>しゃく</rt></ruby>だ」"
translation = "「우으…… 도무지 마음에 들지 않는구나. 그렇다고 해서 짐이 먼저 어필하는 것도 왠지 분하도다.」"

[[dialogue]]
speaker = "クラウディア"
original = "「本来ならもう前々々々々々々々々…………夜祭を行っていてもおかしくない頃合いだというのに！」"
translation = "「원래대로라면 벌써 전전전전전전전전전…………야제를 열고 있어도 이상하지 않을 시기이거늘!」"

[[dialogue]]
speaker = "クラウディア"
original = "「そうでなくとも最近は、学園との交流も増えて、やれ『ぎじゅつていけい』だの『そうごきょうりょく』だので、基地を留守にすることが増えた」"
translation = "「그렇지 않아도 요즘은 학원과의 교류도 늘어서, 뭐라더라 『기술 제휴』니 『상호 협력』이니 하며 기지를 비우는 일이 늘었도다.」"

[[dialogue]]
speaker = "クラウディア"
original = "「セドナも……ウェンディも……何をコソコソ出かけて、余をほっぽらかしにしておるというのだ」"
translation = "「세드나도…… 웨디도…… 무엇을 그리 소곤소곤 외출하며 짐을 내버려 두는 것이냐.」"

[[dialogue]]
speaker = "クラウディア"
original = "「余は四六時中ここにいて、ヒマでヒマで仕方ないというのに……余を祝う気持ちどころか、よそよそしささえ感じる」"
translation = "「짐은 하루 종일 여기 있어서 심심해 죽겠거늘…… 짐을 축하하려는 마음은커녕, 서먹함마저 느껴지는구나.」"

[[dialogue]]
speaker = "クラウディア"
original = "「せっかく余が人間界との交流を打ち出したというのに、その余が自由に動けんとはどういうことだ。まったく面白くない」"
translation = "「모처럼 짐이 인간계와의 교류를 내세웠거늘, 정작 그 짐이 자유롭게 움직이지 못하다니 어찌 된 일이냐. 전혀 재미없도다.」"

[[dialogue]]
speaker = "クラウディア"
original = "「なぜこんなことに……ん？\u3000待てよ」"
translation = "「어째서 이런 일이…… 응? 잠깐.」"

[[dialogue]]
speaker = "クラウディア"
original = "「そういえば、この前、勝手に抜け出して遊びに行った日も……」"
translation = "「그러고 보니, 요전번에 멋대로 빠져나가 놀러 갔던 날도……」"

[[dialogue]]
speaker = "セーラ"
original = "『もーすぐクリスマスだねー。ルリちーはなんか予定あるの？』"
translation = "『곧 있으면 크리스마스네ー. 루리치ー는 무슨 예정 있어?』"

[[dialogue]]
speaker = "ルリエル"
original = "『はい！\u3000聖歌隊ではキャロルを歌ったり、募金活動をしたりします！』"
translation = "『네! 성가대에서 캐럴을 부르거나, 모금 활동을 하기도 해요!』"

[[dialogue]]
speaker = "ユウリ"
original = "『いいな。クリスマスが近づくと、なんかワクワクしてくるよな』"
translation = "『좋겠네. 크리스마스가 다가오면 왠지 두근거린단 말이지.』"

[[dialogue]]
speaker = "セーラ"
original = "『わかる。ついついテンション上がっちゃうよね』"
translation = "『알 것 같아. 나도 모르게 텐션이 올라가 버리지.』"

[[dialogue]]
speaker = "ルリエル"
original = "『１２月って、学園も忙しい時期ですけど……クリスマスのおかげで毎日楽しみになっちゃいます！』"
translation = "『12월은 학원도 바쁜 시기지만…… 크리스마스 덕분에 매일이 기대돼요!』"

[[dialogue]]
speaker = "クラウディア"
original = "「くりすます……もしや、アレのせいか！？」"
translation = "「크리스마스…… 설마, 그것 때문인가!?」"

[[dialogue]]
speaker = "クラウディア"
original = "「なんということだ。噂に聞けばあのクリスマスとやらも、１２月２５日であるという」"
translation = "「이럴 수가. 소문에 듣자 하니 그 크리스마스라는 것도 12월 25일이라더군.」"

[[dialogue]]
speaker = "クラウディア"
original = "「解せぬ！\u3000１２月２５日といえばクラウディア・イルゼ・フォン・ゴットフリートの生誕日！\u3000それ以外の祝うべきことなどない！」"
translation = "「이해할 수 없도다! 12월 25일이라 하면 클라우디아 일제 폰 고트프리트의 탄생일! 그 이외에 축하해야 할 일 따위 없느니라!」"

[[dialogue]]
speaker = "クラウディア"
original = "「だというのに……世間はクリスマスなぞにうつつを抜かしておる！\u3000これはどういうことだ！」"
translation = "「거늘…… 세간은 크리스마스 따위에 정신이 팔려 있구나! 이것이 어찌 된 일이냐!」"

[[dialogue]]
speaker = "クラウディア"
original = "「もしや他の魔女たちも、人間界の風潮にたぶらかされておるのではないか！？」"
translation = "「설마 다른 마녀들도 인간계의 풍조에 미혹된 것이 아니겠느냐!?」"

[[dialogue]]
speaker = "クラウディア"
original = "「魔女の森にそんな風習はなかったというのに……なんと軟弱なことか！」"
translation = "「마녀의 숲에 그런 풍습은 없었거늘…… 이 얼마나 연약한 일이더냐!」"

[[dialogue]]
speaker = "クラウディア"
original = "「それに……クリスマスというのは、サンタクロースなるものにプレゼントをもらえる日らしい。それもおかしな話だ」"
translation = "「게다가…… 크리스마스라는 것은 산타클로스라는 자에게 선물을 받는 날이라더군. 그것도 이상한 소리로다.」"

[[dialogue]]
speaker = "クラウディア"
original = "「せっかく、余だけがめでたい日だというのに……他の連中もプレゼントをもらっているなんて」"
translation = "「모처럼 짐만이 경사스러운 날이거늘…… 다른 녀석들도 선물을 받다니.」"

[[dialogue]]
speaker = "クラウディア"
original = "「う～……なんだか釈然としないぞ！\u3000サンタがそんなに偉いのか～！」"
translation = "「우~…… 왠지 석연치 않도다! 산타가 그렇게나 위대한 것이냐~!」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「──クリスマスはサンタを祝う日じゃないよん、クラウディア様」"
translation = "「──크리스마스는 산타를 축하하는 날이 아니에용, 클라우디아 님.」"

