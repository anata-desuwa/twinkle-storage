[[dialogue]]
speaker = "unk"
original = "第５話,実践撃破訓練,B"
translation = "제5화, 실전 격파 훈련, B"

[[dialogue]]
speaker = "unk"
original = "入ったばかりの転入生が、現星徒会長ヴィーナスと果し合いを行う。"
translation = "막 들어온 전학생이 현 성도 회장 비너스와 맞대결을 벌인다."

[[dialogue]]
speaker = "unk"
original = "その噂はまたたく間に校内を駆け巡った。"
translation = "그 소문은 순식간에 교내에 퍼졌다."

[[dialogue]]
speaker_original = "生徒Ａ"
speaker_translation = "학생 A"
original = "「ねぇねぇ聞いた！？\u3000噂の新入生が会長に下剋上を叩きつけたんだって！」"
translation = "「있잖아, 들었어!? 소문의 신입생이 회장에게 하극상을 선언했대!」"

[[dialogue]]
speaker_original = "生徒Ｂ"
speaker_translation = "학생 B"
original = "「そんな無謀な……会長の実力をご存じないのでしょうか……」"
translation = "「그런 무모한…… 회장님의 실력을 모르시는 걸까요……」"

[[dialogue]]
speaker_original = "生徒Ｃ"
speaker_translation = "학생 C"
original = "「負けたら退学なんて、そんなの無茶だよ……」"
translation = "「지면 퇴학이라니, 그런 건 너무 심해……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……とんでもないことになった」"
translation = "「……엄청난 일이 되어 버렸군」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「他人事じゃないでしょう……」"
translation = "「남의 일처럼 말하지 마세요……」"

[[dialogue]]
speaker = "unk"
original = "気づけば俺は、入学早々トップに果たし状を叩きつける破天荒転入生として有名になってしまっていた。"
translation = "정신을 차려보니 나는, 입학하자마자 톱에게 도전장을 던지는 파천황 전학생으로 유명해져 있었다."

[[dialogue]]
speaker = "unk"
original = "本当は不可抗力だったのだが……。"
translation = "사실은 불가항력이었는데…….」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「（午後の授業はほとんど頭に入ってこなかったな……）」"
translation = "「(오후 수업은 거의 머리에 들어오지 않았군……)」"

[[dialogue]]
speaker = "unk"
original = "星徒会長か、退学か。"
translation = "성도 회장인가, 퇴학인가."

[[dialogue]]
speaker = "unk"
original = "こんなにも落差のある二択を突きつけられることもそうそうないだろう。"
translation = "이렇게 낙차가 큰 양자택일을 강요받는 일도 흔치 않을 것이다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「会長も無茶だわ。緋宮くんはまだ来たばかりなのに……」"
translation = "「회장도 너무하네. 히노미야 군은 아직 온 지 얼마 안 됐는데……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「でもある意味幸運。いきなりトップを狙える」"
translation = "「하지만 어떤 의미로는 행운. 갑자기 톱을 노릴 수 있다」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そういう問題じゃ……」"
translation = "「그런 문제가……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「確かにそうだ。いいこと言うな、アナ」"
translation = "「확실히 그렇다. 좋은 말 하는군, 아나」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あなたもポジティブすぎっ」"
translation = "「당신도 너무 긍정적이잖아」"

[[dialogue]]
speaker = "unk"
original = "現実問題、受けなければ退学だったのだから選択の余地はなかった。"
translation = "현실적으로, 받아들이지 않으면 퇴학이었으니 선택의 여지가 없었다."

[[dialogue]]
speaker = "unk"
original = "至難と呼ばれる編入試験をくぐり抜けてそんな末路はごめんだ。"
translation = "지극히 어렵다고 불리는 편입 시험을 통과하고 그런 말로는 사양이다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「今朝、クラスの子やマトイたちの話を聞いて……思ったんだ。俺、世界の危機に出動して立ち向かえるようになりたいって」"
translation = "「오늘 아침, 클래스 아이들과 마토이들의 이야기를 듣고…… 생각했어. 나, 세계의 위기에 출동해서 맞설 수 있게 되고 싶다고」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「世界の危機──は大げさだとしても、この流星市国くらいはさ」"
translation = "「세계의 위기──는 과장이라 해도, 이 유성 시국 정도는 말이지」"

[[dialogue]]
speaker = "unk"
original = "一定の実力が認められた星騎士はプリマステラと称され、モンスターの出現時などにも出動が許可される。"
translation = "일정 실력이 인정된 성기사는 프리마 스텔라로 칭해지며, 몬스터 출현 시 등에도 출동이 허가된다."

[[dialogue]]
speaker = "unk"
original = "その話を聞いて、まずそこを目指すべきだと強く思ったのも事実。"
translation = "그 이야기를 듣고, 우선 그곳을 목표로 해야겠다고 강하게 생각한 것도 사실."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「でも。それ以上の、星徒会長になれる道があるのなら……逃げてる場合じゃないと思うんだ」"
translation = "「하지만. 그 이상의, 성도 회장이 될 수 있는 길이 있다면…… 도망칠 때가 아니라고 생각해」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「緋宮くん……」"
translation = "「히노미야 군……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「とはいえ……星徒会に入るのも容易じゃないってのは、マトイにも聞いた通りだもんな」"
translation = "「그렇다 해도…… 성도회에 들어가는 것도 쉽지 않다는 건, 마토이에게 들은 대로니까」"

[[dialogue]]
speaker = "unk"
original = "新星学園総生徒数２５４４名。うち、星徒会役員は現会長含め４名。"
translation = "신성 학원 총 학생 수 2544명. 그중, 성도회 임원은 현 회장을 포함해 4명."

[[dialogue]]
speaker = "unk"
original = "恐ろしく狭き門。"
translation = "무시무시하게 좁은 문."

[[dialogue]]
speaker = "unk"
original = "選ばれし<ruby>星騎士<rt>スターナイト</rt></ruby>を育成するこの学園において、さらに選りすぐられた人たちによって構成されたエリート集団なのだ。無理もない。"
translation = "선택받은 성기사를 육성하는 이 학원에서, 더욱 엄선된 사람들로 구성된 엘리트 집단인 것이다. 무리도 아니다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……そう考えるとアナはすごいんだな」"
translation = "「……그렇게 생각하니 아나는 대단하네」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「それなりに」"
translation = "「그럭저럭」"

[[dialogue]]
speaker = "unk"
original = "──アナ。"
translation = "──아나."

[[dialogue]]
speaker = "unk"
original = "俺の右を歩く天使の少女はそう簡素に返事した。"
translation = "내 오른쪽을 걷는 천사의 소녀는 그렇게 간결하게 대답했다."

[[dialogue]]
speaker = "unk"
original = "軽く話したところによれば、彼女のつけている腕章は『副会長』の証らしい。"
translation = "가볍게 이야기해 본 바에 따르면, 그녀가 차고 있는 완장은 『부회장』의 증표인 듯하다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「アナは別格。一年生なのに副会長なんて、歴代初って聞いたし」"
translation = "「아나는 별격. 1학년인데 부회장이라니, 역대 최초라고 들었어」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「現会長はデスクワークが苦手だから。事務仕事は私が全部やってる。適材適所」"
translation = "「현 회장은 데스크 업무를 잘 못 하니까. 사무 업무는 내가 전부 하고 있다. 적재적소」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「優秀なんだな」"
translation = "「우수하구나」"

[[dialogue]]
speaker = "unk"
original = "アナはその小さい背丈からもわかるようにまだ一年生。"
translation = "아나는 그 작은 키에서도 알 수 있듯이 아직 1학년."

[[dialogue]]
speaker = "unk"
original = "にもかかわらず副会長という重役に抜擢されているのは驚きで、それも彼女の秀抜な能力によるものらしい。"
translation = "그럼에도 불구하고 부회장이라는 중책에 발탁된 것은 놀랍고, 그것도 그녀의 뛰어난 능력에 의한 것인 듯하다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ヴィーナスに勝つ……とは言ったけど。どうすればいいんだろう」"
translation = "「비너스에게 이긴다……고는 말했지만. 어떻게 해야 할까」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「どうする、と言っても……」"
translation = "「어떻게 하냐고 해도……」"

[[dialogue]]
speaker = "unk"
original = "御前試合。そう銘打たれた転入生ｖｓ星徒会長の試合は、一週間後に執り行われることになっていた。"
translation = "어전 시합. 그렇게 이름 붙여진 전학생 vs 성도 회장의 시합은, 일주일 후에 거행되기로 되어 있었다."

[[dialogue]]
speaker = "unk"
original = "新星学園を司る学園長先生の御前で、俺の星徒会長たりえる力を見せつけるのが目的なのだ。"
translation = "신성 학원을 관장하는 학원장 선생님 앞에서, 나의 성도 회장으로서의 자격이 될 힘을 보여주는 것이 목적인 것이다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「強くなるしかない。マトイ先輩、地下は空いてる？」"
translation = "「강해질 수밖에 없다. 마토이 선배, 지하는 비어 있나?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「空いてたと思うけど……」"
translation = "「비어 있었던 것 같은데……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「（地下……？）」"
translation = "「(지하……?)」"

[[dialogue]]
speaker = "unk"
original = "何のことだろう。"
translation = "무슨 말일까."

[[dialogue]]
speaker = "unk"
original = "そう思いつつも、俺は彼女たちに連れられていった。"
translation = "그렇게 생각하면서도, 나는 그녀들에게 이끌려 갔다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ここは……」"
translation = "「여기는……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「地下訓練施設。普通はたまに授業で使うけど、星徒会役員なら借りられる」"
translation = "「지하 훈련 시설. 보통은 가끔 수업에 사용하지만, 성도회 임원이라면 빌릴 수 있다」"

[[dialogue]]
speaker = "unk"
original = "どうやら俺のために役員権限を行使してくれたようだ。"
translation = "아무래도 나를 위해 임원 권한을 행사해 준 것 같다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「会長のわがままが原因だから。私たちもできる限り協力する」"
translation = "「회장의 제멋대로가 원인이니까. 우리도 가능한 한 협력한다」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「しょうがないもんね。さすがに退学が懸かってるなんて……見過ごせないし」"
translation = "「어쩔 수 없지. 아무리 그래도 퇴학이 걸려 있다니…… 못 본 척할 수 없고」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「２人とも……ありがとう」"
translation = "「두 사람 다…… 고맙다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「それじゃ、さっそく」"
translation = "「그럼, 바로」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker_original = "ビュンタ"
speaker_translation = "뷴타"
original = "「ウィイーッ」"
translation = "「위이잇」"

[[dialogue]]
speaker = "unk"
original = "アナがホール端にあった仰々しい機械を操作すると、目の前にモンスターが出現した。"
translation = "아나가 홀 끝에 있던 거창한 기계를 조작하자, 눈앞에 몬스터가 출현했다."

[[dialogue]]
speaker = "unk"
original = "また、一帯に光の障壁のようなフィールドが展開される。"
translation = "또한, 일대에 빛의 장벽 같은 필드가 전개된다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「倒してみてください。まずはあなたのポテンシャルを測ります」"
translation = "「쓰러뜨려 보세요. 우선 당신의 잠재력을 측정하겠습니다」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「い、いきなり？」"
translation = "「바, 바로?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「実践撃破訓練──これは誰しも入学時に受けるトレーニング・テストです。転入されたばかりの次期会長には、丁度いいかと」"
translation = "「실전 격파 훈련── 이것은 누구나 입학 시에 받는 트레이닝 테스트입니다. 막 전입한 차기 회장에게는, 딱 좋을 것 같습니다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「わかった。任せてくれ」"
translation = "「알았다. 맡겨 줘」"

[[dialogue]]
speaker = "unk"
original = "展開されたフィールド内には俺１人。"
translation = "전개된 필드 안에는 나 혼자."

[[dialogue]]
speaker = "unk"
original = "俺はセレスティアに触れ、戦闘態勢へ移行した。"
translation = "나는 셀레스티아에 접촉하여, 전투 태세로 이행했다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「まずはＣランクのモンスターが相手です。れでぃ、ごー」"
translation = "「우선은 C 랭크의 몬스터가 상대입니다. 레디, 고」"

