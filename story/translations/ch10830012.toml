[[dialogue]]
speaker = "unk"
original = "第２話,吸血鬼は安眠したい,P"
translation = "제2화, 흡혈귀는 숙면하고 싶어"

[[dialogue]]
speaker = "unk"
original = "それは、とある昼休み、ソフレとフェリシーと一緒に昼食をしていた時のことだった――"
translation = "그것은 어느 점심시간, 소프레와 펠리시와 함께 점심을 먹고 있었을 때의 일이었다――"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「すぅ……すぅ……スヤスヤ……♪」"
translation = "「새근…… 새근…… 쿨쿨……♪」"

[[dialogue]]
speaker = "unk"
original = "今日もよく眠ってるな"
translation = "오늘도 잘 자고 있네."

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「ふふっ、そうだね。ソフレ曰く、お腹一杯になって眠るのは、至福の時らしいよ」"
translation = "「후훗, 그렇네. 소프레 말로는 배부른 상태에서 잠드는 게 최고의 행복이래」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「それでいて、ソフレは全然太らない体質らしいから、すごく羨ましいよね～」"
translation = "「그러면서도 소프레는 전혀 살찌지 않는 체질인 것 같아서 정말 부럽단 말이지~」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「……ハッ！\u3000今誰か、安眠グッズの話をしていたのだわ！」"
translation = "「……핫! 지금 누가 숙면 굿즈 이야기를 한 거예요!」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「わっ、いきなり起きてビックリした！\u3000安眠グッズの話なんかしてないよ！？」"
translation = "「왓, 갑자기 일어나서 깜짝 놀랐잖아! 숙면 굿즈 이야기 같은 건 안 했어!?」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「いや、カフェテリアの生徒達の誰かが、間違いなく話していたのよ！\u3000ちょっと聞いて回ってくるのだわ！」"
translation = "「아니, 카페테리아 학생들 중 누군가가 틀림없이 말하고 있었어요! 잠깐 물어보고 오는 거예요!」"

[[dialogue]]
speaker = "unk"
original = "ちょっ、ソフレ！？"
translation = "잠깐, 소프레!?"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「――やっぱり、聞き間違えじゃなかったのだわ。どうやら、ＳＮＳで話題の安眠枕があるらしいのよ！」"
translation = "「――역시 잘못 들은 게 아니었던 거예요. 아무래도 SNS에서 화제인 숙면 베개가 있는 모양인걸요!」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「ＤＩＳＣで検索すると、ほら！\u3000みんな絶賛しているのだわ！」"
translation = "「DISC로 검색해 보니, 봐요! 다들 극찬하고 있는 거예요!」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「どうやら、今までにない新素材を中に詰めた枕らしいのよ。まるで雲の上にいるかのような寝心地を味わえるらしいのだわ！」"
translation = "「아무래도 지금까지 없던 신소재를 채워 넣은 베개인 모양이에요. 마치 구름 위에 있는 듯한 잠자리를 맛볼 수 있다는 거예요!」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「いや、いつも雲の上で寝てるじゃん」"
translation = "「아니, 항상 구름 위에서 자잖아」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「全然違うのだわ、フェリシー！\u3000ソフレの雲はあくまで能力の副産物。安眠の為に作られた枕は、別物なのよ！」"
translation = "「전혀 다른 거예요, 펠리시! 소프레의 구름은 어디까지나 능력의 부산물. 숙면을 위해 만들어진 베개는 별개인걸요!」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「真の安眠を味わったことがない者には、それがわからないのだわ！」"
translation = "「진정한 숙면을 맛본 적 없는 자에게는 그걸 모르는 거예요!」"

[[dialogue]]
speaker = "unk"
original = "いつになく言葉に熱が入っている……！"
translation = "여느 때보다 말에 열이 올라 있어……!"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「あはは……ソフレは睡眠大好きだから、快適に眠る為なら努力を惜しまないんだよね」"
translation = "「아하하…… 소프레는 수면을 아주 좋아하니까, 쾌적하게 자기 위해서라면 노력을 아끼지 않는단 말이지」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「私としては、その努力を星騎士として頑張る方面にもっと向けて欲しいんだけどな～」"
translation = "「나로서는 그 노력을 성기사로서 노력하는 방향으로 좀 더 돌려줬으면 좋겠는데~」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「とにかく、こうしてはいられないのだわ！\u3000午後の授業なんてサボって、売り切れる前に街へ買いに行くのよ！」"
translation = "「아무튼 이렇게 있을 순 없는 거예요! 오후 수업 따윈 빼먹고 매진되기 전에 시내로 사러 가는걸요!」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「いや、それはダメでしょ！\u3000授業は真面目に受けないと！」"
translation = "「아니, 그건 안 되지! 수업은 성실히 받아야지!」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「１００年間サボりまくってきてるんだから、今更１回くらいどうってことないのよ！」"
translation = "「100년 동안 실컷 빼먹어 왔는데, 이제 와서 한 번 정도는 아무렇지도 않은걸요!」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「今日は平日なんだから、そんな急に売れたりしないって！」"
translation = "「오늘은 평일이니까 그렇게 갑자기 팔리거나 하지는 않을 거야!」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「善は急げというじゃない！\u3000これも善行のうちなのだわ！」"
translation = "「쇠뿔도 단김에 빼라는 말도 있잖아요! 이것도 선행의 일환인 거예요!」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「上手いこと言ったつもり！？\u3000絶対にダメだからね！」"
translation = "「말 잘했다고 생각해!? 절대로 안 되니까!」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「――仕方ないから、放課後まで待ってあげたけど、その代わりソフレの買い物に付き合ってもらうのだわ！」"
translation = "「――어쩔 수 없으니까 방과 후까지 기다려 주겠지만, 그 대신 소프레의 쇼핑에 같이 가주는 거예요!」"

[[dialogue]]
speaker = "unk"
original = "ということで、俺たちは放課後、街へとやって来ていた。"
translation = "그리하여 우리는 방과 후, 시내로 나오게 되었다."

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「新素材の安眠枕……人気商品だから、１人１個制限がかかっているところが多いらしいのよ」"
translation = "「신소재 숙면 베개…… 인기 상품이라 1인당 1개 제한이 걸린 곳이 많은 모양인걸요」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「だけどソフレとしては、最低でも３つ――実際に使う用と、予備と、鑑賞用を確保しておきたいのだわ」"
translation = "「하지만 소프레로서는 적어도 3개―― 실제로 사용할 용도와 예비, 그리고 감상용을 확보해 두고 싶은 거예요」"

[[dialogue]]
speaker = "unk"
original = "鑑賞用っ！？"
translation = "감상용!?"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「安眠グッズはいくつあってもいいのだわ。快適な眠りは、日々の生活を豊かにするのだから」"
translation = "「숙면 굿즈는 아무리 많아도 좋은 거예요. 쾌적한 잠은 나날의 생활을 풍요롭게 하니까요」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「ソフレの部屋、安眠グッズでいっぱいだもんね～。この前なんか掃除が大変だったよ」"
translation = "「소프레 방, 숙면 굿즈로 가득하니까 말이야~ 저번에는 청소하느라 정말 힘들었다구」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「――部屋に遊びに行ったことがあるのかって？\u3000うん！\u3000何度もあるよ」"
translation = "「――방에 놀러 간 적이 있냐구? 응! 몇 번이나 있어」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「授業に遅刻するからって、こいつが毎日、ソフレを起こしに無理矢理押しかけてきてるだけなのだわ」"
translation = "「수업에 지각한다면서 이 녀석이 매일 소프레를 깨우러 억지로 쳐들어오고 있을 뿐인 거예요」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「――枕以外に、どんな安眠グッズがあるのか気になるって？\u3000まさか会長、興味があるのだわ！？」"
translation = "「――베개 말고 어떤 숙면 굿즈가 있는지 궁금하다구? 설마 회장, 관심이 있는 건가요!?」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「そういうことなら、ソフレお気に入りの安眠グッズを紹介してあげないこともないのよ！\u3000例えばそう、ホットアイマスクとか、すごくいいのだわ！」"
translation = "「그렇다면 소프레가 아끼는 숙면 굿즈를 소개해 주지 못할 것도 없는걸요! 예를 들어 그래요, 핫 아이마스크라든가 정말 좋은 거예요!」"

[[dialogue]]
speaker = "unk"
original = "（く、食いつきが凄い……！）"
translation = "(커, 관심도가 엄청나……!)"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「それにパジャマも馬鹿にできないのだわ。ソフレが好きな生地は――」"
translation = "「게다가 파자마도 무시할 수 없어요. 소프레가 좋아하는 재질은――」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「ふふふ……残念ながらラスト１個しか残ってなかったけど、安眠枕を無事にゲットできたのだわ……！」"
translation = "「후후후…… 아쉽게도 마지막 한 개밖에 남지 않았었지만, 숙면 베개를 무사히 득템한 거예요……!」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「本当に人気商品なんだね。売り切れのところばかりでビックリしたよ」"
translation = "「정말 인기 상품이네. 품절된 곳뿐이라 깜짝 놀랐어」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「…………スヤァ～♪」"
translation = "「………… 쿨쿨~♪」"

[[dialogue]]
speaker = "unk"
original = "って、もう使って寝てるし！"
translation = "아니, 벌써 쓰고 자고 있어!"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「思いっきり街のど真ん中なのにね～」"
translation = "「한복판 시내 한가운데인데 말이지~」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「すぅ……すぅ……枕……ふわふわなのだわ……♪」"
translation = "「새근…… 새근…… 베개…… 폭신폭신한 거예요……♪」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「ソフレったら、この後、一体誰が運ぶと思ってるんだか。でも――」"
translation = "「소프레도 참, 이따가 대체 누가 운반할 거라고 생각하는 건지. 하지만――」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「寝てる時だけは素直な表情を見せるから、見てるとつい可愛くて、許しちゃうんだよね～」"
translation = "「잘 때만큼은 솔직한 표정을 보여주니까, 보고 있으면 나도 모르게 귀여워서 용서하게 된단 말이지~」"

[[dialogue]]
speaker = "unk"
original = "それはすごくわかる"
translation = "그건 정말 공감해."

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「無邪気な顔しちゃって……つんつん♪」"
translation = "「천진난만한 얼굴을 하고선…… 쿡쿡♪」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「ん……♪\u3000スヤスヤ……♪」"
translation = "「음……♪ 쿨쿨……♪」"

[[dialogue]]
speaker = "unk"
original = "フェリシーが頬っぺたを突いても、幸せそうに眠るソフレなのだった――"
translation = "펠리시가 볼을 찔러봐도 행복하게 잠드는 소프레였다――"

