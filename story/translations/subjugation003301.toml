[[dialogue]]
speaker = "アポロ"
original = "「でっかいなー……」"
translation = "「거대하구만……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「うん、とっても大きい……」"
translation = "「응, 정말 커……」"

[[dialogue]]
speaker = "梨緒"
original = "「ああ。ここまでとはな……」"
translation = "「아아. 이 정도일 줄이야……」"

[[dialogue]]
speaker = "ナターシャ"
original = "「そういう台詞は、人の胸じゃなくて海を見て言いなよ。別に見られて減るもんでもないけどさー」"
translation = "「그런 대사는, 남의 가슴이 아니라 바다를 보고 말하라고. 딱히 보여준다고 닳는 것도 아니긴 하지만 말야─」"

[[dialogue]]
speaker = "ナターシャ"
original = "「だいたい、女同士で胸が大きいだの小さいだの言い合うのって、男の幻想じゃない？」"
translation = "「애초에, 여자끼리 가슴이 크니 작니 하고 떠드는 건, 남자의 환상 아냐?」"

[[dialogue]]
speaker = "梨緒"
original = "「いや、君のはそういうレベルを超えているだろう……」"
translation = "「아니, 네 건 그런 수준을 넘었느니라……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ご、ごめんなさい。あまりにもセクシーだったからっ」"
translation = "「죄, 죄송해요. 너무 섹시해서 그만」"

[[dialogue]]
speaker = "アポロ"
original = "「水着だとデカチチっぷりがホント引き立つなー。あたしの胸もそんくらいおっきく育たねーもんかな～」"
translation = "「수영복이니까 데카치치함이 진짜 돋보이네─. 내 가슴도 그 정도로 크게 자라지 않으려나~」"

[[dialogue]]
speaker = "ナターシャ"
original = "「アポロはたぶん成長すれば──じゃなくて、胸の大きさ比べするためにここへ来たわけじゃないでしょ？」"
translation = "「아폴로는 아마 성장하면── 이 아니라, 가슴 크기 비교하려고 여기 온 게 아니잖아?」"

[[dialogue]]
speaker = "梨緒"
original = "「そ、そうだったな。ここに来た目的を確認しよう」"
translation = "「그, 그랬지. 여기 온 목적을 확인하느니라」"

[[dialogue]]
speaker = "unk"
original = "遡ること、数時間前──"
translation = "거슬러 올라가기를, 몇 시간 전──"

[[dialogue]]
speaker = "梨緒"
original = "「くぅぅ、また魔王に負けた。これで２７９敗目だ……！」"
translation = "「크으으, 또 마왕에게 졌다. 이걸로 279패째니라……!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「次こそ勝てるよ、梨緒ちゃん。ファイトだよっ！」"
translation = "「다음엔 이길 수 있을 거야, 리오 짱. 파이팅이야!」"

[[dialogue]]
speaker = "ナターシャ"
original = "「それだけ負けられるのも、もはや才能だよね。連敗の世界記録でも目指しちゃう？」"
translation = "「그만큼 질 수 있는 것도, 이제는 재능이네. 연패 세계 기록이라도 노려볼래?」"

[[dialogue]]
speaker = "アポロ"
original = "「ジグにも模擬戦で負けっ放しみたいだしなー。あいつはまだ病み上がりなのに」"
translation = "「지그한테도 모의전에서 계속 지는 모양이고 말야─. 걔는 아직 병상에서 일어난 지 얼마 안 됐는데」"

[[dialogue]]
speaker = "梨緒"
original = "「くっ……追い打ちをかけないでくれっ……！」"
translation = "「큭…… 추궁하지 말아다오……!」"

[[dialogue]]
speaker = "マトイ"
original = "「うーん。やっぱりレベルが低かったのかなー……」"
translation = "「으음. 역시 레벨이 낮았던 걸까나─……」"

[[dialogue]]
speaker = "梨緒"
original = "「レベルが低い！？」"
translation = "「레벨이 낮다니!?」"

[[dialogue]]
speaker = "アナ"
original = "「雑魚狩りが大事でしたね」"
translation = "「잡몹 사냥이 중요했네요」"

[[dialogue]]
speaker = "梨緒"
original = "「雑魚！？」"
translation = "「잡몹!?」"

[[dialogue]]
speaker = "梨緒"
original = "「どうせ私は２７９戦負けっぱなしの、レベルの低い雑魚だ……！\u3000出がらしのティーバッグのような価値のない存在なんだ……！」"
translation = "「어차피 나는 279전 내내 지기만 한, 레벨 낮은 잡몹이니라……! 다 우려낸 티백 같은 가치 없는 존재이니라……!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「お、落ち着いて。誰も梨緒ちゃんのこととは言ってないよっ」"
translation = "「지, 진정해. 아무도 리오 짱에 대해 말한 게 아니야!」"

[[dialogue]]
speaker = "アポロ"
original = "「それよりマトイもアナもどーして水着なんか着てるんだ？」"
translation = "「그보다 마토이도 아나도 어째서 수영복 같은 걸 입고 있는 거야?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「魔王の趣味かな？\u3000平時は水着で過ごすように言い付けられてるとか」"
translation = "「마왕의 취향인가? 평소에는 수영복으로 지내도록 명령받았다던가」"

[[dialogue]]
speaker = "リップル"
original = "「イエイエ。新星星徒会の皆さんには、ワタシのリゾート結界で新モードのテストをしてもらっていたんデスよ！」"
translation = "「아뇨아뇨. 신성 성도회 여러분께는, 제 리조트 결계에서 신 모드 테스트를 부탁드리고 있었슴다!」"

[[dialogue]]
speaker = "梨緒"
original = "「わわっ。君は……？」"
translation = "「와왓. 너는……?」"

[[dialogue]]
speaker = "アポロ"
original = "「お、リップルじゃねーか！\u3000そっか、マトイとアナはリップルのビーチに遊びに行ってたワケだな！」"
translation = "「오, 리플 아니냐! 그렇구나, 마토이랑 아나는 리플의 비치에 놀러 갔던 거였구만!」"

[[dialogue]]
speaker = "ナターシャ"
original = "「あー、噂に聞いたことあるね。なんでも常夏のリゾート結界を管理している天使がいるとか」"
translation = "「아─, 소문으로 들은 적 있네. 뭐든 상하의 리조트 결계를 관리하고 있는 천사가 있다던가」"

[[dialogue]]
speaker = "ベアトリス"
original = "「常夏リゾート！\u3000お日様の光をいっぱい浴びられそう！」"
translation = "「상하 리조트! 햇빛을 가득 쬘 수 있을 것 같아!」"

[[dialogue]]
speaker = "リップル"
original = "「フフフ、興味アリますか～？\u3000では皆さんも是非ご参加ください！」"
translation = "「후후후, 관심 있으심까~? 그럼 여러분도 부디 참가해 주십쇼!」"

[[dialogue]]
speaker = "梨緒"
original = "「新モードのテスト、と言っていたな。それを我々もということか？」"
translation = "「신 모드 테스트라고 했느냐. 그걸 우리도 하라는 것이냐?」"

[[dialogue]]
speaker = "リップル"
original = "「ハイ！\u3000修行したい人や、新しい楽しみが欲しい人に向けたサバイバルゲームのようなモノでーす！」"
translation = "「하이! 수행하고 싶은 사람이나, 새로운 즐거움을 원하는 분들을 위한 서바이벌 게임 같은 것임다─!」"

[[dialogue]]
speaker = "梨緒"
original = "「修行したい人……」"
translation = "「수행하고 싶은 사람……」"

[[dialogue]]
speaker = "アポロ"
original = "「なんかよくわからないけど、楽しそうだな！」"
translation = "「뭔지 잘 모르겠지만, 재밌겠는데!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「でも海はちょっと……。興味はあるんだけど……」"
translation = "「하지만 바다는 좀…… 관심은 있지만……」"

[[dialogue]]
speaker = "ナターシャ"
original = "「私は何でもいいかなー」"
translation = "「난 뭐든 상관없으려나─」"

[[dialogue]]
speaker = "リップル"
original = "「ワタシとしても選挙管理委員会の皆さんのお力を借りられれば、百人力なのデスが……イカガでしょう？」"
translation = "「저로서도 선거관리위원회 여러분의 힘을 빌릴 수 있다면 백인대장급임다만…… 어떠심까?」"

[[dialogue]]
speaker = "梨緒"
original = "「……いや、すまない。せっかくのお誘いだが、私たちは魔王の監視をしなければいけないからな」"
translation = "「……아니, 미안하구나. 모처럼의 권유다만, 우리는 마왕의 감시를 해야 하느니라」"

[[dialogue]]
speaker = "リップル"
original = "「ソウですか……ではワタシは新星星徒会の皆さんの再チャレンジを気長に待ちます」"
translation = "「그렇슴까…… 그럼 저는 신성 성도회 여러분의 재도전을 느긋하게 기다리겠슴다」"

[[dialogue]]
speaker = "梨緒"
original = "「……待て。再チャレンジだと？\u3000もしや星徒会の面々は最後までクリアできなかったのか？」"
translation = "「……잠깐. 재도전이라고? 설마 성도회 녀석들은 끝까지 클리어하지 못한 것이냐?」"

[[dialogue]]
speaker = "リップル"
original = "「ハイ、それがドウカしまし──」"
translation = "「하이, 그게 무슨 문제라도──」"

[[dialogue]]
speaker = "梨緒"
original = "「やろう！！」"
translation = "「하겠다!!」"

[[dialogue]]
speaker = "リップル"
original = "「ひゃふっ！？」"
translation = "「햐훗!?」"

[[dialogue]]
speaker = "梨緒"
original = "「やろう、みんな！\u3000星徒会がクリアできなかった新モードとやらを私たちが先にクリアしてみせようじゃないか！」"
translation = "「하자, 얘들아! 성도회가 클리어하지 못한 신 모드인가 뭔가를 우리가 먼저 클리어해 보이지 않겠느냐!」"

[[dialogue]]
speaker = "アポロ"
original = "「あっはっは、相変わらず梨緒は負けず嫌いだな！」"
translation = "「앗하하, 여전히 리오는 지기 싫어하는구나!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ふふ、梨緒ちゃんがその気ならお手伝いするよ」"
translation = "「후후, 리오 짱이 그럴 마음이라면 도와줄게」"

[[dialogue]]
speaker = "ナターシャ"
original = "「まぁ、たまにはビーチで羽を伸ばすのもいいか」"
translation = "「뭐, 가끔은 비치에서 기지개를 켜는 것도 괜찮겠지」"

[[dialogue]]
speaker = "リップル"
original = "「ソレでは選挙管理委員会ご一行様、ご案内デ～ス！」"
translation = "「그럼 선거관리위원회 일행분들, 안내하겠슴다─!」"

[[dialogue]]
speaker = "梨緒"
original = "「そうだ、目的を忘れるな、みんな！\u3000何も私たちはナターシャの乳を見に来たわけじゃない！」"
translation = "「그래, 목적을 잊지 마라, 얘들아! 결코 우리는 나타샤의 젖을 보러 온 것이 아니니라!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「そうだね！\u3000リゾート結界に来たからには楽しまなきゃ！」"
translation = "「그렇네! 리조트 결계에 온 이상 즐겨야지!」"

[[dialogue]]
speaker = "梨緒"
original = "「ちがっ──わなくはないか……。それも大事だが、新星星徒会に勝つことも大事だ！」"
translation = "「아니── 지는 않지만 말이다……. 그것도 중요하다만, 신성 성도회에 이기는 것도 중요하느니라!」"

[[dialogue]]
speaker = "ナターシャ"
original = "「でも話に聞いてたのと雰囲気がちょっと違うね？\u3000閉じ込められているような感覚がするけれど」"
translation = "「근데 듣던 거랑 분위기가 좀 다르네? 갇혀 있는 듯한 감각이 드는데」"

[[dialogue]]
speaker = "リップル"
original = "「それが新モードのトクチョウなんですよ～。このモードでは、ゲームをクリアするか脱落するかしないと結界から出られナイんです」"
translation = "「그게 신 모드의 특징임다~. 이 모드에서는 게임을 클리어하거나 탈락하지 않으면 결계에서 나갈 수 없슴다」"

[[dialogue]]
speaker = "リップル"
original = "「それまでは海でサバイバルする必要がアリます。食べものや寝るところの確保も自分たちで、というルールです！」"
translation = "「그때까지는 바다에서 서바이벌할 필요가 있슴다. 먹을 것이나 잘 곳 확보도 스스로, 라는 규칙임다!」"

[[dialogue]]
speaker = "アポロ"
original = "「じきゅーじそくってヤツか！\u3000おもしろそーだな！」"
translation = "「자급자족이라는 녀석인가! 재밌겠구만!」"

[[dialogue]]
speaker = "ナターシャ"
original = "「それで、何をすればゲームクリアになるの？」"
translation = "「그래서, 뭘 하면 게임 클리어가 되는 거야?」"

[[dialogue]]
speaker = "リップル"
original = "「結界内にいるモンスターのボスを倒せばクリアです！\u3000逆に全滅するとゲームオーバーにナリます！」"
translation = "「결계 내에 있는 몬스터 보스를 쓰러뜨리면 클리어임다! 반대로 전멸하면 게임 오버가 됨다!」"

[[dialogue]]
speaker = "リップル"
original = "「あ、もちろんモンスターはワタシのリゾート結界で再現したニセモノなので、万が一やられても危険はナイですよ～！」"
translation = "「아, 물론 몬스터는 제 리조트 결계에서 재현한 가짜이므로, 만에 하나 당해도 위험은 없슴다~!」"

[[dialogue]]
speaker = "梨緒"
original = "「万に一つもやられるつもりはないがな。なら早速、周辺を探索してみよう」"
translation = "「만에 하나라도 당할 생각은 없다만. 그럼 당장 주변을 탐색해 보느니라」"

[[dialogue]]
speaker = "梨緒"
original = "「星徒会がクリアできなかったこの新モードも、私たちならクリアできるはずだ！」"
translation = "「성도회가 클리어하지 못한 이 신 모드도, 우리라면 클리어할 수 있을 것이니라!」"

[[dialogue]]
speaker = "梨緒"
original = "「気合いを入れていこう！\u3000せんかん～」"
translation = "「기합을 넣고 가자! 선관~」"

[[dialogue]]
speaker = "ベアトリス・アポロ"
original = "「ファイ、おー！」"
translation = "「파이팅, 오─!」"

[[dialogue]]
speaker = "ナターシャ"
original = "「やれやれ、元気だね～」"
translation = "「이런 이런, 활기차네~」"

