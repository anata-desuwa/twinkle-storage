[[dialogue]]
speaker = "unk"
original = "第３話,意識し始めるふたり,P"
translation = "제3화, 의식하기 시작하는 두 사람"

[[dialogue]]
speaker = "unk"
original = "カップル専用ドリンクを一緒に飲んでから、今まで以上に俺と一緒にいることが増えたジャクリーヌ。"
translation = "커플 전용 드링크를 같이 마신 뒤로, 지금까지 이상으로 나와 함께 있는 시간이 늘어난 자클린."

[[dialogue]]
speaker = "unk"
original = "最近では――"
translation = "최근에는──"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「トリックオアトリート♪\u3000お菓子あげゆ♪」"
translation = "「트릭 오어 트릿♪ 과자 주겠다유♪」"

[[dialogue]]
speaker = "unk"
original = "そっちが貰う側じゃないのか？"
translation = "그쪽이 받는 쪽 아니었어?"

[[dialogue]]
speaker = "unk"
original = "トリックオアトリートって、"
translation = "트릭 오어 트릿이란 건,"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「細かいことは気にしないでいいゆ！」"
translation = "「사소한 건 신경 안 써도 된다유!」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「人間界では、バレンタイン？\u3000に女の子が男の子にチョコをあげることもあるって聞いたゆ！\u3000だからあげるの！」"
translation = "「인간계에서는 발렌타인? 때 여자가 남자에게 초코를 주기도 한다고 들었다유! 그러니까 주는 거다유!」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「そのお菓子は、最近のお気に入りのガトーショコラだから、味わって食べるの！」"
translation = "「그 과자는 요즘 즐겨 먹는 가토 쇼콜라니까 맛을 음미하면서 먹으라유!」"

[[dialogue]]
speaker = "unk"
original = "わかった。ありがたく貰っておくよ。"
translation = "알았어. 고맙게 받을게."

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「あとで感想教えてなの！」"
translation = "「나중에 소감 알려달라유!」"

[[dialogue]]
speaker = "unk"
original = "ジャクリーヌは俺に対して、自分が気に入ったお菓子をよくくれるようになった。"
translation = "자클린은 나에게 자신이 좋아하는 과자를 자주 주게 되었다."

[[dialogue]]
speaker = "unk"
original = "その度に心臓は高鳴って――"
translation = "그때마다 심장은 크게 고동쳤고──"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「トリックオアトリート♪\u3000生チョコロールケーキをあげるの♪」"
translation = "「트릭 오어 트릿♪ 생초코 롤케이크를 주겠다유♪」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ゆ～ん！\u3000今日はマカロンをたくさんあげるのー！」"
translation = "「유~ㄴ! 오늘은 마카롱을 많이 주겠다유ー!」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ゆーっゆっゆっゆ♪\u3000今日は～……ゆ～ん！\u3000パンプキン味のプリンをあげるなの！」"
translation = "「유ー유유유♪ 오늘은~…… 유~ㄴ! 펌킨 맛 푸딩을 주겠다유!」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ゆ……ゆゆ……も、もう……食べられないの……」"
translation = "「유…… 유유…… 이, 이제…… 못 먹겠다유……」"

[[dialogue]]
speaker = "unk"
original = "ホントにたくさんのお菓子をもらい、時にはお腹が苦しくなるまで一緒に食べたこともあった。"
translation = "정말 많은 과자를 받았고, 때로는 배가 아플 정도로 함께 먹은 적도 있었다."

[[dialogue]]
speaker = "unk"
original = "そんなこんなで、今日はジャクリーヌに呼び出されたヒトリが一緒に星徒会室まで来ていた。"
translation = "그런저런 일로, 오늘은 자클린이 불러낸 히토리가 같이 성도회실까지 와 있었다."

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ゆゆーん！\u3000今日の衣装の着こなしはどうゆ？」"
translation = "「유유~ㄴ! 오늘 의상 맵시는 어떠냐유?」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「とってもかわいいです！\u3000今日の萌え袖は……一段となびいていて最高です……！」"
translation = "「정말 귀여워요! 오늘의 모에 소매는…… 유난히 찰랑거려서 최고예요……!」"

[[dialogue]]
speaker = "unk"
original = "萌え袖と合わさって、絶妙な可愛さだぞ！"
translation = "모에 소매랑 어우러져서 절묘하게 귀여워!"

[[dialogue]]
speaker = "unk"
original = "ふわっと広がったスカートも"
translation = "푹신하게 퍼진 스커트도,"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ゆへへ、ゆへへへ♪\u3000余のためにあるような服だから当然なの！」"
translation = "「유헤헤, 유헤헤헤♪ 짐을 위해 있는 듯한 옷이니까 당연하다유!」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「で、でも……今日は特にそこを意識して着こなしたから、会長にそう言ってもらえて、嬉しいゆ……♪」"
translation = "「하, 하지만…… 오늘은 특히 그 부분을 신경 써서 입었으니까, 회장이 그렇게 말해주니 기쁘다유……♪」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「な、なんだか……急にすっごく、恥ずかしいの……」"
translation = "「왠, 왠지…… 갑자기 너무 부끄럽다유……」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ゆーっゆっゆっゆっゆ♪」"
translation = "「유ー유유유유유♪」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「あれ？\u3000なんかジャクリーヌちゃん、いつもと様子が違う……？\u3000恥ずかしさを隠してる感じ……？」"
translation = "「어라? 왠지 자클린 짱, 평소랑 분위기가 다른데……? 부끄러움을 숨기는 느낌……?」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「トリックオアトリート♪\u3000褒めてくれたお礼に、今日はパンプキンパイをあげるゆ！」"
translation = "「트릭 오어 트릿♪ 칭찬해 준 답례로 오늘은 펌킨 파이를 주겠다유!」"

[[dialogue]]
speaker = "unk"
original = "カボチャ姿で踊りながら、いつものように俺にお菓子をあげてくるジャクリーヌ。"
translation = "호박 모습으로 춤추며 평소처럼 나에게 과자를 건네는 자클린."

[[dialogue]]
speaker = "unk"
original = "どうした？\u3000ホントに最近変だぞ？"
translation = "왜 그래? 정말 요즘 이상하다고?"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「そうなの？\u3000余はいつも通りのつもりだゆ？」"
translation = "「그래유? 짐은 평소랑 똑같을 생각이다유?」"

[[dialogue]]
speaker = "unk"
original = "ヒトリにももっと……"
translation = "히토리에게도 좀 더……"

[[dialogue]]
speaker = "unk"
original = "どうして俺にだけお菓子をくれるんだ？"
translation = "왜 나한테만 과자를 주는 거야?"

[[dialogue]]
speaker = "unk"
original = "それが失言だったと気づいた時にはすでに遅く……"
translation = "그것이 실언이었다는 걸 깨달았을 때는 이미 늦었고……"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「余のプレゼントの何が気に入らないゆ！？\u3000会長のバカーーーーっ！！」"
translation = "「짐의 선물이 뭐가 맘에 안 든다는 거냐유!? 회장 바보오오오오!!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「会長さん……今の発言は、ダメ、だと思います……」"
translation = "「회장님…… 방금 발언은 안 된다고 생각해요……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「だって……ジャクリーヌちゃんは会長さんのこと、異性として意識してるんじゃないかと……」"
translation = "「그게…… 자클린 짱은 회장님을 이성으로 의식하고 있는 게 아닌가 싶어서……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「だから会長さんにだけ……大好きなお菓子をあげてたんだと思いますよ？」"
translation = "「그래서 회장님에게만…… 제일 좋아하는 과자를 줬던 거라고 생각한다고요?」"

[[dialogue]]
speaker = "unk"
original = "ヒトリからの指摘でやっと気づいた。"
translation = "히토리의 지적으로 드디어 깨달았다."

[[dialogue]]
speaker = "unk"
original = "ジャクリーヌと一緒にいると心臓が高鳴る理由。それは、俺もジャクリーヌのことを女の子として意識しているからなんだ。"
translation = "자클린과 함께 있으면 심장이 뛰는 이유. 그것은 나도 자클린을 여자로서 의식하고 있기 때문이었다."

[[dialogue]]
speaker = "unk"
original = "そうだと理解した瞬間、ジャクリーヌを追いかけるために全速力で走り出したのだった。"
translation = "그렇다는 걸 이해한 순간, 자클린을 쫓아가기 위해 전속력으로 달려 나갔다."

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「頑張ってください会長さん……！」"
translation = "「힘내세요 회장님……!」"

