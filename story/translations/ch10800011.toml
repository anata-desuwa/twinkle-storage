[[dialogue]]
speaker = "unk"
original = "第１話,想い、受け止めてくれ！,P"
translation = "제1화, 마음을 받아줘!"

[[dialogue]]
speaker = "unk"
original = "『廊下を走ってはいけません』の全国的標語を厳守することなく、新星学園の廊下を駆け抜ける２つの人影。"
translation = "『복도에서 뛰면 안 됩니다』라는 전국적 표어를 엄수하지 않은 채, 신성학원의 복도를 달려 나가는 두 개의 인영."

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「待てー！\u3000逃げるな、会長っ！\u3000オレの熱い想い！\u3000受け取ってくれー！」"
translation = "「기다려─! 도망치지 마, 회장! 내 뜨거운 마음! 받아줘─!」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「こっちはすっかりその気になってんだ！\u3000弄ぶんじゃねえーっ！」"
translation = "「이쪽은 완전히 그럴 기분이 됐단 말이야! 농락하지 마─!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「もう、模範となるべき会長が廊下を全力疾走しちゃダメだってば」"
translation = "「정말, 모범이 되어야 할 회장이 복도를 전력 질주하면 안 된다니까.」"

[[dialogue]]
speaker = "unk"
original = "追われているんだ！"
translation = "쫓기고 있어!"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「追われている？\u3000さっきから騒がしいのと関係あるのかな？」"
translation = "「쫓기고 있어? 아까부터 시끄러운 거랑 관계가 있는 건가?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「あのよく通る声は、応援団のフラン先輩ですね。熱い想いをどうとか、弄ぶなとか叫んでました」"
translation = "「저 잘 들리는 목소리는 응원단의 프랑 선배네요. 뜨거운 마음이라느니, 농락하지 말라느니 외치고 있었어요.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「熱い想い……？\u3000弄ぶ――それってまさか……！？」"
translation = "「뜨거운 마음……? 농락── 그거 설마……!?」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「応援団２年、フラン・アーテリアル、失礼します！」"
translation = "「응원단 2학년, 프랑 아테리얼, 실례하겠습니다!」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「やっぱりここだったな、やっと追いついたぜ、会長！\u3000オレの想いを綴った手紙、受け取ってくれっ！」"
translation = "「역시 여기였군, 겨우 따라잡았다고, 회장! 내 마음을 담은 편지, 받아줘!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「想いを綴った……その手紙はやっぱり！\u3000ドキドキワクワク！」"
translation = "「마음을 담은…… 그 편지는 역시! 두근두근 와쿠와쿠!」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「ああ、もちろん──」"
translation = "「아아, 물론──」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「果たし状だっ！」"
translation = "「도전장이다!」"

[[dialogue]]
speaker = "unk"
original = "……果たし状？"
translation = "……도전장?"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「会長！\u3000あんたに決闘を申し込む！」"
translation = "「회장! 당신에게 결투를 신청한다!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「は、果たし状？\u3000ラブレターじゃなくて？」"
translation = "「도, 도전장? 러브레터가 아니고?」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「ラブレター！？\u3000んなわけねえだろ！\u3000んなもん書いたことねえし出す気もねえよ！」"
translation = "「러브레터!? 그럴 리가 없잖아! 그딴 거 써본 적도 없고 보낼 생각도 없어!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「果たし状とは随分と古風ですね。直接メッセージを送ればいいのでは」"
translation = "「도전장이라니 꽤 고풍스럽네요. 직접 메시지를 보내면 될 텐데.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「それじゃ、オレの想いは伝わらねえ。こういうマジなのは形から入るのが大事だろ」"
translation = "「그걸로는 내 마음이 전해지지 않아. 이런 진지한 건 형식부터 갖추는 게 중요하잖아.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「ヴィーナスが星徒会長の時に御前試合をしたかったんだが、先を越されちまったからな。だからオレはヴィーナスに勝ったあんたに勝負を申し込む！」"
translation = "「비너스가 성도회장일 때 어전 시합을 하고 싶었지만, 선수를 뺏겨버렸으니까 말이야. 그래서 나는 비너스를 이긴 당신에게 승부를 신청한다!」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「ヴィーナスとの試合記録、何度も見させてもらった。本当に見事だったぜ。惚れた！」"
translation = "「비너스와의 시합 기록, 몇 번이나 봤어. 정말 훌륭하더군. 반했어!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ほ、惚れ……！\u3000会長にＬＯＶＥ？」"
translation = "「바, 반해……! 회장에게 LOVE?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「いえ。あの様子だとＬＩＫＥでしょう」"
translation = "「아뇨. 저 모습으로 보아하니 LIKE겠죠.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「一歩も引かないあんたの戦いぶりにな！\u3000超絶格好良かったぜ！\u3000あんたはオレの憧れだ！」"
translation = "「한 발짝도 물러서지 않는 당신의 싸움 방식에 말이야! 초절정 멋있었다고! 당신은 내 동경이야!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「むしろ、ＲＥＳＰＥＣＴですかね」"
translation = "「오히려, RESPECT일까요.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「つかぬことをお聞きしますが、会長との勝負にこだわるということは、フラン先輩はゆくゆくは星徒会長の座を？」"
translation = "「뜬금없는 소리지만, 회장과의 승부에 집착한다는 건 프랑 선배도 조만간 성도회장 자리를?」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「会長の座？\u3000いや？\u3000そんなのにはこれっぽっちも興味ねえんだけど」"
translation = "「회장 자리? 아니? 그런 거엔 요만큼도 흥미 없는데.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「これっぽっちも！？\u3000それじゃ、なんで決闘なんて挑むの？」"
translation = "「요만큼도!? 그럼 왜 결투 같은 걸 신청하는 거야?」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「なんでって……『強いやつと戦いてえ！』それ以外に理由なんているのかよ」"
translation = "「왜냐니…… 『강한 녀석과 싸우고 싶어!』 그거 말고 다른 이유가 필요해?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「<ruby>戦闘狂<rt>バトルマニア</rt></ruby>かな……」"
translation = "「전투광<rt>배틀 마니아</rt>인가……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「<ruby>狂戦士<rt>バーサーカー</rt></ruby>ですね」"
translation = "「광전사<rt>버서커</rt>네요.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「人聞き悪ぃな。誰でも良いわけじゃねえ。オレはちゃんと分別がついてるよ」"
translation = "「사람 듣기 안 좋게. 아무나 다 좋다는 건 아니야. 나도 분별력은 있다고.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「弱い者イジメなんて、卑怯な真似は絶対にしねえ。戦うなら強いやつだ」"
translation = "「약한 자 괴롭히기 같은 비겁한 짓은 절대 안 해. 싸운다면 강한 녀석이다.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「鍛えた自分の体がどんだけ強くなったのか、わかりやすい物差しで計りたくなるだろ？\u3000みんなは違うのか？」"
translation = "「단련한 내 몸이 얼마나 강해졌는지, 알기 쉬운 척도로 재보고 싶어지는 법이잖아? 다들 안 그래?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「うーーーん、わからなくもないけど……」"
translation = "「으으음, 이해가 안 가는 건 아니지만……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「会長を物差し扱いとは恐れ知らずですね」"
translation = "「회장을 척도 취급하다니 겁도 없네요.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「強くなれば強くなるほど、戦士として守れるものが増えるからな」"
translation = "「강해지면 강해질수록, 전사로서 지킬 수 있는 게 늘어나니까.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「だけど会長になんてなったら忙しすぎて、守るべきやつを守れなくなっちまう。それじゃ本末転倒だ」"
translation = "「하지만 회장 같은 게 되면 너무 바빠서 지켜야 할 녀석들을 못 지키게 되잖아. 그건 본말전도지.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「ま、そういうわけだ！\u3000オレからの果たし状、受け取ってくれるな？」"
translation = "「뭐, 그런 거다! 내가 보낸 도전장, 받아줄 거지?」"

[[dialogue]]
speaker = "unk"
original = "受け取るよ"
translation = "받을게"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「会長！？」"
translation = "「회장!?」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「よっしゃあ！\u3000ついに会長と御前試合がやれるんだな！」"
translation = "「조아쓰! 드디어 회장과 어전 시합을 할 수 있는 거군!」"

[[dialogue]]
speaker = "unk"
original = "御前試合は簡単にはできないよ"
translation = "어전 시합은 쉽게 할 수 없어"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「は？\u3000そういや前もそう言ってたっけ」"
translation = "「응? 그러고 보니 전에도 그렇게 말했었나.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「まあ、いいや。会長と勝負ができるなら、いつだってなんだってＯＫだ！\u3000で、いつにする？」"
translation = "「뭐, 상관없어. 회장과 승부할 수 있다면 언제든 뭐든 OK다! 그래서, 언제로 할래?」"

[[dialogue]]
speaker = "unk"
original = "日時は明日、場所はここでいい？"
translation = "일시는 내일, 장소는 여기가 좋아?"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「明日って、学園はお休みよね。随分急だけど」"
translation = "「내일이라니, 학원 쉬는 날이잖아. 너무 갑작스러운데.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「へっ、常在戦場、戦士に休息はねえ！\u3000いつだろうが、どこだろうが、望むところだ！」"
translation = "「헷, 상재전장, 전사에게 휴식은 없다! 언제든 어디든 바라는 바다!」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「明日の勝負、楽しみにしてるぜ！」"
translation = "「내일 승부, 기대하고 있을게!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「フラン先輩、吹き荒れる熱風のような方でした」"
translation = "「프랑 선배, 휘몰아치는 열풍 같은 분이셨어요.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「でも、明日いきなり勝負だなんて……大丈夫？」"
translation = "「하지만 내일 갑자기 승부라니…… 괜찮겠어?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ああでも言っておかないと、フラン先輩は引き下がりそうになかったですしね」"
translation = "「저렇게라도 말해두지 않으면 프랑 선배는 물러나지 않았을 테니까요.」"

[[dialogue]]
speaker = "unk"
original = "任せておいて"
translation = "맡겨둬"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ふむ。会長には何やら考えがある様子。お手並み拝見といきましょう」"
translation = "「흠. 회장님께는 뭔가 생각이 있는 모양이군요. 솜씨 발휘 좀 기대해 보죠.」"

