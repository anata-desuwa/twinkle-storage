[[dialogue]]
speaker = "unk"
original = "第２話,好きの瞳は曇らない,P"
translation = "제2화, 좋아하는 눈동자는 흐려지지 않아"

[[dialogue]]
speaker = "unk"
original = "ある日の昼休み。俺はウズメとソフィアの２人と昼食を一緒にし、談笑していたのだが――"
translation = "어느 날 점심시간. 나는 우즈메와 소피아 두 사람과 점심을 함께하며 담소를 나누고 있었는데──"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「そういえば、この間さ～。あたし、忍者の子を見たんだよね～」"
translation = "「그러고 보니 요전번에 말이야~. 나, 닌자 애를 봤단 말이지~」"

[[dialogue]]
speaker = "unk"
original = "もしかして、せつなのこと？"
translation = "혹시 세츠나 말이야?"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「そうそう！\u3000九浄家メイド隊の、ござるちゃん！」"
translation = "「맞아 맞아! 쿠죠 가문 메이드대의 고자루짱!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「この間、戦闘していた時にたまたま一緒になったんだけど、忍者ってやっぱカッコいいよね～。素早い身のこなしと忍術、見ててウズウズしちゃったし♪」"
translation = "「지난번에 전투하고 있을 때 우연히 같이 있었는데 닌자는 역시 멋지더라~. 재빠른 몸놀림이랑 닌술, 보고 있으니 근질근질해졌다구♪」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「まさに、ジャパニーズクールって感じ。日本のよき伝統文化だよね～」"
translation = "「그야말로 재패니즈 쿨이라는 느낌. 일본의 좋은 전통문화지~」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「そうなんですか？\u3000忍者というのは、せつなさん以外に見たことがありませんが……」"
translation = "「그런가요? 닌자라는 건 세츠나 씨 이외에는 본 적이 없습니다만……」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「なに言ってんの、ソフィ！\u3000日本には忍者が沢山いるんだよ。ござるちゃんは星騎士だから目立ってるけど、そのほかの忍者は、その名の通り忍んでるだけで！」"
translation = "「무슨 소리야, 소피! 일본에는 닌자가 잔뜩 있다구. 고자루짱은 성기사니까 눈에 띄는 거지만 다른 닌자들은 그 이름대로 숨어있을 뿐이라니까!」"

[[dialogue]]
speaker = "unk"
original = "いや、一般社会にはいないんじゃないかな……"
translation = "아니, 일반 사회에는 없지 않을까……"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ええっ！？」"
translation = "「에엣!?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「いやいや、そんなことないっしょ！\u3000あたしのオタク友達で、ござるって口調でしゃべる子知ってるし！」"
translation = "「아니아니, 그럴 리 없다구! 내 오타쿠 친구 중에 고자루 말투로 말하는 애도 안단 말이야!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「それはオタクだからでは……？」"
translation = "「그건 오타쿠라서 그런 게……?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「武器で手裏剣使ってる星騎士の子とか見たし！」"
translation = "「무기로 수리검 쓰는 성기사 애도 봤다구!」"

[[dialogue]]
speaker = "unk"
original = "あれはチャクラムらしいよ"
translation = "그건 차크람이라고 하던데."

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「そんなぁ……！？」"
translation = "「그럴 수가……!?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ウズメのいつもの勘違いパターンですね」"
translation = "「우즈메의 평소 같은 착각 패턴이군요.」"

[[dialogue]]
speaker = "？？？"
original = "「ふっふっふ……なるほど、その発想はなかったぜ☆」"
translation = "「훗훗훗…… 과연, 그 발상은 없었군☆」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「女という漢字を分解して、くノ一。故にさりげなく匂わせる忍者ファッション……面白いじゃん！」"
translation = "「여자(女)라는 한자를 분해해서 쿠노이치(くノ一). 고로 은근히 풍기는 닌자 패션…… 재밌잖아!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あっ、紅明先輩！\u3000ちょりっす♪」"
translation = "「앗, 코우메이 선배! 쵸릿쓰♪」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ウズメっち、おいっす～☆\u3000今日も元気してる？\u3000ウェ～イ♪」"
translation = "「우즈메치, 오잇쓰~☆ 오늘도 잘 지내? 웨~이♪」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「もち元気です♪\u3000ウェ～イ！」"
translation = "「물론 잘 지내죠♪ 웨~이!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ソフィっちも元気してるかい？」"
translation = "「소피치도 잘 지내나?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「どうもです、紅明さん。おかげさまで、ホットです」"
translation = "「안녕하세요, 코우메이 씨. 덕분에 핫합니다.」"

[[dialogue]]
speaker = "unk"
original = "紅明、ウズメと知り合いだったんだ"
translation = "코우메이, 우즈메랑 아는 사이였구나."

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ダーリン♪\u3000うん、そうなんよ！」"
translation = "「다링♪ 응, 그렇다구!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「セーラ先輩繋がりで知り合ったんだ～♪\u3000ギャルの先輩としてもマジリスペクトって感じ♪」"
translation = "「세라 선배 인연으로 알게 됐어~♪ 갸루 선배로서도 진짜 리스펙트라는 느낌♪」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ところでさっきの話、聞いてたぜ。ウズメっち、忍者が好きなんだって？」"
translation = "「그건 그렇고 아까 이야기 들었어. 우즈메치, 닌자를 좋아하는구나?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「そうなんです！\u3000忍者、めっちゃクールだと思うんですよね！」"
translation = "「맞아요! 닌자, 진짜 쿨하다고 생각하거든요!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「確かに、せつなっち、戦闘中カッコいいよな。しかも、普段はめっちゃ可愛いっていう――」"
translation = "「확실히 세츠나치, 전투 중에 멋있지. 게다가 평소에는 엄청 귀엽다는──」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「アタシが思うにあれだ……あの手裏剣の髪飾り、よくない？」"
translation = "「내가 보기엔 그거야…… 그 수리검 모양 머리 장식, 좋지 않아?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「わかります！\u3000あたしもあれ欲しいんですけど、どこに売ってるんですかね！？」"
translation = "「알 것 같아요! 저도 그거 갖고 싶은데 어디서 파는 걸까요!?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「それとあたし的に、あの忍者マスクもファッションとしてアリだと思うんですよ！」"
translation = "「그리고 제 생각엔 저 닌자 마스크도 패션으로서 괜찮을 것 같아요!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「それな！\u3000あと扇子も持ち歩いてみたりとか！」"
translation = "「인정! 그리고 부채도 들고 다녀본다거나!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あ～！\u3000ヤバい、めっちゃアリ！\u3000うわ～、なんかあたし、忍者ファッションしてみたくなってきたかも♪」"
translation = "「아~! 대박, 완전 좋아! 우와~ 왠지 나 닌자 패션 해보고 싶어졌을지도♪」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ウズメっち、今度の休みとか空いてる？\u3000ちょっくら街にアイテム探しに行ってみようぜ！」"
translation = "「우즈메치, 이번 휴일 같은 때 비어 있어? 잠깐 시내로 아이템 찾으러 가보자구!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「いいですね！\u3000セーラ先輩も誘っちゃいましょう！\u3000ソフィと会長くんは予定だいじょぶ！？」"
translation = "「좋아요! 세라 선배도 같이 불러요! 소피랑 회장군은 예정 괜찮아!?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「えっ？\u3000私もですか？」"
translation = "「에? 저도요?」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ソフィっちも久しぶりに遊ぼうぜ☆\u3000アタシ、この間、美味しいパンケーキのお店を見つけたんよ～。お姉さん奢っちゃうぜ？」"
translation = "「소피치도 오랜만에 놀자구☆ 나 얼마 전에 맛있는 팬케이크 가게를 찾았거든~. 언니가 쏜다?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ぱ、パンケーキですか……ごくり」"
translation = "「패, 팬케이크 말인가요…… 꿀꺽」"

[[dialogue]]
speaker = "unk"
original = "そんなこんなで忍者談義が盛り上がり――"
translation = "이래저래 닌자 담의가 달아오르고──"

[[dialogue]]
speaker = "unk"
original = "後日、世間では手裏剣型のアクセサリーや、マスクや扇子が若い女性の間で大流行していた――"
translation = "며칠 뒤, 세간에서는 수리검형 액세서리나 마스크, 부채가 젊은 여성들 사이에서 대유행했다──"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「まさか、紅明さんのＳＮＳ発信で、本当に忍者ファッションが流行るとは……」"
translation = "「설마 코우메이 씨의 SNS 발신으로 정말로 닌자 패션이 유행할 줄이야……」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「これはズバリ――」"
translation = "「이건 바로──」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「これまで忍んでいた忍者の子たちが、流行に乗じて存在を露わにしたってことじゃん！？」"
translation = "「지금까지 숨어있던 닌자 애들이 유행을 타고 존재를 드러낸 거 아냐!?」"

[[dialogue]]
speaker = "unk"
original = "いや違うよ！？"
translation = "아니 아니라니까!?"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「まぁ、ウズメなので……」"
translation = "「뭐, 우즈메니까요……」"

[[dialogue]]
speaker = "unk"
original = "瞳を曇らせることなく、晴れやかに忍者を信じ続けるウズメなのだった――"
translation = "눈동자를 흐리지 않고 맑게 닌자를 계속 믿는 우즈메였다──"

