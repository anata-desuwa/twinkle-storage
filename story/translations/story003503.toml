[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「――頑張ったけど、パーティーの準備、その日のうちには間に合わなかったわ！」"
translation = "「――노력했지만, 파티 준비가 그날 안에는 안 끝났어!」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「それはそう」"
translation = "「그건 당연하지」"

[[dialogue]]
speaker = "メルエル"
original = "「あはは……でも、数日かかったけど、ちゃんと準備できたよ♪」"
translation = "「아하하…… 그래도 며칠 걸렸지만 제대로 준비됐어♪」"

[[dialogue]]
speaker = "unk"
original = "小さなヴィーナスたちが増えてから３日後。俺たちは九浄家の広間で『こどもの日パーティー』を開催しようとしていた。"
translation = "어린 비너스들이 늘어난 지 3일 후. 우리는 쿠죠 가문의 넓은 방에서 『어린이날 파티』를 열려고 하고 있었다."

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「レミカ、メルエル、準備を手伝ってくれてありがとう♪」"
translation = "「레미카, 메루엘, 준비 도와줘서 고마워♪」"

[[dialogue]]
speaker = "レミカ"
original = "「私たちもお祝いしてもらうパーティーだからね」"
translation = "「우리도 축하받는 파티니까」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「それに、やるなら全力っていうのが、私のスタンスだから」"
translation = "「게다가 한다면 전력으로 한다는 게 내 스타일이니까」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「さすがはレミカね♪\u3000それでこそ、私の推すトップアイドルよ！」"
translation = "「과연 레미카네♪ 그래야 내가 미는 톱 아이돌이지!」"

[[dialogue]]
speaker = "unk"
original = "それにしても３人の制服姿、驚いたよ"
translation = "그나저나 세 사람의 교복 차림, 놀랐어."

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「えへへ♪\u3000昨日でき上がったんだけど、パパにサプライズしようと思って、ここまで秘密にしておいたのよ♪」"
translation = "「에헤헤♪ 어제 완성됐는데, 아빠한테 서프라이즈하려고 여기까지 비밀로 해뒀어♪」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「まさか附属校の制服とは思わなかったけど。ヴィーナスがヘレナさんに頼んだら、ノリノリで作ってくれたらしくて……」"
translation = "「설마 부속 학교 교복일 줄은 몰랐지만. 비너스가 헬레나 씨한테 부탁했더니 신나서 만들어주셨대……」"

[[dialogue]]
speaker = "メルエル（幼少）"
original = "「会長くん、どうどう？\u3000附属校の制服、可愛いかな？」"
translation = "「회장군, 어때 어때? 부속 학교 교복, 귀여워?」"

[[dialogue]]
speaker = "unk"
original = "３人共、すごく可愛いよ"
translation = "세 사람 모두 정말 귀여워."

[[dialogue]]
speaker = "メルエル（幼少）"
original = "「えへへへぇ<emoji=heart04>\u3000また可愛いって言ってもらっちゃった♪\u3000嬉しくてメルトしちゃうよ～<emoji=heart04>」"
translation = "「에헤헤헤헤<emoji=heart04> 또 귀엽다는 말을 들었어♪ 기뻐서 멜트해버려~<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "（はうぅぅ<emoji=heart04>\u3000小さい私が褒められてるのを見るのは嬉しいけど、ちょっと恥ずかしいよぉ～<emoji=heart04>）"
translation = "（하우우우<emoji=heart04> 어린 내가 칭찬받는 걸 보는 건 기쁘지만, 조금 부끄러워~<emoji=heart04>）"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「ぷっ……ふふっ……！\u3000会長、真面目な顔で、親指立てながら言うの反則でしょ……！」"
translation = "「푸흡…… 후훗……! 회장, 진지한 얼굴로 엄지 척 하면서 말하는 건 반칙이잖아……!」"

[[dialogue]]
speaker = "unk"
original = "レミカはツボに入ったらしく笑いを堪えていたが、すぐに咳払いをしてみせる。"
translation = "레미카는 웃음보가 터진 모양인지 웃음을 참고 있었지만, 곧 헛기침을 해 보인다."

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「コホン――今のは笑ってないから。ちょっとむせちゃっただけだから」"
translation = "「큼큼―― 방금 건 웃은 거 아니니까. 그냥 사레들린 것뿐이니까」"

[[dialogue]]
speaker = "unk"
original = "実はやたら『笑いの沸点』が低いレミカだが、本人はそれが恥ずかしいのか、笑いそうになるとよく何事もなかったかのように誤魔化そうとする。"
translation = "사실 의외로 웃음 장벽이 낮은 레미카지만, 본인은 그게 부끄러운지 웃음이 터질 것 같으면 아무 일 없었다는 듯 얼버무리곤 한다."

[[dialogue]]
speaker = "レミカ"
original = "「ふっ……ふふっ……！\u3000そう、トップアイドルはこれくらいで、笑ったりしないから……！」"
translation = "「훗…… 후훗……! 그래, 톱 아이돌은 이 정도로 웃거나 하지 않으니까……!」"

[[dialogue]]
speaker = "unk"
original = "って、大きいレミカも笑ってるし。"
translation = "그치만 큰 레미카도 웃고 있는데."

[[dialogue]]
speaker = "ヴィーナス"
original = "「さあ、準備もできたことだし、パーティーを始めるわよ！」"
translation = "「자, 준비도 다 됐으니 파티를 시작하자!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それじゃあ、こどもの日をお祝いして～、せ～のっ！」"
translation = "「그럼 어린이날을 축하하며~, 하나 둘!」"

[[dialogue]]
speaker = "全員"
original = "「カンパ～イ♪」"
translation = "「건배~♪」"

[[dialogue]]
speaker = "unk"
original = "そうして、俺たちはこどもの日パーティーを開始した。"
translation = "그렇게 우리는 어린이날 파티를 시작했다."

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「ねぇ、パパ！\u3000料理をあ～んして、食べさせて欲しいわ♪」"
translation = "「저기, 아빠! 요리를 아~ 해줘서 먹여줬으면 좋겠어♪」"

[[dialogue]]
speaker = "unk"
original = "甘えるようにそう言ってきたヴィーナスに、俺は彼女の好きな『オムライス』をスプーンで口に運んであげる。"
translation = "응석 부리듯 그렇게 말하는 비너스에게, 나는 그녀가 좋아하는 『오므라이스』를 숟가락으로 떠서 입으로 가져다준다."

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「あ～ん♪\u3000――あむっ♪\u3000もぐもぐ……♪」"
translation = "「아~♪ ――냠♪ 우물우물……♪」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「ん～♪\u3000美味しいわ！\u3000えへへへぇ<emoji=heart04>」"
translation = "「음~♪ 맛있어! 에헤헤헤헤<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あっ、小さい私だけずるいわ！\u3000ねぇ、パパ、私にもお願～い♪」"
translation = "「앗, 어린 나만 치사해! 저기, 아빠, 나한테도 부탁해~♪」"

[[dialogue]]
speaker = "unk"
original = "俺は頷いて、大きな方のヴィーナスの口にも、オムライスを食べさせてあげる。"
translation = "나는 고개를 끄덕이며 큰 비너스의 입에도 오므라이스를 먹여준다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「――あ～ん♪\u3000もぐもぐ……ふふっ、美味しい～<emoji=heart04>\u3000パパ、ありがと～♪」"
translation = "「――아~♪ 우물우물…… 후훗, 맛있다~<emoji=heart04> 아빠, 고마워~♪」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「ふふっ……ヴィーナスってば、小さい自分につられてパパ呼びして、甘えん坊になってる」"
translation = "「후훗…… 비너스도 참, 어린 자신을 따라서 아빠라고 부르고, 어리광쟁이가 됐네」"

[[dialogue]]
speaker = "メルエル（幼少）"
original = "「会長くんにあ～んってしてもらえるの、羨ましい……！」"
translation = "「회장군이 아~ 해주는 거, 부럽다……!」"

[[dialogue]]
speaker = "メルエル"
original = "「ちょっ！？\u3000わ～っ！\u3000わ～っ！！」"
translation = "「잠깐!? 와~앗! 와~앗!!」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「ねぇねぇ、パパ～！\u3000私ね、もう１つお願いがあるの♪」"
translation = "「있지 있지, 아빠~! 나 말이야, 부탁이 하나 더 있어♪」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「こどもの日だから～、パパから『私の好きなところ』を１０個、教えて欲しいわ♪」"
translation = "「어린이날이니까~, 아빠한테 『내가 좋아하는 점』을 10가지 알려줬으면 좋겠어♪」"

[[dialogue]]
speaker = "メルエル"
original = "「えっ！？\u3000好きなところ！？」"
translation = "「엣!? 좋아하는 점!?」"

[[dialogue]]
speaker = "unk"
original = "１０個……！？"
translation = "10가지나……!?"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「そう！\u3000大きな私と相談して決めたのよ♪」"
translation = "「응! 큰 나랑 상담해서 정했어♪」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「娘として、パパからどんなことを言ってもらえたら、愛が伝わってきて嬉しいかって♪」"
translation = "「딸로서 아빠한테 어떤 말을 들으면 사랑이 전해져서 기쁠까 하고♪」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「好きなところを教えてもらえたら、私、そこを頑張って、もっといい子になろうって思えるもの♪」"
translation = "「좋아하는 점을 들으면, 나 그 부분을 노력해서 더 착한 아이가 되려고 생각할 수 있는걸♪」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「こ、これはまたすごい無茶ぶりだね……」"
translation = "「이, 이건 또 엄청난 막무가내네……」"

[[dialogue]]
speaker = "メルエル（幼少）"
original = "「私も同じように教えてもらいたい……！\u3000けど、いきなり１０個はさすがに……」"
translation = "「나도 똑같이 듣고 싶어……! 하지만 갑자기 10개는 역시……」"

[[dialogue]]
speaker = "unk"
original = "言うのは、ちょっと恥ずかしいけど……"
translation = "말하는 건 좀 부끄럽지만……"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「――なになに？\u3000まずはレミカの言う通り、『素直』なところ？\u3000えへへ<emoji=heart04>\u3000それから？」"
translation = "「――뭐뭐? 우선 레미카 말대로 『솔직한』 점? 에헤헤<emoji=heart04> 그다음은?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「――『明るくて周りに元気をくれる』ところに、『仲間を大切にする』ところ？」"
translation = "「――『밝아서 주변에 활기를 주는』 점이랑, 『동료를 소중히 여기는』 점?」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「――『仲間を心から信じられる』ところ。それから、『１度やると決めたことは最後まで頑張る』ところ？」"
translation = "「――『동료를 진심으로 믿는』 점. 그리고 『한번 하기로 마음먹은 건 끝까지 노력하는』 점?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あと、『困っている人を見かけたら手を差し伸べられる』ところに……」"
translation = "「그리고 『곤란한 사람을 보면 손을 내밀어주는』 점에……」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「――『その人の為に、本気で力になろうとする』ところ？\u3000あとは、『相手の気持ちがすぐにわからなくても、諦めずに向き合い続ける』ところ」"
translation = "「――『그 사람을 위해 진심으로 힘이 되어주려는』 점? 나머지는 『상대의 기분을 금방 알 수 없어도 포기하지 않고 계속 마주하는』 점」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「――『相手のすごいところを見つけて、褒められる』ところも？」"
translation = "「――『상대의 대단한 점을 찾아내서 칭찬해주는』 점도?」"

[[dialogue]]
speaker = "unk"
original = "そして、１番は――"
translation = "그리고 가장 큰 장점은――"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「――『困難な壁があっても、その人なら越えられると、信じて疑わない』ところ」"
translation = "「――『어려운 벽이 있어도 그 사람이라면 넘을 수 있다고 믿어 의심치 않는』 점」"

[[dialogue]]
speaker = "unk"
original = "そう、ヴィーナスから言われると、無茶と思えることでもできる気がしてくる。"
translation = "그래, 비너스가 그렇게 말해주면 무리라고 생각되는 일도 할 수 있을 것 같은 기분이 든다."

[[dialogue]]
speaker = "unk"
original = "それはヴィーナスが俺や仲間たちのことを『本気』で信じてくれているからなのだ。"
translation = "그건 비너스가 나와 동료들을 『진심으로』 믿어주고 있기 때문이다."

[[dialogue]]
speaker = "unk"
original = "『できない』とは１パーセントも考えていない。１００パーセント相手を信じて、背中を押すことができる――それがヴィーナスの凄さなのだ。"
translation = "『할 수 없다』는 생각은 1퍼센트도 하지 않는다. 100퍼센트 상대를 믿고 등을 밀어줄 수 있는 것―― 그것이 비너스의 대단함이다."

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「パパ……！\u3000えへへっ♪\u3000そこまで深く考えたことなかったけど、私、すっごく嬉しいわ<emoji=heart04>」"
translation = "「아빠……! 에헤헤♪ 그렇게 깊게 생각해본 적 없었지만, 나 정말 기뻐<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ＤＩＳＣで録音しておいたから、これを聞き返しながら、パパが好きって言ってくれたところをもっと頑張って、いい子になるわね！」"
translation = "「DISC로 녹음해뒀으니까, 이거 다시 들으면서 아빠가 좋아한다고 말해준 부분을 더 노력해서 착한 아이가 될게!」"

[[dialogue]]
speaker = "unk"
original = "録音は聞いてないし恥ずかしいぞ！？"
translation = "녹음하고 있는 줄은 몰랐는데, 부끄럽잖아!?"

[[dialogue]]
speaker = "メルエル（幼少）"
original = "「会長くん……まさか１０個も、すんなり言えちゃうなんて！」"
translation = "「회장군…… 설마 10개나 술술 말할 수 있다니!」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「うん、すごいね！\u3000親子の、というよりは、一緒に星徒会を続けてきたからこその絆って感じかな♪」"
translation = "「응, 대단하네! 부모 자식이라기보다는 함께 성도회를 계속해왔기에 쌓인 유대감이라는 느낌일까♪」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「ありがと、パパ！\u3000お願いを聞いてくれたお礼に～」"
translation = "「고마워, 아빠! 부탁 들어준 보답으로~」"

[[dialogue]]
speaker = "unk"
original = "小さいヴィーナスは不意に、俺の頬に唇を寄せると――"
translation = "어린 비너스는 불시에 내 뺨에 입술을 갖다 대더니――"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「ちゅっ<emoji=heart04>」"
translation = "「쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "！？"
translation = "!?"

[[dialogue]]
speaker = "unk"
original = "頬にキスをされて、思わずドキッとしてしまう。"
translation = "뺨에 키스를 당해 나도 모르게 가슴이 두근거리고 만다."

[[dialogue]]
speaker = "メルエル（幼少）"
original = "「わわわっ！？」"
translation = "「와와왓!?」"

[[dialogue]]
speaker = "メルエル"
original = "「びびび、ヴィーナスちゃん！？」"
translation = "「비비비, 비너스 짱!?」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「えへへっ<emoji=heart04>\u3000体が小さくなっているから、『娘』として頬っぺたにキスくらい、してもいいわよね♪」"
translation = "「에헤헤<emoji=heart04> 몸이 작아졌으니까 『딸』로서 볼에 뽀뽀 정도는 해도 괜찮지♪」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「だ、大胆～……！」"
translation = "「대, 대담해……!」"

[[dialogue]]
speaker = "レミカ"
original = "「さすがヴィーナスだね……！」"
translation = "「역시 비너스네……!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「むむむっ。ずるいわよ、小さい私！\u3000私はパパと同級生だから、そういうのは我慢してたのに……！」"
translation = "「으으으. 치사해, 어린 나! 나는 아빠랑 동급생이라 그런 건 참고 있었는데……!」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「大丈夫！\u3000元の１人に戻ったら、大きい私もパパとキスしたことになるでしょ？」"
translation = "「괜찮아! 원래 한 명으로 돌아가면 큰 나도 아빠랑 키스한 게 되잖아?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「はっ……！\u3000なるほど、それなら問題ないわね♪」"
translation = "「핫……! 과연, 그렇다면 문제없네♪」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「問題ないんだ……」"
translation = "「문제없는 거구나……」"

[[dialogue]]
speaker = "レミカ"
original = "「問題ないかな……？」"
translation = "「문제없는 걸까……?」"

[[dialogue]]
speaker = "メルエル（幼少）"
original = "「ううん、頬っぺたでもキスは問題じゃないかな！？」"
translation = "「아니, 볼이라도 키스는 문제가 아닐까!?」"

[[dialogue]]
speaker = "unk"
original = "と、その時だった。"
translation = "그때였다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「あっ！\u3000また体が光ったわ！」"
translation = "「앗! 또 몸이 빛나!」"

[[dialogue]]
speaker = "unk"
original = "２人のヴィーナスの体が眩しく光り出し、それが収まった後に立っていたのは――小さなヴィーナスの姿だった。"
translation = "두 명의 비너스의 몸이 눈부시게 빛나기 시작하더니, 빛이 가라앉은 후에 서 있었던 것은―― 어린 비너스의 모습이었다."

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「合体して元の１人に戻ったみたい！\u3000でも……なんか小さい体のままだわ！？」"
translation = "「합체해서 원래의 한 명으로 돌아온 것 같아! 하지만…… 왠지 작은 몸 그대로야!?」"

[[dialogue]]
speaker = "unk"
original = "それから色々試すこと、小一時間。"
translation = "그 후로 이것저것 시도해본 지 한 시간 정도 지났을 무렵."

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「――う～ん、ダメね。色々試してみたけど、変身解除はできても、やっぱり元の大きな体には戻れないみたい」"
translation = "「――으음, 안 되네. 여러 가지 해봤지만 변신 해제는 돼도 역시 원래의 큰 몸으로는 돌아갈 수 없는 것 같아」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「しばらくはまだ、この小さい姿のまま過ごさないといけないみたいね！」"
translation = "「당분간은 아직 이 작은 모습 그대로 지내야 할 것 같네!」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「なんとなくだけど……大きな体に戻る為には、レミカとメルエルもそれぞれ元の１人に戻さなきゃいけない気がするわ！」"
translation = "「왠지 모르겠지만…… 큰 몸으로 돌아가기 위해서는 레미카랑 메루엘도 각각 원래의 한 명으로 되돌려야 할 것 같은 기분이 들어!」"

[[dialogue]]
speaker = "レミカ"
original = "「ヴィーナスの直感はよく当たるから、その可能性は高そうだね」"
translation = "「비너스의 직감은 잘 맞으니까 그럴 가능성이 높겠네」"

[[dialogue]]
speaker = "メルエル"
original = "「だとすると、私たちも小さな体になって望むことを、何か叶える必要があるのかな？」"
translation = "「그렇다면 우리도 작은 몸이 되어서 바라는 것을 무언가 이룰 필요가 있는 걸까?」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「私が小さな体になって望むこと……」"
translation = "「내가 작은 몸이 되어서 바라는 것……」"

[[dialogue]]
speaker = "レミカ"
original = "「だったら、やっぱりアレだよね」"
translation = "「그렇다면 역시 그거지」"

[[dialogue]]
speaker = "メルエル"
original = "「アレって……？」"
translation = "「그거라니……?」"

[[dialogue]]
speaker = "レミカ"
original = "「アイドルとして、自分の理想像を目指すために――」"
translation = "「아이돌로서 자신의 이상향을 목표로 하기 위해――」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「私は、この小さな姿で『可愛いアイドル』を試してみたい！」"
translation = "「나는 이 작은 모습으로 『귀여운 아이돌』을 시도해보고 싶어!」"

[[dialogue]]
speaker = "unk"
original = "２人のレミカは息ぴったりに、そう告げるのだった。"
translation = "두 명의 레미카는 호흡이 척척 맞게 그렇게 고했다."

