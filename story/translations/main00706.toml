[[dialogue]]
speaker = "unk"
original = "第６話,選ぶべき道,B"
translation = "제6화, 선택해야 할 길, B"

[[dialogue]]
speaker = "ニャリオン"
original = "「星見家とは魔王の血族──すなわち、英雄の末裔なのニャン！」"
translation = "「호시미 가문이란 마왕의 혈족── 즉, 영웅의 후예인 거냥!」"

[[dialogue]]
speaker = "ユウリ"
original = "「あ、アホネコ」"
translation = "「아, 바보 고양이」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そういえばいなかったわね。静かだと思ったら」"
translation = "「그러고 보니 없었네. 조용하다 했더니」"

[[dialogue]]
speaker = "ニャリオン"
original = "「失敬ニャン！\u3000久しぶりの戦闘でちょびっと消耗してただけなのニャン！」"
translation = "「실례인 거냥! 오랜만의 전투로 살짝 소모했을 뿐인 거냥!」"

[[dialogue]]
speaker = "unk"
original = "ぴょこんと現れたニャリオンが、大見得を切りつつそう言い放った。"
translation = "뿅 하고 나타난 냐리온이, 큰소리를 치며 그렇게 말해버렸다."

[[dialogue]]
speaker = "ルリエル"
original = "「英雄の末裔……でありますか。大変クールでありますね！」"
translation = "「영웅의 후예……이십니까. 매우 쿨합니다!」"

[[dialogue]]
speaker = "ニャリオン"
original = "「そうニャ！\u3000魔王とは要するに、むちゃんこ強くてニャンダフルな人物の血統を指すニャン」"
translation = "「그렇다냥! 마왕이란 요컨대, 엄청 강하고 냥더풀한 인물의 혈통을 가리키는 거냥」"

[[dialogue]]
speaker = "ニャリオン"
original = "「ニャというのに世間では魔王＝悪の図式が広まっているせいで、星見家としてもその事実を公表するわけにはいかなかったのニャン」"
translation = "「냥이라고 하는데 세상에서는 마왕=악이라는 도식이 퍼져 있는 탓에, 호시미 가문으로서도 그 사실을 공표할 수는 없었던 거냥」"

[[dialogue]]
speaker = "アナ"
original = "「描かれた本来の『魔王』から３０００年も経っていますから、末裔が多くいるのは不思議なことではありませんね」"
translation = "「그려진 본래의 『마왕』으로부터 3000년이나 지났으니, 후예가 많이 있는 것은 이상한 일이 아니네요」"

[[dialogue]]
speaker = "クロト"
original = "「魔王の系譜は三界に散り散りになっている──フィーニスの塔でも、そう聞いたな」"
translation = "「마왕의 계보는 삼계에 뿔뿔이 흩어져 있다── 피니스의 탑에서도, 그렇게 들었지」"

[[dialogue]]
speaker = "unk"
original = "３０００年前に初めてリクリエを退けたという人物──魔王。"
translation = "3000년 전에 처음으로 리크리에를 물리쳤다는 인물── 마왕."

[[dialogue]]
speaker = "unk"
original = "あの時、謎の声が挙げていた名には彼女も含まれていた。"
translation = "그때, 수수께끼의 목소리가 언급했던 이름에는 그녀도 포함되어 있었다."

[[dialogue]]
speaker = "unk"
original = "『そして……最も色濃く魔王の血を引く人物。それは今、人間界に存在します』"
translation = "『그리고…… 가장 짙게 마왕의 피를 이은 인물. 그것은 지금, 인간계에 존재합니다』"

[[dialogue]]
speaker = "unk"
original = "『流星市国の娘──星見フィオナ』"
translation = "『유성 시국의 딸── 호시미 피오나』"

[[dialogue]]
speaker = "unk"
original = "あの時、俺は──隣に立っているフィオナのことと思ったけれど。"
translation = "그때, 나는── 옆에 서 있는 피오나를 말하는 것이라고 생각했지만."

[[dialogue]]
speaker = "unk"
original = "もしかするとあの『星見フィオナ』は、正しい人物のことを指していたのかもしれない……。"
translation = "어쩌면 그 『호시미 피오나』는, 올바른 인물을 가리키고 있었을지도 모른다……."

[[dialogue]]
speaker = "サーシャ"
original = "「それじゃあやっぱり、会長くんも『魔王の血統』ってことかしら」"
translation = "「그럼 역시, 회장군도 『마왕의 혈통』이라는 걸까」"

[[dialogue]]
speaker = "セーラ"
original = "「そう考えんのが自然だよね～」"
translation = "「그렇게 생각하는 게 자연스럽지~」"

[[dialogue]]
speaker = "マトイ"
original = "「確かに……御前試合の時もすごいオーラ出しまくってたし……！」"
translation = "「확실히…… 어전 시합 때도 엄청난 오라를 마구 뿜어냈고……!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふっふーん、当然よ。クロトが真の魔王だってのは私がさんざん言ってきたでしょ」"
translation = "「훗후웅, 당연하지. 쿠로토가 진정한 마왕이라는 건 내가 실컷 말해왔잖아」"

[[dialogue]]
speaker = "クロト"
original = "「あの時の力は、まだ自在には引き出せないんだけどな」"
translation = "「그때의 힘은, 아직 자유자재로 끌어낼 수 없지만」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「この絵がその証拠よ！\u3000この魔王はクロトにそっくり似ているもの！」"
translation = "「이 그림이 그 증거야! 이 마왕은 쿠로토와 아주 똑같이 생겼는걸!」"

[[dialogue]]
speaker = "マトイ"
original = "「似てる……？\u3000そう……？」"
translation = "「닮았다고……? 그래……?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そっくりじゃない！\u3000顔とか耳の形とか！」"
translation = "「아주 똑같잖아! 얼굴이라든가 귀 모양이라든가!」"

[[dialogue]]
speaker = "ニャリオン"
original = "「なんとでも言える気がするニャンよ」"
translation = "「뭐라고든 말할 수 있을 것 같은 거냥」"

[[dialogue]]
speaker = "セーラ"
original = "「あはは。なんとなく雰囲気はわかるかも」"
translation = "「아하하. 어쩐지 분위기는 알 것 같아」"

[[dialogue]]
speaker = "クロト"
original = "（俺が……魔王の血統……か）"
translation = "（내가…… 마왕의 혈통……인가）"

[[dialogue]]
speaker = "unk"
original = "確かにこれまでの話を聞けば自然な推測ではあった。"
translation = "확실히 지금까지의 이야기를 들으면 자연스러운 추측이긴 했다."

[[dialogue]]
speaker = "unk"
original = "とはいえ、３０００年前の血が脈々と繋がっている──なんて言われても実感はあまり湧かない。"
translation = "그렇다고 해도, 3000년 전의 피가 맥맥이 이어지고 있다──고 들어도 실감은 별로 나지 않는다."

[[dialogue]]
speaker = "サーシャ"
original = "「まとめると、会長くんもフィオナちゃんも立派な素質を秘めてるってことね♪」"
translation = "「정리하자면, 회장군도 피오나짱도 훌륭한 소질을 숨기고 있다는 거네♪」"

[[dialogue]]
speaker = "アナ"
original = "「そうなりますね。ただ……前会長の言っていた『魔王』が、流星会長のお姉さんにも繋がるとは予想外でした」"
translation = "「그렇게 되겠네요. 다만…… 전 회장이 말했던 『마왕』이, 유성 회장님의 언니와도 연결된다는 것은 예상 밖이었습니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "ソフィア"
original = "「フィオナ会長……」"
translation = "「피오나 회장……」"

[[dialogue]]
speaker = "フィオナ"
original = "「……そう不安そうにしないでください、ソフィア。こうして皆さんにお話できて、少し胸がスッとしました」"
translation = "「……그렇게 불안해하지 마세요, 소피아. 이렇게 여러분께 이야기할 수 있어서, 조금 가슴이 후련해졌습니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「フィオナの名と魔王の定め。これが──私と、星見家の者だけが知っている真実です」"
translation = "「피오나의 이름과 마왕의 숙명. 이것이── 저와, 호시미 가문의 사람만이 알고 있는 진실입니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「星徒会のみんなには……ごめんなさい。今まで騙すような真似をしていて」"
translation = "「성도회 모두에게는…… 미안합니다. 지금까지 속이는 듯한 짓을 해서」"

[[dialogue]]
speaker = "ソフィア"
original = "「い……いえ！\u3000とんでもありません。やむなき事情ですし、私のフィオナ会長を思う気持ちは変わりません！」"
translation = "「아…… 아닙니다! 당치도 않습니다. 어쩔 수 없는 사정이고, 저의 피오나 회장님을 생각하는 마음은 변하지 않습니다!」"

[[dialogue]]
speaker = "ユウリ"
original = "「ま、事情はわかった方が対策も立てやすいしな」"
translation = "「뭐, 사정을 알아야 대책도 세우기 쉽지」"

[[dialogue]]
speaker = "セーラ"
original = "「うちらはいつだってフィオナちゃんの味方だかんね～♪」"
translation = "「우리는 언제나 피오나짱 편인 거 알지~♪」"

[[dialogue]]
speaker = "unk"
original = "内情がどうあれフィオナを受け入れる──というのは昨日から変わらぬ俺たちの総意だった。"
translation = "내막이 어떻든 피오나를 받아들인다──는 것은 어제부터 변함없는 우리들의 총의였다."

[[dialogue]]
speaker = "unk"
original = "だから……"
translation = "그러니까……"

[[dialogue]]
speaker = "ヴィーナス"
original = "「問題は──これからあのガキんちょとどう向き合っていくか、ね」"
translation = "「문제는── 이제부터 저 꼬맹이와 어떻게 마주할 것인가, 네」"

[[dialogue]]
speaker = "サーシャ"
original = "「そうね。姉妹の事情だなんて聞いたら、放っておけないもの♪」"
translation = "「그러게. 자매의 사정이라니 들으면, 내버려 둘 수 없지♪」"

[[dialogue]]
speaker = "アナ"
original = "「次に出会えば──再び交戦に発展するでしょう。前回よりも激しくなるかもしれません」"
translation = "「다음에 만나면── 다시 교전으로 발전하겠지요. 전보다 더 격렬해질지도 모릅니다」"

[[dialogue]]
speaker = "マトイ"
original = "「じゃ、じゃあ……」"
translation = "「자, 그럼……」"

[[dialogue]]
speaker = "unk"
original = "その時、俺たちがどう動くべきか──できれば決めるのは彼女であってほしい。"
translation = "그때, 우리들이 어떻게 움직여야 할지── 가능하다면 결정하는 것은 그녀였으면 한다."

[[dialogue]]
speaker = "クロト"
original = "「──フィオナ。フィオナは、どうしたい？」"
translation = "「──피오나. 피오나는, 어떻게 하고 싶어?」"

[[dialogue]]
speaker = "フィオナ"
original = "「え──私、ですか……？」"
translation = "「에── 저, 말인가요……?」"

[[dialogue]]
speaker = "クロト"
original = "「ああ。学園側の決定はすでに下った。もし次にアポロと相まみえたら──星騎士として、けりをつけなくちゃならない」"
translation = "「아아. 학원 측의 결정은 이미 내려졌다. 만약 다음에 아폴로와 마주친다면── 성기사로서, 결판을 내야만 해」"

[[dialogue]]
speaker = "クロト"
original = "「それも退かせるとか、捕まえるとかじゃなくて。今度こそ息の根を止める必要があるってことだ」"
translation = "「그것도 물러나게 한다거나, 붙잡는다거나 하는 게 아니라. 이번에야말로 숨통을 끊을 필요가 있다는 거야」"

[[dialogue]]
speaker = "フィオナ"
original = "「っ……！」"
translation = "「윽……!」"

[[dialogue]]
speaker = "unk"
original = "<ruby>苦渋<rt>くじゅう</rt></ruby>の思いで、俺たちの置かれている現状を告げる。"
translation = "괴로운 마음으로, 우리들이 처한 현 상황을 알린다."

[[dialogue]]
speaker = "クロト"
original = "「だけど……今の俺たちは、アポロの正体も知っている」"
translation = "「하지만…… 지금의 우리는, 아폴로의 정체도 알고 있어」"

[[dialogue]]
speaker = "クロト"
original = "「あれは決して──フィオナのお姉さんを模した偽者なんかじゃない。きっとフィオナもそれを感じているはずだ」"
translation = "「저건 결코── 피오나의 언니를 본뜬 가짜 같은 게 아니야. 분명 피오나도 그걸 느끼고 있을 거야」"

[[dialogue]]
speaker = "クロト"
original = "「だから俺たちに──フィオナの素直な気持ちを聞かせてほしい。アポロと、どう向き合うべきか」"
translation = "「그러니 우리에게── 피오나의 솔직한 마음을 들려줬으면 해. 아폴로와, 어떻게 마주해야 할지」"

[[dialogue]]
speaker = "ソフィア"
original = "「……！\u3000その通りです。私たちは学園の決定よりも、会長のご判断に従います！」"
translation = "「……! 맞습니다. 저희는 학원의 결정보다도, 회장님의 판단에 따르겠습니다!」"

[[dialogue]]
speaker = "フィオナ"
original = "「緋宮会長……ソフィア……」"
translation = "「히노미야 회장…… 소피아……」"

[[dialogue]]
speaker = "unk"
original = "確かに俺たちはセイファート学園長から命令を受けた。"
translation = "확실히 우리는 세이퍼트 학원장으로부터 명령을 받았다."

[[dialogue]]
speaker = "unk"
original = "しかしそれが、唯一の運命なんだと受け入れる必要はどこにもない。"
translation = "하지만 그것이, 유일한 운명이라고 받아들일 필요는 어디에도 없다."

[[dialogue]]
speaker = "unk"
original = "いくら世界を守れたとしても──その先でフィオナが笑えなかったら、意味なんてないのだから。"
translation = "아무리 세계를 지킬 수 있었다고 해도── 그 후에 피오나가 웃을 수 없다면, 의미 같은 건 없으니까."

[[dialogue]]
speaker = "フィオナ"
original = "「……ふふ」"
translation = "「……후후」"

[[dialogue]]
speaker = "フィオナ"
original = "「わかりました。それなら……遠慮なく、わがままを伝えさせていただきますね」"
translation = "「알겠습니다. 그렇다면…… 사양하지 않고, 제 고집을 전해드리겠습니다」"

[[dialogue]]
speaker = "クロト"
original = "「フィオナ……」"
translation = "「피오나……」"

[[dialogue]]
speaker = "unk"
original = "面を上げた彼女は晴れ晴れとしていた。"
translation = "고개를 든 그녀는 맑고 개운해 보였다."

[[dialogue]]
speaker = "unk"
original = "そして、凛とした声音で、告げる。"
translation = "그리고, 또렷한 목소리로, 고한다."

[[dialogue]]
speaker = "フィオナ"
original = "「仮面の少女アポロを抹殺します──願わくは、私自ら、この手で」"
translation = "「가면의 소녀 아폴로를 말살하겠습니다── 바라건대, 저 스스로, 이 손으로」"

[[dialogue]]
speaker = "クロト"
original = "「！？」"
translation = "「!?」"

[[dialogue]]
speaker = "ニャリオン"
original = "「ニャ！？」"
translation = "「냥!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「なっ……どうしてそうなるのよ！？」"
translation = "「뭣…… 왜 그렇게 되는 거야!?」"

[[dialogue]]
speaker = "ソフィア"
original = "「そ、そうですよ！\u3000あの子は会長のお姉さんなんですよね……！？」"
translation = "「그, 그렇습니다! 저 아이는 회장님의 언니잖아요……!?」"

[[dialogue]]
speaker = "フィオナ"
original = "「どうして……などというのは愚問です。かの存在は世界を荒らし、今も私たち星騎士の存続をも脅かそうとしている<ruby>厄災<rt>やくさい</rt></ruby>の権化」"
translation = "「왜냐니…… 같은 건 우문입니다. 그 존재는 세계를 황폐하게 만들고, 지금도 우리 성기사의 존속마저 위협하려 하는 재앙의 화신」"

[[dialogue]]
speaker = "フィオナ"
original = "「星騎士として。星徒会として。リクリエから世界を守るために、その使徒を排除しないなんてありえません」"
translation = "「성기사로서. 성도회로서. 리크리에로부터 세계를 지키기 위해, 그 사도를 배제하지 않는다는 건 있을 수 없습니다」"

[[dialogue]]
speaker = "ユウリ"
original = "「それにしたって……！\u3000もっとやり方とか、色々考える余地はあんだろ！」"
translation = "「그렇다고 해도……! 좀 더 방법이라든가, 여러 가지 생각할 여지는 있잖아!」"

[[dialogue]]
speaker = "ニャリオン"
original = "「そ、そうニャ！\u3000姉君を救うためにこいつらに協力を仰げばいいニャン！」"
translation = "「그, 그렇다냥! 언니분을 구하기 위해 이 녀석들에게 협력을 구하면 되는 거냥!」"

[[dialogue]]
speaker = "フィオナ"
original = "「いいえ。事態は既にひっ迫しています──あの『天蓋』がさらなる規模で引き起こされれば、私たちそのものが機能を失う」"
translation = "「아닙니다. 사태는 이미 절박합니다── 저 『천개』가 더욱 큰 규모로 일으켜진다면, 우리 자체가 기능을 잃습니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「仮面の少女アポロを抹殺する──星騎士として、流星学園の星徒会長として。学園の命に従うのみです」"
translation = "「가면의 소녀 아폴로를 말살한다── 성기사로서, 유성 학원의 성도 회장으로서. 학원의 명령에 따를 뿐입니다」"

[[dialogue]]
speaker = "クロト"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "unk"
original = "フィオナの下した決断。"
translation = "피오나가 내린 결단."

[[dialogue]]
speaker = "unk"
original = "それは……学園の方針となんら変わらない、現実主義的なものだった。"
translation = "그것은…… 학원의 방침과 전혀 다르지 않은, 현실주의적인 것이었다."

[[dialogue]]
speaker = "クロト"
original = "「……本当に、それでいいのか？」"
translation = "「……정말로, 그걸로 괜찮은 거야?」"

[[dialogue]]
speaker = "フィオナ"
original = "「はい。緋宮会長のお心遣いには感謝しています──ですが、この決定は変わりません」"
translation = "「네. 히노미야 회장님의 배려에는 감사하고 있습니다── 하지만, 이 결정은 변하지 않습니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「どうしてよ……！\u3000フィオナのお姉さんなんでしょ……！？」"
translation = "「왜 그러는 거야……! 피오나의 언니잖아……!?」"

[[dialogue]]
speaker = "フィオナ"
original = "「……いいえ。私にとっての姉は、今も近くで眠りについている一人だけです」"
translation = "「……아닙니다. 저에게 있어서의 언니는, 지금도 가까이에서 잠들어 있는 한 분뿐입니다」"

[[dialogue]]
speaker = "unk"
original = "フィオナは一瞬、彼女が眠っている小部屋を見やった。"
translation = "피오나는 한순간, 그녀가 잠들어 있는 작은 방을 바라보았다."

[[dialogue]]
speaker = "フィオナ"
original = "「これは……星見フィオナの妹としての矜持でもあります」"
translation = "「이것은…… 호시미 피오나의 여동생으로서의 긍지이기도 합니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「身内が起こしている不始末なれば、なおさら──この手でけりをつけなくてはなりません」"
translation = "「집안사람이 일으키고 있는 불미스러운 일이라면, 더욱이── 이 손으로 결판을 내야만 합니다」"

[[dialogue]]
speaker = "マトイ"
original = "「そんな……そんな悲しいことって……」"
translation = "「그런…… 그런 슬픈 일이……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あのガキんちょはむかつくけど……抹殺なんてありえないわ！\u3000もっとこう、正気に戻すとか、色々あるでしょ！」"
translation = "「저 꼬맹이는 짜증 나지만…… 말살이라니 말도 안 돼! 좀 더 이렇게, 제정신으로 돌아오게 한다든가, 여러 가지가 있잖아!」"

[[dialogue]]
speaker = "フィオナ"
original = "「確かに手がないとも限りません。しかし、今はそんな試行錯誤をしていられる余裕もないはずです」"
translation = "「확실히 방법이 없는 것은 아닐지도 모릅니다. 하지만, 지금은 그런 시행착오를 겪을 여유도 없을 것입니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「あの脅威を放置していて民間に被害が及ぶような事態を──教皇庁の一員として看過できません」"
translation = "「저 위협을 방치해서 민간에 피해가 미치는 사태를── 교황청의 일원으로서 간과할 수 없습니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「う……な、なんでそんなに、自分に冷たい言い方するのよ……！」"
translation = "「으…… 너, 왜 그렇게, 자신에게 차가운 말투를 쓰는 거야……!」"

[[dialogue]]
speaker = "セーラ"
original = "「はあ……フィオナちゃんも、こうなったら頑固なんだから……」"
translation = "「하아…… 피오나짱도, 이렇게 되면 고집이 세다니까……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ううう～～～～違う！\u3000そんなのダメよ、フィオナ！\u3000お姉さんを倒すだなんて間違ってる！」"
translation = "「으으으~~~~~ 아니야! 그런 건 안 돼, 피오나! 언니를 쓰러뜨리다니 잘못됐어!」"

[[dialogue]]
speaker = "フィオナ"
original = "「ヴィーナスさん……なぜあなたが、泣きそうになっているのです」"
translation = "「비너스 씨…… 왜 당신이, 울 것 같은 표정을 짓는 것입니까」"

[[dialogue]]
speaker = "フィオナ"
original = "「そもそも、彼女を救えるだなんて根拠は、どこにもないじゃないですか──」"
translation = "「애초에, 그녀를 구할 수 있다는 근거는, 어디에도 없지 않습니까──」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「根拠なんてないわよ！\u3000でもね、私がダメって言ったらダメなの！\u3000あなたが素直になれないならなおさらね！」"
translation = "「근거 같은 건 없지! 하지만 말이야, 내가 안 된다고 하면 안 되는 거야! 네가 솔직해지지 못한다면 더욱 그렇지!」"

[[dialogue]]
speaker = "フィオナ"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "クロト"
original = "「──俺もヴィーナスに同感だ。学園側の方針は理解しても、まだ手段を探る時間くらいはある」"
translation = "「──나도 비너스에게 동감이야. 학원 측의 방침은 이해해도, 아직 수단을 찾을 시간 정도는 있어」"

[[dialogue]]
speaker = "unk"
original = "フィオナの決意は──確かに星徒会長という立場を踏まえれば当然のものだったかもしれない。"
translation = "피오나의 결의는── 확실히 성도 회장이라는 입장을 감안하면 당연한 것이었을지도 모른다."

[[dialogue]]
speaker = "unk"
original = "しかしそれでも、本当の<b>エリシア</b>の気持ちは、押し殺されているように思えてならなかった。"
translation = "하지만 그럼에도, 진짜 <b>엘리시아</b>의 마음은, 억눌려 있는 것처럼 느껴져서 견딜 수 없었다."

[[dialogue]]
speaker = "セーラ"
original = "「ま、諦めんのは早いよねー。もしかしたら次に会った時は正気になってるかもしんないし？」"
translation = "「뭐, 포기하기엔 이르지~. 어쩌면 다음에 만났을 때는 제정신으로 돌아와 있을지도 모르잖아?」"

[[dialogue]]
speaker = "ニャリオン"
original = "「そ、そうニャよフィオナ嬢。何もそう極端にニャらなくてもいいニャン」"
translation = "「그, 그렇다냥 피오나 아가씨. 굳이 그렇게 극단적으로 될 필요는 없는 거냥」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「──もっと幸せな結末があるはずだわ。根拠はこれから見つけ出す！」"
translation = "「──더 행복한 결말이 있을 거야. 근거는 지금부터 찾아낼 거야!」"

[[dialogue]]
speaker = "unk"
original = "そしてヴィーナスは──例の日誌をめくった。"
translation = "그리고 비너스는── 그 일지를 펼쳤다."

[[dialogue]]
speaker = "アナ"
original = "「……前会長。その日誌は以前、アポロに一部を書き換えられてしまったはずでは……」"
translation = "「……전 회장. 그 일지는 이전에, 아폴로에게 일부가 고쳐 쓰여졌을 텐데요……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そうだけど──でも、魔王に関しては最初から真実がここにあったもの」"
translation = "「그렇긴 하지만── 하지만, 마왕에 관해서는 처음부터 진실이 여기에 있었는걸」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私の望む未来のことなら、きっと答えてくれるはずなの……！」"
translation = "「내가 바라는 미래의 일이라면, 분명 대답해 줄 거야……!」"

[[dialogue]]
speaker = "unk"
original = "一心不乱にページをめくっていくヴィーナス。"
translation = "일심불란하게 페이지를 넘기는 비너스."

[[dialogue]]
speaker = "unk"
original = "しかし、そう都合よく期待した記載があるはずもなく……"
translation = "하지만, 그렇게 운 좋게 기대한 기재가 있을 리도 없고……"

[[dialogue]]
speaker = "マトイ"
original = "「どうだった……？」"
translation = "「어땠어……?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「──今はまだ……昨日のことまでしか書かれてない。けど！」"
translation = "「──지금은 아직…… 어제의 일까지만 쓰여 있어. 하지만!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そのうち道を示してくれるわ。悪いけどみんな、それまで待っていて」"
translation = "「조만간 길을 보여줄 거야. 미안하지만 모두, 그때까지 기다려줘」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは急いで寝たきりのアポロ──の姿をした少女──のもとへ駆けていき、そっと手を握った。"
translation = "비너스는 서둘러 누워있는 아폴로──의 모습을 한 소녀──에게 달려가, 살며시 손을 잡았다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「待ってなさい、フィオナのお姉さん。私たちが必ず──あなたを助けてあげるから」"
translation = "「기다려, 피오나의 언니. 우리가 반드시── 당신을 도와줄 테니까」"

[[dialogue]]
speaker = "クロト"
original = "（ヴィーナス……）"
translation = "（비너스……）"

[[dialogue]]
speaker = "フィオナ"
original = "「ヴィーナスさん……」"
translation = "「비너스 씨……」"

[[dialogue]]
speaker = "クロト"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "そうして俺たちは解散となった。"
translation = "그렇게 우리들은 해산하게 되었다."

[[dialogue]]
speaker = "unk"
original = "今の複雑な状況を整理するのに、みんな落ち着く時間が必要だった。"
translation = "지금의 복잡한 상황을 정리하는 데, 모두 진정할 시간이 필요했다."

