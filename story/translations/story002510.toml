[[dialogue]]
speaker = "ヘレナ"
original = "「ご苦労だったな」"
translation = "「수고했다」"

[[dialogue]]
speaker = "unk"
original = "事後処理を済ませた後、俺は今日の報告をするため九浄家へと向かった。"
translation = "사후 처리를 마친 뒤, 나는 오늘 보고를 하기 위해 쿠죠 가문으로 향했다."

[[dialogue]]
speaker = "unk"
original = "部屋には、先に戻ってきていたエスメラルダ先生の姿もある。"
translation = "방에는 먼저 돌아와 있던 에스메랄다 선생님의 모습도 있다."

[[dialogue]]
speaker = "unk"
original = "本当に大変でした……"
translation = "정말 힘들었어요……"

[[dialogue]]
speaker = "エスメラルダ"
original = "「申し訳ありません。学園長には今回の件の裏に理事長が居ることを見抜かれてしまいました」"
translation = "「죄송합니다. 학원장에게 이번 건의 배후에 이사장이 있다는 사실을 간파당하고 말았습니다」"

[[dialogue]]
speaker = "ヘレナ"
original = "「それも仕方なかろう。あやつの事だ、取り立てて気にもしていないはずだ」"
translation = "「그것도 어쩔 수 없겠지. 그 녀석 성격상, 딱히 신경 쓰지도 않을 거다」"

[[dialogue]]
speaker = "ヘレナ"
original = "「それにあやつを１日、ひと所に留め、結果十分な情報を入手することが出来たのだ。作戦は大成功である」"
translation = "「게다가 그 녀석을 하루 동안 한곳에 묶어두고, 결과적으로 충분한 정보를 입수할 수 있었다. 작전은 대성공이다」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「あの……ずっと気になっていたことがあるのですが……」"
translation = "「저…… 줄곧 신경 쓰이던 것이 있습니다만……」"

[[dialogue]]
speaker = "ヘレナ"
original = "「うむ、何か？」"
translation = "「음, 뭔가?」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「人工戦闘服と学園長の星力のデータは集められました」"
translation = "「인공 전투복과 학원장의 성력 데이터는 수집되었습니다」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「ですが、学園長の放浪癖を矯正するという計画はどうなったのでしょう？」"
translation = "「하지만, 학원장의 방랑벽을 교정한다는 계획은 어떻게 된 걸까요?」"

[[dialogue]]
speaker = "unk"
original = "それは俺も気になっていた事だった。"
translation = "그것은 나도 궁금하던 부분이었다."

[[dialogue]]
speaker = "unk"
original = "今日１日の出来事を振り返っても、それに当たるようなことは無かったように思える。"
translation = "오늘 하루 동안의 일을 되돌아봐도, 그에 해당할 만한 일은 없었던 것 같다."

[[dialogue]]
speaker = "unk"
original = "そして遊園地を出ると、いつのまにか何も言わずに姿を消してしまっていた。"
translation = "그리고 유원지를 나오자, 어느샌가 아무 말 없이 모습을 감추고 말았다."

[[dialogue]]
speaker = "unk"
original = "つまり、学園長の放浪癖は全く改善されていない。"
translation = "즉, 학원장의 방랑벽은 전혀 개선되지 않았다."

[[dialogue]]
speaker = "ヘレナ"
original = "「そのことか……」"
translation = "「그거 말인가……」"

[[dialogue]]
speaker = "ヘレナ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "ヘレナ"
original = "「そんな策など初めから無い！」"
translation = "「그런 대책 따위 처음부터 없다!」"

[[dialogue]]
speaker = "unk"
original = "えええええええええええ！！！！？？"
translation = "에에에에에에에에에에!!!!??"

[[dialogue]]
speaker = "ヘレナ"
original = "「考えてもみよ……あやつは根っからの自由人。矯正しようなどと考えるだけ無駄なのだ」"
translation = "「생각해 보아라…… 그 녀석은 뼛속까지 자유인. 교정하려고 생각하는 것 자체가 헛수고다」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「ではどうしてこんな事を……」"
translation = "「그럼 왜 이런 일을……」"

[[dialogue]]
speaker = "ヘレナ"
original = "「一番の目的は水着フォームの性能を確かめるためだ」"
translation = "「가장 큰 목적은 수영복 폼의 성능을 확인하기 위해서다」"

[[dialogue]]
speaker = "ヘレナ"
original = "「人工戦闘服を着ることで、あやつの特異な性質に何か影響を及ぼすのか──」"
translation = "「인공 전투복을 입는 것으로, 그 녀석의 특이한 성질에 무언가 영향을 미치는지──」"

[[dialogue]]
speaker = "ヘレナ"
original = "「その情報を得ることができれば成果は十分だろう」"
translation = "「그 정보를 얻을 수 있다면 성과는 충분하겠지」"

[[dialogue]]
speaker = "unk"
original = "そんなに特殊なんですか？"
translation = "그렇게 특수한가요?"

[[dialogue]]
speaker = "unk"
original = "学園長の性質って"
translation = "학원장님의 성질이라는 게"

[[dialogue]]
speaker = "エスメラルダ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「特殊よ……異常、と言ってもいいわ」"
translation = "「특수해요…… 이상하다고 해도 좋을 정도죠」"

[[dialogue]]
speaker = "unk"
original = "そんなに！？"
translation = "그 정도로!?"

[[dialogue]]
speaker = "エスメラルダ"
original = "「いい機会だから説明するわね」"
translation = "「좋은 기회니까 설명해 줄게」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「通常、星騎士というのは全盛期にあたる１０代後半を過ぎると、その星力は徐々に衰えていくの」"
translation = "「통상적으로 성기사는 전성기인 10대 후반을 지나면, 그 성력은 서서히 쇠퇴해 가」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「私だってそう、ヘレナ理事長だってそう。個人差はあるものの、加齢と共に確実にその力は落ちていく」"
translation = "「나도 그렇고, 헬레나 이사장님도 그래. 개인차는 있지만, 나이를 먹음에 따라 확실히 그 힘은 떨어지지」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「ところが唯一、それに当てはまらない人物がいるわ。それがラティエ学園長よ」"
translation = "「그런데 유일하게, 거기에 해당하지 않는 인물이 있어. 바로 라티에 학원장이야」"

[[dialogue]]
speaker = "unk"
original = "トワ先生はどうなんですか？"
translation = "토와 선생님은 어떤가요?"

[[dialogue]]
speaker = "unk"
original = "唯一、って……"
translation = "유일하게라니……"

[[dialogue]]
speaker = "エスメラルダ"
original = "「そうね。トワ先生も唯一無二の性質をもつ特別な存在と言えるわ」"
translation = "「그렇네. 토와 선생님도 유일무이한 성질을 가진 특별한 존재라고 할 수 있어」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「彼女の場合、その原因は回復に特化した『特異体質』に依るものだということが分かっているのだけど……」"
translation = "「그녀의 경우, 그 원인은 회복에 특화된 『특이체질』 때문이라는 사실이 밝혀져 있지만……」"

[[dialogue]]
speaker = "unk"
original = "本人の意思とは関係なく、常時発動しているトワ先生の『自動回復』。"
translation = "본인의 의사와는 관계없이, 상시 발동하고 있는 토와 선생님의 『자동 회복』."

[[dialogue]]
speaker = "unk"
original = "その影響でトワ先生は現在も、星力総量的に全く衰えがないという話だった。"
translation = "그 영향으로 토와 선생님은 현재도 성력 총량 면에서 전혀 쇠퇴가 없다는 이야기였다."

[[dialogue]]
speaker = "エスメラルダ"
original = "「けれど、学園長は違うの」"
translation = "「하지만, 학원장은 달라」"

[[dialogue]]
speaker = "unk"
original = "どう違うんですか？"
translation = "어떻게 다른가요?"

[[dialogue]]
speaker = "エスメラルダ"
original = "「<b>何も理由が無いの</b>」"
translation = "「<b>아무런</b> <b>이유가</b> <b>없어</b>」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「……現象には何らかの原因がある」"
translation = "「……현상에는 반드시 원인이 있지」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「特異な現象には必ず何らかの原因があり、それは大なり小なり痕跡が存在するはず」"
translation = "「특이한 현상에는 반드시 어떠한 원인이 있고, 그것은 크든 작든 흔적이 존재하기 마련이야」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「けれど……学園長には、<b>それが全くない</b>」"
translation = "「하지만…… 학원장에게는, <b>그것이</b> <b>전혀</b> <b>없어</b>」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「加齢による影響を受けないこと以外、学園長はごく平均的な能力を持った星騎士なのよ」"
translation = "「노화에 따른 영향을 받지 않는 것 외에, 학원장은 지극히 평균적인 능력을 갖춘 성기사야」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「<b>ありえないことが</b>、<b>ただ存在する</b>。それがどれだけ異常なことか分かってもらえるかしら？」"
translation = "「<b>있을</b> <b>수</b> <b>없는</b> <b>일이</b>, <b>그저</b> <b>존재한다</b>. 그것이 얼마나 이상한 일인지 이해할 수 있겠니?」"

[[dialogue]]
speaker = "unk"
original = "現象の原因を究明するための手がかり。"
translation = "현상의 원인을 규명하기 위한 실마리."

[[dialogue]]
speaker = "unk"
original = "それが全く存在しないとなると、謎の解き明かしようがない。"
translation = "그것이 전혀 존재하지 않는다면, 수수께끼를 풀 방법이 없다."

[[dialogue]]
speaker = "ヘレナ"
original = "「旅の成果として、加齢と星力に関するメカニズムを持ち帰ることもある。それはそれで貴重な情報だ」"
translation = "「여행의 성과로서, 노화와 성력에 관한 메커니즘을 가져오는 일도 있다. 그것은 그것대로 귀중한 정보지」"

[[dialogue]]
speaker = "ヘレナ"
original = "「だが、あやつ自身の抱える『特異な性質』については、依然として謎に包まれたままなのだ」"
translation = "「하지만, 그 녀석 자신이 품은 『특이한 성질』에 대해서는, 여전히 수수께끼에 싸인 채인 것이다」"

[[dialogue]]
speaker = "ヘレナ"
original = "「もしこの謎が解ける日が来るとしたら──星騎士たちにとっても、大きな意味を持つことになるのかもしれぬな」"
translation = "「만약 이 수수께끼가 풀리는 날이 온다면── 성기사들에게 있어서도 큰 의미를 갖게 될지도 모르겠군」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「そのためにも、学園長にはもっと研究に協力していただかないと！」"
translation = "「그걸 위해서라도, 학원장님은 좀 더 연구에 협력해 주셔야 해요!」"

[[dialogue]]
speaker = "unk"
original = "ほどほどにしておいてあげてください"
translation = "적당히 좀 해주세요"

[[dialogue]]
speaker = "unk"
original = "先生の研究の重要性はわかりましたけど"
translation = "선생님 연구의 중요성은 알겠지만요"

[[dialogue]]
speaker = "ヘレナ"
original = "「ん、なんだ？\u3000随分とラティエの肩を持つではないか。もしや、貴殿もあやつに篭絡されたか？」"
translation = "「음, 뭐냐? 상당히 라티에의 편을 드는구나. 혹시 귀공도 그 녀석에게 농락당한 건가?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「困ったやつではあるが、そういった魅力は備えているからな……」"
translation = "「곤란한 녀석이긴 하지만, 그런 매력은 갖추고 있으니까 말이다……」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「サランさんは学園長の話をとても楽しんで聞いてましたし……」"
translation = "「사란 씨는 학원장님의 이야기를 아주 즐겁게 듣고 있었고요……」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「最初は学園長と距離を取っていたエルデリーゼさんも、『一緒に旅についていきたい』なんて言い出したほどですから」"
translation = "「처음에는 학원장님과 거리를 두던 엘데리제 씨도, 『함께 여행을 따라가고 싶다』고 말할 정도였으니까요」"

[[dialogue]]
speaker = "ヘレナ"
original = "「そういうカリスマを持っているから、新星、流星の学園長兼任という特例を認めたのだが……」"
translation = "「그런 카리스마를 가지고 있기에, 신성, 유성 학원장 겸임이라는 특례를 인정한 것이지만……」"

[[dialogue]]
speaker = "ヘレナ"
original = "「これはあくまで緊急措置、いつまでもこのままにはしておけぬ。早く新たな学園長を捕まえなければな」"
translation = "「이건 어디까지나 긴급 조치, 언제까지나 이대로 둘 수는 없다. 빨리 새로운 학원장을 붙잡아야겠군」"

[[dialogue]]
speaker = "unk"
original = "確かに今後、新たに危険に見舞われた時、ラティエ学園長１人で新星、流星の全星騎士の指揮を執るのは大変だろう。"
translation = "확실히 향후 새로이 위험이 닥쳤을 때, 라티에 학원장 혼자서 신성, 유성의 모든 성기사를 지휘하는 것은 힘들 것이다."

[[dialogue]]
speaker = "ヘレナ"
original = "「なに、そんな深刻な顔をするな。目星は既に付けている。私も太鼓判を押す優秀な人材だから楽しみに待っているがよい」"
translation = "「나 원, 그렇게 심각한 표정 짓지 마라. 눈독은 이미 들여놨다. 나도 보증하는 우수한 인재니까 즐겁게 기다리도록 해라」"

[[dialogue]]
speaker = "ヘレナ"
original = "「場合によっては新たな学園長の出現で、ラティエも少しはまともになるかもしれんな、はっはっは！」"
translation = "「경우에 따라서는 새로운 학원장의 출현으로 라티에도 조금은 성실해질지도 모르겠군, 핫핫하!」"

[[dialogue]]
speaker = "unk"
original = "どんな人を新しい学園長にと考えているのか想像もつかないが、ヘレナちゃんが認めた人ならば間違いないだろう。"
translation = "어떤 사람을 새로운 학원장으로 생각하고 있는지 상상조차 되지 않지만, 헬레나짱이 인정한 사람이라면 틀림없을 것이다."

[[dialogue]]
speaker = "unk"
original = "しかし、ひとつだけ俺は確信を持って言えることがある。"
translation = "하지만, 한 가지 내가 확신을 가지고 말할 수 있는 것이 있다."

[[dialogue]]
speaker = "unk"
original = "それは──ラティエ学園長のあの良くも悪くも自由なスタンスが、誰かの影響を受けて変わることはないだろう、という事だった。"
translation = "그것은── 라티에 학원장의 그 좋든 싫든 자유로운 스탠스가, 누군가의 영향을 받아 변하는 일은 없을 것이라는 점이었다."

