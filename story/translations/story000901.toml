[[dialogue]]
speaker = "ユーリス"
original = "「それじゃあ行くよ？」"
translation = "「그럼 간다?」"

[[dialogue]]
speaker = "ユーリス"
original = "「勇者スキル──『早着替え』！！」"
translation = "「용사 스킬── 『옷 갈아입히기』!!」"

[[dialogue]]
speaker = "ユーリス"
original = "「どうかな？\u3000この格好ならカジノで働いていても不自然には見えないよね？」"
translation = "「어때? 이 모습이라면 카지노에서 일하고 있어도 부자연스럽게 보이지 않겠지?」"

[[dialogue]]
speaker = "unk"
original = "一瞬でカジノのディーラーに……！"
translation = "순식간에 카지노 딜러로……!"

[[dialogue]]
speaker = "ユーリス"
original = "「スキルにまで昇華された『早着替え』は単なる着替えを超え、戦闘服すら変化させる。どう、似合ってるかな？」"
translation = "「스킬로까지 승화된 『옷 갈아입히기』는 단순한 환복을 넘어 전투복조차 변화시키지. 어때, 어울려?」"

[[dialogue]]
speaker = "unk"
original = "すごく似合ってる"
translation = "정말 잘 어울려"

[[dialogue]]
speaker = "ユーリス"
original = "「ありがとう。会長もディーラーの服装、様になってるよ」"
translation = "「고마워. 회장님도 딜러 복장이 제법 잘 어울리는걸.」"

[[dialogue]]
speaker = "ユーリス"
original = "「ところで、念を押させてもらうけど……私が女だって知ってるのは会長だけだから。私のことは終始男扱いしてもらえると助かるよ」"
translation = "「그건 그렇고, 다시 한번 강조하겠는데…… 내가 여자라는 걸 아는 건 회장님뿐이니까. 끝까지 나를 남자처럼 대해주면 고맙겠어.」"

[[dialogue]]
speaker = "unk"
original = "わかってる"
translation = "알고 있어"

[[dialogue]]
speaker = "ユーリス"
original = "「ありがとう。色々と迷惑をかけてしまうかもしれないけどよろしくね？」"
translation = "「고마워. 여러모로 폐를 끼칠지도 모르겠지만 잘 부탁해?」"

[[dialogue]]
speaker = "unk"
original = "どうしてこんなことをしているのか。"
translation = "어째서 이런 일을 하고 있는가."

[[dialogue]]
speaker = "unk"
original = "その経緯は少し時を遡る──"
translation = "그 경위는 조금 시간을 거슬러 올라간다──"

[[dialogue]]
speaker = "ユウリ"
original = "「あたしたちに九浄家の経営するカジノの警備を？」"
translation = "「우리더러 쿠죠 가문에서 경영하는 카지노의 경비를 맡으라고?」"

[[dialogue]]
speaker = "ユーリス"
original = "「私はともかく、他の面々が星徒会役員ということは、ただごとではなさそうですね」"
translation = "「저는 그렇다 치고, 다른 면면들이 성도회 임원이라는 건 보통 일이 아닌 것 같군요.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「うむ。先日ちょっとしたモンスター騒ぎがあってな。念のため、カジノの警備とモンスターの調査を依頼したい」"
translation = "「음. 요전번에 작은 몬스터 소동이 있어서 말이지. 만약을 위해 카지노의 경비와 몬스터 조사를 의뢰하고 싶다.」"

[[dialogue]]
speaker = "セーラ"
original = "「調査ってことは、普通のモンスターじゃないんですよね？」"
translation = "「조사라는 건 평범한 몬스터가 아니라는 거죠?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「無論。さすが流星の副会長、察しがいいな」"
translation = "「물론이지. 역시 유성의 부회장, 눈치가 빠르구나.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「いかに五名門の九浄家とはいえ星騎士を、しかも両学園の最高戦力たる星徒会を、私的に運営している施設の警備につけるわけにはいかない」"
translation = "「아무리 오명문의 쿠죠 가문이라 해도 성기사를, 하물며 두 학원의 최고 전력인 성도회를 사적으로 운영하는 시설의 경비에 세울 수는 없다.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「だが事件に特殊性があれば話は別だ」"
translation = "「하지만 사건에 특수성이 있다면 이야기는 다르지.」"

[[dialogue]]
speaker = "ユウリ"
original = "「それほど強力なモンスターってことっすか？」"
translation = "「그 정도로 강력한 몬스터라는 거임?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「いいや？\u3000この前は私が瞬殺したから大した脅威ではなかった。だが不可解な点があってな……目撃者の話ではどこからともなく急に出現したというのだ」"
translation = "「아니? 저번엔 내가 순식간에 죽여버려서 큰 위협은 아니었다. 하지만 불가해한 점이 있어서 말이야…… 목격자의 말로는 어디선가 갑자기 나타났다는군.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「周囲でアステラが発生したわけでもなく、外から侵入した形跡もなかった。さすがに不気味だろう？」"
translation = "「주변에서 아스텔라가 발생한 것도 아니고, 밖에서 침입한 흔적도 없었지. 확실히 기분 나쁘지 않나?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「今のところ被害は小さいが、軽く見るべきではない。そう判断したのだ」"
translation = "「지금까지는 피해가 미미하지만, 가볍게 볼 일은 아니다. 그렇게 판단했다.」"

[[dialogue]]
speaker = "セーラ"
original = "「なるほど、それで調査をってことですね。それならＯＫですよ♪」"
translation = "「과연, 그래서 조사를 해달라는 거군요. 그렇다면 OK예요♪」"

[[dialogue]]
speaker = "ヘレナ"
original = "「うむ、助かる。カジノで働きながら、それとなく店内に気を配ってもらいたい」"
translation = "「음, 고맙군. 카지노에서 일하면서 자연스럽게 가게 안을 신경 써줬으면 한다.」"

[[dialogue]]
speaker = "ユウリ"
original = "「働きながら？\u3000警備の依頼ですよね？」"
translation = "「일하면서요? 경비 의뢰잖아요?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「モンスターの調査のためにも、貴殿らにはカジノにできるだけ溶け込んでもらいたいのだ。もちろんカジノで働いてもらった分の報酬も支払うつもりだ。ほれ」"
translation = "「몬스터 조사를 위해서라도 귀공들이 카지노에 최대한 녹아들었으면 해서 말이다. 물론 카지노에서 일한 만큼 보수도 지급할 생각이다. 여기.」"

[[dialogue]]
speaker = "ユウリ"
original = "「ちょっ、なんすかこの額……！\u3000バイトでもらっていい金額じゃねーっ……！？」"
translation = "「잠깐, 뭐야 이 금액은……! 알바로 받아도 되는 금액이 아니잖어……!?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「む、そうか？\u3000確かに相場よりも色を付けたつもりではあるが」"
translation = "「음, 그런가? 확실히 시세보다 더 얹어줄 생각이긴 했다만.」"

[[dialogue]]
speaker = "ユウリ"
original = "「やべーバイトにしか見えないっすよ……。でも、ここんとこ金欠続きだしな……」"
translation = "「위험한 알바로밖에 안 보인다구……. 하지만 요즘 금전난이 계속되고 있으니까……」"

[[dialogue]]
speaker = "セーラ"
original = "「ユウリちゃん、この前寮の子に奢ってたもんね～？」"
translation = "「유우리짱, 저번에 기숙사 애들한테 한턱냈었지~?」"

[[dialogue]]
speaker = "ユウリ"
original = "「えっ、何で知ってるんすか？\u3000魔界の出で小遣いなくて、腹減ったって言うから牛丼奢ってやったんすけど」"
translation = "「엣, 어떻게 알았음? 마계 출신이라 용돈 없어서 배고프다길래 규동 사줬을 뿐인데.」"

[[dialogue]]
speaker = "セーラ"
original = "「さっすが～♪\u3000その子がめっちゃありがたかったって、興奮気味に話してたよ」"
translation = "「역시나~♪ 그 애가 정말 고마웠다고 흥분해서 얘기하더라구.」"

[[dialogue]]
speaker = "ユウリ"
original = "「それはそれでハズいな……。別に世話を焼いてるつもりもねーし……」"
translation = "「그건 그것대로 부끄럽네……. 딱히 챙겨줄 생각이었던 것도 아니고……」"

[[dialogue]]
speaker = "ユーリス"
original = "「しかしバイト代としては本当に破格ですね……。私も少々金銭面で困っているのでありがたいですが……」"
translation = "「하지만 알바비로서는 정말 파격적이네요……. 저도 조금 금전적으로 곤란하던 참이라 감사하긴 합니다만……」"

[[dialogue]]
speaker = "ユウリ"
original = "「じゃあ変身してカジノで働きゃいいんですか？\u3000なんか場違いですけど」"
translation = "「그럼 변신해서 카지노에서 일하면 되는 거임? 왠지 어울리지 않지만.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「そこが問題だ。今までであればクリスマスや正月の晴れ着のように、その場に合った戦闘服も用意するところだが……何分急でな」"
translation = "「거기가 문제다. 지금까지라면 크리스마스나 정월의 나들이옷처럼 그 자리에 맞는 전투복도 준비했겠지만…… 워낙 급해서 말이야.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「しかし星騎士が戦闘服で見回りをしていては客の勝負っ気が削がれてしまうだろう？\u3000せっかくの興奮に水を差すのは避けたい」"
translation = "「하지만 성기사가 전투복을 입고 순찰을 돌면 손님들의 승부욕이 꺾여버리겠지? 모처럼의 흥분된 분위기에 찬물을 끼얹는 건 피하고 싶다.」"

[[dialogue]]
speaker = "ユーリス"
original = "「そういうことであれば私にお任せください。私の勇者スキル『早着替え』を使って皆さんの戦闘服をカジノ用に最適化しましょう」"
translation = "「그런 것이라면 저에게 맡겨주십시오. 저의 용사 스킬 『옷 갈아입히기』를 사용해 여러분의 전투복을 카지노용으로 최적화하죠.」"

[[dialogue]]
speaker = "セーラ"
original = "「えっ、王子、そんなことできるの？」"
translation = "「엣, 왕자님, 그런 것도 할 수 있어?」"

[[dialogue]]
speaker = "ユーリス"
original = "「ええ。この聖剣には代々の担い手の技──つまり優れた星騎士の技が記録されていますから」"
translation = "「네. 이 성검에는 대대로 계승자들의 기술── 즉 뛰어난 성기사의 기술이 기록되어 있으니까요.」"

[[dialogue]]
speaker = "ユーリス"
original = "「──うん、会長も無事に戦闘服を最適化できているね。どこからどう見てもカジノのディーラーだ」"
translation = "「──응, 회장님도 무사히 전투복이 최적화되었네. 어디로 보나 카지노 딜러야.」"

[[dialogue]]
speaker = "unk"
original = "なんだか楽しみになってきた"
translation = "왠지 기대되기 시작했어"

[[dialogue]]
speaker = "ユーリス"
original = "「ふふ、そうだね。実を言うと私も少しワクワクしてるんだ。あまりこういう仕事に携わったことがないからね」"
translation = "「후후, 그렇네. 실은 나도 조금 설레고 있어. 이런 일을 해본 적이 별로 없으니까.」"

[[dialogue]]
speaker = "ユーリス"
original = "「中々使う機会に恵まれていなかった勇者スキルも披露できそうだ。この『早着替え』も久しぶりに使わせてもらったよ」"
translation = "「좀처럼 사용할 기회가 없었던 용사 스킬도 선보일 수 있겠어. 이 『옷 갈아입히기』도 오랜만에 써봤네.」"

[[dialogue]]
speaker = "ユウリ"
original = "「んじゃ、あたしらの番か。……ほんとに着替えてるところ見えねえんだろうな？」"
translation = "「그럼 우리 차례인가. ……정말로 갈아입는 장면은 안 보이는 거겠지?」"

[[dialogue]]
speaker = "ユーリス"
original = "「はい。『早着替え』といっても、スキルですからね。実際に着替えてもらうわけではありませんよ」"
translation = "「네. 『옷 갈아입히기』라고 해도 스킬이니까요. 실제로 옷을 벗고 갈아입는 건 아니랍니다.」"

[[dialogue]]
speaker = "セーラ"
original = "「王子の聖剣すっご～い！\u3000何でもできちゃうんだ、一家に一台ほし～」"
translation = "「왕자님 성검 대따 대단해! 뭐든지 다 되네, 집에 한 대 두고 싶어~」"

[[dialogue]]
speaker = "unk"
original = "（念のため着替えの瞬間は見ないようにしよう）"
translation = "(만약을 위해 갈아입는 순간은 보지 않도록 하자)"

[[dialogue]]
speaker = "ユーリス"
original = "「それでは──勇者スキル『早着替え』！」"
translation = "「그럼── 용사 스킬 『옷 갈아입히기』!」"

[[dialogue]]
speaker = "ユウリ"
original = "「へぇ、これが早着替え……──っておいコラ王子！！」"
translation = "「헤에, 이게 옷 갈아입히기…… ──는 야 이봐 왕자!!」"

[[dialogue]]
speaker = "ユーリス"
original = "「きゃっ！？」"
translation = "「꺄악!?」"

[[dialogue]]
speaker = "ユウリ"
original = "「こりゃいったいどういう了見だ！？\u3000ふざけてんのか！？」"
translation = "「이건 대체 무슨 생각임!? 장난하는 거임!?」"

[[dialogue]]
speaker = "セーラ"
original = "「ユウリちゃん落ち着きなーって。超似合ってるじゃーん」"
translation = "「유우리짱 진정하라니까. 엄청 잘 어울리잖아~」"

[[dialogue]]
speaker = "ユウリ"
original = "「お、落ち着けるわけないじゃないっすかっ……！！\u3000このムッツリエロ王子っ、あたしになんてもの着させてんだっ……！！」"
translation = "「지, 진정하게 생겼음?! 이 음큼한 에로 왕자님아, 나한테 대체 뭘 입힌 거임……!!」"

[[dialogue]]
speaker = "ユーリス"
original = "「え、えっと、これは私としても……」"
translation = "「그, 그게, 이건 저로서도……」"

[[dialogue]]
speaker = "ユウリ"
original = "「あぁ！？\u3000気に入るわけねえだろ！！\u3000どうしてあたしとセーラさんの衣装が──」"
translation = "「아아!? 맘에 들 리가 없잖아!! 어째서 나랑 세라 씨 의상이──」"

[[dialogue]]
speaker = "ユウリ"
original = "「バニーなんだよ！！？」"
translation = "「바니걸인 거냐고!!?」"

