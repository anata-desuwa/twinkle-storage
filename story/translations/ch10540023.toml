[[dialogue]]
speaker = "unk"
original = "第３話,カジノに舞い降りた王子様,P"
translation = "제3화, 카지노에 내려온 왕자님, P"

[[dialogue]]
speaker = "ユーリス"
original = "「まさかまた会長と一緒にカジノのアルバイトをすることができるなんてね。すごく嬉しいよ」"
translation = "「설마 또 회장과 함께 카지노 아르바이트를 할 수 있게 될 줄이야. 정말 기뻐.」"

[[dialogue]]
speaker = "ユーリス"
original = "「ヘレナさんも褒めてたよ？\u3000会長のカード捌きが見違えるほど上手になっていたって。今日はテーブル１つ丸々任せられたんだってね？」"
translation = "「헬레나 씨도 칭찬했어? 회장의 카드 솜씨가 몰라보게 능숙해졌다고. 오늘은 테이블 하나를 통째로 맡았다면서?」"

[[dialogue]]
speaker = "unk"
original = "ユーリスが特訓に付き合ってくれたおかげさ"
translation = "유리스가 특훈을 도와준 덕분이야"

[[dialogue]]
speaker = "ユーリス"
original = "「会長の筋が良かったからだよ。私が教えなくてもすぐに上達していたさ」"
translation = "「회장의 소질이 좋았기 때문이야. 내가 가르쳐주지 않았어도 금방 능숙해졌을 거야.」"

[[dialogue]]
speaker = "ユーリス"
original = "「でも……なんだかヤキモチ焼いちゃうな。これから会長がたくさんの女性を相手に華麗なカード捌きを披露すると思うと」"
translation = "「하지만…… 왠지 질투 나네. 이제부터 회장이 수많은 여성을 상대로 화려한 카드 솜씨를 선보일 거라고 생각하니.」"

[[dialogue]]
speaker = "ユーリス"
original = "「きっと黄色い声援で店が溢れちゃうだろうね。モテてモテて仕方なくなっちゃうと思う……」"
translation = "「분명 환호성으로 가게가 가득 차겠지. 인기가 너무 많아서 감당이 안 될 것 같아……」"

[[dialogue]]
speaker = "ユーリス"
original = "「って、あはは。ダメだね、こんなヤキモチ焼きじゃ。会長と一緒にいるとついつい女の子に戻ってしまうよ」"
translation = "「라니, 아하하. 안 되겠네, 이런 질투쟁이라니. 회장과 함께 있으면 나도 모르게 여자애로 돌아가 버려.」"

[[dialogue]]
speaker = "ユーリス"
original = "「よし、切り替えて仕事仕事。あ……でも私がつくテーブルは会長よりも前にしておいてくれないかな？\u3000女の子に囲まれる会長を見てしまったら集中できそうになくて」"
translation = "「좋아, 마음 다잡고 일하자 일. 아…… 하지만 내가 맡는 테이블은 회장보다 앞쪽으로 배치해 주지 않을래? 여자애들에게 둘러싸인 회장을 봐 버리면 집중하지 못할 것 같거든.」"

[[dialogue]]
speaker = "ユーリス"
original = "「ありがとう。それじゃお互いに頑張ろっか。バイトが終わったら、また２人で何か美味しいものでも食べに行こう」"
translation = "「고마워. 그럼 서로 힘내자. 알바 끝나면 다시 둘이서 뭔가 맛있는 거라도 먹으러 가자.」"

[[dialogue]]
speaker = "ユーリス"
original = "「ふぅ、お疲れ様。まさかこんなに忙しいとは思わなかったね。以前の数倍はテーブルにお客さんが来てたよ」"
translation = "「후우, 수고했어. 설마 이렇게 바쁠 줄은 몰랐네. 이전보다 몇 배는 더 테이블에 손님이 오더라고.」"

[[dialogue]]
speaker = "ユーリス"
original = "「でも今日のお客さんたちは実に楽しそうだったね。私がカードを配るだけで大歓声をあげて」"
translation = "「하지만 오늘 손님들은 정말 즐거워 보였어. 내가 카드를 돌리는 것만으로도 엄청난 환성을 지르고.」"

[[dialogue]]
speaker = "ユーリス"
original = "「そんなに名勝負が多かったのかな──って会長？\u3000何をむくれているんだい？」"
translation = "「그렇게 명승부가 많았던 걸까── 어라, 회장? 왜 부루퉁해 있는 거야?」"

[[dialogue]]
speaker = "unk"
original = "大層モテモテだったご様子で"
translation = "대단히 인기가 많으셨던 모양이네"

[[dialogue]]
speaker = "ユーリス"
original = "「え……そうかな？\u3000確かに繁盛していたとは思うけど。会長のテーブルもそうだったんじゃないの？」"
translation = "「에…… 그럴까? 확실히 번창하긴 했다고 생각하지만. 회장의 테이블도 그렇지 않았어?」"

[[dialogue]]
speaker = "ユーリス"
original = "「へ、私のテーブルだけ？\u3000言われてみれば妙に女性客が多かったような……。普通に進行していただけのつもりだけど」"
translation = "「헤, 내 테이블만? 듣고 보니 묘하게 여성 손님이 많았던 것 같기도……. 난 그냥 평범하게 진행했을 뿐인데.」"

[[dialogue]]
speaker = "ユーリス"
original = "「ヘレナさんが言ってたことも本当だったのかな。元々は私目当ての女性客が多いからバイトに入って欲しいって話だったんだよ」"
translation = "「헬레나 씨가 했던 말도 사실이었나 보네. 원래는 나를 보러 오는 여성 손님이 많으니까 알바에 들어와 줬으면 한다는 이야기였거든.」"

[[dialogue]]
speaker = "ユーリス"
original = "「でもそれだけ男に見えてるのなら良かった。最近、女の自分が顔を出し過ぎている気がしてたからね」"
translation = "「하지만 그만큼 남자로 보이고 있다면 다행이야. 최근에 여자로서의 내가 너무 겉으로 드러나는 기분이 들었으니까.」"

[[dialogue]]
speaker = "ユーリス"
original = "「それに、ふふ。私のことで妬いてくれる会長の姿も見られたし」"
translation = "「게다가, 후후. 나 때문에 질투해 주는 회장의 모습도 볼 수 있었고.」"

[[dialogue]]
speaker = "unk"
original = "一体どんな風に接客してたんだ？"
translation = "도대체 어떤 식으로 접객을 한 거야?"

[[dialogue]]
speaker = "ユーリス"
original = "「何も変わったことはしていないよ？\u3000普通に進行していただけだってば」"
translation = "「아무것도 특별한 건 하지 않았어. 그냥 평범하게 진행했을 뿐이라니까.」"

[[dialogue]]
speaker = "ユーリス"
original = "「もちろんお客さんが緊張していたら始める前にフォローを入れたりはするけれど。ゲームを楽しんでもらいたいからね」"
translation = "「물론 손님이 긴장하고 있으면 시작하기 전에 말을 걸어주거나 하긴 하지만. 게임을 즐겨주길 바라니까 말이야.」"

[[dialogue]]
speaker = "ユーリス"
original = "「試しにやってみようか？\u3000会長、テーブルに着いてくれる？」"
translation = "「시험 삼아 해볼까? 회장, 테이블에 앉아볼래?」"

[[dialogue]]
speaker = "ユーリス"
original = "「ハロー。ふふ、カジノは初めて？\u3000ちょっぴり顔が強ばっていたものだから。あまり緊張しないで楽しんでもらえると嬉しいよ」"
translation = "「헬로. 후후, 카지노는 처음이야? 약간 얼굴이 굳어 있길래. 너무 긴장하지 말고 즐겨주면 기쁘겠어.」"

[[dialogue]]
speaker = "ユーリス"
original = "「あはは、それでも震えがとまらないみたいだね。なら私が魔法をかけてあげよう」"
translation = "「아하하, 그런데도 떨림이 멈추지 않는 모양이네. 그럼 내가 마법을 걸어줄게.」"

[[dialogue]]
speaker = "ユーリス"
original = "「さ、そのカードをめくって？\u3000大丈夫。まだ賭けは始まってないから。それは君に安心してもらうための私からの贈り物さ」"
translation = "「자, 그 카드를 넘겨볼래? 괜찮아. 아직 내기는 시작되지 않았으니까. 그건 네가 안심하길 바라는 나로부터의 선물이야.」"

[[dialogue]]
speaker = "ユーリス"
original = "「ハートのキング──……それを私だと思って懐に忍ばせておいて？\u3000君がまた震えそうになった時にぎゅっと体を抱き締めてあげるから」"
translation = "「하트 킹──…… 그걸 나라고 생각하고 품속에 간직해 줄래? 네가 다시 떨릴 것 같을 때 꽉 안아줄 테니까.」"

[[dialogue]]
speaker = "ユーリス"
original = "「ああカードは絶対にポケットから出しちゃダメだよ？\u3000イカサマと勘違いされたら大変だ。それに……」"
translation = "「아아, 카드는 절대로 주머니에서 꺼내면 안 돼? 속임수로 오해받으면 큰일이니까. 게다가……」"

[[dialogue]]
speaker = "ユーリス"
original = "「それに、君の体から離されてしまったら、君のことを抱き締めてあげられなくなっちゃう。魔法をかけてあげられなくなってしまうからね」"
translation = "「게다가, 네 몸에서 떨어져 버리면 너를 안아줄 수 없게 되잖아. 마법을 걸어줄 수 없게 되어버리니까 말이야.」"

[[dialogue]]
speaker = "ユーリス"
original = "「さて。もう震えはとまったかな？\u3000ふふ、それじゃあ私と一緒に楽しくゲームに興じよう」"
translation = "「자. 이제 떨림은 멈췄을까? 후후, 그럼 나와 함께 즐겁게 게임에 빠져보자.」"

[[dialogue]]
speaker = "ユーリス"
original = "「Ｐｌａｃｅ\u3000ｙｏｕｒ\u3000ｂｅｔｓ\u3000ｐｌｅａｓｅ──おっとその前に。本日は当カジノへようこそ。歓迎させてもらうよ」"
translation = "「Place your bets please── 앗, 그 전에. 오늘은 저희 카지노에 오신 걸 환영해. 반겨주도록 하지.」"

[[dialogue]]
speaker = "unk"
original = "惚れてまうやろ～！？"
translation = "반해버리겠잖아~!? "

[[dialogue]]
speaker = "ユーリス"
original = "「わわっ！？\u3000な、なんだい、その口調……！\u3000別に私はカジノディーラーとして当然の振る舞いをしただけのつもりだけど……！」"
translation = "「와왓!? 뭐, 뭐야 그 말투는……! 딱히 나는 카지노 딜러로서 당연한 행동을 했을 뿐인데……!」"

[[dialogue]]
speaker = "ユーリス"
original = "「今日の担当はバカラだったし、ヘレナさんにも許可は取ったよ？\u3000万が一でもイカサマに使われないようにカードの裏にサインも書いて──」"
translation = "「오늘 담당은 바카라였고, 헬레나 씨에게 허락도 받았어. 만에 하나라도 속임수에 쓰이지 않도록 카드 뒷면에 사인도 써서──」"

[[dialogue]]
speaker = "ユーリス"
original = "「え、そこじゃない？\u3000難しいな、会長の言うことは……」"
translation = "「에, 그게 아니야? 어렵네, 회장이 하는 말은……」"

[[dialogue]]
speaker = "unk"
original = "俺もユーリスのサイン入りカードが欲しいよ"
translation = "나도 유리스의 사인이 들어간 카드를 갖고 싶어"

[[dialogue]]
speaker = "ユーリス"
original = "「欲しいのならもちろんあげるけど……──えいっ！」"
translation = "「원한다면 당연히 주겠지만……── 에잇!」"

[[dialogue]]
speaker = "ユーリス"
original = "「私のサインカードなんて懐に忍ばせなくても……私はいつでも会長を抱き締めてあげるつもりだよ？」"
translation = "「내 사인 카드 같은 걸 품에 간직하지 않아도…… 나는 언제든 회장을 안아줄 생각이라고?」"

[[dialogue]]
speaker = "ユーリス"
original = "「こうやって直接……ね？\u3000離れてって言われても絶対に離れないから」"
translation = "「이렇게 직접…… 그치? 떨어지라고 해도 절대로 안 떨어질 거니까.」"

[[dialogue]]
speaker = "ユーリス"
original = "「だから、もしも何か緊張するようなことがあったり、震えてしまうようなことがあったりしたらいつでも言って？」"
translation = "「그러니까 만약 뭔가 긴장되는 일이 있거나, 떨리는 일이 생기면 언제든 말해줘.」"

[[dialogue]]
speaker = "ユーリス"
original = "「安心できるまでずーっとくっついてるから。君だけの……その。ハートのクイーンとして……」"
translation = "「안심할 때까지 계~속 붙어 있을 테니까. 너만의…… 그게. 하트 퀸으로서……」"

[[dialogue]]
speaker = "ユーリス"
original = "「って……えへへ。調子に乗りすぎかな？\u3000いくら恋人だからってハートのクイーンを名乗っちゃうなんて」"
translation = "「라니…… 에헤헤. 너무 우쭐거렸나? 아무리 연인이라지만 하트 퀸을 자처하다니.」"

[[dialogue]]
speaker = "ユーリス"
original = "「……全然ＯＫ？\u3000なら良かった。じゃあ遠慮なく抱きつかせてもらうね？\u3000いつでもどこでも、なんでもない時もぎゅ～っと」"
translation = "「……전혀 OK? 그럼 다행이다. 그럼 사양 않고 안길게? 언제 어디서든, 아무 일도 없을 때도 꼬옥.」"

[[dialogue]]
speaker = "ユーリス"
original = "「それと……その。私のことも同じように抱き締めてもらえると嬉しいな。私が緊張しちゃってる時はもちろん、なんでもない時もこうやって……」"
translation = "「그리고…… 그게. 나도 똑같이 안아주면 기쁘겠어. 내가 긴장했을 때는 물론이고, 아무 일도 없을 때도 이렇게……」"

[[dialogue]]
speaker = "ユーリス"
original = "「私にとって君は、唯一無二のハートのキングだから」"
translation = "「나에게 너는 유일무이한 하트 킹이니까.」"

[[dialogue]]
speaker = "ユーリス"
original = "「大好き……だよ？」"
translation = "「사랑해…… 알았지?」"

