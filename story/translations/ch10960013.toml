[[dialogue]]
speaker = "unk"
original = "第３話,イングリットとジュリエッテ,P"
translation = "제3화, 잉그리드와 줄레엣타, P"

[[dialogue]]
speaker = "イングリット"
original = "「魔王、腹が減った。食事でも奢ってもらおうか」"
translation = "「마왕, 배가 고프다. 식사라도 대접받을까.」"

[[dialogue]]
speaker = "unk"
original = "いきなり何！？"
translation = "갑자기 뭐야!?"

[[dialogue]]
speaker = "イングリット"
original = "「これから貴様と戦うのだから、その前に腹ごしらえだ。何もおかしなことはあるまい」"
translation = "「이제부터 네놈과 싸울 것이니, 그전에 배를 채우는 거다. 아무런 이상할 것 없지 않나.」"

[[dialogue]]
speaker = "unk"
original = "おかしなところしかない！？"
translation = "이상한 점투성이거든!?"

[[dialogue]]
speaker = "イングリット"
original = "「戦う気はないし、奢る理由もない……と？\u3000なんだ、魔王のくせにケチだな」"
translation = "「싸울 마음도 없고, 대접할 이유도 없다……고? 뭐냐, 마왕 주제에 인색하군.」"

[[dialogue]]
speaker = "イングリット"
original = "「金？\u3000そんなもの持っていない。私には必要ないものだからな」"
translation = "「돈? 그런 거 가지고 있지 않다. 나에겐 필요 없는 것이니까.」"

[[dialogue]]
speaker = "イングリット"
original = "「いつもジュリエッテに食事を用意させている。だが、今日に限ってジュリエッテが見つからんのだ」"
translation = "「항상 줄레엣타에게 식사를 준비시키고 있다. 하지만 오늘따라 줄레엣타가 보이질 않는군.」"

[[dialogue]]
speaker = "イングリット"
original = "「だから今日は魔王が私に馳走しろ。出来るだけ旨いものがいい」"
translation = "「그러니 오늘은 마왕이 나에게 대접해라. 가급적 맛있는 게 좋겠군.」"

[[dialogue]]
speaker = "unk"
original = "それが人に物を頼む態度？"
translation = "그게 남에게 부탁하는 태도야?"

[[dialogue]]
speaker = "イングリット"
original = "「別に頼んでなどいない。これは命令だ。この私が人に物を頼むわけがないだろう」"
translation = "「딱히 부탁하는 게 아니다. 이건 명령이다. 내가 남에게 부탁을 할 리가 없지 않나.」"

[[dialogue]]
speaker = "イングリット"
original = "「だから魔王、早く私に奢れ」"
translation = "「그러니 마왕, 어서 나에게 대접해라.」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「……流石に横暴がすぎるでございますわよ。イングリット様」"
translation = "「……솔직히 횡포가 너무 심하시지 말입니다. 잉그리드 님.」"

[[dialogue]]
speaker = "イングリット"
original = "「ジュリエッテ、今までどこに行っていた」"
translation = "「줄레엣타, 지금까지 어디 갔었나.」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「そんなの決まってるでございますよ！\u3000イングリット様から逃げていたのでございます！」"
translation = "「그거야 뻔하지 말입니다! 잉그리드 님한테서 도망치고 있었지 말입니다!」"

[[dialogue]]
speaker = "イングリット"
original = "「？？？\u3000なぜ私から逃げる必要がある？」"
translation = "「??? 왜 나에게서 도망칠 필요가 있지?」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「ほ、本気で言ってございますの！？」"
translation = "「지, 진심으로 하시는 소립니까!?」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "（この戦闘狂の人格破綻者めぇぇ！\u3000自分が厄災の化身だという自覚を持ちやがれでございますの！！）"
translation = "(이 전투광 인격 파탄자 녀석아아아! 자기가 재앙의 화신이라는 자각을 좀 가지란 말입니다!! )"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「まったく……イングリット様の横暴さに耐えかねて、わたくしもついつい出てきてしまいました」"
translation = "「정말이지…… 잉그리드 님의 횡포를 견디다 못해 저도 모르게 나와버리고 말았지 말입니다.」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「ということですので魔王様、イングリット様には気を付けてくださいまし。すでに被害に遭っていらっしゃるようですけど」"
translation = "「그렇게 됐으니 마왕님, 잉그리드 님을 조심하시지 말입니다. 이미 피해를 보고 계신 것 같습니다만.」"

[[dialogue]]
speaker = "イングリット"
original = "「いいから食事だ。貴様らのどちらでもいいから食わせろ」"
translation = "「됐으니까 식사다. 네놈들 중 누구라도 좋으니 먹여라.」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「どういたしましょう魔王様……こうなったイングリット様は<ruby>梃子<rt>てこ</rt></ruby>でも動きません。駄々をこねる子どもより厄介でございます……」"
translation = "「어떡할까요 마왕님…… 이렇게 된 잉그리드 님은 지렛대로도 움직이지 않습니다. 떼쓰는 어린애보다 골치 아프지 말입니다……」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「仕方ありませんわ。魔王様、もしよろしければ一緒に食事でもいかがでございましょうか？」"
translation = "「어쩔 수 없군요. 마왕님, 혹시 괜찮으시다면 같이 식사라도 어떠신지요?」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「もちろんお代は結構でございますわ。このわたくし、ジュリエッテ・ハルヴィーノがご馳走して差し上げますのっ」"
translation = "「물론 계산은 걱정 마시지 말입니다. 이 저, 줄레엣타 하르비노가 대접해 드리겠지 말입니다.」"

[[dialogue]]
speaker = "unk"
original = "本当にいいの？"
translation = "정말 괜찮아?"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「ええ、もちろん大丈夫でございますわ。イングリット様が普段からご迷惑をおかけしていることでしょうし」"
translation = "「네, 물론 괜찮지 말입니다. 잉그리드 님이 평소에 민폐를 끼치고 계실 테니까요.」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "（フフフ……それに魔王様に恩を売っておくことは、悪いことではございませんからね♪）"
translation = "(후후후…… 게다가 마왕님께 은혜를 베풀어 두는 건 나쁜 일이 아니니까요♪)"

[[dialogue]]
speaker = "イングリット"
original = "「話はまとまったか？\u3000全く、無駄な時間を取らせないでほしいものだ」"
translation = "「이야기는 다 끝났나? 정말이지, 쓸데없는 시간 잡아먹지 말았으면 좋겠군.」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "（こ、この方は本当に～～～～～～！！\u3000いっそのことぶん殴ってやりましょうか！！\u3000戦ったら負けるのはこちらでございますが！！）"
translation = "(이, 이분은 정말로～～～～～～!! 차라리 한 대 때려줄까요!! 싸우면 이쪽이 지겠지만 말입니다!! )"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「こ、コホン……とりあえず行きましょうか魔王様」"
translation = "「크, 큼큼…… 일단 가실까요 마왕님.」"

[[dialogue]]
speaker = "イングリット"
original = "「ああ、早く案内しろ。腹が空きすぎて胃に穴が開きそうだ」"
translation = "「그래, 어서 안내해라. 배가 너무 고파서 위에 구멍이 뚫릴 것 같군.」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「イングリット様は少し遠慮という言葉を覚えてくださいまし！」"
translation = "「잉그리드 님은 사양이라는 말 좀 배우시지 말입니다!」"

[[dialogue]]
speaker = "イングリット"
original = "「ふぅ、なかなか美味い飯だったな。悪くない店だ」"
translation = "「후우, 제법 맛있는 밥이었군. 나쁘지 않은 가게다.」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「人のお金で遠慮なく食べれるご飯はさぞ美味しいでございましょうよ」"
translation = "「남의 돈으로 사양 않고 먹는 밥은 참 맛있겠지 말입니다.」"

[[dialogue]]
speaker = "イングリット"
original = "「？？？\u3000誰の金かで味が変わるのか？」"
translation = "「??? 누구 돈이냐에 따라 맛이 바뀌나?」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「嫌味がまるで通じないでございますわ～！」"
translation = "「비꼬는 게 전혀 안 통하시지 말입니다~!」"

[[dialogue]]
speaker = "イングリット"
original = "「さて、腹も満たされたことだ。魔王よ、勝負といこう」"
translation = "「자, 배도 채웠겠다. 마왕이여, 승부를 내자.」"

[[dialogue]]
speaker = "unk"
original = "また戦い？"
translation = "또 싸움이야?"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「イングリット様……あなた様は本当に食べるか戦うかしかないのでございますか？」"
translation = "「잉그리드 님…… 당신은 정말로 먹거나 싸우는 것밖에 없으신 겁니까?」"

[[dialogue]]
speaker = "イングリット"
original = "「それの何が悪い。好きなものを食らい、好きなだけ戦う。これこそが至高の人生だ」"
translation = "「그게 뭐가 나쁘지. 좋아하는 것을 먹고, 마음껏 싸운다. 이것이야말로 지고의 인생이다.」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「それで他人に迷惑をかけていなければ文句はないのでございますが……コラプサーのわたくしが言うのもなんですけど」"
translation = "「그걸로 타인에게 민폐를 끼치지 않는다면 불만은 없습니다만…… 콜랩서인 제가 할 말은 아닙니다만.」"

[[dialogue]]
speaker = "イングリット"
original = "「他者を気にするなど私らしくない」"
translation = "「타인을 신경 쓰는 건 나답지 않다.」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「そんなカス発言をドヤ顔でおっしゃられても……」"
translation = "「그런 쓰레기 같은 발언을 당당하게 말씀하셔도……」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「というよりイングリット様、残念ながら今日はコラプサーの招集がかかっておりますので、戦闘は諦めてくださいまし」"
translation = "「그보다 잉그리드 님, 아쉽게도 오늘은 콜랩서 소집 명령이 떨어졌으니 전투는 포기하시지 말입니다.」"

[[dialogue]]
speaker = "イングリット"
original = "「招集など、どうせ退屈な話を聞かされるだけだろう。そんなものより魔王との対決の方が大事だ」"
translation = "「소집 따위, 어차피 지루한 이야기나 듣게 될 뿐이겠지. 그런 것보다 마왕과의 대결이 더 중요하다.」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「そういうわけにはいかないでございますの！\u3000ほら、もし参加したらわたくし達のボスと戦うこともできるかもしれませんわよ」"
translation = "「그럴 수는 없지 말입니다! 자, 만약 참가한다면 우리 보스와 싸울 수 있을지도 모른단 말입니다.」"

[[dialogue]]
speaker = "イングリット"
original = "「何？\u3000奴と戦えるのか？」"
translation = "「뭐? 그 녀석과 싸울 수 있나?」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「え、ええ……そういう可能性もあるに違いありませんわ……！」"
translation = "「에, 에에…… 그런 가능성도 있음에 틀림없지 말입니다……!」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "（９９パーセント有り得ないことでございましょうけど！！）"
translation = "(99퍼센트 그럴 일은 없겠지만요!! )"

[[dialogue]]
speaker = "イングリット"
original = "「分かった、今日のところは招集に応じてやろう。魔王よ、貴様との勝負は預けたぞ」"
translation = "「알겠다, 오늘만큼은 소집에 응해주지. 마왕이여, 네놈과의 승부는 미뤄두마.」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「魔王様、今日はご一緒にお食事が出来て楽しかったでございますわ。またの機会にお会いしましょう♪」"
translation = "「마왕님, 오늘은 함께 식사할 수 있어서 즐거웠지 말입니다. 다음 기회에 또 뵙지요♪」"

[[dialogue]]
speaker = "unk"
original = "イングリット……本当に嵐のようなコラプサーだ……"
translation = "잉그리드…… 정말 폭풍 같은 콜랩서다……"

