[[dialogue]]
speaker = "unk"
original = "第３話,行列のできるおみくじ屋さん,P"
translation = "제3화, 줄 서는 오미쿠지 가게, P"

[[dialogue]]
speaker = "unk"
original = "通学路の一角にできた大勢の人だかり。何の騒ぎだろうと覗き込んだその輪の中心にいたのは──"
translation = "등굣길 한구석에 생긴 수많은 인파. 무슨 소동인가 싶어 들여다본 그 원의 중심에 있었던 것은──"

[[dialogue]]
speaker = "unk"
original = "まさかの晴れ着姿のトリシャさんだった。"
translation = "설마 했던 나들이옷 차림의 트리샤 씨였다."

[[dialogue]]
speaker_original = "女の子"
speaker_translation = "여자아이"
original = "「トリシャさん、私も占ってくださーい！」"
translation = "「트리샤 씨, 저도 점쳐 주세요!」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「あ、慌てないでください……並んでください……ちゃんと視ますので……全員……」"
translation = "「다, 당황하지 마세요…… 줄을 서 주세요…… 제대로 봐 드릴 테니까요…… 전부……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ひぇ……やっぱり、明るい内から出かけたのは失敗でした……あっ……！\u3000た、助けてください……」"
translation = "「히에…… 역시 밝을 때부터 외출한 건 실수였습니다…… 앗……! 도, 도와주세요……」"

[[dialogue]]
speaker = "unk"
original = "何があったんです……？"
translation = "「무슨 일이 있었던 건가요……?」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「私にもわかりません……急に、私の元に人が押し寄せてきまして……あ、あの……何故……？」"
translation = "「저도 모르겠습니다…… 갑자기 제 곁으로 사람들이 밀려와서…… 저기…… 어째서……?」"

[[dialogue]]
speaker_original = "女の子"
speaker_translation = "여자아이"
original = "「占星術師のトリシャさんですよね？\u3000占いがよく当たるってみんなが言ってました！」"
translation = "「점성술사인 트리샤 씨죠? 점이 잘 맞는다고 다들 말했어요!」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「口コミですか……なるほど……それは嬉しいのですが……」"
translation = "「입소문인가요…… 과연…… 그건 기쁩니다만……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ここでおみくじをしていたら、通行の邪魔になってしまいます……どこかいいところはないでしょうか……？」"
translation = "「여기서 오미쿠지를 하고 있으면 통행에 방해가 되어 버립니다…… 어디 좋은 곳은 없을까요……?」"

[[dialogue]]
speaker = "unk"
original = "それなら──"
translation = "「그렇다면──」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「え……？\u3000星徒会室……？」"
translation = "「에……? 성도회실……?」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「まさか会長権限で、星徒会室をおみくじ小屋として解放するとは……驚きです」"
translation = "「설마 회장 권한으로 성도회실을 오미쿠지 오두막으로 개방하다니…… 놀랍습니다.」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ですがここでしたら、心おきなく<ruby>神籤<rt>みくじ</rt></ruby>れます……場所の提供、感謝いたします……」"
translation = "「하지만 여기라면 마음 놓고 점괘<rt>미쿠지</rt></ruby>를 뽑을 수 있겠네요…… 장소 제공, 감사드립니다……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「では次の方……」"
translation = "「그럼 다음 분……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「中吉ですね……失せ物は必ずや見つかることでしょう……ちなみに、床下の収納はお探しになりましたか……？」"
translation = "「중길이네요…… 잃어버린 물건은 반드시 찾게 될 것입니다…… 참고로 바닥 밑 수납장은 찾아보셨나요……?」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「次の方は……大吉、ですね……おめでとうございます……。特に金運が好調と出ています……ところで、年末に購入した宝くじをお忘れではありませんか……」"
translation = "「다음 분은…… 대길, 이네요…… 축하드립니다……. 특히 금전운이 호조라고 나오고 있습니다…… 그런데 연말에 구입한 복권을 잊고 계시지는 않나요……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「あなたの恋愛運は……吉……途切れた縁が再び繋がる……と出ています。元々、勘違いが原因ですので……お相手に妹さんがいないか、今一度、確認されてみては……？」"
translation = "「당신의 연애운은…… 길…… 끊겼던 인연이 다시 이어진다……고 나오고 있습니다. 원래 오해가 원인이었으니…… 상대방에게 여동생이 없는지 다시 한번 확인해 보심이……?」"

[[dialogue]]
speaker = "unk"
original = "トリシャさん、そろそろ休憩しなくて大丈夫？"
translation = "「트리샤 씨, 슬슬 휴식하지 않아도 괜찮아?」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「はい……いつもの占いよりは……幾分か工程と内容を簡略化していますので」"
translation = "「네…… 평소의 점보다는…… 어느 정도 공정과 내용을 간략화하고 있으니까요.」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「しかし頼まれると、断るのが苦手なもので……そろそろ、少しは列が短くなったのではないでしょうか……」"
translation = "「하지만 부탁받으면 거절하는 게 서툴러서…… 슬슬 줄이 조금은 짧아지지 않았을까요……」"

[[dialogue]]
speaker = "unk"
original = "いや、むしろ列が伸びてるかも……"
translation = "「아니, 오히려 줄이 늘어나고 있을지도……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「なるほど、口コミがさらに広がっていると……レゾフでは、ここまで人気になることはなかったのですが……驚きです」"
translation = "「과연, 입소문이 더욱 퍼지고 있다는 거군요…… 레조프에서는 이 정도로 인기가 있었던 적은 없었습니다만…… 놀랍습니다.」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ですが、私のおみくじが人の役に立つのでしたら……少しくらい無理をしましょう……」"
translation = "「하지만 제 오미쿠지가 사람들에게 도움이 된다면…… 조금은 무리를 하죠……」"

[[dialogue]]
speaker = "unk"
original = "夕方になり、おみくじを望む人の波はようやく引いた。"
translation = "저녁이 되어 오미쿠지를 원하는 사람들의 물결이 겨우 빠져나갔다."

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ふう……新年早々、１年分の会話を交わしてしまいました……キャパシティオーバーです……」"
translation = "「후우…… 신년 벽두부터 1년 치 대화를 나누고 말았습니다…… 캐파 오버예요……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「お気持ち程度の占い料でしたが……積もり積もって、それなりの額になってしまいました……」"
translation = "「성의 정도의 복채였습니다만…… 쌓이고 쌓여서 제법 큰 금액이 되어 버렸네요……」"

[[dialogue]]
speaker = "unk"
original = "初穂料ですね"
translation = "「하츠호료(初穂料)라고 하죠.」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「初穂料という呼び名があるのですね……なんとなく響きがいい……雅です……」"
translation = "「하츠호료라는 명칭이 있군요…… 왠지 어감이 좋네요…… 우아합니다……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「こんな時間になってしまいましたが、数多の人を導けました……占い師、冥利に尽きます……」"
translation = "「이런 시간이 되어 버렸습니다만, 수많은 사람을 인도할 수 있었습니다…… 점술사로서 보람을 느낍니다……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「それに、学園の方々と、少し、友達になりました……占いの後に、一緒に写真を撮ったりとか……にへへ」"
translation = "「게다가 학원 분들과 조금 친구가 되었습니다…… 점을 본 뒤에 같이 사진을 찍는다거나…… 니헤헤.」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「美味しい焼きたてパンのお店を、教えてもらえることになりました……楽しみです……」"
translation = "「맛있는 갓 구운 빵집을 소개받기로 했습니다…… 기대되네요……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「……？\u3000あなたも笑っていますね……？」"
translation = "「……? 당신도 웃고 있네요……?」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「トリシャさんが嬉しそうにしてると、俺も嬉しい……？\u3000そ、そうですか……」"
translation = "「트리샤 씨가 기뻐 보이니까 나도 기뻐……? 그, 그렇습니까……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「そうです……よろしければ、あなたも占いましょうか……？」"
translation = "「그렇습니다…… 괜찮으시다면 당신도 점쳐 드릴까요……?」"

[[dialogue]]
speaker = "unk"
original = "お疲れのところ悪いけど、いいですか？"
translation = "「피곤할 텐데 미안하지만, 괜찮을까?」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「もちろんです、喜んで……カシャカシャ」"
translation = "「물론입니다, 기꺼이…… 달각달각.」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「出ました……これはなんと……今日一番の眩い光……！\u3000あなたの今年の運勢は……大吉では到底言い表せないほどの幸運……いうなれば、超吉……！」"
translation = "「나왔습니다…… 이건 설마…… 오늘 중 가장 눈부신 빛……! 당신의 올해 운세는…… 대길로는 도저히 다 표현할 수 없을 정도의 행운…… 말하자면 초길(超吉)……!」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「異性と外出をすることで、更なる運が開ける……と出ています……」"
translation = "「이성과 외출을 함으로써 더욱 운이 트인다……고 나오고 있습니다……」"

[[dialogue]]
speaker = "unk"
original = "一緒に初詣に行きましょう、トリシャさん"
translation = "「같이 하츠모데 가요, 트리샤 씨.」"

[[dialogue]]
speaker = "unk"
original = "それなら、ちょうど良かった"
translation = "「그거라면 마침 잘됐네.」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「は、はいっ……喜んで、参りましょう……！」"
translation = "「하, 하잇…… 기꺼이, 가도록 해요……!」"

[[dialogue]]
speaker = "unk"
original = "そもそもトリシャさんに街中で遭遇したのも、彼女を初詣に誘おうと向かっていた道中だ。"
translation = "애초에 트리샤 씨를 거리에서 마주친 것도 그녀를 하츠모데에 초대하려고 향하던 도중이었다."

[[dialogue]]
speaker = "unk"
original = "即ＯＫしてもらえた俺の今年の運勢は、彼女が言う通りの超吉なのかもしれない。"
translation = "즉석에서 OK를 받아낸 나의 올해 운세는 그녀가 말한 대로 초길일지도 모른다."

