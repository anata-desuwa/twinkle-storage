[[dialogue]]
speaker = "unk"
original = "第２話,忍者少女の好きなこと,P"
translation = "제2화, 닌자 소녀가 좋아하는 것, P"

[[dialogue]]
speaker = "unk"
original = "昼食をとろうと大聖堂カフェテリアに行くと、席に腰掛け手を振る、九浄家メイド隊の２人の姿が目に入った――"
translation = "점심을 먹으려 대성당 카페테리아에 가니 자리에 앉아 손을 흔드는 쿠죠 가문 메이드대 두 사람의 모습이 눈에 들어왔다──"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「主様～♪\u3000今からお昼でござるか？」"
translation = "「주군~♪ 이제 점심이오?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「会長、こんにちは～。私達もこれから一緒に食べるところだったんです」"
translation = "「회장님, 안녕하세요~. 저희도 이제 같이 먹으려던 참이었어요.」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「せっかくですし、主様もご一緒にいかがでしょうか？\u3000せつな、主様にお聞きしたいこともあったのでござる」"
translation = "「기왕이면 주군도 함께 어떠시오? 세츠나, 주군께 여쭙고 싶은 것도 있었소.」"

[[dialogue]]
speaker = "unk"
original = "それじゃあ、同席させて貰うよ"
translation = "그럼 합석하도록 할게."

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「でしたら、ささっ、どうぞこちらへ。注文は決まっておりますか？\u3000せつなが料理を取って参りまする！」"
translation = "「그렇다면 자자, 이쪽으로 오시오. 주문은 정하셨소? 세츠나가 요리를 가져오겠소!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「そんな遠慮なさらず。これぞ主様を支える忍の役目。是非、ご命令下さいませ♪」"
translation = "「그렇게 사양 마시오. 이것이야말로 주군을 보필하는 닌자의 임무. 부디 명령해 주시오♪」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ふふっ、せつなさん、嬉しそう♪\u3000いつか主様が出来たらって、ずっと言ってましたもんね」"
translation = "「후후, 세츠나 씨 즐거워 보여♪ 언젠가 주군이 생기면 좋겠다고 계속 말했었으니까요.」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「はいっ♪\u3000なので今は、毎日が充実していて、とても楽しいのでござる♪」"
translation = "「그렇소♪ 그래서 지금은 매일이 충실하고 아주 즐겁소♪」"

[[dialogue]]
speaker = "unk"
original = "それから、せつなが料理を取って来てくれて、３人で世間話を楽しみながら昼食をとっていると、ふと思い出した。"
translation = "그 후 세츠나가 요리를 가져다주었고, 셋이서 일상 대화를 즐기며 점심을 먹던 중 문득 떠올랐다."

[[dialogue]]
speaker = "unk"
original = "何か俺に聞きたいことがあるって？"
translation = "나한테 물어보고 싶은 게 있다고 했지?"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「おおっ、そうでした。実はせつな、主様のことをもっと知りたいと思っていたのでござる。忍として主様との絆を深める為にも！」"
translation = "「오오, 그랬소. 실은 세츠나, 주군에 대해 더 알고 싶다 생각했소. 닌자로서 주군과의 유대를 깊게 하기 위해서라도!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「主様もせつなに聞きたいことがあるのでござるか？\u3000もちろん、何なりとお聞き下さいませ」"
translation = "「주군도 세츠나에게 묻고 싶은 것이 있소? 물론 무엇이든 물어봐 주시오.」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「ほうほう、せつなの趣味嗜好でござるか」"
translation = "「호오호오, 세츠나의 취미 기호 말이오?」"

[[dialogue]]
speaker = "unk"
original = "同僚の趣味には興味があるようで、ヨミも緑茶を飲みながらせつなの話に耳を傾けて──"
translation = "동료의 취미에는 흥미가 있는지 요미도 녹차를 마시며 세츠나의 이야기에 귀를 기울이고──"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「好きなことは○○○○とエロ本集め。特技は房中術でござる！」"
translation = "「좋아하는 것은 자위와 야한 책 수집. 특기는 방중술이오!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ぶほっ！？\u3000げほっ、げほごほっ！」"
translation = "「푸흡!? 쿨럭, 쿨럭쿨럭!」"

[[dialogue]]
speaker = "unk"
original = "ちょっ！？\u3000そんな大声で、堂々と……！"
translation = "잠깐!? 그렇게 큰 소리로 당당하게……!"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こんな真昼間の公共の場で、なんて恥ずかしいことを話してるんですか！」"
translation = "「이런 대낮에 공공장소에서 무슨 부끄러운 소리를 하는 거예요!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「にゃんと！？\u3000エロは別に恥ずかしいことなんかじゃないでござる！」"
translation = "「냐닛!? 에로는 딱히 부끄러운 게 아니오!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「年頃の男女であれば、内心誰しもエロに興味は抱くもの。それは何もおかしいことなど無いはずでござる」"
translation = "「한창때의 남녀라면 내심 누구나 에로에 흥미를 품는 법. 그건 전혀 이상할 게 없을 것이오.」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「確かにまだ親しくない相手、気を使う間柄では積極的に口にしない話題かもしれぬでござるが……今ここに居るのは、友であるヨミ殿と、忠義を捧げる主様でありますれば！」"
translation = "「물론 아직 친하지 않은 상대, 조심스러운 사이라면 적극적으로 입에 담지 않을 화제일지도 모르오만…… 지금 여기 있는 것은 벗인 요미 공과 충의를 바치는 주군이 아니오!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「せつなは好きなものを問われれば、真正面からエロを語るでござる！\u3000己が定めた掟を貫く……それがせつなの忍道であるが故に！」"
translation = "「세츠나는 좋아하는 것을 물으면 정면에서 에로를 논하겠소! 자신이 정한 법도를 관철한다…… 그것이 세츠나의 닌도이기 때문이오!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「温泉に入る時、洗い場で体を隠すことを咎める者はおりませぬ。しかし、いざ湯舟に浸かると決めたならば、タオルは取らねばなりませぬ！」"
translation = "「온천에 들어갈 때 씻는 곳에서 몸을 가리는 것을 탓하는 자는 없소. 허나 막상 탕에 몸을 담그기로 정했다면 수건은 치워야 하오!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「それが裸の付き合いというもの！\u3000故にこの身は、エロに対して一片の恥じらいも無し！\u3000せつなはただ、湯舟でタオルを取り去るだけにござる！」"
translation = "「그것이 알몸의 사귐이라는 것! 고로 이 몸은 에로에 대해 한 점의 부끄러움도 없소! 세츠나는 그저 탕에서 수건을 치울 뿐이오!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こ、神々しいまでの姿……！\u3000ごめんなさい。私、深く考えず、反射的にせつなさんを批判してしまいました……」"
translation = "「고, 고결하기까지 한 모습……! 미안해요. 저, 깊게 생각 안 하고 반사적으로 세츠나 씨를 비판해 버렸어요……」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「確かに私も、エッチなことに対する興味というか、人には言えないような性癖がありますし……」"
translation = "「확실히 저도 야한 것에 대한 흥미랄까, 남에겐 말 못 할 성벽이 있기도 하고……」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「そうなのでござるか？\u3000せっかくの機会、よければ打ち明けてみてはどうでござるか？」"
translation = "「그러하오? 기왕 이렇게 된 거 괜찮다면 털어놓아 보는 건 어떻소?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「はい……実は私は――」"
translation = "「네…… 사실 저는──」"

[[dialogue]]
speaker = "unk"
original = "えっ、ヨミちょっと待っ……"
translation = "엣, 요미 잠깐만……"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「匂いフェチで、他の人の匂いを嗅ぐのが好きなんです……！」"
translation = "「냄새 페티시라서 다른 사람 냄새를 맡는 걸 좋아해요……!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「わかるでござる！\u3000せつなも最近は、主様の匂いにハマっておりまする！」"
translation = "「이해하오! 세츠나도 요즘은 주군의 냄새에 빠져 있소!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「た、確かに会長の匂いは、私も最近少し気になってたり……」"
translation = "「하, 확실히 회장님의 냄새는 저도 요즘 조금 신경 쓰이기도 하고……」"

[[dialogue]]
speaker = "unk"
original = "それは俺が聞いていい話題なのか！？"
translation = "그거 내가 들어도 되는 화제인 거야!?"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「ちなみに、ヨミ殿は匂いフェチとして、どんなシチュエーションがお好みでござるか？」"
translation = "「참고로 요미 공은 냄새 페티시로서 어떤 상황을 선호하오?」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「せつなとしては朝に主様の布団へ忍び込み、にゃんにゃんしながら起こしてみたいでござる！」"
translation = "「세츠나로서는 아침에 주군의 이불로 잠입해 냥냥하며 깨워보고 싶소!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「それは良いですね……！\u3000ただ、出来れば私は、相手を起こしてから、お互いの気持ちを確認し合いながらの方が、もっと素敵かなって……」"
translation = "「그거 좋네요……! 다만 가능하다면 저는 상대를 깨우고 나서 서로의 마음을 확인하며 하는 쪽이 더 멋질 것 같아서……」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「相手の匂いを好きだと伝えて、その人も同じように私の匂いを好きだと言ってくれて、そんな好きな匂いが混じり合った布団の中でキスをして、その後は……えへへ……<emoji=heart04>」"
translation = "「상대의 냄새가 좋다고 말하고 그 사람도 똑같이 제 냄새가 좋다고 말해주고, 그런 좋아하는 냄새가 뒤섞인 이불 속에서 키스를 하고 그 후엔…… 에헤헤……<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「へ……」"
translation = "「헤……」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「変態でござるーーーーっ！！！」"
translation = "「변태요──────!!!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「えぇっ！？\u3000どこがですか！\u3000せつなさんのシチュエーションとちょっと違うだけですよね！？」"
translation = "「에엣!? 어디가요! 세츠나 씨 상황이랑 조금 다를 뿐이잖아요!?」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「そんな、好きと言い合ったりとか、キスをしたりとかは、大人がする恋愛でござる！\u3000エッチ過ぎて、どう考えてもアウトでござるっ！！！」"
translation = "「그런 좋아한다고 서로 말하거나 키스를 하거나 하는 건 어른들이 하는 연애요! 너무 야해서 아무리 생각해도 아웃이오!!!」"

[[dialogue]]
speaker = "unk"
original = "エッチの基準おかしくない！？"
translation = "야함의 기준이 이상하지 않아!?"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「房中術とか○○○○とか堂々と言ってたじゃないですか！？」"
translation = "「방중술이나 자위 같은 건 당당하게 말했으면서요!?」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「恋愛とエロは別物にござる！\u3000恋愛は結婚を前提にした、大人の男女がするものなのでござる！」"
translation = "「연애와 에로는 별개요! 연애는 결혼을 전제로 한 성인 남녀가 하는 것이오!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「恋愛はまだ、せつなにはまだ早いのでござるぅ～～～～～～っ！！！」"
translation = "「연애는 아직 세츠나에겐 이르단 말이오~~~~~~~~~~!!!」"

[[dialogue]]
speaker = "unk"
original = "恋愛とエロの羞恥心の基準が逆！！"
translation = "연애와 에로의 수치심 기준이 반대야!!"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ちょっと、せつなさん！？\u3000こ、これじゃまるで――」"
translation = "「잠깐, 세츠나 씨!? 이, 이러면 마치──」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「逃げられた私が、とんでもない変態みたいじゃないですかっ！\u3000こやぁぁぁ～～～～～～んっ！！！」"
translation = "「도망쳐버린 제가 엄청난 변태 같잖아요! 꺄아아아~~~~~~~~앙!!!」"

[[dialogue]]
speaker = "unk"
original = "残されたヨミの魂の叫びが、空へと響き渡るのだった。"
translation = "남겨진 요미의 영혼의 외침이 하늘로 울려 퍼지는 것이었다."

