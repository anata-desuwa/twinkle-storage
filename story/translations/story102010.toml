[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「うわああああっ！！！」"
translation = "「우와아아아앗!!!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「な、なんだあれ……でかいぞ！」"
translation = "「머, 뭐야 저거…… 엄청 크잖아!」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「グマァアアアアアアアアアアア！！！！！」"
translation = "「구마아아아아아아아아아아아!!!!!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「声もでかいっ！！！」"
translation = "「목소리도 커!!!」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「あはははは、とっておきの巨大クマロボなんだっくま。これでもっともっと楽しめるよーっ！」"
translation = "「아하하하하, 아껴둔 거대 곰 로봇이다곰. 이걸로 훨씬 더 즐길 수 있을 거다곰!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「戦いも大詰めってわけか！\u3000いいぞ、やってやるさ！」"
translation = "「전투도 막바지라는 건가! 좋아, 해보자고!」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「グマァアアアアアアアアアアアアアアア！！！！！」"
translation = "「구마아아아a아아아아아아아아아아아!!!!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「だからうるさいって！\u3000ブレイブヒート！」"
translation = "「그러니까 시끄럽다니까! 브레이브 히트!」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「ガッキーーーーーーーーーーン！！！！！」"
translation = "「가기이이이이이이이이이잉!!!!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「なっ、攻撃をはじき返した！？」"
translation = "「나앗, 공격을 튕겨냈어!?」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「巨大クマロボはわたしのジョーカー、最後の切り札なんだっくま。ちょっとやそっとの攻撃じゃ効かないくまよ！」"
translation = "「거대 곰 로봇은 나의 조커, 마지막 히든카드다곰. 웬만한 공격은 안 통한다곰!」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「よーし、このまま攻撃くまーっ♪」"
translation = "「좋아, 이대로 공격이다곰~♪」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「グッマァアアアアアアアアアアアア！！！！！」"
translation = "「구마아아아아아아아아아아아아!!!!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「くっ！！？」"
translation = "「큭!!?」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「プトラ、合わせてください！」"
translation = "「푸트라, 맞추세요!」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「うんっ！」"
translation = "「응!」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「だめですね。私たちの攻撃でもびくともしないようです」"
translation = "「안 되겠네요. 우리 공격으로도 끄떡없는 모양이에요.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "（イマージュの協力があれば……いえ、私が本来の力をもっと引き出せていれば、何とかなりそうなのですが……）"
translation = "(이마주의 협력이 있다면…… 아니, 제가 본래의 힘을 더 끌어낼 수 있다면 어떻게든 될 것 같습니다만……)"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「クマアアアアアアアアアアア！！！！！」"
translation = "「쿠마아아아아아아아아아아!!!!」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「っ……！」"
translation = "「윽……!」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「危ないっ！！」"
translation = "「위험해!!」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「大丈夫、アルテ！？」"
translation = "「괜찮아, 아르테!?」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「ええ、ありがとうございます。助かりました」"
translation = "「네, 감사합니다. 덕분에 살았어요.」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「きっと突破口は見つかるよ！\u3000ちょっとばかしピンチだけど、ぜんぜん絶望的なんかじゃない！」"
translation = "「분명 돌파구는 보일 거야! 조금 핀치긴 해도, 전혀 절망적인 건 아니니까!」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「だから、大丈夫だよアルテ！」"
translation = "「그러니까, 괜찮아 아르테!」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「……ふっ」"
translation = "「……훗.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「何を言ってるんですか、プトラ？\u3000私は別に絶望したりなんてしていませんよ」"
translation = "「무슨 소리를 하는 건가요, 푸트라? 저는 딱히 절망하거나 하지 않았어요.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「私もアテネスでは命をかけて死の芸術と戦ってきました。この程度の危機は何度もくぐり抜けています」"
translation = "「저도 아테네스에서는 목숨을 걸고 죽음의 예술과 싸워왔답니다. 이 정도 위기는 몇 번이나 헤쳐 나왔고요.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「あのデカブツを倒すために、ちょっとだけ本気を出そうと思考を巡らせていただけですよ……ご心配なく」"
translation = "「저 덩치를 쓰러뜨리기 위해, 아주 조금 진심을 내볼까 하고 생각을 굴리고 있었을 뿐이에요…… 걱정 마시길.」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「あはっ、よかった」"
translation = "「아핫, 다행이다.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「まあ見ててください……すぅ──」"
translation = "「뭐, 지켜봐 주세요…… 후우──」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「クマアアアアアアアアアアアアア！！！！！」"
translation = "「쿠마아아아아아아아아아아아아아!!!!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「アルテ！\u3000またそっちに攻撃が行くぞ！」"
translation = "「아르테! 또 그쪽으로 공격이 간다!」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「問題ありませんよ……攻撃が私に届くことはありません──」"
translation = "「문제없어요…… 공격이 제게 닿을 일은 없습니다──」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「ホーリーパニッシュメント！！！！」"
translation = "「홀리 퍼니시먼트!!!!」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「ク、クマァアアア……！？！？」"
translation = "「쿠, 쿠마아아아……!?!?」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「くまっ！？\u3000巨大クマロボが吹っ飛ばされちゃったんだくま……！？」"
translation = "「쿠맛!? 거대 곰 로봇이 날아가 버렸다곰……!?」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「いっくよ～……ソルフレア・スプラッシュ！」"
translation = "「가아아자~…… 솔 플레어 스플래시!」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「クマァアアア～～～～～～～っ！？！？！？」"
translation = "「쿠마아아아~~~~~~~!?!?!?!?」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「ああっ！！\u3000巨大クマロボが……やられた！？\u3000そんなのありえっないくまよーーっ！？」"
translation = "「아앗!! 거대 곰 로봇이…… 당했어!? 그런 건 있을 수 없다곰요──!!?」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「やったね、アルテ！」"
translation = "「해냈네, 아르테!」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「まあ、天才の私にかかればこんなものです」"
translation = "「뭐, 천재인 제게 걸리면 이 정도죠.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「へへっ、いいとこ持っていかれたみたいだな」"
translation = "「헤헤, 좋은 대목은 다 뺏긴 모양이네.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「さて、切り札も無くなったけど、どうするのかしら？」"
translation = "「자, 패도 다 떨어진 것 같은데, 어떻게 할 거니?」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「むむむむ、こんな呆気ない終わり方はつまらないんだくまよ……」"
translation = "「무무무무, 이런 허무한 결말은 재미없다곰요……」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「黒ベア子はもっとも～～っと盛り上げたいんだくま～～～！！！！！」"
translation = "「흑베아코는 더어어어~~욱 분위기를 띄우고 싶다곰~~~~~!!!!!」"

[[dialogue]]
speaker = "？？？"
original = "『いいかげんにするくまーーーーーーっ！！！』"
translation = "『적당히 하라곰──────!!』"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「だ、誰よ！？」"
translation = "「누, 누구야!?」"

[[dialogue]]
speaker = "unk"
original = "黒ベア子と同じ声。"
translation = "흑베아코와 같은 목소리."

[[dialogue]]
speaker = "unk"
original = "だけど目の前の彼女が叫んだものじゃない、別なところから響いてきた声。"
translation = "하지만 눈앞의 그녀가 외친 것이 아닌, 다른 곳에서 울려 퍼진 목소리."

[[dialogue]]
speaker = "？？？"
original = "「なにやってるですかぁあっーーーー成敗！！！！」"
translation = "「뭘 하고 있는 건가요오옷──── 성패!!!!」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「ほんげーーーーーーーっ！！！」"
translation = "「혼게───────!!!」"

[[dialogue]]
speaker = "？？？"
original = "「何をやってるのかと思ったら、あちこちの世界に迷惑をかけて！」"
translation = "「뭘 하나 했더니, 여기저기 세계에 폐를 끼치고!」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「ベア子<emoji=heart04>」"
translation = "「베아코<emoji=heart04>」"

[[dialogue]]
speaker_original = "ベア子"
speaker_translation = "베아코"
original = "「ベア子<emoji=heart04>\u3000じゃないよ！\u3000反省するくま！！」"
translation = "「베아코<emoji=heart04> 가 아니야! 반성하라곰!!」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「だって、だって、みんな一緒に遊んだら楽しくなって盛り上がるっくまよ？」"
translation = "「그치만, 그치만, 다 같이 놀면 즐거워져서 분위기가 산다곰요?」"

[[dialogue]]
speaker_original = "ベア子"
speaker_translation = "베아코"
original = "「周りを見てみるんだくま。クマロボたちが暴れたせいで大変なことになっちゃってるでしょ？」"
translation = "「주변을 좀 보라곰. 곰 로봇들이 날뛰는 바람에 난리가 났잖아?」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「ぁぁーー。怒ったベア子もかんわいいくま……」"
translation = "「아아──. 화난 베아코도 너어무 귀엽다곰……」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「ああーーっ！！\u3000いたいんだくま～～～～！！！」"
translation = "「아아──앗!! 아프다곰~~~~~!!!」"

[[dialogue]]
speaker_original = "ベア子"
speaker_translation = "베아코"
original = "「みなさんご迷惑をおかけいたしました。この子はしっかりとわたしが連れて帰りますので……」"
translation = "「여러분 폐를 끼쳐 드렸습니다. 이 아이는 확실하게 제가 데리고 돌아갈 테니까요……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あ、あの……別世界に飛ばされた子たちは……」"
translation = "「저, 저기…… 다른 세계로 날아간 아이들은……」"

[[dialogue]]
speaker_original = "ベア子"
speaker_translation = "베아코"
original = "「もっちろん、それもすぐに元に戻しますですくま。それでは失礼しっまーーっす！」"
translation = "「무우론, 그것도 금방 원래대로 되돌려 놓겠다곰요. 그럼 실례하겠습니드아──앗!」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「さらばなんだくま～～～！！」"
translation = "「작별이다곰~~~!!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……行っちゃったわね」"
translation = "「……가버렸네.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「うわっ！？\u3000な、なんだ……」"
translation = "「우와!? 뭐야, 이건……」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「戦闘服が、いつものフォームに……」"
translation = "「전투복이, 평소의 폼으로……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「やっぱりこれも、ベア子さんの引き起こした異変だったみたいですね」"
translation = "「역시 이것도 베아코 씨가 일으킨 이변이었던 모양이네요.」"

[[dialogue]]
speaker = "unk"
original = "ということは……"
translation = "그렇다는 것은……"

[[dialogue]]
speaker = "unk"
original = "異変は解決された"
translation = "이변은 해결되었다."

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「あっ……あたしたちの、体が……」"
translation = "「앗…… 우리 몸이……」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「……どうやら元の世界に戻る時が来たようですね」"
translation = "「……아무래도 원래 세계로 돌아갈 때가 온 모양이네요.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ちょ、待ちなさいよ！\u3000ちゃんとお別れ会とかしたいのに……！」"
translation = "「잠깐, 기다려 봐! 제대로 작별 파티라도 하고 싶은데……!」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「そんなことを言っても仕方ないでしょう」"
translation = "「그런 말을 해도 어쩔 수 없잖아요.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「仕方がないので、元の世界に戻ってもあなたたちのことはちゃんと覚えていてあげますよ」"
translation = "「어쩔 수 없으니, 원래 세계로 돌아가서도 당신들에 대해서는 제대로 기억해 줄게요.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「アルテ……」"
translation = "「아르테……」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「ううう、せっかく仲良くなれたのに寂しいよ……」"
translation = "「으으으, 겨우 친해졌는데 쓸쓸해……」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「でも、うん、あたしもぜったいみんなのこと忘れないね！」"
translation = "「하지만, 응, 나도 절대 모두를 잊지 않을게!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「約束ですよ」"
translation = "「약속이에요.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「短い間だったけど、お世話になりました」"
translation = "「짧은 시간이었지만, 신세 많이 졌습니다.」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「楽しかったよ、元気でね～！」"
translation = "「즐거웠어, 잘 지내~!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「急にいなくなると、寂しいもんだな……」"
translation = "「갑자기 없어지니까, 쓸쓸하구먼……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「仕方ないですよ。彼女たちには彼女たちの居るべき世界があるんですから」"
translation = "「어쩔 수 없어요. 그녀들에게는 그녀들이 있어야 할 세계가 있으니까요.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そうね……」"
translation = "「그렇네……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「きゃふ……！」"
translation = "「캬후……!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「到着～」"
translation = "「도착~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふふ、どうやら無事に戻って来れたみたいね～」"
translation = "「후후후, 아무래도 무사히 돌아온 모양이네~」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「アナ、サーシャさん！！」"
translation = "「아나, 사샤 언니!!」"

[[dialogue]]
speaker = "unk"
original = "大丈夫？"
translation = "괜찮아?"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ええ、心配かけてごめんなさい」"
translation = "「네, 걱정 끼쳐서 미안해요.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「少しばかり異世界を旅してきました」"
translation = "「조금 이세계를 여행하고 왔습니다.」"

[[dialogue]]
speaker = "unk"
original = "異世界はどうだった？"
translation = "이세계는 어땠어?"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ええ、いろいろ大変でしたけど、とても楽しかったですよ」"
translation = "「네, 여러모로 힘들었지만, 무척 즐거웠어요.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あちらで起きたことや、出会った人のこと、いっぱいお話したいわ」"
translation = "「그곳에서 일어난 일이나, 만난 사람들 이야기, 잔뜩 하고 싶단다~」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「よーし、それじゃお茶でもしながら、土産話をたっぷり聞かせてもらおうぜ！」"
translation = "「좋아, 그럼 차라도 마시면서 여행 선물 이야기를 듬뿍 들어보자고!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そうね、私たちも２人に話したいことがいっぱいいっぱいあるわ」"
translation = "「그래, 우리도 두 사람에게 하고 싶은 말이 아주아주 많아.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あらあら、それは楽しみね～」"
translation = "「어머어머, 그거 기대되네~」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「では、いきましょう」"
translation = "「그럼, 가죠.」"

[[dialogue]]
speaker = "unk"
original = "アルテやプトラと同じように、おそらく異世界で活躍してきただろう２人と一緒に学園へと帰還する。"
translation = "아르테나 푸트라와 마찬가지로, 아마 이세계에서 활약했을 두 사람과 함께 학원으로 귀환한다."

[[dialogue]]
speaker = "unk"
original = "そして、カフェテリアでテーブルを囲みながら、ここ数日間で起きたことについて語り合う。"
translation = "그리고 카페테리아에서 테이블을 둘러싸고 앉아, 지난 며칠 동안 일어난 일들에 대해 이야기를 나눈다."

[[dialogue]]
speaker = "unk"
original = "こうして黒ベア子によって引き起こされた事件は、穏やかに幕を閉じたのだった。"
translation = "이렇게 흑베아코에 의해 일어난 사건은 평온하게 막을 내렸다."

