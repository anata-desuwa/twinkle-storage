[[dialogue]]
speaker = "unk"
original = "シノさんが学園長に就任して、しばらく。"
translation = "시노 씨가 학원장으로 취임하고 한동안."

[[dialogue]]
speaker = "unk"
original = "星徒会長という立場から、２人で会う機会も多かった。"
translation = "성도회장이라는 입장 덕분에 둘이서 만날 기회도 많았다."

[[dialogue]]
speaker = "unk"
original = "ちょっとした相談に乗ってもらったり、内緒の息抜きをしたり。"
translation = "소소한 상담을 해주기도 하고, 비밀스러운 휴식을 취하기도 하며."

[[dialogue]]
speaker = "unk"
original = "そんなやり取りを重ねていくうちに、お互いに惹かれ合い……そして俺たちは恋人関係になっていた。"
translation = "그런 교류를 거듭하는 사이에 서로에게 이끌려…… 그리고 우리들은 연인 관계가 되어 있었다."

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「ま、待ってください。放課後とは言え、まだ明るい時間ですからっ……」"
translation = "「기, 기다려 주세요. 방과 후라고는 해도 아직 밝은 시간이니까요……!」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「会長さんっっ」"
translation = "「회장님!!」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「だめです、だめっ……あぁっ、そんな……会長さんっっ……」"
translation = "「안 돼요, 안 돼…… 아앗, 그런…… 회장님!!……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「会長さん、じゃないですよ。恋人なんですから名前で呼んで欲しいです」"
translation = "「회장님이 아니라니까. 연인이니까 이름으로 불러줬으면 좋겠어.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「夜は呼んでるじゃないですかっ。まだ明るい時間ですし……それにここは学園長室なんですよっ」"
translation = "「밤에는 부르고 있잖아요! 아직 밝은 시간이고…… 게다가 여기는 학원장실이란 말이에요!」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「うう～っ……最近忙しくって、恋人同士の語らいもろくにできなかったのは事実ですけどっ……夜まで待ってくれてもいいじゃないですかっ」"
translation = "「으으~…… 최근에 바빠서 연인끼리 대화도 제대로 못 한 건 사실이지만요…… 밤까지 기다려줘도 되잖아요!」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「こんな……大胆な体勢にさせて……だ、だめですっ、見えちゃいますっっ、こんなのだめっっ。あんっ<emoji=heart04>」"
translation = "「이런…… 대담한 자세로 만들고…… 아, 안 돼요! 보여버려요! 이런 건 안 돼! 앙! <emoji=heart04>」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「あぁっ……会長さんも男性器、出しちゃって……誰かが来たらどうするんですか、もぉ……」"
translation = "「아앗…… 회장님도 자지, 꺼내버리고…… 누가 오면 어쩌려고 그래요, 정말……」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「ぼ、勃起してますね……何度見てもすごいです……んんっ……ふ……あぁっ！\u3000そこ、グリグリってしたらだめですっ……！」"
translation = "「바, 발기했네요…… 몇 번을 봐도 굉장해요…… 응응…… 후…… 아앗! 거기, 그리그리 하면 안 돼요……!」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「はぁ……はぁ……私だって……もう何日も愛してもらってないんですから……して欲しいなって、ずっとずっと思ってたんですよっ……それなのに……うう～～っ」"
translation = "「하아…… 하아…… 저도…… 벌써 며칠이나 사랑받지 못했으니까…… 해줬으면 좋겠다고 계속 계속 생각했다고요…… 그런데…… 으으~~」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「夜っ、せめて夜まで待ってもらえませんか？\u3000そうしたら、会長さんが好きなこと何でもしますからっ」"
translation = "「밤에, 적어도 밤까지 기다려주지 않을래요? 그러면 회장님이 좋아하는 거 뭐든지 할 테니까요!」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「おっぱいで挟むのも……く、口でおしゃぶりするのだって……頑張ります、からっ……避妊具をつけない……な、生の……挿入だって……」"
translation = "「가슴으로 끼우는 것도…… 이, 입으로 빠는 것도…… 열심히 할게요, 그러니까…… 피임기구를 안 쓰는…… 새, 생…… 삽입도……」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「っっ～～～！\u3000自分で言ったらいろいろ思い出しちゃいました……じわぁって、えっちな気持ちが……んんっ……ふぁ……はぁっ……」"
translation = "「윽~~~! 직접 말하니까 이것저것 떠올라버렸어요…… 지와아 하고 야한 기분이…… 응응…… 하아…… 하앗……」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「あんっ、あぁっ……そんなっ、このタイミングで押しつけないでくださいっっ……んふっ、んっ、だめですよぉ、会長さん……だめぇっ……」"
translation = "「앙, 아앗…… 그런, 이 타이밍에 밀어붙이지 마세요…… 응후, 응, 안 돼요, 회장님…… 안 돼……」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「会長さんの、男性器……勃起した……おち○ちんっ……私の割れ目に押し当てて……ますっ……こんなの感じちゃいますからぁっ……」"
translation = "「회장님의 자지…… 발기한…… 자지…… 제 갈라진 틈에 밀어붙이고…… 있어요…… 이런 거 느껴버린다고요……」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「ま、まだこの後も予定があるんですよ。それなのに、こんなっ……淫らな行為を……会長さんは後で掃除すればいい、なんて言いますけどっ、完全には無理なんですからねっ」"
translation = "「아, 아직 이 뒤에도 예정이 있다고요. 그런데 이런…… 음란한 행위를…… 회장님은 나중에 청소하면 된다고 하시지만, 완전히는 무리니까요!」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「だめ……だめ、なのに……このままじゃ入っちゃいますっ……会長さんの……んんぅ、くっ……あっ、やっ、あぁっ、だめっ、入れちゃ……会長さん、待って、お願いっっ」"
translation = "「안 돼…… 안 되는데…… 이대로는 들어가버려요…… 회장님의…… 응응, 윽…… 앗, 싫어, 아앗, 안 돼, 넣으면…… 회장님, 기다려줘요, 부탁이야!」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「このままじゃ……セックスになっちゃいますっっ<emoji=heart04>」"
translation = "「이대로는…… 섹스가 되어버려요!! <emoji=heart04>」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「んふぅ～～～～～～っ<emoji=heart04>\u3000おち○ちん……入っちゃいましたぁ……<emoji=heart04>」"
translation = "「응후~~~~~~ <emoji=heart04> 자지…… 들어가버렸어요…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「はぁっ、はぁっ、あぁっ……久し振り、ですから……気持ちいい……気持ちいいですぅっ<emoji=heart04>」"
translation = "「하앗, 하앗, 아앗…… 오랜만이니까…… 기분 좋아…… 기분 좋아요! <emoji=heart04>」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「あっ！\u3000あっ！\u3000あぁんっ！\u3000奥までっ、入ってっ……だめだめだめっ、全部入って来ちゃだめですっっ！！」"
translation = "「앗! 앗! 아앙! 끝까지, 들어와서…… 안 돼 안 돼 안 돼, 전부 들어오면 안 돼요!!」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「ううっ、ふっ……ふぁ……はぁっ、はぁっ……あぁぁっ……ずっぷり……全部……根元まで入れられちゃいました……」"
translation = "「으윽, 후…… 하아…… 하앗, 하앗…… 아아앗…… 즈뿌리…… 전부…… 뿌리까지 박혀버렸어요……」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「これじゃもう、完全に……セックス……ですよね……もぉ……あんなにだめって言ったのに……」"
translation = "「이러면 이제 완전히…… 섹스……잖아요…… 정말…… 그렇게 안 된다고 했는데……」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「セックス、成立しちゃいましたから……今やめても手遅れですよね……んんっ、ふぁっ、あっ……一番気持ちいいところ、くっつけちゃいましたから……」"
translation = "「섹스, 성립해버렸으니까…… 지금 그만둬도 늦었겠죠…… 응응, 하아, 앗…… 제일 기분 좋은 곳, 닿아버렸으니까……」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「いいですよ、セックス……もう最後まで気持ちよくして下さいっ<emoji=heart04>」"
translation = "「좋아요, 섹스…… 이제 끝까지 기분 좋게 해주세요 <emoji=heart04>」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「んあっ……はぁっ、はぁっ、あんっ……会長さんのおち○ちんっ、出たり入ったりしてますっっ<emoji=heart04>」"
translation = "「응앗…… 하앗, 하앗, 앙…… 회장님의 자지, 들어왔다 나갔다 하고 있어요! <emoji=heart04>」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「もう、何度も入れてもらってますけどっ、間が空いた分、敏感になっちゃってるみたいですっっ……んううっ！\u3000ふうっ！！」"
translation = "「정말, 몇 번이나 넣어졌지만, 기간이 비어서 그런지 민감해져 버린 것 같아요…… 응으윽! 후우!!」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「お、お願いです、からっ……ゆっくり……ゆっくり動いて下さいっ……今激しくされちゃうとっ……きっと声、我慢できませんのでっっ」"
translation = "「부, 부탁이니까요…… 천천히…… 천천히 움직여주세요…… 지금 격하게 하면…… 분명 목소리, 참을 수 없을 테니까요!」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「はぁっ……はぁっ……はぁっ……やっと……会長さんがやさしくしてくれました……んんっ、気持ちいい、ですっ……このまま……続けて下さいっ<emoji=heart04>」"
translation = "「하앗…… 하앗…… 하앗…… 드디어…… 회장님이 상냥하게 해주셨어…… 응응, 기분 좋아, 요…… 이대로…… 계속해주세요 <emoji=heart04>」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「んんっ……ふぁっ、あぁん<emoji=heart04>\u3000ひ、久し振りですから……い、いつもより気持ちいい気がします……会長さんのおち○ちんも、その、か、硬くて……太さも……すごい、ですよ<emoji=heart04>」"
translation = "「응응…… 하앗, 아앙 <emoji=heart04> 오, 오랜만이니까…… 평, 평소보다 기분 좋은 느낌이에요…… 회장님의 자지도, 그, 따, 딱딱하고…… 굵기도…… 굉장해요 <emoji=heart04>」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「や、やっぱり毎日するよりも、すこし間を空けた方が……き、気持ちいいセックスになるような……会長さんもそう思いませんか？」"
translation = "「여, 역시 매일 하는 것보다 조금 간격을 두는 게…… 기, 기분 좋은 섹스가 되는 것 같은…… 회장님도 그렇게 생각하지 않나요?」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「あっ、あっ、やぁぁんっ<emoji=heart04>\u3000だめですっ！\u3000今ので興奮しちゃったんですかっ？\u3000んあっ！\u3000そんなっ、やっ、やっ、あぁぁぁっっ<emoji=heart04>」"
translation = "「앗, 앗, 야아앙 <emoji=heart04> 안 돼요! 지금 걸로 흥분해버린 거예요? 응앗! 그런, 싫어, 싫어, 아아아앗! <emoji=heart04>」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「すごいっ！\u3000おち○ちんすごいですっっ<emoji=heart04>\u3000いきなり激しくされたらっ、私っ、私っっ<emoji=heart04>」"
translation = "「굉장해! 자지 굉장해요! <emoji=heart04> 갑자기 격하게 하면, 나, 나아 <emoji=heart04>」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「少し前までこんなの知らなかったのに……たまに自慰をする程度だったのにっ……会長さんとセックス、するようになって……すっかり淫らな肉体に変えられちゃいましたっっ<emoji=heart04>」"
translation = "「얼마 전까지 이런 거 몰랐는데…… 가끔 자위하는 정도였는데! 회장님과 섹스하게 되고 나서…… 완전히 음란한 몸으로 바뀌어버렸어요! <emoji=heart04>」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「会長さんっ……会長さんっ……いいっ<emoji=heart04>\u3000気持ちいい、ですっっ<emoji=heart04>\u3000もっと突いてぇっ<emoji=heart04>\u3000もっとずんずん突いて下さいっっ<emoji=heart04>」"
translation = "「회장님…… 회장님…… 좋아 <emoji=heart04> 기분 좋아, 요! <emoji=heart04> 더 찔러줘요 <emoji=heart04> 더 푹푹 찔러주세요! <emoji=heart04>」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「んあぁぁっ！\u3000はぁっ！\u3000挿入したばかりなのにっ、私っ、私っ、もうっっ<emoji=heart04>」"
translation = "「응아아앗! 하앗! 삽입한 지 얼마 안 됐는데, 나, 나, 벌써! <emoji=heart04>」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「ごめんなさいっ、私っ、気持ちよすぎてっっ……もうっ、イっちゃいますっ……イくっ<emoji=heart04>\u3000イくイくイくっっ<emoji=heart04>」"
translation = "「죄송해요, 저, 너무 기분 좋아서…… 벌써 가버려요…… 가버려! <emoji=heart04> 가, 가, 가버려엇! <emoji=heart04>」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「イくっ<emoji=heart04>\u3000イきますぅぅぅーーーっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가버려! 가버려요오오~~~! <emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「はぁ……はぁ……はぁっ……ご、ごめんなさい……いくら会長さんのお、おち○ちんが……気持ちよすぎるからって……こんなにすぐ……イっちゃう、なんて<emoji=heart04>」"
translation = "「하아…… 하아…… 하앗…… 죄, 죄송해요…… 아무리 회장님의 자, 자지가…… 너무 기분 좋다고 해도…… 이렇게 금방…… 가버리다니 <emoji=heart04>」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「会長さんの……射精まで、待てないなんて……彼女として恥ずかしいです……」"
translation = "「회장님의…… 사정까지 기다리지 못하다니…… 여자친구로서 부끄러워요……」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「んんっ……ちゃんとどぴゅってしないと、おち○ちん元の大きさに戻りませんよね……すみません……よければこのまま……わ、私のおま○こで……気持ちよくなってくださいっ」"
translation = "「응응…… 제대로 뿌직 하고 하지 않으면 자지가 원래 크기로 돌아가지 않겠죠…… 죄송해요…… 괜찮다면 이대로…… 제 보지로…… 기분 좋아져 주세요.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「年上彼女の……イきま○こ<emoji=heart04>で……射精して欲しいです……お願いしますっっ<emoji=heart04>」"
translation = "「연상 여자친구의…… 간 보지 <emoji=heart04>에…… 사정해 주세요…… 부탁드려요! <emoji=heart04>」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「んぁ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000嬉しい、ですっ<emoji=heart04>\u3000また、私の中っ、沢山ほじってくれてっ<emoji=heart04>\u3000ありがとうございますっっ<emoji=heart04>」"
translation = "「응아 <emoji=heart04> 하앗 <emoji=heart04> 앙 <emoji=heart04> 앙 <emoji=heart04> 기뻐요 <emoji=heart04> 다시 제 안을 잔뜩 헤집어주셔서…… 감사합니다! <emoji=heart04>」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「何度もだめって言っちゃってすみませんでしたっ<emoji=heart04>\u3000ほんとはすごくっ、して欲しかったんですっ<emoji=heart04>\u3000でもっ、恥ずかしくて、して下さいって言えなくてっっ<emoji=heart04>」"
translation = "「몇 번이나 안 된다고 해서 죄송했어요 <emoji=heart04> 사실은 정말 하고 싶었거든요 <emoji=heart04> 하지만 부끄러워서 해달라고 말을 못 해서! <emoji=heart04>」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「会長さんのセックス、好きですっ<emoji=heart04>\u3000こんなに気持ちいいこと、他に知りません、からっっ<emoji=heart04>\u3000私の方が、年上なのにっ……全部っ、恋人同士がすることっ、教えて下さってっっ」"
translation = "「회장님의 섹스, 좋아해요 <emoji=heart04> 이렇게 기분 좋은 거 달리 모르니까요! 제가 더 연상인데도…… 전부 연인끼리 하는 거 가르쳐주셔서……」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「ありがとう、ございますっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000会長さんっ、好き<emoji=heart04>\u3000好きですっ<emoji=heart04>\u3000大好きですっっ<emoji=heart04>」"
translation = "「고마워요 <emoji=heart04> 응응 <emoji=heart04> 회장님, 좋아 <emoji=heart04> 좋아해요 <emoji=heart04> 정말 좋아해요! <emoji=heart04>」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「はぁっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000もうだめですっ<emoji=heart04>\u3000えっちな声っ、抑えきれませんっ<emoji=heart04>\u3000会長さんのおち○ちんっ、ずぶっ、ずぶっ、て何度も出し入れしてもらってっっ<emoji=heart04>」"
translation = "「하앗 <emoji=heart04> 하앗 <emoji=heart04> 후아앗 <emoji=heart04> 이제 안 돼요 <emoji=heart04> 야한 목소리 못 참겠어요 <emoji=heart04> 회장님의 자지, 즈븍, 즈븍 하고 몇 번이나 넣었다 뺐다 해줘서! <emoji=heart04>」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「気持ちいいっ<emoji=heart04>\u3000おち○ちん気持ちいいですっ<emoji=heart04>\u3000もっと、もっと激しく突いて下さいっ……会長さんが大好きって言ってくれた私のおま○この内側、沢山ズボズボして下さいっ<emoji=heart04>」"
translation = "「기분 좋아 <emoji=heart04> 자지 기분 좋아요 <emoji=heart04> 더, 더 격하게 찔러주세요…… 회장님이 정말 좋아한다고 해준 제 보지 안쪽, 잔뜩 즈보즈보 해주세요 <emoji=heart04>」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「んあっ！\u3000はぁんっ！\u3000あっ<emoji=heart04>\u3000そこですっ、そこ<emoji=heart04>\u3000そこをグリグリって<emoji=heart04>\u3000もっとしてっ<emoji=heart04>\u3000会長さんっ<emoji=heart04>\u3000会長さん～～っっ<emoji=heart04>」"
translation = "「응앗! 하앙! 앗 <emoji=heart04> 거기에요, 거기 <emoji=heart04> 거기를 그리그리 하고 <emoji=heart04> 더 해줘요 <emoji=heart04> 회장님 <emoji=heart04> 회장님~~~! <emoji=heart04>」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「はぁっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000会長さんっ<emoji=heart04>\u3000学園の中なのにっ<emoji=heart04>\u3000まだ学園長の私なのにっ<emoji=heart04>\u3000だめっ<emoji=heart04>\u3000絶対だめ、なのにっ<emoji=heart04>」"
translation = "「하앗 <emoji=heart04> 하앙 <emoji=heart04> 회장님 <emoji=heart04> 학원 안인데 <emoji=heart04> 아직 학원장인 나인데 <emoji=heart04> 안 돼 <emoji=heart04> 절대 안 되는데! <emoji=heart04>」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「気持ちよすぎてっ、私っ<emoji=heart04>\u3000おかしくなっちゃいますっっ<emoji=heart04>\u3000好き<emoji=heart04>\u3000好きですっ<emoji=heart04>\u3000会長さんっ<emoji=heart04>\u3000んあぁぁっ<emoji=heart04>\u3000あぁっ<emoji=heart04>」"
translation = "「너무 기분 좋아서, 나 <emoji=heart04> 이상해져 버려요! 좋아 <emoji=heart04> 좋아해요 <emoji=heart04> 회장님 <emoji=heart04> 응아아앗 <emoji=heart04> 아앗 <emoji=heart04>」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「学園長室でっ、恋人がするセックスしちゃってっっ<emoji=heart04>\u3000私は悪い学園長ですっ<emoji=heart04>\u3000ごめんなさいっ<emoji=heart04>\u3000ごめんなさいっ<emoji=heart04>\u3000でもっっ<emoji=heart04>」"
translation = "「학원장실에서 연인이 하는 섹스를 해버리고! 저는 나쁜 학원장이에요 <emoji=heart04> 죄송해요 <emoji=heart04> 죄송해요 <emoji=heart04> 하지만! <emoji=heart04>」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「好きっ<emoji=heart04>\u3000好きなんですっ<emoji=heart04>\u3000すごくすごくっ、すご～～く好きだからっ<emoji=heart04>\u3000私っ、我慢するの無理ですっ<emoji=heart04>\u3000もっとしたいっ<emoji=heart04>\u3000何度も何度も愛し合いたいですっ<emoji=heart04>」"
translation = "「좋아 <emoji=heart04> 좋아하는걸요 <emoji=heart04> 아주 아주 아주~~ 좋아하니까! 저 참는 거 무리예요 <emoji=heart04> 더 하고 싶어 <emoji=heart04> 몇 번이고 몇 번이고 사랑을 나누고 싶어요! <emoji=heart04>」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「あぁっ<emoji=heart04>\u3000あん<emoji=heart04>\u3000あん<emoji=heart04>\u3000あん<emoji=heart04>\u3000ごめっ、ごめんなさいっ、私またっ、イきそうですっっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000やだっ、また先にっ<emoji=heart04>\u3000先にイっちゃいます<emoji=heart04>」"
translation = "「아앗 <emoji=heart04> 앙 <emoji=heart04> 앙 <emoji=heart04> 앙 <emoji=heart04> 죄, 죄송해요, 저 또 가버릴 것 같아요! <emoji=heart04> 앗 <emoji=heart04> 싫어, 또 먼저 <emoji=heart04> 먼저 가버려요 <emoji=heart04>」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「まだですかっ？\u3000射精っ<emoji=heart04>\u3000いっぱい出すの、まだなんですかっ？\u3000私また先にイくのやですっっ<emoji=heart04>\u3000来て<emoji=heart04>\u3000早く来て下さいっっ<emoji=heart04>」"
translation = "「아직인가요? 사정 <emoji=heart04> 잔뜩 내보내는 거 아직인가요? 저 또 먼저 가는 거 싫어요! <emoji=heart04> 와줘요 <emoji=heart04> 빨리 와주세요! <emoji=heart04>」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「んあ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000激しいですっ<emoji=heart04>\u3000これっ、出す直前ってことですよね？\u3000嬉しいですっ<emoji=heart04>\u3000お願いしますっ<emoji=heart04>\u3000またイっちゃう前にっ<emoji=heart04>\u3000んあぁぁぁぁっ<emoji=heart04>」"
translation = "「응아 <emoji=heart04> 앗 <emoji=heart04> 앗 <emoji=heart04> 앙 <emoji=heart04> 격해요 <emoji=heart04> 이거 내보내기 직전이라는 거죠? 기뻐요 <emoji=heart04> 부탁드려요! 또 가버리기 전에! 응아아아아앗! <emoji=heart04>」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「もう無理ですっ<emoji=heart04>\u3000イく<emoji=heart04>\u3000イきます<emoji=heart04>\u3000イくイくイくイくっっ<emoji=heart04>\u3000一緒に<emoji=heart04>\u3000一緒がいいですっ<emoji=heart04>\u3000早くっ<emoji=heart04>\u3000ああああぁぁぁっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「이제 무리예요! 가버려 <emoji=heart04> 가요 <emoji=heart04> 가, 가, 가버려어! <emoji=heart04> 같이 <emoji=heart04> 같이 가고 싶어요! 빨리! 아아아아아앗! <emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「私っ、もうイきます<emoji=heart04>\u3000イくイくイくっ<emoji=heart04>\u3000んうううううっ<emoji=heart04>\u3000んぐっ<emoji=heart04>」"
translation = "「저, 이제 가요 <emoji=heart04> 가, 가, 가버려! <emoji=heart04> 응으으으으으윽! <emoji=heart04> 응긋 <emoji=heart04>」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「イぐぅ～～～～～～～～っっ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가버려어어어어어~~~~엇!! <emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「んうぅっ<emoji=heart04>\u3000ふうっ<emoji=heart04>\u3000うっ……ふ……ふぅぅ……<emoji=heart04>」"
translation = "「응으읏 <emoji=heart04> 후우 <emoji=heart04> 읏…… 후…… 후우우…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「精液……出てますっ……んんぅ……く……すごい……沢山……ありがとうございますっ……<emoji=heart04>」"
translation = "「정액…… 나오고 있어요…… 응응으…… 윽…… 굉장해…… 잔뜩…… 감사합니다…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「さっきと違って今回は……ちゃんと一緒に……イけたみたいです……嬉しい<emoji=heart04>」"
translation = "「아까와 달리 이번에는…… 제대로 같이…… 간 것 같아요…… 기뻐요 <emoji=heart04>」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「はぁっ……はぁっ……んぅっ……射精の勢い……すごいです……久し振りですから、量も……んっ、多いみたいですね……まだ出続けてます……<emoji=heart04>」"
translation = "「하앗…… 하앗…… 응윽…… 사정하는 기세가…… 굉장해요…… 오랜만이니까 양도…… 응, 많은 것 같네요…… 아직 계속 나오고 있어요…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「こんな場所で……その……セックス<emoji=heart04>\u3000しちゃいましたけど……もう、今更ですから……その、全部出し切るまで……気持ちよくなって下さいね<emoji=heart04>」"
translation = "「이런 장소에서…… 그…… 섹스 <emoji=heart04> 해버렸지만…… 이제 와서니까요…… 그, 전부 다 낼 때까지…… 기분 좋아져 주세요 <emoji=heart04>」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「んぅ……おなか熱いです……濃いのがびゅーっ、びゅーって……出てて……んふ<emoji=heart04>」"
translation = "「응으…… 배 안이 뜨거워요…… 진한 게 뷰우, 뷰우 하고…… 나와서…… 응후 <emoji=heart04>」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「はぁ……はぁ……そろそろ……射精もおしまいですか？\u3000その、おち○ちんの方は、全然小さくならないみたいですけど……」"
translation = "「하아…… 하아…… 슬슬…… 사정도 끝인가요? 그, 자지 쪽은 전혀 작아지지 않는 것 같지만요……」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「ふあぁん<emoji=heart04>\u3000あぁっ、おち○ちん抜けて……やっ、だめですっっ<emoji=heart04>\u3000んんんんっ<emoji=heart04>」"
translation = "「후아앙 <emoji=heart04> 아앗, 자지 빠져서…… 싫어, 안 돼요! <emoji=heart04> 응으으으응 <emoji=heart04>」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「はぁ……はぁ……せっかく出してもらったのに……溢れちゃいます<emoji=heart04>\u3000勿体ないです……んんっ<emoji=heart04>」"
translation = "「하아…… 하아…… 모처럼 내보내 주셨는데…… 넘쳐버려요 <emoji=heart04> 아까워라…… 응응 <emoji=heart04>」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「うぁ……んんぅっ、おま○この圧力で、びゅるっと出てきました……<emoji=heart04>\u3000ふぅっ、んっ<emoji=heart04>\u3000射精してるみたいです<emoji=heart04>」"
translation = "「우아…… 응응윽, 보지의 압력으로 뷰릇 하고 흘러나왔어요…… <emoji=heart04> 후우, 응 <emoji=heart04> 사정하는 것 같아요 <emoji=heart04>」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「やっぱり……普段より断然濃いですね<emoji=heart04>\u3000んふっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000どろぉ～～っと垂れてきて……ふふっ、すごくえっちです<emoji=heart04>」"
translation = "「역시…… 평소보다 확실히 진하네요 <emoji=heart04> 응후 <emoji=heart04> 앗 <emoji=heart04> 도로오~ 하고 늘어져서…… 후후, 정말 야해요 <emoji=heart04>」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「こんなの見てしまったら……やっぱり、まだまだし足りないのかなって心配になっちゃいますよ<emoji=heart04>」"
translation = "「이런 걸 봐버리면…… 역시 아직 한참 부족한 건가 걱정돼버린다고요 <emoji=heart04>」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「あれだけ激しく愛し合ったのに、誰も来ませんでしたし……きっともう、誰も来ないと思います」"
translation = "「저렇게 격하게 사랑을 나눴는데 아무도 안 왔고…… 분명 이제 아무도 안 올 거예요.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「ですから、その……」"
translation = "「그러니까, 그……」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「ま、まだ元気いっぱいなおち○ちん、使って……もっと私のことを気持ちよくして下さい<emoji=heart04>」"
translation = "「아, 아직 기운 넘치는 자지 써서…… 더 저를 기분 좋게 해주세요 <emoji=heart04>」"

