[[dialogue]]
speaker = "unk"
original = "第２話,勇者スキルは万能です,P"
translation = "제2화, 용사 스킬은 만능입니다"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「──おや？\u3000会長の制服、裾が少しほつれているね」"
translation = "「──어라? 회장의 교복, 밑단이 조금 풀려 있네」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あ、ホントだ。どこかに引っかけちゃったのかな？」"
translation = "「아, 진짜다. 어디 걸린 걸까?」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「こんな時にさっと直してあげられたらいいんだけどねー。残念無念、ボクはお裁縫はできないぜ！」"
translation = "「이럴 때 슥 고쳐줄 수 있으면 좋을 텐데 말이야~. 유감천만, 난 바느질은 못 한다고!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「私も人にやってあげられるほどじゃないかなぁ……」"
translation = "「나도 남에게 해줄 정도는 아닐지도……」"

[[dialogue]]
speaker = "unk"
original = "帰ってから母さんに頼もうかな"
translation = "집에 가서 엄마한테 부탁할까"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「こらこら。ダメだよ会長。君は生徒の模範になるべき立場なんだから。たとえ短い時間でも示しがつかないじゃないか」"
translation = "「이봐 이봐. 안 돼 회장. 너는 학생의 모범이 되어야 할 입장이니까. 비록 짧은 시간이라도 본보기가 서지 않잖아」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「おぉ。流石は本物の王子様だ。言うことが違うなー」"
translation = "「오오. 역시 진짜 왕자님이다. 하는 말이 다르네~」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「私が直そう。上着を脱いで渡してもらえるかな？」"
translation = "「내가 고쳐주지. 상의를 벗어서 건네줄 수 있을까?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ユーリスくんってお裁縫もできちゃうんだ？\u3000すごい」"
translation = "「유리스 군은 바느질도 할 줄 알아? 대단해」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「ささっと縫ってしまうね、会長。では──剣よ！」"
translation = "「금방 꿰매줄게, 회장. 그럼── 검이여!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ユーリスくんのバッジが光った……！？」"
translation = "「유리스 군의 배지가 빛났어……!?」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「このバッジは武器化していない時の我が聖剣『エーヴィヒリヒト』なんです」"
translation = "「이 배지는 무기화하지 않았을 때의 우리 성검 『에비히리히트』입니다」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「そして勇者スキル『裁縫』を発動しました」"
translation = "「그리고 용사 스킬 『재봉』을 발동했습니다」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「す、すごいよっ！\u3000ユーリスくんの手つき、まるで職人さんみたいに高速で動いてるよ！？」"
translation = "「대, 대단해! 유리스 군의 손놀림, 마치 장인처럼 고속으로 움직이고 있어!?」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「エーヴィヒリヒトが記憶できるものは剣技だけに非ず。初代から先代まで、歴代から受け継いだ様々な技能を継承しています」"
translation = "「에비히리히트가 기억할 수 있는 것은 검술뿐만이 아닙니다. 초대부터 선대까지, 역대로부터 계승된 다양한 기능을 계승하고 있습니다」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「持ち主を万能へと近づける勇者の剣……それが我が聖剣の正体でして……ぬいぬい」"
translation = "「소유자를 만능에 가깝게 만드는 용사의 검…… 그것이 우리 성검의 정체라서…… 한 땀 한 땀」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「めっちゃカッコいいこと言って制服のほつれ直してるのシュールだな～」"
translation = "「엄청 멋있는 말 하면서 교복 밑단 고치고 있는 거 슈르하네~」"

[[dialogue]]
speaker = "unk"
original = "勇者スキルって他に何を覚えてるんだ？"
translation = "용사 스킬은 또 뭘 배우고 있어?"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「そうだね。シャツの染み抜きにポーチドエッグ作り。麻雀のつばめ返しにテーブルクロス引きまで万全さ」"
translation = "「글쎄. 셔츠 얼룩 제거에 수란 만들기. 마작의 츠바메가에시에 테이블보 빼기까지 만전이지」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「何だか急に庶民じみてきてない？\u3000しかも反則技も入ってたような……聖剣ってそれでいいの……？」"
translation = "「왠지 갑자기 서민스러워지지 않았어? 게다가 반칙 기술도 들어있었던 것 같은데…… 성검이 그래도 되는 거야……?」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「いやぁでもこれ便利だね。どんなバイト先でも覇権取れちゃうぜ。その聖剣があれば無敵じゃない？」"
translation = "「이야~ 그래도 이거 편리하네. 어떤 알바처에서도 패권을 차지하겠어. 그 성검만 있으면 무적 아냐?」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「いえ、もちろんデメリットもあります」"
translation = "「아니요, 물론 단점도 있습니다」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「私の力量を大きく越えた技を再現するには、星力の消費が激しく、体の負担も大きい。ですから聖剣を使いこなすには私自身も強くなければいけません」"
translation = "「제 역량을 크게 벗어난 기술을 재현하려면 성력 소모가 격렬하고, 몸의 부담도 큽니다. 그러니 성검을 능숙하게 다루려면 제 자신도 강해져야만 합니다」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「そして……私も聖剣に選ばれたからには、この剣にふさわしい技を残さなければ」"
translation = "「그리고…… 저도 성검에게 선택받은 이상, 이 검에 어울리는 기술을 남겨야 하니까요」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「未来でこの剣が必要になった時、人々を守れるように。誰かの役に立てるように」"
translation = "「미래에 이 검이 필요해졌을 때, 사람들을 지킬 수 있도록. 누군가에게 도움이 될 수 있도록」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「そんな願いとともにジルラント王国に代々受け継がれてきたのが、この聖剣なのです」"
translation = "「그런 소망과 함께 질란트 왕국에 대대로 계승되어 온 것이 바로 이 성검인 것입니다」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（つまり前の聖剣所有者は、裁縫ができたり、ポーチドエッグが作れたってこと？）"
translation = "（즉 이전 성검 소유자는 바느질을 할 줄 알거나, 수란을 만들 수 있었다는 거야?）"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（他にもテーブルクロス引きに麻雀に……ジルラント王家、けっこうフリーダムなのでは……？）"
translation = "（그 외에도 테이블보 빼기에 마작에…… 질란트 왕가, 꽤 자유로운 거 아냐……?）"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「──っと、はい。出来たよ会長。着心地はどうかな」"
translation = "「──자, 여기. 다 됐어 회장. 입어보니 어때」"

[[dialogue]]
speaker = "unk"
original = "ばっちりだ。ありがとう"
translation = "완벽해. 고마워"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「あ。そんな雑に着たら……ほら。ネクタイが歪んじゃった。動かないで。直してあげるから」"
translation = "「아. 그렇게 대충 입으면…… 봐. 넥타이가 삐뚤어졌잖아. 움직이지 마. 고쳐줄 테니까」"

[[dialogue]]
speaker = "unk"
original = "──！？"
translation = "──!?"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「どうしたんだい、急に顔を赤くして」"
translation = "「왜 그래, 갑자기 얼굴을 붉히고」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「じっとしていてくれ……うん、これでよし」"
translation = "「가만히 있어 줘…… 응, 이걸로 됐어」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「これで星徒会長らしくなったかな」"
translation = "「이걸로 성도회장답게 되었으려나」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「王子様にネクタイ直させるなんて、ずいぶん偉くなったねー、会長」"
translation = "「왕자님한테 넥타이 고치게 하다니, 아주 출세했네~, 회장」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「王子なんてただの身分ですよ。今の私は新星学園の星騎士にして、皆さんの仲間です」"
translation = "「왕자란 건 그저 신분일 뿐이에요. 지금의 저는 신성학원의 성기사이자, 여러분의 동료입니다」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「皆さんの助けになるのなら、この聖剣のスキルを存分に振るいましょう」"
translation = "「여러분의 도움이 된다면, 이 성검의 스킬을 마음껏 휘두르도록 하죠」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「たとえば……料理を振る舞うのもやぶさかではありません。この聖剣には様々な料理のレシピが刻まれていますから」"
translation = "「예를 들어…… 요리를 대접하는 것도 마다하지 않습니다. 이 성검에는 다양한 요리 레시피가 새겨져 있으니까요」"

[[dialogue]]
speaker = "unk"
original = "ユーリスはいいお嫁さんになりそうだな……"
translation = "유리스는 좋은 신붓감이 될 것 같네……"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「お嫁さん──！？」"
translation = "「신붓감──!?」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「な、何を言っているんだい会長は……私は王子……いや、それ以前に男だよ」"
translation = "「무, 무슨 말을 하는 거야 회장은…… 나는 왕자…… 아니, 그 이전에 남자라고」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「そーそー。王子様を捕まえてお嫁さんなんて、すっとこどっこいにも程があるよ」"
translation = "「그래 그래. 왕자님을 붙잡고 신붓감이라니, 얼간이 짓도 정도가 있지」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「ね、王子？」"
translation = "「그치, 왕자?」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「え、ええ……そうですね」"
translation = "「에, 에에…… 그렇네요」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「ジルラント王国では、聖剣と王位は男性が継ぐものなんだ。だから性別には一応注意を払ってほしいかな……あはは」"
translation = "「질란트 왕국에서는 성검과 왕위는 남성이 잇는 것이니까요. 그러니 성별에는 일단 주의를 기울여 줬으면 좋겠어…… 아하하」"

