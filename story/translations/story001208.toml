[[dialogue]]
speaker = "unk"
original = "キリカ師匠からも合格をもらい、花婿修行を終えた。"
translation = "키리카 스승님에게도 합격을 받아 신랑 수업을 마쳤다."

[[dialogue]]
speaker = "unk"
original = "今度こそフィオナを満足させる式を挙げるべく、また式場へ向かった。"
translation = "이번에야말로 피오나를 만족시킬 식을 올리고자 다시 예식장으로 향했다."

[[dialogue]]
speaker = "イレーナ"
original = "「三度目の正直……になるといいのですが。女神様に目をつむっていただくのもそろそろ心苦しくなってきましたので」"
translation = "「삼세판……이 되면 좋겠습니다만. 여신님께서 눈감아 주시는 것도 슬슬 마음이 무거워지기 시작해서요.」"

[[dialogue]]
speaker = "フィオナ"
original = "「あはは……今度こそ元に戻れると思います。多分」"
translation = "「아하하…… 이번에야말로 원래대로 돌아갈 수 있을 거예요. 아마도.」"

[[dialogue]]
speaker = "トワ先生"
original = "「ねぇねぇ、花婿修行ならキリカちゃんやナミエルちゃんとも、結婚式のふりをしてみたら？」"
translation = "「저기 저기, 신랑 수업이라면 키리카짱이나 나미엘짱하고도 결혼식 흉내를 내보면 어때?」"

[[dialogue]]
speaker = "ナミエル"
original = "「えっ？\u3000私とメイド長がですか？」"
translation = "「에? 저랑 메이드장이 말입니까?」"

[[dialogue]]
speaker = "トワ先生"
original = "「フィオナちゃんを満足させるためには、堂々とした花婿にならないと。それに、せっかくウェディングドレスを着たんだから、式を挙げてみたくない？」"
translation = "「피오나짱을 만족시키려면 당당한 신랑이 되어야지. 게다가 모처럼 웨딩드레스를 입었으니까 식을 올려보고 싶지 않아?」"

[[dialogue]]
speaker = "ナミエル"
original = "「そ、そんなことは……」"
translation = "「그, 그런 건……」"

[[dialogue]]
speaker = "キリカ"
original = "「お嬢様のためならやぶさかではないですが……」"
translation = "「아가씨를 위해서라면 마다하지 않겠습니다만……」"

[[dialogue]]
speaker = "フィオナ"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "フィオナ"
original = "「私も賛成です。緋宮会長、お願いしてもいいでしょうか？」"
translation = "「저도 찬성이에요. <u>히노미야</u> 회장님, 부탁드려도 될까요?」"

[[dialogue]]
speaker = "unk"
original = "わかった"
translation = "알았어"

[[dialogue]]
speaker = "イレーナ"
original = "「わかりました。では会長さん、ナミエルさん、こちらに」"
translation = "「알겠습니다. 그럼 회장님, 나미엘 씨, 이쪽으로.」"

[[dialogue]]
speaker = "ナミエル"
original = "「は、はい」"
translation = "「네, 네.」"

[[dialogue]]
speaker = "ナミエル"
original = "「あくまでこれは練習。私は式を挙げたいなんて思っていませんので。フィオナお嬢様のためですから、勘違いしないでくださいね？」"
translation = "「어디까지나 이건 연습. 전 식을 올리고 싶다거나 생각하지 않으니까요. 피오나 아가씨를 위해서니까 착각하지 마세요?」"

[[dialogue]]
speaker = "イレーナ"
original = "「ふふ。では始めましょうか」"
translation = "「후후. 그럼 시작할까요.」"

[[dialogue]]
speaker = "イレーナ"
original = "「新郎緋宮クロト。あなたはナミエル・クレシェンテを妻とし、健やかなる時も病める時も、彼女を愛し、慈しむことを誓いますか？」"
translation = "「신랑 <u>히노미야</u> 쿠로토. 당신은 나미엘 크레셴테를 아내로 맞아, 즐거울 때나 괴로울 때나, 부유할 때나 가난할 때나, 그녀를 사랑하고 아낄 것을 맹세합니까?」"

[[dialogue]]
speaker = "unk"
original = "はい、誓います"
translation = "네, 맹세합니다"

[[dialogue]]
speaker = "フィオナ"
original = "（私の時は緊張しながら言っていたのに……）"
translation = "(내 때는 긴장하면서 말하더니……)"

[[dialogue]]
speaker = "イレーナ"
original = "「新婦ナミエル・クレシェンテ。あなたは緋宮クロトを夫とし、健やかなる時も病める時も、彼を愛し、慈しむことを誓いますか？」"
translation = "「신부 나미엘 크레셴테. 당신은 <u>히노미야</u> 쿠로토를 남편으로 맞아, 즐거울 때나 괴로울 때나, 부유할 때나 가난할 때나, 그를 사랑하고 아낄 것을 맹세합니까?」"

[[dialogue]]
speaker = "ナミエル"
original = "「ち、ちか……」"
translation = "「매, 매맹……」"

[[dialogue]]
speaker = "unk"
original = "顔が真っ赤だよ"
translation = "얼굴이 새빨개"

[[dialogue]]
speaker = "ナミエル"
original = "「み、見ないでください！\u3000ハレンチです！」"
translation = "「보, 보지 마세요! 파렴치합니다!」"

[[dialogue]]
speaker = "ナミエル"
original = "「コホン。ち、誓います……」"
translation = "「큼큼. 매, 맹세합니다……」"

[[dialogue]]
speaker = "イレーナ"
original = "「では誓いの口付けを──」"
translation = "「그럼 맹세의 입맞춤을──」"

[[dialogue]]
speaker = "ナミエル"
original = "「とてもハレンチですっ！？」"
translation = "「무척 파렴치합니다!?」"

[[dialogue]]
speaker = "フィオナ"
original = "「そ、そうですっ。<b>ふり</b>なんですからそこまでしなくても……私の時はしませんでしたし……」"
translation = "「마, 맞아요. <b>흉내</b>니까 그렇게까지 안 해도…… 제 때는 안 했고요……」"

[[dialogue]]
speaker = "イレーナ"
original = "「ふりだからと、キスをしなかったのも、戦闘服が戻らない原因かと思いまして」"
translation = "「흉내라고 키스를 안 한 것도 전투복이 돌아가지 않는 원인인가 싶어서요.」"

[[dialogue]]
speaker = "イレーナ"
original = "「とはいえ本当にキスすると、ふりでは済まなくなりますし、お互いに頬にキスをするのはいかがでしょうか？」"
translation = "「그렇다고 진짜로 키스하면 흉내로 끝나지 않게 되니 서로 뺨에 키스하는 건 어떨까요?」"

[[dialogue]]
speaker = "ナミエル"
original = "「それなら……いえ、あくまでお嬢様のためですから。結婚式らしくするためですからねっ。そのままでは届かないのでしゃがんでください」"
translation = "「그거라면…… 아니, 어디까지나 아가씨를 위해서니까요. 결혼식답게 하기 위해서니까요! 그대로는 안 닿으니까 숙여주세요.」"

[[dialogue]]
speaker = "ナミエル"
original = "「で、では……ん～」"
translation = "「그, 그럼…… 음~」"

[[dialogue]]
speaker = "ナミエル"
original = "「チュッ」"
translation = "「쪽」"

[[dialogue]]
speaker = "フィオナ"
original = "「ひゃっ」"
translation = "「히얏」"

[[dialogue]]
speaker = "unk"
original = "じゃあ俺からも……"
translation = "그럼 나도……"

[[dialogue]]
speaker = "ナミエル"
original = "「んっ」"
translation = "「음」"

[[dialogue]]
speaker = "フィオナ"
original = "「はわっ」"
translation = "「하와와」"

[[dialogue]]
speaker = "ナミエル"
original = "「キ、キスされてしまいました……」"
translation = "「키, 키스당해 버렸습니다……」"

[[dialogue]]
speaker = "フィオナ"
original = "「うぅ～……ほんとにキスしちゃった……」"
translation = "「으으~…… 진짜로 키스해 버렸어……」"

[[dialogue]]
speaker = "キリカ"
original = "「フィオナお嬢様、小さな子どもではないのですから、そんなに顔を真っ赤にされなくても」"
translation = "「피오나 아가씨, 어린아이도 아니신데 그렇게 얼굴을 붉히지 않으셔도.」"

[[dialogue]]
speaker = "フィオナ"
original = "「そう言うキリカだって顔赤くなってるじゃないっ」"
translation = "「그렇게 말하는 키리카야말로 얼굴 붉히고 있잖아!」"

[[dialogue]]
speaker = "キリカ"
original = "「こ、これは……空調が効きすぎているのでしょうか、少し暑くて……」"
translation = "「이, 이건…… 에어컨이 너무 세게 돌아가서인지 좀 더워서……」"

[[dialogue]]
speaker = "フィオナ"
original = "「むしろ涼しいくらいだと思うけど……」"
translation = "「오히려 시원할 정도라고 생각하는데……」"

[[dialogue]]
speaker = "イレーナ"
original = "「ではキリカさんも愛を誓いましょうか」"
translation = "「그럼 키리카 씨도 사랑을 맹세하죠.」"

[[dialogue]]
speaker = "トワ先生"
original = "「イレーナちゃん、ちょっと楽しんでない？」"
translation = "「이레이나짱, 좀 즐기고 있지 않아?」"

[[dialogue]]
speaker = "イレーナ"
original = "「いえいえ。まさかそんな。私は敬虔な神官ですから」"
translation = "「아뇨아뇨. 설마 그럴 리가요. 전 경건한 신관이니까요.」"

[[dialogue]]
speaker = "キリカ"
original = "「ぅ……ではキスさせていただきますね……」"
translation = "「으윽…… 그럼 키스하겠습니다……」"

[[dialogue]]
speaker = "キリカ"
original = "「ちゅっ」"
translation = "「쪽」"

[[dialogue]]
speaker = "unk"
original = "俺からもお返しに……"
translation = "나도 답례로……"

[[dialogue]]
speaker = "キリカ"
original = "「……っ」"
translation = "「……윽」"

[[dialogue]]
speaker = "キリカ"
original = "「……これがキスなのですね」"
translation = "「……이게 키스군요.」"

[[dialogue]]
speaker = "ナミエル"
original = "「頬に感触が残っています……」"
translation = "「뺨에 감촉이 남아있어요……」"

[[dialogue]]
speaker = "フィオナ"
original = "（ナミエルもキリカもまんざらでもなさそう……それに緋宮会長もあんなに顔を赤くして……）"
translation = "(나미엘도 키리카도 싫지 않은 기색이야…… 게다가 <u>히노미야</u> 회장도 저렇게 얼굴을 붉히고……)"

[[dialogue]]
speaker = "フィオナ"
original = "（私のために練習してくれているはずなのに……どうして胸のモヤモヤが大きくなっていくの……？）"
translation = "(나를 위해 연습해 주는 것일 텐데…… 어째서 가슴의 술렁임이 커져만 가는 거지……?)"

[[dialogue]]
speaker = "unk"
original = "フィオナ……？"
translation = "피오나……?"

[[dialogue]]
speaker = "フィオナ"
original = "「す、すみませんっ」"
translation = "「죄, 죄송해요!」"

[[dialogue]]
speaker = "unk"
original = "俺が呼び止めるより先に、フィオナが式場を飛び出してしまった。"
translation = "내가 불러 세우기도 전에 피오나가 식장을 뛰쳐나가 버렸다."

