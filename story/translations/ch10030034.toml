[[dialogue]]
speaker = "unk"
original = "第４話,花嫁修業をしよう,P"
translation = "제4화, 신부 수업을 하자, P"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスの花嫁修業を手伝うと言って迎えた週末。"
translation = "비너스의 신부 수업을 도와주기로 하고 맞이한 주말."

[[dialogue]]
speaker = "unk"
original = "じゃあ早速、花嫁修業をやっていくぞ！"
translation = "자, 그럼 바로 신부 수업을 시작하자!"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ちょっと待って、花嫁修業をクロトに手伝ってもらうのは、なにかおかしくないかしら！？」"
translation = "「잠깐만, 신부 수업을 쿠로토가 도와주는 건 뭔가 이상하지 않아!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「――花嫁修業教室のバイトをやったことがある？\u3000そんなのがあるの！？」"
translation = "「――신부 수업 교실 알바를 해본 적이 있다고? 그런 게 있어!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ていうか、クロトってもしかして、家事万能とかだったりする！？」"
translation = "「그보다 쿠로토는 설마 가사 만능이라거나 그래!?」"

[[dialogue]]
speaker = "unk"
original = "バイトでひと通りはできるようになった"
translation = "알바하면서 웬만한 건 할 수 있게 됐어."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「今更だけど、私よりクロトの方が女子力高いわ！」"
translation = "「이제 와서 하는 말이지만, 나보다 쿠로토가 더 여자력이 높아!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「もしかして過酷な運命ってこういうこと！？\u3000でも、私は花嫁修業をして、クロトにプロポーズするって決めたんだから……！」"
translation = "「설마 가혹한 운명이 이런 거였어!? 하지만 나는 신부 수업을 해서 쿠로토에게 프로포즈하기로 결심했으니까……!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「――まずは掃除から？\u3000うん、わかったわ！」"
translation = "「――우선은 청소부터? 응, 알았어!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「…………クロト、早速だけど、助けて欲しいことがあるの」"
translation = "「…………쿠로토, 바로지만 도와줬으면 하는 게 있어.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「両足に掃除機のコードが絡まって、身動きが取れなくなったわ！」"
translation = "「양발에 청소기 코드가 꼬여서 움직일 수 없게 됐어!」"

[[dialogue]]
speaker = "unk"
original = "どうしてそうなった！？"
translation = "어쩌다 그렇게 된 거야!?"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「自分でもわからないわ！\u3000掃除機で変なものを吸わないように注意してたら、足元がこうなってたの！」"
translation = "「나도 모르겠어! 청소기로 이상한 걸 빨아들이지 않도록 주의하고 있었더니 발밑이 이렇게 돼 있었어!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロト～！\u3000大変よ！\u3000洗濯機から泡が沢山溢れてきてるわ！」"
translation = "「쿠로토~! 큰일이야! 세탁기에서 거품이 엄청 넘쳐나고 있어!」"

[[dialogue]]
speaker = "unk"
original = "それ絶対に、洗剤入れすぎなやつ！"
translation = "그거 분명히 세제 너무 많이 넣은 거야!"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そうなの！？\u3000クロトに言われた通り、カップ一杯分くらいで入れたはずなんだけど……」"
translation = "「그래!? 쿠로토가 말한 대로 컵 한 잔 정도 넣었을 텐데……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「え？\u3000カップ一杯分って、飲む時に使うコップの一杯分くらいって意味じゃないの！？」"
translation = "「에? 컵 한 잔이라는 게 마실 때 쓰는 컵 한 잔 정도라는 뜻 아니었어!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「カップじゃなくて、洗剤容器のキャップ！？\u3000目盛りが付いてる？\u3000気がつかなかったわ……！」"
translation = "「컵이 아니라 세제 용기 뚜껑!? 눈금이 달려 있다고? 몰랐어……!」"

[[dialogue]]
speaker = "unk"
original = "そんなこんなで、ドタバタと午前中が過ぎていって――"
translation = "이러쿵저러쿵하며 소란스러운 오전이 지나가고――"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「自分のことだから知ってたけど……いざやってみようとすると私、全然家事ができないわ……」"
translation = "「내 일이라 알고는 있었지만…… 막상 해보려고 하니 나, 전혀 가사 일을 못 하네……」"

[[dialogue]]
speaker = "unk"
original = "「でも、一生懸命頑張ってたよ」と俺はヴィーナスの頭を撫でる。"
translation = "「그래도 열심히 노력했어」라며 나는 비너스의 머리를 쓰다듬는다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ん……♪」"
translation = "「응……♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「こんなこと言ったら変かもしれないけど……」"
translation = "「이런 말 하면 이상할지도 모르지만……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロトと一緒に掃除や洗濯をしてた時、これまでしたことがないはずなのに、なんだかすごく懐かしい気持ちになったわ」"
translation = "「쿠로토랑 같이 청소나 빨래를 하고 있을 때, 지금까지 해본 적 없을 텐데 왠지 굉장히 그리운 기분이 들었어.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「だから、上手く行ってないけど……花嫁修業、ちょっと楽しいかも、なんて……」"
translation = "「그래서 잘 안되긴 하지만…… 신부 수업, 조금 즐거울지도, 라고……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「って、そんな悠長なことを言ってる場合じゃないわよね！」"
translation = "「아니, 이런 한가한 소릴 하고 있을 때가 아니지!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「早く花嫁修業を終えて、クロトに相応しい女の子にならないと――」"
translation = "「얼른 신부 수업을 마치고 쿠로토에게 어울리는 여자아이가 되어야――」"

[[dialogue]]
speaker = "unk"
original = "相応しいとか、気にしなくていい"
translation = "어울리는지 같은 건 신경 쓰지 않아도 돼."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「――私が花嫁修業を終えるまで、付きっきりで教えるから、焦らなくていい？」"
translation = "「――내가 신부 수업을 마칠 때까지 곁에서 가르쳐줄 테니까 서두르지 않아도 된다고?」"

[[dialogue]]
speaker = "unk"
original = "一生できなきゃ、一生教える。魔王になって、世界を救って、それからゆっくり２人で家事をやればいい。"
translation = "평생 못 하면 평생 가르쳐줄게. 마왕이 되고, 세계를 구하고, 그러고 나서 천천히 둘이서 가사 일을 하면 돼."

[[dialogue]]
speaker = "unk"
original = "どんな運命でも、好きだからそばにいるよ"
translation = "어떤 운명이라도 좋아하니까 곁에 있을 거야."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロト……！」"
translation = "「쿠로토……!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「私、そんなこと言われたら……」"
translation = "「나, 그런 소릴 들으면……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「嬉しくて、思わずハグしたくなっちゃうわ♪」"
translation = "「기뻐서 나도 모르게 허그하고 싶어져♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あ……♪\u3000えへへ♪\u3000抱き締めてもらいながら、頭撫でられると、もっと嬉しくなっちゃう……<emoji=heart04>」"
translation = "「아……♪ 에헤헤♪ 안겨 있으면서 머리 쓰다듬어지니까 더 기뻐져……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ねぇ、クロト……」"
translation = "「있지, 쿠로토……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「好き……<emoji=heart04>」"
translation = "「좋아해……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「少し……甘えてもいいかしら？」"
translation = "「조금…… 어리광 부려도 될까?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「キス、したいわ……<emoji=heart04>」"
translation = "「키스하고 싶어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「んっ……<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 츄……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そうして、しばし甘い時を過ごしてから――"
translation = "그렇게 잠시 달콤한 시간을 보낸 뒤――"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ありがと、クロト」"
translation = "「고마워, 쿠로토.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「私……改めて宣言するわ」"
translation = "「나…… 다시 한번 선언할게.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「どんなに運命が最悪でも、クロトがそばにいてくれるなら、怖くない。だから――」"
translation = "「아무리 운명이 최악이라도 쿠로토가 곁에 있어 준다면 무섭지 않아. 그러니까――」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「正々堂々戦って、運命なんて木っ端ミジンコにしてみせるわ！」"
translation = "「정정당당하게 싸워서 운명 따위 박살 내 보이겠어!」"

[[dialogue]]
speaker = "unk"
original = "そう言ってヴィーナスは、俺の好きな、堂々とした明るい笑顔を浮かべてみせるのだった――"
translation = "그렇게 말하며 비너스는 내가 좋아하는 당당하고 밝은 미소를 지어 보이는 것이었다――"

