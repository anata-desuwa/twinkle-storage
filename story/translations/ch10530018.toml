[[dialogue]]
speaker = "ウェンディ"
original = "「おかしいですね。会長さんの支出を計算してたんですが、不自然な出費があります。私に何か隠してませんか？\u3000でなければ計算が合いません」"
translation = "「이상하네요. 회장님의 지출을 계산하고 있었는데, 부자연스러운 소비가 있어요. 저한테 뭐 숨기는 거 없나요? 안 그러면 계산이 안 맞거든요」"

[[dialogue]]
speaker = "ウェンディ"
original = "「むむ？\u3000何やら態度が怪しい。こうなったら家宅捜索です！」"
translation = "「무무? 왠지 태도가 수상해. 이렇게 된 이상 가택 수색입니다!」"

[[dialogue]]
speaker = "ウェンディ"
original = "「あ──」"
translation = "「아──」"

[[dialogue]]
speaker = "unk"
original = "ウェンディがベッドの下から見つけたのは、裸の女性が写った本。"
translation = "웬디가 침대 밑에서 찾아낸 것은, 알몸의 여성이 찍힌 책."

[[dialogue]]
speaker = "unk"
original = "男が性欲を処理するのに使う──いわゆるエロ本だ。"
translation = "남자가 성욕을 처리하는 데 사용하는── 이른바 에로 책이다."

[[dialogue]]
speaker = "ウェンディ"
original = "「な、なるほど、不審な出費の正体はこれですか……」"
translation = "「과, 과연, 수상한 지출의 정체는 이것이었나요……」"

[[dialogue]]
speaker = "ウェンディ"
original = "「申告しづらいのは理解できますが、健全な男子なら持っていても当然だと思いますので、ちゃんと言ってください」"
translation = "「신고하기 껄끄러운 건 이해합니다만, 건전한 남자라면 가지고 있는 게 당연하다고 생각하니까, 제대로 말해 주세요」"

[[dialogue]]
speaker = "ウェンディ"
original = "「でも……こういうのならタダでもできるじゃないですか。お金がもったいないです」"
translation = "「하지만…… 이런 거라면 공짜로도 할 수 있잖아요. 돈이 아까워요」"

[[dialogue]]
speaker = "ウェンディ"
original = "「タダといっても違法なものじゃないですよ。……つまり、その、こういう本じゃなくて……女性ならここに……顔も悪くないと思うんですけど……」"
translation = "「공짜라고 해도 불법적인 게 아니에요. ……그러니까, 그게, 이런 책이 아니라…… 여자라면 여기에…… 얼굴도 나쁘지 않다고 생각하는데……」"

[[dialogue]]
speaker = "ウェンディ"
original = "「要するに……私がしてあげるって言ってるんです！」"
translation = "「요컨대…… 제가 해 주겠다고 말하는 거예요!」"

[[dialogue]]
speaker = "ウェンディ"
original = "「うぅ……私がしてあげるって、確かに言いましたけど、さすがにこれはないんじゃないですか？」"
translation = "「우으…… 제가 해 주겠다고 확실히 말하긴 했지만, 설마 이건 좀 아니지 않나요?」"

[[dialogue]]
speaker = "クロト"
original = "「だってウェンディのお尻が気になってたから」"
translation = "「그치만 웬디의 엉덩이가 신경 쓰였으니까」"

[[dialogue]]
speaker = "ウェンディ"
original = "「だってじゃありません！\u3000お尻が大きいの気にしてるの、あなた知ってますよね？」"
translation = "「그치만이 아니에요! 엉덩이 큰 거 신경 쓰고 있는 거, 당신도 알고 있잖아요?」"

[[dialogue]]
speaker = "unk"
original = "羞恥と怒りをにじませながらも、俺が希望した通りにお尻を突き出してくれるウェンディ。"
translation = "수치심과 분노를 내비치면서도, 내가 희망한 대로 엉덩이를 내밀어 주는 웬디."

[[dialogue]]
speaker = "unk"
original = "お尻の谷間にペニスを添えると、肌の温かさと肉の弾力に下半身が震える。"
translation = "엉덩이 골에 페니스를 갖다 대자, 살결의 온기와 살집의 탄력에 하반신이 떨린다."

[[dialogue]]
speaker = "ウェンディ"
original = "「んっ……おち○ちん熱い……」"
translation = "「응…… 자지 뜨거워……」"

[[dialogue]]
speaker = "unk"
original = "ペニス越しに触れるお尻の感触に感動しながら、ゆっくりと摩擦させる。"
translation = "페니스를 통해 느껴지는 엉덩이의 감촉에 감동하며, 천천히 마찰시킨다."

[[dialogue]]
speaker = "ウェンディ"
original = "「ふ……はぁ……こんなの屈辱です……」"
translation = "「후…… 하아…… 이런 건 굴욕이에요……」"

[[dialogue]]
speaker = "ウェンディ"
original = "「お尻を使わせてほしいなんて変態です……。本当に気持ちいいんですか？」"
translation = "「엉덩이를 쓰게 해달라니 변태예요……. 정말 기분 좋은 건가요?」"

[[dialogue]]
speaker = "ウェンディ"
original = "「あ……おち○ちんビクビクして……気持ちいいみたいですね。ならいいんですけど」"
translation = "「아…… 자지 움찔움찔거려서…… 기분 좋은 모양이네요. 그럼 다행이지만요」"

[[dialogue]]
speaker = "unk"
original = "むっちりとしたお尻に挟まれるのが心地良い。"
translation = "툼실툼실한 엉덩이에 끼이는 것이 기분 좋다."

[[dialogue]]
speaker = "ウェンディ"
original = "「お尻、擦れて……んん……はぁ……」"
translation = "「엉덩이, 쓸려서…… 응응…… 하아……」"

[[dialogue]]
speaker = "unk"
original = "ウェンディのお尻を自慰に使う快感。"
translation = "웬디의 엉덩이를 자위 기구처럼 사용하는 쾌감."

[[dialogue]]
speaker = "unk"
original = "柔らかくてボリュームのあるお尻と摩擦し、怒張したペニスがますます熱を増していく。"
translation = "부드럽고 볼륨 있는 엉덩이와 마찰하며, 팽창한 페니스가 점점 더 열기를 더해간다."

[[dialogue]]
speaker = "ウェンディ"
original = "「んん、ぁ……おち○ちんビクビクしてます……はぁ……」"
translation = "「응, 아…… 자지 움찔거리고 있어요…… 하아……」"

[[dialogue]]
speaker = "unk"
original = "ウェンディのお尻は本当に気持ち良くて、このまま射精してしまいそうだ。"
translation = "웬디의 엉덩이는 정말 기분 좋아서, 이대로 사정해 버릴 것만 같다."

[[dialogue]]
speaker = "unk"
original = "だけど──"
translation = "하지만──"

[[dialogue]]
speaker = "クロト"
original = "「ごめん、やっぱり入れていいか？」"
translation = "「미안, 역시 넣어도 될까?」"

[[dialogue]]
speaker = "ウェンディ"
original = "「なっ！？\u3000お尻だけって約束したじゃないですか！？\u3000私だって死ぬほど恥ずかしいのを我慢してるんですから、約束は守ってください」"
translation = "「뭐!? 엉덩이뿐이라고 약속했잖아요!? 저도 죽을 만큼 창피한 걸 참고 있는 거니까, 약속은 지켜 주세요」"

[[dialogue]]
speaker = "クロト"
original = "「でも俺はウェンディとちゃんとつながりたい。ダメか？」"
translation = "「하지만 나는 웬디와 제대로 이어지고 싶어. 안 될까?」"

[[dialogue]]
speaker = "ウェンディ"
original = "「……そんなに入れたいんですか？\u3000どうしても？」"
translation = "「……그렇게 넣고 싶은 건가요? 어떻게 해서든?」"

[[dialogue]]
speaker = "クロト"
original = "「入れたい。どうしても」"
translation = "「넣고 싶어. 어떻게 해서든」"

[[dialogue]]
speaker = "ウェンディ"
original = "「……わかりましたよ。無理やり犯されてもたまりませんし、仕方ないから許してあげます」"
translation = "「……알겠어요. 억지로 범해지는 것도 사양이고, 어쩔 수 없으니까 허락해 줄게요」"

[[dialogue]]
speaker = "ウェンディ"
original = "「でも私だって初めてなんですから……あまり激しくしないでくださいね？」"
translation = "「하지만 저도 처음이니까…… 너무 격렬하게 하지는 말아주세요?」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、ありがとう」"
translation = "「아아, 고마워」"

[[dialogue]]
speaker = "unk"
original = "ウェンディの許可を得たところで、ガチガチになったペニスを膣口にあてがい──"
translation = "웬디의 허락을 얻은 참에, 딱딱하게 발기한 페니스를 질 입구에 갖다 대고──"

[[dialogue]]
speaker = "ウェンディ"
original = "「ふああぁっ！？」"
translation = "「후아아앗!?」"

[[dialogue]]
speaker = "ウェンディ"
original = "「大きいのが、ズブズブ入ってきて……ん……んん～っ」"
translation = "「커다란 게, 즈부즈부 들어와서…… 으음…… 으으으윽」"

[[dialogue]]
speaker = "ウェンディ"
original = "「はぁはぁ……あっ……おち○ちんで、お腹の中、広がっちゃう……んはぁ……」"
translation = "「하아 하아…… 앗…… 자지로, 배 속이, 넓어져 버려…… 응하아……」"

[[dialogue]]
speaker = "unk"
original = "ウェンディの中は蜜で濡れていて、きついながらもゆっくりとペニスを呑み込んでいく。"
translation = "웬디의 안은 애액으로 젖어 있어, 조이면서도 천천히 페니스를 삼켜 간다."

[[dialogue]]
speaker = "ウェンディ"
original = "「はぁ、はっ……熱いの、入ってくるぅ……これが、セックス……」"
translation = "「하아, 하윽…… 뜨거운 게, 들어와…… 이게, 섹스……」"

[[dialogue]]
speaker = "ウェンディ"
original = "「苦しくないわけじゃないですけど、これくらいなら……はあぁ……」"
translation = "「괴롭지 않은 건 아니지만, 이 정도라면…… 하아아……」"

[[dialogue]]
speaker = "unk"
original = "お尻をぷるぷる震わせながら懸命にペニスを受け入れようとするウェンディ。"
translation = "엉덩이를 파르르 떨면서 필사적으로 페니스를 받아들이려 하는 웬디."

[[dialogue]]
speaker = "ウェンディ"
original = "「もうちょっと深くきても大丈夫ですよ……んんっ……そう、ゆっくり……」"
translation = "「조금 더 깊게 와도 괜찮아요…… 으응…… 그래요, 천천히……」"

[[dialogue]]
speaker = "unk"
original = "ペニスをウェンディの中に沈ませると、熱くて柔らかい肉に包まれ、快感の波が押し寄せてくる。"
translation = "페니스를 웬디의 안에 가라앉히자, 뜨겁고 부드러운 살결에 감싸여 쾌락의 파도가 밀려온다."

[[dialogue]]
speaker = "unk"
original = "まだ動いていないのに、予想以上の快感で下半身がガクガクになりそうだ。"
translation = "아직 움직이지도 않았는데, 예상 이상의 쾌감에 하반신이 후들거릴 것 같다."

[[dialogue]]
speaker = "ウェンディ"
original = "「ふっ……はぁ、はぁ……落ち着くまでちょっと待ってくださいね」"
translation = "「훗…… 하아, 하아…… 진정될 때까지 조금만 기다려 주세요」"

[[dialogue]]
speaker = "unk"
original = "だけどこの気持ち良さでは我慢なんてできなくて、勝手に腰が動く。"
translation = "하지만 이 기분 좋음 앞에서는 참을 수 없어서, 제멋대로 허리가 움직인다."

[[dialogue]]
speaker = "ウェンディ"
original = "「んんっ！？\u3000何を──」"
translation = "「으응!? 뭘──」"

[[dialogue]]
speaker = "ウェンディ"
original = "「ひぁああぁ～～～っ<emoji=heart04>」"
translation = "「히아아아아～～윽<emoji=heart04>」"

[[dialogue]]
speaker = "ウェンディ"
original = "「あっ……あっ……ん<emoji=heart04>\u3000おち○ちん、私の中で動いて……あっ<emoji=heart04>\u3000んっ……はあぁ<emoji=heart04>」"
translation = "「앗…… 앗…… 응<emoji=heart04> 자지가, 내 안에서 움직여서…… 앗<emoji=heart04> 응…… 하아아<emoji=heart04>」"

[[dialogue]]
speaker = "ウェンディ"
original = "「ひあぁっ、あっ、あんっ<emoji=heart04>\u3000待ってくださいって、言ったのに……ん～っ<emoji=heart04>」"
translation = "「히아앗, 앗, 안윽<emoji=heart04> 기다려 달라고, 말했는데…… 으음～윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "勝手に腰が動き、いきり立ったペニスがウェンディの中で摩擦する。"
translation = "제멋대로 허리가 움직이고, 빳빳하게 선 페니스가 웬디의 안에서 마찰한다."

[[dialogue]]
speaker = "unk"
original = "膣壁とペニスが擦れる度に快感が走り、余計に止まれなくなっていく。"
translation = "질벽과 페니스가 스칠 때마다 쾌감이 달려, 더욱 멈출 수 없게 되어 간다."

[[dialogue]]
speaker = "ウェンディ"
original = "「ふああっ……あっ、あっ……んあぁあっ<emoji=heart04>\u3000ダメ……そんな、いきなり、ダメです……んんっ<emoji=heart04>」"
translation = "「후아앗…… 앗, 앗…… 응아아앗<emoji=heart04> 안 돼…… 그렇게, 갑자기, 안 돼요…… 으응<emoji=heart04>」"

[[dialogue]]
speaker = "ウェンディ"
original = "「濡れてるのは、その、生理反応ですから……んんっ<emoji=heart04>\u3000はぁっ、はっ……あっ……あんっ<emoji=heart04>」"
translation = "「젖어 있는 건, 그게, 생리 현상이니까…… 으응<emoji=heart04> 하앗, 하윽…… 앗…… 안윽<emoji=heart04>」"

[[dialogue]]
speaker = "ウェンディ"
original = "「はぁ……あっ……はっ、あぁんっ<emoji=heart04>\u3000会長さんの、大きい……あっ、あっ……ふあぁあっ<emoji=heart04>」"
translation = "「하아…… 앗…… 하윽, 아앙윽<emoji=heart04> 회장님의, 커다란 게…… 앗, 앗…… 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "下半身を突き出すと、膨張したペニスがウェンディの中を押し広げる。"
translation = "하반신을 내밀자, 팽창한 페니스가 웬디의 안을 밀어 넓힌다."

[[dialogue]]
speaker = "unk"
original = "苦しそうだった声に官能が混じり、ウェンディの中から蜜がさらに溢れてきた。"
translation = "괴로운 듯하던 목소리에 관능이 섞이고, 웬디의 안에서 애액이 더욱 넘쳐흘러 왔다."

[[dialogue]]
speaker = "ウェンディ"
original = "「んん～っ<emoji=heart04>\u3000はぁはっ……あっ……んんっ<emoji=heart04>\u3000おち○ちんが、出たり、入ったりして……んぁあっ<emoji=heart04>」"
translation = "「으음～윽<emoji=heart04> 하아 하윽…… 앗…… 으응<emoji=heart04> 자지가, 나갔다, 들어왔다 해서…… 응아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ウェンディ"
original = "「あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000中で、擦れてっ<emoji=heart04>\u3000んっ……はぁっ……あっ、あぁんっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 안윽<emoji=heart04> 안에서, 비벼져서윽<emoji=heart04> 응…… 하앗…… 앗, 아앙윽<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「くっ……ウェンディの中、ぎゅっと締まってる」"
translation = "「큭…… 웬디의 안, 꽉 조이고 있어」"

[[dialogue]]
speaker = "ウェンディ"
original = "「そういうのは言わなくていいです！\u3000んんっ──<emoji=heart04>」"
translation = "「그런 건 말하지 않아도 돼요! 으응──<emoji=heart04>」"

[[dialogue]]
speaker = "ウェンディ"
original = "「会長さんだって、おち○ちんビクビクさせてるくせに……あっ<emoji=heart04>\u3000んっ……はぁ……ああぁっ<emoji=heart04>」"
translation = "「회장님도, 자지 움찔움찔거리고 있으면서…… 앗<emoji=heart04> 응…… 하아…… 아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「だって、ウェンディの中が気持ちいいから……」"
translation = "「그치만, 웬디의 안이 기분 좋으니까……」"

[[dialogue]]
speaker = "ウェンディ"
original = "「だから言わなくっていいですってば……んんっ……はあぁ<emoji=heart04>」"
translation = "「그러니까 말하지 않아도 된다니까요…… 으응…… 하아아<emoji=heart04>」"

[[dialogue]]
speaker = "ウェンディ"
original = "「はぁっ、はぁっ……ん<emoji=heart04>\u3000おち○ちん、熱くて、大きい……んん～っ<emoji=heart04>」"
translation = "「하앗, 하앗…… 응<emoji=heart04> 자지, 뜨겁고, 커다래…… 으음～윽<emoji=heart04>」"

[[dialogue]]
speaker = "ウェンディ"
original = "「はっ、はぁんっ<emoji=heart04>\u3000おち○ちん、こんなに大きいなんて……知らな、いっ……んんっ<emoji=heart04>」"
translation = "「하윽, 하앙윽<emoji=heart04> 자지, 이렇게나 크다니…… 모르, 겠어윽…… 으응<emoji=heart04>」"

[[dialogue]]
speaker = "ウェンディ"
original = "「んぁっ……あっ、あっ、あんっ<emoji=heart04>\u3000硬いおち○ちんで、おま○こ広げられてますぅっ<emoji=heart04>」"
translation = "「응앗…… 앗, 앗, 안윽<emoji=heart04> 딱딱한 자지로, 보지 벌려지고 있어요옷<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "形のいいおっぱいを揺らしながら喘ぐウェンディ。"
translation = "모양 좋은 가슴을 흔들며 신음하는 웬디."

[[dialogue]]
speaker = "unk"
original = "扇情的な姿に興奮が増し、ペニスを突き入れる力が増していく。"
translation = "선정적인 모습에 흥분이 더해져, 페니스를 찔러넣는 힘이 강해져 간다."

[[dialogue]]
speaker = "ウェンディ"
original = "「ひぁあああ～～っ<emoji=heart04>\u3000それ、強いぃ……んんっ<emoji=heart04>\u3000あ、はあぁ……ん～っ<emoji=heart04>」"
translation = "「히아아아아～～윽<emoji=heart04> 그거, 강해…… 으응<emoji=heart04> 아, 하아아…… 으음～윽<emoji=heart04>」"

[[dialogue]]
speaker = "ウェンディ"
original = "「さっきより、深いぃ<emoji=heart04>\u3000あっ、あんっ……おち○ちん、私の奥にきてるぅっ<emoji=heart04>\u3000ふぁ──あ──ああぁっ<emoji=heart04>」"
translation = "「아까보다, 깊어어<emoji=heart04> 앗, 안윽…… 자지, 내 안쪽까지 오고 있어엇<emoji=heart04> 화──아──아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "快楽のまま腰を振る乱暴なセックス。"
translation = "쾌락에 몸을 맡긴 채 허리를 흔드는 난폭한 섹스."

[[dialogue]]
speaker = "unk"
original = "だけどウェンディの嬌声はより激しくなっていく。"
translation = "하지만 웬디의 교성은 더욱 격렬해져 간다."

[[dialogue]]
speaker = "ウェンディ"
original = "「んんっ……<emoji=heart04>\u3000おま○この中で、おち○ちんまた大きくなってるっ……<emoji=heart04>\u3000あっ、あっ……ふぁああっ<emoji=heart04>」"
translation = "「으응……<emoji=heart04> 보지 안에서, 자지 또 커지고 있어……<emoji=heart04> 앗, 앗…… 화아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ウェンディ"
original = "「あっ、あっ、あんっ<emoji=heart04>\u3000おち○ちんで、お腹の中いっぱいに──ひゃぁっ！？\u3000おち○ちんの、出っ張ってるところ、当たって……ふああぁ<emoji=heart04>」"
translation = "「앗, 앗, 안윽<emoji=heart04> 자지로, 배 속 가득히──히얏!? 자지의, 튀어나온 부분, 닿아서…… 후아아아<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ここが気持ちいい？」"
translation = "「여기가 기분 좋아?」"

[[dialogue]]
speaker = "ウェンディ"
original = "「そうは、言ってな──んんんっ！？\u3000あ<emoji=heart04>\u3000あ<emoji=heart04>\u3000あ<emoji=heart04>\u3000そこ、らめぇっ<emoji=heart04>\u3000んん～～～っ<emoji=heart04>」"
translation = "「그렇게는, 말 안──으으으응!? 아<emoji=heart04> 아<emoji=heart04> 아<emoji=heart04> 거기, 안 대애<emoji=heart04> 으으으으음～～～윽<emoji=heart04>」"

[[dialogue]]
speaker = "ウェンディ"
original = "「違うって、言ってるじゃないですか、あっ<emoji=heart04>\u3000んっ、んっ──ふああぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000調子に、乗らないで、くださ──ひやあぁあっ<emoji=heart04>」"
translation = "「아니라고, 말하고 있잖아요, 앗<emoji=heart04> 응, 응──후아아앗<emoji=heart04> 앗<emoji=heart04> 안윽<emoji=heart04> 우쭐해, 하지, 마세──히야아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ウェンディ"
original = "「くっ……うぅっ……んん～っ<emoji=heart04>\u3000あ──あ──ふああぁっ<emoji=heart04>」"
translation = "「큭…… 으윽…… 으음～윽<emoji=heart04> 아──아──후아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ウェンディが反応したところを重点的に刺激してやると、お尻を振るわせて声を上げる。"
translation = "웬디가 반응한 곳을 중점적으로 자극해 주자, 엉덩이를 떨며 목소리를 높인다."

[[dialogue]]
speaker = "unk"
original = "ペニスを包む膣壁が震えながらぎゅっと収縮し、ゾクッと快感が走った。"
translation = "페니스를 감싼 질벽이 떨리며 꽉 수축하고, 오싹하게 쾌감이 달렸다."

[[dialogue]]
speaker = "ウェンディ"
original = "「あっ、あっ、あんっ<emoji=heart04>\u3000ひやぁっ<emoji=heart04>\u3000また、中で、擦れてるっ<emoji=heart04>」"
translation = "「앗, 앗, 안윽<emoji=heart04> 히야앗<emoji=heart04> 또, 안에서, 비벼지고 있어윽<emoji=heart04>」"

[[dialogue]]
speaker = "ウェンディ"
original = "「気持ち良くなんて、ないですから……あ、あぁっ<emoji=heart04>\u3000私は、あなたがエッチしたいって言うから、仕方なく……んんっ<emoji=heart04>」"
translation = "「기분 좋거나 하지는, 않으니까요…… 아, 아앗<emoji=heart04> 나는, 당신이 에치하고 싶다고 하니까, 어쩔 수 없이…… 으응<emoji=heart04>」"

[[dialogue]]
speaker = "ウェンディ"
original = "「ふあぁっ……あっ、あっ、あんっ<emoji=heart04>\u3000はぁっ、あっ、あぁんっ<emoji=heart04>\u3000こんな、はずじゃ……ふああぁあっ<emoji=heart04>」"
translation = "「후아앗…… 앗, 앗, 안윽<emoji=heart04> 하앗, 앗, 아앙윽<emoji=heart04> 이럴, 리가…… 후아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ウェンディ"
original = "「ふぁ──あ──んん～～っ<emoji=heart04>\u3000おち○ちん、ズンズン来て……あっ──んぁああっ<emoji=heart04>」"
translation = "「화──아──으으으음～～윽<emoji=heart04> 자지, 즈음즈음 들어와서…… 앗──응아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "膣がきゅうっと強く締め付けてきて、さらなる快感を求めて動きを加速させる。"
translation = "질이 뀨우우하고 강하게 조여와서, 더한 쾌락을 구하며 움직임을 가속시킨다."

[[dialogue]]
speaker = "ウェンディ"
original = "「んんーーっ<emoji=heart04><emoji=heart04>\u3000ひあぁああっ<emoji=heart04>\u3000あっ、あっ、あぁんっ<emoji=heart04>」"
translation = "「으음ーー윽<emoji=heart04><emoji=heart04> 히아아아앗<emoji=heart04> 앗, 앗, 아앙윽<emoji=heart04>」"

[[dialogue]]
speaker = "ウェンディ"
original = "「あ<emoji=heart04>\u3000あ<emoji=heart04>\u3000奥にきてるっ<emoji=heart04>\u3000おち○ちん、当たって……んっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ひぁああっ<emoji=heart04>」"
translation = "「아<emoji=heart04> 아<emoji=heart04> 안쪽에 오고 있어윽<emoji=heart04> 자지, 닿아서…… 응윽<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 히아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "亀頭が子宮口を叩き、その度にウェンディの体が跳ねる。"
translation = "귀두가 자궁구를 때리고, 그때마다 웬디의 몸이 튄다."

[[dialogue]]
speaker = "ウェンディ"
original = "「ふぁっ<emoji=heart04>\u3000はっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000激しくしないでって、言ったのに──んあぁあっ<emoji=heart04>」"
translation = "「화앗<emoji=heart04> 하윽<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 격렬하게 하지 말라고, 말했는데──응아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ウェンディ"
original = "「んっ──くっ──うぁああっ<emoji=heart04>\u3000おち○ちんでズボズボされて──あっ<emoji=heart04>\u3000んぁああっ<emoji=heart04>」"
translation = "「응윽──큭──우아아앗<emoji=heart04> 자지로 즈보즈보 당해서──앗<emoji=heart04> 응아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ウェンディには悪いけど、体が言うことを聞かない。"
translation = "웬디에게는 미안하지만, 몸이 말을 듣지 않는다."

[[dialogue]]
speaker = "unk"
original = "ウェンディとつながるのが、セックスが、気持ち良くて腰を振りまくる。"
translation = "웬디와 이어지는 것이, 섹스가, 기분 좋아서 허리를 마구 흔든다."

[[dialogue]]
speaker = "ウェンディ"
original = "「んぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000おち○ちんが、奥に、コツコツ当たって<emoji=heart04>\u3000んっ<emoji=heart04>\u3000はぁ<emoji=heart04>\u3000あんっ<emoji=heart04>」"
translation = "「응앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 자지가, 안쪽에, 콕콕 닿아서<emoji=heart04> 응윽<emoji=heart04> 하아<emoji=heart04> 안윽<emoji=heart04>」"

[[dialogue]]
speaker = "ウェンディ"
original = "「ふあぁああっ<emoji=heart04>\u3000そんなに、突いたら、ダメですっ<emoji=heart04>\u3000おかしくなるっ<emoji=heart04>\u3000おま○こおかしくなっちゃいますっ<emoji=heart04>」"
translation = "「후아아아앗<emoji=heart04> 그렇게, 찌르면, 안 돼요옷<emoji=heart04> 이상해져윽<emoji=heart04> 보지 이상해져 버려요옷<emoji=heart04>」"

[[dialogue]]
speaker = "ウェンディ"
original = "「んん～～っ<emoji=heart04>\u3000んぁっ、ああっ<emoji=heart04>\u3000もうダメ<emoji=heart04>\u3000おかしくなってるっ<emoji=heart04>\u3000セックスでおかしくなってるぅっ<emoji=heart04>」"
translation = "「으음～～윽<emoji=heart04> 응앗, 아앗<emoji=heart04> 이제 안 돼<emoji=heart04> 이상해지고 있어윽<emoji=heart04> 섹스로 이상해지고 있어엇<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "獣みたいに腰を振って、まるでウェンディを自慰の道具にしているみたいだ。"
translation = "짐승처럼 허리를 흔들며, 마치 웬디를 자위 도구로 삼고 있는 것 같다."

[[dialogue]]
speaker = "unk"
original = "それでもウェンディが甘く喘ぐものだから、余計抑えが利かなくなっていた。"
translation = "그런데도 웬디가 달콤하게 신음하는 바람에, 더욱 억제가 되지 않게 되어 있었다."

[[dialogue]]
speaker = "ウェンディ"
original = "「ふああぁっ、あっ、あんっ<emoji=heart04>\u3000おち○ちんすごいぃ<emoji=heart04>\u3000んぁっ、あっ……ふぁあああっ<emoji=heart04>」"
translation = "「후아아앗, 앗, 안윽<emoji=heart04> 자지 굉장해애<emoji=heart04> 응앗, 앗…… 화아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ウェンディ"
original = "「んんっ<emoji=heart04>\u3000おち○ちんビクビクしてるぅ<emoji=heart04>\u3000おち○ちんが……あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んん～っ<emoji=heart04>」"
translation = "「으응윽<emoji=heart04> 자지 움찔움찔거리고 있어어<emoji=heart04> 자지가…… 앗<emoji=heart04> 앗<emoji=heart04> 으음～윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "気を抜けば暴発しそうになるのを抑えながら、豊満な下半身にしゃにむに腰を叩きつける。"
translation = "방심하면 폭발할 것 같은 것을 억누르며, 풍만한 하반신에 무턱대고 허리를 부딪친다."

[[dialogue]]
speaker = "ウェンディ"
original = "「あ<emoji=heart04>\u3000あ<emoji=heart04>\u3000あ<emoji=heart04>\u3000あん<emoji=heart04>\u3000激し、いっ<emoji=heart04>\u3000そんなに突かれたら、お腹、つぶれちゃいますっ<emoji=heart04>」"
translation = "「아<emoji=heart04> 아<emoji=heart04> 아<emoji=heart04> 안<emoji=heart04> 격렬, 해윽<emoji=heart04> 그렇게 찔리면, 배, 으깨져 버려요옷<emoji=heart04>」"

[[dialogue]]
speaker = "ウェンディ"
original = "「んぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000おま○こがっ<emoji=heart04>\u3000ダメっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>」"
translation = "「응앗<emoji=heart04> 앗<emoji=heart04> 보지가앗<emoji=heart04> 안 돼윽<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "お尻の肉の感触が気持ち良くて、パンパンと肌がぶつかる音が鳴る度に快楽のボルテージが上がっていく。"
translation = "엉덩이 살의 감촉이 기분 좋아서, 팡팡하고 살이 부딪치는 소리가 날 때마다 쾌락의 볼티지가 올라간다."

[[dialogue]]
speaker = "ウェンディ"
original = "「お尻、叩かれてるみた、い……んんんっ<emoji=heart04>\u3000んぁっ、はぁっ、ああぁんっ<emoji=heart04>」"
translation = "「엉덩이, 맞고 있는 것 같, 아…… 으으으응윽<emoji=heart04> 응앗, 하앗, 아아앙윽<emoji=heart04>」"

[[dialogue]]
speaker = "ウェンディ"
original = "「ふ──はあぁっ、あっ、あっ、ああぁんっ<emoji=heart04>\u3000あっ、ダメ、変になるぅ<emoji=heart04>\u3000ふぁっ<emoji=heart04>\u3000あっ<emoji=heart04>」"
translation = "「후──하아아앗, 앗, 앗, 아아앙윽<emoji=heart04> 앗, 안 돼, 이상해져어<emoji=heart04> 화앗<emoji=heart04> 앗<emoji=heart04>」"

[[dialogue]]
speaker = "ウェンディ"
original = "「これ、何か来ちゃうっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ──んんーーーっ<emoji=heart04>」"
translation = "「이거, 뭔가 와 버려윽<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 앗──으으으음ーーー윽<emoji=heart04>」"

[[dialogue]]
speaker = "ウェンディ"
original = "「ダメ<emoji=heart04>\u3000ダメ<emoji=heart04>\u3000ダメダメ<emoji=heart04>\u3000来るっ<emoji=heart04>\u3000来ちゃうぅっ<emoji=heart04>\u3000ふぁっ──ああぁっ<emoji=heart04>\u3000あ<emoji=heart04>\u3000あ<emoji=heart04>\u3000あ<emoji=heart04>\u3000あ──」"
translation = "「안 돼<emoji=heart04> 안 돼<emoji=heart04> 안 돼안 돼<emoji=heart04> 온다윽<emoji=heart04> 와 버려어엇<emoji=heart04> 화앗──아아아앗<emoji=heart04> 아<emoji=heart04> 아<emoji=heart04> 아<emoji=heart04> 아──」"

[[dialogue]]
speaker = "ウェンディ"
original = "「ふぁああっ<emoji=heart04>\u3000あっ──ああぁああ～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「화아아앗<emoji=heart04> 앗──아아아아아～～～～～앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ウェンディ"
original = "「あっ──あっ──ああぁっ<emoji=heart04>\u3000奥で、出てるっ<emoji=heart04>\u3000熱いせーえき、びゅーって……んぁああっ<emoji=heart04>」"
translation = "「앗──앗──아아아앗<emoji=heart04> 안쪽에서, 나오고 있어윽<emoji=heart04> 뜨거운 정액, 뷰우우하고…… 응아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスをウェンディの奥深くに沈め、子宮めがけて精を注ぎ込む。"
translation = "페니스를 웬디의 깊숙한 곳에 가라앉히고, 자궁을 향해 정을 쏟아붓는다."

[[dialogue]]
speaker = "unk"
original = "無意識の反応なのか、ウェンディはお尻を俺に押し付けて精液を受け止めようとしていた。"
translation = "무의식적인 반응인지, 웬디는 엉덩이를 나에게 밀어붙이며 정액을 받아내려 하고 있었다."

[[dialogue]]
speaker = "ウェンディ"
original = "「んぁ──あ──あぁんっ<emoji=heart04>\u3000おち○ちんドクドクして……ふああぁ<emoji=heart04>\u3000\u3000お腹の中に、出てるぅ……<emoji=heart04>」"
translation = "「응아──아──아앙윽<emoji=heart04> 자지 울컥울컥해서…… 후아아아<emoji=heart04> 배 속에, 나오고 있어어……<emoji=heart04>」"

[[dialogue]]
speaker = "ウェンディ"
original = "「んん～～っ<emoji=heart04>\u3000おま○こ熱いぃ<emoji=heart04>\u3000あっ、んっ<emoji=heart04>\u3000せーえき、まだ、出て……んん……ふぁあ～～っ<emoji=heart04>」"
translation = "「으음～～윽<emoji=heart04> 보지 뜨거워어<emoji=heart04> 앗, 응윽<emoji=heart04> 정액, 아직, 나오고…… 으음…… 화아아～～앗<emoji=heart04>」"

[[dialogue]]
speaker = "ウェンディ"
original = "「んっ……溢れちゃう……<emoji=heart04>」"
translation = "「응윽…… 넘쳐버려……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ウェンディの中に精液を出し切り、ペニスが萎えて自然と抜ける。"
translation = "웬디의 안에 정액을 다 쏟아내자, 페니스가 시들며 자연스럽게 빠진다."

[[dialogue]]
speaker = "unk"
original = "すると精液が膣口からこぼれてきて、とても淫靡な光景だった。"
translation = "그러자 정액이 질구에서 흘러나와, 무척이나 음비한 광경이었다."

[[dialogue]]
speaker = "ウェンディ"
original = "「はあぁ……はぁ……激しくしないでくださいって言ったのに……」"
translation = "「하아아…… 하아…… 격렬하게 하지 말아 달라고 말했는데……」"

[[dialogue]]
speaker = "クロト"
original = "「ごめん……」"
translation = "「미안……」"

[[dialogue]]
speaker = "unk"
original = "暴走してしまった自分を思い出して、冷静になると罪悪感が増す。"
translation = "폭주해 버린 자신을 떠올리며, 냉정해지자 죄책감이 더해진다."

[[dialogue]]
speaker = "ウェンディ"
original = "「はぁ……先日は私が迷惑かけましたし、今日は特別に許してあげます。反省してください」"
translation = "「하아…… 저번에는 제가 폐를 끼쳤으니, 오늘은 특별히 용서해 드릴게요. 반성하세요」"

[[dialogue]]
speaker = "ウェンディ"
original = "「で。エッチな本でオナニーするより気持ち良かったですか？\u3000正直に言ってください」"
translation = "「그래서. 야한 책으로 자위하는 것보다 기분 좋았나요? 솔직하게 말해 주세요」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、比べものにならないくらい気持ち良かった」"
translation = "「아아, 비교도 안 될 정도로 기분 좋았어」"

[[dialogue]]
speaker = "ウェンディ"
original = "「ならいいんです。エッチな本は必要ないことが証明されましたから」"
translation = "「그럼 됐어요. 야한 책은 필요 없다는 게 증명됐으니까요」"

[[dialogue]]
speaker = "ウェンディ"
original = "「あなたのエッチな欲求は私が解消してあげますから、ムダな出費は控えるように。いいですねっ」"
translation = "「당신의 야한 욕구는 제가 해소해 줄 테니까, 쓸데없는 지출은 삼가도록 하세요. 알겠죠!」"

[[dialogue]]
speaker = "unk"
original = "これからはムラムラしたらウェンディを呼ぶように言われ、どんなエッチをしようかと期待が膨らむのであった──"
translation = "앞으로는 몸이 달아오르면 웬디를 부르라는 말을 듣고, 어떤 에치를 할까 기대가 부풀어 오르는 것이었다──"

