[[dialogue]]
speaker = "unk"
original = "第２話,キサナを賭けた決闘,P"
translation = "제2화, 키사나를 건 결투"

[[dialogue]]
speaker = "unk"
original = "『ＸＥＬＯＳ』との決戦からしばらく。滞っていた星徒会業務も片付き、時間ができたので、少し出掛けることにした。"
translation = "『XELOS』와의 결전으로부터 얼마간. 지체되었던 성도회 업무도 마무리되어 시간이 생겼기에, 잠시 외출하기로 했다."

[[dialogue]]
speaker = "unk"
original = "行き先は子どもたちの保護施設だ。キサナとともに保護した女の子がそこでお世話になっている。"
translation = "행선지는 아이들의 보호 시설이다. 키사나와 함께 보호한 소녀가 그곳에서 지내고 있다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「げっ、なんでテメエがここにいやがる。まさかアタシと同じじゃねえだろうな？」"
translation = "「게엑, 왜 네놈이 여기 있는 거야. 설마 나랑 같은 건 아니겠지?」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「……ついてくんじゃねえよ。クソ、別の日にすりゃよかったぜ……でも行くって言っちまったしな……」"
translation = "「……따라오지 말라고. 젠장, 다른 날로 잡을 걸 그랬네…… 하지만 가겠다고 말해버렸고……」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「お、着いたな……ってコラ！\u3000いきなりしっぽ触りにくんじゃねえよ！」"
translation = "「오, 도착했네…… 야 이 자식아! 갑자기 꼬리 만지러 오지 말라고!」"

[[dialogue]]
speaker_original = "女の子"
speaker_translation = "여자아이"
original = "「キサナお姉ちゃんのしっぽ触ると安心する～」"
translation = "「키사나 언니 꼬리 만지면 안심돼~」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「うるせえ」"
translation = "「시끄러워.」"

[[dialogue]]
speaker = "unk"
original = "彼女がキサナと保護した女の子だ。出会った頃はほとんど話さない子だったが、見違えて明るくなった。"
translation = "그녀가 키사나와 보호한 소녀다. 처음 만났을 때는 거의 말을 하지 않는 아이였지만, 몰라보게 밝아졌다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ったく、来るんじゃなかったぜ」"
translation = "「참 나, 오지 말걸 그랬어.」"

[[dialogue]]
speaker_original = "女の子"
speaker_translation = "여자아이"
original = "「お兄ちゃんも久しぶり。今日はキサナお姉ちゃんと一緒なんだね……あ、もしかして、ふたりは恋人なの！？」"
translation = "「오빠도 오랜만이야. 오늘은 키사나 언니랑 같이 왔네…… 아, 혹시 두 사람 사귀는 거야!?」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「はぁっ！？」"
translation = "「하아!?」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「んなワケねえだろ……オマエからも言ってやれ」"
translation = "「그럴 리가 없잖아…… 너도 좀 말해줘.」"

[[dialogue]]
speaker = "unk"
original = "…………違うよ"
translation = "…………아니야."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「なんだよ、今の間は。気持ちわりぃな……」"
translation = "「뭐야, 방금 그 뜸은. 기분 나쁘게……」"

[[dialogue]]
speaker = "unk"
original = "俺はキサナのこと好きだけど"
translation = "난 키사나를 좋아하지만."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「はあああぁっ！？\u3000テメエ頭おかしいんじゃねえか！？」"
translation = "「하아아아앗!? 너 머리가 어떻게 된 거 아냐!?」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「悪いもんでも食ったか？\u3000それとも疲れてんのか？\u3000戦いすぎてバカになったか？」"
translation = "「어디 아픈 거라도 먹었냐? 아니면 피곤한 거냐? 너무 싸워서 바보가 된 거야?」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「あ～、もう意味わかんねえ…………帰る」"
translation = "「아~, 진짜 의미를 모르겠네………… 갈 거야.」"

[[dialogue]]
speaker = "unk"
original = "伝え方が悪かったかもしれない。キサナを困惑させてしまったようだ。"
translation = "전달 방식이 나빴을지도 모른다. 키사나를 당혹스럽게 만든 모양이다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ああん？\u3000テメエ、昨日の今日で何しにきやがった？」"
translation = "「아앙? 너, 어제 그러고서 오늘 또 뭘 하러 온 거야?」"

[[dialogue]]
speaker = "unk"
original = "好きだ。付き合ってほしい"
translation = "좋아해. 사귀어 줬으면 좋겠어."

[[dialogue]]
speaker = "unk"
original = "一晩考えても、いや、考えれば考えるほど、キサナのことが頭から離れなかった。"
translation = "밤새 생각해도, 아니, 생각하면 할수록 키사나가 머릿속에서 떠나질 않았다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ああ？\u3000またそれかよ。アタシをからかってんなら容赦しねえぞ」"
translation = "「아앙? 또 그 소리냐. 나를 놀리는 거라면 가만 안 두겠다.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「どてっ腹に風穴開けてやるぜ」"
translation = "「복부에 구멍을 뚫어주지.」"

[[dialogue]]
speaker = "unk"
original = "杭打機が俺の胸に突き付けられる。それでも俺の答えは変わらない。"
translation = "파일 벙커가 내 가슴을 향한다. 그래도 내 대답은 변하지 않는다."

[[dialogue]]
speaker = "unk"
original = "君が好きだ"
translation = "네가 좋아."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「……意味わかんねえ」"
translation = "「……의미를 모르겠어.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「アタシは敵で……いや今は違うけどよ、敵だったことは事実だ。なのに、アタシのどこが好きなんだ？\u3000ウソじゃねえなら言えるよな？」"
translation = "「난 적이었고…… 아니 지금은 아니지만, 적이었던 건 사실이다. 그런데 내 어디가 좋다는 거야? 거짓말이 아니라면 말할 수 있겠지?」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「……意外と子どもに優しいところ、美味しそうにご飯を食べるところ、義理堅いところ、たくましくて強いところ……おい待て、最後のそれ褒めてんのか？」"
translation = "「……의외로 아이들에게 상냥한 점, 맛있게 밥을 먹는 점, 의리 있는 점, 늠름하고 강한 점…… 어이 잠깐, 마지막 그건 칭찬인 거냐?」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ああもう、スラスラ出てくんじゃねえか。わーったわーった。オマエはアタシのことが好きなスキモノだよ」"
translation = "「아아 진짜, 술술 나오잖아. 알았다, 알았어. 너는 나를 좋아하는 특이한 놈이야.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「だがな、アタシもはいそうですかって受け入れるワケねえだろ」"
translation = "「하지만 말이야, 나도 네 그렇습니까 하고 받아들일 리 없잖아.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「アタシをオマエの女にしたいってんなら、相応しいところを見せてもらおうじゃねえか。──アタシと戦え、魔王」"
translation = "「나를 네 여자로 만들고 싶다면, 그에 걸맞은 모습을 보여줘야겠지. ──나와 싸워라, 마왕.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ただし、チャンスは一回きりだ。アタシが勝ったら、二度とふざけたこと言うんじゃねえぞ」"
translation = "「단, 기회는 딱 한 번뿐이다. 내가 이기면, 두 번 다시 그런 장난 같은 소리 하지 마라.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ここなら邪魔は入らねえだろ」"
translation = "「여기라면 방해는 들어오지 않겠지.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ぶっ潰してやるよ！\u3000カラミティパイル！」"
translation = "「부숴주마! 캘러미티 파일!」"

[[dialogue]]
speaker = "unk"
original = "パイルバンカーの打撃を拳で相殺する。衝撃が全身を走った。"
translation = "파일 벙커의 타격을 주먹으로 상쇄한다. 충격이 전신을 달렸다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ハッ、この程度じゃくたばんねえよな魔王さまよぉ！\u3000ヘヴィアウトレイジ！」"
translation = "「하앗, 이 정도로 뒈지진 않겠지, 마왕님! 헤비 아웃레이지!」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「そらそら！\u3000ぼーっとしてると死んじまうぞ！」"
translation = "「어이차! 멍하니 있으면 죽는다고!」"

[[dialogue]]
speaker = "unk"
original = "キサナの攻撃は容赦がない。油断していたら本当に死んでしまうかも。"
translation = "키사나의 공격은 가차 없다. 방심했다간 정말 죽을지도 모른다."

[[dialogue]]
speaker = "unk"
original = "でもそれが彼女の生き方だ。いつも命懸け。生きるか死ぬかの道をずっと歩んできたんだ。"
translation = "하지만 그것이 그녀의 삶의 방식이다. 언제나 목숨을 건다. 사느냐 죽느냐의 길을 줄곧 걸어온 것이다."

[[dialogue]]
speaker = "unk"
original = "──だから、俺も全力で向き合わなくちゃ。"
translation = "──그러니까, 나도 전력으로 마주해야만 한다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「おい、いつまで逃げ回ってんだ。そろそろ遊びは終わりにしようぜ」"
translation = "「어이, 언제까지 도망만 다닐 거냐. 슬슬 놀이는 끝내자고.」"

[[dialogue]]
speaker = "unk"
original = "キサナが星力をパイルバンカーに込める。俺も拳を握る。星力と、君への想いを込めて。"
translation = "키사나가 성력을 파일 벙커에 담는다. 나도 주먹을 쥔다. 성력과, 너에 대한 마음을 담아서."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「リベリオン、ハウリングッ！」"
translation = "「리벨리온, 하울링!!」"

[[dialogue]]
speaker = "unk"
original = "キサナ、好きだあぁっ！"
translation = "키사나, 좋아한다아아앗!"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ぐあああっ！」"
translation = "「구아아악!」"

[[dialogue]]
speaker = "unk"
original = "キサナの全力を、俺も全力で打ち破る。めちゃくちゃな告白だけど、でも必死だった。"
translation = "키사나의 전력을, 나도 전력으로 타파한다. 엉망진창인 고백이었지만, 그래도 필사적이었다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「あ～あ……アタシの負けだ」"
translation = "「아~아…… 나의 패배다.」"

[[dialogue]]
speaker = "unk"
original = "星力を使い切り、脱力するキサナを受け止める。"
translation = "성력을 다 쓰고 탈력한 키사나를 받아낸다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「これでアタシはオマエの女だ。満足かよ」"
translation = "「이걸로 난 네 여자다. 만족하냐.」"

[[dialogue]]
speaker = "unk"
original = "死ぬほど嬉しい"
translation = "죽을 만큼 기뻐."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「マジかよ。物好きにもほどがあんだろ……まぁいい、ツラ貸せ」"
translation = "「진짜냐. 별종도 정도가 있지…… 뭐 됐다, 얼굴 좀 빌려줘.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「──ちゅ」"
translation = "「──쪽」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「喜べよ、恋人さまからのキスだぜ…………おい、なんか言えよ！\u3000はずいだろーが！」"
translation = "「기뻐해라, 연인님이 해준 키스다………… 야, 말 좀 해봐! 부끄럽잖아!」"

