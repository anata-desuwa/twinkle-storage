[[dialogue]]
speaker = "unk"
original = "第８話,《光の魔女》クラウディア,B"
translation = "제8화, 《빛의 마녀》 클라우디아, B"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「──もうよかろう。狙いがどう、思惑がどうだの、まどろっこしい」"
translation = "「──이제 됐을 것이다. 노림수가 어떻고, 의도가 어떻고 하는 것은, 지루하구나.」"

[[dialogue]]
speaker = "unk"
original = "沈黙を破ったのはクラウディアだった。"
translation = "침묵을 깬 것은 클라우디아였다."

[[dialogue]]
speaker = "unk"
original = "彼女はご自慢のロッドを地に突きつけ、威風堂々と宣言する。"
translation = "그녀는 자랑스러운 로드를 땅에 꽂고, 위풍당당하게 선언한다."

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「魔女か！\u3000人の子か！\u3000どちらかがこのリクリエを対処し、世界の命運を分ける権利を得る！\u3000それだけのこと！」"
translation = "「마녀인가! 인간의 아이인가! 어느 쪽이든 이 리크리에를 대처하고, 세계의 명운을 가르는 권리를 얻는다! 그것뿐인 일!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「意見が違えたのなら──古来よりやり方は決まっておろう」"
translation = "「의견이 달랐다면── 예부터 방식은 정해져 있을 것이다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ──その通りだ。互いに譲れないものがある」"
translation = "「아아── 그 말대로다. 서로 양보할 수 없는 것이 있다.」"

[[dialogue]]
speaker = "unk"
original = "ネビュラの現実主義は決して頭ごなしに否定していいものじゃないんだろう。"
translation = "네뷸라의 현실주의는 결코 무턱대고 부정해서는 안 되는 것일 것이다."

[[dialogue]]
speaker = "unk"
original = "だけど今の俺たちだって、決して譲れない理想がある。"
translation = "하지만 지금의 우리들 역시, 결코 양보할 수 없는 이상이 있다."

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「結集だ」"
translation = "「결집이다.」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「──はっ。<ruby>α<rt>アルファ</rt></ruby>から<ruby>δ<rt>デルタ</rt></ruby>まで本隊に合流されたし」"
translation = "「──핫. 알파부터 델타까지 본대에 합류하십시오.」"

[[dialogue]]
speaker_original = "カヤ"
speaker_translation = "카야"
original = "「ん。ステルス部隊も、全員集合」"
translation = "「응. 스텔스 부대도, 전원 집합.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「！\u3000いつの間に──」"
translation = "「! 언제 사이에──」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「学園そのものが包囲されていた──ってところか」"
translation = "「학원 자체가 포위되어 있었다──는 건가.」"

[[dialogue]]
speaker = "unk"
original = "クラウディアの一声と同時に、どこからか多数の魔女たちが馳せ参じていた。"
translation = "클라우디아의 한마디와 동시에, 어딘가에서 다수의 마녀들이 달려왔다."

[[dialogue]]
speaker = "unk"
original = "その全員がネビュラのエージェント。そして、その中には……"
translation = "그 전원이 네뷸라의 에이전트. 그리고, 그 안에는……"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……！\u3000リーリアさん……？」"
translation = "「……! 리리아 씨……?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「あー……なんていうか……一身上の都合？\u3000みたいな。うん、黙っててごめん、アナちゃん」"
translation = "「아ー…… 뭐랄까…… 개인적인 사정? 같은 거. 응, 말 안 해서 미안, 아나짱」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ふう。本心を隠すのがうまいとは思っていましたが……まあ、しおらしいのはあなたらしくありませんね」"
translation = "「휴. 본심을 숨기는 데 능숙하다고는 생각했지만요…… 뭐, 얌전한 건 당신답지 않네요.」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「……なんかほんとーにごめんね？\u3000正直、長官たちに従うの、全然気乗りしないんだけどさ。こんなの全然『ウィンウィン』じゃないし。ただ……」"
translation = "「……뭔가 정말로 미안해? 솔직히, 장관들에게 따르는 거, 전혀 내키지 않는데 말이야. 이런 건 전혀 『윈윈』이 아니잖아. 다만……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「リーリア……？」"
translation = "「리리아……?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「こうしないとセンパイが死んじゃうかも、って思ったら、私１人が<ruby>はぐれ魔女<rt>ヤーガ</rt></ruby>になればいいって問題でもない気がして」"
translation = "「이렇게 하지 않으면 선배가 죽을지도 모른다고 생각하니, 나 혼자 <ruby>떠돌이 마녀<rt>야가</rt></ruby>가 되면 된다는 문제도 아닌 것 같아서」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「私は星騎士じゃないから、人間界とか、三界の平穏みたいなのって、実は言うほど興味ないんだ。うん。だから本当にごめん」"
translation = "「나는 성기사가 아니니까, 인간계라든가, 삼계의 평온 같은 건, 사실 말할 정도로 흥미 없어. 응. 그러니까 정말 미안」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「恨んでくれていいよ。よくも騙したな、って。……だけど私は、センパイやアナちゃんたちが生きててさえくれれば、それで納得できちゃったから」"
translation = "「원망해도 돼. 잘도 속였다고. ……하지만 나는, 선배나 아나짱들이 살아만 있어 준다면, 그걸로 납득할 수 있었으니까」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「……そういうわけなんで、今回は君たちの敵に回るよ」"
translation = "「……그런 이유로, 이번에는 너희들의 적이 될 거야」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「はーい、そういうわけですので、<ruby>私<rt>わたくし</rt></ruby>もこちら側から失礼いたしますね<emoji=heart04>」"
translation = "「네ー, 그런 이유로, 저도 이쪽 편에서 실례하겠습니다<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「マ、マリオンさん……！？」"
translation = "「마, 마리온 씨……!?」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「はい、お嬢様。星見家メイド隊、マリオン・ネイマールこと……」"
translation = "「네, 아가씨. 호시미 가문 메이드대, 마리온 네이마르이자……」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「ネビュラの人形使いにして人間界の連絡役、魔女・マリオンでございます♪」"
translation = "「네뷸라의 인형술사이자 인간계의 연락역, 마녀 마리온이옵니다♪」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「皆さまとの蜜月は大変楽しかったですが、リクリエの<ruby>本波<rt>ほんぱ</rt></ruby>となれば、流石に働かないわけには参りません」"
translation = "「여러분과의 밀월은 매우 즐거웠습니다만, 리크리에의 본파가 된다면, 아무리 그래도 일하지 않을 수는 없습니다.」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「正直、キリカさんには泳がされていたような気も致しますが……」"
translation = "「솔직히, 키리카 씨에게 놀아난 것 같은 기분도 듭니다만……」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「今はお嬢様を倒すことが、そのお命を守るのに直結する事態」"
translation = "「지금은 아가씨를 쓰러뜨리는 것이, 그 목숨을 지키는 것과 직결되는 사태」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「今回ばかりはきっと、メイド長もお許し下さるはずですよね♪」"
translation = "「이번만큼은 분명, 메이드장도 용서해 주실 거예요♪」"

[[dialogue]]
speaker = "unk"
original = "リーリアにマリオンさん。今まで世話になってきた学園の関係者の正体が、ネビュラのスパイだった──ということらしい。"
translation = "리리아에 마리온 씨. 지금까지 신세를 져 왔던 학원 관계자의 정체가, 네뷸라의 스파이였다──는 것 같다."

[[dialogue]]
speaker = "unk"
original = "ネビュラは星騎士たちの動向まで視野に入れて動いていた──その目が学園の内部に光っていたとしても、不思議ではなく。"
translation = "네뷸라는 성기사들의 동향까지 시야에 넣고 움직이고 있었다── 그 눈이 학원 내부에 빛나고 있었다고 해도, 이상하지 않았다."

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「──動揺しているようですね」"
translation = "「──동요하고 있는 것 같군요.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「さすがにな。けど、<b>通じてる</b>のはそっちばかりじゃない」"
translation = "「당연하지. 하지만, <b>통하는</b> 건 저쪽뿐만이 아니야.」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「クラウディア」"
translation = "「클라우디아」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「なんだ？\u3000魔王よ」"
translation = "「무엇이냐? 마왕이여.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「さっきの話を聞いての通りだ。俺は先代魔王の魂を継ぐもの──だからこそ今の俺には、彼女の想いもこもってるんだ」"
translation = "「방금 이야기를 들은 대로다. 나는 선대 마왕의 영혼을 잇는 자── 그러므로 지금의 나에게는, 그녀의 마음도 담겨 있다.」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「彼女……？」"
translation = "「그녀……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。俺に再誕の魔法をかけた光の魔女──トリュファイナからの」"
translation = "「아아. 나에게 재탄생의 마법을 건 빛의 마녀── 트뤼파이나로부터의 것이다.」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「……ほう！」"
translation = "「……호오!」"

[[dialogue]]
speaker = "unk"
original = "俺がその名を告げると、魔女たちは一様に目を丸くした。"
translation = "내가 그 이름을 고하자, 마녀들은 일제히 눈을 크게 떴다."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「なぜその名を……リノ、貴様か？」"
translation = "「어째서 그 이름을…… 리노, 네 짓이냐?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「いいえ。私もびっくりしてる」"
translation = "「아니. 나도 깜짝 놀랐어.」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「くくく……実に面白きことだ！\u3000よもや人の子から先代の名を聞くことになろうとはな」"
translation = "「크크크…… 실로 재미있는 일이로다! 설마 인간의 아이에게서 선대의 이름을 듣게 될 줄이야.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「トリュファイナは──ラクシスの無謀な願いを引き受けて、再誕の魔法をかけた」"
translation = "「트뤼파이나는── 라크시스의 무모한 소원을 받아들여, 재탄생의 마법을 걸었다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「すべては次のリクリエに対処するためだ。ラクシスも、トリュファイナも、それが最後の希望だと信じた」"
translation = "「모든 것은 다음 리크리에에 대처하기 위해서다. 라크시스도, 트뤼파이나도, 그것이 마지막 희망이라고 믿었다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だから俺は……この時代の、今回のリクリエを背負ってみせる。それが緋宮クロトの意志だ！」"
translation = "「그러니 나는…… 이 시대의, 이번 리크리에를 짊어지고 보이겠다. 그것이 히노미야 쿠로토의 의지다!」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「クロト……」"
translation = "「쿠로토……」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「引いてはくれないんですね、センパイ。私もあんまり戦いたくないっていうか──」"
translation = "「물러서 주지 않는군요, 선배. 저도 그다지 싸우고 싶지 않다고 할까──」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「いくら地脈による補助があろうと──星騎士たちが弱体化していることに変わりはないはず」"
translation = "「아무리 지맥에 의한 보조가 있다고 해도── 성기사들이 약체화하고 있다는 사실은 변함없을 터.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「確かに……魔女たち全員の相手はなかなか厳しいわね……」"
translation = "「확실히…… 마녀들 전원을 상대하는 건 꽤 힘들겠네……」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「──いいえ。まだ手はあるわ」"
translation = "「──아니. 아직 수가 있어.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「母さん……？」"
translation = "「엄마……?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「地脈を使って地球の裏側からも星と交信する──悪くないわね、クロト。でも、それならまだ活かせる一手があるわ」"
translation = "「지맥을 사용해 지구 반대편에서도 별과 교신한다── 나쁘지 않네, 쿠로토. 하지만, 그렇다면 아직 활용할 수 있는 한 수가 있어.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「こ、今度は何……？」"
translation = "「코, 이번엔 또 뭔데……?」"

[[dialogue]]
speaker = "unk"
original = "母さんの左手から──得体のしれない闇のオーラがあふれるように炸裂した。"
translation = "엄마의 왼손에서── 정체 모를 어둠의 오라가 터져 나오듯 작렬했다."

[[dialogue]]
speaker = "unk"
original = "そして、一帯に流れ出した闇の<ruby>帳<rt>とばり</rt></ruby>にはなぜか、きらめく星々たちが写し込まれている。"
translation = "그리고, 일대에 흘러나온 어둠의 장막에는 왠지 모르게, 반짝이는 별들이 비쳐 있었다."

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ん──待て、力が湧くぞ……！」"
translation = "「응── 잠깐, 힘이 솟아난다……!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「星術が、使える……！？」"
translation = "「성술을, 쓸 수 있어……!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「母さん、これは──？」"
translation = "「엄마, 이건──?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「これもちょっとしたアイテムでね。このマントは、人工的に夜空を覗かせてくれるのよ」"
translation = "「이것도 자그마한 아이템이거든. 이 망토는, 인공적으로 밤하늘을 엿보게 해 줘.」"

[[dialogue]]
speaker = "unk"
original = "母さんがヒラヒラと舞わせていたのは、擦り切れた長い布切れだった。"
translation = "엄마가 팔랑팔랑 흔들고 있던 것은, 해진 긴 천 조각이었다."

[[dialogue]]
speaker = "unk"
original = "その禍々しくも妖麗な様子を見て、ソフィアちゃんがつぶやく。"
translation = "그 재앙 같으면서도 요염한 모습을 보고, 소피아짱이 중얼거린다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「星骸布……！」"
translation = "「성해포……!」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「そ。魔族の子なら流石にわかるかな」"
translation = "「그래. 마족의 아이라면 역시 알겠지.」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「また知らニャいのが出てきたニャン、いったい何なのニャン……！？」"
translation = "「또 모르는 게 나왔냥, 대체 뭐인 거냥……!?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「魔界三大魔具のひとつ──それも、どこかの独裁者さんが独占していたものね」"
translation = "「마계 3대 마구 중 하나── 그것도, 어딘가의 독재자님이 독점하고 있던 것이네.」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「これは<ruby>頽廃都市<rt>キュリオス</rt></ruby>の皇妃、<ruby>煌嶺<rt>コウレイ</rt></ruby>様から賜ったもの。星骸布は──広げた一帯に、異界の夜空を映すことができる」"
translation = "「이것은 <ruby>퇴폐도시<rt>퀴리오스</rt></ruby>의 황비, 코우레이님에게서 받은 것. 성해포는── 펼친 일대에, 이계의 밤하늘을 비출 수 있다.」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「つまり今のあなた達は──人間界じゃなく、魔界を迂回して星との交信を繋げてる。星術に支障はないはずよ」"
translation = "「즉 지금의 너희들은── 인간계가 아니라, 마계를 우회해서 별과의 교신을 연결하고 있는 거야. 성술에 지장은 없을 거야.」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「つーことはこの夜は……魔界の星空ってことか……！」"
translation = "「그렇단 건 이 밤은…… 마계의 별하늘이란 건가……!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「なるほどね。なんか見覚えある気がしたのよ」"
translation = "「과연 그렇군. 뭔가 본 적 있는 기분이 들었어.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「私……いつもより力がみなぎっている気がします！」"
translation = "「저…… 평소보다 힘이 넘치는 기분이 듭니다!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「うん！\u3000これならいけるよ！」"
translation = "「응! 이거라면 할 수 있어!」"

[[dialogue]]
speaker = "unk"
original = "真上の天こそ塞がれているものの、多面的な空との連絡によって俺たちは従来以上の出力を獲得していた。"
translation = "바로 위의 하늘은 막혀 있지만, 다면적인 하늘과의 연락을 통해 우리는 종래 이상의 출력을 획득하고 있었다."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「でも、今だけよ。持続時間はもって数十分──布がたたまれてしまわないうちに、けりをつけましょう」"
translation = "「하지만, 지금뿐이야. 지속 시간은 길어야 수십 분── 천이 접히기 전에, 결판을 내자.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「わかった。恩に着る、母さん」"
translation = "「알았어. 은혜를 입을게, 엄마.」"

[[dialogue]]
speaker = "unk"
original = "一帯を取り巻くように展開された魔界の星空。これによって、俺たちは全員が星とのリンクを取り戻す。"
translation = "일대를 둘러싸듯이 펼쳐진 마계의 별하늘. 이것으로 인해, 우리들은 전원이 별과의 링크를 되찾는다."

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「くくく……そうでなくては面白くない。やはり懸けるのは全力でなくてはな」"
translation = "「크크크…… 그렇지 않으면 재미없지. 역시 거는 것은 전력이어야만 하는 법.」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「セドナよ。今日だけは、いつもの禁を破ってもよいな？」"
translation = "「세드나여. 오늘만은, 평소의 금기를 깨도 좋지 않겠느냐?」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ええ。ネビュラとのおやくそく第二十二条──『お外で魔法は使わない』を解禁します。私ともども」"
translation = "「예. 네뷸라와의 약속 제22조── 『밖에서 마법은 사용하지 않는다』를 해금하겠습니다. 저와 함께.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「もっとも……姫はいつだって無視していたでしょうが」"
translation = "「가장…… 공주께서는 언제나 무시하셨겠지만요.」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「言うでない」"
translation = "「말하지 말거라.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「これは……」"
translation = "「이것은……」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「なんニャ──変身……！？」"
translation = "「뭐냥── 변신……!?」"

[[dialogue]]
speaker = "unk"
original = "<ruby>滾々<rt>こんこん</rt></ruby>と湧き上がる光の魔力が、クラウディアの全身を変じさせていく。"
translation = "넘실넘실 솟아오르는 빛의 마력이, 클라우디아의 전신을 변화시켜 간다."

[[dialogue]]
speaker = "unk"
original = "それはさながら、俺たち星騎士にとっての変身──"
translation = "그것은 마치, 우리 성기사들에게 있어서의 변신──"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「魔の森に舞いし黄昏の、咲いて唄うは繚乱の蝶々──」"
translation = "「마의 숲에 춤추는 황혼의, 피어나 노래하는 요란한 나비──」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（魔力の奔流──この波動に、どこか懐かしさを覚えるのは……<ruby>前世<rt>ラクシス</rt></ruby>も浴びたからなのか──）"
translation = "（마력의 분출── 이 파동에, 어딘가 그리움을 느끼는 것은…… <ruby>전생<rt>라크시스</rt></ruby>도 쐬었기 때문인가──）"

[[dialogue]]
speaker_original = "クラウディア（黄昏）"
speaker_translation = "클라우디아(황혼)"
original = "「いつの世も──人の子と<ruby>闘<rt>たたか</rt></ruby>わねばならぬのはおかしきことだ。共に目指す地平は変わらぬというのに」"
translation = "「어느 시대든── 인간의 아이와 싸워야만 하는 것은 이상한 일이다. 함께 목표로 하는 지평은 변함없는데도.」"

[[dialogue]]
speaker_original = "クラウディア（黄昏）"
speaker_translation = "클라우디아(황혼)"
original = "「生まれや立ち場といったしがらみがなければ、余もお主らと遊んでやりたかったのだが。仕方あるまい。これも<b>さだめ</b>だ」"
translation = "「태생이나 입장이란 굴레가 없었다면, 여도 너희들과 놀아주고 싶었건만. 어쩔 수 없겠지. 이것도 <b>운명</b>이다.」"

[[dialogue]]
speaker = "unk"
original = "茜色の蝶々が舞う。聖なる波動がクラウディアの全身を満たしていく。"
translation = "붉은빛 나비가 춤춘다. 성스러운 파동이 클라우디아의 전신을 채워 간다."

[[dialogue]]
speaker = "unk"
original = "黄昏をまとう光の魔女──その圧倒的な存在感にはもはや、神々しささえ感じて。"
translation = "황혼을 두른 빛의 마녀── 그 압도적인 존재감에는 이미, 신성함마저 느껴졌다."

[[dialogue]]
speaker_original = "クラウディア（黄昏）"
speaker_translation = "클라우디아(황혼)"
original = "「セドナのことも恨んでやるな。冷血そうに見えるやもしれんが、ネビュラの決断とて苦しき妥協の結果なのだ」"
translation = "「세드나를 원망하지 말거라. 냉혈한처럼 보일지는 모르겠으나, 네뷸라의 결단 역시 괴로운 타협의 결과인 것이다.」"

[[dialogue]]
speaker_original = "クラウディア（黄昏）"
speaker_translation = "클라우디아(황혼)"
original = "「ゆえに、分かり合うなら力を置いて他になし。その全身。その全霊。余にぶつけてみるがいい」"
translation = "「그러므로, 서로 이해하려면 힘 외에는 달리 없다. 그 전신. 그 전령. 여에게 부딪쳐 보는 것이 좋을 것이다.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「っ……綺麗……」"
translation = "「윽…… 아름다워……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「こんなにも──聖なる魔力があったなんて……」"
translation = "「이렇게나── 성스러운 마력이 있었다니……」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「光の魔女は通常、数千年に一度の間隔でしか生まれない。指し示すべき予兆もない」"
translation = "「빛의 마녀는 통상, 수천 년에 한 번의 간격으로밖에 태어나지 않는다. 가리켜야 할 예조도 없다.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「だが、最大のリクリエが迫る今になって、姫が誕生なされたのは……それもまた運命と言うべきなのかもしれないな」"
translation = "「하지만, 최대의 리크리에가 다가오는 지금에 와서, 공주께서 탄생하신 것은…… 그것 또한 운명이라고 해야 할지도 모르겠군.」"

[[dialogue]]
speaker = "unk"
original = "自嘲気味に笑うセドナさん。"
translation = "자조 섞인 듯 웃는 세드나 씨."

[[dialogue]]
speaker = "unk"
original = "ネビュラの全員を鼓舞するように、暗黒の<ruby>焔<rt>ほむら</rt></ruby>が気炎を上げる。"
translation = "네뷸라의 전원을 고무하듯이, 암흑의 불꽃이 기염을 토한다."

[[dialogue]]
speaker_original = "クラウディア（黄昏）"
speaker_translation = "클라우디아(황혼)"
original = "「より強いものがこの場を制する。獣にも等しい単純な図式だが余は好きだ」"
translation = "「더 강한 자가 이 장소를 제압한다. 짐승과도 같은 단순한 도식이지만 여는 좋다.」"

[[dialogue]]
speaker_original = "クラウディア（黄昏）"
speaker_translation = "클라우디아(황혼)"
original = "「余も、余の晴れ舞台がために死力を尽くそう。目覚めし魔王よ、せいぜい余を楽しませてくれ」"
translation = "「여도, 여의 무대를 위해 사력을 다하겠다. 눈을 뜬 마왕이여, 실컷 여를 즐겁게 해 주거라.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ッッ────」"
translation = "「읏────」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「っ……！\u3000なんつうオーラ……！」"
translation = "「윽……! 무슨 오라가……!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「《光の魔女》──やはり別格ですね……！」"
translation = "「《빛의 마녀》── 역시 별격이군요……!」"

[[dialogue]]
speaker = "unk"
original = "凄絶なる光の覇気が拡散する。"
translation = "처절한 빛의 패기가 확산된다."

[[dialogue]]
speaker = "unk"
original = "そこに、いつかの『試し』の時のような手加減は一切なかった。"
translation = "거기에, 언젠가의 『시험』 때와 같은 봐주기는 일절 없었다."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「魔王クロトが目覚めたあの日──世界は３つに分かたれた。デネブ、ベガ、そしてアルタイル」"
translation = "「마왕 쿠로토가 눈을 뜬 그날── 세계는 셋으로 나뉘었어. 데네브, 베가, 그리고 알타이르.」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「全部を救うことはできなかった。だけど、この世界はまだ間に合うわ」"
translation = "「전부를 구할 수는 없었어. 하지만, 이 세계는 아직 늦지 않았어.」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「不出来な母親でごめんね、クロト。本当なら──私だけでなんとかできればよかったんだけど。結局頼ることになっちゃった」"
translation = "「변변찮은 엄마라서 미안해, 쿠로토. 사실은── 나 혼자서 어떻게든 할 수 있었으면 좋았을 텐데. 결국 의지하게 됐네.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「今さら何を言ってるんだよ。母さん」"
translation = "「이제 와서 무슨 말을 하는 거야, 엄마.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「おかげで仲間と出会えた。そして、世界を救える。これ以上に幸福なことはないんだから」"
translation = "「덕분에 동료를 만났어. 그리고, 세계를 구할 수 있어. 이보다 더 행복한 일은 없으니까.」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「クロト……もう。ほんと立派になっちゃって」"
translation = "「쿠로토…… 정말. 정말 훌륭하게 자랐네.」"

[[dialogue]]
speaker = "unk"
original = "偽りのない本心だった。みんなだってここに立ったことを後悔しちゃいないだろう。"
translation = "거짓 없는 진심이었다. 모두들 여기에 선 것을 후회하지 않을 것이다."

[[dialogue]]
speaker = "unk"
original = "懸けるは幾代にも及ぶ一族の宿願と、家族と世界を救いたいと祈る心。"
translation = "거는 것은 몇 대에 걸친 일족의 숙원과, 가족과 세계를 구하고 싶다고 기도하는 마음."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「私からも──お願いします。皆さん。力を貸してください」"
translation = "「저도── 부탁드립니다. 여러분. 힘을 빌려주세요.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「当然だ。新星、流星、両星徒会──全開でいく！\u3000ネビュラの魔女たちを制圧するぞ！」"
translation = "「당연하지. 신성, 유성, 양 성도회── 전력으로 간다! 네뷸라의 마녀들을 제압한다!」"

[[dialogue]]
speaker_original = "みんな"
speaker_translation = "모두"
original = "「おう！」"
translation = "「오!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「総員集結──姫様を援護し、星騎士たちを今度こそ無力化する！\u3000各員、配置につけ！」"
translation = "「총원 집결── 공주님을 엄호하고, 성기사들을 이번에야말로 무력화한다! 각원, 배치로!」"

[[dialogue]]
speaker_original = "ネビュラ"
speaker_translation = "네뷸라"
original = "「──イエス、マム！」"
translation = "「──예스, 마담!」"

[[dialogue]]
speaker_original = "クラウディア（黄昏）"
speaker_translation = "클라우디아(황혼)"
original = "「真祖ディアナの血を継ぎし、第八代《光の魔女》──クラウディア・イルゼ・フォン・ゴットフリートが宣告する」"
translation = "「진조 디아나의 피를 이은, 제8대 《빛의 마녀》── 클라우디아 일제 폰 고트프리트가 선고한다.」"

[[dialogue]]
speaker_original = "クラウディア（黄昏）"
speaker_translation = "클라우디아(황혼)"
original = "「来るがよい。星騎士、<ruby>はぐれ魔女<rt>ヤーガ</rt></ruby>、そして二柱の魔王。互いの尊厳を懸け──終末の前哨戦と参ろうではないか！」"
translation = "「오너라. 성기사, <ruby>떠돌이 마녀<rt>야가</rt></ruby>, 그리고 두 기둥의 마왕. 서로의 존엄을 걸고── 종말의 전초전으로 나아가자!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「参ります──命に代えても、守りたいものがあるから」"
translation = "「나아가겠습니다── 목숨을 걸고서라도, 지키고 싶은 것이 있으니까.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「姉さんのことも、この世界の命運も。私たちに背負わせていただきます──邪魔はさせない！」"
translation = "「언니의 일도, 이 세계의 명운도. 저희가 짊어지겠습니다── 방해는 시키지 않겠어요!」"

