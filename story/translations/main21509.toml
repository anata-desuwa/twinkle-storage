[[dialogue]]
speaker = "unk"
original = "第９話,良き旅を,B"
translation = "제9화, 좋은 여행을, B"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネL"
speaker_translation = "할로우 루비네 L"
original = "「認められない……こんなっ！」"
translation = "「인정할 수 없어…… 이딴 건!」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「グレイス、合わせろっ！」"
translation = "「그레이스, 타이밍을 맞춰!」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「はい！\u3000突撃しますッ──！！」"
translation = "「네! 돌격합니다──!!」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネL"
speaker_translation = "할로우 루비네 L"
original = "「こんなことがっ──！」"
translation = "「이런 일이──!」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「もう誰が相手でも──」"
translation = "「이제 상대가 누구든──」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「私たちを引き裂くことなんてできない！！」"
translation = "「우리를 갈라놓을 수 없어!!」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネL"
speaker_translation = "할로우 루비네 L"
original = "「あってはならない……！\u3000こんなこと、あってはならないのにっ──！？」"
translation = "「있을 수 없어……! 이런 일, 있을 수 없는데──!?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「これで終わりよ──ヘヴンリー・アクティベーションッ！！」"
translation = "「이것으로 끝이야── 헤븐리 액티베이션!!」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネL"
speaker_translation = "할로우 루비네 L"
original = "「──ぅぁぁぁああぁぁあぁぁああっ！？」"
translation = "「──으아아아아아아아아아아악!?」"

[[dialogue]]
speaker = "unk"
original = "極星学園生５人のユニゾンアタックが、１体のホロウを消滅させる。そして──"
translation = "극성학원생 5명의 합동 공격이 호로우 한 개체를 소멸시킨다. 그리고──"

[[dialogue]]
speaker = "unk"
original = "次元転送装置がルヴィネの手中に収まる！"
translation = "차원 전송 장치가 루비네의 손에 들어온다!"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「アルタイルにいる全複製体に告げる！\u3000貴方達の行き先は──崩壊せしベガの世界！\u3000今すぐここから消えなさい！！！」"
translation = "「알타이르에 있는 모든 복제체에게 알린다! 당신들의 행선지는── 붕괴해 버린 베가의 세계! 지금 당장 여기서 사라지거라!!!」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「出来損ないの、分際で……」"
translation = "「덜떨어진 주제에……」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「どこまで、お父様の邪魔を──」"
translation = "「어디까지 아버님을 방해하려는──」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「けれど……再創生は終わらない……」"
translation = "「하지만…… 재창성은 끝나지 않아……」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「アルタイルとデネブの破滅は──」"
translation = "「알타이르와 데네브의 파멸은──」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「もはや、決定的──」"
translation = "「이미 결정적──」"

[[dialogue]]
speaker = "unk"
original = "塔の頂上を埋め尽くしていた複製体のホロウを全て、帰還不可能な平行世界へと追放することができた。"
translation = "탑 꼭대기를 가득 메우고 있던 복제체 호로우들을 전부 귀환 불가능한 평행세계로 추방할 수 있었다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「……やった」"
translation = "「……해냈어」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「私たちの……勝ちだね！」"
translation = "「우리의…… 승리네!」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「本当によかった……みんなで勝利を掴むことができました！」"
translation = "「정말로 다행이에요…… 모두와 함께 승리를 거머쥘 수 있었습니다!」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「ふふ。ようやく言える余裕ができたわね……ルヴィ」"
translation = "「후후. 드디어 말을 건넬 여유가 생겼네…… 루비」"

[[dialogue]]
speaker_original = "みんな"
speaker_translation = "모두"
original = "「おかえりなさい！」"
translation = "「어서 와!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「うん…………」"
translation = "「응…………」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「──ただいま！」"
translation = "「──다녀왔어!」"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『お疲れ様です──最初の窮地を突破しましたね。そしてルヴィネ。よく……帰ってきてくれました』"
translation = "『수고하셨습니다── 첫 번째 고비를 돌파했군요. 그리고 루비네. 잘…… 돌아와 주었습니다』"

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「ママ！\u3000見てくれてたのね！」"
translation = "「엄마! 보고 계셨군요!」"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『ええ。ヴィーナス……果敢な戦いぶり、本当に見事でした』"
translation = "『네. 비너스…… 용맹하게 싸운 모습, 정말로 훌륭했습니다』"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『しかし戦いはまだ、終わっていない──いえ、これからが本当の始まりです』"
translation = "『하지만 싸움은 아직 끝나지 않았습니다── 아니요, 이제부터가 진짜 시작입니다』"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『直截に言いましょう──たった今、デネブの世界で流星群が発生しました』"
translation = "『솔직하게 말씀드리죠── 방금 전, 데네브의 세계에서 유성우가 발생했습니다』"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「なっ……！？」"
translation = "「이──!?」"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『極星学園の星騎士たちが応戦していますが、ホロウとの実力差は圧倒的……各地で大混乱が起こっています』"
translation = "『극성학원의 성기사들이 맞서 싸우고 있습니다만, 호로우와의 실력 차이는 압도적…… 각지에서 대혼란이 일어나고 있습니다』』"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『そして──ここ、アルタイルの地上でも、流星群はまだ停止していません。今に再び、大量のホロウが侵入してくることでしょう』"
translation = "『그리고── 이곳 알타이르의 지상에서도 유성우는 아직 멈추지 않았습니다. 조만간 또다시 대량의 호로우가 침입해 오겠지요』"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「転送装置は、アルタイルに在るものが全てよ。まだ新しい装置を創る時間はないはず……どうやって？」"
translation = "「전송 장치는 알타이르에 있는 것이 전부야. 아직 새로운 장치를 만들 시간은 없을 텐데…… 대체 어떻게?」"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『吸血鬼の少女、ベアトリスがアルタイルに来たのと同じ方法です』"
translation = "『흡혈귀 소녀 베아트리스가 알타이르에 올 때 썼던 것과 같은 방법입니다』"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……！\u3000教皇庁前の、時空の裂け目！」"
translation = "「……! 교황청 앞의 시공의 균열!」"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『はい。製造したホロウを次々に放り込み──アルタイルに偶然たどり着けるルートを模索しているのです』"
translation = "『네. 제조한 호로우를 차례차례 밀어 넣어── 알타이르에 우연히 도달할 수 있는 경로를 모색하고 있는 것입니다』"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『すでに数百体のホロウが時空のはざまで塵と消えました……が、無限の試行回数の前には、いずれアルタイルに出現する個体が現れるのは自明です』"
translation = "『이미 수백 명의 호로우가 시공의 틈새에서 먼지가 되어 사라졌습니다만…… 무한에 가까운 시도 횟수 앞에서는 결국 알타이르에 출현하는 개체가 나타나는 법은 자명합니다』"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「そんな……命を何だと思って……」"
translation = "「그런…… 생명을 뭐라고 생각하는 거야……」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「まずいね。そうなればもう抑えきれない──装置を奪えば何とかなった、今の戦い以上の絶望が待っている……」"
translation = "「큰일이군. 그렇게 되면 더는 막을 수 없어── 장치를 빼앗으면 어떻게든 되었던 지금의 전투 이상의 절망이 기다리고 있어……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……大本を叩くしかない！\u3000今すぐデネブに乗り込む！！」"
translation = "「……근원을 치는 수밖에 없어! 지금 당장 데네브로 쳐들어간다!!」"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『声を届けることしかできず、申し訳ありません。ですが、時は一刻を争います。どうか世界を守ってください……』"
translation = "『목소리를 전하는 것밖에 할 수 없어 죄송합니다. 하지만 일 분 일 초를 다투는 상황입니다. 부디 세계를 지켜 주세요……』"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『そしてもう１つ、あなたたちに伝えたいことがあります。よく、聞いてください──』"
translation = "『그리고 또 한 가지, 여러분에게 전하고 싶은 말이 있습니다. 잘 들어 주세요──』"

[[dialogue]]
speaker = "unk"
original = "女神テルルから重要な話を授かった後、俺たちは急いで塔を下り、地上へ向かうことになった。"
translation = "여신 테루루에게서 중요한 이야기를 들은 후, 우리는 서둘러 탑을 내려와 지상으로 향하기로 했다."

[[dialogue]]
speaker = "unk"
original = "ショートカットの大穴が空いているとはいえ、フィーニスの塔は途方もない階層を連ねている──地上の様子を早く確認しなくては。"
translation = "지름길인 큰 구멍이 뚫려 있다고는 해도 피니스의 탑은 어마어마한 층수로 이루어져 있다── 지상의 상황을 하루빨리 확인해야만 한다."

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……大丈夫か、ヴィーナス？」"
translation = "「……괜찮아, 비너스?」"

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「……うん」"
translation = "「……응」"

[[dialogue]]
speaker = "unk"
original = "これからの決戦のために、俺たちが足を止めることは許されない──すまない、ヴィーナス。"
translation = "앞으로의 결전을 위해 우리가 발걸음을 멈추는 것은 허용되지 않는다── 미안하다, 비너스."

[[dialogue]]
speaker = "unk"
original = "そこかしこに残る戦禍と不気味な天空──しかし両学園は無事に守り切られていた。"
translation = "곳곳에 남아있는 전쟁의 흔적과 불길한 하늘── 하지만 두 학원은 무사히 지켜지고 있었다."

[[dialogue]]
speaker = "unk"
original = "そのことに安堵した俺たちは、早速各地へ連絡を取った──"
translation = "그 사실에 안도한 우리는 즉시 각지로 연락을 취했다──"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「魔王。それにベアト──よくやったな！\u3000君たちならきっと成し遂げると思っていたぞ」"
translation = "「마왕. 그리고 베아토── 잘해주었군! 너희라면 분명 해낼 거라고 생각하고 있었다」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「梨緒ちゃんも！\u3000地上はひどい戦いだったって……大丈夫だった！？」"
translation = "「리오짱도! 지상은 엄청난 전투였다고 들었는데…… 괜찮았어!?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「偽のルヴィネに手こずりはしたが、防衛線は割っていない。校舎への被害も軽微だ。安心してくれ」"
translation = "「가짜 루비네 때문에 애를 먹긴 했지만 방어선은 뚫리지 않았다. 교사에 대한 피해도 경미해. 안심해라」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「お帰りなさいなのです、フィオナ会長っ！」"
translation = "「다녀오신 것입니다, 피오나 회장님!」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「みんな、無事で何より……よく持ちこたえてくれました！」"
translation = "「모두 무사해서 다행이네요…… 잘 버텨 주었습니다!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「も～大変だったよぉ。フィオナちゃんがいなくなった途端に強敵登場だもんね」"
translation = "「정마~알 힘들었다구우. 피오나 양이 없어지자마자 강적이 등장해 버렸는걸」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「だいたいの事情は聞いた。デネブに乗り込まないと、この騒動は終わらないってな」"
translation = "「대강의 사정은 들었다. 데네브로 쳐들어가지 않으면 이 소동은 끝나지 않는다는 거지」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「準備はできています。流星星徒会、いつでもいけます！」"
translation = "「준비는 끝났습니다. 유성성도회, 언제든 갈 수 있습니다!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ありがとう。だがその前に──っと。噂をすれば、だな」"
translation = "「고마워. 하지만 그전에── 앗. 호랑이도 제 말 하면 온다더니」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「フヒヒヒ！\u3000やぁやぁ会長。例のブツを仕入れたと聞いて飛んで来たヨ！」"
translation = "「흐히히히! 안녕안녕 회장. 그 물건을 입수했다는 소식을 듣고 날아왔다구!」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「早速、検めさせてもらおウ！\u3000敵は待ってはくれないからネ！」"
translation = "「당장 확인해 보도록 하지! 적은 기다려 주지 않으니까 말이야!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ええ。これ、お願いします」"
translation = "「네. 이걸 부탁드립니다」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「転送装置……魔王が使うんじゃないのか？」"
translation = "「전송 장치…… 마왕이 쓰는 게 아닌 건가?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いいや。操作は全て、アルタイル世界からアニマ先輩たちに行ってもらう」"
translation = "「아니. 조작은 전부 알타이르 세계에서 아니마 선배 일행이 해줄 거야」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「デネブに比べて、アルタイルの方が戦力に余裕がある。デネブに戦力を逐次投入するために、装置はアルタイル側に置いた方が効率がいい」"
translation = "「데네브에 비해 알타이르 쪽이 전력에 여유가 있어. 데네브에 전력을 순차적으로 투입하기 위해서는 장치를 알타이르 쪽에 두는 편이 더 효율적이야」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「しかしそれだと、もしもの時に帰還が──いや。そもそも敗北すれば結末は一緒か」"
translation = "「하지만 그렇게 되면 만일의 사태에 귀환이── 아니. 애초에 패배하면 결말은 똑같나」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。自分の生まれ育った世界で死ねないってだけだ」"
translation = "「아아. 자신이 태어나 자란 세계에서 죽지 못할 뿐이지」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「作戦の概要を伝えるぞ。まずルヴィネたちと一緒に、アルタイルの精鋭が先遣部隊としてデネブ救出に向かう」"
translation = "「작전의 개요를 설명하겠다. 우선 루비네 일행과 함께 알타이르의 정예가 선발대로서 데네브 구출을 향해 간다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「目的は『ＸＥＬＯＳ』の打倒ではなく、あくまでもホロウの無限増殖と次元渡りを阻止することだ」"
translation = "「목적은 『XELOS』의 타도가 아니라, 어디까지나 호로우의 무한 증식과 차원 이동을 저지하는 것이다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……この作戦は、片道切符になってしまうかもしれない。みんな、覚悟はいいか？」"
translation = "「……이 작전은 편도선 티켓이 되어 버릴지도 몰라. 모두 각오는 되어 있나?」"

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「当然よ！\u3000アルタイルもデネブも、ぜーんぶ守り切らなきゃ勝ったとは言えないわ！」"
translation = "「당연하지! 알타이르도 데네브도, 전~부 지켜내지 못하면 이겼다고 할 수 없어!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……本当に、ありがとう。感謝するわ」"
translation = "「……정말로 고마워. 감사할게」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「しかし──転送装置も２台あるとなれば、話は変わってくるゾ！」"
translation = "「하지만── 전송 장치도 두 대나 있다면 이야기가 달라진다구!」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「トレジアンナにも準備はさせていルヨ！\u3000彼女とアニマの２人が揃えバ……フヒヒ！\u3000会長、例の件は実行に移させてもらおウ！」"
translation = "「트레지안나에게도 준비를 시켜두었어! 그녀와 아니마 두 사람이 모인다면…… 흐히히! 회장, 그 건은 실행으로 옮기도록 하겠어!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「はい！\u3000よろしくお願いします、アニマ先輩」"
translation = "「네! 잘 부탁드립니다, 아니마 선배」"

[[dialogue]]
speaker = "unk"
original = "早くも転送装置を何かの計器にかけて測定を始めたアニマ先輩に頭を下げてから、俺はみんなの方へ向き直る。"
translation = "벌써 전송 장치를 어떤 계측기에 연결해 측정을 시작한 아니마 선배에게 고개를 숙인 뒤, 나는 모두를 향해 몸을 돌렸다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「デネブへの先遣部隊は、新星、流星、極星学園の星徒会メンバー……」"
translation = "「데네브로 갈 선발대는 신성, 유성, 극성학원의 성도회 멤버……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そして選管の梨緒とジグ。……アポロは、同一存在がデネブにいるから、留守番だ」"
translation = "「그리고 선관의 리오와 지그. ……아폴로는 동일 존재가 데네브에 있으니까 대기다」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ああ。アルタイルは必ず守る……安心して行ってこい！」"
translation = "「아아. 알타이르는 반드시 지킬게…… 안심하고 다녀와!」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「妾とリーエンの席も、当然あるのであろうな？」"
translation = "「소첩과 리엔의 자리도 당연히 있겠지?」"

[[dialogue]]
speaker = "unk"
original = "煌嶺が部下のリーエンを連れてやってきた。"
translation = "코레이가 부하인 리엔을 데리고 나타났다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「勿論だ。キュリオス勢の助力なしで、今の状況はひっくり返せない」"
translation = "「물론이다. 큐리오스 세력의 도움 없이는 지금 상황을 뒤집을 수 없어」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「──魔王様！\u3000遅くなり申し訳ございません！」"
translation = "「──마왕님! 늦어서 죄송합니다!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……エステル」"
translation = "「……에스텔」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「ルヴィネ会長。先ほど、魔王様から送られてきたメッセージで、おおかたの事情は把握しています……とても驚きましたが……」"
translation = "「루비네 회장님. 조금 전 마왕님에게서 온 메시지로 대강의 사정은 파악했습니다…… 무척 놀랐습니다만……」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「貴女の出自がどうであれ──世界を救う仲間であると。それさえ事実であるならば、このエステル。共に戦います！」"
translation = "「회장님의 출신이 어떻든── 세계를 구하는 동료라는 사실. 그것만 분명하다면 이 에스텔, 함께 싸우겠습니다!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……ごめんなさい。そう言ってもらえて、心強いわ」"
translation = "「……미안해. 그렇게 말해 줘서 정말 든든해」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「でもよ、本当に大丈夫か？\u3000ホロウのやつ、今に大群でアルタイルに雪崩れ込んでくるぞ」"
translation = "「하지만 진짜 괜찮은 거야? 호로우 녀석들, 조만간 떼거리로 알타이르에 들이닥칠 거라고」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「デネブ救援に、精鋭を割きすぎなんじゃ……」"
translation = "「데네브 구출에 정예를 너무 많이 할애하는 거 아닌가……」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「その心配は不要だ」"
translation = "「그 걱정은 필요 없다」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「アルタイルの防衛は、我らネビュラの魔女とコラプサーが引き受けます」"
translation = "「알타이르의 방위는 우리 네뷸라의 마녀들과 콜랩서가 맡겠습니다」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「会長さん、お久しぶりですね。他ならぬ貴方の依頼ならばと、全構成員が駆けつけていますよ！」"
translation = "「회장님, 오랜만이네요. 다름 아닌 당신의 의뢰라면 기꺼이 돕겠다며 전 구성원이 달려왔답니다!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ありがとう。魔女の皆には助けられてばかりだ」"
translation = "「고마워. 마녀 여러분에게는 매번 도움만 받는군」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「魔女の世界は狭いが深い。姫様を始めとして、永き時を生きた精鋭をすべて人間界に招集済みだ。そして……」"
translation = "「마녀들의 세계는 좁지만 깊지. 공주님을 비롯해 오랜 세월을 살아온 정예들을 전부 인간계로 소집해 두었다. 그리고……」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「──先代様。お目にかかれて光栄です」"
translation = "「──선대님. 뵙게 되어 영광입니다」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「頭をお上げください。今の貴女が<ruby>傅<rt>かしず</rt></ruby>くべき光の魔女は、私ではないのですから」"
translation = "「고개를 드세요. 지금의 당신이 모셔야 할 빛의 마녀는 제가 아니니까요」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「はい。姫様も、先代にお会いできるのを楽しみにしておりました。またいずれ、語らいの場を」"
translation = "「예. 공주님께서도 선대님을 뵙는 것을 고대하고 계셨습니다. 다음에 꼭 이야기꽃을 피울 수 있는 자리를」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「ええ。しかしこの場にいないようですが……？」"
translation = "「그러죠. 그런데 이 자리에는 보이지 않는 모양입니다만……?」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「市街地でアステラの対処と、生き残りの使徒のシャドウたちを相手に交戦中です……止めて聞く御方ではありませんしね」"
translation = "「시가지에서 아스테라의 대처와 살아남은 사도의 섀도들을 상대로 교전 중이십니다…… 말린다고 들으실 분도 아니니까요」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……１人で大丈夫なの？」"
translation = "「……혼자서 괜찮은 거야?」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「護衛は当然付けてある。心配は無用だ──行け、魔王。背中はネビュラに任せろ」"
translation = "「호위는 당연히 붙여 두었지. 걱정할 필요 없다── 가라, 마왕. 등 뒤는 네뷸라에게 맡겨라」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「魔王様……申し訳ありません。先ほどの戦いで、私の３０００年分の蓄積魔力は切れてしまったようで……」"
translation = "「마왕님…… 죄송합니다. 조금 전의 전투로 제 3000년 치 축적 마력이 바닥나 버린 모양이라……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いえ、トリュファイナさんには感謝してもし切れません。元々ルヴィネの蘇生だけでも一か八かだったのに、俺たち全員の回復まで……」"
translation = "「아닙니다, 트류파이나 씨에게는 감사해도 모자랄 지경입니다. 원래 루비네의 소생만 해도 모 아니면 도였는데, 우리 전원의 회복까지……」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「デネブに押しかけて足手まといになるわけにはいきませんが……少し休めば、一般的な回復魔法程度は使えるようになるはずです」"
translation = "「데네브에 따라가서 짐이 될 수는 없으니…… 조금 쉬면 일반적인 회복 마법 정도는 쓸 수 있게 될 것입니다」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「お供できず悔しい思いですが……私はアルタイルに残り、出来る限りを尽くしたいと思います」"
translation = "「동행하지 못해 분한 마음입니다만…… 저는 알타이르에 남아 할 수 있는 한 최선을 다하고자 합니다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「はい、よろしくお願いします！\u3000──それじゃあアニマ先輩！\u3000転送の準備を！」"
translation = "「네, 잘 부탁드립니다! ──그럼 아니마 선배! 전송 준비를!」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「フッヒヒヒヒ！\u3000オーケーオーケー、了解ダ～！」"
translation = "「흫히히히히! 오케이 오케이, 알겠다구~!」"

[[dialogue]]
speaker = "unk"
original = "アニマ先輩が装置を起動し、先遣部隊と指名した全員を飲み込む、空間の裂け目が現れる──"
translation = "아니마 선배가 장치를 기동하자 선발대로 지명된 전원을 집어삼킬 듯한 공간의 균열이 나타났다──"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「みなさん、ご武運を！」"
translation = "「여러분, 무운을 빕니다!」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「勝利はあなた方と共にあります──<ruby>良き旅を<rt>ボン・ボヤージュ</rt></ruby>！！」"
translation = "「승리는 여러분과 함께할 것입니다── <ruby>좋은 여행을<rt>봉 보야지</rt></ruby>!!」"

