[[dialogue]]
speaker = "unk"
original = "第９話,もう１人の星徒会長,B"
translation = "제9화, 또 한 명의 성도회장, B"

[[dialogue]]
speaker = "梨緒"
original = "「私はこことは違う新星学園にいて、そこでは星徒会副会長だった」"
translation = "「나는 이곳과는 다른 신성학원에 있었고, 그곳에선 성도회 부회장이었다.」"

[[dialogue]]
speaker = "梨緒"
original = "「そしてジグは……星徒会長だった」"
translation = "「그리고 지그는…… 성도회장이었지.」"

[[dialogue]]
speaker = "unk"
original = "だが記録上、新星にレナーテ・Ｚ・サイフリートという名の星徒会長は存在したことがない。"
translation = "하지만 기록상, 신성에 레나테 Z 자이프리트라는 이름의 성도회장은 존재한 적이 없다."

[[dialogue]]
speaker = "unk"
original = "これも梨緒がアルタイルではない、平行世界からやって来たという証左の１つになってしまったわけだが、今は彼女の話に水を差すのはやめておこう。"
translation = "이것도 리오가 알타이르가 아닌, 평행세계에서 왔다는 증거 중 하나가 되어버린 셈이지만, 지금은 그녀의 말을 끊지 않기로 했다."

[[dialogue]]
speaker = "ベアトリス"
original = "「梨緒ちゃんの仲間……だったんだよね」"
translation = "「리오 짱의 동료……였던 거지.」"

[[dialogue]]
speaker = "梨緒"
original = "「……ああ。あいつと一緒に、いろんな敵と戦った」"
translation = "「……아아. 녀석과 함께 여러 적과 싸웠다.」"

[[dialogue]]
speaker = "梨緒"
original = "「周囲を侵食する植物型のモンスター……流星市国上空を覆う巨大なアステラ……そしてあの巨大な<b>手</b>──」"
translation = "「주변을 침식하는 식물형 몬스터…… 유성시국 상공을 뒤덮는 거대한 아스테라…… 그리고 그 거대한 <b>손</b>──」"

[[dialogue]]
speaker = "梨緒"
original = "「っ……」"
translation = "「윽……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「梨緒ちゃん！？」"
translation = "「리오 짱!?」"

[[dialogue]]
speaker = "unk"
original = "梨緒の顔が苦痛に歪み、咄嗟に頭を押さえる。"
translation = "리오의 얼굴이 고통으로 일그러지며, 다급히 머리를 감싸 쥔다."

[[dialogue]]
speaker = "梨緒"
original = "「すまない……ジグのことを考えると、時々頭が痛むんだ……」"
translation = "「미안하다…… 지그를 생각하면 가끔 머리가 아파와서…….」"

[[dialogue]]
speaker = "梨緒"
original = "「気にしないでくれ、少しすれば収まる……」"
translation = "「신경 쓰지 마라, 조금 있으면 가라앉을 테니……」"

[[dialogue]]
speaker = "unk"
original = "そう言って梨緒は、頭痛をこらえるように自分のこめかみをギュっと抑えた。"
translation = "그렇게 말하며 리오는 두통을 참으려는 듯 자신의 관자놀이를 꾹 눌렀다."

[[dialogue]]
speaker = "梨緒"
original = "「……私は数ヶ月前、星見家に保護されてから、ずっとジグを探していた。私が生きているなら、きっとあいつも生きて近くにいると思っていた」"
translation = "「……나는 몇 달 전, 호시미 가문에 보호받은 뒤로 줄곧 지그를 찾고 있었다. 내가 살아있다면, 분명 녀석도 살아서 근처에 있을 거라 생각했지.」"

[[dialogue]]
speaker = "梨緒"
original = "「確かにジグは生きていた。だけど──」"
translation = "「확실히 지그는 살아있었다. 하지만──」"

[[dialogue]]
speaker = "unk"
original = "最悪の形で再会した。"
translation = "최악의 형태로 재회했다."

[[dialogue]]
speaker = "unk"
original = "ジグは仮面を付け、『リクリエの使徒』という、世界の最大の敵となって、俺たちの前に立ちふさがった。"
translation = "지그는 가면을 쓰고, 『리크리에의 사도』라는 세계 최대의 적이 되어 우리 앞을 가로막았다."

[[dialogue]]
speaker = "梨緒"
original = "「緋宮クロトから事前に聞かされていた『リクリエの使徒』の特徴に、ジグはあまりにも一致していた」"
translation = "「히노미야 쿠로토에게 미리 들었던 『리크리에의 사도』의 특징에, 지그는 너무나도 일치했다.」"

[[dialogue]]
speaker = "梨緒"
original = "「嫌でもわかる。あれは……私たちの敵だ」"
translation = "「싫어도 알 수밖에 없어. 저건…… 우리의 적이다.」"

[[dialogue]]
speaker = "梨緒"
original = "「ジグは昔から強かった」"
translation = "「지그는 예전부터 강했다.」"

[[dialogue]]
speaker = "梨緒"
original = "「彼女とは新星に入学した時から競い合う仲だったが……勝負はいつもジグの勝ちだった」"
translation = "「그녀와는 신성에 입학했을 때부터 경쟁하는 사이였지만…… 승부는 언제나 지그의 승리였다.」"

[[dialogue]]
speaker = "梨緒"
original = "「星徒会長の座をかけて戦ったこともあったが、会長になったのはジグだった」"
translation = "「성도회장 자리를 걸고 싸운 적도 있었지만, 회장이 된 건 지그였다.」"

[[dialogue]]
speaker = "梨緒"
original = "「副会長になってからも、ジグとは何度も勝負をした。だけどただの一度も、勝つことはできなかった」"
translation = "「부회장이 된 뒤로도 지그와는 몇 번이고 승부했다. 하지만 단 한 번도 이길 수 없었지.」"

[[dialogue]]
speaker = "梨緒"
original = "「私は……ジグが嫌いだった」"
translation = "「나는…… 지그가 싫었다.」"

[[dialogue]]
speaker = "梨緒"
original = "「何回挑んでも勝てなくて、いつも余裕で……誰よりも強くて……」"
translation = "「몇 번을 도전해도 이길 수 없고, 언제나 여유롭고…… 누구보다 강해서……」"

[[dialogue]]
speaker = "梨緒"
original = "「だというのに、なぜ……ジグがリクリエの使徒なんかに……」"
translation = "「그런데 어째서…… 지그가 리크리에의 사도 따위가……」"

[[dialogue]]
speaker = "アポロ"
original = "「<ruby>仮面<rt>あれ</rt></ruby>が持ちかけるのは、悪魔の契約だ。人の望みに付け入り、甘い言葉で誘惑し、解釈を捻じ曲げる」"
translation = "「가면이 제안하는 건 악마의 계약이다. 인간의 소망을 파고들어, 달콤한 말로 유혹하고, 해석을 뒤틀어버리지.」"

[[dialogue]]
speaker = "梨緒"
original = "「アポロ……？」"
translation = "「아폴로……?」"

[[dialogue]]
speaker = "アポロ"
original = "「ジグは恐らく、願っちまったんだろう。あたしと同じように、『もしやり直せたら』って」"
translation = "「지그는 아마 바랐을 거야. 나랑 마찬가지로, 『만약 다시 시작할 수 있다면』이라고.」"

[[dialogue]]
speaker = "アポロ"
original = "「だけどな！\u3000『もっと上手くやりたかった』なんて、誰でも考えることだ！」"
translation = "「하지만 말이야! 『좀 더 잘하고 싶었다』 같은 건 누구나 생각하는 거잖아!」"

[[dialogue]]
speaker = "アポロ"
original = "「あの仮面は、そういう誰もが当たり前に思っていることに付け入って、解釈を捻じ曲げる！」"
translation = "「저 가면은 그런 누구나 당연하게 생각하는 점을 파고들어서, 해석을 뒤틀어버려!」"

[[dialogue]]
speaker = "アポロ"
original = "「ジグはリクリエなんて望んでないと思うぜ。たちの悪い仮面に利用されているだけだ！\u3000当事者だったあたしが言うんだから、間違いない！」"
translation = "「지그는 리크리에 같은 걸 바라지 않을 거라고 봐. 질 나쁜 가면에게 이용당하고 있을 뿐이야! 당사자였던 내가 말하는 거니까 틀림없어!」"

[[dialogue]]
speaker = "梨緒"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "梨緒"
original = "「ああ。ありがとう、アポロ」"
translation = "「아아. 고맙다, 아폴로.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「以前、アポロちゃんがリクリエの使徒だった、ということは、使徒になった人は助けられるってことだよね？」"
translation = "「예전에 아폴로 짱이 리크리에의 사도였다는 건, 사도가 된 사람도 구할 수 있다는 거지?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「確かに。そこから助かった例があるなら、そこまで悲観的にならなくていいのかも？」"
translation = "「확실히. 거기서 구출된 사례가 있다면, 그렇게까지 비관적으로 생각하지 않아도 될지도?」"

[[dialogue]]
speaker = "クロト"
original = "「……後ろ向きなことを言うようで申し訳ないが、正直に言って確証はない」"
translation = "「……부정적인 말을 하는 것 같아 미안하지만, 솔직히 말해 확증은 없어.」"

[[dialogue]]
speaker = "クロト"
original = "「アポロの場合、双子であるフィオナとの共鳴や、本人が魔王の資質を開花させていることもあって、一般的な事例とは言いづらい」"
translation = "「아폴로의 경우, 쌍둥이인 피오나와의 공명이나 본인이 마왕의 자질을 개화시킨 점도 있어서, 일반적인 사례라고 보기는 힘들어.」"

[[dialogue]]
speaker = "クロト"
original = "「ジグが梨緒の仲間なら、助けられるすべを探りたいとは思っているんだが……楽観視はしないでほしい」"
translation = "「지그가 리오의 동료라면 구할 방법을 찾고 싶긴 하지만…… 낙관하지는 말아줬으면 해.」"

[[dialogue]]
speaker = "クロト"
original = "「これは救出を諦めよう、ってことじゃない。恐らく困難な道になるから、今から備えようって話だ」"
translation = "「이건 구출을 포기하자는 게 아니야. 아마 험난한 길이 될 테니 지금부터 대비하자는 이야기지.」"

[[dialogue]]
speaker = "梨緒"
original = "「……ああ、わかっている」"
translation = "「……아아, 알고 있다.」"

[[dialogue]]
speaker = "梨緒"
original = "「それにいざという時は、私がジグを討つ。例え刺し違えたとしても──」"
translation = "「그리고 만약의 경우에는 내가 지그를 치겠다. 설령 동귀어진하는 한이 있더라도──」"

[[dialogue]]
speaker = "ナターシャ"
original = "「えい」"
translation = "「에잇.」"

[[dialogue]]
speaker = "梨緒"
original = "「あいたっ！？」"
translation = "「앗 따가!?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ナターシャちゃん！？」"
translation = "「나타샤 짱!?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「はいはい、刺し違えるとか簡単に言わない。そういうのは最後の手段でしょ」"
translation = "「네네, 동귀어진 같은 소리 쉽게 하지 마. 그런 건 최후의 수단이잖아.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「だいたいさ、命捨てたからってあのジグってやつを倒せるの？\u3000負けっぱなしだったんでしょ？」"
translation = "「애초에 말이야, 목숨 버린다고 해서 그 지그라는 녀석을 이길 수 있어? 계속 졌다며?」"

[[dialogue]]
speaker = "梨緒"
original = "「な……！\u3000それは──」"
translation = "「나……! 그건──」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ていうか会長さんの話聞いてた？\u3000きっと大変だから、今のうちから準備しておこうって話をしてたわけ」"
translation = "「그보다 회장님 말 들었어? 분명 힘들 테니까, 지금부터 미리 준비해 두자는 얘기를 하던 참이잖아.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「私たちは昨日初めてジグに出会ったところなんだから、とりあえずあいつがどんなやつなのか知りたかっただけ」"
translation = "「우리는 어제 처음 지그를 만났을 뿐이니까, 우선 그 녀석이 어떤 녀석인지 알고 싶었을 뿐이야.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「それ以上のことは、これから調べるし、これから考えるんだから、先回りして答えを出さなくていいんだよ」"
translation = "「그 이상의 일은 이제부터 조사할 거고, 이제부터 생각할 거니까, 앞질러서 결론을 내버릴 필요는 없어.」"

[[dialogue]]
speaker = "梨緒"
original = "「……ナターシャ」"
translation = "「……나타샤.」"

[[dialogue]]
speaker = "アポロ"
original = "「ナターシャの言う通りだな！\u3000ラッカン的もよくないが、ヒカン的なのもよくないぞ！」"
translation = "「나타샤 말이 맞아! 낙관적인 것도 안 좋지만, 비관적인 것도 안 좋다고!」"

[[dialogue]]
speaker = "アポロ"
original = "「あたしという事例がある以上、あの仮面は顔に引っ付いて絶対に取れない、ってわけじゃない！\u3000何かきっかけさえあれば助けられるってことだ」"
translation = "「나라는 사례가 있는 이상, 그 가면이 얼굴에 달라붙어서 절대로 안 벗겨진다, 그런 건 아니야! 뭔가 계기만 있다면 구할 수 있다는 뜻이지.」"

[[dialogue]]
speaker = "梨緒"
original = "「……ああ、君たちの言う通りだな。考えすぎは良くない、肝に銘じておく」"
translation = "「……아아, 너희 말이 맞군. 너무 깊게 생각하는 건 좋지 않아, 명심하도록 하지.」"

[[dialogue]]
speaker = "unk"
original = "仲間の言葉を聞いた梨緒は、少しだけ肩の力を抜いて、小さく微笑んだ。"
translation = "동료들의 말을 들은 리오는 조금 어깨의 힘을 빼고 작게 미소 지었다."

[[dialogue]]
speaker = "クロト"
original = "「そういえば、ジグについてもう１つ聞いておきたいことがあった」"
translation = "「그러고 보니, 지그에 대해 한 가지 더 물어보고 싶은 게 있어.」"

[[dialogue]]
speaker = "梨緒"
original = "「わかる範囲でなら、なんでも答えよう」"
translation = "「아는 범위 내라면 뭐든 대답하지.」"

[[dialogue]]
speaker = "クロト"
original = "「彼女は『リクリエの使徒』ではなく、“真なる神の騎士”と名乗っていた。この“真なる神”というのが何を指しているのか、梨緒に心当たりはあるか……？」"
translation = "「그녀는 『리크리에의 사도』가 아니라, “진정한 신의 기사”라고 자처했어. 이 “진정한 신”이라는 게 무엇을 가리키는지, 리오가 짐작 가는 게 있나……?」"

[[dialogue]]
speaker = "梨緒"
original = "「すまない。それについては私も気になったんだが……思い当たる節は特にないんだ」"
translation = "「미안하다. 그 점에 대해서는 나도 신경이 쓰였다만…… 딱히 짚이는 구석은 없어.」"

[[dialogue]]
speaker = "梨緒"
original = "「ジグは特別熱心な信徒ではなかったはずだが、それでも女神様を信じていた」"
translation = "「지그는 특별히 열성적인 신도는 아니었을 텐데, 그래도 여신님을 믿고 있었지.」"

[[dialogue]]
speaker = "梨緒"
original = "「そもそも、星力を扱う私たち星騎士の中で、女神様を信じていない者はほとんどいないだろう？」"
translation = "「애초에 성력을 다루는 우리 성기사들 중에서 여신님을 믿지 않는 자는 거의 없지 않나?」"

[[dialogue]]
speaker = "クロト"
original = "「となると、使徒になった後に何かがあったと考えるべきか……？」"
translation = "「그렇게 되면, 사도가 된 뒤에 무슨 일이 있었다고 생각해야 하나……?」"

[[dialogue]]
speaker = "クロト"
original = "「ひとまず、情報ありがとう。考えて答えが出るようなものではないから、今は頭の片隅に置いておくことにするよ」"
translation = "「일단 정보 고마워. 생각한다고 답이 나올 문제는 아니니, 지금은 머릿속 한구석에 담아두기로 할게.」"

[[dialogue]]
speaker = "梨緒"
original = "「ああ、私も何か関連するようなことを見聞きしたら、共有しよう」"
translation = "「아아, 나도 뭔가 관련될 만한 것을 보고 듣게 되면 공유하도록 하지.」"

[[dialogue]]
speaker = "クロト"
original = "「それと、ジグの詳細については、星徒会でも共有してしまっていいだろうか？」"
translation = "「그리고 지그에 대한 상세한 정보는 성도회에도 공유해도 괜찮을까?」"

[[dialogue]]
speaker = "梨緒"
original = "「もちろんだ。そのために君を呼んだんだからな」"
translation = "「물론이다. 그러기 위해 너를 부른 거니까.」"

[[dialogue]]
speaker = "梨緒"
original = "「ああ、それと……」"
translation = "「아아, 그리고……」"

[[dialogue]]
speaker = "梨緒"
original = "「平行世界絡みの事件では共同歩調を取るが、私は魔王、君を完全に信用したわけではない」"
translation = "「평행세계와 얽힌 사건에서는 공동 보조를 취하겠지만, 나는 마왕인 너를 완전히 신용하는 건 아니야.」"

[[dialogue]]
speaker = "梨緒"
original = "「選挙管理委員会として、今後も星徒会の動向と、魔王の力の管理を厳しく監視していくつもりだ」"
translation = "「선거관리위원회로서 앞으로도 성도회의 동향과 마왕의 힘의 관리를 엄격히 감시할 생각이다.」"

[[dialogue]]
speaker = "梨緒"
original = "「まだ馴れ合うつもりはない、勘違いするんじゃないぞっ！」"
translation = "「아직 친하게 지낼 생각은 없으니, 착각하지 말라고!」"

[[dialogue]]
speaker = "ナターシャ"
original = "「今、『まだ』って言った？」"
translation = "「방금, 『아직』이라고 했어?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「梨緒ちゃん、最終的には馴れ合っちゃうつもりなの？」"
translation = "「리오 짱, 최종적으로는 친하게 지낼 생각인 거야?」"

[[dialogue]]
speaker = "アポロ"
original = "「おぉ……これが『つんでれ』って奴か？」"
translation = "「오오…… 이것이 『츤데레』라는 녀석인가?」"

[[dialogue]]
speaker = "梨緒"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "選挙管理委員会の心強い仲間たちが、背中から委員長を串刺しにしていたが、梨緒は必死に振り向かないようにしていた。今のを聞こえないフリとは、なかなかやるな……"
translation = "선거관리위원회의 든든한 동료들이 등 뒤에서 위원장을 꼬챙이로 찌르고 있었지만, 리오는 필사적으로 뒤돌아보지 않으려 애썼다. 방금 걸 못 들은 척하다니, 제법인데……"

[[dialogue]]
speaker = "クロト"
original = "「俺としても魔王の力を暴走させるのは避けたい。だから、選管の力も遠慮なく頼ることにするよ」"
translation = "「나로서도 마왕의 힘을 폭주시카는 건 피하고 싶어. 그러니까 선관의 힘도 사양 않고 빌리기로 할게.」"

[[dialogue]]
speaker = "クロト"
original = "「というわけで、お手柔らかに頼みます、梨緒委員長」"
translation = "「그런 고로, 살살 부탁드립니다, 리오 위원장님.」"

[[dialogue]]
speaker = "unk"
original = "そう言い残して、俺は一足先に保健室を後にするのだった。"
translation = "그 말을 남기고, 나는 한발 먼저 보건실을 나섰다."

