[[dialogue]]
speaker = "unk"
original = "現れた本物のヴィーナスがラスボス宣言をし、彼女と戦うことになったフィオナや俺たち。"
translation = "나타난 진짜 비너스가 라스트 보스 선언을 하고, 그녀와 싸우게 된 피오나와 우리들."

[[dialogue]]
speaker = "unk"
original = "その戦いは、これまでのシャドウ戦よりも更に激化していた。"
translation = "그 싸움은 지금까지의 섀도우전보다 더욱 격화되어 있었다."

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「まだまだ行くわよ！\u3000ヴィーナスキャリバーン！！」"
translation = "「아직 멀었어! 비너스 캘리번!!」"

[[dialogue]]
speaker = "unk"
original = "彼女が武器の剣を振るう度に、一撃必殺級のビームが放たれ、暴風のように辺り一帯を薙ぎ払う！"
translation = "그녀가 무기인 검을 휘두를 때마다 일격필살급 빔이 발사되어 폭풍처럼 주변 일대를 휩쓴다!"

[[dialogue]]
speaker = "unk"
original = "くぅっ……！"
translation = "크윽……!"

[[dialogue]]
speaker = "unk"
original = "そんな中、途中で加勢しに来てくれた人物もいた。"
translation = "그런 와중에 도중에 가세하러 와준 인물도 있었다."

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「マリオンさん、手伝って頂いてありがとうございます……！」"
translation = "「마리온 씨, 도와주셔서 감사합니다……!」"

[[dialogue]]
speaker_original = "マリオン（覚醒）"
speaker_translation = "마리온(각성)"
original = "「いえ、私はネビュラの魔女であると同時に、星見家のメイドでもありますから」"
translation = "「아뇨, 저는 네뷸라의 마녀인 동시에 호시미 가문의 메이드이기도 하니까요.」"

[[dialogue]]
speaker_original = "マリオン（覚醒）"
speaker_translation = "마리온(각성)"
original = "「なにより、お嬢様が頑張ろうとしているのなら、それをお手伝いさせて頂くことが、私にとって至上の喜びなのです」"
translation = "「무엇보다 아가씨께서 노력하시려 한다면 그것을 돕는 것이 저에게 있어서 지고의 기쁨이랍니다.」"

[[dialogue]]
speaker_original = "マリオン（覚醒）"
speaker_translation = "마리온(각성)"
original = "「さあ、見せて下さい。フィオナお嬢様の星が更に輝く瞬間を」"
translation = "「자, 보여주세요. 피오나 아가씨의 별이 더욱 빛나는 순간을.」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「はい！\u3000ヴィーナスさんや頑張っているみなさんを見ていると……私も負けていられないって燃えて来ました！」"
translation = "「네! 비너스 씨나 노력하고 있는 여러분을 보고 있으면…… 저도 지고 있을 수 없다고 불타올라요!」"

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "「ラスボスなんて生意気ね、ヴィーナス。畏怖をもって跪きなさい！」"
translation = "「라스트 보스라니 건방지네, 비너스. 경외심을 가지고 무릎 꿇으렴!」"

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "「ドラゴニックノヴァフレア！」"
translation = "「드래고닉 노바 플레어!」"

[[dialogue]]
speaker_original = "リーリア（覚醒）"
speaker_translation = "릴리아(각성)"
original = "「サチちゃん、可愛い後輩同士、合体技決めちゃいますよ～！」"
translation = "「사치 짱, 귀여운 후배끼리 합체기 가보자구요~!」"

[[dialogue]]
speaker_original = "サチ（覚醒）"
speaker_translation = "사치(각성)"
original = "「はい、リーリア先輩！\u3000魔弾に幸運を一点収束！」"
translation = "「네, 리리아 선배! 마탄에 행운을 한 점 집중!」"

[[dialogue]]
speaker_original = "リーリア（覚醒）"
speaker_translation = "릴리아(각성)"
original = "「幸運と可愛さの融合魔弾！」"
translation = "「행운과 귀여움의 융합 마탄!」"

[[dialogue]]
speaker_original = "サチ（覚醒）"
speaker_translation = "사치(각성)"
original = "「行きます！\u3000せーのっ！！」"
translation = "「갑니다! 하나, 둘!!」"

[[dialogue]]
speaker_original = "リーリア＆サチ"
speaker_translation = "릴리아 & 사치"
original = "「マジカルシャイニーゴールド！！」"
translation = "「매지컬 샤이니 골드!!」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「ヴィーナスさん。星力、霊力、魔力……その全てを合わせて、私も全力で行きます！」"
translation = "「비너스 씨. 성력, 영력, 마력…… 그 모든 것을 합쳐서 저도 전력으로 가겠습니다!」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「事象滅却――ソルフレアバースト！！！」"
translation = "「사상멸각―― 솔 플레어 버스트!!!」"

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「受けて立つわ！\u3000私も出し惜しみ無し、最大出力の全力ビームよ！」"
translation = "「받아주마! 나도 아낌없이 최대 출력의 전력 빔이야!」"

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「宇宙一輝け！！」"
translation = "「우주에서 제일 빛나라!!」"

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「ノヴァゴッデスビィーームッ！！！」"
translation = "「노바 가디스 비이이임!!!」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「くうううぅ――っ！」"
translation = "「크으으으으――윽!」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "（なんて凄まじい威力……！？\u3000私は３つの力を掛け合わせて、マム、リーリアさん、サチさんと同時攻撃までしているのに、それでも押し負けそうだなんて……！）"
translation = "(이 무슨 무시무시한 위력……!? 나는 세 가지 힘을 결합하고 마무, 리리아 씨, 사치 씨와 동시 공격까지 하고 있는데, 그런데도 밀릴 것 같다니……!)"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "（いや、これがヴィーナスさんの能力……！\u3000私の魔王フォームの能力『事象滅却』すら貫通する、ヴィーナスさんのノヴァフォームの――）"
translation = "(아니, 이것이 비너스 씨의 능력……! 내 마왕 폼의 능력 『사상멸각』조차 관통하는 비너스 씨의 노바 폼의――)"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "（概念すら木っ端みじんにする『理屈無視』のビーム攻撃……！）"
translation = "(개념조차 박살 내버리는 『이론 무시』의 빔 공격……!)"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "（……本当は、ずっと考えていました）"
translation = "(……사실은 계속 생각하고 있었어요.)"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "（もし私が本気でヴィーナスさんと戦ったら、勝てるのかどうかって）"
translation = "(만약 내가 진심으로 비너스 씨와 싸운다면 이길 수 있을지 없을지.)"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "（ヴィーナスさんは間違いなく、学園のみならず星術使いの中でも頂点に君臨する天才……！）"
translation = "(비너스 씨는 틀림없이 학원뿐만 아니라 성술사 중에서도 정점에 군림하는 천재……!)"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "（理論ではなく感覚で星力を自在に操る、まさに規格外の星騎士……）"
translation = "(이론이 아니라 감각으로 성력을 자재로 조종하는 그야말로 규격 외의 성기사……)"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "（本物の『星見フィオナ』になろうと、緋宮会長のような魔王になろうと、私も努力を重ねてきたつもりですが……）"
translation = "(진정한 『호시미 피오나』가 되려고, 히노미야 회장님 같은 마왕이 되려고 나도 노력을 거듭해 왔다고 생각하지만……)"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "（いつも誰かを後ろから追いすがってきた私では……超えられない……！）"
translation = "(항상 누군가를 뒤에서 뒤쫓아온 나로서는…… 뛰어넘을 수 없어……!)"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "（くっ……ダメです……力を使い過ぎて、これ以上は押し合いが保たな――）"
translation = "(윽…… 안 돼요…… 힘을 너무 많이 써서 더 이상은 버티기가――)"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「フィオナ、頑張れーーーッ！！！」"
translation = "「피오나, 힘내ーーー앗!!!」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「姉さん！？」"
translation = "「언니!?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「諦めるな、『星見フィオナ』！！！\u3000オマエは、流星学園最強の星徒会長なんだろう！？」"
translation = "「포기하지 마, 『호시미 피오나』!!! 너는 유성학원 최강의 성도회장이잖아!?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「それに、ヒーローは決して諦めない！」"
translation = "「거기에 히어로는 절대 포기하지 않아!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「オマエは、あたしを救ってくれたヒーローだ！\u3000誰がなんと言おうと、本物の魔王なんだ！！」"
translation = "「너는 나를 구해준 히어로야! 누가 뭐라 해도 진짜 마왕이라고!!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「だから――」"
translation = "「그러니까――」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「負けるな魔王フィオナーーーッ！！！」"
translation = "「지지 마라 마왕 피오나ーーー앗!!!」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「姉さん……！\u3000っ――ああああああぁぁぁっ！！！」"
translation = "「언니……! 윽―― 아아아아아아아아앗!!!」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスのゴッデスビームに押されていたフィオナが、今まで聞いたことのない叫びを上げる。"
translation = "비너스의 가디스 비임에 밀리고 있던 피오나가 지금까지 들어본 적 없는 외침을 내지른다."

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「決して諦めない……燃え尽きぬ『心』のアルケインコード！」"
translation = "「결코 포기하지 않아…… 타오르지 않는 『마음』의 아르케인 코드!」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「アルケインソーラーブレイズッ！！！」"
translation = "「아르케인 솔라 블레이즈!!!」"

[[dialogue]]
speaker = "unk"
original = "消えかけていた灯が再点火されるように、フィオナの体から凄まじい熱量の炎が吹き上がる。"
translation = "꺼져가던 등불이 다시 점화되듯 피오나의 몸에서 무시무시한 열량의 불꽃이 뿜어져 나온다."

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「はああああああぁぁぁーーーっ！！！」"
translation = "「하아아아아아아아아아ーーー앗!!!」"

[[dialogue]]
speaker = "unk"
original = "そして、ヴィーナスのゴッデスビームを押し返し始めた。"
translation = "그리고 비너스의 가디스 비임을 밀어내기 시작했다."

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「やるじゃない……！\u3000私もこういう、熱いヤツがやりたかったのよ！！」"
translation = "「제법이잖아……! 나도 이런 뜨거운 걸 하고 싶었다고!!」"

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「私の本気とあなたの本気、どっちが強いのか決着を付けましょう！！」"
translation = "「내 진심과 당신의 진심, 어느 쪽이 더 강한지 결판을 내자!!」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「ヴィーナスさん……！\u3000はい！！」"
translation = "「비너스 씨……! 네!!」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「これが！\u3000私の！！\u3000全力全開ッ！！！」"
translation = "「이것이! 나의!! 전력 전개!!!」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「ソルフレアバーストォーーーーーッ！！！！！」"
translation = "「솔 플레어 버스토오오오오오오!!!!!」"

[[dialogue]]
speaker = "unk"
original = "果たして、全力をぶつけあった勝負の行方は――"
translation = "과연 전력을 다해 맞붙은 승부의 행방은――"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「はぁ……はぁ……」"
translation = "「하아…… 하아……」"

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「……残念ね、フィオナ」"
translation = "「……아쉽네, 피오나.」"

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「もっと続けたかったのに、この体の星力、すっからかんになっちゃったみたい……っ」"
translation = "「더 계속하고 싶었는데 이 몸의 성력이 텅 비어버린 모양이야…… 윽.」"

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「私の――負けよ」"
translation = "「나의―― 패배야.」"

[[dialogue]]
speaker = "unk"
original = "ふらっと体から力が抜けて、ヴィーナスが倒れそうになる。"
translation = "갑자기 몸에서 힘이 빠지며 비너스가 쓰러지려 한다."

[[dialogue]]
speaker = "unk"
original = "ヴィーナス！"
translation = "비너스!"

[[dialogue]]
speaker = "unk"
original = "俺はその前に駆け寄って、倒れ込む彼女の体を腕で受け止めた。"
translation = "나는 그전에 달려가 쓰러지는 그녀의 몸을 팔로 받아냈다."

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「あ……えへへ♪\u3000ありがと、パパ……」"
translation = "「아…… 에헤헤♪ 고마워, 아빠……」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「ヴィーナスさん、大丈夫ですか！？」"
translation = "「비너스 씨, 괜찮으세요!?」"

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「ええ。フィオナ、最後の一撃、ものすごかったわよ……！」"
translation = "「응. 피오나, 마지막 일격 정말 굉장했어……!」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「ありがとうございます。ヴィーナスさんが私と戦いに来てくれたからこそ、大切なことを学べた気がします」"
translation = "「감사합니다. 비너스 씨가 저와 싸우러 와주셨기에 중요한 것을 배울 수 있었던 기분이 들어요.」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「私は今まで……ヴィーナスさんと戦うことを、避けていたのかもしれません」"
translation = "「저는 지금까지…… 비너스 씨와 싸우는 것을 피해왔던 걸지도 몰라요.」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「星見フィオナとして、流星学園の星徒会長として……あなたに負けてしまうことが怖かったから」"
translation = "「호시미 피오나로서, 유성학원의 성도회장으로서…… 당신에게 져버리는 것이 무서웠으니까.」"

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「そうなの？\u3000フィオナの考えてたこと、私にはよくわからないけど……」"
translation = "「그래? 피오나가 생각하던 건 나에겐 잘 모르겠지만……」"

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「何度でも戦って、何度でも負けて……そして、何度でも勝てばいいと思うわ！」"
translation = "「몇 번이고 싸우고 몇 번이고 지고…… 그리고 몇 번이고 이기면 된다고 생각해!」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「何度でも負けて、何度でも勝つ……」"
translation = "「몇 번이고 지고 몇 번이고 이긴다……」"

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「私たちは仲間なんだから、１回戦ってハイ終わりってわけじゃないでしょう？\u3000せっかく仲良くなったんだから、一緒に強くなりたいわ」"
translation = "「우리는 동료니까 한 번 싸우고 땡은 아니잖아? 어렵사리 사이좋아졌으니까 같이 강해지고 싶어.」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「……はい。その通り、ですね」"
translation = "「……네. 그 말씀대로네요.」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「私はまだまだ、仲間を頼るのが下手なんだってことが、よくわかりました」"
translation = "「저는 아직 동료를 의지하는 게 서툴다는 걸 잘 알았습니다.」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「なのでこれからは、私ともたくさん戦ってください、ヴィーナスさん」"
translation = "「그러니 이제부터는 저와도 많이 싸워주세요, 비너스 씨.」"

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「もっちろん！\u3000私だって、負けたままで終われないわ。すぐリベンジするから、待ってなさい！」"
translation = "「당연하지! 나라고 진 채로 끝낼 수는 없거든. 금방 리벤지할 테니까 기다리고 있어!」"

[[dialogue]]
speaker = "unk"
original = "果たして対決を終えた２人は、お互い満足そうな笑顔を浮かべるのだった――"
translation = "과연 대결을 마친 두 사람은 서로 만족스러운 미소를 짓는 것이었다――"

