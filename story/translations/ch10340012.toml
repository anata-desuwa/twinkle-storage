[[dialogue]]
speaker = "unk"
original = "第２話,シャリオン魔界事情,P"
translation = "제2화,샤리온 마계 사정,P"

[[dialogue]]
speaker = "カティア"
original = "「あ、おはようございます、魔王様」"
translation = "「아, 안녕하세요, 마왕님」"

[[dialogue]]
speaker = "カティア"
original = "「授業の前に花壇のお花にお水をあげてるんです。このお花、昨日咲いたんですけど綺麗だと思いませんか？」"
translation = "「수업 전에 화단의 꽃에 물을 주고 있어요. 이 꽃, 어제 피었는데 예쁘다고 생각하지 않으세요?」"

[[dialogue]]
speaker = "unk"
original = "うん、綺麗だ"
translation = "응, 예쁘다"

[[dialogue]]
speaker = "カティア"
original = "「ですよね～♪\u3000ありがとうございます」"
translation = "「그렇죠~♪ 감사합니다」"

[[dialogue]]
speaker = "カティア"
original = "「私は魔界のシャリオン地方の村の生まれなんですけど、それがも～何もなくてつまらない村で」"
translation = "「저는 마계의 샤리온 지방 마을 출신인데요, 거기가 너~무 아무것도 없고 지루한 마을이라서」"

[[dialogue]]
speaker = "カティア"
original = "「うちは……というか村のほとんどは農家なんですけど、農作業の合間に畑の隅っこで花を育てるくらいしか楽しみがなかったんです」"
translation = "「저희 집은…… 아니 마을 대부분이 농가인데요, 농사일 틈틈이 밭 구석에서 꽃을 키우는 것 외에는 즐거움이 없었어요」"

[[dialogue]]
speaker = "カティア"
original = "「で、せっかく人間界に来たのでこっちでも花を育ててるんです。枯らしたりしたらかわいそうだから、人間界の植物も勉強したんですよ」"
translation = "「그래서, 모처럼 인간계에 왔으니 여기서도 꽃을 키우고 있어요. 시들게 하면 불쌍하니까, 인간계의 식물도 공부했답니다」"

[[dialogue]]
speaker = "unk"
original = "カティアは花が好きなんだな"
translation = "카티아는 꽃을 좋아하는구나"

[[dialogue]]
speaker = "カティア"
original = "「はい！\u3000手塩にかけて育てた花が立派に咲いた時は最高ですよ！」"
translation = "「네! 정성껏 키운 꽃이 훌륭하게 피었을 때는 최고예요!」"

[[dialogue]]
speaker = "カティア"
original = "（魔王様、いい人だな～……魔王なのに）"
translation = "「(마왕님, 좋은 분이네~…… 마왕인데도)」"

[[dialogue]]
speaker = "カティア"
original = "（でも言えない……）"
translation = "「(하지만 말할 수 없어……)」"

[[dialogue]]
speaker = "カティア"
original = "（すごい星騎士になって故郷に錦を飾ってやろうと思って新星学園に入学したのに、プリマステラにもなれなくて……）"
translation = "「(대단한 성기사가 되어 고향에 금의환향하려고 신성 학원에 입학했는데, 프리마스텔라도 되지 못하고……)」"

[[dialogue]]
speaker = "カティア"
original = "（何の取柄もなくて、何にもなれないから、魔王様の配下になってビッグな魔族になろうと思ってた──とか）"
translation = "「(아무런 장점도 없고, 아무것도 될 수 없으니까, 마왕님의 배하가 되어 거물 마족이 되려고 생각했다── 같은 건)」"

[[dialogue]]
speaker = "unk"
original = "カティア？"
translation = "카티아?"

[[dialogue]]
speaker = "カティア"
original = "「あ～っ、いえいえ、何でもないですよ。ちょっと考え事です……ワン」"
translation = "「아~앗, 아니 아니, 아무것도 아니에요. 잠깐 생각 중이었어요…… 멍」"

[[dialogue]]
speaker = "カティア"
original = "「え？\u3000シャルレーヌ……様のことですか。そうです、あの人もシャリオン地方のご出身です」"
translation = "「네? 샤를렌…… 님 말씀이시군요. 맞아요, 그분도 샤리온 지방 출신이세요」"

[[dialogue]]
speaker = "カティア"
original = "「ディアーブル家は、貴族の中でも最も有力なシャリオン十貴族の一氏。十貴族はシャリオンでは絶対。神のような存在です」"
translation = "「디아블 가문은 귀족 중에서도 가장 유력한 샤리온 십귀족 중 한 가문. 십귀족은 샤리온에서는 절대적이에요. 신과 같은 존재입니다」"

[[dialogue]]
speaker = "カティア"
original = "「うちはディアーブル領じゃないですが、それでもヒラの農民からするとすごく畏れ多いお方です……」"
translation = "「저희 집은 디아블 영지는 아니지만, 그래도 평민 농민으로서는 엄청나게 외경스러운 분이세요……」"

[[dialogue]]
speaker = "カティア"
original = "「しかも附属の１年なのにもうプリマステラになってて……私は新星学園でもプリマステラになれてないのに……どうしてこんなに差があるんですか～！」"
translation = "「게다가 부속 1학년인데 벌써 프리마스텔라가 되어 있고…… 저는 신성 학원에서도 프리마스텔라가 되지 못했는데…… 어째서 이렇게 차이가 나는 건가요~!」"

[[dialogue]]
speaker = "unk"
original = "魔王の配下ならシャルレーヌはダメなのか？"
translation = "마왕의 배하라면 샤를렌은 안 되는 건가?"

[[dialogue]]
speaker = "カティア"
original = "「いえいえ、ディアーブルは偽魔王だって地元でも有名ですよ。強くて偉いから誰も文句言わないだけで」"
translation = "「아니요 아니요, 디아블은 가짜 마왕이라고 현지에서도 유명해요. 강하고 대단하니까 아무도 불평하지 않을 뿐이죠」"

[[dialogue]]
speaker = "カティア"
original = "「しかもいつも香水してるし。犬の魔族は嗅覚が鋭いからクラクラしそうになるんですよ」"
translation = "「게다가 항상 향수를 뿌리고 있고. 개의 마족은 후각이 예민해서 어질어질해질 것 같아요」"

[[dialogue]]
speaker = "カティア"
original = "「んん！？\u3000この匂いは──」"
translation = "「응응!? 이 냄새는──」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「おはようございます、会長さん」"
translation = "「안녕하세요, 회장군」"

[[dialogue]]
speaker = "カティア"
original = "「ひぃっ！？」"
translation = "「히익!?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「あら、そちらは……もしかして私と同郷の方でしょうか。雰囲気でわかります。お名前を伺っても？」"
translation = "「어머, 그쪽은…… 혹시 저와 동향 분이신가요. 분위기로 알 수 있네요. 성함을 여쭤봐도 될까요?」"

[[dialogue]]
speaker = "カティア"
original = "「えと……カティア・セルベラス、です……シャルレーヌ様」"
translation = "「에또…… 카티아 세르베루스, 입니다…… 샤를렌 님」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「カティア先輩ですね。よろしくお願いします」"
translation = "「카티아 선배시군요. 잘 부탁드립니다」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「そんなに緊張されなくてもよろしいですよ。シャリオンの貴族とはいえ、今は星騎士の先輩後輩。様付けなんて必要ありません」"
translation = "「그렇게 긴장하지 않으셔도 괜찮아요. 샤리온의 귀족이라고는 해도, 지금은 성기사의 선배 후배. '님' 자 같은 건 필요 없어요」"

[[dialogue]]
speaker = "カティア"
original = "（もしかしてシャルレーヌ様っていい人！？\u3000いやでも裏があるんじゃ……）"
translation = "「(혹시 샤를렌 님은 좋은 사람!? 아니 하지만 꿍꿍이가 있는 건 아닐까……)」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「ここの花壇の世話をされていたのはカティア先輩だったんですね。いいことを知りました♪」"
translation = "「여기의 화단을 돌보고 계셨던 건 카티아 선배셨군요. 좋은 것을 알게 되었네요♪」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「どうでしょう。カティア先輩さえ良ければ、新星学園を卒業したらディアーブル領で暮らしませんか？」"
translation = "「어떠세요. 카티아 선배만 괜찮다면, 신성 학원을 졸업한 후 디아블 영지에서 살지 않으시겠어요?」"

[[dialogue]]
speaker = "カティア"
original = "「はい？」"
translation = "「네?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「ディアーブル家が香水を取り扱っているのはご存じかと思います。そして香水を作るには原料の植物が欠かせません」"
translation = "「디아블 가문이 향수를 취급하고 있다는 것은 알고 계실 겁니다. 그리고 향수를 만들기 위해서는 원료 식물이 필수적이죠」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「拝見したところ、カティア先輩は植物を育てるのがお上手のようです。それに嗅覚も鋭いので匂いを嗅ぎ分けることも得意でしょう」"
translation = "「보아하니, 카티아 선배는 식물을 키우는 데 능숙하신 것 같아요. 게다가 후각도 예민하시니 냄새를 구별하는 것도 잘하실 테고요」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「つまり、香水の原料である植物を育てる才能があるということです」"
translation = "「즉, 향수의 원료인 식물을 키울 재능이 있다는 뜻입니다」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「香水はディアーブルの富の源泉。貢献する者には相応の褒美を与えます。きっとご実家よりずっと良い暮らしができるはずです」"
translation = "「향수는 디아블의 부의 원천. 공헌하는 자에게는 그에 걸맞은 보상을 드립니다. 분명 본가보다 훨씬 좋은 생활을 할 수 있을 거예요」"

[[dialogue]]
speaker = "カティア"
original = "「ええぇ～っ！？\u3000本気──ですか！？」"
translation = "「에에에~엣!? 진심──이세요!?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「ええ、商談で冗談など言いません」"
translation = "「네, 상거래에서 농담 같은 건 하지 않아요」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「もちろん指定の植物を育てていただきますが、希望があれば好きな植物の研究をしてもらってかまいません。悪いようにはしませんよ」"
translation = "「물론 지정된 식물을 키워주셔야 하지만, 희망이 있다면 좋아하는 식물 연구를 하셔도 상관없습니다. 나쁘게 대우하지는 않을 거예요」"

[[dialogue]]
speaker = "カティア"
original = "「これってけっこう……いやかなりいい条件なんじゃ……」"
translation = "「이거 꽤…… 아니 상당히 좋은 조건인 것 같은데……」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「ただし──」"
translation = "「다만──」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「ディアーブルの香水のレシピは秘中の秘。もし外に持ち出そうとしたら──容赦はしませんよ？」"
translation = "「디아블의 향수 레시피는 극비 중의 극비. 만약 외부에 유출하려 한다면── 용서하지 않을 거예요?」"

[[dialogue]]
speaker = "カティア"
original = "「ひぃぃっ！？」"
translation = "「히이이잇!?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「どうします？」"
translation = "「어떻게 하시겠어요?」"

[[dialogue]]
speaker = "カティア"
original = "「その、家族に相談したいというか、ええっと……」"
translation = "「그, 가족에게 상담하고 싶다고 할까, 에엣또……」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「十貴族のお誘い、断るんですか？」"
translation = "「십귀족의 제안을 거절하시겠다는 건가요?」"

[[dialogue]]
speaker = "カティア"
original = "「あ……あ……あの、えっと……」"
translation = "「아…… 아…… 저, 에엣또……」"

[[dialogue]]
speaker = "unk"
original = "カティアは俺のしもべだ"
translation = "카티아는 나의 하인이다"

[[dialogue]]
speaker = "カティア"
original = "「魔王様……！」"
translation = "「마왕님……!」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「……それは失礼しました。なるほど、本物の魔王のしもべとあらば、軽々に引き抜くわけにはいきませんね」"
translation = "「……그건 실례했습니다. 과연, 진짜 마왕의 하인이라면 경솔하게 빼낼 수는 없겠네요」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「それに流星市国で身分を持ち出すのはナンセンスでした。今は星騎士の先輩後輩だと言ったばかりですのに」"
translation = "「게다가 유성시국에서 신분을 들먹이는 것은 난센스였죠. 방금 성기사의 선배 후배라고 말했을 뿐인데」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「ゆっくり考えてくださいね、カティア先輩。よいお返事をお待ちしていますよ」"
translation = "「천천히 생각해주세요, 카티아 선배. 좋은 답변을 기다리고 있겠습니다」"

[[dialogue]]
speaker = "カティア"
original = "「魔王様～！」"
translation = "「마왕님~!」"

[[dialogue]]
speaker = "unk"
original = "（頭を撫でる）"
translation = "（머리를 쓰다듬는다）"

[[dialogue]]
speaker = "カティア"
original = "「あ……頭撫でてくれるとほっとする……」"
translation = "「아…… 머리를 쓰다듬어 주시니 안심이 된다……」"

[[dialogue]]
speaker = "カティア"
original = "「えへへへ……やっぱり私のご主人は魔王様ですワン♪」"
translation = "「에헤헤헤…… 역시 저의 주인님은 마왕님이세요 멍♪」"

