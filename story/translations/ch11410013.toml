[[dialogue]]
speaker = "unk"
original = "第３話,魅了の力,P"
translation = "제3화, 매료의 힘, P"

[[dialogue]]
speaker = "unk"
original = "街での捜索を切り上げ、目撃情報のあった学園のカフェテリアにやってきた。"
translation = "거리에서의 수색을 중단하고 목격 정보가 있었던 학원의 카페테리아로 왔다."

[[dialogue]]
speaker = "unk"
original = "しかし情報を確認してみると、どうやらそれは俺たちの捜している相手ではなかったようだった。"
translation = "하지만 정보를 확인해 보니 아무래도 우리가 찾던 상대는 아니었던 모양이다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「簡単に捕まえられるかと思っていたけれど、案外長期戦になってしまいそうね」"
translation = "「쉽게 잡을 수 있을 거라 생각했는데 의외로 장기전이 되어버릴 것 같네」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「カフェテリアに戻ってきたことですし、軽く食事をしていきませんか？」"
translation = "「카페테리아로 돌아온 김에 가볍게 식사라도 하지 않겠어요?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「それがいいわね。一旦、手がかりも途切れてしまったし、空腹を満たしながら新しい情報を待つことにするわよ」"
translation = "「그게 좋겠네. 일단 단서도 끊겼으니 배를 채우며 새로운 정보를 기다리기로 하자꾸나」"

[[dialogue]]
speaker_original = "ルルゥ"
speaker_translation = "루루"
original = "「わわ、とっても美味しそうなの♪」"
translation = "「와와, 무척 맛있어 보이는 거야♪」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ふふっ。むこうの世界の料理も美味しかったけれど、ここの料理も負けていないわよ。たっぷり味わいなさい」"
translation = "「후훗. 저쪽 세계 요리도 맛있었지만 여기 요리도 지지 않는단다. 듬뿍 맛보렴」"

[[dialogue]]
speaker_original = "ルルゥ"
speaker_translation = "루루"
original = "「いただきます、なの♪」"
translation = "「잘 먹겠습니다, 인 거야♪」"

[[dialogue]]
speaker_original = "ルルゥ"
speaker_translation = "루루"
original = "「もぐ……もぐ…………ふわ！\u3000美味しい、なのっ！」"
translation = "「우물…… 우물…… 와아! 맛있는 거야!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「これは蛍火さんの料理ですね。今日は厨房に立っているって掲示板で流れてましたけど、どうやら本当だったみたいですね」"
translation = "「이건 호타루비 씨의 요리네요. 오늘은 주방에 서 있다고 게시판에 올라왔었는데 아무래도 사실이었나 봐요」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「心なしか客が多いように感じていたけれど、それが理由だったのね」"
translation = "「왠지 손님이 많다고 느껴졌는데 그게 이유였나 보네」"

[[dialogue]]
speaker_original = "ルルゥ"
speaker_translation = "루루"
original = "「ウェイトレスさんも忙しそう、なの……」"
translation = "「웨이트리스 언니들도 바빠 보이는 거야……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「そうですね。クエスト受付嬢のヨミさんもお手伝いしているみたいですし」"
translation = "「그렇네요. 퀘스트 접수원인 요미 씨도 돕고 있는 것 같고요」"

[[dialogue]]
speaker_original = "ルルゥ"
speaker_translation = "루루"
original = "「実は……ルルゥ、臆病な性格をちょっとでも改善しようと思って、メイド喫茶のウェイトレスをしたことがある、なの」"
translation = "「사실…… 루루, 겁쟁이 성격을 조금이라도 고쳐보려고 메이드 카페의 웨이트리스를 해본 적이 있는 거야」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「それは中々の荒療治ね……。けれど、いい気概だと思うわ。結果はどうだったのかしら？」"
translation = "「그건 꽤 과격한 요법이네……. 하지만 좋은 기개라고 생각한다. 결과는 어땠니?」"

[[dialogue]]
speaker_original = "ルルゥ"
speaker_translation = "루루"
original = "「……大変なことになっちゃった、なの」"
translation = "「……큰일이 나버린 거야」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「苦手なことに挑戦したのですから、失敗は仕方ないと思いますよ」"
translation = "「서툰 일에 도전한 것이니 실패는 어쩔 수 없다고 생각해요」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「そうね。失敗を糧にして、自分をどう成長させるかを考えることが重要よ」"
translation = "「그래. 실패를 거울삼아 자신을 어떻게 성장시킬지 생각하는 게 중요하단다」"

[[dialogue]]
speaker = "unk"
original = "ここで少し働いてみる？"
translation = "여기서 조금 일해볼래?"

[[dialogue]]
speaker = "unk"
original = "もしよかったら"
translation = "만약 괜찮다면"

[[dialogue]]
speaker_original = "ルルゥ"
speaker_translation = "루루"
original = "「ふわっ！？\u3000そ、それはやめた方がいいの……ここも大変なことになっちゃうかも、なの」"
translation = "「후와앗!? 그, 그건 그만두는 게 좋은 거야…… 여기도 큰일이 나버릴지도 모르는 거야」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「大変なこと……具体的に、どういうことになったんですか？」"
translation = "「큰일이라니…… 구체적으로 어떤 일이 있었나요?」"

[[dialogue]]
speaker_original = "ルルゥ"
speaker_translation = "루루"
original = "「働いてる最中に、魅了の力が発動しちゃった、なの……そうしたら、お店にいたお客さんが一斉にルルゥのところに押しかけちゃったの」"
translation = "「일하는 도중에 매료의 힘이 발동해 버린 거야…… 그랬더니 가게에 있던 손님들이 일제히 루루 쪽으로 몰려들어 버린 거야」"

[[dialogue]]
speaker_original = "ルルゥ"
speaker_translation = "루루"
original = "「特に一部のお客さんが……その……興奮してしまって、とっても怖かったの……」"
translation = "「특히 일부 손님들이…… 그…… 흥분해 버려서 무척 무서웠던 거야……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「そ、それは……」"
translation = "「그, 그건……」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「何となく状況が浮かんでくるわね……」"
translation = "「왠지 상황이 짐작이 가네……」"

[[dialogue]]
speaker_original = "ルルゥ"
speaker_translation = "루루"
original = "「だからウェイトレスはもうしない、なの」"
translation = "「그래서 웨이트리스는 이제 안 하는 거야」"

[[dialogue]]
speaker = "unk"
original = "どうしても力の制御は難しいの？"
translation = "아무리 해도 힘 제어는 어려운 거야?"

[[dialogue]]
speaker_original = "ルルゥ"
speaker_translation = "루루"
original = "「ごめんなさい、なの……頑張ってるけど、やっぱり自分では上手く制御できないの」"
translation = "「미안한 거야…… 노력하고 있지만 역시 스스로는 잘 제어할 수 없는 거야」"

[[dialogue]]
speaker_original = "ルルゥ"
speaker_translation = "루루"
original = "「ルルゥが相手の人と仲良くなりたいって思った時、無意識に働いてしまうことが多いみたいなの」"
translation = "「루루가 상대방이랑 사이좋게 지내고 싶다고 생각할 때 무의식적으로 작동해 버리는 경우가 많은 것 같은 거야」"

[[dialogue]]
speaker_original = "ルルゥ"
speaker_translation = "루루"
original = "「そのせいで……ご主人様のこともおかしくしちゃうことがよくある、なの……」"
translation = "「그 탓에…… 주인님도 이상하게 만들어버릴 때가 자주 있는 거야……」"

[[dialogue]]
speaker_original = "ルルゥ"
speaker_translation = "루루"
original = "「でもご主人様はとっても優しくて、ルルゥが失敗しても笑って許してくれるの<emoji=heart04>」"
translation = "「하지만 주인님은 무척 상냥해서 루루가 실수해도 웃으며 용서해 주는 거야<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あの少年はルルゥだけではなくて、本当に島中のモンスター娘から好かれていたわね」"
translation = "「그 소년은 루루뿐만 아니라 정말 섬 전체의 몬스터 아가씨들에게 사랑받고 있었지」"

[[dialogue]]
speaker_original = "ルルゥ"
speaker_translation = "루루"
original = "「そうなの♪\u3000みんな、ご主人様のことが大好きなの♪」"
translation = "「맞는 거야♪ 모두 주인님이 정말 좋은 거야♪」"

[[dialogue]]
speaker_original = "ルルゥ"
speaker_translation = "루루"
original = "「ルルゥも最初は怖かったの……でも、チールちゃんからいいニンゲンだって教えてもらったの」"
translation = "「루루도 처음에는 무서웠던 거야…… 하지만 치루 짱에게 좋은 인간이라고 들었던 거야」"

[[dialogue]]
speaker_original = "ルルゥ"
speaker_translation = "루루"
original = "「だからちゃんとお話、してみたの。それで仲良くなって、ルルゥが１人でいたら声をかけてくれるし、密猟者から守ってくれるようになったの」"
translation = "「그래서 제대로 이야기를 해본 거야. 그렇게 사이가 좋아져서 루루가 혼자 있으면 말을 걸어주고, 밀렵꾼으로부터 지켜주게 된 거야」"

[[dialogue]]
speaker_original = "ルルゥ"
speaker_translation = "루루"
original = "「それでそれで──」"
translation = "「그래서 그래서──」"

[[dialogue]]
speaker = "unk"
original = "『ご主人様』の話をしているルルゥは、臆病な気持ちをどこかに忘れてきたかのようだった。"
translation = "『주인님』 이야기를 하는 루루는 겁쟁이 같은 마음을 어딘가에 잊고 온 듯했다."

[[dialogue]]
speaker = "unk"
original = "そんなルルゥの笑顔を見ていると、ゲシュペンス島のモンスター娘たちが、その少年を中心に仲良く過ごしていることが伝わってくる。"
translation = "그런 루루의 미소를 보고 있자니 게슈펜스 섬의 몬스터 아가씨들이 그 소년을 중심으로 사이좋게 지내고 있음이 전해져 온다."

[[dialogue]]
speaker = "unk"
original = "そして、ルルゥの能力について──"
translation = "그리고 루루의 능력에 대해──"

[[dialogue]]
speaker = "unk"
original = "難しい能力ではあるが、さきほど魅了されかかったことを思い出し、嬉しい気持ちにもなってしまう。"
translation = "다루기 힘든 능력이긴 하지만, 아까 매료될 뻔했던 것을 떠올리니 기쁜 마음도 든다."

[[dialogue]]
speaker = "unk"
original = "それは、ルルゥが俺とも仲良くしようとしてくれた、気持ちの表れでもあるからだった。"
translation = "그것은 루루가 나와도 사이좋게 지내려 했다는 마음의 표현이기도 했기 때문이었다."

