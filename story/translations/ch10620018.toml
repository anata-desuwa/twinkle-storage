[[dialogue]]
speaker = "unk"
original = "ジュエリーと想いが通じ合ってから、数週間が経ったある日のこと――"
translation = "쥬얼리와 마음이 통한 지 수주가 지난 어느 날――"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「……ふむ」"
translation = "「……흠」"

[[dialogue]]
speaker = "unk"
original = "事前に連絡なく、突然ジュエリーが家にやってきた。しかも、シスター服で。"
translation = "사전 연락도 없이 갑자기 쥬얼리가 집에 찾아왔다. 그것도 수녀복 차림으로."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……あのー、ご用件は……？」"
translation = "「……저기, 용건은……?」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「ん？\u3000あ、ああ。そうだな……用件、用件か。非常に難しい質問だが、確かにここに来た以上、キミに伝えなくてはならない」"
translation = "「응? 아, 아아. 그렇지…… 용건, 용건인가. 굉장히 어려운 질문이다만, 확실히 여기 온 이상, 너에게 전해야만 하겠지」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……言いづらいことなら、別に言わなくてもいいよ？」"
translation = "「……말하기 힘든 거라면, 굳이 말 안 해도 돼?」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「……いや、言わせてくれ。というかキミに伝えることが今日の目的であって……」"
translation = "「……아니, 말하게 해 주게. 애초에 너에게 전하는 것이 오늘의 목적이라서……」"

[[dialogue]]
speaker = "unk"
original = "忙しなくリビングを歩き回りながら、ちらちらとこちらを見てくるジュエリー。やがて足を止めると――"
translation = "분주하게 거실을 서성이며 힐끗힐끗 이쪽을 살피는 쥬얼리. 이윽고 발을 멈추더니――"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「……あー、その、なんだ……急なことで大変申し訳ないのだが」"
translation = "「……아―, 그, 뭐냐…… 갑작스러운 일이라 대단히 미안하네만」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「私の懺悔を聞いてもらえないだろうか？」"
translation = "「나의 참회를 들어주지 않겠나?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「懺悔……？\u3000ジュエリーが？」"
translation = "「참회……? 쥬얼리가?」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「ああ、その通り。懺悔だとも。私はキミに隠していたことがある。そう、黙っていたことがあるんだ」"
translation = "「아아, 그렇다네. 참회이고 말고. 나는 너에게 숨기고 있었던 것이 있다네. 그래, 입 다물고 있었던 것이 있어」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「……コホン。私は……その……明解に換言するならば――」"
translation = "「……큼큼. 나는…… 그…… 명쾌하게 환언하자면――」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「キミとエッチがしたいんだ……！」"
translation = "「너와 섹스가 하고 싶다네……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「なるほど！\u3000……って、えぇっ！？」"
translation = "「그렇구나! ……가 아니라, 에에에!?」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「あっ<emoji=heart04>\u3000助手……<emoji=heart04>\u3000あんっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 조수……<emoji=heart04> 앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「んっ……<emoji=heart04>\u3000こ、こらぁ……っ<emoji=heart04>\u3000まだ、私が喋っているというのに……んあぁっ<emoji=heart04>」"
translation = "「응……<emoji=heart04> 이, 이봐……っ<emoji=heart04> 아직, 내가 말하고 있는데…… 응아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だって、触っていいって言ったから……」"
translation = "「그치만, 만져도 된다고 했으니까……」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「ん……それはそうだが……急に、おっぱいを触ってくるなんて思わないだろう、普通……あっ、あんっ……<emoji=heart04>」"
translation = "「응…… 그건 그렇지만…… 갑자기 가슴을 만져올 줄은 생각지도 못했단 말이다, 보통은…… 앗, 앙……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「私のおっぱいなんて……別に触っても楽しくないだろう……んっ<emoji=heart04>」"
translation = "「나의 가슴 따위…… 별로 만져도 즐겁지 않을 텐데…… 응<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「はあぁ……<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000わ、私の胸は……他の女性と違って……小さいだろう？\u3000ふあぁ……助手、そんな触り方……っ<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 응응<emoji=heart04> 나, 나의 가슴은…… 다른 여성과 달라서…… 작지 않나? 후아아…… 조수, 그런 만지는 법은……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「関係ないよ。ジュエリーの胸だから、触りたいんだ」"
translation = "「상관없어. 쥬얼리의 가슴이니까 만지고 싶은 거야」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「んっ<emoji=heart04>\u3000そんな……っ<emoji=heart04>\u3000なんでキミは私の欲しい言葉ばかり……あっ、やぁっ……<emoji=heart04>」"
translation = "「응<emoji=heart04> 그런……<emoji=heart04> 왜 너는 내가 듣고 싶은 말만…… 앗, 야앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「はあぁ……<emoji=heart04>\u3000助手……やっぱりキミ、慣れてるだろう……っ<emoji=heart04>\u3000こんな……っ<emoji=heart04>\u3000少し触れられるだけで……っ<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 조수…… 역시 너, 익숙하군……<emoji=heart04> 이런……<emoji=heart04> 조금 닿는 것만으로도……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「あっ……体が震える……っ<emoji=heart04>\u3000もっと、もっと触られたいって思ってしまう……っ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はあぁ……んっ<emoji=heart04>\u3000ふあぁっ……<emoji=heart04>」"
translation = "「앗…… 몸이 떨려……<emoji=heart04> 좀 더, 좀 더 만져졌으면 좋겠다고 생각하게 돼버려……<emoji=heart04> 앙<emoji=heart04> 하아아…… 응<emoji=heart04> 후아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ジュエリーが可愛いのが悪い」"
translation = "「쥬얼리가 귀여운 게 잘못이야」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「あ……っ<emoji=heart04>\u3000キミはまた、そういうことを言う……っ<emoji=heart04>」"
translation = "「아……<emoji=heart04> 너는 또 그런 소리를……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「他に触ってほしいところとか、ある？」"
translation = "「다른 데 만져줬으면 하는 곳 있어?」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「ばっ……そんなの、バカ正直に聞くんじゃない……っ<emoji=heart04>\u3000んっ……ふうぅ……<emoji=heart04>」"
translation = "「바…… 그런 걸 바보같이 솔직하게 묻지 말게……<emoji=heart04> 응…… 후우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だって、ジュエリーにもっと、気持ちよくなってほしいから……」"
translation = "「그치만 쥬얼리가 좀 더 기분 좋아졌으면 하니까……」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「あぅ……ずるいぞ。そんな……キュンとするようなことを、言ってくるなんて<emoji=heart04>\u3000はあぁ……<emoji=heart04>」"
translation = "「아우…… 치사하다네. 그런…… 가슴 설레는 말을 해오다니<emoji=heart04> 하아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「恥ずかしがってる私が、バカみたいじゃないか……あぁっ<emoji=heart04>」"
translation = "「부끄러워하는 내가 바보 같지 않나…… 아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「んっ……はぁ……<emoji=heart04>\u3000じゃあ、その……んこ、触ってほしい……」"
translation = "「응…… 하아……<emoji=heart04> 그럼, 그…… 보지, 만져줬으면 좋겠어……」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「うぅぅ……聞き返すんじゃない……。いじわるだぞ……っ。だ、だから……っ」"
translation = "「으으으…… 되묻지 말게나……. 심술궂다니까……. 그, 그러니까……」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「……お、おま○こ……触ってほしいんだ……はぁぁ……<emoji=heart04>\u3000キミの手で、触ってほしい……<emoji=heart04>」"
translation = "「……보, 보지…… 만져줬으면 좋겠다네…… 하아아……<emoji=heart04> 너의 손으로, 만져줬으면 좋겠어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「い、いいに決まってるだろう！\u3000だって……これから、私たちは……エッチ、するんだから……あっ<emoji=heart04>\u3000はあぁんっ……<emoji=heart04>」"
translation = "「되, 되지 않을 리가 없지 않나! 그야…… 이제부터, 우리는…… 섹스, 할 거니까…… 앗<emoji=heart04> 하아앙……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「ふあぁっ<emoji=heart04>\u3000んっ……<emoji=heart04>\u3000もう濡れちゃってるの……キミに、気づかれてしまったっ<emoji=heart04>」"
translation = "「후아앗<emoji=heart04> 응……<emoji=heart04> 벌써 젖어버린 거…… 너에게 들켜버렸군<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「ふあぁ……っ<emoji=heart04>\u3000そう……あっ<emoji=heart04>\u3000入口、優しく擦られるの、気持ちいい……あんっ<emoji=heart04>」"
translation = "「후아아……<emoji=heart04> 그래…… 앗<emoji=heart04> 입구, 부드럽게 문질러지는 거, 기분 좋아…… 앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「んっ<emoji=heart04>\u3000大丈夫……っ<emoji=heart04>\u3000キミは……どうだ？\u3000私のお○んこ……っ、変じゃないか……？」"
translation = "「응<emoji=heart04> 괜찮아……<emoji=heart04> 너는…… 어떤가? 나의 보지…… 이상하지 않나……?」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「えへへ……<emoji=heart04>\u3000変じゃないなら、それならよかった……あっ、んあぁっ<emoji=heart04>」"
translation = "「에헤헤……<emoji=heart04> 이상하지 않다면, 그거면 됐다네…… 앗, 응아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「指、中に入って……はあぁっ<emoji=heart04>\u3000クチュクチュされるのっ<emoji=heart04>\u3000んんっ……さっきまでと全然違うっ……あっ、あんっ<emoji=heart04>」"
translation = "「손가락, 안에 들어와서…… 하아앗<emoji=heart04> 질퍽질퍽해지는 거<emoji=heart04> 응응…… 아까까지랑은 완전히 달라…… 앗, 앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「頭、ビリビリってする……んうぅっ<emoji=heart04>\u3000キミの指、チュプチュプって入って、きてる……はあぁっ<emoji=heart04>」"
translation = "「머리가 찌릿찌릿해…… 응우읏<emoji=heart04> 너의 손가락, 츄르릅하고 들어오고 있어…… 하아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「んっ<emoji=heart04>\u3000さすが我が助手……っ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000あぁぁ……<emoji=heart04>\u3000私のこと、よくわかってるじゃないか……はあぁんっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 역시 나의 조수……<emoji=heart04> 후아앗<emoji=heart04> 아아아……<emoji=heart04> 나에 대해 잘 알고 있지 않나…… 하아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「キミの考えは正解だ……んんっ<emoji=heart04>\u3000助手の愛撫が、もっと欲しいんだっ<emoji=heart04>\u3000はあぁっ……<emoji=heart04>\u3000もっと刺激が欲しくて……っ<emoji=heart04>」"
translation = "「너의 생각은 정답이라네…… 응응<emoji=heart04> 조수의 애무를 좀 더 원해…… 하아앗……<emoji=heart04> 좀 더 자극을 원해서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「もっとキミを感じたかった……っ<emoji=heart04>\u3000ふうぅ<emoji=heart04>\u3000私の膣内に、キミのものを入れて、ほしくなってしまったんだ……<emoji=heart04>」"
translation = "「좀 더 너를 느끼고 싶었어……<emoji=heart04> 후우<emoji=heart04> 나의 질 안에, 너의 것을 넣고 싶어져 버렸다네……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「あっ<emoji=heart04>\u3000優しくされるの、好きっ<emoji=heart04>\u3000私のこと、女の子扱いしてくれて……恋人って感じがする<emoji=heart04>\u3000あんっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 부드럽게 대해주는 거 좋아<emoji=heart04> 나를 여자로 대우해 줘서…… 연인이라는 느낌이 들어<emoji=heart04> 앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「ふあぁっ<emoji=heart04>\u3000あっ、自分でするのと、全然ちがうっ<emoji=heart04>\u3000助手に触られてるところ……全部気持ちいいっ<emoji=heart04>」"
translation = "「후아앗<emoji=heart04> 앗, 혼자서 하는 거랑 완전히 달라<emoji=heart04> 조수가 만져주는 곳…… 전부 기분 좋아<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「はあぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あっ……やんっ<emoji=heart04>\u3000ま、待って、このままじゃすぐイっちゃ……っ<emoji=heart04>」"
translation = "「하아앗<emoji=heart04> 앙<emoji=heart04> 앗…… 앙<emoji=heart04> 자, 잠깐, 이대로라면 금방 가버……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「私だけじゃヤダ、一緒にっ……キミと一緒にイきたいっ<emoji=heart04>\u3000はっ……ふあぁんっ<emoji=heart04>」"
translation = "「나만 가는 건 싫어, 같이…… 너와 함께 가고 싶어<emoji=heart04> 핫…… 후아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「キミだって、私を触ってばっかりじゃ、その……ツラいんだろう？\u3000はあぁ……<emoji=heart04>"
translation = "「너도 나를 만지기만 해서는, 그…… 괴롭겠지? 하아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「わ、わかるとも……っ。だってその……キミのおち○ちんが、大きくなってるのも、よく見えてるからな<emoji=heart04>」"
translation = "「아, 알고 있다네……. 그게 그…… 너의 자지가 커져 있는 것도 잘 보이니까 말이지<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「さ、さあ……いつでも、来てくれ……<emoji=heart04>\u3000ふうぅ……<emoji=heart04>\u3000キミも、早く気持ちよくなりたいだろう？」"
translation = "「자, 자아…… 언제든 오게나……<emoji=heart04> 후우……<emoji=heart04> 너도 빨리 기분 좋아지고 싶지 않나?」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「私はキミのおかげで、もう準備万端だから……<emoji=heart04>」"
translation = "「나는 너 덕분에 이미 준비만전이니까……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「それに……な？\u3000私もそろそろ……キミのおち○ちんを、入れてほしいんだ……<emoji=heart04>」"
translation = "「그리고…… 응? 나도 슬슬…… 너의 자지를 넣어줬으면 좋겠다네……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「いいに、決まってるだろう……んっ<emoji=heart04>\u3000というか、こんなこと、私から言わせないでくれ……<emoji=heart04>」"
translation = "「당연히 된다네…… 응<emoji=heart04> 그보다 이런 거 나한테 말하게 하지 말아주게……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「キミが思っている以上に私は……キミが欲しいんだ。だから……<emoji=heart04>」"
translation = "「네가 생각하는 것 이상으로 나는…… 너를 원한다네. 그러니까……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「お願いだ、助手。私の中に挿れて――あっ<emoji=heart04>」"
translation = "「부탁이네, 조수. 내 안에 삽입해 줘―― 앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「ふあああぁぁぁ～～～っ<emoji=heart04><emoji=heart04>\u3000あっ……んんんっ、はあぁっ……<emoji=heart04>\u3000キミのが……入って、来てるぅ……<emoji=heart04>」"
translation = "「후아아아아아~~~앗<emoji=heart04><emoji=heart04> 앗…… 응으읏, 하아앗……<emoji=heart04> 너의 것이…… 들어오고 있어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「大丈夫……？\u3000痛くないか？」"
translation = "「괜찮아……? 아프지 않아?」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「はぁっ<emoji=heart04>\u3000ふぅ……<emoji=heart04>\u3000んっ……<emoji=heart04>\u3000キミはこんな時まで私のことを……気遣うなんて<emoji=heart04>\u3000まったく、変なところで紳士だな……<emoji=heart04>」"
translation = "「하앗<emoji=heart04> 후우……<emoji=heart04> 응……<emoji=heart04> 너는 이럴 때까지 나를…… 배려하다니<emoji=heart04> 정말이지 묘한 데서 신사로군……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「痛みなら大丈夫、だ……<emoji=heart04>\u3000それよりも、なにより……キミが私の中にいる……<emoji=heart04>\u3000はあぁ……<emoji=heart04>」"
translation = "「아픔이라면 괜찮다네……<emoji=heart04> 그것보다, 무엇보다…… 네가 내 안에 있어……<emoji=heart04> 하아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「それだけで、こんなにも幸せ気持ちになるなんて、思いもしなかった……<emoji=heart04>」"
translation = "「그것만으로 이렇게나 행복한 기분이 될 줄은 생각도 못 했어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「んっ……<emoji=heart04>\u3000だから私が処女だったことは、あまり気にしないでくれ<emoji=heart04>\u3000というかむしろ、その……こんなお願いをするのは、はしたないかもしれないが――」"
translation = "「응……<emoji=heart04> 그러니까 내가 처녀였다는 건 너무 신경 쓰지 말아주게나<emoji=heart04> 아니 오히려 그…… 이런 부탁을 하는 건 상스러울지도 모르겠지만――」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「動いて欲しい……<emoji=heart04>\u3000助手を、キミのことを……もっと深くで感じたいんだっ<emoji=heart04>\u3000はぁぁぁ<emoji=heart04>」"
translation = "「움직여 줬으면 좋겠어……<emoji=heart04> 조수를, 너를…… 좀 더 깊은 곳에서 느끼고 싶다네! 하아아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「私がキミのものであるという証明を、もっと……んんっ<emoji=heart04>\u3000強く思い知らせてほしい……<emoji=heart04>」"
translation = "「내가 너의 것이라는 증명을 좀 더…… 응응<emoji=heart04> 강하게 각인시켜 주게나……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……痛かったら、ちゃんと言うんだぞ」"
translation = "「……아프면 제대로 말해야 해」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「んっ<emoji=heart04>\u3000だから大丈夫と、言ってるだろう……<emoji=heart04>\u3000キミの存在をもっと……もっと近くで感じさせてくれ……あっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 그러니까 괜찮다고 말하지 않았나……<emoji=heart04> 너의 존재를 좀 더…… 좀 더 가까이서 느끼게 해 주게…… 앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「――はあああぁぁぁ～～～っ<emoji=heart04><emoji=heart04>\u3000あっ……あんっ<emoji=heart04>\u3000んあぁっ……<emoji=heart04>\u3000そう……そうだ……<emoji=heart04>\u3000あんっ<emoji=heart04>」"
translation = "「――후아아아아아~~~앗<emoji=heart04><emoji=heart04> 앗…… 앙<emoji=heart04> 응아앗……<emoji=heart04> 그래…… 그렇다……<emoji=heart04> 앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「キミもっ……あっ<emoji=heart04>\u3000私のことばかり気にしないでっ……ふあぁっ<emoji=heart04>\u3000気持ちよく、なってほしい……<emoji=heart04>\u3000はあぁんっ<emoji=heart04>」"
translation = "「너도…… 앗<emoji=heart04> 나만 신경 쓰지 말고…… 후아앗<emoji=heart04> 기분 좋아졌으면 좋겠어…… 하아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「んっ<emoji=heart04>\u3000ふふっ、やっぱりキミも……あんっ<emoji=heart04>\u3000我慢していたんだな……あっ<emoji=heart04>\u3000わかるぞ……<emoji=heart04>」"
translation = "「응<emoji=heart04> 후훗, 역시 너도…… 앙<emoji=heart04> 참았던 거군…… 앗<emoji=heart04> 알 수 있다네……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「だって……んあぁっ<emoji=heart04>\u3000動いてくれとおねだりしたら……膣内でぴくって……あんっ<emoji=heart04>\u3000嬉しそうに動いて……はぁんっ<emoji=heart04>」"
translation = "「그야…… 응아앗<emoji=heart04> 움직여 달라고 졸랐더니…… 질 안에서 움찔하고…… 앙<emoji=heart04> 기쁜 듯이 움직여서…… 하앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「キミが本当に私を好きだって……はあぁっ<emoji=heart04>\u3000伝わって、くるようだ……あんっ<emoji=heart04>」"
translation = "「네가 정말로 나를 좋아한다는 게…… 하아앗<emoji=heart04> 전해져 오는 것 같아…… 앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「それが……何より嬉しい……んんっ<emoji=heart04>\u3000私を求めていてくれるのだと……実感できる……ふあぁっ<emoji=heart04>」"
translation = "「그게…… 무엇보다 기뻐…… 응응<emoji=heart04> 나를 원해주고 있다는 것을…… 실감할 수 있어…… 후아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「んっ<emoji=heart04>\u3000それに……ふふっ<emoji=heart04>\u3000健気に私の感じるところを、探している……あんっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 게다가…… 후훗<emoji=heart04> 기특하게도 내가 느끼는 곳을 찾고 있군…… 앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「んあぁっ……<emoji=heart04>\u3000気付くに、決まってるだろう……あっ<emoji=heart04>\u3000私は探偵だぞ……はぁんっ<emoji=heart04>」"
translation = "「응아앗……<emoji=heart04> 눈치채는 건 당연하지 않나…… 앗<emoji=heart04> 나는 탐정이라네…… 하앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「私の反応を見て、探り探り膣内を……あんっ<emoji=heart04>\u3000擦っていることなんてお見通しだ……あっ、そこっ<emoji=heart04>\u3000はあぁんっ<emoji=heart04>」"
translation = "「나의 반응을 보고 더듬더듬 질 안을…… 앙<emoji=heart04> 문지르고 있다는 것쯤은 훤히 보인다네…… 앗, 거기<emoji=heart04> 하아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「んっ<emoji=heart04>\u3000ふふ……言ってる間に……あぁんっ<emoji=heart04>\u3000バレてしまったようだ……ふあぁっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 후후…… 말하는 사이에…… 아앙<emoji=heart04> 들켜버린 모양이군…… 후아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「そう……んあぁっ<emoji=heart04>\u3000そこだ……浅いところ……ふあぁあぁぁっ<emoji=heart04>\u3000あああっ、そこ気持ちいいっ……あぁんっ<emoji=heart04>」"
translation = "「그래…… 응아앗<emoji=heart04> 거기다…… 후아아아앗<emoji=heart04> 아아앗, 거기 기분 좋아…… 아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「あっ……ふあぁっ<emoji=heart04>\u3000んうぅっ……はあぁんっ<emoji=heart04>\u3000キミもなかなか……ああっ<emoji=heart04>\u3000探偵の素質が、あるようだっ……あんっ<emoji=heart04>」"
translation = "「앗…… 후아앗<emoji=heart04> 응우읏…… 하아앙<emoji=heart04> 너도 제법…… 아앗<emoji=heart04> 탐정의 소질이 있는 모양이군…… 앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「でも、私だって……っ<emoji=heart04>\u3000キミが喘いでいる姿を、見たいんだ……っ<emoji=heart04>\u3000だから、もっと――っ<emoji=heart04>」"
translation = "「하지만 나도……<emoji=heart04> 네가 신음하는 모습을 보고 싶다네……<emoji=heart04> 그러니까 좀 더――<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「ふあああぁぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あっ、あっ、あっ、あんっ<emoji=heart04>\u3000そう<emoji=heart04>\u3000我慢なんてしなくて、いいから……あっ、あっ、あっ、ふああぁんっ<emoji=heart04>」"
translation = "「후아아아아아~~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 앗, 앗, 앗, 앙<emoji=heart04> 그래<emoji=heart04> 참지 않아도 되니까…… 앗, 앗, 앗, 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「私の中で存分に暴れて……はあぁんっ<emoji=heart04>\u3000お○んこの中で、気持ちよくなってぇ……あっ、あっ、あっ、んああぁんっ<emoji=heart04>」"
translation = "「내 안에서 마음껏 날뛰어 줘…… 하아앙<emoji=heart04> 보지 속에서 기분 좋아지렴…… 앗, 앗, 앗, 응아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「好きなところ、触って<emoji=heart04>\u3000えぐってぇ<emoji=heart04>\u3000あっ、あっ、あっ、ふああぁっ<emoji=heart04>」"
translation = "「좋아하는 곳을 만져줘<emoji=heart04> 헤집어 줘<emoji=heart04> 앗, 앗, 앗, 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「だいじょうぶっ<emoji=heart04>\u3000私も慣れてきた、からぁっ<emoji=heart04>\u3000あんっ、あっ、あっ、んああぁんっ<emoji=heart04>」"
translation = "「괜찮아<emoji=heart04> 나도 익숙해졌으니까아<emoji=heart04> 앙, 앗, 앗, 응아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「キミのおち○ちん<emoji=heart04>\u3000お○んこ全部で、感じたいんだっ<emoji=heart04>\u3000あっ、あっ、あっ、ふああぁんっ<emoji=heart04>」"
translation = "「너의 자지<emoji=heart04> 보지 전체로 느끼고 싶어<emoji=heart04> 앗, 앗, 앗, 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「あんっ、あんっ、あぁんっ<emoji=heart04>\u3000おち○ちん、奥まで突っ込んで……あっ<emoji=heart04>\u3000それ好きっ<emoji=heart04>\u3000あぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000……ふわぁあっ、あっ、あっ<emoji=heart04>\u3000ああぁんっ<emoji=heart04>」"
translation = "「앙, 앙, 아앙<emoji=heart04> 자지 끝까지 찔러줘…… 앗<emoji=heart04> 그거 좋아<emoji=heart04> 아앗<emoji=heart04> 앙<emoji=heart04> ……후아앗, 앗, 앗<emoji=heart04> 아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「はあぁっ<emoji=heart04>\u3000好き……っ<emoji=heart04>\u3000好きだっ<emoji=heart04>\u3000あっ、あっ、あっ<emoji=heart04>\u3000付き合ってからの方がずっと、好きになってる……っ<emoji=heart04>」"
translation = "「하아앗<emoji=heart04> 좋아해……<emoji=heart04> 좋아한다네! 앗, 앗, 앗<emoji=heart04> 사귀고 나서가 훨씬 더 좋아하게 됐어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「どうすれば伝わるかって……っ<emoji=heart04>\u3000考えてたんだ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000私の好き、どうすればって……っ<emoji=heart04>\u3000あっ、あっ、ふあぁっ<emoji=heart04>」"
translation = "「어떻게 하면 전해질까……<emoji=heart04> 고민했었어<emoji=heart04> 응응<emoji=heart04> 나의 사랑을 어떻게 하면……<emoji=heart04> 앗, 앗, 후아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「おせっかいなところが好き<emoji=heart04>\u3000んっ<emoji=heart04>\u3000面倒見てくれるところが好き<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000私のこと、好きって言ってくれるところが好き<emoji=heart04>\u3000んあぁっ<emoji=heart04>」"
translation = "「참견쟁이인 면이 좋아<emoji=heart04> 응<emoji=heart04> 보살펴 주는 면이 좋아<emoji=heart04> 하아앗<emoji=heart04> 나를 좋아한다고 말해주는 면이 좋아<emoji=heart04> 응아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「言葉じゃ伝えきれないっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000でもっ<emoji=heart04>\u3000今ならっ、伝えられる……はあぁっ<emoji=heart04>」"
translation = "「말로는 다 전할 수 없어<emoji=heart04> 앙<emoji=heart04> 하지만<emoji=heart04> 지금이라면 전할 수 있어…… 하아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「キミが大好きだって……っ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000キミに伝えられる……っ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000嬉しいっ<emoji=heart04>\u3000あっ、あっ、ふああぁんっ<emoji=heart04>」"
translation = "「네가 정말 좋다고……<emoji=heart04> 앗<emoji=heart04> 너에게 전할 수 있어……<emoji=heart04> 앙<emoji=heart04> 기뻐<emoji=heart04> 앗, 앗, 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「これが……あんっ、んあぁっ<emoji=heart04>\u3000セックスっ<emoji=heart04>\u3000あっ、あっ、あっ、んああぁっ<emoji=heart04>\u3000こんなの、毎日でも、しちゃいたいくらいだ……っ<emoji=heart04>」"
translation = "「이게…… 앙, 응아앗<emoji=heart04> 섹스<emoji=heart04> 앗, 앗, 앗, 응아아앗<emoji=heart04> 이런 거 매일이라도 해버리고 싶을 정도라네……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「キミも、そう思う？\u3000あっ、あっ、あぁんっ<emoji=heart04>\u3000おち○ちんも、また大きく……なってるっ<emoji=heart04>\u3000はぁぁぁん<emoji=heart04>」"
translation = "「너도 그렇게 생각해? 앗, 앗, 아앙<emoji=heart04> 자지도 다시 커지고…… 있어<emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「あんっ<emoji=heart04>\u3000ふあぁぁっ<emoji=heart04>\u3000私とのエッチが気持ちいいってっ<emoji=heart04>\u3000おち○ちんが言ってるぞっ<emoji=heart04>\u3000あっ、あっ、あっ、んあぁっ<emoji=heart04>」"
translation = "「앙<emoji=heart04> 후아아앗<emoji=heart04> 나와의 섹스가 기분 좋다고<emoji=heart04> 자지가 말하고 있다네! 앗, 앗, 앗, 응아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「ふふっ<emoji=heart04>\u3000私も、私もだ……っ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000キミとのエッチが、こんなに気持ちいいなんて……っ<emoji=heart04>」"
translation = "「후훗<emoji=heart04> 나도, 나도라네……<emoji=heart04> 앙<emoji=heart04> 너와의 섹스가 이렇게나 기분 좋을 줄이야……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「世紀の大発見だっ<emoji=heart04>\u3000あっ、あっ、あっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「세기의 대발견이라네! 앗, 앗, 앗<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「あっ、あっ、あっ……んああぁっ<emoji=heart04>\u3000一緒にいるだけで、幸せなのにっ<emoji=heart04>\u3000あんっ、ふああぁんっ<emoji=heart04>」"
translation = "「앗, 앗, 앗…… 응아아앗<emoji=heart04> 같이 있는 것만으로 행복한데<emoji=heart04> 앙, 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「これで……毎日エッチなんてしたら、どう……なってしまうんだっ<emoji=heart04>\u3000はぁぁんっ<emoji=heart04>」"
translation = "「이대로…… 매일 섹스 같은 걸 하면 어떻게…… 되어버리는 걸까<emoji=heart04> 하아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「考えただけで、ダメだっ<emoji=heart04>\u3000おま○こキュンキュン……してしまうっ<emoji=heart04>\u3000はふぅぅん<emoji=heart04>」"
translation = "「생각만 해도 안 되겠어<emoji=heart04> 보지가 큥큥…… 거려버려<emoji=heart04> 하후으응<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「おま○こ気持ちよくなってっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000キミのことで、頭がいっぱいになってしまうんだっ<emoji=heart04>\u3000あっ、あっ、んああぁんっ<emoji=heart04>」"
translation = "「보지가 기분 좋아져서<emoji=heart04> 후아앗<emoji=heart04> 너 생각으로 머릿속이 꽉 차 버린다네<emoji=heart04> 앗, 앗, 응아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「あっ<emoji=heart04>\u3000はぁっ、あぁあんっ<emoji=heart04>\u3000気持ちいい<emoji=heart04>\u3000おち○ちん突っ込まれてっ<emoji=heart04>\u3000あんっ、あぁんっ<emoji=heart04>\u3000何も考えられなくなるっ<emoji=heart04>\u3000はあぁんっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 하앗, 아아앙<emoji=heart04> 기분 좋아<emoji=heart04> 자지로 찔러져서<emoji=heart04> 앙, 아앙<emoji=heart04> 아무것도 생각할 수 없게 돼<emoji=heart04> 하아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「おかしいっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000こんな反応、想像してなかったっ<emoji=heart04>\u3000あっ、ふあぁっ<emoji=heart04>\u3000ああああっ、気持ちいいっ<emoji=heart04>」"
translation = "「이상해<emoji=heart04> 응아앗<emoji=heart04> 이런 반응, 상상 못 했어<emoji=heart04> 앗, 후아앗<emoji=heart04> 아아아앗, 기분 좋아<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「――あっ<emoji=heart04>\u3000だ、ダメ……っ<emoji=heart04>\u3000今、耳元で好きって、囁かれたらっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000おかしくなる――っ<emoji=heart04>」"
translation = "「――앗<emoji=heart04> 안, 안 돼……<emoji=heart04> 지금 귓가에서 좋아한다고 속삭여지면<emoji=heart04> 앙<emoji=heart04> 이상해져 버려――<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「ふあぁっ<emoji=heart04>\u3000ばかぁっ<emoji=heart04>\u3000もうおしまいだっ<emoji=heart04>\u3000あっ、あっ、ふああぁんっ<emoji=heart04>\u3000……お○んこ、バカになっちゃったっ<emoji=heart04>\u3000んふぅぅぅ……<emoji=heart04>」"
translation = "「후아앗<emoji=heart04> 바보<emoji=heart04> 이제 끝이라네<emoji=heart04> 앗, 앗, 후아아앙<emoji=heart04> ……보지, 바보가 되어버렸어<emoji=heart04> 응후으으……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「精子欲しがって、止まらないっ<emoji=heart04>\u3000お○んこっ、絞りとろうと動いちゃってるっ<emoji=heart04>\u3000あっ、あっ、あっ、んああぁんっ<emoji=heart04>」"
translation = "「정액을 원해서 멈추질 않아<emoji=heart04> 보지가, 짜내려고 움직이고 있어<emoji=heart04> 앗, 앗, 앗, 응아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「いいだろう？\u3000んんんっ<emoji=heart04>\u3000おねがいだ……っ<emoji=heart04>\u3000最初から何も考えずにっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000お○んこの一番奥に……っ<emoji=heart04>\u3000精子、出してくれっ<emoji=heart04>\u3000はあぁんっ<emoji=heart04>」"
translation = "「괜찮겠지? 응응응<emoji=heart04> 부탁이네……<emoji=heart04> 처음부터 아무 생각도 하지 말고<emoji=heart04> 하아앗<emoji=heart04> 보지 제일 깊숙한 곳에……<emoji=heart04> 정액, 내보내 주게나<emoji=heart04> 하아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「キミの遺伝子、私の中にっ<emoji=heart04>\u3000あっ、あっ、あっ<emoji=heart04>\u3000好きだから……っ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>\u3000おねがい――っ<emoji=heart04>」"
translation = "「너의 유전자, 내 안에<emoji=heart04> 앗, 앗, 앗<emoji=heart04> 좋아하니까……<emoji=heart04> 후아아앗<emoji=heart04> 부탁해――<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「お○んこに、いっぱい種付けしてぇっ<emoji=heart04><emoji=heart04>\u3000あっ、あっ、あっ……あああああああ―――っ<emoji=heart04><emoji=heart04>」"
translation = "「보지에 잔뜩 씨내리기 해줘<emoji=heart04><emoji=heart04> 앗, 앗, 앗…… 아아아아아아아――앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「イクイクイクぅぅぅぅぅぅぅぅ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000っ……ふあああぁぁぁ――――――っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가버려 가버려 가버려어어어어어어어어~~~~엇<emoji=heart04><emoji=heart04><emoji=heart04> 앗…… 후아아아아아――――――앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「あぁぁぁぁ……っ<emoji=heart04>\u3000はぁぁっ<emoji=heart04>\u3000子宮にかかってるっ<emoji=heart04>\u3000せーし、注がれてるぅっ<emoji=heart04>\u3000はああぁっ……<emoji=heart04>」"
translation = "「아아아아……<emoji=heart04> 하아앗<emoji=heart04> 자궁에 닿고 있어<emoji=heart04> 정액, 부어지고 있어어<emoji=heart04> 하아아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「んっ……はあぁ<emoji=heart04>\u3000すごい<emoji=heart04>\u3000これがエッチなんだな……<emoji=heart04>\u3000ふうぅ<emoji=heart04>\u3000こんなの……知らなかった……<emoji=heart04>」"
translation = "「응…… 하아<emoji=heart04> 대단해<emoji=heart04> 이게 섹스라는 거구나……<emoji=heart04> 후우<emoji=heart04> 이런 거…… 몰랐어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「はぁ……んっ<emoji=heart04>\u3000はあぁ……まだ全然……ふうぅ……息が整わない……<emoji=heart04>」"
translation = "「하아…… 응<emoji=heart04> 하아아…… 아직 전혀…… 후우…… 숨이 가라앉질 않아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「まさか、エッチがこんなにすごいものだなんて……<emoji=heart04>\u3000んっ……<emoji=heart04>\u3000文献だけでは、決して分からない衝撃だったよ……<emoji=heart04>」"
translation = "「설마 섹스가 이렇게나 대단한 것이었을 줄이야……<emoji=heart04> 응……<emoji=heart04> 문헌만으로는 결코 알 수 없었던 충격이었어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「はあぁ……<emoji=heart04>\u3000だけど……いや、そうだな<emoji=heart04>\u3000キミとのエッチなんて……彼女である私じゃないと……経験できないんだから当たり前、か……<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 하지만…… 아니, 그렇군<emoji=heart04> 너와의 섹스 같은 건…… 여친인 내가 아니면…… 경험할 수 없는 거니까 당연한 건가……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「ふふ……っ<emoji=heart04>\u3000行為の途中……キミの好きって気持ちがすごい伝わってきた……<emoji=heart04>」"
translation = "「후후……<emoji=heart04> 행위 도중…… 너의 좋아한다는 마음이 굉장히 잘 전해졌어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「こんな幸せな気持ちになるのなら、なるほど……世の中のカップルが猿になるのも、頷けるというものだ……<emoji=heart04>」"
translation = "「이런 행복한 기분이 된다면, 과연…… 세상의 커플들이 원숭이가 되는 것도 납득이 가는군……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「んっ……よし、やっと落ち着いてきた。まだ心臓はバクバクしているが、そんなもの、キミの隣にいたらいつものことだからな<emoji=heart04>」"
translation = "「응…… 좋아, 겨우 진정됐어. 아직 심장은 두근거리고 있지만, 그런 거 너의 옆에 있으면 언제나 있는 일이니까 말이지<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「……しょうがないだろう、こんなにも好きなんだ。私だって、いつも冷静でいられるわけじゃない」"
translation = "「……어쩔 수 없지 않나, 이렇게나 좋아하는걸. 나라고 언제나 냉정할 수 있는 건 아니라네」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「んふふっ<emoji=heart04>\u3000……ああ、そうだ。エッチの時に言った言葉、覚えているかい？」"
translation = "「응후후<emoji=heart04> ……아아, 그렇지. 섹스할 때 했던 말, 기억하고 있나?」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「キミの好きなところをたくさん挙げた時のことだ。その中でも……特に重要なものがあるんだ」"
translation = "「너의 좋아하는 점을 잔뜩 나열했을 때 말이라네. 그중에서도…… 특히 중요한 것이 있어」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「それはだな……ふふふっ<emoji=heart04>\u3000ズバリ、明解に換言するならば――」"
translation = "「그건 말이지…… 후후후<emoji=heart04> 바로, 명쾌하게 환언하자면――」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「私を大好きだと、ちゃんと言葉にしてくれるところだ」"
translation = "「나를 정말 좋아한다고, 제대로 말로 표현해 주는 점이라네」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「言葉にして――形にして、ちゃんと好きだと伝えてくれる。そんなところが……私はとっても大好きなんだ<emoji=heart04>」"
translation = "「말로 해서―― 형태를 만들어서, 제대로 좋아한다고 전해준다. 그런 면이…… 나는 정말로 너무나 좋다네<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「ふふっ<emoji=heart04>\u3000どうだい？\u3000私の言葉にキュンとしてくれたかい？」"
translation = "「후후<emoji=heart04> 어떤가? 나의 말에 가슴이 뭉클해졌나?」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「何でわかるのかって？\u3000それはだね……あんなに出したばかりなのに、キミのおち○ちんがまた、反応してるからさ<emoji=heart04>」"
translation = "「어떻게 아느냐고? 그건 말이지…… 그렇게 잔뜩 내보낸 지 얼마 안 됐는데도, 너의 자지가 또 반응하고 있으니까 말이야<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「なに大丈夫、そのまま我慢しろだなんて、私が言うはずがないだろう？\u3000だから――」"
translation = "「뭐 괜찮다네, 그대로 참으라는 소릴 내가 할 리가 없지 않나? 그러니까――」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「今日はお互いの気が済むまで、とことん愛の営みをしようじゃないか……<emoji=heart04>」"
translation = "「오늘은 서로 마음이 풀릴 때까지, 마음껏 사랑의 영위를 나누지 않겠나……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その後、俺は何度も何度も、ジュエリーへの愛を形にして伝えるのだった――"
translation = "그 후, 나는 몇 번이고 몇 번이고, 쥬얼리를 향한 사랑을 형태로 만들어 전했다――"

