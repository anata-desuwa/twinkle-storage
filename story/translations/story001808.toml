[[dialogue]]
speaker = "unk"
original = "フニの声は、フェニックスの中から聞こえてきていた。"
translation = "후니의 목소리는 페닉스 안에서 들려오고 있었다."

[[dialogue]]
speaker = "フェニエル"
original = "「ダメだよ！\u3000ホウちゃん！\u3000私の為に消えようとするだなんて！」"
translation = "「안 돼요! 호우 짱! 나를 위해서 사라지려고 하다니!」"

[[dialogue]]
speaker = "フェニックス"
original = "「フニ……もういいのです。私は……」"
translation = "「후니…… 이제 됐습니다. 저는……」"

[[dialogue]]
speaker = "フェニックス"
original = "「不死の存在として、長い時間をひとりで生きてきました……もう十分に生きたのです」"
translation = "「불사의 존재로서 긴 시간을 혼자 살아왔습니다…… 이제 충분히 살았어요.」"

[[dialogue]]
speaker = "フェニックス"
original = "「ですが、私の生の中でもわずかな時間にすぎなかったはずの、あなたと一緒に過ごした時が、もっとも幸福だと思えるのです」"
translation = "「하지만 제 평생에서 아주 짧은 시간이었을 당신과 함께 지낸 때가 가장 행복했다고 생각합니다.」"

[[dialogue]]
speaker = "フェニックス"
original = "「私は不死故に、家族を持たない存在……」"
translation = "「저는 불사기에 가족을 갖지 못하는 존재……」"

[[dialogue]]
speaker = "フェニックス"
original = "「不死鳥という種族は、この世に存在しない。たった一体、私だけなのです。決して死なず、何度もこの身１つで甦り、生き続ける個体だった……」"
translation = "「불사조라는 종족은 이 세상에 존재하지 않습니다. 오직 단 한 마리, 저뿐이죠. 결코 죽지 않고 몇 번이고 이 몸 하나로 되살아나 계속 살아가는 개체였습니다……」"

[[dialogue]]
speaker = "フェニックス"
original = "「だからこそ、私はずっとわかっていなかったのです。誰かの為に、強くなれる心の在り方を……」"
translation = "「그렇기에 저는 줄곧 이해하지 못했습니다. 누군가를 위해 강해질 수 있는 마음의 본질을……」"

[[dialogue]]
speaker = "フェニックス"
original = "「アウクセシアには、腕っぷしの強さだけでなく、賭けにも負けました」"
translation = "「아우크세시아에게는 완력뿐만 아니라 내기에서도 졌습니다.」"

[[dialogue]]
speaker = "フェニックス"
original = "「たとえ乱世が続かなくとも、リクリエに抗える強き者――クロトやフニのような存在は現れるのだと知りました」"
translation = "「설령 난세가 계속되지 않더라도 리크리에에 대항할 수 있는 강한 자―― 쿠로토나 후니 같은 존재는 나타난다는 것을 알았습니다.」"

[[dialogue]]
speaker = "フェニックス"
original = "「……乱世でこそ『強さ』が生まれるという考えは、決して間違っていないと今でも思っています」"
translation = "「……난세에서야말로 『강함』이 태어난다는 생각은 결코 틀리지 않았다고 지금도 생각합니다.」"

[[dialogue]]
speaker = "フェニックス"
original = "「しかし、決して正しくもなかった。続いた平和によって育まれる優しき心、その蓄積によって生まれる仲間との絆もまた、重要だったのです」"
translation = "「하지만 결코 옳지도 않았죠. 이어진 평화에 의해 길러지는 상냥한 마음, 그 축적에 의해 태어나는 동료와의 유대 또한 중요했던 것입니다.」"

[[dialogue]]
speaker = "フェニックス"
original = "「心の強さというものを、私は見誤っていた」"
translation = "「마음의 강함이라는 것을 제가 잘못 보았던 것입니다.」"

[[dialogue]]
speaker = "フェニックス"
original = "「だって、私自身も今――」"
translation = "「왜냐하면 저 자신조차 지금――」"

[[dialogue]]
speaker = "フェニックス"
original = "「こうして、フニの為ならばもう２度と甦れなくなっても構わないと、強く想えるようになったのだから」"
translation = "「이렇게 후니를 위해서라면 두 번 다시 되살아날 수 없게 되어도 상관없다고 강하게 생각하게 되었으니까요.」"

[[dialogue]]
speaker = "フェニエル"
original = "「ホウちゃん……」"
translation = "「호우 짱……」"

[[dialogue]]
speaker = "フェニエル"
original = "「私ね……ホウちゃんが私の中にいるって知った時、すごく嬉しかったの」"
translation = "「저요…… 호우 짱이 제 안에 있다는 걸 알았을 때 정말 기뻤어요.」"

[[dialogue]]
speaker = "フェニエル"
original = "「私を見守ってくれている家族がずっとそばにいたんだって」"
translation = "「나를 지켜주는 가족이 계속 곁에 있었다는 거니까요.」"

[[dialogue]]
speaker = "フェニエル"
original = "「だからね、ホウちゃんと一緒なんだよ」"
translation = "「그러니까 호우 짱이랑 마찬가지예요.」"

[[dialogue]]
speaker = "フェニエル"
original = "「私もこれ以上、大切な家族を失いたくないの」"
translation = "「저도 더 이상 소중한 가족을 잃고 싶지 않아요.」"

[[dialogue]]
speaker = "フェニエル"
original = "「だから、消滅しても構わないだなんて言わないで！\u3000私、ホウちゃんの力に耐えられるようにけっぱるから！」"
translation = "「그러니 소멸해도 상관없다니 말하지 마세요! 저, 호우 짱의 힘을 버텨낼 수 있도록 힘낼(께팔) 테니까요!」"

[[dialogue]]
speaker = "フェニエル"
original = "「今すぐにはダメだとしても、精神が消滅しないようにホウちゃんの中でけっぱり続ける！」"
translation = "「지금 당장은 무리일지 몰라도 정신이 소멸하지 않도록 호우 짱 안에서 계속 힘낼(께팔) 거예요!」"

[[dialogue]]
speaker = "フェニエル"
original = "「それでいつか必ず、強くなって目覚めてみせるよ！\u3000だって私……お父さんとお母さんの分も生き続けるって、誓ったんだから！」"
translation = "「그래서 언젠가 반드시 강해져서 눈을 뜨고 말겠어요! 왜냐하면 저…… 아버지와 어머니의 몫까지 계속 살아가겠다고 맹세했으니까요!」"

[[dialogue]]
speaker = "フェニックス"
original = "「フニ……！」"
translation = "「후니……!」"

[[dialogue]]
speaker = "セシア"
original = "「それでこそ、わたくしが見込んだ将来のママよ、フニ」"
translation = "「그래야 제가 점찍은 장래의 마마죠, 후니.」"

[[dialogue]]
speaker = "セシア"
original = "「だからこそ、あなたを死なせたりしないわ。そして、あなたもよ、ホウちゃんママ」"
translation = "「그렇기에 당신을 죽게 내버려 두지 않겠어요. 그리고 당신도요, 호우 짱 마마.」"

[[dialogue]]
speaker = "フェニックス"
original = "「私、も……？」"
translation = "「저, 도……?」"

[[dialogue]]
speaker = "セシア"
original = "「わたくしはママを愛する守護天使。ならば、せっかく見つけた新たなママを失う選択など、認められるはずがないわ！」"
translation = "「저는 마마를 사랑하는 수호천사. 그렇다면 모처럼 찾아낸 새로운 마마를 잃는 선택지 따위 인정할 수 있을 리 없잖아요!」"

[[dialogue]]
speaker = "セシア"
original = "「だから……今からわたくしと戦いなさい、ホウちゃんママ」"
translation = "「그러니…… 지금부터 저와 싸우세요, 호우 짱 마마.」"

[[dialogue]]
speaker = "フェニックス"
original = "「戦う……！？\u3000セシア、あなたは一体何を……」"
translation = "「싸운다니……!? 세시아, 당신 대체 무슨……」"

[[dialogue]]
speaker = "セシア"
original = "「あなた、言ったわよね？\u3000この精神世界では、現実よりも時間の進みが遥かに遅いって」"
translation = "「당신 입으로 말했죠? 이 정신 세계에서는 현실보다 시간의 흐름이 훨씬 느리다고.」"

[[dialogue]]
speaker = "セシア"
original = "「なら、不可能が可能になるまで、情報を蓄積すればいい」"
translation = "「그렇다면 불가능이 가능해질 때까지 정보를 축적하면 돼요.」"

[[dialogue]]
speaker = "セシア"
original = "「わたくしは蓄積を司る守護天使セシア。あらゆる経験を積み重ねる程に強くなる。一番手っ取り早いのが、戦闘よ」"
translation = "「저는 축적을 관장하는 수호천사 세시아. 온갖 경험을 쌓을수록 강해지죠. 가장 빠른 방법은 전투예요.」"

[[dialogue]]
speaker = "フェニックス"
original = "「正気ですか！？\u3000一体、どれだけの時間がかかると……」"
translation = "「제정신인가요!? 대체, 얼마만큼의 시간이 걸릴 줄 알고……」"

[[dialogue]]
speaker = "セシア"
original = "「それでフニと一緒にいられるのなら、諦める理由はない。そうでしょう？」"
translation = "「그걸로 후니와 함께 있을 수 있다면, 포기할 이유는 없어요. 그렇죠?」"

[[dialogue]]
speaker = "フェニックス"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "フェニックス"
original = "「……わかりました。それで本当に、フニとの未来が見られるのなら！」"
translation = "「……알겠습니다. 그걸로 정말, 후니와의 미래를 볼 수 있다면!」"

[[dialogue]]
speaker = "unk"
original = "俺はセシアの肩に手を置く。"
translation = "나는 세시아의 어깨에 손을 얹는다."

[[dialogue]]
speaker = "unk"
original = "俺も手伝うぞ"
translation = "「나도 돕겠어.」"

[[dialogue]]
speaker = "unk"
original = "そしてもう片方の肩も――"
translation = "그리고 다른 한쪽 어깨에도――"

[[dialogue]]
speaker = "ルルカ"
original = "「もちろん、あたしもね！\u3000友達を助ける為だもん！」"
translation = "「물론 나도지! 친구를 돕기 위해서인걸!」"

[[dialogue]]
speaker = "セシア"
original = "「ええ。ありがとう、２人共」"
translation = "「네. 고마워요, 두 사람 모두.」"

[[dialogue]]
speaker = "フェニエル"
original = "「みなさん……！」"
translation = "「여러분……!」"

[[dialogue]]
speaker = "セシア"
original = "「――そういうわけで、ホウちゃんママ、全力で来なさい」"
translation = "「――그런 이유로, 호우 짱 마마, 전력으로 오세요.」"

[[dialogue]]
speaker = "セシア"
original = "「あなたの力、わたくしの中に全て蓄積させてもらうわ！」"
translation = "「당신의 힘, 제 안에 전부 축적하겠어요!」"

[[dialogue]]
speaker = "フェニックス"
original = "「いいでしょう。守護天使セシア……私の想い、あなたに預けます！」"
translation = "「좋습니다. 수호천사 세시아…… 저의 마음, 당신에게 맡기겠어요!」"

[[dialogue]]
speaker = "セシア"
original = "「フニ、待ってなさい。わたくしが――いえ、わたくし達みんなで！」"
translation = "「후니, 기다려요. 제가―― 아니, 저희들 모두가!」"

[[dialogue]]
speaker = "セシア"
original = "「あなたに必ず、未来というプレゼントを届けてみせるわ！」"
translation = "「당신에게 반드시, 미래라는 선물을 전해주고 말겠어요!」"

[[dialogue]]
speaker = "フェニエル"
original = "「はい……！\u3000私、みなさんを信じます！」"
translation = "「네……! 저, 여러분을 믿어요!」"

[[dialogue]]
speaker = "セシア"
original = "「――いざ、勝負よっ！」"
translation = "「――자, 승부예요!」"

[[dialogue]]
speaker = "unk"
original = "俺たちはフニとホウちゃんの両方を助けるために、戦闘を開始するのだった――"
translation = "우리들은 후니와 호우 짱 양쪽 모두를 구하기 위해, 전투를 개시하는 것이었다――"

