[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「はぁあっ<emoji=heart04>\u3000待って～、カオリ～ン<emoji=heart04>」"
translation = "「하아앗<emoji=heart04> 기다려~, 카올린~<emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「もーっ、勘弁して～～！！」"
translation = "「정말~, 봐달라구~~!!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「サチさ～ん、はぁあぁ<emoji=heart04>\u3000とりあえず１回、お仲間になっておきましょうよ～☆」"
translation = "「사치 사~앙, 하아아아<emoji=heart04> 일단 한 번, 동료가 되어버리자구요~☆」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ぜぇえええええったい、いやぁーーーーーっ！！！！」"
translation = "「저어어어어어얼대, 싫어어어어~~~~!!!!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「はぁ……はぁ……はぁ……！」"
translation = "「하아…… 하아…… 하아……!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「な、何とか……振り切ったみたいですね……」"
translation = "「겨, 겨우…… 따돌린 모양이네요……」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「これ……ウチら……はぁ……はぁ……いつまで、逃げればいいの……」"
translation = "「이거…… 우리…… 하아…… 하아…… 언제까지 도망쳐야 하는 거야……」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「みんなの……ピンク脳症候群の効果が……切れるまで……でしょうか……」"
translation = "「모두의…… 핑크 뇌 증후군 효과가…… 풀릴 때까지……일까요……」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「効果が切れるのは……罹患者の欲望が満たされるまで……だっけ……？」"
translation = "「효과가 풀리는 건…… 이환자의 욕망이 충족될 때까지……라고 했나……?」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「時間経過で効果が切れる、ってことは、あるのかな……？」"
translation = "「시간이 지나면 효과가 풀린다는 건, 있을까……?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「……わ、わかりません」"
translation = "「……모, 모르겠습니다」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「ですよねぇ……！！」"
translation = "「그렇겠죠……!!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「とにかく捕まってキスされたら、一巻の終わりです！！！」"
translation = "「어쨌든 잡혀서 키스당하면 그걸로 끝이에요!!!」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「そうだね……」"
translation = "「그렇네……」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「あ～、カオリンとサチちゃん、見～つけたぁ<emoji=heart04>\u3000はぁあぁっ<emoji=heart04>」"
translation = "「아~, 카올린이랑 사치짱, 찾~았다아<emoji=heart04> 하아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「はふぅぅ<emoji=heart04>\u3000お２人だけで仲良くなっちゃうなんて、ずるいですよ～？」"
translation = "「하후우우<emoji=heart04> 두 분이서만 사이좋게 지내다니, 치사해요~?」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「げげ……っ」"
translation = "「게게……」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「うわあああぁぁぁぁっ！？\u3000もう見つかっちゃった！？\u3000花織さんっ、逃げますよっ！！！」"
translation = "「우와아아아아아아앗!? 벌써 들켰어!? 카오리 씨, 도망쳐요!!!」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「待て～っ♪\u3000ふわぁぁっ<emoji=heart04>」"
translation = "「기다려~♪ 후와아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「はぁっ……はぁっ……」"
translation = "「하앗…… 하앗……」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「はぁっ……はぁっ……」"
translation = "「하앗…… 하앗……」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ああっ！\u3000もう、本当にしつこいですっ！」"
translation = "「아앗! 정말, 정말 끈질기네요!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「どうやら、振り切れたみたい、ですね……大丈夫ですか、花織さん……？\u3000って、あれ！？」"
translation = "「아무래도 따돌린 모양, 이네요…… 괜찮으세요, 카오리 씨……? 어, 어라!?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「いない！？\u3000もしかしてどこかではぐれちゃった！？」"
translation = "「없어!? 혹시 어딘가에서 놓쳐버린 건가!?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "（話を聞く限り、花織さんたちの世界も、私たちの世界とそれほど大きく違っているわけではなさそうでしたけど……）"
translation = "（이야기를 들어보니 카오리 씨네 세계도 우리 세계와 그렇게 크게 다른 것 같지는 않았지만……）"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "（それでも細かくいろいろ違うでしょうし、無事に逃げ切れていたらいいんですが……）"
translation = "（그래도 세세하게 여러모로 다르겠고, 무사히 도망쳤다면 좋을 텐데……）"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「サチちゃ～ん、どこですか～<emoji=heart04>」"
translation = "「사치 짜~응, 어디 있나요~<emoji=heart04>」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「っ……！？」"
translation = "「윽……!?」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「はぁあ<emoji=heart04>\u3000この辺りにいると思うんだけどな～<emoji=heart04>」"
translation = "「하아아<emoji=heart04> 이 근처에 있을 거라고 생각하는데 말야~<emoji=heart04>」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「見つけたら思いっきりくすぐって……はぁ<emoji=heart04>\u3000はぁ<emoji=heart04>\u3000それからあたしたちの仲間に入れてあげないとぉ<emoji=heart04>」"
translation = "「찾으면 마음껏 간지럽히고…… 하아<emoji=heart04> 하아<emoji=heart04> 그러고 나서 우리 동료로 만들어 줘야지이<emoji=heart04>」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「はぁあぁ<emoji=heart04>\u3000サチちゃ～ん、隠れてないで出ておいで～<emoji=heart04>\u3000サチちゃ～ん？」"
translation = "「하아아아<emoji=heart04> 사치 짜~응, 숨어있지 말고 나오렴~<emoji=heart04> 사치 짜~응?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "（……ふぅ、どうにかやり過ごせたみたい）"
translation = "（……휴우, 어떻게든 넘긴 모양이야）"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "（運よく身を隠す場所があってよかった。多分、幸運体質のおかげかな……）"
translation = "（운 좋게 몸을 숨길 장소가 있어서 다행이다. 아마 행운 체질 덕분이겠지……）"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "（でも、花織さんのことが心配だな……一刻も早く合流しないと！）"
translation = "（하지만 카오리 씨가 걱정되네…… 한시라도 빨리 합류해야 해!）"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「はぁ……はぁ……サチ……ちゃん……」"
translation = "「하아…… 하아…… 사치…… 짱……」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「あっ、花織さん！\u3000ご無事でしたか！\u3000ごめんなさい、どこかではぐれてしまったみたいで……」"
translation = "「앗, 카오리 씨! 무사하셨나요! 죄송해요, 어딘가에서 놓쳐버린 것 같아서……」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「えへへ……いいよ……サチちゃん……それよりもさ……」"
translation = "「에헤헤…… 괜찮아…… 사치 짱…… 그것보다 말야……」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「あはぁあぁ～っ<emoji=heart04>\u3000ウチのこと、いじめてくれなぁい？<emoji=heart04>」"
translation = "「아하아아아~앗<emoji=heart04> 나를 괴롭혀주지 않을래? <emoji=heart04>」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「か、感染してるぅぅぅーーーっ！！？」"
translation = "「감, 감염되어 있어~~~~엇!!?」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「あぁあぁ<emoji=heart04>\u3000お願い、サチちゃん<emoji=heart04>\u3000ウチを縛って、お尻を叩いて……それから口汚く罵ってぇ……<emoji=heart04>」"
translation = "「아아아아<emoji=heart04> 부탁이야, 사치 짱<emoji=heart04> 나를 묶고, 엉덩이를 때리고…… 그러고 나서 입버릇 사납게 욕해줘……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「断固お断りしますっ！！」"
translation = "「단호히 거절하겠습니다!!」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「あっ<emoji=heart04>\u3000サチちゃん見～つけたぁ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 사치 짱 찾~았다아<emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「あぁあ<emoji=heart04>\u3000待って～、サチちゃ～んっ<emoji=heart04>」"
translation = "「아아아<emoji=heart04> 기다려~, 사치 짜~앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ひぃいいいいいいっ！！？\u3000これもう、リアルゾンビ映画なんですけど～～～っ！？」"
translation = "「히이이이이이이잇!!? 이거 완전 리얼 좀비 영화잖아요~~~~앗!?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「はぁあぁ<emoji=heart04>\u3000さすがはサチさんの幸運能力☆\u3000手こずってしまいましたが、もう逃げられませんよ～☆」"
translation = "「하아아아<emoji=heart04> 역시 사치 씨의 행운 능력☆ 애를 좀 먹었지만 이제 도망갈 수 없어요~☆」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「んんぅ<emoji=heart04>\u3000あなたは完全に包囲されている、ってね～<emoji=heart04>」"
translation = "「응으<emoji=heart04> 당신은 완전히 포위되었다, 라고나 할까~<emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「あぁあぁぁ～<emoji=heart04>\u3000後で思いっきり、ウチのこといじめてねぇ<emoji=heart04>\u3000はぁあぁっ<emoji=heart04>」"
translation = "「아아아아아~<emoji=heart04> 나중에 마음껏 나를 괴롭혀줘어<emoji=heart04> 하아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ぅぅぅ……近づかないで下さいっ！」"
translation = "「으으으…… 가까이 오지 마세요!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「はぁ<emoji=heart04>\u3000はぁ<emoji=heart04>\u3000はぁあ<emoji=heart04>\u3000楽しみですねぇ～<emoji=heart04>\u3000サチさんの欲望が解放されてしまった時、どんな風になってしまうのか……<emoji=heart04>」"
translation = "「하아<emoji=heart04> 하아<emoji=heart04> 하아아<emoji=heart04> 기대되네요~<emoji=heart04> 사치 씨의 욕망이 해방되어 버렸을 때, 어떤 모습이 되어버릴지……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ひぇっ……エッチなのは禁止です……！」"
translation = "「히엣…… 야한 건 금지입니다……!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「はふぅぅ<emoji=heart04>\u3000認めてしまえば楽になれますよ～☆\u3000己の欲に対して素直になると、と～っても気持ちいいんですから<emoji=heart04>」"
translation = "「하후우우<emoji=heart04> 인정해버리면 편해질 수 있어요~☆ 자신의 욕구에 솔직해지면 아주우 기분 좋으니까요<emoji=heart04>」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「あはぁあっ<emoji=heart04>\u3000病みつきになっちゃうよね～<emoji=heart04>」"
translation = "「아하아앗<emoji=heart04> 중독되어 버린다니까~<emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「ふわぁぁ<emoji=heart04>\u3000ウチはまだ、いじめてもらってないよ～<emoji=heart04>\u3000サチちゃん、ウチのこと気持ちよくして～<emoji=heart04>」"
translation = "「후와아아<emoji=heart04> 나는 아직 괴롭힘당하지 못했어~<emoji=heart04> 사치 짱, 나를 기분 좋게 해줘~<emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「さあさあ、そろそろ覚悟を決めてください<emoji=heart04>」"
translation = "「자아 자아, 슬슬 각오를 정하세요<emoji=heart04>」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「……やだ……！\u3000それ以上、近づかないでください……！」"
translation = "「……싫어……! 더 이상 가까이 오지 마세요……!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「さもないと……さもないと……っ！」"
translation = "「안 그러면…… 안 그러면……!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「本っっっ気で怒りますからねーーーーーーっ！！！！！？」"
translation = "「지이이이이인짜로 화낼 거니까요~~~~~~~~~!!!!!?」"

