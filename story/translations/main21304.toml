[[dialogue]]
speaker = "unk"
original = "第４話,アルタイルのグレイス,B"
translation = "제4화, 알타이르의 그레이스, B"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「──以上が、ここ数日のグレイスさんの大冒険の記録です」"
translation = "「──이상이, 요 며칠간 그레이스 씨의 대모험 기록입니다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……ああ」"
translation = "「……아아」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「星徒会の業務に支障が出ています。グレイスさんによってマトイ先輩が常に拘束され、書類仕事が進捗率マイナス８０％」"
translation = "「성도회 업무에 지장이 생기고 있습니다. 그레이스 씨에 의해 마토이 선배가 항상 구속되어, 서류 작업 진척률이 마이너스 80%」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あらあら、うふふ～♪」"
translation = "「어머 어머, 우후후~♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「グレイス・オベロニア……鉄砲玉みたいな子ね！」"
translation = "「그레이스 오베로니아…… 불도저 같은 아이네!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「どうして私ばかりに同伴を頼むんだろう？\u3000会長とは昔、会ったことがあるみたいなのに……」"
translation = "「왜 나한테만 동반을 부탁하는 걸까? 회장님과는 옛날에, 만난 적이 있는 것 같은데……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そうだ、こうしちゃいられない。今のうちに、少しでも仕事を……」"
translation = "「맞다, 이러고 있을 때가 아니지. 지금이라도, 조금이라도 일을……」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "『マトイさん！\u3000私、街にお買い物に行きたいです！』"
translation = "『마토이 씨! 저, 거리에 쇼핑하러 가고 싶어요!』"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ひえぇえ～っ……ごめん、抜けます～っ……！」"
translation = "「히에에에~…… 미안, 빠질게~……!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「本当に台風のような方ですね……そうです、会長。依頼されていた調査の結果が出ましたよ」"
translation = "「정말로 태풍 같은 분이시네요…… 그렇습니다, 회장님. 의뢰하셨던 조사 결과가 나왔어요」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「グレイス・オベロニア。同姓同名の女の子が、アルタイルの流星市国にいること。そして存命であることも確認しました」"
translation = "「그레이스 오베로니아. 동성동명의 여자아이가, 알타이르의 유성시국에 있다는 것. 그리고 생존해 있음도 확인했습니다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そうか……よかった」"
translation = "「그래…… 다행이다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「会長の指示どおり、アルタイルのチナさんと同じ病院に搬送手続きを。シノ学園長にも協力を仰ぎ、手厚く保護していただきました」"
translation = "「회장님의 지시대로, 알타이르의 치나 씨와 같은 병원에 반송 절차를. 시노 학원장님께도 협력을 구해, 정중히 보호해 주셨습니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「またデネブから同行してきた、エステル・ミルフォードさんについても同様です。市国在住のためすぐに発見できました」"
translation = "「또한 데네브에서 동행해 온, 에스텔 밀포드 씨에 대해서도 마찬가지입니다. 시국 거주 중이라 곧바로 발견할 수 있었습니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「昏睡の原因についてご家族へは伏せてありますが……今のところ大きなトラブルはありません」"
translation = "「혼수상태의 원인에 대해서 가족분들에게는 함구하고 있습니다만…… 현재로서는 큰 트러블은 없습니다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ありがとう、アナ。大変だっただろ？」"
translation = "「고마워, 아나. 고생 많았지?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ノープロブレム。会長の補佐をするのが、副会長の仕事です」"
translation = "「노 프로블럼. 회장님을 보좌하는 것이, 부회장의 업무입니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「しかし、レティシア・オルティースという女の子の名前は確認できませんでした」"
translation = "「하지만, 레티시아 오르티스라는 여자아이의 이름은 확인되지 않았습니다」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「もしかして、アルタイルではもう……？」"
translation = "「혹시, 알타이르에서는 이미……?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「いいえ。出生記録と照合しましたが、データそのものがないんです。レティシアという名前も、偽名なのかもしれません」"
translation = "「아니요. 출생 기록과 대조해 보았습니다만, 데이터 자체가 없어요. 레티시아라는 이름도, 가명일지도 모릅니다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……そうか。引き続き、何かわかったら教えてくれ」"
translation = "「……그래. 계속해서, 무언가 알게 되면 알려줘」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「みんな、グレイス以外から外出の希望があったら対応を頼む。俺は少し出かけてくるよ」"
translation = "「모두들, 그레이스 이외에 외출 희망이 있으면 대응을 부탁해. 나는 잠깐 나갔다 올게」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「わかったわ！\u3000行ってらっしゃい、クロト！」"
translation = "「알았어! 다녀와, 쿠로토!」"

[[dialogue]]
speaker = "unk"
original = "天界からの援軍だけでは心もとない。次に助力を頼むべきは──魔界だ。"
translation = "천계에서의 원군만으로는 마음이 놓이지 않는다. 다음에 조력을 구해야 할 곳은── 마계다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「はろはろ～♪\u3000会長から呼び出しなんてめずらしーね。しかも公安経由での依頼だなんて」"
translation = "「할로할로~♪ 회장님이 부르다니 드문 일이네. 게다가 공안을 경유한 의뢰라니」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「折り入って頼みたいことがあるんだ。近づきつつある決戦に備えての、戦力拡充について」"
translation = "「정중히 부탁하고 싶은 일이 있어. 다가오는 결전에 대비한, 전력 확충에 대해서야」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「……天界からの増援はすでに依頼済み。だから今度は魔界からも、ってこと？」"
translation = "「……천계에서의 증원은 이미 의뢰 완료. 그러니까 이번엔 마계에서도, 라는 거야?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「話が早くて助かる」"
translation = "「말이 빨라서 다행이야」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「向かってほしいのは、魔界の<ruby>頽廃<rt>たいはい</rt></ruby>都市キュリオスだ。<ruby>煌嶺<rt>こうれい</rt></ruby>の配下たちは猛者ぞろいと聞いている。彼らの力を借りたい」"
translation = "「향해주었으면 하는 곳은, 마계의 퇴폐 도시 큐리오스야. 코레이의 부하들은 강자들뿐이라고 들었어. 그들의 힘을 빌리고 싶어」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「マインには流星市国代表の交渉人として、魔界で腕を振るってもらいたいんだ」"
translation = "「마인에게는 유성시국 대표 협상가로서, 마계에서 실력을 발휘해 주었으면 해」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んー……会長の頼みだし断る気はないんだけど。私、キュリオスに知り合いなんていないよ？」"
translation = "「음~…… 회장님의 부탁이고 거절할 생각은 없는데. 나, 큐리오스에 아는 사람 같은 거 없다구?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ていうか、交渉するなら魔界じゃなくて、いま人間界にいる煌嶺さんに、じゃないの？」"
translation = "「그보다, 협상한다면 마계가 아니라, 지금 인간계에 있는 코레이 씨한테 해야 하는 거 아냐?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「実は、キュリオスにいる戦力の貸し出し自体は、もう許可が下りてるんだ」"
translation = "「사실, 큐리오스에 있는 전력 대여 자체는, 이미 허가가 내려졌어」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「どゆことぉ！？」"
translation = "「뭔 소리야!?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ええっと、会長……？\u3000ちゃんとイチから私にしてほしいことを説明してくれるかな？」"
translation = "「저기, 회장님……? 제대로 처음부터 나한테 바라는 걸 설명해 줄래?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ややこしい話ですまない……」"
translation = "「복잡한 이야기라 미안해……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「煌嶺はキュリオスの皇帝だ。彼女の命令があれば、キュリオスの兵自体は動かせる」"
translation = "「코레이는 큐리오스의 황제다. 그녀의 명령이 있다면, 큐리오스의 병사 자체는 움직일 수 있어」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だが、そのことを頼みに行った時に言われてしまったんだ、『キュリオスだけでは足りない』と」"
translation = "「하지만, 그 일을 부탁하러 갔을 때 들어버렸거든, 『큐리오스만으로는 부족하다』라고」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「足りない……？」"
translation = "「부족해……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「キュリオスの戦力だけではなく、事情を話して周辺諸国の戦力をまとめて連れてこい、と逆にミッションを課されてしまった」"
translation = "「큐리오스의 전력뿐만 아니라, 사정을 이야기해서 주변국들의 전력을 모아서 데려와라, 라고 역으로 미션을 받아버렸어」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あ～～……なるほど、なるほど？\u3000だいたい事情は察したよ」"
translation = "「아~~…… 과연, 과연? 대충 사정은 짐작했어」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「これ、要するに『キュリオスの戦力を借りたいなら、周辺諸国の戦力も同じだけ削いで来い』っていうミッションだね～」"
translation = "「이거, 요컨대 『큐리오스의 전력을 빌리고 싶다면, 주변국들의 전력도 그만큼 깎아 와라』라는 미션이네~」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「噂によると、キュリオスって魔界じゃ相当悪名高いみたいだし。恨みを持ってる国も多そう……」"
translation = "「소문에 따르면, 큐리오스는 마계에서 상당히 악명이 높은 모양이고. 원한을 가진 나라도 많을 것 같고……」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「キュリオスの力を借りるのなら、その間に周辺諸国から戦争を仕掛けられないように、同程度の戦力を連れてこなければダメってことかぁ」"
translation = "「큐리오스의 힘을 빌리는 동안, 그사이에 주변국들로부터 전쟁을 걸어오지 못하도록, 동등한 정도의 전력을 데려오지 않으면 안 된다는 거구나」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……本当に話が早くて助かるよ、マイン」"
translation = "「……정말로 말이 빨라서 다행이야, 마인」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あの皇帝様も無茶苦茶を言うね～」"
translation = "「그 황제님도 무리한 말을 하시네~」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「キュリオス以外の戦力がどの程度で、どれくらい連れてくれば釣り合いが取れるのかなんて、専門家でもないと中々計算できないんですけど～？」"
translation = "「큐리오스 이외의 전력이 어느 정도고, 얼마나 데려와야 균형이 맞는지 같은 건, 전문가가 아니면 좀처럼 계산할 수 없는데요~?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それについては、おおよその目星が書かれた資料を渡されてる。ＤＩＳＣでデータを送るよ」"
translation = "「그것에 대해서는, 대략적인 기준이 적힌 자료를 받았어. DISC로 데이터를 보낼게」"

[[dialogue]]
speaker = "unk"
original = "煌嶺の作った資料を送信すると、マインは早速ＤＩＳＣの画面に目を走らせる。"
translation = "코레이가 만든 자료를 송신하자, 마인은 곧바로 DISC 화면에 눈을 돌린다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「準備が良すぎて怖いなぁ……え～っと、なになに？」"
translation = "「준비가 너무 좋아서 무섭네…… 어디 보자, 뭐지?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ふーむ、なるほどねぇ。いくつか外交カードも渡してくれてるし、キュリオスで合流するべき現地の専門家もちゃんと紹介してくれてるなぁ」"
translation = "「흐음, 그렇구나. 몇 가지 외교 카드도 넘겨줬고, 큐리오스에서 합류해야 할 현지 전문가도 제대로 소개해 줬네」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「これ、会長から相談を受けて即興で作った……わけじゃなさそ～」"
translation = "「이거, 회장님한테 상담받고 즉흥적으로 만든…… 게 아닌 것 같아~」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「普段から『いつ戦争を仕掛けようか？』って考えてないと、こんなに具体的な数字は出てこないぞ～♪」"
translation = "「평소에 『언제 전쟁을 걸까?』라고 생각하지 않으면, 이런 구체적인 숫자는 나오지 않는다구~♪」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「うん♪\u3000だいたいわかった。煌嶺さん、流石は大国をまとめてるトップってカンジだね」"
translation = "「응♪ 대충 알겠어. 코레이 씨, 역시 대국을 다스리는 톱이라는 느낌이네」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「本当なら、煌嶺自身にその交渉もお願いしたかったんだけどな」"
translation = "「원래라면, 코레이 본인에게 그 협상도 부탁하고 싶었지만 말이야」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あはは、それは無理無理♪」"
translation = "「아하하, 그건 무리 무리♪」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「性格の問題もあるけど、どちらかと言うと立場の違いかな？」"
translation = "「성격 문제도 있겠지만, 어느 쪽인가 하면 입장의 차이일까?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「キュリオスが言うのと、流星市国が言うのでは、内容が同じでも意味が変わっちゃうからね」"
translation = "「큐리오스가 말하는 것과, 유성시국이 말하는 것은, 내용이 같아도 의미가 달라져 버리니까」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それはまあ、確かに……」"
translation = "「그건 뭐, 확실히……」"

[[dialogue]]
speaker = "unk"
original = "キュリオスがリーダーシップを取って流星市国に魔界の軍勢を手配しようとなれば、逆にキュリオスが周辺諸国へ戦争を仕掛けるための布石と疑われてしまうかもしれない。"
translation = "큐리오스가 리더십을 발휘해 유성시국에 마계의 군세를 수배하려고 하면, 반대로 큐리오스가 주변국들에 전쟁을 걸기 위한 포석으로 의심받을지도 모른다."

[[dialogue]]
speaker = "unk"
original = "『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』に立ち向かわなければならないこのタイミングで、ヒト同士の争いになりかねない火種は可能な限り避けたい。"
translation = "『<ruby>XELOS<rt>제로스</rt></ruby>』에 맞서야 하는 이 타이밍에, 인간끼리의 다툼이 될 수 있는 불씨는 가능한 한 피하고 싶다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「それにしても、煌嶺さん的には結構な大盤振る舞いじゃない？\u3000よく手を貸してくれたね？」"
translation = "「그나저나, 코레이 씨 입장에서는 꽤 큰 인심 아니야? 잘도 힘을 빌려줬네?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……大変だったよ」"
translation = "「……힘들었어」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「ほう？\u3000魔界で妾が擁する戦力を貸しだせ、と？」"
translation = "「호오? 마계에서 소첩이 거느린 전력을 빌려달라, 고?」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「──ふむ。妾がキュリオスにて開花させたノヴァフォームを持つ星騎士は、確かにリーエンだけではない。我が国は精鋭揃いだが……」"
translation = "「──흠. 소첩이 큐리오스에서 개화시킨 노바 폼을 가진 성기사는, 확실히 리엔뿐만이 아니니라. 우리나라는 정예들이 모여 있다만……」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「しかし魔王よ？\u3000まさか<b>ただ</b>で貸してもらおうなどと思ってはおらぬな？」"
translation = "「허나 마왕이여? 설마 <b>공짜</b>로 빌리려 생각하는 것은 아니겠지?」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「大欲の女帝に、頭を垂れるだけで願いが叶うと思うなよ。交渉をしてみせろ。貴様は妾に、何を提示できる？」"
translation = "「대욕의 여제에게, 고개를 숙이는 것만으로 소원이 이루어질 거라 생각지 마라. 협상을 해 보거라. 그대는 소첩에게, 무엇을 제시할 수 있느냐?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……俺たちは近いうちにデネブに乗り込む。ルヴィネの傍には、<b>あれ</b>がいる」"
translation = "「……우리는 머지않아 데네브로 쳐들어간다. 루비네의 곁에는, <b>그것</b>이 있어」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「平行世界ベガを滅ぼした<ruby>厄災<rt>やくさい</rt></ruby>の化身──ディザスターハンドが」"
translation = "「평행세계 베가를 멸망시킨 <ruby>액재<rt>재앙</rt></ruby>의 화신── 디재스터 핸드가」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「……ほう？」"
translation = "「……호오?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あなたは強く、美しく、<ruby>烈<rt>はげ</rt></ruby>しい者を愛すると聞いた。あの『手』が美しいかはわからない。けれど……」"
translation = "「당신은 강하고, 아름답고, 격렬한 자를 사랑한다고 들었어. 그 『손』이 아름다운지는 모르겠지만. 그래도……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「途方もなく強く、触れるものすべてを抹殺する、破壊の権化には違いない」"
translation = "「터무니없이 강하고, 닿는 모든 것을 말살하는, 파괴의 권화임에는 틀림없지」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「デネブへ移動する際、転送装置の移動メンバーにあなたの席を空けておく。ディザスターハンドとまみえる機会──それが俺の約束できる報酬だ」"
translation = "「데네브로 이동할 때, 전송 장치의 이동 멤버에 당신의 자리를 비워 두겠어. 디재스터 핸드와 마주할 기회── 그것이 내가 약속할 수 있는 보상이다」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「……妾を死地へ誘う。それが報酬だと？」"
translation = "「……소첩을 사지로 유혹하다니. 그것이 보상이라느니라?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「その通りだ。世界を滅ぼすほどの力を持つ、厄災の化身と出会う機会は、もう二度とないだろう」"
translation = "「그렇다. 세계를 멸망시킬 정도의 힘을 가진, 재앙의 화신과 만날 기회는 두 번 다시 없겠지」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「自らのものにするか、滅してしまうか──それはあなたの自由だ。けれど、そもそも会えないとお話にならない。違うか？」"
translation = "「자신의 것으로 만들지, 멸해 버릴지── 그것은 당신의 자유다. 하지만 애초에 만나지 못하면 이야기가 안 되지. 안 그래?」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「その交渉は意味を持たぬな。あの<ruby>厄災<rt>やくさい</rt></ruby>との決戦に、妾の助力がなくてどうする？\u3000少しでも戦力が欲しいと願い出ている身のくせに、笑わせる」"
translation = "「그 협상은 의미가 없도다. 저 <ruby>액재<rt>재앙</rt></ruby>와의 결전에 소첩의 조력 없이 어찌하겠느냐? 조금이라도 전력을 원하는 처지 주제에 웃기는구나」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あなたが国の戦力を貸せないというのなら、俺はデネブへあなたを連れて行かない」"
translation = "「당신이 나라의 전력을 빌려줄 수 없다고 한다면, 나는 데네브에 당신을 데려가지 않겠어」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「平行世界に干渉する能力と、次元転送装置の所持は、俺が持ちうる最大の手札だ。絶対に譲る気はない」"
translation = "「평행세계에 간섭하는 능력과 차원 전송 장치의 소지는 내가 가진 최대의 패다. 절대로 양보할 생각은 없어」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「交渉が決裂した場合……俺たちが世界を救う間、あなたはアルタイルで留守番だ」"
translation = "「협상이 결렬될 경우…… 우리가 세계를 구하는 동안, 당신은 알타이르에서 집이나 보고 있어라」"

[[dialogue]]
speaker = "unk"
original = "ぞわり、と空気が灼ける気配がした。"
translation = "소름이 돋으며 공기가 타오르는 기척이 느껴졌다."

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「殺されて奪われる可能性を考えぬとは、つくづく『甘い』男ではないか？」"
translation = "「살해당하고 빼앗길 가능성을 생각지 않다니, 참으로 『무른』 남자가 아니더냐?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あなたは俺を殺さない。なぜなら魔王因子ではない、ラクシス固有の力──平行世界への干渉能力を、あなたは『欲しい』と思っているからだ」"
translation = "「당신은 나를 죽이지 않아. 왜냐하면 마왕 인자가 아닌, 락시스 고유의 힘── 평행세계로의 간섭 능력을 당신은 『원하고』 있으니까」"

[[dialogue]]
speaker = "unk"
original = "５秒、１０秒……いつ業火の星術が飛んで来てもおかしくない殺気を放ちながら、お互いに見つめ合う。"
translation = "5초, 10초…… 언제 업화의 성술이 날아와도 이상하지 않을 살기를 내뿜으며, 서로를 응시한다."

[[dialogue]]
speaker = "unk"
original = "しかし──それはやがて収まり、煌嶺がくつくつと笑いだす。"
translation = "하지만── 그것은 이내 가라앉고, 코레이가 큭큭거리며 웃기 시작한다."

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「……くっくっく。よかろう。及第点をくれてやる。慣れぬ交渉に身を投じたいじらしさに免じて、その話乗ってやろうではないか」"
translation = "「……큭큭큭. 좋다. 낙제점은 면하게 해주마. 익숙지 않은 협상에 몸을 던진 가상함을 봐서 그 제안에 응해주도록 하지 않겠느냐」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「何せ貴様は３０００年前の死にぞこないだ。ご老体は労わらねばな？」"
translation = "「어차피 귀공은 3000년 전의 죽다 만 몸이니라. 노구는 대접해 주어야겠지?」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「だが１つ、妾からも『交渉』を持ちかけよう」"
translation = "「다만 한 가지, 소첩도 『협상』을 제안하마」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「キュリオスの周辺諸国からも、妾が提示する数の戦力を連れてこい」"
translation = "「큐리오스의 주변국들로부터도 소첩이 제시하는 수만큼의 전력을 데려오너라」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「なんだって……？」"
translation = "「뭐라고……?」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「この世界の創造主に喧嘩をしかけるのであろう？\u3000『キュリオスだけでは足りない』のではないか？」"
translation = "「이 세계의 창조주에게 싸움을 걸려는 것이지? 『큐리오스만으로는 부족하다』고 생각지 않느냐?」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「ああ、そうだとも。キュリオスは確かに精鋭揃いではあるが、それだけではまったく足りぬ！」"
translation = "「아아, 그렇고말고. 큐리오스는 확실히 정예들이 모여 있다만, 그것만으로는 전혀 부족하니라!」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「『戦争』は愚か者のすることだぞ、魔王よ♪\u3000戦いは同レベルの者同士でしか起こらぬ」"
translation = "「『전쟁』은 어리석은 자들이나 하는 것이니라, 마왕이여♪ 싸움은 수준이 비슷한 자들끼리나 일어나는 법」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「であればこそ、するべきは『蹂躙』と『略奪』だ。戦争なぞ、お互いの民や資源を浪費させる、最も愚かな行為と言えよう」"
translation = "「그렇기에 해야 할 것은 『유린』과 『약탈』이도다. 전쟁 따위는 서로의 백성과 자원을 낭비시키는 가장 어리석은 행위라 할 수 있지」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「他者を圧倒し、支配する。戦わずして勝つことが、この世で最も美しい勝利だ」"
translation = "「타자를 압도하고 지배한다. 싸우지 않고 이기는 것이 이 세상에서 가장 아름다운 승리이니라」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「相手が神であれ、その道理は変わらぬ。何も<ruby>喪<rt>うしな</rt></ruby>わず、何もかもを奪い、この世がすでに創造主ごときの器に収まらぬことを証明するべきだ」"
translation = "「상대가 신이라 할지라도 그 도리는 변하지 않도다. 아무것도 잃어버리지 않고 모든 것을 빼앗아, 이 세상이 이미 창조주 따위의 그릇에 담기지 않음을 증명해야 하느니라」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「違うか？\u3000魔王ラクシス」"
translation = "「안 그러느냐? 마왕 락시스」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "大欲の女帝が口にする理想に、俺は圧倒されていた。"
translation = "대욕의 여제가 입에 담는 이상에 나는 압도당하고 있었다."

[[dialogue]]
speaker = "unk"
original = "だが、何も間違っていない。何も喪わず、何もかもを奪う。この戦いはそうあるべきだ。"
translation = "하지만 틀린 말은 하나도 없다. 아무것도 잃지 않고 모든 것을 빼앗는다. 이 싸움은 그래야만 한다."

[[dialogue]]
speaker = "unk"
original = "……もちろん、煌嶺には今口にした理想以外の打算や計算もあるだろうが、それを指摘することすら今は野暮に思えた。"
translation = "……물론 코레이에게는 지금 말한 이상 이외의 타산이나 계산도 있겠지만, 그것을 지적하는 것조차 지금은 야속하게 느껴졌다."

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「そうと決まれば<ruby>文<rt>ふみ</rt></ruby>をしたためてやる。貴様たちがどのように足掻くのか、面白くなってきたぞ」"
translation = "「그렇게 정해졌으면 글을 써 주마. 귀공들이 어떻게 발버둥 칠지 흥미로워지는구나」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「キュリオスは貴様らが起こす程度の低い『戦争』に参加するつもりはない」"
translation = "「큐리오스는 귀공들이 일으키는 수준 낮은 『전쟁』에 참가할 생각은 없느니라」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「神を相手にしてなお、『蹂躙』と『略奪』が行えるだけの準備を整えてみせよ。そうなった時に初めて、キュリオスの力を貸してやろう」"
translation = "「신을 상대로 하고도 『유린』과 『약탈』을 행할 수 있을 만큼의 준비를 갖추어 보거라. 그렇게 되었을 때 비로소 큐리오스의 힘을 빌려주마」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あはは♪\u3000会長、災難だったね～」"
translation = "「아하하♪ 회장, 수난이었네~」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「正直、生きた心地はしなかったよ……」"
translation = "「솔직히 살 떨리는 기분이었어……」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ま～、でも？\u3000煌嶺さんの言ってることもわからないでもないかな～」"
translation = "「뭐~ 그래도? 코레이 씨가 하는 말도 이해가 안 가는 건 아니려나~」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「戦力が拮抗した争いって、泥沼になっちゃうからね～。戦うなら圧勝するべし！\u3000ってのはその通りだと思うよ」"
translation = "「전력이 팽팽한 싸움은 진흙탕 싸움이 되어버리니까 말이야~. 싸울 거라면 압승할 것! 이라는 건 맞는 말이라고 봐」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺としても、その理屈は理解できる」"
translation = "「나로서도 그 논리는 이해할 수 있어」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だからマイン、すまないが魔界での交渉をお願いしたい」"
translation = "「그러니까 마인, 미안하지만 마계에서의 협상을 부탁하고 싶어」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「いや～、これ結構しんどいよ？\u3000キュリオスだけならともかく、複数の国の、話したこともない人たちから軍事力を借りなきゃいけないんだから」"
translation = "「이야~ 이거 꽤 힘들다구? 큐리오스뿐만 아니라 여러 나라의, 말해본 적도 없는 사람들에게서 군사력을 빌려야 하니까」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「しかもキュリオスのノヴァフォーム持ちを全員連れてくる前提って書いてあるんですけど？」"
translation = "「게다가 큐리오스의 노바 폼 보유자를 전원 데려오는 전제라고 써져 있는데?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「これに匹敵する周辺諸国の戦力全部盛りって……今の流星市国が軽く７回は滅ぼせるくらいの力があるからね？」"
translation = "「여기에 필적하는 주변국들의 전력을 전부 모으면…… 지금의 유성시국이 가볍게 7번은 멸망하고도 남을 힘이라니까?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「無理を言っている自覚はある……ただ、こんな大がかりな交渉、マイン以外には頼めない」"
translation = "「무리한 부탁이라는 자각은 있어…… 다만 이런 대규모 협상은 마인 말고는 부탁할 사람이 없어」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「もう１回言って？」"
translation = "「한 번 더 말해줄래?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「マイン以外に頼める仕事じゃない。マインだけが頼りだ。お願いします」"
translation = "「마인 말고는 맡길 수 없는 일이야. 마인만이 유일한 희망이야. 부탁해」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「今、何でもするって言った？」"
translation = "「지금 뭐든지 하겠다고 했어?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「何でもします。マインだけが最後の希望です」"
translation = "「뭐든지 하겠습니다. 마인만이 마지막 희망입니다」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「まぁ～～～～、しょ～がないなぁ♪\u3000貸し１だからね、会長？」"
translation = "「뭐어~~~~ 어쩔 수 없네♪ 빚 하나 생긴 거다, 회장?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「本当にありがとう！\u3000よろしく頼むよ」"
translation = "「정말 고마워! 잘 부탁해」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あ～、あ～、キラキラした笑顔見せちゃって。まったくこの人たらしめ」"
translation = "「아~ 아~ 반짝반짝한 미소나 보여주고. 정말이지 이 바람둥이 같으니라고」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ただ、これから魔界へ出張ってことになるなら、お披露目はもうちょっと後になりそうかな？」"
translation = "「다만 이제부터 마계로 출장을 가게 된다면, 피로연은 조금 더 뒤가 되려나?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……お披露目？」"
translation = "「……피로연?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「来たる決戦に向けて、準備を進めてるのは星徒会だけじゃないってこと」"
translation = "「다가올 결전을 향해 준비를 진행하고 있는 건 성도회뿐만이 아니라는 소리」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「公安委員会としても、九浄家としても、最終決戦に向けて準備していたことが形になりそうなんだよ」"
translation = "「공안위원회로서도, 쿠죠 가문으로서도 최종 결전을 향해 준비하던 것들이 형태를 갖춰가고 있거든」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ヘレナちゃんが絡んでるってことは、まさか……」"
translation = "「헬레나짱이 얽혀 있다는 건 설마……」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「人工戦闘服の数もかなり増えてきたし、コア技術はセナリィのおかげでデータも集まってきたみたいだからね」"
translation = "「인공 전투복의 수도 꽤 늘어났고, 핵심 기술은 세나리 덕분에 데이터도 모인 모양이니까」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「もうすぐ見せられると思うよ、人工戦闘服の到達点ってやつ♪」"
translation = "「곧 보여줄 수 있을 거야, 인공 전투복의 도달점이라는 녀석을♪」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……！！」"
translation = "「……!!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「そんじゃま、私は急いで魔界へ向かうとするよ。交渉の時間は足りないくらいだしね」"
translation = "「그럼 뭐, 나는 서둘러 마계로 향하도록 할게. 협상할 시간도 부족할 정도니까 말이야」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「頑張ってくるから、吉報を待っててよね～♪」"
translation = "「열심히 하고 올 테니까 길보를 기다려 달라구~♪」"

[[dialogue]]
speaker = "unk"
original = "マインも煌嶺も、『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』との戦いに『圧勝』があり得る、という立場を決して崩さなかった。"
translation = "마인도 코레이도 『<ruby>XELOS<rt>제로스</rt></ruby>』와의 싸움에서 『압승』이 가능하다는 입장을 결코 굽히지 않았다."

[[dialogue]]
speaker = "unk"
original = "『神』と呼ばれる存在に、俺たち物質世界に生きる者の力が届きうるのか。そもそも俺たちは『蹂躙される側』ではないのか？"
translation = "『신』이라 불리는 존재에게 우리 물질세계에 사는 자들의 힘이 닿을 수 있을까. 애초에 우리는 『유린당하는 쪽』이 아닐까?"

[[dialogue]]
speaker = "unk"
original = "その疑念がぬぐえないことくらい、彼女たちは十分理解している。"
translation = "그 의구심이 씻기지 않는다는 것 정도는 그녀들도 충분히 이해하고 있다."

[[dialogue]]
speaker = "unk"
original = "それでも、誰も喪わない可能性にかけて、やれることをすべてやらなければ──"
translation = "그럼에도 아무도 잃지 않을 가능성에 걸고 할 수 있는 모든 것을 해야만──"

[[dialogue]]
speaker = "unk"
original = "そうして日が暮れた頃──俺とヴィーナスだけになった星徒会室へ、マトイとグレイスがやってきた。"
translation = "그렇게 해가 저물 무렵── 나와 비너스만 남은 성도회실에 마토이와 그레이스가 찾아왔다."

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「お邪魔します！」"
translation = "「실례하겠습니다!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「さ、最後にうちの星徒会も見てみたいって……ごめんヴィーナス。今日はもう帰っていい……？」"
translation = "「마, 마지막으로 우리 성도회도 보고 싶다고 해서…… 미안 비너스. 오늘은 이제 퇴근해도 될까……?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「マトイがボロボロだわ！？」"
translation = "「마토이가 너덜너덜하잖아!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あとは俺とヴィーナスが引き継ぐよ。本当にお疲れ様……」"
translation = "「나머지는 나와 비너스가 인계받을게. 정말 고생 많았어……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ありがとう……それじゃ、帰るね～……」"
translation = "「고마워…… 그럼 나 갈게~……」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「ふむふむ……ここが新星学園の星徒会室なんですね！」"
translation = "「흠흠…… 여기가 신성학원의 성도회실이군요!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「グレイス、アルタイルの世界はどうだった？」"
translation = "「그레이스, 알타이르의 세계는 어땠어?」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「とても<b>懐かしくて</b>、面白いです！\u3000今日もたくさん遊びに行きました！」"
translation = "「무척 <b>그리워서</b> 재미있어요! 오늘도 많이 놀러 다녔답니다!」"

[[dialogue]]
speaker = "unk"
original = "新鮮ではなく、懐かしい──それもそうか。彼女にとっては、かつての故郷を訪れているのだから。"
translation = "신선한 게 아니라 그립다── 그럴 만도 하다. 그녀에게 있어서는 예전의 고향을 방문하고 있는 셈이니까."

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「それにしても……う～ん。ヴィーナスさんって本当に似ていますね！」"
translation = "「그나저나…… 으음. 비너스 씨는 정말 닮았네요!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「似てるって誰に？」"
translation = "「누굴 닮았다는 거야?」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「デネブにいた九浄テルルさんにです！\u3000本当に、双子みたいにそっくりです」"
translation = "「데네브에 있던 쿠죠 테루루 씨 말이에요! 정말 쌍둥이처럼 똑 닮았어요」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ママに！？」"
translation = "「엄마를!?」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「まま？」"
translation = "「엄마?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「デネブの俺と会ったことがあるって言ってたけど……グレイスは他の星徒会メンバーにも会ったことがあるのか？」"
translation = "「데네브의 나와 만난 적이 있다고 했지…… 그레이스는 다른 성도회 멤버들도 만난 적이 있어?」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「はい。マトイさんも、サーシャさんも、アナさんも……みなさんとお話したことがありますよ」"
translation = "「네. 마토이 씨도, 사샤 씨도, 아나 씨도…… 여러분과 이야기해 본 적이 있어요」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「私にとっては、もう１０年以上も前のことですけど……」"
translation = "「저에게는 벌써 10년도 더 된 일이지만요……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「昔の話、聞きたいわ！\u3000ママのこと、たくさん教えて！」"
translation = "「옛날이야기 듣고 싶어! 엄마에 대해서 많이 알려줘!」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「えっと～……あの、『まま』って一体どういうことなんです……？」"
translation = "「엣토~…… 저기, 『엄마』라니 대체 무슨 소리인가요……?」"

[[dialogue]]
speaker = "unk"
original = "首をかしげるグレイスだったが、ヴィーナスの懇願に押し切られて、１０年以上前のことを話し始めるのだった──"
translation = "고개를 갸우뚱하는 그레이스였지만, 비너스의 간청에 못 이겨 10년도 더 된 일들을 이야기하기 시작했다──"

