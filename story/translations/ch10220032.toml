[[dialogue]]
speaker = "unk"
original = "第２話,傲慢の先生,P"
translation = "제2화, 오만의 선생님"

[[dialogue]]
speaker = "unk"
original = "モネが演劇部の部室にいる、と聞いてやってきたのだが──"
translation = "모네가 연극부 부실에 있다는 말을 듣고 찾아왔는데──"

[[dialogue]]
speaker = "ロクサーナ"
original = "「かーくーすーなー！\u3000立派なブツがあるんだから堂々としていろ！」"
translation = "「숨-기-지-마! 훌륭한 물건이 있으니까 당당하게 있어라!」"

[[dialogue]]
speaker = "モネ"
original = "「は、はい！？」"
translation = "「하, 네!?」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「まず両腕を上げて、手首を重ねろ。それから腰をひねって……」"
translation = "「먼저 양팔을 올리고, 손목을 겹쳐라. 그러고 나서 허리를 비틀고……」"

[[dialogue]]
speaker = "モネ"
original = "「こ、こうでしょうか……？」"
translation = "「이, 이렇게인가요……?」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「そうだ、悪くないぞ。よし次は……」"
translation = "「그렇다, 나쁘지 않군. 좋아 다음은……」"

[[dialogue]]
speaker = "unk"
original = "何をしているんですか？"
translation = "뭐 하고 있는 거야?"

[[dialogue]]
speaker = "モネ"
original = "「か、会長！？」"
translation = "「회, 회장님!?」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「見て分からんか？\u3000なら教えてやろう。これはセクシーポーズの練習だ」"
translation = "「보고도 모르겠나? 그럼 가르쳐주지. 이것은 섹시 포즈 연습이다」"

[[dialogue]]
speaker = "モネ"
original = "「えぇっ！！\u3000ロクサーナ先輩、傲慢さを体現したポーズだって言ったじゃないですかぁ！？」"
translation = "「에엣!! 록사나 선배, 오만을 체현한 포즈라고 하셨잖아요!?」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「己の肉体がいかに魅力的か、周囲に見せびらかすポーズだぞ。これが傲慢でなくて何なのだ」"
translation = "「자신의 육체가 얼마나 매력적인지, 주위에 뽐내는 포즈다. 이것이 오만이 아니고 무엇이겠느냐」"

[[dialogue]]
speaker = "モネ"
original = "「えええ～～～っ！？\u3000騙されたーーーっ！？」"
translation = "「에에에～～앗!? 속았다ーー앗!?」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「くっくっく。お前の恋人は実に面白いな、会長」"
translation = "「큭큭큭. 네 애인은 참 재미있구나, 회장」"

[[dialogue]]
speaker = "モネ"
original = "「先輩、私たちがお付き合いしてるの知ってたんですか！？」"
translation = "「선배, 저희가 사귀는 거 알고 계셨나요!?」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「寮の連中が噂していたぞ？」"
translation = "「기숙사 녀석들이 소문내고 있더군?」"

[[dialogue]]
speaker = "モネ"
original = "「そんな～！？」"
translation = "「에에~!?」"

[[dialogue]]
speaker = "unk"
original = "モネはなんで演劇部に？"
translation = "모네는 어째서 연극부에?"

[[dialogue]]
speaker = "モネ"
original = "「先日の事件で、私は『傲慢』の魔将に選ばれ、魔本の力でパワーアップしました」"
translation = "「지난번 사건으로, 저는 『오만』의 마장으로 선택되어 마도서의 힘으로 파워 업 했습니다」"

[[dialogue]]
speaker = "モネ"
original = "「その力は幾千幾万の時を超えて収集された、魔族の怨念。とても１人の星騎士では扱いきれないほどの大きな力です」"
translation = "「그 힘은 수천수만 년의 시간을 넘어 수집된 마족의 원념. 도저히 한 명의 성기사로서는 감당할 수 없을 정도의 커다란 힘이에요」"

[[dialogue]]
speaker = "モネ"
original = "「だから思うんです。私はまだ『傲慢』の力を使いこなせていないって」"
translation = "「그래서 생각해요. 저는 아직 『오만』의 힘을 제대로 다루지 못하고 있다고」"

[[dialogue]]
speaker = "モネ"
original = "「そこで、傲慢の何たるかを会得するため、私の知る中で最も傲慢という言葉が似合うロクサーナ先輩に弟子入りしたんです！」"
translation = "「그래서 오만이 무엇인지 터득하기 위해, 제가 아는 사람 중 가장 오만이라는 단어가 잘 어울리는 록사나 선배님께 입문했습니다!」"

[[dialogue]]
speaker = "unk"
original = "（本人の前で傲慢とか言っちゃうんだ！？）"
translation = "(본인 앞에서 오만하다고 말해버리는 거야!?)"

[[dialogue]]
speaker = "ロクサーナ"
original = "「わっはっは！\u3000お前の恋人はほんっとうに面白いな！」"
translation = "「왓하하! 네 연인은 정~말로 재미있구나!」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「さて。こうしてお迎えが来たから言ってやるが、私がお前に教えることなど何もない」"
translation = "「자. 이렇게 마중이 왔으니 말해두겠는데, 내가 네게 가르칠 건 아무것도 없다」"

[[dialogue]]
speaker = "モネ"
original = "「えぇっ！？」"
translation = "「에엣!?」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「まぁ、聞け。お前も作家の端くれだろう？\u3000脚本……ではないな。小説か？」"
translation = "「뭐, 들어라. 너도 작가 지망생이지? 각본……은 아니군. 소설인가?」"

[[dialogue]]
speaker = "モネ"
original = "「私が小説を書いていること、わかるんですか？」"
translation = "「제가 소설을 쓰고 있다는 걸 알고 계신 건가요?」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「ああ。お前が私を見ている表情に書いてあった。『これは使える』とな。お前の眼は物書きの眼だ」"
translation = "「그래. 네가 나를 보는 표정에 써 있었다. 『이건 써먹을 수 있겠어』라고 말이지. 네 눈은 글쟁이의 눈이다」"

[[dialogue]]
speaker = "モネ"
original = "「えぇっ、そんな顔してましたか？\u3000失礼しましたっ」"
translation = "「에엣, 그런 얼굴을 하고 있었나요? 실례했습니다!」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「構わん。私たちにとって神羅万象は創造の糧。人、物、動物はもちろん、事象でさえも、だ」"
translation = "「상관없다. 우리에게 있어 삼라만상은 창조의 거름. 사람, 물건, 동물은 물론, 사상조차도 말이지」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「ときには目を背けたくなるような凄惨な事件すら、物語に昇華される。例えば、戦争、災害、あるいは大事故。枚挙に暇はない」"
translation = "「때로는 눈을 돌리고 싶어지는 처참한 사건조차 이야기로 승화된다. 예를 들어 전쟁, 재해, 혹은 대사고. 매거하기에 여념이 없지」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「あるいは作家というものは、人の不幸にたかるウジ虫なのかもしれん。──どうだ、醜いだろう？」"
translation = "「어쩌면 작가라는 존재는 타인의 불행에 꼬이는 구더기일지도 모른다. ──어떠냐, 추악하지?」"

[[dialogue]]
speaker = "モネ"
original = "「それは…………」"
translation = "「그건…………」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「では、お前のしていることは不謹慎だ、不道徳だと言われたら、筆を折るか？」"
translation = "「그럼, 네가 하는 짓이 몰상식하다, 부도덕하다는 말을 들으면 붓을 꺾을 건가?」"

[[dialogue]]
speaker = "モネ"
original = "「……いいえ、あり得ません。私はそれでも書き続けます。だって、そうせずにはいられないから」"
translation = "「……아니요, 그럴 리 없어요. 저는 그래도 계속 쓸 거예요. 왜냐하면, 그러지 않고서는 못 배기니까요」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「ああ、その通りだ。そも創造とは神の領分。それを侵しているのだ。これを傲慢と言わずして何が傲慢か。作家はみな、傲慢から生まれてくると言ってもいい」"
translation = "「그래, 바로 그거다. 애초에 창조란 신의 영역. 그것을 침범하고 있는 것이다. 이것을 오만이라 하지 않고 무엇을 오만이라 하겠나. 작가는 모두 오만에서 태어난다고 해도 과언이 아니지」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「安心しろ、紙屋敷モネ。お前はすでに傲慢だ。……ふ、喋りすぎたな、喉が渇いた。コーヒーを淹れてくれ」"
translation = "「안심해라, 카미야시키 모네. 너는 이미 오만하다. ……후, 너무 떠들었군, 목이 마르다. 커피 좀 타다오」"

[[dialogue]]
speaker = "モネ"
original = "「はい。……悪魔のように黒く、地獄のように熱いヤツ、ですね」"
translation = "「네. ……악마처럼 검고, 지옥처럼 뜨거운 녀석, 이죠?」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「ああ、よく分かってるじゃないか」"
translation = "「그래, 아주 잘 알고 있구나」"

[[dialogue]]
speaker = "unk"
original = "ところで、なんでずっと水着なの？"
translation = "그런데, 왜 계속 수영복 차림이야?"

[[dialogue]]
speaker = "モネ"
original = "「ひゃっ！？\u3000水着なの忘れてました！」"
translation = "「히얏!? 수영복인 걸 잊고 있었어요!」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「言うのが早いぞ、会長。いつまで水着のままでいるか試していたのに」"
translation = "「말하는 게 빠르군, 회장. 언제까지 수영복 차림으로 있을지 시험해보고 있었는데」"

[[dialogue]]
speaker = "モネ"
original = "「試さないでください！」"
translation = "「시험하지 마세요!」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「会長も想像してみろ。モネが水着で小説を執筆している姿を。ペンを走らせるたびに揺れる果実……どうだ、そそるだろう？」"
translation = "「회장도 상상해 봐라. 모네가 수영복 차림으로 소설을 집필하는 모습을. 펜을 놀릴 때마다 흔들리는 과실…… 어떠냐, 끌리지?」"

[[dialogue]]
speaker = "unk"
original = "……確かに"
translation = "……확실히"

[[dialogue]]
speaker = "モネ"
original = "「もうっ！\u3000会長もなに言ってるんですか！」"
translation = "「정말! 회장님도 무슨 소리를 하시는 거예요!」"

[[dialogue]]
speaker = "モネ"
original = "「ぷっく～」"
translation = "「뿌우~」"

[[dialogue]]
speaker = "unk"
original = "頬を膨らませて拗ねるモネ。申し訳ないけれど、そんなところも可愛いのだった。"
translation = "볼을 부풀리며 삐지는 모네. 미안하지만 그런 모습도 귀여웠다."

