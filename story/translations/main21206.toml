[[dialogue]]
speaker = "unk"
original = "第６話,ニュクス流星群,B"
translation = "제6화, 닉스 유성우"

[[dialogue]]
speaker = "unk"
original = "香堂チナは流星市国で生まれ、星騎士として活躍していた両親の元に生まれた。"
translation = "코도 치나는 유성시국에서 태어나, 성기사로서 활약하던 부모님 밑에서 자랐다."

[[dialogue]]
speaker = "unk"
original = "そんな出自だからだろう、いずれ自分も星力を発現し、両親のように人々のために戦うのだろうと、未来に憧れと期待を持つ少女として育った。"
translation = "그런 태생 때문일까, 언젠가 자신도 성력을 발현하여 부모님처럼 사람들을 위해 싸울 것이라고, 미래에 대한 동경과 기대를 가진 소녀로 자랐다."

[[dialogue]]
speaker = "unk"
original = "父親は成年を迎えてからも、星力の衰えが遅い珍しい体質で、毎日アステラ対処に出撃をしていた。"
translation = "아버지는 성인이 된 후에도 성력의 쇠퇴가 늦은 희귀한 체질로, 매일 아스테라 대처를 위해 출격했다."

[[dialogue]]
speaker = "unk"
original = "母親は星力研究機関『ヘキサグラム』で日夜、星力研究を行う敏腕の研究者──そのためチナは、１人さみしい夕食を取ることも多かった。"
translation = "어머니는 성력 연구 기관 『헥사그램』에서 밤낮으로 성력 연구를 수행하는 유능한 연구자── 그 때문에 치나는 혼자 외로운 저녁 식사를 하는 일도 많았다."

[[dialogue]]
speaker = "unk"
original = "しかし世界を守るために働く両親は、彼女にとって強い憧れであり、誇りでもあった。"
translation = "하지만 세계를 지키기 위해 일하는 부모님은 그녀에게 있어 강한 동경이자 자랑이기도 했다."

[[dialogue]]
speaker = "unk"
original = "敬愛する両親がたゆまぬ努力を続けている──だから世界が守られないだなんて、あり得ない。"
translation = "경애하는 부모님이 끊임없이 노력을 계속하고 있다── 그러니 세계가 지켜지지 않을 리가 없다."

[[dialogue]]
speaker = "unk"
original = "世界が破滅の一歩前まで進んでしまうだなんて、当時の香堂チナは少しも考えていなかった。"
translation = "세계가 파멸의 일보 직전까지 나아갈 것이라고는 당시의 코도 치나는 조금도 생각하지 못했다."

[[dialogue]]
speaker = "unk"
original = "そんな子供の甘い考えは、すぐに<ruby>覆<rt>くつがえ</rt></ruby>されることとなった。"
translation = "그런 아이의 안일한 생각은 곧 뒤집히게 되었다."

[[dialogue]]
speaker = "unk"
original = "ある日、天界の聖庭園が陥落したという速報が人間界に広がった。"
translation = "어느 날, 천계의 성정원이 함락되었다는 속보가 인간계에 퍼졌다."

[[dialogue]]
speaker = "unk"
original = "さらに信じられないことに、それを成したのはたった１人。仮面を被った謎の女が、１人で聖庭園を破壊したと。"
translation = "더욱 믿기 힘든 것은 그것을 해낸 것이 단 한 명. 가면을 쓴 수수께끼의 여자가 혼자서 성정원을 파괴했다는 것이었다."

[[dialogue]]
speaker = "unk"
original = "本当のことなのか。デマではないのか──人々は、その悲報が誤りであることを祈った。"
translation = "사실인 걸까. 유언비어는 아닐까── 사람들은 그 비보가 잘못된 것이기를 빌었다."

[[dialogue]]
speaker = "unk"
original = "だが時を待たずに、今度は魔界の頽廃都市キュリオスが、跡形もなく消滅したという報せが駆け巡った。"
translation = "하지만 머지않아 이번에는 마계의 퇴폐 도시 큐리오스가 흔적도 없이 소멸했다는 소식이 전해졌다."

[[dialogue]]
speaker = "unk"
original = "当時、魔界防衛のために人間界からは複数の星騎士が派遣されていたが、彼らは魔界に渡った後に消息を絶った──全員が殺害されたのだ。"
translation = "당시 마계 방위를 위해 인간계에서 여러 성기사가 파견되어 있었으나, 그들은 마계로 건너간 뒤 소식이 끊겼다── 전원이 살해당한 것이다."

[[dialogue]]
speaker = "unk"
original = "そして……『仮面の女』は、人間界へとその姿を現した。"
translation = "그리고…… 『가면의 여자』는 인간계에 그 모습을 드러냈다."

[[dialogue]]
speaker = "unk"
original = "人間界に、自らの頭上に──彗星の雨が降り注いだ。"
translation = "인간계에, 자신의 머리 위로── 혜성의 비가 쏟아졌다."

[[dialogue]]
speaker = "unk"
original = "教科書で見た。３０００年前に起きた、世界の滅亡が間近であることを報せるセレーネ流星群……それに比するものが、現れてしまった。"
translation = "교과서에서 보았다. 3000년 전에 일어난, 세계의 멸망이 머지않았음을 알리는 셀레네 유성우…… 그것에 비견되는 것이 나타나 버린 것이다."

[[dialogue]]
speaker_original = "流星市国民"
speaker_translation = "유성시 국민"
original = "「う、うぁぁああぁぁあああぁあっ──！！」"
translation = "「으, 으아아아아아아아앗──!!」"

[[dialogue]]
speaker_original = "流星市国民"
speaker_translation = "유성시 국민"
original = "「逃げろ！\u3000逃げろぉおおおっ！」"
translation = "「도망쳐! 도망쳐어어엇!」"

[[dialogue]]
speaker_original = "流星市国民"
speaker_translation = "유성시 국민"
original = "「『仮面の女』だ！！\u3000殺されるっ！\u3000みんな殺されるっ──！！」"
translation = "「『가면의 여자』다!! 죽을 거야! 다들 죽을 거라고──!!」"

[[dialogue]]
speaker = "unk"
original = "チナは今までも、モンスターに襲われそうになったことはあった。けれどそのたび、星騎士が救ってくれていた。"
translation = "치나는 지금까지도 몬스터에게 습격당할 뻔한 적은 있었다. 하지만 그때마다 성기사가 구해 주었다."

[[dialogue]]
speaker = "unk"
original = "星の輝きに守られた騎士たちが敵わない相手なんて、いなかったのに。"
translation = "별의 광채에 보호받는 기사들이 당해내지 못할 상대 따위는 없었는데."

[[dialogue]]
speaker = "unk"
original = "──チナは懸命に逃げた。"
translation = "──치나는 필사적으로 도망쳤다."

[[dialogue]]
speaker = "unk"
original = "何かあった時はここに行け、と両親から指示されていた記憶を頼りに、流星市国が用意していたシェルターの１つに飛び込んだ。"
translation = "무슨 일이 생기면 이곳으로 가라는 부모님의 지시를 기억해 내어, 유성시국이 마련해 둔 쉘터 중 하나로 뛰어들었다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「おとうさん……おかあさん……！」"
translation = "「아빠…… 엄마……!」"

[[dialogue]]
speaker = "unk"
original = "暗闇の中、チナはＤＩＳＣを握りしめた。画面に映る両親と自分の、３人の記念写真をぎゅうっと強く握って、祈った。"
translation = "어둠 속에서 치나는 DISC를 움켜쥐었다. 화면에 비치는 부모님과 자신의 세 사람 기념사진을 꽉 움켜쥐고 기도했다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「あ──」"
translation = "「아──」"

[[dialogue]]
speaker = "unk"
original = "持っていたＤＩＳＣに両親からメッセージが入った。"
translation = "가지고 있던 DISC에 부모님으로부터 메시지가 들어왔다."

[[dialogue]]
speaker = "unk"
original = "『決してそこから出るな』と父。"
translation = "『결코 거기서 나오지 마라』는 아버지."

[[dialogue]]
speaker = "unk"
original = "『迎えに行くから待っていなさい』と母。"
translation = "『데리러 갈 테니 기다리고 있으렴』이라는 어머니."

[[dialogue]]
speaker = "unk"
original = "娘の身を案じるにはあまりに淡白すぎる文章に、チナはどれほど状況が悪いのかを理解した。"
translation = "딸의 신변을 걱정하기에는 너무나도 담백한 문장에, 치나는 상황이 얼마나 나쁜지 이해했다."

[[dialogue]]
speaker = "unk"
original = "何度メッセージを送っても、それ以降、両親からの返信はなかった。"
translation = "몇 번이나 메시지를 보내도 그 이후로 부모님으로부터의 답장은 없었다."

[[dialogue]]
speaker = "unk"
original = "………………"
translation = "………………"

[[dialogue]]
speaker = "unk"
original = "…………"
translation = "…………"

[[dialogue]]
speaker = "unk"
original = "……"
translation = "……"

[[dialogue]]
speaker = "unk"
original = "それから幾日かが経った。"
translation = "그로부터 며칠이 지났다."

[[dialogue]]
speaker = "unk"
original = "シェルターに備え付けられた連絡機からは、戦報が次々に飛び込んでくる。"
translation = "쉘터에 비치된 연락기에서는 전보가 차례차례 날아든다."

[[dialogue]]
speaker = "unk"
original = "星騎士の誰それが死んだ、どこそこのシェルターが見つかって破壊された、他国の救援は絶望的、流星市国に出現するアステラの総数は平常時の２３倍──"
translation = "성기사 누구누구가 죽었다, 어디 어디 쉘터가 발견되어 파괴되었다, 타국의 구원은 절망적, 유성시국에 출현하는 아스테라 총수는 평상시의 23배──"

[[dialogue]]
speaker = "unk"
original = "聞きたくないのに、聞かないわけにはいかなかった。"
translation = "듣고 싶지 않은데도 듣지 않을 수 없었다."

[[dialogue]]
speaker = "unk"
original = "聞くたびに全身が震えて、叫びたいほどの恐怖が襲う、けれど声も出せない。どこかから聞きつけて、仮面の女が現れるかもしれない──"
translation = "들을 때마다 온몸이 떨리고 비명을 지르고 싶을 정도의 공포가 엄습했지만, 소리조차 낼 수 없었다. 어딘가에서 듣고 가면의 여자가 나타날지도 모른다──"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「死なないで……おとうさん……おかあさん……おねがい、おねがい……」"
translation = "「죽지 마…… 아빠…… 엄마…… 제발, 제발……」"

[[dialogue]]
speaker = "unk"
original = "爪が真っ白になるぐらい、ＤＩＳＣを強く握る。チナは熱心な流星教の信者だった。"
translation = "손톱이 새하얘질 정도로 DISC를 세게 쥔다. 치나는 열성적인 유성교 신자였다."

[[dialogue]]
speaker = "unk"
original = "愛しい人の無事を、女神様に祈る作法はよく知っていた。心からの祈りを、不眠不休で捧げ続けた。"
translation = "사랑하는 사람의 무사를 여신님께 비는 예법은 잘 알고 있었다. 진심 어린 기도를 불철주야 계속 바쳤다."

[[dialogue]]
speaker = "unk"
original = "そして──"
translation = "그리고──"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「──きゃあぁぁあぁああああっ！？！？」"
translation = "「──꺄아아아아아아앗!?!?」"

[[dialogue]]
speaker = "unk"
original = "天地がひっくり返るような爆音と衝撃がシェルターを襲った。"
translation = "천지가 뒤집히는 듯한 굉음과 충격이 쉘터를 덮쳤다."

[[dialogue]]
speaker = "unk"
original = "とうとうバレた──仮面の女が来る、血にまみれた戦斧を持って、シェルターをこじ開けてくる！！"
translation = "드디어 들켰다── 가면의 여자가 온다, 피칠갑이 된 전투도끼를 들고 쉘터를 억지로 열고 들어온다!!"

[[dialogue]]
speaker = "unk"
original = "心臓が壊れるほどに早鐘を打つ。"
translation = "심장이 부서질 정도로 빠르게 요동친다."

[[dialogue]]
speaker = "unk"
original = "恐怖に震えるチナだったが──"
translation = "공포에 떨던 치나였지만──"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「あ……ぅ……？」"
translation = "「아…… 으……?」"

[[dialogue]]
speaker = "unk"
original = "その大きな、あまりに大きな爆発の衝撃の後は──水を打ったような、静かすぎてうるさいほどの静寂が、シェルターに満たされたのだった。"
translation = "그 커다란, 너무나도 커다란 폭발의 충격 뒤에는── 찬물을 끼얹은 듯, 너무 고요해서 시끄러울 정도의 정적이 쉘터를 가득 채웠다."

[[dialogue]]
speaker = "unk"
original = "………………"
translation = "………………"

[[dialogue]]
speaker = "unk"
original = "…………"
translation = "…………"

[[dialogue]]
speaker = "unk"
original = "……"
translation = "……"

[[dialogue]]
speaker = "unk"
original = "それからまた丸１日。いや──２日だろうか？"
translation = "그로부터 다시 꼬박 하루. 아니── 이틀일까?"

[[dialogue]]
speaker = "unk"
original = "チナは身を丸めて、助けを待っていた。毎日うるさいほどに届いていた通信も今は鳴りを潜めている。"
translation = "치나는 몸을 웅크리고 도움을 기다리고 있었다. 매일 시끄럽게 도착하던 통신도 지금은 잠잠하다."

[[dialogue]]
speaker_original = "流星市国民"
speaker_translation = "유성시 국민"
original = "「外に、出てみないか……？」"
translation = "「밖으로 나가보지 않을래……?」"

[[dialogue]]
speaker = "unk"
original = "誰かがそう言った。同意する者がいた。拒否する者もいた。"
translation = "누군가 그렇게 말했다. 동의하는 사람도 있었고 거부하는 사람도 있었다."

[[dialogue]]
speaker = "unk"
original = "チナは『決して外に出るな』『迎えに行く』という両親の言付けを守るため、そこに残ることを選んだ。"
translation = "치나는 『결코 밖으로 나오지 마라』 『데리러 가겠다』는 부모님의 당부를 지키기 위해 그곳에 남는 것을 택했다."

[[dialogue]]
speaker = "unk"
original = "──否。"
translation = "──아니."

[[dialogue]]
speaker = "unk"
original = "選びたかった──"
translation = "택하고 싶었다──"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「グルルルゥウ──！！」"
translation = "「그르르르으으──!!」"

[[dialogue]]
speaker_original = "流星市国民"
speaker_translation = "유성시 국민"
original = "「──ぎゃぁぁあああああっ！？」"
translation = "「──갸아아아아아앗!?」"

[[dialogue]]
speaker = "unk"
original = "外の様子を見ようと扉を開けた市民が、モンスターの鋭利な爪で引き裂かれた。"
translation = "바깥 상황을 보려고 문을 열었던 시민이 몬스터의 날카로운 발톱에 찢겼다."

[[dialogue]]
speaker = "unk"
original = "モンスターが、シェルターの中に入ってこようとしている！！"
translation = "몬스터가 쉘터 안으로 들어오려 하고 있다!!"

[[dialogue]]
speaker = "unk"
original = "パニックになり、逃げ惑う人々の波に揉まれた。大人に踏みつけられ、老人に突き飛ばされ、見知らぬ女性に庇われて──"
translation = "패닉에 빠져 도망치는 사람들의 물결에 휩쓸렸다. 어른들에게 짓밟히고, 노인에게 떠밀리고, 낯선 여성의 도움을 받으며──"

[[dialogue]]
speaker = "unk"
original = "チナは転がるようにして、幸運にもシェルターから這い出ることができたのだが──"
translation = "치나는 구르듯이 운 좋게 쉘터 밖으로 기어 나올 수 있었지만──"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「空が……戻ってる……！？」"
translation = "「하늘이…… 돌아왔어……!?」"

[[dialogue]]
speaker = "unk"
original = "あの恐ろしくも美しい、彗星の雨はどこかに消えていた──しかし、見慣れた街並みはどこにもなかった。"
translation = "그 무섭고도 아름다운 혜성의 비는 어디론가 사라져 있었다── 하지만 익숙한 거리 풍경은 어디에도 없었다."

[[dialogue]]
speaker = "unk"
original = "建物は崩れ、地面はえぐれている。チナが大好きだった肉まんを売るお店があった場所には、何もなかった。教科書で見た、空爆の後の街並みのよう。"
translation = "건물은 무너지고 지면은 파여 있다. 치나가 정말 좋아하던 고기만두를 팔던 가게가 있던 자리에는 아무것도 없었다. 교과서에서 본 공습 후의 거리 풍경 같았다."

[[dialogue]]
speaker = "unk"
original = "ここが、流星市国……？"
translation = "여기가 유성시국……?"

[[dialogue]]
speaker = "unk"
original = "しかも──"
translation = "게다가──"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「──シャァァアァッ！」"
translation = "「──샤아아앗!」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「イイィィィイイ──！！」"
translation = "「이이이이이이──!!」"

[[dialogue]]
speaker = "unk"
original = "モンスターが街にあふれている。そこかしこで誰かが襲われている。"
translation = "몬스터가 거리에 넘쳐나고 있다. 여기저기서 누군가가 습격당하고 있다."

[[dialogue]]
speaker = "unk"
original = "そして何より、星騎士がいない。１人もいない。本当にどこにも──いない！！"
translation = "그리고 무엇보다 성기사가 없다. 한 명도 없다. 정말로 어디에도── 없다!!"

[[dialogue]]
speaker = "unk"
original = "いつだってあの人達は、すごいスピードで飛んで来てくれるのに。"
translation = "언제나 그 사람들은 엄청난 속도로 날아와 주었는데."

[[dialogue]]
speaker = "unk"
original = "モンスターが現れたらアラートが即座に鳴り響き、ヒーローのように駆けつけてくれるのに──"
translation = "몬스터가 나타나면 알람이 즉시 울려 퍼지고, 히어로처럼 달려와 주었는데──"

[[dialogue]]
speaker = "unk"
original = "ここにいるのは、戦う力のない一般市民と、その天敵であるモンスターだけ。右を見ても、左を見ても、あるのは一方的な殺戮だけ。"
translation = "여기에 있는 것은 싸울 힘이 없는 일반 시민과 그 천적인 몬스터뿐. 오른쪽을 봐도 왼쪽을 봐도 있는 것은 일방적인 살육뿐."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「おとうさんっ！\u3000おかあさんっ！\u3000どこっ！\u3000たすけて……！\u3000たすけてっ！！」"
translation = "「아빠! 엄마! 어디야! 도와줘……! 도와줘!!」"

[[dialogue]]
speaker = "unk"
original = "どれだけ叫んでも泣きすがっても、助けに来てくれる人は１人もいない。"
translation = "아무리 외치고 울며 매달려도 도와주러 오는 사람은 단 한 명도 없다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「うぁっ──！？」"
translation = "「으앗──!?」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「ガァァアアァアアッ──！！」"
translation = "「가아아아아아아앗──!!」"

[[dialogue]]
speaker = "unk"
original = "目の前にモンスターが立ちふさがった。チナの数倍も大きな怪物が、鋭い爪を振り上げ、叩きつけようとしている。"
translation = "눈앞에 몬스터가 가로막았다. 치나보다 몇 배나 큰 괴물이 날카로운 발톱을 치켜들고 내리치려 하고 있다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「だれかぁああああああ──っ！！」"
translation = "「누가 좀 도와줘어어어어──!!」"

[[dialogue]]
speaker = "unk"
original = "目をつぶって叫んだチナの耳が拾ったのは──"
translation = "눈을 감고 외친 치나의 귀에 들려온 것은──"

[[dialogue]]
speaker_original = "天使の少女"
speaker_translation = "천사 소녀"
original = "「はぁあっ！！」"
translation = "「하앗!!」"

[[dialogue]]
speaker = "unk"
original = "自分の身が裂かれる音ではなく、１人の少女の声だった。"
translation = "자신의 몸이 찢기는 소리가 아니라 한 소녀의 목소리였다."

[[dialogue]]
speaker = "unk"
original = "そして温かな、星の光の感触──おそるおそる、目を開くと。"
translation = "그리고 따스한 별빛의 감촉── 조심스레 눈을 뜨자."

[[dialogue]]
speaker = "unk"
original = "チナを襲おうとしていたモンスターが、煌く光の羽根で刺し貫かれ、その動きを止めていた。"
translation = "치나를 덮치려던 몬스터가 찬란한 빛의 날개에 꿰뚫려 움직임을 멈추고 있었다."

[[dialogue]]
speaker = "unk"
original = "そしてチナをかばうようにしてたたずむ、１人の天使の少女──"
translation = "그리고 치나를 감싸듯 서 있는 한 명의 천사 소녀──"

[[dialogue]]
speaker_original = "天使の少女"
speaker_translation = "천사 소녀"
original = "「……間に合ってよかった。ケガはない？」"
translation = "「……늦지 않아서 다행이야. 다친 데는 없어?」"

[[dialogue]]
speaker = "unk"
original = "それが香堂チナと、天使ルヴィネの出会いだった。"
translation = "그것이 코도 치나와 천사 루비네의 만남이었다."

