[[dialogue]]
speaker = "unk"
original = "第４話,もっとキミの近くに,P"
translation = "제4화, 좀 더 너의 곁으로, P"

[[dialogue]]
speaker = "フェリシー"
original = "「はぁ……やっと依頼が片付いた……」"
translation = "「하아…… 겨우 의뢰가 일단락됐네……」"

[[dialogue]]
speaker = "unk"
original = "ここ数週間、フェリシーは１人で、エクソシストの仕事を忙しくこなしていた。"
translation = "지난 몇 주 동안 펠리시는 혼자서 엑소시스트 일을 바쁘게 소화하고 있었다."

[[dialogue]]
speaker = "フェリシー"
original = "（本当は、会長くんに助手として手伝ってもらえたら嬉しかったけど、星徒会が忙しかったみたいだし、仕方ないよね）"
translation = "(사실은 회장군한테 조수로 도움을 받을 수 있다면 기뻤겠지만 성도회가 바빴던 것 같고 어쩔 수 없지)"

[[dialogue]]
speaker = "フェリシー"
original = "（でも、学園も違うし、お互い仕事があると、なかなか話せる機会がないなぁ……）"
translation = "(그래도 학원도 다르고 서로 일이 있으면 좀처럼 대화할 기회가 없네……)"

[[dialogue]]
speaker = "ソフレ"
original = "「――何をそんな、辛気臭い顔をしているのだわ？」"
translation = "「――무엇을 그렇게 우울한 얼굴을 하고 있는 거야?」"

[[dialogue]]
speaker = "フェリシー"
original = "「あっ、ソフレ、起きてたんだ……」"
translation = "「앗, 소프레 일어났었구나……」"

[[dialogue]]
speaker = "ソフレ"
original = "「ソフレは吸血鬼だもの。夜の方が目が覚めるのだわ。……それで？\u3000会長と何かあったの？」"
translation = "「소프레는 흡혈귀인거야. 밤이 되어야 눈이 떠지는거야. ……그래서? 회장이랑 무슨 일 있었어?」"

[[dialogue]]
speaker = "フェリシー"
original = "「え！？\u3000な、なんで会長くんのことだってわかるの？」"
translation = "「에!? 어, 어떻게 회장군 이야기라는 걸 알았어?」"

[[dialogue]]
speaker = "ソフレ"
original = "「横から見ていればわかるのだわ。会えばいつも、恋人かってくらい近距離でベタベタしているじゃない」"
translation = "「옆에서 보고 있으면 다 아는거야. 만나면 항상 연인인가 싶을 정도로 근거리에서 찰딱 달라붙어 있잖아」"

[[dialogue]]
speaker = "フェリシー"
original = "「嘘！？\u3000そ、そんなに距離感近かったかな……！？」"
translation = "「거짓말!? 그, 그렇게 거리감이 가까웠었나……!?」"

[[dialogue]]
speaker = "ソフレ"
original = "「それはもう。面倒臭いから、もうさっさと付き合えって感じなのだわ」"
translation = "「그럼. 귀찮으니까 그냥 얼른 사귀어버리라는 느낌인거야」"

[[dialogue]]
speaker = "フェリシー"
original = "「い、いや、会長くんは確かに仲のいい男友達だけど……。知り合ってからまだ数ヶ月しか経ってないし……そういうのはまだ早いっていうか……」"
translation = "「아, 아니 회장군은 분명 친한 남사친이긴 한데…… 알고 지낸 지 겨우 몇 달밖에 안 됐고…… 그런 건 아직 이르달까……」"

[[dialogue]]
speaker = "ソフレ"
original = "「付き合う対象としては、別に問題ないわけ？」"
translation = "「사귈 대상으로서는 별로 문제없는 모양이네?」"

[[dialogue]]
speaker = "フェリシー"
original = "「えっ！？\u3000そ、それは……優しいし、いざという時、男らしいところもあるし……その……」"
translation = "「엣!? 그, 그건…… 친절하고 유사시엔 남자다운 면도 있고…… 그게……」"

[[dialogue]]
speaker = "ソフレ"
original = "「はいはい、お前がどう思っているかはよく分かったのだわ。……で、辛気臭い顔の原因はなんなの？」"
translation = "「네네 네가 어떻게 생각하는지는 잘 알겠는거야. ……그래서 우울한 얼굴의 원인이 뭔데?」"

[[dialogue]]
speaker = "フェリシー"
original = "「……実は、ここ最近忙しかったから、会長くんと会って話せてないなぁと思って……」"
translation = "「……사실 최근에 바빠서 회장군이랑 만나서 대화를 못 했구나 싶어서……」"

[[dialogue]]
speaker = "ソフレ"
original = "「は？\u3000それだけ？\u3000……だったら、今すぐ会いに行けばいいのだわ」"
translation = "「하? 겨우 그거? ……그렇다면 지금 당장 만나러 가면 되는거야」"

[[dialogue]]
speaker = "フェリシー"
original = "「いやでも、会長くんも星徒会の仕事が忙しそうだし……」"
translation = "「아니 그래도 회장군도 성도회 일이 바빠 보이고……」"

[[dialogue]]
speaker = "ソフレ"
original = "「何を今更……。お前ときたら、ソフレに対しては入学初日から、頼んでもないのにガンガン絡んできていた癖に。会長だとダメな理由がわからないのよ」"
translation = "「이제 와서 새삼스럽게……. 너로 말할 것 같으면 소프레에게는 입학 첫날부터 부탁하지도 않았는데 팍팍 엉겨 붙었으면서. 회장이라고 안 될 이유를 모르겠는거야」"

[[dialogue]]
speaker = "フェリシー"
original = "「う……それは女心というか……。ベタベタし過ぎて、嫌われたくないって思っちゃうというか……」"
translation = "「우…… 그건 여자의 마음이랄까……. 너무 끈적거려서 미움받고 싶지 않다고 생각하게 된달까……」"

[[dialogue]]
speaker = "ソフレ"
original = "「会って話すだけのどこに嫌われる要素があるの？\u3000会長は今日だって、ソフレが星徒会室でお昼寝してても怒らなかったくらいのお人好しなのだわ」"
translation = "「만나서 대화하는 것뿐인데 미움받을 요소가 어디 있어? 회장은 오늘도 소프레가 성도회실에서 낮잠 자고 있어도 화내지 않았을 정도의 호인인거야」"

[[dialogue]]
speaker = "フェリシー"
original = "「え！？\u3000ソフレ、会長と会ってたの！？」"
translation = "「에!? 소프레 회장이랑 만났었어!?」"

[[dialogue]]
speaker = "ソフレ"
original = "「お前が最近元気にしてるかって、会長が気にしてたから、ソフレがわざわざこうして様子を見にきてやったのよ」"
translation = "「네가 요즘 잘 지내냐고 회장이 걱정하길래 소프레가 일부러 이렇게 상태를 보러 와 준 거야」"

[[dialogue]]
speaker = "unk"
original = "今日でやっと、星徒会の仕事がひと息ついた。俺がソファーに腰かけて、大きく伸びをしていると――"
translation = "오늘로 드디어 성도회 일이 한숨 돌렸다. 내가 소파에 앉아 기지개를 크게 켜고 있자――"

[[dialogue]]
speaker = "フェリシー"
original = "「お邪魔します～……あっ、会長くん！」"
translation = "「실례합니다~ ……앗 회장군!」"

[[dialogue]]
speaker = "フェリシー"
original = "「う、うん、久しぶり。今、大丈夫……？」"
translation = "「으, 응 오랜만이야. 지금 괜찮아……?」"

[[dialogue]]
speaker = "フェリシー"
original = "「――ちょうど仕事が一区切りついたところ？\u3000じゃあ、その……少しお話していっても大丈夫かな？」"
translation = "「――마침 일이 일단락된 참이야? 그럼 그게…… 잠시 이야기 좀 하고 가도 괜찮을까?」"

[[dialogue]]
speaker = "フェリシー"
original = "「あっ、ううん！\u3000別に特別な用事があるわけじゃないんだけど……今日、私も仕事の依頼が片付いたところだったから。会長くんは元気にしてるのかな～って思って……」"
translation = "「앗 아니! 딱히 특별한 용건이 있는 건 아닌데…… 오늘 나도 업무 의뢰가 끝난 참이었거든. 회장군은 잘 지내나 싶어서……」"

[[dialogue]]
speaker = "フェリシー"
original = "「――そっか、元気ならよかった！\u3000えへへ……♪」"
translation = "「――그렇구나 잘 지낸다면 다행이야! 에헤헤……♪」"

[[dialogue]]
speaker = "unk"
original = "２人で久しぶりに会って、話は弾んだ。"
translation = "둘이서 오랜만에 만나 이야기가 활기를 띠었다."

[[dialogue]]
speaker = "フェリシー"
original = "（ああ、やっぱり会長くんと一緒にいると楽しいなぁ。勇気を出して、会いにきてよかった"
translation = "(아아 역시 회장군이랑 같이 있으면 즐겁네. 용기 내서 만나러 오길 잘했어)"

[[dialogue]]
speaker = "フェリシー"
original = "「……って、あれ？\u3000会長くん？\u3000もしかして、寝てる？」"
translation = "「……어라? 회장군? 혹시 자는 거야?」"

[[dialogue]]
speaker = "フェリシー"
original = "（疲れてたのかな。ソファーに座ったまま、眠っちゃってる……）"
translation = "(피곤했던 걸까. 소파에 앉은 채 잠들어 버렸어……)"

[[dialogue]]
speaker = "フェリシー"
original = "（……ずっと会えてなかったから、少しだけ……。隣にくっ付くくらい、いいよね……？）"
translation = "(……계속 못 만났으니까 조금만……. 옆에 붙어 있는 것 정도는 괜찮겠지……?)"

[[dialogue]]
speaker = "フェリシー"
original = "（ん……♪\u3000会長くんの体温が伝わってくる……温かくて、すごく安心する……）"
translation = "(응……♪ 회장군의 체온이 전해져 와…… 따뜻해서 정말 안심돼……)"

[[dialogue]]
speaker = "フェリシー"
original = "（あ…………会長くんの顔が、すぐ近くに……）"
translation = "(아………… 회장군 얼굴이 바로 근처에……)"

[[dialogue]]
speaker = "フェリシー"
original = "「……ちゅっ<emoji=heart04>」"
translation = "「……쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "！？\u3000フェリシー、いま頬っぺたに……！？"
translation = "!? 펠리시 방금 뺨에……!?"

[[dialogue]]
speaker = "フェリシー"
original = "「ひゃっ！？\u3000会長くん、起きちゃった！？\u3000えっと、こここ、これはその……！」"
translation = "「히얏!? 회장군 깼어!? 그그, 그건 그게……!」"

[[dialogue]]
speaker = "フェリシー"
original = "「ご、ごめんなさい、私……！\u3000つい、我慢できなくて……！」"
translation = "「죄, 죄송해요 저……! 그만 참지 못해서……!」"

[[dialogue]]
speaker = "unk"
original = "フェリシー、今のは……"
translation = "펠리시 방금 건……"

[[dialogue]]
speaker = "フェリシー"
original = "「そ、その……」"
translation = "「그, 그게……」"

[[dialogue]]
speaker = "フェリシー"
original = "「……は、はい。そうです……私……」"
translation = "「……네. 맞아요…… 저……」"

[[dialogue]]
speaker = "フェリシー"
original = "「会長くんのことが、好きです……」"
translation = "「회장군을 좋아해요……」"

[[dialogue]]
speaker = "unk"
original = "顔を真っ赤にして、小さく告白する彼女を見ていたら――"
translation = "얼굴을 새빨갛게 물들이고 작게 고백하는 그녀를 보고 있자니――"

[[dialogue]]
speaker = "unk"
original = "俺も、フェリシーのことが好きだ"
translation = "나도 펠리시를 좋아해"

[[dialogue]]
speaker = "フェリシー"
original = "「えっ？\u3000会長くんも？\u3000私のこと……本当に？\u3000ど、どうしよう……」"
translation = "「에? 회장군도? 나를…… 정말로? 어, 어떡해……」"

[[dialogue]]
speaker = "フェリシー"
original = "「すごく嬉しい……」"
translation = "「정말 기뻐……」"

[[dialogue]]
speaker = "unk"
original = "両手で自分の頬を押さえながら、照れてしまうフェリシーなのだった――"
translation = "양손으로 자신의 뺨을 감싸며 수줍어하는 펠리시였다――"

