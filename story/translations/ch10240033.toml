[[dialogue]]
speaker = "unk"
original = "第３話,遊園地の夜に,P"
translation = "제3화, 유원지의 밤에, P"

[[dialogue]]
speaker = "unk"
original = "マムの厳しい修行を終えたヨミ。お疲れさまの意味を込めて、休日に２人で遊園地にやってきた。"
translation = "마무의 혹독한 수행을 마친 요미. 수고했다는 의미를 담아 휴일에 둘이서 유원지에 왔다."

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「遊園地ですよ～、遊園地！\u3000もう３６０度どこを見ても最高に楽しそうです～！」"
translation = "「유원지예요~, 유원지! 벌써 360도 어디를 봐도 최고로 즐거워 보여요~!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「うわぁぁ～、何からやろうかな～？\u3000目移りしちゃいますね。ジェットコースターもいいし、お化け屋敷も、コーヒーカップも……」"
translation = "「우와아~, 뭐부터 할까나~? 눈이 돌아가 버리네요. 제트코스터도 좋고, 귀신의 집도, 커피잔도……」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「私をここに連れてきてくれて、ありがとうございます。今日は絶対、最高の１日になると思います！」"
translation = "「저를 여기 데려와 주셔서 감사해요. 오늘은 분명 최고의 하루가 될 거라고 생각해요!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「でもね……会長と一緒だからですよ、私がこんなにはしゃいでるのは」"
translation = "「하지만 말이죠…… 회장님과 함께라서예요, 제가 이렇게 들떠있는 건」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「さあ、行きましょう！\u3000楽しいことがいっぱい私達を待ってますよ～っ！」"
translation = "「자, 가요! 즐거운 일들이 잔뜩 우리를 기다리고 있어요~!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ほら、会長……恋人らしく、腕を組んでみませんか？」"
translation = "「자, 회장님…… 연인답게 팔짱을 껴보지 않겠어요?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「むぎゅ～～～っ<emoji=heart04>\u3000えへへ、会長の腕、抱き締めちゃいました<emoji=heart04>」"
translation = "「무규우우우<emoji=heart04> 에헤헤, 회장님 팔, 껴안아 버렸어요<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「私にしてはちょっと大胆かな～って気もしますけど……でもいいですよね、だって今日はデートなんですからっ<emoji=heart04>」"
translation = "「나답지 않게 좀 대담한가~ 하는 기분도 들지만…… 하지만 괜찮죠, 왜냐면 오늘은 데이트니까요<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「普段出来ないこといっぱいやって、最高のデートを満喫しちゃいましょう♪」"
translation = "「평소에 못 하는 거 잔뜩 하고 최고의 데이트를 만끽해봐요♪」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「はぁぁぁ～～、ジェットコースター楽しかったぁ♪\u3000つい、きゃーきゃー叫んじゃいましたよ」"
translation = "「하아아아~~, 제트코스터 즐거웠어요♪ 나도 모르게 꺄아꺄아 소리 질러 버렸네요」"

[[dialogue]]
speaker = "unk"
original = "ヨミヨミの悲鳴が可愛かった"
translation = "요미요미의 비명이 귀여웠어"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「何ですか、それ～。もう、可愛い彼女の悲鳴が可愛かった、なんて、ちょっと悪趣味ですよー」"
translation = "「뭐예요, 그게~. 정말, 귀여운 여자친구의 비명이 귀여웠다니, 좀 악취미예요」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「って、私も人のこと言えませんけどね。会長もジェットコースター乗ってきゃーきゃー言うんだ～って知って、面白くなっちゃいましたから♪」"
translation = "「라니, 저도 남 말 할 처지는 아니지만요. 회장님도 제트코스터 타고 꺄아꺄아 하는구나~ 하고 알게 돼서 재밌어졌으니까요♪」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "（それに……会長が汗かいてるからドキドキしちゃった……）"
translation = "（게다가…… 회장님이 땀 흘리고 있어서 두근거려 버렸어……）"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「すぅーーーっ……はぁぁぁーーーーっ……」"
translation = "「스으으…… 하아아아……」"

[[dialogue]]
speaker = "unk"
original = "深呼吸するほど恐かったの？"
translation = "심호흡할 정도로 무서웠어?"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こやぁぁっ！！？\u3000ここ、これはっ、そのぉ……」"
translation = "「코양아앗!!? 이, 이건, 그게……」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「会長、いい匂いがしてるなぁって……思っちゃって……ごめんなさい、会長の匂い、いっぱい吸い込んじゃいました」"
translation = "「회장님, 좋은 냄새가 난다~ 싶어서…… 죄송해요, 회장님 냄새 잔뜩 들이마셔 버렸어요」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「うう～っ、会長も知ってますよね、私が匂いフェチだって」"
translation = "「으으~, 회장님도 알고 계시죠, 제가 냄새 페티시라는 거」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「だから、今更隠しません。汗ばんだ会長の匂いで興奮してましたっ」"
translation = "「그러니까 이제 와서 숨기지 않을게요. 땀에 젖은 회장님 냄새에 흥분하고 있었어요」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ところで、会長に１つお願いがありますっ！」"
translation = "「그런데 회장님께 한 가지 부탁이 있어요!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「汗の匂い、嗅がせて下さいっ！」"
translation = "「땀 냄새, 맡게 해주세요!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ぎゅう～～～～っ<emoji=heart04>\u3000もう絶対離しませんからねっ。はぁぁ～～、やっぱり会長の匂い、好きぃ<emoji=heart04>」"
translation = "「규우우우우<emoji=heart04> 이제 절대 안 놓을 거니까요. 하아아~~ 역시 회장님 냄새, 좋아해<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ごめんなさい、ちょっぴり特殊な性癖がある彼女で。でもでもっ、こればっかりは我慢できないと言いますか……狐魔族の本能のようなもので……」"
translation = "「죄송해요, 조금 특이한 성벽이 있는 여자친구라. 하지만 하지만, 이것만큼은 참을 수 없다고나 할까…… 여우 마족의 본능 같은 거라……」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ぐりぐりぐり～～<emoji=heart04>\u3000もう、会長の匂いを私にすりつけちゃいます<emoji=heart04>\u3000こうすれば、ずっとくっついてなくても、会長のこと感じられるから<emoji=heart04>」"
translation = "「부비부비부비<emoji=heart04> 이제 회장님 냄새를 저한테 문질러 버릴 거예요<emoji=heart04> 이렇게 하면 계속 붙어있지 않아도 회장님을 느낄 수 있으니까<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「でも、時間が経つと匂いは薄れちゃいますよね。うん、やはり定期的にこうやってぐりぐりして、会長の匂いを取得しなきゃ」"
translation = "「하지만 시간이 지나면 냄새는 옅어지겠죠. 음, 역시 정기적으로 이렇게 부비부비해서 회장님 냄새를 취득해야겠어」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「いい……ですよね？\u3000私を会長で全部埋め尽くしたいんですっ<emoji=heart04>」"
translation = "「괜찮……죠? 저를 회장님으로 전부 가득 채우고 싶어요<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「すぅぅーーーーーっ……はぁぁぁーーーーっ……会長好きぃ<emoji=heart04>\u3000好き好き好き<emoji=heart04>\u3000大好きぃぃ<emoji=heart04>」"
translation = "「스으으으으…… 하아아아아…… 회장님 좋아해<emoji=heart04> 좋아좋아좋아<emoji=heart04> 정말 좋아해애<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「好きなのは……匂いだけじゃないですよ。それ以外も……大好き、ですっ<emoji=heart04>」"
translation = "「좋아하는 건…… 냄새뿐만이 아니에요. 그 외에도…… 정말 좋아해요! <emoji=heart04>」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「えへへ～、面と向かって言うのは恥ずかしいですから、チャンスだと思って言っちゃいました<emoji=heart04>」"
translation = "「에헤헤~, 마주 보고 말하는 건 부끄러우니까 기회라고 생각해서 말해버렸어요<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「もうずっと離しませんから……会長も私を離さないでいて下さいね……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「이제 계속 안 놓을 거니까…… 회장님도 저를 놓지 말아 주세요……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こやぁぁっ……すみませんでした、ここが遊園地なのすっかり忘れてましたぁ」"
translation = "「코양아앗…… 죄송해요, 여기가 유원지라는 걸 완전히 잊고 있었어요」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「人が大勢いるのに全力で会長に抱きついて……しかも顔を埋めてめいっぱい匂いをくんくんするなんて……はしたないにもほどがあります……」"
translation = "「사람이 잔뜩 있는데 전력으로 회장님께 매달려서…… 게다가 얼굴을 묻고 마음껏 냄새를 킁킁거리다니…… 천박해도 정도가 있지……」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「せっかくのデートだから浮かれすぎちゃいましたね。ハメを外しすぎないように自重したいと思いますっ」"
translation = "「모처럼의 데이트라 너무 들떴나 보네요. 도를 넘지 않도록 자중하도록 하겠습니다!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「具体的には、会長の匂いをくんくんしないよう努めます」"
translation = "「구체적으로는 회장님 냄새를 킁킁거리지 않도록 노력할게요」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「我慢……できるよね……我慢しなきゃ……」"
translation = "「참을 수…… 있겠지…… 참아야 해……」"

[[dialogue]]
speaker = "unk"
original = "なら、後でいっぱい嗅がせてあげるね"
translation = "그럼 나중에 잔뜩 맡게 해줄게"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こやぁぁんっ！\u3000ほ、ほんとですか？\u3000約束ですよ？\u3000絶対ですからね！」"
translation = "「코양아앙! 저, 정말인가요? 약속이에요? 절대니까요!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「やったぁ、会長をくんくんする権利、げっとです！\u3000最高のプレゼントだよ～。もう、会長好き<emoji=heart04>\u3000だぁい好き<emoji=heart04>」"
translation = "「앗싸, 회장님을 킁킁거릴 권리, 획득입니다! 최고의 선물이에요~. 정말, 회장님 좋아<emoji=heart04> 정말 좋아<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「えへへ……今日はいっぱい甘えさせてくれてありがとうございます。もう、ずっとずっと好きですからね<emoji=heart04>」"
translation = "「에헤헤…… 오늘 잔뜩 어리광부리게 해주셔서 감사해요. 이제 계속 계속 좋아할 거니까요<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「イルミネーションきれい……きらきらしてます……」"
translation = "「일루미네이션 예쁘다…… 반짝반짝해요……」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「夜には夜の楽しみ方があるんですね、遊園地って。爆裂気に入りました」"
translation = "「밤에는 밤만의 즐기는 법이 있군요, 유원지는. 폭렬 마음에 들었어요」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「会長は……どうですか？\u3000夜の遊園地、楽しんでますか？」"
translation = "「회장님은…… 어떠세요? 밤의 유원지, 즐기고 계신가요?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「賑やかなアトラクションも楽しいですけど、恋人同士なら、こっちの方が楽しめるかも知れませんね。ほら見て下さい、あっちもそっちもカップルだらけですよ」"
translation = "「북적거리는 어트랙션도 즐겁지만 연인 사이라면 이쪽이 더 즐거울지도 모르겠네요. 보세요, 저기도 여기도 커플투성이에요」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ええとっ、その……会長……私……」"
translation = "「저기, 그…… 회장님…… 저……」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「そろそろ、遊園地も閉園の時間ですね……だから、それまでは会長と、イルミネーションを眺めてたいです<emoji=heart04>」"
translation = "「슬슬 유원지도 폐장 시간이네요…… 그러니까 그때까지는 회장님과 일루미네이션을 바라보고 싶어요<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「できれば、ずっと一緒にいたいのにな……」"
translation = "「가능하면 계속 같이 있고 싶은데 말이죠……」"

[[dialogue]]
speaker = "unk"
original = "なら、ずっと一緒にいよう"
translation = "그럼 계속 같이 있자"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こやぁ？\u3000ど、どういうことですか？」"
translation = "「코양? 무, 무슨 말씀이세요?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「確かに、私達は恋人同士ですけど、でもなんで急に……」"
translation = "「확실히 저희는 연인 사이지만, 그런데 왜 갑자기……」"

[[dialogue]]
speaker = "unk"
original = "考えていたんだ、ヨミとどうなりたいかって"
translation = "생각하고 있었어, 요미와 어떻게 되고 싶은지"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「そ、そうだったんですか。私は……はい、私も会長と、ずっと一緒がいい、です……<emoji=heart04>」"
translation = "「그, 그러셨군요. 저는…… 네, 저도 회장님과 계속 같이 있고 싶어요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ウェディングフォームのことがあって、そういうことを考えるようになって……だけど勘違いしちゃいけないってずっと思ってて……」"
translation = "「웨딩 폼 일도 있고 해서 그런 걸 생각하게 되어서…… 하지만 착각하면 안 된다고 계속 생각하고 있었는데……」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「でも……白無垢を着ちゃうと、やっぱり憧れちゃいますよね。だから私……」"
translation = "「하지만…… 시로무쿠를 입어버리면 역시 동경하게 되잖아요. 그래서 저……」"

[[dialogue]]
speaker = "unk"
original = "ヨミ、俺と結婚してくれるかな？"
translation = "요미, 나랑 결혼해줄래?"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こやんっ<emoji=heart04>\u3000わ、私でよければ、是非っ……」"
translation = "「코양<emoji=heart04> 저, 저라도 괜찮으시다면 기꺼이……」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「会長の、お嫁さんにして下さい……<emoji=heart04>」"
translation = "「회장님의 아내로 삼아주세요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "こうして、俺はヨミにプロポーズをして、承諾してもらった。"
translation = "이렇게 나는 요미에게 프로포즈를 했고 승낙을 받았다."

[[dialogue]]
speaker = "unk"
original = "今すぐにじゃないけど、近いうちに必ず、俺とヨミは婚姻の契りを交わすことになる。"
translation = "지금 당장은 아니지만 가까운 시일 내에 반드시 나와 요미는 혼인 서약을 맺게 될 것이다."

[[dialogue]]
speaker = "unk"
original = "そう決まった、遊園地の夜だった。"
translation = "그렇게 정해진 유원지의 밤이었다."

