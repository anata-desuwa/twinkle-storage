[[dialogue]]
speaker = "unk"
original = "第９話,迸る雷,B"
translation = "제9화, 용솟음치는 번개, B"

[[dialogue]]
speaker = "unk"
original = "御前試合を申し込まれてから数日。"
translation = "어전시합을 신청받은 지 며칠."

[[dialogue]]
speaker = "unk"
original = "受けて立つのか、それとも断るのか、俺はまだ答えを出せていなかった。"
translation = "도전을 받아들일 것인가, 아니면 거절할 것인가. 나는 아직 답을 내지 못하고 있었다."

[[dialogue]]
speaker = "unk"
original = "俺が悩んでいようと、モンスターはお構いなく現れる。"
translation = "내가 고민하고 있든 말든, 몬스터는 아랑곳하지 않고 나타난다."

[[dialogue]]
speaker = "unk"
original = "自宅近くに出現したと知らせを受けて現場に急行。対処に当たっていた。"
translation = "집 근처에 출현했다는 소식을 듣고 현장으로 급행. 대처에 임하고 있었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ハッ！」"
translation = "「하앗!」"

[[dialogue]]
speaker = "unk"
original = "幸い今いるのは旧来のモンスターだけなので、魔王の力がなくても十分相手できる。"
translation = "다행히 지금 있는 건 기존의 몬스터뿐이라, 마왕의 힘이 없어도 충분히 상대할 수 있다."

[[dialogue]]
speaker = "unk"
original = "だけど──"
translation = "하지만──"

[[dialogue]]
speaker = "unk"
original = "あの光景が頭から離れない。"
translation = "그 광경이 머릿속에서 떠나지 않는다."

[[dialogue]]
speaker = "unk"
original = "破滅した世界が俺を呼んでいる。"
translation = "파멸한 세계가 나를 부르고 있다."

[[dialogue]]
speaker = "unk"
original = "あれが俺の魂にこびりついている限り、魔王の力を使おうとすればきっとまた暴走する。"
translation = "저것이 내 영혼에 눌어붙어 있는 한, 마왕의 힘을 쓰려고 하면 분명 또 폭주할 것이다."

[[dialogue]]
speaker = "unk"
original = "そんな俺が星徒会長にふさわしいのか？"
translation = "그런 내가 성도회장에 어울리는 걸까?"

[[dialogue]]
speaker = "unk"
original = "爆弾を抱えた俺が、星騎士として戦っていていいのか……？"
translation = "폭탄을 안고 있는 내가, 성기사로서 싸워도 되는 걸까……?"

[[dialogue]]
speaker = "unk"
original = "いや、今は目の前にいる人を助けるのが先だ。頭を振って迷いを振り切る。"
translation = "아니, 지금은 눈앞에 있는 사람을 구하는 게 우선이다. 머리를 흔들어 망설임을 떨쳐낸다."

[[dialogue]]
speaker_original = "女の子"
speaker_translation = "여자아이"
original = "「きゃっ！？\u3000モンスターが──」"
translation = "「꺄악!? 몬스터가──」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「させない──アビスインパクト！」"
translation = "「하게 두지 않아── 어비스 임팩트!」"

[[dialogue]]
speaker = "？？？"
original = "「ボルテクスシューター！」"
translation = "「볼텍스 슈터!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「モンスターは倒した。今のうちに逃げてくれ」"
translation = "「몬스터는 쓰러뜨렸어. 지금 이 틈에 도망쳐줘.」"

[[dialogue]]
speaker_original = "女の子"
speaker_translation = "여자아이"
original = "「あ、ありがとうございますっ」"
translation = "「아, 감사합니다!」"

[[dialogue]]
speaker = "unk"
original = "さっき俺の拳と同時に、雷を帯びた矢がモンスターを貫いた。"
translation = "방금 내 주먹과 동시에, 번개를 머금은 화살이 몬스터를 꿰뚫었다."

[[dialogue]]
speaker = "unk"
original = "今のはもしかして──"
translation = "방금 그건 설마──"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「君、大丈夫か？」"
translation = "「너, 괜찮나?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……なんだ、君か」"
translation = "「……뭐야, 너였나.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そんな露骨な反応しなくてもいいだろ……」"
translation = "「그렇게 노골적으로 반응하지 않아도 되잖아……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私と君は敵同士だからな。慣れ合う気はない」"
translation = "「나와 너는 적대하는 사이니까. 친하게 지낼 생각은 없다.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「それに御前試合の返事はどうした？\u3000ヴィーナス前会長の時は即決だったと聞くが、勝負を申し込んでからしばらく経つぞ」"
translation = "「그보다 어전시합의 대답은 어떻게 됐지? 비너스 전 회장 때는 즉결이었다고 들었다만, 승부를 신청하고 꽤 시간이 흘렀다만.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それはごめん……」"
translation = "「그건 미안……」"

[[dialogue]]
speaker = "unk"
original = "女の子を待たせるのは純粋に悪いと思いつつ、轟音とともに新たな敵がやってきて──"
translation = "여자아이를 기다리게 하는 건 순수하게 미안하다고 생각하던 중, 굉음과 함께 새로운 적이 나타나──"

[[dialogue]]
speaker_original = "ドラケルス"
speaker_translation = "드라켈스"
original = "「グルルルル……！！」"
translation = "「그르르르르……!!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「！\u3000この前の──」"
translation = "「! 요전번의──」"

[[dialogue]]
speaker = "unk"
original = "山をも突き崩す突進を、俺と梨緒はギリギリで回避する。"
translation = "산조차 무너뜨릴 듯한 돌진을, 나와 리오는 간발의 차로 회피한다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あのモンスターは危険だ。耐久力が高い上に、放っておくと周囲の物をモンスターに変えて仲間を増やす」"
translation = "「저 몬스터는 위험해. 내구력이 높은 데다, 내버려 두면 주위의 물건을 몬스터로 바꿔서 동료를 늘려.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「確かにそれは厄介だな。だがそう珍しい特性でもない」"
translation = "「확실히 그건 까다롭군. 하지만 그리 드문 특성도 아니다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「え」"
translation = "「에?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「？\u3000乱暴に言えば、リクリエやモンスターとはそういうものだろう？」"
translation = "「? 거칠게 말하자면, 리크리에나 몬스터란 원래 그런 것 아닌가?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いや……乱暴に言えばそうだけど」"
translation = "「아니…… 거칠게 말하면 그렇긴 하지만.」"

[[dialogue]]
speaker = "unk"
original = "梨緒は嘘をついている様子はなく、本当に不思議そうにしている。"
translation = "리오는 거짓말을 하는 기색 없이, 정말로 의아하다는 표정이다."

[[dialogue]]
speaker = "unk"
original = "互いの感覚がずれている気がするが、今は問答している場合じゃない。"
translation = "서로의 감각이 어긋나 있다는 느낌이 들지만, 지금은 문답을 나눌 때가 아니다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「こちらからいくぞ──シュバルツシュラーク！」"
translation = "「이쪽에서 간다── 슈발츠슐라크!」"

[[dialogue]]
speaker_original = "ドラケルス"
speaker_translation = "드라켈스"
original = "「グゥウウ……！」"
translation = "「그우우우……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くっ──やっぱり一筋縄じゃいかないか」"
translation = "「큭── 역시 호락호락하지 않은가.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──！？」"
translation = "「──!?」"

[[dialogue]]
speaker = "unk"
original = "もっと力を──そう考えた瞬間、またあの光景が俺を呼ぶ。"
translation = "좀 더 힘을── 그렇게 생각한 순간, 다시 그 광경이 나를 부른다."

[[dialogue]]
speaker = "unk"
original = "意識があの世界に吸い込まれそうになって、俺の中で暴れそうになる力を抑えるので精いっぱいだ。"
translation = "의식이 그 세계로 빨려 들어갈 것 같아서, 내 안에서 날뛰려는 힘을 억누르는 것만으로도 벅차다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「そこだ！」"
translation = "「거기다!」"

[[dialogue]]
speaker_original = "ドラケルス"
speaker_translation = "드라켈스"
original = "「グルル……！」"
translation = "「그르르……!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「なるほど、確かに硬い。だがやれない訳ではないな」"
translation = "「과연, 확실히 단단하군. 하지만 못 해낼 정도는 아니야.」"

[[dialogue]]
speaker = "unk"
original = "バチバチと弾ける雷鳴が、俺の意識を現実へと引き戻す。"
translation = "지지직하며 튀는 뇌성이 내 의식을 현실로 되돌린다."

[[dialogue]]
speaker = "unk"
original = "そう、魔王の力がなくても俺は星騎士だ。"
translation = "그래, 마왕의 힘이 없어도 나는 성기사다."

[[dialogue]]
speaker = "unk"
original = "新星学園に転入した頃とは比較にならないくらい星力を引き出せるようになったし、実戦の経験も積んできた。"
translation = "신성학원에 전학 왔을 무렵과는 비교도 안 될 정도로 성력을 끌어낼 수 있게 되었고, 실전 경험도 쌓아왔다."

[[dialogue]]
speaker = "unk"
original = "俺は戦える。だからできることをするだけだ。"
translation = "나는 싸울 수 있다. 그러니 할 수 있는 일을 할 뿐이다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「梨緒ならあのモンスターを倒せるんだな？」"
translation = "「리오라면 저 몬스터를 쓰러뜨릴 수 있는 거지?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ああ。倒せる」"
translation = "「아아. 쓰러뜨릴 수 있다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「じゃあ俺が前に出る。その隙に仕留めてくれ」"
translation = "「그럼 내가 앞으로 나설게. 그 틈에 끝내줘.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「待て。私が君の背中を撃つとは思わないのか？」"
translation = "「기다려. 내가 네 등을 쏠 거라고는 생각하지 않는 건가?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「君は星騎士だ。少なくとも、モンスターを倒すまではそんなことしない。違うか？」"
translation = "「너는 성기사야. 적어도 몬스터를 쓰러뜨리기 전까지는 그런 짓 안 해. 아니야?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……違わない」"
translation = "「……아니지 않다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「じゃあいくぞ」"
translation = "「그럼 간다.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「君と協力するのは不本意だが……仕方ない！」"
translation = "「너와 협력하는 건 본의가 아니지만…… 어쩔 수 없군!」"

[[dialogue]]
speaker = "unk"
original = "梨緒が電光を帯びて稲妻の速さで宙を<ruby>奔<rt>はし</rt></ruby>る。"
translation = "리오가 전광을 두르고 번개 같은 속도로 허공을 가로지른다."

[[dialogue]]
speaker = "unk"
original = "俺はモンスターの鼻面めがけて一気に踏み込む！"
translation = "나는 몬스터의 콧등을 향해 단숨에 파고든다!"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「おおおっ！！」"
translation = "「오오오옷!!」"

[[dialogue]]
speaker_original = "ドラケルス"
speaker_translation = "드라켈스"
original = "「ガァウゥ！」"
translation = "「가아우!」"

[[dialogue]]
speaker = "unk"
original = "モンスターがまた突進する寸前、加速が乗る前に肉薄し、正面から拳で動きを押さえた。"
translation = "몬스터가 다시 돌진하기 직전, 가속이 붙기 전에 육박하여 정면에서 주먹으로 움직임을 눌렀다."

[[dialogue]]
speaker = "unk"
original = "全身が肉塊になりそうな衝撃に骨が軋み、体が弾けそうになる。"
translation = "전신이 고깃덩이가 될 것 같은 충격에 뼈가 삐걱거리고, 몸이 터져나갈 것만 같다."

[[dialogue]]
speaker = "unk"
original = "だが──"
translation = "하지만──"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ディヴァインサンダーボルト！」"
translation = "「디바인 썬더볼트!」"

[[dialogue]]
speaker_original = "ドラケルス"
speaker_translation = "드라켈스"
original = "「グルルル……！！」"
translation = "「그르르르……!!」"

[[dialogue]]
speaker = "unk"
original = "梨緒が上空から放った無数の矢が一条の巨大な雷に変わり、モンスターを撃ち抜いた。"
translation = "리오가 상공에서 쏜 무수한 화살이 한 줄기 거대한 번개로 변해 몬스터를 꿰뚫었다."

[[dialogue]]
speaker = "unk"
original = "モンスターはその姿を保てなくなり、物言わぬ残骸になり果てた。"
translation = "몬스터는 그 형체를 유지하지 못하고, 말 없는 잔해가 되어버렸다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ふぅ……倒せたな」"
translation = "「후우…… 쓰러뜨렸군.」"

[[dialogue]]
speaker = "unk"
original = "彼女の力はヴィーナスに比肩する……いやそれ以上かもしれない。"
translation = "그녀의 힘은 비너스에 필적하는…… 아니, 그 이상일지도 모른다."

[[dialogue]]
speaker = "unk"
original = "つまり星徒会長に値する実力を持っている。御前試合を挑むだけのことはあるということだ。"
translation = "즉 성도회장에 걸맞은 실력을 갖추고 있다. 어전시합을 걸어올 만하다는 뜻이다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「周囲にモンスターの反応なし。梨緒のおかげで街を守れたよ。ありがとう」"
translation = "「주변에 몬스터 반응 없음. 리오 덕분에 마을을 지켰어. 고마워.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「良かった。私は<ruby>無辜<rt>むこ</rt></ruby>の人々を守るために星騎士になったんだからな」"
translation = "「다행이다. 나는 무고한 사람들을 지키기 위해 성기사가 된 거니까.」"

[[dialogue]]
speaker = "unk"
original = "嬉しそうに梨緒の顔が綻ぶ。"
translation = "기쁜 듯 리오의 얼굴이 활짝 펴진다."

[[dialogue]]
speaker = "unk"
original = "ずっと張り詰めていた表情をしていたから、笑顔を見たのは初めてだ。"
translation = "줄곧 팽팽하게 굳은 표정만 짓고 있었기에, 웃는 얼굴을 본 건 처음이다."

[[dialogue]]
speaker = "unk"
original = "彼女についてはわからないことだらけだけど、街を守れて喜ぶ様子は、俺たちと変わらない１人の星騎士のように思えた。"
translation = "그녀에 대해서는 모르는 것투성이지만, 마을을 지키고 기뻐하는 모습은 우리와 다를 바 없는 한 명의 성기사처럼 느껴졌다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「──！\u3000礼はいらない。慣れ合う気はないと言っただろう」"
translation = "「──! 인사는 필요 없다. 친하게 지낼 생각은 없다고 말했을 텐데.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「次に会った時は御前試合の答えを聞かせてもらう。また会おう」"
translation = "「다음에 만났을 때는 어전시합의 대답을 듣도록 하지. 또 보자.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ……次はちゃんと答えないとな」"
translation = "「아아…… 다음엔 제대로 대답해야겠네.」"

[[dialogue]]
speaker = "unk"
original = "笑顔を消して去っていく梨緒の背中を見送り、俺も帰路に就いた。"
translation = "미소를 지우고 떠나가는 리오의 뒷모습을 배웅하며, 나도 귀갓길에 올랐다."

