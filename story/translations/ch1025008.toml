[[dialogue]]
speaker = "舞亜"
original = "「いっちにー、さーん、しー……」"
translation = "「하나 둘, 셋, 넷……」"

[[dialogue]]
speaker = "クロト"
original = "「どうして教室でストレッチしてるんだ？」"
translation = "「어째서 교실에서 스트레칭을 하고 있는 거야?」"

[[dialogue]]
speaker = "舞亜"
original = "「だって何もしてないと体が鈍りそうだし。普段忙しくしてるから、手持ち無沙汰になるとついつい体を動かしちゃうんだよ」"
translation = "「그치만 아무것도 안 하면 몸이 둔해질 것 같아서. 평소에 바쁘게 지내다 보니, 할 일이 없어지면 나도 모르게 몸을 움직이게 돼.」"

[[dialogue]]
speaker = "unk"
original = "そう答えて、そのままマイペースにストレッチを続ける舞亜。"
translation = "그렇게 대답하고는, 그대로 마이페이스로 스트레칭을 계속하는 마이아."

[[dialogue]]
speaker = "unk"
original = "足を１８０度開いて前屈すると、タイツに包まれたお尻が突き出される。"
translation = "다리를 180도 벌리고 전굴하자, 타이즈에 감싸인 엉덩이가 툭 튀어나온다."

[[dialogue]]
speaker = "unk"
original = "上半身を反らしたら大きめの胸が強調されてしまって、目のやり場に困った。"
translation = "상반신을 젖히자 큼지막한 가슴이 강조되어 버려서, 시선을 어디에 둬야 할지 곤란했다."

[[dialogue]]
speaker = "舞亜"
original = "「なんか視線を感じるなー。会長さん、いやらしい目で見てない？」"
translation = "「왠지 시선이 느껴지는데~. 회장님, 야한 눈으로 보고 있지 않아?」"

[[dialogue]]
speaker = "クロト"
original = "「！？」"
translation = "「!?」"

[[dialogue]]
speaker = "舞亜"
original = "「その反応は図星だね。でも見てるだけじゃなんだし……会長さんにもストレッチ手伝ってもらおうかな」"
translation = "「그 반응은 정곡을 찔린 거네. 하지만 보고만 있는 것도 좀 그러니…… 회장님도 스트레칭 좀 도와줄래?」"

[[dialogue]]
speaker = "舞亜"
original = "「どう、ちょっとすごいでしょ？\u3000普通の人はこんなに足上がらないからね」"
translation = "「어때, 좀 대단하지? 보통 사람은 이렇게 다리 안 올라가거든.」"

[[dialogue]]
speaker = "unk"
original = "両足をほぼ１８０度開き、大胆に股間を晒す舞亜。"
translation = "양다리를 거의 180도로 벌리고, 대담하게 가랑이를 노출하는 마이아."

[[dialogue]]
speaker = "unk"
original = "フィギュアスケーターはバレエも習うと聞くがさすがの柔らかさだ。"
translation = "피겨스케이팅 선수는 발레도 배운다고 들었는데 과연 그럴만한 유연함이다."

[[dialogue]]
speaker = "舞亜"
original = "「んっ……あそこにおち○ちん押し付けられて……あっ……はぁ……んん……」"
translation = "「응…… 저기에 자지 짓눌려서…… 앗…… 하아…… 으으음……」"

[[dialogue]]
speaker = "舞亜"
original = "「ふふ、会長さんの熱いや。やっぱりエッチな目で見てたんだね」"
translation = "「후후, 회장님 거 뜨거워. 역시 야한 눈으로 보고 있었구나.」"

[[dialogue]]
speaker = "unk"
original = "証拠を見られては言い逃れはできない。……が、その必要もないだろう。"
translation = "증거를 들킨 이상 발뺌은 할 수 없다. ……하지만, 그럴 필요도 없을 것이다."

[[dialogue]]
speaker = "舞亜"
original = "「ふ……あ……はぁ……そんなに擦り付けなくたって、大きくなってるのわかるよ」"
translation = "「후…… 아…… 하아…… 그렇게 비벼대지 않아도, 커진 거 알고 있어.」"

[[dialogue]]
speaker = "unk"
original = "ペニスを舞亜のスリットに押し付けると、柔らかい肉の弾力が伝わってくる。"
translation = "페니스를 마이아의 슬릿에 밀어붙이자, 부드러운 살결의 탄력이 전해져 온다."

[[dialogue]]
speaker = "unk"
original = "それに舞亜の中から蜜がにじんできて、くちゅくちゅといやらしい音も聞こえてきた。"
translation = "게다가 마이아의 안에서 애액이 배어 나와서, 구츄구츄하고 야한 소리도 들려왔다."

[[dialogue]]
speaker = "舞亜"
original = "「おち○ちんビクビクして、そんなに私の中に入りたいんだ」"
translation = "「자지가 움찔거려서, 그렇게 내 안에 들어오고 싶은 거구나.」"

[[dialogue]]
speaker = "舞亜"
original = "「……うん、いいよ。それじゃストレッチの続きしようか」"
translation = "「……응, 좋아. 그럼 스트레칭 계속할까.」"

[[dialogue]]
speaker = "舞亜"
original = "「ふあああ……<emoji=heart04>\u3000おっきいの、入ってきたぁ……はぁ……あ……んんっ<emoji=heart04>」"
translation = "「후아아아……<emoji=heart04> 커다란 게, 들어왔어…… 하아…… 아…… 응읏<emoji=heart04>」"

[[dialogue]]
speaker = "舞亜"
original = "「あ……はぁん……おち○ちん、熱い……あっ……はっ……ふっ……はあぁっ<emoji=heart04>」"
translation = "「아…… 하앙…… 자지, 뜨거워…… 앗…… 하앗…… 훗…… 하아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "怒張したペニスが舞亜の中をこじ開けていくが、舞亜の中は濡れていて、とろりとした蜜が絡みついてくる。"
translation = "발기한 페니스가 마이아의 안을 비집고 들어가지만, 마이아의 안은 젖어 있어서 걸쭉한 애액이 엉겨 붙는다."

[[dialogue]]
speaker = "unk"
original = "柔らかな肉ひだもペニスに密着してきて、思わず下半身が震える心地良さだ。"
translation = "부드러운 살주름도 페니스에 밀착해 와서, 나도 모르게 하반신이 떨릴 정도의 쾌감이다."

[[dialogue]]
speaker = "舞亜"
original = "「あ……はっ……はぁ……<emoji=heart04>\u3000おち○ちんの形、わかっちゃう……出っ張ってるところが、擦れて……ふぁっ……あんっ<emoji=heart04>」"
translation = "「아…… 하앗…… 하아……<emoji=heart04> 자지 모양, 다 느껴져…… 툭 튀어나온 부분이, 쓸려서…… 화앗…… 앙っ<emoji=heart04>」"

[[dialogue]]
speaker = "舞亜"
original = "「会長さんのおち○ちん、太くて硬くて、お腹の中押し広げられてる……はぁ……あんっ……私の中はどう？\u3000気持ちいい？」"
translation = "「회장님의 자지, 굵고 딱딱해서, 배 안이 넓혀지고 있어…… 하아…… 앙っ…… 내 안은 어때? 기분 좋아?」"

[[dialogue]]
speaker = "クロト"
original = "「ああ。温かくて、よく締め付けてきてすごく気持ちいよ」"
translation = "「아아. 따뜻하고, 꽉 조여와서 정말 기분 좋아.」"

[[dialogue]]
speaker = "舞亜"
original = "「説明されると恥ずかしいんだけど……でも嬉しい。ふっ……はぁ……もっと感じて、会長さん」"
translation = "「설명 들으니까 부끄러운데…… 그래도 기뻐. 훗…… 하아…… 더 느껴줘, 회장님.」"

[[dialogue]]
speaker = "unk"
original = "フィギュアスケートで鍛えられているせいか、舞亜の中は締め付けがきつい。"
translation = "피겨스케이팅으로 단련된 탓인지, 마이아의 안은 조임이 무척 강하다."

[[dialogue]]
speaker = "unk"
original = "奥まで入れるとペニス全体をぎゅっと絞られて快感が押し寄せてきた。"
translation = "「……응, 좋아. 그럼 스트레칭 계속할까.」"

[[dialogue]]
speaker = "舞亜"
original = "「私も会長さんのおち○ちん気持ちいいよ……ふっ、はぁ……出たり入ったりして……ひぁああっ<emoji=heart04>」"
translation = "「후아아아……<emoji=heart04> 커다란 게, 들어왔어…… 하아…… 아…… 응읏<emoji=heart04>」"

[[dialogue]]
speaker = "舞亜"
original = "「あっ……はっ……んん……すごい……私の中で動いてる……んっ……はぁ……いいよ……んっ、あんっ……<emoji=heart04>」"
translation = "「아…… 하앙…… 자지, 뜨거워…… 앗…… 하앗…… 훗…… 하아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "舞亜の中でペニスを動かす度に、俺たちしかいない教室に甘い喘ぎ声が響く。"
translation = "마이아의 안으로 페니스를 움직일 때마다, 우리 둘뿐인 교실에 달콤한 신음소리가 울려 퍼진다."

[[dialogue]]
speaker = "舞亜"
original = "「ふふ……学園の教室で柊舞亜がエッチしてるなんてみんな思わないだろうね」"
translation = "「후후…… 학원 교실에서 히이라기 마이아가 섹스하고 있을 거라곤 다들 생각 못 하겠지~」"

[[dialogue]]
speaker = "舞亜"
original = "「ふぁ……あ、はんっ……もちろん私と会長さんがこういう関係になってることは秘密だよ<emoji=heart04>」"
translation = "「후아…… 아, 하앙…… 물론 나랑 회장님이 이런 관계라는 건 비밀이야<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "舞亜は有名人のため、余計な詮索を避けるために俺たちが恋人になっていることはシークレット。星徒会のみんなにも知らせていない。"
translation = "마이아는 유명인이기에, 불필요한 추측을 피하고자 우리가 연인이라는 사실은 비밀이다. 성도회 동료들에게도 알리지 않았다."

[[dialogue]]
speaker = "unk"
original = "だからこうしてお互い時間の合間を縫って密会していた。"
translation = "그래서 이렇게 서로 시간 틈틈이 밀회를 즐기고 있었다."

[[dialogue]]
speaker = "舞亜"
original = "「んぁ……はぁ……私でエッチな想像してる人はけっこういるかもしれないけど、本当にエッチしたのは会長さんだけだよ」"
translation = "「응아…… 하아…… 나로 야한 상상을 하는 사람은 꽤 있을지도 모르지만, 진짜로 섹스한 건 회장님뿐이야.」"

[[dialogue]]
speaker = "舞亜"
original = "「世界一の美少女フィギュアスケーターのおま○こにおち○ちん入れてる気分はどう？\u3000興奮する？」"
translation = "「세계 제일의 미소녀 피겨 스케이팅 선수의 보지에 자지 넣고 있는 기분은 어때? 흥분돼?」"

[[dialogue]]
speaker = "舞亜"
original = "「んんっ……<emoji=heart04>\u3000おち○ちん、私の中でビクってした。体は正直だね」"
translation = "「응읏……<emoji=heart04> 자지, 내 안에서 움찔거렸어. 몸은 솔직하네.」"

[[dialogue]]
speaker = "unk"
original = "舞亜はこの国の……いや世界のアイドル的存在で、そんな彼女を独占して興奮しないはずがない。"
translation = "마이아는 이 나라의…… 아니 세계적인 아이돌 같은 존재로, 그런 그녀를 독점하며 흥분하지 않을 리가 없다."

[[dialogue]]
speaker = "舞亜"
original = "「いいよ……私の初めてを奪ったおち○ちん、いっぱい刻み付けてっ……ふぁ、はぁ……あ──あ──んんっ<emoji=heart04>」"
translation = "「좋아…… 내 처음을 가져간 자지, 잔뜩 새겨줘…… 후아, 하아…… 아── 아── 응읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "舞亜を俺のものにしたという証がもっと欲しくなって、下半身を打ち付ける力が強くなる。"
translation = "마이아를 내 것으로 만들었다는 증거를 더 갖고 싶어져서, 하반신을 부딪치는 힘이 강해진다."

[[dialogue]]
speaker = "舞亜"
original = "「ひぁああっ、あんっ……<emoji=heart04>\u3000はぁ、はぁ……おま○ことおち○ちん擦れて、気持ちいい……はぁっ、あっ……<emoji=heart04>」"
translation = "「히아아앗, 앙……<emoji=heart04> 하아, 하아…… 보지랑 자지가 쓸려서, 기분 좋아…… 하앗, 앗……<emoji=heart04>」"

[[dialogue]]
speaker = "舞亜"
original = "「ふああっ……はっ、はっ、はんっ……<emoji=heart04>\u3000会長さんのおち○ちん、好きぃ……あっ、はぁっ……ひああぁっ……<emoji=heart04>」"
translation = "「후아앗…… 핫, 핫, 하앙……<emoji=heart04> 회장님 자지, 좋아아…… 앗, 하앗…… 히아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "世界中の人々を魅了していた彼女が、俺の前では卑猥な言葉で喘ぐ。"
translation = "전 세계 사람들을 매료하던 그녀가, 내 앞에서는 음란한 말로 신음한다."

[[dialogue]]
speaker = "舞亜"
original = "「あっ……はっ……ああぁんっ<emoji=heart04>\u3000おち○ちん、奥に届いて……あっ、あっ……コツコツって当たってるぅっ……<emoji=heart04>\u3000ふぁっ、はぁんっ……<emoji=heart04>」"
translation = "「앗…… 핫…… 아아앙잇<emoji=heart04> 자지, 깊숙이 닿아줘…… 앗, 앗…… 툭툭 하고 닿고 있어어……<emoji=heart04> 후앗, 하앙……<emoji=heart04>」"

[[dialogue]]
speaker = "舞亜"
original = "「ズボズボされて……はっ、あ……はぁ、はぁ、あんっ……おち○ちん、すごい……ふぁっ……んん～～～っ<emoji=heart04>」"
translation = "「퍽퍽 박혀서…… 핫, 아…… 하아, 하아, 앙…… 자지, 굉장해…… 후앗…… 응으으으읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リンクの上でのパフォーマンスからは想像できない淫らな姿。"
translation = "링크 위에서의 퍼포먼스로는 상상할 수 없는 음란한 모습."

[[dialogue]]
speaker = "unk"
original = "でもこれも舞亜の素顔のひとつで、俺だけが知っている。"
translation = "하지만 이것도 마이아의 본모습 중 하나이며, 나만이 알고 있다."

[[dialogue]]
speaker = "クロト"
original = "「舞亜、エッチな顔になってる」"
translation = "「마이아, 야한 표정이 됐어.」"

[[dialogue]]
speaker = "舞亜"
original = "「そういうの、言わないのがマナーでしょ……はあぁ、はんっ……はぁ……あっ、んっ──ふぁああっ<emoji=heart04>」"
translation = "「그런 거, 말 안 하는 게 매너잖아…… 하아아, 하앙…… 하아…… 앗, 응── 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "舞亜"
original = "「でもいいよ……はぁ……んっ……全部見て……綺麗なところも、かっこいいところも、エッチなところも、会長さんに見せてあげる<emoji=heart04>」"
translation = "「하지만 좋아…… 하아…… 응…… 전부 봐줘…… 예쁜 모습도, 멋진 모습도, 야한 모습도, 회장님한테 보여줄게<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "全てをさらけ出してくれるのは俺だけ。"
translation = "모든 것을 드러내 주는 것은 나뿐."

[[dialogue]]
speaker = "unk"
original = "舞亜が俺をそんな特別な存在に選んでくれたことが嬉しい。"
translation = "마이아가 나를 그런 특별한 존재로 선택해 준 것이 기쁘다."

[[dialogue]]
speaker = "舞亜"
original = "「あっ、はぁ……あぁんっ……<emoji=heart04>\u3000そこ、いい……気持ちいとこ当たってる……ふぁああっ<emoji=heart04>\u3000あ……はっ……んっ……はぁ、はぁっ……<emoji=heart04>」"
translation = "「앗, 하아…… 아앙잇……<emoji=heart04> 거기, 좋아…… 기분 좋은 곳에 닿고 있어…… 후아아앗<emoji=heart04> 아…… 핫…… 응…… 하아, 하앗……<emoji=heart04>」"

[[dialogue]]
speaker = "舞亜"
original = "「ひああっ……はっ……あ、んんっ……<emoji=heart04>\u3000おま○こ蕩けちゃいそう……ん……はぁっ、はっ……あ、あ──あああっ<emoji=heart04>」"
translation = "「히아앗…… 핫…… 아, 응읏……<emoji=heart04> 보지 녹아버릴 것 같아…… 응…… 하앗, 핫…… 아, 아── 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "だからこの幸せを存分に味わわせてもらおう。"
translation = "그러니 이 행복을 마음껏 맛보기로 하자."

[[dialogue]]
speaker = "unk"
original = "白い肌にくびれた腰、丸いお尻、すらりと伸びた足……フィギュアスケートで鍛えられた極上の肉体も今は俺のものだ。"
translation = "하얀 피부에 잘록한 허리, 둥근 엉덩이, 매끄럽게 뻗은 다리…… 피겨 스케이팅으로 단련된 극상의 육체도 지금은 내 것이다."

[[dialogue]]
speaker = "舞亜"
original = "「あんっ……はぁっ、はぁっ……はぁ、はんっ……<emoji=heart04>\u3000会長さん……会長さん……はぁはぁ……あっ……ふぁああ～～っ<emoji=heart04>」"
translation = "「앙…… 하앗, 하앗…… 하아, 하앙……<emoji=heart04> 회장님…… 회장님…… 하아하아…… 앗…… 후아아아~~앗<emoji=heart04>」"

[[dialogue]]
speaker = "舞亜"
original = "「会長さんの熱いの感じて、幸せ……だから……いっぱい感じてっ……はぁっ、あん<emoji=heart04>\u3000私のこと、いっぱい、いっぱい……感じてぇ……<emoji=heart04>」"
translation = "「회장님의 뜨거운 거 느껴져서, 행복해…… 그러니까…… 잔뜩 느껴줘…… 하앗, 앙<emoji=heart04> 나를, 잔뜩, 잔뜩…… 느껴줘어……<emoji=heart04>」"

[[dialogue]]
speaker = "舞亜"
original = "「はぁっ、はぁっ……あ──んんっ──<emoji=heart04>\u3000はっ、あっ──はあぁっ<emoji=heart04>\u3000あっ──ふぁ──ああぁ～～～～っ<emoji=heart04>」"
translation = "「하앗, 하앗…… 아── 응읏──<emoji=heart04> 핫, 앗── 하아앗<emoji=heart04> 앗── 후아── 아아아~~~~앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "まるで芸術品みたいな、氷の彫像めいた肉体美が俺を魅了する。"
translation = "마치 예술품 같은, 얼음 조각상 같은 육체미가 나를 매료한다."

[[dialogue]]
speaker = "unk"
original = "だけど触れればこんなにも温かくて、柔らかそうな胸が揺れると否応なく男の本能を刺激された。"
translation = "하지만 만지면 이렇게나 따뜻하고, 부드러워 보이는 가슴이 흔들리자 어쩔 수 없이 남자의 본능이 자극되었다."

[[dialogue]]
speaker = "舞亜"
original = "「はぁ……あ……あん──ふあ～～っ<emoji=heart04>\u3000おち○ちん大きくて、いっぱい擦れる……ふぁ──あ──はぁんっ<emoji=heart04>」"
translation = "「하아…… 아…… 앙── 후아~~앗<emoji=heart04> 자지 커서, 잔뜩 쓸려…… 후아── 아── 하앙잇<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「顔も声もすごいエッチだ」"
translation = "「얼굴도 목소리도 엄청 야해.」"

[[dialogue]]
speaker = "舞亜"
original = "「会長さんが私をこんなにしたんだよ。あ……はぁっ、はぁっ……会長さんといっぱいエッチして、エッチな女の子になったんだから」"
translation = "「회장님이 나를 이렇게 만든 거야. 아…… 하앗, 하앗…… 회장님이랑 잔뜩 섹스해서, 야한 여자애가 됐으니까.」"

[[dialogue]]
speaker = "舞亜"
original = "「はぁ、はぁ、はんっ……会長さんのおち○ちん好き……<emoji=heart04>\u3000おま○こズンズンされてるっ……はあぁ……あんっ……はぁんっ……<emoji=heart04>」"
translation = "「하아, 하아, 하앙…… 회장님 자지 좋아……<emoji=heart04> 보지 퍽퍽 박히고 있어…… 하아아…… 앙…… 하앙……<emoji=heart04>」"

[[dialogue]]
speaker = "舞亜"
original = "「でも……ストレッチだから、もっとほぐして……んはぁ、はっ、はぁっ……もっと柔らかくしてぇ……<emoji=heart04>」"
translation = "「하지만…… 스트레칭이니까, 더 풀어줘…… 응하아, 핫, 하앗…… 더 부드럽게 해줘어……<emoji=heart04>」"

[[dialogue]]
speaker = "舞亜"
original = "「ふはぁ、はぁ、はぁ……私のおま○こ、会長さんのおち○ちんの形にして……<emoji=heart04>\u3000激しくしてっ……<emoji=heart04>\u3000もっと会長さんのものにしてぇっ……<emoji=heart04>」"
translation = "「후하아, 하아, 하아…… 내 보지, 회장님 자지 모양으로 만들어줘……<emoji=heart04> 격렬하게 해줘……<emoji=heart04> 더 회장님 것으로 만들어줘어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そこまで求められて情欲を抑えられるわけがなく、全力でペニスを打ち込む。"
translation = "그렇게까지 원하는데 정욕을 억누를 수 있을 리가 없어, 전력으로 페니스를 박아 넣는다."

[[dialogue]]
speaker = "舞亜"
original = "「ひやぁあああああ～～～っ<emoji=heart04>\u3000そう……激しく……はっ、あっ──あ、あ、あ、あ──あんっ<emoji=heart04>」"
translation = "「히야아아아아아~~앗<emoji=heart04> 그래…… 격렬하게…… 핫, 앗── 아, 아, 아, 아── 앙잇<emoji=heart04>」"

[[dialogue]]
speaker = "舞亜"
original = "「あ……すご、いっ……<emoji=heart04>\u3000ふぁっ……あっ、あっ、あんっ……<emoji=heart04>\u3000はぁはっ、はっ、はぁ……ふぁああっ──はっ──んんん～～っ<emoji=heart04>」"
translation = "「아…… 굉장, 해……<emoji=heart04> 후앗…… 앗, 앗, 앙……<emoji=heart04> 하아핫, 핫, 하아…… 후아아앗── 핫── 응응응~~잇<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "力強く突き上げる度に舞亜の体が震える。"
translation = "힘차게 밀어 올릴 때마다 마이아의 몸이 떨린다."

[[dialogue]]
speaker = "unk"
original = "膣壁がぶるぶると痙攣し、寒気にも似た快感が背筋をゾクリと駆け抜けた。"
translation = "질벽이 파르르 경련하고, 오한과도 비슷한 쾌감이 등줄기를 오싹하게 스쳐 지나갔다."

[[dialogue]]
speaker = "舞亜"
original = "「あ──あっ、あっ──あぁんっ……<emoji=heart04>\u3000お腹の奥、熱い……はぁ……子宮疼いて、おかしくなりそうっ……んぁ──はあぁっ<emoji=heart04>」"
translation = "「아── 앗, 앗── 아아앙잇……<emoji=heart04> 배 안쪽, 뜨거워…… 하아…… 자궁이 욱신거려서, 이상해질 것 같아…… 응아── 하아앗<emoji=heart04>」"

[[dialogue]]
speaker = "舞亜"
original = "「あっ、はっ、あっ──んんっ<emoji=heart04>\u3000頭、真っ白に、なるっ……ふっ……んっ……は―ああぁ～～っ<emoji=heart04>」"
translation = "「앗, 핫, 앗── 응읏<emoji=heart04> 머릿속이, 하얘, 져…… 훗…… 응…… 하─ 아아아~~앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "舞亜も足を大きく上げたまま、自分から腰を揺らして快楽を貪る。"
translation = "마이아도 다리를 크게 올린 채, 스스로 허리를 흔들며 쾌락을 탐한다."

[[dialogue]]
speaker = "舞亜"
original = "「はぁっ、はっ、はっ……ふぁああっ<emoji=heart04>\u3000イクっ……イッちゃうっ……んっ、はぁ……イクイク、イクぅっ<emoji=heart04>」"
translation = "「하앗, 핫, 핫…… 후아아앗<emoji=heart04> 가버려…… 가버렷…… 응, 하아…… 가버려 가버려, 가버려엇<emoji=heart04>」"

[[dialogue]]
speaker = "舞亜"
original = "「ふっ、んっ……はぁ、はぁ……んぁっ、はあぁ～っ<emoji=heart04>\u3000ダメ……ダメ……あっ、あ──イクっ──イッくぅ～～っ<emoji=heart04>」"
translation = "「훗, 응…… 하아, 하아…… 응앗, 하아아~앗<emoji=heart04> 안 돼…… 안 돼…… 앗, 아── 가버려── 가버려어~~엇<emoji=heart04>」"

[[dialogue]]
speaker = "舞亜"
original = "「んん～～～～～～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「응으으으으으으으으으읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "軽く絶頂した瞬間膣が収縮し、粘膜が隙間なく密着してペニスを絞った。"
translation = "가볍게 절정에 달한 순간 질이 수축하며, 점막이 빈틈없이 밀착되어 페니스를 조였다."

[[dialogue]]
speaker = "unk"
original = "限界が近づくのを感じながら、荒々しく奥を突き続ける。"
translation = "한계가 다가오는 것을 느끼며, 거칠게 안쪽을 계속 찌른다."

[[dialogue]]
speaker = "舞亜"
original = "「んんんっ……<emoji=heart04>\u3000イッてるのに、まだおち○ちん動いてっ……あっ、あっ……あぁんっ……<emoji=heart04>\u3000はあぁ……はっ、はっ……ダメっ……すごすぎ……<emoji=heart04>」"
translation = "「응응응읏……<emoji=heart04> 가고 있는데, 아직 자지 움직여서…… 앗, 앗…… 아아앙잇……<emoji=heart04> 하아아…… 핫, 핫…… 안 돼…… 너무 굉장해……<emoji=heart04>」"

[[dialogue]]
speaker = "舞亜"
original = "「あ、あ、あ──またイッちゃうぅっ……<emoji=heart04>\u3000はぁっ、はぁっ、はんっ……はっ……はぁっ、あ──んんあぁあああっ<emoji=heart04>」"
translation = "「아, 아, 아── 또 가버려어……<emoji=heart04> 하앗, 하앗, 하앙…… 핫…… 하앗, 아── 응응아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "舞亜"
original = "「やばいっ……イキすぎっ……<emoji=heart04>\u3000私のおま○こ、ほんとに会長さん専用にされちゃってるぅ……<emoji=heart04>\u3000はっ、はっ……は──ああぁんっ<emoji=heart04>」"
translation = "「위험해…… 너무 가버려……<emoji=heart04> 내 보지, 정말로 회장님 전용이 되어버리고 있어어……<emoji=heart04> 핫, 핫…… 하── 아아아앙잇<emoji=heart04>」"

[[dialogue]]
speaker = "舞亜"
original = "「はっ、あっ……おち○ちんドクドクして、出そうなんだね……んんっ……<emoji=heart04>\u3000あ、あ……んっ……出して、私の中に出してぇ<emoji=heart04>」"
translation = "「핫, 앗…… 자지 움찔움찔해서, 나올 것 같네…… 응읏……<emoji=heart04> 아, 아…… 응…… 싸줘, 내 안에 싸줘어<emoji=heart04>」"

[[dialogue]]
speaker = "舞亜"
original = "「会長さんの精液……いっぱい注いでっ……んぁ、はぁ……会長さんのものだって、私の体に教えてっ<emoji=heart04>」"
translation = "「회장님 정액…… 잔뜩 부어줘…… 응아, 하아…… 회장님 것이라고, 내 몸에 가르쳐줘어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "舞亜の訴えに応えてラストスパートをかける。"
translation = "마이아의 호소에 응해 라스트 스퍼트를 올린다."

[[dialogue]]
speaker = "舞亜"
original = "「ふぅ、はぁ……はっ、あ、あ、あっ──あんっ<emoji=heart04>\u3000おま○こ、壊れちゃいそうっ……んはっ、あっ……はっ、あっ、あっ──ひぁああ～～っ<emoji=heart04>」"
translation = "「후우, 하아…… 핫, 아, 아, 앗── 앙잇<emoji=heart04> 보지, 망가져 버릴 것 같아…… 응핫, 앗…… 핫, 앗, 앗── 히아아아~~앗<emoji=heart04>」"

[[dialogue]]
speaker = "舞亜"
original = "「あ、あ、あ……おち○ちん、すごいっ……またビクビクしてるぅっ<emoji=heart04>\u3000来る、来る……熱いの、奥に出されちゃうっ<emoji=heart04>」"
translation = "「아, 아, 아…… 자지, 굉장해…… 또 움찔움찔하고 있어어…… 핫, 온다, 온다…… 뜨거운 거, 깊숙이 싸버려어<emoji=heart04>」"

[[dialogue]]
speaker = "舞亜"
original = "「あっ、はっ、はっ、はっ……またイクっ……イッちゃうぅっ<emoji=heart04>\u3000あっ……はぁっ……イクイクぅっ──ふ──んんんっ──<emoji=heart04>」"
translation = "「앗, 핫, 핫, 핫…… 또 가버려…… 가버려어…… 앗…… 하앗…… 가버려 가버려어── 후── 응응응읏──<emoji=heart04>」"

[[dialogue]]
speaker = "舞亜"
original = "「ふぁあああああ～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아아아~~~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "舞亜"
original = "「あ……熱いのがドクドクって……会長さんのせーえき、私の中に出てる……<emoji=heart04>\u3000びゅーって、奥にたくさん……ふぁ……ああぁ～～っ<emoji=heart04>」"
translation = "「아…… 뜨거운 게 울컥울컥하고…… 회장님의 정자, 내 안에 나오고 있어……<emoji=heart04> 뷰릇 하고, 안쪽에 잔뜩…… 후아…… 아아아~~앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "舞亜の中でペニスが脈打ち、ドクドクと子宮に精を注ぎ込む。"
translation = "마이아의 안에서 페니스가 맥동하며, 울컥울컥 자궁에 정을 쏟아붓는다."

[[dialogue]]
speaker = "unk"
original = "ただでさえ締め付けの強い膣がさらにきつく収縮して、ペニスを圧迫して精液を搾り取る。"
translation = "안 그래도 조임이 강한 질이 더욱 세게 수축하며, 페니스를 압박해 정액을 짜낸다."

[[dialogue]]
speaker = "舞亜"
original = "「おま○こ射精されながら、イッて……あっ、んんっ……<emoji=heart04>\u3000はあぁ……はぁ……あ、あ、ああ──んんぅ～～～～っ<emoji=heart04>」"
translation = "「보지 사정당하면서, 가버려서…… 앗, 응읏……<emoji=heart04> 하아아…… 하아…… 아, 아, 아아── 응응으~~~~읏<emoji=heart04>」"

[[dialogue]]
speaker = "舞亜"
original = "「まだ出てるぅ……ん……あ……はぁん……<emoji=heart04>\u3000はぁ、はぁ……はあぁ……中に出されるの、すごい……<emoji=heart04>」"
translation = "「아직 나오고 있어어…… 응…… 아…… 하앙……<emoji=heart04> 하아, 하아…… 하아아…… 안에 싸이는 거, 굉장해……<emoji=heart04>」"

[[dialogue]]
speaker = "舞亜"
original = "「はぁ……たくさん出したね。お腹の中、会長さんのでいっぱい……まだ熱いや」"
translation = "「하아…… 잔뜩 냈네. 배 안, 회장님 것으로 가득해…… 아직 뜨거워.」"

[[dialogue]]
speaker = "舞亜"
original = "「ん……<emoji=heart04>\u3000会長さんの精液溢れてる。すごいエッチ」"
translation = "「응……<emoji=heart04> 회장님 정액 넘쳐흐르고 있어. 정말 야해.」"

[[dialogue]]
speaker = "unk"
original = "膣口から白い精液がどろりと垂れてくる。"
translation = "질 입구에서 하얀 정액이 주르륵 흘러내린다."

[[dialogue]]
speaker = "unk"
original = "舞亜の綺麗な肌すら俺で染めるみたいで、とても淫猥な光景だった。"
translation = "마이아의 고운 피부조차 나로 물들이는 것 같아, 무척 음란한 광경이었다."

[[dialogue]]
speaker = "舞亜"
original = "「中に出されるの、癖になっちゃいそう……ていうか、もうなってるかも。子宮の中に熱いのが広がって、すごく気持ちいいんだ」"
translation = "「안에 싸이는 거, 버릇이 되어버릴 것 같아…… 아니, 이미 됐을지도. 자궁 안에 뜨거운 게 퍼져서, 정말 기분 좋아.」"

[[dialogue]]
speaker = "舞亜"
original = "「会長さんは有名人のおま○こに中出しするの気持ち良かった？」"
translation = "「회장님은 유명인 보지에 질내사정 하는 거 기분 좋았어?」"

[[dialogue]]
speaker = "クロト"
original = "「有名人だからじゃなくて、舞亜だからだよ」"
translation = "「유명인이라서가 아니라, 마이아이기 때문이야.」"

[[dialogue]]
speaker = "舞亜"
original = "「嬉しいこと言ってくれるね、会長さんのそういうとこ好きだよ。でもやっぱり気持ち良かったんだ」"
translation = "「기쁜 말을 해주네, 회장님의 그런 점이 좋아. 하지만 역시 기분 좋았구나.」"

[[dialogue]]
speaker = "舞亜"
original = "「ずいぶんハードなストレッチになっちゃったね。……あ、残念だけどそろそろ練習行く時間だ」"
translation = "「꽤 하드한 스트레칭이 되어버렸네. ……아, 아쉽지만 슬슬 연습 갈 시간이야.」"

[[dialogue]]
speaker = "unk"
original = "大会が近づくと、２人きりになる時間がほとんどとれないくらい忙しい。"
translation = "대회가 다가오면, 둘이서만 있을 시간이 거의 없을 정도로 바쁘다."

[[dialogue]]
speaker = "unk"
original = "だけど――"
translation = "하지만──"

[[dialogue]]
speaker = "舞亜"
original = "「んっちゅ……ちゅっ、れろれろ……はぁ、んれろ、れろ<emoji=heart04>」"
translation = "「응츄…… 츄릅, 레로레로…… 하아, 응레로, 레로<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "どちらからともなく唇を重ねる。"
translation = "누가 먼저랄 것도 없이 입술을 겹친다."

[[dialogue]]
speaker = "unk"
original = "もう時間だっていうのに、名残惜しくてなかなか離れられないでいた。"
translation = "이제 시간인데도, 아쉬움에 좀처럼 떨어지지 못하고 있었다."

[[dialogue]]
speaker = "舞亜"
original = "「もう……ダメなのに、もっと好きになっちゃう……ちゅくっ、ちゅぱっ……んっちゅ<emoji=heart04>」"
translation = "「정말…… 안 되는데, 더 좋아하게 되어버려…… 츄르릅, 츄릅…… 응츄<emoji=heart04>」"

[[dialogue]]
speaker = "舞亜"
original = "「んちゅっ、ちゅっ、ちゅれろ……じゅるっ、じゅるるるっ<emoji=heart04>\u3000んちゅるっ、ちゅるちゅる……んふ、れぇろ、へろ……んちゅっ、ちゅぱっ<emoji=heart04>」"
translation = "「응츄, 츄, 츄레로…… 쥬릅, 쥬르르릅<emoji=heart04> 응츄릅, 츄르츄르…… 응후, 레에로, 헤로…… 응츄, 츄릅<emoji=heart04>」"

[[dialogue]]
speaker = "舞亜"
original = "「んちゅくっ、ちゅぅっ……じゅりゅ……じゅりゅ……じゅるるる──ぷはぁ<emoji=heart04>\u3000キスごちそうさま<emoji=heart04>」"
translation = "「응츄릅, 츄우…… 쥬류…… 쥬류…… 쥬르르르── 푸하아<emoji=heart04> 키스 잘 먹었습니다<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ねっとりと溶け合うようなキスをして、唾液の糸を結びながら唇が離れた。"
translation = "끈적하게 녹아드는 듯한 키스를 하고, 타액의 실을 맺으며 입술이 떨어졌다."

[[dialogue]]
speaker = "舞亜"
original = "「フィギュアスケートの選手寿命はそんなに長くない。前は引退も考えてたけど……私は滑れなくなるまでやるつもりだよ」"
translation = "「피겨 스케이팅 선수의 수명은 그렇게 길지 않아. 전에는 은퇴도 생각했었지만…… 나는 미끄러질 수 없을 때까지 할 생각이야.」"

[[dialogue]]
speaker = "舞亜"
original = "「でも引退したらもっとエッチしようね。会長さんといっぱい気持ちいいことしたいな」"
translation = "「하지만 은퇴하면 더 섹스하자. 회장님이랑 잔뜩 기분 좋은 일 하고 싶어.」"

[[dialogue]]
speaker = "舞亜"
original = "「ふふ……じゃ、またよろしくね」"
translation = "「후후…… 그럼, 또 잘 부탁해.」"

