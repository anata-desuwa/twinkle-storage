[[dialogue]]
speaker = "unk"
original = "ナミエルとアムの二人三脚生活が始まってからしばらく経ち、クリスマスイブになった。"
translation = "나미엘과 아무의 이인삼각 생활이 시작된 지 꽤 시간이 흘러, 크리스마스 이브가 되었다."

[[dialogue]]
speaker = "アム"
original = "「あっ、会長だ！\u3000こんにちは～♪」"
translation = "「앗, 회장이다! 안녕~♪」"

[[dialogue]]
speaker = "unk"
original = "昼休みの時間になり、俺が大聖堂カフェテリアへと向かうと、一緒に昼食をしているアム達を見かけて、声をかける。"
translation = "점심시간이 되어 내가 대성당 카페테리아로 향하자, 함께 점심을 먹고 있는 아무 일행을 발견해 말을 건다."

[[dialogue]]
speaker = "ナミエル"
original = "「ごきげんよう。会長も昼食ですか？」"
translation = "「평안하신지요. 회장님도 점심 식사 중이신가요?」"

[[dialogue]]
speaker = "スノーマン"
original = "「会長だ～♪」"
translation = "「회장이다~♪」"

[[dialogue]]
speaker = "unk"
original = "俺にも姿が見えるようになったスノーマンが、声は聞こえないものの、身振り手振りで挨拶してくれる。"
translation = "나에게도 모습이 보이게 된 스노맨이, 목소리는 들리지 않지만 몸짓 발짓으로 인사를 해준다."

[[dialogue]]
speaker = "unk"
original = "あれから近況はどんな感じ？"
translation = "그 후로 근황은 좀 어때?"

[[dialogue]]
speaker = "ナミエル"
original = "「そうですね……スノーマンの記憶は、残念ながらまだ戻っていなくて、クリスマスフォームも解除できないままです」"
translation = "「글쎄요…… 스노맨의 기억은 아쉽게도 아직 돌아오지 않았고, 크리스마스 폼도 해제하지 못한 채 그대로입니다.」"

[[dialogue]]
speaker = "アム"
original = "「おかげで、この衣装のままで過ごすのもそうだけど、ナミエルやスノーマンとの共同生活にも、すっかり慣れちゃったよ～。あははっ♪」"
translation = "「덕분에 이 의상 그대로 지내는 것도 그렇지만, 나미엘이나 스노맨과의 공동생활에도 완전히 익숙해져 버렸어~. 아하핫♪」"

[[dialogue]]
speaker = "アム"
original = "「あっ、そうだ！\u3000会長、聞いて聞いて！\u3000あたし、今の状態で色々試してみたんだけど、１つ面白い発見をしてさ～」"
translation = "「앗, 맞다! 회장, 들어봐 들어봐! 나, 지금 상태에서 이것저것 시도해 봤는데, 한 가지 재미있는 발견을 했거든~」"

[[dialogue]]
speaker = "アム"
original = "「なんと！\u3000クリスマスフォームの解除はできないけど、衣装を脱ぐことはできるっていうのが判明したんだよ～！」"
translation = "「무려! 크리스마스 폼의 해제는 불가능하지만, 의상을 벗는 것은 가능하다는 게 판명됐어~!」"

[[dialogue]]
speaker = "unk"
original = "解除できないのに脱げるってどういうこと？"
translation = "해제할 수 없는데 벗을 수 있다는 게 무슨 소리야?"

[[dialogue]]
speaker = "アム"
original = "「例えばね～、どこか１箇所だけ――あたしのクリスマスフォームだと、トナカイの角飾りだけ残しておくとするじゃん？」"
translation = "「예를 들면 말이야~, 딱 한 군데만―― 내 크리스마스 폼이라면 루돌프 뿔 장식만 남겨둔다고 치자?」"

[[dialogue]]
speaker = "アム"
original = "「で、そうすると、他は全部脱いですっぽんぽんの裸になったとしても、短時間であれば変身状態が維持されてる判定になる、ってことがわかったんだ！」"
translation = "「그러면 다른 데를 전부 벗어서 알몸이 된다고 해도, 짧은 시간이라면 변신 상태가 유지되고 있는 판정이 된다는 걸 알게 됐어!」"

[[dialogue]]
speaker = "アム"
original = "「そのおかげで、あたし達はお風呂にも入って、体を洗うことができるようになったんだよ！\u3000ね、ナミエル♪」"
translation = "「그 덕분에 우리는 목욕도 하고 몸을 씻을 수도 있게 됐지! 그치, 나미엘♪」"

[[dialogue]]
speaker = "ナミエル"
original = "「そ、そういうことはいちいち会長に報告しなくていいですから！」"
translation = "「그, 그런 것까지 일일이 회장님께 보고하지 마세요!」"

[[dialogue]]
speaker = "ナミエル"
original = "「ちなみに、会長！\u3000それに気づくまでは確かに入浴はしていませんでしたけど、クリスマスフォームの力で体は清潔に保護されていましたから！」"
translation = "「참고로 회장님! 그걸 깨닫기 전까지는 확실히 입욕을 하지 않았지만, 크리스마스 폼의 힘으로 몸은 청결하게 보호되고 있었습니다!」"

[[dialogue]]
speaker = "ナミエル"
original = "「なので、綺麗じゃない状態で学園に通っていた期間は存在しないので、そこのところ覚えておいて下さいね？」"
translation = "「그러니까 깨끗하지 않은 상태로 학원에 다니던 기간은 존재하지 않으니, 그 부분은 꼭 기억해 주세요.」"

[[dialogue]]
speaker = "ナミエル"
original = "「い・い・で・す・ね？」"
translation = "「아·시·겠·죠?」"

[[dialogue]]
speaker = "unk"
original = "ナミエルさんはいつも清潔です……！"
translation = "나미엘 양은 언제나 청결하군요……!"

[[dialogue]]
speaker = "unk"
original = "アッ、ハイ！"
translation = "아, 예!"

[[dialogue]]
speaker = "ナミエル"
original = "「わかればいいです」"
translation = "「알았으면 됐습니다.」"

[[dialogue]]
speaker = "アム"
original = "「いや～、でも、１メートル以上離れられないのは不便だけどさ。おかげで家族みたいに、仲は深まったよね～♪」"
translation = "「에이~ 그래도 1미터 이상 떨어질 수 없는 건 불편하지만 말이야. 덕분에 가족처럼 사이는 돈독해졌지~♪」"

[[dialogue]]
speaker = "アム"
original = "「一緒にお風呂に入ったし～、寝る時も毎日一緒のベッドだし。あとこの前は、お母さんへの状況説明もかねて、１回あたしの家にも泊まることになったんだけど～」"
translation = "「같이 목욕도 했고~, 잘 때도 매일 같은 침대고. 그리고 저번에는 엄마한테 상황 설명도 할 겸 해서 한 번 우리 집에서도 자고 가기로 했었는데~」"

[[dialogue]]
speaker = "アム"
original = "「お母さんがナミエルと会ったら、あたしに妹が出来たみたいだって、喜んじゃったんだよね～♪\u3000ね？」"
translation = "「우리 엄마가 나미엘을 만나더니, 나한테 여동생이 생긴 것 같다고 엄청 좋아하시더라니까~♪ 그치?」"

[[dialogue]]
speaker = "ナミエル"
original = "「ま、まぁ、アム先輩のお母さんはすごく可愛い人でしたけど……」"
translation = "「뭐, 뭐…… 아무 선배님 어머님은 굉장히 귀여운 분이셨지만요……」"

[[dialogue]]
speaker = "スノーマン"
original = "「アムの家に泊まるの、楽しかった♪」"
translation = "「아무네 집에서 자는 거, 즐거웠어♪」"

[[dialogue]]
speaker = "アム"
original = "「ナミエル、抱き着き癖があってさ～。あたしの家に泊まると思ってなかったから、抱き枕の代わりに、あたしに抱き着いてきて～♪」"
translation = "「나미엘, 끌어안는 버릇이 있어서 말이야~. 우리 집에서 잘 줄 몰랐으니까, 죽부인 대신 나한테 매달려와서~♪」"

[[dialogue]]
speaker = "ナミエル"
original = "「わー！\u3000わーっ！\u3000それは言わないで下さいっ！\u3000処しますよ！？」"
translation = "「와아! 와앗! 그건 말하지 마세요! 처단할 거예요!?」"

[[dialogue]]
speaker = "unk"
original = "すっかり仲良しになったみたいだな"
translation = "완전히 단짝이 된 모양이네."

[[dialogue]]
speaker = "アム"
original = "「えへへっ、まるで姉妹みたいでしょ～？」"
translation = "「에헤헤, 마치 자매 같지~?」"

[[dialogue]]
speaker = "ナミエル"
original = "「いや、アム先輩と姉妹はちょっと……」"
translation = "「아니, 아무 선배님이랑 자매는 좀……」"

[[dialogue]]
speaker = "アム"
original = "「え～？\u3000ナミエルってば、もう照れちゃって～♪」"
translation = "「에~? 나미엘도 참, 벌써 쑥스러워하기는~♪」"

[[dialogue]]
speaker = "ナミエル"
original = "「照れてないですっ！\u3000というか、そういうアム先輩だって、子供っぽいところが色々あるじゃないですか」"
translation = "「쑥스러워하는 거 아닙니다! 그보다 그런 아무 선배님이야말로 어린애 같은 면이 이것저것 있잖아요.」"

[[dialogue]]
speaker = "ナミエル"
original = "「たとえば、お化けが苦手で、部屋の電気を完全に暗くしてると、夜眠れないとか……」"
translation = "「예를 들면, 귀신을 무서워해서 방 불을 완전히 끄면 밤에 잠을 못 잔다거나……」"

[[dialogue]]
speaker = "アム"
original = "「はぁっ！？\u3000べ、別に怖くないし！\u3000寝る時に豆電球点けとくのは、昔からの習慣ってだけだし……！」"
translation = "「하앗!? 별, 별로 안 무섭거든! 잘 때 취침등 켜두는 건 어릴 때부터의 습관일 뿐이고……!」"

[[dialogue]]
speaker = "ナミエル"
original = "「そうですか？\u3000他には――」"
translation = "「그렇습니까? 그 외에도――」"

[[dialogue]]
speaker = "アム"
original = "「そそそ、そんなことより！\u3000明日の流星寮のクリスマスパーティー、楽しみだね～！\u3000会長も参加するんでしょ？」"
translation = "「그그그, 그런 것보다! 내일 유성 기숙사 크리스마스 파티, 기대된다~! 회장님도 참가하는 거지?」"

[[dialogue]]
speaker = "ナミエル"
original = "「誤魔化しましたね。じ～っ……」"
translation = "「말을 돌리시는군요. 지~익……」"

[[dialogue]]
speaker = "unk"
original = "流星寮のパーティーに参加するよ"
translation = "유성 기숙사 파티에 참가할 거야."

[[dialogue]]
speaker = "unk"
original = "俺も声をかけてもらってるから"
translation = "나도 초대를 받았거든."

[[dialogue]]
speaker = "アム"
original = "「ナミエルも参加するよね？\u3000まあ、物理的に離れられないから、あたし的には一緒に来てくれないと困るけど～」"
translation = "「나미엘도 참가할 거지? 뭐, 물리적으로 떨어질 수 없으니까, 내 입장에서는 같이 안 와주면 곤란하지만~」"

[[dialogue]]
speaker = "ナミエル"
original = "「……そうですね。附属校の一員として、参加すべきだと思っています」"
translation = "「……그렇네요. 부속교의 일원으로서, 참가해야 한다고 생각합니다.」"

[[dialogue]]
speaker = "アム"
original = "（ん？\u3000あれ……？\u3000ナミエル、なんか今一瞬、間があったような……？）"
translation = "（응? 어라……? 나미엘, 방금 순간적으로 망설인 것 같은데……?）"

[[dialogue]]
speaker = "unk"
original = "それから昼休みは、俺も同席させてもらって、彼女たちと昼食をしながら過ごすのだった。"
translation = "그 후 점심시간은, 나도 동석해서 그녀들과 함께 점심을 먹으며 시간을 보냈다."

