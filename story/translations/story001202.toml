[[dialogue]]
speaker = "unk"
original = "フイオナからＤＩＳＣで「大事な話がある」と言われ、星見家に行くと──"
translation = "피오나에게 DISC로 「중요한 이야기가 있다」는 말을 듣고 호시미 가문으로 가자──"

[[dialogue]]
speaker = "フィオナ"
original = "「お待ちしていました、緋宮会長。ご足労いただきありがとうございます」"
translation = "「기다리고 있었습니다, 히노미야 회장. 왕림해 주셔서 감사합니다.」"

[[dialogue]]
speaker = "unk"
original = "フィオナ！？"
translation = "피오나!?"

[[dialogue]]
speaker = "キリカ"
original = "「いらっしゃいませ。紅茶をお持ちしました」"
translation = "「어서 오십시오. 홍차를 가져왔습니다.」"

[[dialogue]]
speaker = "ナミエル"
original = "「うぅ……こんな姿を見られるなんて……」"
translation = "「으으…… 이런 모습을 보이다니……」"

[[dialogue]]
speaker = "unk"
original = "師匠とナミエルまで！？"
translation = "스승님이랑 나미엘까지!?"

[[dialogue]]
speaker = "フィオナ"
original = "「実は、戦闘服が突如としてウェディングドレスに変わってしまったんです。しかもなぜか元の戦闘服に戻すことができなくて……」"
translation = "「사실 전투복이 갑자기 웨딩드레스로 변해버렸어요. 게다가 왜인지 원래 전투복으로 되돌릴 수가 없어서……」"

[[dialogue]]
speaker = "キリカ"
original = "「私たちも同様です。いつの間にか、ウェディングドレスにしか変身できないようになっていました」"
translation = "「저희도 마찬가지입니다. 어느샌가 웨딩드레스로밖에 변신할 수 없게 되었습니다.」"

[[dialogue]]
speaker = "フィオナ"
original = "「幸い、戦闘力は落ちていないようですけど。この前のアステラにも対処できましたし」"
translation = "「다행히 전투력은 떨어지지 않은 모양이지만요. 요전번의 아스텔라도 대처할 수 있었고.」"

[[dialogue]]
speaker = "？？？"
original = "「あ、会長くんも来たね。これで役者が揃ったかな」"
translation = "「아, 회장군도 왔네. 이걸로 배우가 다 모였나.」"

[[dialogue]]
speaker = "unk"
original = "その声は──"
translation = "그 목소리는──"

[[dialogue]]
speaker = "トワ先生"
original = "「星見家で会うなんて珍しいよね。ちょっと変な気分かな」"
translation = "「호시미 가문에서 만나다니 드문 일이네. 조금 묘한 기분일까나.」"

[[dialogue]]
speaker = "unk"
original = "トワ先生はドレスじゃないんですね"
translation = "토와 선생님은 드레스가 아니네요."

[[dialogue]]
speaker = "トワ先生"
original = "「そうだよ！\u3000私も着たかったけど！」"
translation = "「그럼! 나도 입고 싶었지만!」"

[[dialogue]]
speaker = "トワ先生"
original = "「私は星体力学の専門家として呼ばれたの。戦闘服が固定されて他の形態に変身できないなんて、どう考えても星力が関わってるからね」"
translation = "「난 성체역학 전문가로서 불려 온 거야. 전투복이 고정되어 다른 형태로 변신할 수 없다니, 아무리 생각해도 성력이 관여하고 있으니까.」"

[[dialogue]]
speaker = "トワ先生"
original = "「フィオナちゃんたちから話を聞いて、原因はだいたいわかったよ。概ね予想通りかな」"
translation = "「피오나짱 일행에게 이야기를 듣고 원인은 대충 알았어. 대체로 예상대로네.」"

[[dialogue]]
speaker = "フィオナ"
original = "「本当ですか！？\u3000どうしてこんなことに？」"
translation = "「정말인가요!? 어째서 이런 일이?」"

[[dialogue]]
speaker = "トワ先生"
original = "「うん。まず、フィオナちゃんの守護星は太陽だよね？」"
translation = "「응. 우선 피오나짱의 수호성은 태양이지?」"

[[dialogue]]
speaker = "トワ先生"
original = "「それで、この前太陽フレアが起こったでしょ？\u3000おそらくその瞬間、太陽の星力が爆発的に増大したの。戦闘服が変化したのはその影響だね」"
translation = "「그래서 요전번에 태양 플레어가 일어났잖아? 아마 그 순간 태양의 성력이 폭발적으로 증대했을 거야. 전투복이 변화한 건 그 영향이네.」"

[[dialogue]]
speaker = "トワ先生"
original = "「過去の文献にも近い例はあってね。珍しい現象ではあるけど、地球と守護星の距離の変化で戦闘服が変わったり、星力が上下することもあるんだ」"
translation = "「과거 문헌에도 비슷한 예가 있어서 말이야. 드문 현상이긴 하지만 지구와 수호성의 거리 변화로 전투복이 바뀌거나 성력이 오르내리기도 하거든.」"

[[dialogue]]
speaker = "トワ先生"
original = "「キリカちゃんやナミエルちゃんは近くにいたから、その余波を受けたんだと思う。フィオナちゃんの星力はそれだけ強大だから」"
translation = "「키리카짱이나 나미엘짱은 근처에 있었으니까 그 여파를 받은 거라고 생각해. 피오나짱의 성력은 그만큼 강대하니까.」"

[[dialogue]]
speaker = "トワ先生"
original = "「つまりみんなの戦闘服の変化の原因は、フィオナちゃんの星力の暴走に結論付けられる」"
translation = "「즉 모두의 전투복 변화 원인은 피오나짱의 성력 폭주로 결론지을 수 있어.」"

[[dialogue]]
speaker = "フィオナ"
original = "「星力の暴走……まさかそんなことが。私のせいでごめんなさい、キリカ、ナミエル」"
translation = "「성력의 폭주…… 설마 그런 일이. 저 때문에 미안해요, 키리카, 나미엘.」"

[[dialogue]]
speaker = "ナミエル"
original = "「いえ、お嬢様が謝る必要はございません」"
translation = "「아니요, 아가씨께서 사과하실 필요는 없습니다.」"

[[dialogue]]
speaker = "トワ先生"
original = "「うん、フィオナちゃんのせいじゃないよ。外的な要因で星力が瞬間的に増大するなんて、そうそうないからね」"
translation = "「응, 피오나짱 잘못이 아니야. 외적인 요인으로 성력이 순간적으로 증대하는 일은 그렇게 흔치 않으니까.」"

[[dialogue]]
speaker = "ナミエル"
original = "「戦闘服の変化が起こった理由はわかりました。ですがどうしてウェディングドレスなのでしょう。ジューンブライドの季節ですし、時期的な要素でしょうか」"
translation = "「전투복의 변화가 일어난 이유는 알았습니다. 그런데 어째서 웨딩드레스인 걸까요. 준 브라이드 시즌이기도 하니 시기적인 요소일까요.」"

[[dialogue]]
speaker = "トワ先生"
original = "「うーん、半分当たりで半分違うんじゃないかな。一番の原因はフィオナちゃんが──」"
translation = "「으음, 절반은 맞고 절반은 틀린 것 같아. 가장 큰 원인은 피오나짱이──」"

[[dialogue]]
speaker = "フィオナ"
original = "「あああ～～～っ！！」"
translation = "「아아아~~~앗!!」"

[[dialogue]]
speaker = "ナミエル"
original = "「お嬢様！？\u3000どうされましたか！？」"
translation = "「아가씨!? 무슨 일이신가요!?」"

[[dialogue]]
speaker = "フィオナ"
original = "「ああいえ、何でもないです、何でもっ」"
translation = "「아아 아니요, 아무것도 아니에요, 아무것도요!」"

[[dialogue]]
speaker = "トワ先生"
original = "「じゃあ話を続けるね。ウェディングドレスに変化したのは、フィオナちゃんが結婚──」"
translation = "「그럼 이야기를 계속할게. 웨딩드레스로 변화한 건 피오나짱이 결혼──」"

[[dialogue]]
speaker = "フィオナ"
original = "「うああ～～っ！！？」"
translation = "「으아아~~앗!!?」"

[[dialogue]]
speaker = "ナミエル"
original = "「フィオナお嬢様？\u3000ご気分が優れないようでしたらお休みされても……」"
translation = "「피오나 아가씨? 기분이 좋지 않으시다면 쉬셔도……」"

[[dialogue]]
speaker = "フィオナ"
original = "「う、ううんっ、大丈夫なのっ！\u3000大丈夫だからっ！」"
translation = "「으, 으응, 괜찮아! 괜찮으니까!」"

[[dialogue]]
speaker = "トワ先生"
original = "「フィオナちゃん。みんな薄々わかってるから覚悟決めようね？」"
translation = "「피오나짱. 다들 어렴풋이 알고 있으니까 각오를 다지자구?」"

[[dialogue]]
speaker = "トワ先生"
original = "「戦闘服がウェディングドレスに変化したのは──ズバリ！\u3000フィオナちゃんが結婚したいと思ったからだよ！」"
translation = "「전투복이 웨딩드레스로 변화한 건── 바로! 피오나짱이 결혼하고 싶다고 생각했기 때문이야!」"

[[dialogue]]
speaker = "フィオナ"
original = "「キャーーーーーーッ！！？」"
translation = "「꺄아아아아아앗!!?」"

[[dialogue]]
speaker = "トワ先生"
original = "「星見家メイド隊の人が１人、結婚して退職したって聞いてね。きっとフィオナちゃんも精神的な影響を受けたんじゃないかなって」"
translation = "「호시미 가문 메이드대 사람이 한 명 결혼해서 퇴직했다고 들었거든. 분명 피오나짱도 정신적인 영향을 받은 게 아닐까 싶어.」"

[[dialogue]]
speaker = "キリカ"
original = "「お嬢様……」"
translation = "「아가씨……」"

[[dialogue]]
speaker = "ナミエル"
original = "「お嬢様……本当なのですか……？」"
translation = "「아가씨…… 정말인가요……?」"

[[dialogue]]
speaker = "フィオナ"
original = "「あ、いや、その……結婚したいというか、つい考えちゃったというか……」"
translation = "「아, 아니, 그게…… 결혼하고 싶다기보다, 그만 생각하게 됐달까……」"

[[dialogue]]
speaker = "フィオナ"
original = "「結婚っていいな、って思っちゃって……」"
translation = "「결혼이란 참 좋구나, 하고 생각해 버려서……」"

[[dialogue]]
speaker = "unk"
original = "トワちゃん先生の言う通りだ……！"
translation = "토와 선생님의 말씀대로다……!"

[[dialogue]]
speaker = "フィオナ"
original = "「ああ～～っ！？\u3000恥ずかしいっ！！\u3000恥ずかしいですぅ～～っ！！」"
translation = "「아아~~앗!? 부끄러워!! 부끄러워요어어~~앗!!」"

[[dialogue]]
speaker = "トワ先生"
original = "「うんうん、わかるなその気持ち。わたしも同期の子から年賀状とか来るんだけど、写真に写ってる子どもが年々大きくなってて……」"
translation = "「으음으음, 이해해 그 기분. 나도 동기 애들한테 연하장 같은 게 오는데, 사진에 찍힌 애들이 해마다 커지고 있어서……」"

[[dialogue]]
speaker = "キリカ"
original = "「トワ先生、そこまでにしておきましょう」"
translation = "「토와 선생님, 거기까지만 하죠.」"

[[dialogue]]
speaker = "トワ先生"
original = "「ハッ──！？\u3000そうだった、悲しみが増えるところだった！？」"
translation = "「헉──!? 그랬지, 슬픔이 늘어날 뻔했어!?」"

[[dialogue]]
speaker = "ナミエル"
original = "「原因はわかりました。ではどうすれば元の戦闘服に戻ることができるのでしょう？\u3000それに緋宮会長はどうして呼ばれたのでしょうか……？」"
translation = "「원인은 알겠습니다. 그럼 어떻게 하면 원래 전투복으로 돌아갈 수 있을까요? 그리고 <u>히노미야</u> 회장은 어째서 불려 온 건가요……?」"

[[dialogue]]
speaker = "トワ先生"
original = "「戦闘服を元に戻すには、フィオナちゃんの『結婚っていいな』欲を満たすしかない」"
translation = "「전투복을 원래대로 돌리려면 피오나짱의 『결혼이란 좋구나』 욕구를 채워줄 수밖에 없어.」"

[[dialogue]]
speaker = "フィオナ"
original = "「うぅ～～っ……そんな言い方しなくても……」"
translation = "「으으~~앗…… 그렇게 말씀하시지 않아도……」"

[[dialogue]]
speaker = "トワ先生"
original = "「そのために──フィオナちゃんと会長くんには結婚してもらいます！」"
translation = "「그러기 위해서── 피오나짱과 회장군은 결혼해 줘야겠어!」"

[[dialogue]]
speaker = "フィオナ"
original = "「えええ～～～～～～っ！！？？」"
translation = "「에에에~~~~~~앗!!??」"

