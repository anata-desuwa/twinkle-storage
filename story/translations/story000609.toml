[[dialogue]]
speaker = "unk"
original = "巨大な竜と化したマム。俺たちは全員で挑み、激戦の末に――"
translation = "거대한 용으로 변한 마무. 우리들은 전원이 덤볐고 격전 끝에――"

[[dialogue]]
speaker = "マハムート"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "マハムート"
original = "「…………残念だけど、私の負けね。竜化で想像以上に星力を消耗してしまったわ」"
translation = "「…………안타깝지만 나의 패배네. 용화로 상상 이상으로 성력을 소모해 버렸어」"

[[dialogue]]
speaker = "マハムート"
original = "「負けた以上、サンタごっこも見過ごすしかない。もう勝手にしなさい」"
translation = "「패배한 이상 산타 놀이도 못 본 척할 수밖에 없네. 이제 마음대로 해」"

[[dialogue]]
speaker = "ヨミ"
original = "（マム、もしかして、わざと負けて……？）"
translation = "（마무님, 설마 일부러 져준 거……?）"

[[dialogue]]
speaker = "セシア"
original = "「……ねぇ、紅明ママ。ちょっといいかしら？」"
translation = "「……저기, 코우메이 마마. 잠시 괜찮을까?」"

[[dialogue]]
speaker = "紅明"
original = "「ん？\u3000どうした、セッシー？」"
translation = "「응? 왜 그래, 세시?」"

[[dialogue]]
speaker = "セシア"
original = "「あのね……こしょこしょ――」"
translation = "「저기…… 소곤소곤――」"

[[dialogue]]
speaker = "紅明"
original = "「ふむふむ……あはは☆\u3000なるほどね♪\u3000うん、もちろんいいぜ！\u3000元々そのつもりだったしね……はい、これ♪」"
translation = "「흠흠…… 아하하☆ 그렇구나♪ 응, 물론 좋지! 원래 그럴 생각이었기도 하고…… 자, 이거♪」"

[[dialogue]]
speaker = "セシア"
original = "「ありがとう、紅明ママ♪\u3000行ってくるわね」"
translation = "「고마워요, 코우메이 마마♪ 다녀올게요」"

[[dialogue]]
speaker = "セシア"
original = "「――改めて、初めまして。マム」"
translation = "「――정식으로 처음 뵙겠어요, 마무」"

[[dialogue]]
speaker = "マハムート"
original = "「ああ、そういえば、挨拶がまだだったわね。初めまして、セシア」"
translation = "「아아, 그러고 보니 인사가 아직이었네. 처음 봐, 세시아」"

[[dialogue]]
speaker = "セシア"
original = "「セシアたち、サンタごっこを続けてもいいのよね？\u3000そしたら――」"
translation = "「세시아 일행, 산타 놀이를 계속해도 되는 거죠? 그러면――」"

[[dialogue]]
speaker = "セシア"
original = "「マムにもクリスマスプレゼントを渡したいの。はい、これ。受け取って欲しいわ」"
translation = "「마무에게도 크리스마스 선물을 주고 싶어요. 자, 여기요. 받아줬으면 좋겠어요」"

[[dialogue]]
speaker = "マハムート"
original = "「…………！」"
translation = "「…………!」"

[[dialogue]]
speaker = "ヨミ"
original = "「あっ……！\u3000新星寮の生徒たちにクリスマスプレゼントを配るってことは、紅明先輩とセシアちゃん、最初から……！」"
translation = "「앗……! 신성료 학생들에게 크리스마스 선물을 나눠준다는 건 코우메이 선배랑 세시아 짱, 처음부터……!」"

[[dialogue]]
speaker = "マハムート"
original = "「ふっ……やれやれ、仕方ないわね。全く、優しい悪戯っ子がいたものだわ…」"
translation = "「훗…… 이런이런, 어쩔 수 없네. 정말이지, 다정한 장난꾸러기가 있었을 줄이야…」"

[[dialogue]]
speaker = "マハムート"
original = "「ありがとう、貰っておくわ。小さなサンタさん」"
translation = "「고마워, 받아둘게. 작은 산타님」"

[[dialogue]]
speaker = "セシア"
original = "「ふふっ♪\u3000今日１番嬉しい笑顔だわ♪」"
translation = "「후훗♪ 오늘 중 가장 기쁜 미소예요♪」"

[[dialogue]]
speaker = "unk"
original = "笑顔を浮かべ合う２人を見て、俺たちは心が温かくなるのだった――"
translation = "미소를 나누는 두 사람을 보며 우리들은 마음이 따뜻해지는 것이었다――"

[[dialogue]]
speaker = "マハムート"
original = "「あ、ちなみに会長だけは後で死刑ね」"
translation = "「아, 참고로 회장님만은 나중에 사형이야」"

[[dialogue]]
speaker = "unk"
original = "なぜ俺だけ！？"
translation = "왜 나만!?"

[[dialogue]]
speaker = "unk"
original = "その後、クリスマスプレゼントは無事に全て配り終えて、その帰り道――"
translation = "그 후 크리스마스 선물은 무사히 전부 나눠주고 돌아가는 길――"

[[dialogue]]
speaker = "セシア"
original = "「すぅ……すぅ……」"
translation = "「새근…… 새근……」"

[[dialogue]]
speaker = "ヨミ"
original = "「セシアちゃん、疲れて眠っちゃいましたね」"
translation = "「세시아 짱, 지쳐서 잠들어 버렸네요」"

[[dialogue]]
speaker = "紅明"
original = "「善哉善哉♪\u3000これにて一件落着。世はなべて、こともなしってね☆」"
translation = "「선재선재♪ 이로써 사건 해결. 세상은 두루두루 평화롭다니까☆」"

[[dialogue]]
speaker = "ヨミ"
original = "「紅明先輩、セシアちゃんは私と同じで九浄家のお屋敷に住んでますから、私がおぶるの代わりますよ」"
translation = "「코우메이 선배, 세시아 짱은 저랑 똑같이 쿠죠 가문 저택에 사니까 제가 대신 업어줄게요」"

[[dialogue]]
speaker = "紅明"
original = "「そうかい？\u3000じゃあ、お言葉に甘えさせてもらおうかな」"
translation = "「그래? 그럼 호의를 받아들이도록 할까나」"

[[dialogue]]
speaker = "ヨミ"
original = "「よいしょっと……はい、確かに承りました」"
translation = "「영차…… 네, 확실히 넘겨받았습니다」"

[[dialogue]]
speaker = "ヨミ"
original = "「そういえば私、紅明先輩に聞きたかったことがあって」"
translation = "「그러고 보니 저, 코우메이 선배한테 묻고 싶은 게 있어서요」"

[[dialogue]]
speaker = "紅明"
original = "「ん？」"
translation = "「응?」"

[[dialogue]]
speaker = "ヨミ"
original = "「今回、新星寮に忍び込もうと思ったのって、もしかしてセシアちゃんに、クリスマスを楽しんでもらいたかったからですか？」"
translation = "「이번에 신성료에 잠입하려고 한 거, 혹시 세시아 짱이 크리스마스를 즐겼으면 해서였나요?」"

[[dialogue]]
speaker = "紅明"
original = "「…………！」"
translation = "「…………!」"

[[dialogue]]
speaker = "紅明"
original = "「よくわかったね。ヨミヨミの言う通りだよ」"
translation = "「잘 알았네. 요미요미 말대로야」"

[[dialogue]]
speaker = "紅明"
original = "「もちろん、セッシーの記憶を取り戻す手助けになればとは思ってたけど、ぶっちゃけ、アタシにはどうすれば早く記憶が戻るなんて、わからんからさ」"
translation = "「물론 세시의 기억을 되찾는 데 도움이 됐으면 하긴 했지만, 솔직히 나도 어떻게 해야 기억이 빨리 돌아올지는 모르거든」"

[[dialogue]]
speaker = "紅明"
original = "「でも、楽しい思い出ってのは今からでも作れるっしょ？\u3000せっかくのクリスマスだもん。記憶がなくたって、セッシーに元気になってもらいたいじゃん？」"
translation = "「하지만 즐거운 추억이라는 건 지금부터라도 만들 수 있잖아? 기왕 맞이한 크리스마스인걸. 기억이 없어도 세시가 활기차졌으면 좋겠잖아?」"

[[dialogue]]
speaker = "紅明"
original = "「ただ、ヨミヨミとダーリンには、咄嗟のノリに巻き込んじゃって、悪かったと思ってるよ。ごめんね」"
translation = "「다만 요미요미랑 달링은 갑작스러운 분위기에 휘말리게 해서 미안하다고 생각하고 있어. 미안해」"

[[dialogue]]
speaker = "紅明"
original = "「――あっ、そうだ。サンタ大作戦の締めを忘れてた」"
translation = "「――앗, 맞다. 산타 대작전의 마무리를 잊었네」"

[[dialogue]]
speaker = "紅明"
original = "「サンタの袋から取り出しますは～、ほい♪\u3000２人にもクリスマスプレゼント☆」"
translation = "「산타 보따리에서 꺼내는 것은~ 호잇♪ 두 사람에게도 크리스마스 선물☆」"

[[dialogue]]
speaker = "ヨミ"
original = "「えっ？」"
translation = "「에?」"

[[dialogue]]
speaker = "紅明"
original = "「うしし♪\u3000全員にプレゼント渡すっていうなら、２人も例外じゃないっしょ？」"
translation = "「우시시♪ 전원에게 선물을 준다면 두 사람도 예외는 아니잖아?」"

[[dialogue]]
speaker = "紅明"
original = "「それから寝ちゃってるけど、セッシーにもね。ヨミヨミ、こっそり枕元に置いといてくれないかな？\u3000セッシーはよい子にしてたから、特別に２つ目ってことで♪」"
translation = "「그리고 자고 있지만 세시한테도 말이야. 요미요미, 몰래 머리맡에 놔주지 않을래? 세시는 착한 아이였으니까 특별히 두 번째 선물인 걸로♪」"

[[dialogue]]
speaker = "セシア"
original = "「むにゃむにゃ……」"
translation = "「으냐으냐……」"

[[dialogue]]
speaker = "ヨミ"
original = "「あ、あの！\u3000紅明先輩……！」"
translation = "「저, 저기! 코우메이 선배……!」"

[[dialogue]]
speaker = "紅明"
original = "「んじゃ、サンタクロースは元気に去るぜ☆\u3000２人共、メリークリスマス！」"
translation = "「그럼 산타클로스는 씩씩하게 물러가겠다구☆ 둘 다 메리 크리스마스!」"

[[dialogue]]
speaker = "ヨミ"
original = "「ちょっ……！」"
translation = "「잠깐……!」"

[[dialogue]]
speaker = "ヨミ"
original = "「……ああもう、お礼もちゃんと言わせてくれないんですから」"
translation = "「……아 정말, 감사 인사도 제대로 못 하게 하시고」"

[[dialogue]]
speaker = "ヨミ"
original = "「紅明先輩、実際に会ってみると、戸惑っちゃうくらい爆裂ハイテンションで、ノリで行動するのが悪い癖ですけど――」"
translation = "「코우메이 선배, 실제로 만나보면 당황스러울 정도로 폭렬 하이텐션에 즉흥적으로 행동하는 게 나쁜 버릇이지만――」"

[[dialogue]]
speaker = "ヨミ"
original = "「こうやって人を喜ばせてくるから、困っちゃいます」"
translation = "「이렇게 사람을 기쁘게 해주니까 곤란하다니까요」"

[[dialogue]]
speaker = "unk"
original = "さすが人気タレントだよね"
translation = "역시 인기 탤런트네"

[[dialogue]]
speaker = "ヨミ"
original = "「はい。つい目を離せなくて……なんだかんだ尊敬しちゃう先輩です」"
translation = "「네. 자꾸 눈을 뗄 수가 없어서…… 이런저런 면에서 존경하게 되는 선배예요」"

[[dialogue]]
speaker = "ヨミ"
original = "「――会長、それで思いついたことがあるんですけど……」"
translation = "「――회장님, 그래서 생각난 게 있는데요……」"

[[dialogue]]
speaker = "unk"
original = "ヨミの提案に、俺は頷くのだった。"
translation = "요미의 제안에 나는 고개를 끄덕였다."

