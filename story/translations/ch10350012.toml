[[dialogue]]
speaker = "unk"
original = "第２話,裏世界のバディ,P"
translation = "제2화, 뒷세계의 버디"

[[dialogue]]
speaker = "unk"
original = "とある事件で知り合った公安委員会の少女・ネーゼマインから、人払いした空き教室で話があるという連絡を受けた――"
translation = "어떤 사건으로 알게 된 공안위원회의 소녀 네제마인으로부터, 사람 없는 빈 교실에서 할 이야기가 있다는 연락을 받았다――"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「やあ、会長。わざわざ足を運んでもらっちゃってごめんね～」"
translation = "「안녕, 회장. 일부러 발걸음하게 해서 미안해~」"

[[dialogue]]
speaker = "unk"
original = "セナリィがどうしてここに？"
translation = "세나리가 왜 여기에?"

[[dialogue]]
speaker = "unk"
original = "それはいいんだけど"
translation = "그건 그렇다 치고"

[[dialogue]]
speaker = "セナリィ"
original = "「まさか会長様、マインとも既に顔見知りでしたの？\u3000やはり見立て通り、人脈の侮れない方ですわね……」"
translation = "「설마 회장님, 마인과도 이미 아는 사이였나요? 역시 제 안목대로 인맥을 무시할 수 없는 분이군요……」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「実は私、公安委員会の仕事ではセナリィとバディを組んでるんだよね～。この前の事件では、セナリィに陽動を頼んでたから、その場に居なかったんだけどさ」"
translation = "「사실 나, 공안위원회 일로는 세나리와 버디를 짜고 있거든~. 요전번 사건 때는 세나리에게 유동을 부탁했어서 그 자리에 없었지만 말이야.」"

[[dialogue]]
speaker = "セナリィ"
original = "「私、そのファーストコンタクトの話、全然聞いてないのだけれど！？\u3000事前に知っていたら、会長様との営業トークをもっと上手く運べましたのに……！」"
translation = "「나, 그 퍼스트 컨택트 이야기 전혀 못 들었는데!? 미리 알고 있었다면 회장님과의 영업 토크를 좀 더 잘 이끌어갈 수 있었을 텐데……!」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「にひひ♪\u3000でも、そのおかげで千園寺先輩も加わっての面白い出会いになったみたいじゃん？\u3000いや～、その場を見てみたかったな～」"
translation = "「니히히♪ 하지만 그 덕분에 센온지 선배까지 가세한 재밌는 만남이 된 거 아냐? 이야~ 그 장면을 보고 싶었네~」"

[[dialogue]]
speaker = "セナリィ"
original = "「マイン、さては貴方、わざと伝えませんでしたわね！？」"
translation = "「마인, 설마 당신 일부러 말 안 했죠!?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ごめ～ん☆\u3000でも、会長とはおかげで上手く打ち解けたみたいだから、結果オーライでしょ？\u3000今も結構、素の部分を晒してるし♪」"
translation = "「미안~☆ 하지만 덕분에 회장이랑은 잘 통하게 된 것 같으니까 결과 오라이 아냐? 지금도 꽤 본모습을 드러내고 있고♪」"

[[dialogue]]
speaker = "unk"
original = "意外と面白い子だよね"
translation = "의외로 재밌는 아이네"

[[dialogue]]
speaker = "セナリィ"
original = "「全然嬉しくないんですけど！？\u3000ああもう、会長様への第一印象はもっと、ダークでクールに決める予定でしたのに……！」"
translation = "「전혀 기쁘지 않거든요!? 아 정말, 회장님께 드리는 첫인상은 좀 더 다크하고 쿨하게 결정할 예정이었는데……!」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「さてさて～、場も和んだところで、今回会長を呼び出した件なんだけど……公安委員会から新しいミッションが下ってるんだ～」"
translation = "「자자~ 분위기도 화기애애해졌으니 이번에 회장을 불러낸 건에 대해서인데…… 공안위원회에서 새로운 미션이 내려왔어~」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「私としては、いつも通りセナリィに外注しようと思って、ここに呼んでたの」"
translation = "「나로서는 평소처럼 세나리에게 외주를 주려고 여기에 불렀던 거야.」"

[[dialogue]]
speaker = "unk"
original = "セナリィは公安委員会所属じゃない？"
translation = "세나리는 공안위원회 소속이 아니야?"

[[dialogue]]
speaker = "セナリィ"
original = "「私、組織のしがらみとか面倒で嫌いですの。なので、秘密結社ゴールデングースとして、依頼を受ける形でミッションに参加しておりますわ」"
translation = "「전 조직의 굴레 같은 건 번거로워서 싫어해요. 그래서 비밀 결사 골든 구스로서 의뢰를 받는 형태로 미션에 참가하고 있답니다.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「元々、九浄家がセナリィを学園にスカウトする際、公安委員会への所属を打診してたらしいんだけどね～」"
translation = "「원래 쿠죠 가문이 세나리를 학원에 스카우트할 때 공안위원회 소속을 타진했던 모양이지만 말이야~」"

[[dialogue]]
speaker = "セナリィ"
original = "「ゴールデングースへの出資と依頼を条件に、スカウトを引き受けたというわけですわね。武器商人の下に居るよりも儲からないなら、お話になりませんもの」"
translation = "「골든 구스에 대한 출자와 의뢰를 조건으로 스카우트를 수락했다는 것이죠. 무기 상인 밑에 있는 것보다 돈이 안 된다면 이야기가 안 되니까요.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「なんで、公安委員会がクライアント、ゴールデングースは下請けって関係かな。で、私は公安委員会のゴールデングース担当窓口って感じ」"
translation = "「그래서 공안위원회가 클라이언트, 골든 구스는 하청이라는 관계일까나. 그리고 나는 공안위원회의 골든 구스 담당 창구 같은 느낌.」"

[[dialogue]]
speaker = "セナリィ"
original = "「私としては、マインをゴールデングースの正式メンバーに勧誘中なのですが、交渉が手強くて参っておりますわ」"
translation = "「저로서는 마인을 골든 구스의 정식 멤버로 권유 중입니다만, 협상이 만만치 않아 애를 먹고 있어요.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「にひひ、そりゃそうでしょ～。私は公安委員会の交渉人だし、簡単には落ちてあげられないね♪」"
translation = "「니히히, 그야 당연하지~. 나는 공안위원회의 교섭인이고, 쉽게 넘어가 줄 순 없지♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「……で、話が逸れちゃったけど、会長を今回この場に呼び出したのは、セナリィが言い出したからなんだよ～」"
translation = "「……그래서 이야기가 샜는데, 회장을 이번에 이 자리에 불러낸 건 세나리가 꺼낸 이야기야~」"

[[dialogue]]
speaker = "セナリィ"
original = "「今回の依頼を受ける条件として、会長様のミッション参加を要請したのですわ」"
translation = "「이번 의뢰를 받는 조건으로 회장님의 미션 참가를 요청했답니다.」"

[[dialogue]]
speaker = "セナリィ"
original = "「私のことを信用して貰う為には、口だけでなく実際にその目で仕事を見て貰うのが早いでしょう？」"
translation = "「저를 신용하게 만들기 위해서는 말뿐만 아니라 실제로 그 눈으로 일을 확인하게 하는 게 빠르겠죠?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「短絡的だよね～。しかも、私が会長と知り合ってなかったら、どう私を説得するつもりだったんだか」"
translation = "「단락적이라니까~. 게다가 내가 회장이랑 아는 사이가 아니었으면 어떻게 날 설득할 생각이었대?」"

[[dialogue]]
speaker = "セナリィ"
original = "「あら、そこを何とかするのが、交渉人である貴方の仕事でしょう、マイン？\u3000まさか出来ないなんて、言わないと思ってましたもの」"
translation = "「어머, 그걸 어떻게든 하는 게 교섭인인 당신의 일이잖아요, 마인? 설마 못 한다고는 말 안 할 줄 알았거든요.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「私に対して、そこまで信用出来るのがセナリィの凄いところだよね。度胸あるよ、まったく」"
translation = "「나에 대해서 그 정도로 신용할 수 있는 게 세나리의 대단한 점이지. 배짱 좋다니까, 정말.」"

[[dialogue]]
speaker = "セナリィ"
original = "「私はプロの傭兵として名を馳せた、バンデット・セナリィ。そのくらいの度胸が無ければ、戦場で生き残れませんわ」"
translation = "「저는 프로 용병으로 이름을 떨친 밴디트 세나리. 그 정도 배짱이 없으면 전장에서 살아남을 수 없어요.」"

[[dialogue]]
speaker = "unk"
original = "バンデット・セナリィは本名じゃないよね？"
translation = "밴디트 세나리는 본명이 아니지?"

[[dialogue]]
speaker = "セナリィ"
original = "「二つ名ですわ。ですがそれは、私が戦場で得たプロとしての誇りであり、勝ち取って来た名声であり、生きて来た報酬でもありますの」"
translation = "「이명이에요. 하지만 그것은 제가 전장에서 얻은 프로로서의 긍지이며, 쟁취해 온 명성이고, 살아온 보수이기도 합니다.」"

[[dialogue]]
speaker = "セナリィ"
original = "「故に私は、気に入ってその名前を使っておりますわ。会長様も、本名と思って呼んで下さいませ」"
translation = "「고로 저는 마음에 들어서 그 이름을 사용하고 있어요. 회장님도 본명이라 생각하고 불러주세요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「二つ名の由来？\u3000ああ、それは私の能力に関係しておりますの」"
translation = "「이명의 유래? 아아, 그건 제 능력과 관계가 있답니다.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「セナリィの瞳って、たまに色が変わるって知ってた？\u3000生まれつき『強奪の星眼』っていう異能の力を持ってるんだよ」"
translation = "「세나리의 눈동자 말이야, 가끔 색이 변한다는 거 알고 있었어? 태어날 때부터 『강탈의 성안』이라는 이능의 힘을 가지고 있거든.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「相手が発動した星術を見ることで、その力を無効化して星眼に吸収、ストックすることが出来るんだって」"
translation = "「상대가 발동한 성술을 보는 것으로 그 힘을 무효화해서 성안에 흡수, 스톡할 수 있대.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ストックした星術はいつでも即発動可能っていう、なかなかにチートな代物なんだよ～♪」"
translation = "「스톡한 성술은 언제든 즉시 발동 가능이라는, 꽤나 치트 같은 물건이라구~♪」"

[[dialogue]]
speaker = "セナリィ"
original = "「ふふんっ（ドヤ顔）」"
translation = "「후흥 (도야가오)」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ただし、ストックしておける星術は１つまで。あと１度星眼を使ったらクールタイムが発生するので連続使用は出来ず、集団戦が苦手っていう――」"
translation = "「다만 스톡해둘 수 있는 성술은 하나까지. 그리고 한 번 성안을 쓰면 쿨타임이 발생해서 연속 사용은 불가능하고, 집단전이 쥐약이라는――」"

[[dialogue]]
speaker = "セナリィ"
original = "「ちょっ、わざわざ欠点まで明かす必要あります！？\u3000営業妨害ですわよ！」"
translation = "「잠깐, 굳이 단점까지 밝힐 필요가 있어요!? 영업 방해라니까요!」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「にひひ♪\u3000まあ、そんな感じで相手の星術を奪う能力が有名になって、盗賊……バンデット・セナリィという悪名が付けられたってわけだね」"
translation = "「니히히♪ 뭐, 그런 느낌으로 상대의 성술을 빼앗는 능력이 유명해져서 도적…… 밴디트 세나리라는 악명이 붙었다는 거지.」"

[[dialogue]]
speaker = "セナリィ"
original = "「ふふんっ（ドヤ顔）」"
translation = "「후흥 (도야가오)」"

[[dialogue]]
speaker = "unk"
original = "そこはドヤ顔なんだ……"
translation = "거기서 도야가오를 하는구나……"

[[dialogue]]
speaker = "セナリィ"
original = "「今回のミッションでは、悪名高きバンデット・セナリィの力……そして、悪即善のなんたるかを会長様にお見せ致しますわ。是非ご期待下さいませ」"
translation = "「이번 미션에서는 악명 높은 밴디트 세나리의 힘…… 그리고 악즉선이 무엇인지 회장님께 보여드리겠어요. 부디 기대해 주세요.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「それじゃあ、そろそろミッションの詳細を説明しようと思うけど……会長は協力してくれるってことでいいのかな？」"
translation = "「그럼 이제 미션의 상세 내용을 설명하려고 하는데…… 회장은 협력해 준다는 걸로 알면 될까?」"

[[dialogue]]
speaker = "unk"
original = "見て見ぬフリは出来ない"
translation = "보고도 못 본 척할 수는 없지"

[[dialogue]]
speaker = "unk"
original = "知ってしまった以上"
translation = "알게 된 이상"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「にひひ♪\u3000会長ならそう言うと思ってたんだ～♪」"
translation = "「니히히♪ 회장이라면 그렇게 말할 줄 알았어~♪」"

[[dialogue]]
speaker = "セナリィ"
original = "「ふふっ、悪の作戦会議の始まりですわね」"
translation = "「후후, 악의 작전 회의 시작이네요.」"

[[dialogue]]
speaker = "unk"
original = "この日を境に、俺は２人と共に公安委員会の任務をこなすようになるのだった――"
translation = "이날을 경계로, 나는 두 사람과 함께 공안위원회의 임무를 수행하게 되었다――"

