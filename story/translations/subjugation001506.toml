[[dialogue]]
speaker = "イングリット"
original = "「ふむ。こちらも出られないか」"
translation = "「흠. 이쪽도 나갈 수 없나」"

[[dialogue]]
speaker = "カティア"
original = "「これで１０回目だワン……このままじゃ一生アステラに閉じ込められたままになるガオ……」"
translation = "「이걸로 10번째다멍…… 이대로라면 평생 아스텔라에 갇힌 채로 있을 거다크앙……」"

[[dialogue]]
speaker = "イングリット"
original = "「その心配はない。私に任せろ」"
translation = "「그럴 걱정은 없다. 나에게 맡겨라」"

[[dialogue]]
speaker = "カティア"
original = "「任せた結果がこの様だワン……」"
translation = "「맡긴 결과가 이 꼴이다멍……」"

[[dialogue]]
speaker = "カティア"
original = "（このコラプサー、強い以外やることなすことダメダメ……私がどうにかしないと……）"
translation = "（이 콜랩서, 강한 거 빼면 하는 짓마다 엉망진창이야…… 내가 어떻게든 해야지……）"

[[dialogue]]
speaker = "イングリット"
original = "「さて、次は南の方へ行ってみるか」"
translation = "「자, 다음은 남쪽으로 가볼까」"

[[dialogue]]
speaker = "カティア"
original = "「アステラの中で方角なんてアテにならないと思うワン……！\u3000というかそっちは多分北だガオ！」"
translation = "「아스텔라 속에서 방위 같은 건 믿을 게 못 된다멍……! 그보다 그쪽은 아마 북쪽이다크앙!」"

[[dialogue]]
speaker = "カティア"
original = "「こうなったら、私の嗅覚で──って、これは魔王様の匂い！」"
translation = "「이렇게 된 이상 내 후각으로── 앗, 이건 마왕님의 냄새!」"

[[dialogue]]
speaker = "イングリット"
original = "「なに？\u3000魔王だと？」"
translation = "「뭐라고? 마왕이라고?」"

[[dialogue]]
speaker = "カティア"
original = "「魔王様が近くにいるワン……！\u3000もしかして、私を心配して……？」"
translation = "「마왕님이 근처에 있다멍……! 혹시 나를 걱정해서……?」"

[[dialogue]]
speaker = "イングリット"
original = "「よくやった犬。さあ、私を魔王の元に連れていけ」"
translation = "「잘했다 개. 자, 나를 마왕에게 데려가라」"

[[dialogue]]
speaker = "カティア"
original = "（うむむ……このまま魔王様のところへ連れていっていいのかな……）"
translation = "（으음…… 이대로 마왕님 계신 곳으로 데려가도 될까……）"

[[dialogue]]
speaker = "イングリット"
original = "「どうした？\u3000なぜ動かない？」"
translation = "「왜 그러지? 왜 움직이지 않나?」"

[[dialogue]]
speaker = "カティア"
original = "「な、なんでもないワン」"
translation = "「아, 아무것도 아니다멍」"

[[dialogue]]
speaker = "カティア"
original = "（だ、大丈夫だよね……魔王様強いし、きっとなんとかしてくれるはず……！）"
translation = "（괘, 괜찮겠지…… 마왕님은 강하시니까 분명 어떻게든 해주실 거야……!）"

[[dialogue]]
speaker = "カティア"
original = "「それじゃあ、魔王様のところへ向かうガオ！」"
translation = "「그럼 마왕님 계신 곳으로 가겠다크앙!」"

[[dialogue]]
speaker = "マリーベル"
original = "「それで、もう１人のコラプサーはどんな人なの？」"
translation = "「그래서, 또 한 명의 콜랩서는 어떤 사람이야?」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「ふふ、そんなにコラプサーの事が気になりまして？」"
translation = "「후후, 그렇게 콜랩서가 신경 쓰이시나요?」"

[[dialogue]]
speaker = "マリーベル"
original = "「当然でしょう、これから戦うかもしれない相手よ」"
translation = "「당연하지, 앞으로 싸우게 될지도 모르는 상대니까」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「そうでございますわね。まあ、イングリット様と話し合いをするのはほぼ不可能でございましょうし」"
translation = "「그래요. 뭐, 잉그리드 님과 대화를 나누는 건 거의 불가능할 거예요」"

[[dialogue]]
speaker = "マリーベル"
original = "「そんなに話が通じない相手なの？」"
translation = "「그렇게 말이 안 통하는 상대야?」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「はい、イングリット様はとても好戦的なお方でございますの」"
translation = "「네, 잉그리드 님은 아주 호전적인 분이에요」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「オブラートに包まずに言うならば、戦闘狂でございますわね……常に強者と戦うことしか考えていないバーサーカーでございますわ」"
translation = "「에둘러 말하지 않고 말하자면, 전투광이에요…… 항상 강자와 싸울 생각밖에 하지 않는 버서커예요」"

[[dialogue]]
speaker = "マリーベル"
original = "「……随分乱暴そうな人なのね」"
translation = "「……상당히 난폭해 보이는 사람이네」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「その認識で合っていますわ……わたくしのこともコキ使ってくれやがりまして──コホン、少しお喋りがすぎましたわ」"
translation = "「그 인식이 정확해요…… 저도 아주 막 부려먹어주셔가지고── 큼큼, 조금 말이 많았어요」"

[[dialogue]]
speaker = "unk"
original = "イングリットはジュリエッテより強いの？"
translation = "잉그리드는 줄레엣타보다 강해?"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「わたくしなどより遥かに強いですわ……まぁ、わたくしはコラプサーの中で最弱でございますが」"
translation = "「저 따위보다 훨씬 강하시네요…… 뭐, 저는 콜랩서 중에서 최약체이긴 합니다만」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「そもそも、わたくしは後方支援担当なのです。戦闘があまり得意ではないのも当然でございますわ」"
translation = "「애초에 저는 후방 지원 담당이예요. 전투가 그리 능숙하지 않은 건 당연한 거예요」"

[[dialogue]]
speaker = "マリーベル"
original = "「そう、貴重な情報をありがとう」"
translation = "「그래, 귀중한 정보 고마워」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「いえいえ、わたくしたち仲間ではございませんか♪」"
translation = "「아니요 아니요, 저희 동료이지 않나요♪」"

[[dialogue]]
speaker = "マリーベル"
original = "「仲間ではないと言っているのだけど……」"
translation = "「동료가 아니라고 말하고 있는데……」"

[[dialogue]]
speaker = "マリーベル"
original = "「じゃあついでに聞くけど、コラプサーの目的は何？\u3000星騎士を邪魔して世界を滅ぼすこと？」"
translation = "「그럼 내친김에 묻겠는데, 콜랩서의 목적이 뭐야? 성기사를 방해해서 세계를 멸망시키는 것?」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「いいえ。我々の目的は世界の破壊などではございません」"
translation = "「아니요. 저희의 목적은 세계 파괴 같은 것이 아니예요」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「コラプサーの目的は救世。あなた方と同じく世界を守ることでございます」"
translation = "「콜랩서의 목적은 구세. 당신들과 마찬가지로 세계를 지키는 것이에요」"

[[dialogue]]
speaker = "マリーベル"
original = "「私たちと同じ……？\u3000じゃあ協力すればいいじゃない。何か恨みでもあるの？」"
translation = "「우리랑 똑같다고……? 그럼 협력하면 되잖아. 무슨 원한이라도 있는 거야?」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「さぁ？\u3000わたくしは存じませぬが、星騎士の方々と共闘できない理由がおありなのでございましょう」"
translation = "「글쎄요? 저는 모르겠지만, 성기사분들과 공투할 수 없는 이유가 있으신 모양이에요」"

[[dialogue]]
speaker = "マリーベル"
original = "「──！？\u3000この衝撃……近くで戦闘が行われているようね」"
translation = "「──!? 이 충격…… 근처에서 전투가 벌어지고 있는 모양이네」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「あれは……モンスターの群れとイングリット様でございますわね」"
translation = "「저건…… 몬스터 무리와 잉그리드 님이에요」"

[[dialogue]]
speaker = "カティア"
original = "「はぁはぁ、モンスター多すぎなんですけど……」"
translation = "「하아 하아, 몬스터가 너무 많잖아요……」"

[[dialogue]]
speaker = "イングリット"
original = "「ふん、この程度で音を上げるとは情けない」"
translation = "「흥, 이 정도로 소리를 높이다니 한심하군」"

[[dialogue]]
speaker = "カティア"
original = "（ていうかコラプサーも強すぎ……！\u3000全然共倒れになってくれないし……）"
translation = "（그보다 콜랩서도 너무 강해……! 전혀 동귀어진이 안 되잖아……）"

[[dialogue]]
speaker = "unk"
original = "カティアも一緒にいる！"
translation = "카티아도 같이 있어!"

[[dialogue]]
speaker = "マリーベル"
original = "「無事でよかった……とは言い難いわね」"
translation = "「무사해서 다행이네……라고 말하기는 힘든 상황이네」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「ふむ……どうやら魔王様のお仲間もいらっしゃるようでございますし、救援に向かいましょうか」"
translation = "「흠…… 아무래도 마왕님의 동료분도 계신 모양이니, 구원하러 가볼까요」"

[[dialogue]]
speaker = "マリーベル"
original = "「行きましょう、会長さん……！」"
translation = "「가자, 회장님……!」"

[[dialogue]]
speaker = "カティア"
original = "「ぜぇ、はぁ……このままじゃ魔王様と合流する前に死んじゃう……」"
translation = "「제에, 하아…… 이대로라면 마왕님과 합류하기 전에 죽겠어……」"

[[dialogue]]
speaker = "モンスター"
original = "「イ～～～ッ」"
translation = "「이이이익」"

[[dialogue]]
speaker = "カティア"
original = "「あ──！？」"
translation = "「아──!?」"

[[dialogue]]
speaker = "マリーベル"
original = "「カティアさん大丈夫！？\u3000助けに来たわよ……！」"
translation = "「카티아 씨 괜찮아요!? 구하러 왔어……!」"

[[dialogue]]
speaker = "カティア"
original = "「マリーベル先輩！？\u3000それに魔王様！\u3000ありがとうございます助かります！」"
translation = "「마리벨 선배!? 게다가 마왕님! 감사합니다 살았어요!」"

[[dialogue]]
speaker = "モンスター"
original = "「イ～～～ッ！！」"
translation = "「이이이익!!」"

[[dialogue]]
speaker = "イングリット"
original = "「……ジュリエッテか」"
translation = "「……줄레엣타인가」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「不本意ながら、救援に来ましたわ」"
translation = "「내키지는 않지만 구원하러 왔어요」"

[[dialogue]]
speaker = "イングリット"
original = "「貴様の助けなどいらん」"
translation = "「네놈의 도움 따윈 필요 없다」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「そう仰ると思いましたわ……言いたいことは山ほどございますが、ひとまずはこのモンスター達を片づけましょう」"
translation = "「그렇게 말씀하실 줄 알았어요…… 하고 싶은 말은 산더미 같지만, 우선은 이 몬스터들을 처리하죠」"

[[dialogue]]
speaker = "unk"
original = "あなたがイングリット？"
translation = "당신이 잉그리드야?"

[[dialogue]]
speaker = "イングリット"
original = "「誰だ貴様？」"
translation = "「누구냐 네놈은?」"

[[dialogue]]
speaker = "カティア"
original = "「いやお前が探してた魔王様だワン」"
translation = "「아니, 당신이 찾던 마왕님이다멍」"

[[dialogue]]
speaker = "イングリット"
original = "「そうか貴様が魔王か！\u3000とうとう見つけたぞ！」"
translation = "「그런가, 네놈이 마왕인가! 드디어 찾아냈군!」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「魔王の顔写真はコラプサーのアジトで見たではございませんか……」"
translation = "「마왕의 얼굴 사진은 콜랩서 은신처에서 보지 않으셨나요……」"

[[dialogue]]
speaker = "イングリット"
original = "「忘れた。魔王の強さには興味があるが、顔などどうでもいい」"
translation = "「잊었다. 마왕의 강함에는 흥미가 있지만 얼굴 따위 아무래도 좋다」"

[[dialogue]]
speaker = "カティア"
original = "「やっぱりこのコラプサー、戦い以外ダメダメだワン……！」"
translation = "「역시 이 콜랩서, 싸움 말고는 젬병이다멍……!」"

