[[dialogue]]
speaker = "unk"
original = "第２話,海の家でアルバイト（後編）,P"
translation = "제2화, 바다의 집에서 아르바이트 (후편), P"

[[dialogue]]
speaker = "unk"
original = "セドナさんと俺は、海の家のアルバイトとして働くことになったのだが──"
translation = "세드나 씨와 나는 바다의 집 아르바이트생으로 일하게 되었는데──"

[[dialogue]]
speaker = "unk"
original = "お客様がやってきたら？"
translation = "손님이 오시면?"

[[dialogue]]
speaker = "unk"
original = "それじゃあ復習しましょう"
translation = "그럼 복습해 보죠."

[[dialogue]]
speaker = "セドナ"
original = "「来店を歓迎し、人数を確認し、席に通し、メニューを渡す。注文が決まったら店員を呼べと伝える。合っているか？」"
translation = "「내점을 환영하고, 인원수를 확인하고, 자리를 안내하고, 메뉴를 건넨다. 주문이 결정되면 점원을 부르라고 전한다. 맞나?」"

[[dialogue]]
speaker = "unk"
original = "ではスマイル、お願いします"
translation = "그럼 스마일, 부탁드려요."

[[dialogue]]
speaker = "unk"
original = "はい、その通りです"
translation = "네, 맞습니다."

[[dialogue]]
speaker = "セドナ"
original = "「ふ、ふふっ……こ、こんな感じか？」"
translation = "「후, 후훗…… 이, 이런 느낌인가?」"

[[dialogue]]
speaker = "セドナ"
original = "「──まだ硬い？\u3000これ以上、どうしろというんだ……」"
translation = "「──아직 딱딱하다고? 이 이상 어떻게 하라는 거냐……」"

[[dialogue]]
speaker = "unk"
original = "アハハって笑ってみてください"
translation = "아하하, 하고 웃어보세요."

[[dialogue]]
speaker = "unk"
original = "もっとこう、口角を上げて"
translation = "좀 더 이렇게, 입꼬리를 올리고."

[[dialogue]]
speaker = "セドナ"
original = "「口角を……？\u3000こ、こうか？」"
translation = "「입꼬리를……? 이, 이렇게인가?」"

[[dialogue]]
speaker = "セドナ"
original = "「ア、アハハ～……」"
translation = "「아, 아하하~……」"

[[dialogue]]
speaker = "セドナ"
original = "「──待て。なんだか今、とても変な笑顔を浮かべた気がする。記憶から消せ。わかったか」"
translation = "「──기다려라. 왠지 지금, 무척 이상한 미소를 지은 기분이 드는군. 기억에서 지워라. 알겠나.」"

[[dialogue]]
speaker = "セドナ"
original = "「……くそ、屈辱だ。何なのだ、笑うとはなぜこんなにも難しい……！？」"
translation = "「……젠장, 굴욕이군. 뭐냐, 웃는다는 건 왜 이렇게나 어려운 것이지……!?」"

[[dialogue]]
speaker = "リップル"
original = "「お２人とも準備はいいデスカー？\u3000そろそろお客さん、入ってもらいまーす♪」"
translation = "「두 분 다 준비는 되셨슴까~? 슬슬 손님들 입장하심쇼~♪」"

[[dialogue]]
speaker = "セドナ"
original = "「もうそんな時間か。仕方がない……」"
translation = "「벌써 그런 시간인가. 어쩔 수 없군……」"

[[dialogue]]
speaker = "セドナ"
original = "「お前の言う『接客スマイル』については、営業中も練習に励むことにする。色々と迷惑をかけるかもしれんが、よろしく頼むぞ」"
translation = "「네가 말하는 『접객 스마일』에 대해서는 영업 중에도 연습에 힘쓰도록 하겠다. 여러모로 폐를 끼칠지도 모르겠다만, 잘 부탁한다.」"

[[dialogue]]
speaker = "リップル"
original = "「メイワクだなんて！\u3000そんなこと考えず、カイチョーも魔女さんも、タノシ～気持ちを忘れないでいてくれたらＢＩＧオッケーで～す！」"
translation = "「폐라니여! 그런 거 생각하지 말고, 회장님도 마녀 누님도 즐거~운 마음을 잊지 않아 주시면 BIG 오케이임다~!」"

[[dialogue]]
speaker = "リップル"
original = "「それじゃあ海の家、営業開始シマ～ス！！」"
translation = "「그럼 바다의 집, 영업 개시함쇼!!」"

[[dialogue]]
speaker = "セドナ"
original = "「よ、よく来たな……うむ、３名か。座敷が空いているからそこへ通そう。涼みながらメニューを見るといい」"
translation = "「어, 어서 와라…… 음, 3명인가. 좌식 자리가 비어있으니 그쪽으로 안내하지. 바람을 쐬며 메뉴를 보도록 해라.」"

[[dialogue]]
speaker = "セドナ"
original = "「注文が決まったら私を呼べ。では、ゆっくりしていけ」"
translation = "「주문이 결정되면 나를 불러라. 그럼, 천천히 쉬다 가도록.」"

[[dialogue]]
speaker = "セドナ"
original = "（──ダメだな。どうしても笑顔が硬くなる。これでは客もリラックスできないのではないか？）"
translation = "(──안 되겠군. 아무래도 미소가 딱딱해진다. 이래서는 손님도 릴랙스할 수 없지 않겠나?)"

[[dialogue]]
speaker = "セドナ"
original = "（魔王の方は……）"
translation = "(마왕 쪽은……)"

[[dialogue]]
speaker = "unk"
original = "いらっしゃいませ～！"
translation = "어서 오세요~!"

[[dialogue]]
speaker = "セドナ"
original = "（なんだあの弾ける笑顔は……ああいうやつが上官だと、学園の部下たちも働きやすいだろうな……）"
translation = "(뭐냐 저 톡톡 튀는 미소는…… 저런 녀석이 상관이라면, 학원의 부하들도 일하기 편하겠지……)"

[[dialogue]]
speaker = "セドナ"
original = "（私の表情が硬いと、付き従う者へ不安と緊張を与えてしまうのはわかっている。だが──）"
translation = "(내 표정이 딱딱하면, 따르는 자들에게 불안과 긴장을 준다는 것은 알고 있다. 하지만──)"

[[dialogue]]
speaker = "セドナ"
original = "（……笑うとは、どうすればいい？\u3000そもそも、私が最後に肩の力を抜いて笑ったのはいつだ……？）"
translation = "(……웃는다는 건 어떻게 해야 하지? 애초에 내가 마지막으로 어깨의 힘을 빼고 웃었던 건 언제였지……?)"

[[dialogue]]
speaker = "セドナ"
original = "（──思い出せん。リクリエを退けるため、その重責のために己を強く律するようになってから……『楽しい』と笑った記憶がない……）"
translation = "(──기억나지 않는군. 리크리에를 물리치기 위해, 그 중책 때문에 스스로를 강하게 다스리게 된 이후로…… 『즐겁다』며 웃었던 기억이 없어……)"

[[dialogue]]
speaker = "リップル"
original = "「お疲れ様デス、魔女のお姉さん♪」"
translation = "「수고하심쇼, 마녀 누님♪」"

[[dialogue]]
speaker = "セドナ"
original = "「む──どうかしたか？」"
translation = "「음── 무슨 일이지?」"

[[dialogue]]
speaker = "リップル"
original = "「ハイ♪\u3000もうすぐお昼休みなので、順番に休憩に入りマショウ！\u3000特製焼きそば、ゴチソウするので食べてくださ～い♪」"
translation = "「하이♪ 곧 점심시간이니까 순서대로 휴식에 들어가심쇼! 특제 야키소바, 대접할 테니까 드셔주심쇼~♪」"

[[dialogue]]
speaker = "リップル"
original = "「って……ンー？\u3000お姉さん、なんだかムズカシイお顔してますねー？」"
translation = "「그나저나…… 음~? 누님, 왠지 어려운 얼굴을 하고 계시네여?」"

[[dialogue]]
speaker = "セドナ"
original = "「すまない。私はこの場で、あまり役に立てていないようだ」"
translation = "「미안하다. 나는 이 자리에서 별로 도움이 되지 못하는 모양이군.」"

[[dialogue]]
speaker = "リップル"
original = "「ワオ！？\u3000そんなことないデス！\u3000確かにニッコリ笑顔は苦手そうですガ……」"
translation = "「와오!? 그렇지 않슴다! 확실히 생긋 미소는 서투른 것 같지만여……」"

[[dialogue]]
speaker = "リップル"
original = "「チュウモンしたがってるお客さん見つけるの、カイチョーより早いですシ～。動きもテキパキしててスゴイです！」"
translation = "「주문하고 싶어 하는 손님 찾아내는 거, 회장님보다 빠르심쇼~. 움직임도 빠릿빠릿해서 대단함다!」"

[[dialogue]]
speaker = "リップル"
original = "「ワタシは、お姉さんＢＩＧ頑張ってるとオモイマス！」"
translation = "「와타시는 누님이 BIG 노력하고 있다고 생각함다!」"

[[dialogue]]
speaker = "セドナ"
original = "「お前は笑顔を浮かべるのが得意そうだな。いったいどうすれば、そんな風に笑えるのだろうか」"
translation = "「너는 미소를 짓는 게 특기인 모양이군. 대체 어떻게 하면 그렇게 웃을 수 있는 거지?」"

[[dialogue]]
speaker = "リップル"
original = "「ン～？\u3000あんまりソウイウノ、考えたことないデスがー……」"
translation = "「음~? 별로 그런 거 생각해 본 적 없슴다만~……」"

[[dialogue]]
speaker = "リップル"
original = "「お姉さんは肩に力、イレスギな気がします。もっと、ナカヨシのお友達と過ごしてる時みたいに、リラックスで～す♪」"
translation = "「누님은 어깨에 힘이 너무 들어간 기분이 듬다. 좀 더, 친한 친구랑 지낼 때처럼 릴랙스임다~♪」"

[[dialogue]]
speaker = "リップル"
original = "「マダ初日、きっとキンチョウしてるんですネ！\u3000そんな時はオナカいっぱい食べて、オトモダチとの楽しかった時のこと思い出すとイイです♪」"
translation = "「아직 첫날이라 분명 긴장하고 계신 거네여! 그럴 때는 배불리 먹고, 친구랑 즐거웠을 때를 떠올리면 좋슴다♪」"

[[dialogue]]
speaker = "リップル"
original = "「デハ、手が空いたら奥に来てくださ～い！」"
translation = "「그럼 손 비면 안쪽으로 오심쇼~!」"

[[dialogue]]
speaker = "セドナ"
original = "（友人……そう呼べる相手は、リノくらいか？）"
translation = "(친구…… 그렇게 부를 수 있는 상대는 리노 정도인가?)"

[[dialogue]]
speaker = "セドナ"
original = "（思えばあいつは器用だったな。いつもニコニコとよく笑っていた気がする）"
translation = "(생각해 보면 그 녀석은 싹싹했지. 항상 싱글벙글하며 잘 웃었던 기분이 든다.)"

[[dialogue]]
speaker = "セドナ"
original = "（まだあいつがネビュラにいた頃は、人間界の視察も２人でこなしていた。目立つ動きはするなと厳命されていたのに、よく人間にお節介を焼いて……）"
translation = "(아직 그 녀석이 네뷸라에 있었을 무렵에는, 인간계 시찰도 둘이서 해냈었지. 눈에 띄는 행동은 하지 말라고 엄명받았는데도, 자주 인간들에게 참견을 구우며……)"

[[dialogue]]
speaker = "セドナ"
original = "（迷子のこどもを見かけた時もあった。リノのやつ、駆け寄って慰めて、アイスクリームを買ってやって……）"
translation = "(길 잃은 아이를 발견했을 때도 있었다. 리노 녀석, 달려가서 달래주고 아이스크림을 사주고는……)"

[[dialogue]]
speaker = "セドナ"
original = "（そうだ、あの時──）"
translation = "(그래, 그때──)"

[[dialogue]]
speaker = "リノ"
original = "『こ～ら、セドナ！\u3000怖い顔をするんじゃないの！\u3000この子が不安になっちゃうでしょ！』"
translation = "『이~놈, 세드나! 무서운 얼굴 하지 말라니까! 이 아이가 불안해하잖아!』"

[[dialogue]]
speaker = "リノ"
original = "『私みたいにニコ～って！\u3000ほら、ニコ～って笑うの！』"
translation = "『나처럼 생긋~! 자, 생긋 하고 웃는 거야!』"

[[dialogue]]
speaker = "リノ"
original = "『……なんだ、やればできるじゃない！\u3000鬼教官も泣いてるこどもには勝てないってことかしら～♪』"
translation = "『……뭐야, 하면 되잖아! 귀신 교관도 우는 아이한테는 못 당한다는 걸까나~♪』"

[[dialogue]]
speaker = "セドナ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "セドナ"
original = "「そう、だったな。私も笑ったことがあった」"
translation = "「그랬었지. 나도 웃었던 적이 있었다.」"

[[dialogue]]
speaker = "セドナ"
original = "「あの時と同じ気持ちを、思い出せば……」"
translation = "「그때와 같은 기분을 떠올린다면……」"

[[dialogue]]
speaker = "小さな女の子"
original = "「どこー…………？\u3000お母さん、どこー…………？」"
translation = "「어디야…………? 엄마, 어디야…………?」"

[[dialogue]]
speaker = "セドナ"
original = "「む──あれは……」"
translation = "「음── 저건……」"

[[dialogue]]
speaker = "unk"
original = "接客の波が落ち着いたタイミングで、ふとセドナさんがいなくなっていたことに気づいた。どこに行ったんだろう……？"
translation = "접객의 파도가 가라앉은 타이밍에, 문득 세드나 씨가 사라졌다는 것을 깨달았다. 어디로 간 걸까……?"

[[dialogue]]
speaker = "unk"
original = "（あ、見つけた──）"
translation = "(아, 찾았다──)"

[[dialogue]]
speaker = "セドナ"
original = "「──なんだお前、アイスを食べた途端に泣き止んだな。少しは安心できたか？」"
translation = "「──뭐냐 너, 아이스크림을 먹자마자 울음을 그쳤군. 조금은 안심이 되었나?」"

[[dialogue]]
speaker = "セドナ"
original = "「ああ。食べ終わったら一緒に探そう。何、心配はいらん。母親はすぐに見つけてやろう」"
translation = "「그래. 다 먹으면 함께 찾아보자. 뭐, 걱정할 것 없다. 어머니는 금방 찾아주마」"

[[dialogue]]
speaker = "セドナ"
original = "「失せ者探しのまじないを使ってやる。特別だぞ」"
translation = "「미아 찾기 주술을 써주지. 특별 서비스다」"

[[dialogue]]
speaker = "unk"
original = "セドナさん、お疲れ様です"
translation = "세드나 씨, 수고 많으십니다"

[[dialogue]]
speaker = "セドナ"
original = "「魔王か。すまない。見てのとおりだ、この子が母親とはぐれたらしい。リップルにしばらく抜けると伝えてくれるか」"
translation = "「마왕인가. 미안하군. 보다시피다, 이 아이가 어머니와 길을 잃은 모양이야. 리플에게 잠시 자리를 비운다고 전해주겠나」"

[[dialogue]]
speaker = "セドナ"
original = "「……問題ない？\u3000そうか、助かる。できるかぎり早く帰ることを約束しよう」"
translation = "「……문제없나? 그래, 고맙군. 가능한 한 빨리 돌아올 것을 약속하마」"

[[dialogue]]
speaker = "セドナ"
original = "「……なんだ、どうした？\u3000人の顔を見て、ニヤニヤと」"
translation = "「……뭐냐, 왜 그러지? 사람 얼굴을 보고 싱글벙글하고는」"

[[dialogue]]
speaker = "unk"
original = "スマイル、できるじゃないですか"
translation = "스마일, 할 수 있잖아요"

[[dialogue]]
speaker = "セドナ"
original = "「…………親子そろって似たことを言う」"
translation = "「…………모녀가 똑같은 소리를 하는군」"

[[dialogue]]
speaker = "セドナ"
original = "「いや──何でもないさ。ではな、行ってくる」"
translation = "「아니── 아무것도 아니다. 그럼, 다녀오마」"

[[dialogue]]
speaker = "unk"
original = "そうして迷子の女の子を送り届けた後、セドナさんは海の家に帰ってきた。"
translation = "그렇게 미아인 여자아이를 데려다준 뒤, 세드나 씨는 바다의 집으로 돌아왔다."

[[dialogue]]
speaker = "unk"
original = "それ以降のセドナさんは、笑顔のコツを掴んだのか──とても自然に微笑むことができるようになるのだった。"
translation = "그 이후의 세드나 씨는 미소 짓는 요령을 터득했는지── 아주 자연스럽게 미소 지을 수 있게 되었다."

