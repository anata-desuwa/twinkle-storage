[[dialogue]]
speaker = "unk"
original = "守護天使２人が本体に遭遇する約１０分前――"
translation = "수호천사 두 사람이 본체와 조우하기 약 10분 전──"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「これは……！\u3000そうか、そういうことカ……！」"
translation = "「이것은……! 그렇군, 그런 거였나다……!」"

[[dialogue]]
speaker = "unk"
original = "保健室でクロトの本体を検査していたアニマは、あることに気づく。"
translation = "보건실에서 쿠로토의 본체를 검사하던 아니마는 어떤 사실을 깨닫는다."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「だとすれば、急いで準備をしナイと――」"
translation = "「그렇다면 서둘러 준비를 하지 않으면 안 된다……!」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「はっ！？\u3000しまっ……！」"
translation = "「핫!? 아차……!」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「――アルモタヘル！\u3000無事ですか！？」"
translation = "「──아르모타헬! 무사한가요!?」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「間一髪……かわせたのだ！\u3000でも、これは一体、どういうことなのだ……！？」"
translation = "「간발의 차로…… 피한 것이다! 하지만 이건 대체 어떻게 된 일인 것인가……!?」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「本体が攻撃してくるなんて！\u3000まるで堕天している時みたいだぞ！？」"
translation = "「본체가 공격해오다니! 마치 타천하고 있을 때 같지 않은가!?」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「わかりません……！\u3000ただ、どうやら私たちを狙ってきてるみたいです。邪魔が入らないように、周囲に隠蔽の結界が張られています！」"
translation = "「모르겠어요……! 다만 아무래도 우리를 노리고 있는 것 같아요. 방해가 들어오지 않도록 주위에 은폐 결계가 쳐져 있어요!」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「そういうことなら……ちょうどいいのだ！\u3000この体での新しい力、試してみるのだ、マグダレナ！」"
translation = "「그렇게 된 거라면…… 마침 잘 된 것이다! 이 몸에서의 새로운 힘, 시험해 보는 것이다, 마그달레나!」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「そうですね。皆さまに心配をかけるわけにもいきません。手早く制圧するしかなさそうです！」"
translation = "「그렇네요. 모두에게 걱정을 끼칠 수는 없으니까요. 재빨리 제압하는 수밖에 없을 것 같아요!」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「――変身！」"
translation = "「──변신!」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「変身なのだ！」"
translation = "「변신인 것이다!」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「じゃ～ん！\u3000これが……我ら２人の新しい戦闘フォームなのだ！」"
translation = "「쨔~안! 이것이…… 우리들 두 사람의 새로운 전투 폼인 것이다!」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「さあ、行きますよ――ママダレナの愛の力、見せちゃいます！」"
translation = "「자, 갑니다── 마마달레나의 사랑의 힘, 보여주겠어요!」"

[[dialogue]]
speaker = "unk"
original = "そうして、守護天使ＶＳ守護天使の戦闘が開始されるのだった――"
translation = "그렇게 하여, 수호천사 VS 수호천사의 전투가 개시되는 것이었다──"

