[[dialogue]]
speaker = "unk"
original = "第４話,初めてよりも甘く,P"
translation = "제4화, 처음보다 달콤하게"

[[dialogue]]
speaker = "unk"
original = "酔った勢いでのキス事件からしばらく経ち、ようやく互いに顔を見ても動揺せずに済むくらいには落ち着きを取り戻してきた頃。"
translation = "취한 기세로 저지른 키스 사건으로부터 시간이 좀 흐르고 겨우 서로의 얼굴을 봐도 동요하지 않을 정도로 진정되었을 무렵."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「あの、会長……！\u3000私――」"
translation = "「저기, 회장님……! 나――」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「『恋人のスキンシップ』に挑戦したいわ！」"
translation = "「『연인의 스킨십』에 도전하고 싶어!」"

[[dialogue]]
speaker = "unk"
original = "そんな宣言を受けて、翌日の休み。シズハは俺の家へとやって来ていた。"
translation = "그런 선언을 받고 다음 날 휴일. 시즈하는 우리 집으로 찾아와 있었다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「そ、それじゃあ、会長！\u3000昨日言ってた通り、これから２人でスキンシップをするわよ……！」"
translation = "「그, 그럼 회장님! 어제 말한 대로 이제부터 둘이서 스킨십을 할 거야……!」"

[[dialogue]]
speaker = "unk"
original = "無理しなくてもいいんだぞ？"
translation = "무리하지 않아도 된다고?"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「だ、大丈夫……無理はしてないわ。その、この前の事故で私、会長にキスしちゃったでしょ？」"
translation = "「괘, 괜찮아…… 무리하는 거 아니야. 그, 요전번 사고로 내가 회장님한테 키스해버렸잖아?」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「それで……ずっとモヤモヤしてたの。本当はあんな形じゃなくて、もっとちゃんとお互いの気持ちを通じ合わせてから、キスだってしたかったのに……」"
translation = "「그래서…… 계속 찜찜했어. 사실은 그런 형태가 아니라 좀 더 제대로 서로의 마음을 통하게 한 뒤에 키스도 하고 싶었는데……」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「だから、リベンジしたくて！\u3000酔った勢いとかじゃなく、会長とちゃんと向き合って、モヤモヤを晴らしたいの！」"
translation = "「그러니까 리벤지하고 싶어! 취한 기세 같은 게 아니라 회장님과 제대로 마주 보고 찜찜함을 풀고 싶어!」"

[[dialogue]]
speaker = "unk"
original = "わかった。優しくするからな"
translation = "알았어. 상냥하게 해줄게"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「う、うん……<emoji=heart04>」"
translation = "「으, 응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「え？\u3000――ちなみに、なんで戦闘服なのかって？」"
translation = "「어? ――참고로 왜 전투복이냐고?」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「そ、そんなの決まってるでしょ！\u3000スキンシップは恋人同士の勝負みたいなものなんだから……その……」"
translation = "「그, 그런 거야 당연하잖아! 스킨십은 연인끼리의 승부 같은 거니까…… 그……」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「勝負服ってこと……！」"
translation = "「승부복이라는 거야……!」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「――発想が可愛すぎる！？\u3000ば、バカバカ！\u3000私はこれでも真面目なんだから……！」"
translation = "「――발상이 너무 귀엽다고!? 바, 바보바보! 나는 이래 봬도 진지하다니까……!」"

[[dialogue]]
speaker = "unk"
original = "じゃあシズハ……始めるよ"
translation = "그럼 시즈하…… 시작할게"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「……！\u3000んっ<emoji=heart04>\u3000ちゃんと、優しくしてよね……<emoji=heart04>」"
translation = "「……! 응<emoji=heart04> 제대로 상냥하게 해줘야 해……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は片手を繋いで、以前シズハがしてくれたように、そっと指先を絡めて恋人繋ぎにする。"
translation = "나는 한쪽 손을 잡고 이전에 시즈하가 해줬던 것처럼 살며시 손가락을 얽어 연인 잡기를 했다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "（あっ<emoji=heart04>\u3000こ、この恋人繋ぎ……やっぱり普通に手を繋ぐのより、ずっとドキドキする……<emoji=heart04>）"
translation = "(앗<emoji=heart04> 이, 이 연인 잡기…… 역시 평범하게 손을 잡는 것보다 훨씬 두근거려……<emoji=heart04>)"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "（ぴったり密着してる感じがして……まるで会長に包まれてるみたいな……<emoji=heart04>）"
translation = "(딱 밀착된 느낌이 들어서…… 마치 회장님에게 감싸여 있는 것 같은……<emoji=heart04>)"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "（って……そういうのも恥ずかしがらずに、思っていることを素直に口にしないと……！）"
translation = "(아니…… 그런 것도 부끄러워하지 말고 생각하는 걸 솔직하게 말해야지……!)"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "（これは、この前の酔っ払っちゃったときのモヤモヤを晴らす為にやっているんだから……！）"
translation = "(이건 요전번 취해버렸을 때의 찜찜함을 풀기 위해 하는 거니까……!)"

[[dialogue]]
speaker = "unk"
original = "俺は空いている右手を彼女の頭に置いて、そっと撫でる。"
translation = "나는 비어있는 오른손을 그녀의 머리에 얹고 살며시 쓰다듬었다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「ふあっ……！？\u3000か、会長のバカバカっ<emoji=heart04>\u3000そんな優しく頭を撫でられたら、安心しちゃうじゃない……<emoji=heart04>」"
translation = "「후앗……!? 회, 회장님 바보바보<emoji=heart04> 그렇게 상냥하게 머리를 쓰다듬으면 안심하게 되잖아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それから、頬に触れて、指でなぞるように撫でる。"
translation = "그리고 볼을 만지고 손가락으로 훑듯이 쓰다듬었다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「あっ……バカぁ<emoji=heart04>\u3000くすぐったいわよ……<emoji=heart04>\u3000なんかいやらしくて、ゾクゾクしちゃうからぁ……<emoji=heart04>」"
translation = "「앗…… 바보야<emoji=heart04> 간지럽다니까……<emoji=heart04> 왠지 야릇해서 오싹오싹해지니까아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「んっ……<emoji=heart04>\u3000真っすぐに目を見つめるのもダメぇ<emoji=heart04>\u3000ドキドキしちゃうから、あんまり見ないで……っ<emoji=heart04>」"
translation = "「응……<emoji=heart04> 똑바로 눈을 쳐다보는 것도 안 돼애<emoji=heart04> 두근거리니까 너무 보지 마……윽<emoji=heart04>」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "（あれ！？\u3000素直になろうと思ってるのに、反射的に素直じゃない言葉ばっかり出てきちゃう……！）"
translation = "(어라!? 솔직해지려고 생각했는데 반사적으로 솔직하지 못한 말만 계속 나와……!)"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "（うぅ……こ、こんなはずじゃなかったのに……）"
translation = "(으으…… 이, 이럴 계획이 아니었는데……)"

[[dialogue]]
speaker = "unk"
original = "シズハ？\u3000大丈夫？"
translation = "시즈하? 괜찮아?"

[[dialogue]]
speaker = "unk"
original = "シズハの目に涙がじわりと溢れてきていることに気づいた俺は、それをそっと指で拭う。"
translation = "시즈하의 눈에 눈물이 조금 고인 것을 깨달은 나는 그것을 살며시 손가락으로 닦아주었다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「か、会長、ごめんなさい……私……」"
translation = "「회, 회장님 죄송해요…… 저……」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「本当はもっと素直に、気持ちを伝えようと思ってたの。でも、ドキドキしちゃうと私……素直じゃない言葉ばっかり出てきちゃう……」"
translation = "「사실은 좀 더 솔직하게 마음을 전하려고 했어요. 하지만 두근거리면 저…… 솔직하지 못한 말만 계속 나와서……」"

[[dialogue]]
speaker = "unk"
original = "シズハのことが好きだから、全部わかってる"
translation = "시즈하를 좋아하니까 전부 알고 있어"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「え……？」"
translation = "「어……?」"

[[dialogue]]
speaker = "unk"
original = "――シズハは照れているだけで、本当は優しい子だとわかっているし、むしろ照れると素直じゃなくなっちゃうのは可愛い。"
translation = "――시즈하는 부끄러워할 뿐 사실은 상냥한 아이라는 걸 알고 있고 오히려 부끄러워하면 솔직해지지 못하는 점이 귀엽다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「――だから気にしてるのは、私がスキンシップを嫌じゃないかどうかだけ？」"
translation = "「――그래서 신경 쓰는 건 내가 스킨십을 싫어하는지 아닌지뿐이라고요?」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「それは全然、大丈夫……だって私も――」"
translation = "「그건 전혀 괜찮아요…… 저도――」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「会長が優しいってわかってるから。それに……その……」"
translation = "「회장님이 상냥하다는 걸 알고 있으니까. 그리고…… 그……」"

[[dialogue]]
speaker = "unk"
original = "シズハは１度照れて視線を外してから、深呼吸をして、改めて俺と目を合わせる。"
translation = "시즈하는 한 번 부끄러워하며 시선을 돌렸다가 심호흡을 하고 다시금 나와 눈을 맞췄다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「会長のこと……私も好き<emoji=heart04>」"
translation = "「회장님을…… 저도 좋아해요<emoji=heart04>」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「いつも私のことを気遣ってくれて、困っている時は引っ張ってくれて、頼りになってカッコいいなって……<emoji=heart04>」"
translation = "「언제나 저를 챙겨주고 곤란할 때는 이끌어주고 믿음직하고 멋지다고 생각해서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「う、ううん。カッコいいとは思っているけど、カッコいいから好きなんじゃなくて……」"
translation = "「으, 응. 멋지다고는 생각하지만 멋있어서 좋아하는 게 아니라……」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「私のことを好きだって、一緒にいたいって、言葉にしなくてもわかるくらい行動で伝えてくれているところが、すごくドキドキして、好きなの……<emoji=heart04>」"
translation = "「나를 좋아한다고, 함께 있고 싶다고 말로 하지 않아도 알 수 있을 정도로 행동으로 전해주고 있는 점이 정말 두근거리고 좋아요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「って、ちょっと泣きそうになったら……私もやっと素直に言えた……えへへ<emoji=heart04>」"
translation = "「그렇게 말하려니 좀 울 것 같았지만…… 저도 겨우 솔직하게 말했네요…… 에헤헤<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は愛おしくなって、シズハを抱き寄せる。"
translation = "나는 사랑스러워져서 시즈하를 끌어안았다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「あっ、会長……<emoji=heart04>」"
translation = "「앗, 회장님……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "これからはもっと、好きって言葉に出すから"
translation = "앞으로는 좀 더 좋아한다고 말로 할게"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「う、うん……<emoji=heart04>\u3000私も……これからもっといっぱい、好きって伝えられるように頑張るね……<emoji=heart04>」"
translation = "「으, 응……<emoji=heart04> 저도…… 앞으로 좀 더 많이 좋아한다고 전할 수 있도록 노력할게요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それから俺は、シズハと近くから見つめ合って――そっと唇を寄せる。"
translation = "그리고 나는 시즈하와 가까이서 서로를 바라보다가―― 살며시 입술을 다가갔다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「会長……<emoji=heart04>\u3000ん……<emoji=heart04>」"
translation = "「회장님……<emoji=heart04> 응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「ちゅっ<emoji=heart04>」"
translation = "「쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そうして、俺たちは気持ちを通じ合わせたキスをする。"
translation = "그렇게 우리들은 마음을 통한 키스를 한다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「好きよ、会長<emoji=heart04>\u3000ちゅっ……ちゅっ<emoji=heart04>」"
translation = "「좋아해요, 회장님<emoji=heart04> 쪽…… 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "お互いの背中に手を回して、抱き合いながら、この前の初キスが上書きされてしまうくらい甘い時間を過ごすのだった。"
translation = "서로의 등 뒤로 손을 돌려 껴안으며 요전번의 첫 키스를 덮어써 버릴 정도로 달콤한 시간을 보내는 것이었다."

