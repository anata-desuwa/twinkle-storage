[[dialogue]]
speaker = "unk"
original = "第１話,モネＶＳイクシリオン？,P"
translation = "제1화, 모네 VS 익실리온?, P"

[[dialogue]]
speaker = "unk"
original = "先日モネに紹介された本の感想を伝えようと思って、図書館にやってくると──"
translation = "요전날 모네에게 소개받은 책의 감상을 전해주려고 도서관에 찾아오자──"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "モネ、怒ってる……？"
translation = "모네, 화났나……?"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「あっ、会長。図書館に来られていたんですね」"
translation = "「앗, 회장님. 도서관에 오셨군요」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「見苦しいところをお見せしてすみません。でも会長に怒っていたわけではないんです」"
translation = "「꼴사나운 모습을 보여드려 죄송해요. 하지만 회장님께 화가 난 건 아니에요」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「突然ですが、私にはこの世に許せないものが３つあります」"
translation = "「갑작스럽지만, 저에게는 이 세상에서 용서할 수 없는 것이 3가지 있습니다」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「１つめは本を大切にしない人。２つめは本を馬鹿にする人。３つめは本の貸出期限を過ぎても本を返却しない人です」"
translation = "「첫 번째는 책을 소중히 여기지 않는 사람. 두 번째는 책을 바보 취급하는 사람. 세 번째는 책 대출 기한이 지나도 책을 반납하지 않는 사람이에요」"

[[dialogue]]
speaker = "unk"
original = "全部本のことだね……？"
translation = "전부 책에 관한 거네……?"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「当然です。本は人類の宝ですから。その宝を粗末に扱う人は許せません」"
translation = "「당연합니다. 책은 인류의 보물이니까요. 그 보물을 함부로 다루는 사람은 용서할 수 없어요」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ですので私は図書委員として、延滞した図書の返却督促に向かいます……！」"
translation = "「그러므로 저는 도서위원으로서, 연체된 도서의 반납 독촉을 하러 가겠습니다……!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「はぁはぁ……この雄々しい肉体美……いつ見てもムラムラ……いえ、躍動感に心を奪われます」"
translation = "「하아하아…… 이 늠름한 육체미…… 언제 봐도 무럭무럭…… 아니, 역동감에 마음을 빼앗깁니다」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「女性の柔らかそうな肢体も素晴らしい……その瑞々しさたるや、触れずともその肉感が手に伝わってきて……！」"
translation = "「여성의 부드러워 보이는 지체도 훌륭해…… 그 싱그러움이란, 닿지 않아도 그 육감이 손에 전해져 와서……!」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「いました……！\u3000美術の本を読まれていますね」"
translation = "「찾았습니다……! 미술 서적을 읽고 계셨군요」"

[[dialogue]]
speaker = "unk"
original = "イクシーが犯人？"
translation = "익시가 범인?"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「はい。イクシーさんは図書館によく来られていて、保健体育や性教育の本などを借りられています」"
translation = "「네. 익시 씨는 도서관에 자주 오셔서, 보건 체육이나 성교육 책 등을 빌려 가시곤 해요」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「保健委員として勉強熱心で、そういう意味では委員の鑑といえるかもしれません。あとは美術の本も借りられています」"
translation = "「보건 위원으로서 공부에 열심이라, 그런 의미에서는 위원의 귀감이라고 할 수 있을지도 모르겠네요. 그 외에는 미술 서적도 빌려 가세요」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「確か、エドゥアール・マネの『オランピア』が特にお好きだとか。人体の仕組みに詳しいだけでなく、美術の造詣も深くて驚かされます」"
translation = "「분명, 에두아르 마네의 『올랭피아』를 특히 좋아하신다던가. 인체의 구조에 정통할 뿐만 아니라, 미술에 대한 조예도 깊어서 놀라울 따름이에요」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「……どうしたんですか、会長？\u3000気まずそうな顔をされて」"
translation = "「……왜 그러세요, 회장님? 거북한 표정을 지으시고」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「何でもない？\u3000はぁ……それならいいんですけど」"
translation = "「아무것도 아니라고요? 하아…… 그렇다면 다행입니다만」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「私としても仲良くしていただいている１人で、心苦しくはあるのですが……図書の延滞とあれば見逃せません。行きましょう……！」"
translation = "「저로서도 친하게 지내는 분 중 한 명이라 마음이 아프긴 합니다만…… 도서 연체라면 눈감아 줄 수 없어요. 가시죠……!」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「イクシーさん」"
translation = "「익시 씨」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「！？」"
translation = "「!?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（いつもと違う険しい表情……もしやモネさんが怒っている……！？）"
translation = "（평소와 다른 험악한 표정…… 설마 모네 씨가 화난 건가……!?）"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「も、モネさん……？\u3000私にご用ですか……？」"
translation = "「모, 모네 씨……? 저에게 용건이 있으신가요……?」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「イクシーさん。何か後ろめたいことはありませんか？」"
translation = "「익시 씨. 뭔가 켕기는 일은 없으신가요?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「いえそんな、後ろめたいこと……なんて……」"
translation = "「아니 그런, 켕기는 일…… 이라니……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（ありまぁすっ！！）"
translation = "（있습니닷!!）"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（河川敷に捨てられていたエッチな本を持ち帰ったことでしょうか……あの破壊的なまでの肉感は実に眼福でした……）"
translation = "（강변에 버려져 있던 야한 책을 가져온 일일까요…… 그 파괴적일 정도의 육감은 실로 안복이었습니다만……）"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（それとも、体育の着替えの時に皆さんの下着をチラ見していること……？\u3000いえ、一瞬で脳細胞に焼き付けているからバレないはず……）"
translation = "（아니면, 체육 시간 옷을 갈아입을 때 여러분의 속옷을 훔쳐보고 있는 것……? 아니, 일순간에 뇌세포에 새겨두고 있으니 들킬 리가……）"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（あるいは背伸びをして大人な下着を買ったことでしょうか……？\u3000あれは大変いやらし……いえ、素晴らしい機能美でした……）"
translation = "（혹은 무리해서 어른스러운 속옷을 산 일일까요……? 그건 무척 야하…… 아니, 훌륭한 기능미였습니다만……）"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「イクシーさん、顔が青いですよ？」"
translation = "「익시 씨, 얼굴이 파래요?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「ひぅっ！？」"
translation = "「히익!?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（しかしモネさんのこの怒りよう……まさかアレがバレたのでしょうか……！？）"
translation = "（하지만 모네 씨의 이 분노…… 설마 그게 들킨 걸까요……!?）"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「イクシーさんは初犯ですから、速やかに渡していただければそれ以上は咎めません。早く出してください」"
translation = "「익시 씨는 초범이니까, 신속하게 넘겨주시면 그 이상은 탓하지 않겠어요. 어서 내놓으세요」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（間違いありません！\u3000バレています！\u3000こうなっては言い逃れはできません……！）"
translation = "（틀림없습니다! 들켰어요! 이렇게 된 이상 발뺌할 수 없습니다……!）"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「も、申し訳ありませんでしたーっ！\u3000こちらです！」"
translation = "「죄, 죄송했습니다아앗! 여기 있습니다!」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「へ……？\u3000ＤＩＳＣを出してどうしたんですか……？」"
translation = "「헤……? DISC를 꺼내서 어쩌시려는 건가요……?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「え？\u3000違うのですか？\u3000以前リゾート結界でトレーニングにお付き合いした時に、モネさんの水着サンタ姿があまりに可憐でつい写真に収めてしまいまして……」"
translation = "「에? 아닌가요? 예전에 리조트 결계에서 트레이닝을 도와드렸을 때, 모네 씨의 수영복 산타 모습이 너무나 가련해서 그만 사진에 담아버리고 말아서……」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ぴやっ！？\u3000撮ったんですか！？」"
translation = "「삐얏!? 찍으셨나요!?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「はい……モネさんは肌の露出が少な──いえ、いつも読書をされていて、活動的なお姿は貴重なので……この通り」"
translation = "「네…… 모네 씨는 피부 노출이 적── 아니, 항상 독서를 하고 계셔서, 활동적인 모습은 귀중하기에…… 이 보시는 바와 같이」"

[[dialogue]]
speaker = "unk"
original = "おお、これは際どいアングル……"
translation = "오오, 이건 아슬아슬한 앵글……"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ひぁぁあ～～～っ！？\u3000会長、そんなまじまじと見ないでください！」"
translation = "「히아아아아~~앗!? 회장님, 그렇게 빤히 쳐다보지 마세요!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「あれ？\u3000モネさんが怒っていらしたのはこの件ではないのですか？」"
translation = "「어라? 모네 씨가 화내고 계셨던 건 이 건이 아닌가요?」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「違います！\u3000図書館で借りた本を延滞しているんです！」"
translation = "「틀려요! 도서관에서 빌린 책을 연체하고 계신단 말이에요!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「延滞……？\u3000しかし期限はまだのはずでは……？」"
translation = "「연체……? 하지만 기한은 아직일 텐데……?」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「貸出の延長をした際に、期限を間違えて覚えていませんか？\u3000ＤＩＳＣで確認し直してください」"
translation = "「대출 연장을 하셨을 때, 기한을 착각해서 기억하고 계신 거 아닌가요? DISC로 다시 확인해 보세요」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「どれどれ……ああ～っ！？\u3000大変申し訳ありませんでした……これから返しに参ります……」"
translation = "「어디 보자…… 아아~앗!? 정말 죄송했습니다…… 지금 바로 돌려주러 가겠습니다……」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「わかればいいんです、わかれば。今後は貸出期間に気を付けてくださいね」"
translation = "「알았으면 됐어요, 알았으면. 앞으로는 대출 기간에 주의해 주세요」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「はい、反省します……」"
translation = "「네, 반성하겠습니다……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「ではこの写真は思い出の一幕として大事に保存を……」"
translation = "「그럼 이 사진은 추억의 한 장면으로서 소중히 보존을……」"

[[dialogue]]
speaker = "unk"
original = "この写真、もらっていい？"
translation = "이 사진, 받아도 돼?"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「はい、もちろん♪\u3000ですがもっとよく撮れているオススメがありまして──」"
translation = "「네, 물론이죠♪ 하지만 더 잘 찍힌 추천작이 있어서──」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「それはダメです～～～～～～っ！！」"
translation = "「그건 안 돼요~~~~~~~~앗!!」"

[[dialogue]]
speaker = "unk"
original = "俺とイクシーはモネにこってり絞られた上、イクシーはＤＩＳＣの全データを消去されたのであった──"
translation = "나와 익시는 모네에게 호되게 혼난 데다, 익시는 DISC의 모든 데이터를 소거당하고 말았다──"

