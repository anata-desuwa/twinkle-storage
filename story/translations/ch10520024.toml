[[dialogue]]
speaker = "unk"
original = "第４話,夜の浜辺にて,P"
translation = "제4화, 밤의 해변에서, P"

[[dialogue]]
speaker = "セドナ"
original = "「魔王よ。次のネビュラとの合同訓練についてだが……む？\u3000お前、随分とくたびれた顔をしているな」"
translation = "「마왕이여. 다음 네뷸라와의 합동 훈련에 대해서다만…… 음? 너, 꽤나 지친 얼굴을 하고 있군」"

[[dialogue]]
speaker = "unk"
original = "ここのところ、忙しくて……"
translation = "요즘 좀 바빠서……"

[[dialogue]]
speaker = "セドナ"
original = "「……また仕事を詰め込んだか。仕方のないやつだ。今日はもうオフにしろ。出かけるぞ」"
translation = "「……또 일을 몰아서 했나. 어쩔 수 없는 녀석이군. 오늘은 이제 오프다. 나가자」"

[[dialogue]]
speaker = "セドナ"
original = "「どこにって……気分転換だ。黙ってついてこい」"
translation = "「어디냐니…… 기분 전환이다. 잠자코 따라와라」"

[[dialogue]]
speaker = "unk"
original = "そうして俺は、仕事を進める手を止め、セドナさんの背中を追いかけて──"
translation = "그렇게 나는 업무를 진행하던 손을 멈추고 세드나 씨의 뒤를 쫓아가──"

[[dialogue]]
speaker = "セドナ"
original = "「どうだ魔王。誰もいない夜の浜辺は心が休まるだろう」"
translation = "「어떠냐 마왕. 아무도 없는 밤의 해변은 마음이 편안해지지?」"

[[dialogue]]
speaker = "セドナ"
original = "「潮騒と、焚き火の爆ぜる音で心を休めるといい」"
translation = "「파도 소리와 모닥불이 타닥거리는 소리로 마음을 쉬게 하도록 해라」"

[[dialogue]]
speaker = "セドナ"
original = "「フ──魔力で作った焚き火に当たれるなど、なかなかない経験だろう？」"
translation = "「후── 마력으로 만든 모닥불을 쬘 수 있다니 좀처럼 없는 경험이지?」"

[[dialogue]]
speaker = "unk"
original = "たしかに癒されますね、これは"
translation = "확실히 힐링 되네요, 이건"

[[dialogue]]
speaker = "セドナ"
original = "「焚き火は、私の昔からのストレス解消法でな。静かな場所でパチパチと揺れる火を見つめていると、心が安らぐ」"
translation = "「모닥불은 내 옛날부터의 스트레스 해소법이라서 말이지. 조용한 곳에서 파닥파닥 흔들리는 불꽃을 바라보고 있으면 마음이 안온해진다」"

[[dialogue]]
speaker = "セドナ"
original = "「今だけは仕事を忘れ、リラックスしろ。クーラーボックスにある飲み物も、何でも好きに飲むがいい」"
translation = "「지금만큼은 일을 잊고 릴랙스해라. 쿨러 박스에 있는 음료도 뭐든 마음껏 마셔도 좋다」"

[[dialogue]]
speaker = "セドナ"
original = "「……しかし。お前は組織のトップを担う身だ。激務なのは承知しているが、体は大切にしなくては駄目だろう」"
translation = "「……하지만. 너는 조직의 우두머리를 맡은 몸이다. 격무라는 건 알고 있다만, 몸은 소중히 여겨야 하지 않겠나」"

[[dialogue]]
speaker = "セドナ"
original = "「…………なんだ、人の顔をジロジロと見て」"
translation = "「…………뭐냐, 사람 얼굴을 빤히 보고」"

[[dialogue]]
speaker = "unk"
original = "セドナさん、雰囲気が変わりましたね"
translation = "세드나 씨, 분위기가 바뀌었네요"

[[dialogue]]
speaker = "セドナ"
original = "「……ああ、そうかもしれないな」"
translation = "「……아아, 그럴지도 모르겠군」"

[[dialogue]]
speaker = "セドナ"
original = "「最近はネビュラの部下も、私の前で必要以上に緊張することもなくなった……気がする」"
translation = "「최근에는 네뷸라의 부하들도 내 앞에서 필요 이상으로 긴장하는 일이 없어졌다……는 기분이 들어」"

[[dialogue]]
speaker = "セドナ"
original = "「業務の終わりに食事に誘われたり、プライベートの相談をされたり」"
translation = "「업무가 끝나고 식사 초대를 받거나, 개인적인 상담을 받기도 하고」"

[[dialogue]]
speaker = "セドナ"
original = "「人間と深く交わるようになってから、我々魔女も変化している。おそらく、良い方向へ」"
translation = "「인간과 깊게 교류하게 된 뒤로 우리 마녀들도 변화하고 있다. 아마도 좋은 방향으로」"

[[dialogue]]
speaker = "セドナ"
original = "「昔の私が見たら驚くだろうな。無理をするお前に仕事を休めなどと言わなかったに違いない。こうして浜辺で焚き火を囲むことも……」"
translation = "「옛날의 내가 봤다면 놀라겠지. 무리하는 네게 일을 쉬라고 말하지 않았을 게 분명해. 이렇게 해변에서 모닥불을 둘러싸는 일도……」"

[[dialogue]]
speaker = "unk"
original = "だからこそ、嬉しいです"
translation = "그렇기에 기뻐요"

[[dialogue]]
speaker = "セドナ"
original = "「こんなことで嬉しいとは。やはりお前は変わっている」"
translation = "「이런 일로 기뻐하다니. 역시 너는 특이하군」"

[[dialogue]]
speaker = "セドナ"
original = "「…………以前にお前は、私のことを『個人的に支えたい』と言ったな。覚えているか？」"
translation = "「…………이전에 네가 나를 『개인적으로 지탱하고 싶다』고 말했었지. 기억하나?」"

[[dialogue]]
speaker = "unk"
original = "もちろんです"
translation = "물론이죠"

[[dialogue]]
speaker = "セドナ"
original = "「最初こそ面倒だと思ったものだが……フフ。今ならよくわかる。信頼のおける者からの支えがあるのは、心強い」"
translation = "「처음엔 귀찮다고 생각했다만…… 후후. 지금이라면 잘 알겠다. 신뢰할 수 있는 자로부터의 지탱이 있다는 건 든든하군」"

[[dialogue]]
speaker = "セドナ"
original = "「そして今は、私も同じ気持ちだ。お前のことを支えたいと思っている」"
translation = "「그리고 지금은 나도 같은 마음이다. 너를 지탱하고 싶다고 생각하고 있어」"

[[dialogue]]
speaker = "セドナ"
original = "「同盟を組んだネビュラの幹部としても──個人的にも、だ」"
translation = "「동맹을 맺은 네뷸라의 간부로서도── 개인적으로도 말이다」"

[[dialogue]]
speaker = "unk"
original = "お付き合いしてくれるってことですか？"
translation = "사귀어 주겠다는 뜻인가요?"

[[dialogue]]
speaker = "unk"
original = "……それってつまり"
translation = "……그건 즉"

[[dialogue]]
speaker = "セドナ"
original = "「……人間はそうやってすぐ言葉にしたがるから困る。好きに解釈すればいいだろう。私は肯定も否定もしない」"
translation = "「……인간은 그렇게 금방 말로 표현하고 싶어 하니 곤란하군. 마음대로 해석하면 되지 않겠나. 나는 긍정도 부정도 하지 않으마」"

[[dialogue]]
speaker = "unk"
original = "好きですよ、セドナさん"
translation = "좋아해요, 세드나 씨"

[[dialogue]]
speaker = "セドナ"
original = "「…………肯定も否定もしないと言ったばかりだぞ。仕方のないやつだ」"
translation = "「…………긍정도 부정도 하지 않겠다고 방금 말하지 않았나. 어쩔 수 없는 녀석이군」"

[[dialogue]]
speaker = "セドナ"
original = "「……今だけ、人間界の郷に従ってやる」"
translation = "「……지금만은 인간계의 예법을 따라주마」"

[[dialogue]]
speaker = "セドナ"
original = "「ん──ちゅっ……<emoji=heart04>」"
translation = "「응── 쪽……<emoji=heart04>」"

[[dialogue]]
speaker = "セドナ"
original = "「フフ……なんだお前、その顔は。なかなかに愉快だぞ」"
translation = "「후후…… 뭐냐 너, 그 표정은. 꽤나 유쾌하군」"

[[dialogue]]
speaker = "セドナ"
original = "「いいものが見られた。口付けをしてやった甲斐があったな」"
translation = "「좋은 걸 봤어. 입맞춤을 해준 보람이 있군」"

[[dialogue]]
speaker = "セドナ"
original = "「──ああ。これからもよろしく頼むぞ、魔王」"
translation = "「──아아. 앞으로도 잘 부탁하마, 마왕」"

[[dialogue]]
speaker = "unk"
original = "星騎士と魔女。それぞれの組織を背負って立つ俺たちは、その夜。お互いの気持ちをしっかりと確かめ合ったのだった──"
translation = "성기사와 마녀. 각각의 조직을 짊어지고 선 우리들은 그날 밤, 서로의 마음을 확실히 확인했다──"

