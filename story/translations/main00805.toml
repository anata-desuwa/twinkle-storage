[[dialogue]]
speaker = "unk"
original = "第６話,朱雀を滅せし竜,B"
translation = "제6화, 주작을 멸한 용, B"

[[dialogue]]
speaker_original = "ガーディアン"
speaker_translation = "가디언"
original = "「ピピ──ガ──戦闘、不能──シュゥン…………」"
translation = "「삐삐── 가── 전투, 불능── 슈웅…………」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「──やったの！？」"
translation = "「──해냈어!?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ハッ、楽勝だな」"
translation = "「핫, 식은 죽 먹기군」"

[[dialogue]]
speaker = "unk"
original = "崩れ去っていくガーディアンの集団。"
translation = "무너져 내리는 가디언 무리."

[[dialogue]]
speaker = "unk"
original = "スクラップとなった彼らはやがて、灰色の地に埋もれていった。"
translation = "고철이 된 그들은 이윽고, 잿빛 땅에 묻혀갔다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ふう……不気味な相手でした」"
translation = "「휴우…… 불길한 상대였습니다」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふふ。氷は生き物が相手でなくても効くからいいわね♪」"
translation = "「후후후. 얼음은 생물이 상대가 아니어도 효과가 있으니 좋네♪」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「いつもなら、もう少し苦戦するのですけれど……」"
translation = "「평소라면, 조금 더 고전할 텐데요……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「みんなのおかげで楽勝だったわね！」"
translation = "「모두 덕분에 식은 죽 먹기였네!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。新星と流星間の連携も──以前より格段にスムーズになっている」"
translation = "「아아. 신성과 유성 간의 연계도── 이전보다 훨씬 더 순조로워지고 있다」"

[[dialogue]]
speaker = "unk"
original = "ソフィアちゃんとサーシャ先輩は言わずもがな、他の面々も俺たちの知らないコンビネーションを開発していた。"
translation = "소피아짱과 사샤 선배는 말할 것도 없고, 다른 멤버들도 우리가 모르는 콤비네이션을 개발하고 있었다."

[[dialogue]]
speaker = "unk"
original = "成長していたのは塔を攻略していた俺たちだけじゃない……ってところか。"
translation = "성장하고 있었던 것은 탑을 공략하고 있던 우리들만이 아니었……다는 건가."

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「？\u3000どうかされましたか、セーラ先輩」"
translation = "「? 무슨 일이십니까, 세라 선배」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ん。あー……ちょっと気になって」"
translation = "「응. 아ー…… 좀 신경 쓰여서」"

[[dialogue]]
speaker = "unk"
original = "セーラ先輩がしゃがみこんで、ガーディアンの破片をつぶさに観察していた。"
translation = "세라 선배가 쪼그려 앉아, 가디언의 파편을 자세히 관찰하고 있었다."

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「さっきニャリオンちゃんが言ってたカンジだとー……この機械は『塔の護衛』であって、この滅んだ世界の生き物ではないってことかな？」"
translation = "「아까 냐리온짱이 말했던 느낌으로는ー…… 이 기계는 『탑의 호위』이지, 이 멸망한 세계의 생물이 아니라는 걸까?」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「そういうことニャ！\u3000第二層にもいたニャンからね」"
translation = "「그렇다냥! 제2층에도 있었으니 말이다냥」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「私たちからすると、慣れたもんよね」"
translation = "「우리에게는, 익숙한 상대지」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「なるほどねー……」"
translation = "「과연 그렇네ー……」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「？\u3000何が引っかかってるんです？」"
translation = "「? 뭐가 걸리는 겁니까?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「うんうん。だったら──この先に待ってる竜っていうのは、<b>どっち</b>なのかなーって」"
translation = "「응응. 그렇다면── 이 앞에 기다리고 있는 용이라는 건, <ruby>어느 쪽<rt>・・ ・</rt></ruby>일까ー 해서」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それは──どちらに根付いた存在なのか、ということですか」"
translation = "「그것은── 어느 쪽에 뿌리를 둔 존재인가, 라는 말씀이십니까」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「今まで、塔の中にフツーの生き物がいたことってないわよね……？」"
translation = "「지금까지, 탑 안에 평범한 생물이 있었던 적은 없잖아……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。いるとしたら聖獣や精霊くらいで──有機的な生物は棲んでなかった」"
translation = "「아아. 있다면 성수나 정령 정도이고── 유기적인 생물은 살지 않았다」"

[[dialogue]]
speaker = "unk"
original = "ただ、それは第一層と第二層での話。"
translation = "다만, 그것은 제1층과 제2층에서의 이야기."

[[dialogue]]
speaker = "unk"
original = "今回の層は──あまりにも、外の世界が再現されすぎている。"
translation = "이번 층은── 너무나도, 바깥 세계가 재현되어 있다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「最奥に待ち受けるものは、災厄の竜……」"
translation = "「최심부에 기다리고 있는 것은, 재앙의 용……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「煌竜ヴィライア……確か、朱雀暦の世界を滅ぼした魔物でしたか」"
translation = "「황룡 빌라이아…… 확실히, 주작력의 세계를 멸망시킨 마물이었죠」"

[[dialogue]]
speaker = "unk"
original = "塔の知識。日誌の記述。そして、過去に起きたというリクリエ事象の末路。"
translation = "탑의 지식. 일지의 기술. 그리고, 과거에 일어났다는 리크리에 사상의 말로."

[[dialogue]]
speaker = "unk"
original = "それらを総合して考えると、セーラ先輩の言わんとしていることも知れた。"
translation = "그것들을 종합해서 생각하니, 세라 선배가 말하고자 하는 바도 알 수 있었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「この層は──かつて竜が滅ぼした世界かもしれない……？」"
translation = "「이 층은── 과거에 용이 멸망시킨 세계일지도 모른다……?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ま、それを再現しただけかもしんないケド。そーゆー可能性もあるかなーって」"
translation = "「뭐, 그걸 재현한 것일 수도 있지만. 그럴 가능성도 있을까ー 해서」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「なるほど……」"
translation = "「과연……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「納得です。この世界のリアルさは、実際に起きた事象と解釈するほうが自然です」"
translation = "「납득입니다. 이 세계의 현실감은, 실제로 일어난 사상이라고 해석하는 편이 자연스럽습니다」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「初めて入ったくせに飲み込みが早すぎるニャン……」"
translation = "「처음 들어왔으면서 이해가 너무 빠르냥……」"

[[dialogue]]
speaker = "unk"
original = "つまり、この、眼前に広がる世界そのものが──災厄の竜の棲まう庭かもしれないということ。"
translation = "즉, 이, 눈앞에 펼쳐진 세계 자체가── 재앙의 용이 사는 정원일지도 모른다는 것."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「でもそれなら、この層のボスが竜っていうのもしっくり来るわね」"
translation = "「하지만 그렇다면, 이 층의 보스가 용이라는 것도 말이 되네」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「世界をこんな風にしてしまう相手、なんて……恐ろしいですね」"
translation = "「세계를 이렇게 만들어버리는 상대라니…… 무섭네요」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ただ──それにしては姿が見えねえな」"
translation = "「다만── 그런데도 모습이 안 보이네」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「遠くのほうで大暴れしているのかもしれません！\u3000想像するだけでも、ひええ……！」"
translation = "「멀리서 크게 날뛰고 있을지도 모릅니다! 상상하는 것만으로도, 히익……!」"

[[dialogue]]
speaker = "unk"
original = "かつてない相手に、みな良からぬ想像を巡らせてしまう。"
translation = "전례 없는 상대에게, 모두 좋지 않은 상상을 하게 된다."

[[dialogue]]
speaker = "unk"
original = "そこへ、ドンと胸を張るのはヴィーナスだった。"
translation = "그때, 쾅 하고 가슴을 펴는 것은 비너스였다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「大丈夫よ、みんな──安心して」"
translation = "「괜찮아, 모두── 안심해」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「この日誌にはちゃーんと……ボスへの対処法だって書かれてるんだから！」"
translation = "「이 일지에는 제대로…… 보스에 대한 대처법도 쓰여 있으니까!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「対処法？」"
translation = "「대처법?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ええ。『竜の<ruby>顎<rt>あぎと</rt></ruby>には<ruby>逆鱗<rt>げきりん</rt></ruby>と呼ばれる弱点があった。私はその一点に光撃を集中させることで、巨体を討滅した』」"
translation = "「응. 『용의 턱에는 역린이라고 불리는 약점이 있었다. 나는 그 한 점에 광격을 집중시킴으로써, 거체를 토멸했다』」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「──ってね♪」"
translation = "「──라고 말이지♪」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「本当になんでもお見通しなのねえ」"
translation = "「정말로 뭐든지 다 꿰뚫어 보고 있네」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「逆鱗って何なのですか？」"
translation = "「역린이 무엇이옵니까?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「竜の鱗には一枚だけ、逆さまの鱗が喉元に生えていると言われます。そのことです」"
translation = "「용의 비늘에는 단 한 장, 거꾸로 된 비늘이 목덜미에 돋아 있다고 합니다. 그것을 말하는 것입니다」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「逆鱗に触れるとかって、言うよねー」"
translation = "「역린을 건드린다고, 말하잖아ー」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「でも、そんなの実際の竜にあるのかしら……？」"
translation = "「하지만, 그런 게 실제 용에게 있을까……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「確証は持てませんが、試す価値はあるかもしれませんね」"
translation = "「확신은 없지만, 시험해 볼 가치는 있을지도 모르겠네요」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ええ！\u3000だから私がトドメを刺すわ──みんな海賊船に乗ったつもりでいなさい♪」"
translation = "「네! 그러니 제가 마무리를 지을게요── 모두 해적선에 탔다고 생각하세요♪」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「大船です」"
translation = "「큰 배입니다」"

[[dialogue]]
speaker = "unk"
original = "そうして俺たちは見果てぬ滅亡の世界を攻略していった。"
translation = "그렇게 우리들은 끝없이 펼쳐진 멸망의 세계를 공략해 나갔다."

[[dialogue]]
speaker = "unk"
original = "数多のガーディアンを退けながら、失われた文明に思いを馳せて……。"
translation = "수많은 가디언을 물리치면서, 잃어버린 문명에 마음을 달리하며……."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ふう、ふう……！\u3000だいぶ進んできたんじゃないでしょうか！」"
translation = "「후우, 후우……! 꽤 많이 나아온 것 같지 않습니까!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そうねえ。けど、ここって本当にゴールがあるのかしら？」"
translation = "「그렇네. 하지만, 여기에 정말로 골이 있는 걸까?」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「不安になってくるニャン。いくらなんでも広すぎニャンよ」"
translation = "「불안해지냥. 아무리 그래도 너무 넓다냥」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「？\u3000どうしたのクロト、先に進まないの？」"
translation = "「? 왜 그래 쿠로토, 앞으로 안 나아가?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ああ。疲れてんなら、あたしが先鋒を変わるぜ──」"
translation = "「아아. 피곤하다면, 내가 선봉을 바꿀게──」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──待て」"
translation = "「──멈춰」"

[[dialogue]]
speaker = "unk"
original = "みんなに静止をかける。"
translation = "모두에게 정지를 명한다."

[[dialogue]]
speaker = "unk"
original = "すると次の瞬間、天からおどろおどろしい咆哮が轟いてきた。"
translation = "그러자 다음 순간, 하늘에서 섬뜩한 포효가 울려 퍼졌다."

[[dialogue]]
speaker = "？？？"
original = "「グルル……ガァ……グ……オオオオォォォォォォン────」"
translation = "「크르르…… 가아…… 그…… 오오오오오오오오옹────」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「これは──」"
translation = "「이것은──」"

[[dialogue]]
speaker = "unk"
original = "俺たちが進もうとしていた目と鼻の先が──"
translation = "우리들이 나아가려 했던 바로 코앞이──"

[[dialogue]]
speaker = "unk"
original = "天空より飛来した、強大なブレスによって焼き払われた。"
translation = "하늘에서 날아온, 강력한 브레스에 의해 불태워졌다."

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「っっ……あ、危っぶね──助かった！」"
translation = "「읏읏…… 아, 위험했네── 살았다!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「感謝します、緋宮会長。油断していました」"
translation = "「감사합니다, 히노미야 회장. 방심하고 있었습니다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。今までのような行き止まりじゃないが……恐らく、ここが終点のようだ」"
translation = "「아아. 지금까지처럼 막다른 길이 아니지만…… 아마도, 여기가 종착점인 것 같다」"

[[dialogue]]
speaker = "unk"
original = "──臨戦態勢へ移行する。"
translation = "──임전 태세로 이행한다."

[[dialogue]]
speaker = "unk"
original = "その相手は、空間にとてつもない存在感をまとって現れた。"
translation = "그 상대는, 공간에 엄청난 존재감을 두르고 나타났다."

[[dialogue]]
speaker = "？？？"
original = "「グルル……ガァ……グ……オオオオォォォォォォン────」"
translation = "「크르르…… 가아…… 그…… 오오오오오오오오옹────」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「──っ……！\u3000これが、もしかして──」"
translation = "「──읏……! 이것이, 혹시──」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「巨大な竜──予言通りですね」"
translation = "「거대한 용── 예언대로네요」"

[[dialogue]]
speaker = "unk"
original = "俺たちの前に現れたもの──"
translation = "우리들 앞에 나타난 것──"

[[dialogue]]
speaker = "unk"
original = "それは、全身を巨大な鎖でがんじがらめにされた一頭の竜だった。"
translation = "그것은, 전신을 거대한 쇠사슬로 꽁꽁 묶인 한 마리의 용이었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「煌竜ヴィライア──」"
translation = "「황룡 빌라이아──」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「間違いないでしょう。ただ……思っていたビジュアルとは違いましたね」"
translation = "「틀림없을 것입니다. 다만…… 생각했던 비주얼과는 다르네요」"

[[dialogue]]
speaker = "unk"
original = "アナの言葉にみんなが同意した。"
translation = "아나의 말에 모두가 동의했다."

[[dialogue]]
speaker = "unk"
original = "ようやく見つけた竜は大暴れどころか、ほとんどの身動きが縛鎖により封じられてしまっていたからだ。"
translation = "겨우 발견한 용은 크게 날뛰기는커녕, 대부분의 움직임이 속박에 의해 봉인되어 있었기 때문이다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「これは──イマシメられてるわね！」"
translation = "「이것은── 봉인되어 있네!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「でけえ鎖だな……一体誰が巻き付けたんだ？」"
translation = "「엄청난 쇠사슬이네…… 대체 누가 감아 놓은 거지?」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「誰かはわからないニャンが──恐らく、より強大な力に封印されているニャン！」"
translation = "「누구인지는 모르겠지만── 아마도, 더 강대한 힘에 봉인되어 있는 거냥!」"

[[dialogue]]
speaker = "unk"
original = "大樹ほど太い鎖をジャラジャラと震わせて猛る暗黒の魔竜。"
translation = "큰 나무만큼 굵은 쇠사슬을 짤랑거리며 떨게 만드는 맹렬한 암흑의 마룡."

[[dialogue]]
speaker = "unk"
original = "そのプレッシャーは、これまで対峙してきたどんなモンスターよりも大きい。"
translation = "그 압박감은, 지금까지 대치해 왔던 어떤 몬스터보다도 크다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「どうやらこの鎖のおかげで──まだこの程度で済んでるみたいだな」"
translation = "「아무래도 이 쇠사슬 덕분에── 아직 이 정도로 끝난 것 같군」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ひええ……それでもとんでもない存在感です……！」"
translation = "「히이익…… 그래도 엄청난 존재감입니다……!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「つまり、もしこの竜を解き放っちゃったら……」"
translation = "「즉, 만약 이 용을 풀어준다면……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ひとつの世界を滅ぼすほどの災厄──私たちだけでは対抗できない可能性が高い」"
translation = "「하나의 세계를 멸망시킬 정도의 재앙── 우리들만으로는 대항할 수 없을 가능성이 높습니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「アルモタヘルの件を考えると──最悪、塔の外にも被害が及びかねませんね」"
translation = "「아르모타헬의 건을 생각하면── 최악의 경우, 탑 밖에도 피해가 미칠 수 있겠네요」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「！？\u3000そ、それってやばいんじゃ……」"
translation = "「!? 그, 그거 위험한 거 아니야……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。どうやら遅かれ早かれ、倒さなくちゃならない相手だったようだ」"
translation = "「아아. 아무래도 늦든 빠르든, 쓰러뜨려야 할 상대였던 것 같다」"

[[dialogue]]
speaker_original = "煌竜ヴィライア"
speaker_translation = "황룡 빌라이아"
original = "「グ──ガ──オォォォン──グルル──ガッ、ギアアアアァァッッ…………！！」"
translation = "「크으── 가아── 오오옹── 크르르── 가앗, 기아아아아앗…………!!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「し、しかも私たちのこと睨んでない……！？」"
translation = "「스, 심지어 우리를 노려보고 있지 않아……!?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「餌だと思ってんのかもな。あの機械どもじゃ腹膨れねーだろうし」"
translation = "「먹잇감이라고 생각하는 걸지도 모르지. 저 기계 녀석들로는 배가 안 부를 테니」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「ワ、ワガハイを食べてもうまくないニャン！」"
translation = "「나, 나를 먹어도 맛없다냥!」"

[[dialogue]]
speaker_original = "煌竜ヴィライア"
speaker_translation = "황룡 빌라이아"
original = "「グ──ゴ──オオオオオオオオッッッ……グルルルルァァァァ…………！！」"
translation = "「크으── 고오── 오오오오오오오오옷……… 크르르르르아아아아…………!!」"

[[dialogue]]
speaker = "unk"
original = "魔竜の眼光が俺たちを射抜く。"
translation = "마룡의 안광이 우리들을 꿰뚫는다."

[[dialogue]]
speaker = "unk"
original = "ここがどちらかの墓場になると、直感で理解した。"
translation = "여기가 둘 중 하나의 무덤이 될 것임을, 직감으로 이해했다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「封印解かれちゃヤバイなら……さっさと伸しておくしかないわよね！」"
translation = "「봉인이 풀리면 위험하다면…… 얼른 쓰러뜨려 놓을 수밖에 없잖아!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「来ます──全員、戦闘用意！」"
translation = "「옵니다── 전원, 전투 준비!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──いくぞっ！」"
translation = "「──간다!」"

[[dialogue]]
speaker_original = "煌竜ヴィライア"
speaker_translation = "황룡 빌라이아"
original = "「グルル──ガアアアアァァァァァッッッ！！！」"
translation = "「크르르── 가아아아아아아앗!!!」"

