[[dialogue]]
speaker = "unk"
original = "バトルウィークも折り返し地点を過ぎて、残り３日と終わりが見えてきた。"
translation = "「배틀 위크도 반환점을 돌아 남은 3일, 끝이 보이기 시작했다.」"

[[dialogue]]
speaker = "unk"
original = "初日以降、<ruby>新星寮<rt>ラルーナ</rt></ruby>も<ruby>流星寮<rt>イルソーレ</rt></ruby>も毎朝毎放課後に組織だったパトロールを行い、両学園とも物凄い速度でスコアを稼いでいた。"
translation = "「첫날 이후 <ruby>신성 기숙사<rt>라 루나</rt></ruby>도 <ruby>유성 기숙사<rt>일 소레</rt></ruby>도 매일 아침저녁으로 조직적인 순찰을 행하며, 양 학원 모두 엄청난 속도로 스코어를 쌓고 있었다.」"

[[dialogue]]
speaker = "unk"
original = "そして、今日も早朝から寮生の報告を聞き、マムはパトロール計画の調整と各生徒への注意事項を伝えていた――"
translation = "「그리고 오늘도 이른 아침부터 기숙사생의 보고를 듣고, 마무는 순찰 계획 조정과 각 학생에 대한 주의 사항을 전달하고 있었다──」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「──報告は以上になります、マム」"
translation = "「──보고는 이상입니다, 마무.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ご苦労様。みんなのお陰で、数日前まであったイルソーレとのポイント差は、ほとんどなくなったと言っていいわ」"
translation = "「수고했어. 모두 덕분에 며칠 전까지 있던 일 소레와의 포인트 차이는 거의 없어졌다고 봐도 좋아.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ヒルディオーネには『僅差』なんて大見得切ったけど、実際にはそれなりに先行されていたわ。その差をほぼなかったことにできたのは、大したものね」"
translation = "「힐디오네에게는 『근소한 차이』라고 큰소리쳤지만, 실제로는 꽤 앞서가고 있었어. 그 차이를 거의 없던 일로 만든 건 대단한 일이네.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「会長の的確な指示も大きいわ。あなた、もしかすると、そういった才能があるのかもしれないわね」"
translation = "「회장의 적절한 지시도 컸어. 당신, 어쩌면 그런 쪽에 재능이 있을지도 모르겠네.」"

[[dialogue]]
speaker = "unk"
original = "マムに言われると照れますね"
translation = "「마무에게 그런 말을 들으니 쑥스럽네요.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ええ、畏怖をもって光栄に思いなさい。ただし、調子に乗らずにこれからも精進すること。返事は、イエス・マムよ」"
translation = "「그래, 경외심을 담아 영광으로 생각하렴. 다만 우쭐해하지 말고 앞으로도 정진할 것. 대답은 예스 마무야.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「――ふふっ。良い返事だこと」"
translation = "「──후훗. 좋은 대답이네.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「さて、話の続きだけれど……今はまだ向こうがリードしているものの、このままのペースで行けるなら、あと一手でひっくり返せるところまで来ているわ」"
translation = "「자, 이야기의 다음인데…… 지금은 아직 저쪽이 리드하고 있지만, 이대로의 페이스라면 한 번 더 몰아붙여 뒤집을 수 있는 곳까지 와 있어.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「でも、そんなことは相手も重々承知のはず。今の私たちは挑戦者であることを忘れず、最後まで気を抜かないこと。いいわね！」"
translation = "「하지만 그런 건 상대도 충분히 알고 있을 터. 지금의 우리는 도전자라는 걸 잊지 말고 마지막까지 방심하지 마. 알겠지!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「イエス、マム！」"
translation = "「예스, 마무!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……？\u3000どうしましたか、会長。私の顔に、何か付いていたでしょうか？」"
translation = "「……? 무슨 일인가요, 회장. 제 얼굴에 뭐라도 묻었나요?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ああ、私がここにいることについてですか？」"
translation = "「아아, 제가 여기 있는 것에 대해서인가요?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「前にも話したかもしれませんが、私のように天界、マムのように魔界から留学してきている生徒の多くは、寮で暮らしています」"
translation = "「전에도 이야기했을지 모르지만, 저처럼 천계, 마무처럼 마계에서 유학 온 학생들 다수는 기숙사에서 생활합니다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「なのでマムの命とあらば、私もラルーナの一員として戦いますよ」"
translation = "「그러니 마무의 명이라면 저도 라 루나의 일원으로서 싸울 겁니다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「――会長、らしくないとでも言いたげな顔をしてますね？\u3000郷に入っては郷に従え、というやつです」"
translation = "「──회장, 답지 않다는 듯한 얼굴을 하고 있네요? 로마에 가면 로마법을 따르라는 법입니다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ラルーナはいわゆる体育会系ですので。上級生の命令には絶対服従」"
translation = "「라 루나는 이른바 체육계니까요. 상급생의 명령에는 절대복종.」"

[[dialogue]]
speaker = "unk"
original = "絶対服従……！？"
translation = "「절대복종……!?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あら、会長様は何かご不満？」"
translation = "「어머, 회장님은 무슨 불만이라도?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「体育会系なんてものになったつもりはないけれど、組織の基本は<ruby>上意下達<rt>じょういかたつ</rt></ruby>よ。戦場で上級生が生きて帰れと命じたら、下級生は死んでも生きて帰る義務があるわ」"
translation = "「체육계 같은 게 될 생각은 없었지만, 조직의 기본은 상의하달이야. 전장에서 상급생이 살아서 돌아오라고 명하면 하급생은 죽어도 살아서 돌아올 의무가 있어.」"

[[dialogue]]
speaker = "unk"
original = "上級生、いい奴じゃないですか……"
translation = "「상급생, 좋은 녀석이잖아요……」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「もちろん、寮内で上級生が肩を揉めと命じたら、下級生は『もういい』と言われるまで、肩を揉み続ける義務もあるわ」"
translation = "「물론 기숙사 내에서 상급생이 어깨를 주무르라고 명하면 하급생은 『이제 됐다』는 말을 들을 때까지 계속 어깨를 주무를 의무도 있지.」"

[[dialogue]]
speaker = "unk"
original = "（それはめちゃくちゃ体育会系だ……）"
translation = "(그건 엄청난 체육계다……)"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ちなみに、マムの肩を揉む係は希望者が多すぎて、３ヶ月先まで予約でいっぱい」"
translation = "「참고로 마무의 어깨를 주무르는 담당은 희망자가 너무 많아서 3개월 뒤까지 예약이 꽉 찼어.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ん？\u3000――私が慕われている？\u3000会長、あなたは何を言っているのかしら？」"
translation = "「응? ──내가 흠모받고 있다고? 회장, 당신은 무슨 소리를 하는 거니?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「下々の者がトップに媚びを売るのは当然のことよ。畏怖を持って跪くべき相手なんだから」"
translation = "「아랫사람이 우두머리에게 아부하는 건 당연한 일이야. 경외심을 갖고 무릎 꿇어야 할 상대니까.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「その通りです、マム」"
translation = "「그렇습니다, 마무.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ラルーナのモットーは『責任感・忍耐・向上心』。会長にはバッチシ」"
translation = "「라 루나의 모토는 『책임감·인내·향상심』. 회장에게 딱이지.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「個人的にはあまり泥臭くするのは好きではないのだけれど、この寮に伝わるモットーは私の考えている重要なものと一致するわ」"
translation = "「개인적으로 너무 꾀죄죄하게 구는 건 좋아하지 않지만, 이 기숙사에 전해지는 모토는 내 생각과 일치해.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「前にも言ったわよね？\u3000１人１人の星騎士がすべて一騎当千になれば、リクリエにだって勝利できるはずよ」"
translation = "「전에도 말했지? 한 명 한 명의 성기사가 모두 일당백이 되면 리크리에에게도 승리할 수 있을 거야.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「そうした精鋭を育成するということに関して、『責任感・忍耐・向上心』はどれも欠かせない要素よ」"
translation = "「그런 정예를 육성하는 데 있어서 『책임감·인내·향상심』은 어느 하나 빠질 수 없는 요소지.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「実際、ラルーナ寮生のプリマステラ率は、とても高い」"
translation = "「실제로 라 루나 기숙사생의 프리마스텔라 비율은 매우 높습니다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……まあ、責任感というよりも、寮設備の格差を見せつけられて、闘争心に火が付いた生徒が多い感じですが」"
translation = "「……뭐, 책임감이라기보다 기숙사 시설의 격차를 보고 투쟁심에 불이 붙은 학생이 많은 느낌입니다만.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「強くなるためのきっかけなんて、別に何だっていいわ」"
translation = "「강해지기 위한 계기 따윈 딱히 무엇이든 상관없어.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「それに連中、あれだけの設備を持っていながら、毎年の運営費用までこっちより多く持って行ってるのよ？\u3000到底、許しておけないわ」"
translation = "「게다가 저 녀석들, 저 정도 시설을 갖추고 있으면서 매년 운영비까지 이쪽보다 더 많이 가져가고 있다고? 도저히 용납할 수 없어.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「というわけで会長、アナ。今年の学園対抗杯こそ、必ず勝つわよ」"
translation = "「그러니까 회장, 아나. 올해 학원 대항배야말로 반드시 이길 거야.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あなたたちという優秀な新人を確保したんですもの。最後の１年、今度こそ……これまで以上に暴れてやるわ」"
translation = "「당신들이라는 우수한 신입을 확보했으니까. 마지막 1년, 이번에야말로…… 그 어느 때보다 날뛰어 주겠어.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はい。もちろんです、マム」"
translation = "「네. 물론입니다, 마무.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「……ふん。どうやら他の子たちは、準備を終えて出発したようね」"
translation = "「……흥. 아무래도 다른 아이들은 준비를 마치고 출발한 모양이네.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「さて、それじゃあ私たちも行きましょうか」"
translation = "「자, 그럼 우리도 가볼까.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「授業が始まる前に、リクリエの些細な波も全て、畏怖を持って跪かせてあげるわ……！」"
translation = "「수업이 시작되기 전에 리크리에의 사소한 파동까지 전부 경외심을 갖고 무릎 꿇게 해 주겠어……!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「イエス、マム！」"
translation = "「예스, 마무!」"

[[dialogue]]
speaker = "unk"
original = "俺もアナと一緒に大きく返事をする。"
translation = "「나도 아나와 함께 크게 대답한다.」"

[[dialogue]]
speaker = "unk"
original = "なぜラルーナの寮生達が率先して頑張るのか。それが少しだけ分かった気がしたのだった。"
translation = "「왜 라 루나의 기숙사생들이 앞장서서 노력하는지, 아주 조금은 알 것 같은 기분이 들었다.」"

