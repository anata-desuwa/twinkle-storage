[[dialogue]]
speaker = "unk"
original = "それから開校記念パーティー当日となり、企画していた大会が開かれることとなった――"
translation = "그리고 개교 기념 파티 당일이 되어 기획했던 대회가 열리게 되었다──"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "『よ～し！\u3000それじゃあ、みんなで全力バトルを楽しむ大会“バトルフェスタ・ペンタグラム”、ここに開幕よ！！』"
translation = "『조아~! 그럼 다 같이 전력 배틀을 즐기는 대회 “배틀 페스타 펜타그램”, 여기서 개막이야!!』"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスが宣言し、わぁっ！\u3000と会場が盛り上がる。"
translation = "비너스가 선언하자, 와아! 하고 회장이 달아오른다."

[[dialogue]]
speaker = "unk"
original = "アリーナには新星学園、流星学園、附属校の生徒たちが一堂に集まり、賑わっていた。"
translation = "아레나에는 신성학원, 유성학원, 부속교 학생들이 한자리에 모여 활기를 띠고 있었다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "『それでは、バトルフェスタのルール説明をさせて頂きます』"
translation = "『그럼 배틀 페스타의 규칙 설명을 해드리겠습니다』"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "『学園の皆さんには事前に資料を配布していましたが、この大会は以前行われた作戦“オペレーション・ペンタグラム”をモチーフにしたものとなっています』"
translation = "『학원 여러분께는 사전에 자료를 배포했습니다만, 이 대회는 이전에 행해진 작전 “오퍼레이션 펜타그램”을 모티브로 한 것입니다』"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "『まず、ボス役となる６人の星騎士を選出。それぞれのデータを元に、今回新設された仮想結界システムを用いて、星騎士の仮想体――“シャドウ”を作り出しています』"
translation = "『우선 보스 역을 맡을 6명의 성기사를 선출. 각각의 데이터를 토대로 이번에 신설된 가상 결계 시스템을 이용하여 성기사의 가상체── “섀도우”를 만들어내고 있습니다』"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "『その６人のシャドウを相手に、皆さんには協力して戦いを挑んで頂きます』"
translation = "『그 6명의 섀도우를 상대로 여러분은 협력하여 싸움에 도전하게 됩니다』"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "『簡単に言うと、ゲームのレイドボスみたいな感じね！』"
translation = "『간단히 말하면 게임의 레이드 보스 같은 느낌이야!』"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "『そんなわけでボス役に選ばれた６人の自己紹介タイムよ！\u3000まずは私、新星学園星徒会のフィクサー、九浄ヴィーナス！』"
translation = "『그런 고로 보스 역으로 뽑힌 6명의 자기소개 타임이야! 우선은 나, 신성학원 성도회의 픽서, 쿠죠 비너스!』"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "『本当はうちの星徒会長を推薦したかったけど、クロトは今、全力を出せなくてデータ再現が難しいから、私が代役を務めることになったわ！』"
translation = "『원래는 우리 성도회장을 추천하고 싶었지만, 쿠로토는 지금 전력을 낼 수 없어서 데이터 재현이 어렵기 때문에 내가 대역을 맡게 되었어!』"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "『続きまして、私、流星学園星徒会長である星見フィオナもボス役を務めさせて頂きます。みなさん、よろしくお願いしますね』"
translation = "『이어서 저, 유성학원 성도회장인 호시미 피오나도 보스 역을 맡게 되었습니다. 여러분, 잘 부탁드려요』"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "『では、残りの４人の方々にも挨拶して頂きましょう。お願いします』"
translation = "『그럼 남은 네 분의 인사도 들어보겠습니다. 부탁드려요』"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "『――新星寮ラルーナ寮長、妃竜院マハムートよ。畏怖をもって挑んできなさい』"
translation = "『──신성 기숙사 라 루나 사감, 키류인 마하무트다. 경외심을 가지고 도전해 오거라』"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "『もう知っている子も多いでしょうけど、流星寮の寮長は今回、挑戦する側に回りたいそうよ。戦う気は満々みたいだから、楽しみにしているわ』"
translation = "『이미 아는 아이들도 많겠지만, 유성 기숙사의 사감은 이번에 도전하는 측으로 가고 싶다는구나. 싸울 기세가 만만해 보이니 기대하고 있으마』"

[[dialogue]]
speaker = "unk"
original = "マムの次にマイクを受け取ったのは――"
translation = "마무 다음으로 마이크를 받은 것은──"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "『附属校代表ということでボス役を務めさせて頂きます。流星学園附属校、生徒会長の白詰サチです』"
translation = "『부속교 대표로서 보스 역을 맡게 되었습니다. 유성학원 부속교 학생회장 시라츠메 사치입니다』"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "『せ、声援恐縮です。本校の先輩方も、本日はよろしくお願いしますっ……！』"
translation = "『서, 성원 감사드립니다. 본교 선배님들도 오늘 잘 부탁드립니다……!』"

[[dialogue]]
speaker = "unk"
original = "続いては――"
translation = "계속해서──"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "『ＯＧ代表ということで選出頂きました、星見家メイド隊、マリオン・ネイマールです♪\u3000みなさま、いつも学園ではメイドとしてお世話になっております』"
translation = "『OG 대표로 선출된 호시미 가문 메이드대, 마리온 네이마르입니다♪ 여러분, 평소 학원에서는 메이드로서 신세를 지고 있습니다』"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "『知っている方もいらっしゃるかと思いますが、私は流星学園の卒業生で、当時星徒会長を務めさせて頂いておりました』"
translation = "『아시는 분도 계시겠지만, 저는 유성학원 졸업생으로 당시 성도회장을 맡았었습니다』"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "『本日は若い皆様のご活躍を沢山見せて頂けたら嬉しく思いますので、是非ともよろしくお願い致しますね♪』"
translation = "『오늘은 젊은 여러분의 활약을 많이 보고 싶으니, 부디 잘 부탁드릴게요♪』"

[[dialogue]]
speaker = "unk"
original = "そして、最後の１人は――"
translation = "그리고 마지막 한 명은──"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "『あ、あはは～、皆さんこんにちは～。新星学園１年生の渋谷リーリアです～』"
translation = "『아, 아하하~ 여러분 안녕하세요~. 신성학원 1학년 시부야 리리아입니다~』"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "『多分もう、皆さん知っているかとは思うんですけど……私はネビュラの魔女です。なので少し前まで、スパイとして学園に通ってました』"
translation = "『아마 이미 여러분도 아시겠지만…… 저는 네뷸라의 마녀예요. 그래서 얼마 전까지 스파이로서 학원에 다녔었죠』"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "『私がみんなの前で喋る機会なんてないと思っていたんですが、こうして機会をいただけたので……改めて、この場を借りて謝罪します。すみませんでしたっ！！』"
translation = "『제가 모두 앞에서 이야기할 기회는 없을 거라고 생각했는데, 이렇게 기회를 주셔서…… 새삼 이 자리를 빌려 사과드립니다. 죄송했습니다!!』"

[[dialogue]]
speaker = "unk"
original = "少しざわつく会場。"
translation = "조금 웅성거리는 회장."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "『で、今日は学園の生徒ではなく、ネビュラとしてここにいるわけなんですが……』"
translation = "『그래서 오늘은 학원 학생이 아니라 네뷸라로서 여기 있는 건데요……』"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "『本当は私じゃなくて、光の魔女であるクラウディア様が選ばれてたんです。ただ、諸般の事情でネビュラ側からＮＧが出ちゃいまして』"
translation = "『원래는 제가 아니라 빛의 마녀이신 클라우디아 님이 뽑히셨어요. 다만 제반 사정으로 네뷸라 측에서 NG가 나오는 바람에』"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "『その代理ってことで、私がセドナ長官から指名を受けちゃったという感じです。まぁ、他の人たちに比べると色々ツッコミたい選出かなぁとは思うんですけど……』"
translation = "『그 대리로 제가 세드나 장관님께 지명을 받았다는 느낌입니다. 뭐, 다른 분들에 비하면 여러모로 태클 걸고 싶은 선출인가 싶지만요……』"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "『一応これでも、森では“魔弾の魔女”って二つ名持ちだったりするんで、お手柔らかに挑戦して頂けたらと思います～』"
translation = "『나름 이래 봬도 숲에서는 “마탄의 마녀”라는 이명을 가지고 있기도 하니까, 살살 도전해 주셨으면 합니다~』"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「リーリアなら大丈夫よ！\u3000クロトも選出に納得してたし、めちゃんこ盛り上げてくれるって期待してるわ！」"
translation = "「리리아라면 괜찮아! 쿠로토도 선출에 납득했고, 엄청나게 분위기 띄워줄 거라고 기대하고 있다구!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「が、頑張りま～す……あはは～」"
translation = "「열, 열심히 할게요~…… 아하하~」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "『――では、紹介が終わったところで、またルール説明に戻りますね』"
translation = "『──그럼 소개가 끝났으니 다시 규칙 설명으로 돌아가겠습니다』"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "『ボス役のシャドウとの戦いは仮想結界システム内で行われ、挑戦する側は何人で協力して挑むのも自由とします』"
translation = "『보스 역인 섀도우와의 싸움은 가상 결계 시스템 내에서 이루어지며, 도전하는 측은 몇 명이서 협력하여 도전하든 자유로 합니다』"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "『また、シャドウが倒された場合には、少し経つとまた復活しますので何度でも挑戦可能です』"
translation = "『또한 섀도우가 쓰러진 경우에는 잠시 후에 다시 부활하므로 몇 번이고 도전 가능합니다』"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "『あとね、細かい理屈はよくわからないけど、仮想空間だから、現実での星力は消費しないらしいわ！』"
translation = "『그리고 말이야, 자세한 원리는 잘 모르겠지만 가상 공간이라서 현실에서의 성력은 소비하지 않는대!』"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "『だから、途中でモンスターが出現して、出撃しなくちゃ～！\u3000ってことになっても、心配しなくて大丈夫よ♪』"
translation = "『그러니까 도중에 몬스터가 나타나서 출격해야 해~! 라는 상황이 되어도 걱정하지 않아도 괜찮아♪』"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "『星力がすっからかんで戦えないとか、そんな風になったりしないから、みんな安心して全力で戦っていいわよ！』"
translation = "『성력이 텅 비어서 싸울 수 없다거나 그런 일이 생기지 않으니까 모두 안심하고 전력으로 싸워도 좋아!』"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "『ダメージについても同様で、訓練用に痛覚が抑えられてるのと、戦闘不能になると仮想空間から１度離脱させられるシステムになっています』"
translation = "『데미지에 대해서도 마찬가지로, 훈련용으로 통각이 억제되어 있고 전투 불능이 되면 가상 공간에서 한 번 이탈하게 되는 시스템으로 되어 있습니다』"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "『受けたダメージはあくまで仮想空間のものである為、現実空間に戻れば無傷です』"
translation = "『받은 데미지는 어디까지나 가상 공간의 것이기에 현실 공간으로 돌아오면 무상합니다』"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "『要するに、仮想結界に入った時点で、星騎士側も“自分自身と寸分違わぬ仮想体”を操っている状態になります』"
translation = "『요컨대 가상 결계에 들어간 시점에서 성기사 측도 “자신과 조금도 다르지 않은 가상체”를 조종하는 상태가 됩니다』"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "『ただし、体を操っている脳は自分自身のものです。集中力の消耗や疲労感、精神的ダメージはシステムでは防げません』"
translation = "『다만 몸을 조종하는 뇌는 자기 자신의 것입니다. 집중력의 소모나 피로감, 정신적 데미지는 시스템으로 방지할 수 없습니다』"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "『怪我や故障は物理的なものばかりではありませんから、そこは普段の訓練通り、油断しないよう注意して下さい』"
translation = "『부상이나 고장은 물리적인 것만이 아니니까요, 그 부분은 평소 훈련대로 방심하지 않도록 주의해 주세요』"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "『仮想空間だからって、ふざけると痛い目を見ちゃうわよって話ね！』"
translation = "『가상 공간이라고 장난치면 따끔한 맛을 보게 될 거라는 소리야!』"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "『でも、私は特に心配してないわ。だって――』"
translation = "『하지만 나는 딱히 걱정하지 않아. 왜냐하면──』"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "『学園の星騎士たちはみんな、リクリエに負けない強い心を持っているから大丈夫だって、私は信じているもの！』"
translation = "『학원의 성기사들은 모두 리크리에에 지지 않는 강한 마음을 가지고 있으니까 괜찮을 거라고 믿고 있는걸!』"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "『だから、今日はみんなで楽しくバトルをしましょう！\u3000おー！！』"
translation = "『그러니까 오늘은 다 같이 즐겁게 배틀을 하자! 오──!!』"

[[dialogue]]
speaker = "unk"
original = "アリーナの中に、ヴィーナスの「おー！！」に呼応したかけ声が響き渡った。"
translation = "아레나 안에 비너스의 「오──!!」에 호응하는 구호가 울려 퍼졌다."

[[dialogue]]
speaker = "unk"
original = "果たして、バトルフェスタ・ペンタグラムがここに幕を開けるのだった――"
translation = "과연 배틀 페스타 펜타그램이 여기서 막을 여는 것이었다──"

