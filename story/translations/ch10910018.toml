[[dialogue]]
speaker = "梨緒"
original = "「ありがとう、先刻は助かった」"
translation = "「고마워, 아까는 도움받았다.」"

[[dialogue]]
speaker = "unk"
original = "モンスターとの戦いを終え、新星学園に戻ってきたのがさっきのこと。"
translation = "몬스터와의 전투를 마치고, 신성학원으로 돌아온 것이 조금 전의 일."

[[dialogue]]
speaker = "unk"
original = "最初は梨緒に撃たれるという衝撃的な出会いだったが、今ではいつも一緒にいる。"
translation = "처음에는 리오에게 화살을 맞는 충격적인 만남이었지만, 지금은 언제나 함께 있다."

[[dialogue]]
speaker = "unk"
original = "『星徒会長と選挙管理委員会として、適切な距離を保つべきだ』と言って、恋人にはなっていないものの、休日出かけたり、家に行ったりと、誰より近い関係になっていた。"
translation = "『성도회장과 선거관리위원회로서, 적절한 거리를 유지해야 한다』라고 말하며 연인은 되지 않았지만, 휴일에 외출하거나 집에 가는 등 누구보다 가까운 관계가 되어 있었다."

[[dialogue]]
speaker = "梨緒"
original = "「だけど、その……」"
translation = "「하지만, 그……」"

[[dialogue]]
speaker = "クロト"
original = "「梨緒？」"
translation = "「리오?」"

[[dialogue]]
speaker = "unk"
original = "顔を赤くして、何かを期待するような表情を浮かべる梨緒。"
translation = "얼굴을 붉히고, 무언가를 기대하는 듯한 표정을 짓는 리오."

[[dialogue]]
speaker = "unk"
original = "それなら……"
translation = "그렇다면……"

[[dialogue]]
speaker = "梨緒"
original = "「ん……ちゅっ」"
translation = "「음…… 쪽」"

[[dialogue]]
speaker = "unk"
original = "唇と唇が触れ合う。梨緒は拒まず受け入れてくれた。"
translation = "입술과 입술이 맞닿는다. 리오는 거부하지 않고 받아들여 주었다."

[[dialogue]]
speaker = "梨緒"
original = "「私は……君が欲しい。君はどうだ？」"
translation = "「나는…… 너를 원해. 너는 어때?」"

[[dialogue]]
speaker = "unk"
original = "潤んだ瞳でそう聞かれて、欲しいと答えないはずがない。"
translation = "젖은 눈동자로 그렇게 물어오니, 원한다고 답하지 않을 리 없다."

[[dialogue]]
speaker = "unk"
original = "だけど『好き』と言うと、『星徒会長と選管だから』と距離を取られてしまいそうで、言葉ではなく行動で答える。"
translation = "하지만 『좋아해』라고 말하면 『성도회장과 선관이니까』라며 거리를 둘 것 같아, 말이 아닌 행동으로 답한다."

[[dialogue]]
speaker = "梨緒"
original = "「ん、ちゅ……ちゅ、んん……ちゅぅっ──ぷぁっ」"
translation = "「음, 츄…… 츄, 으음…… 츄우── 푸하」"

[[dialogue]]
speaker = "クロト"
original = "「いいんだな？」"
translation = "「괜찮겠어?」"

[[dialogue]]
speaker = "梨緒"
original = "「……ああ」"
translation = "「……아아.」"

[[dialogue]]
speaker = "unk"
original = "梨緒が真っ赤な顔でこくりと頷く。"
translation = "리오가 새빨개진 얼굴로 끄덕인다."

[[dialogue]]
speaker = "unk"
original = "そしてまとうものを１枚ずつ脱いでいって……"
translation = "그리고 걸치고 있던 것을 한 장씩 벗어 던지고……"

[[dialogue]]
speaker = "梨緒"
original = "「こ、これが君の……想像していたより大きいな……」"
translation = "「이, 이것이 너의…… 상상했던 것보다 크구나……」"

[[dialogue]]
speaker = "unk"
original = "上を向いて屹立するペニスをまじまじと見つめる梨緒。"
translation = "위로 치솟아 우뚝 선 자지를 뚫어지게 쳐다보는 리오."

[[dialogue]]
speaker = "unk"
original = "梨緒も戦闘服をはだけ、大きな胸を露出していた。"
translation = "리오도 전투복을 풀어헤쳐, 커다란 가슴을 노출하고 있었다."

[[dialogue]]
speaker = "梨緒"
original = "「君、私の胸を見ているだろう……いやらしい視線を感じる」"
translation = "「너, 내 가슴을 보고 있군…… 야한 시선이 느껴진다.」"

[[dialogue]]
speaker = "クロト"
original = "「梨緒のおっぱい、綺麗だから」"
translation = "「리오의 가슴, 예쁘니까.」"

[[dialogue]]
speaker = "梨緒"
original = "「っ……そんなこと言われたら、嬉しくなってしまうじゃないか……」"
translation = "「윽…… 그런 말을 들으면, 기뻐져 버리잖아……」"

[[dialogue]]
speaker = "unk"
original = "均整が取れたスタイルに、整った凛々しい顔、輝くような金髪……梨緒は全てが美しいけど、男だからつい胸を見てしまう。"
translation = "균형 잡힌 몸매에, 반듯하고 늠름한 얼굴, 빛나는 듯한 금발…… 리오는 모든 것이 아름답지만, 남자라 어쩔 수 없이 가슴을 보게 된다."

[[dialogue]]
speaker = "unk"
original = "梨緒の胸が上下する度、豊かなバストが揺れて存在を主張する。"
translation = "리오의 가슴이 들썩일 때마다, 풍만한 바스트가 흔들리며 존재를 주장한다."

[[dialogue]]
speaker = "unk"
original = "丸い膨らみは見惚れてしまうほど美しく、ふるふると柔らかそうに弾むのが魅惑的だ。"
translation = "둥근 팽창은 넋을 잃고 볼 정도로 아름답고, 말랑말랑 부드럽게 튀어 오르는 것이 매혹적이다."

[[dialogue]]
speaker = "梨緒"
original = "「君のペ、ペニスはこんななんだな……。赤黒くて、迫力があるというか……生々しいな……」"
translation = "「너의 자, 자지는 이런 식이구나……. 거무죽죽하고, 박력이 있다고 할까…… 생생하네……」"

[[dialogue]]
speaker = "梨緒"
original = "「少し前なら、気持ち悪いと思っていたかもしれない。だけど今は目が離せなくて……これが私の中に入ると思うと、とてもドキドキする……」"
translation = "「조금 전이라면, 기분 나쁘다고 생각했을지도 몰라. 하지만 지금은 눈을 뗄 수 없어서…… 이것이 내 안으로 들어온다고 생각하니, 무척 두근거려……」"

[[dialogue]]
speaker = "unk"
original = "羞恥のせいか、ペニスを見つめる梨緒の横顔は赤く染まっていた。"
translation = "수치심 때문인지, 자지를 바라보는 리오의 옆얼굴은 붉게 물들어 있었다."

[[dialogue]]
speaker = "unk"
original = "だけどその表情には期待も垣間見えて、俺もたまらなくなる。"
translation = "하지만 그 표정에는 기대도 엿보여서, 나도 참을 수 없게 된다."

[[dialogue]]
speaker = "梨緒"
original = "「来てくれ。君と……繋がりたい」"
translation = "「와 줘. 너와…… 이어지고 싶어.」"

[[dialogue]]
speaker = "unk"
original = "梨緒の秘部はもう濡れていて、ペニスを押し当てるとくちゅっと湿った音がする。"
translation = "리오의 비부는 이미 젖어 있어서, 자지를 밀어붙이자 구츗 하고 습한 소리가 난다."

[[dialogue]]
speaker = "unk"
original = "そして亀頭が膣口を押し広げて──"
translation = "그리고 귀두가 질 입구를 밀어 넓히며──"

[[dialogue]]
speaker = "梨緒"
original = "「～～～～～～～～っ」"
translation = "「~~~~~~~~~~~~~~~~윽」"

[[dialogue]]
speaker = "unk"
original = "ペニスが梨緒の中に入った瞬間、彼女の全身がビクビクと震える。"
translation = "자지가 리오의 안으로 들어간 순간, 그녀의 전신이 파르르 떨린다."

[[dialogue]]
speaker = "unk"
original = "同時にブチッと柔らかいものを破る感触がして、梨緒の初めてを奪ったのだと理解した。"
translation = "동시에 툭 하고 부드러운 것을 찢는 감촉이 느껴져, 리오의 처음을 빼앗았다는 것을 이해했다."

[[dialogue]]
speaker = "梨緒"
original = "「ふぅ、はぁ、はぁ……入った……。君が、私の中にいるのを感じる……本当に繋がっているんだな……」"
translation = "「후우, 하아, 하아…… 들어왔어……. 네가, 내 안에 있는 게 느껴져…… 정말로 이어져 있구나……」"

[[dialogue]]
speaker = "梨緒"
original = "「女性のここに、そういう機能があると初めて聞いた時は驚いたが……こんな感触なんだな……」"
translation = "「여성의 이곳에, 그런 기능이 있다고 처음 들었을 때는 놀랐지만…… 이런 감촉이구나……」"

[[dialogue]]
speaker = "クロト"
original = "「大丈夫か？\u3000痛くないか？」"
translation = "「괜찮아? 아프지 않아?」"

[[dialogue]]
speaker = "梨緒"
original = "「痛いのは痛いが……覚悟していたほどではない。大丈夫だ。君はどうだ？\u3000わ、私の中はいいのか？」"
translation = "「아픈 건 아프지만…… 각오했던 것만큼은 아니다. 괜찮아. 너는 어때? 나, 내 안은 기분 좋아?」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、正直言うとすごく気持ちいい」"
translation = "「아아, 솔직히 말하면 정말 기분 좋아.」"

[[dialogue]]
speaker = "unk"
original = "下半身を通して伝わってくる、梨緒の体温と柔らかさ。"
translation = "하반신을 통해 전해져 오는 리오의 체온과 부드러움."

[[dialogue]]
speaker = "unk"
original = "まだ先端ぐらいしか入っていないのに、蜜で濡れた膣壁が密着してきて、ペニスがドクドクと跳ねる。"
translation = "아직 끝부분 정도밖에 들어가지 않았는데, 애액으로 젖은 질벽이 밀착해 와서 자지가 맥동하며 뛴다."

[[dialogue]]
speaker = "梨緒"
original = "「そ、それならいいんだが……私のことは気にせず、好きに使ってくれ。荒く扱ってくれて構わない」"
translation = "「그, 그렇다면 다행이지만…… 내 걱정은 말고, 마음껏 써 줘. 거칠게 다뤄도 상관없다.」"

[[dialogue]]
speaker = "unk"
original = "まるで道具のようにしてくれと言うけど、梨緒にも気持ち良くなってほしくて、大きな胸に手を伸ばした。"
translation = "마치 도구처럼 대해달라고 말하지만, 리오도 기분 좋아졌으면 해서 커다란 가슴에 손을 뻗었다."

[[dialogue]]
speaker = "梨緒"
original = "「んんっ……！？」"
translation = "「으응……!?」"

[[dialogue]]
speaker = "unk"
original = "下から手のひらを添えると、大きさの分重みがあって、少しずつ力を込めていくと嬌声が漏れる。"
translation = "아래에서 손바닥을 대자, 크기만큼 무게감이 느껴졌고, 조금씩 힘을 주자 교성이 새어 나온다."

[[dialogue]]
speaker = "梨緒"
original = "「ふっ……はぁ……あっ……<emoji=heart04>\u3000男に胸を触られるなんて、初めてだ……はぁ<emoji=heart04>」"
translation = "「훗…… 하아…… 앗……<emoji=heart04> 남자에게 가슴을 만져지다니, 처음이야…… 하아<emoji=heart04>」"

[[dialogue]]
speaker = "梨緒"
original = "「んんっ……おっぱい、触られて……んっ、はぁ……<emoji=heart04>\u3000ぐにぐにって、いやらしく揉まれてる……ふぅ、ん……<emoji=heart04>」"
translation = "「으응…… 가슴, 만져져서…… 응, 하아……<emoji=heart04> 쭈욱쭈욱, 야하게 주물러지고 있어…… 후우, 음……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "蜜の量が増してきたのに合わせて、ペニスをより深く沈めていく。"
translation = "애액의 양이 늘어난 것에 맞춰, 자지를 더욱 깊숙이 가라앉힌다."

[[dialogue]]
speaker = "梨緒"
original = "「んん～～～っ！\u3000奥に、入ってきた……はあぁっ……あっ……君の、大きいっ……！」"
translation = "「으으응~~~윽! 깊숙이, 들어왔어…… 하아앗…… 앗…… 너의 거, 커다란 게……!」"

[[dialogue]]
speaker = "梨緒"
original = "「ふぁっ……あっ……ああぁっ<emoji=heart04>\u3000君のが入ってくるの、わかる……んっ……ふっ……んんっ<emoji=heart04>」"
translation = "「하아…… 앗…… 아아앗<emoji=heart04> 너의 것이 들어오는 거, 느껴져…… 음…… 훗…… 으음<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "まだ男を受け入れたことのない、きつくて狭い膣を、ペニスで押し広げて奥に進む。"
translation = "아직 남자를 받아들인 적 없는, 좁고 빡빡한 질을 자지로 밀어 넓히며 안쪽으로 나아간다."

[[dialogue]]
speaker = "unk"
original = "ペニスと膣壁が摩擦する度、梨緒が艶めかしい声を上げて体を震わせた。"
translation = "자지와 질벽이 마찰할 때마다, 리오가 요염한 목소리를 내며 몸을 떨었다."

[[dialogue]]
speaker = "梨緒"
original = "「これが、セックス……んっ……中で、動いてる……ふぁ……<emoji=heart04>\u3000あ、は、んん……<emoji=heart04>」"
translation = "「이것이, 섹스…… 음…… 안에서, 움직이고 있어…… 하아……<emoji=heart04> 아, 하, 으음……<emoji=heart04>」"

[[dialogue]]
speaker = "梨緒"
original = "「君のペニス、太くて、熱くて……私の中、出たり、入ったりしてる……はあぁ<emoji=heart04>\u3000擦れると、声、出る……んあ、はぁ……<emoji=heart04>」"
translation = "「너의 자지, 굵고, 뜨거워서…… 내 안을, 나갔다, 들어왔다 하고 있어…… 하아아<emoji=heart04> 쓸리면, 목소리, 나와…… 응아, 하아……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「梨緒に頼みがあるんだけど……」"
translation = "「리오에게 부탁이 있는데……」"

[[dialogue]]
speaker = "梨緒"
original = "「ん……何……？\u3000なっ──！？\u3000仕方ないな、本当に……」"
translation = "「응…… 뭐야……? 앗──!? 어쩔 수 없네, 정말로……」"

[[dialogue]]
speaker = "梨緒"
original = "「君のお、おち○ちんが、私のおま○この中で、動いてるっ<emoji=heart04>」"
translation = "「너의 자, 자지가, 내 보지 안에서, 움직이고 있어<emoji=heart04>」"

[[dialogue]]
speaker = "梨緒"
original = "「～～っ！\u3000こんなハレンチなセリフを言わせるなんて、いやらしい魔王だ……！」"
translation = "「～～윽! 이런 파렴치한 대사를 하게 만들다니, 음란한 마왕이다……!」"

[[dialogue]]
speaker = "梨緒"
original = "「んんっ！？\u3000おち○ちん、お腹の中でビクビクして、大きくなって……そんなに嬉しかったのか？」"
translation = "「응윽!? 자지, 배 안에서 움찔움찔거려서, 커지고…… 그렇게 기뻤던 거야?」"

[[dialogue]]
speaker = "クロト"
original = "「ありがとう、すごく興奮した」"
translation = "「고마워, 정말 흥분됐어」"

[[dialogue]]
speaker = "梨緒"
original = "「れ、礼まで言うな、余計に恥ずかしくなる……んんっ<emoji=heart04>\u3000ほ、本当にスケベなんだな、君は……はぁ、はっ……だけど、私も、変な気分に……なる……<emoji=heart04>」"
translation = "「고, 고맙다는 말까지 하지 마, 더 부끄러워지니까…… 응윽<emoji=heart04> 저, 정말 변태구나, 너는…… 하아, 하앗…… 하지만, 나도, 이상한 기분이…… 들어……<emoji=heart04>」"

[[dialogue]]
speaker = "梨緒"
original = "「んんんっ<emoji=heart04>\u3000君のおち○ちん、で、私のおま○こ、広げられてるっ<emoji=heart04>\u3000ふぁっ、はぁっ、ああっ<emoji=heart04>」"
translation = "「응으윽<emoji=heart04> 너의 자지로, 내 보지, 벌려지고 있어<emoji=heart04> 후앗, 하앗, 아앗<emoji=heart04>」"

[[dialogue]]
speaker = "梨緒"
original = "「ふっ……はっ、はぁ……はんっ<emoji=heart04>\u3000おち○ちんで、中、擦られて、気持ちいいっ<emoji=heart04>\u3000お腹の奥、キュンって、苦しくなる……<emoji=heart04>」"
translation = "「후우…… 하앗, 하아…… 항<emoji=heart04> 자지로, 안쪽, 쓸려서, 기분 좋아<emoji=heart04> 배 깊은 곳이, 큥 하고, 괴로워져……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "梨緒が嬌声を上げ、膣壁がしがみつくようにきゅうっと締め付ける。"
translation = "리오가 교성을 지르고, 질벽이 매달리듯이 꽉 조여온다."

[[dialogue]]
speaker = "梨緒"
original = "「ふあっ、はっ……あっ、あぁっ……<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000おち○ちん、私の中で、また大きくなってるっ<emoji=heart04>」"
translation = "「후아앗, 하앗…… 앗, 아아앗……<emoji=heart04> 안<emoji=heart04> 자지, 내 안에서, 또 커지고 있어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスを突き上げると、その勢いで胸がたぷたぷと揺れるのがたまらない。"
translation = "페니스를 쳐올리자, 그 기세로 가슴이 출렁출렁 흔들리는 것이 견딜 수 없다."

[[dialogue]]
speaker = "unk"
original = "その柔らかなおっぱいを鷲掴みにして揉みしだく。"
translation = "그 부드러운 가슴을 움켜쥐고 마구 주무른다."

[[dialogue]]
speaker = "梨緒"
original = "「んん～～～っ<emoji=heart04><emoji=heart04>\u3000おっぱい、揉まれて……体、熱くなるっ<emoji=heart04>\u3000たくさん、ぐにぐにされて……ふああぁっ<emoji=heart04>」"
translation = "「응으으으윽<emoji=heart04><emoji=heart04> 가슴, 주물러져서…… 몸이, 뜨거워져<emoji=heart04> 잔뜩, 조물조물 당해서…… 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "梨緒"
original = "「あっ、あんっ<emoji=heart04>\u3000おっぱい揉まれながら、おま○こも一緒に……んんっ<emoji=heart04>\u3000これ、変になる<emoji=heart04>\u3000んっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>」"
translation = "「앗, 안<emoji=heart04> 가슴 주물러지면서, 보지도 같이…… 응윽<emoji=heart04> 이거, 이상해져<emoji=heart04> 응<emoji=heart04> 아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "下半身で繋がり、胸を柔らかさを味わいながら、さらに唇を奪う。"
translation = "하반신으로 연결되어, 가슴의 부드러움을 맛보면서, 더욱 입술을 빼앗는다."

[[dialogue]]
speaker = "梨緒"
original = "「んんっ<emoji=heart04>\u3000ちゅるるっ、ちゅるじゅぱっ<emoji=heart04>\u3000んふぅっ……んっ<emoji=heart04>\u3000あたま、ぐちゃぐちゃに、なりそう……んっふぅっ<emoji=heart04>」"
translation = "「응윽<emoji=heart04> 츄르르, 츄르쥬릅<emoji=heart04> 응후우…… 응<emoji=heart04> 머릿속이, 엉망진창이, 될 것 같아…… 응후우<emoji=heart04>」"

[[dialogue]]
speaker = "梨緒"
original = "「んふっ……ちゅるっ、ちゅるれろっ<emoji=heart04>\u3000れぇるっ、れろれろ……んふぅ……じゅぷっ、じゅぷるっ、じゅるるっ<emoji=heart04>」"
translation = "「응후…… 츄릅, 츄르르릅<emoji=heart04> 레로, 레로레로…… 응후…… 쥬웁, 쥬릅, 츄르르<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "舌を絡め、唾液を混ぜ合わせながらの濃厚なキス。"
translation = "혀를 얽고, 타액을 뒤섞으며 나누는 농후한 키스."

[[dialogue]]
speaker = "unk"
original = "頭の奥がかあっと熱くなる心地良さに酔いつつ、キスしながら左右の乳首をきゅっと摘まむ。"
translation = "머릿속 깊은 곳이 화끈하게 달아오르는 쾌감에 취하며, 키스하면서 좌우의 유두를 꼬집는다."

[[dialogue]]
speaker = "梨緒"
original = "「んん～～～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「응으～～～～～읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "甘い喘ぎを漏らしながらビクビクと体を震わせる梨緒。"
translation = "달콤한 신음을 흘리며 파르르 몸을 떠는 리오."

[[dialogue]]
speaker = "unk"
original = "そんな梨緒がかわいくて、さらに激しく突き上げていく。"
translation = "그런 리오가 귀여워서, 더욱 격렬하게 쳐올려 간다."

[[dialogue]]
speaker = "梨緒"
original = "「ふああぁっ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000んああぁっ<emoji=heart04>\u3000君のおち○ちん、ズンってきて<emoji=heart04>\u3000ひあっ<emoji=heart04>\u3000ああっ<emoji=heart04>\u3000奥まで届いて、深いぃっ<emoji=heart04>」"
translation = "「후아아아앗<emoji=heart04><emoji=heart04> 앗<emoji=heart04> 응아아앗<emoji=heart04> 너의 자지, 즈응 하고 와서<emoji=heart04> 히앗<emoji=heart04> 아앗<emoji=heart04> 안쪽까지 닿아서, 깊어어<emoji=heart04>」"

[[dialogue]]
speaker = "梨緒"
original = "「んぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ああぁんっ<emoji=heart04>\u3000おま○こジュポジュポって、たくさん突かれてるっ<emoji=heart04>」"
translation = "「응아앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 아아앙앗<emoji=heart04> 보지 쥬포쥬포하고, 잔뜩 찔리고 있어어<emoji=heart04>」"

[[dialogue]]
speaker = "梨緒"
original = "「はぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ、あんっ<emoji=heart04>\u3000激しっ、いっ<emoji=heart04>\u3000お腹の奥まで、響くっ<emoji=heart04>\u3000私の中、ぐちゅぐちゅにされてるっ<emoji=heart04>」"
translation = "「하앗<emoji=heart04> 앗<emoji=heart04> 앗, 아앙<emoji=heart04> 격렬, 해<emoji=heart04> 배 안쪽까지, 울려어<emoji=heart04> 내 안, 구츄구츄하게 되어버려어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ズン、ズンと強く打ち込むように突くと、おっぱいが重そうに揺れる。"
translation = "즈응, 즈응 하고 강하게 박아넣듯이 찌르자, 가슴이 무겁게 흔들린다."

[[dialogue]]
speaker = "unk"
original = "最初のぎこちなさがウソのように、蜜で濡れた秘部は嬉しそうにペニスを受け入れていた。"
translation = "처음의 어색함이 거짓말인 것처럼, 애액으로 젖은 비부는 기쁜 듯이 페니스를 받아들이고 있었다."

[[dialogue]]
speaker = "梨緒"
original = "「あんっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000こんな、足広げて、エッチして……見せつけてる、みたいっ……はぁはっ、あっ、ああんっ<emoji=heart04>」"
translation = "「아앙<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 이런, 다리 벌리고, 섹스하고…… 보여주는, 것 같아…… 하아하앗, 앗, 아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「繋がってるところがよく見えるな」"
translation = "「연결되어 있는 곳이 잘 보이네」"

[[dialogue]]
speaker = "梨緒"
original = "「い、言うなっ……んんっ<emoji=heart04>\u3000はっ、はぁ、んんはぁっ<emoji=heart04>\u3000おま○こジュプジュプって、いやらしい音してるっ<emoji=heart04>」"
translation = "「마, 말하지 마…… 응응<emoji=heart04> 하앗, 하아, 응응하앗<emoji=heart04> 보지 쥬푸쥬푸하고, 야한 소리 나고 있어어<emoji=heart04>」"

[[dialogue]]
speaker = "梨緒"
original = "「星徒会室なのに、エッチ、気持ち、いいっ<emoji=heart04>\u3000みんなが仕事してる場所なのに、エッチ、してるぅっ<emoji=heart04>」"
translation = "「성도회실인데, 섹스, 기분, 좋아아<emoji=heart04> 모두가 일하는 장소인데, 섹스, 하고 있어어<emoji=heart04>」"

[[dialogue]]
speaker = "梨緒"
original = "「はあぁっ<emoji=heart04>\u3000はっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000選挙管理委員会が、星徒会長とエッチするなんて、いけないのに……おま○こ熱くて……ふああぁっ<emoji=heart04>」"
translation = "「하아아앗<emoji=heart04> 핫<emoji=heart04> 아앙<emoji=heart04> 선거관리위원회가, 성도회장과 섹스하다니, 안 되는데…… 보지 뜨거워서…… 후아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "いつもは凛々しくて真面目な梨緒が肉欲に溺れ、あられもない姿で喘ぐ。"
translation = "평소에는 늠름하고 성실한 리오가 육욕에 빠져, 보기 흉한 모습으로 신음한다."

[[dialogue]]
speaker = "unk"
original = "はち切れそうなペニスが、柔らかくて弾力のある粘膜と激しく摩擦し、快感が駆け上ってくる。"
translation = "터질 듯한 페니스가, 부드럽고 탄력 있는 점막과 격렬하게 마찰하며, 쾌감이 치밀어 오른다."

[[dialogue]]
speaker = "梨緒"
original = "「あ──あ──あ──んん～～～っ<emoji=heart04><emoji=heart04>\u3000荒々しく、突かれてるっ<emoji=heart04>\u3000おち○ちんズンズン来てっ<emoji=heart04>\u3000おま○こ、壊れてしまいそうだっ<emoji=heart04>」"
translation = "「아──아──아──응응～～～앗<emoji=heart04><emoji=heart04> 거칠게, 찔리고 있어어<emoji=heart04> 자지 즈응즈응 와서어<emoji=heart04> 보지, 망가져 버릴 것 같아앗<emoji=heart04>」"

[[dialogue]]
speaker = "梨緒"
original = "「ひあっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000勢い、強いぃっ<emoji=heart04>\u3000いっぱい突かれて<emoji=heart04>\u3000私のおま○こ、君のおち○ちん気持ち良くするために、使われてるっ<emoji=heart04>」"
translation = "「히앗<emoji=heart04> 아앙<emoji=heart04> 기세, 강해애<emoji=heart04> 잔뜩 찔려서<emoji=heart04> 내 보지, 너의 자지 기분 좋게 하기 위해서, 사용되고 있어어<emoji=heart04>」"

[[dialogue]]
speaker = "梨緒"
original = "「でも嬉しい<emoji=heart04>\u3000気持ちいい<emoji=heart04>\u3000私のおま○こ、好きなだけ、使ってくれっ<emoji=heart04>\u3000ひやっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000たくさん、突いてぇっ<emoji=heart04>」"
translation = "「하지만 기뻐<emoji=heart04> 기분 좋아<emoji=heart04> 내 보지, 마음껏, 사용해 줘어<emoji=heart04> 히얏<emoji=heart04> 아아앙<emoji=heart04> 잔뜩, 찔러줘어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "健気な梨緒をもっと喘がせたくて、クリトリスに指先で軽く触れる。"
translation = "기특한 리오를 좀 더 신음하게 하고 싶어서, 클리토리스에 손끝으로 가볍게 접촉한다."

[[dialogue]]
speaker = "梨緒"
original = "「ひやぁあああっ！？」"
translation = "「히야아아아앗!?」"

[[dialogue]]
speaker = "unk"
original = "その瞬間、体をガクガクと震えさせながら、痛いぐらいにペニスを締め付けてきた。"
translation = "그 순간, 몸을 가쿠가쿠 떨면서, 아플 정도로 페니스를 조여 왔다."

[[dialogue]]
speaker = "梨緒"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000そこ、くりくりするの、らめっ<emoji=heart04>\u3000気持ち良すぎっ<emoji=heart04>\u3000んぁっ<emoji=heart04>\u3000お腹の奥、キュンキュンするぅっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 거기, 쿠리쿠리하는 거, 안 돼애<emoji=heart04> 기분 너무 좋아아<emoji=heart04> 응아앗<emoji=heart04> 배 안쪽, 큥큥거려어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "精液をねだるようにペニス全体を絞られ、限界が近づいてくるのを感じながら、強く突き上げる。"
translation = "정액을 조르듯이 페니스 전체를 쥐어짜여, 한계가 다가오는 것을 느끼며, 강하게 쳐올린다."

[[dialogue]]
speaker = "梨緒"
original = "「ひああぁあ～～っ<emoji=heart04><emoji=heart04>\u3000奥に、ズンってっ<emoji=heart04>\u3000おち○ちんっ<emoji=heart04>\u3000奥に、当たるっ<emoji=heart04>\u3000んんっ──ん～～っ<emoji=heart04>」"
translation = "「히아아아아～～앗<emoji=heart04><emoji=heart04> 안쪽에, 즈응 하고오<emoji=heart04> 자지이<emoji=heart04> 안쪽에, 닿아아<emoji=heart04> 응응──응～～앗<emoji=heart04>」"

[[dialogue]]
speaker = "梨緒"
original = "「あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あぁっ<emoji=heart04>\u3000君のおち○ちん、一番深いところ、届いてっ<emoji=heart04>\u3000私の中、君で、いっぱいになってる<emoji=heart04>\u3000君で、満たされてるっ<emoji=heart04>」"
translation = "「아앙<emoji=heart04> 아앙<emoji=heart04> 아앗<emoji=heart04> 너의 자지, 제일 깊은 곳, 닿아서어<emoji=heart04> 내 안, 너로, 가득 차 있어어<emoji=heart04> 너로, 채워지고 있어어<emoji=heart04>」"

[[dialogue]]
speaker = "梨緒"
original = "「奥まで突かれるの、好きっ<emoji=heart04>\u3000ふぁっ、あぁんっ<emoji=heart04>\u3000私の中で、おち○ちん、感じるっ<emoji=heart04>\u3000君が私の中に、いてくれるの、わかるんだっ<emoji=heart04>」"
translation = "「안쪽까지 찔리는 거, 좋아아<emoji=heart04> 후아앗, 아아앙<emoji=heart04> 내 안에서, 자지, 느껴져어<emoji=heart04> 네가 내 안에, 있어 주는 거, 알겠어어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "奥まで突き入れると、ペニス全体で梨緒を感じる。"
translation = "안쪽까지 찔러 넣자, 페니스 전체로 리오를 느낀다."

[[dialogue]]
speaker = "unk"
original = "やけどしそうに熱く、とろとろに濡れた膣壁が隙間なく絡みついてきて、射精寸前まで興奮が高まっていく。"
translation = "데일 듯이 뜨겁고, 걸쭉하게 젖은 질벽이 빈틈없이 얽혀와서, 사정 직전까지 흥분이 고조되어 간다."

[[dialogue]]
speaker = "梨緒"
original = "「ふぁああっ<emoji=heart04>\u3000おち○ちん、中でドクドク、脈打ってるっ<emoji=heart04>\u3000出そう、なのか？\u3000出したいのか？」"
translation = "「후아아앗<emoji=heart04> 자지, 안에서 두근두근, 맥박치고 있어어<emoji=heart04> 나올 것, 인가? 내고 싶은 건가?」"

[[dialogue]]
speaker = "unk"
original = "梨緒に答えるように、肉感的な太ももをがっちりと掴んでラストスパートをかけた。"
translation = "리오에게 대답하듯이, 육감적인 허벅지를 꽉 붙잡고 라스트 스퍼트를 올렸다."

[[dialogue]]
speaker = "梨緒"
original = "「あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000おち○ちん、奥に……子宮に、当たってるっ<emoji=heart04>\u3000頭、チカチカして、おかしくなるっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 아앙<emoji=heart04> 자지, 안쪽에…… 자궁에, 닿고 있어어<emoji=heart04> 머리, 치카치카해서, 이상해져어<emoji=heart04>」"

[[dialogue]]
speaker = "梨緒"
original = "「んっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000ん～っ<emoji=heart04>\u3000奥、おち○ちんで、トントンされてっ<emoji=heart04>\u3000中に出したいって、おねだりされてる、みたいだっ<emoji=heart04>」"
translation = "「응앗<emoji=heart04> 응응앗<emoji=heart04> 응～앗<emoji=heart04> 안쪽, 자지로, 통통거려서어<emoji=heart04> 안에 내고 싶다고, 조르는 것, 같아아<emoji=heart04>」"

[[dialogue]]
speaker = "梨緒"
original = "「出して、いいぞ<emoji=heart04>\u3000私の中に、出してくれっ<emoji=heart04>\u3000君の精液、私に注いでくれ<emoji=heart04>\u3000私を満たしてくれっ<emoji=heart04>」"
translation = "「내도, 좋아아<emoji=heart04> 내 안에, 내줘어<emoji=heart04> 너의 정액, 나에게 부어줘어<emoji=heart04> 나를 채워줘어<emoji=heart04>」"

[[dialogue]]
speaker = "梨緒"
original = "「ふああぁっ<emoji=heart04>\u3000ああっ<emoji=heart04>\u3000おま○こ熱いっ<emoji=heart04>\u3000んぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000おま○こイク、イッっちゃうぅっ<emoji=heart04>\u3000君のおち○ちんでイクっ<emoji=heart04>」"
translation = "「후아아아앗<emoji=heart04> 아앗<emoji=heart04> 보지 뜨거워어<emoji=heart04> 응아앗<emoji=heart04> 앗<emoji=heart04> 보지 가, 가버려어어<emoji=heart04> 너의 자지로 가버려어<emoji=heart04>」"

[[dialogue]]
speaker = "梨緒"
original = "「ひぁああっ<emoji=heart04>\u3000ああぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あ──あ──お腹の奥から、来るっ<emoji=heart04>\u3000おま○こイッちゃうぅっ<emoji=heart04><emoji=heart04>」"
translation = "「히아아아앗<emoji=heart04> 아아아앗<emoji=heart04> 아앙<emoji=heart04> 아앙<emoji=heart04> 아──아──배 안쪽에서, 와아<emoji=heart04> 보지 가버려어어<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "梨緒"
original = "「ひぁっ、あっ、あっ、んん～～～っ<emoji=heart04><emoji=heart04>\u3000おち○ちんズンズンされてっ、イクイクイクっ<emoji=heart04>\u3000ふぁ──あ──おま○こイッくぅ～～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「히앗, 앗, 앗, 응응～～～앗<emoji=heart04><emoji=heart04> 자지 즈응즈응 당해서어, 가버려가버려가버려어<emoji=heart04> 후아──아──보지 가버려어어～～～～앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "梨緒"
original = "「ひぁああああああ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「히아아아아아아아아～～～～～～～～～앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "梨緒"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000お腹の中で、おち○ちんドクドクしてるっ<emoji=heart04>\u3000あつっ、熱いぃっ<emoji=heart04>\u3000は──あ──んん～～～～っ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 배 안에서, 자지 두근두근거려어<emoji=heart04> 뜨거, 뜨거워어<emoji=heart04> 하──아──응응～～～～앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスを深くうずめ、梨緒に包まれながら、奥に精を吐き出す。"
translation = "페니스를 깊숙이 파묻고, 리오에게 감싸인 채, 안쪽에 정을 토해낸다."

[[dialogue]]
speaker = "unk"
original = "柔らかい膣壁がペニス全体をぎゅうっと締め付け、心地良い圧迫感を感じながら射精を続ける。"
translation = "부드러운 질벽이 페니스 전체를 꽉 조여와, 기분 좋은 압박감을 느끼며 사정을 계속한다."

[[dialogue]]
speaker = "梨緒"
original = "「奥にっ<emoji=heart04>\u3000ビュクビュクって、出てるっ<emoji=heart04>\u3000はあぁ、はぁっ……<emoji=heart04>\u3000熱いの、お腹の中、広がってるぅっ<emoji=heart04><emoji=heart04>」"
translation = "「안쪽에에<emoji=heart04> 뷰쿠뷰쿠하고, 나오고 있어어<emoji=heart04> 하아아, 하앗……<emoji=heart04> 뜨거운 거, 배 안, 퍼지고 있어어어<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "梨緒"
original = "「んんっ<emoji=heart04>\u3000まだ、出て……<emoji=heart04>\u3000君の精液で、子宮、いっぱいになるぅ……んっ……はああぁっ……<emoji=heart04>」"
translation = "「응응앗<emoji=heart04> 아직, 나오고……<emoji=heart04> 너의 정액으로, 자궁, 가득 차버려어…… 응…… 하아아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "梨緒"
original = "「はぁはぁ……はあぁ……ちゃんと最後までできたな……」"
translation = "「하아하아…… 하아아…… 제대로 끝까지 했구나……」"

[[dialogue]]
speaker = "unk"
original = "絶頂の快感が駆け抜け、脱力して俺に体を預ける梨緒。"
translation = "절정의 쾌감이 스쳐 지나가고, 탈력하여 나에게 몸을 맡기는 리오."

[[dialogue]]
speaker = "unk"
original = "その表情には疲労も見えたけど、満足そうに微笑んでいた。"
translation = "그 표정에는 피로도 보였지만, 만족스러운 듯 미소 짓고 있었다."

[[dialogue]]
speaker = "クロト"
original = "「好きだよ、梨緒」"
translation = "「좋아해, 리오」"

[[dialogue]]
speaker = "梨緒"
original = "「そ、そういうのはダメだと言っただろう」"
translation = "「그, 그런 건 안 된다고 말했잖나」"

[[dialogue]]
speaker = "クロト"
original = "「エッチするのはいいんだ？」"
translation = "「섹스하는 건 괜찮고?」"

[[dialogue]]
speaker = "梨緒"
original = "「う……それは……その……」"
translation = "「우…… 그건…… 그……」"

[[dialogue]]
speaker = "unk"
original = "『星徒会長と選挙管理委員会として、適切な距離を保つべきだ』という梨緒の考えもわかる。"
translation = "『성도회장과 선거관리위원회로서, 적절한 거리를 유지해야 한다』는 리오의 생각도 이해한다."

[[dialogue]]
speaker = "unk"
original = "けど距離を取るにはもう遅い。"
translation = "하지만 거리를 두기에는 이미 늦었다."

[[dialogue]]
speaker = "クロト"
original = "「秘密にしていればいいんじゃないか？」"
translation = "「비밀로 하고 있으면 되잖아?」"

[[dialogue]]
speaker = "梨緒"
original = "「いいや、仮に付き合うなら周りに知らせるべきだ。隠すのは逆効果だ」"
translation = "「아니, 만약 사귄다면 주변에 알려야 한다. 숨기는 건 역효과다」"

[[dialogue]]
speaker = "クロト"
original = "「真面目だなぁ……」"
translation = "「성실하네……」"

[[dialogue]]
speaker = "unk"
original = "もちろん、梨緒のそんなところも好きなんだけど。"
translation = "물론, 리오의 그런 점도 좋아하지만."

[[dialogue]]
speaker = "梨緒"
original = "「まぁ、とりあえず言っておく」"
translation = "「뭐, 일단 말해 두지」"

[[dialogue]]
speaker = "梨緒"
original = "「私も君が好きだ。それだけわかっていれば、今は十分だろう」"
translation = "「나도 네가 좋다. 그것만 알고 있다면, 지금은 충분하겠지」"

[[dialogue]]
speaker = "梨緒"
original = "「ん……ちゅっ」"
translation = "「응…… 츄」"

[[dialogue]]
speaker = "unk"
original = "最後にもう一度キスを交わし、梨緒の華奢な体を抱きしめた。"
translation = "마지막으로 다시 한번 키스를 나누고, 리오의 가녀린 몸을 껴안았다."

