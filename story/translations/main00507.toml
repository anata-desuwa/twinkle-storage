[[dialogue]]
speaker = "unk"
original = "第９話,リクリエの使徒,B"
translation = "제9화, 리크리에의 사도, B"

[[dialogue]]
speaker = "unk"
original = "俺とヴィーナス──"
translation = "나와 비너스──"

[[dialogue]]
speaker = "unk"
original = "それからサーシャ先輩と流星のソフィアちゃんは、本丸であるアポロ目がけて夜空を駆けていた。"
translation = "그리고 사샤 선배와 유성의 소피아짱은, 본거지인 아폴로를 향해 밤하늘을 가로질러 달리고 있었다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「この夜に切り替わった瞬間、一度だけそれらしき影を目視しました。こちらへ向かっていったと思われますが……」"
translation = "「이 밤으로 전환된 순간, 한 번 그것으로 보이는 그림자를 육안으로 확인했습니다. 이쪽으로 향했다고 생각됩니다만……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふ、お手柄よソフィ。出会ったこともないのによくわかったわね」"
translation = "「후후, 잘했어 소피. 만난 적도 없는데 잘 알았네」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「危険な相手ということで、情報は集めていましたから…………って頭を撫でようとしないでくださいっ」"
translation = "「위험한 상대이기에, 정보를 모으고 있었습니다만…………이라고 머리를 쓰다듬으려 하지 말아 주세요!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「？\u3000見ないうちに仲良くなったのね……？」"
translation = "「? 못 본 사이에 친해졌네……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "サーシャ先輩は後輩を可愛がる傾向にある。"
translation = "사샤 선배는 후배를 귀여워하는 경향이 있다."

[[dialogue]]
speaker = "unk"
original = "ただ、それでも……ソフィアちゃんに対する微笑みは、俺に向けるそれと異なっているように見えた。"
translation = "다만, 그럼에도…… 소피아짱을 향한 미소는, 나를 향하는 그것과는 다른 것처럼 보였다."

[[dialogue]]
speaker = "unk"
original = "そして、飛行を続けること十数分──"
translation = "그리고, 비행을 계속한 지 십여 분──"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「──いた！」"
translation = "「──찾았다!」"

[[dialogue]]
speaker = "unk"
original = "東京タワーの遥か上空。ようやく彼女の影を見つけた。"
translation = "도쿄 타워의 아득한 상공. 드디어 그녀의 그림자를 발견했다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「出てこい、サイキョーの魔王！\u3000さもなくばこの人間界はぜ～んぶまっさらにしてアポロ様のおもちゃ箱にしちゃうぞ！」"
translation = "「나와라, 최강의 마왕! 그렇지 않으면 이 인간계는 모～두 깨끗하게 만들어서 아폴로님의 장난감 상자로 만들어 버릴 거다!」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「ハハハ、お見事でございますアポロ様！」"
translation = "「하하하, 훌륭하십니다 아폴로님!」"

[[dialogue]]
speaker = "unk"
original = "ペンでも回すかのように大剣を振るい、新たなモンスターを地上へ生み落としているアポロ。"
translation = "펜이라도 돌리듯이 대검을 휘두르며, 새로운 몬스터를 지상으로 만들어 떨어뜨리고 있는 아폴로."

[[dialogue]]
speaker = "unk"
original = "俺たちはそれらを撃滅しつつ姿を現した。"
translation = "우리는 그것들을 격멸하면서 모습을 드러냈다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「アポロ……」"
translation = "「아폴로……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「やっぱりいたわね、ガキンチョ！\u3000今回は逃がさないんだからね！」"
translation = "「역시 있었네, 꼬맹이! 이번엔 놓치지 않을 테니까!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「お、来たな？\u3000待ちくたびれたぞ、へっへっへ」"
translation = "「오, 왔나? 기다리느라 지쳤다, 헷헷헷」"

[[dialogue]]
speaker = "unk"
original = "アポロは以前よりさらに強大な紫の瘴気をまとってそこにいた。"
translation = "아폴로는 이전보다 더욱 강대한 보랏빛 장기를 두르고 그곳에 있었다."

[[dialogue]]
speaker = "unk"
original = "彼女のお付きである執事も、主の奔放を喝采して微笑みをたたえている。"
translation = "그녀를 모시는 집사도, 주인의 자유분방함을 갈채하며 미소를 띠고 있다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「あれが“星読事変”の首謀者……ほんとに、私より幼い……」"
translation = "「저것이 “별 읽기 사변”의 수모자…… 정말로, 저보다 어리네요……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「見た目だけは可愛いんだけどねえ。やることは全然可愛くなくって」"
translation = "「겉모습만은 귀엽지만 말이야. 하는 짓은 전혀 귀엽지 않고」"

[[dialogue]]
speaker = "unk"
original = "アポロはリクリエの使徒である。"
translation = "아폴로는 리크리에의 사도이다."

[[dialogue]]
speaker = "unk"
original = "アナは彼女をそう分析し、謎の声もまたアポロのことをそう匂わせた。"
translation = "아나는 그녀를 그렇게 분석했고, 수수께끼의 목소리 또한 아폴로에 대해 그렇게 암시했다."

[[dialogue]]
speaker = "unk"
original = "『何もかもまっさらに』──言動の節々からうかがえるそのスタンスは、まさにリクリエそのもの。"
translation = "『모든 것을 깨끗하게』── 언행의 마디마디에서 엿볼 수 있는 그 스탠스는, 그야말로 리크리에 그 자체."

[[dialogue]]
speaker = "unk"
original = "そして……"
translation = "그리고……"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「フィーニスの塔二階層を突破したよーだな。それでこそ我が最大の宿敵・魔王にふさわしい！」"
translation = "「피니스의 탑 이계층을 돌파한 모양이더군. 그래야말로 나의 최대 숙적・마왕에게 걸맞지!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "だからこそアポロは魔王に執着する。"
translation = "그렇기에 아폴로는 마왕에게 집착한다."

[[dialogue]]
speaker = "unk"
original = "いわく最強の魔王とやらをライバル視して、俺を仮想のボス敵に仕立て上げている。"
translation = "이른바 최강의 마왕이라는 것을 라이벌로 여기고, 나를 가상의 보스 적으로 만들어 세우고 있다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「なんでまたあんたは私たちの動きを掴んでんのよ。まあいいけど……前の私と思ったら大違いだから」"
translation = "「왜 또 너는 우리의 움직임을 파악하고 있는 거야. 뭐 상관없지만…… 이전의 나라고 생각하면 큰 오산이니까」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「もうこれに頼り切りにはならない。だから、私たちの力だけであんたを倒すわ」"
translation = "「더는 이것에 전적으로 의지하지 않을 거야. 그러니, 우리의 힘만으로 너를 쓰러뜨릴 거야」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ふふふん。いい度胸だ魔王の家来よ」"
translation = "「후후훗. 배짱 좋군 마왕의 하인아」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「フフフ。身の程を教えてさしあげましょう、アポロ様」"
translation = "「후후후. 분수를 가르쳐 드리겠습니다, 아폴로님」"

