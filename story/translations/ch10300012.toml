[[dialogue]]
speaker = "unk"
original = "第２話,美化委員ナミエル,P"
translation = "제2화, 미화위원 나미엘"

[[dialogue]]
speaker = "unk"
original = "今日も無事にモンスター討伐の役目を果たし、あとは家に帰って休むだけ──"
translation = "오늘도 무사히 몬스터 토벌 임무를 완수하고, 이제 집에 가서 쉬기만 하면 된다──"

[[dialogue]]
speaker = "unk"
original = "だったのだが、モンスターがいなくなった後の戦場で、複数人の女生徒たちが集まっているのを見つけた。"
translation = "였을 터인데, 몬스터가 사라진 뒤의 전장에서 여러 명의 여학생이 모여 있는 것을 발견했다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「付近の破損状況、確認終わりました。なかなかに激しい戦闘だったようですね」"
translation = "「부근의 파손 상황, 확인 끝났습니다. 꽤 격렬한 전투였던 모양이네요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「あちらの大通りは瓦礫が多いので、人数を割いた方が良いかと思います」"
translation = "「저쪽 큰길은 잔해가 많으니 인원을 나누는 게 좋을 것 같습니다.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「この辺りのお掃除は私１人で対処できます──はい。ではまた後ほど合流いたしましょう」"
translation = "「이 근처 청소는 저 혼자서 대처할 수 있습니다── 네. 그럼 나중에 합류하죠.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「……ふぅ。まったく。こんなにも散らかすだなんて。モンスター、許せません」"
translation = "「……후우. 정말이지. 이렇게나 어지럽히다니. 몬스터, 용서할 수 없습니다.」"

[[dialogue]]
speaker = "unk"
original = "ナミエル、何をしてるんだ？"
translation = "나미엘, 뭐 하고 있는 거야?"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「あ……緋宮会長。ご無沙汰しております」"
translation = "「아…… 히노미야 회장님. 오랜만입니다.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「何をしているのかと言われても、お掃除ですよ。私は流星学園附属の美化委員でもありますから」"
translation = "「무얼 하고 있느냐고 물으셔도 청소입니다. 저는 유성학원 부속 미화위원이기도 하니까요.」"

[[dialogue]]
speaker = "unk"
original = "美化委員が……街の掃除を？"
translation = "미화위원이…… 거리 청소를?"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「はい。美化委員は学園内の清掃の他に、街中での戦闘行為の後始末も業務としています」"
translation = "「네. 미화위원은 학원 내 청소 외에도 거리에서의 전투 행위 뒷정리도 업무로 하고 있습니다.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「瓦礫が散乱したり、ベンチや街灯が破損したり……放っておくと新たな事故につながりかねませんから」"
translation = "「잔해가 흩어지거나 벤치나 가로등이 파손되거나…… 방치하면 새로운 사고로 이어질 수 있으니까요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「美化委員の事、ご存じありませんでしたか？\u3000まあ星徒会と違って目立つ役職ではないですから仕方ありません」"
translation = "「미화위원에 대해 모르셨습니까? 뭐, 성도회와 달리 눈에 띄는 직책은 아니니 어쩔 수 없겠죠.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ともかく後始末はお任せください。緋宮会長は戦闘が終わったばかりでお疲れでしょう」"
translation = "「아무튼 뒷정리는 맡겨주십시오. 히노미야 회장님은 전투가 막 끝나서 피곤하실 텐데요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「どうかご帰宅し、ゆっくり休養なさってくださいませ」"
translation = "「부디 귀가하셔서 푹 휴식을 취하십시오.」"

[[dialogue]]
speaker = "unk"
original = "俺も清掃を手伝うよ"
translation = "나도 청소를 도울게"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「──え？\u3000いえ、わざわざ手を貸していただくほどでは……」"
translation = "「──에? 아니요, 일부러 손을 빌려주실 것까지는……」"

[[dialogue]]
speaker = "unk"
original = "会長として美化委員の仕事を知っておきたい"
translation = "회장으로서 미화위원의 업무를 알아두고 싶어"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「……ずいぶん変わったことを言いだすのですね」"
translation = "「……꽤 희한한 소리를 하시는군요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「お役目でもないのに、わざわざ美化委員のお手伝いまでしようとする……実にアヤシイです」"
translation = "「임무도 아닌데 일부러 미화위원의 도움까지 주려 하다니…… 참으로 수상합니다.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「また何かえっちなことを企んでいるのでしょうか……？\u3000今日は女子生徒しかいませんし……」"
translation = "「또 뭔가 야한 짓을 꾸미고 있는 걸까요……? 오늘은 여학생밖에 없기도 하고……」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「……いえ。あまり疑うと、またメイド長に叱られてしまいますね」"
translation = "「……아니요. 너무 의심하면 또 메이드장님께 혼나겠군요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「良いでしょう。清掃は私と一緒に行いましょう。しっかりばっちり監視させていただきます」"
translation = "「좋습니다. 청소는 저와 함께하죠. 제대로 확실히 감시해 드리겠습니다.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「──言っておきますが、前回のようなドジはもう起こりません。また私のパンツ……こほん。何かを見られると思ったら大間違いですから」"
translation = "「──말해두겠는데, 지난번 같은 실수는 이제 일어나지 않습니다. 또 제 팬티…… 흠흠. 뭔가를 볼 수 있을 거라 생각하면 큰 오산이니까요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「それではついて来てください、緋宮会長」"
translation = "「그럼 따라오십시오, 히노미야 회장님.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「んっ……このくらいでいいでしょう。瓦礫もなし。すっかり綺麗になりましたね」"
translation = "「음…… 이 정도면 됐겠죠. 잔해도 없음. 아주 깨끗해졌네요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「街がぴかぴかになりました。汚れる前よりも綺麗にする。これこそお掃除のあるべき姿と言えましょう」"
translation = "「거리가 반짝반짝해졌습니다. 더러워지기 전보다 깨끗하게 만든다. 이것이야말로 청소의 본모습이라 할 수 있겠죠.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「しかし……清掃をするあなたからは邪な思いが見られませんでした。私も掃除を愛する者ですので、そこは誤らないはずです」"
translation = "「하지만…… 청소를 하는 당신에게서는 사악한 마음이 보이지 않았습니다. 저도 청소를 사랑하는 사람이니 그 점은 틀리지 않을 겁니다.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「まさか本当に、美化委員のことをねぎらい、理解するためだけに手伝いを申し出ていただけたのでしょうか……？」"
translation = "「설마 정말로 미화위원의 노고를 치하하고 이해하기 위해서만 도움을 제안하신 건가요……?」"

[[dialogue]]
speaker = "unk"
original = "最初からそう言ってるのに……"
translation = "처음부터 그렇게 말했는데……"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「……少し、見直しました」"
translation = "「……조금 다시 봤습니다.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「花形であるモンスター討伐と比べて、美化委員は目立ちません。感謝の声を聞くことも少ないのです」"
translation = "「꽃이라 할 수 있는 몬스터 토벌과 비교하면 미화위원은 눈에 띄지 않습니다. 감사의 말을 듣는 일도 적죠.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「もちろん理解ある方から、お褒めのお言葉をいただくこともありますが……」"
translation = "「물론 이해심 있는 분들로부터 칭찬의 말씀을 듣기도 합니다만……」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「緋宮会長のような、みなの上に立つ方から気配りをいただけたこと、嬉しく思います」"
translation = "「히노미야 회장님처럼 남들 위에 서는 분이 배려해 주신 점, 기쁘게 생각합니다.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「そういうところ、お嬢様に少し似ていますね」"
translation = "「그런 점은 아가씨와 조금 닮았네요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「──いえっ。そこまで持ち上げるべきではありませんね。ともかくお疲れさまでした」"
translation = "「──아니요. 그렇게까지 치켜세울 건 아니죠. 아무튼 수고하셨습니다.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「それと……その……」"
translation = "「그리고…… 그……」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「こ、この前は、色々と失礼いたしました。今一度、謝罪をさせてください」"
translation = "「지, 지난번에는 여러모로 실례했습니다. 다시 한번 사과드리고 싶습니다.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「先日は申し訳ありませんでした」"
translation = "「요전에는 죄송했습니다.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「い、言っておきますが、完全に信用したわけではありませんからね？」"
translation = "「마, 말해두겠는데 완전히 신용한 건 아니니까요?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「緋宮会長はお嬢様と距離の近い男性ですのでっ。警戒レベルを緩めるというだけです……誤解なきようお願いいたしますっ」"
translation = "「히노미야 회장님은 아가씨와 거리가 가까운 남성이니까요. 경계 레벨을 늦추겠다는 것뿐입니다…… 오해 없으시길 바랍니다.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「では、失礼いたします。お家に帰るまでがお掃除ですよ、気を付けてお帰りください」"
translation = "「그럼 실례하겠습니다. 집에 갈 때까지가 청소예요, 조심히 돌아가십시오.」"

[[dialogue]]
speaker = "unk"
original = "その前に親睦も兼ねてご飯でもどう？"
translation = "그전에 친목도 다질 겸 밥이라도 어때?"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「え……食事……２人で、ですかっ？」"
translation = "「에…… 식사…… 둘이서 말입니까?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "（んむむ……男性が女性を誘う……下心があるに違いありません……）"
translation = "(음음음…… 남성이 여성을 유혹하다니…… 꿍꿍이가 있는 게 분명합니다……)"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "（しかしお仕事を手伝ってもらったのに無下にすると言うのは、あまりに無礼すぎる気がいたします……）"
translation = "(하지만 업무를 도와주셨는데 무시하는 건 너무 무례한 짓인 것 같기도 하고……)"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「し……仕方ないですね。今回は誘いに乗ってあげます」"
translation = "「어…… 어쩔 수 없군요. 이번에는 초대에 응해드리겠습니다.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ですがあくまで、今回だけ、ですよ？\u3000いいですか。味をしめて何度も誘ったりしないようにしてくださいね」"
translation = "「하지만 어디까지나 이번뿐, 이에요? 아시겠습니까. 재미 들여서 몇 번이나 부르거나 하지 마세요.」"

[[dialogue]]
speaker = "unk"
original = "その後、流星市国のカフェで軽く食事を取った。"
translation = "그 후 유성시국의 카페에서 가볍게 식사를 했다."

[[dialogue]]
speaker = "unk"
original = "ナミエルはあまり誰かと外食はしないらしく緊張していたが、食事そのものは楽しんでもらえたように思う。"
translation = "나미엘은 누군가와 외식하는 일이 별로 없는지 긴장하고 있었지만, 식사 자체는 즐거워했던 것 같다."

[[dialogue]]
speaker = "unk"
original = "これからも機会があれば誘ってみよう──そう思うのだった。"
translation = "앞으로도 기회가 되면 초대해 보자── 그렇게 생각했다."

