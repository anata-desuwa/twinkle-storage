[[dialogue]]
speaker = "unk"
original = "モンスターの討伐が終わり、家に戻って花嫁修業を再開する。"
translation = "몬스터 토벌이 끝나고, 집으로 돌아와 신부 수업을 재개한다."

[[dialogue]]
speaker = "イレーナ"
original = "「さてと、それじゃ始めるとしましょうか」"
translation = "「자 그럼, 슬슬 시작해 볼까.」"

[[dialogue]]
speaker = "unk"
original = "俺の部屋で何を……？"
translation = "내 방에서 뭘……?"

[[dialogue]]
speaker = "イレーナ"
original = "「決まってるわ。掃除よ、お掃除」"
translation = "「정해져 있잖아. 청소야, 청소.」"

[[dialogue]]
speaker = "イレーナ"
original = "「あんたの部屋を隅から隅まで徹底的に綺麗にしてあげるわね」"
translation = "「네 방을 구석구석 철저하게 깨끗하게 만들어 줄게.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「おや？\u3000我が助手よ、何やら少し緊張しているように見えるが？」"
translation = "「오야? 나의 조수여, 왠지 조금 긴장하고 있는 것처럼 보이는데?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「もしかして、掃除の最中にあまり見られたくない物がポロリと出てきてしまうのを警戒しているのかな？」"
translation = "「혹시 청소하는 중에 별로 보여주고 싶지 않은 물건이 툭 튀어나오는 걸 경계하고 있는 건가?」"

[[dialogue]]
speaker = "unk"
original = "そ、そんな物は持ってないよ……？"
translation = "그, 그런 건 안 가지고 있어……?"

[[dialogue]]
speaker = "ジュエリー"
original = "「どうしたんだい愛しの我が助手よ？\u3000まるで追い詰められた犯人のような目をして」"
translation = "「왜 그러나 사랑스러운 나의 조수여? 마치 궁지에 몰린 범인 같은 눈을 하고서.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「それではこの部屋にお宝が眠っていると自白しているようなものだ。ふふ、そんなにこの名探偵に秘密を暴いて欲しいのかい？」"
translation = "「그건 이 방에 보물이 잠들어 있다고 자백하고 있는 것이나 마찬가지라네. 후후, 그렇게나 이 명탐정에게 비밀을 폭로당하고 싶은 건가?」"

[[dialogue]]
speaker = "イレーナ"
original = "「手伝ってもらえるかしら、ジュエリー？」"
translation = "「도와줄 수 있을까, 주얼리?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「もちろんだとも」"
translation = "「물론이고말고.」"

[[dialogue]]
speaker = "unk"
original = "ちょっと、２人ともーっ！！！"
translation = "잠깐, 두 사람 다──!!!"

[[dialogue]]
speaker = "イレーナ"
original = "「どれどれ……」"
translation = "「어디 보자……」"

[[dialogue]]
speaker = "イレーナ"
original = "「あれ、何も面白いものが見つからないわね。どうなってるのよ」"
translation = "「어라, 아무런 재미있는 것도 발견되지 않네. 어떻게 된 거야.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「助手の隠し方が巧妙なのか、あるいはそういった物は隠されていないのか……」"
translation = "「조수의 숨기기 실력이 교묘한 건지, 아니면 그런 물건은 숨겨져 있지 않은 건지……」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ふふ、怪盗でなくともお宝の在処が気になってしまうね」"
translation = "「후후, 괴도가 아니더라도 보물이 있는 곳은 신경 쓰이기 마련이지.」"

[[dialogue]]
speaker = "イレーナ"
original = "「まぁいいわ。どうせＤＩＳＣにでも入れてるんでしょ」"
translation = "「뭐 됐어. 어차피 DISC 같은 데 넣어뒀겠지.」"

[[dialogue]]
speaker = "unk"
original = "（ギクッ）"
translation = "（찔끔）"

[[dialogue]]
speaker = "イレーナ"
original = "「それとはいこれ。ゴミ袋」"
translation = "「그것보다 자, 여기. 쓰레기 봉투.」"

[[dialogue]]
speaker = "イレーナ"
original = "「何キョトンとしてんのよ。妻が掃除したんなら、ゴミ出しは夫の仕事でしょ？\u3000ゴミまとめといたから、これはあんたが出しときなさい」"
translation = "「왜 멍하니 있는 거야. 아내가 청소를 했으면 쓰레기를 내놓는 건 남편의 일이잖아? 쓰레기 모아뒀으니까 이건 네가 내다 놔.」"

[[dialogue]]
speaker = "unk"
original = "わかりました！"
translation = "알겠습니다!"

[[dialogue]]
speaker = "ジュエリー"
original = "「ふふふ」"
translation = "「후후후.」"

[[dialogue]]
speaker = "イレーナ"
original = "「ん、どうしたの？」"
translation = "「응, 왜 그래?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「料理修行の時の畏まった様子が無くなって良い感じだ」"
translation = "「요리 수행을 할 때의 딱딱한 모습이 없어져서 좋은 느낌이야.」"

[[dialogue]]
speaker = "イレーナ"
original = "「そ、そう？」"
translation = "「그, 그래?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「いい具合に肩の力が抜けているように見える。助手とも自然に言葉を交わしていて……実に仲睦まじい夫婦のようだよ」"
translation = "「기분 좋게 어깨에 힘이 빠져 있는 것처럼 보이네. 조수와도 자연스럽게 말을 주고받고…… 실로 화목한 부부 같군그래.」"

[[dialogue]]
speaker = "イレーナ"
original = "「っっ……！！\u3000へ、変なこと言わないでよ……！！」"
translation = "「윽……!! 이, 이상한 소리 하지 마……!!」"

[[dialogue]]
speaker = "ジュエリー"
original = "「頬を赤く染めて可愛いじゃないか」"
translation = "「뺨을 붉게 물들이니 귀엽지 않은가.」"

[[dialogue]]
speaker = "イレーナ"
original = "「だ、だってちゃんと花嫁らしくしないとウェディングフォームを解除出来ないんでしょ！」"
translation = "「그, 그야 제대로 신부답게 굴지 않으면 웨딩 폼을 해제할 수 없잖아!」"

[[dialogue]]
speaker = "イレーナ"
original = "「だから、仕方なく……って、あんたも何ニヤニヤしてるのよ！」"
translation = "「그러니까 어쩔 수 없이…… 근데 너도 뭘 싱글벙글거리는 거야!」"

[[dialogue]]
speaker = "unk"
original = "あ、フィオナから連絡だ"
translation = "아, 피오나에게 연락이다."

[[dialogue]]
speaker = "フィオナ"
original = "『トワ先生から聞きました。ジュエリーさんにウェディングフォームが発現してしまったのですよね？』"
translation = "『토와 선생님께 들었습니다. 주얼리 씨에게 웨딩 폼이 발현되어 버렸다면서요?』"

[[dialogue]]
speaker = "フィオナ"
original = "『何か私に協力できることがあればと思って連絡したのですが……』"
translation = "『제가 뭔가 협력할 수 있는 일이 있을까 해서 연락드렸습니다만……』"

[[dialogue]]
speaker = "イレーナ"
original = "（協力できること、ね……そう言えばフィオナ会長はウェディングフォームが初めて発現した星騎士だったわ）"
translation = "（협력할 수 있는 일이라니…… 그러고 보니 피오나 회장님은 웨딩 폼이 처음으로 발현된 성기사였어）"

[[dialogue]]
speaker = "イレーナ"
original = "（会長を相手にして花嫁修業をしたという話も聞いてるし、話を聞くだけ聞いてみても──）"
translation = "（회장님을 상대로 신부 수업을 했다는 얘기도 들었고, 일단 이야기를 들어보기만이라도──）"

[[dialogue]]
speaker = "イレーナ"
original = "「あっ！」"
translation = "「앗!」"

[[dialogue]]
speaker = "unk"
original = "わわっ！？"
translation = "와왓!?"

[[dialogue]]
speaker = "フィオナ"
original = "『あの、今の叫び声は……何かありましたか？』"
translation = "『저기, 방금 그 비명은…… 무슨 일이라도 있나요?』"

[[dialogue]]
speaker = "イレーナ"
original = "「フィオナ会長、イレーナです。実は助けていただきたいことがありまして」"
translation = "「피오나 회장님, 이레이나예요. 사실은 도움을 받고 싶은 일이 있어서요.」"

[[dialogue]]
speaker = "フィオナ"
original = "『イレーナさん？\u3000もしかしてイレーナさんもウェディングフォームが発現したんですか？』"
translation = "『이레이나 씨? 혹시 이레이나 씨도 웨딩 폼이 발현된 건가요?』"

[[dialogue]]
speaker = "イレーナ"
original = "「はい、実はそうなんです」"
translation = "「네, 사실 그렇답니다.」"

[[dialogue]]
speaker = "イレーナ"
original = "「ウェディングフォームを解除するためには、花婿役を用意して結婚式を挙げる必要があります」"
translation = "「웨딩 폼을 해제하기 위해서는 신랑 역할을 준비해서 결혼식을 올릴 필요가 있어요.」"

[[dialogue]]
speaker = "イレーナ"
original = "「ですが今回、私が花嫁になってしまったために、結婚式の神官役を務めることが出来なくなってしまったのです」"
translation = "「하지만 이번에는 제가 신부가 되어버리는 바람에, 결혼식의 신관 역할을 맡을 수 없게 되었거든요.」"

[[dialogue]]
speaker = "イレーナ"
original = "「なので、フィオナ会長に神官役をお願いできないか、と思いまして……」"
translation = "「그래서 피오나 회장님께 신관 역할을 부탁드릴 수 없을까 해서요……」"

[[dialogue]]
speaker = "フィオナ"
original = "『神官役……ええ、大丈夫だと思います。私は流星教皇の娘ですし、挙式の手順も知っています』"
translation = "『신관 역할…… 네, 괜찮을 것 같아요. 저는 유성 교황의 딸이기도 하고, 예식 절차도 알고 있으니까요.』"

[[dialogue]]
speaker = "フィオナ"
original = "『わかりました。そのお役目、お引き受けさせて頂きますね』"
translation = "『알겠습니다. 그 역할, 제가 맡도록 할게요.』"

[[dialogue]]
speaker = "イレーナ"
original = "「よかった……心より感謝いたします……」"
translation = "「다행이다…… 진심으로 감사드려요……」"

[[dialogue]]
speaker = "unk"
original = "こうして一番の問題だった神官役についても解決した。"
translation = "이렇게 가장 문제였던 신관 역할에 대해서도 해결되었다."

[[dialogue]]
speaker = "unk"
original = "そしていよいよ、ウェディングフォーム解除に向けて、挙式の準備に取りかかるのだった。"
translation = "그리고 드디어 웨딩 폼 해제를 위해 예식 준비에 착수했다."

