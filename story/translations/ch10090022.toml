[[dialogue]]
speaker = "unk"
original = "第２話,バニーセーラのナイト様,P"
translation = "제2화, 바니 세라의 나이트님, P"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「なるほど。そういうことであれば──……」"
translation = "「과연. 그런 것이라면──……」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ふむふむ……。そうなると──……」"
translation = "「흠흠……. 그렇게 되면──……」"

[[dialogue]]
speaker = "unk"
original = "何を話してるんですか？"
translation = "무슨 이야기를 하고 있나요?"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「あ、会長さん。ちょっとヘレナさんに相談をね～」"
translation = "「아, 회장님. 잠깐 헬레나 씨에게 상담을 좀~」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「将来会社を興したいという彼女にアドバイスをしていたのだ」"
translation = "「장래에 회사를 차리고 싶다는 그녀에게 조언을 해주고 있었다」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「実際に話を聞いてみると、自分の見立ての甘さを痛感するね。ヘレナさんはやっぱりすごいよ」"
translation = "「실제로 이야기를 들어보니, 제 전망이 안일했다는 걸 통감하게 되네요. 헬레나 씨는 역시 대단해요」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「私はただ行動を起こしただけに過ぎぬ。何事も始めないことには始まらないからな」"
translation = "「나는 그저 행동을 일으켰을 뿐이다. 무엇이든 시작하지 않으면 시작되지 않으니까 말이다」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「その点、貴殿も優秀だ。こうして私と話し、繋がりを利用しようとしている」"
translation = "「그 점에선 귀공도 우수하다. 이렇게 나와 대화하며, 인맥을 이용하려 하고 있지」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「利用だなんてそんな。ちょっとしか考えてませんよ～」"
translation = "「이용이라니 당치도 않아요. 아주 조금밖에 생각 안 했다구요~」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「その強かさも気に入った。その気があるならもう一度カジノで働いてみるか？\u3000客たちに話を聞いてみるといい」"
translation = "「그 강단 있는 점도 마음에 들었다. 그럴 마음이 있다면 다시 한번 카지노에서 일해보겠나? 손님들에게 이야기를 들어보는 것도 좋겠지」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「我がカジノには様々な企業の重鎮も出入りする。人脈を作るには申し分ない環境だ。もちろんアルバイト代も出そう」"
translation = "「우리 카지노에는 다양한 기업의 중진들도 드나든다. 인맥을 쌓기에는 더할 나위 없는 환경이지. 물론 아르바이트비도 주마」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「え、いいんですかっ？」"
translation = "「에, 정말인가요?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「こちらとしても貴殿に給仕を行ってもらえると客入りが良くなるのでな。貴殿もそれを見越して話をしに来たのだろう？」"
translation = "「이쪽으로서도 귀공이 서빙을 해주면 손님이 늘어날 테니까 말이다. 귀공도 그것을 내다보고 이야기를 하러 온 것이 아닌가?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「あはは、バレちゃってましたか～。前にバイトさせてもらった時、けっこー手応えあったもんで」"
translation = "「아하하, 들켜버렸나요~. 전에 알바했을 때, 꽤 반응이 좋았거든요」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ふ、己を客観的に評価できている点も素晴らしい。我がカジノで良ければいくらでも活用するといい。若き才能に投資して得をするのは私も同じだからな」"
translation = "「후, 자신을 객관적으로 평가하고 있는 점도 훌륭하다. 우리 카지노가 좋다면 얼마든지 활용하도록 해라. 젊은 재능에 투자해서 이득을 보는 건 나도 마찬가지니까」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「てなわけで畏れ多くもカムバックしてきましたよ～。看板バニーセーラちゃんが♪」"
translation = "「그런 고로 황송하게도 컴백했습니다~. 간판 바니 세라짱이♪」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「でもでも会長さんまでついてこなくて良かったのに～。あ、ひょっとして、うちがイケメン経営者に口説かれないか心配してくれちゃったり？」"
translation = "「그치만 그치만 회장님까지 따라오지 않아도 됐는데~. 아, 혹시 내가 잘생긴 경영자한테 유혹당하지 않을까 걱정해 주는 거야?」"

[[dialogue]]
speaker = "unk"
original = "緊張してるみたいでしたから"
translation = "긴장하고 계신 것 같아서요"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「うっ……見抜かれちゃってた？\u3000あはは、やっぱし彼氏に隠し事ってできないもんなんだね～」"
translation = "「윽…… 간파당했어? 아하하, 역시 남자친구에게 숨길 수는 없는 거네~」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「恥ずかしながら体が震えちゃってるや。前に来た時はモンスターの調査に集中してて気付かなかったけど、このカジノかなり格式高いよね～……？」"
translation = "「부끄럽지만 몸이 떨리고 있어. 전에 왔을 때는 몬스터 조사에 집중하느라 몰랐는데, 이 카지노 꽤 격식 높지~……?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「パっと見渡しただけでも明らかにお金持ちな人ばっかだし。成功者の風格を漂わせてる大人ばっかってゆーか……」"
translation = "「슬쩍 둘러보기만 해도 분명히 부자들뿐이고. 성공한 사람의 풍채를 풍기는 어른들뿐이랄까……」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「つい気後れしちゃいそうになるよ。ううん、１人だったら間違いなく日和っちゃってたかも……」"
translation = "「나도 모르게 기가 죽을 것 같아. 아니, 혼자였다면 틀림없이 위축됐을지도……」"

[[dialogue]]
speaker = "unk"
original = "俺がついてますよ"
translation = "제가 곁에 있잖아요"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ふふ、ありがと。頼もしいよ。持つべき者はカッコいい彼氏だね♪」"
translation = "「후후, 고마워. 든든해. 역시 멋진 남자친구를 둬야 한다니까♪」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「よーし、んじゃ早速話しかけに行っちゃいますか。せっかくヘレナさんがくれたチャンスだし」"
translation = "「좋아, 그럼 당장 말을 걸러 가볼까. 어렵게 헬레나 씨가 준 기회니까」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ガンガン喋って、ガンガン連絡先交換して、輝かしい未来のための糧にしちゃおっと♪」"
translation = "「팍팍 이야기하고, 팍팍 연락처 교환해서, 빛나는 미래를 위한 거름으로 삼아야지♪」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「なるほどなるほど。勉強になります」"
translation = "「과연 과연. 공부가 되네요」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「え、いいんですか？\u3000是非見学させてもらいたいです！\u3000でしたらこの辺りの日でご都合の良い日があれば……」"
translation = "「에, 괜찮나요? 꼭 견학하고 싶어요! 그렇다면 이쯤에서 편하신 날이 있다면……」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ありがとうございます！\u3000お礼に、ふふ、こっそりドリンク一杯サービスしちゃいますね♪」"
translation = "「감사합니다! 답례로, 후후, 몰래 드링크 한 잔 서비스해 드릴게요♪」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ふ～。想像以上の大収穫だね～。もう１ヶ月先まで会社の見学やらお食事会やらでスケジュール埋まっちゃったよ♪」"
translation = "「후~. 상상 이상의 대수확이네~. 벌써 한 달 뒤까지 회사 견학이랑 식사 모임으로 스케줄이 꽉 찼어♪」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「けっこう気さくな人が多いんかね？\u3000成功してる人ってもっと気難しいイメージがあったけど、カジノの空気のおかげかな？」"
translation = "「꽤 싹싹한 사람이 많네? 성공한 사람은 더 까다로운 이미지였는데, 카지노 분위기 덕분일까?」"

[[dialogue]]
speaker = "unk"
original = "セーラさんの人柄のおかげですよ"
translation = "세라 씨의 인품 덕분이에요"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「やん、もーこの褒め上手～<emoji=heart04>\u3000嬉しくなっちゃうじゃーん」"
translation = "「양, 정말 칭찬도 잘한다니까~<emoji=heart04> 기분 좋아지잖아」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「でもうちは会長さんのおかげだと思ってるよ？\u3000イケメン彼氏が傍にいてくれるからうちも安心して普段通り喋れるんだよ♪」"
translation = "「하지만 난 회장님 덕분이라고 생각해. 잘생긴 남자친구가 곁에 있어주니까 나도 안심하고 평소처럼 말할 수 있는 거야♪」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「……良かったら会社の見学やらお食事会やらも、ついてきてくれないかな？\u3000時間が合う時だけでも構わないから」"
translation = "「……괜찮다면 회사 견학이나 식사 모임도 같이 가주지 않을래? 시간이 맞을 때만이라도 상관없으니까」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ふふ、やった♪\u3000向こう１ヶ月デートできないのも嫌だったしね。遠方から来てる社長さんもたくさんいたから旅行気分で行っちゃおう♪」"
translation = "「후후, 됐다♪ 향후 한 달 동안 데이트 못 하는 것도 싫었거든. 먼 곳에서 온 사장님들도 많았으니까 여행 기분으로 가버리자♪」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ん？\u3000あっ、はーい！\u3000ごめんね、ドリンク頼まれちゃった。ちょっと行ってくる」"
translation = "「응? 앗, 네~! 미안해, 드링크 주문 들어왔다. 잠깐 다녀올게」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「お待たせしました～！\u3000……え？\u3000はい、そうですけど……。あはは、まだまだ起業家なんて名乗れるものじゃないですよ～」"
translation = "「오래 기다리셨습니다~! ……에? 네, 그렇긴 합니다만……. 아하하, 아직 기업가라고 자처할 정도는 아니에요~」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「あーやっぱり資金繰りが一番難しいですよね。うちもこうしてバイトして、起業用の資金を貯めてるつもりではいるんですけど～……」"
translation = "「아~ 역시 자금 조달이 제일 어렵죠. 저도 이렇게 알바하면서 창업 자금을 모으려는 참이긴 합니다만~……」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「……へ？\u3000パトロンにですか？\u3000お兄さんが？」"
translation = "「……헤? 후원자요? 오빠가요?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「あはは、嬉しいです。ありがとうございます。でも、うーん。できれば自分の力で頑張りたいって気持ちもあって」"
translation = "「아하하, 기뻐요. 감사합니다. 하지만, 으음. 가급적 제 힘으로 노력하고 싶다는 마음도 있어서요」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ですよね～。１人では中々難しいですよね～。だけど、だからこそ１人で乗り越えたいって言いますか～」"
translation = "「그렇죠~. 혼자서는 꽤 어렵죠~. 하지만 그렇기에 더더욱 혼자서 이겨내고 싶달까요~」"

[[dialogue]]
speaker = "unk"
original = "失礼ですが、お客様"
translation = "실례지만, 손님"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「あちゃー。すみません、彼氏がヤキモチ妬いちゃったみたいで。え？\u3000あ、はい。それではまた～」"
translation = "「아차차. 죄송해요, 남자친구가 질투를 하는 모양이라서. 에? 아, 네. 그럼 다음에 또 봐요~」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「……ふふ、イケメンムーブしてくれちゃうじゃ～ん。ああいうイケイケな人もいるんだね～。まさかホントに口説かれちゃうとは思わなかったよ」"
translation = "「……후후, 멋진 모습을 보여주잖아. 저런 적극적인 사람도 있구나~. 설마 정말로 유혹당할 줄은 몰랐어」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「でも嬉しかったよ～？\u3000割って入ってきてくれた時、ズッキュンときめいちゃった♪」"
translation = "「그래도 기뻤어~? 끼어들어 줬을 때, 가슴이 큥 하고 설렜다구♪」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ねね。耳貸して？\u3000いいからいいから♪」"
translation = "「저기 저기. 귀 좀 빌려줄래? 됐으니까 됐으니까♪」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ん……ちゅっ<emoji=heart04>\u3000ふふ、ありがと<emoji=heart04>\u3000格好良かったよ<emoji=heart04>」"
translation = "「응…… 츄<emoji=heart04> 후후, 고마워<emoji=heart04> 멋있었어<emoji=heart04>」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「これからもよろしくね？\u3000うちのナイトさん<emoji=heart04>」"
translation = "「앞으로도 잘 부탁해? 나의 나이트님<emoji=heart04>」"

