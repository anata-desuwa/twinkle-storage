[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「うふふっ、今日のデートもとっても素敵だったわ～、会長くん<emoji=heart04>」"
translation = "「우후후, 오늘 데이트도 정말 멋졌어~, 회장 군<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「水族館も楽しかったし、おしゃれなレストランも予約してくれてて～……」"
translation = "「수족관도 즐거웠고, 멋진 레스토랑도 예약해 줘서~……」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「私がちょっと席を外してる間にお会計も終わってて、びっくりしちゃった♪」"
translation = "「내가 잠시 자리를 비운 사이에 계산도 끝나 있어서 깜짝 놀랐어♪」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「とってもスマートでカッコよかったわ♪\u3000エスコートしてくれてありがとう～<emoji=heart04>」"
translation = "「정말 스마트하고 멋졌어♪ 에스코트해 줘서 고마워~<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「……うん。ここまで尽くしてもらったからには、今度はお姉ちゃんの番よね～？」"
translation = "「……응. 이만큼 대접받았으니, 이번에는 누나 차례겠지~?」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「というわけで──うふふ♪\u3000ちょっとだけ『休憩』……していきましょう？」"
translation = "「그런 고로── 우후후♪ 잠깐만 『휴식』…… 하고 갈까?」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「あっ<emoji=heart04>\u3000びくっ、て震えてくれた～♪\u3000ふふ、期待してくれたのかしら<emoji=heart04>」"
translation = "「앗<emoji=heart04> 움찔, 하고 떨어줬어~♪ 후후, 기대해 준 걸까<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「任せて。大好きな会長くんのこと、今夜もい～っぱい、気持ちよくしてあげちゃうから<emoji=heart04>」"
translation = "「맡겨줘. 사랑하는 회장 군, 오늘 밤도 아~주 많이, 기분 좋게 해줄 테니까<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そして俺たちはラブホテルへ向かったのだが──シャワーを浴びたサーシャさんは、突然こんなことを言い出した。"
translation = "그리고 우리들은 러브호텔로 향했는데── 샤워를 마친 사샤 씨는 갑자기 이런 말을 꺼냈다."

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「さてさて。それじゃあ会長くんのために～……お色直ししちゃうわね♪」"
translation = "「자 자. 그럼 회장 군을 위해서~…… 옷을 갈아입어 볼까♪」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「チェンジ──ノヴァフォ～ムっ<emoji=heart04>」"
translation = "「체인지── 노바 폼~<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「じゃーん♪\u3000どうかしら～、会長くん。ノヴァフォーム姿のお姉ちゃんよ～<emoji=heart04>」"
translation = "「짜잔♪ 어때~, 회장 군. 노바 폼 모습의 누나야~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "普段は凛々しくカッコよく、俺たちのピンチを救ってくれるサーシャさんのノヴァフォーム──それをまさか、ラブホテルで見ることができるだなんて。"
translation = "평소에는 늠름하고 멋지게 우리들의 위기를 구해주는 사샤 씨의 노바 폼── 그것을 설마 러브호텔에서 보게 될 줄이야."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「こんなに可愛いドレスなのに、戦うだけじゃもったいないしね。うふふ～<emoji=heart04>」"
translation = "「이렇게 귀여운 드레스인데, 싸우기만 하는 건 아깝기도 하고 말이야. 우후후~<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「恋人とのエッチ、マンネリなのもダメって聞いたことがあるの。今日はコスプレエッチ、しちゃいましょ～？」"
translation = "「연인과의 섹스, 매너리즘에 빠지는 것도 안 좋다고 들었어. 오늘은 코스프레 섹스, 해버리자~?」"

[[dialogue]]
speaker = "unk"
original = "瀟洒なドレス衣装は大きくはだけられ、サーシャさんのたわわなおっぱいとおま○こが丸見えだ。"
translation = "소사한 드레스 의상은 크게 풀어헤쳐져, 사샤 씨의 풍만한 가슴과 보지가 훤히 보였다."

[[dialogue]]
speaker = "unk"
original = "こんなエッチな姿を見せつけられたら……"
translation = "이런 야한 모습을 보여준다면……"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あらあら～<emoji=heart04>\u3000おち○ちん、もうすっごく大きくなっちゃってる……興奮してくれてるの？」"
translation = "「어머 어머~<emoji=heart04> 자지, 벌써 엄청 커져 버렸어…… 흥분해 준 거야?」"

[[dialogue]]
speaker = "unk"
original = "──当たり前だった。ものすごく綺麗で、ものすごくエッチで……サーシャさんとセックスをする時、俺はいつも興奮で胸が張り裂けそうになる。"
translation = "──당연했다. 엄청나게 아름답고, 엄청나게 야해서…… 사샤 씨와 섹스를 할 때, 나는 언제나 흥분으로 가슴이 터질 것만 같아진다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「嬉しい……<emoji=heart04>\u3000お姉ちゃんのエッチな格好を見て、おち○ちんガッチガチにしてくれて、と～っても嬉しいわ<emoji=heart04>」"
translation = "「기뻐……<emoji=heart04> 누나의 야한 차림을 보고, 자지를 꼿꼿하게 세워줘서, 너~무 기뻐<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ちょっぴり恥ずかしいけど、足もず～っと開いててあげる～<emoji=heart04>\u3000お姉ちゃんのエッチなところ、いっぱい見ていいからね<emoji=heart04>」"
translation = "「조금 부끄럽지만, 다리도 계~속 벌려줄게~<emoji=heart04> 누나의 야한 곳, 잔뜩 봐도 되니까 말이야<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「つながる前にー……んんっ<emoji=heart04>\u3000おち○ちん、お姉ちゃんのおま○こでヨシヨシしてあげようかしら～♪」"
translation = "「이어지기 전에~…… 으응<emoji=heart04> 자지, 누나 보지로 요시요시 해줄까~♪」"

[[dialogue]]
speaker = "unk"
original = "後ろに手をついたまま、がにまたポーズでお尻を上下させてくれるサーシャさん。"
translation = "뒤로 손을 짚은 채, 가랑이를 벌린 포즈로 엉덩이를 위아래로 움직여 주는 사샤 씨."

[[dialogue]]
speaker = "unk"
original = "柔らかいおま○こで、張りつめたペニスを優しくシゴかれて──"
translation = "부드러운 보지로, 팽팽해진 페니스를 상냥하게 비벼주며──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──っ！」"
translation = "「──윽!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「はぁんっ……温かくて、硬ぁい……<emoji=heart04>\u3000おち○ちん、いっぱい磨いてあげたい……感じてる可愛いお顔、お姉ちゃんにもっと見せて？」"
translation = "「하앙…… 따뜻하고, 딱딱해……<emoji=heart04> 자지, 잔뜩 닦아주고 싶어…… 느끼고 있는 귀여운 얼굴, 누나에게 좀 더 보여줘?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「今日はお姉ちゃんがず～っとリードしてあげるから。会長くんは、おち○ちんから気持ちよ～くお射精することだけ、考えててね～<emoji=heart04>」"
translation = "「오늘은 누나가 계~속 리드해 줄 테니까. 회장 군은 자지에서 기분 좋~게 사정하는 것만 생각하고 있어~<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「んっ……んっ……んぅ～っ……はぁあっ<emoji=heart04>\u3000おち○ちんの先っぽから、おつゆ出てきちゃった♪」"
translation = "「응…… 응…… 으응~…… 하아앗<emoji=heart04> 자지 끝에서 쿠퍼액이 나와버렸어♪」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「お姉ちゃんの、おま○こでスリスリされるの、気持ちいいかしら～？」"
translation = "「누나 보지로 부비부비 당하는 거, 기분 좋아~?」"

[[dialogue]]
speaker = "unk"
original = "──気持ちよすぎる。だけど、物足りない。こんな絶景を前にしたら、もっともっと強い刺激が欲しくなる。"
translation = "──너무 기분 좋다. 하지만, 부족하다. 이런 절경을 앞에 두니, 좀 더 강한 자극이 갖고 싶어진다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふ……早く繋がりたいよ～っていう、おねだりのお目目ね<emoji=heart04>」"
translation = "「후후…… 빨리 이어지고 싶어~ 라는, 조르는 눈빛이네<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「うん、それじゃあ、入れちゃうわね？\u3000会長くんのおち○ちん、お姉ちゃんの中に……<emoji=heart04>」"
translation = "「응, 그럼 넣을게? 회장 군의 자지, 누나 안에……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "とろりと濡れたおま○この入り口に、ペニスがあてがわれて──"
translation = "애액으로 젖은 보지 입구에 페니스가 맞닿고──"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「んんんぅっ──ぁ、あぁああ～っ……<emoji=heart04>」"
translation = "「으으으윽── 아, 아아아아~……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「おち○ちん、食べちゃったぁ～……んぅ<emoji=heart04>\u3000お姉ちゃんの中で、びくびくって震えてる……んぁ、あぁっ……<emoji=heart04>」"
translation = "「자지, 먹어버렸다~…… 으응<emoji=heart04> 누나 안에서 움찔움찔 떨고 있어…… 응아, 아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "きゅっ、きゅっ、と強く締め付けられて、それだけでたまらない刺激がペニスに響く。だけど……"
translation = "꽉, 꽉, 하고 강하게 조여와서, 그것만으로도 참을 수 없는 자극이 페니스에 울려 퍼진다. 하지만……"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「今からそんなに感じてて、大丈夫かしら～？\u3000ほ～ら、動いちゃう、わよ～っ……んんっ<emoji=heart04>」"
translation = "「벌써부터 그렇게 느끼고 있어서 괜찮을까~? 자아, 움직인다~…… 으응<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「んぅっ、はぁっ<emoji=heart04>\u3000はぁっ……ぁ、ぁんっ<emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000はぁあっ……あ、ぁっ……ん、んぅっ……んんぅ～っ<emoji=heart04>」"
translation = "「으윽, 하앗<emoji=heart04> 하앗…… 아, 아앙<emoji=heart04> 으으응<emoji=heart04> 하아앗…… 아, 앗…… 응, 으응…… 으으응~<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「どうかし、ら～っ？\u3000んんっ、ふぅっ……はぁん<emoji=heart04>\u3000お姉ちゃんの、恋人おま○こっ……気持ちい～い？」"
translation = "「어때~? 으응, 후우…… 하앙<emoji=heart04> 누나의 연인 보지…… 기분 좋아?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「はぁ、あっ……んんぅ、んぅんっ<emoji=heart04>\u3000ふふ～、おま○この中で震えて、お返事してくれてる～……嬉しい～っ……<emoji=heart04>」"
translation = "「하아, 앗…… 으으응, 으응<emoji=heart04> 후후~, 보지 안에서 떨면서 대답해 주고 있어~…… 기뻐~……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「いっぱい勃起して～……たっぷり、精液、作ってね<emoji=heart04>\u3000お姉ちゃん、あなたのおち○ちんのために、腰振り頑張っちゃうから～……んんっ<emoji=heart04>」"
translation = "「잔뜩 발기해서~…… 듬뿍, 정액, 만들어줘<emoji=heart04> 누나, 네 자지를 위해서 허리 흔들기 열심히 할 테니까~…… 으응<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ぱんっ、ぱんっ、ぱんっ、ぱんっ──リズミカルに、一定のテンポで、サーシャさんが騎乗位ピストンをしてくれる。"
translation = "팍, 팍, 팍, 팍── 리드미컬하게, 일정한 템포로 사샤 씨가 기승위 피스톤을 해준다."

[[dialogue]]
speaker = "unk"
original = "速すぎず、遅すぎずの絶妙なペースに、ゾクゾクとペニスが昂っていく。"
translation = "너무 빠르지도, 느리지도 않은 절묘한 페이스에 소름 끼칠 정도로 페니스가 고양되어 간다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふっ……んんぅ、はぁ、ぁ、んぅ<emoji=heart04>\u3000会長くん、視線がとっても泳いでる～<emoji=heart04>」"
translation = "「후훗…… 응으, 하아, 아, 응으<emoji=heart04> 회장군, 시선이 엄청 헤엄치고 있어~<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「お姉ちゃんのおっぱいを見たり、んんっ<emoji=heart04>\u3000おま○こを見たりっ……はぁんっ<emoji=heart04>\u3000きょろきょろして、忙しそう～<emoji=heart04>」"
translation = "「누나의 가슴을 보거나, 응으<emoji=heart04> 보지를 보거나…… 하앙<emoji=heart04> 두리번두리번거리느라 바빠 보이네~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "仰る通り、どこに注目すればいいのか迷ってしまう。"
translation = "말씀하신 대로, 어디에 주목해야 할지 망설여진다."

[[dialogue]]
speaker = "unk"
original = "サーシャさんのおっぱい、おま○こ、むっちりとした太もも、お尻、朱に染まった顔──どれも愛しくってエロすぎる。"
translation = "사샤 씨의 가슴, 보지, 육덕진 허벅지, 엉덩이, 붉게 물든 얼굴── 어느 것 하나 사랑스럽고 너무 에로틱하다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふ♪\u3000じゃあ、ぜ～んぶお姉ちゃんが指示してあげる<emoji=heart04>\u3000ほぉら～、まずはおっぱい<emoji=heart04>\u3000じ～って見ちゃいましょ？」"
translation = "「후후♪ 그럼, 저~언부 누나가 지시해 줄게<emoji=heart04> 자아~, 우선은 가슴<emoji=heart04> 빤~히 쳐다봐 버릴까?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あっ、はぁっ……んん、んぅ、ぁっ<emoji=heart04>\u3000おち○ちん、ぱんっ<emoji=heart04>\u3000ぱんっ<emoji=heart04>\u3000するたびに～、揺れてるおっぱいに、ちゅうも～く<emoji=heart04>」"
translation = "「앗, 하앗…… 응, 응으, 앗<emoji=heart04> 자지, 팡팡<emoji=heart04> 팡팡<emoji=heart04> 할 때마다~ 흔들리는 가슴에, 주~목<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「たっぷん<emoji=heart04>\u3000たっぷんっ<emoji=heart04>\u3000た～っぷん<emoji=heart04>\u3000会長くんの大好きなおっぱい、いっぱい揺らしてあげるから、ねっ……んん、はぁ、んぅっ<emoji=heart04>」"
translation = "「출렁<emoji=heart04> 출렁<emoji=heart04> 출~렁<emoji=heart04> 회장군이 제일 좋아하는 가슴, 잔뜩 흔들어 줄 테니까, 응……? 응, 하아, 응으<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "お姉ちゃんがリードしてあげる──その言葉どおりに、サーシャさんはどこまでも俺が受け身で楽しめるように気遣いをしてくれている。"
translation = "누나가 리드해 줄게── 그 말대로, 사샤 씨는 어디까지나 내가 수동적으로 즐길 수 있도록 배려해 주고 있다."

[[dialogue]]
speaker = "unk"
original = "俺は言われるがままに、母性たっぷりのおっぱいがたゆんたゆんと揺れるところを見続けた。"
translation = "나는 시키는 대로, 모성애 넘치는 가슴이 출렁출렁 흔들리는 것을 계속 지켜보았다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「はぁ──んんっ<emoji=heart04>\u3000おち○ちん、ビキビキ～って硬くなっちゃった……もっと見ていいからね<emoji=heart04>\u3000あなただけのおっぱいだから、遠慮しないで？」"
translation = "「하아── 응으<emoji=heart04> 자지, 빠득빠득~ 하고 딱딱해져 버렸네…… 더 봐도 되니까 말이야<emoji=heart04> 당신만의 가슴이니까, 사양하지 마?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そ～れっ<emoji=heart04>\u3000たっぷん<emoji=heart04>\u3000たっぷんっ<emoji=heart04>\u3000ゆさ、ゆさ<emoji=heart04>\u3000たゆ～んっ<emoji=heart04>」"
translation = "「자~아<emoji=heart04> 출렁<emoji=heart04> 출렁<emoji=heart04> 흔들, 흔들<emoji=heart04> 출~렁<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「はぁあ、あ、んんっ……可愛い～……<emoji=heart04>\u3000お姉ちゃんに言われた通りに、じ～っておっぱい見てる～……とっても可愛いわ～<emoji=heart04>」"
translation = "「하아아, 아, 응으…… 귀여워~……<emoji=heart04> 누나가 말한 대로, 빤~히 가슴을 보고 있어~…… 정말 귀엽네~<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「んぅっ……ふふ♪\u3000それじゃあ、今度はー……こ・こ<emoji=heart04>\u3000お姉ちゃんと繋がってるところ、じ～って見て？」"
translation = "「응으…… 후후♪ 그러면, 이번에는─…… 여·기<emoji=heart04> 누나랑 이어져 있는 곳, 빤~히 봐 줄래?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「会長くんのおち○ちん、ぱっくん<emoji=heart04>\u3000って飲み込んじゃってるー、お姉ちゃんのおま○こ～<emoji=heart04>\u3000んんぅ、あ、ぁあっ<emoji=heart04>」"
translation = "「회장군의 자지, 꽉<emoji=heart04> 하고 삼켜버리고 있는, 누나의 보지~<emoji=heart04> 응으, 아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "言われて、サーシャさんの大切なところを見つめる。"
translation = "그 말에, 사샤 씨의 소중한 곳을 응시한다."

[[dialogue]]
speaker = "unk"
original = "恋人以外に絶対に見せてはいけない、俺だけが見ることのできる、サーシャさんのおま○こ──"
translation = "연인 이외에는 절대로 보여줘서는 안 되는, 나만이 볼 수 있는 사샤 씨의 보지──"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「──んんんんっ♪\u3000大好きな会長くんに、おま○こっ<emoji=heart04>\u3000じ～って見られて、ぁ、はぁあっ……<emoji=heart04>」"
translation = "「──응응응응♪ 좋아하는 회장군에게, 보지를<emoji=heart04> 빤~히 보여져서, 아, 하아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふ～っ<emoji=heart04>\u3000お姉ちゃんも、ドキドキしてきちゃった……<emoji=heart04>\u3000はあっ……はぁあっ……はぁあっ<emoji=heart04>」"
translation = "「후후~<emoji=heart04> 누나도, 두근두근거리기 시작했어……<emoji=heart04> 하앗…… 하아앗…… 하아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「お尻、いっぱい振って……んぅ♪\u3000おち○ちん、いっぱいシゴいてあげるわねっ……はぁ<emoji=heart04>\u3000あっ、はぁ、んぁ、ふぅうっ<emoji=heart04>」"
translation = "「엉덩이, 잔뜩 흔들어서…… 응♪ 자지, 잔뜩 훑어 줄게…… 하아<emoji=heart04> 앗, 하아, 응아, 후우우<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「繋がってるところ、よ～く見えるように、めいっぱい、お股、開いて～っ……ぱんっ<emoji=heart04>\u3000ぱんっ<emoji=heart04>\u3000ぱんっ<emoji=heart04>\u3000ぱんっ<emoji=heart04>」"
translation = "「이어져 있는 곳이, 자~알 보이도록, 한껏, 가랑이를, 벌리고~…… 팡<emoji=heart04> 팡<emoji=heart04> 팡<emoji=heart04> 팡<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「んんぅ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000はぁっ、あ、ぁうんんっ……<emoji=heart04>\u3000ああん♪\u3000会長くんの感じてるお顔、大好きっ……もっと見せてっ……<emoji=heart04>」"
translation = "「응으<emoji=heart04> 하앗<emoji=heart04> 하앗, 아, 아응응……<emoji=heart04> 아앙♪ 회장군이 느끼는 얼굴, 정말 좋아…… 더 보여줘……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺が責める体勢もいいけど、こうしてサーシャさんに導かれて、絞られるのもまた格別だ。"
translation = "내가 몰아붙이는 체위도 좋지만, 이렇게 사샤 씨에게 이끌려 쥐어짜이는 것도 각별하다."

[[dialogue]]
speaker = "unk"
original = "愛しい年上の恋人が、すべてをさらけ出して俺の快感のために奉仕してくれている。そのことが、とても嬉しい。"
translation = "사랑스러운 연상의 연인이, 모든 것을 드러내고 나의 쾌감을 위해 봉사해 주고 있다. 그 사실이 매우 기쁘다."

[[dialogue]]
speaker = "unk"
original = "俺、この人が本当に大好きだ──そう思うたびに射精感が高まっていく。もっと強い刺激が欲しいと思ってしまう。"
translation = "나, 이 사람이 정말 좋다── 그렇게 생각할 때마다 사정감이 고조되어 간다. 더 강한 자극을 원하게 된다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あらあら～……うふふふっ<emoji=heart04>\u3000お姉ちゃん、見逃さないわよー？」"
translation = "「어머어머~…… 우후후훗<emoji=heart04> 누나, 놓치지 않을 거야~?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「会長くんのおち○ちん、もっと気持ちよくなりた～い<emoji=heart04>\u3000って、おま○この中で、おねだりしちゃってる……そうでしょ～？」"
translation = "「회장군의 자지, 더 기분 좋아지고 싶어~<emoji=heart04> 라고, 보지 안에서, 조르고 있어…… 그렇지~?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「お姉ちゃんに隠し事はできないんだから♪\u3000うん、それじゃあ、速～いぱんぱん<emoji=heart04>\u3000いくわねっ……んぅっ！」"
translation = "「누나한테 비밀은 없으니까♪ 응, 그러면, 빠~른 팡팡<emoji=heart04> 갈게…… 응으!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「んっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁあっ<emoji=heart04>\u3000あっあっ<emoji=heart04>\u3000んんぅっ……んっんっんっ……んんんううっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 앗<emoji=heart04> 하아앗<emoji=heart04> 앗앗<emoji=heart04> 응으으…… 응응응…… 응응응으으<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「すご～いっ……まだ、硬くなっちゃう、だなんてぇっ<emoji=heart04>\u3000はぁあっ、あっ、あっあっ<emoji=heart04>\u3000んぅ、ふぅう～っ、ぁあっ<emoji=heart04>」"
translation = "「대단해~…… 아직, 딱딱해지다니이<emoji=heart04> 하아앗, 앗, 앗앗<emoji=heart04> 응으, 후우우~, 아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "お尻をたわむほどに弾ませて、サーシャさんが腰を振ってくれる。"
translation = "엉덩이가 휠 정도로 탄력 있게 튕기며, 사샤 씨가 허리를 흔들어 준다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「おち○ちん、硬くてっ……すっごく気持ちいいっ……はぁ、ぅんんっ<emoji=heart04>\u3000あああ、はぁあ、んんっ……んんぅっ……<emoji=heart04>」"
translation = "「자지, 딱딱해서…… 너무 기분 좋아…… 하아, 응으<emoji=heart04> 아아아, 하아아, 응으…… 응으으<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「会長くん、おっぱい、見てぇっ<emoji=heart04>\u3000あっ、はぁ、んんぅ<emoji=heart04>\u3000さっきよりいっぱい、激しく、揺れてるおっぱいっ……あっ、あっあっ<emoji=heart04>」"
translation = "「회장군, 가슴, 봐 줘<emoji=heart04> 앗, 하아, 응으<emoji=heart04> 아까보다 잔뜩, 격렬하게, 흔들리는 가슴…… 앗, 앗앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「お姉ちゃんのおっぱい、目に焼き付けて<emoji=heart04>\u3000はぁ、あっ、それで、おち○ちん、も～っと硬くしてっ<emoji=heart04>\u3000んぅふぅ、んぁ、あぁあああっ<emoji=heart04>」"
translation = "「누나의 가슴을 눈에 새겨줘<emoji=heart04> 하아, 앗, 그래서, 자지, 더~욱 딱딱하게 해 줘<emoji=heart04> 응으후우, 응아, 아아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「はぁあっ……おま○こも見てぇっ……あ、あぁ、はぁ、んんん、ぁああっ<emoji=heart04>\u3000いっぱい興奮して欲しいの、会長くんにっ……あ、あんっ<emoji=heart04>」"
translation = "「하아앗…… 보지도 봐 줘…… 아, 아아, 하아, 응응응, 아아앗<emoji=heart04> 잔뜩 흥분해 줬으면 좋겠어, 회장군이…… 아, 안<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "星騎士として鍛え上げた身体で、サーシャさんは休みなく激しいピストンを続けてくれる。"
translation = "성기사로서 단련된 몸으로, 사샤 씨는 쉼 없이 격렬한 피스톤을 계속해 준다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「会長くんは、どう？\u3000はあ、んんっ<emoji=heart04>\u3000お姉ちゃんのおま○こ、気持ち、いいっ？\u3000んんぅ、はぁ、ん、あんっ<emoji=heart04>」"
translation = "「회장군은, 어때? 하아, 응으<emoji=heart04> 누나의 보지, 기분, 좋아? 응으, 하아, 응, 아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "激しいピストンで余裕のなくなってしまった俺は、夢中でこくこくと頷く。"
translation = "격렬한 피스톤으로 여유가 없어진 나는, 정신없이 끄덕끄덕 고개를 끄덕인다."

[[dialogue]]
speaker = "unk"
original = "サーシャさんの締め付けは本当にすごくて、激しく揺れるおっぱいも、毎秒俺の興奮を煽ってくる──気を抜けばすぐ出てしまいそうだ。"
translation = "사샤 씨의 조임은 정말 대단해서, 격렬하게 흔들리는 가슴도 매초 나의 흥분을 부추긴다── 방심하면 바로 나와 버릴 것 같다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「はぁ、んんぅ、ふぅう<emoji=heart04>\u3000我慢できなくなったら、びゅ～ってして、いいのよ？\u3000好きなタイミングで、お射精して、いいからね<emoji=heart04>」"
translation = "「하아, 응으, 후우우<emoji=heart04> 참을 수 없게 되면, 뷰~ 하고 해도, 괜찮아? 원하는 타이밍에, 사정해도, 되니까 말이야<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「お姉ちゃんは、恋人のあなたが気持ちよくなってくれることが、嬉しいのっ……だから──」"
translation = "「누나는, 연인인 당신이 기분 좋아지는 게, 기뻐…… 그러니까──」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺は、一緒がいい……ですっ！」"
translation = "「저는, 같이 하는 게 좋아요……!」"

[[dialogue]]
speaker = "unk"
original = "奉仕されるのは好きだ、リードされるのも嬉しい。だけど、最後は好きな人と一緒に果てたい。"
translation = "봉사받는 것도 좋고, 리드당하는 것도 기쁘다. 하지만 마지막은 사랑하는 사람과 함께 가고 싶다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あらあらっ……うふふ<emoji=heart04>\u3000可愛いおねだりっ……キュンキュンきちゃった♪」"
translation = "「어머어머…… 우후후<emoji=heart04> 귀여운 어리광…… 심쿵해 버렸어♪」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「それじゃあっ……一緒に、イキましょうっ<emoji=heart04>\u3000お姉ちゃんも、もう少しだからっ……あとちょっとだけ、我慢、してねっ<emoji=heart04>」"
translation = "「그러면…… 같이, 가요<emoji=heart04> 누나도, 이제 조금 남았으니까…… 조금만 더, 참아 줘, 응?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「はぁ、あっ、あっ、んっ、んぁっ<emoji=heart04>\u3000あっあっ、はぁ、あぁ、んんんっ！」"
translation = "「하아, 앗, 앗, 응, 응아<emoji=heart04> 앗앗, 하아, 아아, 응응응!」"

[[dialogue]]
speaker = "unk"
original = "俺が正常位の時に、よく攻めるところ──おへその裏側に、ペニスの先端を押し付けるようにサーシャさんが動き始める。"
translation = "내가 정상위일 때 자주 공략하는 곳── 배꼽 안쪽으로 페니스 끝을 밀어붙이듯 사샤 씨가 움직이기 시작한다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あっ<emoji=heart04>\u3000こ、これっ<emoji=heart04>\u3000ここ、好きぃっ<emoji=heart04>\u3000会長くんのおち○ちんで、ここっ、トントンするの、す、好きぃっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 이, 이거<emoji=heart04> 여기, 좋아<emoji=heart04> 회장군의 자지로, 여기, 통통 치는 거, 조, 좋아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「はぁ、あ、あぁあぁ～っ……<emoji=heart04>\u3000うぅうっ<emoji=heart04>\u3000き、来ちゃう、かもっ<emoji=heart04>\u3000もうすぐ、来ちゃう、来ちゃう、ぅ、ぅうっ……！」"
translation = "「하아, 아, 아아아아~……<emoji=heart04> 으으으<emoji=heart04> 가, 가버릴지도, 몰라<emoji=heart04> 이제 곧, 가버려, 가버려, 으, 으으……!」"

[[dialogue]]
speaker = "unk"
original = "サーシャさんの締まりがどんどん増していく。俺は絶頂の前に、サーシャさんへ思いの丈をぶちまけたくなって──"
translation = "사샤 씨의 조임이 점점 강해진다. 나는 절정 직전에 사샤 씨에게 마음을 쏟아내고 싶어져서──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「好きです、サーシャさん……！！」"
translation = "「좋아해요, 사샤 씨……!!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「──うんっ<emoji=heart04>\u3000私も好きっ<emoji=heart04>\u3000大好きよ、会長くんっ<emoji=heart04>\u3000あ、あ、あ──気持ちいいっ<emoji=heart04>\u3000おま○こ気持ちいいっ……！」"
translation = "「──응<emoji=heart04> 나도 좋아<emoji=heart04> 정말 좋아해, 회장군<emoji=heart04> 아, 아, 아── 기분 좋아<emoji=heart04> 보지 기분 좋아……!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ずっと一緒っ……一緒よ、会長くんっ<emoji=heart04>\u3000あ、あ、あぁ、ぅう、ぁ<emoji=heart04>\u3000んんっ、ふぁあ、あ、ああ、ぁあぁああっ<emoji=heart04>」"
translation = "「계속 함께야…… 함께야, 회장군<emoji=heart04> 아, 아, 아아, 으으, 아<emoji=heart04> 응응, 하아, 아, 아아, 아아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ピストンがどんどん速くなる。ペニスへの締め付けも苛烈になってきて──もう限界だ。"
translation = "피스톤이 점점 빨라진다. 페니스에 가해지는 조임도 가혹해져서── 이제 한계다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「出ますっ……！」"
translation = "「나옵니다……!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「うん、イって<emoji=heart04>\u3000イってイってイってぇ<emoji=heart04>\u3000私もイク、イクイクっ──イックぅぅうう～っ……！！」"
translation = "「응, 가버려<emoji=heart04> 가버려 가버려 가버려어<emoji=heart04> 나도 가, 가버려 가버려── 가버려어어어어~……!!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「はぁあぁああぁあぁあぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하아아아아아아아아아아~~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「会長くんのっ……あ、あ、あぁああっ<emoji=heart04>\u3000出てるっ、私の、お腹にっ……んんぁ、あぁぁああ～っ……<emoji=heart04>」"
translation = "「회장군의…… 아, 아, 아아아앗<emoji=heart04> 나오고 있어, 내, 배 안에…… 응아, 아아아아아~……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ぁんっ<emoji=heart04>\u3000やぁんっ<emoji=heart04>\u3000びゅぅ、びゅうって……まだ出てっ──んんぁああっ<emoji=heart04><emoji=heart04>」"
translation = "「앙<emoji=heart04> 야앙<emoji=heart04> 뷰우, 뷰우 하고…… 아직 나오고 있어── 응아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "子宮へ精液を注ぐたび、サーシャさんは敏感に震えて反応してくれる。"
translation = "자궁에 정액을 쏟을 때마다, 사샤 씨는 민감하게 떨며 반응해 준다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ぁっ、はぁ、あ、あぁあっ<emoji=heart04>\u3000んんっ……ふぅっ<emoji=heart04>\u3000ん～っ<emoji=heart04>\u3000あっ……あぁっ…………あぁぁーっ…………<emoji=heart04>」"
translation = "「아, 하아, 아, 아아앗<emoji=heart04> 응응…… 후우<emoji=heart04> 응~<emoji=heart04> 앗…… 아앗………… 아아아─…………<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "何度も何度も腰を震わせ、吐き出し続けて。"
translation = "몇 번이고 몇 번이고 허리를 떨며, 계속 쏟아낸다."

[[dialogue]]
speaker = "unk"
original = "たっぷりと時間をかけた射精が、ようやく止まって……"
translation = "듬뿍 시간을 들인 사정이 겨우 멈추고……"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「──んはぁあっ<emoji=heart04><emoji=heart04>\u3000はぁ～っ……はぁあ～っ……はぁああー……はあぁー……<emoji=heart04>」"
translation = "「──은하아앗<emoji=heart04><emoji=heart04> 하아~…… 하아아~…… 하아아아─…… 하아아─……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「すごぉ～い……会長くんの精液……こんなに、出してくれたのね……<emoji=heart04>」"
translation = "「대단해~…… 회장군의 정액…… 이렇게나, 내보내 준 거구나……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「──ぁ、やんっ<emoji=heart04>\u3000び、敏感になってるから、かしら……<emoji=heart04>\u3000精液、とろとろって、出てくるたびに……んッ<emoji=heart04>\u3000声が、出ちゃうっ……<emoji=heart04>」"
translation = "「──아, 앙<emoji=heart04> 미, 민감해져서, 일까……<emoji=heart04> 정액이, 주르륵 하고, 나올 때마다…… 응<emoji=heart04> 목소리가, 나와 버려……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "サーシャさんのおま○こからは、次から次へと、俺が注いだ精液が溢れてくる。"
translation = "사샤 씨의 보지에서는 차례차례 내가 쏟아부은 정액이 흘러넘친다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふぅっ……はぁあっ……いっぱい気持ちよくなってくれたみたいね～……満足してくれた……？」"
translation = "「후우…… 하아앗…… 잔뜩 기분 좋아진 모양이네~…… 만족했어……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「はい、すごく良かったです……」"
translation = "「네, 정말 좋았어요……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「うふふ～……嬉しい♪\u3000で～も、元気いっぱいの会長くんが１回で終わるわけもないだろうし……このまま連続でしちゃう？」"
translation = "「우후후~…… 기뻐♪ 하~지만, 원기 왕성한 회장군이 한 번으로 끝날 리도 없을 테고…… 이대로 연속으로 해 버릴까?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……お願いします」"
translation = "「……부탁드립니다」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「うふふ♪\u3000素直な男の子、お姉ちゃんは大好きよ～<emoji=heart04>」"
translation = "「우후후♪ 솔직한 남자아이, 누나는 정말 좋아해~<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あなたが満足するまで付き合うから……お姉ちゃんと一緒に、い～っぱい、気持ちよくなりましょうね<emoji=heart04>」"
translation = "「당신이 만족할 때까지 함께할 테니까…… 누나랑 같이, 마~니, 기분 좋아지자<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "優しく微笑んでくれるサーシャさんを見て、改めて思う──俺はこの人が大好きだ、と。"
translation = "상냥하게 미소 짓는 사샤 씨를 보며 다시금 생각한다── 나는 이 사람이 정말 좋다고."

[[dialogue]]
speaker = "unk"
original = "愛しいと思えば思うほど、興奮はいっこうに引いてくれなくって。"
translation = "사랑스럽다고 생각하면 생각할수록, 흥분은 도무지 가라앉지 않아서."

[[dialogue]]
speaker = "unk"
original = "その後も俺たちは、ホテルの時間が来るぎりぎりまで、ひたすらつながり続けるのだった──"
translation = "그 후로도 우리들은 호텔 시간이 다 될 때까지 오로지 계속 이어지는 것이었다──"

