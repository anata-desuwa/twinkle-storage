[[dialogue]]
speaker = "unk"
original = "第２話,魔法少女の友達,P"
translation = "제2화, 마법소녀의 친구, P"

[[dialogue]]
speaker = "unk"
original = "あの後、トマルやサチと一緒に、新星学園敷地内に現れたロストアイテムを回収する為に奔走し――"
translation = "그 후 토마루나 사치와 함께 신성학원 부지 내에 나타난 로스트 아이템을 회수하기 위해 분주했고──"

[[dialogue]]
speaker = "トマル"
original = "「はい、サチさま、絆創膏も貼りましたので、これで怪我の処置は終わりです」"
translation = "「네, 사치 님, 반창고도 붙였으니 이걸로 상처 처치는 끝입니다」"

[[dialogue]]
speaker = "サチ"
original = "「トマルくん、ありがとうございます。ロストアイテムの追跡も助かりました」"
translation = "「토마루 군, 고마워요. 로스트 아이템 추적도 도움이 됐어요」"

[[dialogue]]
speaker = "トマル"
original = "「いえ、サチさまも膝を擦り剥いただけで済んで、幸いです。ほっとしました」"
translation = "「아니에요, 사치 님도 무릎을 까진 정도로 끝나서 다행이에요. 안심했습니다」"

[[dialogue]]
speaker = "unk"
original = "トマル、手当てがすごく上手だね"
translation = "토마루, 처치가 정말 능숙하네"

[[dialogue]]
speaker = "トマル"
original = "「実は私、附属校で、保健委員会に所属しているんです」"
translation = "「사실 저, 부속 학교에서 보건위원회에 소속되어 있거든요」"

[[dialogue]]
speaker = "サチ"
original = "「トマルくんの人気は男女問わずすごくて、保健室の看板娘として有名なんですよ」"
translation = "「토마루 군의 인기는 남녀 불문하고 대단해서 보건실의 간판 소녀로 유명해요」"

[[dialogue]]
speaker = "トマル"
original = "「そんな……大袈裟ですよ。私は男ですし……」"
translation = "「그런…… 과장이에요. 저는 남자고요……」"

[[dialogue]]
speaker = "unk"
original = "ふと、サチのクローバーの髪飾りが点滅して、そこから声が響く。"
translation = "문득 사치의 클로버 머리 장식이 점멸하더니 그곳에서 목소리가 울려 퍼진다."

[[dialogue]]
speaker = "トレジアンナ"
original = "「男のムスメと書いて、男の娘ですから、看板娘で間違ってないかと。トマルさんは男子生徒からも、付き合って欲しいってよく告白されてますしね～」"
translation = "「남자 무스메라고 쓰고 오토코노코라고 읽으니까 간판 소녀로 틀리지 않았다고 봐요. 토마루 씨는 남학생들에게도 사귀어 달라는 고백을 자주 받기도 하고요~」"

[[dialogue]]
speaker = "トマル"
original = "「もう、トレジアンナさままで……私、何だか恥ずかしくて、照れてしまいます」"
translation = "「정말, 트레지안나 님까지…… 저 왠지 부끄러워서 쑥스러워요」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「いや～、それにしても、今回の魔法少女活動、トマルさんがいなければどうなっていたことか。持つべきものは、やはり仲間ですね～」"
translation = "「아니~ 그나저나 이번 마법소녀 활동, 토마루 씨가 없었다면 어떻게 됐을지. 역시 동료는 있어야 하네요~」"

[[dialogue]]
speaker = "サチ"
original = "「認識を歪めるロストアイテムがあんなにも厄介だとは思いませんでした。透明になって姿を消せるなんて……」"
translation = "「인식을 왜곡하는 로스트 아이템이 그렇게나 까다로울 줄은 몰랐어요. 투명해져서 모습을 감출 수 있다니……」"

[[dialogue]]
speaker = "サチ"
original = "「トマルくんの式神を使って、追跡が出来たおかげで捕獲することができました。今回だけじゃないですが、いつも私たちを助けてくれて、本当にありがとうございます」"
translation = "「토마루 군의 식신을 사용해서 추적할 수 있었던 덕분에 포획할 수 있었어요. 이번뿐만이 아니라 항상 저희를 도와주셔서 정말 고마워요」"

[[dialogue]]
speaker = "トマル"
original = "「いえいえ、私も半年前のロストアイテムの件で助けて頂きましたから。それにもう、サチさまのことは魔法少女活動と関係なく、大切な友達だと思っていますので」"
translation = "「아니에요, 저도 반년 전 로스트 아이템 건으로 도움을 받았으니까요. 게다가 이제 사치 님은 마법소녀 활동과 상관없이 소중한 친구라고 생각하고 있으니까요」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「トマルさん……相変わらず、心まで美少女！」"
translation = "「토마루 씨…… 여전히 마음까지 미소녀!」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「サチさんとトマルさんがこんなに仲良くしてるんだから、そろそろ生徒会と保健委員会の確執もどうにかなりませんかね～」"
translation = "「사치 씨와 토마루 씨가 이렇게 사이좋게 지내고 있으니 슬슬 학생회와 보건위원회의 갈등도 어떻게 안 될까요~」"

[[dialogue]]
speaker = "unk"
original = "そんなのがあるの？"
translation = "그런 게 있어?"

[[dialogue]]
speaker = "トマル"
original = "「はい、私たちより上の代の先輩が、犬猿の仲だったそうで……予算を上げる上げないで、よく揉めていたみたいです」"
translation = "「네, 저희보다 윗세대 선배님들이 견원지간이었다고 해서…… 예산을 올리네 마네로 자주 다퉜던 모양이에요」"

[[dialogue]]
speaker = "サチ"
original = "「情けない話ですが、それを今も引きずってしまっていて、組織的に仲がよくないんです」"
translation = "「한심한 이야기지만 그것을 지금도 끌어오고 있어서 조직적으로 사이가 좋지 않아요」"

[[dialogue]]
speaker = "トマル"
original = "「でも、私は諦めずに委員会の皆さまへ訴えていきたいです。昔の確執を、今の私たちが持ち続ける必要はないんだって」"
translation = "「하지만 저는 포기하지 않고 위원회 분들께 호소해 나가고 싶어요. 옛날의 갈등을 지금의 우리가 계속 가질 필요는 없다고요」"

[[dialogue]]
speaker = "トマル"
original = "「事実として、私はサチさまとこうして、友達になれたのですから」"
translation = "「사실로서 저는 사치 님과 이렇게 친구가 될 수 있었으니까요」"

[[dialogue]]
speaker = "サチ"
original = "「私も生徒会長として、卒業までに必ず和解してみせます」"
translation = "「저도 학생회장으로서 졸업 전까지 반드시 화해시켜 보이겠어요」"

[[dialogue]]
speaker = "トマル"
original = "「それで、サチさま。組織同士の確執はひとまず置いておいて……１人の友達として、どうしても言って置かなくてはならないことがあります」"
translation = "「그래서 사치 님. 조직끼리의 갈등은 일단 제쳐두고…… 한 명의 친구로서 꼭 해두어야 할 말이 있어요」"

[[dialogue]]
speaker = "サチ"
original = "「え？\u3000は、はい」"
translation = "「에? 네, 네」"

[[dialogue]]
speaker = "トマル"
original = "「今回の１件についてです。結果的に、怪我も大したことはなく、ロストアイテムの回収には成功しましたが――」"
translation = "「이번 일에 대해서예요. 결과적으로 상처도 크지 않았고 로스트 아이템 회수에는 성공했지만──」"

[[dialogue]]
speaker = "トマル"
original = "「それでも、やはり無茶はダメです。サチさまがいくら『幸運体質』だと言っても、ご自分のことはもっと大切になさって下さい」"
translation = "「그래도 역시 무리는 금물이에요. 사치 님이 아무리 『행운 체질』이라고 해도 자신을 좀 더 소중히 여겨 주세요」"

[[dialogue]]
speaker = "サチ"
original = "「そうですね……ごめんなさい。私も自分の能力任せで、合理的な行動じゃなかったと反省してます……」"
translation = "「그렇네요…… 미안해요. 저도 제 능력만 믿고 합리적인 행동이 아니었다고 반성하고 있어요……」"

[[dialogue]]
speaker = "トマル"
original = "「ご自分でわかっていらっしゃるのなら、私も安心です。サチさまが傷付くと、私達も心を痛めずにはいられないのです。次はどうか、お怪我をなさらないようにしてください」"
translation = "「스스로 알고 계신다면 저도 안심이에요. 사치 님이 다치면 저희도 마음이 아프지 않을 수 없거든요. 다음에는 부디 다치지 않도록 해주세요」"

[[dialogue]]
speaker = "サチ"
original = "「はい、気をつけます。心配してくれてありがとう、トマルくん」"
translation = "「네, 조심할게요. 걱정해 줘서 고마워요, 토마루 군」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「ロストアイテムが悪い人達の手に渡るのを避ける為、サチさんに回収をお願いしてる私が言うのもなんですが……」"
translation = "「로스트 아이템이 나쁜 사람들의 손에 넘어가는 걸 피하기 위해 사치 씨에게 회수를 부탁하는 제가 할 말은 아니지만……」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「私もサチさんが怪我をするのは本意ではないですね～。サチさんにはいつも、魔法少女として可愛くいて欲しいって思ってますから♪」"
translation = "「저도 사치 씨가 다치는 건 본의가 아니네요~. 사치 씨는 언제나 마법소녀로서 귀엽게 있어 줬으면 하니까요♪」"

[[dialogue]]
speaker = "サチ"
original = "「トレジアンナさんらしいですね……でも」"
translation = "「트레지안나 씨답네요…… 하지만」"

[[dialogue]]
speaker = "サチ"
original = "「私としても、ロストアイテムを悪い人の手に渡すことはできないって、今では思っています。だから、もう少しこの活動を続けていきたいんです」"
translation = "「저로서도 로스트 아이템을 나쁜 사람 손에 넘길 수는 없다고 이제는 생각하고 있어요. 그러니까 조금 더 이 활동을 계속하고 싶어요」"

[[dialogue]]
speaker = "サチ"
original = "「それに、今はトマルくんだけじゃなく、お兄さんっていう心強い味方もいますしね」"
translation = "「게다가 지금은 토마루 군뿐만 아니라 오빠라는 든든한 아군도 있으니까요」"

[[dialogue]]
speaker = "トマル"
original = "「会長さま。私からもどうか、サチさまのことをよろしくお願い致します」"
translation = "「회장님. 저로서도 부디 사치 님을 잘 부탁드립니다」"

[[dialogue]]
speaker = "unk"
original = "もちろんだ。任せてくれ"
translation = "물론이다. 맡겨줘"

[[dialogue]]
speaker = "トマル"
original = "「はい。あなた様になら、サチさまを安心してお願いできます」"
translation = "「네. 당신께라면 사치 님을 안심하고 부탁드릴 수 있어요」"

[[dialogue]]
speaker = "トマル"
original = "「あっ、そうだ。会長さまは今回の件で、どこかお加減の悪いところはございませんか？」"
translation = "「앗, 맞다. 회장님은 이번 일로 어디 몸이 안 좋으신 곳은 없나요?」"

[[dialogue]]
speaker = "トマル"
original = "「怪我でなくとも、具合が悪いとか、気分が優れないとか……」"
translation = "「상처가 아니더라도 컨디션이 나쁘다거나 기분이 좋지 않다거나……」"

[[dialogue]]
speaker = "トマル"
original = "「私、どんな手当てでも致しますので、何でもお申しつけください」"
translation = "「저, 어떤 처치라도 해드릴 테니 무엇이든 말씀해 주세요」"

[[dialogue]]
speaker = "トマル"
original = "「なんでもいいんです。なにか私に、あなた様の為にできることはございませんか？」"
translation = "「뭐든 괜찮아요. 뭔가 제가 당신을 위해 할 수 있는 일은 없나요?」"

[[dialogue]]
speaker = "unk"
original = "い、いや、本当に大丈夫だから……！"
translation = "아, 아니, 정말 괜찮으니까……!"

[[dialogue]]
speaker = "トレジアンナ"
original = "「おや？\u3000トマルさん、ご奉仕気質なのはいつものことですが、今日はなんか……」"
translation = "「어라? 토마루 씨, 봉사 기질인 건 평소에도 그렇지만 오늘은 왠지……」"

[[dialogue]]
speaker = "サチ"
original = "「お兄さん、わかります。トマルくんの美人な顔で迫られると、性別関係なくドキドキしちゃうんですよね……」"
translation = "「오빠, 이해해요. 토마루 군의 미인 같은 얼굴로 다가오면 성별 상관없이 두근거려 버리죠……」"

[[dialogue]]
speaker = "unk"
original = "その後、結局トマルの圧に押し負けて、保健室で色々お世話を焼かれてしまうのだった――"
translation = "그 후 결국 토마루의 기세에 밀려 보건실에서 여러 가지 보살핌을 받게 되는 것이었다──"

