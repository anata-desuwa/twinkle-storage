[[dialogue]]
speaker = "unk"
original = "第7話,メイド長の笑顔,B"
translation = "제7화, 메이드장의 미소, B"

[[dialogue]]
speaker = "unk"
original = "誰もが息を飲むような壮絶な戦闘の末、両者の動きが止まる。そして――"
translation = "모두가 숨을 삼킬 듯한 장절한 전투 끝에 양측의 움직임이 멈춘다. 그리고――"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「うふふ<emoji=heart04>\u3000素晴らしい戦いでした、キリカさん」"
translation = "「우후후<emoji=heart04> 훌륭한 싸움이었어요, 키리카 씨」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「ああ、なんて眩しく、お可愛らしい……これだから、若い子を推すのは……止められませんね……♪」"
translation = "「아아, 어찌나 눈부시고 귀여운지…… 이래서 어린 아이를 덕질하는 건…… 멈출 수 없다니까요……♪」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「キリカさんの――勝ちです！」"
translation = "「키리카 씨의―― 승리입니다!」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「……やり……ました……」"
translation = "「……해……냈습니다……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「キリカさん！？」"
translation = "「키리카 씨!?」"

[[dialogue]]
speaker = "unk"
original = "師匠！"
translation = "스승님!"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「――ん……ここは……？」"
translation = "「――음…… 여기는……?」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「緋宮会長……？\u3000私は一体……？」"
translation = "「히노미야 회장님……? 저는 대체……?」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「――そうでした、マリオンさんに勝って、それで……」"
translation = "「――맞다, 마리온 씨에게 이기고, 그래서……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「キリカさんは直後に気を失ってしまったんです。そうしたら、会長さんが誰よりも早くキリカさんのところに駆けつけて――」"
translation = "「키리카 씨는 직후에 정신을 잃고 말았어요. 그랬더니 회장님이 누구보다 빠르게 키리카 씨에게 달려와서――」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「アリーナから飛び出した時は、どこに連れていく気だと思いましたが、追い駆けたら、この新星学園の保健室に……少し見直しました」"
translation = "「아레나에서 튀어 나갔을 때는 어디로 데려가려나 싶었습니다만, 뒤쫓아가 보니 이 신성학원의 보건실에…… 조금 다시 봤습니다」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「そうでしたか……ありがとうございます、緋宮会長。今日だけじゃなくて、昨日のことも」"
translation = "「그랬군요…… 감사합니다, 히노미야 회장님. 오늘뿐만 아니라 어제의 일도」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「私のことを心配して、フィオナお嬢様に相談してくれたのですよね？」"
translation = "「저를 걱정해서, 피오나 아가씨께 상담해 주신 거군요?」"

[[dialogue]]
speaker = "unk"
original = "弟子ですから"
translation = "제자니까요"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「キリカさん」"
translation = "「키리카 씨」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「マリオンさん……あなたの方は、体は大丈夫なのですか？」"
translation = "「마리온 씨…… 당신 쪽은, 몸은 괜찮으신가요?」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「ええ。私はキリカさんの愛の鞭を受け慣れてますから♪\u3000むしろ、あなたの本気を受け止められて、嬉しくて寝てられないくらいですよ<emoji=heart04>」"
translation = "「네. 저는 키리카 씨의 사랑의 매에 익숙하니까요♪ 오히려, 당신의 진심을 받아낼 수 있어서, 기뻐서 잠이 안 올 정도예요<emoji=heart04>」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「――先の戦い、本当に見事でした」"
translation = "「――방금 전 전투, 정말 훌륭했어요」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「キリカさんの未だかつてない、異次元の速度――神速の拳闘術」"
translation = "「키리카 씨의 지금까지 본 적 없는, 이차원의 속도――신속의 권투술」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「学園を卒業してもなお、あなたはまた１段階、上の領域へと覚醒を果たしたと言っていいでしょう」"
translation = "「학원을 졸업하고도 여전히, 당신은 또 한 단계, 위의 영역으로 각성을 완수했다고 해도 과언이 아니겠죠」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「若い子達の成長というのはいつ見ても、お可愛らしい……あなたは私の想像を超えた姿を見せてくれました」"
translation = "「젊은 아이들의 성장이란 건 언제 봐도, 참 귀엽네요…… 당신은 제 상상을 초월한 모습을 보여주었어요」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「ですから……メイド長の座を、あなたに返します」"
translation = "「그러니까…… 메이드장 자리를, 당신에게 돌려줄게요」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「おめでとう、キリカさん」"
translation = "「축하해요, 키리카 씨」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ありがとうございます、マリオンさん。確かに承りました」"
translation = "「감사합니다, 마리온 씨. 확실히 받았습니다」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「……それから、メイド隊のみんな」"
translation = "「……그리고, 메이드대 여러분」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「キリカさん、なんでしょう？」"
translation = "「키리카 씨, 무슨 일이시죠?」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「今回のことで、私はメイド長らしからぬ、情けないところを見せました。非難されても仕方がないと思っています」"
translation = "「이번 일로, 저는 메이드장답지 않은 한심한 모습을 보였습니다. 비난받아도 마땅하다고 생각합니다」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「大変に、申し訳ありませんでした」"
translation = "「대단히, 죄송했습니다」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「え！？\u3000キリカさん、そんな……頭を上げてください！」"
translation = "「에!? 키리카 씨, 그런…… 고개를 들어 주세요!」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「こんな私ですが、それでもメイド長の立場を続けさせて欲しいと思っています」"
translation = "「이런 저입니다만, 그래도 메이드장의 직책을 계속하게 해 주셨으면 합니다」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「私は今回のことで――メイド長としての仕事が好きだったのだと、自覚することができたので」"
translation = "「저는 이번 일로――메이드장으로서의 일을 좋아했다는 것을, 자각할 수 있었기에」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「もちろんです、キリカさん――いえ、メイド長。私はいつも真面目なあなたのことを、心から尊敬してますから」"
translation = "「물론이죠, 키리카 씨――아니, 메이드장. 저는 언제나 성실한 당신을, 진심으로 존경하고 있으니까요」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「私もです。これからもどうか、ご指導をよろしくお願いしますっ！」"
translation = "「저도요. 앞으로도 부디, 지도를 부탁드립니다!」"

[[dialogue]]
speaker = "unk"
original = "そのほかのメイド隊の子たちも、キリカ師匠に笑顔で答える。"
translation = "그 밖의 메이드대 아이들도, 키리카 스승에게 미소로 답한다."

[[dialogue]]
speaker = "unk"
original = "と、その時だった。"
translation = "그때였다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ありがとう。みんな……」"
translation = "「고마워요. 모두들……」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「あ……！」"
translation = "「아……!」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「……？\u3000なんですか？\u3000みんな、私の顔をじろじろ見て……」"
translation = "「……? 왜 그러시죠? 다들, 제 얼굴을 빤히 쳐다보고……」"

[[dialogue]]
speaker = "unk"
original = "師匠が笑った……！"
translation = "스승님이 웃었다……!"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「え！？\u3000わ、笑ってましたか、私……！？」"
translation = "「에!? 저, 저 웃고 있었나요……!?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「はい、間違いなく」"
translation = "「네, 틀림없이요」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「可愛かったです……！」"
translation = "「귀여웠어요……!」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「か、かわっ！？\u3000～～～っ……！」"
translation = "「귀, 귀여어!? ~~~읏……!」"

[[dialogue]]
speaker = "unk"
original = "師匠、照れてます？"
translation = "스승님, 수줍어하시는 건가요?"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「はぁ！？\u3000なにを言っているのですか、緋宮会長！？\u3000違います！\u3000ニヤニヤしないで下さいっ！」"
translation = "「하아!? 무슨 말을 하는 건가요, <u>히노미야</u> 회장님!? 아닙니다! 싱글벙글 웃지 말아 주세요!」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「と、とにかく、今さっき見たことは全員忘れなさい！\u3000これはメイド長命令です！\u3000いいですね！？」"
translation = "「아, 아무튼, 방금 본 건 전원 잊으세요! 이것은 메이드장 명령입니다! 알겠지요!?」"

[[dialogue]]
speaker = "unk"
original = "恥ずかしそうに顔を赤くするキリカ師匠なのだった。"
translation = "부끄러운 듯 얼굴을 붉히는 키리카 스승님이었다."

