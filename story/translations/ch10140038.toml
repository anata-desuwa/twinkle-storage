[[dialogue]]
speaker = "unk"
original = "トワちゃんと恋人になってから、自宅に招くことが増えた。"
translation = "토와짱과 연인이 되고 나서, 자택으로 초대하는 일이 늘어났다."

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ごめんねー、うちにはメイプルちゃんがいるから」"
translation = "「미안해~, 우리 집에는 메이플짱이 있으니까」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「いちゃいちゃしてもいいよって言ってくれたけど、やっぱり落ち着かないよね」"
translation = "「꽁냥거려도 된다고 말해주긴 했지만, 역시 마음이 안 놓이지」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「それに、メイプルちゃんの教育上よくないことも……多いし……」"
translation = "「게다가, 메이플짱의 교육상 좋지 않은 일도…… 많고……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そうだね。夫婦がすることもしてる訳だから」"
translation = "「그렇네. 부부가 하는 짓도 하고 있는 셈이니까」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「う、うん……キスしてるとことか、絶対見せちゃダメだよね……」"
translation = "「으, 응…… 키스하는 모습 같은 거, 절대 보여주면 안 되니까……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「…………ちゅっ<emoji=heart04>」"
translation = "「…………쪽<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「えへへ、そうそう、こういうの。メイプルちゃんにはまだ早いもん」"
translation = "「에헤헤, 그래그래, 이런 거. 메이플짱에게는 아직 이르니까」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「なら、その先はもっと教育上よくないか」"
translation = "「그럼, 그 다음은 훨씬 더 교육상 좋지 않겠네」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「うん、だからこうして、またキミの家にお邪魔しちゃうんだよね」"
translation = "「응, 그러니까 이렇게, 다시 너의 집에 실례하게 되는 거네」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「へ、変身っ♪」"
translation = "「벼, 변신♪」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「じゃーん、キミが大好きな、ウェディングフォームだよ♪」"
translation = "「짠~, 네가 정말 좋아하는 웨딩 폼이야♪」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「この前言ってたよね、次はドレス姿でえっちしようねって」"
translation = "「요전에 말했었지, 다음에는 드레스 차림으로 섹스하자고」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そうだけど、いいの？」"
translation = "「그렇긴 한데, 괜찮아?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「いいに決まってるよ。だって、今のわたしはキミのお嫁さんなんだから」"
translation = "「당연히 괜찮지. 왜냐면, 지금의 나는 네 신부니까」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ベッドに行こ？\u3000今日は時間が許す限り、いちゃいちゃハメハメしようね<emoji=heart04>」"
translation = "「침대로 가자? 오늘은 시간이 허락하는 한, 꽁냥꽁냥 박아대며 섹스하자<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「んんっ……はぁぁっ……見て、まだ触ってもないのに、こんなに濡れちゃってる……」"
translation = "「응으…… 하아…… 봐봐, 아직 만지지도 않았는데, 이렇게 젖어버렸어……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「キミとセックス出来るって思っただけで、もうこんなになっちゃった。何度もして、すっかりチ○ポの気持ちよさ、覚えちゃったみたい」"
translation = "「너랑 섹스할 수 있다는 생각만으로, 벌써 이렇게 돼버렸어. 몇 번이나 해서, 완전히 자지의 기분 좋음을, 기억해버린 것 같아」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ふふっ、キミもわたしのおま○この感触、思い出しちゃったの？\u3000もう、チ○ポをこんなにパンパンに膨らませちゃって……先っぽからえっちなぬるぬるも出ちゃってるね」"
translation = "「후훗, 너도 내 보지의 감촉, 떠올려 버린 거야? 정말, 자지를 이렇게 팽팽하게 부풀려가지고…… 끝부분에서 야한 미끌미끌한 것도 나오고 있네」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「最初にフェラチオしたいなって思ってたけど、もう待ちきれない感じだね。あっ、心配しないで、どうせ何度もすることになるんだから、後のお楽しみだよ<emoji=heart04>」"
translation = "「처음에는 펠라치오하고 싶다고 생각했지만, 이제 못 기다리겠다는 느낌이네. 앗, 걱정하지 마, 어차피 몇 번이나 하게 될 거니까, 나중의 즐거움이야<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「もー、わたしにお口でしてもらうの想像しちゃったの？\u3000毎回キミがして欲しがるから、わたしも自主練したんだよ。おもちゃのチ○ポをじゅぽじゅぽして」"
translation = "「정말-, 내가 입으로 해주는 거 상상해버린 거야? 매번 네가 해달라고 하니까, 나도 자율 학습 했다구. 장난감 자지를 쥬포쥬포 하면서」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「わわっ、すごいビクンってしたぁ<emoji=heart04>\u3000そんなに興奮しちゃったの？」"
translation = "「와왓, 엄청 움찔거렸어<emoji=heart04> 그렇게 흥분해버린 거야?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「お口よりも……ここの方が気持ちいいんだけどな～」"
translation = "「입보다…… 여기가 더 기분 좋은데 말야~」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ほら見て～、キミ専用のお嫁さんま○こだよ<emoji=heart04>\u3000ちっちゃい穴だけど、何度もセックスしてもらったおかげで、キミのおっきなチ○ポだって根元まで全部入るんだから」"
translation = "「자 봐봐~, 너 전용의 신부 보지야<emoji=heart04> 조그만 구멍이지만, 몇 번이나 섹스해준 덕분에, 네 커다란 자지도 뿌리까지 전부 들어가니까」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ぬるぬるのヒダヒダがとっても気持ちいいよ～。ほら、チ○ポをハメて好きなだけにゅるにゅるにゅぽにゅぽしちゃおう？」"
translation = "「미끌미끌한 주름이 정말 기분 좋아~. 자, 자지를 끼우고 마음껏 뉴루뉴루 뉴포뉴포 해버리자?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ていうか、もうわたしのほうが待ちきれないよ。もうハメハメしちゃうね～<emoji=heart04>」"
translation = "「그보다, 이제 내가 더 못 기다리겠어. 이제 하메하메 해버릴게~<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「んおおおっ<emoji=heart04>\u3000おおんっ<emoji=heart04>\u3000はぁっはぁっ、キミのおっきすぎるチ○ポ……ぬぷぷぷ～～って簡単に入っちゃった<emoji=heart04>」"
translation = "「응오오옷<emoji=heart04> 오온<emoji=heart04> 하아 하아, 너의 너무 커다란 자지…… 누푸푸푸~~ 하고 간단히 들어가 버렸어<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「えへへ、入る時ちょっと変な声出ちゃったね。サイズが違いすぎて、おま○こに刺激が強すぎるせいなんだから」"
translation = "「에헤헤, 들어갈 때 좀 이상한 소리 나와버렸네. 사이즈가 너무 달라서, 보지에 자극이 너무 강한 탓이니까」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「セックスの最後の方とか、はしたなくおんおん言っちゃってるかもしれないけど、ああいうの恥ずかしいんだから」"
translation = "「섹스 마지막 즈음이라든가, 천박하게 온온 거리고 있을지도 모르지만, 그런 거 부끄러우니까」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「キミがそういうので興奮するのはわかってるけどねー。可愛いお嫁さんとしては、あんまり聞かせたくない声かなって」"
translation = "「네가 그런 거에 흥분하는 건 알고 있지만 말야-. 귀여운 신부로서는, 별로 들려주고 싶지 않은 목소리일까 해서」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「でも、そんなトワちゃんの声にめちゃくちゃ興奮するんだよね」"
translation = "「하지만, 그런 토와 짱의 목소리에 엄청나게 흥분하는걸」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「んんんっ！？\u3000ちょっ、チ○ポぐうぅ～～っておっきくなったんだけど」"
translation = "「응응으!? 잠깐, 자지 구우우~~ 하고 커졌는데」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「もー、絶対ダメとは言わないけど……お嫁さんの気持ちも考えて、お手柔らかにね<emoji=heart04>」"
translation = "「정말-, 절대 안 된다고는 안 하겠지만…… 신부의 마음도 생각해서, 살살 부탁해<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それはこっちのセリフだよ。トワちゃんこそ、すっかり腰振りが上達して、めちゃくちゃ激しくチ○ポしごきしてくるんだから」"
translation = "「그건 내가 할 소리야. 토와 짱이야말로, 완전히 허리 놀림이 능숙해져서, 엄청나게 격렬하게 자지를 훑어대니까」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「だ、だってセックス気持ちいいんだもん。あんな気持ちいいことずっと知らなかったなんて勿体ないよね」"
translation = "「그, 그치만 섹스 기분 좋은걸. 그런 기분 좋은 걸 여태껏 몰랐다니 아깝잖아」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「もちろんわたしだってわかってるよ。あんまり激しくすると、すぐドピュってしちゃうもんね。いっぱい出し入れを楽しみたいなら、手加減する必要があるから」"
translation = "「물론 나도 알고 있어. 너무 격렬하게 하면, 금방 도퓩 하고 싸버리니까. 잔뜩 넣었다 뺐다 하는 걸 즐기고 싶다면, 적당히 조절할 필요가 있으니까」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「じゃあ……そろそろお願いしていい？\u3000最初は手加減モードで、トワちゃんのスケベま○こを愉しませてよ」"
translation = "「그럼…… 슬슬 부탁해도 될까? 처음에는 살살 모드로, 토와짱의 음란한 보지를 즐겁게 해줘」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「うん、わかった。わたしも我慢できなくなってたから……動くね？」"
translation = "「응, 알았어. 나도 참을 수 없게 됐으니까…… 움직일게?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「んあっ<emoji=heart04>\u3000あぁんっ、はぁっ<emoji=heart04>\u3000やっぱりチ○ポ気持ちいい……自分でするのとは全然違うよぉ<emoji=heart04>」"
translation = "「응앗<emoji=heart04> 아앙, 하앗<emoji=heart04> 역시 자지 기분 좋아…… 스스로 하는 거랑은 전혀 달라아<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「あぁんっ、あっ、あっ、だめっ、腰が勝手に動いちゃうっ<emoji=heart04>\u3000最初だからゆっくりぬぽぬぽしたかったのにぃ～」"
translation = "「아앙, 앗, 앗, 안 돼, 허리가 멋대로 움직여버려어<emoji=heart04> 처음이니까 천천히 질퍽질퍽하고 싶었는데에~」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ご、ごめんねっ、すぐに激しくしちゃうかも、だけど。はぁっ、はぁっ、その分いっぱいおま○こで気持ちよくするね？\u3000お嫁さんのえっちな肉穴満喫していいよ<emoji=heart04>」"
translation = "「미, 미안해, 금방 격렬해질지도, 모르지만. 하앗, 하앗, 그만큼 잔뜩 보지로 기분 좋게 해줄게? 신부의 야한 고기 구멍 만끽해도 좋아<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「んふぅ～～～っ<emoji=heart04>\u3000はぁんっ、あぁっ！\u3000この体勢つらいけど、でも、キミのチ○ポが奥までぐう～～って刺さるから……気持ちいいよぉ<emoji=heart04>」"
translation = "「응후우~~~<emoji=heart04> 하앙, 아앗! 이 자세 힘들지만, 그래도, 너의 자지가 깊숙이 꾸우우욱 박히니까…… 기분 좋아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「おま○ことチ○ポ、長さが違うのに……無理矢理全部押し込んじゃう……んぅっ<emoji=heart04>\u3000ううっ、奥のとこ、ずるい～<emoji=heart04>」"
translation = "「보지랑 자지, 길이가 다른데…… 억지로 전부 밀어넣어 버려…… 응으윽<emoji=heart04> 으으윽, 깊은 곳, 비겁해～<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ね、ねえキミも……動いていいんだよ？\u3000下からわたしのおま○こいじめて<emoji=heart04>」"
translation = "「저, 저기 너도…… 움직여도 된다구? 밑에서 내 보지 괴롭혀줘<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺のお嫁さんはえっちだなぁ。いいよ、トワちゃんの大好きなとこ、いっぱいズボズボしてあげる」"
translation = "「내 마누라는 야하네. 좋아, 토와짱이 제일 좋아하는 곳, 잔뜩 즈보즈보 해줄게」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「うんっ……来てぇ……わたしをセックス大好きにさせちゃったこのチ○ポでいっぱい突いてぇ<emoji=heart04>」"
translation = "「응…… 와줘…… 나를 섹스광으로 만들어버린 이 자지로 잔뜩 찔러줘<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「んおっ<emoji=heart04>\u3000は、激しいっ<emoji=heart04>\u3000そこっ<emoji=heart04>\u3000もっと突いてぇ<emoji=heart04>\u3000あぁっ、あんっ、あんっ、はぁぁっ、んあっ<emoji=heart04>\u3000セックス気持ちいい～<emoji=heart04>\u3000キミのチ○ポ好きぃ<emoji=heart04>」"
translation = "「응옷<emoji=heart04> 하, 격렬해<emoji=heart04> 거기<emoji=heart04> 더 찔러줘<emoji=heart04> 아아윽, 안, 안, 하아아, 응앗<emoji=heart04> 섹스 기분 좋아～<emoji=heart04> 너의 자지 좋아<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ご、ごめんね、えっちなお嫁さんで。でもでもっ、気持ちいいこと我慢できなくって。んうっ！\u3000ふぅぅ～～っ、はぁっ、あぁん<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あぁん<emoji=heart04>」"
translation = "「미, 미안해, 야한 마누라라서. 하지만 하지만, 기분 좋은 거 참을 수가 없어서. 응윽! 후우우～～, 하앗, 아앙<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「お嫁さんはみんな、こんなえっちなことしてるのかなぁ？\u3000一番恥ずかしくてえっちなとこを夢中でこすりっこして<emoji=heart04>」"
translation = "「부인들은 모두, 이런 야한 짓을 하는 걸까? 제일 부끄럽고 야한 곳을 정신없이 서로 비비면서<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「でもっ、こんな気持ちよかったら、毎日だってセックスしちゃうよね<emoji=heart04>」"
translation = "「하지만, 이렇게 기분 좋으면, 매일이라도 섹스해버리겠지<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「夫婦の秘密の夜の営みっ<emoji=heart04>\u3000恥ずかしいとこと気持ちいいとこ全部っ、絶対見せられない全部をさらけ出し合って……<emoji=heart04>」"
translation = "「부부의 비밀스러운 밤의 영위<emoji=heart04> 부끄러운 곳이랑 기분 좋은 곳 전부, 절대 보여줄 수 없는 전부를 서로 드러내며……<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「こんなのっ……すればするほど好きになっちゃうよぉ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「이런 거…… 하면 할수록 좋아하게 돼버려어<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「もっと俺のこと好きになってよ。俺も今よりずっとトワちゃんを好きになるから」"
translation = "「더 나를 좋아해줘. 나도 지금보다 훨씬 토와짱을 좋아하게 될 테니까」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「うんっ、好きになる<emoji=heart04>\u3000現在進行形で好きになってるからぁ<emoji=heart04>\u3000わたしを好きって言ってくれるならっ、いっぱい愛して<emoji=heart04>\u3000チ○ポでわたしを夢中にさせてっ<emoji=heart04>」"
translation = "「응, 좋아하게 될게<emoji=heart04> 현재진행형으로 좋아하게 되고 있으니까아<emoji=heart04> 나를 좋아한다고 말해준다면, 잔뜩 사랑해줘<emoji=heart04> 자지로 나를 정신 못 차리게 해줘<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「んほぉぉぉっ<emoji=heart04>\u3000おおっ<emoji=heart04>\u3000おんっ<emoji=heart04>\u3000すごいっ<emoji=heart04>\u3000それダメっ<emoji=heart04>\u3000やぁんっ、声出ちゃうっ<emoji=heart04>\u3000恥ずかしいから聞かないでぇぇっ<emoji=heart04>」"
translation = "「응호오오옷<emoji=heart04> 오옷<emoji=heart04> 온<emoji=heart04> 굉장해<emoji=heart04> 그거 안 돼<emoji=heart04> 야앙, 목소리 나와버려<emoji=heart04> 부끄러우니까 듣지 마아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「んぐうっ、気持ちよすぎるよぉ<emoji=heart04>\u3000キミのチ○ポがずりゅっ、ずりゅっ、てわたしの敏感な内側をえぐって……これ好きだからダメなのにぃぃ<emoji=heart04>」"
translation = "「응구우윽, 너무 기분 좋아아<emoji=heart04> 너의 자지가 즈류, 즈류, 하고 나의 민감한 안쪽을 후벼파서…… 이거 좋아하니까 안 되는데에에<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ね、ねえ、煽ったのはわたしだけど、やっぱりゆっくりセックスしよ？\u3000こんなのすぐ終わっちゃうから」"
translation = "「저, 저기, 부추긴 건 나지만, 역시 천천히 섹스하자? 이런 거 금방 끝나버리니까」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「すぐ終わっても、何度もすればいいから。いつもそうでしょ？」"
translation = "「금방 끝나도, 몇 번이고 하면 되니까. 항상 그랬잖아?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「う、うんっ……じゃあ……いいよ？\u3000激しくしていいから、その代わり、その、キミのザーメンいっぱい出してね<emoji=heart04>」"
translation = "「으, 응…… 그럼…… 좋아? 격렬하게 해도 되니까, 그 대신, 그, 너의 정액 잔뜩 내보내줘<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「わたしのおなかがぽっこりするくらいっ、出してくれなきゃダメなんだからっ<emoji=heart04>」"
translation = "「내 배가 볼록해질 정도로, 내보내주지 않으면 안 되니까아<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「はぁんっ<emoji=heart04>\u3000あぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000やっぱりすごいぃ<emoji=heart04>\u3000キミの本気を感じちゃうっ、わたしのおま○こ全部、ごしごしされちゃって……これ好きぃ<emoji=heart04>\u3000大好きぃ<emoji=heart04>」"
translation = "「하앙<emoji=heart04> 아아윽<emoji=heart04> 안<emoji=heart04> 역시 굉장해에<emoji=heart04> 너의 진심이 느껴져, 내 보지 전부, 고시고시 당해버려서…… 이거 좋아아<emoji=heart04> 정말 좋아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「もっと突いて<emoji=heart04>\u3000激しくしていいよ<emoji=heart04>\u3000お嫁さんま○こが壊れちゃうくらいいっぱい愛して<emoji=heart04>\u3000んあぁぁっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000あっ、嬉しい<emoji=heart04>\u3000嬉しいよぉ<emoji=heart04>」"
translation = "「더 찔러줘<emoji=heart04> 격렬하게 해도 좋아<emoji=heart04> 마누라 보지가 망가질 정도로 잔뜩 사랑해줘<emoji=heart04> 응아아아윽<emoji=heart04> 하앙<emoji=heart04> 앗, 기뻐<emoji=heart04> 기뻐어<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「こんなのもぉ、気持ちよすぎておかしくなっちゃう<emoji=heart04>\u3000キミとはじめてえっちするまで、こんなの知らなかったのに<emoji=heart04>\u3000もう戻れないんだからぁ<emoji=heart04>」"
translation = "「이런 거어, 너무 기분 좋아서 이상해져 버려<emoji=heart04> 너랑 처음으로 엣찌하기 전까지, 이런 거 몰랐는데<emoji=heart04> 이제 돌아갈 수 없으니까아<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「んおおおおおっ<emoji=heart04>\u3000おほぉっ<emoji=heart04>\u3000おおんっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000おおおおっ<emoji=heart04>\u3000そこえぐっちゃダメぇ<emoji=heart04>\u3000すぐイク<emoji=heart04>\u3000イっちゃうからああぁぁぁんっ<emoji=heart04>」"
translation = "「응오오오오옷<emoji=heart04> 오호옷<emoji=heart04> 오온<emoji=heart04> 오옷<emoji=heart04> 오옷<emoji=heart04> 오오오오옷<emoji=heart04> 거기 후비면 안 돼애<emoji=heart04> 금방 가버려<emoji=heart04> 가버리니까아아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「わたし先生なのにっ<emoji=heart04>\u3000スケベなお嫁さんだけどっ、みんなの先生なのにっ<emoji=heart04>\u3000こんなっ、品の無い声出してるとこ、絶対知られちゃダメっっ<emoji=heart04>」"
translation = "「나 선생님인데엣<emoji=heart04> 야한 신부지만, 모두의 선생님인데엣<emoji=heart04> 이런, 품위 없는 소리 내는 거, 절대 들키면 안 돼앳<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「んおっ<emoji=heart04>\u3000ちょっ、声出させようとしないでぇ<emoji=heart04>\u3000ほんとに恥ずかしいんだからぁ<emoji=heart04>」"
translation = "「응오옷<emoji=heart04> 잠깐, 소리 내게 하려고 하지 마아<emoji=heart04> 정말 부끄러우니까아<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「あっ、あっ、あぁぁぁんっっ<emoji=heart04>\u3000あ、ありがとう……さっきのとこが弱点だから……って、もう何度もセックスしてるから全部知ってるよね？」"
translation = "「앗, 앗, 아아아앙<emoji=heart04> 고, 고마워…… 방금 거기가 약점이라서……랄까, 이미 몇 번이나 섹스했으니까 전부 알고 있지?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「とにかくっ、射精しそうになるまで今のとこはダメだから。他の、えっちなヒダヒダでチ○ポごしごしこすって気持ちよくなってね<emoji=heart04>」"
translation = "「어쨌든, 사정할 것 같아질 때까지 방금 거기는 안 되니까. 다른, 야한 주름들로 자지 슥슥 비벼서 기분 좋아져 줘<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「はぁんっ<emoji=heart04>\u3000あぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000気持ちいい、よぉ<emoji=heart04>\u3000やっぱりキミとするセックス好きぃ<emoji=heart04>\u3000オナニーなんかじゃもう満足できないよぉ<emoji=heart04>」"
translation = "「하앙<emoji=heart04> 아앗<emoji=heart04> 앙<emoji=heart04> 기분 좋아아<emoji=heart04> 역시 너랑 하는 섹스 너무 좋아아<emoji=heart04> 자위 같은 걸론 이제 만족 못 하겠어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「早く……毎日セックス出来るようになったらいいのにっ<emoji=heart04>\u3000そしたら……朝も夜もずっと愛し合えるのに<emoji=heart04>\u3000昼間は、キミの精液おなかに入れたまんまで……<emoji=heart04>」"
translation = "「빨리…… 매일 섹스할 수 있게 되면 좋을 텐데에<emoji=heart04> 그러면…… 아침에도 밤에도 계속 사랑을 나눌 수 있을 텐데<emoji=heart04> 낮에는, 네 정액을 배 안에 넣은 채로……<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「あぁん、もうっ、えっちなことばっかり考えちゃう<emoji=heart04>\u3000んふっ、ふううぅっ<emoji=heart04>\u3000チ○ポ入れてもらってると、思考が全部ピンク色になって……ダメになっちゃうよぉ<emoji=heart04>」"
translation = "「아앙, 정말, 야한 생각만 하게 돼<emoji=heart04> 응훗, 후우우읏<emoji=heart04> 자지 넣어주고 있으면, 사고가 전부 핑크색이 돼서…… 바보가 되어버려어<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ねえ、もっと突いて。わたしがおかしくなるくらい、奥いじめていいから<emoji=heart04>\u3000お嫁さんま○こでじゅぽじゅぽして……いつもみたいにたっぷりザーメン出してぇっ<emoji=heart04>」"
translation = "「저기, 더 찔러줘. 내가 이상해질 정도로, 안쪽 괴롭혀도 되니까<emoji=heart04> 신부님 보지로 쥬폿쥬폿 하고…… 평소처럼 듬뿍 정액 내보내줘어<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「んおおっ<emoji=heart04>\u3000おおっ<emoji=heart04>\u3000おんっ<emoji=heart04>\u3000ぎもぢいいいぃ<emoji=heart04>\u3000イグッ<emoji=heart04>\u3000こんなのすぐイグ<emoji=heart04>\u3000イっぢゃううう～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응오옷<emoji=heart04> 오옷<emoji=heart04> 온<emoji=heart04> 기분 조아아아아<emoji=heart04> 가앗<emoji=heart04> 이런 거 금방 가앗<emoji=heart04> 가버려어어어어～～～～～<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「早くっ<emoji=heart04>\u3000キミも早く出してぇぇっっ<emoji=heart04>\u3000わたしっ、もうそんなに我慢できないからぁ<emoji=heart04>\u3000んうっ<emoji=heart04>\u3000もうダメっ<emoji=heart04>\u3000んあぁぁぁぁっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>」"
translation = "「빨리<emoji=heart04> 너도 빨리 내보내줘어어어<emoji=heart04> 나, 이제 그렇게 참을 수 없으니까아<emoji=heart04> 응읏<emoji=heart04> 이제 안 돼<emoji=heart04> 응아아아아앗<emoji=heart04> 하앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「んほおおおおぉぉっ<emoji=heart04>\u3000おおんっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000しゅごいっぃぃ～～<emoji=heart04>\u3000そこらめぇっ<emoji=heart04>\u3000らめなのおおぉぉっっ<emoji=heart04>」"
translation = "「응호오오오오옷<emoji=heart04> 오온<emoji=heart04> 오옷<emoji=heart04> 오옷<emoji=heart04> 대단해에에에～～<emoji=heart04> 거기 안 돼애<emoji=heart04> 안 된단 마랴아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「イグぅ<emoji=heart04>\u3000イっぢゃうぅぅ～～～っ<emoji=heart04>\u3000まだ？\u3000ザーメンまだなのぉ？\u3000出してっ<emoji=heart04>\u3000ザーメン出してっ<emoji=heart04>\u3000早く射精しでぇぇぇ～～～～っ<emoji=heart04>」"
translation = "「가버려어<emoji=heart04> 가버려어어어～～～<emoji=heart04> 아직이야? 정액 아직이야아? 내보내줘<emoji=heart04> 정액 내보내줘<emoji=heart04> 빨리 사정해줘어어어어～～～～<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「もう無理ぃぃ～～～っ<emoji=heart04>\u3000イグっ<emoji=heart04>\u3000イギ過ぎちゃうぅぅぅ<emoji=heart04>\u3000気持ちよくて馬鹿になっちゃうぅ～～っ<emoji=heart04>」"
translation = "「이제 무리이이～～～<emoji=heart04> 가앗<emoji=heart04> 너무 가버려어어어<emoji=heart04> 기분 좋아서 바보가 되어버려어～～<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「んおぉんっ<emoji=heart04>\u3000おほっ<emoji=heart04>\u3000ほおおっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000んおおおおおお～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응오온<emoji=heart04> 오홋<emoji=heart04> 호오옷<emoji=heart04> 오옷<emoji=heart04> 오옷<emoji=heart04> 응오오오오오오～～～～<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「おっきいの来ちゃう<emoji=heart04>\u3000イグっ<emoji=heart04>\u3000イグイグイグぅっ<emoji=heart04>\u3000イっグぅぅ～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「큰 거 와버려<emoji=heart04> 가앗<emoji=heart04> 가가각가버려엇<emoji=heart04> 가버려어어어어어어어어어어<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ふやぁぁっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000すっごい……ザーメンびゅるびゅる出てるぅ……<emoji=heart04>」"
translation = "「후야아아앗<emoji=heart04> 하앗<emoji=heart04> 하앗<emoji=heart04> 굉장해…… 정액 뷰루뷰루 나오고 있어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「今日最初の射精だから……んぅっ<emoji=heart04>\u3000量がすごいよぉ<emoji=heart04>\u3000こんなに出されたら、お嫁さんのおなかすぐいっぱいになっちゃうよぉ<emoji=heart04>」"
translation = "「오늘 첫 사정이라서…… 응읏<emoji=heart04> 양이 엄청나아<emoji=heart04> 이렇게나 내보내면, 신부님 배 금방 가득 차버려어<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ううっ……ふぁぁぁっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000びちゃびちゃ出てるね……んっ、チ○ポも嬉しそうに射精してるよ……んっ、お嫁さんま○こ、気持ちよかった？」"
translation = "「우우읏…… 파아아앗<emoji=heart04> 하앙<emoji=heart04> 비차비차 나오고 있네…… 응, 자지도 기쁜 듯이 사정하고 있어…… 응, 신부님 보지, 기분 좋았어?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「めっっちゃくちゃ……気持ちよかった……やっぱりトワちゃんのおま○こは最高だよ……」"
translation = "「어어어엄청나게…… 기분 좋았어…… 역시 토와 짱의 보지는 최고야……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「えへへ～、最初にしてからずっと、夢中だもんね<emoji=heart04>\u3000わたしも……同じくらいキミのチ○ポに夢中なんだけど<emoji=heart04>」"
translation = "「에헤헤~, 처음 하고 나서부터 계속, 푹 빠져있네<emoji=heart04> 나도…… 그만큼 네 자지에 푹 빠져있지만<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「んんっ……まだ出てるね……もう、そんなに気持ちよかったの？\u3000こんなに貯め込んじゃうなら、心配だから毎日ヌいてあげないとダメかもね<emoji=heart04>」"
translation = "「응응…… 아직 나오고 있네…… 정말, 그렇게나 기분 좋았어? 이렇게 쌓아둬 버린다면, 걱정되니까 매일 빼주지 않으면 안 될지도 모르겠네<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「はぁ……はぁ……ふぁぁぁっっ……んっ、そろそろ……射精終わりそうだね……ふふっ、わかるよ、もう何度もおなかに出してもらったもん<emoji=heart04>」"
translation = "「하아…… 하아…… 파아아아아…… 응, 슬슬…… 사정 끝날 것 같네…… 후훗, 알아, 벌써 몇 번이나 배 안에 내보내 줬는걸<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「やんっ、抜けちゃうっ……んんっ、やっぱり多すぎてどろぉって漏らしちゃった……もー、全部受け止めてあげたかったのにぃ<emoji=heart04>」"
translation = "「양, 빠져버려…… 응응, 역시 너무 많아서 주르륵 새버렸어…… 정말, 전부 받아내 주고 싶었는데에<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「はぁ……はぁ……でも……漏らしちゃった分はまた注いでもらえばいいし……」"
translation = "「하아…… 하아…… 하지만…… 새버린 만큼은 다시 채워달라고 하면 되고……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ねぇ……今日もまだ大丈夫だよね？\u3000もっとキミとセックスしたくて……ダメ？」"
translation = "「있지…… 오늘도 아직 괜찮지? 좀 더 너랑 섹스하고 싶어서…… 안 돼?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ダメじゃないよ。もちろん、もっとトワちゃんのお嫁さんま○こに射精するから覚悟してね」"
translation = "「안 될 거 없어. 물론, 좀 더 토와짱의 신부 보지에 사정할 테니까 각오해.」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「う、うん……改めてそう言われるとちょっと不安になっちゃうけど、でも激しいの、期待しちゃうんだから<emoji=heart04>」"
translation = "「으, 응…… 새삼 그렇게 들으니까 조금 불안해지지만, 그래도 격렬한 거, 기대해 버릴 거니까<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「今日は何回セックス出来るのかな～？」"
translation = "「오늘은 몇 번이나 섹스할 수 있으려나~?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「まあ、それはそれとして……またキミにいっぱい変な声出させられちゃったね<emoji=heart04>\u3000気持ちよかったからいいけど、ちょっぴり怒ってるんだから<emoji=heart04>」"
translation = "「뭐, 그건 그거고…… 또 너한테 잔뜩 이상한 소리 내게 되어버렸네<emoji=heart04> 기분 좋았으니까 괜찮지만, 조금 화났으니까<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「だから次は先生が、キミが大好きなフェラチオで、とことんチ○ポいじめしちゃうんだからねっ<emoji=heart04>\u3000覚悟するよーに<emoji=heart04>」"
translation = "「그러니까 다음은 선생님이, 네가 제일 좋아하는 펠라치오로, 철저하게 자지 괴롭혀 줄 거니까<emoji=heart04> 각오하도록<emoji=heart04>」"

