[[dialogue]]
speaker = "unk"
original = "俺がいない間も、当然、演劇部で稽古は続いていた。"
translation = "내가 없는 동안에도 당연히 연극부에선 연습이 계속되고 있었다."

[[dialogue]]
speaker = "unk"
original = "お疲れさまです"
translation = "수고 많으십니다"

[[dialogue]]
speaker = "メイプル"
original = "「やっと、お兄ちゃんが来てくれた～！」"
translation = "「드디어 오빠가 왔다~!」"

[[dialogue]]
speaker = "藍"
original = "「あっ……か、会長さん……お疲れさまです」"
translation = "「앗…… 회, 회장님…… 수고 많으세요.」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「いいところに来た。ウチの主演女優はモブの男性部員が相手だと、どうしてもぎこちなくなってしまうんでな。早速だが、すぐに入ってくれ、ロミオ」"
translation = "「좋은 때에 왔군. 우리 주연 여배우가 엑스트라 남자 부원이 상대면 아무래도 서툴러져서 말이다. 지체 말고 바로 들어와라, 로미오.」"

[[dialogue]]
speaker = "藍"
original = "「あっ……♪\u3000よ、よろしくお願いします、会長さん」"
translation = "「앗……♪ 자, 잘 부탁드립니다, 회장님.」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「おっ……？」"
translation = "「오……?」"

[[dialogue]]
speaker = "メイプル"
original = "「あれれ……？」"
translation = "「어라라……?」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「では、先ほどの続きから行くぞ。第一幕第五場。仮面舞踏会での出会い、そして、キスシーンだ！\u3000アクション！」"
translation = "「그럼 조금 전의 뒷부분부터 가겠다. 제1막 제5장. 가면무도회에서의 만남, 그리고 키스 장면이다! 액션!」"

[[dialogue]]
speaker = "unk"
original = "私の罪はあなたの唇によって清められました"
translation = "나의 죄는 당신의 입술에 의해 씻겨나갔습니다"

[[dialogue]]
speaker = "ジュリエット"
original = "「──んっ……どうしましょう、私の唇はあなたの罪で穢れてしまいました」"
translation = "「──음…… 어쩌지요, 제 입술은 당신의 죄로 더럽혀지고 말았네요.」"

[[dialogue]]
speaker = "unk"
original = "では、その罪を私に戻してもらいましょう"
translation = "그럼 그 죄를 내게 돌려받도록 합시다"

[[dialogue]]
speaker = "ジュリエット"
original = "「──んぅ……お上手な接吻ですこと」"
translation = "「──응…… 솜씨 좋은 입맞춤이군요.」"

[[dialogue]]
speaker = "メイプル"
original = "「ひゃあっ……！\u3000え、本当にはキスしてないよね？」"
translation = "「히얏……! 에, 진짜로 키스한 건 아니지?」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「本当にしてしまったのではと見間違うほどの熱の入り方だ。よし、これで欠けていたピースが埋まった！」"
translation = "「정말로 해버린 건 아닐까 착각할 정도로 열이 올랐군. 좋아, 이걸로 빠져있던 조각이 맞춰졌다!」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「会長！\u3000正式にロミオ役に採用だ」"
translation = "「회장! 정식으로 로미오 역에 채용하마.」"

[[dialogue]]
speaker = "unk"
original = "正式採用！？\n話が違う！"
translation = "정식 채용!?\\n말이 다르잖아요!"

[[dialogue]]
speaker = "ロクサーナ"
original = "「我が演劇部の誇る女優が、会長でなければ熱の入った演技ができないと言うのだ。ならば、そうするしかあるまい？」"
translation = "「우리 연극부가 자랑하는 여배우가 회장이 아니면 열정적인 연기를 할 수 없다지 않느냐. 그렇다면 그렇게 할 수밖에 없지 않겠나?」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「何か意見があるなら言ってみろ。少しくらい怒鳴られたところでヒビの入るような耳ではない」"
translation = "「무슨 의견이라도 있으면 말해 봐라. 조금 고함 듣는다고 해서 금이 갈 만큼 연약한 귀는 아니니까.」"

[[dialogue]]
speaker = "unk"
original = "演劇部でもないし、ほぼ素人なのに……"
translation = "연극부도 아니고 거의 초보인데……"

[[dialogue]]
speaker = "ロクサーナ"
original = "「なぁに、元よりこの世界は広大な舞台だ！\u3000老若男女、誰もがここでは一役を演じねばならん」"
translation = "「뭐냐, 원래부터 이 세상은 거대한 무대다! 남녀노소 누구나 여기선 한 역할을 연기해야만 하지.」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「その世界で星徒会長などという大任を演じてるお前が、たかが演劇部の、たかが文化祭の主役程度で、尻尾を丸めて逃げたりはすまい？」"
translation = "「그 세상에서 성도회장이라는 중책을 연기하고 있는 네가 고작 연극부의, 고작 문화제의 주역 정도로 꼬리를 말고 도망치지는 않겠지?」"

[[dialogue]]
speaker = "メイプル"
original = "「ほらほら、藍からもなんか一言言ってあげて！」"
translation = "「자자, 아이도 한마디 해 줘!」"

[[dialogue]]
speaker = "藍"
original = "「ロミオ様は私を捨てて、遠い海の向こうへと去ってしまいますの？」"
translation = "「로미오 님은 저를 버리고 머나먼 바다 너머로 떠나가 버리시는 건가요?」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「ははっ！\u3000だそうだ、ロミオ。愛するジュリエットからのたっての願いだぞ」"
translation = "「하하! 그렇다는데, 로미오. 사랑하는 줄리엣의 간곡한 부탁이라고.」"

[[dialogue]]
speaker = "藍"
original = "「ごめんなさい、会長さん。でも会長さんとなら、今まで知らなかった新しい演劇の世界が見えそうな気がするんです」"
translation = "「죄송해요, 회장님. 하지만 회장님과 함께라면 지금까지 몰랐던 새로운 연극의 세계가 보일 것 같은 기분이 들어요.」"

[[dialogue]]
speaker = "藍"
original = "「だから、今だけはわがままを言わせてください、ロミオ役、お願いします」"
translation = "「그러니까 지금만큼은 고집을 부리게 해 주세요. 로미오 역, 부탁드려요.」"

[[dialogue]]
speaker = "unk"
original = "ズルいなぁ……！\nやればいいんですよね、やれば"
translation = "비겁하다구요……!\\n하면 되잖아요, 하면"

[[dialogue]]
speaker = "ロクサーナ"
original = "「物分かりが良くて助かる。さぁ、文化祭まで残り期日はわずかだ。皆に発破でもかけてやれ、主演女優」"
translation = "「말귀가 밝아서 다행이군. 자, 문화제까지 남은 시일이 얼마 없다. 다들 기운 좀 북돋워 줘라, 주연 여배우.」"

[[dialogue]]
speaker = "藍"
original = "「わ、私がですか……え、えっと……！」"
translation = "「제, 제가요…… 에, 에또……!」"

[[dialogue]]
speaker = "藍"
original = "「え、演劇部ーっ、ファイト、オーッ！」"
translation = "「여, 연극부─, 파이팅, 오─!」"

[[dialogue]]
speaker = "メイプル"
original = "「おーーーーっ！」"
translation = "「오─────!」"

[[dialogue]]
speaker = "unk"
original = "それから、文化祭まで稽古の毎日。"
translation = "그 후로 문화제까지 매일 연습이 이어졌다."

[[dialogue]]
speaker = "ロクサーナ"
original = "「他人の視線を気にするんじゃない！\u3000お前が見ていいのは、愛するジュリエットただ１人だ！」"
translation = "「타인의 시선을 신경 쓰지 마라! 네가 봐야 할 건 사랑하는 줄리엣 단 한 사람뿐이다!」"

[[dialogue]]
speaker = "unk"
original = "仮の時とは比べ物にならないほど、容赦なくロクサーナに扱かれつつも──"
translation = "임시일 때와는 비교도 안 될 만큼 용서 없이 록사나에게 혹사당하면서도──"

[[dialogue]]
speaker = "unk"
original = "この毒の杯を、我が恋人のために！\n……乾杯！"
translation = "이 독배를 내 연인을 위해!\\n……건배!"

[[dialogue]]
speaker = "ジュリエット"
original = "「──ロミオ様の残してくださったこの短剣、私の胸こそがお前の鞘なのよ……ぐっ……！」"
translation = "「──로미오 님이 남겨주신 이 단검, 내 가슴이야말로 너의 칼집인 거야…… 윽……!」"

[[dialogue]]
speaker = "ジュリエット"
original = "「さぁ、そのまま。私を死なせて……」"
translation = "「자, 그대로. 나를 죽게 해 줘……」"

[[dialogue]]
speaker = "unk"
original = "新星学園演劇部の『ロミオとジュリエット』は確実に仕上がっていったのである。"
translation = "신성학원 연극부의 『로미오와 줄리엣』은 확실하게 완성되어 갔다."

[[dialogue]]
speaker = "unk"
original = "そして、文化祭前日。"
translation = "그리고 문화제 전날."

[[dialogue]]
speaker = "ロクサーナ"
original = "「遅い時間までご苦労。本公演の全稽古は、ここで終了だ。やれることは全てやった。厳しい期日の中、お前たちはよくやってくれた」"
translation = "「늦은 시간까지 고생했다. 본 공연의 모든 연습은 여기서 종료다. 할 수 있는 건 전부 했다. 촉박한 기일 속에서 너희는 잘해주었다.」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「本番の明日に向け、がっつりと美味い物を食い、しっかりと眠り、休養を取れ。体調不良を失敗の言い訳にはさせん」"
translation = "「실전인 내일을 향해 맛있는 것을 듬뿍 먹고, 푹 자고, 휴식을 취해라. 컨디션 불량을 실패의 핑계로 삼게 두지 않겠다.」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「お前らは成功の一瞬に辿り着くべく、藻掻いて、足掻いて、今の今まで頑張ってきたのだろう？」"
translation = "「너희는 성공의 순간에 도달하기 위해 발버둥 치고, 애쓰며 지금까지 노력해 왔겠지?」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「明日は今日まで培った全てを十全に振り絞れ。そうすれば、億が一にも失敗などありえん！」"
translation = "「내일은 오늘까지 쌓아온 모든 것을 온전히 쏟아부어라. 그러면 억만분의 일도 실패 따위 있을 수 없다!」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「以上だ、解散！」"
translation = "「이상이다, 해산!」"

