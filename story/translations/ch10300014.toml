[[dialogue]]
speaker = "unk"
original = "第４話,アヒルのぬいぐるみ,P"
translation = "제4화, 오리 인형"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「うぅ……困りました……」"
translation = "「으으…… 곤란하네요……」"

[[dialogue]]
speaker = "unk"
original = "どうかした？"
translation = "무슨 일이야?"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「あ。緋宮会長……」"
translation = "「아. 히노미야 회장님……」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「つかぬ事を伺いますが、クレーンゲームは得意でしょうか？」"
translation = "「뜬금없는 질문입니다만, 인형 뽑기는 잘하시나요?」"

[[dialogue]]
speaker = "unk"
original = "ゲームセンターの？\u3000欲しい物でもあるのか"
translation = "게임 센터의? 갖고 싶은 거라도 있어?"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「はい、お恥ずかしながら……どうしても入手したいものがあるんです」"
translation = "「네, 부끄럽지만…… 꼭 입수하고 싶은 게 있어요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「あいにくこの手の娯楽は経験がなく、ネットでコツなど調べてみたのですがうまくいかなくて……」"
translation = "「공교롭게도 이런 종류의 오락은 경험이 없어서 인터넷으로 요령 등을 찾아봤지만 잘 안 돼서……」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「プライズ限定商品なので定価で求めるという手も使えません」"
translation = "「경품 한정 상품이라 정가로 구한다는 수법도 쓸 수 없습니다.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「おまけに店員様の会話を傍受したところ、もうすぐ景品の入れ替えを行うと仰っていました……時間の猶予もないのです……」"
translation = "「게다가 점원분들의 대화를 도청한 결과, 곧 경품 교체를 한다고 하시더군요…… 시간적 여유도 없습니다……」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「果敢に挑みましたが、お小遣いもすっかりなくなってしまいました……」"
translation = "「과감하게 도전했지만 용돈도 다 떨어져 버렸습니다……」"

[[dialogue]]
speaker = "unk"
original = "じゃあ、俺が取ってあげよう"
translation = "그럼 내가 뽑아줄게"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「いいのですか？\u3000もしや緋宮会長は、クレームゲームの名手なのでしょうか」"
translation = "「그래도 됩니까? 혹시 히노미야 회장님은 인형 뽑기의 명수이신가요?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「お手伝いいただけるのでしたら嬉しいです。よろしくお願いいたします……！」"
translation = "「도와주신다면 기쁘겠습니다. 잘 부탁드립니다……!」"

[[dialogue]]
speaker = "unk"
original = "ナミエルに頼られるということはあまり経験がない。"
translation = "나미엘이 의지해 오는 일은 별로 경험이 없다."

[[dialogue]]
speaker = "unk"
original = "ここはどんな手を使ってでも、景品を入手してみせよう！"
translation = "여기는 어떤 수를 써서라도 경품을 입수해 보이겠어!"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「……あんな手があるだなんて聞いていないです」"
translation = "「……저런 방법이 있을 줄은 듣지 못했습니다.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「店員様を呼んで、取りやすい位置に置いてもらうよう要求できるだなんて……」"
translation = "「점원을 불러서 뽑기 쉬운 위치에 놓아달라고 요구할 수 있다니……」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「知っていれば私のお小遣いも無駄には……いえ、過ぎたことです。経費と割り切りましょう」"
translation = "「알고 있었다면 제 용돈도 낭비하지 않았을…… 아니요, 지난 일입니다. 경비라고 생각하죠.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「緋宮会長、ありがとうございます。どうしても欲しかったんです、このアヒルのぬいぐるみ」"
translation = "「히노미야 회장님, 감사합니다. 정말 갖고 싶었어요, 이 오리 인형.」"

[[dialogue]]
speaker = "unk"
original = "ぬいぐるみ、好きだったんだ？"
translation = "인형을 좋아했구나?"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「……ええ。子どもっぽい趣味ですが、私の数少ない趣味です。可愛い物には目がなくって」"
translation = "「……네. 어린애 같은 취미지만 제 몇 안 되는 취미입니다. 귀여운 것에는 사족을 못 써서요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「中でもこのアヒルのぬいぐるみは特別です。……似たものを、ずっと探していたんです」"
translation = "「그중에서도 이 오리 인형은 특별합니다. ……비슷한 것을 계속 찾고 있었거든요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「小さい頃、両親にもらったぬいぐるみ。もう失くしてしまったのですが……でも記憶には焼き付いていましたから」"
translation = "「어릴 적 부모님께 받은 인형. 이미 잃어버렸지만…… 그래도 기억에는 선명하게 남아 있었으니까요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「いつかもう一度、手に取りたい。ずっとそう思っていたんですよ」"
translation = "「언젠가 다시 한번 손에 넣고 싶다. 계속 그렇게 생각하고 있었어요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「そういえば……緋宮会長には私の生い立ちを話したことはありませんでしたね」"
translation = "「그러고 보니…… 히노미야 회장님께 제 출생에 대해 이야기한 적은 없었죠.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「実は私、メイド隊に所属する前は……とある犯罪組織に身を置いていたのです」"
translation = "「사실 저, 메이드대에 소속되기 전에는…… 어떤 범죄 조직에 몸을 담고 있었습니다.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「両親が事故で他界した後、幼かった私はそこが悪いところだと知らぬままに引き取られてしまい……」"
translation = "「부모님이 사고로 돌아가신 뒤, 어렸던 저는 그곳이 나쁜 곳인 줄 모른 채 거둬졌고……」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「そこで私は、ターゲットを殺して自分も自決する、いわば使い捨ての暗殺者としての訓練を受けました」"
translation = "「그곳에서 저는 타겟을 죽이고 자신도 자결하는, 말하자면 일회용 암살자로서 훈련을 받았습니다.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「そして３年ほど前にこの流星市国にやってきました。星見フィオナ暗殺の命を受けて」"
translation = "「그리고 3년 전쯤 이 유성시국에 왔습니다. 호시미 피오나 암살 명을 받고.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「──ですが、メイド長に阻止されました。これでも一応組織の中では凄腕の部類だったのですけれど」"
translation = "「──하지만 메이드장님께 저지당했죠. 이래 봬도 일단 조직 안에서는 실력자 부류였습니다만.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「私がいた組織は、もうありません。幼い子どもを暗殺者に仕立て上げる……そんな行いがお嬢様の逆鱗に触れまして」"
translation = "「제가 있던 조직은 이제 없습니다. 어린아이를 암살자로 키우다니…… 그런 행위가 아가씨의 역린을 건드려서요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「星見家や九浄家の力で消された、と聞いております」"
translation = "「호시미 가문이나 쿠죠 가문의 힘으로 지워졌다고 들었습니다.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「暗殺者だった私は星見家に引き取られ、メイドとして雇用されました。本当にお嬢様は人が良すぎますよね」"
translation = "「암살자였던 저는 호시미 가문에 거둬져 메이드로 고용되었습니다. 정말 아가씨는 사람이 너무 좋으세요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「おかしな組織にいた私は一般常識にも疎く……それからは色々なものを勉強するように言われました」"
translation = "「이상한 조직에 있던 저는 일반 상식에도 어두워서…… 그때부터는 여러 가지를 공부하라는 말을 들었습니다.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「『普通』というものに、たくさん触れていきなさい、と」"
translation = "「『평범함』이라는 것을 많이 접해 나가라고요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「このぬいぐるみは、私の『普通』の象徴なのです。幼い頃、とても幸せだった頃……両親からプレゼントされたアヒルのぬいぐるみ」"
translation = "「이 인형은 제 『평범함』의 상징입니다. 어릴 적, 무척 행복했던 시절…… 부모님께 선물 받은 오리 인형.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「少しでも似たものを見つけたくていつも探し回っていました」"
translation = "「조금이라도 닮은 것을 찾고 싶어서 늘 찾아다녔습니다.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「……これ、本当にそっくりです。ありがとうございます。緋宮会長」"
translation = "「……이거, 정말 똑같아요. 감사합니다. 히노미야 회장님.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「両親との思い出に触れられた気がしました」"
translation = "「부모님과의 추억을 만난 기분이 들었습니다.」"

[[dialogue]]
speaker = "unk"
original = "どういたしまして"
translation = "천만에"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ふふっ……元暗殺者、と伝えても態度が変わらないんですね。やっぱりあなたは、お嬢様に似ています」"
translation = "「후훗…… 전직 암살자라고 말해도 태도가 변하지 않으시네요. 역시 당신은 아가씨를 닮았습니다.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「とっても優しくて、とっても温かい」"
translation = "「무척 상냥하고, 무척 따뜻해요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「……たまにえっちな時もありますけれど」"
translation = "「……가끔 야할 때도 있지만요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「あの、これからも私と一緒に過ごしていただけますか？\u3000学べなかった色々なことを緋宮会長と共に触れていきたいんです」"
translation = "「저기, 앞으로도 저와 함께 지내주실 수 있나요? 배우지 못한 여러 가지 것들을 히노미야 회장님과 함께 접해 나가고 싶어요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「──はい。昔のことを自ら話したのは、あなたが初めてです。秘密を知られたからには、距離を取るわけにはいきません」"
translation = "「──네. 옛날 일을 스스로 이야기한 건 당신이 처음입니다. 비밀을 알게 된 이상 거리를 둘 수는 없으니까요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「これからもどうぞよろしくお願いいたしますね。緋宮会長」"
translation = "「앞으로도 잘 부탁드립니다. 히노미야 회장님.」"

