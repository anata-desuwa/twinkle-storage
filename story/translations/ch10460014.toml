[[dialogue]]
speaker = "unk"
original = "第４話,瞳を開いて,P"
translation = "제4화, 눈동자를 뜨고, P"

[[dialogue]]
speaker = "unk"
original = "閃と話すようになってから、数ヶ月が経ったある日のこと――"
translation = "센과 이야기하게 된 지 몇 달이 지난 어느 날――"

[[dialogue]]
speaker = "閃"
original = "「会長さん。お嬢様の指示とはいえ、困ったことになってしまいましたね……」"
translation = "「회장님. 아가씨의 지시라고는 하지만, 곤란하게 되어버렸네요……」"

[[dialogue]]
speaker = "閃"
original = "「まさか私と会長さん、２人のコンビネーション技を開発して来いだなんて……」"
translation = "「설마 저와 회장님, 두 사람의 콤비네이션 기술을 개발해 오라니……」"

[[dialogue]]
speaker = "unk"
original = "いつもながら、なかなかの無茶振り……"
translation = "언제나 그렇지만, 꽤나 무리한 요구네……"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスが突然思いつき、「最近仲が良いみたいだから、戦闘中の連携も強化しておきなさい！」と言い出したのだった。"
translation = "비너스가 갑자기 생각나서, 「요즘 사이가 좋은 것 같으니까 전투 중의 연계도 강화해 두렴!」이라고 말하기 시작한 것이었다."

[[dialogue]]
speaker = "閃"
original = "「どうしましょうか、会長さん」"
translation = "「어쩌죠, 회장님」"

[[dialogue]]
speaker = "閃"
original = "「一緒に訓練して、連携を強化することは賛成ですし、出来ると思いますが……」"
translation = "「함께 훈련해서 연계를 강화하는 것에는 찬성이고, 할 수 있다고 생각합니다만……」"

[[dialogue]]
speaker = "閃"
original = "「お嬢様の要望は、あくまでコンビネーション技……２人の必殺技なんですよね……」"
translation = "「아가씨의 요망은 어디까지나 콤비네이션 기술…… 두 사람의 필살기니까요……」"

[[dialogue]]
speaker = "unk"
original = "とりあえず、やってみようか"
translation = "일단 해볼까"

[[dialogue]]
speaker = "unk"
original = "考えていても仕方ない"
translation = "생각만 해도 소용없어"

[[dialogue]]
speaker = "閃"
original = "「……そうですね、お嬢様がこの場に居たら、会長さんと同じことを言うはずです」"
translation = "「……그렇네요, 아가씨가 이 자리에 있었다면 회장님과 똑같은 말을 했을 거예요」"

[[dialogue]]
speaker = "閃"
original = "「何事もまずは挑戦っ。会長さんの相方、全力で務めさせていただきます！」"
translation = "「무엇이든 우선은 도전. 회장님의 파트너, 전력으로 맡겠습니다!」"

[[dialogue]]
speaker = "閃"
original = "「……と意気込んでみたものの、やはり簡単には行きませんね」"
translation = "「……라고 의욕을 내보았지만, 역시 쉽지는 않네요」"

[[dialogue]]
speaker = "unk"
original = "ごめん、俺が足を引っ張ってるな"
translation = "미안, 내가 발목을 잡고 있네"

[[dialogue]]
speaker = "閃"
original = "「いえ、私は星眼で未来を予知しているわけですから、会長さんの技量はむしろ驚くべき高さです」"
translation = "「아니요, 저는 성안으로 미래를 예지하고 있는 거니까, 회장님의 기량은 오히려 놀라울 정도로 높아요」"

[[dialogue]]
speaker = "閃"
original = "「反省すべきは私の方です……。会長さんと息を合わせようと星眼の出力を落とすと、素の技量ではまるで会長さんに及びません」"
translation = "「반성해야 할 쪽은 저예요……. 회장님과 호흡을 맞추려고 성안의 출력을 낮추면, 본래의 기량으로는 도저히 회장님께 미치지 못해요」"

[[dialogue]]
speaker = "閃"
original = "「会長さんがいかに多くの実戦をくぐり抜けてきたのか、逆に自分の剣術がいかに星眼頼りだったのかを痛感します……」"
translation = "「회장님이 얼마나 많은 실전을 헤쳐 나오셨는지, 반대로 제 검술이 얼마나 성안에 의존하고 있었는지를 통감하게 돼요……」"

[[dialogue]]
speaker = "閃"
original = "「こんな未熟な私では、会長さんとコンビネーション技を作り出すなんて、とても――」"
translation = "「이런 미숙한 저로서는 회장님과 콤비네이션 기술을 만들어 내는 건 도저히――」"

[[dialogue]]
speaker = "unk"
original = "ならあえて、星眼を全力解放しよう"
translation = "그렇다면 차라리 성안을 전력 해방하자"

[[dialogue]]
speaker = "閃"
original = "「いくら会長さんの技量が高くても、星眼と同じレベルで未来が見えるわけじゃありません」"
translation = "「아무리 회장님의 기량이 높다고 해도, 성안과 같은 레벨로 미래가 보이는 건 아니에요」"

[[dialogue]]
speaker = "閃"
original = "「やっぱり、私の方が会長さんに合わせるべき――」"
translation = "「역시 제가 회장님께 맞춰야――」"

[[dialogue]]
speaker = "unk"
original = "閃の動きなら予測できる"
translation = "센의 움직임이라면 예측할 수 있어"

[[dialogue]]
speaker = "unk"
original = "未来は予測できなくても"
translation = "미래는 예측할 수 없어도"

[[dialogue]]
speaker = "閃"
original = "「……え？」"
translation = "「……에?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「……昔、交通事故に遭ったトラウマで、星眼が解除できない？」"
translation = "「……옛날에 교통사고를 당했던 트라우마로 성안을 해제할 수 없다고?」"

[[dialogue]]
speaker = "閃"
original = "「はい……出力を落とすことは出来ます。だけど……起きている間は、どうしても能力を解除する勇気が持てないんです……」"
translation = "「네…… 출력을 낮출 수는 있어요. 하지만…… 깨어 있는 동안에는 아무래도 능력을 해제할 용기가 나지 않아요……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「なるほどね！\u3000確かに未来を見れる力があったら、それが見えなくなるのは怖いことかもしれないわ」"
translation = "「그렇구나! 확실히 미래를 볼 수 있는 힘이 있다면, 그걸 볼 수 없게 되는 건 무서운 일일지도 몰라」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「でも、大丈夫。いつかそんなトラウマを忘れちゃうくらい、一緒にさえ居れば安心できる人が現れるはずよ！」"
translation = "「하지만 괜찮아. 언젠가 그런 트라우마를 잊어버릴 정도로, 같이 있기만 해도 안심할 수 있는 사람이 나타날 거야!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「根拠？\u3000もちろんあるわ！\u3000だって私は今、自分のピンチが想像できないくらい、センちゃんの護衛を信頼しているんだもの！」"
translation = "「근거? 물론 있지! 왜냐하면 나는 지금 내 위기를 상상할 수 없을 정도로 센 짱의 호위를 신뢰하고 있는걸!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あなたにだってそういう相手が現れるわ。必ずよ！\u3000だって人生は、サイオウ窯なんだから……！」"
translation = "「너에게도 그런 상대가 나타날 거야. 반드시! 왜냐하면 인생은 새옹지마니까……!」"

[[dialogue]]
speaker = "閃"
original = "（凄い……！\u3000会長さんの動きがどんどんキレを増して来てます。これなら、本当に……！）"
translation = "(대단해……! 회장님의 움직임이 점점 날카로워지고 있어. 이렇다면 정말로……!)"

[[dialogue]]
speaker = "unk"
original = "閃、今だ！"
translation = "센, 지금이야!"

[[dialogue]]
speaker = "閃"
original = "「はい！\u3000はあぁぁぁっ！」"
translation = "「네! 하아아앗!」"

[[dialogue]]
speaker = "閃"
original = "「本当に……星眼の予測に追いつきました！」"
translation = "「정말로…… 성안의 예측을 따라잡았어요!」"

[[dialogue]]
speaker = "unk"
original = "やったな、閃！"
translation = "해냈구나, 센!"

[[dialogue]]
speaker = "閃"
original = "「会長さん、本当に凄いです……！\u3000蓋を開けてみたら、わずか数時間で技の完成が見えるところまで漕ぎ着けました……！」"
translation = "「회장님, 정말 대단해요……! 뚜껑을 열어보니 불과 몇 시간 만에 기술의 완성이 보이는 곳까지 도달했어요……!」"

[[dialogue]]
speaker = "閃"
original = "（私が後ろ向きになっていたところで背中を押してくれたポジティブさ。気付けば周囲を導いて問題を解決しているカリスマ性）"
translation = "(내가 소극적이 되어 있을 때 등을 밀어준 긍정적인 면. 어느새 주위를 이끌어 문제를 해결하는 카리스마)"

[[dialogue]]
speaker = "閃"
original = "（会長さんはそう……どこか、お嬢様に似ているような――」）"
translation = "(회장님은 그래…… 어딘가 아가씨를 닮은 것 같은――)"

[[dialogue]]
speaker = "閃"
original = "「ただ、会長さん。どうして私の攻撃に合わせられたんですか？」"
translation = "「그나저나 회장님. 어떻게 제 공격에 맞출 수 있었던 건가요?」"

[[dialogue]]
speaker = "unk"
original = "閃の動きは信用……いや、信頼できるから"
translation = "센의 움직임은 신용…… 아니, 신뢰할 수 있으니까"

[[dialogue]]
speaker = "閃"
original = "「えっ」"
translation = "「엣」"

[[dialogue]]
speaker = "閃"
original = "「会長さんは、私のことを……その……し、信頼って、つまりどういう……」"
translation = "「회장님은 저를…… 그…… 시, 신뢰라는 건 즉 어떤……」"

[[dialogue]]
speaker = "閃"
original = "「って、会長さん！？\u3000い、いきなり近付いて来て、どうしたんですか？」"
translation = "「잠깐, 회장님!? 가, 갑자기 다가와서 왜 그러세요?」"

[[dialogue]]
speaker = "unk"
original = "本当に、凄く綺麗だなと思って"
translation = "정말로 아주 예쁘다고 생각해서"

[[dialogue]]
speaker = "unk"
original = "閃が瞳を開いたところ、初めて見たから"
translation = "센이 눈을 뜬 모습, 처음 봤으니까"

[[dialogue]]
speaker = "閃"
original = "「なっ……！\u3000ななな、な……っ！」"
translation = "「나……! 나나나, 나……!」"

[[dialogue]]
speaker = "閃"
original = "「喉が乾いてしまったので水分補給に行ってきます～～～っ！」"
translation = "「목이 말라서 수분 보충하러 다녀오겠습니다~~~!」"

[[dialogue]]
speaker = "閃"
original = "（会長さん相手に、何をドキッとしているんですか、私は……！）"
translation = "(회장님을 상대로 뭘 두근거리고 있는 건가요, 저는……!)"

[[dialogue]]
speaker = "閃"
original = "（私にはそもそも、お嬢様というものが……でも……）"
translation = "(저에게는 애초에 아가씨라는 존재가…… 하지만……)"

[[dialogue]]
speaker = "閃"
original = "（ううんっ。ちがう、違うの……っ！\u3000この胸の高鳴りは、違うんです……！）"
translation = "(아니야. 아니야, 아니라고……! 이 가슴의 고동은 다른 거예요……!)"

[[dialogue]]
speaker = "unk"
original = "否定しつつも、先程言われたことを思い出すたびに、どうしようもなく顔が熱くなってしまう閃なのだった。"
translation = "부정하면서도 방금 들은 말을 떠올릴 때마다 어쩔 수 없이 얼굴이 뜨거워져 버리는 센이었다."

