[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「はぁ、気持ちいい～♪\u3000夏の太陽は格別ですね♪\u3000力強くて、雄々しくて、とてもギラギラしていて♪」"
translation = "「하아, 기분 좋아~♪ 여름 태양은 각별하네요♪ 힘차고, 씩씩하고, 무척 이글이글거려서♪」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「本当に日の光を浴びるのが好きなんだな。ここのところ毎日、日光浴に来てるじゃないか」"
translation = "「정말로 햇볕 쬐는 걸 좋아하는구나. 요즘 매일같이 일광욕하러 오고 있잖아」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「浴びられる間に、たっぷり浴びておきたいですから♪」"
translation = "「쬘 수 있을 때, 듬뿍 쬐어두고 싶으니까요♪」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「別に無理して付き合わなくてもいいですよ？\u3000会長さんはもっと涼しい場所に行ってくれても」"
translation = "「굳이 무리해서 같이 있어 주지 않아도 괜찮아요? 회장님은 좀 더 시원한 곳으로 가셔도」"

[[dialogue]]
speaker = "unk"
original = "確かに夏の日差しを浴び続けるのは辛いものがある。"
translation = "확실히 여름 햇살을 계속 받는 것은 괴로운 면이 있다."

[[dialogue]]
speaker = "unk"
original = "ベアトのように余程日光浴が好きでもない限り、影に入りたいというのが人情だ。"
translation = "베아트처럼 어지간히 일광욕을 좋아하는 게 아닌 이상, 그늘로 들어가고 싶은 것이 인지상정이다."

[[dialogue]]
speaker = "unk"
original = "でも──"
translation = "하지만──"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「嘘です……<emoji=heart04>\u3000無理してでも、付き合って欲しいです<emoji=heart04>」"
translation = "「거짓말이에요……<emoji=heart04> 무리해서라도, 같이 있어 줬으면 좋겠어요<emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「一秒でも長く一緒にいたいですから……<emoji=heart04>\u3000イチャイチャしながら、んっ、ちゅっ、太陽の光、浴びたいです<emoji=heart04>」"
translation = "「일 초라도 더 길게 함께 있고 싶으니까……<emoji=heart04> 꽁냥거리면서, 응, 츄, 태양 빛, 쬐고 싶어요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "甘えるようにベアトが抱きついてきてくれる。"
translation = "어리광 부리듯 베아트가 매달려 온다."

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ん……<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000ふっ……ちゅ、ちゅ、んちゅっ<emoji=heart04>」"
translation = "「응……<emoji=heart04> 츄<emoji=heart04> 후……츄, 츄, 응츄<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ぴとりと肌を密着させて。唇を<ruby>啄<rt>ついば</rt></ruby>んできてくれて。"
translation = "착 하고 피부를 밀착시키며. 입술을 쪼아 온다."

[[dialogue]]
speaker = "unk"
original = "俺も同じ気持ちだから、こうして毎日、真夏の日光浴に付き合っちゃうんだろう。"
translation = "나도 같은 마음이니까, 이렇게 매일 한여름의 일광욕에 동참하게 되는 거겠지."

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「えへへ、キスしてたらムラムラしてきちゃいました……<emoji=heart04>」"
translation = "「에헤헤, 키스했더니 몸이 달아올라 버렸어요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「周りに誰もいませんし、エッチしませんか？\u3000エッチしたいです……<emoji=heart04>」"
translation = "「주변에 아무도 없는데, 섹스하지 않을래요? 섹스하고 싶어요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「うんと日差しの強いところで……<emoji=heart04>\u3000うんとイチャイチャしたいです……<emoji=heart04>」"
translation = "「아주 햇살이 강한 곳에서……<emoji=heart04> 아주 많이 꽁냥거리고 싶어요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「あっ──……<emoji=heart04>」"
translation = "「앗──……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「はぁはぁ、えへへ……<emoji=heart04>\u3000とっても熱い、会長さんのおち○ちん、あの太陽みたいです……<emoji=heart04>」"
translation = "「하아 하아, 에헤헤……<emoji=heart04> 정말 뜨거워요, 회장님의 자지, 저 태양 같아요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「いつも以上に力強くて、雄々しくて、ギラギラしてます……<emoji=heart04>\u3000興奮、してくれてるんですか……？」"
translation = "「평소보다 힘차고, 씩씩하고, 이글거리고 있어요……<emoji=heart04> 흥분, 해주신 건가요……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ベアトの水着を見てたらこうもなるよ」"
translation = "「베아트의 수영복을 보고 있으면 이렇게도 된다고.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「あぁあん……<emoji=heart04>\u3000えへへ、いつもは暗い場所でこっそりエッチしてばかりでしたもんね……<emoji=heart04>」"
translation = "「아아앙……<emoji=heart04> 에헤헤, 평소에는 어두운 곳에서 몰래 섹스만 했었으니까요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ちょっぴり恥ずかしいです……<emoji=heart04>\u3000こんなに明るい場所で何もかも丸見えに見られて……<emoji=heart04>」"
translation = "「조금 부끄러워요……<emoji=heart04> 이렇게 밝은 곳에서 하나부터 열까지 전부 다 보여서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「だけど私も、いつも以上に興奮しちゃってます……<emoji=heart04>」"
translation = "「하지만 저도, 평소보다 더 흥분해버렸어요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「一度でいいから、お外で太陽の光を浴びながらエッチしたいって思ってましたから……<emoji=heart04>」"
translation = "「한 번이라도 좋으니까, 밖에서 태양 빛을 받으면서 섹스하고 싶다고 생각했었거든요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "軽く割れ目に擦り付けるだけで、熱い蜜が溢れ、ペニスをびしょびしょに濡らしてくる。"
translation = "살짝 가랑이 사이에 문지르는 것만으로도, 뜨거운 애액이 넘쳐흘러 페니스를 흠뻑 적셔온다."

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「はぁ……会長さんに見られて、恥ずかしくて……体が熱くなっちゃいますっ……<emoji=heart04>」"
translation = "「하아…… 회장님이 보고 계셔서, 부끄러워서…… 몸이 뜨거워져 버려요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "愛液で濡れた膣口が、ひくひくといやらしく男を求める。"
translation = "애액으로 젖은 질구가, 벌름벌름하며 상스럽게 남자를 원한다."

[[dialogue]]
speaker = "unk"
original = "そして燦々と輝く太陽に照らされたベアトの火照り顔を見た時には、もう我慢できなかった。"
translation = "그리고 눈부시게 빛나는 태양에 비친 베아트의 상기된 얼굴을 보았을 때는, 이미 참을 수 없었다."

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「はぁああんっ……<emoji=heart04>\u3000おっきいっ、あっついっ、あっ、ふぁああんっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하아아앙……<emoji=heart04> 커요, 뜨거워, 앗, 화아앙……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ゆっくり出し入れされてるだけでも、んあぁあっ<emoji=heart04>\u3000茹だっちゃいそうですっ……<emoji=heart04>」"
translation = "「천천히 넣었다 빼는 것만으로도, 응아아앗<emoji=heart04> 데워질 것 같아요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「会長さんのおち○ちん、本当にギンギンでっ……<emoji=heart04>\u3000おま○こ、火傷させられちゃいそうなくらいグツグツでっ……<emoji=heart04>」"
translation = "「회장님의 자지, 정말 빳빳해서……<emoji=heart04> 보지, 화상 입어버릴 정도로 부글부글해서……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ベアトの中は熱い蜜で溢れていて、俺の方こそ茹だってしまいそうだ。"
translation = "베아트의 안은 뜨거운 애액으로 넘쳐나고 있어서, 내 쪽이야말로 데워져 버릴 것 같다."

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ふぁっ、恥ずかしっ……<emoji=heart04>\u3000愛液っ、あっ、はぁっ、いっぱい溢れちゃってますっ……<emoji=heart04>」"
translation = "「화앗, 부끄러워……<emoji=heart04> 애액, 앗, 하앗, 잔뜩 흘러넘치고 있어요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「会長さんのおち○ちんの熱で……はあぁっ……私の中まで熱くなって<emoji=heart04>\u3000はぁっ、はっ……すごい……<emoji=heart04>」"
translation = "「회장님의 자지 열기 때문에…… 하아아…… 제 안까지 뜨거워져서<emoji=heart04> 하앗, 하…… 대단해……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「私のおま○こ、おつゆ垂れ流して、くぱくぱヒクつきながらっ<emoji=heart04>\u3000どんどんやらしく、開いていっちゃいますっ<emoji=heart04>」"
translation = "「제 보지, 국물을 질질 흘리면서, 뻐끔뻐끔 벌름거리며<emoji=heart04> 점점 상스럽게, 벌어져 가요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ひと突きごとに、ベアトの膣内が柔らかくほぐれていく。"
translation = "한 번 찌를 때마다, 베아트의 질 내부가 부드럽게 풀려간다."

[[dialogue]]
speaker = "unk"
original = "俺のペニスを奥へ奥へと呑み込んでいって、凄まじい熱と、蕩けるような肉感で包み込む。"
translation = "내 페니스를 안으로 안으로 집어삼키며, 엄청난 열기와 녹아내릴 듯한 육감으로 감싸 안는다."

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「あぁあんっ、ダメぇっ……<emoji=heart04>\u3000明るい場所でエッチすると、こんなに……はぁ、はっ……ああぁっ<emoji=heart04>」"
translation = "「아아앙, 안 돼……<emoji=heart04> 밝은 곳에서 에치하면, 이렇게나…… 하아, 하앗…… 아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「見えますかっ<emoji=heart04>\u3000私のおま○こがっ<emoji=heart04>\u3000会長さんのおち○ちんを、やらしく咥え込んでるのっ<emoji=heart04>」"
translation = "「보이나요<emoji=heart04> 제 보지가<emoji=heart04> 회장님의 자지를 야하게 물고 있는 게<emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「あっ、あっ……強いぃ……ひぃああああんっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000<ruby>膣内<rt>なか</rt></ruby>えぐられっ──イクっ、イクぅぅっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗, 앗…… 강해…… 히이아아앙<emoji=heart04><emoji=heart04><emoji=heart04> 질 내가 파헤쳐져서── 가, 가버렷<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「あんまり、がっつかないでくださいっ<emoji=heart04>\u3000私いま、あっ、あっ、灰になっちゃいそうなくらい全身熱くなっててぇっ……<emoji=heart04>」"
translation = "「너무 서두르지 말아 주세요<emoji=heart04> 저 지금, 앗, 앗, 재가 되어버릴 정도로 온몸이 뜨거워져서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「少し強めに突き上げられるだけでも──あひぃんっ<emoji=heart04>\u3000あぁあああっっ<emoji=heart04><emoji=heart04>\u3000すぐイっちゃうくらい敏感になってるんですぅ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「조금 강하게 쳐올려지는 것만으로도── 아히잉<emoji=heart04> 아아아앗<emoji=heart04><emoji=heart04> 금방 가버릴 정도로 민감해져 있다고요<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ズンと腰を押し込むだけで、ベアトの膣内がぎゅっと締まる。"
translation = "즈윽 하고 허리를 밀어 넣는 것만으로도, 베아트의 질 내가 꽉 조여진다."

[[dialogue]]
speaker = "unk"
original = "柔らかく肉厚な感触をこれでもかと味わい、ついついペニスを突きだしてしまう。"
translation = "부드럽고 두툼한 감촉을 마음껏 맛보며, 나도 모르게 페니스를 내지르고 만다."

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「あっ、あっ、あっ、あっ<emoji=heart04>\u3000ダメっ、ダメですってばぁっ<emoji=heart04>」"
translation = "「앗, 앗, 앗, 앗<emoji=heart04> 안 돼, 안 된다니까요<emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ただでさえ、お日様の真下でエッチしちゃってるのにっ……<emoji=heart04>\u3000隠れもせずにセックスしちゃってるのにっ……<emoji=heart04>」"
translation = "「안 그래도 햇님 바로 아래에서 에치해버리고 있는데……<emoji=heart04> 숨지도 않고 섹스해버리고 있는데……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「そんなに突かれたら──んふぁぁあんっ<emoji=heart04>\u3000声出ちゃうっ、もっと目立っちゃうっ、誰かに気付かれちゃうっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「그렇게 찔러대면── 응화아앙<emoji=heart04> 목소리 나와버려, 더 눈에 띄어버려, 누군가에게 들켜버려요……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「私のおま○こに、おち○ちんズポズポされてるところっ……<emoji=heart04>\u3000ビーチにいる人に、あっ、あっ、見られちゃいますぅ<emoji=heart04>」"
translation = "「제 보지에 자지가 즈포즈포 당하는 거……<emoji=heart04> 비치에 있는 사람한테, 앗, 앗, 들켜버려요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "晴天の下、輝く太陽のおかげで離れた海の家まで見える。"
translation = "쾌청한 하늘 아래, 빛나는 태양 덕분에 멀리 떨어진 바다의 집까지 보인다."

[[dialogue]]
speaker = "unk"
original = "遠くのビーチで、豆粒大の人々が大勢遊んでいるのがわかった。"
translation = "멀리 떨어진 비치에서, 콩알만 한 사람들이 잔뜩 놀고 있는 것이 보였다."

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ふぁっ、あぁあんっ、ビーチボールで遊んでる人が見えますっ……<emoji=heart04>\u3000砂のお城作ってる人が見えますっ……<emoji=heart04>」"
translation = "「화앗, 아아앙, 비치볼로 놀고 있는 사람이 보여요……<emoji=heart04> 모래성을 만들고 있는 사람이 보여요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「きっと、向こうからも私たちの姿が──～～っっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「분명, 저쪽에서도 우리 모습이── ~~읏<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ダメっ、ふぁああああっ、体がっ、心がっ、おま○こがっ、ゾクゾクするっ……<emoji=heart04>\u3000イクっ、イっちゃっっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「안 돼, 화아아아아, 몸이, 마음이, 보지가, 조마조마해……<emoji=heart04> 가버려, 가버려엇……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「もしかして私たちっ、とってもイケナイことしてるんじゃっ<emoji=heart04>」"
translation = "「혹시 우리, 엄청나게 못된 짓을 하고 있는 게 아닐까요<emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「こんな遮るものも何もない場所でっ、あっ、はぁっ、あぁっ、照りつける太陽の真下で、エッチしてっ……<emoji=heart04>」"
translation = "「이런 가리는 것도 아무것도 없는 장소에서, 앗, 하앗, 아앗, 내리쬐는 태양 바로 아래에서 에치하고……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「まるで変態さんみたい、ですっ……<emoji=heart04>\u3000明るいビーチの真ん中で、あっ、あっ、こんなっ……<emoji=heart04>」"
translation = "「마치 변태 같아요……<emoji=heart04> 밝은 비치 한복판에서, 앗, 앗, 이런……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "だけどその背徳感に興奮してしまうのか、ベアトの全身が猛烈に火照っていく。"
translation = "하지만 그 배덕감에 흥분해 버린 것인지, 베아트의 전신이 맹렬하게 달아올라 간다."

[[dialogue]]
speaker = "unk"
original = "羞恥心で一段とベアトの中が締まり、突き込むのも窮屈なくらい強くペニスを咥え込んでくる。"
translation = "수치심으로 인해 베아트의 안이 한층 더 조여졌고, 찔러넣는 것조차 거북할 정도로 강하게 페니스를 물고 늘어진다."

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「やっ、あっ──あっ、あっ、あ──ふぁああっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「햣, 앗──앗, 앗, 아──후아아앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それをこじ開けるように突くのが、凄まじく快感で──"
translation = "그것을 억지로 비집고 열듯 찌르는 것이, 엄청나게 쾌감이라──"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「んんんんっっ～～！！？\u3000んふぅんっ<emoji=heart04>\u3000んはぁんっ<emoji=heart04>\u3000ん゛っ、ん゛っ、ん゛っ、ン゛ンンンっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「음음음음읏~~!!? 응후응<emoji=heart04> 응하앙<emoji=heart04> 응윽, 응윽, 응윽, 으으으으읏~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「急に激しっ<emoji=heart04>\u3000激しすぎますっっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「갑자기 격렬해<emoji=heart04> 너무 격렬해요오……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「必死におま○こ閉じてるのにぃっ<emoji=heart04>\u3000感じすぎないように、ん゛ふっ、ん゛んんっ、中身引き締めてるのにぃっ……<emoji=heart04>」"
translation = "「필사적으로 보지 닫고 있는데에<emoji=heart04> 너무 느끼지 않도록, 응후, 으으응, 속을 꽉 조이고 있는데에……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「無理やりおち○ちんが押し開いてきてぇっ<emoji=heart04>\u3000ん゛ふあああっ、一番奥までほじくり突いてくるぅっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「무리하게 자지가 밀어붙여 열고 들어와서어<emoji=heart04> 응후아아앗, 제일 안쪽까지 헤집으며 찔러와아……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だって、ベアトの中が気持ち良すぎてっ……！」"
translation = "「그치만, 베아트의 안이 너무 기분 좋아서……!」"

[[dialogue]]
speaker = "unk"
original = "快感と嬌声をこらえるように膣を縮こまらせるベアト。"
translation = "쾌감과 교성을 참으려는 듯 질을 움츠러뜨리는 베아트."

[[dialogue]]
speaker = "unk"
original = "その様子が煽情的で、しかも力が入っている分いっそう肉感が強くなる。"
translation = "그 모습이 선정적이고, 게다가 힘이 들어가 있는 만큼 한층 더 육감이 강해진다."

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「だとしても、ん゛ぁっ、あ゛っ、はぁっ、がっつきすぎですよぉっ……<emoji=heart04>」"
translation = "「그렇다고 해도, 응아앗, 아윽, 하앗, 너무 게걸스럽게 굴잖아요오……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「はしたないくらい腰振っちゃってっ……<emoji=heart04>\u3000私のおま○こに、夢中になってっ……<emoji=heart04>」"
translation = "「천박할 정도로 허리를 흔들어대고……<emoji=heart04> 제 보지에, 정신이 팔려서는……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「これじゃあ、ちっともっ……<emoji=heart04>\u3000私だって、私だってっ──」"
translation = "「이래서는, 조금도……<emoji=heart04> 저도, 저도오──」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くっっ──！！？」"
translation = "「큭──!!?」"

[[dialogue]]
speaker = "unk"
original = "ベアトの中が、ペニスを捕食するように強く食いついてくる。"
translation = "베아트의 안이, 페니스를 포식하듯이 강하게 물고 늘어진다."

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「私だって、ん゛ふっ、ん゛んっ<emoji=heart04>\u3000食べたいのにっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「저도, 응후, 으응<emoji=heart04> 먹고 싶은데에<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「大好きな人のおち○ちんっ、ん゛あっ、あふっ、ん゛ふぅんっ、がっつきたいのにっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「좋아하는 사람의 자지이, 응앗, 아후, 응후우응, 게걸스럽게 먹고 싶은데에……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「１人でかぶりつくのっ、ズルいですっ……<emoji=heart04>\u3000私にも、ん゛っ、ふっ、ん゛っ、ん゛はぁっ、食べさせてくださいっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「혼자서만 처먹는 거, 치사해요오……<emoji=heart04> 저한테도, 응, 후, 응, 응하앗, 먹게 해주세요오<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ベアトが自分から腰を振り、俺にお尻を叩きつけるようにして、ペニスに深く食らいつく。"
translation = "베아트가 스스로 허리를 흔들며, 나에게 엉덩이를 두들기듯 부딪히며 페니스를 깊숙이 삼킨다."

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ん゛ふぁっ<emoji=heart04>\u3000気持ちいいっ、イクぅっ<emoji=heart04>\u3000腰が、あっ、あっ、とめられませんっ……<emoji=heart04>」"
translation = "「응후아<emoji=heart04> 기분 좋아, 가버려어<emoji=heart04> 허리가, 앗, 앗, 멈춰지질 않아요오……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「会長さんのおち○ちん、あっつあつのがっちがちでっ<emoji=heart04>\u3000咥え込まずにはいられなくてっ……<emoji=heart04>」"
translation = "「회장님의 자지, 뜨겁고 딱딱해서어<emoji=heart04> 물고 있지 않고는 못 배기겠어서어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「こんなに腰振ったら、絶対目立っちゃうのにっ……<emoji=heart04>\u3000遠目から見てもセックスしてるってバレちゃうのにっ……<emoji=heart04>」"
translation = "「이렇게 허리를 흔들면, 분명 눈에 띌 텐데에……<emoji=heart04> 멀리서 봐도 섹스하고 있다는 거 들켜버릴 텐데에……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「おち○ちん食べるのやめられなくてっ……<emoji=heart04>\u3000ん゛ふぁっ、あはぁあんっ、くはぁあんっ<emoji=heart04>\u3000がっついちゃうっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「자지 먹는 걸 멈출 수가 없어서어……<emoji=heart04> 응후아, 아하아앙, 쿠하아앙<emoji=heart04> 게걸스럽게 먹게 돼버려어……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "まるで沸騰するように、尋常じゃなく膣内が熱い。"
translation = "마치 비등하듯이, 심상치 않을 정도로 질 내부가 뜨겁다."

[[dialogue]]
speaker = "unk"
original = "しかも膣壁が別の生き物のように絡みついてきて、つい思い切り腰を突き出す。"
translation = "게다가 질벽이 별개의 생물처럼 휘감겨 와서, 그만 힘껏 허리를 내밀고 만다."

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「──くひゃぁああああんっ<emoji=heart04>\u3000また奥えぐられっ、まだ私が食べてる途中なのにぃ<emoji=heart04>\u3000今は私が味わう番ですよぉっ<emoji=heart04>」"
translation = "「──쿠햐아아아아앙<emoji=heart04> 또 안쪽을 도려내지고오, 아직 제가 먹는 도중인데에<emoji=heart04> 지금은 제가 맛볼 차례라고요오<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そんなこと言われても、こんなの我慢できるわけないじゃないかっ……！」"
translation = "「그런 말을 들어도, 이런 걸 참을 수 있을 리 없잖아……!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「それは、こっちの台詞ですっ<emoji=heart04>\u3000こんなにエッチなおち○ちんっ、我慢できるはずないじゃないですかぁっ<emoji=heart04>」"
translation = "「그건, 이쪽이 할 대사예요오<emoji=heart04> 이렇게 야한 자지이, 참을 수 있을 리 없잖아요오<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "どちらも貪るように腰を振り、夢中でお互いを淫らに味わう。"
translation = "둘 다 탐하듯이 허리를 흔들며, 정신없이 서로를 음란하게 맛본다."

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「あぁあんっ、ふあっ、んっ、んっ、んふぁああっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아앙, 후아, 응, 응, 응후아아아앗~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「会長さんのっ、ぷっくり膨らんできてっ<emoji=heart04>\u3000私の中でっ、ドクンドクン脈打ってぇっ<emoji=heart04>」"
translation = "「회장님의 것이, 푸욱 부풀어 올라서어<emoji=heart04> 제 안에서어, 두근두근 맥동하고오<emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「嬉しいっ、美味しいっ、発情しちゃうっ<emoji=heart04>\u3000これが、一番好きなんですっ……<emoji=heart04>\u3000大好物なんですっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「기뻐요, 맛있어요, 발정해버려어<emoji=heart04> 이게, 제일 좋아요오……<emoji=heart04> 제일 좋아하는 거예요오……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「私とのエッチで感じてくれてるおち○ちんがっ<emoji=heart04>\u3000イキそうになってくれてるおち○ちんがっ<emoji=heart04>」"
translation = "「나와의 섹스로 느껴주고 있는 자지가아<emoji=heart04> 가버릴 것 같아진 자지가아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺の射精の気配を感じて、ベアトの膣内が煮えたぎる。"
translation = "나의 사정 기운을 느끼고, 베아트의 질 내부가 끓어오른다."

[[dialogue]]
speaker = "unk"
original = "俺もこの絶頂間近の感触がたまらなくて、全力で奥に打ち込む。"
translation = "나도 이 절정 직전의 감촉을 견딜 수 없어, 전력으로 안쪽에 때려 박는다."

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ん゛あっ、ん゛はっ、あ゛あああっっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000気持ちいいっ、幸せっ……<emoji=heart04>」"
translation = "「응앗, 응핫, 아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 기분 좋아, 행복해……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「もっとっ、もっと、私を、食べてくださいっ……<emoji=heart04>\u3000あなたを、食べさせてくださいっ……<emoji=heart04>」"
translation = "「더, 더, 저를, 먹어주세요오……<emoji=heart04> 당신을, 먹게 해주세요오……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「私のエッチなおま○こ、感じてっ<emoji=heart04>\u3000あなたのエッチなおち○ちんっ、感じさせてぇっ<emoji=heart04>」"
translation = "「나의 야한 보지, 느껴줘어<emoji=heart04> 당신의 야한 자지이, 느끼게 해줘어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「誰かに見られるとか、もうどうでもいいですからっ……<emoji=heart04>\u3000今は食べ合いたいっ、イチャイチャしたいっ……<emoji=heart04>」"
translation = "「누군가에게 들킨다거나, 이제 아무래도 좋으니까아……<emoji=heart04> 지금은 서로 먹고 싶어, 꽁냥거리고 싶어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「大好きな人にっ、食べて食べられて、気持ち良くなりたいですっっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「좋아하는 사람에게에, 먹히고 먹으면서, 기분 좋아지고 싶어요오……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "汗だくになりながら２人して腰を振りまくる。"
translation = "땀범벅이 된 채 둘이서 허리를 마구 흔들어댄다."

[[dialogue]]
speaker = "unk"
original = "淫らな水音が潮騒に混じってビーチに響いて、それがまた俺たちの興奮を際限なく高めていって……"
translation = "음란한 물소리가 파도 소리에 섞여 해변에 울려 퍼지고, 그것이 또 우리의 흥분을 끝없이 고조시켜 가서……"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「あっ、あっ、あっ、あっ、気持ちいいっ、イクっ、イクぅっ<emoji=heart04>」"
translation = "「앗, 앗, 앗, 앗, 기분 좋아, 가, 가버려어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「すぐそこにまで、エッチな精子のぼってきてるのわかってっ<emoji=heart04>\u3000一番の楽しみっ、込み上がってきてるのわかってっ<emoji=heart04>」"
translation = "「바로 거기까지, 야한 정자가 올라오고 있는 거 느껴져서어<emoji=heart04> 제일 기대되는 게, 치밀어 오르고 있는 거 느껴져서어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「いっぱい出してっ、出してくださいっ<emoji=heart04>\u3000私のおま○こ、あなたのエッチな精子で満タンにしてくださいっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「잔뜩 내줘요, 내주세요오<emoji=heart04> 제 보지, 당신의 야한 정자로 가득 채워주세요오<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「私も、ふああああっっ<emoji=heart04>\u3000お腹いっぱい、搾り取りますからぁぁっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「저도, 후아아아앗<emoji=heart04> 배부르게, 짜낼 테니까아아앗~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そして深々とベアトがペニスを丸呑みにした瞬間──"
translation = "그리고 깊숙이 베아트가 페니스를 통째로 삼킨 순간──"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「あっ──ん゛ああああっっ<emoji=heart04>\u3000あ゛あああああああっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗──응아아아아앗<emoji=heart04> 아아아아아아아앗~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「イクっ、イクイクイクぅぅっっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あふぁっ、幸せぇっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가, 가버려 가버려 가버려어어어엇<emoji=heart04><emoji=heart04><emoji=heart04> 아후아, 행복해에<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「私の中っ、あなたの精子で満たされてっ……<emoji=heart04>\u3000たくさんビュービュー注いでもらえてっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「제 안이, 당신의 정자로 채워져서어……<emoji=heart04> 잔뜩 뷰우뷰우 쏟아부어 져서어……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「この瞬間が私、何よりっ──あっ、あふぁああっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「이 순간이 저는, 무엇보다도──앗, 아후아아앗~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ぶしゅぶしゅと潮を噴きながら、ベアトも激しく絶頂してくれる。"
translation = "부슈부슈 하며 애액을 뿜으면서, 베아트도 격렬하게 절정한다."

[[dialogue]]
speaker = "unk"
original = "俺もこの瞬間が何より好きで、２人でひたすら快感に溺れた。"
translation = "나도 이 순간을 무엇보다 좋아했고, 둘이서 오로지 쾌감에 빠져들었다."

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「はぁーっ、はぁーっ、えへへ……<emoji=heart04>\u3000食べきれないほど、出してもらっちゃいました……<emoji=heart04>」"
translation = "「하아─, 하아─, 에헤헤……<emoji=heart04> 다 못 먹을 정도로, 내주셨네요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「精子ってこんなに膣内から溢れてくるんですね……<emoji=heart04>\u3000とってもやらしくて、ちょっぴり恥ずかしいです……<emoji=heart04>」"
translation = "「정자라는 건 이렇게 질 내부에서 넘쳐흐르는 거군요……<emoji=heart04> 무척 야해서, 조금 부끄러워요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "割れ目から垂れる精子を見て、ベアトが照れたように微笑む。"
translation = "가랑이 사이로 흘러내리는 정자를 보며, 베아트가 수줍은 듯 미소 짓는다."

[[dialogue]]
speaker = "unk"
original = "俺もその淫靡な光景に目が釘付けになってしまっていた。"
translation = "나도 그 음비한 광경에 눈을 뗄 수 없게 되어 있었다."

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「えへへ、明るい場所でエッチするのハマっちゃいそうです……<emoji=heart04>\u3000暗がりだと見えないものがバッチリ見えて……<emoji=heart04>」"
translation = "「에헤헤, 밝은 곳에서 섹스하는 거 중독될 것 같아요……<emoji=heart04> 어두운 곳에선 안 보이던 게 확실히 보여서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ね、会長さん……<emoji=heart04>\u3000もう少しビーチの奥に行きませんか……<emoji=heart04>\u3000人から見られる心配のない場所に……<emoji=heart04>」"
translation = "「있죠, 회장님……<emoji=heart04> 조금 더 해변 안쪽으로 가지 않을래요……<emoji=heart04> 남들 눈에 띌 걱정 없는 곳으로……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「私、まだまだ発情しちゃってて……<emoji=heart04>\u3000ちっとも性欲収まってなくて……<emoji=heart04>」"
translation = "「저, 아직도 계속 발정해 있어서……<emoji=heart04> 성욕이 전혀 가라앉질 않아서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「あの太陽が沈むまで、会長さんとエッチしていたいです……<emoji=heart04>\u3000もっともっとイチャイチャしていたい……<emoji=heart04>」"
translation = "「저 태양이 질 때까지, 회장님과 섹스하고 싶어요……<emoji=heart04> 좀 더 좀 더 꽁냥거리고 싶어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「まだまだ全然、会長さんを味わい足りませんから……<emoji=heart04>」"
translation = "「아직 전혀, 회장님을 맛보기엔 부족하니까요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そうしておま○こをヒクつかせて見つめてくるベアトリスに、俺の欲望もくすぐられてしまうのであった──"
translation = "그렇게 보지를 벌름거리며 바라보는 베아트리스에게, 나의 욕망도 자극받고 마는 것이었다──"

