[[dialogue]]
speaker = "unk"
original = "第４話,幸せの形,P"
translation = "제4화, 행복의 형태"

[[dialogue]]
speaker = "unk"
original = "セナリィとの付き合いも長くなって来た、ある日のこと。星徒会の合宿に、セナリィ、ネーゼマイン、紅明の３人も参加することになった――"
translation = "세나리와의 교제도 길어지던 어느 날. 성도회의 합숙에 세나리, 네제마인, 코우메이 세 사람도 참가하게 되었다――"

[[dialogue]]
speaker = "セナリィ"
original = "「会長様。言われていた通り、人数分の寝袋、用意し終わりましたわよ」"
translation = "「회장님. 말씀하신 대로 인원수만큼 침낭 준비 끝냈어요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「全く、なぜ傭兵の私が、合宿になんて参加しているのか……」"
translation = "「정말이지, 왜 용병인 제가 합숙 같은 데 참가하고 있는 건지……」"

[[dialogue]]
speaker = "セナリィ"
original = "「ええ、分かっていますわよ。いつも会長様の人脈に頼っているから、その代わりにお願いを１つ聞いてくれというお話でしたわよね」"
translation = "「네, 알고 있어요. 항상 회장님의 인맥에 의지하고 있으니까 그 대신 부탁을 하나 들어달라는 이야기였죠.」"

[[dialogue]]
speaker = "セナリィ"
original = "「だからって、どうしてお金ではなく、私の合宿参加を望まれるのか……正直意味が分かりませんわ」"
translation = "「그렇다고 해서 어째서 돈이 아니라 저의 합숙 참가를 바라시는 건지…… 솔직히 의미를 모르겠어요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「私のモットーは悪即善。悪行は儲かるからするのであって、儲からないことは良しとしない……基本的にお金にならないことはしない主義ですから」"
translation = "「저의 모토는 악즉선. 악행은 돈이 되니까 하는 것이고, 돈이 안 되는 일은 좋게 여기지 않는…… 기본적으로 돈이 되지 않는 일은 하지 않는 주의니까요.」"

[[dialogue]]
speaker = "unk"
original = "いつから、そう考えるようになったの？"
translation = "언제부터 그렇게 생각하게 된 거야?"

[[dialogue]]
speaker = "セナリィ"
original = "「何です、暇つぶしの会話ですの？\u3000……まぁ、別に構いませんけど」"
translation = "「뭐예요, 심심풀이 대화인가요? ……뭐, 상관없지만요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「つまらない昔話になりますわよ……最初に会長様と会った時に、私が武器商人の下で傭兵として働いていた……というのは、話しましたでしょう？」"
translation = "「지루한 옛날이야기가 될 거예요…… 처음에 회장님과 만났을 때, 제가 무기 상인 밑에서 용병으로 일했다는 건 이야기했었죠?」"

[[dialogue]]
speaker = "セナリィ"
original = "「何故、武器商人の傭兵になったのかといえば……私は両親から売られたのですわ。生まれつき星力持ちで、星眼が使える武器として、人身売買されたのです」"
translation = "「왜 무기 상인의 용병이 되었냐 하면…… 저는 부모님께 팔려 갔답니다. 태어날 때부터 성력을 가졌고, 성안을 쓸 수 있는 무기로서 인신매매 당한 거예요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「中南米のバル・デベル共和国……私はそこのスラム街出身で、両親は貧乏でしたの。おまけに当時は内戦も起きていて、武器の需要が高かったのですわ」"
translation = "「중남미의 발 데벨 공화국…… 저는 그곳의 슬럼가 출신으로 부모님은 가난했답니다. 게다가 당시에는 내전도 일어나고 있어서 무기의 수요가 높았죠.」"

[[dialogue]]
speaker = "セナリィ"
original = "「幸運だったのは、私を買った武器商人が変わり者だったことでしょうか。未来への投資だとか言って、私を煽ったのですわ――」"
translation = "「행운이었던 건 저를 산 무기 상인이 괴짜였다는 점일까요. 미래를 위한 투자라느니 뭐라느니 하면서 저를 부추겼답니다――」"

[[dialogue]]
speaker = "セナリィ"
original = "「親に売られたことが悔しければ、一人前の傭兵になって借金を返せ。そうすれば自由の身にしてやる……とね。心底ムカつきましたわ、両親にも、目の前の武器商人にもね」"
translation = "「부모에게 팔린 게 분하면 어엿한 용병이 되어 빚을 갚아라. 그러면 자유의 몸으로 만들어 주마…… 하고 말이죠. 진심으로 짜증 났어요, 부모님에게도, 눈앞의 무기 상인에게도요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「その時に決意したのですわ、私を売ったことを後悔させるくらい成り上がる、目の前の武器商人を顎で扱えるような大富豪になってやる、とね」"
translation = "「그때 결심했답니다. 저를 판 것을 후회하게 만들 정도로 성공하겠다고, 눈앞의 무기 상인을 부려 먹을 수 있는 대부호가 되어주겠다고 말이죠.」"

[[dialogue]]
speaker = "セナリィ"
original = "「武器商人は裏の世界では<ruby>『武装女帝』<rt>アームドエンプレス</rt></ruby>と呼ばれる有名な人物で、銃の扱いから戦闘技術、悪の何たるか等……生き抜く術を学びましたわ」"
translation = "「무기 상인은 뒷세계에서는 <ruby>『무장 여제』<rt>암드 엠프레스</rt></ruby>라고 불리는 유명한 인물로, 총을 다루는 법부터 전투 기술, 악이 무엇인지 등…… 살아남는 법을 배웠답니다.」"

[[dialogue]]
speaker = "セナリィ"
original = "「悪が儲かると知ったのは、そうやって裏の世界で生きて、見て来たからですわね。武器の存在は悪で……何千万、何億という金額が簡単に動きますのよ」"
translation = "「악이 돈이 된다는 걸 안 건 그렇게 뒷세계에서 살며 봐왔기 때문이에요. 무기의 존재는 악이고…… 수천만, 수억이라는 금액이 쉽게 움직이거든요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「それから、私はやがて傭兵として武器商人から認められるようになり、給料を貰えるようになりましたわ」"
translation = "「그러다 저는 이윽고 용병으로서 무기 상인에게 인정받게 되었고, 월급을 받게 되었답니다.」"

[[dialogue]]
speaker = "セナリィ"
original = "「そして、自分で稼いだお金を手にした時……私はそれまで荒んでいた心が、初めて満たされて行くのを感じましたの」"
translation = "「그리고 직접 번 돈을 손에 넣었을 때…… 저는 그때까지 거칠어 있던 마음이 처음으로 채워지는 것을 느꼈어요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「ああ、これが幸せという感覚なんだと……充実するということなのだと、実感を得たのですわ」"
translation = "「아아, 이것이 행복이라는 감각이구나…… 충실해진다는 것이구나 하고 실감했답니다.」"

[[dialogue]]
speaker = "セナリィ"
original = "「よく幸せとは、愛とか友情とか、目に見えないものだと言いますわよね？\u3000私はあいにく、そういったものは信用出来ませんの」"
translation = "「흔히 행복이란 사랑이라든가 우정이라든가, 눈에 보이지 않는 것이라고들 하죠? 저는 안타깝게도 그런 것들은 신용할 수 없어요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「一方でお金は、目に見える幸せですわ。お金を出せば、好きなことが出来る。お金は目に見える幸福……具体的な幸せの形なのですわ」"
translation = "「반면에 돈은 눈에 보이는 행복이에요. 돈을 내면 좋아하는 일을 할 수 있죠. 돈은 눈에 보이는 행복…… 구체적인 행복의 형태인 거예요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「故に、お金＝幸せ。悪＝儲かる。幸福＝善きこと。悪即善というわけですわ」"
translation = "「고로 돈=행복. 악=돈이 됨. 행복=선한 것. 악즉선이라는 것이죠.」"

[[dialogue]]
speaker = "unk"
original = "お金が欲しいだけなんだよね？"
translation = "돈을 갖고 싶을 뿐인 거네?"

[[dialogue]]
speaker = "unk"
original = "セナリィは悪いことがしたいんじゃなく"
translation = "세나리는 나쁜 짓을 하고 싶은 게 아니라"

[[dialogue]]
speaker = "セナリィ"
original = "「あら、悪という響きは嫌いじゃありませんわよ？\u3000箔が付いて、格好いいでしょう？」"
translation = "「어머, 악이라는 울림은 싫어하지 않아요. 무게감도 있고 멋있잖아요?」"

[[dialogue]]
speaker = "セナリィ"
original = "「ただ……悪とは手段ですわ。武器は使い方によって、人を傷付ける物にも、人を守る物にも変わる。悪もそれと同じ。どう使うかですわ」"
translation = "「다만…… 악이란 수단이에요. 무기는 사용법에 따라 사람을 해치는 물건도, 사람을 지키는 물건도 되죠. 악도 그것과 마찬가지. 어떻게 쓰느냐예요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「私は傭兵で、戦いのプロですけれど、しなくて済むのであれば、ぶっちゃけ戦うのは嫌いまでありますわね」"
translation = "「저는 용병이고 싸움의 프로지만, 하지 않아도 된다면 솔직히 싸우는 건 싫어하기까지 한답니다.」"

[[dialogue]]
speaker = "セナリィ"
original = "「驚いた顔をしてますわね？\u3000だって……面倒臭いでしょう？」"
translation = "「놀란 얼굴을 하고 있네요? 그야…… 귀찮잖아요?」"

[[dialogue]]
speaker = "セナリィ"
original = "「私、さっきも言いましたけど、お金にならないことはしたくない主義ですの」"
translation = "「저, 아까도 말했지만 돈이 안 되는 일은 하고 싶지 않은 주의거든요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「……と、まぁ、私自身の話はそんなところでしょうか。……ね？\u3000つまらない話だったでしょう？」"
translation = "「……뭐, 제 이야기는 그 정도일까요. ……보세요, 지루한 이야기였죠?」"

[[dialogue]]
speaker = "unk"
original = "セナリィのことが知れて良かった"
translation = "세나리에 대해 알 수 있어서 좋았어"

[[dialogue]]
speaker = "セナリィ"
original = "「私を育てた武器商人とは違いますけれど……会長様も大概、変わり者ですわ」"
translation = "「저를 키운 무기 상인과는 다르지만…… 회장님도 어지간히 괴짜네요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「お人好しなのに、私のようなアウトローにも寛容というか……普通はもっと、距離を置くものだと思いますけれど……」"
translation = "「오지랖이 넓으면서 저 같은 아웃로에게도 관대하다고나 할까…… 보통은 좀 더 거리를 두는 법이라고 생각하는데요……」"

[[dialogue]]
speaker = "unk"
original = "それは、セナリィだからだよ"
translation = "그건 세나리니까 그런 거야"

[[dialogue]]
speaker = "セナリィ"
original = "「っ……！」"
translation = "「윽……!」"

[[dialogue]]
speaker = "セナリィ"
original = "「な、何を言ってますの！？\u3000やっぱり意味が分かりませんわ！」"
translation = "「무, 무슨 말을 하시는 거예요!? 역시 의미를 모르겠어요!」"

[[dialogue]]
speaker = "セナリィ"
original = "（どうして、昔の話なんかしてしまったのかしら。自分でもあまり思い出したくないし、知られたくない過去のはずなのに……）"
translation = "(어째서 옛날이야기 같은 걸 해버린 걸까. 나 자신도 별로 떠올리고 싶지 않고, 알려지고 싶지 않은 과거였을 텐데……)"

[[dialogue]]
speaker = "セナリィ"
original = "（この合宿への参加だって、別に断ることだって出来たはずなのに……昔の私だったら、ビジネスパートナーの頼みとはいえ、イエスとは言わなかったはず）"
translation = "(이 합숙 참가도 거절하려면 거절할 수 있었을 텐데…… 예전의 나였다면 비즈니스 파트너의 부탁이라 해도 예스라고는 하지 않았을 거야.)"

[[dialogue]]
speaker = "セナリィ"
original = "（私が、少しずつ変わって来ているとでもいうの……？\u3000戦場でバンデット・セナリィと恐れられた私が？）"
translation = "(내가 조금씩 변해가고 있다는 거야……? 전장에서 밴디트 세나리라고 두려움 샀던 내가?)"

[[dialogue]]
speaker = "セナリィ"
original = "（でも、こうして会長様と一緒に居る自分が、決して嫌じゃないとも感じていて……それどころか、むしろ……）"
translation = "(하지만 이렇게 회장님과 함께 있는 내가 결코 싫지 않다고도 느끼고 있고…… 오히려……)"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ただいま～♪\u3000買い出し行って来たよ～……って、ありゃ？\u3000おやおや～？」"
translation = "「다녀왔어~♪ 장 봐왔어~…… 어라? 오호라~?」"

[[dialogue]]
speaker = "セナリィ"
original = "「な、何ですの？\u3000人の顔を見て、ニヤニヤと……」"
translation = "「뭐, 뭐예요? 사람 얼굴을 보고 실실 웃으면서……」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「いや～、セナリィが見たことないメスの顔になってるから、ひょっとして会長と２人きりで、何か良いことあったのかな～って思って♪」"
translation = "「이야~ 세나리가 본 적 없는 암컷의 얼굴을 하고 있길래, 혹시 회장이랑 둘이서 뭔가 좋은 일이라도 있었나 싶어서♪」"

[[dialogue]]
speaker = "セナリィ"
original = "「誰がメス顔ですの！？\u3000べ、別に何も無いですわよ！」"
translation = "「누가 암컷 얼굴이라는 거예요!? 벼, 별로 아무 일도 없었거든요!」"

[[dialogue]]
speaker = "紅明"
original = "「そっかそっか～♪\u3000セナっちもダーリンのこと……大丈夫！\u3000アタシ的には一夫多妻制でも、セナっちなら大歓迎だぜ☆」"
translation = "「그렇구나 그렇구나~♪ 세나치도 달링을…… 괜찮아! 나로서는 일처다부제라도 세나치라면 대환영이라구☆」"

[[dialogue]]
speaker = "セナリィ"
original = "「勝手に将来設計進めないで頂けます！？」"
translation = "「멋대로 장래 계획 세우지 말아 주실래요!?」"

[[dialogue]]
speaker = "unk"
original = "そうやって友達２人に囲まれるセナリィが、いつかお金以外の幸せにも気付けたらいいなと思うのであった。"
translation = "그렇게 친구 두 사람에게 둘러싸인 세나리가 언젠가 돈 이외의 행복도 깨달을 수 있다면 좋겠다고 생각하는 것이었다."

