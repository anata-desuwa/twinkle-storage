[[dialogue]]
speaker = "フィオナ"
original = "「はぁ……何やってるんだろう、私……」"
translation = "「하아…… 나 지금 뭐 하는 거지……」"

[[dialogue]]
speaker = "フィオナ"
original = "「緋宮会長がナミエルやキリカと結婚式をしているのを見ていたら、いてもたってもいられなくなって……こんなの私……」"
translation = "「<u>히노미야</u> 회장님이 나미엘이나 키리카와 결혼식을 올리는 걸 보고 있으니, 가만히 있을 수가 없게 되어서…… 이런 거 나……」"

[[dialogue]]
speaker = "unk"
original = "フィオナ！"
translation = "피오나!"

[[dialogue]]
speaker = "フィオナ"
original = "「！\u3000緋宮会長……追いかけてきてくれたんですね」"
translation = "「! <u>히노미야</u> 회장님…… 쫓아와 주셨군요.」"

[[dialogue]]
speaker = "フィオナ"
original = "「ごめんなさい。緋宮会長が悪いんじゃないんです。全部私が悪いんです」"
translation = "「죄송해요. <u>히노미야</u> 회장님이 나쁜 게 아니에요. 전부 제가 나쁜 거예요.」"

[[dialogue]]
speaker = "フィオナ"
original = "「緋宮会長も、キリカもナミエルも、私のために頑張ってくれているのに、愛を誓っているところを見ると……胸が痛くなってしまって」"
translation = "「<u>히노미야</u> 회장님도, 키리카도 나미엘도, 저를 위해 노력해 주고 있는데, 사랑을 맹세하는 모습을 보니…… 가슴이 아파져서……」"

[[dialogue]]
speaker = "フィオナ"
original = "「わかってるんです。緋宮会長は、戦闘服を元に戻すために協力してくれているだけだって。でも……緋宮会長を取られたような気になってしまうんです」"
translation = "「알고 있어요. <u>히노미야</u> 회장님은, 전투복을 원래대로 되돌리기 위해 협력해 주고 계신 것뿐이라는걸. 하지만…… <u>히노미야</u> 회장님을 빼앗긴 것 같은 기분이 들고 말아요.」"

[[dialogue]]
speaker = "フィオナ"
original = "「私、舞い上がっていたのかもしれません。緋宮会長と結婚式ごっこをするのも、花嫁修業をするのも楽しかった」"
translation = "「저, 들떠 있었던 걸지도 몰라요. <u>히노미야</u> 회장님과 결혼식 놀이를 하는 것도, 신부 수업을 하는 것도 즐거웠어요.」"

[[dialogue]]
speaker = "フィオナ"
original = "「でも結婚は楽しいばかりのものではありません。時に苦しいこと、つらいこともあるでしょう」"
translation = "「하지만 결혼은 즐겁기만 한 것이 아니에요. 때로는 괴로운 일, 힘든 일도 있겠죠.」"

[[dialogue]]
speaker = "フィオナ"
original = "「結婚という言葉に浮かれていた自分の浅はかさや、ナミエルやキリカに嫉妬してしまう心の小ささが嫌になってしまって……」"
translation = "「결혼이라는 말에 들떠 있던 자신의 경솔함이나, 나미엘과 키리카에게 질투해 버리는 마음의 좁음이 싫어져서……」"

[[dialogue]]
speaker = "フィオナ"
original = "「私なんか花嫁にふさわしくないと、そう思うんです……」"
translation = "「저 같은 건 신부에 어울리지 않는다고, 그렇게 생각해요……」"

[[dialogue]]
speaker = "フィオナ"
original = "「こんなことなら、結婚に憧れなければ良かった……」"
translation = "「이럴 거라면, 결혼을 동경하지 말걸 그랬어……」"

[[dialogue]]
speaker = "unk"
original = "フィオナに言うことがあるんだ"
translation = "피오나에게 할 말이 있어."

[[dialogue]]
speaker = "フィオナ"
original = "「緋宮会長？\u3000ひざまずいて何を──」"
translation = "「<u>히노미야</u> 회장님? 무릎을 꿇고 무엇을──」"

[[dialogue]]
speaker = "unk"
original = "俺と結婚してください、フィオナ"
translation = "나와 결혼해 줘, 피오나."

[[dialogue]]
speaker = "フィオナ"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker = "フィオナ"
original = "「それって、プロポーズ……！？\u3000でも、あくまで結婚式はふりですし……」"
translation = "「그건, 프로포즈……!? 하지만, 어디까지나 결혼식은 시늉일 뿐이고……」"

[[dialogue]]
speaker = "フィオナ"
original = "「もっと自信を持っていい……？\u3000フィオナは素敵な女性だから、結婚出来たら幸せ……？\u3000いえいえ、そんなことないですからっ」"
translation = "「좀 더 자신감을 가져도 좋아……? 피오나는 멋진 여성이니까, 결혼할 수 있다면 행복해……? 아뇨아뇨, 그럴 리 없으니까요!」"

[[dialogue]]
speaker = "unk"
original = "フィオナは立派な花嫁だよ"
translation = "피오나는 훌륭한 신부야."

[[dialogue]]
speaker = "フィオナ"
original = "「！\u3000そう……でしょうか。緋宮会長が言うなら信じてしまうかもしれません……」"
translation = "「! 그……런가요. <u>히노미야</u> 회장님이 말씀하신다면 믿어버릴지도 몰라요……」"

[[dialogue]]
speaker = "unk"
original = "誰が何と言おうと俺が保証する"
translation = "누가 뭐라 해도 내가 보증해."

[[dialogue]]
speaker = "フィオナ"
original = "「ふふ。力強いお言葉ですね。私がくよくよしていたのが馬鹿らしくなるくらい」"
translation = "「후후. 든든한 말씀이네요. 제가 고민하고 있던 게 바보같이 느껴질 정도로.」"

[[dialogue]]
speaker = "フィオナ"
original = "「でしたら信じます。あなたの言葉を。あなたが信じる私を」"
translation = "「그렇다면 믿겠어요. 당신의 말을. 당신이 믿는 나를.」"

[[dialogue]]
speaker = "フィオナ"
original = "「先ほどのプロポーズのお返事がまだでしたね」"
translation = "「방금 전 프로포즈에 대한 대답이 아직이었죠.」"

[[dialogue]]
speaker = "フィオナ"
original = "「もちろんお受けします。私でよければ結婚してください、緋宮会長」"
translation = "「물론 받아들일게요. 저라도 괜찮다면 결혼해 주세요, <u>히노미야</u> 회장님.」"

[[dialogue]]
speaker = "ナミエル"
original = "「フィオナお嬢様に声をおかけしなくてよいのでしょうか？」"
translation = "「피오나 아가씨께 말을 걸지 않아도 괜찮을까요?」"

[[dialogue]]
speaker = "キリカ"
original = "「ええ、今しがた解決したようですので」"
translation = "「네, 방금 해결된 듯하니까요.」"

[[dialogue]]
speaker = "ナミエル"
original = "「むぅ……お嬢様にお仕えするのは私たちですのに」"
translation = "「무으…… 아가씨를 모시는 건 저희인데 말이죠.」"

[[dialogue]]
speaker = "キリカ"
original = "「確かに星見家メイド隊としては悔しいですが、我々では難しいことでした。緋宮会長に感謝しましょう」"
translation = "「확실히 호시미 가문 메이드대로서는 분합니다만, 저희로선 어려운 일이었어요. <u>히노미야</u> 회장님께 감사하죠.」"

[[dialogue]]
speaker = "フィオナ"
original = "「！\u3000アステラの反応？」"
translation = "「! 아스텔라의 반응?」"

[[dialogue]]
speaker = "フィオナ"
original = "「アステラがこんな近くに……ですが好都合です」"
translation = "「아스텔라가 이렇게 가까이에…… 하지만 마침 잘됐어요.」"

[[dialogue]]
speaker = "unk"
original = "一緒に戦おう、フィオナ"
translation = "함께 싸우자, 피오나."

[[dialogue]]
speaker = "フィオナ"
original = "「はい。たとえウェディングドレスをまとっていても、流星の星徒会長なのだと証明してみせます！」"
translation = "「네. 설령 웨딩드레스를 입고 있더라도, 유성의 성도회장이라는 걸 증명해 보이겠어요!」"

[[dialogue]]
speaker = "ナミエル"
original = "「おふたりがアステラに入られましたね。私たちも加勢しましょう、メイド長」"
translation = "「두 분이 아스텔라에 들어가셨네요. 저희도 가세하죠, 메이드장.」"

[[dialogue]]
speaker = "キリカ"
original = "「おふたりなら必要ないでしょう。私たちはアステラから溢れてきたモンスターを掃討します」"
translation = "「두 분이라면 필요 없겠죠. 저희는 아스텔라에서 넘쳐흐르는 몬스터를 소탕하겠습니다.」"

[[dialogue]]
speaker = "ナミエル"
original = "「えっ？\u3000でも……」"
translation = "「엣? 하지만……」"

[[dialogue]]
speaker = "キリカ"
original = "「共同作業ですから。お邪魔をしてはお嬢様が拗ねてしまいます」"
translation = "「공동 작업이니까요. 방해를 했다간 아가씨가 삐지고 말 거예요.」"

[[dialogue]]
speaker = "ナミエル"
original = "「……はい」"
translation = "「……네.」"

[[dialogue]]
speaker = "キリカ"
original = "「普段の戦闘服とは違いますが、もちろん戦えますね？」"
translation = "「평소의 전투복과는 다르지만, 물론 싸울 수 있겠죠?」"

[[dialogue]]
speaker = "ナミエル"
original = "「はい、そのために今までウェディングドレスを着ていましたから。メイドは百般を修めるもの。遅れはとりません」"
translation = "「네, 그러기 위해 지금까지 웨딩드레스를 입고 있었으니까요. 메이드는 백반에 능통해야 하는 법. 뒤처지지는 않아요.」"

[[dialogue]]
speaker = "キリカ"
original = "「それでこそ星見家メイド隊です。では行きますよ、ナミエル」"
translation = "「그래야 호시미 가문 메이드대답죠. 그럼 가죠, 나미엘.」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふふふ、今なら絶対に負ける気がしません。本当に浮かれてしまっていますね、私」"
translation = "「후후후, 지금이라면 절대로 질 것 같지 않아요. 정말로 들떠 버렸네요, 저.」"

[[dialogue]]
speaker = "フィオナ"
original = "「あのモンスターを倒すためには協力が必要です。力を合わせましょう、緋宮会長」"
translation = "「저 몬스터를 쓰러뜨리기 위해서는 협력이 필요해요. 힘을 합쳐요, <u>히노미야</u> 회장님.」"

[[dialogue]]
speaker = "フィオナ"
original = "「太陽の輝きをここに──エタニティソーラーストーム！」"
translation = "「태양의 광휘를 이곳에── 에터니티 솔라 스톰!」"

