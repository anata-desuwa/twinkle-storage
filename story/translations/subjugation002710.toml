[[dialogue]]
speaker_original = "せつな（覚醒）"
speaker_translation = "세츠나(각성)"
original = "「にゃああああっ！！！\u3000師匠、頑張ったのですからしみないほうの秘薬で治療して欲しいでござるっ！！」"
translation = "「냐아아아앗!!! 스승님, 힘냈으니까 따갑지 않은 쪽 비약으로 치료해 주시오!!」"

[[dialogue]]
speaker_original = "シズル"
speaker_translation = "시즈루"
original = "「そっちは他のみんなに使っていますから。せつなはこれで我慢してください♪」"
translation = "「그건 다른 애들에게 쓰고 있으니까요. 세츠나는 이걸로 참으세요♪」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「くぅ～っ、やっぱシズルさんの秘薬はサイコーでしょ！\u3000怪我とか一瞬で直っちゃうし～♪」"
translation = "「쿠우~, 역시 시즈루 씨의 비약은 최고라구! 상처 같은 건 순식간에 나아버리잖아~♪」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「すみません、しみないお薬をこっちで使ってしまって」"
translation = "「죄송해요, 따갑지 않은 약을 이쪽에서 써버려서.」"

[[dialogue]]
speaker_original = "シズル"
speaker_translation = "시즈루"
original = "「星騎士のみなさんはお客様ですから、どうぞ遠慮なさらず。せつなはこちらで我慢できますよね？」"
translation = "「성기사 여러분은 손님이시니까 부디 사양 마시길. 세츠나는 이걸로 참을 수 있죠?」"

[[dialogue]]
speaker_original = "ちとせ"
speaker_translation = "치토세"
original = "「ごくごく……飲む方の薬もすっごく効くね～」"
translation = "「벌컥벌컥…… 마시는 약도 엄청 잘 듣네~」"

[[dialogue]]
speaker_original = "さつき"
speaker_translation = "사츠키"
original = "「さすがは師匠の秘薬です」"
translation = "「과연 스승님의 비약입니다.」"

[[dialogue]]
speaker_original = "せつな（覚醒）"
speaker_translation = "세츠나(각성)"
original = "「なっ……！\u3000みんなは飲み薬を！\u3000しかもあの様子、苦くない方でござる！」"
translation = "「앗……! 다들 마시는 약을! 게다가 저 모습, 쓰지 않은 쪽이구려!」"

[[dialogue]]
speaker_original = "せつな（覚醒）"
speaker_translation = "세츠나(각성)"
original = "「師匠、わざとやっているでござる！\u3000もしかしてせつなへのお仕置きでござるか！？」"
translation = "「스승님, 일부러 그러는 것이오! 혹시 세츠나에게 주는 벌이오!?」"

[[dialogue]]
speaker_original = "シズル"
speaker_translation = "시즈루"
original = "「せつなの覚悟がなかなか決まらないせいで頑張る羽目になりましたからね♪\u3000はい、背中の方にもぬ～りぬり、と♪」"
translation = "「세츠나의 각오가 좀처럼 정해지지 않은 탓에 고생 좀 했으니까요♪ 자, 등 쪽에도 처~벌처벌♪」"

[[dialogue]]
speaker_original = "せつな（覚醒）"
speaker_translation = "세츠나(각성)"
original = "「みぎゃ～～～～っ！！！」"
translation = "「미갸~~~~~!!!」"

[[dialogue]]
speaker_original = "シズル"
speaker_translation = "시즈루"
original = "「……ですが、見事な戦いでしたよ。新たな忍装束も使いこなせていたようですね」"
translation = "「……하지만 훌륭한 싸움이었어요. 새로운 닌자 의복도 잘 다루게 된 모양이네요.」"

[[dialogue]]
speaker_original = "せつな（覚醒）"
speaker_translation = "세츠나(각성)"
original = "「あ、ありがとうございます。……ですが、この戦闘服はいったい何でござるか？」"
translation = "「고, 고맙소. ……그런데 이 전투복은 대체 무엇이오?」"

[[dialogue]]
speaker_original = "シズル"
speaker_translation = "시즈루"
original = "「ヘレナさんから預かっていたものですよ」"
translation = "「헬레나 씨에게 맡아두었던 거예요.」"

[[dialogue]]
speaker_original = "シズル"
speaker_translation = "시즈루"
original = "「せつなを一人前と認めた時、渡そうと決めていたのですが……危うく挫けそうになっていたので焦りました」"
translation = "「세츠나를 한 사람의 몫을 한다고 인정했을 때 주려고 마음먹었습니다만…… 하마터면 꺾일 뻔해서 조마조마했다니까요.」"

[[dialogue]]
speaker_original = "せつな（覚醒）"
speaker_translation = "세츠나(각성)"
original = "「ううっ……そ、それは……面目次第もないでござる……」"
translation = "「으으…… 그, 그것은…… 면목 없소……」"

[[dialogue]]
speaker_original = "シズル"
speaker_translation = "시즈루"
original = "「まあまあ、最終的には心の奥底に抱いていた恐怖心に打ち勝ち、その装束の力も引き出すことができましたし」"
translation = "「뭐어 뭐어, 최종적으로는 마음 깊은 곳에 품고 있던 공포심을 이겨내고 그 의복의 힘도 끌어낼 수 있었으니까요.」"

[[dialogue]]
speaker_original = "シズル"
speaker_translation = "시즈루"
original = "「なのでギリギリ、合格ということにしましょう……おめでとう、せつな」"
translation = "「그러니 간신히 합격인 걸로 하죠…… 축하해요, 세츠나.」"

[[dialogue]]
speaker_original = "せつな（覚醒）"
speaker_translation = "세츠나(각성)"
original = "「ううっ、ししょおぉ～」"
translation = "「으으, 스성니임~」"

[[dialogue]]
speaker_original = "シズル"
speaker_translation = "시즈루"
original = "「情けない声を出さないでください。本当に大丈夫かなって不安になっちゃうじゃありませんか」"
translation = "「한심한 소리 내지 마세요. 정말 괜찮을지 불안해지잖아요.」"

[[dialogue]]
speaker_original = "シズル"
speaker_translation = "시즈루"
original = "「これからも修練に励み、私が安心して隠居できるような立派な忍者になってくださいね」"
translation = "「앞으로도 수련에 힘써서 제가 안심하고 은거할 수 있을 만큼 훌륭한 닌자가 되어주세요.」"

[[dialogue]]
speaker_original = "せつな（覚醒）"
speaker_translation = "세츠나(각성)"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker = "unk"
original = "引退するつもりなんですか？"
translation = "은퇴하실 생각이신가요?"

[[dialogue]]
speaker_original = "シズル"
speaker_translation = "시즈루"
original = "「私も力の衰えを感じていますし、後は若い子に頑張ってもらおうかな、って」"
translation = "「저도 힘이 쇠약해진 걸 느끼고 있고, 뒤는 젊은 애들에게 맡겨볼까 해서요.」"

[[dialogue]]
speaker_original = "せつな（覚醒）"
speaker_translation = "세츠나(각성)"
original = "「そんなこと言わないで欲しいでござる！\u3000師匠に比べたらせつなはまだまだヒヨッコでござるから！！」"
translation = "「그런 말씀 마시오! 스승님에 비하면 세츠나는 아직 풋내기이오!!」"

[[dialogue]]
speaker_original = "シズル"
speaker_translation = "시즈루"
original = "「おや？\u3000また元の甘えん坊せつなに逆戻りですか？」"
translation = "「어라? 다시 예전의 어리광쟁이 세츠나로 되돌아간 건가요?」"

[[dialogue]]
speaker_original = "せつな（覚醒）"
speaker_translation = "세츠나(각성)"
original = "「うっ……いろいろ覚悟は決めたつもりでござるが……それとこれとは話が別でござる……」"
translation = "「윽…… 여러모로 각오를 다지긴 했소만…… 그것과 이것은 이야기가 별개이오……」"

[[dialogue]]
speaker_original = "せつな（覚醒）"
speaker_translation = "세츠나(각성)"
original = "「師匠が引退してしまうのは悲しいでござるし、師匠と共に肩を並べて戦うのがせつなの夢なのでござるから」"
translation = "「스승님이 은퇴하시는 건 슬프고, 스승님과 어깨를 나란히 하며 싸우는 게 세츠나의 꿈이기 때문이오.」"

[[dialogue]]
speaker_original = "シズル"
speaker_translation = "시즈루"
original = "「やれやれ……仕方ありませんね。ではもう少し頑張ることにしましょう」"
translation = "「이런 이런…… 어쩔 수 없네요. 그럼 조금만 더 힘내보기로 하죠.」"

[[dialogue]]
speaker_original = "シズル"
speaker_translation = "시즈루"
original = "「魔王さん、まだまだ未熟なせつなですが、これからもお傍に置いてあげてください」"
translation = "「마왕 씨, 아직 미숙한 세츠나입니다만, 앞으로도 곁에 둬 주세요.」"

[[dialogue]]
speaker = "unk"
original = "もちろんです"
translation = "물론입니다."

[[dialogue]]
speaker_original = "シズル"
speaker_translation = "시즈루"
original = "「というわけで、せつなは引き続き星騎士として、学園で研鑽を積んできてください」"
translation = "「그런 고로 세츠나는 계속해서 성기사로서 학원에서 연마를 쌓고 오세요.」"

[[dialogue]]
speaker_original = "さつき"
speaker_translation = "사츠키"
original = "「里のことは私たちにまかせて」"
translation = "「마을 일은 우리에게 맡겨줘.」"

[[dialogue]]
speaker_original = "ちとせ"
speaker_translation = "치토세"
original = "「がんばれ、せつな！\u3000あっちの方の進展も報告よろしくね～♪」"
translation = "「힘내, 세츠나! 그쪽 방면의 진전도 보고 부탁해~♪」"

[[dialogue]]
speaker_original = "せつな（覚醒）"
speaker_translation = "세츠나(각성)"
original = "「にゃあああああっ！\u3000何を言い出すでござるかっ！」"
translation = "「냐아아아아앗! 무슨 소릴 하는 것이오!」"

[[dialogue]]
speaker = "unk"
original = "あっちの方？"
translation = "그쪽 방면?"

[[dialogue]]
speaker_original = "せつな（覚醒）"
speaker_translation = "세츠나(각성)"
original = "「何でもないでござる！\u3000主様は何も聞いていないでござるーーーっ！！！！」"
translation = "「아무것도 아니오! 주군은 아무것도 듣지 못한 것이오~~~~!!!!」"

[[dialogue]]
speaker_original = "シズル"
speaker_translation = "시즈루"
original = "「ふふっ、まったくもう……」"
translation = "「후후, 정말이지……」"

[[dialogue]]
speaker = "unk"
original = "そして、予定していた滞在期間も終わり──"
translation = "그렇게 예정했던 체류 기간도 끝나고──"

[[dialogue]]
speaker_original = "ちとせ"
speaker_translation = "치토세"
original = "「せつな、もう帰っちゃうんだね～」"
translation = "「세츠나, 벌써 가버리는구나~」"

[[dialogue]]
speaker_original = "さつき"
speaker_translation = "사츠키"
original = "「ちとせ、そんな寂しそうな声ださない。空間転移装置で前より行き来はしやすくなったんだから」"
translation = "「치토세, 그렇게 서운한 목소리 내지 마. 공간 전이 장치 덕분에 예전보다 오가기 편해졌으니까.」"

[[dialogue]]
speaker_original = "せつな（覚醒）"
speaker_translation = "세츠나(각성)"
original = "「そうでござるよ、里のピンチには真っ先に駆けつけるでござる！」"
translation = "「그렇소, 마을의 위기에는 제일 먼저 달려오겠소!」"

[[dialogue]]
speaker_original = "さつき"
speaker_translation = "사츠키"
original = "「頼もしいけど、私たちも私たちで頑張って、せつなが安心して頑張れるような立派な忍者になるから」"
translation = "「든든하긴 하지만 우리도 우리대로 노력해서 세츠나가 안심하고 힘낼 수 있게 훌륭한 닌자가 될 테니까.」"

[[dialogue]]
speaker_original = "ちとせ"
speaker_translation = "치토세"
original = "「そうそう、星騎士としての務め、しっかり果たしてきてね♪」"
translation = "「그래그래, 성기사로서의 임무 제대로 완수하고 와♪」"

[[dialogue]]
speaker_original = "せつな（覚醒）"
speaker_translation = "세츠나(각성)"
original = "「わかったでござる！」"
translation = "「알겠소!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「いろいろ大変だったけど、いい感じに終われそうな感じ？」"
translation = "「이래저래 힘들었지만 좋은 느낌으로 끝날 것 같은 기분?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ですね、一時はどうなることかと思いましたが……」"
translation = "「그렇네요, 한때는 어떻게 될까 싶었습니다만……」"

[[dialogue]]
speaker_original = "シズル"
speaker_translation = "시즈루"
original = "「ヘレナさんにも感謝の言葉をお伝え下さい。そして、今後ともよろしくお願いします、と」"
translation = "「헬레나 씨에게도 감사의 말을 전해 주세요. 그리고 앞으로도 잘 부탁드린다고요.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「承りました。ですが、空間転移装置で一緒に来て直接お話しする、という選択もありなのでは？」"
translation = "「알겠습니다. 하지만 공간 전이 장치로 함께 가서 직접 이야기한다는 선택지도 있지 않나요?」"

[[dialogue]]
speaker_original = "シズル"
speaker_translation = "시즈루"
original = "「あっ、そうですね！\u3000ついでに久しぶりの都会を楽しんでくるのも悪くないかもです♪」"
translation = "「앗, 그렇네요! 겸사겸사 오랜만에 도시를 즐기고 오는 것도 나쁘지 않을지도 몰라요♪」"

[[dialogue]]
speaker_original = "せつな（覚醒）"
speaker_translation = "세츠나(각성)"
original = "「師匠！？\u3000お別れでしんみりしてた流れが台無しでござるよ！」"
translation = "「스승님!? 작별 인사를 하던 애틋한 흐름이 엉망이오!」"

[[dialogue]]
speaker_original = "シズル"
speaker_translation = "시즈루"
original = "「冗談ですよ。私が里から離れるわけにはいきませんから。でも、里のみんなもしっかりしてきましたし、ちょっとくらいなら……うずうず」"
translation = "「농담이에요. 제가 마을을 떠날 수는 없으니까요. 하지만 마을 아이들도 든든해졌고, 아주 조금이라면…… 근질근질.」"

[[dialogue]]
speaker_original = "せつな（覚醒）"
speaker_translation = "세츠나(각성)"
original = "「……ちとせもさつきも師匠の見張り、しかとお願いしたでござるよ」"
translation = "「……치토세랑 사츠키도 스승님의 감시, 단단히 부탁하오.」"

[[dialogue]]
speaker_original = "ちとせ"
speaker_translation = "치토세"
original = "「う、うん……」"
translation = "「으, 응……」"

[[dialogue]]
speaker_original = "さつき"
speaker_translation = "사츠키"
original = "「保証はできないけど、やれるだけ頑張ってみるよ」"
translation = "「보장은 못 하겠지만 할 수 있는 만큼 노력해 볼게.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「では、私たちはそろそろ……」"
translation = "「그럼 저희는 이만……」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「いろいろお世話になりました！\u3000今度は里のみんなも遊びに来てね～！」"
translation = "「이래저래 신세 졌어! 다음엔 마을 사람들도 놀러 와~!」"

[[dialogue]]
speaker_original = "シズル"
speaker_translation = "시즈루"
original = "「必ず行きます。その際はよろしくお願いしますね」"
translation = "「꼭 갈게요. 그때는 잘 부탁드려요.」"

[[dialogue]]
speaker_original = "せつな（覚醒）"
speaker_translation = "세츠나(각성)"
original = "「それでは師匠、みんな、しばしのおさらばにござる！」"
translation = "「그럼 스승님, 모두들, 잠시만 안녕이오!」"

[[dialogue]]
speaker = "unk"
original = "こうしてせつなの帰郷を兼ねた視察の旅は、笑顔で終わりを迎えたのだった。"
translation = "이렇게 세츠나의 귀향을 겸한 시찰 여행은 미소와 함께 끝을 맞이했다."

