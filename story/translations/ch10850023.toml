[[dialogue]]
speaker = "unk"
original = "第３話,ダブルママダレナ再び,P"
translation = "제3화, 더블 마마다레나 다시 한번"

[[dialogue]]
speaker = "unk"
original = "その日は、マグダレナが俺の家へ遊びに来ていた。"
translation = "그날은 막달레나가 우리 집에 놀러 와 있었다."

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「会長、お待たせしました～。ママダレナが愛を込めて作った親子丼ですよ～♪」"
translation = "「회장님, 오래 기다리셨어요~. 마마다레나가 사랑을 담아 만든 오야코동이에요~♪」"

[[dialogue]]
speaker = "unk"
original = "最近、料理の練習をしているというマグダレナが、手料理を振る舞ってくれる。しかし今日は――"
translation = "최근 요리 연습을 하고 있다는 막달레나가 손요리를 대접해 준다. 하지만 오늘은――"

[[dialogue]]
speaker_original = "大人ダレナ"
speaker_translation = "성인 다레나"
original = "「会長、こちらの親子丼もでき上がりました。どうぞお召し上がり下さい♪」"
translation = "「회장님, 이쪽 오야코동도 완성되었습니다. 부디 드셔보세요♪」"

[[dialogue]]
speaker = "unk"
original = "なんと今日は、アニマ先輩特製の『魂分裂薬』によって、大きいマグダレナの方も一緒だった。"
translation = "놀랍게도 오늘은 아니마 선배 특제 『혼 분열약』에 의해 커다란 막달레나 쪽도 함께였다."

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「どちらが会長に美味しい手料理を作れるか……大きい私には負けませんよ～！」"
translation = "「어느 쪽이 회장님께 맛있는 손요리를 만들어 드릴 수 있을지…… 큰 저에게는 지지 않을 거예요~!」"

[[dialogue]]
speaker_original = "大人ダレナ"
speaker_translation = "성인 다레나"
original = "「私も簡単には譲れません。会長を愛している気持ちは、どちらの私も同じですから」"
translation = "「저도 쉽게 양보할 수 없습니다. 회장님을 사랑하는 마음은 어느 쪽의 저라도 똑같으니까요」"

[[dialogue]]
speaker = "unk"
original = "同一人物なんだし、なにも競わなくても……"
translation = "동일 인물인데 굳이 경쟁하지 않아도……"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「いえ、これは大事な問題ですっ。将来、会長とどちらの姿で一緒に過ごすのか……その境界を定めなくてはなりませんから！」"
translation = "「아니요, 이건 중요한 문제예요. 장래에 회장님과 어느 쪽 모습으로 함께 보낼지…… 그 경계를 정해야 하니까요!」"

[[dialogue]]
speaker_original = "大人ダレナ"
speaker_translation = "성인 다레나"
original = "「ええ。その答えを出すためにも、本日は会長に判断していただこうというわけです♪」"
translation = "「네. 그 답을 내기 위해서라도 오늘은 회장님께서 판단해 주셨으면 하는 겁니다♪」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「それでは会長、まずは小さいママダレナの方からいきますよ～。はい、あ～ん♪」"
translation = "「그럼 회장님, 우선 작은 마마다레나 쪽부터 갈게요~. 자, 아~앙♪」"

[[dialogue]]
speaker = "unk"
original = "小さなマグダレナにあ～んされ、親子丼を口に運んでもらう。"
translation = "작은 막달레나에게 아~앙을 받으며 오야코동을 입으로 옮긴다."

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「ふふっ、美味しいですか～？\u3000練習した甲斐がありました～♪」"
translation = "「후훗, 맛있나요~? 연습한 보람이 있었네요~♪」"

[[dialogue]]
speaker_original = "大人ダレナ"
speaker_translation = "성인 다레나"
original = "「では次は、私の番ですね。失礼いたします……ふー……ふー……♪」"
translation = "「그럼 다음은 제 차례군요. 실례하겠습니다…… 후우…… 후우……♪」"

[[dialogue]]
speaker_original = "大人ダレナ"
speaker_translation = "성인 다레나"
original = "「会長、どうぞ♪\u3000あ～ん<emoji=heart04>」"
translation = "「회장님, 드세요♪ 아~앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "大人ダレナ"
speaker_translation = "성인 다레나"
original = "「――いかがでしょうか、会長？」"
translation = "「――어떠신가요, 회장님?」"

[[dialogue]]
speaker = "unk"
original = "こ、これは……！\u3000うまい……！"
translation = "이, 이것은……! 맛있다……!"

[[dialogue]]
speaker = "unk"
original = "大きなマグダレナの親子丼は、卵がふわりと、とろけるように仕上がっていた。"
translation = "커다란 막달레나의 오야코동은, 계란이 폭신하고, 사르르 녹아내리듯 완성되어 있었다."

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「そ、そんな……！\u3000どうして……！？」"
translation = "「그, 그럴 수가……! 어째서……!?」"

[[dialogue]]
speaker_original = "大人ダレナ"
speaker_translation = "성인 다레나"
original = "「小さい方の私は……気持ちが先走ってしまったようですね。焦って卵を入れるタイミングが、少し早くなってしまったんです」"
translation = "「어린 시절의 저는…… 마음이 앞서 버린 모양이네요. 서두르느라 계란을 넣는 타이밍이, 조금 빨라지고 말았어요」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「まさか自分に負けちゃうなんて……！\u3000う……うえええぇぇぇ～んっ！！」"
translation = "「설마 나 자신에게 져버리다니……! 으…… 으아아아아아~앙!!」"

[[dialogue]]
speaker = "unk"
original = "ショックを受けたのか、小さいマグダレナが子供のように泣き出してしまう。"
translation = "쇼크를 받았는지, 어린 막달레나가 아이처럼 울음을 터뜨리고 만다."

[[dialogue]]
speaker_original = "大人ダレナ"
speaker_translation = "성인 다레나"
original = "「ああ、そんな泣いてはみっともないですよ。ほら……よしよし♪」"
translation = "「아아, 그렇게 울면 보기 흉해요. 자…… 착하지 착해♪」"

[[dialogue]]
speaker = "unk"
original = "大きいマグダレナが小さい方の体を抱き締めて、子供をあやすように優しく頭を撫でる。"
translation = "커다란 막달레나가 어린 쪽의 몸을 껴안고, 아이를 달래듯 상냥하게 머리를 쓰다듬는다."

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「うぅ……自分に慰められてるのに、気持ちが安心してきてしまいます。これがセシアの言う、大人の私が持つ『ママ<ruby>力<rt>りょく</rt></ruby>』……！」"
translation = "「으으…… 나 자신에게 위로받고 있는데, 마음이 안심되어 버려요. 이것이 세시아가 말하는, 어른인 내가 가진 『엄마력』……!」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「く、悔しいですうぅ～～！\u3000うわあああぁぁぁ～～んっ！！」"
translation = "「분, 분해요오오~~! 으와아아아아~~앙!!」"

[[dialogue]]
speaker = "unk"
original = "俺は２人にそっと近づき、双方の頭へ手を置いて撫でる。"
translation = "나는 두 사람에게 살며시 다가가, 양쪽의 머리에 손을 얹고 쓰다듬는다."

[[dialogue]]
speaker = "unk"
original = "俺は、どっちのマグダレナも好きだ"
translation = "나는, 어느 쪽의 막달레나도 좋아한다"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「……会長？」"
translation = "「……회장님?」"

[[dialogue]]
speaker = "unk"
original = "俺にはどちらか片方だけなんて選べない。最初に恋をしたのは大きい方のマグダレナだが、小さいマグダレナとも同じように恋人としての時間を過ごしてきたからだ。"
translation = "나에게는 어느 한쪽만을 고를 수는 없다. 처음에 사랑을 한 것은 커다란 쪽의 막달레나지만, 어린 막달레나와도 똑같이 연인으로서의 시간을 보내왔기 때문이다."

[[dialogue]]
speaker_original = "大人ダレナ"
speaker_translation = "성인 다레나"
original = "「――え？\u3000場合によっては、会長も魂分裂薬を使って２人に分かれても構わない……？\u3000会長、まさかそこまで……！」"
translation = "「――에? 경우에 따라서라면, 회장님도 혼 분열약을 사용해서 두 명으로 나뉘어도 상관없다……? 회장님, 설마 그렇게까지……!」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「会長……ごめんなさい。私たち、つい甘えて……ワガママを言ってしまっていました……」"
translation = "「회장님…… 죄송해요. 저희, 그만 응석 부리느라…… 억지를 부리고 말았어요……」"

[[dialogue]]
speaker_original = "大人ダレナ"
speaker_translation = "성인 다레나"
original = "「そうですね……。会長がどちらを選ぶのか、その好奇心もあって……試すような真似をしてしまって……」"
translation = "「그렇네요……. 회장님이 어느 쪽을 택할지, 그 호기심도 있어서…… 시험하는 듯한 짓을 해버려서……」"

[[dialogue]]
speaker = "unk"
original = "俺は２人共、どちらも幸せにすると誓うよ"
translation = "나는 두 사람 모두, 어느 쪽도 행복하게 하겠다고 맹세해"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「会長……えへへ<emoji=heart04>」"
translation = "「회장님…… 에헤헤<emoji=heart04>」"

[[dialogue]]
speaker_original = "大人ダレナ"
speaker_translation = "성인 다레나"
original = "「会長がどちらも幸せにしてくださると仰るのなら……私たちもそれに応えて、会長を２倍幸せにして差し上げなくてはなりませんね<emoji=heart04>」"
translation = "「회장님이 양쪽 모두 행복하게 해주겠다고 말씀하신다면…… 저희도 그에 보답하여, 회장님을 두 배로 행복하게 해드려야겠네요<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「はい♪\u3000どちらも会長を愛する気持ちは一緒ですから<emoji=heart04>」"
translation = "「네♪ 어느 쪽이든 회장님을 사랑하는 마음은 같으니까요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "２人は目を合わせて頷き合うと、俺の左右に座り、そっと体を寄せてきた。"
translation = "두 사람은 눈을 맞추며 고개를 끄덕이더니, 내 좌우에 앉아 살며시 몸을 밀착해 왔다."

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「会長……♪\u3000小さいママダレナは、こっちからぎゅ～っとしますね……<emoji=heart04>」"
translation = "「회장님……♪ 어린 마마다레나는, 이쪽에서 꼬옥~ 할게요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "小さなマグダレナが腕を絡めるように抱き着いてくる。その反対側からは――"
translation = "어린 막달레나가 팔을 감싸듯 매달려 온다. 그 반대편에서는――"

[[dialogue]]
speaker_original = "大人ダレナ"
speaker_translation = "성인 다레나"
original = "「では私は……会長の肩をお借りしますね。ふふ……こうして寄り添うと、落ち着きます……<emoji=heart04>」"
translation = "「그럼 저는…… 회장님의 어깨를 빌릴게요. 후후…… 이렇게 곁에 있으니, 마음이 놓여요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「あっ……会長の手が背中に回されて……優しくて温かいです……<emoji=heart04>\u3000もっと……もっと触れてほしいです……<emoji=heart04>」"
translation = "「앗…… 회장님의 손이 등에 닿아서…… 다정하고 따뜻해요……<emoji=heart04> 더…… 더 만져주셨으면 좋겠어요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "大人ダレナ"
speaker_translation = "성인 다레나"
original = "「んっ……<emoji=heart04>\u3000会長……そんな風に抱かれてしまっては……私まで甘えたくなってしまいます……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 회장님…… 그런 식으로 안겨버리면…… 저까지 어리광 부리고 싶어져요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "２人が同時に身を寄せ、俺の腕が温かく柔らかな幸福感に包まれる。"
translation = "두 사람이 동시에 몸을 맡기자, 내 팔이 따뜻하고 부드러운 행복감에 휩싸인다."

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「会長、頬っぺたに失礼しますね……<emoji=heart04>\u3000ちゅっ……<emoji=heart04>\u3000会長、大好きです……<emoji=heart04>」"
translation = "「회장님, 볼에 실례할게요……<emoji=heart04> 쪽……<emoji=heart04> 회장님, 정말 좋아해요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "小さなマグダレナの唇が頬に触れ、それに続くように――"
translation = "어린 막달레나의 입술이 볼에 닿고, 그 뒤를 잇듯이――"

[[dialogue]]
speaker_original = "大人ダレナ"
speaker_translation = "성인 다레나"
original = "「んっ……ちゅ……<emoji=heart04>\u3000会長、私も……心から愛しています……<emoji=heart04>」"
translation = "「응…… 츄……<emoji=heart04> 회장님, 저도…… 진심으로 사랑하고 있어요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "左右から交互に注がれるキスに、思考が甘くとろけていく。"
translation = "좌우에서 번갈아 쏟아지는 키스에, 사고가 달콤하게 녹아내린다."

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「会長が２人共を好きと言ってくださったから……いっぱい甘えてもいいんですよね……？」"
translation = "「회장님이 두 사람 모두 좋다고 말씀하셨으니까…… 잔뜩 어리광 부려도 되는 거죠……?」"

[[dialogue]]
speaker_original = "大人ダレナ"
speaker_translation = "성인 다레나"
original = "「でしたら……同じく、２倍で甘やかさせていただきますね、会長……<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「그렇다면…… 마찬가지로, 두 배로 귀여워해 드릴게요, 회장님……<emoji=heart04> 쪽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "今度は２人同時に頬へキス。次に額へ、そして唇へ――ふわりと重なるような甘く優しい連鎖が続く。"
translation = "이번에는 두 사람 동시에 볼에 키스. 다음은 이마에, 그리고 입술에―― 살포시 겹쳐지는 듯한 달콤하고 다정한 연쇄가 이어진다."

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「ちゅっ……<emoji=heart04>\u3000会長を、世界で１番幸せにするのが……ここにいるママダレナの役目ですから……♪」"
translation = "「쪽……<emoji=heart04> 회장님을 세상에서 제일 행복하게 만드는 게…… 여기 있는 마마다레나의 역할이니까요……♪」"

[[dialogue]]
speaker_original = "大人ダレナ"
speaker_translation = "성인 다레나"
original = "「ええ……どちらの姿の私も、会長のおそばを離れません……ずっと隣に……<emoji=heart04>\u3000んちゅっ……<emoji=heart04>」"
translation = "「네…… 어느 모습의 저라도, 회장님 곁을 떠나지 않아요…… 계속 옆에……<emoji=heart04> 응츄……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "２人の指が俺の手へ絡み、重なる。そして――左右から唇が同時に寄せられた。"
translation = "두 사람의 손가락이 내 손에 얽히며 겹쳐진다. 그리고―― 좌우에서 입술이 동시에 다가왔다."

[[dialogue]]
speaker_original = "２人"
speaker_translation = "2명"
original = "「会長、愛しています……<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「회장님, 사랑해요……<emoji=heart04> 쪽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そこから先は２人に身をゆだねて、これ以上ないくらい幸福な時間を過ごすのだった。"
translation = "그 뒤로는 두 사람에게 몸을 맡기고, 더할 나위 없이 행복한 시간을 보내는 것이었다."

