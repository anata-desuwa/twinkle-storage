[[dialogue]]
speaker = "unk"
original = "第１話,二つ名の由来,P"
translation = "제1화, 이명의 유래, P"

[[dialogue]]
speaker = "unk"
original = "先日の事件で魔女として目覚めたコハルコさんは、魔法を使いこなすために訓練を行っていた。"
translation = "요전번의 사건으로 마녀로서 각성한 쿠하루코 씨는, 마법을 능숙하게 다루기 위해 훈련을 하고 있었다."

[[dialogue]]
speaker = "unk"
original = "今日はリップルのリゾート結界の一部を借りての模擬戦だ。"
translation = "오늘은 리플의 리조트 결계 일부를 빌려서 하는 모의전이다."

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「付き添いありがとう、会長さん。レイラがついでで来てるのは……まぁいいけど」"
translation = "「곁을 지켜줘서 고마워, 회장님. 레이라가 덤으로 따라온 건…… 뭐 상관없지만」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「これがリゾート結界……すんすん、リア充の香りがしますね」"
translation = "「이것이 리조트 결계…… 킁킁, 리얼충의 향기가 나네요」"

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「潮の香りだよ、これは」"
translation = "「바다 냄새야, 이건」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「コハルコさんと魔王さんは付き合っているからリア充なのでは。レイラは訝しんだ」"
translation = "「쿠하루코 씨와 마왕님은 사귀고 있으니 리얼충인 것이 아닌지. 레이라는 의아해했습니다」"

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「訝しまないで。……ていうか、会長さんと付き合ってるってレイラに言ったっけ？」"
translation = "「의아해하지 마. ……그보다, 회장님이랑 사귄다고 레이라한테 말했던가?」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「ここに来るまでも肩が当たるか当たらないかの距離感だったじゃないですか。付き合ってなかったら逆にびっくりですよ」"
translation = "「여기 올 때까지도 어깨가 닿을 듯 말 듯한 거리감이었잖아요. 안 사귀고 있다면 오히려 깜짝 놀랄 일이라고요」"

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「……えぇ」"
translation = "「……에에」"

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「レイラにバレてるなら、学園のみんなにも当然バレてるよね。噂になってないかなぁ……」"
translation = "「레이라한테 들켰다면, 학원 모두에게도 당연히 들켰겠네. 소문나지 않았으려나……」"

[[dialogue]]
speaker = "unk"
original = "レイラの言う通り、俺たちは恋人として付き合っている。"
translation = "레이라의 말대로, 우리들은 연인으로서 사귀고 있다."

[[dialogue]]
speaker = "unk"
original = "コハルコさんが恥ずかしいというので、学園ではまだ明かしていなかったが、無意味だったようだ。"
translation = "쿠하루코 씨가 부끄럽다고 해서, 학원에서는 아직 밝히지 않았었지만, 무의미했던 모양이다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「ほら、その距離感ですよ！\u3000リア充ディスタンス！」"
translation = "「보세요, 그 거리감이에요! 리얼충 디스턴스!」"

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「ええ、今のが！？\u3000普通の距離感だったでしょ！\u3000ね、会長さん？」"
translation = "「에에, 방금 게!? 평범한 거리감이었잖아! 그치, 회장님?」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「いーえ！\u3000絶対イチャイチャしてました！\u3000ですよね魔王さん？」"
translation = "「아뇨! 절대 꽁냥거리고 있었습니다! 그렇죠 마왕님?」"

[[dialogue]]
speaker = "unk"
original = "俺的にはイチャイチャがいいです"
translation = "제 입장에서는 꽁냥거리는 게 좋습니다"

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「んひゃっ！？\u3000そ、そう言うこと聞いてるんじゃないってば！？」"
translation = "「응햐!? 그, 그런 걸 묻는 게 아니라고!?」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「ほ～ら、やっぱりイチャイチャじゃないですかー。私の目は正しかったんです」"
translation = "「거봐요, 역시 꽁냥거리는 거잖아요─. 제 눈은 정확했다고요」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「ごめんなさい、遅れちゃって。ちょっとトラブルがあって……あら？\u3000取り込み中だったかしら？」"
translation = "「미안해요, 늦어버려서. 잠깐 트러블이 있어서…… 어라? 한창 바쁜 중이었을까?」"

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「い、いえ、何でもないです！\u3000魔法のご指導お願いします！」"
translation = "「아, 아뇨, 아무것도 아니에요! 마법 지도 부탁드립니다!」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「そう、ならいいけど。そちらの子は初めましてね。私はウィステリア。新星学園の図書館で司書をしているわ」"
translation = "「그래, 그럼 다행이지만. 그쪽 아이는 처음 보네. 나는 위스테리아. 신성학원 도서관에서 사서를 하고 있어」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「申し遅れました。私は百目騎レイラと申します。どうぞお見知りおきくださ……え、今、ウィステリアさんと仰いました！？」"
translation = "「인사가 늦었습니다. 저는 도메키 레이라라고 합니다. 부디 잘 부탁드립…… 에, 지금, 위스테리아 씨라고 하셨나요!?」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「あの『<ruby>千年に一度の英雄<rt>ミレニアム・ワン</rt></ruby>』の！？」"
translation = "「그 『<ruby>천년에 한 번 나올 영웅<rt>밀레니엄 원</rt></ruby>』의!?」"

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「みれにあむ……」"
translation = "「밀레니엄……」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「わん？」"
translation = "「원?」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「千年に一度の英雄だから、ミレニアム・ワンです。私が考えました！」"
translation = "「천년에 한 번 나올 영웅이니까, 밀레니엄 원입니다. 제가 생각했어요!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「イザベラさんが言ってました。魔界の厄ネタ、歩く危険物だって。実際にお会いできて光栄です！」"
translation = "「이자벨라 씨가 말했어요. 마계의 골칫덩이, 걸어 다니는 위험물이라고. 실제로 뵙게 되어 영광입니다!」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「私が何したっていうのよ！？\u3000とにかくそれ絶対に他の人に言わないでね。広まっちゃうから！」"
translation = "「내가 뭘 했다는 거야!? 아무튼 그거 절대 다른 사람한테 말하지 마. 퍼지니까!」"

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「もう、勝手に人の二つ名を増やさないの」"
translation = "「정말, 마음대로 남의 이명을 늘리지 마」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「え～、かっこいいのに……ジャスティスウィザードだって私が考えたんですよ？」"
translation = "「에~, 멋있는데…… 저스티스 위저드도 제가 생각한 거라고요?」"

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「──は？」"
translation = "「──하?」"

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「……レイラ、説明して。私は今、冷静さを欠こうとしているよ」"
translation = "「……레이라, 설명해. 나는 지금, 냉정함을 잃으려 하고 있어」"

[[dialogue]]
speaker = "unk"
original = "ジャスティスウィザード。模倣犯が出るほど裏社会では伝説的なハッカーであり、コハルコさんの異名である。"
translation = "저스티스 위저드. 모방범이 나올 정도로 뒷세계에서는 전설적인 해커이며, 쿠하루코 씨의 이명이다."

[[dialogue]]
speaker = "unk"
original = "が、コハルコさんはそう呼ばれることにめちゃくちゃうんざりしているのだ。"
translation = "하지만, 쿠하루코 씨는 그렇게 불리는 것을 굉장히 지긋지긋해하고 있다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「私、両親が亡くなってから親戚をたらい回しにされてて……」"
translation = "「저, 부모님이 돌아가신 뒤로 친척 집을 전전하며 살아서……」"

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「レイラ……」"
translation = "「레이라……」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「その間、ネットで匿名掲示板に入り浸ってたんです。何を隠そう、ネラーだったんですね」"
translation = "「그동안, 인터넷에서 익명 게시판에 틀어박혀 있었거든요. 사실을 숨기지 않자면, 네티즌이었던 거죠」"

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「いや、それは隠そう？\u3000ご両親も天国から見守ってるよ？」"
translation = "「아니, 그건 좀 숨기자? 부모님도 천국에서 지켜보고 계셔?」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「そこで、悪と戦う正義のハッカーがいるって話題になって……まさにジャスティスウィザードだって書き込んだらそれが定着しちゃったんですよ」"
translation = "「거기서, 악과 싸우는 정의의 해커가 있다는 화제가 돼서…… 그야말로 저스티스 위저드라고 글을 썼더니 그게 정착되어 버렸거든요」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「そのジャスティスウィザードとこうしてリアルで会えたんだから、世間って狭いですよねー」"
translation = "「그 저스티스 위저드와 이렇게 리얼에서 만나다니, 세상 참 좁네요─」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「コハルコさん、ジャスティスウィザードなんて呼ばれてるの？\u3000それはまた……かわいそうに」"
translation = "「쿠하루코 씨, 저스티스 위저드라고 불리고 있어? 그건 참…… 안됐네」"

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「って、あれ？\u3000私、また何か言っちゃいました？」"
translation = "「어라? 저, 또 무슨 말 실수했나요?」"

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「お・ま・え・かーーーーーーーーっ！！！！」"
translation = "「너·였·냐ㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡ!!!!」"

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「いつか犯人を見つけ出してやろうと思ってたけど、こんな形で見つかるとはね。いやぁ、ホント、世間って狭いね」"
translation = "「언젠가 범인을 찾아내 주겠다고 생각했는데, 이런 식으로 찾게 될 줄이야. 이야, 정말, 세상 참 좁네」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「……もしかして私、墓穴掘っちゃいました？」"
translation = "「……혹시 저, 제 무덤을 판 건가요?」"

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「私がこのクソダサネームにどれだけ苦しめられてきたか、少しは思い知れー！」"
translation = "「내가 이 구린 네이밍 때문에 얼마나 고통받아 왔는지, 조금은 깨달아라ㅡ!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「アイキャンフラーーーーーイ！！」"
translation = "「아이 캔 플라이ㅡㅡㅡㅡ!!!!」"

[[dialogue]]
speaker = "unk"
original = "レイラはコハルコさんのドローンに括り付けられ、超高速飛行を楽しんだのだった。"
translation = "레이라는 쿠하루코 씨의 드론에 묶여, 초고속 비행을 즐겼던 것이었다."

