[[dialogue]]
speaker = "unk"
original = "第２話,鉄球使いのスペシャルな修行,P"
translation = "제2화, 철구 사용자의 스페셜한 수행, P"

[[dialogue]]
speaker = "unk"
original = "今日はアリーナで、ヨミとウェディングフォームの実戦テストを行っていた。"
translation = "오늘은 아레나에서 요미와 웨딩 폼의 실전 테스트를 하고 있었다."

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「うーん……」"
translation = "「으음……」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「やっぱりいつもと感覚が違う……これは単純なパワーアップと考えない方がいいかもしれませんね」"
translation = "「역시 평소랑 감각이 달라요…… 이건 단순한 파워 업이라고 생각하지 않는 게 좋을지도 모르겠네요」"

[[dialogue]]
speaker = "unk"
original = "どうしたの？"
translation = "왜 그래?"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「見て下さい、この『破邪の鈴』を。通常の戦闘服のものより巨大化しちゃってるんですよね」"
translation = "「보세요, 이 『파사의 방울』을. 통상 전투복의 것보다 거대화되어 버렸거든요」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「大きくなることで攻撃力も上昇しますけど、いいことばかりじゃないみたいで」"
translation = "「커지면서 공격력도 상승하지만 좋은 점만 있는 건 아닌 것 같아요」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「星力の消耗も大きくなりますし、『破邪の鈴』自体も扱いにくくなっちゃいました。これをうまく使いこなすには、修行が必要かも……」"
translation = "「성력 소모도 커지고 『파사의 방울』 자체도 다루기 힘들어졌어요. 이걸 능숙하게 다루려면 수행이 필요할지도……」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「すみません、せっかく会長が期待してくれてるのに、こんな情けないことを言って」"
translation = "「죄송해요, 회장님이 기대해주고 계시는데 이런 한심한 소리를 해서」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「もー、ほんと私ってばダメだなぁ。メイド長は全然問題ないのに……」"
translation = "「정말 나란 애는 안 되겠네. 메이드장님은 전혀 문제없으신데……」"

[[dialogue]]
speaker = "unk"
original = "ヨミヨミに最高の修行をさせてあげるから！"
translation = "요미요미에게 최고의 수행을 시켜줄 테니까!"

[[dialogue]]
speaker = "unk"
original = "わかった、俺に任せて！"
translation = "알았어, 나한테 맡겨!"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ほ、本当ですか！\u3000お願いしますっ♪」"
translation = "「저, 정말인가요! 부탁드릴게요♪」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ということで、会長の要請で来た、妃竜院マハムートよ」"
translation = "「그리하여 회장의 요청으로 온 키류인 마하무트다」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「な……！？\u3000なな、なんでマムがこんなところに！？」"
translation = "「뭐……!? 마마, 마무가 왜 이런 곳에!?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あなたは九浄家メイド隊のヨミね？\u3000クリスマスの時は世話になったわ」"
translation = "「너는 쿠죠 가문 메이드대의 요미지? 크리스마스 때는 신세 졌어」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ととと、とんでもない！\u3000むしろこっちがお世話になりまくっただけです～っ！」"
translation = "「처, 천만에요! 오히려 이쪽이 신세를 엄청나게 졌을 뿐이에요~!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「過去のことはいいわ。それより今日は私は会長のつよ～～い要請でここに来たの」"
translation = "「과거 일은 됐어. 그보다 오늘은 회장의 가아아앙력한 요청으로 여기 온 거야」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「天ヶ崎ヨミ……あなた、修行を求めているらしいわね？」"
translation = "「아마가사키 요미…… 너, 수행을 원하고 있다며?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こやっ！！？\u3000い、いったい会長はマムに何を言ったんですかぁぁぁ～～っ！？」"
translation = "「코얏!!? 도, 대체 회장님은 마무에게 뭐라고 하신 거예요오오오~~!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「このご時世、ハードな修行を求めるなんて、とても感心だわ。あなたの心意気に、この私が応えてあげましょう」"
translation = "「이 시국에 하드한 수행을 원하다니 아주 기특해. 네 기개에 이 내가 응해주도록 하지」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ということで、さっそく修行よ！！」"
translation = "「그럼 곧바로 수행이다!!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こやぁぁぁん！！\u3000その鉄球は勘弁して下さいぃ～～～っ！！」"
translation = "「코양아아앙!! 그 철구만은 봐주세요오~~~!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「同じ鉄球使いとして、私なら的確なアドバイスができるはずよ」"
translation = "「같은 철구 사용자로서 나라면 적절한 조언을 해줄 수 있을 거야」"

[[dialogue]]
speaker = "unk"
original = "そう思って、マムにお願いしたんだ"
translation = "그렇게 생각해서 마무에게 부탁했어"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「さあ、構えなさい！\u3000鉄球の扱いをその身に叩き込んであげるわ！」"
translation = "「자, 자세 잡아! 철구를 다루는 법을 그 몸에 때려 박아줄게!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こやあぁぁぁっ！\u3000叩き込むって、そのでっかい鉄球のことですよねっ！\u3000そんなの食らったら死んじゃう！\u3000死んじゃいますから～～～っ！！」"
translation = "「코양아아앗! 때려 박는다는 게 그 커다란 철구 말이죠! 그런 거 맞으면 죽어! 죽어버린다니까요~~~!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「安心して、ウェディングフォームの防御力を上回る攻撃はしないつもりよ」"
translation = "「안심해, 웨딩 폼의 방어력을 상회하는 공격은 하지 않을 생각이니까」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「まあ、うっかりクリティカルヒットしてしまうこともあるけれど。それは誤差よ。修行の一部として許容しなさい」"
translation = "「뭐, 깜빡하고 크리티컬 히트를 해버릴 때도 있겠지만. 그건 오차야. 수행의 일부로 받아들여」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「そんな誤差で殺されたら、たまったもんじゃありませんってばぁぁぁっ！！」"
translation = "「그런 오차로 죽으면 참을 수 없단 말이에요오오오앗!!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「むむっ、今のを回避するの？\u3000やるわね、さすがは狐魔族といったところかしら？\u3000運動性能が想定以上に高いわ」"
translation = "「무뭇, 방금 걸 회피해? 제법이네, 역시 여우 마족이라 그런가? 운동 성능이 상상 이상으로 높아」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「回避能力はかなり高そうだし。これはウェディングフォームの性能？」"
translation = "「회피 능력은 꽤 높은 것 같네. 이건 웨딩 폼의 성능?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「手加減してっ！\u3000手加減～～～っ！」"
translation = "「살살 해줘요! 살살~~~!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「逃げてばかりで恥ずかしくないの？\u3000さぁ、あなたも反撃してきなさい！」"
translation = "「도망치기만 해서 부끄럽지도 않아? 자, 너도 반격해와!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ええーーーーーいっっ！！」"
translation = "「에이이이잇!!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「甘い！\u3000鉄球の重さを意識して！\u3000慣性をうまく活用するのよっ！」"
translation = "「물러! 철구의 무게를 의식해! 관성을 잘 활용하는 거야!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「そそ、そんなこと言われても無理です～～！\u3000マムみたいにはできませんってば～！！」"
translation = "「그그, 그런 말을 들어도 무리예요~! 마무처럼은 못 한다니까요~!!」"

[[dialogue]]
speaker = "unk"
original = "ヨミヨミならできるよ！"
translation = "요미요미라면 할 수 있어!"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「会長の言う通りよ！\u3000やってやれないことはない！\u3000いや、できるようになるまで修行あるのみよ！」"
translation = "「회장의 말대로야! 해서 안 될 건 없어! 아니, 할 수 있게 될 때까지 수행뿐이야!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こやぁぁぁんっ！！？\u3000この人無茶苦茶言ってますよぉ～～っ！！」"
translation = "「코양아아앙!!? 이 사람 막무가내라구요오~~!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「体も温まってきたわね！\u3000今日は倒れるまで修行するわよ！\u3000あなたを私の次に優れた鉄球使いに育ててあげるわ！」"
translation = "「몸도 좀 풀렸네! 오늘은 쓰러질 때까지 수행하자! 너를 내 다음가는 뛰어난 철구 사용자로 키워줄게!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「そこまでしてもらわなくて結構ですぅ～～～～っ！！」"
translation = "「그렇게까지 안 해주셔도 괜찮아요오~~~~!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「うわぁぁん！\u3000もう許してぇ～～～っ！！」"
translation = "「으아앙! 이제 용서해줘~~~!」"

[[dialogue]]
speaker = "unk"
original = "こうしてヨミはマムの地獄の特訓メニューをこなすことになるのだった。"
translation = "이렇게 요미는 마무의 지옥의 특훈 메뉴를 소화하게 되는 것이었다."

[[dialogue]]
speaker = "unk"
original = "おかげでウェディングフォームで発生した違和感は解消され、ヨミは鉄球使いとして更なるレベルアップを遂げた。"
translation = "덕분에 웨딩 폼에서 발생했던 위화감은 해소되었고, 요미는 철구 사용자로서 한층 더 레벨 업을 이루었다."

[[dialogue]]
speaker = "unk"
original = "……その後３日くらい、話をしてくれなかったけど。"
translation = "……그 후 사흘 정도는 말을 걸어주지 않았지만."

