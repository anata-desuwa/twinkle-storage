[[dialogue]]
speaker = "unk"
original = "お菓子の試食会から数日後。"
translation = "과자 시식회로부터 며칠 뒤."

[[dialogue]]
speaker = "unk"
original = "俺達は再び集まって、計画の次の段階について話し合っていた。"
translation = "우리들은 다시 모여서 계획의 다음 단계에 대해 논의하고 있었다."

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「販売するお菓子については決まりましたけれど、計画を実現する為にはまだ、通らなくてはならない関門がありますわ」"
translation = "「판매할 과자에 대해서는 정해졌지만, 계획을 실현하기 위해서는 아직 통과해야 할 관문이 있습어요.」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「それは、『ハロウィン実行委員会』からお菓子の販売許可をもらうこと」"
translation = "「그건 '할로윈 실행 위원회'로부터 과자 판매 허가를 받는 것.」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「にひひ♪\u3000これまた有名人の『ハロウィン<ruby>狂<rt>きょう</rt></ruby>』と交渉しなくちゃいけないってわけだね」"
translation = "「니히히♪ 이건 또 유명한 '할로윈 광'과 협상해야 한다는 소리네.」"

[[dialogue]]
speaker = "unk"
original = "ハロウィン狂？"
translation = "할로윈 광?"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ハロウィンパーティーって毎年、新星と流星の両学園合同でやってるんだけど、それを運営するハロウィン実行委員会って組織があるのは、会長も知ってるよね？」"
translation = "「할로윈 파티는 매년 신성과 유성 두 학원 합동으로 열리는데, 그걸 운영하는 할로윈 실행 위원회라는 조직이 있는 건 회장도 알고 있지?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「その委員会の現委員長が、大のハロウィン好きでさ。あまりの熱の入れようから、ハロウィン狂って呼ばれてるんだよ」"
translation = "「그 위원회의 현 위원장이 엄청난 할로윈 마니아거든. 너무 열성적이라서 할로윈 광이라고 불리고 있어.」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「あ！\u3000サランもその人知ってるよ～♪」"
translation = "「아! 사란도 그 사람 알아~♪」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「流星学園３年生で、眼鏡かけてて、面白い喋り方する先輩だよね～」"
translation = "「유성학원 3학년이고, 안경 쓰고, 재미있게 말하는 선배지~」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「委員長は、ハロウィンへのこだわりが飛び抜けて強いが故に、新しい企画提案に対しては、審査が厳しいと聞きますわ」"
translation = "「위원장은 할로윈에 대한 집착이 유별나게 강하기 때문에, 새로운 기획 제안에 대해서는 심사가 까다롭다고 들었어요.」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「そこでマインには、彼女との交渉をお願いしたいんですの」"
translation = "「그래서 마인에게 그녀와의 협상을 부탁하고 싶어요.」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ですよね～。いや～、だけど、今のままだと厳しいと思うよ？」"
translation = "「그렇겠죠~. 에휴~ 하지만 지금 이대로는 힘들 거라고 생각해.」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「お菓子試食してもらって～、美味しかったら、いいよ～って言ってくれないかなぁ？」"
translation = "「과자 시식하게 해주고~ 맛있으면 좋다고 말해주지 않을까나?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「お菓子の味で唸らせる作戦も含めて、勝率４割ってところですかね～。追加で何か、委員長を納得させられる手札がないと――」"
translation = "「과자 맛으로 감탄하게 만드는 작전까지 포함해서 승률 40% 정도일까요~. 추가로 뭔가 위원장을 납득시킬 수 있는 카드가 없으면──」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ふふふ、そこはもちろん、考えてありますわ♪」"
translation = "「후후후, 그건 물론 생각해 뒀어요♪」"

[[dialogue]]
speaker = "unk"
original = "翌日の放課後。"
translation = "다음 날 방과 후."

[[dialogue]]
speaker = "unk"
original = "大聖堂カフェテリアでは、ハロウィン実行委員会による、ハロウィンパーティーに向けての進捗確認の会議が行われていた。"
translation = "대성당 카페테리아에서는 할로윈 실행 위원회에 의한 할로윈 파티를 향한 진행 상황 확인 회의가 열리고 있었다."

[[dialogue]]
speaker = "unk"
original = "その場を取り仕切るのは、眼鏡をかけた流星学園３年の女子生徒――ハロウィン狂こと、実行委員長の『<ruby>瓜姫<rt>うりひめ</rt></ruby>キャナンシー』。"
translation = "그 자리를 주관하는 것은 안경을 쓴 유성학원 3학년 여학생── 할로윈 광이라 불리는 실행위원장 '우리히메 캐넌시'."

[[dialogue]]
speaker_original = "キャナンシー"
speaker_translation = "캐넌시"
original = "「みんなぁ～、ハロウィンパーティーの準備は楽しんでるかしらぁ～？\u3000トリックオアトリートぉ～<emoji=heart04>」"
translation = "「모두들~ 할로윈 파티 준비는 즐기고 있니이~? 트릭 오어 트리이잇~❤️」"

[[dialogue]]
speaker_original = "流星学園１年生"
speaker_translation = "유성 학원 1학년"
original = "「トリックオアトリート～♪」"
translation = "「트릭 오어 트릿~♪」"

[[dialogue]]
speaker_original = "新星学園２年生"
speaker_translation = "신성 학원 2학년"
original = "「トリックオアトリート～♪」"
translation = "「트릭 오어 트릿~♪」"

[[dialogue]]
speaker_original = "流星学園附属校３年生"
speaker_translation = "유성 학원 부속교 3학년"
original = "「トリックオアトリート～♪」"
translation = "「트릭 오어 트릿~♪」"

[[dialogue]]
speaker_original = "キャナンシー"
speaker_translation = "캐넌시"
original = "「きゃっふ～ん<emoji=heart04>\u3000みんな、いいお返事ねぇ～<emoji=heart04>\u3000それじゃあ、今日も楽しく、ハロウィンに向けての会議をしていくわよぉ～<emoji=heart04>」"
translation = "「꺄후웅~❤️ 모두 좋은 대답이네에~❤️ 그럼 오늘도 즐겁게 할로윈을 향한 회의를 시작할게에~❤️」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「お忙しいところ、失礼致しますわ」"
translation = "「바쁘신 와중에 실례하겠어요.」"

[[dialogue]]
speaker_original = "キャナンシー"
speaker_translation = "캐넌시"
original = "「あらん？\u3000どちら様かしらぁ？」"
translation = "「어라항? 누구실까나아?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「お初にお目にかかりますわ、委員長様。<ruby>私<rt>わたくし</rt></ruby>、このようなものですの――」"
translation = "「처음 뵙겠습니다와, 위원장님. 저, 이런 사람입니다──」"

[[dialogue]]
speaker_original = "キャナンシー"
speaker_translation = "캐넌시"
original = "「名刺ぃ？\u3000ふむふむ、秘密結社ゴールデングースの代表取締役……新星学園２年生のバンデッド・セナリィちゃん――」"
translation = "「명하함? 흠흠, 비밀결사 골든 구스의 대표이사…… 신성학원 2학년 밴디드 세나리짱──」"

[[dialogue]]
speaker_original = "キャナンシー"
speaker_translation = "캐넌시"
original = "「あぁん、思い出したわぁ～ん<emoji=heart04>\u3000傭兵の星騎士ちゃんよねぇ？\u3000それで、私に何か用かしらぁ～？」"
translation = "「아항, 생각났다아~❤️ 용병 성기사짱이지이? 그래서 나한테 무슨 용건일까나아~?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「実はこの度、ハロウィンパーティーで、お菓子の販売をしたいと考えておりますの」"
translation = "「실은 이번에 할로윈 파티에서 과자를 판매하고 싶다고 생각하고 있습니다.」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「つきましては、会場内での販売許可を頂きたいと思いまして」"
translation = "「그리하여 행사장 내에서의 판매 허가를 받고 싶어서요.」"

[[dialogue]]
speaker_original = "キャナンシー"
speaker_translation = "캐넌시"
original = "「……それ、私がハロウィン狂と呼ばれているのを知った上で、本気で言ってるのかしらぁ～？」"
translation = "「……그거 내가 할로윈 광이라고 불리는 걸 알고서 진심으로 하는 소리니이~?」"

[[dialogue]]
speaker_original = "キャナンシー"
speaker_translation = "캐넌시"
original = "「お菓子を作ってくるのは別に自由よぉ～？\u3000それを配ったり、交換するのも許可しているわぁ<emoji=heart04>\u3000でも……あなた今、販売って言ったわよねぇ～？」"
translation = "「과자를 만들어 오는 건 별로 상관없어어~? 그걸 나눠주거나 교환하는 것도 허가하고 있다구우❤️ 하지만…… 너 지금 판매라고 했지이~?」"

[[dialogue]]
speaker_original = "キャナンシー"
speaker_translation = "캐넌시"
original = "「その売って得たお金はどうする気なのかしらぁ～？\u3000学園に寄付する？\u3000それとも実行委員会の運営資金としてくれるのかしらぁ～？\u3000違うわよねぇ～？」"
translation = "「그 팔아서 얻은 돈은 어떻게 할 생각이니이~? 학원에 기부할 거야? 아니면 실행 위원회의 운영 자금으로 줄 거니이~? 아니지이~?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ふふっ……決まっていますわ。それは、もちろん――」"
translation = "「후훗…… 정해져 있습니다와. 그건 물론──」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「全額、我が社の懐に入れさせて頂きますわ！\u3000ボランティア団体ではありませんもの。<ruby>私<rt>わたくし</rt></ruby>、お金稼ぎが大好きなんですの♪」"
translation = "「전액 우리 회사의 주머니로 넣겠어요! 자원봉사 단체가 아니니까요. 저, 돈 버는 걸 아주 좋아해요♪」"

[[dialogue]]
speaker_original = "キャナンシー"
speaker_translation = "캐넌시"
original = "「きゃっふ～ん！\u3000清々しいくらい言い切ったわねぇ～？\u3000でもその自分の愛するものに対してのストレートな姿勢は、私も好きよぉ～？」"
translation = "「꺄후웅! 청량할 정도로 단언해 버렸네에~? 하지만 그 자신이 사랑하는 것에 대한 솔직한 자세는 나도 좋아한다구우~?」"

[[dialogue]]
speaker_original = "キャナンシー"
speaker_translation = "캐넌시"
original = "「私もハロウィンが大・大・だ～い好きだものぉ<emoji=heart04>\u3000だからこそ――」"
translation = "「나도 할로윈을 아~주 아~주 좋아하니까아❤️ 그렇기에──」"

[[dialogue]]
speaker_original = "キャナンシー"
speaker_translation = "캐넌시"
original = "「答えはノーよぉ！\u3000私が求めるハロウィンパーティーにお金稼ぎなんて不純な要素はいらないのぉ～<emoji=heart04>」"
translation = "「대답은 노야아! 내가 추구하는 할로윈 파티에 돈벌이 같은 불순한 요소는 필요 없어어~❤️」"

[[dialogue]]
speaker_original = "キャナンシー"
speaker_translation = "캐넌시"
original = "「ハロウィンに必要なのは、溢れる愛であってお金ではないのよぉ～。それがわからないあなたには、許可はあげられないわぁ～<emoji=heart04>」"
translation = "「할로윈에 필요한 건 넘치는 사랑이지 돈이 아니야아~. 그걸 모르는 너에게는 허가를 해줄 수 없어어~❤️」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ふふふ、そう言うと思ってましたわ。ただ、委員長様、愛の形とは別に１つではありませんわよね？」"
translation = "「후후후, 그렇게 말할 줄 알았어요. 다만 위원장님, 사랑의 형태란 게 꼭 하나뿐인 건 아니죠?」"

[[dialogue]]
speaker_original = "キャナンシー"
speaker_translation = "캐넌시"
original = "「……どういう意味かしらぁ～？」"
translation = "「……무슨 뜻일까나아~?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「<ruby>私<rt>わたくし</rt></ruby>、目に見えないものは信じない主義ですの。故に私は、その愛を目に見える形で証明致しますわ」"
translation = "「저, 눈에 보이지 않는 건 믿지 않는 주의입니다. 고로 저는 그 사랑을 눈에 보이는 형태로 증명하겠어요.」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「――マイン、サラン様。出番ですわよ！」"
translation = "「──마인, 사란 님. 차례예요와!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「はいは～い♪」"
translation = "「네이 네이♪」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「トリックオアスイート～♪」"
translation = "「트릭 오어 스위트~♪」"

[[dialogue]]
speaker_original = "キャナンシー"
speaker_translation = "캐넌시"
original = "「きゃっふ～ん！？\u3000こ、これはぁ～！？」"
translation = "「꺄후웅!? 이, 이것은어~!?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「にひひ♪\u3000いわゆる『形から入る』ってやつですよ」"
translation = "「니히히♪ 이른바 '겉모습부터 시작한다'는 거죠.」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「いくら口で言ったところで、委員長……本気のハロウィン愛を持つあなたからの信用は得られない」"
translation = "「아무리 말로 해봤자 위원장…… 진심 어린 할로윈 사랑을 가진 당신의 신용은 얻을 수 없겠죠.」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「だからこそ、私たちがハロウィンに対して本気だってことを具体的に示す必要がある。それがこの、ハロウィン衣装ってわけです」"
translation = "「그렇기에 우리가 할로윈에 진심이라는 걸 구체적으로 보여줄 필요가 있어요. 그게 바로 이 할로윈 의상이라는 겁니다.」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「委員長さん、見て見て～♪\u3000可愛いでしょ～？\u3000サランはカボチャのお姫様、マインちゃんは赤ずきんちゃんの仮装なんだよ～♪」"
translation = "「위원장님, 봐봐~♪ 귀엽지~? 사란은 호박 공주님, 마인짱은 빨간 망토 차차 가장이라구~♪」"

[[dialogue]]
speaker_original = "キャナンシー"
speaker_translation = "캐넌시"
original = "「やぁぁぁ～ん<emoji=heart04>\u3000確かに可愛いわぁぁぁ～んっ<emoji=heart04>\u3000な、なんなの、このハイクオリティ～！？」"
translation = "「야아아앙❤️ 확실히 귀여워어어엉❤️ 머, 뭐야 이 하이 퀄리티는어~!?」"

[[dialogue]]
speaker_original = "キャナンシー"
speaker_translation = "캐넌시"
original = "「数多のハロウィン衣装を見て、自分でも仮装してきたからわかるわぁ～！\u3000この衣装は素材から作り込みまで、なにもかも本気のそれよぉ～！？」"
translation = "「수많은 할로윈 의상을 봐왔고 나 스스로도 가장해 왔으니까 알 수 있어어~! 이 의상은 소재부터 디테일까지 모든 게 진심이라구우~!?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「おわかり頂けてなによりです。これを作ってくれたのは、流星学園のＯＧ、マリオン・ネイマール様」"
translation = "「알아주셔서 다행이네요. 이걸 만들어 준 건 유성학원의 OG, 마리온 네이마르 님입니다.」"

[[dialogue]]
speaker_original = "キャナンシー"
speaker_translation = "캐넌시"
original = "「あぁ～んっ<emoji=heart04>！？\u3000あの人形使いのマリオン様！？\u3000そんなの、納得せざるを得ない愛らしさだわぁ～んっ！」"
translation = "「아아앙~❤️!? 그 인형술사 마리온 님!? 그렇다면 납득할 수밖에 없는 사랑스러움이야아~앙!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「今回、我が社が全力でハロウィンに望む為に、学園最高の服職人に依頼して準備してきました」"
translation = "「이번에 저희 회사가 전력으로 할로윈에 임하기 위해 학원 최고의 복식 장인에게 의뢰해 준비해 왔습니다.」"

[[dialogue]]
speaker_original = "キャナンシー"
speaker_translation = "캐넌시"
original = "「っ……だ、だとしても、それだけじゃ許可なんてあげられないわよぉ～？」"
translation = "「윽…… 그, 그렇다 해도 그것만으로는 허가해 줄 수 없다구우~?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ほう？\u3000と言いますと？」"
translation = "「호오? 그 말씀은?」"

[[dialogue]]
speaker_original = "キャナンシー"
speaker_translation = "캐넌시"
original = "「確かにその仮装は愛に溢れていると認めるわぁ～ん。でもぉ、あなた達の手作りではないし、あくまで外面だけよねぇ～？\u3000大事なのはぁ――」"
translation = "「확실히 그 가장은 사랑이 넘친다는 건 인정해에~. 하지만 너희가 직접 만든 것도 아니고 어디까지나 겉모습뿐이잖니이~? 중요한 거어언──」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「大事なのは、中身が伴っていること、ですか？\u3000にひひ♪\u3000なら、その中身も具体的に味わって頂きましょう♪」"
translation = "「중요한 건 알맹이가 뒤따라야 한다는 거죠? 니히히♪ 그럼 그 알맹이도 구체적으로 맛보여 드리죠♪」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「じゃ～ん♪\u3000どうぞ～♪\u3000こちら、サランが作ったハロウィンカップケーキで～す♪」"
translation = "「쨘♪ 여기요~♪ 이건 사란이 만든 할로윈 컵케이크입니다~♪」"

[[dialogue]]
speaker_original = "キャナンシー"
speaker_translation = "캐넌시"
original = "「サラン……？\u3000はっ！？\u3000ひょっとしてあなた、食の天才……隠れた名パティシエと言われる桜十路家の……！？」"
translation = "「사란……? 핫!? 설마 당신, 식의 천재…… 숨겨진 명파티시에라 불리는 사쿠라코지 가문의……!?」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「天才かどうかはサランにはわからないですけど～……食べてくれた人がふわふわな気持ちになってくれるように、全力で作りました～！」"
translation = "「천재인지는 사란은 잘 모르겠지만~…… 먹어주는 사람이 둥실둥실한 기분이 되길 바라며 전력으로 만들었어요~!」"

[[dialogue]]
speaker_original = "キャナンシー"
speaker_translation = "캐넌시"
original = "「はあぁんっ<emoji=heart04>\u3000こ、このカップケーキも、なんて愛らしさに溢れた見た目なのぉ～！？\u3000み、認めたくないのに、胸がキュンキュンしちゃうわぁ～ん<emoji=heart04>」"
translation = "「하아앙❤️ 이, 이 컵케이크도 어쩜 이렇게 사랑스러움이 넘치는 모양이니이~!? 이, 인정하고 싶지 않은데 가슴이 큥큥거려어~❤️」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「えへへ、可愛いって思ってもらえたなら、嬉しいです～♪」"
translation = "「에헤헤, 귀엽다고 생각해주셨다면 기뻐요~♪」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「さぁさぁ、委員長、遠慮せずにパクッといっちゃってください。ほらほら、どうぞどうぞ♪」"
translation = "「자자 위원장, 사양 말고 덥석 드셔보세요. 자 어서 어서♪」"

[[dialogue]]
speaker_original = "キャナンシー"
speaker_translation = "캐넌시"
original = "「う……うぅ……お金稼ぎ目的で作られたお菓子に、私のハロウィン愛が負けるわけ……パクッ……もぐもぐ――」"
translation = "「우…… 으으…… 돈벌이 목적으로 만들어진 과자에 나의 할로윈 사랑이 질 리가…… 냠…… 우물우물──」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「<ruby>Ｂｏｍｂ<rt>ボンッ</rt></ruby><emoji=heart04>」"
translation = "「Bomb<rt>펑</rt></ruby>❤️」"

[[dialogue]]
speaker_original = "キャナンシー"
speaker_translation = "캐넌시"
original = "「きゃっっっふぅ～～～んっ<emoji=heart04><emoji=heart04><emoji=heart04>！！！」"
translation = "「꺄아아아아후우우우우우우웅❤️!!」"

[[dialogue]]
speaker_original = "流星学園１年生"
speaker_translation = "유성 학원 1학년"
original = "「い、委員長ぉぉぉ～～～っ！！？」"
translation = "「위, 위원장님어어어어어억!!?」"

[[dialogue]]
speaker_original = "新星学園２年生"
speaker_translation = "신성 학원 2학년"
original = "「委員長が倒れたぁぁぁ～～～っ！！？」"
translation = "「위원장님이 쓰러졌다아아아아아악!!?」"

[[dialogue]]
speaker_original = "流星学園附属校３年生"
speaker_translation = "유성 학원 부속교 3학년"
original = "「大丈夫ですか！？\u3000しっかりして下さい～～～っ！」"
translation = "「괜찮으세요!? 정신 차리세요오오오오옷!」"

[[dialogue]]
speaker_original = "キャナンシー"
speaker_translation = "캐넌시"
original = "「お、美味しさが口の中で爆発して……とってもハッピーハロウィンだわぁ～ん……<emoji=heart04>\u3000……ガクリ」"
translation = "「마, 맛이 입안에서 폭발해서…… 너무나 해피 할로윈이야아~앙……❤️ ……털썩」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「にひひ♪\u3000どうやら、交渉成立みたいですね？\u3000委員長♪」"
translation = "「니히히♪ 아무래도 협상 성립인 것 같네요? 위원장님♪」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「うふふふっ♪\u3000やりましたわ！\u3000これで計画が実行できますわよ♪」"
translation = "「우후후훗♪ 해냈습니다와! 이걸로 계획을 실행할 수 있어요와♪」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「マインちゃん！\u3000すご～い♪\u3000サラン、ビックリしちゃったよ～♪」"
translation = "「마인짱! 대단해~♪ 사란, 깜짝 놀라버렸어~♪」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「言われた通りの台詞を喋ってただけなのに、本当に上手くいっちゃった！」"
translation = "「하라는 대로 대사만 쳤을 뿐인데 정말 잘 됐네!」"

[[dialogue]]
speaker = "unk"
original = "さすが、交渉人だな"
translation = "역시 교섭인이구나."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「まぁ、セナリィが交渉カードとして、ハロウィン衣装を用意してくれたから上手くいったんだけどね～」"
translation = "「뭐, 세나리가 협상 카드로 할로윈 의상을 준비해 줘서 잘 된 거지만 말이야~.」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「私はそれを使って、会話の流れを組み立てただけだよ」"
translation = "「나는 그걸 써서 대화 흐름을 짰을 뿐이야.」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ほほほ♪\u3000<ruby>私<rt>わたくし</rt></ruby>の商売に対する嗅覚と、マインの交渉術が合わされば、最強ということですわ！」"
translation = "「호호호♪ 저의 장사에 대한 후각과 마인의 협상술이 합쳐지면 최강이라는 겁니다와!」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「本当にすごいよ～♪\u3000サラン、もっとマインちゃんとも仲良くなりたいな～♪」"
translation = "「정말 대단해~♪ 사란, 마인짱이랑 더 친해지고 싶어~♪」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「そうだ、この前ね、セナリィちゃんと<ruby>ＤＩＳＣ<rt>ディスク</rt></ruby>の連絡先交換したの～」"
translation = "「맞다, 요전에 말이야, 세나리짱이랑 DISC 연락처 교환했어~」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「マインちゃんも交換しよ～？」"
translation = "「마인짱도 교환하자~?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あ～、連絡先か～……えっと～……」"
translation = "「아~ 연락처인가~…… 저기~……」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ダメ～？」"
translation = "「안 돼~?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「いや、ダメというわけではないんですけど……あはは……」"
translation = "「아니, 안 된다는 건 아닌데요…… 아하하……」"

[[dialogue]]
speaker = "unk"
original = "少し困った顔をしながらも、結局その後、サランの押しに負けて、連絡先を交換してしまうネーゼマインなのだった。"
translation = "조금 난처한 표정을 지으면서도 결국 그 뒤 사란의 기세에 밀려 연락처를 교환해 버리는 네제마인이었다."

