[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「はぁ、はぁ、強い、ですわ……」"
translation = "「하아, 하아, 강하네요……」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「完全に息が上がってしまっているようだが、まだ続けるつもりかな？」"
translation = "「완전히 숨이 턱 끝까지 찬 모양인데, 아직 계속할 셈인가?」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「も、もちろんですのっ！！」"
translation = "「무, 물론이에요!!」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「ふむ……だが熱が入りすぎて、周りのお客様の迷惑になってはならない」"
translation = "「흠…… 하지만 너무 열이 올라서 주변 손님들에게 민폐를 끼쳐선 안 되지」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「ここはひとつ間を置くというのも悪くないと思うが」"
translation = "「여기서 일단 틈을 두는 것도 나쁘지 않다고 생각하네만」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「そ、そうですわね……」"
translation = "「그, 그렇군요……」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「学園長様への挑戦はいつでも受け付けてくださいますの？」"
translation = "「학원장님을 향한 도전은 언제든 받아주시는 건가요?」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「ああ、私が再び旅に出てしまう前であれば構わないよ」"
translation = "「아아, 내가 다시 여행을 떠나기 전이라면 상관없네」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「分かりましたわ。それまでに必ず学園長様に認めさせてみせますの」"
translation = "「알겠습니다. 그때까지 반드시 학원장님께 인정받아 보이겠어요」"

[[dialogue]]
speaker = "unk"
original = "どうなる事やらと一瞬ハラハラしたが、エルゼが引き下がったことで一応の決着がついた。"
translation = "어떻게 될지 잠시 조마조마했지만, 엘제가 물러나면서 일단락되었다."

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「それにしても学園長さんはお強いですね～」"
translation = "「그건 그렇고 학원장님은 정말 강하시네요~」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「それは思いますの……失礼ながら学園長様は、年齢的に星騎士としての全盛期を過ぎているはずですの」"
translation = "「그건 동감이에요…… 실례지만 학원장님은 연령상 성기사로서의 전성기를 지났을 텐데요」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「なのにどうしてそんなにもお強いのでしょうか？」"
translation = "「그런데 어째서 그렇게 강하신 건가요?」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「さて、どうしてだろうな……」"
translation = "「글쎄, 어째서일까……」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「よく分からないのだが私は、星力が最も充実している時期を過ぎた今でも、増大し続けているらしい」"
translation = "「잘은 모르겠지만 나는 성력이 가장 충실한 시기를 지난 지금도 계속해서 증대하고 있는 모양이야」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「私としては修行の成果だとしか言いようがないのだがね、エスメラルダ女史あたりは徹底的に調査したがっている」"
translation = "「나로서는 수행의 성과라고밖에 할 말이 없네만, 에스메랄다 여사 쪽은 철저하게 조사하고 싶어 하더군」"

[[dialogue]]
speaker = "unk"
original = "協力はしてあげないんですか？"
translation = "협력은 안 해주시는 건가요?"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「協力はしているさ。旅先で得た有益な情報は全て伝えているし、時間のある時はデータ分析に協力している」"
translation = "「협력은 하고 있지. 여행지에서 얻은 유익한 정보는 전부 전하고 있고, 시간이 날 때는 데이터 분석에 협조하고 있네」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「だが、エスメラルダ女史の分析は苦行以外の何物でもないからな」"
translation = "「하지만 에스메랄다 여사의 분석은 고행 그 자체니까 말이야」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「トレーニングルームに監禁されて、モンスターとの模擬戦を１０時間も２０時間も強いられるんだ」"
translation = "「트레이닝 룸에 감금되어서 몬스터와의 모의전을 10시간, 20시간이나 강요당한다네」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「そんなの私でなくても逃げ出したくなるものだろう？」"
translation = "「그런 건 내가 아니더라도 도망치고 싶어질걸?」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「それは大変です～」"
translation = "「그건 힘들겠네요~」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「大変、というより酷いですわ……」"
translation = "「힘들다기보다 가혹하네요……」"

[[dialogue]]
speaker = "unk"
original = "（そんなことしたんですか？）"
translation = "(그런 짓을 했나요?)"

[[dialogue]]
speaker = "unk"
original = "（エスメラルダ先生……）"
translation = "(에스메랄다 선생님……)"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "『し、仕方がないのよ！\u3000そうでもしないと学園長の異常な体質は分析できないのだから！』"
translation = "『어, 어쩔 수 없잖아! 그렇게라도 안 하면 학원장의 이상한 체질을 분석할 수 없으니까!』"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "『あれはさすがにやり過ぎたと思ってるし、以後はもっと短い拘束時間で済むように努めてますし……』"
translation = "『그건 나도 좀 심했다고 생각해서, 이후로는 좀 더 짧은 구속 시간으로 끝나도록 노력하고 있단 말이야……』"

[[dialogue]]
speaker = "unk"
original = "（どのくらい拘束しているんですか？）"
translation = "(어느 정도로 구속하고 있는 건가요?)"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "『５時間から６時間くらい……』"
translation = "『5시간에서 6시간 정도……』"

[[dialogue]]
speaker = "unk"
original = "短くはなってるけど、それでも嫌気がさすには十分な時間だった。"
translation = "짧아지긴 했지만, 그래도 질려버리기엔 충분한 시간이었다."

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「まあ研究の事となると視野が狭くなるだけで、彼女は真面目で優秀な教師だからな。悪気がないことは分かっている」"
translation = "「뭐 연구 일이라면 시야가 좁아질 뿐이지, 그녀는 성실하고 우수한 교사니까 말이야. 악의가 없다는 건 알고 있네」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「この人工戦闘服についても、エスメラルダ女史が知ったらデータを取りたがるだろうな」"
translation = "「이 인공 전투복에 대해서도 에스메랄다 여사가 알면 데이터를 따고 싶어 하겠군」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "『ぎくっ！』"
translation = "『뜨끔!』"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「案外その辺りに身を潜めていて、データを収集しているかもしれない」"
translation = "「의외로 이 근처 어딘가에 몸을 숨기고 데이터를 수집하고 있을지도 모르지」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "『ぎくぎくっ！！？』"
translation = "『뜨끔뜨끔!!?』"

[[dialogue]]
speaker = "unk"
original = "学園長の言葉に、俺とエスメラルダ先生が冷や汗を流した。その次の瞬間だった。"
translation = "학원장의 말에 나와 에스메랄다 선생님이 식은땀을 흘렸다. 그다음 순간이었다."

[[dialogue]]
speaker = "unk"
original = "モンスターの出現を知らせるアラートがＤＩＳＣから鳴り響く。"
translation = "몬스터의 출현을 알리는 경고음이 DISC에서 울려 퍼진다."

[[dialogue]]
speaker = "unk"
original = "同時にアステラが出現し、その中から大量のモンスターがワラワラと現れた。"
translation = "동시에 아스텔라가 출현하고 그 안에서 대량의 몬스터가 우글우글 나타났다."

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「大変～、モンスターさんたちがいっぱい現れちゃった～！」"
translation = "「큰일이야~, 몬스터님들이 잔뜩 나타나 버렸어~!」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「彼らも夏仕様だね。楽し気な空気に誘われてきたのかな？」"
translation = "「그들도 여름 사양이군. 즐거운 분위기에 이끌려 온 걸까?」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "『呑気なことを言ってる場合じゃありません！\u3000はやく一般の方々を避難させないと！』"
translation = "『태평한 소리 하고 있을 때가 아니에요! 빨리 일반인들을 피난시켜야!』"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「その通りだ。非常事態だからな、きみも手伝ってくれたまえ、エスメラルダ女史」"
translation = "「그 말대로다. 비상사태니까 말이야, 자네도 도와주게나, 에스메랄다 여사」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "『！！？』"
translation = "『!!?』"

[[dialogue]]
speaker = "unk"
original = "気付いていたんですか？"
translation = "알고 계셨나요?"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「もちろんだ。私の地獄耳を甘く見ないほうがいい」"
translation = "「물론이지. 나의 밝은 귀를 우습게 보지 않는 게 좋아」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「バレているなら身を隠していても仕方ありません」"
translation = "「들켰다면 몸을 숨기고 있어 봤자 소용없겠네요」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「学園長、私はお客様を避難させますので、モンスターの方はお願い致します」"
translation = "「학원장님, 저는 손님들을 피난시킬 테니 몬스터 쪽은 부탁드립니다」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「ああ、頼んだぞ」"
translation = "「아아, 맡겨두게」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「私も戦いますわ！\u3000学園長様に私の力を見ていただく好機ですの！」"
translation = "「저도 싸우겠어요! 학원장님께 제 힘을 보여드릴 호기예요!」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「よし、では我々はモンスターがこの区域より散らぬよう抑え込むぞ」"
translation = "「좋아, 그럼 우리들은 몬스터가 이 구역 밖으로 흩어지지 않도록 억누르자고」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「お任せくださいな～」"
translation = "「맡겨주세요~」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「スイーツ・フロート～」"
translation = "「스위트 플로트~」"

[[dialogue]]
speaker = "unk"
original = "サランがドーナツ型の浮き輪を振り回すと、モンスターたちはそれに弾き飛ばされる。"
translation = "사란이 도넛 모양의 튜브를 휘두르자 몬스터들이 튕겨 나간다."

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「バラッジ・オブ・パラソルっ！」"
translation = "「배리지 오브 파라솔!」"

[[dialogue]]
speaker = "unk"
original = "そこをエルゼの攻撃が的確に狙い、次々とモンスターを倒していく。"
translation = "그곳을 엘제의 공격이 정확히 겨냥해 차례차례 몬스터를 쓰러뜨려 간다."

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「ふむ……素晴らしい連携だな」"
translation = "「흠…… 훌륭한 연계로군」"

[[dialogue]]
speaker = "unk"
original = "２人の戦いぶりを横目に見ながら、学園長も着実にモンスターの数を減らしていった。"
translation = "두 사람의 전투 방식을 곁눈질하며 학원장도 착실하게 몬스터의 수를 줄여나갔다."

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「さて、後はアステラを潰しに行くだけだが……」"
translation = "「자, 남은 건 아스텔라를 부수러 가는 것뿐인데……」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「会長くん、ついて来てくれるかな？\u3000それから──」"
translation = "「회장군, 따라와 주겠나? 그리고──」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「もちろん私も一緒に行きますわ！」"
translation = "「당연히 저도 같이 가겠어요!」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「決して足手まといにはなりません！\u3000だから連れて行ってくださいませ！」"
translation = "「결코 짐이 되지 않겠습니다! 그러니 데려가 주세요!」"

[[dialogue]]
speaker = "unk"
original = "だからエルゼも！"
translation = "그러니까 엘제도!"

[[dialogue]]
speaker = "unk"
original = "いざという時は俺が守ります"
translation = "만약의 상황엔 제가 지키겠습니다."

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「いいだろう」"
translation = "「좋아, 그러도록 하지」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「会長くん、言った以上は責任もって彼女を守り通したまえ」"
translation = "「회장군, 말한 이상은 책임지고 그녀를 끝까지 지켜주게나」"

[[dialogue]]
speaker = "unk"
original = "はいっ！"
translation = "네!"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「サランはエスメラルダ先生と一緒に、お客様の安全をかくほするよ～」"
translation = "「사란은 에스메랄다 선생님이랑 같이, 손님들의 안전을 확보할게~」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「だからエルゼ、頑張って戦ってきてね～♪」"
translation = "「그러니까 엘제, 힘내서 싸우고 와~♪」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「任せてください、サランお姉さま！」"
translation = "「맡겨주세요, 사란 언니!」"

