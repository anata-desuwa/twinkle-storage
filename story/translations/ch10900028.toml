[[dialogue]]
speaker = "unk"
original = "再び異世界の流星町と関わる事件があった後、メイプルはクルセイダーフォームに変身する力を手に入れて、戦闘で大活躍するようになっていた。"
translation = "다시 이세계의 유성 마을과 관련된 사건이 있은 후 메이플은 크루세이더 폼으로 변신하는 힘을 얻어 전투에서 맹활약하게 되었다."

[[dialogue]]
speaker = "unk"
original = "そのことを褒めると、メイプルはご褒美が欲しいとおねだりしてきて――今日はその、ご褒美の約束をしている日だった。"
translation = "그 점을 칭찬하자 메이플은 포상을 받고 싶다고 졸랐고―― 오늘은 그 포상을 약속한 날이었다."

[[dialogue]]
speaker = "メイプル"
original = "「にへへ<emoji=heart04>\u3000今日は久しぶりに２人でイチャイチャできるね、お兄ちゃん」"
translation = "「니헤헤<emoji=heart04> 오늘은 오랜만에 둘이서 꽁냥꽁냥할 수 있겠네, 오빠」"

[[dialogue]]
speaker = "unk"
original = "ここ１週間くらい星徒会の仕事が忙しく、恋人のメイプルとなかなか２人きりで過ごすことができていなかった。"
translation = "최근 일주일 정도 성도회 업무가 바빠 연인인 메이플과 좀처럼 둘만의 시간을 보내지 못하고 있었다."

[[dialogue]]
speaker = "クロト"
original = "「今日はその衣装なんだな」"
translation = "「오늘은 그 의상이구나」"

[[dialogue]]
speaker = "メイプル"
original = "「うんっ。このフォームになると、お兄ちゃんが好きって気持ちがより強くなるから……<emoji=heart04>\u3000そっちの方がドキドキするかなって<emoji=heart04>」"
translation = "「응. 이 폼이 되면 오빠를 좋아하는 마음이 더 강해지니까……<emoji=heart04> 그편이 더 두근거릴 것 같아서<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「それで……お兄ちゃん、今日はいっぱい甘えてもいい？」"
translation = "「그래서…… 오빠, 오늘은 잔뜩 응석 부려도 돼?」"

[[dialogue]]
speaker = "クロト"
original = "「もちろん。メイプル、おいで」"
translation = "「물론이지. 메이플, 이리 와」"

[[dialogue]]
speaker = "メイプル"
original = "「うんっ<emoji=heart04>\u3000お兄ちゃん<emoji=heart04>」"
translation = "「응<emoji=heart04> 오빠<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "飛び込むように抱き着いてきたメイプルとたっぷりキスをしてから、俺たちはベッドのある寝室へ向かうのだった。"
translation = "뛰어들듯 안겨 온 메이플과 듬뿍 키스를 나눈 뒤 우리는 침대가 있는 침실로 향했다."

[[dialogue]]
speaker = "クロト"
original = "「この体位、メイプル好きだったよな」"
translation = "「이 체위, 메이플이 좋아했었지」"

[[dialogue]]
speaker = "メイプル"
original = "「んっ、うん<emoji=heart04>\u3000魔王のお兄ちゃんに、わからせられちゃうって感じがして……<emoji=heart04>\u3000はぁぁっ<emoji=heart04>」"
translation = "「응, 응<emoji=heart04> 마왕인 오빠한테 참교육당하는 느낌이 들어서……<emoji=heart04> 하아앗<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「あっ<emoji=heart04>\u3000お兄ちゃんにお尻と、太もも撫でられて……んっ<emoji=heart04>\u3000ふうぅ……あぁんっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 오빠한테 엉덩이랑 허벅지 쓰다듬어져서…… 응<emoji=heart04> 후우…… 아앙<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「メイプル、むちむちぷにぷになお尻と太ももで、エッチだな」"
translation = "「메이플, 포동포동 말랑말랑한 엉덩이랑 허벅지가 야하네」"

[[dialogue]]
speaker = "メイプル"
original = "「はぁん<emoji=heart04>\u3000んっ……はあぁぁっ<emoji=heart04>\u3000それは、お兄ちゃんがいっぱい触るからだもん<emoji=heart04>\u3000はぁぁっ、はふぅん<emoji=heart04>」"
translation = "「하앙<emoji=heart04> 응…… 하아아앗<emoji=heart04> 그건 오빠가 잔뜩 만지니까 그렇잖아<emoji=heart04> 하아아, 하후운<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「そうなのか？\u3000メイプルが元からエッチなだけじゃないか？」"
translation = "「그런가? 메이플이 원래부터 야한 거 아니야?」"

[[dialogue]]
speaker = "メイプル"
original = "「そんなことないもん<emoji=heart04>\u3000魔王には強い子孫を残す為に、女の子の体を変化させちゃう力があるって、実家の書物で読んだことがあるし……<emoji=heart04>\u3000はぁぁっ」"
translation = "「그렇지 않아<emoji=heart04> 마왕은 강한 자손을 남기기 위해서 여자애의 몸을 변화시키는 힘이 있다고 본가 책에서 읽은 적 있고……<emoji=heart04> 하아아」"

[[dialogue]]
speaker = "メイプル"
original = "「だから、触られただけで感じちゃっ……<emoji=heart04>\u3000あっ、はぁんっ<emoji=heart04>\u3000んっ、ふうぅ……はあぁ<emoji=heart04>」"
translation = "「그래서 만져지기만 해도 느껴버……<emoji=heart04> 앗, 하앙<emoji=heart04> 응, 후우…… 하아아<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「エッチな勉強してたんだ？」"
translation = "「야한 공부 하고 있었어?」"

[[dialogue]]
speaker = "メイプル"
original = "「ち、違うもん<emoji=heart04>\u3000魔王の勉強してたら、そういうページがたまたま出てきたのっ<emoji=heart04>\u3000はあぁ、あぁぁっ。んうぅ<emoji=heart04>」"
translation = "「아, 아니야<emoji=heart04> 마왕 공부 하다가 그런 페이지가 우연히 나온 거라고<emoji=heart04> 하아아, 아아아앗. 응으<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「知った時はどんな風に思った？\u3000エッチな想像したりとか？」"
translation = "「알게 됐을 땐 어땠어? 야한 상상 하기도 하고?」"

[[dialogue]]
speaker = "メイプル"
original = "「んっ<emoji=heart04>\u3000そ、そりゃあ、ちょっとはしたけどぉ……<emoji=heart04>」"
translation = "「응<emoji=heart04> 그, 그야 조금은 했지만……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「じゃあ、その想像みたいに、どんどん魔王専用のエッチな体になっちゃうな」"
translation = "「그럼 그 상상처럼 점점 마왕 전용의 야한 몸이 되어버리겠네」"

[[dialogue]]
speaker = "メイプル"
original = "「お兄ちゃん専用の……んっ、ふうぅぅ<emoji=heart04>\u3000ああっ<emoji=heart04>\u3000はあぁぁぁっ<emoji=heart04>」"
translation = "「오빠 전용의…… 응, 후우우우<emoji=heart04> 아앗<emoji=heart04> 하아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「というか、なんだろう、これぇ<emoji=heart04><emoji=heart04>\u3000まだおま○こ、入れられてもないし、触られてもいないのにぃ<emoji=heart04>\u3000んっ、はぁぁっ<emoji=heart04>」"
translation = "「그나저나 뭘까, 이거어<emoji=heart04><emoji=heart04> 아직 보지에 넣지도 않았고 만지지도 않았는데에<emoji=heart04> 응, 하아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「なんかいつもより、変だよぉ<emoji=heart04>\u3000ドキドキして、きゅんきゅんしちゃうの、止められない……っ<emoji=heart04>\u3000呼吸も粗くてぇ……これってもしかして、は、発情っ？」"
translation = "「왠지 평소보다 이상해애<emoji=heart04> 두근거리고 가슴이 찡해지는 거 멈출 수가 없어……<emoji=heart04> 호흡도 가쁘고…… 이거 혹시 바, 발정?」"

[[dialogue]]
speaker = "メイプル"
original = "「ああっ<emoji=heart04>\u3000これ、お兄ちゃんのおち○ちんの匂いだぁ<emoji=heart04><emoji=heart04>\u3000それ感じた時から、からだっ、変なのっ<emoji=heart04>\u3000いつもより敏感でぇ、もう気持ちいいよぉ<emoji=heart04>」"
translation = "「아앗<emoji=heart04> 이거 오빠 자지 냄새야아<emoji=heart04><emoji=heart04> 그거 느낀 순간부터 몸이 이상해애<emoji=heart04> 평소보다 예민해서 벌써 기분 좋아아<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「もしかして……またクルセイダーフォームの影響？」"
translation = "「설마…… 또 크루세이더 폼의 영향?」"

[[dialogue]]
speaker = "メイプル"
original = "「そ、そうかも<emoji=heart04><emoji=heart04>\u3000あるいはっ、あたしの体が、今まで以上にお兄ちゃん専用に、なれちゃったってことかもぉ<emoji=heart04>\u3000あっ、はぁぁん<emoji=heart04>」"
translation = "「그, 그럴지도<emoji=heart04><emoji=heart04> 아니면 내 몸이 예전보다 더 오빠 전용이 되어버렸다는 걸지도 몰라아<emoji=heart04> 앗, 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「あぁあぁぁっ<emoji=heart04>\u3000お兄ちゃんの指、おま○こに触れて、あああっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふうぅっ、あっ……はぁぁんっ<emoji=heart04>」"
translation = "「아아아아앗<emoji=heart04> 오빠 손가락이 보지에 닿아서 아아앗<emoji=heart04> 응<emoji=heart04> 후우우, 앗…… 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「あぁんっ<emoji=heart04>\u3000お兄ちゃんの指、おま○この中に入ってきて……ふあぁっ<emoji=heart04>」"
translation = "「아앙<emoji=heart04> 오빠 손가락 보지 속으로 들어와서…… 후아앗<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「んうぅっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000あっ、あんっ<emoji=heart04>\u3000ふうぅっ……んんっ<emoji=heart04>\u3000あああっ、ふわあぁぁっ<emoji=heart04>\u3000クチュクチュだめぇっ<emoji=heart04>」"
translation = "「응으으<emoji=heart04> 하아앗<emoji=heart04> 앗, 앙<emoji=heart04> 후우우…… 으응<emoji=heart04> 아아앗, 후와아아앗<emoji=heart04> 질퍽질퍽 안 돼애<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「別にイっちゃっていいんだぞ？」"
translation = "「별로 가버려도 된다고?」"

[[dialogue]]
speaker = "メイプル"
original = "「んんっ<emoji=heart04>\u3000ああっ、今日は……ご褒美、だから<emoji=heart04>\u3000イクならちゃんと、お兄ちゃんのおち○ちんで……<emoji=heart04>」"
translation = "「으응<emoji=heart04> 아앗, 오늘은…… 포상인걸<emoji=heart04> 갈 거면 제대로 오빠 자지로……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "メイプルはそう言って、潤んだ瞳で上目遣いをしてくる。"
translation = "메이플은 그렇게 말하며 젖은 눈동자로 치켜뜨며 나를 올려다본다."

[[dialogue]]
speaker = "unk"
original = "……こういう時は、ちょっとイジメてあげた方が悦ぶことを、俺も段々とわかってきた。"
translation = "……이럴 때는 조금 괴롭혀주는 편이 기뻐한다는 것을 나도 서서히 알게 되었다."

[[dialogue]]
speaker = "クロト"
original = "「じゃあ、ちゃんとおねだりしてごらん？」"
translation = "「그럼 제대로 졸라보겠니?」"

[[dialogue]]
speaker = "unk"
original = "俺の言葉にメイプルはこくん、とうなずくと……おま○こに手を添えて、くぱぁっ<emoji=heart04>\u3000と開いて見せながら──"
translation = "내 말에 메이플은 끄덕이며…… 보지에 손을 얹고 쿠파앗<emoji=heart04> 하고 벌려 보여주면서──"

[[dialogue]]
speaker = "メイプル"
original = "「はぁ<emoji=heart04>\u3000はぁぁ<emoji=heart04>\u3000はぁぁんっ<emoji=heart04>……お兄ちゃんの逞しいおち○ちんを、妹のいやらしいおま○こに挿れて下さいっ<emoji=heart04><emoji=heart04>」"
translation = "「하아<emoji=heart04> 하아아<emoji=heart04> 하아아앙…… 오빠의 늠름한 자지를 여동생의 음란한 보지에 삽입해 주세요<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「よくできました。それじゃあ――」"
translation = "「잘했습니다. 그럼――」"

[[dialogue]]
speaker = "メイプル"
original = "「あああっ<emoji=heart04>\u3000おち○ちんの亀頭が、おま○この入り口に当たってるぅ……<emoji=heart04>\u3000んんっ、ふあぁぁっ<emoji=heart04>」"
translation = "「아아앗<emoji=heart04> 자지 귀두가 보지 입구에 닿고 있어……<emoji=heart04> 으응, 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "メイプルの愛液はとめどなく溢れてきていて、擦り付けていた俺のペニスはあっという間にぬるぬるになる。"
translation = "메이플의 애액은 쉼 없이 넘쳐나고 있었고, 문지르던 내 페니스는 순식간에 미끌미끌해진다."

[[dialogue]]
speaker = "メイプル"
original = "「あっ！？\u3000ふああああああぁぁぁ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗!? 후아아아아아아아아~~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "挿入した直後、メイプルの体がビクビクと震えた。"
translation = "삽입한 직후 메이플의 몸이 움찔움찔하며 떨렸다."

[[dialogue]]
speaker = "unk"
original = "同時に、おま○こがきゅうぅっ<emoji=heart04>\u3000と俺のペニスを締め付けて来る。"
translation = "동시에 보지가 꽉<emoji=heart04> 하고 내 페니스를 조여온다."

[[dialogue]]
speaker = "メイプル"
original = "「あっ、あぁあぁぁ<emoji=heart04>\u3000はぁぁん<emoji=heart04>\u3000おち○ちん挿れられただけで、イっちゃったぁ……<emoji=heart04>\u3000ふうぅ<emoji=heart04>\u3000んんんぅ、はあぁ<emoji=heart04>」"
translation = "「앗, 아아아아아<emoji=heart04> 하아앙<emoji=heart04> 자지 들어온 것만으로 가버렸어어……<emoji=heart04> 후우우<emoji=heart04> 응응응, 하아아<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「もう満足しちゃった？」"
translation = "「벌써 만족해버렸어?」"

[[dialogue]]
speaker = "メイプル"
original = "「あんっ<emoji=heart04>\u3000お兄ちゃん、おち○ちん抜こうとしちゃダメぇ<emoji=heart04>\u3000あっ、あっ、あっ<emoji=heart04>\u3000はぁぁっ<emoji=heart04>\u3000今のは、軽くイっちゃっただけだからぁ<emoji=heart04>」"
translation = "「앙<emoji=heart04> 오빠, 자지 빼려고 하면 안 돼애<emoji=heart04> 앗, 앗, 앗<emoji=heart04> 하아아앗<emoji=heart04> 지금 건 가볍게 간 것뿐이니까아<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「んんんぅ<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000１週間我慢してたから、まだまだ全然っ、足りないの<emoji=heart04>\u3000はぁぁっ<emoji=heart04>\u3000はぁぁん<emoji=heart04>」"
translation = "「응응응<emoji=heart04> 아아앗<emoji=heart04> 일주일 참았으니까 아직 전혀어, 부족해에<emoji=heart04> 하아아앗<emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「あああっ、わかるっ。わかっちゃったよぉ<emoji=heart04>\u3000妹おま○こ、発情するようになっちゃったのぉ<emoji=heart04><emoji=heart04>\u3000あああっ、はふぅん<emoji=heart04>」"
translation = "「아아앗, 알 것 같아. 알아버렸어어<emoji=heart04> 여동생 보지, 발정하게 되어버린 거야아<emoji=heart04><emoji=heart04> 아아앗, 하후운<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「んふぅぅう<emoji=heart04>\u3000お兄ちゃんのおち○ちん、おま○この中にしまってもらえるとねっ<emoji=heart04>\u3000はぁぁん<emoji=heart04>\u3000頭の中、とっても幸せになるのぉ<emoji=heart04>\u3000あぁんっ<emoji=heart04>」"
translation = "「응후우우우<emoji=heart04> 오빠 자지를 보지 속에 담아두면 말이지이<emoji=heart04> 하아아앙<emoji=heart04> 머릿속이 너무 행복해져어<emoji=heart04> 아앙<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「あんっ<emoji=heart04>\u3000気持ち良くってぇ、幸せでぇっ<emoji=heart04>\u3000あぁぁん<emoji=heart04>\u3000足りないところ、埋めてもらえた感じぃ<emoji=heart04>\u3000あぁぁん<emoji=heart04>」"
translation = "「앙<emoji=heart04> 기분 좋아서어, 행복해서어<emoji=heart04> 아아아앙<emoji=heart04> 부족한 부분을 채워준 느낌이야아<emoji=heart04> 아아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「あああっ<emoji=heart04>\u3000今まで、発情しちゃうヒトの気持ち……わからなかったけどぉ、これは無理だぁ<emoji=heart04>\u3000発情しちゃったら、自分では止められないっ<emoji=heart04>\u3000止まりたくないのぉ<emoji=heart04>」"
translation = "「아아앗<emoji=heart04> 여태까지 발정하는 사람 마음…… 몰랐는데에, 이건 무리야아<emoji=heart04> 발정해버리면 스스로 멈출 수 없어어<emoji=heart04> 멈추고 싶지 않아아<emoji=heart04>」"

