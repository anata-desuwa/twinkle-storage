translation = "「응후으으응<emoji=heart04> 하아아앙<emoji=heart04> 아아앗<emoji=heart04> 후와아아아앙<emoji=heart04> ……가버려어<emoji=heart04><emoji=heart04> 진심 질내 가버리기, 온다아아<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
