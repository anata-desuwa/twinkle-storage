[[dialogue]]
speaker = "メイプル"
original = "「あっ、あっ、あっ<emoji=heart04>\u3000はああぁっ<emoji=heart04>\u3000んんんっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>\u3000あんっ、あんっ、あぁんっ<emoji=heart04>\u3000ふわああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「앗, 앗, 앗<emoji=heart04> 하아아앗<emoji=heart04> 응응응<emoji=heart04> 후아아앗<emoji=heart04> 앙, 앙, 아앙<emoji=heart04> 후와아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「おち○ちんすごいっ<emoji=heart04>\u3000あああっ、おま○こ気持ちいい～っ<emoji=heart04>\u3000あっ、あっ、あっ、あっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「자지 대단해애<emoji=heart04> 아아앗, 보지 기분 좋아아아～앗<emoji=heart04> 앗, 앗, 앗, 앗<emoji=heart04> 후아아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「お兄ちゃんの本気ピストン、すごいのぉっ<emoji=heart04>\u3000あっ、あっ、あっ<emoji=heart04>\u3000奥どちゅどちゅってノックされて、感じるぅっ<emoji=heart04>\u3000あっ、あっ、あっ、あんっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04>」"
translation = "「오빠의 진심 피스톤, 대단해애애<emoji=heart04> 앗, 앗, 앗<emoji=heart04> 깊은 곳이 퍽퍽 노크당해서 느껴져어어<emoji=heart04> 앗, 앗, 앗, 앙<emoji=heart04> 응아아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「ポルチオ、気持ちいいっ<emoji=heart04>\u3000あっ、あっ、んっ、あああっ<emoji=heart04>\u3000ふあああぁっ<emoji=heart04>\u3000気持ちよすぎておかしくなっちゃうぅっ<emoji=heart04>\u3000あっ、あっ、あっ、あっ<emoji=heart04>\u3000あはぁぁんっ<emoji=heart04>」"
translation = "「포르치오, 기분 좋아아<emoji=heart04> 앗, 앗, 응, 아아앗<emoji=heart04> 후아아아아앗<emoji=heart04> 너무 기분 좋아서 이상해져 버려어어<emoji=heart04> 앗, 앗, 앗, 앗<emoji=heart04> 아하아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「お兄ちゃん、もっと<emoji=heart04>\u3000もっと激しくしてぇ<emoji=heart04>\u3000あっ、あっ、あっ、あんっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04>」"
translation = "「오빠, 더<emoji=heart04> 더 격렬하게 해줘어어<emoji=heart04> 앗, 앗, 앗, 앙<emoji=heart04> 응아아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「好きっ<emoji=heart04>\u3000せっくしゅ大好きぃ<emoji=heart04>\u3000おま○こから幸せあふれちゃうよぉぉ～～<emoji=heart04>\u3000はあぁっ、あっ、あっ、あっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「좋아해<emoji=heart04> 섹슈 정말 좋아해애<emoji=heart04> 보지에서 행복이 넘쳐흘러어어어～～<emoji=heart04> 하아앗, 앗, 앗, 앗<emoji=heart04> 후아아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「あっ――ふああぁぁぁっ<emoji=heart04><emoji=heart04>\u3000んっ、んっ、んっ、ふうぅっ<emoji=heart04>\u3000すごいぃっ<emoji=heart04>\u3000ポルチオ感じるぅっ<emoji=heart04>\u3000あっ、あっ、あっ、ふあぁっ<emoji=heart04>\u3000すごく気持ちいいっ<emoji=heart04><emoji=heart04>」"
translation = "「앗――후아아아아앗<emoji=heart04><emoji=heart04> 응, 응, 응, 후우우<emoji=heart04> 대단해애앗<emoji=heart04> 포르치오 느껴져어어<emoji=heart04> 앗, 앗, 앗, 후아앗<emoji=heart04> 너무 기분 좋아아<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「あっ！？\u3000ふああああああっ<emoji=heart04><emoji=heart04>\u3000今、クリまで弄っちゃ<emoji=heart04>\u3000ひっ！？\u3000ひあぁっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ひぃっ<emoji=heart04>\u3000ふひぃんっ<emoji=heart04>\u3000感じ過ぎちゃうっ<emoji=heart04>」"
translation = "「앗!? 후아아아아아앗<emoji=heart04><emoji=heart04> 지금 클리까지 만지면어어<emoji=heart04> 히익!? 히아앗<emoji=heart04> 응<emoji=heart04> 히잇<emoji=heart04> 후히잉<emoji=heart04> 너무 느껴버려어어<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「あっ、あっ、あっ、あひっ<emoji=heart04>\u3000ひああぁんっ<emoji=heart04>\u3000おま○こと同時にされたら、気持ちよすぎておかしくなっちゃうっ<emoji=heart04>\u3000あっ、あっ、あっ、あっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「앗, 앗, 앗, 아힉<emoji=heart04> 히아아앙<emoji=heart04> 보지랑 동시에 당하면 너무 기분 좋아서 이상해져 버려어<emoji=heart04> 앗, 앗, 앗, 앗<emoji=heart04> 후아아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「あんっ、あんっ、あんっ<emoji=heart04>\u3000もう来るっ<emoji=heart04>\u3000あっあっあっあっ<emoji=heart04>\u3000んあああぁっ<emoji=heart04>\u3000すごい気持ちいいの来てるっ<emoji=heart04><emoji=heart04>」"
translation = "「앙, 앙, 앙<emoji=heart04> 이제 온다아<emoji=heart04> 앗앗앗앗<emoji=heart04> 응아아아앗<emoji=heart04> 엄청 기분 좋은 거 오고 있어어<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「俺ももう、イキそうだ……！」"
