[[dialogue]]
speaker = "メイプル"
original = "「え？\u3000――あっ！？\u3000ふあああぁっ<emoji=heart04>\u3000お兄ちゃん、そこ<emoji=heart04>\u3000Ｇスポットっ<emoji=heart04><emoji=heart04>」"
translation = "「에? ――앗!? 후아아아앙<emoji=heart04> 오빠, 거기<emoji=heart04> G스팟<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んあぁっ<emoji=heart04><emoji=heart04>\u3000はああぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 응아앗<emoji=heart04><emoji=heart04> 하아아아～～～앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
