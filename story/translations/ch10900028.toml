translation = "처음 엣찌를 한 이후 성적인 것에 호기심 왕성해진 메이플은, 종종 지식을 습득해서는 『해보고 싶다』며 어리광을 부려 왔고, 둘이서 이것저것 시도하고 있었다."

[[dialogue]]
speaker = "unk"
original = "今では外側からお腹を指圧するだけで快感を得られるほど、エッチな体に仕上がってしまっていた。"
