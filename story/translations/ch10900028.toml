translation = "「아, 아, 아아아, 앗<emoji=heart04> 가버려, 가버려가버려어<emoji=heart04> 가버려가버려가버려어어어～～～～앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「イックうぅぅぅ～～～っ<emoji=heart04>\u3000ふああああああぁぁぁーーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가버려어어어어～～～앗<emoji=heart04> 후아아아아아아아아아아ーーーー앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「はあああぁぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あああっ、お兄ちゃんの精液、中にいっぱい出てるぅ～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「하아아아아아아아아～～～앗<emoji=heart04><emoji=heart04><emoji=heart04> 아아앗, 오빠 정액이 안에 잔뜩 나오고 있어어어～～～앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「んうぅっ<emoji=heart04>\u3000お兄ちゃんの射精、やっぱり長くてすごいぃ～<emoji=heart04>\u3000ふわぁぁ、さすが本当の魔王様ぁ……<emoji=heart04>」"
translation = "「응으으윽<emoji=heart04> 오빠의 사정, 역시 길고 대단해애～<emoji=heart04> 후와아아, 역시 진짜 마왕님이야아……<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「はぁんっ……<emoji=heart04>\u3000すごい射精量で、おま○この中、いっぱいになっちゃう……<emoji=heart04>」"
translation = "「하앙……<emoji=heart04> 엄청난 사정량이라서 보지 속이 가득 차버려어……<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「んっ……はあぁ<emoji=heart04>\u3000はぁぁん<emoji=heart04>\u3000やっと止まったぁ……<emoji=heart04>」"
translation = "「응…… 하아아<emoji=heart04> 하아아앙<emoji=heart04> 드디어 멈췄다아……<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
