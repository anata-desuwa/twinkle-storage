translation = "「아아, 너무 기분 좋았어……」"

[[dialogue]]
speaker = "メイプル"
original = "「にへへ<emoji=heart04>\u3000嬉しい……<emoji=heart04>」"
translation = "「니헤헤<emoji=heart04> 기뻐……<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「なんかあたしの体質、変わっちゃったみたいだし……これからは、もっともっとエッチなことしようねっ、お兄ちゃん<emoji=heart04>」"
translation = "「왠지 내 체질, 바뀌어버린 것 같고…… 이제부터는 더더욱 음란한 짓 많이 하자, 오빠<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "魔王専用のエッチな体質になってしまったことがむしろ心底嬉しそうな様子で、メイプルは蕩けた笑みを浮かべながら、自分のお腹のあたりを何度も撫で回すのだった。"
translation = "마왕 전용의 음란한 체질이 되어버린 것이 오히려 진심으로 기쁜 듯한 모습으로, 메이플은 황홀한 미소를 지으며 자신의 배 근처를 몇 번이고 쓰다듬었다."

