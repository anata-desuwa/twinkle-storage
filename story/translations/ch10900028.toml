translation = "「앗, 앙<emoji=heart04> 니헤헤<emoji=heart04> 오빠가 기뻐해 줘서 기뻐<emoji=heart04> 아아앗<emoji=heart04> 나도 오빠 자지가 강하게 스쳐서 기분 좋아아<emoji=heart04>」"

