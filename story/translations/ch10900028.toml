translation = "「앙……<emoji=heart04> 하아아, 하아아…… 후우우우<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「んんっ<emoji=heart04>\u3000初めての発情エッチ…………すごく気持ちよかったぁ<emoji=heart04>」"
translation = "「으으응<emoji=heart04> 첫 발정 엣찌………… 너무 기분 좋았어어<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
