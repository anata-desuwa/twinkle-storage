[[dialogue]]
speaker = "メイプル"
original = "「あっ！？\u3000――ふにゃあああああぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000はぁぁん<emoji=heart04>\u3000あああっ、お兄ちゃあんっ<emoji=heart04><emoji=heart04>」"
