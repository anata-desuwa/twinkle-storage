translation = "「기분 좋아아<emoji=heart04> 하아아앙<emoji=heart04> 기분 좋아아<emoji=heart04><emoji=heart04> 앗, 앗, 앗<emoji=heart04> 하아앗<emoji=heart04> 응으으윽<emoji=heart04> 응아아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「ダメっ<emoji=heart04>\u3000お兄ちゃあんっ<emoji=heart04>\u3000そこ攻められたら、ふにゃふにゃになっちゃうっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04>」"
translation = "「안 돼<emoji=heart04> 오빠아앙<emoji=heart04> 거기 괴롭히면 흐물흐물해져 버려어<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 후아앗<emoji=heart04> 응아아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は次に、メイプルのお腹に触れ、前に開発したツボを押す。"
