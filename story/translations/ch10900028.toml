[[dialogue]]
speaker = "メイプル"
original = "「ひいぃんっ<emoji=heart04>\u3000そ、そうですっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あたしがエッチだからですぅっ<emoji=heart04>\u3000ふわぁぁんっ<emoji=heart04>」"
translation = "「히이이잉<emoji=heart04> 마, 맞아요오<emoji=heart04><emoji=heart04><emoji=heart04> 제가 음란해서 그래요오오<emoji=heart04> 후와아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000おま○こ気持ちいいっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふあああぁっ<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 기분 좋아아<emoji=heart04> 보지 기분 좋아아<emoji=heart04> 앙<emoji=heart04> 앙<emoji=heart04> 앙<emoji=heart04> 후아아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「ダメぇっ<emoji=heart04>\u3000すごく気持ちよくて、またイっちゃう<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んあああぁぁぁっ<emoji=heart04><emoji=heart04>」"
translation = "「안 돼애<emoji=heart04> 너무 기분 좋아서 또 가버려어<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 응아아아아아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
