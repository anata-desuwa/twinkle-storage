[[dialogue]]
speaker = "クロト"
original = "「指圧でポルチオの感覚を思い出したところで、中からも行くぞ？」"
translation = "「지압으로 포르치오의 감각을 떠올렸으니, 안에서도 간다?」"

[[dialogue]]
speaker = "メイプル"
original = "「ま、待って、お兄ちゃん！\u3000あっ――<emoji=heart04><emoji=heart04>」"
translation = "「기, 기다려, 오빠! 앗――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「ふにゃあぁぁあああっ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふあああぁっ<emoji=heart04><emoji=heart04>\u3000んっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふあああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「후냐아아아아아아아앗<emoji=heart04><emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 후아아아아앗<emoji=heart04><emoji=heart04> 응<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 후아아아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「お兄ちゃんの魔王パワーで開発されちゃったポルチオ、どちゅどちゅされてりゅぅっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「오빠의 마왕 파워로 개발되어 버린 포르치오, 질척질척하게 괴롭혀지고 있어어<emoji=heart04> 앙<emoji=heart04> 앙<emoji=heart04> 아앙<emoji=heart04> 응아아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
