[[dialogue]]
speaker = "メイプル"
original = "「んふぅぅっ<emoji=heart04>\u3000きてっ<emoji=heart04>\u3000お兄ちゃん、一緒にっ<emoji=heart04>\u3000あっ、あっ、あっ、はあぁっ<emoji=heart04><emoji=heart04>\u3000ふあああぁっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응후으으윽<emoji=heart04> 어서어<emoji=heart04> 오빠, 같이이<emoji=heart04> 앗, 앗, 앗, 하아앗<emoji=heart04><emoji=heart04> 후아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
