translation = "「윽…… 메이플!」"

[[dialogue]]
speaker = "メイプル"
original = "「ふああああああぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000激しいピストン、来たあぁぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
