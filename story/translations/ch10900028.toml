translation = "「하아아……<emoji=heart04> 오빠, 미안해요…… 먼저 두 번이나 가버려서……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「メイプルへのご褒美エッチなんだから、気にしなくて大丈夫だよ」"
translation = "「메이플을 위한 포상 엣찌니까 신경 안 써도 괜찮아」"

[[dialogue]]
speaker = "メイプル"
original = "「んっ<emoji=heart04>\u3000お兄ちゃん……にへへ<emoji=heart04>\u3000そういうところ優しくて、好き……<emoji=heart04>」"
translation = "「응<emoji=heart04> 오빠…… 니헤헤<emoji=heart04> 그런 점이 다정해서 좋아……<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「ねぇ、お兄ちゃん……あのね？\u3000実は最近、思ってることがあって……」"
translation = "「있지, 오빠…… 저기 말이야? 사실 최근에 생각하는 게 있는데……」"

[[dialogue]]
speaker = "メイプル"
original = "「あたし、魔王の妹を名乗るのも、『お兄ちゃん』って呼ぶのも気に入ってるけど……」"
translation = "「나, 마왕의 여동생이라고 자칭하는 것도, 『오빠』라고 부르는 것도 마음에 들지만……」"

[[dialogue]]
speaker = "メイプル"
original = "「最近は――妹じゃなくて、魔王の奥さんになっちゃうのも、悪くないかも……なんて<emoji=heart04>\u3000お兄ちゃんは……どっちの方が嬉しい？」"
translation = "「최근에는―― 여동생이 아니라 마왕의 부인이 되어버리는 것도 나쁘지 않을지도…… 라고<emoji=heart04> 오빠는…… 어느 쪽이 더 좋아?」"

[[dialogue]]
speaker = "メイプル"
original = "「――あっ、おち○ちんが中でまた大きくなった<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000お兄ちゃんが興奮してるのが分かるっ<emoji=heart04>\u3000こ、これっ<emoji=heart04>\u3000フェロモンってやつだぁ<emoji=heart04><emoji=heart04>」"
translation = "「――앗, 자지가 안에서 다시 커졌어어<emoji=heart04> 하앗<emoji=heart04> 아아앗<emoji=heart04> 오빠가 흥분한 거 알겠어어<emoji=heart04> 이, 이거어<emoji=heart04> 페로몬이라는 거구나아<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「あああっ<emoji=heart04>\u3000ふわぁぁっ<emoji=heart04>\u3000イッて少し落ち着いたと思ってた発情がっ、ああっ<emoji=heart04>\u3000またぶり返してきてぇ<emoji=heart04><emoji=heart04>」"
translation = "「아아앗<emoji=heart04> 후와아앗<emoji=heart04> 가버리고 조금 가라앉았다고 생각했던 발정이이, 아앗<emoji=heart04> 다시 도져서어어<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「はぁぁ<emoji=heart04>\u3000はぁぁ<emoji=heart04>\u3000はぁぁん<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000まただ<emoji=heart04><emoji=heart04>\u3000あたしの頭のなかっ、お兄ちゃんのおち○ちんでいっぱいにぃっ<emoji=heart04>\u3000んんんぅ<emoji=heart04>」"
translation = "「하아아<emoji=heart04> 하아아<emoji=heart04> 하아아앙<emoji=heart04> 아아앗<emoji=heart04> 또 시작이야아<emoji=heart04><emoji=heart04> 내 머릿속, 오빠 자지로 가득해져어어<emoji=heart04> 으으으으<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「お兄ちゃんが興奮するとっ<emoji=heart04>\u3000あたしも興奮で、おかしくなっちゃうんだぁ<emoji=heart04>\u3000すっごぉい<emoji=heart04>\u3000あはぁ<emoji=heart04>\u3000心臓ドキドキしてるだけで気持ちいいよぉ<emoji=heart04>」"
translation = "「오빠가 흥분하면어어<emoji=heart04> 나도 흥분해서 이상해져 버려어어<emoji=heart04> 대단해애<emoji=heart04> 아하아<emoji=heart04> 심장이 두근거리는 것만으로도 기분 좋아아아어어<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「うんっ<emoji=heart04>\u3000きてっ、お兄ちゃんっ<emoji=heart04>\u3000うぅんっ、ご主人様ぁ<emoji=heart04>\u3000あはぁっ<emoji=heart04>\u3000妹おま○こに中出しして、赤ちゃん孕ませてくださぁい<emoji=heart04>」"
translation = "「응<emoji=heart04> 어서, 오빠아<emoji=heart04> 으응, 주인니임<emoji=heart04> 아하아앗<emoji=heart04> 여동생 보지에 질내사정해서 아기 임신시켜 주세에에요<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「ふわぁぁん<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000あたしのこと……魔王の子孫、たくさん作る<emoji=heart04>\u3000はぁぁん<emoji=heart04>\u3000魔王専用おま○こにして欲しいですぅぅ<emoji=heart04><emoji=heart04>\u3000はぁぁん<emoji=heart04>」"
translation = "「후와아아앙<emoji=heart04> 아아앗<emoji=heart04> 나를…… 마왕의 후손, 잔뜩 만들게 해줘어<emoji=heart04> 하아아앙<emoji=heart04> 마왕 전용 보지로 만들어 주길 바라요오오<emoji=heart04><emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
