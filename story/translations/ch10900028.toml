translation = "「후아아아아아아아아～～～～～～앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "再びメイプルの体がビクビクと震えた。"
translation = "다시 메이플의 몸이 움찔움찔하며 떨렸다."

[[dialogue]]
speaker = "unk"
original = "メイプルのおま○こから、透明な液体が勢いよく噴き出してベッドを濡らす。"
translation = "메이플의 보지에서 투명한 액체가 힘차게 뿜어져 나와 침대를 적신다."

[[dialogue]]
speaker = "メイプル"
original = "「――あっ……<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000気持ちよくて、お潮吹いちゃったぁっ……<emoji=heart04>\u3000はあぁっ……んうぅ<emoji=heart04>」"
