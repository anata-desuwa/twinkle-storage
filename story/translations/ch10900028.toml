original = "「そこっ<emoji=heart04><emoji=heart04>\u3000そこはもっと感じちゃうっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふあああぁっ<emoji=heart04>」"
translation = "「거기<emoji=heart04><emoji=heart04> 거기는 더 느껴버려어<emoji=heart04><emoji=heart04><emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 후아아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そこは、メイプルのＰスポット――いわゆる『ポルチオ』だ。"
