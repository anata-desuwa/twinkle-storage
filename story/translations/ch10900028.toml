translation = "「오빠, 오빠<emoji=heart04> 오빠아아앙<emoji=heart04> 아아아아아아아～앗<emoji=heart04> 하앗, 좋아해애<emoji=heart04> 정말 좋아해애에<emoji=heart04> 하아아앙<emoji=heart04> 후와아아아앙<emoji=heart04>」"

[[dialogue]]
