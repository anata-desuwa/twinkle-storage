translation = "「으응, 아앗<emoji=heart04> 응아아앗<emoji=heart04> 보지 기분 좋아아<emoji=heart04> 일주일 만의 자지 기분 좋아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「あっ<emoji=heart04>\u3000ふうぅっ、はあぁっ<emoji=heart04>\u3000あぁぁん<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000んっ……あっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あっ……んあぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
