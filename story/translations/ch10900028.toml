[[dialogue]]
speaker = "unk"
original = "俺はラストスパートをかける。"
translation = "나는 마지막 스퍼트를 올린다."

[[dialogue]]
speaker = "メイプル"
original = "「あっ、あっ、あっ、あっ<emoji=heart04>\u3000んああぁっ<emoji=heart04><emoji=heart04>\u3000はぁぁん<emoji=heart04>\u3000あっ、あっ、あっ、ふあああぁっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗, 앗, 앗, 앗<emoji=heart04> 응아아앗<emoji=heart04><emoji=heart04> 하아아앙<emoji=heart04> 앗, 앗, 앗, 후아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「くぅぅん<emoji=heart04>\u3000あぁぁんっ<emoji=heart04>\u3000あんっ、あんっ……あああっ<emoji=heart04>\u3000きたっ<emoji=heart04>\u3000大きいのきちゃうっ<emoji=heart04><emoji=heart04>」"
translation = "「크으으응<emoji=heart04> 아아앙<emoji=heart04> 앙, 앙…… 아아앗<emoji=heart04> 왔다아<emoji=heart04> 큰 거 와버려어어<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
