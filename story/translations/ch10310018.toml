[[dialogue]]
speaker = "unk"
original = "……アニマ先輩のことが好きだ。"
translation = "……아니마 선배를 좋아한다."

[[dialogue]]
speaker = "unk"
original = "そう自覚してから、しばらく経った。しかし、中々最後の一歩が踏み込めずモヤモヤしていた、ある日の放課後のこと──"
translation = "그렇게 자각하고 나서, 얼마간 시간이 흘렀다. 하지만 좀처럼 마지막 한 걸음을 내딛지 못하고 답답해하던, 어느 날 방과 후의 일──"

[[dialogue]]
speaker = "アニマ"
original = "「いらっしゃいませダ、会長」"
translation = "「어서 오세요, 회장」"

[[dialogue]]
speaker = "アニマ"
original = "「アニマたちの呼び出しにすぐ応じるとは。殊勝な心掛けダ、会長」"
translation = "「아니마들의 호출에 바로 응하다니. 기특한 마음가짐이야, 회장」"

[[dialogue]]
speaker = "クロト"
original = "「えっ！？\u3000アニマ先輩が２人！？」"
translation = "「엣!? 아니마 선배가 두 명!?」"

[[dialogue]]
speaker = "アニマ"
original = "「フヒッ、驚いたかナ？\u3000新しく『分裂薬』を発明して……その実験に成功したのダ」"
translation = "「후히, 놀랐나? 새로 『분열약』을 발명해서…… 그 실험에 성공한 거야」"

[[dialogue]]
speaker = "アニマ"
original = "「こうして可愛いアニマが２人並ぶと、壮観ダロウ？」"
translation = "「이렇게 귀여운 아니마가 둘이 나란히 있으니, 장관이지?」"

[[dialogue]]
speaker = "アニマ"
original = "「これで研究を分裂体に任せ、本体のアニマは別行動が出来るようになる！」"
translation = "「이제 연구를 분열체에게 맡기고, 본체인 아니마는 별도 행동을 할 수 있게 돼!」"

[[dialogue]]
speaker = "アニマ"
original = "「しかし例によって、副作用があってね。キミの力を貸して貰いたくて呼んだというわけダ」"
translation = "「하지만 예의 그 부작용이 있어서 말이지. 네 힘을 빌리고 싶어서 불렀다는 거야」"

[[dialogue]]
speaker = "アニマ"
original = "「……とまあ、最低限の説明義務は果たしたところで──」"
translation = "「……라고, 최소한의 설명 의무는 다했으니──」"

[[dialogue]]
speaker = "アニマ"
original = "「すまないが、もう限界ダ。アニマの分裂体──アニマ乙！」"
translation = "「미안하지만, 이제 한계야. 아니마의 분열체── 아니마 을!」"

[[dialogue]]
speaker = "アニマ"
original = "「フヒ……いいとも」"
translation = "「후히…… 좋을 대로」"

[[dialogue]]
speaker = "unk"
original = "俺は購買部奥へと連行されると、スタッフルームの扉を開いて、室内に押し込まれる。"
translation = "나는 구매부 안쪽으로 연행되어, 스태프 룸의 문을 열고 실내로 밀쳐진다."

[[dialogue]]
speaker = "unk"
original = "しかしそこはスタッフルームではなく、アニマ先輩の発明『異空間ドア』によって繋げられた先──"
translation = "하지만 그곳은 스태프 룸이 아니라, 아니마 선배의 발명품 『이공간 문』으로 연결된 곳──"

[[dialogue]]
speaker = "unk"
original = "アニマ先輩の部屋……もとい研究室であった。"
translation = "아니마 선배의 방…… 아니, 연구실이었다."

[[dialogue]]
speaker = "アニマ"
original = "「悪いネ、会長。……恋人でもないのに、いつもこんなことばかり、させてしまって<emoji=heart04>」"
translation = "「미안해, 회장. ……연인 사이도 아닌데, 항상 이런 일만 시켜서<emoji=heart04>」"

[[dialogue]]
speaker = "アニマ乙"
original = "「いつもの実験後みたいに、ふぅぅ<emoji=heart04>\u3000……アニマの性欲処理を、手伝って欲しイ」"
translation = "「평소 실험 후처럼, 후우우<emoji=heart04> ……아니마의 성욕 처리를, 도와줬으면 해」"

[[dialogue]]
speaker = "unk"
original = "……そう、俺とアニマ先輩は恋人ではない。"
translation = "……그렇다, 나와 아니마 선배는 연인이 아니다."

[[dialogue]]
speaker = "unk"
original = "恋人ではないが、様々な経緯と満更ではない役得感に流されて、すでに何度となく肌を重ね合わせた仲でもあった。"
translation = "연인은 아니지만, 여러 경위와 나쁘지 않은 득템감에 휩쓸려, 이미 몇 번이고 살을 맞댄 사이이기도 했다."

[[dialogue]]
speaker = "アニマ"
original = "「ああっ、相変わらず凄いゾ……キミのチ○ポ、信じられないくらい、大きく熱くなって……んふぅ<emoji=heart04>」"
translation = "「아앗, 여전히 대단해…… 네 자지, 믿을 수 없을 정도로 커지고 뜨거워져서…… 응후우<emoji=heart04>」"

[[dialogue]]
speaker = "アニマ乙"
original = "「固くて逞しくて……ふああっ、まだおま○こが触れてるだけなのに、気持ちいイ……あンッ、感じるぅ……<emoji=heart04>」"
translation = "「딱딱하고 듬직해서…… 후아앗, 아직 보지가 닿아있을 뿐인데, 기분 좋아…… 아앙, 느껴져……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "どうやら、アニマ先輩本体が首にドクロチョーカー、分裂体のアニマ先輩（乙）がリボンを付けている方のようだ。"
translation = "아무래도 아니마 선배 본체가 해골 초커를, 분열체인 아니마 선배(을)가 리본을 달고 있는 모양이다."

[[dialogue]]
speaker = "アニマ"
original = "「はぁぁ<emoji=heart04>\u3000……どうダ？\u3000ふぅぅっ……キミもアニマの極上おま○こサンドイッチ、気持ち良いカ？<emoji=heart04>\u3000んんっ、はぁ、はぁ<emoji=heart04>」"
translation = "「하아앙<emoji=heart04> ……어때? 후우우…… 너도 아니마의 극상 보지 샌드위치가 기분 좋니?<emoji=heart04> 응응, 하아, 하아<emoji=heart04>」"

[[dialogue]]
speaker = "アニマ乙"
original = "「んううっ、わかるゾ<emoji=heart04>\u3000チ○ポがまた、ビクビクッて大きくなった……♪\u3000んはあっ、んんっ……おま○こサンドイッチ、美味しいって言ってる<emoji=heart04>\u3000んふぅぅぅっ<emoji=heart04>」"
translation = "「응우우, 알겠어<emoji=heart04> 자지가 또, 움찔움찔 커졌어……♪ 은하앗, 응응…… 보지 샌드위치, 맛있다고 말하고 있어<emoji=heart04> 응후우우웃<emoji=heart04>」"

[[dialogue]]
speaker = "アニマ"
original = "「ああっ、駄目ダ。もう我慢出来なイ。動くゾ……んんっ、ふあぁぁんっ<emoji=heart04>！」"
translation = "「아앗, 안 돼. 이제 참을 수 없어. 움직일 거야…… 응응, 후아아앙웃<emoji=heart04>!」"

[[dialogue]]
speaker = "アニマ乙"
original = "「んくっ、はぁ……<emoji=heart04>\u3000アニマ、いきなり動いたら……ふくっ、ふあぁぁんっ<emoji=heart04>\u3000おま○こ擦れて……んくっ、はあぁぁ<emoji=heart04>\u3000あふぅぅんっ<emoji=heart04>」"
translation = "「응읏, 하아……<emoji=heart04> 아니마, 갑자기 움직이면…… 후긋, 후아아앙웃<emoji=heart04> 보지가 비벼져서…… 응읏, 하아아앙<emoji=heart04> 아후우웅웃<emoji=heart04>」"

[[dialogue]]
speaker = "アニマ"
original = "「はぁんっ<emoji=heart04>\u3000凄イ、凄いぃ！\u3000はぁぁ……いつもより会長チ○ポ、気持ちいいっ<emoji=heart04>\u3000気持ちいいゾ……ひああんっ！」"
translation = "「하앙<emoji=heart04> 대단해, 대단해! 하아…… 평소보다 회장 자지, 기분 좋아<emoji=heart04> 기분 좋아…… 히아앙웃!」"

[[dialogue]]
speaker = "アニマ乙"
original = "「忘れたのカ……？\u3000んんっ、はぁ……ふあぁっ、アニマたちは精神と感覚が繋がってて、性欲が２倍になったから、発情したのダロウ？\u3000……んあぁんっ<emoji=heart04>」"
translation = "「잊은 거야……? 응응, 하아…… 후아앗, 아니마들은 정신과 감각이 연결되어 있어서, 성욕이 2배가 됐으니까 발정 난 거잖아? ……응아앙웃<emoji=heart04>」"

[[dialogue]]
speaker = "アニマ"
original = "「２倍気持ちいいっ、こんなの我慢出来るわけない……っ<emoji=heart04>\u3000ふひぃっ、チ○ポの極太カリが、クリトリスに擦れて、気持ちいいゾっ<emoji=heart04>\u3000あっ、あっ、ふあぁっ<emoji=heart04>」"
translation = "「2배로 기분 좋아, 이런 거 참을 수 있을 리가 없잖아……!<emoji=heart04> 후히잇, 자지의 굵은 귀두가 클리토리스에 비벼져서 기분 좋아<emoji=heart04> 앗, 앗, 후아앗<emoji=heart04>」"

[[dialogue]]
speaker = "アニマ乙"
original = "「ふあぁんっ<emoji=heart04>\u3000はぁぁん<emoji=heart04>\u3000感度２倍が、こんなに気持ちいいなんて……んあぁんっ<emoji=heart04>\u3000腰がアニマに合わせて、勝手に動いてしまう<emoji=heart04>\u3000ふひっ、ふひいっ……気持ちいぃ<emoji=heart04>」"
translation = "「후아앙웃<emoji=heart04> 하아앙<emoji=heart04> 감도 2배가 이렇게 기분 좋다니…… 응아앙웃<emoji=heart04> 허리가 아니마에 맞춰서 멋대로 움직여버려<emoji=heart04> 후히, 후히잇…… 기분 좋아<emoji=heart04>」"

[[dialogue]]
speaker = "アニマ"
original = "「ふひぃぃんっ<emoji=heart04>\u3000はぁ、はぁ、はああっ<emoji=heart04>\u3000んんんっ<emoji=heart04>\u3000いい、いいゾっ<emoji=heart04>\u3000感度２倍で、どんどん気持ちいいのが上がってくるっ<emoji=heart04>\u3000んはっ、アニマ！\u3000その調子でもっと──<emoji=heart04>」"
translation = "「후히이잉웃<emoji=heart04> 하아, 하아, 하아앗<emoji=heart04> 응응응웃<emoji=heart04> 좋아, 좋아……<emoji=heart04> 감도 2배로 점점 기분 좋은 게 올라와……<emoji=heart04> 은하앗, 아니마! 그 기세로 더──<emoji=heart04>」"

[[dialogue]]
speaker = "アニマ乙"
original = "「あ、アニマはもう、我慢出来ない……！\u3000会長っ<emoji=heart04><emoji=heart04>！\u3000むちゅっ、ちゅっ、くちゅるっ<emoji=heart04>」"
translation = "「아, 아니마는 이제 참을 수 없어……! 회장님<emoji=heart04><emoji=heart04>! 무츄, 츄, 쿠츄룻<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "アニマ先輩（乙）が突然、俺にディープキスをして、舌を絡めて来る。"
translation = "아니마 선배(을)가 갑자기 나에게 딥키스를 하며 혀를 얽어온다."

[[dialogue]]
speaker = "アニマ乙"
original = "「んちゅっ、ちゅうっ、ぷはぁっ<emoji=heart04>！\u3000キミが好き、好きダッ<emoji=heart04>\u3000はぁぁっ<emoji=heart04>\u3000好き好き、んくちゅ、ちゅるぅ<emoji=heart04>\u3000ちゅぷ、ちゅむむっ<emoji=heart04>\u3000キミとセックスするの、気持ちいイっ<emoji=heart04>」"
translation = "「응츄, 츄우웃, 푸하앗<emoji=heart04>! 네가 좋아, 좋아……<emoji=heart04> 하아앗<emoji=heart04> 좋아 좋아, 응쿠츄, 츄루우<emoji=heart04> 츄푸, 츄무무웃<emoji=heart04> 너랑 섹스하는 거, 기분 좋아<emoji=heart04>」"

[[dialogue]]
speaker = "アニマ"
original = "「なっ、アニマ乙！！\u3000い、いきなり何を言ってるんダ！？\u3000アニマが会長のこと……す、好きだなんて……んっ、はぁっ、はああっ、はああぁっ<emoji=heart04>！」"
translation = "「낫, 아니마 을!! 가, 갑자기 무슨 말을 하는 거야!? 아니마가 회장을…… 좋, 좋아한다니…… 응, 하앗, 하아앗, 하아아아앗<emoji=heart04>!」"

[[dialogue]]
speaker = "アニマ乙"
original = "「んふぅ、アニマが悪いんだゾっ<emoji=heart04>\u3000……んはっ、ふぁっ、はああっ<emoji=heart04>\u3000んんんっ、おま○こ動かして、あっ、アニマの気持ちを高ぶらせるからぁ……ふあぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「응후우, 아니마가 나쁜 거야……<emoji=heart04> ……은하앗, 후앗, 하아앗<emoji=heart04> 응응응웃, 보지를 움직여서, 앗, 아니마의 기분을 고조시키니까…… 후아앙웃<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "アニマ乙"
original = "「はぁ、んっ、はぁ……<emoji=heart04>\u3000くくくっ……オマエだって、会長への好きが膨らんで……ンンッ！\u3000爆発しそうなんダロウ<emoji=heart04>？\u3000あっ、あっ、んはっ、はあああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「하아, 응, 하아……<emoji=heart04> 쿠쿠쿠…… 너도 회장에 대한 마음이 부풀어서…… 응응웃! 폭발할 것 같잖아<emoji=heart04>? 앗, 앗, 은하앗, 하아아아앙웃<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "アニマ"
original = "「はぁ、はぁ……んっ<emoji=heart04>\u3000ふぁっ、ふぁぁんっ<emoji=heart04>\u3000な、なんのことダ……んくっ<emoji=heart04>\u3000ぶ、分裂は不完全だった、みたいだナ、そんなことアニマは……んふううぅっ<emoji=heart04>！」"
translation = "「하아, 하아…… 응웃<emoji=heart04> 후앗, 후아앙웃<emoji=heart04> 무, 무슨 소릴 하는 거야…… 응읏<emoji=heart04> 분, 분열은 불완전했던 모양이네, 그런 거 아니마는…… 응후우우웃<emoji=heart04>!」"

[[dialogue]]
speaker = "アニマ乙"
original = "「んふぅっ<emoji=heart04>\u3000はあぁぁ<emoji=heart04>\u3000んはぁ……とぼけても無駄ダっ<emoji=heart04>……んぅ、はぁ……オマエも本当はわかってるんダロウ？\u3000アニマが、どういう存在なのか」"
translation = "「응후웃<emoji=heart04> 하아아<emoji=heart04> 은하…… 시치미 떼도 소용없어……<emoji=heart04> 응우, 하아…… 너도 사실은 알고 있잖아? 아니마가 어떤 존재인지」"

[[dialogue]]
speaker = "アニマ乙"
original = "「アニマたちは精神が繋がっているから……<emoji=heart04>\u3000んっ、はぁ……わかるはずダ<emoji=heart04>」"
translation = "「아니마들은 정신이 연결되어 있으니까……<emoji=heart04> 응, 하아…… 알 수 있을 거야<emoji=heart04>」"

[[dialogue]]
speaker = "アニマ乙"
original = "「会長っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000好きダ……<emoji=heart04>\u3000アニマはキミのことが、大好きダっ<emoji=heart04>\u3000んはぁ……はぁ、はぁ、んんっ、はぁぁ<emoji=heart04>」"
translation = "「회장님<emoji=heart04><emoji=heart04><emoji=heart04> 좋아해요……<emoji=heart04> 아니마는 당신을 정말 좋아해요……<emoji=heart04> 은하아…… 하아, 하아, 응응웃, 하아아<emoji=heart04>」"

[[dialogue]]
speaker = "アニマ"
original = "「あっ、ふああっ、アニマの中にある気持ちが大きくなるっ<emoji=heart04>\u3000んああ、よせっ、恥ずかしいっ<emoji=heart04><emoji=heart04>\u3000それは、言っちゃダメなんダ……<emoji=heart04>\u3000んふぅ、はぁぁぁ<emoji=heart04>」"
translation = "「앗, 후아앗, 아니마 안에 있는 마음이 커져……<emoji=heart04> 응아아, 그만둬, 부끄러워……<emoji=heart04><emoji=heart04> 그건 말하면 안 되는 거야……<emoji=heart04> 응후우, 하아아아<emoji=heart04>」"

[[dialogue]]
speaker = "アニマ乙"
original = "「無理ダっ<emoji=heart04>\u3000アニマはオマエの気持ちそのものだから、もう隠したりは出来ナイッ<emoji=heart04>\u3000好きっ、会長が好きダ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000好きな人とのエッチ、凄く気持ちいいっ<emoji=heart04>」"
translation = "「무리야……<emoji=heart04> 아니마는 당신의 마음 그 자체니까, 이제 숨길 수 없어……<emoji=heart04> 좋아해요, 회장님을 좋아해요<emoji=heart04> 하아앙웃<emoji=heart04> 좋아하는 사람과의 섹스, 정말 기분 좋아……<emoji=heart04>」"

[[dialogue]]
speaker = "アニマ"
original = "「はあぁっ、や、ヤメロっ<emoji=heart04>！\u3000会長への気持ちが膨らんで、溢れてしまウ<emoji=heart04>\u3000んはっ、ふあぁっ<emoji=heart04>\u3000んああっ<emoji=heart04>\u3000腰の動きが勝手に早くなるぅ……<emoji=heart04>！」"
translation = "「하아앗, 그, 그만둬……<emoji=heart04>! 회장에 대한 마음이 부풀어서 흘러넘쳐 버려……<emoji=heart04> 은하앗, 후아앗<emoji=heart04> 응아앗<emoji=heart04> 허리 움직임이 멋대로 빨라져……<emoji=heart04>!」"

[[dialogue]]
speaker = "アニマ乙"
original = "「ひぅっ、んくっ<emoji=heart04>\u3000はぁ、はぁぁ、はあぁんっ！\u3000な、ナァ、会長はアニマのこと、好きカ？\u3000んんぅっ<emoji=heart04>！」"
translation = "「히웃, 응읏<emoji=heart04> 하아, 하아아, 하아앙웃! 저, 저기, 회장님은 아니마를 좋아해? 응응웃<emoji=heart04>!」"

[[dialogue]]
speaker = "アニマ"
original = "「あっ、あんっ<emoji=heart04>\u3000それは訊いたら……んあぁんっ<emoji=heart04>！」"
translation = "「앗, 앙웃<emoji=heart04> 그건 물어보면…… 응아앙웃<emoji=heart04>!」"

[[dialogue]]
speaker = "アニマ乙"
original = "「アニマはキミのことが好き<emoji=heart04>\u3000ずっと隠してたけど、もう限界なんダっ<emoji=heart04>\u3000実験の副作用のフリをして、言い訳を作って……会長とセックスするだけでは、もう我慢できないっ<emoji=heart04><emoji=heart04>」"
translation = "「아니마는 당신을 좋아해요<emoji=heart04> 계속 숨겨왔지만, 이제 한계예요……<emoji=heart04> 실험 부작용인 척하며 변명을 만들어서…… 회장님과 섹스하는 것만으로는 이제 참을 수 없어요……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "アニマ"
original = "「や、やめろぉ<emoji=heart04>\u3000ふくぅぅぅん<emoji=heart04>\u3000会長は善意で、アニマたちの性欲処理を買って出てくれていたのに……っ。それをわざと、やってたなんてっ<emoji=heart04>\u3000許されるわけがないダロウっ」"
translation = "「그, 그만둬어……<emoji=heart04> 후쿠우우웅웃<emoji=heart04> 회장님은 선의로 우리들의 성욕 처리를 자처해주셨는데…… 그걸 일부러 이용했다니……<emoji=heart04> 용서받을 수 있을 리가 없잖아……」"

[[dialogue]]
speaker = "アニマ乙"
original = "「そうかもしれないが、もうダメなんダっ<emoji=heart04>\u3000はぁぁぁん<emoji=heart04>\u3000我慢できないっ<emoji=heart04>\u3000性欲処理だけじゃ、嫌なんダ<emoji=heart04>\u3000んふぅっ<emoji=heart04>\u3000アニマはキミの気持ちが知りたイッ……んあぁんっ<emoji=heart04>」"
translation = "「그럴지도 모르지만, 이제 안 된단다<emoji=heart04> 하아앙<emoji=heart04> 참을 수 없어<emoji=heart04> 성욕 처리만으로는 싫단다<emoji=heart04> 응후웃<emoji=heart04> 아니마는 네 마음을 알고 싶어……응아앙<emoji=heart04>」"

[[dialogue]]
speaker = "アニマ乙"
original = "「本当は不安だったんダ……はぁぁっ……体を重ねても、流れでそうなっただけで……んんっ、ふぅ……キミは、アニマのこと、好きじゃないんじゃないか……って」"
translation = "「사실은 불안했어……하아앗……몸을 겹쳐도, 흐름에 따라 그렇게 된 것뿐이라서……응응, 후우……너는, 아니마를 좋아하지 않는 게 아닐까……하고」"

[[dialogue]]
speaker = "クロト"
original = "「っ……俺は、アニマ先輩のことが好きです……！」"
translation = "「……저는, 아니마 선배를 좋아합니다……!」"

[[dialogue]]
speaker = "アニマ"
original = "「んはぁぁぁ<emoji=heart04>\u3000はぁ、はぁ……ほ、本当カ……？」"
translation = "「응하아앙<emoji=heart04> 하아, 하아……정, 정말이야……?」"

[[dialogue]]
speaker = "アニマ"
original = "「でも、それは……んんっ、はぁ<emoji=heart04>\u3000エッチが好きとか、気持ちいいのが好きとカ……んあっ、あっ、はああっ<emoji=heart04>\u3000……そういうのじゃ、なくて？」"
translation = "「하지만, 그건……응응, 하아<emoji=heart04> 섹스하는 게 좋다거나, 기분 좋은 게 좋다거나……응앗, 앗, 하아앗<emoji=heart04> ……그런 게, 아니라?」"

[[dialogue]]
speaker = "クロト"
original = "「俺は、アニマ先輩を愛してるっ……恋人になって欲しいっ」"
translation = "「저는, 아니마 선배를 사랑해요……연인이 되어 주세요」"

[[dialogue]]
speaker = "アニマ"
original = "「～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>！\u3000はぁぁっ……そ、そんなこと言われたら、アニマはもうっ……<emoji=heart04>！」"
translation = "「～～～<emoji=heart04><emoji=heart04><emoji=heart04>! 하아앗……그, 그런 말을 들으면, 아니마는 이제……<emoji=heart04>!」"

[[dialogue]]
speaker = "unk"
original = "アニマ先輩が……今度こそ、本体であるアニマ先輩自身が、俺にキスをして夢中で舌を絡めてくる。"
translation = "아니마 선배가……이번에야말로, 본체인 아니마 선배 자신이, 나에게 키스하며 정신없이 혀를 얽어온다."

[[dialogue]]
speaker = "アニマ"
original = "「んっ、くちゅるっ<emoji=heart04>\u3000ちゅぱっ<emoji=heart04>\u3000んんっ、んふっ、ちゅっ、ちゅるっ、んちゅっ、んんっ<emoji=heart04><emoji=heart04>\u3000ねちゅっ、ちゅぱっ、ちゅるるっ、んぷっ、んちゅ、ぷはぁ<emoji=heart04>」"
translation = "「응, 츄릅<emoji=heart04> 츙<emoji=heart04> 응응, 응후, 츄, 츄릅, 응츄, 응응<emoji=heart04><emoji=heart04> 낼름, 츙, 츄릅, 응풋, 응츄, 푸하<emoji=heart04>」"

[[dialogue]]
speaker = "アニマ"
original = "「アニマも……好きダ<emoji=heart04>\u3000んふぅっ……キミが大好きダっ！」"
translation = "「아니마도……좋아해<emoji=heart04> 응후웃……네가 정말 좋아!」"

[[dialogue]]
speaker = "アニマ"
original = "「あはぁぁ<emoji=heart04>\u3000これが愛なのかどうかは、まだわからなイ。はぅぅぅんっ<emoji=heart04>\u3000でも……キミに愛してると言われて、好きという気持ちが、はぅぅっ、溢れて止まらないんダっ<emoji=heart04>」"
translation = "「아하앙<emoji=heart04> 이게 사랑인지 어떤지는, 아직 모르겠어. 하우우운<emoji=heart04> 하지만……너에게 사랑한다는 말을 듣고, 좋아한다는 마음이, 하우웃, 넘쳐서 멈추질 않아<emoji=heart04>」"

[[dialogue]]
speaker = "アニマ"
original = "「はあぁんっ、実験じゃなくてっ……ふうぅっ<emoji=heart04>\u3000恋人同士のエッチだと意識したら……んあぁぁぁんっ<emoji=heart04>\u3000もう気持ちいいの、止められないっ<emoji=heart04>\u3000……あっ、あっ、あああっ<emoji=heart04>」"
translation = "「하아앙, 실험이 아니라……후우웃<emoji=heart04> 연인끼리의 섹스라고 의식하니까……응아아앙<emoji=heart04> 이제 기분 좋은 걸 멈출 수가 없어<emoji=heart04> ……앗, 앗, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "アニマ乙"
original = "「あああっ、これ凄イィ<emoji=heart04>！\u3000好きって気持ち、アニマにも流れて来て、ふひぃぃっ<emoji=heart04>！\u3000爆発しちゃうっ<emoji=heart04>！\u3000おま○この感度上がって、おかしくなっちゃうぅ<emoji=heart04><emoji=heart04><emoji=heart04>！」"
translation = "「아아앗, 이거 굉장해<emoji=heart04>! 좋아한다는 마음이, 아니마에게도 흘러 들어와서, 후히이잇<emoji=heart04>! 폭발해버릴 것 같아<emoji=heart04>! 보지의 감도가 올라가서, 이상해져 버릴 것 같아<emoji=heart04><emoji=heart04><emoji=heart04>!」"

[[dialogue]]
speaker = "アニマ"
original = "「ひあぁぁっ、クリが爆発しそうなくらい勃起してぇっ<emoji=heart04>\u3000はぁぁっ、キミの熱くて逞しい恋人チ○ポに擦れて、気持ちイイッ<emoji=heart04>\u3000ふひぃぃんっ<emoji=heart04><emoji=heart04>」"
translation = "「히아앗, 클리가 폭발할 정도로 발기해서……<emoji=heart04> 하아앗, 너의 뜨겁고 듬직한 연인 자지에 쓸려서, 기분 좋아<emoji=heart04> 후히이잉<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "アニマ乙"
original = "「愛液どぷどぷ溢れて来てぇ<emoji=heart04>\u3000キミのチ○ポと境目がわからないくらい、ぐちょぐちょに蕩けちゃってるのぉっ<emoji=heart04>\u3000はぁぁんっ、気持ちいいっ<emoji=heart04>\u3000気持ちいいッ<emoji=heart04><emoji=heart04>」"
translation = "「애액이 철철 넘쳐 흘러서……<emoji=heart04> 너의 자지랑 경계가 어딘지 모를 정도로, 질척질척하게 녹아버렸어……<emoji=heart04> 하아앙, 기분 좋아<emoji=heart04> 기분 좋아<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "アニマ"
original = "「ふひぃぃっ、全然違う<emoji=heart04>\u3000さっきまでと全然っ<emoji=heart04>\u3000両想いの恋人セックス気持ち良くてっ、んああっ<emoji=heart04>\u3000腰が止められなイッ<emoji=heart04>\u3000はあああああっ<emoji=heart04>」"
translation = "「후히이잇, 완전히 달라<emoji=heart04> 아까까지랑은 완전히……<emoji=heart04> 서로 사랑하는 연인끼리의 섹스는 기분 좋아서……응아앗<emoji=heart04> 허리가 멈추질 않아<emoji=heart04> 하아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "アニマ乙"
original = "「しゅご、しゅごい、しゅごいぃぃぃっ<emoji=heart04>\u3000んふぁっ、ふあぁぁぁっ<emoji=heart04>\u3000心と体の２倍エッチしゅごいぃ<emoji=heart04>\u3000あっ、あっ、ああんっ<emoji=heart04>\u3000恋人エッチ気持ちいいのぉっ<emoji=heart04>」"
translation = "「흐, 흐응, 흐응으으읏<emoji=heart04> 응흣, 후아아앗<emoji=heart04> 마음과 몸이 2배로 야해서 흐응<emoji=heart04> 앗, 앗, 아앙앗<emoji=heart04> 연인과의 섹스 기분 좋아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "アニマ"
original = "「んうっ、んうぅぅっ<emoji=heart04>\u3000恋人チ○ポ好きぃっ<emoji=heart04>\u3000本番じゃないのにぃ、おま○こで挟んでるだけでっ、気持ち良くなっちゃうっ<emoji=heart04>\u3000ひああっ、んっ、はぁあっ、ふあああっ<emoji=heart04>」"
translation = "「응읏, 응으으읏<emoji=heart04> 연인의 자지 좋아아앗<emoji=heart04> 본방도 아닌데, 보지로 끼우고 있는 것만으로도, 기분 좋아져버려엇<emoji=heart04> 히아앗, 응, 하아앗, 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "アニマ乙"
original = "「はああっ<emoji=heart04>\u3000２人のおま○こで包んでるんだから、実質セックスだろォ<emoji=heart04>\u3000んあっ、はあぁ<emoji=heart04>\u3000恋人せっくしゅぅ<emoji=heart04>\u3000気持ちよしゅぎる<emoji=heart04>\u3000はぁっ、あっ、んああああっ<emoji=heart04>！」"
translation = "「하아앗<emoji=heart04> 둘의 보지로 감싸고 있으니까, 실질적으로 섹스잖아아<emoji=heart04> 응앗, 하아아<emoji=heart04> 연인 섹스으<emoji=heart04> 기분 너무 좋아아<emoji=heart04> 하앗, 앗, 응아아아앗<emoji=heart04>!」"

[[dialogue]]
speaker = "アニマ"
original = "「ああっ、アニマ、はげしイッ<emoji=heart04>\u3000んふぅぅっ、あっ、あっ、イクイクっ、気持ちいいの登って来て、イクぅ……<emoji=heart04><emoji=heart04>！\u3000ふひっ、ふひぃっ、ふあぁぁぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「아앗, 아니마, 격렬해애<emoji=heart04> 응후우웃, 앗, 앗, 가버려, 기분 좋은 게 올라와서, 가버려어……<emoji=heart04><emoji=heart04>! 후히, 후히잇, 후아아아앙앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "アニマ乙"
original = "「アニマもイクっ<emoji=heart04>\u3000はあっ、あああっ<emoji=heart04><emoji=heart04>\u3000気持ちいい、気持ちいいっ、気持ちいいぃぃ<emoji=heart04>\u3000はぁぁっ、ふあぁぁぁっ<emoji=heart04>\u3000恋人チ○ポイイのぉ……<emoji=heart04>」"
translation = "「아니마도 가버려엇<emoji=heart04> 하앗, 아아앗<emoji=heart04><emoji=heart04> 기분 좋아, 기분 좋아, 기분 좋아아아<emoji=heart04> 하아앗, 후아아아앗<emoji=heart04> 연인의 자지 기분 좋아아……<emoji=heart04>」"

[[dialogue]]
speaker = "アニマ"
original = "「んあっ、はぁっ、チ○ポ膨らんできタ<emoji=heart04>\u3000会長もイキそうなんだナ？\u3000んああっ、いいヨ<emoji=heart04>\u3000射精して、射精してぇ<emoji=heart04>！\u3000アニマで気持ち良くなってぇ！\u3000ふあぁぁぁんっ<emoji=heart04>」"
translation = "「응앗, 하앗, 자지가 부풀어 오르네<emoji=heart04> 회장도 갈 것 같은 거지? 응아앗, 좋아아<emoji=heart04> 사정해, 사정해줘어<emoji=heart04>! 아니마로 기분 좋아져서어! 후아아아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "アニマ乙"
original = "「ふひぃぃぃっ<emoji=heart04><emoji=heart04>\u3000んあっ、ふあぁぁぁっ<emoji=heart04><emoji=heart04>\u3000イクイクッ、アニマもイクぅ！\u3000気持ちいいの来る<emoji=heart04>\u3000くるくるくるクルぅ<emoji=heart04><emoji=heart04>\u3000んあああああっ<emoji=heart04><emoji=heart04>」"
translation = "「후히이이잇<emoji=heart04><emoji=heart04> 응앗, 후아아아앗<emoji=heart04><emoji=heart04> 가버려, 아니마도 가버려! 기분 좋은 게 와아<emoji=heart04> 와와와와아<emoji=heart04><emoji=heart04> 응아아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "アニマ"
original = "「あっあっあっ<emoji=heart04>\u3000んはあああっ<emoji=heart04><emoji=heart04>\u3000イクッ、イクイクイクイクイクイクぅぅぅ──ッ<emoji=heart04><emoji=heart04><emoji=heart04>！！！」"
translation = "「앗앗앗<emoji=heart04> 응하아아앗<emoji=heart04><emoji=heart04> 가, 가버려가버려가버려가버려가버려가버려어어──앗<emoji=heart04><emoji=heart04><emoji=heart04>!!!」"

[[dialogue]]
speaker = "アニマ乙"
original = "「キミも一緒に射精してぇぇぇっ！\u3000イクッ、イッちゃううぅぅぅ──ッ<emoji=heart04><emoji=heart04><emoji=heart04>！！！」"
translation = "「너도 같이 사정해줘어어엇! 가버려, 가버릴 거어어어──앗<emoji=heart04><emoji=heart04><emoji=heart04>!!!」"

[[dialogue]]
speaker = "ダブルアニマ"
original = "「「ラブラブ恋人エッチで、イックうぅぅぅ──ッ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000っ……ふぁああああああぁぁぁぁぁぁぁぁっ<emoji=heart04>」」"
translation = "「「러브러브 연인 섹스로, 가버려어어──앗<emoji=heart04><emoji=heart04><emoji=heart04> 읏……후아아아아아아아아아아앗<emoji=heart04>」」"

[[dialogue]]
speaker = "アニマ"
original = "「はああああっ……んくっ、はあああああっ……<emoji=heart04>\u3000射精してるぅ<emoji=heart04>\u3000ほら、もっと出していいんだゾ……<emoji=heart04><emoji=heart04>」"
translation = "「하아아아앗……응읏, 하아아아아앗……<emoji=heart04> 사정하고 있어<emoji=heart04> 자, 더 내보내도 된다고……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "アニマ乙"
original = "「はぁっ……ふぅぅ……精液熱イ<emoji=heart04>\u3000それに凄く、エッチな匂いがする……はぁぁ……<emoji=heart04>」"
translation = "「하앗……후우……정액 뜨거워<emoji=heart04> 게다가 엄청, 야한 냄새가 나……하아아……<emoji=heart04>」"

[[dialogue]]
speaker = "アニマ"
original = "「あんっ<emoji=heart04>\u3000チ○ポ、まだビクビクして、精液出てるゾ……凄イ……<emoji=heart04>」"
translation = "「앙앗<emoji=heart04> 자지, 아직도 움찔거리면서, 정액이 나오고 있어……대단해……<emoji=heart04>」"

[[dialogue]]
speaker = "アニマ"
original = "「ンム……んちゅる……んはぁ<emoji=heart04>\u3000キミの精液、エッチな味がして……体がまた興奮して来ちゃうじゃないカ……<emoji=heart04>」"
translation = "「음……응츄르……응하아<emoji=heart04> 너의 정액, 야한 맛이 나서……몸이 또 흥분해버리잖아……<emoji=heart04>」"

[[dialogue]]
speaker = "アニマ乙"
original = "「んふぅ……<emoji=heart04>\u3000感度２倍の恋人エッチ凄かったナ<emoji=heart04>\u3000今までのセックスで、一番気持ち良かったゾ……<emoji=heart04>」"
translation = "「응후우……<emoji=heart04> 감도 2배인 연인 섹스 굉장했네<emoji=heart04> 지금까지의 섹스 중에서, 제일 기분 좋았어……<emoji=heart04>」"

[[dialogue]]
speaker = "アニマ"
original = "「……フヒ、ということは、ダ」"
translation = "「……후히, 그렇다는 건, 다」"

[[dialogue]]
speaker = "アニマ"
original = "「本番はもっともっと、気持ち良いということになるナ？\u3000会長はどう思う？」"
translation = "「본방은 훨씬 더, 기분 좋을 거란 뜻이지? 회장은 어떻게 생각해?」"

[[dialogue]]
speaker = "アニマ乙"
original = "「アニマ、愛液まだ溢れて止まらなイ。キミとの本番セックスを想像するだけで……はぁん<emoji=heart04>\u3000興奮して、イっちゃいそうダ……<emoji=heart04>」"
translation = "「아니마, 애액이 아직 넘쳐서 멈추질 않앗. 너와의 본방 섹스를 상상하는 것만으로도……하앙<emoji=heart04> 흥분해서, 가버릴 것 같아……<emoji=heart04>」"

[[dialogue]]
speaker = "アニマ"
original = "「やんっ<emoji=heart04>\u3000……射精したばかりなのに、チ○ポもう大きくなったゾ<emoji=heart04>\u3000ということは、フヒ……続きを期待していいんダナ？<emoji=heart04>」"
translation = "「앙<emoji=heart04> ……사정한 지 얼마 안 됐는데, 자지 벌써 커졌어<emoji=heart04> 그렇다는 건, 후히…… 계속해도 된다는 거지?<emoji=heart04>」"

[[dialogue]]
speaker = "アニマ乙"
original = "「恋人アニマの膣内、いっぱい射精して欲しイ<emoji=heart04>」"
translation = "「연인 아니마의 질 안, 잔뜩 정액을 싸 줬으면 좋겠어<emoji=heart04>」"

[[dialogue]]
speaker = "アニマ"
original = "「……あんっ♪\u3000恋人チ○ポ……キタァ<emoji=heart04>」"
translation = "「……앙♪ 연인 자지……왔다<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "恋人たちのエッチな本番おねだりに、今度は俺が２人を押し倒す番になるのだった。"
translation = "연인들의 야한 본방 조르기에, 이번엔 내가 두 사람을 덮칠 차례가 되었다."

