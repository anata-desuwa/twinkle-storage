[[dialogue]]
speaker = "unk"
original = "第５話,１０年前のデネブで起こったこと,B"
translation = "제5화, 10년 전 데네브에서 일어난 일"

[[dialogue]]
speaker = "チナ"
original = "「初めてルヴィに会ったのは、１０年以上前のことだよ」"
translation = "「처음 루비를 만난 건, 10년도 더 된 일이야.」"

[[dialogue]]
speaker = "チナ"
original = "「当時の流星市国は、そりゃあもうひどいありさまだった。日増しに増えるアステラ。倒しても倒しても湧き出てくるモンスターたち……」"
translation = "「당시의 유성시국은, 그야말로 처참한 꼴이었지. 날이 갈수록 늘어나는 아스테라. 쓰러뜨려도 쓰러뜨려도 솟아나오는 몬스터들……」"

[[dialogue]]
speaker = "チナ"
original = "「お前たちの世界……アルタイルでも言い伝えられてるか？\u3000リクリエの<ruby>本波<rt>ほんぱ</rt></ruby>が近づくと、空には彗星の雨が降りそそぐって伝承は」"
translation = "「너희 세계…… 알타이르에서도 전해 내려오나? 리크리에의 본파가 다가오면, 하늘에는 혜성의 비가 쏟아진다는 전승 말이야.」"

[[dialogue]]
speaker = "アナ"
original = "「はい。旧森羅歴……３０００年前に観測されたのはセレーネ流星群。滅亡の到来を報せる前兆として、流星群は発生します」"
translation = "「네. 구 삼라력…… 3000년 전에 관측된 것은 셀레네 유성우. 멸망의 도래를 알리는 전조로서 유성우가 발생합니다.」"

[[dialogue]]
speaker = "チナ"
original = "「セレーネ流星群、名前もデネブと一緒だな」"
translation = "「셀레네 유성우, 이름도 데네브와 똑같네.」"

[[dialogue]]
speaker = "アナ"
original = "「そしてついこの間、私たちの森羅歴でも流星群は観測されました。これがチナさんの語ろうとしている、１０年前の流星群ですね」"
translation = "「그리고 바로 얼마 전, 저희 삼라력에서도 유성우가 관측되었습니다. 이것이 치나 씨가 이야기하려는 10년 전의 유성우겠군요.」"

[[dialogue]]
speaker = "グレイス"
original = "「ついこの間……そうですか。アルタイルの世界はほとんど壊れていない。ということは──」"
translation = "「바로 얼마 전…… 그렇습니까. 알타이르의 세계는 거의 파괴되지 않았군요. 그렇다는 건──」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そうよ！\u3000私たちみんなでリクリエを止めたの！」"
translation = "「맞아! 우리 모두가 리크리에를 막아냈거든!」"

[[dialogue]]
speaker = "アナ"
original = "「大きな犠牲も払いましたが、会長が魔王の力に覚醒したこともあり、大事は免れました」"
translation = "「큰 희생도 치렀습니다만, 회장님이 마왕의 힘에 각성한 덕분에 큰 화는 면했습니다.」"

[[dialogue]]
speaker = "アナ"
original = "「ＤＩＳＣで『フィヴォス流星群』と検索をすれば、色々と情報が出てきますよ」"
translation = "「DISC에서 『피보스 유성우』라고 검색하면 여러 정보가 나올 거예요.」"

[[dialogue]]
speaker = "チナ"
original = "「……フィヴォス？\u3000そこは違うのか。デネブで起こった流星群の名前は、ニュクス流星群だ」"
translation = "「……피보스? 거기서 다르구나. 데네브에서 일어난 유성우의 이름은 닉스 유성우야.」"

[[dialogue]]
speaker = "マトイ"
original = "「どうして流星群の名前が違うんだろう……平行世界って、基本的には同じ道筋をたどるんだよね？」"
translation = "「어째서 유성우 이름이 다른 걸까…… 평행세계라면 기본적으로는 같은 경로를 따라가는 거 아냐?」"

[[dialogue]]
speaker = "アナ"
original = "「出現しているリクリエの使徒が違うからではないでしょうか？\u3000この程度のズレは許容すべきかと」"
translation = "「출현한 리크리에의 사도가 다르기 때문 아닐까요? 이 정도의 차이는 허용 범위라고 봅니다.」"

[[dialogue]]
speaker = "グレイス"
original = "「リクリエの使徒──その言葉は私たちの世界でも使われているものですが……」"
translation = "「리크리에의 사도── 그 말은 저희 세계에서도 쓰이는 것입니다만……」"

[[dialogue]]
speaker = "チナ"
original = "「ああ。デネブとアルタイルで同じ意味の言葉なのか、すり合わせておくか」"
translation = "「아아. 데네브와 알타이르에서 같은 의미의 단어인지 확인해 둘까.」"

[[dialogue]]
speaker = "クロト"
original = "「俺たちアルタイルの世界では、リクリエの到来に合わせて現れる……アステラとモンスターを使役する敵のことを、そう呼んでる」"
translation = "「우리 알타이르 세계에서는 리크리에의 도래에 맞춰 나타나서…… 아스테라와 몬스터를 부리는 적을 그렇게 불러.」"

[[dialogue]]
speaker = "クロト"
original = "「会話自体はできるけれど、性格や思想が元の人格から強固に歪められているのも、共通して見られる特徴だ」"
translation = "「대화 자체는 가능하지만, 성격이나 사상이 원래의 인격으로부터 강력하게 왜곡되어 있는 것도 공통적으로 보이는 특징이야.」"

[[dialogue]]
speaker = "クロト"
original = "「それ以外だと……使徒は全員、仮面を身に着けて現れる。天界で使徒だったジグを、キミたちも見ただろう？」"
translation = "「그 외에는…… 사도는 전원 가면을 쓰고 나타나지. 천계에서 사도였던 지그를 너희도 봤지?」"

[[dialogue]]
speaker = "チナ"
original = "「……デネブでもほぼ同じ認識だ。まあ元々、この名称が定着したのも、使徒自身がそう名乗ったことに由来してるって聞いたし、ある意味では道理か」"
translation = "「……데네브에서도 거의 같은 인식이야. 뭐 원래 이 명칭이 정착된 것도 사도 스스로가 그렇게 자칭한 것에서 유래했다고 들었으니, 어떤 의미로는 당연한가.」"

[[dialogue]]
speaker = "アナ"
original = "「リクリエの使徒は、『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』が用意した、リクリエを効率的に遂行するためのプログラム……私たちはそう推測しています」"
translation = "「리크리에의 사도는 『<ruby>XELOS<rt>제로스</rt></ruby>』가 준비한, 리크리에를 효율적으로 수행하기 위한 프로그램…… 저희는 그렇게 추측하고 있습니다.」"

[[dialogue]]
speaker = "グレイス"
original = "「そうですか。じゃあ、アルタイルの世界にも、あの『仮面の女』が……？」"
translation = "「그렇습니까. 그럼 알타이르 세계에도 그 『가면의 여자』가……?」"

[[dialogue]]
speaker = "チナ"
original = "「──待てよお前ら、そうだよっ。アルタイルはリクリエを防いだって……あの『仮面の女』を倒したのか！？\u3000嘘だろ！？」"
translation = "「──잠깐만 너희들, 그렇구나. 알타이르는 리크리에를 막았다고…… 그 『가면의 여자』를 쓰러뜨린 거야!? 거짓말이지!?」"

[[dialogue]]
speaker = "クロト"
original = "「仮面を被った使徒は確かに倒した。でもアルタイルに現れた使徒は、デネブとは違う使徒だ」"
translation = "「가면을 쓴 사도는 확실히 쓰러뜨렸어. 하지만 알타이르에 나타난 사도는 데네브와는 다른 사도야.」"

[[dialogue]]
speaker = "アナ"
original = "「これも参照事例が少ないですが、使徒は平行世界からその存在が選ばれます」"
translation = "「이것도 참조 사례가 적습니다만, 사도는 평행세계에서 그 존재가 선택됩니다.」"

[[dialogue]]
speaker = "チナ"
original = "「なんだって……使徒は、平行世界人だってのか！？」"
translation = "「뭐라고…… 사도가 평행세계 사람이라는 거야!?」"

[[dialogue]]
speaker = "アナ"
original = "「はい。選ばれるのは星騎士ばかり……仮面を被せられ、意思を奪われた後に、異なる世界に渡ってリクリエを扇動するんです」"
translation = "「네. 선택되는 것은 성기사들뿐…… 가면이 씌워지고 의지를 빼앗긴 뒤에, 다른 세계로 넘어가 리크리에를 선동하는 겁니다.」"

[[dialogue]]
speaker = "チナ"
original = "「デネブで暴れた『仮面の女』は、アルタイルには来ていない……？\u3000じゃあ、アルタイルに現れた使徒って──」"
translation = "「데네브에서 날뛴 『가면의 여자』는 알타이르에 오지 않았다……? 그럼 알타이르에 나타난 사도는──」"

[[dialogue]]
speaker = "アポロ"
original = "「あたしだ」"
translation = "「나야.」"

[[dialogue]]
speaker = "チナ"
original = "「……は？」"
translation = "「……하?」"

[[dialogue]]
speaker = "アポロ"
original = "「アルタイルに使徒として現れて、フィヴォス流星群を降らせたのはあたしだ。もっと正確に言えば──デネブのあたし、だけど」"
translation = "「알타이르에 사도로 나타나서 피보스 유성우를 내리게 한 건 나야. 더 정확히 말하면── 데네브의 나지만.」"

[[dialogue]]
speaker = "アポロ"
original = "「あたしの名前はアポロ。その前は、星見フィオナを名乗っていた者だ」"
translation = "「내 이름은 아폴로. 그 전에는 호시미 피오나를 자칭하던 자다.」"

[[dialogue]]
speaker = "チナ"
original = "「はあぁ！？\u3000星見って……このちんちくりんが星見家の長女！？」"
translation = "「하아아!? 호시미라니…… 이 꼬맹이가 호시미 가문의 장녀라고!?」"

[[dialogue]]
speaker = "アポロ"
original = "「ツッコむところそこか！？\u3000って、オマエにだけは言われたくないぞ！」"
translation = "「태클 걸 데가 거기냐!? 그보다, 너한테만큼은 듣고 싶지 않다고!」"

[[dialogue]]
speaker = "チナ"
original = "「いやでも──そういう、ことか……」"
translation = "「아니 하지만── 그렇게 된 건가……」"

[[dialogue]]
speaker = "チナ"
original = "「昔、星見家の双子の妹が神隠しにあった、なんて噂があったけど……それがまさか、リクリエ絡みの事件だったなんて」"
translation = "「옛날에 호시미 가문의 쌍둥이 여동생이 행방불명되었다는 소문이 있었는데…… 그게 설마 리크리에와 관련된 사건이었다니.」"

[[dialogue]]
speaker = "グレイス"
original = "「チナ、すみません。真剣に聞いてたんですが、頭がこんがらがってきました……」"
translation = "「치나, 죄송해요. 진지하게 듣고 있었습니다만 머릿속이 엉망이 되었어요……」"

[[dialogue]]
speaker = "チナ"
original = "「アルタイルで暴れたのは、デネブ出身の星見フィオナってことだよ。魔王の言うことを信じればだけど……」"
translation = "「알타이르에서 날뛴 건 데네브 출신의 호시미 피오나라는 소리야. 마왕의 말을 믿는다면 말이지……」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、そうだ。リクリエの使徒は、何者かに選ばれた後に世界を渡る。その跳躍は、時間すらも飛び越える」"
translation = "「아아, 그래. 리크리에의 사도는 누군가에게 선택된 뒤에 세계를 건너가. 그 도약은 시간조차 뛰어넘지.」"

[[dialogue]]
speaker = "クロト"
original = "「そして、渡った先の世界で破壊の限りを尽くすんだ」"
translation = "「그리고 건너간 세계에서 파괴를 일삼는 거야.」"

[[dialogue]]
speaker = "クロト"
original = "「デネブからやってきた『使徒・アポロ』はその呪縛から解放された。もう君たちの世界にも戻っている」"
translation = "「데네브에서 온 『사도 아폴로』는 그 속박에서 해방되었어. 이미 너희 세계로도 돌아가 있고.」"

[[dialogue]]
speaker = "チナ"
original = "「……デネブの星見フィオナが、今どこで何をしてるのかも聞きたいけど。もっと気になることがある……デネブで暴れた使徒、あれは……」"
translation = "「……데네브의 호시미 피오나가 지금 어디서 뭘 하는지도 듣고 싶지만, 더 신경 쓰이는 게 있어…… 데네브에서 날뛴 사도, 그건……」"

[[dialogue]]
speaker = "クロト"
original = "「ああ。俺たちの世界、アルタイルから選ばれてしまった存在だ。その『仮面の女』……マルキア・セイファートに似ている。そんな噂はなかったか？」"
translation = "「아아. 우리 세계, 알타이르에서 선택되어 버린 존재야. 그 『가면의 여자』…… 마르키아 세이파트를 닮았다는 그런 소문은 없었나?」"

[[dialogue]]
speaker = "グレイス"
original = "「そうです！\u3000１０年前の当時、新星学園の学園長だった、英雄セイファートの奥方様に、面影が似ていたと……」"
translation = "「맞아요! 10년 전 당시, 신성학원의 학원장이었던 영웅 세이파르트의 부인과 모습이 닮았다고……」"

[[dialogue]]
speaker = "グレイス"
original = "「扱う得物も、戦う時の出で立ちも……ただ素顔を確認できなかったため、あくまで噂でしかなく……」"
translation = "「다루는 무기도, 싸울 때의 차림새도…… 다만 맨얼굴을 확인할 수 없었기에 어디까지나 소문일 뿐이었지만……」"

[[dialogue]]
speaker = "チナ"
original = "「アタシ、その噂が大嫌いでさ……喋ってるやつがいたら、訂正しろって、よくケンカしてた……」"
translation = "「난 그 소문이 정말 싫었거든…… 떠드는 녀석이 있으면 정정하라고 자주 싸웠지……」"

[[dialogue]]
speaker = "チナ"
original = "「戦姫マルキアは、英雄ジェラルドと同じ……流星市国のシンボルだった。星騎士たちみんなの憧れだったから」"
translation = "「전희 마르키아는 영웅 제랄드와 마찬가지로…… 유성시국의 상징이었어. 성기사들 모두의 동경이었으니까.」"

[[dialogue]]
speaker = "チナ"
original = "「そっか……あの『戦姫マルキア』がリクリエの使徒……そりゃ、デネブが勝てないわけだ……」"
translation = "「그렇구나…… 그 『전희 마르키아』가 리크리에의 사도…… 그러니 데네브가 이길 수 없었겠지……」"

[[dialogue]]
speaker = "アナ"
original = "「チナさん。平行世界の移動の際、同一人物が同時に意識を保つことはできません」"
translation = "「치나 씨. 평행세계를 이동할 때 동일 인물이 동시에 의식을 유지할 수는 없습니다.」"

[[dialogue]]
speaker = "アナ"
original = "「現在、アルタイルの香堂チナさんが眠っているように」"
translation = "「현재 알타이르의 코도 치나 씨가 잠들어 있는 것처럼요.」"

[[dialogue]]
speaker = "チナ"
original = "「……ああ」"
translation = "「……아아.」"

[[dialogue]]
speaker = "アナ"
original = "「つまり、デネブで暮らすマルキア・セイファートも、意識を失っていたはずです。その辺りの記録などは……」"
translation = "「즉, 데네브에서 살고 있는 마르키아 세이파르트도 의식을 잃었을 것입니다. 그쪽 기록 같은 건……」"

[[dialogue]]
speaker = "チナ"
original = "「……死んだって言われてるよ。夫も含めて」"
translation = "「……죽었다고 알려져 있어. 남편을 포함해서.」"

[[dialogue]]
speaker = "unk"
original = "俺が星騎士として憧れた存在は、異なる世界でも死という運命から逃れられなかったのか。"
translation = "내가 성기사로서 동경했던 존재는 다른 세계에서도 죽음이라는 운명에서 도망칠 수 없었던 건가."

[[dialogue]]
speaker = "クロト"
original = "（…………セイファート、学園長）"
translation = "(…………세이파르트 학원장님.)"

[[dialogue]]
speaker = "チナ"
original = "「セイファート一家だけじゃない。デネブでは、大勢死んだ。生きてるやつを探す方が大変なくらいだ」"
translation = "「세이파르트 일가뿐만이 아니야. 데네브에서는 수많은 사람이 죽었어. 살아있는 사람을 찾는 게 더 힘들 정도야.」"

[[dialogue]]
speaker = "チナ"
original = "「あの仮面の女──リクリエの使徒は、三界で暴れた。天界では聖庭園を、魔界では<ruby>頽廃<rt>たいはい</rt></ruby>都市キュリオスを瞬く間に陥落させた」"
translation = "「그 가면의 여자── 리크리에의 사도는 삼계를 휩쓸었어. 천계에서는 성정원을, 마계에서는 퇴폐 도시 큐리오스를 순식간에 함락시켰지.」"

[[dialogue]]
speaker = "チナ"
original = "「<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>を機能不全にして、三界の連絡が取れないようにしてから、あいつは人間界に現れた」"
translation = "「<ruby>경계의 호수<rt>라고 시에로</rt></ruby>를 기능 불능으로 만들어서 삼계의 연락이 닿지 않게 한 뒤에, 그 녀석은 인간계에 나타났어.」"

[[dialogue]]
speaker = "チナ"
original = "「順番だったんだろうさ。あとは人間界で、魔王を自称する星徒会長様を殺せば、リクリエは達成されるってな」"
translation = "「순서였겠지. 남은 건 인간계에서 마왕을 자처하는 성도회장님을 죽이면 리크리에는 달성된다는 거였어.」"

[[dialogue]]
speaker = "サーシャ"
original = "「徹底的ね。アルタイルに現れたアポロちゃんとは、やり方が違う……」"
translation = "「철저하네~. 알타이르에 나타난 아폴로짱과는 방식이 달라……」"

[[dialogue]]
speaker = "チナ"
original = "「かろうじて生き残った星騎士から聞いた話だけど……戦争の天才って奴らしい。残虐で冷酷。攻め方は不規則かつ執拗で……」"
translation = "「겨우 살아남은 성기사에게 들은 이야기지만…… 전쟁의 천재라는 모양이야. 잔학하고 냉혹하며, 공격 방식은 불규칙하고도 집요해서……」"

[[dialogue]]
speaker = "チナ"
original = "「当時のデネブ、流星市国にいた星騎士は、その９割以上が死んでるんだからな」"
translation = "「당시 데네브, 유성시국에 있던 성기사는 그 9할 이상이 죽었으니까.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ほ、ほとんど全員じゃないっ！？」"
translation = "「거, 거의 전부잖아!?」"

[[dialogue]]
speaker = "グレイス"
original = "「どうしても記録には漏れがありますが……それでもほとんどが亡くなられています。特に、新星・流星の両学園の星徒会は全滅しています」"
translation = "「아무래도 기록에는 누락이 있습니다만…… 그래도 대부분이 돌아가셨습니다. 특히 신성·유성 두 학원의 성도회는 전멸했습니다.」"

[[dialogue]]
speaker = "マトイ"
original = "「そう、なの……？」"
translation = "「그랬구나……?」"

[[dialogue]]
speaker = "グレイス"
original = "「はい。私の記憶では──デネブの新星学園、その星徒会メンバーは緋宮クロト、九浄テルル、奏サーシャ、詠野マトイ、アナの５名」"
translation = "「네. 제 기억으로는── 데네브의 신성학원, 그 성도회 멤버는 히노미야 쿠로토, 쿠죠 테루루, 카나데 사샤, 에노 마토이, 아나의 5명.」"

[[dialogue]]
speaker = "グレイス"
original = "「その全員が、『仮面の女』との戦いで戦死したと記録にあります」"
translation = "「그 전원이 『가면의 여자』와의 싸움에서 전사했다고 기록에 남아 있습니다.」"

[[dialogue]]
speaker = "マトイ"
original = "「…………そう、だったんだ」"
translation = "「…………그랬었구나.」"

[[dialogue]]
speaker = "グレイス"
original = "「あ、いえ……その。魔王さんだけは、記録上『逃亡』、でしたね……死体も見つかっていないみたいで……」"
translation = "「아, 아니…… 그게. 마왕님만은 기록상 『도망』이었죠…… 시체도 발견되지 않은 모양이라……」"

[[dialogue]]
speaker = "クロト"
original = "「気にしていないよ。そのあたりのことも、よく聞きたいから」"
translation = "「신경 쓰지 않아. 그 부분에 대해서도 자세히 듣고 싶으니까.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「…………パパ、ママ」"
translation = "「…………파파, 마마.」"

[[dialogue]]
speaker = "チナ"
original = "「ん？\u3000でもアンタはヴィーナスだよな。九浄テルルって名前じゃない……？\u3000その辺もズレがあるのかな」"
translation = "「응? 하지만 넌 비너스잖아. 쿠죠 테루루라는 이름이 아냐……? 그쪽도 차이가 있는 건가.」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは『人間に転生した女神テルル』と『デネブの緋宮クロト』の子──いずれその情報も、彼女たちに伝える必要がありそうだ。"
translation = "비너스는 『인간으로 전생한 여신 테루루』와 『데네브의 히노미야 쿠로토』의 아이── 언젠가 그 정보도 그녀들에게 전할 필요가 있을 것 같다."

[[dialogue]]
speaker = "unk"
original = "でも今は、チナの話を聞こう。"
translation = "하지만 지금은 치나의 이야기를 듣자."

[[dialogue]]
speaker = "チナ"
original = "「……ともかくだ。デネブの星騎士たちは終始、あの『仮面の女』に劣勢だった」"
translation = "「……어쨌든 말이야. 데네브의 성기사들은 시종일관 그 『가면의 여자』에게 열세였어.」"

[[dialogue]]
speaker = "チナ"
original = "「毎日、星騎士は数を減らしていった。彗星の雨は止まらない。流星市国全域が戦闘区域になって……」"
translation = "「매일 성기사들은 수가 줄어갔지. 혜성의 비는 멈추지 않아. 유성시국 전역이 전투 구역이 되어서……」"

[[dialogue]]
speaker = "チナ"
original = "「そして魔王クロトは、デネブに見切りをつけて逃げだした──そう言われてるのは、もう耳タコだよな」"
translation = "「그리고 마왕 쿠로토는 데네브를 포기하고 도망쳤다── 그런 말은 이제 귀에 못이 박히도록 들었겠지.」"

[[dialogue]]
speaker = "クロト"
original = "「ああ。そして、絶望的な状況に陥った流星市国。そこに現れたのが──」"
translation = "「아아. 그리고 절망적인 상황에 빠진 유성시국. 그곳에 나타난 것이──」"

[[dialogue]]
speaker = "チナ"
original = "「…………うん。ルヴィ、だったんだ」"
translation = "「…………응. 루비였어.」"

[[dialogue]]
speaker = "unk"
original = "チナは記憶をたぐるように、しばらく沈黙した後──ゆっくりと口を開く。"
translation = "치나는 기억을 더듬듯 잠시 침묵한 뒤, 천천히 입을 연다."

[[dialogue]]
speaker = "チナ"
original = "「ちょっと長くなるけど、できる限り詳しく話すよ。つまんない昔話だけど……」"
translation = "「조금 길어지겠지만 가능한 한 자세히 이야기할게. 따분한 옛날이야기지만……」"

