[[dialogue]]
speaker = "unk"
original = "第２話,子犬『ユニバース』の近況,P"
translation = "제2화, 강아지 『유니버스』의 근황, P"

[[dialogue]]
speaker = "unk"
original = "以前、ヒルディー先輩は道に捨てられていた雑種の子犬（♀）を拾い、その子に『千園寺ユニバース』と名づけた。"
translation = "이전에, 힐디 선배는 길에 버려져 있던 잡종 강아지(♀)를 주웠고, 그 아이에게 『치온지 유니버스』라고 이름을 붙였다."

[[dialogue]]
speaker = "unk"
original = "流星寮で飼われることになり、今では『ユニ』という愛称で、寮生たちから可愛がられるアイドル的存在となっていた――"
translation = "유성 기숙사에서 길러지게 되었고, 지금은 『유니』라는 애칭으로, 기숙사생들에게 귀여움을 받는 아이돌적인 존재가 되어 있었다――"

[[dialogue]]
speaker = "フェニエル"
original = "「ユニちゃん、はい♪\u3000おやつをどうぞ～」"
translation = "「유니짱, 자♪ 간식을 드세요～」"

[[dialogue]]
speaker = "ユニバース"
original = "「わんわん♪」"
translation = "「멍멍♪」"

[[dialogue]]
speaker = "unk"
original = "嬉しそうに尻尾を振りながら、ぱたぱたと走ってきて、フェニエルの手の平にあるささみジャーキーを食べる。"
translation = "기쁜 듯이 꼬리를 흔들면서, 파닥파닥 달려와, 페니엘의 손바닥에 있는 닭가슴살 육포를 먹는다."

[[dialogue]]
speaker = "フェニエル"
original = "「ふふふっ、ユニちゃん、人懐っこくて、すごく可愛いです♪」"
translation = "「후후훗, 유니짱, 사람을 잘 따르고, 굉장히 귀여워요♪」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ですわ♪\u3000フニと同じように、健気でキュートですの♪」"
translation = "「입니다와♪ 후니와 마찬가지로, 착하고 큐트합니다요♪」"

[[dialogue]]
speaker = "フェニエル"
original = "「な、なんかそう言われると照れちゃいますね。えへへへ……♪」"
translation = "「나, 뭔가 그렇게 들으니 쑥스럽네요. 에헤헤헤……♪」"

[[dialogue]]
speaker = "unk"
original = "ちなみに、ユニバースの愛称を『ユニ』と決めたのは、先輩曰くフェニエルとちょっと雰囲気が似ていると思ったかららしい。"
translation = "덧붙여서, 유니버스의 애칭을 『유니』라고 정한 것은, 선배의 말에 따르면 페니엘과 조금 분위기가 닮았다고 생각했기 때문인 듯하다."

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「――さあ、次は会長の番ですわ。今日こそ不可能を打ち破る時ですわよ！」"
translation = "「――자, 다음은 회장 차례입니다요. 오늘이야말로 불가능을 깨부술 때입니다요!」"

[[dialogue]]
speaker = "フェニエル"
original = "「会長さん、けっぱって行きましょうっ」"
translation = "「회장님, 힘내서 가봅시다요」"

[[dialogue]]
speaker = "unk"
original = "ユニ～、おやつ食べるか～？"
translation = "유니～, 간식 먹을래～?"

[[dialogue]]
speaker = "unk"
original = "よし……！"
translation = "좋아……!"

[[dialogue]]
speaker = "unk"
original = "俺は手の平にささみジャーキーを乗せて、ユニに呼びかける。"
translation = "나는 손바닥에 닭가슴살 육포를 올려놓고, 유니에게 말을 건다."

[[dialogue]]
speaker = "ユニバース"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "（ふむ、フニが呼んだ時と違って、ちょっと距離を開けたところから、立ち止まってじ～っと会長のことを見てますわね……）"
translation = "（흠, 후니가 불렀을 때와 달리, 조금 거리를 둔 곳에서, 멈춰 서서 지――긋이 회장을 보고 있습니다요……）"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "（ユニは前の飼い主から酷い扱いを受けていたのか、男性である会長に対しては、ずっと怖がっておりましたわ）"
translation = "（유니는 이전 주인에게서 심한 취급을 받았는지, 남성인 회장에 대해서는, 계속 무서워하고 있었습니다요）"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "（ですが、毎日少しずつ慣れて、警戒は随分解けて来ているはずですの。だから、もうそろそろ……）"
translation = "（하지만, 매일 조금씩 익숙해져서, 경계는 상당히 풀려가고 있을 것입니다요. 그러니, 이제 슬슬……）"

[[dialogue]]
speaker = "フェニエル"
original = "「あ……！」"
translation = "「아……!」"

[[dialogue]]
speaker = "ユニバース"
original = "「……くんくん」"
translation = "「……킁킁」"

[[dialogue]]
speaker = "unk"
original = "ユニがそっと歩みを進めて、鼻先だけ近づけて、俺の手の匂いを嗅ぐような仕草をする。"
translation = "유니가 살짝 발을 내딛고, 코끝만 가까이 대고, 내 손의 냄새를 맡는 듯한 몸짓을 한다."

[[dialogue]]
speaker = "unk"
original = "そして――"
translation = "그리고――"

[[dialogue]]
speaker = "ユニバース"
original = "「わぅん……！」"
translation = "「와웅……!」"

[[dialogue]]
speaker = "unk"
original = "俺の顔を窺うように見上げながら、あむっとささみジャーキーを口にする。"
translation = "내 얼굴을 살피듯이 올려다보면서, 아물고 닭가슴살 육포를 입에 문다."

[[dialogue]]
speaker = "フェニエル"
original = "「やりましたっ♪\u3000ユニちゃんがついに、会長さんの手からおやつを食べてくれました……！」"
translation = "「해냈습니다♪ 유니짱이 드디어, 회장님의 손에서 간식을 먹어주었어요……!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「エレガントですわ♪\u3000会長、日々の努力が実りましたわね！」"
translation = "「엘레강트합니다요♪ 회장, 나날의 노력이 결실을 맺었습니다요!」"

[[dialogue]]
speaker = "unk"
original = "感動して、ちょっと泣きそう……"
translation = "감동해서, 조금 울 것 같아……"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「あら、ふふっ♪\u3000会長も涙ぐんでいるところ、私、初めて見たかもしれませんわ♪」"
translation = "「어머, 후훗♪ 회장도 눈시울을 붉히는 모습, 저, 처음 봤을지도 모릅니다요♪」"

[[dialogue]]
speaker = "ユニバース"
original = "「くぅ～ん……？」"
translation = "「낑～……?」"

[[dialogue]]
speaker = "unk"
original = "自分が何か悪いことをしてしまったと思ったのか、俺の指をぺろぺろと舐めて、小首を傾げてくるユニ。"
translation = "자신이 뭔가 나쁜 짓을 해버렸다고 생각했는지, 내 손가락을 낼름낼름 핥고, 고개를 갸웃거리는 유니."

[[dialogue]]
speaker = "unk"
original = "そんな姿が健気で可愛くて、俺は泣きそうになりながらも笑顔がこぼれてしまうのだった――"
translation = "그런 모습이 착하고 귀여워서, 나는 울 것 같으면서도 미소가 새어 나오는 것이었다――"

[[dialogue]]
speaker = "unk"
original = "それから数日経って。"
translation = "그로부터 며칠이 지나고."

[[dialogue]]
speaker = "unk"
original = "俺がユニと触れ合えるようになったことで、その日はヒルディー先輩と一緒に、ユニの散歩デートをすることになった。"
translation = "내가 유니와 접촉할 수 있게 된 것으로, 그날은 힐디 선배와 함께, 유니의 산책 데이트를 하게 되었다."

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「それで、ユニが会長と一緒に散歩できるようになったのは、喜ばしいことなのですけれど……」"
translation = "「그래서, 유니가 회장과 함께 산책할 수 있게 된 것은, 기쁜 일입니다만……」"

[[dialogue]]
speaker = "ユニバース"
original = "「わんわん<emoji=heart04>\u3000きゅぅ～～ん<emoji=heart04>」"
translation = "「멍멍<emoji>heart04</emoji> 낑～～<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "unk"
original = "ユニは尻尾をぶんぶん振りながら俺の足元に駆け寄って来て、ごろんと寝転んでお腹を見せてくれる。"
translation = "유니는 꼬리를 붕붕 흔들면서 내 발밑으로 달려와, 데굴 하고 누워서 배를 보여준다."

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「あれからわずか数日で、この懐きっぷりは一体どういうことですの！？」"
translation = "「그로부터 불과 며칠 만에, 이 따르는 정도는 대체 무슨 일인 것입니다요!?」"

[[dialogue]]
speaker = "unk"
original = "ユニ～<emoji=heart04>\u3000可愛いな～、よしよし<emoji=heart04>"
translation = "유니～<emoji>heart04</emoji> 귀엽네～, 아이고 아이고<emoji>heart04</emoji>"

[[dialogue]]
speaker = "ユニバース"
original = "「きゅんきゅん<emoji=heart04>\u3000くぅ～～ん<emoji=heart04><emoji=heart04>」"
translation = "「낑낑<emoji>heart04</emoji> 낑～～<emoji>heart04</emoji><emoji>heart04</emoji>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「会長が撫でている時の反応が、私が撫でる時よりも嬉しそうなのですけれど！？\u3000語尾にハートマークが付いているのが、目に見えるようでしてよ！？」"
translation = "「회장이 쓰다듬을 때의 반응이, 제가 쓰다듬을 때보다 더 기쁜 것 같습니다만!? 어미에 하트 마크가 붙어 있는 것이, 눈에 보이는 것 같습니다요!?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「――前にペットショップでバイトしていたことがあって、そこで色々な動物の撫で方スキルを学んだ？\u3000その話は興味を惹かれますけれど……」"
translation = "「――전에 펫숍에서 아르바이트를 한 적이 있어서, 거기서 여러 동물 쓰다듬는 스킬을 배웠다고요? 그 이야기는 흥미롭습니다만……」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「というか、会長の顔も、恋人の私でも滅多に見ないくらいデレデレになってますわよ！？」"
translation = "「랄까, 회장의 얼굴도, 연인인 저조차 좀처럼 보지 못할 정도로 헤벌쭉해져 있습니다요!?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「むぅ～～っ！\u3000これはユニの散歩でもありますけれど、私とのデートでもありますのよ！」"
translation = "「무우～～ㅅ! 이것은 유니의 산책이기도 합니다만, 저와의 데이트이기도 합니다요!」"

[[dialogue]]
speaker = "マハムート"
original = "「やれやれ、買い物しに行こうと外に出てみれば……」"
translation = "「에휴, 쇼핑하러 나가보려고 밖에 나와보니……」"

[[dialogue]]
speaker = "マハムート"
original = "「こんなところで頬を膨らませて、子犬と何を張り合っているのよ、あなたは……」"
translation = "「이런 곳에서 볼을 부풀리고, 강아지와 뭘 다투고 있는 거니, 당신은……」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「あっ、マム！？\u3000聞いて下さいまし！\u3000実は会長がかくかくしかじかで――」"
translation = "「앗, 마무!? 들어주세요! 실은 회장이 이러쿵저러쿵해서――」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「――私というものがありながら、ユニにデレデレになっておりますの！」"
translation = "「――저라는 사람이 있음에도 불구하고, 유니에게 헤벌쭉해져 있습니다요!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「これではなんだか、私を差し置いて浮気みたいではありませんの！？」"
translation = "「이래서는 뭔가, 저를 제쳐두고 바람피우는 것 같지 않습니까요!?」"

[[dialogue]]
speaker = "マハムート"
original = "「はぁ……仕方ないわね」"
translation = "「하아…… 어쩔 수 없네」"

[[dialogue]]
speaker = "マハムート"
original = "「――<ruby>端<rt>はた</rt></ruby>から見ると、浮気というより、あなた達、『子連れの夫婦』みたいに見えるわよ？」"
translation = "「――곁에서 보면, 바람이라기보다, 당신들, 『아이 딸린 부부』처럼 보여?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ですわ！？\u3000ふ、夫婦……！？」"
translation = "「입니다와!? 부, 부부……!?」"

[[dialogue]]
speaker = "マハムート"
original = "「ええ。会長がデレデレになっているのは、女の子に鼻の下を伸ばしているんじゃなくて、小さい子供が可愛くて仕方ないって感じじゃない？」"
translation = "「응. 회장이 헤벌쭉해져 있는 건, 여자아이에게 코 밑이 길어진 게 아니라, 작은 아이가 너무 귀여워서 어쩔 줄 모르는 느낌이잖아?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「……！\u3000な、なるほど。そうでしたのね……」"
translation = "「……! 나, 나루호도. 그랬던 것이군요……」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「わ、私と会長が、夫婦……<emoji=heart04>」"
translation = "「저, 저와 회장이, 부부……<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "unk"
original = "――あれ？\u3000先輩、どうかしました？"
translation = "――어라? 선배, 무슨 일 있으세요?"

[[dialogue]]
speaker = "unk"
original = "俺はユニとの触れ合いを一旦堪能し終えたところで、マムがいつの間にかやって来ていて、ヒルディー先輩の様子が変であることに気づく。"
translation = "나는 유니와의 접촉을 일단 만끽하고 난 뒤, 마무가 어느새 와 있었고, 힐디 선배의 상태가 이상하다는 것을 깨닫는다."

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「あっ、いえ！\u3000なんでもありませんのよ、おほほほほっ♪」"
translation = "「앗, 아뇨! 아무 일도 아닙니다요, 오호호호홋♪」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「もう大丈夫ですわ――旦那様<emoji=heart04>」"
translation = "「이제 괜찮습니다요―― 남편님<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "unk"
original = "旦那様！？"
translation = "남편님!?"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「うふふふふ……<emoji=heart04>」"
translation = "「우후후후후……<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "マハムート"
original = "「やれやれ。手の平回転ドリルね、あなたの飼い主は」"
translation = "「에휴. 손바닥 회전 드릴이네, 당신의 주인은」"

[[dialogue]]
speaker = "ユニバース"
original = "「わん♪」"
translation = "「멍♪」"

[[dialogue]]
speaker = "unk"
original = "マムは、挨拶するように足元にやって来たユニを抱っこすると、その頭を撫でながら、肩をすくめてみせるのだった――"
translation = "마무는, 인사하듯이 발밑으로 다가온 유니를 안아 올리더니, 그 머리를 쓰다듬으며, 어깨를 으쓱해 보이는 것이었다――"

