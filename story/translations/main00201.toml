[[dialogue]]
speaker = "unk"
original = "第１話,もうひとつの日常,B"
translation = "제1화, 또 하나의 일상, B"

[[dialogue]]
speaker = "unk"
original = "流星市国の中枢である学園都市──"
translation = "유성 시국의 중추인 학원 도시──"

[[dialogue]]
speaker = "unk"
original = "幾多もの星騎士を排出するそこは、広大な敷地に姉妹校となる２つの学園を構えていた。"
translation = "수많은 성기사를 배출하는 그곳은, 광대한 부지에 자매 학교가 되는 두 개의 학원을 두고 있었다."

[[dialogue]]
speaker = "unk"
original = "ひとつは６年前に新設された『新星学園』。"
translation = "하나는 6년 전에 신설된 『신성 학원』."

[[dialogue]]
speaker = "unk"
original = "そしてもうひとつは、遥か昔からこの地に根ざした歴史と伝統の学び舎──"
translation = "그리고 또 하나는, 아주 먼 옛날부터 이 땅에 뿌리내린 역사와 전통의 배움터──"

[[dialogue]]
speaker = "unk"
original = "『流星学園』であった。"
translation = "『유성 학원』이었다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「──ラスト！\u3000はい！\u3000はい！\u3000これで手札ゼロ！\u3000わたしの勝ちですやったー！」"
translation = "「──라스트! 하이! 하이! 이걸로 패 제로! 저의 승리입니다 얏호ー!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「はい残ね～ん！\u3000ＵＭＯって言ってなーい！\u3000ペナルティ４枚追加ー！」"
translation = "「네 아쉬～워라! UMO라고 말 안 했지ー! 페널티 4장 추가ー!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「へ、へぇっ！？\u3000そんなの聞いてないです！\u3000ずるい！\u3000極悪！\u3000陰謀！」"
translation = "「헤, 헤엣!? 그런 건 못 들었습니다! 치사해요! 극악! 음모!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「常識っしょ～。ルリちーはまだ人間の遊びに慣れてないかな～？」"
translation = "「상식이지～。 루리치ー는 아직 인간의 놀이에 익숙하지 않은 걸까～?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あああっ！\u3000そんなこと言ってまたドロー<ruby>９<rt>ナイン</rt></ruby>！\u3000セーラ先輩の鬼！\u3000悪魔！」"
translation = "「아아앗! 그런 말 하면서 또 드로우 9! 세라 선배는 귀신! 악마!」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「ニャーッニャッニャッニャッ。こういうゲームは最後まで立っていたヤツが勝つのニャン。ワガハイのようニャ！\u3000ＵＭＯ！」"
translation = "「냐ー앗 냐앗 냐앗 냐앗. 이런 게임은 끝까지 서 있던 녀석이 이기는 거다냥. 이 몸처럼 말이다냥! UMO!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ドロー７だ、アホ猫」"
translation = "「드로우 7이다, 바보 고양이」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「ニャんニャと！？」"
translation = "「뭐, 뭐라냥!?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あはは、ニャリオンさんよわーい！\u3000人がやられてるのを見るのは楽しいですぅ」"
translation = "「아하하, 냐리온 씨 약해ー요! 사람이 당하는 걸 보는 건 즐겁습니다아」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「天使とは思えぬセリフニャン！」"
translation = "「천사라고는 생각할 수 없는 대사다냥!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「よーし、これならあたしにもチャンスが……」"
translation = "「좋아ー, 이 정도면 나에게도 찬스가……」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「あ、ＵＭＯ。で、あがり～。なんか勝っちゃった♪」"
translation = "「아, UMO. 그리고, 끝～。 왠지 이겨버렸네♪」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ってあああ！\u3000また負けてしまいましたー！」"
translation = "「이, 이럴 수가아! 또 져버렸습니다ー!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「かー、強ぇなセーラさん。こんなとこまで要領いいのかよ」"
translation = "「크ー, 강하네 세라 씨. 이런 것까지 요령이 좋은 거냐」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「次ニャ！\u3000次で勝負ニャ！\u3000次で勝ったらポイント１００倍にするニャ！」"
translation = "「다음이다냥! 다음으로 승부다냥! 다음에서 이기면 포인트 100배로 하는 거다냥!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ポポポポイント１００倍！？\u3000これは究極の大チャンスですね……！」"
translation = "「포포포 포인트 100배!? 이건 궁극의 대찬스인 것입니다……!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「でもー、勝たないと意味ないと思うケドー？」"
translation = "「그치만ー, 이기지 않으면 의미 없다고 생각하는데ー?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「つか、ポイントなんて制度なかったろ……」"
translation = "「그나저나, 포인트 같은 제도 없었잖아……」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「うるさいニャン！\u3000何が何でも次の勝負で勝ったやつが真の勝者なのニャアアアン！」"
translation = "「시끄럽다냥! 무슨 일이 있어도 다음 승부에서 이긴 녀석이 진정한 승자인 거다냐아아앙!」"

[[dialogue]]
speaker = "unk"
original = "わいわいと盛り上がる星徒会室。"
translation = "왁자지껄하게 달아오르는 성도회실."

[[dialogue]]
speaker = "unk"
original = "彼女らの様子を尻目に、ソフィアは淡々と自分の責務をこなしていた。"
translation = "그녀들의 모습을 곁눈질하며, 소피아는 담담하게 자신의 책무를 수행하고 있었다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「会長。頼まれていた資料、こちらに置いておきます」"
translation = "「회장님. 부탁하셨던 자료, 여기에 두고 가겠습니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ん。ありがとー」"
translation = "「응. 고마워ー」"

[[dialogue]]
speaker = "unk"
original = "表に起こされた決算資料を受け取ると、フィオナは軽く目を通してＯＫを出す。"
translation = "표로 정리된 결산 자료를 받자, 피오나는 가볍게 훑어보고 OK 사인을 낸다."

[[dialogue]]
speaker = "unk"
original = "一方で、テーブルを囲う面々は早々と６ゲーム目に突入していた。"
translation = "한편, 테이블을 둘러싼 멤버들은 벌써 6번째 게임에 돌입하고 있었다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「……いつも思いますけど、会長はよくこのやかましさで仕事していられますね」"
translation = "「……항상 생각하지만, 회장님은 어떻게 이 시끄러움 속에서 일을 하실 수 있으신가요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「慣れてるから」"
translation = "「익숙하니까요」"

[[dialogue]]
speaker = "unk"
original = "フィオナの笑顔に嫌味さは微塵もなかった。"
translation = "피오나의 미소에는 얄미움이 조금도 없었다."

[[dialogue]]
speaker = "unk"
original = "ただ、可愛くてやんちゃな子たちを見つめるような──慈愛に満ちた微笑みである。"
translation = "그저, 귀엽고 장난기 많은 아이들을 바라보는 듯한── 자애로 가득 찬 미소였다."

[[dialogue]]
speaker = "unk"
original = "そして彼女は、そんなソフィアの視線にもすぐ気づく。"
translation = "그리고 그녀는, 그런 소피아의 시선도 바로 알아챈다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「え……えっと、その」"
translation = "「에…… 그러니까, 그게」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「いっぱい働いてくれたし、遊んできていいよ。その代わりニャリオンこっち来て」"
translation = "「많이 일해 줬으니, 놀다 와도 괜찮아요. 그 대신 냐리온 이리 와요」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「ニャニャ！？\u3000し、しかしフィオナ嬢、これからワガハイの百倍リベンジマッチが始まろうと……」"
translation = "「냐냐!? 하, 하지만 피오나 아가씨, 이제부터 이 몸의 백 배 리벤지 매치가 시작되려고……」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「オメーはフィオナの使い魔じゃねえのかよ」"
translation = "「너는 피오나의 사역마가 아니냐」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「うぐ。ユウリごときに正論を吐かれるとは……しょうがないニャン」"
translation = "「크윽. 유우리 따위에게 정론을 듣다니…… 어쩔 수 없다냥」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「しょうがないの？」"
translation = "「어쩔 수 없는 건가요?」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「ニャニャ！？\u3000滅相もないニャん！」"
translation = "「냐냐!? 당치도 않다냥!」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「ワガハイはフィオナ嬢の忠実なるしもべ！\u3000皆の衆、星見家がフィオナ嬢を崇め奉るのだニャン！」"
translation = "「이 몸은 피오나 아가씨의 충실한 하인! 모두들, 호시미 가문의 피오나 아가씨를 숭배하는 거다냥!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「すごい変わり身の早さです！」"
translation = "「엄청나게 태세 전환이 빠릅니다!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふふ。じゃあ、よろしくね」"
translation = "「후후. 그럼, 잘 부탁해요」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「はいニャ！」"
translation = "「알았다냥!」"

[[dialogue]]
speaker = "unk"
original = "カードゲームに未練を残しつつ、ニャリオンもフィオナの補佐につく。"
translation = "카드 게임에 미련을 남기면서도, 냐리온도 피오나의 보좌를 맡는다."

[[dialogue]]
speaker = "unk"
original = "彼女たち星徒会のメンバーにとって、今の光景は慣れ親しんだものであった。"
translation = "그녀들 성도회 멤버들에게 있어, 지금의 광경은 익숙한 것이었다."

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ところでさー。みんな、お隣の星徒会長さんが代替わりしたのって知ってる？\u3000６」"
translation = "「그건 그렇고ー. 다들, 옆집 성도 회장님이 교체된 거 알고 있어? 6」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「お隣というと……新星学園のほうですか。初耳です、８」"
translation = "「옆집이라고 하시면…… 신성 학원 쪽 말씀이신가요. 처음 듣습니다, 8」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「新星が最近バタバタしてたのもそのせいらしいニャ。スキップ」"
translation = "「신성이 최근에 바쁘게 움직인 것도 그 때문인 것 같다냥. 스킵」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「仕事しながら参加してんじゃねーよアホ猫。つか、こんな学期の途中で会長交代なんかありえんのか？」"
translation = "「일하면서 참가하지 마라, 바보 고양이. 그나저나, 이런 학기 도중에 회장 교체 같은 게 가능한 거냐?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「新星の会長さんと言えば、確か九浄家の方でしたよね……？\u3000ドロー４です！」"
translation = "「신성 학원의 회장님이라고 하면, 분명 쿠죠 가문 분이셨죠……? 드로우 4인 것입니다!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「今度のは男の子らしいよ♪\u3000どんな子なんだろーね──４枚引くよ～」"
translation = "「이번에는 남자아이라고 해♪ 어떤 아이일까── 4장 뽑을게～」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「そういえば、先日アリーナを貸し切って新星が何か行っていたようですが……９」"
translation = "「그러고 보니, 요전에 아레나를 통째로 빌려서 신성 학원이 무언가를 진행했던 것 같습니다만…… 9」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「噂じゃ『御前試合』をやったと聞くニャン──ワイルドドロー７ニャ！\u3000ＵＭＯ！」"
translation = "「소문으로는 『어전 시합』을 했다고 듣는다냥── 와일드 드로우 7이다냥! UMO!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「御前試合！？\u3000マジかよ、あんなの大昔のしきたりじゃなかったのか──くそ、引かされた」"
translation = "「어전 시합!? 진짜냐, 그런 건 아주 옛날의 관습이 아니었나── 젠장, 뽑게 됐네」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「下剋上でありますか！\u3000どんな方か気になりますねっ……リバース＆リバース！」"
translation = "「하극상인 것입니까! 어떤 분인지 궁금하네요…… 리버스 & 리버스!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「（意味あんのか？\u3000そのカード……）」"
translation = "「（의미 있는 거냐? 그 카드……）」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「あはは。でもわざわざ御前試合を挑むくらいだから、骨のある男子なのかな～ドロー１０」"
translation = "「아하하. 그래도 굳이 어전 시합을 걸 정도라면, 배짱 있는 남자애인 걸까～ 드로우 10」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「かなりの強者である可能性があるニャン！\u3000ニャが、ワガハイは勝負でもこのＵＭＯでも負けないニャン！」"
translation = "「상당한 강자일 가능성이 있다냥! 냐가, 이 몸은 승부에서도 이 UMO에서도 지지 않는다냥!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「面白え。退学を懸けてとは言わねえけど、いつか手合わせ願いたいもんだ」"
translation = "「재밌군. 퇴학을 걸고 하자는 말은 안 하겠지만, 언젠가 한번 겨뤄보고 싶다」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「何にせよいずれご挨拶する機会もありそうですね。ドローサウザンド」"
translation = "「어쨌든 조만간 인사드릴 기회도 있을 것 같네요. 드로우 사우전드」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「そ、そのカード強すぎるニャン！？」"
translation = "「그, 그 카드 너무 강하다냥!?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「（くすくす……）」"
translation = "「（쿡쿡……）」"

[[dialogue]]
speaker = "unk"
original = "そこへ……"
translation = "그때……"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「失礼いたします」"
translation = "「실례하겠습니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「キリカ──？\u3000どうしたの、今日はお父様の式典があるんじゃ……」"
translation = "「키리카──? 무슨 일인가요, 오늘은 아버님의 식전이 있지 않나요……」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「そのつもりだったのですが、先ほど偶然にもアステライトの<b>さなぎ</b>を発見しました」"
translation = "「그럴 생각이었으나, 방금 우연히 아스테라이트의 <b>번데기</b>를 발견했습니다」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「今はまだ完全に実体化しておりませんが、お早めに出動したほうがよろしいかと」"
translation = "「지금은 아직 완전히 실체화되지 않았지만, 서둘러 출동하시는 편이 좋을 듯합니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「──わかったわ。伝えに来てくれてありがとう」"
translation = "「──알겠습니다. 전해주러 와줘서 고마워요」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「いえ。私はお供できませんが、ご武運を祈っております」"
translation = "「아닙니다. 저는 수행할 수 없지만, 무운을 빌겠습니다」"

[[dialogue]]
speaker = "unk"
original = "キリカからの報告を受け、フィオナは残るメンバーにも同じ話を伝えた。"
translation = "키리카로부터 보고를 받고, 피오나는 남아 있는 멤버들에게도 같은 이야기를 전했다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「みんなごめんね、ＵＭＯは中止。今すぐ繁華街へ出動するわ」"
translation = "「모두 미안해요, UMO는 중지. 지금 바로 번화가로 출동할 거예요」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「おう！\u3000遊んでばっかもいられねえもんな」"
translation = "「오우! 놀고만 있을 수도 없지」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あああ！\u3000せっかく勝てそうだったですのにー！\u3000しくしく……」"
translation = "「아아아! 모처럼 이길 수 있을 것 같았는데ー! 훌쩍훌쩍……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ルリは遊びすぎ」"
translation = "「루리엘은 너무 놀았어요」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「学園からの連絡前に気づいちゃうなんて流石だよね～キリカさん」"
translation = "「학원에서 연락 오기 전에 알아채다니 역시 대단하네～ 키리카 씨」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふふ──その代わり、帰ったらみんなで遊びましょう」"
translation = "「후후── 그 대신, 돌아오면 다 같이 놀아요」"

[[dialogue]]
speaker = "unk"
original = "そうして、彼女たちは報告された地点へと向かう──"
translation = "그렇게, 그녀들은 보고받은 지점으로 향한다──"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「到着──っと。アステラ発見～」"
translation = "「도착──. 아스테라 발견～」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「でけェな。このサイズのは最近じゃほとんど見なかったんじゃねえか」"
translation = "「엄청 크네. 이 사이즈는 최근에는 거의 못 본 것 같지 않냐」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「それだけリクリエの本波が近づいている証拠でしょうね」"
translation = "「그만큼 리크리에의 본파가 다가오고 있다는 증거겠죠」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「びびってるやつは置いてくニャン！\u3000ワガハイのニャスターソードがあればニャニャイのニャイなのニャン！」"
translation = "「쫄고 있는 녀석은 두고 가는 거다냥! 이 몸의 냐스타 소드가 있으면 냐냐이의 냐이인 거다냥!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「じゃ、ニャリオンちゃんよろしく～」"
translation = "「그럼, 냐리온짱 잘 부탁해～」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「ニャ、ワガハイオンリーはちょっと荷が重いニャンが……」"
translation = "「냐, 이 몸 온리는 조금 짐이 무겁다냥만……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はいはい、ふざけてないで行くよ」"
translation = "「네네, 장난치지 말고 가요」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「会長の足を引っ張らないよう頑張ります」"
translation = "「회장님의 발목을 잡지 않도록 노력하겠습니다」"

[[dialogue]]
speaker = "unk"
original = "セレスティアに込められた守護星の力が彼女らに宿る。"
translation = "셀레스티아에 담긴 수호성의 힘이 그녀들에게 깃든다."

[[dialogue]]
speaker = "unk"
original = "流星学園の頂点に立つ彼女たちの星力は、歴代の星徒会と比べても抜きん出ていた。"
translation = "유성 학원의 정점에 선 그녀들의 성력은, 역대 성도회와 비교해도 월등했다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ではでは──出陣なのですっ！」"
translation = "「그러면 그러면── 출진인 것입니다!」"

[[dialogue]]
speaker = "unk"
original = "<size=30>アステライト【イオ】</size>"
translation = "<size=30>아스테라이트【이오】</size>"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「だいぶ汚染されてんな……」"
translation = "「꽤 오염되었네……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「脅威度は高そうね。みんな、気を引き締めて」"
translation = "「위협도는 높아 보이네요. 모두, 정신을 바짝 차려요」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「お掃除開始～♪」"
translation = "「청소 시작～♪」"

