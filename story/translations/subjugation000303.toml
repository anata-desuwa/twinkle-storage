[[dialogue]]
speaker = "イクシリオン"
original = "「新星学園１年、保健委員のイクシリオン・グレゴールです。長い名前なのでイクシーとお呼びください。よろしくお願いします」"
translation = "「신성학원 1학년, 보건위원 익실리온 그레고르입니다. 긴 이름이니 익실이라고 불러주세요. 잘 부탁드립니다.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「よろしく、イクシーさん。紙屋敷さんとはお知り合い？」"
translation = "「반가워요, 익실 씨. 카미야시키 씨와는 아는 사이인가요?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「はい、私がよく図書館を利用するので、しばしば受付をしていただいています。ちなみに寮も同じです」"
translation = "「네, 제가 도서관을 자주 이용하다 보니 종종 접수를 해주시고 계십니다. 참고로 기숙사도 같습니다.」"

[[dialogue]]
speaker = "イクシリオン"
original = "「それで、図書館の利用者を増やしたいとお聞きしました。さすがモネさん、図書委員の鑑ですね」"
translation = "「그래서 도서관 이용자를 늘리고 싶다는 이야기를 들었습니다. 역시 모네 씨, 도서위원의 귀감이시군요.」"

[[dialogue]]
speaker = "モネ"
original = "「いえいえそんな、言い過ぎです」"
translation = "「아니에요, 과찬이세요.」"

[[dialogue]]
speaker = "モネ"
original = "「今は図書館に来る人と来ない人の違いを知りたくて、イクシーさんには図書館を利用する側の人のお話を聞きたいんです」"
translation = "「지금은 도서관에 오는 사람과 오지 않는 사람의 차이를 알고 싶어서, 익실 씨에게는 도서관을 이용하는 쪽의 이야기를 듣고 싶어요.」"

[[dialogue]]
speaker = "イクシリオン"
original = "「心得ました。私に答えられるものであれば、何でもお聞きください」"
translation = "「알겠습니다. 제가 답할 수 있는 것이라면 무엇이든 물어봐 주십시오.」"

[[dialogue]]
speaker = "モネ"
original = "「図書館に来られる人は本を読むか、勉強するかだと思うんですが、イクシーさんは読書されてることが多いですよね。どんな本を読まれていますか？」"
translation = "「도서관에 오시는 분들은 책을 읽거나 공부를 하러 온다고 생각하는데, 익실 씨는 독서를 하실 때가 많죠. 어떤 책을 읽으시나요?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「私はいろいろと……小説であったり、先ほどのような美術の本であったり、気分次第ではありますね。知らない言葉を辞書で引くこともあります」"
translation = "「저는 이것저것…… 소설이기도 하고, 방금 전과 같은 미술 서적이기도 하고, 기분에 따라 다르네요. 모르는 단어를 사전에서 찾기도 합니다.」"

[[dialogue]]
speaker = "モネ"
original = "「そういえばこの前は……」"
translation = "「그러고 보니 저번에는……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「正常な月経周期は２５日から３８日。変動は６日以内」"
translation = "「정상적인 월경 주기는 25일에서 38일. 변동은 6일 이내.」"

[[dialogue]]
speaker = "イクシリオン"
original = "「排卵日やその前後には排卵痛が起こることがある。病気ではないが、痛みが強い場合は受診が進められる」"
translation = "「배란일이나 그 전후에는 배란통이 일어날 수 있다. 질병은 아니나 통증이 심한 경우에는 진료를 권장한다.」"

[[dialogue]]
speaker = "イクシリオン"
original = "「卵子の寿命は排卵後約２４時間と言われ、受精には──」"
translation = "「난자의 수명은 배란 후 약 24시간이라 하며, 수정에는──」"

[[dialogue]]
speaker = "モネ"
original = "「って、熱心に性教育の本を読んでいて、さすが保健委員だと思いました」"
translation = "「라며 열심히 성교육 책을 읽고 계셔서 역시 보건위원이라고 생각했어요.」"

[[dialogue]]
speaker = "イクシリオン"
original = "「ふぇっ！？\u3000見てたんですか！？」"
translation = "「후에!? 보고 계셨나요!?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「そうね。また魔界の話になっちゃうけど、魔界は性教育が十分でないところも多いから、保健委員が女の子の体について詳しいのはいいことだと思うわ」"
translation = "「그렇네. 다시 마계 이야기가 되지만, 마계는 성교육이 충분하지 않은 곳도 많아서 보건위원이 여자아이의 몸에 대해 잘 아는 건 좋은 일이라고 생각해.」"

[[dialogue]]
speaker = "イクシリオン"
original = "「え、ええ……保健委員として復習しておくべきだと思いましたので」"
translation = "「네, 네에…… 보건위원으로서 복습해둬야 한다고 생각했기에.」"

[[dialogue]]
speaker = "モネ"
original = "「最近読んでよかったと思う本はありますか？」"
translation = "「최근 읽고 좋았다고 생각한 책이 있나요?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「人体の本ですね。あんなところやこんなところまで細かに描かれていて、つい食い入るように見てしまいました」"
translation = "「인체에 관한 책이네요. 그런 곳이나 이런 곳까지 세밀하게 묘사되어 있어서 그만 넋을 잃고 보고 말았습니다.」"

[[dialogue]]
speaker = "イクシリオン"
original = "「それと民話の本も。人と妖怪が結ばれて子を成すという内容で、とても興味深かったです」"
translation = "「그리고 민화 책도요. 사람과 요괴가 맺어져 아이를 낳는다는 내용인데 무척 흥미로웠습니다.」"

[[dialogue]]
speaker = "モネ"
original = "「やはりイクシーさんは多方面に好奇心旺盛なんですね」"
translation = "「역시 익실 씨는 다방면으로 호기심이 왕성하시네요.」"

[[dialogue]]
speaker = "モネ"
original = "「そういえば、イクシーさんは天界出身の天使でしたよね。魔界の図書館事情はウィステリアさんから聞きましたけど、天界の図書館はどうなんでしょう？」"
translation = "「그러고 보니 익실 씨는 천계 출신 천사였죠. 마계의 도서관 사정은 위스테리아 씨에게 들었습니다만 천계의 도서관은 어떤가요?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「天界はウルという都市に大きな図書館があるのですが、集められているのは学術的な本が中心だそうです」"
translation = "「천계는 우르라는 도시에 큰 도서관이 있습니다만, 수집되는 것은 학술적인 서적이 중심이라고 합니다.」"

[[dialogue]]
speaker = "イクシリオン"
original = "「それ以外は土地によってまちまちで、蔵書が充実していないところもあれば、図書館自体がないこともあります。天界は人口が少ないので規模が小さくなりがちなのです」"
translation = "「그 외에는 지역에 따라 제각각이라 장서가 충실하지 않은 곳도 있고 도서관 자체가 없는 경우도 있습니다. 천계는 인구가 적어 규모가 작아지기 쉽거든요.」"

[[dialogue]]
speaker = "イクシリオン"
original = "「三界で一番発展しているのは人間界ですから、文芸や趣味の本など、本の種類も含めて人間界の図書館が一番充実していると思います」"
translation = "「삼계에서 가장 발전한 곳은 인간계니까, 문예나 취미 서적 등 책의 종류를 포함해 인간계의 도서관이 가장 충실하다고 생각합니다.」"

[[dialogue]]
speaker = "モネ"
original = "「なるほど。確かに天界は真面目そうなイメージがあります」"
translation = "「과연. 확실히 천계는 성실할 것 같은 이미지가 있어요.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「そういう意味じゃ、紙屋敷さんは人間界に生まれて良かったわね」"
translation = "「그런 의미에선 카미야시키 씨는 인간계에서 태어나길 잘했네.」"

[[dialogue]]
speaker = "モネ"
original = "「はい！\u3000いろんな本が読めなかったら、私死んでしまいますよ」"
translation = "「네! 여러 책을 읽지 못했다면 전 죽어버렸을 거예요.」"

[[dialogue]]
speaker = "モネ"
original = "「でも天界の難しい本も読んでみたいなぁ……」"
translation = "「그래도 천계의 어려운 책도 읽어보고 싶다아……」"

[[dialogue]]
speaker = "モネ"
original = "「あ、もうひとつ質問です。イクシーさんは図書館の魅力は何だと思いますか？」"
translation = "「아, 질문 하나 더요. 익실 씨는 도서관의 매력이 무엇이라고 생각하시나요?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「たくさんの本があること、そしてその本を気軽に手に取ることができることでしょうか」"
translation = "「많은 책이 있다는 것, 그리고 그 책을 가볍게 집어 들 수 있다는 점 아닐까요.」"

[[dialogue]]
speaker = "イクシリオン"
original = "「資金や保管場所の問題もあって、これほど多くの本はいち個人には所有できません」"
translation = "「자금이나 보관 장소 문제도 있어서 이 정도로 많은 책을 개인은 소유할 수 없습니다.」"

[[dialogue]]
speaker = "イクシリオン"
original = "「しかし図書館があれば、お金がなくても、家に書架がなくても、誰でも本に触れることができます。それはとても素晴らしいことだと思います」"
translation = "「하지만 도서관이 있다면 돈이 없어도, 집에 서가가 없어도 누구든 책을 접할 수 있습니다. 그것은 무척 멋진 일이라고 생각합니다.」"

[[dialogue]]
speaker = "モネ"
original = "「ありがとうございます。イクシーさんのご意見、これからの取り組みに活用させていただきます」"
translation = "「감사합니다. 익실 씨의 의견, 앞으로의 활동에 활용하겠습니다.」"

[[dialogue]]
speaker = "イクシリオン"
original = "「いえいえ、お役に立てたのなら何よりです」"
translation = "「아니요, 도움이 되었다면 다행입니다.」"

[[dialogue]]
speaker = "イクシリオン"
original = "「ちなみに、今までは図書館ではどんな取り組みをされていたんですか？」"
translation = "「참고로 지금까지 도서관에서는 어떤 노력을 해오셨나요?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「そうね、季節行事を特集したり……例えばクリスマスになると、クリスマスの成り立ちを解説した本や、各国のクリスマスの風習を記した本を紹介してるわ」"
translation = "「글쎄, 계절 행사를 특집으로 다루거나…… 예를 들어 크리스마스가 되면 크리스마스의 유래를 해설한 책이나 각국의 크리스마스 풍습을 적은 책을 소개하고 있어.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「あとはクリスマスの恋愛小説だったり……くっ」"
translation = "「아니면 크리스마스 연애 소설이라든가…… 윽.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「クリスマスに大事な人と過ごすとか、経験ないから……うぅ、自分で言ってて虚しくなってきた……」"
translation = "「크리스마스에 소중한 사람과 보낸다니 경험이 없어서…… 으으, 직접 말하면서 비참해졌어…….」"

[[dialogue]]
speaker = "イクシリオン"
original = "「クリスマスといえば、愛する人と過ごす日……つまり……ムフフフ」"
translation = "「크리스마스라고 하면 사랑하는 사람과 보내는 날…… 즉…… 무후후후.」"

[[dialogue]]
speaker = "モネ"
original = "「あのー……ウィステリアさん？\u3000イクシーさん？\u3000お返事してくださーい」"
translation = "「저기―…… 위스테리아 씨? 익실 씨? 대답해 주세요―」"

