[[dialogue]]
speaker = "unk"
original = "あれは数ヶ月前のこと。九浄家の経営するカジノに、新種のトランプモンスターが出現するという事件が発生した。"
translation = "그것은 수개월 전의 일. 쿠죠 가문에서 경영하는 카지노에 신종 트럼프 몬스터가 출현한다는 사건이 발생했다."

[[dialogue]]
speaker = "unk"
original = "その時は、流星星徒会のユウリとセーラ先輩、そして俺の同窓生でもあるユーリスと共に、カジノの警備と調査を行った。"
translation = "그때는 유성성도회의 유우리와 세라 선배, 그리고 내 동창이기도 한 유리스와 함께 카지노의 경비와 조사를 수행했다."

[[dialogue]]
speaker = "unk"
original = "ユーリスが『実は男装をしている女生徒である』ことがユウリたちにバレてしまうトラブルもあったが、無事にトランプモンスターたちは撃破できた。"
translation = "유리스가 『사실은 남장을 하고 있는 여학생이다』라는 사실을 유우리 일행에게 들키는 트러블도 있었지만, 무사히 트럼프 몬스터들을 격파할 수 있었다."

[[dialogue]]
speaker = "unk"
original = "しかし謎は謎のまま──新種のトランプモンスターたちがどこから現れたのかまでは明らかにできなかった。"
translation = "하지만 수수께끼는 수수께끼인 채로── 신종 트럼프 몬스터들이 어디서 나타났는지까지는 밝혀낼 수 없었다."

[[dialogue]]
speaker = "unk"
original = "しかし今、再び九浄家のカジノで事件が発生した。そのため俺は調査の為に呼ばれたのだった──"
translation = "그러나 지금, 다시 쿠죠 가문의 카지노에서 사건이 발생했다. 그 때문에 나는 조사를 위해 불려 온 것이었다──"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「やぁ会長、待っていたよ。ヘレナさんから事件の内容は聞いてるかな？」"
translation = "「여어 회장, 기다리고 있었어. 헬레나 씨에게 사건 내용은 들었겠지?」"

[[dialogue]]
speaker = "unk"
original = "このカジノで神隠しが起きているって……"
translation = "이 카지노에서 행방불명이 일어나고 있다고……"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「そうなんだ。具体的な目撃証言は無し。でも行方不明者は皆、このカジノを訪れてからの足跡が辿れないらしくて」"
translation = "「그래. 구체적인 목격 증언은 없어. 하지만 행방불명자들은 모두 이 카지노를 방문한 이후의 발자취를 따라갈 수 없다는 모양이야.」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「原因はこのカジノ……もっと言えば、前回の騒動のトランプモンスター達が絡んでいる。ヘレナさんはそう睨んでいるんだろうね」"
translation = "「원인은 이 카지노…… 더 정확히 말하자면 지난번 소동의 트럼프 몬스터들과 관련이 있어. 헬레나 씨는 그렇게 짐작하고 있는 거겠지.」"

[[dialogue]]
speaker = "unk"
original = "今回は隠密調査をするって聞いてる"
translation = "이번에는 은밀 조사를 한다고 들었어"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「うん。学園が秘密裏に抱えている部隊……公安委員会を動かすからね。存在を聞いた時は驚いたよ」"
translation = "「응. 학원이 비밀리에 보유하고 있는 부대…… 공안위원회를 움직일 테니까. 존재를 들었을 때는 놀랐어.」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「あ……噂をすればだ。会長、頼もしい助っ人の登場だよ？」"
translation = "「아…… 호랑이도 제 말 하면 온다더니. 회장, 든든한 조력자의 등장이네?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「やっほ～、会長に王子様♪\u3000今日はよろしく～」"
translation = "「얏호~, 회장에 왕자님♪ 오늘은 잘 부탁해~」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「何やら報酬を弾んでいただけるそうで……期待していますわよ？」"
translation = "「무언가 보수를 두둑이 챙겨주신다고 해서…… 기대하고 있겠어요?」"

[[dialogue]]
speaker = "unk"
original = "彼女は対星力犯罪専門の隠密部隊である『公安委員会』に所属する、<ruby>立朽<rt>たちくち</rt></ruby>ネーゼマイン。イタズラ好きだが頭のキレる後輩だ。"
translation = "그녀는 대성력 범죄 전문 은밀 부대인 『공안위원회』에 소속된, 타치쿠치 네제마인. 장난을 좋아하지만 머리 회전이 빠른 후배다."

[[dialogue]]
speaker = "unk"
original = "そして秘密結社『ゴールデングース』の社長、バンデット・セナリィ。傭兵としての経験も豊富で、荒事に関して彼女の右に出る者はいないだろう。"
translation = "그리고 비밀 결사 『골든 구스』의 사장, 밴디트 세나리. 용병으로서의 경험도 풍부하며, 험한 일에 관해서 그녀의 오른쪽으로 나설 자는 없을 것이다."

[[dialogue]]
speaker = "unk"
original = "ここに聖剣の担い手であるユーリスと星徒会長の俺が加わり、神隠し事件の調査に当たることになる──"
translation = "여기에 성검의 소유자인 유리스와 성도회장인 내가 합세하여 행방불명 사건의 조사에 임하게 된다──"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「お集まりいただきありがとうございます。早速、どのように調査をするか、話し合っていきましょうか」"
translation = "「모여 주셔서 감사합니다. 곧장 어떻게 조사할지 논의해 볼까요.」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「オッケー。でもその前に……にひ♪\u3000カジノ内をうろついても違和感がないようにドレスコードを守らないとだよね？」"
translation = "「오케이. 하지만 그전에…… 니히♪ 카지노 내부를 돌아다녀도 위화감이 없도록 드레스 코드를 지켜야겠지?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「王子様の聖剣スキルを使えば、あっという間に早着替えができちゃうって聞いてるけど本当なの？」"
translation = "「왕자님의 성검 스킬을 사용하면 순식간에 옷 갈아입히기를 할 수 있다고 들었는데 정말이야?」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「ええ、もちろん調査のための衣装は提供いたします。早速、別室にてスキルを使用いたしましょうか」"
translation = "「네, 물론 조사를 위한 의상은 제공해 드립니다. 곧장 별실에서 스킬을 사용해 볼까요.」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「衣装を無料でレンタル。いい響きですわ！」"
translation = "「의상을 무료로 렌털. 좋은 울림이예요!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「楽しみだな～。王子様ってバニーが大好きなんでしょ？\u3000どんなこだわりのある衣装を着せられちゃうのかな～♪」"
translation = "「기대되는걸~. 왕자님은 바니를 정말 좋아하지? 어떤 취향이 담긴 의상을 입게 될까나~♪」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「私、バニーにこだわりなんてありませんよ！？」"
translation = "「저, 바니에 취향 같은 거 없거든요!?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「そうなの？\u3000真面目なユウリ先輩にあんなエッチ衣装を着せてたから、てっきり……」"
translation = "「그래? 성실한 유우리 선배에게 그런 야한 의상을 입혔길래, 당연히……」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「ひ、ひどい誤解です！」"
translation = "「지, 지독한 오해입니다!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「私のバニー衣装は、それはもうゴージャスなやつでお願いいたしますわね！」"
translation = "「제 바니 의상은 아주 고저스한 녀석으로 부탁드리겠어요!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「流石はゴールデングースの総帥と言われるようなデザイン……そうです、色や装飾の指定はできまして？」"
translation = "「과연 골든 구스의 총수라 불릴 만한 디자인…… 그래요, 색상이나 장식 지정도 가능하나요?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「私はとびっきり可愛いやつでお願いね！\u3000あ、でもちょっとくらいエッチなやつも歓迎だよ。会長を悩殺しちゃうのも面白そうだし～♪」"
translation = "「나는 엄청 귀여운 걸로 부탁해! 아, 하지만 조금 정도는 야한 것도 환영이야. 회장을 뇌쇄 시켜버리는 것도 재밌을 것 같고~♪」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「わ、私の聖剣スキルはそこまで自由度の高いものでは……！」"
translation = "「제, 제 성검 스킬은 그렇게까지 자유도가 높은 게……!」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「──っと。ああ、すみません。あちらにいらっしゃる九浄家の方が、何やら呼んでいるようですっ」"
translation = "「──앗. 아아, 죄송합니다. 저쪽에 계신 쿠죠 가문의 분이 무언가 부르시는 모양이에요.」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「ちょっと話を聞いてくるから。か、会長はちゃんと誤解を解いておいてね……！？」"
translation = "「잠깐 얘기를 듣고 올 테니까. 회, 회장은 오해를 잘 풀어둬야 해……!?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「にひ♪\u3000王子様ったら慌てちゃって可愛いな～♪」"
translation = "「니히♪ 왕자님도 참 당황해가지고는 귀엽네~♪」"

[[dialogue]]
speaker = "unk"
original = "もう少し緊張感を持った方がいいんじゃ？"
translation = "좀 더 긴장감을 가지는 게 좋지 않아?"

[[dialogue]]
speaker = "unk"
original = "たくさんの人が神隠しに遭ってるらしい"
translation = "많은 사람이 행방불명 당하고 있는 모양이야"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「あんまりシリアスになりすぎるのもよくないですわよ？\u3000ここはカジノ……陽気な態度でこそ目立たず任務を遂行できるというものですわ」"
translation = "「너무 시리어스해지는 것도 좋지 않아요? 여기는 카지노…… 쾌활한 태도야말로 눈에 띄지 않고 임무를 수행할 수 있는 법이예요.」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「そーそー。それにしてもカジノの雰囲気、いつもと変わらないね。お客が消えてることはあまり広まっていない感じなのかな？」"
translation = "「그렇지. 그건 그렇고 카지노 분위기, 평소랑 다를 게 없네. 손님이 사라진 게 별로 소문나지 않은 느낌인 걸까?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「スタッフもお客もみんな賭けを楽しんで……って、あれ？\u3000珍しい人がいる」"
translation = "「스태프도 손님도 모두 도박을 즐기고…… 어라? 희귀한 사람이 있네.」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「──あら？\u3000緋宮会長。奇遇ですわね」"
translation = "「──어머? 히노미야 회장. 기구한 인연이네요.」"

[[dialogue]]
speaker = "unk"
original = "千園寺先輩……！？"
translation = "치온지 선배……!?"

[[dialogue]]
speaker = "unk"
original = "流星市国の五名家の一柱『<ruby>千園寺<rt>せんおんじ</rt></ruby>家』の令嬢──千園寺ヒルディオーネ先輩だ。"
translation = "유성시국 오명문의 한 축인 『치온지 가문』의 영애── 센온지 힐디오네 선배다."

[[dialogue]]
speaker = "unk"
original = "流星学園の寮長を担っており、その卓越した戦闘能力と実績から『<ruby>白昼の極星<rt>エトワール・イルソーレ</rt></ruby>』の二つ名で多くの後輩から慕われる生粋のお嬢様である。"
translation = "유성 학원의 사감을 맡고 있으며, 그 탁월한 전투 능력과 실적 덕분에 『백주의 극성』이라는 이명으로 많은 후배의 존경을 받는 뼛속까지 아가씨인 분이다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「まさかのレアキャラだね。こんにちは～♪」"
translation = "「설마 했던 레어 캐릭터네. 안녕~♪」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「今日はこんな所でどうしたんですの？\u3000貴女ほどのお嬢様であれば、賭け事とは無縁でしょうに」"
translation = "「오늘은 이런 곳에 어쩐 일이신가요? 당신 정도의 아가씨라면 도박과는 인연이 없을 텐데 말이에요.」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「おーっほっほっほ！\u3000何も賭け事をするだけが、カジノを訪れる理由ではありませんわ」"
translation = "「오~홋홋홋! 도박을 하는 것만이 카지노를 방문하는 이유는 아니랍니다.」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「家業の千園寺ギャラクティックでお世話になっている方々が、本日こちらにいらっしゃるのです。私は千園寺の者として、ご挨拶に来たのですわ！」"
translation = "「가업인 치온지 갤럭틱에서 신세를 지고 있는 분들이 오늘 이곳에 오시거든요. 저는 치온지의 일원으로서 인사를 드리러 온 것이랍니다!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「相変わらず声の大きいご令嬢ですわね……」"
translation = "「여전한 목소리 큰 영애님이예요……」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ところで緋宮会長たちこそ、どうしてこんな所に？」"
translation = "「그런데 히노미야 회장 일행이야말로 어째서 이런 곳에?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「学生の本分は勉学と鍛錬ですわよ。賭け事に興じるのはあまり感心いたしませんわね」"
translation = "「학생의 본분은 면학과 단련이랍니다. 도박에 흥미를 느끼는 건 그리 권장할 일이 아니네요.」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ちょっとしたアルバイトに来てるんだ～。このあと会長命令でー、ちょっぴりエッチなバニー服を着せられちゃう予定～♪」"
translation = "「조금 아르바이트하러 왔어~. 이다음에 회장 명령으로~ 조금 야한 바니복을 입게 될 예정~♪」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ですわっ！？\u3000い、いけませんわ、緋宮会長！\u3000権力を笠にそんなハレンチを命じるなど……！」"
translation = "「랍니다왓!? 아, 안 돼요, 히노미야 회장! 권력을 빌미로 그런 파렴치한 명령을 내리다니……!」"

[[dialogue]]
speaker = "unk"
original = "先輩、マインの軽口を信じないで！？"
translation = "선배, 마인의 농담을 믿지 마세요!?"

[[dialogue]]
speaker = "？？？"
original = "「ちょっぴりエッチなバニー服。良い響きですねぇ……着替えが必要ならばそのお役目。ぜひ私めにお任せいただけませんか？」"
translation = "「조금 야한 바니복. 좋은 울림이군요…… 갈아입을 사람이 필요하다면 그 역할. 부디 이 몸에게 맡겨주시지 않겠습니까?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「……？\u3000何ですの、今のニチャァっとした感じの声は」"
translation = "「……? 뭐예요, 방금 그 음흉한 목소리는.」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「……何だか不気味な響きだったね」"
translation = "「……어쩐지 기분 나쁜 소리였네.」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「はっ……！？\u3000皆様、あちらを──！」"
translation = "「핫……!? 여러분, 저쪽을──!」"

[[dialogue]]
speaker = "？？？"
original = "「嗚呼──素晴らしい。新星の星徒会長さえ呼べればと思っていたのですが……まさかこんなにも可憐な女性たちにまで出会えるとは！」"
translation = "「아아── 훌륭해. 신성의 성도회장만 부를 수 있다면 좋겠다고 생각했습니다만…… 설마 이렇게나 가련한 여성들을 만날 수 있을 줄이야!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「な、何者ですの、貴方──！？」"
translation = "「누, 누구신가요, 당신──!?」"

[[dialogue]]
speaker = "？？？"
original = "「今日の私はなんてツイているのでしょう！\u3000これも『欲望』の賜物……そうに違いありません！」"
translation = "「오늘의 저는 어쩜 이리 운이 좋을까요! 이것도 『욕망』의 결실…… 분명 그럴 겁니다!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「──くぅ！？」"
translation = "「──크윽!?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「なに、この力っ──振りほどけない……！？」"
translation = "「뭐야, 이 힘── 떨쳐낼 수 없어……!?」"

[[dialogue]]
speaker = "？？？"
original = "「星騎士の皆様──あなた方を特別にご招待いたしましょう」"
translation = "「성기사 여러분── 당신들을 특별히 초대해 드리지요.」"

[[dialogue]]
speaker = "？？？"
original = "「めくるめく『欲望』渦巻く──私のアステラカジノへ！！」"
translation = "「황홀한 『욕망』이 소용돌이치는── 나의 아스텔라 카지노로!!」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「お待たせしました。打ち合わせの続きを──あれ？」"
translation = "「기다리셨습니다. 회의를 이어서── 어라?」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「会長……皆さん……？\u3000いったいどこに……？」"
translation = "「회장…… 여러분……? 도대체 어디로……?」"

