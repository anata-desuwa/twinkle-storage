[[dialogue]]
speaker = "unk"
original = "第３話,フィーニスの塔・攻略,B"
translation = "제3화, 피니스의 탑 공략"

[[dialogue]]
speaker = "チナ"
original = "「フィーニスの塔……中はこんな風になってるんだな」"
translation = "「피니스의 탑…… 안은 이렇게 생겼구나.」"

[[dialogue]]
speaker = "グレイス"
original = "「時間はあまりなさそうですね！\u3000ルヴィがいる最上階まで一気に行きましょう！」"
translation = "「시간이 별로 없을 것 같네요! 루비가 있는 최상층까지 단숨에 가요!」"

[[dialogue]]
speaker = "レティシア"
original = "「そうね──と言いたいけれど……」"
translation = "「그러네── 라고 말하고 싶지만……」"

[[dialogue]]
speaker = "スレイプニル"
original = "「ヒュゥーンッ──！！」"
translation = "「휴웅──!!」"

[[dialogue]]
speaker = "アナ"
original = "「極星従騎……！\u3000すごい数です！！」"
translation = "「극성종기……! 엄청난 수예요!!」"

[[dialogue]]
speaker = "クロト"
original = "「総員、各個撃破だ。駆け上がるぞ──」"
translation = "「전원, 각개격파다. 달려 올라간다──」"

[[dialogue]]
speaker = "レティシア"
original = "「少し下がってなさい、魔王」"
translation = "「조금 물러나 있어, 마왕.」"

[[dialogue]]
speaker = "unk"
original = "レティシアが俺の前に出て、極星従騎と向かい合う。"
translation = "레티시아가 내 앞으로 나서며 극성종기와 마주한다."

[[dialogue]]
speaker = "スレイプニル"
original = "「ブッ……ブルルルッ！？」"
translation = "「부…… 부르르르!?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「あっ、やっぱり私たちに対しては……」"
translation = "「앗, 역시 우리에 대해서는……」"

[[dialogue]]
speaker = "レティシア"
original = "「ええ。ルヴィが攻撃しないように命令を出しているわね」"
translation = "「응. 루비가 공격하지 말라고 명령을 내렸나 보네.」"

[[dialogue]]
speaker = "グレイス"
original = "「ルヴィ……。あなたは味方なんですか、敵なんですか……？」"
translation = "「루비……. 당신은 아군인가요, 적군인가요……?」"

[[dialogue]]
speaker = "チナ"
original = "「今ここで考えても埒が明かない！\u3000極星従騎の動きが鈍いなら、突破も容易だ！！」"
translation = "「지금 여기서 생각해 봤자 결론은 안 나! 극성종기의 움직임이 둔하다면 돌파도 쉬워!!」"

[[dialogue]]
speaker = "レティシア"
original = "「魔王、ここは極星が仕切らせてもらうわ」"
translation = "「마왕, 여기는 극성이 맡을게.」"

[[dialogue]]
speaker = "レティシア"
original = "「──ヴァイオレット・ドロー」"
translation = "「──바이올렛 드로우」"

[[dialogue]]
speaker = "スレイプニル"
original = "「ブルルッ──！？」"
translation = "「부르르──!?」"

[[dialogue]]
speaker = "マトイ"
original = "「す、すごいっ。ひと薙ぎであの極星従騎が……！」"
translation = "「수, 굉장해. 단 한 번 휘두른 걸로 저 극성종기가……!」"

[[dialogue]]
speaker = "unk"
original = "レティシアの神速の居合切りによって極星従騎が断ち切られ、さらに星力で編まれた紫炎が亡骸すらも焼き尽くしていく。"
translation = "레티시아의 신속한 발도술에 의해 극성종기가 베이고, 이어서 성력으로 엮인 자색 불꽃이 유해마저 태워 버린다."

[[dialogue]]
speaker = "サーシャ"
original = "「やっぱり私との模擬戦闘では手加減してたのね？\u3000速さが段違いだわ～♪」"
translation = "「역시 나랑 했던 모의 전투에서는 봐주고 있었던 거네~? 속도가 차원이 달라~♪」"

[[dialogue]]
speaker = "レティシア"
original = "「模擬戦は模擬戦──殺し合いではないもの」"
translation = "「모의전은 모의전일 뿐── 살육전은 아니니까.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「流石だね、レティシアちゃん！」"
translation = "「대단해, 레티시아짱!」"

[[dialogue]]
speaker = "レティシア"
original = "「お喋りは後よベアト。この子たち、新星学園生には構わず攻撃を仕掛けてきてる」"
translation = "「잡담은 나중에 해, 베아토. 이 녀석들, 신성학원생들에게는 아랑곳하지 않고 공격을 걸어오고 있어.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「うんっ……！\u3000私たちが壁になって、どんどん登っていこう！」"
translation = "「응……! 우리가 벽이 되어서 계속 올라가자!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あっ、ちょっと待って！」"
translation = "「앗, 잠깐 기다려 봐!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「うん？\u3000どうかしたの、ヴィーナスちゃん？」"
translation = "「응? 왜 그래, 비너스짱?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「フィーニスの塔ってすっごく高いのよ！\u3000緊急事態はこれ一択なんだから！」"
translation = "「피니스의 탑은 엄청나게 높다고! 긴급 사태에는 이거 하나뿐이야!」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスはそう言うや否や、フィーニスの塔の天井に向かって高出力の星術をぶっ放した。"
translation = "비너스는 그렇게 말하자마자 피니스의 탑 천장을 향해 고출력 성술을 발사했다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「シャイニング・ゴッデスビームッ！！」"
translation = "「샤이닝 가디스 빔!!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "チナ"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "レティシア"
original = "「あら、なかなか便利そうね」"
translation = "「어머, 꽤 편리해 보이네.」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは以前の俺がやったように、フィーニスの塔の天井をぶち抜いて、頂上に向かってそのまま飛翔できるルートを作り上げた。"
translation = "비너스는 이전에 내가 했던 것처럼 피니스의 탑 천장을 뚫어 버리고 정상으로 곧장 비상할 수 있는 경로를 만들어 냈다."

[[dialogue]]
speaker = "アナ"
original = "「移動効率は格段にアップしましたが、その分敵である極星従騎も一直線でこちらに向かってきています」"
translation = "「이동 효율은 비약적으로 상승했습니다만, 그만큼 적인 극성종기도 일직선으로 이쪽을 향해 오고 있습니다.」"

[[dialogue]]
speaker = "クロト"
original = "「よし。極星従騎は全部倒すんじゃなくて、最低限相手にしながら、とにかく先に進むぞ！」"
translation = "「좋아. 극성종기를 전부 쓰러뜨리는 게 아니라, 최소한으로 상대하면서 어쨌든 앞으로 나아간다!」"

[[dialogue]]
speaker = "チナ"
original = "「アレに対してツッコミやリアクションの１つもないのは、お前らスゲーな……」"
translation = "「저런 짓을 보고 츳코미나 리액션 하나 없다니, 너희들 정말 대단하네……」"

[[dialogue]]
speaker = "unk"
original = "その後も襲い来る極星従騎を、ベアトリスたちにフロントを務めてもらうことで撃破し──一つ、また一つと階層を踏破していった。"
translation = "그 후로도 습격해 오는 극성종기를 베아트리스 일행이 전위를 맡아 격파하며── 한 층, 또 한 층 계층을 돌파해 나갔다."

[[dialogue]]
speaker = "unk"
original = "しかし頂上まであと一息というところで……"
translation = "그러나 정상까지 한 걸음 남은 곳에서……"

[[dialogue]]
speaker = "ジグ"
original = "「……やり直そう、世界を」"
translation = "「……다시 시작하자, 세계를.」"

[[dialogue]]
speaker = "アポロ"
original = "「……全部、なくなってしまえばいいんだ」"
translation = "「……전부 없어져 버리면 되는 거야.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あ～もうっ！\u3000ここを超えれば、頂上まであと少しなのにっ……！」"
translation = "「아~ 정말! 여기만 넘으면 정상까지 금방인데……!」"

[[dialogue]]
speaker = "unk"
original = "トワ先生が言うには、本来の６割程度の戦闘力らしいが──『未来視』や『天蓋』まで行使するシャドウたちに出し惜しみはできない！"
translation = "토와 선생님의 말로는 본래의 60% 정도 전투력이라지만── 『미래시』나 『천개』까지 행사하는 섀도들에게 전력을 다하지 않을 수 없다!"

[[dialogue]]
speaker = "クロト"
original = "「極星学園のみんな！\u3000俺たち新星星徒会が時間を稼ぐ！\u3000一足先にルヴィネのいるところに向かってくれ！」"
translation = "「극성학원 모두들! 우리 신성성도회가 시간을 벌겠다! 한발 먼저 루비네가 있는 곳으로 가 줘!」"

[[dialogue]]
speaker = "グレイス"
original = "「そんなっ！？\u3000いくら本物には及ばないと言っても、相手は使徒ですよ！？」"
translation = "「그럴 수가!? 아무리 진짜에 미치지 못한다고 해도 상대는 사도라고요!?」"

[[dialogue]]
speaker = "クロト"
original = "「時間がない！\u3000今ここにシャドウの使徒が現れたということは……！」"
translation = "「시간이 없어! 지금 여기에 섀도 사도가 나타났다는 건……!」"

[[dialogue]]
speaker = "アナ"
original = "「地上も、煌嶺さんが相手をしている個体だけではなさそうですね」"
translation = "「지상도 코레이 씨가 상대하고 있는 개체뿐만이 아닌 모양이군요.」"

[[dialogue]]
speaker = "サーシャ"
original = "「少しでも早く、ルヴィネちゃんとコンタクトを取る必要があるわね～。ここは私たちに任せて」"
translation = "「조금이라도 빨리 루비네짱과 접촉할 필요가 있겠네~. 여기는 우리에게 맡겨 줘.」"

[[dialogue]]
speaker = "レティシア"
original = "「……本当にいいの？\u3000私たち、逆にルヴィに説得されちゃうかもしれないのに」"
translation = "「……정말 괜찮겠어? 우리, 반대로 루비에게 설득당해 버릴지도 모르는데.」"

[[dialogue]]
speaker = "クロト"
original = "「ルヴィネが死なない未来を掴み取る。俺たちはその点で、同じ意志を持っている。何も問題はない！」"
translation = "「루비네가 죽지 않는 미래를 쟁취한다. 우리는 그 점에 있어서 같은 의지를 가지고 있어. 아무 문제 없다!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「──はい！\u3000みんな、ここは会長さんたちの言う通りに！」"
translation = "「──네! 모두들, 여기는 회장님들 말씀대로 해요!」"

[[dialogue]]
speaker = "クロト"
original = "「新星星徒会──ノヴァフォームの使用を許可する！」"
translation = "「신성성도회── 노바 폼 사용을 허가한다!」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
original = "「よーっし！\u3000行くわよみんな！！」"
translation = "「조아쓰! 가자, 얘들아!!」"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「うんっ、任せて！」"
translation = "「응, 맡겨 줘!」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「一度は戦った相手だもの。みんなと一緒なら、何も問題はないわね♪」"
translation = "「한 번은 싸웠던 상대인걸요. 모두와 함께라면 아무 문제 없어요~♪」"

[[dialogue]]
speaker = "アナ（覚醒）"
original = "「私たちが道を切り開きます──極星学園のみなさん、タイミングを合わせてください！」"
translation = "「저희가 길을 열겠습니다── 극성학원 여러분, 타이밍을 맞춰 주세요!」"

[[dialogue]]
speaker = "チナ"
original = "「……恩に着る！\u3000行くぞ！」"
translation = "「……신세 좀 질게! 가자!」"

[[dialogue]]
speaker = "クロト"
original = "「ディマイズ──ブレイカーッ！！」"
translation = "「디마이즈 브레이커!!」"

[[dialogue]]
speaker = "unk"
original = "使徒に強烈な一撃を叩きこむ──その隙に、ベアトリスたちが奥へ向かうのを確認した。"
translation = "사도에게 강렬한 일격을 때려박는다── 그 틈에 베아트리스 일행이 안쪽으로 향하는 것을 확인했다."

[[dialogue]]
speaker = "クロト"
original = "「星力出力を振り切れるまで上げろ！\u3000短期決戦だ！！」"
translation = "「성력 출력을 한계까지 올려라! 단기 결전이다!!」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
original = "「木っ端ミジンコにしてあげるわ！！\u3000──ノヴァセイクリッドアロー！」"
translation = "「가루로 만들어 주겠어!! ──노바 세이크리드 애로우!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「……戦況は<ruby>膠着<rt>こうちゃく</rt></ruby>中。でも、時間の問題ね」"
translation = "「……전황은 교착 중. 하지만 시간 문제겠네요.」"

[[dialogue]]
speaker = "unk"
original = "ルヴィネは転送装置を起動し、増援の極星従騎とモンスター──そして先刻、創造神『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』から与えられた使徒の影をデネブから呼び寄せる。"
translation = "루비네는 전송 장치를 기동해 증원군인 극성종기와 몬스터── 그리고 조금 전 창조신 『<ruby>XELOS<rt>제로스</rt></ruby>』로부터 부여받은 사도의 그림자를 데네브에서 불러들인다."

[[dialogue]]
speaker = "unk"
original = "１０年前の戦禍がなく、多数のプリマステラが生存しているアルタイル。しかしこのまま進めば、物量によってすり潰せるだろう。"
translation = "10년 전의 전화가 없어 다수의 프리마스텔라가 생존해 있는 알타이르. 하지만 이대로 진행한다면 물량으로 짓눌러 버릴 수 있을 것이다."

[[dialogue]]
speaker = "unk"
original = "そうなれば森羅歴も終わる──しかしそれよりも前に、片付けなければならないことがルヴィネにはあった。"
translation = "그렇게 되면 신라력도 끝난다── 하지만 그보다 먼저 정리해야 할 일이 루비네에게는 있었다."

[[dialogue]]
speaker = "ルヴィネ"
original = "「……来たわね」"
translation = "「……왔군요.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「────ルヴィ！！！」"
translation = "「────루비!!!」"

