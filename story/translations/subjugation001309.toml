[[dialogue]]
speaker = "ユウリ"
original = "「そらよ、イグニッションアサルト！」"
translation = "「받아라, 이그니션 어설트!」"

[[dialogue]]
speaker = "セーラ"
original = "「外さないよ……クライマックスボルト！」"
translation = "「놓치지 않아…… 클라이맥스 볼트!」"

[[dialogue]]
speaker = "ユウリ"
original = "「倒しても倒してもモンスターが湧いてきやがる。空が黒くなってんの、あれ全部モンスターかよ」"
translation = "「쓰러뜨려도 쓰러뜨려도 몬스터가 솟구쳐 나오는군. 하늘이 검게 변한 거 저거 전부 몬스터냐」"

[[dialogue]]
speaker = "セーラ"
original = "「うっひゃ～……一生分のモンスター見たかも。向こうもそんだけマジってことかな」"
translation = "「으햐~…… 평생 볼 몬스터를 다 본 것 같네. 저쪽도 그만큼 진심이라는 걸까」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ちょっと伏せてね。──シャドウメイルストラム！」"
translation = "「잠시 엎드려주겠니. ──쉐도우 메일스트롬!」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ふぅ、肩慣らしにはなったかしら」"
translation = "「후우, 가볍게 몸풀기는 된 걸까나」"

[[dialogue]]
speaker = "ユウリ"
original = "「！？\u3000モンスターがまとめて消えちまった……。なんだありゃ……てかあの人、新星学園の司書さんじゃなかったのかよ」"
translation = "「!? 몬스터가 통째로 사라져 버렸어……. 뭐야 저거…… 그보다 저 사람, 신성학원의 사서 선생님 아니었어?」"

[[dialogue]]
speaker = "セーラ"
original = "「あ～、ユウリちゃんの学年は知らないか～。ウィステリアさん、<ruby>流星学園<rt>うち</rt></ruby>のＯＧで、“千年に一度の英雄”とか言われてて──」"
translation = "「아~ 유우리 학년은 모르려나~. 위스테리아 씨, 우리의 OG인데, “천년에 한 번 나올 영웅”이라 불리던──」"

[[dialogue]]
speaker = "ウィステリア"
original = "「今、何か言った？」"
translation = "「지금, 뭐라고 했니?」"

[[dialogue]]
speaker = "セーラ"
original = "「い～え、何も言ってないですよ」"
translation = "「아~뇨, 아무 말도 안 했어요」"

[[dialogue]]
speaker = "ウィステリア"
original = "「そうよね。千年に一度の英雄とか知らないわよね」"
translation = "「그렇지. 천년에 한 번 나올 영웅 같은 건 모를 테지」"

[[dialogue]]
speaker = "ユウリ"
original = "「めっちゃ聞こえてんじゃん」"
translation = "「엄청나게 잘 들리고 있잖아」"

[[dialogue]]
speaker = "ウィステリア"
original = "「だいたい、千年に一度の英雄とか誰が言ったのよ！\u3000本当に千年生きてからそういう評価してほしいわ」"
translation = "「애초에 천년에 한 번 나올 영웅 같은 건 누가 말한 거야! 정말로 천 년을 살고 나서 그런 평가를 해줬으면 좋겠네」"

[[dialogue]]
speaker = "コハルコ"
original = "『私もその気持ちわかるなぁ……。ジャスティスなんとかって聞くとつい反応しちゃうし……』"
translation = "『저도 그 기분 이해해요……. 저스티스 뭐시기라고 들으면 그만 반응해 버려서……』"

[[dialogue]]
speaker = "セーラ"
original = "「コハルコちゃーん、心の声漏れてるよー」"
translation = "「코하루코~ 속마음이 새어 나오고 있어~」"

[[dialogue]]
speaker = "コハルコ"
original = "『ハッ！？\u3000すみません！』"
translation = "『핫!? 죄송합니다!』"

[[dialogue]]
speaker = "ウィステリア"
original = "「今日はこれからロールケーキ買いに行くところだったのに、世界の危機とかで呼びつけられて、昔のあだ名を擦られて、踏んだり蹴ったりだわ！」"
translation = "「오늘은 이제부터 롤케이크를 사러 가려던 참이었는데, 세계의 위기 같은 거로 불려 나와서 옛날 별명이나 들먹여지고 설상가상이네!」"

[[dialogue]]
speaker = "マリオン"
original = "「相変わらずの不運ぶりですね、ウィステリアさん。でも実際、千年に一度の英雄と呼ばれるだけの力はあると思いますけどね」"
translation = "「여전히 불운하시군요, 위스테리아 씨. 하지만 실제로 천년에 한 번 나올 영웅이라 불릴 만한 실력은 있다고 생각합니다만」"

[[dialogue]]
speaker = "ウィステリア"
original = "「……まさかあなたが魔女だったなんて驚きましたよ、メイド長。……いえ、今はキリカがメイド長だから、ただのマリオンさんですね」"
translation = "「……설마 당신이 마녀였다니 놀랐어요, 메이드장. ……아니, 지금은 키리카가 메이드장이니까 그냥 마리온 씨네요」"

[[dialogue]]
speaker = "マリオン"
original = "「驚いたのは<ruby>私<rt>わたくし</rt></ruby>の方ですよ。キリカさんがあなたを連れてきた時は冷や汗をかきました」"
translation = "「놀란 건 저 쪽이에요. 키리카 씨가 당신을 데려왔을 때는 식은땀을 흘렸답니다」"

[[dialogue]]
speaker = "マリオン"
original = "「魔界の<ruby>旧<rt>ふる</rt></ruby>き血を継ぐ者。星騎士でありながら、魔導書の呪いによって魔力も操る例外。魔女の中でもあれだけの魔力を扱える者はそういません」"
translation = "「마계의 옛 혈통을 잇는 자. 성기사이면서 마도서의 저주로 마력까지 다루는 예외. 마녀 중에서도 그만한 마력을 다루는 자는 그리 많지 않죠」"

[[dialogue]]
speaker = "キリカ"
original = "「マリオンさん。……いえ、マリオン」"
translation = "「마리온 씨. ……아니, 마리온」"

[[dialogue]]
speaker = "マリオン"
original = "「おや。今にも<ruby>縊<rt>くび</rt></ruby>り殺さんとする殺気ですね」"
translation = "「이런. 당장이라도 교살해버릴 것 같은 살기군요」"

[[dialogue]]
speaker = "キリカ"
original = "「やはりあなたは星見家とお嬢様を探っていたのですね。実害がなければ泳がせておこうかと思いましたが……上月キリカ、一生の不覚でした」"
translation = "「역시 당신은 호시미 가문과 아가씨를 조사하고 있었군요. 실질적인 해가 없다면 내버려 두려 했습니다만…… 코즈키 키리카, 일생의 불찰이었습니다」"

[[dialogue]]
speaker = "キリカ"
original = "「お嬢様と星見家に害を為すなら……刺し違えてでも<ruby>屠<rt>ほふ</rt></ruby>ります」"
translation = "「아가씨와 호시미 가문에 해를 끼친다면…… 동귀어진을 해서라도 도륙하겠습니다」"

[[dialogue]]
speaker = "マリオン"
original = "「ご心配には及びません。流星ライダー・アポロとの戦いの終結を以て、私が星見家に関わる理由はなくなりましたので」"
translation = "「걱정하실 필요 없습니다. 유성 라이더 아폴로와의 전투 종결을 기점으로 제가 호시미 가문에 관여할 이유는 없어졌으니까요」"

[[dialogue]]
speaker = "マリオン"
original = "「ですが……いい気迫です。成長を感じます。やはりあなたがメイド長で正解でしたね」"
translation = "「하지만…… 좋은 기백입니다. 성장이 느껴지네요. 역시 당신이 메이드장인 게 정답이었습니다」"

[[dialogue]]
speaker = "キリカ"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「あの～、そういうのは後にした方がいいんじゃないかしら？」"
translation = "「저기~ 그런 건 나중에 하는 게 좋지 않을까?」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「そうですよ～。今は世界の危機なんですから、仲良くしましょう。ね？」"
translation = "「맞아요~. 지금은 세계의 위기니까 사이좋게 지내자구요. 네?」"

[[dialogue]]
speaker = "キリカ"
original = "「……ええ、時分をわきまえるべきでした。頭を冷やします」"
translation = "「……네, 때를 가렸어야 했습니다. 머리를 식히겠습니다」"

[[dialogue]]
speaker = "マリオン"
original = "「本当に嫌われましたね。自業自得ではありますが……その分働きで返すとしましょう！」"
translation = "「정말로 미움받아 버렸네요. 자업자득이긴 합니다만…… 그만큼 일로 갚기로 하죠!」"

[[dialogue]]
speaker = "ウィステリア"
original = "「さて、それじゃ後輩のために露払いといくわよ。……キリカ」"
translation = "「자, 그럼 후배를 위해 길을 열어주러 가자고. ……키리카」"

[[dialogue]]
speaker = "キリカ"
original = "「言われずともわかっています。近づくものは私が倒しますから、あなたは攻撃に集中してください」"
translation = "「말씀하시지 않아도 알고 있습니다. 다가오는 자는 제가 쓰러뜨릴 테니 당신은 공격에 집중해 주세요」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「相変わらず仲がいいのね～」"
translation = "「여전히 사이가 좋네~」"

[[dialogue]]
speaker = "ウィステリア"
original = "「よくないです！」"
translation = "「안 좋습니다!」"

[[dialogue]]
speaker = "キリカ"
original = "「エスメラルダ先輩と言えど心外です」"
translation = "「에스메랄다 선배라 할지라도 유감스러운 말씀입니다」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「うふふふ♪\u3000やっぱり仲いいじゃない。それじゃ私もサポートするわね。第五楽章──風花」"
translation = "「우후후후♪ 역시 사이좋잖아. 그럼 나도 서포트할게. 제5악장 ── 카자하나」"

[[dialogue]]
speaker = "キリカ"
original = "「上月神闘流──<ruby>偃月<rt>えんげつ</rt></ruby>」"
translation = "「코즈키 신투류 ── 언월」"

[[dialogue]]
speaker = "ウィステリア"
original = "「暗闇に飲まれなさい──ネイムレスグレイヴ！」"
translation = "「어둠 속에 삼켜지렴 ── 네임리스 그레이브!」"

[[dialogue]]
speaker = "セーラ"
original = "「ひょえ～。なんかモンスターの方がかわいそうになってきたかも」"
translation = "「히에~. 왠지 몬스터 쪽이 불쌍해질 지경이네」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「ふふふ、とっても頼もしいです。今のうちに堕天使を倒しましょう」"
translation = "「후후후, 정말 든든해요. 지금 사이에 타천사를 쓰러뜨려요」"

[[dialogue]]
speaker = "トワ先生"
original = "「でもその前に体勢を整えないとね」"
translation = "「하지만 그전에 태세를 가다듬어야겠지」"

[[dialogue]]
speaker = "セーラ"
original = "「ヒールありがとうございますっ。そういえば、トワちゃん先生ってうちらの大先輩なんですよね？」"
translation = "「힐 감사합니다. 그러고 보니 토와짱 선생님은 저희들의 대선배님이신 거죠?」"

[[dialogue]]
speaker = "トワ先生"
original = "「大はつけなくていいよ！？\u3000普通の先輩だよ！？」"
translation = "「'대'는 안 붙여도 돼!? 평범한 선배라구!?」"

[[dialogue]]
speaker = "ユウリ"
original = "「っと、危ねぇ！\u3000敵の方からお出ましなすったな」"
translation = "「앗, 위험해! 적들이 직접 행차하셨구만」"

[[dialogue]]
speaker = "ラクシャ"
original = "「輪廻の円環も無に還る……」"
translation = "「윤회의 원환도 무로 돌아가리니……」"

[[dialogue]]
speaker = "トワ先生"
original = "「環ちゃん、先生が今元に戻してあげるね」"
translation = "「타마키 짱, 선생님이 지금 원래대로 되돌려줄게」"

[[dialogue]]
speaker = "トワ先生"
original = "「この戦い、負けられない……ノヴァフォーム！」"
translation = "「이 싸움, 질 수 없어…… 노바 폼!」"

[[dialogue]]
speaker = "トワ先生（覚醒）"
original = "「ふふん。もう後ろから回復してるだけの私じゃないんだから！」"
translation = "「후훙. 이제 뒤에서 회복만 하던 내가 아니니까!」"

[[dialogue]]
speaker = "マリオン"
original = "「あら、初めて見る姿ですね。かれこれ１０年以上の付き合いですのに」"
translation = "「어머, 처음 보는 모습이네요. 자그마치 10년 이상 알고 지냈는데 말이죠」"

[[dialogue]]
speaker = "トワ先生（覚醒）"
original = "「だから１０年以上とか言わなくていいってば！？」"
translation = "「그러니까 10년 이상 같은 소리 하지 말라니까!?」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「ふふふ～、守護天使にとっては１０年も１００年も些細な年月ですよ～」"
translation = "「후후후~ 수호천사에게 10년이나 100년은 사소한 세월이에요~」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「ですから先生だって魔女だって、ママダレナに甘えていいんですよ？」"
translation = "「그러니까 선생님이든 마녀든 마마달레나에게 어리광 부려도 된다구요?」"

[[dialogue]]
speaker = "トワ先生（覚醒）"
original = "「ママ……ゴクリ……──ハッ！？\u3000危ない、ちっちゃいのに大きな母性に呑まれるところだった！？」"
translation = "「마마…… 꿀꺽…… ──핫!? 위험해, 조그만데 거대한 모성에 잡아먹힐 뻔했다!?」"

[[dialogue]]
speaker = "セーラ"
original = "「あはははっ、甘えるのは戦いの後だね！」"
translation = "「아하하하, 어리광 부리는 건 싸움이 끝난 뒤에 해!」"

[[dialogue]]
speaker = "ユウリ"
original = "「ここでしくじれば世界が終わる。負けられねえ！」"
translation = "「여기서 실수하면 세계가 끝남. 질 수 없음!」"

