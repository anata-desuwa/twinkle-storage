[[dialogue]]
speaker = "unk"
original = "第１話,意外な一面,P"
translation = "제1화, 의외의 일면, P"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「よし。会長さん、ここからは手分けして探そう。発見したら連絡してくれ」"
translation = "「좋아. 회장님, 여기서부터는 각자 흩어져서 찾자고. 발견하면 연락해 줘」"

[[dialogue]]
speaker = "unk"
original = "ヴァレリーに遭遇したコラプサー襲撃事件から数日、俺たちは浅草をパトロールしていた。"
translation = "발레리와 조우했던 콜랩서 습격 사건으로부터 며칠, 우리들은 아사쿠사를 순찰하고 있었다."

[[dialogue]]
speaker = "unk"
original = "『犯人は必ず再び現場に訪れる』というシアン先輩の経験に基づいての探索だったけれど――"
translation = "『범인은 반드시 다시 현장을 방문한다』라는 시안 선배의 경험에 근거한 탐색이었지만――"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「ご婦人、そこには段差がありますよ。足元にお気をつけて」"
translation = "「부인, 거기 턱이 있어요. 발밑 조심하세요」"

[[dialogue]]
speaker_original = "お婆さん"
speaker_translation = "할머니"
original = "「荷物まで持ってくれて……ご親切にありがとうねえ、綺麗なお嬢ちゃん」"
translation = "「짐까지 들어주고…… 친절하기도 해라, 예쁜 아가씨」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「いえいえ、お役に立てたのなら何よりです。それに私などより、あなたの方がずっとお美しい」"
translation = "「아뇨아뇨, 도움이 되었다면 다행입니다. 그보다 저 따위보다, 당신이 훨씬 더 아름다우세요」"

[[dialogue]]
speaker_original = "お婆さん"
speaker_translation = "할머니"
original = "「まあ、こんなお婆ちゃんにお上手ね。うふふふ」"
translation = "「어머나, 이런 할멈한테 말도 잘하네. 우후후후」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「それでは、失礼します。良い観光を」"
translation = "「그럼, 실례하겠습니다. 즐거운 관광 되시길」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「……おや、新星の会長さん、こんなところでお会いするとはなんとも奇遇ですね」"
translation = "「……어라, 신성의 회장님, 이런 곳에서 만나다니 정말 기우네요」"

[[dialogue]]
speaker = "unk"
original = "何をしていた？"
translation = "무엇을 하고 있었지?"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「ご覧になっていた通りですよ。お美しいご婦人が道に迷っていたのでね。ご案内してました」"
translation = "「보신 그대로예요. 아름다운 부인이 길을 헤매고 계시기에 말이죠. 안내해 드리고 있었습니다」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「この辺りは幾度も巡り巡っていますからね。道や観光名所にもすっかり詳しくなってしまいましたよ」"
translation = "「이 주변은 몇 번이고 돌고 돌았으니까요. 길이나 관광 명소도 아주 훤히 꿰뚫게 되었답니다」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「何度訪れても、ここは大変美しい。来る度に新たな発見が得られます」"
translation = "「몇 번을 방문해도 이곳은 무척 아름다워요. 올 때마다 새로운 발견을 하게 됩니다」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「会長さんも素晴らしい文化に触れるべく、浅草観光……というわけではなさそうですね」"
translation = "「회장님도 훌륭한 문화를 접하기 위해 아사쿠사 관광……을 온 것 같지는 않군요」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「大方、公安のワンちゃんとともに私を探していたのでしょうが……どうです、この場は休戦しませんか」"
translation = "「보아하니, 공안의 멍멍이와 함께 저를 찾고 있었던 모양입니다만…… 어떻습니까, 이 자리는 휴전하지 않겠어요?」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「ここでやり合うつもりはありません。<ruby>無辜<rt>むこ</rt></ruby>の民を巻き込むのは、あなたも望むところではないでしょう？」"
translation = "「여기서 싸울 생각은 없습니다. 무고한 백성들을 말려들게 하는 건, 당신도 바라는 바가 아니겠죠?」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「――ふむ、殺気は感じられません。どうやら要求を呑んでいただけるようですね。やはりあなたは、私が見込んだ通りの方です」"
translation = "「――흠, 살기는 느껴지지 않는군요. 아무래도 요구를 받아들여 주시는 모양이네요. 역시 당신은 제가 눈여겨본 대로의 분입니다」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「あなたがそのつもりだったなら、厄介なワンちゃんをすぐにでも呼び寄せるでしょうからね」"
translation = "「당신이 그럴 생각이었다면, 성가신 멍멍이를 당장이라도 불러들였을 테니까요」"

[[dialogue]]
speaker = "unk"
original = "信じていいんだな"
translation = "믿어도 된다는 거지"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「信じる信じないはあなたの勝手ですけどね。私はＯＮとＯＦＦをハッキリさせてまして」"
translation = "「믿고 안 믿고는 당신 마음입니다만. 저는 ON과 OFF를 확실히 하고 있어서 말이죠」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「純粋に観光を楽しんでいる今日は、オフなんです」"
translation = "「순수하게 관광을 즐기고 있는 오늘은 오프랍니다」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「休戦中の今でしたら、あなたと腕を組んで街を歩くのも、そこのカフェで仲良くティータイムに興じるのも、やぶさかではありませんよ」"
translation = "「휴전 중인 지금이라면, 당신과 팔짱을 끼고 거리를 걷는 것도, 저기 카페에서 다정하게 티타임을 즐기는 것도 마다하지 않아요」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「もっとも、敵対勢力と仲睦まじくしている決定的瞬間を、あなたの同僚に見られたら、どう思われるかまでは保証いたしかねますけどね」"
translation = "「물론, 적대 세력과 화기애애하게 있는 결정적 순간을 당신의 동료에게 들켰을 때, 어떻게 생각할지까지는 보장해 드릴 수 없지만요」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「フフ、無理をせずとも結構です。私の審美眼は、人の心の機微にも敏感でして」"
translation = "「후후, 무리하지 않으셔도 괜찮아요. 제 심미안은 사람의 마음의 기미에도 민감해서 말이죠」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「ここでやり合うつもりはないが、まだまだ私に対する抵抗感もある。学園の誰かに見られたら疑念が生じてしまう不安も抱えている……」"
translation = "「여기서 싸울 생각은 없지만, 여전히 저에 대한 저항감도 있다. 학원의 누군가에게 들키면 의구심이 생길 거라는 불안도 안고 있다……」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「私があなた方、星騎士の天敵であるコラプサーの一員である事実は変わりません。警戒を解かない方が賢明ですよ」"
translation = "「제가 당신들 성기사의 천적인 콜랩서의 일원이라는 사실은 변하지 않습니다. 경계를 늦추지 않는 편이 현명해요」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「とはいえ、無抵抗な私を、独断で処分できるようなあなたではないことも、私は知っています」"
translation = "「그렇다고는 해도, 무저항인 저를 독단으로 처분할 수 있는 당신이 아니라는 것도 저는 알고 있습니다」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「フフフ、なんで、そんなことまでわかるのかって顔ですね。以前、言いませんでしたか？」"
translation = "「후후후, 어째서 그런 것까지 아느냐는 표정이네요. 이전에 말하지 않았나요?」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「私はあなたのファンなんですよ。ファンならば好きな相手のことを調べ尽くすのが当然でしょう」"
translation = "「저는 당신의 팬이라니까요. 팬이라면 좋아하는 상대에 대해 낱낱이 조사하는 것이 당연하잖아요」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「誕生日、血液型、出身地、現在の住所、好きな食べ物、嫌いな食べ物、血縁関係や交際遍歴――思考パターンまで」"
translation = "「생일, 혈액형, 출신지, 현재 주소, 좋아하는 음식, 싫어하는 음식, 혈연관계나 교제 전력―― 사고 패턴까지 말이죠」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「プライバシーの侵害、などとお思いでしょうか」"
translation = "「프라이버시 침해, 라고 생각하시나요?」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「直接面識もないのに誕生日には花を贈り、熱愛や結婚や離婚は連日のように報じられ、『きっとあの子はこう思っているに違いない』と推測する」"
translation = "「직접 면식도 없는데 생일에는 꽃을 보내고, 열애나 결혼이나 이혼은 연일 보도되며, 『분명 그 아이는 이렇게 생각하고 있을 거야』라고 추측하죠」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「芸能人相手なら当然のようにやっている行為なのに、個々人となると突如、恐れを抱くのもおかしな話だと思いませんか？」"
translation = "「연예인 상대라면 당연하다는 듯이 하는 행위인데, 개인의 일이 되면 갑자기 두려움을 품는 것도 이상한 이야기라고 생각하지 않나요?」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「なんといっても、あなたは私にとって唯一無二の<ruby>偶像<rt>アイドル</rt></ruby>なのですから」"
translation = "「뭐니 뭐니 해도 당신은 제게 있어 유일무이한 우상<rt>아이돌</rt></ruby>이니까요」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「もっと深い仲になりたいと、心より望んでおります」"
translation = "「더 깊은 사이가 되고 싶다고, 진심으로 바라고 있습니다」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「――おっと、楽しい時間も束の間。今日はここでお開きですかね」"
translation = "「――오옷, 즐거운 시간도 잠시. 오늘은 여기서 작별인가 보네요」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「では、デートはまた日を改めてということで。心置きなく楽しめる日を心待ちにしています」"
translation = "「그럼, 데이트는 또 날을 잡아서 하는 걸로 하죠. 마음 놓고 즐길 수 있는 날을 고대하고 있겠습니다」"

[[dialogue]]
speaker = "unk"
original = "ヴァレリーはその身を翻し、颯爽と去っていった。"
translation = "발레리는 몸을 돌려 산뜻하게 떠나갔다."

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「おい、会長さん！\u3000今のは――チッ、逃げられたか」"
translation = "「야, 회장님! 방금 그건―― 칫, 놓쳤나」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「あたしの接近に気付いて退いたか……気配は消してたはずなんだがな」"
translation = "「내 접근을 눈치채고 물러난 건가…… 기척은 죽였을 텐데 말이야」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「おい、なんであいつに遭遇したのに、とっととあたしに連絡をよこさなかった？\u3000隙がなかったわけじゃねえだろ」"
translation = "「야, 왜 저 녀석이랑 마주쳤는데 냉큼 나한테 연락을 안 했어? 빈틈이 없었던 것도 아니잖아」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「もしかして、戦場で会った時とは様子が違うから、実は良い人――とでも思ったか？」"
translation = "「혹시 전쟁터에서 만났을 때랑 모습이 다르니까, 사실은 좋은 사람――이라고라도 생각한 거야?」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「あいつが何をやらかしたか、忘れちゃいねえよな。油断禁物だ……隙を見せた瞬間に、頭から喰われるぜ」"
translation = "「저 녀석이 무슨 짓을 저질렀는지 잊지는 않았겠지. 방심은 금물이야…… 빈틈을 보이는 순간 머리부터 잡아먹힐 거라고」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「気を引き締めろよ、会長さん」"
translation = "「정신 바짝 차려, 회장님」"

