[[dialogue]]
speaker = "unk"
original = "第４話,煩悩と甘い休日,P"
translation = "제4화, 번뇌와 달콤한 휴일, P"

[[dialogue]]
speaker = "unk"
original = "その日は休日で、恋人のマトイが家に遊びにやって来ていた――"
translation = "그날은 휴일로, 연인인 마토이가 집에 놀러 와 있었다――"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「会長、あのね？\u3000今日なんだけど……」"
translation = "「회장님, 저기 말이죠? 오늘 말인데요……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「巫女フォームの修行がしたいな～って、思ってて……」"
translation = "「무녀 폼 수행을 하고 싶다~고, 생각해서……」"

[[dialogue]]
speaker = "unk"
original = "巫女フォームの修業？"
translation = "무녀 폼 수행?"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「えっとね……『煩悩全開で、本当にしたいイチャイチャを口に出す』っていう……」"
translation = "「에또…… 『번뇌 전개로, 정말로 하고 싶은 꽁냥질을 입 밖으로 낸다』라는 건데……」"

[[dialogue]]
speaker = "unk"
original = "ミヤハルから前に聞いた話では、巫女の力を使いこなすには煩悩を解放し、それと向き合う必要があるという。"
translation = "미야하루에게 전에 들은 바로는, 무녀의 힘을 다루기 위해서는 번뇌를 해방하고, 그것과 마주할 필요가 있다고 한다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「た、例えば……創作とかに出て来るような、『だいしゅきホールド』ってやつとか……」"
translation = "「그, 예를 들면…… 창작물 같은 데 나오는, 『다이슈키 홀드』라는 거라든가……」"

[[dialogue]]
speaker = "unk"
original = "おそらく、修行というのは建前だろう。しかし、それをわざわざ指摘するのは野暮というものだ。"
translation = "아마도, 수행이라는 건 핑계겠지. 하지만, 그걸 굳이 지적하는 건 멋모르는 짓이다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「――いいの？\u3000えへへ<emoji=heart04>\u3000ありがとっ<emoji=heart04>」"
translation = "「――괜찮아? 에헤헤<emoji=heart04> 고마워<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「じゃあ～……しちゃう、ね？」"
translation = "「그럼~…… 해버릴게, 응?」"

[[dialogue]]
speaker = "unk"
original = "ソファーに腰かけている俺と向かい合うように、膝の上に乗っかって来るマトイ。"
translation = "소파에 앉아 있는 나와 마주 보듯이, 무릎 위로 올라타 오는 마토이."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ん……<emoji=heart04>」"
translation = "「응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺の背中に両手と両足を回して来て、『だいしゅきホールド』をする。"
translation = "내 등 뒤로 양손과 양발을 감아 오며, 『다이슈키 홀드』를 한다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「はぁっ、あぁぁ……っ<emoji=heart04>\u3000こ、これ、密着感がすごいね<emoji=heart04>\u3000体の全部が、会長とくっ付いちゃってる、みたいな……<emoji=heart04>」"
translation = "「하아, 아아아……<emoji=heart04> 이, 이거, 밀착감이 굉장하네<emoji=heart04> 몸 전체가, 회장님이랑 딱 붙어버린 것 같은……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「会長、あのね……？\u3000このまま、背中撫でて欲しい……<emoji=heart04>」"
translation = "「회장님, 저기 있잖아……? 이대로, 등 쓰다듬어 줬으면 좋겠어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう口にするマトイの要望に応えて、俺は彼女の背中を優しく撫でる。"
translation = "그렇게 말하는 마토이의 요망에 응해, 나는 그녀의 등을 상냥하게 쓰다듬는다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「はあぁ<emoji=heart04>\u3000んんんぅ……<emoji=heart04>\u3000それで、この間みたいに、耳元で愛を囁いて欲しい……な、なんちゃってっ」"
translation = "「하아아<emoji=heart04> 응응으으……<emoji=heart04> 그리고, 요 전번처럼, 귓가에 사랑을 속삭여 줬으면…… 해, 농담이야」"

[[dialogue]]
speaker = "unk"
original = "マトイ、好きだ。愛してる"
translation = "마토이, 좋아해. 사랑해."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ふあぁあぁ～～っ<emoji=heart04>\u3000わ、私もぉ……<emoji=heart04>」"
translation = "「후아아아~~<emoji=heart04> 나, 나도오……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「会長のこと、大好き……<emoji=heart04>」"
translation = "「회장님, 정말 좋아해……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ね、ねぇ、会長……<emoji=heart04>\u3000次は――」"
translation = "「저, 저기, 회장님……<emoji=heart04> 다음은――」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「キス……して欲しい<emoji=heart04>」"
translation = "「키스…… 해줬으면 좋겠어<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あっ<emoji=heart04>\u3000んんっ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 응읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マトイの唇を奪い、キスをする。"
translation = "마토이의 입술을 빼앗아, 키스를 한다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ちゅっ……ちゅっ<emoji=heart04>\u3000んちゅっ……<emoji=heart04>」"
translation = "「쪽…… 쪽<emoji=heart04> 응츄……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「んっ――はあぁ<emoji=heart04>\u3000この抱き着き方でキスすると、すごい幸せな気分になっちゃう……<emoji=heart04>」"
translation = "「응――하아아<emoji=heart04> 이 자세로 매달려서 키스하니까, 엄청 행복한 기분이 들어버려……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺も煩悩を口にしてもいい？"
translation = "나도 번뇌를 입 밖으로 내도 돼?"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「会長も……？\u3000――うん、もちろん<emoji=heart04>」"
translation = "「회장님도……? ――응, 물론이지<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「会長のしたいこと、私もしてあげたいから……教えて<emoji=heart04>」"
translation = "「회장님이 하고 싶은 거, 나도 해주고 싶으니까…… 알려줘<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "将来、俺と結婚して欲しい"
translation = "장래에, 나랑 결혼해 줬으면 좋겠어"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「えっ……！？」"
translation = "「엣……!?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ちょっ、それって……えぇっ！？」"
translation = "「잠깐, 그건…… 에엣!?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「――これは煩悩全開でしたいことを口にする修業だから？」"
translation = "「――이건 번뇌 전개로 하고 싶은 걸 말하는 수행이니까?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「た、確かにそうなんだけど……うぅっ、そこまでは予想してなかったよぉ……！」"
translation = "「확, 확실히 그렇긴 하지만…… 으으, 거기까지는 예상 못 했다구……!」"

[[dialogue]]
speaker = "unk"
original = "こういう煩悩はダメだった？"
translation = "이런 번뇌는 안 됐던 거야?"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「う、ううん。私が最初に言い出したんだもんね……」"
translation = "「으, 으응. 내가 먼저 꺼낸 말인걸……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「それに、私たちは恋人だし、これは普通にイチャイチャしてるだけなんだし……」"
translation = "「게다가, 우리는 연인이고, 이건 평범하게 꽁냥거리고 있는 것뿐이니까……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「すー……はー……！」"
translation = "「스으…… 하아……!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そ、その……」"
translation = "「그, 그게……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「不束者ですが……末永く、よろしくお願いします<emoji=heart04>」"
translation = "「부족한 몸입니다만…… 부디 오랫동안, 잘 부탁드려요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マトイ！"
translation = "마토이!"

[[dialogue]]
speaker = "unk"
original = "愛おしさが抑え切れずに、俺は再び彼女を抱き締める。"
translation = "사랑스러움을 억누르지 못하고, 나는 다시 그녀를 껴안는다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あっ<emoji=heart04>\u3000会長……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 회장님……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「――また、キスしたいの？\u3000うん……私も<emoji=heart04>」"
translation = "「――또, 키스하고 싶어? 응…… 나도<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「んっ……<emoji=heart04>\u3000ちゅっ<emoji=heart04>」"
translation = "「응으……<emoji=heart04> 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺たちはそれからも、お互いにしたい煩悩を口にしながら、とても甘い休日を過ごすのであった――"
translation = "우리들은 그 뒤로도, 서로 하고 싶은 번뇌를 입 밖으로 내며, 매우 달콤한 휴일을 보내는 것이었다――"

