[[dialogue]]
speaker = "unk"
original = "第１７話,愛おしい世界の形（後編）,B"
translation = "제17화, 사랑스러운 세계의 형태 (후편), B"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「みんな今頃、ちゃんと話せてるかな……」"
translation = "「다들 지금쯤 제대로 이야기 나누고 있으려나……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「大丈夫よ！\u3000きっと感動の再会になってるはずだわ！」"
translation = "「괜찮을 거야! 분명 감동적인 재회가 됐을걸!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「積もる話もあるでしょうし、グレイスさんたちが戻ってくるまでおくつろぎください。お茶のおかわり、いかがです？」"
translation = "「나눌 이야기도 많을 테니, 그레이스 씨 일행이 돌아올 때까지 편히 쉬세요. 차 한 잔 더 어떠세요?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ありがとう、アナちゃん！\u3000いただきますっ♪」"
translation = "「고마워, 아나짱! 잘 마실게♪」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「ん……和菓子に緑茶もたまにはいいものね。極星ではだいたい洋菓子に紅茶だから、新鮮だわ」"
translation = "「음…… 화과자에 녹차도 가끔은 괜찮네. 극성에서는 대개 양과자에 홍차라서 신선해」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ふっふっふっ。そうでしょう、そうでしょう。極星学園の皆さんのために、流星市国中を駆け回ってチョイスしてきた逸品です」"
translation = "「훗훗훗. 그렇죠, 그렇죠. 극성학원 여러분을 위해 유성시국 안을 뛰어다니며 골라온 일품입니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「むふー。これを機に、和菓子党員の拡充を狙う算段です」"
translation = "「무후─. 이걸 계기로 화과자 당원의 확충을 노릴 셈이죠」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あらあら～♪」"
translation = "「어머어머~♪」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「和菓子党員の拡充って何！？」"
translation = "「화과자 당원 확충이라니 그게 뭐야!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「愚問ですね。ベアトリスさんたちが和菓子への審美眼を身に着ければ、次に我々がデネブを訪問する際、レアな和菓子にあたる確率が上昇します」"
translation = "「우문이네요. 베아트리스 씨 일행이 화과자에 대한 심미안을 갖추게 되면, 다음에 저희가 데네브를 방문할 때 레어한 화과자를 만날 확률이 상승합니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「きっと素晴らしい平行世界の旅行となるはず……じゅるり」"
translation = "「분명 멋진 평행세계 여행이 될 거예요…… 쥬르륵」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「意外と考えられてる……！？」"
translation = "「의외로 생각이 깊어……!?」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「ふふ。わかったわ。あなた達が遊びに来たときは、とびっきりの和菓子でおもてなししてあげる」"
translation = "「후후. 알았어. 당신들이 놀러 왔을 때는 최고의 화과자로 대접해줄게」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「任せて！\u3000デネブは１０年も未来だから──もしかしたらこっちにはないスペシャルな和菓子があるかも！」"
translation = "「맡겨줘! 데네브는 10년 뒤의 미래니까── 어쩌면 이쪽에는 없는 스페셜한 화과자가 있을지도 몰라!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「素晴らしい。祝勝会が終わったら早速、デネブ来訪のスケジュールを立てましょう、会長」"
translation = "「훌륭하네요. 축승회가 끝나면 당장 데네브 방문 스케줄을 잡죠, 회장님」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「うふふ。アナちゃん、楽しみが増えたわね～♪」"
translation = "「우후후. 아나짱, 즐거움이 늘었네~♪」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「その代わり、<b>滞在中にモンスターが現れたら</b>。その時はあなた達にも出動してもらうわよ。セレスティアを忘れないようにね？」"
translation = "「그 대신, <b>체류 중에 몬스터가 나타나면</b> 그때는 당신들도 출동해줘야 해. 셀레스티아를 잊지 말라고?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ、もちろんだ」"
translation = "「아아, 물론이지」"

[[dialogue]]
speaker = "unk"
original = "創造神『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』は確かにこの世から消滅した。<ruby>彼<rt>か</rt></ruby>の神が生み出していた『リクリエの使徒』という忌むべきシステムはもうこの世にはない。"
translation = "창조신 『<ruby>XELOS<rt>제로스</rt></ruby>』는 분명 이 세상에서 소멸했다. 그 신이 만들어냈던 『리크리에의 사도』라는 끔찍한 시스템은 이제 이 세상에 없다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「全部いっぺんにぶわーって消えちゃったらいいのに！\u3000まだモンスターもアステラも、たまに出てきちゃうのよね」"
translation = "「전부 한꺼번에 확 사라져버리면 좋을 텐데! 아직 몬스터도 아스테라도 가끔 나와버린단 말이지」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「やっぱり、アルタイルでもそうなんだ……？」"
translation = "「역시 알타이르에서도 그렇구나……?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はい。アステラの発生、モンスターの出現……それらはおそらく、この世界の仕組みに深く根を張り──」"
translation = "「네. 아스테라의 발생, 몬스터의 출현…… 그것들은 아마 이 세계의 구조에 깊이 뿌리를 내리고──」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』の存在とはまったく関係なく、それ単体で稼働してしまっているようです」"
translation = "「『<ruby>XELOS<rt>제로스</rt></ruby>』의 존재와는 전혀 관계없이, 그것 단체로 가동되고 있는 것 같습니다」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「雨が降ったり、雷が鳴ったり──そういう自然現象と同じ感じ……なのかなぁ？」"
translation = "「비가 내리거나 천둥이 치는── 그런 자연현상과 같은 느낌……이려나?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。だから『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』がいなくなった今も、俺たち星騎士の役目はなくならない」"
translation = "「아아. 그래서 『<ruby>XELOS<rt>제로스</rt></ruby>』가 사라진 지금도 우리 성기사의 역할은 사라지지 않아」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「そうね。これからも変わらず、世界を守っていかなくちゃならない……望むところだわ」"
translation = "「맞아. 앞으로도 변함없이 세계를 지켜나가야 해…… 바라던 바야」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「けれどモンスターの出現総数自体は、大幅に目減りしたことも事実です」"
translation = "「하지만 몬스터의 출현 총수 자체는 대폭 줄어든 것도 사실입니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「今、世界は──平和そのもの。そう言ってよいでしょう」"
translation = "「지금 세계는── 평화 그 자체. 그렇게 말해도 좋겠죠」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あ──平行世界門の着信だな」"
translation = "「아── 평행세계문 수신이네」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "『魔王、こちらの準備は終わったわ。そろそろ私もアルタイルに向かうわね』"
translation = "『마왕, 이쪽 준비는 끝났어. 슬슬 나도 알타이르로 향할게』"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。そのままくぐってきてくれ。歓迎するよ」"
translation = "「아아. 그대로 넘어와 줘. 환영할게」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "『ありがとう──』"
translation = "『고마워──』"

[[dialogue]]
speaker = "unk"
original = "平行世界門が開き、辺りが輝きに満たされ──"
translation = "평행세계문이 열리고 주변이 빛으로 가득 차며──"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「──ん。平行世界の移動は、問題なさそうね」"
translation = "「──음. 평행세계 이동은 문제없어 보이네」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ルヴィ！\u3000待ってたよ！」"
translation = "「루비! 기다렸어!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ええ──あら、レティシアも随分とくつろいでいるわね」"
translation = "「그래── 어라, 레티시아도 꽤 편히 쉬고 있네」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「おもてなしを無碍にするのは失礼だもの」"
translation = "「대접을 무시하는 건 실례니까」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「うふふ。ちょっと前までのレティシアちゃんと大違いね～。お姉ちゃん、嬉しい♪」"
translation = "「우후후. 조금 전까지의 레티시아짱이랑 딴판이네~. 언니는 기뻐♪」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「……はぁ。サーシャのこういうからかいだけはやめて欲しいわ」"
translation = "「……하아. 사샤의 이런 놀림만큼은 그만둬줬으면 좋겠어」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「それでルヴィ、<b>アルタイルの私</b>はどうだった？\u3000迷惑をかけてなければいいのだけれど」"
translation = "「그건 그렇고 루비, <b>알타이르의 나</b>는 어땠어? 민폐나 끼치지 않았으면 좋겠는데」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「まさか。グレイス以外は手がかからない、とってもいい子よ」"
translation = "「설마. 그레이스 말고는 손 갈 데 없는 아주 착한 아이야」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「グレイスちゃんだけ名指し……やっぱり……」"
translation = "「그레이스짱만 지목당했어…… 역시……」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「未来の流星市国に目を輝かせて、アポロやリノを振り回していたけれど……あの２人なら大丈夫でしょう」"
translation = "「미래의 유성시국에 눈을 빛내며 아폴로나 리노를 휘두르고 다니긴 했지만…… 그 두 사람이라면 괜찮겠죠」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「あの～……アルタイルの私は？\u3000まさか見つけてもらえるだなんて思ってなかったら、驚いちゃったけど……」"
translation = "「저기~…… 알타이르의 저는요? 설마 찾아낼 수 있을 거라곤 생각도 못 해서 깜짝 놀랐는데……」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ちょっと内気な感じではあるけれど、礼儀正しくていい子だったわ」"
translation = "「조금 내성적인 느낌이긴 하지만 예의 바르고 착한 아이였어」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……魔王、本当にありがとう。アルタイルのベアトも保護してくれるだなんて」"
translation = "「……마왕, 정말 고마워. 알타이르의 베아토까지 보호해주다니」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「気にしないでくれ。俺たちもずっと気になっていたから」"
translation = "「신경 쓰지 마. 우리도 계속 마음에 걸렸으니까」"

[[dialogue]]
speaker = "unk"
original = "アルタイルのベアトリスがどこにいるのか──そのことは、天界襲撃以後からずっと、九浄家と学園が調査を進めていた。"
translation = "알타이르의 베아트리스가 어디에 있는지── 그 일은 천계 습격 이후부터 계속 쿠죠 가문과 학원이 조사를 진행해왔다."

[[dialogue]]
speaker = "unk"
original = "だが、ベアトリス本人に聞いてみても、幼い頃の彼女は魔界の地理にも疎く、故郷の場所は特定できなかった。"
translation = "하지만 베아트리스 본인에게 물어봐도 어릴 적의 그녀는 마계 지리에 어두워 고향 위치를 특정할 수 없었다."

[[dialogue]]
speaker = "unk"
original = "しかし、デネブのセイファート学園長が、１０年前にベアトリスと出会っていたことが判明して、一気に光明が見えた。"
translation = "그러나 데네브의 세이파트 학원장이 10년 전에 베아트리스와 만났던 것이 판명되어 단번에 서광이 비쳤다."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「デネブのジェラルド・セイファートのお陰で、影の一族の住処が特定できた……」"
translation = "「데네브의 제랄드 세이파트 덕분에 그림자 일족의 거처를 특정할 수 있었어……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。場所がわかったらすぐに、ヘレナちゃんが魔界に人を派遣してくれたんだ」"
translation = "「아아. 장소를 알자마자 헬레나짱이 마계에 사람을 파견해줬어」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「当然だけど、デネブのベアトリスがやってきてから、アルタイルの彼女は昏倒していた……一族は寝たきりの彼女を世話してたよ」"
translation = "「당연하지만 데네브의 베아트리스가 오고 나서부터 알타이르의 그녀는 혼수 상태였어…… 일족은 누워 있는 그녀를 돌보고 있었지」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「今さらだけど、アルタイルの私、よく捨てられなかったなぁ……」"
translation = "「이제 와서 하는 말이지만, 알타이르의 나, 잘도 버려지지 않았네……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「眠りに落ちてはいたけれど、星力を発現していたみたいでさ」"
translation = "「잠들긴 했어도 성력을 발현하고 있었나 봐」"

[[dialogue]]
speaker = "unk"
original = "デネブからやってきた、自身の同一存在の影響か。"
translation = "데네브에서 온 자신의 동일 존재의 영향인가."

[[dialogue]]
speaker = "unk"
original = "昏倒している間も、同一存在が見て、聞いていることは体験している──そうアポロは言っていた。"
translation = "혼수 상태인 동안에도 동일 존재가 보고 듣는 것을 체험하고 있다── 아폴로는 그렇게 말했다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ベアトリスさんが世界を守るために戦っていた光景を、アルタイルの幼い彼女も夢に見ていた……？」"
translation = "「베아트리스 씨가 세계를 지키기 위해 싸우던 광경을 알타이르의 어린 그녀도 꿈에서 보고 있었다는 건가요?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そう、なのかな？\u3000ただ、アポロのようにハッキリと意識をリンクさせてるわけではないみたいだ」"
translation = "「그렇다고 봐야 하나? 다만 아폴로처럼 확실하게 의식을 링크시킨 건 아닌 것 같아」"

[[dialogue]]
speaker = "unk"
original = "アルタイルのベアトリスやチナから、多少話の聞き取りは行っている。"
translation = "알타이르의 베아트리스나 치나로부터 어느 정도 이야기를 들었다."

[[dialogue]]
speaker = "unk"
original = "俺たちに対する、薄っすらとした既視感はあるようだが、完全に記憶や意識を共有しているわけではないようだった。"
translation = "우리에게 어렴풋한 기시감은 있는 모양이지만, 완전히 기억이나 의식을 공유하는 것은 아닌 듯했다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それで、アルタイルのベアトリスについてだけど……星力が目覚めた以上はってことで、一族の人達も世話を続けていたらしい」"
translation = "「그래서 알타이르의 베아트리스에 대해서인데…… 성력이 깨어난 이상은 어쩔 수 없다며 일족 사람들도 계속 돌봐왔다고 해」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「な、なるほど……」"
translation = "「과, 과연……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だからベアトリス。アルタイルの君を救ったのは、君自身だ。俺はそう思うよ」"
translation = "「그러니까 베아트리스. 알타이르의 너를 구한 건 너 자신이야. 난 그렇게 생각해」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「……そう言ってもらえると、嬉しいですっ！」"
translation = "「……그렇게 말씀해주시니 기뻐요!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「アルタイルのベアトリスは今、人間界の九浄家で暮らしてる。一族の人達と話はつけたから、安心して欲しい」"
translation = "「알타이르의 베아트리스는 지금 인간계의 쿠죠 가문에서 지내고 있어. 일족 사람들과는 이야기가 끝났으니까 안심해도 돼」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あと数年もしたら、流星附属校に通う予定だよ」"
translation = "「앞으로 몇 년만 더 있으면 유성 부속학교에 다닐 예정이야」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ありがとうございます……でも、ご迷惑じゃないですか？」"
translation = "「감사합니다…… 하지만 민폐가 되진 않을까요?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ぜーんぜん！\u3000むしろお互いの世界を行き来するなら、アルタイルのあの子の居場所はわかってた方が都合がいいでしょ？」"
translation = "「처언만에요! 오히려 서로의 세계를 오갈 거라면 알타이르의 그 아이가 있는 곳을 아는 편이 사정이 좋잖아?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「デネブの皆を呼ぶ時に、ベアトリスだけお留守番なんて寂しいじゃない！」"
translation = "「데네브의 모두를 부를 때 베아트리스만 집 지키게 하는 건 너무 외롭잖아!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「…………私、こんなに幸せでいいのかなぁ」"
translation = "「…………나, 이렇게 행복해도 되는 걸까」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「またベアトがおかしなことを言いだしたわね」"
translation = "「또 베아토가 이상한 소리를 하기 시작했네」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ええっ、そんなに変なこと言った！？」"
translation = "「에엣, 그렇게 이상한 소리 했어!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いいに決まってる。この景色を、平和を掴むために、俺たちは戦ってきたんだから」"
translation = "「좋고말고. 이 풍경을, 평화를 거머쥐기 위해 우리는 싸워왔으니까」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だから楽しもう──ようやく形になった、この『ありふれた普通の日常』を！」"
translation = "「그러니 즐기자── 드디어 형태를 갖춘 이 『흔하디흔한 평범한 일상』을!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「……はいっ♪」"
translation = "「……네!♪」"

[[dialogue]]
speaker = "unk"
original = "そうして星徒会室でくつろいでいると、チナとグレイスが帰ってきた──"
translation = "그렇게 성도회실에서 편히 쉬고 있으니 치나와 그레이스가 돌아왔다──"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「お待たせしましたっ！」"
translation = "「오래 기다리셨습니다!」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「……ありがとな、魔王」"
translation = "「……고맙다, 마왕」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「２人とも、早いな。もっとゆっくりしても良かったのに」"
translation = "「둘 다 빠르네. 좀 더 천천히 있어도 됐는데」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「大丈夫です！\u3000たくさんお話できましたし……それに祝勝会だって、参加しないわけにはいかないですから！」"
translation = "「괜찮습니다! 이야기도 많이 나눴고…… 게다가 축승회도 참가하지 않을 수 없으니까요!」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ああ。それにパーティーが終わったらすぐデネブに帰るってわけじゃない。アルタイルに滞在してる間は、父さんたちの家で暮らすからさ」"
translation = "「아아. 그리고 파티가 끝나면 바로 데네브로 돌아가는 게 아냐. 알타이르에 머무는 동안에는 아버지네 집에서 지낼 거니까」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「というわけです！\u3000お気遣いいただきありがとうございますっ！」"
translation = "「그렇게 됐습니다! 배려해주셔서 감사합니다!」"

[[dialogue]]
speaker = "unk"
original = "２人とも、ちょっと目頭が赤いが──きちんと話ができたのならよかった。"
translation = "둘 다 눈시울이 조금 붉지만── 제대로 이야기를 나눴다면 다행이다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それじゃあみんな、カフェテリアに行くわよー！」"
translation = "「자, 그럼 얘들아, 카페테리아로 가자구─!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「マトイ、準備はいい！？\u3000到着したら、一発芸で会場を沸かせるわよ！！」"
translation = "「마토이, 준비됐어!? 도착하면 장기 자랑으로 식장을 달아오르게 만들자!!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「よーっし！\u3000この日のために準備していたとびっきりのヤツを──って、だれがやるかぁ！！？」"
translation = "「좋─아! 이날을 위해 준비한 비장의 카드를── 는, 누가 하냐!!?」"

[[dialogue]]
speaker = "unk"
original = "『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』討伐を記念した、盛大な祝勝会──アルタイルとデネブ合同で行われるパーティー会場に、俺たちは向かうのだった。"
translation = "『<ruby>XELOS<rt>제로스</rt></ruby>』 토벌을 기념한 성대한 축승회── 알타이르와 데네브 합동으로 열리는 파티장으로 우리는 향했다."

