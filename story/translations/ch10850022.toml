[[dialogue]]
speaker = "unk"
original = "第２話,守護天使と未来のこと,P"
translation = "제2화, 수호천사와 미래의 일"

[[dialogue]]
speaker = "unk"
original = "その日、マグダレナの水着フォームの性能を確認することになり、俺は再びリゾート結界へと足を運んでいた。"
translation = "그날, 막달레나의 수영복 폼 성능을 확인하게 되어, 나는 다시 리조트 결계로 발걸음을 옮기고 있었다."

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「――以上が、ママダレナの新しい武器『スコップ』の力です～♪」"
translation = "「――이상이 마마다레나의 새로운 무기 『스코프』의 힘이에요~♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「能力でブロック状に『領域』を定めて、それを掘ったり、他の領域と組み替えたりすることができるんですよ～」"
translation = "「능력으로 블록 모양의 『영역』을 정해서, 그것을 파내거나 다른 영역과 재조합할 수 있답니다~」"

[[dialogue]]
speaker = "アニマ"
original = "「フム、実に面白い力ダ♪\u3000ママダレナやアルモたんは、本来の守護天使の力から派生して、順調に独自進化を続けているナ」"
translation = "「흠, 실로 흥미로운 힘이군♪ 마마다레나나 아루모 땅은 본래의 수호천사 힘에서 파생되어 순조롭게 독자 진화를 계속하고 있구나」"

[[dialogue]]
speaker = "unk"
original = "マグダレナの水着フォームの制作者であるアニマ先輩は、手元のノートにさらさらと書き込みながら、満足げに頷く。"
translation = "막달레나의 수영복 폼 제작자인 아니마 선배는 손에 든 노트에 사각사각 메모를 하며 만족스러운 듯 고개를 끄덕인다."

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「戦闘だけじゃなく海でも遊べるようになって、とっても嬉しいです♪\u3000ありがとうございます、アニマさま」"
translation = "「전투뿐만 아니라 바다에서도 놀 수 있게 되어서 정말 기뻐요♪ 감사합니다, 아니마 님」"

[[dialogue]]
speaker = "アニマ"
original = "「フヒ♪\u3000構わないヨ。研究も進むし、ママダレナにとっても役に立っているなら一石二鳥ダ♪」"
translation = "「후히♪ 상관없어. 연구도 진척되고 마마다레나에게도 도움이 된다면 일석이조지♪」"

[[dialogue]]
speaker = "アニマ"
original = "「それに、附属生の義体をよく使うようになってからも、会長との交際は順調なようで何よりダ♪」"
translation = "「게다가 부속생의 의체를 자주 사용하게 된 뒤로도 회장과의 교제는 순조로운 모양이라 다행이군♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「はい♪\u3000この間もリゾート結界で２人きりのバカンスを楽しんじゃいました……えへへへ<emoji=heart04>」"
translation = "「네♪ 얼마 전에도 리조트 결계에서 둘만의 바캉스를 즐겨버렸어요…… 에헤헤헤<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺と目が合うと、マグダレナは照れたように微笑む。"
translation = "나와 눈이 마주치자, 막달레나는 수줍은 듯 미소 짓는다."

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「こうして今、幸せな時間を過ごせていることに、とても感謝しています♪」"
translation = "「이렇게 지금, 행복한 시간을 보낼 수 있다는 것에 무척 감사하고 있어요♪」"

[[dialogue]]
speaker = "アニマ"
original = "「そうカ。だがママダレナは、今だけじゃなく――もっと先のことは考えているカ？」"
translation = "「그런가. 하지만 마마다레나는 지금뿐만 아니라―― 좀 더 먼 미래의 일은 생각하고 있나?」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「え？\u3000もっと先、ですか……？」"
translation = "「에? 좀 더 먼 미래, 말인가요……?」"

[[dialogue]]
speaker = "アニマ"
original = "「ソウ。守護天使として、いつかは人間界を去らなくてはならない……と考えているのダロウ？」"
translation = "「그래. 수호천사로서 언젠가는 인간계를 떠나야만 한다……고 생각하고 있겠지?」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「……はい。私たち守護天使は世界の摂理を支える柱。その役目を果たすため、いずれは本体の元へ戻らなければならない、と……」"
translation = "「……네. 저희 수호천사는 세계의 섭리를 지탱하는 기둥. 그 역할을 다하기 위해 언젠가는 본체의 곁으로 돌아가야만 한다고……」"

[[dialogue]]
speaker = "アニマ"
original = "「確かに、世界の仕組みを考えれば、その考えは正しイ。だが――アニマとしては、リクリエから世界を救った後も、急いで戻る必要はないと考えてイル」"
translation = "「확실히 세계의 구조를 생각하면 그 생각은 옳아. 하지만―― 아니마로서는 리크리에로부터 세계를 구한 뒤에도 서둘러 돌아갈 필요는 없다고 생각한다」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker = "アニマ"
original = "「ここにいるママダレナは、本体のリソースの一部を抽出した『分体』ダ。本体はオペレーション・ペンタグラムの際に既に解放され、世界を守護する役目へと復帰してイル」"
translation = "「여기 있는 마마다레나는 본체의 리소스 일부를 추출한 『분체』다. 본체는 오퍼레이션 펜타그램 당시에 이미 해방되어 세계를 수호하는 역할로 복귀해 있지」"

[[dialogue]]
speaker = "アニマ"
original = "「そして今もそうであるように、急いで本体の元に戻らずとも、役目は本体だけで問題なく遂行され続けてイル」"
translation = "「그리고 지금도 그렇듯이, 서둘러 본체의 곁으로 돌아가지 않아도 역할은 본체만으로 문제없이 수행되고 있다」"

[[dialogue]]
speaker = "アニマ"
original = "「であるなら……パートナーである会長が天寿を全うするまで、ヒトとしての『人生』を体験してから帰還するのも、悪くない選択だと思わないカ？」"
translation = "「그렇다면…… 파트너인 회장이 천수를 누릴 때까지, 인간으로서의 『인생』을 체험하고 나서 귀환하는 것도 나쁘지 않은 선택이라고 생각하지 않나?」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「人生を……体験……？」"
translation = "「인생을…… 체험……?」"

[[dialogue]]
speaker = "アニマ"
original = "「少なくともアニマは、義体の完成時から今日まで、それを想定してアップデートをし続けてきたつもりダ」"
translation = "「적어도 아니마는 의체의 완성 시점부터 오늘까지 그것을 상정하고 업데이트를 계속해 왔을 작정이다」"

[[dialogue]]
speaker = "アニマ"
original = "「<b>友人</b>には、幸せになって欲しいからナ」"
translation = "「<b>친구</b>는 행복해졌으면 좋겠으니까 말이야」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「！\u3000アニマさま……」"
translation = "「! 아니마 님……」"

[[dialogue]]
speaker = "アニマ"
original = "「だから、ママダレナ。今だけじゃなく、これからの――『未来の幸せ』についても、ちゃんと考えてみるとイイ」"
translation = "「그러니까 마마다레나. 지금뿐만 아니라 앞으로의―― 『미래의 행복』에 대해서도 제대로 생각해 보는 게 좋아」"

[[dialogue]]
speaker = "unk"
original = "アニマ先輩が学園へ戻った後、俺はマグダレナと海辺を散歩していた。"
translation = "아니마 선배가 학원으로 돌아간 뒤, 나는 막달레나와 해변을 산책하고 있었다."

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「……会長」"
translation = "「……회장님」"

[[dialogue]]
speaker = "unk"
original = "しばらく沈黙が続いた後、マグダレナが静かに口を開く。"
translation = "한동안 침묵이 이어진 뒤, 막달레나가 조용히 입을 연다."

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「私、アニマさまの仰った通り……これまで自分の未来のことは、あまり考えないようにしてきました」"
translation = "「저, 아니마 님이 말씀하신 대로…… 지금까지 제 미래의 일은 별로 생각하지 않으려 해왔어요」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「以前もお話しましたが……この身は仮初めのもの。リクリエを阻止できても、今の私がどれくらい地上にいられるかはわかりませんから……」"
translation = "「이전에도 말씀드렸지만…… 이 몸은 일시적인 것. 리크리에를 저지하더라도 지금의 제가 얼마나 지상에 있을 수 있을지는 모르니까요……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「会長と恋人の関係になってからは、なおさら『今が幸せであるように』と願って過ごしてきました」"
translation = "「회장님과 연인 관계가 된 뒤로는 더욱더 『지금이 행복하기를』 하고 바라며 지내왔어요」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「いつ戻ることになっても悔いがないように。会長やみなさんともう会えなくなっても、いい思い出が残るようにと……」"
translation = "「언제 돌아가게 되더라도 후회가 없도록. 회장님이나 여러분과 더 이상 만날 수 없게 되어도 좋은 추억이 남도록……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「でも……もしも叶うのなら、私は――」"
translation = "「하지만…… 만약 이루어질 수 있다면, 저는――」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「会長やみなさんと、ずっと一緒にいたいです。守護天使ではなく、１人の天使として……この先も生きてみたい……！」"
translation = "「회장님이나 여러분과 계속 함께 있고 싶어요. 수호천사가 아니라 한 명의 천사로서…… 앞으로도 살아보고 싶어요……!」"

[[dialogue]]
speaker = "unk"
original = "なら、もっと甘えて欲しいな"
translation = "그렇다면 좀 더 응석 부려줬으면 좋겠어"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker = "unk"
original = "俺にとって、守護天使という立場は関係ない。１人の女の子として、マグダレナのことが好きだ。"
translation = "나에게 있어 수호천사라는 입장은 상관없다. 한 명의 여자아이로서 막달레나를 좋아한다."

[[dialogue]]
speaker = "unk"
original = "そして――彼女には幸せになって欲しいと思っている。"
translation = "그리고―― 그녀가 행복해졌으면 좋겠다고 생각한다."

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「――だから、将来のことは２人で一緒に考えていきたい……？」"
translation = "「――그러니까 장래의 일은 둘이서 함께 생각하고 싶다……?」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「会長……<emoji=heart04>\u3000そんなふうに言われたら……私、お言葉に甘えたくなっちゃいます……<emoji=heart04>」"
translation = "「회장님……<emoji=heart04> 그런 식으로 말씀하시면…… 저, 그 말씀에 응석 부리고 싶어져요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はそっとマグダレナの手を取り、指を絡める。"
translation = "나는 살며시 막달레나의 손을 잡고 손가락을 얽는다."

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「私も会長と、一緒に『将来の幸せ』を考えてみたいです<emoji=heart04>」"
translation = "「저도 회장님과 함께 『장래의 행복』을 생각해 보고 싶어요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺もマグダレナには、ずっとそばにいて欲しい"
translation = "나도 막달레나가 계속 곁에 있어 줬으면 좋겠어"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「えへへ<emoji=heart04>\u3000はい<emoji=heart04>\u3000私――」"
translation = "「에헤헤<emoji=heart04> 네<emoji=heart04> 저――」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「なんだか……将来が、すごく楽しみになってきました……♪」"
translation = "「왠지…… 장래가 정말 기대되기 시작했어요……♪」"

[[dialogue]]
speaker = "unk"
original = "目の前に広がる海の水平線へ、マグダレナは期待に満ちた眼差しを向けて微笑むのだった。"
translation = "눈앞에 펼쳐진 바다의 수평선을 향해, 막달레나는 기대에 찬 눈빛으로 미소 짓는 것이었다."

