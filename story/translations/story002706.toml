[[dialogue]]
speaker = "unk"
original = "ルリエルの煩悩を満足させる為、急遽行われることになったお泊り会。"
translation = "루리엘의 번뇌를 만족시키기 위해 급하게 열리게 된 파자마 파티."

[[dialogue]]
speaker = "トマル"
original = "「あの、男の私も参加してよろしかったのでしょうか……？」"
translation = "「저기, 남자인 저도 참가해도 괜찮았던 건가요……?」"

[[dialogue]]
speaker = "ルリエル"
original = "「今は女の子の体に変身してるし、大丈夫ですよ！\u3000それに、お泊り会は大人数の方が楽しいのです♪」"
translation = "「지금은 여자아이 몸으로 변신해 있으니까 괜찮아요! 게다가 파자마 파티는 사람이 많아야 즐거운 것입니다♪」"

[[dialogue]]
speaker = "ミヤハル"
original = "「うちも別に構わへんよ。というか、神社に泊まるのは好きにしてええから、できればうちは離れで、１人で寝たいんやけど……」"
translation = "「내도 딱히 상관없데이. 그보다 신사에서 자는 건 마음대로 해도 좋응게, 가급적 내는 별채에서 혼자 자고 싶은데……」"

[[dialogue]]
speaker = "マトイ"
original = "「いやいや、そこは巫女修行なんだから、責任持って見てくれないと！」"
translation = "「아니 아니, 명색이 무녀 수행인데 책임지고 지켜봐 줘야지!」"

[[dialogue]]
speaker = "ミヤハル"
original = "「堪忍しておくれやす～。ほら、１人の時間って大事やろ？」"
translation = "「함 봐주이소~. 보래이, 혼자만의 시간도 중요 안 글나?」"

[[dialogue]]
speaker = "マトイ"
original = "「まあ、わかるけど。せっかくだし、こういうのも――」"
translation = "「뭐, 알겠지만. 기왕 하는 거 이런 것도――」"

[[dialogue]]
speaker = "ミヤハル"
original = "「うち、１日３回は自分で慰めんと、火照った体が落ち着かんくて～」"
translation = "「내는 하루에 3번은 혼자서 달래주지 않으믄 달아오른 몸이 안 가라앉아서~」"

[[dialogue]]
speaker = "マトイ"
original = "「よし、大丈夫！\u3000ミヤハルさんも一緒にお泊り会しよう♪」"
translation = "「좋아, 괜찮아! 미야하르 씨도 같이 파자마 파티 하자♪」"

[[dialogue]]
speaker = "ミヤハル"
original = "「あれ？\u3000なんかマトイはんから急に、有無を言わさない圧を感じるんやけど……」"
translation = "「어라? 왠지 마토이 한한테서 갑자기 거절을 허락지 않는 압박이 느껴지는데예……」"

[[dialogue]]
speaker = "ドッペルリエル"
original = "「ルリエルはミヤハルさんとお泊り会がしたいのです！」"
translation = "「루리엘은 미야하르 씨랑 파자마 파티를 하고 싶은 것입니다!」"

[[dialogue]]
speaker = "ミヤハル"
original = "「はぅ～、ほんまに難儀な煩悩はんやわぁ」"
translation = "「하우~ 정말로 성가신 번뇌 한이구마안」"

[[dialogue]]
speaker = "unk"
original = "そうして夜になり、１つの部屋に布団を並べて、みんなで寝ることになったのだが――"
translation = "그렇게 밤이 되어 한 방에 이불을 나란히 깔고 다 함께 자게 되었는데――"

[[dialogue]]
speaker = "ミヤハル"
original = "「なあ、うち、もう開き直って、この状況でしたいことをはんなりと考えとったんやけど……」"
translation = "「저기, 내는 이제 해탈하는 심정으로 이 상황에서 하고 싶은 걸 우아하게 생각해 봤는데……」"

[[dialogue]]
speaker = "unk"
original = "布団で仰向けになりながら、ミヤハルが口を開く。"
translation = "이불에 정자세로 누운 채 미야하르가 입을 연다."

[[dialogue]]
speaker = "ルリエル"
original = "「おっ！\u3000なんですか？」"
translation = "「오! 무엇인가요?」"

[[dialogue]]
speaker = "ドッペルリエル"
original = "「気になるのです！」"
translation = "「궁금한 것입니다!」"

[[dialogue]]
speaker = "ミヤハル"
original = "「ほら、旅行とか行くと寝る前に、恋バナ語り合ったりするやん？\u3000だから――」"
translation = "「보래이, 여행 같은 거 가면 자기 전에 사랑 이야기 나누고 그러지 않나? 그러니까――」"

[[dialogue]]
speaker = "ミヤハル"
original = "「今日はみんなで、自分の性癖語ってもらおかな～って♪」"
translation = "「오늘은 다 같이 자기 성벽에 대해 말해볼까 싶어서♪」"

[[dialogue]]
speaker = "マトイ"
original = "「どうして恋バナからアレンジしたのかな！？」"
translation = "「어째서 사랑 이야기에서 그렇게 변질된 거야!?」"

[[dialogue]]
speaker = "ミヤハル"
original = "「嫌やわぁ、マトイはん。性癖言うても……スケベぇなやつ限定やで？」"
translation = "「너무하다, 마토이 한. 성벽이라 해도…… 야한 것 한정이라구?」"

[[dialogue]]
speaker = "マトイ"
original = "「何も誤解がない！！！」"
translation = "「전혀 오해가 해소되지 않았어!!!」"

[[dialogue]]
speaker = "ルリエル"
original = "「性癖……って何なのです？」"
translation = "「성벽……이란 게 무엇인가요?」"

[[dialogue]]
speaker = "トマル"
original = "「ルリエルさま、性癖は『生まれついての、あまり良くないクセや好み』というような意味です」"
translation = "「루리엘 님, 성벽은 『태어날 때부터 지닌, 그리 좋지 않은 버릇이나 취향』이라는 뜻이에요」"

[[dialogue]]
speaker = "ルリエル"
original = "「つまりミヤハルさんは、わたしたちの『あまり良くない、エッチな好み』を知りたいということですか！」"
translation = "「즉 미야하르 씨는 우리의 『그리 좋지 않은, 야한 취향』을 알고 싶다는 말씀이시군요!」"

[[dialogue]]
speaker = "トマル"
original = "「え、えっと……要するに、そういうことだと思います。すごく恥ずかしい、ですが……」"
translation = "「어, 에또…… 요컨대 그런 뜻이라고 생각합니다. 무척 부끄럽지만……」"

[[dialogue]]
speaker = "ミヤハル"
original = "「そこはほら、巫女修行だと思って割り切ってもらわんと。うちだってこうして、責任持ってお泊り会に参加しとるんやし」"
translation = "「거야 뭐, 무녀 수행이라 생각하고 넘어가 줘야지예. 내도 이렇게 책임지고 파자마 파티에 참가하고 있응게」"

[[dialogue]]
speaker = "ミヤハル"
original = "「な？\u3000マトイはん<emoji=heart04>」"
translation = "「안 글나? 마토이 한<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「ぐっ……そう返されると……」"
translation = "「윽…… 그렇게 나오면……」"

[[dialogue]]
speaker = "ミヤハル"
original = "「それじゃあまず、言い出しっぺのうちから語ると――」"
translation = "「그럼 일단 말을 꺼낸 내부터 말하자믄――」"

[[dialogue]]
speaker = "ミヤハル"
original = "「うちは『露出癖』があるんよ<emoji=heart04>\u3000他人からスケベぇな目で見られてると思うと、興奮してしまうんや<emoji=heart04>」"
translation = "「내는 『노출벽』이 있데이<emoji=heart04> 남들이 야한 눈으로 쳐다본다고 생각하믄 흥분돼버리거든<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「いきなりぶっ込んできた！」"
translation = "「갑자기 세게 나오네!」"

[[dialogue]]
speaker = "ドッペルリエル"
original = "「露出癖、というのはどういうものなのですか？」"
translation = "「노출벽이라는 건 어떤 것인가요?」"

[[dialogue]]
speaker = "トマル"
original = "「それは、そのぅ……素肌を晒すのが好き、と申しますか……」"
translation = "「그건, 그으…… 맨살을 드러내는 걸 좋아한다고나 할까……」"

[[dialogue]]
speaker = "ルリエル"
original = "「つまり――最近のフィオナ会長のことですね！」"
translation = "「즉―― 최근의 피오나 회장님을 말하는 거군요!」"

[[dialogue]]
speaker = "マトイ"
original = "「絶対に違うと思うし、本人に言ったら泣かれるから止めようね、ルリエルちゃん！！」"
translation = "「절대로 아닐 거고, 본인한테 말하면 울어버릴 테니까 그만두자, 루리엘 짱!!」"

[[dialogue]]
speaker = "ルリエル"
original = "「？？？\u3000でも、最近のフィオナ会長はお肌出しまくりなのです！」"
translation = "「??? 하지만, 요즘의 피오나 회장님은 피부 노출이 엄청나다구요!」"

[[dialogue]]
speaker = "マトイ"
original = "「星騎士の戦闘服は、本人の意思では選べないとこあるから！\u3000好きでやってるわけじゃないと思うよ！」"
translation = "「성기사의 전투복은 본인의 의사로 고를 수 없는 면이 있으니까! 좋아서 그러는 건 아니라고 생각해!」"

[[dialogue]]
speaker = "ルリエル"
original = "「戦闘服は対象外ってことでしょうか？\u3000それなら、新星さんの方だとサーシャさんみたいな感じでしょうか？」"
translation = "「전투복은 예외라는 걸까요? 그렇다면, 신성 쪽이라면 사샤 씨 같은 느낌일까요?」"

[[dialogue]]
speaker = "ルリエル"
original = "「制服の胸元がセクシーなサーシャさんは、露出癖がある……と！」"
translation = "「교복 가슴팍이 섹시한 사샤 씨는, 노출증이 있다……라고!」"

[[dialogue]]
speaker = "マトイ"
original = "「いや、待って！？\u3000そこはちゃんと本人に聞いてみないと分からないっていうか……！」"
translation = "「아니, 잠깐!? 그건 제대로 본인한테 물어보지 않으면 모른다고나 할까……!」"

[[dialogue]]
speaker = "ルリエル"
original = "「え？\u3000でもサーシャさんって、いつもミヤハルさんみたいに、制服の胸元を開けてませんか？」"
translation = "「에? 하지만 사샤 씨는 항상 미야하르 씨처럼 교복 가슴팍을 풀어헤치고 있지 않나요?」"

[[dialogue]]
speaker = "マトイ"
original = "「確かにそうだけども！\u3000サーシャさんの場合は無意識にちょっと隙があるというか……」"
translation = "「확실히 그렇긴 하지만! 사샤 씨의 경우에는 무의식중에 좀 빈틈이 있다고나 할까……」"

[[dialogue]]
speaker = "ミヤハル"
original = "「――あとは、ちょっと雑に扱われたりするのも好きかもしれへんなぁ。『被虐願望』っていうんかな？\u3000うち、Мなんよ<emoji=heart04>」"
translation = "「――그다음엔, 좀 험하게 다뤄지는 것도 좋아할지도 모르겠네. 『피학 원망』이라고 하던가? 내, M이거든<emoji=heart04>」"

[[dialogue]]
speaker = "ミヤハル"
original = "「だから、ふふっ<emoji=heart04>\u3000マトイはんに激しいツッコミを入れられるんは、なかなか好きやよ<emoji=heart04>」"
translation = "「카니까, 후훗<emoji=heart04> 마토이 한한테 격한 츳코미를 당하는 거, 제법 좋아한데이<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「ビックリするくらい嬉しくない！！」"
translation = "「놀랄 정도로 안 기뻐!!」"

[[dialogue]]
speaker = "ミヤハル"
original = "「で、マトイはんはどうなん？\u3000性癖<emoji=heart04>」"
translation = "「카면, 마토이 한은 어떤데? 성벽<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「いや、言わないから！\u3000そんな話、星徒会のみんなとだってしたことないし！」"
translation = "「아니, 안 말할 거거든! 그런 얘기, 성도회 애들하고도 해본 적 없단 말이야!」"

[[dialogue]]
speaker = "ミヤハル"
original = "「え～、うちはカミングアウトしたのに、酷いお人やわぁ<emoji=heart04>」"
translation = "「에~, 내는 커밍아웃 캤는데, 너무한 사람입니데이<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「自分からぶっちゃけて来ただけでしょ……」"
translation = "「지 입으로 털어놓은 것뿐이잖아……」"

[[dialogue]]
speaker = "ミヤハル"
original = "「なあなあ、トマルはんも実はうちと同じ、Мなところがあるんやないかとはんなり感じとるんやけど、どうやろ？」"
translation = "「있제 있제, 토마루 한도 사실 내랑 똑같이 M인 구석이 있지 않나 하고 나긋하게 느끼고 있는데, 우떻노?」"

[[dialogue]]
speaker = "トマル"
original = "「わ、私ですかっ！？」"
translation = "「저, 저 말입니까!?」"

[[dialogue]]
speaker = "トマル"
original = "「確かに……その、誰かに命令して頂くのは、好きかもしれません……。それに応えて、ご奉仕するのも……」"
translation = "「확실히…… 그, 누군가 명령해 주시는 것은 좋아할지도 모릅니다……. 그것에 부응해서, 봉사하는 것도……」"

[[dialogue]]
speaker = "ミヤハル"
original = "「言い表すなら『隷属願望』って感じやねぇ<emoji=heart04>」"
translation = "「표현하자면 『예속 원망』 같은 느낌이네<emoji=heart04>」"

[[dialogue]]
speaker = "トマル"
original = "「はぅぅぅ……お恥ずかしいです……」"
translation = "「하으으으…… 부끄럽습니다……」"

[[dialogue]]
speaker = "ルリエル"
original = "「トマルさん、顔が真っ赤になってて可愛いのです♪」"
translation = "「토마루 씨, 얼굴이 새빨개져서 귀여운 것입니다♪」"

[[dialogue]]
speaker = "ミヤハル"
original = "「ふむ、トマルはんの姉弟ってことで、マトイはんも多分似たところがあると思うんよねぇ。この前の煩悩解放を見るに、Мな方やろ？」"
translation = "「흠, 토마루 한이랑 남매니까, 마토이 한도 아마 비슷한 구석이 있을 거라 생각한데이. 저번의 번뇌 해탈을 보아하니, M인 쪽 안 글나?」"

[[dialogue]]
speaker = "マトイ"
original = "「いやいや！\u3000なにを言ってるのかな！？」"
translation = "「아니아니! 무슨 말을 하는 거야!?」"

[[dialogue]]
speaker = "ミヤハル"
original = "「ただ、トマルはんは相手に尽くしたい方やけど、マトイはんは相手に色々して欲しいタイプ。うちが思うに――」"
translation = "「다만, 토마루 한은 상대한테 헌신하고 싶은 쪽이지만, 마토이 한은 상대가 이것저것 해주길 바라는 타입. 내 생각엔――」"

[[dialogue]]
speaker = "ミヤハル"
original = "「『お姫様願望』、みたいな感じやろか<emoji=heart04>」"
translation = "「『공주님 원망』, 같은 느낌 아이겠나<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「お、お姫様っ！？」"
translation = "「공, 공주님!?」"

[[dialogue]]
speaker = "ミヤハル"
original = "「そうそう。ほら、会長はんの壁ドンで、えろう濡れとったやろ？」"
translation = "「그래 그래. 봐라, 회장 한의 벽치기에 억수로 젖어 있었제?」"

[[dialogue]]
speaker = "マトイ"
original = "「濡れてないよ！？」"
translation = "「안 젖었거든!?」"

[[dialogue]]
speaker = "ミヤハル"
original = "「あと、お姫様抱っこで気絶してしまうくらい興奮してはったし、つまりは、ああいう『少女漫画のヒロイン』みたいな扱い方されると喜んでまうってことやろ<emoji=heart04>」"
translation = "「글고 공주님 안기로 기절할 정도로 흥분해 있었고, 요컨대 그런 『순정만화 여주인공』 같은 대접을 받으면 기뻐해 버린다는 거 아이겠나<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「うわあああぁぁぁっ！！\u3000わかった！\u3000わかったから！！\u3000それ以上分析しないでぇぇぇ～～～っ！！！」"
translation = "「우와아아아아아앗!! 알았어! 알았으니까!! 그 이상 분석하지 마아아아아아~~~!!!」"

[[dialogue]]
speaker = "ドッペルリエル"
original = "「マトイさんにクリティカルヒットなのです！」"
translation = "「마토이 씨에게 크리티컬 히트인 것입니다!」"

[[dialogue]]
speaker = "ミヤハル"
original = "「ふふっ<emoji=heart04>\u3000次はルリエルはんやけど……これがうちには難問やねぇ」"
translation = "「후훗<emoji=heart04> 다음은 루리엘 한인데…… 이게 내한테는 난제네」"

[[dialogue]]
speaker = "ルリエル"
original = "「？\u3000そうなのですか？」"
translation = "「? 그런가요?」"

[[dialogue]]
speaker = "ミヤハル"
original = "「うちにはまだルリエルはんの“これや！”ってのが見えてこんのよ～。ルリエルはん自身は、なんか思い当たるもんとかあらへん？」"
translation = "「내한테는 아직 루리엘 한의 “이거다!” 싶은 게 안 보인단 말이지~. 루리엘 한 스스로는 뭐 짐작 가는 거 없나?」"

[[dialogue]]
speaker = "ルリエル"
original = "「う～ん、そうですね～……あっ！\u3000１つ思いつきました！」"
translation = "「으음, 그러게요~…… 앗! 하나 생각났습니다!」"

[[dialogue]]
speaker = "ルリエル"
original = "「ルリエルは――『大人でセクシーな服』とか、もっと着てみたいのです！」"
translation = "「루리엘은―― 『어른스럽고 섹시한 옷』 같은 거, 더 입어보고 싶은 것입니다!」"

[[dialogue]]
speaker = "ルリエル"
original = "「流星星徒会のメンバーで街に遊びに行ったりした時、すごくセクシーな服が売ってるお店に入ろうとしたら、フィオナ会長からはまだ早いって言われたんですけど……」"
translation = "「유성 성도회 멤버들이랑 시내에 놀러 갔을 때, 엄청 섹시한 옷을 파는 가게에 들어가려고 했더니 피오나 회장님이 아직 이르다고 하셨는데요……」"

[[dialogue]]
speaker = "ルリエル"
original = "「わたしも大人っぽい下着とか、露出度の高い服とか着て、みんなにセクシールリエルって言ってもらいたいのです！」"
translation = "「저도 어른스러운 속옷이라든가, 노출도 높은 옷 같은 걸 입고, 모두에게 섹시 루리엘이라고 불리고 싶은 것입니다!」"

[[dialogue]]
speaker = "ミヤハル"
original = "「ほう、つまりルリエルはんは――『露出』に興味があると」"
translation = "「호오, 카니까 루리엘 한은―― 『노출』에 흥미가 있다 이 말이제」"

[[dialogue]]
speaker = "マトイ"
original = "「話が飛躍してないかな！？」"
translation = "「이야기가 비약한 거 아냐!?」"

[[dialogue]]
speaker = "ミヤハル"
original = "「ルリエルはん、今度また、うちと街に買い物行きます？」"
translation = "「루리엘 한, 담에 또 내랑 시내에 쇼핑 가겠노?」"

[[dialogue]]
speaker = "ルリエル"
original = "「また一緒に遊びに出かけてくれるのですか？\u3000やったぁ～♪」"
translation = "「또 같이 놀러 가 주시는 건가요? 야호~♪」"

[[dialogue]]
speaker = "ミヤハル"
original = "「うちがルリエルはんの『大人』のイメージが一新されるような、ほんまのアダルトってもん、教えたげるえ？」"
translation = "「내가 루리엘 한의 『어른』 이미지가 일신될 만한, 진짜 아달트라는 거 가르쳐 줄게예?」"

[[dialogue]]
speaker = "マトイ"
original = "「待て待て待てぇぇぇ～～～いっ！！！」"
translation = "「기다려 기다려 기다려어어어어어~~~!!!」"

[[dialogue]]
speaker = "ミヤハル"
original = "「ふふふっ♪\u3000冗談やよ<emoji=heart04>」"
translation = "「후후후♪ 농담입니데이<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ぺろっと舌を出して、笑うミヤハルなのだった――"
translation = "낼름 혀를 내밀며 웃는 미야하르였다――"

[[dialogue]]
speaker = "unk"
original = "そうして、今度こそ大満足した様子でルリエルの影は消えて、翌朝。"
translation = "그렇게 이번에야말로 대만족한 모습으로 루리엘의 그림자는 사라지고, 다음 날 아침."

[[dialogue]]
speaker = "ミヤハル"
original = "「ふああぁ～」"
translation = "「후아아~」"

[[dialogue]]
speaker = "unk"
original = "起きたミヤハルが欠伸をしながら顔を洗いに洗面台へと向かうと、先に起きていたマトイと顔を合わせる。"
translation = "일어난 미야하르가 하품을 하며 세수하러 세면대로 향하자, 먼저 일어나 있던 마토이와 마주친다."

[[dialogue]]
speaker = "ミヤハル"
original = "「あら、マトイはん、おはようどす<emoji=heart04>」"
translation = "「어라, 마토이 한, 안녕하십니데이<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「うん、おはよう。<b>ミヤハル</b>」"
translation = "「응, 안녕. **미야하르**」"

[[dialogue]]
speaker = "ミヤハル"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker = "マトイ"
original = "「どうかした？\u3000意外そうな顔して」"
translation = "「왜 그래? 의외라는 얼굴을 하고」"

[[dialogue]]
speaker = "ミヤハル"
original = "「ああいや、マトイはん、うちのこと、そんな風に呼んでましたっけって思うて……」"
translation = "「아니 그게, 마토이 한, 내를 그렇게 부르고 있었나 싶어서……」"

[[dialogue]]
speaker = "マトイ"
original = "「……ほら、なんかもう昨日、とんでもないことをぶっちゃけあったし。考えてみれば、私たち学園は違うけど、同じ２年生同士でしょ？\u3000だから――」"
translation = "「……그게, 왠지 어제 엄청난 것들을 다 털어놓기도 했고. 생각해보면 우리 학원은 다르지만 똑같은 2학년이잖아? 그러니까――」"

[[dialogue]]
speaker = "マトイ"
original = "「ミヤハルも私のこと、マトイって呼び捨てにしてくれていいから」"
translation = "「미야하르도 나를 마토이라고 이름만 불러도 되니까」"

[[dialogue]]
speaker = "マトイ"
original = "「その方が気兼ねなく、ツッコミやすいしね」"
translation = "「그게 거리낌 없이 츳코미 걸기도 편하고 말이야」"

[[dialogue]]
speaker = "ミヤハル"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "マトイ"
original = "「もしかして、嫌だった？」"
translation = "「혹시 싫었어?」"

[[dialogue]]
speaker = "ミヤハル"
original = "「いや、そんなことはないんやけど……ちょっと戸惑ってもうて」"
translation = "「아니, 그런 건 아인데…… 좀 당황스러워서」"

[[dialogue]]
speaker = "ミヤハル"
original = "「うち、昨日も言ったけど、これまで友達って言える仲の子おらんかったから、こういうの初めてで……」"
translation = "「내, 어제도 말했지만 지금까지 친구라고 할 만한 애가 없어서 이런 거 처음이거든……」"

[[dialogue]]
speaker = "ミヤハル"
original = "「誰かを呼び捨てで呼ぶ関係になったこと、無くて……」"
translation = "「누군가를 이름만 부르는 관계가 된 적이 없어서……」"

[[dialogue]]
speaker = "マトイ"
original = "「……ふふっ」"
translation = "「……후훗」"

[[dialogue]]
speaker = "ミヤハル"
original = "「な、なに笑うとるん？」"
translation = "「무, 뭐 웃노?」"

[[dialogue]]
speaker = "マトイ"
original = "「ミヤハル、えっちなことは平然と口にできるのに、そういうのは照れちゃうんだね」"
translation = "「미야하르, 야한 얘기는 태연하게 입에 담으면서 그런 건 쑥스러워하네」"

[[dialogue]]
speaker = "ミヤハル"
original = "「はぁ！？\u3000照れてへんしっ。マトイはん、いけずやわぁ……！」"
translation = "「하아!? 안 쑥스럽거든. 마토이 한, 심술쟁이입니데이……!」"

[[dialogue]]
speaker = "マトイ"
original = "「昨日イジられたお返しだよ。あと、呼び捨てになってないよ？」"
translation = "「어제 놀림당한 복수야. 그리고, 아직 이름만 부르는 게 아니잖아?」"

[[dialogue]]
speaker = "ミヤハル"
original = "「っ……！」"
translation = "「윽……!」"

[[dialogue]]
speaker = "ミヤハル"
original = "「い、言えばええんやろ？\u3000その……ま、マトイ……」"
translation = "「마, 말하면 될 거 아이가. 그…… 마, 마토이……」"

[[dialogue]]
speaker = "マトイ"
original = "「――うん♪\u3000よくできました」"
translation = "「――응♪ 참 잘했어요」"

[[dialogue]]
speaker = "ルリエル"
original = "「あ～！\u3000２人ともずるいのです！」"
translation = "「아~! 두 사람 다 치사한 것입니다!」"

[[dialogue]]
speaker = "ミヤハル"
original = "「って、ルリエルはん、トマルはん、見てたん！？」"
translation = "「앗, 루리엘 한, 토마루 한, 보고 있었나!?」"

[[dialogue]]
speaker = "トマル"
original = "「すみません、ちょっと待ってから声をかけた方がよさそうな雰囲気でしたので……」"
translation = "「죄송합니다, 잠시 기다렸다가 말을 거는 게 좋을 것 같은 분위기라……」"

[[dialogue]]
speaker = "ルリエル"
original = "「ルリエルも昨日の話し合いには参加してましたし、みんなから親しく『ルリ』って呼ばれたいのです！」"
translation = "「루리엘도 어제 대화에는 참여했었고, 모두가 친근하게 『루리』라고 불러줬으면 하는 것입니다!」"

[[dialogue]]
speaker = "マトイ"
original = "「う～ん。なんとなく、呼ぶなら『ルリちゃん』かな～」"
translation = "「으음. 왠지 부른다면 『루리짱』일까나~」"

[[dialogue]]
speaker = "ルリエル"
original = "「なんでですか！？\u3000アナさんのことは、アナって呼んでるのに！」"
translation = "「왜인가요!? 아나 씨는 아나라고 부르면서!」"

[[dialogue]]
speaker = "マトイ"
original = "「ルリちゃんにはそっちの方が可愛いから、かな？」"
translation = "「루리짱한테는 그쪽이 더 귀여우니까, 일까?」"

[[dialogue]]
speaker = "ミヤハル"
original = "「せやねぇ。うちもはんなりと、『ルリはん』って呼びたいわぁ」"
translation = "「글네예. 내도 나긋하게 『루리 한』이라고 부르고 싶데이」"

[[dialogue]]
speaker = "ルリエル"
original = "「えへへへへぇ～<emoji=heart04>\u3000ルリエルが特別可愛いからということなら、仕方がないのです♪」"
translation = "「에헤헤헤헤~<emoji=heart04> 루리엘이 특별히 귀엽기 때문이라면 어쩔 수 없는 것입니다♪」"

[[dialogue]]
speaker = "ミヤハル"
original = "「ふふっ、ルリはんは本当、天使って感じの子やねぇ。可愛い後輩やわぁ」"
translation = "「후훗, 루리 한은 정말 천사 같은 애네. 귀여운 후배입니데이」"

[[dialogue]]
speaker = "トマル"
original = "「あの……私も『ルリさま』、とお呼びしてもいいでしょうか？」"
translation = "「저기…… 저도 『루리 님』이라고 불러도 될까요?」"

[[dialogue]]
speaker = "ルリエル"
original = "「はい！\u3000もちろんなのですよ、トマルさん♪」"
translation = "「네! 물론인 거예요, 토마루 씨♪」"

[[dialogue]]
speaker = "unk"
original = "こうして、お泊り会を経て、少し変化のあった４人なのだった――"
translation = "이렇게 파자마 파티를 거치며 조금 변화가 생긴 네 사람이었다――"

