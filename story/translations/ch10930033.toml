[[dialogue]]
speaker = "unk"
original = "第３話,あったかさが集まって,P"
translation = "제3화, 따스함이 모여서"

[[dialogue]]
speaker = "unk"
original = "事件が解決した数日後。ミルフィーは挙動不審だった。"
translation = "사건이 해결되고 며칠 뒤. 밀피는 거동이 수상했다."

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「……そわそわ」"
translation = "「……안절부절」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「……きょろきょろ」"
translation = "「……두리번두리번」"

[[dialogue]]
speaker = "unk"
original = "落ち着きがないね"
translation = "안절부절못하네."

[[dialogue]]
speaker = "unk"
original = "どうしたの？"
translation = "무슨 일이야?"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「あ、会長くん……うん、実はクラスのみんなのおしゃべりが気になっちゃって」"
translation = "「아, 회장군…… 응, 사실 반 친구들의 수다가 신경 쓰여서.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ゾンビ型幽霊の事件が解決して、ちょっと経ったでしょ？\u3000あの出来事が噂になってるのに気付いてた？」"
translation = "「좀비형 유령 사건이 해결되고 조금 지났잖아? 그 일이 소문이 난 거 알고 있었어?」"

[[dialogue]]
speaker = "unk"
original = "気付いてるよ"
translation = "알고 있어."

[[dialogue]]
speaker = "unk"
original = "もちろん"
translation = "물론이지."

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「一気にわーっと出没したけど、すぐに倒しちゃったから、事情を知らない人が多いみたい」"
translation = "「한꺼번에 확 출몰했지만, 금방 쓰러뜨려 버려서 사정을 모르는 사람이 많은 것 같아.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「だから、逆に噂話が広まってるって言うか、あることないこと言われてて……」"
translation = "「그래서 오히려 헛소문이 퍼지고 있다고 해야 할까, 있지도 않은 말들이 오가서……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そうだね、かなりあやふやな内容が広まってるみたい」"
translation = "「맞아, 꽤 애매모호한 내용이 퍼지고 있는 것 같네.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「マトイさんも何か聞いてるの？」"
translation = "「마토이 씨도 뭐 들은 거 있어?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「星徒会の役員だし、あの場にいた当事者でもあるからね。一応チェックしておかなきゃって」"
translation = "「성도회 임원이기도 하고, 그 자리에 있었던 당사자이기도 하니까. 일단 체크해 둬야겠다 싶어서.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「正直かなり怪しい噂がほとんどで、正しい内容はごく僅かって感じ」"
translation = "「솔직히 꽤 수상한 소문이 대부분이고, 정확한 내용은 극히 일부라는 느낌이야.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「例えばどんなのがあるの？」"
translation = "「예를 들면 어떤 게 있는데?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ゾンビ型幽霊がそこら中を徘徊してた……とか。これは事実だよね」"
translation = "「좀비형 유령이 여기저기 배회하고 있었다…… 같은 거. 이건 사실이지.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「流星学園の子が、怪しい鏡を持って調査をしているのを見た、とか……これは舞亜さん達のことだと思うけど」"
translation = "「유성 학원 아이가 수상한 거울을 들고 조사하는 걸 봤다든가…… 이건 마아 씨 일행을 말하는 것 같아.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「じゃあじゃあ、新星の方はどうなの？\u3000私が活躍したことも噂になってるのかな？」"
translation = "「그럼 그럼, 신성 쪽은 어때? 내가 활약한 것도 소문이 났을까?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「それが……ごめん、ミルフィーの噂は全然ないんだ」"
translation = "「그게…… 미안, 밀피 소문은 전혀 없어.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「そ、そんなぁ……あんなに頑張ったのにどうして……」"
translation = "「그, 그럴 수가…… 그렇게 열심히 했는데 어째서……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「良くも悪くもトリシャさんがすごく目立ってたからね。大量のゾンビ型幽霊を引き連れてた姿は、大勢の人が見てたもん」"
translation = "「좋든 싫든 트리샤 씨가 워낙 눈에 띄었으니까. 대량의 좀비형 유령을 거느리고 있던 모습은 많은 사람이 봤거든.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「確かに、トリシャさんは大活躍だったよね。すごくすごく頑張ってたよ」"
translation = "「확실히 트리샤 씨는 대활약이었지. 정말 정말 열심히 했어.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「で、一方のミルフィーはっていうと……ずっと待機してて、最後にとどめを刺す役割だったでしょ？\u3000それに最終決戦のアリーナには、他の人は入らないようにしてたから」"
translation = "「자, 반면에 밀피는 어땠냐면…… 계속 대기하다가 마지막에 숨통을 끊는 역할이었잖아? 게다가 최종 결전장인 아레나에는 다른 사람이 들어오지 못하게 했으니까.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ということは……私が戦ってたところ、誰も見てない？」"
translation = "「그 말은…… 내가 싸웠던 모습, 아무도 못 봤어?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「残念だけど、そうみたい」"
translation = "「아쉽지만 그런 것 같아.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「そんなぁぁ～～～っ！！\u3000ただでさえ影が薄いと思ってたけど、今回も全然目立たなかったなんて、あんまりだよぉ」"
translation = "「말도 안 돼에에~~잇!! 안 그래도 존재감이 없다고 생각했는데, 이번에도 전혀 눈에 띄지 못했다니 너무해에.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「また、影が薄いの気にしてたんだ……」"
translation = "「또 존재감 없는 거 신경 쓰고 있었구나……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「うっ……そ、そこまでじゃないよ、ちょっとだけ」"
translation = "「윽…… 그, 그 정도는 아니야, 조금일 뿐이야.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ミルフィーは影が薄くないよ。すごいプリマステラだってこと、知ってる人は知ってるから」"
translation = "「밀피는 존재감이 없지 않아. 대단한 프리마스텔라라는 거, 알 사람은 다 아니까.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「それってつまり、知る人ぞ知るってやつでは……？」"
translation = "「그건 결국 아는 사람만 안다는 소리잖아……?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「……ごめん、確かにそうだね」"
translation = "「……미안, 확실히 그렇네.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「やっぱり私ってば、影が薄い運命の下に生まれた子なんだね……」"
translation = "「역시 난 존재감이 없는 운명 아래 태어난 아이인가 봐……」"

[[dialogue]]
speaker = "unk"
original = "俺たちの手で真実を伝えよう"
translation = "우리 손으로 진실을 전하자."

[[dialogue]]
speaker = "unk"
original = "そんなことない"
translation = "그렇지 않아."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そうだね、ミルフィーの活躍を伝える目的だけじゃなく、噂話が一人歩きするのを抑制するためにも、公式情報を出した方がいいのかも」"
translation = "「맞아, 밀피의 활약을 전하는 목적뿐만 아니라, 헛소문이 제멋대로 퍼지는 걸 억제하기 위해서라도 공식 정보를 내는 게 좋을지도 몰라.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「本当？\u3000それならみんな私の活躍を知って、褒め称えてくれるかな？」"
translation = "「정말? 그러면 다들 내 활약을 알고 칭찬해 줄까?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「だと思うけど……でもミルフィーはそれでいいの？」"
translation = "「그럴 거라 생각하지만…… 근데 밀피는 그걸로 괜찮겠어?」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「真実を伝えるってことは、ミルフィーのチーパオフォームのことも知らせる必要があるわけで……」"
translation = "「진실을 전한다는 건, 밀피의 치파오 폼에 대해서도 알려야 한다는 건데……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「是非見せて欲しい！\u3000できれば撮影したい！\u3000なんて人が大勢出てくるかも」"
translation = "「꼭 보고 싶다! 가능하다면 촬영하고 싶다! 같은 사람이 잔뜩 나올지도 몰라.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「そ、それは困るよ……」"
translation = "「그, 그건 곤란해……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「でも、証拠を見せろって言う人はいると思うよ。私は見せてもいいと思うけど、会長はどうかなぁ？」"
translation = "「하지만 증거를 보여달라는 사람은 있을 거야. 나는 보여줘도 상관없다고 생각하는데, 회장은 어때?」"

[[dialogue]]
speaker = "unk"
original = "ミルフィーのために我慢する"
translation = "밀피를 위해 참는다."

[[dialogue]]
speaker = "unk"
original = "み、見せたくない"
translation = "보, 보여주고 싶지 않아."

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「会長くん……私のチーパオフォーム、見せたくないんだね」"
translation = "「회장군…… 나의 치파오 폼, 보여주고 싶지 않구나.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「だってすごくかわいいもんね。彼氏としては見せたくないって思うのは当然だよ」"
translation = "「그야 엄청 귀여운걸. 남자친구로서 보여주고 싶지 않다고 생각하는 건 당연해.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「……じゃあ、何も言わなくていいよ。今のままで」"
translation = "「……그럼, 아무 말 안 해도 돼. 지금 이대로가 좋아.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「みんなに褒めてもらえなくてもいいの？」"
translation = "「모두에게 칭찬받지 못해도 괜찮아?」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「うん、いいよ……影が薄いのはいつものことだし、気にしないもん」"
translation = "「응, 괜찮아…… 존재감 없는 건 늘 있는 일이고, 신경 안 쓸 거야.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「そりゃ、みんなに知ってもらいたい、評価されたいって気持ちはあるよ。でも、そのためになにかしようとまでは思わないかな」"
translation = "「물론 모두가 알아줬으면 좋겠고, 평가받고 싶다는 마음은 있어. 하지만 그걸 위해서 무언가 하겠다는 생각까지는 안 들어.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「私のことは、私が大好きな人が知っててくれたら、それで十分だから」"
translation = "「내 모습은 내가 제일 좋아하는 사람이 알아준다면, 그걸로 충분하니까.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ミルフィー……ほんといい子だなぁ」"
translation = "「밀피…… 정말 착한 아이구나.」"

[[dialogue]]
speaker = "unk"
original = "頭撫でてあげる"
translation = "머리를 쓰다듬어 준다."

[[dialogue]]
speaker = "unk"
original = "いい子いい子"
translation = "착하다 착해."

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「うん……ありがと、２人とも……」"
translation = "「응…… 고마워, 둘 다……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「あと、ギュッてして欲しい……そしたら元気出るから……」"
translation = "「그리고, 꽉 안아줬으면 좋겠어…… 그러면 기운이 날 것 같으니까……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「もう、甘えんぼさんなんだから……今だけだよ」"
translation = "「정말, 어리광쟁이라니까…… 이번뿐이야.」"

[[dialogue]]
speaker = "unk"
original = "ぎゅ～～～っ"
translation = "꽈아아아악"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ミルフィーの元気出ろー」"
translation = "「밀피의 기운아 솟아라ㅡ」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「えへへ……あったかいなぁ……ほんと、私の周りはいい人だらけだよ。最高だよぉ……」"
translation = "「에헤헤…… 따뜻하다…… 정말 내 주변은 좋은 사람들뿐이야. 최고야아……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ミルフィーがあったかいからだよ。あったかい人には、自然とあったかさが集まるんだから」"
translation = "「밀피가 따뜻하기 때문이야. 따뜻한 사람에게는 자연스럽게 따스함이 모이는 법이니까.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「うん……そうだったらいいね……みんな幸せになっちゃうよ……」"
translation = "「응…… 그랬으면 좋겠네…… 모두 행복해질 거야……」"

[[dialogue]]
speaker = "unk"
original = "こうして、俺とマトイは２人がかりで、ミルフィーをギュッとし続けるのだった。"
translation = "이렇게 나와 마토이는 둘이서 밀피를 계속 꽉 안아주었다."

