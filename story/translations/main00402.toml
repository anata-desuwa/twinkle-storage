[[dialogue]]
speaker = "unk"
original = "第２話,星見姉妹？,B"
translation = "제2화, 호시미 자매?, B"

[[dialogue]]
speaker = "unk"
original = "と、<ruby>思惟<rt>しい</rt></ruby>を巡らせていると……"
translation = "라고, 사유를 되뇌고 있을 때……"

[[dialogue]]
speaker = "フィオナ"
original = "「あ──２人とも」"
translation = "「아── 두 분 다」"

[[dialogue]]
speaker = "クロト＆ヴィーナス"
original = "「──のわああぁぁっ！？」"
translation = "「──노와아아아앗!?」"

[[dialogue]]
speaker = "unk"
original = "すっかり人気のなかった大聖堂に、流星星徒会会長──フィオナがやってきていた。"
translation = "완전히 인기척이 없던 대성당에, 유성 성도회 회장── 피오나가 와 있었다."

[[dialogue]]
speaker = "unk"
original = "俺たちは思わず距離を取って離れる。"
translation = "우리는 무심코 거리를 두고 떨어진다."

[[dialogue]]
speaker = "フィオナ"
original = "「２人ともずいぶん近くでお話されておりましたが……お邪魔してしまったでしょうか？」"
translation = "「두 분 다 꽤 가까이서 이야기하고 계셨는데…… 방해해 버린 걸까요?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そ、そういうやつじゃないから！\u3000べべべ別にやましいこととかこれっぽっちも」"
translation = "「그, 그런 거 아니거든! 배배배 별로 켕기는 일 같은 건 털끝만큼도」"

[[dialogue]]
speaker = "クロト"
original = "「フィオナこそ、どうしたんだ？\u3000一人みたいだけど」"
translation = "「피오나 너야말로, 무슨 일이야? 혼자인 것 같은데」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あんたは冷静さ取り戻すの早すぎ！！」"
translation = "「넌 냉정을 되찾는 게 너무 빠르잖아!!」"

[[dialogue]]
speaker = "unk"
original = "理不尽な叱責を受けた。"
translation = "이유 없는 질책을 받았다."

[[dialogue]]
speaker = "unk"
original = "俺たちの様子に和んだのか、フィオナも相好を崩して笑う。"
translation = "우리의 모습에 누그러졌는지, 피오나도 상냥하게 웃는다."

[[dialogue]]
speaker = "フィオナ"
original = "「ちょっと息抜きに。カフェテリアのソイラテが飲みたくなりまして」"
translation = "「잠깐 숨 돌리러요. 카페테리아의 소이 라테가 마시고 싶어져서요」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ああ、あれ！\u3000私も好き、けっこー女子に人気なのよね♪」"
translation = "「아, 그거! 나도 좋아해, 꽤 여자애들한테 인기 많지♪」"

[[dialogue]]
speaker = "クロト"
original = "「へえ。そんなに評判なら俺も飲んでみようかな」"
translation = "「헤에. 그렇게 평판이 좋다면 나도 마셔볼까」"

[[dialogue]]
speaker = "unk"
original = "息抜きか。確かにフィオナは背負うものも多くて大変そうだ。"
translation = "숨 돌리기라. 확실히 피오나는 짊어진 것도 많아서 힘들어 보인다."

[[dialogue]]
speaker = "unk"
original = "俺たちはフィオナと一緒にカフェテリアまで移動した。"
translation = "우리는 피오나와 함께 카페테리아까지 이동했다."

[[dialogue]]
speaker = "フィオナ"
original = "「一昨日は……新星の皆さんのほうが、大変だったようですね。この間は間に合わなくてごめんなさい」"
translation = "「그저께는…… 신성의 여러분 쪽이, 힘들었던 것 같네요. 그때는 늦어서 죄송합니다」"

[[dialogue]]
speaker = "クロト"
original = "「アポロの件か。あれは確かに……大変だった」"
translation = "「아폴로 건 말이지. 그건 확실히…… 힘들었어」"

[[dialogue]]
speaker = "unk"
original = "いいタイミングだと思い、俺たちはこの前の事件の詳細をフィオナに語った。"
translation = "좋은 타이밍이라고 생각하여, 우리는 지난번 사건의 상세를 피오나에게 이야기했다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「生意気なちびっ子が暴れまわって、ちょー大変だったんだから！\u3000なんか星降らす能力もついてるし……！」"
translation = "「건방진 꼬맹이가 날뛰어서, 엄청 힘들었다니까! 뭔가 별을 내리게 하는 능력도 붙어 있고……!」"

[[dialogue]]
speaker = "フィオナ"
original = "「子どもの仕業だった──というのは聞き及んでいますが。お二人が苦戦されるほど脅威だったのですか？」"
translation = "「아이의 소행이었다──는 것은 전해 들었지만요. 두 분이 고전하실 정도로 위협적이었나요?」"

[[dialogue]]
speaker = "クロト"
original = "「ああ。これくらいの大剣をかついで……正直、一歩遅ければ被害は尋常じゃなかったと思う」"
translation = "「아아. 이 정도의 대검을 메고…… 솔직히, 한 발 늦었으면 피해는 보통이 아니었을 거라고 생각해」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ドガーンって剣振り回すだけならまだしも、モンスターまで湧いてくる始末だしね」"
translation = "「쾅 하고 검을 휘두르는 것뿐이라면 모를까, 몬스터까지 솟아나는 판국이고 말이야」"

[[dialogue]]
speaker = "フィオナ"
original = "「モンスターまで……なるほど。見た目にそぐわぬ脅威、ということですね」"
translation = "「몬스터까지…… 과연. 겉모습에 걸맞지 않은 위협, 이라는 것이군요」"

[[dialogue]]
speaker = "unk"
original = "事の経緯は既に聞き及んでいるのか、冷静に俺たちの証言を分析するフィオナ。"
translation = "사건의 경위는 이미 전해 들었는지, 냉정하게 우리의 증언을 분석하는 피오나."

[[dialogue]]
speaker = "クロト"
original = "「最後だって、なぜか見逃されたようなものだったしな」"
translation = "「마지막도, 왠지 모르게 놓아준 것 같은 거였고」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「……そうね。あれは間違いなくただのちびっ子じゃないわ。だって……」"
translation = "「……그렇지. 그건 분명 단순한 꼬맹이가 아니야. 왜냐하면……」"

[[dialogue]]
speaker = "フィオナ"
original = "「？」"
translation = "「?」"

[[dialogue]]
speaker = "unk"
original = "言いよどむヴィーナス。"
translation = "말을 머뭇거리는 비너스."

[[dialogue]]
speaker = "unk"
original = "しかし、フィオナは事情を知っていると思い直して例の件についても話した。"
translation = "하지만, 피오나는 사정을 알고 있다고 다시 생각하고 예의 건에 대해서도 이야기했다."

[[dialogue]]
speaker = "フィオナ"
original = "「なるほど。例の日誌が……となると、フィーニスで出会った天使の言葉とも関連していそうですね」"
translation = "「과연. 예의 일지가…… 그렇다면, 피니스에서 만난 천사의 말과도 관련이 있을 것 같네요」"

[[dialogue]]
speaker = "クロト"
original = "（フィオナは飲み込みが早いな……超常的な話には違いないんだけど）"
translation = "（피오나는 이해가 빠르네…… 초자연적인 이야기임에는 틀림없는데）"

[[dialogue]]
speaker = "フィオナ"
original = "「運命を書き換えられる少女……リクリエの使徒……アポロ……」"
translation = "「운명을 고쳐 쓸 수 있는 소녀…… 리크리에의 사도…… 아폴로……」"

[[dialogue]]
speaker = "unk"
original = "物思いにふけるフィオナ。"
translation = "생각에 잠기는 피오나."

[[dialogue]]
speaker = "unk"
original = "息抜きにきたという彼女を悩ませるのはあまり良くなかっただろうか。"
translation = "숨 돌리러 왔다는 그녀를 고민하게 만든 것은 별로 좋지 않았을까."

[[dialogue]]
speaker = "ヴィーナス"
original = "「ま、強いったって所詮はガキンチョだけどね！\u3000自分は流星ライダーだーなんて、ヒーローごっこしてたくらいだし！」"
translation = "「뭐, 강하다고 해봤자 결국은 애송이지만 말이야! 자기는 유성 라이더다ー라면서, 히어로 놀이 하고 있었을 정도고!」"

[[dialogue]]
speaker = "フィオナ"
original = "「流星ライダー……アポロ……？」"
translation = "「유성 라이더…… 아폴로……?」"

[[dialogue]]
speaker = "クロト"
original = "「もしかしてフィオナも子どもの頃は観てたとか……？」"
translation = "「혹시 피오나도 어렸을 때 봤다거나……?」"

[[dialogue]]
speaker = "unk"
original = "『流星ライダーアポロ』というのは、数年前に放映していた子ども向け変身ヒーローもののタイトルだ。"
translation = "『유성 라이더 아폴로』라는 것은, 몇 년 전에 방영했던 어린이용 변신 히어로물의 타이틀이다."

[[dialogue]]
speaker = "フィオナ"
original = "「あ、いえ、えっと……その。初耳でした」"
translation = "「아, 아니요, 음…… 그게. 처음 듣는 이야기였어요」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そうよクロト。フィオナがそんなの観てるわけないじゃない！」"
translation = "「맞아 쿠로토. 피오나가 그런 걸 볼 리가 없잖아!」"

[[dialogue]]
speaker = "クロト"
original = "「男の子向けの番組だしな」"
translation = "「남자아이용 프로그램이고 말이지」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「フィオナって昔からなんか大人びてそうだし。子ども向け番組って柄じゃないわよね」"
translation = "「피오나는 옛날부터 뭔가 어른스러워 보였고. 어린이용 프로그램은 어울리지 않지」"

[[dialogue]]
speaker = "フィオナ"
original = "「む……」"
translation = "「음……」"

[[dialogue]]
speaker = "unk"
original = "確かにイメージにそぐわない。"
translation = "확실히 이미지에 맞지 않는다."

[[dialogue]]
speaker = "unk"
original = "だが、なぜかフィオナは対抗心を燃やしたらしく……"
translation = "하지만, 왠지 피오나는 대항심을 불태운 듯……"

[[dialogue]]
speaker = "フィオナ"
original = "「私は子どものころ姉と『探偵騎士スクープナイト』を毎週欠かさず観ていました」"
translation = "「저는 어렸을 때 언니와 『탐정 기사 스쿠프 나이트』를 매주 빠짐없이 봤습니다」"

[[dialogue]]
speaker = "クロト"
original = "「マニアックなアニメが出てきた……」"
translation = "「마니악한 애니메이션이 나왔네……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「な、何それ……知らないんだけどなんか悔しい」"
translation = "「뭐, 뭐야 그거…… 모르겠는데 왠지 분해」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふふふ」"
translation = "「후후후」"

[[dialogue]]
speaker = "unk"
original = "なぜか勝ち誇った顔をするフィオナ。意外な一面だった。"
translation = "왠지 모르게 의기양양한 표정을 짓는 피오나. 의외의 일면이었다."

[[dialogue]]
speaker = "unk"
original = "だが……"
translation = "하지만……"

[[dialogue]]
speaker = "クロト"
original = "（教皇庁の第一皇女である星見フィオナに、姉……？）"
translation = "（교황청의 제1황녀인 호시미 피오나에게, 언니……?）"

[[dialogue]]
speaker = "unk"
original = "さすがに星見家の家族構成がすべて公表されているわけではないが、第一皇女の姉という話は初耳だ。"
translation = "아무리 호시미 가문의 가족 구성이 모두 공표된 것은 아니지만, 제1황녀의 언니라는 이야기는 처음 듣는다."

[[dialogue]]
speaker = "unk"
original = "一緒に育った姉代わりのような人がいたのか、あるいは……"
translation = "함께 자란 언니 대리 같은 사람이 있었던 것일까, 아니면……"

[[dialogue]]
speaker = "ヴィーナス"
original = "「フィオナにはお姉さんがいるのね！\u3000ちょっと意外かも」"
translation = "「피오나에게 언니가 있구나! 조금 의외일지도」"

[[dialogue]]
speaker = "フィオナ"
original = "「そう、でしょうか……？」"
translation = "「그런, 걸까요……?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「うん！\u3000フィオナって面倒見が良さそうだから、どっちかって言うと妹がいそうなイメージなのよね～」"
translation = "「응! 피오나는 잘 돌봐줄 것 같으니까, 어느 쪽이냐면 여동생이 있을 것 같은 이미지란 말이지～」"

[[dialogue]]
speaker = "フィオナ"
original = "「くすくす。褒め言葉として受け取っておきます」"
translation = "「쿡쿡. 칭찬으로 받아들여 둘게요」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あ、もしかしてお姉さんも流星学園生？」"
translation = "「아, 혹시 언니도 유성 학원 학생?」"

[[dialogue]]
speaker = "フィオナ"
original = "「……いえ。姉はこの学園には──もちろん新星にもいません」"
translation = "「……아뇨. 언니는 이 학원에는── 물론 신성에도 없습니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「いたらもっと話題になってるか」"
translation = "「있었다면 더 화제가 됐겠지」"

[[dialogue]]
speaker = "クロト"
original = "「フィオナのお姉さんとなると……きっとしっかりした人なんだろうな」"
translation = "「피오나의 언니라면…… 분명 듬직한 사람일 것 같네」"

[[dialogue]]
speaker = "フィオナ"
original = "「……ええ。とても使命感の強い──自慢の姉です」"
translation = "「……네. 매우 사명감이 강한── 자랑스러운 언니입니다」"

[[dialogue]]
speaker = "unk"
original = "どうやら聞き間違いや言い間違い、という感じではなさそうだが……"
translation = "아무래도 잘못 듣거나 잘못 말한 것 같지는 않지만……"

[[dialogue]]
speaker = "フィオナ"
original = "「──こほん。ですが、兄弟姉妹がいることくらい珍しいことではありません。うちのソフィアも新星学園に姉がいると言っていました」"
translation = "「──커흠. 하지만, 형제자매가 있다는 것쯤은 드문 일이 아닙니다. 저희 소피아도 신성 학원에 언니가 있다고 말했습니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ソフィアちゃん……ってあの小さな魔族の子だっけ？\u3000へー！」"
translation = "「소피아짱…… 그 작은 마족 아이 말이야? 헤에!」"

[[dialogue]]
speaker = "クロト"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "あまり触れたくない話題だったのだろうか。話を切り替えてきた。"
translation = "별로 언급하고 싶지 않은 화제였던 것일까. 화제를 전환했다."

[[dialogue]]
speaker = "unk"
original = "フィオナがそのつもりなら、わざわざ深掘りするでもないか。"
translation = "피오나가 그럴 생각이라면, 굳이 깊게 파고들 필요는 없겠지."

[[dialogue]]
speaker = "フィオナ"
original = "「それより……お二人はここで“壁画”を眺められていたみたいですが」"
translation = "「그것보다…… 두 분은 여기서 “벽화”를 바라보고 계셨던 것 같습니다만」"

[[dialogue]]
speaker = "クロト"
original = "「あ、うん……」"
translation = "「아, 응……」"

[[dialogue]]
speaker = "unk"
original = "“魔王は英雄だ”──という言説を、流星教皇の娘であるフィオナに語るのはなんだか不穏な気がしなくもない。"
translation = "“마왕은 영웅이다”──라는 언설을, 유성 교황의 딸인 피오나에게 이야기하는 것은 왠지 모르게 불길한 기분이 들지 않는 것도 아니다."

[[dialogue]]
speaker = "unk"
original = "ただ、ヴィーナスはそこまで空気の読める子ではなかった。"
translation = "다만, 비너스는 거기까지 분위기를 읽을 줄 아는 아이는 아니었다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「この壁画が嘘っぱちだって話をしてたのよ！\u3000魔王はリクリエから世界を救った英雄なんだから！」"
translation = "「이 벽화가 거짓말이라는 이야기를 하고 있었어! 마왕은 리크리에로부터 세계를 구한 영웅이니까!」"

[[dialogue]]
speaker = "フィオナ"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "unk"
original = "予想通りと言うべきか、これまで通りの言説を披露するヴィーナス。"
translation = "예상대로라고 해야 할까, 지금까지와 같은 언설을 피력하는 비너스."

[[dialogue]]
speaker = "クロト"
original = "「ごめんフィオナ。こういうのは……星見家からしたら不謹慎だよな」"
translation = "「미안 피오나. 이런 건…… 호시미 가문에게는 불경한 이야기지」"

[[dialogue]]
speaker = "フィオナ"
original = "「……いえ。そんなことは、ありません」"
translation = "「……아뇨. 그런 일은, 없습니다」"

[[dialogue]]
speaker = "unk"
original = "フィオナは真摯な表情で受け止める。"
translation = "피오나는 진지한 표정으로 받아들인다."

[[dialogue]]
speaker = "unk"
original = "そういえば……ヴィーナスとアポロ以外にも、彼女から言われていたのを思い出した。"
translation = "그러고 보니…… 비너스와 아폴로 외에도, 그녀에게 들었던 것을 떠올렸다."

[[dialogue]]
speaker = "フィオナ"
original = "『……緋宮会長。あなたは……“魔王”なのですか？』"
translation = "『……히노미야 회장. 당신은…… “마왕”이신가요?』"

[[dialogue]]
speaker = "フィオナ"
original = "「？\u3000どうされましたか、緋宮会長」"
translation = "「? 무슨 일이신가요, 히노미야 회장」"

[[dialogue]]
speaker = "クロト"
original = "「いや……なんでも」"
translation = "「아니…… 아무것도」"

[[dialogue]]
speaker = "クロト"
original = "（あれはヴィーナスが俺のことを魔王と紹介したからだ。フィオナは、それに冗談で答えたにすぎない……）"
translation = "（그건 비너스가 나를 마왕이라고 소개했기 때문이야. 피오나는, 그것에 농담으로 대답했을 뿐이야……）"

[[dialogue]]
speaker = "unk"
original = "だが、なぜだろう。"
translation = "하지만, 왜일까."

[[dialogue]]
speaker = "unk"
original = "冗談めかしたあの言葉が、他の誰よりも突き刺さっている──"
translation = "농담처럼 말했던 그 말이, 다른 누구보다도 가슴에 박힌다──"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そんなこんなでアポロちゃんの出現で私の日誌もパーになって、色々滅入っちゃってるってわけ」"
translation = "「이런저런 일로 아폴로짱의 출현으로 나의 일지도 엉망이 되고, 여러모로 우울해졌다는 거지」"

[[dialogue]]
speaker = "フィオナ"
original = "「よくわかりました。やはりヴィーナスさんには、我々にない何かがあるようです」"
translation = "「잘 알겠습니다. 역시 비너스 씨에게는, 저희에게 없는 무언가가 있는 것 같습니다」"

[[dialogue]]
speaker = "unk"
original = "さすがに自分が魔王としてのクロトを鍛えるうんぬんという下りは端折っていたが、悩んでいたことを伝えるヴィーナス。"
translation = "아무리 자신이 마왕으로서의 쿠로토를 단련시킨다는 구절은 생략했지만, 고민하고 있던 것을 전달하는 비너스."

[[dialogue]]
speaker = "unk"
original = "フィオナもその真摯さを汲んでか、俺が考えていたのと同じ提案をしてきた。"
translation = "피오나도 그 진심을 헤아렸는지, 내가 생각하고 있던 것과 같은 제안을 해왔다."

[[dialogue]]
speaker = "フィオナ"
original = "「再びあの地へ向かう時かもしれませんね。ヴィーナスさんのわだかまりを解消するなら」"
translation = "「다시 그곳으로 향할 때일지도 모르겠네요. 비너스 씨의 응어리를 해소하려면」"

[[dialogue]]
speaker = "クロト"
original = "「あの地って……もしかして『塔』か」"
translation = "「그곳이라니…… 혹시 『탑』인가」"

[[dialogue]]
speaker = "フィオナ"
original = "「はい。こうして手をこまねいているよりは──前進するべきではないかと」"
translation = "「네. 이렇게 손 놓고 있는 것보다는── 전진해야 하지 않을까요」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「確かに。あの時の収穫はありすぎたくらいだし」"
translation = "「확실히. 그때의 수확은 너무 많았을 정도고」"

[[dialogue]]
speaker = "フィオナ"
original = "「フィーニスの塔であれば魔王の真実にも……近づけそうですし」"
translation = "「피니스의 탑이라면 마왕의 진실에도…… 가까워질 수 있을 것 같고요」"

[[dialogue]]
speaker = "クロト"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "いつもと変わらない理知的なフィオナの語調。"
translation = "평소와 다름없는 이지적인 피오나의 말투."

[[dialogue]]
speaker = "unk"
original = "しかしなぜか、今の彼女には揺るぎない意思が宿っているように聞こえた。"
translation = "하지만 왠지 모르게, 지금의 그녀에게는 흔들림 없는 의지가 깃들어 있는 것처럼 들렸다."

[[dialogue]]
speaker = "フィオナ"
original = "「とはいえ……勝手な立ち入りは禁じられているのも事実です。強要するわけにも──」"
translation = "「그렇다고는 해도…… 함부로 출입하는 것은 금지되어 있는 것도 사실입니다. 강요할 수는──」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「いいえ。行くに決まっているわ、だってあそこからは──私を呼ぶ声だって聞こえたんだもの」"
translation = "「아니. 갈 수밖에 없지, 왜냐하면 거기서는── 나를 부르는 소리도 들렸는걸」"

[[dialogue]]
speaker = "クロト"
original = "「──日誌と栞が示した先なのに変わりはないしな」"
translation = "「──일지와 책갈피가 가리킨 곳임에는 변함없고」"

[[dialogue]]
speaker = "unk"
original = "フィーニスの塔──"
translation = "피니스의 탑──"

[[dialogue]]
speaker = "unk"
original = "前回は日誌に促されるままに導かれ、その果てでマグダレナさんという守護天使と邂逅した。"
translation = "지난번에는 일지에 이끌리는 대로 인도되어, 그 끝에서 막달레나라는 수호 천사와 해후했다."

[[dialogue]]
speaker = "unk"
original = "そして彼女はあの時、あそこが第一階層の終着点であると語っていた。"
translation = "그리고 그녀는 그때, 그곳이 제1계층의 종착점이라고 이야기했다."

[[dialogue]]
speaker = "unk"
original = "その言葉を信じるなら、あそこにはまだ『先』があるということになる。"
translation = "그 말을 믿는다면, 그곳에는 아직 『다음』이 있다는 것이 된다."

[[dialogue]]
speaker = "クロト"
original = "「……俺も気持ちは同じだ。真実が転がっているなら虎穴でも臨みたい」"
translation = "「……나도 마음은 같아. 진실이 굴러다니고 있다면 호랑이 굴이라도 가고 싶어」"

[[dialogue]]
speaker = "クロト"
original = "「ただ、もし前回と似たような感じなら長期の戦闘が予想される。すぐに向かうのは避けたほうがいいだろう」"
translation = "「다만, 만약 지난번과 비슷한 느낌이라면 장기간의 전투가 예상돼. 바로 가는 건 피하는 게 좋겠지」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それもそうね」"
translation = "「그것도 그렇네」"

[[dialogue]]
speaker = "フィオナ"
original = "「先日の事件の影響も、未だ調査が続けられています。そちらが落ち着いてから、こっそり出動するとしましょうか」"
translation = "「얼마 전 사건의 영향도, 아직 조사가 계속되고 있습니다. 그쪽이 진정된 후에, 몰래 출동하도록 할까요」"

[[dialogue]]
speaker = "クロト"
original = "「ああ。星徒会長が揃って消えたなんてことになっても、まずいしな」"
translation = "「아아. 성도 회장이 모두 사라졌다는 일이 돼도, 곤란하고 말이지」"

[[dialogue]]
speaker = "unk"
original = "そうして俺たちは一時解散し、次なる『フィーニスの塔・攻略』が可能な日を待つことにした。"
translation = "그렇게 우리는 일시 해산하고, 다음 『피니스의 탑・공략』이 가능한 날을 기다리기로 했다."

[[dialogue]]
speaker = "unk"
original = "先日の事件の対応や、またまた増えたアステラの対応なんかに追われつつも……"
translation = "지난번 사건의 대응이나, 또다시 늘어난 아스테라의 대응 같은 것에 쫓기면서도……"

[[dialogue]]
speaker = "unk"
original = "一週間ばかり経ってようやく、俺たちは再び集合できた。"
translation = "일주일 정도 지나서야 겨우, 우리는 다시 모일 수 있었다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「よーし、揃ったわね」"
translation = "「좋아, 다 모였네」"

[[dialogue]]
speaker = "unk"
original = "フィーニスの塔へ到着した俺たち。"
translation = "피니스의 탑에 도착한 우리."

[[dialogue]]
speaker = "unk"
original = "今日はアステラの報告もなく平穏なため、ここを調べるには絶好の機会と捉えた。"
translation = "오늘은 아스테라 보고도 없어 평온하기 때문에, 이곳을 조사하기에는 절호의 기회라고 생각했다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「誰も見てないわね？\u3000先生とか」"
translation = "「아무도 안 보고 있지? 선생님이라든가」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふふ。なんだか不良になってしまったようです」"
translation = "「후후. 왠지 불량아가 되어버린 것 같습니다」"

[[dialogue]]
speaker = "クロト"
original = "「共犯だな」"
translation = "「공범이네」"

[[dialogue]]
speaker = "unk"
original = "相変わらず塔の周囲には結界が張り巡らされており、生徒の立ち入りも禁じられている。"
translation = "여전히 탑 주변에는 결계가 쳐져 있으며, 학생들의 출입도 금지되어 있다."

[[dialogue]]
speaker = "unk"
original = "太古の昔に女神が建てたシンボル──いくら星徒会といえども易々と踏み入れていい場所ではない。"
translation = "태고의 옛날에 여신이 세운 상징── 아무리 성도회라고 해도 쉽게 발을 들여놓아서는 안 될 장소이다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「でも背に腹は代えられないわ。前と同じメンバーだし、大丈夫でしょ！」"
translation = "「하지만 등 뒤의 배는 바꿀 수 없어. 전과 같은 멤버고, 괜찮겠지!」"

[[dialogue]]
speaker = "クロト"
original = "「そういえば、今日はニャリオンとキリカさんがいないんだな」"
translation = "「그러고 보니, 오늘은 냐리온과 키리카 씨가 없네」"

[[dialogue]]
speaker = "フィオナ"
original = "「キリカは今日、実家でメイド隊への修練があるらしくて。ニャリオンは……星徒会室で仕事をすると張り切っていましたが、どうでしょう」"
translation = "「키리카는 오늘, 본가에서 메이드대 수련이 있는 것 같아서요. 냐리온은…… 성도회실에서 일을 하겠다고 의욕을 보였지만, 어떨까요」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ニャリオンはきっとサボってるわね」"
translation = "「냐리온은 분명 땡땡이치고 있을 거야」"

[[dialogue]]
speaker = "クロト"
original = "「少しは信用してあげてもいいんじゃないか？」"
translation = "「조금은 믿어줘도 되지 않을까?」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふふ。ですが、ニャリオンは呼ぼうと思えばいつでも呼べるのです。私の召喚獣ですから」"
translation = "「후후. 하지만, 냐리온은 부르려고 하면 언제든지 부를 수 있습니다. 저의 소환수니까요」"

[[dialogue]]
speaker = "unk"
original = "フィオナの星術は召喚に特化している。"
translation = "피오나의 성술은 소환에 특화되어 있다."

[[dialogue]]
speaker = "unk"
original = "その優秀さは前回の共闘を経てもよくわかったし、そばにいてくれると頼もしい。"
translation = "그 우수함은 지난번 공동 투쟁을 통해서도 잘 알았고, 곁에 있어 주면 든든하다."

[[dialogue]]
speaker = "クロト"
original = "「前回は確か……ヴィーナスが開けって手をかざしたら招かれたんだよな」"
translation = "「지난번에는 분명…… 비너스가 열라고 손을 댔더니 초대받았었지」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そうね！\u3000今回も私の腕前にまっかせなさい♪」"
translation = "「맞아! 이번에도 내 솜씨에 맡기라구♪」"

[[dialogue]]
speaker = "フィオナ"
original = "「少々お待ちを。その前に、連絡を済ませておいたほうがよいかと思われます。前回は中へ入ると……電波が閉ざされてしまいましたから」"
translation = "「잠시 기다려 주세요. 그전에, 연락을 해두는 편이 좋을 것 같습니다. 지난번에는 안으로 들어가자…… 전파가 차단되어 버렸으니까요」"

[[dialogue]]
speaker = "クロト"
original = "「わかった。新星のみんなには俺から連絡しておくよ」"
translation = "「알았어. 신성 애들에게는 내가 연락해 둘게」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「よろしくー♪」"
translation = "「잘 부탁해ー♪」"

[[dialogue]]
speaker = "unk"
original = "と、俺は懐から<ruby>ＤＩＳＣ<rt>ディスク</rt></ruby>を取り出した──のだが──"
translation = "라고, 나는 품에서 디스크를 꺼냈──는데──"

[[dialogue]]
speaker = "ヴィーナス"
original = "「──っえ……！？\u3000これ──塔の──っ……！？」"
translation = "「──읏 에……!? 이거── 탑의──읏……!?」"

[[dialogue]]
speaker = "フィオナ"
original = "「……！\u3000私たちが、ここに立った時点で──」"
translation = "「……! 저희가, 여기에 선 시점에서──」"

[[dialogue]]
speaker = "クロト"
original = "「問答無用──ってことか……！」"
translation = "「묻지도 따지지도 않고──라는 건가……!」"

[[dialogue]]
speaker = "unk"
original = "想定外の強引な招待──"
translation = "예상 밖의 강제적인 초대──"

[[dialogue]]
speaker = "unk"
original = "そうして、俺たちはそのまま光に呑み込まれていった……。"
translation = "그렇게, 우리는 그대로 빛에 삼켜져 갔다……."

