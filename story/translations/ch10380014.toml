[[dialogue]]
speaker = "unk"
original = "第４話,妄想天使でもいいですか？,P"
translation = "제4화, 망상 천사라도 괜찮을까요?, P"

[[dialogue]]
speaker = "unk"
original = "最近、（いろんな意味で）イクシーから目が離せなくなっていた。"
translation = "최근, (여러 의미로) 이쿠시로부터 눈을 뗄 수 없게 되었다."

[[dialogue]]
speaker = "イクシリオン"
original = "「すみません、ブレンドコーヒーとクリームパイを──」"
translation = "「죄송합니다, 블렌드 커피와 크림 파이를──」"

[[dialogue]]
speaker = "イクシリオン"
original = "「クリームパイ……期間限定とろとろクリームパイ……とろとろのクリーム……」"
translation = "「크림 파이…… 기간 한정 걸쭉한 크림 파이…… 걸쭉한 크림……」"

[[dialogue]]
speaker = "ヨミ"
original = "（どうしてクリームパイを凝視しているんでしょうか？\u3000ハッ──まさかそういう意味で……？）"
translation = "（어째서 크림 파이를 응시하고 있는 걸까요? 핫── 설마 그런 의미로……？）"

[[dialogue]]
speaker = "ヨミ"
original = "（前々から思っていたのですけれど……イクシーさんって何だかとってもむっつりさんのような……？）"
translation = "（전부터 생각했습니다만…… 이쿠시 씨는 왠지 엄청난 음란꾸러기 같은……？）"

[[dialogue]]
speaker = "ヨミ"
original = "（いやいやいや！\u3000きっとわたしの心が汚れてるからそう感じるだけ……真面目なイクシーさんに限ってそんなことありません！\u3000心頭滅却、邪念必滅……！）"
translation = "（아니아니아니! 분명 내 마음이 더러워져서 그렇게 느껴질 뿐…… 성실한 이쿠시 씨가 그럴 리 없습니다! 심두멸각, 사념필멸……！）"

[[dialogue]]
speaker = "イクシリオン"
original = "（とろとろクリームパイがエッチに感じてしまったなんて、とても言えません……！）"
translation = "（걸쭉한 크림 파이가 야하게 느껴져 버렸다니, 도저히 말할 수 없어요……！）"

[[dialogue]]
speaker = "unk"
original = "他にも……"
translation = "외에도……"

[[dialogue]]
speaker = "イクシリオン"
original = "「刹那的な出会いをした若い男女……きっと２人はこの後ホテルに入ってあんなことやこんなことを……」"
translation = "「찰나적인 만남을 가진 젊은 남녀…… 분명 두 사람은 이 뒤에 호텔에 들어가서 이런 일이나 저런 일을……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「いえいえ、そんなこと小説に書いてないのに勝手に想像してはいけません。爽やかな青春を描いた作品なのですから……」"
translation = "「아뇨아뇨, 그런 건 소설에 쓰여 있지 않은데 멋대로 상상하면 안 됩니다. 상쾌한 청춘을 그린 작품이니까요……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「ムフフ……」"
translation = "「무후후……」"

[[dialogue]]
speaker = "モネ"
original = "「イクシーさん」"
translation = "「익시 씨」"

[[dialogue]]
speaker = "イクシリオン"
original = "「ひゃわっ！？\u3000どうされましたか？」"
translation = "「히얏!? 무슨 일이신가요?」"

[[dialogue]]
speaker = "モネ"
original = "「読書に夢中になっているところ邪魔をしてすみません。イクシーさんがこの前読みたい本と言っていた本が図書館に入ったので、その報告に」"
translation = "「독서에 열중하고 계신데 방해해서 죄송해요. 익시 씨가 저번에 읽고 싶다고 하셨던 책이 도서관에 들어와서, 그 보고를 하러」"

[[dialogue]]
speaker = "イクシリオン"
original = "「本当ですかっ、ありがとうございますっ」"
translation = "「정말인가요, 감사합니다」"

[[dialogue]]
speaker = "モネ"
original = "「あ、イクシーさんは今その小説を読んでるんですね。私も前に読んだんですけど、素敵なお話でした。淡泊ながら奥の深い描写に想像力が刺激されます」"
translation = "「아, 익시 씨는 지금 그 소설을 읽고 계시네요. 저도 전에 읽어봤는데, 멋진 이야기였어요. 담백하면서도 깊이 있는 묘사에 상상력이 자극돼요」"

[[dialogue]]
speaker = "イクシリオン"
original = "「ですよね。熱く退廃的な夜が目に浮かぶようで──」"
translation = "「그쵸. 뜨겁고 퇴폐적인 밤이 눈에 선해서──」"

[[dialogue]]
speaker = "モネ"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「はえ？」"
translation = "「하에?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「会長、ごきげんよう。私に何かご用ですか？」"
translation = "「회장님, 평안하신가요. 제게 무슨 용건이신가요?」"

[[dialogue]]
speaker = "unk"
original = "校舎裏でちょっと話そう"
translation = "교사 뒤편에서 좀 얘기하자"

[[dialogue]]
speaker = "イクシリオン"
original = "「はい、わかりました──って、ぇええっ、校舎裏！？」"
translation = "「네, 알겠습니다──라니, 에에에엑, 교사 뒤편!?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「そんな人目に付かない場所に呼び出すだなんて……昼間でも薄暗くって、声を出さなきゃバレない絶好のシチュエーション……！」"
translation = "「그런 남의 눈에 띄지 않는 장소로 불러내다니…… 낮이라도 어둑어둑해서, 소리를 내지 않으면 들키지 않을 절호의 시추에이션……!」"

[[dialogue]]
speaker = "イクシリオン"
original = "「そそそっ、そんないやらしいところ、いけませ～んっ！」"
translation = "「그그그, 그런 야한 곳, 안 돼요~옷!」"

[[dialogue]]
speaker = "unk"
original = "………………"
translation = "………………"

[[dialogue]]
speaker = "イクシリオン"
original = "「ハッ！？\u3000その、いやらしいというのは、エッチという意味ではなくて──」"
translation = "「핫!? 그, 야하다는 건, 엣찌한 의미가 아니라──」"

[[dialogue]]
speaker = "unk"
original = "エッチな意味なんだよな？"
translation = "엣찌한 의미인 거지?"

[[dialogue]]
speaker = "イクシリオン"
original = "「あ……うぅ……そうです。私はエッチなことばかり……あと食べることしか考えていない、いやらしい女なんです……」"
translation = "「아…… 우으…… 맞아요. 저는 엣찌한 생각만…… 그리고 먹는 것밖에 생각하지 않는, 야한 여자예요……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「自分で言うのもなんですけど、人間界に来た頃は真面目な天使だったんです。ですが流星市国で偶然手にした少女漫画が……その、とても過激で」"
translation = "「제 입으로 말하긴 그렇지만, 인간계에 왔을 무렵에는 성실한 천사였답니다. 하지만 유성시국에서 우연히 손에 넣은 순정 만화가…… 그게, 무척 과격해서」"

[[dialogue]]
speaker = "イクシリオン"
original = "「それがきっかけで性的なものへの興味がどんどん強くなっていって……エッチな作品を集めるようになって……今ではよく妄想にふけるようになりました」"
translation = "「그게 계기가 되어서 성적인 것에 대한 흥미가 점점 강해져 갔고…… 야한 작품을 모으게 되어서…… 지금은 자주 망상에 빠지게 되었어요」"

[[dialogue]]
speaker = "イクシリオン"
original = "「お願いです、このことは誰にも言わないで──」"
translation = "「부탁이에요, 이 일은 아무에게도 말하지 말아주세요──」"

[[dialogue]]
speaker = "イクシリオン"
original = "「ハッ！？\u3000これは会長に弱みを握られて、エッチな要求をされる流れでは！？」"
translation = "「핫!? 이건 회장님에게 약점을 잡혀서, 야한 요구를 받게 되는 흐름인가요!?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「言うことを聞かないと秘密をバラすと脅されて、会長に命令されるまま服を脱いだり、ご奉仕をしたり……ごくり」"
translation = "「말을 듣지 않으면 비밀을 폭로하겠다고 협박당해서, 회장님이 명령하는 대로 옷을 벗거나, 봉사를 하거나…… 꿀꺽」"

[[dialogue]]
speaker = "unk"
original = "そういうことしてみたい？"
translation = "그런 거 해보고 싶어?"

[[dialogue]]
speaker = "イクシリオン"
original = "「へ……？」"
translation = "「헤……?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「とてもお恥ずかしい話なんですが……本心で言うと……」"
translation = "「무척 부끄러운 이야기입니다만…… 본심을 말하자면……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「してみたい……です」"
translation = "「해보고…… 싶어요」"

[[dialogue]]
speaker = "イクシリオン"
original = "「お外で裸になったり、エッチな命令をされたり、大人のおもちゃを使ったり……したいです」"
translation = "「야외에서 알몸이 되거나, 야한 명령을 받거나, 성인용 장난감을 쓰거나…… 하고 싶어요」"

[[dialogue]]
speaker = "unk"
original = "なら俺がイクシーの相手をする！"
translation = "그럼 내가 익시의 상대가 되어 줄게!"

[[dialogue]]
speaker = "イクシリオン"
original = "「えええぇ～～～～～っ！！？」"
translation = "「에에에에～～～～～엣!!?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「会長が、私の……それは、その……嬉しいです。ありがとうございます……」"
translation = "「회장님이, 저의…… 그건, 그…… 기뻐요. 감사합니다……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「でもいいんですか？\u3000私、とってもいやらしい女の子ですから、会長が付き合いきれなくなってしまうかもしれませんよ？」"
translation = "「하지만 괜찮으시겠어요? 저, 무척 야한 여자아이니까, 회장님이 감당하지 못하게 되어버릴지도 몰라요?」"

[[dialogue]]
speaker = "unk"
original = "イクシーのこと好きだから大丈夫"
translation = "익시를 좋아하니까 괜찮아"

[[dialogue]]
speaker = "イクシリオン"
original = "「～～～～～っ」"
translation = "「～～～～～읏」"

[[dialogue]]
speaker = "イクシリオン"
original = "「そんなに真っ直ぐに言われたら、恥ずかしくなってしまいます……いやらしい意味ではなくて」"
translation = "「그렇게 똑바로 말씀하시면, 부끄러워져 버려요…… 야한 의미가 아니라」"

[[dialogue]]
speaker = "イクシリオン"
original = "「じゃあ……不束者ですがよろしくお願いします、会長」"
translation = "「그럼…… 부족한 사람이지만 잘 부탁드립니다, 회장님」"

