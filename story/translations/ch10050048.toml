[[dialogue]]
speaker = "unk"
original = "ハロウィンパーティーをみんなで楽しんだ後、盛り上がった勢いで俺とソフィはリゾート結界のプライベートビーチにやってきていた。"
translation = "할로윈 파티를 모두 함께 즐긴 후,달아오른 기세로 나와 소피는 리조트 결계의 프라이빗 비치에 와 있었다."

[[dialogue]]
speaker = "ソフィア"
original = "「んんっ、ちゅ……ちゅ、んん……ふ……ちゅぷ……んんんっ……<emoji=heart04>」"
translation = "「응응, 츕…… 츕, 응응…… 후…… 츕읍…… 응응응……<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
original = "「ちゅぷ、ちゅ、ん、んっ……んふ、ちゅ……はぁ……会長さん……んんんっ……<emoji=heart04>」"
translation = "「츕읍, 츕, 응, 응…… 응후, 츕…… 하아…… 회장군…… 응응응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "浜辺に設置されたコテージに入ると同時に、ソフィと濃厚なキスを交わす。"
translation = "해변에 설치된 코티지에 들어서자마자, 소피와 농후한 키스를 나눈다."

[[dialogue]]
speaker = "ソフィア"
original = "「えへへ……２人きりです……<emoji=heart04>\u3000ここなら思う存分、いちゃいちゃできますね……<emoji=heart04>」"
translation = "「에헤헤…… 단둘이네요……<emoji=heart04> 여기라면 마음껏, 꽁냥거릴 수 있겠어요……<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
original = "「見てください、目の前に広がる海……とっても開放的な気分です……」"
translation = "「보세요, 눈앞에 펼쳐진 바다…… 너무나 개방적인 기분이에요……」"

[[dialogue]]
speaker = "クロト"
original = "「そうだな。だったらこの開放的な気分にまかせて……しちゃう……？」"
translation = "「그렇네. 그렇다면 이 개방적인 기분에 맡겨서…… 할까……?」"

[[dialogue]]
speaker = "ソフィア"
original = "「ええ、いいですよ……」"
translation = "「네, 좋아요……」"

[[dialogue]]
speaker = "ソフィア"
original = "「ちょ、待ってください……誰も見ていないからって、何て格好をさせるんですか！」"
translation = "「잠, 잠깐만요…… 아무도 안 본다고, 무슨 꼴을 시키는 거예요!」"

[[dialogue]]
speaker = "unk"
original = "俺はソフィの両腿を後ろから抱えるようにして、その小さな身体を持ち上げる。"
translation = "나는 소피의 양쪽 허벅지를 뒤에서 안듯이 하여, 그 작은 몸을 들어 올린다."

[[dialogue]]
speaker = "unk"
original = "それによって、ソフィの可愛らしい性器が大胆に露出された。"
translation = "그로 인해, 소피의 사랑스러운 성기가 대담하게 노출되었다."

[[dialogue]]
speaker = "クロト"
original = "「ソフィはこういうの、好きだろう……？」"
translation = "「소피는 이런 거, 좋아하잖아……?」"

[[dialogue]]
speaker = "ソフィア"
original = "「そ、そんなことありませんよ……私は至ってマトモですからね」"
translation = "「그, 그런 거 아니에요…… 저는 지극히 정상이라고요」"

[[dialogue]]
speaker = "クロト"
original = "「でもエッチの時に、ソフィにちょっと恥ずかしい思いをさせると、ものすごく反応が良くなるから……」"
translation = "「하지만 섹스할 때, 소피에게 조금 부끄러운 기분을 느끼게 하면, 반응이 엄청 좋아지니까……」"

[[dialogue]]
speaker = "ソフィア"
original = "「ぅ……」"
translation = "「읏……」"

[[dialogue]]
speaker = "クロト"
original = "「愛液もたくさん流して、締まりもよくなって……分かってるんだからね？\u3000ソフィが羞恥に喜んじゃうＭ気質なんだって」"
translation = "「애액도 잔뜩 흘리고, 조임도 좋아지고…… 알고 있다니까? 소피가 수치심에 기뻐하는 M 기질이라는 걸」"

[[dialogue]]
speaker = "ソフィア"
original = "「もう、それ以上は言わないでください……」"
translation = "「이제, 그 이상은 말하지 말아주세요……」"

[[dialogue]]
speaker = "クロト"
original = "「認めないと、入れてあげないよ」"
translation = "「인정하지 않으면, 넣어주지 않을 거야」"

[[dialogue]]
speaker = "ソフィア"
original = "「それは嫌です！\u3000会長さんのおち○ちん……入れて欲しいです……<emoji=heart04>」"
translation = "「그건 싫어요! 회장군의 자지…… 넣어줬으면 좋겠어요……<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
original = "「分かりました、認めます！\u3000私は恥ずかしいことをさせられて喜んでしまう、Ｍな女の子ですっ」"
translation = "「알겠어요, 인정할게요! 저는 부끄러운 일을 당하고 기뻐하는, M인 여자애예요!」"

[[dialogue]]
speaker = "クロト"
original = "「ちゃんと言えたね、ご褒美だよ」"
translation = "「제대로 말했네, 포상이야」"

[[dialogue]]
speaker = "ソフィア"
original = "「っ……あ、うううううううっ……！！！」"
translation = "「윽…… 아, 으으으으으으으으윽……!!!」"

[[dialogue]]
speaker = "ソフィア"
original = "「はぁ、あ……あぁぅ……おま○こに……おち○ちん……突き立っちゃいました……<emoji=heart04>」"
translation = "「하아, 아…… 아아으…… 보지에…… 자지…… 박혀버렸어요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "抱えていた身体を落とすと、待ち構えるようにそそり立っていたペニスが、彼女の秘部を一気に貫いた。"
translation = "안고 있던 몸을 내려놓자, 기다리고 있던 것처럼 솟아 있던 페니스가, 그녀의 은밀한 부분을 단숨에 꿰뚫었다."

[[dialogue]]
speaker = "ソフィア"
original = "「あ……ぅ……はぁ、ん……この格好、だと……繋がってるところが……しっかり見えてしまいます……<emoji=heart04>」"
translation = "「아…… 으…… 하아, 응…… 이 자세, 라면…… 연결된 부분이…… 제대로 보여버려요……<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
original = "「こんなお外で……おち○ちんとおま○こが繋がり合ってるところを見せつけられて……んんぅっ……」"
translation = "「이런 바깥에서…… 자지와 보지가 서로 연결된 모습을 보여주게 되어서…… 응응으윽……」"

[[dialogue]]
speaker = "ソフィア"
original = "「それで……んくぅ……私のおま○こ……ますます濡れてきちゃってますぅ……<emoji=heart04>」"
translation = "「그래서…… 응윽…… 제 보지…… 더욱더 젖어버리고 있어요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "視線を結合部に落としながら、熱っぽい声で呻く。"
translation = "시선을 결합부에 떨어뜨리면서, 뜨거운 목소리로 신음한다."

[[dialogue]]
speaker = "クロト"
original = "「このまま、動かすよ……」"
translation = "「이대로, 움직일게……」"

[[dialogue]]
speaker = "ソフィア"
original = "「あっ、あっ……んっ、あ……ああっ、あ……あぁあ……んっ、あっ、ああ……<emoji=heart04>」"
translation = "「앗, 앗…… 응, 아…… 아앗, 아…… 아아아…… 응, 앗, 아아……<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
original = "「はあっ、あっ……感じ、てるっ……これじゃ、私……露出エッチ好きの変態って……認めざるを得なくなりますっ……<emoji=heart04>」"
translation = "「하앗, 앗…… 느끼고, 있어! 이래선, 저…… 노출 섹스 좋아하는 변태라고…… 인정할 수밖에 없게 돼요! <emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「いいと思うけど？\u3000開放的な気持ちに流されちゃっても……」"
translation = "「괜찮지 않아? 개방적인 기분에 휩쓸려도……」"

[[dialogue]]
speaker = "ソフィア"
original = "「いいん、ですか……？\u3000あっ、ああ……ん……このまま……気持ちよくなっても……んんんっ……」"
translation = "「괜찮은, 건가요……? 앗, 아아…… 응…… 이대로…… 기분 좋아져도…… 응응응윽……」"

[[dialogue]]
speaker = "クロト"
original = "「気にすることない、俺も気持ちよくなってるし……」"
translation = "「신경 쓸 거 없어, 나도 기분 좋아지고 있으니까……」"

[[dialogue]]
speaker = "ソフィア"
original = "「そう、ですか……んんっ……会長さんが、気持ちよくなってるなら……よかったぁ……<emoji=heart04>」"
translation = "「그렇, 군요…… 응응윽…… 회장군이, 기분 좋아지고 있다면…… 다행이다아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "身体を上下に揺さぶると、ソフィの体重がかかって膣の奥深くを刺激する。"
translation = "몸을 위아래로 흔들자, 소피의 체중이 실려 질의 깊은 곳을 자극한다."

[[dialogue]]
speaker = "ソフィア"
original = "「んんっ、うっ……はぁ……う……んんんっ……おま○この、奥の方……圧し潰される感じで……苦しいです……」"
translation = "「응응윽, 윽…… 하아…… 으…… 응응응윽…… 보지의, 안쪽이…… 짓눌리는 느낌이라…… 괴로워요……」"

[[dialogue]]
speaker = "ソフィア"
original = "「でも、この苦しさも……気持ちいい……おち○ちんでズンズンされるの、好きぃ……<emoji=heart04>」"
translation = "「하지만, 이 괴로움도…… 기분 좋아…… 자지로 쿵쿵 박히는 거, 좋아아……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「恥ずかしさは気にならなくなってきた……？」"
translation = "「부끄러움은 신경 쓰이지 않게 되었어……?」"

[[dialogue]]
speaker = "ソフィア"
original = "「いいえ……そんなの、まだ恥ずかしいです……でも、恥ずかしいほど気持ちよくなっちゃう……<emoji=heart04>」"
translation = "「아뇨…… 그런 거, 아직 부끄러워요…… 하지만, 부끄러울수록 기분 좋아져버려……<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
original = "「体が火照って仕方ないんです……んんっ、あっ……はぁ……あ、ああっ……<emoji=heart04>」"
translation = "「몸이 달아올라서 어쩔 수가 없어요…… 응응윽, 앗…… 하아…… 아, 아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
original = "「持ち上げられてるから身動きできなくって……でも、その窮屈な感じが……ものすごく、いい……んっ、ああっ……<emoji=heart04>」"
translation = "「들어 올려져 있어서 꼼짝 못 하겠는데…… 하지만, 그 답답한 느낌이…… 너무나, 좋아…… 응, 아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ソフィの興奮を示すように、結合部からは愛液があふれ出していた。"
translation = "소피의 흥분을 나타내듯이, 결합부에서는 애액이 넘쳐흐르고 있었다."

[[dialogue]]
speaker = "unk"
original = "と、不意にソフィの身体がブルブルッと大きく震える。"
translation = "그러자, 문득 소피의 몸이 부들부들 크게 떨린다."

[[dialogue]]
speaker = "クロト"
original = "「どうしたの？」"
translation = "「왜 그래?」"

[[dialogue]]
speaker = "ソフィア"
original = "「あ、あの……お腹の奥の方が、熱くて……」"
translation = "「아, 저기…… 배 안쪽이, 뜨거워서……」"

[[dialogue]]
speaker = "ソフィア"
original = "「会長さんにおま○こズボズボされてたら、だんだんおしっこがしたくなってきたかもしれません」"
translation = "「회장군에게 보지를 쑤컹쑤컹 당하고 있었더니, 점점 오줌이 마려워진 것 같아요」"

[[dialogue]]
speaker = "ソフィア"
original = "「すみません……一度、おち○ちんを抜いて……おしっこをさせてください……」"
translation = "「죄송해요…… 한 번, 자지를 빼고…… 오줌을 누게 해주세요……」"

[[dialogue]]
speaker = "unk"
original = "ソフィの言葉を聞きながら、強烈な欲望が湧き上がってくる。"
translation = "소피의 말을 들으면서, 강렬한 욕망이 솟아오른다."

[[dialogue]]
speaker = "クロト"
original = "「それ、興奮するよ……見せて欲しい……」"
translation = "「그거, 흥분되는데…… 보여줬으면 좋겠어……」"

[[dialogue]]
speaker = "ソフィア"
original = "「見せるって……まさか、おしっこするところをですか……？」"
translation = "「보여주다니…… 설마, 오줌 누는 모습을 말하는 건가요……?」"

[[dialogue]]
speaker = "unk"
original = "ソフィの疑問に頷く。"
translation = "소피의 의문에 고개를 끄덕인다."

[[dialogue]]
speaker = "ソフィア"
original = "「会長さん、どうしてそんな意地悪を言うんですかぁ……」"
translation = "「회장군, 왜 그런 심술궂은 말을 하는 거예요오……」"

[[dialogue]]
speaker = "クロト"
original = "「意地悪じゃないよ。恋人がエッチしながらおしっこを漏らしている姿を見たいんだ」"
translation = "「심술궂은 거 아니야. 연인이 섹스하면서 오줌을 지리는 모습을 보고 싶어」"

[[dialogue]]
speaker = "ソフィア"
original = "「そんなの見たがるなんて……んんっ……会長さんの方が、よほど変態じゃありませんかぁ……」"
translation = "「그런 걸 보고 싶어 하다니…… 응응윽…… 회장군이야말로, 훨씬 변태 아니에요오……」"

[[dialogue]]
speaker = "ソフィア"
original = "「ああっ、ん、んぅう……んんっ、はぁ……ぁ……そんな、刺激しないで……くださいぃ……」"
translation = "「아앗, 응, 응으으…… 응응윽, 하아…… 아…… 그런, 자극하지 말아…… 주세요오……」"

[[dialogue]]
speaker = "unk"
original = "その言葉を無視して、俺は膣内に与える刺激を強くする。"
translation = "그 말을 무시하고, 나는 질 내에 주는 자극을 강하게 한다."

[[dialogue]]
speaker = "ソフィア"
original = "「あっ、あっ、あああっ！\u3000んんっ、あっ！\u3000は、あああっ、や、んんっ……！」"
translation = "「앗, 앗, 아아앗! 응응윽, 앗! 하, 아아앗, 읏, 응응윽……!」"

[[dialogue]]
speaker = "ソフィア"
original = "「おち○ちん、そんなに……動かしたらっ……！\u3000我慢、出来なくなってしまいますっ……！\u3000んんっ、あ、あああっ！」"
translation = "「자지, 그렇게…… 움직이면! 참을, 수 없게 되어버려요! 응응윽, 아, 아아앗!」"

[[dialogue]]
speaker = "クロト"
original = "「我慢しなくていいよ。こんな大胆なことが出来る機会なんてないんだから」"
translation = "「참지 않아도 돼. 이렇게 대담한 일을 할 수 있는 기회는 없으니까」"

[[dialogue]]
speaker = "ソフィア"
original = "「あぁあ……んんっ……！\u3000そう、ですね……はぁっ、あ……！\u3000今なら、誰も、見ていませんから……んんんっ！」"
translation = "「아아아…… 응응윽……! 그렇, 네요…… 하앗, 아……! 지금이라면, 아무도, 보고 있지 않으니까…… 응응응윽!」"

[[dialogue]]
speaker = "ソフィア"
original = "「それにっ、んっ、あ、あ、ああっ……こんな思い切りっ、おま○この中から刺激されたら……ああっ！\u3000我慢できなくて、当然、ですっ……！」"
translation = "「게다가, 응, 아, 아, 아앗…… 이렇게 마음껏, 보지 속에서 자극받으면…… 아앗! 참을 수 없는 게, 당연, 해요!」"

[[dialogue]]
speaker = "ソフィア"
original = "「仕方ない、ですよね！\u3000んんっ、あっ、あ……ああっ……こんなのされたら、お漏らししちゃって、当然……っ、あ、あああっ！」"
translation = "「어쩔 수, 없잖아요! 응응윽, 앗, 아…… 아앗…… 이런 거 당하면, 오줌 지려버리는 게, 당연…… 앗, 아, 아아앗!」"

[[dialogue]]
speaker = "クロト"
original = "「このまま、続けちゃっても……いいのか……？」"
translation = "「이대로, 계속해도…… 괜찮은 거야……?」"

[[dialogue]]
speaker = "ソフィア"
original = "「はいっ……続けてくださいっ……あっ、あ、あぁあ、あっ、あ、ああっ！\u3000んんっ、あっ、ああっ、は、あ、んんっ、あ、ああっ！」"
translation = "「네! 계속해주세요! 앗, 아, 아아아, 앗, 아, 아앗! 응응윽, 앗, 아앗, 하, 아, 응응윽, 아, 아앗!」"

[[dialogue]]
speaker = "ソフィア"
original = "「苦しいけど、気持ちいいんです……んんっ、は、あぁっ、あっ、あ……はぁ、ああっ……！」"
translation = "「괴롭지만, 기분 좋아요…… 응응윽, 하, 아앗, 앗, 아…… 하아, 아앗……!」"

[[dialogue]]
speaker = "ソフィア"
original = "「だから、もっと……ああうっ、んっ、あっ、ああっ……おま○こ、もっといっぱい……攻めてくださいっ！」"
translation = "「그러니까, 더…… 아아윽, 응, 앗, 아앗…… 보지, 더 잔뜩…… 공격해주세요!」"

[[dialogue]]
speaker = "unk"
original = "ようやく素直になったソフィの期待に応えるように、俺は更にピストンを速める。"
translation = "드디어 솔직해진 소피의 기대에 부응하듯이, 나는 더욱 피스톤을 빠르게 한다."

[[dialogue]]
speaker = "ソフィア"
original = "「あぁうっ、ん、あ、ああんっ！\u3000はぁ、あ……ぅ、んぐぅ、ぅ……んっ、ぅ、あああっ……<emoji=heart04>」"
translation = "「아아윽, 응, 아, 아앙! 하아, 아…… 으, 응그윽, 으…… 응, 으, 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
original = "「これ……イクと同時に……出ちゃいますっ！\u3000んんっ、あっ、あ、ああんっ……あ……おしっこ、びゅーびゅーって、噴いちゃいますっ！」"
translation = "「이거…… 갈 것과 동시에…… 나와버려요! 응응윽, 앗, 아, 아앙…… 아…… 오줌, 콸콸콸, 뿜어버릴 거예요!」"

[[dialogue]]
speaker = "ソフィア"
original = "「絶頂しながら、お漏らししたら……絶対気持ちいぃっ……んひ、ぅ、んんんっ……あ、はぁああっ<emoji=heart04>」"
translation = "「절정하면서, 오줌을 지리면…… 분명 기분 좋을 거야아…… 응히, 으, 응응응윽…… 아, 하아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
original = "「会長さんに見られるの、恥ずかしいけどっ<emoji=heart04>\u3000ああっ、あ、んぁあ、はぁっ、れもっ、気持ちいいの、とめられなぁいっっ<emoji=heart04>」"
translation = "「회장군에게 보이는 거, 부끄럽지만<emoji=heart04> 아앗, 아, 응아아, 하앗, 그래도, 기분 좋은 거, 멈출 수 없어엇<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ちゃんと見ててあげるから」"
translation = "「제대로 보고 있어 줄 테니까」"

[[dialogue]]
speaker = "ソフィア"
original = "「はひっ、見てて、くらはいっ……んぁっ、ああっ、あっ、あっ、ああっ<emoji=heart04>\u3000お漏らししながら、イクとこっ<emoji=heart04>」"
translation = "「하잇, 보고 있어, 주세욧…… 응앗, 아앗, 앗, 앗, 아앗<emoji=heart04> 오줌 지리면서, 가는 모습<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
original = "「会長さんにっ、おま○こイキながら、おしっこするとこ、見てもらひたいのっ！\u3000んんっ、あっ、あああっ、あ、あぁあっ、ん、あ、ああっ<emoji=heart04>」"
translation = "「회장군에게, 보지로 가면서, 오줌 누는 모습, 보여주고 시픈 걸! 응응윽, 앗, 아아앗, 아, 아아앗, 응, 아, 아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "尿意の苦しみと、絶え間なく与えられる快感に錯乱し、ソフィは徐々に呂律が回らなくなってきていた。"
translation = "요의의 괴로움과, 끊임없이 주어지는 쾌감에 착란하여, 소피는 점차 발음이 꼬이기 시작하고 있었다."

[[dialogue]]
speaker = "unk"
original = "一方で俺も、着実に欲望の限界点は迫ってきている。"
translation = "한편 나도, 착실하게 욕망의 한계점이 다가오고 있다."

[[dialogue]]
speaker = "ソフィア"
original = "「ああっ、あっ、あ、んんっ、んっ……あ、ああっ<emoji=heart04>\u3000あぁあ、あっ、や、んんぅ、く、んんぅ、あ、ああっ、あ、あ、ああっ<emoji=heart04>」"
translation = "「아앗, 앗, 아, 응응윽, 응…… 아, 아앗<emoji=heart04> 아아아, 앗, 읏, 응응으, 윽, 응응으, 아, 아앗, 아, 아, 아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
original = "「はあっ、はあっ、あっ、んんぅ……くぅ……あ、ああっ……おち○ちん、ビクビクしてきてるぅっ、んっ、あ、あああっ<emoji=heart04>」"
translation = "「하앗, 하앗, 앗, 응응으…… 으윽…… 아, 아앗…… 자지, 움찔움찔하고 있어엇, 응, 아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「っく……！」"
translation = "「윽……!」"

[[dialogue]]
speaker = "unk"
original = "息を噛み殺しながら、下腹部に力を籠める。"
translation = "숨을 삼키면서, 아랫배에 힘을 싣는다."

[[dialogue]]
speaker = "unk"
original = "せり上がってくる欲望がはじけ飛ぶ直前まで至り、タガが外れたようにペニスを膣壁にこすりつけた。"
translation = "솟아오르는 욕망이 터져 나가기 직전까지 이르러, 이성이 풀린 것처럼 페니스를 질벽에 문질렀다."

[[dialogue]]
speaker = "ソフィア"
original = "「あぁっ、ふぁ、ふ、はああっ<emoji=heart04>\u3000くりゅ、くりゅぅぅっ、んんっ<emoji=heart04>\u3000あ、ああっ、おち○ちんから、すごいの、きちゃうよぉっ<emoji=heart04>」"
translation = "「아앗, 하, 후, 하아앗<emoji=heart04> 크류, 크류으으윽, 응응윽<emoji=heart04> 아, 아앗, 자지에서, 대단한 거, 나와버릴 거 같아욧<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
original = "「はぁあっ、あっ、あああ……いっぱひ……そそひでくらはいっ<emoji=heart04>\u3000あっ、あ、ああっ<emoji=heart04>\u3000ん、あっ<emoji=heart04>\u3000あ、あ、ああ、あ、あああっ<emoji=heart04>」"
translation = "「하아앗, 앗, 아아아…… 잔뜩, 쏟아부어 주세욧<emoji=heart04> 앗, 아, 아앗<emoji=heart04> 응, 앗<emoji=heart04> 아, 아, 아아, 아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
original = "「ああ、あ、あ、あ、あ、あ、っぅ、あ、あああっ！\u3000や、イク、イク、イクぅ、あ～ぁ、イクぅっ！\u3000んん、あ、んぅ、は、あぁあああっ……」"
translation = "「아아, 아, 아, 아, 아, 아, 윽, 아, 아아앗! 읏, 간다, 간다, 가아, 아~아, 간다앗! 응응, 아, 응으, 하, 아아아아앗……」"

[[dialogue]]
speaker = "ソフィア"
original = "「ぁあああああああああああああ～～～～～～～～っ！！！」"
translation = "「아아아아아아아아아아아아아~~~~~~~앗!!!」"

[[dialogue]]
speaker = "unk"
original = "ソフィの膣内でペニスが激しく脈動する。"
translation = "소피의 질 내에서 페니스가 격렬하게 맥동한다."

[[dialogue]]
speaker = "unk"
original = "結合部を痛いほど締め付けられながら、それでも一滴残らず注ぎ込むためにピストンを続ける。"
translation = "결합부를 아플 정도로 조여오면서도, 단 한 방울도 남기지 않고 쏟아붓기 위해 피스톤을 계속한다."

[[dialogue]]
speaker = "unk"
original = "そして──"
translation = "그리고──"

[[dialogue]]
speaker = "ソフィア"
original = "「やぁ、あ、あああああーーーーーっ！！\u3000んぁ、う、あぁあああーーーーっ！！」"
translation = "「야아, 아, 아아아아아~~~~~앗!! 응아, 으, 아아아아아~~~~~앗!!」"

[[dialogue]]
speaker = "unk"
original = "俺に抱えられた状態のソフィの身体が、ぶるっぶるっと大きく震える。"
translation = "나에게 안긴 상태의 소피의 몸이, 부들부들 크게 떨린다."

[[dialogue]]
speaker = "unk"
original = "その直後、花びらの内側から、せきを切ったようにソフィの聖水が噴き出した。"
translation = "그 직후, 꽃잎 안쪽에서, 물꼬가 터진 것처럼 소피의 성수가 뿜어져 나왔다."

[[dialogue]]
speaker = "ソフィア"
original = "「あぁ、あ……ひぅ、ぅ……ぁ……ああああっ……！\u3000んんっ、あっ、あああっ……！！！」"
translation = "「아아, 아…… 히으, 으…… 아…… 아아아앗……! 응응윽, 앗, 아아앗……!!!」"

[[dialogue]]
speaker = "ソフィア"
original = "「あふぅ、ぅ……ぁああ……んんっ……おひっこ……れひゃったぁああぁ……<emoji=heart04>」"
translation = "「아흐으, 으…… 아아아…… 응응윽…… 오줌…… 지려버려써어아아아……<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
original = "「ずっと、我慢してたからぁ……きもひ、いいぃいっ……んんぅ、ぁ、ああああっ……<emoji=heart04>」"
translation = "「계속, 참고 이써써어…… 기분, 조아아아앗…… 응응으, 아, 아아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "絶頂の叫びを上げながらも、下腹部に力を込めて溢れ出すものを我慢しようとする。"
translation = "절정의 비명을 지르면서도, 아랫배에 힘을 주어 넘쳐흐르는 것을 참으려고 한다."

[[dialogue]]
speaker = "unk"
original = "だが、その衝動は抑制をいとも簡単に押し流してしまう。"
translation = "하지만, 그 충동은 억제를 너무나 쉽게 밀어내 버린다."

[[dialogue]]
speaker = "ソフィア"
original = "「会長さんのおち○ちんにイカされて……おしっこまで噴かされて……もうわらひ……なにもかんがへられなひぃ……<emoji=heart04>」"
translation = "「회장군의 자지에 가게 되어서…… 오줌까지 뿜게 되어서…… 이젠 나아…… 아무것도 생각할 수 업써어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "やがてソフィは耐えることを諦め、衝動に身を任せていた。"
translation = "이윽고 소피는 참는 것을 포기하고, 충동에 몸을 맡기고 있었다."

[[dialogue]]
speaker = "unk"
original = "その間も俺のペニスは、脈動を続けている。"
translation = "그동안에도 나의 페니스는, 맥동을 계속하고 있다."

[[dialogue]]
speaker = "unk"
original = "熱い液体を腹の中に送り込こまれ、その悦びによってソフィも放尿が止まらない。"
translation = "뜨거운 액체를 뱃속으로 주입당하고, 그 쾌락으로 인해 소피 역시 방뇨가 멈추지 않는다."

[[dialogue]]
speaker = "ソフィア"
original = "「あぁあっ、会長さんっ……おひっこしてるのに……それでも中にらすのやめてぇ……<emoji=heart04>」"
translation = "「아아앗, 회장님…… 오줌을 싸고 있는데도…… 그래도 안에 싸는 건 그만둬요오……<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
original = "「そんなことされたら……気持ちよすぎて死んじゃうっぅうう……<emoji=heart04>」"
translation = "「그런 짓을 당하면…… 너무 기분 좋아서 죽을 것 같아요으으으……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「俺だって、全部出し尽くすまで……止まらない……」"
translation = "「나도, 전부 다 쏟아낼 때까지…… 멈추지 않아……」"

[[dialogue]]
speaker = "ソフィア"
original = "「はぁ、ぅ……あああっ……ん……んぅ……ぁ……ああああっ……」"
translation = "「하아, 으윽……아아앗……응……응으윽……아……아아아앗……」"

[[dialogue]]
speaker = "unk"
original = "自身のどこにそれだけのものが詰まっていたのか不思議とも思えるほど、大量の白濁液を膣内で吐き出す。"
translation = "자신의 어디에 그토록 많은 것이 담겨 있었는지 신기하게 여겨질 정도로, 대량의 백탁액을 질 내에 토해낸다."

[[dialogue]]
speaker = "unk"
original = "ソフィは俺の射精に応えながら、口元を緩め、虚ろに瞳を漂わせながらおしっこを垂れ流し続けている。"
translation = "소피는 나의 사정에 호응하며, 입가를 풀고, 텅 빈 눈동자를 헤매게 하면서 오줌을 계속 흘려보내고 있다."

[[dialogue]]
speaker = "unk"
original = "そんな恋人の痴態に、俺は震えるほどの悦びを覚えるのだった。"
translation = "그런 연인의 추태에, 나는 떨릴 정도의 기쁨을 느끼는 것이었다."

