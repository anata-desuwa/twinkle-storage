[[dialogue]]
speaker = "unk"
original = "ミウと付き合い始めて３ヶ月。初体験の後も幾度と体を重ね、少しだけ新鮮味が失われてきた頃。"
translation = "미우와 사귀기 시작한 지 3개월. 첫 경험 후에도 수차례 몸을 겹쳐, 조금씩 신선함이 사라져 가던 무렵."

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「う～～ん……」"
translation = "「으~~음……」"

[[dialogue]]
speaker = "unk"
original = "いつものように行為を終えて着替えている最中、ミウは神妙な顔つきをしていた。"
translation = "여느 때처럼 행위를 마치고 옷을 갈아입던 중, 미우는 심각한 표정을 짓고 있었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「どうかした？」"
translation = "「무슨 일 있어?」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「会長さん、今日からしばらくの間、性行為を禁止しませんか？」"
translation = "「회장님, 오늘부터 당분간 성행위를 금지하지 않을래요?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「えっ……！？\u3000もしかして、飽きた……？\u3000それとも俺が下手だったとか……？」"
translation = "「엣……!? 설마 질린 거야……? 아니면 내가 서툴렀다든가……?」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「そ、そんなわけないです！\u3000会長さんとのえっちは、いつだってとても満足してます！」"
translation = "「그, 그럴 리 없잖아요! 회장님과의 섹스는 언제나 무척 만족하고 있어요!」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「いつも私の体を気遣ってくれますし、最後まで気持ちよくしてくれますし、終わった後に頭ナデナデしてくれますし……本当に最高なんですけど」"
translation = "「항상 제 몸을 배려해 주시고, 마지막까지 기분 좋게 해 주시고, 끝난 뒤에 머리 쓰담쓰담도 해주시고…… 정말 최고지만요.」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「統計によると、恋人関係はおよそ３ヶ月おきに倦怠期が訪れてしまうそうです」"
translation = "「통계에 따르면 연인 관계는 대략 3개월마다 권태기가 찾아온다고 해요.」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「ちょうど今日はその３ヶ月目だったことですし……マンネリを回避するためにもちょっとだけ禁欲をしてみてですね」"
translation = "「마침 오늘이 그 3개월째이기도 하고…… 매너리즘을 피하기 위해서라도 잠깐 금욕을 해보는 거죠.」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「今よりもっと気持ちよく……失神しちゃうくらいの快感……味わってみたくないですか？」"
translation = "「지금보다 훨씬 기분 좋은…… 실신해 버릴 정도의 쾌감…… 맛보고 싶지 않으세요?」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「性欲を我慢して、我慢して、我慢して……一気に解き放った時の快感は、毎日している時の何倍にもなるそうです」"
translation = "「성욕을 참고, 참고, 참아서…… 단숨에 해방했을 때의 쾌감은 매일 할 때의 몇 배나 된다고 하더라고요.」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「今だって十分気持ちいいのに、何倍にも膨れ上がったら頭が変になっちゃいそうですよね」"
translation = "「지금도 충분히 기분 좋은데, 몇 배로 부풀어 오르면 머리가 이상해질 것 같죠?」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「とりあえず、射精を１ヶ月我慢してみましょう。もちろんオナニーも禁止ですよ？」"
translation = "「우선 사정을 1개월 참아보죠. 물론 자위도 금지예요?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「１ヶ月も！？」"
translation = "「1개월이나!?」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「私だって会長さんと１ヶ月もエッチできないのも、オナニーできないのもツラいです。でも、私たちの明るい未来のため、今までで最高の頂に至るためです！」"
translation = "「저도 회장님과 1개월이나 섹스 못 하는 것도, 자위 못 하는 것도 괴로워요. 하지만 우리들의 밝은 미래를 위해, 지금까지 중 최고의 절정에 도달하기 위해서예요!」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「我慢できたら、その分、いっぱいサービスしますから頑張りましょう？\u3000ね？」"
translation = "「잘 참아내면 그만큼 서비스 듬뿍 해드릴 테니까 힘내요? 네?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「うーん……すごく気持ちいいっていうのも興味あるし、今までミウのプランニングにミスはないし……」"
translation = "「으음…… 엄청 기분 좋아진다는 것도 흥미롭고, 지금까지 미우의 플래닝에 실수는 없었으니까……」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「決まりですね！\u3000今日から１ヶ月間、頑張りましょう！」"
translation = "「결정됐네요! 오늘부터 1개월간 힘내봐요!」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「それじゃ、禁欲生活をする前に最後にもう１回だけ……エッチ納めです<emoji=heart04>」"
translation = "「그럼 금욕 생활을 하기 전에 마지막으로 한 번만 더…… 섹스 마무리예요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "こうして、俺とミウの１ヶ月の禁欲生活が始まった。"
translation = "이렇게 나와 미우의 1개월 금욕 생활이 시작되었다."

[[dialogue]]
speaker = "unk"
original = "この１ヶ月、星徒会の仕事が激務続きだったおかげで、一時的に性欲を忘れられたのは、ある意味幸いだった。"
translation = "이 1개월간 성도회 업무가 격무의 연속이었던 덕분에 일시적으로 성욕을 잊을 수 있었던 것은 어떤 의미에선 다행이었다."

[[dialogue]]
speaker = "unk"
original = "禁欲開始して１か月──念願の解禁日。"
translation = "금욕 시작 후 1개월── 염원하던 해금일."

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「はぁ……はぁっ……会長さん、ちゃんと禁欲、守り通しましたか……？」"
translation = "「하아…… 하앗…… 회장님, 금욕 잘 지키셨나요……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「何度も負けそうになったけど、なんとか……そういうミウこそ、抜け駆けしてないよね……？」"
translation = "「몇 번이나 굴복할 뻔했지만 어떻게든…… 정작 미우야말로 몰래 한 거 아니지……?」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「するわけ、ないじゃないですか……んぅっ……！\u3000私はちゃんと約束は守る子ですよ……はぁ、はぁっ……」"
translation = "「그럴 리가, 없잖아요…… 응읏……! 저는 약속은 꼭 지키는 아이라구요…… 하아, 하앗……」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「１ヶ月ぶりの会長さんのお家……すぅ……はぁ……すぅぅ……はぁぁん……<emoji=heart04>\u3000会長さんの臭い、スイッチ入っちゃいます……<emoji=heart04>」"
translation = "「1개월 만의 회장님 집…… 스으…… 하아…… 스으으…… 하아아앙……<emoji=heart04> 회장님 냄새, 스위치 켜져 버려요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「もう我慢できません。限界です。今すぐシます。会長さん、服を脱いでください。全部です。すっぽんぽんになってください」"
translation = "「더는 못 참겠어요. 한계예요. 지금 당장 해요. 회장님, 옷 벗어주세요. 전부 다요. 홀딱 벗어주세요.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あの……ミウ？\u3000目が据わってるけど……」"
translation = "「저기…… 미우? 눈빛이 매서운데……」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「い・い・か・ら、おち○ちん出して、ベッドに寝っ転がってください♪\u3000約束通り、た～～～っぷり搾り取ってあげますから。ね？\u3000ねっ？」"
translation = "「됐·으·니·까, 자지 내놓고 침대에 누워 주세요♪ 약속대로, 아아주 듬뿍 짜내 드릴 테니까요. 네? 네?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「え、待っ──うわぁーーっ！？」"
translation = "「에, 잠ㄲ──으아아악!?」"

[[dialogue]]
speaker = "unk"
original = "気がつくと、年下のミウに無理やり襲われているかのような体勢になっていた。"
translation = "정신을 차려 보니, 연하인 미우에게 억지로 덮쳐지는 듯한 태세가 되어 있었다."

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「ふふ、嫌なら別に抵抗してもいいんですよ？\u3000会長さんが本気出したら、私を振り払うなんて簡単だと思いますけど」"
translation = "「후후, 싫으면 따로 저항해도 된다고요? 회장님이 본심을 내면 저 같은 걸 뿌리치는 건 간단할 텐데 말이죠」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「そうしないってことは……会長さん、私に襲われたかったんですか？\u3000私みたいな小娘に負けちゃうんですね<emoji=heart04>」"
translation = "「그러지 않는다는 건…… 회장님, 저한테 습격당하고 싶었던 건가요? 저 같은 꼬마 아가씨한테 져버리는 거네요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "言い返そうにも、ミウに覆い被さられているこの状況に興奮を禁じ得ない。その証拠は下半身にありありと現れていた。"
translation = "말대꾸를 하려 해도 미우에게 깔려 있는 이 상황에 흥분을 금할 수 없다. 그 증거는 하반신에 여실히 드러나 있었다."

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「あれ？\u3000会長さんのおち○ちん、こんなに大きかったでしょうか……？\u3000元からかなり大きかったとは思いますけど、今日は特に太くて、硬ぁくなってる気が……」"
translation = "「어라? 회장님 자지, 이렇게 컸었나요……? 원래부터 꽤 컸던 것 같기는 한데, 오늘은 특히 굵고, 따악딱해진 기분이……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「１ヶ月も溜め込んでたら、大きくもなるって……！」"
translation = "「한 달이나 쌓아두면 커지기도 한다고……!」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「そういうものなんですね。ちゃんと我慢してたみたいで、おち○ちんえらいえらいです。なぁでなぁで、しこしこ<emoji=heart04>」"
translation = "「그런 거군요. 착하게 잘 참은 것 같아서 자지 착하다 착해예요. 쓰담쓰담, 슥삭슥삭<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「わっ、軽ぅく撫でただけなのに、割れ目から我慢汁がいっぱい溢れちゃってます。すっごく熱いですね。手が火傷しちゃいそうです」"
translation = "「와, 살짝 쓰다듬었을 뿐인데 갈라진 틈에서 쿠퍼액이 잔뜩 넘쳐흐르고 있어요. 엄청 뜨겁네요. 손이 데어버릴 것 같아요」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「タマタマもおっきいですよね……この中に１ヶ月寝かせた精子が、いっぱい詰まってるんだぁ……なぁで、なぁで、しぃこ、しぃこ」"
translation = "「불알도 커다랗네요…… 이 안에 한 달 동안 묵혀둔 정자가 잔뜩 들어있구나…… 쓰담, 쓰담, 슥삭, 슥삭」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くぅっ！\u3000ちょっ……ミウ、それヤバすぎっ……！」"
translation = "「크윽! 잠ㄲ…… 미우, 그거 너무 위험해……!」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「ヤバすぎって何ですかぁ？\u3000ちょっとシコシコしただけなのに、イッちゃいそうってことですかぁ？」"
translation = "「위험하다니 뭐가요? 조금 핸드잡 해줬을 뿐인데, 가버릴 것 같다는 건가요?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くっ……あっ……！\u3000イッ、イキそうっ……！」"
translation = "「큭…… 앗……! 가, 갈 것 같아……!」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「こんな簡単に？\u3000おち○ちんシコシコされただけで？\u3000男の人の体って不思議だらけで面白いです<emoji=heart04>\u3000いいですよ、イッちゃっても<emoji=heart04>」"
translation = "「이렇게 간단히? 자지를 슥삭슥삭 당한 것만으로요? 남자 몸은 불가사의한 것투성이라 재밌네요<emoji=heart04> 좋아요, 가버려도<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「しこ、しこ、しこ、しこ<emoji=heart04>\u3000このまま、私の手の中に、気持ちよぉく、精液を出しちゃってもいいって言ってるんです」"
translation = "「슈욱, 슈욱, 슈욱, 슈욱<emoji=heart04> 이대로 제 손안에 기분 좋게 정액을 내보내도 좋다고 말하는 거예요」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「びゅーっ<emoji=heart04>\u3000びゅーっ<emoji=heart04>\u3000びゅーって<emoji=heart04>\u3000我慢精子がたぁっぷり出るんでしょうねー<emoji=heart04>」"
translation = "「뷰릇<emoji=heart04> 뷰릇<emoji=heart04> 뷰릇하고<emoji=heart04> 참아왔던 정자가 타아아아아아아암뿍 나오겠네요ー<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「ちなみにですけど、私、今日は安全日なんです<emoji=heart04>」"
translation = "「참고로 말하는 거지만, 저 오늘 안전일이에요<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「せっかく、膣内に出しても大丈夫な日なのに、お手々に無駄打ちしちゃうなんて、もったいない気がしますけど」"
translation = "「모처럼 질 안에 내보내도 괜찮은 날인데, 손에 무다우치해버리는 건 아깝다는 생각이 드네요」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「でも、会長さんは、私の手に出したいんですよねー？\u3000それでいいなら、いいですよ。射精しちゃいましょ<emoji=heart04>」"
translation = "「하지만 회장님은 제 손에 내보내고 싶은 거죠ー? 그걸로 괜찮다면 괜찮아요. 사정해버려요<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ッぐぅぅ……！\u3000今のは、ズルいって……！」"
translation = "「윽구우우……! 방금 건 반칙이라니까……!」"

[[dialogue]]
speaker = "unk"
original = "暴発寸前まで込み上げてきた絶頂を、気合と根性でせき止める。"
translation = "폭발 직전까지 치밀어 오른 절정을 기합과 근성으로 막아낸다."

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「えー？\u3000何がズルいんでしょう？\u3000愛しい彼氏さんのおち○ちんを気持ちよくしてあげたいだけですよ<emoji=heart04>」"
translation = "「에ー? 뭐가 반칙이라는 걸까요? 사랑스러운 남자친구의 자지를 기분 좋게 해주고 싶을 뿐이에요<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「く……ミウとセックスするために我慢してきたんだから、無駄撃ちなんてさせないでくれ……！」"
translation = "「큭…… 미우랑 섹스하기 위해서 참아온 거니까, 허무하게 쏘게 만들지 말아줘……!」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「んっ……ふふ、その切ない声、ぞくぞくしちゃいます<emoji=heart04>\u3000それなら、会長さんのご希望通り、入れちゃいましょうか」"
translation = "「응…… 후후, 그 애절한 목소리, 전율이 돋아버려요<emoji=heart04> 그렇다면 회장님의 희망대로 넣어버릴까요」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「会長さんはそのままじっとしててください。いつもは会長さんにいっぱい動いてもらってますから、今日は私が頑張っちゃいます」"
translation = "「회장님은 그대로 가만히 계세요. 평소에는 회장님이 잔뜩 움직여주시니까, 오늘은 제가 힘낼게요」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「ふふっ、会長さんのおち○ちん、石みたいにカッチカチです……これなら手なんて添えなくても、簡単に入っちゃいますね……」"
translation = "「후후, 회장님의 자지, 돌처럼 딱딱해요…… 이 정도면 손을 대지 않아도 간단히 들어가겠네요……」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「禁欲でとろっとろになってるおま○こに、直接、生で……ぬぷぬぷぅって……<emoji=heart04>\u3000はぁっ、久しぶりの、おち○ちんさん……お帰りなさぁい<emoji=heart04>」"
translation = "「금욕으로 녹아내리고 있는 보지에 직접 생으로…… 눅진눅진하게……<emoji=heart04> 하아, 오랜만의 자지님…… 어서 오세요<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「あ、そうです、会長さん。膣内に出してもいい日って言いましたけど……女の子の言葉、そんな簡単に信じない方が良いですよー？\u3000特に私のは<emoji=heart04>」"
translation = "「아, 맞다 회장님. 질 안에 내보내도 좋은 날이라고 말했지만…… 여자의 말, 그렇게 간단히 믿지 않는 편이 좋다구요? 특히 제 말은<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──え？\u3000それって──くぅうぅぅっ！？」"
translation = "「──에? 그건── 크으으윽!?」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「んっっっ<emoji=heart04>\u3000ぁはあぁあぁああぁっ……<emoji=heart04>」"
translation = "「응으으윽<emoji=heart04> 아하아아아아아악……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「あ、あぁ、ひ、久しぶりの感触ぅっ……やっぱり、これ……これ好きですっ……会長さんのおち○ちん好きぃっ<emoji=heart04>」"
translation = "「아, 아아, 오, 오랜만의 감촉…… 역시, 이거…… 이거 좋아요…… 회장님의 자지 좋아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「んんぅっ<emoji=heart04>\u3000んっ、んぁぁ、はぁーっ、あっ、もっと、もっと……擦っちゃいます、膣奥でぐりぐりしちゃいますっ……<emoji=heart04>」"
translation = "「응으윽<emoji=heart04> 응, 응아아, 하아, 앗, 좀 더, 좀 더…… 비벼버릴게요, 질 안쪽에서 구리구리 해버릴게요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「私も、すっごくきもち、いいですっ……<emoji=heart04>\u3000前より、挿入感を、強く感じられて……んんっ<emoji=heart04>\u3000間を空けると、こんなにきもちよくなれちゃうんですねっ？」"
translation = "「저도, 엄청 기분, 좋아요……<emoji=heart04> 전보다, 삽입감을, 강하게 느껴져서…… 응윽<emoji=heart04> 텀을 두면, 이렇게나 기분 좋아질 수 있는 거네요?」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「あまり動かなくても、会長さんのおち○ちん、どくんどくんしてっ……入れてるだけで、きもちよくなっちゃいます」"
translation = "「별로 움직이지 않아도, 회장님의 자지, 두근두근거려서…… 넣고 있는 것만으로도, 기분 좋아져 버려요」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「あっ……おち○ちん、私の中で膨らんでますね<emoji=heart04>\u3000ちょっとしか動いてないのに、もう出ちゃうんですか？」"
translation = "「앗…… 자지, 제 안에서 부풀어 오르고 있네요<emoji=heart04> 조금밖에 안 움직였는데, 벌써 나와버리는 건가요?」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「これって射精の合図ですよね。遠慮しないでいいですよ。そのまま１発目、出しちゃってください<emoji=heart04>」"
translation = "「이거 사정의 신호죠. 사양하지 않아도 돼요. 그대로 첫 발, 싸버리세요<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ぐぅううぅぅっ……！」"
translation = "「구으으으읏……!」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「ぅんっ……！？\u3000あっ、あっ、出てますっ……精子っ……おち○ちんから、どっくん、どっくん、どっくん……<emoji=heart04>」"
translation = "「으응……!? 앗, 앗, 나오고 있어요…… 정자…… 자지에서, 울컥, 울컥, 울컥……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「んっ！\u3000ふぁ、あっ、あっ、すごぉい……おち○ちんが射精してるの、ちゃーんと伝わってきますよ<emoji=heart04>\u3000久しぶりのおま○こ、そんなに気持ちよかったんですね<emoji=heart04>」"
translation = "「응! 화, 앗, 앗, 대단해…… 자지가 사정하고 있는 거, 저어언혀 정해져서 전해져 오고 있어요<emoji=heart04> 오랜만의 보지, 그렇게 기분 좋았었군요<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「びゅーっ、びゅーっ、びゅーっ、びゅるるーって<emoji=heart04>\u3000射精って始まっちゃったら、もうどうやっても止められないんですもんね」"
translation = "「뷰릇, 뷰릇, 뷰릇, 뷰르르륵 하고<emoji=heart04> 사정이 시작돼 버리면, 이제 어떻게 해도 멈출 수 없는 거니까요」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「ふふ、おち○ちん気持ちいいですねー<emoji=heart04>\u3000会長さんの顔、とろっとろ……<emoji=heart04>\u3000射精してる時の顔って、無防備で、すっごく可愛いです……<emoji=heart04>」"
translation = "「후후, 자지 기분 좋네요―<emoji=heart04> 회장님 얼굴, 황홀해져서……<emoji=heart04> 사정하고 있을 때의 얼굴, 무방비해서, 정말 귀여워요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「もっともっと絞り出しましょ？\u3000出ーせっ、出ーせっ、おち○ちんがーんばろっ<emoji=heart04>」"
translation = "「좀 더 좀 더 짜내 볼까요? 나와라, 나와라, 자지 힘내라아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "１ヶ月ぶりの射精が収まるまで、俺は亀頭をミウの子宮口に押しつけ続けた。"
translation = "한 달 만의 사정이 가라앉을 때까지, 나는 귀두를 미우의 자궁구에 계속 밀어붙였다."

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「んっ……<emoji=heart04>\u3000まだびゅくびゅく出てますね……やっぱり、我慢し続けた分だけ、精液の量も多いんですね」"
translation = "「응……<emoji=heart04> 아직 울컥울컥 나오고 있네요…… 역시, 계속 참았던 만큼, 정액의 양도 많네요」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ご、ごめんっ……！\u3000我慢、できなくて……」"
translation = "「미, 미안……! 참을 수 없어서……」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「だから、気にしなくていいですって。私のおま○こが気持ち良くてイッてくれたんですから、彼女として冥利に尽きます、ふふ<emoji=heart04>」"
translation = "「그러니까, 신경 쓰지 않아도 된다니까요. 제 보지가 기분 좋아서 가버린 거니까, 여자친구로서 보람을 느껴요, 후후<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「せっかくなら一緒にイキたかったですけど……おち○ちん硬いままですし、まだまだ何度でもイケますよねー？」"
translation = "「이왕이면 같이 가고 싶었지만…… 자지가 딱딱한 그대로니까, 아직 몇 번이고 더 갈 수 있죠?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ちょ、ちょっと待って！\u3000イッたばかりだから、まだ敏感で……！」"
translation = "「자, 잠시만 기다려! 방금 갔으니까, 아직 민감해서……!」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「知ってますよ、イッちゃったばかりのおち○ちんを弄られるのってツラいんですよねー<emoji=heart04>」"
translation = "「알고 있어요, 막 가버린 자지를 괴롭히면 괴로운 법이죠~<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「でも、私を置いて、会長さんだけイッちゃったのってズルくないですか？」"
translation = "「그렇지만, 저를 두고 회장님만 가버린 건 치사하지 않나요?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「え、気にしなくていいって──」"
translation = "「에, 신경 쓰지 않아도 된다니──」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「気にしなくてもいいですけど、ちゃんと私のこともイカせてくれなきゃダメです。許してあげません<emoji=heart04>」"
translation = "「신경 안 써도 되지만, 제대로 저도 가게 해주지 않으면 안 돼요. 용서 안 해줄 거니까요<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「んぁーっ、はぁ、はーっ……きもちいいっ……<emoji=heart04>\u3000ぁん、奥から会長さんの精液、掻き出されちゃってます……もったいなぁい……<emoji=heart04>」"
translation = "「응아아, 하아, 하아…… 기분 좋아……<emoji=heart04> 하앙, 안쪽에서 회장님의 정액, 긁어내지고 있어요…… 아까워라……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「出ちゃった分、もう１回出してもらえばいいですよね。おま○こにもう１回、おかわり精子くださいね<emoji=heart04>」"
translation = "「나와버린 만큼, 한 번 더 나오게 하면 되겠죠. 보지에 한 번 더, 정자 리필해 주세요<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「ふふっ、会長さんの顔、かわいいです……♪\u3000イッちゃったばっかりのおち○ちんイジめられるのツラいんですか？」"
translation = "「후훗, 회장님 얼굴, 귀여워요……♪ 막 가버린 자지 괴롭힘당하는 거 괴로운가요?」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「私が上に乗って動いてるから、おち○ちん抜きたくても抜けないし、勝手に気持ちよくなっちゃいますもんね」"
translation = "「제가 위에 올라타서 움직이고 있으니까, 자지 빼고 싶어도 못 빼고, 멋대로 기분 좋아져 버리는 거네요」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「年上なのに会長さん、泣きそうな顔になっちゃってる……ぁん……ぞくぞくしちゃいます<emoji=heart04>\u3000会長さんのおかげで、新しい性癖に目覚めちゃいました<emoji=heart04>」"
translation = "「연상인데 회장님, 울 것 같은 얼굴이 돼버렸어…… 하앙…… 오싹오싹해요<emoji=heart04> 회장님 덕분에, 새로운 성벽에 눈떠버렸어요<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「はぁ、あっ……会長さんの乳首、ツンって勃って、女の子みたいで可愛いです<emoji=heart04>」"
translation = "「하아, 앗…… 회장님 유두, 쫑긋 서서, 여자아이 같아서 귀여워요<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「指でキュ～ッって摘んでコリコリ転がされるの、だぁい好きですよねー？\u3000会長さんのエッチな弱点、いっぱい覚えちゃいました」"
translation = "「손가락으로 뀨~ 하고 꼬집어서 조물조물 굴려지는 거, 저어엉말 좋아하죠? 회장님의 야한 약점, 잔뜩 외워버렸어요」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「あはっ、乳首弄ったら、おち○ちん復活してきました。そんなに気持ちいいんですね……会長さんってば、ヘ・ン・タ・イさん<emoji=heart04>」"
translation = "「아핫, 유두 괴롭혔더니 자지가 부활했어요. 그렇게 기분 좋은 거구나…… 회장님도 참, 변·태· 씨<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「んぁ、はっ、あんっ……乳首弄られながら、おち○ちんぢゅぷぢゅぷされたら、どうなっちゃいますー？」"
translation = "「응아, 핫, 하앙…… 유두 괴롭힘당하면서, 자지 쥬푿쥬푿 당하면, 어떻게 돼버려요?」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「はぁ、あっ……あっ……はぁ、ぁん……アツくて、カッチカチになって……いいとこ刺激、されてっ……はぁ、んぁぁ……<emoji=heart04>」"
translation = "「하아, 앗…… 앗…… 하아, 하앙…… 뜨거워서, 딱딱해져서…… 좋은 곳 자극, 당해서…… 하아, 응아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「あ、ぁ……私、上になって、自分でするの、好きなんです……自分で動けるからっ、きもちいいところ探せるのって、騎乗位のいいところですよね<emoji=heart04>」"
translation = "「아, 아…… 저, 위로 올라가서 직접 하는 거, 좋아해요…… 스스로 움직일 수 있으니까, 기분 좋은 곳을 찾을 수 있다는 게 기승위의 장점이죠<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「ぁ、あっ、あっ……会長さんにズンズンされる時と違うところに当たるからっ……はぁ、んっ……<emoji=heart04>」"
translation = "「아, 앗, 앗…… 회장님이 즈큥즈큥 밀어 넣을 때랑은 다른 곳에 닿으니까…… 하아, 응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「セックスって、禁欲の時間でも、体位でも、気持ち良さが全然変わるんですね……奥が深いです……これならマンネリなんて、しそうにないです」"
translation = "「섹스란 건, 금욕하는 시간이나 체위에 따라서 기분 좋음이 전혀 달라지네요…… 심오해요…… 이렇다면 매너리즘 같은 건 생길 것 같지 않아요」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「どうですか、会長さん、ぅんっ……！\u3000おま○この真ん中ら辺でね……腰をぐりぐりするとぉ……<emoji=heart04>\u3000んっ<emoji=heart04>\u3000どうです、私のおま○こ、きもちいいですか？」"
translation = "「어떠세요, 회장님, 응……! 보지 한복판쯤에서요…… 허리를 문질문질하면어……<emoji=heart04> 응<emoji=heart04> 어때요, 제 보지, 기분 좋은가요?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ！？\u3000くっ、ぁっ……腰使いがすごくて……ミウのおま○こ、ヤバいっ……！」"
translation = "「윽!? 큭, 아…… 허리 놀림이 대단해서…… 미우의 보지, 장난 아니야……!」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「ふふ、私のおま○こは、会長さんのおち○ちん専用ですから<emoji=heart04>」"
translation = "「후후, 제 보지는 회장님 자지 전용이니까요<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「会長さんにいっぱい愛されたおかげで、会長さんだけがきもちよぉくなれる、エッチなおま○こになっちゃったんですよぉ……」"
translation = "「회장님께 가득 사랑받은 덕분에, 회장님만이 기분 좋아질 수 있는 야한 보지가 되어버린 거예요……」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「会長さんだけの特製おま○こ……い～っぱい味わって……まだタマタマに詰まってる精子、ぜ～んぶ私の膣内に注いでください<emoji=heart04>」"
translation = "「회장님만의 특제 보지…… 마아아니 맛봐주세요…… 아직 불알에 꽉 차 있는 정액, 저어어언부 제 질 내에 쏟아주세요<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「んっ……はぁ、ふぁぁ……私もいい加減、我慢できなくなってるんで……１回、イカせてもらっちゃいますね」"
translation = "「응…… 하아, 화아…… 저도 이제 참을 수 없게 됐으니까…… 한 번, 가게 해줄게요」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「あっ、あっ、あぁーっ……<emoji=heart04>\u3000おち○ちん、きっ、きもひ、きもひいいですっ……<emoji=heart04>」"
translation = "「앗, 앗, 아아ー앗……<emoji=heart04> 자지, 기, 기분, 기분 조하여어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「ぐちゅぐちゅ、エッチな音立てて……すごく、興奮、しちゃいますねっ……んぁ、はっ、はぁあぁーっ<emoji=heart04>\u3000あっ、あぁん、んぁあぁっ<emoji=heart04>」"
translation = "「구츄구츄, 야한 소리 내면서…… 정말로, 흥분되네요…… 응아, 핫, 하아아ー앗<emoji=heart04> 앗, 아앙, 응아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「はぁ、あっ、キテる……きもちいいの、昇ってきてますっ……あ゛、あっ、もうイク、イッちゃいますねっ……<emoji=heart04>」"
translation = "「하아, 앗, 오고 있어…… 기분 좋은 게 올라오고 있어요…… 아, 앗, 이제 가, 가버릴게요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「んぁ、あ、ぁっ、いいっ、おち○ちんいいですっ<emoji=heart04>\u3000おま○こっ、イッちゃいますっ<emoji=heart04>\u3000イク、イクっイクっイクイックぅ……っっ<emoji=heart04><emoji=heart04>」"
translation = "「응아, 아, 앗, 좋아, 자지 좋아요<emoji=heart04> 보지이, 가버려요<emoji=heart04> 가, 가앗 가앗 가가각……윽윽<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「んっ<emoji=heart04>\u3000んぅ、ふぅぅううぅぅぅ～～ん<emoji=heart04>」"
translation = "「응<emoji=heart04> 응으, 후우우우우우우우우우운<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「ん、んぁ、はぁっ、はぁーっ……<emoji=heart04>\u3000１ヶ月ぶりに、イキまひたぁ……<emoji=heart04>\u3000はぁあぁっ、きもひ、いいれす……今日まで、我慢してて良かったぁ……<emoji=heart04>」"
translation = "「응, 응아, 하앗, 하아ー앗……<emoji=heart04> 한 달 만에 가버려떠요……<emoji=heart04> 하아아앗, 기분 조하여…… 오늘까지 참길 잘했다……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ミウのイク時の顔も、すっごく可愛かったよ……」"
translation = "「미우가 절정할 때 얼굴, 정말 귀여웠어……」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「えっ、やらぁ……私、変な顔、してましたよね……おち○ちん、きもちよすぎちゃって……エッチな顔見せるのは、会長さんだけですからね……？」"
translation = "「엣, 시러어…… 저, 이상한 얼굴 하고 있었죠…… 자지, 너무 기분 좋아버려서…… 야한 얼굴 보여주는 건 회장님뿐이니까요……?」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「はぁ、はぁーっ……１回だけじゃ足りないです……おま○こウズウズしっぱなしですよぉ……<emoji=heart04>\u3000１ヶ月分の快感って、こんなもんじゃないですよね……？」"
translation = "「하아, 하아ー앗…… 한 번으로는 부족해요…… 보지가 계속 근질거려요……<emoji=heart04> 한 달 치 쾌감이 이 정도로 끝나진 않겠죠……?」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「はぁ、はーっ、はーっ……<emoji=heart04>\u3000会長さんも一緒に動いて……おち○ちんで、私の体突き上げてくださいね<emoji=heart04>」"
translation = "「하아, 하ー앗, 하ー앗……<emoji=heart04> 회장님도 같이 움직여서…… 자지로 제 몸을 꿰뚫어 올려주세요<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「ひぁっ！？\u3000はっ、ん、ぅうぅーっ！？\u3000あっ、激ひぃ、会長さんっ……はっ、はぁんっ<emoji=heart04>」"
translation = "「히앗!? 핫, 응, 으으윽!? 앗, 격해여, 회장님…… 핫, 하앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「あっ、あっ、あっ<emoji=heart04>\u3000おち○ちん、きっ、きもひ、きもひいいよぉっ……<emoji=heart04>\u3000んぁ、はっ、はぁあぁーっ<emoji=heart04>\u3000あっ、あぁん、んぁあぁっ<emoji=heart04>」"
translation = "「앗, 앗, 앗<emoji=heart04> 자지, 기, 기분, 기분 조하요오……<emoji=heart04> 응아, 핫, 하아아ー앗<emoji=heart04> 앗, 아앙, 응아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「んぁ、あっ、あっあっあっ<emoji=heart04>\u3000やっぱ、一緒に動くと、気持ちいいですねっ、んんっ<emoji=heart04>\u3000そこ好き、好きっ、しゅきぃっ、大好きっ大好きだぁいしゅきぃっ<emoji=heart04>」"
translation = "「응아, 앗, 앗앗앗<emoji=heart04> 역시 같이 움직이니까 기분 좋네요, 응응<emoji=heart04> 거기 좋아, 좋아, 조아아, 너무 좋아 너무 좋아 저어엉말 조아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「はぁ、はっ、はぁっ、んぁ、はぁっ<emoji=heart04>\u3000子宮っ、こつん、こつんって、ノックされて、ますっ<emoji=heart04>」"
translation = "「하아, 핫, 하앗, 응아, 하앗<emoji=heart04> 자궁을 콩, 콩 하고 노크하고 이떠요<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「ふぁっ、あっ、んぁ、はあぁあんっ<emoji=heart04>\u3000もう、もう、私も限界れすっ<emoji=heart04>\u3000おま○こ、壊れちゃ、あっ、はぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>」"
translation = "「화앗, 앗, 응아, 하아앙앗<emoji=heart04> 이제, 이제 저도 한계예요어<emoji=heart04> 보지 망가져버려, 앗, 하앗<emoji=heart04> 앗<emoji=heart04> 아앙앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「ひぁあぁぁぁっ！？\u3000やっ、す、すご、ぞくぞく、や、あ、イッ、イッちゃう、またイッちゃいますっ……<emoji=heart04>」"
translation = "「히아아아앗!? 얏, 어, 대단해, 오싹오싹, 야, 아, 가, 가버려, 또 가버려요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「すっ、すごいのっ<emoji=heart04>\u3000今までで一番すごいの、キテます、ぞくぞくぞわぞわぁって、キテますぅっ……<emoji=heart04>」"
translation = "「대, 대단해<emoji=heart04> 지금까지 중에 제일 대단한 게 오고 있어요, 오싹오싹 소름 돋게 오고 이써요오……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ミウ、俺も、イキそうだっ……！」"
translation = "「미우, 나도 갈 것 같아……!」"

[[dialogue]]
speaker = "unk"
original = "絶頂寸前のラストスパートだ。ただ昇り詰めるためだけに腰を突き上げ、振り乱す。"
translation = "절정 직전의 라스트 스퍼트다. 그저 끝까지 도달하기 위해서만 허리를 쳐올리고 격렬하게 흔든다."

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「ひぅうぅんっ<emoji=heart04>\u3000おち○ちん膨らんでますっ<emoji=heart04>\u3000いっしょ、いっしょにイキたいですっ<emoji=heart04>\u3000会長さんのイッちゃう顔見ながら、イキますからっ、ねっ？\u3000ねっ？\u3000ねっ<emoji=heart04>」"
translation = "「히우우운<emoji=heart04> 자지가 부풀어 오르고 이떠요<emoji=heart04> 가치, 가치 가고 시퍼요<emoji=heart04> 회장님이 가는 얼굴 보면서 갈 테니까, 그쵸? 그쵸? 그쵸<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「次イクのは、いっしょ、いっしょがいいですぅ<emoji=heart04>\u3000そのままっ、中に、中に、精子、全部、出して、出して、出してくださぁい……<emoji=heart04>」"
translation = "「다음에 가는 건 가치, 가치가 조아요오<emoji=heart04> 그대로 안에, 안에 정액 전부 내보내, 내보내, 내보내주세에여……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「溜めてた精子、ぜぇんぶください……<emoji=heart04>\u3000子宮が精子っ、欲しがっちゃってますからぁ<emoji=heart04>\u3000会長さんの赤ちゃん欲しいって、孕みたいって、疼いてますからぁっ<emoji=heart04>」"
translation = "「모아둔 정액 저어언부 주세요……<emoji=heart04> 자궁이 정액을 원하고 있으니까아아 회장님 아기 갖고 싶다고, 임신하고 싶다고 욱신거리고 있으니까아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「んぁあっ、あ、ああっ──ああぁああぁぁんっ<emoji=heart04>\u3000出してっ<emoji=heart04>\u3000精子っ、いっぱい出してくらひゃぁい<emoji=heart04>」"
translation = "「응아앗, 아, 아앗── 아아아아앙앗<emoji=heart04> 내보내줘<emoji=heart04> 정액, 가득 내보내주세여어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「んぅっ、んっ<emoji=heart04>\u3000んぅんんんぅっ<emoji=heart04>\u3000んっ、んん、きもちいいのキテまふっ<emoji=heart04>\u3000私、んぁっ、イク、イッちゃう、イッちゃうぅっ<emoji=heart04>」"
translation = "「응으, 응<emoji=heart04> 응으으으윽<emoji=heart04> 응, 응응, 기분 좋은 게 오고 이써요어<emoji=heart04> 저, 응아, 가, 가버려, 가버려어엇<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「すごいの、クるっ、クる、キちゃ<emoji=heart04>\u3000はぁっ、はぁっ<emoji=heart04>\u3000あっ、あっ、あ――あぁあぁぁぁっ<emoji=heart04><emoji=heart04>」"
translation = "「대단한 게 와, 와, 와버려어<emoji=heart04> 하앗, 하앗<emoji=heart04> 앗, 앗, 아── 아아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「はぁ、はっ<emoji=heart04>\u3000あ、あっ、イキそ、ぁ<emoji=heart04>\u3000イッちゃう、イッちゃう、イク、イクイクイクイックぅうぅうぅぅっ<emoji=heart04><emoji=heart04>」"
translation = "「하아, 핫<emoji=heart04> 아, 앗, 갈 거 가타, 아<emoji=heart04> 가버려, 가버려, 가앗, 가앗가앗가가각우우우우우욱<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「んっ<emoji=heart04>\u3000ひぅっ、んっんぅ、んぅううぅぅぅんっっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응<emoji=heart04> 히웃, 응응으, 응으으으으으으으응으으윽<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「んぁあぁっ！？\u3000あっ、どくんっどくんってぇ……精子っ、感じるだけで、またっ──んぁぁぁぁぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「응아아앗!? 앗, 두근두근거려어…… 정액, 느껴지는 것만으로 또── 응아아아아아아~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「あっ、あっ、精子出っ放しじゃないですかぁ……おま○こっ、イクの止まんないですっ……<emoji=heart04>\u3000おち○ちんと一緒にイッちゃってますって……ぃんっ<emoji=heart04>\u3000んぅ、んんぅ～～っ<emoji=heart04>」"
translation = "「앗, 앗, 정액이 계속 나오고 있잖아요…… 보지, 가버리는 게 멈추지 않아여……<emoji=heart04> 자지랑 같이 가버리고 있다니깐요…… 이응<emoji=heart04> 응으, 응응으으윽<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「はーっ、はーっ、はぁぁーっ<emoji=heart04>\u3000こんなっ、連続で、んんっ<emoji=heart04>\u3000イッちゃう、なんてぇ……はぁっ、はぁっ……禁欲エッチ、きもち、よかったですっ……<emoji=heart04>」"
translation = "「하ー앗, 하ー앗, 하아아ー앗<emoji=heart04> 이렇게나 연속으로, 응응<emoji=heart04> 가버리다니…… 하앗, 하앗…… 금욕 섹스, 기분 좋았습니다……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「ふぁ……んぁ、あっ、ふぁぁっ……あった、かぁい……<emoji=heart04>\u3000はぅん……い～っぱい出ましたね……<emoji=heart04>」"
translation = "「화아…… 응아, 앗, 화아앗…… 따뜻해……<emoji=heart04> 하웅…… 가아아득 나왔네요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「私の体が、甘ぁい熱で満たされてるの、とぉっても幸せです……はぁ、好きっ……だぁい好きです、会長さん<emoji=heart04>」"
translation = "「제 몸이 달코옴한 열기로 가득 차 있는 거, 너어어무 행복해요…… 하아, 좋아…… 저어어어말 좋아해요, 회장님<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "膣内出しされた子宮の辺りを慈しむように撫でつつ、ミウはうっとりと蕩けた笑みを浮かべる。"
translation = "질 내 사정된 자궁 근처를 애지중지하듯 쓰다듬으며, 미우는 황홀하게 녹아내린 미소를 짓는다."

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「……あ、会長さん、もしかして、私が言ったこと気にしてます？\u3000『実は大丈夫な日じゃないかも』って。ちゃんと大丈夫な日だから、安心してくださいね」"
translation = "「……아, 회장님, 설마 제가 했던 말 신경 쓰고 있어요? 『사실은 안전한 날이 아닐지도 몰라』라는 거. 정말로 안전한 날이니까 안심하세요」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「気にしてないよ。大丈夫でも、大丈夫じゃなくても、添い遂げるって決めた子じゃなきゃ、こんなことしないし」"
translation = "「신경 안 써. 안전하든 아니든, 함께하기로 마음먹은 애가 아니면 이런 짓 안 하니까」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「ふふっ<emoji=heart04>\u3000会長さんなら、そう言ってくれるって信じてました。私のプラン通りです♪」"
translation = "「후훗<emoji=heart04> 회장님이라면 그렇게 말해줄 거라 믿었어요. 제 계획대로네요♪」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「でも、本当に大丈夫な日ですから、もっとしましょ？\u3000まだまだ私のおま○この中で硬いまんまですし……ほぉら、ほぉら」"
translation = "「그래도 정말 안전한 날이니까, 더 해요? 아직 제 보지 안에서 딱딱한 채 그대로고…… 자아, 자아」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ま、待って！\u3000もう少しだけ休憩させて──」"
translation = "「기, 기다려! 조금만 더 쉬게 해줘──」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「だぁめ、です♪\u3000会長さんの可愛いとこ、私だけにもっと見せてください<emoji=heart04>」"
translation = "「안 돼요♪ 회장님의 귀여운 모습, 저한테만 더 보여주세요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "１ヶ月の欲望をお互いの体で満たし、一滴残らず枯れ果てるまで。俺とミウは翌朝まで愛し合い続けたのだった。"
translation = "한 달 치의 욕망을 서로의 몸으로 채우고, 단 한 방울도 남지 않고 말라 비틀어질 때까지. 나와 미우는 다음 날 아침까지 계속해서 사랑을 나누었다."

