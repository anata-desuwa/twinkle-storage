[[dialogue]]
speaker = "unk"
original = "翌日。"
translation = "다음 날."

[[dialogue]]
speaker = "unk"
original = "俺は引き続き公安委員会の作戦に協力して、一般の人たちで賑わうリゾート結界で過ごしていると――"
translation = "나는 계속해서 공안위원회의 작전에 협력하며, 일반인들로 북적이는 리조트 결계에서 시간을 보내고 있자니──"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「会長～、ちょっとお願いがあるんだけど～♪」"
translation = "「회장~, 부탁이 좀 있는데~♪」"

[[dialogue]]
speaker = "unk"
original = "母さんとリコさんが海の家の方へ行っており、２人きりの時にマインが言い出した。"
translation = "엄마와 리코 씨가 바다의 집 쪽으로 가고, 둘만 남았을 때 마인이 말을 꺼냈다."

[[dialogue]]
speaker = "ネーゼマイン"
original = "「実はサンオイルを塗って欲しくて～」"
translation = "「사실 선 오일을 발라줬으면 해서~」"

[[dialogue]]
speaker = "unk"
original = "えぇっ！？"
translation = "에엣!?"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「にひひ♪\u3000そんな動揺しなくてもいいじゃ～ん」"
translation = "「니히히♪ 그렇게 당황하지 않아도 되잖아~」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「――今のリゾート結界は、デフォルトで紫外線カットがされているから必要ないのでは、って？」"
translation = "「──지금 리조트 결계는 디폴트로 자외선 차단이 되어 있으니까 필요 없지 않냐고?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「このサンオイル、今回の作戦の為に必要なんだよね～。特殊な成分で出来ててさ、体に塗ると星力の気配を消すことができるんだ」"
translation = "「이 선 오일, 이번 작전을 위해서 필요한 거거든~. 특수한 성분으로 만들어져서, 몸에 바르면 성력의 기척을 지울 수 있어.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「だけど、自分では背中とか塗りにくいじゃん？\u3000だから２人で協力したいな～って♪」"
translation = "「하지만 혼자서는 등 같은 데 바르기 힘들잖아? 그러니까 둘이서 협력하고 싶달까~♪」"

[[dialogue]]
speaker = "unk"
original = "せ、せめてプライベートビーチの方で……"
translation = "저, 적어도 프라이빗 비치 쪽에서……"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「大丈夫、周りを見てみなよ。カップルも多いし、イチャイチャしてるから、平気平気♪」"
translation = "「괜찮아, 주변을 봐봐. 커플도 많고 꽁냥거리고 있으니까, 괜찮아 괜찮아♪」"

[[dialogue]]
speaker = "unk"
original = "そんな感じで押し切られてしまったのだが――"
translation = "그런 느낌으로 밀어붙여지고 말았습니다만──"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「それじゃあ会長、私がサンオイル塗ってあげちゃうね～♪」"
translation = "「그럼 회장, 내가 선 오일 발라줄게~♪」"

[[dialogue]]
speaker = "unk"
original = "俺はマインの前で、ビーチマットの上にうつ伏せにさせられていた。"
translation = "나는 마인의 앞에서 비치 매트 위에 엎드려지게 되었다."

[[dialogue]]
speaker = "unk"
original = "なんで俺が塗られる側に！？"
translation = "왜 내가 발라지는 쪽인데!?"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「え～？\u3000塗って欲しいとは言ったけど、<b>私に</b>とは別に言ってないよ～？」"
translation = "「에~? 발라달라고는 했지만, <b>나한테</b>라고는 딱히 말 안 했는걸~?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「それとも～、会長は私の体にサンオイル塗ってみたかったのかな～？\u3000にひひ♪」"
translation = "「아니면~, 회장은 내 몸에 선 오일을 발라보고 싶었던 걸까나~? 니히히♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「じゃあ早速、サンオイルを会長の背中に垂らして～♪」"
translation = "「그럼 당장, 선 오일을 회장 등에 떨어뜨려서~♪」"

[[dialogue]]
speaker = "unk"
original = "ひゃんっ！"
translation = "히양!"

[[dialogue]]
speaker = "unk"
original = "オイルが冷やっとして、思わず声が出てしまう。"
translation = "오일이 차가워서 나도 모르게 소리가 나오고 만다."

[[dialogue]]
speaker = "ネーゼマイン"
original = "「にひっ♪\u3000会長ってば、可愛い声出しちゃって～。女の子みた～い<emoji=heart04>」"
translation = "「니힛♪ 회장도 참, 귀여운 소리를 내버리고~. 여자애 같아~<emoji=heart04>」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「そんな情けない会長には～、こっちの方がいいかな～？\u3000えいっ♪」"
translation = "「그런 한심한 회장에게는~, 이쪽이 더 나으려나~? 에잇♪」"

[[dialogue]]
speaker = "unk"
original = "背中に当たる感触に違和感があり、彼女の方を見てみると――"
translation = "등에 닿는 감촉에 위화감이 있어 그녀 쪽을 보니──"

[[dialogue]]
speaker = "unk"
original = "手じゃなくて『足』！？"
translation = "손이 아니라 『발』!?"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「だって～、手でするより面白そうじゃない？」"
translation = "「그게~, 손으로 하는 것보다 재밌을 것 같지 않아?」"

[[dialogue]]
speaker = "unk"
original = "マインは俺の体を跨ぐように立ちながらこちらを見下ろし、片足でオイルを塗り広げて行く。"
translation = "마인은 내 몸을 가로지르듯 서서 이쪽을 내려다보며, 한쪽 발로 오일을 펴 바르기 시작한다."

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ほ～ら、足でしてあげる<emoji=heart04>\u3000ヌリヌリ～♪」"
translation = "「자~아, 발로 해줄게<emoji=heart04> 반질반질~♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「この辺りもし～っかり、塗っておかないとね♪\u3000にひっ<emoji=heart04>」"
translation = "「이쪽도 꼬~옥, 발라둬야겠지♪ 니힛<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言って彼女の足の指が伸びて来た場所は、脇腹であった。"
translation = "그렇게 말하며 그녀의 발가락이 뻗어온 곳은 옆구리였다."

[[dialogue]]
speaker = "ネーゼマイン"
original = "「きゃはっ<emoji=heart04>\u3000またちょっと可愛い声が出たね～♪\u3000な～に？\u3000会長、もしかして脇腹弱いの～？」"
translation = "「캬핫<emoji=heart04> 또 귀여운 소리가 나왔네~♪ 뭐야? 회장, 설마 옆구리가 약한 거야~?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「うりうり～<emoji=heart04>\u3000んっ――きゃはははっ！\u3000喘いでる喘いでる～！\u3000そんな声出してたら、周りの人たちから注目されちゃうよ～？」"
translation = "「우릿우릿~<emoji=heart04> 응── 캬하하하! 헐떡인다 헐떡여~! 그런 소리 내고 있으면 주변 사람들한테 주목받아 버린다구~?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ほらほら<emoji=heart04>\u3000他の人たちもいる前で、年下の女の子に足で弄ばれて、どんな気持ち～？\u3000ねぇ、どんな気持ち～？」"
translation = "「자자<emoji=heart04> 다른 사람들도 있는 앞에서 연하의 여자애한테 발로 농락당하니까 기분이 어때~? 네~, 기분이 어떠냐구~?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「学園代表の星騎士なのに～、こんな程度で声を上げちゃうなんて、学園の生徒たちが見たら、どう思うかな～？」"
translation = "「학원 대표 성기사인데도~, 이 정도로 소리를 질러버리다니, 학원 학생들이 보면 어떻게 생각할까나~?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「雑魚ザコ、ざ～こ<emoji=heart04>\u3000ザコ会長<emoji=heart04>」"
translation = "「허접 자코, 자~코<emoji=heart04> 자코 회장<emoji=heart04>」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「はあぁっ……<emoji=heart04>\u3000会長の可愛い声聞いてると、背筋がゾクゾクしちゃう……！」"
translation = "「하아아……<emoji=heart04> 회장의 귀여운 소리를 들으니까 등줄기가 오싹오싹해져……!」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「随分とお楽しみのようだな、マイン？」"
translation = "「제법 즐거워 보이구나, 마인?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「おっと♪\u3000お２人共、もう戻って来ちゃいました～？」"
translation = "「오토♪ 두 분 다 벌써 돌아오셨나요~?」"

[[dialogue]]
speaker = "unk"
original = "気が付けば、リコさんと母さんが飲み物や食べ物を持って、帰って来ていた。"
translation = "어느샌가 리코 씨와 엄마가 음료와 음식을 들고 돌아와 있었다."

[[dialogue]]
speaker = "リノ"
original = "「なるほどね～、マインちゃんとクロトは、そんな感じの関係だったのね～」"
translation = "「그렇구나~, 마인짱이랑 쿠로토는 그런 느낌의 관계였구나~」"

[[dialogue]]
speaker = "unk"
original = "母さん、これには事情があって！"
translation = "엄마, 이건 사정이 있어서!"

[[dialogue]]
speaker = "リノ"
original = "「ふふっ、大丈夫よ、クロト。わかってるわ♪」"
translation = "「후훗, 괜찮아, 쿠로토. 알고 있단다♪」"

[[dialogue]]
speaker = "リノ"
original = "「お母さん、息子がМだとしても、ちゃんと理解して受け入れるから！」"
translation = "「엄마는 아들이 M이라고 해도 제대로 이해하고 받아들일 테니까!」"

[[dialogue]]
speaker = "unk"
original = "全然わかってないよ！？"
translation = "전혀 모르고 있잖아!?"

[[dialogue]]
speaker = "unk"
original = "サンオイルが今回の作戦に必要なものであることを話すと――"
translation = "선 오일이 이번 작전에 필요한 것이라는 이야기를 하자──"

[[dialogue]]
speaker = "リコリンフィア"
original = "「星力の気配を消すサンオイル？\u3000なんだそれは？」"
translation = "「성력의 기척을 지우는 선 오일? 그게 뭐냐?」"

[[dialogue]]
speaker = "unk"
original = "え？"
translation = "에?"

[[dialogue]]
speaker = "unk"
original = "ネーゼマインに視線を向けると、彼女は小さく舌を出してみせる。"
translation = "네제마인에게 시선을 돌리자, 그녀는 살짝 혀를 내밀어 보인다."

[[dialogue]]
speaker = "ネーゼマイン"
original = "「にひっ、会長、ごめ～ん！\u3000サンオイルの話、それ嘘なんだ☆」"
translation = "「니힛, 회장, 미안~! 선 오일 이야기, 그거 거짓말이야☆」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「せっかくの海だから、ちょっと悪戯したくなっちゃって～♪」"
translation = "「모처럼 바다니까 좀 장난치고 싶어져서~♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「でも、おかげでいいストレス発散になったから、ありがとね♪」"
translation = "「그래도 덕분에 좋은 스트레스 해소가 됐으니까 고마워♪」"

[[dialogue]]
speaker = "unk"
original = "ま、マイン～～～！！！"
translation = "마, 마인~~~~~!!!"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「あっ！\u3000きゃはははっ☆\u3000会長が怒った～！」"
translation = "「앗! 캬하하하☆ 회장이 화났다~!」"

[[dialogue]]
speaker = "unk"
original = "海の方へ逃げ出すマインを、俺は追いかける。"
translation = "바다 쪽으로 도망치는 마인을 나는 쫓아간다."

[[dialogue]]
speaker = "リノ"
original = "「あらあら、青春ね～♪」"
translation = "「어머어머, 청춘이네~♪」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「ふっ……」"
translation = "「훗……」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「マインがあんな顔をするとはな」"
translation = "「마인이 저런 표정을 지을 줄이야」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「私、こう見えても逃げ足には自信があるんだけど、会長は捕まえられるかな～？」"
translation = "「나, 이래 봬도 도망치는 데는 자신 있는데, 회장은 잡을 수 있을까나~?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「でも、もし捕まえられたら、私にもオイル塗ってくれてもいいよ～？」"
translation = "「하지만 만약 잡는다면, 나한테도 오일 발라줘도 된다구~?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「会長がしたいならだけど<emoji=heart04>\u3000にひひ♪」"
translation = "「회장이 하고 싶다면 말이지<emoji=heart04> 니히히♪」"

[[dialogue]]
speaker = "unk"
original = "砂浜で追いかけっこをしながら、楽しそうな悪戯スマイルを浮かべるマインなのだった――"
translation = "백사장에서 추격전을 벌이며 즐거운 듯 장난기 가득한 미소를 짓는 마인이었다──"

[[dialogue]]
speaker = "unk"
original = "一方、離れた場所から、その様子を監視している者たちがいた――"
translation = "한편, 떨어진 곳에서 그 모습을 감시하는 자들이 있었다──"

[[dialogue]]
speaker = "怪人"
original = "「ククッ……自ら出張って来たか、リコリンフィア」"
translation = "「크크…… 스스로 발을 들였나, 리코린피아.」"

[[dialogue]]
speaker = "部下"
original = "「どうしますか？\u3000もう仕掛けてしまいますか、ヤハト様」"
translation = "「어떡할까요? 이미 시작해 버릴까요, 야하토 님.」"

[[dialogue]]
speaker = "unk"
original = "水着姿の成人男性が、怪人に尋ねる。"
translation = "수영복 차림의 성인 남성이 괴인에게 묻는다."

[[dialogue]]
speaker = "ヤハト"
original = "「いや、まだだ。事前に話した通り、入念に準備する」"
translation = "「아니, 아직이다. 사전에 말한 대로 신중하게 준비한다.」"

[[dialogue]]
speaker = "ヤハト"
original = "「仕掛けるのは――予定通り、<b>１週間後</b>だ」"
translation = "「착수하는 것은── 예정대로, <b>1주일</b> <b>후</b>다.」"

[[dialogue]]
speaker = "部下"
original = "「はっ、かしこまりました」"
translation = "「하앗, 알겠습니다.」"

[[dialogue]]
speaker = "ヤハト"
original = "「それまでは引き続き、監視を続けろ」"
translation = "「그때까지는 계속해서 감시를 계속해라.」"

[[dialogue]]
speaker = "unk"
original = "怪人『ミュータント』へと変身している男の名は――<ruby>異東<rt>いとう</rt></ruby>ヤハト。"
translation = "괴인 『뮤턴트』로 변신해 있는 남자의 이름은── 이토 야하토."

[[dialogue]]
speaker = "unk"
original = "そして、彼が所属するのは、世界的に悪名を馳せる星術犯罪組織『ユゴス』。"
translation = "그리고 그가 소속된 곳은 세계적으로 악명을 떨치는 성술 범죄 조직 『유고스』."

[[dialogue]]
speaker = "ヤハト"
original = "「……しかし、公安委員会も甘いな」"
translation = "「……하지만, 공안위원회도 무르군.」"

[[dialogue]]
speaker = "ヤハト"
original = "「緋宮クロトを囮に使って来ることは、もうとっくに<b>予測済み</b>だというのに……ククッ」"
translation = "「히노미야 쿠로토를 미끼로 사용하는 것 따위, 이미 벌써 <b>예측</b> <b>완료</b>된 상태이거늘…… 크크.」"

[[dialogue]]
speaker = "unk"
original = "国際指名手配犯の星術使いは、ほくそ笑みながら、スッと幻影のようにその場から消え去るのだった――"
translation = "국제 수배범인 성술사는 회심의 미소를 지으며 슥 하고 환영처럼 그 자리에서 사라지는 것이었다──"

