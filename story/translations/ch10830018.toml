[[dialogue]]
speaker = "unk"
original = "ソフレと恋人関係になってから、しばらく経って。"
translation = "소프레와 연인 관계가 되고 나서 얼마간의 시간이 흘렀다."

[[dialogue]]
speaker = "unk"
original = "俺は彼女と、ある『契約』を結ぶことになった――"
translation = "나는 그녀와 어떤 『계약』을 맺게 되었다――"

[[dialogue]]
speaker = "ソフレ"
original = "「……もう１度聞くけど、本当にいいの？」"
translation = "「……다시 한번 묻겠지만 정말 괜찮아?」"

[[dialogue]]
speaker = "ソフレ"
original = "「この契約をしたら、お前の体は普通の人間ではなくなるのだわ」"
translation = "「이 계약을 하면 너의 몸은 평범한 인간이 아니게 되는 거예요」"

[[dialogue]]
speaker = "ソフレ"
original = "「吸血鬼のソフレと同じく、長い刻を生きることになるのよ」"
translation = "「흡혈귀인 소프레와 마찬가지로 긴 시간을 살아가게 되는걸요」"

[[dialogue]]
speaker = "ソフレ"
original = "「それでも……吸血鬼であるソフレと『ツガイの契約』を結ぶのかしら？」"
translation = "「그래도…… 흡혈귀인 소프레와 『반려의 계약』을 맺을 것일까나?」"

[[dialogue]]
speaker = "unk"
original = "『ツガイの契約』――それはソフレ曰く、長い寿命を持つ吸血鬼が、他の種族の異性を自身の伴侶として迎え入れる為に行う儀式らしい。"
translation = "『반려의 계약』―― 그것은 소프레 말에 따르면 긴 수명을 가진 흡혈귀가 다른 종족의 이성을 자신의 반려로 맞아들이기 위해 행하는 의식이라고 한다."

[[dialogue]]
speaker = "unk"
original = "それを行うと、契約した者は伴侶の吸血鬼と同じだけの寿命を得られるようになるのだという。"
translation = "그것을 행하면 계약한 자는 반려인 흡혈귀와 같은 만큼의 수명을 얻을 수 있게 된다고 한다."

[[dialogue]]
speaker = "unk"
original = "人間界で知られる『吸血鬼に血を吸われると、吸血鬼の眷族になる』という伝承の正体は、どうやらその契約のことであるらしかった。"
translation = "인간계에서 알려진 『흡혈귀에게 피를 빨리면 흡혈귀의 권속이 된다』는 전설의 정체는 아무래도 이 계약을 말하는 것 같았다."

[[dialogue]]
speaker = "ソフレ"
original = "「……別に契約を結ばなくても、恋人でいることはできるのだわ」"
translation = "「……딱히 계약을 맺지 않아도 연인으로 있을 수는 있는 거예요」"

[[dialogue]]
speaker = "ソフレ"
original = "「だから……無理なんてしなくてもいいのよ？」"
translation = "「그러니까…… 무리하지 않아도 되는걸요?」"

[[dialogue]]
speaker = "unk"
original = "どこか不安げな様子で言う彼女に、俺は――"
translation = "어딘가 불안한 기색으로 말하는 그녀에게 나는――"

[[dialogue]]
speaker = "クロト"
original = "「それでも構わない。ソフレのことが好きだから」"
translation = "「그래도 상관없어. 소프레를 좋아하니까.」"

[[dialogue]]
speaker = "ソフレ"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "ソフレ"
original = "「ふ、ふぅん……そこまで言うなら……」"
translation = "「흐, 흐음…… 그렇게까지 말한다면……」"

[[dialogue]]
speaker = "ソフレ"
original = "「ソフレの伴侶として、契約してあげるのだわ」"
translation = "「소프레의 반려로서 계약해 주는 거예요」"

[[dialogue]]
speaker = "ソフレ"
original = "「……んっ……<emoji=heart04>」"
translation = "「……응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そっと近づいてくる彼女を、俺は抱き寄せて、キスをする。"
translation = "슬그머니 다가오는 그녀를 나는 끌어안고 키스를 한다."

[[dialogue]]
speaker = "ソフレ"
original = "「ちゅっ……<emoji=heart04>」"
translation = "「쪽……<emoji=heart04>」"

[[dialogue]]
speaker = "ソフレ"
original = "「会長……<emoji=heart04>\u3000んっ……ちゅっ……ちゅぱっ……<emoji=heart04>」"
translation = "「회장……<emoji=heart04> 응…… 쪽…… 츄파……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それから俺の部屋へと移動し、改めて、ベッドの上で向き直った。"
translation = "그러고 나서 내 방으로 이동해 다시금 침대 위에서 마주 보았다."

[[dialogue]]
speaker = "ソフレ"
original = "「んむっ……<emoji=heart04>\u3000はあぁ……<emoji=heart04>\u3000ちゅっ……ちゅぱっ……ぺろっ……ちゅっ……れろっ……れろちゅっ……<emoji=heart04>」"
translation = "「음뭇……<emoji=heart04> 하아……<emoji=heart04> 쪽…… 츄파…… 할짝…… 쪽…… 레로…… 레로츄……<emoji=heart04>」"

[[dialogue]]
speaker = "ソフレ"
original = "「ん……？\u3000どうして指を舐めてるのかって……？」"
translation = "「음……? 왜 손가락을 핥고 있냐구……?」"

[[dialogue]]
speaker = "ソフレ"
original = "「契約の為に『吸血』をするって言ったでしょう？\u3000だから、指からしようと思って……<emoji=heart04>\u3000ちゅっ……ぺろちゅっ……ちゅぱっ……<emoji=heart04>」"
translation = "「계약을 위해 『흡혈』을 한다고 했잖아요? 그러니까 손가락부터 하려고 생각해서……<emoji=heart04> 쪽…… 페로츄…… 츄파……<emoji=heart04>」"

[[dialogue]]
speaker = "ソフレ"
original = "「これは……れろちゅっ……その為の準備よ……<emoji=heart04>\u3000ちゅっ……ぺろっ……れんむっ……<emoji=heart04>」"
translation = "「이건…… 레로츄…… 그걸 위한 준비예요……<emoji=heart04> 쪽…… 할짝…… 레음뭇……<emoji=heart04>」"

[[dialogue]]
speaker = "ソフレ"
original = "「吸血鬼の唾液には……吸血の痛みを緩和して、傷口を再生する効果があるのよ<emoji=heart04>」"
translation = "「흡혈귀의 타액에는…… 흡혈의 통증을 완화하고 상처 부위를 재생하는 효과가 있는걸요<emoji=heart04>」"

[[dialogue]]
speaker = "ソフレ"
original = "「――首筋じゃなくて大丈夫なのかって？\u3000確かに、抱き合って、首筋から吸血するのも考えたけど……その……」"
translation = "「――목덜미가 아니어도 괜찮냐구? 확실히 껴안고 목덜미에서 흡혈하는 것도 생각했지만…… 그게……」"

[[dialogue]]
speaker = "ソフレ"
original = "「ソフレも、吸血するのは初めて、だから……会長の顔が見えないのは……」"
translation = "「소프레도 흡혈하는 건 처음이니까…… 회장의 얼굴이 보이지 않는 건……」"

[[dialogue]]
speaker = "クロト"
original = "「不安？」"
translation = "「불안해?」"

[[dialogue]]
speaker = "ソフレ"
original = "「……！\u3000ん……そうよ……」"
translation = "「……! 응…… 그래요……」"

[[dialogue]]
speaker = "ソフレ"
original = "「ソフレにとって、会長が初めての男なんだから……<emoji=heart04>」"
translation = "「소프레에게 있어 회장이 첫 남자니까……<emoji=heart04>」"

[[dialogue]]
speaker = "ソフレ"
original = "「って、会長、おち○ちんが大きくなってるのだわ……<emoji=heart04>\u3000もしかして、今の言葉でムラムラしちゃったの？」"
translation = "「그보다 회장, 자지가 커져 있는 거예요……<emoji=heart04> 설마 방금 말에 무럭무럭해버린 거야?」"

[[dialogue]]
speaker = "ソフレ"
original = "「んっ……あんっ<emoji=heart04>\u3000会長のが、おま○こに当たってるのだわ<emoji=heart04>」"
translation = "「응…… 앙<emoji=heart04> 회장 것이 보지에 닿고 있는 거예요<emoji=heart04>」"

[[dialogue]]
speaker = "ソフレ"
original = "「んんっ……あっ……<emoji=heart04>\u3000はあぁっ……んっ……んうぅ……<emoji=heart04>\u3000あっ……ふうぅ……んあぁっ……<emoji=heart04>」"
translation = "「응응…… 앗……<emoji=heart04> 하아앗…… 응…… 응우……<emoji=heart04> 앗…… 후우…… 응아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "ソフレ"
original = "「熱くて固い……<emoji=heart04>\u3000はあぁっ……んふぅ……<emoji=heart04>\u3000んあぁっ……クリに擦れて、感じちゃう……<emoji=heart04>\u3000あっ……はあぁ……ふあぁっ……<emoji=heart04>」"
translation = "「뜨겁고 딱딱해……<emoji=heart04> 하아앗…… 응후……<emoji=heart04> 응아앗…… 클리에 비벼져서 느껴버려……<emoji=heart04> 앗…… 하아…… 후아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "ソフレ"
original = "「あっ……あんっ……<emoji=heart04>\u3000おま○こ濡れてきたとか、わざわざ言わなくていいのだわ……<emoji=heart04>\u3000んっ……はあぁ……ふうぅ……<emoji=heart04>」"
translation = "「앗…… 앙……<emoji=heart04> 보지 젖어왔다느니 굳이 말 안 해도 되는 거예요……<emoji=heart04> 응…… 하아…… 후우……<emoji=heart04>」"

[[dialogue]]
speaker = "ソフレ"
original = "「そういう会長だって、んっ……<emoji=heart04>\u3000おち○ちんの先っぽから、我慢汁が溢れてるじゃない……<emoji=heart04>\u3000あっ……はぁっ……んあぁっ……<emoji=heart04>」"
translation = "「그런 회장이야말로 응……<emoji=heart04> 자지 끝부분에서 쿠퍼액이 넘쳐흐르고 있잖아요……<emoji=heart04> 앗…… 하아…… 응아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "ソフレ"
original = "「もう……ヌルヌルのぐちょぐちょになっちゃってるのだわ……<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000おち○ちんがグリグリって……んんっ<emoji=heart04>」"
translation = "「정말…… 미끈미끈 질척질척해져 버린 거예요……<emoji=heart04> 앙<emoji=heart04> 자지가 구리구리하고…… 응응<emoji=heart04>」"

[[dialogue]]
speaker = "ソフレ"
original = "「そんな押し付けたら……あんっ<emoji=heart04>\u3000ソフレの穴に入っちゃうわよ……<emoji=heart04>\u3000んっ……<emoji=heart04>\u3000吸血もまだなのに、もう挿れたいの……？」"
translation = "「그렇게 밀어붙이면…… 앙<emoji=heart04> 소프레 구멍에 들어가버린다구요……<emoji=heart04> 응……<emoji=heart04> 흡혈도 아직인데 벌써 넣고 싶어?」"

[[dialogue]]
speaker = "ソフレ"
original = "「ふふっ……なら、仕方ないのだわ……契約でも性交渉は必要だし……」"
translation = "「후후…… 그럼 어쩔 수 없는 거예요…… 계약에도 성교는 필요하고……」"

[[dialogue]]
speaker = "unk"
original = "ソフレは空いている片手で、おま○この穴をくぱぁっ<emoji=heart04>\u3000と広げると──"
translation = "소프레는 비어 있는 한 손으로 보지 구멍을 쿠파악<emoji=heart04> 하고 벌리더니──"

[[dialogue]]
speaker = "ソフレ"
original = "「好きに使わせてあげるのだわ<emoji=heart04>\u3000いいわよ、会長……<emoji=heart04>」"
translation = "「마음대로 쓰게 해주는 거예요<emoji=heart04> 괜찮아요, 회장……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は堪らず、彼女の小さな穴にペニスをあてがうと、"
translation = "나는 참지 못하고 그녀의 작은 구멍에 페니스를 갖다 댔고,"

[[dialogue]]
speaker = "ソフレ"
original = "「あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000中にっ――――<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 앙<emoji=heart04> 안쪽에――――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ソフレ"
original = "「んっ<emoji=heart04><emoji=heart04>\u3000ふあああぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000おち○ちん、きたあぁ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응<emoji=heart04><emoji=heart04> 후아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 자지, 들어왔다아～～～～앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ソフレ"
original = "「んっ<emoji=heart04>\u3000ふうぅっ……んんっ……<emoji=heart04>\u3000はあぁっ……んうぅっ……<emoji=heart04>」"
translation = "「응<emoji=heart04> 후우웃…… 응응……<emoji=heart04> 하아앗…… 응우웃……<emoji=heart04>」"

[[dialogue]]
speaker = "ソフレ"
original = "「あっ<emoji=heart04>\u3000んっ……ふうぅっ……<emoji=heart04>\u3000はあぁっ……んんっ……<emoji=heart04>\u3000ふうぅっ……んうぅっ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 응…… 후우웃……<emoji=heart04> 하아앗…… 응응……<emoji=heart04> 후우웃…… 응우웃……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ソフレのおま○こは、すごく気持ちよくて、俺も思わず声が漏れ出てしまう。"
translation = "소프레의 보지는 엄청나게 기분 좋아서 나도 모르게 신음이 흘러나온다."

[[dialogue]]
speaker = "unk"
original = "吸血鬼だからなのか、小さい体なのに俺のペニスをすんなりと全部受け入れて、馴染んでいる。それでいて抜こうとすると、逃がさないとばかりに甘く絡みついてくる。"
translation = "흡혈귀라서 그런지 작은 몸인데도 내 페니스를 수월하게 전부 받아들여 동화되고 있다. 그러면서도 빼려 하면 놓치지 않겠다는 듯이 달콤하게 얽혀온다."

[[dialogue]]
speaker = "unk"
original = "まるで俺の為に作り変えられたかのような心地よさで、夢中になってしまう。"
translation = "마치 나를 위해 다시 만들어진 것 같은 쾌감에 정신이 팔려버린다."

[[dialogue]]
speaker = "ソフレ"
original = "「あっ……んっ……<emoji=heart04>\u3000いけない……快楽に流されて忘れちゃう前に、契約を進めないと……<emoji=heart04>」"
translation = "「앗…… 응……<emoji=heart04> 안 돼…… 쾌락에 휩쓸려 잊어버리기 전에 계약을 진행해야……<emoji=heart04>」"

[[dialogue]]
speaker = "ソフレ"
original = "「それじゃ会長、吸血、しちゃうわよ……？」"
translation = "「그럼 회장, 흡혈, 해버릴게요……?」"

[[dialogue]]
speaker = "ソフレ"
original = "「あむっ――<emoji=heart04>」"
translation = "「아암――<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "指に小さい痛みが走る。"
translation = "손가락에 작은 통증이 달린다."

[[dialogue]]
speaker = "ソフレ"
original = "「んっ……ちゅっ……<emoji=heart04>\u3000ちゅうっ……んちゅっ……ちゅるっ……<emoji=heart04>」"
translation = "「응…… 쪽……<emoji=heart04> 쮸우…… 응츄…… 츄릅……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "しかしそれは一瞬のことで、すぐに痛みよりも、体の奥からじわじわと気持ちよさが込み上げてくる。"
translation = "하지만 그것은 한순간의 일로, 곧바로 통증보다 몸 안쪽에서 서서히 기분 좋음이 차오른다."

[[dialogue]]
speaker = "ソフレ"
original = "「ちゅうっ……れろちゅ……ちゅるるっ……<emoji=heart04>\u3000んむっ……ちゅうぅ……ちゅぱっ……<emoji=heart04>\u3000んはぁっ……<emoji=heart04>」"
translation = "「쮸우…… 레로츄…… 츄르릅……<emoji=heart04> 음뭇…… 쮸우우…… 츄파……<emoji=heart04> 응하아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "ソフレ"
original = "「会長のおち○ちん、ソフレの中で更に勃起して、ギンギンに大きくなってるのだわ……<emoji=heart04>」"
translation = "「회장 자지, 소프레 안에서 더욱 발기해서 꼿꼿하게 커지고 있는 거예요……<emoji=heart04>」"

[[dialogue]]
speaker = "ソフレ"
original = "「はあぁっ……すごいっ……<emoji=heart04>\u3000凶悪なくらいの極太カリで、中をゴリゴリって引っかかれて、んふぅっ……<emoji=heart04>\u3000はあぁっ……んっ……ふあぁっ……<emoji=heart04>」"
translation = "「하아앗…… 대단해……<emoji=heart04> 흉악할 정도의 굵직한 귀두로 안쪽을 고리고리하고 긁혀서, 응후우……<emoji=heart04> 하아앗…… 응…… 후아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "ソフレ"
original = "「気持ちいいっ……<emoji=heart04>\u3000あっ……ふうぅっ……んあぁっ……<emoji=heart04>\u3000はあぁっ……んうぅっ……ふあぁっ<emoji=heart04>\u3000あっ……はあぁっ……あんっ<emoji=heart04>」"
translation = "「기분 좋아……<emoji=heart04> 앗…… 후우웃…… 응아앗……<emoji=heart04> 하아앗…… 응우웃…… 후아앗<emoji=heart04> 앗…… 하아앗…… 앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺も気持ちよくて、どうにかなりそうだ、と言うと――"
translation = "나도 기분 좋아서 어떻게 될 것 같다고 말하자――"

[[dialogue]]
speaker = "ソフレ"
original = "「んっ……<emoji=heart04>\u3000吸血するのと引き換えに、会長の中にソフレの生命力を流し込んだから、体が元気になっちゃってるのよっ……<emoji=heart04>\u3000あんっ<emoji=heart04>」"
translation = "「응……<emoji=heart04> 흡혈하는 대신 회장 안에 소프레의 생명력을 불어넣었으니까 몸이 기운 넘치게 되어버린 거예요……<emoji=heart04> 앙<emoji=heart04>」"

[[dialogue]]
speaker = "ソフレ"
original = "「生命力を共有することで、相手とパスが繋がって、寿命が延びるのだわ……<emoji=heart04>」"
translation = "「생명력을 공유함으로써 상대와 패스가 연결되어 수명이 늘어나는 거예요……<emoji=heart04>」"

[[dialogue]]
speaker = "ソフレ"
original = "「だから、契約する以上は仕方ないことなのだから、我慢しなくてもいいのよ<emoji=heart04>\u3000んっ……<emoji=heart04>」"
translation = "「그러니까 계약하는 이상 어쩔 수 없는 일이니까 참지 않아도 괜찮은걸요<emoji=heart04> 응……<emoji=heart04>」"

[[dialogue]]
speaker = "ソフレ"
original = "「せっかくなのだから、お互い、気持ちよくなりましょうっ<emoji=heart04>\u3000あっ……あんっ<emoji=heart04>\u3000ふあぁっ――――<emoji=heart04><emoji=heart04>」"
translation = "「기왕 이렇게 된 거 서로 기분 좋아지도록 해요<emoji=heart04> 앗…… 앙<emoji=heart04> 후아앗――――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は興奮のまま、大きく腰を振り始める。"
translation = "나는 흥분한 상태로 크게 허리를 흔들기 시작한다."

[[dialogue]]
speaker = "ソフレ"
original = "「んっ……んあぁっ<emoji=heart04>\u3000会長のおち○ちん、一番深いところまできてるのだわ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んっ……はあぁっ……んうぅっ……<emoji=heart04>」"
translation = "「응…… 응아앗<emoji=heart04> 회장 자지, 제일 깊은 곳까지 오고 있는 거예요<emoji=heart04> 앗<emoji=heart04> 응…… 하아앗…… 응우웃……<emoji=heart04>」"

[[dialogue]]
speaker = "ソフレ"
original = "「子宮口にキス、されちゃってるっ<emoji=heart04>\u3000んっ……ふうぅっ……はあぁっ<emoji=heart04>」"
translation = "「자궁구에 키스, 당해버리고 있어<emoji=heart04> 응…… 후우웃…… 하아앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ソフレ、好きだ……！」"
translation = "「소프레, 좋아해……!」"

[[dialogue]]
speaker = "unk"
original = "１度だけでなく、何度も好きだと伝えながら、ペニスの先っぽで彼女の奥にキスをする。"
translation = "한 번뿐만 아니라 몇 번이고 좋아한다고 전하면서 페니스 끝으로 그녀의 안쪽에 키스를 한다."

[[dialogue]]
speaker = "ソフレ"
original = "「はぁんっ<emoji=heart04>\u3000そんな何度も言いながら、奥にちゅっちゅされたら、興奮しちゃう……<emoji=heart04>」"
translation = "「하앙앗<emoji=heart04> 그렇게 몇 번이고 말하면서 안쪽에 쪽쪽거리면 흥분해버려……<emoji=heart04>」"

[[dialogue]]
speaker = "ソフレ"
original = "「あっ<emoji=heart04>\u3000はあぁっ……んうぅっ……ふあぁっ……<emoji=heart04>\u3000あっ……ふうぅっ……はあぁっ……んあぁっ……<emoji=heart04>\u3000ふあぁっ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 하아앗…… 응우웃…… 후아앗……<emoji=heart04> 앗…… 후우웃…… 하아앗…… 응아앗……<emoji=heart04> 후아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "興奮しすぎて、油断したら射精してしまいそうだ……！"
translation = "너무 흥분해서 방심하면 사정해버릴 것 같아……!"

[[dialogue]]
speaker = "unk"
original = "俺がそう口にすると、彼女は笑って──"
translation = "내가 그렇게 말하자 그녀는 웃으며──"

[[dialogue]]
speaker = "ソフレ"
original = "「んっ……<emoji=heart04>\u3000ふふっ……我慢しなくて大丈夫って……言ったじゃないっ<emoji=heart04>」"
translation = "「응……<emoji=heart04> 후후…… 참지 않아도 괜찮다고…… 말했잖아요<emoji=heart04>」"

[[dialogue]]
speaker = "ソフレ"
original = "「ツガイの契約を完了させるには、証として子宮に精液を注いでもらう必要があるって、説明したでしょ？」"
translation = "「반려의 계약을 완료하려면 증표로서 자궁에 정액을 부어줄 필요가 있다고 설명했죠?」"

[[dialogue]]
speaker = "ソフレ"
original = "「だから……いいのよ<emoji=heart04>」"
translation = "「그러니까…… 괜찮아요<emoji=heart04>」"

[[dialogue]]
speaker = "ソフレ"
original = "「我慢せずに、ソフレのおま○こにいっぱい<ruby>射精<rt>だ</rt></ruby>して<emoji=heart04>」"
translation = "「참지 말고 소프레의 보지에 잔뜩 사정해줘<emoji=heart04>」"

[[dialogue]]
speaker = "ソフレ"
original = "「ほらっ、もっと吸血して、生命力を流し込むわよ<emoji=heart04>\u3000んっ……<emoji=heart04>」"
translation = "「봐요, 좀 더 흡혈해서 생명력을 불어넣을게요<emoji=heart04> 응……<emoji=heart04>」"

[[dialogue]]
speaker = "ソフレ"
original = "「ちゅっ<emoji=heart04>\u3000ちゅぷっ<emoji=heart04><emoji=heart04>\u3000――ちゅうぅ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「쪽<emoji=heart04> 츄풋<emoji=heart04><emoji=heart04> ――쮸우우우우우우우우우욱<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "すると、どんどん体に力が漲ってきて……興奮が最高潮に達する。"
translation = "그러자 점점 몸에 힘이 넘쳐나며…… 흥분이 최고조에 달한다."

[[dialogue]]
speaker = "クロト"
original = "「っ……！！\u3000ソフレッ！！！」"
translation = "「윽……!! 소프레!!!」"

[[dialogue]]
speaker = "ソフレ"
original = "「会長……あっ――――<emoji=heart04><emoji=heart04>」"
translation = "「회장…… 앗――――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ソフレ"
original = "「ふあああああああああぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あっ、あっ、あっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んあぁっ<emoji=heart04><emoji=heart04>\u3000ふああぁんっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 앗, 앗, 앗<emoji=heart04> 하아앗<emoji=heart04> 응아아앗<emoji=heart04><emoji=heart04> 후아아앙앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ソフレ"
original = "「おち○ちん、すごいっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000あっ、あっ、あっ<emoji=heart04>\u3000んっ、んっ、んあぁっ<emoji=heart04>\u3000はっ、はっ、はっ、んああぁんっ<emoji=heart04>」"
translation = "「자지, 대단해<emoji=heart04> 앗<emoji=heart04> 하아앗<emoji=heart04> 후아앗<emoji=heart04> 앗, 앗, 앗<emoji=heart04> 응, 응, 응아아앗<emoji=heart04> 하, 하, 하, 응아아아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "ソフレ"
original = "「あっ、あっ、ダメっ<emoji=heart04>\u3000激しいピストン、気持ちいいっ<emoji=heart04>\u3000あっ、あっ、あんっ<emoji=heart04>\u3000んっ、あっ、あっ、あっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04>」"
translation = "「앗, 앗, 안 돼<emoji=heart04> 격렬한 피스톤, 기분 좋아앗<emoji=heart04> 앗, 앗, 앙<emoji=heart04> 응, 앗, 앗, 앗<emoji=heart04> 하아아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は何度もソフレの名前と、「好きだ！」という言葉を口にしながら、彼女が１番感じる場所を擦り上げる。"
translation = "나는 몇 번이고 소프레의 이름과 「좋아해!」라는 말을 내뱉으며 그녀가 가장 느끼는 곳을 문질러 올린다."

[[dialogue]]
speaker = "ソフレ"
original = "「ふああああああっ<emoji=heart04>\u3000そこダメっ<emoji=heart04>\u3000気持ちいいのっ<emoji=heart04>\u3000あっ、あっ、あっ、あっ<emoji=heart04>\u3000んあっ、はあぁっ、ふあぁっ<emoji=heart04><emoji=heart04>\u3000あんっ、あっ、あっ、んあああぁっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아아앗<emoji=heart04> 거기 안 돼앗<emoji=heart04> 기분 좋은걸앗<emoji=heart04> 앗, 앗, 앗, 앗<emoji=heart04> 응앗, 하아앗, 후아앗<emoji=heart04><emoji=heart04> 앙, 앗, 앗, 응아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ソフレ"
original = "「ダメダメ<emoji=heart04>\u3000ふあああぁっ<emoji=heart04>\u3000好きって言いながらされたら、おかしくなる<emoji=heart04>\u3000あっ、あっ、あっ、はあぁっ<emoji=heart04><emoji=heart04>\u3000んっ、んっ、んああぁっ<emoji=heart04><emoji=heart04>\u3000はあああぁっ<emoji=heart04><emoji=heart04>」"
translation = "「안 돼안 돼<emoji=heart04> 후아아아앗<emoji=heart04> 좋아한다고 말하면서 당하면 이상해져어<emoji=heart04> 앗, 앗, 앗, 하아앗<emoji=heart04><emoji=heart04> 응, 응, 응아아앗<emoji=heart04><emoji=heart04> 하아아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ソフレ"
original = "「気持ちいぃっ<emoji=heart04><emoji=heart04>\u3000おち○ちん気持ちいいのぉっ<emoji=heart04><emoji=heart04>\u3000あっ、あっ、あっ、はあぁっ<emoji=heart04><emoji=heart04>\u3000ふあああぁんっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「기분 좋아앗<emoji=heart04><emoji=heart04> 자지 기분 좋아아앗<emoji=heart04><emoji=heart04> 앗, 앗, 앗, 하아앗<emoji=heart04><emoji=heart04> 후아아아앙앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ソフレ"
original = "「ソフレ、もうイっちゃうぅっ<emoji=heart04><emoji=heart04>」"
translation = "「소프레, 이제 가버려어어어엇<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「俺ももう、イキそうだ……！」"
translation = "「나도 이제, 갈 것 같아……!」"

[[dialogue]]
speaker = "ソフレ"
original = "「きてっ<emoji=heart04><emoji=heart04>\u3000最後に目一杯吸血して、生命力を流し込むから、会長もきてぇっ<emoji=heart04><emoji=heart04>」"
translation = "「와줘엇<emoji=heart04><emoji=heart04> 마지막으로 한껏 흡혈해서 생명력을 쏟아부을 테니까 회장도 와줘어엇<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ソフレ"
original = "「ん――っ<emoji=heart04><emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000ちゅうっ<emoji=heart04><emoji=heart04>\u3000ちゅうううぅぅぅ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응――앗<emoji=heart04><emoji=heart04> 쪽<emoji=heart04> 쮸우<emoji=heart04><emoji=heart04> 쮸우우우우우우우우우우욱<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ソフレ"
original = "「んはぁっ<emoji=heart04>\u3000あっ、ダメっ<emoji=heart04><emoji=heart04>\u3000イク、イクイクイクっ！！」"
translation = "「응하아앗<emoji=heart04> 앗, 안 돼앗<emoji=heart04><emoji=heart04> 가, 가 가 가버려엇!!」"

[[dialogue]]
speaker = "ソフレ"
original = "「あっ<emoji=heart04><emoji=heart04>\u3000あっあっあっあっあっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イっ――――――<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04><emoji=heart04> 앗앗앗앗앗<emoji=heart04><emoji=heart04><emoji=heart04> 가버어엇――――――<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ソフレ"
original = "「イックうううぅぅぅ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふああああああぁぁぁ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가버어어어어어어억～～～～～～～～～앗<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04> 후아아아아아아아앗～～～～～～～～～앗<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ソフレ"
original = "「はああああああぁぁぁ～～～っ…………<emoji=heart04><emoji=heart04><emoji=heart04>\u3000会長の精液、ソフレの子宮にいっぱい、注がれてるのだわ……<emoji=heart04><emoji=heart04>」"
translation = "「하아아아아아아아앗～～～앗…………<emoji=heart04><emoji=heart04><emoji=heart04> 회장의 정액, 소프레의 자궁에 가득 부어지고 있는 거예요……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ソフレ"
original = "「んっ……ふうぅ……<emoji=heart04>\u3000熱い……<emoji=heart04>\u3000はあぁ……<emoji=heart04>\u3000それに、凄い量……<emoji=heart04>」"
translation = "「응…… 후우……<emoji=heart04> 뜨거워……<emoji=heart04> 하아……<emoji=heart04> 게다가 엄청난 양……<emoji=heart04>」"

[[dialogue]]
speaker = "ソフレ"
original = "「会長の生命力が流れ込んで来るのを、感じるのだわ……<emoji=heart04>」"
translation = "「회장의 생명력이 흘러들어오는 게 느껴져요……<emoji=heart04>」"

[[dialogue]]
speaker = "ソフレ"
original = "「んっ……<emoji=heart04>\u3000射精、ようやく止まったのだわ……<emoji=heart04>\u3000ふうぅ<emoji=heart04>」"
translation = "「응읏……<emoji=heart04> 사정, 드디어 멈췄네요……<emoji=heart04> 후우우<emoji=heart04>」"

[[dialogue]]
speaker = "ソフレ"
original = "「はあぁ……<emoji=heart04>\u3000これで……お互いの生命力を共有しあって、契約完了よ……」"
translation = "「하아아……<emoji=heart04> 이걸로…… 서로의 생명력을 공유해서 계약 완료예요……」"

[[dialogue]]
speaker = "ソフレ"
original = "「ふふっ……契約どころか、妊娠しちゃいそうなくらい、いっぱい出したけど……そんなに気持ちよかったの？」"
translation = "「후훗…… 계약은커녕 임신해 버릴 정도로 잔뜩 내보냈는데…… 그렇게 기분 좋았나요?」"

[[dialogue]]
speaker = "ソフレ"
original = "「――私？\u3000そんなの、言わなくたってわかるでしょ<emoji=heart04>」"
translation = "「――나? 그런 건 말하지 않아도 알잖아요<emoji=heart04>」"

[[dialogue]]
speaker = "ソフレ"
original = "「こんなに潮を吹いて、イっちゃったんだから……<emoji=heart04>」"
translation = "「이렇게 애액을 뿜으며 가버렸으니까……<emoji=heart04>」"

[[dialogue]]
speaker = "ソフレ"
original = "「……それで、会長」"
translation = "「……그래서, 회장」"

[[dialogue]]
speaker = "ソフレ"
original = "「契約をした以上、言っておくけれど――」"
translation = "「계약을 한 이상 말해두겠는데――」"

[[dialogue]]
speaker = "ソフレ"
original = "「もう後から嫌だって言っても、破棄してあげないんだから……ソフレが死ぬまで、ちゃんと添い遂げるのよ？」"
translation = "「이제 와서 싫다고 해도 파기해주지 않을 거니까…… 소프레가 죽을 때까지 제대로 곁을 지켜야 해요?」"

[[dialogue]]
speaker = "unk"
original = "そう言ってソフレは──"
translation = "그렇게 말하며 소프레는──"

[[dialogue]]
speaker = "ソフレ"
original = "「――好きよ、会長<emoji=heart04>」"
translation = "「――사랑해요, 회장<emoji=heart04>」"

[[dialogue]]
speaker = "ソフレ"
original = "「ちゅっ……<emoji=heart04>」"
translation = "「쪽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "有無を言わさず、俺の唇を奪うのだった。"
translation = "유무를 불문하고 내 입술을 빼앗는 것이었다."

