[[dialogue]]
speaker = "unk"
original = "第３話,リィベルの図書館観察日記,P"
translation = "제3화, 리벨의 도서관 관찰 일기, P"

[[dialogue]]
speaker = "unk"
original = "放課後、リィベルは図書委員の仕事をするため、受付カウンターに座っていた。"
translation = "방과 후, 리벨은 도서위원 일을 하기 위해, 접수 카운터에 앉아 있었다."

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "（今日の利用者は……）"
translation = "（오늘의 이용자는……）"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "（百合崎ミア……風紀委員の１年生。読んでいるのは……）"
translation = "（유리사키 미아…… 풍기위원 1학년. 읽고 있는 것은……）"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "（熟語の辞典？\u3000ずいぶん殊勝なものを読んでいるのね。……でも、その陰に隠れているのは……）"
translation = "（숙어 사전? 꽤나 갸륵한 것을 읽고 있네. ……하지만, 그 그늘에 숨겨져 있는 것은……）"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「！\u3000あの……リィベルさん、私の顔に何か付いてる？」"
translation = "「! 저…… 리벨 씨, 제 얼굴에 뭐라도 묻었나요?」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「いいえ。珍しい本を読んでいると思っただけよ」"
translation = "「아니. 희귀한 책을 읽고 있다고 생각했을 뿐이야」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「え！？\u3000え、あ、えっと……あ、この熟語辞典のこと？」"
translation = "「엣!? 에, 아, 저기…… 아, 이 숙어 사전 말인가요?」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「これは、難しい言葉を知っていれば子どもっぽく見られないと思って……最初はそんな理由だったけど、今は純粋に勉強するのが楽しいの」"
translation = "「이건, 어려운 말을 알고 있으면 어린애처럼 보이지 않을 거라고 생각해서…… 처음에는 그런 이유였지만, 지금은 순수하게 공부하는 게 즐거워요」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「知ってる？\u3000言葉にもいろんな由来や歴史があるの。それが面白くて」"
translation = "「알고 계세요? 말에도 여러 유래나 역사가 있어요. 그게 재미있어서요」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「ええ、そうね……知識は世界を豊かにしてくれるものよ」"
translation = "「응, 그렇네…… 지식은 세상을 풍요롭게 해 주는 거야」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "（微笑ましい動機ね……）"
translation = "（흐뭇한 동기네……）"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "（けれどそれとは裏腹に、その手で隠したのは、男性同士の情愛を描いたドギツい小説）"
translation = "（하지만 그것과는 반대로, 그 손으로 숨긴 것은, 남성끼리의 정애를 그린 노골적인 소설）"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「リィベルさん？\u3000こっちをじっと見てどうしたの？」"
translation = "「리벨 씨? 이쪽을 가만히 보고 무슨 일인가요?」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「……いえ、何でもないわ」"
translation = "「……아니, 아무것도 아니야」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "（モネなら嬉々として同じジャンルの本をオススメしそうだけど、私は見なかったことにするわ。不用意に踏み込まないのも図書委員の務めよ）"
translation = "（모네라면 기뻐하며 같은 장르의 책을 추천할 것 같지만, 나는 못 본 척할 거야. 경솔하게 발을 들이지 않는 것도 도서위원의 임무야）"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「じゃ、私行くわね」"
translation = "「그럼, 저 갈게요」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「ええ、また来るといいわ」"
translation = "「응, 또 오면 좋겠네」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "（他には……）"
translation = "（다른 사람은……）"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "（天ヶ崎ヨミ。九浄家メイド隊の１人にして、自称クエスト受付嬢）"
translation = "（아마가사키 요미. 구정가 메이드대 중 한 명이자, 자칭 퀘스트 접수원）"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「おや、リィベルさん。こんにちは」"
translation = "「어머, 리벨 씨. 안녕하세요」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「ええ。何を読んでいたの？」"
translation = "「응. 뭘 읽고 있었어?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「これですか？\u3000筋トレの本です」"
translation = "「이거 말인가요? 근력 운동 책입니다」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「あなたが筋トレ？\u3000少し意外ね」"
translation = "「네가 근력 운동? 조금 의외네」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「あはは……よく言われます。でも、メイドのお仕事にも巫女舞にも体力は不可欠ですからね。体は鍛えて損なしです」"
translation = "「아하하…… 자주 듣습니다. 하지만, 메이드 일에도 무녀 춤에도 체력은 필수 불가결이니까요. 몸은 단련해서 손해 볼 것 없습니다」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「まぁ、それはそう」"
translation = "「뭐, 그건 그렇지」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「でも、最近はやり方が合っていない気がして……こうして筋トレの勉強をしているんです」"
translation = "「하지만, 최근에는 방식이 맞지 않는 것 같아서…… 이렇게 근력 운동 공부를 하고 있습니다」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「間違ったやり方で時間を無駄にしていないか不安なのね。……ならいっそ全部試せばいいんじゃないかしら」"
translation = "「잘못된 방식으로 시간을 낭비하고 있지 않은지 불안한 거네. ……그렇다면 차라리 전부 시도해 보면 되지 않을까」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「えぇ！？\u3000全部ですか！？」"
translation = "「에에!? 전부 말인가요!?」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「多少間違ったって最終的に合ったやり方が見つかればいいのよ。失敗は成功のもと、とよく言うでしょう」"
translation = "「다소 틀렸다고 해도 최종적으로 맞는 방식을 찾으면 되는 거야. 실패는 성공의 어머니라고 자주 말하잖아」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「そうですね！\u3000うじうじ考えるより、まずはやってみます！」"
translation = "「그렇군요! 우물쭈물 생각하기보다, 일단 해 보겠습니다!」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「ええ、それがいいわ。でも本の延滞だけは気を付けるように。でないと怖い取り立て屋が来るわよ」"
translation = "「응, 그게 좋겠네. 하지만 책 연체만은 조심하도록. 그렇지 않으면 무서운 추심원이 올 거야」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「モネ先輩ですね……はい、気を付けます。今日はありがとうございました。爆裂感謝です！」"
translation = "「모네 선배 말이군요…… 네, 조심하겠습니다. 오늘은 감사했습니다. 폭렬 감사입니다!」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「ええ、うまくいくといいわね」"
translation = "「응, 잘되면 좋겠네」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "（あれは……）"
translation = "（저건……）"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「何かお探しかしら？」"
translation = "「뭔가 찾고 있는 거려나?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「探し物ではなくて……書架を見ていたら、つい懐かしくなって………」"
translation = "「찾는 물건은 아니고…… 서가를 보고 있으니, 문득 그리워져서………」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私の世界の新星学園を思い出して……いや、君に言っても詮無いことだな。すまない。邪魔なら立ち去るよ」"
translation = "「내 세계의 신성 학원을 떠올려서…… 아니, 자네에게 말해도 소용없는 일이겠군. 미안하네. 방해라면 물러나겠네」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「そうは言っていないでしょう。ところで、この前の図書館便りに寄稿されたポエム、あなたのでしょう？」"
translation = "「그렇게 말하지는 않았잖아. 그런데, 지난번 도서관 소식지에 기고된 시, 네 것이지?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「っ！\u3000出すのを見ていたのか！？」"
translation = "「! 내는 걸 보고 있었나!?」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「いいえ。でもわざわざ英語の詩を出すなんて、あなたぐらいしかいないでしょう？」"
translation = "「아니. 하지만 일부러 영어 시를 내다니, 너 정도밖에 없지 않겠어?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「そう言われればそうだった！？」"
translation = "「그렇게 듣고 보니 그랬나!?」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「冗談よ」"
translation = "「농담이야」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「読んでみて、なんとなくあなただとわかったわ。軽率に気持ちが分かるとは言わないけど、私も多くの滅びを見てきたから」"
translation = "「읽어 보니, 어쩐지 너라는 걸 알았어. 경솔하게 마음을 안다고는 말하지 않겠지만, 나도 많은 멸망을 봐 왔으니까」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「あなたのポエム、私は好きよ。また投稿しに来て」"
translation = "「네 시, 나는 좋아해. 또 투고하러 와」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……ああ、ありがとう」"
translation = "「……아아, 고맙네」"

[[dialogue]]
speaker = "unk"
original = "図書委員の活動を通して、リィベルは新星学園の星騎士たちを知っていく。"
translation = "도서위원 활동을 통해, 리벨은 신성 학원의 성기사들을 알아 간다."

[[dialogue]]
speaker = "unk"
original = "リィベルは今日も明日も、図書館で彼女たちを見守っている。"
translation = "리벨은 오늘도 내일도, 도서관에서 그녀들을 지켜보고 있다."

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "（じーー……）"
translation = "（지ーー……）"

