[[dialogue]]
speaker = "unk"
original = "第１話,私たち結婚しました！？,P"
translation = "제1화, 우리 결혼했어요!?"

[[dialogue]]
speaker = "梨緒"
original = "「２人とも、忙しいのに呼びつけてすまない。君たちに確認したいことがあったんだ」"
translation = "「두 사람 모두, 바쁜데 불러내서 미안하다. 너희들에게 확인하고 싶은 것이 있었어」"

[[dialogue]]
speaker = "unk"
original = "緊張感を漂わせる梨緒。彼女は選挙管理員会として、俺が星徒会長として相応しいか、常日頃から監視している。"
translation = "긴장감을 풍기는 리오. 그녀는 선거 관리 위원회로서, 내가 성도회장으로서 적합한지, 평소부터 감시하고 있다."

[[dialogue]]
speaker = "unk"
original = "その呼び出しとあっては、こちらも居住まいを正さざるを得ない。"
translation = "그 호출이라면, 우리도 자세를 바로잡지 않을 수 없다."

[[dialogue]]
speaker = "梨緒"
original = "「単刀直入に聞こう…………君たちは、結婚しているのか？」"
translation = "「단도직입적으로 묻겠다………… 너희들은, 결혼했는가?」"

[[dialogue]]
speaker = "フィオナ"
original = "「け、けけけけっ！？」"
translation = "「겨, 겨겨겨겨!?」"

[[dialogue]]
speaker = "unk"
original = "落ち着いて、フィオナ"
translation = "진정해, 피오나"

[[dialogue]]
speaker = "フィオナ"
original = "「すー、はー…………いえ、私たちはいたって普通の関係です。婚姻関係ではありません。キリッ」"
translation = "「후ー, 하ー………… 아니요, 저희는 지극히 평범한 관계입니다. 혼인 관계가 아닙니다. 단호」"

[[dialogue]]
speaker = "フィオナ"
original = "「えっと、その……どうして私たちが結婚していると思われたんですか？」"
translation = "「에또, 그…… 왜 저희가 결혼했다고 생각하신 건가요?」"

[[dialogue]]
speaker = "梨緒"
original = "「どうしてと言われても……君が私と一緒に出撃するとき、だいたいウェディングドレスじゃないか？」"
translation = "「왜냐고 물어도…… 네가 나와 함께 출격할 때, 대부분 웨딩드레스가 아닌가?」"

[[dialogue]]
speaker = "フィオナ"
original = "「はうっ！？」"
translation = "「하우!?」"

[[dialogue]]
speaker = "フィオナ"
original = "「こほん……私は複数の戦闘服を持っています。ウェディングドレスの選択が多いのは、たまたま梨緒さんの星術と相性がいいからです」"
translation = "「커흠…… 저는 복수의 전투복을 가지고 있습니다. 웨딩드레스를 선택하는 경우가 많은 것은, 우연히 리오 씨의 성술과 궁합이 좋기 때문입니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「ウェディングドレスはあくまで戦闘服で、実際に結婚したわけではなく……星力の暴走と私の『結婚っていいな』欲が合わさって生まれた偶発的なもので──」"
translation = "「웨딩드레스는 어디까지나 전투복이고, 실제로 결혼한 것이 아니라…… 성력의 폭주와 저의 『결혼 좋겠다』 욕구가 합쳐져서 태어난 우발적인 것으로──」"

[[dialogue]]
speaker = "フィオナ"
original = "「その言い方もうやめてもらっていいですか！？」"
translation = "「그 말하는 방식 이제 그만둬 주시겠어요!?」"

[[dialogue]]
speaker = "梨緒"
original = "「私は何も言ってないぞ！？」"
translation = "「나는 아무 말도 안 했다!?」"

[[dialogue]]
speaker = "unk"
original = "見事な自爆……"
translation = "훌륭한 자폭……"

[[dialogue]]
speaker = "フィオナ"
original = "「私と緋宮会長は星徒会長同士、連携のために親睦を深めているのは事実です。しかし、決してやましい関係では……」"
translation = "「저와 히노미야 회장은 성도회장끼리, 연계를 위해 친목을 다지고 있는 것은 사실입니다. 하지만, 결코 부끄러운 관계는……」"

[[dialogue]]
speaker = "梨緒"
original = "「今の私は、星見家に世話になっている身だ。そして、学園にいる間は選挙管理委員会として会長を監視している」"
translation = "「지금의 나는, 호시미 가문에 신세를 지고 있는 몸이다. 그리고, 학원에 있는 동안은 선거 관리 위원회로서 회장을 감시하고 있다」"

[[dialogue]]
speaker = "梨緒"
original = "「常にどちらかと行動を共にしているから、さすがにただならぬ関係であることは分かるさ」"
translation = "「항상 둘 중 한 명과 행동을 함께하고 있으니, 아무래도 예사롭지 않은 관계라는 것은 알 수 있지」"

[[dialogue]]
speaker = "梨緒"
original = "「時間さえあればお互いの顔を見に行くし、お昼はいつも一緒だし、なんならあーんしているところも見た」"
translation = "「시간만 있으면 서로의 얼굴을 보러 가고, 점심은 항상 같이 먹고, 심지어 아앙 해주는 모습도 봤다」"

[[dialogue]]
speaker = "梨緒"
original = "「ズバリ、君たちは相思相愛の新婚カップルと見た！」"
translation = "「즈바리, 너희들은 상사상애의 신혼 커플로 봤다!」"

[[dialogue]]
speaker = "フィオナ"
original = "「きゃーーーーっ！？」"
translation = "「꺄아아아아!?」"

[[dialogue]]
speaker = "梨緒"
original = "「忙しくて会えない日なんかは、『緋宮会長が今日何をしていたかレポート』をねだられるくらいだ」"
translation = "「바빠서 못 만나는 날에는, 『히노미야 회장이 오늘 무엇을 했는지 리포트』를 조를 정도다」"

[[dialogue]]
speaker = "フィオナ"
original = "「ぐはっ！？」"
translation = "「크핫!?」"

[[dialogue]]
speaker = "unk"
original = "そうなの？"
translation = "그래?"

[[dialogue]]
speaker = "フィオナ"
original = "「…………はい。だって会えないと寂しくて……」"
translation = "「…………네. 왜냐하면 못 만나면 외로워서……」"

[[dialogue]]
speaker = "フィオナ"
original = "「もう、梨緒さん、あんまりからかわないでください。まるで私が幸せのあまりウェディングドレスを見せびらかして、四六時中イチャイチャしている女みたいじゃないですか」"
translation = "「정말, 리오 씨, 너무 놀리지 마세요. 마치 제가 행복에 겨워 웨딩드레스를 과시하고, 하루 종일 깨 볶고 있는 여자 같잖아요」"

[[dialogue]]
speaker = "梨緒"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "…………"
translation = "…………"

[[dialogue]]
speaker = "フィオナ"
original = "「何か言ってください！\u3000私ホントにそう見えているんですか！？」"
translation = "「뭔가 말해 주세요! 저 정말로 그렇게 보이고 있나요!?」"

[[dialogue]]
speaker = "アポロ"
original = "「ふっ、面白そうな話をしてるじゃないか」"
translation = "「훗, 재미있는 이야기를 하고 있잖아」"

[[dialogue]]
speaker = "フィオナ"
original = "「姉さん！」"
translation = "「언니!」"

[[dialogue]]
speaker = "アポロ"
original = "「盗み聞きするつもりはなかったんだが、可愛い妹の悲鳴が聞こえて、ついな」"
translation = "「엿들을 생각은 없었는데, 귀여운 여동생의 비명이 들려서, 그만」"

[[dialogue]]
speaker = "アポロ"
original = "「おい梨緒、勝手にうちの妹をイジめるんじゃない」"
translation = "「어이 리오, 멋대로 우리 여동생을 괴롭히지 마」"

[[dialogue]]
speaker = "フィオナ"
original = "「姉さん……」"
translation = "「언니……」"

[[dialogue]]
speaker = "アポロ"
original = "「そういう話をするなら、あたしも呼べ！」"
translation = "「그런 이야기를 할 거면, 나도 불러!」"

[[dialogue]]
speaker = "フィオナ"
original = "「姉さんっ！」"
translation = "「언니!」"

[[dialogue]]
speaker = "アポロ"
original = "「だって、知らない間に妹がウェディングドレス着てたら、誰だってビックリするだろ～？」"
translation = "「왜냐면, 모르는 사이에 여동생이 웨딩드레스 입고 있으면, 누구라도 깜짝 놀라지 않겠어~?」"

[[dialogue]]
speaker = "アポロ"
original = "「あの甘えんぼのエリシアが結婚とはなー」"
translation = "「저 응석받이 엘리시아가 결혼이라니ー」"

[[dialogue]]
speaker = "フィオナ"
original = "「姉さんまで！\u3000だからまだ結婚してません！」"
translation = "「언니까지! 그러니까 아직 결혼 안 했어요!」"

[[dialogue]]
speaker = "梨緒"
original = "「まだ、か。つまり、将来的には予定があるということだな」"
translation = "「아직, 인가. 즉, 장래적으로는 예정이 있다는 것이군」"

[[dialogue]]
speaker = "フィオナ"
original = "「緋宮会長～！\u3000梨緒さんがイジワルです～！」"
translation = "「히노미야 회장~! 리오 씨가 심술궂어요~!」"

[[dialogue]]
speaker = "梨緒"
original = "「不躾なことを聞いて悪かった。……私は会長の敵になるかもしれない人間だが、君のことも友人だと思っている。だから２人がどれだけ近しいか確認しておきたかったんだ」"
translation = "「무례한 것을 물어서 미안했다. ……나는 회장의 적이 될지도 모르는 사람이지만, 너도 친구라고 생각하고 있다. 그래서 두 사람이 얼마나 가까운지 확인해 두고 싶었어」"

[[dialogue]]
speaker = "梨緒"
original = "「君がそばにいれば、安心できる気がする。会長が世界を滅ぼす魔王に堕ちないよう、その愛で支えてやってほしい」"
translation = "「네가 곁에 있으면, 안심할 수 있을 것 같다. 회장이 세계를 멸망시키는 마왕으로 타락하지 않도록, 그 사랑으로 지탱해 주었으면 좋겠다」"

[[dialogue]]
speaker = "フィオナ"
original = "「ええ、もちろん。私は緋宮会長を愛しています。世界を滅ぼさせたりなんてしません」"
translation = "「네, 물론이죠. 저는 히노미야 회장을 사랑하고 있습니다. 세계를 멸망시키거나 하진 않을 거예요」"

[[dialogue]]
speaker = "梨緒"
original = "「全ての問題が解決して、二人が本当に式を挙げるとき…………私も式に参列してもいいだろうか？」"
translation = "「모든 문제가 해결되고, 두 사람이 정말로 식을 올릴 때………… 나도 식에 참석해도 괜찮을까?」"

[[dialogue]]
speaker = "フィオナ"
original = "「はい、必ず」"
translation = "「네, 반드시요」"

[[dialogue]]
speaker = "梨緒"
original = "「その日が来ることを、心から楽しみにしているよ」"
translation = "「그날이 오기를, 진심으로 기대하고 있겠다」"

[[dialogue]]
speaker = "アポロ"
original = "「もちろんあたしも式に出るからな！」"
translation = "「물론 나도 식에 나갈 거다!」"

[[dialogue]]
speaker = "フィオナ"
original = "「……姉さんはしばらくグミ抜きです」"
translation = "「……언니는 당분간 젤리 금지예요」"

[[dialogue]]
speaker = "アポロ"
original = "「ええ～っ！？」"
translation = "「에에~!?」"

[[dialogue]]
speaker = "unk"
original = "フィオナを怒らせたアポロは、流星ライダーグミを許してもらうまで、しばらくかかったのだった。"
translation = "피오나를 화나게 한 아폴로는, 유성 라이더 젤리를 용서받을 때까지, 시간이 좀 걸렸다."

