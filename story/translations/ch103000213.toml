[[dialogue]]
speaker = "unk"
original = "第３話,マリッジブルーは突然に,P"
translation = "제3화, 머리지 블루는 갑자기, P"

[[dialogue]]
speaker = "ナミエル"
original = "「ふぅ、こんなところまで瓦礫が飛んで。やはり今夜は大立ち回りだったようですね」"
translation = "「후우, 이런 곳까지 잔해가 날아오다니. 역시 오늘 밤은 한바탕 소동이었던 모양이네요」"

[[dialogue]]
speaker = "ナミエル"
original = "「……そろそろ帰られても良いのですよ？\u3000もう夜も遅いですし、お陰様で大部分は片付きましたので」"
translation = "「……슬슬 돌아가셔도 괜찮답니다? 벌써 밤도 늦었고, 덕분에 대부분은 정리되었으니까요」"

[[dialogue]]
speaker = "ナミエル"
original = "「これは美化委員の仕事です。無理して手伝っていただかなくとも……」"
translation = "「이건 미화 위원의 일입니다. 무리해서 도와주시지 않아도……」"

[[dialogue]]
speaker = "unk"
original = "深夜デートみたいで楽しいから"
translation = "심야 데이트 같아서 즐거우니까"

[[dialogue]]
speaker = "ナミエル"
original = "「っっ……。も、もっと他に言い方はなかったのですか？\u3000動機が不純です。公私の混同はよしてください」"
translation = "「윽윽……. 조, 좀 더 다른 말투는 없었나요? 동기가 불순합니다. 공사의 혼동은 삼가 주세요」"

[[dialogue]]
speaker = "ナミエル"
original = "「私一人で夜道を帰らせるのは嫌だから……とか。彼氏として彼女の仕事を手伝いたい……とか。色々あるではないですか」"
translation = "「나 혼자 밤길을 가게 하는 건 싫으니까…… 라든가. 남자친구로서 여자친구의 일을 돕고 싶다…… 라든가. 여러 가지 있지 않습니까」"

[[dialogue]]
speaker = "ナミエル"
original = "「む、無論、そのようなことを言われたいわけではありませんが。夜道など一人で帰れますし、清掃を手伝っていただいても時間が無駄にかかるだけですし」"
translation = "「무, 물론, 그런 말을 듣고 싶다는 건 아닙니다만. 밤길 정도는 혼자서도 갈 수 있고, 청소를 도와주셔도 시간만 낭비될 뿐이고요」"

[[dialogue]]
speaker = "ナミエル"
original = "「と、とにかく。手伝うにしても健全な理由で手伝ってください。深夜デートなんて、ふ、不健全なこと……」"
translation = "「어, 어쨌든. 돕더라도 건전한 이유로 도와주세요. 심야 데이트라니, 부, 불건전한 일……」"

[[dialogue]]
speaker = "unk"
original = "あ、結婚雑誌発見！"
translation = "아, 결혼 잡지 발견!"

[[dialogue]]
speaker = "ナミエル"
original = "「聞いてください！\u3000全くもう……それで、結婚雑誌ですか？」"
translation = "「제 말 좀 들으세요! 정말이지…… 그래서, 결혼 잡지인가요?」"

[[dialogue]]
speaker = "ナミエル"
original = "「へぇ……このようなものがあるのですね。知りませんでした。きっと戦闘のどさくさで書店から吹き飛ばされてしまったのですね」"
translation = "「헤에…… 이런 것이 있군요. 몰랐습니다. 분명 전투 와중에 서점에서 날려 온 것이겠죠」"

[[dialogue]]
speaker = "ナミエル"
original = "「お店にお返しするには傷みすぎてますし……残念ですがゴミとして処理するしかありませんか」"
translation = "「가게에 돌려주기에는 너무 상해버렸고…… 아쉽지만 쓰레기로 처리할 수밖에 없겠네요」"

[[dialogue]]
speaker = "ナミエル"
original = "「しかし……お綺麗な花嫁さんですね。背が高くてすらりとしていて、とても大人っぽくて、ウェディングドレスもとても似合っています……」"
translation = "「하지만…… 참 고운 신부님이네요. 키가 크고 늘씬해서 아주 어른스럽고, 웨딩드레스도 무척 잘 어울려요……」"

[[dialogue]]
speaker = "ナミエル"
original = "「まるでメイド長のような凛々しい着こなし……私とは大違いで……」"
translation = "「마치 메이드장처럼 늠름한 맵시…… 저와는 딴판이라……」"

[[dialogue]]
speaker = "unk"
original = "ナミエルのドレス姿が一番可愛いよ"
translation = "나미엘의 드레스 차림이 제일 귀여워"

[[dialogue]]
speaker = "ナミエル"
original = "「～～っっ。い、いきなりおかしなことを言い出さないでください。別に落ち込んでいたわけではありませんよ……！」"
translation = "「~~윽윽. 가, 갑자기 이상한 소리 하지 마세요. 딱히 낙담하고 있었던 건 아니거든요……!」"

[[dialogue]]
speaker = "ナミエル"
original = "「それより、こんな雑誌読んでないで清掃に集中してください。私もここからは本気で掃除しますから」"
translation = "「그보다, 이런 잡지 읽지 말고 청소에 집중해 주세요. 저도 지금부터는 본격적으로 청소할 테니까요」"

[[dialogue]]
speaker = "ナミエル"
original = "「んっ……」"
translation = "「응……」"

[[dialogue]]
speaker = "ナミエル"
original = "「な、なんですか？\u3000別に緋宮会長に見せるためにウェディングドレスに着替えたわけではありません。お掃除の効率を上げるために変身しただけです」"
translation = "「뭐, 뭔가요? 딱히 히노미야 회장에게 보여주기 위해 웨딩드레스로 갈아입은 건 아닙니다. 청소 효율을 높이기 위해 변신했을 뿐이에요」"

[[dialogue]]
speaker = "ナミエル"
original = "「辺りはもう真っ暗ですから。白いドレスを着ると月の光が反射されて、手元が明るく見えるんです。ただそれだけです」"
translation = "「주변이 벌써 캄캄하니까요. 하얀 드레스를 입으면 달빛이 반사되어서 손끝이 밝게 보이거든요. 단지 그뿐입니다」"

[[dialogue]]
speaker = "unk"
original = "まさに闇夜に舞い降りた天使だ"
translation = "그야말로 밤하늘에 내려온 천사네"

[[dialogue]]
speaker = "ナミエル"
original = "「天──っっ。あ、当たり前でしょう、私は天使なのですから。人間でも魔族でもなく天使です。妙なたとえをしないでください」"
translation = "「천──윽윽. 다, 당연하죠, 저는 천사니까요. 인간도 마족도 아닌 천사입니다. 묘한 비유는 하지 말아 주세요」"

[[dialogue]]
speaker = "ナミエル"
original = "「あ、あう、そんなにジロジロ見つめるのもダメです。あなたに見せるために着たわけではないと言いました」"
translation = "「아, 아우, 그렇게 빤히 쳐다보는 것도 안 됩니다. 당신에게 보여주려고 입은 게 아니라고 말했잖아요」"

[[dialogue]]
speaker = "ナミエル"
original = "「見とれて下さるのは……その、う、嬉しいですけど……」"
translation = "「넋을 잃고 봐주시는 건…… 그, 으, 기쁘지만요……」"

[[dialogue]]
speaker = "ナミエル"
original = "「けれど、えと、本当に似合っていますか……？\u3000私、背丈も小さいですし、お嬢様やメイド長に比べてその、上半身の出っ張りも乏しくて……」"
translation = "「하지만, 에토, 정말로 어울리나요……? 저, 키도 작고, 아가씨나 메이드장에 비해서 그, 상반신의 돌출도 부족해서……」"

[[dialogue]]
speaker = "unk"
original = "結婚してください"
translation = "결혼해 주세요"

[[dialogue]]
speaker = "ナミエル"
original = "「なっ──けっこ──あわわっ。と、突然何を仰ってるんですかっ」"
translation = "「나앗──결호──아와왓. 가, 갑자기 무슨 말씀을 하시는 건가요」"

[[dialogue]]
speaker = "ナミエル"
original = "「私のドレス姿を見て、言いたくなったんですか……？\u3000は、恥ずかしい人です、恥ずかしすぎます……」"
translation = "「제 드레스 차림을 보고, 말하고 싶어진 건가요……? 부, 부끄러운 사람입니다, 너무 부끄러워요……」"

[[dialogue]]
speaker = "ナミエル"
original = "「でも私と結婚したら苦労しますよ……？\u3000お料理もできませんし、ツンツンしていますし、全体的に小さいので、周りからあらぬ疑いを一生かけられることにも……」"
translation = "「하지만 저와 결혼하면 고생할걸요……? 요리도 못 하고, 삐딱하고, 전체적으로 작아서 주변에서 괜한 의심을 평생 살지도……」"

[[dialogue]]
speaker = "ナミエル"
original = "「あっ──……ん、んちゅっ……<emoji=heart04>」"
translation = "「앗──…… 응, 응츄…… <emoji=heart04>」"

[[dialogue]]
speaker = "ナミエル"
original = "「へ……返事もしていないのに誓いのキスをされても……<emoji=heart04>」"
translation = "「대…… 대답도 안 했는데 맹세의 키스를 받아도…… <emoji=heart04>」"

[[dialogue]]
speaker = "ナミエル"
original = "「い、嫌とは言っていません……。本当に、恥ずかしい人だと思っていただけです……」"
translation = "「시, 싫다고는 안 했습니다……. 정말이지, 부끄러운 사람이라고 생각했을 뿐이에요……」"

[[dialogue]]
speaker = "ナミエル"
original = "「こんなキスをされたら──ちゅっ……んっ、んふ……<emoji=heart04>\u3000わ、私まで恥ずかしい人になってしまうではないですか……<emoji=heart04>」"
translation = "「이런 키스를 받으면──츄…… 응, 응후…… <emoji=heart04> 저, 저까지 부끄러운 사람이 되어버리잖아요…… <emoji=heart04>」"

[[dialogue]]
speaker = "ナミエル"
original = "「えへへ、好き……好きですよ……<emoji=heart04>\u3000私も、その、あなたと、そ、その……<emoji=heart04>」"
translation = "「에헤헤, 좋아해…… 좋아해요…… <emoji=heart04> 저도, 그, 당신과, 그, 그게…… <emoji=heart04>」"

[[dialogue]]
speaker = "ナミエル"
original = "「きゃっ──……～～っっ<emoji=heart04>\u3000わ、私、今何を言いかけて……！？\u3000ふぁっ、ふあぁぁぁぁぁっっ～～……！！？」"
translation = "「꺄앗──…… ~~윽윽 <emoji=heart04> 저, 저 지금 무슨 말을 하려다가……!? 화아, 화아아아아아악~~……!!?」"

[[dialogue]]
speaker = "ナミエル"
original = "「お、お掃除に戻りますよっ。ほら早く──って、あ。雑誌のページが風でめくれて……可愛い、赤ちゃんです……」"
translation = "「청, 청소로 돌아갈 거예요. 자 어서── 어라. 잡지 페이지가 바람에 넘어가서…… 귀여운 아기네요……」"

[[dialogue]]
speaker = "ナミエル"
original = "「……あなたも、その、ええと。子どもが欲しかったりするんですか……？」"
translation = "「……당신도, 그, 에에토. 아이가 갖고 싶다거나 하나요……?」"

[[dialogue]]
speaker = "ナミエル"
original = "「た、単なる興味です。メイド仲間に夫婦は子どもを作るものと教わったもので。晴れか雨かどちらが好きか程度の質問です」"
translation = "「다, 단순한 흥미입니다. 메이드 동료에게 부부는 아이를 만드는 것이라고 배워서요. 맑은 날이 좋은지 비 오는 날이 좋은지 정도의 질문입니다」"

[[dialogue]]
speaker = "ナミエル"
original = "「もしも、万が一、億が一、私があなたと結婚したら……そ、そういう話にもなるかもしれませんし」"
translation = "「만약에, 만에 하나, 억에 하나, 제가 당신과 결혼한다면…… 그, 그런 이야기가 될지도 모르고요」"

[[dialogue]]
speaker = "ナミエル"
original = "「あなたが欲しいと仰るのなら……やぶさかではないと言いますか……」"
translation = "「당신이 원하신다면…… 마다하지 않겠다고나 할까……」"

[[dialogue]]
speaker = "ナミエル"
original = "「でも……想像できません。今ですらあなたが隣にいてくださるだけで、こんなにも温かくて幸せですのに」"
translation = "「하지만…… 상상이 안 돼요. 지금도 당신이 곁에 있어 주시는 것만으로 이렇게나 따뜻하고 행복한데」"

[[dialogue]]
speaker = "ナミエル"
original = "「もしも子どもができて……いいえ、結婚して家族になったとしたら……」"
translation = "「만약 아이가 생기고…… 아니, 결혼해서 가족이 된다면……」"

[[dialogue]]
speaker = "ナミエル"
original = "「……家族に、なったとしたら……」"
translation = "「……가족이, 된다면……」"

[[dialogue]]
speaker = "unk"
original = "ナミエル？"
translation = "나미엘?"

[[dialogue]]
speaker = "ナミエル"
original = "「あっ……！\u3000な、なんでもありません」"
translation = "「앗……! 아, 아무것도 아닙니다」"

[[dialogue]]
speaker = "ナミエル"
original = "「さ、馬鹿話はやめてお掃除に戻りますよ。やはり緋宮会長のせいで無駄に時間がかかってしまいました」"
translation = "「자, 바보 같은 소리는 그만두고 청소로 돌아가죠. 역시 히노미야 회장 때문에 헛되이 시간이 걸려버렸습니다」"

[[dialogue]]
speaker = "ナミエル"
original = "「私は向こうを清掃いたしますから、緋宮会長はあちらを清掃してください」"
translation = "「저는 저쪽을 청소할 테니까, 히노미야 회장은 저쪽을 청소해 주세요」"

[[dialogue]]
speaker = "ナミエル"
original = "「い、いいから行ってください。別に何も……ありませんから」"
translation = "「돼, 됐으니까 가세요. 별로 아무것도…… 없으니까요」"

[[dialogue]]
speaker = "ナミエル"
original = "「家族……家族、ですか……。あの人と結婚してしまえば、私にまた家族ができてしまうことに……」"
translation = "「가족…… 가족, 인가요……. 저 사람과 결혼해버리면, 제게 다시 가족이 생겨버리게……」"

