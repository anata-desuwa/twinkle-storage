[[dialogue]]
speaker = "unk"
original = "遥か上空にそびえる大型モンスターの口から、小型モンスターが絶えず出現し続けている。"
translation = "까마득한 상공에 솟아있는 대형 몬스터의 입에서 소형 몬스터가 끊임없이 출현하고 있다."

[[dialogue]]
speaker = "unk"
original = "俺たちはいよいよマムのビーチバレー訓練以上の、多数の敵を捌かなければいけない状況へと追い込まれていた。"
translation = "우리는 드디어 마무의 비치발리볼 훈련 이상의, 다수의 적을 상대해야 하는 상황으로 내몰리고 있었다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「くっ……！\u3000敵の数が多すぎる！\u3000体がもう１つ欲しい……！」"
translation = "「큭……! 적의 숫자가 너무 많아! 몸이 하나 더 있었으면 좋겠어……!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「できないことを言わない！\u3000自分の力でできることをイメージなさい！」"
translation = "「안 되는 소리 하지 마! 자신의 힘으로 할 수 있는 걸 이미지 하렴!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「イエス・マム！\u3000うおぉぉぉーーーっ！」"
translation = "「예스 마무! 우오오오오!」"

[[dialogue]]
speaker = "unk"
original = "アムがここぞとばかりの反射神経で、迫り来るモンスターの大群を捌き、殲滅して行くが、それでも手数が足りない。"
translation = "아무가 이때다 싶을 정도의 반사신경으로 몰려오는 몬스터 대군을 쳐내며 섬멸해 가지만 그래도 일손이 부족하다."

[[dialogue]]
speaker = "unk"
original = "だから、俺たちはマトイの状況にすぐ気づくことができなかった。"
translation = "그래서 우리는 마토이의 상황을 바로 알아차릴 수 없었다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「はぁ……はぁ……！」"
translation = "「하아…… 하아……!」"

[[dialogue]]
speaker_original = "女の子"
speaker_translation = "여자아이"
original = "「お姉さん……！」"
translation = "「언니……!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「大丈夫……私が守るから……！」"
translation = "「괜찮아…… 내가 지킬 테니까……!」"

[[dialogue]]
speaker = "unk"
original = "マトイの守っている星力持ちの女の子。敵が隙あらばその子を狙い、絶え間なく攻撃を仕掛けてきていた。"
translation = "마토이가 지키고 있는 성력을 지닌 여자아이. 적이 틈만 나면 그 아이를 노리고 쉴 새 없이 공격을 퍼붓고 있었다."

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「ギギギ！」"
translation = "「기기기!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「させない！\u3000はあぁぁぁーーーっ！」"
translation = "「안 보내! 하아아아아!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（集中を切らすな。全部捌き続けろ！\u3000他の誰かに助けてもらうまでの間でいい！）"
translation = "(집중력을 잃지 마. 전부 계속 받아내는 거야! 다른 누군가가 도와주러 올 때까지만이라도 좋아!)"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「会長ーーーッ！\u3000マムーーーッ！\u3000アムちゃんッ！！\u3000お願い！\u3000誰でもいいから手を貸してッ！！！」"
translation = "「회장님! 마무! 아무짱!! 부탁이야! 누구든 좋으니까 손 좀 빌려줘!!!」"

[[dialogue]]
speaker = "unk"
original = "マトイ！？\u3000待ってろ、今すぐ行く！"
translation = "마토이!? 기다려, 지금 바로 갈게!"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「ギーッ！」"
translation = "「기잇!」"

[[dialogue]]
speaker = "unk"
original = "しかし、目の前にモンスターの大群が殺到してくる。"
translation = "하지만 눈앞에 몬스터 대군이 쇄도해 온다."

[[dialogue]]
speaker = "unk"
original = "邪魔だぁぁぁーーーッ！！"
translation = "방해다아아아아!!"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（ダメッ……！\u3000これ以上は……保たない……！）"
translation = "(안 돼……! 더 이상은…… 못 버텨……!)"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あっ……！？」"
translation = "「앗……!?」"

[[dialogue]]
speaker = "unk"
original = "敵の攻撃の集中砲火で、ついにマトイの盾が砕かれる。そして、咄嗟に盾代わりにした剣も弾かれ、手から離れてしまう。"
translation = "적의 집중 포화에 마침내 마토이의 방패가 부서진다. 그리고 급히 방패 대신 쓴 검도 튕겨 나가 손에서 떨어지고 만다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（武器を両方とも失った……！\u3000普通じゃない状況……！\u3000私にできることはもう――）"
translation = "(무기를 양쪽 다 잃었어……! 평범하지 않은 상황……! 내가 할 수 있는 건 이제──)"

[[dialogue]]
speaker = "unk"
original = "マトイが後ろに視線を向けると、そこには恐怖に一生懸命耐える女の子の姿があって。"
translation = "마토이가 뒤를 돌아보자 거기엔 공포를 필사적으로 견디는 여자아이의 모습이 있었다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「諦め……られるかぁぁぁぁぁぁーーーーーーっ！！！」"
translation = "「포기…… 할 수 있겠냐아아아아아아아아아!!!」"

[[dialogue]]
speaker = "unk"
original = "マトイは両腕を前に構えて防御の姿勢をとり、女の子へ向けて放たれる集中砲火を体で受け止めた。"
translation = "마토이는 양팔을 앞으로 교차해 방어 자세를 취하고 여자아이를 향해 쏟아지는 집중 포화를 몸으로 받아냈다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「か……はっ……！」"
translation = "「커…… 헉……!」"

[[dialogue]]
speaker = "unk"
original = "マトイーーーーーーーーーッ！！！"
translation = "마토이이이이이이이이이이이!!!"

[[dialogue]]
speaker = "unk"
original = "俺は地面に倒れ込みそうになるマトイに駆け寄って、体を支える。"
translation = "나는 바닥에 쓰러지려는 마토이에게 달려가 몸을 부축한다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「マトイ先輩ッ！！！」"
translation = "「마토이 선배!!!」"

[[dialogue]]
speaker = "unk"
original = "続いてアムが到着し、盾を地面に突き刺すと重力バリアーを周囲に展開。マトイの代わりに女の子を守ろうとする。"
translation = "뒤이어 도착한 아무가 방패를 지면에 박으며 중력 배리어를 주위에 전개. 마토이 대신 여자아이를 지키려 한다."

[[dialogue]]
speaker = "unk"
original = "モンスターの大群が再びこちらへ集中砲火を放とうとしていたが――"
translation = "몬스터 대군이 다시 이쪽으로 집중 포화를 퍼부으려 하고 있었지만──"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「……やってくれたわね」"
translation = "「……사고를 쳤구나.」"

[[dialogue]]
speaker = "unk"
original = "俺たちとモンスター群の間に、マムが割って入る。そして――"
translation = "우리와 몬스터 무리 사이에 마무가 끼어든다. 그리고──"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「引力操作」"
translation = "「인력 조작.」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「ギッ……！？」"
translation = "「기잇……!?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「跡形もなく、ぶっ潰れなさい……！」"
translation = "「형체도 없이 뭉개져 버리렴……!」"

[[dialogue]]
speaker = "unk"
original = "マムが敵に向けた手の平を、ぐっと握る。"
translation = "마무가 적을 향해 펼쳤던 손바닥을 꽉 움켜쥔다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ブラックホール・イグニッション！！！」"
translation = "「블랙홀 이그니션!!!」"

[[dialogue]]
speaker = "unk"
original = "凄まじい引力によってモンスター群が空中の１点へと圧縮され、大爆発を巻き起こす。"
translation = "어마어마한 인력에 의해 몬스터 무리가 공중의 한 점으로 압축되더니 대폭발을 일으킨다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「――会長、マトイの状態は……！？」"
translation = "「──회장, 마토이의 상태는!?」"

[[dialogue]]
speaker = "unk"
original = "傷が酷い……！\u3000出血が止まらない……！"
translation = "상처가 심해……! 출혈이 멈추질 않아……!"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「マトイ先輩！\u3000大丈夫ですか、マトイ先輩！」"
translation = "「마토이 선배! 괜찮으세요, 마토이 선배!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「大……丈夫……」"
translation = "「괜……찮아……」"

[[dialogue]]
speaker = "unk"
original = "マトイがゆっくりと顔を上げる。"
translation = "마토이가 천천히 고개를 든다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「まだ戦える……」"
translation = "「아직 싸울 수 있어……」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「なに言ってるんですか！？\u3000その体じゃ無理ですよ！\u3000すぐに回復しないと……！」"
translation = "「무슨 소릴 하시는 거예요!? 그 몸으론 무리예요! 바로 회복하지 않으면……!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「守るのと並行して回復星術を使うから、大丈夫……」"
translation = "「지키는 거랑 병행해서 회복 성술을 쓸 테니까 괜찮아……」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「無理よ。盾はさっき砕けたでしょ。水着フォームに変身して、自身の回復を最優先になさい」"
translation = "「무리야. 방패는 아까 부서졌잖니. 수영복 폼으로 변신해서 자신의 회복을 최우선으로 하렴.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「それでも……私は、みんなの『普通』を守りたい……！」"
translation = "「그래도…… 나는 모두의 『평범함』을 지키고 싶어……!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「マトイ……？」"
translation = "「마토이……?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「自分が星騎士として、なんで今日まで戦って来れたのか、やっとわかったんです……」"
translation = "「내가 성기사로서 왜 오늘까지 싸워올 수 있었는지 드디어 알았어요……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「私は……当たり前の日常を守りたい――」"
translation = "「나는…… 당연한 일상을 지키고 싶어──」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（みんなが普通に、笑って過ごせる幸せを……）"
translation = "(모두가 평범하게 웃으며 지낼 수 있는 행복을……)"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（ヴィーナス）"
translation = "(비너스)"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（サーシャさん）"
translation = "(사샤 씨)"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（アナ）"
translation = "(아나)"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（そして――）"
translation = "(그리고──)"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（会長）"
translation = "(회장님)"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「――かけがえのない私の大切な『普通』を、守る為に……！」"
translation = "「──둘도 없이 소중한 나의 『평범함』을 지키기 위해서……!」"

[[dialogue]]
speaker = "unk"
original = "その時、俺には見えた。"
translation = "그때 내 눈에는 보였다."

[[dialogue]]
speaker = "unk"
original = "マトイの中に灯る、きら星のような輝きを。"
translation = "마토이의 안에서 불타오르는 샛별 같은 광채를."

[[dialogue]]
speaker = "unk"
original = "それは確かな予感だ。今なら、きっと――"
translation = "그것은 확실한 예감이다. 지금이라면 분명──"

[[dialogue]]
speaker = "unk"
original = "俺は、マトイを信じる！"
translation = "나는 마토이를 믿어!"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「会長……？」"
translation = "「회장님……?」"

[[dialogue]]
speaker = "unk"
original = "アルケインノヴァエクストリーム！！！"
translation = "알케인 노바 익스트림!!!"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "unk"
original = "マトイのきら星のような輝きが、眩く広がっていく。"
translation = "마토이의 샛별 같은 광채가 눈부시게 퍼져 나간다."

[[dialogue]]
speaker = "unk"
original = "そして――"
translation = "그리고──"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「これが……」"
translation = "「이것이……」"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「魔王の絆の力――私の『ノヴァフォーム』」"
translation = "「마왕의 인연의 힘── 나의 『노바 폼』」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「マトイ先輩、その姿は……！？\u3000それに、傷がもう消えてる……！？」"
translation = "「마토이 선배, 그 모습은……!? 게다가 상처가 벌써 사라졌어……!?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「どうやら……自分の殻を破ったみたいね」"
translation = "「아무래도…… 자신의 껍질을 깨뜨린 모양이군.」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「ギギギッ！」"
translation = "「기기긱!」"

[[dialogue]]
speaker = "unk"
original = "マトイの強い輝きに惹かれるかのように、モンスターの大群が再び押し寄せ、一斉砲火を開始しようとする。俺たちは身構えるが――"
translation = "마토이의 강렬한 빛에 이끌리듯, 몬스터 대군이 다시 몰려와 일제 포격을 개시하려 한다. 우리들은 몸을 정비하지만──"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「させない！」"
translation = "「하게 두지 않아!」"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "（イメージしろ。これは会長と絆で繋がった『魔王の力』）"
translation = "(이미지해. 이것은 회장님과 인연으로 연결된 『마왕의 힘』)"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "（だったら――）"
translation = "(그렇다면──)"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「ディバイドシールド！」"
translation = "「디바이드 실드!」"

[[dialogue]]
speaker = "unk"
original = "マトイが盾を構えた、次の瞬間。"
translation = "마토이가 방패를 겨눈 다음 순간."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「マトイ先輩の盾が……分裂した！？」"
translation = "「마토이 선배의 방패가…… 분열했어!?」"

[[dialogue]]
speaker = "unk"
original = "盾が分身するように無数に展開され、モンスターの攻撃を全て受け止める。"
translation = "방패가 분신하듯 무수히 전개되어, 몬스터의 공격을 전부 받아낸다."

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "（防御だけじゃ足りない。私が望むのは、守る為の強い力！）"
translation = "(방어만으로는 부족해. 내가 원하는 건 지키기 위한 강한 힘!)"

[[dialogue]]
speaker = "unk"
original = "攻撃を受けた盾が砕け、それは星力の輝きに変換されて、マトイのもう１つの武器である大剣へと吸収されて行く。"
translation = "공격을 받은 방패가 부서지고, 그것은 성력의 빛으로 변환되어 마토이의 또 다른 무기인 대검으로 흡수되어 간다."

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "（私の中にある『最強』のイメージ――）"
translation = "(내 안에 있는 『최강』의 이미지──)"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "（それは、劣等感を抱きつつも憎めない――私の親友）"
translation = "(그건 열등감을 품으면서도 미워할 수 없는── 나의 절친)"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "（神々しいまでの憧れの輝き――）"
translation = "(신성할 정도의 동경의 빛──)"

[[dialogue]]
speaker = "unk"
original = "マトイが両手で大剣を構える。"
translation = "마토이가 양손으로 대검을 겨눈다."

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「あの<ruby>金星<rt>ほし</rt></ruby>に届け――」"
translation = "「저 금성에 닿아라──」"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「リフレクトゴッデスカリバーーーッ！！！」"
translation = "「리플렉트 가디스 칼리버──!!!」"

[[dialogue]]
speaker = "unk"
original = "振り下ろした大剣から凄まじい星力の輝きが、上空の大型モンスターに向かって解き放たれる。"
translation = "내리친 대검에서 엄청난 성력의 빛이 상공의 대형 몬스터를 향해 해방된다."

[[dialogue]]
speaker = "unk"
original = "それは小型モンスターの大群を巻き込みながら、大型モンスターに直撃。"
translation = "그것은 소형 몬스터 대군을 휩쓸면서 대형 몬스터에 직격."

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「ギアァァァーーーーーーッ！！？」"
translation = "「기아아아아──────!!?」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「すごい……！\u3000大型モンスターの動きが止まった！\u3000小型モンスターも吹き飛ばして……今なら！」"
translation = "「대단해……! 대형 몬스터의 움직임이 멈췄어! 소형 몬스터도 날려버리고…… 지금이라면!」"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「みんな、力を貸して！\u3000あのモンスターを倒して、この戦いを終わらせる！」"
translation = "「모두, 힘을 빌려줘! 저 몬스터를 쓰러뜨리고 이 싸움을 끝내겠어!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「いいわ。私たちで援護してあげる。貴方のやりたいようにやりなさい、マトイ！」"
translation = "「좋아. 우리들이 원호해 주지. 네가 하고 싶은 대로 하렴, 마토이!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「背中はあたしが守るよ！\u3000だから――やっちゃえ！\u3000マトイ先輩！！」"
translation = "「등 뒤는 내가 지킬게! 그러니까── 해버려! 마토이 선배!!」"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「うん！\u3000会長、指示をお願い！」"
translation = "「응! 회장님, 지시를 부탁해!」"

[[dialogue]]
speaker = "unk"
original = "アルケインノヴァエクストリーム！！！"
translation = "알케인 노바 익스트림!!!"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「ありがとう。――行ってくる！」"
translation = "「고마워. ──다녀올게!」"

[[dialogue]]
speaker = "unk"
original = "大型モンスターへと向かって、飛び立つマトイ。"
translation = "대형 몬스터를 향해 날아오르는 마토이."

[[dialogue]]
speaker = "unk"
original = "決戦が幕を開けるのだった。"
translation = "결전이 막을 올리는 것이었다."

