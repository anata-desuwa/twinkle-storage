[[dialogue]]
speaker = "unk"
original = "第７話,世界樹のうろ,B"
translation = "제7화, 세계수의 빈 구멍, B"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「──そこまでだ。下がれ、カヤ」"
translation = "「── 거기까지다. 물러서라, 카야」"

[[dialogue]]
speaker_original = "カヤ"
speaker_translation = "카야"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「この声は──」"
translation = "「이 목소리는──」"

[[dialogue]]
speaker = "unk"
original = "交戦開始からしばらくして──"
translation = "교전 개시로부터 잠시 후──"

[[dialogue]]
speaker = "unk"
original = "待ったをかけるように聞こえてきたのは、いつかの女性のアナウンスだった。"
translation = "멈추라는 듯이 들려온 것은, 언젠가의 여성의 안내 방송이었다."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "『その者たちには縁がある──警戒しつつ丁重に案内せよ、カヤ』"
translation = "『그들에게는 인연이 있다── 경계하면서 정중하게 안내하라, 카야』"

[[dialogue]]
speaker_original = "カヤ"
speaker_translation = "카야"
original = "「……ラジャ」"
translation = "「……라저」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「改めて──久方ぶりだな、諸君。流星、そして新星学園の星騎士たち」"
translation = "「다시 한번── 오랜만이다, 제군. 유성, 그리고 신성 학원의 성기사들이여」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「セドナ……さん。でしたよね」"
translation = "「세드나…… 씨. 맞았지요」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ああ。しかし、今日はよもや我々の基地にいきなり乗り込んでこようとは──どういう了見かね？」"
translation = "「그래. 하지만, 오늘은 설마 우리 기지에 갑자기 쳐들어오려 할 줄이야── 무슨 속셈인가?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ぜ、前回は無理やり連れてこられたですよ！？」"
translation = "「저, 지난번에는 억지로 끌려왔단 말입니다!?」"

[[dialogue]]
speaker_original = "カヤ"
speaker_translation = "카야"
original = "「……上官の<ruby>知己<rt>ちき</rt></ruby>だったの。迎撃しちゃったけど──」"
translation = "「……상관의 지기였나. 요격해 버렸지만──」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「構わん。招かれざる客には違いない。なんなら、次に訪ねてきた時も同じように歓迎してやれ」"
translation = "「상관없다. 초대받지 않은 손님임에는 틀림없다. 정 그렇다면, 다음에 찾아왔을 때도 똑같이 환영해 주어라」"

[[dialogue]]
speaker_original = "カヤ"
speaker_translation = "카야"
original = "「イエス、コマンダー」"
translation = "「예스, 커맨더」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「えぇぇ……」"
translation = "「에에에……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「不当な扱いにも程があります」"
translation = "「부당한 처사도 정도가 있습니다」"

[[dialogue]]
speaker = "unk"
original = "『カヤ』と呼ばれた少女はこの基地の番兵らしく、侵入者がいないか上空まで見張っていたようだった。"
translation = "『카야』라고 불린 소녀는 이 기지의 번병인 듯, 침입자가 없는지 상공까지 감시하고 있었던 모양이었다."

[[dialogue]]
speaker = "unk"
original = "上官のセドナさんに命じられてからはすっかりおとなしく待機している。"
translation = "상관인 세드나 씨에게 명령받고 나서는 완전히 얌전하게 대기하고 있다."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「まあいい。暇ではないが──少しくらいなら時間を割いてやる」"
translation = "「뭐 좋다. 한가하지는 않으나── 조금 정도는 시간을 내주마」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「わざわざこちらへうかがうほどの用もあるようだし──な？」"
translation = "「일부러 이곳까지 찾아올 만한 용건도 있는 듯하고── 안 그런가?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……はい。お尋ねしたい事柄が、いくつかあります」"
translation = "「……네. 여쬬보고 싶은 사항이, 몇 가지 있습니다」"

[[dialogue]]
speaker = "unk"
original = "そうして俺は改めてセドナさんに事情を説明した。"
translation = "그렇게 나는 다시 세드나 씨에게 사정을 설명했다."

[[dialogue]]
speaker = "unk"
original = "ヴィーナスがさらわれたこと、行方をようやく掴めそうだったこと、そして……。"
translation = "비너스가 납치된 것, 행방을 겨우 잡을 수 있을 것 같았던 것, 그리고…….」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「がん首揃えて訪ねてきたかと思えば──やれやれ」"
translation = "「머리를 맞대고 찾아왔나 했더니── 에휴」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「<b>三界を渡る方法を知らないか</b>……だと？」"
translation = "「<ruby>삼계를 건너는 방법을 모르는가<rt>・・・ ・・・ ・・・ ・・・・</rt></ruby>……라고?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──ええ。あなた達は以前、三界のどこでもない『魔女の森』に棲んでいたと言った」"
translation = "「── 네. 당신들은 이전에, 삼계의 어디도 아닌 『마녀의 숲』에 살고 있었다고 말했습니다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そして、その移動に際してはあの穴──『世界樹のうろ』を通ってきたとも」"
translation = "「그리고, 그 이동 시에는 그 구멍── 『세계수의 빈 구멍』을 통과했다고도」"

[[dialogue]]
speaker = "unk"
original = "俺は基地の一角にむき出しとなった木の根にちらりと視線をやった。"
translation = "나는 기지 한쪽에 드러난 나무뿌리에 살짝 시선을 주었다."

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「──それはあくまでも我々魔女にのみ許された経路です。あなた達は違います」"
translation = "「── 그것은 어디까지나 저희 마녀에게만 허락된 경로입니다. 당신들은 다릅니다」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「通常、三界をまたぐ移動には鏡界の湖から『大交流』の船に乗る必要があります。もっとも、限られた人員しか許可されませんが」"
translation = "「통상, 삼계를 넘나드는 이동에는 경계의 호수에서 『대교류』의 배를 탈 필요가 있습니다. 물론, 한정된 인원밖에 허가되지 않지만요」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「そ、それは当然知っています！\u3000わたし達がお聞きしたいのはそうではなくですね！」"
translation = "「그, 그것은 당연히 알고 있습니다! 저희가 여쭙고 싶은 것은 그런 것이 아니라 말입니다!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「我々の『うろ』なら今の時期でも使えるだろう──と？」"
translation = "「우리들의 『빈 구멍』이라면 지금 시기에도 사용할 수 있을 거라고── 말인가?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……その通りです」"
translation = "「……그렇습니다」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「『うろ』を当てにして、ここまで来たというのですか──」"
translation = "「『빈 구멍』을 믿고, 여기까지 왔다는 것입니까──」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「第一──魔女の森へ行けたとして何とする？\u3000断っておくが、おまえ達の尋ね人が迷い込んだ可能性はゼロだぞ」"
translation = "「첫째── 마녀의 숲에 갈 수 있었다 한들 어쩔 셈인가? 미리 말해두지만, 너희가 찾는 사람이 길을 잃었을 가능성은 제로다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ええ。確かに俺たちが魔女の森へ行く必要はない。だけど──」"
translation = "「네. 확실히 우리가 마녀의 숲에 갈 필요는 없다. 하지만──」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「世界樹とは文字通り──世界と世界を結ぶ樹。あの穴をくぐった先には、私どもの暮らす魔女の森があります」"
translation = "「세계수란 문자 그대로── 세계와 세계를 잇는 나무. 저 구멍을 통과한 앞에는, 저희가 사는 마녀의 숲이 있습니다」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「つまりあれは──異世界同士を繋ぐ『世界樹のうろ』なのです」"
translation = "「즉 저것은── 이세계끼리를 잇는 『세계수의 빈 구멍』인 것입니다」"

[[dialogue]]
speaker = "unk"
original = "以前──アイリーンさんがこの場で語ってくれたことを思い出す。"
translation = "이전── 아이린 씨가 이 자리에서 말해줬던 것을 떠올린다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「アイリーンさんはこうも言った。世界樹のうろは──<b>異世界同士</b>を繋ぐものなのだと」"
translation = "「아이린 씨는 이렇게도 말했습니다. 세계수의 빈 구멍은── <b>이세계끼리</b>를 잇는 것이라고」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "unk"
original = "ここから先、確証はない。だがすべてを見透かしたように俺は続けた。"
translation = "여기서부터는 확증이 없다. 하지만 모든 것을 꿰뚫어 본 것처럼 나는 말을 이었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そして、ここが人間界の本部であるという事実。なら他にも当然──拠点や支部が存在するんだろう」"
translation = "「그리고, 이곳이 인간계의 본부라는 사실. 그렇다면 다른 삼계에도 당연히── 거점이나 지부가 존재하겠지」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「これらのことを踏まえると──あの根は他の三界にも繋がっていると解釈するのが自然だ」"
translation = "「이러한 점들을 고려하면── 저 뿌리는 다른 삼계에도 연결되어 있다고 해석하는 것이 자연스럽다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「つまり──魔界にも……」"
translation = "「즉── 마계에도……」"

[[dialogue]]
speaker = "unk"
original = "三界を自在にまたぐ方法なんてのは、詐欺まがいも横行するくらいには絵空事──"
translation = "삼계를 자유자재로 넘나드는 방법 따위는, 사기꾼마저 판치는 정도의 허황된 이야기──"

[[dialogue]]
speaker = "unk"
original = "しかし彼女たち<b>だけ</b>は、そんな経路だけを使って、これまで連綿と行き来してきた幻の存在だ。"
translation = "하지만 그녀들<b>만이</b>, 그런 경로만을 사용해, 지금까지 끊임없이 왕래해 온 환상의 존재다."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「……ふう。やれやれ。少々語りすぎたようだな、アイリーン」"
translation = "「……휴. 이럴 수가. 조금 말이 많았던 것 같군, 아이린」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「──申し訳ございません」"
translation = "「── 죄송합니다」"

[[dialogue]]
speaker = "unk"
original = "セドナさんとアイリーンさんは、納得したように目を合わせると……"
translation = "세드나 씨와 아이린 씨는, 납득한 듯 눈을 마주치더니……"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「話はわかった。それで──我々にどうしてほしい？」"
translation = "「이야기는 알겠다. 그래서── 우리에게 무엇을 해 주길 바라나?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「『世界樹のうろ』を通らせて欲しい。俺たちに」"
translation = "「『세계수의 빈 구멍』을 통과하게 해줬으면 한다. 우리들을」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「代価もなしにか。虫のいい話だな」"
translation = "「대가도 없이 말인가. 염치없는 이야기군」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。だから」"
translation = "「아아. 그래서」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ちょっ……緋宮くん！？\u3000土下座って……！」"
translation = "「잠깐…… 히노미야 군!? 도게자라니……!」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「そこまでして──」"
translation = "「그렇게까지 해서──」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──この通りだ。今、俺たちは仲間が魔界へさらわれて窮地にある」"
translation = "「── 이대로다. 지금, 우리들은 동료가 마계로 납치되어 궁지에 몰려 있다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「どうしても……命に代えても、あいつを助けにいかなきゃならないんだ……！」"
translation = "「무슨 일이 있어도…… 목숨을 걸고라도, 그 녀석을 구하러 가야만 해……!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "俺は地に膝をついて──頭を下げた。"
translation = "나는 땅에 무릎을 꿇고── 고개를 숙였다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺たちは同志だとあなたは言った。この先のリクリエに抗するためにも、ヴィーナスの力は必要だ」"
translation = "「우리는 동지라고 당신은 말했다. 앞으로의 리크리에에 맞서기 위해서라도, 비너스의 힘은 필요하다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「星徒会の握っている情報だって共有する。俺個人の戦力をいくら貸したって構わない」"
translation = "「성도회가 쥐고 있는 정보도 공유하겠다. 내 개인의 전력을 아무리 빌려줘도 상관없다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だから──どうか、もし魔界へ通じる道があるなら、譲ってほしい」"
translation = "「그러니── 부디, 만약 마계로 통하는 길이 있다면, 양보해 줬으면 한다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「会長……」"
translation = "「회장……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「っ……私たちからもお願いします。大事な命が懸かっているんです」"
translation = "「윽…… 저희도 부탁드립니다. 소중한 목숨이 걸려 있습니다」"

[[dialogue]]
speaker = "unk"
original = "本当なら──駆け引きするなり、手土産を持つなりあったんだろうけど。"
translation = "사실이라면── 흥정을 하거나, 선물을 가져오거나 했겠지만."

[[dialogue]]
speaker = "unk"
original = "そんな用意をしていられる状況じゃなかった。だから泥臭くても、俺はセドナさんに懇願する。"
translation = "그런 준비를 하고 있을 상황이 아니었다. 그래서 흙탕물처럼 더럽더라도, 나는 세드나 씨에게 간청한다."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「……誠意は認めよう。確かに、<b>世界樹のうろ</b>を通れば我らの森だけでなく──魔界や天界にさえ赴くことができる」"
translation = "「……성의는 인정하겠다. 확실히, <ruby>세계수의 빈 구멍<rt>・・・・ ・ ・・</rt></ruby>을 통하면 우리들의 숲뿐만 아니라── 마계나 천계에조차 갈 수 있다」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「！\u3000天界にも──」"
translation = "「! 천계에도──」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「あの洞穴の先の道も、いくらか枝分かれしてるって感じかな？」"
translation = "「저 동굴 앞의 길도, 어느 정도 가지가 나뉘어 있다는 느낌일까?」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「そうだ。三界の各地に張り巡らされている世界樹の根を伝うことで、次元間での移動が可能となる」"
translation = "「그렇다. 삼계의 각지에 뻗어 있는 세계수의 뿌리를 따라 이동함으로써, 차원 간 이동이 가능해진다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "（あのうろはあくまでも巨大な世界樹の一部……その根は至るところに張り巡らされている、というワケですか──）"
translation = "（저 빈 구멍은 어디까지나 거대한 세계수의 일부…… 그 뿌리는 곳곳에 뻗어 있다는 뜻입니까──）"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "（新星会長さんの勘、ドンピシャです！）"
translation = "（신성 회장님의 직감, 딱 맞습니다!）"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「しかし──『うろ』は我ら魔女にとって、世界樹本体とも結びつく神聖なもの。易々と人間などを通すわけにはいかない」"
translation = "「하지만── 『빈 구멍』은 우리 마녀에게 있어, 세계수 본체와도 연결되는 신성한 것이다. 쉽게 인간 등을 통과시킬 수는 없다」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「っ……どうしても、ですか……！？」"
translation = "「윽…… 꼭 그래야 합니까……!?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そんな──！」"
translation = "「그런──!」"

[[dialogue]]
speaker = "unk"
original = "やはり種族の壁は高い──"
translation = "역시 종족의 벽은 높다──"

[[dialogue]]
speaker = "unk"
original = "そう思われ、絶望の気色がただよった瞬間だった。"
translation = "그렇게 생각되어, 절망의 기색이 감돌았던 순간이었다."

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「よいではないか──セドナ。よもやこれで、魔女が滅ぶわけでもあるまい」"
translation = "「좋지 아니한가── 세드나. 설마 이것으로, 마녀가 멸망할 리도 없을 터」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「だ、誰……？」"
translation = "「누, 누구……?」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「姫──今はまだ、宿題の時間のはずですが……」"
translation = "「공주── 지금은 아직, 숙제 시간일 텐데요……」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「──<ruby>面<rt>おもて</rt></ruby>を上げい、<ruby>男子<rt>おのこ</rt></ruby>よ。余が許可を出してやる」"
translation = "「── 고개를 들라, 사내여. 여가 허가를 내주겠다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……」"
translation = "「윽……」"

[[dialogue]]
speaker = "unk"
original = "俺は立ち上がり、居住まいを正した。"
translation = "나는 일어서서, 자세를 바로잡았다."

[[dialogue]]
speaker = "unk"
original = "奥の扉から現れた少女──以前ここへ来た時には見なかった人物だ。"
translation = "안쪽 문에서 나타난 소녀── 이전에 이곳에 왔을 때는 보지 못했던 인물이다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（この子は……）"
translation = "（이 아이는……）"

[[dialogue]]
speaker = "unk"
original = "……なんだろうか。"
translation = "……뭘까."

[[dialogue]]
speaker = "unk"
original = "年端も行かぬ少女にしか見えないのに──"
translation = "어린 소녀로밖에 보이지 않는데──"

[[dialogue]]
speaker = "unk"
original = "こうして相対しているだけでも、ひしひしと突き刺すようなオーラを感じる。"
translation = "이렇게 마주하고 있는 것만으로도, 사무치게 찌르는 듯한 오라를 느낀다."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「お戯れを、姫。世界樹に外部の者を通すなど、前例のなきことです」"
translation = "「농담을 하시는군요, 공주. 세계수에 외부인을 통과시키는 것은, 전례가 없는 일입니다」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「何──固いことを抜かすでない、セドナ。それで『うろ』がすり減るわけでもないのだろう」"
translation = "「무엇── 딱딱한 소리를 하지 마라, 세드나. 그걸로 『빈 구멍』이 닳는 것도 아닐 터」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ですが、万が一のことがあっては……」"
translation = "「하지만, 만일의 일이 있어서는……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（な、なんか風向き変わった感じ……？）"
translation = "（뭐, 뭔가 분위기가 바뀐 느낌……?）"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "（ね。よくわかんないけどやるじゃん、あのちびっこ）"
translation = "（그러게. 잘 모르겠지만 대단하네, 저 꼬맹이）"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「そういうわけで──余が特別に許可してやる。お主ら、ここを通って魔界へ行ってもよいぞ」"
translation = "「그런 이유로── 여가 특별히 허가해 주겠다. 그대들, 이곳을 통과해서 마계로 가도 좋다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「本当に──いいのか……？」"
translation = "「정말로── 괜찮은 건가……?」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「うむ。何せ余は『ネビュラ』の<b>そーすい</b>だからな──偉い者が決める権利を持つのだ。わはは！」"
translation = "「음. 왜냐하면 여는 『네뷸라』의 <b>총수</b>이니까── 높은 사람이 결정할 권리를 가진다. 와하하!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "（総帥って──ここの？\u3000えぇ……？）"
translation = "（총수라니── 이곳의? 에에……?）"

[[dialogue]]
speaker = "unk"
original = "少女の登場によって空気が一変し、チャンスのありそうな雰囲気になった。"
translation = "소녀의 등장으로 분위기가 일변하며, 기회가 있을 법한 분위기가 되었다."

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「──た・だ・し」"
translation = "「──하・지・만」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「当然……タダで、とは言わんがのう。ふふふ」"
translation = "「당연히…… 공짜로, 라고는 말하지 않겠다. 후후후」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「なるほど──対価ですか」"
translation = "「과연── 대가 말입니까」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「もちろん望むなら助力するつもりだ。そちらがいざという時は、俺たちが助太刀をしたって──」"
translation = "「물론 원한다면 도울 생각이다. 그쪽이 위급할 때는, 우리가 도움을 줬다고──」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ああ、要らぬ要らぬそんなものは。小難しい話は嫌いだ」"
translation = "「아아, 필요 없다 필요 없어 그런 것은. 복잡한 이야기는 싫다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「？\u3000なら……」"
translation = "「? 그럼……」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「余は退屈なのだ。毎日毎日この基地から出られんでなあ、やれ勉強だ野菜だと小うるさい小言ばかり」"
translation = "「여는 따분하다. 매일매일 이 기지에서 나가지 못하고, 이래라 저래라 공부다 야채다 잔소리만 시끄럽게」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「だから──せいぜい飽きさせぬ程度に、遊んでくれればそれでいい」"
translation = "「그러니── 실컷 질리지 않을 정도로, 놀아주면 그걸로 됐다」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「試練だ。余らを打ち倒し、その誠意をやらを証明してみせよ」"
translation = "「시련이다. 우리를 쓰러뜨리고, 그 성의를 증명해 보이라」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そう来るのね──」"
translation = "「그렇게 나오는구나──」"

[[dialogue]]
speaker = "unk"
original = "少女の手には見たことのない形の魔法杖が握られていた。"
translation = "소녀의 손에는 본 적 없는 형태의 마법 지팡이가 쥐어져 있었다."

[[dialogue]]
speaker = "unk"
original = "その全身からは刺すようなオーラの奔流がほとばしる──"
translation = "그 전신에서는 찌르는 듯한 오라의 물결이 솟구친다──"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「セドナ。アイリーン。カヤも来い。共に遊んでやろうぞ、これも一興だ」"
translation = "「세드나. 아이린. 카야도 와라. 함께 놀아주겠다, 이것도 하나의 흥이다」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「！\u3000は──はいっ！」"
translation = "「! 하──네엣!」"

[[dialogue]]
speaker_original = "カヤ"
speaker_translation = "카야"
original = "「──ご用命なら」"
translation = "「──분부라면」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ふう……付き合わされるこちらの身にもなってほしいですが。少しだけですよ」"
translation = "「휴…… 어울려야 하는 이쪽 입장도 생각해 주셨으면 합니다만. 조금만이에요」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「っっ……！\u3000なんて星力──じゃなくって、これは……！」"
translation = "「크읏……! 엄청난 성력──이 아니잖아, 이건……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「魔力──か」"
translation = "「마력──인가」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「さよう。ああ、魔法は三千年前からも存続している由緒ある術なのだぞ」"
translation = "「그렇다. 아아, 마법은 삼천 년 전부터 존속하고 있는 유서 깊은 술법이다」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「精々丸焼けにはならぬことだな。お仲間に会わせるツラが黒焦げでは、興醒めだろう？」"
translation = "「기껏해야 홀라당 타버리지 않도록 해라. 동료에게 보여줄 얼굴이 새까맣게 타버리면, 흥이 깨지지 않겠나?」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「お二人の魔力には及びませんが──全力でサポートいたしますっ！」"
translation = "「두 분의 마력에는 미치지 못하지만── 전력으로 서포트하겠습니다!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「是非もないですね──こちらも全力でお相手しましょう！」"
translation = "「어쩔 수 없군요── 이쪽도 전력으로 상대해 드리겠습니다!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。恐らく世界に唯一の道筋──逃すわけにはいかない！」"
translation = "「아아. 아마도 세계에 유일한 길── 놓칠 수는 없다!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（ヴィーナス……待っていてくれ。どんな手を使っても君に辿り着く）"
translation = "（비너스…… 기다려 줘. 어떤 수를 써서라도 너에게 닿을 것이다）"

[[dialogue]]
speaker = "unk"
original = "絶対に負けられない──"
translation = "절대로 질 수 없다──"

[[dialogue]]
speaker = "unk"
original = "俺はたぎる闘志を燃やして、過去最大に守護星の地球へ祈りを捧げた。"
translation = "나는 끓어오르는 투지를 불태우고, 과거 최대로 수호성인 지구에 기도를 바쳤다."

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「《光》の魔女、クラウディア・イルゼ・フォン・ゴットフリート──ネビュラが総帥として相手をしてやる」"
translation = "「《빛》의 마녀, 클라우디아 일제 폰 고트프리트── 네뷸라의 총수로서 상대해 주겠다」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「<b>せーとかい</b>とやらの威信、余に示してみせるがよいぞ！」"
translation = "「<b>성도회</b>라는 것의 위신, 여에게 보여주도록 하라!」"

