[[dialogue]]
speaker = "unk"
original = "第３話,運命の相手,P"
translation = "제3화, 운명의 상대"

[[dialogue]]
speaker = "unk"
original = "とある日の放課後、ヴィーナスが帰宅する俺についてきて、家までやってきた。"
translation = "어느 날 방과 후, 비너스가 귀가하는 나를 따라와 집까지 찾아왔다."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「──星徒会の他の子たちは以前うちまで来てくれたけど、ヴィーナスちゃんは初めましてね。それで、今日はどうしたのかしら？」"
translation = "「──성도회의 다른 아이들은 전에 우리 집에 와줬었지만, 비너스짱은 처음이네. 그래서, 오늘은 무슨 일이니?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「初めまして！\u3000私もクロトがどんな家に住んでるのか純粋に興味があったのと……あと、これです！」"
translation = "「처음 뵙겠습니다! 저도 쿠로토가 어떤 집에 사는지 순수하게 흥미가 있었던 거랑…… 그리고, 이거예요!」"

[[dialogue]]
speaker = "unk"
original = "タロットカード……？"
translation = "타로 카드……?"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そう！\u3000クロトにタロット占いをするべし、って結果が出たから、さっそくやってきたの！」"
translation = "「그래! 쿠로토에게 타로 점을 쳐야 한다는 결과가 나와서, 바로 달려왔어!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「私、昔からタロットで人を占うのが好きなのよ。星徒会のみんなは占ったことがあったけど、そういえばクロトはまだだったなと思って」"
translation = "「나, 예전부터 타로로 남의 점을 봐주는 걸 좋아했거든. 성도회 애들은 다 봐줬었지만, 그러고 보니 쿠로토는 아직이었구나 싶어서.」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「いいわね、占い♪\u3000やっぱり、恋愛運とか占うのかしら？」"
translation = "「좋네, 점♪ 역시, 연애운 같은 걸 보는 거니?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「恋愛運……？\u3000そういえば、恋愛については占ったことなかったわ……」"
translation = "「연애운……? 그러고 보니, 연애에 대해서는 점쳐본 적이 없었네……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「みんな、将来のことだとか、勉強のことだとか、そういうのばっかりだったかしら。マトイが恋占いできるのか聞いてきたことはあったけど、結局占わなかったし」"
translation = "「다들 장래 일이라든가, 공부 일이라든가, 그런 것뿐이었으니까. 마토이가 연애 점을 볼 수 있는지 물어본 적은 있었지만, 결국 안 봤고.」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「あら、不思議ね。みんな恋愛には興味がないの？」"
translation = "「어머, 희한하네. 다들 연애에는 관심이 없니?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「いえ、そんなことはないはず！\u3000特にクロト！\u3000あなたは今、恋愛に興味津々よ！」"
translation = "「아니, 그럴 리가 없죠! 특히 쿠로토! 당신은 지금, 연애에 관심이 아주 많아!」"

[[dialogue]]
speaker = "unk"
original = "勝手に言い切った……！？"
translation = "멋대로 단정 지었어……!?"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「星徒会では両手に花、学園でも星徒会長として女の子に大人気じゃない！\u3000私もクロトの本命が誰なのか、興味があるわっ！」"
translation = "「성도회에서는 양손의 꽃, 학원에서도 성도회장으로서 여자애들에게 인기 만점이잖아! 나도 쿠로토의 본명이 누구인지 궁금해!」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ほうほう。母として、私も凄く興味があります」"
translation = "「호오호오. 엄마로서 저도 굉장히 궁금하네요.」"

[[dialogue]]
speaker = "unk"
original = "母さんまで！？"
translation = "엄마까지!?"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そうね、いい機会だからクロトの恋愛運を占いましょう！\u3000やり方はどうしようかしら……うーん」"
translation = "「그래, 좋은 기회니까 쿠로토의 연애운을 점쳐보자! 방식은 어떻게 할까…… 으음.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「──よし、ツーマインド法でいきましょう。クロト、気になる女の子を教えてちょうだい」"
translation = "「──좋아, 투 마인드 법으로 가자. 쿠로토, 마음에 드는 여자애를 말해줘.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……え、いない？\u3000それは嘘でしょ。あれだけ女の子を侍らせておいて」"
translation = "「……에, 없어? 그건 거짓말이지. 그렇게나 여자애들을 거느리고 있으면서.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「仕方ないわね、わかった。……じゃあ、誰でもいいから、クロトをどう思っているのか気になる相手はいない？」"
translation = "「어쩔 수 없네, 알았어. ……그럼, 누구든 좋으니까, 쿠로토를 어떻게 생각하는지 궁금한 상대는 없어?」"

[[dialogue]]
speaker = "unk"
original = "じゃあ、ヴィーナスで"
translation = "그럼, 비너스로."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「なるほど、ヴィーナスね……えっ、私！？」"
translation = "「과연, 비너스네…… 엣, 나!?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「あら、我が息子ながら大胆♪」"
translation = "「어머, 내 아들이지만 대담해라♪」"

[[dialogue]]
speaker = "unk"
original = "だって、俺だけ恥ずかしいの不公平じゃん！"
translation = "그치만, 나만 부끄러운 건 불공평하잖아!"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……ま、まあ、いいわ。本当は自分が関わることを占うのは良くないんだけど……今回は特別よ！」"
translation = "「……뭐, 뭐어, 좋아. 원래 자기가 관련된 걸 점치는 건 좋지 않지만…… 이번엔 특별이야!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「じゃあ、占うからちょっと待ってて」"
translation = "「그럼 점칠 테니까 잠깐 기다려봐.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ツーマインドは、カードの束からの７枚目を上に、さらに７枚目を下に置くわ。それぞれ、私のクロトに対する顕在意識と潜在意識を表しているの」"
translation = "「투 마인드는, 카드 뭉치에서 7번째 장을 위에, 다시 7번째 장을 아래에 두는 거야. 각각, 나의 쿠로토에 대한 현재 의식과 잠재의식을 나타내고 있어.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「要するに、表ではどう思っているのかと、深層意識ではどう思っているのかの２つがわかるってことね」"
translation = "「요컨대, 겉으로는 어떻게 생각하는지와 심층 의식에서는 어떻게 생각하는지의 두 가지를 알 수 있다는 거지.」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ふむふむ……で、この２枚のカードは、どんな意味なの？」"
translation = "「흐음흐음…… 그래서, 이 두 장의 카드는 어떤 의미니?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……上側のカードは、星の正位置ね。希望や憧れ、理想、ひらめきなんかを意味するカードだわ」"
translation = "「……위쪽 카드는 별의 정위치네. 희망이나 동경, 이상, 영감 같은 걸 의미하는 카드야.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ま、これは特に不思議じゃないわね。私はクロトに期待しているし、希望も持ってる。星騎士としても、魔王としてもね」"
translation = "「뭐, 이건 딱히 이상하지 않네. 나는 쿠로토에게 기대하고 있고, 희망도 품고 있어. 성기사로서도, 마왕으로서도 말이야.」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「魔王……？」"
translation = "「마왕……?」"

[[dialogue]]
speaker = "unk"
original = "ち、ちょっとした例えだから！"
translation = "그, 그냥 비유 같은 거니까!"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「……あらそう？」"
translation = "「……어머 그래?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「で、問題は下ね。潜在意識のほう」"
translation = "「그리고, 문제는 아래야. 잠재의식 쪽.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「恋人の正位置。これは要するに……」"
translation = "「연인의 정위치. 이건 요컨대……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「相手の女性は、クロトのことが実は好きってことよ……！」"
translation = "「상대 여성은, 사실 쿠로토를 좋아한다는 소리야……!」"

[[dialogue]]
speaker = "unk"
original = "え？"
translation = "에?"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「まあ！\u3000今夜はお赤飯ね♪」"
translation = "「어머나! 오늘 밤은 팥찰밥을 지어야겠네♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……ん？\u3000んん！？！？\u3000えっ、私ってクロトのこと好きだったのっ！？」"
translation = "「……응? 으응!?!? 엣, 나 쿠로토를 좋아하고 있었던 거야!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「い、いや、確かにクロトのことは良く思っているけど……！\u3000頼りになるし、強いし、ようやく待ちわびた存在でもあるし……！」"
translation = "「아, 아니, 확실히 쿠로토를 좋게 생각하고는 있지만……! 의지가 되고, 강하고, 드디어 애타게 기다리던 존재이기도 하고……!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「──あれ？\u3000それってつまり、好きで合ってるのでは？」"
translation = "「──어라? 그거 즉, 좋아한다는 게 맞는 거 아냐?」"

[[dialogue]]
speaker = "unk"
original = "落ち着け！\u3000あくまで占い！\u3000占いだから！"
translation = "진정해! 어디까지나 점이야! 점이니까!"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「は！？\u3000私の占いを侮らないで欲しいわ！\u3000凄く良く当たるって、学園中で評判なのよ！」"
translation = "「하!? 내 점을 얕보지 말아줬으면 좋겠네! 엄청 잘 맞는다고 학원 전체에 소문이 자자하다고!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ということは、私はクロトのことが大好きってこと！？！？」"
translation = "「그렇다는 건, 나는 쿠로토를 아주 좋아한다는 뜻!?!?」"

[[dialogue]]
speaker = "unk"
original = "そこまでは占いも言ってなかったんじゃ！？"
translation = "거기까지는 점에서도 안 나온 거 아냐!?"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「いいえ、完全に理解したわ！\u3000この占いの結果、真正面から受け止めてあげましょう！」"
translation = "「아니, 완전히 이해했어! 이 점의 결과, 정면으로 받아들여 주겠어!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「私は逃げも隠れもしないわ！\u3000覚悟しなさい、クロト！」"
translation = "「나는 피하지도 숨지도 않아! 각오해, 쿠로토!」"

[[dialogue]]
speaker = "unk"
original = "こんな外堀の埋まり方ある！？"
translation = "이런 식으로 외통수가 걸린다고!?"

[[dialogue]]
speaker = "unk"
original = "その後、ヴィーナスは何故か家に泊まって行くことになり、夕食の席には赤飯が並ぶこととなるのだった。"
translation = "그 후, 비너스는 왠지 집에서 자고 가게 되었고, 저녁 식탁에는 팥찰밥이 오르게 되었다."

