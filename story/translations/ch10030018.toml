[[dialogue]]
speaker = "unk"
original = "ヴィーナスと恋人になってから、初めての休日。"
translation = "비너스와 연인이 되고 나서 맞이한 첫 휴일."

[[dialogue]]
speaker = "unk"
original = "恋人になってからのヴィーナスは、俺に対して少しだけ甘えん坊で──"
translation = "연인이 되고 난 뒤의 비너스는, 나에 대해 조금 응석꾸러기가 되어──"

[[dialogue]]
speaker = "ヴィーナス"
original = "「……好き。私、こんなに誰かに夢中になったのは初めてよ。……どうしちゃったのかしら」"
translation = "「……좋아해. 나, 이렇게 누군가에게 빠진 건 처음이야. ……어떻게 된 걸까.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「こうやって隣に座って、腕を組んでるだけでも幸せになれるのよね……恋をするって不思議だわ」"
translation = "「이렇게 옆에 앉아서, 팔짱을 끼고 있는 것만으로도 행복해질 수 있네…… 사랑을 한다는 건 신기해.」"

[[dialogue]]
speaker = "unk"
original = "俺の肩に頭を乗せて、甘えてくるヴィーナス。その小さくて可愛らしい頭を、髪の毛を梳くようにして撫でた。"
translation = "내 어깨에 머리를 얹고, 어리광을 부리는 비너스. 그 작고 귀여운 머리를, 머리카락을 빗어주듯 쓰다듬었다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「んふ……私、あなたに頭撫でられるの好き。すっごく安心できるのよ、なんでかしらね」"
translation = "「음후…… 나, 당신이 머리 쓰다듬어주는 거 좋아. 엄청 안심되거든, 왜일까.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ねえ、今日、星徒会室には誰も来ないようにお願いしてるの……」"
translation = "「저기, 오늘 성도회실에는 아무도 오지 말라고 부탁해뒀어……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「だから──」"
translation = "「그러니까──」"

[[dialogue]]
speaker = "unk"
original = "しかし、<ruby>ＤＩＳＣ<rt>ディスク</rt></ruby>からは無情にもモンスター発見のアラートが鳴り響く……。"
translation = "그러나, <ruby>DISC<rt>디스크</rt></ruby>에서는 무정하게도 몬스터 발견 경보가 울려 퍼진다……."

[[dialogue]]
speaker = "ヴィーナス"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ああもう！！！\u3000わかったわよ！\u3000この雰囲気どーするのよ！？\u3000モンスターども、全員吹っ飛ばしてやるわ！！！」"
translation = "「아아 정말!!! 알았다고! 이 분위기 어쩔 거야!? 몬스터 놈들, 전부 날려버리겠어!!!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ほら行くわよ！\u3000それでそれでそれでっ！」"
translation = "「자 가자고! 자, 자, 자!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「帰ったら私と、えっちしてもらうんだから！！！」"
translation = "「다녀오면 나랑, 섹스해줘야 할 거니까!!!」"

[[dialogue]]
speaker = "unk"
original = "──そうして、かつてないスピードでモンスターを蹴散らした俺たちは、再び星徒会室に舞い戻ってきた。"
translation = "──그렇게 해서, 유례없는 속도로 몬스터를 격퇴한 우리들은, 다시 성도회실로 돌아왔다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「んっ……もう我慢出来ないわ。……はぁ、んくちゅ、ちゅ、ちゅる、ちゅぷぅ……」"
translation = "「음…… 이제 못 참겠어. ……하아, 응크츄, 츄, 츄릅, 츄푸우……」"

[[dialogue]]
speaker = "unk"
original = "貪るようにディープキスを交わしながら、ソファーの上になだれ込む。"
translation = "탐하듯이 딥 키스를 나누며, 소파 위로 쓰러져 들어간다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「んちゅっ<emoji=heart04>\u3000ちゅっ、ちゅぷるっ<emoji=heart04>\u3000舌きもちひ……ちゅれろっ<emoji=heart04>\u3000ちゅっ、んちゅっ<emoji=heart04>\u3000……んむっ、むちゅっ、ちゅるっ……<emoji=heart04>」"
translation = "「음츄<emoji=heart04> 츄, 츄푸릅<emoji=heart04> 혀 기분 조하…… 츄릅<emoji=heart04> 츄, 음츄<emoji=heart04> ……음무, 무츄, 츄릅……<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「んっ<emoji=heart04>\u3000ぷはぁっ<emoji=heart04>\u3000……はぁ、はぁ、はぁぁん<emoji=heart04>\u3000んっ、なぁに<emoji=heart04>？\u3000はぁ……んふふ、また頭撫でてくれるの<emoji=heart04>？」"
translation = "「음<emoji=heart04> 푸하앗<emoji=heart04> ……하아, 하아, 하아앙<emoji=heart04> 음, 뭐야<emoji=heart04>? 하아…… 음후후, 또 머리 쓰다듬어주는 거야<emoji=heart04>?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「んふぅ<emoji=heart04>\u3000……気持ちいい<emoji=heart04>\u3000身体から力抜けちゃう……はぁぁ<emoji=heart04>\u3000なんでこんなに心地いいのかしら……んんっ<emoji=heart04>」"
translation = "「음후우<emoji=heart04> ……기분 좋아<emoji=heart04> 몸에서 힘이 빠져나가버려…… 하아아<emoji=heart04> 왜 이렇게 기분 좋은 걸까…… 으음<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ん……あんっ<emoji=heart04>\u3000おっぱい、触りたいの……？\u3000んふっ、やんっ<emoji=heart04>\u3000ちょっとくすぐったいわよぉ……。あっ<emoji=heart04>\u3000あんっ、揉むのダメぇ……んんっ、感じちゃう……ふあぁんっ<emoji=heart04>」"
translation = "「음…… 앙<emoji=heart04> 가슴, 만지고 싶어……? 음후, 얀<emoji=heart04> 조금 간지럽다고오……. 앗<emoji=heart04> 앙, 주무르는 건 안 돼…… 으음, 느껴버려…… 후아앙<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あっ、乳首ダメぇ……<emoji=heart04>\u3000あぁんっ、いま敏感になっててぇっ……んああっ、きもちぃ<emoji=heart04>\u3000ふあぁっ、んんっ、あんっ……はあぁっ、んくっ、んんっふぅぅ……<emoji=heart04>！」"
translation = "「앗, 유두 안 돼……<emoji=heart04> 아앙, 지금 예민해져 있어서어…… 으아앗, 기분 조하<emoji=heart04> 후아앗, 으음, 앙…… 하아앗, 응긋, 으음후우우……<emoji=heart04>!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あっ、おっぱい吸っちゃ<emoji=heart04>\u3000……んああっ、んんっ、あぁんっ<emoji=heart04>\u3000……舌きもちいいっ、ふあぁっ、んっ、んあぁっ……<emoji=heart04>！」"
translation = "「앗, 가슴 빨면<emoji=heart04> ……으아앗, 으음, 아앙<emoji=heart04> ……혀 기분 좋아, 후아앗, 음, 으아앗……<emoji=heart04>!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あっ、あっ、ダメぇっ<emoji=heart04>！\u3000乳首コリコリと吸うの同時、すごい、よぉっ……<emoji=heart04>\u3000んあぁあっ、イっちゃうっ、おっぱいでイっちゃうからぁっ！」"
translation = "「앗, 앗, 안 돼<emoji=heart04>! 유두 굴리면서 빠는 거 동시에, 대단해, 요오……<emoji=heart04> 으아아앗, 가버려, 가슴으로 가버릴 것 같으니까아!」"

[[dialogue]]
speaker = "クロト"
original = "「っ……ヴィーナス、俺もう！」"
translation = "「윽…… 비너스, 나 이제!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「はあぁっ……んはぁ、お腹に固いの当たってるぅ……んんっ、あなたの大きいの……わ、私ももう、おま○こ、凄いことになってるから……<emoji=heart04>\u3000んふぅっ」"
translation = "「하아앗…… 은하아, 배에 딱딱한 게 닿고 있어…… 으음, 당신의 커다란 거…… 나, 나도 이제, 보지, 굉장한 상태가 되어버렸으니까……<emoji=heart04> 음후우」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「はぁぁ。ふぇ……？\u3000『おま○こ』って言い方、えっちだった<emoji=heart04>？\u3000ふふっ、こう言ったら……はぁ、あなたが喜ぶかなって思って、恥ずかしいけど、言ってみたの<emoji=heart04>\u3000はふぅぅ」"
translation = "「하아아. 헤……? 『보지』라는 말, 야했어<emoji=heart04>? 후훗, 이렇게 말하면…… 하아, 당신이 기뻐할까 싶어서, 부끄럽지만, 말해봤어<emoji=heart04> 하후우우」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「う、うん<emoji=heart04>\u3000はぁぁぁん……そ、そんなに喜んでくれると、頑張ってよかったって、思うわ<emoji=heart04>\u3000はぁっ。これからも、えっちの時は言うねっ。あなたのために、おま○こって言う<emoji=heart04>」"
translation = "「으, 응<emoji=heart04> 하아아앙…… 그렇게 기뻐해 주니까, 힘내길 잘했다고 생각하게 돼<emoji=heart04> 하아. 앞으로도, 섹스할 때는 말할게. 당신을 위해서, 보지라고 말할게<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「はぁ、んっ、ふぅ……で、でも、あんまりじっと見ないでぇ<emoji=heart04>\u3000はぁぁ、期待して愛液でぬちょぬちょになっちゃってるおま○こぉ<emoji=heart04>\u3000恥ずかしいからぁ……んあぁっ！？」"
translation = "「하아, 음, 후…… 그, 그래도, 너무 빤히 보지 마아<emoji=heart04> 하아아, 기대해서 애액으로 끈적끈적하게 되어버린 보지이<emoji=heart04> 부끄러우니까아…… 으아앗!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あっ、待って、触られちゃうと感じちゃうっ<emoji=heart04>\u3000おま○こ、凄く敏感になってるのっ。あっ、あっ、んあぁぁっ<emoji=heart04>！」"
translation = "「앗, 잠깐, 만져지면 느껴버려어<emoji=heart04> 보지, 엄청 예민해져 있다고. 앗, 앗, 으아아앗<emoji=heart04>!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あっ、あっ、あぁっ。触り方ぁ、優しくて……ふぁぁぁ<emoji=heart04>\u3000く、クリもきもちいっ、んんっ、あっ、感じるのぉっ……！\u3000ふあぁぁんっ！」"
translation = "「앗, 앗, 아앗. 만지는 거어, 상냥해서…… 후아아아<emoji=heart04> 클, 클리도 기분 조하, 으음, 앗, 느껴지는 걸어……! 후아아아앙!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「んあぁっ、も、もうダメ、私も我慢できないぃ……<emoji=heart04>！\u3000ねぇ、おち○ちん、おち○ちんもう挿れてぇ……！\u3000はぁ、はぁっ、おま○こ期待で熱くて、変になっちゃってるよぉ<emoji=heart04>」"
translation = "「으아앗, 이, 이제 안 돼, 나도 못 참겠어어……<emoji=heart04>! 저기, 자지, 자지 이제 넣어줘어……! 하아, 하앗, 보지 기대 때문에 뜨거워서, 이상하게 되어버렸어어<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「はあぁ……っ、あなたのおち○ちん<emoji=heart04>！\u3000太くて逞しくて……<emoji=heart04>\u3000んあぁっ、おま○こキュンとしちゃうっ……そんなの挿れられちゃうって、想像しちゃったら、ふぅぅ……」"
translation = "「하아아…… 당신의 자지<emoji=heart04>! 굵고 늠름해서……<emoji=heart04> 으아앗, 보지 큥 해버려…… 그런 게 박혀버린다고, 상상해버렸더니, 후우우……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あっ、あっ、先っぽ、おま○こに当たってるっ<emoji=heart04>\u3000ふあぁっ……きて、おち○ちん来て……私の初めて、奪って欲しいのっ<emoji=heart04>\u3000……はあぁぁっ」"
translation = "「앗, 앗, 끝부분, 보지에 닿고 있어어<emoji=heart04> 후아앗…… 와줘, 자지 와줘…… 나의 처음, 뺏어줬으면 좋겠어어<emoji=heart04> ……하아아앗」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「んあっ……ふあぁっ<emoji=heart04>！\u3000抱き締めながら<emoji=heart04>\u3000挿れちゃうのっ<emoji=heart04>？\u3000あっ、あんっ、おち○ちん見えないから、感触意識しちゃっ……あっ、くるっ──」"
translation = "「음앗…… 후아앗<emoji=heart04>! 껴안으면서<emoji=heart04> 넣어버리는 거야<emoji=heart04>? 앗, 앙, 자지 안 보이니까, 감촉만 의식하게 돼…… 앗, 온다──」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「んくっ、んああぁぁぁぁああああ──っ！」"
translation = "「응긋, 으아아아아아아아아아아──!!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「んっ、はぁっ、はぁっ、ふぅぅっ……！\u3000んんっ、ふあぁ……<emoji=heart04>！\u3000おち○ちん<emoji=heart04>\u3000入ったぁ……<emoji=heart04>！\u3000ふぅぅ……はぁぁ……っ」"
translation = "「음, 하앗, 하앗, 후우웃……! 으음, 후아아……<emoji=heart04>! 자지<emoji=heart04> 들어왔어……<emoji=heart04>! 후우우…… 하아아……」"

[[dialogue]]
speaker = "unk"
original = "ペニスと秘部の繋がったところから、ヴィーナスの初めての証が伝う。"
translation = "자지와 비부가 이어진 곳에서, 비너스의 첫 경험의 증거가 흘러나온다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「あ、あっ<emoji=heart04>\u3000嘘っ<emoji=heart04>\u3000初めてなのに……<emoji=heart04>\u3000ふぅぅ、はぁぁ……こんなの<emoji=heart04>\u3000聞いてな……んんっ<emoji=heart04>\u3000はぁっ、はあぁっ……！」"
translation = "「아, 앗<emoji=heart04> 거짓말<emoji=heart04> 처음인데……<emoji=heart04> 후우우, 하아아…… 이런 거<emoji=heart04> 못 들었…… 으음<emoji=heart04> 하앗, 하아아……!」"

[[dialogue]]
speaker = "クロト"
original = "「ごめんっ、そんなに痛かったか……？」"
translation = "「미안해, 그렇게 아팠어……?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ち、違うの……<emoji=heart04>\u3000逆っ<emoji=heart04>\u3000お、おま○こ<emoji=heart04>\u3000怖いくらい気持ちいいのっ……<emoji=heart04>！\u3000んはぁぁっ<emoji=heart04>\u3000確かに処女膜破れたけど、それよりずっと……ふあぁっ<emoji=heart04>」"
translation = "「아, 아니야……<emoji=heart04> 반대야<emoji=heart04> 보, 보지<emoji=heart04> 무서울 정도로 기분 좋아……<emoji=heart04>! 은하아아앗<emoji=heart04> 확실히 처녀막 찢어졌지만, 그것보다 훨씬…… 후아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「き、気持ちよくてぇっ<emoji=heart04>\u3000ふわっ<emoji=heart04>\u3000っていうか……ま、まだ動いてないのにこんなっ……<emoji=heart04>\u3000ふぅぅっ！\u3000これ、動いたらっ……絶対<emoji=heart04>\u3000もっと気持ちよくっ……はぁぁっ<emoji=heart04>」"
translation = "「기, 기분 좋아서어<emoji=heart04> 후왓<emoji=heart04> 그니까…… 아, 아직 움직이지도 않았는데 이렇다니……<emoji=heart04> 후우우웃! 이거, 움직이면…… 분명<emoji=heart04> 훨씬 더 기분 좋게…… 하아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「っ……ヴィーナス、そんなこと言われたら！」"
translation = "「윽…… 비너스, 그런 말을 들으면!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あっ、待ってっ<emoji=heart04>\u3000ま、まだ心の準備が……あっ、んあっ<emoji=heart04>\u3000ふあぁぁぁあああ──っ<emoji=heart04>！？」"
translation = "「앗, 기다려어<emoji=heart04> 마, 아직 마음의 준비가…… 앗, 음앗<emoji=heart04> 후아아아아아아──앗<emoji=heart04>!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あっ、んあぁっ<emoji=heart04>\u3000ダメぇ！\u3000気持ちいい<emoji=heart04>\u3000おま○こ気持ちいいのっ<emoji=heart04>！\u3000ふあぁぁっ、おち○ちん凄いぃっ！」"
translation = "「앗, 음아앗<emoji=heart04> 안 돼! 기분 좋아 보지 기분 좋아아<emoji=heart04>! 후아아아앗, 자지 굉장해에!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「出たり入ったり、ぬぽぬぽ気持ちいいよぉっ<emoji=heart04>\u3000んあぁぁぁっ、んうっ、ふあぁぁんっ<emoji=heart04>！」"
translation = "「들어왔다 나갔다, 질척질척 기분 좋아아<emoji=heart04> 으아아아앗, 응읏, 후아아아앙<emoji=heart04>!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あぁんっ<emoji=heart04>\u3000頭撫でながら<emoji=heart04>\u3000ピストンずるいぃっ、ふあぁっ<emoji=heart04>！\u3000心と体、同時に気持ちよくなっちゃうっ<emoji=heart04>\u3000はぁんっ……あっ、撫でるの止めちゃダメっ<emoji=heart04>\u3000もっとぉ……！」"
translation = "「아앙<emoji=heart04> 머리 쓰다듬으면서<emoji=heart04> 피스톤 비겁해에, 후아앗<emoji=heart04>! 마음이랑 몸, 동시에 기분 좋아져버려어<emoji=heart04> 하앙…… 앗, 쓰다듬는 거 멈추면 안 돼에<emoji=heart04> 더어……!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あっ<emoji=heart04>\u3000んあっ<emoji=heart04>\u3000あぁぁんっ<emoji=heart04>！\u3000頭撫でるの好きっ<emoji=heart04>\u3000ふあぁっ、おち○ちんで内側撫でられるのも好きぃっ<emoji=heart04>\u3000ふあぁぁっ、あっ、いいっ、そこ気持ちいいのぉ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 음앗<emoji=heart04> 아아앙<emoji=heart04>! 머리 쓰다듬는 거 좋아아<emoji=heart04> 후아앗, 자지로 안쪽 긁어주는 것도 좋아아<emoji=heart04> 후아아아앗, 앗, 좋아, 거기 기분 좋아아아」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふあぁんっ、おま○こ幸せで絡み付いちゃうっ<emoji=heart04>\u3000あふぅんっ……おち○ちんのこと、もう好きになっちゃってるっ<emoji=heart04>\u3000んあぁぁぁっ、これっ、絶対相性良いのぉ……<emoji=heart04>！」"
translation = "「후아아앙, 보지 행복해서 꽉 조여버려어<emoji=heart04> 아후우웅…… 자지, 이제 좋아하게 되어버렸어어<emoji=heart04> 으아아아앗, 이거, 무조건 궁합 최고야아……<emoji=heart04>!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「キス、キスもしてぇっ<emoji=heart04>\u3000……お口の方も愛して欲しいのぉっ<emoji=heart04>\u3000んあっ、んちゅっ<emoji=heart04>\u3000くちゅるっ、んぷっ、ちゅるっ……<emoji=heart04>」"
translation = "「키스, 키스도 해줘어<emoji=heart04> ……입 쪽도 사랑해줬으면 좋겠어어<emoji=heart04> 음앗, 음츄<emoji=heart04> 쿠츄릅, 음풋, 츄릅……<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「はぁむ<emoji=heart04>\u3000んくっ、ちゅ、ちゅ<emoji=heart04>\u3000ちゅるるっ<emoji=heart04>\u3000んくちゅ、ちゅぶぶっ……<emoji=heart04>\u3000んはっ、はあっ、んっ、んんっ<emoji=heart04>\u3000……んちゅる、んはっ、んちゅう……っ<emoji=heart04>」"
translation = "「하아암<emoji=heart04> 응긋, 츄, 츄<emoji=heart04> 츄르르<emoji=heart04> 응쿠츄, 츄부부……<emoji=heart04> 은핫, 하앗, 음, 으음<emoji=heart04> ……음츄릅, 은핫, 음츄우……<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「もっ、もっと、あんっ<emoji=heart04>\u3000もっとっ……んくちゅ<emoji=heart04>\u3000ちゅぷ、ちゅるるっ……んはぁっ、もっと、んちゅっ<emoji=heart04>\u3000こっち来て……っ<emoji=heart04>\u3000もっと、ちゅぷるっ、激しく、してっ……<emoji=heart04>」"
translation = "「더, 더어, 앙<emoji=heart04> 더어…… 응쿠츄<emoji=heart04> 츄푸, 츄르르…… 은하아앗, 더, 음츄<emoji=heart04> 이쪽으로 와서……<emoji=heart04> 더, 츄푸릅, 격렬하게, 해줘어……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「っ……ヴィーナスッ！」"
translation = "「윽…… 비너스!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「んああぁぁぁっ<emoji=heart04>\u3000おち○ちん奥まで来たあぁぁぁ～～っ<emoji=heart04>！\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000もっと私を、んあぁっ、求めていいからっ……私は、あなたのものなんだからぁっ<emoji=heart04>」"
translation = "「으아아아아앗<emoji=heart04> 자지 끝까지 들어왔어어어어어──!<emoji=heart04> 앙<emoji=heart04> 앙<emoji=heart04> 더 나를, 으아앗, 원해도 되니까…… 나는, 당신의 것이니까아<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000おま○こ奥しゅごいっ<emoji=heart04>\u3000子宮の入り口トントンされるの気持ち良いっ<emoji=heart04>\u3000あんっ！\u3000ふあぁっ、はぁっ、んああっ<emoji=heart04>\u3000あっ、はぁんっ、ふあぁぁぁんっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 보지 깊은 곳 대단해에<emoji=heart04> 자궁 입구 톡톡 건드려지는 거 기분 좋아아<emoji=heart04> 앙! 후아앗, 하앗, 으아앗<emoji=heart04> 앗, 하앙, 후아아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「こっ、これしゅきっ<emoji=heart04>\u3000子宮口とおち○ちんキスするのしゅきっ<emoji=heart04>\u3000気持ちいいのっ、あぁぁんっ！\u3000ふあぁぁぁっ、あっ、あっ、んあぁぁぁっ！」"
translation = "「이, 이거 조하<emoji=heart04> 자궁구랑 자지랑 키스하는 거 조하아<emoji=heart04> 기분 좋아아, 아아앙! 후아아아앗, 앗, 앗, 으아아아앗!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「降りてきちゃうっ<emoji=heart04>\u3000んあぁっ、子宮がおち○ちん好きになって<emoji=heart04>\u3000はぅんっ！\u3000自分からキスしたくて、降りてきちゃってるのぉっ<emoji=heart04>\u3000んあぁぁんっ！」"
translation = "「내려와버려어<emoji=heart04> 으아앗, 자궁이 자지를 좋아하게 돼서<emoji=heart04> 하운! 자기가 먼저 키스하고 싶어서, 내려와버리고 있어어<emoji=heart04> 으아아아앙!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あああ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000全部気持ちいいのっ、ふあぁぁっ<emoji=heart04>\u3000あなたに触れられた部分、どこも気持ちよくて幸せになのぉ<emoji=heart04>\u3000あっ、んあぁ、はあぁぁんっ！」"
translation = "「아아아<emoji=heart04> 기분 좋아아<emoji=heart04> 전부 기분 좋아아, 후아아아앗<emoji=heart04> 당신이 만져준 부분, 어디든 기분 좋아서 행복해애<emoji=heart04> 앗, 음아아, 하아아아앙!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ねえっ、あなたも気持ちいいっ<emoji=heart04>？\u3000ふあぁんっ<emoji=heart04>\u3000私の中っ、気持ちいいっ？\u3000んはっ、あっ<emoji=heart04>\u3000んっ、ふあぁっ、んあぁぁっ！」"
translation = "「저기이, 당신도 기분 좋아아<emoji=heart04>? 후아아앙<emoji=heart04> 내 안쪽, 기분 좋아아? 은핫, 앗<emoji=heart04> 음, 후아앗, 으아아아앗!」"

[[dialogue]]
speaker = "クロト"
original = "「気持ちよすぎてっ……！\u3000ヴィーナスの心だけじゃなくっ、体も俺のものにしたいっ！」"
translation = "「너무 기분 좋아서……! 비너스의 마음뿐만 아니라, 몸도 내 것으로 만들고 싶어!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「んああっ<emoji=heart04>\u3000してぇっ<emoji=heart04>！\u3000好きにしていいからっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000私をもっと、はあぁんっ、あなた専用にしてっ<emoji=heart04>！\u3000ふあぁぁぁっ！」"
translation = "「으아앗<emoji=heart04> 해줘어<emoji=heart04>! 마음대로 해도 되니까아<emoji=heart04> 아앙<emoji=heart04> 나를 더, 하아아앙, 당신 전용으로 만들어줘어<emoji=heart04>! 후아아아아앗!」"

[[dialogue]]
speaker = "unk"
original = "目の前にいる最高の女の子が『自分専用』になる。"
translation = "눈앞에 있는 최고의 여자아이가 『전용』이 된다."

[[dialogue]]
speaker = "unk"
original = "その響きが俺の興奮を最高潮にし、射精欲を掻き立てる。"
translation = "그 울림이 나의 흥분을 최고조로 끌어올려, 사정욕을 자극한다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふああぁぁぁっ<emoji=heart04>！\u3000本気ピストンきたあぁぁぁ──っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あっ、あっ、んあぁっ！\u3000気持ちよしゅぎるっ<emoji=heart04>\u3000んあぁっ、もっと、もっと奥突きあげてぇっ<emoji=heart04>」"
translation = "「후아아아아앗<emoji=heart04>! 진심 피스톤 온다아아아아──앗<emoji=heart04><emoji=heart04><emoji=heart04> 앗, 앗, 으아앗! 기분 너무 좋아아<emoji=heart04> 으아앗, 더, 더 깊숙이 찔러줘어어」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「んあぁぁんっ、しゅきっ<emoji=heart04>\u3000おち○ちん、しゅきなのぉっ<emoji=heart04>！\u3000こんな気持ちいの知ったら、戻れないぃっ！\u3000ふあぁぁんっ<emoji=heart04>\u3000あなたのおち○ちん最高なのぉ<emoji=heart04>」"
translation = "「으아아아앙, 조하아<emoji=heart04> 자지, 조하아아아<emoji=heart04>! 이런 기분 좋은 거 알아버리면, 못 돌아가아! 후아아아앙<emoji=heart04> 당신 자지 최고야아아」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「んはぁっ<emoji=heart04>\u3000はっ、ああぁんっ！\u3000んっ、あっ、んああぁぁぁっ<emoji=heart04>！\u3000もっと、もっとぉっ<emoji=heart04>\u3000そこっ、奥っ、奥いいのぉっ、おち○ちんキス気持ちいい～～っ<emoji=heart04>」"
translation = "「은하앗<emoji=heart04> 하, 아아앙! 음, 앗, 으아아아아앗<emoji=heart04>! 더, 더어어<emoji=heart04> 거기, 안쪽, 안쪽 좋아아, 자지 키스 기분 좋아아아아──<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふあぁっ<emoji=heart04>\u3000はぁっ、んはぁっ、ふあぁぁぁんっ<emoji=heart04>！\u3000おち○ちん<emoji=heart04>\u3000んあぁっ、大きくなってきたっ<emoji=heart04>\u3000先っぽ、膨らんでるのがわかるっ<emoji=heart04>\u3000……ふあぁっ！」"
translation = "「후아앗<emoji=heart04> 하앗, 은하앗, 후아아아앙<emoji=heart04>! 자지<emoji=heart04> 으아앗, 커졌어어어<emoji=heart04> 끝부분이 부풀어 오르는 게 느껴져어…… 후아앗!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「んっ、射精っ<emoji=heart04>\u3000んああっ、射精するのねっ？\u3000きてっ<emoji=heart04>\u3000私も凄く気持ちいいの登って来てるっ<emoji=heart04>\u3000ふあぁぁっ、お腹の中いっぱい来てぇっ<emoji=heart04>\u3000んあぁぁんっ！」"
translation = "「음, 사정<emoji=heart04> 으아앗, 사정하는 거지이? 와줘어<emoji=heart04> 나도 엄청 기분 좋은 거 올라오고 있어어<emoji=heart04> 후아아아앗, 배 속에 잔뜩 싸줘어어<emoji=heart04> 으아아아앙!」"

[[dialogue]]
speaker = "クロト"
original = "「ヴィーナス、奥に射精すぞ！\u3000絶対に俺専用にするっ！」"
translation = "「비너스, 안쪽에 사정한다! 반드시 내 전용으로 만들겠어!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あぁんっ<emoji=heart04>\u3000なってるっ、もうなってるからぁっ<emoji=heart04>\u3000んあぁぁっ、子宮にいっぱい子種注いで、トドメさしてぇっ<emoji=heart04>\u3000ふあぁぁぁんっ！」"
translation = "「아앙<emoji=heart04> 되어있어, 이미 되어있으니까아아<emoji=heart04> 으아아앗, 자궁에 잔뜩 아기씨 부어줘서, 숨통을 끊어줘어어<emoji=heart04> 후아아아아앙!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あっ、くるっ<emoji=heart04>\u3000しゅごいアクメくりゅっ！\u3000んああぁぁぁっ<emoji=heart04>\u3000気持ち良いの一番上まで登ってくりゅうぅぅぅ～～っ<emoji=heart04><emoji=heart04>！」"
translation = "「앗, 온다아<emoji=heart04> 대단한 오르가슴 와아아! 으아아아아앗<emoji=heart04> 기분 좋은 거 제일 꼭대기까지 올라가아아아아아──<emoji=heart04><emoji=heart04>!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふあぁぁぁっ<emoji=heart04>\u3000イクっ、もうイッちゃうっ<emoji=heart04>！\u3000おち○ちんも来てっ<emoji=heart04>！\u3000私と一緒に射精してぇぇぇっ！」"
translation = "「후아아아아앗<emoji=heart04> 가, 벌써 가버려어<emoji=heart04>! 자지도 와줘어<emoji=heart04>! 나랑 같이 사정해줘어어어어!」"

[[dialogue]]
speaker = "unk"
original = "クロト「好きだ、ヴィーナスッ！！！」"
translation = "쿠로토 「좋아해, 비너스!!」"

[[dialogue]]
speaker = "unk"
original = "俺はペニスを一番奥まで突き入れ、溜まりに溜まった欲望を思いっきり吐き出した。"
translation = "나는 자지를 가장 깊숙한 곳까지 찔러 넣고, 쌓이고 쌓였던 욕망을 마음껏 쏟아냈다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「あああああっ<emoji=heart04>\u3000すきっ<emoji=heart04>\u3000私もっ<emoji=heart04>\u3000すきっ<emoji=heart04>\u3000すきっ<emoji=heart04>\u3000すきっ<emoji=heart04>\u3000好きっ<emoji=heart04>\u3000好きっ<emoji=heart04>\u3000しゅきぃぃ<emoji=heart04>\u3000ふぁぁぁぁっ<emoji=heart04><emoji=heart04>」"
translation = "「아아아아앗<emoji=heart04> 조하아<emoji=heart04> 나도오<emoji=heart04> 조하아<emoji=heart04> 조하아<emoji=heart04> 조하아<emoji=heart04> 좋아해<emoji=heart04> 좋아해<emoji=heart04> 조하아아<emoji=heart04> 화아아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「イクイクイクぅぅぅっ<emoji=heart04>！\u3000中に出されて、イックうぅぅぅ──────っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가버려가버려가버려어어엇<emoji=heart04>! 안에 내보내져서, 가버려어어어어어──────<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「っ…………ふあぁぁぁぁあああぁぁぁぁあああああああっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「윽………… 후아아아아아아아아아아아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "魂が抜けてしまいそうな快楽に、俺は射精中も堪らずヴィーナスへ腰を振った。"
translation = "영혼이 빠져나갈 것 같은 쾌락에, 나는 사정하는 중에도 참지 못하고 비너스에게 허리를 흔들었다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「あっ、はぁっ……<emoji=heart04>\u3000んんっ……ふあぁっ<emoji=heart04>\u3000一緒に、イケたぁ……えへへぇ<emoji=heart04>」"
translation = "「앗, 하앗……<emoji=heart04> 으음…… 후아앗<emoji=heart04> 같이, 가버렸어어…… 에헤헤에<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「んっ、はぁ……<emoji=heart04>\u3000まだ出てる……すごいぃ<emoji=heart04>\u3000んふっ、そんなに私の中、気持ち良かったぁ……？」"
translation = "「음, 하아……<emoji=heart04> 아직 나오고 있어…… 굉장해에<emoji=heart04> 음후, 그렇게 내 안쪽이 기분 좋았어어……?」"

[[dialogue]]
speaker = "クロト"
original = "「人生で一番射精した……」"
translation = "「인생에서 제일 많이 사정했어……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そうなんだぁ……えへへっ、嬉しい<emoji=heart04>\u3000私も、すっごく気持ちよかったわ……魂が飛んでっちゃいそうなくらい<emoji=heart04>」"
translation = "「그렇구나아…… 에헤헷, 기뻐<emoji=heart04> 나도, 정말 기분 좋았어…… 영혼이 날아가 버릴 것 같을 정도로<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「セックスって、こんなに凄かったのね……。私、本当にあなた専用の体にされちゃったかも<emoji=heart04>」"
translation = "「섹스란 거, 이렇게 대단한 거였구나……. 나, 정말로 당신 전용 몸이 되어버렸을지도<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふふっ。……もちろん、あなたも私専用よ？\u3000こんな幸せな時間、私が独り占めするべきなんだから♪」"
translation = "「후훗. ……물론, 당신도 내 전용이야? 이렇게 행복한 시간, 내가 독점해야 하는 거니까♪」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ん……ねえ、また頭撫でて？\u3000私、初めてのセックス頑張ったんだから……<emoji=heart04>」"
translation = "「음…… 저기, 다시 머리 쓰다듬어줘. 나, 첫 섹스 열심히 했으니까……<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「んふぅ<emoji=heart04>\u3000んっ、んんっ……んふふっ<emoji=heart04>\u3000やっぱり、こうやってあなたに甘えてる時間が１番好き……♪」"
translation = "「음후우<emoji=heart04> 음, 으음…… 음후후<emoji=heart04> 역시, 이렇게 당신에게 어리광 부리는 시간이 제일 좋아……♪」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ね……まだ時間あるわよ？\u3000今日の星徒会室は貸し切りなんだから、この時間は有効活用するべきだと思わない<emoji=heart04>？」"
translation = "「있지…… 아직 시간 있어. 오늘 성도회실은 대절했으니까, 이 시간은 유효 활용해야 한다고 생각하지 않아<emoji=heart04>?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「なにより、あなたのおち○ちん、また大きくなってるの、気付いてるんだから<emoji=heart04>」"
translation = "「무엇보다, 당신 자지, 다시 커지고 있는 거 알고 있으니까<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言って、ヴィーナスに唇を奪われる。"
translation = "그렇게 말하며, 비너스에게 입술을 빼앗긴다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「んっ、んちゅっ、んんっ……ぷはぁ<emoji=heart04>\u3000ほら、あなたの専用おま○こ、いっぱい可愛がって<emoji=heart04>」"
translation = "「음, 음츄, 으음…… 푸하아<emoji=heart04> 자, 당신 전용 보지, 잔뜩 귀여워해 줘<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "耳元でそんな風に囁かれては、セックス覚えたての若い男子が我慢できるはずもなく。"
translation = "귓가에서 그런 속삭임을 듣고서, 섹스를 갓 배운 젊은 남자가 참을 수 있을 리 만무했다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「あんっ<emoji=heart04>\u3000おち○ちん、また奥にきたぁっ<emoji=heart04>」"
translation = "「앙<emoji=heart04> 자지, 다시 안쪽으로 왔어어어」"

[[dialogue]]
speaker = "unk"
original = "性欲の赴くまま、日が暮れるまでヴィーナスと交わり続けるのだった。"
translation = "성욕이 이끄는 대로, 해가 저물 때까지 비너스와 계속해서 몸을 섞었다."

