[[dialogue]]
speaker = "unk"
original = "第４話,人目がないのなら,P"
translation = "제4화, 인기척이 없다면, P"

[[dialogue]]
speaker = "ヘレナ"
original = "「むぅ……よもや追い出されてしまうとは」"
translation = "「무으…… 설마 쫓겨나 버릴 줄이야」"

[[dialogue]]
speaker = "ヘレナ"
original = "「我が娘ながらなんと<ruby>狭量<rt>きょうりょう</rt></ruby>なことか。ちょっと星徒会室に忍び込んで、人目<ruby>憚<rt>はばか</rt></ruby>らず伴侶といちゃいちゃ<emoji=heart04>らぶらぶしていただけというのに」"
translation = "「내 딸이라지만 어쩜 그리 속이 좁은지. 잠깐 성도회실에 숨어들어서, 남의 눈 아랑곳하지 않고 반려와 이차이차<emoji=heart04>러브러브했을 뿐이거늘」"

[[dialogue]]
speaker = "unk"
original = "ＴＰＯだ"
translation = "TPO야"

[[dialogue]]
speaker = "unk"
original = "無理もなかった"
translation = "무리도 아니었어"

[[dialogue]]
speaker = "ヘレナ"
original = "「多少は反省の余地もあるか。私も淑女として、<ruby>慎<rt>つつし</rt></ruby>みを覚えなくてはならんな」"
translation = "「다소는 반성할 여지도 있는가. 나도 숙녀로서, 조심성을 익혀야겠구나」"

[[dialogue]]
speaker = "ヘレナ"
original = "「にしてもすまぬな、魔王。貴殿まで星徒会室から出されてしまうとは……」"
translation = "「그나저나 미안하구나, 마왕. 귀하까지 성도회실에서 쫓겨나 버리다니……」"

[[dialogue]]
speaker = "unk"
original = "ヘレナちゃんと一緒にいたかった"
translation = "헬레나짱과 같이 있고 싶었어"

[[dialogue]]
speaker = "unk"
original = "仕事は片付けたから"
translation = "일은 다 끝냈으니까"

[[dialogue]]
speaker = "ヘレナ"
original = "「ふふ……嬉しいことばかり言ってくれるものよ」"
translation = "「후후…… 기쁜 말만 해 주는구나」"

[[dialogue]]
speaker = "ヘレナ"
original = "「しかし、ああも本心を言い当てられるとは思わなかったぞ。私も自覚していなかったのだが」"
translation = "「하지만, 그렇게까지 본심을 꿰뚫어 볼 줄은 몰랐다. 나도 자각하지 못하고 있었다만」"

[[dialogue]]
speaker = "ヘレナ"
original = "「九浄家の当主として、私はこれまで何事も独力でなんとかしてきた」"
translation = "「쿠죠 가문의 당주로서, 나는 지금까지 무엇이든 독력으로 어떻게든 해 왔다」"

[[dialogue]]
speaker = "ヘレナ"
original = "「だが……心のどこかでは、貴殿のような、甘えられる相手を求めていたのかもしれない」"
translation = "「하지만…… 마음 어딘가에서는 귀하 같은, 어리광 부릴 수 있는 상대를 원하고 있었을지도 모르겠군」"

[[dialogue]]
speaker = "ヘレナ"
original = "「まったく、人のことを言えた義理ではなかったな。ふふふ」"
translation = "「정말이지, 남 말 할 처지가 아니었구나. 후후후」"

[[dialogue]]
speaker = "unk"
original = "いくらでも甘えてほしい"
translation = "얼마든지 어리광 부려 줘"

[[dialogue]]
speaker = "ヘレナ"
original = "「ふふっ……ありがとう。魔王が隣にいてくれることが、私にとって最大の癒やしだ」"
translation = "「후후…… 고맙다. 마왕이 곁에 있어 주는 것이 나에게는 최대의 치유다」"

[[dialogue]]
speaker = "ヘレナ"
original = "「どうせならこの屋敷に住まわせたいくらいではあるが……それはリノに申し訳がないというもの。こうしてたまに会えるだけ良しとせねばな」"
translation = "「이왕이면 이 저택에 살게 하고 싶을 정도다만…… 그것은 리노에게 미안한 일이지. 이렇게 가끔 만날 수 있는 것만으로 만족해야겠구나」"

[[dialogue]]
speaker = "ヘレナ"
original = "「だが、それなら……せめて一緒にいられる時はずっと傍にいたいというものだ」"
translation = "「하지만, 그렇다면…… 적어도 같이 있을 수 있을 때는 계속 곁에 있고 싶은 법이다」"

[[dialogue]]
speaker = "ヘレナ"
original = "「もっと近くに……寄ってもいいか？」"
translation = "「좀 더 가까이…… 다가가도 되겠느냐?」"

[[dialogue]]
speaker = "閃"
original = "「……あのー」"
translation = "「……저기이」"

[[dialogue]]
speaker = "せつな"
original = "「せつな達もここにいるんでござるが……」"
translation = "「세츠나들도 여기에 있소만……」"

[[dialogue]]
speaker = "閃"
original = "「どういう顔をしていいかわかりませんね……」"
translation = "「어떤 표정을 지어야 할지 모르겠네요……」"

[[dialogue]]
speaker = "ヘレナ"
original = "「──おっと、忘れていた。また人目も気にせずいちゃつくところであった」"
translation = "「── 오 이런, 잊고 있었군. 또 남의 눈도 신경 쓰지 않고 염장 지를 뻔했구나」"

[[dialogue]]
speaker = "せつな"
original = "「当主様のお荷物をここまで運んだのはせつなでござる！\u3000忘れるなんてひどいでござる！」"
translation = "「당주 님의 짐을 여기까지 운반한 것은 세츠나이소! 잊어버리다니 너무하오!」"

[[dialogue]]
speaker = "ヘレナ"
original = "「すまぬすまぬ。恋をしていると周りが見えなくなるものでな」"
translation = "「미안 미안. 사랑을 하고 있으면 주위가 보이지 않게 되는 법이라서 말이지」"

[[dialogue]]
speaker = "せつな"
original = "「そんな冷静に自己分析することじゃないでござる……！」"
translation = "「그렇게 냉정하게 자기 분석할 일이 아니지 않소……!」"

[[dialogue]]
speaker = "閃"
original = "「実際、当主様は会長さんをパートナーとされてから、ますます綺麗になったご様子……私もなんだか羨ましいですね」"
translation = "「실제로, 당주 님은 회장님을 파트너로 맞이하신 뒤로 더욱 아름다워지신 모습…… 저도 왠지 부럽네요」"

[[dialogue]]
speaker = "ヘレナ"
original = "「魔王は私に青春を教えてくれるのだ」"
translation = "「마왕은 나에게 청춘을 가르쳐 주는 것이다」"

[[dialogue]]
speaker = "ヘレナ"
original = "「しかし、あまり堂々といちゃつくものではないと私は学んだ。よって２人とも、もう下がってよいぞ」"
translation = "「하지만, 너무 당당하게 시시덕거릴 것이 아니라는 걸 나는 배웠다. 따라서 두 사람 다, 이제 물러가도 좋다」"

[[dialogue]]
speaker = "せつな"
original = "「え！？」"
translation = "「에!?」"

[[dialogue]]
speaker = "閃"
original = "「ということは、お２人はこのままここで……？」"
translation = "「그렇다는 건, 두 분은 이대로 여기서……?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「そうだ。誰の目も気にするでなく、存分に密着させてもらう」"
translation = "「그렇다. 누구의 눈도 신경 쓰지 않고, 마음껏 밀착하도록 하마」"

[[dialogue]]
speaker = "せつな"
original = "「２人きり……密着……」"
translation = "「단둘이…… 밀착……」"

[[dialogue]]
speaker = "閃"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "せつな"
original = "「ハ、ハレンチでござる……！」"
translation = "「파, 파렴치하오……!」"

[[dialogue]]
speaker = "閃"
original = "「ちょっと、せつな！\u3000何を考えているんですか！」"
translation = "「잠깐, 세츠나! 무슨 생각을 하는 거예요!」"

[[dialogue]]
speaker = "せつな"
original = "「きっと２人で手とか握り合ったり、無言で見つめ合ったりするんでござる！\u3000エロエロ過ぎでござる！」"
translation = "「분명 둘이서 손이라도 마주 잡거나, 무언으로 마주 보거나 할 것이오! 너무 야릇하오!」"

[[dialogue]]
speaker = "閃"
original = "（う……もっと過激なことを考えてしまっていたなんて言えない……）"
translation = "（우…… 좀 더 과격한 걸 상상해 버렸다고는 말 못 해……）"

[[dialogue]]
speaker = "閃"
original = "「と、とにかくそういう事は声に出さなくていいですから──！」"
translation = "「아, 아무튼 그런 건 입 밖으로 내지 않아도 되니까요──!」"

[[dialogue]]
speaker = "ヘレナ"
original = "「いろいろ<ruby>捗<rt>はかど</rt></ruby>っているようだが……まあよい、ご苦労であったな。後はゆっくり休んでよいぞ」"
translation = "「여러모로 망상이 깊어지고 있는 모양이다만…… 뭐 좋다, 수고했구나. 나머지는 푹 쉬어도 좋다」"

[[dialogue]]
speaker = "unk"
original = "そうして、メイド隊の２人はこの場から退出していった……。"
translation = "그렇게 메이드대의 두 사람은 이 자리에서 퇴장해 갔다……."

[[dialogue]]
speaker = "ヘレナ"
original = "「──というわけでだ、魔王。２人きりなら──いくら甘えても構わんのだろう？」"
translation = "「── 그런 고로 마왕이여. 단둘이라면── 아무리 어리광 부려도 상관없겠지?」"

[[dialogue]]
speaker = "unk"
original = "妄想されてた"
translation = "망상 당했어"

[[dialogue]]
speaker = "unk"
original = "問題ないけど"
translation = "문제없지만"

[[dialogue]]
speaker = "ヘレナ"
original = "「ふふふ、それもまた一興」"
translation = "「후후후, 그것 또한 하나의 즐거움」"

[[dialogue]]
speaker = "ヘレナ"
original = "「よくよく考えれば、当主として──あまりひ弱な姿を見られるわけにもいかぬしな。私が甘えた姿を見せるのは、貴殿にだけだ」"
translation = "「곰곰이 생각하면 당주로서── 너무 유약한 모습을 보일 수도 없는 노릇이고 말이다. 내가 어리광 부리는 모습을 보여주는 것은 귀하뿐이다」"

[[dialogue]]
speaker = "ヘレナ"
original = "「せっかくの２人きりなのだから、この時間を楽しもうではないか」"
translation = "「모처럼의 단둘만의 시간이니, 이 시간을 즐기자꾸나」"

[[dialogue]]
speaker = "ヘレナ"
original = "「私も貴殿も多忙な身。滅多にこんな時間は取れぬからな……そうだ」"
translation = "「나도 귀하도 바쁜 몸. 좀처럼 이런 시간은 낼 수 없으니까 말이다…… 그렇지」"

[[dialogue]]
speaker = "unk"
original = "ヘレナちゃんは裏手へ引っ込むと、格好を変えて登場した。"
translation = "헬레나짱은 뒤편으로 들어가더니, 복장을 바꾸고 등장했다."

[[dialogue]]
speaker = "ヘレナ"
original = "「──ふふ、どうだ？\u3000前回、貴殿が食い入るように見ていた水着だぞ」"
translation = "「── 후후, 어떠냐? 저번에 귀하가 뚫어지게 보고 있던 수영복이다」"

[[dialogue]]
speaker = "unk"
original = "刺激が……"
translation = "자극이……"

[[dialogue]]
speaker = "unk"
original = "迫力が……"
translation = "박력이……"

[[dialogue]]
speaker = "ヘレナ"
original = "「ふふ、なんともうぶなリアクションよ」"
translation = "「후후, 정말이지 순진한 리액션이로군」"

[[dialogue]]
speaker = "ヘレナ"
original = "「今日こそ水着の感想？\u3000ああ、よいよい。貴殿のどぎまぎした顔が見れれば十分だ<emoji=heart04>」"
translation = "「오늘이야말로 수영복의 감상? 아아, 됐다 됐다. 귀하의 당황한 얼굴을 볼 수 있으면 충분하다<emoji=heart04>」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ビーチでは注目を集めすぎてしまったが──誰の目もなければ、本当はもっと、したいことがあったのであろう？」"
translation = "「비치에서는 주목을 너무 많이 받았다만── 아무도 없다면, 사실은 좀 더 하고 싶은 것이 있었지 않느냐?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「今日こそ誰の横槍も入ることはない。存分に<ruby>堪能<rt>たんのう</rt></ruby>してゆけ、魔王♪」"
translation = "「오늘이야말로 누구의 방해도 들어오지 않을 것이다. 마음껏 만끽하고 가거라, 마왕♪」"

[[dialogue]]
speaker = "unk"
original = "そうしてその日は、お屋敷で──"
translation = "그렇게 그날은 저택에서──"

[[dialogue]]
speaker = "unk"
original = "２人きりの密なひとときを過ごすのだった……。"
translation = "단둘만의 밀접한 한때를 보내는 것이었다……."

