[[dialogue]]
speaker = "unk"
original = "第６話,梨緒・Ａ・クリステレス,B"
translation = "제6화, 리오·A·크리스테레스"

[[dialogue]]
speaker = "unk"
original = "壱の打撃が参に。弐が陸に。参が究に。"
translation = "첫 번째 타격이 세 번째로. 두 번째가 여섯 번째로. 세 번째가 아홉 번째로."

[[dialogue]]
speaker = "unk"
original = "この世界と２つの平行世界──３つの世界を束ねた拳が乱撃となり、鋼のモンスターを打ち砕く。"
translation = "이 세계와 두 개의 평행세계── 세 개의 세계를 묶은 주먹이 난격이 되어 강철 몬스터를 박살 낸다."

[[dialogue]]
speaker_original = "ドラケルス"
speaker_translation = "드라켈스"
original = "「ガアァァァ……」"
translation = "「가아아아……」"

[[dialogue]]
speaker = "unk"
original = "後から発生したモンスターごとまとめて叩き伏せ、リクリエの尖兵は断末魔とともに消え失せた。"
translation = "나중에 발생한 몬스터까지 한꺼번에 때려눕히자, 리크리에의 첨병은 단말마와 함께 사라졌다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ふぅ……」"
translation = "「후우……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「さっすがクロト！\u3000魔王にかかれば新手のモンスターも木っ端ミジンコね！」"
translation = "「역시 쿠로토! 마왕이 나서면 신종 몬스터도 가루가 되어버리네!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「えーと……残骸があちこちに転がっちゃってるんだけど……」"
translation = "「어음…… 잔해가 여기저기 널려 있는데……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「多分モンスターにされた機械だな……」"
translation = "「아마 몬스터가 된 기계겠지……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ま、仕方ないわね。あのままだったら街中の機械がモンスターになりかねなかったもの」"
translation = "「뭐, 어쩔 수 없지. 저대로 뒀으면 거리의 기계들이 죄다 몬스터가 됐을지도 모르는걸.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「それはそうだけど……被害額いくらになるんだろ、これ……」"
translation = "「그건 그렇지만…… 피해액이 얼마나 되려나, 이거……」"

[[dialogue]]
speaker = "unk"
original = "鉄屑を前にしてあっけらかんと言ってのけるヴィーナスと、顔を青くするマトイ。"
translation = "쇳덩어리 앞에서 태연하게 말하는 비너스와, 얼굴이 파랗게 질린 마토이."

[[dialogue]]
speaker = "unk"
original = "俺たちは責務を果たしたとはいえ、確かにこの瓦礫の山は心が痛むものがあった。"
translation = "우리들이 책무를 다했다고는 해도, 확실히 이 잔해더미는 마음이 아픈 구석이 있었다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「いつもならモンスターは倒すと消えるのに、残骸が残ったわね～」"
translation = "「평소라면 몬스터는 쓰러뜨리면 사라지는데, 잔해가 남았네요~」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「確か、フィーニスの塔のガーディアンもこんな感じだったわよね。倒したらスクラップになったし」"
translation = "「확실히, 피니스의 탑 가디언도 이런 느낌이었지. 쓰러뜨리면 스크랩이 됐고.」"

[[dialogue]]
speaker = "unk"
original = "フィーニスの塔の中で戦ったガーディアンは、リクリエの瘴気の影響で変化し、半ばモンスター化していた。"
translation = "피니스의 탑 안에서 싸웠던 가디언은, 리크리에의 장기 영향으로 변화하여 반쯤 몬스터화되어 있었다."

[[dialogue]]
speaker = "unk"
original = "今戦ったモンスターも、あの時のガーディアン同様、街にある機械がリクリエの瘴気に侵されていたということか。"
translation = "방금 싸운 몬스터도 그때의 가디언처럼, 거리에 있는 기계가 리크리에의 장기에 침식되었다는 뜻인가."

[[dialogue]]
speaker = "unk"
original = "それがフィーニスの塔外でも起きうる、しかも強力なモンスターに変ずるとなれば、大きな脅威だ。"
translation = "그것이 피니스의 탑 밖에서도 일어날 수 있고, 게다가 강력한 몬스터로 변한다면 커다란 위협이다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ひとまず新星学園に戻ろう。残骸はエスメラルダ先生たちが回収して分析してくれる──」"
translation = "「일단 신성학원으로 돌아가자. 잔해는 에스메랄다 선생님들이 회수해서 분석해 줄 거야──」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──！？」"
translation = "「──!?」"

[[dialogue]]
speaker = "unk"
original = "今の光景は……なんだ？"
translation = "방금 그 광경은…… 뭐지?"

[[dialogue]]
speaker = "unk"
original = "俺はあの光景を知らない──"
translation = "나는 저 광경을 모른다──"

[[dialogue]]
speaker = "unk"
original = "けど知っている。覚えている。"
translation = "하지만 알고 있다. 기억하고 있다."

[[dialogue]]
speaker = "unk"
original = "誰かの記憶の中で垣間見た光景。"
translation = "누군가의 기억 속에서 엿본 광경."

[[dialogue]]
speaker = "unk"
original = "いつかの戦いの最中に幻視した破滅の風景。"
translation = "언젠가 싸우던 도중에 환시했던 파멸의 풍경."

[[dialogue]]
speaker = "unk"
original = "摂理に抗う者の末路。"
translation = "섭리에 저항하는 자의 말로."

[[dialogue]]
speaker = "unk"
original = "世界が<ruby>無に帰す<rt>リセットされる</rt></ruby>前の、終焉の姿。"
translation = "세계가 무로 돌아가기 전의, 종언의 모습."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「はぁ……はぁ……」"
translation = "「하아…… 하아……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロト……？\u3000顔色が悪いわよ？」"
translation = "「쿠로토……? 안색이 안 좋아?」"

[[dialogue]]
speaker = "unk"
original = "あの光景が俺の心臓を鷲掴みにして離さない。"
translation = "그 광경이 내 심장을 움켜쥐고 놓아주지 않는다."

[[dialogue]]
speaker = "unk"
original = "心臓が破裂しそうにバクバクと脈打つ。"
translation = "심장이 터질 듯이 두근두근 맥동한다."

[[dialogue]]
speaker = "unk"
original = "血が激しく巡りすぎて頭が痛い。"
translation = "피가 너무 격렬하게 돌아 머리가 아프다."

[[dialogue]]
speaker = "unk"
original = "冷たい汗が背中を伝う。"
translation = "차가운 땀이 등줄기를 타고 흐른다."

[[dialogue]]
speaker = "unk"
original = "体の芯は燃えそうに熱いのに、手足は凍ってしまいそうに寒い。"
translation = "몸속은 타버릴 듯이 뜨거운데, 손발은 얼어붙을 듯이 차갑다."

[[dialogue]]
speaker = "unk"
original = "壊セ壊セ壊セ壊セ壊セ壊セ壊セ壊セ壊セ壊セ壊セ壊セ壊セ壊セ壊セ──"
translation = "부숴라부숴라부숴라부숴라부숴라부숴라부숴라부숴라부숴라부숴라부숴라부숴라부숴라부숴라부숴라──"

[[dialogue]]
speaker = "unk"
original = "滅ボセ滅ボセ滅ボセ滅ボセ滅ボセ滅ボセ滅ボセ滅ボセ滅ボセ滅ボセ──"
translation = "멸해라멸해라멸해라멸해라멸해라멸해라멸해라멸해라멸해라멸해라──"

[[dialogue]]
speaker = "unk"
original = "俺の中に封じたリクリエの力が命ずる──いや、違う。他ならぬ俺自身が破滅を欲していた。"
translation = "내 안에 봉인한 리크리에의 힘이 명령한다── 아니, 틀려. 다름 아닌 나 자신이 파멸을 원하고 있었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「みんな、俺から離れてくれ……！！」"
translation = "「모두, 나한테서 떨어져 줘……!!」"

[[dialogue]]
speaker = "unk"
original = "さもなければみんなを……みんなを……"
translation = "그러지 않으면 모두를…… 모두를……"

[[dialogue]]
speaker = "unk"
original = "<size=60>みんなを殺してしまう！！</size>"
translation = "<size=60>모두를 죽여버리고 말아!!</size>"

[[dialogue]]
speaker = "？？？"
original = "「見つけたぞ、緋宮クロト」"
translation = "「찾았다, 히노미야 쿠로토.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──！？」"
translation = "「──!?」"

[[dialogue]]
speaker = "unk"
original = "全てを無に帰さんとする衝動が臨界に達する寸前、一条の稲妻が俺を貫いた。"
translation = "모든 것을 무로 돌리려 하는 충동이 임계에 달하기 직전, 한 줄기 뇌광이 나를 꿰뚫었다."

[[dialogue]]
speaker = "unk"
original = "その雷は不届き者に下す天誅の如く。"
translation = "그 번개는 불한당에게 내리는 천벌과도 같이."

[[dialogue]]
speaker = "unk"
original = "空から真っ直ぐ撃ち下ろされた光の矢が、俺の中に渦巻く衝動を焼き尽くした。"
translation = "하늘에서 곧장 내리꽂힌 빛의 화살이, 내 안에서 소용돌이치던 충동을 태워 없앴다."

[[dialogue]]
speaker = "？？？"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "膝をついた俺の眼前に、矢の切っ先が向けられる。"
translation = "무릎을 꿇은 내 눈앞에 화살촉이 겨눠진다."

[[dialogue]]
speaker = "unk"
original = "クロスボウに<ruby>番<rt>つが</rt></ruby>えた矢を突き付けられているのだと、一瞬遅れて気付く。"
translation = "석궁에 메운 화살을 들이대고 있다는 것을, 한순간 늦게 깨닫는다."

[[dialogue]]
speaker = "unk"
original = "雷光のごとく<ruby>眩<rt>まばゆ</rt></ruby>い金髪をなびかせた女性がそこに立っていた。"
translation = "뇌광처럼 눈부신 금발을 휘날리는 여성이 그곳에 서 있었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「誰だ……？」"
translation = "「누구냐……?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私は<ruby>梨緒<rt>りお</rt></ruby>・<ruby>Ａ<rt>アガサ</rt></ruby>・クリステレス」"
translation = "「나는 리오·<ruby>A<rt>아가사</rt></ruby>·크리스테레스.」"

[[dialogue]]
speaker = "unk"
original = "その視線は射貫くように鋭く、動けば撃つと言外に告げていた。"
translation = "그 시선은 꿰뚫을 듯이 날카로웠고, 움직이면 쏘겠다고 무언중에 고하고 있었다."

[[dialogue]]
speaker = "unk"
original = "俺はその場に縫い付けられたみたいに動くことができず、彼女の言葉を待つ。"
translation = "나는 그 자리에 못 박힌 것처럼 움직일 수 없었고, 그녀의 말을 기다린다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「君はいずれ悪しき魔王に堕ち、世界を滅ぼす」"
translation = "「너는 머지않아 악한 마왕으로 타락해, 세계를 멸망시킨다.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だからその前に私が君を止める」"
translation = "「그러니 그전에 내가 너를 막겠어.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「よって──」"
translation = "「따라서──」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「新星学園星徒会長・緋宮クロト。私は君に御前試合を申し込む！」"
translation = "「신성학원 성도회장 히노미야 쿠로토. 나는 너에게 어전시합을 신청한다!」"

