[[dialogue]]
speaker = "unk"
original = "第２話,リィベル、漫画を買う,P"
translation = "제2화, 리벨, 만화를 사다, P"

[[dialogue]]
speaker = "unk"
original = "週末、俺とリィベルはある漫画を買いに秋葉原まで来ていた。"
translation = "주말, 나와 리벨은 어떤 만화를 사러 아키하바라까지 와 있었다."

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「ここが秋葉原……モンスター退治で来たことはあるけど、用があって来たのは初めてね」"
translation = "「여기가 아키하바라…… 몬스터 퇴치로 온 적은 있지만, 용건이 있어서 온 건 처음이네」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「なんというか……猥雑な街ね」"
translation = "「뭐랄까…… 번잡한 거리네」"

[[dialogue]]
speaker = "unk"
original = "秋葉原には様々なパソコン、アニメグッズ、カードなどの店があり、中には大人のおもちゃの専門店まである。リィベルの言わんとすることは分かる。"
translation = "아키하바라에는 다양한 컴퓨터, 애니메이션 굿즈, 카드 등의 가게가 있으며, 그중에는 성인용품 전문점까지 있다. 리벨이 말하려는 바를 알 것 같다."

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「悪い意味じゃないわ。こういう欲望に塗れたところに強い魔族はいるものよ。強そうな魔族がいたら魔将の候補者にしましょう」"
translation = "「나쁜 의미는 아니야. 이런 욕망에 찌든 곳에 강한 마족은 있기 마련이지. 강해 보이는 마족이 있으면 마장 후보자로 삼자고」"

[[dialogue]]
speaker = "unk"
original = "リィベルはロストアイテム『深淵書庫』から生まれた存在だ。"
translation = "리벨은 로스트 아이템 『심연서고』에서 태어난 존재다."

[[dialogue]]
speaker = "unk"
original = "『深淵書庫』はリクリエで滅ぼされた魔族の怨念を収めた書庫であり、暴走すれば呪いを撒き散らす危険性がある。"
translation = "『심연서고』는 리크리에에서 멸망한 마족의 원념을 담은 서고이며, 폭주하면 저주를 흩뿌릴 위험성이 있다."

[[dialogue]]
speaker = "unk"
original = "書庫を制御するには７人の魔将が必要らしく、リィベルはあと５人の適合者を探している。"
translation = "서고를 제어하려면 7명의 마장이 필요한 모양이라, 리벨은 남은 5명의 적합자를 찾고 있다."

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「ここが秋葉原の本屋……うわ」"
translation = "「여기가 아키하바라 서점…… 우와」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「向こうの棚に卑猥な本が見えるのだけど……私の気のせいじゃないわよね？」"
translation = "「저쪽 선반에 비외한 책이 보이는데…… 내 기분 탓은 아니지?」"

[[dialogue]]
speaker = "unk"
original = "しまった。ここはいわゆるえっちな本も置いてある本屋だ。特典で選んでしまったけど、リィベルを連れてくるべきでなかったかもしれない。"
translation = "아차. 여기는 소위 말하는 야한 책도 놓여 있는 서점이다. 특전 때문에 골랐지만, 리벨을 데려오는 게 아니었을지도 모른다."

[[dialogue]]
speaker = "unk"
original = "買ってこようか？"
translation = "사 올까?"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「イヤよ。ここまで来て棚に並んでいるところを見れないなんて」"
translation = "「싫어. 여기까지 와서 선반에 진열된 걸 못 보다니」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「ん」"
translation = "「응」"

[[dialogue]]
speaker = "unk"
original = "リィベルが俺に向かって手を差し出す。"
translation = "리벨이 나를 향해 손을 내민다."

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「私が卑猥な本を見ると、変な恰好になるかもしれないし……私は目をつむっているから、あなたが連れて行って」"
translation = "「내가 비외한 책을 보면 이상한 차림이 될지도 모르고…… 나는 눈을 감고 있을 테니까, 당신이 데려가 줘」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「ほら、早く」"
translation = "「자, 어서」"

[[dialogue]]
speaker = "unk"
original = "女の子と手をつなぐことに躊躇するけど──その手を取りたくて、反射的に握る。"
translation = "여자아이와 손을 잡는 것이 주저되지만── 그 손을 잡고 싶어서 반사적으로 쥔다."

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「んっ……あなたの手、意外と大きい…………いえ、なんでもないわ」"
translation = "「응…… 당신 손, 의외로 크네………… 아니, 아무것도 아니야」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "できるだけ優しく、リィベルの手を引く。優しくできてる自信なんかないけど、それでも、できるだけ優しく。"
translation = "최대한 상냥하게 리벨의 손을 이끈다. 상냥하게 하고 있다는 자신은 없지만, 그래도 최대한 상냥하게."

[[dialogue]]
speaker = "unk"
original = "着いたよ"
translation = "도착했어"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「っ！\u3000すごいわ……漫画が所狭しと並べられている」"
translation = "「윽! 대단하네…… 만화가 빈틈없이 진열되어 있어」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「この漫画の全てに、描いた人と、読む人がいる…………美しいわね」"
translation = "「이 만화들 전부를 그린 사람과 읽는 사람이 있다………… 아름답네」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「あ、これがあの小説の漫画ね」"
translation = "「아, 이게 그 소설 만화구나」"

[[dialogue]]
speaker = "unk"
original = "リィベルの目当ては、この前の変身のきっかけになった小説のコミカライズだ。相当な人気なのか、特設コーナーが設けられている。"
translation = "리벨의 목적은 요전번 변신의 계기가 된 소설의 코미컬라이즈다. 상당한 인기인지 특설 코너가 마련되어 있다."

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「ふぅん……こんな感じなのね。小説の挿絵に比べるとキャラクターが筋肉質だけど、これは漫画版の個性ということかしら」"
translation = "「흐음…… 이런 느낌이구나. 소설 삽화에 비하면 캐릭터가 근육질이지만, 이건 만화판의 개성이라는 걸까」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「５巻の表紙のキャラ、見たことないけど漫画のオリジナル？\u3000……ああ、原作ではビジュアルがなかったキャラね。気が付くとしっくりくるわ」"
translation = "「5권 표지의 캐릭터, 본 적 없는데 만화 오리지널? ……아아, 원작에서는 비주얼이 없었던 캐릭터네. 알고 보니 딱 들어맞아」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「最新刊がこの表紙ということは、まだ原作に追い付いてないのかしら。原作だと半分くらいだから、まだまだ巻数は増えそうね」"
translation = "「최신권이 이 표지라는 건 아직 원작을 따라잡지 못한 걸까. 원작의 절반 정도니까 앞으로 권수는 더 늘어날 것 같네」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「……何よ、じろじろ見て」"
translation = "「……뭐야, 빤히 쳐다보고」"

[[dialogue]]
speaker = "unk"
original = "楽しそうだから、つい"
translation = "즐거워 보여서 그만"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「っ！\u3000私は、楽しんでなんか……」"
translation = "「윽! 나는 딱히 즐거워하고 있는 게……」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「…………いいえ、確かに私は楽しんでいる。肯定するわ。リクリエに復讐する使命も忘れて……まるで、ひとりの魔族みたいに」"
translation = "「………… 아니, 확실히 나는 즐거워하고 있어. 긍정할게. 리크리에에 복수할 사명도 잊고…… 마치 한 명의 마족처럼」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「だらしがないと、自分でも思うわ。それでも、私はこの本たちを読みたいと思っている。……意味のない寄り道だと分かっていても、ね」"
translation = "「한심하다고 스스로도 생각해. 그래도 나는 이 책들을 읽고 싶어. ……의미 없는 곁길이라는 걸 알면서도 말이야」"

[[dialogue]]
speaker = "unk"
original = "そんなことはないよ"
translation = "그렇지 않아"

[[dialogue]]
speaker = "unk"
original = "たとえ特殊な出自だとしても、何かのために生まれてきたとしても、それ以外をしちゃいけない理由なんてない。それをしなくちゃいけない理由もない。"
translation = "비록 특수한 출생이라 해도, 무언가를 위해 태어났다고 해도, 그 외의 일을 해서는 안 될 이유 따위 없다. 그걸 해야만 하는 이유도 없다."

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「ふん……あなたは優しいのね。お人好しで考えなし。私が使命を放って本ばかり読んでいたら、書庫はいずれ呪いで暴走するわ」"
translation = "「흥…… 당신은 상냥하네. 참견쟁이에 생각도 없고. 내가 사명을 팽개치고 책만 읽고 있으면 서고는 언젠가 저주로 폭주할 거야」"

[[dialogue]]
speaker = "unk"
original = "その時はみんなでなんとかする"
translation = "그때는 다 같이 어떻게든 할 거야"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「みんなで、ね。モネもウィステリアもそう言っていたわ。魔将システムもそうやって生まれたものだし」"
translation = "「다 같이, 라. 모네도 위스테리아도 그렇게 말했었지. 마장 시스템도 그렇게 해서 태어난 것이고」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「ほんとにみんな、お人好し……」"
translation = "「정말 다들 참견쟁이들이라니까……」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「はぁ、脱線したわ。魔王がおかしなこと言うからよ」"
translation = "「하아, 옆길로 샜네. 마왕이 이상한 소리를 하니까 그렇잖아」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「そもそも本屋に来ているんだから、楽しいに決まってるでしょ。……さ、漫画を買って帰るわよ。長居してもお店に迷惑でしょうし」"
translation = "「애초에 서점에 왔으니까 즐거운 게 당연하잖아. ……자, 만화 사서 돌아가자고. 오래 있으면 가게에도 폐가 될 테니까」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「ふふっ……♪」"
translation = "「후훗……♪」"

[[dialogue]]
speaker = "unk"
original = "漫画の入った紙袋を宝物のように抱えるリィベル。"
translation = "만화가 든 종이봉투를 보물처럼 껴안는 리벨."

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「小冊子のオマケがあるとは思わなかったわ。得した気分ね。店舗特典らしいけど……あ」"
translation = "「소책자 부록이 있을 줄은 몰랐어. 득템한 기분이네. 점포 특전이라던데…… 아」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「あなた、そのためにあの本屋にしたのね。なら先に話しなさいよ。卑猥な本の棚を見たら、さすがにぎょっとしたわ」"
translation = "「당신, 그것 때문에 이 서점으로 정한 거구나. 그럼 미리 말을 하라고. 비외한 책 선반을 봤을 때는 역시 깜짝 놀랐단 말이야」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「そういう本の存在は否定しないし、むしろあるべきだとも思うけど、いきなり目に入ると驚くものよ」"
translation = "「그런 책의 존재를 부정하진 않고 오히려 있어야 한다고도 생각하지만, 갑자기 눈에 들어오면 놀라기 마련이라고」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「はぁ、まぁいいわ。今日は気分がいいから許してあげる」"
translation = "「하아, 뭐 됐어. 오늘은 기분이 좋으니까 용서해 줄게」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「ふふっ、ふふふ……♪」"
translation = "「후훗, 후후후……♪」"

[[dialogue]]
speaker = "unk"
original = "こんなに笑っている彼女を初めて見たかもしれない。寮に帰るまで、ずっと上機嫌だった。"
translation = "이렇게 웃고 있는 그녀를 처음 봤을지도 모른다. 기숙사에 돌아갈 때까지 내내 기분이 좋았다."

