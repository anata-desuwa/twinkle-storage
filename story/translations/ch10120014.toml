[[dialogue]]
speaker = "unk"
original = "第4話,主と友と,P"
translation = "제4화, 주인과 친구와"

[[dialogue]]
speaker = "unk"
original = "どうぞ、お嬢様"
translation = "드세요, 아가씨"

[[dialogue]]
speaker = "フィオナ"
original = "「ありがとう」"
translation = "「고마워」"

[[dialogue]]
speaker = "フィオナ"
original = "「――って、ついうちのメイドのつもりで接してしまいました。すみません」"
translation = "「──라니, 그만 우리 집 메이드인 줄 알고 대해버렸네요. 미안해요」"

[[dialogue]]
speaker = "キリカ"
original = "「紅茶を淹れるのが様になってきましたね。味も良くなったと思います」"
translation = "「홍차를 우리는 게 제법 그럴싸해졌네요. 맛도 좋아졌다고 생각해요」"

[[dialogue]]
speaker = "キリカ"
original = "「達人の域には及びませんが、戦闘でも隙が少なくなりました」"
translation = "「달인의 경지에는 미치지 못하지만, 전투에서도 빈틈이 적어졌습니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「まぁ……この前はずいぶん厳しくしていたしね。キリカも指導お疲れ様。緋宮会長とは仲良くなれた？」"
translation = "「뭐…… 요전번에 꽤 엄하게 했으니까 말이야. 키리카도 지도하느라 수고했어. 히노미야 회장과는 친해졌어?」"

[[dialogue]]
speaker = "キリカ"
original = "「いえ、特にそのようなことは」"
translation = "「아니요, 딱히 그런 일은」"

[[dialogue]]
speaker = "フィオナ"
original = "「そう？\u3000少し楽しそうだったように見えたけど」"
translation = "「그래? 조금 즐거워 보였던 것 같은데」"

[[dialogue]]
speaker = "キリカ"
original = "「お嬢様の気のせいかと」"
translation = "「아가씨의 기분 탓이겠지요」"

[[dialogue]]
speaker = "キリカ"
original = "「とはいえ、思いのほか吸収が早いので教えがいがありました」"
translation = "「그렇다 해도 생각보다 흡수가 빨라서 가르치는 보람이 있었습니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふーん……」"
translation = "「흐응……」"

[[dialogue]]
speaker = "キリカ"
original = "「これで修業は一区切りです。使用人としても、星騎士としても、成長されたと思います」"
translation = "「이것으로 수행은 일단락입니다. 고용인으로서도, 성기사로서도 성장하셨다고 생각합니다」"

[[dialogue]]
speaker = "キリカ"
original = "「もし星見家に仕えるおつもりがありましたら、より本格的に指導させていただきます。どこに出しても恥ずかしくない一流の使用人にしてみせましょう」"
translation = "「혹시 호시미 가문을 섬길 생각이 있으시다면 보다 본격적으로 지도해 드리겠습니다. 어디에 내놓아도 부끄럽지 않은 일류 고용인으로 만들어 보이죠」"

[[dialogue]]
speaker = "フィオナ"
original = "「緋宮会長が星見家の執事になる日も近い……？」"
translation = "「히노미야 회장이 호시미 가문의 집사가 될 날도 머지않았나……?」"

[[dialogue]]
speaker = "キリカ"
original = "「まずはアルバイトからですね」"
translation = "「우선은 아르바이트부터겠네요」"

[[dialogue]]
speaker = "フィオナ"
original = "「それとも緋宮会長はメイドの方がいいですか？」"
translation = "「아니면 히노미야 회장은 메이드 쪽이 좋아?」"

[[dialogue]]
speaker = "キリカ"
original = "「メイド服、着られますか？\u3000大きめのサイズなら余っています」"
translation = "「메이드복, 입으실래요? 큰 사이즈라면 남는 게 있습니다」"

[[dialogue]]
speaker = "unk"
original = "遠慮しておきます……"
translation = "사양하겠습니다……"

[[dialogue]]
speaker = "フィオナ"
original = "「けっこう似合うと思うんですが……ふふっ、冗談です」"
translation = "「꽤 어울릴 것 같은데…… 후훗, 농담이에요」"

[[dialogue]]
speaker = "キリカ"
original = "「楽しそうですね、お嬢様」"
translation = "「즐거워 보이시네요, 아가씨」"

[[dialogue]]
speaker = "フィオナ"
original = "「キリカこそ。やっぱり弟子はかわいいんじゃない？」"
translation = "「키리카야말로. 역시 제자가 귀여운 거 아냐?」"

[[dialogue]]
speaker = "キリカ"
original = "「かわいくはないですね」"
translation = "「귀엽지는 않네요」"

[[dialogue]]
speaker = "フィオナ"
original = "「あっ、緋宮会長がちょっとショックを受けてる。ふふ、キリカってば手厳しい」"
translation = "「앗, 히노미야 회장이 조금 충격받았어. 후후, 키리카도 참 매정해」"

[[dialogue]]
speaker = "フィオナ"
original = "「では私は自室に戻ります。キリカ、１５時になったら部屋に紅茶を持ってきて」"
translation = "「그럼 난 내 방으로 돌아갈게. 키리카, 15시가 되면 방으로 홍차를 가져다줘」"

[[dialogue]]
speaker = "キリカ"
original = "「お茶菓子はどうなさいましょう」"
translation = "「다과류는 어떻게 할까요」"

[[dialogue]]
speaker = "フィオナ"
original = "「どうしようかな……じゃあクッキーを少し。お茶を飲んだらきっとキリカのクッキーが欲しくなるもの」"
translation = "「어떡할까…… 그럼 쿠키를 조금. 차를 마시면 분명 키리카의 쿠키가 먹고 싶어질 테니까」"

[[dialogue]]
speaker = "キリカ"
original = "「かしこまりました」"
translation = "「알겠습니다」"

[[dialogue]]
speaker = "unk"
original = "キリカさんとフィオナ、少し姉妹みたいだ"
translation = "키리카 씨와 피오나, 조금 자매 같아"

[[dialogue]]
speaker = "キリカ"
original = "「そう見えますか？\u3000……なら、私もまだまだということです」"
translation = "「그렇게 보입니까? ……그렇다면 저도 아직 멀었다는 것이군요」"

[[dialogue]]
speaker = "キリカ"
original = "「確かに私はただの使用人ではありません」"
translation = "「확실히 저는 단순한 고용인이 아닙니다」"

[[dialogue]]
speaker = "キリカ"
original = "「すでに語ったこともあるかもしれませんが……私がフィオナ様と出会ったのは、まだお互い幼かった頃です」"
translation = "「이미 말씀드린 적이 있을지도 모르겠습니다만…… 제가 피오나 님과 만난 것은 아직 서로 어렸을 적입니다」"

[[dialogue]]
speaker = "キリカ"
original = "「あの頃は仲の良い友人のような間柄でした。ですが大きくなるにつれて、自分の役割を理解していきました」"
translation = "「그 시절에는 사이좋은 친구 같은 관계였습니다. 하지만 자라면서 자신의 역할을 이해하게 되었죠」"

[[dialogue]]
speaker = "キリカ"
original = "「私の方が年上でしたので、遊んでとせがまれることもありましたが……次第にお嬢様もご自身のお立場を理解されるようになりました」"
translation = "「제가 연상이었기에 놀아달라고 조르기도 했습니다만…… 점차 아가씨께서도 자신의 입장을 이해하시게 되었습니다」"

[[dialogue]]
speaker = "キリカ"
original = "「お嬢様の世話係として、お目付け役として……そして護衛として、私はその責務を果たします」"
translation = "「아가씨의 보살핌 담당으로서, 감시역으로서…… 그리고 호위로서 저는 그 책무를 다합니다」"

[[dialogue]]
speaker = "キリカ"
original = "「上月神闘流を修めたのも、流星学園に入学して星騎士になったのも、そのためです」"
translation = "「코즈키 신투류를 닦은 것도, 유성 학원에 입학해 성기사가 된 것도 그 때문입니다」"

[[dialogue]]
speaker = "unk"
original = "上月家だから星見家に仕えてるんですか？"
translation = "코즈키 가문이라서 호시미 가문을 섬기는 건가요?"

[[dialogue]]
speaker = "キリカ"
original = "「そうですね。私が上月家の人間だから……それは間違いありません」"
translation = "「그렇군요. 제가 코즈키 가문의 사람이기에…… 그것은 틀림없습니다」"

[[dialogue]]
speaker = "キリカ"
original = "「上月家の者は代々星見家に仕えてきました。千年以上前から……私の前の代も、そのまた前の代も」"
translation = "「코즈키 가문의 사람은 대대로 호시미 가문을 섬겨왔습니다. 천 년 이상 전부터…… 제 앞 세대도, 그 앞 세대도」"

[[dialogue]]
speaker = "キリカ"
original = "「ですが強制されたわけではありません。運命だと諦めたのでもありません」"
translation = "「하지만 강요된 것은 아닙니다. 운명이라며 포기한 것도 아닙니다」"

[[dialogue]]
speaker = "キリカ"
original = "「上月家の人間は長きにわたって、それぞれが星見家に仕えることを選んできた」"
translation = "「코즈키 가문의 인간은 오랜 세월에 걸쳐 각자가 호시미 가문을 섬기는 것을 선택해 왔다」"

[[dialogue]]
speaker = "キリカ"
original = "「きっとそうなのだろうと、私は思っています」"
translation = "「분명 그럴 것이라고 저는 생각하고 있습니다」"

[[dialogue]]
speaker = "キリカ"
original = "「……少々話し過ぎましたね。後頭部を殴って記憶を消しましょうか」"
translation = "「……조금 말을 많이 했군요. 후두부를 때려서 기억을 지워 드릴까요」"

[[dialogue]]
speaker = "キリカ"
original = "「冗談です。本気で慌てないでください」"
translation = "「농담입니다. 진심으로 당황하지 마십시오」"

[[dialogue]]
speaker = "キリカ"
original = "「ですが今お話したことはお嬢様には内密に。いえ、使用人として困ることはありませんが、恥ずかしいので。私が」"
translation = "「하지만 지금 말씀드린 것은 아가씨께는 비밀로. 아니요, 고용인으로서 곤란한 일은 없습니다만, 부끄러우니까요. 제가」"

[[dialogue]]
speaker = "キリカ"
original = "「……良いですね？」"
translation = "「……아시겠지요?」"

[[dialogue]]
speaker = "unk"
original = "はい、師匠！"
translation = "네, 스승님!"

[[dialogue]]
speaker = "キリカ"
original = "「今日も良い返事です。……ですが」"
translation = "「오늘도 좋은 대답입니다. ……하지만」"

[[dialogue]]
speaker = "キリカ"
original = "「お嬢様とは、流星星徒会の方々が持ってこられたボードゲームで戯れることもあります。あなたが思っているより窮屈ではありませんよ」"
translation = "「아가씨와는 유성 성도회 분들이 가져오신 보드게임으로 놀기도 합니다. 당신이 생각하는 것보다 거북하지는 않아요」"

[[dialogue]]
speaker = "キリカ"
original = "「そろそろ１５時です。お嬢様に紅茶をお持ちしなくては」"
translation = "「슬슬 15시입니다. 아가씨께 홍차를 가져다 드려야겠어요」"

[[dialogue]]
speaker = "キリカ"
original = "「最近はあなたの紅茶をお飲みになることが多かったので、私の味を思い出していただかないと」"
translation = "「최근에는 당신의 홍차를 드시는 일이 많았기에, 제 맛을 떠올리게 해 드려야겠군요」"

[[dialogue]]
speaker = "unk"
original = "妬いてます？"
translation = "질투하시나요?"

[[dialogue]]
speaker = "キリカ"
original = "「いいえ？\u3000あなたではまだまだ私には及びませんから」"
translation = "「아니요? 당신으로는 아직 저를 따라오지 못하니까요」"

[[dialogue]]
speaker = "キリカ"
original = "「でもあなたとなら……ともにお嬢様に仕えるのも悪くないと思っていますよ」"
translation = "「하지만 당신과라면…… 함께 아가씨를 섬기는 것도 나쁘지 않다고 생각하고 있어요」"

