[[dialogue]]
speaker = "unk"
original = "第４話,エリスの願い,P"
translation = "제4화, 에리스의 소원, P"

[[dialogue]]
speaker = "unk"
original = "エリスと一緒に街で遊んだ別れ際。"
translation = "에리스와 함께 거리에서 놀고 헤어질 무렵."

[[dialogue]]
speaker = "unk"
original = "「私を口説いてくれませんか？」とお願いされて――"
translation = "「저를 유혹해 주시지 않겠어요?」라는 부탁을 받고──"

[[dialogue]]
speaker = "エリス"
original = "「あっ、すみません、唐突なお願いで……」"
translation = "「앗, 죄송합니다, 갑작스러운 부탁이라서……」"

[[dialogue]]
speaker = "エリス"
original = "「どうしてこんなことをお願いしたかというと……父はフランス人で、母は元星騎士の天使だとお話したと思いますが……」"
translation = "「어째서 이런 부탁을 드렸냐 하면…… 아버지는 프랑스인이고, 어머니는 전직 성기사인 천사라고 말씀드렸었죠……」"

[[dialogue]]
speaker = "エリス"
original = "「母が流星学園を卒業して、天界に帰る前に旅行をしている時、フランスを訪れた際に父に出会ったんです」"
translation = "「어머니가 유성학원을 졸업하고 천계로 돌아가기 전에 여행을 하던 중, 프랑스를 방문했을 때 아버지를 만나셨대요.」"

[[dialogue]]
speaker = "エリス"
original = "「父は母に一目惚れをして、普段の寡黙な様子からは想像できないくらい、それはもう積極的にアピールをしたそうです」"
translation = "「아버지는 어머니께 첫눈에 반해서, 평소의 과묵한 모습으로는 상상할 수 없을 정도로 아주 적극적으로 대시를 하셨다고 해요.」"

[[dialogue]]
speaker = "エリス"
original = "「そんな思い出を語る母はとても幸せそうで、母から聞く父の言葉が情熱的で……いつしかそんな恋に憧れを持っていました」"
translation = "「그런 추억을 이야기하는 어머니는 무척 행복해 보였고, 어머니께 듣는 아버지의 말씀이 정열적이라서…… 어느샌가 그런 사랑에 동경을 품게 되었습니다.」"

[[dialogue]]
speaker = "エリス"
original = "「風紀委員として、あまり表立って恋愛をするべきではないと思うのですが……憧れは捨てられなくて」"
translation = "「풍기위원으로서 대놓고 연애를 해서는 안 된다고 생각합니다만…… 동경은 버릴 수가 없어서요.」"

[[dialogue]]
speaker = "エリス"
original = "「迷惑なのはわかっているんです。好きになってほしいとは言いません」"
translation = "「폐가 된다는 건 알고 있어요. 저를 좋아해 달라고는 하지 않겠습니다.」"

[[dialogue]]
speaker = "エリス"
original = "「ですから……真似事でいいので、少し付き合っていただけませんか？」"
translation = "「그러니까…… 흉내라도 좋으니, 조금만 어울려 주시지 않겠어요?」"

[[dialogue]]
speaker = "unk"
original = "頑張ってみる"
translation = "노력해 볼게."

[[dialogue]]
speaker = "エリス"
original = "「あ、ありがとうございます！」"
translation = "「가, 감사합니다!」"

[[dialogue]]
speaker = "エリス"
original = "「でも少し時間が欲しい……？\u3000は、はいっ、そうですよね、急でしたよね……ではその、よろしくお願いします……」"
translation = "「하지만 시간이 좀 필요하다……? 네, 네, 그렇죠, 갑작스러웠죠…… 그럼 그, 잘 부탁드립니다……」"

[[dialogue]]
speaker = "unk"
original = "そして一週間後――"
translation = "그리고 일주일 후──"

[[dialogue]]
speaker = "エリス"
original = "「こ、こんにちは……教室にあなたと私だけ、ですね……」"
translation = "「아, 안녕하세요…… 교실에 당신과 저뿐, 이네요……」"

[[dialogue]]
speaker = "unk"
original = "いつ見ても綺麗だね"
translation = "언제 봐도 예쁘네."

[[dialogue]]
speaker = "エリス"
original = "「い、いえ、私なんて……」"
translation = "「아, 아니요, 저 따위가……」"

[[dialogue]]
speaker = "エリス"
original = "（一言だけなのに……とても胸がドキドキする……同性に言われた時とは違う……）"
translation = "(한마디뿐인데…… 가슴이 무척 두근거려요…… 동성에게 들었을 때와는 달라……)"

[[dialogue]]
speaker = "エリス"
original = "（あ……会長さんが近づいてくる……あの時の口紅を差しているのは、気付いてくれるでしょうか）"
translation = "(아…… 회장님이 다가와요…… 그때 그 립스틱을 바른 거, 알아채 주실까요.)"

[[dialogue]]
speaker = "エリス"
original = "（会長さんがいつもより大きく見える……ううん、本当はこんなに大きかったんだ）"
translation = "(회장님이 평소보다 크게 보여요…… 아니, 원래 이렇게 컸던 거구나.)"

[[dialogue]]
speaker = "unk"
original = "好きだよ"
translation = "좋아해."

[[dialogue]]
speaker = "エリス"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker = "エリス"
original = "（会長さんが私を真っ直ぐ見つめる。少し見上げると視線が合う）"
translation = "(회장님이 나를 똑바로 바라본다. 조금 올려다보니 시선이 마주친다.)"

[[dialogue]]
speaker = "エリス"
original = "（真剣な表情。全身が緊張で強張る）"
translation = "(진지한 표정. 온몸이 긴장으로 굳어진다.)"

[[dialogue]]
speaker = "エリス"
original = "（胸が破裂しそうなくらい高鳴る）"
translation = "(심장이 터질 것처럼 고동친다.)"

[[dialogue]]
speaker = "エリス"
original = "（この胸の音が彼に聞こえていたら、恥ずかしくて死んでしまいそう。だけど聞こえないのが寂しいとも思ってしまう）"
translation = "(이 심장 소리가 그에게 들린다면 부끄러워 죽어버릴 것 같아. 하지만 들리지 않는 게 섭섭하다고도 생각하게 돼.)"

[[dialogue]]
speaker = "エリス"
original = "（貫くような鋭い視線が少し怖い。けれど私だけを見ているのが伝わってくる）"
translation = "(꿰뚫는 듯한 날카로운 시선이 조금 무서워. 하지만 나만을 보고 있다는 게 전해져 와.)"

[[dialogue]]
speaker = "エリス"
original = "（会長さんが私の頬に手を添えて、会長さんの顔が近づいてきて……）"
translation = "(회장님이 내 뺨에 손을 얹고, 회장님의 얼굴이 가까워져서……)"

[[dialogue]]
speaker = "エリス"
original = "（！？\u3000まさかこれはキ──）"
translation = "(!? 설마 이건 키──)"

[[dialogue]]
speaker = "unk"
original = "動かないで、エリス"
translation = "움직이지 마, 에리스."

[[dialogue]]
speaker = "エリス"
original = "「え、髪にゴミが……？\u3000あ、そうなんですね……ありがとうございます……」"
translation = "「에, 머리카락에 먼지가……? 아, 그렇군요…… 감사합니다……」"

[[dialogue]]
speaker = "エリス"
original = "「ああいえ、会長さんが悪いわけではないんです。むしろ逆というか、ドキドキしすぎてしまって――」"
translation = "「아니요, 회장님이 잘못하신 게 아니에요. 오히려 반대랄까, 너무 두근거려 버려서──」"

[[dialogue]]
speaker = "エリス"
original = "「なな、何でもないです！\u3000ちゃんと恋愛をしたことのない私には早かったみたいですね、あははは……」"
translation = "「머머, 아무것도 아니에요! 제대로 연애를 해본 적 없는 제게는 아직 일렀나 보네요, 아하하하……」"

[[dialogue]]
speaker = "エリス"
original = "「父に口説かれた時の母はこんな気持ちだったのでしょうか？\u3000うーん……実際に口説かれてみてもわかりませんね……」"
translation = "「아버지께 유혹당했을 때의 어머니는 이런 기분이었을까요? 으음…… 실제로 유혹당해 봐도 잘 모르겠네요……」"

[[dialogue]]
speaker = "unk"
original = "両親のことが本当に好きなんだな"
translation = "부모님을 정말 좋아하는구나."

[[dialogue]]
speaker = "エリス"
original = "「そうですね。父も母も私を愛してくれています。私も２人が大好きです」"
translation = "「네. 아버지도 어머니도 저를 사랑해 주십니다. 저도 두 분을 정말 좋아해요.」"

[[dialogue]]
speaker = "エリス"
original = "「思えば、私は証明したいのかもしれません。愛する両親の娘にふさわしいと」"
translation = "「생각해보면 저는 증명하고 싶은 걸지도 몰라요. 사랑하는 부모님의 딸로서 자격이 있다는 것을요.」"

[[dialogue]]
speaker = "エリス"
original = "「父は幼い頃から私に責務を教え、勉学のみならず護身術や剣術も学ばせました。だけどそれは私を想ってのことです。厳しくて優しい人なんです」"
translation = "「아버지는 어릴 때부터 제게 책무를 가르치고, 학업뿐만 아니라 호신술이나 검술도 배우게 하셨습니다. 하지만 그건 저를 생각해서 그러신 거예요. 엄격하면서도 다정한 분이십니다.」"

[[dialogue]]
speaker = "エリス"
original = "「富や力は欲しいままに貪るためではなく、世界をより良くするために与えられたもの」"
translation = "「부와 힘은 마음껏 탐하기 위해서가 아니라, 세계를 더 좋게 만들기 위해 주어진 것.」"

[[dialogue]]
speaker = "エリス"
original = "「その責務を果たしてこそ真に高貴なる者たりえると、私はそう思っています」"
translation = "「그 책무를 다해야말로 진정으로 고귀한 자가 될 수 있다고, 저는 그렇게 생각합니다.」"

[[dialogue]]
speaker = "エリス"
original = "「母は星騎士だった頃の話をよく語ってくれました。楽しかったこと、嬉しかったこと……それだけじゃなくて辛かったことや苦しかったことも」"
translation = "「어머니는 성기사였던 시절의 이야기를 자주 해주셨어요. 즐거웠던 일, 기뻤던 일…… 그뿐만 아니라 괴로웠던 일이나 힘들었던 일도요.」"

[[dialogue]]
speaker = "エリス"
original = "「まぶたを閉じると、星騎士だった母の姿を思い浮かべることができます」"
translation = "「눈을 감으면 성기사였던 어머니의 모습을 떠올릴 수 있습니다.」"

[[dialogue]]
speaker = "エリス"
original = "「私が星騎士になるのはきっと必然だったのでしょう」"
translation = "「제가 성기사가 된 것은 분명 필연이었겠지요.」"

[[dialogue]]
speaker = "エリス"
original = "「ノブレス・オブリージュ――父が私に教えた高貴なる者の責務。その責務を果たす者こそ、母が語って聞かせた星騎士なのだと思います」"
translation = "「노블레스 오블리주── 아버지가 제게 가르쳐주신 고귀한 자의 책무. 그 책무를 다하는 자야말로 어머니가 들려주신 성기사라고 생각합니다.」"

[[dialogue]]
speaker = "エリス"
original = "「いつかは伴侶を得て、２人のような夫婦になりたいです。もちろん少し遠い将来の話ですけど」"
translation = "「언젠가는 반려자를 얻어 두 분 같은 부부가 되고 싶어요. 물론 조금 먼 미래의 이야기지만요.」"

[[dialogue]]
speaker = "エリス"
original = "「そのためにはリクリエを防いで世界を守らないといけませんね」"
translation = "「그러기 위해서는 리크리에를 막고 세계를 지켜야겠지요.」"

[[dialogue]]
speaker = "エリス"
original = "「今日の続きは……またいつかお願いします、会長さん」"
translation = "「오늘의 뒷이야기는…… 다음에 또 부탁드려요, 회장님.」"

