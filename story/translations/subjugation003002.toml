[[dialogue]]
speaker = "unk"
original = "ＤＩＳＣでメッセージを受け取った俺――緋宮クロトは、星見家に向かった。"
translation = "DISC로 메시지를 받은 나―― 히노미야 쿠로토는 호시미 저택으로 향했다."

[[dialogue]]
speaker = "アム"
original = "「あっ、会長～！\u3000見て見て、じゃじゃ～ん♪\u3000これがあたし達のクリスマスフォームだよっ♪」"
translation = "「앗, 회장님~! 봐봐, 짜잔~♪ 이게 우리들의 크리스마스 폼이야♪」"

[[dialogue]]
speaker = "unk"
original = "すると、そこで出迎えたのは、クリスマス衣装に身を包んだアムであった。"
translation = "그러자 그곳에서 마중 나온 것은 크리스마스 의상을 몸에 걸친 아무였다."

[[dialogue]]
speaker = "unk"
original = "すごく可愛くて、よく似合ってる"
translation = "정말 귀엽고, 잘 어울려."

[[dialogue]]
speaker = "アム"
original = "「えへへっ、そうでしょ～？\u3000って……ん？\u3000今、カッコいいじゃなくて、可愛いって言った？」"
translation = "「에헤헤, 그치~? 어…… 응? 지금 멋지다가 아니라 귀엽다고 했어?」"

[[dialogue]]
speaker = "ナミエル"
original = "「じ～っ……」"
translation = "「지이이이……」"

[[dialogue]]
speaker = "unk"
original = "アムの後ろに隠れてるんだ？"
translation = "아무 뒤에 숨어있는 거야?"

[[dialogue]]
speaker = "unk"
original = "えっと……ナミエルはどうして"
translation = "저기…… 나미엘은 왜."

[[dialogue]]
speaker = "ナミエル"
original = "「会長、あまりこちらを見ないで下さいっ。目線がいやらしいですよ……！」"
translation = "「회장님, 너무 이쪽을 보지 마세요. 시선이 음란하다고요……!」"

[[dialogue]]
speaker = "アム"
original = "「ナミエルは恥ずかしがり屋だなぁ～。似合っているんだから、隠れたりしてないで堂々と見せなよ！\u3000ほらっ♪」"
translation = "「나미엘은 부끄럼쟁이라니까~. 잘 어울리니까 숨어 있지 말고 당당하게 보여줘! 자♪」"

[[dialogue]]
speaker = "ナミエル"
original = "「ちょっ、アム先輩……！？\u3000あっ……！」"
translation = "「잠깐, 아무 선배님……!? 앗……!」"

[[dialogue]]
speaker = "unk"
original = "ズバリ可愛くて、マジ天使、だ！"
translation = "그야말로 귀여워서, 진짜 천사 같다!"

[[dialogue]]
speaker = "unk"
original = "ナミエル、あえて包み隠さずに言おう……"
translation = "나미엘, 딱 잘라 말할게……"

[[dialogue]]
speaker = "ナミエル"
original = "「ななな、何をサムズアップしながらドヤ顔で言ってるんですか！？\u3000ふざけてます！？\u3000処しますよ！？」"
translation = "「무무무, 뭘 엄지 척 하면서 기세등등하게 말하는 건가요!? 장난해요!? 처단할 거예요!?」"

[[dialogue]]
speaker = "ナミエル"
original = "「大体、このクリスマスフォーム、別に会長に見せようと着ていたわけじゃなくて、変身解除ができないだけですから！」"
translation = "「애초에 이 크리스마스 폼, 딱히 회장님께 보여드리려고 입고 있었던 게 아니라 변신 해제가 안 될 뿐이니까요!」"

[[dialogue]]
speaker = "unk"
original = "変身解除できない……？"
translation = "변신 해제가 안 된다고……?"

[[dialogue]]
speaker = "ナミエル"
original = "「はい。どうやら以前、ウェディングフォームになってしまった時と似たような現象が起きてしまっているみたいで……」"
translation = "「네. 아무래도 이전에 웨딩 폼이 되어버렸을 때와 비슷한 현상이 일어난 것 같아서……」"

[[dialogue]]
speaker = "アム"
original = "「どうやら会長にも見えていないみたいだね。スノーマンのこと」"
translation = "「아무래도 회장님 눈에도 안 보이는 모양이네. 스노맨 말이야.」"

[[dialogue]]
speaker = "スノーマン"
original = "「うん……ボク、やっぱり他の人には、姿だけじゃなく、声も聞こえていないみたい……」"
translation = "「응…… 나, 역시 다른 사람에게는 모습뿐만 아니라 목소리도 들리지 않는 것 같아……」"

[[dialogue]]
speaker = "unk"
original = "俺には姿が見えないスノーマンとは、一体なんなのか。首を傾げながら、２人に事情を尋ねると――"
translation = "내게는 모습이 보이지 않는 스노맨이란 대체 무엇인가. 고개를 갸웃거리며 두 사람에게 사정을 묻자――"

[[dialogue]]
speaker = "ナミエル"
original = "「私のクリスマスフォームの一部にもなっているこのシルクハット……これに触れた瞬間、私とアム先輩の２人だけが、スノーマンの存在を認識できるようになったんです」"
translation = "「제 크리스마스 폼의 일부이기도 한 이 실크 햇…… 여기에 닿는 순간, 저와 아무 선배님 두 사람만 스노맨의 존재를 인식할 수 있게 되었어요.」"

[[dialogue]]
speaker = "アム"
original = "「スノーマンは冬の精霊で、その影響であたし達はクリスマスフォームの力に目覚めたようなんだけど……変身解除はどうやってもできなくてさ」"
translation = "「스노맨은 겨울의 정령이고, 그 영향으로 저희는 크리스마스 폼의 힘에 눈을 뜬 것 같은데…… 변신 해제는 아무리 해도 안 돼서 말이죠.」"

[[dialogue]]
speaker = "アム"
original = "「スノーマン自身も、なんでか記憶がなくて、自分がどうしてここにいるのかとか、シルクハットを落とした理由とか、よくわからないらしいんだよね」"
translation = "「스노맨 본인도 왠지 기억이 없어서, 자기가 왜 여기 있는지나 실크 햇을 떨어뜨린 이유 같은 걸 잘 모르는 모양이더라고.」"

[[dialogue]]
speaker = "スノーマン"
original = "「ボク、自分がスノーマンであること以外、思い出せなくて、色々できたはずの冬の力も今は全然使えない……」"
translation = "「나, 내가 스노맨이라는 것 말고는 기억이 안 나. 여러 가지 할 수 있었을 겨울의 힘도 지금은 전혀 못 써……」"

[[dialogue]]
speaker = "ナミエル"
original = "「それで以前、守護天使のセシア様――セッシーが初めて学園に来た時も、一時的に記憶喪失になっていたと聞いたことがあって……」"
translation = "「그래서 예전에 수호천사 세시아 님―― 세시가 처음 학원에 왔을 때도 일시적으로 기억상실이었다는 이야기를 들은 적이 있어서……」"

[[dialogue]]
speaker = "アム"
original = "「会長はこういう謎のトラブル経験が豊富だっていうのも知ってたからさ。相談してみようって話になったんだ」"
translation = "「회장님은 이런 수수께끼의 트러블 경험이 풍부하다는 것도 알고 있었으니까. 상담해 보자고 얘기가 된 거야.」"

[[dialogue]]
speaker = "アム"
original = "「あっ、ちなみに星見家まで来てもらったのは、ナミエルがクリスマスフォームのままで外にいるのが恥ずかしいからって理由で……」"
translation = "「앗, 참고로 호시미 저택까지 와달라고 한 건, 나미엘이 크리스마스 폼인 채로 밖에 있는 게 부끄럽다고 해서……」"

[[dialogue]]
speaker = "ナミエル"
original = "「当たり前です。むしろ、なんでアム先輩は堂々としていられるんですか……」"
translation = "「당연하죠. 오히려, 왜 아무 선배님은 당당하게 있을 수 있는 건가요……」"

[[dialogue]]
speaker = "アム"
original = "「えっ？\u3000このクリスマスフォーム、カッコいいから別によくない？\u3000それに、あたしはもう普段から、水着フォームで戦うのにも慣れてるし♪」"
translation = "「엣? 이 크리스마스 폼, 멋있으니까 별로 상관없지 않아? 게다가, 나(あたし)는 이미 평소부터 수영복 폼으로 싸우는 데 익숙하기도 하고♪」"

[[dialogue]]
speaker = "ナミエル"
original = "「えぇ……」"
translation = "「에휴……」"

[[dialogue]]
speaker = "アム"
original = "「そうだ！\u3000会長、変身解除できないこともそうだけど、それよりもっと困ったことがあってさ――」"
translation = "「맞다! 회장, 변신 해제 못 하는 것도 그렇지만, 그것보다 더 곤란한 일이 있어서 말이야――」"

[[dialogue]]
speaker = "アム"
original = "「あたしとナミエル、不思議な力で、<b>物理的に</b>離れることができなくなっちゃってるんだよ！」"
translation = "「나랑 나미엘, 이상한 힘 때문에 <b>물리적으로</b> 떨어질 수 없게 되어버렸어!」"

[[dialogue]]
speaker = "ナミエル"
original = "「……調べたところ、半径約１メートル以上の距離を空けようとすると、不思議な力で磁石のように引っ張られてしまうみたいなんです」"
translation = "「……조사해 본 결과, 반경 약 1미터 이상의 거리를 두려고 하면, 이상한 힘에 의해 자석처럼 끌려가 버리는 것 같아요.」"

[[dialogue]]
speaker = "unk"
original = "たった１メートル……！？"
translation = "겨우 1미터……!?"

[[dialogue]]
speaker = "アム"
original = "「そうなんだよ！\u3000常に二人三脚しているのと変わらないみたいな感じで、さすがになんとかしないと、不便でさ～」"
translation = "「그렇다니까! 항상 이인삼각을 하고 있는 거나 다름없는 느낌이라, 역시 어떻게든 하지 않으면 불편해서 말이야~」"

[[dialogue]]
speaker = "unk"
original = "２人から事情を聞いた俺は、以前のクリスマスでセシアと出会った時の話をしつつ、アドバイスする。"
translation = "두 사람에게 사정을 들은 나는, 이전 크리스마스에 세시아와 만났을 때의 이야기를 하며 조언을 해준다."

[[dialogue]]
speaker = "ナミエル"
original = "「――スノーマンが望んでいることを叶えたら、記憶が戻って、クリスマスフォームの力も解除できるようになるかもしれない……？\u3000なるほど……」"
translation = "「――스노맨이 원하는 것을 이루어주면, 기억이 돌아오고 크리스마스 폼의 힘도 해제할 수 있게 될지도 모른다……? 과연……」"

[[dialogue]]
speaker = "アム"
original = "「スノーマンは、何か叶えたいって思うこと、ある？」"
translation = "「스노맨은 뭔가 이루고 싶다고 생각하는 거 있어?」"

[[dialogue]]
speaker = "スノーマン"
original = "「ボクが望んでいること……？\u3000う～ん、わからない……」"
translation = "「나(ボク)가 원하는 것……? 으~음, 모르겠어……」"

[[dialogue]]
speaker = "アム"
original = "「そっか。記憶喪失だから、そこも思い浮かばない感じか～。参ったな～、どうしよっか？」"
translation = "「그렇구나. 기억상실이라 그 부분도 떠오르지 않는 느낌인가~. 곤란하네~, 어떡하지?」"

[[dialogue]]
speaker = "ナミエル"
original = "「ふむ……とりあえず、今すぐに解決できる問題ではないということはわかりました」"
translation = "「흠…… 일단, 지금 당장 해결할 수 있는 문제는 아니라는 건 알겠습니다.」"

[[dialogue]]
speaker = "ナミエル"
original = "「であれば――次の対策に移る必要があります」"
translation = "「그렇다면―― 다음 대책으로 옮겨갈 필요가 있겠네요.」"

[[dialogue]]
speaker = "アム"
original = "「ナミエル、何か考えがあるの？」"
translation = "「나미엘, 무슨 생각이라도 있어?」"

[[dialogue]]
speaker = "ナミエル"
original = "「簡単に問題解決できない可能性は、当然想定していました。ですので、その場合には、当面の状態で生活する覚悟を決める必要があります」"
translation = "「쉽게 문제를 해결하지 못할 가능성은 당연히 상정하고 있었습니다. 그러니 그 경우에는 당분간 이 상태로 생활할 각오를 다질 필요가 있어요.」"

[[dialogue]]
speaker = "ナミエル"
original = "「つまりは、『クリスマスフォームで二人三脚生活をする』という現状を受け入れ、それでも附属校の授業にはきちんと出なければならない、という覚悟をです」"
translation = "「즉, 『크리스마스 폼으로 이인삼각 생활을 한다』는 현상을 받아들이고, 그럼에도 부속교 수업에는 제대로 출석해야 한다는 각오 말입니다.」"

[[dialogue]]
speaker = "アム"
original = "「えっ、この状態で授業に出るの！？\u3000いやいや、あたし達、離れてそれぞれの教室に向かうのは、物理的に不可能なんだけど！？」"
translation = "「엣, 이 상태로 수업에 들어간다고!? 아니아니, 우리, 떨어져서 각자의 교실로 향하는 건 물리적으로 불가능한데!?」"

[[dialogue]]
speaker = "ナミエル"
original = "「承知しています。ですが、余程のことでもない限り、学園の授業はちゃんと受けなければなりません。何故なら――」"
translation = "「알고 있습니다. 하지만 웬만한 일이 아닌 한, 학원의 수업은 제대로 받아야만 합니다. 왜냐하면――」"

[[dialogue]]
speaker = "ナミエル"
original = "「私たち星騎士は、世界を守る代表として、人々の模範となる<b>クリーン</b>な行動を取らなくてはならないからです！」"
translation = "「우리 성기사(星騎士)는 세계를 지키는 대표로서, 사람들의 모범이 되는 <b>클린</b>한 행동을 취해야 하기 때문입니다!」"

[[dialogue]]
speaker = "アム"
original = "「真面目かっ！！！\u3000いや、その志はめっちゃ偉いけども！」"
translation = "「성실함 끝판왕이냐고!!! 아니, 그 의지는 엄청 훌륭하지만!」"

[[dialogue]]
speaker = "ナミエル"
original = "「物理的に、私たちのどちらか１人は授業を欠席せざるを得ないというのが心苦しいところですが……ここは平等に、ジャンケンで決めましょう」"
translation = "「물리적으로 우리 중 한 명은 수업을 결석할 수밖에 없다는 점이 마음 아프지만…… 여기서는 공평하게 가위바위보로 정하죠.」"

[[dialogue]]
speaker = "ナミエル"
original = "「私はここまで、学園の授業は綺麗に無遅刻無欠席の皆勤賞……！\u3000だからこそ、この勝負……決して負けるわけにはいきません！」"
translation = "「저는 지금까지 학원 수업을 깔끔하게 무지각 무결석으로 개근해 왔습니다……! 그렇기에 이 승부…… 결코 질 수 없어요!」"

[[dialogue]]
speaker = "ナミエル"
original = "「はぁ～……ふぅ～。――さあ、アム先輩。己の誇りをかけて、運命のジャンケンです……！」"
translation = "「하아~…… 후우~. ――자, 아무 선배님. 자신의 긍지를 걸고 운명의 가위바위보입니다……!」"

[[dialogue]]
speaker = "アム"
original = "「こんなにやりづらい勝負、生まれて初めてなんだけど！？\u3000だったらもう、あたしの負けでいいよ！？」"
translation = "「이렇게 하기 껄끄러운 승부, 태어나서 처음인데!? 그럴 바엔 그냥 내가 진 걸로 해도 돼!?」"

[[dialogue]]
speaker = "ナミエル"
original = "「いいえ、ダメです、アム先輩。――不戦勝は、決して綺麗な勝利ではありません」"
translation = "「아니요, 안 됩니다, 아무 선배님. ――부전승은 결코 깔끔한 승리가 아니니까요.」"

[[dialogue]]
speaker = "アム"
original = "「真面目通り越して、意外と面倒臭いな、この子！？」"
translation = "「성실함을 넘어서 의외로 귀찮네, 이 애!?」"

[[dialogue]]
speaker = "unk"
original = "その後――流星学園附属校の教室にて。"
translation = "그 후―― 유성 학원 부속교의 교실에서."

[[dialogue]]
speaker = "女性教師"
original = "「えっと……ナミエルさん？」"
translation = "「저기…… 나미엘 양?」"

[[dialogue]]
speaker = "ナミエル"
original = "「はい。なんでしょうか、先生」"
translation = "「네. 무슨 일이신가요, 선생님.」"

[[dialogue]]
speaker = "女性教師"
original = "「えっと……そのクリスマスチックな戦闘服は、一体どうしたのかしら？」"
translation = "「저기…… 그 크리스마스 분위기 물씬 풍기는 전투복은 대체 어찌 된 거니?」"

[[dialogue]]
speaker = "ナミエル"
original = "「事情は後でちゃんと説明致しますので、お気になさらず。それよりも今は他のみなさんの勉学の時間を減らさないよう、授業の方を優先して頂ければ」"
translation = "「사정은 나중에 제대로 설명해 드릴 테니 신경 쓰지 마세요. 그것보다 지금은 다른 분들의 면학 시간을 뺏지 않도록 수업 쪽을 우선해 주셨으면 합니다.」"

[[dialogue]]
speaker = "女性教師"
original = "「わ、わかりました。衣装のことは一旦了承しましたけど、もう１つ、どうしても気になるのが……」"
translation = "「아, 알겠단다. 의상 일은 일단 납득하겠지만, 또 하나 아무래도 신경 쓰이는 게……」"

[[dialogue]]
speaker = "アム"
original = "「あ、あはは……どうも～」"
translation = "「아, 아하하…… 안녕하세요~」"

[[dialogue]]
speaker = "女性教師"
original = "「えっと……白楯アムさん、ですよね？\u3000３年生の……」"
translation = "「저기…… 시로타테 아무 양, 맞지? 3학년인……」"

[[dialogue]]
speaker = "アム"
original = "「はい……お邪魔してます～」"
translation = "「네…… 실례 좀 하고 있어요~」"

[[dialogue]]
speaker = "女性教師"
original = "「なんで１年生の教室に？\u3000しかも、ナミエルさんの隣で、クリスマスチックな衣装もお揃いで……」"
translation = "「왜 1학년 교실에? 게다가 나미엘 양 옆에서 크리스마스풍 의상도 세트로 맞춰 입고……」"

[[dialogue]]
speaker = "アム"
original = "「えっと……ひとまず、お気になさらず～。あははは……」"
translation = "「저기…… 일단 신경 쓰지 말아 주세요~. 아하하하……」"

[[dialogue]]
speaker = "女性教師"
original = "「えぇ……？」"
translation = "「에휴……?」"

[[dialogue]]
speaker = "unk"
original = "真面目な顔で授業を受ける準備万端なナミエルの横で、苦笑いを浮かべるアムなのだった。"
translation = "진지한 얼굴로 수업을 들을 준비를 마친 나미엘 옆에서 쓴웃음을 짓는 아무였다."

