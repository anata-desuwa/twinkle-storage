[[dialogue]]
speaker = "unk"
original = "第３話,クリスマスストーリー,P"
translation = "제3화, 크리스마스 스토리"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「うーん……」"
translation = "「으음……」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「きゃっ！？\u3000……あ、会長！？\u3000ぶつかってごめんなさい……」"
translation = "「꺄앗!? ……아, 회장님!? 부딪혀서 죄송해요……」"

[[dialogue]]
speaker = "unk"
original = "暗い顔してたみたいだけど大丈夫？"
translation = "어두운 표정이었던 것 같은데 괜찮아?"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「あ、その……大したことではなくて……今書いている小説のネタ出しに行き詰っているんです」"
translation = "「아, 그게…… 별일은 아니고…… 지금 쓰고 있는 소설의 소재 구상에 막혀서요」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「かれこれ一週間くらいずっと考えていて……いつもは１日にニ十冊は読んでる本が、十冊しか読めてません……」"
translation = "「자그마치 일주일 정도 계속 생각하고 있는데…… 평소에는 하루에 20권은 읽던 책을, 10권밖에 못 읽고 있어요……」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「やっぱり私には小説の才能なんかないんですかね……」"
translation = "「역시 저에게는 소설의 재능 같은 건 없는 걸까요……」"

[[dialogue]]
speaker = "unk"
original = "それなら俺も協力するよ"
translation = "그렇다면 나도 협력할게"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「でも忙しい会長のお時間を取らせるわけには……」"
translation = "「하지만 바쁘신 회장님의 시간을 뺏을 수는……」"

[[dialogue]]
speaker = "unk"
original = "俺とモネの仲だから"
translation = "나와 모네 사이니까"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「あ……うぅ……そ、それじゃあお願いします……」"
translation = "「아…… 우으…… 그, 그럼 부탁드려요……」"

[[dialogue]]
speaker = "unk"
original = "図書館の談話スペースに場所を移して、詳しい話を聞く。"
translation = "도서관 담화 스페이스로 장소를 옮겨서, 자세한 이야기를 듣는다."

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「私が書こうと思っているのは、クリスマスをテーマにした恋愛小説です。でも恋愛小説はたくさん読んでいるはずなのに、情景が思い浮かばなくて……」"
translation = "「제가 쓰려고 하는 건, 크리스마스를 테마로 한 연애 소설이에요. 하지만 연애 소설은 많이 읽었을 텐데도, 정경이 떠오르지 않아서……」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「思いついたとしても、すでに読んだ本の焼き直しになってる気がして……全然進まないんです」"
translation = "「생각이 났다고 해도, 이미 읽은 책을 다시 짜깁기한 기분이 들어서…… 전혀 진척이 안 돼요」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「会長に何度か読んでもらった通り、今までも小説は書いてたんですけど、こんなのは初めてです」"
translation = "「회장님께 몇 번인가 읽어드린 대로, 지금까지도 소설은 써왔지만, 이런 적은 처음이에요」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「もちろん、今までだってそんなにスラスラ書けていたわけではないんですけど……」"
translation = "「물론, 지금까지도 그렇게 술술 써졌던 건 아니지만요……」"

[[dialogue]]
speaker = "unk"
original = "モネはどんな恋愛小説にしたいの？"
translation = "모네는 어떤 연애 소설로 만들고 싶어?"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「あ、そうですよね……そこから掘り下げないと。私が書きたいのは、初々しい恋愛を描いた物語です」"
translation = "「아, 그렇죠…… 거기서부터 파고들어야. 제가 쓰고 싶은 건, 풋풋한 연애를 그린 이야기예요」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「楽しい学園生活を送る男子生徒……友人に囲まれた賑やかな毎日……けれど少し物足りない気がしていた」"
translation = "「즐거운 학원 생활을 보내는 남학생…… 친구들에게 둘러싸인 시끌벅적한 매일…… 하지만 조금 허전한 기분이 들고 있었다」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「穏やかな日々を過ごす女子生徒……友達は少なくて地味だが、目立たないなりに充実していて……でも憧れがあった」"
translation = "「평온한 나날을 보내는 여학생…… 친구는 적고 수수하지만, 눈에 띄지 않는 나름대로 충실해서…… 하지만 동경이 있었다」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「２人は隣のクラスだが、移動教室ですれ違ったり、選択教科で席が近くなったり……お互い顔や名前は知っている程度の関係だった」"
translation = "「두 사람은 옆 반이지만, 이동 수업에서 스쳐 지나가거나, 선택 과목에서 자리가 가까워지거나…… 서로 얼굴이나 이름은 아는 정도의 관계였다」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「季節は秋。文化祭の実行委員になったことから２人は話すようになり、ほのかに意識し合う。そして季節は冬に──」"
translation = "「계절은 가을. 문화제 실행 위원이 된 것을 계기로 두 사람은 대화하게 되고, 어렴풋이 서로를 의식한다. 그리고 계절은 겨울로──」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「はっ──！？\u3000私ったらつい、頭の中の妄想をベラベラと……」"
translation = "「핫──!? 저도 참 그만, 머릿속의 망상을 나불나불……」"

[[dialogue]]
speaker = "unk"
original = "いい感じだから続けて続けて"
translation = "좋은 느낌이니까 계속해봐, 계속"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「あ……はい……すみません……」"
translation = "「아…… 네…… 죄송해요……」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「学園行事を通して知り合った２人が、仲を深め、クリスマスに告白して恋人になる……そんな物語にしたいんです」"
translation = "「학원 행사를 통해 알게 된 두 사람이, 사이가 깊어져, 크리스마스에 고백해서 연인이 된다…… 그런 이야기로 만들고 싶어요」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「きっと探せばどこにでもあるようなお話。ありふれた、けれど特別な青春……そんなイメージです」"
translation = "「분명 찾아보면 어디에나 있을 법한 이야기. 흔하지만, 그래도 특별한 청춘…… 그런 이미지예요」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「……それだけイメージがあるなら書けそう？\u3000確かにイメージはあるんですけど、具体的なアイデアがなくて……」"
translation = "「……그만큼 이미지가 있다면 쓸 수 있을 것 같아? 확실히 이미지는 있지만, 구체적인 아이디어가 없어서……」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「そしてデートシーンは特に印象深いものにしたいんです。距離が一番縮まるところですし、クリスマスのデートは学生にとって一大イベントですから」"
translation = "「그리고 데이트 장면은 특히 인상 깊은 것으로 만들고 싶어요. 거리가 가장 좁혀지는 부분이고, 크리스마스 데이트는 학생에게 있어 일생일대의 이벤트니까요」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「でも、その肝心のデートをどうすればいいかわからないんです……」"
translation = "「하지만, 그 정작 중요한 데이트를 어떻게 하면 좋을지 모르겠어요……」"

[[dialogue]]
speaker = "unk"
original = "じゃあ実際にやってみよう"
translation = "「그럼 실제로 해보자」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「実際に……？\u3000私と会長がデートするんですか！？」"
translation = "「실제로……? 저와 회장님이 데이트를 하는 건가요!?」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「そんな……私が会長とデートするなんて畏れ多いですよぉ……」"
translation = "「그럴 수가…… 제가 회장님과 데이트를 하다니 황송해요오……」"

[[dialogue]]
speaker = "unk"
original = "俺とモネは密かに付き合っている。"
translation = "나와 모네는 남몰래 사귀고 있다."

[[dialogue]]
speaker = "unk"
original = "しかしモネは控えめというか、自分を卑下しがちなので、こんな調子だ。"
translation = "하지만 모네는 조심스럽다고 해야 할지, 자신을 비하하는 경향이 있어서 이런 식이다."

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「あれだけ多くの人から慕われている会長が、私と付き合っているなんて、ちょっと信じられない事態ですし……」"
translation = "「그렇게나 많은 사람에게 경외받는 회장님이, 저와 사귀고 있다니, 조금 믿기지 않는 사태고요……」"

[[dialogue]]
speaker = "unk"
original = "俺はモネとデートしたいよ"
translation = "「나는 모네와 데이트하고 싶어」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ひゃっ！？」"
translation = "「히얏!?」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「あ……図書館なのに、大きな声を出してしまいました……図書委員なのにいけません……」"
translation = "「아…… 도서관인데, 큰 소리를 내버렸어요…… 도서 위원인데 그러면 안 되는데……」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「会長がそう言うなら……しましょうか、デート。……私の心臓が爆発するかもですけど」"
translation = "「회장님이 그렇게 말씀하신다면…… 할까요, 데이트. ……제 심장이 폭발할지도 모르겠지만요」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「私だって、その、デートしたいですし。こんなのでも一応、恋人ですから……」"
translation = "「저도, 그, 데이트하고 싶으니까요. 이런 저라도 일단은, 연인이니까……」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「……デートコース？\u3000あっ、そうですね、当てもなくブラブラしても時間を無駄にしてしまいますし」"
translation = "「……데이트 코스? 앗, 그렇네요, 목적 없이 빈둥거려도 시간을 낭비해 버릴 테니까요」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「学生らしいデート……映画とか、ゲームセンターとか……？」"
translation = "「학생다운 데이트…… 영화라든가, 게임 센터라든가……?」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「最後は夜景を……ううん、どうせなら…………その、こんな感じでどうでしょうか？」"
translation = "「마지막은 야경을…… 으응, 이왕이면………… 그, 이런 느낌으로 어떨까요?」"

[[dialogue]]
speaker = "unk"
original = "モネの考えたプランを見て頷く。"
translation = "모네가 생각한 플랜을 보고 고개를 끄덕인다."

[[dialogue]]
speaker = "unk"
original = "こうして、俺たちのクリスマスデートが決定したのだった。"
translation = "이렇게 해서, 우리들의 크리스마스 데이트가 결정된 것이었다."

