[[dialogue]]
speaker = "unk"
original = "第４話,手作りカーネーション,P"
translation = "제4화, 수제 카네이션, P"

[[dialogue]]
speaker = "シャロン"
original = "「みなさん、フラワーペーパーの準備はできましたか？\u3000作り方がわからなかったら、近くのお姉さんたちに聞いてくださいね！」"
translation = "「여러분, 플라워 페이퍼 준비됐나요? 만드는 법을 모르겠다면 근처 언니들에게 물어보세요!」"

[[dialogue]]
speaker = "シャロン"
original = "「あと、はさみやホッチキスを使いますから、怪我にだけは気を付けてくださーい！」"
translation = "「그리고 가위랑 스테이플러를 사용하니까 다치지 않게 주의해 주세요─!」"

[[dialogue]]
speaker = "女の子"
original = "「はーい！」"
translation = "「네─!」"

[[dialogue]]
speaker = "シャロン"
original = "「ふぅっ。会長さま、本日はありがとうございます。カフェテリアのスペースを貸していただき、助かりました」"
translation = "「후우. 회장님, 오늘은 감사합니다. 카페테리아 공간을 빌려주셔서 큰 도움이 됐어요」"

[[dialogue]]
speaker = "シャロン"
original = "「おかげさまでつつがなく、こども会のボランティア活動を行えそうです！」"
translation = "「덕분에 무사히 어린이회 자원봉사 활동을 진행할 수 있을 것 같습니다!」"

[[dialogue]]
speaker = "シャロン"
original = "「今年は例年以上にこども会の参加者が増えまして……開催場所に困っていたんですよ」"
translation = "「올해는 예년 이상으로 어린이회 참가자가 늘어나서…… 개최 장소 때문에 곤란했거든요」"

[[dialogue]]
speaker = "シャロン"
original = "「特に今日みたいに工作をする日は、広いお部屋とテーブルがたくさん必要ですからね」"
translation = "「특히 오늘처럼 공작을 하는 날은 넓은 방이랑 테이블이 많이 필요하니까요」"

[[dialogue]]
speaker = "シャロン"
original = "「ん……どうかしましたか、会長さま？」"
translation = "「음…… 무슨 일이신가요, 회장님?」"

[[dialogue]]
speaker = "unk"
original = "俺にも作り方を教えてくれる？"
translation = "나한테도 만드는 법 알려줄래?"

[[dialogue]]
speaker = "シャロン"
original = "「あ、そうですよね。こどもたちに作り方を聞かれた時に困りますものね」"
translation = "「아, 그렇네요. 아이들이 만드는 법을 물어봤을 때 곤란하실 테니까요」"

[[dialogue]]
speaker = "シャロン"
original = "「意外と簡単なんですよ。まずはフラワーペーパーを用意して、折り目を付けます」"
translation = "「의외로 간단하답니다. 우선 플라워 페이퍼를 준비해서 주름을 잡습니다」"

[[dialogue]]
speaker = "シャロン"
original = "「そのまま数枚重ね合わせて、じゃばら折りにした後に切れ目を入れて──」"
translation = "「그대로 몇 장 겹쳐서 부채접기를 한 다음에 칼집을 내서──」"

[[dialogue]]
speaker = "シャロン"
original = "「……と、こんな感じです！\u3000いかがでしょう、手作りですが本物のように見えませんか？」"
translation = "「……자, 이런 느낌이에요! 어떠세요, 수제지만 진짜처럼 보이지 않나요?」"

[[dialogue]]
speaker = "unk"
original = "これなら俺にもできそうだ"
translation = "이거라면 나도 할 수 있을 것 같아"

[[dialogue]]
speaker = "シャロン"
original = "「はい！\u3000折り目をつけるところから難しいと思う子もおりますので、ぜひフォローお願いします！」"
translation = "「네! 주름 잡는 것부터 어렵다고 생각하는 아이들도 있으니까 부디 팔로우 부탁드려요!」"

[[dialogue]]
speaker = "シャロン"
original = "「私、毎年のこの時期が大好きなんです。こどもたちが大好きなお母さまのためにお花を作る姿は微笑ましいですし……」"
translation = "「저, 매년 이 시기가 정말 좋아요. 아이들이 좋아하는 어머니를 위해 꽃을 만드는 모습은 흐뭇하고……」"

[[dialogue]]
speaker = "シャロン"
original = "「受け取ったお母さまもとても喜んでくださいますから」"
translation = "「받으시는 어머니도 무척 기뻐해 주시니까요」"

[[dialogue]]
speaker = "unk"
original = "材料って余ったりするのかな？"
translation = "재료가 남거나 할까?"

[[dialogue]]
speaker = "シャロン"
original = "「そうですね。失敗しちゃう子も多いので、フラワーペーパーは多めに用意してあります」"
translation = "「그렇네요. 실수하는 아이들도 많아서 플라워 페이퍼는 넉넉하게 준비해 뒀어요」"

[[dialogue]]
speaker = "シャロン"
original = "「ですから……はい。会長さまが何枚か持っていかれても大丈夫ですよ？」"
translation = "「그러니까…… 네. 회장님이 몇 장 가져가셔도 괜찮아요」"

[[dialogue]]
speaker = "シャロン"
original = "「ふふ♪\u3000しっかり心を込めて作って差し上げてくださいね」"
translation = "「후후♪ 정성을 꾹꾹 눌러 담아 만들어 드리세요」"

[[dialogue]]
speaker = "シャロン"
original = "「──なにせ今日は『母の日』ですから」"
translation = "「──무엇보다 오늘은 『어머니날』이니까요」"

[[dialogue]]
speaker = "リノ"
original = "「あっ、お帰りなさいクロト～。今日はちょっと遅かったのね？」"
translation = "「앗, 다녀왔니 쿠로토~. 오늘은 좀 늦었네?」"

[[dialogue]]
speaker = "リノ"
original = "「大聖堂のボランティアをお手伝いしてたんだっけ？\u3000こども会の子たちとは仲良くできた？」"
translation = "「대성당 자원봉사 도와주고 왔다고 했지? 어린이회 아이들이랑은 잘 지냈니?」"

[[dialogue]]
speaker = "リノ"
original = "「そう、なら良かった♪\u3000晩御飯作ってあるから一緒に食べましょ。手洗いうがい、してきなさいね」"
translation = "「그래, 그럼 다행이네♪ 저녁밥 만들어 뒀으니까 같이 먹자. 손 씻고 가글 하고 오렴」"

[[dialogue]]
speaker = "unk"
original = "母さん、これプレゼント"
translation = "엄마, 이거 선물"

[[dialogue]]
speaker = "リノ"
original = "「んー？\u3000どうしたの、藪から棒に──」"
translation = "「응─? 왜 그래, 갑자기──」"

[[dialogue]]
speaker = "リノ"
original = "「あっ……そっかぁ。今日は母の日だったっけ。すっかり忘れてたわ」"
translation = "「앗…… 그렇구나. 오늘이 어머니날이었지. 완전히 잊고 있었네」"

[[dialogue]]
speaker = "リノ"
original = "「星徒会で忙しいでしょうに……わざわざありがとうね、クロト！」"
translation = "「성도회 일로 바쁠 텐데…… 일부러 고마워, 쿠로토!」"

[[dialogue]]
speaker = "リノ"
original = "「ラッピングされてる贈り物なんていつぶりかしら。それに箱に付いてるカーネーションの造花、素敵ね！」"
translation = "「포장까지 된 선물은 얼마 만인지 모르겠네. 게다가 상자에 붙은 카네이션 조화, 멋지다!」"

[[dialogue]]
speaker = "リノ"
original = "「……えっ？\u3000このカーネーション、クロトの手作りなの！？」"
translation = "「……어? 이 카네이션, 쿠로토가 직접 만든 거야!?」"

[[dialogue]]
speaker = "リノ"
original = "「も～っ……！\u3000あ～～～っ♪\u3000うちの息子が可愛すぎる！\u3000箱のプレゼントも、開けて見てもいい？」"
translation = "「정말이지……! 아~~~♪ 우리 아들이 너무 귀여워! 상자 선물도 열어봐도 될까?」"

[[dialogue]]
speaker = "リノ"
original = "「わぁ……素敵な髪留めね。派手すぎないから、お仕事にも付けていけそう～♪」"
translation = "「와아…… 멋진 머리핀이네. 너무 화려하지 않아서 일할 때도 하고 갈 수 있겠어~♪」"

[[dialogue]]
speaker = "リノ"
original = "「そうね。お仕事する時は髪をまとめる時も多いから。ふふ、ありがとうね、クロト♪」"
translation = "「맞아. 일할 때는 머리 묶을 때가 많으니까. 후후, 고마워 쿠로토♪」"

[[dialogue]]
speaker = "リノ"
original = "「でもこれ、結構いいところのブランドじゃない？\u3000あんまり無理しなくていいのよ」"
translation = "「그치만 이거 꽤 좋은 브랜드 아니니? 너무 무리하지 않아도 되는데」"

[[dialogue]]
speaker = "リノ"
original = "「アルバイトで貯めたお金は、クロトの使いたいことに使えばいいんだから」"
translation = "「아르바이트로 모은 돈은 쿠로토가 쓰고 싶은 곳에 쓰면 되니까」"

[[dialogue]]
speaker = "unk"
original = "これが俺の使いたいことだから"
translation = "이게 내가 쓰고 싶은 거니까"

[[dialogue]]
speaker = "リノ"
original = "「……そっか。うん、ありがとう。ずーっと大事にするわね！」"
translation = "「……그렇구나. 응, 고마워. 영원히 소중히 간직할게!」"

[[dialogue]]
speaker = "リノ"
original = "「お母さんもクロトには感謝してるわ。あなたと一緒に暮らしてると、いつも楽しいから」"
translation = "「엄마도 쿠로토에겐 감사하고 있단다. 너랑 같이 살고 있으면 항상 즐거우니까」"

[[dialogue]]
speaker = "リノ"
original = "「お母さんの息子でいてくれて、ありがとうね」"
translation = "「엄마 아들로 있어 줘서 고마워」"

[[dialogue]]
speaker = "リノ"
original = "「……って、ご飯の前にしんみりしちゃったわね。ほら、手洗いうがい、ちゃーんとしてきなさい」"
translation = "「……라니, 밥 먹기 전에 분위기가 숙연해졌네. 자, 손 씻고 가글, 제대─로 하고 오렴」"

[[dialogue]]
speaker = "リノ"
original = "「今日はクロトの好きなものばかり作ってあるからね。お腹い～っぱい食べなきゃだめよ？」"
translation = "「오늘은 쿠로토가 좋아하는 것들로만 만들어 뒀으니까. 배 터~지게 먹어야 해?」"

[[dialogue]]
speaker = "unk"
original = "母親への感謝を伝えるタイミングって、いっぱいあるようであまりないものだ。"
translation = "어머니께 감사를 전할 타이밍은 많은 것 같으면서도 그리 많지 않다."

[[dialogue]]
speaker = "unk"
original = "俺を育てて、支えて、愛してくれる母さんに少しでも感謝の気持ちを伝えられたのなら嬉しい。"
translation = "나를 키우고 지지하고 사랑해 주는 엄마에게 조금이라도 감사한 마음이 전해졌다면 기쁘다."

[[dialogue]]
speaker = "unk"
original = "……俺と母さんの血が繋がっていないだろうこととか、最近薄っすらとわかりはじめてきた、母さんが昔に所属していた『組織』のこととか。"
translation = "……나와 엄마가 피가 섞이지 않았을 거라는 사실이나, 최근 어렴풋이 알기 시작한 엄마가 예전에 소속되어 있던 『조직』에 관한 것들."

[[dialogue]]
speaker = "unk"
original = "本当はこの機会に腹を割って話してみようかとも思っていたのだけれど──"
translation = "사실은 이 기회에 속 시원히 털어놓고 이야기해 볼까 생각도 했었지만──"

[[dialogue]]
speaker = "リノ"
original = "「クロトー？\u3000髪留め、さっそく付けてみたけど～。どうかしら♪\u3000似合う？」"
translation = "「쿠로토─? 머리핀, 바로 해봤는데~. 어떠니♪ 잘 어울려?」"

[[dialogue]]
speaker = "unk"
original = "もうちょっとだけ、「普通の幸せな親子」で居続けたくて……"
translation = "조금만 더, 「평범하고 행복한 부모 자식」으로 머물고 싶어서……"

[[dialogue]]
speaker = "unk"
original = "（自分から打ち明けるタイミング伺ってる）"
translation = "（먼저 털어놓을 타이밍을 엿보고 있다）"

[[dialogue]]
speaker = "unk"
original = "（母さんもきっと……）"
translation = "（엄마도 분명……）"

[[dialogue]]
speaker = "unk"
original = "用意周到な母さんのこと。自分から切り出さないということは、今はまだ『その時』ではないのかもしれない。"
translation = "용의주도한 엄마인걸. 먼저 말을 꺼내지 않는다는 건 아직은 『그때』가 아니라는 뜻일지도 모른다."

[[dialogue]]
speaker = "unk"
original = "俺は胸の中でそう言い訳をして、そっと親子の真実に触れる日の予定を後ろに倒すのだった。"
translation = "나는 마음속으로 그렇게 변명하며, 살며시 부모 자식의 진실에 닿을 날의 예정 뒤로 미루는 것이었다."

