[[dialogue]]
speaker = "unk"
original = "第２話,お笑い番組も大好きです,P"
translation = "제2화, 코미디 프로그램도 정말 좋아합니다, P"

[[dialogue]]
speaker = "unk"
original = "小腹が減ったので購買部を訪ねたところ、とてもとても珍しい組み合わせに遭遇した──"
translation = "출출해져서 매점에 들렀더니, 아주 아주 희귀한 조합과 조우했다──"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「ほぇえ～……なるほど。ドリルはロマンなのですね。勉強になりますっ」"
translation = "「호에에～…… 그렇군요. 드릴은 로망인 것이군요. 공부가 됩니다앗.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「その通りです。超機動武神ギガンドム──必殺攻撃の掛け声、覚えられましたか？」"
translation = "「그렇습니다. 초기동무신 기간돔── 필살 공격의 구호, 외우셨나요?」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「はい！\u3000見ていてください！」"
translation = "「네! 지켜봐 주세요!」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「えっと……『外道の貴様らには地獄すら生ぬるい！\u3000ギガンドリル・プレッシャー！！』」"
translation = "「엣또…… 『외도인 네놈들에게는 지옥조차 미지근하다! 기간 드릴 프레셔!!』」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「マーベラス。さすがは光の魔女様です」"
translation = "「마벨러스. 역시 빛의 마녀님입니다.」"

[[dialogue]]
speaker = "unk"
original = "何をやってるの！？"
translation = "뭘 하고 있는 거야!?"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「あ、魔王様！\u3000ご無沙汰しております！」"
translation = "「아, 마왕님! 오랜만입니다!」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「マスターに頼まれて、先ほどまでトリュファイナさんの義体の調整をしていたのです」"
translation = "「마스터의 부탁으로 조금 전까지 트류파이나 씨의 의체 조정을 하고 있었습니다.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「人工物である以上、メンテナンスは欠かせません」"
translation = "「인공물인 이상, 유지보수는 필수입니다.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「ついでに現代の文化に興味があるとのことでしたので……こちら」"
translation = "「하는 김에 현대 문화에 흥미가 있다고 하셔서…… 여기.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「シュティレのＤＩＳＣにダウンロードしてあるロボットアニメを厳選し、視聴大会をしていた次第です」"
translation = "「슈틸레의 DISC에 다운로드 되어 있는 로봇 애니메이션을 엄선해서, 시청 대회를 하던 참입니다.」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「魔王様。私、知りませんでした！\u3000ドリルとロケットパンチは永遠のロマンなのですよね、ふふふっ♪」"
translation = "「마왕님. 저, 몰랐습니다! 드릴과 로켓 펀치는 영원한 로망인 것이군요, 후후훗♪」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「あんなに音と光がどっかーん、どっかーんと！\u3000こんな娯楽は初めてです。現代の文化とは、奥が深いのですね！」"
translation = "「그렇게 소리와 빛이 콰과광, 콰과광 하고! 이런 오락은 처음입니다. 현대의 문화란 깊이가 있군요!」"

[[dialogue]]
speaker = "unk"
original = "（ネビュラの人達にバレたら大変そう）"
translation = "(네뷸라 사람들한테 들키면 큰일 나겠어)"

[[dialogue]]
speaker = "unk"
original = "（光の魔女がロボットアニメを……）"
translation = "(빛의 마녀가 로봇 애니메이션을……)"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「シュティレ様。私、ろぼっとあにめ……？\u3000以外の映像も拝聴したいです！」"
translation = "「슈틸레 님. 저, 로봇 애니메이션……? 이외의 영상도 배청하고 싶습니다!」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「さらに深みを目指すと？\u3000なるほど、承りました」"
translation = "「더욱 깊은 곳을 지향하신다구요? 알겠습니다, 접수했습니다.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「では……そうですね。次は漫才のライブ映像などどうでしょう？」"
translation = "「그럼…… 그렇죠. 다음은 만담 라이브 영상 같은 건 어떨까요?」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「何を隠そう、私はお笑い番組も大好物なのです」"
translation = "「사실 저는 코미디 프로그램도 아주 좋아합니다.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「ちなみにお笑い番組を見始めたのは、この無表情な顔でも友達の輪に溶け込める話題を作りたい、という切実で政治的な理由になります」"
translation = "「참고로 코미디 프로그램을 보기 시작한 것은, 이 무표정한 얼굴로도 친구 서클에 녹아들 수 있는 화젯거리를 만들고 싶다는, 절실하고 정치적인 이유에서입니다.」"

[[dialogue]]
speaker = "unk"
original = "意外と理由が悲しい……！！"
translation = "의외로 이유가 슬퍼……!!"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「結果、友達の輪はあまり広がりませんでしたが、キャラ付けにはなったので良しです。ぶい」"
translation = "「결과적으로 친구 서클은 그리 넓어지지 않았지만, 캐릭터성은 잡혔으니 됐습니다. 브이.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「ではトリュファイナさん、漫才ライブ、再生します」"
translation = "「그럼 트류파이나 씨, 만담 라이브, 재생합니다.」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「はいっ！\u3000よろしくお願いいたします♪」"
translation = "「네! 잘 부탁드립니다♪」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「ほぇえ～……なるほど。『なんでやねーん』と言うこれが、『ツッコミ』というものなのですか～……」"
translation = "「호에에～…… 그렇군요. 『난데야네─ㄴ(왜 저래─)』이라고 말하는 이것이, 『츳코미』라는 것이군요～……」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「その通りです。事実とずれた事柄を指摘する際、大げさな身振り手振りと共にこれを行うことで、場が引き締まるのです」"
translation = "「그렇습니다. 사실과 어긋난 사항을 지적할 때, 과장된 몸짓 발짓과 함께 이것을 함으로써 장내 분위기가 고조되는 것입니다.」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「なんでやねーん……すごいのですね。機会があれば、ぜひ一度、会話で使ってみたいです」"
translation = "「난데야네─ㄴ…… 대단하군요. 기회가 된다면 꼭 한번 대화에서 써보고 싶습니다.」"

[[dialogue]]
speaker = "unk"
original = "光の魔女にこんなこと教えて……"
translation = "빛의 마녀에게 이런 걸 가르치다니……"

[[dialogue]]
speaker = "unk"
original = "本当に大丈夫なのかな……"
translation = "정말로 괜찮은 걸까……"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「あっ、会長さん！\u3000探しましたよ、星徒会室にいらっしゃらないから……」"
translation = "「앗, 회장님! 찾았잖아요, 성도회실에 안 계셔서……」"

[[dialogue]]
speaker = "unk"
original = "げっ！\u3000ウェンディ！？"
translation = "게엑! 웬디!?"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「む。新キャラですね」"
translation = "「음. 신캐릭터군요.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「こちら、次回のネビュラと新星学園の合同訓練の資料です。できればすぐに目を通して、ご意見をいただきたくて……」"
translation = "「여기, 다음 네뷸라와 신성학원의 합동 훈련 자료입니다. 가능하면 바로 훑어보시고 의견을 주셨으면 해서……」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「まあ。魔女が学園と合同訓練……時が経つごとに仲良しになっておりますね。私、嬉しいです♪」"
translation = "「어머나. 마녀가 학원과 합동 훈련…… 시간이 흐를수록 사이가 좋아지고 있군요. 저, 기쁩니다♪」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「──って！？\u3000あ、あああ、あなた様は……光の魔女っ……ト、ト、ト──トリュファイナ様っ！？！？」"
translation = "「──라닛!? 아, 아아아, 당신은…… 빛의 마녀…… 트, 트, 트──트류파이나 님!?!?」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「あ、そんなに畏まらず。光の魔女であったのはもう大昔のこと。今はただの、魔女トリュファイナに過ぎないのですから」"
translation = "「아, 그렇게 송구해하지 마시길. 빛의 마녀였던 건 아주 먼 옛날 일. 지금은 그저, 마녀 트류파이나에 불과하니까요.」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「とはいえ、魔女の森にも帰らず、元老会からも認識されていない私は、立派な<ruby>はぐれ魔女<rt>ヤーガ</rt></ruby>になってしまったのでしょうか？」"
translation = "「그렇긴 해도, 마녀의 숲에도 돌아가지 않고 원로회로부터도 인식되지 않는 저는, 훌륭한 떠돌이 마녀가 되어버린 걸까요?」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「な、ななな、何故トリュファイナ様がこんなところに！？\u3000というか、あわわっ、私なんかが会話していいお方なのでしょうか！？」"
translation = "「어, 어어어, 어째서 트류파이나 님이 이런 곳에!? 그보다, 아와와, 저 같은 게 대화해도 되는 분인 건가요!?」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「トリュファイナさん、今です。こういう時にさっきのツッコミを使うのですよ」"
translation = "「트류파이나 씨, 지금입니다. 이럴 때 아까 배운 츳코미를 쓰는 거예요.」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「あ……なるほど♪\u3000実践してみましょう！」"
translation = "「아…… 그렇군요♪ 실천해 보죠!」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「な──なんでやねーん！」"
translation = "「나──난데야네─ㄴ!」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「はェエ──────！？！？！？」"
translation = "「하에에──────!?!?!?」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「私は今代の光の魔女じゃ、なっ、ないのですよー！？\u3000かしこまったら、あ、あかんでー！！」"
translation = "「저는 이번 대의 빛의 마녀가, 아, 아니거든요─!? 격식 차리면, 아, 안 된데이─!!」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「トリュファイナ様ぁ！？！？」"
translation = "「트류파이나 님──!?!?」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「ふぅっ。大きな声を出すのは、恥ずかしいですね……！」"
translation = "「후우. 큰 목소리를 내는 건 부끄럽네요……!」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「でも……ふふふっ♪\u3000いかがでしたかシュティレ様。私の『ツッコミ』は！」"
translation = "「하지만…… 후후훗♪ 어떠셨나요 슈틸레 님. 저의 『츳코미』는!」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「初めてにしてはなかなかのキレかと。ですが重要な点があります」"
translation = "「처음 치고는 제법 날카롭군요. 하지만 중요한 점이 있습니다」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「お笑いはタイミングが命。テンポと言う名の鮮度があります。次回からは、間髪入れず『なんでやねん』を使えるようになりましょう」"
translation = "「개그는 타이밍이 생명. 템포라는 이름의 선도가 있죠. 다음부터는, 지체 없이 『난데야넨』을 사용할 수 있게 됩시다」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「ほぇえ～。奥が深いのですね、ツッコミ……」"
translation = "「호에에~. 깊이가 있군요, 츳코미……」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「わ、私は一体……何を見せられているのですか……！？」"
translation = "「저, 저는 대체…… 무엇을 보고 있는 건가요……!?」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「いざという時にすばやく繰り出せるよう、素振りは大事です。なんでやねん、なんでやねん──はい、どうぞ」"
translation = "「만약의 상황에 빠르게 내지를 수 있도록, 빈스윙은 중요합니다. 난데야넨, 난데야넨── 자, 해보세요」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「はい！\u3000──なんでやねん！\u3000──なんでやねん！」"
translation = "「네! ──난데야넨! ──난데야넨!」"

[[dialogue]]
speaker = "unk"
original = "トリュファイナさん、もうやめて！"
translation = "트류파이나 씨, 이제 그만해!"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「会長さん！？\u3000あの！\u3000これは！\u3000一体……な、なんで！？\u3000なんでやねーーーん！？」"
translation = "「회장님!? 저기! 이건! 대체…… 왜, 왜!? 왜애애애애애앤──!?」"

[[dialogue]]
speaker = "unk"
original = "うつってるよ、ウェンディ！？"
translation = "옮았어, 웬디!?"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「うつりもしますよ！\u3000あなた、光の魔女に何てことを教えてるんですか──！？」"
translation = "「옮기도 하죠! 당신, 빛의 마녀에게 대체 뭘 가르치고 있는 건가요──!?」"

[[dialogue]]
speaker = "unk"
original = "教えたの、俺じゃないって！！"
translation = "가르친 거, 내가 아니라고!!"

[[dialogue]]
speaker = "unk"
original = "シュティレはお笑い番組も好き。その事実を知れたのは良かったのだけど……"
translation = "슈틸레는 개그 프로그램도 좋아한다. 그 사실을 알게 된 것은 좋았지만……"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「ぶい。広がるツッコミの輪」"
translation = "「V. 퍼져나가는 츳코미의 고리」"

[[dialogue]]
speaker = "unk"
original = "マイペースすぎるシュティレの影響で、トリュファイナさんがツッコミの技術を習得してしまうのだった……"
translation = "너무 마이페이스인 슈틸레의 영향으로, 트류파이나 씨가 츳코미 기술을 습득하고 마는 것이었다……"

