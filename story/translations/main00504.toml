[[dialogue]]
speaker = "unk"
original = "第６話,魔王の因子,B"
translation = "제6화, 마왕의 인자, B"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「ウ……ヅヅ……ググ……！」"
translation = "「우…… 즈즈…… 끄윽……!」"

[[dialogue]]
speaker = "unk"
original = "戦闘終了──"
translation = "전투 종료──"

[[dialogue]]
speaker = "unk"
original = "暴走していた堕天使の勢いは収まり、その場にうずくまる。"
translation = "폭주하던 타락천사의 기세는 잦아들고, 그 자리에 웅크린다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「解放できた……かしら……？」"
translation = "「해방된 건가……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「恐らく……？」"
translation = "「아마도……?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「──まだです！」"
translation = "「──아직입니다!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「──っ！？」"
translation = "「──읏!?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「召喚陣展開……！」"
translation = "「소환진 전개……!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「エクリプスディザスター──！」"
translation = "「이클립스 디재스터──!」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「──づぅぅっ！？」"
translation = "「──즈으윽!?」"

[[dialogue]]
speaker = "unk"
original = "とどめとばかりに放たれた熱線が、今度こそ堕天使を鎮静した。"
translation = "마무리 일격인 양 내뿜어진 열선이, 이번에야말로 타락천사를 진정시켰다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あ……ありがとう……フィオナ……」"
translation = "「아…… 고마워…… 피오나……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……今のは本気でやばかったな。助かった」"
translation = "「……방금 건 진짜 위험했어. 살았다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「いえ。強いて言うなら──ふふ、<ruby>殿<rt>しんがり</rt></ruby>を任されたおかげでしょうか」"
translation = "「아닙니다. 굳이 말하자면── 후후, 후위를 맡겨주신 덕분일까요」"

[[dialogue]]
speaker = "unk"
original = "やはり、フィオナの冷静沈着さは俺たちにないものだ。誰よりも周りが見えている。"
translation = "역시, 피오나의 냉정침착함은 우리에게 없는 것이다. 누구보다 주변을 잘 살피고 있다."

[[dialogue]]
speaker = "unk"
original = "彼女は謙遜して微笑みつつも……まだ警戒を解くことはなかった。"
translation = "그녀는 겸손하게 미소 지으면서도…… 아직 경계를 풀지 않았다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「なるほど……つまり、チームワークの勝利ね！」"
translation = "「과연…… 즉, 팀워크의 승리네!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「都合よくまとめすぎじゃないか？」"
translation = "「너무 자기 편한 대로 정리하는 거 아니야?」"

[[dialogue]]
speaker = "unk"
original = "しかし……"
translation = "하지만……"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「ユル……セヌ……人間、デスラ、ナイ者……ググ……！」"
translation = "「용……서할…… 수 없…… 인간, 조차, 아닌 자…… 끄윽……!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「まだ瘴気に捕われているよう……危険です！」"
translation = "「아직 장기에 사로잡혀 있는 듯…… 위험합니다!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「まだ、足りないか……！」"
translation = "「아직, 부족한가……!」"

[[dialogue]]
speaker = "unk"
original = "解放どころかますます膨れ上がる堕天使の瘴気。"
translation = "해방은커녕 더욱더 부풀어 오르는 타락천사의 장기."

[[dialogue]]
speaker = "unk"
original = "彼女を守護天使に戻すには、今以上の力をぶつけないと……！"
translation = "그녀를 수호 천사로 되돌리려면, 지금 이상의 힘을 부딪쳐야 한다……!"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「消エロ……全員、コノママ、滅ボシ尽クシテ……！！」"
translation = "「사라져라…… 전원, 이대로, 모조리 멸망시켜서……!!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「まずいわね。クロト、フィオナ、私の後ろに下がって──」"
translation = "「위험하네. 쿠로토, 피오나, 내 뒤로 물러서──」"

[[dialogue]]
speaker = "unk"
original = "しかし、その刹那。"
translation = "하지만, 그 찰나."

[[dialogue]]
speaker = "unk"
original = "『どいて……アルモタヘル』"
translation = "『비켜…… 아르모타헬』"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「ン……？\u3000グアアッ！？」"
translation = "「응……? 크아앗!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「な──！？」"
translation = "「뭐──!?」"

[[dialogue]]
speaker = "unk"
original = "どこからか振るわれた光の柱が、薙ぎ払うようにして守護天使を放逐する。"
translation = "어디선가 휘둘러진 빛의 기둥이, 쓸어내듯이 수호 천사를 내쫓는다."

[[dialogue]]
speaker = "unk"
original = "凄まじい衝撃に叩きつけられた彼女は、そのままこのフロアからも姿を消してしまった。"
translation = "엄청난 충격에 내동댕이쳐진 그녀는, 그대로 이 층에서도 모습을 감춰버렸다."

[[dialogue]]
speaker = "unk"
original = "そして……"
translation = "그리고……"

[[dialogue]]
speaker = "unk"
original = "『よく……来てくれました……ヴィーナス』"
translation = "『잘…… 와주었습니다…… 비너스』"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「この、声は……」"
translation = "「이, 목소리는……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「私を呼んでた……！」"
translation = "「나를 불렀어……!」"

[[dialogue]]
speaker = "unk"
original = "誰もいないはずの空間に女性の声が木霊する。"
translation = "아무도 없을 공간에 여성의 목소리가 메아리친다."

[[dialogue]]
speaker = "unk"
original = "先ほどまでの一触即発の剣呑さは、その登場によって拭い去られてしまっていた。"
translation = "방금 전까지의 일촉즉발의 위험함은, 그 등장으로 인해 씻은 듯 사라져 버렸다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "（第七階層──第八階層──いや、ともすればそれよりさらに上……）"
translation = "（제7계층── 제8계층── 아니, 어쩌면 그보다 더 위……）"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「一階層の時も、聞こえてたわよね。あなたは……あなたは誰なの！？」"
translation = "「1계층 때도, 들렸었지. 당신은…… 당신은 누구야!?」"

[[dialogue]]
speaker = "unk"
original = "虚空に向かって叫ぶヴィーナス。"
translation = "허공을 향해 외치는 비너스."

[[dialogue]]
speaker = "unk"
original = "その聖なる存在は、どこで聞いているのかゆっくりと答え始めた。"
translation = "그 성스러운 존재는, 어디서 듣고 있는지 천천히 대답하기 시작했다."

[[dialogue]]
speaker = "unk"
original = "『答えられません……今の私は、名すらも奪われていますから』"
translation = "『대답할 수 없습니다…… 지금의 저는, 이름조차도 빼앗겼으니까요』"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「な、名前も言えないの……！？」"
translation = "「이, 이름도 말 못 하는 거야……!?」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスもまた声の正体を判じかねている様子。"
translation = "비너스 또한 목소리의 정체를 판단하지 못하는 모양새다."

[[dialogue]]
speaker = "unk"
original = "だが、彼女だけが特別扱いされているのはこれまでの体験からも明白だった。"
translation = "하지만, 그녀만이 특별 대우를 받고 있다는 것은 지금까지의 경험으로도 명백했다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（マグダレナさんたち守護天使はフィーニスの塔を守るもの──彼女たちの主は流星教皇庁も崇める女神テルル……）"
translation = "（막달레나 씨 같은 수호 천사들은 피니스의 탑을 지키는 존재── 그들의 주인은 유성 교황청도 숭배하는 여신 테루루……）"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（ん……？\u3000なら待て──この声は、女神様本人の可能性もあるってことか……！？）"
translation = "（응……? 그럼 잠깐── 이 목소리는, 여신님 본인일 가능성도 있다는 건가……!?）"

[[dialogue]]
speaker = "unk"
original = "女神テルル。"
translation = "여신 테루루."

[[dialogue]]
speaker = "unk"
original = "その御名は三界の創造主にして、生きとし生ける者の守護者である。"
translation = "그 존함은 삼계의 창조주이자, 살아 있는 모든 것의 수호자이다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（話が飛躍しすぎた──だが、どこまでが真実だ）"
translation = "（이야기가 너무 비약했다── 하지만, 어디까지가 진실이지）"

[[dialogue]]
speaker = "unk"
original = "マグダレナさんの語っていた情報に嘘はなかった──ように思う。"
translation = "막달레나 씨가 말했던 정보에 거짓은 없었다──고 생각한다."

[[dialogue]]
speaker = "unk"
original = "騙す意味がないし、騙すとすればもっとマシな過程をでっち上げるだろう。"
translation = "속일 의미가 없고, 속인다면 더 나은 과정을 꾸며냈을 것이다."

[[dialogue]]
speaker = "unk"
original = "その上で、彼女らよりさらに上位の存在が、わざわざヴィーナスを手招きしている意味とはなんだ。"
translation = "게다가, 그녀들보다 더욱 상위의 존재가, 일부러 비너스를 손짓해 부르는 의미는 무엇인가."

[[dialogue]]
speaker = "unk"
original = "なぜ俺たちを導くのか。鍵は、そこに秘められているように思えた。"
translation = "왜 우리를 인도하는가. 열쇠는, 그곳에 숨겨져 있는 것처럼 보였다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（だからと言って……女神様のお告げが聞こえて、なんて、鵜呑みにするのも危険だ。今は保留としよう）"
translation = "（그렇다고 해서…… 여신님의 계시가 들린다니, 곧이곧대로 믿는 것도 위험하다. 지금은 보류하자）"

[[dialogue]]
speaker = "unk"
original = "この声の主から正体が語られたとてそれが真実とは限らない。"
translation = "이 목소리의 주인이 정체를 밝혔다고 해도 그것이 진실이라고는 할 수 없다."

[[dialogue]]
speaker = "unk"
original = "今の俺にできるのは、この機会に多くの情報を得ることだ。"
translation = "지금 내가 할 수 있는 것은, 이 기회에 많은 정보를 얻는 것이다."

[[dialogue]]
speaker = "unk"
original = "この声と会話ができるのはヴィーナスだけ──今は２人のやり取りを傾聴しよう。"
translation = "이 목소리와 대화할 수 있는 것은 비너스뿐── 지금은 두 사람의 대화를 경청하자."

[[dialogue]]
speaker = "unk"
original = "『リクリエがどういうものか。きっと理解してもらえたでしょう』"
translation = "『리크리에가 어떤 것인지. 분명 이해했을 것입니다』"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……！\u3000そうね──それについては、よくわかったわ！」"
translation = "「……! 그렇네── 그것에 대해서는, 잘 알았어!」"

[[dialogue]]
speaker = "unk"
original = "『よい子です、ヴィーナス。ならば今、世界に訪れている事象も把握したはず』"
translation = "『착한 아이입니다, 비너스. 그렇다면 지금, 세계에 닥친 사상도 파악했을 터』"

[[dialogue]]
speaker = "unk"
original = "『此度のリクリエは一度阻止され、変異したものであり』"
translation = "『이번 리크리에는 한 번 저지당하고, 변이한 것이며』"

[[dialogue]]
speaker = "unk"
original = "『もし、二度目の制覇を願うのなら──最強の魔王が必要なのです』"
translation = "『만약, 두 번째 제패를 바란다면── 최강의 마왕이 필요한 것입니다』"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "unk"
original = "俺たち全員が身構えた。"
translation = "우리 전원이 자세를 취했다."

[[dialogue]]
speaker = "unk"
original = "最強の魔王……寓話めいたその言葉に、今は不思議と実感がこもる。"
translation = "최강의 마왕…… 우화 같은 그 말에, 지금은 신기하게도 실감이 담긴다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「や……やっぱりそうよね！\u3000うん！\u3000私も、それしかないと思ってクロトを頼っていたんだもの！」"
translation = "「여…… 역시 그렇지! 응! 나도, 그것밖에 없다고 생각해서 쿠로토를 의지하고 있었는걸!」"

[[dialogue]]
speaker = "unk"
original = "俺たちの視線は、自然と『月の壁画』へと集まっていく。"
translation = "우리들의 시선은, 자연스레 『달의 벽화』로 모여든다."

[[dialogue]]
speaker = "unk"
original = "『壁画に描かれた前回のリクリエから３０００年の時が経ちました。その間に魔王の血統は分かれ、三界すべてにその<ruby>後裔<rt>こうえい</rt></ruby>が散っている状態』"
translation = "『벽화에 그려진 지난번 리크리에로부터 3000년의 시간이 흘렀습니다. 그 사이에 마왕의 혈통은 나뉘어, 삼계 모두에 그 후예가 흩어져 있는 상태』"

[[dialogue]]
speaker = "unk"
original = "『三界それぞれに一人ずつ、適合率の極めて高い正統なる魔王の因子が存在します』"
translation = "『삼계 각각에 한 명씩, 적합률이 극히 높은 정통 마왕의 인자가 존재합니다』"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「正統なる魔王の因子……！」"
translation = "「정통 마왕의 인자……!」"

[[dialogue]]
speaker = "unk"
original = "『魔界の皇妃──<ruby>煌嶺<rt>コウレイ</rt></ruby>。彼女は頽廃都市キュリオスを統べ、人のみならずアステラ由来のモンスターをも従えています』"
translation = "『마계의 황비── 코우레이. 그녀는 퇴폐 도시 큐리오스를 통솔하며, 사람뿐만 아니라 아스테라 유래의 몬스터까지도 복종시키고 있습니다』"

[[dialogue]]
speaker = "unk"
original = "１人目。無論、聞いたことのない名だ。"
translation = "첫 번째 사람. 물론, 들어본 적 없는 이름이다."

[[dialogue]]
speaker = "unk"
original = "『天界の天使──リガルタ。聖庭園の長老として知られる彼ですが、魔王の血であることは古くより悟られぬよう暮らしているようです』"
translation = "『천계의 천사── 리가르타. 성 정원의 장로로 알려진 그이지만, 마왕의 피라는 사실은 예로부터 깨닫지 못하도록 살고 있는 듯합니다』"

[[dialogue]]
speaker = "unk"
original = "２人目。俺たちは天界に縁がないため、こちらも知らない。"
translation = "두 번째 사람. 우리는 천계와 인연이 없기에, 이쪽도 모른다."

[[dialogue]]
speaker = "unk"
original = "『そして……最も色濃く魔王の血を引く人物。それは今、人間界に存在します』"
translation = "『그리고…… 가장 짙게 마왕의 피를 이어받은 인물. 그것은 지금, 인간계에 존재합니다』"

[[dialogue]]
speaker = "unk"
original = "だが、３人目は──"
translation = "하지만, 세 번째 사람은──"

[[dialogue]]
speaker = "unk"
original = "『流星市国の娘──星見フィオナ』"
translation = "『유성 시국의 딸── 호시미 피오나』"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「！！」"
translation = "「!!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「へ……クロトじゃなくて！？」"
translation = "「헤…… 쿠로토가 아니고!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「フィオナが……？」"
translation = "「피오나가……?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「えーっとえーっとちょっと待ってね……頭が混乱してるんだ私……つまり……その」"
translation = "「에ー또 에ー또 잠깐만 기다려봐…… 머리가 혼란스러워 나…… 그러니까…… 그게」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「フィオナも魔王だった……ってこと！？」"
translation = "「피오나도 마왕이었다……는 거야!?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「家では、そう伝えられてきました。それがための……『月の壁画』です」"
translation = "「집에서는, 그렇게 전해져 왔습니다. 그것을 위한…… 『달의 벽화』입니다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「フィオナの家には……この絵がそのままあるんだったか」"
translation = "「피오나의 집에는…… 이 그림이 그대로 있었던 건가」"

[[dialogue]]
speaker = "unk"
original = "魔王というワードに彼女が反応する理由もわかった。これ以上なく簡潔だった。"
translation = "마왕이라는 단어에 그녀가 반응하는 이유도 알았다. 더할 나위 없이 간결했다."

[[dialogue]]
speaker = "unk"
original = "星見家とは──リクリエから世界を救った、魔王の血統なのだ。"
translation = "호시미 가문이란── 리크리에로부터 세계를 구한, 마왕의 혈통인 것이다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「で、でもでもだとしたらここに描かれてるクロトは何なの！？\u3000そっくりさんだとしても──」"
translation = "「그, 그래도 그래도 그렇다면 여기에 그려져 있는 쿠로토는 뭐야!? 닮은 사람이라고 해도──」"

[[dialogue]]
speaker = "unk"
original = "『私に言えるのはここまでです。ここから先は──次の階層にて知るべきこと』"
translation = "『제가 말할 수 있는 것은 여기까지입니다. 여기서부터는── 다음 계층에서 알아야 할 일』"

[[dialogue]]
speaker = "unk"
original = "『ですが、まずは塔の外にリクリエの使徒お目見えです──彼女を退け、運命を切り開かんことを祈っています』"
translation = "『하지만, 우선은 탑 밖에 리크리에의 사도가 나타났습니다── 그녀를 물리치고, 운명을 개척하기를 기도하고 있습니다』"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「リクリエの使徒って……？\u3000え、待っ──」"
translation = "「리크리에의 사도라니……? 엣, 잠깐──」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスが手を伸ばすも意味はなく。"
translation = "비너스가 손을 뻗지만 의미는 없었다."

[[dialogue]]
speaker = "unk"
original = "荘厳なる女性の声は、その存在感と共に儚く消えてしまった。"
translation = "장엄한 여성의 목소리는, 그 존재감과 함께 덧없이 사라져 버렸다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「い、いっちゃった……もう！\u3000この塔に来るとわかることもわかんないことも多すぎ！」"
translation = "「가, 가버렸어…… 정말! 이 탑에 오면 알 수 있는 것도 알 수 없는 것도 너무 많아!」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスの気持ちは非常によくわかる。"
translation = "비너스의 마음은 매우 잘 알겠다."

[[dialogue]]
speaker = "unk"
original = "とにかく今回は、頭がパンクしそうなほど情報を詰め込まれた気分だ。"
translation = "어쨌든 이번에는, 머리가 터질 것 같을 정도로 정보를 채워 넣은 기분이다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「っとと……地震？」"
translation = "「엇차…… 지진?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……ここまでのようですね。追い出されます」"
translation = "「……여기까지인 것 같네요. 쫓겨납니다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ちょうどいい。何やら外で起こるみたいなことも言ってたしな」"
translation = "「마침 잘 됐다. 뭔가 밖에서 일어날 것 같은 이야기도 했고 말이야」"

[[dialogue]]
speaker = "unk"
original = "続けて第三階層──とはならず。"
translation = "이어서 제3계층──은 되지 못하고."

[[dialogue]]
speaker = "unk"
original = "俺たちは招かれた時と同様に、フィーニスの塔から一方的に追放された。"
translation = "우리들은 초대받았을 때와 마찬가지로, 피니스의 탑에서 일방적으로 추방당했다."

