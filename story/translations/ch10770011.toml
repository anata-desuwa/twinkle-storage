[[dialogue]]
speaker = "unk"
original = "第１話,２人のメイド長,P"
translation = "제1화, 두 명의 메이드장, P"

[[dialogue]]
speaker = "unk"
original = "バレンタインが過ぎてしばらく経った、ある日の昼休み。カフェテリアに行くと、２人のメイドが一緒に昼食をしているのを見かけた。"
translation = "발렌타인이 지나고 한참 후, 어느 날 점심시간. 카페테리아에 가자, 두 명의 메이드가 함께 점심 식사를 하는 것을 보았다."

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「あら、会長。ごきげんよう。貴方も昼食かしら？」"
translation = "「어머, 회장. 잘 지냈어? 당신도 점심 식사하러 온 거야?」"

[[dialogue]]
speaker = "unk"
original = "彼女は『<ruby>羽宮<rt>はねみや</rt></ruby>\u3000<ruby>蘭美<rt>らび</rt></ruby>』。九浄家メイド隊の中でも最年少でありながら、卓越したメイドスキルによってメイド長を務める天才少女である。"
translation = "그녀는 『하네미야 라비』. 쿠죠 가문 메이드대 중에서도 최연소이면서도, 탁월한 메이드 스킬로 메이드장을 맡은 천재 소녀이다."

[[dialogue]]
speaker = "unk"
original = "星騎士としても優れた才能を持ち、本来なら流星学園附属校の２年生に当たる年齢だが、特別に飛び級を認められ、現在は新星学園３年生のクラスに所属している。"
translation = "성기사로서도 뛰어난 재능을 지녔으며, 본래라면 유성 학원 부속교 2학년에 해당하는 나이지만, 특별히 월반을 인정받아 현재는 신성 학원 3학년 클래스에 소속되어 있다."

[[dialogue]]
speaker = "unk"
original = "彼女とは、この前のバレンタインの出来事で親交を深め、最近はよく顔を合わせるようになった。"
translation = "그녀와는 지난 발렌타인 사건으로 친분을 쌓았고, 최근에는 자주 얼굴을 마주하게 되었다."

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「お昼を食べにきたのなら、同席してもいいわよ。――会長は貴方の弟子だそうだし、構わないわよね？\u3000<ruby>上月<rt>こうづき</rt></ruby>キリカ」"
translation = "「점심을 먹으러 온 거라면, 같이 앉아도 괜찮아.――회장은 당신의 제자라고 하니, 상관없지? 카미즈키 키리카」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「はい、私は構いません。ごきげんよう、緋宮会長。よろしければ、こちらの席にどうぞ」"
translation = "「네, 저는 상관없습니다. 안녕하십니까, 히노미야 회장. 괜찮으시다면, 이쪽 자리에 앉으십시오」"

[[dialogue]]
speaker = "unk"
original = "ありがとうございます、師匠"
translation = "「감사합니다, 사부님」"

[[dialogue]]
speaker = "unk"
original = "上月キリカ師匠は、星見家メイド隊のメイド長だ。俺は彼女に弟子入りをして、定期的に格闘術を指導してもらっていた。"
translation = "카미즈키 키리카 사부님은 호시미 가문 메이드대의 메이드장이다. 나는 그녀에게 제자 입문을 하여, 정기적으로 격투술 지도를 받고 있었다."

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ふふっ、会長、この飛び級天才美少女である私と同席できること、光栄に思いなさい♪」"
translation = "「후훗, 회장, 이 월반 천재 미소녀인 나와 동석할 수 있다는 것을 영광으로 생각하도록 해♪」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「って、どうしたの？\u3000――私と上月キリカが同席していることが意外？」"
translation = "「근데, 왜 그래? ――나와 카미즈키 키리카가 동석하고 있는 게 의외야?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「なるほど。確かに、九浄家メイド隊と星見家メイド隊のメンバーは、お互いに対抗心を見せていたりするしね」"
translation = "「과연. 확실히, 쿠죠 가문 메이드대와 호시미 가문 메이드대 멤버들은 서로 대항심을 보이기도 하니까」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「……元はと言えば、羽宮様が私をライバル視していることが原因で、関係がこじれ始めた感じがしますが」"
translation = "「……원래대로라면, 하네미야 님께서 저를 라이벌로 여기는 것이 원인으로, 관계가 꼬이기 시작한 느낌이 듭니다만」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「まあ、私が上月キリカに対抗心を燃やしているのは、その通りよ。会長には前に、『メイド・オブ・メイド』の話をしたでしょう？」"
translation = "「뭐, 내가 카미즈키 키리카에게 대항심을 불태우고 있는 건, 그 말대로야. 회장에게는 전에, 『메이드・오브・메이드』 이야기를 했었지?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「そう、通称『<ruby>M<rt>エム</rt></ruby>・<ruby>Ｏ<rt>オー</rt></ruby>・<ruby>Ｍ<rt>エム</rt></ruby>』。３年に１度開催されて、メイドスキルを競う世界大会のことよ」"
translation = "「그래, 통칭 『M・O・M』. 3년에 한 번 개최되어, 메이드 스킬을 겨루는 세계 대회 말이야」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「私は２年前、そこで歴代最年少の記録で、世界第２位の座を手に入れたわ。そして――」"
translation = "「나는 2년 전, 거기서 역대 최연소 기록으로, 세계 2위 자리를 차지했어. 그리고――」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「その時に優勝して、世界第１位のメイド、『マスターメイド』の称号を手に入れたのが、上月キリカなのよ」"
translation = "「그때 우승해서, 세계 1위 메이드, 『마스터 메이드』 칭호를 손에 넣은 게, 카미즈키 키리카인 거지」"

[[dialogue]]
speaker = "unk"
original = "そうだったのか……！"
translation = "그랬던 건가……!"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「わざわざ自分が世界第１位だと、言いふらして回ることでもないので……」"
translation = "「굳이 자신이 세계 1위라고, 떠벌리고 다닐 일도 아니기에……」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「あら、肩書きを隠さず名乗ることも、一種の礼儀じゃないかしら？」"
translation = "「어머, 직함을 숨기지 않고 밝히는 것도, 일종의 예의가 아닐까?」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「私には星見家のメイド長という肩書きがありますから。それさえあれば、十分です」"
translation = "「저에게는 호시미 가문의 메이드장이라는 직함이 있으니까요. 그것만 있으면, 충분합니다」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「真面目ね。でも、メイド・オブ・メイドには出場していたじゃない」"
translation = "「진지하네. 하지만, 메이드・오브・메이드에는 출전했잖아」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「それは、星見家メイド隊の伝統のようなものです。メイド長は代々、メイド・オブ・メイドに出場してきましたから」"
translation = "「그것은, 호시미 가문 메이드대의 전통과 같은 것입니다. 메이드장은 대대로, 메이드・오브・메이드에 출전해 왔으니까요」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ふふっ、伝統だから、ね。私の実家のメイド長も、最初はそうだったって言っていたわ」"
translation = "「후훗, 전통이라서, 라. 우리 집안의 메이드장도, 처음엔 그랬다고 말했었어」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「あの人が……？」"
translation = "「그분이……?」"

[[dialogue]]
speaker = "unk"
original = "蘭美の実家のメイド長って……？"
translation = "라비의 집안 메이드장이라니……?"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「上月キリカも面識がある人よ。なにせ、その人は、星見家の２代前のメイド長を務めていたんだもの」"
translation = "「카미즈키 키리카도 면식이 있는 사람이야. 왜냐하면, 그분은, 호시미 가문의 2대 전 메이드장을 맡고 있었으니까」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「先代がマリオンさんで、それより更に前……私が幼い頃に、メイドとしての指導をして下さった方です」"
translation = "「선대가 마리온 씨이고, 그보다 더 이전……제가 어릴 적에, 메이드로서의 지도를 해 주신 분입니다」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「私も実家でその人に弟子入りして、鍛えてもらったのよ」"
translation = "「나도 집안에서 그분에게 제자 입문해서, 단련 받았어」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「メイド長は、かつてメイド・オブ・メイドで３回連続優勝を果たして殿堂入りし、『グランドマスターメイド』の称号を持つに至った、正真正銘、世界最高のメイドなの」"
translation = "「메이드장은, 예전에 메이드・오브・메이드에서 3회 연속 우승을 달성하고 명예의 전당에 올라, 『그랜드 마스터 메이드』 칭호를 얻기에 이른, 명실상부, 세계 최고의 메이드인 거지」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「彼女は、世界トップレベルのメイドたちと切磋琢磨する中で、世界一であることに誇りを持つようになったと言っていたわ」"
translation = "「그분은, 세계 최고 수준의 메이드들과 서로 경쟁하는 가운데, 세계 제일이라는 것에 자부심을 가지게 되었다고 말했었어」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「だから、次の大会では……」"
translation = "「그러니까, 다음 대회에서는……」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「この私が、上月キリカ――貴方を負かして、『悔しいから次も出場する』って必ず言わせてあげるわ！」"
translation = "「바로 이 내가, 카미즈키 키리카――당신을 꺾고, 『분하니까 다음에도 출전하겠다』고 반드시 말하게 해 줄 거야!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「というか、私が年上の貴方に対して、ライバルとしてタメ口で話しているんだから、そろそろ貴方も、敬語は止めてくれてもいいと思うんだけど？」"
translation = "「그나저나, 내가 연상인 당신에게, 라이벌로서 말을 놓고 있으니, 슬슬 당신도, 존댓말은 그만둬 줘도 좋다고 생각하는데?」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「羽宮様は対等な相手ですから」"
translation = "「하네미야 님은 대등한 상대이시니까요」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「私は同じメイド長として、礼節を持って接しているだけです」"
translation = "「저는 같은 메이드장으로서, 예의를 갖춰 대하고 있을 뿐입니다」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「……！\u3000言うじゃない。対等ね……ふふっ。真面目な貴方らしいけれど……」"
translation = "「……! 말하네. 대등이라……후훗. 진지한 당신답지만……」"

[[dialogue]]
speaker = "unk"
original = "と、そこで俺はふと気づく。"
translation = "하고, 거기서 나는 문득 깨닫는다."

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ん？\u3000なにかしら、会長？」"
translation = "「응? 뭐야, 회장?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「――私と上月キリカが、同じ人から学んだ？\u3000ええ、そうね。実家のメイド長に……」"
translation = "「――나와 카미즈키 키리카가, 같은 사람에게 배웠다고? 응, 그렇지. 집안의 메이드장에게……」"

[[dialogue]]
speaker = "unk"
original = "それって、姉妹弟子ってことじゃない？"
translation = "그거, 자매 제자라는 거 아니야?"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「あ……言われてみれば……！」"
translation = "「아…… 듣고 보니……!」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「妹弟子……。ふっ……ふふっ……」"
translation = "「여동생 제자……. 훗…… 후훗……」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「な、なに？\u3000貴方がそんな笑い方するの、初めてみたわ」"
translation = "「뭐, 뭐야? 당신이 그렇게 웃는 거, 처음 봤어」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「いえ、すみません。こうして指摘されるまで、全く気づいていなかったことに面白くなってしまって……」"
translation = "「아뇨, 죄송합니다. 이렇게 지적받을 때까지, 전혀 깨닫지 못했다는 것이 재미있어서……」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「同門で、妹弟子ならそうですね。これからはもう少し仲良くしましょう、<b>蘭美</b>」"
translation = "「같은 문하생이고, 여동생 제자라면 그렇겠네요. 이제부터는 조금 더 사이좋게 지냅시다, 라비」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「……！\u3000な、なによ、急に……言っとくけど、姉弟子でもライバルなのは忘れないでよね、<b>キリカ</b>」"
translation = "「……! 뭐, 뭐야, 갑자기……. 말해두지만, 언니 제자라도 라이벌이라는 건 잊지 말아 줘, 키리카」"

[[dialogue]]
speaker = "unk"
original = "蘭美はちょっと照れ臭そうな顔をしながらも、下の名前で呼び返すのだった――"
translation = "라비는 조금 쑥스러운 얼굴을 하면서도, 이름으로 되받아 부르는 것이었다――"

