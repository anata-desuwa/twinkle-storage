[[dialogue]]
speaker = "unk"
original = "第４話,ノルトハウゼンの決意,P"
translation = "제4화, 노르트하우젠의 결의, P"

[[dialogue]]
speaker = "リーリア"
original = "「せんぱーい♪\u3000掲示板の書き込み、見ましたよ～」"
translation = "「선배님~♪ 게시판 글 봤어요~」"

[[dialogue]]
speaker = "リーリア"
original = "「実はですね～、センパイたちが捜してる異世界から来た魔法使いさんのコト、ネビュラで保護してるんですよ～。どうです、助かっちゃいますか？」"
translation = "「실은 말이죠~, 선배님들이 찾고 계신 이세계에서 온 마법사 언니, 네뷸라에서 보호하고 있거든요~. 어때요, 도움이 좀 되시나용?」"

[[dialogue]]
speaker = "unk"
original = "ノルトハウゼンがネビュラの基地に保護されてしばらくの時間が経った後──"
translation = "노르트하우젠이 네뷸라 기지에 보호되고 얼마간의 시간이 흐른 뒤──"

[[dialogue]]
speaker = "unk"
original = "おもむろに学園の掲示板を見たリーリアが、その書き込みに気付いた。"
translation = "문득 학원 게시판을 본 리리아가 그 글을 발견했다."

[[dialogue]]
speaker = "unk"
original = "どうやら新星学園の星徒会長である緋宮クロトと、流星学園の星徒会長である星見フィオナが、ノルトハウゼンのことを捜しているようだった。"
translation = "아무래도 신성 학원의 성도회장인 히노미야 쿠로토와 유성 학원의 성도회장인 호시미 피오나가 노르트하우젠을 찾고 있는 듯했다."

[[dialogue]]
speaker = "リーリア"
original = "「どうやらノルトハウゼンさんをこの世界に呼んだ相手もいるっぽいですね～」"
translation = "「아무래도 노르트하우젠 씨를 이 세계로 부른 상대도 있는 모양이네요~」"

[[dialogue]]
speaker = "リーリア"
original = "「しばらくしたらお迎えが来ると思いますよ。元の世界にも帰してもらえるんじゃないかと思います！」"
translation = "「조금 있으면 데리러 올 것 같아요. 원래 세계로도 보내줄 수 있지 않을까 싶네요!」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「そうですか、ありがとうございます」"
translation = "「그렇군요, 감사합니다」"

[[dialogue]]
speaker = "unk"
original = "程なくして、クロトたち一行がノルトハウゼンを迎えにやってくる。"
translation = "머지않아 쿠로토 일행이 노르트하우젠을 데리러 찾아왔다."

[[dialogue]]
speaker = "unk"
original = "何故こんなことになってしまったのかという理由も説明されたが、クロトたちも事態を完全に把握しているわけではなさそうだった。"
translation = "왜 이런 일이 벌어졌는지에 대한 이유도 설명되었지만, 쿠로토 일행도 사태를 완전히 파악하고 있는 것은 아닌 듯했다."

[[dialogue]]
speaker = "ベア子"
original = "「無事に見つかったみたいですね。よかったくま……」"
translation = "「무사히 찾은 것 같네. 다행이다곰……」"

[[dialogue]]
speaker = "黒ベア子"
original = "「まったく、待たせすぎくま！\u3000急いで次の世界に向かうくま！」"
translation = "「정말이지, 너무 기다리게 했다곰! 서둘러 다음 세계로 향한다곰!」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「あの……こちらの方々は……？」"
translation = "「저기…… 이분들은……?」"

[[dialogue]]
speaker = "マハムート"
original = "「あなたをこの世界に呼び出した張本人よ。次に向かうイリスクラウドという世界の案内人をさせるつもりのようね」"
translation = "「너를 이 세계로 불러낸 장본인이야. 다음에 향할 이리스 클라우드라는 세계의 안내인을 시킬 생각인 것 같네」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「案内人……ですの？」"
translation = "「안내인…… 말인가요?」"

[[dialogue]]
speaker = "フィオナ"
original = "「この子は『赤ちゃんクマロボ』というんですけど、父親が誰か分からないんです」"
translation = "「이 아이는 『아기 곰 로봇』이라고 하는데요, 아빠가 누구인지 모른대요」"

[[dialogue]]
speaker = "フィオナ"
original = "「ですからベア子さんたちは、この子の父親を捜すために、過去に訪れたことのある世界を渡り歩いているんです」"
translation = "「그래서 베아코 씨 일행은 이 아이의 아빠를 찾기 위해 과거에 방문했던 적이 있는 세계를 돌아다니고 있어요」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「まあ……それは大変ですね」"
translation = "「어머…… 그건 고생이 많으시겠네요」"

[[dialogue]]
speaker = "黒ベア子"
original = "「この世界にもパパはいなかったくま！\u3000だから次はあんたの世界を捜すくま！\u3000そのための案内人くま！」"
translation = "「이 세계에도 아빠는 없었다곰! 그러니까 다음은 네 세계를 뒤질 거다곰! 그걸 위한 안내인이다곰!」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「事情は理解しましたわ。案内人のお役目、引き受けさせていただきます」"
translation = "「사정은 이해했습니다. 안내인 역할, 수락할게요」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「離れ離れではさぞ心細いことでしょう。一刻も早く、この子のお父さまを見つけてさしあげませんと！」"
translation = "「떨어져 있으면 무척 불안하겠죠. 한시라도 빨리 이 아이의 아버님을 찾아드려야겠어요!」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「もし悲しくて泣いてしまうことがありましたらドリームマジックを披露しますの。わたくしの魔法で必ず笑顔にして見せますわ」"
translation = "「혹시 슬퍼서 울게 된다면 드림 매직을 보여드릴게요. 저의 마법으로 반드시 웃게 해드릴게요」"

[[dialogue]]
speaker = "赤ちゃんクマロボ"
original = "「ばぶー<emoji=heart04>」"
translation = "「바부─<emoji=heart04>」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「よしよし、いい子ですわね～♪」"
translation = "「옳지 옳지, 착한 아이네요~♪」"

[[dialogue]]
speaker = "マハムート"
original = "「ところでずっと気になっていたのだけど、あなたはどうして新星学園の制服を着ているのかしら？」"
translation = "「그런데 계속 신경 쓰였는데, 당신은 왜 신성 학원의 교복을 입고 있는 거지?」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「あら、いけません。わたくしリーリアさんに制服をお借りしたままでしたわ」"
translation = "「어머, 이런. 제가 리리아 씨에게 교복을 빌린 채 그대로였네요」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「実はネビュラのみなさんから、ハルツの魔法を見せて欲しいといわれまして」"
translation = "「실은 네뷸라 분들께서 하르츠의 마법을 보고 싶다고 하셔서요」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「『虹を見たい』というリクエストにお応えしようとしたのですが、失敗してずぶ濡れになってしまったのですわ」"
translation = "「『무지개를 보고 싶다』는 요청에 응하려다 실패해서 흠뻑 젖어버렸거든요」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「その際に、リーリアさんが着替えとして予備の制服を貸してくださいまして」"
translation = "「그때 리리아 씨가 갈아입을 옷으로 예비 교복을 빌려주셨어요」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「服はすぐに乾かして頂いたのですが、あまりに着心地が良かったものですから、着替えるのを忘れてしまっていましたの」"
translation = "「옷은 금방 말려주셨는데, 너무 입기 편해서 갈아입는 걸 잊어버리고 있었네요」"

[[dialogue]]
speaker = "マハムート"
original = "「予備のものなら大丈夫よ。リーリアには私から言っておくから、記念にもらっておきなさい」"
translation = "「예비용이라면 괜찮아. 리리아에게는 내가 말해둘 테니 기념으로 가지도록 해」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「なんだか申し訳ありません……」"
translation = "「왠지 죄송하네요……」"

[[dialogue]]
speaker = "マハムート"
original = "「いいのよ。あなたの制服姿、よく似合っているわ」"
translation = "「괜찮아. 너의 교복 차림, 아주 잘 어울려」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「ふふっ、ありがとうございます」"
translation = "「후후, 감사합니다」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「ネビュラのみなさんには本当に良くしていただきました。きちんとお礼が出来なかったのが心残りです」"
translation = "「네뷸라 분들께는 정말 신세를 많이 졌어요. 제대로 감사를 드리지 못한 게 마음에 걸리네요」"

[[dialogue]]
speaker = "マハムート"
original = "「また何かの機会に、この世界へ来ることもあるでしょう。その時に思う存分、お礼を言えばいいわ」"
translation = "「또 어떤 기회에 이 세계에 올 일도 있겠지. 그때 마음껏 감사를 전하면 돼」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「そうですわね……はい、そういたしますわ」"
translation = "「그렇겠네요…… 네, 그렇게 할게요」"

[[dialogue]]
speaker = "unk"
original = "ノルトハウゼンは表情を明るくして頷く。"
translation = "노르트하우젠은 표정을 밝게 하며 고개를 끄덕인다."

[[dialogue]]
speaker = "unk"
original = "その後フィオナもイリスクラウドに同行することを決め、いよいよ転移が開始されることになった。"
translation = "그 후 피오나도 이리스 클라우드에 동행하기로 결정하고, 드디어 전이가 시작되게 되었다."

[[dialogue]]
speaker = "フィオナ"
original = "「必ず、この子の父親を見つけてあげましょう！」"
translation = "「반드시 이 아이의 아빠를 찾아주자!」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「ええ、必ず！」"
translation = "「네, 반드시요!」"

[[dialogue]]
speaker = "unk"
original = "決意を固めたノルトハウゼンとフィオナは、威勢よくイリスクラウドへと転移していくのであった。"
translation = "결의를 다진 노르트하우젠과 피오나는 씩씩하게 이리스 클라우드로 전이해 가는 것이었다."

