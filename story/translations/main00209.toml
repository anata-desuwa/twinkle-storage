[[dialogue]]
speaker = "unk"
original = "第１２話,ガーディアン,B"
translation = "제12화, 가디언, B"

[[dialogue]]
speaker = "不思議な機械？"
original = "「ピ……ピガ……ガガガガガガガ……プシュウ──────」"
translation = "「삐……삐가……가가가가가가가……푸슈우──────」"

[[dialogue]]
speaker = "unk"
original = "戦闘終了──"
translation = "전투 종료──"

[[dialogue]]
speaker = "unk"
original = "敵対していた奇妙な機械は、そのまま糸が切れたかのように停止した。"
translation = "적대하던 기묘한 기계는, 그대로 실이 끊어진 것처럼 정지했다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「楽勝、楽勝♪」"
translation = "「식은 죽 먹기, 식은 죽 먹기♪」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふふ。お陰さまですね」"
translation = "「후후. 덕분입니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「フィオナも、やるじゃない！\u3000召喚術が得意なのね」"
translation = "「피오나도, 제법이네! 소환술이 특기인 거구나」"

[[dialogue]]
speaker = "ニャリオン"
original = "「当然ニャン。ワガハイという偉大にして高位な使い魔を人間界に喚べるのはフィオナ嬢だけなのニャン！」"
translation = "「당연냥. 나라는 위대하고 고위한 사역마를 인간계에 소환할 수 있는 건 피오나 아가씨뿐이냥!」"

[[dialogue]]
speaker = "unk"
original = "太陽の星力──"
translation = "태양의 성력──"

[[dialogue]]
speaker = "unk"
original = "フィオナの振るっていた力は、眩しくも温かい華やかな術式だった。"
translation = "피오나가 휘두르던 힘은, 눈부시면서도 따뜻한 화려한 술식이었다."

[[dialogue]]
speaker = "クロト"
original = "「まぶしくて頼もしかったよ。フィオナはすごいな」"
translation = "「눈부시고 든든했어. 피오나는 대단하네」"

[[dialogue]]
speaker = "フィオナ"
original = "「とんでもありません。同じ星徒会長なのですから、対等に参りましょう」"
translation = "「별말씀을요. 같은 성도 회장이니, 대등하게 가시지요」"

[[dialogue]]
speaker = "クロト"
original = "「ありがたいが、歴で言えば俺がまだまだなのは確かだしな。それに……」"
translation = "「고맙지만, 경력으로 따지면 내가 아직 한참 멀었다는 건 확실하고. 게다가……」"

[[dialogue]]
speaker = "フィオナ"
original = "「それに？」"
translation = "「게다가?」"

[[dialogue]]
speaker = "クロト"
original = "「露出も多い」"
translation = "「노출도 많고」"

[[dialogue]]
speaker = "フィオナ"
original = "「ろっ……！？」"
translation = "「노……!?」"

[[dialogue]]
speaker = "unk"
original = "明らかに肌の面積が多かった。正直、目のやり場にこまる。"
translation = "확실히 피부 면적이 많았다. 솔직히, 시선을 둘 곳이 곤란하다."

[[dialogue]]
speaker = "フィオナ"
original = "「そっ……それはっ、私の守護星がたまたま──太陽だからであって」"
translation = "「그……그건! 제 수호성이 마침──태양이기 때문이고」"

[[dialogue]]
speaker = "フィオナ"
original = "「星力を行使するたびに多大な熱量が宿るので、戦闘服はそれに耐えられるようになっているんです！」"
translation = "「성력을 행사할 때마다 막대한 열량이 깃들기 때문에, 전투복은 그것을 견딜 수 있도록 되어 있는 겁니다!」"

[[dialogue]]
speaker = "クロト"
original = "「なるほど。そう合理的な理由があったとは知らなかった」"
translation = "「과연. 그렇게 합리적인 이유가 있었다니 몰랐네」"

[[dialogue]]
speaker = "フィオナ"
original = "「……かと言って、そうまじまじ見つめられては困るのですが……」"
translation = "「……그렇다고 해도, 그렇게 빤히 쳐다보시면 곤란합니다만……」"

[[dialogue]]
speaker = "ニャリオン"
original = "「（おたくの会長は精神攻撃が得意なのかニャン？）」"
translation = "「(댁네 회장은 정신 공격이 특기인 거냥?)」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「（ただの天然だから許して……）」"
translation = "「(그냥 천연이니까 용서해……)」"

[[dialogue]]
speaker = "クロト"
original = "「それに──キリカさんだって、やっぱり只者じゃなかった」"
translation = "「게다가──키리카 씨도, 역시 보통 사람이 아니었어」"

[[dialogue]]
speaker = "キリカ"
original = "「……私、ですか。それほどでは」"
translation = "「……저, 말입니까. 그 정도는」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「確かにアレは尋常じゃない<ruby>疾<rt>はや</rt></ruby>さだったわね！\u3000クロトも参考にできるんじゃない？」"
translation = "「확실히 그건 보통이 아닌 빠름이었지! 쿠로토도 참고할 수 있지 않아?」"

[[dialogue]]
speaker = "クロト"
original = "「ああ。俺も見習うべきところが沢山あった」"
translation = "「아아. 나도 본받아야 할 점이 많았어」"

[[dialogue]]
speaker = "unk"
original = "キリカさんの戦闘スタイルは意外と言うべきか拳闘だった。"
translation = "키리카 씨의 전투 스타일은 의외라고 해야 할까 권투였다."

[[dialogue]]
speaker = "unk"
original = "拳に紫電の星力をまとい、流麗に舞う身のこなしは武の達人を思わせる。"
translation = "주먹에 자줏빛 번개의 성력을 두르고, 유려하게 춤추는 몸놀림은 무술의 달인을 연상시킨다."

[[dialogue]]
speaker = "フィオナ"
original = "「キリカは武術の名門である、<ruby>上月<rt>こうづき</rt></ruby>の者ですから」"
translation = "「키리카는 무술의 명문인, 카미즈키의 사람이니까요」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あ、聞いたことある！\u3000上月家って、確か武術の名門よね──なんとか流っていう！」"
translation = "「아, 들어본 적 있어! 카미즈키 가문은, 분명 무술의 명문이지──뭐뭐 유파라는 거!」"

[[dialogue]]
speaker = "フィオナ"
original = "「ええ。上月神闘流──千年前に興った由緒ある武道で、血縁の者でも流派を継ぐことさえ難しいんですよ」"
translation = "「네. 카미즈키 신투류──천 년 전에 일어난 유서 깊은 무도로, 혈연자라도 유파를 잇기조차 어렵답니다」"

[[dialogue]]
speaker = "クロト"
original = "「なるほど。それに加えて星力のコントロールまで……」"
translation = "「과연. 거기에 더해 성력의 컨트롤까지……」"

[[dialogue]]
speaker = "キリカ"
original = "「恐縮です。ですが私は、お嬢様の盾となるべく立ち回っているに過ぎません」"
translation = "「황송합니다. 하지만 저는, 아가씨의 방패가 되기 위해 움직일 뿐입니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「もう。そうやって自分をないがしろにしないでください、キリカ」"
translation = "「정말. 그렇게 자신을 소홀히 하지 마세요, 키리카」"

[[dialogue]]
speaker = "unk"
original = "達人のような──ではなく、実際に達人だったようだ。"
translation = "달인 같은──이 아니라, 실제로 달인이었던 듯하다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「そんな人がどうしてメイドをやってるの？\u3000ていうか２人ってどういう関係？」"
translation = "「그런 사람이 왜 메이드를 하고 있는 거야? 그보다 두 사람 무슨 관계야?」"

[[dialogue]]
speaker = "キリカ"
original = "「主である星見家の護衛を務めるのも、上月の家の役割ですから。この武と私の役目は表裏一体なのです」"
translation = "「주인이신 호시미 가문의 호위를 맡는 것도, 카미즈키 가문의 역할이니까요. 이 무술과 저의 역할은 표리일체입니다」"

[[dialogue]]
speaker = "クロト"
original = "「家同士で主従関係にある……ってことか？\u3000なんか遠い世界の話みたいだ」"
translation = "「가문끼리 주종 관계에 있다……는 건가? 뭔가 먼 세계 이야기 같네」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「生まれた時からお姫様の剣と盾！\u3000いいわね、かっこいいわ」"
translation = "「태어날 때부터 공주님의 검과 방패! 좋네, 멋있어」"

[[dialogue]]
speaker = "キリカ"
original = "「九浄様のご実家にも、メイド部隊が組織されていたかと存じますが……」"
translation = "「쿠죠 님 댁에도, 메이드 부대가 조직되어 있었던 것으로 아옵니다만……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「いつの間にか私につくメイドはいなくなっちゃったのよねぇ」"
translation = "「어느새 나를 모시는 메이드는 없어졌단 말이지이」"

[[dialogue]]
speaker = "クロト"
original = "「振り回されすぎたんだろうな……」"
translation = "「너무 휘둘러서 그랬겠지……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「失礼ね。それでも私を陰から見守ってくれる子や、財布を忘れた時に届けてくれる子だっているわ！」"
translation = "「실례네. 그래도 나를 뒤에서 지켜봐 주는 아이나, 지갑을 잊었을 때 가져다주는 아이도 있다구!」"

[[dialogue]]
speaker = "クロト"
original = "「（やっぱり振り回してる……）」"
translation = "「(역시 휘두르고 있군……)」"

[[dialogue]]
speaker = "フィオナ"
original = "「キリカは家事から私の身の回りの世話まで、なんでも速やかに済ませてしまうんですよ。速いのは拳だけではないんです」"
translation = "「키리카는 집안일부터 제 주변의 시중까지, 뭐든지 신속하게 처리해 버린답니다. 빠른 건 주먹만이 아니에요」"

[[dialogue]]
speaker = "フィオナ"
original = "「なんて……ふふ。私がものぐさなのがバレてしまいますね」"
translation = "「이런…… 후후. 제가 게으르다는 것이 들통나 버리겠네요」"

[[dialogue]]
speaker = "キリカ"
original = "「何を仰いますか。なんでも一人でやり切ってしまいますのに」"
translation = "「무슨 말씀을 하십니까. 뭐든지 혼자서 해내시지 않습니까」"

[[dialogue]]
speaker = "クロト"
original = "「アナに仕事を任せっきりだったヴィーナスとはえらい違いだ……」"
translation = "「아나에게 일을 맡기기만 했던 비너스와는 엄청난 차이네……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「うっさいわね！\u3000あれは適材適所ってやつなのよ！」"
translation = "「시끄럽네! 그건 적재적소라는 거잖아!」"

[[dialogue]]
speaker = "キリカ"
original = "「私とお嬢様は生まれながらの付き合いですから。昔は私に甘えてくれることも多かったのですが……最近はすっかりご立派になられてしまい」"
translation = "「저와 아가씨는 태어날 때부터의 인연이니까요. 예전에는 저에게 응석을 부리는 일도 많았는데…… 최근에는 완전히 훌륭하게 성장하셔서」"

[[dialogue]]
speaker = "フィオナ"
original = "「も、もうっ。昔のことはいいでしょう、キリカ」"
translation = "「모, 모오! 옛날 일은 됐잖아, 키리카」"

[[dialogue]]
speaker = "unk"
original = "照れるフィオナに微笑むキリカさんを見ていると、２人の関係の深さがうかがえるようだった。"
translation = "부끄러워하는 피오나에게 미소 짓는 키리카 씨를 보고 있자니, 두 사람 관계의 깊이를 엿볼 수 있는 듯했다."

[[dialogue]]
speaker = "ニャリオン"
original = "「おい、オマエ！\u3000フィオナ嬢を語るニャら誰か忘れてないかニャン？」"
translation = "「어이, 너! 피오나 아가씨를 이야기하는 거냥 누가 빠진 거 아니냥?」"

[[dialogue]]
speaker = "クロト"
original = "「ああ。もちろん、ニャリオンもすごい」"
translation = "「아아. 물론, 냐리온도 대단해」"

[[dialogue]]
speaker = "ニャリオン"
original = "「ニャニャ！\u3000そうニャろうそうニャろう、聞いたかニャン？」"
translation = "「냐냐! 그렇냥 그렇냥, 들었냥?」"

[[dialogue]]
speaker = "キリカ"
original = "「幻聴ですよ」"
translation = "「환청입니다」"

[[dialogue]]
speaker = "ニャリオン"
original = "「幻聴などではないニャン！」"
translation = "「환청 따위가 아니냥!」"

[[dialogue]]
speaker = "クロト"
original = "「俺は使い魔なんて初めて見たけど……喋れるし戦えるなんてすごい猫だ」"
translation = "「나는 사역마는 처음 봤지만…… 말도 하고 싸울 수도 있다니 대단한 고양이네」"

[[dialogue]]
speaker = "ニャリオン"
original = "「ニャ……ニャニャニャー！\u3000ついにワガハイの尊さを理解できる者が現れたのニャン！」"
translation = "「냐…… 냐냐냐ー! 드디어 나의 존엄함을 이해할 수 있는 자가 나타난 거냥!」"

[[dialogue]]
speaker = "ニャリオン"
original = "「気に入ったニャ！\u3000お主はワガハイの家来にしてやるニャ！」"
translation = "「마음에 들었냥! 너는 나의 가신으로 삼아주겠냥!」"

[[dialogue]]
speaker = "キリカ"
original = "「使い魔の家来とは……？」"
translation = "「사역마의 가신이라니……?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「だーめーでーすー！\u3000クロトは私のものなんだから、アンタはそのへんの野良猫でも従えてなさい！」"
translation = "「안 돼애애요! 쿠로토는 내 거니까, 넌 그 근처의 들고양이나 거느리고 있어!」"

[[dialogue]]
speaker = "ニャリオン"
original = "「ニャニャ！\u3000猫は古来から西洋や中東でも神聖視されてきた高貴な生き物なのニャン、取り消すニャン！」"
translation = "「냐냐! 고양이는 예로부터 서양이나 중동에서도 신성시되어 온 고귀한 생물이냥, 취소하냥!」"

[[dialogue]]
speaker = "unk"
original = "小競り合いが勃発していた。"
translation = "작은 다툼이 발발하고 있었다."

[[dialogue]]
speaker = "フィオナ"
original = "「ふふふ……ニャリオン。親しくなりたいのなら家来ではなく、お友達にならないとダメですよ」"
translation = "「후후후…… 냐리온. 친해지고 싶다면 가신이 아니라, 친구가 되어야 한답니다」"

[[dialogue]]
speaker = "ニャリオン"
original = "「ニャ！\u3000ニャるほど……まあ、それも悪くないニャン……」"
translation = "「냐! 냐루호도…… 뭐, 그것도 나쁘지 않냥……」"

[[dialogue]]
speaker = "クロト"
original = "「よろしくな、ニャリオン」"
translation = "「잘 부탁해, 냐리온」"

[[dialogue]]
speaker = "unk"
original = "そうして俺には、人生初の猫友達ができた。"
translation = "그렇게 나는, 인생 첫 고양이 친구가 생겼다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「にしても……さっきの機械はなんだったのかしら。ちょっと不気味だったわよね」"
translation = "「그나저나…… 아까 그 기계는 뭐였을까. 좀 섬뜩했지」"

[[dialogue]]
speaker = "キリカ"
original = "「こちらが攻撃せずとも襲ってくるというのは……確かに尋常とは思えませんね」"
translation = "「저희가 공격하지 않아도 덮쳐 온다는 것은…… 확실히 예사롭지 않다고 생각합니다」"

[[dialogue]]
speaker = "クロト"
original = "「暴走気味でしたね。戦力も馬鹿にならない」"
translation = "「폭주하는 듯했어. 전력도 만만치 않고」"

[[dialogue]]
speaker = "unk"
original = "俺たちだったから良かったものの、一般生徒が立ち入ればやられていた可能性が高い。"
translation = "우리였으니까 다행이었지만, 일반 학생이 들어섰다면 당했을 가능성이 높다."

[[dialogue]]
speaker = "フィオナ"
original = "「ニャリオン、どう思う？」"
translation = "「냐리온, 어떻게 생각해?」"

[[dialogue]]
speaker = "ニャリオン"
original = "「ニャ！\u3000あれは恐らくガーディアンの一種と思うニャン」"
translation = "「냐! 저건 아마 가디언의 일종이라고 생각하냥」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ガーディアン……？」"
translation = "「가디언……?」"

[[dialogue]]
speaker = "ニャリオン"
original = "「そうニャ。フィーニスの塔は女神が建てた巨塔──内部にはその秩序を守るガーディアンがひしめくと、歴史書にも記されているニャン」"
translation = "「그렇냥. 피니스의 탑은 여신이 세운 거탑──내부에는 그 질서를 지키는 가디언이 가득하다고, 역사서에도 기록되어 있냥」"

[[dialogue]]
speaker = "フィオナ"
original = "「ですが、ガーディアンは高位の天使が遣わせた守護者と記されてます。無差別に攻撃してくるような存在でないはずですが……」"
translation = "「하지만, 가디언은 고위 천사가 보낸 수호자로 기록되어 있습니다. 무차별적으로 공격해 오는 존재는 아닐 텐데요……」"

[[dialogue]]
speaker = "クロト"
original = "「よく知ってるんだな。さすがは高位の使い魔ニャリオン」"
translation = "「잘 알고 있네. 역시 고위 사역마 냐리온」"

[[dialogue]]
speaker = "ニャリオン"
original = "「ニャーッニャッニャッニャッ！\u3000もっと褒めるがよいニャン！」"
translation = "「냐ー앗냐앗냐앗냐앗! 더 칭찬하는 게 좋냥!」"

[[dialogue]]
speaker = "キリカ"
original = "「（珍しく構ってもらえる方に出会えたようです）」"
translation = "「(드물게도 관심을 가져주는 분을 만난 것 같습니다)」"

[[dialogue]]
speaker = "フィオナ"
original = "「（仲良くなれそうでよかった）」"
translation = "「(친해질 수 있어서 다행이에요)」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「へー！\u3000一応アナにも聞いてみ──ってあれ？」"
translation = "「헤ー! 일단 아나에게도 물어보──앗, 어라?」"

[[dialogue]]
speaker = "unk"
original = "携帯情報端末である<ruby>ＤＩＳＣ<rt>ディスク</rt></ruby>を操作しようとするヴィーナス──"
translation = "휴대 정보 단말인 디스크를 조작하려는 비너스──"

[[dialogue]]
speaker = "unk"
original = "だが、その手は途中で止まってしまった。"
translation = "하지만, 그 손은 도중에 멈춰 버렸다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「圏外……？\u3000ここ、学園の敷地内なのに！？」"
translation = "「권외……? 여기, 학원 부지 안인데!?」"

[[dialogue]]
speaker = "クロト"
original = "「ああ……俺も同じだな」"
translation = "「아아…… 나도 마찬가지네」"

[[dialogue]]
speaker = "フィオナ"
original = "「先ほど外部への連絡を試みましたが、どうやら塔の内部は通信が完全に遮断されるようです」"
translation = "「방금 외부로의 연락을 시도했습니다만, 아무래도 탑 내부는 통신이 완전히 차단되는 것 같습니다」"

[[dialogue]]
speaker = "クロト"
original = "「不思議な話──いや。ここが霊的空間なら、それくらいの仕様になっててもおかしくはないか」"
translation = "「이상한 이야기──아니. 여기가 영적인 공간이라면, 그 정도의 사양이 되어 있어도 이상할 건 없나」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ちょっと、どうすんのよクロト！\u3000これじゃ今日のログインボーナス受け取れないじゃない！？」"
translation = "「잠깐, 어떻게 할 거야 쿠로토! 이러면 오늘 로그인 보너스 못 받잖아!?」"

[[dialogue]]
speaker = "ニャリオン"
original = "「もっと他に心配することあるニャン……」"
translation = "「다른 걱정할 것도 많냥……」"

[[dialogue]]
speaker = "キリカ"
original = "「困りましたね。我々ともども侵入者として認識されている現状……これから先もガーディアンが控えているでしょう」"
translation = "「곤란하군요. 저희 모두 침입자로 인식되고 있는 현 상황…… 앞으로도 가디언이 기다리고 있겠지요」"

[[dialogue]]
speaker = "フィオナ"
original = "「どうしましょう。まだ、引き返すという手もありますが……」"
translation = "「어떻게 할까요. 아직, 되돌아간다는 방법도 있습니다만……」"

[[dialogue]]
speaker = "クロト"
original = "「──いや。俺はこのまま進みたい」"
translation = "「──아니. 나는 이대로 나아가고 싶어」"

[[dialogue]]
speaker = "フィオナ"
original = "「緋宮会長……」"
translation = "「히노미야 회장……」"

[[dialogue]]
speaker = "クロト"
original = "「もちろんフィオナ達まで無理に……ってわけじゃない。でも、まだ俺たちは守護天使に会えてない」"
translation = "「물론 피오나 일행까지 무리하게……라는 건 아니야. 하지만, 우리는 아직 수호 천사를 만나지 못했어」"

[[dialogue]]
speaker = "クロト"
original = "「もし、俺たちをここに招いた存在がいるのなら──そこを目指すべきだと思う」"
translation = "「만약, 우리를 여기에 초대한 존재가 있다면──그곳을 목표로 해야 한다고 생각해」"

[[dialogue]]
speaker = "unk"
original = "《境界》を名乗ったその存在。"
translation = "《경계》라고 자칭했던 그 존재."

[[dialogue]]
speaker = "unk"
original = "俺の入学を予言したあの書に、それとの出会いが記されているのなら……。"
translation = "내 입학을 예언했던 그 책에, 그것과의 만남이 기록되어 있다면……."

[[dialogue]]
speaker = "ヴィーナス"
original = "「同感、断固強行ね♪\u3000バーバリアンなんかに引き下がる道理なんてないわ」"
translation = "「동감, 단호하게 강행할 거야♪ 바바리안 따위에게 물러설 도리 같은 건 없어」"

[[dialogue]]
speaker = "ニャリオン"
original = "「ガーディアンニャ」"
translation = "「가디언이냥」"

[[dialogue]]
speaker = "キリカ"
original = "「いかがいたしましょう、お嬢様」"
translation = "「어떻게 하시겠습니까, 아가씨」"

[[dialogue]]
speaker = "フィオナ"
original = "「……わかりました。私たちも引き続き向かいましょう」"
translation = "「……알겠습니다. 저희도 계속 나아가도록 하죠」"

