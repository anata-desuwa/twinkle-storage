[[dialogue]]
speaker = "unk"
original = "第１１話,手負いの堕天使,B"
translation = "제11화, 상처 입은 타락천사, B"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「！？」"
translation = "「!?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「今、なんか……」"
translation = "「지금, 뭔가……」"

[[dialogue]]
speaker = "unk"
original = "彼女たちの振り向いた先──"
translation = "그녀들이 돌아본 곳──"

[[dialogue]]
speaker = "unk"
original = "そこには、混沌の瘴気をまとった化け物が顕現していた。"
translation = "그곳에는, 혼돈의 장기를 두른 괴물이 현현해 있었다."

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「……ヅ……グ……ア……！」"
translation = "「……즈……그……아……!」"

[[dialogue]]
speaker_original = "市民Ａ"
speaker_translation = "시민 A"
original = "「え──何あれ、モンスター……？\u3000……きゃあぁっ！」"
translation = "「에── 뭐야 저거, 몬스터……? ……꺄아아앗!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「っ──近くの皆さん、なるべく遠くへ避難してください！\u3000まだ、危ない存在かどうかはわかんねえけど──！」"
translation = "「──! 근처에 계신 여러분, 될 수 있는 한 멀리 피해주세요! 아직, 위험한 존재인지는 모르겠지만──!」"

[[dialogue]]
speaker = "unk"
original = "突如、街中に現れた異形の存在。"
translation = "돌연, 길거리에 나타난 이형의 존재."

[[dialogue]]
speaker = "unk"
original = "その邪悪なる気配に危機を察して、星徒会連合は惑う市民たちの避難を誘導する。"
translation = "그 사악한 기운에 위기를 감지하고, 성도회 연합은 당황하는 시민들의 피난을 유도한다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「翼があります。あれは……」"
translation = "「날개가 있습니다. 저것은……」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「前にアステラで見たヒトに近いね。堕天使──ってやつだっけ？」"
translation = "「전에 아스테라에서 본 인간에 가깝네. 타락천사──라는 건가?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「でもよ、ここはアステラでもねえのに……」"
translation = "「근데 말이야, 여긴 아스테라도 아닌데……」"

[[dialogue]]
speaker = "unk"
original = "流星学園の四人はその姿に既視感を覚えた。"
translation = "유성 학원의 네 사람은 그 모습에 기시감을 느꼈다."

[[dialogue]]
speaker = "unk"
original = "一方で、アナは対象の状態を分析する。"
translation = "한편, 아나는 대상의 상태를 분석한다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……怪我をしています。それから全身を覆う<ruby>再構築<rt>リクリエ</rt></ruby>の瘴気。眼の焦点は合っていません」"
translation = "「……부상을 입었습니다. 그리고 전신을 뒤덮은 재구축의 장기. 눈의 초점은 맞지 않습니다.」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「ア……ア……グッ……ヅゥッ……ニン……ゲン」"
translation = "「아……아……윽……즈윽……인……간」"

[[dialogue]]
speaker = "unk"
original = "ふらふらと、闇の瘴気を振りまきながらさまよう堕天使。"
translation = "비틀거리며, 어둠의 장기를 뿌리면서 헤매는 타락천사."

[[dialogue]]
speaker = "unk"
original = "その虚ろな瞳がマトイの姿を捉えた。"
translation = "그 공허한 눈동자가 마토이의 모습을 포착했다."

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「……人間」"
translation = "「……인간」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「……え、え？」"
translation = "「……에, 에?」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「……魔族」"
translation = "「……마족」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「……私？」"
translation = "「……나?」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「……天使」"
translation = "「……천사」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「はい、ルリエルは天使です！\u3000堕天使さんも……」"
translation = "「네, 루리엘은 천사입니다! 타락천사 씨도……」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「人間──天使──魔族──」"
translation = "「인간──천사──마족──」"

[[dialogue]]
speaker = "unk"
original = "セーラに、アナに、ソフィアに……"
translation = "세라에게, 아나에게, 소피아에게……"

[[dialogue]]
speaker = "unk"
original = "ひとりひとり、堕天使は魔女のような爪先で確認していく。"
translation = "한 명 한 명, 타락천사는 마녀 같은 발톱 끝으로 확인해 나간다."

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「魔族……否。人間？」"
translation = "「마족……아니. 인간?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ああ。あたしはハーフだからな──一応、人間界で生まれたから人間か？」"
translation = "「아아. 나는 하프니까── 일단, 인간계에서 태어났으니 인간인가?」"

[[dialogue]]
speaker = "unk"
original = "そして最後にユウリ。"
translation = "그리고 마지막으로 유우리."

[[dialogue]]
speaker = "unk"
original = "彼女の姿を見たアルモタヘルは、さらに苦しそうな声を上げて呻き始めた。"
translation = "그녀의 모습을 본 아르모타헬는 더욱 괴로운 목소리를 내며 신음하기 시작했다."

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「ココハ……人間界……故……否……アア……面倒ダ」"
translation = "「여기는……인간계……고로……아니……아아……귀찮다」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「全員、去レ」"
translation = "「전원, 떠나라」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「──！？」"
translation = "「──!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「！\u3000ユウリ先輩──大丈夫ですか！？」"
translation = "「! 유우리 선배── 괜찮으십니까!?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「っっ、ああ……！\u3000あたしじゃなかったらヤバかったかもしれねえけどな」"
translation = "「윽, 아아……! 내가 아니었으면 위험했을지도 모르겠지만.」"

[[dialogue]]
speaker = "unk"
original = "<ruby>腕<rt>かいな</rt></ruby>の一振りにより生じた闇の熱線は、最前線にいたユウリがハルバードを振るい受け止めた。"
translation = "팔의 일격으로 발생한 어둠의 열선은, 최전선에 있던 유우리가 할버드를 휘둘러 막아냈다."

[[dialogue]]
speaker = "unk"
original = "事実、ユウリの目算通り──食らったのが彼女でなければ致命傷となりえていただろう。"
translation = "사실, 유우리의 예상대로── 맞은 것이 그녀가 아니었다면 치명상이 되었을 것이다."

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「消エロ……滅ベ……総テヲ……零ニ……」"
translation = "「사라져라……멸망해라……모든 것을……영으로……」"

[[dialogue]]
speaker = "unk"
original = "呪詛を濛々と呟いて迫る堕天使。"
translation = "저주를 자욱하게 중얼거리며 다가오는 타락천사."

[[dialogue]]
speaker = "unk"
original = "緩やかに羽ばたくその邪翼からは、濃紫の瘴気が一帯に吹き散らされていた。"
translation = "느슨하게 날갯짓하는 그 사악한 날개에서는, 짙은 보랏빛 장기가 일대에 흩뿌려지고 있었다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「前の堕天使さんはどうだったのかしら、ソフィ」"
translation = "「이전의 타락천사 씨는 어땠으려나, 소피.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「フィオナ会長と私たちでやっつけたら正気に戻ってくれました。なので、今回も……」"
translation = "「피오나 회장님과 저희가 해치웠더니 제정신으로 돌아와 주었습니다. 그러니, 이번에도……」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「人間──魔族──天使──消エテ、無クナレッ！」"
translation = "「인간──마족──천사──사라져, 없어져라!」"

[[dialogue]]
speaker = "unk"
original = "今度は全員が攻撃の回避に成功する。"
translation = "이번에는 전원이 공격 회피에 성공한다."

[[dialogue]]
speaker = "unk"
original = "その刹那、ソフィアが堕天使の体に何かを発見した。"
translation = "그 찰나, 소피아가 타락천사의 몸에서 무언가를 발견했다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「っ──！\u3000ユウリ先輩、右肩のところを見てください！」"
translation = "「──! 유우리 선배, 오른쪽 어깨 쪽을 봐주세요!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「──？\u3000ああ──なんか焼けてるっぽいな？」"
translation = "「──? 아아── 뭔가 타버린 것 같네?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「あれはフィオナ会長の──エクリプスディザスターの焦げ跡です！\u3000間違いありません！」"
translation = "「저것은 피오나 회장님의── 이클립스 디재스터의 그을음 자국입니다! 틀림없습니다!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「！？\u3000言われてみりゃあ、確かに……」"
translation = "「!? 듣고 보니, 확실히……」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「フィオ……ナ……？\u3000ググ……人間、血族、魔王ノ……」"
translation = "「피오……나……? 윽윽……인간, 혈족, 마왕의……」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「フィオナちゃんの術の痕、それから半端ない紫の瘴気……ふーん」"
translation = "「피오나짱의 술법 흔적, 그리고 엄청난 보랏빛 장기…… 흐음.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「なんとなく、どこから来たのかわかっちゃったわね」"
translation = "「왠지 모르게, 어디서 왔는지 알 것 같네.」"

[[dialogue]]
speaker = "unk"
original = "彼らは全員がこの流星市国にそびえる一柱の塔を見やる。"
translation = "그들은 전원이 이 유성 시국에 우뚝 솟은 하나의 탑을 바라본다."

[[dialogue]]
speaker = "unk"
original = "フィーニスの塔──"
translation = "피니스의 탑──"

[[dialogue]]
speaker = "unk"
original = "そこは今まさに彼らのトップ、クロトら三名が乗り込んでいるはずの舞台だった。"
translation = "그곳은 지금 막 그들의 리더, 쿠로토 등 세 명이 올라타고 있을 무대였을 터였다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「どんな事情かわかりませんが……“塔”から弾き出された堕天使さんのようです」"
translation = "「어떤 사정인지는 모르겠지만…… 『탑』에서 튕겨져 나온 타락천사 씨인 것 같습니다.」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「あっちもあっちで何か起きてる、ってか」"
translation = "「저쪽도 저쪽 나름대로 뭔가 일어나고 있다는 건가.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「なら、私たちに任された──ってことかしらね」"
translation = "「그렇다면, 우리에게 맡겨졌다는── 걸까나.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「元は良い天使さんなら……私たちで解放してあげないと！」"
translation = "「원래는 좋은 천사 씨라면…… 우리가 해방시켜 줘야 해!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「流星新星星徒会連合──参りますっ！」"
translation = "「유성 신성 성도회 연합── 가겠습니다!」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「──ウグアァァッ！！」"
translation = "「──우그아아앗!!」"

