[[dialogue]]
speaker = "unk"
original = "クリスマスパーティーが終わった後、俺はアニュラスに手を引かれて会場を出た。"
translation = "크리스마스 파티가 끝난 후, 나는 아뉴라스에게 손을 이끌려 회장을 나왔다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「どこに連れて行かれるんだ？」"
translation = "「어디로 데려가는 거야?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「プレゼントを渡したいんだ。だから……いいから黙ってついて来て欲しい」"
translation = "「선물을 건네주고 싶다. 그러니까…… 됐으니까 조용히 따라와 줬으면 한다」"

[[dialogue]]
speaker = "unk"
original = "慎重に辺りの様子を伺いながら、流星寮の廊下を進んでいくアニュラス。"
translation = "신중하게 주변 눈치를 살피며, 유성 기숙사의 복도를 나아가는 아뉴라스."

[[dialogue]]
speaker = "unk"
original = "やがて自分の部屋まで辿り着き、そこで恥ずかしそうに頬を染めながらプレゼントを渡してくる。"
translation = "이윽고 자신의 방까지 도착해, 그곳에서 부끄러운 듯 뺨을 붉히며 선물을 건네온다."

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「これを……受け取って欲しい……」"
translation = "「이것을…… 받아 줬으면 한다……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……！！\u3000こ、これは……！」"
translation = "「……!! 이, 이것은……!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「ううう～っ、ブルブルするっ……<emoji=heart04>」"
translation = "「우우우~, 부르르 떨린다……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「確かにこれをプレゼントしたのは私だ……だが、いきなり使うだなんて……」"
translation = "「확실히 이것을 선물한 건 나다…… 하지만, 갑자기 사용하다니……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「せっかく貰ったんだから使うよ。それに、使って欲しかったんでしょ？」"
translation = "「기껏 받았으니까 써야지. 게다가, 써주길 바랐던 거 아냐?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「それは……そうなんだが……<emoji=heart04>」"
translation = "「그건…… 그렇다만……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「だって気になるだろう！\u3000これを使っておま○こを弄ったら、どんな風になってしまうのか！」"
translation = "「그치만 궁금하잖아! 이걸 써서 보지를 만지면, 어떤 기분이 될지!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「スケベとか言わないでくれ……私だってわかってるんだ、清廉な騎士として振る舞っているが、肉体は健康で……せ、性欲もきちんとあるんだって」"
translation = "「변태라고 말하지 말아 다오…… 나도 알고 있다. 청렴한 기사로서 행동하고 있지만, 육체는 건강하고…… 성, 성욕도 제대로 있다는 걸」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「まあ、お前と結ばれて……そこそこな頻度で性交渉をしているおかげで、肉欲が増大したのは事実だからな。つまり、私がスケベな原因はお前にある」"
translation = "「뭐, 너와 맺어지고 나서…… 꽤 빈번하게 성교를 하고 있는 덕분에, 육욕이 증대된 건 사실이니까 말이다. 즉, 내가 변태인 원인은 너에게 있다」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「だ、だから……んぅ<emoji=heart04>\u3000こうして、スケベなぴんくろーたーで……気持ちよくなっても、仕方ないことなんだぞ<emoji=heart04>」"
translation = "「그, 그러니까…… 응으<emoji=heart04> 이렇게, 야한 핑크 로터로…… 기분 좋아져도, 어쩔 수 없는 거란 말이다<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「しかし、こんなの初めてだっ。お前の指以外で、こんな風にクリトリスを刺激されるなんてっ<emoji=heart04>」"
translation = "「하지만, 이런 건 처음이다. 네 손가락 이외에, 이런 식으로 클리토리스를 자극당하다니<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「ブルブルと振動して……こんなのずるい……気持ちよくなってしまうぞ……」"
translation = "「부르르 진동해서…… 이런 건 반칙이다…… 기분 좋아져 버린단 말이다……」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「んふっ……んぅ……お前はどうだ？\u3000私が乱れる様を見て、興奮したか？\u3000エッチな私をもっと好きになってくれたか？」"
translation = "「응훗…… 응으…… 너는 어떠냐? 내가 흐트러지는 모습을 보고 흥분했나? 야한 나를 더 좋아하게 되었나?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「ふふふっ、答えずともわかるぞ<emoji=heart04>\u3000すっかりおち○ぽが肥大してるじゃないか。これでは隠しようがないな」"
translation = "「후후후, 대답하지 않아도 안다<emoji=heart04> 자지가 아주 늠름해졌지 않나. 이래서는 숨길 수가 없겠군」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「恥ずかしがらなくていい、恋人同士だからな。こういうのも隠さなくていいと、教えてくれたのはお前だぞ<emoji=heart04>」"
translation = "「부끄러워하지 않아도 된다, 연인 사이니까 말이다. 이런 것도 숨기지 않아도 된다고 가르쳐준 건 너다<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「んうぅっ<emoji=heart04>\u3000ぴんくろーたー、気持ちいいぞ<emoji=heart04>\u3000クリがじんじんして……胎の奥からじんわりと欲望が広がってくるのを感じる……」"
translation = "「응우웃<emoji=heart04> 핑크 로터, 기분 좋다<emoji=heart04> 클리가 징징거려서…… 태 안쪽부터 은은하게 욕망이 퍼져 나가는 게 느껴져……」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「んっ……<emoji=heart04>\u3000お前が欲しくなってる……みたいだ<emoji=heart04>\u3000私のおま○こはこいつに躾けられたからな<emoji=heart04>\u3000すっかり欲しがりになってしまったぞ<emoji=heart04>」"
translation = "「응……<emoji=heart04> 너를 원하게 된 것…… 같구나<emoji=heart04> 내 보지는 이 녀석에게 길들여졌으니까 말이야<emoji=heart04> 아주 갈구하게 되어버렸단 말이다<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「これ以上は……んんっ<emoji=heart04>\u3000ふっ<emoji=heart04>\u3000言わなくてもわかるだろう？\u3000お前のこれも、私を求めてるみたいだし……<emoji=heart04>」"
translation = "「이 이상은…… 응응<emoji=heart04> 훗<emoji=heart04> 말하지 않아도 알겠지? 네 이것도 나를 구하고 있는 것 같고……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「セックス……して<emoji=heart04>\u3000いつもみたいに、このおち○ぽで……私を狂わせて欲しい<emoji=heart04>」"
translation = "「섹스…… 해줘<emoji=heart04> 평소처럼, 이 자지로…… 나를 미치게 해줬으면 한다<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「んふぉ～～～～～っ<emoji=heart04>\u3000おおっ<emoji=heart04>\u3000おふっ<emoji=heart04>\u3000んんんぅ～～～～っ<emoji=heart04>」"
translation = "「응훠~~~~~~~~~<emoji=heart04> 오오<emoji=heart04> 오훗<emoji=heart04> 응응으~~~~<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「おち○ぽ来たぁっ<emoji=heart04>\u3000すごっ<emoji=heart04>\u3000うううう～～っ<emoji=heart04>\u3000一気におま○こ広がって……こんなのおかしくなるぅぅ<emoji=heart04>」"
translation = "「자지 들어왔다아<emoji=heart04> 굉장해<emoji=heart04> 우우우우~~<emoji=heart04> 단숨에 보지가 벌어져서…… 이런 거 이상해져어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「はぁっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000挿れただけでこんなに気持ちいいなんて……どうしたんだ、私の体は？」"
translation = "「하아<emoji=heart04> 하아<emoji=heart04> 삽입한 것만으로 이렇게 기분 좋다니…… 어떻게 된 거냐, 내 몸은?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「もしかして、このろーたーのせいか？\u3000絶え間ない機械的な振動が、私をいつもより昂ぶらせているのか？」"
translation = "「설마, 이 로터 때문인가? 끊임없는 기계적인 진동이, 나를 평소보다 고양시키고 있는 건가?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「こんなに気持ちいいなら……ふふっ、お前に感謝しないといけないな。また新しい扉を開いてもらった<emoji=heart04>」"
translation = "「이렇게 기분 좋다면…… 후훗, 네게 감사해야겠군. 또 새로운 문을 열어주었구나<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「んんっ<emoji=heart04>\u3000ふぐっ<emoji=heart04>\u3000おち○ぽ入った状態で……クリも刺激するのは……ふぁん<emoji=heart04>\u3000き、気持ちよすぎるぞ<emoji=heart04>」"
translation = "「응응<emoji=heart04> 푸흑<emoji=heart04> 자지가 들어간 상태로…… 클리까지 자극하는 건…… 후앙<emoji=heart04> 기, 기분이 너무 좋단 말이다<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「他にも様々な性玩具があるのだろう？\u3000もしやそれらを私に使おうなどと不埒なことを考えているな？」"
translation = "「이외에도 다양한 성인용품이 있겠지? 혹시 그것들을 내게 사용하려는 발칙한 생각을 하고 있는 건 아니겠지?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「このスケベめっ<emoji=heart04>\u3000恋人の体を弄ぶことしか考えてないとは<emoji=heart04>」"
translation = "「이 변태 녀석<emoji=heart04> 연인의 몸을 가지고 놀 생각밖에 안 하다니<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「んああぁっ<emoji=heart04>\u3000ひあっ<emoji=heart04>\u3000こら、冗談だっ<emoji=heart04>\u3000怒るな<emoji=heart04>\u3000おま○この中でおち○ぽ膨らませてっ<emoji=heart04>\u3000こんなの屈服するっ<emoji=heart04>\u3000またお前にわからせられちゃうっ<emoji=heart04>」"
translation = "「응아아앗<emoji=heart04> 히앗<emoji=heart04> 이봐, 농담이다<emoji=heart04> 화내지 마라<emoji=heart04> 보지 안에서 자지를 부풀려서<emoji=heart04> 이런 거 굴복해버려<emoji=heart04> 또 네게 조교당해버렷<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「はぁっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000私の弱点はお前のおち○ぽになってしまったな<emoji=heart04>\u3000挿入されたら、なんだって許してしまいそうだ<emoji=heart04>」"
translation = "「하아<emoji=heart04> 하아<emoji=heart04> 하아<emoji=heart04> 내 약점은 네 자지가 되어버렸군<emoji=heart04> 삽입당하면 뭐든지 허락해버릴 것만 같다<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「こんなの……絶対駄目なのにっ……はしたなく懇願してしまうっ<emoji=heart04>\u3000は、早くおち○ぽしてぇっ、て<emoji=heart04>\u3000さっきからじんじんしてたまらないんだ<emoji=heart04>」"
translation = "「이런 거…… 절대 안 되는데…… 천박하게 간청하게 되어버려<emoji=heart04> 어, 얼른 자지 해줘어, 라고<emoji=heart04> 아까부터 징징거려서 견딜 수가 없단 말이다<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「やはり、ぴんくろーたーだけじゃ足りないんだっ<emoji=heart04>\u3000お前のおち○ぽでないとっ<emoji=heart04>\u3000だから頼むっ、動いて<emoji=heart04>\u3000逞しいこれで内側をほじり回してくれっっ<emoji=heart04>」"
translation = "「역시 핑크 로터만으론 부족해! 네 자지가 아니면 안 된단 말이다! 그러니까 부탁한다, 움직여 줘<emoji=heart04> 늠름한 이것으로 안쪽을 헤집어 다오!!<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「んんぅ～～～～～っ<emoji=heart04>\u3000んふっ<emoji=heart04>\u3000ふあっ<emoji=heart04>\u3000あぁっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000すごっ<emoji=heart04>\u3000おち○ぽっ<emoji=heart04>\u3000おち○ぽ凄いぃぃ～～～～っ<emoji=heart04>」"
translation = "「응응으~~~~~<emoji=heart04> 응훗<emoji=heart04> 후아<emoji=heart04> 아앗<emoji=heart04> 하앙<emoji=heart04> 굉장해<emoji=heart04> 자지<emoji=heart04> 자지 굉장해에에~~~~<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「はぁっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000クリのブルブルと……おち○ぽの同時攻撃で……あっさり屈してしまいそうだっ<emoji=heart04>」"
translation = "「하아<emoji=heart04> 하아<emoji=heart04> 하아<emoji=heart04> 클리의 진동과…… 자지의 동시 공격으로…… 허무하게 굴복해버릴 것만 같다!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「まだそんなに激しくないのにっ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000気持ちいい～～っ<emoji=heart04>」"
translation = "「아직 그렇게 격렬하지도 않은데! 기분 좋아! 기분 좋아아~~!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「ごめんっ、お前にばかりさせてっ……こっちも動かないとな<emoji=heart04>\u3000ちゃんと上下に動いて、お前のおち○ぽ<emoji=heart04>\u3000しっかりおま○こでしごくからなっ<emoji=heart04>」"
translation = "「미안하다, 네게만 시키고…… 이쪽도 움직여야겠군<emoji=heart04> 제대로 상하로 움직여서, 네 자지<emoji=heart04> 확실히 보지로 훑어줄 테니까 말이야!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「はぁっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000ど、どうだ、私の腰使いは？\u3000馬に乗るようなものだからなっ<emoji=heart04>\u3000騎乗位には自信あるんだ<emoji=heart04>」"
translation = "「하아<emoji=heart04> 하앙<emoji=heart04> 아앙<emoji=heart04> 어, 어떠냐, 내 허리 놀림은? 말을 타는 것과 같으니까 말이다! 기승위에는 자신 있단 말이다<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「この体位なら、お前に何度も勝ってるからな<emoji=heart04>\u3000遠慮せず気持ちよくなっていいぞ<emoji=heart04>\u3000私の女体で気持ちよくなってくれ<emoji=heart04>」"
translation = "「이 체위라면 네게 몇 번이고 이기고 있으니까 말이다<emoji=heart04> 사양 말고 기분 좋아져도 된다. 내 여체로 기분 좋아져 다오<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「私は不器用だからっ……お前にしてやれることなんて、これくらいだっ<emoji=heart04>\u3000セックスしたい時はいつでも言ってくれ<emoji=heart04>\u3000私のスケベ穴を使わせてやるからっ<emoji=heart04>」"
translation = "「나는 서투르니까…… 네게 해줄 수 있는 건 이 정도뿐이다<emoji=heart04> 섹스하고 싶을 때는 언제든 말해라. 내 암캐 구멍을 쓰게 해줄 테니까!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「こんな風に……んぅ～～っ<emoji=heart04>\u3000ぬめぬめの穴で、おち○ぽしごいてやるからな<emoji=heart04>\u3000私のこと、好きで好きでたまらなくなるくらい、夢中にさせてやるっ<emoji=heart04>」"
translation = "「이런 식으로…… 응으~~<emoji=heart04> 미끈거리는 구멍으로 자지 훑어줄 테니까 말이다. 나를 좋아하고 좋아해서 견딜 수 없을 정도로, 빠져들게 해주겠다!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「どうだ？\u3000気持ちいいか？\u3000セックスは気持ちいいな<emoji=heart04>\u3000叶うことなら毎日お前とこうしたいのにっ<emoji=heart04>」"
translation = "「어떠냐? 기분 좋나? 섹스는 기분 좋구나<emoji=heart04> 가능하다면 매일 너와 이렇게 하고 싶은데!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「好きだっ<emoji=heart04>\u3000好きだぞ、愛してるっ<emoji=heart04>\u3000んふふっ、私がどのくらい好きか、お前は知らないだろう？」"
translation = "「좋아한다! 좋아한다, 사랑해! 응후후, 내가 얼마나 좋아하는지 너는 모르겠지?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「騎士なのにっ……お前の子を孕んでもいいと思うくらいには……好きだぞ<emoji=heart04>」"
translation = "「기사인데도…… 네 아이를 배도 좋다고 생각할 정도로는…… 좋아한단 말이다<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「ひうっ！？\u3000んあぁあぁっっ<emoji=heart04>\u3000こら待てっ、興奮するなっ<emoji=heart04>\u3000今のはあくまでたとえ話でっっ<emoji=heart04>\u3000こら突くなっ<emoji=heart04>\u3000おち○ぽグリグリするなぁ～～～っ<emoji=heart04>」"
translation = "「히윽!? 응아아아앗<emoji=heart04> 이봐 기다려, 흥분하지 마라! 방금 건 어디까지나 비유였고!! 이봐 찌르지 마! 자지 비벼대지 마아아아~~~~!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「はぁうっっ<emoji=heart04>\u3000ふうっ<emoji=heart04>\u3000んふぅうぅ～～～～っっ<emoji=heart04>\u3000感じすぎちゃうっ<emoji=heart04>\u3000こんなのおかしくなるっ<emoji=heart04>\u3000おかしくなっちゃうからぁぁぁっ<emoji=heart04>」"
translation = "「하아웃<emoji=heart04> 후우<emoji=heart04> 응후우우우~~~~<emoji=heart04> 너무 느껴버려! 이런 거 이상해져! 이상해져 버리니까아아아!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「はぁっ<emoji=heart04>\u3000はあんっ<emoji=heart04>\u3000お前の本気エッチ、すっかり忘れてたぞっ<emoji=heart04>\u3000このおち○ぽで何度もアクメを経験させられたからなっ<emoji=heart04>」"
translation = "「하아<emoji=heart04> 하안<emoji=heart04> 네 진심 에치, 완전히 잊고 있었군! 이 자지로 몇 번이나 절정을 경험했었으니까 말이다!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「ふあぁぁ～～っ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000んあぁぁっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000こんなに気持ちよくなったらっ、セックス大好きになっちゃうだろっ<emoji=heart04>」"
translation = "「후아아아~~<emoji=heart04> 하아<emoji=heart04> 응아아아<emoji=heart04> 아앙<emoji=heart04> 이렇게 기분 좋아지면, 섹스 너무 좋아하게 되어버리잖아!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「騎士なのにっ……い、淫乱になっちゃうっ<emoji=heart04>\u3000おち○ぽとおま○こを擦り合わせることしか考えられなくなっちゃうっっ<emoji=heart04>」"
translation = "「기사인데도…… 음, 음란해져 버려! 자지와 보지를 문지르는 것밖에 생각할 수 없게 되어버렷!!<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「駄目っ<emoji=heart04>\u3000駄目駄目駄目ぇぇ～～～～っ<emoji=heart04>\u3000ちょっと弱めてっ<emoji=heart04>\u3000うあぁぁっ<emoji=heart04>\u3000はあっ<emoji=heart04>\u3000あぁぁっ<emoji=heart04>\u3000おち○ぽ強いっ<emoji=heart04>\u3000強すぎるってばあぁぁっっ<emoji=heart04>」"
translation = "「안 돼<emoji=heart04> 안 돼안 돼안 돼에에~~~~<emoji=heart04> 조금 살살해줘<emoji=heart04> 우아아아<emoji=heart04> 하아<emoji=heart04> 아아아<emoji=heart04> 자지 강해! 너무 강하다고오오오!!<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「はぁっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000もうおかしくなりそう<emoji=heart04>\u3000ろーたーブルブルしてるのにっ<emoji=heart04>\u3000同時におち○ぽズンズンされたら私っ<emoji=heart04>\u3000私ぃぃ～～っ<emoji=heart04>」"
translation = "「하아<emoji=heart04> 하아<emoji=heart04> 이제 이상해질 것 같아<emoji=heart04> 로터 부르르 떨리는데! 동시에 자지가 푹푹 들어오면 나! 나아아아~~!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「もう駄目だっ<emoji=heart04>\u3000イクっ<emoji=heart04>\u3000イキそうっ<emoji=heart04>\u3000まだ始めたばかりなのにっ<emoji=heart04>\u3000あっさりアクメしちゃう<emoji=heart04>\u3000んあぁぁ～～っ<emoji=heart04>\u3000はぁんっ<emoji=heart04>」"
translation = "「이제 안 된다! 가버려! 갈 것 같아! 이제 막 시작했는데! 허무하게 가버려어<emoji=heart04> 응아아아~~<emoji=heart04> 하앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「はぁ<emoji=heart04>\u3000はぁ<emoji=heart04>\u3000許してぇぇ<emoji=heart04>\u3000もう私の負けでいいから<emoji=heart04>\u3000おち○ぽには勝てないからっ<emoji=heart04>\u3000奥駄目っ<emoji=heart04>\u3000んあっ<emoji=heart04>\u3000子宮グリグリってっ、んうううっ<emoji=heart04>」"
translation = "「하아<emoji=heart04> 하아<emoji=heart04> 용서해줘어<emoji=heart04> 이제 내 패배로 좋으니까<emoji=heart04> 자지에는 못 당하니까! 안쪽 안 돼! 응앗<emoji=heart04> 자궁 비벼대는 거, 응우우웃<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「ふあぁぁぁ～～んっっ<emoji=heart04>\u3000んはぁっ<emoji=heart04>\u3000いやっ<emoji=heart04>\u3000強制的に発情させられちゃうっ<emoji=heart04>\u3000おち○ぽで子宮揺らされてっ<emoji=heart04>\u3000私っ<emoji=heart04>\u3000私ぃっっ<emoji=heart04>」"
translation = "「후아아아아~~앙!!<emoji=heart04> 응하아<emoji=heart04> 싫어! 강제적으로 발정당해버려! 자지로 자궁이 흔들려서! 나! 나아아!!<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「駄目なのにっ<emoji=heart04>\u3000準備しちゃうっ<emoji=heart04>\u3000子宮が孕む準備しちゃうからぁぁ～～～～っっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「안 되는데! 준비해버려! 자궁이 임신할 준비를 해버리니까아아아~~~~!!<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「んおっ<emoji=heart04>\u3000おおおおおっ<emoji=heart04>\u3000おおんっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000ふおっ<emoji=heart04>\u3000イク<emoji=heart04>\u3000イギそうっっ<emoji=heart04>\u3000また負けちゃうっ<emoji=heart04>\u3000おあああぁぁぁ～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응옷<emoji=heart04> 오오오오오<emoji=heart04> 오온<emoji=heart04> 옷<emoji=heart04> 옷<emoji=heart04> 후옷<emoji=heart04> 가버려<emoji=heart04> 가버릴 것 같아아!!<emoji=heart04> 또 져버려! 오아아아아아~~~~!!<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「もう無理ぃ<emoji=heart04>\u3000我慢出来ないぃぃっ<emoji=heart04>\u3000ごめんもうイク<emoji=heart04>\u3000イクからっ<emoji=heart04>\u3000そっちも出してっ<emoji=heart04>\u3000ザーメン<emoji=heart04>\u3000私にザーメン出してっっ<emoji=heart04>」"
translation = "「이제 무리야<emoji=heart04> 못 참겠어어어!!<emoji=heart04> 미안 이제 가! 갈 거니까! 그쪽도 내줘! 정액! 나한테 정액 내줘어어!!<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「んあぁぁっ<emoji=heart04>\u3000あぁっ<emoji=heart04>\u3000イク<emoji=heart04>\u3000イっちゃう<emoji=heart04>\u3000イクっ<emoji=heart04>\u3000イクイクイクっ<emoji=heart04>」"
translation = "「응아아아<emoji=heart04> 아아<emoji=heart04> 가버려<emoji=heart04> 가버려어<emoji=heart04> 가! 가가가가!!<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「イっくぅうううぅ～～～～～～っっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가버려어어어어어어~~~~~~~~~~~~!!!!<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「はぁぁっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000すごい……イっちゃったぁ……<emoji=heart04>」"
translation = "「하아아<emoji=heart04> 하아<emoji=heart04> 하아<emoji=heart04> 굉장해…… 가버렸어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「んうっ……お前も……たくさん出てるな……奥でびゅくびゅくしてるのがわかるぞ<emoji=heart04>」"
translation = "「응웃…… 너도…… 잔뜩 나오고 있구나…… 안쪽에서 울컥울컥하는 게 느껴진다<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「ほぼ同時に達したな……ふふっ、一緒で嬉しいぞ<emoji=heart04>」"
translation = "「거의 동시에 도달했군…… 후훗, 함께여서 기쁘다<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「イってる時、こうして注いでもらうのが、一番気持ちいいから……<emoji=heart04>」"
translation = "「가고 있을 때, 이렇게 쏟아부어 주는 게 가장 기분 좋으니까……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「んふっ<emoji=heart04>\u3000ザーメン嬉しいぞ<emoji=heart04>\u3000中出しされてるだけで、また達してしまいそうだ<emoji=heart04>」"
translation = "「응훗<emoji=heart04> 정액 기쁘다. 질내사정 당하는 것만으로, 또 가버릴 것 같아」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「んんっ……相変わらず元気だな……量も多くて……こんなに出されたら孕んでしまいそうだ……<emoji=heart04>」"
translation = "「응응…… 여전히 기운차구나…… 양도 많아서…… 이렇게 싸버리면 임신해버릴 것 같다……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「だが、もしも私に赤ちゃんを産んで欲しくなったら……ん、はぁ……それを受け入れる気持ちはあるぞ……」"
translation = "「하지만, 만약 내게 아기를 낳아줬으면 한다면…… 응, 하아…… 그것을 받아들일 마음은 있다……」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「恋人の要望は、全て応えたいと思っているからな……」"
translation = "「연인의 요망은, 전부 들어주고 싶다고 생각하고 있으니까 말이다……」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「その時は……んんっ……ただの恋人ではなくなってしまうが……ふふ……<emoji=heart04>」"
translation = "「그때는…… 응응…… 평범한 연인이 아니게 되어버리겠지만…… 후후……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「はぁ<emoji=heart04>\u3000はぁ<emoji=heart04>\u3000これでおしまいか？\u3000ふふ、子宮がパンパンになるくらい、たっぷり注いでくれたな<emoji=heart04>」"
translation = "「하아<emoji=heart04> 하아<emoji=heart04> 이걸로 끝인가? 후후, 자궁이 꽉 찰 정도로 듬뿍 쏟아주었구나<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「私も、普段以上に乱れてしまったみたいだ<emoji=heart04>\u3000恥ずかしいところを見せてしまったな<emoji=heart04>」"
translation = "「나도 평소 이상으로 흐트러져 버린 모양이군<emoji=heart04> 부끄러운 모습을 보여버렸네」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「ふふっ、そういう私も好きだと言ってくれるんだろう？\u3000わかっているぞ、このスケベめ<emoji=heart04>」"
translation = "「후훗, 그런 나도 좋다고 말해줄 거지? 알고 있다, 이 변태 녀석<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「お前が知らないところはないくらい、いろいろ見られてしまったから……もう今更恥じることはないぞ<emoji=heart04>」"
translation = "「네가 모르는 곳이 없을 정도로 이리저리 보여버렸으니…… 이제 새삼스레 부끄러워할 건 없겠지」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「こら、余裕そうな顔するんじゃない。お前だって散々、私に恥ずかしいところを見られてるくせに」"
translation = "「이봐, 여유로운 표정 짓지 마라. 너도 실컷 내게 부끄러운 모습을 보였으면서」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「セックスって凄いな……お互いを丸裸にして、好きって気持ちをもっと強くしてくれるから」"
translation = "「섹스란 대단하구나…… 서로를 발가벗겨서, 좋아한다는 마음을 더 강하게 만들어주니까」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「だから……これからももっと……お前とセックスしたい<emoji=heart04>\u3000全ての虚飾を取り去って、裸と裸でぶつかり合いたい……<emoji=heart04>」"
translation = "「그러니까…… 앞으로도 더…… 너와 섹스하고 싶다<emoji=heart04> 모든 허례허식을 벗어던지고, 알몸과 알몸으로 부딪히고 싶어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "こうして俺とアニュラスは、もっと愛し合い続けるのだった。"
translation = "이렇게 나와 아뉴라스는 더욱 계속해서 서로를 사랑하는 것이었다."

