[[dialogue]]
speaker = "unk"
original = "第１話,カフェテリアの新メニュー,P"
translation = "제1화, 카페테리아의 신메뉴, P"

[[dialogue]]
speaker = "unk"
original = "カフェテリアの一角に人だかりが出来ていた。"
translation = "카페테리아의 한 구석에 사람들이 모여 있었다."

[[dialogue]]
speaker = "unk"
original = "気になって覗いてみると──"
translation = "궁금해서 들여다보니──"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「んっ、はむ、はむ……んんん～……美味しい～♪」"
translation = "「음, 함, 함……으으음~…… 맛있다~♪」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「はむ……はむ……ん～♪\u3000こっちも美味しい～♪」"
translation = "「함…… 함…… 음~♪ 이쪽도 맛있어~♪」"

[[dialogue]]
speaker = "unk"
original = "サランがデザートを食べていた。"
translation = "사란이 디저트를 먹고 있었다."

[[dialogue]]
speaker = "unk"
original = "それ自体は珍しい光景ではないが、テーブルの上には異常な数の皿やグラス、カップなどが並んでいる。"
translation = "그 자체는 드문 광경이 아니지만, 테이블 위에는 이상할 정도로 많은 접시와 글라스, 컵 등이 늘어서 있다."

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ぽよ？\u3000会長ちゃん、こんにちは～♪」"
translation = "「뽀요? 회장님, 안녕~♪」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「今ね、蛍火ちゃんに頼まれて、カフェテリアのデザートの試食をしてるんだよ～♪」"
translation = "「지금 말이야, 호타루비 짱한테 부탁받아서 카페테리아 디저트 시식을 하고 있어~♪」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「どうですか、サランさん？」"
translation = "「어떠신가요, 사란 선배?」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ん～、味的には全然問題ないと思うけどな～」"
translation = "「음~, 맛으로는 전혀 문제없다고 생각하는데 말이야~」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「でも何だろう、あとちょっとで何か分かりそうな気がするんだよね～」"
translation = "「하지만 뭘까, 조금만 더 하면 뭔가 알 수 있을 것 같은 기분이 들어~」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「追加でもっと作ってもらいますか？」"
translation = "「추가로 더 만들어 드릴까요?」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「うん、お願いだよ～」"
translation = "「응, 부탁해~」"

[[dialogue]]
speaker = "unk"
original = "この量はもう、試食とは言えないのでは"
translation = "이 양은 이제 시식이라고 할 수 없지 않을까"

[[dialogue]]
speaker = "unk"
original = "まだ頼むの！？"
translation = "더 시키는 거야!?"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ぽよ……こんなに食べちゃってたんだ～。えへへ、気が付かなかったよ～♪」"
translation = "「뽀요…… 이렇게나 먹어버렸구나~. 에헤헤, 눈치채지 못했어~♪」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「実はカフェテリアのデザートの売れ行きが芳しくないのです」"
translation = "「사실 카페테리아의 디저트 판매 실적이 좋지 않습니다」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「自分たちでもいろいろ考えてみたのですが原因が分からなくて……それでサランさんにお願いしました」"
translation = "「저희끼리도 여러 가지로 고민해 봤습니다만 원인을 알 수 없어서…… 그래서 사란 선배께 부탁드렸습니다」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「あ、そうだ……よければ師匠にも、試食をお願いしていいですか？」"
translation = "「아, 맞다…… 괜찮으시다면 스승님께도 시식을 부탁드려도 될까요?」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「そうしよそうしよ～♪\u3000えへへ、それじゃ会長ちゃん、あ～ん……♪」"
translation = "「그러자 그러자~♪ 에헤헤, 그럼 회장님, 아~앙……♪」"

[[dialogue]]
speaker = "unk"
original = "嬉しいけど視線が……"
translation = "기쁘긴 한데 시선이……"

[[dialogue]]
speaker = "unk"
original = "た、食べさせてくれる系！？"
translation = "머, 먹여주는 계열!?"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ぽよ？\u3000ん～、そっかぁ……みんなの前じゃ恥ずかしいよね～……」"
translation = "「뽀요? 음~, 그렇구나…… 모두 앞이라 부끄럽네~……」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「大丈夫ですよ。師匠の分も作ってくださいとお願いしてきますから」"
translation = "「괜찮아요. 스승님 몫도 만들어 달라고 부탁하고 올 테니까요」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ありがとう～」"
translation = "「고마워~」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「会長ちゃん、ご馳走になるぶんは、ちゃんとメニュー作りに協力しないとね～」"
translation = "「회장님, 얻어먹는 만큼 제대로 메뉴 만들기에 협력해야 해~」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「それでは、２人分を持ってきます」"
translation = "「그러면, 2인분을 가져오겠습니다」"

[[dialogue]]
speaker = "unk"
original = "しばらくして、蛍火の持ってきてくれたデザートを俺も試食してみる。"
translation = "잠시 후, 호타루비가 가져다준 디저트를 나도 시식해 본다."

[[dialogue]]
speaker = "unk"
original = "すごく美味しいと思うけど？"
translation = "굉장히 맛있다고 생각하는데?"

[[dialogue]]
speaker = "unk"
original = "……わからない"
translation = "……모르겠어"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「サランもとっても美味しいと思うんだけどね～」"
translation = "「사란도 정말 맛있다고 생각하는데 말이야~」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「ですが……サランさんが『美食酔い』になっていません」"
translation = "「하지만…… 사란 선배가 『미식 취기』 상태가 되지 않았어요」"

[[dialogue]]
speaker = "unk"
original = "サランの美食酔い。"
translation = "사란의 미식 취기."

[[dialogue]]
speaker = "unk"
original = "美味しい料理を食べると、サランはまるでお酒によったようになってしまう現象だ。"
translation = "맛있는 요리를 먹으면, 사란은 마치 술에 취한 것처럼 되어버리는 현상이다."

[[dialogue]]
speaker = "unk"
original = "それが発動する気配がないことを考えると、やはりこの料理には何か問題があるのかもしれない。"
translation = "그것이 발동할 기미가 없는 것을 생각하면, 역시 이 요리에는 뭔가 문제가 있을지도 모른다."

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「あ……もしかしたら、季節感が足りないのかも……」"
translation = "「아…… 어쩌면 계절감이 부족한 걸지도……」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「一応、夏用のメニューにはしているのですが……」"
translation = "「일단 여름용 메뉴로 하고는 있습니다만……」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「かき氷にスムージー、フローズンヨーグルトに水ようかん……確かに夏メニューなんだけど……」"
translation = "「빙수에 스무디, 프로즌 요거트에 미즈요칸…… 확실히 여름 메뉴긴 한데……」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「これをもっともっーと、夏っぽくするの。そうしたらもっと美味しく食べられると思うよ～♪」"
translation = "「이걸 좀 더 좀 더~ 여름 느낌 나게 하는 거야. 그러면 더 맛있게 먹을 수 있을 것 같아~♪」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「なるほど……夏っぽく、ですか……何かいいアイデアはありますか？」"
translation = "「과연…… 여름 느낌, 인가요…… 뭔가 좋은 아이디어는 있나요?」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「うーん……」"
translation = "「으음……」"

[[dialogue]]
speaker = "unk"
original = "サランがしばらく考え込む。"
translation = "사란이 잠시 생각에 잠긴다."

[[dialogue]]
speaker = "unk"
original = "やがてパッと表情を明るくして、ポンと手を打った。"
translation = "이윽고 팟 하고 표정을 밝게 하며, 퐁 하고 손뼉을 쳤다."

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「そうだ、いいことを思いついた♪\u3000会長ちゃん、今からプールに行こ～♪」"
translation = "「맞다, 좋은 게 생각났어♪ 회장님, 지금부터 수영장에 가자~♪」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「えっ、どうして急に！？」"
translation = "「엣, 왜 갑자기!?」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「夏っぽい格好で夏っぽいことをしていたら、いいアイデアが浮かぶかもって思ったの～」"
translation = "「여름 느낌 나는 옷차림으로 여름 느낌 나는 일을 하고 있으면, 좋은 아이디어가 떠오를지도 모른다고 생각했어~」"

[[dialogue]]
speaker = "unk"
original = "いいアイデアかもしれない！"
translation = "좋은 아이디어일지도 몰라!"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「でしょう？\u3000それじゃ蛍火ちゃん、ちょっと出かけてくるね～」"
translation = "「그렇지? 그럼 호타루비 짱, 잠깐 다녀올게~」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「お、お願いします」"
translation = "「부, 부탁드립니다」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ぽよっ♪\u3000やっぱり水着になった方が、夏っぽいデザートのイメージが浮かびやすいかも～♪」"
translation = "「뽀요♪ 역시 수영복을 입는 편이 여름 느낌 나는 디저트 이미지가 떠오르기 쉬울지도~♪」"

[[dialogue]]
speaker = "unk"
original = "サランが無邪気にはしゃぐたびに、サランのたわわなものがぷるんぷるんと揺れる。"
translation = "사란이 천진난만하게 들뜰 때마다, 사란의 풍만한 것이 출렁출렁 흔들린다."

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ぽよ？\u3000会長ちゃん、どうしたのかな～？」"
translation = "「뽀요? 회장님, 왜 그래~?」"

[[dialogue]]
speaker = "unk"
original = "な、なんでもないよ"
translation = "아, 아무것도 아니야"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「えへへ、おかしな会長ちゃんだね～」"
translation = "「에헤헤, 이상한 회장님이네~」"

[[dialogue]]
speaker = "unk"
original = "とっさに視線をそらしたおかげでサランには気付かれなかったみたいだ。"
translation = "황급히 시선을 돌린 덕분에 사란에게는 들키지 않은 모양이다."

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「水着になって気分は出たけど、まだまだインスピレーションが足りないよ～」"
translation = "「수영복을 입어서 기분은 냈지만, 아직 영감이 부족해~」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「やっぱり水に入って泳いだ方が、いいアイデア浮かぶのかな？\u3000でもサラン、泳げないし……」"
translation = "「역시 물에 들어가서 수영을 하는 게 좋은 아이디어가 떠오르려나? 하지만 사란, 수영 못 하고……」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「そうだ会長ちゃん♪\u3000サランが上手く泳げるように教えて欲しいの～♪」"
translation = "「맞다 회장님♪ 사란이 잘 수영할 수 있게 가르쳐 줬으면 좋겠어~♪」"

[[dialogue]]
speaker = "unk"
original = "そういって腕に抱きついてくるサラン。"
translation = "그렇게 말하며 팔에 매달려 오는 사란."

[[dialogue]]
speaker = "unk"
original = "弾力が腕に押し付けられて、いやでも煩悩をかきたてられてしまう。"
translation = "탄력이 팔에 눌려서, 싫어도 번뇌가 자극되어 버린다."

[[dialogue]]
speaker = "unk"
original = "サランは無自覚にやってるんだろうけど──俺は理性を保つために全力を傾けなければならなかった。"
translation = "사란은 무의식적으로 하는 거겠지만── 나는 이성을 유지하기 위해 전력을 다해야 했다."

