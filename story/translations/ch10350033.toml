[[dialogue]]
speaker = "unk"
original = "第３話,セナリィウサギの看病,P"
translation = "제3화, 세나리 토끼의 간병, P"

[[dialogue]]
speaker = "unk"
original = "季節の変わり目だろうか、風邪をひいてしまったみたいだ。"
translation = "환절기 때문일까, 감기에 걸려 버린 모양이다."

[[dialogue]]
speaker = "unk"
original = "星徒会メンバーに仕事の指示をして休んでいたら、午後になって来客がやってきた──"
translation = "성도회 멤버들에게 업무 지시를 내리고 쉬고 있으려니, 오후가 되어 손님이 찾아왔다──"

[[dialogue]]
speaker = "セナリィ"
original = "「会長様。風邪をひいたと聞いて、お見舞いに来ましたわ。お加減はいかがです？」"
translation = "「회장님. 감기에 걸리셨다고 들어서, 병문안을 왔어요. 몸 상태는 어떠신가요?」"

[[dialogue]]
speaker = "unk"
original = "まだちょっとだるいかな……"
translation = "아직 좀 나른하려나……"

[[dialogue]]
speaker = "unk"
original = "熱はだいぶ下がったけど"
translation = "열은 꽤 내렸지만"

[[dialogue]]
speaker = "セナリィ"
original = "「そうでしたか。では私が看病いたしますわ。薬と食べ物も買ってきましたし」"
translation = "「그러셨군요. 그럼 제가 간병해 드릴게요. 약이랑 먹을 것도 사 왔으니까요」"

[[dialogue]]
speaker = "セナリィ"
original = "「……風邪を<ruby>伝染したら<rt>うつしたら</rt></ruby>まずい？\u3000何を仰っているんですの、病人は自分のことだけ考えていればいいんですわ」"
translation = "「……감기를 옮기면 곤란하다고요? 무슨 말씀을 하시는 건가요, 환자는 자기 자신만 생각하면 되는 거예요」"

[[dialogue]]
speaker = "セナリィ"
original = "「心配はご無用。私、昔から体だけは丈夫ですので。傭兵時代から風邪一つひいたことありませんわ！」"
translation = "「걱정은 필요 없어요. 저, 예전부터 몸 하나는 튼튼하거든요. 용병 시절부터 감기 한 번 걸린 적 없답니다!」"

[[dialogue]]
speaker = "unk"
original = "セナリィ……ありがとう"
translation = "세나리…… 고마워"

[[dialogue]]
speaker = "セナリィ"
original = "「さぁさぁ会長様。ちゃんと横になっていてください？\u3000今から私がリンゴを剥いて差し上げますわ！」"
translation = "「자자 회장님. 제대로 누워 계시겠어요? 지금부터 제가 사과를 깎아 드릴게요!」"

[[dialogue]]
speaker = "セナリィ"
original = "「食欲はあるみたいですわね。安心しました」"
translation = "「식욕은 있으신 모양이네요. 안심했어요」"

[[dialogue]]
speaker = "セナリィ"
original = "「氷枕も取り替えましたし、汗も拭き終わりましたが……まだ何かリクエストはございまして？」"
translation = "「얼음 주머니도 갈아 드렸고, 땀도 다 닦아 드렸습니다만…… 아직 다른 요청 사항은 있으신가요?」"

[[dialogue]]
speaker = "セナリィ"
original = "「私たちは恋愛パートナーなのですから遠慮はいりません。貴方が元気になれることなら、何でもお願いを聞いて差し上げますわ！」"
translation = "「우리는 연애 파트너니까 사양할 필요 없어요. 당신이 기운을 차릴 수 있는 일이라면, 뭐든지 부탁을 들어 드릴게요!」"

[[dialogue]]
speaker = "unk"
original = "……だったらお願いがあるんだけど"
translation = "……그렇다면 부탁이 하나 있는데"

[[dialogue]]
speaker = "セナリィ"
original = "「ええ。何なりと。傭兵に二言はありません」"
translation = "「네. 무엇이든. 용병에게 두말은 없어요」"

[[dialogue]]
speaker = "unk"
original = "バニーガールのセナリィが見てみたい"
translation = "바니걸 차림의 세나리가 보고 싶어"

[[dialogue]]
speaker = "セナリィ"
original = "「ホワイ！？\u3000ぜんぜん風邪とも看病とも関係ありませんわっ！？」"
translation = "「화이!? 전혀 감기나 간병이랑 상관없잖아요!?」"

[[dialogue]]
speaker = "unk"
original = "きっと元気が出ると思うんだ……"
translation = "분명 기운이 날 거라고 생각해……"

[[dialogue]]
speaker = "unk"
original = "恋人の可愛い姿を見たら……"
translation = "연인의 귀여운 모습을 보면……"

[[dialogue]]
speaker = "セナリィ"
original = "「そんな真面目な顔でなんと不真面目なことを……男の子って本当におバカですわね」"
translation = "「그런 진지한 얼굴로 어쩜 그렇게 불성실한 소리를…… 남자애란 정말 바보군요」"

[[dialogue]]
speaker = "セナリィ"
original = "「まあ、着替えたくらいで会長様のお加減がよくなるなら……やってあげてもよいですが」"
translation = "「뭐, 옷을 갈아입는 정도로 회장님의 몸 상태가 좋아진다면…… 해 드릴 수도 있지만요」"

[[dialogue]]
speaker = "セナリィ"
original = "「いいですか？\u3000看病の時にウサギの格好になっただなんて、他言無用ですわよ？\u3000特にマインには！\u3000では──変身します！」"
translation = "「알겠나요? 간병할 때 토끼 차림이 되었다니, 다른 사람에겐 비밀이에요? 특히 마인에게는! 그럼── 변신하겠습니다!」"

[[dialogue]]
speaker = "セナリィ"
original = "「──こんなのでいいんですの？\u3000まったく、服を着替えたくらいで元気が出れば医者はいりませんわ」"
translation = "「──이런 거면 되나요? 정말이지, 옷을 좀 갈아입었다고 기운이 난다면 의사는 필요 없겠어요」"

[[dialogue]]
speaker = "unk"
original = "──元気出てきた！！"
translation = "──기운이 솟아나!!"

[[dialogue]]
speaker = "セナリィ"
original = "「単純すぎません！？\u3000ああもうっ、起き上がるんじゃありませんわ！」"
translation = "「너무 단순하잖아요!? 아아 정말, 일어나지 마세요!」"

[[dialogue]]
speaker = "セナリィ"
original = "「ほら。夜は仕事が入っていますが、それまでは傍にいて差し上げますわ。しっかり養生しなさい」"
translation = "「자요. 밤에는 일이 잡혀 있지만, 그때까지는 곁에 있어 드릴게요. 푹 요양하세요」"

[[dialogue]]
speaker = "セナリィ"
original = "「──おでこを撫でてあげたら落ち着くんですの？\u3000はぁ……お風邪を召した会長様は、ずいぶんと甘えん坊ですわ」"
translation = "「──이마를 쓰다듬어 주면 진정이 되나요? 하아…… 감기에 걸린 회장님은, 꽤나 어리광쟁이군요」"

[[dialogue]]
speaker = "セナリィ"
original = "「なでなで、なでなで……<emoji=heart04>」"
translation = "「쓰담쓰담, 쓰담쓰담……<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「私にここまでさせたんです。早く元気にならないとダメですわよ……ふふっ<emoji=heart04>」"
translation = "「저에게 여기까지 하게 만들었으니까요. 빨리 기운 차리지 않으면 안 돼요…… 후훗<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「では、そろそろ<ruby>お暇<rt>おいとま</rt></ruby>いたしますわね」"
translation = "「그럼, 슬슬 물러가 볼게요」"

[[dialogue]]
speaker = "セナリィ"
original = "「もう……そんな寂しそうな顔しないでほしいですわ。さっきまでずっと傍にいたじゃありませんか。仕方ありませんわね……」"
translation = "「정말…… 그런 쓸쓸한 표정 짓지 않았으면 좋겠어요. 방금 전까지 계속 곁에 있었지 않나요. 어쩔 수 없네요……」"

[[dialogue]]
speaker = "セナリィ"
original = "「ん……ちゅっ<emoji=heart04>」"
translation = "「음…… 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "風邪が伝染っちゃうよ、セナリィ"
translation = "감기 옮아 버려, 세나리"

[[dialogue]]
speaker = "unk"
original = "キスなんてしたら……！？"
translation = "키스 같은 걸 하면……!?"

[[dialogue]]
speaker = "セナリィ"
original = "「あら。人に伝染せば治るっていうじゃありませんか……なんて。私は風邪なんて引きませんから、ご心配なさらず」"
translation = "「어머. 남에게 옮기면 낫는다는 말도 있지 않나요…… 농담이에요. 저는 감기 같은 거 안 걸리니까, 걱정 마세요」"

[[dialogue]]
speaker = "セナリィ"
original = "「私がしたかっただけですわ。会長様とお会いして、何もなく帰るのは寂しいですし」"
translation = "「제가 하고 싶었을 뿐이에요. 회장님과 만났는데, 아무 일도 없이 돌아가는 건 쓸쓸하니까요」"

[[dialogue]]
speaker = "セナリィ"
original = "「早く体を治して、学園でお会いいたしましょう。会長様？」"
translation = "「얼른 몸 나아서, 학원에서 만나요. 회장님?」"

[[dialogue]]
speaker = "unk"
original = "翌日。セナリィの献身的な看病が効いたのか、俺の体調はすっかり良くなっていた。"
translation = "다음 날. 세나리의 헌신적인 간병이 효과가 있었는지, 내 컨디션은 말끔히 좋아져 있었다."

[[dialogue]]
speaker = "unk"
original = "お礼も兼ねてセナリィを朝食に誘ってみよう。そう思って電話をかけたのだが──"
translation = "감사 인사도 겸해서 세나리를 아침 식사에 초대해 보자. 그렇게 생각해서 전화를 걸었습니다만──"

[[dialogue]]
speaker = "セナリィ"
original = "『ごほっ！\u3000ごほっ！\u3000か、会長様ですの……！？』"
translation = "『콜록! 콜록! 회, 회장님인가요……!?』"

[[dialogue]]
speaker = "unk"
original = "今度は俺が看病に行くよ！！"
translation = "이번엔 내가 간병하러 갈게!!"

[[dialogue]]
speaker = "unk"
original = "伝染ってるじゃないか！？"
translation = "옮아 버렸잖아!?"

[[dialogue]]
speaker = "セナリィ"
original = "『そ、そうしていただけると……ヒマワリたちには休みを出しているので、今日は私１人なんです……げほっ！』"
translation = "『그, 그렇게 해 주신다면…… 히마와리들에게는 휴가를 줘서, 오늘은 저 혼자거든요…… 게흑!』"

[[dialogue]]
speaker = "unk"
original = "今度は俺が女体化バニーでお見舞いに！"
translation = "이번엔 내가 여체화 바니걸로 병문안을!"

[[dialogue]]
speaker = "unk"
original = "そうだ、効果ばっちりだったから……"
translation = "그래, 효과가 확실했으니까……"

[[dialogue]]
speaker = "セナリィ"
original = "『要らねぇですわよ！？\u3000普通の格好で来なさい！！』"
translation = "『필요 없어요!? 평범한 차림으로 오세요!!』"

[[dialogue]]
speaker = "unk"
original = "冗談が言えるくらいには症状が軽いようで安心した。早く薬と食べ物を買って、ゴールデングースの事務所へ向かおう……！"
translation = "농담을 할 수 있을 정도로 증상이 가벼운 것 같아 안심했다. 빨리 약과 먹을거리를 사서 골든 구스의 사무소로 향하자……!"

