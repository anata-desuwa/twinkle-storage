[[dialogue]]
speaker = "unk"
original = "合宿１日目の夜。"
translation = "합숙 첫날 밤."

[[dialogue]]
speaker = "unk"
original = "テントの前でランプの火を灯して待っていると、温泉から上がった２人が戻ってきた――"
translation = "텐트 앞에서 램프 불을 밝히고 기다리고 있자, 온천에서 올라온 두 사람이 돌아왔다――"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふぅ、いいお湯だったわ～」"
translation = "「후우, 좋은 물이었어~」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「汗を流して、サッパリ爽快です」"
translation = "「땀을 흘리고 나니 개운하고 상쾌합니다」"

[[dialogue]]
speaker = "unk"
original = "２人共、おかえり～"
translation = "둘 다 어서 와~"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「会長くん、ただいま～♪」"
translation = "「회장군, 다녀왔어~♪」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……さて、食事も終えて、お風呂にも入りましたし、後はもう寝るだけですね」"
translation = "「……자, 식사도 마쳤고 목욕도 했으니, 남은 건 이제 자는 것뿐이네요」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「食事といえば、魚を焼いて食べるだけだったのに、凄く美味しく感じたわ」"
translation = "「식사라고 하니, 물고기를 구워 먹었을 뿐인데 굉장히 맛있게 느껴졌어」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「自分で釣った魚だからかしら？\u3000自給自足ってこういうことなんだって、少し実感出来た感じがするわ～」"
translation = "「직접 낚은 물고기라 그런 걸까? 자급자족이라는 게 이런 거구나 하고 조금 실감한 느낌이 들어~」"

[[dialogue]]
speaker = "unk"
original = "サバイバルの醍醐味ですね"
translation = "서바이벌의 묘미죠"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「私も釣りは好きですが、釣った魚を食べるという体験は今回が初めてでした」"
translation = "「저도 낚시는 좋아하지만, 잡은 물고기를 먹는다는 체험은 이번이 처음이었습니다」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふっ♪\u3000魚が上手く焼けなくて焦がしちゃったアナちゃん、可愛かったわ～」"
translation = "「후훗♪ 물고기를 잘 못 구워서 태워 버린 아나 짱, 귀여웠어~」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そ、そのことはもう、いいじゃないですか……」"
translation = "「그, 그 일은 이제 됐잖아요……」"

[[dialogue]]
speaker = "unk"
original = "料理が苦手なのは盲点だったな"
translation = "요리가 서툰 건 맹점이었네"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「か、会長まで……誰しも弱点の１つくらいあるものです。むぅ……」"
translation = "「회, 회장님까지…… 누구에게나 약점 하나 정도는 있는 법입니다. 무우……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「明日も魚を取って食べることになるだろうし、釣りを教えて貰った代わりに、今度は私が上手な焼き方を教えてあげるわね♪」"
translation = "「내일도 물고기를 잡아서 먹게 될 테고, 낚시를 배운 대신 이번에는 내가 능숙하게 굽는 법을 가르쳐 줄게♪」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「こうなったら、最終日までには魚を焦がさないようになってみせます」"
translation = "「이렇게 된 이상, 마지막 날까지는 물고기를 태우지 않게 되어 보이겠어요」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ん……ふわぁ～」"
translation = "「음…… 후아~」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……すみません。話していたら、ちょっと眠くなってきてしまいました……」"
translation = "「……죄송합니다. 이야기하다 보니 조금 졸려졌습니다……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そしたら、明日もまたあるし、今日はここまでにして寝ましょうか」"
translation = "「그럼 내일도 있으니까 오늘은 여기까지 하고 자러 갈까」"

[[dialogue]]
speaker = "unk"
original = "そうですね。じゃあ、また明日"
translation = "그렇네요. 그럼 내일 봐요"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あら、会長くんは別のテントの方に行っちゃうの？」"
translation = "「어라, 회장군은 다른 텐트로 가 버리는 거야?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「――男だから？\u3000え～、そんな固いこと言わずに、一緒のテントで寝ればいいのに～」"
translation = "「――남자라서? 에~ 그렇게 딱딱한 소리 하지 말고, 같은 텐트에서 자면 좋을 텐데~」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「いや、さすがに異性同士が１つのテント内で寝るのは、色々と問題があるかと……」"
translation = "「아니, 역시 이성끼리 한 텐트 안에서 자는 건 여러모로 문제가 있다고 봅니다……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「お姉ちゃん、寂しいわ～」"
translation = "「언니는 외로워~」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ほら、サーシャ先輩。同性の私とは一緒のテントですから」"
translation = "「자, 사샤 선배. 동성인 저와는 같은 텐트니까요」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「――それでは会長、おやすみなさい」"
translation = "「――그러면 회장님, 안녕히 주무세요」"

[[dialogue]]
speaker = "unk"
original = "そうして俺は、２人とは別のテントで眠っていたのだが……"
translation = "그렇게 나는 두 사람과는 다른 텐트에서 잠들었지만……"

[[dialogue]]
speaker = "unk"
original = "夜中に何やら物音がして、目が覚めると――"
translation = "밤중에 무언가 소리가 나서 눈을 뜨자――"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ん～……お手洗いから、今戻りました……」"
translation = "「음~…… 화장실에서 이제 막 돌아왔습니다……」"

[[dialogue]]
speaker = "unk"
original = "アナ？\u3000どうしてこっちのテントに……？"
translation = "아나? 어째서 이쪽 텐트에……?"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「サーシャ先輩、横失礼しますね……」"
translation = "「사샤 선배, 옆에 좀 실례할게요……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「改めて、おやすみなさい……むにゃむにゃ……」"
translation = "「다시 한번, 안녕히 주무세요…… 우냐우냐……」"

[[dialogue]]
speaker = "unk"
original = "まさか、寝ぼけてテント間違えてる……！？"
translation = "설마, 잠결에 텐트를 착각하고 있어……!?"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ん～、私の抱き枕……どこ……」"
translation = "「음~ 내 다키마쿠라…… 어디……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ん……♪\u3000ありました……」"
translation = "「음……♪ 찾았다……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「温かくて安心します……ふぅ……すぅ……」"
translation = "「따뜻해서 안심돼요…… 후우…… 수우……」"

[[dialogue]]
speaker = "unk"
original = "ぐおぉ……女の子特有のいい匂いが……！"
translation = "구오오…… 여자아이 특유의 좋은 냄새가……!"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「失礼しま～す」"
translation = "「실례하겠습니~다」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あらあら♪\u3000声がするから来てみたら、面白いことになってるわね～」"
translation = "「어머어머♪ 목소리가 들려서 와봤더니, 재미있는 상황이 되어 있네~」"

[[dialogue]]
speaker = "unk"
original = "サーシャさん！？\u3000こ、これには理由が――"
translation = "사샤 씨!? 이, 이건 이유가――"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふっ、慌てなくても大丈夫よ。分かってるから」"
translation = "「후훗, 당황하지 않아도 괜찮아. 다 알고 있으니까」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「アナちゃんが寝ぼけて、こっちのテントに入ってきちゃったんでしょう？」"
translation = "「아나짱이 잠결에 이쪽 텐트로 들어와 버린 거지?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「この前の合宿の時にも、私のところに潜り込んできて、そのまま寝ちゃったことがあったのよね～」"
translation = "「저번 합숙 때도 내 쪽으로 파고들어 와서 그대로 잠들어 버린 적이 있었거든~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「というわけで、よいしょっと♪」"
translation = "「그런 고로, 영차♪」"

[[dialogue]]
speaker = "unk"
original = "ちょっ、なんでサーシャさんまで隣に！？"
translation = "잠깐, 왜 사샤 씨까지 옆에!?"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「え？\u3000だって、アナちゃんがこっちで寝てたら、私が１人きりで寂しくなっちゃうわ～」"
translation = "「어? 그치만 아나짱이 여기서 자면 나 혼자 남아서 외로워지는걸~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「だから、こうなった以上、皆で川の字になって寝ればいいんじゃないかな～と思って♪」"
translation = "「그러니까 이렇게 된 이상, 다 같이 나란히 누워서 자면 좋지 않을까~ 싶어서♪」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「――異性同士だからマズいって？\u3000う～ん、そうね～」"
translation = "「――이성끼리라 곤란하다고? 으음, 그렇네~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あっ♪\u3000でも会長くんとアナちゃんをこのまま２人きりにするよりは、３人の方が安全じゃないかしら？」"
translation = "「앗♪ 하지만 회장군이랑 아나짱을 이대로 둘만 두는 것보다는, 셋이 있는 게 더 안전하지 않을까?」"

[[dialogue]]
speaker = "unk"
original = "明らかに今思い付いて言いましたよね！？"
translation = "분명히 방금 생각나서 말한 거죠!?"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あらあら、うふふ♪\u3000それじゃあ、おやすみなさい～」"
translation = "「어머어머, 우후후♪ 그럼 안녕히 주무세요~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「……ほら、アナちゃんが起きちゃうから、会長くんも静かにしないとダメよ～」"
translation = "「……자, 아나짱이 깨버릴 테니까 회장군도 조용히 해야 해~」"

[[dialogue]]
speaker = "unk"
original = "結局、強引に押し切られる形で、そのまま３人で寝ることになったのだが――"
translation = "결국 억지로 밀어붙여지는 형태로 그대로 셋이서 자게 되었습니다만――"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「すやすや……うふふ……<emoji=heart04>」"
translation = "「새근새근…… 우후후…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "サーシャさんも抱き着き癖があるとは……！"
translation = "사샤 씨도 껴안는 버릇이 있을 줄이야……!"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「いい子いい子……♪」"
translation = "「착하지 착해……♪」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「んふふ……お姉ちゃんが、ぎゅ～ってして、よしよししちゃう……<emoji=heart04>」"
translation = "「응후후…… 언니가 꼬옥~ 해주고 쓰담쓰담 해줄게…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "せ、背中に柔らかくて大きな感触が……！"
translation = "드, 등 뒤에 부드럽고 커다란 감촉이……!"

[[dialogue]]
speaker = "unk"
original = "うおぉ……耐えるんだ俺……！"
translation = "우오오…… 참는 거다 나……!"

[[dialogue]]
speaker = "unk"
original = "翌朝――"
translation = "다음 날 아침――"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ん……朝……？」"
translation = "「음…… 아침……?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「あ、会長……おはようございます……って、はわわ！？\u3000会長！？」"
translation = "「아, 회장…… 안녕하세요…… 앗, 하와와!? 회장!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「な、何故会長がここに……？\u3000いや、ここは……会長のテントの中……？」"
translation = "「왜, 왜 회장이 여기에……? 아니, 여기는…… 회장의 텐트 안……?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「も、もしかして私はまた寝ぼけて……！？\u3000しかも、会長を抱き枕にして……！」"
translation = "「호, 혹시 제가 또 잠결에……!? 게다가 회장을 다키마쿠라 삼아서……!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「うぅぅ……まさか普段抱き枕を愛用していることを、会長に知られてしまうとは……」"
translation = "「으으으…… 설마 평소에 다키마쿠라를 애용하고 있다는 걸 회장에게 들키다니……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「穴があったら入りたいです……あぅ……」"
translation = "「쥐구멍이라도 있으면 들어가고 싶어요…… 아으……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「――って、会長？\u3000大丈夫ですか？\u3000何だか様子が……」"
translation = "「――그보다 회장? 괜찮으세요? 왠지 상태가……」"

[[dialogue]]
speaker = "unk"
original = "ある意味、サバイバルだった……ガクリ"
translation = "어떤 의미로는 서바이벌이었다…… 가쿠리"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「え、会長！？\u3000しっかりして下さい、会長～～～！？」"
translation = "「에, 회장!? 정신 차리세요, 회장~~~!?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ん……」"
translation = "「음……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふわぁ～……アナちゃん、おはよ～……って、あら？」"
translation = "「후아~…… 아나짱, 안녕~…… 어라?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「２人共、どうしたの？」"
translation = "「둘 다 무슨 일이야?」"

[[dialogue]]
speaker = "unk"
original = "サーシャさんが何事もなかったかのように起きたところで、俺の意識は完全に寝落ちするのだった。"
translation = "사샤 씨가 아무 일도 없었다는 듯이 일어났을 때, 내 의식은 완전히 끊겨 잠들고 말았다."

