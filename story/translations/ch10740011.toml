[[dialogue]]
speaker = "unk"
original = "第１話,おなか部のグータラお嬢様,P"
translation = "제1화, 오나카부의 게으름뱅이 아가씨, P"

[[dialogue]]
speaker = "パルミエ"
original = "『おねが～いっ！\u3000すぐに誰か来て～！\u3000すごくピンチなのよ～！』"
translation = "『부타~악해! 당장 누가 좀 와줘~! 엄청난 위기라고~!』"

[[dialogue]]
speaker = "unk"
original = "何かあったのかっ！？"
translation = "무슨 일이라도 생긴 건가!?"

[[dialogue]]
speaker = "パルミエ"
original = "「あっ、来てくれたのねっ。誰か知らないけど、そこに置いてあるお水取ってくれないかしらっ。喉が渇いて渇いて仕方なかったのよ～」"
translation = "「앗, 와준 거구나. 누군지 모르겠지만 거기 놓인 물 좀 가져다주지 않겠니. 목이 말라서 견딜 수가 없었거든~」"

[[dialogue]]
speaker = "パルミエ"
original = "「っと危ない！\u3000角待ちなんて味な真似してくれるわね……！\u3000返り討ちにしてあげるわっ……！」"
translation = "「앗 위험해! 코너 대기라니 꽤 제법이잖아……! 역공을 먹여주겠어……!」"

[[dialogue]]
speaker = "unk"
original = "あの……ピンチっていうのは？"
translation = "저기…… 위기라는 건?"

[[dialogue]]
speaker = "パルミエ"
original = "「だから喉がカラカラなのっ。ゲーム中は手を離せないし……！\u3000この位置からじゃ微妙にペットボトルまで手が届かないのよ～！」"
translation = "「그러니까 목이 마르다니까. 게임 중에는 손을 뗄 수 없단 말이야……! 이 위치에선 애매하게 페트병까지 손이 안 닿는단 말이지~!」"

[[dialogue]]
speaker = "パルミエ"
original = "「あ、そうだ。ついでにグラスへ注ぎ直して氷も入れてきて？\u3000あとストローも。プレイ中に飲み物<ruby>呷<rt>あお</rt></ruby>ってられないのよね～」"
translation = "「아, 맞다. 하는 김에 컵에 따라서 얼음도 넣어다 줄래? 아아 빨대도. 플레이 중에 음료를 들이켜고<rt>들이켜고</rt></ruby> 있을 수는 없거든~」"

[[dialogue]]
speaker = "パルミエ"
original = "「って──ちょっとちょっと。急に背を向けてどうしたのよ～？\u3000可愛い私の世話を焼けるのよ～？\u3000そこは感激してご奉仕するところじゃなぁい？」"
translation = "「어라── 잠깐잠깐. 갑자기 등을 돌리고 어딜 가는 거야~? 귀여운 나의 수발을 들 수 있는 거라고~? 거기선 감격해서 봉사해야 하는 거 아냐?」"

[[dialogue]]
speaker = "パルミエ"
original = "「わかったらほーら。お水と氷をグラスに入れて持ってきて？\u3000そのままストローを私の口元まで近づけて～？」"
translation = "「알았으면 자아~. 물이랑 얼음을 컵에 담아서 가져다줘. 그대로 빨대를 내 입가까지 가져다 대고~?」"

[[dialogue]]
speaker = "パルミエ"
original = "「んちゅぅ……ゴクゴクぅ。ぷはぁ、生き返ったわ～」"
translation = "「응츄우…… 꿀꺽꿀꺽. 푸하, 살 것 같네~」"

[[dialogue]]
speaker = "パルミエ"
original = "「ふふ、あなた中々ポイント高いわね～。なんだかんだ言いながらお願いを聞いてくれるなんて旦那様候補にぴったりだわ♪」"
translation = "「후후, 당신 제법 점수가 높은걸~. 이러니저러니 해도 부탁을 들어주다니 남편 후보로 딱이야♪」"

[[dialogue]]
speaker = "パルミエ"
original = "「良かったら名前を──……って、あら？\u3000星徒会長さんじゃない」"
translation = "「괜찮다면 이름을──…… 어라? 성도회장님이잖아」"

[[dialogue]]
speaker = "パルミエ"
original = "「ゲーム画面しか見てなかったから気付かなかったわ。へぇ、近くで見ると結構いい男じゃない♪」"
translation = "「게임 화면만 보느라 몰랐어. 헤에, 가까이서 보니 제법 괜찮은 남자잖아♪」"

[[dialogue]]
speaker = "パルミエ"
original = "「しかも頼まれたら断れないお節介で世話焼きさんなんて。ふふ、ますます旦那様候補にぴったりだわ」"
translation = "「게다가 부탁받으면 거절 못 하는 참견쟁이에 수발러라니. 후후, 점점 더 남편 후보로 딱이네」"

[[dialogue]]
speaker = "パルミエ"
original = "「ねね、会長さん♪\u3000私と結婚するつもりはない？\u3000私、まだ見ぬダーリンを探してこの学園に入学してきたの♪」"
translation = "「네네, 회장님♪ 나랑 결혼할 생각 없어? 나, 아직 보지 못한 달링을 찾아서 이 학원에 입학했거든♪」"

[[dialogue]]
speaker = "パルミエ"
original = "「私の親が政治家でね～。学園を卒業しちゃったら見ず知らずの男と無理やり結婚させられちゃうかもしれないのよ～……」"
translation = "「우리 부모님이 정치인이라서 말이야~. 학원을 졸업해 버리면 생판 모르는 남자랑 억지로 결혼하게 될지도 모른단 말이지~……」"

[[dialogue]]
speaker = "パルミエ"
original = "「新星学園の会長さんってことなら肩書きも十分だろうし♪\u3000親も納得するに違いないわ～」"
translation = "「신성학원의 회장님이라면 직함도 충분할 테고♪ 부모님도 틀림없이 납득할 거야~」"

[[dialogue]]
speaker = "パルミエ"
original = "「それに会長さんが私のダーリンになってくれたら、好きなだけグータラ生活できちゃいそうだし♪」"
translation = "「게다가 회장님이 내 달링이 되어준다면, 마음껏 게으름뱅이 생활을 할 수 있을 것 같고♪」"

[[dialogue]]
speaker = "パルミエ"
original = "「ね、いいでしょ、ダーリン♪\u3000私と結婚しましょ、ダーリン♪\u3000こんなに可愛いお嫁さんと一緒になれるなら最高に幸せじゃない、ダーリン♪」"
translation = "「있지, 좋지 달링♪ 나랑 결혼하자, 달링♪ 이렇게 귀여운 아내와 함께라면 최고로 행복하잖아, 달링♪」"

[[dialogue]]
speaker = "unk"
original = "ちょっ、近いから……！"
translation = "잠깐, 너무 가까워……!"

[[dialogue]]
speaker = "パルミエ"
original = "「あらあら意外と初心なのね？\u3000ちょっとおっぱい押しつけただけで顔真っ赤にしちゃって♪」"
translation = "「어머어머 의외로 순진하네? 가슴 좀 밀어붙였다고 얼굴이 새빨개져서는♪」"

[[dialogue]]
speaker = "パルミエ"
original = "「その子犬っぽさも私好みだわ～。良かった、無事に旦那様候補が見つかって♪」"
translation = "「그 강아지 같은 점도 내 취향이야~. 다행이다, 무사히 남편 후보를 찾아서♪」"

[[dialogue]]
speaker = "パルミエ"
original = "「もちろん私の可愛さなら引く手数多なんだけど♪\u3000選抜するのも面倒臭くてどうしようかと思ってたのよね～」"
translation = "「물론 내 미모라면 데려가려는 사람이 줄을 섰지만♪ 선발하는 것도 귀찮아서 어쩌나 싶었거든~」"

[[dialogue]]
speaker = "パルミエ"
original = "「ということで、これから末永くよろしくね、ダーリン♪\u3000あとお水のおかわり、ちょーだい？」"
translation = "「그런 고로 앞으로 오래오래 잘 부탁해, 달링♪ 그리고 물 한 잔 더, 줄래?」"

[[dialogue]]
speaker = "パルミエ"
original = "「って、ちょっとちょっと。どこに行こうとしてるのよ。ノリが悪いわよ、ダーリン」"
translation = "「어라, 잠깐잠깐. 어디 가려고 하는 거야. 분위기 파악 좀 해, 달링」"

[[dialogue]]
speaker = "パルミエ"
original = "「せっかくだからもう少し親睦を深めましょうよ。夫婦生活は長い会話であるって偉い人も言ってたじゃない」"
translation = "「기왕이면 좀 더 친목을 다지자고. 부부 생활은 긴 대화라고 훌륭한 사람도 말했잖아」"

[[dialogue]]
speaker = "パルミエ"
original = "「……うん？\u3000夫婦以前に私の名前も知らない？\u3000あら、美人の代名詞である私の名前を知らないなんて恥ずかしいわよ？」"
translation = "「……응? 부부 이전에 내 이름도 몰라? 어라, 미인의 대명사인 내 이름을 모르다니 부끄러운 줄 알아야 해?」"

[[dialogue]]
speaker = "パルミエ"
original = "「私はパルミエ・ダックワーズ。ちゃーんと覚えておいて？\u3000あ、緋宮パルミエって名乗っちゃった方がいいかしら？」"
translation = "「나는 팔미에 다쿠아즈. 자알 기억해 둬? 아, 히노미야 팔미에라고 자처하는 편이 좋을까?」"

[[dialogue]]
speaker = "パルミエ"
original = "「って冗談よ、冗談。でも、そうやって照れるところも可愛いわ♪」"
translation = "「라니 농담이야, 농담. 하지만 그렇게 부끄러워하는 점도 귀여워♪」"

[[dialogue]]
speaker = "パルミエ"
original = "「いいから、こっちに来て一緒にゲームでもしましょ？\u3000対戦相手が欲しかったところなのよ～」"
translation = "「됐으니까 이쪽으로 와서 같이 게임이라도 하자. 대전 상대가 필요하던 참이었거든~」"

[[dialogue]]
speaker = "unk"
original = "なんだこの自由人……"
translation = "뭐야 이 자유인은……"

[[dialogue]]
speaker = "パルミエ"
original = "「ふふ、魅力的でしょ？\u3000私、可愛い上に自分の欲求に素直なところが取り柄なの♪」"
translation = "「후후, 매력적이지? 난 예쁜 데다 자기 욕구에 솔직한 게 장점이야♪」"

[[dialogue]]
speaker = "パルミエ"
original = "「面倒臭いことなんてヤダヤダ。一度きりの人生だもの。やりたいことだけやって楽しく過ごしたいじゃない？」"
translation = "「귀찮은 건 싫어싫어. 한 번뿐인 인생인걸. 하고 싶은 것만 하고 즐겁게 지내고 싶지 않아?」"

[[dialogue]]
speaker = "パルミエ"
original = "「遊びたい時に遊んで、寝たい時に寝て、誰かをからかいたい時にからかう。それが人生を謳歌する秘訣よ♪」"
translation = "「놀고 싶을 때 놀고, 자고 싶을 때 자고, 누군가를 놀리고 싶을 때 놀린다. 그게 인생을 구가하는 비결이야♪」"

[[dialogue]]
speaker = "unk"
original = "やっぱりからかってたのか"
translation = "역시 놀리고 있었던 건가"

[[dialogue]]
speaker = "パルミエ"
original = "「ダーリン候補なのは事実よ～？\u3000ひと目見てビビっと来ちゃったし♪\u3000世話焼きっぽいところも気に入っちゃったわ♪」"
translation = "「달링 후보인 건 사실이야~? 첫눈에 찌릿하고 왔거든♪ 남 돌봐주는 거 좋아하는 점도 맘에 들었고♪」"

[[dialogue]]
speaker = "パルミエ"
original = "「そうだ。いっそ星徒会なんて辞めて、おなか部に入らない？\u3000何を隠そうここはおなか部の部室なのよ～」"
translation = "「맞다. 차라리 성도회 같은 건 그만두고 오나카부에 들어오지 않을래? 사실 여기가 오나카부 부실이거든~」"

[[dialogue]]
speaker = "パルミエ"
original = "「簡単に言えば、人助けサークルみたいなものでね。幼馴染み２人と一緒にちょっとしたお悩み相談に乗って回ってるの」"
translation = "「간단히 말하면 남 돕기 동아리 같은 거야. 소꿉친구 두 명이랑 같이 소소한 고민 상담을 들어주러 다니지」"

[[dialogue]]
speaker = "パルミエ"
original = "「ま、働いてるのはもっぱら残りの２人だけどね♪\u3000私はこうして自由気ままにだらだら過ごせる部室が欲しかっただけだから♪」"
translation = "「뭐, 일하는 건 주로 나머지 둘이지만♪ 난 이렇게 자유분방하게 빈둥거릴 부실이 필요했을 뿐이니까♪」"

[[dialogue]]
speaker = "パルミエ"
original = "「そもそも依頼も滅多にこないし。もし入部してくれたら……んっ。こうして四六時中、私と乳繰りあって過ごせちゃうけど♪」"
translation = "「애초에 의뢰도 거의 안 들어오고. 만약 입부해 준다면…… 응. 이렇게 24시간 내내 나랑 꽁냥거리며 보낼 수 있는데♪」"

[[dialogue]]
speaker = "パルミエ"
original = "「ひゃんっ。あらあら本当に照れ屋さんなんだから♪\u3000そんなに慌てて距離を取らなくてもいいのに♪」"
translation = "「햔. 어머어머 정말 부끄럼쟁이라니까♪ 그렇게 허둥지둥 거리를 두지 않아도 되는데♪」"

[[dialogue]]
speaker = "パルミエ"
original = "「なぁに？\u3000もう戻るつもりなの？\u3000ダメよ、もう少しここにいーて。まだまだ私の世話を焼いてくれなきゃ困るわ～」"
translation = "「뭐어? 벌써 돌아가려고? 안 돼, 조금만 더 여기 이~ㅆ어줘. 아직 내 수발을 더 들어주지 않으면 곤란해~」"

[[dialogue]]
speaker = "パルミエ"
original = "「いいから、もう少しここにいなさい？\u3000疲れてるんでしょ？\u3000目の下に大きなクマができてるわよ？」"
translation = "「됐으니까 조금만 더 여기 있으라니까? 피곤하잖아? 눈 밑에 다크서클이 퀭하다고?」"

[[dialogue]]
speaker = "パルミエ"
original = "「私のＳＯＳを聞いて一目散に飛び込んで来る人だもの。大方どんな些細なことにも首を突っ込んで回ってるんじゃない？」"
translation = "「내 SOS를 듣고 한달음에 달려오는 사람인걸. 보나 마나 온갖 사소한 일에도 참견하며 돌아다니고 있겠지?」"

[[dialogue]]
speaker = "パルミエ"
original = "「クマまで作るなんて頑張りすぎよ。星騎士なんて有り余るほどいるんだから、たまには誰かに仕事を押しつけて、グータラ過ごせばいーの」"
translation = "「다크서클까지 만들 정도로 너무 무리하는 거야. 성기사는 남아돌 정도로 많으니까, 가끔은 누구한테 일을 떠넘기고 게으름 좀 피워도 돼~」"

[[dialogue]]
speaker = "パルミエ"
original = "「もしも叱られたら私が離してくれなかったって言えばいいから♪\u3000大人しくだらだらしなさい？\u3000そのうち倒れちゃうわよ？」"
translation = "「만약 혼나면 내가 안 놓아줬다고 말하면 되니까♪ 얌전히 빈둥거리렴? 그러다 쓰러지겠어?」"

[[dialogue]]
speaker = "パルミエ"
original = "「ふふ、なぁに。意外そうな顔して。このくらいの気遣いは当然よ。良い妻っていうのは旦那を大切にするものなんだから♪」"
translation = "「후후, 뭐야. 의외라는 얼굴 하기는. 이 정도 배려는 당연하지. 좋은 아내라는 건 남편을 소중히 여기는 법이니까♪」"

[[dialogue]]
speaker = "パルミエ"
original = "「ということでダーリン、早くお水のおかわり持ってきて～？\u3000あとゲームソフトの入れ替えも頼んだわね♪\u3000それと後でマッサージもおねが～い♪」"
translation = "「그런 고로 달링, 얼른 물 한 잔 더 가져다줘~? 그리고 게임 소프트 교체도 부탁해♪ 아, 나중에 마사지도 부탁해~♪」"

[[dialogue]]
speaker = "パルミエ"
original = "「あらあら。どうして疲れた顔しちゃってるの？\u3000可愛い私にご奉仕できるんだから、そこはむしろ元気になるところじゃない♪」"
translation = "「어라어라. 어째서 지친 얼굴을 하고 있어? 귀여운 나에게 봉사할 수 있는 거니까, 거기선 오히려 기운이 나야 하는 거 아냐♪」"

