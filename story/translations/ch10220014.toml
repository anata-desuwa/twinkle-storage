[[dialogue]]
speaker = "unk"
original = "第４話,モネは作家志望？,P"
translation = "제4화, 모네는 작가 지망?"

[[dialogue]]
speaker = "モネ"
original = "「ウィステリアさん、こっちの作業終わりました～」"
translation = "「위스테리아 씨, 이쪽 작업 끝났어요~」"

[[dialogue]]
speaker = "ウィステリア"
original = "「いつもありがとう、紙屋敷さん。本の修繕も本職の司書より上手だから助かってるわ」"
translation = "「항상 고마워, 카미야시키 양. 책 수선도 본직인 사서보다 능숙해서 도움이 되고 있어」"

[[dialogue]]
speaker = "モネ"
original = "「いえ、私は本に囲まれて幸せですから。むしろもっとお役に立ちたいぐらいです。新星学園を卒業しても司書としてここで働けたらなぁ……」"
translation = "「아니에요, 저는 책에 둘러싸여서 행복하니까요. 오히려 좀 더 도움이 되고 싶을 정도예요. 신성 학원을 졸업해도 사서로서 여기서 일할 수 있다면 좋을 텐데……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ふふ、それは心強いわ。上の人にも言っておくわね」"
translation = "「후후, 그거 든든하네. 윗분들에게도 말해둘게」"

[[dialogue]]
speaker = "モネ"
original = "「ありがとうございます！」"
translation = "「감사합니다!」"

[[dialogue]]
speaker = "モネ"
original = "「あぁ、本がいっぱい……スンスン……本の匂い……もっとぉ……」"
translation = "「아아, 책이 가득해…… 킁킁…… 책 냄새…… 더어……」"

[[dialogue]]
speaker = "ウィステリア"
original = "（ちょっと本が好きすぎるのがなければ完璧なんだけどね……）"
translation = "（조금 책을 너무 좋아하는 점만 없으면 완벽할 텐데 말이야……）"

[[dialogue]]
speaker = "unk"
original = "こんにちは"
translation = "안녕"

[[dialogue]]
speaker = "ウィステリア"
original = "「あらいらっしゃい。最近よく来るわね」"
translation = "「어머, 어서 와. 최근 자주 오네」"

[[dialogue]]
speaker = "モネ"
original = "「会長、こんにちは。この前借りた本、もう読んじゃったんですか？\u3000読むのだんだん早くなってますね」"
translation = "「회장님, 안녕하세요. 요전에 빌린 책, 벌써 다 읽으신 건가요? 읽는 게 점점 빨라지시네요」"

[[dialogue]]
speaker = "unk"
original = "考えられる作品だった"
translation = "생각하게 만드는 작품이었다"

[[dialogue]]
speaker = "モネ"
original = "「ふふ、そうですね。小説の登場人物たちはみんな幸せになろうとしてるのに、それぞれ幸せが違って、自分の幸せって何だろうって考えちゃいます」"
translation = "「후후, 그렇네요. 소설의 등장인물들은 모두 행복해지려고 하는데, 저마다 행복이 달라서, 자신의 행복이란 무엇일까 생각하게 돼요」"

[[dialogue]]
speaker = "モネ"
original = "「次はこの本なんていかがですか？\u3000『地底人の秘儀』というタイトルなんですが、オカルトではなくて本格的なミステリーなんですよ」"
translation = "「다음은 이 책 어떠신가요? 『지저인의 비의』라는 제목인데, 오컬트가 아니라 본격적인 미스터리거든요」"

[[dialogue]]
speaker = "モネ"
original = "「本当に良くできていて、早く読んでもらわないとうっかりネタバレしてしまいそうなくらいです」"
translation = "「정말 잘 만들어져서, 빨리 읽어주시지 않으면 무심코 스포일러를 해버릴 것만 같아요」"

[[dialogue]]
speaker = "モネ"
original = "「そうそう、小説だけじゃなくてルポルタージュ本もおすすめですよ。この『世界ワンコイン飯』は名前通り、各地でワンコインで食べられる食事を集めた本です」"
translation = "「맞아요, 소설뿐만 아니라 르포르타주 서적도 추천해요. 이 『세계 원코인 밥』은 이름 그대로, 각지에서 원코인으로 먹을 수 있는 식사를 모은 책이에요」"

[[dialogue]]
speaker = "モネ"
original = "「物価だけでなく現地の通貨制の影響も受けますし、なんと魔界料理の話もあって非常に興味深い――」"
translation = "「물가뿐만 아니라 현지의 통화제 영향도 받고요, 무려 마계 요리 이야기도 있어서 굉장히 흥미로운――」"

[[dialogue]]
speaker = "モネ"
original = "「あ、今のは完全に趣味の話でしたね。すみません、図書委員のお仕事しないと……」"
translation = "「아, 방금 건 완전히 취미 이야기였네요. 죄송해요, 도서 위원 일을 해야 하는데……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「いつもよく働いてくれてるし、少しぐらいいいんじゃない。それに利用者への対応は図書委員の立派な仕事でしょ？」"
translation = "「항상 열심히 일해주고 있고, 조금 정도는 괜찮지 않아. 게다가 이용객을 응대하는 건 도서 위원의 훌륭한 업무잖아?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「今日はそんなに仕事多くないし私の方でやっておくわ。じゃ、また後でねー」"
translation = "「오늘은 그렇게 일이 많지 않으니까 내가 해둘게. 그럼, 나중에 봐ー」"

[[dialogue]]
speaker = "モネ"
original = "「ありがとうございますっ」"
translation = "「감사합니다」"

[[dialogue]]
speaker = "モネ"
original = "「あれ、その本は……会長のおすすめ？\u3000おお～、それは気になります。大切に読ませてもらいますね」"
translation = "「어라, 그 책은…… 회장님의 추천? 오오~, 그거 신경 쓰이네요. 소중히 읽을게요」"

[[dialogue]]
speaker = "モネ"
original = "「私、会長とこうして本について語り合えて本当に楽しいです。やっぱり新星学園に来て良かったです」"
translation = "「저, 회장님과 이렇게 책에 대해 이야기를 나눌 수 있어서 정말 즐거워요. 역시 신성 학원에 오길 잘했어요」"

[[dialogue]]
speaker = "モネ"
original = "「それで……実は私、会長にお願いしたいことがありまして……」"
translation = "「그래서…… 사실 저, 회장님께 부탁드리고 싶은 게 있어서……」"

[[dialogue]]
speaker = "モネ"
original = "「私にとって全てと言っていいくらい、私は本が好きです。大好きです」"
translation = "「저에게 있어 전부라고 해도 좋을 정도로, 저는 책을 좋아해요. 정말 좋아해요」"

[[dialogue]]
speaker = "モネ"
original = "「だから司書だけじゃなくて、他にもやってみたいことがあって……本を作る側になってみたいんです」"
translation = "「그래서 사서뿐만 아니라, 다른 것도 해보고 싶은 게 있어서…… 책을 만드는 쪽이 되어보고 싶어요」"

[[dialogue]]
speaker = "モネ"
original = "「私が書いた小説、読んでみてもらえませんかっ？」"
translation = "「제가 쓴 소설, 읽어봐 주실 수 없을까요?」"

[[dialogue]]
speaker = "unk"
original = "もちろん"
translation = "물론이지"

[[dialogue]]
speaker = "モネ"
original = "「あ、ありがとうございます。これ、印刷してきたんですけど……うぅ、恥ずかしいっ……」"
translation = "「가, 감사합니다. 이거, 인쇄해 온 건데…… 으으, 부끄러워라……」"

[[dialogue]]
speaker = "unk"
original = "……"
translation = "……"

[[dialogue]]
speaker = "unk"
original = "…………"
translation = "…………"

[[dialogue]]
speaker = "モネ"
original = "「旅行先で偶然出会った男女の恋愛小説なんですけど……ど、どうでしょうか？\u3000」"
translation = "「여행지에서 우연히 만난 남녀의 연애 소설인데…… 어, 어떤가요?」"

[[dialogue]]
speaker = "unk"
original = "こ、これは……"
translation = "이, 이것은……"

[[dialogue]]
speaker = "モネ"
original = "「や、やっぱりダメですかっ？」"
translation = "「여, 역시 안 될까요?」"

[[dialogue]]
speaker = "unk"
original = "すごくいい！"
translation = "굉장히 좋아!"

[[dialogue]]
speaker = "モネ"
original = "「へ？\u3000ほ、本当ですか……？\u3000もしかして気を遣ってほめてくれてるんじゃ……」"
translation = "「헤? 저, 정말인가요……? 혹시 신경 써서 칭찬해 주시는 건 아니……」"

[[dialogue]]
speaker = "unk"
original = "未来の大作家だ！"
translation = "미래의 대작가다!"

[[dialogue]]
speaker = "モネ"
original = "「そこまで！？」"
translation = "「그 정도까지!?」"

[[dialogue]]
speaker = "モネ"
original = "「あ……うぅ……酷評もあり得るかと覚悟していたんですが、そんなにほめられると逆に不安になってしまいます……」"
translation = "「아……우으…… 혹평도 있을 수 있다고 각오하고 있었습니다만, 그렇게 칭찬받으니 오히려 불안해져 버려요……」"

[[dialogue]]
speaker = "モネ"
original = "「でも会長にほめられると嬉しいです……えへへ」"
translation = "「하지만 회장님께 칭찬받으니 기뻐요…… 에헤헤」"

[[dialogue]]
speaker = "モネ"
original = "「嬉しいのと恥ずかしいのがぐちゃぐちゃになって、おかしくなっちゃいそうです……」"
translation = "「기쁜 거랑 부끄러운 게 뒤섞여서, 이상해져 버릴 것 같아요……」"

[[dialogue]]
speaker = "モネ"
original = "「男女の鬱屈した感情や生々しい描写もあえて入れてみたんですけど、会長にいいって言ってもらえて良かったです」"
translation = "「남녀의 울굴한 감정이나 생생한 묘사도 일부러 넣어봤는데, 회장님이 좋다고 말씀해 주셔서 다행이에요」"

[[dialogue]]
speaker = "モネ"
original = "「それならもっと技巧的な表現も使って……ああいやいや、作家のひとりよがりになるのはいけないし……」"
translation = "「그렇다면 좀 더 기교적인 표현도 써서…… 아아 아니아니, 작가의 독선이 되면 안 되고……」"

[[dialogue]]
speaker = "モネ"
original = "「題材はもっと爽やかに……少年少女の部活動とか……いっそもっとドロドロとした愛憎を……でもファンタジーも書いてみたい……」"
translation = "「제재는 좀 더 산뜻하게…… 소년 소녀의 부활동이라든가…… 차라리 좀 더 질척질척한 애증을…… 하지만 판타지도 써보고 싶고……」"

[[dialogue]]
speaker = "モネ"
original = "「ハッ──！？\u3000ひとりの世界に入ってました、ごめんなさい！」"
translation = "「핫──!? 혼자만의 세계에 빠져 있었네요, 죄송합니다!」"

[[dialogue]]
speaker = "モネ"
original = "「あ、原稿は返さなくて大丈夫ですよ。むしろ会長が持っていてください。私の最初の読者として」"
translation = "「아, 원고는 돌려주지 않으셔도 괜찮아요. 오히려 회장님이 가지고 계셔 주세요. 저의 첫 번째 독자로서」"

[[dialogue]]
speaker = "モネ"
original = "「私がデビューして有名になったらお宝原稿になりますから。いえ、してみせます」"
translation = "「제가 데뷔해서 유명해지면 보물 원고가 될 테니까요. 아니, 그렇게 만들어 보이겠어요」"

[[dialogue]]
speaker = "モネ"
original = "「……なんて言うのはおこがましいし恥ずかしいですけど。でも本当の気持ちです」"
translation = "「……라고 말하는 건 가당치도 않고 부끄럽지만요. 하지만 진심이에요」"

[[dialogue]]
speaker = "モネ"
original = "「また小説を書きますので……感想をお願いしますね」"
translation = "「또 소설을 쓸 테니까…… 감상 부탁드릴게요」"

