[[dialogue]]
speaker = "unk"
original = "俺は梨緒と共に、リクリエの使徒・ジグについての記録をまとめていた。"
translation = "나는 리오와 함께, 리크리에의 사도 지그에 대한 기록을 정리하고 있었다."

[[dialogue]]
speaker = "梨緒"
original = "「改めて基本的なことからだ。彼女の本名はレナーテ・<ruby>Ｚ<rt>ジグ</rt></ruby>・サイフリート。元は平行世界ベガの星騎士だ」"
translation = "「다시 한번 기본적인 것부터다. 그녀의 본명은 레나테·Z·자이프리트. 원래는 평행 세계 베가의 성기사다.」"

[[dialogue]]
speaker = "unk"
original = "ジグはアポロの次に現れたリクリエの使徒だ。"
translation = "지그는 아폴로 다음에 나타난 리크리에의 사도다."

[[dialogue]]
speaker = "unk"
original = "彼女はかつて梨緒の仲間だったが、俺たちの前に現れた時は敵として立ちはだかった。"
translation = "그녀는 과거에 리오의 동료였지만, 우리 앞에 나타났을 때는 적이 되어 가로막았다."

[[dialogue]]
speaker = "梨緒"
original = "「私とジグはここアルタイルとは別の世界──平行世界ベガの住人だった」"
translation = "「나와 지그는 이곳 알타이르와는 다른 세계── 평행 세계 베가의 주민이었다.」"

[[dialogue]]
speaker = "梨緒"
original = "「私たちは新星学園の星徒会で、私は副会長、ジグは星徒会長を務めていた」"
translation = "「우리는 신성 학원의 성도회에서, 나는 부회장, 지그는 성도회장을 맡고 있었지.」"

[[dialogue]]
speaker = "梨緒"
original = "「ジグについては私が一番知っているつもりだが、私が把握していないこともあるだろう。君からも教えてくれ」"
translation = "「지그에 대해서는 내가 가장 잘 안다고 자부하지만, 내가 파악하지 못한 것도 있을 거다. 그대도 가르쳐다오.」"

[[dialogue]]
speaker = "unk"
original = "俺と梨緒で過去を振り返りながら、ジグとの戦いを時系列で追っていく。"
translation = "나와 리오가 과거를 회상하며, 지그와의 싸움을 시간순으로 쫓아간다."

[[dialogue]]
speaker = "モンスター"
original = "『グルルルッ！！！』"
translation = "『그르르르!!!』"

[[dialogue]]
speaker = "unk"
original = "アポロとギエルとの戦いが終わり、しばらくした頃、機械でできた竜のような新型モンスターが出現した。"
translation = "아폴로와 기엘과의 싸움이 끝나고 얼마 지나지 않았을 무렵, 기계로 된 용 같은 신형 몬스터가 출현했다."

[[dialogue]]
speaker = "unk"
original = "新型モンスターは従来のモンスターを凌ぐ強敵で、多くの星騎士が苦戦を強いられた。"
translation = "신형 몬스터는 기존의 몬스터를 능가하는 강적으로, 많은 성기사가 고전을 면치 못했다."

[[dialogue]]
speaker = "unk"
original = "後に判明したことだが、このモンスターを生み出したのは、リクリエの使徒となったジグだった。"
translation = "나중에 판명된 사실이지만, 이 몬스터를 만들어낸 것은 리크리에의 사도가 된 지그였다."

[[dialogue]]
speaker = "unk"
original = "つまりこの時すでに、ジグとの戦いは始まっていたのだ。"
translation = "즉, 이때 이미 지그와의 싸움은 시작되어 있었던 것이다."

