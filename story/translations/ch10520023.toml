[[dialogue]]
speaker = "unk"
original = "第３話,ハバネロソースのかき氷,P"
translation = "제3화, 하바네로 소스 빙수, P"

[[dialogue]]
speaker = "unk"
original = "今日も俺とセドナさんは、リゾート結界にやって来ていた。"
translation = "오늘도 나와 세드나 씨는 리조트 결계에 와 있었다."

[[dialogue]]
speaker = "unk"
original = "ただし今日はオフ。アルバイトではなくお休み。泳ぎや日光浴を楽しむバケーションだ。"
translation = "다만 오늘은 오프. 아르바이트가 아니라 휴일. 수영이나 일광욕을 즐기는 바캉스다."

[[dialogue]]
speaker = "セドナ"
original = "「常夏のビーチを年中再現できるというのは、改めて考えても驚異的な星力だな」"
translation = "「상하의 해변을 연중 재현할 수 있다는 건, 다시 생각해도 경이로운 성력이군」"

[[dialogue]]
speaker = "セドナ"
original = "「ここの海はとても心地がいい。時間が許すかぎり、訪れたくなってしまう」"
translation = "「이곳의 바다는 아주 기분이 좋다. 시간이 허락하는 한 계속 방문하고 싶어지는군」"

[[dialogue]]
speaker = "セドナ"
original = "「私は『焔の魔女』の名前のとおり、暑い所が好きでな。基地にある休憩室よりも、リゾート結界の方がずっと羽根を伸ばせる気がする」"
translation = "「나는 『불꽃의 마녀』라는 이름답게 더운 곳을 좋아해서 말이지. 기지에 있는 휴게실보다 리조트 결계 쪽이 훨씬 기지개를 켤 수 있는 기분이 든다」"

[[dialogue]]
speaker = "セドナ"
original = "「こうしてパラソルを挿して寝転ぶだけでも、乙なものだ……」"
translation = "「이렇게 파라솔을 꽂고 누워 있는 것만으로도 운치가 있군……」"

[[dialogue]]
speaker = "unk"
original = "賑やかなのに癒されますね"
translation = "북적거리는데도 힐링 되네요"

[[dialogue]]
speaker = "セドナ"
original = "「ああ、そうだな」"
translation = "「그래, 그렇군」"

[[dialogue]]
speaker = "セドナ"
original = "「……以前までの私なら、騒がしいところでは休めなかったものだが。お前と過ごしているうちに嗜好も少々変わったかもしれん」"
translation = "「……이전의 나라면 시끄러운 곳에서는 쉴 수 없었겠지만. 너와 지내는 사이에 기호도 조금 변했을지도 모르겠군」"

[[dialogue]]
speaker = "セドナ"
original = "「それによくよく見れば、うちの構成員の姿もあちこちに見られる」"
translation = "「게다가 자세히 보니 우리 구성원들의 모습도 여기저기 보이는군」"

[[dialogue]]
speaker = "セドナ"
original = "「せっかく同盟を結んだのだから、リゾート結界も遠慮なく使わせてもらえと指示をしたのだが……ちゃんと楽しめているのなら何よりだ」"
translation = "「어렵게 동맹을 맺었으니 리조트 결계도 아낌없이 사용하라고 지시했다만…… 제대로 즐기고 있다면 다행이군」"

[[dialogue]]
speaker = "unk"
original = "部下の人達も来やすくなったんでしょう"
translation = "부하 분들도 오기 편해졌겠죠"

[[dialogue]]
speaker = "unk"
original = "セドナさんが何度も足を運んでいるから"
translation = "세드나 씨가 몇 번이나 발걸음을 하고 있으니까"

[[dialogue]]
speaker = "セドナ"
original = "「お前に言われたからな。トップが休まねば部下は休めない、と。初めは少し不安だったが、ちゃんと休みを取らせた方が仕事の能率も上がっているようだ」"
translation = "「네가 말했으니까 말이다. 우두머리가 쉬지 않으면 부하는 쉴 수 없다고. 처음엔 조금 불안했지만, 제대로 휴식을 취하게 하는 편이 업무 효율도 오르는 모양이군」"

[[dialogue]]
speaker = "セドナ"
original = "「今後もネビュラの魔女と合同訓練をする機会は多いだろう。互いに実りのある時間を過ごせるよう、よろしく頼むぞ」"
translation = "「앞으로도 네뷸라의 마녀와 합동 훈련을 할 기회는 많겠지. 서로 결실 있는 시간을 보낼 수 있도록 잘 부탁하마」"

[[dialogue]]
speaker = "セドナ"
original = "「……っと、そろそろ昼だな。海の家に何か食べに行くとするか」"
translation = "「……앗, 슬슬 점심이군. 바다의 집에 무언가 먹으러 가기로 할까」"

[[dialogue]]
speaker = "セドナ"
original = "「相変わらず、見事な焼きそばだな。実にうまい」"
translation = "「여전히 훌륭한 야키소바군. 실로 맛있다」"

[[dialogue]]
speaker = "セドナ"
original = "「そして──フフ。この卓上調味料のハバネロソースも素晴らしい。１０周、回しかけることによってさらにうまくなる」"
translation = "「그리고── 후후. 이 탁상 조미료인 하바네로 소스도 훌륭해. 10바퀴 정도 두르면 더욱 맛있어진다」"

[[dialogue]]
speaker = "unk"
original = "相変わらずの辛党ですね……"
translation = "여전히 매운 걸 좋아하시네요……"

[[dialogue]]
speaker = "セドナ"
original = "「相変わらずお前はプレーンで食べるのか。試してみる価値はあるのだがな」"
translation = "「여전히 너는 플레인으로 먹는 건가. 시도해 볼 가치는 있는데 말이지」"

[[dialogue]]
speaker = "セドナ"
original = "「何？\u3000騙されたと思って食べてみたら、舌を焼いた……まだあの時のことを根に持っているのか」"
translation = "「뭐? 속는 셈 치고 먹어봤더니 혀를 데었다고…… 아직도 그때 일을 뒤끝 있게 구는 건가」"

[[dialogue]]
speaker = "セドナ"
original = "「……残念だ。うまいんだがな」"
translation = "「……유감이군. 맛있는데 말이야」"

[[dialogue]]
speaker = "unk"
original = "セドナさんはイメージ通りというか、とにかく辛い物を好む。焼きそばやラーメン、チャーハンなんかにもハバネロソースを振りかけるところを今まで何度も見てきた。"
translation = "세드나 씨는 이미지 그대로랄까, 아무튼 매운 음식을 좋아한다. 야키소바나 라면, 볶음밥 같은 곳에도 하바네로 소스를 뿌리는 모습을 지금까지 몇 번이나 봐왔다."

[[dialogue]]
speaker = "unk"
original = "だが俺は今日、信じられない光景を目の当たりにすることになる──"
translation = "하지만 나는 오늘, 믿을 수 없는 광경을 목격하게 된다──"

[[dialogue]]
speaker = "セドナ"
original = "「なんだ、イチゴのかき氷、いつ頼んだ？\u3000それに２つも……聞くまでもないが、１つは私の分か」"
translation = "「뭐냐, 딸기 빙수는 언제 주문했지? 게다가 두 개나…… 묻지 않아도 알겠지만 하나는 내 몫인가」"

[[dialogue]]
speaker = "セドナ"
original = "「確かに以前、一緒にジェラートを食べたことはあったが……あれは例外だぞ。基本的には私は、甘い物は不得手だ」"
translation = "「확실히 이전에 함께 젤라토를 먹은 적은 있었다만…… 그건 예외다. 기본적으로 나는 단것은 서투르다」"

[[dialogue]]
speaker = "セドナ"
original = "「辛い物を食べた後とはいえ、かき氷のシロップみたいな、甘みの強いものは──」"
translation = "「매운 것을 먹은 뒤라고는 해도, 빙수 시럽 같은 단맛이 강한 것은──」"

[[dialogue]]
speaker = "セドナ"
original = "「……いや待て。今の私にはハバネロソースがある。このイチゴのかき氷に、かけてみるのはどうだ……？」"
translation = "「……아니 기다려 봐라. 지금의 내게는 하바네로 소스가 있다. 이 딸기 빙수에 뿌려보는 건 어떨까……?」"

[[dialogue]]
speaker = "unk"
original = "無しでしょ！？"
translation = "그건 아니죠!?"

[[dialogue]]
speaker = "セドナ"
original = "「いいや、試してみる価値はある。どのみち甘いままでは、食べきれるか怪しい。残すよりはマシだろう」"
translation = "「아니, 시도해 볼 가치는 있다. 어차피 단 채로는 다 먹을 수 있을지 의문이다. 남기는 것보다는 낫겠지」"

[[dialogue]]
speaker = "セドナ"
original = "「というわけで──ハバネロソース、投下だ」"
translation = "「그런 고로── 하바네로 소스, 투하다」"

[[dialogue]]
speaker = "unk"
original = "本当にかけたーーー！？"
translation = "진짜 뿌렸어──!?"

[[dialogue]]
speaker = "unk"
original = "うわあああああああ！？"
translation = "으아아아아아아아!?"

[[dialogue]]
speaker = "セドナ"
original = "「──これでよし。ふむ、見た目はイチゴのかき氷だが……フフ。喉を刺す香りがするな」"
translation = "「──이걸로 됐다. 흠, 겉모습은 딸기 빙수지만…… 후후. 목을 찌르는 향기가 나는군」"

[[dialogue]]
speaker = "セドナ"
original = "「ではいただこう──む！\u3000こ、これは……！？」"
translation = "「그럼 먹어보지── 음! 이, 이것은……!?」"

[[dialogue]]
speaker = "セドナ"
original = "「────うまいな」"
translation = "「────맛있군」"

[[dialogue]]
speaker = "unk"
original = "いやいやいやいや！"
translation = "아니 아니 아니 아니!"

[[dialogue]]
speaker = "セドナ"
original = "「嘘ではない。ひやりとした氷に絡んだハバネロソースが喉を焼く……しかしその奥にわずかに残るイチゴの風味と甘み！\u3000堪えられんうまさだ！」"
translation = "「거짓말이 아니다. 차가운 얼음에 엉킨 하바네로 소스가 목을 태운다…… 하지만 그 안쪽에 미세하게 남는 딸기의 풍미와 단맛! 참을 수 없는 맛이다!」"

[[dialogue]]
speaker = "セドナ"
original = "「ほら魔王。騙されたと思って一口、食べてみろ。あーん、だ」"
translation = "「자, 마왕. 속는 셈 치고 한입 먹어봐라. 아── 해봐」"

[[dialogue]]
speaker = "unk"
original = "もっと美味しそうなやつがいいです……"
translation = "좀 더 맛있어 보이는 게 좋아요……"

[[dialogue]]
speaker = "unk"
original = "あーんするなら、"
translation = "아── 할 거라면,"

[[dialogue]]
speaker = "セドナ"
original = "「だからうまいと言ってるだろう。ほら、あーん」"
translation = "「그러니까 맛있다고 하지 않느냐. 자, 아──」"

[[dialogue]]
speaker = "unk"
original = "あ……あーん……"
translation = "아…… 아──……"

[[dialogue]]
speaker = "セドナ"
original = "「──どうだ。これぞかき氷の新境地と言える味だろう。な？」"
translation = "「──어떠냐. 이것이야말로 빙수의 신경지라고 할 수 있는 맛이지. 그치?」"

[[dialogue]]
speaker = "unk"
original = "からああああああああいいい！！"
translation = "매워어어어어어어어어어!!"

[[dialogue]]
speaker = "unk"
original = "騙されたと思って食べたものって、実はおいしいっていうオチがつくものなんじゃないのか。"
translation = "속는 셈 치고 먹은 게 사실은 맛있었다는 결말이 나야 하는 거 아닌가."

[[dialogue]]
speaker = "unk"
original = "本当にただ辛いだけで『わずかに残るイチゴの甘み』は行方不明状態。"
translation = "정말로 그냥 맵기만 할 뿐 『미세하게 남는 딸기의 단맛』은 행방불명 상태다."

[[dialogue]]
speaker = "セドナ"
original = "「味の分からん奴だ。うむ──やはりうまい。リップルに提案して新メニューにしてもらってはどうだろう……？」"
translation = "「맛을 모르는 녀석이군. 음── 역시 맛있다. 리플에게 제안해서 신메뉴로 만들게 하는 건 어떨까……?」"

[[dialogue]]
speaker = "unk"
original = "そんな不穏なこと呟く、辛党のセドナさんなのだった。"
translation = "그런 불온한 말을 중얼거리는, 매운맛 마니아 세드나 씨였다."

