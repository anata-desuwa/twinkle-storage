[[dialogue]]
speaker = "unk"
original = "第３話,天使に光あれ！,P"
translation = "제3화, 천사에게 빛이 있으라! "

[[dialogue]]
speaker = "unk"
original = "今日も今日とて、ロロットには流星町の案内をしてもらう予定だ。"
translation = "오늘도 어김없이 로롯토에게 유성 마을 안내를 받을 예정이다."

[[dialogue]]
speaker = "unk"
original = "でも、１つだけいつもと大きく違う点があって……。"
translation = "하지만 한 가지 평소와 크게 다른 점이 있어서……."

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「はて……？\u3000こちらの方は、一体どなたでしょう？\u3000なんとなく、知っているような知らないような……」"
translation = "「어라……? 이분은 도대체 누구시죠? 왠지 아는 것 같기도 하고 모르는 것 같기도 하고……」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「守護天使のマグダレナです！\u3000今日はよろしくね♪（ぶるんぶるん）」"
translation = "「수호천사 막달레나입니다! 오늘은 잘 부탁해♪ (출렁출렁)」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「何やら落ち着きがない方ですねぇ」"
translation = "「왠지 침착하지 못한 분이시네요.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ごめんなさい、ようやく自由時間が出来たから、もう嬉しくって（ぶるんぶるん）」"
translation = "「미안해요, 겨우 자유 시간이 생겨서 너무 기쁜 나머지 (출렁출렁)」"

[[dialogue]]
speaker = "unk"
original = "凄く揺れてるね"
translation = "엄청 흔들리고 있네"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「そういえば、マグダレナさんは、新星の会長さんたちが元の世界へ帰る準備をされていたのでは？\u3000もう終わったのでしょうか」"
translation = "「그러고 보니 막달레나 씨는 신성의 회장님들이 원래 세계로 돌아갈 준비를 하고 계셨던 것 아닌가요? 벌써 끝난 건가요?」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「あと少しですね。目処がつきましたので、今日は息抜きをしようと思います」"
translation = "「거의 다 됐어요. 어느 정도 가닥이 잡혀서 오늘은 휴식을 취하려고 해요.」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「おお～、なるほど～。息抜きは大切ですね。ずっと頑張っていては、疲れてしまいますから」"
translation = "「오오~ 그렇군요~. 휴식은 중요하죠. 계속 노력만 해서는 지쳐버리니까요.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「今日はめいっぱい息抜きさせて下さいね♪（ぶるんぶるん）」"
translation = "「오늘은 마음껏 쉬게 해주세요♪ (출렁출렁)」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「しかし、そんなに胸を躍らせてしまうとは……よほど息抜きが楽しみなのですね～」"
translation = "「하지만 그렇게 가슴을 들먹이시다니…… 어지간히 휴식이 기대되나 보네요~」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「守護天使、さま……で、よいのでしょうか？」"
translation = "「수호천사, 님…… 이라고 하면 될까요?」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「そうですよ。なんと守護天使なんです♪」"
translation = "「맞아요. 무려 수호천사랍니다♪」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「むむむ……凄い方のはずなのですが、なぜだかちっともそうは見えないのです……」"
translation = "「으음…… 대단한 분이실 텐데 왜인지 조금도 그렇게 안 보이는 것이예요……」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ふふっ♪\u3000ママと呼んで頂いて構いませんよ」"
translation = "「후훗♪ 엄마라고 불러도 괜찮아요.」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「ママ……？\u3000どういうことなのでしょう」"
translation = "「엄마……? 무슨 뜻인가요.」"

[[dialogue]]
speaker = "unk"
original = "マグダレナさんだから"
translation = "막달레나 씨니까"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「なるほど～。よく分かりませんが……なんだか、あまり深くは触れない方がよさそうですね」"
translation = "「그렇군요~. 잘 모르겠지만…… 왠지 너무 깊게 파고들지 않는 게 좋을 것 같네요.」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「ところで、マグダレナさんが同行するとは思っていなかったのですが、本日の予定はどうしましょう？」"
translation = "「그건 그렇고 막달레나 씨가 동행할 줄은 몰랐는데 오늘 일정은 어떻게 할까요?」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「予定は変えなくていいですよ。私はあくまでついてきただけですので」"
translation = "「일정은 안 바꿔도 돼요. 저는 어디까지나 따라온 것뿐이니까요.」"

[[dialogue]]
speaker = "unk"
original = "ロロットの好きにしていいよ"
translation = "로롯토 마음대로 해도 돼"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「そうですか、わかりました。ええと、それでは……」"
translation = "「그런가요, 알겠습니다. 에또, 그럼……」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ありましたよ！\u3000空き缶ゲットです♪」"
translation = "「여기 있어요! 빈 캔 획득입니다♪」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「どうもなのです。では、こちらの袋にお願いしますね」"
translation = "「고마운 것이예요. 그럼 이 봉투에 넣어주세요.」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「それにしても、わたしが普段は何をしているのかと訊かれたので、ゴミ拾いのボランティアをしているとは答えたのですが……」"
translation = "「그나저나 제가 평소에 뭘 하는지 물어보시기에 쓰레기 줍기 봉사를 하고 있다고 대답은 했습니다만……」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「守護天使さまにゴミ拾いを手伝っていただいて、本当によかったのでしょうか？」"
translation = "「수호천사님께 쓰레기 줍기를 도와달라고 해도 정말 괜찮은 거였을까요?」"

[[dialogue]]
speaker = "unk"
original = "ゴミ拾いは立派な善行だから大丈夫"
translation = "쓰레기 줍기는 훌륭한 선행이니까 괜찮아"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「確かに、それは一理ありますね」"
translation = "「확실히 일리가 있는 말씀이네요.」"

[[dialogue]]
speaker = "unk"
original = "ロロットらしくていいと思う"
translation = "로롯토다워서 좋다고 생각해"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「でも、守護天使さまですよ……？\u3000やはり、ちょっぴり遠い存在というか、恐れ多いというか……」"
translation = "「하지만 수호천사님이시잖아요……? 역시 조금 먼 존재랄까, 황송하달까……」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「そんなことありませんよ」"
translation = "「그렇지 않아요.」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「ひゃあっ！？\u3000いきなり現れてびっくりさせるのはずるいですっ」"
translation = "「히얏!? 갑자기 나타나서 깜짝 놀라게 하는 건 반칙이에요.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「驚かせてごめんなさい。でも、普段より意欲的にボランティアを行うあなたの心の美しさに、私は感動しました」"
translation = "「놀라게 해서 미안해요. 하지만 평소보다 의욕적으로 봉사 활동을 하는 당신의 마음씨에 감동했답니다.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「優しき天使に光あれ～」"
translation = "「자애로운 천사에게 빛이 있으라~」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「ひええぇっ、眩しいです～！\u3000いきなり何をするんですか、もう～」"
translation = "「히에엣, 눈부셔요~! 갑자기 뭐 하시는 거예요, 정말~」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「あれれ？\u3000祝福の光はお気に召しませんでしたか？」"
translation = "「어라라? 축복의 빛이 마음에 안 드셨나요?」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「突然ライブが始まったのかと思ったのです。目がシパシパします～……」"
translation = "「갑자기 라이브가 시작된 줄 알았단 말이에요. 눈이 따끔따끔해요~……」"

[[dialogue]]
speaker = "unk"
original = "俺もシパシパしてる"
translation = "나도 눈이 따끔거려"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「……ごめんなさい、もうしません」"
translation = "「……미안해요, 이젠 안 그럴게요.」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「いえいえ～、怒ったりはしていませんよ。わたしは心が広いですから。それより、マグダレナさんが問題ないなら、このままゴミ拾いを続けましょう」"
translation = "「아뇨아뇨~ 화난 건 아니에요. 저는 마음이 넓으니까요. 그보다 막달레나 씨가 괜찮으시다면 이대로 쓰레기 줍기를 계속하죠.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「はい、この世界のあらゆるゴミを駆逐しましょうね」"
translation = "「네, 이 세상의 모든 쓰레기를 구축해 버리자구요.」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「意外なお宝に遭遇することもありますから、頑張るのです」"
translation = "「의외의 보물을 마주칠 때도 있으니까 힘내는 것이예요.」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「おや？\u3000言ったそばからお宝発見なのです。これは……！」"
translation = "「어라? 말이 떨어지기 무섭게 보물 발견인 것이예요. 이건……!」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「宝箱ですね！」"
translation = "「보물상자네요!」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「ふむ……ただのクッキーの空き缶のようです。でも、模様がきれいかも……」"
translation = "「흠…… 그냥 쿠키 빈 캔인 모양이에요. 하지만 무늬가 예쁠지도……」"

[[dialogue]]
speaker = "unk"
original = "捨てちゃうの？"
translation = "버릴 거야?"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「わたしの鑑定によりますと……これはなかなかいい缶のようですので、特別に、わたしのコレクションに加えることにしましょう」"
translation = "「제 감정에 따르면…… 이건 꽤 좋은 캔인 모양이니 특별히 제 컬렉션에 추가하기로 하죠.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「こちらはどうですか？\u3000捨ててしまうには惜しい逸品ですよ」"
translation = "「이건 어때요? 그냥 버리기엔 아까운 일품이에요.」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「ひえ！\u3000そのビン、中身が入ってるじゃないですか。ばっちいのです……」"
translation = "「히에! 그 병, 내용물이 들어 있잖아요. 지저분한 것이예요……」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「光よ～」"
translation = "「빛이여~」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「また眩しいです～！？」"
translation = "「또 눈부셔요!?」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ご、ごめんなさい、きれいにしようと思って」"
translation = "「미, 미안해요, 깨끗하게 하려다가.」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「いいですか？\u3000ゴミ拾いは、不思議な力に頼ってはいけません。ただ無心で、自らの手足を動かすのです。だってその方が、後で食べるご飯がおいしくなりますからね♪」"
translation = "「잘 들으세요? 쓰레기 줍기는 신비한 힘에 의지해서는 안 돼요. 그저 무심하게 자신의 손발을 움직이는 거예요. 그래야 나중에 먹는 밥이 맛있어지니까요♪」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「はーい♪」"
translation = "「네에♪」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「さあ、ゴミ拾いを続けますよ～！」"
translation = "「자, 쓰레기 줍기 계속할게요~!」"

[[dialogue]]
speaker = "unk"
original = "こうして俺たちは、日が暮れるまで公園のゴミ拾いを続けたのだった。"
translation = "이렇게 우리는 해가 질 때까지 공원의 쓰레기 줍기를 계속하는 것이었다."

