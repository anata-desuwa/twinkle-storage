[[dialogue]]
speaker = "unk"
original = "第４話,可愛い後輩と夢の続き,P"
translation = "제4화, 귀여운 후배와 꿈의 연속, P"

[[dialogue]]
speaker = "unk"
original = "『例の夢』を見てしまった翌日。リーリアは俺と顔を合わせると、真っ赤になって退散、ということを繰り返していた。"
translation = "『그 꿈』을 꾸고 난 다음 날. 리리아는 나와 눈이 마주치면 얼굴이 빨개져서 도망치는 일을 반복하고 있었다."

[[dialogue]]
speaker = "unk"
original = "なので放課後、俺はいつかと同じ空き教室へ、リーリアを呼び出すことにした。"
translation = "그래서 방과 후, 나는 예전과 같은 빈 교실로 리리아를 불러내기로 했다."

[[dialogue]]
speaker = "リーリア"
original = "「セ、センパイ、話って……昨日の夢のことですか……？」"
translation = "「서, 선배, 할 말이란 게…… 어제 꿈 이야기인가요……?」"

[[dialogue]]
speaker = "unk"
original = "俺は頷いて、リーリアに近づき、頭を撫でる。"
translation = "나는 고개를 끄덕이고 리리아에게 다가가 머리를 쓰다듬는다."

[[dialogue]]
speaker = "リーリア"
original = "「あ……センパイ……？」"
translation = "「아…… 선배……?」"

[[dialogue]]
speaker = "unk"
original = "夢のことでそんなに恥ずかしがらなくていい"
translation = "꿈 일로 그렇게 부끄러워하지 않아도 돼."

[[dialogue]]
speaker = "unk"
original = "俺はあの夢を見て、リーリアとは将来、あんな風になれたらいいと思った。"
translation = "나는 그 꿈을 꾸고, 리리아와는 장래에 저런 모습이 되었으면 좋겠다고 생각했다."

[[dialogue]]
speaker = "unk"
original = "だから、そんなに恥ずかしがらなくても大丈夫だと、俺は恋人の頭を優しく撫でながら伝える。"
translation = "그러니 그렇게 부끄러워하지 않아도 괜찮다고, 나는 연인의 머리를 상냥하게 쓰다듬으며 전한다."

[[dialogue]]
speaker = "リーリア"
original = "「あ、ありがとうございます……<emoji=heart04>\u3000センパイがそう思ってくれてたなら、嬉しいです。えへへ<emoji=heart04>」"
translation = "「고, 고맙습니다……<emoji=heart04> 선배가 그렇게 생각해 줬다면 기뻐요. 에헤헤<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リーリアはもじもじと照れながらも、嬉しそうな笑顔を見せてくれた。俺はそこで、夢の中で１つ気になっていたことを尋ねる。"
translation = "리리아는 머뭇머뭇 수줍어하면서도 기쁜 듯한 미소를 보여주었다. 나는 거기서 꿈속에서 한 가지 궁금했던 점을 묻는다."

[[dialogue]]
speaker = "リーリア"
original = "「――夢の中で、私が新星学園の先生になっていたことについて、ですか？」"
translation = "「――꿈속에서 제가 신성 학원의 선생님이 되었던 것에 대해서 말인가요?」"

[[dialogue]]
speaker = "リーリア"
original = "「それについては、夢特有の<ruby>荒唐無稽<rt>こうとうむけい</rt></ruby>な設定というわけじゃなくて……夢の私がそうだったきっかけ、みたいなものがありまして」"
translation = "「그건 꿈 특유의 황당무계한 설정인 게 아니라…… 꿈속의 제가 그랬던 계기 같은 게 있어서요.」"

[[dialogue]]
speaker = "リーリア"
original = "「元旦に羽根突き勝負をした時、私がみんなに、獅子舞さんの技を攻略するコツを教えることになったんですけど……」"
translation = "「원단에 하네츠키 승부를 했을 때, 제가 모두에게 사자춤 씨의 기술을 공략하는 요령을 가르쳐주게 되었는데……」"

[[dialogue]]
speaker = "リーリア"
original = "「そこでみんなから『教え方が上手くて先生みたい』って褒められちゃいまして……それで、先生って選択肢もあるのか～って最近は考えてたんですよね☆」"
translation = "「거기서 모두에게 『가르치는 게 능숙해서 선생님 같다』고 칭찬받았거든요…… 그래서 선생님이라는 선택지도 있는 걸까~ 하고 최근에는 생각하고 있었죠☆」"

[[dialogue]]
speaker = "リーリア"
original = "「ほら、魔女と人間界の橋渡しができる『魔女の友好大使』になりたいって話、したことがあったじゃないですか」"
translation = "「보세요, 마녀와 인간계의 가교가 될 수 있는 『마녀 우호 대사』가 되고 싶다는 이야기, 한 적 있었잖아요.」"

[[dialogue]]
speaker = "リーリア"
original = "「それで、私が学園の先生になったら、魔女の子たちが学べるような環境も作っていけるんじゃないかな～って……」"
translation = "「그래서 제가 학원 선생님이 된다면, 마녀 아이들이 배울 수 있는 환경도 만들어 갈 수 있지 않을까~ 해서……」"

[[dialogue]]
speaker = "リーリア"
original = "「まだ先生って選択肢が思いついてからそんなに経ってないので、自分が先生になるための具体的な方法すら、見えてはいないんですけど――」"
translation = "「아직 선생님이라는 선택지가 떠오른 지 얼마 안 돼서, 제가 선생님이 되기 위한 구체적인 방법조차 보이지는 않지만――」"

[[dialogue]]
speaker = "リーリア"
original = "「でもいつか先生になったら、『人間が魔法を学べる環境』とか、『魔女の森の方に留学できる仕組み』とか」"
translation = "「하지만 언젠가 선생님이 된다면, 『인간이 마법을 배울 수 있는 환경』이라든가, 『마녀의 숲 쪽으로 유학할 수 있는 시스템』이라든가.」"

[[dialogue]]
speaker = "リーリア"
original = "「そういうのも作れたら、みんなが楽しいんじゃないかな～、なんて考えちゃってました♪」"
translation = "「그런 것도 만들 수 있다면 모두가 즐겁지 않을까~ 하고 생각하고 있었어요♪」"

[[dialogue]]
speaker = "リーリア"
original = "「とは言え、魔女の森の元老会が絶対ネックになるし、ネビュラもどちらかというと保守派が多いので、魔女の森に外の人を呼び込むのは相当ハードルが高いんですが……」"
translation = "「그렇다고는 해도 마녀의 숲 원로회가 분명 걸림돌이 될 거고, 네뷸라도 어느 쪽인가 하면 보수파가 많아서 마녀의 숲에 외부인을 불러들이는 건 상당히 허들이 높지만……」"

[[dialogue]]
speaker = "リーリア"
original = "「種族関係なく手を取り合って、リクリエを乗り越えようとしているこんな時代だからこそ、関係性を見直す最大のチャンスだと思っています！」"
translation = "「종족 관계없이 손을 맞잡고 리크리에를 극복하려는 이런 시대니까말로, 관계를 재검토할 최대의 찬스라고 생각해요!」"

[[dialogue]]
speaker = "unk"
original = "正直、惚れ直しちゃったぞ"
translation = "솔직히, 다시 반해버렸어."

[[dialogue]]
speaker = "unk"
original = "リーリアはすごいな……"
translation = "리리아는 대단하구나……"

[[dialogue]]
speaker = "リーリア"
original = "「ほ、惚れ直したって、そんな……えへへへへへぇ～<emoji=heart04>」"
translation = "「다, 다시 반했다니 그런…… 에헤헤헤헤헤헤~<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「センパイってば、今日は私が喜ぶことばっかり言って、甘やかすと調子に乗っちゃいますよ～？」"
translation = "「선배도 참, 오늘은 제가 기뻐할 말만 골라서 하고, 자꾸 예뻐해 주면 우쭐해질 거라고요~?」"

[[dialogue]]
speaker = "リーリア"
original = "「――でも先生になるのと、子供ができてお母さんをやるのは、両立が大変そう？」"
translation = "「――하지만 선생님이 되는 것과, 아이가 생겨서 엄마 역할을 하는 건 양립하기 힘들 것 같다고요?」"

[[dialogue]]
speaker = "リーリア"
original = "「そ、そこは夢なので、整合性はあまり考えてなかったというか～。まあ、それでも……」"
translation = "「그, 그건 꿈이라서 개연성은 별로 생각 안 했다고나 할까~. 뭐, 그래도……」"

[[dialogue]]
speaker = "リーリア"
original = "「私は両方、叶えちゃいたいな～って思ってますけどね<emoji=heart04>」"
translation = "「저는 둘 다 이루어버리고 싶다고 생각하고 있지만요<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「センパイの方は、どうですか……？」"
translation = "「선배 쪽은, 어떤가요……?」"

[[dialogue]]
speaker = "unk"
original = "なら、その夢の為に俺も頑張らないとな"
translation = "그러면, 그 꿈을 위해서 나도 노력해야겠네"

[[dialogue]]
speaker = "リーリア"
original = "「――リモートワークで、家でできる仕事を探すという手もある、ですか？」"
translation = "「――리모트 워크로, 집에서 할 수 있는 일을 찾는 방법도 있다, 는 건가요?」"

[[dialogue]]
speaker = "unk"
original = "今時なら、そういう仕事も探せばある。育児だって、夫婦で一緒にするものだろう。"
translation = "요즘 세상이라면, 그런 일도 찾아보면 있어. 육아도, 부부가 함께하는 것이니까 말이야."

[[dialogue]]
speaker = "unk"
original = "要するに、俺はリーリアの夢を応援する為に、自分ができることをなんだってするつもりだ。"
translation = "요컨대, 나는 리리아의 꿈을 응원하기 위해, 내가 할 수 있는 일이라면 무엇이든 할 생각이야."

[[dialogue]]
speaker = "リーリア"
original = "「センパイ……<emoji=heart04>\u3000ありがとうございます！\u3000えへへっ♪」"
translation = "「선배……<emoji=heart04> 감사합니다! 에헤헤♪」"

[[dialogue]]
speaker = "リーリア"
original = "「あ、あの～<emoji=heart04>\u3000そのですね……」"
translation = "「저, 저기~<emoji=heart04> 그게 말이죠……」"

[[dialogue]]
speaker = "リーリア"
original = "「センパイと話していたら、なんだかイチャイチャしたくなってきちゃいました<emoji=heart04>」"
translation = "「선배랑 이야기하고 있으니까, 왠지 꽁냥꽁냥하고 싶어지기 시작했어요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "珍しく、１日中一緒にいなかったしな"
translation = "드물게, 하루 종일 같이 있지 못했으니까 말이야"

[[dialogue]]
speaker = "リーリア"
original = "「丸１日センパイを摂取してなかったのに、いきなり高濃度のラブを浴びたので、今ちょっとしたセンパイ中毒ですよ、私<emoji=heart04>」"
translation = "「꼬박 하루 동안 선배를 섭취하지 못했는데, 갑자기 고농도의 러브를 끼얹어져서, 지금 살짝 선배 중독이에요, 저<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「あっ……センパイ……<emoji=heart04>」"
translation = "「앗…… 선배……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はリーリアの腰を取り、そっと体を抱き寄せた。"
translation = "나는 리리아의 허리를 잡고, 살며시 몸을 끌어안았다."

[[dialogue]]
speaker = "unk"
original = "リーリア、これからもっと幸せにするからな"
translation = "리리아, 앞으로 더 행복하게 해줄게"

[[dialogue]]
speaker = "unk"
original = "それは夢の中で伝えた言葉。それを改めて口にする。"
translation = "그것은 꿈속에서 전했던 말. 그것을 다시 한번 입 밖으로 낸다."

[[dialogue]]
speaker = "リーリア"
original = "「……！\u3000はいっ♪\u3000私も――」"
translation = "「……! 네♪ 저도――」"

[[dialogue]]
speaker = "リーリア"
original = "「私もです、センパイ<emoji=heart04>\u3000センパイに素敵な未来の色を見せて、ずっと幸せって言ってもらえるように頑張りますから！」"
translation = "「저도예요, 선배<emoji=heart04> 선배에게 멋진 미래의 색을 보여드리고, 계속 행복하다고 말씀하실 수 있게 노력할 테니까요!」"

[[dialogue]]
speaker = "リーリア"
original = "「――もうずっと幸せだから大丈夫？\u3000ダメです～。こんなもので満足されても、私はまだまだ、センパイを幸せにし足りないんです<emoji=heart04>」"
translation = "「――벌써 충분히 행복하니까 괜찮다고요? 안 돼요~. 이런 걸로 만족하셔도, 저는 아직 한참이나 선배를 더 행복하게 해드리고 싶단 말이에요<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「私だって、もっともっとセンパイに幸せにしてほしいです<emoji=heart04>\u3000だから……」"
translation = "「저도, 좀 더 좀 더 선배가 행복하게 해줬으면 좋겠어요<emoji=heart04> 그러니까……」"

[[dialogue]]
speaker = "リーリア"
original = "「今はとりあえず、キス、して欲しいです……<emoji=heart04>\u3000んっ……<emoji=heart04>」"
translation = "「지금은 우선, 키스, 해줬으면 좋겠어요……<emoji=heart04> 응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リーリアのお願いに応えて、唇をそっと重ねる。"
translation = "리리아의 부탁에 응하여, 입술을 살며시 겹친다."

[[dialogue]]
speaker = "リーリア"
original = "「ちゅっ<emoji=heart04>\u3000はあぁ……<emoji=heart04>\u3000センパイ……もっと……<emoji=heart04>」"
translation = "「쪽<emoji=heart04> 하아아……<emoji=heart04> 선배…… 더……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「んっ……ちゅっ<emoji=heart04>\u3000はぁぁ<emoji=heart04>\u3000センパイ……大好きです<emoji=heart04>」"
translation = "「응…… 쪽<emoji=heart04> 하아아<emoji=heart04> 선배…… 너무 좋아해요<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「ちゅっ<emoji=heart04>」"
translation = "「쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その後、校舎の外れにある空き教室で、生徒がほとんど来ないのをいいことに、俺たちは何度も甘い音を響かせ続けてしまうのだった。"
translation = "그 후, 교사 외곽에 있는 빈 교실에서, 학생이 거의 오지 않는 것을 틈타 우리들은 몇 번이고 달콤한 소리를 계속 울려 퍼뜨리는 것이었다."

