[[dialogue]]
speaker = "unk"
original = "第１話,選挙管理委員会誕生！,P"
translation = "제1화, 선거관리위원회 탄생! P"

[[dialogue]]
speaker = "unk"
original = "謎の転校生、梨緒・<ruby>Ａ<rt>アガサ</rt></ruby>・クリステレス。"
translation = "수수께끼의 전학생, 리오 A 크리스텔레스."

[[dialogue]]
speaker = "unk"
original = "彼女との御前試合に勝利し、新星学園の星徒会長の座を守ったのが数日前のこと。"
translation = "그녀와의 어전시합에서 승리해, 신성학원의 성도회장 자리를 지킨 것이 며칠 전의 일."

[[dialogue]]
speaker = "unk"
original = "だが──"
translation = "하지만──"

[[dialogue]]
speaker = "梨緒"
original = "「緋宮会長。確かに私は御前試合で敗れた。君が星徒会長にふさわしいと認めよう」"
translation = "「히노미야 회장. 확실히 나는 어전시합에서 패배했다. 네가 성도회장에 어울린다고 인정하지」"

[[dialogue]]
speaker = "梨緒"
original = "「だが魔王である君から目を離すことはできない。よって選挙管理委員会を設立し、君を監視させてもらう！」"
translation = "「하지만 마왕인 너에게서 눈을 뗄 수는 없다. 따라서 선거관리위원회를 설립해, 너를 감시하겠다!」"

[[dialogue]]
speaker = "unk"
original = "とある日の放課後。マトイと一緒に星徒会室に向かう途中、唐突に宣戦布告（？）された。"
translation = "어느 날 방과 후. 마토이와 함께 성도회실로 향하던 도중, 돌연 선전포고(?)를 당했다."

[[dialogue]]
speaker = "マトイ"
original = "「選挙管理委員会……？\u3000そもそも<ruby>新星学園<rt>うち</rt></ruby>に選挙ってないんじゃ？」"
translation = "「선거관리위원회……? 애초에 신성학원에 선거는 없지 않아?」"

[[dialogue]]
speaker = "梨緒"
original = "「ああ。選挙管理委員会とは本来、生徒会選挙を公正に行うためのものだ。だから選挙のない新星学園では、選挙管理委員会が今まで存在しなかった」"
translation = "「아아. 선거관리위원회란 본래, 학생회 선거를 공정하게 치르기 위한 것이다. 그래서 선거가 없는 신성학원에서는 선거관리위원회가 지금까지 존재하지 않았지」"

[[dialogue]]
speaker = "マトイ"
original = "「だよね……。星徒会長は先代の会長が指名するものだし」"
translation = "「그렇지……. 성도회장은 선대 회장이 지명하는 거니까」"

[[dialogue]]
speaker = "梨緒"
original = "「だが選挙が全く行われないわけではない」"
translation = "「하지만 선거가 전혀 행해지지 않는 것은 아니다」"

[[dialogue]]
speaker = "梨緒"
original = "「強権を持つ星徒会長とはいえ、校則によれば、全校生徒の３分の２の賛成があればリコールすることができる」"
translation = "「강권력을 가진 성도회장이라 해도, 교칙에 따르면 전교생의 3분의 2의 찬성이 있다면 리콜할 수 있다」"

[[dialogue]]
speaker = "梨緒"
original = "「そしてリコールによって星徒会長が不在になった場合、選挙によって新たな星徒会長が選ばれることになっている」"
translation = "「그리고 리콜에 의해 성도회장이 부재하게 될 경우, 선거를 통해 새로운 성도회장을 뽑게 되어 있지」"

[[dialogue]]
speaker = "梨緒"
original = "「私の設立した選挙管理委員会──選管は、常日頃から星徒会を監視し、不適切な運営が行われた場合、全校生徒に対してリコールを発議する組織だ」"
translation = "「내가 설립한 선거관리위원회── 선관은, 평소 성도회를 감시하며 부적절한 운영이 행해질 경우 전교생에게 리콜을 발의하는 조직이다」"

[[dialogue]]
speaker = "梨緒"
original = "「学園側にも正式に設立が認められた。……今はまだ私１人だけだが」"
translation = "「학원 측에서도 정식으로 설립이 인정되었다. ……지금은 아직 나 혼자뿐이지만」"

[[dialogue]]
speaker = "マトイ"
original = "「な、なるほど……思ったよりちゃんとした委員会なんだ……」"
translation = "「그, 그렇구나…… 생각보다 제대로 된 위원회네……」"

[[dialogue]]
speaker = "梨緒"
original = "「つまり君が星徒会長にふさわしくないと判断した場合、私はリコールを発議する。心してくれ」"
translation = "「즉 네가 성도회장에 어울리지 않는다고 판단할 경우, 나는 리콜을 발의하겠다. 각오해라」"

[[dialogue]]
speaker = "unk"
original = "ああ、わかった"
translation = "아아, 알았어"

[[dialogue]]
speaker = "梨緒"
original = "「では──」"
translation = "「그럼──」"

[[dialogue]]
speaker = "梨緒"
original = "「勝負だ！」"
translation = "「승부다!」"

[[dialogue]]
speaker = "unk"
original = "なんで！？"
translation = "왜!? "

[[dialogue]]
speaker = "梨緒"
original = "「星徒会長は新星学園全校生徒の頂点に立つ者。相応の実力や振る舞いが求められる」"
translation = "「성도회장은 신성학원 전교생의 정점에 서는 자. 그에 걸맞은 실력과 행동이 요구된다」"

[[dialogue]]
speaker = "梨緒"
original = "「よって君が星徒会長に相応しいか、勝負を通して確認させてもらう。選管の正当な業務だ」"
translation = "「따라서 네가 성도회장에 어울리는지, 승부를 통해 확인하겠다. 선관의 정당한 업무다」"

[[dialogue]]
speaker = "マトイ"
original = "「なる……ほど……？」"
translation = "「그…… 런가……?」"

[[dialogue]]
speaker = "unk"
original = "で、何の勝負にする？"
translation = "그래서, 무슨 승부로 할 건데?"

[[dialogue]]
speaker = "梨緒"
original = "「驚いた割に勝負はすんなり受けるんだな。御前試合の時は時間がかかったのに」"
translation = "「놀란 것치고 승부는 순순히 받아들이는군. 어전시합 때는 시간이 걸렸는데」"

[[dialogue]]
speaker = "unk"
original = "梨緒が真剣なのはわかってるから"
translation = "리오가 진심이라는 건 알고 있으니까"

[[dialogue]]
speaker = "梨緒"
original = "「む……そうか」"
translation = "「음…… 그런가」"

[[dialogue]]
speaker = "梨緒"
original = "「こんな時にモンスターか……いや。モンスターを駆逐するのは星騎士の本分。どちらが先にモンスターを倒すか勝負だ！」"
translation = "「이런 때에 몬스터인가…… 아니. 몬스터를 구축하는 것은 성기사의 본분. 누가 먼저 몬스터를 쓰러뜨리는지 승부다!」"

[[dialogue]]
speaker = "unk"
original = "鋭い牙を突き立てようとするモンスターに、俺と梨緒が攻撃を叩き込む。"
translation = "날카로운 송곳니를 드러내려는 몬스터에게, 나와 리오가 공격을 때려 박는다."

[[dialogue]]
speaker = "梨緒"
original = "「モンスターの殲滅完了。マトイ、どちらが早かった？」"
translation = "「몬스터 섬멸 완료. 마토이, 어느 쪽이 빨랐지?」"

[[dialogue]]
speaker = "マトイ"
original = "「うーん、僅差だったと思うけど……しいて言うなら会長かな」"
translation = "「으음, 근소한 차이였다고 생각하는데…… 굳이 말하자면 회장일까나」"

[[dialogue]]
speaker = "梨緒"
original = "「くっ、負けた……」"
translation = "「큭, 졌다……」"

[[dialogue]]
speaker = "梨緒"
original = "「速さには自信があったのに……やはり私はダメな星騎士だ……。私なんて、サメ映画で最初に食われる役がお似合いなんだ……」"
translation = "「속도에는 자신 있었는데…… 역시 나는 안 되는 성기사다……. 나 같은 건, 상어 영화에서 가장 먼저 먹히는 역할이 어울려……」"

[[dialogue]]
speaker = "マトイ"
original = "「すっごく落ち込んでる！？\u3000なんでサメ映画！？」"
translation = "「엄청나게 낙담하고 있어!? 왜 상어 영화!?」"

[[dialogue]]
speaker = "マトイ"
original = "「ところで……梨緒さん？\u3000転入生なのにどうして私のこと知ってるの？」"
translation = "「그건 그렇고…… 리오 씨? 전학생인데 어떻게 나를 알고 있어?」"

[[dialogue]]
speaker = "梨緒"
original = "「マトイだけじゃなくて、新星学園の星騎士のことは概ね知っている。私は以前、新星星徒会の副会長だったからな」"
translation = "「마토이뿐만 아니라, 신성학원의 성기사들은 대체로 알고 있다. 나는 이전에 신성 성도회의 부회장이었으니까」"

[[dialogue]]
speaker = "マトイ"
original = "「梨緒さんが副会長？\u3000アナじゃなくて……？」"
translation = "「리오 씨가 부회장? 아나가 아니라……?」"

[[dialogue]]
speaker = "梨緒"
original = "「私の知っている君は星徒会役員ではなかったが、変わらず努力家で、優秀な星騎士だった。あの時も……」"
translation = "「내가 아는 너는 성도회 임원은 아니었지만, 변함없이 노력가에 우수한 성기사였다. 그때도……」"

[[dialogue]]
speaker = "梨緒"
original = "「うう……あの時、私がもっと強ければ、マトイは……マトイは……」"
translation = "「우우…… 그때, 내가 좀 더 강했더라면, 마토이는…… 마토이는……」"

[[dialogue]]
speaker = "マトイ"
original = "「悪化した！？\u3000ごめん、私何か悪いことした！？」"
translation = "「악화됐다!? 미안, 내가 뭐 잘못했어!?」"

[[dialogue]]
speaker = "梨緒"
original = "「ぐすっ……マトイは何も悪くない……ただ惰弱で非力な私が悪いんだ……」"
translation = "「흑…… 마토이는 아무 잘못 없어…… 그저 타락하고 비력한 내가 나쁜 거야……」"

[[dialogue]]
speaker = "unk"
original = "心に深い傷があるらしくて……"
translation = "마음에 깊은 상처가 있는 것 같아서……"

[[dialogue]]
speaker = "マトイ"
original = "「そ、そうなんだ……大変だね……」"
translation = "「그, 그렇구나…… 힘들겠네……」"

[[dialogue]]
speaker = "マトイ"
original = "「でも梨緒さんも落ち込むことあるんだ。意外かも」"
translation = "「하지만 리오 씨도 낙담할 때가 있구나. 의외일지도」"

[[dialogue]]
speaker = "梨緒"
original = "「意外？」"
translation = "「의외?」"

[[dialogue]]
speaker = "マトイ"
original = "「うん。梨緒さんって会長と御前試合で戦えるくらい強いし、凛々しくてかっこいいから、落ち込まないと思ってた」"
translation = "「응. 리오 씨는 회장이랑 어전시합에서 싸울 수 있을 정도로 강하고, 늠름하고 멋있으니까, 낙담하지 않을 줄 알았어」"

[[dialogue]]
speaker = "梨緒"
original = "「強い！？\u3000凛々しい！？\u3000かっこいい！？」"
translation = "「강해!? 늠름해!? 멋있어!?」"

[[dialogue]]
speaker = "梨緒"
original = "「そそ、そんなことはないっ、私なんて火を点ける前に折れたマッチのような、何の役にも立たない存在なんだ！！」"
translation = "「그, 그럴 리가 없다, 나 같은 건 불을 붙이기도 전에 부러진 성냥 같은, 아무 짝에도 쓸모없는 존재다!!」"

[[dialogue]]
speaker = "マトイ"
original = "「そこまで自分を卑下しなくても……」"
translation = "「그렇게까지 자신을 비하하지 않아도……」"

[[dialogue]]
speaker = "梨緒"
original = "「……すまない、取り乱した」"
translation = "「……미안, 실언했다」"

[[dialogue]]
speaker = "梨緒"
original = "「今日は負けを認めよう、緋宮会長。だが私は何度敗れようと諦めない。世界を守るために君に勝つ！」"
translation = "「오늘은 패배를 인정하지, 히노미야 회장. 하지만 나는 몇 번을 패배해도 포기하지 않는다. 세계를 지키기 위해 너에게 이기겠다!」"

[[dialogue]]
speaker = "マトイ"
original = "「あ、行っちゃった……。梨緒さんって、キリッとしててかっこいいけど、よくわからないところも多いよね……」"
translation = "「아, 가버렸다……. 리오 씨는 딱 부러져서 멋있지만, 잘 모르는 부분도 많네……」"

[[dialogue]]
speaker = "unk"
original = "翌日の登校中──"
translation = "다음 날 등교 중──"

[[dialogue]]
speaker = "梨緒"
original = "「勝負だ、緋宮会長！」"
translation = "「승부다, 히노미야 회장!」"

[[dialogue]]
speaker = "unk"
original = "またいきなり！？"
translation = "또 갑자기!?"

[[dialogue]]
speaker = "梨緒"
original = "「星徒会長たる者、規則正しい生活を送り、品行方正であらねばならない。今日から無遅刻無欠席をどちらが長く続けられるか、勝負だ！」"
translation = "「성도회장인 자, 규칙적인 생활을 보내며 품행이 방정해야 한다. 오늘부터 무지각 무결석을 누가 더 오래 유지하는지, 승부다!」"

[[dialogue]]
speaker = "unk"
original = "しかし途中でアステラが発生してしまい、俺と梨緒は仲良く遅刻したのであった──"
translation = "그러나 도중에 아스테라가 발생하는 바람에, 나와 리오는 사이좋게 지각하고 말았다──"

