[[dialogue]]
speaker = "unk"
original = "第３話,ナターシャとマリンデート,P"
translation = "제3화, 나타샤와 마린 데이트, P"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「じー……」"
translation = "「빤히……」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「じじじ～～……」"
translation = "「빤히이이이이~~……」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「……はぁ、退屈だなぁ。最近、会長さんの監視が面白くないよ。すっかり私に見られることに慣れてきてない？」"
translation = "「……하아, 지루하네. 요즘 회장님 감시가 재미없어. 완전히 내가 쳐다보는 거에 익숙해진 거 아냐?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「というか、さっきからずっと砂浜に寝転がって何してるの。ベアトじゃあるまいし、日光浴？」"
translation = "「그보다 아까부터 계속 모래사장에 누워서 뭐 하는 거야. 베아트도 아니고, 일광욕?」"

[[dialogue]]
speaker = "unk"
original = "日光浴もたまにはいいものだよ"
translation = "일광욕도 가끔은 좋은 거야"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「真夏の太陽の下、ピクリとも動かない対象を監視し続けるこっちの身にもなってよ」"
translation = "「한여름 태양 아래서 조금도 움직이지 않는 대상을 계속 감시해야 하는 내 입장도 좀 되어보라고」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「そうだ。どうせ暇ならさ──」"
translation = "「맞다. 어차피 심심하다면──」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「私とデートでもしない？」"
translation = "「나랑 데이트라도 안 할래?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「いっくよ～っ！！」"
translation = "「간다아~~!!」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「それっ！！」"
translation = "「자!!」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「おっとっ……！！\u3000良い動きするじゃん。でも──」"
translation = "「오옷……!! 좋은 움직임인데. 하지만──」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「そこ！！」"
translation = "「거기!!」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ふふ、私の勝ちだね♪」"
translation = "「후후, 내 승리네♪」"

[[dialogue]]
speaker = "unk"
original = "今、一瞬ナターシャが２人重なって見えたような……"
translation = "방금, 순간적으로 나타샤가 두 명으로 겹쳐 보인 것 같은……"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「この水着フォームは特に動きやすいからね♪\u3000分身したように見せる程度なら、ちょちょいのちょいだよ♪」"
translation = "「이 수영복 폼은 특히 움직이기 편하니까♪ 분신한 것처럼 보여주는 정도라면 식은 죽 먹기야♪」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「それより次はサーフィンに付き合ってよ。波乗り勝負でもしよ♪」"
translation = "「그보다 다음은 서핑에 어울려줘. 파도타기 승부라도 하자♪」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「先に体勢を崩して、海に落ちた方の負けだからね？\u3000あの大波に乗った時点から勝負スタートだよ？」"
translation = "「먼저 자세가 흐트러져서 바다에 빠지는 쪽이 지는 거니까? 저 큰 파도에 올라탄 시점부터 승부 시작이야?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「来た、大波っ……！\u3000ほいっと……！！」"
translation = "「왔다, 큰 파도……! 영차……!!」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「へぇ、サーフィンって初めてやったけど、んんっ。結構バランス取るの難しいんだねっ」"
translation = "「헤에, 서핑은 처음 해봤는데, 으응. 꽤 밸런스 잡기 어렵네」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「油断したらすぐ落ちちゃいそう──って、わわっ！？」"
translation = "「방심하면 금방 떨어질 것 같── 어라, 와와!?」"

[[dialogue]]
speaker = "unk"
original = "勝った！"
translation = "이겼다!"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「いいや、まだだよっ！」"
translation = "「아니, 아직이야!」"

[[dialogue]]
speaker = "unk"
original = "ナターシャが波の上を走って！？"
translation = "나타샤가 파도 위를 달려서!?"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「こっちばっかり見てると足を掬われるよ？」"
translation = "「이쪽만 보고 있으면 발목 잡힌다고?」"

[[dialogue]]
speaker = "unk"
original = "なっ──！？"
translation = "뭐──!?"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「あ、会長さん落ちちゃった」"
translation = "「아, 회장님 빠져버렸네」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「よし、会長さんの負け～」"
translation = "「좋아, 회장님의 패배~」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「何その不服そうな顔。先に言っておいたでしょ？\u3000海に落ちた方の負けだって」"
translation = "「그 불만 가득한 표정은 뭐야. 아까 말했잖아? 바다에 빠지는 쪽이 지는 거라고」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「波の上を走る分には海に落ちてないから♪\u3000ま、私の粘り勝ちだね♪」"
translation = "「파도 위를 달리는 동안에는 바다에 빠진 게 아니니까♪ 뭐, 내 끈기 승리네♪」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「あ、まだ不服そうな顔して。ならもう一度勝負する？」"
translation = "「아, 아직도 불만 가득한 표정이네. 그럼 한 번 더 승부할래?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ふふ、負けず嫌いだね。まぁデートに誘ったのは私だし、いくらでも付き合うよ♪」"
translation = "「후후, 지기 싫어하네. 뭐 데이트에 권한 건 나니까 얼마든지 어울려줄게♪」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「その代わり……今度は２人で、ね♪」"
translation = "「그 대신…… 이번에는 둘이서, 말이야♪」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「いいじゃない、デートなんだから♪」"
translation = "「좋잖아, 데이트니까♪」"

[[dialogue]]
speaker = "unk"
original = "それからナターシャといろんなレジャーを楽しんで……"
translation = "그러고 나서 나타샤와 여러 레저를 즐기고……"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「はぁー、遊んだ遊んだ」"
translation = "「하아─ 실컷 놀았다」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「会長さんの言うとおり日光浴もたまにはいいね？\u3000運動した後だからって言うのもあるけど」"
translation = "「회장님 말대로 일광욕도 가끔은 좋네? 운동한 다음이라서 그런 것도 있겠지만」"

[[dialogue]]
speaker = "unk"
original = "良い気分転換になった？"
translation = "좋은 기분 전환이 됐어?"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「……あはは、お陰様でね。やっぱりどうも最近、心の中がモヤモヤしてて」"
translation = "「……아하하, 덕분에 말이야. 역시 아무래도 요즘 마음속이 답답해서」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「会長さんが付き合ってくれたおかげで、少しは気が晴れたよ」"
translation = "「회장님이 어울려준 덕분에 조금은 기분이 풀렸어」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「でも……本音を言えば、もう少しドキドキさせて欲しいかな」"
translation = "「하지만…… 본심을 말하자면, 조금 더 두근거리게 해줬으면 좋겠달까」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「心のモヤモヤが全部、吹き飛んじゃうような……。そんな刺激が欲しくって……」"
translation = "「마음의 답답함이 전부 날아가 버릴 것 같은…… 그런 자극이 갖고 싶어서……」"

[[dialogue]]
speaker = "unk"
original = "そういうことなら──"
translation = "그런 거라면──"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「あ──……」"
translation = "「아──……」"

[[dialogue]]
speaker = "unk"
original = "もぞ……"
translation = "꿈틀……"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「……もぞ？」"
translation = "「……꿈틀?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ひぃああああっ！？\u3000むむむ、虫ぃ～～～！！？」"
translation = "「히이이이익!? 버, 버, 벌레에에에~~!!?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「って──何を人の腕に乗せてくれてるの！？」"
translation = "「잠깐── 남의 팔에 뭘 올려두는 거야!?」"

[[dialogue]]
speaker = "unk"
original = "刺激が欲しいって言うから"
translation = "자극이 필요하다고 하길래"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「心臓が飛び出るかと思ったよ、まったく……！」"
translation = "「심장이 튀어나오는 줄 알았어, 정말……!」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「でも、あはは。確かにモヤモヤは吹っ飛んだかも」"
translation = "「하지만, 아하하. 확실히 답답함은 날아갔을지도」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ありがと、会長さん。デートに誘って良かったよ」"
translation = "「고마워, 회장님. 데이트 신청하길 잘했어」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「あ、そうだ。それと──」"
translation = "「아, 맞다. 그리고──」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ん……ちゅっ<emoji=heart04>」"
translation = "「응…… 쪽<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ふふ、驚かせてくれたお返しだよ<emoji=heart04>」"
translation = "「후후, 놀라게 해준 보답이야<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「どうかな？\u3000けっこー刺激的だったでしょ<emoji=heart04>」"
translation = "「어때? 꽤 자극적이었지<emoji=heart04>」"

