[[dialogue]]
speaker = "unk"
original = "第３話,愛してるゲーム（マトイ編）,P"
translation = "제3화, 사랑해 게임 (마토이 편), P"

[[dialogue]]
speaker = "unk"
original = "それは週末、マトイが俺の家へ遊びに来ていた時のこと――"
translation = "그것은 주말, 마토이가 우리 집에 놀러 왔을 때의 일――"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「ねぇ、会長。『愛してるゲーム』って知ってる？」"
translation = "「저기, 회장님. 『사랑해 게임』이라고 알아?」"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「――そう、ちょっと前に流行ってたらしいんだけど、お互いに向かい合って『愛してる』って言って、照れた方が負けって遊び」"
translation = "「――응, 조금 전에 유행했던 것 같은데, 서로 마주 보고 『사랑해』라고 말해서 부끄러워하는 쪽이 지는 놀이야.」"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「その……今ちょうど暇になったし……２人でやってみない？」"
translation = "「그…… 지금 마침 한가해졌으니까…… 둘이서 해보지 않을래?」"

[[dialogue]]
speaker = "unk"
original = "面白そう。やってみようか"
translation = "재밌겠네. 한번 해볼까."

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「えへへ……実は前から興味があって、してみたかったんだ～♪」"
translation = "「에헤헤…… 사실 전부터 흥미가 있어서 해보고 싶었어~♪」"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「じゃあ、どっちが先にしよっか？\u3000――会長から？\u3000うん、わかった」"
translation = "「그럼 누가 먼저 할까? ――회장님부터? 응, 알았어.」"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「そしたら、ちょっと待って。心の準備するから――」"
translation = "「그럼 잠깐만 기다려줘. 마음의 준비 좀 할게――」"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「すぅ～……はぁ～……よしっ。どうぞ……！」"
translation = "「후우~…… 하아~…… 좋아. 시작해줘……!」"

[[dialogue]]
speaker = "unk"
original = "――マトイ、愛してる"
translation = "――마토이, 사랑해."

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「――えへへ……<emoji=heart04>」"
translation = "「――에헤헤……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "嬉しそうに笑っている……だと！？"
translation = "기쁘다는 듯이 웃고 있다니……!?"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「――すぐに照れてくれると思ってたのに通じない？\u3000えっとね……ドキドキはすごくしてるよ。でも……」"
translation = "「――금방 부끄러워할 줄 알았는데 안 통해? 저기…… 두근거리기는 엄청 하고 있어. 하지만……」"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「会長、本気で言ってくれてるって、顔を見ればわかるから……普通に嬉しい<emoji=heart04>」"
translation = "「회장님이 진심으로 말해주고 있다는 건 얼굴을 보면 아니까…… 그냥 기뻐<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「――うん、わかるよ。だって……」"
translation = "「――응, 알 수 있어. 왜냐면……」"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「毎日見てる、好きな人の顔だもん<emoji=heart04>」"
translation = "「매일 보고 있는, 좋아하는 사람의 얼굴인걸<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "くはっ……！？"
translation = "크헉……!?"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「えっ……会長！？\u3000どうしたの！？」"
translation = "「엣…… 회장님!? 왜 그래!?」"

[[dialogue]]
speaker = "unk"
original = "俺の……負けだ"
translation = "나의…… 패배다."

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「いやいや私の番、まだ１度も来てないよ！？」"
translation = "「아니 아니, 내 차례는 아직 한 번도 안 왔다고!?」"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「――普通にさらっと破壊力の高い台詞で、不意打ちを食らった？\u3000そ、そう……？」"
translation = "「――그냥 아무렇지 않게 파괴력 높은 대사로 기습을 당했다고? 그, 그래……?」"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「で、でも、とりあえず今のはノーカンで！\u3000これじゃあ全然、ゲームをやった気にならないし！」"
translation = "「하, 하지만 일단 방금 건 무효로 해! 이래선 전혀 게임을 한 기분이 안 나니까!」"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「じゃあ、今度は私が言う番ね。……これ、言われるよりも、言う方がちょっと照れそうかも」"
translation = "「그럼 이번엔 내가 말할 차례네. ……이거, 듣는 것보다 말하는 게 좀 더 부끄러울지도.」"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「深呼吸して、心を落ち着かせて……すぅ～……はぁ～……よしっ、行くよ？」"
translation = "「심호흡하고 마음을 가라앉히고…… 후우~…… 하아~…… 좋아, 간다?」"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「――会長。愛してます」"
translation = "「――회장님. 사랑해요.」"

[[dialogue]]
speaker = "unk"
original = "っ……！"
translation = "윽……!"

[[dialogue]]
speaker = "unk"
original = "我が彼女ながら、何という可愛さだろう。"
translation = "내 여자친구지만, 이 무슨 귀여움이란 말인가."

[[dialogue]]
speaker = "unk"
original = "マトイは普段、星徒会のツッコミ役として、周りのメンバーを引き立たせるような役回りが多いのだが、こうして２人きりになると雰囲気が変わる。"
translation = "마토이는 평소 성도회의 츳코미 담당으로서 주변 멤버들을 돋보이게 하는 역할을 많이 맡지만, 이렇게 둘만 있으면 분위기가 바뀐다."

[[dialogue]]
speaker = "unk"
original = "何というかすごく……最大級に『普通の可愛い女の子』へと変貌するのだ。そのギャップが凄まじい魅力を生み出している。しかし――"
translation = "뭐랄까, 정말…… 최대급으로 『평범하고 귀여운 여자아이』로 변모한다. 그 갭이 엄청난 매력을 만들어내고 있다. 하지만――"

[[dialogue]]
speaker = "unk"
original = "耐えた……！\u3000今度は、耐え切ったたぞ！"
translation = "버텼다……! 이번에는 끝까지 버텨냈어!"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「な、なんか会長、今すごく心の中で葛藤してなかった？」"
translation = "「어, 왠지 회장님, 지금 속으로 엄청 갈등하지 않았어?」"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「――え？\u3000私は自分で思ってるよりも、女の子としての攻撃力が高い？\u3000そうかな……？」"
translation = "「――에? 내가 생각하는 것보다 여자애로서의 공격력이 높다고? 그럴까……?」"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「だけど、これでゲームが続けられるね。じゃあ、次は会長の番♪」"
translation = "「그렇지만 이걸로 게임을 계속할 수 있겠네. 그럼 다음은 회장님 차례♪」"

[[dialogue]]
speaker = "unk"
original = "マトイ、愛してる"
translation = "마토이, 사랑해."

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「んっ……<emoji=heart04>\u3000えへへ～……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 에헤헤~……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "照れてはいないけど、マトイ無敵じゃん！"
translation = "부끄러워하지는 않지만, 마토이 무적이잖아!"

[[dialogue]]
speaker = "unk"
original = "これ、素直に喜ぶのはアリなの！？"
translation = "이거, 솔직하게 기뻐하는 건 반칙 아니야!?"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「笑ったら負け、っていうルールもあるらしいけど、今回は『照れたら負け』で始めたからな～<emoji=heart04>」"
translation = "「웃으면 지는 거라는 규칙도 있는 모양이지만, 이번엔 『부끄러워하면 지는 거』로 시작했으니까~<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「――うん？\u3000補足で言葉を付け加えてもいいかって？\u3000なるほど、その方がもっとドキドキして楽しいかも♪\u3000いいよ～」"
translation = "「――응? 보충 설명을 덧붙여도 되냐고? 과연, 그게 더 두근거리고 재밌을지도♪ 좋아~」"

[[dialogue]]
speaker = "unk"
original = "マトイは普通に女の子として滅茶苦茶可愛い"
translation = "마토이는 평범하게 여자애로서 엄청나게 귀여워."

[[dialogue]]
speaker = "unk"
original = "さっき心の中で考えたギャップの話を口に出し……"
translation = "방금 속으로 생각했던 갭에 대한 이야기를 입 밖으로 내고……"

[[dialogue]]
speaker = "unk"
original = "それから女の子らしく俺にお菓子を作って来てくれたり、一方で戦う時は勇敢で格好良かったり等々、マトイの好きなところを列挙していく。"
translation = "그리고 여자아이답게 나에게 과자를 만들어다 주거나, 반면 싸울 때는 용감하고 멋진 모습 등등, 마토이의 좋아하는 점들을 열거해 나간다."

[[dialogue]]
speaker = "unk"
original = "が、しかし――"
translation = "하지만――"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「そっか～、えへへ<emoji=heart04>」"
translation = "「그렇구나~, 에헤헤<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "防御力、鉄壁か！？"
translation = "방어력, 철벽인가!?"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「え？\u3000――このゲームを提案する時は、ちょっと照れ臭そうだったのに？\u3000う～ん、確かに、ちょっと恥ずかしかったけど……」"
translation = "「에? ――이 게임을 제안할 때는 좀 쑥스러워 보였는데? 으음, 확실히 좀 부끄러웠지만……」"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「私って、慣れない状況に弱いというか……でも、いざこのゲームを始めてみたら、案外平気ということに気づいたというか」"
translation = "「내가 익숙하지 않은 상황에 약하다고 해야 할까…… 하지만 막상 이 게임을 시작해 보니까 의외로 괜찮다는 걸 깨달았다고 해야 할까.」"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「最近は恋人関係にも慣れてきて、私がデレデレしてても、会長ならきっと受け入れてくれるっていう安心感があるのかなって……えへへ<emoji=heart04>」"
translation = "「요즘은 연인 관계에도 익숙해져서, 내가 데레데레하고 있어도 회장님이라면 분명 받아줄 거라는 안심감이 있는 걸지도…… 에헤헤<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「それじゃあ、今度は私もお返しに……会長の好きなところ、いっぱい言うね<emoji=heart04>」"
translation = "「그럼 이번엔 나도 답례로…… 회장님의 좋은 점, 잔뜩 말할게<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「会長……愛してます<emoji=heart04>」"
translation = "「회장님…… 사랑해요<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「普通の私を好きって言ってくれるところが好き<emoji=heart04>」"
translation = "「평범한 나를 좋아한다고 말해주는 점이 좋아<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「いつもみんなに優しくて、どんな強い敵が来ても諦めずに立ち向かうところが、格好良くて好き<emoji=heart04>\u3000それから――」"
translation = "「항상 모두에게 다정하고, 어떤 강한 적이 나타나도 포기하지 않고 맞서는 모습이 멋있어서 좋아<emoji=heart04> 그리고――」"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「私が恋愛に慣れてないのを、彼氏として男らしくエスコートしてくれるところが好き<emoji=heart04>\u3000なのに、実は自分も初めてで、思わず照れちゃったりするところも……可愛くて好き<emoji=heart04>」"
translation = "「내가 연애에 서툰 걸 남자친구로서 듬직하게 에스코트해 주는 점이 좋아<emoji=heart04> 그런데 사실 본인도 처음이라서 나도 모르게 부끄러워하거나 하는 점도…… 귀여워서 좋아<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「それ以外にも好きが沢山あって……会長、本当に――大好き<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「그거 말고도 좋아하는 게 너무 많아서…… 회장님, 정말―― 너무 좋아해<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ぐあああああああああ――――っ！？！？"
translation = "구아아아아아아아아아――――앗!?!?"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「あっ！\u3000会長、今までに見たことないくらい顔真っ赤になって照れてる～<emoji=heart04>」"
translation = "「앗! 회장님, 지금까지 본 적 없을 정도로 얼굴이 새빨개져서 부끄러워하고 있어~<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「はあぁ～～～っ<emoji=heart04>\u3000すごく可愛い顔で……好き<emoji=heart04>」"
translation = "「하아아~~~앗<emoji=heart04> 정말 귀여운 얼굴이라…… 좋아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "やめて！\u3000俺のＨＰはとっくにゼロよ！！！"
translation = "하지 마! 내 HP는 이미 제로라고!!!"

[[dialogue]]
speaker = "unk"
original = "愛してるゲームにおいて、もはやマトイに勝てる気が全くしない俺なのであった――"
translation = "사랑해 게임에 있어서, 이제 마토이에게 이길 수 있을 것 같은 기분이 전혀 들지 않는 나였다――"

