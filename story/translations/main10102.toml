[[dialogue]]
speaker = "unk"
original = "第２話,九浄ヴィーナスの直感,B"
translation = "제2화, 구죠 비너스의 직감, B"

[[dialogue]]
speaker = "unk"
original = "それは昨年度の終わり。２年生に進級する直前のこと。"
translation = "그것은 작년 말. 2학년으로 진급하기 직전의 일."

[[dialogue]]
speaker = "ヴィーナス"
original = "「あなたよ！\u3000絶対にあなただわ！」"
translation = "「너야! 절대로 너야!」"

[[dialogue]]
speaker = "マトイ"
original = "「ふえっ！？」"
translation = "「후에!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ビビビーッとキたわ！\u3000ちょっと来て！」"
translation = "「비비비ー 하고 꽂혔어! 잠깐 와 봐!」"

[[dialogue]]
speaker = "マトイ"
original = "「あの、私……って強ぉ！\u3000めちゃくちゃ力強ーい！」"
translation = "「저기, 나……라니 힘 세! 엄청나게 힘세ー!」"

[[dialogue]]
speaker = "マトイ"
original = "「あの……九浄ヴィーナスさん、ですよね？\u3000私に何か――」"
translation = "「저기…… 구죠 비너스 씨, 맞으시죠? 저에게 무슨──」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「話というのは他でもないわ！」"
translation = "「할 말이라는 건 다름이 아니야!」"

[[dialogue]]
speaker = "マトイ"
original = "「わわっ！\u3000ご、ごめんなさい！」"
translation = "「와왓! 죄, 죄송합니다!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ええっ！？\u3000話も聞かない内から断るなんてダメよ！」"
translation = "「에엣!? 이야기도 듣기 전부터 거절하다니 안 돼!」"

[[dialogue]]
speaker = "マトイ"
original = "「何も身に覚えがないんです。校則違反があったなら、今日中に直しますから──んん？\u3000断る？」"
translation = "「아무것도 짐작 가는 게 없어요. 교칙 위반이 있었다면 오늘 중에 고칠 테니까── 응? 거절?」"

[[dialogue]]
speaker = "マトイ"
original = "「ヴィーナスさん、話って……なんです？」"
translation = "「비너스 씨, 할 말이라니…… 뭐예요?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「コホン……話というのは他でもないわ」"
translation = "「코흠…… 할 말이라는 건 다름이 아니야.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あなた、星徒会に入らない！？」"
translation = "「너, 성도회에 들어오지 않을래!?」"

[[dialogue]]
speaker = "マトイ"
original = "「ああ、なるほど。星徒会ですか。そうならそうと最初から言ってくれればいいのに──って」"
translation = "「아아, 그렇군요. 성도회인가요. 그렇다면 그렇다고 처음부터 말해주면 좋았을 텐데── 어라.」"

[[dialogue]]
speaker = "マトイ"
original = "「えっ！？\u3000えっ！？\u3000ええぇーっ！？\u3000星徒会って、その……星徒会ですか！？」"
translation = "「에엣!? 에엣!? 에에에ー엣!? 성도회라니, 그…… 성도회인가요!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そうよ。校則違反なんかじゃないわ」"
translation = "「그래. 교칙 위반 같은 게 아니야.」"

[[dialogue]]
speaker = "マトイ"
original = "（確かヴィーナスさんは現会長のサーシャさんから、次期星徒会長に指名されたって噂だけど……）"
translation = "(분명 비너스 씨는 현 회장인 사샤 씨로부터 차기 성도회장으로 지명되었다는 소문이 있었는데……)"

[[dialogue]]
speaker = "マトイ"
original = "（その新しい星徒会のメンバーに私を指名？\u3000いやいやまさか、指折りの実力者で構成されてる星徒会に私が指名されるわけないでしょ）"
translation = "(그 새로운 성도회 멤버로 나를 지명? 아니아니 설마, 손꼽히는 실력자들로 구성되는 성도회에 내가 지명될 리가 없잖아.)"

[[dialogue]]
speaker = "マトイ"
original = "「ひ、人違いじゃないですか？\u3000でなければ、何かの間違いじゃないですか？」"
translation = "「사, 사람 잘못 보신 거 아니에요? 그게 아니라면 뭔가 착오가 있는 거 아닐까요?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そんなわけないじゃない。私がヘンテコな間違いをしでかすと思う？」"
translation = "「그럴 리가 없잖아. 내가 엉뚱한 실수를 저지를 것 같아?」"

[[dialogue]]
speaker = "マトイ"
original = "「それは……こんな大事なこと、ヴィーナスさんがミスをするとも思えませんけど……」"
translation = "「그건…… 이런 중요한 일을 비너스 씨가 실수할 거라고는 생각되지 않지만요……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「でしょう！？\u3000私はミスなんてしないの！」"
translation = "「그렇지!? 나는 실수 같은 거 안 해!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ピーンと来たのよ！\u3000あなたが星徒会に入ってくれたら、新星学園は今よりもっともっともーっと良くなるって！」"
translation = "「찌릿하고 왔단 말이야! 네가 성도회에 들어와 준다면 신성학원은 지금보다 훨씬 훨씬 더ー욱 좋아질 거라고!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そういうわけだから、星徒会に入りなさい！」"
translation = "「그런 고로, 성도회에 들어오렴!」"

[[dialogue]]
speaker = "マトイ"
original = "（う……そんなに私のこと……見込んでくれてるの？）"
translation = "(으…… 그렇게 나를…… 높게 평가해 주는 거야?)"

[[dialogue]]
speaker = "マトイ"
original = "（私だって星徒会に憧れを抱いてなかったわけじゃないし……そもそもあのヴィーナスさんからの誘いを断るなんておこがましい真似できないよ）"
translation = "(나라고 성도회에 동경을 품지 않았던 건 아니고…… 애초에 그 비너스 씨의 권유를 거절하다니 가당치도 않은 짓은 못 해.)"

[[dialogue]]
speaker = "マトイ"
original = "（よしっ！\u3000だったらもう、ここは覚悟を決めて――）"
translation = "(좋아! 그렇다면 이제 여기서 각오를 다지고──)"

[[dialogue]]
speaker = "マトイ"
original = "「あの……ヴィーナスさんがそう言うんでしたら」"
translation = "「저기…… 비너스 씨가 그렇게 말씀하신다면.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「決まりね！\u3000よろしく、マトイ！」"
translation = "「결정됐네! 잘 부탁해, 마토이!」"

[[dialogue]]
speaker = "マトイ"
original = "「え……私の名前……ご存じなんですか？」"
translation = "「에…… 제 이름…… 알고 계신가요?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「同級生なんだから、当たり前でしょ。それともフルネームで呼ばれる方が好きかしら、詠野マトイ？」"
translation = "「동급생이니까 당연하지. 아니면 풀네임으로 불리는 게 좋으려나, 에노 마토이?」"

[[dialogue]]
speaker = "マトイ"
original = "「い、いえ、名前だけで。マトイで結構です」"
translation = "「아, 아니요, 이름만으로도. 마토이면 충분합니다.」"

[[dialogue]]
speaker = "マトイ"
original = "「よ、よろしくお願いします。九浄ヴィーナスさん……いえ、ヴィーナス会長」"
translation = "「자, 잘 부탁드립니다. 구죠 비너스 씨…… 아니, 비너스 회장님.」"

[[dialogue]]
speaker = "学生Ａ"
original = "「聞いた、聞いた？\u3000ヴィーナスさんが直々に星徒会役員を選出したんだって！」"
translation = "「들었어, 들었어? 비너스 씨가 직접 성도회 임원을 선출했대!」"

[[dialogue]]
speaker = "学生Ｂ"
original = "「ウソッ！\u3000誰、誰？」"
translation = "「거짓말! 누구, 누구?」"

[[dialogue]]
speaker = "学生Ａ"
original = "「えーっと……なんていったっけ……名前は思い出せないんだけど」"
translation = "「어ー 그러니까…… 이름이 뭐였더라…… 이름은 기억 안 나는데.」"

[[dialogue]]
speaker = "学生Ｂ"
original = "「そんな凄い子なのに、影が薄いの？」"
translation = "「그렇게 대단한 애인데 존재감이 없어?」"

[[dialogue]]
speaker = "学生Ａ"
original = "「どうして、そんな華のない人をヴィーナスさんは選んだのかしら」"
translation = "「어째서 그렇게 화사함 없는 사람을 비너스 씨는 고른 걸까.」"

[[dialogue]]
speaker = "マトイ"
original = "「……すみません。影が薄くて、華がなくて」"
translation = "「……죄송합니다. 존재감 없고 화사함도 없어서.」"

[[dialogue]]
speaker = "学生Ａ"
original = "「きゃっ！？\u3000ご、ごめん！！」"
translation = "「꺄악!? 미, 미안!!」"

[[dialogue]]
speaker = "マトイ"
original = "（そうだよね――私なんてヴィーナス会長みたいに華も強さもない、平々凡々を絵に描いたような存在だし）"
translation = "(그렇지── 나 같은 건 비너스 회장님처럼 화사함도 강함도 없는, 평범 그 자체를 그림으로 그린 듯한 존재고.)"

[[dialogue]]
speaker = "マトイ"
original = "「はぁ……ヴィーナスさんに選ばれて浮かれてたけど、やっぱり今からでも辞退した方が良いのかな」"
translation = "「하아…… 비너스 씨에게 뽑혀서 들떠 있었지만, 역시 지금이라도 사퇴하는 게 좋으려나.」"

[[dialogue]]
speaker = "マトイ"
original = "そんなことを思いながらも時間が過ぎて――"
translation = "그런 생각을 하면서도 시간은 흘러──"

[[dialogue]]
speaker = "マトイ"
original = "春休みが終わり、新１年生の入学式を間近に控えたある日のこと、晴れて会長になったヴィーナスさんから星徒会メンバー全員に召集がかかった。"
translation = "봄방학이 끝나고 신입생 입학식을 코앞에 둔 어느 날, 정식으로 회장이 된 비너스 씨로부터 성도회 멤버 전원에게 소집이 걸렸다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「よく集まったわね！\u3000新・星徒会メンバーのみんな！」"
translation = "「잘 모였어! 신·성도회 멤버 여러분!」"

[[dialogue]]
speaker = "サーシャ"
original = "「と言ってもまだ３人だけどね～」"
translation = "「라고 해도 아직 3명이지만 말이야~」"

[[dialogue]]
speaker = "マトイ"
original = "「がくがくがくぶるぶるぶる」"
translation = "「덜덜덜덜덜덜덜덜」"

[[dialogue]]
speaker = "サーシャ"
original = "「こうやっての顔合わせは初めてよね～。よろしくね、マトイちゃん」"
translation = "「이렇게 대면하는 건 처음이지~. 잘 부탁해, 마토이짱.」"

[[dialogue]]
speaker = "マトイ"
original = "「ふぁ、あっ、ひゃい！\u3000よろしくお願いしまひゅ！」"
translation = "「화, 아, 하이! 잘 부탁드립니댜!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「緊張しているのかしら。マトイって人見知り？」"
translation = "「긴장하고 있는 걸까. 마토이는 낯을 가려?」"

[[dialogue]]
speaker = "マトイ"
original = "「そういうレベルの話じゃないんですよお！」"
translation = "「그런 차원의 이야기가 아니에요오!」"

[[dialogue]]
speaker = "マトイ"
original = "（だってサーシャ前会長だよ？\u3000瞳、おっきい……まつ毛長い……はぅ、見つめられるだけで召されちゃいそうだよ……）"
translation = "(그야 사샤 전 회장님이잖아? 눈동자, 커…… 속눈썹 길어…… 하으, 바라봐 주는 것만으로도 승천할 것 같아……)"

[[dialogue]]
speaker = "サーシャ"
original = "「それじゃあ、とりあえず……お茶でも淹れながらお話しましょう♪」"
translation = "「그럼 일단…… 차라도 마시면서 이야기할까요♪」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「サーシャさん、とびっきり美味しいのをお願いするわ！」"
translation = "「사샤 씨, 아주 맛있는 걸로 부탁해!」"

[[dialogue]]
speaker = "サーシャ"
original = "「お任せ～。ん～？\u3000マトイちゃん、最近、あんまり眠れてないんじゃないかしら？」"
translation = "「맡겨줘~. 음~? 마토이짱, 요즘 잠을 잘 못 잔 거 아니니?」"

[[dialogue]]
speaker = "マトイ"
original = "「えっ……はい、実は……」"
translation = "「엣…… 네, 사실은……」"

[[dialogue]]
speaker = "サーシャ"
original = "「ふふ、やっぱり～。マトイちゃんには、リラックス効果のあるハーブティーを入れるわね～」"
translation = "「후후, 역시~. 마토이짱에게는 릴랙스 효과가 있는 허브티를 타 줄게~」"

[[dialogue]]
speaker = "マトイ"
original = "「お願い、します……」"
translation = "「부탁, 드립니다……」"

[[dialogue]]
speaker = "マトイ"
original = "（美人なだけじゃない……優しいよぉ……浄化されるよぉ～！）"
translation = "(미인일 뿐만 아니라…… 상냥해…… 정화돼요~!)"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ずず……うん！\u3000やっぱりサーシャさんの淹れてくれたお茶は美味しいわ！\u3000頭も冴える！」"
translation = "「후루룩…… 응! 역시 사샤 씨가 타 준 차는 맛있어! 머리도 맑아져!」"

[[dialogue]]
speaker = "サーシャ"
original = "「ありがとう。それじゃヴィーナスちゃん、初めてのミーティングを始めましょう♪」"
translation = "「고마워. 그럼 비너스짱, 첫 미팅을 시작할까요♪」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ええ、まずは各々の役職を決めましょう」"
translation = "「그래, 우선 각자의 직책을 정하자.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「当然、私は会長よ。異議ある者は挙手しなさい。正々堂々、迎え撃ってみせるわ！」"
translation = "「당연히 나는 회장이야. 이의 있는 사람은 거수해. 정정당당하게 맞서 싸워줄 테니까!」"

[[dialogue]]
speaker = "サーシャ"
original = "「異議な～し」"
translation = "「이의 없~음.」"

[[dialogue]]
speaker = "マトイ"
original = "「異議、ありません」"
translation = "「이의, 없습니다.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「次に、マトイは……書記ね！」"
translation = "「다음으로, 마토이는…… 서기야!」"

[[dialogue]]
speaker = "マトイ"
original = "「書記、ですか？」"
translation = "「서기, 인가요?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「マトイの字、この前見せてもらったけどすごく綺麗だったもの。書記程度じゃ役不足って言うなら、副会長のポジションもあるけど？」"
translation = "「마토이의 글씨, 저번에 봤는데 무척 예뻤는걸. 서기 정도로는 과분하다고 한다면 부회장 포지션도 있는데?」"

[[dialogue]]
speaker = "マトイ"
original = "「とんでもないです！\u3000書記で！\u3000お願いします！」"
translation = "「당치도 않습니다! 서기로! 부탁드립니다!」"

[[dialogue]]
speaker = "サーシャ"
original = "「異議な～し」"
translation = "「이의 없~음.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「実にスムーズね！\u3000残るは会計と副会長だけど……どうしても人数が足りないわ」"
translation = "「실로 순조롭네! 남은 건 회계와 부회장인데…… 아무래도 인원이 부족해.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ひとまず、サーシャさんが会計と副会長を兼任するってことでいい？」"
translation = "「일단 사샤 씨가 회계와 부회장을 겸임하는 걸로 해도 될까?」"

[[dialogue]]
speaker = "サーシャ"
original = "「あらあら、まあまあ。責任重大ね～」"
translation = "「어라라, 어머나. 책임이 막중하네~」"

[[dialogue]]
speaker = "マトイ"
original = "「さすがに１人に２つの役職を与えるのはどうかと思いますけど……」"
translation = "「아무리 그래도 한 명에게 두 가지 직책을 주는 건 좀 아니라고 생각합니다만……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そうなのよねー。前会長のサーシャさんでも、ちょっと重荷よねー」"
translation = "「그렇단 말이지ー. 전 회장인 사샤 씨라도 조금 짐이 되겠지ー.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ま、新入生も入ってくることだし、あとひとりは……そのうち見つけるわ、そのうち！」"
translation = "「뭐, 신입생도 들어올 테고, 나머지 한 명은…… 조만간 찾아낼 거야, 조만간!」"

[[dialogue]]
speaker = "マトイ"
original = "「大雑把すぎますよ……はぁ、大丈夫かなぁ」"
translation = "「너무 대충이잖아요…… 하아, 괜찮으려나.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「というわけで、全て決定したわ！\u3000初ミーティングの議事録、任せたわよ、マトイ！」"
translation = "「그런 고로, 전부 결정됐어! 첫 미팅 의사록, 맡길게, 마토이!」"

[[dialogue]]
speaker = "マトイ"
original = "「はぁい……」"
translation = "「네에……」"

