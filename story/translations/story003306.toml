[[dialogue]]
speaker = "サメ"
original = "「シャーーーッ！！！」"
translation = "「샤아아아앗!!!」"

[[dialogue]]
speaker = "２人"
original = "「キャーーーッ！！？」"
translation = "「꺄아아악!!?」"

[[dialogue]]
speaker = "サメ"
original = "「シャ～～ッ……」"
translation = "「샤아아앗……」"

[[dialogue]]
speaker = "unk"
original = "２人とも大丈夫！？"
translation = "둘 다 괜찮아!?"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「会長！」"
translation = "「회장님!」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「ありがとうなのだ！」"
translation = "「고마운 것이다!」"

[[dialogue]]
speaker = "unk"
original = "マグダレナたちを助けた後、パテルやリップルとも合流し、あのサメについて話し合った。"
translation = "막달레나 일행을 구한 뒤, 파텔이나 리플과도 합류하여 그 상어에 대해 이야기를 나누었다."

[[dialogue]]
speaker = "リップル"
original = "「サメ……？\u3000ワタシじゃないですね……サメはサーファーの天敵ですから」"
translation = "「상어……? 제가 한 게 아니네요…… 상어는 서퍼의 천적이니까요.」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「やっぱりリップルさまじゃなかったんですね……。じゃあ、あのサメはいったい……？」"
translation = "「역시 리플 님이 아니셨군요……. 그럼 그 상어는 대체……?」"

[[dialogue]]
speaker = "unk"
original = "パテルが関わってる？"
translation = "파텔이 관련되어 있어?"

[[dialogue]]
speaker = "パテル"
original = "「まぁ、そう思うのが自然だよね。明らかにパテルストーンが関係してそうだし」"
translation = "「뭐, 그렇게 생각하는 게 자연스럽겠지. 분명히 파텔 스톤이 관계되어 있는 것 같고.」"

[[dialogue]]
speaker = "パテル"
original = "「そうだよ。確かに今回のサメはあたし──守護天使パテルが関わってる。あたしも何が起こってるのか理解したのは、さっきのことだけどね」"
translation = "「맞아. 확실히 이번 상어는 나── 수호천사 파텔이 관여하고 있어. 나도 무슨 일이 일어나고 있는지 이해한 건 방금 전이지만 말이야.」"

[[dialogue]]
speaker = "パテル"
original = "「じゃ、答え合わせといこっか。あのサメが何か、アルモタヘルならわかるよね？」"
translation = "「그럼 정답 맞히기 해볼까. 저 상어가 뭔지, 아르모타헬이라면 알겠지?」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「あのサメはギガロドン、遥か古代に絶滅した魔界のサメなのだ」"
translation = "「저 상어는 기갈로돈, 아주 먼 고대에 멸종한 마계의 상어인 것이다.」"

[[dialogue]]
speaker = "パテル"
original = "「そう。『淘汰』の摂理を司るあたしと、『種族』を司るアルモタヘルなら当然知ってる」"
translation = "「그래. 『도태』의 섭리를 관장하는 나와, 『종족』을 관장하는 아르모타헬이라면 당연히 알고 있지.」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「そうだったんですか……！？\u3000てっきりリゾート結界にしかいないものかと……」"
translation = "「그랬던 건가요……!? 전 리조트 결계에만 있는 건 줄로만……」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「ここはリゾート結界だから、たまたま似ているサメをリップルが作ったのかと思ったのだ」"
translation = "「여기는 리조트 결계니까, 마침 비슷하게 생긴 상어를 리플이 만든 줄 알았던 것이다.」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「だけどさっき見たら、体型や体の大きさ、歯の並びまで本物と同じだったのだ」"
translation = "「하지만 아까 보니까 체형이나 몸집, 이빨 배열까지 진짜랑 똑같았단 것이다.」"

[[dialogue]]
speaker = "パテル"
original = "「堕天使パテルはリゾート結界に侵入し、霊力を宿した欠片になった。だけどその欠片は、再びパテルの姿を取り戻した」"
translation = "「타락천사 파텔은 리조트 결계에 침입해 영력을 품은 파편이 되었어. 하지만 그 파편은 다시 파텔의 모습을 되찾았지.」"

[[dialogue]]
speaker = "パテル"
original = "「そして『淘汰』を司る守護天使パテルが、淘汰された種を眷属として使役していたんだ」"
translation = "「그리고 『도태』를 관장하는 수호천사 파텔이, 도태된 종을 권속으로서 사역하고 있었던 거야.」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「でもどうしてなのだ？\u3000パテルはまた堕天しちゃったのか？」"
translation = "「하지만 어째서인 것이다? 파텔은 또 타락해 버린 것인가?」"

[[dialogue]]
speaker = "パテル"
original = "「ううん、堕天なんかしてないよ。本来の仕事……というか本来の機能を果たしているだけ」"
translation = "「으응, 타락 같은 거 안 했어. 본래의 업무……라기보다 본래의 기능을 수행하고 있을 뿐이야.」"

[[dialogue]]
speaker = "unk"
original = "本来の機能？"
translation = "본래의 기능?"

[[dialogue]]
speaker = "パテル"
original = "「あたしの機能は『淘汰』。環境に適応できなくなった生命を滅ぼすこと」"
translation = "「내 기능은 『도태』. 환경에 적응하지 못하게 된 생명을 멸망시키는 것.」"

[[dialogue]]
speaker = "パテル"
original = "「そしてその摂理に反し、命ならざる命になったものを抹殺すること」"
translation = "「그리고 그 섭리에 반해, 목숨이 아닌 목숨이 된 것들을 말살하는 것.」"

[[dialogue]]
speaker = "パテル"
original = "「パテルストーン──もう１人のあたしは、あなたたちを警戒している。摂理に反する存在になるんじゃないかとね」"
translation = "「파텔 스톤── 또 하나의 나는 너희를 경계하고 있어. 섭리에 반하는 존재가 되는 건 아닐까 하고 말이야.」"

[[dialogue]]
speaker = "パテル"
original = "「そしてそれを警戒しているのは、あたしも同じ」"
translation = "「그리고 그걸 경계하고 있는 건 나도 마찬가지야.」"

[[dialogue]]
speaker = "unk"
original = "同じ……？"
translation = "마찬가지……?"

[[dialogue]]
speaker = "パテル"
original = "「そう、あたしは死神として、あなたたちを監視していたんだよ。魔王、マグダレナ、アルモタヘル」"
translation = "「그래, 나는 사신으로서 너희를 감시하고 있었어. 마왕, 막달레나, 아르모타헬.」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「アルモたんたちを監視していた……！？」"
translation = "「알모땅 일행을 감시하고 있었다니……!?」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「待ってください、私たちは同じ守護天使ですよ！？」"
translation = "「기다려 주세요, 저희는 같은 수호천사잖아요!?」"

[[dialogue]]
speaker = "パテル"
original = "「守護天使ならわかるでしょ。今の自分たちが本来ありえない存在だって」"
translation = "「수호천사라면 알 거 아냐. 지금의 자신들이 본래 있을 수 없는 존재라는 걸.」"

[[dialogue]]
speaker = "パテル"
original = "「マグダレナとアルモタヘルは、義体に守護天使の魂の一部を宿したもの。守護天使が持ちえない肉の体がある」"
translation = "「막달레나와 아르모타헬은 의체에 수호천사의 영혼 일부를 깃들게 한 것. 수호천사가 가질 수 없는 살로 된 몸이 있어.」"

[[dialogue]]
speaker = "パテル"
original = "「そして魔王。あなたは、先代の魔王ラクシスが魔女の『<ruby>封理再誕<rt>レナトゥス</rt></ruby>』によって、生まれ変わった存在」"
translation = "「그리고 마왕. 당신은 선대 마왕 라크시스가 마녀의 『봉리재탄』에 의해 다시 태어난 존재.」"

[[dialogue]]
speaker = "パテル"
original = "「あなたたちは普通の命じゃない。例外的な存在だ。魂や肉体に異変が起きて、不死の怪物になる──なんてことが起こる可能性がある」"
translation = "「너희는 평범한 생명이 아냐. 예외적인 존재지. 영혼이나 육체에 이변이 생겨서 불사의 괴물이 된다── 같은 일이 벌어질 가능성이 있어.」"

[[dialogue]]
speaker = "パテル"
original = "「いつぞやのコラプサーのような、生きても死んでもいないような、歪んだ存在になるかもしれない」"
translation = "「언젠가의 콜랩서 같은, 살아있지도 죽어있지도 않은 왜곡된 존재가 될지도 몰라.」"

[[dialogue]]
speaker = "unk"
original = "パテルが言っているのは、コラプサーの黒幕だったイザベラのことだろう。"
translation = "파텔이 말하는 건 콜랩서의 흑막이었던 이자벨라를 말하는 거겠지."

[[dialogue]]
speaker = "unk"
original = "彼女はブラックホールの力によって不死となったが、その果てに自我が崩壊した怪物に成り果てた。"
translation = "그녀는 블랙홀의 힘에 의해 불사가 되었지만, 그 끝에 자아가 붕괴한 괴물로 전락했다."

[[dialogue]]
speaker = "パテル"
original = "「今回あたしがリゾート結界に来たのは、あなたたちの状態を確認するためでもあったんだ」"
translation = "「이번에 내가 리조트 결계에 온 건 너희의 상태를 확인하기 위해서이기도 했어.」"

[[dialogue]]
speaker = "unk"
original = "なんとなくそんな気がしてた"
translation = "왠지 그런 기분이 들었어"

[[dialogue]]
speaker = "パテル"
original = "「あ、あたしが隠し事してるの気付いてた？」"
translation = "「아, 내가 숨기고 있는 거 눈치챘었어?」"

[[dialogue]]
speaker = "unk"
original = "最初に俺をおにーさんって呼んだから"
translation = "처음에 나를 오빠라고 불렀으니까"

[[dialogue]]
speaker = "パテル"
original = "「アハッ、鋭いね～。そういえばあたし、最初は守護天使ってこと隠してたもんね」"
translation = "「아핫, 예리하네~. 그러고 보니 나, 처음엔 수호천사라는 거 숨기고 있었지.」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「《試練》のパテルは、同じ守護天使も試していた……ということなんですね」"
translation = "「《시련》의 파텔은 같은 수호천사도 시험하고 있었다……는 거군요.」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「そういえばパテルはこういうやつだったのだ」"
translation = "「그러고 보니 파텔은 이런 녀석이었던 것이다.」"

[[dialogue]]
speaker = "サメ"
original = "「シャーーーッ！！！」"
translation = "「샤아아아악!!!」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「きゃぁっ！？\u3000ビーチにサメが押し寄せてきましたーっ！？」"
translation = "「꺄악!? 해변에 상어가 몰려왔어요!?」"

