[[dialogue]]
speaker = "unk"
original = "第５話,再構築の瘴気,B"
translation = "제5화, 재구축의 장기, B"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「うふふ。順調ね～」"
translation = "「우후후. 순조롭네~」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「順調……順調、なんですけど……」"
translation = "「순조…… 순조롭긴 한데요……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「？\u3000どしたの、マトイ」"
translation = "「? 왜 그래, 마토이」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「なんか……この前の話を聞いたら、余計にこの瘴気が怖くなっちゃったというか……」"
translation = "「뭔가…… 지난번 이야기를 들으니까, 괜히 이 장기가 더 무서워졌다고 할까……」"

[[dialogue]]
speaker = "unk"
original = "マトイが示したのは──アステラ内部に立ち込める薄紫の瘴気。"
translation = "마토이가 가리킨 것은── 아스테라 내부에 자욱하게 깔린 연보랏빛 장기."

[[dialogue]]
speaker = "unk"
original = "見慣れた存在ではあったものの、先日俺たちはこのおぞましい正体について知ったばかりだった。"
translation = "익숙한 존재이긴 했지만, 며칠 전 우리는 이 끔찍한 정체에 대해 알게 된 참이었다."

[[dialogue]]
speaker = "unk"
original = "それは先々日のこと。"
translation = "그것은 엊그제 일이었다."

[[dialogue]]
speaker = "unk"
original = "アナに呼び出された俺たちは、揃って学園のトレーニング施設に集合していた。"
translation = "아나에게 호출된 우리는, 모두 학원의 트레이닝 시설에 모여 있었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「どうしたんだ、アナ。みんなを集めて……」"
translation = "「왜 그래, 아나. 모두를 모아서……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はい。アニマさんとコハルコさんの協力も得て、この前の解析結果が出ました」"
translation = "「네. 아니마 씨와 코하루코 씨의 협력도 얻어, 지난번 해석 결과가 나왔습니다.」"

[[dialogue]]
speaker = "unk"
original = "アナは、ぺこりと頭を下げるやすぐに本題を切り出してきた。"
translation = "아나는 꾸벅 고개를 숙이자마자 바로 본론을 꺼냈다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「！\u3000さすがアナね！」"
translation = "「! 역시 아나네!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「この前の……って、もしかして、例の……？」"
translation = "「지난번……이라니, 혹시, 그……?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「これですね。暴走したという機械のパーツ」"
translation = "「이것입니다. 폭주했다고 하는 기계의 부품」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「残っていた瘴気も合わせて分析し、私なりに推測を立ててみました」"
translation = "「남아 있던 장기도 함께 분석하여, 저 나름대로 추측을 세워봤습니다.」"

[[dialogue]]
speaker = "unk"
original = "俺とヴィーナスが《フィーニスの塔》第一階層を攻略したあの日──"
translation = "나와 비너스가 《피니스의 탑》 제1계층을 공략했던 그날──"

[[dialogue]]
speaker = "unk"
original = "フィオナの助言から、俺たちは最後に立ちはだかったガーディアンの残骸を持ち帰っていた。"
translation = "피오나의 조언에 따라, 우리는 마지막에 가로막았던 가디언의 잔해를 가져왔었다."

[[dialogue]]
speaker = "unk"
original = "さすがに４０００階にものぼるという塔を踏破することは叶わなかったものの、せめて次なる情報を得たかったのだ。"
translation = "아무리 4000계층에 달한다는 탑을 밟고 지나가는 것은 불가능했지만, 하다못해 다음 정보를 얻고 싶었던 것이다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「結論から言うと、このガーディアンには目についた存在すべてを排斥するプログラムが組まれていました」"
translation = "「결론부터 말씀드리자면, 이 가디언에게는 눈에 띄는 존재 모두를 배척하는 프로그램이 짜여 있었습니다.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ずいぶん乱暴なのね」"
translation = "「꽤나 난폭하네.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「それと、フィーニスの塔のガーディアンといえば古い書物にデータが残っていて……」"
translation = "「그리고, 피니스의 탑의 가디언이라고 하면 오래된 서적에 데이터가 남아 있어서……」"

[[dialogue]]
speaker = "unk"
original = "アナは手元のタブレットを操作し、目の前に小さいホログラム映像を出現させた。"
translation = "아나는 손에 든 태블릿을 조작하여, 눈앞에 작은 홀로그램 영상을 출현시켰다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ガーディアンＭ型Ⅱ号。こんなフォルムでしたか？」"
translation = "「가디언 M형 Ⅱ호. 이런 형태였습니까?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「なんとなく、こんなのだったと思うけど……」"
translation = "「왠지, 이런 거였던 것 같긴 한데……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「もっと腕部が凶暴な感じだったな」"
translation = "「좀 더 팔 부분이 흉포한 느낌이었지.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「じゃあ、こんな？」"
translation = "「그럼, 이런 건요?」"

[[dialogue]]
speaker = "unk"
original = "すると今度は、別のホログラムを立ち上がらせたアナ。"
translation = "그러자 이번에는, 다른 홀로그램을 띄운 아나."

[[dialogue]]
speaker = "unk"
original = "それは……"
translation = "그것은……"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あ！\u3000そうそう！\u3000ちょうどこいつみたいな感じだった！」"
translation = "「아! 맞아 맞아! 딱 얘 같은 느낌이었어!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「でも、これって……」"
translation = "「근데, 이거……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「モンスター、よね？」"
translation = "「몬스터, 맞지?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はい。なので件のガーディアンは、モンスターと融合させられた形態だったということになります」"
translation = "「네. 그래서 해당 가디언은, 몬스터와 융합된 형태였다는 것이 됩니다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "unk"
original = "ガーディアンは塔を守りし聖なるもの。"
translation = "가디언은 탑을 지키는 성스러운 존재."

[[dialogue]]
speaker = "unk"
original = "そんな存在とモンスターが結合するなんて、どう考えても無理やりで……"
translation = "그런 존재와 몬스터가 결합하다니, 아무리 생각해도 억지로……"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「つまり、<ruby>再構築<rt>リクリエイション</rt></ruby>」"
translation = "「즉, 재구축」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「フィーニスの塔を汚染している瘴気は、存在の根幹を組み替える作用を持っています」"
translation = "「피니스의 탑을 오염시키고 있는 장기는, 존재의 근간을 재조합하는 작용을 가지고 있습니다.」"

[[dialogue]]
speaker = "unk"
original = "アナが俺たちに語ったのは──"
translation = "아나가 우리에게 말한 것은──"

[[dialogue]]
speaker = "unk"
original = "これまで何度も目にしてきた紫の瘴気、その正体だった。"
translation = "지금까지 몇 번이고 보아왔던 보랏빛 장기, 그 정체였다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「い、遺伝子組み換え食品……？」"
translation = "「유, 유전자 변형 식품……?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「食品ではありませんが、おおむねそんな感じかと」"
translation = "「식품은 아닙니다만, 대체로 그런 느낌일 겁니다.」"

[[dialogue]]
speaker = "unk"
original = "言うなれば、遺伝子組み換えガスと言ったところか。字面以上に恐ろしい。"
translation = "말하자면, 유전자 변형 가스라고 할 수 있을까. 글자 그대로보다 훨씬 무섭다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「アステラも～、よく瘴気に汚染されてるけど……同じものなのかな？」"
translation = "「아스테라도~, 자주 장기에 오염되곤 하는데…… 같은 걸까?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「濃度の違いはあれ、どちらもリクリエに起因するものなので本質は同じでしょう」"
translation = "「농도의 차이는 있을지언정, 둘 다 리크리에에 기인하는 것이므로 본질은 같을 것입니다.」"

[[dialogue]]
speaker = "unk"
original = "あの時に出会った天使──マグダレナさんは、フィオナいわく別の場所で“堕天使”化していたという。"
translation = "그때 만났던 천사── 막달레나 씨는, 피오나 말로는 다른 장소에서 “타락천사”화하고 있었다고 한다."

[[dialogue]]
speaker = "unk"
original = "それは単に正気を失っていたのではなく、根っこから改造されかけていたがゆえの不調だったということになる。"
translation = "그것은 단순히 제정신을 잃었던 것이 아니라, 뿌리부터 개조당하고 있었기 때문에 생긴 부조화였다는 것이 된다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「この汚染は、深く進めば進むほど不可逆なものになります」"
translation = "「이 오염은, 깊이 진행되면 될수록 비가역적인 것이 됩니다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「なのでその場でガーディアンを破壊したのは正解だったと言えますね」"
translation = "「그러니 그 자리에서 가디언을 파괴한 것은 정답이었다고 할 수 있겠네요.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「明らかに<ruby>剣呑<rt>けんのん</rt></ruby>そうな相手だったからな──」"
translation = "「분명 위험해 보이는 상대였으니까──」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「より高層はもっとひどいかも。塔の中身自体、組み替えられてるかもしれません」"
translation = "「더 높은 계층은 더욱 심할지도 모릅니다. 탑의 내용물 자체가 재조합되고 있을지도 몰라요.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「怖っ……」"
translation = "「무서워……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「いつも身近にあったのに……あの塔の中で、そんなことが起きてるなんて」"
translation = "「항상 가까이에 있었는데…… 그 탑 안에서, 그런 일이 일어나고 있다니.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「じゃあ、あまりフィーニスの塔には近寄らないほうがいいのか……？」"
translation = "「그럼, 너무 피니스의 탑에 가까이 가지 않는 편이 좋은 건가……?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「基本的には、星騎士であれば星の加護がついているので平気です──が」"
translation = "「기본적으로는, 성기사라면 별의 가호가 붙어 있으니 괜찮습니다──만」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ただならないイレギュラーが生じている恐れはあります。平気でない場所だって、あるかもしれません」"
translation = "「심상치 않은 변칙적인 일이 생기고 있을 우려는 있습니다. 괜찮지 않은 장소도, 있을지도 모릅니다.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……でも、昇らなきゃダメよ！\u3000だってあの守護天使さんだって、頂上を目指せって言ってたし」"
translation = "「……하지만, 올라가야 해! 왜냐면 그 수호 천사 씨도, 정상을 목표로 하라고 했고」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それに──上の方からずっと、私を呼ぶ声がしたから……」"
translation = "「게다가── 위쪽에서 계속, 나를 부르는 소리가 났으니까……」"

[[dialogue]]
speaker = "unk"
original = "そうなのだ。"
translation = "그랬다."

[[dialogue]]
speaker = "unk"
original = "異変があったのは、何も相手方だけではない。"
translation = "이변이 있었던 것은, 비단 상대방뿐만이 아니었다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「それについてはよくわかりませんが……例の『瘴気』の危険性については忠告しておきます」"
translation = "「그것에 대해서는 잘 모르겠습니다만…… 문제의 『장기』의 위험성에 대해서는 충고해 두겠습니다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「もし、高濃度のリクリエ瘴気に冒されれば……人ですらなくなる蓋然性すら生じますから」"
translation = "「만약, 고농도의 리크리에 장기에 휩싸이면…… 사람조차 아니게 될 개연성마저 생기니까요.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ひぇっ……」"
translation = "「히읏……」"

[[dialogue]]
speaker = "unk"
original = "虎穴に入らずんば虎子を得ず。"
translation = "호랑이 굴에 들어가지 않고서는 호랑이 새끼를 잡을 수 없다."

[[dialogue]]
speaker = "unk"
original = "危険な高層に進むほど、未だ俺たちの知らない何かが眠っている……という話だ。"
translation = "위험한 고층으로 나아갈수록, 아직 우리가 모르는 무언가가 잠들어 있다……는 이야기다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「でも、また入れなくなっちゃったのよね」"
translation = "「근데, 또 못 들어가게 됐잖아.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「何か解除の条件があるのかもな。今度は別の栞を見つけるとか……」"
translation = "「뭔가 해제 조건이 있는 걸지도 모르지. 이번에는 다른 책갈피를 찾는다든가……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「もうっ……この２人、少しは物怖じした方がいいと思うの！」"
translation = "「정말…… 이 두 사람, 조금은 겁을 먹는 게 좋다고 생각해!」"

[[dialogue]]
speaker = "unk"
original = "あの時もマトイは真剣に俺たちを心配してくれていた。"
translation = "그때도 마토이는 진심으로 우리를 걱정해 주고 있었다."

[[dialogue]]
speaker = "unk"
original = "今までもずっと目にしてきたものだが、正体がわかってよりおぞましくなったというのは同感だった。"
translation = "지금까지도 계속 보아왔던 것이지만, 정체를 알고 나니 더욱 끔찍해졌다는 것에는 동감이었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「存在の再構築を促す瘴気……とんでもないよな」"
translation = "「존재의 재구축을 촉진하는 장기…… 터무니없네.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「あまり長居しなければ大丈夫です。《塔》のガーディアン達は、逃げ場がなかったせいで呑まれたものかと」"
translation = "「너무 오래 머무르지 않으면 괜찮습니다. 《탑》의 가디언들은, 도망칠 곳이 없었던 탓에 휩쓸린 것일 겁니다.」"

[[dialogue]]
speaker = "unk"
original = "何にせよ、こんなものが外に流出しては大問題だ。"
translation = "어쨌든, 이런 것이 밖으로 유출된다면 큰 문제다."

[[dialogue]]
speaker = "unk"
original = "一刻も早くこのアステライトを解放する──という目的に変わりはない。"
translation = "하루라도 빨리 이 아스테라이트를 해방한다──는 목적에는 변함이 없다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「もうけっこう進んできたけど、まだなのかな……？」"
translation = "「벌써 꽤 진행했는데, 아직 멀었나……?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「大丈夫。そろそろ最奥に達するわ」"
translation = "「괜찮아. 슬슬 최심부에 다다를 거야.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そんなことわかるのか？」"
translation = "「그런 걸 알 수 있어?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ええ。でもって、待ち受ける敵は豚みたいな大怪獣よ！」"
translation = "「응. 게다가, 기다리고 있는 적은 돼지 같은 대괴수야!」"

[[dialogue]]
speaker = "unk"
original = "まるで見てきたかのように語るヴィーナス。"
translation = "마치 보고 온 것처럼 말하는 비너스."

[[dialogue]]
speaker = "unk"
original = "彼女がこんな自信満々になるのは、決まって例の根拠がある時だ。"
translation = "그녀가 이렇게 자신만만해지는 것은, 늘 그 근거가 있을 때다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「それも……例の“日誌”なのね？」"
translation = "「그것도…… 그 “일지”인 거지?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ええ！」"
translation = "「응!」"

[[dialogue]]
speaker = "unk"
original = "そう言ってヴィーナスは、見慣れた装丁の一冊を取り出して広げる。"
translation = "그렇게 말하며 비너스는, 익숙한 장정의 한 권을 꺼내 펼친다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「『<ruby>荒鷹<rt>あらたか</rt></ruby>ノ月十四日。知の殿堂を司りし魔族と初の邂逅を果たす』──っと、これはさっきの出来事ね」"
translation = "「『황조롱이의 달 십사일. 지의 전당을 관장하는 마족과 첫 해후를 이룬다』── 흠, 이건 방금 전의 일이지.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「『その後、私たちは市街に出没した<ruby>星雲巣<rt>せいうんそう</rt></ruby>を撃破する。最奥に待ち受けていたのは大豚の如き大怪獣』」"
translation = "「『그 후, 우리는 시가에 출몰한 성운 소굴을 격파한다. 최심부에 기다리고 있던 것은 큰 돼지와 같은 대괴수』」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「『星騎士の勢力は日に日に高まっていた。これよりしばらくは目立った巣の出現もなく、平穏な<ruby>刻<rt>とき</rt></ruby>が続く』」"
translation = "「『성기사의 세력은 나날이 높아지고 있었다. 이로부터 한동안은 눈에 띄는 소굴의 출현도 없이, 평온한 시간이 계속된다』」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「『『魔王』の力は未だ眠りの中にあるが、焦る必要はない。彼の力は星雲巣の解放を通じて着々と育っているのだから』」"
translation = "「『『마왕』의 힘은 아직 잠들어 있지만, 초조해할 필요는 없다. 그의 힘은 성운 소굴의 해방을 통해 착실하게 자라나고 있으니까』」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「『彼ならばきっと、此度のリクリエにも対抗しうるだろう……』」"
translation = "「『그라면 분명, 이번 리크리에에도 대항할 수 있을 것이다……』」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「──ね！\u3000このように、未来の日誌にも今日の平和は保証されているのよ！」"
translation = "「──봐! 이처럼, 미래의 일지에도 오늘의 평화는 보장되어 있어!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「なんか、予知しすぎてて怖いんですけど……」"
translation = "「뭔가, 너무 예지하고 있어서 무서운데요……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「まあ、不穏なことが書かれていないだけ良いでしょう」"
translation = "「뭐, 불온한 내용이 쓰여 있지 않은 것만으로도 좋을 겁니다.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「実際、なんだかんだで的中してるんだものね～」"
translation = "「실제로, 이러니저러니 해도 적중하고 있는걸~」"

[[dialogue]]
speaker = "unk"
original = "堕天使マグダレナが託したという“栞”を手に入れたあと──"
translation = "타락천사 막달레나가 맡겼다는 “책갈피”를 손에 넣은 후──"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスの持っていた日誌には“俺と出会って以降のページ”が追加された。それだけでも尋常でない力が働いていることがわかる。"
translation = "비너스가 가지고 있던 일지에는 “나와 만난 이후의 페이지”가 추가되었다. 그것만으로도 심상치 않은 힘이 작용하고 있음을 알 수 있다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「昨日のどしゃ降りも、一昨日の地震だって書かれてあったんだから。これさえあれば私たちは無敵よ」"
translation = "「어제의 폭우도, 엊그제의 지진도 쓰여 있었다니까. 이것만 있으면 우리는 무적이야.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「いつか私の真の力覚醒エピソードも書かれてないかなあ……」"
translation = "「언젠가 나의 진정한 힘 각성 에피소드도 쓰여 있지 않을까……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「欲望だだ漏れになってますよ、マトイ先輩」"
translation = "「욕망이 줄줄 새고 있어요, 마토이 선배.」"

[[dialogue]]
speaker = "unk"
original = "まるで俺たちを導くかのように記されていく日誌。"
translation = "마치 우리를 인도하듯이 기록되어 가는 일지."

[[dialogue]]
speaker = "unk"
original = "俺たちはこの内容に従うべきか、それとも抗うべきなのか──"
translation = "우리는 이 내용에 따라야 할까, 아니면 맞서 싸워야 할까──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（あるいは……抗ったところで意味なんてないのか）"
translation = "（아니면…… 맞서 싸워봤자 의미 같은 건 없는 걸까）"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（いや……やめよう。ひとまず日誌を信じるヴィーナスを信じると決めたんだ。悪いことが起きたら、その時に考えよう）"
translation = "（아니…… 그만두자. 일단 일지를 믿는 비너스를 믿기로 결정했어. 나쁜 일이 생기면, 그때 생각하자）"

[[dialogue]]
speaker = "unk"
original = "不思議な思いを抱えつつ、俺たちはアステラの最奥へ向かった……。"
translation = "이상한 생각을 품은 채, 우리는 아스테라의 최심부로 향했다……."

[[dialogue]]
speaker = "unk"
original = "そうして、辿り着いた行き止まり。"
translation = "그렇게, 도착한 막다른 길."

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「ブオオオオオウ！\u3000ブォッ、ブォッ……ブオオオオン！！」"
translation = "「부오오오오오우! 부옷, 부옷…… 부오오오온!!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ほ……ほんとに豚みたいなモンスター！」"
translation = "「저…… 정말로 돼지 같은 몬스터!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「やっぱり日誌は正しいわね！\u3000《魔王》クロト、やっちゃいなさい！」"
translation = "「역시 일지는 옳네! 《마왕》 쿠로토, 해치워 버려!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「みんなで戦うんだよ──いくぞ！」"
translation = "「모두 함께 싸우는 거야── 간다!」"

