[[dialogue]]
speaker = "モネ"
original = "（私にとってのクリスマス……クリスマスプレゼントとしてもらった本、クリスマスを題材にした本、クリスマスに自分で手に取った本……）"
translation = "（나에게 크리스마스…… 크리스마스 선물로 받은 책, 크리스마스를 소재로 한 책, 크리스마스에 직접 고른 책……）"

[[dialogue]]
speaker = "モネ"
original = "（本の思い出はたくさんある。だけど一番はっきりと覚えているのは……）"
translation = "（책에 대한 추억은 잔뜩 있어. 하지만 가장 선명하게 기억하고 있는 건……）"

[[dialogue]]
speaker = "モネ"
original = "「思い出しました……私にとって、一番大切なクリスマスを」"
translation = "「생각났어요…… 저에게 있어 가장 소중한 크리스마스를」"

[[dialogue]]
speaker = "リップル"
original = "「ホントですか♪\u3000ゼヒ教えてくださ～い♪」"
translation = "「정말마시타♪ 부디 가르쳐주세마시타~♪」"

[[dialogue]]
speaker = "モネ"
original = "「……私にとってのクリスマスは、祖父との思い出です」"
translation = "「……저에게 크리스마스는 할아버지와의 추억이에요.」"

[[dialogue]]
speaker = "リップル"
original = "「オジイチャンとの思い出……ですか？」"
translation = "「할아버지와의 추억…… 말인가요?」"

[[dialogue]]
speaker = "モネ"
original = "「はい。祖父とはいつも一緒に書斎で本を読んでいて、おじいちゃん子なので」"
translation = "「네. 할아버지와는 늘 서재에서 함께 책을 읽었거든요. 제가 할아버지 껌딱지라서요.」"

[[dialogue]]
speaker = "リップル"
original = "「気にナリます♪\u3000モネの一番のクリスマス♪」"
translation = "「궁금해마시타♪ 모네의 최고의 크리스마스♪」"

[[dialogue]]
speaker = "モネ"
original = "「ふふ、あれはまだ私がずっと小さかった頃の話です」"
translation = "「후후, 그건 제가 아주 어렸을 적의 이야기예요.」"

[[dialogue]]
speaker = "モネ"
original = "「あの頃の私にとってクリスマスは、美味しい食べ物に囲まれて、プレゼントを貰える本当にお祭りのような……特別な日だったんです」"
translation = "「그 시절의 저에게 크리스마스는 맛있는 음식에 둘러싸여 선물을 받는, 정말 축제 같은…… 특별한 날이었어요.」"

[[dialogue]]
speaker = "モネ"
original = "「まだ幼かった私は、サンタクロースの存在を本気で信じていました」"
translation = "「아직 어렸던 저는 산타클로스의 존재를 진심으로 믿고 있었죠.」"

[[dialogue]]
speaker = "リップル"
original = "「サンタクロースって存在しないんデスか！？」"
translation = "「산타클로스란 존재하지 않아마시타!?」"

[[dialogue]]
speaker = "モネ"
original = "「いえ、サンタクロースは存在しますよ。ただ、当時の私が思い描いていたような魔法のような存在は……私の前には現れてくれませんでした」"
translation = "「아뇨, 산타클로스는 존재해요. 다만 당시의 제가 그리던 마법 같은 존재는…… 제 앞에는 나타나 주지 않았죠.」"

[[dialogue]]
speaker = "モネ"
original = "「クリスマスイブの夜……私はサンタクロースからのプレゼントを楽しみにして、ぐっすり眠っていました」"
translation = "「크리스마스 이브 밤…… 저는 산타클로스가 줄 선물을 기대하며 푹 자고 있었어요.」"

[[dialogue]]
speaker = "モネ"
original = "「ですが、その日私にプレゼントを届けにきたサンタクロースは、少しおっちょこちょいで物音を立ててしまったんです」"
translation = "「하지만 그날 저에게 선물을 전하러 온 산타클로스는 조금 덜렁이라서 소리를 내고 말았죠.」"

[[dialogue]]
speaker = "モネ"
original = "「そして私は……ぼんやりと目を覚まし、サンタクロースの正体を見てしまったんです」"
translation = "「그리고 저는…… 어렴풋이 눈을 떠서 산타클로스의 정체를 보고 말았어요.」"

[[dialogue]]
speaker = "リップル"
original = "「サンタクロースのショウタイ……！\u3000それは一体ダレなんです……！？」"
translation = "「산타클로스의 정체……! 그것은 대체 누구마시타……!?」"

[[dialogue]]
speaker = "モネ"
original = "「ふふ……サンタクロースの正体は、私の祖父だったんです」"
translation = "「후후…… 산타클로스의 정체는 저희 할아버지였어요.」"

[[dialogue]]
speaker = "リップル"
original = "「モネのオジイチャンがサンタクロース！？\u3000ということは、モネはサンタクロースのマゴだったんデスね！」"
translation = "「모네의 할아버지가 산타클로스!? 그렇다는 건 모네는 산타클로스의 손녀였던 것이마시타네!」"

[[dialogue]]
speaker = "モネ"
original = "「それは少し違います……。確かにあの日の祖父はサンタクロースでしたが、あくまでもサンタクロースの代理だったんです」"
translation = "「그건 조금 달라요……. 확실히 그날의 할아버지는 산타클로스였지만, 어디까지나 산타클로스의 대리였거든요.」"

[[dialogue]]
speaker = "リップル"
original = "「サンタクロースのダイリ？\u3000誰でもサンタクロースになれるというコトです？」"
translation = "「산타클로스의 대리나리? 누구든 산타클로스가 될 수 있다는 것이마시타?」"

[[dialogue]]
speaker = "モネ"
original = "「そうですね……なろうと思えば、誰でもなれるのがサンタクロースなんだと思います」"
translation = "「그렇죠…… 되려고 마음먹으면 누구든 될 수 있는 게 산타클로스라고 생각해요.」"

[[dialogue]]
speaker = "リップル"
original = "「なんというショウゲキのシンジツ……！？」"
translation = "「이 무슨 충격적인 진실마시타……!?」"

[[dialogue]]
speaker = "モネ"
original = "「当時の私は、本気でサンタクロースの存在を信じていました。ですが、祖父がサンタクロースの代わりをしていたことを知っても、不思議と悲しくならなかったんです」"
translation = "「당시의 저는 진심으로 산타클로스의 존재를 믿고 있었어요. 하지만 할아버지가 산타클로스 대신이었다는 걸 알아도 이상하게 슬프지 않았어요.」"

[[dialogue]]
speaker = "リップル"
original = "「それは、ドウシテです？」"
translation = "「그것은 어째서마시타?」"

[[dialogue]]
speaker = "モネ"
original = "「祖父は不器用ながらも、私にまごころと愛をプレゼントしてくれたからです」"
translation = "「할아버지는 서툴면서도 저에게 진심과 사랑을 선물해 주셨기 때문이에요.」"

[[dialogue]]
speaker = "モネ"
original = "「少し慌てながらプレゼントの絵本を枕元に置いた祖父は、私の頭を優しく撫でて……そのまま部屋を去りました。祖父の手のひらの温もりは、今でも思い出すことができます」"
translation = "「조금 당황하며 선물인 그림책을 머리맡에 둔 할아버지는 제 머리를 상냥하게 쓰다듬고…… 그대로 방을 나가셨죠. 할아버지의 손바닥 온기는 지금도 기억할 수 있어요.」"

[[dialogue]]
speaker = "モネ"
original = "「そんな祖父の愛情をはっきりと感じたからこそ、私はサンタクロースの真実を受け止められたんです」"
translation = "「그런 할아버지의 애정을 분명하게 느꼈기에, 저는 산타클로스의 진실을 받아들일 수 있었던 거예요.」"

[[dialogue]]
speaker = "リップル"
original = "「ナルホド……優しいオジイチャンだったんですね……」"
translation = "「나루호도…… 다정한 할아버지였마시타네……」"

[[dialogue]]
speaker = "モネ"
original = "「はい、私の自慢の祖父です。今はきっと天国で見守ってくれています」"
translation = "「네, 제 자랑스러운 할아버지세요. 지금은 분명 천국에서 지켜봐 주고 계실 거예요.」"

[[dialogue]]
speaker = "リップル"
original = "「デスが、サンタクロースのショウタイ……ちょっとビックリしました……」"
translation = "「하지만, 산타클로스의 정체…… 조금 놀라버려마시타……」"

[[dialogue]]
speaker = "モネ"
original = "「実際に全世界の子どもに１人でプレゼントを配るなんて不可能ですからね」"
translation = "「실제로 전 세계 아이들에게 혼자서 선물을 돌리는 건 불가능하니까요.」"

[[dialogue]]
speaker = "モネ"
original = "「だから、サンタクロースはいくつもの善意が重なり合って存在している……そんな風に私は思っています」"
translation = "「그래서 산타클로스는 수많은 선의가 겹쳐져 존재하는 것…… 저는 그렇게 생각하고 있어요.」"

[[dialogue]]
speaker = "リップル"
original = "「とってもステキな考えで～す♪\u3000サンタクロースは優しさのカタマリってことデスね♪」"
translation = "「매우 멋진 생각마시타~♪ 산타클로스는 상냥함의 결정체라는 것이마시타네♪」"

[[dialogue]]
speaker = "モネ"
original = "「なので翌日の私は、祖父にサンタクロースの正体の話はしませんでした。サンタクロースからのプレゼントを素直に喜ぶ女の子を演じました」"
translation = "「그래서 다음 날 저는 할아버지에게 산타클로스 정체에 대한 이야기는 하지 않았어요. 산타클로스가 준 선물에 솔직하게 기뻐하는 여자아이를 연기했죠.」"

[[dialogue]]
speaker = "モネ"
original = "「祖父は喜ぶ私を見て、とても嬉しそうにしていました。祖父の膝の上に座って、プレゼントの絵本を読んでもらったあの日は……忘れたくても忘れられないです」"
translation = "「할아버지는 기뻐하는 저를 보며 무척 행복해하셨어요. 할아버지 무릎 위에 앉아 선물 받은 그림책을 읽어주셨던 그날은…… 잊고 싶어도 잊을 수 없어요.」"

[[dialogue]]
speaker = "モネ"
original = "「これが、私にとってのクリスマス……人生で一番の愛情と優しさに包まれたクリスマスの思い出です」"
translation = "「이것이 저에게 있어 크리스마스…… 인생에서 가장 큰 애정과 다정함에 휩싸였던 크리스마스의 추억이에요.」"

