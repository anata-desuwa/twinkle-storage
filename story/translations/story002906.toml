[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "『流星学園と新星学園の合同体育祭・星霊祭。初日は絶好の晴天に恵まれました。これより開会式となります』"
translation = "『유성 학원과 신성 학원의 합동 체육대회, 성령제. 첫날은 더없이 좋은 맑은 날씨가 되었습니다. 지금부터 개회식이 있겠습니다』"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "『今回の星霊祭の進行は、新星学園学園長、十六夜シノと──』"
translation = "『이번 성령제의 진행은, 신성 학원 학원장, 이자요이 시노와──』"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "『私、《境界》のマグダレナでお送りいたします。まずは新星学園教頭のご挨拶です。よろしくお願いいたします』"
translation = "『저, 《경계》의 막달레나가 보내드리겠습니다. 먼저 신성 학원 교감 선생님의 인사 말씀이 있겠습니다. 잘 부탁드립니다』"

[[dialogue]]
speaker_original = "教頭"
speaker_translation = "교감"
original = "『お日柄もよく、今年も例年通り、最高の体育祭日和を迎えることができた。君たちの鍛え上げられた肉体も、さぞ喜んでいるかと思うッ！』"
translation = "『날씨도 좋고, 올해도 예년과 같이, 최고의 체육대회 날을 맞이할 수 있었다. 그대들의 단련된 육체도, 분명 기뻐하고 있을 것이라 생각한다!』"

[[dialogue]]
speaker_original = "教頭"
speaker_translation = "교감"
original = "『これから１週間、諸君には筋肉を躍動させ、汗のしぶきをはじけさせ、熱く激しく、パワーを漲らせてぶつかり合っていただきたいッ！』"
translation = "『지금부터 1주일간, 제군들은 근육을 약동시키고, 땀방울을 튀기며, 뜨겁고 격렬하게, 파워를 넘치게 부딪쳐주기를 바란다!』"

[[dialogue]]
speaker_original = "教頭"
speaker_translation = "교감"
original = "『筋・肉・最・高ッ！\u3000これにて開会の挨拶とさせていただくッ！』"
translation = "『근・육・최・고! 이것으로 개회사를 마치겠다!』"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "『教頭先生のお熱い筋肉推しのご挨拶でした。これより、星霊祭、いざ開幕となります』"
translation = "『교감 선생님의 뜨거운 근육 사랑 인사 말씀이었습니다. 지금부터, 성령제, 드디어 개막입니다』"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「マグダレナ様がいらっしゃってるー！？\u3000ど、どうしよう、絶対にかっこ悪いところは見せられないよー！」"
translation = "「막달레나 님이 와 계셔!? 어, 어쩌지, 절대로 멋지지 않은 모습은 보여줄 수 없어!」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「流星学園は強力すぎるライバルだけどな！\u3000最終日まで全競技で勝利を目指す！\u3000声出していくぞー！\u3000みんな気合入れろよー！」"
translation = "「유성 학원은 너무 강력한 라이벌이지만! 마지막 날까지 모든 경기에서 승리를 목표로 한다! 목소리 내자! 모두 기합 넣어!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「絶対負けないワン！」"
translation = "「절대 지지 않는다 멍!」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「おうよ！\u3000姐さんにいいところ見せてやるぜい！」"
translation = "「오우! 누님에게 좋은 모습 보여줄 거라고!」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "『最初の競技は、体育祭の定番の玉入れになります』"
translation = "『첫 번째 경기는, 체육대회의 단골인 공 던져 넣기가 되겠습니다』"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「うん、運動会と言えば玉入れだよね。人間界で勉強したよ」"
translation = "「응, 운동회라고 하면 공 던져 넣기지. 인간계에서 공부했어」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "『ただし、そこは星霊祭であり、星騎士仕様です。普通の玉入れではありませんよ』"
translation = "『다만, 이곳은 성령제이며, 성기사 사양입니다. 평범한 공 던져 넣기는 아닙니다』"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「……んん？\u3000何か空を飛んでんね。モンスター？」"
translation = "「……응? 뭔가 하늘을 날고 있네. 몬스터?」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "『皆さんご心配なく。あれはモンスターではありません。玉入れのカゴですよ』"
translation = "『여러분 걱정 마십시오. 저것은 몬스터가 아닙니다. 공 던져 넣기 바구니입니다』"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「あれがカゴ……！？\u3000すごくいっぱい飛んでるんだけど……普通、玉入れのカゴって１チーム１つじゃない？」"
translation = "「저게 바구니……!? 엄청 많이 날아다니는데…… 보통, 공 던져 넣기 바구니는 한 팀에 하나 아니야?」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "『見上げればお分かりの通り、カゴがアリーナ上空に無数に設置されています。なお、カゴまでの高さは３０ｍ強』"
translation = "『올려다보시면 아시다시피, 바구니가 아레나 상공에 무수히 설치되어 있습니다. 참고로, 바구니까지의 높이는 30m 남짓』"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "『およそ１０階建てのビルほどの高さになります。あそこに絶妙なコントロールで投げ入れるのは、歴戦の星騎士でもなかなか困難ですよ』"
translation = "『대략 10층짜리 빌딩 정도의 높이가 됩니다. 저기에 절묘한 컨트롤로 던져 넣는 것은, 역전의 성기사라도 꽤나 어렵습니다』"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「あそこで３０ｍかー。見上げると結構高いね。首痛くなりそ」"
translation = "「저기까지 30m인가. 올려다보니 꽤 높네. 목 아프겠어」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「でも投げなくても、星騎士ならあそこまで飛んでいけば──」"
translation = "「하지만 던지지 않아도, 성기사라면 저기까지 날아가서──」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "『もちろん、カゴの高さまで飛んでのダンクシュートは禁止ですよ。反則行為は減点になりますから特に気を付けてくださいね』"
translation = "『물론, 바구니 높이까지 날아가서 덩크슛을 하는 것은 금지입니다. 반칙 행위는 감점이 되니 특히 주의해 주세요』"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「釘を刺されちゃった……うっかり飛んじゃわないよう、気をつけないとね！」"
translation = "「못을 박아버렸네…… 무심코 날아가지 않도록, 조심해야겠어!」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "『それ以外は普通の玉入れです。自軍の玉を次々と放り込み、設置されてるカゴを全部いっぱいにしてください。それでは……第１競技、レディー、ゴー！』"
translation = "『그 외에는 평범한 공 던져 넣기입니다. 자군의 공을 차례차례 던져 넣어, 설치된 바구니를 전부 가득 채워주십시오. 그럼…… 제1경기, 레디, 고!』"

[[dialogue]]
speaker = "unk"
original = "シノ学園長の凛々しいコールと同時、無数の紅白の玉が宙を飛び交う。"
translation = "시노 학원장의 늠름한 콜과 동시에, 무수한 홍백의 공이 허공을 날아다닌다."

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「えいっ！\u3000えいっ！\u3000う～～、遠いし、カゴが小さすぎます！\u3000なかなか入ってくれないワン！」"
translation = "「에잇! 에잇! 우~~, 멀고, 바구니가 너무 작습니다! 좀처럼 들어가 주지 않는다 멍!」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「うちもやっと１個入ったよ。マジムズぅ」"
translation = "「나도 겨우 한 개 들어갔어. 진짜 어렵네」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ふっふっふ、飛ぶのは封じられちゃったけど、実は玉入れには大量点を狙える裏技があるんだよ！」"
translation = "「후훗후, 나는 건 봉쇄당했지만, 사실 공 던져 넣기에는 대량 득점을 노릴 수 있는 비장의 수가 있어!」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「な、なんだってー！\u3000それは本当かい、姐さん！」"
translation = "「뭐, 뭐라고! 그게 정말이야, 누님!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「天使は嘘つかないよ。ヒヨちゃん、カティアちゃん！\u3000玉をいっぱいかき集めてきて！」"
translation = "「천사는 거짓말 안 해. 히요짱, 카티아짱! 공을 잔뜩 모아와!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「はいっ！\u3000上手くは投げられないけど、集めるだけなら私のスピードを活かせますガオ！」"
translation = "「네엣! 잘 던지지는 못하지만, 모으는 것만이라면 제 스피드를 살릴 수 있습니다 갸오!」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「裏技なんてあるんだ。面白そ。うちも手伝うよ」"
translation = "「비장의 수라니 있구나. 재밌겠네. 나도 도울게」"

[[dialogue]]
speaker = "unk"
original = "いったい、何をするつもりなんだ……？"
translation = "도대체, 뭘 하려는 걸까……?"

[[dialogue]]
speaker = "unk"
original = "玉入れの裏技……？"
translation = "공 던져 넣기의 비장의 수……?"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「はぁ、はぁっ、両手いっぱい集めてきたワン！」"
translation = "「하아, 하앗, 양손 가득 모아왔다 멍!」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「姐さん、こんなもんでどうでぇ！」"
translation = "「누님, 이 정도면 어때!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「うんっ、これだけあれば作れるよ！」"
translation = "「응, 이 정도만 있으면 만들 수 있어!」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「作んの？\u3000何を？」"
translation = "「만든다고? 뭘?」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「みんなが拾い集めてくれた玉に星力を込めて……ギューーーッて固めて！」"
translation = "「모두가 주워 모아준 공에 성력을 담아서…… 꾸우우욱 하고 뭉쳐서!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「うわ！？\u3000いっぱい集めたお手玉サイズの玉が、槍の形になったガオ！」"
translation = "「우와!? 잔뜩 모았던 공깃돌 크기의 공이, 창 모양이 되었다 갸오!」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「いやいやいやおかしいおかしい。しかも圧縮しすぎだし」"
translation = "「아니 아니 아니 이상해 이상해. 게다가 너무 압축했잖아」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「こうすれば１個１個投げるよりも安定するし、固めた分だけ、まとめて得点になるでしょ？」"
translation = "「이렇게 하면 하나하나 던지는 것보다 안정적이고, 뭉친 만큼, 한꺼번에 득점이 될 거잖아?」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「なるだろうけどさ、外したらそれだけ無駄になるじゃん？」"
translation = "「되긴 하겠지만, 놓치면 그만큼 낭비되는 거 아니야?」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「大丈夫、私、自信あるから！」"
translation = "「괜찮아, 나, 자신 있으니까!」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「おお、言うね」"
translation = "「오오, 말하네」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「絶対に決めるっ！\u3000カゴに狙いを定めて──イノセントノヴァ！」"
translation = "「절대로 성공시킨다! 바구니에 겨냥을 정하고── 이노센트 노바!」"

[[dialogue]]
speaker = "unk"
original = "ミルフィーの放り投げたお手玉の槍は、３０ｍ上のカゴの中へと吸い込まれるように──"
translation = "밀피가 던진 공깃돌 창은, 30m 위 바구니 속으로 빨려 들어가듯이──"

[[dialogue]]
speaker = "unk"
original = "ボスンッ！"
translation = "보승!"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「姐さん、ナイッシュー！」"
translation = "「누님, 나이스 슛!」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "『まあまあ、新星学園のミルフィーさん。カゴに吸い込まれるような見事なシュートですね。３００点です』"
translation = "『어머나, 신성 학원의 밀피 씨. 바구니에 빨려 들어가는 듯한 멋진 슛이네요. 300점입니다』"

[[dialogue]]
speaker = "unk"
original = "１個で３００点！？"
translation = "한 개에 300점!?"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「そう、名付けて……スリーハンドレッドポイントシュート！」"
translation = "「그래, 이름하여…… 스리 헌드레드 포인트 슛!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「すごい！\u3000スリーポイントシュートの１０倍ですワン！」"
translation = "「대단해! 3점 슛의 10배입니다 멍!」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「１００倍だよ」"
translation = "「100배야」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「姐さん、お美事！\u3000惚れ直しちまうねぇ！」"
translation = "「누님, 훌륭해! 다시 반해버리겠네!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「槍投げで鍛えてる肩は伊達じゃないよっ！\u3000これはルール違反じゃないよね？」"
translation = "「창던지기로 단련한 어깨는 허세가 아니라고! 이건 규칙 위반 아니지?」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "『ちゃんと地に足をつけて玉を投げていますから、合法です♪』"
translation = "『제대로 땅에 발을 디디고 공을 던지고 있으니, 합법입니다♪』"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "『ちなみに、星騎士の運動会ですから、星術の使用は許可されていますよ』"
translation = "『참고로, 성기사의 운동회니까, 성술 사용은 허가되어 있습니다』"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「さっすが。プリマステラは伊達じゃないってわけね」"
translation = "「역시. 프리마스텔라는 허세가 아니라는 거네」"

[[dialogue]]
speaker_original = "流星生徒Ａ"
speaker_translation = "유성 학생 A"
original = "「な、なに、今の！\u3000ウチも真似しようよ！」"
translation = "「뭐, 뭐야, 방금 거! 우리도 따라 하자!」"

[[dialogue]]
speaker_original = "流星生徒Ｂ"
speaker_translation = "유성 학생 B"
original = "「無理無理！\u3000よっぽど強肩じゃないと──そうだ、フェニエルさんならっ！？」"
translation = "「무리 무리! 웬만큼 강한 어깨가 아니면── 그래, 페니엘 씨라면!?」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「真似っこしてみますねっ。こうやって、ぎゅむっ、ぎゅむって固めて──えーいっ！」"
translation = "「따라 해 볼게요. 이렇게, 꾸욱, 꾸욱 하고 뭉쳐서── 에잇!」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ああっ、遠くまで飛んでいっちゃいましたー……カゴに入れるのは難しいです……！」"
translation = "「아앗, 멀리 날아가 버렸어요…… 바구니에 넣는 건 어렵네요……!」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "『フェニエルさんが投げた玉が降ってきまーす！\u3000近くの方はお気をつけくださーい！』"
translation = "『페니엘 씨가 던진 공이 떨어지고 있습니다! 근처에 계신 분들은 조심해 주십시오!』"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「わぁっ！？\u3000鉄の塊みたいのが降ってきたんだけど！？」"
translation = "「와앗!? 쇠붙이 같은 게 떨어졌는데!?」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ご、ごめんなさい、ごめんなさい！\u3000真似するのは危ないみたいです……！」"
translation = "「죄, 죄송합니다, 죄송합니다! 따라 하는 건 위험한 것 같아요……!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「さー、みんな、私のところに固めてもってきてー！\u3000片っ端からポイポイ放り込んじゃうよー！」"
translation = "「자, 모두, 내 쪽으로 뭉쳐서 가져와! 닥치는 대로 휙휙 던져 넣어 버릴 거야!」"

[[dialogue]]
speaker_original = "教頭"
speaker_translation = "교감"
original = "「うううう～ん、素晴らし～いっ！\u3000やはり筋肉こそ、力！\u3000力こそ、パワー！」"
translation = "「우우우우~음, 멋지~다! 역시 근육이야말로, 힘! 힘이야말로, 파워!」"

[[dialogue]]
speaker = "unk"
original = "槍投げで鍛えられたミルフィーの圧倒的な投擲力と、精密なコントロールは、玉入れ勝負の明暗を分けたのだった。"
translation = "창던지기로 단련된 밀피의 압도적인 투척력과, 정밀한 컨트롤은, 공 던져 넣기 승부의 명암을 갈랐다."

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "『第１競技、玉入れの結果は～……言うまでもないかもしれませんね。新星学園の勝利です！』"
translation = "『제1경기, 공 던져 넣기의 결과는~…… 말할 필요도 없을 것 같네요. 신성 학원의 승리입니다!』"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「やったぁ！」"
translation = "「해냈다!」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「いいぞ、いいぞ、ミ・ル・フィー！\u3000いいぞ、いいぞ、し・ん・せ・い！\u3000このまま行っけー！」"
translation = "「좋다, 좋다, 미・르・피! 좋다, 좋다, 신・성! 이대로 가자!」"

[[dialogue]]
speaker = "unk"
original = "すごいぞミルフィー！"
translation = "대단하다 밀피!"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ありがとう♪\u3000応援ってするのも、されるのも嬉しいね<emoji=heart04>」"
translation = "「고마워♪ 응원은 하는 것도, 받는 것도 기쁘네<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ミルフィーの大活躍により星霊祭初日は新星学園のリードから始まった。"
translation = "밀피의 대활약으로 성령제 첫날은 신성 학원의 리드로 시작되었다."

[[dialogue]]
speaker = "unk"
original = "順調な滑り出しだが、果たして次の競技は──？"
translation = "순조로운 출발이지만, 과연 다음 경기는──?"

