[[dialogue]]
speaker = "unk"
original = "第７話,チナとの再会,B"
translation = "제7화, 치나와의 재회, B"

[[dialogue]]
speaker = "unk"
original = "一時は絶望的な戦力差かと思われたが、フィオナの帰還と、煌嶺の参戦によって押し返し始めている。"
translation = "한때는 절망적인 전력 차라고 생각되었으나, 피오나의 귀환과 코레이의 참전에 의해 밀어내기 시작하고 있다."

[[dialogue]]
speaker = "unk"
original = "一方、俺とヴィーナス、選挙管理委員会の３人は、デネブ側の指揮官を探して戦場を駆け回っていた。"
translation = "한편, 나와 비너스, 선거관리위원회의 세 사람은 데네브 측의 지휘관을 찾아 전장을 뛰어다니고 있었다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「どこにいるのよ、あのちみっ子！\u3000ガーディアンが暴れるのをどこかで見てるのかしら？」"
translation = "「어디 있는 거야, 그 꼬맹이! 가디언이 날뛰는 걸 어디선가 보고 있는 걸까?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「チナは俺に強い敵意を持っていた。アルタイルに来ているなら、真っ先に俺を狙うだろう」"
translation = "「치나는 나에게 강한 적의를 품고 있었어. 알타이르에 와 있다면 제일 먼저 나를 노리겠지.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「極星従騎は確かに強いが、アルタイルへの攻撃をガーディアンだけに任せるとは思えない」"
translation = "「극성종기는 확실히 강하지만, 알타이르에 대한 공격을 가디언에게만 맡길 거라고는 생각되지 않아.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ってことはー……」"
translation = "「그렇다는 건~……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「チナ以外の指揮官が来ているか……それとも何か企んでいるということか」"
translation = "「치나 이외의 지휘관이 와 있거나…… 아니면 무언가 꾸미고 있다는 뜻인가.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「企んでいる……か」"
translation = "「꾸미고 있다……라.」"

[[dialogue]]
speaker = "unk"
original = "シノさんも、チナの宣戦布告には何か隠された意図があるかもしれないと言っていた。"
translation = "시노 씨도 치나의 선전포고에는 무언가 숨겨진 의도가 있을지도 모른다고 말했다."

[[dialogue]]
speaker = "unk"
original = "なら先日、チナが教皇庁に現れたことも偶然じゃないのか……？"
translation = "그렇다면 요전번에 치나가 교황청에 나타난 것도 우연이 아닌 건가……?"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「もしかすると、チナが教皇庁に現れたのは下見だったのかも……」"
translation = "「어쩌면 치나가 교황청에 나타난 건 사전 답사였을지도 몰라……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「なるほど、そうかもしれないわね！\u3000教皇庁に行ってみましょ！」"
translation = "「과연, 그럴지도 모르겠네! 교황청으로 가보자!」"

[[dialogue]]
speaker = "unk"
original = "そのまま空から教皇庁に近づいていくが──"
translation = "그대로 하늘을 통해 교황청으로 접근해 가지만──"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「──！\u3000どうやら邪魔をしたい輩がいるようだ」"
translation = "「──! 아무래도 방해하고 싶어 하는 무리가 있는 모양이군.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「選管は敵を食い止めよう。君たちは行ってくれ」"
translation = "「선관은 적을 저지하겠다. 너희는 가라.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ、わかった！」"
translation = "「아아, 알았어!」"

[[dialogue]]
speaker = "unk"
original = "俺とヴィーナスは飛翔を止めずに教皇庁へと向かう。"
translation = "나와 비너스는 비행을 멈추지 않고 교황청으로 향한다."

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「これでよかったの？」"
translation = "「이걸로 된 거야?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ああ、チナの相手は星徒会に任せよう。私たちは──」"
translation = "「아아, 치나의 상대는 성도회에 맡기자. 우리들은──」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「そこだ！」"
translation = "「거기다!」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「おや、よくわかったね」"
translation = "「어라, 잘도 알아냈네.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「不本意ながら、君のことはよく知っているからな。どうせ高見の見物を決め込むつもりだったんだろう」"
translation = "「본의는 아니지만, 너에 대해서는 잘 알고 있으니까. 어차피 강 건너 불구경하듯 방관할 생각이었겠지.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「同じ世界から来た者の責任だ。君の相手は私がする」"
translation = "「같은 세계에서 온 자로서의 책임이다. 네 상대는 내가 하겠어.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「同じ世界？\u3000ああ、星徒会とか会長とか何か言っていたっけ」"
translation = "「같은 세계? 아아, 성도회니 회장이니 뭐라 말했던가.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「何度も言わせるな。私たちは平行世界ベガの新星学園で、同じ星徒会にいたんだ」"
translation = "「몇 번이나 말하게 하지 마. 우리들은 평행세계 베가의 신성학원에서, 같은 성도회에 있었다고.」"

[[dialogue]]
speaker = "unk"
original = ""
translation = ""

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「知らないって言ってるだろう？\u3000私は最初から神の<ruby>僕<rt>しもべ</rt></ruby>だ。星徒会長になった覚えなんてない」"
translation = "「모른다고 말하고 있잖아? 나는 처음부터 신의 종이야. 성도회장이 된 기억 따위 없어.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「でも君、ベガの出身だったんだ。へぇ、それは珍しい」"
translation = "「하지만 너, 베가 출신이었구나. 헤에, 그거 희귀하네.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「きっと傷心だろうし、少し手加減してあげようか？」"
translation = "「분명 상심했을 테니, 조금 살살해 줄까?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「それで気遣いのつもりか？\u3000相変わらず癇に障るやつだ」"
translation = "「그게 배려라는 건가? 여전히 비위에 거슬리는 녀석이군.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「今日こそは勝たせてもらう！\u3000その怪しげな仮面、剥がしてやるから覚悟しろ」"
translation = "「오늘이야말로 이겨 보이겠어! 그 수상쩍은 가면, 벗겨줄 테니 각오해라.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「いたわよ！\u3000ドンピシャだわ！」"
translation = "「찾았어! 정답이야!」"

[[dialogue]]
speaker = "unk"
original = "教皇庁の前の広場の片隅、どこか遠くを見据えるような表情で佇むチナ。"
translation = "교황청 앞 광장의 한구석, 어딘가 먼 곳을 응시하는 듯한 표정으로 서 있는 치나."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（あれは……？）"
translation = "(저건……?)"

[[dialogue]]
speaker = "unk"
original = "チナの手の中にある、黒い玉。"
translation = "치나의 손안에 있는, 검은 구슬."

[[dialogue]]
speaker = "unk"
original = "まるでブラックホールのような得体の知れない威容を放っているが、同時に既視感もあるような……"
translation = "마치 블랙홀 같은 정체 모를 위용을 내뿜고 있지만, 동시에 기시감도 느껴지는 듯한……"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「……来たか、魔王」"
translation = "「……왔나, 마왕.」"

[[dialogue]]
speaker = "unk"
original = "チナもこちらに気付き、視線を向ける。"
translation = "치나도 이쪽을 알아채고, 시선을 돌린다."

[[dialogue]]
speaker = "unk"
original = "しかし以前のように激しい怒りや憎しみを露わにすることはなく、静かに俺たちを見上げていた。"
translation = "하지만 이전처럼 격렬한 분노나 증오를 드러내지는 않고, 조용히 우리를 올려다보고 있었다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「今日でアルタイルを終わらせる」"
translation = "「오늘로 알타이르를 끝내겠어.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いいや、アルタイルは終わらせない。俺たちが守る」"
translation = "「아니, 알타이르는 끝내게 두지 않아. 우리가 지킨다.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ならやってみせろ、魔王！」"
translation = "「그럼 해봐라, 마왕!」"

[[dialogue]]
speaker = "unk"
original = "星術によって空中に光の道を作り出し、チナのローラースケートが駆ける。"
translation = "성술에 의해 공중에 빛의 길이 만들어지고, 치나의 롤러스케이트가 질주한다."

[[dialogue]]
speaker = "unk"
original = "チナが弾丸となって突進し、俺は真正面から拳を叩きつけた。"
translation = "치나가 탄환이 되어 돌진하고, 나는 정면에서 주먹을 내질렀다."

