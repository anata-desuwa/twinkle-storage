[[dialogue]]
speaker = "unk"
original = "第３話,流星星徒会の日常,B"
translation = "제3화, 유성 성도회의 일상, B"

[[dialogue]]
speaker = "ユウリ"
original = "「よーし、頼むぜルリ。１を出してくれたらあたしに５万テルスが転がり込むんだ」"
translation = "「좋아, 부탁한다 루리. 1을 내주면 나한테 5만 텔스가 굴러들어오는 거야」"

[[dialogue]]
speaker = "ルリエル"
original = "「ぜーったいユウリ先輩には負けませんから。いっきますよぉ……」"
translation = "「절대로 유우리 선배에게는 지지 않을 거예요. 갑니다아……」"

[[dialogue]]
speaker = "ニャリオン"
original = "「とにかくたまにはセーラを負かすニャン！\u3000このままだとまた１位を取られるニャンよ！」"
translation = "「어쨌든 가끔은 세라를 이기는 거다냥! 이대로 가다간 또 1위를 뺏긴다냥!」"

[[dialogue]]
speaker = "セーラ"
original = "「たまには敗北を知りたくなるよね～。歯ごたえがなさすぎるっていうか～♪」"
translation = "「가끔은 패배를 알고 싶어지잖아~. 너무 싱겁다고 해야 하나~♪」"

[[dialogue]]
speaker = "ソフィア"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "ルリエル"
original = "「１０！\u3000ハイ１０が出ました！\u3000これでわたしがトップ独走、億万長者は目の前です！」"
translation = "「10! 네 10이 나왔습니다! 이걸로 제가 단독 선두, 억만장자는 눈앞이에요!」"

[[dialogue]]
speaker = "ユウリ"
original = "「ホントかよ、いくら早くても止まったマス目次第だぜ」"
translation = "「진짜냐, 아무리 빨라도 멈춘 칸에 달렸다구」"

[[dialogue]]
speaker = "セーラ"
original = "「ルリっちが１０マス進むと～……『魔界で豪華別荘を買う』で～す」"
translation = "「루릿치가 10칸 전진하면~……『마계에서 호화 별장을 산다』예~요」"

[[dialogue]]
speaker = "ルリエル"
original = "「やったー！\u3000別荘です！\u3000え？\u3000それっていいコトですよね？」"
translation = "「야호ー! 별장이에요! 에? 그거 좋은 일 맞죠?」"

[[dialogue]]
speaker = "ニャリオン"
original = "「ニャーッニャッニャッニャッ！\u3000別荘購入は２０万テルスの出費ニャン！\u3000ルリエルはもう借金地獄から這い上がれないニャン！」"
translation = "「냐앗 냐앗 냐앗 냐앗! 별장 구입은 20만 텔스의 지출이다냥! 루리엘은 이제 빚더미에서 기어 올라올 수 없다냥!」"

[[dialogue]]
speaker = "ルリエル"
original = "「えええええぇぇぇぇぇーーー！？\u3000フツー、別荘っていったら成功の証じゃないですか！\u3000納得いきません～～！！」"
translation = "「에에에에에에에에에ーーー!? 보통, 별장이라고 하면 성공의 증거 아니에요! 납득할 수 없어요～～!!」"

[[dialogue]]
speaker = "ソフィア"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "セーラ"
original = "「破産したルリち～はマグロ漁船へ移動ね♪」"
translation = "「파산한 루릿치는 참치 어선으로 이동이야♪」"

[[dialogue]]
speaker = "ニャリオン"
original = "「ここに送られたプレイヤーは特産品カード『マグロ』の取得しかできなくなるニャン」"
translation = "「여기로 보내진 플레이어는 특산품 카드 『참치』 획득밖에 할 수 없게 된다냥」"

[[dialogue]]
speaker = "ユウリ"
original = "「この三界逆転ゲーム、落ちぶれたヤツに対して容赦ないよなー……」"
translation = "「이 삼계 역전 게임, 몰락한 녀석한테는 가차 없네ー……」"

[[dialogue]]
speaker = "ルリエル"
original = "「トホホ……なのですぅ……」"
translation = "「토호호……인 것입니다아……」"

[[dialogue]]
speaker = "ニャリオン"
original = "「次はワガハイニャ！\u3000株の大高騰でボロ儲けしてやるニャァーーン！」"
translation = "「다음은 나다냥! 주식 대폭등으로 떼돈을 벌어주겠다냐아아앙!」"

[[dialogue]]
speaker = "ソフィア"
original = "「──もう！\u3000いい加減にしてください皆さん、今は放課後、つまり仕事の時間ですよ！」"
translation = "「──정말! 적당히 하세요 여러분, 지금은 방과 후, 즉 일할 시간이에요!」"

[[dialogue]]
speaker = "unk"
original = "放課後の流星学園は星徒会室。"
translation = "방과 후의 유성 학원 성도회실."

[[dialogue]]
speaker = "unk"
original = "奏ソフィアはテーブルに身を乗り出し、ゲームに興じる面々に<ruby>喝破<rt>かっぱ</rt></ruby>をかけた。"
translation = "소우 소피아는 테이블에 몸을 숙이고, 게임에 열중하는 멤버들에게 일갈했다."

[[dialogue]]
speaker = "セーラ"
original = "「まーまーソフィアちゃん。たまには息抜きしないと身が持たないよ～？」"
translation = "「뭐어 뭐어 소피아짱. 가끔은 숨 돌리지 않으면 몸이 버티지 못한다구~?」"

[[dialogue]]
speaker = "ユウリ"
original = "「そーそー。あたしらは娯楽を通じてチーム間の団結を高めてるんだ、なあアホ猫」"
translation = "「그렇지 그렇지. 우리들은 오락을 통해 팀 간의 단결을 높이고 있는 거라고, 이 바보 고양이」"

[[dialogue]]
speaker = "ニャリオン"
original = "「アホ猫呼ばわりするアホと団結するいわれはないニャン！」"
translation = "「바보 고양이라고 부르는 바보와 단결할 이유는 없다냥!」"

[[dialogue]]
speaker = "ソフィア"
original = "「皆さんは息抜きしすぎなんです！\u3000フィオナ会長がいないからって皆さん好き勝手に遊んで……！」"
translation = "「여러분은 너무 숨을 돌리고 있어요! 피오나 회장님이 없다고 여러분 멋대로 놀고……!」"

[[dialogue]]
speaker = "ルリエル"
original = "「お、落ち着いてくださいソフィア。別に会長がいても最近はこんな感じですです」"
translation = "「아, 진정하세요 소피아. 딱히 회장님이 계셔도 최근에는 이런 느낌인 것입니다」"

[[dialogue]]
speaker = "ソフィア"
original = "「そっか。それなら…………ってもっとダメです！\u3000ニャリオンまで遊び呆けて……帰ってきたら会長に言いつけますよ！」"
translation = "「그렇구나. 그렇다면…………이 아니라 더 안 돼요! 냐리온까지 빈둥거리며 놀고…… 돌아오시면 회장님께 일러바칠 거예요!」"

[[dialogue]]
speaker = "ニャリオン"
original = "「ニャニャ！？\u3000そ、そいつは困るニャン。ワガハイは昨日終わらせた管理票の作成を今日もやることになっているニャン」"
translation = "「냐냐!? 그, 그건 곤란하다냥. 나 님은 어제 끝낸 관리표 작성을 오늘도 하기로 되어 있다냥」"

[[dialogue]]
speaker = "ユウリ"
original = "「隠蔽する気マンマンじゃねーか」"
translation = "「숨길 생각 만만이잖아」"

[[dialogue]]
speaker = "ニャリオン"
original = "「それにワガハイはフィオナ嬢に何かあったらすぐに駆けつけられるのニャン。なぜならワガハイは召喚獣だからなのニャン」"
translation = "「게다가 나 님은 피오나 아가씨에게 무슨 일이 생기면 바로 달려갈 수 있는 거다냥. 왜냐하면 나 님은 소환수이기 때문인 거다냥」"

[[dialogue]]
speaker = "セーラ"
original = "「あ、ニャリオンちゃんも別荘購入。しかも月に建てるって」"
translation = "「아, 냐리온짱도 별장 구입. 게다가 달에 짓는대」"

[[dialogue]]
speaker = "ニャリオン"
original = "「ニャんと！？\u3000そんなとこに別荘なんか建ててどうするニャン、バカなのかニャン！？」"
translation = "「냐앗이라고!? 그런 곳에 별장 같은 걸 지어서 뭐 하겠다는 거다냥, 바보인 거냐냥!?」"

[[dialogue]]
speaker = "ユウリ"
original = "「プレイヤーそっくりだな」"
translation = "「플레이어랑 똑같네」"

[[dialogue]]
speaker = "ソフィア"
original = "「せ～～ん～～ぱ～～い～～が～～た～～……！！」"
translation = "「서～～ㄴ～～배～～니～～임～～들～～……!!」"

[[dialogue]]
speaker = "セーラ"
original = "「まーまーそう怒らずに。ソフィアちゃんの好きなニャトルのケーキも買ってあるから、一緒にたべよーよ！」"
translation = "「뭐어 뭐어 그렇게 화내지 말고. 소피아짱이 좋아하는 냐토루 케이크도 사 왔으니까, 같이 먹자구!」"

[[dialogue]]
speaker = "ソフィア"
original = "「え……ニャトルのケーキ？\u3000そ、それなら、ちょっとだけ……」"
translation = "「에…… 냐토루 케이크? 그, 그렇다면, 아주 조금만……」"

[[dialogue]]
speaker = "unk"
original = "セーラの誘惑によってソフィアが陥落しかけたその時──"
translation = "세라의 유혹에 소피아가 함락될 뻔한 그때──"

[[dialogue]]
speaker = "unk"
original = "部屋に取り付けられたモニターへ学園からの連絡が入る。"
translation = "방에 설치된 모니터로 학원으로부터 연락이 들어온다."

[[dialogue]]
speaker = "セイファート"
original = "『流星学園星徒会諸君。ごきげんよう』"
translation = "『유성 학원 성도회 제군. 잘 지냈는가』"

[[dialogue]]
speaker = "ルリエル"
original = "「！\u3000連絡であります！」"
translation = "「! 연락인 것입니다!」"

[[dialogue]]
speaker = "ユウリ"
original = "（しかもこの声……新星の学園長かよ！）"
translation = "（게다가 이 목소리…… 신성의 학원장인가!）"

[[dialogue]]
speaker = "unk"
original = "セイファートからの連絡と知れるや、彼女たちはいそいそとゲームボードを片付け始めた。"
translation = "세이퍼트로부터의 연락임을 알자, 그녀들은 부랴부랴 게임 보드를 치우기 시작했다."

[[dialogue]]
speaker = "セイファート"
original = "『前回の“<ruby>星読<rt>ホシヨミ</rt></ruby>事変”以降、世界各地で特殊なモンスターの出現が確認されている。我が流星市国においてもそれは例外ではない』"
translation = "『지난번 “호시요미 사변” 이후, 세계 각지에서 특수한 몬스터의 출현이 확인되고 있다. 우리 유성 시국에 있어서도 그것은 예외가 아니다』"

[[dialogue]]
speaker = "ルリエル"
original = "（星読事変って何でしたっけ）"
translation = "（별 읽기 사변이 뭐였더라）"

[[dialogue]]
speaker = "セーラ"
original = "（新星の子たちが解決してくれたっていうアレ。なんかやばいちびっ子が暴れたらしいよ）"
translation = "（신성 아이들이 해결해 줬다는 그거. 뭔가 위험한 꼬마가 날뛰었다고 해）"

[[dialogue]]
speaker = "セイファート"
original = "『これは至急ではないが、諸君に調査を頼みたい。新個体は強力ゆえ星徒会のみの少数精鋭が望ましいだろう。では、健闘を祈る』"
translation = "『이것은 시급한 일은 아니지만, 제군에게 조사를 부탁하고 싶다. 신규 개체는 강력하므로 성도회만의 소수 정예가 바람직할 것이다. 그럼, 건투를 빈다』"

[[dialogue]]
speaker = "unk"
original = "セイファートは最後にそう司令を残して通信が切れる。"
translation = "세이퍼트는 마지막으로 그렇게 지령을 남기고 통신이 끊긴다."

[[dialogue]]
speaker = "unk"
original = "すると、緊張していた空気が再びたわんだ。"
translation = "그러자, 긴장했던 분위기가 다시 풀어진다."

[[dialogue]]
speaker = "ユウリ"
original = "「…………ふぅ、切れたか。無駄に緊張するぜ、あの声」"
translation = "「…………휴우, 끊겼나. 쓸데없이 긴장하게 만드네, 저 목소리」"

[[dialogue]]
speaker = "ルリエル"
original = "「新星の学園長さんでありますか～。わたしは入学式の時くらいしかお見かけしたことがありませんねえ……」"
translation = "「신성의 학원장님이신가요~. 저는 입학식 때 정도밖에 뵌 적이 없네요오……」"

[[dialogue]]
speaker = "ソフィア"
original = "「ふう……さ！\u3000直々のご命令ですから行きますよ。危うく惑わされるところでした」"
translation = "「휴우…… 자! 직접적인 명령이시니 가야죠. 하마터면 현혹될 뻔했어요」"

[[dialogue]]
speaker = "セーラ"
original = "「指令が来ちゃったならしょうがないか～」"
translation = "「지령이 와버렸다면 어쩔 수 없나~」"

[[dialogue]]
speaker = "ルリエル"
original = "「ん？\u3000それなら今回のゲームは引き分けってことですね、やったー！」"
translation = "「응? 그럼 이번 게임은 무승부라는 거네요, 야호ー!」"

[[dialogue]]
speaker = "ユウリ"
original = "「ま、とりあえずフィオナと合流しねえとな。あいつはどこに行ってんだったか？」"
translation = "「뭐, 일단 피오나랑 합류해야지. 걔는 어디 갔더라?」"

[[dialogue]]
speaker = "ニャリオン"
original = "「ニャ。フィーニスの塔の様子を見てくるって言ってたニャン」"
translation = "「냐. 피니스의 탑의 상태를 보고 오겠다고 했다냥」"

