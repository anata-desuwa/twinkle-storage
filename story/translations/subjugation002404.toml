[[dialogue]]
speaker = "unk"
original = "サチに起きた異変を確かめる為、俺たちは放課後にトレーニング施設へとやってきていた。"
translation = "사치에게 일어난 이변을 확인하기 위해 우리들은 방과 후에 트레이닝 시설로 왔다."

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「……やっぱり、気のせいじゃない。私、幸運の力が使えなくなってるみたいです」"
translation = "「……역시 기분 탓이 아니야. 나, 행운의 힘을 쓸 수 없게 된 것 같아요」"

[[dialogue]]
speaker = "unk"
original = "サチの仮想戦闘訓練の結果は、以前に比べて評価がガクンと落ちてしまっていた。"
translation = "사치의 가상 전투 훈련 결과는 이전에 비해 평가가 뚝 떨어져 있었다."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「サチ……」"
translation = "「사치……」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「サチさんの訓練の様子を、解析魔法で確認したんですが……」"
translation = "「사치 씨의 훈련 모습을 해석 마법으로 확인해 봤는데요……」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「どうやらサチさんの『幸運』は、ディーラックさんに奪われた可能性が高いですね。マイナスエネルギーの痕跡らしきものが見えました」"
translation = "「아무래도 사치 씨의 『행운』은 디럭쿠 씨에게 빼앗겼을 가능성이 높네요. 마이너스 에너지의 흔적 같은 것이 보였어요」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「ディーちゃんが……？」"
translation = "「디짱이……?」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「あっ……まさかこの前の戦闘で、サチさまがディーラックさまからタックルを受けた時に……！？」"
translation = "「앗…… 설마 지난번 전투에서 사치 님이 디럭쿠 님에게 태클을 받았을 때……!?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「おそらくは。幸運の力を取り戻す１番手っ取り早い方法は、ディーラックさんに勝って返してもらうことでしょう」"
translation = "「아마도요. 행운의 힘을 되찾는 가장 빠른 방법은 디럭쿠 씨에게 이겨서 돌려받는 것이겠죠」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「つまり、それまでは純粋に星力だけで戦うしかないってことですね……」"
translation = "「즉, 그때까지는 순수하게 성력만으로 싸울 수밖에 없다는 거네요……」"

[[dialogue]]
speaker = "unk"
original = "訓練が終わった後、俺はトレジアンナさんにサチを家まで送って欲しいと言われて、一緒に帰ることになった。"
translation = "훈련이 끝난 뒤 나는 트레지안나 씨가 사치를 집까지 바래다주라고 해서 함께 돌아가게 되었다."

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「もう、トレジアンナさんってば、変な気を利かせたりして……すみません、お兄さん」"
translation = "「정말 트레지안나 씨도 참, 이상한 배려를 하고…… 죄송해요, 오빠」"

[[dialogue]]
speaker = "unk"
original = "俺は、構わないと首を横に振ってから――"
translation = "나는 괜찮다며 고개를 가로저은 뒤──"

[[dialogue]]
speaker = "unk"
original = "サチ、ショックじゃないか？"
translation = "사치, 충격받지는 않았어?"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「え？\u3000それって……幸運の力が無くなっちゃったことですか？」"
translation = "「에? 그건…… 행운의 힘이 없어져 버린 거 말인가요?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「……前に話したことがあったかもしれませんけど、私、昔から幸運体質に頼りきりにならないようにしようって、意識して生きてきたんです」"
translation = "「……전에 이야기한 적이 있을지도 모르겠는데, 저 아주 예전부터 행운 체질에만 의지하지 않으려고 의식하며 살아왔거든요」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「幸運には波がありますから。必ず、ラッキーが起こらないタイミングが訪れる。私はその時、ラッキーが再び起きるまで待つ自分にはなりたくなかったんです」"
translation = "「행운에는 기복이 있으니까요. 반드시 럭키가 일어나지 않는 타이밍이 찾아와요. 저는 그때 럭키가 다시 일어날 때까지 기다리는 사람이 되고 싶지 않았어요」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「だから今がまさに、積み重ねてきた地力が試される時です」"
translation = "「그러니까 지금이야말로 쌓아온 실력이 시험받을 때예요」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「そ、それに……お兄さんの近くにいても、エッチなことが起きなくなったのはいいことです、うん」"
translation = "「그, 그리고…… 오빠 근처에 있어도 야한 일이 생기지 않게 된 건 좋은 일이에요, 응」"

[[dialogue]]
speaker = "unk"
original = "自分に言い聞かせるように語るサチ。"
translation = "스스로에게 타이르듯 말하는 사치."

[[dialogue]]
speaker = "unk"
original = "今日の訓練では、俺とサチが連携攻撃を行っても、ラッキースケベな事故が起こることは１度もなかった。"
translation = "오늘 훈련에서는 나와 사치가 연계 공격을 해도 럭키 스케베 사고가 일어나는 일은 한 번도 없었다."

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「でも……」"
translation = "「하지만……」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「いざ本当に幸運を失ってみると、普段の自分がいかに幸運に頼っていたのかを実感しますね」"
translation = "「막상 정말로 행운을 잃고 보니 평소의 제가 얼마나 행운에 의지했었는지 실감하게 되네요」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「そこについてはやっぱり、ちょっと落ち込みます……。今日の訓練結果は、私がビリでしたし……」"
translation = "「그 점에 대해서는 역시 조금 낙담하게 돼요……. 오늘 훈련 결과는 제가 꼴찌였고요……」"

[[dialogue]]
speaker = "unk"
original = "サチ、頭を撫でてもいい？"
translation = "사치, 머리 쓰다듬어도 돼?"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「へ！？\u3000い、いきなりなんですか、お兄さん！？」"
translation = "「헤!? 가, 갑자기 무슨 소리에요, 오빠!?」"

[[dialogue]]
speaker = "unk"
original = "サチが頑張り屋で、いつもたゆまぬ努力を続けていることを俺は知っている。"
translation = "사치가 노력가이고 언제나 끊임없는 노력을 계속하고 있다는 것을 나는 알고 있다."

[[dialogue]]
speaker = "unk"
original = "でも今までは、サチに不用意に接触するとラッキースケベが起きてしまう可能性があったから、遠慮していた。"
translation = "하지만 지금까지는 사치에게 부주의하게 접촉하면 럭키 스케베가 일어날 가능성이 있어서 사양하고 있었다."

[[dialogue]]
speaker = "unk"
original = "だから、遠慮しないなら今かなと思った――と、俺は気持ちを伝える。"
translation = "그래서 사양하지 않아도 된다면 지금일까 싶어서──라고 나는 마음을 전한다."

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「……そ、そうだったんですね。……なら、その……」"
translation = "「……그, 그랬던 거군요. ……그렇다면 그……」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「エッチなことが目的じゃないなら……はい。どうぞ……」"
translation = "「야한 게 목적이 아니라면…… 네. 자요……」"

[[dialogue]]
speaker = "unk"
original = "サチはもじもじと指を突き合わせながら、上目遣いで俺の様子を伺うように言う。"
translation = "사치는 머뭇머뭇 손가락을 맞대며 위를 쳐다보는 눈길로 내 눈치를 살피며 말한다."

[[dialogue]]
speaker = "unk"
original = "俺はそんな彼女の頭に、そっと手を置き、優しく撫でる。"
translation = "나는 그런 그녀의 머리에 살며시 손을 얹고 상냥하게 쓰다듬는다."

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ん……<emoji=heart04>」"
translation = "「으음……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それから俺は、彼女に言う。"
translation = "그리고 나는 그녀에게 말한다."

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「え？\u3000幸運が戻るまでの間は、みんなで私をサポートする……ですか？」"
translation = "「에? 행운이 돌아올 때까지는 다 같이 저를 서포트한다……고요?」"

[[dialogue]]
speaker = "unk"
original = "だから、困った時は相談してくれ"
translation = "그러니까 곤란할 때는 상담해 줘"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「お兄さん……。はい、ありがとうございます♪」"
translation = "「오빠……. 네, 고마워요♪」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「えへへ♪」"
translation = "「에헤헤♪」"

[[dialogue]]
speaker = "unk"
original = "その後、少し元気を取り戻したサチと他愛のない話に花を咲かせながら、彼女を家まで送り届けるのだった――"
translation = "그 뒤 조금 기운을 차린 사치와 사소한 이야기꽃을 피우며 그녀를 집까지 바래다주었다──"

