[[dialogue]]
speaker = "unk"
original = "第４話,フレグランスな恋人,P"
translation = "제4화, 프래그런스한 연인"

[[dialogue]]
speaker = "unk"
original = "今日は星徒会の仕事はオフ。"
translation = "오늘은 성도회 업무가 쉬는 날."

[[dialogue]]
speaker = "unk"
original = "せっかくの休日ということもあり、俺はルリエルを自宅に招いて、家デートを楽しむことにした。"
translation = "모처럼의 휴일이기도 해서, 나는 루리엘을 집으로 초대해 집 데이트를 즐기기로 했다."

[[dialogue]]
speaker = "ルリエル"
original = "「お紅茶、おまちどおさま、なのです～♪\u3000熱いので気を付けてくださいね？」"
translation = "「홍차, 오래 기다리셨어요~♪ 뜨거우니까 조심하세요?」"

[[dialogue]]
speaker = "unk"
original = "悪いね、お客さんに淹れさせちゃって"
translation = "미안하네, 손님한테 차를 타게 해서"

[[dialogue]]
speaker = "ルリエル"
original = "「いえいえ！\u3000会長さんのお家にも、もう何度もお邪魔してますし。こうやって彼氏さんにお茶を淹れるのも楽しいですから♪」"
translation = "「아니에요! 회장님 댁에도 벌써 몇 번이나 놀러 왔는걸요. 이렇게 남자친구한테 차를 타주는 것도 즐거우니까요♪」"

[[dialogue]]
speaker = "ルリエル"
original = "「お砂糖やミルクの量もばっちりなのです～。一緒にのんびり、くつろぎましょう～<emoji=heart04>」"
translation = "「설탕이랑 우유 양도 완벽해요~. 같이 느긋하게 쉬어요~ <emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「は～……甘くておいしいのです～<emoji=heart04>」"
translation = "「하~…… 달콤하고 맛있어요~ <emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「ねえ会長さん。ステラさんやラファエロさんは、今どうしてるんでしょうか？」"
translation = "「저기 회장님. 스텔라 씨나 라파엘로 씨는 지금 어떻게 지내고 있을까요?」"

[[dialogue]]
speaker = "ルリエル"
original = "「お２人とも、ルリエルたちの世界を楽しんでいましたけれど……元の世界に大切な人がいるみたいでした」"
translation = "「두 분 다 루리엘 일행의 세계를 즐기고 계셨지만…… 원래 세계에 소중한 사람이 있는 것 같았거든요.」"

[[dialogue]]
speaker = "ルリエル"
original = "「たまに、ちょっぴりだけ寂しそうなお顔、してましたから」"
translation = "「가끔 조금 쓸쓸해 보이는 표정을 지으셨으니까요.」"

[[dialogue]]
speaker = "unk"
original = "ラファエロは『館長』だったな"
translation = "라파엘로는 『관장』이었지"

[[dialogue]]
speaker = "unk"
original = "ステラは『団長さん』で……"
translation = "스텔라는 『단장님』이고……"

[[dialogue]]
speaker = "ルリエル"
original = "「はい。やっぱり仲良しの人と離ればなれなのは寂しいことなのです……きっと再会できてますよね？」"
translation = "「네. 역시 친한 사람이랑 떨어져 있는 건 쓸쓸한 일이에요…… 분명 재회하셨겠죠?」"

[[dialogue]]
speaker = "unk"
original = "心配いらないよ"
translation = "걱정할 거 없어"

[[dialogue]]
speaker = "unk"
original = "フィオナやヴィーナスは無事帰ってきた"
translation = "피오나나 비너스도 무사히 돌아왔잖아"

[[dialogue]]
speaker = "ルリエル"
original = "「えへへ、そうですよね♪\u3000せっかく仲良しになれた人たちだったので、ちょっぴり気になっちゃって」"
translation = "「에헤헤, 그렇네요♪ 모처럼 친해진 분들이라 조금 신경 쓰여서요.」"

[[dialogue]]
speaker = "unk"
original = "イチャイチャしてるかもしれない"
translation = "꽁냥거리고 있을지도 몰라"

[[dialogue]]
speaker = "unk"
original = "むしろ今頃、俺たちに負けないくらい"
translation = "오히려 지금쯤 우리한테 지지 않을 정도로"

[[dialogue]]
speaker = "ルリエル"
original = "「えへへ♪\u3000だったらルリエルたちも負けてられません！\u3000イチャイチャしましょう、会長さん<emoji=heart04>」"
translation = "「에헤헤♪ 그렇다면 루리엘 일행도 질 수 없죠! 꽁냥거려요, 회장님 <emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「ふふ～、ルリエルの膝枕、どうぞなのです～<emoji=heart04>」"
translation = "「후후~ 루리엘의 무릎베개, 여기예요~ <emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「ん～、しょっ……と<emoji=heart04>\u3000どこかにお出かけもいいですけど、こうやってのんびりするのも、ルリエル大好きなのです～<emoji=heart04>」"
translation = "「영, 차…… <emoji=heart04> 어디 외출하는 것도 좋지만, 이렇게 느긋하게 있는 것도 루리엘은 정말 좋아해요~ <emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「会長さん、いつもお疲れ様なのです。頑張り屋の会長さんには、恋人の膝枕でのんびりできる権利をプレゼントですよー？」"
translation = "「회장님, 항상 수고 많으세요. 노력파인 회장님에게는 연인의 무릎베개로 느긋하게 쉴 수 있는 권리를 선물할게요~?」"

[[dialogue]]
speaker = "ルリエル"
original = "「してほしいことがあったら、何でも言ってほしいのです♪」"
translation = "「하고 싶은 게 있다면 뭐든 말씀해 주세요♪」"

[[dialogue]]
speaker = "unk"
original = "それじゃあ……"
translation = "그럼……"

[[dialogue]]
speaker = "ルリエル"
original = "「え……？\u3000ステラさんの衣装に変身して欲しい、ですか？\u3000確かめたいことがある……？」"
translation = "「에……? 스텔라 씨의 의상으로 변신해 줬으면 한다, 고요? 확인하고 싶은 게 있다……?」"

[[dialogue]]
speaker = "ルリエル"
original = "「はいなのです♪\u3000それでは──」"
translation = "「네, 알겠어요♪ 그럼──」"

[[dialogue]]
speaker = "ルリエル"
original = "「これでいいですか？\u3000それで、確かめたいことって……？」"
translation = "「이걸로 됐나요? 그래서 확인하고 싶은 거란 게……?」"

[[dialogue]]
speaker = "unk"
original = "やっぱり、この衣装になると……"
translation = "역시 이 의상이 되면……"

[[dialogue]]
speaker = "ルリエル"
original = "「はぇええっ！？\u3000ルリエルから、お花のいい香りがするんですか……っ！？」"
translation = "「하에에엣!? 루리엘한테서 꽃의 좋은 향기가 난다고요……!?」"

[[dialogue]]
speaker = "ルリエル"
original = "「あ……そういえば、バレンタインフォームの星騎士さんって、ほんのりチョコの香りがするような……？」"
translation = "「아…… 그러고 보니 발렌타인 폼인 성기사님은 은은하게 초코 향기가 나는 것 같기도……?」"

[[dialogue]]
speaker = "ルリエル"
original = "「花騎士さんの衣装だから、お花の香りがするんでしょうか……星力の一部がお花の香りに変わっちゃってる、とか？」"
translation = "「꽃의 기사님 의상이라서 꽃 향기가 나는 걸까요…… 성력의 일부가 꽃 향기로 변해버린 걸까요?」"

[[dialogue]]
speaker = "ルリエル"
original = "「くんくん、くんくん……自分じゃぜんぜんわからないのです！！」"
translation = "「킁킁, 킁킁…… 저는 전혀 모르겠어요!!」"

[[dialogue]]
speaker = "ルリエル"
original = "「な、なんだかちょっぴり恥ずかしい気もするのですが……でもでも、いい香りだったなら、嬉しいです♪」"
translation = "「왠, 왠지 조금 부끄러운 기분도 들지만…… 하지만 하지만, 좋은 향기였다면 기뻐요♪」"

[[dialogue]]
speaker = "ルリエル"
original = "「それに、考えようによっては、これは使えちゃう気がします！」"
translation = "「게다가 생각하기에 따라서는 이걸 활용할 수 있을 것 같아요!」"

[[dialogue]]
speaker = "ルリエル"
original = "「今回みたいに、異世界に誰かが飛び出しちゃう事件……今後も起きちゃうかもですが……」"
translation = "「이번처럼 이세계로 누군가 튀어나가는 사건…… 앞으로도 일어날지 모르지만……」"

[[dialogue]]
speaker = "ルリエル"
original = "「もしもルリエルが迷子になっても、このお花の香り、会長さんが覚えていてくれたら安心なのです♪\u3000会長さんなら、きっと見つけてくれますよね？」"
translation = "「만약 루리엘이 미아가 되어도 이 꽃 향기를 회장님이 기억해 주신다면 안심이에요♪ 회장님이라면 분명 찾아내 주시겠죠?」"

[[dialogue]]
speaker = "unk"
original = "もちろん。すぐに見つけてみせる"
translation = "물론이지. 금방 찾아내 보일게"

[[dialogue]]
speaker = "ルリエル"
original = "「はい♪\u3000もちろん逆の立場になった時は、ルリエルが一番に会長さんを見つけちゃうのです！」"
translation = "「네♪ 물론 반대 입장이 되었을 때는 루리엘이 제일 먼저 회장님을 찾아낼 거예요!」"

[[dialogue]]
speaker = "ルリエル"
original = "「くんくん……<emoji=heart04>\u3000会長さんの香り、しっかり覚えておかないと～……なのです<emoji=heart04>\u3000くんくんくん……<emoji=heart04>」"
translation = "「킁킁…… <emoji=heart04> 회장님 향기, 제대로 기억해 둬야지~…… 예요 <emoji=heart04> 킁킁킁…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "健気に鼻を鳴らすルリエルと、その日はずっとくっついて過ごした。"
translation = "기특하게 코를 킁킁거리는 루리엘과 그날은 내내 붙어서 시간을 보냈다."

[[dialogue]]
speaker = "unk"
original = "この可愛い女の子と、いつまでもずっと一緒にいられますように──そんなことを願いながら。"
translation = "이 귀여운 여자아이와 언제까지나 계속 함께할 수 있기를── 그런 소원을 빌면서."

