[[dialogue]]
speaker = "unk"
original = "第３話,サボり魔を捕まえろ！,P"
translation = "제3화, 땡땡이꾼을 잡아라!, P"

[[dialogue]]
speaker = "unk"
original = "今日はフィオナと２人で集まり、会長職同士の定期報告を行っていた。"
translation = "오늘은 피오나와 둘이 모여, 회장직끼리의 정기 보고를 진행하고 있었다."

[[dialogue]]
speaker = "unk"
original = "両学園の星騎士たちがどれくらい出動し、どのような成果を挙げたか──今後の連携にも関わる大事な業務だ。"
translation = "양 학원의 성기사들이 얼마나 출동했고 어떤 성과를 거두었는지── 향후 연계에도 관련된 중요한 업무다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「なあ２人とも。まだ終わんないのか？\u3000ちゃちゃーっと適当に片付けちゃえばいいんじゃないか？」"
translation = "「저기 둘 다. 아직 안 끝나? 대충대충 적당히 끝내버리면 되잖아?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「姉さん。星徒会業務は遊びではありません。適当にやるわけにはいかないんです」"
translation = "「언니. 성도회 업무는 놀이가 아니에요. 적당히 할 수는 없답니다」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「けど、流星の奴らはいつも遊んでるぞ」"
translation = "「하지만 유성 녀석들은 맨날 놀고 있다구」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「みんなは──……帰ったらお話させていただきます」"
translation = "「다들──…… 돌아가면 이야기 좀 해야겠네요」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「つか、この部屋寒くね？\u3000なんかイジョーに」"
translation = "「그보다, 이 방 춥지 않아? 뭔가 이상할 정도로」"

[[dialogue]]
speaker = "unk"
original = "暖房が壊れた"
translation = "난방이 고장 났어"

[[dialogue]]
speaker = "unk"
original = "ストーブが壊れた"
translation = "난로가 고장 났어"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「──壊れすぎだろ！\u3000よくこんな部屋で仕事ができるな……」"
translation = "「──너무 자주 고장 나잖아! 잘도 이런 방에서 일을 하는구나……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ひと仕事終えるまでの辛抱ですから」"
translation = "「한 고비 넘길 때까지만 참으면 되니까요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「それにしても、ルリエルたち遅いですね……」"
translation = "「그나저나 루리엘 일행이 늦네요……」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ルリも呼んでたのか？」"
translation = "「루리도 불렀어?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ええ、手伝いを頼んでいたんです。ユウリやニャリオンにも。行けたら行く──というようなことを約束してくれました」"
translation = "「네, 도움을 요청했거든요. 유우리나 냐리온에게도요. 갈 수 있으면 가겠다는 식으로 약속해 줬어요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「教室にも残っていなかったので、もしかしたら職員室にでも呼ばれているのでしょうか……？」"
translation = "「교실에도 남아있지 않았으니, 어쩌면 교무실에라도 불려 간 걸까요……?」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナス達が……"
translation = "비너스 일행이……"

[[dialogue]]
speaker = "unk"
original = "こっちも"
translation = "이쪽도"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「会長さんも？\u3000ヴィーナスさんたちに頼んでいたんですね。揃って遅刻とは、何かあったのでしょうか」"
translation = "「회장님도요? 비너스 씨 일행에게 부탁하셨군요. 다 같이 지각이라니, 무슨 일이라도 있는 걸까요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「忙しいのはみんなも一緒──ということかもしれません。大変ですが、私たちで頑張るしかありませんね」"
translation = "「바쁜 건 다들 마찬가지──라는 뜻일지도 모르겠네요. 힘들지만 우리끼리 힘내는 수밖에 없겠어요」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「星徒会長ってのも大変なんだな。偉いのはいいけどよー、シゴトで忙しいのはゴメンだな～」"
translation = "「성도회장이라는 것도 참 힘들구나. 높은 건 좋지만 말이야─ 업무로 바쁜 건 사양이라구~」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「んー……そーだ！\u3000なあなあ、一区切りついたらビーチへ行こうぜ！」"
translation = "「음─…… 맞다! 저기저기, 일단락되면 비치로 가자!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ビーチって──リップルさんの？」"
translation = "「비치라면── 리플 씨의?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「おう！\u3000ちょっとだけだからよ！\u3000ほら、星徒会室にはリゾート行きのゲートが設置されてんだろ？」"
translation = "「응! 아주 잠깐이면 되니까! 봐봐, 성도회실에는 리조트로 가는 게이트가 설치되어 있잖아?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「こんな寒い部屋に閉じこもってたら風邪引いちまうよ──息抜きも大事だ！\u3000なあ魔王？」"
translation = "「이런 추운 방에 처박혀 있으면 감기 걸린다구── 휴식도 중요해! 그치 마왕?」"

[[dialogue]]
speaker = "unk"
original = "少しだけなら"
translation = "조금만이라면"

[[dialogue]]
speaker = "unk"
original = "確かに……"
translation = "확실히……"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「──よし、行こう！\u3000決まりだな」"
translation = "「──좋아, 가자! 결정됐네」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「もう。私はここで自分の業務を進めておきますから──少ししたら帰ってきてくださいね」"
translation = "「정말. 저는 여기서 제 업무를 진행하고 있을 테니까── 조금 있다가 돌아오셔야 해요」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「へへっ！\u3000やっぱずっと部屋にこもってると息が詰まるしな！」"
translation = "「헤헤! 역시 계속 방에만 박혀 있으면 숨이 막힌다니까!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「やっぱ人生息抜きが肝心──って、ん？\u3000ありゃ……向こうにも何人かいるな」"
translation = "「역시 인생은 휴식이 핵심── 어, 응? 저기…… 저쪽에도 몇 명 있네」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「いくわよサーシャさん！\u3000必殺ショット！」"
translation = "「간다 사샤 씨! 필살 샷!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「やったわね、ヴィーナスちゃん。そーれ、お返しよ～！」"
translation = "「해냈구나, 비너스 짱. 자아~ 받아라~!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「おーい。何やってんだ？」"
translation = "「어이. 뭐 하고 있어?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あら、アポロじゃない。水鉄砲で水中サバイバルゲームよ。あなたも混ざりたいの？」"
translation = "「어머, 아폴로잖아. 물총으로 수중 서바이벌 게임 중이야. 너도 끼고 싶니?」"

[[dialogue]]
speaker = "unk"
original = "星徒会定期報告会のお手伝いは？"
translation = "성도회 정기 보고회 돕는 건?"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「って──あ、あなたもここに！？\u3000どうして──」"
translation = "「헉── 다, 당신도 여기에!? 어째서──」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あー……うーんと……も、もちろん忘れてないわよ！\u3000ねえサーシャさん！？」"
translation = "「아─…… 음…… 무, 물론 잊지 않았어! 그치 사샤 씨!?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ええ、もちろん。ちょっと夏の陽気に誘われて来ただけよ。決して、星徒会室のストーブが壊れたからここに逃げてきたわけじゃないわ～」"
translation = "「네, 물론이죠~. 그냥 여름 기운에 이끌려 온 것뿐이란다~. 결코 성도회실 난로가 고장 나서 여기로 도망쳐 온 게 아니란다~」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「むむむっ！\u3000さてはオマエたち──『サボり魔』だな！？\u3000しょっぴくぞ、魔王！」"
translation = "「으음음! 보아하니 너희들── 『땡땡이꾼』이구나!? 잡아넣자, 마왕!」"

[[dialogue]]
speaker = "unk"
original = "逃がさない"
translation = "놓치지 않아"

[[dialogue]]
speaker = "unk"
original = "承知"
translation = "알았어"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「く……！\u3000まさかアポロに捕まっちゃうなんて……！」"
translation = "「큭……! 설마 아폴로에게 잡히다니……!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「油断してたわ～」"
translation = "「방심했네~」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「フィオナが星徒会室で待ってるから、２人も駆けつけてくれよな！」"
translation = "「피오나가 성도회실에서 기다리고 있으니까, 둘 다 빨리 가보라고!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「まったく、あの２人には参ったもんだな」"
translation = "「정말이지, 저 두 사람에겐 못 당하겠다니까」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「あたし達もずっとここで休んでるわけにはいかない。戻ったらフィオナの手伝いをしないとな」"
translation = "「우리도 계속 여기서 쉬고 있을 순 없지. 돌아가면 피오나를 도와야겠어」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「その前に、ちょいと海の家で水分補給でも──って……ん？」"
translation = "「그전에, 잠깐 바다의 집에서 수분 보충이라도── 어라?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「そーれ！\u3000もっと砂をかけちゃいますよぉ、これでニャリオンさんは胴体丸ごと埋めちゃいます！」"
translation = "「자아! 모래를 더 뿌릴게요, 이걸로 냐리온 씨는 몸통째로 파묻어 버리겠어요!」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「ニャァ！？\u3000み、身動きが全く取れニャいニャン！」"
translation = "「냐아!? 모, 몸이 전혀 안 움직여냥!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ハハ、やっぱビーチっつったらこれだよな！」"
translation = "「하하, 역시 비치라고 하면 이거지!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ニャリオンちゃんのサイズなら簡単に埋まっちゃうね～」"
translation = "「냐리온 짱 사이즈라면 금방 묻히겠네~」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ぴぴーっ！\u3000サボり魔３人と１匹発見！\u3000ただちにフィオナの手伝いに戻るべーし！」"
translation = "「삐삐─! 땡땡이꾼 3명과 한 마리 발견! 즉시 피오나를 도우러 돌아갈 것!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あっ！？\u3000どうしてここに！？」"
translation = "「앗!? 어째서 여기에!?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「まずい、見つかった」"
translation = "「망했다, 들켰다」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ドロンするっきゃないね」"
translation = "「도망치는 수밖에 없겠네~」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「ニャーッ！\u3000埋めたワガハイを残して逃げるなんて非人道的ニャン！！」"
translation = "「냐아─! 파묻은 이 몸을 남겨두고 도망가다니 비인도적이다냥!!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「哀れだな、ニャリオン。掘り出してやるから星徒会室に戻るんだ」"
translation = "「가련하구나, 냐리온. 파내 줄 테니까 성도회실로 돌아가」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「ニャア……星徒会室はゴメン被るニャン」"
translation = "「냐아…… 성도회실은 사양하겠다냥」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「ワガハイもフィオナ嬢に連れられて行ったニャンが……猫には堪える寒さニャンよ！\u3000せめて暖房が直ってから──」"
translation = "「이 몸도 피오나 아가씨에게 끌려갔었다냥만…… 고양이에게는 견디기 힘든 추위다냥! 적어도 난방이 고쳐진 뒤에──」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「つべこべ言わない！\u3000大事な星徒会のギョーム？\u3000なんだぞ！\u3000何してるのかよくわかんなかったけど！」"
translation = "「잔말 말고! 중요한 성도회 업무? 라구! 뭔지는 잘 모르겠지만!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「でもってあいつらも逃がさないぞ！\u3000一緒に捕まえよう、魔王！」"
translation = "「그리고 저 녀석들도 놓치지 않겠어! 같이 잡자, 마왕!」"

[[dialogue]]
speaker = "unk"
original = "全員送還だ"
translation = "전원 송환이다"

[[dialogue]]
speaker = "unk"
original = "おう"
translation = "오우"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ふぅ……なんとかやりきったな、魔王」"
translation = "「후우…… 어떻게든 다 해냈네, 마왕」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「しかし、ふてぶてしい奴らだぜ。よもや星徒会にここまでサボり魔が潜んでいようとは……」"
translation = "「그나저나 뻔뻔한 녀석들이야. 설마 성도회에 이렇게까지 땡땡이꾼이 잠복해 있었을 줄이야……」"

[[dialogue]]
speaker = "unk"
original = "アポロのおかげ"
translation = "아폴로 덕분이야"

[[dialogue]]
speaker = "unk"
original = "ありがとう"
translation = "고마워"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「おう！\u3000んじゃ、帰って残りのギョームも終わらせようぜ！\u3000先にフィオナんとこで待ってるぞ！」"
translation = "「오우! 그럼 돌아가서 남은 업무도 끝내자구! 먼저 피오나 있는 곳에서 기다릴게!」"

[[dialogue]]
speaker = "unk"
original = "そうして、アポロは星徒会室へ帰っていった……。"
translation = "그렇게 아폴로는 성도회실로 돌아갔다……."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……あ」"
translation = "「……아」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「見つかっ……いや……その……えぇ……こほん」"
translation = "「들켰…… 아니…… 그게…… 에휴…… 흠흠」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「お疲れ様です、会長」"
translation = "「수고하셨습니다, 회장님」"

[[dialogue]]
speaker = "unk"
original = "口元にソースがついてる"
translation = "입가에 소스 묻었어"

[[dialogue]]
speaker = "unk"
original = "アナ……"
translation = "아나……"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「見てください。水平線に沈んでいく夕陽を。綺麗ですね……」"
translation = "「보세요. 수평선으로 가라앉는 석양을. 아름답네요……」"

[[dialogue]]
speaker = "unk"
original = "真面目なアナをもたぶらかす、リゾートの魔力は恐ろしい。"
translation = "성실한 아나마저 홀려버리는 리조트의 마력은 무시무시하다."

[[dialogue]]
speaker = "unk"
original = "そう感じさせる１日だった……。"
translation = "그렇게 느껴지는 하루였다……."

