[[dialogue]]
speaker = "unk"
original = "第１話,天使の歌声,P"
translation = "제1화, 천사의 노랫소리, P"

[[dialogue]]
speaker = "unk"
original = "流星学園の校門前に３人が整列している。"
translation = "유성학원의 교문 앞에 세 사람이 정렬해 있다."

[[dialogue]]
speaker = "unk"
original = "俺、フィオナ、ナナカ。そして俺たちの前には、ロロットがドーンと構えている。"
translation = "나, 피오나, 나나카. 그리고 우리 앞에는 로롯토가 당당히 버티고 서 있다."

[[dialogue]]
speaker = "unk"
original = "今日はロロットに声をかけてもらい、こちらの流星学園の中を案内してもらうことになったのだ。"
translation = "오늘은 로롯토가 말을 걸어 주어, 이곳 유성학원 안을 안내받기로 한 것이다."

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「さて皆さん、ちゃ～んと時間通りに集まれたようですね」"
translation = "「자 여러분, 자~알 시간 맞춰 모인 모양이네요」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「隊長～、なんなら隊長が一番来るの遅かったです」"
translation = "「대장님~, 따지고 보면 대장님이 제일 늦게 왔거든요.」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「隊長は一番偉いので、問題ないのです」"
translation = "「대장은 가장 위대하므로 문제없는 것이예요.」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「横暴だー！」"
translation = "「횡포다-!」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「それでは新星の会長さん、フィオナ会長、<b>私たちの</b>流星学園をご案内しますね」"
translation = "「그럼 신성의 회장님, 피오나 회장님, <b>저희의</b> 유성학원을 안내해 드릴게요.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「よろしくお願いします」"
translation = "「잘 부탁드립니다.」"

[[dialogue]]
speaker = "unk"
original = "よろしくね"
translation = "잘 부탁해"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「スルーするなー！\u3000そしてアタシも人数に入れろー！」"
translation = "「무시하지 마-! 그리고 나도 인원수에 넣어줘-!」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「はて……？\u3000会計さんにはお声がけしていなかったはずですが……まあ、一緒にいていただく分には構いません。なにせ、わたしは心が広いので」"
translation = "「어라……? 회계님께는 말을 꺼낸 적이 없었을 텐데요…… 뭐, 함께 있어 주시는 건 상관없어요. 어차피 저는 마음이 넓으니까요.」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「ロロちゃん、いつもフワフワしてるからさ、ちゃんと案内できるか心配なんだって」"
translation = "「로로짱은 항상 둥실둥실 떠다니니까, 제대로 안내할 수 있을지 걱정된다구.」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「その点、しっかり者のアタシがいれば安心でしょ？」"
translation = "「그런 점에서 야무진 내가 있으면 안심이지?」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「しかし、肝心な時にへたれてしまう会計さんでは、ちょっぴり安心感が足りないのです」"
translation = "「하지만 정작 중요한 때에 허탕을 치는 회계님으로는 조금 안심감이 부족한 것이예요.」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「辛い！\u3000ワサビを溶かしすぎた蕎麦つゆみたいにツーンとくる辛さだよっ！」"
translation = "「매워! 와사비를 너무 많이 푼 소바 장국처럼 찡하게 오는 매움이야!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「まあまあ、にぎやかな方が楽しいですから……ふふふっ」"
translation = "「자자, 북적거리는 편이 즐거우니까요…… 후후후.」"

[[dialogue]]
speaker = "unk"
original = "ナナカも案内を頼むよ"
translation = "나나카도 안내를 부탁해"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「ありがとー、２人ともっ！」"
translation = "「고마워, 둘 다!」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「それでは参りましょう～」"
translation = "「그럼 가보실까요~」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「これがこちらの流星学園……」"
translation = "「이것이 이곳의 유성학원……」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「おや？\u3000もう何度か来られていたのでは？」"
translation = "「오잉? 이미 몇 번 오시지 않았나요?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はい、ですが改めて見ると、感慨深いと言いますか」"
translation = "「네, 하지만 새삼 다시 보니 감개무량하다고나 할까요.」"

[[dialogue]]
speaker = "unk"
original = "似てるような似てないような"
translation = "닮은 듯 안 닮은 듯하네"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「そうですそうです！\u3000見た目は全く違うんですが、どことなく似ている雰囲気があるんです」"
translation = "「맞아요 맞아요! 겉모습은 전혀 다르지만 어딘지 모르게 닮은 분위기가 있어요.」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「ほほう～、不思議なこともあるのです。そちらの流星学園がどんな風なのか、わたしも気になってきちゃいました♪」"
translation = "「호오~ 신기한 일도 다 있네요. 그쪽의 유성학원은 어떤 모습일지 저도 궁금해져 버렸어요♪」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「確か、聖沙とリア先輩は、そっちの学園にも行ったことあるんだよね？」"
translation = "「내 기억에 미사랑 리아 선배는 그쪽 학원에도 가본 적 있었지?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「そうですね、お２人のことは私たちが案内させて頂きました」"
translation = "「그렇네요, 두 분은 저희가 안내해 드렸습니다.」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「いいなー。ロロちゃんもそう思わない？」"
translation = "「좋겠다-. 로로짱도 그렇게 생각하지?」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「思います、羨ましいのです。実際に行ってみなければ分からないことは、たくさんありますから。探検は足が命なのです」"
translation = "「생각해요, 부러운 것이예요. 실제로 가보지 않으면 모르는 것들이 잔뜩 있으니까요. 탐험은 발이 생명인 것이예요.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「では、ロロットさんがいらした際には、私たちの流星学園をご案内しますね」"
translation = "「그럼 로롯토 씨가 오셨을 때는 저희의 유성학원을 안내해 드릴게요.」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「おお～、ぜひとも！\u3000今からワクワクしてしまいますね～。おすすめの場所はどこなのでしょう？」"
translation = "「오오~ 꼭요! 벌써부터 두근두근해지네요~. 추천 장소는 어디인가요?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「おすすめの場所、ですか……ええと……」"
translation = "「추천 장소 말인가요…… 에또……」"

[[dialogue]]
speaker = "unk"
original = "大聖堂とかどうかな？"
translation = "대성당 같은 곳은 어때?"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「大聖堂！\u3000それは、そこはかとなく気になります」"
translation = "「대성당! 그건 왠지 모르게 신경 쓰이네요.」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「こっちの教会とは違うんだよね、やっぱり」"
translation = "「이쪽 교회랑은 다르겠지, 역시.」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「ではでは、まずはこちらの教会を見ていただきましょう。なかなか立派なのです～」"
translation = "「그럼그럼, 우선 이쪽 교회를 보시기로 하죠. 꽤나 훌륭한 것이예요~」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「おお……これがこちらの教会ですか……」"
translation = "「오오…… 이것이 이곳의 교회인가요……」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「いかがでしょう？」"
translation = "「어떠신가요?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「大変荘厳で、でも何だか落ち着く場所ですね……私は好きです」"
translation = "「무척 장엄하면서도 왠지 마음이 편안해지는 곳이네요…… 저는 좋아해요.」"

[[dialogue]]
speaker = "unk"
original = "こっちの教会もいいな"
translation = "이쪽 교회도 좋네"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「えへへ、そう言ってもらえると、誇らしくなってしまいますね～」"
translation = "「에헤헤, 그렇게 말씀해 주시니 자랑스러워져 버리네요~」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「ロロちゃん、凄く嬉しそうじゃん」"
translation = "「로로짱, 엄청 기뻐 보이잖아.」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「別の世界の方にまで気に入ってもらえたのですから、当然なのです。これは、もっとも～っと知ってもらわなければいけませんね！」"
translation = "「다른 세계 분에게까지 마음에 드셨다니 당연한 것이예요. 이건 더 많~이 알려드려야겠네요!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はい、よければこの教会のこと、もっと教えてもらっていいでしょうか？」"
translation = "「네, 괜찮다면 이 교회에 대해 좀 더 가르쳐 주실 수 있을까요?」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「そうですねぇ……今日はお休みですが、いつもは聖歌隊が活動していたりしますよ。エミリナがいてくれればよかったのですが……」"
translation = "「그렇네요…… 오늘은 쉬는 날이지만 평소에는 성가대가 활동하기도 해요. 에밀리나가 있어 줬으면 좋았을 텐데……」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「アタシ、呼んでこよっか？」"
translation = "「내가 불러올까?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「いえ、そこまでしていただくのは悪いですから大丈夫ですよ」"
translation = "「아뇨, 그렇게까지 해 주시는 건 죄송하니까 괜찮아요.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……我々の流星学園にも聖歌隊がいるんですよ。大聖堂で日々聖歌を捧げています」"
translation = "「……저희 유성학원에도 성가대가 있어요. 대성당에서 나날이 성가를 바치고 있죠.」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「フィオナも歌うの？」"
translation = "「피오나도 노래해?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「私は生憎とメンバーではありませんから……ときどき参加する、くらいでしょうか」"
translation = "「저는 아쉽게도 멤버는 아니라서…… 가끔 참가하는 정도일까요.」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「え～、聞いてみたいな～。よし、ならロロちゃん、いっちょやってみてよ！」"
translation = "「에~ 들어보고 싶은데~. 좋아, 그럼 로로짱, 한 번 해봐!」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「えぇっ、わたしですか！？」"
translation = "「에엣, 저 말인가요!?」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「一緒に歌ったら、もっと仲良くなれそうだしさっ」"
translation = "「같이 노래하면 더 친해질 수 있을 것 같고 말이야.」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「あわわ、突然言われましても～！」"
translation = "「아와와, 갑자기 말씀하셔도~!」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「ロロちゃん、うまいんだから大丈夫だって！\u3000江戸っ子なら覚悟決めやがれい！」"
translation = "「로로짱 잘하니까 괜찮다니까! 에도코라면 각오 단단히 하라구!」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「江戸っ子じゃありませ～ん！」"
translation = "「에도코 아니거든요~!」"

[[dialogue]]
speaker = "unk"
original = "天使だったね"
translation = "천사였지"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「て、天使でもありませんってば～～～！！」"
translation = "「천, 천사도 아니라니까요~~~!!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「どちらでも構いませんよ。ロロットさんが一緒に歌って下さったら嬉しいですけど」"
translation = "「어느 쪽이든 상관없어요. 로롯토 씨가 함께 노래해 주신다면 기쁠 것 같아요.」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「おおっ、乗り気じゃん！\u3000どうすんのさ、ロロちゃん？\u3000ちなみにアタシは、いつでも歌う覚悟は出来てるからね！」"
translation = "「오옷, 의욕적인데! 어떻게 할 거야, 로로짱? 참고로 나는 언제든 노래할 각오가 되어 있으니까!」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「まったく～、そこまで期待されてしまっては、仕方がありませんね！\u3000わたしが天使ではないことを、歌で証明してご覧に入れましょう」"
translation = "「정말~ 그렇게까지 기대하시니 어쩔 수 없네요! 제가 천사가 아니라는 것을 노래로 증명해 보겠어요.」"

[[dialogue]]
speaker = "unk"
original = "こうして、覚悟を決めたロロットは俺たちと一緒に歌声を響かせるのだった。"
translation = "이렇게 각오를 다진 로롯토는 우리와 함께 노랫소리를 울리는 것이었다."

