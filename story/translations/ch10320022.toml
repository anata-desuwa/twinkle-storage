[[dialogue]]
speaker = "unk"
original = "第２話,ウィステリアさんの手作りケーキ,P"
translation = "제2화, 위스테리아 씨의 수제 케이크"

[[dialogue]]
speaker = "ウィステリア"
original = "「あ、会長くん、また図書館に来てくれたのね。ありがとう、君の顔見ただけで気分良くなっちゃった」"
translation = "「아, 회장군, 또 도서관에 와주었구나. 고마워, 너의 얼굴을 본 것만으로도 기분이 좋아졌어」"

[[dialogue]]
speaker = "ウィステリア"
original = "「あら、視線が下向いてない？\u3000胸、見てるでしょ？」"
translation = "「어머, 시선이 아래를 향하고 있지 않아? 가슴, 보고 있지?」"

[[dialogue]]
speaker = "unk"
original = "服が大胆すぎてつい……"
translation = "옷이 너무 대담해서 그만……"

[[dialogue]]
speaker = "ウィステリア"
original = "「う……。いやこれはヘレナさんからもらったやつで……ほら、ヘレナさん、服のデザインもしてるでしょ」"
translation = "「우……. 아니 이건 헬레나 씨에게 받은 거라서…… 봐봐, 헬레나 씨, 옷 디자인도 하고 있잖아」"

[[dialogue]]
speaker = "ウィステリア"
original = "「意外と着心地いいのよ、これ。慣れたら手放せなくて……」"
translation = "「의외로 입기 편해, 이거. 익숙해지니까 손을 뗄 수가 없어서……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「まぁ、そんなことはいいのよ。会長くんなら見られてもいいし」"
translation = "「뭐, 그런 건 됐어. 회장군이라면 보여도 상관없고」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ああ、そうだ。会長くん、ちょっとだけ相談していい？」"
translation = "「아아, 맞다. 회장군, 잠깐만 상담해도 될까?」"

[[dialogue]]
speaker = "unk"
original = "もちろんです"
translation = "물론이죠"

[[dialogue]]
speaker = "ウィステリア"
original = "「ありがとう。やっぱり会長くんは頼りになるわね」"
translation = "「고마워. 역시 회장군은 의지가 되네」"

[[dialogue]]
speaker = "ウィステリア"
original = "「いやー、本当に大したことじゃないんだけど、最近細々とした仕事のストレスが溜まっててね。どうにかして発散したいなーと思ってるのよ」"
translation = "「아니~, 정말 별거 아닌데, 최근 자잘한 업무 스트레스가 쌓여서 말이야. 어떻게든 발산하고 싶다고 생각하고 있어」"

[[dialogue]]
speaker = "ウィステリア"
original = "「だけど自分でも何していいかわからなくて。今は特別気になるスイーツもないし……」"
translation = "「하지만 스스로도 뭘 하면 좋을지 모르겠어서. 지금은 특별히 당기는 디저트도 없고……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「……あ、そうだ」"
translation = "「……아, 맞다」"

[[dialogue]]
speaker = "ウィステリア"
original = "「会長くん、ケーキ食べる？」"
translation = "「회장군, 케이크 먹을래?」"

[[dialogue]]
speaker = "unk"
original = "その週末。ウィステリアさんが俺の自宅にやってきた。"
translation = "그 주말. 위스테리아 씨가 내 자택으로 찾아왔다."

[[dialogue]]
speaker = "ウィステリア"
original = "「キッチン借りちゃうわね。ふふ、気合入っちゃうわ」"
translation = "「주방 좀 빌릴게. 후후, 의욕이 생기는걸」"

[[dialogue]]
speaker = "unk"
original = "ウィステリアさんがケーキ作るんですか？"
translation = "위스테리아 씨가 케이크를 만드는 건가요?"

[[dialogue]]
speaker = "ウィステリア"
original = "「そんなに意外そうな顔しないでよ。私、これでも自炊するし、お菓子だって作れるのよ」"
translation = "「그렇게 의외라는 표정 짓지 마. 나, 이래 봬도 자취하고, 과자도 만들 줄 안다고」"

[[dialogue]]
speaker = "ウィステリア"
original = "「昔、星見家メイド隊でバイトしてたってのは言ったっけ？」"
translation = "「옛날에 호시미 가문 메이드대에서 아르바이트했다고 말했던가?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「あ、思い出した。キリカが勝手に喋ったんだったわね……もう、あの陰険メイド長ってば」"
translation = "「아, 생각났다. 키리카가 멋대로 떠들었던 거였지…… 정말, 그 음침한 메이드장도 참」"

[[dialogue]]
speaker = "unk"
original = "キリカ師匠の影響でお菓子好きに？"
translation = "키리카 스승님의 영향으로 과자를 좋아하게 된 건가요?"

[[dialogue]]
speaker = "ウィステリア"
original = "「まぁ……そうね。キリカのおかげっていうのは癪だけど、人間界に来る前の私は、甘いものなんて全然食べたことなかったから」"
translation = "「뭐…… 그렇지. 키리카 덕분이라고 하는 건 배 아프지만, 인간계에 오기 전의 나는 단것 따윈 전혀 먹어본 적이 없었으니까」"

[[dialogue]]
speaker = "ウィステリア"
original = "「キリカが作ってくれたケーキはそれはもう美味しくて、ほんとに驚いちゃった」"
translation = "「키리카가 만들어 준 케이크는 정말이지 맛있어서, 정말 깜짝 놀랐어」"

[[dialogue]]
speaker = "ウィステリア"
original = "「あの頃はキリカもまだメイド長じゃなかったから、ケーキを焼く練習に付き合ったりしてね」"
translation = "「그 시절엔 키리카도 아직 메이드장이 아니었으니까, 케이크 굽는 연습을 도와주기도 했지」"

[[dialogue]]
speaker = "ウィステリア"
original = "「小言は多いけど、キリカのお菓子作りの腕は認めてるわ。もうちょっと素直なら可愛げもあるのにね」"
translation = "「잔소리는 많지만, 키리카의 과자 만들기 솜씨는 인정해. 조금만 더 솔직하면 귀여운 맛도 있을 텐데」"

[[dialogue]]
speaker = "ウィステリア"
original = "「なに？\u3000ニヤニヤしちゃって。……キリカと仲がいい？\u3000そんなわけないでしょ、いくら会長くんでも怒るわよ」"
translation = "「뭐야? 싱글벙글 웃고는. ……키리카랑 사이가 좋다? 그럴 리 없잖아, 아무리 회장군이라도 화낼 거야」"

[[dialogue]]
speaker = "ウィステリア"
original = "「さて、それじゃそのキリカ直伝のケーキを作りましょうか」"
translation = "「자, 그럼 그 키리카 직전의 케이크를 만들어 볼까」"

[[dialogue]]
speaker = "ウィステリア"
original = "「手出しは無用よ、会長くん。君がいろいろできるのは知ってるけど、ここは私に任せなさい♪」"
translation = "「도와줄 필요 없어, 회장군. 네가 이것저것 잘하는 건 알지만, 여기는 나에게 맡기렴♪」"

[[dialogue]]
speaker = "ウィステリア"
original = "「焼き上がったのを冷まして……粉砂糖をかけて……っと。はい、ガトーショコラの出来上がり♪」"
translation = "「다 구워진 걸 식히고…… 슈가 파우더를 뿌려서…… 됐다. 자, 갸토 쇼콜라 완성♪」"

[[dialogue]]
speaker = "ウィステリア"
original = "「我ながら綺麗にできたわ。いつもは食べる側だけど、たまに作るとストレス発散になるわね♪」"
translation = "「내가 봐도 예쁘게 됐네. 평소엔 먹는 쪽이지만, 가끔 만들면 스트레스 발산이 된다니까♪」"

[[dialogue]]
speaker = "ウィステリア"
original = "「それじゃ……」"
translation = "「그럼……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「はい、あ～ん<emoji=heart04>」"
translation = "「자, 아~앙<emoji=heart04>」"

[[dialogue]]
speaker = "ウィステリア"
original = "「……どう？\u3000美味しい？」"
translation = "「……어때? 맛있어?」"

[[dialogue]]
speaker = "unk"
original = "すごく美味しいです！"
translation = "정말 맛있어요!"

[[dialogue]]
speaker = "ウィステリア"
original = "「ふふふ♪\u3000口に合って良かったわ。マズイって言われたら呪ってたかも」"
translation = "「후후후♪ 입에 맞아서 다행이야. 맛없다고 했으면 저주했을지도」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ふふっ、冗談よ。怖がらないで。そんなことで呪ったりしないわ」"
translation = "「후후, 농담이야. 무서워하지 마. 그런 걸로 저주하진 않으니까」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ほら、ケーキまだまだあるから食べて。あ～ん<emoji=heart04>」"
translation = "「봐봐, 케이크 아직 많이 있으니까 먹어. 아~앙<emoji=heart04>」"

[[dialogue]]
speaker = "ウィステリア"
original = "「……ふふふ♪」"
translation = "「……후후후♪」"

[[dialogue]]
speaker = "ウィステリア"
original = "「自分でスイーツを食べるのもいいけど、好きになった人に食べてもらうのもいいわね」"
translation = "「직접 디저트를 먹는 것도 좋지만, 좋아하게 된 사람이 먹어주는 것도 좋네」"

[[dialogue]]
speaker = "ウィステリア"
original = "「私ね。今すごく幸せなの」"
translation = "「나 말이야. 지금 정말 행복해」"

[[dialogue]]
speaker = "ウィステリア"
original = "「君と２人っきりで……私が作ったケーキで君が笑顔になってくれて……こんな時間がずっと続けばいいのにって思っちゃう」"
translation = "「너와 단둘이서…… 내가 만든 케이크로 네가 미소 지어 주고…… 이런 시간이 계속 이어졌으면 좋겠다고 생각하게 돼」"

[[dialogue]]
speaker = "ウィステリア"
original = "「私って年下好きだったのかしら。少女漫画みたいなドラマチックな恋に憧れてた頃もあったけど、漫画の王子様より君がいいわ」"
translation = "「나, 연하 취향이었던 걸까. 순정 만화 같은 드라마틱한 사랑을 동경하던 시절도 있었지만, 만화 속 왕자님보다 네가 더 좋아」"

[[dialogue]]
speaker = "ウィステリア"
original = "「君を見ているだけで、つい頬が緩んじゃって。こんな気持ちになれる日が来るなんて思わなかったなぁ……」"
translation = "「너를 보고 있는 것만으로도 나도 모르게 입가가 풀려버려서. 이런 기분이 될 수 있는 날이 올 줄은 몰랐네……」"

[[dialogue]]
speaker = "unk"
original = "俺も幸せですよ"
translation = "저도 행복해요"

[[dialogue]]
speaker = "ウィステリア"
original = "「言わせちゃってない？\u3000私、年上だし、呪われてるのよ？」"
translation = "「억지로 말하게 한 거 아니야? 나, 연상인 데다 저주받았다고?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「って、会長くんが言ってくれてるんだから、不安になっちゃダメよね。年上って言っても３つだけだし」"
translation = "「아니, 회장군이 그렇게 말해주고 있으니까 불안해하면 안 되겠지. 연상이라고 해도 세 살 차이일 뿐이고」"

[[dialogue]]
speaker = "ウィステリア"
original = "「だけど、今の言葉がウソじゃないって、行動で示してもらってもいい？」"
translation = "「하지만, 방금 한 말이 거짓말이 아니라는 걸 행동으로 보여줄 수 있을까?」"

[[dialogue]]
speaker = "unk"
original = "そう言って頬を赤く染めるウィステリアさん。"
translation = "그렇게 말하며 뺨을 붉게 물들이는 위스테리아 씨."

[[dialogue]]
speaker = "unk"
original = "俺もゆっくり顔を近づけていって──"
translation = "나도 천천히 얼굴을 가까이 가져가서──"

[[dialogue]]
speaker = "ウィステリア"
original = "「ひゃああっ！？\u3000こんな時にモンスター！？」"
translation = "「히야아앗!? 이럴 때 몬스터!?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「もう、仕方ないわね。さっさと片付けるわよ！」"
translation = "「정말, 어쩔 수 없네. 얼른 해치우자!」"

[[dialogue]]
speaker = "ウィステリア"
original = "「シャドウメイルストラム！」"
translation = "「섀도 메일스트롬!」"

[[dialogue]]
speaker = "unk"
original = "ウィステリアさんの星術が炸裂し、今日もモンスターを蹴散らすのだった……"
translation = "위스테리아 씨의 성술이 작렬하며, 오늘도 몬스터를 쫓아버리는 것이었다……"

