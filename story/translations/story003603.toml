[[dialogue]]
speaker = "unk"
original = "リバースフォームの訓練中、突如『赤ちゃん化』してしまったプリムラ。"
translation = "리버스 폼 훈련 중, 갑자기 『아기화』해버린 프리뮬라."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「だあぁ♪\u3000ママぁ～<emoji=heart04>」"
translation = "「다아아♪ 마마아~<emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「は～い♪\u3000プリムラさん、アンナママでちゅよ～♪」"
translation = "「네~♪ 프리뮬라 씨, 안나 마마예용~♪」"

[[dialogue]]
speaker = "unk"
original = "無邪気に抱き着くプリムラを受け止め、優しく頭を撫でる。"
translation = "천진난만하게 매달리는 프리뮬라를 받아내며, 상냥하게 머리를 쓰다듬는다."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「きゃっきゃ♪\u3000アンナママのおっぱい、やらかぁ～い<emoji=heart04>」"
translation = "「꺄꺄♪ 안나 마마 가슴, 마랑마랑해~<emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「よちよち～♪\u3000……これはおそらく、プリムラさんの力だけでなく、精神まで反転してしまっているのかもしれませんね～」"
translation = "「우쭈쭈~♪ ……이건 아마도 프리뮬라 씨의 힘뿐만 아니라, 정신까지 반전되어 버린 것일지도 모르겠네요~」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「あぁ～い♪」"
translation = "「아아~이♪」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「つまり、プリムラちゃんの精神年齢が赤ちゃんレベルまで退行しちゃったってこと！？」"
translation = "「즉, 프리뮬라짱의 정신 연령이 아기 수준까지 퇴행해 버렸다는 거야!?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「んぅ～♪\u3000シズハママも、だっこ～<emoji=heart04>」"
translation = "「응으~♪ 시즈하 마마도, 안아줘~<emoji=heart04>」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「えっ！？\u3000私もママなの！？」"
translation = "「엣!? 나도 마마야!?」"

[[dialogue]]
speaker = "unk"
original = "抱きつかれ、困惑しながらも撫でるシズハ。"
translation = "안겨 오는 통에 당혹스러워하면서도 쓰다듬어 주는 시즈하."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ふへへへぇ～<emoji=heart04>\u3000あたまなでなで、すき～<emoji=heart04>」"
translation = "「후헤헤헤에~<emoji=heart04> 머리 쓰담쓰담, 좋아~<emoji=heart04>」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「ぷ、プリムラちゃん……可愛い……<emoji=heart04>」"
translation = "「프, 프리뮬라짱…… 귀여워……<emoji=heart04>」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ばぶぅ～♪\u3000パパも抱っこ～<emoji=heart04>」"
translation = "「바부우~♪ 파파도 안아줘~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "プリムラはそう言って、今度は俺に突進。"
translation = "프리뮬라는 그렇게 말하며, 이번에는 나에게 돌진."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ぎゅうぅ～～っ<emoji=heart04>」"
translation = "「꼬오오옥~~<emoji=heart04>」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ちょっ、お兄さんにも……！？」"
translation = "「잠깐, 오빠한테까지……!?」"

[[dialogue]]
speaker = "unk"
original = "俺はパパか～"
translation = "나는 파파인가~"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「動じてないですね……」"
translation = "「동요하지 않으시네요……」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「会長さんは慣れてますからね～」"
translation = "「회장님은 익숙하시니까요~」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「じ～っ……」"
translation = "「빤히……」"

[[dialogue]]
speaker = "unk"
original = "プリムラが次に視線を向けたのは、近くでふわふわ浮いているディーラック。"
translation = "프리뮬라가 다음에 시선을 돌린 것은, 근처에서 둥실둥실 떠 있는 디럭쿠."

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「あん？\u3000ボクかい？」"
translation = "「앙? 나 말임까?」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「まあボクは、実際にプリムラを生み出した『ママ』ではあるけどサ……」"
translation = "「뭐, 내가 실제로 프리뮬라를 만들어낸 『마마』이긴 함다만……」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ディーラックは――わんわん！」"
translation = "「디럭쿠는―― 멍멍이!」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「犬扱い！？\u3000いや、なんでだよ！？」"
translation = "「개 취급!? 아니, 왜임까!?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「だあぁっ♪\u3000わんわんのしっぽ～♪」"
translation = "「다아앗♪ 멍멍이 꼬리~♪」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「あっ、いてててっ！\u3000おい、尻尾を引っ張るなってば！」"
translation = "「앗, 아야야얏! 어이, 꼬리를 잡아당기지 말라니까요!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「？\u3000わんわん、『タマタマ』ない？」"
translation = "「? 멍멍이, 『부랄』 없어?」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「ないよっ！\u3000ボク、女の子だからね！？\u3000というか、どこ見てんのサ！？」"
translation = "「없슴다! 나, 여자아이니까요!? 그보다 어디를 보고 있는 검까!?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「あ、あの……私は？」"
translation = "「저, 저기…… 나는?」"

[[dialogue]]
speaker = "unk"
original = "気になったのか、サチがプリムラに尋ねる。"
translation = "신경 쓰였는지, 사치가 프리뮬라에게 묻는다."

[[dialogue]]
speaker = "unk"
original = "プリムラはじっと見つめ――"
translation = "프리뮬라는 가만히 지켜보다가――"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「サチはママじゃない！」"
translation = "「사치는 마마 아냐!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ち、違うの？\u3000じゃあ、お姉さん……？」"
translation = "「아, 아냐? 그럼, 언니……?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ちがう！\u3000サチは、ただのサチ！」"
translation = "「아냐! 사치는 그냥 사치!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「なんでぇ～っ！？」"
translation = "「어째서어어~!」"

[[dialogue]]
speaker = "unk"
original = "地味にショックを受けるサチであった。"
translation = "은근히 충격을 받는 사치였다."

[[dialogue]]
speaker = "unk"
original = "やがて暴走は収まり、プリムラは正気に戻る。"
translation = "이윽고 폭주가 가라앉고, 프리뮬라는 정신을 차린다."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「……フッ」"
translation = "「……훗」"

[[dialogue]]
speaker = "unk"
original = "小さく笑うと、プリムラは虚ろな目で呟いた。"
translation = "작게 웃더니, 프리뮬라는 허망한 눈으로 중얼거렸다."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ハ、ハハ……これは、切腹か……？\u3000生き恥を晒すくらいなら、自ら腹を切るべきではないのか……？」"
translation = "「하, 하하…… 이건 할복인가……? 살아있는 치욕을 보이느니, 스스로 배를 갈라야 하는 것 아닌가……?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「え～っと、コメントしづらいな……」"
translation = "「저기, 코멘트하기 어렵네……」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「プリムラちゃん！\u3000暴走しちゃってただけなんだから、誰も気にしてないよ！」"
translation = "「프리뮬라짱! 폭주해 버렸을 뿐이니까, 아무도 신경 안 써!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「くっ……！\u3000なんで我があんな『赤ちゃん』みたいな恥ずかしい姿を晒す羽目になっとるのじゃあああぁ～～っ！？」"
translation = "「큭……! 어찌하여 짐이 저런 『아기』 같은 부끄러운 모습을 보일 처지가 된 것이냐아아아아~~!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「別に気にせず、甘えてくれてもいいんですよ～？」"
translation = "「별로 신경 쓰지 말고, 응석 부려 주셔도 괜찮답니다~?」"

[[dialogue]]
speaker = "unk"
original = "パパなら任せろ！"
translation = "파파라면 맡겨둬라!"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「できるかぁーーーっ！！」"
translation = "「할 수 있겠냐아아아!!!」"

[[dialogue]]
speaker = "unk"
original = "顔を真っ赤にして絶叫するプリムラなのであった。"
translation = "얼굴을 새빨갛게 물들이며 절규하는 프리뮬라였다."

[[dialogue]]
speaker = "unk"
original = "精神的にダメージを受けたプリムラと交代し、今度はサチが訓練をすることに。"
translation = "정신적으로 대미지를 입은 프리뮬라와 교대하여, 이번에는 사치가 훈련을 하게 되었다."

[[dialogue]]
speaker = "unk"
original = "仮想空間も気分を切り替えて、『マリンレジャー』のフィールドへと変更する。"
translation = "가상 공간도 기분을 전환하여, 『마린 레저』 필드로 변경한다."

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「フワッチ～♪」"
translation = "「후왓치~♪」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「よし……行きます！\u3000――はああぁっ！」"
translation = "「좋아…… 갑니다! ――하아앗!」"

[[dialogue]]
speaker = "unk"
original = "斧を構え、モンスターへ突進するサチ。"
translation = "도끼를 겨누고 몬스터에게 돌진하는 사치."

[[dialogue]]
speaker = "unk"
original = "そういえば、サチの能力って？"
translation = "그러고 보니, 사치의 능력은?"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「あ～、それはですね――」"
translation = "「아~ 그건 말이죠――」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「え？\u3000なんでここにビーチボールが埋まって――きゃあぁっ！？」"
translation = "「에? 왜 여기에 비치볼이 파묻혀―― 꺄앗!?」"

[[dialogue]]
speaker = "unk"
original = "足元に埋まっていたビーチボールを踏んづけてしまい、盛大にズッコケてしまうサチ。"
translation = "발밑에 파묻혀 있던 비치볼을 밟아버려, 화려하게 나자빠지는 사치."

[[dialogue]]
speaker = "unk"
original = "そのまま砂浜に顔面スライディングを決め、ちょうどモンスターの目の前で停止する。"
translation = "그대로 백사장에 얼굴을 처박고 슬라이딩하며, 마침 몬스터의 눈앞에서 정지한다."

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「フワッチ？」"
translation = "「후왓치?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「サチさんの元の能力は『幸運を引き寄せる』というものでしたが、反転した今は――」"
translation = "「사치 씨의 원래 능력은 『행운을 끌어당긴다』는 것이었지만, 반전된 지금은――」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「『不運を引き寄せる』という、とんでもなく厄介な代物になっちゃってるんですよね～」"
translation = "「『불운을 끌어당긴다』는, 엄청나게 골치 아픈 물건이 되어버린 거네요~」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「けほっ、こほっ……！\u3000うぅ……アンラッキーです……」"
translation = "「케흑, 콜록……! 으으…… 언럭키예요……」"

[[dialogue]]
speaker = "unk"
original = "砂まみれになった顔で、しょんぼり呟くサチなのであった。"
translation = "모래투성이가 된 얼굴로, 시무룩하게 중얼거리는 사치였다."

