[[dialogue]]
speaker = "unk"
original = "第７話,レティシアとの戦い,B"
translation = "제7화, 레티시아와의 싸움, B"

[[dialogue]]
speaker = "unk"
original = "ガーディアンの自爆の際、運よく巻き込まれなかった者もいた。"
translation = "가디언이 자폭할 때, 운 좋게 휘말리지 않은 자들도 있었다."

[[dialogue]]
speaker = "unk"
original = "仲間を助けに向かおうとするアポロとベアトリスの前に、極星星徒会のレティシアが立ちはだかる。"
translation = "동료를 구하러 가려는 아폴로와 베아트리스 앞에, 극성성도회의 레티시아가 가로막아 선다."

[[dialogue]]
speaker = "アポロ"
original = "「みんなを助けに行きたいのに、邪魔するなっての！」"
translation = "「모두를 구하러 가고 싶은데, 방해하지 말란 말이야!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「レティシアちゃん！\u3000せめて今だけでも戦いをやめて、みんなを助けに行こうよ！」"
translation = "「레티시아짱! 적어도 지금만큼은 싸움을 멈추고, 모두를 구하러 가자!」"

[[dialogue]]
speaker = "レティシア"
original = "「グレイスなら大丈夫よ。あの子はちょっと抜けたところもあるけれど、とても優秀な子だもの」"
translation = "「그레이스라면 괜찮아. 그 아이는 조금 덜렁대는 면도 있지만, 아주 우수한 아이인걸.」"

[[dialogue]]
speaker = "レティシア"
original = "「それよりも敵が分散した今は好機。各個撃破も可能ね。一時的にベアトの救出を優先しましょう」"
translation = "「그보다 적이 분산된 지금이 기회. 각개격파도 가능하겠네. 일시적으로 베아토의 구출을 우선하도록 하죠.」"

[[dialogue]]
speaker = "アポロ"
original = "「あたし１人なら倒せるってか！\u3000そうはさせるか！」"
translation = "「나 혼자라면 쓰러뜨릴 수 있다는 거냐! 그렇게 두진 않아!」"

[[dialogue]]
speaker = "unk"
original = "アポロの大剣とレティシアの刀がぶつかり、力と力の衝突が天界の空を震わせる。"
translation = "아폴로의 대검과 레티시아의 도가 맞부딪히고, 힘과 힘의 충돌이 천계의 하늘을 뒤흔든다."

[[dialogue]]
speaker = "アポロ"
original = "「コイツ、強いな……！」"
translation = "「이 녀석, 강하잖아……!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「レティシアちゃんはルヴィの次に強いから……」"
translation = "「레티시아짱은 루비 다음으로 강하니까……」"

[[dialogue]]
speaker = "アポロ"
original = "「ベアトは副会長なのに二番目じゃないのかよ！」"
translation = "「베아토는 부회장인데 2등이 아닌 거냐고!」"

[[dialogue]]
speaker = "レティシア"
original = "「アルタイルには魔王の力を持つ者がいると聞いていたけれど、あなたがそうなのかしら。油断ならない相手みたい」"
translation = "「알타이르에는 마왕의 힘을 가진 자가 있다고 들었는데, 당신이 그 사람일까. 방심할 수 없는 상대 같네.」"

[[dialogue]]
speaker = "レティシア"
original = "「だけど、このままなら私が勝つわね。あなた、持久力には自信がないんでしょう？」"
translation = "「하지만 이대로라면 내가 이기겠어. 당신, 지구력에는 자신 없는 모양이지?」"

[[dialogue]]
speaker = "アポロ"
original = "「くっ……」"
translation = "「큭……」"

[[dialogue]]
speaker = "unk"
original = "アポロはレティシアの攻撃が直撃しないように捌いているが、刀に宿った紫炎が乗り移り、呪いのようにアポロを蝕む。"
translation = "아폴로는 레티시아의 공격이 직격하지 않도록 받아내고 있지만, 도에 깃든 자염이 옮겨붙어 저주처럼 아폴로를 좀먹는다."

[[dialogue]]
speaker = "unk"
original = "炎は着実に体力を削り、アポロの小さな体にダメージを与え続けていた。"
translation = "불꽃은 착실히 체력을 깎으며, 아폴로의 작은 몸에 대미지를 입히고 있었다."

[[dialogue]]
speaker = "レティシア"
original = "「アルタイルは敵だけど、ベアトにとってあなたはお友達？」"
translation = "「알타이르는 적이지만, 베아토에게 당신은 친구니?」"

[[dialogue]]
speaker = "レティシア"
original = "「だったらベアトの前で傷つけたくないわね。おとなしく退いてくれないかしら？」"
translation = "「그렇다면 베아토 앞에서 상처 입히고 싶지 않네. 얌전히 물러나 주지 않을래?」"

[[dialogue]]
speaker = "アポロ"
original = "「そしたら神殿が破壊されるだろうが！」"
translation = "「그러면 신전이 파괴될 거 아냐!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「待って、レティシアちゃん！\u3000私の話を聞いて！」"
translation = "「기다려, 레티시아짱! 내 이야기를 들어줘!」"

[[dialogue]]
speaker = "レティシア"
original = "「今はベアトの話を聞く気はないと、さっきも言ったはずよ。また後で──デネブに戻ってからゆっくりと聞かせてちょうだい？」"
translation = "「지금은 베아토의 이야기를 들을 생각이 없다고 아까도 말했을 텐데. 나중에── 데네브로 돌아가서 천천히 들려주겠니?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「それでも、私は何度でも話すよ！\u3000レティシアちゃんが信じてくれるまで！」"
translation = "「그래도 나는 몇 번이고 말할 거야! 레티시아짱이 믿어줄 때까지!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「それにレティシアちゃんには、特に聞いてほしいことがあるの……！」"
translation = "「게다가 레티시아짱에게는 특히 들어줬으면 하는 게 있어……!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「創造神『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』は時代を超えて三界に影響を与えていた……！」"
translation = "「창조신 『<ruby>XELOS<rt>제로스</rt></ruby>』는 시대를 초월해 삼계에 영향을 주고 있었어……!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「３０００年前にバジュラ教団が信仰していたチャカパラ神だけじゃない」"
translation = "「3000년 전에 바주라 교단이 신봉했던 차카파라 신뿐만이 아니야.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「魔界の辺境で信じられていたペンテラ様……天界の記録にあったジャミール神……いろんな名前を持ってて……！」"
translation = "「마계 변방에서 믿어지던 펜테라 님…… 천계 기록에 있던 자밀 신…… 여러 이름을 가지고서……!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「その教えは、リクリエを『天啓』と呼び、女神テルルと異なる神の降臨を<ruby>言祝<rt>ことほ</rt></ruby>ぐこと──！」"
translation = "「그 가르침은 리크리에를 『천계』라 부르며, 여신 테루루와 다른 신의 강림을 축복하는 것──!」"

[[dialogue]]
speaker = "レティシア"
original = "「あら。ずいぶんと懐かしい話題ね」"
translation = "「어머. 상당히 그리운 화제네.」"

[[dialogue]]
speaker = "アポロ"
original = "「懐かしいって……お前ら、いったい何の話をしてるんだ！？」"
translation = "「그립다니…… 너희들, 대체 무슨 소리를 하는 거야!?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「えっと、それは……」"
translation = "「그게, 그건……」"

[[dialogue]]
speaker = "レティシア"
original = "「別に隠す必要はないわ。私はそういう教団で生まれ育った信者だったというだけ。ルヴィやベアトたちに会うまで、ずっとね」"
translation = "「딱히 숨길 필요는 없어. 나는 그런 교단에서 나고 자란 신자였을 뿐이야. 루비나 베아토 일행을 만나기 전까지는 계속 말이지.」"

[[dialogue]]
speaker = "アポロ"
original = "「……何だって！？」"
translation = "「……뭐라고!?」"

[[dialogue]]
speaker = "アポロ"
original = "（リクリエを信仰し、星騎士と対立する教団……！）"
translation = "(리크리에를 신봉하며 성기사와 대립하는 교단……!)"

[[dialogue]]
speaker = "アポロ"
original = "（リクリエはあたしみたいな使徒を作るだけじゃなくて、他のところでもヒトの人生をめちゃくちゃにしているんだな……）"
translation = "(리크리에는 나 같은 사도를 만들 뿐만 아니라, 다른 곳에서도 인간의 인생을 엉망진창으로 만들고 있구나……)"

[[dialogue]]
speaker = "アポロ"
original = "（星見家メイド隊のナミエルも、元はフィオナを暗殺しようとしていた暗殺者だったって聞いたな……）"
translation = "(호시미 가문 메이드대의 나미엘도, 원래는 피오나를 암살하려던 암살자였다고 들었지……)"

[[dialogue]]
speaker = "アポロ"
original = "（ナミエルを送り込んだのも、もしかすると同じような教団の連中だったのかもしれない）"
translation = "(나미엘을 보낸 것도 어쩌면 비슷한 교단 녀석들이었을지도 몰라.)"

[[dialogue]]
speaker = "ベアトリス"
original = "「レティシアちゃんがいた教団にも、きっと『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』が関係してる……！」"
translation = "「레티시아짱이 있던 교단에도 분명 『<ruby>XELOS<rt>제로스</rt></ruby>』가 관계되어 있어……!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「存在しない神様を信じる、怖い人達だと思ってたけど……そうじゃないの！\u3000『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』は本当に、私たちの世界に……『いる』の！」"
translation = "「존재하지 않는 신을 믿는 무서운 사람들이라고 생각했지만…… 그렇지 않아! 『<ruby>XELOS<rt>제로스</rt></ruby>』는 정말로 우리 세계에…… 『있어』!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「だから一緒に戦おう！？\u3000ルヴィに本当のことを聞いて、一緒に……！」"
translation = "「그러니까 같이 싸우자!? 루비에게 진실을 듣고, 같이……!」"

[[dialogue]]
speaker = "レティシア"
original = "「それはできないわ」"
translation = "「그건 할 수 없어.」"

[[dialogue]]
speaker = "アポロ"
original = "「オマエ、どうしてっ……教団でひどい目に遭ったんじゃないのか！？」"
translation = "「너, 어째서…… 교단에서 끔찍한 일을 당한 거 아니었냐!?」"

[[dialogue]]
speaker = "レティシア"
original = "「それはそれ。これはこれ。今の状況にまったく関係のない話だわ」"
translation = "「그건 그거. 이건 이거. 지금 상황과는 전혀 상관없는 이야기야.」"

[[dialogue]]
speaker = "レティシア"
original = "「ベアト。あなたが頑固なこと、私はよく知っている。だから逆もまた然りだとは思わない？」"
translation = "「베아토. 네가 고집불통이라는 건 내가 잘 알고 있어. 그러니 반대도 마찬가지라고 생각하지 않니?」"

[[dialogue]]
speaker = "レティシア"
original = "「私がどういう性格なのか──知らないわけじゃないでしょう？」"
translation = "「내가 어떤 성격인지── 모르는 건 아닐 텐데?」"

[[dialogue]]
speaker = "レティシア"
original = "「私が敵地で、敵かもしれないヒトの言葉を聞いて……ルヴィからの指令を反故にすると思うのかしら？」"
translation = "「내가 적지에서, 적일지도 모르는 사람의 말을 듣고…… 루비의 지령을 어길 거라고 생각하는 거니?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「……っ！」"
translation = "「……윽!」"

[[dialogue]]
speaker = "レティシア"
original = "「ごめんなさいね。どれだけ言葉を積もらせても、今はあなたのことを信じてあげられない」"
translation = "「미안해. 아무리 말을 쌓아 올려도, 지금은 너를 믿어줄 수 없어.」"

[[dialogue]]
speaker = "レティシア"
original = "「私を止めたいなら、言葉での説得はやめなさい。そんなもので私は止まったりしない」"
translation = "「나를 멈추고 싶다면 말로 설득하는 건 그만두렴. 그런 걸로 나는 멈추지 않으니까.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「レティシアちゃん、そんな……」"
translation = "「레티시아짱, 그런……」"

[[dialogue]]
speaker = "アポロ"
original = "「どうして聞く耳を持たないんだ……！？\u3000ベアトは、オマエと戦いたくないから、こうして……！」"
translation = "「어째서 들으려 하지 않는 거야……!? 베아토는 너랑 싸우고 싶지 않으니까 이렇게……!」"

[[dialogue]]
speaker = "レティシア"
original = "「言葉だけで相手が止まると本気で思っているのなら、それは覚悟が足りないと言うしかないわね」"
translation = "「말뿐으로 상대가 멈출 거라고 진심으로 생각한다면, 그건 각오가 부족하다고 할 수밖에 없겠네.」"

[[dialogue]]
speaker = "レティシア"
original = "「敵対すると決めたのなら、相手を殺すことも視野に入れなさい。私はルヴィが所有する中でも最強の戦力──そう自負しているわ」"
translation = "「적대하기로 마음먹었다면 상대를 죽이는 것도 시야에 넣으렴. 나는 루비가 소유한 중에서도 최강의 전력── 그렇게 자부하고 있어.」"

[[dialogue]]
speaker = "レティシア"
original = "「デネブの救世主の<ruby>懐刀<rt>ふところがたな</rt></ruby>が、たやすい説得で矛を収めたりはしないの。残念だけど」"
translation = "「데네브 구세주의 <ruby>심복<rt>품 안의 칼</rt></ruby>이 쉬운 설득에 창을 거두지는 않아. 유감이지만.」"

[[dialogue]]
speaker = "レティシア"
original = "「安心してちょうだい、ベアト。あなたは絶対に殺さない。ルヴィの指令だし、大切な幼なじみだもの」"
translation = "「안심하렴, 베아토. 너는 절대로 죽이지 않아. 루비의 지령이기도 하고, 소중한 소꿉친구니까.」"

[[dialogue]]
speaker = "レティシア"
original = "「でも、そっちの魔王の血を引く子は別ね。邪魔するようなら容赦はしない。死んでもらうわ」"
translation = "「하지만 그쪽의 마왕 피를 이어받은 아이는 별개야. 방해한다면 용서하지 않겠어. 죽어줘야겠어.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「レティシアちゃんっ──！」"
translation = "「레티시아짱──!」"

[[dialogue]]
speaker = "アポロ"
original = "「この分からず屋っ……上等だっ！\u3000かかってこい！！」"
translation = "「이 벽창호가…… 좋다! 덤벼라!!」"

