[[dialogue]]
speaker = "unk"
original = "俺たちは後からやって来たリーリアとシズハに、ダッチのことを説明した。"
translation = "우리는 뒤늦게 온 리리아와 시즈하에게 닷지에 대해 설명했다."

[[dialogue]]
speaker = "リーリア"
original = "「まさか……ＤＩＳＣにメッセージを送ってきたのが、獅子舞さんの弟である別のロストアイテムだなんて！」"
translation = "「설마…… DISC로 메시지를 보낸 게 사자탈 씨의 동생인 다른 로스트 아이템이라니!」"

[[dialogue]]
speaker = "ダッチ"
original = "「ああ、懐かしくも美しい魂の色です。魔弾の魔女、リーリア様。私は今日、貴女に会いにきたのですよ！」"
translation = "「아아, 그립고도 아름다운 영혼의 색입니다. 마탄의 마녀 리리아 님. 저는 오늘 당신을 만나러 온 것이라고요!」"

[[dialogue]]
speaker = "リーリア"
original = "「私に？\u3000一体何の用で……」"
translation = "「저를요? 대체 무슨 용건으로……」"

[[dialogue]]
speaker = "ダッチ"
original = "「兄上が元旦の夜、酔っ払って私に会いに来たのです！\u3000貴女が七彩流羽根突き術・漆ノ型を使ってみせた、とそれはもう上機嫌に語りましてねぇ」"
translation = "「형님이 원단 밤에 취해서 저를 만나러 왔었거든요! 당신이 칠채류 하네츠키술 제7형을 써 보였다고 아주 기분 좋게 떠들어대서 말이죠~」"

[[dialogue]]
speaker = "リーリア"
original = "「上機嫌？\u3000獅子舞さんが……？」"
translation = "「기분 좋게? 사자탈 씨가……?」"

[[dialogue]]
speaker = "獅子舞"
original = "「おい、愚弟！\u3000変なことを言うな！」"
translation = "「어이, 못난 아우! 이상한 소리 하지 마라!」"

[[dialogue]]
speaker = "サーシャ"
original = "「あら～♪\u3000獅子舞さん、実は喜んでいたのね～」"
translation = "「어머~♪ 사자탈 씨, 사실은 기뻐하고 있었구나~」"

[[dialogue]]
speaker = "獅子舞"
original = "「よ、喜んどらんわ！\u3000こいつが勝手に勘違いして、そう言ってるだけだ！」"
translation = "「기, 기뻐하지 않았다! 이놈이 멋대로 착각해서 그렇게 말하는 것뿐이다!」"

[[dialogue]]
speaker = "ダッチ"
original = "「フフフ……！\u3000嬉しそうに兄上が話すのを聞いて、私もリーリア様と羽根突きで遊びたくなった。だから今日、ここにやって来たのです！」"
translation = "「후후후……! 즐겁게 형님이 얘기하는 걸 듣고 저도 리리아 님과 하네츠키로 놀고 싶어졌습니다. 그래서 오늘 여기에 온 거예요!」"

[[dialogue]]
speaker = "ダッチ"
original = "「さあ、勝負しましょう、リーリア様！\u3000私の『晴れ着バニー』に対する欲望と、貴女の晴れ着の力、どちらが強いか、いざ勝負です！！」"
translation = "「자, 승부합시다, 리리아 님! 제 『설빔 바니』에 대한 욕망과 당신의 설빔의 힘, 어느 쪽이 강한지 자, 승부입니다!!」"

[[dialogue]]
speaker = "リーリア"
original = "「わかりました。あなたは過去に事件を起こしているロストアイテム……このまま放置するわけにもいきませんから！」"
translation = "「알겠습니다. 당신은 과거에 사건을 일으킨 로스트 아이템…… 이대로 방치할 수도 없으니까요!」"

[[dialogue]]
speaker = "unk"
original = "そうして、ダッチとの羽根突き勝負が始まったのだが――"
translation = "그렇게 닷지와의 하네츠키 승부가 시작되었는데――"

[[dialogue]]
speaker = "ダッチ"
original = "「ほら、また行きますよぉ～！\u3000七彩流羽根突き術・弐ノ型『<ruby>橙<rt>だいだい</rt></ruby>』！」"
translation = "「자, 또 갑니다요~! 칠채류 하네츠키술 제2형 『등』!」"

[[dialogue]]
speaker = "リーリア"
original = "「くっ……！\u3000参ノ型『黄色』！」"
translation = "「큭……! 제3형 『황색』!」"

[[dialogue]]
speaker = "unk"
original = "なんと、ダッチもリーリアと同じ羽根突き術を使ってきた。"
translation = "놀랍게도 닷지도 리리아와 같은 하네츠키술을 사용해 왔다."

[[dialogue]]
speaker = "ダッチ"
original = "「フフフ、驚きましたか？\u3000私も兄上と同じ七彩に連なる者！\u3000ですから、同じ技を使えるのですよ！\u3000<ruby>肆<rt>よん</rt></ruby>ノ型『緑』！」"
translation = "「후후후, 놀라셨나요? 저도 형님과 같은 칠채에 이어진 자! 그러니 같은 기술을 쓸 수 있는 것이지요! 제4형 『녹색』!」"

[[dialogue]]
speaker = "リーリア"
original = "「伍ノ型『青』！」"
translation = "「제5형 『청색』!」"

[[dialogue]]
speaker = "ダッチ"
original = "「さあ、手伝って差し上げますよ！\u3000見せて下さい、リーリア様。貴女が辿り着いた七彩の輝きを！\u3000<ruby>陸<rt>ろく</rt></ruby>ノ型『藍色』！」"
translation = "「자, 도와드리지요! 보여주세요, 리리아 님. 당신이 도달한 칠채의 광채를! 제6형 『남색』!」"

[[dialogue]]
speaker = "リーリア"
original = "「言われずとも……行きます！\u3000<ruby>漆<rt>しち</rt></ruby>ノ型――『紫』！！」"
translation = "「말하지 않아도…… 갑니다! 제7형―― 『자색』!!」"

[[dialogue]]
speaker = "unk"
original = "交互に積み重ねた色が、リーリアの技によって虹色の輝きを放つ。その技に、ダッチは見惚れる。"
translation = "교차하며 쌓아 올린 색이 리리아의 기술에 의해 무지갯빛 광채를 내뿜는다. 그 기술에 닷지는 넋을 잃는다."

[[dialogue]]
speaker = "ダッチ"
original = "「フオオオォォ……！\u3000素晴らしいっ！」"
translation = "「후오오오오……! 훌륭합니다!」"

[[dialogue]]
speaker = "ダッチ"
original = "「これが我らが主の描こうとしていた、尊き『欲望』の色……！」"
translation = "「이것이 우리 주인이 그리려 했던 고귀한 『욕망』의 색……!」"

[[dialogue]]
speaker = "ダッチ"
original = "「ですが……<ruby>私<rt>わたくし</rt></ruby>の欲望は更にその上を行く！」"
translation = "「하지만…… 저의 욕망은 더욱 그 위를 갑니다!」"

[[dialogue]]
speaker = "ダッチ"
original = "「七彩流羽根突き術・<ruby>捌<rt>はち</rt></ruby>ノ型――」"
translation = "「칠채류 하네츠키술 제8형――」"

[[dialogue]]
speaker = "獅子舞"
original = "「なっ……８番目だと！？」"
translation = "「뭐…… 8번째라고!?」"

[[dialogue]]
speaker = "ダッチ"
original = "「――『<ruby>白兎<rt>しろうさぎ</rt></ruby>』ィ！！！」"
translation = "「――『백토』!!!!」"

[[dialogue]]
speaker = "リーリア"
original = "「虹の上をウサギが駆けて……！？」"
translation = "「무지개 위를 토끼가 달려서……!?」"

[[dialogue]]
speaker = "unk"
original = "子ウサギが跳ねるイメージが具現化し、純白の美しい光がぴょんと地面へと落ちて、転がる。"
translation = "새끼 토끼가 뛰는 이미지가 구현화되어 순백의 아름다운 빛이 뿅 하고 지면으로 떨어져 구른다."

[[dialogue]]
speaker = "ダッチ"
original = "「これが我が主の亡き後……まだ見たことがない漆ノ型を返す為に、果てなき『欲望』で作り上げた、私だけの型！！」"
translation = "「이것이 우리 주인이 돌아가신 후…… 아직 본 적 없는 제7형을 받아치기 위해 끝없는 『욕망』으로 만들어낸 저만의 형!!」"

[[dialogue]]
speaker = "獅子舞"
original = "「愚弟、お前という奴は！\u3000なんという狂気的な欲望を……！」"
translation = "「못난 아우, 너라는 녀석은! 이 무슨 광기 어린 욕망을……!」"

[[dialogue]]
speaker = "リーリア"
original = "「悔しいですが……綺麗な色でした。私の負けです……」"
translation = "「분하지만…… 예쁜 색이었어요. 제가 졌습니다……」"

[[dialogue]]
speaker = "ダッチ"
original = "「フオオオォォォッ！！\u3000やりました！\u3000勝ちましたよ、兄上！\u3000念願だった漆ノ型を自身の技で上回った！\u3000私の欲望がまた１つ、磨き上げられました！！」"
translation = "「후오오오오오!! 해냈습니다! 이겼어요, 형님! 염원하던 제7형을 자신의 기술로 능가했다! 제 욕망이 또 하나 연마되었습니다!!」"

[[dialogue]]
speaker = "ダッチ"
original = "「リーリア様を倒した以上、他の方々では私に羽根突きで勝つことはできない！\u3000これで新年を鮮やかに彩る、素敵な晴れ着バニーが拝めますねぇ……！」"
translation = "「리리아 님을 쓰러뜨린 이상 다른 분들로는 저에게 하네츠키로 이길 수 없습니다! 이걸로 새해를 선명하게 수놓을 멋진 설빔 바니를 배알할 수 있겠군요……!」"

[[dialogue]]
speaker = "リーリア"
original = "「――いいえ、まだです。私よりも、晴れ着の力が強い星騎士がいます」"
translation = "「――아니요, 아직이에요. 저보다 설빔의 힘이 강한 성기사가 있어요.」"

[[dialogue]]
speaker = "ダッチ"
original = "「……なんですと？」"
translation = "「……뭐라고요?」"

[[dialogue]]
speaker = "リーリア"
original = "「すみません。後をお願いできますか――サーシャさん」"
translation = "「죄송해요. 뒤를 부탁드려도 될까요―― 사샤 씨.」"

[[dialogue]]
speaker = "サーシャ"
original = "「ええ、任せて。私が先輩として、リーリアちゃんの仇をとるわ」"
translation = "「응, 맡겨줘. 내가 선배로서 리리아짱의 원수를 갚을게.」"

[[dialogue]]
speaker = "ダッチ"
original = "「サーシャ様、まさか貴女が羽根突きで、私に勝つと仰るのですか？」"
translation = "「사샤 님, 설마 당신이 하네츠키로 저에게 이기겠다고 하시는 겁니까?」"

[[dialogue]]
speaker = "サーシャ"
original = "「そうよ。獅子舞さんから晴れ着の力を、リーリアちゃんから羽根突きの技を教わった私が、あなたに勝ってみせる」"
translation = "「그래. 사자탈 씨에게 설빔의 힘을, 리리아짱에게 하네츠키 기술을 배운 내가 당신에게 이겨 보이겠어.」"

[[dialogue]]
speaker = "unk"
original = "サーシャさんは本気の眼差しで、ダッチのことを見据えるのだった。"
translation = "사샤 씨는 진지한 눈빛으로 닷지를 응시했다."

