[[dialogue]]
speaker = "unk"
original = "第８話,ジグの囁き,B"
translation = "제8화, 지그의 속삭임, B"

[[dialogue]]
speaker = "チナ"
original = "「おおおおっ！」"
translation = "「오오오오옷!」"

[[dialogue]]
speaker = "クロト"
original = "「うおおおっ！」"
translation = "「우오오옷!」"

[[dialogue]]
speaker = "unk"
original = "チナの槍と俺の拳が幾度もぶつかり、火花を散らせる。"
translation = "치나의 창과 나의 주먹이 몇 번이고 부딪히며, 불꽃을 튀긴다."

[[dialogue]]
speaker = "unk"
original = "動きを止めようとヴィーナスの鎖がチナを追うが、吹き荒れる嵐が薙ぎ払った。"
translation = "움직임을 멈추기 위해 비너스의 사슬이 치나를 쫓지만, 휘몰아치는 폭풍이 쳐냈다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「ノヴァフォームでもないってのに、相変わらず強いわね……！\u3000ていうか前より強くなってるじゃない！」"
translation = "「노바 폼도 아닌데, 여전히 강하네……! 그보다 전보다 더 강해진 거 아냐!」"

[[dialogue]]
speaker = "チナ"
original = "「アタシは会長から力を<ruby>賜<rt>たまわ</rt></ruby>ったんだ！\u3000当然だろ！」"
translation = "「아타시는 회장님으로부터 힘을 하사다! 당연하잖아!」"

[[dialogue]]
speaker = "チナ"
original = "「だけどそれだけじゃない──」"
translation = "「하지만 그것뿐만이 아니야──」"

[[dialogue]]
speaker = "チナ"
original = "「デネブは一度滅びかけた。アタシらはあの滅びを目に焼き付けた……！」"
translation = "「데네브는 한 번 멸망할 뻔했어. 아타시들은 그 멸망을 눈에 새겼다고……!」"

[[dialogue]]
speaker = "チナ"
original = "「滅びは繰り返させない……！\u3000その覚悟が、アタシらを……極星学園を強くしたんだ！」"
translation = "「멸망은 반복하게 두지 않아……! 그 각오가, 아타시들을…… 극성학원을 강하게 만든 거야!」"

[[dialogue]]
speaker = "unk"
original = "俺たちの戦いによってアルタイルは守られた。"
translation = "우리들의 싸움에 의해 알타이르는 지켜졌다."

[[dialogue]]
speaker = "unk"
original = "流星市国にも被害は出たものの、クラウディアのグレートウォールによって壊滅は免れた。"
translation = "유성시국에도 피해는 났지만, 클라우디아의 그레이트 월 덕분에 괴멸은 면했다."

[[dialogue]]
speaker = "unk"
original = "しかし一歩間違えば世界は滅び、瀬戸際で守れたとしても、流星市国を含め各地は甚大な破壊を受けただろう。"
translation = "하지만 한 발만 잘못 내디뎠어도 세계는 멸망했을 것이고, 간신히 지켜냈다 하더라도 유성시국을 포함해 각지는 막대한 파괴를 입었을 것이다."

[[dialogue]]
speaker = "クロト"
original = "（だがチナの言う通りなら……誰がデネブを守った？）"
translation = "(하지만 치나의 말이 맞다면…… 누가 데네브를 지켰지?)"

[[dialogue]]
speaker = "クロト"
original = "（破滅寸前にまで陥ったはずのデネブが、今も存在しているのはなぜなんだ……？）"
translation = "(파멸 직전까지 몰렸을 데네브가, 지금도 존재하고 있는 건 왜지……?)"

[[dialogue]]
speaker = "チナ"
original = "「デネブはアタシたちが守る！\u3000滅ぶのはオマエたちだ！」"
translation = "「데네브는 아타시들이 지킨다! 멸망하는 건 네놈들이다!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「だけどいいの！？\u3000この前家族を亡くしたって言ってたけど、アルタイルを滅ぼせば、この世界にいるあなたの家族も……！」"
translation = "「하지만 괜찮아!? 요전에 가족을 잃었다고 했잖아, 알타이르를 멸망시키면, 이 세계에 있는 네 가족도……!」"

[[dialogue]]
speaker = "チナ"
original = "「そんなのわかってんだよ！」"
translation = "「그딴 건 알고 있다고!」"

[[dialogue]]
speaker = "チナ"
original = "「でも選んだんだ！\u3000オマエらアルタイルの連中を滅ぼしてでも、デネブを守るって！」"
translation = "「하지만 선택했어! 네놈들 알타이르 녀석들을 멸망시켜서라도, 데네브를 지키겠다고!」"

[[dialogue]]
speaker = "チナ"
original = "「こんなことはうちの生徒たちにやらせられねえ！\u3000だからアタシたち極星星徒会だけでやるんだ！」"
translation = "「이런 일은 우리 학생들에게 시킬 수 없어! 그러니까 아타시들 극성성도회끼리만 하는 거야!」"

[[dialogue]]
speaker = "unk"
original = "小さな体で声を張り上げてチナが叫ぶ。"
translation = "작은 몸으로 목소리를 높여 치나가 외친다."

[[dialogue]]
speaker = "unk"
original = "彼女の覚悟は本物だ。自分の世界を守ろうという想いも。"
translation = "그녀의 각오는 진짜다. 자신의 세계를 지키겠다는 마음도."

[[dialogue]]
speaker = "unk"
original = "ならば俺たちも、己の覚悟を彼女にぶつけなければならない。"
translation = "그렇다면 우리도, 자신의 각오를 그녀에게 부딪혀야만 한다."

[[dialogue]]
speaker = "チナ"
original = "「アルタイルを守るっていうなら、オマエらもデネブを滅ぼす覚悟をしてきたんだろうな？」"
translation = "「알타이르를 지키겠다면, 네놈들도 데네브를 멸망시킬 각오를 하고 왔겠지?」"

[[dialogue]]
speaker = "クロト"
original = "「いいや、俺たちが選んだ道は違う」"
translation = "「아니, 우리가 선택한 길은 달라.」"

[[dialogue]]
speaker = "チナ"
original = "「は？」"
translation = "「하?」"

[[dialogue]]
speaker = "クロト"
original = "「アルタイルは守る。だけどデネブとは戦わない」"
translation = "「알타이르는 지킨다. 하지만 데네브와는 싸우지 않아.」"

[[dialogue]]
speaker = "クロト"
original = "「アルタイルやデネブを脅かすのがリクリエであるというのなら、デネブとともにリクリエと戦う」"
translation = "「알타이르나 데네브를 위협하는 것이 리크리에라면, 데네브와 함께 리크리에와 싸우겠어.」"

[[dialogue]]
speaker = "クロト"
original = "「極星学園とも協力したい。デネブに行って、君たちの星徒会長と話がしたいんだ」"
translation = "「극성학원과도 협력하고 싶어. 데네브에 가서, 너희 성도회장과 이야기하고 싶다.」"

[[dialogue]]
speaker = "クロト"
original = "「だから君にも力を貸してほしい！」"
translation = "「그러니까 너도 힘을 보태줬으면 해!」"

[[dialogue]]
speaker = "チナ"
original = "「な──！？」"
translation = "「뭐──!?」"

[[dialogue]]
speaker = "unk"
original = "チナが驚愕に目を見開く。"
translation = "치나가 경악하며 눈을 크게 뜬다."

[[dialogue]]
speaker = "unk"
original = "怒りでもなく、覚悟でもなく、俺の返答の不可解さに忘我していた。"
translation = "분노도 아니고, 각오도 아닌, 내 답변의 불가해함에 넋을 잃고 있었다."

[[dialogue]]
speaker = "チナ"
original = "「そんな都合のいい選択がありえるか！\u3000オマエがデネブのことを勝手に決めるな！」"
translation = "「그런 형편 좋은 선택이 있을 리가 없잖아! 네놈이 데네브의 일을 멋대로 결정하지 마!」"

[[dialogue]]
speaker = "チナ"
original = "「覚悟のないやつに、世界を守る資格はない！\u3000オマエらがそこまでバカなら、容赦なくアルタイルを滅ぼす！」"
translation = "「각오가 없는 녀석에게, 세계를 지킬 자격은 없어! 네놈들이 그 정도로 바보라면, 가차 없이 알타이르를 멸망시켜 주마!」"

[[dialogue]]
speaker = "クロト"
original = "「いいや、滅ぼさせはしない！\u3000アルタイルも、デネブも！」"
translation = "「아니, 멸망시키게 두지 않아! 알타이르도, 데네브도!」"

[[dialogue]]
speaker = "チナ"
original = "「ふざけるなーーッ！！」"
translation = "「웃기지 마아아──!!」"

[[dialogue]]
speaker = "unk"
original = "俺とチナの攻撃が、そして意志がぶつかり合う。"
translation = "나와 치나의 공격이, 그리고 의지가 충돌한다."

[[dialogue]]
speaker = "unk"
original = "チナは、アルタイルを滅ぼすという咎を負ってでも、自分の世界を守ると決めた。"
translation = "치나는, 알타이르를 멸망시킨다는 죄를 짊어지고서라도, 자신의 세계를 지키기로 결심했다."

[[dialogue]]
speaker = "unk"
original = "俺は、アルタイルを危険に晒してでも、両方の世界を救う道を探すと決めた。"
translation = "나는, 알타이르를 위험에 빠뜨려서라도, 양쪽 세계를 구하는 길을 찾기로 결심했다."

[[dialogue]]
speaker = "unk"
original = "これは覚悟の戦いだ。"
translation = "이것은 각오의 싸움이다."

[[dialogue]]
speaker = "クロト"
original = "「アビスインパクト！！」"
translation = "「어비스 임팩트!!」"

[[dialogue]]
speaker = "チナ"
original = "「ぐあっ……！？」"
translation = "「구악……!?」"

[[dialogue]]
speaker = "unk"
original = "俺の拳撃が闇色の衝撃波となってチナを捉えた。"
translation = "나의 권격이 어둠색 충격파가 되어 치나를 덮쳤다."

[[dialogue]]
speaker = "unk"
original = "続けて攻撃を──"
translation = "이어서 공격을──"

[[dialogue]]
speaker = "チナ"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "クロト"
original = "「──！？」"
translation = "「──!?」"

[[dialogue]]
speaker = "クロト"
original = "（今、笑った……？\u3000何だ、この違和感は……？）"
translation = "(방금, 웃었어……? 뭐지, 이 위화감은……?)"

[[dialogue]]
speaker = "クロト"
original = "（そういえば、さっきまでチナが姿を表さなかったのはなぜだ……？）"
translation = "(그러고 보니, 아까까지 치나가 모습을 드러내지 않았던 건 왜지……?)"

[[dialogue]]
speaker = "クロト"
original = "（やはり何かを企んでいる──！？）"
translation = "(역시 무언가 꾸미고 있는 건가──!?)"

[[dialogue]]
speaker = "チナ"
original = "「どうした魔王！\u3000怖気づいたか！」"
translation = "「왜 그러냐 마왕! 겁이라도 집어먹었냐!」"

[[dialogue]]
speaker = "クロト"
original = "「ぐっ……！」"
translation = "「큭……!」"

[[dialogue]]
speaker = "unk"
original = "クロトとヴィーナスがチナとぶつかる中、ジグと選挙管理委員会は空中で激突を繰り広げていた。"
translation = "쿠로토와 비너스가 치나와 맞붙는 동안, 지그와 선거관리위원회는 공중에서 격돌을 펼치고 있었다."

[[dialogue]]
speaker = "unk"
original = "雷矢が唸りを上げてジグに迫り、大剣がそれを斬り払う。"
translation = "뇌야가 굉음을 내며 지그에게 육박하고, 대검이 그것을 베어 넘긴다."

[[dialogue]]
speaker = "unk"
original = "剣尖が梨緒を狙えば、紙一重で一閃を躱し、掠めた金髪が風に巻かれて飛んでいった。"
translation = "검끝이 리오를 노리자, 간발의 차로 일섬을 피했고, 스쳐 지나간 금발이 바람에 휘날려 날아갔다."

[[dialogue]]
speaker = "unk"
original = "さらに──"
translation = "거기에──"

[[dialogue]]
speaker = "ベアトリス"
original = "「そこですっ！」"
translation = "「거기에요!」"

[[dialogue]]
speaker = "unk"
original = "ベアトリスの槍が伸びて、切っ先がジグを狙う。"
translation = "베아트리스의 창이 뻗어 나와, 끝부분이 지그를 노린다."

[[dialogue]]
speaker = "unk"
original = "当然のように大剣が槍を弾くが──"
translation = "당연하다는 듯 대검이 창을 튕겨내지만──"

[[dialogue]]
speaker = "ナターシャ"
original = "「──」"
translation = "「──」"

[[dialogue]]
speaker = "unk"
original = "そこにナターシャの追撃と梨緒の矢が飛んできて、ジグは咄嗟に後ろに飛び退いた。"
translation = "그곳에 나타샤의 추격과 리오의 화살이 날아왔고, 지그는 황급히 뒤로 뛰어올랐다."

[[dialogue]]
speaker = "ジグ"
original = "「この前より連携が良くなっているね。仲良くなったみたいだ」"
translation = "「요전보다 연계가 좋아졌네. 사이가 좋아진 모양이야.」"

[[dialogue]]
speaker = "梨緒"
original = "「リクリエによってベガは滅びた。それを理解しながら、どうして君がリクリエに与する……！？」"
translation = "「리크리에에 의해 베가는 멸망했다. 그걸 이해하고 있으면서, 어째서 네가 리크리에에 가담하는 거지……!?」"

[[dialogue]]
speaker = "ジグ"
original = "「言っただろう、私は“真なる神の騎士”だと。神が望むなら従うまでさ」"
translation = "「말했잖아, 나는 “진정한 신의 기사”라고. 신이 원하신다면 따를 뿐이야.」"

[[dialogue]]
speaker = "ジグ"
original = "「私には君の方が理解できないよ。なぜ自分の世界が滅びたのに、まだ抗おうとするんだい？」"
translation = "「나로서는 네 쪽이 더 이해가 안 가네. 왜 자신의 세계가 멸망했는데도, 아직 저항하려 하는 거지?」"

[[dialogue]]
speaker = "ジグ"
original = "「君には守るものなんてもうないだろう？」"
translation = "「너에겐 지킬 것 따위 이제 없잖아?」"

[[dialogue]]
speaker = "ジグ"
original = "「犠牲が出たことは真摯に受け止めよう。だけど嘆いてばかりではいけない。私たちにはまだ守るものがあるんだから」"
translation = "「희생이 나온 것은 진지하게 받아들이자. 하지만 한탄만 하고 있어서는 안 돼. 우리에겐 아직 지킬 것이 있으니까.」"

[[dialogue]]
speaker = "梨緒"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker = "unk"
original = "ジグは同じ口で、同じ声で、かつてと正反対の言葉を口にする。"
translation = "지그는 같은 입으로, 같은 목소리로, 과거와 정반대의 말을 내뱉는다."

[[dialogue]]
speaker = "梨緒"
original = "（リクリエの使徒は洗脳状態にある。今のジグの言葉を真に受ける必要はない……！）"
translation = "(리크리에의 사도는 세뇌 상태에 있다. 지금 지그의 말을 곧이곧대로 들을 필요는 없어……!)"

[[dialogue]]
speaker = "unk"
original = "梨緒は自分にそう言い聞かせるが、表情の陰りは隠せない。"
translation = "리오는 스스로에게 그렇게 되뇌지만, 표정의 그늘은 숨길 수 없다."

[[dialogue]]
speaker = "unk"
original = "ジグの言葉はガラスの破片のように小さな刃となって、梨緒の心の柔らかい部分に突き刺さる。"
translation = "지그의 말은 유리 파편처럼 작은 칼날이 되어, 리오의 마음속 연약한 부분에 박힌다."

[[dialogue]]
speaker = "梨緒"
original = "「確かに私の世界は滅びた。だからこそ、滅びは繰り返させない」"
translation = "「확실히 나의 세계는 멸망했다. 그렇기에, 멸망은 반복하게 두지 않아.」"

[[dialogue]]
speaker = "梨緒"
original = "「私は今度こそ世界を救う！」"
translation = "「나는 이번에야말로 세계를 구하겠어!」"

[[dialogue]]
speaker = "ジグ"
original = "「救う……ねぇ」"
translation = "「구한다……라.」"

[[dialogue]]
speaker = "ジグ"
original = "「リクリエを退けることが救いだとは思わないけど、君たちの言葉を借りてあえて言おう」"
translation = "「리크리에를 물리치는 것이 구원이라고 생각하지는 않지만, 너희의 말을 빌려 굳이 말해주지.」"

[[dialogue]]
speaker = "ジグ"
original = "「世界を救うなんて君たちにはできないよ」"
translation = "「세계를 구하는 것 따위 너희에겐 불가능해.」"

[[dialogue]]
speaker = "ジグ"
original = "「可能性は──ない」"
translation = "「가능성은── 없어.」"

[[dialogue]]
speaker = "ジグ"
original = "「可能性は残されている。私はそう思うよ」"
translation = "「가능성은 남아 있어. 나는 그렇게 생각해.」"

[[dialogue]]
speaker = "梨緒"
original = "（違う、違う、違う……！\u3000今のジグは、私の知っているジグとは違うんだ……！）"
translation = "(아니야, 아니야, 아니야……! 지금의 지그는, 내가 아는 지그와는 달라……!)"

[[dialogue]]
speaker = "梨緒"
original = "（今のジグは正気じゃない。だから目を覚まさせてやらなければ……）"
translation = "(지금의 지그는 제정신이 아니야. 그러니까 정신을 차리게 해줘야 해……)"

[[dialogue]]
speaker = "梨緒"
original = "（それとも君は、あの時からそう思っていたのか……？）"
translation = "(아니면 너는, 그때부터 그렇게 생각하고 있었던 건가……?)"

[[dialogue]]
speaker = "ベアトリス"
original = "「梨緒ちゃん！」"
translation = "「리오 짱!」"

[[dialogue]]
speaker = "梨緒"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker = "ナターシャ"
original = "「よりにもよって、リクリエの使徒の前でぼうっとしないでよね」"
translation = "「하필이면 리크리에의 사도 앞에서 멍하니 있지 말라고.」"

[[dialogue]]
speaker = "梨緒"
original = "「すまない……戦闘に集中する」"
translation = "「미안하다…… 전투에 집중하겠어.」"

[[dialogue]]
speaker = "unk"
original = "梨緒は迷いを振り切るように頭を横に振り、ジグに向き直る。"
translation = "리오는 망설임을 떨쳐내듯 머리를 가로저으며, 지그를 다시 마주 본다."

[[dialogue]]
speaker = "unk"
original = "そこでジグは軽く首を傾げた。"
translation = "그러자 지그는 가볍게 고개를 갸웃거렸다."

[[dialogue]]
speaker = "ジグ"
original = "「しかし不思議だ。君がベガから来たというなら、どうやってこのアルタイルにやってきたんだろうね？」"
translation = "「하지만 이상하네. 네가 베가에서 왔다면, 어떻게 이 알타이르에 오게 된 걸까?」"

[[dialogue]]
speaker = "梨緒"
original = "「それは君も同じだ！\u3000君もベガから来たんだろう！」"
translation = "「그건 너도 마찬가지다! 너도 베가에서 왔잖아!」"

[[dialogue]]
speaker = "ジグ"
original = "「私は“真なる神”の加護を受けているからね。平行世界の<ruby>軛<rt>くびき</rt></ruby>は受けない」"
translation = "「나는 “진정한 신”의 가호를 받고 있으니까. 평행세계의 굴레는 받지 않아.」"

[[dialogue]]
speaker = "ジグ"
original = "「だけど私のように“神”の加護を受けているわけでもく、魔王でもない」"
translation = "「하지만 나처럼 “신”의 가호를 받고 있는 것도 아니고, 마왕도 아니지.」"

[[dialogue]]
speaker = "ジグ"
original = "「つまり君はただの異物。この世界に紛れ込んだ死にぞこないだ」"
translation = "「즉 너는 그저 이물질. 이 세계에 굴러 들어온 죽다 만 놈이야.」"

[[dialogue]]
speaker = "梨緒"
original = "「──ッ！」"
translation = "「──윽!」"

[[dialogue]]
speaker = "ジグ"
original = "「君が突っかかってくるから相手をしてあげていたけど、そろそろ言ってあげようかな」"
translation = "「네가 덤벼드니까 상대해 주고 있었지만, 슬슬 말해줄 때가 된 것 같네.」"

[[dialogue]]
speaker = "unk"
original = "ジグが後方に星力を収束させ、弾丸のように梨緒に迫る。"
translation = "지그가 후방에 성력을 수렴시키고, 탄환처럼 리오에게 육박한다."

[[dialogue]]
speaker = "ジグ"
original = "「君は──」"
translation = "「너는──」"

[[dialogue]]
speaker = "ジグ"
original = "「弱い」"
translation = "「약해.」"

[[dialogue]]
speaker = "梨緒"
original = "「くああああっ──！！」"
translation = "「구아아아악──!!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「梨緒ちゃんっ！？」"
translation = "「리오 짱!?」"

