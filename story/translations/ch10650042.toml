[[dialogue]]
speaker = "unk"
original = "第２話,イレーナと教皇庁,P"
translation = "제2화, 이레이나와 교황청, P"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "子猫"
speaker_translation = "아기 고양이"
original = "「み～……」"
translation = "「먀~……」"

[[dialogue]]
speaker = "unk"
original = "教皇庁の建物の前で、子猫とにらみ合うイレーナ。"
translation = "교황청 건물 앞에서 새끼고양이와 대치 중인 이레이나."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「そ～っと……」"
translation = "「살금살금……」"

[[dialogue]]
speaker_original = "子猫"
speaker_translation = "아기 고양이"
original = "「みっ」"
translation = "「먀!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ひゃっ！？」"
translation = "「히익!?」"

[[dialogue]]
speaker = "unk"
original = "イレーナが子猫に触れようと手を伸ばしたが、猫パンチで反撃されてしまった。"
translation = "이레이나가 새끼고양이를 만지려 손을 뻗었지만, 냥펀치로 반격당하고 말았다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「──っ！\u3000ど、どなたかいるのですかっ！？」"
translation = "「──윽! 누, 누군가 계신 건가요!?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「なんだあんたか……──って、今の見てた！？」"
translation = "「뭐야 너였냐…… ──가 아니라, 지금 거 봤어!?」"

[[dialogue]]
speaker = "unk"
original = "バッチリ見てた"
translation = "아주 잘 봤어"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「そこは気を利かせて見てないふりしなさいよ！」"
translation = "「그럴 땐 센스 있게 못 본 척하란 말이야!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ああ、この猫？\u3000野良猫だったんだけど、教皇庁で保護して世話することになったの」"
translation = "「아아, 이 고양이? 길고양이었는데 교황청에서 보호해서 돌보기로 했어」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「そりゃあ私も鬼じゃないから、人並に動物をかわいいと思うこともあるわよ。だけど触ろうとすると、今みたいにいつも拒否られるのよね」"
translation = "「나라고 귀신은 아니니까 남들만큼 동물 보고 귀엽다고 생각할 때도 있다구. 하지만 만지려고 하면 지금처럼 매번 거부당한단 말이지」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「……外面を取り繕わずに自分をさらけ出せば、相手も心を開いてくれる？\u3000そ、そうね。やってみるわ」"
translation = "「……내숭 떨지 말고 자신을 그대로 드러내면 상대도 마음을 열어줄 거라구? 그, 그래. 해볼게」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あんた、いい毛並みしてるじゃない。ちょっと触らせなさいよ」"
translation = "「너, 털 결이 좋잖아. 조금 만져보게 해줘」"

[[dialogue]]
speaker_original = "子猫"
speaker_translation = "아기 고양이"
original = "「フシャーッ！」"
translation = "「하악!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「全然ダメじゃない！！」"
translation = "「전혀 안 되잖아!!」"

[[dialogue]]
speaker_original = "子猫"
speaker_translation = "아기 고양이"
original = "「み～」"
translation = "「먀~」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あ、教皇庁の建物に入っちゃった……」"
translation = "「아, 교황청 건물 안으로 들어가 버렸어……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ちょっと！\u3000あんたのせいで触れなかったじゃない！\u3000うぅ～……次こそはナデナデしてやるんだから～っ」"
translation = "「야! 너 때문에 못 만졌잖아! 으으으~…… 다음번엔 꼭 쓰다듬어주고 말 거라구~!」"

[[dialogue]]
speaker = "unk"
original = "子猫に逃げられてしまい、悔しそうに唸るイレーナ。"
translation = "새끼고양이를 놓치고 말아 분한 듯이 으르렁거리는 이레이나."

[[dialogue]]
speaker = "unk"
original = "だけどその表情が、少し陰のあるものに変わる。"
translation = "하지만 그 표정이 조금 어두운 것으로 변한다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「…………はぁ」"
translation = "「…………하아」"

[[dialogue]]
speaker = "unk"
original = "何かあった？"
translation = "무슨 일 있어?"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「何かあったわけじゃないけど……最近思うのよ。教皇庁や流星市国とは、あとどれだけの付き合いになるのかなって」"
translation = "「무슨 일이 있는 건 아니지만…… 요즘 생각하게 돼. 교황청이나 유성시국과는 앞으로 얼마나 더 함께하게 될까 하고」"

[[dialogue]]
speaker = "unk"
original = "イタリアに帰るの？"
translation = "이탈리아로 돌아가는 거야?"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「それは考えてるところなんだけど──」"
translation = "「그건 생각 중인데──」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「イレーナさん、イタリアに帰られるんですかっ！？」"
translation = "「이레이나 씨, 이탈리아로 돌아가시는 건가요!?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「フィ、フィオナ会長！？\u3000聞かれていたんですか！？」"
translation = "「피, 피오나 회장님!? 듣고 계셨나요!?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「すみません。この子を探しに来たら、話が聞こえてきたもので……」"
translation = "「죄송합니다. 이 아이를 찾으러 왔다가 이야기가 들려와서……」"

[[dialogue]]
speaker_original = "子猫"
speaker_translation = "아기 고양이"
original = "「み～」"
translation = "「먀~」"

[[dialogue]]
speaker = "unk"
original = "フィオナの腕の中で、さっき逃げていった子猫が機嫌良さそうに鳴いた。"
translation = "피오나의 품 안에서 아까 도망쳤던 새끼고양이가 기분 좋게 울었다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "（あたしにはあんなに素っ気なかったのに……ちょっと傷つくわ……）"
translation = "(나한테는 그렇게 쌀쌀맞았으면서…… 조금 상처받네……)"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「イレーナさん、先ほどの話は本当なんですか？」"
translation = "「이레이나 씨, 방금 이야기는 정말인가요?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「いえ、帰るとしても今の話ではありません。そもそもまだ決めたわけではありませんし」"
translation = "「아뇨, 돌아간다고 해도 지금 당장 이야기는 아닙니다. 애초에 아직 결정한 것도 아니고요」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ですが将来について考えているのは事実です」"
translation = "「하지만 장래에 대해 생각하고 있는 건 사실입니다」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「フィオナ会長もご存じの通り、私が聖女と呼ばれているのは、星術の癒しの力によるもの。星力を失えばただの人です」"
translation = "「피오나 회장님도 아시다시피 제가 성녀라고 불리는 건 성술의 치유 능력 덕분. 성력을 잃으면 그냥 평범한 사람이에요」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「聖女でなくなれば、故郷に帰るのも自然なことかと」"
translation = "「성녀가 아니게 된다면 고향으로 돌아가는 것도 자연스러운 일이 아닐까 싶어서요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「それはもったいないです！」"
translation = "「그건 너무 아깝습니다!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「えっ？」"
translation = "「엣?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「イレーナさんは、星騎士として活躍し、聖女として慕われているのみならず、神官としての優秀さは教皇庁でも評判になっています」"
translation = "「이레이나 씨는 성기사로서 활약하고 성녀로서 존경받을 뿐만 아니라, 신관으로서의 우수함은 교황청에서도 정평이 나 있습니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「イレーナさんの説教はわかりやすくて心に響くと人気ですし、書類仕事も早くて正確だと聞いています」"
translation = "「이레이나 씨의 설교는 알기 쉽고 가슴에 와닿는다고 인기이고, 서류 작업도 빠르고 정확하다고 들었습니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「私は流星教皇の娘。いずれ流星教皇となる可能性が高いです」"
translation = "「저는 유성 교황의 딸. 머지않아 유성 교황이 될 가능성이 큽니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「その時、イレーナさんのような神官が教皇庁にいれば心強いと思っていたのですが……」"
translation = "「그때 이레이나 씨 같은 신관이 교황청에 있으면 든든할 거라고 생각했습니다만……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「そこまで私のことを評価されていたんですね……」"
translation = "「절 그 정도로 평가하고 계셨군요……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はい。将来の幹部になるやもと、そう考えていました」"
translation = "「네. 장래의 간부가 될 분이라 그렇게 생각하고 있었습니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「よければ流星市国に残っていただいて、ともに信仰に寄り添っていければと思っています」"
translation = "「괜찮다면 유성시국에 남아 주셔서 함께 신앙에 의지하며 나아갔으면 합니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「将来の話なのでまだ先のことですが、考えておいていただけると嬉しいです」"
translation = "「먼 훗날의 이야기니 아직 이르지만, 생각해주시면 기쁘겠습니다」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「は、はい……」"
translation = "「네, 네……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「それでは私はこれで。この子は私が連れていきますね」"
translation = "「그럼 저는 이만. 이 아이는 제가 데려갈게요」"

[[dialogue]]
speaker_original = "子猫"
speaker_translation = "아기 고양이"
original = "「み～♪」"
translation = "「먀~♪」"

[[dialogue]]
speaker = "unk"
original = "子猫を抱いて、フィオナが教皇庁の建物に戻っていく。"
translation = "새끼고양이를 안고 피오나가 교황청 건물로 돌아간다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あ……結局あの子に触れずじまいだったわね……」"
translation = "「아…… 결국 저 애를 못 만져보고 말았네……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「それに危うく本性がバレるところだったわ……油断大敵ね」"
translation = "「게다가 하마터면 본성이 들통날 뻔했어…… 방심은 금물이네」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「でもどうしようかしら。まさか次期教皇から直々に引き留められるとは思わなかったわ」"
translation = "「하지만 어떡하지. 설마 차기 교황으로부터 직접 만류당할 줄은 몰랐어」"

[[dialogue]]
speaker = "unk"
original = "イレーナなら言われると思ってた"
translation = "이레이나라면 그럴 줄 알았어"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「なんであんたが誇らしげなのよ」"
translation = "「왜 네가 자랑스러워하는 건데」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あたしが教皇庁の幹部に……ね。星術が使えなくなったら、あたしなんて何の取り柄もない女じゃない」"
translation = "「내가 교황청의 간부라니……. 성술을 쓸 수 없게 되면 난 아무런 장점도 없는 여자잖아」"

[[dialogue]]
speaker = "unk"
original = "イレーナはそれだけじゃないよ"
translation = "이레이나는 그것뿐만이 아니야"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「そう？\u3000まぁ……そうかもね。あんたが言うなら、ちょっとは自分のこと認めてあげようかしら」"
translation = "「그래? 뭐…… 그럴지도 모르겠네. 네가 그렇게 말한다면 조금은 자신을 인정해 줄까」"

[[dialogue]]
speaker = "unk"
original = "俺と一緒に流星市国に残るのはどう？"
translation = "나랑 같이 유성시국에 남는 건 어때?"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あんたと一緒に……」"
translation = "「너랑 같이……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「……悪くないかもしれないわね」"
translation = "「……나쁘지 않을지도 모르겠네」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「仕事もあるって言ってくれてるんだし、あたしもこっちの生活に慣れてるし……イメージできる気がする」"
translation = "「일도 있다고 해줬고, 나도 이쪽 생활에 익숙해졌으니까…… 그려지는 것 같아」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ちなみにあたしがイタリアに帰りたいって言ったら、あんたはついてくる？」"
translation = "「참고로 내가 이탈리아로 돌아가고 싶다고 하면 넌 따라올 거야?」"

[[dialogue]]
speaker = "unk"
original = "もちろんついていくよ"
translation = "물론 따라가야지"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「そう……ありがと」"
translation = "「그래…… 고마워」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「いや別に、将来もあんたと一緒にいると決まったわけじゃないけど。でも可能性としてはありえるし」"
translation = "「아니 딱히 미래에도 너랑 같이 있기로 정한 건 아니지만. 그래도 가능성으로서는 있을 법하고」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「……まぁいいわ。今すぐ決めなきゃいけないことじゃないし、考えとく」"
translation = "「……뭐 됐어. 당장 결정해야 할 일도 아니니까 생각해 둘게」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「だけど──」"
translation = "「하지만──」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「少なくともあの子を撫でるまでは、神官やめるわけにはいかないわ」"
translation = "「적어도 저 녀석을 쓰다듬을 때까지는 신관 그만둘 수 없겠어」"

[[dialogue]]
speaker = "unk"
original = "イレーナは教皇庁の方を見て、ふっと笑うのだった。"
translation = "이레이나는 교황청 쪽을 보며 살짝 미소 짓는 것이었다."

