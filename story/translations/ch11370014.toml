[[dialogue]]
speaker = "unk"
original = "第４話,歌だけじゃなく言葉でも,P"
translation = "제4화, 노래뿐만 아니라 말로도"

[[dialogue]]
speaker = "unk"
original = "その日は休日で、レミカが俺の家に遊びに来ていた。"
translation = "그날은 휴일이라, 레미카가 내 집에 놀러 와 있었다."

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「――会長、今日はね。小さな私とイチャイチャする日だよ」"
translation = "「――회장, 오늘은 말이야. 어린 나와 꽁냥꽁냥하는 날이야」"

[[dialogue]]
speaker = "unk"
original = "どういうこと？"
translation = "무슨 소리야?"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「小さな私と、大きな私。会長はどっちの方が、よりドキドキするのかなって思ってさ。というわけで……よいしょっと」"
translation = "「어린 나와, 커다란 나. 회장은 어느 쪽이 더 두근거리는지 궁금해서 말이지. 그런 고로…… 영차」"

[[dialogue]]
speaker = "unk"
original = "レミカは、ベッドに腰かけている俺の隣へ座ると、猫みたいに体をすり寄せてくる。"
translation = "레미카는 침대에 걸터앉아 있는 내 옆으로 앉더니, 고양이처럼 몸을 비벼온다."

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「どう、会長？\u3000すりすり……」"
translation = "「어때, 회장? 부비부비……」"

[[dialogue]]
speaker = "unk"
original = "俺は彼女の頭に手を伸ばし、優しく撫でた。"
translation = "나는 그녀의 머리에 손을 뻗어, 부드럽게 쓰다듬었다."

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「ん……♪\u3000――体の大きさは関係なく、目の前にいるのが私なら……ちゃんとドキドキする？」"
translation = "「응……♪ ――몸의 크기는 상관없이, 눈앞에 있는 게 나라면…… 제대로 두근거려?」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「ふふっ……本当かな～？」"
translation = "「후훗…… 정말일까~?」"

[[dialogue]]
speaker = "unk"
original = "俺はレミカのことが好きだから"
translation = "나는 레미카를 좋아하니까"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「……！\u3000うん……<emoji=heart04>\u3000顔を見れば、会長が本気かどうか、私にはわかるよ」"
translation = "「……! 응……<emoji=heart04> 얼굴을 보면, 회장이 진심인지 아닌지, 나는 알 수 있어」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「私も……会長のことが好きだから。会長の言葉、信じるよ」"
translation = "「나도…… 회장을 좋아하니까. 회장의 말, 믿을게」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「それに……この小さい体だと、会長がすごく大きく感じられて……ちょっとドキドキするかも……<emoji=heart04>」"
translation = "「게다가…… 이 작은 몸이면, 회장이 굉장히 크게 느껴져서…… 조금 두근거릴지도……<emoji=heart04>」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「ねぇ、会長……キス、してもいい？」"
translation = "「저기, 회장…… 키스, 해도 돼?」"

[[dialogue]]
speaker = "unk"
original = "レミカの照れた表情が可愛くて、俺は言葉を返す代わりに、そっと唇を重ねた。"
translation = "레미카의 수줍어하는 표정이 귀여워서, 나는 대답 대신 살며시 입술을 겹쳤다."

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「あっ……<emoji=heart04>\u3000ん……ちゅ……<emoji=heart04>」"
translation = "「앗……<emoji=heart04> 응…… 츄……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺がどれくらい好きか、伝わった？"
translation = "내가 얼마나 좋아하는지, 전해졌어?"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「はあ……<emoji=heart04>\u3000う、うん……<emoji=heart04>」"
translation = "「하아……<emoji=heart04> 으, 응……<emoji=heart04>」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「ねぇ、会長……今度は、ぎゅって強く抱きしめながら……もう１回、キスしてほしい<emoji=heart04>」"
translation = "「있지, 회장…… 이번에는, 꼬옥 강하게 껴안으면서…… 한 번 더, 키스해 줬으면 좋겠어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はレミカの体をしっかり抱き寄せ、再び唇を重ねる。"
translation = "나는 레미카의 몸을 꽉 끌어당겨, 다시 입술을 겹친다."

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「んっ……<emoji=heart04>\u3000ちゅ<emoji=heart04>\u3000んちゅ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 츄<emoji=heart04> 응츄……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それからしばらく、恋人同士のスキンシップを重ねて――落ち着いた頃に、レミカが口を開いた。"
translation = "그 뒤로 한동안, 연인끼리의 스킨십을 거듭하고── 진정되었을 무렵에, 레미카가 입을 열었다."

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「ねぇ、会長。この前……シャルルさんと会った時のことなんだけど……」"
translation = "「있지, 회장. 요전에…… 샤를 씨랑 만났을 때의 일인데……」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「あの時に言われたこと、ずっと考えててさ。私は、キラキラな笑顔が似合う『可愛いアイドル』になりたいって思ってるけど……」"
translation = "「그때 들었던 말, 계속 생각하고 있었거든. 나는, 반짝반짝한 미소가 어울리는 『귀여운 아이돌』이 되고 싶다고 생각하지만……」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「今、私を応援してくれてるファンの人たちが、どう感じるのかって考えたら……わからなくなっちゃって」"
translation = "「지금, 나를 응원해 주는 팬분들이 어떻게 느낄지 생각하면…… 잘 모르게 되어버려서」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「『可愛いアイドル』は大好きだし、理想も追いかけたい。でも……」"
translation = "「『귀여운 아이돌』은 정말 좋아하고, 이상도 쫓고 싶어. 하지만……」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「今のファンの人たちが好きになってくれている『愛戸レミカ』とは、私の理想像はかけ離れているかもしれないって……」"
translation = "「지금 팬분들이 좋아해 주고 있는 『아이도 레미카』와는, 나의 이상향이 동떨어져 있을지도 모른다고……」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「私、応援してくれる人たちには、笑顔になってほしいって本気で思ってるんだ。だから……」"
translation = "「나, 응원해 주는 사람들에게는 진심으로 웃어줬으면 좋겠다고 생각하고 있어. 그러니까……」"

[[dialogue]]
speaker = "unk"
original = "その気持ちを、直接伝えてみたらどう？"
translation = "그 마음을, 직접 전해보는 건 어때?"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「――ファンの人たちに……動画とかで、もっと自分の気持ちを伝えてみたらどうかって……？」"
translation = "「──팬분들에게…… 영상 같은 걸로, 좀 더 자신의 마음을 전해보는 건 어떠냐고……?」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「歌だけじゃなくて……言葉でも……？」"
translation = "「노래뿐만이 아니라…… 말로도……?」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「たしかに……ちょっと恥ずかしくて、今まで避けてたけど……」"
translation = "「확실히…… 조금 부끄러워서, 지금까지 피해 왔지만……」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「素直に話したら、ファンの人たち、喜んでくれるかな……？」"
translation = "「솔직하게 이야기하면, 팬분들, 기뻐해 줄까……?」"

[[dialogue]]
speaker = "unk"
original = "俺は、迷いなく頷いた。"
translation = "나는 망설임 없이 고개를 끄덕였다."

[[dialogue]]
speaker = "unk"
original = "――だって俺は、夢を追いかけて輝くレミカを好きになったのだから。"
translation = "──그야 나는, 꿈을 쫓으며 빛나는 레미카를 좋아하게 되었으니까."

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「……！\u3000か、会長……<emoji=heart04>」"
translation = "「……! 회, 회장……<emoji=heart04>」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「ありがとう……♪」"
translation = "「고마워……♪」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「え……？\u3000今の笑顔、すごく可愛かった……？」"
translation = "「에……? 방금 미소, 엄청 귀여웠어……?」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「だって……それは、好きな人が応援してくれるから……<emoji=heart04>」"
translation = "「그야…… 그건, 좋아하는 사람이 응원해 주니까……<emoji=heart04>」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「会長……<emoji=heart04>\u3000んっ……ちゅっ<emoji=heart04>」"
translation = "「회장……<emoji=heart04> 응…… 츄<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "後日。"
translation = "며칠 뒤."

[[dialogue]]
speaker = "レミカ"
original = "「えっと……」"
translation = "「에또……」"

[[dialogue]]
speaker = "レミカ"
original = "「そんなわけで……みんなが好きだって言ってくれてる『カッコいいアイドル』と──」"
translation = "「그런 이유로…… 모두가 좋아한다고 말해주는 『멋진 아이돌』과──」"

[[dialogue]]
speaker = "レミカ"
original = "「子供の頃からの夢である『可愛いアイドル』、その両立を目指して、これからも頑張っていきたいと思っていますっ！」"
translation = "「어릴 적부터의 꿈인 『귀여운 아이돌』, 그 양립을 목표로 앞으로도 노력해 나가고 싶다고 생각합니다!」"

[[dialogue]]
speaker = "レミカ"
original = "「なので……よかったら、色々な意見を聞かせてもらえたら嬉しいです……」"
translation = "「그러니…… 괜찮으시다면, 여러 의견을 들려주시면 기쁘겠습니다……」"

[[dialogue]]
speaker = "レミカ"
original = "「あと……いつも応援してくれて、ありがとうございますっ」"
translation = "「그리고…… 언제나 응원해 주셔서, 감사합니다」"

[[dialogue]]
speaker = "レミカ"
original = "「自分の歌を褒めてもらえると……その、本当に、すごく嬉しくて……」"
translation = "「자신의 노래를 칭찬받으면…… 그, 정말로, 무척 기뻐서……」"

[[dialogue]]
speaker = "レミカ"
original = "「……す、素直に言うのは、やっぱり恥ずかしいですね……」"
translation = "「……소, 솔직하게 말하는 건 역시 부끄럽네요……」"

[[dialogue]]
speaker = "レミカ"
original = "「コホン……と、とりあえず……これからも、よろしくお願いしますっ！」"
translation = "「에헴…… 아, 아무튼…… 앞으로도 잘 부탁드릴게요!」"

[[dialogue]]
speaker = "unk"
original = "その動画がＳＮＳに投稿されると――"
translation = "그 영상이 SNS에 게시되자――"

[[dialogue]]
speaker = "unk"
original = "『あの愛戸レミカが照れまくってるの、可愛すぎるんだが！？』というコメントが溢れかえり、大きな話題になるのであった。"
translation = "『그 아이도 레미카가 엄청 수줍어하는 거, 너무 귀여운 거 아냐!?』라는 댓글이 쏟아지며 커다란 화제가 되었다."

