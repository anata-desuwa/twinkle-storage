[[dialogue]]
speaker = "unk"
original = "第２話,クルセイダースの後継者,P"
translation = "제2화, 크루세이더스의 후예"

[[dialogue]]
speaker = "unk"
original = "日課をこなす為にトレーニング施設へ行くと、先客でヨミとヴィーナスの姿があった。"
translation = "일과를 소화하기 위해 트레이닝 시설에 가니 먼저 온 요미와 비너스의 모습이 있었다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ナイスコンビネーションだったわよ、ヨミヨミ～♪」"
translation = "「나이스 콤비네이션이었어, 요미요미~♪」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「お嬢様、どさくさに紛れて尻尾モフらないで下さい！」"
translation = "「아가씨, 틈을 타서 꼬리 만지지 마세요!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「巫女服も可愛くて、尻尾はモフモフで癒されるとか、ヨミヨミ最強ね！」"
translation = "「무녀복도 귀엽고 꼬리는 폭신폭신해서 힐링 된다니, 요미요미 최강이네!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「星騎士として褒めてないですよね！？」"
translation = "「성기사로서 칭찬하는 거 아니죠!?」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナス、俺にもモフらせてくれないか？"
translation = "비너스, 나도 만지게 해주지 않을래?"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「私の尻尾なんですけど！？」"
translation = "「제 꼬리인데요!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロトが男じゃなかったら、許せたんだけどね……」"
translation = "「쿠로토가 남자가 아니었다면 허락했을 텐데 말이야……」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナス、後で女装の仕方を教えて欲しい！"
translation = "비너스, 나중에 여장하는 법 좀 알려줘!"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「女装なんてチャチなこと言ってないで、アニマ先輩から女体化薬を貰えば一発よ！」"
translation = "「여장 같은 시시한 소리 하지 말고 아니마 선배한테 여체화 약을 받으면 한 방이야!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「２人とも尻尾生やす薬をもらえばいいんじゃないですかね！？」"
translation = "「두 분 다 꼬리가 자라나는 약을 받으면 되지 않을까요!?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「……いやもう、何しに来たんですか会長。日課のトレーニングなんじゃないんですか？\u3000……いま思い出したって顔ですね」"
translation = "「……아니 진짜, 뭐 하러 오신 거예요 회장님. 일과인 트레이닝 하러 오신 거 아니에요? ……방금 생각났다는 표정이네요.」"

[[dialogue]]
speaker = "unk"
original = "星騎士姿は巫女（？）っぽいね"
translation = "성기사 모습은 무녀(?) 같네."

[[dialogue]]
speaker = "unk"
original = "ところでヨミヨミはメイドなのに、"
translation = "그나저나 요미요미는 메이드인데,"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふふっ！\u3000巫女っぽいじゃなくて、ヨミヨミは本当に巫女なのよ」"
translation = "「후후! 무녀 같은 게 아니라 요미요미는 정말로 무녀야.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「魔界にあるアマツミカ地方で『天ヶ崎神宮』というところがあるのですが……私はそこの生まれなんです」"
translation = "「마계에 있는 아마츠미카 지방에 『아마가사키 신궁』이라는 곳이 있는데…… 저는 그곳 태생이에요.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「天ヶ崎神宮はなんと、３０００年前からある由緒正しき大神宮なのよ！\u3000ヨミヨミはその一族の巫女というわけね」"
translation = "「아마가사키 신궁은 무려 3000년 전부터 있는 유서 깊은 대신궁이야! 요미요미는 그 일족의 무녀라는 거지.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「初代巫女は、前回のリクリエを鎮めた英雄パーティーの一員であったそうです」"
translation = "「초대 무녀는 지난번 리크리에를 잠재운 영웅 파티의 일원이었다고 합니다.」"

[[dialogue]]
speaker = "unk"
original = "それって、伝説のクルセイダースじゃないか！"
translation = "그거 전설의 크루세이더스잖아!"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「はい。そして、そのクルセイダースが使っていた武器が、私の使っているアーティファクト『破邪の鈴』なのです」"
translation = "「네. 그리고 그 크루세이더스가 사용했던 무기가 제가 사용하고 있는 아티팩트 『파사의 방울』입니다.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ヨミヨミは凄いのよ！\u3000破邪の鈴は、初代巫女以外は３０００年間、誰も契約者と認めて来なかったの。その新たな契約者として、ヨミヨミは唯一選ばれたのよ！」"
translation = "「요미요미는 대단해! 파사의 방울은 초대 무녀 말고는 3000년 동안 아무도 계약자로 인정하지 않았거든. 그 새로운 계약자로 요미요미가 유일하게 선택된 거야!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「天ヶ崎の始祖──初代巫女様は、それはそれは美しい巫女舞を踊られる方だったそうで。その舞に感銘を受けた女神様が、破邪の鈴を授けたと言われています」"
translation = "「아마가사키의 시조── 초대 무녀님은 아주 아름다운 무녀 춤을 추시는 분이었다고 해요. 그 춤에 감명받은 여신님이 파사의 방울을 내렸다고 전해집니다.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「破邪の鈴にはリクリエの瘴気を祓う力が宿っており、契約者の巫女舞が真に完成する時、本当の力を取り戻すのだそうです」"
translation = "「파사의 방울에는 리크리에의 장기를 정화하는 힘이 깃들어 있으며, 계약자의 무녀 춤이 진정으로 완성될 때 진정한 힘을 되찾는다고 합니다.」"

[[dialogue]]
speaker = "unk"
original = "ヨミヨミはクルセイダースの後継者ってことか！"
translation = "요미요미는 크루세이더스의 후계자라는 거구나!"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「巫女舞は爆裂未熟なんですけどね……」"
translation = "「무녀 춤은 폭렬 미숙하지만요……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「とにかく、ヨミヨミは本物の巫女で、かつ本物のメイドっていう、最強の萌え萌えハイブリッドってことよ！\u3000萌え系喫茶の巫女ウェイトレスだって出来るんじゃないかしら？」"
translation = "「아무튼 요미요미는 진짜 무녀이자 진짜 메이드라는 최강의 모에모에 하이브리드라는 거야! 모에 계열 카페의 무녀 웨이트리스도 할 수 있지 않을까?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「も、萌え……？」"
translation = "「모, 모에……?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そうだ、休憩用に持ってきてたティーセットで、さっき緑茶を淹れてくれたじゃない？」"
translation = "「맞다, 휴식용으로 가져온 티 세트로 아까 녹차를 우려줬잖아?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロトには最強萌えメイドとして、プリティーに給仕してあげなさい！」"
translation = "「쿠로토에게 최강 모에 메이드로서 프리티하게 서빙해줘!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「っ……え、ええ！\u3000……もちろん、出来ますとも！」"
translation = "「윽…… 에, 에에! ……물론 할 수 있고말고요!」"

[[dialogue]]
speaker = "unk"
original = "（さっき首傾げてなかった……？）"
translation = "(방금 고개 갸우뚱하지 않았나……?)"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「九浄家メイド隊たるもの、給仕くらい爆裂簡単にこなせなくてはなりません！」"
translation = "「쿠죠 가문 메이드대라면 서빙 정도는 폭렬 간단히 해내야 합니다!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「さすがヨミヨミね！\u3000わくわく」"
translation = "「역시 요미요미네! 두근두근.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「そ、それでは会長……すぐにご準備しますのでお待ちをっ」"
translation = "「그, 그럼 회장님…… 금방 준비할 테니 기다려 주세요.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「い、いらっしゃませ～。本日の給仕を勤めさせて頂きます、巫女ウェイトレスのよ、ヨミヨミです……<emoji=heart04>」"
translation = "「어, 어서 오세요~. 오늘의 서빙을 맡게 된 무녀 웨이트리스 요, 요미요미입니다……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「本日のご注文はいかがしますか？\u3000美味しい緑茶を１つですね、かしこまりましたぁ……」"
translation = "「오늘의 주문은 무엇으로 하시겠어요? 맛있는 녹차 한 잔이군요, 알겠습니다아……」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「はい、お持ちしました。ええと……熱いので、ふ、ふーふー、しますね？\u3000……あ、でもこれちょっと恥ずかし……やっぱ今のなしで！」"
translation = "「네, 가져왔습니다. 그게…… 뜨거우니까 후, 후─후─ 해드릴게요? ……아, 근데 이거 좀 창피…… 역시 방금 건 없던 걸로!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「か、代わりに……そう、尻尾……！\u3000尻尾です！\u3000少しだけ、モフモフサービスします……！」"
translation = "「대, 대신…… 그래요, 꼬리……! 꼬리입니다! 아주 조금만 폭신폭신 서비스를 해드릴게요……!」"

[[dialogue]]
speaker = "unk"
original = "何……だと……？"
translation = "뭐…… 라고……?"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「で、でも、本当に少しだけ、ですからね？\u3000いやらしく触るのは禁止です！\u3000すー……はー……よし！\u3000どうぞ！」"
translation = "「하, 하지만 정말 조금뿐이니까요? 야하게 만지는 건 금지입니다! 스으…… 하아…… 좋아! 자요!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「んっ……あっ……会長っ！\u3000そんなっ……付け根の方は……ふあぁっ……！」"
translation = "「응…… 앗…… 회장님! 그런…… 뿌리 쪽은…… 후아앗……!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「……はっ、待った！\u3000よく考えたら、さっきのトレーニングで汗臭いかも……！\u3000モフモフ一旦待って下さい！」"
translation = "「……핫, 잠깐! 잘 생각해보니 아까 트레이닝 해서 땀 냄새날지도……! 폭신폭신 일단 기다려 주세요!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「気にしないって……私が気にするんです！\u3000だからダメですって……待った待った！\u3000ちょっ……あっ……こやんっ……や、やっぱダメぇぇぇ──ッ！！！」"
translation = "「신경 안 쓴다니…… 제가 신경 쓰인다고요! 그러니까 안 된다니까요…… 잠깐 잠깐! 저기…… 앗…… 코양…… 역시 안 돼애애애──!!!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ごめんなさいぃ！\u3000やっぱ私には巫女ウェイトレス無理ですぅぅぅ──ッ！！！」"
translation = "「죄송해요! 역시 저한테 무녀 웨이트리스는 무리예요오오오──!!!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ヨミヨミって見栄っ張りよね」"
translation = "「요미요미는 허세가 심하다니까.」"

[[dialogue]]
speaker = "unk"
original = "開店はいつですか？"
translation = "개점은 언제인가요?"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「<ruby>九浄家当主<rt>あのひと</rt></ruby>に相談してみるわ！」"
translation = "「쿠죠 가문 당주에게 상담해볼게!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「冗談じゃなくなっちゃうから、ほんと止めて下さいっ！」"
translation = "「농담이 아니게 되어버리니까 진짜 제발 관둬 주세요!」"

[[dialogue]]
speaker = "unk"
original = "恥ずかしさに顔を真っ赤にしたヨミが可愛らしく、その後もついついイジってしまう俺たちなのであった。"
translation = "부끄러움에 얼굴이 새빨개진 요미가 귀여워서 그 후로도 계속 놀려버리는 우리였다."

