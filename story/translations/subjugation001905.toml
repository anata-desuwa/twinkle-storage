[[dialogue]]
speaker = "ロロット"
original = "「トントロ、完・全・粉・砕ＤＥＡＴＨ☆」"
translation = "「톤토로, 완·전·분·쇄 DEATH☆」"

[[dialogue]]
speaker = "ナナカ"
original = "「トントロを墓地に送り、新星会長さんたちのＥＸスキルを発動！\u3000――って何やらすんじゃい！」"
translation = "「톤토로를 묘지로 보내고, 신성 회장님들의 EX 스킬을 발동! ──이 아니라 뭘 시키는 거야!」"

[[dialogue]]
speaker = "ロロット"
original = "「しくしく……あとでじいやに直してもらいましょう」"
translation = "「훌쩍훌쩍…… 나중에 할아범에게 고쳐달라고 해야겠어요.」"

[[dialogue]]
speaker = "ナナカ"
original = "「ちなみにじいやとはロロちゃんの執事である遠山民子さん、通称リースリング遠山さんのことです」"
translation = "「참고로 할아범이란 로로짱의 집사인 토야마 타미코 씨, 통칭 리슬링 토야마 씨를 말하는 거야.」"

[[dialogue]]
speaker = "ロロット"
original = "「興味がある人は原作の『ティンクル☆くるせいだーす』をプレイしてみて下さいね☆」"
translation = "「관심 있는 분은 원작인 『티클☆크루세이더즈』를 플레이해 보세요☆」"

