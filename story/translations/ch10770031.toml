[[dialogue]]
speaker = "unk"
original = "第１話,蘭美の義母娘交流,P"
translation = "제1화, 라비의 의모녀 교류, P"

[[dialogue]]
speaker = "unk"
original = "蘭美と恋人関係になって、しばらく経った、とある休日。"
translation = "라비와 연인 관계가 되고, 한동안 지난, 어느 휴일."

[[dialogue]]
speaker = "unk"
original = "九浄家メイド隊の長として忙しいのに、蘭美は空き時間を捻出して俺に会いに来てくれる。"
translation = "쿠죠 가문 메이드대의 장으로서 바쁜데도, 라비는 빈 시간을 억지로 내서 나를 만나러 와 준다."

[[dialogue]]
speaker = "蘭美"
original = "「リビングの清掃はこれで完了よ！\u3000確認をお願いするわ！！」"
translation = "「거실 청소는 이걸로 완료야! 확인을 부탁할게!!」"

[[dialogue]]
speaker = "蘭美"
original = "「最速で行ったけれど、当然仕事は丁寧にさせてもらったから、そちらも評価して頂戴」"
translation = "「최속으로 했지만, 당연히 일은 정성껏 했으니까, 그것도 평가해 줘」"

[[dialogue]]
speaker = "リノ"
original = "「わぁ♪\u3000もう終わっちゃったの？\u3000さすがね～、最速のメイドさん♪」"
translation = "「와아♪ 벌써 끝나 버렸어? 역시 대단하네~, 최속의 메이드 씨♪」"

[[dialogue]]
speaker = "蘭美"
original = "「お褒め頂きありがとうございます、お義母さま」"
translation = "「칭찬해 주셔서 감사합니다, 어머님」"

[[dialogue]]
speaker = "リノ"
original = "「ふふっ、クールに見えるけど可愛いわね～♪\u3000ほんと、こんないい子がお嫁さんになってくれるなんて嬉しいわ」"
translation = "「후훗, 쿨해 보이지만 귀엽네~♪ 정말, 이렇게 착한 아이가 며느리가 되어 준다니 기뻐」"

[[dialogue]]
speaker = "リノ"
original = "「こっち来て、蘭美ちゃん。ママが抱っこしてあげる♪」"
translation = "「이리 와, 라비짱. 엄마가 안아 줄게♪」"

[[dialogue]]
speaker = "蘭美"
original = "「だ、抱っこ！？」"
translation = "「아, 안아 주기!?」"

[[dialogue]]
speaker = "unk"
original = "ママ！？"
translation = "엄마!?"

[[dialogue]]
speaker = "リノ"
original = "「あら、嫌だった？\u3000そうよね～、蘭美ちゃんはちっちゃくて可愛いけど、立派なレディだもの」"
translation = "「어머, 싫었니? 그렇지~, 라비짱은 작고 귀엽지만, 훌륭한 레이디인걸」"

[[dialogue]]
speaker = "蘭美"
original = "「嫌ではありませんが、私はそれほどちっちゃくはありません！！\u3000可愛くて立派なレディなのはその通りですが……」"
translation = "「싫지는 않지만, 저는 그렇게 작지는 않습니다!! 귀엽고 훌륭한 레이디인 것은 맞지만……」"

[[dialogue]]
speaker = "リノ"
original = "「あらごめんなさい。でもお掃除は丁寧だし、お料理も上手だし、本当に立派なのね」"
translation = "「어머 미안해. 하지만 청소도 꼼꼼하고, 요리도 잘하고, 정말 훌륭하네」"

[[dialogue]]
speaker = "蘭美"
original = "「それはもちろん、私は九浄家メイド隊のメイド長ですから！\u3000培ってきた技術と愛情で、会長のことを必ずや満足させてみせます」"
translation = "「그건 물론이죠, 저는 쿠죠 가문 메이드대의 메이드장이니까요! 갈고닦은 기술과 애정으로, 회장님을 반드시 만족시켜 보이겠습니다」"

[[dialogue]]
speaker = "リノ"
original = "「うんうん、これからもよろしくしてあげてね♪」"
translation = "「응응, 앞으로도 잘 부탁해 줘♪」"

[[dialogue]]
speaker = "蘭美"
original = "「はい。彼は……私の大事な婚約者なので<emoji=heart04>」"
translation = "「네. 그이는……저의 소중한 약혼자라서요<emoji=heart04>」"

[[dialogue]]
speaker = "リノ"
original = "「可愛いなぁ。やっぱり抱っこしちゃう♪」"
translation = "「귀엽네. 역시 안아 버릴 거야♪」"

[[dialogue]]
speaker = "蘭美"
original = "「ぴゃっ！？\u3000で、ですから私は抱っこするほど小さくない……ですぅ……」"
translation = "「뺘앗!? 그, 그러니까 저는 안을 정도로 작지 않……습니다아……」"

[[dialogue]]
speaker = "リノ"
original = "「うふふ、じたばたしてもダメよ。あ～、もう、やわらかくてふわふわで……女の子～って感じね♪」"
translation = "「우후후, 발버둥 쳐도 소용없어. 아~, 정말, 부드럽고 폭신폭신해서……여자아이~라는 느낌이네♪」"

[[dialogue]]
speaker = "蘭美"
original = "「ぴゃ……耳はダメぇ……んんっ、くすぐったいですからぁ」"
translation = "「뺘……귀는 안 돼애……응응, 간지러우니까아」"

[[dialogue]]
speaker = "unk"
original = "蘭美は俺の彼女だぞ"
translation = "라비는 내 여자친구라고"

[[dialogue]]
speaker = "unk"
original = "そのくらいにしてあげて"
translation = "그쯤 해 줘"

[[dialogue]]
speaker = "リノ"
original = "「そうだったわね～。可愛いお嫁さんが来てくれて、つい浮かれちゃったわ」"
translation = "「그랬었지~. 귀여운 며느리가 와 줘서, 그만 들떠 버렸어」"

[[dialogue]]
speaker = "リノ"
original = "「耳はもう触らないから、次もまた抱っこさせてくれる？」"
translation = "「귀는 이제 안 만질 테니까, 다음에도 또 안게 해 줄래?」"

[[dialogue]]
speaker = "蘭美"
original = "「それは……はい、会長のお母さまなら、私にとっても母同然ですから。きちんと交流して、今後も仲を深めたいと思っています！」"
translation = "「그건……네, 회장님의 어머님이라면, 저에게도 어머니와 마찬가지니까요. 제대로 교류해서, 앞으로도 친분을 쌓고 싶습니다!」"

[[dialogue]]
speaker = "リノ"
original = "「じゃあ、ママって呼んでくれる？」"
translation = "「그럼, 엄마라고 불러 줄래?」"

[[dialogue]]
speaker = "蘭美"
original = "「ぴゃっ、そそ、それはっ……」"
translation = "「뺘앗, 그그, 그건……」"

[[dialogue]]
speaker = "蘭美"
original = "「会長、これはどうしたらいいのかしら？\u3000さすがの私も少し恥ずかしいのだけれど……」"
translation = "「회장, 이건 어떻게 해야 하는 걸까? 아무리 나라도 조금 부끄러운데……」"

[[dialogue]]
speaker = "unk"
original = "嫌じゃなかったら呼んであげて"
translation = "싫지 않으면 불러 줘"

[[dialogue]]
speaker = "蘭美"
original = "「そ、そう。わかったわ。他ならぬ貴方の頼みなら、仕方ないわね！」"
translation = "「그, 그래. 알았어. 다른 누구도 아닌 당신의 부탁이라면, 어쩔 수 없지!」"

[[dialogue]]
speaker = "蘭美"
original = "「こほん…………ええと……ママ……」"
translation = "「크흠…………에에또……엄마……」"

[[dialogue]]
speaker = "リノ"
original = "「うんっ、リノママよ～♪」"
translation = "「응, 리노 엄마야~♪」"

[[dialogue]]
speaker = "蘭美"
original = "「高速回避っ」"
translation = "「고속 회피」"

[[dialogue]]
speaker = "リノ"
original = "「やんっ、逃げられちゃった♪」"
translation = "「얀, 도망가 버렸네♪」"

[[dialogue]]
speaker = "unk"
original = "蘭美を困らせないで"
translation = "라비를 곤란하게 하지 마"

[[dialogue]]
speaker = "unk"
original = "いい加減にしてよ"
translation = "적당히 해 줘"

[[dialogue]]
speaker = "リノ"
original = "「もうすっかり蘭美ちゃんの旦那様って感じね！\u3000我が子の成長を感じられて、ママ、とっても嬉しいわ♪」"
translation = "「이제 완전히 라비짱의 남편 같네! 내 아이의 성장을 느낄 수 있어서, 엄마, 정말 기뻐♪」"

[[dialogue]]
speaker = "リノ"
original = "「その調子でしっかり蘭美ちゃんのことを守ってあげるのよ？\u3000蘭美ちゃんは強くてしっかりしてるけど、それでも女の子なんだから」"
translation = "「그 기세로 제대로 라비짱을 지켜주는 거야? 라비짱은 강하고 똑 부러지지만, 그래도 여자아이니까」"

[[dialogue]]
speaker = "unk"
original = "もちろん、蘭美は俺が守るよ"
translation = "물론, 라비는 내가 지킬게"

[[dialogue]]
speaker = "蘭美"
original = "「会長……」"
translation = "「회장……」"

[[dialogue]]
speaker = "リノ"
original = "「ふふっ、恋する女の子の目してるわ～♪」"
translation = "「후훗, 사랑에 빠진 여자아이의 눈을 하고 있네~♪」"

[[dialogue]]
speaker = "蘭美"
original = "「ぴゃっ！？\u3000そんなことは……ない……こともないような……」"
translation = "「뺘앗!? 그럴 리가……없……는 것도 아닌 것 같은……」"

[[dialogue]]
speaker = "蘭美"
original = "「ううぅっ……恥ずかしいから指摘しないで欲しいぴょんっ！」"
translation = "「우우읏……부끄러우니까 지적하지 말아줬으면 좋겠어뿅!」"

[[dialogue]]
speaker = "リノ"
original = "「あっ、今のがラパン地方の方言？」"
translation = "「앗, 방금 그게 라판 지방의 방언?」"

[[dialogue]]
speaker = "蘭美"
original = "「あ、これは、そのっ、たまに出ちゃうんです」"
translation = "「아, 이건, 그, 가끔 나와 버려요」"

[[dialogue]]
speaker = "リノ"
original = "「いいのいいの～、すっごく可愛いわ♪\u3000あなたも大好きなんじゃない？」"
translation = "「괜찮아 괜찮아~, 엄청 귀엽네♪ 당신도 정말 좋아하는 거 아니니?」"

[[dialogue]]
speaker = "unk"
original = "可愛いし、好きだよ"
translation = "귀엽고, 좋아"

[[dialogue]]
speaker = "unk"
original = "そうだね"
translation = "그렇지"

[[dialogue]]
speaker = "蘭美"
original = "「私は恥ずかしいって言ってるのに！\u3000会長は何度も可愛いとか、好きだって言ったりして……まったくっ」"
translation = "「나는 부끄럽다고 말하고 있는데! 회장은 몇 번이나 귀엽다거나, 좋다고 말하고……정말」"

[[dialogue]]
speaker = "リノ"
original = "「いいわね～。青春してるなぁ」"
translation = "「좋네~. 청춘을 보내고 있구나」"

[[dialogue]]
speaker = "リノ"
original = "「またぎゅってしたいところだけど、あんまりすると蘭美ちゃんに嫌われちゃうから我慢しなきゃ」"
translation = "「또 꽉 안고 싶지만, 너무 그러면 라비짱에게 미움받을 테니까 참아야지」"

[[dialogue]]
speaker = "リノ"
original = "「ということで、はいっ、バトンタッチ。私の代わりに蘭美ちゃんを抱っこしてあげて♪」"
translation = "「라는 것으로, 자, 바통 터치. 나 대신 라비짱을 안아 줘♪」"

[[dialogue]]
speaker = "蘭美"
original = "「ぴゃっ！？」"
translation = "「뺘앗!?」"

[[dialogue]]
speaker = "unk"
original = "蘭美、こっちおいで"
translation = "라비, 이리 와"

[[dialogue]]
speaker = "蘭美"
original = "「う、うん……わかったわ。お義母さまの前で貴方に抱っこされるなんて恥ずかしいけど、恋人同士だもの、隠すことは何もないはずよね！」"
translation = "「으, 응……알았어. 어머님 앞에서 당신에게 안기는 건 부끄럽지만, 연인 사이인걸, 숨길 건 아무것도 없을 거야!」"

[[dialogue]]
speaker = "蘭美"
original = "「いいわ、私を抱っこしなさい！！」"
translation = "「좋아, 나를 안아!!」"

[[dialogue]]
speaker = "unk"
original = "ぎゅ～～～っ"
translation = "꼬오옥~~~"

[[dialogue]]
speaker = "蘭美"
original = "「ふふ、そんなに思い切り抱きしめて……もしかして私を独占されていたのが不満だったのかしら？」"
translation = "「후후, 그렇게 힘껏 끌어안고……혹시 나를 독점당했던 게 불만이었던 걸까?」"

[[dialogue]]
speaker = "蘭美"
original = "「安心しなさい。私は貴方の恋人で、婚約者なんだから。貴方が望むならいつだってこうして抱っこさせてあげるわ」"
translation = "「안심해. 나는 당신의 연인이고, 약혼자니까. 당신이 원한다면 언제든지 이렇게 안게 해 줄게」"

[[dialogue]]
speaker = "リノ"
original = "「もう２人の世界に入っちゃって……ふふふ、微笑ましいわね」"
translation = "「벌써 둘만의 세계에 빠져 버렸네……후후후, 흐뭇하네」"

