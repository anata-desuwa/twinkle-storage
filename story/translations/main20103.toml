[[dialogue]]
speaker = "unk"
original = "第４話,新たな敵,B"
translation = "제4화, 새로운 적"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「アビスインパクト！」"
translation = "「어비스 임팩트!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふふん。こんなの今さら敵じゃないわ！」"
translation = "「후훗. 이런 건 이제 와서 적도 아니야!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ヴィーナス、油断大敵！\u3000……って言いたいところだけど、確かに拍子抜けしちゃうなぁ」"
translation = "「비너스, 방심은 금물! ……이라고 말하고 싶지만, 확실히 김빠지긴 하네.」"

[[dialogue]]
speaker = "unk"
original = "俺たちの成長を加味しても、実際モンスターが弱くなっていた。"
translation = "우리들의 성장을 가미하더라도 실제로 몬스터가 약해져 있었다."

[[dialogue]]
speaker = "unk"
original = "俺が星徒会長になったばかりの頃と比べても、大型モンスターも少ないし、かなり余裕を持って撃破できる。"
translation = "내가 성도회장이 된 지 얼마 안 됐을 때와 비교해도 대형 몬스터도 적고, 꽤 여유롭게 격파할 수 있다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「こちらも撃破しました」"
translation = "「이쪽도 격파했습니다.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「みんな無事ね～」"
translation = "「모두 무사하네~」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「もちろん。ピンピンしてるわ」"
translation = "「물론이지. 쌩쌩하다구.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「モンスターの強さがずっとこのくらいだったら、まだ平和って言えるかも……？」"
translation = "「몬스터의 강함이 계속 이 정도라면 아직 평화롭다고 할 수 있을지도……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それはモンスターに慣れ過ぎじゃないか？」"
translation = "「그건 몬스터에 너무 익숙해진 거 아니야?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「う……そうかも……」"
translation = "「으…… 그럴지도……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「会長、体調に変化はありませんか？」"
translation = "「회장님, 컨디션에 변화는 없나요?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ、全然。健康体そのものだ」"
translation = "「어, 전혀. 건강체 그 자체야.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「なら良かったです」"
translation = "「그럼 다행이네요.」"

[[dialogue]]
speaker = "unk"
original = "モンスターやアステラに近づくことで、俺の中のリクリエが目覚めるかもしれないと思っていたけど、今のところ害はない。"
translation = "몬스터나 아스테라에 접근함으로써 내 안의 리크리에가 깨어날지도 모른다고 생각했지만, 지금까지는 아무런 해가 없다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（だけど──本当にそうだろうか？）"
translation = "(하지만── 정말로 그럴까?)"

[[dialogue]]
speaker = "unk"
original = "モンスターが現れ続ける原因があるとすれば……俺の中に存在しているリクリエの力じゃないか？"
translation = "몬스터가 계속 나타나는 원인이 있다면…… 내 안에 존재하는 리크리에의 힘 때문이 아닐까?"

[[dialogue]]
speaker = "unk"
original = "何せ世界を滅ぼすに足る力だ。俺の中に封印されているとしても、周囲に影響を及ぼしている可能性は否定できない。"
translation = "무려 세계를 멸망시키기에 충분한 힘이다. 내 안에 봉인되어 있다고 해도 주위에 영향을 미치고 있을 가능성은 부정할 수 없다."

[[dialogue]]
speaker = "unk"
original = "俺の中のリクリエを滅さなければ、戦いはずっと続くかもしれない。"
translation = "내 안의 리크리에를 멸하지 않으면 싸움은 계속될지도 모른다."

[[dialogue]]
speaker = "unk"
original = "そんな考えがふと頭をよぎって──"
translation = "그런 생각이 문득 머릿속을 스치고──"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クーロート！」"
translation = "「쿠로토!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「わっ！？」"
translation = "「왓!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「難しい顔してどうしたの？\u3000どっか怪我でもしたの？」"
translation = "「심각한 얼굴로 왜 그래? 어디 다치기라도 한 거야?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああいや、大丈夫。ピンピンしてるよ」"
translation = "「아니 아니, 괜찮아. 쌩쌩해.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「もう、クロトこそ油断してないでしょうね？\u3000星徒会長なんだからシャキッと──」"
translation = "「정말, 쿠로토야말로 방심하고 있는 거 아니야? 성도회장이니까 정신 바짝──」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「！\u3000通信……また近くでモンスターが出現！？」"
translation = "「! 통신…… 또 근처에서 몬스터가 출현!?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「最近だと連続は珍しい……えっ、対応に当たったプリマステラが負傷！？\u3000そんなに強いモンスターなの！？」"
translation = "「요즘 들어 연속은 드문데…… 엣, 대응하던 프리마스텔라가 부상!? 그렇게 강한 몬스터야!?」"

[[dialogue]]
speaker = "unk"
original = "連絡の内容に緊張が走る。"
translation = "연락 내용에 긴장감이 감돈다."

[[dialogue]]
speaker = "unk"
original = "近頃のモンスターに強力なものはいなかった。それに俺たちだけじゃなくて、両校のプリマステラも実戦を重ねて成長している。"
translation = "최근 몬스터 중 강력한 것은 없었다. 게다가 우리뿐만 아니라 양쪽 학교의 프리마스텔라도 실전을 거듭하며 성장하고 있다."

[[dialogue]]
speaker = "unk"
original = "にも拘わらず傷を負わせたとなれば、相当強力なモンスターに違いない。"
translation = "그럼에도 불구하고 상처를 입혔다면 상당히 강력한 몬스터임에 틀림없다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「モンスターの反応、高速で接近──来ます！」"
translation = "「몬스터 반응, 고속으로 접근── 옵니다!」"

[[dialogue]]
speaker_original = "ドラケルス"
speaker_translation = "드라켈스"
original = "「グルルルッ！！！」"
translation = "「그르르르!!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「！？\u3000何あれ……本当にモンスターなの？」"
translation = "「!? 저게 뭐야…… 정말 몬스터 맞아?」"

[[dialogue]]
speaker = "unk"
original = "俺たちの前に姿を現したのは、有機と無機が入り混じったような異形の怪物だった。"
translation = "우리 앞에 모습을 드러낸 것은 유기물과 무기물이 뒤섞인 듯한 이형의 괴물이었다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「今まで見たモンスターはたいてい動物みたいな姿だったけど、あれは違う感じよね～」"
translation = "「지금까지 본 몬스터는 대개 동물 같은 모습이었는데, 저건 다른 느낌이네~」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「攻撃開始──じゅわっ」"
translation = "「공격 개시── 쥬왓.」"

[[dialogue]]
speaker = "unk"
original = "アナが弓を構え、<ruby>過<rt>あやま</rt></ruby>たずモンスターの頭部を狙い撃つ。"
translation = "아나가 활을 겨누고 어김없이 몬스터의 머리를 정조준한다."

[[dialogue]]
speaker = "unk"
original = "炎の矢が突き刺さり、爆炎が逆巻く。だが──"
translation = "불꽃의 화살이 박히고 폭염이 휘몰아친다. 하지만──"

[[dialogue]]
speaker_original = "ドラケルス"
speaker_translation = "드라켈스"
original = "「ガアァッ！！」"
translation = "「가앗!!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ダメージ軽微。効いていませんね」"
translation = "「데미지 경미. 효과가 없네요.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ウソ！？\u3000アナの攻撃でも通らないの！？」"
translation = "「거짓말!? 아나의 공격도 안 통하는 거야!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「私がやるわ！\u3000ディバインスフィア！」"
translation = "「내가 하겠어! 디바인 스피어!」"

[[dialogue]]
speaker_original = "ドラケルス"
speaker_translation = "드라켈스"
original = "「グルル……！」"
translation = "「그르르……!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「なっ──！？\u3000こいつ、めちゃくちゃ硬いわね！」"
translation = "「나앗──!? 이 녀석, 엄청나게 단단하잖아!」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスのロッドから放たれた光条がモンスターを呑み込むが、鋼の体にわずかに傷を刻んだのみで、これも有効打には至らなかった。"
translation = "비너스의 로드에서 뿜어져 나온 광조가 몬스터를 집어삼키지만, 강철 같은 몸에 약간의 상처를 남겼을 뿐, 이것도 유효타가 되지는 못했다."

[[dialogue]]
speaker = "unk"
original = "新種のモンスターは、獲物を探すように周囲を見回すと──"
translation = "신종 몬스터는 먹잇감을 찾듯 주위를 둘러보더니──"

[[dialogue]]
speaker_original = "ドラケルス"
speaker_translation = "드라켈스"
original = "「グルァアア……ッ！！」"
translation = "「그르아아아……!!」"

[[dialogue]]
speaker = "unk"
original = "モンスターが唸り声とともに紫色の瘴気を吐き出す。"
translation = "몬스터가 포효와 함께 보라색 장기를 내뿜는다."

[[dialogue]]
speaker = "unk"
original = "すると瘴気に包まれた物体が、ジグザグのノイズによって組み換えられ、新たな脅威が現出する。"
translation = "그러자 장기에 휩싸인 물체가 지그재그 노이즈에 의해 재조합되어 새로운 위협이 출현한다."

[[dialogue]]
speaker_original = "エレマル"
speaker_translation = "엘레말"
original = "「ガァアァッ！！」"
translation = "「가아앗!!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「モンスターが増えた……！」"
translation = "「몬스터가 늘어났어……!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「このままだと辺りがモンスターだらけになっちゃうわね～」"
translation = "「이대로라면 주변이 몬스터 천지가 되겠네~」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「のんきに言ってる場合じゃないですよサーシャさん！？」"
translation = "「태평하게 말할 때가 아니잖아요 사샤 씨!?」"

[[dialogue]]
speaker = "unk"
original = "端的に言えば、リクリエとは世界を書き換える現象。"
translation = "단적으로 말하자면 리크리에란 세계를 고쳐 쓰는 현상."

[[dialogue]]
speaker = "unk"
original = "今まで戦ってきたモンスターも大なり小なりその力を持っていたが、この新種のモンスターは改変力が段違いだ。"
translation = "지금까지 싸워온 몬스터도 크든 작든 그 힘을 가지고 있었지만, 이 신종 몬스터는 개변력이 차원이 다르다."

[[dialogue]]
speaker = "unk"
original = "なんとか倒せたとしても、このままでは一帯がリクリエに蝕まれるだろう。"
translation = "어떻게든 쓰러뜨린다 해도 이대로라면 일대가 리크리에에 좀먹힐 것이다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺がやる！」"
translation = "「내가 하겠어!」"

[[dialogue]]
speaker = "unk"
original = "自身の中の魔王の力を励起させる。"
translation = "내 안의 마왕의 힘을 여기시킨다."

[[dialogue]]
speaker = "unk"
original = "俺が──いや、魔王ラクシスが元来持っていた力は平行世界を超える力。"
translation = "내가── 아니, 마왕 락시스가 본래 가지고 있던 힘은 평행세계를 넘는 힘."

[[dialogue]]
speaker = "unk"
original = "女神すら持ちえない力を偶然にも獲得してしまった突然変異。"
translation = "여신조차 가질 수 없는 힘을 우연히 획득해 버린 돌연변이."

[[dialogue]]
speaker = "unk"
original = "その力を以て、平行世界の可能性を束ね、この拳に宿す──！"
translation = "그 힘을 가지고 평행세계의 가능성을 묶어 이 주먹에 깃들게 한다──!"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「フロンティアドライブ──」"
translation = "「프론티어 드라이브──」"

