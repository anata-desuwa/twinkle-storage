[[dialogue]]
speaker = "unk"
original = "マトイがアムにデートへ誘われた翌日――"
translation = "마토이가 아무에게 데이트 권유를 받은 다음 날──"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「というわけで、やって来ました！\u3000街へおでかけデート♪」"
translation = "「그리하여 찾아왔습니다! 시내로 외출 데이트♪」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「お、おでかけはいいんだけど、なんでデート？"
translation = "「외, 외출은 좋은데 왜 데이트야?」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「ふふふ、カッコいい言い回しでしょ？\u3000あとはそう、マトイ先輩と仲良くなりたいと思って！」"
translation = "「후후후, 멋진 표현이죠? 그리고 뭐랄까, 마토이 선배랑 친해지고 싶다고 생각해서!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「ほら、マトイ先輩とは同じ盾使いなのに、プライベートで遊んだりとか、そういう交流をしたことがなかったじゃないですか。なんで、いい機会かなぁと思いまして♪」"
translation = "「봐요, 마토이 선배랑은 같은 방패술사인데 사적으로 놀거나 그런 교류를 한 적이 없었잖아요. 그래서 좋은 기회일까 싶어서요♪」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「まあ、学年も、学園も違うし……でも、デートって、具体的には何を？」"
translation = "「뭐, 학년도 학원도 다르니까…… 그런데 데이트라니 구체적으로 뭘?」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「目的はお互いのことを知る為ですから、自分の好きなものを紹介する、とかどうでしょう？\u3000じゃあ、まずは言い出しっぺのあたしから！」"
translation = "「목적은 서로를 알기 위해서니까, 자신이 좋아하는 걸 소개하는 건 어때요? 그럼 먼저 말을 꺼낸 저부터!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「マトイ先輩、ボウリングで勝負しましょう！」"
translation = "「마토이 선배, 볼링으로 승부해요!」"

[[dialogue]]
speaker = "unk"
original = "そうして、マトイはアムとボウリング場へ入る。"
translation = "그렇게 마토이는 아무와 볼링장으로 들어간다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「マトイ先輩、ボウリングは経験者ですか？」"
translation = "「마토이 선배, 볼링은 경험자예요?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「うん、一時期ハマってた時期があって、それなりにかな。アムちゃんはよく、ボウリングやるの？」"
translation = "「응, 한때 빠졌던 시기가 있어서 어느 정도는 하려나. 아무짱은 볼링 자주 쳐?」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「はい！\u3000あたし、スポーツ全般好きなんで♪」"
translation = "「네! 저, 스포츠 전반을 좋아하거든요♪」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「――じゃあ、あたしから行きますよ～。えいっ！」"
translation = "「──그럼 저부터 갑니다~. 에잇!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「よし！\u3000ストライク！」"
translation = "「좋아! 스트라이크!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「おっ、１発目からすごい！」"
translation = "「오, 첫발부터 대단해!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「次はマトイ先輩の番ですよ。お手並み拝見です！」"
translation = "「다음은 마토이 선배 차례예요. 실력 좀 볼까요!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「う～ん、私はボウリングも普通だから、そんな期待されるほどじゃないけど……えいっ！」"
translation = "「으음, 난 볼링도 평범해서 그렇게 기대받을 정도는 아니지만…… 에잇!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あっ、ピンが１本残っちゃった。じゃあせめてスペアに――」"
translation = "「앗, 핀이 하나 남았네. 그럼 적어도 스페어라도──」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「よし、倒せた！」"
translation = "「좋아, 쓰러뜨렸다!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「やりますね～。でも、あたしの方が１歩リードです。この調子で行きますよ～！」"
translation = "「제법이네요~. 하지만 제가 한발 앞서있어요. 이 기세로 갑니다~!」"

[[dialogue]]
speaker = "unk"
original = "そうして、ボウリングを３ゲームし終えた２人は、次にマトイの案内で、オシャレなカフェへと足を運んでいた。"
translation = "그렇게 볼링을 3게임 마친 두 사람은, 다음으로 마토이의 안내에 따라 세련된 카페로 발걸음을 옮겼다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「マトイ先輩、ケーキが好きだったんですね」"
translation = "「마토이 선배, 케이크를 좋아하셨군요.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「うん。この辺りだと、ここのお店のケーキがお気に入りなんだ。どうかな？」"
translation = "「응. 이 근처라면 이 가게 케이크가 제일 마음에 들어. 어때?」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「すごく美味しいです！\u3000それにお店の内装や、ケーキの見た目もオシャレで……大人っぽい感じ♪」"
translation = "「정말 맛있어요! 게다가 가게 인테리어나 케이크 모양도 세련돼서…… 어른스러운 느낌♪」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ふふっ、気に入ってもらえたならよかった♪」"
translation = "「후훗, 마음에 들었다면 다행이야♪」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「ところでマトイ先輩、さっきのボウリング、あたし驚きました！\u3000ボウリングは結構自信あったんですけど、２ゲーム負けちゃって……正直悔しいです！」"
translation = "「그나저나 마토이 선배, 아까 볼링 때 깜짝 놀랐어요! 볼링은 꽤 자신 있었는데 2게임이나 져버려서…… 솔직히 분해요!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「いやいや、僅差だったし。最後の１ゲームも、あと１つストライク取られてたら、負けてたよ」"
translation = "「아니 아니, 근소한 차이였잖아. 마지막 1게임도 스트라이크 하나만 더 나왔으면 졌을걸.」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「マトイ先輩って、訓練見てても思いますけど、安定感がすごいですよね。ブレが少ないっていうか……」"
translation = "「마토이 선배는 훈련을 봐도 그렇지만 안정감이 대단하네요. 기복이 적달까……」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「今回のボウリングでも、ガーターがないのはもちろん、ストライクを外しても、スペアはしっかりと取ってくる感じで」"
translation = "「이번 볼링에서도 거터가 없는 건 물론이고, 스트라이크를 놓쳐도 스페어는 확실히 챙기는 느낌이라.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「私はもっと、ストライク取りたいんだけどね～。特別得意なわけじゃないから、自然とそういうやり方になっちゃう」"
translation = "「나는 좀 더 스트라이크를 치고 싶지만 말이야~. 특별히 잘하는 게 아니다 보니까 자연스럽게 그런 방식이 되더라고.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「アムちゃんは、私よりもストライク取れてたじゃない？\u3000私もあれくらい上手かったらよかったんだけどね～」"
translation = "「아무짱은 나보다 스트라이크 많이 쳤잖아? 나도 그만큼 잘했으면 좋았을 텐데 말이야~」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「……マトイ先輩って、実はかなり器用ですよね」"
translation = "「……마토이 선배는 사실 굉장히 다재다능하시네요.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「え？\u3000そうかな？\u3000自分では普通くらいだと思ってるけど……」"
translation = "「에? 그런가? 스스로는 평범한 정도라고 생각하는데……」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あたし、思ったんですけど……マトイ先輩が星徒会のディフェンス役なのって、たまたま武器に盾があったから、だったりしますか？」"
translation = "「제 생각인데요…… 마토이 선배가 성도회의 디펜스 역할인 건, 우연히 무기 중에 방패가 있었기 때문인가요?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あ、うん。……それが理由の半分かな」"
translation = "「아, 응. ……그게 이유의 절반이려나.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ほら、学園に入ったばかりの時に、戦闘適性の試験ってあるでしょ。私は元々、そこでは『オールラウンダー』って判定だったんだよね」"
translation = "「봐봐, 학원에 갓 들어왔을 때 전투 적성 시험이라는 게 있잖아. 나는 원래 거기서 『올라운더』 판정이었거든.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「私の武器は、盾だけじゃなくて、剣もある」"
translation = "「내 무기는 방패뿐만 아니라 검도 있어.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「私が今みたいにディフェンス役を担当するようになったのは、星徒会に入った時に、そういうポジションが誰もいなかったからなんだよね」"
translation = "「내가 지금처럼 디펜스 역할을 담당하게 된 건 성도회에 들어갔을 때 그런 포지션이 아무도 없었기 때문이야.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「というより、他のみんなの攻撃力がすごくて、普通の私は出番がなかったって感じかな。一方で、防御に関しては、みんな特別得意ってわけじゃなかった」"
translation = "「이라기보다 다른 애들의 공격력이 워낙 대단해서 평범한 나는 나설 자리가 없었다는 느낌일까. 반면에 방어에 관해서는 다들 특별히 잘하는 편이 아니었어.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「だから、私が防御を担当しようって思って……今に至る感じ」"
translation = "「그래서 내가 방어를 담당하자고 생각해서…… 지금에 이르게 된 거야.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「アムちゃんがさっき、器用だって言ってくれたけど……私からすると、『器用貧乏』なんだよね」"
translation = "「아무짱이 아까 다재다능하다고 해줬지만…… 내가 보기엔 『범재』인 거거든.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「私の水着フォームも、まさにそんな感じでさ。目覚めたのは何故か、回復方面を強化した力だった」"
translation = "「내 수영복 폼도 딱 그런 느낌이라서. 눈을 뜬 건 왠지 회복 방면을 강화한 힘이었어.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「本当は私もアムちゃんみたいに、防御方面に特化できたらよかったんだけど……」"
translation = "「사실 나도 아무짱처럼 방어 방면에 특화될 수 있었다면 좋았겠지만……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「……ねぇ、アムちゃん。こんなこと聞かれても困るかもしれないけど……どうしたらアムちゃんみたいに強くなれるかな？」"
translation = "「……저기, 아무짱. 이런 질문 받아도 곤란할지 모르겠지만…… 어떻게 하면 아무짱처럼 강해질 수 있을까?」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あたしみたいに、ですか？」"
translation = "「저처럼 말인가요?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そう。私、今回アムちゃんの訓練を見てて、同じようになりたいって思ったんだ」"
translation = "「응. 나, 이번에 아무짱의 훈련을 보면서 똑같이 되고 싶다고 생각했어.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「もちろん、私はアムちゃんみたいに天才じゃないから、同じようには行かないのはわかってる。だけど、少しでも盾使いとして近付けたらって……」"
translation = "「물론 나는 아무짱처럼 천재가 아니니까 똑같이 되지는 않을 거라는 건 알아. 하지만 조금이라도 방패술사로서 가까워질 수 있다면 해서……」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あたしが天才……。いや～、照れるな～♪\u3000それ程でも～」"
translation = "「제가 천재라니……. 아니~ 쑥스럽네요~♪ 그 정도까지는~」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「……と言いたいところですけど、マトイ先輩」"
translation = "「……라고 말하고 싶지만, 마토이 선배.」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あたし、正直自分は、天才なんかじゃないと思ってます」"
translation = "「저, 솔직히 제 자신은 천재 같은 게 아니라고 생각해요.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「本当の天才っていうのは、規格外の星力を持つヴィーナス前会長や――」"
translation = "「진정한 천재라는 건 규격 외의 성력을 가진 비너스 전 회장님이나──」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「『竜』という特別な種族に生まれて、引力をも自在に操るマムみたいなヒトを言うんだと、あたしは思ってます」"
translation = "「『용』이라는 특별한 종족으로 태어나서 인력조차 자유자재로 다루는 마무 같은 사람을 말하는 거라고 전 생각해요.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「でも、あたしはそんな人たちにも負けたくないって心持ちで頑張ってます。だって、流星学園には――」"
translation = "「하지만 전 그런 사람들에게도 지고 싶지 않다는 마음가짐으로 노력하고 있어요. 그야 유성학원에는──」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「たゆまぬ努力の末、マムに並ぶ程の強さを手に入れた、千園寺ヒルディオーネ先輩がいるから」"
translation = "「끊임없는 노력 끝에 마무와 대등할 정도의 강함을 손에 넣은 센온지 힐디오네 선배가 있으니까요.」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「それで、どうしたら強くなれるのか知りたい、って話でしたよね――」"
translation = "「그래서 어떻게 하면 강해질 수 있는지 알고 싶다고 하셨죠──」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あたしは、負けない強さを手に入れる為に必要なのは、『心の盾』に誓うことだと思ってます」"
translation = "「저는 지지 않는 강함을 손에 넣기 위해 필요한 건 『마음의 방패』에 맹세하는 것이라고 생각해요.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「心の盾……？」"
translation = "「마음의 방패……?」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「ディフェンス役は戦う時、他の誰よりも前に立って、敵の攻撃を受け止めて、耐え続けます」"
translation = "「디펜스 역할은 싸울 때 다른 누구보다 앞에 서서 적의 공격을 받아내고 계속 버팁니다.」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「星徒会としてリクリエの最前線、その１番前で盾を構えてきたマトイ先輩なら、わかるはずです――」"
translation = "「성도회로서 리크리에의 최전선, 그 제일 앞에서 방패를 세워 온 마토이 선배라면 알 거예요──」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「モンスターの攻撃を受け止めるって、すごく怖いことですよね？」"
translation = "「몬스터의 공격을 받아낸다는 건 정말 무서운 일이죠?」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「だから、自身の心の支えとなる固い信念が必要なはずです。それを、あたしは心の盾って呼んでます」"
translation = "「그러니까 자신의 마음을 지탱해 줄 굳은 신념이 필요할 거예요. 그걸 전 마음의 방패라고 불러요.」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「マトイ先輩の信念は何ですか？」"
translation = "「마토이 선배의 신념은 뭐예요?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「私の……信念……」"
translation = "「나의…… 신념……」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「絶対に何かあるはずです、自覚してないだけで。でなきゃ、星徒会のディフェンス役を続けることなんてできない」"
translation = "「절대로 무언가 있을 거예요, 자각하지 못하고 있을 뿐이지. 그렇지 않으면 성도회의 디펜스 역할을 계속할 수 없었을 테니까요.」"

[[dialogue]]
speaker = "unk"
original = "見たことのない真面目な顔をして、マトイの目を真っ直ぐに見るアム。"
translation = "본 적 없는 진지한 얼굴로 마토이의 눈을 똑바로 바라보는 아무."

[[dialogue]]
speaker = "unk"
original = "しばし沈黙が流れて――"
translation = "잠시 침묵이 흐르고──"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「……ちなみに、あたしは『自分がカッコいいと思える理想の自分を守り抜くこと』です！」"
translation = "「……참고로 저는 『스스로가 멋지다고 생각하는 이상적인 자신을 끝까지 지켜내는 것』이에요!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「まあ、そう言いつつ、戦闘になると無我夢中になって忘れちゃってることもあるんで、まだまだなんですけどね～。てへへ♪」"
translation = "「뭐, 그렇게 말하면서도 전투가 시작되면 정신없이 몰입하다가 잊어버릴 때도 있어서 아직 멀었지만요~. 데헤헤♪」"

[[dialogue]]
speaker = "unk"
original = "アムはそう言って、おどけてみせる。"
translation = "아무는 그렇게 말하며 익살을 부린다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「……アムちゃん、ありがとう」"
translation = "「……아무짱, 고마워.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「私、ちゃんと考えてみる」"
translation = "「나, 제대로 생각해 볼게.」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「はい！\u3000大丈夫ですよ。マトイ先輩なら！」"
translation = "「네! 괜찮아요, 마토이 선배라면!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「天才盾使いのあたしが保証します！\u3000……なんちゃって～♪」"
translation = "「천재 방패술사인 제가 보증할게요! ……농담이에요~♪」"

[[dialogue]]
speaker = "unk"
original = "場の雰囲気を明るくするように、笑ってみせるアムなのだった。"
translation = "분위기를 밝게 만들려는 듯 웃어 보이는 아무였다."

