[[dialogue]]
speaker = "unk"
original = "第７話,買収と餌付け,B"
translation = "제7화 매수와 길들이기 B"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "最初はアナちゃんの星徒会入りを不安視する周囲の声もあった。"
translation = "처음에는 아나짱의 성도회 입성을 불안해하는 주변 목소리도 있었다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "けれど、しばらく経つとすぐにそんな声は聞こえなくなった。"
translation = "하지만 시간이 조금 지나자 곧 그런 소리는 들리지 않게 되었다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "それほどにアナちゃんは優秀で、いつの間にかヴィーナス会長に変わって書類仕事をこなすまでになっていた。"
translation = "그만큼 아나짱은 우수했고, 어느샌가 비너스 회장을 대신해 서류 업무를 처리할 정도가 되어 있었다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「小さくてー、かわいくてー、仕事もデキるなんて、カンペキのペキじゃなーい！」"
translation = "「작고~ 귀엽고~ 일까지 잘하다니, 완벽 그 자체잖아!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「アナちゃんみたいな子が来てくれて、嬉しいわ。なでなで、よしよし♪」"
translation = "「아하하…… 오히려 제가 금방 가르침을 청하는 쪽이 될 것 같지만요.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「うぃうぃ、うぃうぃ」"
translation = "「그래도 그렇게 되지 않도록 노력할게요. 잘 부탁해, 아나 씨.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「副会長のお仕事は大変じゃない？\u3000えっと……アナ、ちゃん」"
translation = "「부회장 업무는 힘들지 않아? 에또…… 아나, 짱.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「もー、まだまだぎこちないわね。アナさんじゃなくてアナちゃんでしょ？」"
translation = "「정말, 아직도 서먹서먹하네. 아나 씨가 아니라 아나짱이지?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「私の方が後輩なのですからご遠慮なく」"
translation = "「제가 후배니까 사양 말고 편하게 부르세요.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「う、うん……アナちゃん。それで会計と副会長のお仕事、やってみてどちらが大変そう？」"
translation = "「으, 응…… 아나짱. 그래서 회계랑 부회장 업무, 해보니 어느 쪽이 더 힘들 것 같아?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ノープロブレム。むしろ会計より、こちらのお仕事の方が合っているまであるかもです」"
translation = "「노 프로블럼. 오히려 회계보다 이쪽 업무가 더 적성에 맞을지도요.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ね？\u3000私が言った通り、アナは副会長が適任だったでしょう？」"
translation = "「그치? 내가 말한 대로, 아나는 부회장이 적임이었지?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そうね、私と役職を交換して大正解だったかも」"
translation = "「그러게~ 나랑 직책을 교대한 건 대정답이었을지도~」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふふ～ん♪」"
translation = "「후후~ㄴ♪」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「結果的にそうだったかもしれないですけど、本音は会長が面倒な書類仕事を押し付けたかっただけじゃありませんか？」"
translation = "「결과적으로는 그랬을지도 모르지만, 본심은 회장님이 귀찮은 서류 업무를 떠넘기고 싶었던 것뿐 아닌가요?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「適材適所ってだけよ。ぶっちゃけ私、書類仕事は向いてないっ！」"
translation = "「적재적소일 뿐이야. 솔직히 나, 서류 업무는 안 맞아!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「堂々と言い切るようなことですか！」"
translation = "「당당하게 단언할 일인가요!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（何も知らないうちは尊敬してたんだけどな。星徒会役員として付き合っていくうちにイメージがガラガラ崩れていく）"
translation = "(아무것도 모를 때는 존경했었는데 말이야. 성도회 임원으로서 지내다 보니 이미지가 와르르 무너져가네.)"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（まさか会長がこんなにアレな人だとは思わなかったよ……）"
translation = "(설마 회장님이 이렇게 거시기한 사람일 줄은 몰랐어…….)"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「アナちゃん、あまりに激務だったら断って良いんですよ。会長がやるべき業務は、会長にやらせないと」"
translation = "「아나짱, 너무 격무라면 거절해도 괜찮아요. 회장님이 해야 할 업무는 회장님이 하게 해야지.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「この程度なら激務に入りません。それに会長はお菓子をくれますから」"
translation = "「이 정도는 격무에 들지 않아요. 게다가 회장님이 과자를 주시거든요.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「お菓子？」"
translation = "「과자?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ひとつお仕事が片づく度に、アナにはお菓子をあげてるの！\u3000文字通りに飴と鞭よ！」"
translation = "「업무 하나가 끝날 때마다 아나에게 과자를 주고 있어! 말 그대로 당근과 채찍이지!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「それは買収っていうんです！」"
translation = "「그건 매수라고 하는 거예요!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「人聞き悪ーい！\u3000アナが和菓子を食べたことないっていうから、行きつけのお店で美味しいのを買ってきたのよ！」"
translation = "「듣기 거북하게 정말! 아나가 화과자를 먹어본 적 없다고 하길래, 단골 가게에서 맛있는 걸 사 온 거라고!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「おお……なんですか、その桃色と白の物体は」"
translation = "「오오…… 뭔가요, 그 분홍색과 하얀색 물체는.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あらあら、天界にはないのかしら？\u3000これはね、すあまっていうの」"
translation = "「어머머, 천계에는 없는 걸까~? 이건 말이지, 수아마라고 해~」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「おお……それが、すあま。書物で読んだことがあります」"
translation = "「오오…… 그것이 수아마. 서적에서 읽은 적이 있습니다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「生まれたばかりの子供の肌のようにもちもちで、一口含めば、口腔の粘膜に吸いつく官能的食感」"
translation = "「갓 태어난 아이의 피부처럼 말랑말랑하고, 한 입 머금으면 구강 점막에 달라붙는 관능적 식감.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「いと素晴らしき甘味の名は――すあま」"
translation = "「참으로 훌륭한 단맛의 이름은―― 수아마.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「伝説のアイテムみたいな記述だね……すあまなのに」"
translation = "「전설의 아이템 같은 기술이네…… 수아마인데.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「食べてもＯＫ？」"
translation = "「먹어도 OK?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「もっちろん。召し上がれー！」"
translation = "「당여언하지. 맛있게 먹으렴~!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「いただきます……あむ、あむ……」"
translation = "「잘 먹겠습니다…… 냠, 냠…….」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「んーーっ<emoji=heart04>」"
translation = "「으음──<emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「とってもデリシャスです……もっちもっち、むっちゃむっちゃ」"
translation = "「정말 델리셔스해요…… 쫀득쫀득, 쩝쩝.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あらあら、いい食べっぷり～」"
translation = "「어머머, 복스럽게도 먹네~」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「この世にこんな美味しい食べ物があったなんて……なくなってしまうのがもったいないです」"
translation = "「이 세상에 이렇게 맛있는 음식이 있었다니…… 없어져 버리는 게 아까울 정도예요.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「星徒会の業務を頑張ってくれたら、もっともーっと和菓子を買ってあげるわ」"
translation = "「성도회 업무를 열심히 해주면 화과자를 더어~ 많이 사줄게.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「私も買ってあげちゃおうかな。おまんじゅうに～、おはぎに～、鯛焼きに～、きんつばに～」"
translation = "「나도 사줘 버릴까~ 만쥬에~, 오하기에~, 붕어빵에~, 킨츠바에~」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「見事にあんこばっかりですね……」"
translation = "「죄다 팥소뿐이네요…….」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「なんと。もっと仕事をください。和菓子のためなら、なんでもやります」"
translation = "「이럴 수가. 업무를 더 주세요. 화과자를 위해서라면 뭐든 하겠습니다.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふふふ、今『なんでも』って言ったわね？」"
translation = "「후후후, 방금 『뭐든』이라고 했지?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「会長！\u3000悪い顔しないでください！」"
translation = "「회장님! 나쁜 표정 짓지 마세요!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（……あれ、アナちゃん？\u3000キョロキョロと周りを見回してるけど、何か探し物？）"
translation = "(……어라, 아나짱? 두리번두리번 주변을 둘러보고 있는데, 뭐 찾는 거라도 있나?)"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（ヴィーナス会長に振り回されない、たまのお休み。プライベートを満喫しているなら声をかけるのも迷惑かな）"
translation = "(비너스 회장님에게 휘둘리지 않는 모처럼의 휴일. 사생활을 만끽하고 있다면 말을 거는 것도 실례겠지.)"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「あ、マトイ先輩」"
translation = "「아, 마토이 선배.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あ……こんにちは、アナちゃん」"
translation = "「아…… 안녕, 아나짱.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ちょうどいいところに。助けてください」"
translation = "「마침 잘 오셨어요. 도와주세요.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「何かな。私にできることなら、なんでも言って」"
translation = "「뭐가 있을까. 내가 할 수 있는 일이라면 뭐든 말해줘.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「先ほどから和菓子を売っているお店を探しているのですが、なかなか見つからないのです」"
translation = "「아까부터 화과자를 파는 가게를 찾고 있는데, 좀처럼 보이지 않아요.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そうかなあ……コンビニやスーパーにも普通に売ってるはずだけど」"
translation = "「그럴까나…… 편의점이나 슈퍼에도 보통 팔 텐데.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あ、でも美味しい大福のお店なら知ってるよ」"
translation = "「아, 그래도 맛있는 찹쌀떡 가게라면 알고 있어.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「大福！\u3000書物で読みました。一口頬張れば、大いなる福を手に入れられるという幸運の和菓子……」"
translation = "「대복! 서적에서 읽었습니다. 한 입 가득 베어 물면 커다란 복을 얻을 수 있다는 행운의 화과자…….」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「大福ってそんなラッキーアイテムだったかなあ……」"
translation = "「찹쌀떡이 그렇게 럭키 아이템이었나…….」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「生の果物を入れることもあると聞きます」"
translation = "「생과일을 넣기도 한다고 들었습니다.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「うんうん、イチゴ大福とかあるね」"
translation = "「응응, 딸기 찹쌀떡 같은 것도 있지.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ただでさえ美味しいあんこに、ジューシーなフルーツを合わせてしまうなんて……可能性の塊です。和菓子の世界は奥深いです」"
translation = "「그 자체로도 맛있는 팥소에 육즙 가득한 과일을 곁들이다니…… 가능성의 덩어리예요. 화과자의 세계는 심오하네요.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あ、ここ、ここ」"
translation = "「아, 여기야, 여기.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「おお……！\u3000和菓子のジュエリーボックス」"
translation = "「오오……! 화과자의 주얼리 박스.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「むふー」"
translation = "「무후─.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（アナちゃん、大福に釘付けになってる……このお店に連れてきて正解だったかな？）"
translation = "(아나짱, 찹쌀떡에 못 박혀 있네…… 이 가게에 데려오길 잘했나?)"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ねえねえ、見て！\u3000メロン大福だって。美味しそ。こっちはみかん……へえ、こんなのもあるんだ」"
translation = "「봐봐, 멜론 찹쌀떡이래. 맛있겠다. 이쪽은 귤…… 헤에, 이런 것도 있구나.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「いっぱい種類がありすぎて……じゅるり……どれも食べたくなってしまいます」"
translation = "「종류가 너무 많아서…… 쥬르륵…… 전부 먹고 싶어져요.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「おこづかいが無くなっちゃわないように気を付けなくちゃね」"
translation = "「용돈이 다 떨어지지 않게 조심해야겠네.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そうですね。でも今の私は覚悟が決まってますから、限界まで行っちゃいますよ」"
translation = "「그러게요. 하지만 지금의 저는 각오가 되어 있으니까, 한계까지 가버릴 거예요.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「えへへ、じゃあ私も便乗して買っちゃおーっと♪\u3000私の体も甘い物を欲しがっているのだ！」"
translation = "「에헤헤, 그럼 나도 덩달아 사버려야지♪ 내 몸도 단걸 원하고 있어!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「私もです、むっふー♪」"
translation = "「저도예요, 무후─♪」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（喜んでくれてるみたいでよかった……でも、まだまだ表情からだと感情が読めないなぁ）"
translation = "(기뻐해 주는 것 같아서 다행이다…… 하지만 아직 표정만 봐서는 감정을 읽기 어렵네.)"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（私、まだアナちゃんのことよく知らないんだよね。……せっかく同じ星徒会になれたんだし、もっと知りたいな）"
translation = "(나, 아직 아나짱에 대해 잘 모르지. ……기껏 같은 성도회가 됐으니 더 알고 싶어.)"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（ううん、役員だから、じゃなくて。もっとシンプルに友達として……）"
translation = "(아니, 임원이라서가 아니라. 좀 더 심플하게 친구로서…….)"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（よし──！）"
translation = "(좋아──!)"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「アナちゃん、この後って何か用事ある？」"
translation = "「아나짱, 이다음에 뭐 용건 있어?」"

