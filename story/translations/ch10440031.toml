[[dialogue]]
speaker = "unk"
original = "第１話,反転の白き力,P"
translation = "제1화, 반전의 하얀 힘, P"

[[dialogue]]
speaker = "unk"
original = "『反転のロストアイテム』の騒動から数週間後――。"
translation = "『반전의 로스트 아이템』 소동으로부터 몇 주 후――."

[[dialogue]]
speaker = "unk"
original = "街に出現したモンスターを前に、俺はプリムラや他の星騎士たちと共に戦っていた。"
translation = "거리에 출현한 몬스터 앞에서, 나는 프리뮬라나 다른 성기사들과 함께 싸우고 있었다."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「眷族たちよ！\u3000我の力を受け、存分に暴れるがよい！」"
translation = "「권속들이여! 나의 힘을 받아, 마음껏 날뛰어라!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「放出供給！\u3000ボルテージリレイザー！！」"
translation = "「방출 공급! 볼티지 릴레이저!!」"

[[dialogue]]
speaker = "unk"
original = "よし！\u3000ディマイズブレイカーッ！！"
translation = "좋아! 디마이즈 브레이커!!"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「――！？」"
translation = "「――!?」"

[[dialogue]]
speaker = "unk"
original = "プリムラの新たな能力でエネルギーを受け取った俺は、渾身の一撃を放つ。その光が、目の前のモンスターたちを一掃した。"
translation = "프리뮬라의 새로운 능력으로 에너지를 전달받은 나는, 혼신의 일격을 날린다. 그 빛이, 눈앞의 몬스터들을 일소했다."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「フハハハ！\u3000見たか！\u3000これが我の『リバースフォーム』の力なのじゃ♪」"
translation = "「후하하하! 보았느냐! 이것이 나의 『리버스 폼』의 힘이니라♪」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「いや、倒したのは『にーにー』だし！」"
translation = "「아니, 쓰러뜨린 건 『오빠』거든!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ふふん、我が供給してやったエネルギーのおかげじゃ。つまり我が倒したも同然なのじゃ♪」"
translation = "「후흥, 내가 공급해 준 에너지 덕분이니라. 즉 내가 쓰러뜨린 것이나 다름없느니라♪」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ほれ、クーシェン、貴様にもエネルギーを分けてやる。それをもって、我の眷族のごとく戦うのじゃ！」"
translation = "「자, 쿠셴, 네놈에게도 에너지를 나눠주마. 그것을 가지고, 나의 권속처럼 싸우거라!」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「もう、しょうがないな～。よっと！」"
translation = "「정말, 어쩔 수 없네~. 영차!」"

[[dialogue]]
speaker = "unk"
original = "その後、プリムラの支援もあり、戦闘は無事に終了した。"
translation = "그 후, 프리뮬라의 지원도 있어, 전투는 무사히 종료되었다."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「どうじゃ、眷族よ？\u3000リバースフォームの回復能力、だいぶ扱えるようになってきたじゃろう？」"
translation = "「어떠냐, 권속이여? 리버스 폼의 회복 능력, 제법 다룰 수 있게 되지 않았느냐?」"

[[dialogue]]
speaker = "unk"
original = "ああ、プリムラのおかげで助かった"
translation = "아아, 프리뮬라 덕분에 살았어"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「当然じゃ♪\u3000我にかかれば、後方支援など造作もないのじゃ！」"
translation = "「당연하지♪ 나에게 맡기면, 후방 지원 따위는 일도 아니니라!」"

[[dialogue]]
speaker = "unk"
original = "俺はそのまま、プリムラの頭をぽんぽんと撫でる。"
translation = "나는 그대로, 프리뮬라의 머리를 쓰담쓰담 쓰다듬는다."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「あっ……こら！\u3000我は頭を撫でていいなどと、許可した覚えはないぞ！\u3000……フヘへへぇ<emoji=heart04>」"
translation = "「앗…… 이봐! 나는 머리를 쓰다듬어도 좋다고, 허락한 기억은 없다! ……후헤헤헤에<emoji=heart04>」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「あ～、プリムラだけずるい～！\u3000ボクも頑張って戦ったんだから、撫でてよ、にーにー♪」"
translation = "「아~, 프리뮬라만 치사해~! 나도 열심히 싸웠으니까, 쓰다듬어줘, 오빠♪」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ダメじゃ！\u3000眷族は我と付き合っている『恋人』なのじゃからな！\u3000目の前で浮気など認めん！」"
translation = "「안 되느니라! 권속은 나와 사귀고 있는 『연인』이니까 말이다! 눈앞에서 바람피우는 건 인정 못 하느니라!」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「む～、ケチ～！」"
translation = "「무~, 구두쇠~!」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「そういえばさ、前から気になってたんだけど～」"
translation = "「그러고 보니 말야, 전부터 궁금했던 건데~」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「プリムラがにーにーと付き合ってるなら――『エッチなこと』ってもうしたの？」"
translation = "「프리뮬라가 오빠랑 사귀고 있다면―― 『야한 짓』은 벌써 했어?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「はぁっ！？\u3000ま、また何を言い出すんじゃ貴様は！？」"
translation = "「하앗!? 또, 또 무슨 소리를 하는 것이냐 네놈은!?」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「ウキキ♪\u3000だって気になるじゃん！\u3000恋人ならエッチなことはするものでしょ？」"
translation = "「우키키♪ 그야 궁금하잖아! 연인이라면 야한 짓은 하는 법이지?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ししし、しとらんわ！\u3000まだ！」"
translation = "「하, 하, 하지 않았느니라! 아직!」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「え～？\u3000ウッソだ～！\u3000プリムラ、恥ずかしがってるけど、絶対エッチなこと好きそうだし～！」"
translation = "「에~? 거짓말~! 프리뮬라, 부끄러워하고 있지만, 분명 야한 짓 좋아할 것 같고~!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「誰がじゃ！\u3000サチと一緒にするでない！」"
translation = "「누가 말이냐! 사치랑 똑같이 취급하지 마라!」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「じゃあ、にーにーと全然エッチなことしてないの？\u3000それが本当なら、まだまだお子ちゃまだな～」"
translation = "「그럼, 오빠랑 전혀 야한 짓 안 한 거야? 그게 정말이라면, 아직 어린애네~」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「はぁ！？\u3000子供扱いするでないわ！\u3000言っとくが、我はもう眷族とキスまで済ませとるんじゃからな！」"
translation = "「하아!? 어린애 취급하지 마라! 말해두겠는데, 나는 이미 권속과 키스까지 끝냈으니까 말이다!」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「えっ、キス！？\u3000本当に！？」"
translation = "「엣, 키스!? 정말로!?」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「じゃあ、キスの味ってどんな感じなの！？\u3000やっぱりエッチな味！？\u3000教えて教えて！」"
translation = "「그럼, 키스 맛은 어떤 느낌이야!? 역시 야한 맛!? 알려줘 알려줘!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「はぁ！？\u3000そ、そんな恥ずかしいこと、誰が言うか！」"
translation = "「하아!? 그, 그런 부끄러운 걸, 누가 말할까 보냐!」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「あ～、本当はキスしたとかウソなんじゃないの～？」"
translation = "「아~, 사실은 키스했다는 거 거짓말 아냐~?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ウソではない！\u3000初対面の時に、我は眷族とキスしたんじゃからな！？」"
translation = "「거짓말이 아니니라! 첫 대면 때, 나는 권속과 키스했으니까 말이다!?」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「じゃあ今、ここでやってみせてよ！\u3000そうしたら信じてあげてもいいよ～？」"
translation = "「그럼 지금, 여기서 보여줘 봐! 그러면 믿어줄 수도 있어~?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ぬっ……！\u3000ひ、人前でなどと、ハレンチなこと……！」"
translation = "「느윽……! 사, 사람들 앞에서 그런, 파렴치한 짓을……!」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「できないんだ～？\u3000恋人なのに～？」"
translation = "「못하는구나~? 연인인데도~?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ぐぬぬ……よかろう！\u3000見ておれよ！？」"
translation = "「구누누…… 좋다! 똑똑히 보거라!?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「眷族！\u3000今からキスするのじゃ！」"
translation = "「권속! 지금부터 키스할 것이니라!」"

[[dialogue]]
speaker = "unk"
original = "ぷ、プリムラ、落ち着いて……！"
translation = "프, 프리뮬라, 진정해……!"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「こやつをギャフンと言わせてやるのじゃ！\u3000ほら……ん～っ<emoji=heart04>」"
translation = "「이 녀석의 코를 납작하게 해줄 것이니라! 자…… 응~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "恥ずかしさで顔を真っ赤にしながら、目を閉じ、唇を突き出してくるプリムラ。"
translation = "부끄러움에 얼굴을 새빨갛게 붉히며, 눈을 감고, 입술을 내미는 프리뮬라."

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「じ～っ♪」"
translation = "「빤~히♪」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ん～～っ……！」"
translation = "「응~~……!」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「ウキウキ♪\u3000ワクワク♪」"
translation = "「우키우키♪ 와쿠와쿠♪」"

[[dialogue]]
speaker = "unk"
original = "俺はどうするか一瞬迷い――。"
translation = "나는 어떻게 할지 잠시 망설이다가――."

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「あっ！？\u3000ちょっ、にーにー！？\u3000見えないよ！？」"
translation = "「앗!? 잠깐, 오빠!? 안 보이잖아!?」"

[[dialogue]]
speaker = "unk"
original = "俺はさっとクーシェンの目を手で覆い、その隙に。"
translation = "나는 재빨리 쿠셴의 눈을 손으로 가리고, 그 틈에."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「んっ――ちゅっ<emoji=heart04>」"
translation = "「응――쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "素早く、プリムラの唇にキスをしてみせた。"
translation = "재빠르게, 프리뮬라의 입술에 키스를 해 보였다."

[[dialogue]]
speaker = "unk"
original = "ちゃんとしたぞ"
translation = "제대로 했어"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「う、うむ……<emoji=heart04>\u3000本当にキスしたのじゃ……<emoji=heart04>」"
translation = "「우, 우무……<emoji=heart04> 정말로 키스했느니라……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「あぁ～っ！？\u3000ちょっ、やられたぁ～！？\u3000キスを間近で観察できるチャンスだと思ったのに～！」"
translation = "「아아~앗!? 잠깐, 당했다아~! 키스를 가까이서 관찰할 기회라고 생각했는데~!」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「せ、せめて……『味』は！？\u3000キスの味はどうだったの！？」"
translation = "「적, 적어도…… 『맛』은!? 키스 맛은 어땠어!?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「それは……秘密じゃ<emoji=heart04>」"
translation = "「그것은…… 비밀이니라<emoji=heart04>」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「ムキーーッ！\u3000なんか悔しーーーっ！！」"
translation = "「무키잇! 왠지 분해ーーー!!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「フヘへ……<emoji=heart04>」"
translation = "「후헤헤……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺と目を合わせながら、照れた笑顔を浮かべるプリムラなのだった。"
translation = "나와 눈을 맞추며, 수줍은 미소를 짓는 프리뮬라였다."

