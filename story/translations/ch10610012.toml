[[dialogue]]
speaker = "unk"
original = "第2話,メイドと先生,P"
translation = "제2화, 메이드와 선생님, P"

[[dialogue]]
speaker = "unk"
original = "ある日、カフェテリアに行くと、マリオンさんとトワちゃん先生が一緒にランチしている姿を見かけた。"
translation = "어느 날, 카페테리아에 가니 마리온 씨와 토와짱 선생님이 함께 런치하고 있는 모습을 보게 되었다."

[[dialogue]]
speaker = "トワ先生"
original = "「あっ、会長くんだ～♪\u3000キミもお昼を食べにきたの？」"
translation = "「앗, 회장군이다~♪ 너도 점심 먹으러 왔어?」"

[[dialogue]]
speaker = "マリオン"
original = "「会長様、ご機嫌麗しゅう。ああ、今日も実にお可愛らしいご尊顔ですこと♪\u3000見ているだけでこのマリオン、ご飯を何杯もおかわりできてしまいそうです<emoji=heart04>」"
translation = "「회장님, 평안하신지요. 아아, 오늘도 실로 사랑스러운 존안이시네요♪ 보는 것만으로도 이 마리온, 밥을 몇 그릇이나 더 먹을 수 있을 것 같습니다<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
original = "「え！？\u3000な、何言ってんのマリオン……会長くんはどう見ても男の子で、マリオンの好きな女の子じゃないけど……って、まさか！？」"
translation = "「에!? 무, 무슨 소리 하는 거야 마리온…… 회장군은 누가 봐도 남자아이고, 마리온이 좋아하는 여자아이가 아니잖아…… 설마!?」"

[[dialogue]]
speaker = "マリオン"
original = "「ええ、その通りです、トワ。会長様こそが、私が先程話していた、最近気になってアプローチしている男の子です」"
translation = "「네, 맞습니다, 토와. 회장님이야말로 제가 아까 말했던, 최근 신경 쓰여서 어프로치하고 있는 남자아이예요」"

[[dialogue]]
speaker = "トワ先生"
original = "「私の教え子なんだけど！？」"
translation = "「내 제자인데!?」"

[[dialogue]]
speaker = "マリオン"
original = "「大丈夫です。私は齢が離れていても気にしませんので。むしろ可愛い年下の子は大好物です」"
translation = "「괜찮습니다. 저는 나이 차이가 나도 신경 쓰지 않으니까요. 오히려 귀여운 연하는 정말 좋아합니다」"

[[dialogue]]
speaker = "トワ先生"
original = "「それは年下側が言う台詞だからね！？」"
translation = "「그건 연하 쪽에서 하는 대사거든!?」"

[[dialogue]]
speaker = "unk"
original = "えっと……２人は知り合いだったの？"
translation = "저기…… 두 사람은 아는 사이였어?"

[[dialogue]]
speaker = "マリオン"
original = "「ええ、実はそうなんです。私が昔、流星学園に通っていた時の同級生で――」"
translation = "「네, 사실 그래요. 제가 예전에 유성학원에 다녔을 때의 동급생이라서――」"

[[dialogue]]
speaker = "トワ先生"
original = "「昔じゃなくて、最近ね！？\u3000まだ最近だから！」"
translation = "「옛날이 아니라 최근이지!? 아직 최근이니까!」"

[[dialogue]]
speaker = "マリオン"
original = "「まあまあ、うふふ♪\u3000トワは今も変わらずお可愛いので、大丈夫ですよ<emoji=heart04>」"
translation = "「자자, 우후후♪ 토와는 지금도 변함없이 사랑스러우니까 괜찮아요<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「――それで、私とトワは、流星学園に在学中、一緒に星徒会をやっていた仲なんです」"
translation = "「――그래서 저와 토와는 유성학원 재학 중에 함께 성도회를 했던 사이랍니다」"

[[dialogue]]
speaker = "unk"
original = "２人は星徒会所属だったの！？"
translation = "두 사람은 성도회 소속이었어!?"

[[dialogue]]
speaker = "トワ先生"
original = "「えっへん♪\u3000実はそうなんだ。しかもマリオンは、それだけじゃなくて――」"
translation = "「엣헴♪ 사실 그래. 게다가 마리온은 그것뿐만이 아니라――」"

[[dialogue]]
speaker = "トワ先生"
original = "「なんと！\u3000当時最強の星徒会長だったんだよ～！」"
translation = "「무려! 당시 최강의 성도회장이었어~!」"

[[dialogue]]
speaker = "マリオン"
original = "「――最強は大げさですが、お恥ずかしながら一時期、務めさせていただいておりました」"
translation = "「――최강은 과장입니다만, 부끄럽게도 한때 맡았던 적은 있습니다」"

[[dialogue]]
speaker = "トワ先生"
original = "「なに言ってんの。今だって現役の星騎士で、実戦形式の訓練指導を頼まれるくらい強いじゃない」"
translation = "「무슨 소리야. 지금도 현역 성기사고, 실전 형식의 훈련 지도를 부탁받을 정도로 강하잖아」"

[[dialogue]]
speaker = "unk"
original = "現役なのに、どうしてメイドを？"
translation = "현역인데 어째서 메이드를?"

[[dialogue]]
speaker = "マリオン"
original = "「必要とあらばもちろん戦いますが、私は戦うことよりも、皆様のお世話をする方が好きなんですよ」"
translation = "「필요하다면 물론 싸우겠지만, 저는 싸우는 것보다 여러분을 보살피는 쪽을 더 좋아하거든요」"

[[dialogue]]
speaker = "マリオン"
original = "「ふふっ♪\u3000こうして星見家のメイドとして働いていれば、学園に仕事として出入りできて、誰の目もはばかることなく、可愛い子を沢山愛でることができますから<emoji=heart04>」"
translation = "「후훗♪ 이렇게 호시미 가의 메이드로 일하고 있으면 학원에 업무로서 드나들 수 있고, 누구의 눈치도 보지 않고 귀여운 아이를 잔뜩 사랑해 줄 수 있으니까요<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
original = "「そこはもう少し、はばかってほしいけどね！？」"
translation = "「그 부분은 조금 더 눈치를 봐줬으면 좋겠는데!?」"

[[dialogue]]
speaker = "マリオン"
original = "「それに私は、星見家メイド隊の雑務担当。物量で仕事を回すのが得意ですので」"
translation = "「게다가 저는 호시미 가 메이드대의 잡무 담당. 물량으로 업무를 처리하는 게 특기라서요」"

[[dialogue]]
speaker = "unk"
original = "物量って、どういう……？"
translation = "물량이라니, 그게 무슨……?"

[[dialogue]]
speaker = "マリオン"
original = "「そこはまだ、会長様に説明していませんでしたね。こういうことです――」"
translation = "「그 점은 아직 회장님께 설명해 드리지 않았군요. 이런 겁니다――」"

[[dialogue]]
speaker = "マリオン"
original = "「お目汚し失礼致します、会長様」"
translation = "「눈을 어지럽게 해드려 죄송합니다, 회장님」"

[[dialogue]]
speaker = "unk"
original = "えっ！？\u3000マリオンが２人！？"
translation = "엣!? 마리온이 두 명!?"

[[dialogue]]
speaker = "トワ先生"
original = "「マリオンの能力はね、『星力の糸で人形を縫って作る』ことなんだ。簡単に言うなら、『人形使い』ってやつだね」"
translation = "「마리온의 능력은 말이야, 『성력의 실로 인형을 꿰매 만드는』 거야. 간단히 말하자면 『인형사』 같은 거지」"

[[dialogue]]
speaker = "トワ先生"
original = "「マリオンが学園最強の星徒会長だったのは、そうして人形を大量生産できることによる圧倒的物量戦術が強かったからなんだよ」"
translation = "「마리온이 학원 최강의 성도회장이었던 건 그렇게 인형을 대량 생산할 수 있는 압도적인 물량 전술이 강했기 때문이야」"

[[dialogue]]
speaker = "マリオン"
original = "「この能力もあって、皆様の身の回りをお世話するメイドの仕事は、まさに私の天職というわけです」"
translation = "「이 능력도 있어서 여러분의 곁을 보살피는 메이드 일은 그야말로 제 천직인 셈입니다」"

[[dialogue]]
speaker = "マリオン"
original = "「ですから会長様も、私にご用命の際は遠慮なくお呼び下さいね♪」"
translation = "「그러니까 회장님도 제게 용건이 있으실 때는 사양 말고 불러주세요♪」"

[[dialogue]]
speaker = "マリオン"
original = "「会長様の為なら私、喜んでなんでもご奉仕致しますので……うふふっ<emoji=heart04>」"
translation = "「회장님을 위해서라면 저, 기쁘게 무엇이든 봉사해 드릴 테니까요…… 우후후<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
original = "「なんでもは禁止で！」"
translation = "「무엇이든은 금지!」"

[[dialogue]]
speaker = "マリオン"
original = "「え～。ダメですか？」"
translation = "「에~. 안 되나요?」"

[[dialogue]]
speaker = "トワ先生"
original = "「何がなんでもです！\u3000マリオンの何でもは、アウトな匂いがするから、先生権限で禁止！」"
translation = "「무조건 안 돼! 마리온의 '무엇이든'은 아웃인 냄새가 나니까, 선생님 권한으로 금지!」"

[[dialogue]]
speaker = "マリオン"
original = "「む～。会長様だって、男の子だから色々と持て余すと思うのですが……」"
translation = "「으음~. 회장님도 남자아이니까 이것저것 주체하지 못하실 거라 생각하는데요……」"

[[dialogue]]
speaker = "トワ先生"
original = "「アウト丸出しなんだけど！？」"
translation = "「아웃이 뻔히 보이는데!?」"

[[dialogue]]
speaker = "マリオン"
original = "「～♪\u3000～～♪」"
translation = "「~♪ ~~♪」"

[[dialogue]]
speaker = "unk"
original = "えっと……マリオンさん？"
translation = "저기…… 마리온 씨?"

[[dialogue]]
speaker = "マリオン"
original = "「はい♪\u3000なんでしょう、会長様」"
translation = "「네♪ 무슨 일이신가요, 회장님」"

[[dialogue]]
speaker = "マリオン"
original = "「――最近ずっと側にいる気がする、ですか？」"
translation = "「――최근 계속 곁에 있는 느낌이 든다, 고요?」"

[[dialogue]]
speaker = "マリオン"
original = "「ふふっ♪\u3000ご心配なく。星見家や流星学園での仕事は、ちゃんと人形達に任せておりますので、大丈夫です」"
translation = "「후훗♪ 걱정 마세요. 호시미 가문이나 류세이 학원에서의 일은 제대로 인형들에게 맡겨두었으니, 괜찮답니다」"

[[dialogue]]
speaker = "マリオン"
original = "「何でも、というのはトワに禁止されてしまいましたが、お世話禁止とは言われておりませんので――」"
translation = "「뭐든지 하라는 건 토와에게 금지당해 버렸지만, 뒤치다꺼리 금지라고는 듣지 못했으니까요――」"

[[dialogue]]
speaker = "マリオン"
original = "「これからは会長様のメイドとしても、働かせていただきますね<emoji=heart04>」"
translation = "「앞으로는 회장님의 메이드로서도 일하도록 할게요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それ以降、マリオンさんは本当に俺の世話を焼いてくれるようになるのだった。"
translation = "그 이후로 마리온 씨는 정말로 내 뒷바라지를 해주게 되는 것이었다."

