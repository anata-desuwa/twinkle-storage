[[dialogue]]
speaker = "unk"
original = "それからジグは、新星星徒会が極星学園と戦った後に現れ、俺に接触してきた。"
translation = "그 후 지그는 신성 성도회가 극성 학원과 싸운 뒤에 나타나 나에게 접촉해 왔다."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "『いや、しかし失態だ。記念すべきアルタイルとデネブの星騎士の初邂逅を見届けに来たのだけど、遅くなってしまった』"
translation = "『아니, 하지만 실책이군. 기념비적인 알타이르와 데네브의 성기사의 첫 해후를 지켜보러 왔는데, 늦어버렸어.』"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "『まあ終わってしまったものは仕方がない。挨拶も済んだことだし、出直すとしよう』"
translation = "『뭐 끝난 일은 어쩔 수 없지. 인사도 끝났으니, 이만 물러나도록 할까.』"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "『でもお土産くらいは──置いていこうかな』"
translation = "『하지만 선물 정도는── 두고 갈까나.』"

[[dialogue]]
speaker = "unk"
original = "そしてジグは俺にリクリエの力を植え付け、その場を去って行った。"
translation = "그리고 지그는 나에게 리크리에의 힘을 심어두고 그 자리를 떠났다."

[[dialogue]]
speaker = "unk"
original = "そのリクリエの力は俺の体の中に巣食い、俺を暴走させた。"
translation = "그 리크리에의 힘은 내 몸속에 둥지를 틀고 나를 폭주시켰다."

[[dialogue]]
speaker = "unk"
original = "梨緒とヴィーナスが止めてくれなければ、きっと俺はリクリエに堕ちていただろう。"
translation = "리오와 비너스가 멈춰주지 않았다면, 분명 나는 리크리에로 타락했을 것이다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「その後、私たち選挙管理員会は、再びジグと戦った」"
translation = "「그 후, 우리 선거관리위원회는 다시 한번 지그와 싸웠다.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だが──」"
translation = "「하지만──」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "『私は今度こそ世界を救う！』"
translation = "『나는 이번에야말로 세계를 구하겠다!』"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "『リクリエを退けることが救いだとは思わないけど、君たちの言葉を借りてあえて言おう』"
translation = "『리크리에를 물리치는 것이 구제라고 생각하지는 않지만, 너희들의 말을 빌려 굳이 말해주지.』"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "『世界を救うなんて君たちにはできないよ』"
translation = "『세계를 구하는 것 따위 너희들에게는 불가능해.』"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "『可能性は──ない』"
translation = "『가능성은── 없다.』"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「戦いの中で、一瞬だけジグを正気に戻すことができた」"
translation = "「싸움 도중, 찰나의 순간 지그를 제정신으로 돌릴 수 있었느니라.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だがジグを取り戻すことはできなかった」"
translation = "「하지만 지그를 되찾을 수는 없었지.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "『戻ってこい、ジグ！\u3000私と一緒に、今度こそ世界を救おう！』"
translation = "『돌아와라, 지그! 나와 함께, 이번에야말로 세계를 구하자!』"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "『世界を……救う……』"
translation = "『세계를…… 구한다……』"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "『いいや、それは無理だ』"
translation = "『아니, 그건 무리야.』"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "『私は可能性を見た。だけど世界を救える未来なんてどこにもなかった』"
translation = "『나는 가능성을 봤어. 하지만 세계를 구할 수 있는 미래 따위 어디에도 없었지.』"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "『可能性……？\u3000君は何を言って……？』"
translation = "『가능성……? 네가 무슨 소리를……?』"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "『レナーテ・<ruby>Ｚ<rt>ジグ</rt></ruby>・サイフリート……ふむ、確かに私はそう呼ばれていたこともあったようだ。君が正しかったみたいね、そこは謝ろう』"
translation = "『레나테·Z·자이프리트…… 흠, 확실히 나는 그렇게 불리던 때도 있었던 모양이네. 네가 옳았던 것 같아, 그 부분은 사과하지.』"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "『でも今の私には、遠い昔……まるで前世のことのように感じるよ』"
translation = "『하지만 지금의 나에게는, 먼 옛날…… 마치 전생의 일처럼 느껴져.』"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "『もう一度言おう。私は“真なる神の騎士”。かつてベガで戦っていた星騎士とは別の存在だ』"
translation = "『다시 한번 말하지. 나는 “진정한 신의 기사”. 과거 베가에서 싸우던 성기사와는 별개의 존재다.』"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「可能性はないと、あの時ジグは言っていた」"
translation = "「가능성은 없다고, 그때 지그는 말했느니라.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「その言葉にあんな意味があったとはな……」"
translation = "「그 말에 그런 의미가 담겨 있었을 줄이야……」"

