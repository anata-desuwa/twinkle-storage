[[dialogue]]
speaker = "unk"
original = "第２話,星見家一同の願い,P"
translation = "제2화, 호시미 가문 일동의 소원, P"

[[dialogue]]
speaker = "unk"
original = "アポロ達にクリスマスフォームが渡された数日後、俺は星見家から嘆願書を受け取っていた。"
translation = "아폴로 일행에게 크리스마스 폼이 지급된 며칠 후, 나는 호시미 가문으로부터 탄원서를 받았다."

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「す、すみません、お忙しいのにお呼びだてしてしまって」"
translation = "「저, 죄송합니다, 바쁘신데 불러내 버려서.」"

[[dialogue]]
speaker = "unk"
original = "これはどういうこと？"
translation = "이게 어떻게 된 일이야?"

[[dialogue]]
speaker = "unk"
original = "嘆願書ってなに？"
translation = "탄원서라니 뭐야?"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「これはふかーーい事情があるんです」"
translation = "「이건 기이이이픈 사정이 있어요.」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「どうか星見家、並びに星見家メイド隊一同の願いをお聞きとどけください」"
translation = "「부디 호시미 가문, 그리고 호시미 가문 메이드대 일동의 소원을 들어주세요.」"

[[dialogue]]
speaker = "unk"
original = "願いってなんでしょう？"
translation = "소원이란 게 뭔가요?"

[[dialogue]]
speaker = "unk"
original = "えっと……"
translation = "저기……"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「姉さんがクリスマスフォームになってくれないんです！」"
translation = "「언니가 크리스마스 폼으로 변신해 주지 않아요!」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「みんながアポロ様を追いかけ回すものですから、すっかりクリスマスフォームになるのを嫌がってしまっているんです……」"
translation = "「모두가 아폴로 님을 쫓아다니는 바람에, 완전히 크리스마스 폼이 되는 걸 싫어하게 되셔서……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「姉さんの恋人の緋宮会長が頼めば、変身してくれるんじゃないかと思って」"
translation = "「언니의 연인인 히노미야 회장님이 부탁하면 변신해 주지 않을까 해서요.」"

[[dialogue]]
speaker = "unk"
original = "うーん、どうしよう？"
translation = "음, 어쩌지?"

[[dialogue]]
speaker = "unk"
original = "そういうことなら"
translation = "그런 일이라면"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「おい魔王！\u3000あたしを売るんじゃない！\u3000おまえだけはあたしの味方だろ！」"
translation = "「어이 마왕! 나를 팔지 마! 너만은 내 편이잖아!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「大丈夫、これは裏切りになりませんから。姉さんをもっと可愛くするだけですから、結果オーライです」"
translation = "「괜찮아요, 이건 배신이 아니니까요. 언니를 더 귀엽게 만들 뿐이니, 결과적으론 잘된 일이죠.」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「それに緋宮会長も満更ではないのでは？\u3000恋人の可愛い姿をもっと見たいはず」"
translation = "「게다가 히노미야 회장님도 내심 바라고 계신 것 아닙니까? 연인의 귀여운 모습을 더 보고 싶으실 터.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「こらー、はなせーーっ！！\u3000卑怯だぞ！\u3000魔王を使ってあたしをいいなりにさせようだなんて！」"
translation = "「이거 놔라, 놓으라고!! 비겁하다! 마왕을 써서 나를 마음대로 조종하려 하다니!」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「うふふふふっ、逃がしませんよ、アポロ様」"
translation = "「우후후후훗, 놓치지 않겠어요, 아폴로 님.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ああっ！\u3000アポロ様がマリオンさんに捕まりました！」"
translation = "「아앗! 아폴로 님이 마리온 씨에게 붙잡혔어요!」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「ごめんなさい、これは仕方ないことなの。ですが、役得役得……♪」"
translation = "「미안해요, 이건 어쩔 수 없는 일이야. 하지만 이건 역득이지, 역득……♪」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ぅぅぅ……」"
translation = "「으으으……」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「今でさえひどいのに、クリスマスフォームになったらもっととんでもないことに……」"
translation = "「지금도 끔찍한데, 크리스마스 폼이 되면 더 엄청난 일이……」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「こんなことされたら……おまえたちのこと、嫌いになっちゃうからなっ！」"
translation = "「이런 짓을 하면…… 너희들, 싫어해 버릴 거니까!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「うぐっ！？」"
translation = "「우굿!?」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「そ、そんな事を言われますと……！」"
translation = "「그, 그런 말씀을 하시면……!」"

[[dialogue]]
speaker = "unk"
original = "アポロ！"
translation = "아폴로!"

[[dialogue]]
speaker = "unk"
original = "今だ！"
translation = "지금이다!"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「しまった！」"
translation = "「아차!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ナイスだっ、魔王！\u3000やっぱりおまえはあたしの相棒だな！\u3000今から２人のコンビネーションを見せてやる！」"
translation = "「나이스다, 마왕! 역시 넌 내 파트너야! 지금부터 둘의 콤비네이션을 보여주자구!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「戦闘？\u3000このまま戦闘するのでしょうか？」"
translation = "「전투? 이대로 전투를 하는 건가요?」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「待ちに待った戦闘シーンです。お嬢様、可愛いアポロ様にやっつけてもらいましょう」"
translation = "「기다리고 기다리던 전투 장면입니다. 아가씨, 귀여운 아폴로 님에게 당해버리자고요.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「でもせめてっ、クリスマスフォームで……クリスマスフォームでお願いします……」"
translation = "「하지만 적어도, 크리스마스 폼으로…… 크리스마스 폼으로 부탁드려요……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「あ、あのっ、フィオナ様もこう仰ってますので、なんとかなりませんか？」"
translation = "「저, 저기, 피오나 님도 이렇게 말씀하시니 어떻게 안 될까요?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「うっ……フェニエルがそう言うなら……おまえにはたくさん世話になったしなぁ」"
translation = "「윽…… 페니엘이 그렇게 말한다면…… 너에겐 신세를 많이 졌으니까 말이야.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ナイスよ、フニ！」"
translation = "「나이스야, 페니!」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「でももう一押し欲しいところですね……チラッ」"
translation = "「하지만 한 번 더 밀어붙였으면 좋겠네요…… 힐끗.」"

[[dialogue]]
speaker = "unk"
original = "アポロ、俺からも頼んでいいか？"
translation = "아폴로, 나도 부탁해도 될까?"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「魔王もか……。そんなにあたしのクリスマスフォームが見たいのか？」"
translation = "「마왕 너까지냐……. 그렇게 내 크리스마스 폼이 보고 싶은 거야?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「見たい見たい、見たいですっ！」"
translation = "「보고 싶어요 보고 싶어, 보고 싶다구요!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「フィオナには聞いてないぞ？」"
translation = "「피오나한테 물어본 거 아니다?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「姉さんひどい！」"
translation = "「언니 너무해!」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「土下座でもなんでもしますから、どうかクリスマスフォームを……」"
translation = "「도게자든 뭐든 할 테니, 부디 크리스마스 폼을……」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「待て待て待て！\u3000気軽に土下座しようとするな！」"
translation = "「기다려 기다려 기다려! 아무렇지 않게 도게자 하려 하지 마!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「では……クリスマスフォームになってくれますか？」"
translation = "「그럼…… 크리스마스 폼이 되어 주실 건가요?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「……今日だけだぞ。ずっとは無理だからな！」"
translation = "「……오늘뿐이다. 계속은 무리니까 말이야!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「やったぁ！\u3000姉さん大好きです！\u3000愛してますっ！」"
translation = "「만세! 언니 정말 좋아해요! 사랑해요!」"

[[dialogue]]
speaker = "unk"
original = "大好きだよ、アポロ♥"
translation = "정말 좋아해, 아폴로♥"

[[dialogue]]
speaker = "unk"
original = "俺も愛してるよ♥"
translation = "나도 사랑해♥"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「お、おまえっ、どさくさに紛れて告白すんなぁ！」"
translation = "「너, 너 이 녀석, 틈을 타서 고백하지 마!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「そーゆーのは２人きりの時にするもんだろ……ったく、恥ずかしい」"
translation = "「그런 건 둘이 있을 때 하는 거잖아…… 참 나, 부끄럽게.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「姉さんが照れてる……可愛い……」"
translation = "「언니가 부끄러워하고 있어…… 귀여워……」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「録画はお任せ下さい。１秒たりとも逃しません」"
translation = "「녹화는 제게 맡겨 주십시오. 1초도 놓치지 않겠습니다.」"

[[dialogue]]
speaker = "unk"
original = "そのデータを下さい"
translation = "그 데이터를 줘"

[[dialogue]]
speaker = "unk"
original = "後で俺にも見せて"
translation = "나중에 나한테도 보여줘"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「おい、おまえら！\u3000魔王も！\u3000ふざけるのもいい加減にしろ！」"
translation = "「어이, 너희들! 마왕 너도! 장난도 적당히 하라구!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「もういい！\u3000クリスマスフォームでもなんでもなってやる！\u3000その代わり、ここにいる全員ボコボコにするから覚悟しろよ！」"
translation = "「이제 됐어! 크리스마스 폼이든 뭐든 되어 주마! 그 대신 여기 있는 녀석들 전부 박살을 내줄 테니 각오하라구!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「変身っ、クリスマスフォォーーーム！！！」"
translation = "「변신, 크리스마스 포오오오옴!!!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「これでよし！\u3000意外と動きやすいこともわかってるしな！\u3000どのくらい戦えるのか試してみるぞ！」"
translation = "「이걸로 됐지! 의외로 움직이기 편하다는 것도 알았으니까! 어느 정도 싸울 수 있는지 시험해 보겠다!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「うおおおおおおーーーーーーーっ！！」"
translation = "「우오오오오오오ーーーーーー오!!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「きゃー！\u3000姉さんかわいい……じゃなかった、かっこいい！」"
translation = "「꺄ー! 언니 귀여워……가 아니라, 멋있어!」"

[[dialogue]]
speaker = "unk"
original = "──と、そんな調子で。"
translation = "──하고, 그런 분위기로."

[[dialogue]]
speaker = "unk"
original = "これからクリスマスまでのしばらくの間、星見家ではアポロのクリスマスフォームを巡って果てない戦いが繰り広げられるのだった。"
translation = "앞으로 크리스마스까지 당분간, 호시미 가문에서는 아폴로의 크리스마스 폼을 둘러싼 끝없는 싸움이 펼쳐지는 것이었다."

