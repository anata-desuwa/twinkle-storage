[[dialogue]]
speaker = "unk"
original = "アルテとプトラが流星市国に来てから数日が経過した。"
translation = "아르테와 푸트라가 유성시국에 온 지 며칠이 지났다."

[[dialogue]]
speaker = "unk"
original = "クマロボたちの襲撃は何度か受けていたが、アルテもプトラも力の使い方に慣れてきたのか、難なく撃退することに成功している。"
translation = "곰 로봇들의 습격을 몇 번 받았지만, 아르테와 푸트라도 힘을 쓰는 법에 익숙해졌는지 무난하게 격퇴하는 데 성공하고 있다."

[[dialogue]]
speaker = "unk"
original = "そして、こちらの生活にすっかり馴染んだようで、日々を退屈せずに過ごしていた。"
translation = "그리고 이곳 생활에 완전히 적응한 듯, 나날을 지루하지 않게 보내고 있었다."

[[dialogue]]
speaker = "アルテ"
original = "「ふむふむ……流星市国・焼肉百選……」"
translation = "「흠흠…… 유성시국·야키니쿠 100선……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「って、ちょっと慣れ過ぎじゃない？」"
translation = "「저기, 너무 적응한 거 아니야?」"

[[dialogue]]
speaker = "アルテ"
original = "「順応性は高い方ですから」"
translation = "「순응성은 높은 편이라서요.」"

[[dialogue]]
speaker = "unk"
original = "何を読んでるの？"
translation = "뭘 읽고 있어?"

[[dialogue]]
speaker = "アルテ"
original = "「『流星ウォーカー』です。街の情報が詰まっていて便利なんですよ」"
translation = "「『유성 워커』예요. 거리 정보가 가득해서 편리하더라고요.」"

[[dialogue]]
speaker = "unk"
original = "満喫してるな～"
translation = "만끽하고 있구만~"

[[dialogue]]
speaker = "アルテ"
original = "「せっかくこんな珍しい世界に来たのですから、帰ったら館長たちにしこたま自慢してあげようと思います」"
translation = "「기껏 이런 희귀한 세계에 왔으니, 돌아가면 관장님 일행에게 실컷 자랑해 줄 생각이에요.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それで、どこか興味を引かれるところはあるのかしら？」"
translation = "「그래서 어디 흥미가 가는 곳이라도 있어?」"

[[dialogue]]
speaker = "アルテ"
original = "「色々ありますが一番は……ここでしょうか？」"
translation = "「여러 군데 있지만 가장 가보고 싶은 곳은…… 여기일까요?」"

[[dialogue]]
speaker = "unk"
original = "秋葉原？"
translation = "아키하바라?"

[[dialogue]]
speaker = "アルテ"
original = "「この世界に来た時から気になっていたんですよね、街中に絵画が溢れていることが」"
translation = "「이 세계에 왔을 때부터 신경 쓰였거든요, 거리 곳곳에 회화가 넘쳐난다는 게.」"

[[dialogue]]
speaker = "アルテ"
original = "「道を歩けば建物のあちこちに絵が貼り付けられている。これはアテネスでは見られない景色です」"
translation = "「길을 걷다 보면 건물의 여기저기에 그림이 붙어 있죠. 이건 아테네스에서는 볼 수 없는 풍경이에요.」"

[[dialogue]]
speaker = "アルテ"
original = "「秋葉原の街は、特にそういった絵画──『イラスト』と呼ぶようですけど、それで埋め尽くされているという話ではないですか」"
translation = "「아키하바라 거리는 특히 그런 회화── 『일러스트』라고 부르는 모양입니다만, 그걸로 가득 차 있다는 소문이 있지 않나요?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「アルテが藝術家っぽいことを言ってる！？」"
translation = "「아르테가 예술가 같은 소리를 하고 있어!?」"

[[dialogue]]
speaker = "アルテ"
original = "「私は正真正銘の、しかも一流の藝術家なんですけど……記憶力が欠如しているのですか？」"
translation = "「저는 진짜, 그것도 일류 예술가입니다만…… 기억력이 결핍된 건가요?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「だって、こっちの世界に来て絵を描いてるところを見たことないし」"
translation = "「그치만 이쪽 세계에 와서 그림 그리는 걸 본 적이 없는걸.」"

[[dialogue]]
speaker = "アルテ"
original = "「私はその気にならないと筆はとらない主義なので」"
translation = "「저는 그럴 마음이 생기지 않으면 붓을 들지 않는 주의라서요.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「おお～、またまた藝術家っぽいことを！」"
translation = "「오오~ 또 예술가 같은 소리를!」"

[[dialogue]]
speaker = "アルテ"
original = "「だから私は正真正銘の藝術家だと言っているでしょう！」"
translation = "「그러니까 저는 진짜 예술가라고 말하고 있잖아요!」"

[[dialogue]]
speaker = "unk"
original = "それじゃ今日は秋葉原に行ってみる？"
translation = "그럼 오늘은 아키하바라에 가볼까?"

[[dialogue]]
speaker = "アルテ"
original = "「ええ、案内をお願いします」"
translation = "「네, 안내 부탁드려요.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「せっかくだからフィオナたちにも連絡してみましょう♪」"
translation = "「이왕 가는 거 피오나 일행에게도 연락해 보자♪」"

[[dialogue]]
speaker = "プトラ"
original = "「うわー、ここが秋葉原！\u3000他の街とはちょっと雰囲気が違うね」"
translation = "「우와~ 여기가 아키하바라! 다른 거리랑은 분위기가 좀 다르네.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「プトラもすっかりこっちの世界に慣れたわね～」"
translation = "「푸트라도 완전히 이쪽 세계에 익숙해졌네~」"

[[dialogue]]
speaker = "プトラ"
original = "「えへへ、みんなに色々連れてってもらったから」"
translation = "「에헤헤, 모두가 여기저기 데려다준 덕분이야.」"

[[dialogue]]
speaker = "プトラ"
original = "「あっ、ゲームセンターがいっぱいあるよ！\u3000クレーンゲームはあるかな？」"
translation = "「앗, 게임 센터가 잔뜩 있어! 인형 뽑기도 있을까?」"

[[dialogue]]
speaker = "アポロ"
original = "「クレーンゲームが好きなのか？」"
translation = "「인형 뽑기를 좋아해?」"

[[dialogue]]
speaker = "プトラ"
original = "「うん、あの釣り上げる感じがね、海の女の血を滾らせるんだよ。うぃーん、えーいって♪」"
translation = "「응, 그 낚아 올리는 느낌이 말이야, 바다 여인의 피를 끓게 하거든. 위잉~ 에잇! 하고♪」"

[[dialogue]]
speaker = "フィオナ"
original = "「あっちの建物は１フロアまるまるクレーンゲームですよ」"
translation = "「저쪽 건물은 한 층 전체가 인형 뽑기 기계예요.」"

[[dialogue]]
speaker = "プトラ"
original = "「１フロア全部？\u3000すごい！\u3000行ってみたい！」"
translation = "「한 층 전부? 대단해! 가보고 싶어!」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふふ、じゃ少し遊んでいきましょうか」"
translation = "「후후, 그럼 조금 놀다 갈까요?」"

[[dialogue]]
speaker = "プトラ"
original = "「えへへ～、おっさかなさん、おっさかなさん♪\u3000おっきなおっきなおっさかなさん♪」"
translation = "「에헤헤~ 물꼬기님, 물꼬기님♪ 커다랗고 커다란 물꼬기님♪」"

[[dialogue]]
speaker = "フィオナ"
original = "「大きいのが取れてよかったですね」"
translation = "「큰 걸 뽑아서 다행이네요.」"

[[dialogue]]
speaker = "プトラ"
original = "「アドバイスしてもらったおかげだよ～、ひとりじゃ絶対に無理だった」"
translation = "「조언해 준 덕분이야~ 혼자서는 절대 무리였을 거야.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「クロトのアドバイスも的確だったわね～」"
translation = "「쿠로토의 조언도 정확했지~」"

[[dialogue]]
speaker = "プトラ"
original = "「うんうん、すごく分かりやすかったよ」"
translation = "「응응, 정말 알기 쉬웠어.」"

[[dialogue]]
speaker = "unk"
original = "さっきからアルテが大人しい気がするけど"
translation = "아까부터 아르테가 얌전한 것 같은데."

[[dialogue]]
speaker = "アルテ"
original = "「ええ……」"
translation = "「네……」"

[[dialogue]]
speaker = "アルテ"
original = "「あちこちに何気なく飾られているイラストに、技術の粋が詰め込まれていて……興味深いです」"
translation = "「여기저기 아무렇지 않게 장식된 일러스트에 기술의 정수가 담겨 있어서…… 흥미롭네요.」"

[[dialogue]]
speaker = "アルテ"
original = "「とはいえ、私が本気になってしまったら、この秋葉原でも頂点を取ること間違いなしですけどね」"
translation = "「그렇긴 해도 제가 마음만 먹는다면 이 아키하바라에서도 정점에 서는 건 따 놓은 당상이지만요.」"

[[dialogue]]
speaker = "プトラ"
original = "「さすが藝術家さん、そういうのも分かっちゃうんだね」"
translation = "「역시 예술가님, 그런 것도 딱 보면 아는구나.」"

[[dialogue]]
speaker = "アルテ"
original = "「私からすれば、まるで町全体が美術館のようです」"
translation = "「제가 보기엔 마치 마을 전체가 미술관 같아요.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「少しはインスピレーションが湧いてきたかしら？\u3000言ってくれれば画材なんかはすぐに用意してあげるわよ」"
translation = "「조금은 영감이 떠올랐을까? 말만 하면 화구 같은 건 금방 준비해 줄게.」"

[[dialogue]]
speaker = "アルテ"
original = "「残念ですが。技術は素晴らしいと思いますが、それとこれとは別なので」"
translation = "「아쉽지만요. 기술은 훌륭하다고 생각하지만, 그것과 이건 별개라서.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「もったいぶるわね～」"
translation = "「되게 튕기네~」"

[[dialogue]]
speaker = "プトラ"
original = "「あたしもアルテの絵、見てみたいな」"
translation = "「나도 아르테의 그림, 보고 싶어.」"

[[dialogue]]
speaker = "unk"
original = "気が向いたら描いてみてよ"
translation = "생각나면 한번 그려봐."

[[dialogue]]
speaker = "アルテ"
original = "「そうですね……まぁ、気が向いたら、ということで」"
translation = "「글쎄요…… 뭐, 마음 내키면 말이죠.」"

[[dialogue]]
speaker = "クマロボ"
original = "「クマァーーーーーーーーーー！！！！！！」"
translation = "「쿠마아아아아아아아아아아!!!!!!」"

[[dialogue]]
speaker = "アポロ"
original = "「性懲りもないぜ。いつものみたいに、かるーくぶっ飛ばしてやる！\u3000変身！！」"
translation = "「끈질기기도 하네. 평소처럼 가볍게 날려버려 주지! 변신!!」"

[[dialogue]]
speaker = "プトラ"
original = "「アルテ、あたしたちも！」"
translation = "「아르테, 우리도!」"

[[dialogue]]
speaker = "アルテ"
original = "「えー、面倒なのでみんなに任せます。私は応援してますよ」"
translation = "「에~ 귀찮으니까 다들 알아서 하세요. 저는 응원하고 있을게요.」"

[[dialogue]]
speaker = "プトラ"
original = "「そんなこと言わずに、さあ！」"
translation = "「그러지 말고, 자!」"

[[dialogue]]
speaker = "アルテ"
original = "「はいはい、わかりました」"
translation = "「네네, 알겠습니다.」"

