[[dialogue]]
speaker = "unk"
original = "第３話,トリシャの布教活動,P"
translation = "제3화, 트리샤의 포교 활동"

[[dialogue]]
speaker = "unk"
original = "放課後の星徒会長は非常に忙しい。"
translation = "방과 후의 성도회장은 매우 바쁘다."

[[dialogue]]
speaker = "unk"
original = "学園の行事やアステラの対策など、取り組まねばならない雑事も多種多様で、他の役員のサポートがあっても決して楽なものではない。"
translation = "학원 행사나 아스텔라 대책 등, 해결해야 할 잡무도 다종다양해서, 다른 임원들의 서포트가 있어도 결코 쉬운 일이 아니다."

[[dialogue]]
speaker = "unk"
original = "今日はかなり忙しい上に、マトイとアナも都合が悪く不在なので、正直猫の手も借りたいほどなんだが――"
translation = "오늘은 꽤 바쁜 데다 마토이와 아나도 사정이 있어 부재중이라, 솔직히 고양이 손이라도 빌리고 싶은 심정인데――"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ぴょーん、ぴょーん、ぴょーん♪」"
translation = "「뿅, 뿅, 뿅♪」"

[[dialogue]]
speaker = "トリシャ"
original = "「ぴょーん、ぴょーん、ぴょーん……」"
translation = "「뿅, 뿅, 뿅……」"

[[dialogue]]
speaker = "unk"
original = "ジャクリーヌならともかくトリシャさんまで"
translation = "자클린이라면 몰라도 트리샤 씨까지"

[[dialogue]]
speaker = "unk"
original = "いったいどういうこと？"
translation = "도대체 어떻게 된 거야?"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「うるさいゆ♪\u3000余の遊びを邪魔するなゆ♪」"
translation = "「시끄러운유♪ 유의 놀이를 방해하지 마라유♪」"

[[dialogue]]
speaker = "トリシャ"
original = "「ぴょーん、ぴょーん……フフ、会長さんも一緒にどうですか？」"
translation = "「뿅, 뿅…… 후후, 회장님도 같이 어떠신가요?」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ぴょーん、ぴょーん♪\u3000ダメなの、言わないとやらない時点で見込みないの♪」"
translation = "「뿅, 뿅♪ 안 되는유, 말하지 않으면 안 하는 시점에서 가망 없는유♪」"

[[dialogue]]
speaker = "トリシャ"
original = "「見込みがないのではなく、まだ情報を知り得てないだけだと思います……」"
translation = "「가망이 없는 게 아니라, 아직 정보를 알지 못할 뿐이라고 생각합니다……」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「こら、ぴょんぴょんやめるなゆ♪\u3000お前は止まれない生き物ゆ♪」"
translation = "「이놈, 뿅뿅 멈추지 마라유♪ 너는 멈출 수 없는 생물인유♪」"

[[dialogue]]
speaker = "unk"
original = "そんなの聞いてないんだけど"
translation = "그런 말 못 들었는데"

[[dialogue]]
speaker = "unk"
original = "止まれない生き物！？"
translation = "멈출 수 없는 생물!?"

[[dialogue]]
speaker = "トリシャ"
original = "「ぴょーん、ぴょーん……すみません、会長さん……映画の中ではそのような設定になっているんです……ぴょーん」"
translation = "「뿅, 뿅…… 죄송해요, 회장님…… 영화 속에서는 그런 설정으로 되어 있어요…… 뿅」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ゆっゆっゆ♪\u3000この前は名演技だったゆ♪\u3000褒めてやるゆ～♪」"
translation = "「유유유♪ 요 전에는 명연기였다유♪ 칭찬해 주는유~♪」"

[[dialogue]]
speaker = "トリシャ"
original = "「ぴょーん、ぴょーん……ありがとう、ジャクリーヌさん……あ、そこ、ちゃんとぴょんぴょんしてください」"
translation = "「뿅, 뿅…… 고마워요, 자클린 씨…… 아, 거기, 제대로 뿅뿅 해주세요.」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「しまったぴょん♪\u3000ぴょんぴょんを止めたらダメだったゆ～♪\u3000ぴょーん、ぴょーん、ぴょーん♪」"
translation = "「실수했다뿅♪ 뿅뿅을 멈추면 안 됐던유~♪ 뿅, 뿅, 뿅♪」"

[[dialogue]]
speaker = "unk"
original = "俺の周りをぐるぐる回るのが謎すぎる"
translation = "내 주변을 빙글빙글 도는 게 너무 수수께끼다"

[[dialogue]]
speaker = "unk"
original = "遊ぶのはいいけど、どうしてここで？"
translation = "노는 건 좋지만, 왜 여기서?"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「余はトリシャと遊んでただけゆ♪\u3000映画の真似っこゆ～♪」"
translation = "「짐은 트리샤랑 놀고 있었을 뿐이유♪ 영화 흉내내기유~♪」"

[[dialogue]]
speaker = "トリシャ"
original = "「ぴょんぴょんするの、楽しいですよ……」"
translation = "「폴짝폴짝 뛰는 거, 즐거워요……」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「適度なジャンプは健康にもいいゆ♪\u3000お前も暇なら一緒にぴょんぴょんするゆ～♪」"
translation = "「적당한 점프는 건강에도 좋다유♪ 너도 한가하면 같이 폴짝폴짝 뛰자유~♪」"

[[dialogue]]
speaker = "トリシャ"
original = "「フフフ……健康にいいのは事実ですね……」"
translation = "「후후후…… 건강에 좋다는 건 사실이네요……」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「映画では列を作ってみんなでぴょんぴょんしてたゆ♪\u3000とっても楽しそうだったゆ～♪」"
translation = "「영화에서는 줄을 서서 다 같이 폴짝폴짝 뛰었다유♪ 정말 즐거워 보였다유~♪」"

[[dialogue]]
speaker = "トリシャ"
original = "「実際にやってみると、これが意外と楽しくて……ぴょーん、ぴょーん……」"
translation = "「실제로 해보니 이게 의외로 즐거워서…… 폴짝, 폴짝……」"

[[dialogue]]
speaker = "unk"
original = "ぽよんぽよんするから……"
translation = "출렁출렁하니까……"

[[dialogue]]
speaker = "unk"
original = "でもぴょんぴょんしてると……"
translation = "하지만 폴짝폴짝 뛰고 있으면……"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ぽよーん、ぽよーん……これで合ってるゆ？」"
translation = "「출렁, 출렁…… 이걸로 맞냐유?」"

[[dialogue]]
speaker = "トリシャ"
original = "「はい……ジャクリーヌさんもぽよんぽよんしています……」"
translation = "「네…… 재클린 씨도 출렁출렁하고 있어요……」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ぽよーん、ぽよーん、ぽよーん……♪」"
translation = "「출렁, 출렁, 출렁……♪」"

[[dialogue]]
speaker = "トリシャ"
original = "「会長さんは……私の方を見ていれば大丈夫です……私なら、彼女なので……フフフ、問題ありません……」"
translation = "「회장님은…… 저만 보고 계시면 괜찮아요…… 저라면, 여자친구니까…… 후후후, 문제없습니다……」"

[[dialogue]]
speaker = "トリシャ"
original = "「でも、せっかくなら会長さんも参加してみませんか？\u3000ぴょんぴょんしながら私の後ろについてきてください……」"
translation = "「하지만 기왕이면 회장님도 참가해 보지 않겠어요? 폴짝폴짝 뛰면서 제 뒤를 따라와 주세요……」"

[[dialogue]]
speaker = "unk"
original = "ぴょーん、ぴょーん、ぴょーん♪"
translation = "폴짝, 폴짝, 폴짝♪"

[[dialogue]]
speaker = "unk"
original = "えっと、それじゃ……"
translation = "에또, 그럼……"

[[dialogue]]
speaker = "トリシャ"
original = "「フフフ、お上手です……ぴょーん、ぴょーん……」"
translation = "「후후후, 솜씨 좋으시네요…… 폴짝, 폴짝……」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「お前なかなかやるの。あの映画見てないくせにうまいゆ♪」"
translation = "「너 제법 한다유. 그 영화 안 봤으면서 잘한다유♪」"

[[dialogue]]
speaker = "トリシャ"
original = "「映画の中のゾンビ型幽霊は、このように集団行動をするのです……オトモダチを大勢引き連れて楽しそうにしていて……」"
translation = "「영화 속의 좀비형 유령은 이렇게 집단행동을 한답니다…… 친구들을 잔뜩 이끌고 즐거워 보여서……」"

[[dialogue]]
speaker = "unk"
original = "じゃあ俺もオトモダチ"
translation = "그럼 나도 친구"

[[dialogue]]
speaker = "トリシャ"
original = "「そう、ですね……でも……」"
translation = "「그렇, 네요…… 하지만……」"

[[dialogue]]
speaker = "トリシャ"
original = "「オトモダチと恋人は……両立するのでしょうか……？」"
translation = "「친구와 연인은…… 양립할 수 있는 걸까요……?」"

[[dialogue]]
speaker = "トリシャ"
original = "「会長さんが恋人のままでも大丈夫なら……オトモダチでも……いいですよ……」"
translation = "「회장님이 연인인 채로도 괜찮다면…… 친구라도…… 좋아요……」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ちょっと待つゆ。試しにやらせるのはいいけど、勝手に仲間に入れるなゆ」"
translation = "「잠깐 기다리라유. 시험 삼아 시켜보는 건 좋지만, 마음대로 동료로 넣지 마라유」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「あの映画を見てないやつはダメゆ♪\u3000見たら仲間に入れてやってもいいゆ～♪」"
translation = "「그 영화 안 본 녀석은 안 된다유♪ 보면 동료로 넣어줄 수도 있다유~♪」"

[[dialogue]]
speaker = "トリシャ"
original = "「一理ありますね。映画を見ていないと、楽しげにぴょんぴょんしているだけになってしまいます」"
translation = "「일리가 있네요. 영화를 안 보면 그저 즐겁게 폴짝폴짝 뛰는 것뿐이게 되어버리니까요」"

[[dialogue]]
speaker = "トリシャ"
original = "「楽しい映画でしたので……会長さんにも是非見て欲しいです……」"
translation = "「즐거운 영화였으니까…… 회장님도 꼭 보셨으면 해요……」"

[[dialogue]]
speaker = "トリシャ"
original = "「ちょうどここに布教用のデータがありますので、一緒に見ましょう」"
translation = "「마침 여기에 포교용 데이터가 있으니까 같이 봐요」"

[[dialogue]]
speaker = "トリシャ"
original = "「いい気分転換になりますよ♪」"
translation = "「좋은 기분 전환이 될 거예요♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「わぁい♪\u3000余も見るゆ～♪」"
translation = "「와아♪ 짐도 볼 거유~♪」"

[[dialogue]]
speaker = "トリシャ"
original = "「ぴょーん、ぴょーん、ぴょーん……♪」"
translation = "「폴짝, 폴짝, 폴짝……♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ぴょーん、ぴょーん、ぴょーん♪」"
translation = "「폴짝, 폴짝, 폴짝♪」"

[[dialogue]]
speaker = "unk"
original = "ぴょーん、ぴょーん、ぴょーん♪"
translation = "폴짝, 폴짝, 폴짝♪"

[[dialogue]]
speaker = "unk"
original = "こうして布教活動を受けた俺は、見事映画にドハマりして、トリシャさんと一緒にぴょんぴょんするのだった。"
translation = "이렇게 포교 활동을 받은 나는 훌륭하게 영화에 푹 빠져서, 트리샤 씨와 함께 폴짝폴짝 뛰는 것이었다."

