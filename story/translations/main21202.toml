[[dialogue]]
speaker = "unk"
original = "第２話,天機の星眼,B"
translation = "제2화, 천기의 성안, B"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「やあ魔王。邪魔するよ」"
translation = "「안녕, 마왕. 실례 좀 할게.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「天界で挨拶はさせてもらったが、落ち着いた場で話すのは初めてになるかな？」"
translation = "「천계에서 인사는 나눴지만, 차분한 장소에서 이야기하는 건 처음인가?」"

[[dialogue]]
speaker = "unk"
original = "彼女はレナーテ・<ruby>Ｚ<rt>ジグ</rt></ruby>・サイフリート──平行世界ベガの星騎士だ。最近までリクリエの使徒として操られていたが、梨緒の懸命な説得によって解放された。"
translation = "그녀는 레나테 <ruby>Z<rt>지그</rt></ruby> 사이프리트── 평행세계 베가의 성기사다. 최근까지 리크리에의 사도로서 조종당하고 있었으나, 리오의 필사적인 설득에 의해 해방되었다."

[[dialogue]]
speaker = "unk"
original = "ジグとはいずれ膝を突き合わせて話をしたいと思っていたが、彼女の方から訪ねて来てくれるとは。"
translation = "지그와는 언젠가 무릎을 맞대고 이야기를 나누고 싶다고 생각했지만, 그녀 쪽에서 먼저 찾아와 줄 줄이야."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ジグ、天界での負傷はもういいのか？」"
translation = "「지그, 천계에서의 부상은 이제 괜찮은 거야?」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ああ。久しぶりにトワちゃん先生の治療を受けたよ。このとおり、動くぶんにはもう問題ない」"
translation = "「아아. 오랜만에 토와 선생님의 치료를 받았어. 보시다시피, 움직이는 데는 이제 문제없어.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それならよかった。心配してたんだ」"
translation = "「그거 다행이네. 걱정했었어.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「……君はお人好しだね。仮面に操られていたとはいえ、私は散々迷惑をかけたというのに」"
translation = "「……너는 참 참견쟁이구나. 가면에 조종당하고 있었다고는 해도, 내가 그토록 폐를 끼쳤는데도 말이야.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「改めて──本当に申し訳なかった。そして、心からの感謝を」"
translation = "「새삼스럽지만── 정말 미안했어. 그리고 진심으로 감사를.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「お礼なら梨緒に。彼女が一番の功労者だ」"
translation = "「고맙다는 인사는 리오에게 해. 그녀가 일등 공신이니까.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「もちろんアガサにも礼は伝えているよ。でもそれとは別に、君にもきちんとしておきたくてね」"
translation = "「물론 아가사에게도 감사는 전했지. 하지만 그것과는 별개로, 너에게도 확실히 해두고 싶어서 말이야.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「敗戦の将ではあるが、できうる限り力になるよ」"
translation = "「패전한 장수이긴 하지만, 할 수 있는 한 힘이 되어줄게.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ、頼らせてもらう。ところで梨緒は一緒じゃないのか？\u3000話があるって聞かされていたんだけど」"
translation = "「아아, 의지하도록 할게. 그런데 리오는 같이 안 왔어? 할 말이 있다고 들었는데.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ああ、そのことなら──」"
translation = "「아아, 그 일이라면──」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「すまない魔王、遅くなった。まったくジグのやつはどこに──」"
translation = "「미안 마왕, 늦었어. 정말이지 지그 녀석은 어디에──」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「やあ。遅かったねアガサ」"
translation = "「안녕. 늦었네, 아가사.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ジグ！？\u3000散々に探したんだぞ、どうして君が先に星徒会室に……！」"
translation = "「지그!? 한참 찾았단 말이다, 어째서 네가 먼저 성도회실에……!」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「<ruby>アルタイル<rt>こっち</rt></ruby>の新星学園が、ベガとどう違うのか気になってね。好奇心を満たしがてら、散歩をしてたんだ」"
translation = "「<ruby>알타이르<rt>이쪽</rt></ruby>의 신성학원이 베가와 어떻게 다른지 궁금해서 말이야. 호기심도 채울 겸 산책을 좀 했지.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「本当に君というやつは……！」"
translation = "「정말 너라는 녀석은……!」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「仮面がはがれても相変わらずの自由人だねー、ジグは」"
translation = "「가면이 벗겨져도 여전한 자유인이네~, 지그는.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「よお、魔王！\u3000会いに来たぞっ！」"
translation = "「여어, 마왕! 만나러 왔다구!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「選管メンバーが勢ぞろい……ってわけじゃないな。ベアトリスは？」"
translation = "「선관 멤버가 전원 집합……인 건 아니네. 베아트리스는?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ベアトは一足先に会議室。極星学園の人達の相手をしてもらってるよ」"
translation = "「베아토는 한발 먼저 회의실에 갔어. 극성학원 사람들을 상대해 주고 있거든.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「デネブから来たあいつらにも、共闘を要請するんだろ？\u3000早く行こうぜ！」"
translation = "「데네브에서 온 녀석들에게도 공투를 요청할 거잖아? 빨리 가자구!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「待て。その前に選管の方から魔王に話がある」"
translation = "「기다려. 그전에 선관 쪽에서 마왕에게 할 말이 있다.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「改めて紹介しよう、彼女が平行世界ベガの──」"
translation = "「새삼스럽지만 소개하지, 그녀가 평행세계 베가의──」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ああ、省略してくれて構わないよ。自己紹介は天界で済ませたし、魔王の方も何度も名乗られたって挨拶に困るだろうからね」"
translation = "「아아, 생략해도 상관없어. 자기소개는 천계에서 끝냈고, 마왕 쪽도 몇 번이나 통성명을 하면 인사가 곤란할 테니까 말이야.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……レナーテ・<ruby>Ｚ<rt>ジグ</rt></ruby>・サイフリート。ファーストネームはレナーテだが、ジグの方が慣れているだろうからそう呼ぶといい」"
translation = "「……레나테 <ruby>Z<rt>지그</rt></ruby> 사이프리트. 퍼스트 네임은 레나테지만, 지그 쪽이 익숙할 테니 그렇게 부르면 된다.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「──いや。別に『アレ』でも『お前』でも『そこの』でも。好きに呼ぶといいだろう」"
translation = "「──아니. 딱히 『저기』나 『너』나 『거기』라고 불러도 되고. 마음대로 부르도록 해.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ふふ。そうやってすぐムキになるところが可愛いね、アガサは」"
translation = "「후후. 그렇게 바로 욱하는 점이 귀엽네, 아가사는.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ああもう、うるさいっ……ともかく魔王。ジグはこれからしばらく、選管でその身を預かることにしたい。その許可をもらいに来た」"
translation = "「아아 정말, 시끄러워…… 어쨌든 마왕. 지그는 이제부터 당분간 선관에서 신변을 맡기로 했다. 그 허가를 받으러 왔어.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「腕の立つ星騎士をフリーにしておいたら、会長さんも管理しづらいでしょ？\u3000ジグに用事があったら、選管に連絡してって感じだね」"
translation = "「실력 좋은 성기사를 방치해 두면 회장님도 관리하기 힘들 거 아냐? 지그에게 용건이 있으면 선관으로 연락해 달라는 느낌이지.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「魔王の指示があれば、ジグは火の中でも水の中でも即座に派遣する。文字通りこき使ってくれ」"
translation = "「마왕의 지시가 있다면 지그는 불 속이든 물 속이든 즉각 파견하겠다. 말 그대로 마음껏 부려 먹어라.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ひどいね、まだ傷も癒え切っていないのに」"
translation = "「너무하네, 아직 상처도 다 낫지 않았는데.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「呑気に散歩できる元気があるくせに何を言う。それで魔王、どうだろうか？」"
translation = "「한가하게 산책할 기운은 있으면서 무슨 소리냐. 그래서 마왕, 어때?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「問題ないよ。アルタイルで過ごす以上、ジグにも居場所は必要だ。梨緒が支えてあげてくれ」"
translation = "「문제없어. 알타이르에서 지내는 이상 지그에게도 거처는 필요해. 리오가 잘 챙겨줘.」"

[[dialogue]]
speaker = "unk"
original = "仮面を被っていた時の記憶は本人に残っている──かつてアポロはそう言っていた。"
translation = "가면을 쓰고 있었을 때의 기억은 본인에게 남아 있다── 예전에 아폴로는 그렇게 말했었다."

[[dialogue]]
speaker = "unk"
original = "である以上は、少しでも気心の知れた人をそばに置いておくべきだろう。アポロをフィオナが支えたように。"
translation = "그런 이상은 조금이라도 마음이 맞는 사람을 곁에 두어야 할 것이다. 아폴로를 피오나가 지탱해 주었듯이."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「……？\u3000どーした、魔王？」"
translation = "「……? 왜 그래, 마왕?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いいや、何でもないよ」"
translation = "「아니, 아무것도 아니야.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「じゃあ、これからジグの力が必要な時は、選管の誰かに連絡をするよ」"
translation = "「그럼 앞으로 지그의 힘이 필요할 때는 선관 중 누군가에게 연락할게.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「よし！\u3000話は終わりだな！\u3000デネブの奴らに会いに──」"
translation = "「좋아! 이야기는 끝났지! 데네브 녀석들을 만나러──」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「はーいストップ。もうちょっとだけ話は続くよ」"
translation = "「네~ 스톱. 이야기는 조금 더 이어진다구.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ええ～……！？」"
translation = "「에에~……!?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ああ。私も詳しいことは聞いてないんだが……ジグの方から報告したい情報があるらしい」"
translation = "「아아. 나도 자세한 건 듣지 못했다만…… 지그 쪽에서 보고하고 싶은 정보가 있다는 모양이다.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「すまないねアポロ。できる限り短くまとめよう」"
translation = "「미안해, 아폴로. 가능한 한 짧게 요약할게.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「魔王もアガサから話は聞いてると思う──私の『眼』についてだ」"
translation = "「마왕도 아가사에게 이야기는 들었을 거야── 내 『눈』에 대해서 말이지.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「私の一族の中で受け継がれるこの力は『天機の星眼』と呼ばれている」"
translation = "「내 일족 대대로 전해지는 이 힘은 『천기의 성안』이라 불리고 있어.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「視認した人、もしくは物に秘められた才能や潜在能力を捉え、可能性を視通す眼」"
translation = "「시인한 사람, 혹은 물건에 깃든 재능이나 잠재능력을 포착해 가능성을 꿰뚫어 보는 눈.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「まあ端的に言えば、未来を視通す眼だと思ってくれればいいよ」"
translation = "「뭐 단적으로 말하자면, 미래를 꿰뚫어 보는 눈이라고 생각하면 돼.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「消耗が激しいからあまり濫用するとリスクもあるが、この『眼』も魔王、君のために使わせてもらうよ」"
translation = "「소모가 심해서 너무 남용하면 리스크도 있지만, 이 『눈』도 마왕, 너를 위해 사용하도록 할게.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「未来を視る眼……改めて聞くとかっこいいな……！」"
translation = "「미래를 보는 눈…… 다시 들으니까 멋진걸……!」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ふふ、そうかい？」"
translation = "「후후, 그래?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「聞くたびに思うよね。苦労しそうな眼」"
translation = "「들을 때마다 생각하는 건데. 고생할 것 같은 눈이네.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「それもそうだね。天機の星眼は、あくまで実現可能性がある未来を視るだけで、不都合な未来を絶対に避けられるようなものではない」"
translation = "「그것도 그렇네. 천기의 성안은 어디까지나 실현 가능성이 있는 미래를 볼 뿐이지, 불리한 미래를 반드시 피할 수 있는 그런 건 아니야.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「事実、私はベガにいた頃、何度も自身の可能性を視た。世界の可能性を視た」"
translation = "「사실 나는 베가에 있었을 적에 몇 번이나 자신의 가능성을 봤어. 세계의 가능성을 봤지.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「視るたびに、どれだけ足掻いても変わらない結末を観測するばかり……まあ、それはいいんだ」"
translation = "「볼 때마다 아무리 발버둥 쳐도 변하지 않는 결말을 관측할 뿐…… 뭐, 그건 됐어.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ハッキリと言おう。私は使徒だった頃、魔王……君の可能性を幾度も覗いていた」"
translation = "「확실히 말할게. 나는 사도였을 적에 마왕…… 너의 가능성을 몇 번이고 엿보고 있었어.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「今よりも先の未来。魔王である君が目の当たりにする景色を観測していた。そのたびに、使徒だった私はほくそ笑んだものさ」"
translation = "「지금보다 먼 미래. 마왕인 네가 목도하게 될 경치를 관측하고 있었지. 그때마다 사도였던 나는 회심의 미소를 지었었어.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「視える景色はベガと同じだった。全てが飲み込まれ、破滅する世界……それがアルタイルにも起こるはずだったからね」"
translation = "「보이는 경치는 베가와 같았어. 모든 것이 삼켜지고 파멸하는 세계…… 그것이 알타이르에도 일어날 예정이었으니까.」"

[[dialogue]]
speaker = "unk"
original = "かつてセイファート学園長が『神の視座』で観測した、ベガのありさま……それと同じことが、アルタイルにも起こる……？"
translation = "과거 세이파트 학원장이 『신의 시좌』로 관측했던 베가의 모습…… 그것과 같은 일이 알타이르에도 일어난다……?"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「けれど、今は違う未来が視える」"
translation = "「하지만 지금은 다른 미래가 보여.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「リクリエの使徒であるジグは、守護天使ノルンの力によって覚醒したアガサに敗れた」"
translation = "「리크리에의 사도인 지그는 수호천사 노른의 힘에 의해 각성한 아가사에게 패배했어.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「だからだろうか……今まで見たこともない、新しいビジョンが視えるようになったんだ」"
translation = "「그래서일까…… 지금까지 본 적도 없는 새로운 비전이 보이게 됐어.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ジグ……そんな重要な話題だったのか！？\u3000魔王に話したいことができたと、ずいぶん軽い口調で言うから……！」"
translation = "「지그…… 그렇게 중요한 화제였나!? 마왕에게 할 말이 생겼다고 워낙 가벼운 말투로 말하길래……!」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「私自身、少し信じられなかったからね。伝えるのも慎重になるというものさ」"
translation = "「나 자신도 조금 믿기지 않았거든. 전하는 것도 신중해지기 마련이지.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「私の眼は可能性の高い未来も、低い未来も観測できる……しかし世界の命運に関しては、これまで結末が１つしかなかった」"
translation = "「내 눈은 가능성이 높은 미래도, 낮은 미래도 관측할 수 있어…… 하지만 세계의 운명에 관해서는 지금까지 결말이 하나뿐이었지.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「だけど今は……可能性の１つに、破滅しないビジョンが視えたってこと？」"
translation = "「하지만 지금은…… 가능성 중 하나로 파멸하지 않는 비전이 보였다는 거야?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……聞かせてくれ。どんな未来なんだ？」"
translation = "「……들려줘. 어떤 미래지?」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「──アルタイルが勝利する」"
translation = "「──알타이르가 승리해.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「本当かっ！？\u3000そいつはめでたいな！」"
translation = "「정말이야!? 그거 축하할 일이네!」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「……？\u3000ちょっとよくわからないね。曖昧すぎるよ。どんな景色を見たら、アルタイルが勝利するって言えるの？」"
translation = "「……? 좀 잘 모르겠네. 너무 애매해. 어떤 경치를 봤길래 알타이르가 승리한다고 말할 수 있는 거야?」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「創造神『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』が用意した、新しい女神の幼体──極星学園星徒会長、ルヴィネ」"
translation = "「창조신 『<ruby>XELOS<rt>제로스</rt></ruby>』가 준비한 새로운 여신의 유체── 극성학원 성도회장, 루비네.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「彼女が死ぬビジョンを視たんだ」"
translation = "「그녀가 죽는 비전을 봤어.」"

