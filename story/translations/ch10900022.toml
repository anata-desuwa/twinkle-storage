[[dialogue]]
speaker = "unk"
original = "第２話,メイプルとナナカ,P"
translation = "제2화, 메이플과 나나카, P"

[[dialogue]]
speaker = "unk"
original = "今回出会った流星クルセイダースの１人、夕霧ナナカ。"
translation = "이번에 만난 유성 크루세이더즈 중 한 명인 유우기리 나나카."

[[dialogue]]
speaker = "unk"
original = "彼女に招かれて、俺とメイプルは彼女の実家、蕎麦屋『夕霧庵』へとやって来ていた――"
translation = "그녀의 초대를 받아 나와 메이플은 그녀의 본가인 소바 가게 『유우기리안』에 와 있었다――"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「メイちゃん、会長。へい、お待ち♪」"
translation = "「메이짱, 회장님. 자, 오래 기다리셨습니다♪」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「これがアタシの作った『手打ち蕎麦』だよ！\u3000割合は二八ね！」"
translation = "「이게 내가 만든 『수타 소바』야! 비율은 8대 2라고!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「わぁ～っ♪\u3000美味しそう！\u3000ナナお姉ちゃん、ありがと～♪」"
translation = "「와아~♪ 맛있겠다! 나나 언니, 고마워~♪」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「へへっ♪\u3000お任せってことだったんで、今回は冷たい『ざるそば』にしてみたよ！」"
translation = "「헤헤♪ 맡겨달라고 했으니까 이번에는 차가운 『자루소바』로 준비했어!」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「多分なんだけど、メイちゃんは猫舌なんじゃないかって思って。――どう？\u3000合ってる？」"
translation = "「어쩌면 메이짱은 고양이 혀 아닐까 싶어서. ――어때? 맞아?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「すごい！\u3000なんでわかったの！？」"
translation = "「대단해! 어떻게 알았어!?」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「あははっ、やっぱり～♪\u3000そこもマコちゃんと似てるんじゃないかって、そんな予感がしたんだよね～！」"
translation = "「아하핫, 역시나~♪ 그 점도 마코짱이랑 닮지 않았을까 하는 예감이 들었거든~!」"

[[dialogue]]
speaker = "unk"
original = "マコちゃんってもしかして――"
translation = "마코짱이라는 건 설마――"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「うん、そう♪\u3000アタシ、マカロンちゃんのことはそう呼んでるんだ」"
translation = "「응, 맞아♪ 난 마카롱을 그렇게 부르고 있어」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ロロットも言ってたけど、あたし、そんなにその子と似てるんだ……」"
translation = "「로롯토도 말했지만, 나 그렇게 그 애랑 닮았어……?」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「別に、瓜２つってわけでもないんだけどね～。でも、なんとなく雰囲気が似てるって感じ」"
translation = "「딱히 붕어빵처럼 닮은 건 아닌데 말이야~. 근데 왠지 분위기가 닮았다는 느낌」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「アタシのこと、ナナお姉ちゃんって呼んでくれるのも一緒だしね！」"
translation = "「나를 나나 언니라고 불러주는 것도 똑같고 말이야!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「それは、この戦闘服の影響かな……？\u3000なんとなく、ナナお姉ちゃんって呼び方が自然と頭の中に浮かんできたんだ」"
translation = "「그건 이 전투복의 영향일까……? 왠지 나나 언니라는 호칭이 자연스럽게 머릿속에 떠올랐거든」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「でも、聞けば聞く程、ますますその子に会いたくなって来るな～」"
translation = "「근데 들으면 들을수록 점점 그 애를 만나보고 싶어지네~」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「あ～、それがさ、今ちょうど、魔王の武者修行だって言って、出かけちゃってるんだよね～。この前電話が来た時は、群馬だって言ってたかな？」"
translation = "「아~ 그게 말이야, 지금 마침 마왕의 무사 수행이라면서 떠나버렸거든~. 저번에 전화 왔을 때는 군마라고 했던가?」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「なんか、魔境を見つけたとかなんとかって――」"
translation = "「뭐랄까, 마경을 발견했다느니 어쨌다느니――」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「魔境！？\u3000こっちの日本には、そんな心躍るワードを冠する場所が……！？」"
translation = "「마경!? 이쪽 일본에는 그런 가슴 뛰는 단어가 붙은 장소가……!?」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「心躍るんだ……」"
translation = "「가슴 뛰는구나……」"

[[dialogue]]
speaker = "unk"
original = "覚醒する系の子なので……"
translation = "각성하는 타입의 아이라서……"

[[dialogue]]
speaker = "unk"
original = "メイプルは眼帯を付けて"
translation = "메이플은 안대를 쓰고"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「ああ、なるほど！\u3000そういうこと……」"
translation = "「아아, 그렇구나! 그런 거였어……」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ふっふっふっ。魔王を目指して自ら魔境へ修業におもむくとは……ルリエルとロロットの２人を見た時に考えていたことが、いよいよ確信に変わったぞ！」"
translation = "「훗훗훗. 마왕을 목표로 스스로 마경으로 수행을 떠나다니…… 루리엘과 로롯토 두 사람을 봤을 때 생각했던 것이 드디어 확신으로 바뀌었다!」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「言ってるそばから、いきなり覚醒した！？」"
translation = "「말하는 도중에 갑자기 각성했어!?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ここは女神テルル様が管理する世界とは全く異なる異世界！\u3000……しかし、流星市国と流星町のように、異なりながらも共通する要素の数々」"
translation = "「여기는 여신 테루루 님이 관리하는 세계와는 완전히 다른 이세계! ……하지만 유성시국과 유성 마을처럼 다르면서도 공통되는 요소들이 한가득」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ならば、それはあたしたちヒトにも当てはまるはず！\u3000すなわち――」"
translation = "「그렇다면 그것은 우리 인간에게도 해당할 터! 즉――」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ルリエルとロロット、そして、あたしとその子は……『<b>異世界の同位存在</b>』！」"
translation = "「루리엘과 로롯토, 그리고 나와 그 애는…… 『<b>이세계의</b> <b>동위</b> <b>존재</b>』!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「今、この時を持って名づけるなら、そう！\u3000『<ruby>異相連星<rt>アナザーステラ</rt></ruby>』なのだ……！」"
translation = "「지금 이 순간을 기해 이름 짓는다면, 그래! 『이상연성』인 것이다……!」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「アナザー……なんて？」"
translation = "「어나더…… 뭐라고?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「言うなれば、世界の境界を背中合わせにした光と闇の関係……！\u3000それこそが、あたし達に隠されていた真実！」"
translation = "「말하자면 세계의 경계를 맞댄 빛과 어둠의 관계……! 그것이야말로 우리에게 숨겨져 있던 진실!」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「メイちゃん？\u3000お～い、メイちゃ～ん？」"
translation = "「메이짱? 어~이, 메이짱~?」"

[[dialogue]]
speaker = "unk"
original = "とりあえず、お蕎麦食べよっか"
translation = "일단 소바 먹자"

[[dialogue]]
speaker = "unk"
original = "はい、そこまで！"
translation = "자, 거기까지!"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「――あっ！\u3000は～い♪」"
translation = "「――앗! 네에~♪」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「戻ってきた！？\u3000会長、めっちゃ手慣れてるじゃん！」"
translation = "「돌아왔어!? 회장님, 엄청 능숙하잖아!」"

[[dialogue]]
speaker = "unk"
original = "それから、俺たちはナナカの打ってくれた蕎麦を残さず頂いた。"
translation = "그러고 나서 우리는 나나카가 만들어준 소바를 남김없이 먹었다."

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「――ふぅっ♪\u3000ナナお姉ちゃんのお蕎麦、すごく美味しかった～♪」"
translation = "「――후우♪ 나나 언니의 소바, 정말 맛있었어~♪」"

[[dialogue]]
speaker = "unk"
original = "ご馳走様でした。うまかった！"
translation = "잘 먹었습니다. 맛있었어요!"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「あいよ♪\u3000お粗末様っ♪」"
translation = "「오냐♪ 별거 아니었다구♪」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「でも、ナナお姉ちゃん、蕎麦作るの上手なんだね！\u3000本当に美味しくて、あたしビックリしちゃった」"
translation = "「그치만 나나 언니, 소바 정말 잘 만드네! 정말 맛있어서 깜짝 놀랐어」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「へへっ♪\u3000褒めてくれてあんがと！\u3000親父に比べたらまだまだだけどさ、一応これでも流星学園の『一芸入試』に、蕎麦打って合格した実績があるんでね」"
translation = "「헤헤♪ 칭찬해줘서 고마워! 아버님에 비하면 아직 멀었지만 말이야, 나름 이래 봬도 유성학원 『일기입시』에 소바 만들어서 합격한 실적이 있다구」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「それにしても、シンはタイミングが悪いね。せっかく遠路はるばるご客人が来てるっていうのに、こういう肝心な時に限って留守にしてるなんて」"
translation = "「그나저나 신은 타이밍이 안 좋네. 귀한 손님이 멀리서 왔는데 이런 중요한 때에 자리를 비우다니」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「あっ、そうそう。シンと言えば、この前ね……？」"
translation = "「앗, 맞다. 신이라고 하니까 저번에 말이야……?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「って、どしたのメイちゃん。アタシの顔見て固まっちゃって……」"
translation = "「어라, 왜 그래 메이짱. 내 얼굴 보고 굳어버려서는……」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「あのさ。ナナお姉ちゃんって、もしかして――」"
translation = "「저기 말이야. 나나 언니는 혹시――」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「そのシンって人のこと、好きだったりする……？」"
translation = "「그 신이라는 사람, 좋아하고 그래……?」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「へぇあっ！？」"
translation = "「헤앗!?」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「な、ななな、何でそんな風に思ったのかな、メイちゃん！？」"
translation = "「무, 무무무, 무슨 근거로 그렇게 생각한 걸까, 메이짱!?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「なんか、その人のことを話してるお姉ちゃん、すごく嬉しそうだなと思って……」"
translation = "「왠지 그 사람 이야기를 하는 언니, 정말 행복해 보여서……」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「いやいやいやいや！\u3000う、嬉しいだなんて、そんな……アタシとあいつはただの幼馴染みだし……！」"
translation = "「아니아니아니아니! 기, 기쁘다니 그런…… 나랑 그 녀석은 그냥 소꿉친구일 뿐이고……!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「でも、ナナお姉ちゃん、すっごく顔が赤いよ？」"
translation = "「하지만 나나 언니, 얼굴이 엄청 빨개?」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「へぁっ！？\u3000こ、これはそのぉ……！\u3000ち、ちょっとこっちに来て、メイちゃん！」"
translation = "「헤앗!? 이, 이건 그러니까……! 조, 조금 이쪽으로 와봐, 메이짱!」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「――というか、そういうメイちゃんの方はどうなのさっ」"
translation = "「――그보다 메이짱 쪽은 어떤데!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「え？\u3000どうって……？」"
translation = "「에? 어떻다니……?」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「会長とのこと。なんかすごく仲良さそうに見えるけど？」"
translation = "「회장님이랑 말이야. 왠지 엄청 사이좋아 보이는데?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「そ、それは……えっと、耳を貸してナナお姉ちゃん。その～、ね？\u3000ごにょごにょごにょ」"
translation = "「그, 그건…… 저기, 귀 좀 빌려줘 나나 언니. 그게~ 말이지? 소곤소곤소곤」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「ん～、なるほど……そんな感じかぁ。じゃあ――」"
translation = "「음~ 과연…… 그런 느낌인가. 그럼――」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「アタシたちはお互い、頑張らないといけない者同士だね♪」"
translation = "「우리 서로 힘내야 하는 처지네♪」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「元の世界に帰ったら、次はどうなるかわかんないけどさ。でも、もしまた会えたら――」"
translation = "「원래 세계로 돌아가면 다음엔 어떻게 될지 모르겠지만 말이야. 그래도 만약 다시 만난다면――」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「その時は、２人で恋バナしよっか♪」"
translation = "「그때는 둘이서 사랑 이야기 하자♪」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「メイちゃん、頑張って！\u3000アタシも応援してるからさ！」"
translation = "「메이짱, 힘내! 나도 응원하고 있을 테니까!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ナナお姉ちゃん……うんっ♪」"
translation = "「나나 언니…… 응!♪」"

[[dialogue]]
speaker = "unk"
original = "会話の内容は全く聞き取れなかったが、部屋の隅で何やら秘密の会話を交わしたらしいメイプルとナナカは、笑顔でグータッチを交わすのだった――"
translation = "대화 내용은 전혀 들리지 않았지만, 방구석에서 무언가 비밀스러운 대화를 나눈 듯한 메이플과 나나카는 미소 지으며 주먹을 맞대었다――"

