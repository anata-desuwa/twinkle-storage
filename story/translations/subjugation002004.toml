[[dialogue]]
speaker = "unk"
original = "翌日。カフェテリアを訪れた俺は、新たなトラブルの発生を聞かされることとなった。"
translation = "다음 날. 카페테리아를 방문한 나는 새로운 트러블의 발생 소식을 듣게 되었다."

[[dialogue]]
speaker = "unk"
original = "チョコレート泥棒だって！？"
translation = "초콜릿 도둑이라고!?"

[[dialogue]]
speaker = "ウズメイア"
original = "「そーなの！\u3000見てよ会長くん、これ……！\u3000小袋に分けて詰めてあった作り置きのチョコレートが、食べ荒らされてて……！」"
translation = "「그렇다구! 봐봐 회장군, 이거……! 소봉투에 나눠 담아뒀던 초콜릿들이 엉망으로 먹혀있어서……!」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「許しがたい不届き者ですね。流星学園内で盗み食いだなんて、良い度胸です」"
translation = "「용서할 수 없는 불한당이네요. 유성학원 내에서 훔쳐먹다니 배짱도 좋군요」"

[[dialogue]]
speaker = "セーラ"
original = "「せっかくのお祭りなのに、チョコレート泥棒が出ちゃうだなんて参ったねぇ……」"
translation = "「모처럼의 축제인데 초콜릿 도둑이라니 곤란하네……」"

[[dialogue]]
speaker = "ルリエル"
original = "「流星星徒会として見過ごせません！\u3000楽しくておいしいバレンタインを守らなくては！」"
translation = "「유성 성도회로서 묵과할 수 없는 것이에욧! 즐겁고 맛있는 발렌타인을 지켜야 한다구욧!」"

[[dialogue]]
speaker = "セーラ"
original = "「早速だけど、餅は餅屋ってことで……頼りになる助っ人を連れて来たよ！」"
translation = "「말이 나온 김에, 전문가는 전문가에게 맡겨야지…… 믿음직한 조력자를 데려왔어!」"

[[dialogue]]
speaker = "ジュエリー"
original = "「さて、現場検証はこんなものかな……む？\u3000やあ、我が愛しの助手。キミも来ていたのか」"
translation = "「자, 현장 검증은 이 정도면 됐나…… 음? 여어, 나의 사랑스러운 조수. 자네도 와 있었나」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「人呼んで日傘探偵……ジュエリー先輩の噂は附属校にも知れ渡っています。これは頼もしい助っ人ですね」"
translation = "「이름하여 양산 탐정…… 주얼리 선배님의 소문은 부속교에도 자자합니다. 정말 든든한 조력자네요」"

[[dialogue]]
speaker = "ウズメイア"
original = "「うんうん！\u3000泥棒を追い詰めるのはいつだって名探偵だし！\u3000さぁ、ズバっと推理を披露しちゃって♪」"
translation = "「응응! 도둑을 추적하는 건 언제나 명탐정이라구! 자, 시원하게 추리를 보여달라구♪」"

[[dialogue]]
speaker = "ジュエリー"
original = "「まず前提として犯人はヒト……もっと言うと、学園生の犯行と考えるのが自然だろう」"
translation = "「우선 전제로서 범인은 인간…… 더 정확히 말하자면 학원생의 소행으로 보는 것이 자연스럽겠지」"

[[dialogue]]
speaker = "ジュエリー"
original = "「昨夜はモンスター発生のアラートが鳴っていない。そして深夜の学園敷地内は当然、施錠がされている」"
translation = "「어젯밤에는 몬스터 발생 경보가 울리지 않았네. 그리고 심야의 학원 부지 내는 당연히 잠겨 있지」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「勝手を知っていなければ、ここまで鮮やかな窃盗劇はできないということですね」"
translation = "「사정을 잘 알고 있지 않다면 이 정도로 선명한 절도극은 벌일 수 없다는 뜻이군요」"

[[dialogue]]
speaker = "ウズメイア"
original = "「う～。同じ学園の友達が犯人かも～、とか思いたくないなあ……」"
translation = "「으~. 같은 학원 친구가 범인일지도 모른다고는 생각하고 싶지 않은데……」"

[[dialogue]]
speaker = "ジュエリー"
original = "「さらに言えば、犯人は手当たり次第にチョコを食べたわけではない。なかなかグルメのようだ」"
translation = "「게다가 범인은 닥치는 대로 초코를 먹은 게 아니야. 꽤나 미식가인 모양이군」"

[[dialogue]]
speaker = "ジュエリー"
original = "「大半は食べつくされていたが、これを見て欲しい。１口だけかじって捨てているチョコがあったよ」"
translation = "「대부분은 먹어 치웠지만 이걸 봐주게. 한 입만 깨물고 버린 초코가 있었네」"

[[dialogue]]
speaker = "ジュエリー"
original = "「このチョコ、唐辛子でも練りこんであるのか……非常に独特な味付けがされていた。明解に換言するならば、ひどくまずい代物だった」"
translation = "「이 초코, 고추라도 갈아 넣은 건가…… 아주 독특한 맛이 나더군. 명쾌하게 환언하자면 지독하게 맛없는 물건이었네」"

[[dialogue]]
speaker = "ウズメイア"
original = "「こ、これって～……シャルレーヌちゃんの激辛チョコだし……？」"
translation = "「이, 이거어~…… 샤를레느짱의 매운 초코라구……?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「──へぇ？\u3000私のチョコだけ、食べる価値がなかったと……？\u3000泥棒の分際で、選り好みをするだなんて……」"
translation = "「──헤에? 내 초코만 먹을 가치가 없었다고……? 도둑 주제에 가려 먹다니……」"

[[dialogue]]
speaker = "unk"
original = "（お、怒ってる……！）"
translation = "(화, 화났다……!)"

[[dialogue]]
speaker = "セーラ"
original = "「ん～。甘党なのもわかったし、内部犯なのかもしれないけど……これだけじゃ犯人像を絞り切れないね」"
translation = "「음~ 단것 마니아라는 건 알겠고 내부 소행일지도 모르지만…… 이것만으론 범인상을 좁히기 어렵겠네」"

[[dialogue]]
speaker = "ジュエリー"
original = "「目撃者もいない食い逃げ犯だからね。引き続き調査を続けていくよ」"
translation = "「목격자도 없는 먹튀 범인이니까 말이야. 계속 조사를 이어가겠네」"

[[dialogue]]
speaker = "セーラ"
original = "「うん、調査に足が必要なら、いつでも星徒会に連絡してね？\u3000とりあえずわからないことだらけだけど、夜の施錠はしっかりするとして……」"
translation = "「응, 조사를 위해 인력이 필요하면 언제든 성도회에 연락해 줘? 일단 모르는 것투성이지만 밤에는 문을 잘 잠그기로 하고……」"

[[dialogue]]
speaker = "セーラ"
original = "「他のみんなは食べられちゃったぶんのチョコ作り、頑張ってもらえるかな？」"
translation = "「다른 애들은 먹혀버린 만큼 초코 만들기 열심히 해줄 수 있지?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「お任せだし！\u3000今日もがんばろ、シャルレーヌちゃん！」"
translation = "「맡겨달라구! 오늘도 힘내자, 샤를레느짱!」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「ええ。貴族としてのプライドを傷つけられたまま、引き下がるわけにはいきません」"
translation = "「네. 귀족으로서의 자존심에 상처를 입은 채로 물러설 수는 없죠」"

[[dialogue]]
speaker = "ウズメイア"
original = "「うんうん、その意気その意気！\u3000今日こそチョコ泥棒が思わず盗み食いしちゃうような、激甘チョコ作るし！！」"
translation = "「응응, 그 기세야! 오늘이야말로 초코 도둑이 자기도 모르게 훔쳐먹고 싶어질 만한 아주 달콤한 초코를 만들자구!!」"

[[dialogue]]
speaker = "unk"
original = "それは本末転倒なのでは……？"
translation = "그건 주객전도 아닌가……?"

[[dialogue]]
speaker = "ジュエリー"
original = "「しかし……何かが引っかかる。アラートが鳴っていないからといって、モンスターの犯行を否定するのは早計か……？」"
translation = "「하지만…… 무언가 걸리는군. 경보가 울리지 않았다고 해서 몬스터의 소행을 부정하는 건 시기상조인가……?」"

[[dialogue]]
speaker = "unk"
original = "チョコレート泥棒発生というトラブルを受けて、流星学園の女の子たちは、昨日よりもハイペースでチョコレート作りにいそしんだ。"
translation = "초콜릿 도둑 발생이라는 트러블에도 불구하고, 유성학원의 여자아이들은 어제보다 빠른 페이스로 초콜릿 만들기에 열중했다."

[[dialogue]]
speaker = "シャルレーヌ"
original = "「あの、会長さんは味見しなくてもいいですよ？\u3000さっき私が食べて、辛いのはわかってますから……」"
translation = "「저기, 회장님은 맛보지 않으셔도 돼요. 아까 제가 먹어봐서 매운 건 알고 있으니까요……」"

[[dialogue]]
speaker = "unk"
original = "昨日のと比べる必要があるからね"
translation = "어제랑 비교해 볼 필요가 있으니까"

[[dialogue]]
speaker = "ウズメイア"
original = "「おお、会長くん……流石の面倒見だし！\u3000じゃあ、ぐいっと食べちゃって！」"
translation = "「오오, 회장군…… 역시 잘 챙겨준다구! 그럼 꿀꺽 먹어봐!」"

[[dialogue]]
speaker = "unk"
original = "昨日と変わらず辛ぁぁぁああい！？"
translation = "어제랑 똑같이 매워어어어어어억!?"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「くっ……どうして？\u3000戦闘はできる、星力の行使だって問題ないのに、どうして味が変わっちゃうの……忌々しい……！」"
translation = "「큭…… 어째서? 전투도 할 수 있고 성력 행사도 문제없는데 왜 맛이 변해버리는 거야…… 짜증 나……!」"

[[dialogue]]
speaker = "unk"
original = "シャルレーヌのチョコレートは、星力を込めるとやはり激辛チョコへ変わってしまうのだった──"
translation = "샤를레느의 초콜릿은 성력을 담으면 역시나 매운 초코로 변해버리는 것이었다──"

[[dialogue]]
speaker = "unk"
original = "そうして日が暮れて、チョコ作りは解散となった。"
translation = "그렇게 해가 저물고 초코 만들기는 해산했다."

[[dialogue]]
speaker = "unk"
original = "星徒会室で溜まった書類作業を片付けていると、ノックの音がして──"
translation = "성도회실에 쌓인 서류 작업을 정리하고 있는데 노크 소리가 들려왔다──"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「夜分遅くに失礼いたします。私です」"
translation = "「늦은 밤에 실례합니다. 저예요」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「ん～……もしかして今、いらっしゃるのは会長さんだけですか？」"
translation = "「음~…… 혹시 지금 여기 계신 건 회장님뿐인가요?」"

[[dialogue]]
speaker = "unk"
original = "みんな帰ったから俺１人だよ"
translation = "다들 퇴근해서 나 혼자야"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「──そう。なら今夜はもう誰も来ないってわけですね～♪\u3000ちょうどいいタイミングだったかしら」"
translation = "「──그래요. 그럼 오늘 밤엔 이제 아무도 안 오겠네요~♪ 딱 좋은 타이밍이었나 봐요」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「……切り替えが早い？\u3000ふふん、ディアーブルの令嬢としての立ち振る舞いと、素の性格の切り替えなんて昔から慣れっこよ♪」"
translation = "「……태세 전환이 빠르다고요? 후훗, 디아블의 영애로서의 몸가짐과 본래 성격의 전환 같은 건 옛날부터 익숙하거든요♪」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「それより会長さん。仕事の手、止めてもらえます～？」"
translation = "「그보다 회장님. 일 좀 멈춰 주실래요~?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「どうしてと言われれば……くふふっ♪\u3000そんなの決まってるじゃないですか～」"
translation = "「왜냐고 물으신다면…… 쿠후후♪ 그야 뻔하잖아요~」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「私のストレス解消に、付き合ってもらおうかな～って<emoji=heart04>」"
translation = "「제 스트레스 해소 상대를 좀 해주셔야겠어서요~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ひぃ！？"
translation = "히익!?"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「学園のペア決めのせいで、ずーっとお淑やかなフリしないとだし……作るチョコはおかしなことになっちゃうし……」"
translation = "「학원 페어 결정 때문에 계속 조신한 척해야 하고…… 만드는 초코는 이상해지고……」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「おまけに不届きな泥棒にも食べる価値なしの烙印を押されて……も～イライラがすっごいことになってるんですよぉ♪」"
translation = "「게다가 무례한 도둑놈한테 먹을 가치 없다는 낙인까지 찍혀서…… 이젠 짜증이 한계까지 왔다구요♪」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「ほ～ら会長さん。握ってるペン、離せ<emoji=heart04>\u3000それで～、あっちのソファ……行きましょう～？」"
translation = "「자~ 회장님. 쥐고 있는 펜 놓으시지<emoji=heart04> 그러고 나서~ 저기 소파로…… 가실까요~?」"

[[dialogue]]
speaker = "unk"
original = "な、何をする気……！？"
translation = "무, 무슨 짓을 하려고……!?"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「も～♪\u3000わかってる癖に、躾がなってないワンちゃんですね<emoji=heart04>\u3000私のイライラを発散できて～、会長さんもと～っても気持ちよくなっちゃう、ア・レ<emoji=heart04>」"
translation = "「정말~ 뻔히 알면서, 훈육이 덜 된 강아지네요<emoji=heart04> 제 짜증을 발산할 수도 있고~ 회장님도 아~주 기분 좋아질 수 있는, 거·기<emoji=heart04>」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「抵抗はダ～メ<emoji=heart04>\u3000ほら、早くこっちに来なさい？\u3000キャハハハハっ<emoji=heart04>」"
translation = "「저항은 안~ 돼<emoji=heart04> 자, 빨리 이쪽으로 오렴? 캬하하하하하<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「今日もシャルレーヌちゃんのチョコ、失敗続きだったなぁ……でも、名案を思いついたし！」"
translation = "「오늘도 샤를레느짱 초코는 계속 실패였지…… 하지만 명안이 떠올랐다구!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「仕上げの星力チャージで激辛になっちゃうなら、最初からそれを見越して、あり得ない量のお砂糖をぶち込んでおけばいいんじゃないかな！？」"
translation = "「마무리 성력 차지로 매워진다면 아예 처음부터 그걸 예상해서 말도 안 되는 양의 설탕을 쏟아부어 두면 되지 않을까!?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「そもそものベースを死ぬほど激甘にしとけば、中和して丁度良くなるじゃん！\u3000陰と陽がぶつかりあって相殺！\u3000天才の発想だし～♪」"
translation = "「원래 베이스를 죽을 만큼 달게 해두면 중화돼서 딱 적당해질 거 아냐! 음과 양이 부딪쳐서 상쇄! 천재적인 발상이라구~♪」"

[[dialogue]]
speaker = "ウズメイア"
original = "「シャルレーヌちゃん、こっちの方に向かって歩いてるところ見た～って聞いたけど……んー？\u3000星徒会室かなぁ？」"
translation = "「샤를레느짱이 이쪽 방향으로 걷는 걸 봤다는 소릴 들었는데…… 음~ 성도회실인가?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「くふふふっ<emoji=heart04>\u3000ちょ～っと膝枕してー、耳かきしてあげただけで、だらしない顔～<emoji=heart04>\u3000かっこわる～い<emoji=heart04>\u3000ざ～こっ<emoji=heart04>」"
translation = "「쿠후후후<emoji=heart04> 살짝 무릎베개 해주고 귀 파준 것만으로 저질스러운 표정이라니~<emoji=heart04> 꼴사나워~<emoji=heart04> 허접~<emoji=heart04>」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「ほぉら動くな<emoji=heart04>\u3000世界を救った魔王様が、『待て』もできないわけないですよね～？」"
translation = "「자, 움직이지 마<emoji=heart04> 세계를 구한 마왕님께서 『기다려』도 못 하시는 건 아니겠죠?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「キャハハっ<emoji=heart04>\u3000耳たぶまで真っ赤で面白～い。私が冷ましてあげましょうか……？\u3000ふぅぅ～～～っ<emoji=heart04>」"
translation = "「캬하하<emoji=heart04> 귓볼까지 새빨개져서 재밌네. 내가 식혀줄까……? 후우우우우우~~~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "────っ！？！？"
translation = "────윽!?!?"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「くふふふふっ、いい鳴き声ですね～<emoji=heart04>\u3000とっても可愛いです。やっぱりイライラした時は、会長さんで遊ぶに限りますね～♪」"
translation = "「쿠후후후후, 좋은 울음소리네요~<emoji=heart04> 정말 귀여워요. 역시 짜증 날 때는 회장님을 데리고 노는 게 최고라니까요~♪」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「もっと可愛いおねだりができたら、ちょっぴり過激なご褒美、あげてもいいですよー？\u3000どうします～？」"
translation = "「좀 더 귀엽게 조르면 조금 과격한 보상 정도는 줄 수도 있는데~ 어떡하실래요~?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「あ、あ、あの～～～……？」"
translation = "「저, 저기이이이이이……?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「────え」"
translation = "「────엣」"

[[dialogue]]
speaker = "unk"
original = "えっ？"
translation = "어?"

[[dialogue]]
speaker = "ウズメイア"
original = "「えへっ」"
translation = "「에헤」"

[[dialogue]]
speaker = "unk"
original = "シャルレーヌのいつものストレス発散に付き合っていたら……いつの間にかウズメイアが近くにいた。"
translation = "샤를레느의 평소 스트레스 발산에 어울려주고 있었더니…… 어느샌가 우즈메이야가 근처에 있었다."

[[dialogue]]
speaker = "unk"
original = "つまり、どうやらシャルレーヌの<ruby>本性<rt>メスガキ</rt></ruby>はバレてしまったようだった──"
translation = "즉, 아무래도 샤를레느의 <ruby>본성<rt>메스가키</rt></ruby>을 들켜버린 모양이었다──"

