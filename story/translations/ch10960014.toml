[[dialogue]]
speaker = "unk"
original = "第４話,戦士イングリット,P"
translation = "제4화, 전사 잉그리드, P"

[[dialogue]]
speaker = "unk"
original = "とある休日。久しぶりに羽根を伸ばして買い物しようかと思ったのだが──"
translation = "어느 휴일. 오랜만에 기분 전환 삼아 쇼핑이나 할까 싶었는데──"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「見つけたぞ、魔王」"
translation = "「찾았다, 마왕.」"

[[dialogue]]
speaker = "unk"
original = "またイングリットに見つかってしまった。"
translation = "또 잉그리드에게 들키고 말았다."

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「ここで会ったが千年目。いい加減観念して私と戦え、魔王」"
translation = "「여기서 만난 것도 인연이다. 이제 그만 단념하고 나와 싸워라, 마왕.」"

[[dialogue]]
speaker = "unk"
original = "どうしてそんなに戦いたいんだ？"
translation = "왜 그렇게 싸우고 싶은 거야?"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「知れたこと。私は戦士。戦士ならばより強い相手と戦い、最強を目指すのは当然だろう」"
translation = "「뻔한 소리를. 나는 전사다. 전사라면 더 강한 상대와 싸워 최강을 목표로 하는 게 당연하지 않나.」"

[[dialogue]]
speaker = "unk"
original = "同郷のフランも似たようなことをよく言っている。"
translation = "고향 친구인 프랑도 비슷한 소리를 자주 하곤 한다."

[[dialogue]]
speaker = "unk"
original = "それに──"
translation = "게다가──"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "『私もコラプサーになりたくてなったわけではない。元は星騎士になるべく鍛錬をしていたのだからな』"
translation = "『나도 콜랩서가 되고 싶어서 된 게 아니다. 원래는 성기사가 되기 위해 단련하고 있었으니까 말이다』"

[[dialogue]]
speaker = "unk"
original = "かつて星騎士を志していた、とも言っていた。"
translation = "한때 성기사를 지망했었다고도 말했었다."

[[dialogue]]
speaker = "unk"
original = "そんな彼女がなぜコラプサーになったのか気になった。"
translation = "그런 그녀가 왜 콜랩서가 되었는지 궁금해졌다."

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「神妙な顔になったな。フ、いい加減戦う気に──」"
translation = "「진지한 표정이 되었군. 후, 이제 싸울 마음이──」"

[[dialogue]]
speaker = "unk"
original = "イングリットのことを教えてくれたら戦うかも"
translation = "잉그리드에 대해 가르쳐 준다면 싸울지도 몰라."

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「私のことを……？\u3000貴様はこれから倒す相手のことが気になるのか？\u3000変なやつだな」"
translation = "「나에 대해서……? 네놈은 이제부터 쓰러뜨릴 상대가 궁금한 건가? 이상한 녀석이군.」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「だがそれで戦う気になるのなら、私のことなどいくらでも教えてやろう」"
translation = "「하지만 그걸로 싸울 마음이 생긴다면, 내 이야기 정도는 얼마든지 해주마.」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「私の名はイングリット・ハンゲイト！\u3000コラプサー！\u3000以上！」"
translation = "「내 이름은 잉그리드 행게이트! 콜랩서! 이상!」"

[[dialogue]]
speaker = "unk"
original = "早っ！？"
translation = "빨라!?"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「どうだ、私はちゃんと自分のことを話したぞ。約束通り戦ってもらおうか」"
translation = "「어떠냐, 나는 제대로 내 이야기를 했다. 약속대로 싸워줘야겠어.」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「……足りない？\u3000もっと昔から話せ？\u3000我がままなやつだな」"
translation = "「……부족하다고? 더 옛날부터 말하라고? 욕심 많은 녀석이군.」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「昔というと……天界にいた頃からか」"
translation = "「옛날이라고 하면…… 천계에 있던 시절부터인가.」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「私が生まれた武闘都市ウリルは、戦士の街だ。天界を守るために戦士が集められ、鍛錬を積んでいる」"
translation = "「내가 태어난 무투 도시 우릴은 전사의 도시다. 천계를 지키기 위해 전사들이 모여 단련을 쌓고 있지.」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「フランのように代々戦士の家系の者もいる。星騎士として流星市国に渡る者も少なくないな」"
translation = "「프랑처럼 대대로 전사 가문인 자도 있고, 성기사로서 유성시국으로 건너가는 자도 적지 않다.」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「私もその１人で、いずれ星騎士になると信じて疑わなかった」"
translation = "「나도 그중 한 명이었고, 언젠가 성기사가 될 거라 믿어 의심치 않았다.」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「……だが守護星は私を選ばなかった」"
translation = "「……하지만 수호성은 나를 선택하지 않았지.」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「新星学園に入るために旅立つフランを見送った。落胆がなかったと言えば嘘になる」"
translation = "「신성학원에 입학하기 위해 떠나는 프랑을 배웅했다. 낙심하지 않았다고 하면 거짓말이겠지.」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「いや、嘘だな。別に落ち込んだ記憶はない」"
translation = "「아니, 거짓말이군. 딱히 낙심했던 기억은 없다.」"

[[dialogue]]
speaker = "unk"
original = "（嘘なんだ……）"
translation = "(거짓말이구나……)"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「私は星騎士になれなかったが、戦士として鍛錬を続けた。より強くなるために」"
translation = "「나는 성기사가 되지 못했지만 전사로서 단련을 계속했다. 더 강해지기 위해서.」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「星騎士など所詮肩書きに過ぎん。武の極致に至れば、星騎士すら超える力を手に入れられる──そう信じて研鑽し続けた」"
translation = "「성기사 따위 결국 직함에 불과하다. 무의 극치에 이르면 성기사조차 뛰어넘는 힘을 얻을 수 있다── 그렇게 믿으며 계속 정진했다.」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「そしてウリルにモンスターが現れ……私は戦った。星力はなかったが、当然勝つつもりだった」"
translation = "「그리고 우릴에 몬스터가 나타났고…… 나는 싸웠다. 성력은 없었지만, 당연히 이길 생각이었다.」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「だがモンスターに爪で引き裂かれ、殺されかけて……命尽きる前にコラプサーの力に目覚めた」"
translation = "「하지만 몬스터에게 발톱으로 찢겨 죽을 뻔하다가…… 목숨이 다하기 직전에 콜랩서의 힘에 각성했다.」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「私はモンスターを斬って斬って斬りまくった。当初思い描いたものとは違ったが、それでも力は力だ。あの時は昂ったものだ」"
translation = "「나는 몬스터를 베고 베고 또 베어 넘겼다. 당초 그렸던 것과는 달랐지만, 그래도 힘은 힘이다. 그때는 고양되었지.」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「それからウリルの戦士連中を片っ端から倒し、星騎士と戦おうと大交流に紛れようとしたが、上手くいかなくてな」"
translation = "「그 후 우릴의 전사 녀석들을 닥치는 대로 쓰러뜨리고 성기사와 싸우기 위해 대교류회에 섞여들려 했지만, 잘 안 돼서 말이다.」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「コラプサーの連中に声をかけられたのはその時だ」"
translation = "「콜랩서 녀석들이 말을 걸어온 건 그때였다.」"

[[dialogue]]
speaker = "unk"
original = "何のために強さを求める？"
translation = "무엇을 위해 강함을 추구해?"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「クッ──」"
translation = "「큭──」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「ククク、ハハハハハッ！\u3000愚かだな魔王！\u3000そんなことも分からないのか！」"
translation = "「크크크, 하하하하하! 어리석구나 마왕! 그런 것도 모르는 거냐!」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「そんなの<b>楽しい</b>からに決まっているだろう！」"
translation = "「그건 당연히 <b>즐겁기</b> 때문이지 않나!」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「研鑽の末に感じる力の高まり……強敵と対峙した時のヒリつく緊張と高揚……そしてその強敵を打ち破る達成感」"
translation = "「연찬 끝에 느껴지는 힘의 고동…… 강적과 대치했을 때의 소름 끼치는 긴장과 고양…… 그리고 그 강적을 격파하는 달성감.」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「戦士イングリットはその快感を喰らって生きている！\u3000戦いより楽しいことなんてないじゃないか！」"
translation = "「전사 잉그리드는 그 쾌감을 먹고 산다! 전투보다 즐거운 게 어디 있단 말이냐!」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「だから魔王……私は貴様を求めている」"
translation = "「그러니 마왕…… 나는 네놈을 원한다.」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「今一番興味があるのは貴様だ。私は貴様ともっともっと戦いたい！」"
translation = "「지금 가장 흥미가 있는 건 네놈이다. 나는 네놈과 좀 더, 좀 더 싸우고 싶어!」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「それにな。戦士というものは、力あっての戦士だ」"
translation = "「게다가 말이다. 전사라는 것은 힘이 있어야 전사다.」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「貴様がこの刀だったとして、<ruby>鈍<rt>なまく</rt></ruby>らのままでありたいか？\u3000より鋭い刃でありたいと思わないのか？」"
translation = "「네놈이 이 칼이라고 쳤을 때, 무딘 채로 남고 싶나? 더 날카로운 칼날이고 싶지 않나?」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「戦士も同じこと。強ければ強いほどいい」"
translation = "「전사도 마찬가지다. 강하면 강할수록 좋지.」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「……ふぅ。随分と話したな。これで戦わないと言い出したら、ここで暴れるぞ？」"
translation = "「……후우. 꽤나 많이 이야기했군. 이래놓고 안 싸우겠다고 하면 여기서 난동을 부리겠다.」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「ん？\u3000なんだこの音は」"
translation = "「음? 이게 무슨 소리지.」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「……近くでモンスターが出現した？\u3000知るか。魔王は私と戦え」"
translation = "「……근처에 몬스터가 출현했다고? 알 바 아니다. 마왕은 나와 싸워라.」"

[[dialogue]]
speaker = "unk"
original = "モンスターを倒してくれたら戦うよ"
translation = "몬스터를 쓰러뜨려 주면 싸워줄게."

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「何？\u3000また注文だと？\u3000魔王は人遣いが荒いな……」"
translation = "「뭐? 또 조건이냐? 마왕은 사람을 부리는 게 아주 거칠군……」"

[[dialogue]]
speaker = "unk"
original = "（イングリットに言われたくない）"
translation = "(잉그리드한테 듣고 싶진 않아)"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「まぁいい。魔王と戦う前の肩慣らしといくか」"
translation = "「뭐 됐다. 마왕과 싸우기 전 몸풀기 정도로 하지.」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「ダーク・オブリビオン！」"
translation = "「다크 오블리비언!」"

[[dialogue]]
speaker = "unk"
original = "イングリットの行いが正しいとは思わないが、それでも彼女を少し理解できた気がする。"
translation = "잉그리드의 행실이 옳다고는 생각지 않지만, 그래도 그녀를 조금은 이해할 수 있을 것 같다."

[[dialogue]]
speaker = "unk"
original = "だから彼女と戦う時は、学園とかコラプサーとか関係なく、ただ１人の戦士として清々しく戦いたいと思うのだった。"
translation = "그래서 그녀와 싸울 때는 학원이라든가 콜랩서 같은 건 상관없이, 그저 한 명의 전사로서 시원스럽게 싸우고 싶다고 생각하는 것이었다."

