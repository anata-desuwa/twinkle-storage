[[dialogue]]
speaker = "unk"
original = "第３話,風邪を引いた日,P"
translation = "제3화, 감기 걸린 날, P"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ん、計測終わったかしら……３８度５分。立派な風邪ね」"
translation = "「음, 측정 끝났으려나…… 38도 5분. 훌륭한 감기네」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「学園にはもう連絡しておいたから、今日は１日ゆっくり休みなさい。頑張りすぎて疲れちゃったのね、きっと」"
translation = "「학원에는 이미 연락해 뒀으니까 오늘은 하루 종일 푹 쉬렴. 너무 열심히 해서 지쳐버린 거겠지, 분명」"

[[dialogue]]
speaker = "unk"
original = "……俺のＤＩＳＣは？"
translation = "……내 DISC는?"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「それはお母さんが預かります。あなたが真面目な子じゃなかったら、取り上げたりしないんだけど……」"
translation = "「그건 엄마가 보관할게. 네가 성실한 아이가 아니었으면 뺏지는 않았겠지만……」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「星徒会のお仕事のメッセージとか見ちゃったら、這ってでも出かけちゃうでしょ、きっと」"
translation = "「성도회 업무 메시지 같은 거 보면 기어서라도 나가버릴 거잖아, 분명」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「お母さん命令よ。今日はしっかり休むこと。いいわね？」"
translation = "「엄마 명령이야. 오늘은 푹 쉴 것. 알겠지?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「本当に緊急の要件だったらすぐに伝えてあげるから。今はとにかく休みなさい」"
translation = "「정말 긴급한 요건이면 바로 전해 줄 테니까. 지금은 어쨌든 쉬렴」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「食欲はある？\u3000おかゆ作ったけど……フルーツやアイスの方がいいかしら？」"
translation = "「식욕은 있니? 죽을 만들었는데…… 과일이나 아이스크림이 나으려나?」"

[[dialogue]]
speaker = "unk"
original = "……食べるの、ちょっと無理かも"
translation = "……먹는 거, 조금 무리일지도"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「そっか……じゃあ薬だけでも飲みなさい。あんまりひどいようなら往診に来てもらうから」"
translation = "「그렇구나…… 그럼 약이라도 먹으렴. 너무 심한 것 같으면 왕진을 부를 테니까」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「お母さん、今日は隣の部屋で仕事してるから。何かあったらすぐに呼ぶのよ？」"
translation = "「엄마는 오늘 옆방에서 일하고 있을게. 무슨 일 있으면 바로 부르는 거야?」"

[[dialogue]]
speaker = "unk"
original = "ベッドに身を沈めた俺の胸中にあったのは、母さんへの感謝の気持ちと、ほんの少しの申し訳なさだった。"
translation = "침대에 몸을 파묻은 내 마음속에 있었던 것은 엄마에 대한 감사함과 아주 약간의 미안함이었다."

[[dialogue]]
speaker = "unk"
original = "俺が熱を出していると知った途端、仕事をすべてキャンセルし、食事と薬をてきぱきと整えてくれた母さん。"
translation = "내가 열이 난다는 걸 알자마자 업무를 전부 캔슬하고 식사와 약을 척척 준비해 준 엄마."

[[dialogue]]
speaker = "unk"
original = "……ありがたいよな"
translation = "……고마운 일이지"

[[dialogue]]
speaker = "unk"
original = "世の中には、血の繋がった親子でも看病してもらえない子供がいる。"
translation = "세상에는 피가 섞인 부모 자식이라도 간호받지 못하는 아이들이 있다."

[[dialogue]]
speaker = "unk"
original = "だとすると俺はとても恵まれている。あんなに優しい母さんがいるんだから……"
translation = "그렇다면 나는 아주 복받은 거다. 저렇게 상냥한 엄마가 있으니까……"

[[dialogue]]
speaker = "unk"
original = "早く治さないといけないんだけど、こんなにしんどい体で、眠りにつけるだろうか……？"
translation = "빨리 나아야 하는데, 이렇게 힘든 몸으로 잠들 수 있을까……?"

[[dialogue]]
speaker = "unk"
original = "少し眠っては起きる──それを繰り返していた。朝に飲んだ薬の効き目も、あまり感じられない。"
translation = "잠깐 잠들었다 깨기를── 그것을 반복하고 있었다. 아침에 먹은 약의 효능도 별로 느껴지지 않는다."

[[dialogue]]
speaker = "unk"
original = "…………"
translation = "…………"

[[dialogue]]
speaker = "unk"
original = "……"
translation = "……"

[[dialogue]]
speaker = "unk"
original = "──昼を過ぎた。けれど熱は、朝よりも上がったような気がする……"
translation = "──오후가 지났다. 하지만 열은 아침보다 오른 것 같은 기분이 든다……"

[[dialogue]]
speaker = "unk"
original = "息苦しい……汗が止まらない……"
translation = "숨이 가빠…… 땀이 멈추지 않아……"

[[dialogue]]
speaker = "unk"
original = "体がだるいと不安な気持ちになってくる。小さい頃、アステラで１人ぼっちだった時のことを思い出して、不安で、怖くて──"
translation = "몸이 나른하니 불안한 마음이 든다. 어릴 적 아스테라에서 혼자였을 때의 일이 떠올라 불안하고 무서워서──"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「大丈夫よ」"
translation = "「괜찮아」"

[[dialogue]]
speaker = "unk"
original = "俺の額に、優しい手のひらが触れた気がした。"
translation = "내 이마에 상냥한 손바닥이 닿은 기분이 들었다."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「お母さんが傍にいるから、大丈夫。怖くないわ」"
translation = "「엄마가 곁에 있으니까 괜찮아. 무섭지 않아」"

[[dialogue]]
speaker = "unk"
original = "ひやりと冷たいのに、温かさに満ちた手のひらは、涙が出るくらいに優しくて。"
translation = "서늘하게 차가우면서도 온기가 가득한 손바닥은 눈물이 날 정도로 상냥해서."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「安心して、おやすみなさい。いい子、いい子……」"
translation = "「안심하고 잘 자렴. 착하다, 착해……」"

[[dialogue]]
speaker = "unk"
original = "そこからの記憶はない。俺はあっという間に、深い眠りに落ちた──"
translation = "거기서부터는 기억이 없다. 나는 순식간에 깊은 잠에 빠져들었다──"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「あら、目が覚めた？\u3000その顔色だと、ご飯は食べられそうね」"
translation = "「어라, 눈 떴니? 그 안색이면 밥은 먹을 수 있겠네」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「消化に良さそうなもの、いっぱい準備してあるから。温め直そうか？」"
translation = "「소화에 좋을 만한 거 잔뜩 준비해 뒀으니까. 다시 데워줄까?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「……ん？\u3000どうしたの、クロト」"
translation = "「……응? 왜 그러니, 쿠로토」"

[[dialogue]]
speaker = "unk"
original = "その……昼間はありがとう"
translation = "저기…… 낮에는 고마웠어"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「──ぷっ♪\u3000急に何を言うかと思えば。お礼なんていらないわよ、息子の看病をしない母親がどこにいるの」"
translation = "「──풋♪ 갑자기 무슨 말을 하나 했더니. 감사 인사 같은 건 필요 없어, 아들 간호를 안 하는 엄마가 어디 있니」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「それにしても……うん、ちょっとはマシになったけど」"
translation = "「그나저나…… 음, 조금은 나아졌지만」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「おでこ、まだほんのり熱いわね。これは明日になっても熱が引かないかも……」"
translation = "「이마, 아직 약간 뜨겁네. 이건 내일이 돼도 열이 안 내릴지도……」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「──困る？\u3000そうよね。うんうん。あなたなら絶対にそう言うと思ったわ」"
translation = "「──곤란해? 그렇겠지. 응응. 너라면 반드시 그렇게 말할 줄 알았어」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「安心しなさい。お母さん、いいもの用意しておいたからね……！\u3000熱を出した時はこれが一番！」"
translation = "「안심하렴. 엄마가 좋은 거 준비해 뒀으니까 말이야……! 열날 때는 이게 제일이지!」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ててーん、座薬～♪」"
translation = "「짜잔, 좌약~♪」"

[[dialogue]]
speaker = "unk"
original = "──エ！？"
translation = "──에!?"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「あなたがまだ小さかった頃、ひどい熱を出した時、座薬を入れたらすぐ熱が引いたでしょ？」"
translation = "「네가 아직 어렸을 때 심한 열이 났었는데 좌약을 넣었더니 금방 열이 내렸었지?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「あの時もすっごく嫌がったのよねー。お尻見せたくないって……でも効果はてきめんよ。飲み薬より絶対に効くから」"
translation = "「그때도 엄청 싫어했었지~. 엉덩이 보여주기 싫다면서…… 하지만 효과는 직빵이야. 먹는 약보다 무조건 잘 들으니까」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ふふ。昼間クロトのおでこを撫でてあげてた時に、昔のことをふっと思い出してね？\u3000近くの薬局までダッシュしちゃったわ♪」"
translation = "「후후. 낮에 쿠로토 이마를 쓰다듬어 주면서 옛날 일이 문득 생각나서 말이야? 근처 약국까지 대시했단다♪」"

[[dialogue]]
speaker = "unk"
original = "あの後、そんなことしてたの！？"
translation = "그다음에 그런 짓을 하고 있었어!?"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ふっふっふっふっふ……まっかせなさい♪\u3000お母さん、座薬入れるのプロだから。クロトにしかしたことないけどね～<emoji=heart04>」"
translation = "「훗훗훗훗훗…… 맡겨두렴♪ 엄마, 좌약 넣는 거 프로니까. 쿠로토한테밖에 안 해봤지만 말이야~<emoji=heart04>」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「恥ずかしがらないの！\u3000ほーら、お尻向けなさい、お尻♪\u3000お母さんが一発で治してあげるからね！」"
translation = "「부끄러워하지 말고! 자─, 엉덩이 대렴, 엉덩이♪ 엄마가 한 방에 낫게 해줄 테니까!」"

[[dialogue]]
speaker = "unk"
original = "ぎゃーーーーーっ！？"
translation = "갸아아아아악!?"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「そ～れ～っ♪」"
translation = "「자~아~잇♪」"

[[dialogue]]
speaker = "unk"
original = "翌日は快晴。俺の体調は万全。座薬すごい。"
translation = "다음 날은 쾌청. 내 컨디션은 만전. 좌약 대단해."

[[dialogue]]
speaker = "unk"
original = "けれど何だろう。体調と引き換えに、何か大事なものを失ったような気がしたのだった……"
translation = "하지만 뭘까. 컨디션과 맞바꿔서 뭔가 소중한 것을 잃어버린 듯한 기분이 들었다……"

