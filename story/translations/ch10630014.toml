[[dialogue]]
speaker = "unk"
original = "第４話,隠密少女の密かな変化,P"
translation = "제4화, 은밀 소녀의 은밀한 변화, P"

[[dialogue]]
speaker = "カヤ"
original = "「──え？\u3000今日で任務、終了……？」"
translation = "「──에? 오늘로 임무, 종료……?」"

[[dialogue]]
speaker = "セドナ"
original = "「ああ。これ以上、護衛を続けていても正体不明の輩との接触はないと判断した」"
translation = "「그래. 더 이상 호위를 계속해도 정체불명의 놈들과 접촉은 없다고 판단했다.」"

[[dialogue]]
speaker = "セドナ"
original = "「ま、元々物は試しにという程度の作戦だったしな。今までご苦労だった。明日からは通常任務に戻れ」"
translation = "「뭐, 원래 밑져야 본전이라는 정도의 작전이었으니까. 지금까지 수고했다. 내일부터는 통상 임무로 복귀해라.」"

[[dialogue]]
speaker = "カヤ"
original = "「それが命令なら……」"
translation = "「그게 명령이라면……」"

[[dialogue]]
speaker = "unk"
original = "今日も遅くまでありがとう"
translation = "오늘도 늦게까지 고마워."

[[dialogue]]
speaker = "カヤ"
original = "「べ、別にお礼なんかいい。任務、だから……」"
translation = "「따, 딱히 감사 인사 따윈 필요 없어. 임무였으니까……」"

[[dialogue]]
speaker = "カヤ"
original = "「それより、その……。私、あなたに言わなきゃいけないことある……」"
translation = "「그것보다, 그……. 나, 당신에게 해야 할 말이 있어……」"

[[dialogue]]
speaker = "カヤ"
original = "「こ、これっ。受け取って欲しい……！」"
translation = "「이, 이거! 받아줬으면 좋겠어……!」"

[[dialogue]]
speaker = "unk"
original = "これを俺に？"
translation = "이걸 나한테?"

[[dialogue]]
speaker = "カヤ"
original = "「魔女の森で見つけた。宝石とはまた違うと思うけど、こういうキラキラしたもの、私、好きで……」"
translation = "「마녀의 숲에서 찾았어. 보석과는 좀 다르다고 생각하지만, 이런 반짝이는 거, 나, 좋아해서……」"

[[dialogue]]
speaker = "カヤ"
original = "「この前助けてくれたお礼……言えてなかったから。でもこういう時、何を渡せばいいかわからなくて……」"
translation = "「지난번에 도와준 보답…… 말 못 했으니까. 하지만 이럴 때 뭘 줘야 할지 몰라서……」"

[[dialogue]]
speaker = "カヤ"
original = "「でも、良かったら受け取って欲しい。とびきりキラキラしたの、選んだつもりだから」"
translation = "「그래도, 괜찮다면 받아줘. 엄청나게 반짝이는 걸로 골랐으니까.」"

[[dialogue]]
speaker = "カヤ"
original = "「本当にありがとう。危ないところ助けてもらって。私のこと、ともだち言ってくれて」"
translation = "「정말 고마워. 위험할 때 도와줘서. 나를 친구라고 말해줘서.」"

[[dialogue]]
speaker = "カヤ"
original = "「この前、私に聞いたこと覚えてる？\u3000ここ数日、楽しくなかったかって話……」"
translation = "「지난번에 나한테 물었던 거 기억해? 요 며칠, 즐겁지 않았냐는 이야기……」"

[[dialogue]]
speaker = "カヤ"
original = "「本当言うと、楽しかった。あなたと一緒に過ごすこと」"
translation = "「사실대로 말하면, 즐거웠어. 당신이랑 같이 지내는 거.」"

[[dialogue]]
speaker = "カヤ"
original = "「まだ私、その。ともだちっていうの、よくわからない。どんな風に話せばいいか。どう接したらいいかもわかってない」"
translation = "「아직 나, 그. 친구라는 거, 잘 모르겠어. 어떤 식으로 말해야 할지. 어떻게 대해야 할지도 모르겠어.」"

[[dialogue]]
speaker = "カヤ"
original = "「だけど、えと……。きっと私も、あなたのこと……」"
translation = "「하지만, 에토…… 분명 나도, 당신을……」"

[[dialogue]]
speaker = "カヤ"
original = "「ともだち……思ってる」"
translation = "「친구라고…… 생각하고 있어.」"

[[dialogue]]
speaker = "unk"
original = "すごく嬉しいよ"
translation = "정말 기뻐."

[[dialogue]]
speaker = "カヤ"
original = "「真面目な顔して言わなくていい。私の方が恥ずかしくなる」"
translation = "「진지한 얼굴로 말 안 해도 돼. 내가 더 부끄러워지잖아.」"

[[dialogue]]
speaker = "カヤ"
original = "「でも……ふふ。喜んでもらえたのなら嬉しい」"
translation = "「하지만…… 후후. 기뻐해 주니 나도 좋아.」"

[[dialogue]]
speaker = "unk"
original = "あ……"
translation = "아……"

[[dialogue]]
speaker = "カヤ"
original = "「？？？\u3000何ニヤニヤしてる？」"
translation = "「??? 왜 히죽거려?」"

[[dialogue]]
speaker = "unk"
original = "笑ったところ初めて見たから"
translation = "웃는 모습 처음 봐서."

[[dialogue]]
speaker = "カヤ"
original = "「～～っっ！？\u3000べ、別に笑ってない。笑う理由ないっ」"
translation = "「～～읏!? 딱, 딱히 안 웃었어. 웃을 이유 없어!」"

[[dialogue]]
speaker = "カヤ"
original = "「そのにやけ面やめる……！\u3000それ以上、笑うなら刺す……！」"
translation = "「그 히죽거리는 얼굴 치워……! 그 이상 웃으면 찌를 거야……!」"

[[dialogue]]
speaker = "カヤ"
original = "「……やっぱりこの人、私を舐めてる。ともだちにする人、間違えたかもしれない……」"
translation = "「……역시 이 사람, 나를 얕보고 있어. 친구로 삼을 사람을 잘못 골랐을지도 몰라……」"

[[dialogue]]
speaker = "カヤ"
original = "「でも──ふふ。こういうのも悪くない」"
translation = "「하지만── 후후. 이런 것도 나쁘지 않네.」"

[[dialogue]]
speaker = "カヤ"
original = "「実は今朝。長官から今日で任務終わり言われてた」"
translation = "「실은 오늘 아침. 장관님한테 오늘로 임무 끝이라고 들었어.」"

[[dialogue]]
speaker = "カヤ"
original = "「けど断った。珍しく長官驚いてた。今まで私、長官に意見したこと一度もなかったから。命令が下れば従うだけだったから」"
translation = "「하지만 거절했어. 드물게 장관님이 놀라셨어. 지금까지 나, 장관님한테 의견 낸 적 한 번도 없었으니까. 명령이 내려오면 따르기만 했으니까.」"

[[dialogue]]
speaker = "カヤ"
original = "「結局、呆れられたり怒られたりして任務終了は変わらなかったけど……。でも個人的に護衛する分には構わないって言われた」"
translation = "「결국 어이없어하시거나 혼나거나 해서 임무 종료는 변함없었지만…… 하지만 개인적으로 호위하는 것까지는 상관없다는 말을 들었어.」"

[[dialogue]]
speaker = "カヤ"
original = "「だから私、これからもあなたの護衛、続ける」"
translation = "「그러니까 나, 앞으로도 당신 호위, 계속할게.」"

[[dialogue]]
speaker = "カヤ"
original = "「あなたのことが心配だから。ともだち、だから」"
translation = "「당신이 걱정되니까. 친구, 니까.」"

[[dialogue]]
speaker = "カヤ"
original = "「どうせ普段から無茶ばかりしてるはず。あなたは私を庇うようなお人好し。放っておけない」"
translation = "「어차피 평소에도 무리만 할 게 뻔해. 당신은 나를 감쌀 정도로 무른 사람이니까. 내버려 둘 수 없어.」"

[[dialogue]]
speaker = "カヤ"
original = "「それに……あなたは正体不明の存在からも狙われてる。能天気にしてると、本当に敵に捕まりかねない」"
translation = "「게다가…… 당신은 정체불명의 존재에게도 노려지고 있어. 태평하게 있으면 정말로 적에게 잡힐지도 몰라.」"

[[dialogue]]
speaker = "カヤ"
original = "「だから、私が守る。任務や命令じゃなくて──私の意志で」"
translation = "「그러니까, 내가 지켜줄게. 임무나 명령이 아니라── 내 의지로.」"

[[dialogue]]
speaker = "unk"
original = "心強いよ"
translation = "든든하네."

[[dialogue]]
speaker = "カヤ"
original = "「ふふ、こっちこそ心強い。あなたと一緒なら私も安心」"
translation = "「후후, 이쪽이야말로 든든해. 당신이랑 함께라면 나도 안심이야.」"

[[dialogue]]
speaker = "カヤ"
original = "「それと……良ければ、その。ともだちのことも色々と教えて欲しい……」"
translation = "「그리고…… 괜찮다면, 그. 친구에 대해서도 이것저것 알려줬으면 좋겠어……」"

[[dialogue]]
speaker = "カヤ"
original = "「ともだち同士でどんなことするのか……。どういうお話するのか……。もっと知りたい……」"
translation = "「친구끼리는 어떤 걸 하는지…… 어떤 이야기를 하는지…… 좀 더 알고 싶어……」"

[[dialogue]]
speaker = "カヤ"
original = "「あなたと……ふふ。もっともっと、ともだちになりたいから」"
translation = "「당신이랑…… 후후. 좀 더 좀 더, 친구가 되고 싶으니까.」"

[[dialogue]]
speaker = "カヤ"
original = "「付き合って、くれる？」"
translation = "「어울려, 줄래?」"

