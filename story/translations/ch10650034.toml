[[dialogue]]
speaker = "unk"
original = "第４話,バレンタインの贈り物,P"
translation = "제4화, 발렌타인 선물, P"

[[dialogue]]
speaker = "unk"
original = "バレンタインの時期だけあって、ここ最近、周囲の女性からチョコをもらうことが多い。"
translation = "발렌타인 시기인 만큼 요 근래 주변 여성들에게 초코를 받는 일이 많다."

[[dialogue]]
speaker = "unk"
original = "今日もチョコを紙袋に入れながら下校していたのだが……"
translation = "오늘도 초코를 종이봉투에 넣으며 하교하고 있었는데……"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ふーん……」"
translation = "「흐음……」"

[[dialogue]]
speaker = "unk"
original = "イレーナ！？"
translation = "이레이나!?"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「別にチョコを隠さなくていいわよ。どうせあんたがたくさんチョコもらうのはわかってたし」"
translation = "「딱히 초코 안 숨겨도 돼. 어차피 네가 초코 잔뜩 받을 건 알고 있었으니까」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「いやー、いろんな女の子と結婚式も挙げてるし、罪な男ねー」"
translation = "「이야─ 여러 여자랑 결혼식도 올리고, 죄 많은 남자네─」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あれはウェディング戦闘服を解除するためだって？\u3000そんなの知ってるわよ。でも１人の女としては、どうかと思わなくもないのよねー」"
translation = "「그건 웨딩 전투복을 해제하기 위해서라고? 그런 건 알고 있어. 하지만 한 명의 여자로서는 좀 그렇지 않나 싶기도 하거든─」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あんなことしてたら、いつか誰かに後ろからブスッて刺されるんじゃない？\u3000もしそうなっても、あたしが治してあげるかわかんないわよ」"
translation = "「그런 짓을 하고 다니면 언젠가 누군가에게 뒤에서 푹 찔리는 거 아냐? 만약 그렇게 돼도 내가 고쳐줄지는 모르겠네」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「じー……」"
translation = "「지이─……」"

[[dialogue]]
speaker = "unk"
original = "次の週末空いてる？"
translation = "다음 주말 비어 있어?"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「え……？\u3000今それ聞く？\u3000いや別に空いてるけど……」"
translation = "「어……? 지금 그걸 물어봐? 아니 딱히 비어 있긴 한데……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「一緒に出かけるの？\u3000うん……いいけど……」"
translation = "「같이 외출하는 거야? 응…… 좋지만……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「……来たわよ。何するつもり？\u3000２人で映画でも見に行こうっていうの？\u3000言っとくけど、怖いのは嫌いだからね」"
translation = "「……왔어. 뭐 할 생각이야? 둘이서 영화라도 보러 가자는 거야? 미리 말해두는데 무서운 건 싫으니까」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「え……？\u3000この辺の手芸用品店で、品揃えがいいところを調べてきた……？」"
translation = "「어……? 이 근처 수예 용품점 중에서 구색이 좋은 곳을 알아왔다고……?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「……あたしの趣味、覚えててくれたんだ」"
translation = "「……내 취미, 기억해 주고 있었구나」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「手芸店ならそんなに派手じゃないし、神官が出入りしてても問題ないでしょ。……うん、行くわ」"
translation = "「수예점이라면 그렇게 화려하지도 않고, 신관이 드나들어도 문제없겠지. ……응, 갈게」"

[[dialogue]]
speaker = "unk"
original = "俺の提案通り、手芸品店に向かって歩き出す。"
translation = "내 제안대로 수예 용품점을 향해 걷기 시작한다."

[[dialogue]]
speaker = "unk"
original = "その道中、距離を詰めてイレーナのすぐ隣を歩く。"
translation = "그 도중, 거리를 좁혀 이레이나의 바로 옆에서 걷는다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「……近いんだけど。いや、別に、離れてくれって意味じゃないけど」"
translation = "「……가까운데. 아니, 딱히 떨어져 달라는 뜻은 아니지만」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「どうして手芸が好きなのかって？」"
translation = "「어째서 수예를 좋아하냐고?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ん～……忙しい時に掃除が捗る的な？\u3000仕事やら何やらで頭がごちゃごちゃしてる時に、１人でちまちま手を動かすのが楽しいっていうか……」"
translation = "「음～…… 바쁠 때 청소가 잘 되는 느낌? 일이나 뭐나 머릿속이 뒤죽박죽일 때 혼자서 꼼지락꼼지락 손을 움직이는 게 즐겁달까……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あと可愛いのができると嬉しいし……針とか糸とか見るの楽しいし……」"
translation = "「그리고 귀여운 게 만들어지면 기쁘고…… 바늘이나 실 같은 거 보는 것도 즐겁고……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「それと……あげたら喜んでくれる人がいるから……」"
translation = "「그리고…… 주면 기뻐해 줄 사람이 있으니까……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「今度ポーチ作るんだけど、色は何色がいいと思う？\u3000別に人にあげるって決まったわけじゃないけど」"
translation = "「이번에 파우치를 만들 건데, 색은 무슨 색이 좋을 것 같아? 딱히 남 주려고 정한 건 아니지만.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「……ふうん、青ね。まぁ参考にさせてもらうわ」"
translation = "「……흐응, 파란색이구나. 뭐, 참고는 할게.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あんたが買い物に誘ったんだから、荷物持ちくらいしなさいよね」"
translation = "「네가 쇼핑하자고 꼬셨으니까, 짐꾼 정도는 하라고.」"

[[dialogue]]
speaker = "unk"
original = "手芸用品を買った後は、学生には背伸びしたレストランで食事をして、イレーナを教皇庁の宿舎まで送っていく。"
translation = "수예 용품을 산 뒤에는, 학생에게는 조금 과분한 레스토랑에서 식사를 하고, 이레나를 교황청 숙소까지 바래다준다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「さっきのとこ、いいお店だったわね。個室だったから周りに気を遣わなくてよかったし」"
translation = "「아까 그곳, 좋은 가게였지. 개별실이라 주변 눈치를 안 봐도 돼서 좋았고.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「……で、どうしたのよ、その真っ赤なバラの花束は。ここに来るまでに買ってたけど」"
translation = "「……그래서, 뭐야, 그 새빨간 장미 꽃다발은. 여기 오기 전까지 샀던데.」"

[[dialogue]]
speaker = "unk"
original = "俺からイレーナにバレンタインのプレゼント"
translation = "나로부터 이레나에게 주는 발렌타인 선물."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「……ベタベタね」"
translation = "「……뻔하네.」"

[[dialogue]]
speaker = "unk"
original = "イタリア流ならこれだって聞いたから"
translation = "이탈리아식이라면 이거라고 들었으니까."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「……っ」"
translation = "「……윽.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「じゃあ、今日のはバレンタインのデートってわけね。急に出かけようって言った意味がようやくわかったわ」"
translation = "「그럼, 오늘 이건 발렌타인 데이트라는 거네. 갑자기 나가자고 한 의미를 이제야 알겠어.」"

[[dialogue]]
speaker = "unk"
original = "好きだよ、イレーナ"
translation = "좋아해, 이레나."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「──！！」"
translation = "「──!!」"

[[dialogue]]
speaker = "unk"
original = "イレーナが素直じゃなくて、俺も素直になれなかった。"
translation = "이레나가 솔직하지 못해서, 나도 솔직해질 수 없었다."

[[dialogue]]
speaker = "unk"
original = "だからこのバレンタインに、改めて気持ちを伝える。"
translation = "그래서 이번 발렌타인에, 다시 한번 마음을 전한다."

[[dialogue]]
speaker = "unk"
original = "恋人になって、イレーナ"
translation = "연인이 되어줘, 이레나."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「……あたしは流星教皇庁の神官。聖女なんて呼ばれて、真面目で信心深い聖職者だって思われてる」"
translation = "「……나는 유성교황청의 신관. 성녀라고 불리며, 성실하고 신앙심 깊은 성직자라고 여겨지고 있어.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「だから清貧で、貞淑でいないといけないんだけど──」"
translation = "「그래서 청빈하고, 정숙해야만 하지만──」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「バレンタインのチョコ、あげる」"
translation = "「발렌타인 초코, 줄게.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「これはお世話になってるとかじゃなくて、ちゃんと好きのチョコだから。あたしが手作りしたやつ」"
translation = "「이건 신세를 졌다거나 그런 게 아니라, 제대로 좋아해서 주는 초코니까. 내가 직접 만든 거야.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あたしもあんたが好き」"
translation = "「나도 네가 좋아.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「だから……あんたの恋人になってあげる」"
translation = "「그러니까…… 너의 연인이 되어줄게.」"

[[dialogue]]
speaker = "unk"
original = "ありがとう"
translation = "고마워."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「別にお礼言うことじゃないでしょうに。お互い様なんだから」"
translation = "「딱히 고맙다고 할 일은 아니잖아. 서로 마찬가지니까.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「はい、チョコ。ちゃんと受け取って」"
translation = "「자, 초코. 제대로 받아.」"

[[dialogue]]
speaker = "unk"
original = "花束とチョコを交換するように贈り合い、そして──"
translation = "꽃다발과 초코를 교환하듯 서로 선물하고, 그리고──"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ん……ちゅっ」"
translation = "「응…… 츄릅.」"

[[dialogue]]
speaker = "unk"
original = "明かりに照らされる広場の隅で、そっと口付けを交わした。"
translation = "불빛이 비치는 광장 구석에서, 살며시 입맞춤을 나누었다."

