[[dialogue]]
speaker = "unk"
original = "第６話,４人集合,B"
translation = "제6화 4인 집합 B"

[[dialogue]]
speaker = "unk"
original = "新入生歓迎会から、数日が経過したある日のこと。"
translation = "신입생 환영회로부터 며칠이 지난 어느 날의 일이었다."

[[dialogue]]
speaker = "マトイ"
original = "「あっ、あの、ヴィーナス会長、どこに？」"
translation = "「앗, 저기, 비너스 회장님, 어디 가세요?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ちょっと１年生の教室にね！\u3000新星学園史上トップクラスの新入生がいるって聞いたの」"
translation = "「잠깐 1학년 교실에! 신성학원 역사상 톱클래스인 신입생이 있다고 들었거든.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「天使の子で、入学時の学力試験もぶっちぎりの１位らしいわ。ほら、マトイも行くわよ！」"
translation = "「천사 아이인데 입학 학력 시험도 압도적 1위래. 자, 마토이도 가자!」"

[[dialogue]]
speaker = "マトイ"
original = "「ええっ、私も！？」"
translation = "「에엣, 저도요!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「たのもー！」"
translation = "「실례합니다!」"

[[dialogue]]
speaker = "新入生Ａ"
original = "「えっ、あの方って」"
translation = "「어, 저분은.」"

[[dialogue]]
speaker = "新入生Ｂ"
original = "「ヴィーナス会長よ！」"
translation = "「비너스 회장님이야!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あはは、どーもどーもー」"
translation = "「아하하, 안녕 안녕~」"

[[dialogue]]
speaker = "新入生Ｂ"
original = "「一緒にいるのはマトイ先輩だわ！」"
translation = "「함께 있는 분은 마토이 선배야!」"

[[dialogue]]
speaker = "新入生Ａ"
original = "「先日の模擬戦、一番前で拝見させていただきました！\u3000すごい迫力で……マトイ先輩も凄かったです！」"
translation = "「지난번 모의전, 맨 앞줄에서 봤습니다! 정말 박력 넘쳐서…… 마토이 선배도 대단하셨어요!」"

[[dialogue]]
speaker = "マトイ"
original = "「あ、ありがとうございます」"
translation = "「아, 감사합니다.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ありがとう。でも私たちはこのクラスの子に用事が――あっ、いたいた！」"
translation = "「고마워. 하지만 우린 이 반 아이에게 용건이 있어서── 앗, 찾았다!」"

[[dialogue]]
speaker = "マトイ"
original = "「あの眼鏡をかけた、分厚い本を読んでる子がそうですか？」"
translation = "「저 안경을 쓰고 두꺼운 책을 읽고 있는 아이인가요?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そうそう、あのちっちゃい子」"
translation = "「그래그래, 저 조그만 아이.」"

[[dialogue]]
speaker = "マトイ"
original = "「すごい……見るからに賢そうですね……」"
translation = "「대단해…… 보기만 해도 똑똑해 보이네요……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「当然よ！\u3000なんたってぶっちぎりの１位なんだから」"
translation = "「당연하지! 무려 압도적 1위니까.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「こんにちは、あなたがアナね！」"
translation = "「안녕, 네가 아나구나!」"

[[dialogue]]
speaker = "アナ"
original = "「はい、私がアナです。どういった御用でしょう？」"
translation = "「네, 제가 아나입니다. 무슨 일이시죠?」"

[[dialogue]]
speaker = "マトイ"
original = "「突然失礼します。私たち星徒会は、お近づきのご挨拶に――」"
translation = "「갑자기 실례합니다. 저희 성도회는 친해지기 위한 인사차──」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あなたをスカウトに来たの！\u3000星徒会副会長のポジションを、あなたに用意するわ！」"
translation = "「너를 스카우트하러 왔어! 성도회 부회장 자리를 너에게 줄게!」"

[[dialogue]]
speaker = "マトイ"
original = "「そう、スカウトで副会長──って、ええっ！？」"
translation = "「그래요, 스카우트로 부회장── 응, 에엣!?」"

[[dialogue]]
speaker = "新入生Ａ"
original = "「ええーーーっ！？」"
translation = "「에에에엑!?」"

[[dialogue]]
speaker = "新入生Ｂ"
original = "「新入生が、いきなり副会長ーっ！？」"
translation = "「신입생이 갑자기 부회장이라니!?」"

[[dialogue]]
speaker = "マトイ"
original = "「会長ーーーっ！？」"
translation = "「회장님──!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「どうしてマトイが驚いてるのよ」"
translation = "「왜 마토이가 놀라고 그래.」"

[[dialogue]]
speaker = "マトイ"
original = "「当たり前です！\u3000何も聞かされないまま、無理やり連れて来られたんですから！」"
translation = "「당연하죠! 아무 말도 못 들은 채 억지로 끌려왔으니까요!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あ、そうだったわね。で、あなた、どうかしら？」"
translation = "「아, 그랬었지. 그래서 너, 어때?」"

[[dialogue]]
speaker = "アナ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "アナ"
original = "「びっくりしました」"
translation = "「깜짝 놀랐습니다.」"

[[dialogue]]
speaker = "マトイ"
original = "「びっくりしてたんだね……リアクション小さいからわからなかった……」"
translation = "「놀라고 있었구나…… 리액션이 작아서 몰랐어……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「というわけで、アナ、どう？」"
translation = "「그런 고로, 아나, 어때?」"

[[dialogue]]
speaker = "アナ"
original = "「はい、やってみます」"
translation = "「네, 해보겠습니다.」"

[[dialogue]]
speaker = "マトイ"
original = "「やるんだ！？\u3000すごいね！？」"
translation = "「하는 거야!? 대단하네!?」"

[[dialogue]]
speaker = "マトイ"
original = "（なんで即断即決出来るんだろう？\u3000ヴィーナス会長といい、アナさんといい天才って変わり者しかいないの？？）"
translation = "(어떻게 즉석에서 결정할 수 있는 거지? 비너스 회장님도 그렇고 아나 씨도 그렇고, 천재는 괴짜밖에 없는 거야??)"

[[dialogue]]
speaker = "アナ"
original = "「おお、ここが星徒会室ですか」"
translation = "「오오, 여기가 성도회실이군요.」"

[[dialogue]]
speaker = "サーシャ"
original = "「あなたがアナちゃん？\u3000ヴィーナスちゃんが先走っちゃってごめんなさいね～」"
translation = "「네가 아나짱이니? 비너스짱이 앞서 나가서 미안하구나~」"

[[dialogue]]
speaker = "サーシャ"
original = "「ダメよ～、ヴィーナスちゃん。めっ」"
translation = "「안 돼~, 비너스짱. 쓰읍.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「てへっ。ごめんね、アナ」"
translation = "「데헤헷. 미안해, 아나.」"

[[dialogue]]
speaker = "アナ"
original = "「ノープロブレムです」"
translation = "「노 프로블럼입니다.」"

[[dialogue]]
speaker = "サーシャ"
original = "「いくら会長権限で役員を指定できるとはいえ、いきなり１年生に副会長は大変じゃないかしら？」"
translation = "「아무리 회장 권한으로 임원을 지명할 수 있다지만, 갑자기 1학년에게 부회장은 힘들지 않을까?」"

[[dialogue]]
speaker = "サーシャ"
original = "「だからといって、何も役職を与えないっていうのもね～……。あ、アナちゃんって計算とか数字は得意？」"
translation = "「그렇다고 아무 직책도 안 주는 건 좀 그렇고~……. 아, 아나짱은 계산이나 숫자에 강하니?」"

[[dialogue]]
speaker = "アナ"
original = "「はい。３桁までの暗算でしたら、電卓が不要な程度には」"
translation = "「네. 세 자리 숫자 암산이라면 계산기가 필요 없을 정도로는.」"

[[dialogue]]
speaker = "サーシャ"
original = "「９８２×７４４っていくつ～？」"
translation = "「982 곱하기 744는 얼마게~?」"

[[dialogue]]
speaker = "マトイ"
original = "「３桁の暗算って、そうじゃなくないです！？」"
translation = "「세 자리 암산이라는 게 그런 뜻이 아니잖아요!?」"

[[dialogue]]
speaker = "アナ"
original = "「７３０６０８ですね」"
translation = "「730608입니다.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「サーシャさん、合ってる？」"
translation = "「사샤 씨, 맞아?」"

[[dialogue]]
speaker = "サーシャ"
original = "「はーい、大・正・解でーす♪」"
translation = "「네~, 정·답·입·니·다♪」"

[[dialogue]]
speaker = "マトイ"
original = "「ＤＩＳＣで計算したとしても、アナさんの暗算の方が速くて正確そうです……」"
translation = "「DISC로 계산한다고 해도 아나 씨의 암산이 더 빠르고 정확할 것 같아요……」"

[[dialogue]]
speaker = "サーシャ"
original = "「それじゃ、アナちゃんはひとまず会計に就任ね～」"
translation = "「그럼 아나짱은 일단 회계로 취임하는 걸로 하자~」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「異議なーし！」"
translation = "「이의 없음!」"

[[dialogue]]
speaker = "マトイ"
original = "「異議なしです」"
translation = "「이의 없습니다.」"

[[dialogue]]
speaker = "アナ"
original = "「新人ですが、ご指導・ご鞭撻のほど、よろしくお願いします。ぺこり」"
translation = "「신입이지만 지도와 편달 부탁드립니다. 꾸벅.」"

[[dialogue]]
speaker = "マトイ"
original = "「あはは……むしろすぐに私の方が教えを乞う側になっちゃいそうだけど」"
translation = "「아하하…… 오히려 금방 내가 가르침을 청하는 쪽이 될 것 같지만.」"

[[dialogue]]
speaker = "マトイ"
original = "「でもそうならないように頑張るよ。よろしくねアナさん」"
translation = "「그래도 그렇게 되지 않도록 노력할게. 잘 부탁해, 아나 씨.」"

[[dialogue]]
speaker = "アナ"
original = "「はい」"
translation = "「네.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「これで星徒会メンバーは４人になったわね！\u3000よーし、気張っていくわよー！！」"
translation = "「이걸로 성도회 멤버는 4명이 되었네! 좋아, 기운 내서 가보자고!!」"

[[dialogue]]
speaker = "みんな"
original = "「おーっ！」"
translation = "「오오──!」"

