[[dialogue]]
speaker = "unk"
original = "第２話,こんなに幸せでいいのかな,P"
translation = "제2화, 이렇게 행복해도 되는 걸까, P"

[[dialogue]]
speaker = "unk"
original = "とある放課後。ばったり出会ったルルカと一緒に、星徒会の備品を買いに来ていた。"
translation = "어느 방과 후. 우연히 만난 루루카와 함께 성도회 비품을 사러 왔다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「買い物リストを見せて、お兄ちゃん」"
translation = "「쇼핑 리스트 좀 보여줘, 오빠.」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ん、どれどれ～。これはいくつか回らないとダメみたいだね」"
translation = "「음, 어디 보자~. 이건 몇 군데 돌아야겠는데.」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ちょうどあたしも暇してたし、気にしないでいいよ～。それより買い物が終わったらご褒美お願いねっ、お兄ちゃん♪」"
translation = "「마침 나도 한가했으니까 신경 안 써도 돼~. 그것보다 쇼핑 끝나면 보상 부탁해, 오빠♪」"

[[dialogue]]
speaker = "unk"
original = "わかってるよ"
translation = "알고 있어."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「よ～しっ！\u3000それじゃあさっさと済ませちゃおう！」"
translation = "「조아쓰! 그럼 얼른 끝내버리자!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「って、あそこにいるの、フニちゃんじゃない？\u3000おーい、フニちゃーん」"
translation = "「어라, 저기 있는 거 후니짱 아냐? 어이~ 후니짱~」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「あっ！\u3000会長さん♪」"
translation = "「앗! 회장님♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「も～。声をかけたのはあたしなんですけど～？」"
translation = "「정말~. 부른 건 나라고~?」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ご、ごめんなさい、ルルカちゃん」"
translation = "「미, 미안해, 루루카짱.」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「それよりどうしたの？\u3000メイド隊のお仕事中？」"
translation = "「그것보다 웬일이야? 메이드대 업무 중?」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ううん、自分の手紙を出してきただけだよ。ルルカちゃんたちは？」"
translation = "「으응, 내 편지 보내고 오는 길이야. 루루카짱 일행은?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「お兄ちゃんの買い出しにつきあってたとこ！\u3000結構数が多くて大変そうなんだよ～」"
translation = "「오빠 장 보는 거 도와주던 참! 꽤 양이 많아서 힘들 것 같더라고~」"

[[dialogue]]
speaker = "unk"
original = "フニも一緒に来ない？"
translation = "후니도 같이 안 갈래?"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「は、はい。私の用事は済みましたから、ご一緒できるなら……」"
translation = "「네, 네. 제 볼일은 끝났으니까 함께할 수 있다면……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「も～～！\u3000白々しいよ、お兄ちゃん！\u3000ネタはあがってるんだからねっ」"
translation = "「정마알~! 시치미 떼긴, 오빠! 증거는 다 확보했다고!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「たまたまそこにいたから声かけましたー、なんて誘い方してるけど、あたしの目はごまかせないんだから！」"
translation = "「우연히 거기 있어서 불렀어요~ 같은 식으로 꼬시고 있지만, 내 눈은 못 속인다니까!」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「る、ルルカちゃん！？」"
translation = "「루, 루루카짱!?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「フニちゃんは何も言わなくていいの！」"
translation = "「후니짱은 아무 말 안 해도 돼!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「お兄ちゃん！\u3000フニちゃんとお付き合いしてるんでしょ！\u3000隠さず白状しなさい！」"
translation = "「오빠! 후니짱이랑 사귀고 있지! 숨기지 말고 자백해!」"

[[dialogue]]
speaker = "unk"
original = "隠してないよ。フニと付き合ってる"
translation = "안 숨겨. 후니랑 사귀고 있어."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「えええっ！？\u3000隠してなかったのぉ！？」"
translation = "「에에엣!? 안 숨기고 있었어!?」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「う、うん。付き合い始めました～って、わざわざ言って回るのも、おかしいかなって……」"
translation = "「으, 응. 사귀기 시작했어요~ 하고 일부러 말하고 다니는 것도 이상한 것 같아서……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「それもそうだけどぉ……黙ってるなんて水臭いよ！」"
translation = "「그건 그렇지만…… 가만히 있다니 섭섭해!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「特にお兄ちゃん！\u3000そういうことは妹であるあたしに、真っ先に報告すべきじゃないかなっ！」"
translation = "「특히 오빠! 그런 건 여동생인 나한테 제일 먼저 보고해야 하는 거 아냐!」"

[[dialogue]]
speaker = "unk"
original = "いや、ルルカは妹じゃないし"
translation = "아니, 루루카는 여동생이 아니잖아."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「お、お兄ちゃん……ついに言ってはならないことを口にしてしまったね？」"
translation = "「오, 오빠…… 결국 해서는 안 될 말을 내뱉고 말았구나?」"

[[dialogue]]
speaker = "unk"
original = "男は全力で潔白を証明しなきゃじゃないか？"
translation = "남자는 전력으로 결백을 증명해야 하는 거 아냐?"

[[dialogue]]
speaker = "unk"
original = "恋人の前で血縁のない女子に妹面されたら"
translation = "연인 앞에서 혈연 없는 여자애가 여동생 행세를 하면 말이지."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「それはそう！！」"
translation = "「그건 인정!!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ふむ。どうやらお兄ちゃんは、あたしの試練を無事クリアしてみせたようだね！」"
translation = "「흠. 아무래도 오빠는 내 시련을 무사히 클리어한 모양이네!」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「はぁぁっ。会長さん、私のために、そんなことまで考えてくれてたんですか？」"
translation = "「하아아. 회장님, 저를 위해서 그런 것까지 생각해주고 계셨던 건가요?」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「あっ、えへへぇ<emoji=heart04>\u3000『当たり前だろ』って、そんな……ルルカちゃんの前なんですから、頭撫でたりしちゃ、ダメです♪」"
translation = "「앗, 에헤헤<emoji=heart04> 『당연하잖아』라니, 참…… 루루카짱 앞이니까 머리 쓰다듬거나 하면 안 돼요♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「お兄ちゃんたち、想像以上に人前でイチャつくね！？」"
translation = "「오빠들, 상상 이상으로 남들 앞에서 꽁냥거리네!?」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「はっ！\u3000ご、ごめんなさいっ。はしたない所を見せてしまいました……」"
translation = "「핫! 죄, 죄송해요. 꼴사나운 모습을 보여드리고 말았습니다……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あっ、ごめんごめん！\u3000全然いいんだよ、フニちゃんはそれで。今の今まで気づかれてなかったことに衝撃を受けてただけだから！」"
translation = "「앗, 미안 미안! 전혀 괜찮아, 후니짱은 그걸로. 방금 전까지 눈치채지 못했다는 거에 충격을 받았을 뿐이니까!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「……それにしても、お兄ちゃんと一緒にいる時のフニちゃん、いい顔で笑うね！」"
translation = "「……그나저나, 오빠랑 같이 있을 때의 후니짱, 좋은 표정으로 웃네!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「なんというか、安心しきってるのがわかるよ。フニちゃん、笑うと可愛いのに、緊張しちゃってることが多いから」"
translation = "「뭐랄까, 완전히 안심하고 있다는 게 느껴져. 후니짱, 웃으면 귀여운데 긴장하고 있을 때가 많으니까」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「守ってくれる心強い味方がいると、こんなにも笑ってくれるんだなって、あたし感心しちゃった」"
translation = "「지켜주는 든든한 아군이 있으면 이렇게나 웃어주는구나 싶어서, 나 감탄해 버렸어」"

[[dialogue]]
speaker = "unk"
original = "ルルカにはあげないぞ？"
translation = "루루카에게는 안 줄 거다?"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「え～～？\u3000そんなケチくさいこと言わないで、たまにはあたしにもフニちゃん貸してよ、お兄ちゃん」"
translation = "「에~~? 그런 치사한 소리 하지 말고, 가끔은 나한테도 후니짱 빌려줘, 오빠」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「はぅぅぅ～。ルルカちゃんに報告しなかったことは謝りますから、これ以上いじめないでくださぃ……」"
translation = "「하으으으~. 루루카짱에게 보고하지 않은 건 사과할 테니까, 더 이상 괴롭히지 말아주세효……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ど、どうしよう、お兄ちゃん！\u3000そんな気はなかったのに、涙声のフニちゃん見てたら、背筋がゾクゾクしてきちゃったよ……？」"
translation = "「어, 어쩌지, 오빠! 그럴 생각은 없었는데, 울먹이는 후니짱을 보니까 등줄기가 짜릿짜릿해지기 시작했어……?」"

[[dialogue]]
speaker = "unk"
original = "（ルルカにチョップを入れる）"
translation = "(루루카에게 촙을 날린다)"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あいたっ……くもないけど。も～、わかってるよぉ。調子に乗り過ぎました」"
translation = "「아야앗……지도 않지만. 정말~, 알고 있어어. 너무 까불었습니다」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ほら、フニちゃん。２人がラブラブなのはよくわかったから、一緒に行こ？」"
translation = "「자, 후니짱. 둘이 러브러브한 건 잘 알았으니까, 같이 가자?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「どうせなら買い出しもみんなですぐ終わらせて、遊びに行こうよ♪」"
translation = "「어차피 하는 거 장보기도 다 같이 얼른 끝내고 놀러 가자♪」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「は、はいっ。お供します！」"
translation = "「네, 네! 동행하겠습니다!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「というわけで気を取り直して、３人で買い出しにレッツゴー！」"
translation = "「그런 고로 기운 차리고, 셋이서 장보러 렛츠 고!」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「うぅ、人がいっぱいです……」"
translation = "「으으, 사람이 너무 많아요……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「大丈夫？\u3000そういえばフニちゃん、人混み苦手だったっけ」"
translation = "「괜찮아? 그러고 보니 후니짱, 사람 많은 곳은 질색이었지」"

[[dialogue]]
speaker = "unk"
original = "少し休んだ方がいいな"
translation = "조금 쉬는 게 좋겠군"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「でも、まだ買い物終わってませんし……」"
translation = "「하지만, 아직 쇼핑이 끝나지 않았고……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「強がっちゃダメだよ！\u3000無理してもいいことなんて、何もないんだから」"
translation = "「강한 척하면 안 돼! 무리해 봤자 좋은 건 아무것도 없으니까」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「というわけで、残りはあたしが買ってくるから、お兄ちゃんはフニちゃんを介抱してあげることっ！\u3000彼氏なんだからしっかりお願いね～」"
translation = "「그런 고로, 나머지는 내가 사 올 테니까, 오빠는 후니짱을 간호해 줄 것! 남자친구니까 확실히 부탁해~」"

[[dialogue]]
speaker = "unk"
original = "フニと俺は座って休憩できる場所ということで、近場の喫茶店へと入っていた。"
translation = "후니와 나는 앉아서 휴식할 수 있는 장소로 근처의 찻집에 들어갔다."

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「…………はぁぁ。少し、落ち着きました……」"
translation = "「…………하아아. 조금, 진정됐어요……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ルルカちゃん、優しいです……私のことを明るく気遣ってくれて」"
translation = "「루루카짱, 상냥해요…… 저를 밝게 챙겨주시고」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ルルカちゃんだけじゃない、他の皆さんも本当に優しい方ばかりで……こんなに幸せでいいのかなって、ちょっぴり不安になっちゃいます」"
translation = "「루루카짱뿐만이 아니라, 다른 분들도 정말 상냥한 분들뿐이라…… 이렇게 행복해도 되는 건지, 조금 불안해져요」"

[[dialogue]]
speaker = "unk"
original = "フニは幸せでいいんだよ"
translation = "후니는 행복해도 괜찮아"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「そうでしょうか……？\u3000でも、それなら私も同じくらい、皆さんを幸せにしたいです」"
translation = "「그럴까요……? 하지만, 그렇다면 저도 그만큼 여러분을 행복하게 해드리고 싶어요」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「メイド隊のナミエルちゃんも、いつも気にかけてくれてて……私がミスしそうになったら、こっそりフォローしてくれるんですよ」"
translation = "「메이드대의 나미엘짱도 항상 신경 써주고…… 제가 실수할 것 같으면 몰래 도와주거든요」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ヒルディオーネお姉様は、私が落ち込んでいたら力強く叱咤して励ましてくれるんです」"
translation = "「힐디오네 언니분은 제가 낙담해 있으면 힘차게 질타하며 격려해 주세요」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「セッシーちゃんも……マムも……それから会長さんも……みんなみんな……」"
translation = "「세시짱도…… 마무도…… 그리고 회장님도…… 모두 모두……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「大好きなんです、本当に。だから……っっ……」"
translation = "「정말 좋아해요, 진심으로. 그러니까……윽……」"

[[dialogue]]
speaker = "unk"
original = "（そっと抱き寄せる）"
translation = "(살며시 끌어안는다)"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「えへへ……会長さん、あったかいです。私が欲しい時に、いつもこうして抱きしめてくれます」"
translation = "「에헤헤…… 회장님, 따뜻해요. 제가 원할 때, 언제나 이렇게 안아주세요」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「私も、会長さんが寂しく思ってる時は、こうして抱きしめてあげられるくらい、強くなりたいです」"
translation = "「저도 회장님이 외로워하실 때는 이렇게 안아드릴 수 있을 정도로 강해지고 싶어요」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「こんな場所だけど……今だけはいいですよね……」"
translation = "「이런 장소지만…… 지금만큼은 괜찮겠죠……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「……好きです、会長さん<emoji=heart04>」"
translation = "「……좋아해요, 회장님♥」"

[[dialogue]]
speaker = "unk"
original = "――こうして、フニが落ち着くまで、俺たちは抱き合っているのだった。"
translation = "──그렇게 후니가 진정될 때까지, 우리들은 서로 껴안고 있었다."

