[[dialogue]]
speaker = "unk"
original = "第３話,大いなる冬,B"
translation = "제3화, 대자연의 겨울, B"

[[dialogue]]
speaker = "unk"
original = "──あれから。"
translation = "──그 후."

[[dialogue]]
speaker = "unk"
original = "俺たちは『森』への突入作戦へ向けて準備を推し進めた。"
translation = "우리들은 『숲』으로의 돌입 작전을 향해 준비를 추진했다."

[[dialogue]]
speaker = "unk"
original = "レゾフの街全体を大凍結から守れるよう結界を強化し──"
translation = "레조프 마을 전체를 대동결로부터 보호할 수 있도록 결계를 강화하고──"

[[dialogue]]
speaker = "unk"
original = "俺たち星騎士は、そんな『冬』においても行動が取れるよう『耐氷雪の装衣』のさらなる増産に励んだ。"
translation = "우리 성기사들은, 그런 『겨울』에도 행동할 수 있도록 『내빙설의 장의』의 추가 증산에 힘썼다."

[[dialogue]]
speaker = "unk"
original = "さらには『ネメシス』という未知の地への進行ルートとプラン立案──"
translation = "게다가 『네메시스』라는 미지의 땅으로의 진행 루트와 계획 입안──"

[[dialogue]]
speaker = "unk"
original = "金星の反応監視も含めて、トリシャさんには最後まで協力してもらった。"
translation = "금성의 반응 감시도 포함하여, 트리샤 씨에게는 끝까지 협력받았다."

[[dialogue]]
speaker = "unk"
original = "それらの度重なる準備を終えて──"
translation = "그 거듭된 준비를 마치고──"

[[dialogue]]
speaker = "unk"
original = "魔界にはやがて、『大いなる冬』が訪れる。"
translation = "마계에는 이윽고, 『대자연의 겨울』이 찾아온다."

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ッ……とんでもねえな」"
translation = "「크읏…… 터무니없네.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「大いなる冬──なるほど。これは確かに、ただの異常気象というレベルではないですね」"
translation = "「대자연의 겨울── 과연. 이것은 확실히, 단순한 이상 기후 수준이 아니네요.」"

[[dialogue]]
speaker = "unk"
original = "何もかも凍てつく極寒の猛吹雪。"
translation = "모든 것을 얼어붙게 하는 극한의 맹렬한 눈보라."

[[dialogue]]
speaker = "unk"
original = "加えて暴風が各所で荒れ狂っており、家々でさえ凍って砕けては吹き飛ばされていた。"
translation = "게다가 폭풍이 곳곳에서 거세게 몰아치고 있어, 집들마저 얼어붙어 부서지고 날아가고 있었다."

[[dialogue]]
speaker_original = "レゾフの住人"
speaker_translation = "레조프 주민"
original = "「西区の全面凍結を確認──！\u3000早急に南へ避難しろ──！」"
translation = "「서구의 전면 동결을 확인──! 조속히 남쪽으로 피난해라──!」"

[[dialogue]]
speaker_original = "リタおばさん"
speaker_translation = "리타 아주머니"
original = "「家に入っても油断すんじゃないよ──なるべく地下へ潜るんだ！」"
translation = "「집에 들어갔다고 방심하지 마── 될 수 있으면 지하로 숨어!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「っ……！？\u3000あっちの方は全部凍ってるの……！？」"
translation = "「크읏……!? 저쪽은 전부 얼어붙은 거야……!?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ここも危ないでしょう。生身で外に出るのは完全な自殺行為です」"
translation = "「여기도 위험할 거예요. 맨몸으로 밖에 나가는 것은 완전한 자살 행위입니다.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「うう……クールやコールドなんてレベルではありません……ブリザード、アブソリュートゼロ……」"
translation = "「으으…… 쿨이나 콜드 같은 수준이 아닙니다…… 블리자드, 앱솔루트 제로……」"

[[dialogue]]
speaker = "unk"
original = "わずかでも外気に触れればたちまち凍りついてしまう。"
translation = "아주 조금이라도 외부에 닿으면 순식간에 얼어붙어 버린다."

[[dialogue]]
speaker = "unk"
original = "凄まじいパニックに陥ったレゾフの街からは人気が消え失せ、やがて残っているのは俺たち星騎士だけとなった。"
translation = "엄청난 패닉에 빠진 레조프 마을에서는 인적이 사라지고, 이윽고 남아있는 것은 우리 성기사들뿐이었다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「やっぱり例年よりも数段激しい模様ね──みんな、ユウリちゃんの近くに避難して」"
translation = "「역시 예년보다 몇 배는 더 격렬한 모양이네── 모두, 유우리짱 근처로 피난해.」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ああ。あたしの傍にいりゃ、肌寒いくらいで済むはずだ」"
translation = "「아아. 내 옆에 있으면, 쌀쌀한 정도로 끝날 거다.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「スーパーホット……！\u3000ユウリ先輩、グッジョブです」"
translation = "「슈퍼 핫……! 유우리 선배, 굿잡입니다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「それにしても──この『耐氷雪の装衣』は驚きですね。体に粉雪がつくこともないなんて」"
translation = "「그건 그렇고── 이 『내빙설의 장의』는 놀랍네요. 몸에 눈가루가 묻지도 않다니.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「うんうん♪\u3000レゾフ民からしたら衝撃的ね──これもマトイちゃん達のおかげかしら？」"
translation = "「응응♪ 레조프 주민들 입장에선 충격적이겠지── 이것도 마토이짱들 덕분일까?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「リタおばさんから話を聞いて、なんとか間に合わせました……！」"
translation = "「리타 아줌마에게 이야기를 듣고, 어떻게든 맞췄어요……!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「アナがいてくれたら、もっと効率のいい装備を作れたと思うんですけど……」"
translation = "「아나가 있어줬다면, 더 효율 좋은 장비를 만들 수 있었을 거라고 생각하는데요……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いや──十分すぎるさ。これなら街の外へ出ても、予定通り作戦を実行できる」"
translation = "「아니── 충분하고도 남아. 이거라면 마을 밖으로 나가도, 예정대로 작전을 실행할 수 있어.」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「そうニャ！\u3000この大凍結に乗じて──ネメシスとかいう森へ向かうニャ！」"
translation = "「그렇다냥! 이 대동결을 틈타서── 네메시스라는 숲으로 향하는 거다냥!」"

[[dialogue]]
speaker = "unk"
original = "一致団結。"
translation = "일치단결."

[[dialogue]]
speaker = "unk"
original = "そんなところへ──"
translation = "그런 곳으로──"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「──油断してはいけない」"
translation = "「──방심해서는 안 됩니다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「トリシャさん──外は危険です。どうかしましたか？」"
translation = "「트리샤 씨── 밖은 위험합니다. 무슨 일 있으신가요?」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「今朝方、金星の方角に新たなる凶兆が<ruby>視<rt>み</rt></ruby>えた。今度の作戦……一筋縄ではいかないはず」"
translation = "「오늘 아침, 금성 방향에 새로운 흉조가 보였다. 이번 작전…… 순탄하게 풀리지는 않을 겁니다.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「これ以上の何か──ってこと……！？」"
translation = "「이것보다 더한 무언가──라는 거야……!?」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「ニャとしても──ワガハイたちは突き進むっきゃないニャン！」"
translation = "「그렇다냥 해도── 우리들은 밀고 나갈 수밖에 없다냥!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "（あの格好、寒くないのでしょうか……？\u3000私が言えたことではありませんが……）"
translation = "（저 복장, 춥지 않은 걸까요……? 제가 할 말은 아니지만……）"

[[dialogue]]
speaker = "unk"
original = "トリシャさんにも今日まで俺たちの動きに協力してもらっていた。"
translation = "트리샤 씨에게도 오늘까지 우리들의 움직임에 협력받고 있었다."

[[dialogue]]
speaker = "unk"
original = "その上で、邪悪な気配があると彼女は言う。"
translation = "게다가, 사악한 기운이 있다고 그녀는 말한다."

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「──クロトさん」"
translation = "「──쿠로토 씨.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「！\u3000……はい」"
translation = "「! ……네.」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「この先のあなたの行動が……アルタイルの命運を大きく変える。星はそう語っています」"
translation = "「이 앞의 당신의 행동이…… 알타이르의 명운을 크게 바꿉니다. 별은 그렇게 말하고 있습니다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「アルタイル──以前もお聞きした単語ですね」"
translation = "「알타이르── 이전에도 들었던 단어네요.」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「この世界そのものを指します。魔界も、天界も、人間界も、私たちの知る世界はアルタイルの運命相にあります」"
translation = "「이 세계 그 자체를 가리킵니다. 마계도, 천계도, 인간계도, 우리가 아는 세계는 알타이르의 운명상에 있습니다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「わかるような、わからないような……」"
translation = "「알 것 같기도 하고, 모를 것 같기도 하고…….」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「世界を織りなす三構造の<ruby>一<rt>いち</rt></ruby>。私も師から教わった概念だけに、正しく伝えるのは難しいですが……」"
translation = "「세계를 이루는 세 구조 중 하나. 저도 스승에게 배운 개념이기에, 정확히 전달하기는 어렵습니다만…….」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「あなたという人間は極めて特異な<ruby>運命<rt>ほし</rt></ruby>を持つ存在。その軌道は他の星々にも影響を与えると、予告しておきます」"
translation = "「당신이라는 인간은 지극히 특이한 별을 가진 존재. 그 궤도는 다른 별들에게도 영향을 미칠 것이라고, 예고해 두겠습니다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（ま、まあ……占い師さんの言うことだし、完璧に理解できなくても……）"
translation = "（마, 뭐…… 점술가 씨가 하는 말이고, 완벽하게 이해하지 못해도……）"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いや……気に留めておこう。ありがとうございます、トリシャさん」"
translation = "「아뇨…… 마음에 새겨두겠습니다. 감사합니다, 트리샤 씨.」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ふふふ。お役に立てたなら何より」"
translation = "「후후후. 도움이 되었다면 더할 나위 없군요.」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「冥森林への入り口は──今も混沌の侵食により蝕まれています。ひと度立ち入れば、どんなものでも組み替えられてしまうでしょう」"
translation = "「명삼림으로의 입구는── 지금도 혼돈의 침식으로 인해 갉아 먹히고 있습니다. 한번 발을 들이면, 어떤 것이든 재구성되어 버릴 겁니다.」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「しかし、『大いなる冬』が押し寄せている今なら……その機構にも変化が生じているかもしれません」"
translation = "「하지만, 『대자연의 겨울』이 밀려오고 있는 지금이라면…… 그 기구에도 변화가 생기고 있을지도 모릅니다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ヴィーナスを信じるしかないな──」"
translation = "「비너스를 믿을 수밖에 없겠군──」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ええ。その侵食すらも凍っていることを祈りましょう」"
translation = "「네. 그 침식마저도 얼어붙어 있기를 기도합시다.」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「ニャら、改めて出発ニャン──！」"
translation = "「그렇다면, 다시 출발이다냥──!」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「ニャ──！？」"
translation = "「냐──!?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「なんだ……今の音？」"
translation = "「뭐야…… 방금 소리?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "（これは、まさか──）"
translation = "（이것은, 설마──）"

[[dialogue]]
speaker = "unk"
original = "一瞬──レゾフの街を鈍い震動が襲った。"
translation = "일순간── 레조프 마을을 둔탁한 진동이 덮쳤다."

[[dialogue]]
speaker = "unk"
original = "そして……"
translation = "그리고……"

[[dialogue]]
speaker_original = "狼型の魔獣"
speaker_translation = "늑대형 마수"
original = "『ガルル……グラアアァァァァッ──！！』"
translation = "『크르르…… 그르아아아아아앗──!!』"

[[dialogue]]
speaker_original = "雪男の魔獣"
speaker_translation = "설인 마수"
original = "『グラアアアアアアアアオ！』"
translation = "『그르아아아아아아아아오!』"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「っ……あれは──！？」"
translation = "「크읏…… 저건──!?」"

[[dialogue]]
speaker_original = "レゾフの住人"
speaker_translation = "레조프 주민"
original = "「ま──魔獣だあ！\u3000大型の魔獣が襲ってきたぞ──！」"
translation = "「마── 마수다! 대형 마수가 쳐들어왔어──!」"

[[dialogue]]
speaker = "unk"
original = "街の北西から聞こえてくる無数の足音、それに地響き──"
translation = "마을 북서쪽에서 들려오는 무수한 발소리, 그리고 땅울림──"

[[dialogue]]
speaker = "unk"
original = "そうして姿を現したのは、見たことのない強大な魔獣の群れだった。"
translation = "그렇게 모습을 드러낸 것은, 본 적 없는 강대한 마수들의 무리였다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ど、どういうこと……！？\u3000あんな大きな魔獣がどこに隠れてたの……！？」"
translation = "「도, 도대체 무슨 일이야……!? 저렇게 큰 마수가 어디에 숨어 있었던 거야……!?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「これは……まさか、スタンピード──！？」"
translation = "「이것은…… 설마, 스탬피드──!?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ス、スタンピード──って……？」"
translation = "「스, 스탬피드──라고……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「魔獣たちの侵攻──それも、この時期にまで<b>夏眠</b>していた大型種たちの──だったか」"
translation = "「마수들의 침공── 그것도, 이 시기까지 <b>여름잠</b>을 자고 있던 대형종들의── 이었나.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「……！？\u3000じゃあ今まで、巣にこもってた魔獣たちってこと……！？」"
translation = "「……!? 그럼 지금까지, 둥지에 틀어박혀 있던 마수들이라는 거야……!?」"

[[dialogue]]
speaker_original = "狼型の魔獣"
speaker_translation = "늑대형 마수"
original = "『ガルル……グルルルルルゥッ……！』"
translation = "『크르르…… 그르르르르르읏……!』"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「どうやら例年よりもお腹を空かせて──降りてきてしまったようですね」"
translation = "「아무래도 예년보다 더 배가 고파서── 내려와 버린 것 같네요.」"

[[dialogue]]
speaker = "unk"
original = "レゾフを襲う魔獣たちの群れはあまりに膨大だった。"
translation = "레조프를 습격하는 마수들의 무리는 너무나도 방대했다."

[[dialogue]]
speaker = "unk"
original = "百を超える大群──それも荒野で遭遇してきた敵より、遥かに脅威度が高い。"
translation = "백을 넘는 대군── 그것도 황야에서 조우했던 적보다, 훨씬 위협도가 높다."

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「これが恐らく第二の凶兆……本来ありえぬ魔獣たちの侵攻、ですか」"
translation = "「이것이 아마도 두 번째 흉조…… 본래 있을 수 없는 마수들의 침공, 이군요.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「駆除するしかないな。このままじゃ街も、住人も壊滅する」"
translation = "「구제할 수밖에 없겠어. 이대로는 마을도, 주민도 괴멸할 거야.」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「……なるほど。星騎士の皆さんは、戦いに慣れているのですね。フフフ、頼もしい」"
translation = "「……과연. 성기사 여러분은, 싸움에 익숙하시군요. 후후후, 든든합니다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「囲まれてる……来るぞっ！」"
translation = "「포위당했어…… 온다!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「速攻で片をつけます──」"
translation = "「속공으로 끝내겠습니다──」"

[[dialogue]]
speaker_original = "狼型の魔獣"
speaker_translation = "늑대형 마수"
original = "『──ガルルルルルルルルルッ！！』"
translation = "『──크르르르르르르르르르읏!!』"

