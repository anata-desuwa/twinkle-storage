[[dialogue]]
speaker = "unk"
original = "第１話,再会,B"
translation = "제1화, 재회, B"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「♪～」"
translation = "「♪～」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふっ、高揚してるわね……自分でも不思議なくらい」"
translation = "「후후, 들떠 있네…… 스스로도 신기할 정도로.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「早く、放課後が来ないかしら」"
translation = "「빨리 방과 후가 오지 않으려나.」"

[[dialogue]]
speaker = "unk"
original = "世界の命運を分けたリクリエからしばらく。"
translation = "세계의 운명을 갈랐던 리크리에로부터 얼마간의 시간이 흘렀다."

[[dialogue]]
speaker = "unk"
original = "星徒会がいつも通りの仕事をしていたある日の午後――"
translation = "성도회가 평소처럼 업무를 보고 있던 어느 날 오후──"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「サーシャさん、どうしたのかしら？\u3000さっきから窓の外ばかり見てそわそわしてるけど」"
translation = "「사샤 씨, 무슨 일인가요? 아까부터 창밖만 보며 안절부절못하고 있는데.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「何かご用事ですか？\u3000それとも今日のおやつが気になりますか？」"
translation = "「무슨 용무라도 있나요? 아니면 오늘 간식이 신경 쓰이나요?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「今日のおやつはわらびもちですよ。登校の途中で移動販売をやってて、つい買っちゃって。冷蔵庫でキンキンに冷えてます」"
translation = "「오늘 간식은 고사리 떡이에요. 등굣길에 이동 판매를 하고 있어서 그만 사버렸거든요. 냉장고에서 아주 차갑게 식히고 있어요.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そうなの～、それは楽しみね～……」"
translation = "「그렇구나~, 그거 기대되네~……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「心ここにあらずですね。もしや、外にたい焼きの屋台でも……」"
translation = "「마음이 딴 데 가 있네요. 설마 밖에 붕어빵 포장마차라도……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「あ……もしかして今日でしたか？」"
translation = "「아…… 혹시 오늘이었나요?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「え、なに？\u3000今日って何か特別な日なの？」"
translation = "「에, 뭐야? 오늘이 무슨 특별한 날이야?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「確か以前にサーシャ先輩が話してくださった、仲良しの方が天界から帰ってくる日だったかと」"
translation = "「분명 이전에 사샤 선배가 말씀해 주셨던, 친한 분이 천계에서 돌아오는 날이었던 것 같은데.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「は～い……アナちゃん、大正解～」"
translation = "「네에~…… 아나짱, 정답이에요~」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ええと……その親友さんというのは、サーシャさんが会長をされていた時の副会長さんですよね？」"
translation = "「어디 보자…… 그 절친이라는 분은 사샤 씨가 회장이었을 때의 부회장님이죠?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ん……そーなのよ～……」"
translation = "「응…… 그렇단다~……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「だったらノンビリしてる場合じゃないわね！\u3000サーシャさん、今日はもういいからあがってあがって！」"
translation = "「그렇다면 빈둥거리고 있을 때가 아니네! 사샤 씨, 오늘은 이제 됐으니까 얼른 가봐!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「でも悪いわ～。仕事も残っているのに、なんだか申し訳なくなっちゃう」"
translation = "「하지만 미안한걸~. 일도 남아 있는데 왠지 죄송해져.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「リクリエも過ぎて、星徒会の仕事もひと段落しましたから。書類も私たちだけで片付けられますよ」"
translation = "「리크리에도 지나고 성도회 업무도 어느 정도 일단락됐으니까요. 서류도 저희끼리 처리할 수 있어요.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「それに緋宮くんだってお休みですからね。サーシャさんも遠慮せずに休んじゃってください」"
translation = "「게다가 히노미야 군도 쉬고 있으니까요. 사샤 씨도 사양 말고 쉬어 주세요.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そうよ！\u3000クロトなんて『妹から逃げるから来れない』なんて理由なんだから、サーシャさんが遠慮する必要なんてないわ！」"
translation = "「그래! 쿠로토는 『여동생한테서 도망쳐야 하니까 못 온다』는 이유니까, 사샤 씨가 사양할 필요 전혀 없어!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「どの妹さんなんでしょうね。やれやれ」"
translation = "「어느 쪽 여동생일까요. 참 나.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あはは……本人的には死活問題なんだろうけど」"
translation = "「아하하…… 본인에게는 사활이 걸린 문제겠지만.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そうね、それじゃお言葉に甘えさせてもらおうかしら。今日は失礼するわね～」"
translation = "「그렇네, 그럼 호의를 받아들여서 실례하도록 할까~. 오늘은 먼저 가볼게~」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「お疲れ様です」"
translation = "「수고하셨습니다.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「また明日！」"
translation = "「내일 봐!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「グッドラックです、サーシャ先輩」"
translation = "「굿 럭이에요, 사샤 선배.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「お疲れ様～」"
translation = "「수고했어~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "（時間は……うん、大丈夫。ちょうどいい頃合いね）"
translation = "(시간은…… 응, 괜찮아. 딱 좋은 때네.)"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "（あの子、私のこと、すぐに気づいてくれるかしら？）"
translation = "(그 아이, 나를 바로 알아봐 줄까?)"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "（どうかしらね？\u3000あれからだいぶ時間も経っちゃったし……）"
translation = "(어떠려나? 그때부터 꽤 시간도 흘러버렸고……)"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "（…………）"
translation = "(…………)"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "（星徒会室に続く廊下を最初に通ったのは、先代星徒会長の指名を受けた時だったわね）"
translation = "(성도회실로 이어지는 복도를 처음 지났던 건 선대 성도회장의 지명을 받았을 때였지.)"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "（その次は、あの子とふたりで……気がつけば時間は積み重なっていくのね）"
translation = "(그다음은 그 아이와 둘이서…… 정신 차려 보니 시간은 쌓여가네.)"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "（あの時は今に繋がって、今も未来に繋がって……）"
translation = "(그때는 지금으로 이어지고, 지금도 미래로 이어져서……)"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "（そうして私も卒業して、その頃にはまた新しい星徒会がここを通るのね～）"
translation = "(그렇게 나도 졸업하고, 그때쯤이면 또 새로운 성도회가 여기를 지나가겠지~)"

[[dialogue]]
speaker = "unk"
original = "校門は生徒たちがまばらに、連れ立って下校していく。"
translation = "교문에는 학생들이 띄엄띄엄 무리 지어 하교하고 있다."

[[dialogue]]
speaker = "unk"
original = "リクリエによって大きなダメージを受けた流星市国だったが、学園付近は比較的無事であり、景観もそう変わっていない。"
translation = "리크리에에 의해 큰 피해를 입었던 유성시국이었지만, 학원 부근은 비교적 무사했으며 경관도 그리 변하지 않았다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "（私たちが守った景色。変わり映え映えのない日常といってしまえばそれだけだけど……）"
translation = "(우리가 지켜낸 풍경. 변함없는 일상이라고 해버리면 그뿐이지만……)"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふっ、感傷に浸りすぎかしら……こんな感覚、久しぶりかも」"
translation = "「후후, 너무 감상에 젖었나…… 이런 기분, 오랜만일지도.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「──あら」"
translation = "「──어라.」"

[[dialogue]]
speaker = "？？？"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "（……向こうはまだ気付いてないみたいね～）"
translation = "(……저쪽은 아직 눈치채지 못한 모양이네~)"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "（というか久しぶりの流星市国にウキウキみたい。声をかけてあげないと気づいてもらえないかしら？）"
translation = "(그보다 오랜만의 유성시국이라 신이 난 것 같아. 말을 걸어주지 않으면 몰라주려나?)"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「も～……仕方ないんだから」"
translation = "「정말~…… 어쩔 수 없다니까.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「相変わらずね、シルヴィ」"
translation = "「여전하네, 실비.」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「えっ、あ！？\u3000サーシャ！？」"
translation = "「엣, 아!? 사샤!?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「おかえりなさい。あなたの帰りを、ずっと待ってたわ」"
translation = "「어서 와. 네가 돌아오기를 계속 기다렸어.」"

