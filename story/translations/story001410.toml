[[dialogue]]
speaker = "リーリア"
original = "「も～……マジで、容赦なさすぎ……流れ的に、ここは私に花を持たせとくところですよね……」"
translation = "「정말…… 진짜로 너무 봐주지 않네…… 흐름상 여기는 저한테 점수를 따게 해줘야 할 타이밍이잖아요……」"

[[dialogue]]
speaker = "セドナ"
original = "「知らん、私は空気が読めないらしいからな……」"
translation = "「모른다, 나는 눈치가 없는 모양이니까 말이다……」"

[[dialogue]]
speaker = "リーリア"
original = "「あ～、そうでしたね」"
translation = "「아~, 그랬었죠.」"

[[dialogue]]
speaker = "セドナ"
original = "「だが今までで一番、よかったぞ……合宿に来た成果は十分あったようだ」"
translation = "「하지만 지금까지 중 가장 좋았다……. 합숙에 온 성과는 충분히 있었던 모양이군.」"

[[dialogue]]
speaker = "リーリア"
original = "「だから合宿じゃなくて親睦会だって、何度言えばわかるんですか。って、あ――」"
translation = "「그러니까 합숙이 아니라 친목회라고 몇 번을 말해야 알아들으세요. 앗, 아――」"

[[dialogue]]
speaker = "リーリア"
original = "「すごい……綺麗な花火……」"
translation = "「굉장해…… 예쁜 불꽃……」"

[[dialogue]]
speaker = "セドナ"
original = "「そういえばこの結界は、夏を楽しんで欲しいという想いが込められている、という話だったな」"
translation = "「그러고 보니 이 결계는 여름을 즐겨주었으면 하는 마음이 담겨 있다는 이야기였지.」"

[[dialogue]]
speaker = "セドナ"
original = "「この打ち上げ花火も、結界の主による夏の演出、というわけか」"
translation = "「이 불꽃놀이도 결계의 주인에 의한 여름의 연출이라는 건가.」"

[[dialogue]]
speaker = "リーリア"
original = "「気が利いてますね……あ～あ、これを一緒に見上げてるのがセンパイだったら、最高だったのに」"
translation = "「센스가 좋네요…… 아~아, 이걸 같이 올려다보고 있는 게 선배였다면 최고였을 텐데.」"

[[dialogue]]
speaker = "セドナ"
original = "「ふっ、ぬかせ……」"
translation = "「훗, 입만 살았군……」"

[[dialogue]]
speaker = "セドナ"
original = "「この度はご招待頂いて心より感謝する。実に充実した時間を過ごすことができた」"
translation = "「이번 초대에 진심으로 감사한다. 실로 충실한 시간을 보낼 수 있었다.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「こちらこそ楽しかったわ。また一緒に遊びましょう！」"
translation = "「우리야말로 즐거웠어. 또 같이 놀자!」"

[[dialogue]]
speaker = "セドナ"
original = "「遊ぶ……か。ふっ、そうだな。またよろしく頼む」"
translation = "「노는 것……인가. 훗, 그렇지. 다시 잘 부탁하마.」"

[[dialogue]]
speaker = "アイリーン"
original = "「おぉ、セドナ長官が遊びのお誘いに応じるなんて」"
translation = "「오오, 세드나 장관이 놀이 제안에 응하다니.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「やっぱりアレじゃない？\u3000リーリアの熱い想いをぶつけられて心境の変化が――」"
translation = "「역시 그거 아냐? 리리아의 뜨거운 마음을 전달받아서 심경에 변화가――」"

[[dialogue]]
speaker = "リーリア"
original = "「やめてくださいよ！\u3000思い出すだけでも恥ずかしいんですから！」"
translation = "「그만 하세요! 떠올리는 것만으로도 창피하니까요!」"

[[dialogue]]
speaker = "リーリア"
original = "「酷いですよ、みんなで隠れて全部見てたなんて……」"
translation = "「너무해요, 다들 숨어서 전부 보고 있었다니……」"

[[dialogue]]
speaker = "unk"
original = "でもリーリア、かっこよかったよ"
translation = "하지만 리리아, 멋있었어."

[[dialogue]]
speaker = "unk"
original = "覗き見してたのはごめん"
translation = "훔쳐본 건 미안해."

[[dialogue]]
speaker = "リーリア"
original = "「うぅう……恥ずかしいけど、センパイに褒めてもらえるのは嬉しいかも」"
translation = "「으으으…… 부끄럽지만, 선배한테 칭찬받는 건 기쁠지도.」"

[[dialogue]]
speaker = "リーリア"
original = "「私、もっともっと頑張りますからっ。よく出来た時には、ちゃんと責任持ってマジカル可愛い後輩のことを褒めるんですよ！」"
translation = "「저, 더욱더 노력할 테니까요. 잘 해냈을 때는 확실히 책임지고 매지컬 귀여운 후배를 칭찬해 주셔야 해요!」"

[[dialogue]]
speaker = "unk"
original = "任せてくれ"
translation = "맡겨 줘."

[[dialogue]]
speaker = "リーリア"
original = "「はいっ」"
translation = "「네!」"

[[dialogue]]
speaker = "セドナ"
original = "「そうだな、リーリアにはこれからも頑張ってもらわねば困る」"
translation = "「그렇군, 리리아에겐 앞으로도 힘내주지 않으면 곤란해.」"

[[dialogue]]
speaker = "リーリア"
original = "「うー、また……分かってますよ、日々の訓練は欠かしませんから」"
translation = "「우으, 또…… 알고 있다고요, 매일 훈련은 거르지 않을 테니까요.」"

[[dialogue]]
speaker = "セドナ"
original = "「いや、お前は全く分かっていない」"
translation = "「아니, 너는 전혀 이해하지 못하고 있다.」"

[[dialogue]]
speaker = "セドナ"
original = "「お前にはこれからも、新星学園と友好な関係を築くために、頑張ってもらわねば困ると言いたかったのだ」"
translation = "「네가 앞으로도 신성학원과 우호적인 관계를 쌓기 위해 노력해주지 않으면 곤란하다고 말하고 싶었던 거다.」"

[[dialogue]]
speaker = "リーリア"
original = "「え……」"
translation = "「에……」"

[[dialogue]]
speaker = "セドナ"
original = "「……頼んだぞ」"
translation = "「……부탁하마.」"

[[dialogue]]
speaker = "リーリア"
original = "「は、はいっ！」"
translation = "「네, 넵!」"

[[dialogue]]
speaker = "unk"
original = "こうして、俺たち新星星徒会とネビュラによる親睦会は――"
translation = "이렇게 우리 신성학생회와 네뷸라의 친목회는――"

[[dialogue]]
speaker = "unk"
original = "目には見えないところでも、大きな成果を残して幕を下ろしたのだった。"
translation = "눈에 보이지 않는 곳에서도 큰 성과를 남기며 막을 내렸다."

[[dialogue]]
speaker = "セドナ"
original = "「ああ、無論日々の研鑽も欠かさぬようにな。水着フォームでの戦闘についても反省点が多い。基地に戻ったらすぐにミーティングだ」"
translation = "「아아, 물론 매일의 정진도 게을리하지 않도록. 수영복 폼에서의 전투에 대해서도 반성할 점이 많다. 기지로 돌아가면 바로 미팅이다.」"

[[dialogue]]
speaker = "リーリア"
original = "「もーっ、結局そういうとこは変わってないんですからっ！！」"
translation = "「정말~, 결국 그런 점은 변하지 않았다니까요!!」"

