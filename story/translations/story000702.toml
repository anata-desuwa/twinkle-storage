[[dialogue]]
speaker = "unk"
original = "サーシャさんとソフィアを、姉妹一緒に初詣へ行かせたいというウズメイア。俺とヴィーナスは、彼女から事情を聞くことにした。"
translation = "사샤 씨와 소피아를 자매끼리 하츠모데에 보내고 싶다는 우즈메이야. 나와 비너스는 그녀로부터 사정을 듣기로 했다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「――ふむふむ、ソフィアがそんなことを言っていたのね」"
translation = "「――흠흠, 소피아가 그런 말을 했구나.」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「はい。サーシャ先輩と初詣に行く気はないって」"
translation = "「네. 사샤 선배랑 하츠모데에 갈 생각은 없다고.」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「でも、あたしとしては、ソフィアが意地を張ってるように見えるというか。なにより、もったいないって感じちゃうんですよ！」"
translation = "「하지만 제가 보기엔 소피아가 고집을 부리고 있는 것처럼 보인달까. 무엇보다 아깝다는 느낌이 든다구요!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「もったいない？」"
translation = "「아깝다니?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「だって、家族が会いに行ける距離にいて、一緒に過ごせるのって幸せなことじゃないですか～」"
translation = "「그야 가족이 만나러 갈 수 있는 거리에 있고, 같이 보낼 수 있는 건 행복한 일이잖아요~」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あたしは天使で、今は天界にいる家族と離れて、寮暮らしをしてるので……」"
translation = "「나는 천사고 지금은 천계에 있는 가족과 떨어져서 기숙사 생활을 하고 있으니까……」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「それにソフィアは、お姉さんと仲良くないって言いますけど、本当は仲良くしたいって、顔を見ればわかります」"
translation = "「게다가 소피아는 언니랑 사이가 안 좋다고 말하지만, 사실은 사이좋게 지내고 싶어 한다는 건 얼굴을 보면 알 수 있어요.」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「それくらいにはちゃんと<b>親友</b>だと、あたしは思ってますから。……まあ、ソフィアがあたしをどう思ってるのかは、わからないんですけど！」"
translation = "「그 정도로는 제대로 된 <b>절친</b>이라고 나는 생각하니까요. ……뭐, 소피아가 나를 어떻게 생각하는지는 모르겠지만요!」"

[[dialogue]]
speaker = "unk"
original = "ウズメイアは友達想いなんだな"
translation = "우즈메이야는 친구를 많이 생각하는구나."

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あはは♪\u3000どうなんですかね～。お節介かもって、正直自分で思ったりもするんですけど……でも」"
translation = "「아하하♪ 그런 걸까요~. 오지랖일지도 모른다고 솔직히 스스로도 생각하긴 하지만…… 그래도」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「見て見ぬフリするのも、友達として違うかなって思ったんで。それにほら、もうすぐ新年を迎えるわけだし！」"
translation = "「보고도 못 본 척하는 것도 친구로서 좀 아닌 것 같아서요. 그리고 봐요, 이제 곧 신년을 맞이하잖아요!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「そこで心機一転、来年は姉妹仲良くできたら素敵じゃん！\u3000的な？」"
translation = "「거기서 심기일전해서 내년에는 자매끼리 사이좋게 지내면 멋지잖아! 같은 느낌?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「いいわね！\u3000確かにその通りだわ！」"
translation = "「좋네! 확실히 네 말이 맞아!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あなたはすごく素敵な天使よ、ウズメ。それで、ソフィアとサーシャさんのことだけど――」"
translation = "「넌 정말 멋진 천사야, 우즈메. 그래서 소피아와 사샤 씨 일 말인데――」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「私も喜んで協力するわ！\u3000任せなさい！」"
translation = "「나도 기꺼이 협력할게! 맡겨둬!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「というわけで、ひとっ走り行ってくるわ！\u3000クロト、ウズメのことをよろしく！」"
translation = "「그런 고로, 한바탕 다녀올게! 쿠로토, 우즈메를 부탁해!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「えっ！？\u3000ちょっ、ヴィーナス先輩！？\u3000いきなり走り出してどこへ！？」"
translation = "「엣!? 잠깐, 비너스 선배!? 갑자기 달려나가서 어디로!?」"

[[dialogue]]
speaker = "unk"
original = "いつものことなんで大丈夫"
translation = "언제나 있는 일이니까 괜찮아."

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「なんか会長さんは、落ち着いてるし！」"
translation = "「왠지 회장님은 침착하시네요!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「――え？\u3000ＤＩＳＣの連絡先を交換してもいいか？」"
translation = "「――에? DISC 연락처를 교환해도 되냐구요?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「会長さんも協力してくれるんですか？\u3000……ありがとうございます！」"
translation = "「회장님도 협력해 주시는 건가요? ……감사합니다!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ヴィーナス先輩の行方は気になりますけど、改めて、よろしくお願いしますね♪」"
translation = "「비너스 선배의 행방은 신경 쓰이지만, 아무튼 잘 부탁드려요♪」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「それと、個人的にも、新星の会長さんとは友達になりたいなって思っていたんで、これから仲良くしてもらえると嬉しいです！」"
translation = "「그리고 개인적으로도 신성의 회장님이랑은 친구가 되고 싶다고 생각했으니까, 앞으로 사이좋게 지내주시면 기쁘겠어요!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あたしのことは是非、<b>ウズメ</b>って呼んで下さい♪\u3000この国の愛称っぽいので、気に入ってるんです～」"
translation = "「나를 부를 때는 꼭 <b>우즈메</b>라고 불러주세요♪ 이 나라의 애칭 같아서 마음에 들거든요~」"

[[dialogue]]
speaker = "unk"
original = "俺はそうして、新たな友人のウズメと、握手を交わすのだった。"
translation = "나는 그렇게 해서 새로운 친구인 우즈메와 악수를 나누는 것이었다."

[[dialogue]]
speaker = "unk"
original = "一方、その頃――"
translation = "한편, 그 무렵――"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ふむ……」"
translation = "「흐음……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "（ウズメさん、なかなか部屋にこないし、連絡もないので探しにきましたが、いないですね……。なにかあったんでしょうか……？）"
translation = "(우즈메 씨, 좀처럼 방으로 오지 않고 연락도 없어서 찾으러 왔습니다만 없네요……. 무슨 일이라도 생긴 걸까요……?)"

[[dialogue]]
speaker = "？？？"
original = "「ソ～フィ～ア～……！」"
translation = "「소~피~아~……!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「え？\u3000この声は……！？」"
translation = "「에? 이 목소리는……!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「見つけたわ！」"
translation = "「찾았다!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「び、ヴィーナスさん？\u3000どうしたんですか、すごい勢いで走ってきたりして……」"
translation = "「비, 비너스 씨? 무슨 일인가요, 엄청난 기세로 달려오고……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「こんにちは、ソフィア！\u3000いきなりだけど、フィクサーとして、あなたに命令するわ！」"
translation = "「안녕, 소피아! 갑작스럽지만 픽서로서 당신에게 명령하겠어!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「今度のお正月、サーシャさんと決闘しなさい！！」"
translation = "「이번 설날, 사샤 씨와 결투해!!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「どういうことです！？」"
translation = "「그게 무슨 소린가요!?」"

[[dialogue]]
speaker = "unk"
original = "突然の提案に、ソフィアは目を白黒させてしまうのだった――"
translation = "갑작스러운 제안에 소피아는 눈을 동그랗게 뜨고 당황해버리는 것이었다――"

