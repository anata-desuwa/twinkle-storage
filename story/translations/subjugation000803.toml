[[dialogue]]
speaker = "unk"
original = "大聖堂カフェテリアから、つい逃げ出してしまったせつな――"
translation = "대성당 카페테리아에서 그만 도망쳐 버린 세츠나──"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「うぅ……耐えて忍ぶのが忍者だというのに、恥ずかしさを抑え切れず、主様に無礼な態度をとってしまったでござる……」"
translation = "「우으…… 참고 견디는 것이 닌자이거늘, 부끄러움을 억누르지 못하고 주군께 무례한 태도를 취하고 만 소……」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「でも……バレンタインの日まで、主様に打ち明けるわけには――」"
translation = "「하지만…… 밸런타인 날까지 주군께 털어놓을 수는──」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「なるほど。やはりそういうことね」"
translation = "「과연. 역시 그런 거였군.」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「って、蘭美殿！？\u3000いつの間に！？」"
translation = "「앗, 라비 공!? 어느 사이에!?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ふっ、本物の忍者である貴方といえど、学園最速と呼ばれる私からは、そう簡単に逃げられないわよ」"
translation = "「훗, 진짜 닌자인 너라고 해도 학원 최속이라 불리는 나한테서 그렇게 쉽게 도망칠 순 없다고.」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「さすがは飛び級のメイド長……恐るべしでござる……」"
translation = "「역시 월반한 메이드장…… 두려운 소이옵니다……」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「変な隠し事も光速で看破するから、私には通用しないわ。せつな、貴方――」"
translation = "「이상한 숨김말도 광속으로 간파하니까 나한테는 안 통해. 세츠나, 너──」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「会長にバレンタインチョコを作っていたんじゃない？」"
translation = "「회장에게 줄 밸런타인 초코를 만들고 있었던 거 아냐?」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「う……は、はい……。実は……」"
translation = "「우…… 네, 네……. 실은……」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「せつなはカフェテリアの厨房を貸して頂いて……主様へ贈る手作りバレンタインチョコの、修業をしていたのでござる」"
translation = "「세츠나는 카페테리아 주방을 빌려서…… 주군께 드릴 수제 밸런타인 초코 수행을 하고 있었던 소이옵니다.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「だから会長には、今度のバレンタイン当日まで秘密にしておきたかった、というわけね」"
translation = "「그래서 회장에게는 이번 밸런타인 당일까지 비밀로 하고 싶었다는 거네.」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「左様にござる……」"
translation = "「그러하오……」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「会長の前から逃げた理由はわかったわ。でも、それだけじゃまだ分からないことがある」"
translation = "「회장 앞에서 도망친 이유는 알겠어. 하지만 그것만으로는 아직 이해가 안 가는 게 있어.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「あのゴーレムは一体なんなの？\u3000貴方が作り出したって言ってたけど、アレからは甘い匂い――」"
translation = "「그 골렘은 대체 뭐야? 네가 만들었다고 했는데, 거기선 달콤한 냄새──」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「そう、<b>チョコレート</b>の匂いがしてたわ」"
translation = "「그래, <b>초콜릿</b> 냄새가 났어.」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「……チョコが変身したのでござる」"
translation = "「……초코가 변신한 소이옵니다.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「は？」"
translation = "「하?」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「せつながチョコを作っていたら、なぜか勝手に星術が発動して、ゴーレムに変身してしまったのでござる！」"
translation = "「세츠나가 초코를 만들고 있었더니 왜인지 멋대로 성술이 발동해서 골렘으로 변신해 버린 소이옵니다!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「えっと……せつな？」"
translation = "「어 그러니까…… 세츠나?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「確かに、貴方が料理が苦手なのは知っているわ。だけど――」"
translation = "「확실히 네가 요리 서툰 건 알고 있어. 하지만──」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「チョコは突然、ゴーレムになったりしないわ！」"
translation = "「초코는 갑자기 골렘이 되거나 하지 않아!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「自分でもそう思うでござるが、なっちゃったのでござる！」"
translation = "「본인도 그렇게 생각하오만, 되어 버린 소이옵니다!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「いや、どういう星術よ！？」"
translation = "「아니, 대체 뭔 성술이야!?」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「せつなも初めてのことで……料理をしててダークマターを作り出してしまうことなら、これまでもあったでござるが……」"
translation = "「세츠나도 처음 겪는 일이라…… 요리를 하다가 다크 매터를 만들어 버리는 일이라면 전에도 있었소만……」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ダークマターも普通は生まれないけどね！？」"
translation = "「다크 매터도 보통은 안 태어난다고!?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「とにかく、事情は把握したわ。そういうことなら――」"
translation = "「어쨌든 사정은 파악했어. 그렇게 된 거라면──」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「この世界第２位の天才美少女メイド、羽宮蘭美が、貴方に直接チョコ作りの指導をしてあげるわ！」"
translation = "「이 세계 2위인 천재 미소녀 메이드, 하네미야 라비가 너에게 직접 초코 만들기 지도를 해주겠어!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「えっ！？\u3000蘭美殿、せつなを手伝って下さるのでござるか！？」"
translation = "「엣!? 라비 공, 세츠나를 도와주시는 소이옵니까!?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「まあ、またさっきみたいなゴーレム騒ぎを起こして、九浄家メイド隊の悪評が立っても困るしね」"
translation = "「뭐, 또 아까 같은 골렘 소동을 일으켜서 쿠죠 가문 메이드대의 악평이 돌아도 곤란하니까.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「メイド長として、特別に面倒を見てあげるわ。光栄に思いなさい？」"
translation = "「메이드장으로서 특별히 보살펴 주겠어. 영광으로 알라고?」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「蘭美殿……！\u3000感謝致しまする！」"
translation = "「라비 공……! 감사하옵니다!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ふふんっ♪\u3000それじゃあ最速で――今日からバレンタイン修業、スタートよ！」"
translation = "「후훙♪ 그럼 최속으로── 오늘부터 밸런타인 수행, 스타트야!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「御意！」"
translation = "「어의!」"

[[dialogue]]
speaker = "unk"
original = "それから２人は再びカフェテリアに移動し、厨房を借りて、チョコ作りを開始することになった――"
translation = "그러고 나서 두 사람은 다시 카페테리아로 이동해 주방을 빌려 초코 만들기를 시작하게 되었다──"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「会長はどうやら、仕事で星徒会室に戻ったみたいね」"
translation = "「회장은 아무래도 일 때문에 성도회실로 돌아간 모양이네.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「それから、材料のチョコも在庫は十分と。うん、このまま問題なく始められるわね」"
translation = "「그리고 재료인 초코도 재고는 충분하고. 응, 이대로 문제없이 시작할 수 있겠어.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「そういえば、ゴーレムの方が気になってたから聞き忘れてたけど。せつな、その服ってどうしたの？\u3000今まで見せたことなかったわよね？」"
translation = "「그러고 보니 골렘 쪽이 신경 쓰여서 잊고 있었는데. 세츠나, 그 옷은 어떻게 된 거야? 지금까지 보여준 적 없었잖아?」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「このバレンタイン衣装でござるか？\u3000これはご当主様が下さったのでござる！」"
translation = "「이 밸런타인 의상 말이오? 이건 당주님께서 주신 소이옵니다!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ヘレナ様が？」"
translation = "「헬레나 님이?」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「はい。主様に手作りチョコを贈りたいという話をしたら、何やら閃いたと仰って……」"
translation = "「네. 주군께 수제 초코를 드리고 싶다는 이야기를 했더니, 뭔가가 번뜩였다고 말씀하시며……」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「せつなの為にわざわざデザインして、作って下さったのでござる！」"
translation = "「세츠나를 위해 일부러 디자인해서 만들어 주신 소이옵니다!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「言われてみれば、可愛いもの好きなヘレナ様らしいデザインね。せつなになかなか似合っていると、褒めてあげるわ」"
translation = "「듣고 보니 귀여운 걸 좋아하는 헬레나 님다운 디자인이네. 세츠나에게 꽤 잘 어울린다고 칭찬해 줄게.」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「えへへぇ♪\u3000蘭美殿、ありがとうでございまする！」"
translation = "「에헤헤♪ 라비 공, 고마운 소이옵니다!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「それじゃあ、チョコ作りを始めていくわよ。せつな」"
translation = "「그럼 초코 만들기를 시작해 보자고. 세츠나.」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「かしこまりましてにござる！」"
translation = "「명을 받들겠소!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「――って、待ちなさい。貴方がいま取り出した液体が入っているビンはなんなの？」"
translation = "「──잠깐 기다려. 네가 지금 꺼낸 액체가 든 병은 뭐야?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「なんというか、液体が形容しがたい色をしているけど！」"
translation = "「뭐랄까, 액체 색깔이 형언할 수 없는 색인데!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「？\u3000これは材料に使おうと思って用意した、せつな特製の調合ドリンクにござる！\u3000滋養強壮の効果があり、三日三晩寝ずとも働けるようになる優れモノでござる！」"
translation = "「? 이건 재료로 쓰려고 준비한 세츠나 특제 조합 드링크이오! 자양강장의 효과가 있어 3일 밤낮을 자지 않고도 일할 수 있게 되는 뛰어난 물건이오!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「調合成分は紫桜の里の秘伝ゆえ、具体名は明かせぬでござるが、野草半分、虫半分くらいの割合でござる！」"
translation = "「조합 성분은 자앵마을의 비전이라 구체적인 이름은 밝힐 수 없소만, 들풀 절반, 벌레 절반 정도의 비율이오!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ゴーレム化の原因、それじゃないの！？」"
translation = "「골렘화의 원인, 그거 아냐!?」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「いやいや！\u3000これは、前にも料理に使ったことがあるでござるよ！」"
translation = "「아니 아니! 이건 전에도 요리에 쓴 적이 있소!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「その時はせつなの腕の未熟さゆえ、完食して下さった主様は、御前試合で戦い抜いた時のような険しい表情になっていたでござるが……」"
translation = "「그때는 세츠나의 솜씨가 미숙했던 탓에 완식해 주신 주군께서는 어전 시합에서 싸워냈을 때처럼 험악한 표정이 되셨소만……」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「会長、男気あるわね！\u3000素直に尊敬したわ、今！」"
translation = "「회장, 대인배네! 솔직히 지금 존경했어!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ともかく、それを使うのは、メイド長権限で禁止よ！\u3000チョコが美味しくなるビジョンが見えないし！」"
translation = "「어쨌든 그거 쓰는 건 메이드장 권한으로 금지야! 초코가 맛있어지는 비전이 전혀 안 보인다고!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「そんな～。バレンタインチョコに、せつなのオリジナリティをと思ったのでござるが……」"
translation = "「너무하오~. 밸런타인 초코에 세츠나의 독창성을 담으려 했거늘……」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「そういうのは、まともに食べれるチョコを作れるようになってから言いなさい！」"
translation = "「그런 건 제대로 먹을 수 있는 초코를 만들 수 있게 된 다음에 말해!」"

[[dialogue]]
speaker = "unk"
original = "そんなこんなで、蘭美によるチョコ作り指導がスタートするのだった――"
translation = "이러쿵저러쿵해서 라비에 의한 초코 만들기 지도가 시작되는 것이었다──"

