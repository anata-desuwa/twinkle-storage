[[dialogue]]
speaker = "リア"
original = "「あぅ～、負けちゃった……」"
translation = "「아우~, 져버렸어……」"

[[dialogue]]
speaker = "聖沙"
original = "「まさかそんな……お姉さまと一緒でも勝てないなんて……」"
translation = "「설마 그럴 수가…… 언니랑 같이 있는데도 이길 수 없다니……」"

[[dialogue]]
speaker = "リア"
original = "「ごめんね、聖沙ちゃん」"
translation = "「미안해, 미사짱」"

[[dialogue]]
speaker = "聖沙"
original = "「いいえ、お姉さまのせいじゃないですっ。私が不甲斐ないから……」"
translation = "「아니요, 언니 탓이 아니에요. 제가 한심해서……」"

[[dialogue]]
speaker = "リア"
original = "「わたしたちじゃ勝てない……だけどそれって、私たちももっと強くなる余地があるってことじゃないかな」"
translation = "「우리들로는 이길 수 없어…… 하지만 그건, 우리도 더 강해질 여지가 있다는 뜻 아닐까」"

[[dialogue]]
speaker = "聖沙"
original = "「さすがお姉さまです！\u3000高みを目指してもっと頑張りましょう！」"
translation = "「역시 언니예요! 높은 곳을 목표로 더 힘내요!」"

