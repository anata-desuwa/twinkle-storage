[[dialogue]]
speaker = "unk"
original = "第４話,まるで姉妹のようだった,B"
translation = "제4화, 마치 자매 같았다, B"

[[dialogue]]
speaker = "unk"
original = "星徒会室を後にしたサーシャとシルヴィは、食事をとろうとカフェテリアに足を運んだ。"
translation = "성도회실을 나선 사샤와 실비는 식사를 하러 카페테리아로 발걸음을 옮겼다."

[[dialogue]]
speaker = "シルヴィ"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker = "蛍火"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker = "シルヴィ"
original = "「……はっ！？\u3000また反射的に<ruby>蛍火<rt>けいか</rt></ruby>ちゃんから隠れちゃった！」"
translation = "「……핫!? 또 반사적으로 케이카짱한테서 숨어버렸어!」"

[[dialogue]]
speaker = "サーシャ"
original = "「その癖、まだ治らないのね～。久々に見たわ～」"
translation = "「그 버릇, 아직 안 고쳐졌네~. 오랜만에 봤어~」"

[[dialogue]]
speaker = "シルヴィ"
original = "「ごごごごめん、蛍火ちゃん、ホントにごめん！\u3000あたしももう大丈夫だと思ったんだけど、つい！」"
translation = "「미미미미안, 케이카짱, 정말 미안! 나도 이제 괜찮을 줄 알았는데, 그만!」"

[[dialogue]]
speaker = "蛍火"
original = "「……いえ、常に柔らかい雰囲気を纏うことができれば、先輩を怯えさせることもないはず。私の精進が足りないのです」"
translation = "「……아니요, 항상 부드러운 분위기를 두를 수 있다면, 선배를 겁먹게 할 일도 없을 터. 저의 정진이 부족한 것입니다」"

[[dialogue]]
speaker = "シルヴィ"
original = "「蛍火ちゃんは悪くないからー！！」"
translation = "「케이카짱은 잘못 없어ー!!」"

[[dialogue]]
speaker = "サーシャ"
original = "（うふふ、またやってるわ～）"
translation = "（우후후, 또 저러네~）"

[[dialogue]]
speaker = "unk"
original = "彼女は<ruby>東雲<rt>しののめ</rt></ruby>蛍火。現・給食委員であり、元星徒会メンバーでもある。"
translation = "그녀는 시노노메 케이카. 현 급식 위원이며, 전 성도회 멤버이기도 하다."

[[dialogue]]
speaker = "unk"
original = "強力な星騎士だったが、サーシャの推薦と本人の意向で、カフェテリアで料理人を務めている。"
translation = "강력한 성기사였으나, 사샤의 추천과 본인의 의향으로 카페테리아에서 요리사로 일하고 있다."

[[dialogue]]
speaker = "unk"
original = "極度の緊張しいと険しい表情で、初対面の相手をことごとく怖がらせる難儀な体質だ。"
translation = "극도의 긴장 체질과 험악한 표정 탓에, 초면인 상대를 모조리 겁먹게 만드는 난처한 체질이다."

[[dialogue]]
speaker = "unk"
original = "とはいえ人懐っこいシルヴィが、ここまで怯えるのには理由がある。"
translation = "그렇다 해도 사람을 잘 따르는 실비가 이 정도로 겁을 먹는 데는 이유가 있다."

[[dialogue]]
speaker = "unk"
original = "シルヴィの話によると、子どものころお世話になった恩人に似ているらしく、つい怯えてしまうらしい。"
translation = "실비의 말에 따르면, 어릴 적 신세를 졌던 은인과 닮아서 저도 모르게 겁을 먹게 된다는 모양이다."

[[dialogue]]
speaker = "サーシャ"
original = "「そんなに似てるの？\u3000蛍火ちゃんとそのお姉さん」"
translation = "「그렇게 닮았어? 케이카짱이랑 그 언니분이」"

[[dialogue]]
speaker = "シルヴィ"
original = "「そうなんだよ～。頭では違うって分かってても、つい体が反応しちゃうんだよ～」"
translation = "「그렇다니까~. 머리로는 다르다는 걸 알아도, 자꾸 몸이 반응해버려~」"

[[dialogue]]
speaker = "蛍火"
original = "「少々お待ちください」"
translation = "「잠시만 기다려 주십시오」"

[[dialogue]]
speaker = "蛍火"
original = "「こちらをどうぞ。チキン南蛮定食です」"
translation = "「이쪽을 드시죠. 치킨 남반 정식입니다」"

[[dialogue]]
speaker = "シルヴィ"
original = "「っ！\u3000いただきます！」"
translation = "「윽! 잘 먹겠습니다!」"

[[dialogue]]
speaker = "シルヴィ"
original = "「ん～～～～！\u3000おいしいっ！」"
translation = "「음~~~~! 맛있어!」"

[[dialogue]]
speaker = "サーシャ"
original = "「んもう、またハムスターになってるわ～」"
translation = "「정말이지, 또 햄스터가 됐네~」"

[[dialogue]]
speaker = "蛍火"
original = "「フライドチキンや鶏のから揚げ、お好きだったかと思いましたので」"
translation = "「프라이드치킨이나 닭튀김을 좋아하실 거라 생각했기에」"

[[dialogue]]
speaker = "シルヴィ"
original = "「うれっしい！\u3000あたしの好きなもの覚えててくれたんだ！」"
translation = "「기뻐! 내가 좋아하는 걸 기억해 줬구나!」"

[[dialogue]]
speaker = "蛍火"
original = "「無論です。尊敬するシルヴィ先輩のことを忘れるはずがありません」"
translation = "「물론입니다. 존경하는 실비 선배를 잊을 리가 없습니다」"

[[dialogue]]
speaker = "サーシャ"
original = "「蛍火ちゃん、まだ固いわよ～。ほら、こちょこちょこちょ～」"
translation = "「케이카짱, 아직 딱딱해~. 자, 간질간질간질~」"

[[dialogue]]
speaker = "蛍火"
original = "「サーシャ先輩っ、あ、やめ………あは、あはははははっ、脇腹、やぁ、あ、あひ、あはははははっ！」"
translation = "「사샤 선배님, 아, 그만……… 아하, 아하하하하핫, 옆구리, 야아, 아, 아히, 아하하하하핫!」"

[[dialogue]]
speaker = "サーシャ"
original = "「どう、これで柔らかくなったかしら？」"
translation = "「어때, 이제 좀 부드러워졌으려나?」"

[[dialogue]]
speaker = "蛍火"
original = "「いきなりびっくりしました……スイッチを入れるみたいにくすぐるの、やめてください」"
translation = "「갑자기 깜짝 놀랐습니다…… 스위치를 켜듯이 간지럽히는 거, 하지 마세요」"

[[dialogue]]
speaker = "サーシャ"
original = "「ごめなんさいね～。でも、話しやすくなったでしょ？」"
translation = "「미안하구나~. 그래도, 말하기 편해졌지?」"

[[dialogue]]
speaker = "蛍火"
original = "「それはそうですけどぉ……お久しぶりです、シルヴィ先輩。お元気そうで何よりです」"
translation = "「그건 그렇지만요오…… 오랜만이에요, 실비 선배. 건강해 보이셔서 다행입니다」"

[[dialogue]]
speaker = "シルヴィ"
original = "「蛍火ちゃんも、元気そうでよかった！\u3000給食委員の仕事姿も決まってるよ！」"
translation = "「케이카짱도 건강해 보여서 다행이야! 급식 위원의 일하는 모습도 잘 어울려!」"

[[dialogue]]
speaker = "蛍火"
original = "「そう言っていただけると嬉しいです。星徒会を離れたのは心苦しいですが、それでも、私なりのやり方でみなさんのお役に立ちたいんです」"
translation = "「그렇게 말씀해 주시니 기쁩니다. 성도회를 떠난 것은 마음 아프지만, 그래도 저만의 방식으로 여러분께 도움이 되고 싶습니다」"

[[dialogue]]
speaker = "シルヴィ"
original = "「自信持って！\u3000こんな美味しい料理、蛍火ちゃんしか作れないんだから！」"
translation = "「자신감을 가져! 이런 맛있는 요리, 케이카짱밖에 못 만드니까!」"

[[dialogue]]
speaker = "サーシャ"
original = "「そうよ～。たとえ離れたり、役割が変わっても、私たちは仲間なのよ～」"
translation = "「그래~. 설령 떨어져 있거나 역할이 바뀌어도, 우리는 동료란다~」"

[[dialogue]]
speaker = "蛍火"
original = "「サーシャ先輩も、ありがとうございます。少し待っていてください、すぐ戻ります」"
translation = "「사샤 선배님도 감사합니다. 잠시만 기다려 주세요, 금방 돌아오겠습니다」"

[[dialogue]]
speaker = "蛍火"
original = "「少し休憩をいただいてきました。私もご一緒してよろしいですか？」"
translation = "「잠시 휴식을 얻어 왔습니다. 저도 함께해도 괜찮을까요?」"

[[dialogue]]
speaker = "２人"
original = "「もちろん♪」"
translation = "「물론이지♪」"

[[dialogue]]
speaker = "蛍火"
original = "「では、相席失礼して……こうしていると、星徒会のことを思い出しますね」"
translation = "「그럼 합석 실례하겠습니다…… 이러고 있으니 성도회 시절이 생각나네요」"

[[dialogue]]
speaker = "サーシャ"
original = "「書類仕事して、疲れたら、蛍火ちゃんが作ってくれたお菓子でお茶したり……」"
translation = "「서류 작업하고, 지치면 케이카짱이 만들어 준 과자로 차를 마시거나……」"

[[dialogue]]
speaker = "シルヴィ"
original = "「モンスター退治して、帰りにフライドチキン食べたり……」"
translation = "「몬스터 퇴치하고 돌아오는 길에 프라이드치킨을 먹거나……」"

[[dialogue]]
speaker = "サーシャ"
original = "「あんまり仕事がない日でも集まってＵＭＯしたり……」"
translation = "「별로 할 일이 없는 날에도 모여서 UMO를 하거나……」"

[[dialogue]]
speaker = "シルヴィ"
original = "「なんだかんだ、いつも一緒だったよね～」"
translation = "「이래저래, 항상 함께였지~」"

[[dialogue]]
speaker = "蛍火"
original = "「おふたりとも、まるで姉妹のようで、微笑ましかったです」"
translation = "「두 분 모두 마치 자매 같아서 보기 좋았습니다」"

[[dialogue]]
speaker = "２人"
original = "「…………？」"
translation = "「…………?」"

[[dialogue]]
speaker = "サーシャ"
original = "「姉妹？\u3000私と、シルヴィが？」"
translation = "「자매? 나랑, 실비가?」"

[[dialogue]]
speaker = "シルヴィ"
original = "「う～ん、なんかしっくりこないな～」"
translation = "「으음, 왠지 딱 와닿지 않네~」"

[[dialogue]]
speaker = "サーシャ"
original = "「姉でも妹でもないし、しいて言うなら……犬？\u3000気が付いたらそばにいるのよね～」"
translation = "「언니도 여동생도 아니고, 굳이 말하자면…… 강아지? 정신 차려보면 곁에 있단 말이지~」"

[[dialogue]]
speaker = "シルヴィ"
original = "「ならサーシャは猫だよね。いつの間にかふらっといなくなるし」"
translation = "「그럼 사샤는 고양이네. 어느샌가 훌쩍 사라져 버리고」"

[[dialogue]]
speaker = "２人"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "蛍火"
original = "「あ、あの……おふたりとも、私の、その……あ、姉みたいものだと思ってますからっ！」"
translation = "「아, 저기…… 두 분 다 저의, 그…… 아, 언니 같은 분들이라고 생각하니까요!」"

[[dialogue]]
speaker = "サーシャ"
original = "「もう～、可愛いこと言ってくれちゃって～♪\u3000頭なでなでしちゃう～♪」"
translation = "「정말~, 귀여운 소리를 다 해주고~♪ 머리 쓰담쓰담 해줄게~♪」"

[[dialogue]]
speaker = "シルヴィ"
original = "「あたしもあたしも～！\u3000蛍火ちゃん可愛いなぁもう！」"
translation = "「나도 나도~! 케이카짱 귀엽네 정말!」"

[[dialogue]]
speaker = "蛍火"
original = "「お、お手柔らかに～！」"
translation = "「사, 살살 부탁드려요~!」"

[[dialogue]]
speaker = "unk"
original = "ふたりがかりで可愛がられ、満更でもない蛍火であった。"
translation = "둘이서 귀여워해 주자, 싫지 않은 기색인 케이카였다."

