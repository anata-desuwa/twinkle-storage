[[dialogue]]
speaker = "unk"
original = "第３話,ウィステリアの秘密？,P"
translation = "제3화, 위스테리아의 비밀?"

[[dialogue]]
speaker = "unk"
original = "ウィステリアさんの新居が決まるまで、一時的に我が家に滞在することになった。"
translation = "위스테리아 씨의 새집이 결정될 때까지 일시적으로 우리 집에 머물게 되었다."

[[dialogue]]
speaker = "unk"
original = "しかも母さんが出張で家を離れてしまって、ウィステリアさんと２人きりだ。"
translation = "게다가 어머니께서 출장으로 집을 비우셔서 위스테리아 씨와 단둘이다."

[[dialogue]]
speaker = "ウィステリア"
original = "「会長くん、ショートケーキ作ったの。一緒に食べましょ──」"
translation = "「회장군, 쇼트케이크 만들었어. 같이 먹자──」"

[[dialogue]]
speaker = "ウィステリア"
original = "「きゃぁっ！？」"
translation = "「꺄앗!?」"

[[dialogue]]
speaker = "unk"
original = "危ない！！"
translation = "위험해!!"

[[dialogue]]
speaker = "ウィステリア"
original = "「あ、ありがとう、会長くん……受け止めてくれなかったら、ケーキが台無しになるところだったわ」"
translation = "「고, 고마워, 회장군…… 받아주지 않았으면 케이크가 엉망이 될 뻔했어」"

[[dialogue]]
speaker = "ウィステリア"
original = "「危ない危ない……ケーキを作ってる時も生地ひっくり返しそうになったし、やっぱり不運だわ……」"
translation = "「위험해 위험해…… 케이크 만들 때도 반죽을 엎을 뻔했고 역시 불운해……」"

[[dialogue]]
speaker = "unk"
original = "ケーキは無事だったが、深い胸の谷間にクリームがこぼれてしまっている。"
translation = "케이크는 무사했지만 깊은 가슴 골에 생크림이 쏟아져 버렸다."

[[dialogue]]
speaker = "unk"
original = "俺は顔を近づけて──"
translation = "나는 얼굴을 가까이 대고──"

[[dialogue]]
speaker = "unk"
original = "ぺろっ"
translation = "할짝"

[[dialogue]]
speaker = "ウィステリア"
original = "「ひゃあああっ！？」"
translation = "「히야아아앗!?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「かかかか、会長くん！？\u3000ちょっと大胆過ぎないかしら！？」"
translation = "「회, 회, 회, 회장군!? 좀 너무 대담한 거 아니니!?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「クリームがもったいなかったから？\u3000え～、絶対そうじゃないでしょ」"
translation = "「크림이 아까워서라고? 에~ 절대 그게 아닐 텐데」"

[[dialogue]]
speaker = "ウィステリア"
original = "「もう、またケーキ落とすところだったじゃない……会長くんも男の子なのね」"
translation = "「정말, 또 케이크 떨어뜨릴 뻔했잖아…… 회장군도 남자애구나」"

[[dialogue]]
speaker = "ウィステリア"
original = "「それじゃ気を取り直して、一緒にケーキ食べましょ。紅茶も淹れたわよ」"
translation = "「그럼 기운 차리고 같이 케이크 먹자. 홍차도 탔어」"

[[dialogue]]
speaker = "unk"
original = "ケーキ美味しいです"
translation = "케이크 맛있어요"

[[dialogue]]
speaker = "ウィステリア"
original = "「でしょう？\u3000星見家メイド隊で、キリカから教わったケーキなんだから。お菓子に関してはキリカのこと認めてるのよ、私」"
translation = "「그렇지? 호시미 가문 메이드대에서 키리카에게 배운 케이크니까. 과자에 관해서는 키리카를 인정하고 있어, 나」"

[[dialogue]]
speaker = "ウィステリア"
original = "「会長くんと一緒に三時のティータイムなんて、至福の時間だわ～♪」"
translation = "「회장군과 함께하는 세 시의 티타임이라니, 지복의 시간이네~♪」"

[[dialogue]]
speaker = "unk"
original = "ところで、ウィステリアさんって魔族なんですよね？"
translation = "그런데 위스테리아 씨는 마족인 거죠?"

[[dialogue]]
speaker = "ウィステリア"
original = "「そうよ。私、魔族らしくないかしら？」"
translation = "「맞아. 나, 마족답지 않니?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「……身体的特徴？\u3000ああ、魔女以外は、角とか尻尾とか何かしら付いてるものね」"
translation = "「……신체적 특징? 아아, 마녀 말고는 뿔이나 꼬리 같은 게 하나씩은 달려 있으니까」"

[[dialogue]]
speaker = "ウィステリア"
original = "「私の場合、腰から生えてる羽みたいなのがそれね」"
translation = "「나의 경우 허리에서 돋아난 날개 같은 게 그거야」"

[[dialogue]]
speaker = "unk"
original = "そこだったんですか！？"
translation = "거기였나요!?"

[[dialogue]]
speaker = "ウィステリア"
original = "「そうよ。そんなに大きくないから、付いてるのに気付かない人もいるけどね」"
translation = "「응. 그렇게 크지 않아서 달려 있는 걸 모르는 사람도 있지만 말이야」"

[[dialogue]]
speaker = "ウィステリア"
original = "「これ、石でできてるのよ。動物の耳だったり、竜の翼だったりはあるけど、無機物系の特徴を持つ魔族は珍しいかもしれないわね」"
translation = "「이거 돌로 되어 있어. 동물의 귀나 용의 날개 같은 건 흔하지만 무기물 계통의 특징을 가진 마족은 희귀할지도 모르겠네」"

[[dialogue]]
speaker = "ウィステリア"
original = "「お祖父様──なんて呼び方は今はしなくていいわね。うちの祖父は体の半分が水晶だったし、そういう一族なのよ」"
translation = "「할아버님── 같은 호칭은 지금 안 해도 되겠지. 우리 할아버지는 몸의 절반이 수정이었고 그런 일족이야」"

[[dialogue]]
speaker = "ウィステリア"
original = "「……私の実家の話？\u3000話してもいいけど、あんまりおもしろい話じゃないわよ」"
translation = "「……내 본가 이야기? 해도 되지만 그렇게 재미있는 이야기는 아니야」"

[[dialogue]]
speaker = "ウィステリア"
original = "「魔界にはドゥームフォレストって呼ばれる、暗い暗い森があって、さらにその奥に大きな渓谷があるの」"
translation = "「마계에는 둠 포레스트라고 불리는 아주 어둡고 어두운 숲이 있고 그 더 깊은 곳에 커다란 계곡이 있어」"

[[dialogue]]
speaker = "ウィステリア"
original = "「私の実家は、その渓谷にそびえる大きな館」"
translation = "「내 본가는 그 계곡에 우뚝 솟은 커다란 저택이야」"

[[dialogue]]
speaker = "ウィステリア"
original = "「そこに住んでいるのは、邪悪な呪術を代々伝える、魔界でも有数の<ruby>旧<rt>ふる</rt></ruby>い一族」"
translation = "「그곳에 살고 있는 건 사악한 주술을 대대로 전하는 마계에서도 손꼽히는 오래된 일족」"

[[dialogue]]
speaker = "ウィステリア"
original = "「水晶でできた怪物みたいな祖父を筆頭に、呪術を極めるために歴史を積み重ねる、おぞましい連中よ」"
translation = "「수정으로 된 괴물 같은 할아버지를 필두로 주술을 극한으로 끌어올리기 위해 역사를 쌓아온 끔찍한 녀석들이지」"

[[dialogue]]
speaker = "ウィステリア"
original = "「あと、ドゥームフォレストにはリクリエのモンスターより強い魔獣がそこかしこにいてね。魔界の中でもトップクラスに危ない場所だって言われているわ」"
translation = "「그리고 둠 포레스트에는 리크리에의 몬스터보다 강한 마수들이 여기저기 있어서 마계 중에서도 톱클래스로 위험한 장소라고 불려」"

[[dialogue]]
speaker = "ウィステリア"
original = "「その魔獣を呪術の練習相手にしていたから、戦闘経験を積むのに苦労はしなかったわ……」"
translation = "「그 마수들을 주술 연습 상대로 삼았으니까 전투 경험을 쌓는 데 고생은 안 했지……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「そのせいで腕自慢の星騎士に挑まれて、１００人抜きなんてやらされる羽目に……コホン、そのことは忘れましょう」"
translation = "「그 탓에 실력을 뽐내려는 성기사들에게 도전받아서 100인 베기 같은 걸 하게 될 처지에…… 코흠, 그 일은 잊자」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
original = "「で、魔将フォームでは羽が水晶になって、大きくなったの。地下図書館の魔力で変化したのかしら」"
translation = "「그리고 마장 폼에서는 날개가 수정이 되어 커졌어. 지하 도서관의 마력으로 변화한 걸까」"

[[dialogue]]
speaker = "unk"
original = "水晶の翼、神秘的でかっこいい……！"
translation = "수정 날개, 신비롭고 멋져요……!"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
original = "「会長くんの目が輝いてる……！\u3000男の子ってこういうのが好きなのね」"
translation = "「회장군의 눈이 빛나고 있어……! 남자애들은 이런 걸 좋아하는구나」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
original = "「ちなみに、水晶といっても魔族の体の一部だから、そう簡単に割れたりしないわ。心配しないで大丈夫よ」"
translation = "「참고로 수정이라고 해도 마족 몸의 일부니까 그렇게 쉽게 깨지거나 하진 않아. 걱정 안 해도 돼」"

[[dialogue]]
speaker = "unk"
original = "触ってみてもいいですか？"
translation = "만져봐도 될까요?"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
original = "「いいけど、そんなに面白いものじゃないわよ。どうせ石だし」"
translation = "「상관없지만 그렇게 재미있는 건 아닐 거야. 어차피 돌이니까」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
original = "「……どうぞ。別に減るものじゃないからいいんだけど、自分の体を触らせるのって、ちょっと恥ずかしいわね」"
translation = "「……자. 딱히 닳는 것도 아니니 괜찮지만 자기 몸을 만지게 하는 건 좀 부끄럽네」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
original = "「ひぁあ！？」"
translation = "「히아아!?」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
original = "「ち、違うの。今のは思ってたのと違うところを触られて──あぁんっ<emoji=heart04>」"
translation = "「아, 아니야. 방금 건 생각지도 못한 곳을 만져져서── 아앙<emoji=heart04>」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
original = "（いつもはこんなことないのに、会長くんに触られてるから……？）"
translation = "(평소엔 이런 적 없는데 회장군이 만지고 있으니까……?)"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
original = "「あ、会長くんの指がつつ～って……ん～っ<emoji=heart04>\u3000あ、そこ触っちゃ……あ……ふぅ……はぁん<emoji=heart04>」"
translation = "「아, 회장군의 손가락이 스윽── 응~<emoji=heart04> 아, 거기 만지면…… 아…… 후우…… 하앙<emoji=heart04>」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
original = "「もう、会長くんがそう来るなら私も容赦しないわよ！\u3000コチョコチョコチョ～っ」"
translation = "「정말, 회장군이 그렇게 나온다면 나도 봐주지 않을 거야! 간질간질간질~」"

[[dialogue]]
speaker = "unk"
original = "ウィステリアさんの手が俺の服をまさぐり、弱いところをくすぐる。"
translation = "위스테리아 씨의 손이 내 옷 속을 뒤적이며 약한 곳을 간질인다."

[[dialogue]]
speaker = "unk"
original = "もちろん俺も反撃して、じゃれ合いながら午後を過ごしたのだった。"
translation = "물론 나도 반격하며 장난치며 오후를 보낸 것이었다."

