[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「また負けた～～～っ！？」"
translation = "「또 졌어~~~!?」"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「くぅ～～っ……悔しいけど、本当に不本意だけど、あなたの力を認めざるを得ないようね……」"
translation = "「쿠우…… 분하지만, 정말 본의 아니지만, 당신의 실력을 인정하지 않을 수 없겠네……」"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「でもまだ本気じゃなかったんだから！\u3000本気の全力で撃ち抜いてあげる！」"
translation = "「하지만 아직 진심이 아니었으니까! 진심을 다한 전력으로 꿰뚫어 주겠어!」"

