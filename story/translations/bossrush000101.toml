[[dialogue]]
speaker = "unk"
original = "俺は星徒会長としてコラプサーについて記録に残すべく、コハルコさんと一緒に事件を振り返っていた。"
translation = "나는 성도회장으로서 콜랩서에 대해 기록을 남기기 위해, 코하루코 씨와 함께 사건을 되돌아보고 있었다."

[[dialogue]]
speaker = "コハルコ"
original = "「コラプサーとは何度も戦ってきたけど、事件が起きるのはいつも突然だったね」"
translation = "「콜랩서와는 몇 번이나 싸워왔지만, 사건이 일어나는 건 언제나 갑작스러웠지.」"

[[dialogue]]
speaker = "キサナ"
original = "『星騎士は正義の味方なんじゃなかったのか？\u3000そのザマで何が守れるっつうんだよ』"
translation = "『성기사는 정의의 편 아니었냐? 그 꼴로 뭘 지킬 수 있다는 거야.』"

[[dialogue]]
speaker = "コハルコ"
original = "「全ての始まりは、キサナによる星騎士襲撃だった」"
translation = "「모든 시작은, 키사나에 의한 성기사 습격이었어.」"

[[dialogue]]
speaker = "コハルコ"
original = "「新星・流星両校の風紀委員であるミアさんとエリスさん、そして会長さんのおかげで、何とかキサナを撃退できた」"
translation = "「신성·유성 양교의 풍기위원인 미아 씨와 에리스 씨, 그리고 회장님 덕분에 어떻게든 키사나를 격퇴할 수 있었지.」"

[[dialogue]]
speaker = "コハルコ"
original = "「だけどキサナは私たちに宣戦布告するとともに、こう言い残した」"
translation = "「하지만 키사나는 우리에게 선전포고를 함과 동시에, 이런 말을 남겼어.」"

[[dialogue]]
speaker = "キサナ"
original = "『アタシらはコラプサー──星の光を喰らう者だ』"
translation = "『우리들은 콜랩서── 별의 빛을 집어삼키는 자다.』"

[[dialogue]]
speaker = "コハルコ"
original = "「キサナはとても高い戦闘力を持っているだけじゃなくて、星力を吸収する能力もあった。今までにない強敵だったね」"
translation = "「키사나는 매우 높은 전투력을 가지고 있을 뿐만 아니라, 성력을 흡수하는 능력도 있었어. 지금까지 없던 강적이었지.」"

[[dialogue]]
speaker = "コハルコ"
original = "「その後に現れたのは、リーナとヴァレリーの２人」"
translation = "「그다음에 나타난 건, 리나와 발레리 두 사람.」"

[[dialogue]]
speaker = "リーナ"
original = "『リーナのお兄ちゃん、やっと会えた！』"
translation = "『리나의 오빠, 드디어 만났어!』"

[[dialogue]]
speaker = "コハルコ"
original = "「リーナはなぜか会長さんの妹を名乗っていたけど……あれは何だったんだろう？」"
translation = "「리나는 왠지 회장님의 여동생을 자처하고 있었는데…… 그건 대체 뭐였을까?」"

[[dialogue]]
speaker = "コハルコ"
original = "「ヴァレリーは蛍火さんと浅草で遭遇し、戦闘に突入。一度撤退した後、流星学園に再び姿を表した」"
translation = "「발레리는 호타루비 씨와 아사쿠사에서 조우해 전투에 돌입. 한 번 퇴각한 후, 유성 학원에 다시 모습을 드러냈어.」"

[[dialogue]]
speaker = "コハルコ"
original = "「その時は会長さんと公安委員会が連携して戦ったけど──」"
translation = "「그때는 회장님과 공안위원회가 연계해서 싸웠지만──」"

[[dialogue]]
speaker = "ヴァレリー"
original = "『何を隠そう、私は合流途中でいなくなったリーナを探していただけでして』"
translation = "『사실을 말하자면, 저는 합류 도중에 없어진 리나를 찾고 있었을 뿐이라서요.』"

[[dialogue]]
speaker = "ヴァレリー"
original = "『星騎士との戦闘は命令されていなかったのですが……これでは勝手なことをしていると彼女を責められませんね。ハハハ』"
translation = "『성기사와의 전투는 명령받지 않았습니다만…… 이래서야 제멋대로 행동하고 있다고 그녀를 탓할 수 없겠군요. 하하하.』"

[[dialogue]]
speaker = "コハルコ"
original = "「ヴァレリーは迷子になったリーナを探していて、私たちは巻き込まれただけっていう、傍迷惑な事件だったね……」"
translation = "「발레리는 길을 잃은 리나를 찾고 있었고, 우리는 말려들었을 뿐이라는, 민폐스러운 사건이었지……」"

[[dialogue]]
speaker = "コハルコ"
original = "「だけどセナリィさんの《強奪》の星眼がヴァレリーに効いたことで、コラプサーは星術を使っているってことがわかった。一応収穫ではあったかな」"
translation = "「하지만 세나리 씨의 《강탈》의 성안이 발레리에게 통한 덕분에, 콜랩서가 성술을 사용하고 있다는 걸 알게 됐어. 일단 수확이긴 했으려나.」"

[[dialogue]]
speaker = "コハルコ"
original = "「そうそう。記録から得たコラプサーのデータを、シミュレーターで再現してみたんだ」"
translation = "「맞아 맞아. 기록에서 얻은 콜랩서의 데이터를 시뮬레이터로 재현해 봤어.」"

[[dialogue]]
speaker = "コハルコ"
original = "「コラプサー事件の記録のために、会長さんも見てみてくれないかな？」"
translation = "「콜랩서 사건의 기록을 위해서, 회장님도 한번 봐주지 않을래?」"

