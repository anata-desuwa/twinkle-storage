[[dialogue]]
speaker = "unk"
original = "リバースフォーム制御のため、仮想モンスターとの訓練を続けるサチ。"
translation = "리버스 폼 제어를 위해, 가상 몬스터와의 훈련을 계속하는 사치."

[[dialogue]]
speaker = "サチ"
original = "「――もう１度です！\u3000はあぁっ！」"
translation = "「――한 번 더예요! 하아앗!」"

[[dialogue]]
speaker = "モンスター"
original = "「フワ～ッチ♪」"
translation = "「후와~앗치♪」"

[[dialogue]]
speaker = "unk"
original = "しかし攻撃は、ことごとく不運に阻まれる。"
translation = "하지만 공격은 사사건건 불운에 가로막힌다."

[[dialogue]]
speaker = "unk"
original = "突然足場が崩れ、大波が押し寄せ、武器が砂に埋まって抜けなくなる――まるで『不幸』につけ狙われているかのようだった。"
translation = "갑자기 발판이 무너지고, 큰 파도가 밀려오고, 무기가 모래에 파묻혀 빠지지 않는다―― 마치 『불행』이 표적으로 삼고 있는 듯했다."

[[dialogue]]
speaker = "サチ"
original = "「はぁ……はぁ……まるでアンラッキーデーの時みたいです……」"
translation = "「하아…… 하아…… 마치 언럭키 데이 때 같아요……」"

[[dialogue]]
speaker = "シズハ"
original = "「サチちゃんのリバースフォーム……『不運を引き寄せる』能力って……これ、まともに戦えないんじゃ……」"
translation = "「사치짱의 리버스 폼…… 『불운을 끌어당기는』 능력이라니…… 이거, 제대로 싸울 수 없는 거 아냐……」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「ええ。想像以上に厄介ですね。何か打開策を考えないと……」"
translation = "「네. 상상 이상으로 성가시네요. 뭔가 타개책을 생각하지 않으면……」"

[[dialogue]]
speaker = "サチ"
original = "「きゃあっ！？」"
translation = "「꺄악!?」"

[[dialogue]]
speaker = "unk"
original = "再び何もないところでつまずき、砂浜に転倒。"
translation = "다시 아무것도 없는 곳에서 발이 걸려, 백사장에 전도."

[[dialogue]]
speaker = "サチ"
original = "「くっ……！\u3000プリムラはあんなに能力を使えてたのに、私は……！」"
translation = "「큭……! 프리뮬라는 저렇게나 능력을 사용할 수 있었는데, 나는……!」"

[[dialogue]]
speaker = "unk"
original = "砂を握りしめ、悔しさを滲ませる。"
translation = "모래를 움켜쥐며, 분함을 드러낸다."

[[dialogue]]
speaker = "シズハ"
original = "「サチちゃん……」"
translation = "「사치짱……」"

[[dialogue]]
speaker = "unk"
original = "その時――"
translation = "그때――"

[[dialogue]]
speaker = "プリムラ"
original = "「おい、サチ！\u3000我の時と同じように体が光っておるぞ！」"
translation = "「어이, 사치! 짐의 때와 마찬가지로 몸이 빛나고 있느니라!」"

[[dialogue]]
speaker = "サチ"
original = "「えっ……！？\u3000きゃっ……！？」"
translation = "「엣……!? 꺄앗……!?」"

[[dialogue]]
speaker = "サチ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "サチ、大丈夫か……！？"
translation = "「사치, 괜찮아……!?」"

[[dialogue]]
speaker = "unk"
original = "俺が駆け寄ると、サチはゆっくりと顔を上げた。"
translation = "내가 달려가자, 사치는 천천히 고개를 들었다."

[[dialogue]]
speaker = "サチ"
original = "「大丈夫ですよ、お兄さん」"
translation = "「괜찮아요, 오빠」"

[[dialogue]]
speaker = "サチ"
original = "「――えいっ♪」"
translation = "「――에잇♪」"

[[dialogue]]
speaker = "unk"
original = "次の瞬間、俺は砂浜に押し倒されていた。"
translation = "다음 순간, 나는 모래사장에 밀쳐져 넘어져 있었다."

[[dialogue]]
speaker = "サチ"
original = "「ふふっ……不運なことに、ラッキースケベが起きちゃいましたね<emoji=heart04>」"
translation = "「후훗…… 불운하게도, 럭키 스케베가 일어나 버렸네요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "いや、思いっきり自分で押してなかった！？"
translation = "아니, 대놓고 스스로 밀지 않았어!?"

[[dialogue]]
speaker = "unk"
original = "サチはそのまま妖しく微笑みながら、両手で俺の体をすりすりと撫で始める。"
translation = "사치는 그대로 묘하게 미소 지으며, 양손으로 내 몸을 부드럽게 쓰다듬기 시작한다."

[[dialogue]]
speaker = "サチ"
original = "「お兄さんって、線は細いのに、ちゃんと筋肉がついていて……男の人って感じがするんですよね<emoji=heart04>」"
translation = "「오빠는 선이 가느다란데도, 제대로 근육이 붙어 있어서…… 남자라는 느낌이 들거든요<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「前から、こんなふうに……じっくり触ってみたかったんです<emoji=heart04>」"
translation = "「전부터, 이런 식으로…… 찬찬히 만져보고 싶었어요<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "「ま、まさか……サチちゃんも精神が反転してる！？」"
translation = "「마, 설마…… 사치짱도 정신이 반전됐어!?」"

[[dialogue]]
speaker = "サチ"
original = "「ふふっ……どうやらそうみたい♪」"
translation = "「후훗…… 아무래도 그런가 봐요♪」"

[[dialogue]]
speaker = "サチ"
original = "「でもね、シズハちゃん……私、なんだかすごく、気分がいいの♪」"
translation = "「그치만 말야, 시즈하짱…… 나, 왠지 엄청, 기분이 좋아♪」"

[[dialogue]]
speaker = "サチ"
original = "「今なら……これまでにできなかったことも、できちゃいそうで……<emoji=heart04>」"
translation = "「지금이라면…… 그동안 하지 못했던 일도, 할 수 있을 것 같아서……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「たとえば――お兄さんに、こんな風にエッチなイタズラをしちゃったりとか<emoji=heart04>\u3000ぎゅ～っ<emoji=heart04>」"
translation = "「예를 들면―― 오빠한테, 이런 식으로 야한 장난을 쳐버린다든가<emoji=heart04> 꼬오옥<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「さ、サチのやつ、普段はハレンチ禁止とか言っておきながら、自分から眷族に抱きついとるではないか！？」"
translation = "「사, 사치 녀석, 평소엔 파렴치 금지라고 말해놓고선, 스스로 <u>권속(眷族)</u>에게 매달리고 있지 않느냐!?」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「これは……！\u3000今のサチさんの状態を言い表すなら――」"
translation = "「이것은……! 지금 사치 씨의 상태를 표현하자면――」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「『エッチな小悪魔化』しちゃっているみたいです！」"
translation = "「『야한 소악마화』해버린 것 같습니다!」"

[[dialogue]]
speaker = "プリムラ"
original = "「『エッチな小悪魔サチ』じゃと！？」"
translation = "「『야한 소악마 사치』라고!?」"

[[dialogue]]
speaker = "unk"
original = "サチ、落ち着け！\u3000お尻を触るのは……！"
translation = "사치, 진정해! 엉덩이를 만지는 건……!"

[[dialogue]]
speaker = "シズハ"
original = "「お尻！？\u3000会長のハイブリッドプリケツを！？」"
translation = "「엉덩이!? 회장의 하이브리드 탱글 엉덩이를!?」"

[[dialogue]]
speaker = "サチ"
original = "「ふふっ、大丈夫ですよ♪\u3000よくシズハちゃんが言っているじゃないですか――」"
translation = "「후훗, 괜찮아요♪ 자주 시즈하짱이 말하잖아요――」"

[[dialogue]]
speaker = "サチ"
original = "「お尻を触るのはコミュニケーションだって<emoji=heart04>」"
translation = "「엉덩이를 만지는 건 커뮤니케이션이라고<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "「あっ、なら大丈夫か♪」"
translation = "「앗, 그럼 괜찮나♪」"

[[dialogue]]
speaker = "unk"
original = "いや、何も大丈夫じゃないよ！？"
translation = "아니, 하나도 안 괜찮다고!?"

[[dialogue]]
speaker = "サチ"
original = "「もう、お兄さんったら……もしかして興奮しちゃってるんですか？\u3000エッチなのは禁止ですよ<emoji=heart04>」"
translation = "「정말, 오빠도 참…… 혹시 흥분해버린 건가요? 야한 건 금지예요<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「お尻を触るのは別にエッチなことじゃないんですから～、じっとしてて下さいね♪」"
translation = "「엉덩이를 만지는 건 별로 야한 게 아니니까요~, 가만히 계세요♪」"

[[dialogue]]
speaker = "unk"
original = "ちょっ……そこは……アッーーー！？"
translation = "잠깐…… 거기는…… 아아악!?"

[[dialogue]]
speaker = "プリムラ"
original = "「うわあぁっ！\u3000ハレンチじゃ！\u3000サチが過去最高にハレンチなのじゃーーーっ！？」"
translation = "「우와아앗! 파렴치하도다! 사치가 과거 최고로 파렴치하단 말이다ーーー!?」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「ふおおおぉっ！？\u3000本当は止めるべきなのでしょうが……記憶魔法で保存、保存、保存ーーーっ！！」"
translation = "「후오오오옷!? 원래는 말려야 하겠지만…… 기억 마법으로 보존, 보존, 보존ーーー!!」"

[[dialogue]]
speaker = "シズハ"
original = "「はい、次は私！\u3000私も会長のハイブリッドプリケツ、触りたいわ！」"
translation = "「자, 다음은 나! 나도 회장의 하이브리드 탱글 엉덩이, 만지고 싶어!」"

[[dialogue]]
speaker = "ディーラック"
original = "「ダメだ、こいつら……」"
translation = "「답이 없네, 이 녀석들……」"

[[dialogue]]
speaker = "unk"
original = "やがて、小一時間後。"
translation = "이윽고, 한 시간 뒤."

[[dialogue]]
speaker = "サチ"
original = "「ハッ……！？\u3000わ、私……！」"
translation = "「핫……!? 저, 저는……!」"

[[dialogue]]
speaker = "unk"
original = "正気に戻ったサチは、自分の状況を理解し――"
translation = "제정신으로 돌아온 사치는 자신의 상황을 이해하고――"

[[dialogue]]
speaker = "サチ"
original = "「お兄さん、違うんですぅぅぅーーーっ！！」"
translation = "「오빠, 아니에요오오오ーーー!!」"

[[dialogue]]
speaker = "unk"
original = "俺の上に馬乗りになったまま、絶叫した。"
translation = "내 위에 올라탄 채로, 절규했다."

[[dialogue]]
speaker = "プリムラ"
original = "「サチ！\u3000それはどっちの意味でじゃ！？\u3000本当はハレンチだとわかって、やっておったのか！？」"
translation = "「사치! 그것은 어느 쪽 의미이냐!? 사실은 파렴치하다는 걸 알고서 한 것이었느냐!?」"

[[dialogue]]
speaker = "サチ"
original = "「わわわ、わかってない！\u3000エッチなことは禁止だからぁぁぁーーーっ！！」"
translation = "「아아아, 아니에요! 야한 건 금지니까아아아ーーー!!」"

[[dialogue]]
speaker = "unk"
original = "お、俺は大丈夫だ……貞操は守ったから……"
translation = "내, 나는 괜찮다…… 정조는 지켰으니까……"

[[dialogue]]
speaker = "unk"
original = "俺の戦闘服は、まるでモンスターと死闘を繰り広げた後のようにボロボロに破れまくっていた。"
translation = "내 전투복은 마치 몬스터와 사투를 벌인 뒤처럼 너덜너덜하게 찢겨 있었다."

[[dialogue]]
speaker = "サチ"
original = "「～～～っ！！\u3000すすす、すみませんでしたぁぁぁ～～っ！！」"
translation = "「～～～!! 죄죄죄, 죄송했습니다아아아～～!!」"

[[dialogue]]
speaker = "unk"
original = "顔を真っ赤に染めて、全力疾走で逃げ出してしまうサチ。"
translation = "얼굴을 새빨갛게 물들이고, 전력 질주로 도망쳐버리는 사치."

[[dialogue]]
speaker = "プリムラ"
original = "「お、恐ろしい……！\u3000あのサチがあそこまで変貌してしまうとは、リバースフォーム、本当に恐ろしい力なのじゃ……！」"
translation = "「무, 무섭도다……! 그 사치가 저 정도까지 변모해버리다니, 리버스 폼, 정말로 무서운 힘이구나……!」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「う～ん……反転した力の制御は、想像以上に難航しそうですね……」"
translation = "「으음…… 반전된 힘의 제어는, 상상 이상으로 난항을 겪을 것 같네요……」"

[[dialogue]]
speaker = "シズハ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "ディーラック"
original = "「ん？\u3000シズハちゃん……？」"
translation = "「응? 시즈하짱……?」"

[[dialogue]]
speaker = "unk"
original = "数日後。"
translation = "며칠 후."

[[dialogue]]
speaker = "unk"
original = "俺とトレジアンナさんは、シズハに呼び出された。"
translation = "나와 트레지안나 씨는, 시즈하에게 호출받았다."

[[dialogue]]
speaker = "トレジアンナ"
original = "「シズハさん、お話とは一体なんでしょう？」"
translation = "「시즈하 씨, 드릴 말씀이란 대체 무엇인가요?」"

[[dialogue]]
speaker = "シズハ"
original = "「会長、トレジアンナさん……相談があるの」"
translation = "「회장, 트레지안나 씨…… 상담할 게 있어」"

[[dialogue]]
speaker = "シズハ"
original = "「サチちゃんとプリムラちゃん、反転させられた力のせいで、今すごく困ってるでしょ？」"
translation = "「사치짱이랑 프리뮬라짱, 반전된 힘 때문에 지금 굉장히 곤란해하고 있지?」"

[[dialogue]]
speaker = "シズハ"
original = "「私……『解放のロストアイテム』の一件や、ディーちゃんのことでも、何度も２人に助けてもらった」"
translation = "「나…… 『해방의 로스트 아이템』 사건 때나, 디짱 일로도, 몇 번이나 두 사람에게 도움을 받았어」"

[[dialogue]]
speaker = "シズハ"
original = "「だから今度は、私が友達として……困っている２人の力になりたいの！」"
translation = "「그러니까 이번에는, 내가 친구로서…… 곤란해하는 두 사람에게 힘이 되어주고 싶어!」"

[[dialogue]]
speaker = "unk"
original = "一瞬息を吸い込み、シズハはまっすぐにこちらを見つめる。"
translation = "잠깐 숨을 들이마시고, 시즈하는 똑바로 이쪽을 바라본다."

[[dialogue]]
speaker = "シズハ"
original = "「私も――」"
translation = "「나도――」"

[[dialogue]]
speaker = "シズハ"
original = "「サチちゃんの『フォルトゥーナフォーム』みたいに……魔法少女として強くなりたい！」"
translation = "「사치짱의 『포르투나 폼』처럼…… 마법 소녀로서 강해지고 싶어!」"

[[dialogue]]
speaker = "unk"
original = "そう宣言するシズハの瞳には、迷いのない強い決意の光が宿っているのだった。"
translation = "그렇게 선언하는 시즈하의 눈동자에는, 망설임 없는 강한 결의의 빛이 깃들어 있었다."

