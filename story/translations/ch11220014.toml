[[dialogue]]
speaker = "unk"
original = "第４話,斉天大聖の初デート,P"
translation = "제4화, 제천대성의 첫 데이트, P"

[[dialogue]]
speaker = "unk"
original = "クーシェンと仲良くなり、しばらく経ったある日のこと。"
translation = "쿠셴과 사이가 좋아지고 시간이 좀 흐른 어느 날의 일."

[[dialogue]]
speaker = "unk"
original = "俺はクーシェンから「デートに行こうよ！」と誘われて、遊園地へやって来ていた。"
translation = "나는 쿠셴에게 「데이트하러 가자!」는 권유를 받고 놀이공원에 와 있었다."

[[dialogue]]
speaker = "クーシェン"
original = "「ここが人間界の遊園地か～♪\u3000ウキウキしてきた～♪」"
translation = "「여기가 인간계의 놀이공원인가~♪ 신난다~♪」"

[[dialogue]]
speaker = "unk"
original = "俺と手を繋ぎながら無邪気に笑うクーシェン。"
translation = "나와 손을 잡고 천진난만하게 웃는 쿠셴."

[[dialogue]]
speaker = "unk"
original = "その小さく柔らかな手の感触と温かさを、つい意識してしまっていると――"
translation = "그 작고 부드러운 손의 감촉과 온기를 나도 모르게 의식하고 있자――"

[[dialogue]]
speaker = "クーシェン"
original = "「って、にーにー、どうかした？\u3000なんか今日は変だよ？\u3000反応がいつもと違くない？」"
translation = "「어라, 오빠, 왜 그래? 왠지 오늘 이상한데? 반응이 평소랑 다르지 않아?」"

[[dialogue]]
speaker = "クーシェン"
original = "「あ～、さては、今日が初デートだから、ボクのことを女の子として意識しちゃってるのかな～？」"
translation = "「아~ 설마, 오늘이 첫 데이트니까 나를 여자애로 의식하고 있는 걸까나~?」"

[[dialogue]]
speaker = "クーシェン"
original = "「ねーねーから教えてもらった通り、『デート』って言っとくと、男のヒトの反応が違うっていうのは本当だったね♪\u3000ウキキ♪」"
translation = "「언니한테 배운 대로 『데이트』라고 말해두면 남자 사람의 반응이 다르다는 건 진짜였네♪ 우키키♪」"

[[dialogue]]
speaker = "クーシェン"
original = "「――ん？\u3000なんで、デートなのかって？\u3000それはもちろん『大人ゲージ』を貯める為だよ♪」"
translation = "「――응? 왜 데이트냐고? 그건 당연히 『어른 게이지』를 쌓기 위해서지♪」"

[[dialogue]]
speaker = "クーシェン"
original = "「確かに『おっぱいゲージ』から先に貯めるって決めたけど、『大人ゲージ』も別に貯めといて損はないでしょ？」"
translation = "「확실히 『가슴 게이지』부터 먼저 쌓기로 정했지만, 『어른 게이지』도 따로 쌓아둬서 손해 볼 건 없잖아?」"

[[dialogue]]
speaker = "クーシェン"
original = "「そのことをねーねーに相談したら、それならにーにーとのデートがいいんじゃない？\u3000って言ってもらったんだ～♪」"
translation = "「그 일을 언니한테 상담했더니, 그렇다면 오빠와의 데이트가 좋지 않겠냐고 하더라고~♪」"

[[dialogue]]
speaker = "unk"
original = "おのれ、策士紅明……！"
translation = "이 녀석, 책사 코우메이……!"

[[dialogue]]
speaker = "クーシェン"
original = "「というわけで、今日はボクがいっぱい、大人なデートでにーにーのことをドキドキさせちゃうから、楽しみにしててよね♪」"
translation = "「그런 고로, 오늘은 내가 잔뜩 어른스러운 데이트로 오빠를 두근거리게 만들 테니까 기대하라구♪」"

[[dialogue]]
speaker = "クーシェン"
original = "「にーにー、早く行こっ♪」"
translation = "「오빠, 빨리 가자♪」"

[[dialogue]]
speaker = "unk"
original = "そう言って、彼女は俺の手を引いて走り出すのだった――"
translation = "그렇게 말하며 그녀는 내 손을 이끌고 달려나갔다――"

[[dialogue]]
speaker = "unk"
original = "それから俺たちは遊園地を楽しみ、気づけばあっという間に夕方になってしまっていた。"
translation = "그 뒤로 우리는 놀이공원을 즐겼고, 어느덧 눈 깜짝할 새에 저녁이 되고 말았다."

[[dialogue]]
speaker = "クーシェン"
original = "「はぁ～っ♪\u3000金斗雲でスピードは慣れてるはずなのに、絶叫マシーン、どれもすごくウキウキして、楽しかった～！」"
translation = "「하아~♪ 근두운으로 속도에는 익숙할 텐데도, 절규 머신들 전부 엄청나게 신나고 재밌었어!」"

[[dialogue]]
speaker = "クーシェン"
original = "「でも、残念……もっと遊びたかったけど、そろそろ帰らなくちゃいけない時間か～」"
translation = "「하지만 아쉽다…… 더 놀고 싶었지만 슬슬 돌아가야 할 시간이네~」"

[[dialogue]]
speaker = "クーシェン"
original = "「――また一緒に遊びに来ようって？\u3000へぇ～、にーにー、ボクとまたデートしたいんだ～？\u3000えへへへぇ、仕方ないな～、もう♪」"
translation = "「――다음에 또 같이 놀러 오자고? 헤에~ 오빠, 나랑 또 데이트하고 싶구나~? 에헤헤헤, 어쩔 수 없네 정말♪」"

[[dialogue]]
speaker = "クーシェン"
original = "「んっ……ふわぁ～……♪」"
translation = "「음…… 후아아~……♪」"

[[dialogue]]
speaker = "unk"
original = "ふと、彼女が大きな欠伸をする。"
translation = "문득 그녀가 커다란 하품을 한다."

[[dialogue]]
speaker = "unk"
original = "クーシェン、もしかして眠い？"
translation = "쿠셴, 혹시 졸려?"

[[dialogue]]
speaker = "クーシェン"
original = "「うん……ちょっと、ウキウキしすぎちゃったかも……。でも、ボクそんなに子供じゃないから、全然平気だよっ」"
translation = "「응…… 조금 너무 신나버렸을지도……. 하지만 나 그렇게 어린애 아니니까 전혀 괜찮아!」"

[[dialogue]]
speaker = "クーシェン"
original = "「――へ？\u3000眠たかったら、流星寮までおんぶするって？\u3000そこまでしなくていいよ～！\u3000なんか子供っぽいし！」"
translation = "「――헤? 졸리면 유성 기숙사까지 업어다 준다고? 그렇게까지 안 해도 돼! 왠지 어린애 같고!」"

[[dialogue]]
speaker = "unk"
original = "大人っぽければいいんだ？"
translation = "어른스러우면 되는 거야?"

[[dialogue]]
speaker = "クーシェン"
original = "「――え……？\u3000お姫様抱っこ！？」"
translation = "「――에……? 공주님 안기!?」"

[[dialogue]]
speaker = "クーシェン"
original = "「そ、それは確かに、大人ゲージ貯まりそうだけど、でも……」"
translation = "「그, 그거라면 확실히 어른 게이지가 쌓일 것 같긴 하지만, 그래도……」"

[[dialogue]]
speaker = "クーシェン"
original = "「べ、別に恥ずかしいとか思ってないよ！\u3000エッチなことには慣れてるんだから……って、ひゃあぁっ！？」"
translation = "「딱, 딱히 부끄럽다거나 생각 안 해! 야한 것에는 익숙하니까…… 어라, 히야앗!?」"

[[dialogue]]
speaker = "unk"
original = "俺はクーシェンをお姫様抱っこする。"
translation = "나는 쿠셴을 공주님 안기로 들어 올린다."

[[dialogue]]
speaker = "クーシェン"
original = "「に、にーにー！\u3000まだボク、していいんなんて言ってないよっ！？」"
translation = "「오, 오빠! 아직 나, 해도 좋다고 말 안 했다구!?」"

[[dialogue]]
speaker = "クーシェン"
original = "「――この前、子供って呼んでイジワルした仕返し？\u3000う、うぅ……にーにーのばか……」"
translation = "「――지난번에 어린애라고 불러서 괴롭힌 복수야? 으, 으으…… 오빠 바보……」"

[[dialogue]]
speaker = "unk"
original = "彼女の小さな体を抱えたまま、遊園地の出口へ向かって歩き始める。"
translation = "그녀의 작은 몸을 안은 채 놀이공원 출구를 향해 걷기 시작한다."

[[dialogue]]
speaker = "クーシェン"
original = "（こ、これがお姫様抱っこ……大人がするものなんだから、恥ずかしくないはずなのに、顔が熱くなって、胸がドキドキする……）"
translation = "(이, 이게 공주님 안기…… 어른이 하는 거니까 부끄럽지 않아야 하는데, 얼굴이 뜨거워지고 가슴이 두근거려……)"

[[dialogue]]
speaker = "クーシェン"
original = "（い、いや、ボクはすぐ大人になるんだから、これくらい恥ずかしくない……恥ずかしくなんだから……！）"
translation = "(아, 아니야, 나는 금방 어른이 될 거니까 이 정도는 부끄럽지 않아…… 부끄럽지 않다니까……!)"

[[dialogue]]
speaker = "クーシェン"
original = "（で、でも……）"
translation = "(하, 하지만……)"

[[dialogue]]
speaker = "クーシェン"
original = "（今の胸のドキドキは……気持ちがウキウキしてる時と、なんか似てる気がして、嫌じゃない……）"
translation = "(지금의 가슴 두근거림은…… 기분이 신나있을 때랑 왠지 닮은 것 같아서 싫지 않아……)"

[[dialogue]]
speaker = "クーシェン"
original = "（このドキドキ、一体何なんだろう……？）"
translation = "(이 두근거림, 도대체 뭘까……?)"

[[dialogue]]
speaker = "unk"
original = "もしかして照れてる？"
translation = "혹시 수줍어하는 거야?"

[[dialogue]]
speaker = "クーシェン"
original = "「ち、違うよ！？\u3000照れてないもん！」"
translation = "「아, 아니거든!? 부끄러워하는 거 아니야!」"

[[dialogue]]
speaker = "クーシェン"
original = "「――も、もう、笑わないでよ！\u3000今日のにーにー、なんかいつものにーにーと違うよ！？」"
translation = "「――정, 정말, 웃지 마! 오늘 오빠, 왠지 평소의 오빠랑 다르단 말이야!?」"

[[dialogue]]
speaker = "クーシェン"
original = "（なんか、にーにーの顔が真っすぐに見れない！？\u3000ボクは一体、何をそんなに恥ずかしがってるの……！？）"
translation = "(왠지 오빠 얼굴을 똑바로 못 보겠어!? 나는 대체 왜 이렇게 부끄러워하고 있는 거야……!?)"

[[dialogue]]
speaker = "unk"
original = "今日のクーシェン、すごく可愛いな"
translation = "오늘 쿠셴, 정말 귀엽네"

[[dialogue]]
speaker = "クーシェン"
original = "「えっ……えええぇっ！？\u3000にーにー、いきなり何言い出すの！？」"
translation = "「엣…… 에에에엣!? 오빠, 갑자기 무슨 말을 하는 거야!?」"

[[dialogue]]
speaker = "クーシェン"
original = "「かかか、可愛いとか、帰る時になって急にそんな……！\u3000というか、ボクはいつでもカッコ可愛い女の子なんだけど！？」"
translation = "「기기기, 귀엽다니, 돌아갈 때 돼서 갑자기 그런……! 그보다 나는 언제나 멋지고 귀여운 여자애라고!?」"

[[dialogue]]
speaker = "クーシェン"
original = "（な、なんで当たり前のことをにーにーに言われてるだけなのに、ボク……こんなにドキドキしてるの～！？）"
translation = "(왜, 왜 당연한 소리를 오빠한테 들었을 뿐인데 나…… 이렇게 두근거리는 거야~!?)"

[[dialogue]]
speaker = "クーシェン"
original = "「うぅ～～！\u3000と、とりあえず、今日はもうデート終わり！\u3000だから、にーにーはそれ以上、変なこと言うの禁止～～～っ！」"
translation = "「으으~~! 아, 아무튼 오늘은 이제 데이트 끝! 그러니까 오빠는 그 이상 이상한 소리 하기 금지~~~!」"

[[dialogue]]
speaker = "unk"
original = "そう言って、今までに見たことない程、顔を真っ赤にする彼女が可愛くて、俺はまた思わず笑ってしまう。"
translation = "그렇게 말하며 지금까지 본 적 없을 정도로 얼굴을 붉히는 그녀가 귀여워서, 나는 또 나도 모르게 웃어버리고 만다."

[[dialogue]]
speaker = "unk"
original = "俺はいつの間にか、クーシェンを１人の女の子として見るようになっていたことを、この時ようやく自覚するのだった――"
translation = "나는 어느샌가 쿠셴을 한 명의 여자애로서 보게 되었다는 것을 이때 겨우 자각하는 것이었다――"

