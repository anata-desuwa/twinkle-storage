[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「アップデートしたドローンの調整に付き合ってくれてありがとう。おかげでいいデータが取れたよ」"
translation = "「업데이트한 드론 조정을 도와줘서 고마워. 덕분에 좋은 데이터를 얻었어.」"

[[dialogue]]
speaker = "unk"
original = "コハルコさんはドローンを操る星騎士で、様々な得物を使う星騎士の中でも変わり種だ。"
translation = "코하ルコ 씨는 드론을 다루는 성기사로, 다양한 무기를 사용하는 성기사 중에서도 특이한 부류다."

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「いつも星徒会で忙しいのに、休日まで学園に来てもらってごめんね」"
translation = "「항상 성도회 때문에 바쁜데, 휴일까지 학원에 오게 해서 미안해.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺とコハルコさんの仲ですから」"
translation = "「저와 코하ルコ 씨 사이인걸요.」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「ふふ。それもそっか」"
translation = "「후후. 그것도 그렇네.」"

[[dialogue]]
speaker = "unk"
original = "そう、俺とコハルコさんは家族公認の恋人同士。"
translation = "그렇다, 나와 코하ルコ 씨는 가족 공인 연인 사이."

[[dialogue]]
speaker = "unk"
original = "休日に一緒にいるのは自然なことだ。"
translation = "휴일에 함께 있는 것은 자연스러운 일이다."

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「後は撮影機能の確認だけだけど……普通に撮るだけじゃ面白くないよねー」"
translation = "「남은 건 촬영 기능 확인뿐인데…… 평범하게 찍기만 하면 재미없겠지~」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「そうだ、いいこと思いついた。ゴニョゴニョゴニョ……」"
translation = "「맞다, 좋은 생각이 났어. 소곤소곤소곤……」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「はーっ……はーっ……皆さん、見えてますか～？\u3000私は朝比奈コハルコといいます」"
translation = "「하아…… 하아…… 여러분, 보이나요~? 저는 아사히나 코하ルコ라고 합니다.」"

[[dialogue]]
speaker = "unk"
original = "あられもない姿で俺に跨るコハルコさん。"
translation = "차마 눈 뜨고 볼 수 없는 모습으로 나에게 올라탄 코하ルコ 씨."

[[dialogue]]
speaker = "unk"
original = "ドローンがローターの音を響かせながら周囲を飛び回り、高精度カメラで俺たちを撮影する。"
translation = "드론이 로터 소리를 울리며 주위를 날아다니고, 고정밀 카메라로 우리를 촬영한다."

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「実は私、ジャスティスウィザードって呼ばれていたハッカーで、こっそり悪い人たちを懲らしめたりしてました」"
translation = "「사실 저, 저스티스 위저드라고 불리던 해커로, 몰래 나쁜 사람들을 응징하거나 했었어요.」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「でも悪い人たちに見つかって……お仕置きされちゃいました<emoji=heart04>」"
translation = "「하지만 나쁜 사람들에게 들켜서…… 벌 받아버렸답니다♥」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「たくさんのおち○ぽに、おま○こも、お口も、お尻も、い～っぱいズボズボされてオナホにされちゃいました<emoji=heart04>\u3000今はおち○ぽの気持ち良さを教えていただけて感謝しています<emoji=heart04>」"
translation = "「수많은 자지에, 보지도, 입도, 엉덩이도, 가~뜩 즈보즈보 당해서 오나홀이 되어버렸어요♥ 지금은 자지의 기분 좋음을 가르쳐 주셔서 감사하고 있어요♥」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「もうハッカーなんてどうでもいいの。おち○ぽ好き<emoji=heart04>\u3000おち○ぽがないと生きていけないの<emoji=heart04>」"
translation = "「이제 해커 같은 건 아무래도 좋아. 자지 좋아♥ 자지가 없으면 살 수 없어♥」"

[[dialogue]]
speaker = "unk"
original = "正義の味方・ジャスティスウィザードが悪人に捕まって、調教の末に快楽堕ちした──という設定だ。"
translation = "정의의 사자 저스티스 위저드가 악당에게 잡혀서, 조교 끝에 쾌락에 타락했다──는 설정이다."

[[dialogue]]
speaker = "unk"
original = "『カメラの調整のついでに、２人でエッチなビデオ撮っちゃおうよ』とコハルコさんに提案されたんだけど、まさかこんなシチュエーションになるとは。"
translation = "『카메라 조절을 하는 김에, 둘이서 야한 비디오 찍어버리자』라고 코하ルコ 씨에게 제안받았는데, 설마 이런 시츄에이션이 될 줄이야."

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「正義の味方を気取ってごめんなさい。調子に乗ってごめんなさい。私が身の程知らずのバカでした<emoji=heart04>」"
translation = "「정의의 사자인 척해서 죄송해요. 우쭐거려서 죄송해요. 제가 분수도 모르는 바보였습니다♥」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「皆さんに迷惑をかけたお詫びに、正義の美少女ハッカー・ジャスティスウィザードのエッチなところたくさん見てください<emoji=heart04>」"
translation = "「여러분에게 폐를 끼친 사죄로, 정의의 미소녀 해커 저스티스 위저드의 야한 부분 잔뜩 봐주세요♥」"

[[dialogue]]
speaker = "unk"
original = "媚びた声で腰をくねらせ、見せつけるように豊かな胸を揺らすコハルコさん。"
translation = "아양 떠는 목소리로 허리를 비틀며, 과시하듯 풍만한 가슴을 흔드는 코하ルコ 씨."

[[dialogue]]
speaker = "unk"
original = "大きくて張りのある胸も、丸くて形のいいお尻も、濡れた性器も、全方位余すことなく記録されている。"
translation = "크고 탄력 있는 가슴도, 둥글고 모양 좋은 엉덩이도, 젖은 성기도, 전 방위 빠짐없이 기록되고 있다."

[[dialogue]]
speaker = "unk"
original = "コハルコさんのドローンのカメラなら、お尻の穴だってくっきりと映っているだろう。"
translation = "코하ルコ 씨의 드론 카메라라면, 항문조차 또렷하게 찍히고 있을 것이다."

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「た～くさんおま○こズボズボしてもらいますので、私がエッチする映像でおち○ぽシコシコしてくださいね<emoji=heart04>」"
translation = "「가~뜩 보지 즈보즈보 당할 테니까, 제가 섹스하는 영상으로 자지 시코시코 해주세요♥」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「ふああぁ～～～っ<emoji=heart04>\u3000おち○ぽ入ってきたぁっ<emoji=heart04>\u3000ズブズブって……ん～～っ<emoji=heart04>」"
translation = "「후아아아~~앗♥ 자지 들어왔어어♥ 즈부즈부하고…… 응~~읏♥」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「おち○ぽ気持ちいいっ<emoji=heart04>\u3000太いおち○ぽ好きぃ<emoji=heart04>\u3000お腹の中、広げられてるの……んっ……ああぁっ<emoji=heart04>」"
translation = "「자지 기분 좋아♥ 굵은 자지 좋아아♥ 배 안쪽, 벌려지고 있어…… 응…… 아아앗♥」"

[[dialogue]]
speaker = "unk"
original = "男に媚びた演技のせいで、ペニスはもう最大まで膨張していた。"
translation = "남자에게 아양 떠는 연기 때문에, 페니스는 이미 최대까지 팽창해 있었다."

[[dialogue]]
speaker = "unk"
original = "コハルコさんも興奮しているのか、中はとろとろに濡れていて、勃起したペニスを容易く呑み込んでいく。"
translation = "코하ルコ 씨도 흥분했는지, 안은 걸적하게 젖어 있어서, 발기한 페니스를 손쉽게 삼켜간다."

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「おち○ぽ入ってるだけで、おま○こキュンキュンしちゃう<emoji=heart04>\u3000はぁ、はぁ……それじゃ、立派なおち○ぽ様にご奉仕させていただきますね<emoji=heart04>」"
translation = "「자지 들어있는 것만으로, 보지가 큥큥거려♥ 하아, 하아…… 그러면, 훌륭한 자지님께 봉사해 드릴게요♥」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「はっ、あっ、あっ、あんっ<emoji=heart04>\u3000おま○この中で、おち○ぽ擦れてっ、すごいっ<emoji=heart04>」"
translation = "「하앗, 앗, 앗, 안♥ 보지 안에서, 자지 쓸려서, 굉장해♥」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「おち○ぽ、ズボズボ来てるぅっ<emoji=heart04>\u3000これ好きっ<emoji=heart04>\u3000下からズンズン突かれるの気持ちいいのっ<emoji=heart04>」"
translation = "「자지, 즈보즈보 오고 있어어♥ 이거 좋아♥ 밑에서 즌즌 찔리는 거 기분 좋아♥」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「ふあぁっ、はっ、ああっ<emoji=heart04>\u3000深いところまで、来て……はっ、あぁんっ<emoji=heart04>」"
translation = "「후아앗, 하앗, 아앗♥ 깊은 곳까지, 와서…… 하앗, 아앙♥」"

[[dialogue]]
speaker = "unk"
original = "貪るようにしゃにむに腰を振るコハルコさん。"
translation = "탐하듯이 악착같이 허리를 흔드는 코하ルコ 씨."

[[dialogue]]
speaker = "unk"
original = "とても演技には見えなくて、本当に快楽の奴隷になったみたいだ。"
translation = "도저히 연기로는 보이지 않아서, 정말로 쾌락의 노예가 된 것 같다."

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「はっ、あっ、あっ──ひあぁ～～っ<emoji=heart04>\u3000気持ち良くて、おかしくなるっ<emoji=heart04>\u3000頭壊れるぅっ<emoji=heart04>」"
translation = "「하앗, 앗, 앗──히아아~~앗♥ 기분 좋아서, 이상해져♥ 머리 망가져어♥」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「おかしくなる、じゃなくてもうおかしくなってるだろ」"
translation = "「이상해지는 게 아니라 이미 이상해졌잖아.」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「はいっ<emoji=heart04>\u3000コハルコは、頭ぶっ壊れてますっ<emoji=heart04>\u3000おち○ぽのことしか考えられない淫乱女ですぅっ<emoji=heart04>」"
translation = "「네엣♥ 코하ルコ는, 머리 박살 났어요♥ 자지 생각밖에 할 수 없는 음란녀예요오♥」"

[[dialogue]]
speaker = "unk"
original = "コハルコさんが演技するなら、俺も演技だ。"
translation = "코하ルコ 씨가 연기한다면, 나도 연기다."

[[dialogue]]
speaker = "unk"
original = "コハルコさんを堕とした悪人になりきって言葉で責める。"
translation = "코하ルコ 씨를 타락시킨 악당이 된 셈 치고 말로 몰아세운다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ほら、見てくれてる人にもっとサービスしろ！」"
translation = "「어이, 보고 있는 사람들에게 더 서비스해!」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「あんっ<emoji=heart04>\u3000自分だけ気持ち良くなってごめんなさい<emoji=heart04>\u3000おっぱいも、お尻も、おま○こも、いっぱい見て<emoji=heart04>」"
translation = "「안♥ 자기만 기분 좋아져서 죄송해요♥ 가슴도, 엉덩이도, 보지도, 잔뜩 봐줘♥」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「ふあぁ、はっ、あっ、あんっ<emoji=heart04>\u3000エッチなコハルコを見て<emoji=heart04>\u3000おち○ぽシコってください<emoji=heart04>」"
translation = "「후아아, 하앗, 앗, 안♥ 야한 코하ルコ를 봐줘♥ 자지 시코해 주세요♥」"

[[dialogue]]
speaker = "unk"
original = "いやらしく腰をくねらせて、カメラの向こうの観衆に媚びるコハルコさん。"
translation = "음란하게 허리를 비틀며, 카메라 너머의 관중에게 아양 떠는 코하ルコ 씨."

[[dialogue]]
speaker = "unk"
original = "たぷたぷと重そうに揺れるおっぱいを、柔らかそうに弾むお尻を、蜜で蕩けた性器を、動き回るドローンがくっきりと撮影する。"
translation = "출렁출렁 무겁게 흔들리는 가슴을, 부드럽게 튀어 오르는 엉덩이를, 애액으로 녹아내린 성기를, 움직여 다니는 드론이 또렷하게 촬영한다."

[[dialogue]]
speaker = "unk"
original = "あのドローンに記録された極上の映像を想像し、ごくりと生唾を飲んだ。"
translation = "저 드론에 기록된 극상의 영상을 상상하며, 꿀꺽 마른침을 삼켰다."

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「はっ、あっ……ほら、おっぱい大きいでしょ<emoji=heart04>\u3000たくさんの男の人に揉みくちゃにされたおっぱい見て<emoji=heart04>\u3000いやらしいおっぱい見てぇ<emoji=heart04>」"
translation = "「하앗, 앗…… 봐요, 가슴 크죠♥ 수많은 남자들에게 주물럭거려진 가슴 봐줘♥ 야한 가슴 봐줘어♥」"

[[dialogue]]
speaker = "unk"
original = "男を悦ばせるためにわざと胸を揺らすコハルコさんに応えて、ぎゅっと鷲掴みにする。"
translation = "남자를 기쁘게 하기 위해 일부러 가슴을 흔드는 코하르코 씨에게 응하여, 꽉 움켜쥔다."

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「ん～～っ<emoji=heart04>\u3000おっぱい触られるの好きぃ<emoji=heart04>\u3000はぁっ、あ……はあぁん<emoji=heart04>」"
translation = "「응~~♥ 가슴 만져지는 거 좋아♥ 하앗, 아…… 하아앙♥」"

[[dialogue]]
speaker = "unk"
original = "重みがあって柔らかなおっぱいを、力任せに揉みしだく。"
translation = "무게감이 있고 부드러운 가슴을 힘껏 주물러댄다."

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「んんっ──いたぁ……あっ、はぁ<emoji=heart04>\u3000んっ、あ……ふああぁっ<emoji=heart04>\u3000おっぱい揉まれて、指が食い込んでる……あ、はあぁ<emoji=heart04>」"
translation = "「응윽── 아파…… 앗, 하아♥ 응, 아…… 후아아앗♥ 가슴 주물러져서, 손가락이 파고들고 있어…… 아, 하아♥」"

[[dialogue]]
speaker = "unk"
original = "痛みもコハルコさんを酔わせる毒になっているらしく、苦痛に顔を歪めながらも、膣は嬉しそうにペニスを締め付けてくる。"
translation = "통증도 코하르코 씨를 취하게 하는 독이 된 모양인지, 고통에 얼굴을 일그러뜨리면서도, 질은 기쁜 듯이 페니스를 조여 온다."

[[dialogue]]
speaker = "unk"
original = "キスするように低い声で命令すると──"
translation = "키스하듯 낮은 목소리로 명령하자──"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「ふぁいっ<emoji=heart04>\u3000んちゅっ、ちゅぷっ……ちゅるるっ<emoji=heart04>\u3000ちゅるっ、ちゅぱっ、じゅるるっ<emoji=heart04>」"
translation = "「하잇♥ 응츄, 츄릅…… 츄르르♥ 츄릅, 츄파, 쥬르르♥」"

[[dialogue]]
speaker = "unk"
original = "従順に命令を聞いて舌を絡ませてくるコハルコさん。"
translation = "순종적으로 명령을 듣고 혀를 섞어오는 코하르코 씨."

[[dialogue]]
speaker = "unk"
original = "俺は唾液を送り込みながら、弄ぶように胸を揉みつぶす。"
translation = "나는 타액을 밀어 넣으며, 농락하듯 가슴을 짓이긴다."

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「んんっ……んちゅるっ<emoji=heart04>\u3000ふは、あっ……おっぱい揉まれながら……ちゅるる、れろっ、じゅるるっ<emoji=heart04>」"
translation = "「응윽…… 응츄릅♥ 후하, 앗…… 가슴 주물러지면서…… 츄르르, 레로, 쥬르르♥」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「んふっ、んっ──んんっ<emoji=heart04>\u3000乳首、くりくりされてる<emoji=heart04>\u3000じゅるっ……ぴちゃ、ぺちゃ……んちゅるるっ<emoji=heart04>\u3000んむぅ……ふ……んっふぅ<emoji=heart04>」"
translation = "「응훗, 응── 응윽♥ 유두, 굴려지고 있어♥ 쥬릅…… 피챠, 페챠…… 응츄르르♥ 응무으…… 후…… 응후우♥」"

[[dialogue]]
speaker = "unk"
original = "絡み合う舌の感触で高ぶるのを感じながら、奥めがけてペニスを突き上げる。"
translation = "얽히는 혀의 감촉으로 고조되는 것을 느끼며, 안쪽을 향해 페니스를 찔러 올린다."

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「ふああぁっ<emoji=heart04>\u3000はっ、あっ、あんっ<emoji=heart04>\u3000おち○ぽ、硬くて大きいっ<emoji=heart04>\u3000おま○こ熱いのっ<emoji=heart04>」"
translation = "「후아아앗♥ 핫, 앗, 안♥ 자지, 딱딱하고 커♥ 보지 뜨거워♥」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「腰動くの、止まらない<emoji=heart04>\u3000はぁ、はぁ、んっ、んんぅっ<emoji=heart04>\u3000ふあぁっ、はっ──ひああ～～っ<emoji=heart04>」"
translation = "「허리 움직이는 거, 안 멈춰♥ 하아, 하아, 응, 응으윽♥ 후아앗, 핫── 히아아~~♥」"

[[dialogue]]
speaker = "unk"
original = "普段あんなにしっかりしているコハルコさんが乱れる姿に、否応なく欲望を刺激される。"
translation = "평소 그렇게나 똑 부러지는 코하르코 씨가 흐트러지는 모습에, 속수무책으로 욕망이 자극된다."

[[dialogue]]
speaker = "unk"
original = "演技のはずなのに、俺の手でコハルコさんを堕とした気がして征服欲で満たされた。"
translation = "연기일 텐데도, 내 손으로 코하르코 씨를 타락시킨 기분이 들어 정복욕으로 가득 찼다."

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「はぁっ、はっ──あ──んん～っ<emoji=heart04>\u3000おち○ぽの出っ張ってるところが、気持ちいいところ、当たって……ひあぁっ<emoji=heart04>」"
translation = "「하앗, 핫── 아── 응응~♥ 자지의 툭 튀어나온 부분이, 기분 좋은 곳에, 닿아서…… 히아앗♥」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「これいいっ<emoji=heart04>\u3000好きっ<emoji=heart04>\u3000んあぁっ、あっ、あっ──ふあぁっ<emoji=heart04>\u3000気持ちいいところ、もっとぐりぐりしてぇっ<emoji=heart04>」"
translation = "「이거 좋아♥ 좋아♥ 응아앗, 앗, 앗── 후아앗♥ 기분 좋은 곳, 좀 더 구리구리해 줘♥」"

[[dialogue]]
speaker = "unk"
original = "女性の手前の敏感な場所……いわゆるＧスポット。"
translation = "여성의 입구 쪽 민감한 장소…… 이른바 G스팟."

[[dialogue]]
speaker = "unk"
original = "そこに自分からカリ首を押し当てて、快楽を貪っていた。"
translation = "그곳에 스스로 귀두를 밀어붙이며 쾌락을 탐하고 있었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺のち○ぽをオナニーに使うなよ、淫乱」"
translation = "「내 자지를 자위용으로 쓰지 마라, 음란녀」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「あっ、あっ、あんっ<emoji=heart04>\u3000淫乱でごめんなさい<emoji=heart04>\u3000だけど、自分でも止められないのっ<emoji=heart04>\u3000ひあぁっ、あっ、はぁ……んんぁああ～～っ<emoji=heart04>」"
translation = "「앗, 앗, 안♥ 음란해서 죄송해요♥ 하지만, 스스로도 멈출 수 없는걸요♥ 히아앗, 앗, 하아…… 응아아아~~♥」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「これじゃハッカーじゃなくてただのメス穴だな」"
translation = "「이래선 해커가 아니라 그냥 암컷 구멍이군」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「はいっ<emoji=heart04>\u3000コハルコは、おち○ぽを気持ち良くするためのメス穴ですっ<emoji=heart04>\u3000おち○ぽを入れてもらうためだけの肉穴なんですぅっ<emoji=heart04>」"
translation = "「네♥ 코하르코는, 자지를 기분 좋게 하기 위한 암컷 구멍이에요♥ 자지를 넣기 위해서만 존재하는 고기 구멍인 거예요오♥」"

[[dialogue]]
speaker = "unk"
original = "言葉で責められると、膣壁がきゅっとペニスを締め上げる。"
translation = "말로 몰아세워지자, 질벽이 꽉 페니스를 조여 온다."

[[dialogue]]
speaker = "unk"
original = "物として扱われることすら、今のコハルコさんには快感になっているようだった。"
translation = "물건 취급당하는 것조차, 지금의 코하르코 씨에게는 쾌감이 되고 있는 듯했다."

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「はぁ、はぁ、あっ──ん～っ<emoji=heart04>\u3000私はおち○ぽでよがっちゃう、いやらしいメスなんです<emoji=heart04>\u3000おち○ぽが入ってないと<emoji=heart04>\u3000おま○こ寂しくて生きていけないんですっ<emoji=heart04>」"
translation = "「하아, 하아, 앗── 응~♥ 나는 자지로 가버리는, 천박한 암컷이에요♥ 자지가 들어있지 않으면♥ 보지가 외로워서 살 수 없어요♥」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「おち○ぽで、おま○こズボズボしてもらうのが、女の悦びだからぁ<emoji=heart04>\u3000あっ、あっ、んっ……女の悦び、教えてもらえて幸せですぅ<emoji=heart04>」"
translation = "「자지로, 보지 즈보즈보 당하는 게, 여자의 기쁨이니까아♥ 앗, 앗, 응…… 여자의 기쁨, 가르쳐 주셔서 행복해요♥」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「ふああぁっ、はっ、あっ……あ、あ、んあぁっ<emoji=heart04>\u3000気持ち、いいっ<emoji=heart04>\u3000あんっ、あっ、あっ……んんああぁっ<emoji=heart04>」"
translation = "「후아아앗, 핫, 앗…… 아, 아, 응아앗♥ 기분, 좋아♥ 안, 앗, 앗…… 응아아앗♥」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「コハルコのメス穴を、オナホにしてください<emoji=heart04>\u3000もっと、もっと<emoji=heart04>\u3000おち○ぽ、もっとくださいっ<emoji=heart04>」"
translation = "「코하르코의 암컷 구멍을, 오나홀로 삼아주세요♥ 좀 더, 좀 더♥ 자지, 좀 더 주세요♥」"

[[dialogue]]
speaker = "unk"
original = "メスに堕ちたコハルコさんの腰を捕まえ、全力で突き上げる。"
translation = "암컷으로 타락한 코하르코 씨의 허리를 붙잡고, 전력으로 찔러 올린다."

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「あぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あ──ああぁ～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「아앗♥ 앗♥ 앗♥ 앗♥ 아── 아아아~~~♥♥」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「おち○ぽ大しゅきっ<emoji=heart04>\u3000おち○ぽのことしか考えられないのぉっ<emoji=heart04>\u3000ふああっ──あっ──んん～～っ<emoji=heart04>」"
translation = "「자지 너무 좋아♥ 자지 생각밖에 안 나요오♥ 후아앗── 앗── 응응~~♥」"

[[dialogue]]
speaker = "unk"
original = "もはや焦点の合わない目で嬌声を上げるコハルコさん。"
translation = "이미 초점이 맞지 않는 눈으로 교성을 지르는 코하르코 씨."

[[dialogue]]
speaker = "unk"
original = "洪水のように溢れた愛液がじゅぷじゅぷと音を鳴らし、俺たちが繋がっているところをドローンのカメラが撮る。"
translation = "홍수처럼 넘쳐흐른 애액이 쥬퓨쥬퓨 소리를 내고, 우리가 이어져 있는 곳을 드론 카메라가 찍는다."

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「ああ、嬉しい……<emoji=heart04>\u3000いっぱい見られてる<emoji=heart04>\u3000カメラ越しに、たくさんのおち○ぽとセックスしてるぅ<emoji=heart04>」"
translation = "「아아, 기뻐……♥ 잔뜩 보여지고 있어♥ 카메라 너머로, 수많은 자지랑 섹스하고 있어♥」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「いっぱいのおち○ぽに犯されてるっ<emoji=heart04>\u3000犯されるの気持ちいいっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んああぁ～～っ<emoji=heart04>」"
translation = "「수많은 자지한테 범해지고 있어♥ 범해지는 거 기분 좋아♥ 앗♥ 앗♥ 안♥ 응아아~~♥」"

[[dialogue]]
speaker = "unk"
original = "無数のペニスに犯されるのを想像してよがる様は痴女そのもので、普段とは別人のようなコハルコさんに興奮してしまう。"
translation = "무수한 페니스에 범해지는 것을 상상하며 느끼는 모습은 치녀 그 자체로, 평소와는 딴판인 코하르코 씨에게 흥분하고 만다."

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「ふああぁっ、あっ、はぁんっ<emoji=heart04>\u3000おち○ぽ、奥まで届いて──んーーーっ<emoji=heart04><emoji=heart04>」"
translation = "「후아아앗, 앗, 하앙♥ 자지, 끝까지 닿아줘── 응───♥♥」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「あっ、奥、当たってるっ<emoji=heart04>\u3000あ、あん、んんっ<emoji=heart04>\u3000おち○ぽと、子宮が、キスして──ふあぁあんっ<emoji=heart04>」"
translation = "「앗, 안쪽, 닿고 있어♥ 아, 안, 응응♥ 자지랑, 자궁이, 키스해서── 후아아앙♥」"

[[dialogue]]
speaker = "unk"
original = "亀頭が子宮口にぶつかる度にコハルコさんの体が快楽に震える。"
translation = "귀두가 자궁구에 부딪힐 때마다 코하르코 씨의 몸이 쾌락에 떨린다."

[[dialogue]]
speaker = "unk"
original = "膣壁がきゅうっと収縮して、精液をねだるようにペニスを絞った。"
translation = "질벽이 꽉 수축하며, 정액을 조르듯 페니스를 쥐어짰다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「子宮が降りてきてるぞ。そんなに中に出してほしいのか？」"
translation = "「자궁이 내려오고 있군. 그렇게나 안에 싸주길 바라는 거냐?」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「はいっ<emoji=heart04>\u3000精液、中にくださいっ<emoji=heart04>\u3000熱くて濃い精液、私の中にいっぱい出してぇっ<emoji=heart04>」"
translation = "「네♥ 정액, 안에 주세요♥ 뜨겁고 진한 정액, 제 안에 잔뜩 싸줘요♥」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000おち○ぽビクビクして、射精しそう<emoji=heart04>\u3000赤ちゃんできちゃう<emoji=heart04>\u3000悪い人の子ども孕まされちゃう<emoji=heart04>」"
translation = "「앗♥ 앗♥ 앗♥ 자지가 움찔거려서, 사정할 것 같아♥ 아기 생겨버려♥ 나쁜 사람의 아이를 임신당해버려♥」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「本当に孕ませるぞ？」"
translation = "「진짜로 임신시켜 줄까?」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「いいの<emoji=heart04>\u3000赤ちゃんできてもいいから<emoji=heart04>\u3000精液、出して、出して、出してぇ<emoji=heart04>\u3000コハルコの子宮、ドロドロの精液でいっぱいにしてぇっ<emoji=heart04>」"
translation = "「좋아요♥ 아기 생겨도 좋으니까♥ 정액, 내보내 줘, 내보내 줘, 내보내 줘요♥ 코하르코의 자궁, 걸쭉한 정액으로 가득 채워줘요♥」"

[[dialogue]]
speaker = "unk"
original = "演技とはいえ、こんなことを言われて本能が疼かないわけがない。"
translation = "연기라고는 해도, 이런 말을 듣고 본능이 꿈틀거리지 않을 리가 없다."

[[dialogue]]
speaker = "unk"
original = "いや、もしかしたら演技ではないかもしれないと、本当に俺に孕まされたがっているのだと錯覚してしまう。"
translation = "아니, 어쩌면 연기가 아닐지도 모른다고, 정말로 나에게 임신당하고 싶어 하는 것이라고 착각하게 된다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そこまで言うなら……カメラの前で孕め！」"
translation = "「그렇게까지 말한다면…… 카메라 앞에서 임신해라!」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「はい、孕みますっ<emoji=heart04>\u3000赤ちゃん作りますっ<emoji=heart04>\u3000見られながら受精しますぅっ<emoji=heart04><emoji=heart04>」"
translation = "「네, 임신할게요♥ 아기 만들게요♥ 보여지면서 수정할게요오♥♥」"

[[dialogue]]
speaker = "unk"
original = "本能に衝き動かされるまま、全力でコハルコさんの子宮口をノックし続ける。"
translation = "본능에 이끌리는 대로, 전력으로 코하르코 씨의 자궁구를 계속 노크한다."

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「あっ、あっ、あっ──んああぁ～～っ<emoji=heart04>\u3000映像を見ている皆さん<emoji=heart04>\u3000美少女ハッカーが、卵子まで屈服しちゃうところ、見てくださいっ<emoji=heart04>」"
translation = "「앗, 앗, 앗── 응아아~~♥ 영상을 보고 계신 여러분♥ 미소녀 해커가, 난자까지 굴복당하는 모습, 봐주세요♥」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「正義のハッカーがはしたなくイッて、赤ちゃん孕みますっ<emoji=heart04>\u3000はぁっ、あっ、んんっ<emoji=heart04>\u3000子宮まで、悪い人のものにされちゃいますっ<emoji=heart04>」"
translation = "「정의의 해커가 상스럽게 가버리고, 아기 임신할게요♥ 하앗, 앗, 응윽♥ 자궁까지, 나쁜 사람의 것이 되어버려요♥」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「あ、あ、あんっ<emoji=heart04>\u3000おま○こに精液ビュルビュル出されて、受精する瞬間、見てっ<emoji=heart04>\u3000見て見て見てぇっ<emoji=heart04>\u3000あ、あ、あ、あ──」"
translation = "「아, 아, 안♥ 보지에 정액을 뷰르뷰르 싸여서, 수정하는 순간, 봐줘♥ 봐줘 봐줘 봐줘요♥ 아, 아, 아, 아──」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「ふああぁああぁ～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아아~~~~~~~~~♥♥♥」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あ～～～～～～～っ<emoji=heart04><emoji=heart04>\u3000奥、びゅーって、せーえき出てるっ<emoji=heart04>\u3000あっ、あつっ、熱いぃっ<emoji=heart04>\u3000はぁっ、はっ、んん～～っ<emoji=heart04>」"
translation = "「앗♥ 앗♥ 앗♥ 아~~~~~~~~~♥♥ 안쪽, 뷰우 하고, 정액 나오고 있어♥ 앗, 뜨거, 뜨거워♥ 하앗, 핫, 응응~~♥」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「子宮に、せーし出されて、受精するっ<emoji=heart04>\u3000ふああぁっ、ぁっ、ぁっ──赤ちゃんできちゃうっ<emoji=heart04>\u3000ふ──あ──ああぁ～～っ<emoji=heart04>」"
translation = "「자궁에, 정자 싸여서, 수정해♥ 후아아앗, 앗, 앗── 아기 생겨버려♥ 후── 아── 아아아~~♥」"

[[dialogue]]
speaker = "unk"
original = "ただコハルコさんを孕ませることを念じながら、子宮に精を吐き出す。"
translation = "그저 코하르코 씨를 임신시키는 것만을 염원하며, 자궁에 정을 토해낸다."

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「んあぁっ、あっ、はあぁんっ<emoji=heart04>\u3000カメラの前で、妊娠しちゃうっ<emoji=heart04>\u3000まだ、せーえき、出てるっ<emoji=heart04>」"
translation = "「응아앗, 앗, 하아앙♥ 카메라 앞에서, 임신해버려♥ 아직, 정액, 나오고 있어♥」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「はぁ、はぁ……あっ、ああ……子宮いっぱいになるぅ<emoji=heart04>\u3000ふぁ、はぁ──ん～～～っ<emoji=heart04>」"
translation = "「하아, 하아…… 앗, 아아…… 자궁이 가득 차버려♥ 화, 하아── 응~~~♥」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「はーっ……はーっ……見られながら、イッちゃった……<emoji=heart04>\u3000赤ちゃん作っちゃった……<emoji=heart04>」"
translation = "「하아…… 하아…… 보여지면서, 가버렸어……♥ 아기 만들어버렸어……♥」"

[[dialogue]]
speaker = "unk"
original = "陶酔しきった表情はとても淫靡で、それだけで男を射精させられそうなほど。"
translation = "황홀경에 빠진 표정은 너무나 음비하여, 그것만으로도 남자를 사정시킬 수 있을 정도였다."

[[dialogue]]
speaker = "unk"
original = "コハルコさんの奥に精液を出し切り、強烈すぎる射精の快感のせいで、すさまじい疲労感に襲われる。"
translation = "코하르코 씨의 안쪽에 정액을 다 쏟아내고, 너무나 강렬한 사정의 쾌감 때문에 엄청난 피로감이 엄습한다."

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「はぁ……精液でお腹いっぱい……熱いぃ……」"
translation = "「하아…… 정액으로 배가 가득해…… 뜨거워……」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「んんっ<emoji=heart04>\u3000精液溢れちゃってる……こんなに興奮してくれたなら、思い切って正解だったかな」"
translation = "「응윽♥ 정액이 흘러넘치고 있어…… 이렇게나 흥분해 줬다면, 마음먹길 잘한 걸까」"

[[dialogue]]
speaker = "unk"
original = "乱れていたコハルコさんの姿が脳裏に焼き付いて、もう忘れられそうにない。"
translation = "흐트러져 있던 코하르코 씨의 모습이 뇌리에 박혀, 이제 잊을 수 없을 것 같다."

[[dialogue]]
speaker = "unk"
original = "自分の中の変な扉を開かれた気分だ。"
translation = "내 안의 이상한 문이 열린 기분이다."

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「後でデータあげるから、一緒にいられない時は好きに使っていいよ。絶対に１人で見てね」"
translation = "「나중에 데이터 줄 테니까, 같이 있지 못할 때는 마음대로 써도 좋아. 절대로 혼자서 봐야 해」"

[[dialogue]]
speaker = "unk"
original = "コハルコさんの痴態を何度でも好きだけ見られる、俺専用のビデオ。"
translation = "코하르코 씨의 치태를 몇 번이고 마음껏 볼 수 있는, 나 전용 비디오."

[[dialogue]]
speaker = "unk"
original = "今射精したところなのに、想像しただけで猛烈に興奮してしまう。"
translation = "방금 사정했는데도, 상상한 것만으로 강렬하게 흥분해 버린다."

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「んっ<emoji=heart04>\u3000またおち○ちんビクってした。会長さんのエッチ♪」"
translation = "「응♥ 또 자지가 움찔거렸어. 회장님 변태♪」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「あ、ちょっと待って。うちのシステムにハッキングしようとしてる人がいる。このまま片付けちゃうから」"
translation = "「아, 잠깐 기다려 봐. 우리 시스템에 해킹하려는 사람이 있어. 이대로 처리해 버릴 테니까」"

[[dialogue]]
speaker = "unk"
original = "俺に跨ったまま、空中にパネルを浮かべて操作するコハルコさん。"
translation = "나에게 올라탄 채로, 공중에 패널을 띄워 조작하는 코하르코 씨."

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「向こうのシステムを逆に乗っ取って……はい、これでよし。新星学園のセキュリティに侵入しようなんて１００年早いんだから」"
translation = "「저쪽 시스템을 역으로 해킹해서…… 응, 이걸로 됐어. 신성 학원의 보안에 침입하려 하다니 100년은 이르다고」"

[[dialogue]]
speaker = "unk"
original = "ハッカーをあっさり撃退するコハルコさんを見て、正義の魔法使いが本当に悪に屈する日は絶対来ないと、そう思ったのだった──"
translation = "해커를 가뿐히 격퇴하는 코하르코 씨를 보며, 정의의 마법사가 정말로 악에 굴복하는 날은 절대 오지 않을 것이라고, 그렇게 생각했다──"

