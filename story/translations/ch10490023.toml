[[dialogue]]
speaker = "unk"
original = "第３話,おっぱいをはかってみよう！,P"
translation = "제3화, 가슴을 재보자!, P"

[[dialogue]]
speaker = "unk"
original = "ある日、星徒会で紅明に会計仕事を手伝ってもらっていた時のこと――"
translation = "어느 날, 성도회에서 코우메이에게 회계 업무를 도움받고 있었을 때의 일──"

[[dialogue]]
speaker = "紅明"
original = "「はいよ、ダーリン、これで会計資料の打ち込み終わったぜ☆\u3000最終チェックお願い♪」"
translation = "「자 여기, 달링, 이걸로 회계 자료 입력 끝났슴다☆ 최종 체크 부탁해♪」"

[[dialogue]]
speaker = "紅明"
original = "「――問題なさそう？\u3000それならよかったっしょ♪\u3000これで全部片付いたし、休憩しようぜ、休憩～」"
translation = "「──문제없어 보여? 그렇다면 다행이라구♪ 이걸로 전부 정리됐으니, 휴식하자구, 휴식~」"

[[dialogue]]
speaker = "unk"
original = "紅明って実は頭良いよね。成績もいいし"
translation = "코우메이는 사실 머리가 좋네. 성적도 좋고"

[[dialogue]]
speaker = "紅明"
original = "「フフフ、そこはほら、アタシってば人生２周目なんで♪\u3000善哉乳業立ち上げるのに、色々勉強したからね～」"
translation = "「후후후, 그건 말이지, 나로 말하자면 인생 2회차라서♪ 젠자이 유업 세우느라 이런저런 공부를 했거든~」"

[[dialogue]]
speaker = "紅明"
original = "「ところで、ふと思いついたんだけどさ――」"
translation = "「그건 그렇고, 문득 생각난 건데──」"

[[dialogue]]
speaker = "紅明"
original = "「ダーリン、アタシのおっぱいの重さ、はかってみよう！」"
translation = "「달링, 내 가슴 무게, 한번 재보자!」"

[[dialogue]]
speaker = "unk"
original = "いきなり何言ってんの！？"
translation = "갑자기 무슨 소리야!?"

[[dialogue]]
speaker = "紅明"
original = "「いや、なんかこう、作業してるとさ……思考が行き詰まる時があるじゃん？」"
translation = "「아니, 뭐랄까, 작업하다 보면 말이야…… 사고가 막힐 때가 있잖아?」"

[[dialogue]]
speaker = "紅明"
original = "「その時にアタシ、腕組みのポーズをして、手持ち無沙汰だからつい自分のおっぱいをタプタプしてたわけよ」"
translation = "「그때 내가 팔짱을 끼는 포즈를 취하는데, 손이 심심하니까 나도 모르게 내 가슴을 출렁출렁하고 있었단 말이지」"

[[dialogue]]
speaker = "紅明"
original = "「――そう、下から。で、ふと思ったよね。そういえばアタシ、おっぱいの大きさははかったことあるけど、重さは前世から１度もはかったことないなって」"
translation = "「──그래, 밑에서부터. 그래서 문득 생각했어. 그러고 보니 나, 가슴 크기는 재본 적 있지만, 무게는 전생부터 단 한 번도 재본 적 없구나 하고」"

[[dialogue]]
speaker = "紅明"
original = "「というわけで、計量器をサンタの袋から召喚！\u3000はい、ドーン！」"
translation = "「그런 고로, 계량기를 산타 보따리에서 소환! 자, 짠!」"

[[dialogue]]
speaker = "unk"
original = "ちょっ、いつ変身した！？"
translation = "잠깐, 언제 변신했어!?"

[[dialogue]]
speaker = "紅明"
original = "「――変身が見えなかったって？\u3000ふっ、これがアタシの隠された特技の１つ……『短縮変身』だぜ！」"
translation = "「──변신이 안 보였다고? 훗, 이것이 나의 숨겨진 특기 중 하나…… 『단축 변신』이라구!」"

[[dialogue]]
speaker = "紅明"
original = "「アタシの変身プロセスはなんと、ノーフラッシュかつ最速０．０５秒で完了することが可能なのだ！」"
translation = "「나의 변신 프로세스는 무려, 노 플래시이자 최단 0.05초 만에 완료하는 것이 가능하다!」"

[[dialogue]]
speaker = "紅明"
original = "「うしし♪\u3000凄いっしょ？\u3000昔、宴会芸として修行した甲斐があったよね～☆」"
translation = "「우시시♪ 대단하지? 옛날에 장기 자랑용으로 수행한 보람이 있네~☆」"

[[dialogue]]
speaker = "unk"
original = "凄いけど、理由がしょーもない！"
translation = "대단하긴 한데, 이유가 시시해!"

[[dialogue]]
speaker = "紅明"
original = "「ともあれ、ダーリンも気になるっしょ～？\u3000アタシのおっぱいのお・も・さ<emoji=heart04>」"
translation = "「어쨌든, 달링도 궁금하지~? 내 가슴의 무·게<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それはまぁ、俺も男だし、好きな女の子の魅力的な部分である。気になるか気にならないかといえば――"
translation = "그거야 뭐, 나도 남자고, 좋아하는 여자의 매력적인 부분이다. 궁금하냐 아니냐고 묻는다면──"

[[dialogue]]
speaker = "紅明"
original = "「んふふ～<emoji=heart04>\u3000ダーリンの目もおっぱいに釘付けだし、期待に応えて、計量器に乗せちゃうぜ♪\u3000よいしょっと<emoji=heart04>」"
translation = "「응후후~<emoji=heart04> 달링의 눈도 가슴에 못 박혀 있고, 기대에 부응해서 계량기에 올려볼게♪ 영차<emoji=heart04>」"

[[dialogue]]
speaker = "紅明"
original = "「それでは、はかりま～す♪」"
translation = "「그럼, 재보겠슴다~♪」"

[[dialogue]]
speaker = "紅明"
original = "「はい！\u3000最近また成長したトップバスト１０１センチ、Ｉカップである、アタシのおっぱいの重さは――」"
translation = "「네! 최근에 또 성장한 톱 바스트 101센티, I컵인 내 가슴의 무게는──」"

[[dialogue]]
speaker = "紅明"
original = "「なんと、約４２００グラムでした～☆\u3000って重くね！？\u3000自分でもビックリなんだが！」"
translation = "「무려, 약 4200그램이었슴다~☆ 어라, 무겁지 않아!? 나조차도 깜짝 놀랐는데!」"

[[dialogue]]
speaker = "unk"
original = "２リットルのペットボトル２本分！？"
translation = "2리터 페트병 2개 분량!?"

[[dialogue]]
speaker = "紅明"
original = "「マジか～、そりゃ肩も凝るわけだわ～」"
translation = "「진짜냐~, 그러니 어깨도 결릴 만하네~」"

[[dialogue]]
speaker = "紅明"
original = "「ふむふむ、ＤＩＳＣでネット検索してみると～……１つ上のＪカップだと５０００グラムで、Ｋカップだと６２００グラムだと！？」"
translation = "「흠흠, DISC로 인터넷 검색을 해보니~…… 한 단계 위인 J컵은 5000그램이고, K컵은 6200그램이라고!?」"

[[dialogue]]
speaker = "紅明"
original = "「ここから更にペットボトル１本追加されるとか……そうか、おっぱいとは質量兵器だったんだな……」"
translation = "「여기서 더 페트병 1개가 추가된다니…… 그렇군, 가슴이란 질량 병기였던 거구나……」"

[[dialogue]]
speaker = "紅明"
original = "「しかし、Ｋカップ……必ずしも大きければいいってわけじゃないけど、牛一族に生まれた者としては、最強のサイズを目指してみたいよねぇ」"
translation = "「하지만 K컵…… 반드시 크다고 좋은 건 아니지만, 우 씨 일족으로 태어난 자로서는 최강의 사이즈를 목표로 해보고 싶단 말이지」"

[[dialogue]]
speaker = "紅明"
original = "「よしっ、ここは１つ、おっぱいを大きくする為に、ダーリンに揉んでもらうか！」"
translation = "「좋아, 여기서 한번 가슴을 크게 만들기 위해, 달링이 주물러주지 않을래!」"

[[dialogue]]
speaker = "unk"
original = "いやもう十分に大きいでしょ！？"
translation = "아니, 이미 충분히 크잖아!?"

[[dialogue]]
speaker = "紅明"
original = "「え～、でも、ダーリンも私と付き合ってるんだし、大きいおっぱいは好きなんじゃないの～？」"
translation = "「에~ 하지만 달링도 나랑 사귀고 있으니까, 큰 가슴은 좋아하지 않아~?」"

[[dialogue]]
speaker = "紅明"
original = "「Ｋカップのおっぱいに興味はないのかな～？\u3000ちなみにアタシのお母さんは、私よりバストサイズ大きいし、Ｊカップだし、本物はすごいぜ～？」"
translation = "「K컵 가슴에는 흥미 없으려나~? 참고로 우리 엄마는 나보다 바스트 사이즈가 크고, J컵인데, 진짜는 엄청나다구~?」"

[[dialogue]]
speaker = "紅明"
original = "「そうそう、善哉乳業の現社長ね。――って、ダーリンいま、お母さんに会ってみたいって考えたっしょ！？」"
translation = "「그래그래, 젠자이 유업의 현 사장님이지. ──어라, 달링 지금 엄마를 만나보고 싶다고 생각했지!?」"

[[dialogue]]
speaker = "紅明"
original = "「んモー！\u3000ダーリン、浮気はいけないんだぞ～？」"
translation = "「음메~! 달링, 바람피우면 안 된다구~?」"

[[dialogue]]
speaker = "unk"
original = "いや、紅明から話題に出したんだよね！？"
translation = "아니, 코우메이가 먼저 화제로 꺼냈잖아!?"

[[dialogue]]
speaker = "紅明"
original = "「そうだけども～、デレデレするならやっぱり、アタシにして欲しいっていうか……」"
translation = "「그렇긴 하지만~, 데레데레할 거라면 역시 나한테 해줬으면 좋겠달까……」"

[[dialogue]]
speaker = "紅明"
original = "「――嫉妬してるのかって？\u3000だって、ダーリンはアタシのダーリンだし！」"
translation = "「──질투하는 거냐고? 그야 달링은 내 달링이니까!」"

[[dialogue]]
speaker = "紅明"
original = "「とにかく、お母さんと会った時にデレデレしない為にも、やっぱりＫカップを目指すし！」"
translation = "「암튼, 엄마랑 만났을 때 데레데레하지 않게 하기 위해서라도 역시 K컵을 목표로 할 거야!」"

[[dialogue]]
speaker = "紅明"
original = "「え？\u3000――嫉妬してくれて嬉しい？」"
translation = "「에? ──질투해 줘서 기뻐?」"

[[dialogue]]
speaker = "紅明"
original = "「――今の自分のことを、好きだって思ってもらえてると感じるから？」"
translation = "「──지금의 나를 좋아해 주고 있다고 느껴져서?」"

[[dialogue]]
speaker = "紅明"
original = "「んモー<emoji=heart04>\u3000ダーリンってば、そんな胸キュンなこと言ったりして……」"
translation = "「음메<emoji=heart04> 달링도 참, 그런 심쿵할 소리를 하고……」"

[[dialogue]]
speaker = "紅明"
original = "「思わずハグしたくなっちゃうじゃん<emoji=heart04>\u3000――えいっ☆」"
translation = "「나도 모르게 허그하고 싶어지잖아<emoji=heart04> ──에잇☆」"

[[dialogue]]
speaker = "unk"
original = "ちょっ、そんな胸を押し付けられると……！"
translation = "잠깐, 그렇게 가슴을 밀어붙이면……!"

[[dialogue]]
speaker = "紅明"
original = "「うしし<emoji=heart04>\u3000ダーリンってば、恋人同士なのに、抱き着くといつも照れた顔するよね～♪」"
translation = "「우시시<emoji=heart04> 달링도 참, 연인 사이인데 안기면 항상 부끄러워하는 표정을 짓네~♪」"

[[dialogue]]
speaker = "紅明"
original = "「――おっぱいが当たってるから意識しちゃう？\u3000ふふっ、それが嬉しいから、アタシもついハグしちゃうんだけどね<emoji=heart04>」"
translation = "「──가슴이 닿으니까 의식하게 돼? 후후, 그게 기뻐서 나도 모르게 허그하게 되는 거지만 말이야<emoji=heart04>」"

[[dialogue]]
speaker = "紅明"
original = "「だってそれって、アタシのこと、女の子として見てくれてるってことじゃん？\u3000うりうり～<emoji=heart04>」"
translation = "「그야 그건 나를 여자로 봐주고 있다는 거잖아? 우쭈쭈~<emoji=heart04>」"

[[dialogue]]
speaker = "紅明"
original = "「ん～？\u3000あんまりされると、どうなっても知らないって？」"
translation = "「응~? 너무 그러면 어떻게 돼도 모른다고?」"

[[dialogue]]
speaker = "紅明"
original = "「どうなっちゃうのかな～？\u3000んふふ<emoji=heart04>」"
translation = "「어떻게 되려나~? 응후후<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "恋人の悪戯なスキンシップに、ドキドキしてしまう俺なのだった――"
translation = "연인의 짓궂은 스킨십에 두근거리고 마는 나였다──"

