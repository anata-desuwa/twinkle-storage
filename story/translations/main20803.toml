[[dialogue]]
speaker = "unk"
original = "第３話,戦う理由,B"
translation = "제3화, 싸우는 이유, B"

[[dialogue]]
speaker = "unk"
original = "アルバイトを続けるルヴィネを空から監視しながら、またナターシャが問う。"
translation = "아르바이트를 계속하는 루비네를 하늘에서 감시하며, 다시 나타샤가 묻는다."

[[dialogue]]
speaker = "ナターシャ"
original = "「で、梨緒は何のために戦ってるの？\u3000世界を守るとか言ってなかったっけ？」"
translation = "「그래서, 리오는 무엇을 위해 싸우는 거야? 세계를 지킨다든가 말하지 않았었나?」"

[[dialogue]]
speaker = "梨緒"
original = "「……そうだ。私は人々を守るために星騎士になった」"
translation = "「……그렇다. 나는 사람들을 지키기 위해 성기사가 되었다.」"

[[dialogue]]
speaker = "梨緒"
original = "「ベガを救うために、フィオナやエリシア、ジグとともにディザスターハンドと戦った。だけど世界は守れなかった」"
translation = "「베가를 구하기 위해, 피오나나 엘리시아, 지그와 함께 디재스터 핸드와 싸웠다. 하지만 세계는 지키지 못했지.」"

[[dialogue]]
speaker = "梨緒"
original = "「アルタイルに来て、今度こそ世界を救おうと思った」"
translation = "「알타이르에 와서, 이번에야말로 세계를 구하겠다고 생각했다.」"

[[dialogue]]
speaker = "梨緒"
original = "「ベガが滅んだと知ってからも、世界を救う意志は変わらない」"
translation = "「베가가 멸망했다는 걸 알고 나서도, 세계를 구하겠다는 의지는 변하지 않아.」"

[[dialogue]]
speaker = "梨緒"
original = "「……そのはずだった」"
translation = "「……분명 그랬을 터였다.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「はず？」"
translation = "「터였다?」"

[[dialogue]]
speaker = "梨緒"
original = "「わからなくなってきたんだ。私が何のために戦ってきたのか」"
translation = "「모르게 되어버렸어. 내가 무엇을 위해 싸워왔는지.」"

[[dialogue]]
speaker = "梨緒"
original = "「世界を救うために戦っていたはずなのに……それが本当だったかどうか、自信がないんだ」"
translation = "「세계를 구하기 위해 싸웠을 텐데…… 그게 정말이었는지, 자신이 없어.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ふーん、そういうこと」"
translation = "「흐응, 그렇구나.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「そういえばさ、私も不思議に思ったことがあったんだよね。アルタイルの梨緒が死んでて、ベガの梨緒だってわかった時あったよね」"
translation = "「그러고 보니 말이야, 나도 이상하게 생각한 적이 있었거든. 알타이르의 리오가 죽어 있고, 베가의 리오라는 걸 알았을 때 있었잖아.」"

[[dialogue]]
speaker = "梨緒"
original = "「……？\u3000ああ、確か信任選挙の前だったか」"
translation = "「……? 아아, 분명 신임 투표 전이었나.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「あの時、やけに立ち直りが早いと思ったんだよね」"
translation = "「그때, 유난히 재기가 빠르다고 생각했거든.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「家族も友達も故郷も失って、世界を救おうとしたことも無駄になったんだから、当分戦えないくらいになってもおかしくないと思うんだ」"
translation = "「가족도 친구도 고향도 잃고, 세계를 구하려던 노력도 헛수고가 됐으니까, 당분간 싸우지 못할 정도가 되어도 이상하지 않다고 생각하거든.」"

[[dialogue]]
speaker = "梨緒"
original = "「……何が言いたい？」"
translation = "「……무슨 말이 하고 싶지?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「梨緒の言う通り、単純に世界を救いたいだけじゃないかもってこと」"
translation = "「리오가 말한 대로, 단순히 세계를 구하고 싶을 뿐만이 아닐지도 모른다는 거지.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「あ、ジグ」"
translation = "「아, 지그다.」"

[[dialogue]]
speaker = "梨緒"
original = "「！！\u3000どこだ！？\u3000ジグは私が──」"
translation = "「!! 어디냐!? 지그는 내가──」"

[[dialogue]]
speaker = "unk"
original = "険しい顔で街を見回す梨緒。"
translation = "험악한 표정으로 거리를 둘러보는 리오."

[[dialogue]]
speaker = "unk"
original = "だがあの忌々しい仮面はどこにもいない。"
translation = "하지만 그 가증스러운 가면은 어디에도 없다."

[[dialogue]]
speaker = "ナターシャ"
original = "「ごめん、嘘ついた」"
translation = "「미안, 거짓말이야.」"

[[dialogue]]
speaker = "梨緒"
original = "「ナターシャ！！」"
translation = "「나타샤!!」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ごめんってば。でも梨緒ってジグのことになると目の色変わるよね。まるでジグに勝つために生きてるみたい」"
translation = "「미안하다니까. 하지만 리오는 지그 일만 나오면 눈빛이 변하네. 마치 지그에게 이기기 위해 살고 있는 것 같아.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「確かジグに負けたのが９９９回だっけ？」"
translation = "「분명 지그에게 진 게 999번이었나?」"

[[dialogue]]
speaker = "梨緒"
original = "「９９８回だ」"
translation = "「998번이다.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「即答できるんだ。ちょっと引くなー」"
translation = "「즉답하네. 좀 깬다~」"

[[dialogue]]
speaker = "ナターシャ"
original = "「前から思ってたんだけどさ、ぶっちゃけ、それだけ負けても挑み続ける方が異常だよ」"
translation = "「전부터 생각했던 건데, 솔직히 그만큼 지고도 계속 덤비는 쪽이 비정상이야.」"

[[dialogue]]
speaker = "梨緒"
original = "「異常……？\u3000勝つまで挑むのは普通じゃないのか？」"
translation = "「비정상……? 이길 때까지 도전하는 건 당연한 거 아닌가?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「いや、普通じゃないよ。考えたことない？\u3000諦めずにジグに挑み続けた時間と労力を、他のことに向けてたら何かできていたんじゃないかって」"
translation = "「아니, 당연하지 않아. 생각해 본 적 없어? 포기하지 않고 지그에게 계속 도전한 시간과 노력을, 다른 곳에 쏟았다면 뭔가 해낼 수 있지 않았을까 하고.」"

[[dialogue]]
speaker = "梨緒"
original = "「……ジグに勝つのは諦めろと？」"
translation = "「……지그에게 이기는 건 포기하라는 건가?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「違う違う。ジグはリクリエの使徒になっちゃったからどうにかしないといけないし、私もあいつのこと好きじゃないから梨緒に勝ってほしいと思ってるよ」"
translation = "「아니 아니. 지그는 리크리에의 사도가 되어버렸으니까 어떻게든 해야 하고, 나도 그 녀석 안 좋아하니까 리오가 이겼으면 좋겠다고 생각해.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「でもそこまで別に勝ちにこだわらなくてもいいんじゃないって思うよ」"
translation = "「하지만 그렇게까지 승리에 집착하지 않아도 되지 않나 싶어서.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「そんなにジグに勝ちたいのは、ただの負けず嫌いなだけじゃないのかなって」"
translation = "「그렇게 지그에게 이기고 싶은 건, 그냥 지기 싫어하는 성격 때문 아닐까 하고.」"

[[dialogue]]
speaker = "梨緒"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "ナターシャ"
original = "「あ、ルヴィネに動きがあった。追いかけるよ」"
translation = "「아, 루비네가 움직였다. 쫓아가자.」"

[[dialogue]]
speaker = "unk"
original = "ナターシャと梨緒に代わり、俺とアポロが尾行を引き継いだ。"
translation = "나타샤와 리오 대신, 나와 아폴로가 미행을 인계받았다."

[[dialogue]]
speaker = "unk"
original = "次第に夜が更けていき、時刻はもう夜の零時。"
translation = "점차 밤이 깊어지고, 시각은 벌써 밤 12시."

[[dialogue]]
speaker = "unk"
original = "ルヴィネは寮で寝ているはずだが──"
translation = "루비네는 기숙사에서 자고 있을 터였지만──"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「ルヴィネが寮から出てきた？\u3000こんな時間にどこ行くんだ？」"
translation = "「루비네가 기숙사에서 나왔어? 이 시간에 어디 가는 거지?」"

[[dialogue]]
speaker = "unk"
original = "わざわざ深夜に１人で向かうとなると、何か秘密があるのかもしれない。"
translation = "심야에 굳이 혼자 향하는 걸 보니, 뭔가 비밀이 있을지도 모른다."

[[dialogue]]
speaker = "unk"
original = "そんな期待を感じながらルヴィネを追いかける。"
translation = "그런 기대를 품으며 루비네를 뒤쫓는다."

[[dialogue]]
speaker = "unk"
original = "ルヴィネを追跡していくと、ある店の前で立ち止まる。"
translation = "루비네를 추적해 가자, 어느 가게 앞에서 멈춰 선다."

[[dialogue]]
speaker = "unk"
original = "そしてルヴィネは迷うことなく店に入っていた。"
translation = "그리고 루비네는 망설임 없이 가게 안으로 들어갔다."

[[dialogue]]
speaker = "unk"
original = "その店は──"
translation = "그 가게는──"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「担々麺専門店『２９』」"
translation = "「탄탄면 전문점 『29』」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「やっぱり担々麺かよ……深夜に寮を抜けて食いに行くとか、とんだ不良じゃないか」"
translation = "「역시 탄탄면이냐고…… 심야에 기숙사를 빠져나와 먹으러 가다니, 완전 불량 학생이잖아.」"

[[dialogue]]
speaker = "クロト"
original = "「あはは……」"
translation = "「아하하……」"

[[dialogue]]
speaker = "unk"
original = "結局、ルヴィネの担々麺好きが筋金入りであることだけはわかったのだった……"
translation = "결국, 루비네의 탄탄면 사랑이 골수까지 박혀 있다는 것만은 알게 되었다……"

