[[dialogue]]
speaker = "unk"
original = "ラブホテルの部屋中に、甘い香水の香りが満ちている。"
translation = "러브호텔 방 안에, 달콤한 향수 냄새가 가득 차 있다."

[[dialogue]]
speaker = "unk"
original = "上品な芳香の中に漂う、理性を溶かして蕩けさせる、甘く甘く淫らな香り。"
translation = "고상한 향기 속에 감도는, 이성을 녹여 황홀하게 만드는, 달콤하고 달콤하며 음란한 향기."

[[dialogue]]
speaker = "unk"
original = "そしてペニスに与えられる、柔らかな肉による刺激は、奥歯を噛み締めなければとても堪えきれない。"
translation = "그리고 페니스에 가해지는, 부드러운 살결에 의한 자극은, 어금니를 꽉 깨물지 않으면 도저히 견뎌낼 수 없다."

[[dialogue]]
speaker = "シャルレーヌ"
original = "「んんぅっ<emoji=heart04>\u3000あ、ぁ、んんっ<emoji=heart04>\u3000ふぁあ、あぁっ、や、やぁんっ<emoji=heart04>」"
translation = "「음응읏♥ 아, 아, 응읏♥ 하아, 아앗, 야, 야앙♥」"

[[dialogue]]
speaker = "unk"
original = "そしてこの声──ひどく幼く、ひどくいやらしい喘ぎ声が、俺の射精欲を否応なしに焚きつけてくる。"
translation = "그리고 이 목소리── 몹시 어리고, 몹시 야한 신음 소리가, 내 사정 욕구를 어쩔 수 없이 부추겨 온다."

[[dialogue]]
speaker = "unk"
original = "ふとした瞬間に気が緩むと、我慢をやめてしまいそうになるほどの……"
translation = "문득 순간적으로 정신줄을 놓으면, 참는 것을 그만둬 버릴 것만 같을 정도의……"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「まだ許可は出してませんよ、魔王様～？」"
translation = "「아직 허가는 내주지 않았다고요, 마왕님~?」"

[[dialogue]]
speaker = "クロト"
original = "「ぐうぅっ……！」"
translation = "「구우우……!」"

[[dialogue]]
speaker = "unk"
original = "俺の胸中を見透かしたように、シャルレーヌがリードを引く。"
translation = "내 속마음을 꿰뚫어 본 듯이, 샬레느가 리드를 당긴다."

[[dialogue]]
speaker = "unk"
original = "気道が詰まって全身がこわばった結果、精液の発射は阻害されてしまった。"
translation = "기도가 막혀 전신이 굳어진 결과, 정액의 발사는 저지당하고 말았다."

[[dialogue]]
speaker = "unk"
original = "また絶妙のタイミングで、イくことができなかった……いつまで続くんだ、この焦らしは……"
translation = "또 절묘한 타이밍에, 가지 못했다…… 언제까지 계속되는 거냐, 이 애태우기는……"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「魔王様？\u3000今、私に黙ってイこうとしましたね？\u3000何度目ですかぁ、それ？\u3000私が『射精していい』って言うまではダメなんですからね？」"
translation = "「마왕님? 지금, 저 몰래 가려고 했죠? 벌써 몇 번째인가요~, 그거? 제가 『사정해도 좋아』라고 말하기 전까지는 안 된다니까요?」"

[[dialogue]]
speaker = "クロト"
original = "「た、頼む……！\u3000お願いだ、いい加減セックスしたい、させてくれっ……！」"
translation = "「부, 부탁이야……! 제발, 이제 그만 섹스하고 싶어, 하게 해줘……!」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「あっは♪\u3000何ですかぁ、その情けない声は？\u3000まったくもう。堪え性がないざこおち○ちんは、これだから困ります」"
translation = "「앗하♪ 뭐예요~, 그 한심한 목소리는? 정말이지 참. 참을성 없는 잡코 자지는, 이래서 곤란하다니까요」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「お互いの呼吸を合わせる前戯は、じっくり行わないと。いつも言ってることでしょう？\u3000ほらぁ、もっと素股しますよ～♪」"
translation = "「서로의 호흡을 맞추는 전희는, 느긋하게 진행해야죠. 항상 말하던 거잖아요? 자아~, 좀 더 스마타 할게요~♪」"

[[dialogue]]
speaker = "クロト"
original = "「くっ……うぁああっ！\u3000前戯って、いつまで続けるんだっ……も、もう何十分もっ！\u3000おかしくなりそうだっ……！」"
translation = "「큭…… 으아아앗! 전희라니, 언제까지 계속할 셈이냐…… 벌써 몇십 분이나! 이상해질 것 같아……!」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「だって～、いっぱい楽しまないと損じゃないですかぁ～♪\u3000それに、長いか短いか、それを決めるのは私ですよ？\u3000くすくす♪」"
translation = "「그치만~, 잔뜩 즐기지 않으면 손해잖아요~♪ 게다가, 길지 짧을지, 그걸 정하는 건 저라고요? 쿠스쿠스♪」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「仕方ない魔王様。だけど、ひとつだけ褒めてあげます」"
translation = "「어쩔 수 없는 마왕님. 하지만, 한 가지만 칭찬해 드릴게요」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「こんなにおち○ちんパンパンにさせて……ちゃあんと言いつけ通り、ここ数日間オナニーはしなかったみたいですね？」"
translation = "「이렇게 자지를 팽팽하게 부풀리고선…… 제대로 시킨 대로, 요 며칠 동안 자위는 안 한 모양이네요?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「くふ♪\u3000学園のみんなが知ったらどう思うでしょうね？\u3000あの頼りがいのある星徒会長様がぁ……♪」"
translation = "「쿠후♪ 학원 모두가 알면 어떻게 생각할까요? 그 믿음직스러운 성도회장님이……♪」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「附属に通う歳下の女の子に、射精管理されてるだなんて♪ ちっちゃな女の子の命令に従うの、癖になっちゃいましたかぁ？」"
translation = "「부속 학교에 다니는 연하의 여자아이에게, 사정 관리당하고 있다니♪ 조그만 여자아이의 명령에 따르는 거, 버릇이 되어버렸나요~?」"

[[dialogue]]
speaker = "unk"
original = "自慰を我慢することは辛い。後輩女子の言いなりになることも羞恥心がすさまじい。"
translation = "자위를 참는 것은 괴롭다. 후배 여자아이의 말대로 휘둘리는 것도 수치심이 엄청나다."

[[dialogue]]
speaker = "unk"
original = "けれど俺は……俺は……"
translation = "하지만 나는…… 나는……"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「くふ♪\u3000泣きそうなっちゃって……いい顔ですよ、魔王様<emoji=heart04>」"
translation = "「쿠후♪ 울 것 같은 표정이 돼서는…… 좋은 얼굴이에요, 마왕님♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「さてと。オナニーをしなかったご褒美。いい加減おねだりもうるさいので、あげちゃいましょうか。繋がりましょう？」"
translation = "「자 그럼. 자위하지 않은 것에 대한 보상. 슬슬 조르는 것도 시끄러우니까, 줘 버릴까요. 하나가 되어 볼까요?」"

[[dialogue]]
speaker = "unk"
original = "手に持ったゴムを渡そうとしたが、シャルレーヌはそれより先に──"
translation = "손에 든 콘돔을 건네려 했지만, 샬레느는 그보다 먼저──"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「んんぅう～っ<emoji=heart04>\u3000ふぁ、ぁあっ<emoji=heart04>\u3000全部っ、挿入っちゃったぁ<emoji=heart04>」"
translation = "「응으으으~읏♥ 하아, 아앗♥ 전부, 삽입해 버렸어어♥」"

[[dialogue]]
speaker = "クロト"
original = "「ぐううぅっ――！？」"
translation = "「구우우웃──!?」"

[[dialogue]]
speaker = "unk"
original = "避妊具も装着せずに繋がってしまった。"
translation = "피임 기구도 착용하지 않은 채 이어지고 말았다."

[[dialogue]]
speaker = "unk"
original = "小さい膣穴にペニスが埋まる、ただそれだけで意識が飛ぶほどの快感が押し寄せる。"
translation = "좁은 질 구멍에 자지가 파묻히는, 단지 그것만으로 의식이 날아갈 정도의 쾌감이 밀려온다."

[[dialogue]]
speaker = "unk"
original = "そして竿の中をずりずりと精液が登ってきて──"
translation = "그리고 성기 안을 미끌미끌하며 정액이 타고 올라와서──"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「まさか挿入しただけでイっちゃうわけないですよねぇ？」"
translation = "「설마 삽입한 것만으로 가 버릴 리는 없겠죠?」"

[[dialogue]]
speaker = "クロト"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「もしイっちゃったらどうしましょうか。玩具にする価値もないですし……捨てちゃおっかな？」"
translation = "「만약 가 버린다면 어떻게 할까요. 장난감으로 삼을 가치도 없으니까…… 버려 버릴까나?」"

[[dialogue]]
speaker = "クロト"
original = "「――――――――！？！？」"
translation = "「――――――――!?!?」"

[[dialogue]]
speaker = "unk"
original = "気づいたときには、全力で歯を食いしばっていた。"
translation = "정신을 차렸을 때는, 전력으로 이를 악물고 있었다."

[[dialogue]]
speaker = "unk"
original = "竿の部分を通過しつつあった精液を必死に押しとどめる。"
translation = "성기 부분을 통과하려던 정액을 필사적으로 억누른다."

[[dialogue]]
speaker = "シャルレーヌ"
original = "「くふふふっ<emoji=heart04>\u3000何だかおち○ちんがビクビクしてましたけどぉ……射精はしなかったみたいですね？」"
translation = "「쿠후후훗♥ 왠지 자지가 움찔움찔거렸는데에…… 사정은 하지 않은 모양이네요?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「流石は会長さんです♪\u3000かっこいい<emoji=heart04>\u3000素敵<emoji=heart04>\u3000私、感動しちゃいました♪」"
translation = "「역시 회장님이에요♪ 멋져♥ 근사해♥ 저, 감동해 버렸어요♪」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「私、我慢強い男の人って大好きなんです♪\u3000ですからぁ～……」"
translation = "「저, 참을성 강한 남자를 정말 좋아하거든요♪ 그러니까아~……」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「もっともっと、我慢できるところぉ……見せて<emoji=heart04>\u3000んっしょ、んんぅっ、しょっ<emoji=heart04>」"
translation = "「좀 더 좀 더, 참을 수 있는 모습…… 보여줘♥ 응차, 응으읏, 차아♥」"

[[dialogue]]
speaker = "クロト"
original = "「あぅ、うあ、あぁあっ……！？」"
translation = "「아우, 우아, 아아앗……!?」"

[[dialogue]]
speaker = "unk"
original = "シャルレーヌの膣内がリズミカルに上下を始め、あり得ないほどの締め付けと摩擦が襲いかかってくる。"
translation = "샬레느의 질 내부가 리드미컬하게 상하 운동을 시작하고, 말도 안 될 정도의 조임과 마찰이 엄습해 온다."

[[dialogue]]
speaker = "シャルレーヌ"
original = "「おち○ちんのぉ、つよつよなところ♪\u3000見～せてっ、ほら、ほら、ほらっ♪」"
translation = "「자지의, 강한 모습♪ 보~여줘, 자, 자, 자앗♪」"

[[dialogue]]
speaker = "unk"
original = "まるで我慢させる気のない、情け容赦なしのピストン──"
translation = "마치 참게 할 생각이 없는, 사정없는 피스톤──"

[[dialogue]]
speaker = "クロト"
original = "「ま、待ってくれ、そんなにされたら、出る、出るから、ぁあぁあっ……！」"
translation = "「기, 기다려 줘, 그렇게 하면, 나와, 나오니까, 아아아앗……!」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「え～？\u3000まだぁ、んんっ<emoji=heart04>\u3000何回かぱんぱんしただけじゃないですかぁ<emoji=heart04>\u3000会長さん、そーろーなんですかぁ？」"
translation = "「에~? 아직, 응읏♥ 몇 번 팡팡했을 뿐이잖아요♥ 회장님, 조루인 건가요오♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「限界が来るの早すぎません？\u3000ざぁこ<emoji=heart04>\u3000ざこっ<emoji=heart04>\u3000くそざこっ<emoji=heart04>\u3000女の子に手加減を懇願してぇ、恥ずかしくないんですか？」"
translation = "「한계가 오는 게 너무 빠르지 않아요? 허어접♥ 허접♥ 개허접♥ 여자애한테 살살 해달라고 애원하다니, 부끄럽지 않나요?」"

[[dialogue]]
speaker = "クロト"
original = "「でもっ、だって、ぁ──か、はっ……！」"
translation = "「그치만, 하지만, 아── 카, 학……!」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「シャルレーヌはぁ、まだ附属生になったばかりのー、ちっちゃい女の子なんですよ？」"
translation = "「샬레느는 말이죠, 이제 막 부속생이 된-, 조그만 여자애라구요?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「ほらぁ、体だってこんなに小さいのにぃ……<emoji=heart04>」"
translation = "「봐요, 몸도 이렇게 작은데……♥」"

[[dialogue]]
speaker = "unk"
original = "にやりと笑うシャルレーヌが、バストやヒップを強調するように体をくねらせてアピールしてくる。"
translation = "니긋하게 웃는 샬레느가, 가슴이나 엉덩이를 강조하듯 몸을 비틀며 어필해 온다."

[[dialogue]]
speaker = "unk"
original = "だが小さいのは身長だけだ。"
translation = "하지만 작은 것은 키뿐이다."

[[dialogue]]
speaker = "unk"
original = "形のいい乳房は同年代の子に比べてもずっと大きい。きゅっと括れた腰回りからのヒップラインはすでに女性のそれだ。"
translation = "모양 좋은 유방은 또래 아이들에 비해서도 훨씬 크다. 잘록하게 들어간 허리에서 이어지는 힙 라인은 이미 여느 여성의 그것이다."

[[dialogue]]
speaker = "unk"
original = "アンバランスな魅力に興奮を抑えきれない。"
translation = "언밸런스한 매력에 흥분을 억누를 수 없다."

[[dialogue]]
speaker = "シャルレーヌ"
original = "「会長さん？\u3000すっごいいやらしい視線を感じるんですけどー？\u3000舐め回すように見ないでくれますかぁ？」"
translation = "「회장님? 엄청 야한 시선이 느껴지는데요~? 핥듯이 쳐다보지 말아 줄래요?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「エロすぎるから目が離せない～って顔してる♪\u3000変態<emoji=heart04>\u3000スケベ<emoji=heart04>\u3000おち○ちん、どれだけもじもじさせれば気がすむんですかぁ？」"
translation = "「너무 에로해서 눈을 뗄 수 없어~ 라는 얼굴을 하고 있어♪ 변태♥ 변태♥ 자지, 얼마나 꼼지락거려야 직성이 풀리는 거예요?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「勝手に射精したら許しませんよ？\u3000そしたら会長さんのこと……おトイレにしちゃいますからね？」"
translation = "「멋대로 사정하면 용서하지 않을 거예요? 그러면 회장님…… 화장실로 만들어 버릴 테니까요?」"

[[dialogue]]
speaker = "クロト"
original = "「！？\u3000それは、あ、あんまり、だっ……」"
translation = "「!? 그건, 너, 너무해, 윽……」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「嫌だったら言うこと聞きましょうね？\u3000くすくす<emoji=heart04>」"
translation = "「싫으면 말 잘 들어야겠죠? 쿠스쿠스♥」"

[[dialogue]]
speaker = "クロト"
original = "「はあっ、はぁっ……！\u3000ふう、ふぅうっ、ふーっ！」"
translation = "「하앗, 하아……! 후우, 후우우, 후우!」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「呼吸荒すぎ～っ<emoji=heart04>\u3000気持ち悪～い<emoji=heart04>\u3000はぁはぁ言って……ちんぽ、ビクビクさせて～<emoji=heart04>\u3000この変態<emoji=heart04>\u3000スケベち○ぽ<emoji=heart04>」"
translation = "「호흡이 너무 거칠어~♥ 기분 나빠~♥ 하아하아 거리면서…… 자지, 움찔움찔하게 만들고~♥ 이 변태♥ 변태 자지♥」"

[[dialogue]]
speaker = "unk"
original = "シャルレーヌのような小さな女の子に似つかわしくない淫語が耳に染み込むたび、ぞくぞくと背筋が震える。"
translation = "샬레느 같은 작은 여자애에게 어울리지 않는 음어가 귀에 스며들 때마다, 오싹오싹 등줄기가 떨린다."

[[dialogue]]
speaker = "シャルレーヌ"
original = "「あっ、あっ、あっ、あぁん<emoji=heart04>\u3000おち○ちんおっきい<emoji=heart04>\u3000シャルレーヌのおま○こいっぱいになってるぅ<emoji=heart04>」"
translation = "「앗, 앗, 앗, 아앙♥ 자지 커어♥ 샬레느의 보지 가득 차고 있어어♥」"

[[dialogue]]
speaker = "unk"
original = "わざとらしい甘い喘ぎも俺の情欲を揺さぶる。"
translation = "작위적인 달콤한 신음도 나의 정욕을 뒤흔든다."

[[dialogue]]
speaker = "unk"
original = "興奮と我慢の連続で、指先にも力が入らなくなってきた──"
translation = "흥분과 인내의 연속으로, 손끝에도 힘이 들어가지 않게 되었다──"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「こらぁ、コンドーム落としちゃ駄目ですよ？\u3000必要な時が来たら使うんですから、ちゃあんと大切に持っててください？」"
translation = "「이봐요, 콘돔 떨어뜨리면 안 돼요? 필요할 때가 오면 쓸 거니까, 자알 소중히 갖고 계세요?」"

[[dialogue]]
speaker = "クロト"
original = "「も、もう使ってくれっ……お願いだっ……」"
translation = "「이, 이제 써 줘…… 부탁이다……」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「嫌で～す。ゴムが無い方が気持ちいいんですから。射精前に着ければ問題ないでしょ？」"
translation = "「싫어~요. 고무가 없는 편이 기분 좋으니까요. 사정 전에 끼우면 문제없잖아요?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「それとも会長さんのは、勝手に中出ししちゃう無責任ざこざこおち○ぽなんですぅ～？」"
translation = "「아니면 회장님 거는, 멋대로 질내사정 해버리는 무책임 허접허접 자지인 건가요~?」"

[[dialogue]]
speaker = "クロト"
original = "「ほ、本当に出そうなんだっ……！\u3000早く抜いて、着けてくれっ！」"
translation = "「정, 정말 나올 것 같아……! 빨리 빼서, 끼워 줘!」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「うるさい<emoji=heart04>\u3000お前が出すな<emoji=heart04>\u3000いい？\u3000出・す・な<emoji=heart04>」"
translation = "「시끄러워♥ 너 내지 마♥ 알았어? 내·지·마♥」"

[[dialogue]]
speaker = "クロト"
original = "「ぁあ、ぁああああ…………！！」"
translation = "「아아, 아아아아…………!!」"

[[dialogue]]
speaker = "unk"
original = "『出すな』と命令してくるのに、シャルレーヌは腰の動きを少しも弱めてくれない。"
translation = "『내지 마』라고 명령하면서도, 샬레느는 허리 움직임을 조금도 늦춰주지 않는다."

[[dialogue]]
speaker = "unk"
original = "ひねり、ねじり、膣内にもランダムに圧力をかけてペニスを悦ばせておきながら──"
translation = "비틀고, 꼬고, 질 내부에도 랜덤하게 압력을 가해 자지를 기쁘게 하면서──"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「絶対に出すな<emoji=heart04>\u3000出すな<emoji=heart04>\u3000我慢しろ<emoji=heart04>\u3000ざこち○ぽを甘やかすな<emoji=heart04>\u3000出すな、出すな、出すな<emoji=heart04>」"
translation = "「절대로 내지 마♥ 내지 마♥ 참아♥ 허접 자지를 응석받이로 만들지 마♥ 내지 마, 내지 마, 내지 마♥」"

[[dialogue]]
speaker = "クロト"
original = "「うぅううっ！？」"
translation = "「으으윽!?」"

[[dialogue]]
speaker = "unk"
original = "シャルレーヌがまたリードを引っ張った。"
translation = "샬레느가 다시 리드를 잡아당겼다."

[[dialogue]]
speaker = "unk"
original = "幾度、このひどい行為をされただろう。"
translation = "몇 번이나 이 지독한 행위를 당해온 걸까."

[[dialogue]]
speaker = "unk"
original = "射精を必死で我慢している最中に、息苦しくなるこの感覚は、本当に、本当に――"
translation = "사정을 필사적으로 참고 있는 와중에 숨이 막혀오는 이 감각은, 정말로, 정말로──"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「あはぁっ……<emoji=heart04>\u3000おち○ちん、ビキビキぃ～っ<emoji=heart04>\u3000って硬くなった<emoji=heart04>」"
translation = "「아하앗……♥ 자지, 빳빳~하게♥ 굳어버렸어♥」"

[[dialogue]]
speaker = "unk"
original = "気持ちがいい……！"
translation = "기분이 좋아……!"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「苦しいのが気持ちいいんだぁ<emoji=heart04>\u3000手玉に取られるのが堪らないのねぇ、このド変態<emoji=heart04>\u3000気持ち悪い<emoji=heart04>\u3000マゾ魔王<emoji=heart04>」"
translation = "「괴로운 게 기분 좋은 거구나♥ 손바닥 위에서 놀아나는 게 참을 수 없는 거네, 이 변태 자식♥ 기분 나빠♥ 마조 마왕♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「もっと見せろ<emoji=heart04>\u3000必死に我慢する情けない顔、見せろっ<emoji=heart04>\u3000ほら、ほら、ほらほらほらっ……！」"
translation = "「더 보여줘♥ 필사적으로 참는 한심한 얼굴, 보여달라고♥ 자, 자, 자자자……!」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「んんぁっ、はぁ、んんぅっ<emoji=heart04>\u3000おち○ちん暴れすぎ～<emoji=heart04>\u3000おま○この中でまた膨らんだぁ<emoji=heart04>\u3000やぁん、種付けされちゃう～っ<emoji=heart04>」"
translation = "「응아앗, 하아, 응윽♥ 자지가 너무 날뛰어~♥ 보지 안에서 또 부풀어 올랐어♥ 야안, 씨내리기 당해버려~♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「あぁん、種付けって言ったらまたおち○ちんビクッてしたぁ<emoji=heart04>\u3000会長さんのおち○ちん、正直なんですからぁ～<emoji=heart04>」"
translation = "「아앙, 씨내리기라고 하니까 또 자지가 움찔거렸어♥ 회장님 자지, 정직하다니까요~♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「はぁあぅっ<emoji=heart04>\u3000あ、んんぅ<emoji=heart04>\u3000あ、ぁあん、んんぁ、はぁ、んぁあっ、あぁっ、はぁっ、あんっ、あんっ<emoji=heart04>」"
translation = "「하아윽♥ 아, 응윽♥ 아, 아앙, 응아, 하아, 응앗, 아앗, 하앗, 앙, 앙♥」"

[[dialogue]]
speaker = "クロト"
original = "「っ……ううぅっ……！」"
translation = "「윽…… 으으윽……!」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「ん～、ふふ<emoji=heart04>\u3000会長さんってば涎まで垂らして呻いちゃって……気持ち悪ぅい<emoji=heart04>」"
translation = "「음~, 후후♥ 회장님도 참 침까지 흘리면서 신음하고…… 기분 나빠♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「このまま無責任ぴゅっぴゅでぇ、女の子を孕ませるつもりですかぁ？」"
translation = "「이대로 무책임하게 찍찍 싸서, 여자아이를 임신시킬 생각인가요?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「シャルレーヌのとろとろおま○こにぃ、ぶびゅっ<emoji=heart04>\u3000びゅるびゅるーっ<emoji=heart04>\u3000するつもりなんですかぁ～？」"
translation = "「샬레느의 걸쭉한 보지에, 부븍♥ 부륫부륫~♥ 할 생각인가요~?」"

[[dialogue]]
speaker = "クロト"
original = "「くっ……それは駄目だ、ゴム、着けよう……」"
translation = "「큭…… 그건 안 돼, 고무, 끼우자……」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「それが人にお願いする態度ですかぁ、魔王様？」"
translation = "「그게 남에게 부탁하는 태도인가요, 마왕님?」"

[[dialogue]]
speaker = "クロト"
original = "「しゃ、シャルレーヌ、様っ……どうかゴムを、着けさせてくださいっ……もう我慢、できないんです、出てしまいますっ……！」"
translation = "「샤, 샬레느 님…… 부디 고무를, 끼우게 해주세요…… 이제 참을 수, 없어요, 나와버려요……!」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「──知るか<emoji=heart04>」"
translation = "「──알 바 아냐♥」"

[[dialogue]]
speaker = "クロト"
original = "「そんなっ──本当に、出る、出る出る、出るっ……！？」"
translation = "「그런── 정말로, 나와, 나온다 나온다, 나온다……!?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「うるさいですよ、マゾ魔王様？\u3000私の言うこと、聞けないんですか？」"
translation = "「시끄러워요, 마조 마왕님? 제 말, 못 듣겠나요?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「我慢しろ、我慢しろ、我慢しろっ<emoji=heart04>\u3000射精も我慢できないのっ<emoji=heart04>\u3000できるでしょっ<emoji=heart04>\u3000この変態魔王、マゾ騎士っ<emoji=heart04>」"
translation = "「참아, 참아, 참으라고♥ 사정도 못 참는 거야♥ 할 수 있잖아♥ 이 변태 마왕, 마조 기사♥」"

[[dialogue]]
speaker = "unk"
original = "ペニスにどれだけ力を込めても、もう無理だ。精液を押し返せない。"
translation = "자지에 아무리 힘을 줘도 이제 무리다. 정액을 밀어낼 수 없다."

[[dialogue]]
speaker = "unk"
original = "睾丸が引き攣り、肉棒の内側をずりずりと登ってくる精液の存在を、シャルレーヌも当然気づいていて──"
translation = "고환이 뒤틀리고, 육봉 안쪽을 미끈거리며 올라오는 정액의 존재를 샬레느도 당연히 눈치채고 있어서──"

[[dialogue]]
speaker = "クロト"
original = "「う、うあぁ、あっ、あーっ！\u3000ああぁ、ぁあ、あぁああーっ！」"
translation = "「으, 으아아, 앗, 아앗! 아아아, 아아, 아아아앗!」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「あっははははっ<emoji=heart04>\u3000すっごい声～♪\u3000ばぁか<emoji=heart04>\u3000そのまま情けない顔でイけっ<emoji=heart04>\u3000びゅーしろっ<emoji=heart04>\u3000しろしろっ、しろ～っ<emoji=heart04>」"
translation = "「앗하하하핫♥ 굉장한 목소리~♪ 바보♥ 그대로 한심한 얼굴로 가버려♥ 찍 싸버려♥ 싸라 싸라, 싸버려~♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「んんんんんう～～～ッ<emoji=heart04><emoji=heart04>」"
translation = "「으으으으으음~~~읏♥♥」"

[[dialogue]]
speaker = "unk"
original = "何十分と焦らされたペニスが、文字通り爆発した。"
translation = "몇십 분이나 애태워진 자지가, 말 그대로 폭발했다."

[[dialogue]]
speaker = "unk"
original = "のたうち回るみたいな、吹き散らすような、不様な射精……"
translation = "몸부림치는 듯한, 흩뿌리는 듯한, 꼴사나운 사정……"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「はぁあっ……あぁんっ<emoji=heart04>\u3000出しちゃったぁ……<emoji=heart04>\u3000我慢できなかったんだぁ……ひっどぉい、コンドーム着ける暇もなかったぁ……<emoji=heart04>」"
translation = "「하아앗…… 아앙♥ 싸버렸어……♥ 참지 못했구나…… 너무해, 콘돔 끼울 틈도 없었어……♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「遠慮なさすぎ～……どびゅどびゅ、びゅるびゅるって<emoji=heart04>\u3000おもらしするみたいにぶちまけちゃってぇっ……鬼畜ぅ<emoji=heart04>\u3000さっすが魔王様<emoji=heart04>」"
translation = "「너무 사양을 안 하네~…… 도륫도륫, 부륫부륫 하고♥ 오줌 싸는 것처럼 쏟아버리고…… 귀축♥ 역시 마왕님이야♥」"

[[dialogue]]
speaker = "クロト"
original = "「そ、そんな……うぅ……」"
translation = "「그, 그럴 수가…… 으윽……」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「あぁん、お腹熱いぃ<emoji=heart04>\u3000そんなにちっちゃな女の子を孕ませたいんだぁ～<emoji=heart04>\u3000んんっ……ほんとに会長さんの赤ちゃんできちゃう～<emoji=heart04>」"
translation = "「아앙, 배 안이 뜨거워♥ 그렇게 조그만 여자아이를 임신시키고 싶었던 거구나~♥ 응…… 정말로 회장님 아기가 생겨버려~♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「無責任ぴゅっぴゅするの、さぞかし気持ちいいでしょうねぇ～<emoji=heart04>\u3000くすくすくす<emoji=heart04>」"
translation = "「무책임하게 찍찍 싸는 거, 분명 기분 좋겠죠~♥ 쿠스쿠스쿠스♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「ん……ふー……ふぅうー……ようやく収まった、ところでぇ……おしおきの時間ですよ、魔王様？」"
translation = "「음…… 후우…… 후우우…… 겨우 진정된, 참에…… 벌을 줄 시간이에요, 마왕님?」"

[[dialogue]]
speaker = "クロト"
original = "「え……」"
translation = "「에……」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「私は『射精していい』とは一言も言っていませんよ～？\u3000聞いてませんでしたか、おバカさん♪」"
translation = "「전 『사정해도 좋다』고는 한마디도 안 했거든요~? 안 들렸나요, 바보 씨♪」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「無許可の中出しをした罰。シャルレーヌのっ……おトイレになりなさい<emoji=heart04>\u3000ん、んんぅっ──<emoji=heart04>」"
translation = "「무허가 질내사정을 한 벌. 샬레느의…… 화장실이 되세요♥ 음, 응윽──♥」"

[[dialogue]]
speaker = "クロト"
original = "「う、ぅうう──っ！！」"
translation = "「으, 으으으──윽!!」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「はぁあぁっ、んん、んんぅ、ふぅうっ……<emoji=heart04>」"
translation = "「하아아앗, 응, 응윽, 후우우……♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「き、気持ち、ぃいっ……<emoji=heart04>\u3000んん<emoji=heart04>\u3000会長さんにおしっこ、かけるのっ……最っ高っ<emoji=heart04>\u3000はぁ、あぁああ～～～っ……<emoji=heart04>」"
translation = "「기, 기분, 좋아……♥ 응♥ 회장님한테 오줌, 싸는 거…… 최이이이고♥ 하아, 아아아아~~~앗……♥」"

[[dialogue]]
speaker = "unk"
original = "精液をしとどにぶちまけて、火照り切った体に浴びせられる、シャルレーヌの温かいおしっこ。"
translation = "정액을 흠뻑 쏟아내고, 달아오를 대로 달아오른 몸에 끼얹어지는 샬레느의 따뜻한 오줌."

[[dialogue]]
speaker = "シャルレーヌ"
original = "「ん……は……はぁ<emoji=heart04>\u3000女の子のおトイレにされるの、どんな気持ちですかぁ～？」"
translation = "「음…… 하…… 하아♥ 여자아이의 화장실 취급당하는 거, 어떤 기분인가요~?」"

[[dialogue]]
speaker = "unk"
original = "汗だくの体にシャワーを浴びるみたいな爽快感さえ覚えてしまう……なんでこんなに屈辱的で、気持ちがいいんだ……"
translation = "땀범벅인 몸에 샤워를 하는 듯한 상쾌함마저 느껴버린다…… 왜 이렇게 굴욕적이고, 기분이 좋은 거지……"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「ん、んん……おしっこかけられて、おち○ちん硬くなってるしっ……ほんっと変態なんだから……<emoji=heart04>」"
translation = "「음, 응…… 오줌 세례를 받고 자지가 딱딱해지다니…… 정말 변태라니까……♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「そんななっさけない目で見なくても大丈夫ですよ？\u3000逃がしませんから。もっともっと滅茶苦茶にしてあげます」"
translation = "「그렇게 한심한 눈으로 보지 않아도 괜찮아요? 놓아주지 않을 거니까. 더 더 엉망진창으로 만들어 줄게요.」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「私の、私だけの……魔王様<emoji=heart04>」"
translation = "「나의, 나만의…… 마왕님♥」"

