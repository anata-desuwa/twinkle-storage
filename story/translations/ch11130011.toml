[[dialogue]]
speaker = "unk"
original = "第１話,元星徒会長ジグ,P"
translation = "제1화, 전 성도 회장 지그, P"

[[dialogue]]
speaker = "unk"
original = "かつて流星市国や天界で対峙したリクリエの使徒・ジグ。"
translation = "과거 유성 시국이나 천계에서 대치했던 리크리에의 사도, 지그."

[[dialogue]]
speaker = "unk"
original = "彼女は梨緒の手によって正気を取り戻し、共にリクリエと戦う仲間となった。"
translation = "그녀는 리오의 손에 의해 제정신을 되찾고, 함께 리크리에와 싸우는 동료가 되었다."

[[dialogue]]
speaker = "unk"
original = "今日はジグが星徒会室を訪れる日だ。"
translation = "오늘은 지그가 성도회실을 방문하는 날이다."

[[dialogue]]
speaker = "unk"
original = "ジグを迎える用意をすべく、星徒会室の扉を開けると──"
translation = "지그를 맞이할 준비를 하려고 성도회실 문을 열자──"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「やぁ、いらっしゃい。コーヒー、淹れさせてもらったよ」"
translation = "「안녕, 어서 와. 커피, 내려놨어」"

[[dialogue]]
speaker = "unk"
original = "もういる！？"
translation = "벌써 왔어!?"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「私も<ruby>新星学園<rt>ここ</rt></ruby>の星徒会長だったからね。勝手知ったるというやつさ」"
translation = "「나도 신성 학원의 성도 회장이었으니까. 익숙한 곳이라는 거지」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「魔王もコーヒーどうぞ。コーヒーに合うバウムクーヘンも持ってきたからね」"
translation = "「마왕도 커피 드세요. 커피에 어울리는 바움쿠헨도 가져왔으니까」"

[[dialogue]]
speaker = "unk"
original = "これはどうもご丁寧に……"
translation = "이거 참 고맙게도……"

[[dialogue]]
speaker = "unk"
original = "俺が星徒会長で、ジグが来客のはずなのに、なぜかジグの方が星徒会長然としていた。"
translation = "내가 성도 회장이고, 지그가 손님일 텐데, 왠지 모르게 지그 쪽이 성도 회장처럼 행동하고 있었다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「すまない、ジグを見ていないか？\u3000一緒にここに来るはずだったんだが──」"
translation = "「미안, 지그 못 봤나? 같이 여기에 오기로 했었는데──」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「って、ジグ！？\u3000どうしてここにいる！？」"
translation = "「라고, 지그!? 왜 여기에 있는 거야!?」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「はは。待ち切れなくてね。つい先に来てしまったよ」"
translation = "「하하. 기다릴 수 없어서 말이야. 그만 먼저 와 버렸어」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ジグ～っ！\u3000相変わらず適当だな君は！」"
translation = "「지그~! 여전히 적당하구나 너는!」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「では改めて名乗らせてもらおう。私はレナーテ・<ruby>Ｚ<rt>ジグ</rt></ruby>・サイフリート。出身はドイツ。かつて平行世界ベガで、新星学園の星徒会長をしていた」"
translation = "「그럼 다시 한번 정식으로 이름을 밝히도록 하지. 나는 레나테・Z・자이프리트. 출신은 독일. 과거 평행 세계 베가에서, 신성 학원의 성도 회장을 했었어」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ファーストネームはレナーテだが、ジグの方が慣れているだろうし、ジグで構わないよ」"
translation = "「퍼스트 네임은 레나테지만, 지그 쪽이 익숙할 테니, 지그로 괜찮아」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「君たちも知っての通り、つい先日まで、私は“真なる神の騎士”を名乗り、リクリエの使徒として世界を破滅に導こうとしていた」"
translation = "「너희들도 알고 있듯이, 바로 며칠 전까지, 나는 “진정한 신의 기사”를 자처하며, 리크리에의 사도로서 세계를 파멸로 이끌려고 했었지」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「特に魔王は、私が暴走させてしまったこともあったね。あの時はたくさんの人を傷つけた」"
translation = "「특히 마왕은, 내가 폭주시켜 버린 적도 있었지. 그때는 많은 사람들을 상처 입혔어」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「本当にすまない。全て私の不徳の致すところだ」"
translation = "「정말로 미안해. 모두 나의 부덕의 소치다」"

[[dialogue]]
speaker = "unk"
original = "ジグのせいだと思ってないよ"
translation = "지그 탓이라고 생각 안 해"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ありがとう。そう言ってくれると助かるよ」"
translation = "「고마워. 그렇게 말해 주니 도움이 되는군」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ちなみにサイフリートという姓だが、これは邪竜ファフニールを倒した英雄ジークフリートの読み方の１つでもある」"
translation = "「덧붙여서 자이프리트라는 성은, 이건 사룡 파프니르를 쓰러뜨린 영웅 지크프리트의 읽는 법 중 하나이기도 해」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「その名の通り、私の家はジークフリートの血を引いているらしい」"
translation = "「그 이름대로, 나의 집안은 지크프리트의 피를 잇고 있는 것 같아」"

[[dialogue]]
speaker = "unk"
original = "一族に伝わる能力があるって聞いたけど"
translation = "일족에게 전해지는 능력이 있다고 들었는데"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ああ、そうだ。私の一族の中には、とある能力に目覚める者がいる。それが『天機の星眼』だ」"
translation = "「아아, 그래. 나의 일족 중에는, 어떤 능력에 눈을 뜨는 자가 있어. 그것이 『천기의 성안』이다」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「私の眼は、人や物に秘められた才能や潜在能力──つまりは可能性を見ることができる」"
translation = "「나의 눈은, 사람이나 물건에 숨겨진 재능이나 잠재 능력──즉 가능성을 볼 수 있다」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「この眼でコーヒー豆を見れば、一番美味しい淹れ方もわかるという寸法さ」"
translation = "「이 눈으로 커피콩을 보면, 가장 맛있는 내리는 법도 알 수 있다는 계산이지」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「その眼はそんな可能性まで見えるのか！？」"
translation = "「그 눈은 그런 가능성까지 보이는 거야!?」"

[[dialogue]]
speaker = "unk"
original = "けっこうチートな能力では？"
translation = "꽤 치트 능력 아닌가?"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「あくまで可能性を見ているだけさ。不可能が可能になるような能力じゃないよ」"
translation = "「어디까지나 가능성을 보고 있을 뿐이야. 불가능이 가능하게 되는 그런 능력은 아니지」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「邪竜の血を浴びたジークフリートよりも、養父の裏切りを見抜いたシグルドらしい能力だが……まぁ細かいことは気にしないでくれ」"
translation = "「사룡의 피를 뒤집어쓴 지크프리트보다, 양부의 배신을 간파한 시구르드다운 능력이지만…… 뭐, 사소한 건 신경 쓰지 마」"

[[dialogue]]
speaker = "unk"
original = "わかった"
translation = "알았어"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「これからはアルタイルの新星学園に所属し、星騎士として全身全霊をかけてリクリエと戦うよ」"
translation = "「앞으로는 알타이르의 신성 학원에 소속되어, 성기사로서 전심전력을 다해 리크리에와 싸울 거야」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「これでもベガでは最強の星騎士と呼ばれていた身だ。それなりに頼りにしてくれ」"
translation = "「이래 봬도 베가에서는 최강의 성기사라고 불렸던 몸이다. 나름대로 의지해 줘」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「待った。その言葉はそのまま受け取っていいものなのか？」"
translation = "「잠깐. 그 말은 그대로 받아들여도 괜찮은 건가?」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ん？\u3000どういう意味だい？」"
translation = "「응? 무슨 의미야?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「元々君の言葉は本気かどうかわかりづらかったが、今のは特に白々しく聞こえた」"
translation = "「원래 네 말은 진심인지 아닌지 알기 어려웠지만, 방금은 특히 뻔뻔하게 들렸어」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「思うことがあるなら正直に言ってくれ。彼はそれを話すに足る相手だと思う」"
translation = "「생각하는 바가 있다면 솔직하게 말해 줘. 그는 그것을 이야기할 만한 상대라고 생각해」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「……それもそうだね。ベガでは１人で抱え込んでしまったし」"
translation = "「……그것도 그렇군. 베가에서는 혼자서 끌어안고 말았으니」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「正直に言うと、私は世界を守るための戦いというやつに疲れてしまったんだ」"
translation = "「솔직히 말하자면, 나는 세계를 지키기 위한 싸움이라는 것에 지쳐 버렸어」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「私はこの眼で、ベガの滅びの『<ruby>可能性<rt>みらい</rt></ruby>』を幾度も見た。運命を変えようと努力したが、できなかった」"
translation = "「나는 이 눈으로, 베가의 멸망의 가능성을 몇 번이고 봤다. 운명을 바꾸려고 노력했지만, 할 수 없었지」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「滅びの『<ruby>可能性<rt>みらい</rt></ruby>』を見る度、他の『<ruby>可能性<rt>みらい</rt></ruby>』を見ようとして、また滅びに突き当たった。結果として、数えきれない数の破滅を疑似的に体験してしまった」"
translation = "「멸망의 가능성을 볼 때마다, 다른 가능성을 보려고 했고, 또다시 멸망에 부딪혔어. 결과적으로, 셀 수 없을 만큼 많은 파멸을 유사적으로 체험해 버렸지」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「だから、私の精神は大きく疲弊している。一度折れた心はそう簡単には元には戻らない」"
translation = "「그래서, 나의 정신은 크게 피폐해져 있어. 한번 꺾인 마음은 그렇게 쉽게 원래대로 돌아오지 않아」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「使徒にされた分、償わなければと思うし、私を操っていたリクリエに復讐したいとも思っているが……それが本音だ」"
translation = "「사도로 이용당한 만큼, 속죄해야 한다고 생각하고, 나를 조종했던 리크리에에게 복수하고 싶다고도 생각하지만…… 그게 본심이야」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「もちろん戦いで手を抜くつもりはないけれど、疲れた私なりの本気になってしまうと思う」"
translation = "「물론 싸움에서 대충 할 생각은 없지만, 지친 나 나름의 진심이 되어 버릴 거라고 생각해」"

[[dialogue]]
speaker = "unk"
original = "本音を言ってくれてありがとう"
translation = "본심을 말해줘서 고마워"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「そうやって受け入れられると、安心するような、余計に居心地が悪いような……複雑な気分だよ」"
translation = "「그렇게 받아들여지니, 안심이 되는 것 같기도 하고, 괜히 더 불편한 것 같기도 한…… 복잡한 기분이야」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「なら休め。無理に戦うな」"
translation = "「그럼 쉬어. 무리해서 싸우지 마」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「少なくとも、アルタイルはベガよりも切迫した状況ではない。魔王やフィオナ、アポロがいる」"
translation = "「적어도, 알타이르는 베가보다 절박한 상황은 아니야. 마왕이나 피오나, 아폴로가 있어」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「もし誰かが、君が使徒だった頃の贖罪を求めるなら、私が代わりに戦う。だから君は君のペースで戦えるようになればいい」"
translation = "「만약 누군가가, 네가 사도였을 때의 속죄를 요구한다면, 내가 대신 싸울게. 그러니 너는 너의 페이스로 싸울 수 있게 되면 돼」"

[[dialogue]]
speaker = "unk"
original = "俺もそう思うよ"
translation = "나도 그렇게 생각해"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「……そうだね。焦る必要はないのかもしれない」"
translation = "「……그렇군. 초조해할 필요는 없을지도 모르겠어」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ありがとう、２人とも。お言葉に甘えて、しばし羽を休めさせてもらうよ」"
translation = "「고마워, 두 사람 모두. 호의에 기대어, 잠시 날개를 쉬게 하도록 하지」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「というわけで、リハビリ中でよければよろしく。魔王様」"
translation = "「그런 이유로, 재활 중이라도 괜찮다면 잘 부탁해. 마왕님」"

