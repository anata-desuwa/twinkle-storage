[[dialogue]]
speaker = "unk"
original = "第２話,甘々サンドイッチ,P"
translation = "제2화, 달콤달콤 샌드위치, P"

[[dialogue]]
speaker = "unk"
original = "マグダレナと俺の家で過ごす約束をしていたある休日のこと。彼女を出迎えると――"
translation = "막달레나와 내 집에서 시간을 보내기로 약속했던 어느 휴일의 일. 그녀를 맞이하자──"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「お邪魔しま～す♪」"
translation = "「실례할게요~♪」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「――早速なのですが、会長。実は今日、サプライズを用意してまして……」"
translation = "「──곧바로 본론입니다만, 회장님. 사실 오늘, 서프라이즈를 준비했거든요……」"

[[dialogue]]
speaker_original = "大人ダレナ"
speaker_translation = "성인 다레나"
original = "「じゃ～ん♪\u3000見て下さい、ダブルママダレナですよ～♪」"
translation = "「쨔잔~♪ 보세요, 더블 마마다레나예요~♪」"

[[dialogue]]
speaker = "unk"
original = "えっ、マグダレナが２人！？"
translation = "엣, 막달레나가 두 명!?"

[[dialogue]]
speaker_original = "大人ダレナ"
speaker_translation = "성인 다레나"
original = "「はい♪\u3000実はアニマさまから、新しい薬の実験を頼まれまして――」"
translation = "「네♪ 사실 아니마 님으로부터, 새로운 약의 실험을 부탁받아서──」"

[[dialogue]]
speaker = "unk"
original = "聞けば、魂を２つに分裂させるという『分裂薬』を飲んだことで、２つのアバターを同時に動かすことが可能になったのだという。"
translation = "들어보니, 영혼을 둘로 분열시킨다는 『분열약』을 마신 덕분에, 두 아바타를 동시에 움직이는 것이 가능해졌다고 한다."

[[dialogue]]
speaker_original = "大人ダレナ"
speaker_translation = "성인 다레나"
original = "「――アニマさま、またとんでもないものを作ったって？\u3000ふふっ、私も驚いてしまいました」"
translation = "「──아니마 님, 또 엄청난 걸 만드셨다고요? 후훗, 저도 깜짝 놀랐답니다」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「でも、分裂薬を作ろうと思ったのは、会長が新星学園に通いながらも、附属校にもまた通えるようにできたらと考えたからみたいですよ？」"
translation = "「하지만, 분열약을 만들려고 생각하신 건, 회장님이 신성학원에 다니면서도 부속 학교에도 다시 다닐 수 있게 되면 좋겠다고 생각하셨기 때문인 것 같아요」"

[[dialogue]]
speaker = "unk"
original = "ならちゃんと、後でお礼を伝えないとな"
translation = "그럼 나중에 꼭 감사를 전해야겠네."

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「はい♪\u3000私もまた、会長と附属校に通うことができたら、とても嬉しいです♪」"
translation = "「네♪ 저도 다시 회장님과 부속 학교에 다닐 수 있게 된다면, 정말 기쁠 거예요♪」"

[[dialogue]]
speaker_original = "大人ダレナ"
speaker_translation = "성인 다레나"
original = "「それで、とりあえずこうして、分裂することに成功したわけですし――」"
translation = "「그래서, 일단 이렇게 분열하는 데 성공했으니──」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「せっかくですから今日は、私たち２人で、会長を甘やかしちゃいますね♪」"
translation = "「모처럼이니까 오늘은, 저희 둘이서 회장님을 듬뿍 예뻐해 드릴게요♪」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「ふふっ、まずはこうして両側から抱き着いて挟んじゃいます♪」"
translation = "「후훗, 우선은 이렇게 양옆에서 매달려 끼워버릴게요♪」"

[[dialogue]]
speaker_original = "大人ダレナ"
speaker_translation = "성인 다레나"
original = "「ママダレナサンドイッチですね♪」"
translation = "「마마다레나 샌드위치네요♪」"

[[dialogue]]
speaker = "unk"
original = "う、腕が別のものにも挟まれて……！"
translation = "으, 팔이 다른 것들에도 끼어서……!"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「ふふっ、会長、体が固くなってますよ<emoji=heart04>\u3000緊張しちゃいましたか？」"
translation = "「후훗, 회장님, 몸이 굳어있어요<emoji=heart04> 긴장하셨나요?」"

[[dialogue]]
speaker_original = "大人ダレナ"
speaker_translation = "성인 다레나"
original = "「もっと肩の力を抜いて、リラックスして下さい」"
translation = "「좀 더 어깨의 힘을 빼고, 편히 쉬세요.」"

[[dialogue]]
speaker_original = "大人ダレナ"
speaker_translation = "성인 다레나"
original = "「会長さまにはもっと、心を許して欲しいのです。私たちは、恋人なのですから……」"
translation = "「회장님께는 좀 더, 마음을 열어주셨으면 해요. 저희는 연인이니까요……」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「会長……ちゅっ……<emoji=heart04>」"
translation = "「회장님…… 쪽……<emoji=heart04>」"

[[dialogue]]
speaker_original = "大人ダレナ"
speaker_translation = "성인 다레나"
original = "「私もしちゃいます<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「저도 할래요<emoji=heart04> 쪽……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「ちゅっ……ちゅっ……<emoji=heart04>」"
translation = "「쪽…… 쪽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "２人から、何度もキスをされる。"
translation = "두 사람에게서 몇 번이고 키스를 받는다."

[[dialogue]]
speaker = "unk"
original = "き、今日のマグダレナ、すごく大胆……！"
translation = "오, 오늘 막달레나, 엄청 대담해……!"

[[dialogue]]
speaker_original = "大人ダレナ"
speaker_translation = "성인 다레나"
original = "「んっ……そうかもしれません……<emoji=heart04>\u3000もしかすると、これがアニマさまが言っていた、分裂薬の副作用なのかも<emoji=heart04>\u3000効果には個人差があるそうですが……」"
translation = "「응…… 그럴지도 모르겠네요……<emoji=heart04> 어쩌면 이게 아니마 님이 말씀하신 분열약의 부작용일지도<emoji=heart04> 효과에는 개인차가 있다고 하셨는데……」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「会長を見ていると、愛おしい気持ちが溢れてきて、止められなくなってしまう感じです……<emoji=heart04>」"
translation = "「회장님을 보고 있으면, 사랑스러운 마음이 넘쳐흘러서 멈출 수 없게 되는 느낌이에요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "大人ダレナ"
speaker_translation = "성인 다레나"
original = "「いつもは自分からキスをしようとするのは恥ずかしくなってしまうのですが……今はもっと、したくなっちゃいます」"
translation = "「평소에는 먼저 키스하려고 하면 부끄러워지곤 했는데…… 지금은 더 하고 싶어져요.」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「好きです、会長……<emoji=heart04>」"
translation = "「좋아해요, 회장님……<emoji=heart04>」"

[[dialogue]]
speaker_original = "大人ダレナ"
speaker_translation = "성인 다레나"
original = "「たとえリクリエとの戦いが終わっても、あなたのそばから離れるなんて考えられないくらい、愛しています……<emoji=heart04>」"
translation = "「설령 리크리에와의 싸움이 끝나더라도, 당신 곁을 떠나는 건 생각할 수 없을 정도로 사랑해요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「あっ……いま、すごく面白いことを考えちゃいました。もう１人の私、耳を貸して下さい……こしょこしょ」"
translation = "「앗…… 지금 아주 재미있는 생각이 났어요. 또 다른 나, 귀 좀 빌려주세요…… 소곤소곤」"

[[dialogue]]
speaker_original = "大人ダレナ"
speaker_translation = "성인 다레나"
original = "「ふむふむ……まあ<emoji=heart04>\u3000それは、試してみたくてドキドキしてしまいますね♪」"
translation = "「흐음흐음…… 어머나<emoji=heart04> 그건 시험해 보고 싶어서 두근거려 버리네요♪」"

[[dialogue]]
speaker = "unk"
original = "２人とも、一体何を話して……？"
translation = "둘 다 대체 무슨 얘기를……?"

[[dialogue]]
speaker = "unk"
original = "何度もキスされた余韻で、ちょっと思考がぼーっとなってしまう中、聞き返すと――"
translation = "반복된 키스의 여운으로 생각이 조금 멍해진 가운데 되묻자──"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「会長、ちょっと体勢を変えますね～……はい♪」"
translation = "「회장님, 자세를 좀 바꿀게요~…… 자♪」"

[[dialogue]]
speaker_original = "大人ダレナ"
speaker_translation = "성인 다레나"
original = "「大きい方の私は後ろから、こうやって会長さまを抱き締めて……<emoji=heart04>」"
translation = "「큰 쪽의 저는 뒤에서 이렇게 회장님을 껴안고……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「小さい方の私は、会長の膝の上に乗って、前から抱き着いちゃいます<emoji=heart04>」"
translation = "「작은 쪽의 저는 회장님 무릎 위에 앉아서, 앞에서 껴안아 버릴게요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "前からも柔らかい感触がきて、体が一気に熱くなる。"
translation = "앞에서도 부드러운 감촉이 전해져와서, 몸이 단숨에 뜨거워진다."

[[dialogue]]
speaker_original = "大人ダレナ"
speaker_translation = "성인 다레나"
original = "「前に聞いたことのある言葉から引用して……名付けて、『だいしゅきダブルホールド』です<emoji=heart04>」"
translation = "「예전에 들은 적 있는 말에서 인용해서…… 이름하여, 『정말 좋아 더블 홀드』예요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ぐっ……ぐああぁぁっ！！？"
translation = "윽…… 으아아아아악!!?"

[[dialogue]]
speaker = "unk"
original = "これまで想像したこともない、前後から大きくて柔らかい感触に挟まれたサンドイッチ。男でこの破壊力に堪えられる者がいるのだろうか。"
translation = "지금껏 상상조차 해본 적 없는, 앞뒤로 크고 부드러운 감촉에 끼인 샌드위치. 남자로서 이 파괴력을 견뎌낼 수 있는 자가 있을까."

[[dialogue]]
speaker_original = "大人ダレナ"
speaker_translation = "성인 다레나"
original = "「あっ……ふふっ♪\u3000会長さまの心臓がすごくドキドキしているのが伝わってきます<emoji=heart04>」"
translation = "「앗…… 후훗♪ 회장님의 심장이 엄청 두근거리고 있는 게 전해져 와요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺がそれ以上我慢ができずに思わず、目の前の小さいマグダレナの体を強く抱き締めてしまう。"
translation = "내가 그 이상 참지 못하고 무심코 눈앞의 작은 막달레나의 몸을 강하게 껴안아 버린다."

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「って、あっ、会長……<emoji=heart04>」"
translation = "「어라, 앗, 회장님……<emoji=heart04>」"

[[dialogue]]
speaker_original = "大人ダレナ"
speaker_translation = "성인 다레나"
original = "「少し、やり過ぎてしまいましたかね……<emoji=heart04>」"
translation = "「조금, 지나쳤을까요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "これ以上は色々と限界です"
translation = "이 이상은 여러모로 한계입니다."

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「いいですよ～……<emoji=heart04>\u3000いっぱい甘えて下さい。恋人として、ちゃんと責任をもって受け止めますから<emoji=heart04>」"
translation = "「괜찮아요~……<emoji=heart04> 듬뿍 어리광 부리세요. 연인으로서 제대로 책임지고 받아낼 테니까요<emoji=heart04>」"

[[dialogue]]
speaker_original = "大人ダレナ"
speaker_translation = "성인 다레나"
original = "「ただ、小さい私だけじゃなくて、大きい私もちゃんと相手して下さいね<emoji=heart04>」"
translation = "「다만, 작은 저뿐만 아니라 큰 저도 제대로 상대해 주셔야 해요<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ×２"
speaker_translation = "막달레나×2"
original = "「ん……ちゅっ<emoji=heart04>」"
translation = "「응…… 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はそのまま、何も考えられなくなってしまうくらい２人との甘々な時間に溺れてしてしまうのだった――"
translation = "나는 그대로 아무것도 생각할 수 없게 될 정도로 두 사람과의 달콤한 시간에 빠져버리고 말았다──"

