[[dialogue]]
speaker = "unk"
original = "第３話,サチのマイブーム,P"
translation = "제3화, 사치의 마이 붐, P"

[[dialogue]]
speaker = "unk"
original = "その日は、サチが放課後に個人的な用事があるとのことで、会わない予定だった。"
translation = "그날은, 사치가 방과 후에 개인적인 용무가 있다고 해서, 만나지 않을 예정이었다."

[[dialogue]]
speaker = "unk"
original = "しかし、俺が星徒会の買い出しで街に出ていると、偶然サチの姿を見かけた。"
translation = "하지만, 내가 성도회의 장보기를 위해 거리로 나갔다가, 우연히 사치의 모습을 발견했다."

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "（学園の生徒には見られてませんよね……？）"
translation = "(학원 학생들에게 들키지는 않았겠죠……?)"

[[dialogue]]
speaker = "unk"
original = "きょろきょろと周囲を見回し、どこか落ち着かない様子のサチ。"
translation = "두리번두리번 주위를 둘러보며, 어딘가 안절부절못하는 모습의 사치."

[[dialogue]]
speaker = "unk"
original = "（サチ、なんの用事だろう……？）"
translation = "(사치, 무슨 용무지……?)"

[[dialogue]]
speaker = "unk"
original = "気になった俺は、少し距離を取って彼女の後を追ってみることにした。"
translation = "궁금해진 나는, 조금 거리를 두고 그녀의 뒤를 쫓아 보기로 했다."

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ふふっ……♪」"
translation = "「후훗……♪」"

[[dialogue]]
speaker = "unk"
original = "家電量販店から出てきたサチは、どこか上機嫌だ。"
translation = "가전 양판점에서 나온 사치는, 어딘가 기분이 좋아 보인다."

[[dialogue]]
speaker = "unk"
original = "俺は意を決して声をかける。"
translation = "나는 결심을 하고 말을 건다."

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ひゃっ！？\u3000お、お兄さん！？\u3000どうしてここに……！？」"
translation = "「히익!? 오, 오빠!? 어째서 여기에……!?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「――星徒会の買い出し？\u3000な、なるほど……」"
translation = "「――성도회의 장보기? 그, 그렇군요……」"

[[dialogue]]
speaker = "unk"
original = "サチ、ごめん。実は――"
translation = "사치, 미안. 사실은――"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「えっ！？\u3000ずっと見てたんですか！？\u3000お、お兄さん、エッチですよ……！」"
translation = "「엣!? 계속 보고 있었나요!? 오, 오빠, 변태예요……!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「――挙動不審だったから気になった？\u3000そ、それは……」"
translation = "「――거동이 수상해서 신경 쓰였다고요? 그, 그건……」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ちょっと恥ずかしくて……お兄さんや学園のみんなには、知られたくなかったというか……」"
translation = "「좀 부끄러워서…… 오빠나 학원 모두에게는, 들키고 싶지 않았달까……」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「その……実は……買ってたのは、魔法少女アニメの……」"
translation = "「그…… 사실은…… 사고 있었던 건, 마법 소녀 애니메이션의……」"

[[dialogue]]
speaker = "unk"
original = "そう言って、サチはおずおずと袋の中身を見せてくる。"
translation = "그렇게 말하며, 사치는 머뭇머뭇 봉투 안의 내용물을 보여준다."

[[dialogue]]
speaker = "unk"
original = "入っていたのは、魔法少女アニメの光って鳴る変身アイテムのおもちゃだった。"
translation = "들어있던 것은 마법 소녀 애니메이션의 빛나며 소리가 나는 변신 아이템 장난감이었다."

[[dialogue]]
speaker = "unk"
original = "サチ、そういうのが好きだったのか"
translation = "사치, 그런 걸 좋아했던 건가"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「いえ……前は正直、私自身が『魔法少女』って言われることに少し抵抗があったので、なんとなく観るのを避けていたんです」"
translation = "「아니요…… 전에는 솔직히, 제 자신이 『마법 소녀』라고 불리는 것에 조금 거부감이 있어서, 왠지 모르게 보는 걸 피했었어요」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「でも、この前リコリンちゃんに『考え方を変えたら上手くいくかも』って言われて……今までなんとなく避けていた他のことも、見直してみようかと思って」"
translation = "「하지만, 요전에 리코린 짱에게 『생각을 바꾸면 잘 풀릴지도 몰라』라는 말을 듣고…… 지금까지 왠지 모르게 피해 왔던 다른 것들도, 다시 한번 살펴볼까 해서요」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「星騎士としての力の使い方も、もしかしたら発想が狭かったものがあるかもしれないって思って……それで、知見を広げてみようと」"
translation = "「성기사로서의 힘을 쓰는 법도, 어쩌면 발상이 좁았던 부분이 있을지도 모른다고 생각해서…… 그래서, 견문을 넓혀보려고요」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「でも、今放送中の魔法少女モノを観始めたら……ドハマりしてしまって……」"
translation = "「그런데, 지금 방송 중인 마법 소녀물을 보기 시작했더니…… 푹 빠져버려서……」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ぐ、グッズが欲しくなって……買いに来ちゃったんです」"
translation = "「구, 굿즈가 갖고 싶어져서…… 사러 와버린 거예요」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「子供っぽいかもって思って、お兄さんには言えませんでした……恥ずかしいですし、彼女として幻滅されたらどうしようって……」"
translation = "「어린애 같을지도 모른다고 생각해서, 오빠에게는 말할 수 없었어요…… 부끄럽기도 하고, 여자친구로서 환멸하시면 어쩌나 싶어서……」"

[[dialogue]]
speaker = "unk"
original = "俺は首を横に振る。"
translation = "나는 고개를 가로저었다."

[[dialogue]]
speaker = "unk"
original = "大丈夫だ、むしろ可愛いと思った"
translation = "괜찮아, 오히려 귀엽다고 생각했어"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「か、可愛い……！？\u3000はうぅ……<emoji=heart04>」"
translation = "「귀, 귀엽다니……!? 하우으……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「え？\u3000――今度、お兄さんの家に遊びに行ったとき、一緒にアニメを……？」"
translation = "「에? ――다음에 오빠네 집에 놀러 갔을 때, 같이 애니메이션을……?」"

[[dialogue]]
speaker = "unk"
original = "後日。"
translation = "며칠 뒤."

[[dialogue]]
speaker = "unk"
original = "週末にサチが家に遊びに来て、一緒にアニメを観ることになった。"
translation = "주말에 사치가 집에 놀러 와서, 함께 애니메이션을 보게 되었다."

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「それで、お兄さん……第１話を観てみて、どうでしょうか？」"
translation = "「그래서, 오빠…… 제1화를 봐보시니, 어떠신가요?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「私的には、子供向けに作られているのに、物語がすごく丁寧で……キャラも魅力的だと思っていて――」"
translation = "「제 개인적으로는, 어린아이용으로 만들어졌는데도 이야기가 무척 정중하고…… 캐릭터도 매력적이라고 생각해서――」"

[[dialogue]]
speaker = "unk"
original = "変身シーン、すごくよかった"
translation = "변신 장면, 무척 좋았어"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「そうなんです！\u3000私、この第１話を観たとき、なんだか感動してしまって……」"
translation = "「맞아요! 저, 이 제1화를 봤을 때, 왠지 감동해버려서……」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「それで、変身アイテムのグッズがどうしても欲しくなっちゃって……<emoji=heart04>」"
translation = "「그래서 변신 아이템 굿즈가 도저히 갖고 싶어져 버려서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「あの……お兄さん。私の趣味に付き合って頂いて、ありがとうございます」"
translation = "「저기…… 오빠. 제 취미에 함께해 주셔서 감사해요」"

[[dialogue]]
speaker = "unk"
original = "いや、俺の方が付き合いたかったんだ"
translation = "아니, 내가 같이 하고 싶었던 거야"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「え？\u3000――好きな人と趣味を共有するのは、きっと楽しいだろうなって思ったから……ですか？」"
translation = "「에? ――사랑하는 사람과 취미를 공유하는 건 분명 즐거울 거라고 생각했으니까…… 인가요?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「そうですね……私も――」"
translation = "「그렇네요…… 저도――」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「こうしてお兄さんと好きなものを共有できて、すごく嬉しいです♪」"
translation = "「이렇게 오빠와 좋아하는 것을 공유할 수 있어서 정말 기뻐요♪」"

[[dialogue]]
speaker = "unk"
original = "柔らかく微笑むサチが愛しくて、俺はそっと彼女の手を握る。"
translation = "부드럽게 미소 짓는 사치가 사랑스러워서, 나는 살며시 그녀의 손을 잡았다."

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ん……えへへ<emoji=heart04>」"
translation = "「응…… 에헤헤<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "照れくさそうにしながらも、サチは手を握り返し、肩を寄せてくる。"
translation = "부끄러워하면서도 사치는 손을 맞잡고 어깨를 기대온다."

[[dialogue]]
speaker = "unk"
original = "俺たちはそのままアニメの続きを観ながら、穏やかな２人の時間を過ごすのだった。"
translation = "우리들은 그대로 애니메이션 다음 편을 보면서, 평온한 둘만의 시간을 보내는 것이었다."

