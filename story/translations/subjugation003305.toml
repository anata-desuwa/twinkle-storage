[[dialogue]]
speaker = "ナターシャ"
original = "「酷い目に遭った……」"
translation = "「끔찍한 일을 당했어……」"

[[dialogue]]
speaker = "アポロ"
original = "「あはは、オーバーだなぁ。カブトムシはロマンなんだぞ？」"
translation = "「아하하, 과장이 심하네. 장수풍뎅이는 로망이라구?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ついつい遊び過ぎちゃったね。本来の目的、ちょっぴり忘れちゃってたかも」"
translation = "「어느새 너무 놀아버렸네요. 본래 목적을 조금 잊어버렸을지도」"

[[dialogue]]
speaker = "梨緒"
original = "「焦ることはない。リゾートも満喫して、その上でクリアもする。それでこそ新星星徒会に完全勝利したと言えるはずだ」"
translation = "「조급해할 것 없다. 리조트도 만끽하고, 그 위에 클리어도 한다. 그래야말로 신성 성도회에 완전 승리했다고 할 수 있느니라」"

[[dialogue]]
speaker = "ナターシャ"
original = "「それにサバイバルでキツいのはここからだよ？\u3000そろそろ食糧調達や、<ruby>薪<rt>まき</rt></ruby>集めに動いた方がいいんじゃない？」"
translation = "「게다가 서바이벌에서 힘든 건 이제부터야. 슬슬 식량 조달이나 장작 줍기를 시작하는 게 좋지 않겠어?」"

[[dialogue]]
speaker = "アポロ"
original = "「野営の準備ってヤツか？\u3000そーいうのやってみたかったんだ！」"
translation = "「야영 준비라는 건가? 그런 거 해보고 싶었어!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ふふ、ならせっかくだし、寝床は海の家を使わずビーチに作ろっか」"
translation = "「후후, 그럼 이왕 하는 김에 잠자리는 바다의 집을 쓰지 말고 해변에 만들까요?」"

[[dialogue]]
speaker = "梨緒"
original = "「賛成だ。見通しがいい分、モンスターの奇襲も避けられる」"
translation = "「찬성이다. 시야가 확보되는 만큼 몬스터의 기습도 피할 수 있느니라」"

[[dialogue]]
speaker = "ナターシャ"
original = "「んじゃ日が暮れる前に行動開始といきますか」"
translation = "「그럼 해가 지기 전에 행동을 개시해 볼까」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ぷはっ。お魚いっぱい獲れたよ～！」"
translation = "「푸하. 물고기 많이 잡았어요~!」"

[[dialogue]]
speaker = "アポロ"
original = "「泳ぎ上手になったじゃねーか。素潜りでそれだけ魚を獲れるなんて大したもんだ」"
translation = "「수영 실력이 늘었잖아. 맨몸 잠수로 그만큼 물고기를 잡다니 대단한걸」"

[[dialogue]]
speaker = "ベアトリス"
original = "「えへへ、みんなのおかげだよ。海で鬼ごっことか潜水勝負とか色々遊んでくれたから」"
translation = "「에헤헤, 모두 덕분이에요. 바다에서 술래잡기나 잠수 시합 같은 걸로 같이 놀아줬으니까요」"

[[dialogue]]
speaker = "ナターシャ"
original = "「意外と訓練になってるのかもね。私もさっきのビーチバレーでコツを掴んだ気がするし」"
translation = "「의외로 훈련이 되고 있는지도 모르겠네. 나도 아까 비치발리볼에서 감을 잡은 것 같고」"

[[dialogue]]
speaker = "梨緒"
original = "「何事も無駄じゃないということだな」"
translation = "「어떤 일이든 헛된 것은 없다는 뜻이군」"

[[dialogue]]
speaker = "アポロ"
original = "「あたしの方は……おっと、竿に引きが来た。木の枝の竿でも、なかなか釣れるもんだな」"
translation = "「내 쪽은…… 오호, 낚싯대에 입질이 왔다. 나뭇가지 낚싯대라도 꽤 잘 낚이는걸」"

[[dialogue]]
speaker = "アポロ"
original = "「おっしゃ、１１匹目っ！\u3000釣り勝負はまたあたしのリードだな、梨緒っ！」"
translation = "「좋았어, 11마리째! 낚시 승부는 다시 내가 리드다, 리오!」"

[[dialogue]]
speaker = "梨緒"
original = "「なんの、私も竿がしなってる。まだまだ追いつけるぞっ！」"
translation = "「천만에, 내 낚싯대도 휘어지고 있느니라. 아직 따라잡을 수 있어!」"

[[dialogue]]
speaker = "ナターシャ"
original = "「やれやれ、いったい何匹釣るつもりなのやら……」"
translation = "「이런 이런, 대체 몇 마리나 낚을 셈인지……」"

[[dialogue]]
speaker = "ナターシャ"
original = "「寝床はこれでよし、と。枝葉で作った簡易的なテントだけど十分でしょ」"
translation = "「잠자리는 이걸로 됐고. 나뭇가지와 잎으로 만든 간이 텐트지만 충분하겠지」"

[[dialogue]]
speaker = "ナターシャ"
original = "「飲み水も確保しないとね。とりあえずヤシの実は採れるだけ採っておいたけど」"
translation = "「마실 물도 확보해야겠네. 일단 야자열매는 딸 수 있는 만큼 따뒀지만」"

[[dialogue]]
speaker = "ベアトリス"
original = "「水ならあっちに綺麗な川があったよ。煮沸が必要だから、飲めるのは火の準備ができてからになるけど」"
translation = "「물이라면 저쪽에 깨끗한 강이 있었어요. 끓여야 하니까 마시는 건 불 준비가 끝난 뒤에야 가능하겠지만요」"

[[dialogue]]
speaker = "アポロ"
original = "「にしてもテキパキしてるな……。みんな、こういうの慣れてるのか？」"
translation = "「그나저나 다들 능숙하네……. 다들 이런 거 익숙한 거야?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「これでも魔界を旅したこともあるから」"
translation = "「이래 봬도 마계를 여행한 적도 있으니까요」"

[[dialogue]]
speaker = "ナターシャ"
original = "「サバイバル訓練は一通り受けているからね」"
translation = "「서바이벌 훈련은 한 차례 받았으니까」"

[[dialogue]]
speaker = "梨緒"
original = "「私もガールスカウトで幾度かキャンプをした経験があるんだ」"
translation = "「나도 걸스카우트에서 몇 번 캠핑을 했던 경험이 있느니라」"

[[dialogue]]
speaker = "アポロ"
original = "「へ～、すごいな！\u3000あたしはこーいうの初めてだからな！\u3000色々と教えてくれ！」"
translation = "「헤~, 대단한걸! 나는 이런 거 처음이라 말이야! 여러 가지 가르쳐 줘!」"

[[dialogue]]
speaker = "ナターシャ"
original = "「もちろんいいよ。薪の選び方は、なるべく乾いているものを──ひぃええぇっ！？」"
translation = "「물론이지. 장작을 고를 때는 가급적 마른 것을── 히이이익!?」"

[[dialogue]]
speaker = "梨緒"
original = "「どうしたんだ、素っ頓狂な声を上げて？」"
translation = "「왜 그러느냐, 뚱딴지같은 소리를 지르고?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「むむむ、虫がっ！\u3000枯れ木の中からうねうねした気持ち悪いものがぁ！」"
translation = "「버, 벌레가! 고목 속에서 꿈틀거리는 징그러운 게!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「なんだ、幼虫じゃない。摘まんでポイっとすればいいよ」"
translation = "「뭐야, 애벌레잖아요. 집어서 던져버리면 돼요」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ひぃ！？\u3000ベ、ベアト、そういうの大丈夫なの？」"
translation = "「히익!? 베, 베아트, 그런 거 괜찮은 거야?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「魔界の洞窟で暮らしてた時は、もっと毒々しい生き物たちとご近所付き合いしてたからね」"
translation = "「마계 동굴에서 살 때는 훨씬 독하게 생긴 생물들과 이웃 사촌으로 지냈으니까요」"

[[dialogue]]
speaker = "ナターシャ"
original = "「もっと毒々しいって……。想像するだけでも──うぷっ」"
translation = "「훨씬 독하다니…… 상상만 해도── 우웁」"

[[dialogue]]
speaker = "ナターシャ"
original = "「……私、ちょっと潮風を浴びてくるよ。少し休みたい……」"
translation = "「……나, 잠깐 바닷바람 좀 쐬고 올게. 좀 쉬고 싶어……」"

[[dialogue]]
speaker = "梨緒"
original = "「あ、ああ……ゆっくりするといい」"
translation = "「아, 아아…… 푹 쉬도록 해라」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ひぃあああっ！！？」"
translation = "「히야아아악!!?」"

[[dialogue]]
speaker = "梨緒"
original = "「今度はどうした！？」"
translation = "「이번엔 또 왜 그러느냐!?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「い、岩にキモいのがっ。大量にモゾモゾしたものがぁ～！」"
translation = "「바, 바위에 징그러운 게. 잔뜩 꿈물거리는 게에~!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ホントだ。人間界にもこういう生き物いるんだね～」"
translation = "「정말이네. 인간계에도 이런 생물이 있군요~」"

[[dialogue]]
speaker = "ナターシャ"
original = "「何を平然と……！？」"
translation = "「어떻게 그렇게 태연할 수가……!?」"

[[dialogue]]
speaker = "アポロ"
original = "「んん、フナムシじゃねーか。これもダメなのか？」"
translation = "「음, 갯강구잖아. 이것도 안 되는 거냐?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「きゃああああっ！？\u3000何を鷲づかみにしてんのっ！？\u3000お願いだから、こっちに持ってこないでぇ～！？」"
translation = "「꺄아아악!? 그걸 왜 맨손으로 잡는 거야!? 제발 부탁이니까 이쪽으로 가져오지 마~!」"

[[dialogue]]
speaker = "ナターシャ"
original = "「私、人間界でサバイバルするの向いてないかもしれない……聖庭園に命令されたら辞表出すかも……」"
translation = "「나, 인간계에서 서바이벌 하는 거 안 맞을지도 몰라…… 성정원에서 명령 내려오면 사표 쓸지도……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「よしよし、私の膝で良ければいくらでも枕にしてくれていいからね」"
translation = "「착하지 착해, 제 무릎이라도 괜찮다면 얼마든지 베개로 써도 돼요」"

[[dialogue]]
speaker = "アポロ"
original = "「元気出せよ、ナターシャ。ほら魚が焼けたぞ、一番おっきいのくれてやる」"
translation = "「기운 내라구, 나타샤. 자, 생선 다 구워졌다, 제일 큰 걸로 주지」"

[[dialogue]]
speaker = "梨緒"
original = "「ハーブを探して摘んでおいた。たき火にくべれば虫除けになるはずだ」"
translation = "「허브를 찾아서 따왔느니라. 모닥불에 넣으면 벌레 퇴치가 될 것이다」"

[[dialogue]]
speaker = "ナターシャ"
original = "「うぅ、みんな逞しいね。私、ここまで自分が軟弱だとは思ってなかったよ……」"
translation = "「으으, 다들 씩씩하네. 나, 여기까지 내가 연약할 줄은 몰랐어……」"

[[dialogue]]
speaker = "梨緒"
original = "「まあまあ。誰しも苦手なものの１つや２つある」"
translation = "「뭐 어떠냐. 누구나 못하는 것 한두 가지는 있는 법이다」"

[[dialogue]]
speaker = "アポロ"
original = "「でもいい１日だったなぁ～。今日は知らなかったみんなの一面をたくさん見た気がするぜ」"
translation = "「그래도 좋은 하루였어~. 오늘은 몰랐던 다들의 일면을 잔뜩 본 기분이라구」"

[[dialogue]]
speaker = "ベアトリス"
original = "「そうだね。キャンプが得意だったり、虫が苦手だったり、以外な面を知れたよ」"
translation = "「맞아요. 캠핑을 잘하거나, 벌레를 싫어하거나, 의외의 면을 알게 됐네요」"

[[dialogue]]
speaker = "ナターシャ"
original = "「一応サバイバルだけどね。けど、まぁ確かに、なんだかんだ楽しい１日だったか。散々な目に遭ったけど……」"
translation = "「일단 서바이벌이긴 하지만. 뭐, 확실히 이런저런 즐거운 하루였나. 끔찍한 일도 겪었지만……」"

[[dialogue]]
speaker = "梨緒"
original = "「私も楽しかったよ。選管のみんなで旅行でもとは常々考えていたんだ。ずっと戦い続きで暇がなかったがな」"
translation = "「나도 즐거웠느니라. 선관 멤버들과 여행이라도 가고 싶다고 늘 생각했었지. 계속 싸움이 이어져서 틈이 없었지만 말이다」"

[[dialogue]]
speaker = "アポロ"
original = "「暇がないのは、梨緒がいっつも魔王やジグに勝負を仕掛けてるからだろー？」"
translation = "「틈이 없는 건, 리오가 맨날 마왕이나 지그한테 승부를 걸어서 그런 거 아냐?」"

[[dialogue]]
speaker = "梨緒"
original = "「うっ」"
translation = "「윽」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ふふ、だね。少しは私たちにも時間を使ってくれればいいのに」"
translation = "「후후, 그렇네요. 조금은 우리한테도 시간을 써주면 좋을 텐데」"

[[dialogue]]
speaker = "ナターシャ"
original = "「私はどっちでもいいけど。でも誘われたら行くかな。選管の絆？\u3000ってやつも深めたいし」"
translation = "「난 어느 쪽이든 상관없지만. 그래도 권유받으면 갈까나. 선관의 유대? 라는 것도 깊게 다지고 싶고」"

[[dialogue]]
speaker = "梨緒"
original = "「わ、私だって深めたいと思っているぞっ。大切な仲間との絆をっ！」"
translation = "「나, 나라고 안 다지고 싶은 게 아니니라! 소중한 동료와의 유대를!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「なら今度は梨緒ちゃんのお部屋でお泊まり会でもしちゃう？」"
translation = "「그럼 다음엔 리오짱 방에서 파자마 파티라도 할까요?」"

[[dialogue]]
speaker = "アポロ"
original = "「お、いいな、それ！\u3000パジャマパーティーってやつかっ！」"
translation = "「오, 좋은데 그거! 파자마 파티라는 건가!」"

[[dialogue]]
speaker = "ナターシャ"
original = "「部屋は綺麗なんだよね？\u3000もしも虫が湧くような部屋なら……」"
translation = "「방은 깨끗하겠지? 혹시라도 벌레가 나오는 방이라면……」"

[[dialogue]]
speaker = "梨緒"
original = "「失礼なことを言うな！\u3000というか勝手に決めて──……ふふ、まぁ構わないか」"
translation = "「실례되는 소리 하지 마라! 그보다 마음대로 정하긴──…… 후후, 뭐 상관없나」"

[[dialogue]]
speaker = "アポロ"
original = "「そうと決まればちゃっちゃとクリアしちまおうぜ！\u3000そして梨緒の部屋で祝勝会だ！」"
translation = "「그렇게 정해졌으면 후다닥 클리어해 버리자구! 그리고 리오의 방에서 축승회다!」"

[[dialogue]]
speaker = "ナターシャ"
original = "「虫はもうコリゴリだしね。明日中にクリアしちゃおうよ」"
translation = "「벌레는 이제 지긋지긋하니까. 내일 안으로 클리어해 버리자」"

[[dialogue]]
speaker = "ベアトリス"
original = "「私たちなら楽勝だよ♪\u3000たっぷり遊んで、英気も養ったし♪」"
translation = "「우리라면 낙승이에요♪ 듬뿍 놀고 원기도 회복했으니까요♪」"

[[dialogue]]
speaker = "梨緒"
original = "「選挙管理委員の本領発揮だ。私たちの絆の強さを証明してやろう！」"
translation = "「선거관리위원의 본때를 보여주마. 우리의 유대가 얼마나 강한지 증명해 보이겠느니라!」"

