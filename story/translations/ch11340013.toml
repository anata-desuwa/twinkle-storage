[[dialogue]]
speaker = "unk"
original = "第３話,１０年ぶりの……,P"
translation = "제3화, 10년 만의……, P"

[[dialogue]]
speaker = "unk"
original = "最近、グレイスと一緒に過ごす日々が増えている。"
translation = "최근 그레이스와 함께 지내는 날이 늘고 있다."

[[dialogue]]
speaker = "unk"
original = "彼女は一見すると能天気で賑やかな魔族の少女だけれど……先日のエステルとの一件以来、ナイーブな一面もあることを知った。"
translation = "그녀는 겉보기엔 태평하고 시끌벅적한 마족 소녀지만…… 지난번 에스텔과의 일 이후로 나이브한 면도 있다는 걸 알게 되었다."

[[dialogue]]
speaker = "unk"
original = "彼女に惹かれ始めていた俺は、少しでもグレイスに喜んでもらえることはないかと考えるようになり──"
translation = "그녀에게 끌리기 시작한 나는 조금이라도 그레이스가 기뻐할 만한 일이 없을까 생각하게 되었고──"

[[dialogue]]
speaker = "グレイス"
original = "「むふふふ～♪\u3000サランさんからワッフルをいただいちゃいました。魔王さんもお１ついかがですか？」"
translation = "「무후후후~♪ 사란 선배한테 와플을 받았어요. 마왕 씨도 하나 어떠세요?」"

[[dialogue]]
speaker = "グレイス"
original = "「……あれ？\u3000どうかしましたか、真面目なお顔ですね」"
translation = "「……어라? 무슨 일인가요, 진지한 표정이네요」"

[[dialogue]]
speaker = "unk"
original = "グレイス、明日の予定は空いてる？"
translation = "그레이스, 내일 예정 비어 있어?"

[[dialogue]]
speaker = "グレイス"
original = "「はい、空いてますよ！\u3000何か美味しいものでも食べに行くんですか？\u3000だったら──」"
translation = "「네, 비어 있어요! 뭐 맛있는 거라도 먹으러 가나요? 그렇다면──」"

[[dialogue]]
speaker = "unk"
original = "明日、君の両親がここに来る"
translation = "내일, 네 부모님이 여기 와."

[[dialogue]]
speaker = "グレイス"
original = "「えっ……！？」"
translation = "「엣……!?」"

[[dialogue]]
speaker = "unk"
original = "君さえよかったら、会ってみないか？"
translation = "너만 괜찮다면 만나보지 않을래?"

[[dialogue]]
speaker = "グレイス"
original = "「…………それは」"
translation = "「…………그건」"

[[dialogue]]
speaker = "unk"
original = "翌日の放課後──"
translation = "다음 날 방과 후──"

[[dialogue]]
speaker = "アナ"
original = "「オベロニア夫妻が今、受付を終えたとの連絡が。すぐにここに到着するはずです」"
translation = "「오베로니아 부부가 지금 접수를 마쳤다는 연락이 왔습니다. 곧 이곳에 도착할 겁니다」"

[[dialogue]]
speaker = "マトイ"
original = "「……本当に会わなくていいの、グレイスちゃん？」"
translation = "「……정말 안 만나도 되겠어, 그레이스짱?」"

[[dialogue]]
speaker = "グレイス"
original = "「い、いいですっ。物陰から見るだけで……大丈夫です……」"
translation = "「괘, 괜찮아요. 숨어서 보는 것만으로도…… 충분해요……」"

[[dialogue]]
speaker = "グレイス"
original = "「……っ！！」"
translation = "「……윽!!」"

[[dialogue]]
speaker = "アナ"
original = "「どうぞ──お入りください」"
translation = "「어서 오세요── 들어오시죠」"

[[dialogue]]
speaker = "アナ"
original = "「初めまして。オベロニアさん。新星星徒会へようこそ」"
translation = "「처음 뵙겠습니다. 오베로니아 씨. 신성 성도회에 오신 걸 환영합니다」"

[[dialogue]]
speaker = "グレイスの父"
original = "「お忙しいところをすみません。失礼いたします」"
translation = "「바쁘신 와중에 실례하겠습니다」"

[[dialogue]]
speaker = "グレイスの母"
original = "「貴方が緋宮クロト様ですね。星徒会長としてのご活躍は、かねがね──」"
translation = "「당신이 히노미야 쿠로토 님이시군요. 성도회장으로서의 활약은 익히──」"

[[dialogue]]
speaker = "グレイス"
original = "「お父さん……お母さん……」"
translation = "「아빠…… 엄마……」"

[[dialogue]]
speaker = "グレイス"
original = "「……………………生きてます」"
translation = "「……………………살아계셔요」"

[[dialogue]]
speaker = "unk"
original = "平行世界人は、１つの世界において、同一存在が同時に意識を保つことはできない。"
translation = "평행세계인은 한 세계에서 동일 존재가 동시에 의식을 유지할 수 없다."

[[dialogue]]
speaker = "unk"
original = "『アルタイルのグレイス』は、チナやエステルと同じく昏倒しており、現在は流星市国の病院に入院中だ。"
translation = "『알타이르의 그레이스』는 치나나 에스텔처럼 혼수상태이며, 현재는 유성시국의 병원에 입원 중이다."

[[dialogue]]
speaker = "unk"
original = "平行世界のトラブルにまつわる昏倒のため、学園側が入院の手続きなどを取った結果、オベロニア夫妻からお礼を言いたいとの連絡を受けていたのだ。"
translation = "평행세계 문제로 인한 혼수상태라 학원 측에서 입원 절차 등을 밟은 결과, 오베로니아 부부로부터 감사를 표하고 싶다는 연락을 받았던 것이다."

[[dialogue]]
speaker = "unk"
original = "ならば学園に呼べば、１０年ぶりの再会となる。グレイスはきっと喜んでくれると思っていたのだけれど──"
translation = "그렇다면 학원에 부르면 10년 만의 재회가 된다. 그레이스가 분명 기뻐할 거라 생각했지만──"

[[dialogue]]
speaker = "グレイス"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "グレイスは結局、両親の顔を眺めるだけで、決して物影から出ようとしないのだった──"
translation = "그레이스는 결국 부모님의 얼굴을 바라볼 뿐, 결코 숨은 곳에서 나오려 하지 않았다──"

[[dialogue]]
speaker = "アナ"
original = "「──グレイスさん。ご両親が、お帰りになりましたよ」"
translation = "「──그레이스 씨. 부모님이 돌아가셨어요」"

[[dialogue]]
speaker = "グレイス"
original = "「……ふぅ。緊張しました！」"
translation = "「……후우. 긴장했어요!」"

[[dialogue]]
speaker = "マトイ"
original = "「落ち着いてて、優しい人達だったね」"
translation = "「차분하고 다정한 분들이었네」"

[[dialogue]]
speaker = "グレイス"
original = "「ふふふ。自慢の両親ですから！\u3000あと、やっぱり確信しました。私はお母さん似だと！」"
translation = "「후후후. 자랑스러운 부모님이니까요! 그리고 역시 확신했어요. 저는 엄마를 닮았다고요!」"

[[dialogue]]
speaker = "アナ"
original = "「そうですね。外見はお母様に似ていました」"
translation = "「그렇네요. 외모는 어머니를 닮으셨더군요」"

[[dialogue]]
speaker = "マトイ"
original = "「性格の方は、見た目通りの大人しい人だったから……ちょっと違うかも？\u3000あはは」"
translation = "「성격 쪽은 겉보기대로 얌전한 분들이라…… 좀 다를지도? 아하하」"

[[dialogue]]
speaker = "グレイス"
original = "「そ、そんなぁっ！？」"
translation = "「그, 그럴 수가!?」"

[[dialogue]]
speaker = "unk"
original = "──余計なお節介、だったかな？"
translation = "──괜한 참견이었을까?"

[[dialogue]]
speaker = "unk"
original = "（……明るくふるまってる感じだ）"
translation = "(……밝게 행동하려는 느낌이다)"

[[dialogue]]
speaker = "グレイス"
original = "「……いいえ、そんなことないですっ！\u3000魔王さんの申し出はすごくありがたかったですよ！」"
translation = "「……아니요, 그렇지 않아요! 마왕 씨의 제안은 정말 감사했다고요!」"

[[dialogue]]
speaker = "グレイス"
original = "「１０年ぶりです。元気なお父さんとお母さんを見ることができた──それだけで十分です！」"
translation = "「10년 만이에요. 건강한 아빠랑 엄마를 볼 수 있었던 것── 그것만으로 충분해요!」"

[[dialogue]]
speaker = "グレイス"
original = "「私が名乗る時は……全てを終えた時。リクリエを跳ねのけて、世界が平和になったその時にしますから。今は大丈夫です！」"
translation = "「제가 이름을 밝히는 건…… 모든 게 끝났을 때. 리크리에를 물리치고 세계가 평화로워졌을 때로 할게요. 지금은 괜찮아요!」"

[[dialogue]]
speaker = "unk"
original = "……そうか"
translation = "……그래."

[[dialogue]]
speaker = "アナ"
original = "「それにしても今日は貴重な話がたくさん聞けました。やはり平行世界間では大筋、同じようなことが起こるようですね」"
translation = "「그건 그렇고 오늘은 귀중한 이야기를 많이 들었네요. 역시 평행세계 간에는 큰 틀에서 비슷한 일이 일어나는 모양이군요」"

[[dialogue]]
speaker = "アナ"
original = "「まあ、『同じ人物が、同じタイミングで、同じようなことを考えた』となれば、出来事が似通るのは当然のことですが」"
translation = "「뭐, 『같은 인물이 같은 타이밍에 같은 생각을 했다』면 사건이 비슷해지는 건 당연한 일이지만요」"

[[dialogue]]
speaker = "マトイ"
original = "「ね。デネブで１０年前に起きた、子供グレイスちゃんの潜入捜査……実はアルタイルでも起こってただなんて」"
translation = "「그치. 데네브에서 10년 전에 일어난 꼬마 그레이스짱의 잠입 수사…… 사실 알타이르에서도 일어났었다니」"

[[dialogue]]
speaker = "unk"
original = "ただ、アルタイル固有の現象もある、か……"
translation = "다만 알타이르 고유의 현상도 있다는 건가……"

[[dialogue]]
speaker = "グレイス"
original = "「お母さん、世間話をする時にいつも私のやらかしエピソードを喋るんです。困ったものです」"
translation = "「엄마는 세상 사는 이야기할 때 꼭 제 실수 에피소드를 말씀하신다니까요. 곤란해요 정말」"

[[dialogue]]
speaker = "マトイ"
original = "「それはグレイスちゃんがいつも周りを振り回してるからじゃあ……？」"
translation = "「그건 그레이스짱이 항상 주변을 휘두르고 다녀서 그런 거 아냐……?」"

[[dialogue]]
speaker = "unk"
original = "アルタイルで起きたグレイスの潜入は、開始１分で終わったらしい。"
translation = "알타이르에서 일어난 그레이스의 잠입은 시작 1분 만에 끝났다고 한다."

[[dialogue]]
speaker = "unk"
original = "見咎めたのは──セイファート学園長。"
translation = "발견한 것은── 세이파트 학원장."

[[dialogue]]
speaker = "unk"
original = "彼が見つけて、ご両親に引き渡したらしい……だから俺たち星徒会役員も、グレイスのことを知らなかった──"
translation = "그가 발견해서 부모님께 인계했다고 한다…… 그래서 우리 성도회 임원들도 그레이스에 대해 몰랐던 것이다──"

[[dialogue]]
speaker = "unk"
original = "その日の夜──"
translation = "그날 밤──"

[[dialogue]]
speaker = "グレイス"
original = "（本当は会いたかった。顔を見せて、名前を名乗って……平行世界人ではあるけれど、実の娘だと言いたかったです……）"
translation = "(사실은 만나고 싶었어요. 얼굴을 보여주고 이름을 밝히고…… 평행세계인이긴 하지만 친딸이라고 말하고 싶었어요……)"

[[dialogue]]
speaker = "チナ"
original = "「なんかあったのかグレイス。今日はやけに静かだな？」"
translation = "「무슨 일 있냐 그레이스. 오늘따라 왜 이렇게 조용해?」"

[[dialogue]]
speaker = "グレイス"
original = "（でも……チナも先日、街で偶然ご両親に会ったと。その時に、名乗らずにごまかしたって聞きました……）"
translation = "(하지만…… 치나도 얼마 전에 거리에서 우연히 부모님을 만났다고. 그때 이름을 밝히지 않고 얼버무렸다고 들었어요……)"

[[dialogue]]
speaker = "グレイス"
original = "（だったら私だけ先に再会を果たしちゃうのは……チナに悪いですからねっ）"
translation = "(그렇다면 나만 먼저 재회를 해버리는 건…… 치나한테 미안하니까요!)"

[[dialogue]]
speaker = "チナ"
original = "「グレイス、調子でも悪いのか……？」"
translation = "「그레이스, 몸이라도 안 좋은 거냐……?」"

[[dialogue]]
speaker = "グレイス"
original = "「──いいえ！\u3000今日の夕食は何だろうって考えてました！」"
translation = "「──아니요! 오늘 저녁 메뉴가 뭘까 생각하고 있었어요!」"

[[dialogue]]
speaker = "チナ"
original = "「はぁああ……！\u3000お前ってやつは、ほんっと能天気だよなぁ。心配して損した」"
translation = "「하아아……! 너란 녀석은 정말이지 태평하다니까. 걱정한 내가 손해지」"

[[dialogue]]
speaker = "グレイス"
original = "「なにおう～っ！？」"
translation = "「뭐라구요~!?」"

[[dialogue]]
speaker = "グレイス"
original = "（お父さん、お母さん。全てが終わったら──その時にまた会いましょう！）"
translation = "(아빠, 엄마. 모든 게 끝나면── 그때 다시 만나요!)"

