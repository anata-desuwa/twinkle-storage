[[dialogue]]
speaker = "unk"
original = "第３話,二人きりの勉強会,P"
translation = "제3화, 둘만의 공부 모임"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「はぁぁぁ……」"
translation = "「하아아아……」"

[[dialogue]]
speaker = "unk"
original = "廊下でばったり出くわした美鶴は、なんだか憂鬱そうだった。"
translation = "복도에서 우연히 마주친 미츠루는 왠지 우울해 보였다."

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「え……悩み？\u3000誰も気づかなかったのに、よく分かったね。うち、いつもやる気なさげな顔してるから、平常運転と思われてたよ」"
translation = "「에…… 고민? 아무도 눈치 못 챘는데 잘도 알았네. 나, 평소에 의욕 없는 얼굴이라 다들 평소랑 같다고 생각하던데.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「や、憂鬱なのはさ……もうじき、定期テストじゃん」"
translation = "「아니, 우울한 건 말이지…… 이제 곧 정기 테스트잖아.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「頭悪いから、また赤点かな……補習はやだ……服作る時間も減っちゃうし……はぁぁ……」"
translation = "「머리가 나빠서 또 낙제점일까 봐…… 보충 수업은 싫어…… 옷 만들 시간도 줄어들고…… 하아아…….」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「なんでか勉強できるみたいに思われてるけど、正直すごく苦手。魔界じゃ学校に通ってなかったから、やり方もよく分かんなくって……」"
translation = "「어째선지 공부 잘할 것처럼 보이나 본데 솔직히 정말 못해. 마계에선 학교에 안 다녔으니까 방법도 잘 모르겠고……」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「授業も全然ついてけてないから、もっと分かりやすく教えてほしいんだけど、先生に聞きに行くのもなんか悪いし」"
translation = "「수업도 전혀 못 따라가고 있어서 더 알기 쉽게 가르쳐줬으면 좋겠는데, 선생님한테 물으러 가는 것도 왠지 죄송해서.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「あ、そうだ。会長さんって、成績良いんだよね」"
translation = "「아, 맞다. 회장님은 성적 좋지.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「良かったらだけど、勉強教えてくれない？\u3000ちゃんとお礼はするから。ね」"
translation = "「괜찮다면 공부 좀 가르쳐주지 않을래? 제대로 사례는 할 테니까. 응?」"

[[dialogue]]
speaker = "unk"
original = "約束を交わして、次の週末。美鶴を招いての勉強会。"
translation = "약속을 나누고 다음 주말. 미츠루를 초대해 공부 모임을 가졌다."

[[dialogue]]
speaker = "unk"
original = "星徒会室や図書館も提案したのだけど、本人のたっての希望で俺の家となった。"
translation = "성도회실이나 도서관도 제안했지만 본인의 간곡한 희망으로 우리 집이 되었다."

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「お邪魔しまーす。ここに会長さん住んでるんだ。ふーん。へー」"
translation = "「실례하겠습니다. 여기에 회장님이 사는구나. 흐응. 헤에.」"

[[dialogue]]
speaker = "unk"
original = "早速だけど前の解答用紙、見せてくれる？"
translation = "곧장 저번 답안지 좀 보여줄래?"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「う。お手柔らかにお願い」"
translation = "「윽. 살살 부탁해.」"

[[dialogue]]
speaker = "unk"
original = "渋々差し出された採点済みの解答用紙を確認すると、○より×が圧倒的に多い。全部赤点だ。"
translation = "마지못해 내민 채점된 답안지를 확인하니 동그라미보다 빗금이 압도적으로 많다. 전부 낙제점이다."

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「可哀想な子を見る目じゃん……うちが頭悪いのは分かってるって」"
translation = "「불쌍한 애를 보는 눈이네…… 내가 머리 나쁜 건 알고 있다니까.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「難しい服を作れるんだから、地頭はいい？\u3000……そう？\u3000そんなこと言ってくれたの、会長さんが初めて」"
translation = "「어려운 옷을 만들 수 있으니까 머리는 좋다? ……그래? 그런 말 해준 건 회장님이 처음이야.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「でも、国語も数学も全然ダメ。なんで数字の中にＸとかＹなんて英語が混ざってるのかもさっぱり」"
translation = "「하지만 국어도 수학도 전혀 꽝이야. 왜 숫자 안에 X나 Y 같은 영어가 섞여 있는 건지 도통 모르겠어.」"

[[dialogue]]
speaker = "unk"
original = "得意なものに置き換えると、分かりやすいかも"
translation = "자신 있는 분야로 바꿔 생각하면 쉬울지도 몰라"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「うちが得意って言うと……服作り？\u3000そんなことできるわけ──あ、数字をサイズに置き換えて……頭の中に型紙を広げるイメージにしたら」"
translation = "「내가 자신 있는 거라면…… 옷 만들기? 그런 게 가능할 리가── 아, 숫자를 사이즈로 치환해서…… 머릿속에 형지를 펼치는 이미지로 만든다면.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「Ｘが５の場合、Ｙが７になるから、サイズがぴったりになる……あ、そーゆーこと？」"
translation = "「X가 5인 경우, Y가 7이 되니까 사이즈가 딱 맞게 돼…… 아, 그런 소리야?」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「次の問題も、Ｘの軸を身長、Ｙの軸を肩幅に見立てれば……あー、あー、分かった。これなら解ける」"
translation = "「다음 문제도 X축을 신장, Y축을 어깨너비로 비유하면…… 아, 아, 알았다. 이거라면 풀 수 있어.」"

[[dialogue]]
speaker = "unk"
original = "美鶴の独特な感性はちょっと伝わってこなかったけど、俺のアドバイスは解決の糸口になったみたいだ。"
translation = "미츠루의 독특한 감성은 잘 와닿지 않았지만 내 조언이 해결의 실마리가 된 모양이다."

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「ん、隣に会長さんがいてくれると、すごく捗る。いつもは部屋でひとりで勉強してるんだけど。服のアイデアって勉強してる時に限って降りてくるじゃん」"
translation = "「응, 옆에 회장님이 있어 주니까 아주 잘 돼. 평소에는 방에서 혼자 공부하는데 옷 아이디어는 꼭 공부할 때만 떠오르잖아.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「１回、気ぃ取られちゃったらもうダメ。勉強そっちのけになっちゃって、気がつけば朝になってたり」"
translation = "「한 번 정신 팔리면 이제 끝장이야. 공부는 뒷전이 되고 정신 차려보면 아침이 되어 있기도 하고.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「うちと一緒に勉強してくれる子もいないからね。うちみたいなダメ子ちゃんと一緒だと迷惑かけちゃうし──って、会長さんにも迷惑かけてるよね。ごめん」"
translation = "「나랑 같이 공부할 친구도 없으니까. 나 같은 부족한 애랑 같이 있으면 민폐가 될 테고── 앗, 회장님한테도 민폐 끼치고 있지. 미안.」"

[[dialogue]]
speaker = "unk"
original = "わからないところは、いくらでも聞いてよ"
translation = "모르는 부분은 얼마든지 물어봐"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「そーゆーもの？\u3000迷惑じゃないならいろいろ聞くね」"
translation = "「그런 거야? 민폐가 아니라면 이것저것 물어볼게.」"

[[dialogue]]
speaker = "unk"
original = "服作りに打ち込める集中力を、勉強の方に向けられれば、勝機はありそうに思えた。"
translation = "옷 만들기에 쏟는 집중력을 공부 쪽으로 돌릴 수만 있다면 승산이 있어 보였다."

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「歴史の年号も数字だし。縦横の幅を組み合わせてイメージすれば覚えられそう。縦７センチ×横１０センチみたいな」"
translation = "「역사 연도도 숫자고. 가로세로 폭을 조합해서 이미지하면 외울 수 있을 것 같아. 세로 7cm x 가로 10cm 같은 식으로.」"

[[dialogue]]
speaker = "unk"
original = "覚え方は万人が真似できない独特なものだったけど、計算や暗記問題は集中することである程度解決した。"
translation = "암기법은 남들이 따라 할 수 없는 독특한 것이었지만 계산이나 암기 문제는 집중함으로써 어느 정도 해결되었다."

[[dialogue]]
speaker = "unk"
original = "しかし、躓いたのは国語の文章問題だ。"
translation = "하지만 발목을 잡은 건 국어 지문 문제였다."

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「『傍線の箇所における登場人物の感情にふさわしいものを、以下の正しいものから選べ』……う」"
translation = "「『밑줄 친 부분에 나타난 등장인물의 감정으로 적절한 것을 다음 중 고르시오』…… 우.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「や、こーゆー問題、苦手。ここに出てくる人の感情なんて分からなくない？\u3000顔だって見えてないし」"
translation = "「아니, 이런 문제 질색이야. 여기 나오는 사람 기분 같은 걸 어떻게 알아? 얼굴도 안 보이는데.」"

[[dialogue]]
speaker = "unk"
original = "理解できなくて大丈夫。全部書いてあるよ"
translation = "이해하지 못해도 괜찮아. 다 쓰여 있어"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「え、でも……あ、ここ？『妻の形見を失い、悲しみに打ちひしがれた男』……悲しいなら『絶望』でＯＫ？」"
translation = "「에, 하지만…… 아, 여기? 『아내의 유품을 잃고 슬픔에 잠긴 남자』…… 슬프다면 『절망』이면 오케이?」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「やった、合ってた。テストの問題って、そーゆーものなんだ。出てくる人の気持ちを全部分からなきゃ解けないって思ってた」"
translation = "「해냈다, 맞았어. 시험 문제라는 건 그런 거구나. 나오는 사람 기분을 전부 이해해야 풀 수 있는 줄 알았어.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「……あ。もしかしてなんだけど、これってリアルでも同じだったりする？\u3000最初は相手の気持ちが理解できてなくてもだいじょぶなんかな」"
translation = "「……아. 혹시 말인데 이거 현실에서도 마찬가지인 걸까? 처음엔 상대방 기분을 이해 못 해도 괜찮은 걸까.」"

[[dialogue]]
speaker = "unk"
original = "大丈夫だよ。段々と分かるようになるから"
translation = "괜찮아. 서서히 알게 될 테니까"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「……そーなんだ。みんな最初っから仲良さそうに話してるから、相手の気持ちが分かってるのかとばっかし」"
translation = "「……그렇구나. 다들 처음부터 친하게 말하길래 상대방 기분을 다 알고 있는 줄로만 알았어.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「そーだよね。最初はちょっとビビってた会長さんのことも、今はちょっとだけ分かった気がするし」"
translation = "「그렇지. 처음엔 좀 겁먹었던 회장님에 대해서도 지금은 아주 조금은 알 것 같은 기분이 들고.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「はー……これ、今日、教えてもらったことの中で、一番大事なことかも。ありがと、会長さん」"
translation = "「하아…… 이거 오늘 배운 것 중에서 제일 중요한 걸지도 몰라. 고마워, 회장님.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「ん、手始めにメイド隊のみんなに話しかけてみるかな……でも、今よりもっと仲良くなりたい人が、他にできちゃったし」"
translation = "「응, 우선 메이드대 모두에게 말을 걸어볼까…… 하지만 지금보다 더 친해지고 싶은 사람이 따로 생겨버렸고.」"

[[dialogue]]
speaker = "unk"
original = "そうなんだ。その人と仲良くなれると良いね"
translation = "그렇구나. 그 사람이랑 친해지면 좋겠네"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「うん。ふふ♪」"
translation = "「응. 후후♪」"

[[dialogue]]
speaker = "unk"
original = "その後も、美鶴の勉強はとても捗った。"
translation = "그 후로도 미츠루의 공부는 아주 순조롭게 진행되었다."

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「それで会長さん、ここの問題なんだけどさ」"
translation = "「그래서 회장님, 이 문제 말인데.」"

[[dialogue]]
speaker = "unk"
original = "だんだんと俺との距離が近づいてきたのは、問題が解けるようになって、勉強に夢中になってたせいに違いない。"
translation = "점점 나와의 거리가 가까워진 건 문제가 풀리게 되어 공부에 열중했기 때문임이 틀림없었다."

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「あ、会長さん」"
translation = "「아, 회장님.」"

[[dialogue]]
speaker = "unk"
original = "定期テストはどうだった？"
translation = "정기 테스트는 어땠어?"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「ふふ、全教科赤点回避できた。ありがと。おかげで授業も前より分かるようになったよ。ちょっとだけね」"
translation = "「후후, 전 과목 낙제 면했어. 고마워. 덕분에 수업도 전보다 이해가 잘 돼. 아주 조금이지만.」"

[[dialogue]]
speaker = "unk"
original = "さすがに一朝一夕で成績が跳ね上がるとまではいかなかったが、美鶴のテスト結果はいつもより少し良くなったらしい。"
translation = "단기간에 성적이 비약적으로 상승한 것까지는 아니었지만 미츠루의 테스트 결과는 평소보다 조금 더 좋아진 모양이다."

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「まだ１人でしてると、ついついサボっちゃいそうだから。次のテスト勉強も、見てくれない？」"
translation = "「아직 혼자 하면 자꾸 딴짓할 것 같으니까 다음 시험 공부도 봐주지 않을래?」"

[[dialogue]]
speaker = "unk"
original = "向上心も見受けられるし、ほんの少しでも勉強の楽しさを理解できたなら教えた甲斐があったというものだった。"
translation = "상승심도 보이고 공부의 즐거움을 아주 조금이라도 이해했다면 가르친 보람이 있는 일이었다."

