[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「奇遇なことに私もウェディングフォームが発現してしまったんだ。だから結婚式の神官役を引き受けることは出来ない」"
translation = "「기묘하게도 나에게도 웨딩 폼이 발현되어 버렸다네. 그래서 결혼식의 신관 역할을 맡을 수는 없어.」"

[[dialogue]]
speaker = "unk"
original = "まさかジュエリーもウェディングフォームに……"
translation = "설마 주얼리도 웨딩 폼으로……."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「確かにそれでは神官役は難しいですね……」"
translation = "「확실히 그러면 신관 역할은 어렵겠네요……」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「ああ、自身が花嫁になってしまっては、たとえふりでも神官として結婚を見届けることは出来ないよ」"
translation = "「아아, 자신이 신부가 되어버려서는 비록 시늉이라 해도 신관으로서 결혼을 지켜볼 수는 없지.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「事の経緯を説明しようか。トワ先生はこの式場で、ウェディングフォームを発現させる、ウェディング因子というものについて調査していた」"
translation = "「사건의 경위를 설명할까. 토와 선생님은 이 식장에서, 웨딩 폼을 발현시키는 웨딩 인자라는 것에 대해 조사하고 계셨네.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「それに随行させてもらっていたところ、それが突然活性化してしまってね。その光を全身に浴びてしまったんだ」"
translation = "「그 일에 동행하던 중, 그것이 갑자기 활성화되어서 말이야. 그 빛을 온몸에 뒤집어쓰고 말았지.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「するとまばゆい光と共にウェディングフォームが発現し、他のフォームに切り替えられなくなってしまったというわけさ」"
translation = "「그러자 눈부신 빛과 함께 웨딩 폼이 발현되어, 다른 폼으로 전환할 수 없게 되어버린 셈이네.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「これはこれで素晴らしいが……助手との愛の結晶であるエクリプスフォームになれないのは問題だ」"
translation = "「이건 이것대로 훌륭하지만…… 조수와의 사랑의 결실인 에클립스 폼이 될 수 없는 건 문제야.」"

[[dialogue]]
speaker = "unk"
original = "もしかしてジュエリーの相談って……"
translation = "혹시 주얼리의 상담이라는 게……."

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「そういうことだよ」"
translation = "「그 말대로라네.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ウェディング因子……ジュエリーさんはそれを浴びた影響でウェディングフォームになったのですよね？」"
translation = "「웨딩 인자…… 주얼리 씨는 그걸 뒤집어쓴 영향으로 웨딩 폼이 된 거군요?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ですが私はどうしてなのでしょう？\u3000私はそういったものは浴びていないと思うのですが……」"
translation = "「하지만 저는 어째서일까요? 저는 그런 걸 뒤집어쓰지 않았다고 생각하는데요……」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「イレーナさんは、フィオナ会長やトワ先生のウェディングフォームを解除するために、結婚式の神官役として関わり続けてきただろう？」"
translation = "「이레이나 양은 피오나 회장이나 토와 선생님의 웨딩 폼을 해제하기 위해, 결혼식의 신관 역할로서 계속 관여해왔지 않나?」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「そこでずっとこの因子を浴び続けてきたからではないかな？\u3000それが蓄積していった結果、ついに発現するに至った……そういう事だろう」"
translation = "「거기서 계속 이 인자를 쬐어왔기 때문이 아닐까? 그것이 축적된 결과, 마침내 발현되기에 이르렀다…… 그런 거겠지.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「な、なるほど……」"
translation = "「과, 과연……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "（何それ、怖……）"
translation = "(뭐야 그거, 무서워……)"

[[dialogue]]
speaker = "unk"
original = "ところで２人は知り合い？"
translation = "그런데 두 사람 아는 사이야?"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「おや、何故そう考えたのかな？」"
translation = "「오야, 어째서 그렇게 생각했지?」"

[[dialogue]]
speaker = "unk"
original = "お互いに初めましての挨拶が無かった"
translation = "서로 처음 뵙겠다는 인사가 없었어."

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「ほう、良い着眼だ。探偵助手としての成長が見られて私は嬉しいよ」"
translation = "「호오, 좋은 착안이다. 탐정 조수로서의 성장이 보여서 나는 기쁘군.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「その通り、私とイレーナさんは以前会ったことがある」"
translation = "「말한 대로, 나와 이레이나 양은 이전에 만난 적이 있네.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「私が事件の解決のためにイタリアに赴いた時のことだ。あの事件は中々に厄介な事件だった──と、それは余談だね」"
translation = "「내가 사건 해결을 위해 이탈리아로 향했을 때의 일이지. 그 사건은 꽤나 까다로운 사건이었네── 뭐, 그건 여담이군.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「聖女と呼ばれる彼女に興味があって、訪ねてみたんだ。実際に会ってみて、まさに聖女と呼ぶに相応しい振る舞いに感銘を受けたものだ」"
translation = "「성녀라고 불리는 그녀에게 흥미가 생겨 찾아가 보았지. 실제로 만나보니 과연 성녀라 불리기에 걸맞은 행동에 감명받았었다네.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「そして彼女に聞いてみた──キミは『聖女』の選星者ではないか、とね」"
translation = "「그리고 그녀에게 물어보았지── 자네는 『성녀』의 선성자가 아닌가, 하고 말이야.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「私はたまたま聖女と呼ばれるような力を持ち合わせていただけです」"
translation = "「저는 우연히 성녀라 불릴 만한 힘을 가지고 있었을 뿐이에요.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「選星者は天からの啓示を受けるそうですから、もし私が選星者であるならその自覚があるはず」"
translation = "「선성자는 하늘로부터 계시를 받는다고 하니까, 만약 제가 선성자라면 그 자각이 있을 터.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「しかし私に啓示はありませんでした。ですから私は選星者ではありません。きっと私などより『聖女』に相応しい方がどこかにいるのだと思います」"
translation = "「하지만 저에게 계시는 없었습니다. 그러니 저는 선성자가 아니에요. 분명 저 따위보다 『성녀』에 어울리는 분이 어딘가에 계실 거라 생각합니다.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「あの時もキミはそう言っていたね」"
translation = "「그때도 자네는 그렇게 말했었지.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「だがキミは多くの人々の傷を癒し、心を支えてきた。選星者でなくとも、キミは立派な聖女だ。私はそう思うよ」"
translation = "「하지만 자네는 많은 사람의 상처를 치유하고 마음을 지탱해왔네. 선성자가 아닐지라도 자네는 훌륭한 성녀야. 나는 그렇게 생각하네.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ありがとうございます。そこまで言われると恐縮です」"
translation = "「감사합니다. 그렇게 말씀하시니 송구스럽네요.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「とまあ、私たちの関係はそんなところだ。分かってもらえたかな？」"
translation = "「뭐, 우리 관계는 대충 그런 정도라네. 이해했나?」"

[[dialogue]]
speaker = "unk"
original = "よくわかりました"
translation = "잘 알았어."

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「では問題の解決に移ろうか」"
translation = "「그럼 문제 해결로 넘어가 볼까.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「トワ先生によれば、フォームの解除はただ結婚式を挙げればよいというわけではない」"
translation = "「토와 선생님에 따르면, 폼의 해제는 그저 결혼식을 올리기만 하면 되는 것이 아니라고 하네.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「きちんと花嫁修業をして、本当に結婚式を挙げる心づもりで臨まなければならないそうだ」"
translation = "「제대로 신부 수업을 하고, 정말로 결혼식을 올릴 마음가짐으로 임해야 한다더군.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「神官役は探さなくてはならないが、それが見つかるまでの間、花嫁修業に励もうじゃないか」"
translation = "「신관 역할은 찾아야겠지만, 그것을 찾을 때까지 신부 수업에 힘써보지 않겠나.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「そうですね……。会長さん、申し訳ありませんが、お付き合い頂けますか？」"
translation = "「그렇네요……. 회장님, 죄송하지만 함께해주시겠어요?」"

[[dialogue]]
speaker = "unk"
original = "わかった"
translation = "알았어."

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「感謝するよ。さあ我が助手、修行の場へと案内してくれたまえ」"
translation = "「감사하네. 자 나의 조수, 수행의 장소로 안내해주게나.」"

