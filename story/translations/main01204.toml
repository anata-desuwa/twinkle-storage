[[dialogue]]
speaker = "unk"
original = "第４話,雌伏,B"
translation = "제4화, 웅크림, B"

[[dialogue]]
speaker = "unk"
original = "フィーニスの塔を脱した私はそれから<ruby>雌伏<rt>しふく</rt></ruby>の期間を過ごした。"
translation = "피니스의 탑을 벗어난 나는 그때부터 웅크림의 기간을 보냈다."

[[dialogue]]
speaker = "unk"
original = "表向きは流星の騎士として世を支えながら、本心ではリクリエの訪れを願うようになった。"
translation = "겉으로는 유성의 기사로서 세상을 지탱하면서, 본심으로는 리크리에의 도래를 바라게 되었다."

[[dialogue]]
speaker = "unk"
original = "しかし、ただその欲望のままに破壊を働くほど私も愚かではない。"
translation = "하지만, 단지 그 욕망대로 파괴를 저지를 만큼 나도 어리석지는 않다."

[[dialogue]]
speaker = "unk"
original = "女神より簒奪した霊力を使えば──逆に破滅を手繰り寄せるくらい、簡単なことではないか。"
translation = "여신에게서 찬탈한 영력을 사용하면── 오히려 파멸을 끌어당기는 것쯤은, 간단한 일이 아닌가."

[[dialogue]]
speaker = "unk"
original = "新たに設立される学園の長に──私は前もって打診されていた件を引き受けることとした。"
translation = "새롭게 설립되는 학원의 장으로── 나는 미리 타진받았던 건을 맡기로 했다."

[[dialogue]]
speaker = "unk"
original = "星騎士──リクリエを願うにあたって最たるその弊害を排除するには、自ら糸を引くのが得策と考えた。"
translation = "성기사── 리크리에를 바라는 데 있어 가장 큰 그 폐해를 제거하려면, 스스로 실을 당기는 것이 상책이라고 생각했다."

[[dialogue]]
speaker = "unk"
original = "女神の喪失に気づいた守護天使たちもまた<ruby>憂慮<rt>ゆうりょ</rt></ruby>すべき障害だった。"
translation = "여신의 상실을 눈치챈 수호 천사들 또한 우려해야 할 장애물이었다."

[[dialogue]]
speaker = "unk"
original = "接触してきたアルタイルにおけるリクリエの使徒──星見の長女<b>ではない</b>──と手を組み、六柱の守護天使を封印することに成功した。"
translation = "접촉해 온 알타이르에서의 리크리에의 사도── 별을 보는 장녀<ruby>가 아닌<rt>・ ・・</rt></ruby>── 과 손을 잡고, 여섯 기둥의 수호 천사를 봉인하는 데 성공했다."

[[dialogue]]
speaker = "unk"
original = "そうして私は、リクリエにまつわるあらゆる権力を掌握することに成功した。"
translation = "그렇게 하여 나는, 리크리에에 얽힌 모든 권력을 장악하는 데 성공했다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "（星騎士──守護天使──リクリエを阻む者たちはいずれも私の掌中にある。私を止めることは、誰にもできない──）"
translation = "（성기사── 수호 천사── 리크리에를 가로막는 자들은 모두 나의 손아귀에 있다. 나를 막는 것은, 누구도 할 수 없다──）"

[[dialogue]]
speaker = "unk"
original = "無論、たまには流星の騎士としての懐かしき本分も果たした。それは所詮、カモフラージュにすぎなかったが。"
translation = "물론, 가끔은 유성의 기사로서의 그리운 본분도 다했다. 그것은 결국, 위장에 불과했지만."

[[dialogue]]
speaker = "unk"
original = "モンスターに襲われがちだという少年を助けたのも、そんな経緯と気まぐれの生んだ偶然にすぎない。"
translation = "몬스터에게 습격당하기 쉽다는 소년을 도운 것도, 그런 경위와 변덕이 낳은 우연에 불과하다."

[[dialogue]]
speaker = "unk"
original = "すべては妻との再会がため──リクリエという機が訪れるのを祈って……。"
translation = "모든 것은 아내와의 재회를 위해서── 리크리에라는 기회가 찾아오기를 빌면서……. \n"

[[dialogue]]
speaker = "unk"
original = "<b>仕込み</b>はそれで十分だと思っていた。"
translation = "<b>준비</b>는 그것으로 충분하다고 생각했다."

[[dialogue]]
speaker = "unk"
original = "元より<ruby>世界Ａ<rt>ベガ</rt></ruby>では食い止めきれなかった３０００年越しの大波──こちらの戦力を脆弱化させれば、終焉は不可避なものになるだろうと。"
translation = "원래부터 세계 A에서는 막아낼 수 없었던 3000년에 걸친 큰 파도── 이쪽의 전력을 취약하게 만들면, 종언은 불가피한 것이 될 것이라고."

[[dialogue]]
speaker = "unk"
original = "しかし、イレギュラーが起こった。"
translation = "하지만, 이레귤러가 일어났다."

[[dialogue]]
speaker = "unk"
original = "フィーニスの塔に何名かの生徒が導かれていた。"
translation = "피니스의 탑에 몇 명의 학생이 이끌리고 있었다."

[[dialogue]]
speaker = "unk"
original = "無論、いくら立ち入りを禁じているといえど、時には興味本位の学生が近づくことは避けられない。"
translation = "물론, 아무리 출입을 금지하고 있다고 해도, 때로는 호기심 많은 학생이 접근하는 것은 피할 수 없다."

[[dialogue]]
speaker = "unk"
original = "しかし、彼らの塔の<b>攻略</b>ぶりは昔日の私を思わせるほどにつつがなかった。"
translation = "하지만, 그들의 탑 <b>공략</b> 방식은 옛날의 나를 떠올리게 할 정도로 순조로웠다."

[[dialogue]]
speaker = "unk"
original = "緋宮クロト──九浄ヴィーナス──そして<ruby>流星教皇<rt>マリウス</rt></ruby>の娘。"
translation = "히노미야 쿠로토── 쿠죠 비너스── 그리고 유성 교황의 딸."

[[dialogue]]
speaker = "unk"
original = "彼らは明らかな異分子だった。"
translation = "그들은 명백한 이물질이었다."

[[dialogue]]
speaker = "unk"
original = "とりわけ緋宮クロトが入学して以来、流星市国にはびこるアステラの<ruby>殲滅<rt>せんめつ</rt></ruby>速度は著しく上がっていた。"
translation = "특히 히노미야 쿠로토가 입학한 이래, 유성 시국에 만연한 아스테라의 섬멸 속도는 현저하게 올라 있었다."

[[dialogue]]
speaker = "unk"
original = "守護天使の封印によってリクリエの侵攻を早めたはずの私にとって、それは大きな誤算だった。"
translation = "수호 천사의 봉인으로 리크리에의 침공을 앞당겼어야 할 나에게 있어, 그것은 큰 오산이었다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "（御前試合の時に見せた力の片鱗──あれは“塔”で得た知識によれば、やはり魔王の……）"
translation = "（어전 시합 때 보여준 힘의 일부분── 저것은 “탑”에서 얻은 지식에 따르면, 역시 마왕의……）"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "『ふっふーん。当然よ。私がクロトを導く役目だってのは、日誌に定められてた運命なんだから！』"
translation = "「훗후웅. 당연하지. 내가 쿠로토를 이끄는 역할이라는 건, 일지에 정해져 있던 운명이니까!」"

[[dialogue]]
speaker = "unk"
original = "やがて私はその絡繰りの一端に気づく。"
translation = "이윽고 나는 그 속임수의 일단을 눈치챈다."

[[dialogue]]
speaker = "unk"
original = "“九浄ヴィーナスはデネブ由来の人間である”──《円環》の守護天使と一時的な契約を交わすことで、その知見を得た。"
translation = "“쿠죠 비너스는 데네브 유래의 인간이다”── 《원환》의 수호 천사와 일시적인 계약을 맺음으로써, 그 식견을 얻었다."

[[dialogue]]
speaker = "unk"
original = "平行世界は本来交わらぬ存在。"
translation = "평행 세계는 본래 교차하지 않는 존재."

[[dialogue]]
speaker = "unk"
original = "だが、彼女は紛れもない<ruby>この世界<rt>アルタイル</rt></ruby>の異分子であり、また当人はそれを自覚できていないという。"
translation = "하지만, 그녀는 틀림없는 이 세계의 이물질이며, 또한 본인은 그것을 자각하지 못하고 있다고 한다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "（デネブ……妻の<ruby>拐<rt>さら</rt></ruby>われた先にある世界線から来た存在。何らかの鍵を握っているのは必然）"
translation = "（데네브…… 아내가 채여 간 곳에 있는 세계선에서 온 존재. 무언가의 열쇠를 쥐고 있는 것은 필연.）"

[[dialogue]]
speaker = "unk"
original = "そして彼女は特異なアイテム──『未来のことが記された日誌』を持っていた。"
translation = "그리고 그녀는 특이한 아이템── 『미래의 일이 기록된 일지』를 가지고 있었다."

[[dialogue]]
speaker = "unk"
original = "その機構が単なる未来予知でないことはすぐにわかった。"
translation = "그 기구가 단순한 미래 예지가 아니라는 것은 곧바로 알 수 있었다."

[[dialogue]]
speaker = "unk"
original = "デネブの世界を垣間見た私だからこそわかる──あちらはアルタイルよりも、いくらか時計が先に進んでいる。"
translation = "데네브의 세계를 엿본 나이기에 알 수 있다── 그쪽은 알타이르보다, 어느 정도 시계가 먼저 나아가 있다."

[[dialogue]]
speaker = "unk"
original = "よってかの日誌が書き記している未来というのも、すなわち<b>こちら</b>のことではない。"
translation = "따라서 그 일지가 기록하고 있는 미래라는 것도, 즉 <b>이쪽</b>의 일이 아니다."

[[dialogue]]
speaker = "unk"
original = "すでに異なる世界で起きた、デネブの筋書きが記されているとみて間違いなかった。"
translation = "이미 다른 세계에서 일어난, 데네브의 줄거리가 기록되어 있다고 보아 틀림없었다."

[[dialogue]]
speaker = "unk"
original = "私は当初──あの仮面の使徒と同様の存在なのかと疑った。"
translation = "나는 당초── 저 가면을 쓴 사도와 동일한 존재인가 하고 의심했다."

[[dialogue]]
speaker = "unk"
original = "しかし九浄ヴィーナスの行動・言動はとても、リクリエに操られているようには見えない。"
translation = "하지만 쿠죠 비너스의 행동・언동은 도저히, 리크리에에 조종당하고 있는 것처럼 보이지 않는다."

[[dialogue]]
speaker = "unk"
original = "それに、あの仮面の少女とは違い──九浄ヴィーナスにはそもそも<b>元となった人間体が存在していない</b>。"
translation = "게다가, 저 가면을 쓴 소녀와 달리── 쿠죠 비너스에게는 애초에 <ruby>원래의 인간체가 존재하지 않는다<rt>・・・ ・・・・ ・・・・ ・・・</rt></ruby>."

[[dialogue]]
speaker = "unk"
original = "密かに探りを入れて判明したことだが、これは確かだ。本体が失踪したわけでも、長い眠りについたわけでもなく。"
translation = "은밀히 조사를 넣어 판명한 것이지만, 이것은 확실하다. 본체가 실종된 것도, 긴 잠에 빠진 것도 아니다."

[[dialogue]]
speaker = "unk"
original = "そこでようやく私も受け入れざるをえなくなった。"
translation = "그제야 나도 받아들일 수밖에 없게 되었다."

[[dialogue]]
speaker = "unk"
original = "九浄ヴィーナスという人間──彼女は、<b>どこからかこちらの世界へやってきた</b>イレギュラーなのだと。"
translation = "쿠죠 비너스라는 인간── 그녀는, <ruby>어딘가에서 이쪽 세계로 온<rt>・・・・・ ・・ ・・・ ・</rt></ruby> 이레귤러라는 것을."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "（……危険だ）"
translation = "（……위험하다.）"

[[dialogue]]
speaker = "unk"
original = "果たして少女が何のための存在なのか──それは不明。"
translation = "과연 소녀가 무엇을 위한 존재인지는── 그것은 불명이다."

[[dialogue]]
speaker = "unk"
original = "だが、少なくとも本来なかったはずの九浄ヴィーナスの干渉によって、こちらのリクリエ侵攻が食い止められているのは事実。"
translation = "하지만, 적어도 본래 없었어야 할 쿠죠 비너스의 간섭으로 인해, 이쪽의 리크리에 침공이 저지되고 있는 것은 사실이다."

[[dialogue]]
speaker = "unk"
original = "なればどうあれ──黒騎士にとって認めるべくもない存在だ。"
translation = "그렇다면 어떻든 간에── 검은 기사에게 있어 인정할 수 없는 존재다."

[[dialogue]]
speaker = "unk"
original = "せっかく、策を<ruby>弄<rt>ろう</rt></ruby>して──リクリエを受け入れる準備が整ったというのに。"
translation = "모처럼, 책략을 부려서── 리크리에를 받아들일 준비가 갖춰졌는데도."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "（女神よ──あなたの与えたもうた天啓に感謝する。私はただ己が欲望のため、罪なき娘を手にかけてみせよう──）"
translation = "（여신이여── 당신이 주신 천계에 감사한다. 나는 오직 나의 욕망을 위해, 죄 없는 딸에게 손을 대 보이겠다──）"

[[dialogue]]
speaker = "unk"
original = "誘拐の執行に<ruby>躊躇<rt>ちゅうちょ</rt></ruby>は必要なかった。"
translation = "유괴의 집행에 주저는 필요 없었다."

[[dialogue]]
speaker = "unk"
original = "それが、リクリエという希望に魂を売り渡した、<ruby>黒騎士<rt>わたし</rt></ruby>の定めなのだから……。"
translation = "그것이, 리크리에라는 희망에 영혼을 팔아넘긴, 검은 기사의 숙명이니까……. \n"

