[[dialogue]]
speaker = "unk"
original = "日が暮れたのでパテルストーン探しを中断し、浜辺でバーベキューをすることになった。"
translation = "해가 저물었기에 파텔 스톤 찾기를 중단하고, 해변에서 바비큐를 하기로 했다."

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「おにっく、おにっく、おにっく～♪\u3000待ちに待ったバーベキューなのだ～♪」"
translation = "「고기, 고기, 고기~♪ 기다리고 기다리던 바비큐인 것이다~♪」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「お肉がじゅうじゅう焼ける匂いがして……うぅぅっ、お腹が空いてフラフラなのだ～……」"
translation = "「고기가 지글지글 익는 냄새가 나서…… 으으으, 배고파서 어질어질한 것이다~……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「はい、お肉が焼けましたよー」"
translation = "「자, 고기가 다 구워졌어요─」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「ありがとうなのだ！\u3000いただきますなのだ！\u3000あ～んっ♪」"
translation = "「고마운 것이다! 잘 먹겠습니다인 것이다! 아~앙♪」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「んん～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000やっぱりお肉は最高なのだっ<emoji=heart04><emoji=heart04>」"
translation = "「으음~~~ <emoji=heart04><emoji=heart04><emoji=heart04> 역시 고기는 최고인 것이다! <emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「会長とパテルもどうぞ～」"
translation = "「회장님과 파텔도 드세요~」"

[[dialogue]]
speaker = "unk"
original = "ありがとう"
translation = "고마워."

[[dialogue]]
speaker = "パテル"
original = "「ありがとー」"
translation = "「고마워─」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「パテルもママダレナって呼んでいいんですよ～」"
translation = "「파텔도 마마달레나라고 불러도 된다고요~」"

[[dialogue]]
speaker = "パテル"
original = "「ヤダ。アウクセシアじゃあるまいし、同僚をママと呼ぶ趣味はないよ」"
translation = "「싫어. 아우크세시아도 아니고, 동료를 엄마라고 부를 취미는 없어.」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「そんな！？」"
translation = "「그럴 수가!?」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「あはは、セシアにもウケが悪かったのに、パテルにも拒否られたのだ」"
translation = "「아하하, 세시아한테도 반응이 안 좋았는데 파텔한테도 거절당한 것이다.」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「うぅ～っ……ママダレナ悲しいです～っ」"
translation = "「으으~…… 마마달레나 슬퍼요~」"

[[dialogue]]
speaker = "パテル"
original = "「じゃあお肉いただき～。あ～んっ。……ん～、お肉おいし～っ<emoji=heart04>」"
translation = "「그럼 고기 잘 먹을게~. 아~앙. ……음~, 고기 맛있어 <emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「でもパテルがお肉を食べるのは意外なのだ」"
translation = "「하지만 파텔이 고기를 먹는 건 의외인 것이다.」"

[[dialogue]]
speaker = "パテル"
original = "「最初は抵抗あったけどね。でもあたしも肉体がある以上、食べないと生きられないし」"
translation = "「처음엔 거부감 있었지만 말이야. 하지만 나도 육체가 있는 이상, 먹지 않으면 살 수 없고.」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「そうですね。私たちも命を持った存在ですから」"
translation = "「그렇네요. 저희도 생명을 가진 존재니까요.」"

[[dialogue]]
speaker = "パテル"
original = "「もし何か起きても、全部あたしを堕天させたリクリエのせいだからね♪」"
translation = "「만약 무슨 일이 생겨도, 전부 나를 타천시킨 리크리에 탓이니까♪」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「開き直ったのだ！？」"
translation = "「배째라인 것이다!?」"

[[dialogue]]
speaker = "unk"
original = "魚のホイル焼きもできたよ"
translation = "생선 호일 구이도 다 됐어."

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「やったのだ～！\u3000会長と２人で獲ったお魚、いただきますなのだ！\u3000あ～むっ」"
translation = "「만세인 것이다~! 회장과 둘이서 잡은 생선, 잘 먹겠습니다인 것이다! 함냐」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「ん～っ<emoji=heart04>\u3000ホロッと柔らかくて美味しいのだ～っ<emoji=heart04>\u3000会長も食べるのだ」"
translation = "「음~ <emoji=heart04> 살이 부드럽게 풀려서 맛있는 것이다~ <emoji=heart04> 회장도 먹는 것이다.」"

[[dialogue]]
speaker = "unk"
original = "うん、美味しい！"
translation = "응, 맛있다!"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「リップルさまからもらったお野菜にお魚の旨味が染みて、こちらも絶品ですね～♪」"
translation = "「리플 님께 받은 채소에 생선의 감칠맛이 배어서 이쪽도 일품이네요~♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「あ、潮干狩りで採った貝も焼けてきました。こっちも美味しそうです♪」"
translation = "「아, 조개잡이로 캔 조개도 다 구워졌어요. 이쪽도 맛있어 보여요♪」"

[[dialogue]]
speaker = "unk"
original = "一番貝を採ったマグダレナからどうぞ"
translation = "조개를 제일 많이 캔 막달레나부터 먹어."

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「ありがとうございます。それじゃ遠慮なく……ん～っ<emoji=heart04>\u3000ジューシーな旨味が溢れます……<emoji=heart04>」"
translation = "「감사합니다. 그럼 사양 않고…… 음~ <emoji=heart04> 쥬시한 감칠맛이 넘쳐나요…… <emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「海の味がするのだ！\u3000贅沢なのだ～っ♪」"
translation = "「바다의 맛이 나는 것이다! 사치스러운 것이다~♪」"

[[dialogue]]
speaker = "unk"
original = "サザエもハマグリも美味しい！"
translation = "소라도 대합도 맛있다!"

[[dialogue]]
speaker = "パテル"
original = "「はぁ～、食べた食べた。ごちそうさま～」"
translation = "「하아~, 잘 먹었다. 잘 먹었습니다~」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「早いのだ！？\u3000パテル、ちゃんと食べたか！？」"
translation = "「빠른 것이다!? 파텔, 제대로 먹었냐!?」"

[[dialogue]]
speaker = "パテル"
original = "「うん、お肉もお魚も貝も食べたよ。美味しかった」"
translation = "「응, 고기도 생선도 조개도 먹었어. 맛있었어.」"

[[dialogue]]
speaker = "unk"
original = "遠慮してない？"
translation = "사양하는 거 아냐?"

[[dialogue]]
speaker = "パテル"
original = "「お肉もお魚も結界で出してるものだし、遠慮なんかしないよ。あなたたちより小食なだけ」"
translation = "「고기도 생선도 결계로 만들어낸 거니까 사양 같은 거 안 해. 당신들보다 소식할 뿐이야.」"

[[dialogue]]
speaker = "パテル"
original = "「アルモタヘル、あたしの分も食べていいよ」"
translation = "「아르모타헬, 내 몫도 먹어도 돼.」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「ありがとうなのだ！\u3000はむっ、はむっ、はむっ……お肉もお魚も美味しいのだ～っ<emoji=heart04>」"
translation = "「고마운 것이다! 냠냠, 냠냠, 냠냠…… 고기도 생선도 맛있는 것이다~ <emoji=heart04>」"

[[dialogue]]
speaker = "パテル"
original = "「……まぁ、アルモタヘルと比べたら誰でも小食になりそうだけど」"
translation = "「……뭐, 아르모타헬이랑 비교하면 누구든 소식하는 게 되겠지만.」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「お肉が足りないのだ！\u3000なくなっちゃったのだ！」"
translation = "「고기가 부족한 것이다! 다 없어져 버린 것이다!」"

[[dialogue]]
speaker = "パテル"
original = "「あれだけ食べたらそうなるでしょ。ていうかまだ食べるつもりなの？」"
translation = "「그만큼 먹었으면 그렇게 되겠지. 그나저나 아직 더 먹을 생각이야?」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「アルモタヘルは小さくなっても食いしん坊さんですね」"
translation = "「아르모타헬은 작아져도 먹보네요.」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「リップルさまが、お肉が足りなくなったら海の家に取りに来て、と仰っていましたから、行ってきますね」"
translation = "「리플 님이 고기가 부족해지면 바다의 집으로 가지러 오라고 하셨으니까, 다녀올게요.」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「アルモたんも行くのだ！\u3000お肉が待ちきれないのだ！」"
translation = "「알모땅도 갈 것이다! 고기를 기다릴 수 없는 것이다!」"

[[dialogue]]
speaker = "unk"
original = "行ってらっしゃい"
translation = "잘 다녀와."

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「は～い、行ってきますねー」"
translation = "「네에, 다녀올게요─」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「ふんふんふふ～ん♪」"
translation = "「흠흠흠흐음~♪」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「ふんふふ～ん……」"
translation = "「흠흐흐음……」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「夜の海で２人きりだと怖くなってきたのだ……」"
translation = "「밤바다에 둘이서만 있으니까 무서워진 것이다……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「そうですね……ちょっと不安になるかもしれません……」"
translation = "「그렇네요…… 조금 불안해질지도 모르겠어요……」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「どうしてなのだ？\u3000アルモたんとマグダレナは守護天使。暗いくらいで怖がらないはずなのだ」"
translation = "「어째서인 것이다? 알모땅과 막달레나는 수호천사. 어두운 거 정도로 무서워하지 않을 텐데.」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「うーん……肉体に引っ張られているのかもしれませんね」"
translation = "「으음…… 육체에 이끌리고 있는 걸지도 모르겠네요.」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「お腹が空くのも、食べ物が美味しいのも、肉体から来る感情です。だから肉体の本能で『怖い』と感じてもおかしくないと思います」"
translation = "「배가 고픈 것도, 음식이 맛있는 것도 육체에서 오는 감정이에요. 그러니까 육체의 본능으로 『무섭다』고 느껴도 이상하지 않다고 생각해요.」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「なるほどなのだ……肉体があると、いい気持ちばかりじゃないのだな……」"
translation = "「과연인 것이다…… 육체가 있으면 좋은 기분만 드는 건 아니구나……」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「ん……？\u3000後ろから誰か来て……会長も手伝ってくれるのか？」"
translation = "「응……? 뒤에서 누가 오는데…… 회장도 도와주는 건가?」"

[[dialogue]]
speaker = "？？？"
original = "「──」"
translation = "「──」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「ひっ！？」"
translation = "「히익!?」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「──って、パテルなのだ。ビックリしちゃったのだ」"
translation = "「── 뭐야, 파텔인 것이다. 깜짝 놀란 것이다.」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「でもどうしてその姿なのだ？\u3000さっきは水着で──」"
translation = "「그런데 왜 그 모습인 것이다? 아까는 수영복이었는데──」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「あ、アルモタヘル！\u3000後ろに──！」"
translation = "「아, 아르모타헬! 뒤에──!」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「へ──？」"
translation = "「헤──?」"

[[dialogue]]
speaker = "サメ"
original = "「シャーーーッ！！！」"
translation = "「샤아아아앗!!!」"

