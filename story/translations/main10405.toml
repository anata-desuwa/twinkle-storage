[[dialogue]]
speaker = "unk"
original = "第５話,ぎゃんぶらぁ伝説,B"
translation = "제5화, 갬블러 전설, B"

[[dialogue]]
speaker = "ウェンディ"
original = "「まったく！\u3000ひどい目に遭いました！！」"
translation = "「정말이지! 끔찍한 꼴을 당했습니다!!」"

[[dialogue]]
speaker = "ウェンディ"
original = "「あの研究バカときたら、本当にロクなことをしやがりません！」"
translation = "「그 연구 바보 녀석은 정말이지 제대로 된 짓을 안 한다니까요!」"

[[dialogue]]
speaker = "ウェンディ"
original = "「…………はぁ」"
translation = "「…………하아.」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「実はこのバトルスーツ強化装置、まだ重大な欠陥を抱えてるんだよ」"
translation = "「사실 이 배틀 슈트 강화 장치, 아직 중대한 결함을 안고 있어.」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「それが一定時間経つと、注ぎ込まれる魔力に戦闘服が耐えられなくなって、光になってはじけ飛んじゃうんだよね」"
translation = "「그게 일정 시간이 지나면 쏟아붓는 마력을 전투복이 견디지 못해서, 빛이 되어 터져 나가 버리거든.」"

[[dialogue]]
speaker = "セドナ"
original = "「それは重大過ぎる欠点だな」"
translation = "「그건 너무 중대한 결점이군.」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「これだとやっぱ予算……もらえないかな？」"
translation = "「이러면 역시 예산…… 못 받으려나?」"

[[dialogue]]
speaker = "ウェンディ"
original = "「既に実用レベルまで完成しているというならまだしも、こんな状態のものに予算を割けるわけがないでしょう」"
translation = "「이미 실용 단계까지 완성된 거라면 몰라도, 이런 상태인 것에 예산을 배정할 수 있을 리가 없잖아요.」"

[[dialogue]]
speaker = "セドナ"
original = "「そうだな……しかし、この研究が非常に有用なことは間違いない。完成すればネビュラにとって大きな力になるだろう」"
translation = "「그렇군…… 하지만 이 연구가 매우 유용한 것은 틀림없다. 완성된다면 네뷸라에게 큰 힘이 되겠지.」"

[[dialogue]]
speaker = "セドナ"
original = "「今は財政的な余裕がない。我々も急ぎ財政基盤を整えるので、それまで凍結ということにしておいてくれ」"
translation = "「지금은 재정적인 여유가 없다. 우리도 서둘러 재정 기반을 다질 테니, 그때까지 동결하는 것으로 해두게.」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「うん、わかったよ。つまり全てはウェンディの手腕次第ってことね、頼んだよん♪」"
translation = "「응, 알았어. 결국 모든 건 웨디의 수완에 달렸다는 거네, 부탁해용♪」"

[[dialogue]]
speaker = "ウェンディ"
original = "「わ、分かっています！\u3000すぐに何とかしてみせますから、それまで大人しく待っていなさい！」"
translation = "「아, 알고 있습니다! 금방 어떻게든 해낼 테니까, 그때까지 얌전히 기다리고 있으세요!」"

[[dialogue]]
speaker = "ウェンディ"
original = "「……そうなんですよね。技術自体はとんでもないものなんですよ」"
translation = "「……그렇긴 하죠. 기술 자체는 엄청난 거예요.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「お金に余裕がありさえすれば、私だって全力で支援したいくらいの代物です」"
translation = "「돈에 여유만 있다면 저라도 전력으로 지원하고 싶을 정도의 물건입니다.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「けれど、そのためにはネビュラの運営資金の健全化が必須……」"
translation = "「하지만 그러기 위해서는 네뷸라 운영 자금의 건전화가 필수……」"

[[dialogue]]
speaker = "ウェンディ"
original = "（一朝一夕に、現状を解決する手段はありません）"
translation = "（하루아침에 현 상황을 해결할 수단은 없습니다.）"

[[dialogue]]
speaker = "ウェンディ"
original = "（私に出来ることは……もう一度、地道に人間界に財政基盤を築いていくこと）"
translation = "（내가 할 수 있는 일은…… 다시 한번 착실하게 인간계에 재정 기반을 쌓아가는 것.）"

[[dialogue]]
speaker = "ウェンディ"
original = "「そのための糸口を、一刻も早く見つけないと……」"
translation = "「그를 위한 실마리를 한시라도 빨리 찾아내지 않으면……」"

[[dialogue]]
speaker = "アイリーン"
original = "「あれ？\u3000ウェンディさんだ、こんにちは～」"
translation = "「어라? 웨디 씨다, 안녕하세요~」"

[[dialogue]]
speaker = "ウェンディ"
original = "「アイリーン？\u3000こんなところで何をしているのですか？」"
translation = "「아이린? 이런 곳에서 뭘 하고 있는 건가요?」"

[[dialogue]]
speaker = "アイリーン"
original = "「えへへ、人間界を偵察しているのです～」"
translation = "「에헤헤, 인간계를 정찰하고 있어요~」"

[[dialogue]]
speaker = "ウェンディ"
original = "「任務中でしたか。それは失礼しました、お疲れ様です」"
translation = "「임무 중이었나요. 실례했습니다, 수고하셨어요.」"

[[dialogue]]
speaker = "アイリーン"
original = "「わわわっ、冗談だよっ！\u3000ホントはただのお散歩♪」"
translation = "「와와왓, 농담이야! 사실은 그냥 산책♪」"

[[dialogue]]
speaker = "アイリーン"
original = "「ウェンディさんこそどうしたの？\u3000こんなところで出くわすなんて思わなかったよ～」"
translation = "「웨디 씨야말로 웬일이야? 이런 곳에서 마주칠 줄은 몰랐어~」"

[[dialogue]]
speaker = "ウェンディ"
original = "「私は、まあ……傷心を紛らわせつつ、組織の今後についてあれこれ考えていました」"
translation = "「저는, 뭐…… 상처받은 마음을 달래면서 조직의 향후에 대해 이것저것 생각하고 있었습니다.」"

[[dialogue]]
speaker = "アイリーン"
original = "「傷心？\u3000何かあったの？」"
translation = "「상처? 무슨 일 있었어?」"

[[dialogue]]
speaker = "ウェンディ"
original = "「ええ、実はですね──」"
translation = "「네, 사실은요──」"

[[dialogue]]
speaker = "アイリーン"
original = "「へ～、そんな事があったんだ」"
translation = "「헤~, 그런 일이 있었구나.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「発明自体は非常に有用なのですが、そんな欠点を抱えているとなると、実用には耐えないでしょう？」"
translation = "「발명 자체는 매우 유용합니다만, 그런 결함을 안고 있다면 실전에는 못 쓰겠죠?」"

[[dialogue]]
speaker = "アイリーン"
original = "「そうだね～、いつ変身が解けちゃうかわからないってなると、実践で使うのはちょっと恐いかな～」"
translation = "「그렇겠네~, 언제 변신이 풀릴지 모른다고 하면 실전에서 쓰기는 좀 무서울지도~」"

[[dialogue]]
speaker = "アイリーン"
original = "「でも、もしそんなパワーアップができるなら、戦術もいろいろ幅が生まれていいねっ♪」"
translation = "「그래도 만약 그런 파워 업을 할 수 있다면 전술도 여러모로 폭이 넓어져서 좋겠다♪」"

[[dialogue]]
speaker = "ウェンディ"
original = "「ええ……その技術を元にして資金を生み出すことも考えられるのですが……」"
translation = "「네…… 그 기술을 바탕으로 자금을 창출하는 것도 생각할 수 있습니다만……」"

[[dialogue]]
speaker = "アイリーン"
original = "「うーん……お金ないのって、大変だね……」"
translation = "「으음…… 돈 없는 건 참 힘들겠네……」"

[[dialogue]]
speaker = "ウェンディ"
original = "「そうなんです……」"
translation = "「그렇습니다……」"

[[dialogue]]
speaker = "アイリーン"
original = "「何かいい方法、ないかな～……うーん……」"
translation = "「어디 좋은 방법 없을까~…… 으음……」"

[[dialogue]]
speaker = "ウェンディ"
original = "「うーん……」"
translation = "「으음……」"

[[dialogue]]
speaker = "アイリーン"
original = "「あっ、そうだ思い出した！」"
translation = "「앗, 맞다 생각났다!」"

[[dialogue]]
speaker = "ウェンディ"
original = "「どうしました？\u3000何か良いアイデアが浮かびましたか？」"
translation = "「무슨 일이죠? 좋은 아이디어라도 떠올랐나요?」"

[[dialogue]]
speaker = "アイリーン"
original = "「うん！\u3000前に人間界で出会った人から、お金に困ったらここにいけばいい、って教えてもらったんだよ！」"
translation = "「응! 예전에 인간계에서 만난 사람이, 돈 때문에 곤란하면 여기로 가보라고 가르쳐줬어!」"

[[dialogue]]
speaker = "ウェンディ"
original = "「あからさまに怪しいですが……誰なんです、その人？」"
translation = "「대놓고 수상합니다만…… 누구인가요, 그 사람?」"

[[dialogue]]
speaker = "アイリーン"
original = "「『さすらいの旅人』だって言ってたよ。名前は教えてもらえなかったんだ～」"
translation = "「『떠돌이 여행자』라고 했어. 이름은 안 가르쳐줬어~」"

[[dialogue]]
speaker = "ウェンディ"
original = "「ますます怪しいじゃないですか、騙されちゃだめですよ！」"
translation = "「갈수록 수상하잖아요, 속으면 안 돼요!」"

[[dialogue]]
speaker = "アイリーン"
original = "「え～、でもいいヒトそうだったよ？\u3000行くだけでも行ってみない？」"
translation = "「에~, 하지만 좋은 사람 같았는걸? 가보기라도 하지 않을래?」"

[[dialogue]]
speaker = "ウェンディ"
original = "「うーん……そうですね。何がビジネスに繋がるか分かりませんし、アイリーンを一人で行かせるのも危険な気がします」"
translation = "「으음…… 그렇네요. 무엇이 비즈니스로 이어질지 모르고, 아이린을 혼자 보내는 것도 위험할 것 같네요.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「分かりました。では行くだけ行ってみましょう」"
translation = "「알겠습니다. 그럼 가보기만 하죠.」"

[[dialogue]]
speaker = "アイリーン"
original = "「わーい♪」"
translation = "「와이♪」"

[[dialogue]]
speaker = "ウェンディ"
original = "「って、ここは……」"
translation = "「그나저나 여기는……」"

[[dialogue]]
speaker = "ウェンディ"
original = "「カジノじゃないですかっ！！！！」"
translation = "「카지노잖아요!!!!」"

[[dialogue]]
speaker = "アイリーン"
original = "「そうだね～、キラキラした建物ですごいね～♪」"
translation = "「그렇네~, 반짝반짝한 건물이라 굉장하다~♪」"

[[dialogue]]
speaker = "ウェンディ"
original = "「ギャンブルなんてとんでもありません！\u3000トータルで見れば損するように出来てるんですから」"
translation = "「도박이라니 말도 안 됩니다! 전체적으로 보면 손해를 보게 되어 있다구요.」"

[[dialogue]]
speaker = "アイリーン"
original = "「でも、運よく大金を稼げちゃうかもしれないよ？」"
translation = "「하지만 운 좋게 큰돈을 벌 수 있을지도 모르잖아?」"

[[dialogue]]
speaker = "ウェンディ"
original = "「運任せで稼ごうなんて金銭に対する冒涜です！」"
translation = "「운에 맡겨서 벌겠다니 금전에 대한 모독입니다!」"

[[dialogue]]
speaker = "アイリーン"
original = "「あれ？\u3000でも『さすらいの旅人』さん、こんなこと言ってたかも……」"
translation = "「어라? 하지만 『떠돌이 여행자』 씨가 이런 말을 했던 것 같기도……」"

[[dialogue]]
speaker = "アイリーン"
original = "「『ギャンブルは運の強い者が勝つんじゃない、数字に強い者が勝つんだ』って」"
translation = "「『도박은 운이 강한 자가 이기는 게 아니라, 숫자에 강한 자가 이기는 거다』라고.」"

[[dialogue]]
speaker = "アイリーン"
original = "「だったらウェンディさんって、ギャンブル最強なんじゃないかな？」"
translation = "「그렇다면 웨디 씨는 도박 최강 아닐까?」"

[[dialogue]]
speaker = "ウェンディ"
original = "「うっ……！」"
translation = "「윽……!」"

[[dialogue]]
speaker = "アイリーン"
original = "「せっかく来たんだし、気晴らしのつもりで遊んでいこうよ～、ねっ♪」"
translation = "「기왕 온 거니까 기분 전환 삼아 놀다 가자, 응? ♪」"

[[dialogue]]
speaker = "ウェンディ"
original = "（……もしかしてアイリーン、私が根を詰めていることを心配して、遊びに連れて来てくれたのでしょうか？）"
translation = "（……혹시 아이린, 제가 너무 무리하고 있는 걸 걱정해서 놀러 데려와 준 걸까요?）"

[[dialogue]]
speaker = "ウェンディ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "ウェンディ"
original = "「わかりました。たまにはいいかもしれませんね」"
translation = "「알겠습니다. 가끔은 괜찮을지도 모르겠네요.」"

[[dialogue]]
speaker = "アイリーン"
original = "「やっちゃえ、ウェンディさん！」"
translation = "「해버려, 웨디 씨!」"

[[dialogue]]
speaker = "ウェンディ"
original = "「数字に強いものがギャンブルを征す……その言葉、私が証明して見せますよ！」"
translation = "「숫자에 강한 자가 도박을 제패한다…… 그 말, 제가 증명해 보이겠습니다!」"

