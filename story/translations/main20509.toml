[[dialogue]]
speaker = "unk"
original = "第９話,破滅の拳,B"
translation = "제9화, 파멸의 권, B"

[[dialogue]]
speaker = "チナ"
original = "「吹き飛べーーーっ！！」"
translation = "「날아가 버려──!!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「きゃああっ！？」"
translation = "「꺄아악!?」"

[[dialogue]]
speaker = "unk"
original = "嵐をまとったチナの槍が、鎖ごとヴィーナスを薙ぎ払う。"
translation = "폭풍을 두른 치나의 창이, 사슬째로 비너스를 쳐낸다."

[[dialogue]]
speaker = "クロト"
original = "「ヴィーナス！」"
translation = "「비너스!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「大丈夫、まだ戦えるわ！\u3000でも、ちょっとどころじゃないくらい強くなってるわよね……どういう理屈──」"
translation = "「괜찮아, 아직 싸울 수 있어! 하지만, 조금 정도가 아니라 엄청나게 강해졌잖아…… 대체 무슨 원리로──」"

[[dialogue]]
speaker = "チナ"
original = "「かはっ……！」"
translation = "「커헉……!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「血っ！？\u3000ちょっと、血を吐いてるわよ！？」"
translation = "「피!? 잠깐, 피를 토하고 있잖아!?」"

[[dialogue]]
speaker = "チナ"
original = "「はぁ、はぁ……言っただろ、会長から力をもらったって……」"
translation = "「하아, 하아…… 말했잖아, 회장님으로부터 힘을 받았다고……」"

[[dialogue]]
speaker = "unk"
original = "チナの口から赤い血がこぼれてポタポタと垂れていく。"
translation = "치나의 입에서 붉은 피가 넘쳐나 뚝뚝 떨어진다."

[[dialogue]]
speaker = "unk"
original = "俺たちとの戦いで負った傷ではないはずだ。"
translation = "우리와의 싸움에서 입은 상처는 아닐 것이다."

[[dialogue]]
speaker = "チナ"
original = "「アタシは……デネブを守るためならなんだってする……アルタイルを滅ぼすのだって……」"
translation = "「아타시는…… 데네브를 지키기 위해서라면 뭐든 하겠어…… 알타이르를 멸망시키는 것조차……」"

[[dialogue]]
speaker = "チナ"
original = "「アタシはどうなってもいい……だから……だから……！」"
translation = "「아타시는 어떻게 되어도 좋아…… 그러니까…… 그러니까……!」"

[[dialogue]]
speaker = "unk"
original = "極星の会長から与えられたという力の反動か、チナの顔から生気が失われ、どんどん青ざめていく。"
translation = "극성의 회장으로부터 받았다는 힘의 반동인지, 치나의 얼굴에서 생기가 사라지고 점점 창백해져 간다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「このままじゃあなたが持たないわよ！？」"
translation = "「이대로라면 네가 버티지 못할 거야!?」"

[[dialogue]]
speaker = "チナ"
original = "「ああ、だからアタシの道連れになれ、アルタイル！！\u3000魔王！！」"
translation = "「아아, 그러니까 아타시와 함께 저승길 동무가 되어라, 알타이르!! 마왕!!」"

[[dialogue]]
speaker = "クロト"
original = "「くぅっ……！」"
translation = "「크윽……!」"

[[dialogue]]
speaker = "unk"
original = "チナの攻撃を正面から受け止めるが、衝撃に全身が悲鳴を上げる。"
translation = "치나의 공격을 정면에서 받아내지만, 충격에 온몸이 비명을 지른다."

[[dialogue]]
speaker = "unk"
original = "そして俺が傷つけば傷つくほど、古傷が疼くように、俺の中のリクリエが暴れようとしていた。"
translation = "그리고 내가 상처 입으면 입을수록, 옛 상처가 욱신거리듯 내 안의 리크리에가 날뛰려 하고 있었다."

[[dialogue]]
speaker = "クロト"
original = "（また俺を乗っ取ろうとして……くっ……）"
translation = "(또 나를 집어삼키려…… 큭……)"

[[dialogue]]
speaker = "unk"
original = "俺の中でヘビがのたうち、暴れているような感覚。"
translation = "내 안에서 뱀이 꿈틀대며 날뛰는 듯한 감각."

[[dialogue]]
speaker = "unk"
original = "そのヘビが内側から俺を食い破ろうとしている。"
translation = "그 뱀이 안쪽에서부터 나를 먹어 치우려 하고 있다."

[[dialogue]]
speaker = "unk"
original = "ジグに注がれたリクリエの力は、梨緒によって焼かれたが、一度目覚めた厄災はそう簡単に静まってはくれなかった。"
translation = "지그에게 주입된 리크리에의 힘은 리오에 의해 태워졌지만, 한 번 깨어난 재앙은 그리 쉽게 가라앉아 주지 않았다."

[[dialogue]]
speaker = "チナ"
original = "「どうした……？\u3000つらそうだな……？\u3000なら──」"
translation = "「왜 그러냐…… 괴로워 보이는데……? 그렇다면──」"

[[dialogue]]
speaker = "チナ"
original = "「このまま押し切って串刺しにしてやる！！」"
translation = "「이대로 밀어붙여서 꼬챙이로 만들어 주마!!」"

[[dialogue]]
speaker = "クロト"
original = "「ぐああああっ！！？」"
translation = "「구아아아악!!?」"

[[dialogue]]
speaker = "unk"
original = "大槍を中心にして渦巻く嵐が、ドリルのように俺を削っていく。"
translation = "대창을 중심으로 소용돌이치는 폭풍이, 드릴처럼 나를 깎아낸다."

[[dialogue]]
speaker = "unk"
original = "このままでは良くて風穴が開くか、悪くて細切れか、それともリクリエに呑まれる方が早いか。"
translation = "이대로라면 운이 좋아야 몸에 구멍이 뚫리거나, 운이 나쁘면 잘게 조각나거나, 아니면 리크리에에 삼켜지는 게 더 빠를 것이다."

[[dialogue]]
speaker = "クロト"
original = "（せめて俺の中のリクリエを制御することができれば……そんなことできるのか……？）"
translation = "(적어도 내 안의 리크리에를 제어할 수만 있다면…… 그런 게 가능한 건가……?)"

[[dialogue]]
speaker = "クロト"
original = "（いや──）"
translation = "(아니──)"

[[dialogue]]
speaker = "unk"
original = "それを可能にする存在なら知っている。"
translation = "그것을 가능하게 할 존재라면 알고 있다."

[[dialogue]]
speaker = "unk"
original = "煌嶺はリクリエによって生み出されたモンスターを支配し、駒として扱うことができた。"
translation = "코레이는 리크리에에 의해 생겨난 몬스터를 지배하고, 장기말로 다룰 수 있었다."

[[dialogue]]
speaker = "unk"
original = "リクリエの力は、御せないものではない……！"
translation = "리크리에의 힘은, 다스릴 수 없는 것이 아니다……!"

[[dialogue]]
speaker = "クロト"
original = "（煌嶺にできるなら、俺にもできるはずだ……！）"
translation = "(코레이가 할 수 있다면, 나도 할 수 있을 터다……!)"

[[dialogue]]
speaker = "クロト"
original = "（破滅の力を、俺が支配する……！\u3000俺が従える……！）"
translation = "(파멸의 힘을, 내가 지배한다……! 내가 굴복시킨다……!)"

[[dialogue]]
speaker = "unk"
original = "俺の中で暴れるならいっそ解き放ってしまえばいい。"
translation = "내 안에서 날뛸 바에야 차라리 해방해 버리면 된다."

[[dialogue]]
speaker = "unk"
original = "リクリエの力を、この拳に乗せる──！"
translation = "리크리에의 힘을, 이 주먹에 싣는다──!"

[[dialogue]]
speaker = "チナ"
original = "「！？」"
translation = "「!?」"

[[dialogue]]
speaker = "unk"
original = "瞬間、幾重にも重なった破壊の波が俺を中心に迸った。"
translation = "순간, 겹겹이 쌓인 파괴의 파동이 나를 중심으로 뿜어져 나왔다."

[[dialogue]]
speaker = "クロト"
original = "「はーっ……はーっ……」"
translation = "「하아…… 하아……」"

[[dialogue]]
speaker = "unk"
original = "全身が痛む。まるで体を流れる血が酸になったみたいに熱い。"
translation = "온몸이 아프다. 마치 몸을 흐르는 피가 산성이 된 것처럼 뜨겁다."

[[dialogue]]
speaker = "unk"
original = "それでも今、リクリエに侵されることなく、その力だけを解き放つことができた。"
translation = "그럼에도 지금, 리크리에에 침식당하지 않고 그 힘만을 해방할 수 있었다."

[[dialogue]]
speaker = "チナ"
original = "「くっ……はぁ、はぁ……今、何をした……？」"
translation = "「큭…… 하아, 하아…… 지금, 뭘 한 거지……?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「今の感じ、もしかしてリクリエの……？\u3000自分の中に封印されたリクリエの力を使ったっていうの！？」"
translation = "「방금 그 느낌, 설마 리크리에의……? 자신 안에 봉인된 리크리에의 힘을 사용했다는 거야!?」"

[[dialogue]]
speaker = "クロト"
original = "「ああ……出たとこ勝負だったけどな。体がバラバラになるかと思った」"
translation = "「아아…… 운에 맡긴 도박이었지만 말이야. 몸이 산산조각 나는 줄 알았어.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「でもできたじゃない！\u3000さっすがクロトね！」"
translation = "「하지만 해냈잖아! 역시 쿠로토네!」"

[[dialogue]]
speaker = "チナ"
original = "「なっ、リクリエの……！？\u3000やっぱり魔王は破滅の化身じゃねえか！」"
translation = "「뭐, 리크리에의……!? 역시 마왕은 파멸의 화신이 아니냐!」"

[[dialogue]]
speaker = "チナ"
original = "「だが──時間切れだ」"
translation = "「하지만── 시간 초과다.」"

[[dialogue]]
speaker = "クロト"
original = "「！\u3000それは……？」"
translation = "「! 그건……?」"

[[dialogue]]
speaker = "チナ"
original = "「アタシがどうやってデネブから来てるか、気になってたんだろ？」"
translation = "「아타시가 어떻게 데네브에서 왔는지, 궁금했었지?」"

[[dialogue]]
speaker = "チナ"
original = "「その答えがこれだ。会長から賜ったこいつを使うことで、アタシはアルタイルへの転移が可能になった」"
translation = "「그 답이 이거다. 회장님으로부터 하사받은 이것을 사용함으로써, 아타시는 알타이르로의 전이가 가능해졌지.」"

[[dialogue]]
speaker = "クロト"
original = "（気配でわかる。あれから発せられるのは、俺──魔王ラクシスと同じ力）"
translation = "(기척으로 알 수 있어. 저기서 뿜어져 나오는 건, 나── 마왕 락시스와 같은 힘.)"

[[dialogue]]
speaker = "クロト"
original = "（ラクシスの世界を渡る力を、何らかの方法で抽出したもの。だがどうやってそんな真似を……？）"
translation = "(락시스의 세계를 건너는 힘을, 어떤 방법으로 추출한 것. 하지만 어떻게 그런 짓을……?)"

[[dialogue]]
speaker = "unk"
original = "いずれ解明せねばならないことだが、重要なのは今ここでチナが何をしようとしているか──"
translation = "언젠가 해명해야 할 일이지만, 중요한 것은 지금 여기서 치나가 무엇을 하려 하는가──"

[[dialogue]]
speaker = "チナ"
original = "「この装置には世界を行き来するほかに、もう１つ使い方がある」"
translation = "「이 장치에는 세계를 오가는 것 말고도, 또 하나의 사용법이 있다.」"

[[dialogue]]
speaker = "チナ"
original = "「限界を超えてブーストさせることで、すでに滅びたベガに接続し、次元を歪ませて空間を崩壊させる。これで流星市国は消し飛ぶ」"
translation = "「한계를 넘어 부스트시킴으로써, 이미 멸망한 베가에 접속해, 차원을 왜곡시켜 공간을 붕괴시킨다. 이걸로 유성시국은 날아간다.」"

[[dialogue]]
speaker = "チナ"
original = "「アタシも極星従騎も、こいつを臨界させるための時間稼ぎだよ。つまりアタシたちの勝ちだ」"
translation = "「아타시도 극성종기도, 이 녀석을 임계시키기 위한 시간 벌기였어. 즉 아타시들의 승리다.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「空間を崩壊……？\u3000よくわからないけど、すっごく危ないってことよね！？\u3000あなた最初からそのつもりで！？」"
translation = "「공간을 붕괴……? 잘은 모르겠지만, 엄청 위험하다는 거지!? 너 처음부터 그럴 생각으로!?」"

[[dialogue]]
speaker = "チナ"
original = "「デネブを守るためなら、アタシの命なんてどうだっていい！」"
translation = "「데네브를 지키기 위해서라면, 아타시의 목숨 따위 어찌 되든 좋아!」"

[[dialogue]]
speaker = "unk"
original = "まるで闇を凝固させたような、暗黒の球体。"
translation = "마치 어둠을 응고시킨 듯한, 암흑의 구체."

[[dialogue]]
speaker = "unk"
original = "放出されるエネルギーは尋常ではなく、仕組みを理解しない俺でも臨界に達しつつあるのが見てとれた。"
translation = "방출되는 에너지는 심상치 않았고, 구조를 이해하지 못하는 내가 봐도 임계점에 도달하고 있다는 것을 알 수 있었다."

[[dialogue]]
speaker = "ジグ"
original = "「君が私にいろいろ言うのは構わないんだけど、付き合ってあげられるかは別でね。そろそろ終わりに──」"
translation = "「네가 나에게 여러 가지 말하는 건 상관없지만, 어울려 줄 수 있는지는 별개라서 말이야. 슬슬 끝내기로──」"

[[dialogue]]
speaker = "梨緒"
original = "「ディメンションエクスウェーブ！」"
translation = "「디멘션 엑스 웨이브!」"

[[dialogue]]
speaker = "ジグ"
original = "「！？」"
translation = "「!?」"

[[dialogue]]
speaker = "梨緒"
original = "「くぅ……はぁっ……はぁっ……」"
translation = "「크윽…… 하아…… 하아……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「梨緒ちゃん！\u3000よかった……」"
translation = "「리오 짱! 다행이다……」"

[[dialogue]]
speaker = "unk"
original = "梨緒はジグに斬られる間際、翼を展開して威力を相殺していた。"
translation = "리오는 지그에게 베이기 직전, 날개를 전개해 위력을 상쇄하고 있었다."

[[dialogue]]
speaker = "unk"
original = "ギリギリのタイミングだったが、間に合わなければ無惨に両断されていただろう。"
translation = "아슬아슬한 타이밍이었지만, 늦었다면 처참하게 두 동강 났을 것이다."

[[dialogue]]
speaker = "ジグ"
original = "「く……」"
translation = "「큭……」"

[[dialogue]]
speaker = "unk"
original = "そして、不意を突いた一撃によりジグの仮面が砕けた。"
translation = "그리고, 허를 찌른 일격에 의해 지그의 가면이 부서졌다."

[[dialogue]]
speaker = "unk"
original = "今まで余裕を崩さなかったジグが、苦悶の表情を浮かべながら、手で隠すように顔を押さえる。"
translation = "지금까지 여유를 잃지 않았던 지그가, 고통스러운 표정을 지으며 손으로 가리듯 얼굴을 움켜쥔다."

[[dialogue]]
speaker = "梨緒"
original = "「リクリエの使徒の力は、仮面に宿ると聞いている。だからその仮面を剥いでやった」"
translation = "「리크리에의 사도의 힘은 가면에 깃든다고 들었어. 그래서 그 가면을 벗겨준 거야」"

[[dialogue]]
speaker = "梨緒"
original = "「思い出せ！\u3000君はレナーテ・<ruby>Ｚ<rt>ジグ</rt></ruby>・サイフリート！\u3000星騎士で、新星学園の星徒会長で、私と共にリクリエと戦っていた！」"
translation = "「기억해내! 너는 레나테 Z<rt>지그</rt> 자이프리트! 성기사이자 신성학원의 성도회장이었고, 나와 함께 리크리에와 싸웠어!」"

[[dialogue]]
speaker = "ジグ"
original = "「アガ……サ……」"
translation = "「아가…… 사……」"

[[dialogue]]
speaker = "梨緒"
original = "「そうだ、アガサだ！\u3000副会長の、梨緒・Ａ・クリステレスだ！」"
translation = "「그래, 아가사야! 부회장인 리오 A 크리스테레스라고!」"

[[dialogue]]
speaker = "梨緒"
original = "「戻ってこい、ジグ！\u3000私と一緒に、今度こそ世界を救おう！」"
translation = "「돌아와, 지그! 나와 함께 이번에야말로 세계를 구하자!」"

[[dialogue]]
speaker = "ジグ"
original = "「世界を……救う……」"
translation = "「세계를…… 구한다……」"

[[dialogue]]
speaker = "ジグ"
original = "「いいや、それは無理だ」"
translation = "「아니, 그건 무리다」"

[[dialogue]]
speaker = "梨緒"
original = "「──！？」"
translation = "「──!?」"

[[dialogue]]
speaker = "ジグ"
original = "「私は可能性を見た。だけど世界を救える未来なんてどこにもなかった」"
translation = "「나는 가능성을 보았어. 하지만 세계를 구할 수 있는 미래 따위 어디에도 없었지」"

[[dialogue]]
speaker = "梨緒"
original = "「可能性……？\u3000君は何を言って……？」"
translation = "「가능성……? 너 무슨 말을……?」"

[[dialogue]]
speaker = "unk"
original = "先ほど割れた仮面が瘴気に変わり、再びジグに取り憑く。"
translation = "방금 깨진 가면이 장기로 변해 다시 지그에게 들러붙는다."

[[dialogue]]
speaker = "unk"
original = "そして新たな仮面がジグの顔を覆い、使徒であった時の軽薄さを取り戻す。"
translation = "그리고 새로운 가면이 지그의 얼굴을 뒤덮으며, 사도였을 때의 경박함을 되찾는다."

[[dialogue]]
speaker = "ジグ"
original = "「レナーテ・Ｚ・サイフリート……ふむ、確かに私はそう呼ばれていたこともあったようだ。君が正しかったみたいだね、そこは謝ろう」"
translation = "「레나테 Z 자이프리트…… 흠, 확실히 나도 그렇게 불리던 때가 있었던 것 같네. 네가 맞았던 모양이야, 그 점은 사과하지」"

[[dialogue]]
speaker = "ジグ"
original = "「でも今の私には、遠い昔……まるで前世のことのように感じるよ」"
translation = "「하지만 지금의 나에게는 먼 옛날…… 마치 전생의 일처럼 느껴져」"

[[dialogue]]
speaker = "ジグ"
original = "「もう一度言おう。私は“真なる神の騎士”。かつてベガで戦っていた星騎士とは別の存在だ」"
translation = "「다시 한번 말하지. 나는 “진정한 신의 기사”. 과거 베가에서 싸웠던 성기사와는 별개의 존재다」"

[[dialogue]]
speaker = "ジグ"
original = "「だけどそろそろタイムアップかな。巻き込まれたくないから、私は退散させてもらうよ」"
translation = "「하지만 슬슬 타임 오버일까. 휘말리고 싶지 않으니, 나는 퇴장하도록 할게」"

[[dialogue]]
speaker = "unk"
original = "転送装置の臨界を察知し、即座に撤退を選ぶジグ。"
translation = "전송 장치의 임계를 감지하고 즉시 철수를 선택하는 지그."

[[dialogue]]
speaker = "梨緒"
original = "「待て！\u3000逃げるな、ジグ……！」"
translation = "「기다려! 도망치지 마, 지그……!」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ちょっと待った。教皇庁がヤバいことになってるよ」"
translation = "「잠깐만. 교황청이 장난 아니게 됐어」"

[[dialogue]]
speaker = "梨緒"
original = "「何……！？」"
translation = "「뭐……!?」"

[[dialogue]]
speaker = "クロト"
original = "「俺は──俺たちはアルタイルを守る。君の思い通りにはさせない」"
translation = "「나는── 우리들은 알타이르를 지킨다. 네 뜻대로 하게 두지 않겠어」"

[[dialogue]]
speaker = "チナ"
original = "「いいや、アタシの意地は通させてもらう！\u3000アルタイルとともに消えろ、魔王！！」"
translation = "「아니, 내 고집은 끝까지 부려주겠어! 알타이르와 함께 사라져라, 마왕!!」"

[[dialogue]]
speaker = "unk"
original = "装置を破壊しようと拳を振りかぶる俺に、幾度も受けたチナの槍が迫る。"
translation = "장치를 파괴하려고 주먹을 휘두르는 나에게, 몇 번이고 겪었던 치나의 창이 육박한다."

[[dialogue]]
speaker = "unk"
original = "吹き荒れる嵐は、巻き込まれれば細切れにされる暴風のミキサー。"
translation = "휘몰아치는 폭풍은 휘말리면 갈기갈기 찢기는 폭풍의 믹서."

[[dialogue]]
speaker = "unk"
original = "バチバチと弾ける紫電は、敵を焼き焦がす破壊の閃光。"
translation = "치직거리며 튀는 자전은 적을 태워버리는 파괴의 섬광."

[[dialogue]]
speaker = "クロト"
original = "（<ruby>破滅<rt>リクリエ</rt></ruby>の力よ、俺に従え──！）"
translation = "(<ruby>파멸<rt>리크리에</rt></ruby>의 힘이여, 나에게 복종하라──!)"

[[dialogue]]
speaker = "unk"
original = "チナは俺たちと同じ──いやそれ以上の覚悟を持ってこの戦いに臨んだ。"
translation = "치나는 우리와 같은── 아니, 그 이상의 각오를 가지고 이 싸움에 임했다."

[[dialogue]]
speaker = "unk"
original = "彼女は俺たちの世界を滅ぼそうとする敵だ。それでも。"
translation = "그녀는 우리 세계를 멸망시키려는 적이다. 그럼에도."

[[dialogue]]
speaker = "unk"
original = "自分の世界を守るために命を捨てる彼女を──死なせたくない！"
translation = "자신의 세계를 지키기 위해 목숨을 버리는 그녀를── 죽게 하고 싶지 않아!"

[[dialogue]]
speaker = "unk"
original = "俺は多くを望んでいるのだろう。我がままで欲張りなのかもしれない。"
translation = "내가 너무 많은 것을 바라는 것일지도 모른다. 이기적이고 욕심쟁이일지도 모른다."

[[dialogue]]
speaker = "unk"
original = "でも──"
translation = "하지만──"

[[dialogue]]
speaker = "クロト"
original = "「俺はこの道を往く！」"
translation = "「나는 이 길을 가겠어!」"

[[dialogue]]
speaker = "チナ"
original = "「カラミティ──」"
translation = "「칼라미티──」"

[[dialogue]]
speaker = "クロト"
original = "「デッドリー──」"
translation = "「데들리──」"

[[dialogue]]
speaker = "チナ"
original = "「バスタァーーーーーーッッ！！！」"
translation = "「버스타아아아아아아아아악!!!」"

[[dialogue]]
speaker = "クロト"
original = "「クラスターーーーーーッ！！！」"
translation = "「클러스터어어어어어어어억!!!」"

[[dialogue]]
speaker = "unk"
original = "破滅の力を宿した拳が、暴風をまとった槍とぶつかる。"
translation = "파멸의 힘을 품은 주먹이 폭풍을 두른 창과 충돌한다."

[[dialogue]]
speaker = "チナ"
original = "「うおおおおーーーーーーっ！！！」"
translation = "「우오오오오오오오오오오!!!」"

[[dialogue]]
speaker = "クロト"
original = "「おおおおおおおおっ！！！」"
translation = "「오오오오오오오오오오오!!!」"

[[dialogue]]
speaker = "unk"
original = "体が千切れそうになりながら放つ、今の全てを込めた一撃。"
translation = "몸이 찢어질 듯한 고통 속에서 내지르는, 지금의 모든 것을 담은 일격."

[[dialogue]]
speaker = "unk"
original = "そしてチナの槍がひび割れていって──"
translation = "그리고 치나의 창에 금이 가기 시작하고──"

[[dialogue]]
speaker = "チナ"
original = "「く──あああああっ！！？」"
translation = "「큭── 아아아아악!!?」"

[[dialogue]]
speaker = "unk"
original = "槍が先端から砕け散り、拳撃を受けたチナが地面に打ち付けられた。"
translation = "창이 끝부분부터 부서져 나가고, 권격을 받은 치나가 지면에 처박혔다."

[[dialogue]]
speaker = "unk"
original = "同時にチナのセレスティアが砕け、変身が解ける。"
translation = "동시에 치나의 셀레스티아가 깨지며 변신이 풀린다."

[[dialogue]]
speaker = "クロト"
original = "「装置を止めないと！」"
translation = "「장치를 멈춰야 해!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「任せて！\u3000とりあえず壊しちゃうわよ！」"
translation = "「맡겨줘! 일단 부숴버리겠어!」"

[[dialogue]]
speaker = "unk"
original = "デネブへと渡る装置は必要だが、今は無理やりにでも止めるしかない。"
translation = "데네브로 건너가는 장치는 필요하지만, 지금은 억지로라도 멈출 수밖에 없다."

[[dialogue]]
speaker = "unk"
original = "放り出された装置を破壊しようと、ヴィーナスが星術を繰り出す。"
translation = "내동댕이쳐진 장치를 파괴하기 위해 비너스가 성술을 펼친다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「！？\u3000星術が飲み込まれた！？」"
translation = "「!? 성술이 집어삼켜졌어!?」"

[[dialogue]]
speaker = "unk"
original = "だがヴィーナスが放った光条は装置を破壊することなく、暗黒に呑まれ、虚空へと消えた。"
translation = "하지만 비너스가 쏜 광조는 장치를 파괴하지 못한 채 암흑에 삼켜져 허공으로 사라졌다."

[[dialogue]]
speaker = "梨緒"
original = "「いったい何が起こっている！？」"
translation = "「도대체 무슨 일이 일어나고 있는 거지!?」"

[[dialogue]]
speaker = "フィオナ"
original = "「異常な気配を察知しましたが、一体なにが……！？」"
translation = "「이상한 기운을 감지했습니다만, 대체 무엇이……!?」"

[[dialogue]]
speaker = "unk"
original = "それぞれ別々の方向から、梨緒たち選挙管理委員会と、フィオナが降り立つ。"
translation = "각기 다른 방향에서 리오 일행인 선거관리위원회와 피오나가 내려선다."

[[dialogue]]
speaker = "unk"
original = "それぞれ状況がどうなったのかを確認したかったが、今は装置を止める方が先だ！"
translation = "각자 상황이 어떻게 되었는지 확인하고 싶었지만, 지금은 장치를 멈추는 게 우선이다!"

[[dialogue]]
speaker = "クロト"
original = "「チナが転送装置を暴走させて、流星市国を消し飛ばそうとしてるんだ。装置を壊さないと！」"
translation = "「치나가 전송 장치를 폭주시켜서 유성시국을 날려버리려고 하고 있어. 장치를 부숴야 해!」"

[[dialogue]]
speaker = "梨緒"
original = "「何！？\u3000なら私が──！」"
translation = "「뭐!? 그렇다면 내가──!」"

[[dialogue]]
speaker = "unk"
original = "梨緒が矢を撃つが、やはりあの装置に呑み込まれるだけだ。"
translation = "리오가 화살을 쏘지만, 역시 저 장치에 삼켜질 뿐이다."

[[dialogue]]
speaker = "クロト"
original = "「くっ……！」"
translation = "「큭……!」"

[[dialogue]]
speaker = "unk"
original = "俺がやっても同じこと。拳から放った闇の波動は、装置が繋げた異次元へと吸い込まれる。"
translation = "내가 해도 마찬가지다. 주먹에서 뿜어낸 어둠의 파동은 장치가 연결한 이차원으로 빨려 들어간다."

[[dialogue]]
speaker = "チナ"
original = "「ほんの一瞬だけ、遅かったな……もうこうなったら誰にも止められない……」"
translation = "「정말 찰나의 순간, 늦었군…… 이제 이렇게 되면 누구도 멈출 수 없어……」"

[[dialogue]]
speaker = "チナ"
original = "「アタシと一緒に消えるんだよ、オマエらは。諦めな……」"
translation = "「나와 함께 사라지는 거야, 너희들은. 포기해……」"

[[dialogue]]
speaker = "梨緒"
original = "「何か……あれを破壊、ないし消滅させる手段は……──！」"
translation = "「무언가…… 저것을 파괴, 내지는 소멸시킬 수단은……──!」"

[[dialogue]]
speaker = "梨緒"
original = "「ナターシャ！\u3000シエルの鍵を！」"
translation = "「나타샤! 시엘의 열쇠를!」"

[[dialogue]]
speaker = "ナターシャ"
original = "「あ、そゆこと。じゃあ……一番近くにいる魔王にパスっ」"
translation = "「아, 그런 거. 그럼…… 가장 가까이 있는 마왕에게 패스」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、受け取った！」"
translation = "「아아, 받았어!」"

[[dialogue]]
speaker = "unk"
original = "ナターシャから光の球──シエルの鍵を受け取る。"
translation = "나타샤로부터 빛의 구체── 시엘의 열쇠를 건네받는다."

[[dialogue]]
speaker = "unk"
original = "これは対象を完全に消滅させるプログラム。"
translation = "이것은 대상을 완전히 소멸시키는 프로그램."

[[dialogue]]
speaker = "unk"
original = "効くかどうかはわからないが、これを試すしかない……！"
translation = "통할지는 모르겠지만, 이것을 시도해볼 수밖에 없어……!"

[[dialogue]]
speaker = "クロト"
original = "「これで──どうだ！？」"
translation = "「이걸로── 어떠냐!」"

[[dialogue]]
speaker = "クロト"
original = "「よし、消滅した！」"
translation = "「좋아, 소멸했다!」"

[[dialogue]]
speaker = "クロト"
original = "「！？」"
translation = "「!?」"

[[dialogue]]
speaker = "unk"
original = "目の前が真っ暗に染まる。"
translation = "눈앞이 새까맣게 물든다."

[[dialogue]]
speaker = "unk"
original = "先を見通せない深淵がそこに広がっていた。"
translation = "앞을 내다볼 수 없는 심연이 그곳에 펼쳐져 있었다."

[[dialogue]]
speaker = "フィオナ"
original = "「ひ、人を吸い込むほどの風が、あの穴から……！」"
translation = "「사, 사람을 빨아들일 정도의 바람이 저 구멍에서……!」"

[[dialogue]]
speaker = "クロト"
original = "「くっ……吸い込まれる……！」"
translation = "「큭…… 빨려 들어간다……!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「クロト……！\u3000きゃぁあああっ！？」"
translation = "「쿠로토……! 꺄아아아악!?」"

[[dialogue]]
speaker = "フィオナ"
original = "「緋宮会長……！\u3000ヴィーナスさん！！\u3000きゃぁあああっ！？」"
translation = "「히노미야 회장님……! 비너스 씨!! 꺄아아아악!?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「うわー……これが空間の裂け目ってやつ？\u3000装置は壊したけど、開けた穴は残っちゃったわけか」"
translation = "「우와─…… 이게 공간의 균열이라는 거야? 장치는 부쉈지만, 뚫린 구멍은 남았다는 건가」"

[[dialogue]]
speaker = "ナターシャ"
original = "「あ、ダメだこれ──」"
translation = "「아, 안 되겠다 이거──」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ナターシャちゃん！？\u3000わわっ、吸い込まれる～っ！？」"
translation = "「나타샤 짱!? 와와, 빨려 들어가아~!?」"

[[dialogue]]
speaker = "チナ"
original = "「副会長！？\u3000どうしてここに！？」"
translation = "「부회장!? 어째서 여기에!?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「……！\u3000チナちゃんっ！」"
translation = "「……! 치나 짱!」"

[[dialogue]]
speaker = "チナ"
original = "「うわっ！？」"
translation = "「우왓!?」"

[[dialogue]]
speaker = "unk"
original = "ベアトリスの槍が、暗黒へと吸い込まれそうになるチナを弾き飛ばす。"
translation = "베아트리스의 창이 암흑 속으로 빨려 들어갈 뻔한 치나를 튕겨낸다."

[[dialogue]]
speaker = "ベアトリス"
original = "「きゃぁああっ！？」"
translation = "「꺄아아악!?」"

[[dialogue]]
speaker = "unk"
original = "だがベアトリスもナターシャを追うように、時空の彼方に消える。"
translation = "하지만 베아트리스도 나타샤를 쫓듯 시공의 저편으로 사라진다."

[[dialogue]]
speaker = "梨緒"
original = "「副会長……！？\u3000ベアトが……極星の……！？」"
translation = "「부회장……!? 베아토가…… 극성의……!?」"

[[dialogue]]
speaker = "梨緒"
original = "「くっ……うぁああっ……！？」"
translation = "「큭…… 우아아악……!?」"

[[dialogue]]
speaker = "unk"
original = "ベアトリスとチナの反応に混乱したまま、梨緒も虚空に呑み込まれていった。"
translation = "베아트리스와 치나의 반응에 혼란스러워하던 채로, 리오도 허공에 삼켜져 갔다."

[[dialogue]]
speaker = "チナ"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "そして空間の穴が閉じ、その場には戦う力を失ったチナだけが残された。"
translation = "그리고 공간의 구멍이 닫히고, 그 자리에는 싸울 힘을 잃은 치나만이 남겨졌다."

[[dialogue]]
speaker = "クロト"
original = "「く……うぅ……」"
translation = "「큭…… 으으……」"

[[dialogue]]
speaker = "unk"
original = "全身の痛みをこらえながら身を起こす。"
translation = "전신의 통증을 참으며 몸을 일으킨다."

[[dialogue]]
speaker = "unk"
original = "俺たちはチナと戦って、装置を破壊して……時空の穴に吸い込まれて……"
translation = "우리는 치나와 싸우고, 장치를 파괴하고…… 시공의 구멍에 빨려 들어가서……"

[[dialogue]]
speaker = "クロト"
original = "「みんな、無事か！？」"
translation = "「모두, 무사해!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私も平気よ！\u3000でも──」"
translation = "「나도 괜찮아! 하지만──」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ここ、どこ？」"
translation = "「여기, 어디야?」"

[[dialogue]]
speaker = "unk"
original = "見覚えのない近未来のビル群を見上げる。"
translation = "본 적 없는 근미래의 빌딩 숲을 올려다본다."

[[dialogue]]
speaker = "unk"
original = "俺たちは知らない世界に来たのだと、否が応でも思い知らされたのだった。"
