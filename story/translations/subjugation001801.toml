[[dialogue]]
speaker = "unk"
original = "──１２月。クリスマスが近づいてきたある日のこと。"
translation = "──12월. 크리스마스가 다가온 어느 날의 일."

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「う～ん……ヒマで～す。ヒマすぎま～す……」"
translation = "「으～음…… 심심해마시타. 너무 심심해마시타……」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「お客さんが少ないで～す……このままではワタシのドリームが達成デキませーん……」"
translation = "「손님이 적어마시타…… 이대로는 와타시의 드림이 달성되지 못해마시타……」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ワタシの夢は、ハッピーなリゾート結界で全世界で覆って、エンドレスサマーを完成させるコト……」"
translation = "「와타시의 꿈은, 해피한 리조트 결계로 전 세계를 덮어서, 엔들리스 서머를 완성시키는 것나리……」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「でも人が来てくれナイと、リゾート結界は大きくナリませーん……」"
translation = "「하지만 사람이 와주지 않으마시타면, 리조트 결계는 커지지 않아마시타……」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「そりゃもう冬だからねぇ～。それにクリスマスも間近だし～」"
translation = "「그거야 이제 겨울이니까 말야~. 게다가 크리스마스도 코앞이고~」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「う～ん、クリスマスのことよくワカらないです……。ケーキを食べてプレゼントをもらうのは知ってるんデスが……」"
translation = "「으～음, 크리스마스에 대해 잘 모르마시타……. 케이크를 먹고 선물을 받는 건 알고 있마시타만……」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「リプるんクリスマスを知らないの！？\u3000あ～でもそっか……リプるんは長い間結界の中で封印されてたんだもんね」"
translation = "「리플룽 크리스마스를 몰라!? 아~ 하지만 그렇겠네…… 리플룽은 오랫동안 결계 속에 봉인되어 있었으니까 말야」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「そうナンです！\u3000ズーっと結界の中で眠っていたので、知らないコトばっかりでーす！」"
translation = "「그렇마시타! 계~속 결계 속에서 잠들어 있어서, 모르는 것투성이마시타!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「シショーのところで、ケーキとチキンを食べた記憶はあるのデスが、普通のパーティーとどうチガウのでしょー？」"
translation = "「스승님 계신 곳에서, 케이크와 치킨을 먹은 기억은 있마시타만, 보통 파티와 어떻게 다르마시타?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「よかったら、クリスマスについてオシエテくれませんか？\u3000ソナエあればウレシイナです！」"
translation = "「괜찮다면, 크리스마스에 대해 가르쳐주시지 않겠마시타? 대비가 있으면 기쁘나리입니다!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「それを言うなら、備えあればウレイなし、だぜ！\u3000でもウレイってアタシもよく分かんない！」"
translation = "「그걸 말하려면, 유비무환이라고 해야지! 하지만 근심이라는 건 나도 잘 모르겠어!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ソレヨリも、本題はクリスマスでーす！\u3000クリスマスってそもそもナニモノですか？」"
translation = "「그것보다도, 본론은 크리스마스마시타! 크리스마스란 애초에 무엇나리입니까?」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「クリスマスは冬のイベントだよ♪\u3000みんなでウェーイ♪\u3000イェーイ☆\u3000って感じでパーティーするの！\u3000合言葉は……メリ～クリスマ～ス☆」"
translation = "「크리스마스는 겨울 이벤트야♪ 다 같이 웨~이♪ 이예~이☆ 하는 느낌으로 파티 하는 거! 암호는…… 메리~ 크리스마~스☆」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「？？？\u3000まるで意味がワカらないです！」"
translation = "「??? 도무지 의미를 모르겠마시타!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「サンタクロースっておじさんがプレゼントをくれてハッピー！\u3000トナカイのソリに乗って世界を駆け巡るんだぜ☆」"
translation = "「산타클로스라는 할아버지가 선물을 줘서 해피! 루돌프 썰매를 타고 세계를 누비는 거라구☆」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「サンタクロース！？\u3000新しいキャラクターが出てキマした！\u3000ますますワカらないです！」"
translation = "「산타클로스!? 새로운 캐릭터가 등장해마시타! 점점 더 모르겠마시타!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ごめんリプるん！\u3000アタシ説明下手だから！\u3000これ以上はクリスマスの達人に聞いて！」"
translation = "「미안 리플룽! 내가 설명을 잘 못 해서! 더 자세한 건 크리스마스 달인한테 물어봐!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「クリスマスのタツジン？\u3000そんな人思い浮カビませーん！」"
translation = "「크리스마스의 달인나리? 그런 사람 떠오르지 않아마시타!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「じゃあ頭のいい人！\u3000本とかいっぱい読んでて知識豊富な感じの！」"
translation = "「그럼 머리 좋은 사람! 책 같은 거 많이 읽어서 지식 풍부한 느낌의!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「本……本を読む人なら……モネですネ！\u3000モネならきっとクリスマスのゴクイを教えてくれるハズです！」"
translation = "「책…… 책을 읽는 사람이라면…… 모네마시타네! 모네라면 분명 크리스마스의 극의를 가르쳐 줄 것이마시타!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「モネはワタシの知らないコト、たくさん教えてくれマス。ワタシ、モネのことスキでーす！」"
translation = "「모네는 와타시가 모르는 것들, 잔뜩 가르쳐주마시타. 와타시, 모네를 좋아해마시타!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「モネちんとはクラスメイトなんだっけ。じゃあさっそく行ってきな！\u3000ここはアタシに任せて！」"
translation = "「모네칭이랑은 클래스메이트였지. 그럼 얼른 다녀와! 여기는 나한테 맡기고!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「アリガトございます！\u3000モネを探す旅へレッツゴーです！」"
translation = "「고맙마시타! 모네를 찾는 여행으로 렛츠고마시타!」"

[[dialogue]]
speaker = "unk"
original = "一方その頃──"
translation = "한편 그 무렵──"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「む、むむむ無理です！\u3000私に人工戦闘服なんて無理です！\u3000というか──」"
translation = "「무, 무무무 무리예요! 저에게 인공 전투복이라니 무리입니다! 그보다──」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「水着サンタクロースなんて恥ずかしすぎますよ～～～！！！」"
translation = "「수영복 산타클로스라니 너무 부끄럽다구요~~~!!!」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「──無理、とな。この九浄ヘレナに物申すというのか？」"
translation = "「──무리, 라 했느냐. 이 쿠죠 헬레나에게 이의를 제기하겠다는 건가?」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「いえいえいえ！！\u3000そんな滅相もございません！\u3000やらせていただきます！\u3000むしろやらせてください！」"
translation = "「아니요아니요아니요!! 그럴 리가 있겠습니까! 하겠습니다! 오히려 하게 해 주세요!」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ぷっ……ふふっ、ふふふっ♪\u3000冗談に決まっているだろう♪」"
translation = "「풋…… 후훗, 후후후♪ 당연히 농담이지♪」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「へ？」"
translation = "「헤?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「別に命令するつもりなど毛頭ない。ただ貴殿に可能性を感じたのだ」"
translation = "「딱히 명령할 생각 따위는 추호도 없다. 그저 귀하에게 가능성을 느꼈을 뿐이다」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「可能性……ですか？\u3000プリマステラにもなれていない私にですか？」"
translation = "「가능성…… 말인가요? 프리마스텔라도 되지 못한 저에게요?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「うむ。プリマステラになれずとも、貴殿は確かに星力の輝きを宿している。その光がまだ蕾ほどの大きさだろうとも、いつか花開くと信じている」"
translation = "「음. 프리마스텔라가 되지 못했어도, 귀하는 분명 성력의 광채를 품고 있다. 그 빛이 아직 꽃봉오리만 한 크기일지라도, 언젠가 꽃피울 것이라 믿고 있다」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ヘレナさん……！\u3000そんなに私のことを信じて……！」"
translation = "「헬레나 씨……! 그렇게나 저를 믿어주시다니……!」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "（実のところ、水着サンタのデザインが彼女に似合うと感じたからなのだが。まぁ嘘は言っていないから問題あるまい）"
translation = "（사실은, 수영복 산타 디자인이 그녀에게 어울린다고 느꼈기 때문이지만. 뭐 거짓말은 아니니 문제없겠지）"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ですけど、やっぱり恥ずかしいものは恥ずかしいです……！\u3000大体なんでクリスマス服と水着のミックスなんですか！？\u3000季節感を大切にしましょう！」"
translation = "「그렇지만, 역시 부끄러운 건 부끄러운 거예요……! 애당초 왜 크리스마스 옷이랑 수영복을 섞은 건가요!? 계절감을 소중히 하자구요!」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「別にサンタが水着を着ていてもおかしくはないだろう。海の向こうでは、夏にサンタがサーフィンをしているのだぞ？」"
translation = "「딱히 산타가 수영복을 입고 있어도 이상할 건 없지 않느냐. 바다 너머에서는, 여름에 산타가 서핑을 하기도 한다고?」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「この国は普通に今冬ですけど！？」"
translation = "「이 나라는 지금 평범하게 겨울인데요!?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「まあよいではないか。クリスマスには水着のサンタだと私の魂が叫ぶのだ。このヘレナちゃんソウルは最早誰にも止められん」"
translation = "「뭐 어떠냐. 크리스마스에는 수영복 산타라고 내 영혼이 외치고 있다. 이 헬레나짱 소울은 이제 아무도 멈출 수 없지」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「それにこの話は貴殿にとって悪いことばかりではないぞ。とっておきの報酬も考えているからな」"
translation = "「게다가 이 이야기는 귀하에게 나쁜 일만은 아니다. 특별한 보수도 생각하고 있으니까 말이야」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「とっておきの報酬……ですか？」"
translation = "「특별한 보수…… 말인가요?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ああ、もし、貴殿がこの人工戦闘服のテスターを受けると言うならば……九浄家秘蔵の書庫を解放してやろう！」"
translation = "「그래, 만약 귀하가 이 인공 전투복의 테스터를 수락한다면…… 쿠죠 가문 비장의 서고를 개방해 주마!」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「くくく九浄家の蔵書を読み漁ってもいいんですか！？\u3000好きなだけ！！」"
translation = "「쿠쿠쿠 쿠죠 가문의 장서를 마음껏 읽어도 되는 건가요!? 원하는 만큼!!」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「無論だ。貴殿が嫌になるまで読み尽くすがいい」"
translation = "「물론이다. 귀하가 지겨워질 때까지 마음껏 읽도록 해라」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「嫌になんてなるわけがありませんよ！\u3000同じ本も読み直す度に違った味わいがありますし本たちも手に取る度に喜んでくれて──」"
translation = "「지겨워질 리가 없잖아요! 같은 책도 다시 읽을 때마다 다른 맛이 있고 책들도 손에 잡을 때마다 기뻐해 줘서──」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「──はっ！\u3000すみません、１人で興奮してしまって……」"
translation = "「──핫! 죄송합니다, 혼자 흥분해 버려서……」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「よい。学園の理事長としても、生徒の生き生きとした姿を見るのは喜ばしいことである」"
translation = "「좋다. 학원 이사장으로서도, 학생의 생생한 모습을 보는 것은 기쁜 일이지」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「……して、モネよ。改めて問おう。人工戦闘服のテスターを引き受けてくれるか？」"
translation = "「……그리하여, 모네여. 다시 묻겠다. 인공 전투복의 테스터를 맡아주겠느냐?」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「はい！\u3000やらせてください！\u3000まだ見ぬ本たちのため……いえ、学園の未来のために！」"
translation = "「네! 하게 해주세요! 아직 보지 못한 책들을 위해…… 아니, 학원의 미래를 위해서!」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「うむ、よく言った。貴殿がテスターを引き受けてくれると信じていたぞ」"
translation = "「음, 잘 말했다. 귀하가 테스터를 맡아줄 것이라 믿고 있었다」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「それではモネよ、水着サンタクロースとして星騎士の使命を全うするのだ！」"
translation = "「그럼 모네여, 수영복 산타클로스로서 성기사의 사명을 완수하도록 해라!」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「はい！\u3000私、がんばります！」"
translation = "「네! 저, 열심히 할게요!」"

