[[dialogue]]
speaker = "unk"
original = "第6話,キリカの気持ち,B"
translation = "제6화, 키리카의 마음, B"

[[dialogue]]
speaker = "unk"
original = "模擬戦に敗北した次の日。キリカは<b>ただの</b>メイドとして、食事の用意に掃除に洗濯と……日課の仕事を真面目にこなしていた。"
translation = "모의전에서 패배한 다음 날. 키리카는 <b>단순한</b> 메이드로서 식사 준비와 청소, 빨래 등…… 일과를 성실히 해내고 있었다."

[[dialogue]]
speaker = "キリカ"
original = "「（この後のタスクは、メイド隊全体の作業状況を確認して、日間スケジュールの再調整を――）」"
translation = "「(이 다음 업무는 메이드대 전체의 작업 상황을 확인하고 일간 스케줄을 재조정――)」"

[[dialogue]]
speaker = "キリカ"
original = "「（って、それはメイド長がするべき仕事ですよね。私が今やるべきことは、星見家のメイドとして速やかに、厳かに仕事をこなすこと……）」"
translation = "「(앗, 그건 메이드장이 해야 할 일이죠. 제가 지금 해야 할 일은 호시미 가문의 메이드로서 신속하고 엄숙하게 일을 해내는 것……)」"

[[dialogue]]
speaker = "キリカ"
original = "「（なのに……どうして今の私は、清らかな気持ちでいられないのでしょう？）」"
translation = "「(그런데…… 어째서 지금의 저는 맑은 기분으로 있을 수 없는 걸까요?)」"

[[dialogue]]
speaker = "キリカ"
original = "「ふぅ……」"
translation = "「후우……」"

[[dialogue]]
speaker = "ニャリオン"
original = "「なんニャ、キリカ、いつもは口うるさい癖して、今日は妙に静かで調子が狂うニャン。ぺろぺろ……」"
translation = "「뭐냐냐, 키리카. 평소엔 잔소리쟁이인 주제에 오늘은 묘하게 조용해서 기분이 이상하다냥. 낼름낼름……」"

[[dialogue]]
speaker = "キリカ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "ニャリオン"
original = "「って、ワガハイを無視するニャ！\u3000いつもなら掃除の邪魔とか言って、抱っこしてどかしてくるのに、なんで今日はスルーするニャン！？」"
translation = "「어이, 이 몸을 무시하지 말라냐! 평소라면 청소 방해된다고 안아서 치웠을 텐데, 왜 오늘은 그냥 넘어가는 거냥!?」"

[[dialogue]]
speaker = "キリカ"
original = "「あ、なんだ、そこにいたのですか、ニャリオン。気づきませんでした」"
translation = "「아, 뭐야, 거기 있었나요, 냐리온. 눈치채지 못했습니다」"

[[dialogue]]
speaker = "ニャリオン"
original = "「お前が部屋に入ってきてからずっと、ここで毛づくろいしてたニャン！\u3000フィオナ嬢の使い魔であるワガハイに挨拶の１つもなしとか、失礼なのニャ！」"
translation = "「네가 방에 들어왔을 때부터 계속 여기서 털 손질 하고 있었다냥! 피오나 아가씨의 사역마인 이 몸에게 인사 한마디 없다니, 무례하다냐!」"

[[dialogue]]
speaker = "キリカ"
original = "「……申し訳ないですが、今はあなたに構うような気分ではないので、そこで大人しく毛づくろいしてて下さい」"
translation = "「……미안하지만 지금은 상대를 해 줄 기분이 아니니, 거기서 얌전히 털이나 고르고 있으세요」"

[[dialogue]]
speaker = "ニャリオン"
original = "「もしかしてお前、またこの間みたいに風邪でも引いてるニャン？」"
translation = "「혹시 너, 또 요전번처럼 감기라도 걸린 거냥?」"

[[dialogue]]
speaker = "キリカ"
original = "「なんでですか。引いてませんよ、別に」"
translation = "「어째서 그렇게 되나요. 안 걸렸어요, 딱히」"

[[dialogue]]
speaker = "ニャリオン"
original = "「でも、風邪引いた時みたいに元気がないニャ。さっきもため息ついてたニャン」"
translation = "「하지만 감기 걸렸을 때처럼 기운이 없다냐. 아까도 한숨 쉬었다냥」"

[[dialogue]]
speaker = "ニャリオン"
original = "「大丈夫なのかニャン？\u3000本当に具合が悪いなら、メイド長だからってカッコつけてないで、ちゃんとみんなに言うべきニャ」"
translation = "「괜찮은 거냥? 정말 몸이 안 좋으면 메이드장이라고 폼 잡지 말고 제대로 모두에게 말해야 한다냐」"

[[dialogue]]
speaker = "キリカ"
original = "「別に病気とかではないので、大丈夫です。それに私はもう、メイド長ではありませんから」"
translation = "「딱히 병 같은 건 아니니까 괜찮습니다. 게다가 저는 이제 메이드장이 아니니까요」"

[[dialogue]]
speaker = "ニャリオン"
original = "「何を言ってるのニャ？\u3000キリカがメイド長じゃないって、どういうことニャン？」"
translation = "「무슨 소리를 하는 거냐냐? 키리카가 메이드장이 아니라니, 그게 무슨 소리냥?」"

[[dialogue]]
speaker = "キリカ"
original = "「私は元々、メイド長には相応しくなかったんです。だから、本来あるべき形に戻った……それだけのことです」"
translation = "「저는 원래 메이드장에는 어울리지 않았던 겁니다. 그래서 본래 있어야 할 모습으로 돌아간 것…… 그뿐인 일입니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「――あなたは本当にそれでいいと思ってるの？\u3000キリカ」"
translation = "「――당신은 정말로 그걸로 괜찮다고 생각하는 거야? 키리카」"

[[dialogue]]
speaker = "キリカ"
original = "「……！\u3000フィオナお嬢様……」"
translation = "「……! 피오나 아가씨……」"

[[dialogue]]
speaker = "フィオナ"
original = "「緋宮会長が、私のところにきて、事情を話してくれたわ」"
translation = "「히노미야 회장이 나에게 와서 사정을 이야기해 줬어」"

[[dialogue]]
speaker = "フィオナ"
original = "「キリカ、あなたは真面目すぎる。そこが良いところだけど、悪いところでもある」"
translation = "「키리카, 당신은 너무 성실해. 그게 장점이기도 하지만 단점이기도 하지」"

[[dialogue]]
speaker = "フィオナ"
original = "「もう１度聞くわ。あなたは本当に、メイド長じゃなくなっていいの？」"
translation = "「다시 한번 물을게. 당신은 정말로 메이드장이 아니어도 괜찮아?」"

[[dialogue]]
speaker = "キリカ"
original = "「……構いません。マリオンさんの方が、私より強くて、優秀で、相応しいメイドだと思いますから」"
translation = "「……상관없습니다. 마리온 씨가 저보다 강하고 우수하며 어울리는 메이드라고 생각하니까요」"

[[dialogue]]
speaker = "フィオナ"
original = "「じゃあなんで、そんなに不貞腐れてるの？」"
translation = "「그럼 왜 그렇게 뾰로통해 있는 거야?」"

[[dialogue]]
speaker = "キリカ"
original = "「えっ……不貞腐れてる……？\u3000私が……？」"
translation = "「엣…… 뾰로통하다니……? 제가요……?」"

[[dialogue]]
speaker = "フィオナ"
original = "「それ以外にないでしょ。負けて、突然メイド長の座を奪われたから、不貞腐れて、塞ぎ込んでる」"
translation = "「그것 말고는 없잖아. 져서 갑자기 메이드장 자리를 빼앗겼으니까 삐쳐서 틀어박혀 있는 거」"

[[dialogue]]
speaker = "キリカ"
original = "「そんなことは……」"
translation = "「그런 일은……」"

[[dialogue]]
speaker = "フィオナ"
original = "「わかるよ、私には。キリカがたとえ、自分では認めたくないんだとしてもね。だって――」"
translation = "「나는 알아. 키리카가 설령 스스로는 인정하고 싶지 않다고 해도 말이야. 왜냐하면――」"

[[dialogue]]
speaker = "フィオナ"
original = "「私は幼なじみとして、キリカのことをずっと見てきたんだから」"
translation = "「나는 소꿉친구로서 키리카를 계속 봐 왔으니까」"

[[dialogue]]
speaker = "キリカ"
original = "「フィオナお嬢様……」"
translation = "「피오나 아가씨……」"

[[dialogue]]
speaker = "フィオナ"
original = "「キリカ、昔、私に言ってくれたことがあったよね？」"
translation = "「키리카, 옛날에 나에게 해 줬던 말이 있었지?」"

[[dialogue]]
speaker = "フィオナ"
original = "「私が星見フィオナであろうとした時に、自分を忘れないで欲しい、って」"
translation = "「내가 호시미 피오나로 있으려 할 때, 자신을 잊지 말아 달라고」"

[[dialogue]]
speaker = "フィオナ"
original = "「それと同じことを今、私も言うね」"
translation = "「지금 똑같은 말을 나도 할게」"

[[dialogue]]
speaker = "フィオナ"
original = "「キリカ、あなたの真面目さを、私は心から尊敬してる。あなたの背中を見ることで、私は今日まで<b>星見フィオナ</b>をやってこれた」"
translation = "「키리카, 당신의 성실함을 나는 진심으로 존경해. 당신의 뒷모습을 봄으로써 나는 오늘까지 <b>호시미</b> <b>피오나</b>로 있을 수 있었어」"

[[dialogue]]
speaker = "フィオナ"
original = "「だけどね、そうやって真面目であろうとするあなたに、自分の気持ちを忘れないで欲しいって、私は思う」"
translation = "「하지만 말이야, 그렇게 성실하려 하는 당신이 자신의 마음을 잊지 않았으면 좋겠어」"

[[dialogue]]
speaker = "フィオナ"
original = "「キリカ、相応しいとか、相応しくないとか、そんなこと今更考えなくていいんだよ」"
translation = "「키리카, 어울린다느니 어울리지 않는다느니 그런 거 이제 와서 생각하지 않아도 돼」"

[[dialogue]]
speaker = "フィオナ"
original = "「あなたは２年間、星見家のメイド長として、どこに出ても恥ずかしくない真面目な働きをしてきた。そのことは主人である私が保証する」"
translation = "「당신은 2년 동안 호시미 가문의 메이드장으로서 어디에 내놓아도 부끄럽지 않은 성실한 업무를 해왔어. 그 사실은 주인인 내가 보증할게」"

[[dialogue]]
speaker = "フィオナ"
original = "「だから後は、キリカの気持ちの問題なんだよ」"
translation = "「그러니까 남은 건 키리카의 마음 문제야」"

[[dialogue]]
speaker = "フィオナ"
original = "「キリカがメイド長の仕事が好きなのか、嫌いなのか、これはそういう話なの」"
translation = "「키리카가 메이드장 일을 좋아하는지 싫어하는지, 이건 그런 이야기라고」"

[[dialogue]]
speaker = "ニャリオン"
original = "「ニャーニャッニャッニャッ♪\u3000なんかもうそれって、キリカのさっきまでの態度で、答え出てるようなものニャン？」"
translation = "「냐냐냐냐냥♪ 왠지 벌써 그건 키리카의 아까까지의 태도에서 답이 나온 거나 마찬가지다냥?」"

[[dialogue]]
speaker = "キリカ"
original = "「……お嬢様、ありがとうございます。それと――」"
translation = "「……아가씨, 감사합니다. 그리고――」"

[[dialogue]]
speaker = "キリカ"
original = "「ニャリオン、あなたにも」"
translation = "「냐리온, 당신에게도요」"

[[dialogue]]
speaker = "ニャリオン"
original = "「ニャニャッ！？\u3000き、キリカがワガハイにお礼を……！？\u3000明日は槍でも降るんじゃないかニャン！？」"
translation = "「냐냐!? 키, 키리카가 이 몸에게 감사를……!? 내일은 하늘에서 창이라도 내리는 거 아니냐냥!?」"

[[dialogue]]
speaker = "キリカ"
original = "「失礼な猫ですね、人がわざわざ礼を言っているのに、素直に受け取らないとは……」"
translation = "「무례한 고양이네요. 사람이 모처럼 감사를 전하고 있는데 순순히 받아들이지 않다니……」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふふっ♪\u3000キリカ、少しは元気が出たようですね」"
translation = "「후훗♪ 키리카, 조금은 기운이 난 모양이네요」"

[[dialogue]]
speaker = "マリオン"
original = "「――メイド長の座、取り戻しにきましたか」"
translation = "「――메이드장 자리, 되찾으러 왔나요?」"

[[dialogue]]
speaker = "キリカ"
original = "「はい」"
translation = "「네」"

[[dialogue]]
speaker = "マリオン"
original = "「それでは改めて聞きましょう、キリカさん。何故あなたは、メイド長になりたいのですか？」"
translation = "「그럼 다시 묻겠어요, 키리카 씨. 왜 당신은 메이드장이 되고 싶은 거죠?」"

[[dialogue]]
speaker = "キリカ"
original = "「それは私の――失いたくない『誇り』だからです」"
translation = "「그건 저의―― 잃고 싶지 않은 『긍지』이기 때문입니다」"

[[dialogue]]
speaker = "キリカ"
original = "「私は２年前、あなたから押し付けられるようにメイド長になりました。だから別に、執着なんてないと、そう思っていました」"
translation = "「저는 2년 전, 당신에게 떠밀리듯 메이드장이 되었습니다. 그래서 딱히 집착 같은 건 없다고 그렇게 생각했었죠」"

[[dialogue]]
speaker = "キリカ"
original = "「ですが、いざメイド長の座を失って、初めて気づきました。私はいつの間にか、メイド長であることを誇りに思っていたんです」"
translation = "「하지만 막상 메이드장 자리를 잃고서야 처음으로 깨달았습니다. 저는 어느샌가 메이드장인 것을 자랑스럽게 여기고 있었던 겁니다」"

[[dialogue]]
speaker = "キリカ"
original = "「だから……申し訳ありませんが、あなたにはやはり、メイド長の座を返すことはできません」"
translation = "「그러니까…… 죄송하지만 당신에게는 역시 메이드장 자리를 돌려줄 수 없습니다」"

[[dialogue]]
speaker = "キリカ"
original = "「私は今日、自分の意志で、メイド長になります」"
translation = "「저는 오늘 제 의지로 메이드장이 되겠습니다」"

[[dialogue]]
speaker = "unk"
original = "師匠……！"
translation = "스승님……!"

[[dialogue]]
speaker = "マリオン"
original = "「うふふふ<emoji=heart04>\u3000なるほど」"
translation = "「우후후후<emoji=heart04> 과연」"

[[dialogue]]
speaker = "マリオン"
original = "「どうやら、この前よりも、いい勝負が期待できそうですね♪」"
translation = "「아무래도 지난번보다 좋은 승부를 기대할 수 있겠네요♪」"

[[dialogue]]
speaker = "マリオン"
original = "「――人形縫製」"
translation = "「――인형 봉제」"

[[dialogue]]
speaker = "マリオン"
original = "「さあ、キリカさん、見せて下さい。本気になったあなたの力を！」"
translation = "「자, 키리카 씨, 보여 주세요. 진심이 된 당신의 힘을!」"

[[dialogue]]
speaker = "キリカ"
original = "「――変身」"
translation = "「――변신」"

[[dialogue]]
speaker = "キリカ"
original = "「――マリオンさん。いえ、前メイド長」"
translation = "「――마리온 씨. 아니, 전 메이드장」"

[[dialogue]]
speaker = "キリカ"
original = "「私はメイド長の誇りにかけて、あなたに勝ちます！」"
translation = "「저는 메이드장의 긍지를 걸고 당신에게 이기겠습니다!」"

[[dialogue]]
speaker = "unk"
original = "２人のメイド星騎士による激闘が、幕を開けるのだった。"
translation = "두 명의 메이드 성기사에 의한 격투가 막을 여는 것이었다."

