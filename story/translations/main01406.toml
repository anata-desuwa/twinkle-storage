[[dialogue]]
speaker = "unk"
original = "第８話,運命の始原者,B"
translation = "제8화, 운명의 시원자, B"

[[dialogue]]
speaker = "クロト"
original = "「────」"
translation = "「────」"

[[dialogue]]
speaker = "unk"
original = "遠ざかっていた自我が戻ってくる。"
translation = "멀어져 갔던 자아가 돌아온다."

[[dialogue]]
speaker = "unk"
original = "この映像が、俺にしか共有されなかった理由も、完璧にわかった。"
translation = "이 영상이, 나에게만 공유된 이유도, 완벽하게 알았다."

[[dialogue]]
speaker = "クロト"
original = "（<ruby>先代魔王<rt>ラクシス</rt></ruby>の記憶は──俺自身の記憶で……）"
translation = "（<ruby>선대 마왕<rt>락시스</rt></ruby>의 기억은―― 나 자신의 기억이고……）"

[[dialogue]]
speaker = "クロト"
original = "（それに──母さん……）"
translation = "（게다가―― 엄마……）"

[[dialogue]]
speaker = "unk"
original = "血の繋がりがないことは知っていた。俺に幼い頃の記憶がないのも。"
translation = "혈연관계가 없다는 것은 알고 있었다. 나에게 어린 시절의 기억이 없는 것도."

[[dialogue]]
speaker = "unk"
original = "でも、あんな出会い方をしていただなんて知らなかった。明かせない事情がまだあったのだろう。"
translation = "하지만, 저런 만남을 가졌었다니 몰랐다. 밝힐 수 없는 사정이 아직 있었겠지."

[[dialogue]]
speaker = "unk"
original = "フィオナと俺は何が違うのか？\u3000その疑問にも答えが出た。"
translation = "피오나와 나는 무엇이 다른가? 그 의문에도 답이 나왔다."

[[dialogue]]
speaker = "クロト"
original = "（自らが封印されることも、未来へ子孫を残すことも……どちらも、ラクシスが選んだ道だったんだ）"
translation = "（스스로가 봉인되는 것도, 미래에 자손을 남기는 것도…… 둘 다, 락시스가 선택한 길이었어.）"

[[dialogue]]
speaker = "unk"
original = "３０００年という長き時を経て、彼の願いはその双方ともに結実した。"
translation = "3000년이라는 오랜 시간을 거쳐, 그의 소원은 그 양쪽 모두 결실을 맺었다."

[[dialogue]]
speaker = "unk"
original = "フィオナ──そして星見の一族はきっと、あの時ラクシスと結ばれたフェリシアの<ruby>末裔<rt>まつえい</rt></ruby>。"
translation = "피오나―― 그리고 호시미 일족은 분명, 그때 락시스와 맺어진 펠리시아의 말예."

[[dialogue]]
speaker = "unk"
original = "その血は脈々と受け継がれ、現代に至るまでその血統は三界にも散らばった。"
translation = "그 피는 맥맥히 계승되어, 현대에 이르기까지 그 혈통은 삼계에도 흩어졌다."

[[dialogue]]
speaker = "unk"
original = "だからこそ彼女は魔王の血統──"
translation = "그러하기에 그녀는 마왕의 혈통――"

[[dialogue]]
speaker = "unk"
original = "対して、俺は末裔なんかじゃない。魔王そのものが生まれ変わった、同じ魂の存在なんだ。"
translation = "반면에, 나는 말예 따위가 아니야. 마왕 그 자체가 다시 태어난, 같은 혼의 존재인 거야."

[[dialogue]]
speaker = "unk"
original = "<ruby>先代魔王<rt>ラクシス</rt></ruby>がＳから授かった魔王の因子が、そのまま今の俺には眠っている──ってことなんだろう。"
translation = "<ruby>선대 마왕<rt>락시스</rt></ruby>이 S에게서 받은 마왕의 인자가, 그대로 지금의 나에게 잠들어 있다는―― 그런 뜻이겠지."

[[dialogue]]
speaker = "unk"
original = "だから……言うなら俺は、ニャリオンと同じだ。かつてのリクリエを戦った前世がある。"
translation = "그러니까…… 말하자면 나는, 냐리온과 같은 거야. 예전의 리크리에와 싸웠던 전생이 있어."

[[dialogue]]
speaker = "クロト"
original = "（先代の、魔王──ラクシス……あなたは……いや、俺は──）"
translation = "（선대의, 마왕―― 락시스…… 당신은…… 아니, 나는――）"

[[dialogue]]
speaker = "unk"
original = "小さい頃から、よくモンスターに襲われた。"
translation = "어릴 때부터, 자주 몬스터에게 습격당했다."

[[dialogue]]
speaker = "unk"
original = "それでも俺は星騎士になって、世界を救ってやりたいと思った。"
translation = "그래도 나는 성기사가 되어서, 세계를 구해주고 싶다고 생각했다."

[[dialogue]]
speaker = "unk"
original = "これまで歩んできた人生の軌跡に、答え合わせがなされたような気がした。"
translation = "지금까지 걸어온 인생의 궤적에, 정답 맞추기가 이루어진 듯한 기분이 들었다."

[[dialogue]]
speaker = "クロト"
original = "（自分のことなのに……ふ。実感が湧かないのはなんでだろうな。やっぱり、完全に同一じゃないってことか）"
translation = "（내 일인데도…… 후. 실감이 나지 않는 건 왜일까. 역시, 완전히 동일하지는 않다는 건가.）"

[[dialogue]]
speaker = "unk"
original = "思いがけず明かされた緋宮クロトという人間のルーツに、俺はどこか他人事めいた情感を抱いていた。"
translation = "뜻밖에 밝혀진 히노미야 쿠로토라는 인간의 뿌리에, 나는 어딘가 남의 일 같은 감정을 품고 있었다."

[[dialogue]]
speaker = "unk"
original = "だが……今は感傷に浸っている場合でもない。"
translation = "하지만…… 지금은 감상에 젖어 있을 때도 아니다."

[[dialogue]]
speaker = "unk"
original = "俺は俺。彼ではない。けれど、彼の願いを継いだ者として、使命を果たさなくちゃならないのだから。"
translation = "나는 나. 그가 아니다. 하지만, 그의 소원을 이은 자로서, 사명을 다해야만 하니까."

[[dialogue]]
speaker = "ガーディアン"
original = "「ピ……ガ……侵入禁止。侵入禁止。直ちに立チ去レ」"
translation = "「삐…… 가…… 침입 금지. 침입 금지. 즉시 떠나라.」"

[[dialogue]]
speaker = "ガーディアン"
original = "「これより先は人間界。《境界》の侵犯は認められない」"
translation = "「이곳보다 앞은 인간계. 경계의 침범은 인정할 수 없다.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ちょ──なんなの！\u3000もうボスは倒したってのに……まだ立ちふさがる気！？」"
translation = "「잠깐── 뭐야! 이미 보스는 쓰러뜨렸는데…… 아직도 가로막을 생각이야!?」"

[[dialogue]]
speaker = "フィオナ"
original = "「なんという数──あれだけ生産されていたガーディアンは、ここに配備されていたようですね……！」"
translation = "「이 무슨 수―― 저렇게나 생산되던 가디언은, 여기에 배치되어 있었던 것 같군요……!」"

[[dialogue]]
speaker = "unk"
original = "人間界まであと一歩。"
translation = "인간계까지 앞으로 한 걸음."

[[dialogue]]
speaker = "unk"
original = "そこまで昇りつめた俺たちを待ち受けていたのは、おびただしいガーディアンの軍勢だった。"
translation = "그곳까지 올라선 우리를 기다리고 있던 것은, 엄청나게 많은 가디언의 군세였다."

[[dialogue]]
speaker = "ガーディアン"
original = "「《境界》守護天使からの応答を確認……エラー。エラー。自律迎撃へ移行する」"
translation = "「경계 수호 천사로부터의 응답을 확인…… 에러. 에러. 자율 요격으로 이행한다.」"

[[dialogue]]
speaker = "サーシャ"
original = "「魔界から人間界をまたいじゃダメ──って言いたいのかしら」"
translation = "「마계에서 인간계를 넘어선 안 된다――고 말하고 싶은 걸까.」"

[[dialogue]]
speaker = "ソフィア"
original = "「《境界》──ってマグダレナさんの……？\u3000主を失って暴走しているのでしょうか」"
translation = "「경계――는 막달레나 씨의……? 주인을 잃고 폭주하고 있는 걸까요.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「人間界はすぐそこよ！\u3000引き下がるわけにはいかないんだから！」"
translation = "「인간계는 바로 저기야! 물러설 수는 없으니까!」"

[[dialogue]]
speaker = "ユウリ"
original = "「つっても、これだけの数を掃除してくのは骨が折れるぜ──！」"
translation = "「그렇다고 해도, 이 정도 수를 청소해 나가는 건 힘든 일이라고――!」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは何度も言った。俺は真の魔王になるんだって。"
translation = "비너스는 몇 번이나 말했다. 나는 진정한 마왕이 될 거라고."

[[dialogue]]
speaker = "unk"
original = "でも、もしかしたら俺は……最初からそうだったのかもしれない。"
translation = "하지만, 어쩌면 나는…… 처음부터 그랬을지도 모른다."

[[dialogue]]
speaker = "クロト"
original = "「……みんな。俺に任せてくれ」"
translation = "「……모두. 나에게 맡겨 줘.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「クロト──？」"
translation = "「쿠로토――?」"

[[dialogue]]
speaker = "クロト"
original = "「境界を越えるなら──それはきっと、俺の役目だ」"
translation = "「경계를 넘는다면―― 그건 분명, 나의 역할이다.」"

[[dialogue]]
speaker = "unk"
original = "一歩踏み出す。その時ふと、Ｓが<ruby>魔王<rt>おれ</rt></ruby>に残した言葉がよみがえった。"
translation = "한 걸음 내딛는다. 그때 문득, S가 마왕에게 남긴 말이 되살아났다."

[[dialogue]]
speaker = "unk"
original = "『平行する全ての可能性を切り<ruby>拓<rt>ひら</rt></ruby>く力──それは他の誰にもない、君だけのものだ』"
translation = "『평행하는 모든 가능성을 개척하는 힘―― 그것은 다른 누구에게도 없는, 너만의 것이다.』"

[[dialogue]]
speaker = "unk"
original = "かつての<ruby>魔王<rt>おれ</rt></ruby>はオルタナティブ宇宙を切り拓いた。"
translation = "과거의 마왕는 올터너티브 우주를 개척했다."

[[dialogue]]
speaker = "unk"
original = "花びらのように重なった無数の可能性から、唯一の道筋を選び取った。"
translation = "꽃잎처럼 겹쳐진 무수한 가능성으로부터, 유일한 길을 선택했다."

[[dialogue]]
speaker = "クロト"
original = "（なら……今の俺にも同じ資質が受け継がれているんだろう。それは、決してＳにさえ真似できなかったもの）"
translation = "（그렇다면…… 지금의 나에게도 같은 자질이 계승되었겠지. 그것은 결코 S조차 흉내 낼 수 없었던 것）"

[[dialogue]]
speaker = "unk"
original = "そして、過去の己を覗いてわかったことがもうひとつある。"
translation = "그리고, 과거의 자신을 들여다보고 알게 된 것이 또 하나 있다."

[[dialogue]]
speaker = "クロト"
original = "（デネブも、ベガも、アルタイルも……元々この宇宙にはなかった。ラクシスが生きたのも、ひとつの運命だけだったんだ）"
translation = "（데네브도, 베가도, 알타이르도…… 원래 이 우주에는 없었다. 라크시스가 살았던 것도, 하나의 운명뿐이었다.）"

[[dialogue]]
speaker = "unk"
original = "だけど、世界は三つに分かたれた。"
translation = "하지만, 세계는 셋으로 나뉘었다."

[[dialogue]]
speaker = "unk"
original = "『花』と称されたラクシスが世界樹へ眠り、緋宮クロトという人間が誕生したことによって、予言通り揺らぎが生じた。"
translation = "『꽃』이라 칭해진 라크시스가 세계수로 잠들고, 히노미야 쿠로토라는 인간이 탄생함으로써, 예언대로 흔들림이 생겼다."

[[dialogue]]
speaker = "unk"
original = "いわば俺は──広がる平行世界の『根』となったのだ。"
translation = "말하자면 나는── 퍼져나가는 평행 세계의 『뿌리』가 된 것이다."

[[dialogue]]
speaker = "unk"
original = "可能性を広げるどころか、同時に三種もの未来を存続させうる根源に。"
translation = "가능성을 넓히기는커녕, 동시에 세 종류의 미래를 존속시킬 수 있는 근원에."

[[dialogue]]
speaker = "クロト"
original = "（だから──今の俺は、あらゆる可能性を束ね、そのすべてを切り拓く存在──）"
translation = "（그러니까── 지금의 나는, 모든 가능성을 묶어, 그 모든 것을 개척하는 존재──）"

[[dialogue]]
speaker = "クロト"
original = "「──フロンティアドライブ──」"
translation = "「──프론티어 드라이브──」"

[[dialogue]]
speaker = "ガーディアン"
original = "「ピガ────────ッ！！！」"
translation = "「피가─────────!!!」"

[[dialogue]]
speaker = "マトイ"
original = "「！\u3000一気にまとめて……！」"
translation = "「! 단숨에 몰아붙여서……!」"

[[dialogue]]
speaker = "フィオナ"
original = "「さらなる覚醒──いえ、これは……魔力や霊力ではなく──？」"
translation = "「더욱더 각성── 아니, 이것은…… 마력이나 영력이 아니라──?」"

[[dialogue]]
speaker = "unk"
original = "一発の拳で十の敵を。十発の拳で百の敵を。"
translation = "한 방의 주먹으로 열의 적을. 열 방의 주먹으로 백의 적을."

[[dialogue]]
speaker = "unk"
original = "繰り出す俺の一挙手一投足に──追撃の影が生じていた！"
translation = "내뿜는 나의 일거수일투족에── 추격의 그림자가 생겨나고 있었다!"

[[dialogue]]
speaker = "クロト"
original = "（この感覚は……いつかも感じたことのある──）"
translation = "（이 감각은…… 언젠가도 느껴본 적 있는──）"

[[dialogue]]
speaker = "ギエル"
original = "『っ！？』"
translation = "『!?』"

[[dialogue]]
speaker = "ギエル"
original = "『……。今、何を……』"
translation = "『……. 지금, 무엇을……』"

[[dialogue]]
speaker = "unk"
original = "今。俺の拳は間違いなく防がれた。"
translation = "지금. 나의 주먹은 틀림없이 막혔다."

[[dialogue]]
speaker = "unk"
original = "だが……防がれた後で、もう一撃が命中した。"
translation = "하지만…… 막힌 후에, 또 한 방이 명중했다."

[[dialogue]]
speaker = "クロト"
original = "（……なんだ……？\u3000今の感覚は……？）"
translation = "（……뭐지……? 지금의 감각은……?）"

[[dialogue]]
speaker = "unk"
original = "これまでも幾度か生じていた<ruby>多重追撃<rt>ダブルアクション</rt></ruby>──だけど、意識的にコントロールできたのは初めてだった。"
translation = "지금까지도 몇 번인가 생겨났던 <ruby>다중 추격<rt>더블 액션</rt></ruby>── 하지만, 의식적으로 컨트롤할 수 있었던 것은 처음이었다."

[[dialogue]]
speaker = "クロト"
original = "「……ようやく理屈を理解できた。これは、魔王の特権じゃない」"
translation = "「……겨우 이치를 이해했다. 이것은, 마왕의 특권이 아냐」"

[[dialogue]]
speaker = "unk"
original = "平行世界の根源たる俺だからこそ可能な動き。"
translation = "평행 세계의 근원인 나이기에 가능한 움직임."

[[dialogue]]
speaker = "unk"
original = "それは──「あらゆる可能性を束ねる」一撃だった。"
translation = "그것은── 「모든 가능성을 묶는」 일격이었다."

[[dialogue]]
speaker = "クロト"
original = "（なら──もっと！）"
translation = "（그렇다면── 더욱!）"

[[dialogue]]
speaker = "unk"
original = "たとえ、千にひとつ、いや万にひとつしか希望がなかったとしても──"
translation = "설령, 천에 하나, 아니 만에 하나밖에 희망이 없다고 하더라도──"

[[dialogue]]
speaker = "unk"
original = "俺はこの手で、あらゆる世界の可能性を切り拓いてみせる！"
translation = "나는 이 손으로, 모든 세계의 가능성을 개척해 보이겠다!"

[[dialogue]]
speaker = "ソフィア"
original = "「なんという連撃──」"
translation = "「이런 연격이라니──」"

[[dialogue]]
speaker = "ユウリ"
original = "「一回のパンチで──何発入れてやがんだ……！？」"
translation = "「한 번의 펀치로── 몇 발을 넣고 있는 거야……!?」"

[[dialogue]]
speaker = "unk"
original = "無数のガーディアンを退け、最後に現れたのは高くそびえる一面の壁だった。"
translation = "무수한 가디언을 물리치고, 마지막에 나타난 것은 높이 솟아 있는 하나의 벽이었다."

[[dialogue]]
speaker = "クロト"
original = "「──壁か」"
translation = "「──벽인가」"

[[dialogue]]
speaker = "unk"
original = "魔界と人間界とを決定的に隔てる、最後の砦に違いない。"
translation = "마계와 인간계를 결정적으로 가로막는, 최후의 보루임이 틀림없다."

[[dialogue]]
speaker = "クロト"
original = "「ガーディアンが<ruby>人間界<rt>うえ</rt></ruby>へ逆流する恐れも捨てきれないが……手段を選んでる場合じゃない。強引にでも通してもらうぞ」"
translation = "「가디언이 인간계로 역류할 우려도 버릴 수 없지만…… 수단을 가릴 때가 아냐. 억지로라도 통과하겠다」"

[[dialogue]]
speaker = "unk"
original = "刹那の間に撃ち込む──万を超える正拳の乱打！"
translation = "찰나의 순간에 쏘아 넣는── 만을 넘어서는 정권의 난타!"

[[dialogue]]
speaker = "マトイ"
original = "「やった……！？」"
translation = "「해냈다……!?」"

[[dialogue]]
speaker = "ニャリオン"
original = "「開通ニャ！」"
translation = "「개통이냥!」"

[[dialogue]]
speaker = "クロト"
original = "「行こう。みんなが俺たちを待っている」"
translation = "「가자. 모두가 우리를 기다리고 있어」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ええっ！」"
translation = "「네엣!」"

