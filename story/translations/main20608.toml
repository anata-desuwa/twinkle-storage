[[dialogue]]
speaker = "unk"
original = "第８話,初めまして、母さん,B"
translation = "제8화, 처음 뵙겠습니다, 어머니, B"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「本当に無事で良かったわ♪\u3000こっちにクロトが来てるって知ってびっくりしちゃったんだから」"
translation = "「정말 무사해서 다행이야♪ 이쪽에 쿠로토가 와 있다는 걸 알고 깜짝 놀랐다니까」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「デネブの……母さん？」"
translation = "「데네브의…… 어머니?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ええ、私はあなたの知る私じゃない。とはいえ、ブレは大きくないと思うけど」"
translation = "「응, 나는 네가 아는 내가 아니야. 그렇다고 해도, 차이가 크지는 않다고 생각하지만」"

[[dialogue]]
speaker = "unk"
original = "思いがけない再会がもう１つ……いや、厳密には初対面だけど。"
translation = "생각지도 못한 재회가 또 하나…… 아니, 엄밀히는 첫 대면이지만."

[[dialogue]]
speaker = "unk"
original = "身にまとった装備こそ俺が知るものと異なるが、外見は俺がよく知る母さんだ。"
translation = "몸에 걸친 장비는 내가 아는 것과 다르지만, 외견은 내가 잘 아는 어머니다."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「さっきは久しぶりなんて言っちゃったけど、あなたにとっては全然久しぶりじゃないのかしら」"
translation = "「방금 오랜만이라고 해버렸지만, 너에게 있어서는 전혀 오랜만이 아닐지도 모르겠네」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「うん。今も一緒に暮らしてる」"
translation = "「응. 지금도 같이 살고 있어」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「そう。それは良かったわ」"
translation = "「그래. 그거 다행이네」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ごめんね……」"
translation = "「미안해……」"

[[dialogue]]
speaker = "unk"
original = "母さんが俺を抱きしめる。痛いくらい、ぎゅっと強く。"
translation = "어머니가 나를 껴안는다. 아플 정도로, 꽉 강하게."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「母さん……」"
translation = "「어머니……」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「お願い……あなたが別の世界のクロトだってわかってるけど……もう少しこのままでいさせて……」"
translation = "「부탁이야…… 네가 다른 세계의 쿠로토라는 건 알고 있지만…… 조금만 더 이대로 있게 해줘……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「うん……」"
translation = "「응……」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "俺の存在を確かめるように、母さんが腕に力を込める。"
translation = "나의 존재를 확인하듯이, 어머니가 팔에 힘을 준다."

[[dialogue]]
speaker = "unk"
original = "その感触は俺の記憶にも強く刻まれた。"
translation = "그 감촉은 나의 기억에도 강하게 새겨졌다."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「……ありがとう。もう大丈夫よ」"
translation = "「……고마워. 이제 괜찮아」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「いや～、恥ずかしいわ～。若い頃のクロトの姿を見たら、つい感情が爆発しちゃって」"
translation = "「이야~, 부끄럽네~. 젊은 시절의 쿠로토의 모습을 보니, 그만 감정이 폭발해 버려서」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「恥ずかしがることないよ。俺たち、親子なんだから」"
translation = "「부끄러워할 것 없어. 우리들, 부모 자식이니까」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「……そういうところ、本当にクロトね。アルタイルの私はいい子育てをしたみたいだわ」"
translation = "「……그런 점, 정말 쿠로토네. 알타이르의 나는 자식 농사를 잘 지은 모양이야」"

[[dialogue]]
speaker = "unk"
original = "デネブの母さんは、いい意味で俺の知る母さんと変わらなくて、本人を相手にしているみたいだ。"
translation = "데네브의 어머니는, 좋은 의미로 내가 아는 어머니와 다르지 않아서, 본인을 상대하고 있는 것 같다."

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「えーっと、魔王さんのお母さんってことは、ヴィーナスの──」"
translation = "「에─ 그러니까, 마왕 씨의 어머니라는 건, 비너스의──」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「そう、おばあちゃんよ～♪」"
translation = "「그래, 할머니란다~♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「おばあちゃ～ん♪」"
translation = "「할머니~♪」"

[[dialogue]]
speaker = "unk"
original = "ノリノリでハグする２人。"
translation = "신나서 허그하는 두 사람."

[[dialogue]]
speaker = "unk"
original = "血は繋がっていないけど、すでに息ぴったりだった。"
translation = "피는 이어져 있지 않지만, 벌써 호흡이 척척 맞았다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「おばあちゃんはうんとかわいがってくれるものって聞いたわ！」"
translation = "「할머니는 아주 많이 예뻐해 주는 분이라고 들었어!」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「そうよ～<emoji=heart04>\u3000ヴィーナスちゃんのしたいこと、何でもしてあげる～<emoji=heart04>」"
translation = "「그럼~<emoji=heart04> 비너스짱이 하고 싶은 거, 뭐든지 해줄게~<emoji=heart04>」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「そうだ、孫にはお小遣いあげなきゃだわ。アポロちゃん、ポチ袋ある？」"
translation = "「맞다, 손주에게는 용돈을 줘야지. 아폴로짱, 세뱃돈 봉투 있어?」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「あるわけないだろ。活動資金は貴重なんだから無駄遣いするな」"
translation = "「있을 리가 없잖아. 활동 자금은 귀중하니까 낭비하지 마」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ちぇっ、アポロちゃんったら、大きくなったらしっかり者になったわね。昔はあんなにかわいかったのに」"
translation = "「쳇, 아폴로짱도 참, 크더니 깐깐해졌네. 옛날에는 그렇게 귀여웠는데」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「誰のせいだ」"
translation = "「누구 때문인데」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ははは……」"
translation = "「하하하……」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスという娘の存在は受け入れたけど、それは同時に母さんがおばあちゃんになるということで。"
translation = "비너스라는 딸의 존재는 받아들였지만, 그것은 동시에 어머니가 할머니가 된다는 것이라."

[[dialogue]]
speaker = "unk"
original = "まさか平行世界で、おばあちゃん呼びするところを目にするとは思わなかった。"
translation = "설마 평행세계에서, 할머니라고 부르는 장면을 목격하게 될 줄은 몰랐다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あ──」"
translation = "「아──」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスのお腹の音が鳴る。"
translation = "비너스의 배꼽시계가 울린다."

[[dialogue]]
speaker = "unk"
original = "いろいろありすぎて失念していたけど、デネブに飛ばされる前からずっと戦いっぱなしで、長いこと何も食べてない。"
translation = "여러 가지 일이 너무 많아 잊고 있었지만, 데네브로 날려 오기 전부터 계속 싸움의 연속이라, 오랫동안 아무것도 먹지 못했다."

[[dialogue]]
speaker = "unk"
original = "一度意識してしまうと、猛烈な空腹感が襲ってくる。"
translation = "한번 의식하고 나니, 맹렬한 공복감이 덮쳐온다."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ふふ、誰も空腹には勝てないわよね。いろいろ説明していると時間かかっちゃうし、先にご飯にしましょうか」"
translation = "「후후, 누구도 공복에는 이길 수 없지. 여러 가지 설명하다 보면 시간이 걸릴 테니, 먼저 밥부터 먹을까」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「さんせーっ！」"
translation = "「찬성─!」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「今日はカレーよ！\u3000おかわりもあるからじゃんじゃん食べてちょうだい！」"
translation = "「오늘은 카레야! 리필도 있으니까 팍팍 먹으렴!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「いっただっきまーす！」"
translation = "「잘 먹겠습니다!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ん～っ！\u3000このカレー、とってもおいしいわ！」"
translation = "「음~! 이 카레, 정말 맛있어!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「スパイスが利いていて、なかなか本格的ですね……とっても美味しいです」"
translation = "「스파이스가 잘 들어서, 제법 본격적이네요…… 정말 맛있어요」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（確かに美味しい……でも母さんの味じゃない……？\u3000デネブだから？）"
translation = "（확실히 맛있다…… 하지만 어머니의 맛이 아니야……? 데네브라서?）"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「怪訝な顔しちゃってどうしたの、クロト？\u3000カレー口に合わなかった？」"
translation = "「의아한 표정을 짓고 왜 그러니, 쿠로토? 카레가 입에 안 맞아?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああいや、すごく美味しいんだけど……」"
translation = "「아니, 정말 맛있는데……」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「早速バレてるぞ、リノ」"
translation = "「금방 들켰군, 리노」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「てへぺろ♪」"
translation = "「데헤헷♪」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「？」"
translation = "「?」"

[[dialogue]]
speaker = "unk"
original = "このカレー、何か秘密があるんだろうか。"
translation = "이 카레, 뭔가 비밀이 있는 걸까."

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「このカレーを作ったのはあたしだ」"
translation = "「이 카레를 만든 건 나다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「姉さんが！？\u3000料理を！？」"
translation = "「언니가!? 요리를!?」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「驚きすぎだろ」"
translation = "「너무 놀라잖아」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「リノの料理は味を重視してないからな。秘密基地暮らしだし、美味しいものにありつこうと思ったら自分で作るしかない」"
translation = "「리노의 요리는 맛을 중시하지 않으니까 말이야. 비밀기지 생활이기도 하고, 맛있는 걸 먹으려면 직접 만드는 수밖에 없어」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「というわけで、レジスタンスではあたしが料理をするようになったんだ」"
translation = "「그런 이유로, 레지스탕스에서는 내가 요리를 하게 됐지」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「もうすっかりアポロちゃんの方が上手くなっちゃったのよねー」"
translation = "「이제 완전히 아폴로짱이 더 잘하게 되어버렸단다─」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「フランス料理のコースとかでなければ大体作れるようになったぞ。和食も中華も洋食も任せろ」"
translation = "「프랑스 요리 코스 같은 게 아니라면 대충 만들 수 있게 됐다. 일식도 중식도 양식도 맡겨줘」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「なるほど、こっちのアポロは料理上手なのね！」"
translation = "「과연, 이쪽의 아폴로는 요리를 잘하는구나!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「これが姉さんのカレー……ふぅむ……やっぱり美味しいです」"
translation = "「이게 언니의 카레…… 흠…… 역시 맛있네요」"

[[dialogue]]
speaker = "unk"
original = "フィオナが神妙な顔でアポロのカレーを食べる。"
translation = "피오나가 진지한 얼굴로 아폴로의 카레를 먹는다."

[[dialogue]]
speaker = "unk"
original = "アルタイルのアポロは料理をするイメージじゃなかったから、ギャップが大きかったのだろうか。"
translation = "알타이르의 아폴로는 요리를 하는 이미지가 아니었기에, 갭이 컸던 것일까."

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ちなみに食材はどこから持ってきてるの？」"
translation = "「그건 그렇고 식재료는 어디서 가져오는 거야?」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「レジスタンスには、実働メンバーのあたしとリノの他に、バックアップメンバーもいるんだ。資金や物資の調達はそっちに頼んでる」"
translation = "「레지스탕스에는 실동 멤버인 나와 리노 외에도, 백업 멤버도 있다. 자금이나 물자 조달은 그쪽에 부탁하고 있지」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「危険が及ばないようにあたしたちとは別行動してるから、詳しくはお前たちにも話せない」"
translation = "「위험이 미치지 않도록 우리와는 별개로 행동하고 있어서, 자세한 건 너희에게도 말할 수 없어」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ふーん、なるほど。ま、余計なことは聞かないのが賢明だね」"
translation = "「흐음, 그렇구나. 뭐, 쓸데없는 건 묻지 않는 게 현명하겠네」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「カレーおかわり！」"
translation = "「카레 더 줘!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺も！」"
translation = "「나도!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「私もお願いします……」"
translation = "「저도 부탁드려요……」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ああ、たくさん作ったから遠慮せずに食え！」"
translation = "「그래, 많이 만들었으니까 사양 말고 먹어!」"

[[dialogue]]
speaker = "unk"
original = "アポロのカレーは絶品で、激闘の後の空腹も相まって、大量のカレーをみんなで平らげたのだった。"
translation = "아폴로의 카레는 일품이었고, 격투 뒤의 공복까지 더해져, 대량의 카레를 다 함께 해치운 것이었다."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「さて、お腹が膨れたところで、改めて情報を整理しましょうか。デネブの状況について、まだよくわかっていないでしょうし」"
translation = "「자, 배도 찼으니 다시 정보를 정리해 볼까. 데네브의 상황에 대해 아직 잘 모르고 있을 테고」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「私たちもアルタイルの状況を知りたいし──」"
translation = "「우리도 알타이르의 상황을 알고 싶고──」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「このアラートは──侵入者！？」"
translation = "「이 알람은── 침입자!?」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「極星学園か？\u3000ルヴィネの手の者だったらまずいぞ！」"
translation = "「극성학원인가? 루비네의 수하라면 곤란한데!」"

[[dialogue]]
speaker = "unk"
original = "まさか俺たちをつけてきたのか？"
translation = "설마 우리를 미행한 건가?"

[[dialogue]]
speaker = "unk"
original = "最悪の場合、ここが戦場になるかもしれない。警戒しながら様子を伺うと──"
translation = "최악의 경우, 여기가 전장이 될지도 모른다. 경계하며 상황을 살피자──"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……すまない、邪魔させてくれ」"
translation = "「……미안하다, 방해 좀 하마」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「梨緒！？」"
translation = "「리오!?」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「こいつが梨緒？\u3000仲間なのか？」"
translation = "「이 녀석이 리오? 동료인가?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「うん、大丈夫。敵じゃないよ」"
translation = "「응, 괜찮아. 적이 아니야」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「梨緒ってばどこ行ってたのよ？\u3000心配してたんだから」"
translation = "「리오도 참 어디 갔었던 거야? 걱정했잖아」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ベアトを追っていた。戦いに駆けつけられなくて悪かった」"
translation = "「베아토를 쫓고 있었다. 싸움에 달려가지 못해서 미안하다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ベアトリスを……？」"
translation = "「베아트리스를……?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「詳しくはまた後で話す。私も整理がついていないんだ」"
translation = "「자세한 건 나중에 다시 이야기하마. 나도 아직 정리가 되지 않았거든」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「仲間なのはいいが、どうやってこの秘密基地に入った？\u3000普通は見つけることもできないはずだが」"
translation = "「동료인 건 좋다만, 어떻게 이 비밀기지에 들어왔지? 보통은 찾아내는 것조차 불가능할 텐데」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「それは──」"
translation = "「그건──」"

[[dialogue]]
speaker = "unk"
original = "梨緒とともに秘密基地にやってきたのはもう１人──"
translation = "리오와 함께 비밀기지에 찾아온 이는 한 명 더──"

[[dialogue]]
speaker_original = "環？"
speaker_translation = "타마키?"
original = "「やー、みんな、久しぶりー♪」"
translation = "「야호~ 모두들, 오랜만이야~♪」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「環！？\u3000いや守護天使のラクシャ……？」"
translation = "「타마키!? 아니, 수호천사 락샤……?」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「いやそれ同じじゃん」"
translation = "「아니, 그거 같은 사람이잖아」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「制服は着てないけど、キミの知ってる市倉環だよ。バイト仲間の緋宮クロトくん♪」"
translation = "「교복은 입고 있지 않지만, 네가 알고 있는 이치쿠라 타마키야. 알바 동료인 히노미야 쿠로토 군♪」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「どうやってこの秘密基地の場所を……？」"
translation = "「어떻게 이 비밀기지의 위치를……?」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「だってボクの<ruby>霊屑<rt>クロスダスト</rt></ruby>あげたじゃん。その反応を辿ってきたってわけ」"
translation = "「그야 내가 <ruby>영설<rt>크로스 더스트</rt></ruby>을 줬었잖아. 그 반응을 따라왔다는 말씀」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そもそも何しに来たのよ？\u3000黒騎士と一緒になって魔界へさらっていったこと、忘れてないんだからね！」"
translation = "「애초에 여기 왜 온 거야? 흑기사랑 한패가 돼서 마계로 납치해 갔던 거, 잊지 않았으니까!」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「ああ、そういうこともあったね。いやー、あれは危なかった」"
translation = "「아아, 그런 일도 있었지. 이야~ 그때는 위험했어」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「言っておくけど、ボクは敵じゃないよ。最初から今までずっとね」"
translation = "「말해두겠는데, 난 적이 아니야. 처음부터 지금까지 쭉 말이야」"

