[[dialogue]]
speaker = "unk"
original = "第３話,妹でありお姉さん,P"
translation = "제3화, 여동생이자 누나, P"

[[dialogue]]
speaker = "unk"
original = "その日、カフェテリアへ昼食をしに向かうと――"
translation = "그날, 카페테리아로 점심을 먹으러 향하자──"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あっ、お兄ちゃんだ！\u3000お兄ちゃ～ん♪」"
translation = "「앗, 오빠다! 오빠아~♪」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「本当だ！\u3000お兄ちゃんも今からお昼なの～？\u3000実はあたしたちもなんだ～」"
translation = "「정말이네! 오빠도 지금부터 점심이야~? 실은 우리도 그런데~」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ねぇねぇ、一緒に食べてもいい？」"
translation = "「저기 저기, 같이 먹어도 돼?」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「――あっ、お兄ちゃ～ん♪」"
translation = "「──앗, 오빠아~♪」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「今からお昼なの～？\u3000リコリンもなんだ～♪\u3000って……あれ？」"
translation = "「지금부터 점심이야~? 리코린도 그런데~♪ 어라……?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「え？\u3000お兄ちゃん……？」"
translation = "「에? 오빠……?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「これは――新たなる妹の波動を感じる……！」"
translation = "「이것은── 새로운 여동생의 파동이 느껴진다……!」"

[[dialogue]]
speaker = "unk"
original = "またも出会ってしまったか……"
translation = "또 마주쳐 버린 건가……"

[[dialogue]]
speaker = "unk"
original = "そんなわけで――"
translation = "그런 연유로──"

[[dialogue]]
speaker = "unk"
original = "俺たちはみんなで一緒に、相席をすることになった。"
translation = "우리들은 다 함께 합석을 하게 되었다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「なるほど、リコリンちゃんか～」"
translation = "「과연, 리코린짱이구나~」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「これからよろしくね、リコリン！」"
translation = "「앞으로 잘 부탁해, 리코린!」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「うん♪\u3000よろしくね」"
translation = "「응♪ 잘 부탁해」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「――メイプルお姉ちゃん、ルルカお姉ちゃん♪」"
translation = "「──메이플 언니, 루루카 언니♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「！？」"
translation = "「!?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「お姉ちゃん……だと……！？」"
translation = "「언니……라고……!?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「そのパターンは、考えてなかった……！」"
translation = "「그 패턴은 생각 못 했어……!」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「あれ……？\u3000もしかして、呼んじゃダメだった……？」"
translation = "「어라……? 혹시 부르면 안 됐어……?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「う、ううん！\u3000そんなことないよ！\u3000ちょっと驚いてるだけ！」"
translation = "「으, 으응! 그렇지 않아! 조금 놀랐을 뿐이야!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「そうそう！\u3000あたしたちもお兄ちゃんって呼んだりしてるわけだし……」"
translation = "「맞아 맞아! 우리도 오빠라고 부르기도 하니까……」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「よかった～♪\u3000えへへ♪」"
translation = "「다행이다~♪ 에헤헤♪」"

[[dialogue]]
speaker = "unk"
original = "（あざと可愛い……！）"
translation = "(영악하고 귀여워……!)"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「で、でも、あたしがお姉ちゃんに……。なんか、悪くない気がする……！\u3000ふふふ……♪」"
translation = "「하, 하지만 내가 언니가 되다니……. 왠지 나쁘지 않은 기분이야……! 흐흐흐……♪」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「くっ……！\u3000妹魔王である我が、更なる妹を眷族として迎えることになろうとは……！\u3000にへへ……♪」"
translation = "「큭……! 여동생 마왕인 내가, 새로운 여동생을 권속으로 맞이하게 될 줄이야……! 니헤헤……♪」"

[[dialogue]]
speaker = "unk"
original = "そうして、昼食をしながらリコリンのことについて色々と尋ねる２人。"
translation = "그렇게 점심을 먹으며 리코린에 대해 이것저것 묻는 두 사람."

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「――得意なこと？\u3000えっとね、リコリンは～、実はすごい特技があるんだ！」"
translation = "「──잘하는 거? 그게 말이지, 리코린은~ 실은 대단한 특기가 있어!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「特技？」"
translation = "「특기?」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「うん♪\u3000リコリンね、『大人のフリ』が得意なんだよ～？\u3000実際にやってみせると～」"
translation = "「응♪ 리코린 말이야, 『어른 흉내』를 잘 내거든~? 실제로 보여주자면~」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「――ほら、少年。ネクタイが少し乱れているぞ。お姉さんが整えてやろう」"
translation = "「──보아라, 소년. 넥타이가 조금 흐트러졌군. 이 누나가 다듬어주마」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「なっ……！？」"
translation = "「나앗……!?」"

[[dialogue]]
speaker = "unk"
original = "（素の喋り方を演技ってことにした！？）"
translation = "(본래의 말투를 연기인 걸로 쳤어!?)"

[[dialogue]]
speaker = "unk"
original = "大人の口調と表情になったリコさんは、俺のネクタイをそっと直して言う。"
translation = "어른스러운 어조와 표정이 된 리코 씨는 내 넥타이를 살며시 고쳐주며 말한다."

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「よし、こんなところか。ふっ……どうだ、ルルカ、メイプル」"
translation = "「좋아, 이 정도인가. 훗…… 어떠냐, 루루카, 메이플」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「これが『大人のフリ』をする時の私だ。なかなか様になっているだろう？」"
translation = "「이게 『어른 흉내』를 낼 때의 나다. 제법 폼이 나지 않나?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「す、すごい……！\u3000まるで本物の大人みたいで、魂が震える演技だよリコリン！\u3000演劇部にスカウトしたいくらい！」"
translation = "「대, 대단해……! 마치 진짜 어른 같아서 영혼이 떨리는 연기야, 리코린! 연극부에 스카우트하고 싶을 정도!」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「そうだろう？\u3000自分でもなかなか気に入っていてな。少年の前だと、この大人モードでよく話していたりするんだ」"
translation = "「그렇지? 나도 꽤 마음에 들어서 말이야. 소년 앞에서는 이 어른 모드로 자주 대화하고는 하지」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「ちなみに少年は、お姉さんと妹、どっちの私が好みなのかな？」"
translation = "「참고로 소년은 누나와 여동생, 어느 쪽인 내가 취향인가?」"

[[dialogue]]
speaker = "unk"
original = "えぇっ！？"
translation = "에에엣!?"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「ふふっ、なんだ、即決できないのか？\u3000お姉さんはどちらでもリクエストに応えてやるぞ？」"
translation = "「후후, 뭐야, 즉답하지 못하는 건가? 이 누나는 어느 쪽이든 리퀘스트에 응해줄 수 있다고?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「こ、これは……」"
translation = "「이, 이건……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「まさかの、附属生の妹でありながら、大人の姉にもなれる……その二刀流は強過ぎない？」"
translation = "「설마 했던, 부속생 여동생이면서 어른인 누나도 될 수 있다니…… 그 이도류는 너무 강한 거 아냐?」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「２人も、大人モードの時はお姉さんに甘えてくれても構わないぞ？」"
translation = "「두 사람도 어른 모드일 때는 이 누나에게 어리광 부려도 상관없다고?」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「――なんてね♪\u3000てへっ☆」"
translation = "「──라든가♪ 테헷☆」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「くっ、その能力……妹魔王である我が力をもってしても、戦慄を覚えざるを得ない……！」"
translation = "「큭, 그 능력…… 여동생 마왕인 나의 힘을 가지고서도 전율을 느끼지 않을 수 없군……!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「――じゃあ、リコリンちゃん、またね！\u3000ＤＩＳＣに妹同盟グループの勧誘メッセージ送っておくから♪」"
translation = "「──그럼 리코린짱, 다음에 봐! DISC로 여동생 동맹 그룹 권유 메시지 보낼 테니까♪」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ふっふっふ、同志リコリンよ。約束した通り、今度我が演劇部にそなたを招待しよう。楽しみにしているがいい！」"
translation = "「훗훗훗, 동지 리코린이여. 약속한 대로 다음에 우리 연극부에 그대를 초대하마. 기대하고 있도록!」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「うん！\u3000お姉ちゃんたち、またね～♪」"
translation = "「응! 언니들, 다음에 봐~♪」"

[[dialogue]]
speaker = "unk"
original = "昼食が終わった後、２人は手を振って、カフェテリアから去って行く。"
translation = "점심이 끝난 후, 두 사람은 손을 흔들며 카페테리아에서 떠나간다."

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「――ふっ、これでまた、リコリンの人脈が広がったな」"
translation = "「──훗, 이걸로 또 리코린의 인맥이 넓어졌군」"

[[dialogue]]
speaker = "unk"
original = "まさか、大人の喋り方を特技に見せるとは……"
translation = "설마 어른스러운 말투를 특기로 보이게 할 줄이야……"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「毒は薬にもなる、とはこういうことだ」"
translation = "「독은 약도 된다는 건 이런 뜻이다」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「お姉さんのこと、見直したか？\u3000ふふっ……♪」"
translation = "「이 누나를 다시 봤나? 후후……♪」"

[[dialogue]]
speaker = "unk"
original = "公安委員会の本部長、恐るべし。"
translation = "공안위원회 본부장, 무시무시하군."

[[dialogue]]
speaker = "unk"
original = "その手際に、おみそれしましたと口にしてしまう俺なのであった――"
translation = "그 솜씨에 항복했다는 말이 입 밖으로 나와버리는 나였다──"

