[[dialogue]]
speaker = "unk"
original = "第４話,今日はデート？,P"
translation = "제4화, 오늘은 데이트?, P"

[[dialogue]]
speaker = "セーラ"
original = "「ふんふん……ふんふん……うんっ、それじゃまた」"
translation = "「흠흠…… 흠흠…… 응, 그럼 나중에 봐」"

[[dialogue]]
speaker = "セーラ"
original = "「あ、ごめん。ちょっと電話してた。いやぁ～、この前はありがとねー」"
translation = "「아, 미안. 잠깐 전화 좀 했어. 이야~ 요전번엔 고마웠어」"

[[dialogue]]
speaker = "セーラ"
original = "「いやいやそんな謙遜しないでって。それにありがとうは、ガチャのことだけじゃないからね。ほら、こないだ一緒におばあちゃん案内したっしょ」"
translation = "「아냐 아냐 그렇게 겸손해하지 말라니까. 그리고 고맙다는 건 가챠 일뿐만이 아니니까 말이야. 봐봐, 저번에 같이 할머니 안내해 드렸잖아」"

[[dialogue]]
speaker = "セーラ"
original = "「あの時オススメのとこがあるって言ってたの覚えてる？\u3000あそこ行こーよ」"
translation = "「그때 추천하는 곳이 있다고 했던 거 기억나? 거기 가자」"

[[dialogue]]
speaker = "セーラ"
original = "「おっけー？\u3000じゃあ……デートしよっか」"
translation = "「오케이? 그럼…… 데이트할까」"

[[dialogue]]
speaker = "セーラ"
original = "「ぷっ、慌ててる慌ててる。……別にデートじゃないって？\u3000え～、男子と女子が一緒に歩いてたらデートっしょ」"
translation = "「풉, 당황한다 당황해. ……딱히 데이트가 아니라고? 에이~ 남자랑 여자가 같이 걷고 있으면 데이트지」"

[[dialogue]]
speaker = "セーラ"
original = "「それともうちとデートするの……イヤ？」"
translation = "「아니면 나랑 데이트하는 거…… 싫어?」"

[[dialogue]]
speaker = "unk"
original = "イヤじゃないです！"
translation = "싫지 않아요!"

[[dialogue]]
speaker = "セーラ"
original = "「ならよし。レッツゴ～」"
translation = "「그럼 됐어. 렛츠 고~」"

[[dialogue]]
speaker = "セーラ"
original = "「あ、ここここ。すいませーん、たい焼き２つくださーい。こしあんで」"
translation = "「아, 여기 여기. 저기요~ 붕어빵 두 개 주세요. 고운 팥앙금으로」"

[[dialogue]]
speaker = "セーラ"
original = "「ん？\u3000クレープかタピオカだと思った？\u3000ふっふん、ここのたい焼きめっちゃおいしいんだから」"
translation = "「음? 크레이프나 타피오카일 줄 알았어? 훗훗, 여기 붕어빵 진짜 맛있거든」"

[[dialogue]]
speaker = "セーラ"
original = "「ってあれ？\u3000もしかして会長さんもここ知ってた？\u3000さすがいろいろバイトしてただけはあるね、情報通なんだ」"
translation = "「어라? 혹시 회장님도 여기 알고 있었어? 역시 이것저것 알바를 많이 해서 그런지 정보통이네」"

[[dialogue]]
speaker = "セーラ"
original = "「あ、焼けたみたい。はい、会長さんの分」"
translation = "「아, 다 구워진 것 같아. 자, 회장님 몫」"

[[dialogue]]
speaker = "unk"
original = "おいしい！"
translation = "맛있다!"

[[dialogue]]
speaker = "セーラ"
original = "「ん～、おいしー♪\u3000ここのたい焼き、皮の厚さとあんこの甘さのバランスが絶妙なんだよね～」"
translation = "「음~ 맛있다♪ 여기 붕어빵은 반죽 두께랑 앙금 단맛의 밸런스가 절묘하다니까~」"

[[dialogue]]
speaker = "セーラ"
original = "「うち、流星市国に引っ越してくる前は割と田舎の方で暮らしててね。おばあちゃんがよくおまんじゅうとかくれたから、和菓子とかも好きなんだ」"
translation = "「나, 유성시국으로 이사 오기 전엔 꽤 시골에서 살았거든. 할머니가 만쥬 같은 거 자주 주셔서 화과자 같은 것도 좋아해」"

[[dialogue]]
speaker = "セーラ"
original = "「新しい味もいろいろ種類あるみたい。おじさん、アップルカスタードとキャラメルチョコくださーい」"
translation = "「새로운 맛도 여러 종류가 있는 것 같아. 아저씨, 애플 커스터드랑 캐러멜 초코 주세요~」"

[[dialogue]]
speaker = "セーラ"
original = "「はむはむ……アップルカスタードのたい焼きもイケるね。ね、そっちのキャラメルチョコも一口ちょうだい？」"
translation = "「함냐함냐…… 애플 커스터드 붕어빵도 괜찮네. 있지, 그쪽 캐러멜 초코도 한입만 줄래?」"

[[dialogue]]
speaker = "セーラ"
original = "「食べかけとか気にしない気にしない。うちのもあげるからさ。ほら、あーん」"
translation = "「먹던 거라도 신경 쓰지 마, 신경 쓰지 마. 내 것도 줄 테니까. 자, 아~앙」"

[[dialogue]]
speaker = "セーラ"
original = "「おいしい？\u3000へへっ、だよねー。リンゴの甘酸っぱさとカスタードが相性良くていくらでも食べられそうな感じ」"
translation = "「맛있어? 헤헤, 그치~ 사과의 새콤달콤함이랑 커스터드가 궁합이 좋아서 얼마든지 먹을 수 있을 것 같은 느낌이야」"

[[dialogue]]
speaker = "セーラ"
original = "「じゃあそっちのもらうよ。あ～んして、あ～ん。ほらほら、恥ずかしがらないでってば～」"
translation = "「그럼 그쪽 거 받을게. 아~앙 해줘, 아~앙. 자자, 부끄러워하지 말라니까~」"

[[dialogue]]
speaker = "セーラ"
original = "「はぁむっ。おぉ～、これは濃厚。カロリーやばそうだけどめっちゃおいしい」"
translation = "「하암. 오오~ 이건 농후하네. 칼로리 장난 아닐 것 같지만 진짜 맛있다」"

[[dialogue]]
speaker = "セーラ"
original = "「あ、お金のことは気にしなくていいよ。お礼だからうちのおごりだし」"
translation = "「아, 돈은 신경 안 써도 돼. 보답이니까 내가 쏘는 거야」"

[[dialogue]]
speaker = "unk"
original = "ありがとうございます"
translation = "감사합니다"

[[dialogue]]
speaker = "セーラ"
original = "「ふふん、たーんと召し上がれ♪」"
translation = "「후분, 많이 드셔요♪」"

[[dialogue]]
speaker = "セーラ"
original = "「ここのたい焼きもセンパイと一緒に食べたなぁ。いやぁ、懐かし～」"
translation = "「여기 붕어빵도 선배랑 같이 먹었었지. 이야, 그립네~」"

[[dialogue]]
speaker = "セーラ"
original = "「ところでさ、前から気になってたんだけど、会長さんは新星の星徒会の誰と仲いいの？」"
translation = "「그런데 말이야, 전부터 궁금했는데 회장님은 신성의 성도회 누구랑 친해?」"

[[dialogue]]
speaker = "セーラ"
original = "「やっぱりヴィーナスちゃん？\u3000それとも真面目なマトイちゃん？\u3000クールなアナちゃんや優しいサーシャさんもいいよねー」"
translation = "「역시 비너스짱? 아니면 성실한 마토이짱? 쿨한 아나짱이나 상냥한 사샤 씨도 좋지~」"

[[dialogue]]
speaker = "セーラ"
original = "「特に誰とってことはないカンジ？\u3000へ～、そうなんだー。ふーん……」"
translation = "「딱히 누구라고 할 건 없는 느낌? 헤~ 그렇구나. 흠……」"

[[dialogue]]
speaker = "セーラ"
original = "「はむ、はむ……ごちそうさま。ここのたい焼き、久々だけどやっぱりおいしかった～」"
translation = "「함냐, 함냐…… 잘 먹었습니다. 여기 붕어빵, 오랜만인데 역시 맛있었어~」"

[[dialogue]]
speaker = "セーラ"
original = "「えっ……うちがたい焼き屋さんの社長？\u3000うーん……確かに好きだけど、新規参入できるかな……」"
translation = "「엣…… 내가 붕어빵 가게 사장님? 음…… 확실히 좋아하긴 하지만, 신규 진입할 수 있으려나……」"

[[dialogue]]
speaker = "セーラ"
original = "「いや待てよ。和菓子ってけっこう幅広くアレンジできるし、やりようによっては……うん、考えとく」"
translation = "「아니 기다려봐. 화과자는 꽤 폭넓게 어레인지할 수 있고, 하기 나름에 따라서는…… 응, 생각해둘게」"

[[dialogue]]
speaker = "セーラ"
original = "「ねえ会長さん。もしうちが社長になって、会長さんが新星学園卒業したら……パートナーにならない？」"
translation = "「저기 회장님. 만약 내가 사장이 되고, 회장님이 신성 학원 졸업하면…… 파트너 안 될래?」"

[[dialogue]]
speaker = "unk"
original = "！？"
translation = "!?"

[[dialogue]]
speaker = "セーラ"
original = "「あ、パートナーって言っても仕事のだよ？\u3000会長さんは何のパートナーだと思ったのかな～？」"
translation = "「아, 파트너라고 해도 일 파트너야? 회장님은 무슨 파트너라고 생각한 걸까나~?」"

[[dialogue]]
speaker = "セーラ"
original = "「ふふっ、赤くなってる。かっわいい～♪」"
translation = "「후훗, 빨개졌다. 귀여워~♪」"

[[dialogue]]
speaker = "セーラ"
original = "「あはは、からかってごめんってば。でも冗談で言ってるんじゃないよ。うちんとこの社員にならない？」"
translation = "「아하하, 놀려서 미안하다니까. 하지만 농담으로 하는 말 아냐. 우리 회사 직원이 되지 않을래?」"

[[dialogue]]
speaker = "セーラ"
original = "「割と本気。会長さんが近くにいてくれるといいなって思ってる。どう？」"
translation = "「꽤 진심이야. 회장님이 근처에 있어 주면 좋겠다고 생각하고 있어. 어때?」"

[[dialogue]]
speaker = "セーラ"
original = "「……って、急に言われても困るよね。ま、ちょっと卒業するまでに考えといてよ。うちは待ってるから」"
translation = "「……라고, 갑자기 말해도 곤란하겠지. 뭐, 졸업할 때까지 좀 생각해둬. 난 기다릴 테니까」"

[[dialogue]]
speaker = "セーラ"
original = "「ちなみに、なんで社長になりたいかって言うと……うちが言ってたセンパイ、卒業してすぐに起業してんの」"
translation = "「참고로, 왜 사장이 되고 싶냐고 하면…… 내가 말했던 선배, 졸업하자마자 창업했거든」"

[[dialogue]]
speaker = "セーラ"
original = "「あの人から話聞いてたら、社長いいなーって思って。女社長目指して密かに勉強中ってワケ。この後も会う約束してるんだ」"
translation = "「그 사람한테 얘기 듣다 보니 사장 좋겠다~ 싶어서. 여사장 목표로 몰래 공부 중이라는 말씀. 이따가도 만나기로 약속했거든」"

[[dialogue]]
speaker = "セーラ"
original = "「だから本読んだりして勉強してるし、授業も真面目に聞いてる。実はうち、成績いいんだよ。特に英語はしっかりやってるし」"
translation = "「그래서 책도 읽으면서 공부하고 있고, 수업도 성실히 듣고 있어. 사실 나, 성적 좋거든. 특히 영어는 확실히 하고 있고」"

[[dialogue]]
speaker = "セーラ"
original = "「だけどその前に世界の平和！\u3000うちが社長になるためにも、頑張って世界を守ろうねっ♪」"
translation = "「하지만 그전에 세계 평화! 내가 사장이 되기 위해서라도, 열심히 세계를 지키자♪」"

