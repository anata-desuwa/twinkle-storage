[[dialogue]]
speaker = "unk"
original = "合宿３日目。"
translation = "합숙 3일째."

[[dialogue]]
speaker = "unk"
original = "俺は昨日のリップルを見ていて思ったことを、提案してみることにした。"
translation = "나는 어제의 리플을 보고 생각한 것을 제안해 보기로 했다."

[[dialogue]]
speaker = "リップル"
original = "「ワタシがこれまで出来なかったことをやってみる、デスか？」"
translation = "「와타시가 지금까지 해보지 못한 걸 해보는 거, 임까?」"

[[dialogue]]
speaker = "unk"
original = "スランプだからこそ、試してみるのはどう？"
translation = "슬럼프니까 더더욱 시도해 보는 건 어때?"

[[dialogue]]
speaker = "マトイ"
original = "「昨日はたくさん遊んだ後、いいメニューが思い付いてたもんね」"
translation = "「어제는 잔뜩 놀고 나서 좋은 메뉴가 떠올랐었지」"

[[dialogue]]
speaker = "フィオナ"
original = "「リップルさんの考えたカツカレー、昨夜の夕食で出して頂きましたが、とても美味しかったです」"
translation = "「리플 씨가 생각하신 돈가스 카레, 어젯밤 저녁으로 내주셨는데 정말 맛있었어요」"

[[dialogue]]
speaker = "リップル"
original = "「ハイ♪\u3000久しぶりに凄くハッピーなキモチになって、それをカタチにしたいって思ったら、素敵なアイデアが湧いてキタんです！」"
translation = "「하이♪ 오랜만에 정말 해피한 기분이 되어서 그걸 형태로 만들고 싶다고 생각하니 멋진 아이디어가 샘솟아씀다!」"

[[dialogue]]
speaker = "サーシャ"
original = "「リップルちゃんは、皆でしてみたいことって何かあるかしら？」"
translation = "「리플짱은 다 같이 해보고 싶은 게 또 있을까나~?」"

[[dialogue]]
speaker = "リップル"
original = "「ソウですね……ワタシは――」"
translation = "「그러게여…… 와타시는――」"

[[dialogue]]
speaker = "リップル"
original = "「トモダチと夜寝る前に、秘密の話がシテみたいです……！」"
translation = "「친구랑 밤에 자기 전에 비밀 이야기를 해보고 싶슴다……!」"

[[dialogue]]
speaker = "アナ"
original = "「ふむ、秘密の話……。普段とは違うお泊り会という空気感で、ハイテンションになった状態で行う『ぶっちゃけトーク』というやつですね」"
translation = "「흠, 비밀 이야기……. 평소와는 다른 숙박 모임이라는 분위기에서 하이텐션이 된 상태로 행하는 『속마음 토크』라는 것이군요」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふっふっふ……そういうことなら、これだけ女子が揃っているんだもの。話題は当然決まっているわよね！」"
translation = "「훗훗훗…… 그렇다면 이렇게 여자애들이 모였는걸. 화제는 당연히 정해져 있지!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「皆、恋バナをするわよ！」"
translation = "「다들, 사랑 이야기를 하는 거야!」"

[[dialogue]]
speaker = "マトイ"
original = "「え……ええぇぇぇ～～～っ！？」"
translation = "「에…… 에에에에에에엑!?」"

[[dialogue]]
speaker = "リップル"
original = "「コイバナ？」"
translation = "「사랑 이야기?」"

[[dialogue]]
speaker = "unk"
original = "男が１人混じってるんですけど！？"
translation = "남자가 한 명 섞여 있는데요!?"

[[dialogue]]
speaker = "ヴィーナス"
original = "「――というわけで、昼間の充実した戦闘訓練も終えて、夜の恋バナ会、開催よ！」"
translation = "「――그런 고로, 낮의 충실한 전투 훈련도 마치고 밤의 사랑 이야기 모임, 개최야!」"

[[dialogue]]
speaker = "アナ"
original = "「ノープロブレムです。海の家備え付けの温泉で体も清め、美味しい夕食でお腹も満たし、就寝準備は万端」"
translation = "「노 프로블럼입니다. 바다의 집 부속 온천으로 몸도 정결히 하고, 맛있는 저녁으로 배도 채웠으니 취침 준비는 만전」"

[[dialogue]]
speaker = "フィオナ"
original = "「今更ですけど、リップルさんのおかげでサバイバルとは無縁の生活になっちゃってますね……」"
translation = "「이제 와서 하는 말이지만, 리플 씨 덕분에 서바이벌과는 거리가 먼 생활이 되어버렸네요……」"

[[dialogue]]
speaker = "サーシャ"
original = "「１週間どころか、ずっと暮らせちゃうくらい快適よね～」"
translation = "「일주일은커녕 평생 살 수 있을 정도로 쾌적하네~」"

[[dialogue]]
speaker = "マトイ"
original = "「待って待ってっ。本当に恋バナするの？\u3000会長も居るんだけど……！」"
translation = "「잠깐 잠깐. 정말로 사랑 이야기 할 거야? 회장님도 있는데……!」"

[[dialogue]]
speaker = "リップル"
original = "「イェーイ！\u3000コミバラ？\u3000シマしょー！\u3000ワクワクで～す♪」"
translation = "「예이! 사랑 이야기? 함까! 두근두근함다~♪」"

[[dialogue]]
speaker = "マトイ"
original = "「ぶっちゃけトークしたいはずの本人が、話題を理解してないし！」"
translation = "「속마음 토크하고 싶다던 본인이 화제를 이해 못 하고 있고!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「よく考えなさい、マトイ。……むしろ、クロトの恋バナが１番面白そうじゃない！」"
translation = "「잘 생각해봐, 마토이. ……오히려 쿠로토의 사랑 이야기가 제일 재밌을 것 같지 않아!」"

[[dialogue]]
speaker = "マトイ"
original = "「それは……一理ある！」"
translation = "「그건…… 일리 있어!」"

[[dialogue]]
speaker = "unk"
original = "いやそこ納得しちゃうんだ！？"
translation = "아니 거기서 납득해버리는 거야!?"

[[dialogue]]
speaker = "ヴィーナス"
original = "「リップル、恋バナというのは、恋の話……簡単に言うなら、好きな相手が誰なのかとか、好きな異性のタイプとか、そういう話よ！」"
translation = "「리플, 사랑 이야기라는 건 사랑에 관한 이야기…… 간단히 말하자면 좋아하는 상대가 누구인지라든가, 좋아하는 이성 타입이라든가 그런 이야기야!」"

[[dialogue]]
speaker = "リップル"
original = "「ワオ♪\u3000理解シマした！\u3000ワタシがシショーやカイチョーが好きだって、そんなトークですね！」"
translation = "「와오♪ 이해해씀다! 와타시가 스승님이나 회장님을 좋아한다는 그런 토크네여!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「その通りよ。とはいえ、先に私達からやってみせた方が分かりやすいわよね」"
translation = "「바로 그거야. 하지만 먼저 우리부터 해 보이는 게 이해하기 쉽겠지」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そういうわけだから、マトイが１番手よ！\u3000さあ、ドンドンぶっちゃけなさい……！」"
translation = "「그런 고로 마토이가 첫 타자야! 자, 팍팍 털어놔 봐……!」"

[[dialogue]]
speaker = "マトイ"
original = "「なんで私！？\u3000い、言い出しっぺなんだから、そこはヴィーナスからやってよ……」"
translation = "「왜 나야!? 꺼, 꺼낸 사람이니까 그건 비너스부터 해……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「言い出しっぺと言われたら、拒否はできないわね」"
translation = "「꺼낸 사람이라고 한다면 거절할 수 없겠네」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「とはいえ、私も恋が何なのか分かっているのかと言うと、あまり自信はないのだけれど……」"
translation = "「하지만 나도 사랑이 뭔지 알고 있느냐고 묻는다면 그다지 자신은 없지만……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私の気になる異性というなら、強いて言えば――」"
translation = "「내가 신경 쓰이는 이성이라고 한다면 굳이 말해서――」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「う～ん、クロトかしら？」"
translation = "「으음, 쿠로토일까나?」"

[[dialogue]]
speaker = "unk"
original = "ファッ！？"
translation = "파앗!?"

[[dialogue]]
speaker = "マトイ"
original = "「さらっと爆弾投下して来た！？」"
translation = "「아무렇지도 않게 폭탄 투척하고 있어!?」"

[[dialogue]]
speaker = "リップル"
original = "「ワオ♪\u3000ヴィーナスもカイチョーが好きだったんですね～！\u3000ナカマで～す♪」"
translation = "「와오♪ 비너스도 회장님을 좋아했군여~! 동료임다~♪」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「考えてみれば、私はクロトと出会う日をずっと待っていたし……ある意味、運命の相手とも言えるんじゃないかしら？」"
translation = "「생각해보면 난 쿠로토와 만날 날을 계속 기다려왔고…… 어떤 의미에선 운명의 상대라고도 할 수 있지 않을까?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「どんな顔してるのかな～とか、どんな声してるのかな～とか、どんな人なのかな～って、いつも想像していたしね。実際に本人を目にした時は、それはもう――」"
translation = "「어떤 얼굴을 하고 있을까~라든가, 어떤 목소리일까~라든가, 어떤 사람일까~ 하고 항상 상상했었거든. 실제로 본인을 눈앞에 뒀을 때는 그야말로――」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「想像通りの相手で、本当に嬉しかったわ！」"
translation = "「상상했던 그대로의 상대라서 정말 기뻤어!」"

[[dialogue]]
speaker = "フィオナ"
original = "「す、ストレートな想いが伝わって来て、聞いているだけで何だかドキドキしてしまいますね……」"
translation = "「지, 진심 어린 마음이 전해져 와서 듣고 있는 것만으로도 왠지 두근거려 버리네요……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私はフィオナの好きなタイプも知りたいわ！」"
translation = "「난 피오나의 이상형도 알고 싶어!」"

[[dialogue]]
speaker = "フィオナ"
original = "「え！？\u3000わ、私ですか！？\u3000その……そういうのはあまり、考えたことがなくて……」"
translation = "「에!? 저, 저 말인가요!? 그…… 그런 건 별로 생각해본 적이 없어서……」"

[[dialogue]]
speaker = "サーシャ"
original = "「私も聞いてみたいわ～」"
translation = "「나도 들어보고 싶네~」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「どうなの？\u3000せっかく仲良く合宿に来ちゃっているんだから、ぶっちゃけちゃいなさい！\u3000うりうり～」"
translation = "「어때? 어렵게 사이좋게 합숙까지 왔으니까 털어놔 버려! 우쭈쭈~」"

[[dialogue]]
speaker = "フィオナ"
original = "「ちょっ、あははは！\u3000脇腹くすぐらないで下さい！\u3000分かりましたっ。話しますからっ」"
translation = "「잠깐, 아하하하! 옆구리 간지럽히지 마세요! 알겠어요. 말할 테니까요」"

[[dialogue]]
speaker = "フィオナ"
original = "「えっと……わ、私はそうですね……自分の信じる正義を貫ける人……は好ましく思います」"
translation = "「저기…… 저, 저는 그렇네요…… 자신이 믿는 정의를 관철할 수 있는 사람……을 좋게 생각해요」"

[[dialogue]]
speaker = "フィオナ"
original = "「正義とは何なのかと考えて、その在り方を守って生きようとする……そんな人が格好良いんじゃないかと……」"
translation = "「정의란 무엇인가 생각하고 그 존재 방식을 지키며 살아가려 하는…… 그런 사람이 멋지지 않을까 하고……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「う～ん、正義の味方、みたいな？」"
translation = "「으음, 정의의 사자 같은 거?」"

[[dialogue]]
speaker = "フィオナ"
original = "「え！？\u3000ま、まあ、言われてみるとそうかもしれません。ただ、矛盾するようなんですけど……」"
translation = "「에!? 뭐, 뭐어, 듣고 보니 그럴지도 모르겠네요. 다만 모순되는 것 같지만……」"

[[dialogue]]
speaker = "フィオナ"
original = "「完璧にこなすんじゃなくて、たまにはその正義をサボって誰かに甘えちゃうような、そんな子供っぽくて可愛い一面があってもいいかなって、思ったりして……」"
translation = "「완벽하게 해내는 게 아니라 가끔은 그 정의를 빼먹고 누군가에게 어리광부려 버리는, 그런 어린아이 같고 귀여운 일면이 있어도 좋지 않을까 하고 생각하기도 해서……」"

[[dialogue]]
speaker = "リップル"
original = "「何か今のフィオナ……凄くカワイイです！」"
translation = "「방금 피오나…… 정말 귀여워요!」"

[[dialogue]]
speaker = "フィオナ"
original = "「は！？\u3000かわっ……私が！？\u3000な、何か凄く恥ずかしいです……はうぅ……」"
translation = "「하!? 귀여…… 내가!? 저, 정말 부끄럽네요…… 하우우……」"

[[dialogue]]
speaker = "サーシャ"
original = "「あ～ん♪\u3000照れるフィオナちゃん、可愛くて思わず妹に欲しくなっちゃう～<emoji=heart04>」"
translation = "「아앙♪ 수줍어하는 피오나짱, 귀여워서 나도 모르게 여동생 삼고 싶어져~<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「ちょっ、サーシャさん！？\u3000そんな胸を押し付けられたら、息が出来な……」"
translation = "「잠깐, 사샤 씨!? 그렇게 가슴을 밀어붙이면 숨을 못 쉬겠……」"

[[dialogue]]
speaker = "サーシャ"
original = "「よしよし～<emoji=heart04>」"
translation = "「우쭈쭈~<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「こらこら！\u3000フィオナさんが困ってますから！\u3000それくらいにして、次はサーシャさんが話して下さい！」"
translation = "「이봐요 이봐요! 피오나 씨가 곤란해하잖아요! 그쯤 하고 다음은 사샤 씨가 말해주세요!」"

[[dialogue]]
speaker = "サーシャ"
original = "「私～？\u3000う～ん、私は正直、恋愛とかってあんまり興味沸かないな～って感じなのよね～」"
translation = "「나~? 으음, 난 솔직히 연애 같은 거엔 별로 흥미가 안 생긴다는 느낌이거든~」"

[[dialogue]]
speaker = "マトイ"
original = "「そういえば前に、サーシャさんって恋愛物の漫画とかドラマとか、全然見ないって言ってましたね」"
translation = "「그러고 보니 예전에 사샤 씨는 연애물 만화나 드라마 같은 거 전혀 안 본다고 하셨죠」"

[[dialogue]]
speaker = "サーシャ"
original = "「私はそれよりも、歴史とかノンフィクションとか、世界の姿を知ることの方がワクワクして好きなのよね～♪\u3000あっ、でも……」"
translation = "「난 그것보다 역사나 논픽션 같은, 세계의 모습을 아는 게 더 두근거리고 좋거든~♪ 앗, 하지만……」"

[[dialogue]]
speaker = "サーシャ"
original = "「男の子としては、私も会長くんに興味があるわね～」"
translation = "「남자애로서는 나도 회장군에게 흥미가 있네~」"

[[dialogue]]
speaker = "リップル"
original = "「ワオ♪\u3000サーシャもナカマで～す！」"
translation = "「와오♪ 사샤도 동료임다!」"

[[dialogue]]
speaker = "サーシャ"
original = "「気配りが出来て、素直に慕ってくれて、顔も可愛いし～。弟にするなら、こういう男の子がいいな～って思ったりするわ～」"
translation = "「배려심 있고 솔직하게 따라주고 얼굴도 귀엽고~. 남동생 삼는다면 이런 남자애가 좋겠다고 생각하곤 해~」"

[[dialogue]]
speaker = "マトイ"
original = "「そんな気はしてたけど、ブレないですね……」"
translation = "「그런 기분은 들었지만 정말 한결같으시네요……」"

[[dialogue]]
speaker = "リップル"
original = "「アナはどんなオトコの人がタイプですか～？」"
translation = "「아나는 어떤 남자가 타입임까~?」"

[[dialogue]]
speaker = "アナ"
original = "「チラッ……私はそうですね……チラッ……毎日、美味しい和菓子を差し入れてくれたりする男性ですかね……チラッ」"
translation = "「힐끗…… 저는 그렇네요…… 힐끗…… 매일 맛있는 화과자를 사다 주는 남성일까요…… 힐끗」"

[[dialogue]]
speaker = "マトイ"
original = "「会長にチラチラ目線送って、和菓子催促してるし……」"
translation = "「회장님한테 힐끗힐끗 시선 보내면서 화과자 독촉하고 있고……」"

[[dialogue]]
speaker = "リップル"
original = "「アナは和菓子好きなのデスか～？\u3000ワタシ、和菓子なら結界作る力でいくらでも出せマスよ～！\u3000ホラ♪」"
translation = "「아나는 화과자를 좋아하는 검까~? 와타시, 화과자라면 결계 만드는 힘으로 얼마든지 내줄 수 이씀다! 자♪」"

[[dialogue]]
speaker = "アナ"
original = "「なんと！？\u3000もぐもぐ……うまっ……！」"
translation = "「이럴 수가!? 우물우물…… 맛있다……!」"

[[dialogue]]
speaker = "アナ"
original = "「――リップルさん、私と結婚して下さい」"
translation = "「――리플 씨, 저와 결혼해 주세요」"

[[dialogue]]
speaker = "マトイ"
original = "「和菓子くれるなら誰でもいいんだ……」"
translation = "「화과자 주면 누구든 상관없는 거냐……」"

[[dialogue]]
speaker = "アナ"
original = "「ノー。美味しい和菓子であることが条件です。もぐもぐ……そして、リップルさんは完璧です」"
translation = "「노. 맛있는 화과자일 것이 조건입니다. 우물우물…… 그리고 리플 씨는 완벽합니다」"

[[dialogue]]
speaker = "リップル"
original = "「エッヘン♪\u3000アナに褒めラレたで～す♪」"
translation = "「에헴♪ 아나에게 칭찬받아씀다♪」"

[[dialogue]]
speaker = "アナ"
original = "「そういうマトイさんの好きなタイプはどうなんですか……もぐもぐ」"
translation = "「그런 마토이 씨의 이상형은 어떤가요…… 우물우물」"

[[dialogue]]
speaker = "マトイ"
original = "「私！？\u3000いや、私はほら、至って普通だし……異性に求めることは、皆が大体思ってることと変わりないっていうか……」"
translation = "「나!? 아니, 난 뭐랄까 지극히 평범하고…… 이성에게 바라는 건 다들 대충 생각하는 거랑 다르지 않달까……」"

[[dialogue]]
speaker = "アナ"
original = "「具体的には？」"
translation = "「구체적으로는?」"

[[dialogue]]
speaker = "マトイ"
original = "「そ、それはやっぱり、優しくて……いざという時に手を差し伸べて、助けてくれるような……頼り甲斐があると、格好いいっていうか……」"
translation = "「그, 그건 역시 다정하고…… 유사시에 손을 내밀어 도와주는…… 의지가 되면 멋지달까……」"

[[dialogue]]
speaker = "リップル"
original = "「それってまるで、カイチョーみたいで～す！」"
translation = "「그거 마치 회장님 같슴다!」"

[[dialogue]]
speaker = "マトイ"
original = "「は！？\u3000い、いや、私は一般論を言っているだけで！\u3000確かに昨日、リップルを遊ぼうって誘った会長は、少し格好いいとは思ったけど！」"
translation = "「하!? 아, 아니, 난 일반론을 말하고 있을 뿐이야! 확실히 어제 리플한테 놀자고 권한 회장님은 조금 멋있다고 생각하긴 했지만!」"

[[dialogue]]
speaker = "マトイ"
original = "「それに私はリップルや皆と違って普通だから、全然可愛くないし……普通に考えて、選ばれたりするわけないから！」"
translation = "「게다가 난 리플이나 다른 애들이랑 다르게 평범하니까 전혀 안 귀엽고…… 보통으로 생각해서 선택받거나 할 리 없으니까!」"

[[dialogue]]
speaker = "unk"
original = "マトイは普通に可愛いと思うけどなぁ"
translation = "마토이는 평범하게 귀엽다고 생각하는데 말이야"

[[dialogue]]
speaker = "マトイ"
original = "「なっ！？\u3000会長！？\u3000……えっ！？\u3000えぇえぇぇぇえ！？」"
translation = "「뭐!? 회장님!? ……엣!? 에에에에에에엑!?」"

[[dialogue]]
speaker = "リップル"
original = "「ワタシもソウ思いま～す！\u3000マトイはとってもカワイイですよ……？」"
translation = "「와타시도 그렇게 생각함다! 마토이는 정말 귀여워요……?」"

[[dialogue]]
speaker = "リップル"
original = "「コロコロ表情が変わるのが面白くて、ＢＩＧ魅力的で～す♪」"
translation = "「표정이 휙휙 바뀌는 게 재밌어서 BIG 매력적임다♪」"

[[dialogue]]
speaker = "マトイ"
original = "「それ褒めてる！？」"
translation = "「그거 칭찬 맞아!?」"

[[dialogue]]
speaker = "リップル"
original = "「ワタシはマトイのことスキですよ！\u3000その証拠にハグして、キスしちゃいま～す♪」"
translation = "「와타시는 마토이를 좋아함다! 그 증거로 허그하고 키스해버리게씀다~♪」"

[[dialogue]]
speaker = "リップル"
original = "「ちゅっ<emoji=heart04>」"
translation = "「쪽<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「きゃっ！？\u3000私も本当に頬っぺたにキスされた！？\u3000リップル、ひょっとして割と見境ない！？」"
translation = "「꺄앗!? 나도 정말로 뺨에 키스당했어!? 리플, 혹시 의외로 가리지 않는 거야!?」"

[[dialogue]]
speaker = "リップル"
original = "「ソンナことありません！\u3000カイチョーもマトイも、ここに居る皆も、一緒に居るとハッピーな気持ちになって、同じくらいダイスキになっちゃったダケで～す♪」"
translation = "「그런 거 아님다! 회장님도 마토이도 여기 있는 모두도 같이 있으면 해피한 기분이 되어서 똑같이 다이스키하게 되어버린 것뿐임다~♪」"

[[dialogue]]
speaker = "リップル"
original = "「だからダイジョーブ、マトイが会長スキでも、ワタシは全然気にしません！」"
translation = "「그러니까 괜찮슴다, 마토이가 회장님을 좋아해도 와타시는 전혀 신경 안 씀다!」"

[[dialogue]]
speaker = "マトイ"
original = "「ちょっと待って、勘違いしてるから！\u3000わ、私は別に、そういうのじゃないから！」"
translation = "「잠깐만, 오해하고 있으니까! 나, 나는 딱히 그런 게 아니니까!」"

[[dialogue]]
speaker = "リップル"
original = "「そうだ、ワタシ、イイこと思い付きました！\u3000皆カイチョーがスキなら、皆で一緒に家族になればイイのです！」"
translation = "「맞다, 와타시 좋은 생각이 났슴다! 다들 회장님이 좋다면 다 같이 가족이 되면 되는 검다!」"

[[dialogue]]
speaker = "マトイ"
original = "「ちょっ！？\u3000それって……」"
translation = "「잠깐!? 그거란 건……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「つまり、ハーレムってことね！\u3000それなら学園を卒業しても、このメンバーで一緒にいられるわ！」"
translation = "「즉, 하렘이라는 거네! 그렇다면 학원을 졸업해도 이 멤버로 같이 있을 수 있어!」"

[[dialogue]]
speaker = "サーシャ"
original = "「あら～♪\u3000それなら確かに、皆を私の妹と弟に出来るわね～。うふふ♪」"
translation = "「어머나~♪ 그렇다면 확실히 모두를 내 여동생이랑 남동생으로 삼을 수 있겠네~. 우후후♪」"

[[dialogue]]
speaker = "アナ"
original = "「なるほど。それならリップルさんにいつでも和菓子を作ってもらえるので、合理的です」"
translation = "「과연. 그렇다면 리플 씨에게 언제든 화과자를 얻어먹을 수 있으니 합리적입니다」"

[[dialogue]]
speaker = "マトイ"
original = "「まさかのハーレム容認！？」"
translation = "「설마 했던 하렘 용인!?」"

[[dialogue]]
speaker = "マトイ"
original = "「いやいやいや、フィオナさんも何か言ってやって下さい！」"
translation = "「아니 아니 아니, 피오나 씨도 뭐라고 좀 해주세요!」"

[[dialogue]]
speaker = "フィオナ"
original = "「ち、ちょっと楽しそうかもと思っちゃいましたけど、まずは家族に相談してみないといけないですし……緋宮会長のお気持ちもありますから……」"
translation = "「조, 조금 즐거울지도 모르겠다고 생각했습니다만, 우선 가족과 상의해 봐야 하고…… 히노미야 회장님의 마음도 있으니까요……」"

[[dialogue]]
speaker = "マトイ"
original = "「満更でもないご様子！？」"
translation = "「싫지 않은 기색!?」"

[[dialogue]]
speaker = "サーシャ"
original = "「ふふっ、ぶっちゃけトークで、フィオナちゃんもハイテンションになってるみたいね～♪」"
translation = "「후훗, 속마음 토크로 피오나짱도 하이텐션이 된 모양이네~♪」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ただ、フィオナの言う通り、クロトの意見も聞く必要があるわね」"
translation = "「다만 피오나 말대로 쿠로토의 의견도 들을 필요가 있겠네」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「さあ、いよいよ最後は、皆が期待してたクロトの番よ！」"
translation = "「자, 드디어 마지막은 모두가 기대하던 쿠로토 차례야!」"

[[dialogue]]
speaker = "リップル"
original = "「待ってましたで～す♪\u3000カイチョーはどんな女の子が好きなのか、聞かせてクダさ～い！」"
translation = "「기다려씀다~♪ 회장님은 어떤 여자애를 좋아하는지 들려주세여!」"

[[dialogue]]
speaker = "unk"
original = "えっと、やっぱり……言わなきゃダメ？"
translation = "저기, 역시…… 말해야 해?"

[[dialogue]]
speaker = "アナ"
original = "「ダメですね」"
translation = "「안 되죠」"

[[dialogue]]
speaker = "サーシャ"
original = "「うふふ♪\u3000私達だって正直に喋ったんだもの～。ね？\u3000フィオナちゃん」"
translation = "「우후후♪ 우리도 솔직하게 말했는걸~. 그치? 피오나짱」"

[[dialogue]]
speaker = "フィオナ"
original = "「そ、そうですね。ここで何も言わないのは、不公平な気がします」"
translation = "「그, 그렇네요. 여기서 아무 말도 안 하는 건 불공평한 기분이 듭니다」"

[[dialogue]]
speaker = "マトイ"
original = "「私だって恥ずかしい思いしたんだから、こうなった以上、道連れよ！」"
translation = "「나도 부끄러운 꼴 당했으니까 이렇게 된 이상 물귀신 작전이야!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふふふ、逃がさないわよ。大人しくぶっちゃけなさい！」"
translation = "「후후후, 놓치지 않아. 얌전히 털어놓으시지!」"

[[dialogue]]
speaker = "リップル"
original = "「カイチョーは、ワタシ達のことダイスキですか～？」"
translation = "「회장님은 와타시들을 다이스키함까~?」"

[[dialogue]]
speaker = "unk"
original = "その後、俺は好きな女の子のタイプについて根掘り葉掘り聞かれ、一晩中イジられる羽目になるのだった――"
translation = "그 후, 나는 좋아하는 여자아이 타입에 대해 꼬치꼬치 캐물음을 당하며 밤새도록 놀림받는 신세가 되는 것이었다――"

