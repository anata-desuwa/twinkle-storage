[[dialogue]]
speaker = "ロロット"
original = "「――という感じで、騒動は無事に解決したのです。あちらの皆さんも、滞りなく元の世界に帰れたようですし」"
translation = "「――라는 느낌으로 소동은 무사히 해결된 거예요. 저쪽 분들도 차질 없이 원래 세계로 돌아간 듯하고요.」"

[[dialogue]]
speaker = "シン"
original = "「報告ありがとう、ロロット。やっぱり大変だった？」"
translation = "「보고 고마워, 로롯토. 역시 힘들었어?」"

[[dialogue]]
speaker = "ロロット"
original = "「いえ、それほどでも。あちらの皆さんは、大変だったようですが」"
translation = "「아니요, 그 정도까진. 저쪽 분들은 힘들었던 것 같지만요.」"

[[dialogue]]
speaker = "ロロット"
original = "「ですが、これは流星学園の生徒会メンバーとしての感想です」"
translation = "「하지만 이건 유성학원의 성도회 멤버로서의 감상이에요.」"

[[dialogue]]
speaker = "ロロット"
original = "「会長さんの……こ、恋人としては、そばにいてもらえなかったので大変でした。ほんとに、寂しかったんですよ？」"
translation = "「회장님의…… 여, 연인으로서는 곁에 있어 주지 못해서 힘들었어요. 정말로 외로웠다구요?」"

[[dialogue]]
speaker = "ロロット"
original = "「ですから今日は、めいっぱい甘えさせてもらおうと思います。そういう予定を組みましたので、よろしくお願いしますね♪」"
translation = "「그러니까 오늘은 잔뜩 응석 부릴 생각이에요. 그런 예정을 짜두었으니 잘 부탁드려요♪」"

[[dialogue]]
speaker = "シン"
original = "「いいよ、僕もそのつもりだったし。して欲しいことがあったら何でも言ってよ」"
translation = "「좋아, 나도 그럴 생각이었어. 하고 싶은 게 있다면 뭐든 말해줘.」"

[[dialogue]]
speaker = "ロロット"
original = "「ではでは……ロロットあいしてる、と、耳許で囁いて欲しいのです」"
translation = "「그럼그럼…… 로롯토 사랑해, 라고 귓가에 속삭여 주었으면 해요.」"

[[dialogue]]
speaker = "シン"
original = "「ええっ？\u3000べ、別にいいけど」"
translation = "「엣? 서, 상관없지만.」"

[[dialogue]]
speaker = "シン"
original = "「……ロロットあいしてる<emoji=heart04>」"
translation = "「……로롯토 사랑해<emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「ひゃああ～～！\u3000こ、これは破壊力抜群です！\u3000お耳から熱くなってきてしまいますよ、会長さん」"
translation = "「히야아아~~! 이, 이건 파괴력 발군이에요! 귀에서부터 뜨거워져 버려요, 회장님.」"

[[dialogue]]
speaker = "ロロット"
original = "「つ、次はちゅーです。ほっぺでもおでこでもありませんよ？\u3000唇に、ちゅーを所望します」"
translation = "「다, 다음은 뽀뽀예요. 볼이나 이마가 아니에요? 입술에 뽀뽀를 소망합니다.」"

[[dialogue]]
speaker = "シン"
original = "「ふふっ、いいよ。たくさんキスしてあげる」"
translation = "「후훗, 좋아. 잔뜩 키스해 줄게.」"

[[dialogue]]
speaker = "ロロット"
original = "「んふ……ちゅ……ちゅうっ……会長さんのキス、好きぃ……」"
translation = "「응후…… 츄…… 츄우…… 회장님의 키스, 좋아아……」"

[[dialogue]]
speaker = "シン"
original = "「キスの次はどうする？」"
translation = "「키스 다음엔 어떡할까?」"

[[dialogue]]
speaker = "ロロット"
original = "「そそ、それはもちろん……いつもの流れで……お願いします……」"
translation = "「그그, 그건 물론…… 평소의 흐름대로…… 부탁드려요……」"

[[dialogue]]
speaker = "unk"
original = "生徒会室を後にして、一緒に僕の部屋へと向かった──"
translation = "성도회실을 뒤로하고 함께 내 방으로 향했다──"

[[dialogue]]
speaker = "ロロット"
original = "「会長さんと、エッチ……おち○ちんを挿れて、気持ちよく、して下さい……<emoji=heart04>」"
translation = "「회장님과 섹스…… 자지를 넣어서 기분 좋게 해주세요……<emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「はぁ……はぁ……会長さんのおち○ちん、もうこんなに膨らんでます……」"
translation = "「하아…… 하아…… 회장님의 자지, 벌써 이렇게 부풀어 있어요……」"

[[dialogue]]
speaker = "ロロット"
original = "「これ、いつもより大きくないですか？\u3000久し振りなので、より興奮しているのでしょうか……」"
translation = "「이거 평소보다 크지 않나요? 오랜만이라 더 흥분하신 걸까요……」"

[[dialogue]]
speaker = "ロロット"
original = "「もしや……ご自分でシコシコしていなかったんですか？」"
translation = "「설마…… 혼자서 딸딸이 치지 않으셨던 건가요?」"

[[dialogue]]
speaker = "ロロット"
original = "「そんな……恋人のわたしがいるときは、その、エッチで射精して欲しいですけど……無理なときは、ちゃんと処理して下さいね」"
translation = "「세상에…… 연인인 제가 있을 때는 그, 섹스로 사정해 주셨으면 하지만…… 무리일 때는 제대로 처리해 주세요.」"

[[dialogue]]
speaker = "ロロット"
original = "「会長さんってば、たくさん出さないと、すぐにおち○ちんおっきくしちゃうんですから……ほら、今みたいに」"
translation = "「회장님도 참, 잔뜩 내보내지 않으면 금방 자지가 커져 버리니까…… 봐요, 지금처럼.」"

[[dialogue]]
speaker = "ロロット"
original = "「んんっ、おま○こに入ってヌプヌプしたいです～って、ビクンビクンしてますね<emoji=heart04>\u3000会長さん、えっちです<emoji=heart04>」"
translation = "「음윽, 보지에 들어가서 눅진눅진하고 싶어요~라며 움찔움찔하고 있네요<emoji=heart04> 회장님, 야해요<emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「こんなにも硬いものを、割れ目に押しつけられてしまったら、わたしだって……い、いつもより濡れちゃいますよ<emoji=heart04>」"
translation = "「이렇게나 딱딱한 걸 가랑이 사이에 짓눌려 버리면 저도…… 이, 평소보다 젖어버려요<emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「あ……わたしのぬるぬるが、おち○ちんに……恥ずかしい……でも、こんなになってしまうくらい、会長さんのことを欲しがっているんですからね<emoji=heart04>」"
translation = "「아…… 제 애액이 자지에…… 창피해…… 하지만 이렇게 되어버릴 정도로 회장님을 원하고 있는 거니까요<emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「あんっ<emoji=heart04>\u3000あっ、あっ……あんまり、スリスリしないでください……もっと、ぬるぬるになっちゃいますからぁ」"
translation = "「안<emoji=heart04> 하아, 하아…… 너무 비비지 말아주세요…… 더 축축해져 버리니까요.」"

[[dialogue]]
speaker = "ロロット"
original = "「もう準備は出来てますから、早く……会長さんのおち○ちん、ヌプヌプ～って……入れて欲しいです……<emoji=heart04>」"
translation = "「벌써 준비 다 됐으니까 빨리…… 회장님의 자지, 눅진눅진하게…… 넣어줬으면 해요……<emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「ふあっ！\u3000はぁぁ～～～～っ！\u3000あぁんっ<emoji=heart04>」"
translation = "「후앗! 하아아~~~~앗! 아앙<emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「嬉しい、ですっ……会長さんが、入って来ましたぁ……んうっ、たった数日なのに、久し振りな感じがします……っ」"
translation = "「기뻐요…… 회장님이 들어왔어요…… 응읏, 겨우 며칠인데 오랜만인 느낌이 들어요……」"

[[dialogue]]
speaker = "ロロット"
original = "「わたしと会長さんが恋人同士になってからは、ほとんど毎日、エッチしてましたよね。出来ない日も、お口や手で……してましたから……」"
translation = "「저랑 회장님이 연인 사이가 된 뒤로는 거의 매일 섹스했었죠. 못 하는 날도 입이나 손으로…… 했었으니까……」"

[[dialogue]]
speaker = "ロロット"
original = "「わたしの……おち○ちん、おかえりなさい、です……ふふっ、ここがあなたの居場所ですから、遠慮しないでヌコヌコ出し入れして、気持ちよくなっていいんですよ……」"
translation = "「제…… 자지, 다녀오셨어요, 예요…… 후훗, 여기가 당신이 있을 곳이니까 사양 말고 박고 빼면서 기분 좋아져도 된다구요……」"

[[dialogue]]
speaker = "ロロット"
original = "「あぁん<emoji=heart04>\u3000あっ、あっ、んぁぁっ<emoji=heart04>\u3000嬉しいです……会長さんが、動いてくれましたぁ<emoji=heart04>」"
translation = "「아앙<emoji=heart04> 하아, 하아, 응아앗<emoji=heart04> 기뻐요…… 회장님이 움직여 줬어요<emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「おち○ちん、太くて硬いですから……わたしの敏感なところにいっぱい当たって……んんんっ<emoji=heart04>\u3000き、気持ちいいです<emoji=heart04>」"
translation = "「자지가 굵고 딱딱하니까…… 제 민감한 곳에 잔뜩 닿아서…… 응으읏<emoji=heart04> 기, 기분 좋아요<emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「会長さん、どうですか？\u3000ちゃんと気持ちいいですか？\u3000いつもあんなに気持ちいいって言って、夢中で出し入れしている、わたしのおま○こですよ<emoji=heart04>」"
translation = "「회장님, 어때요? 제대로 기분 좋나요? 항상 그렇게 기분 좋다고 말하며 정신없이 박고 빼는 제 보지예요<emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「しっかり味わって……会長さんが教えてくれた、わたしの内側の一番感じるところを、かっこいいおち○ちんで、グリグリいじめて欲しいですっ<emoji=heart04>」"
translation = "「듬뿍 맛봐주세요…… 회장님이 가르쳐준 제 안쪽의 제일 잘 느끼는 곳을 멋진 자지로 마구 괴롭혀 줬으면 해요<emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「んあ<emoji=heart04>\u3000そこっ<emoji=heart04>\u3000そこですっ<emoji=heart04>\u3000そこ好き<emoji=heart04>\u3000あぁっ、勝手に声が出ちゃいますっ<emoji=heart04>」"
translation = "「응아<emoji=heart04> 거기<emoji=heart04> 거기예요<emoji=heart04> 거기 좋아<emoji=heart04> 아앗, 제멋대로 목소리가 나와버려요<emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「はぁはぁ……会長さん、お上手ですっ……お付き合いするまでは、こんなの全然知りませんでしたけど……すっかりエッチにされちゃいましたぁ<emoji=heart04>」"
translation = "「하아하아…… 회장님, 솜씨 좋아요…… 사귀기 전까지는 이런 거 전혀 몰랐는데…… 완전히 섹스에 빠지게 되어버렸어요<emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「もう、何も知らなかったわたしには、戻れないんですから<emoji=heart04>\u3000責任を取って、わたしのエッチなおま○こ、ちゃ～んと躾けて下さいね<emoji=heart04>」"
translation = "「이제 아무것도 모르던 저로는 돌아갈 수 없으니까요<emoji=heart04> 책임지고 제 음란한 보지, 채~애대로 길들여 주세요<emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「はぁん<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000凄いっっ<emoji=heart04>\u3000ズボッ、ズボッて、出し入れっ<emoji=heart04>\u3000おち○ちんを全部使って、躾けられちゃってますぅっっ<emoji=heart04>」"
translation = "「하앙<emoji=heart04> 아앗<emoji=heart04> 아앗<emoji=heart04> 굉장해<emoji=heart04> 푹, 푹 하고 넣었다 뺐다<emoji=heart04> 자지를 전부 써서 길들여지고 있어요오옷<emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「んうぅぅっ、もっと奥まで入れて下さいぃぃ<emoji=heart04>\u3000根元まで全部っ、わたしのおま○こに埋め込んで欲しいですぅっっ<emoji=heart04>」"
translation = "「응으으읏, 더 깊숙이 넣어주세요오오<emoji=heart04> 뿌리까지 전부 제 보지에 박아 넣어줬으면 해요오옷<emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「はぁ<emoji=heart04>\u3000はぁ<emoji=heart04>\u3000子宮が押されちゃってます<emoji=heart04>\u3000これ、いいです<emoji=heart04>\u3000好き<emoji=heart04>\u3000好きですっ<emoji=heart04>\u3000もっと、もっとこれして下さいっっ<emoji=heart04>」"
translation = "「하아<emoji=heart04> 하아<emoji=heart04> 자궁이 밀리고 있어요<emoji=heart04> 이거 좋아요<emoji=heart04> 좋아<emoji=heart04> 좋아해요<emoji=heart04> 더, 더 이거 해주세요오옷<emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「会長さんっ<emoji=heart04>\u3000会長さんっ<emoji=heart04>\u3000もっと<emoji=heart04>\u3000もっとわたしを抱き締めて下さいっ<emoji=heart04>\u3000一緒にいられなかった分まで、たくさんたくさん愛して下さいっっ<emoji=heart04>」"
translation = "「회장님<emoji=heart04> 회장님<emoji=heart04> 더<emoji=heart04> 더 저를 꽉 안아주세요<emoji=heart04> 같이 있지 못했던 만큼 잔뜩잔뜩 사랑해 주세요오옷<emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「あぁんっ<emoji=heart04>\u3000あっ、あっ<emoji=heart04>\u3000はぁぁ～～っ<emoji=heart04>\u3000わたしの中っ、会長さんでいっぱいですっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000んあぁぁぁっっ<emoji=heart04>」"
translation = "「아앙앗<emoji=heart04> 하아, 하아<emoji=heart04> 하아아~~앗<emoji=heart04> 제 안이 회장님으로 가득해요<emoji=heart04> 후아앗<emoji=heart04> 하아<emoji=heart04> 아앙앗<emoji=heart04> 응아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「おま○こも……おっぱいも……全部全部、会長さんのものですからっ<emoji=heart04>\u3000いろんなところ、いっぱい触って、気持ちよくして下さいっっ<emoji=heart04>」"
translation = "「보지도…… 가슴도…… 전부 전부 회장님 거니까요<emoji=heart04> 여기저기 잔뜩 만지고 기분 좋게 해주세요오옷<emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「はぁぁっ……はふっ、んんっ<emoji=heart04>\u3000繋がっているところ、ぐじゅぐじゅ言っちゃってますぅぅ……何度も出たり入ったりして、こね回されて、べっとり……んんっ<emoji=heart04>」"
translation = "「하아아앗…… 하후, 응응<emoji=heart04> 이어져 있는 곳이 질척질척 소리 나고 있어요오오…… 몇 번이고 들어갔다 나왔다 휘저어져서 끈적하게…… 응으읏<emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「この体勢、おち○ちんの入っているところが、丸見えなんですよぉっ<emoji=heart04>\u3000出たり……入ったり……出たり……入ったり……ゆっくりだから、余計にえっちに見えますっ<emoji=heart04>」"
translation = "「이 자세, 자지가 들어와 있는 곳이 훤히 다 보여요오옷<emoji=heart04> 나왔다…… 들어갔다…… 나왔다…… 들어갔다…… 천천히니까 더 야하게 보여요<emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「あっ、そんな、わたしに見せつけるみたいにしてっ……んんっ<emoji=heart04>\u3000ちゃんと愛されてるって、感じてますから<emoji=heart04>\u3000見せつけなくてもわかってますからっっ<emoji=heart04>」"
translation = "「앗, 그렇게 저한테 보여주는 것처럼 해서…… 응응<emoji=heart04> 제대로 사랑받고 있다고 느끼고 있으니까요. 보여주지 않아도 알고 있으니까요오옷!」"

[[dialogue]]
speaker = "ロロット"
original = "「それよりも……こんなの切ないですっ<emoji=heart04>\u3000いつもみたいに……もっと突いて<emoji=heart04>\u3000おち○ちんびゅ～ってしたいときみたいに……激しくおま○こ突いてくださいぃっ<emoji=heart04>」"
translation = "「그것보다…… 이런 거 애달파요<emoji=heart04> 평소처럼…… 더 찔러줘요<emoji=heart04> 자지 뷰우~ 하고 싶을 때처럼…… 격렬하게 보지를 찔러주세요오옷!」"

[[dialogue]]
speaker = "ロロット"
original = "「んあぁぁ～～～～～っ！！\u3000はぁん！\u3000はぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000いつものやつ、来ましたぁっ<emoji=heart04>\u3000すごいすごいすごいっ<emoji=heart04>\u3000会長さんの本気おち○ちんですっ<emoji=heart04>」"
translation = "「응아아아~~~~~앗!! 하앙! 하아<emoji=heart04> 아앙<emoji=heart04> 아앙<emoji=heart04> 평소의 그거, 왔어요오옷! 굉장해 굉장해 굉장해<emoji=heart04> 회장님의 진심 자지예요<emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「こんなのされたら女の子はみんなおバカになっちゃいますっ<emoji=heart04>\u3000んあっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あぁん<emoji=heart04>\u3000気持ちいい穴ズボズボほじられてっ<emoji=heart04>\u3000気持ちよすぎておかしくなりそうですっ<emoji=heart04>」"
translation = "「이런 거 당하면 여자애는 다 바보가 되어버려요<emoji=heart04> 응아앗<emoji=heart04> 아앗<emoji=heart04> 아앙<emoji=heart04> 기분 좋은 구멍을 푹푹 파헤쳐져서<emoji=heart04> 기분이 너무 좋아서 이상해질 것 같아요<emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「会長さんっ<emoji=heart04>\u3000好き<emoji=heart04>\u3000好きっ<emoji=heart04>\u3000もっとして<emoji=heart04>\u3000こんな風に毎日っ、わたしにおち○ちん入れて欲しいですっっ<emoji=heart04>」"
translation = "「회장님<emoji=heart04> 좋아<emoji=heart04> 좋아<emoji=heart04> 더 해줘요<emoji=heart04> 이런 식으로 매일 저한테 자지 넣어줬으면 해요오옷<emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふあぁぁぁっ<emoji=heart04>\u3000はぁん<emoji=heart04>\u3000あっ、あっ<emoji=heart04>\u3000すごいっ<emoji=heart04>\u3000おち○ちんすごいですぅぅっっ<emoji=heart04>」"
translation = "「아앙<emoji=heart04> 아앙<emoji=heart04> 아앙<emoji=heart04> 후아아아앗<emoji=heart04> 하앙<emoji=heart04> 아앗, 아앗<emoji=heart04> 굉장해<emoji=heart04> 자지 굉장해요오오옷<emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「大好きな会長さんに毎日こんなことされてっ、わたしすっかり、エッチが大好きになっちゃいましたぁっ<emoji=heart04>\u3000肉欲に溺れてっ<emoji=heart04>\u3000こんなのダメなのにっ<emoji=heart04>」"
translation = "「좋아하는 회장님에게 매일 이런 짓 당해서 저 완전히 섹스가 너무 좋아져 버렸어요오옷<emoji=heart04> 육욕에 빠져서<emoji=heart04> 이런 거 안 되는데<emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「おち○ちんハメてばかりでっ、いつもおま○この奥がうずうずするようになっちゃいましたっっ<emoji=heart04>\u3000このおち○ちんを思い出してっ、エッチしたいなって発情してっ<emoji=heart04>」"
translation = "「자지만 박아대서 항상 보지 깊은 곳이 근질근질하게 되어버렸어요오옷<emoji=heart04> 이 자지를 떠올리며 섹스하고 싶다고 발정하고<emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「こんなわたし、もう誰も天使だなんて思いませんよね<emoji=heart04>\u3000すけべでエッチで淫乱なっ、会長さんの恋人ですからっ<emoji=heart04>\u3000はぁぁっ<emoji=heart04>\u3000あぁん<emoji=heart04>\u3000あぁっ<emoji=heart04>」"
translation = "「이런 저를 이제 아무도 천사라고 생각하지 않겠죠<emoji=heart04> 음탕하고 야하고 음란한 회장님의 연인이니까요<emoji=heart04> 하아아앗<emoji=heart04> 아앙<emoji=heart04> 아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「ピストン激しいっ<emoji=heart04>\u3000これ好き<emoji=heart04>\u3000もっと<emoji=heart04>\u3000もっとズンズン突いて下さいっっ<emoji=heart04>\u3000おま○この入り口から一番奥までっ<emoji=heart04>\u3000会長さんでわたしを満たしてぇぇっ<emoji=heart04>」"
translation = "「피스톤 격렬해<emoji=heart04> 이거 좋아<emoji=heart04> 더<emoji=heart04> 더 쿵쿵 찔러주세요오옷<emoji=heart04> 보지 입구부터 제일 안쪽까지<emoji=heart04> 회장님으로 저를 채워줘요오오옷<emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「はぁっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000か、会長さんっ、そろそろですか？\u3000射精……しちゃいそうですかっ？」"
translation = "「하아앗<emoji=heart04> 하아앗<emoji=heart04> 하아앗<emoji=heart04> 회, 회장님, 슬슬인가요? 사정…… 해버릴 것 같나요?」"

[[dialogue]]
speaker = "ロロット"
original = "「おち○ちん、パンパンになってますしっ<emoji=heart04>\u3000このまま続けたら、びゅるる～って、出しちゃうんですよね？」"
translation = "「자지 팽팽해져 있고요<emoji=heart04> 이대로 계속하면 뷰루루~ 하고 내보내는 거죠?」"

[[dialogue]]
speaker = "ロロット"
original = "「いいですよっ……わたしももう限界です、からぁ<emoji=heart04>\u3000このまま出してっ<emoji=heart04>\u3000会長さんの精子っ、全部わたしに注ぎ込んで欲しいですっ<emoji=heart04>」"
translation = "「좋아요…… 저도 이제 한계니까요오<emoji=heart04> 이대로 내보내 줘요<emoji=heart04> 회장님의 정자, 전부 저한테 쏟아부어 줬으면 해요오옷<emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「んあっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000射精したいんですね？\u3000会長さんが出すときの動き、わたし覚えちゃいましたからっ<emoji=heart04>\u3000来てっ<emoji=heart04>\u3000このまま<emoji=heart04>\u3000びゅ～～って出してっ<emoji=heart04>」"
translation = "「응아앗<emoji=heart04> 아앗<emoji=heart04> 아앗<emoji=heart04> 아앗<emoji=heart04> 사정하고 싶은 거죠? 회장님이 내보낼 때의 움직임, 저 기억해 버렸으니까요<emoji=heart04> 와줘요<emoji=heart04> 이대로<emoji=heart04> 뷰~~ 하고 내보내 줘요<emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「わたしもすぐイきますからっ<emoji=heart04>\u3000会長さんも<emoji=heart04>\u3000気持ちよくなって<emoji=heart04>\u3000おち○ちん、おま○こでいっぱいしごいて気持ちよく射精して下さいっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「저도 금방 가버릴 테니까요<emoji=heart04> 회장님도<emoji=heart04> 기분 좋아져서<emoji=heart04> 자지 보지로 잔뜩 조여서 기분 좋게 사정해 주세요오옷<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふあぁぁんっ<emoji=heart04>\u3000凄いっ<emoji=heart04>\u3000奥っ<emoji=heart04>\u3000ズンズン当たってますっ<emoji=heart04>\u3000そこっ、たぶん子宮の入り口ですからっ<emoji=heart04>\u3000いつものようにっ<emoji=heart04>\u3000お願いしますっ<emoji=heart04>」"
translation = "「아앙<emoji=heart04> 아앙<emoji=heart04> 후아아앙앗<emoji=heart04> 굉장해<emoji=heart04> 안쪽<emoji=heart04> 쿵쿵 닿고 있어요오옷<emoji=heart04> 거기 아마 자궁 입구니까요<emoji=heart04> 평소처럼 부탁드려요오옷<emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「んあぁあああぁあぁっ<emoji=heart04>\u3000速いっ<emoji=heart04>\u3000おち○ちんの動き速いですっ<emoji=heart04>\u3000んあっ<emoji=heart04>\u3000らめっ<emoji=heart04>\u3000わたしっ<emoji=heart04>\u3000わたしっ<emoji=heart04>\u3000会長さんっ<emoji=heart04>\u3000わたしももうっっ<emoji=heart04>」"
translation = "「응아아아아아아아아앗<emoji=heart04> 빨라요<emoji=heart04> 자지 움직임이 빨라요오옷<emoji=heart04> 응아앗<emoji=heart04> 안 돼<emoji=heart04> 나<emoji=heart04> 나<emoji=heart04> 회장님<emoji=heart04> 저도 이제에엣<emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「会長さんっ<emoji=heart04>\u3000好き<emoji=heart04>\u3000好き好き好きっ<emoji=heart04>\u3000出してっ<emoji=heart04>\u3000精子出してっ<emoji=heart04>\u3000わたしにびゅ～～～って<emoji=heart04>\u3000いっぱい<emoji=heart04>\u3000いっぱい出して下さいぃ～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「회장님<emoji=heart04> 좋아<emoji=heart04> 좋아좋아좋아앗<emoji=heart04> 내보내 줘요<emoji=heart04> 정액 내보내 줘요<emoji=heart04> 저한테 뷰~~~ 하고<emoji=heart04> 잔뜩<emoji=heart04> 잔뜩 내보내 주세요오오오~~~~~옷<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「んくぅううぅ～～～～～～～～っっ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응크으으으으~~~~~~~~~~~~~~~~옷<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「んあっ<emoji=heart04>\u3000はぁぁぁっ<emoji=heart04>\u3000はぁ<emoji=heart04>\u3000はぁ<emoji=heart04>\u3000出てるっ<emoji=heart04>\u3000会長さんの精子出てますっ<emoji=heart04>\u3000ふあっ<emoji=heart04>\u3000あ<emoji=heart04>\u3000あ<emoji=heart04>\u3000あ<emoji=heart04>\u3000熱いっ<emoji=heart04>\u3000びゅくん<emoji=heart04>\u3000びゅくん<emoji=heart04>\u3000って」"
translation = "「응아앗<emoji=heart04> 하아아아앗<emoji=heart04> 하아<emoji=heart04> 하아<emoji=heart04> 나오고 있어<emoji=heart04> 회장님의 정액 나오고 있어요오옷<emoji=heart04> 후앗<emoji=heart04> 아<emoji=heart04> 아<emoji=heart04> 아<emoji=heart04> 뜨거워<emoji=heart04> 울컥<emoji=heart04> 울컥<emoji=heart04> 하고」"

[[dialogue]]
speaker = "ロロット"
original = "「わたしも、もぅ無理ですぅぅっ<emoji=heart04>\u3000イきますっ<emoji=heart04>\u3000会長さんの中出しザーメンでっ<emoji=heart04>\u3000イぐぅぅっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「저도 이제 무리예요오오옷<emoji=heart04> 가버려요<emoji=heart04> 회장님의 질내사정 정액으로<emoji=heart04> 가버려어어엇<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「はぁぁぁっ<emoji=heart04>\u3000イっちゃいましたぁ<emoji=heart04>\u3000おっきいの<emoji=heart04>\u3000びくんってなって……<emoji=heart04>」"
translation = "「하아아아앗<emoji=heart04> 가버렸어요오오<emoji=heart04> 커다란 게 움찔거리면서……<emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「うううぅ、会長さんのおち○ちん、ぎゅう～～って搾っちゃってます……ザーメンおねだりおま○こで、ごめんなさいぃ……」"
translation = "「으으으으, 회장님의 자지 꼬오옥 하고 짜버리고 있어요…… 정액 조르는 보지라서 죄송해요오……」"

[[dialogue]]
speaker = "ロロット"
original = "「んふ……<emoji=heart04>\u3000でも、とっても気持ちいいです……会長さんも……出したいだけ出していいですからね……<emoji=heart04>」"
translation = "「응후……<emoji=heart04> 하지만 너무 기분 좋아요…… 회장님도 내보내고 싶은 만큼 내보내도 되니까요……<emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「はぁ……はぁ……わたしのここは、会長さんのザーメン専用ですからぁぁ……<emoji=heart04>」"
translation = "「하아…… 하아…… 제 여기는 회장님의 정액 전용이니까요오오……<emoji=heart04>」"

[[dialogue]]
speaker = "シン"
original = "「ロロット……精子のことザーメンって言ってるね……」"
translation = "「로롯토…… 정자를 정액이라고 하네……」"

[[dialogue]]
speaker = "ロロット"
original = "「はわ！\u3000わわ、わたしとしたことがつい！\u3000はしたない言葉を使ってしまいました……」"
translation = "「하와! 와와, 저도 모르게 그만! 천박한 말을 써버리고 말았어요……」"

[[dialogue]]
speaker = "ロロット"
original = "「ですが、その……めいっぱい興奮すると、口走ってしまうようで……ふ、普段は、会長さんの恋人に相応しくあろうと、お上品な言葉遣いを心懸けているんですからね」"
translation = "「하지만 그게…… 한껏 흥분하면 입 밖에 내버리는 모양이라…… 펴, 평소에는 회장님의 연인에 어울리도록 고상한 말투를 유의하고 있으니까요.」"

[[dialogue]]
speaker = "ロロット"
original = "「それに……わたしがこういう言葉を使うのは……会長さんとエッチしている時だけですから<emoji=heart04>」"
translation = "「게다가…… 제가 이런 말을 쓰는 건…… 회장님과 섹스하고 있을 때뿐이니까요<emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「会長さんも……わたしが、ザーメン<emoji=heart04>\u3000って言うと、興奮してしまうようですし」"
translation = "「회장님도…… 제가 정액<emoji=heart04> 이라고 하면 흥분하시는 것 같기도 하고.」"

[[dialogue]]
speaker = "ロロット"
original = "「たくさんザーメンを出してもらえるなら……いくらでも言っちゃいますよ、ザーメン<emoji=heart04>\u3000って」"
translation = "「정액을 잔뜩 내보내 주신다면…… 얼마든지 말해버릴 거예요, 정액<emoji=heart04> 이라고.」"

[[dialogue]]
speaker = "シン"
original = "「えっちだなぁロロットは」"
translation = "「야하네 로롯토는.」"

[[dialogue]]
speaker = "ロロット"
original = "「会長さんだって<emoji=heart04>\u3000とってもエッチで、だから大好きです<emoji=heart04>」"
translation = "「회장님두요<emoji=heart04> 너무 야해서 그래서 정말 좋아해요<emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「ふぁ……おち○ちん、抜けちゃいました……<emoji=heart04>」"
translation = "「후아…… 자지 빠져버렸어요……<emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「んんっ、おま○こ、ぽっかり穴があいちゃってます……会長さんのおち○ちんで広げられたっていう実感が湧いて、嬉しいです<emoji=heart04>」"
translation = "「응읏, 보지에 뻥 하고 구멍이 나 버렸어요…… 회장님의 자지로 넓혀졌다는 실감이 나서 기뻐요<emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「ふぁっ<emoji=heart04>\u3000ダメっ、です……きゅうってしたら……出ちゃう……会長さんのザーメン、おま○こから漏れちゃいますっ……」"
translation = "「후앗<emoji=heart04> 안 돼, 요…… 힘을 주면…… 나와버려…… 회장님의 정액이 보지에서 새어 나와 버려요……」"

[[dialogue]]
speaker = "シン"
original = "「やらしい音しながら出てるね」"
translation = "「야한 소리 내면서 나오네.」"

[[dialogue]]
speaker = "ロロット"
original = "「は、恥ずかしいので、音を聞かないで下さいぃ～～」"
translation = "「부, 부끄러우니까 소리 듣지 말아주세요오오~~」"

[[dialogue]]
speaker = "ロロット"
original = "「でも……恥ずかしいと、余計に力が入ってしまいます……<emoji=heart04>」"
translation = "「하지만…… 부끄러우면 오히려 더 힘이 들어가 버려요……<emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「はぁ……はぁ……せっかく中に出してもらったのに……いっぱいお漏らししてしまいました……ごめんなさい……」"
translation = "「하아…… 하아…… 어렵사리 안에 내보내 주셨는데…… 잔뜩 지려버리고 말았어요…… 죄송해요……」"

[[dialogue]]
speaker = "シン"
original = "「謝らなくていいよ。ロロットが漏らした分は、また注いであげるから」"
translation = "「사과 안 해도 돼. 로롯토가 흘린 만큼 또 부어줄 테니까.」"

[[dialogue]]
speaker = "ロロット"
original = "「会長さんっ<emoji=heart04>」"
translation = "「회장님<emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「そうですよね、まだ１回目ですし……いつものように何回も……期待して、いいんですよね<emoji=heart04>」"
translation = "「그렇죠, 아직 첫 번째고…… 평소처럼 몇 번이고…… 기대해도 되는 거죠?<emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「時間はたっぷりありますから<emoji=heart04>\u3000今日は最低、５回はいけるはずです<emoji=heart04>\u3000会長さん、一緒に頑張りましょう<emoji=heart04>」"
translation = "「시간은 넉넉하니까요<emoji=heart04> 오늘은 최소 5번은 가능할 거예요<emoji=heart04> 회장님, 같이 힘내요<emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「ほらほらっ<emoji=heart04>\u3000もっといろいろな体位にも、チャレンジしたいです。今日はとことん、愛を深め合いましょうね<emoji=heart04>」"
translation = "「자자<emoji=heart04> 더 다양한 체위에도 도전하고 싶어요. 오늘은 끝까지 사랑을 깊게 나눠봐요<emoji=heart04>」"

[[dialogue]]
speaker = "ロロット"
original = "「まずはお風呂で洗いっこして……お口やおっぱいでも、沢山しましょうね<emoji=heart04>\u3000会長さんがしたいことは全部です<emoji=heart04>\u3000今日は大盤振る舞いですよ～<emoji=heart04>」"
translation = "「우선은 목욕탕에서 서로 씻겨주면서…… 입이나 가슴으로도 잔뜩 해요<emoji=heart04> 회장님이 하고 싶은 건 전부예요<emoji=heart04> 오늘은 대방출이라구요~<emoji=heart04>」"

[[dialogue]]
speaker = "シン"
original = "「お、お手柔らかに……」"
translation = "「서, 살살 부탁해……」"

[[dialogue]]
speaker = "ロロット"
original = "「さあ、期間が空いてしまった分を、取り戻しますよ、会長さん<emoji=heart04>」"
translation = "「자, 떨어져 있던 만큼을 되찾는 거예요, 회장님<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "こうして、僕とロロットは思いつく限りの方法を全て駆使して、とことん愛し合うのだった。"
translation = "이렇게 나와 로롯토는 생각나는 모든 방법을 동원해 끝까지 사랑을 나누었다."

