[[dialogue]]
speaker = "unk"
original = "クリスマス当日。紅明とまた一緒にデートに出かけて、その帰り道でのこと――"
translation = "크리스마스 당일. 코우메이와 다시 함께 데이트하러 나갔고, 그 귀갓길에서의 일──"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「――いや～、今日は楽しかったな～♪\u3000まさかこの前とは打って変わって、誰にもタレントだって気付かれずにデートできちゃうなんてね～」"
translation = "「──이야~ 오늘은 즐거웠네~♪ 설마 저번과는 딴판으로 아무에게도 탤런트라는 걸 들키지 않고 데이트할 수 있을 줄이야~」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「開き直って、クリスマスプレゼント配りまくってやるぜ！\u3000ってつもりで、サンタの格好してきてたんだけど、こういうこともあるんだね～」"
translation = "「에라 모르겠다 하고 크리스마스 선물 잔뜩 뿌려주겠어! 라는 생각으로 산타 복장을 하고 왔는데, 이런 일도 있네~」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「女神様がくれた、クリスマスの奇跡のやつなのかな？\u3000――なんつってね♪」"
translation = "「여신님이 주신 크리스마스의 기적 같은 걸까? ──농담이야♪」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「そういえばさ、さっき、目立つくらいイチャイチャしてるカップルが近くを通ったじゃない？」"
translation = "「그러고 보니 아까 눈에 띌 정도로 꽁냥거리는 커플이 근처를 지나갔잖아?」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「――そうそう。ダーリンとアタシみたいに熱々な感じの。すれ違う時に、会話がちょこっと聞こえちゃったんだけど……」"
translation = "「──맞아 맞아. 달링이랑 나처럼 뜨거운 느낌의. 스쳐 지나갈 때 대화가 살짝 들렸는데……」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「あの２人、この後は家に帰って、朝までエッチしちゃうみたい<emoji=heart04>」"
translation = "「저 두 사람, 이다음에는 집에 가서 아침까지 섹스할 건가 봐<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「うしし♪\u3000クリスマスの夜だもんね～。当然、そういうテンションにもなっちゃうよね～<emoji=heart04>」"
translation = "「우시시♪ 크리스마스 밤인걸~. 당연히 그런 텐션이 되어버리겠지~<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「というわけで、ダーリン――」"
translation = "「그런 고로, 달링──」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「アタシたちもこの後、家でエッチしちゃう？」"
translation = "「우리도 이따가 집에서 섹스할까?」"

[[dialogue]]
speaker = "unk"
original = "耳元で囁かれて、期待でドキッとするが――"
translation = "귓가에 속삭이는 소리에 기대감으로 두근거렸지만──"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「と言いたいところなんだけど……ダーリン、ごめん！\u3000実はこの後、外せない用事があるんだよね～」"
translation = "「라고 말하고 싶지만…… 달링, 미안! 사실 이다음에 빠질 수 없는 용무가 있거든~」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「そういうわけで、今日はありがと♪\u3000デート、楽しかったよ！」"
translation = "「그런 고로 오늘은 고마워♪ 데이트 즐거웠어!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「イチャイチャの続きは、また今度ね<emoji=heart04>」"
translation = "「꽁냥거리는 건 다음에 하자<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その後、俺はちょっと寂しい気持ちを抱えながら帰宅する。風呂に入って、自室のベッドで就寝した。"
translation = "그 후 나는 조금 쓸쓸한 마음을 안고 귀가했다. 목욕을 하고 자기 방 침대에서 잠을 청했다."

[[dialogue]]
speaker = "unk"
original = "そうして、眠っていたのだが――"
translation = "그렇게 잠들어 있었는데──"

[[dialogue]]
speaker = "？？？"
original = "「んっ……<emoji=heart04>\u3000ダーリンの……はぁ……<emoji=heart04>\u3000寝てても大きくて……ふぅ……<emoji=heart04>\u3000すごいっしょ……あんっ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 달링 거…… 하아……<emoji=heart04> 자고 있어도 커서…… 후우……<emoji=heart04> 대단하지…… 앙……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "……なんだか、ペニスが気持ちいい。そう思って、目を覚ますと――"
translation = "……왠지 자지가 기분 좋다. 그렇게 생각하며 눈을 뜨자──"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「あっ……♪\u3000ダーリン、起きた？\u3000うしし<emoji=heart04>\u3000メリークリスマス☆」"
translation = "「앗……♪ 달링, 깼어? 우시시<emoji=heart04> 메리 크리스마스☆」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「――なんでここにいるのかって？\u3000実はアタシから、ダーリンにサプライズをしたいな～って思って」"
translation = "「──왜 여기 있냐고? 사실 내가 달링에게 서프라이즈를 해주고 싶어서 말이야」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「見ての通り、クリスマスプレゼント的な感じで、エッチな夜這いをね<emoji=heart04>\u3000んふふっ<emoji=heart04>」"
translation = "「보다시피 크리스마스 선물 같은 느낌으로 야한 밤시중을 왔지<emoji=heart04> 응후후<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「――どうやって家に入ったのか？\u3000リノさんに相談したら、ノリノリで協力してくれたんだよね～。スペアキーを借りちゃいました☆」"
translation = "「──어떻게 집에 들어왔냐고? 리노 씨한테 상담했더니 신나서 협력해 주시더라고~. 여분 열쇠를 빌렸슴다☆」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「あ、ちなみに、リノさんからダーリンに伝言があって……」"
translation = "「아, 참고로 리노 씨가 달링한테 전언이 있는데……」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「今日は朝まで家に帰らないから、男として頑張りなさい――だってさ<emoji=heart04>」"
translation = "「오늘은 아침까지 집에 안 들어올 테니까 남자로서 힘내렴── 이래<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「でも、んっ……<emoji=heart04>\u3000サプライズとはいえ、ダーリンにはエッチお預けの残念な気分にさせちゃってたわけだし」"
translation = "「하지만, 응……<emoji=heart04> 서프라이즈라곤 해도 달링에게 섹스 보류라는 아쉬운 기분을 느끼게 했었으니까」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「その分、アタシがおま○こでいっぱい気持ちよくしちゃうから、ダーリンはそのまま寝転がってていいからね<emoji=heart04>」"
translation = "「그만큼 내가 보지로 잔뜩 기분 좋게 해줄 테니까 달링은 그대로 누워 있어도 돼<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言うと、紅明はゆっくりと腰をグラインドさせ始めた――"
translation = "그렇게 말하며 코우메이는 천천히 허리를 그라인드시키기 시작했다──"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んっ<emoji=heart04>\u3000はあぁっ……<emoji=heart04>\u3000ふうぅっ……<emoji=heart04>\u3000んんっ……<emoji=heart04>\u3000はあぁっ……<emoji=heart04>」"
translation = "「응<emoji=heart04> 하아……<emoji=heart04> 후우……<emoji=heart04> 응응……<emoji=heart04> 하아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「あっ<emoji=heart04>\u3000あんっ……<emoji=heart04>\u3000ダーリンの太いおち○ぽに中押し広げられちゃって、声が出ちゃう<emoji=heart04>\u3000はあぁっ……<emoji=heart04>\u3000ふうぅっ……<emoji=heart04>\u3000んうぅっ……<emoji=heart04>\u3000ふあぁっ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앙……<emoji=heart04> 달링의 굵은 자지에 안쪽이 벌려져서 목소리가 나와버려<emoji=heart04> 하아……<emoji=heart04> 후우……<emoji=heart04> 응으……<emoji=heart04> 후아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「――んっ<emoji=heart04>\u3000いつもよりおま○こがすごい濡れてる？\u3000隠してたのに……あんっ<emoji=heart04>\u3000ダーリンに気づかれちゃった……ふうぅっ……<emoji=heart04>」"
translation = "「──응<emoji=heart04> 평소보다 보지가 엄청 젖어있다고? 숨기고 있었는데…… 앙<emoji=heart04> 달링한테 들켜버렸다…… 후우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「本当はアタシも、んんっ……<emoji=heart04>\u3000あのイチャイチャカップルの会話を聞いた時から、早く夜這いして、ダーリンとエッチしたいって期待しちゃってて……あんっ<emoji=heart04>」"
translation = "「사실은 나도, 응응……<emoji=heart04> 그 꽁냥거리던 커플 대화를 들었을 때부터 빨리 밤시중 와서 달링이랑 섹스하고 싶다고 기대하고 있어서…… 앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「時間が真夜中になるまで我慢している間も、まだかまだかとおま○こ待ちわびて、ぐちゅちゅになっちゃってたのぉ……<emoji=heart04>\u3000はぁんっ……<emoji=heart04>」"
translation = "「시간이 한밤중이 될 때까지 참는 동안에도 언제나 언제나 하며 보지가 애타게 기다려서 질척질척해져 버렸어…… 하앙……<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「だから、ごめん。んっ……<emoji=heart04>\u3000本当はパイズリとか、フェラとかで起こそうかなって考えてたりもしたんだけど……ふあぁっ……<emoji=heart04>」"
translation = "「그러니까 미안. 응……<emoji=heart04> 사실은 파이즈리나 펠라 같은 걸로 깨울까 생각도 했었지만…… 후아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ダーリンのおち○ぽ見たら我慢できなくて……入れちゃったぁ……<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はあぁっ……<emoji=heart04>\u3000んうぅっ……<emoji=heart04>\u3000あっ……<emoji=heart04>\u3000んあぁっ……<emoji=heart04>」"
translation = "「달링 자지를 보니까 참을 수 없어서…… 넣어버렸어……<emoji=heart04> 앙<emoji=heart04> 하아……<emoji=heart04> 응으……<emoji=heart04> 앗……<emoji=heart04> 응아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「あっ<emoji=heart04>\u3000すごい<emoji=heart04>\u3000ダーリンのもっと大きくなって、固くなってるぅ<emoji=heart04>\u3000はあぁっ……<emoji=heart04>\u3000んっ<emoji=heart04>\u3000あっ……ふあぁっ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 굉장해<emoji=heart04> 달링 거 더 커지고 딱딱해졌어……<emoji=heart04> 하아……<emoji=heart04> 응<emoji=heart04> 앗…… 후아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「――アタシがエッチなこと言うから？\u3000んモー、ダーリンが言わせたんでしょぉ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふうぅっ……<emoji=heart04>\u3000んあぁっ……<emoji=heart04>」"
translation = "「──내가 야한 소리를 하니까? 음메, 달링이 말하게 시킨 거잖아~<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 후우……<emoji=heart04> 응아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んっ……<emoji=heart04>\u3000おま○こ、すっかりトロトロで堪らなくなっちゃってるから、もうそろそろ、いつもの<b>アレ</b>しちゃうね？」"
translation = "「응……<emoji=heart04> 보지, 완전히 걸쭉해져서 참을 수 없게 됐으니까 이제 슬슬 평소의 <b>그거</b> 할게?」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「――うん<emoji=heart04>\u3000ダーリンの好きな……『おま○こハグ』<emoji=heart04>」"
translation = "「──응<emoji=heart04> 달링이 좋아하는…… 『보지 허그』<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「それじゃあ、いくよ～？\u3000はい、ぎゅうぅ～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「그럼 간다~? 자, 꾸우우욱~~~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "おま○こが俺のペニスを抱き締めるように、ぎゅっと柔らかい肉壁を絡みつかせてくる。"
translation = "보지가 내 자지를 껴안듯이 꽉 부드러운 육벽을 휘감아 온다."

[[dialogue]]
speaker = "unk"
original = "紅明曰く、人生２周目の経験によるエッチスキルらしい。その天国のような感触に包まれて、思わず気持ちよさで身じろぎしてしまう。"
translation = "코우메이 말로는 인생 2회차의 경험에 의한 섹스 스킬이라고 한다. 그 천국 같은 감촉에 휩싸여 나도 모르게 쾌감으로 몸을 뒤척이고 만다."

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んっ……<emoji=heart04>\u3000このまま、ピストン始めちゃうね？\u3000はあぁっ……<emoji=heart04>\u3000んんっ――<emoji=heart04><emoji=heart04>」"
translation = "「응……<emoji=heart04> 이대로 피스톤 시작할게? 하아……<emoji=heart04> 응응──<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ふあぁっ<emoji=heart04>\u3000あっ……あんっ<emoji=heart04>\u3000はあぁっ……<emoji=heart04>\u3000んあぁっ……<emoji=heart04>\u3000あっ……<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000んっ……<emoji=heart04>\u3000はあぁっ……<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んあぁっ……<emoji=heart04>」"
translation = "「후아<emoji=heart04> 앗…… 앙<emoji=heart04> 하아……<emoji=heart04> 응아……<emoji=heart04> 앗……<emoji=heart04> 후아<emoji=heart04> 응……<emoji=heart04> 하아……<emoji=heart04> 앙<emoji=heart04> 응아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「おま○こハグで、密着して感じるぅ……<emoji=heart04>\u3000はあぁっ……<emoji=heart04>\u3000ふうぅっ……<emoji=heart04>\u3000すごいぃ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んっ……ふあぁっ<emoji=heart04>\u3000はあぁっ……<emoji=heart04>」"
translation = "「보지 허그로 밀착해서 느껴져……<emoji=heart04> 하아……<emoji=heart04> 후우……<emoji=heart04> 굉장해<emoji=heart04> 앗<emoji=heart04> 응…… 후아<emoji=heart04> 하아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ダーリンのでっかいおち○ぽ、いちばん奥にグリグリって当たって、んあぁっ<emoji=heart04>\u3000気持ちいい……<emoji=heart04>\u3000んうぅっ……<emoji=heart04>\u3000はあぁっ……<emoji=heart04>\u3000ふあぁっ……<emoji=heart04>」"
translation = "「달링의 커다란 자지, 가장 안쪽에 꾸욱꾸욱 닿아서, 응아<emoji=heart04> 기분 좋아……<emoji=heart04> 응으……<emoji=heart04> 하아……<emoji=heart04> 후아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「あっ<emoji=heart04>\u3000あんっ……<emoji=heart04>\u3000ふうぅっ……<emoji=heart04>\u3000んっ……<emoji=heart04>\u3000はあぁんっ……<emoji=heart04>\u3000ダーリンってば、喘ぎ声が出ちゃってる<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앙……<emoji=heart04> 후우……<emoji=heart04> 응……<emoji=heart04> 하앙……<emoji=heart04> 달링도 참, 신음이 나오고 있어<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んっ……<emoji=heart04>\u3000感じてる顔もかわいい<emoji=heart04>\u3000あっ……<emoji=heart04>\u3000はあぁっ……<emoji=heart04>\u3000んふぅっ……<emoji=heart04>\u3000そんなに気持ちいいんだ……？」"
translation = "「응……<emoji=heart04> 느끼는 얼굴도 귀여워<emoji=heart04> 앗……<emoji=heart04> 하아……<emoji=heart04> 응후……<emoji=heart04> 그렇게 기분 좋아……?」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「聞いてると、アタシも興奮してきちゃう……あんっ<emoji=heart04>\u3000はあぁっ……<emoji=heart04>\u3000んっ……<emoji=heart04>\u3000ふうぅっ……<emoji=heart04>」"
translation = "「듣고 있으면 나도 흥분돼버려…… 앙<emoji=heart04> 하아……<emoji=heart04> 응……<emoji=heart04> 후우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「かわいい反応、もっと見せて<emoji=heart04>\u3000ほら、おま○こハグの中動かすやつ、しちゃうから<emoji=heart04>\u3000ふうぅっ……<emoji=heart04>\u3000んんっ……！」"
translation = "「귀여운 반응 더 보여줘<emoji=heart04> 자, 보지 허그 안에서 움직이는 거 할 테니까<emoji=heart04> 후우……<emoji=heart04> 응응……!」"

[[dialogue]]
speaker = "unk"
original = "紅明の膣内が、ペニスに絡みついてくるだけでなく、飲み込むようにうねうね動く。俺はまた、快感で喘ぎ声が出てしまう。"
translation = "코우메이의 질 내부가 자지에 휘감길 뿐만 아니라 삼키듯이 꿈틀꿈틀 움직인다. 나는 다시 쾌감에 신음이 터져 나온다."

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んふっ<emoji=heart04>\u3000ダーリンのおち○ぽ、ビクビクしてる<emoji=heart04>\u3000いっぱい気持ちよくなって<emoji=heart04>\u3000ほら、奥までパンッパン<emoji=heart04>\u3000ずっぷずっぷ<emoji=heart04>\u3000にゅっぽにゅっぽ<emoji=heart04>」"
translation = "「응후<emoji=heart04> 달링 자지, 파르르 떨고 있어<emoji=heart04> 잔뜩 기분 좋아져라<emoji=heart04> 자, 안쪽까지 꽉꽉<emoji=heart04> 푹푹<emoji=heart04> 쪽쪽<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「おま○こパンッパン<emoji=heart04>\u3000じゅっぽじゅっぽ<emoji=heart04>\u3000にゅっぷにゅっぷ<emoji=heart04>\u3000中でぎゅっとしながら<emoji=heart04>\u3000ずっぽずっぽ<emoji=heart04>\u3000じゅっぷじゅっぷ<emoji=heart04>」"
translation = "「보지 꽉꽉<emoji=heart04> 쭈욱쭈욱<emoji=heart04> 쪽쪽<emoji=heart04> 안에서 꽉 조이면서<emoji=heart04> 푹푹<emoji=heart04> 쭈욱쭈욱<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ふんっ<emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000ダーリン、どう？\u3000気持ちいい？\u3000パンッパン<emoji=heart04>\u3000じゅっぽじゅっぽ<emoji=heart04>」"
translation = "「흥<emoji=heart04> 흥<emoji=heart04> 달링, 어때? 기분 좋아? 꽉꽉<emoji=heart04> 쭈욱쭈욱<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「じゅっぷじゅっぷ<emoji=heart04>\u3000にゅっぽにゅっぽ<emoji=heart04>\u3000あはっ☆\u3000ダーリンってば、おっぱい見てる目がやらしいっしょ<emoji=heart04>」"
translation = "「쭈욱쭈욱<emoji=heart04> 쪽쪽<emoji=heart04> 아하☆ 달링도 참, 가슴 보는 눈이 야하다구<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「揉んでもらって大きくなった１０１センチのおっぱいの揺れ、迫力ある？\u3000\u3000ふんっ<emoji=heart04>\u3000ふんっ<emoji=heart04>」"
translation = "「주물러줘서 커진 101센티 가슴의 흔들림, 박력 있어? 흥<emoji=heart04> 흥<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んモー、ダーリンのエッチ～<emoji=heart04>\u3000喘ぎ声も女の子みたいにいっぱい出ちゃってるし<emoji=heart04>\u3000ずっぽずっぽ<emoji=heart04>\u3000にゅっぷにゅっぷ<emoji=heart04>」"
translation = "「음메, 달링 변태~<emoji=heart04> 신음도 여자애처럼 잔뜩 내고 있고<emoji=heart04> 푹푹<emoji=heart04> 쪽쪽<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「感じてる顔もすごくエッチなことになってるよ？\u3000かわいくて背筋がゾクゾクしちゃう<emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000ふんっ<emoji=heart04>」"
translation = "「느끼는 얼굴도 굉장히 야하게 변했어? 귀여워서 등줄기가 오싹오싹해져<emoji=heart04> 흥<emoji=heart04> 흥<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「って、あんっ<emoji=heart04>\u3000手で顔を隠さなくてもいいのに～。んふぅっ……<emoji=heart04>」"
translation = "「어라, 앙<emoji=heart04> 손으로 얼굴 안 가려도 되는데~. 응후……<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ん～？\u3000――見られるのが恥ずかしいって？\u3000喘ぎ声も？\u3000はあぁっ……<emoji=heart04>」"
translation = "「응~? ──보여지는 게 부끄러워? 신음도? 하아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ふ～ん<emoji=heart04>\u3000じゃあもう、腰動かすの止めちゃおうかな～？」"
translation = "「흐음<emoji=heart04> 그럼 이제 허리 움직이는 거 멈춰버릴까~?」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ふうぅ……<emoji=heart04>\u3000ほら、おま○こハグもおしまい～☆\u3000せっかく気持ちいいところだったのにな～♪\u3000残念<emoji=heart04>」"
translation = "「후우……<emoji=heart04> 자, 보지 허그도 끝~☆ 기껏 기분 좋은 참이었는데 말이야~♪ 아쉽네<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「――ん？\u3000なにかな、ダーリン♪\u3000恥ずかしがらずに、言って<emoji=heart04>」"
translation = "「──응? 뭐야, 달링♪ 부끄러워하지 말고 말해봐<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は手で顔を隠すのを止めて、彼女に、動いてイカせて欲しいとおねだりする――"
translation = "나는 손으로 얼굴 가리는 걸 멈추고 그녀에게 움직여서 가게 해달라고 조른다──"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「はああぁっ……<emoji=heart04><emoji=heart04>\u3000ダーリンのおねだり、かわいくて、エッチすぎて、おま○こキュンキュンしちゃう……！\u3000ふうぅっ……<emoji=heart04>」"
translation = "「하아아……<emoji=heart04><emoji=heart04> 달링이 조르는 거, 귀여워서, 너무 야해서 보지가 큥큥거려……! 후우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「意地悪してごめんね、ダーリン。でも正直、めっちゃ興奮するっ……<emoji=heart04>\u3000はあぁっ……<emoji=heart04>\u3000だから――」"
translation = "「심술 부려서 미안해, 달링. 하지만 솔직히 엄청 흥분돼……<emoji=heart04> 하아……<emoji=heart04> 그러니까──」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「今から激しく全力ピストンしちゃうけど、許してね？\u3000いくよっ<emoji=heart04>」"
translation = "「지금부터 격하게 전력 피스톤 할 테니까 용서해 줘? 간다<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「せ～のっ<emoji=heart04>\u3000ふんっ――<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하나~ 둘!<emoji=heart04> 흥──<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ふんっふんっ<emoji=heart04>\u3000ふんっふんっ<emoji=heart04>\u3000どちゅどちゅ、じゅっぷじゅっぷ<emoji=heart04>\u3000ぬちゅぬちゅ、ずっぽずっぽ<emoji=heart04>」"
translation = "「흥 흥<emoji=heart04> 흥 흥<emoji=heart04> 퍽퍽, 쭈욱쭈욱<emoji=heart04> 찌릿찌릿, 푹푹<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「おま○こパンッパン<emoji=heart04>\u3000パンッパン<emoji=heart04>\u3000ずぽずぽ、ぬっぷぬっぷ<emoji=heart04>\u3000どちゅどちゅ、じゅっぽじゅっぽ<emoji=heart04>」"
translation = "「보지 꽉꽉<emoji=heart04> 꽉꽉<emoji=heart04> 푹푹, 쪽쪽<emoji=heart04> 퍽퍽, 쭈욱쭈욱<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「はああぁっ<emoji=heart04>\u3000ダーリンの気持ちよくて泣きそうな顔、かわいい<emoji=heart04>\u3000好きっ<emoji=heart04>\u3000もっと、もっと気持ちよくなって<emoji=heart04>\u3000ふんっふんっ<emoji=heart04>\u3000ふんっふんっ<emoji=heart04>」"
translation = "「하아아<emoji=heart04> 달링의 기분 좋아서 울 것 같은 얼굴, 귀여워<emoji=heart04> 좋아해<emoji=heart04> 더, 더 기분 좋아져라<emoji=heart04> 흥 흥<emoji=heart04> 흥 흥<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「全力おま○こハグもしちゃうよ～<emoji=heart04>\u3000いくよ？\u3000せ～のっ――ぎゅうぅぅ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「전력 보지 허그도 할 거야~<emoji=heart04> 간다? 하나~ 둘──꾸우우우우욱~~~~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "次の瞬間、ペニスが、まさに搾精というべきバキュームの快感に襲われる……！"
translation = "다음 순간, 자지가 그야말로 사정 착취라고 할 법한 진공의 쾌감에 휩싸인다……!"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ふんっふんっふんっ<emoji=heart04>\u3000おま○こパンッパンッパンッ<emoji=heart04>\u3000ぎゅっぷぎゅっぷ、じゅっぽじゅっぽ<emoji=heart04>\u3000どちゅどちゅ、ぎゅっぽぎゅっぽ<emoji=heart04>」"
translation = "「흥 흥 흥<emoji=heart04> 보지 꽉 꽉 꽉<emoji=heart04> 쭈욱쭈욱, 쭈욱쭈욱<emoji=heart04> 퍽퍽, 쭈욱쭈욱<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んん゛っ<emoji=heart04>\u3000アタシもおち○ぽ気持ちいいっ<emoji=heart04>\u3000ハグでめっちゃ擦れるぅっ<emoji=heart04>\u3000ふんっふんっ<emoji=heart04>\u3000ぬちゅぬちゅ、ずっぽずっぽ<emoji=heart04>\u3000ぎゅぷぎゅぷ、じゅっぽじゅっぽ<emoji=heart04>」"
translation = "「응으<emoji=heart04> 나도 자지 기분 좋아<emoji=heart04> 허그로 엄청 비벼져……!<emoji=heart04> 흥 흥<emoji=heart04> 찌릿찌릿, 푹푹<emoji=heart04> 쭈욱쭈욱, 쭈욱쭈욱<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「あ゛～っ<emoji=heart04>\u3000ダーリンおち○ぽ効くぅっ<emoji=heart04>\u3000大きくて逞しくて、気持ちいいのぉ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>」"
translation = "「아으~<emoji=heart04> 달링 자지 잘 들어와……! 크고 늠름해서 기분 좋아아<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 하아<emoji=heart04> 후아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んっ<emoji=heart04>\u3000きてる<emoji=heart04>\u3000アタシ、もうイキそうっ……！」"
translation = "「응<emoji=heart04> 오고 있어<emoji=heart04> 나, 이제 갈 것 같아……!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「――ダーリンもイキそうなの？\u3000うん、一緒にいこっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ダーリンのおち○ぽミルク、いっぱい飲ませてっ<emoji=heart04>」"
translation = "「──달링도 갈 것 같아? 응, 같이 가자<emoji=heart04> 하아<emoji=heart04> 달링의 자지 우유, 잔뜩 마시게 해줘<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ふんっふんっ<emoji=heart04>\u3000ふんっふんっ<emoji=heart04>\u3000ぬちゅぬちゅ、ずっぽずっぽ<emoji=heart04>」"
translation = "「흥 흥<emoji=heart04> 흥 흥<emoji=heart04> 찌릿찌릿, 푹푹<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「おま○こパンッパンッ<emoji=heart04>\u3000パンッパンッ<emoji=heart04>\u3000ぎゅぷぎゅぷ、じゅっぽじゅっぽ<emoji=heart04>」"
translation = "「보지 꽉 꽉<emoji=heart04> 꽉 꽉<emoji=heart04> 쭈욱쭈욱, 쭈욱쭈욱<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ふうぅっ<emoji=heart04>\u3000きた、きたきた<emoji=heart04>\u3000アクメ昇ってきたっ<emoji=heart04>」"
translation = "「후우<emoji=heart04> 왔다, 왔다 왔다<emoji=heart04> 절정 올라왔어……!<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ダーリンもきてっ<emoji=heart04>\u3000おち○ぽミルク、アタシの中にいっぱい出してぇっ<emoji=heart04>」"
translation = "「달링도 와줘<emoji=heart04> 자지 우유, 내 안에 잔뜩 내보내줘어<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「あ～っ<emoji=heart04>\u3000イクっ<emoji=heart04><emoji=heart04>\u3000イクイクイクイグ――っ<emoji=heart04><emoji=heart04>」"
translation = "「아~<emoji=heart04> 간다<emoji=heart04><emoji=heart04> 가 가 가 가──앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「おま○こイックぅぅぅーーーーーーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふあああぁぁぁ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「보지 가버려어어어어어어어어어어어어엇<emoji=heart04><emoji=heart04><emoji=heart04> 후아아아아아아~~~~~~~~~~~~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んああぁぁ～～っ<emoji=heart04><emoji=heart04>\u3000ダーリンの熱いおち○ぽミルク、子宮にいっぱいきてるっしょぉ～<emoji=heart04>」"
translation = "「응아아아~~<emoji=heart04><emoji=heart04> 달링의 뜨거운 자지 우유, 자궁에 잔뜩 오고 있어어~<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「はああぁっ……<emoji=heart04>\u3000すごっ……<emoji=heart04>\u3000射精、まだどぴゅどぴゅって止まらないぃ……<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 굉장해……<emoji=heart04> 사정, 아직 울컥울컥 멈추지 않아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ふうぅ……<emoji=heart04>\u3000ダーリンの射精、いつも長くて、種付けって感じで素敵ぃ……<emoji=heart04>」"
translation = "「후우……<emoji=heart04> 달링의 사정은 항상 길어서 씨내리기라는 느낌이라 멋져……<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んっ……<emoji=heart04>\u3000止まった……<emoji=heart04>\u3000はあぁ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 멈췄다……<emoji=heart04> 하아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ふぅ……<emoji=heart04>\u3000はぁ……<emoji=heart04>\u3000すっごく気持ちよかったぁ……<emoji=heart04>」"
translation = "「후우……<emoji=heart04> 하아……<emoji=heart04> 정말 기분 좋았어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「アタシ、ダーリンを甘やかしちゃうエッチも好きだけど、Ｓっぽく責めちゃうのも、ちょっと好きかも……♪」"
translation = "「나는 달링을 응석받이로 만드는 섹스도 좋지만, S처럼 괴롭히는 것도 좀 좋을지도……♪」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「おっぱいも興奮して、いっぱい母乳出ちゃったし……<emoji=heart04>」"
translation = "「가슴도 흥분해서 모유가 잔뜩 나와버렸고……<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「――ダーリンもすごく気持ちよかった？\u3000えへへ<emoji=heart04>\u3000なら嬉しい……♪」"
translation = "「──달링도 아주 기분 좋았어? 에헤헤<emoji=heart04> 그럼 기뻐……♪」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「それで、ダーリン……んっ<emoji=heart04>」"
translation = "「그래서, 달링…… 응<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ふと、紅明はわざとらしく、抜けたペニスにスマタをし始める。"
translation = "문득 코우메이는 짐짓 시치미를 떼며 빠진 자지에 스마타를 하기 시작한다."

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「この後はどうしよっか……？\u3000もう寝ちゃう？\u3000それとも――」"
translation = "「이다음에는 어떻게 할까……? 이제 잘래? 아니면──」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「朝までエッチコース、しちゃう？」"
translation = "「아침까지 섹스 코스, 할래?」"

[[dialogue]]
speaker = "unk"
original = "期待している笑顔を前に、男として応えないわけにはいかない。俺はガバッと起き上がると――"
translation = "기대하고 있는 미소를 앞에 두고 남자로서 응하지 않을 수 없다. 나는 벌떡 일어나──"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「あっ♪\u3000あんっ……<emoji=heart04>\u3000ダーリン、そんな強くおっぱい飲んじゃ、乳首感じちゃう……<emoji=heart04>\u3000ふああぁっ――<emoji=heart04>」"
translation = "「앗♪ 앙……<emoji=heart04> 달링, 그렇게 강하게 가슴을 빨면 유두 느껴버려……<emoji=heart04> 후아아──<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "言いつつも嬉しそうな彼女の母乳を飲んで回復した後、再びそのおっぱいを淫らに揺らすことになるのだった――"
translation = "말은 그렇게 하면서도 기뻐 보이는 그녀의 모유를 마시고 회복한 뒤, 다시 그 가슴을 음란하게 흔들게 되는 것이었다──"

