[[dialogue]]
speaker = "unk"
original = "出現報告があった場所へ急行する俺たち。"
translation = "출현 보고가 있었던 장소로 급히 향하는 우리들."

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ぴょーん、ぴょーん、ぴょーん……さあ、一緒にこちらへ……ぴょーん、ぴょーん……」"
translation = "「뿅, 뿅, 뿅…… 자, 이쪽으로 같이…… 뿅, 뿅……」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ぴょーん、ぴょーん……トリシャの真似してぴょんぴょんしてたら疲れてきたゆ……」"
translation = "「뿅, 뿅…… 트리샤 흉내 내면서 뿅뿅거렸더니 지쳤구유……」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「こんな時はお菓子ゆ！\u3000お菓子を持ってくるゆ！」"
translation = "「이럴 때는 과자구유! 과자를 가져오겠구유!」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「お菓子ならあるよ。はい、これ食べて」"
translation = "「과자라면 있어. 자, 이거 먹어.」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ゆ～っ、嬉しいゆ♪\u3000はむはむはむはむっ、お菓子おいしいの♪」"
translation = "「유~, 기쁘구유♪ 함냠함냠함냠, 과자 맛있구유♪」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ありがとう、舞亜さん。いいとこに来てくれて助かったよ」"
translation = "「고마워요, 마아 씨. 적절한 때에 와줘서 살았어요.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ゾンビ型幽霊が相手だと戦闘ではあまり役に立てそうにないし、このくらいはね」"
translation = "「좀비형 유령이 상대라면 전투에선 별로 도움이 안 될 것 같고, 이 정도쯤이야.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「それにしても……話は聞いてたけど、本当にぴょんぴょんしてるんだね、トリシャさん」"
translation = "「그나저나…… 이야기는 들었지만, 정말로 뿅뿅거리고 있네, 트리샤 씨.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「人工戦闘服の影響みたいだよ。ゾンビ型幽霊に似せてるのかな」"
translation = "「인공 전투복의 영향인 것 같아. 좀비형 유령을 흉내 내는 걸까.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「そうかも。あれに思考能力があるのかは知らないけど、トリシャさんのことまるで仲間だと思ってるみたい」"
translation = "「그럴지도. 저것들에게 사고 능력이 있는지는 모르겠지만, 트리샤 씨를 마치 동료라고 생각하는 것 같아.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「それにしてもトリシャさん、ずっと飛び跳ねっぱなしで大丈夫なのかな？」"
translation = "「그건 그렇고 트리샤 씨, 계속 뛰어다니는데 괜찮으려나?」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「そうだね……ちょっとずつジャンプの高さが下がってきてるのは疲れによるものなのかな？」"
translation = "「그러게…… 조금씩 점프 높이가 낮아지는 건 지쳐서 그런 걸까?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「あ～……スタミナ切れしてると、足が重たくなって跳べないんだよね」"
translation = "「아~…… 스태미나가 떨어지면 다리가 무거워져서 못 뛰거든.」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ぴょーん、ぴょーん……ぴょーん、ぴょーん……」"
translation = "「뿅, 뿅…… 뿅, 뿅……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「トリシャさん、大丈夫ですか？\u3000かなり疲れてきているように見えますけど……」"
translation = "「트리샤 씨, 괜찮으세요? 상당히 지쳐 보이는데……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「そうですね……でも、問題ありません……オトモダチとして……最後まで頑張ってみせます……にへへ……」"
translation = "「그렇네요…… 하지만, 문제없습니다…… 친구로서…… 마지막까지 힘내 보이겠어요…… 헤헤……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ぴょーん、ぴょーん……さあ、こちらです……私の後について来てください……」"
translation = "「뿅, 뿅…… 자, 이쪽입니다…… 제 뒤를 따라오세요……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「……人工戦闘服のサポートがありますから、まだ大丈夫だとは思いますが、それでも……」"
translation = "「……인공 전투복의 서포트가 있으니 아직 괜찮을 거라 생각하지만, 그래도……」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「やっぱりちょっときつそうだね」"
translation = "「역시 좀 힘들어 보이네.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "（…………トリシャさん、もう少しだけ……頑張って！）"
translation = "（…………트리샤 씨, 조금만 더…… 힘내!）"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ぴょーん、ぴょーん……まだこれほどの数がいるのですか……想像を遥かに超えた大氾濫ですね……」"
translation = "「뿅, 뿅…… 아직 이만큼이나 있나요…… 상상을 훨씬 초월한 대범람이네요……」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「おーい、こっちこっちー！\u3000まだたっぷり残ってるよー！」"
translation = "「어ー이, 이쪽이야 이쪽! 아직 잔뜩 남았어!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ウズメさん！\u3000大聖堂にいるのは、これで全部？」"
translation = "「우즈메 씨! 대성당에 있는 건 이걸로 전부야?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「全部どころか半分以下だよ。あっちこっちに散らばってるんだから」"
translation = "「전부는커녕 절반 이하야. 여기저기 흩어져 있으니까.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「あと何か所回ればいいんでしょうか……」"
translation = "「앞으로 몇 군데를 더 돌아야 할까요……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「報告があった場所は残り僅かです。トリシャさんのベルで各所から集まってきてるようなので、現時点で追加の報告は入っていません」"
translation = "「보고가 있었던 장소는 이제 얼마 안 남았어요. 트리샤 씨의 벨 소리에 각지에서 모여들고 있는 것 같아서, 현시점에서 추가 보고는 들어오지 않았어요.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「となると、終わりも近いのかな……」"
translation = "「그렇다면 끝도 가깝나 보네……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ぴょーん……ぴょーん……ぴょんっ」"
translation = "「뿅…… 뿅…… 뿅」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「これで……全部です……フフ、ぴょんぴょんしすぎてうさぎさんになるかと思いました……」"
translation = "「이걸로…… 전부입니다…… 후후, 뿅뿅 너무 뛰어서 토끼가 되는 줄 알았어요……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「お疲れさまトリシャさん。ありがとう」"
translation = "「수고했어 트리샤 씨. 고마워.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「それにしても最終地点がアリーナだなんて偶然？\u3000それとも会長くんの狙い通りだったりして」"
translation = "「그나저나 최종 지점이 아레나라니 우연일까? 아니면 회장군이 노린 대로인 걸까?」"

[[dialogue]]
speaker = "unk"
original = "この数を全部収容するにはここしかないから"
translation = "이 숫자를 전부 수용하려면 여기밖에 없으니까"

[[dialogue]]
speaker = "unk"
original = "アリーナなら派手に戦闘してもＯＫ"
translation = "아레나라면 화끈하게 전투해도 OK"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「後は倒すだけ、ですね……」"
translation = "「남은 건 쓰러뜨리는 것뿐, 이군요……」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ゆ～っゆっゆっゆ♪\u3000作戦は大成功なの♪\u3000トリシャもよく頑張ったゆ♪」"
translation = "「유~웃유유♪ 작전은 대성공이구유♪ 트리샤도 수고 많았구유♪」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「まだ最後のバトルが残ってるんだけどね……トリシャさんは疲れてると思うし少し休みますか？」"
translation = "「아직 최종 배틀이 남았지만 말이야…… 트리샤 씨는 지친 것 같으니 조금 쉴래?」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「フフ……最終決戦を前にして、休んでなどいられるでしょうか……ミルフィーさんのオトモダチとして、肩を並べて戦いましょう」"
translation = "「후후…… 최종 결전을 앞두고 쉴 수야 있겠습니까…… 밀피 씨의 친구로서, 어깨를 나란히 하고 싸우겠어요.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「これで最後だから一緒に頑張ろうね」"
translation = "「이게 마지막이니까 같이 힘내자.」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「はい、共に……」"
translation = "「네, 함께……」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「でも集めたはいいんだけど、この数はちょっと……いや、かなーり大変だよ？」"
translation = "「하지만 모은 건 좋은데, 이 숫자는 좀…… 아니, 꽤ー 힘든걸?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「そこは気合いで何とかするし♪」"
translation = "「그건 기합으로 어떻게든 하면 되고♪」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「いや、気合いにも限度がありますから……」"
translation = "「아니, 기합에도 한도가 있으니까요……」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ゆ～っゆっゆっゆ♪\u3000やはりここは余の出番ゆ！」"
translation = "「유~웃유유♪ 역시 여기선 유가 나설 차례구유!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「え……ジャクリーヌさん？\u3000だ、大丈夫なの？」"
translation = "「에…… 자클린 씨? 개, 괜찮은 거야?」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「数が多くてうざったい幽霊は……こうしてやればいいのっ！」"
translation = "「숫자가 많아서 짜증 나는 유령은…… 이렇게 해주면 되는 거구유!」"

[[dialogue]]
speaker = "unk"
original = "言うが早いかジャクリーヌがとび出して行き、ゾンビ型幽霊を掴んでは片っ端から引っ付けていく。"
translation = "말이 끝나기가 무섭게 자클린이 튀어나가 좀비형 유령을 붙잡고는 닥치는 대로 이어 붙이기 시작한다."

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ゆっ♪\u3000ゆっ♪\u3000こうして、こうして、こうだゆ！\u3000ゆゆゆゆゆ～～～っ♪」"
translation = "「유♪ 유♪ 이렇게, 이렇게, 이거구유! 유유유유유~~~♪」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「これで出来あがりゆ！\u3000ぜ～んぶひとまとめにしてやったゆ～♪」"
translation = "「이걸로 완성구유! 저어언부 하나로 뭉쳐버렸구유~♪」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ちょっ、マジで！？\u3000全部くっつけちゃったんだけど！」"
translation = "「잠깐, 진짜로!? 전부 붙여버렸는데!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「すごいよ、ジャクリーヌさん！\u3000これならおっきいのを１体倒すだけで済んじゃうね」"
translation = "「대단해, 자클린 씨! 이러면 커다란 거 한 마리만 잡으면 되겠네.」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「フフ……１体になった分、幽体の密度も跳ね上がっていますが……」"
translation = "「후후…… 하나가 된 만큼, 유체의 밀도도 치솟아 있습니다만……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「え？\u3000もしかしてめちゃくちゃ強い？」"
translation = "「에? 설마 엄청 강해?」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ゆっゆっゆ♪\u3000最強になった巨大幽霊ゾンビ……お前たちは倒せるゆ？」"
translation = "「유유유♪ 최강이 된 거대 유령 좀비…… 너희는 쓰러뜨릴 수 있구유?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「うわぁ、ラスボスみたいな発言……」"
translation = "「우와, 라스보스 같은 발언……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「でも、実質ラスボスのようなものですし」"
translation = "「하지만, 실질적으로 라스보스 같은 것이니까요.」"

[[dialogue]]
speaker = "unk"
original = "こいつをやっつけるぞ！"
translation = "이 녀석을 해치우자!"

[[dialogue]]
speaker = "unk"
original = "みんなの力を合わせて！"
translation = "모두의 힘을 합쳐서!"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「行くよ、トリシャさん！」"
translation = "「가자, 트리샤 씨!」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「はい、背中は私がお守りします……」"
translation = "「네, 등 뒤는 제가 지키겠습니다……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「うんっ」"
translation = "「응!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「メインアタッカーはミルフィーで、サブアタッカーがトリシャさん……」"
translation = "「메인 어태커는 밀피고, 서브 어태커가 트리샤 씨……」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「残る私たちは、２人のサポートだね」"
translation = "「남은 우리들은 두 사람의 서포트네.」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ゆ？\u3000余は何をするゆ？」"
translation = "「유? 유는 뭘 하구유?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「お菓子食べながら観戦してればいいんじゃない？」"
translation = "「과자 먹으면서 관전이나 하면 되잖아?」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ゆっゆっゆ♪\u3000それで決まりなの♪\u3000お菓子頂きまぁすなの♪」"
translation = "「유유유♪ 그걸로 결정이구유♪ 과자 잘 먹겠구유♪」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「こちらの準備は整いました。あとは開戦の合図を待つだけです」"
translation = "「이쪽은 준비가 끝났습니다. 남은 건 개전 신호를 기다리는 것뿐입니다.」"

[[dialogue]]
speaker = "unk"
original = "じゃあ行くぞ！"
translation = "그럼 간다!"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「最終決戦開始ですっ！」"
translation = "「최종 결전 시작입니다!」"

