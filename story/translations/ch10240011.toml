[[dialogue]]
speaker = "unk"
original = "第１話,九浄家メイド隊のクエスト受付嬢,P"
translation = "제1화, 쿠죠 가문 메이드대의 퀘스트 접수원"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスと昼食を取りにカフェテリアへやって来ていた、ある日のこと──"
translation = "비너스와 점심을 먹으러 카페테리아에 왔던 어느 날──"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ヴィーナスお嬢様、ご歓談のところ失礼致します」"
translation = "「비너스 아가씨, 담소 중에 실례하겠습니다.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あら、どうしたの？\u3000あなたも昼食？」"
translation = "「어라, 무슨 일이야? 너도 점심?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そうだ！\u3000私たちもこれからだから、一緒に食べない？\u3000……って、それ私のお財布？」"
translation = "「그렇지! 우리도 이제 먹으려던 참인데 같이 먹을래? ……어라, 그거 내 지갑?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「朝、お屋敷の玄関にお忘れでしたよ。おそらくポケットから滑り落ちたんじゃないかと」"
translation = "「아침에 저택 현관에 잊고 가셨더라고요. 아마 주머니에서 흘러나온 게 아닐까 싶어서요.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「本当だわ、いつもポケットに入れてるから気付かなかった！\u3000ありがとう、ヨミヨミ～♪」"
translation = "「정말이네, 항상 주머니에 넣어둬서 몰랐어! 고마워, 요미요미~♪」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「わぁっ……くんくん、お嬢様良い匂い♪\u3000……って、そうじゃなくて！」"
translation = "「와앗…… 킁킁, 아가씨 좋은 냄새♪ ……가 아니라!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「公の場で抱き付かないで下さい、あとヨミヨミって呼ぶのも止めて下さいっ。恥ずかしいですから！」"
translation = "「공공장소에서 달라붙지 말아 주세요, 그리고 요미요미라고 부르는 것도 그만둬 주세요. 창피하니까요!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「え～？\u3000ヨミヨミ可愛いのに～」"
translation = "「에~? 요미요미 귀여운데~」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「会長さんも居るんですから、九浄家のメイドとしての体裁があるんですっ。お嬢様もちゃんと令嬢らしく振る舞って下さいっ」"
translation = "「회장님도 계시니까, 쿠죠 가문의 메이드로서의 체통이 있다고요. 아가씨도 제대로 영애답게 행동해 주세요.」"

[[dialogue]]
speaker = "unk"
original = "君は確か、いつも任務の受付をしてくれている……"
translation = "너는 분명, 항상 임무 접수를 해주고 있는……"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ああ！\u3000そういえばまだ、ちゃんと紹介したことがなかったわね」"
translation = "「아아! 그러고 보니 아직 제대로 소개한 적이 없었네.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「改めて初めまして、会長。新星学園１年の天ヶ崎ヨミと申します。クエスト受付の際は、いつもお世話になっております」"
translation = "「새삼스럽지만 처음 뵙겠습니다, 회장님. 신성 학원 1학년 아마가사키 요미라고 합니다. 퀘스트 접수 때는 항상 신세 지고 있습니다.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「私、ヴィーナスお嬢様の九浄家でお世話になっておりまして、九浄家メイド隊の一員として働かせてもらっております」"
translation = "「저는 비너스 아가씨의 쿠죠 가문에서 보살핌을 받고 있으며, 쿠죠 가문 메이드대의 일원으로서 일하고 있습니다.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ヨミヨミは今年からうちのメイド隊に入った期待の新人なの！\u3000何事も真面目で、コミュ力も高くて、優秀なんだから！」"
translation = "「요미요미는 올해부터 우리 메이드대에 들어온 기대되는 신입이야! 매사에 성실하고 커뮤니케이션 능력도 높고 우수하거든!」"

[[dialogue]]
speaker = "unk"
original = "とても個性的な雰囲気、あるよね……"
translation = "무척 개성적인 분위기가 있지……"

[[dialogue]]
speaker = "unk"
original = "九浄家メイド隊って何かその……"
translation = "쿠죠 가문 메이드대라는 건 뭔가 그……"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ああ、カタギじゃなさそうな、やべー雰囲気ってこと？」"
translation = "「아아, 일반인 같지 않은 위험한 분위기라는 거?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「お嬢様！？」"
translation = "「아가씨!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「九浄家が、ギャンブル施設の管理とか、お祭りやイベントの開催、ボディーガードの人材派遣とかを事業としてやってるのよね」"
translation = "「쿠죠 가문이 도박 시설 관리나 축제, 이벤트 개최, 보디가드 인재 파견 같은 걸 사업으로 하고 있거든.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「そうです！\u3000九浄家は決して、反社会的な商売は行っておりませんっ！」"
translation = "「맞습니다! 쿠죠 가문은 결코 반사회적인 장사는 하지 않습니다!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「まあ、スーツを着た強面の男共がよく家に出入りしていることもあって、実際よく間違われるんだけどね」"
translation = "「뭐, 정장을 입은 험악한 남자들이 자주 집을 드나들기도 해서 실제로 자주 오해받긴 하지만 말이야.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こやあぁぁぁんっ！？」"
translation = "「코양!?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「お嬢様！\u3000そんなこと言ってはダメですっ！\u3000ご当主様が悲しみます！」"
translation = "「아가씨! 그런 말씀 하시면 안 돼요! 당주님이 슬퍼하신다고요!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あの人がそんなタマなわけないでしょ。……とにかくそんな家だから、メイド隊もその雰囲気に染まっちゃってるのよね」"
translation = "「그 사람이 그럴 위인일 리가 없잖아. ……아무튼 그런 집안이라 메이드대도 그 분위기에 물들어버린 거지.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「その……ですね？\u3000九浄家メイド隊は、ご当主様が星見家メイド隊に対抗して作った組織なんです……それでちょっと星見家の反対をいっているというか……」"
translation = "「그…… 그러니까요, 쿠죠 가문 메이드대는 당주님이 호시미 가문 메이드대에 대항해서 만든 조직이라…… 그래서 조금 호시미 가문과 반대로 가고 있다고나 할까……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「というより、あの人がメイド好きで、星見家が羨ましい、うちにも可愛いメイドが欲しい！\u3000って嫉妬した結果らしいわよ。要するに趣味ね！」"
translation = "「그보다 그 사람이 메이드를 좋아해서 호시미 가문이 부럽다, 우리 집에도 귀여운 메이드가 갖고 싶다! 하고 질투한 결과라나 봐. 요컨대 취미지!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こやっ！？\u3000それ私、いま初めて知ったんですが！？\u3000対抗してって、そういうことなんですか！？」"
translation = "「코얏!? 그거 저 지금 처음 알았는데요!? 대항해서라는 게 그런 의미였나요!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「メイド隊はお屋敷の仕事はもちろんだけど、学園運営の手伝いをしてくれているの。ヨミヨミの場合は、この大聖堂カフェテリアで任務管轄係をやってくれているわ」"
translation = "「메이드대는 저택 일은 물론이고 학원 운영 도움도 주고 있어. 요미요미의 경우는 이 대성당 카페테리아에서 임무 관할계를 맡고 있지.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ええと……いわゆる『クエスト受付嬢』ですね。会長もご存知かと思いますが、任務関係の案内役を承らせてもらっています」"
translation = "「그게…… 이른바 『퀘스트 접수원』이죠. 회장님도 알고 계시겠지만, 임무 관련 안내역을 맡고 있습니다.」"

[[dialogue]]
speaker = "unk"
original = "正式名称は『任務管轄係』だったのか"
translation = "정식 명칭은 『임무 관할계』였나."

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「く、クエスト受付嬢ですっ。そんな名前は知りませんっ」"
translation = "「퀘, 퀘스트 접수원입니다. 그런 이름은 모릅니다.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ぷぷっ……ヨミヨミったら、任務管轄係って名称が嫌いらしいのよ。略すと『ニンカツ係』でエッチ過ぎるからって……！」"
translation = "「푸훗…… 요미요미는 임무 관할계라는 명칭을 싫어하거든. 줄여서 『임관계』라고 하면 너무 야하다고……!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こやぁあああっ！？\u3000お嬢様、それは誰にも言わないって約束したじゃないですかっ！」"
translation = "「코야아아앗!? 아가씨, 그건 아무에게도 말하지 않겠다고 약속했잖아요!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「もうバカバカバカ！\u3000お嬢様のバカ！\u3000爆裂恥ずかしいでしょうっ！？」"
translation = "「정말 바보바보바보! 아가씨 바보! 폭렬 창피하다고요!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あははははっ！\u3000ごめん！\u3000ごめんって！\u3000私が悪かったから叩かないでヨミヨミ！」"
translation = "「아하하하하! 미안! 미안하다니까! 내가 잘못했으니까 때리지 마, 요미요미!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「か、会長、違うんです！\u3000私はそこまで任務管轄係の名称がいやらしいとか、思ってませんから！」"
translation = "「회, 회장님, 아니에요! 저는 그렇게까지 임무 관할계라는 명칭이 야하다고 생각하지 않거든요!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ただ、お嬢様みたいに略して茶化す人が居ると嫌だなって……だったらクエスト受付嬢の方が。しっくり来ますよねって話であって……」"
translation = "「다만 아가씨처럼 줄여서 놀리는 사람이 있으면 싫겠다 싶어서…… 그렇다면 퀘스트 접수원이 더 잘 어울린다는 이야기지……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「いや、そもそもニンカツ係って略さなくない？」"
translation = "「아니, 애초에 임관계라고 안 줄이지 않아?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「え」"
translation = "「에」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「任務係でいいでしょ。そっちの方が短いし」"
translation = "「임무계라고 하면 되잖아. 그게 더 짧고.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こ……こやぁあああ──っ！！！」"
translation = "「코…… 코야아아아──!!!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「なんでもっと早くそれを教えてくれないんですか、バカバカバカ、お嬢様のばかぁぁぁっ！」"
translation = "「왜 좀 더 빨리 그걸 알려주지 않은 건가요, 바보바보바보, 아가씨 바보오오오!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あはははははっ！\u3000だってヨミヨミが可愛いからっ……んふふっ、あはははははっ！！！」"
translation = "「아하하하하하! 그야 요미요미가 귀여우니까…… 응후후, 아하하하하하!!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ひーっ、ふひーっ……と、とりあえず、ヨミヨミはこんな感じで、凄く面白くて可愛い子なの！\u3000仲良くしてあげてねっ」"
translation = "「히─, 후히─…… 아무튼 요미요미는 이런 느낌으로 무척 재미있고 귀여운 애야! 잘 지내줘.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「お嬢様、爆裂笑い過ぎです！\u3000うぅ……会長にこんな、挨拶したばっかりで恥ずかしいところを見られてしまうなんて……」"
translation = "「아가씨, 폭렬 너무 웃으신다고요! 으으…… 회장님께 이런, 인사하자마자 창피한 모습을 보여버리다니……」"

[[dialogue]]
speaker = "unk"
original = "これからよろしく頼むよ、ヨミヨミ！"
translation = "앞으로 잘 부탁해, 요미요미!"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「は、はい。とりあえず、こちらこそよろしくお願いします……って──」"
translation = "「네, 네. 일단 저야말로 잘 부탁드립니다…… 어라──」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「会長に、ヨミヨミ呼びが感染してるじゃないですかぁぁぁっ！\u3000お嬢様のバカバカバカ、ばかぁぁぁ──っ！！！」"
translation = "「회장님한테 요미요미라는 호칭이 옮았잖아요오오오! 아가씨 바보바보바보, 바보오오오──!!!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ええっ！？\u3000それは私、関係なくない！？」"
translation = "「에엣!? 그건 나랑 상관없지 않아!?」"

[[dialogue]]
speaker = "unk"
original = "快晴の青空に、ヨミヨミの可愛い叫び声が木霊するのであった。"
translation = "쾌청한 푸른 하늘에 요미요미의 귀여운 비명이 메아리치는 것이었다."

