[[dialogue]]
speaker = "unk"
original = "第１話,螺旋のフェチズム,P"
translation = "제1화, 나선의 페티시즘, P"

[[dialogue]]
speaker = "unk"
original = "星霊祭を経て、努力する姿を周囲に隠さなくなったヒルディオーネ先輩。"
translation = "성령제를 거치며, 노력하는 모습을 주위에 숨기지 않게 된 힐디 오네 선배."

[[dialogue]]
speaker = "unk"
original = "恋人である俺は、彼女と一緒に、昼間もトレーニングをこなすようになっていた――"
translation = "연인인 나는, 그녀와 함께, 낮에도 트레이닝을 소화하게 되었다――"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「――ふぅ。会長、日課の基礎訓練もひと通り終わりましたし、一旦休憩に致しましょうか」"
translation = "「――후우. 회장, 일과의 기초 훈련도 대강 끝났으니, 일단 휴식을 취하도록 할까요」"

[[dialogue]]
speaker = "unk"
original = "はい。それにしても――"
translation = "네. 그렇다고 해도――"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「ん？\u3000――『ミーティアフォーム』で訓練しているのに、ずっと変身を維持し続けていてすごい、ですの？」"
translation = "「응? ――『미티어 폼』으로 훈련하고 있는데, 계속 변신을 유지하고 있어서 대단하다, 인가요?」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「おーっほっほっほ！\u3000そうでしょうそうでしょう♪\u3000そこに関しては、ノヴァフォームよりも優れている点だと、自負しておりますわ♪」"
translation = "「오홋홋홋호! 그렇겠지요 그렇겠지요♪ 그 부분에 관해서는, 노바 폼보다 뛰어난 점이라고, 자부하고 있습니다와♪」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「ミーティアフォームは大きな力を扱うが故の制御の難しさはあっても、変身の持続時間に関しては、実は通常戦闘服と大きく変わりませんのよ」"
translation = "「미티어 폼은 큰 힘을 다루는 만큼 제어가 어렵기는 해도, 변신 지속 시간에 관해서는, 사실 통상 전투복과 크게 다르지 않습니다요」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「おそらく自力で覚醒まで辿り着いたからではないかと分析しておりますけれど、いずれにせよ、これこそがまさにエレガントな覚醒フォームというものですわ♪」"
translation = "「아마 자력으로 각성까지 도달했기 때문이 아닐까 분석하고 있습니다만, 어쨌든, 이것이야말로 바로 엘레강트한 각성 폼이라는 것입니다와♪」"

[[dialogue]]
speaker = "unk"
original = "まさに先輩専用の覚醒フォームですね"
translation = "정말로 선배 전용의 각성 폼이네요"

[[dialogue]]
speaker = "unk"
original = "綺麗だし、カッコよくて素敵です"
translation = "아름답고, 멋지고 근사합니다"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「なっ……！？\u3000か、会長、いきなりそんなことを言うのはずるいですわよ……！」"
translation = "「나앗……!? 회, 회장, 갑자기 그런 말을 하는 건 치사한 거예요……!」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「こ、後輩たちも見ておりますのに、<ruby>私<rt>わたくし</rt></ruby>、照れてしまいますわ……<emoji=heart04>」"
translation = "「흐, 후배들도 보고 있는데, 저, 부끄러워집니다와……<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "シズハ"
original = "「会長とヒルディーお姉様、ごきげんよう♪\u3000お２人でトレーニングですか？」"
translation = "「회장과 힐디 오네사마, 안녕하십니까요♪ 두 분이서 트레이닝인가요?」"

[[dialogue]]
speaker = "unk"
original = "と、そこへやってきたのは、流星学園附属校３年生の『染井シズハ』だった。"
translation = "하고, 그곳에 온 것은, 유성 학원 부속교 3학년인 '소메이 시즈하'였다."

[[dialogue]]
speaker = "unk"
original = "実は周囲には秘密にしているが、彼女は『ロストアイテム』と呼ばれる物の回収を行っている『魔法少女』の１人だったりする。"
translation = "사실 주위에는 비밀로 하고 있지만, 그녀는 '로스트 아이템'이라고 불리는 물건을 회수하는 '마법소녀' 중 한 명이기도 하다."

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「あら、シズハ、ごきげんようですわ。こうして顔を合わせて話すのは、流星寮に入寮してきた時以来ですわね」"
translation = "「어머, 시즈하, 안녕하십니까요. 이렇게 얼굴을 마주 보고 이야기하는 것은, 유성 기숙사에 입소했을 때 이후예요」"

[[dialogue]]
speaker = "シズハ"
original = "「あはは、すみません。部活の合気道と、あと、えっと……趣味の<b>ボランティア活動</b>？\u3000で朝とか放課後とか、忙しくて……」"
translation = "「아하하, 죄송해요. 부활동인 합기도와, 그리고, 음…… 취미인 <ruby>봉사 활동<rt>・・ ・・</rt></ruby>? 때문에 아침이나 방과 후나, 바빠서……」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「ボランティア？\u3000あなた……それは本当ですの？」"
translation = "「봉사 활동? 당신…… 그것은 정말인가요?」"

[[dialogue]]
speaker = "シズハ"
original = "「えっ」"
translation = "「엣」"

[[dialogue]]
speaker = "unk"
original = "シズハはギクリと体を硬直させ、顔を引きつらせる。先輩はそんな彼女の肩に手を置いて――"
translation = "시즈하는 움찔하고 몸을 경직시키고, 얼굴을 굳힌다. 선배는 그런 그녀의 어깨에 손을 얹고――"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「まさか……あなたがそんな偉いことをしていたなんて知りませんでしたわ！\u3000淑女として、実にエレガントな行いでしてよ！」"
translation = "「설마…… 당신이 그런 훌륭한 일을 하고 있었다니 몰랐습니다와! 숙녀로서, 실로 엘레강트한 행동입니다요!」"

[[dialogue]]
speaker = "unk"
original = "うんうんと力強く頷きながら、笑顔を浮かべて褒める。"
translation = "응응, 하고 힘차게 고개를 끄덕이며, 미소를 띠고 칭찬한다."

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「私にも協力できることがあれば、気軽に相談しに来てくださいましね。寮長として、あなたが良き学園生活を送れるように全力でサポート致しますわ！」"
translation = "「저에게 협력할 수 있는 일이 있다면, 부담 없이 상담하러 와주세요. 기숙사 사감으로서, 당신이 좋은 학원 생활을 보낼 수 있도록 전력으로 서포트하겠습니다와!」"

[[dialogue]]
speaker = "シズハ"
original = "「あっ……はいっ♪\u3000ありがとうございます！\u3000ヒルディオーネ先輩って……みんなが言う通り、強いだけじゃなくて、とっても素敵なお姉様ですね♪」"
translation = "「앗…… 네엣♪ 감사합니다! 힐디 오네 선배는…… 모두가 말하는 대로, 강할 뿐만 아니라, 정말 멋진 언니네요♪」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「ですわ！\u3000おーっほっほっほ♪\u3000私、千園寺ヒルディオーネは、理想の淑女と最強の星騎士を日々追い求め続ける『努力の天才』でしてよ♪」"
translation = "「입니다와! 오홋홋홋호♪ 저, 치온지 힐디 오네는, 이상적인 숙녀와 최강의 성기사를 매일 계속해서 쫓는 『노력의 천재』입니다요♪」"

[[dialogue]]
speaker = "シズハ"
original = "「か、カッコいい……！\u3000あと、美しい……！」"
translation = "「머, 멋있어……! 그리고, 아름다워……!」"

[[dialogue]]
speaker = "unk"
original = "ああ。俺の自慢の『彼女』だからな"
translation = "아아. 나의 자랑스러운 '그녀'니까"

[[dialogue]]
speaker = "シズハ"
original = "「ねぇ、会長……ちょっと聞いてもいい？」"
translation = "「저기, 회장…… 잠깐 물어봐도 돼?」"

[[dialogue]]
speaker = "シズハ"
original = "「先輩のあの美しい<b>お尻</b>って……触っても大丈夫なのかな？」"
translation = "「선배의 저 아름다운 <b>엉덩이</b>는…… 만져봐도 괜찮을까?」"

[[dialogue]]
speaker = "unk"
original = "美しいってそっち！？"
translation = "아름다운 게 그쪽!?」"

[[dialogue]]
speaker = "シズハ"
original = "「当たり前じゃん！\u3000ヒルディオーネ先輩のアレは、誰がどう見てもわかる、超高級な『ロイヤル<ruby>美尻<rt>びしり</rt></ruby>』だよ！？」"
translation = "「당연하잖아! 힐디 오네 선배의 저건, 누가 봐도 알 수 있는, 초고급 『로열 미려』라고!?」"

[[dialogue]]
speaker = "シズハ"
original = "「私がここに来たのも、あのお尻があまりにも魅力的で、つい惹かれちゃったからなんだから……！」"
translation = "「내가 여기에 온 것도, 저 엉덩이가 너무나 매력적이어서, 그만 끌려버렸기 때문이니까……!」"

[[dialogue]]
speaker = "unk"
original = "（ブレないな、この尻フェチ附属生……）"
translation = "（흔들림 없네, 이 엉덩이 페티시 부속교 학생은……）"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「お２人共、一体なんの相談をしておりますの？」"
translation = "「두 분 다, 대체 무슨 상담을 하고 계신가요?」"

[[dialogue]]
speaker = "シズハ"
original = "「えっと……それが、先輩にはちょっと言い出しづらいことでして……」"
translation = "「음…… 그게, 선배에게는 좀 꺼내기 힘든 이야기라서……」"

[[dialogue]]
speaker = "unk"
original = "俺はそこで、躊躇っているシズハの代わりに、先輩に説明する。"
translation = "나는 거기서, 망설이는 시즈하를 대신해, 선배에게 설명한다."

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「え？\u3000――お近づきの印としてお尻を触りたい？\u3000今時の附属生の子たちの間では、そんなコミュニケーション方法が流行っておりますの……！？」"
translation = "「에? ――친해졌다는 표시로 엉덩이를 만지고 싶다고요? 요즘 부속교 아이들 사이에서는, 그런 커뮤니케이션 방법이 유행하고 있나요……!?」"

[[dialogue]]
speaker = "シズハ"
original = "「流行っているかどうかは分かりませんけど……例えば、最近はプリムラちゃんがサチちゃんのお尻をよく触ったりしますね」"
translation = "「유행하고 있는지는 모르겠지만…… 예를 들어, 최근에는 프리뮬러짱이 사치짱의 엉덩이를 자주 만지거나 해요」"

[[dialogue]]
speaker = "シズハ"
original = "「で、サチちゃんが怒って、そのお返しに、プリムラちゃんのお尻を触り返して――」"
translation = "「그래서, 사치짱이 화를 내고, 그 보답으로, 프리뮬러짱의 엉덩이를 다시 만지거나 해서――」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「ですわ！？\u3000あの真面目な附属校生徒会長のサチが、そんなことを……！？」"
translation = "「입니다와!? 그 성실한 부속교 학생회장인 사치가, 그런 일을……!?」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「で、でも、それが本当なら……すごく恥ずかしいですけれど、先輩として後輩達の流行を理解し、柔軟に合わせる努力をしなければなりませんわね……！」"
translation = "「그, 그렇지만, 그것이 사실이라면…… 굉장히 부끄럽습니다만, 선배로서 후배들의 유행을 이해하고, 유연하게 맞추려는 노력을 해야만 하는거예요……!」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「――よし、シズハ！\u3000そういうことでしたら、私のお尻、触っても構いませんことよ！」"
translation = "「――좋아요, 시즈하! 그런 것이라면, 저의 엉덩이, 만져도 상관없습니다요!」"

[[dialogue]]
speaker = "シズハ"
original = "「いいんですか！？」"
translation = "「괜찮은 건가요!?」"

[[dialogue]]
speaker = "unk"
original = "ただのシズハの趣味ですから！！"
translation = "그냥 시즈하의 취미니까요!!"

[[dialogue]]
speaker = "unk"
original = "いやいやいやいや！"
translation = "아니아니아니아니!」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「えっ！？\u3000そうなんですの！？」"
translation = "「엣!? 그런 건가요!?」"

[[dialogue]]
speaker = "シズハ"
original = "「……確かに、会長の言う通り趣味です。でも、決してふざけているわけじゃありません！\u3000私は、<b>本気</b>でお姉様のお尻と触れ合いたいと思ったんです！」"
translation = "「……확실히, 회장 말대로 취미예요. 하지만, 결코 장난치는 게 아니에요! 저는, <b>진심</b>으로 언니의 엉덩이와 접촉하고 싶다고 생각했어요!」"

[[dialogue]]
speaker = "シズハ"
original = "「お姉様も、恋人の会長さんと触れ合いたいと思うことはありますよね！？」"
translation = "「언니도, 연인인 회장과 접촉하고 싶다고 생각할 때가 있잖아요!?」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「……！\u3000確かに……」"
translation = "「……! 확실히……」"

[[dialogue]]
speaker = "シズハ"
original = "「それと同じです！\u3000私はお姉様の美しいお尻と、心からコミュニケーションしたいと思ったんです！」"
translation = "「그것과 같아요! 저는 언니의 아름다운 엉덩이와, 진심으로 커뮤니케이션하고 싶다고 생각했어요!」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「……今、言われて気づきましたけれど、私――」"
translation = "「……지금, 듣고 깨달았습니다만, 저――」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「恋人なのに、まだ会長のお尻を触ったことがありませんでしたわ……！」"
translation = "「연인인데도, 아직 회장의 엉덩이를 만져본 적이 없었습니다와……!」"

[[dialogue]]
speaker = "unk"
original = "えっ？"
translation = "엣?"

[[dialogue]]
speaker = "シズハ"
original = "「えぇっ！？\u3000あの女の子らしい柔らかさと、男らしい力強さが合わさった会長のハイブリッドプリケツを、まだ１度もですか！？」"
translation = "「에엣!? 그 여자아이 같은 부드러움과, 남자다운 힘이 합쳐진 회장의 하이브리드 탱탱 엉덩이를, 아직 한 번도요!?」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「ですわ！\u3000制服越しでもすごくいい形をしていると、前から気付いておりましたのに……」"
translation = "「입니다와! 교복 너머로도 굉장히 좋은 형태를 하고 있다는 것을, 전부터 눈치채고 있었습니다만……」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「……細マッチョな会長のお尻……ごくり」"
translation = "「……슬림 근육질인 회장의 엉덩이…… 꿀꺽」"

[[dialogue]]
speaker = "unk"
original = "先輩！？\u3000落ち着いて下さい！"
translation = "선배!? 진정하세요!"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「会長――お体に触りますわよ？」"
translation = "「회장―― 몸에 손을 대겠습니다요?」"

[[dialogue]]
speaker = "unk"
original = "ちょっ……！\u3000アッーーー！？"
translation = "잠깐……! 아앗―――!?」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「こ、これは、エレガントな<ruby>大臀筋<rt>だいでんきん</rt></ruby>ですわ……<emoji=heart04>」"
translation = "「크, 이것은, 엘레강트한 대둔군입니다와……<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "シズハ"
original = "「！\u3000お姉様、お尻の筋肉にお詳しいんですね！」"
translation = "「! 언니, 엉덩이 근육에 대해 잘 아시는군요!」"

[[dialogue]]
speaker = "unk"
original = "先輩の発言にシズハが食いついてきて、それから２人は『お尻の筋肉』の話題で盛り上がり、仲良くなるのだった――"
translation = "선배의 발언에 시즈하가 달려들어, 그때부터 두 사람은 '엉덩이 근육'의 화제로 분위기가 달아올라, 친해지는 것이었다――"

