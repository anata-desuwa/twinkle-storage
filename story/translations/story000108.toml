[[dialogue]]
speaker = "unk"
original = "バトルウィーク最終日。"
translation = "「배틀 위크 마지막 날.」"

[[dialogue]]
speaker = "unk"
original = "<ruby>新星寮<rt>ラルーナ</rt></ruby>と<ruby>流星寮<rt>イルソーレ</rt></ruby>の寮生達は、早朝から各地にパトロールを開始。お互いにスコアを伸ばし合っていた。"
translation = "「<ruby>신성 기숙사<rt>라 루나</rt></ruby>와 <ruby>유성 기숙사<rt>일 소레</rt></ruby>의 기숙사생들은 이른 아침부터 각지에서 순찰을 개시. 서로 스코어를 높여가고 있었다.」"

[[dialogue]]
speaker = "unk"
original = "しかしそんな中で、学園の分析室から流星市国内にモンスター増加の傾向あり、との連絡が入る――"
translation = "「그러나 그런 와중에 학원 분석실로부터 유성시국 내에 몬스터 증가 경향이 있다는 연락이 들어온다──」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「おーっほっほっほっ！\u3000ごきげんよう、妃竜院マハムート。そちらの調子はいかがかしら？」"
translation = "「오~홋홋홋! 평안하신가요, 키류인 마하무트. 그쪽 상황은 어떤가요?」"

[[dialogue]]
speaker = "マハムート"
original = "「とても順調よ。もうＳクラスモンスターを、３万体くらい狩ってきたもの」"
translation = "「아주 순조로워. 벌써 S클래스 몬스터를 3만 마리 정도 사냥했거든.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「負け確ですわ……！？」"
translation = "「패배 확정이잖아요……!?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「い、いいえ！\u3000決して諦めませんことよ！\u3000今からこちらも３万体狩り尽くせばいいだけのこと！」"
translation = "「아, 아니요! 결코 포기하지 않겠어요! 지금부터 이쪽도 3만 마리를 사냥해 버리면 그만인걸요!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「私が、その不可能を打ち砕いてみせますわ！」"
translation = "「제가 그 불가능을 타파해 보이겠어요!」"

[[dialogue]]
speaker = "マハムート"
original = "「３万は嘘よ」"
translation = "「3만은 거짓말이야.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ムッキィィィ――ッ！！！\u3000どうしてそう下らない嘘をついて、私を騙そうとするんですの！？」"
translation = "「윽끼이이이──!!! 어째서 그런 시시한 거짓말을 해서 저를 속이려 드는 건가요!?」"

[[dialogue]]
speaker = "マハムート"
original = "「Ｓクラス３万体なんて、そのまま人間界が滅んでるわよ。わざとあり得ない数字で冗談にしてるんだから、いちいちマジレスしないで頂戴」"
translation = "「S클래스 3만 마리면 그대로 인간계가 멸망했을 거야. 일부러 말도 안 되는 숫자로 농담한 거니까 일일이 진지하게 받아치지 좀 마.」"

[[dialogue]]
speaker = "マハムート"
original = "「……これ、自分のボケを解説させられてるみたいで、非常に腹立たしいわね？」"
translation = "「……이거, 내 개그를 직접 해설하게 된 것 같아서 무척 화가 나네?」"

[[dialogue]]
speaker = "unk"
original = "マム、不機嫌な顔で俺を見ないでください"
translation = "「마무, 기분 나쁜 얼굴로 저를 보지 말아 주세요.」"

[[dialogue]]
speaker = "フェニエル"
original = "「お姉様っ。マムは『３万体倒せるくらい絶好調よ。今日はいい勝負をしましょうね』と言いたいんだと思います」"
translation = "「언니분. 마무는 『3만 마리를 잡을 수 있을 정도로 절호조야. 오늘은 좋은 승부를 하자』라고 말하고 싶은 걸 거예요.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「まあ、そういうこと……？」"
translation = "「뭐, 그런 건가요……?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ふふんっ。結果が出る前に己が全力、本調子であることを明かすなんて、意外と潔いですわね！」"
translation = "「흥. 결과가 나오기 전에 자신의 전력, 본래 컨디션임을 밝히다니 의외로 결백하군요!」"

[[dialogue]]
speaker = "マハムート"
original = "「この姉妹、名誉棄損で訴えてやろうかしら……」"
translation = "「이 자매, 명예훼손으로 고소해 버릴까……」"

[[dialogue]]
speaker = "フェニエル"
original = "「お姉様もこの１週間、マムと競い合えるってことで、とても気合いが入ってましたもんねっ」"
translation = "「언니분도 이번 한 주 동안 마무와 경쟁할 수 있다는 생각에 무척 기합이 들어가 있었는걸요.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「そ、そんなことはナイですワヨ……！？」"
translation = "「그, 그런 적 없습니돳……!?」"

[[dialogue]]
speaker = "unk"
original = "マムも燃えてたんじゃないですか？"
translation = "「마무도 불타고 있었던 것 아니에요?」"

[[dialogue]]
speaker = "マハムート"
original = "「……何を言ってるのかしら。竜はウサギを狩るにも全力を尽くすというだけよ」"
translation = "「……무슨 소리를 하는 거니. 용은 토끼를 잡을 때도 전력을 다할 뿐이야.」"

[[dialogue]]
speaker = "マハムート"
original = "「ヒルディオーネが相手だろうと、会長をしごく時だろうと、私の調子には一切影響なんてないわ」"
translation = "「힐디오네가 상대든 회장을 단련시킬 때든 내 컨디션에는 아무런 영향도 없어.」"

[[dialogue]]
speaker = "マハムート"
original = "「そんなことより、あなたたちも分析室の連絡を受けて戻ってきたのでしょう？」"
translation = "「그것보다 당신들도 분석실 연락을 받고 돌아온 거지?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ええ。流星市国にモンスター増加の傾向あり、だとか」"
translation = "「네. 유성시국에 몬스터 증가 경향이 있다더군요.」"

[[dialogue]]
speaker = "フェニエル"
original = "「ええっと……モンスターが増えてるってことは、どこかにその巣がある……ということでしょうか？」"
translation = "「저기…… 몬스터가 늘어난다는 건 어딘가에 그 둥지가 있다는…… 뜻일까요?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「その通りですわ！\u3000過去の傾向から言って、この手の連絡はアステライトの出現、発見の前触れと考えられますの」"
translation = "「그렇답니다! 과거의 경향으로 보아 이런 종류의 연락은 아스텔라이트의 출현, 발견의 전조로 생각할 수 있어요.」"

[[dialogue]]
speaker = "マハムート"
original = "「どうやら……来たようね」"
translation = "「아무래도…… 온 모양이네.」"

[[dialogue]]
speaker = "分析官"
original = "『流星市国市街地に、新たなアステライトの出現を確認しました』"
translation = "『유성시국 시가지에 새로운 아스텔라이트의 출현을 확인했습니다.』"

[[dialogue]]
speaker = "分析官"
original = "『出動中のプリマステラは至急現地に向かい、市民の安全を確保しつつ、モンスターの討伐を行ってください』"
translation = "『출동 중인 프리마스텔라는 즉시 현장으로 향해 시민의 안전을 확보하며 몬스터를 토벌해 주십시오.』"

[[dialogue]]
speaker = "分析官"
original = "『流星及び新星の両星徒会はアステライト攻略班を編成し、速やかに巣の破壊をお願いします。繰り返します――』"
translation = "『유성 및 신성 양 성도회는 아스텔라이트 공략반을 편성해 신속하게 둥지를 파괴해 주시기 바랍니다. 반복합니다──』"

[[dialogue]]
speaker = "マハムート"
original = "「というわけで、本来の仕事の時間のようね、星徒会長」"
translation = "「자, 본래 할 일의 시간이 온 모양이네, 성도회장.」"

[[dialogue]]
speaker = "unk"
original = "星徒会室に戻ると初動が遅れる。だから――"
translation = "「성도회실로 돌아가면 초동 조치가 늦어져. 그러니까──」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ここにいるメンバーで攻略班を編成、ですわね！\u3000緋宮会長の指示に従いますわ！\u3000久しぶりのアステラ攻略、腕が鳴りますの」"
translation = "「여기 있는 멤버로 공략반을 편성, 인 것이군요! 히노미야 회장의 지시에 따르겠어요! 오랜만의 아스텔라 공략, 몸이 근질거리는걸요.」"

[[dialogue]]
speaker = "マハムート"
original = "「妥当な判断ね。いつものメンバーを探し回るようなら、お説教ものだったわよ」"
translation = "「타당한 판단이네. 평소 멤버를 찾아 헤맸다면 설교감이었을 거야.」"

[[dialogue]]
speaker = "フェニエル"
original = "「あ、あの……！」"
translation = "「저, 저기……!」"

[[dialogue]]
speaker = "フェニエル"
original = "「わ、私も、アステラに連れて行って、もらえませんかっ……！」"
translation = "「저, 저도 아스텔라에 데려가 주시면 안 될까요……!」"

[[dialogue]]
speaker = "マハムート"
original = "「フニを……？」"
translation = "「후니를……?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「私からも、お願いいたしますわ。緋宮会長」"
translation = "「저로서도 부탁드립니다, 히노미야 회장.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「フェニエルはまだ入学したばかりで、単独出撃可能なプリマステラの資格すら持っていませんわ」"
translation = "「페니엘은 아직 입학한 지 얼마 되지 않아 단독 출격이 가능한 프리마스텔라 자격조차 없답니다.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ですが、この１週間見て来た私が保証しますわ。フニはプリマステラの中でも極めて強大な――」"
translation = "「하지만 이번 한 주간 지켜본 제가 보증하겠어요. 후니는 프리마스텔라 중에서도 극히 강대한──」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「それこそ……次世代の寮長となれる程の、才能と可能性を秘めていますの！」"
translation = "「그야말로…… 차세대 기숙사장이 될 수 있을 정도의 재능과 가능성을 비장하고 있답니다!」"

[[dialogue]]
speaker = "フェニエル"
original = "「お、お姉様……！」"
translation = "「어, 언니분……!」"

[[dialogue]]
speaker = "マハムート"
original = "「ヒルディオーネ、まさかあなたがそこまで言うとはね……」"
translation = "「힐디오네, 설마 당신이 그렇게까지 말할 줄이야……」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ですから、フニがアステラのモンスターやボスと相まみえることは、きっと彼女の大きな糧となりますわ」"
translation = "「그러니까, 후니가 아스텔라의 몬스터나 보스와 마주하는 것은 분명 그녀에게 큰 양분이 될 거예요.」"

[[dialogue]]
speaker = "フェニエル"
original = "「お、お願いします！\u3000足は引っ張りませんっ。今はまだ、未熟な星騎士の雛でしかありませんが……」"
translation = "「부, 부탁드립니다! 발목은 잡지 않을게요. 지금은 아직 미숙한 성기사의 새끼에 불과하지만……」"

[[dialogue]]
speaker = "フェニエル"
original = "「私も、たった１人でみんなの命を背負った時に……マムに『戦ってこい』って言ってもらえる、一騎当千のエースになりたいんです！」"
translation = "「저도 단 한 명이서 모두의 목숨을 짊어졌을 때…… 마무에게 『싸우고 와라』라는 말을 들을 수 있는 일당백의 에이스가 되고 싶어요!」"

[[dialogue]]
speaker = "マハムート"
original = "「……いいんじゃないかしら？」"
translation = "「……괜찮지 않을까?」"

[[dialogue]]
speaker = "マハムート"
original = "「見た目以上に根性があるってことはわかったわ。寮長が２人もいるチームなら、戦力だって申し分ないだろうし」"
translation = "「보기보다 근성이 있다는 건 알았어. 기숙사장이 두 명이나 있는 팀이라면 전력도 충분할 테고.」"

[[dialogue]]
speaker = "マハムート"
original = "「あとは星徒会長である、あなたの決断次第よ」"
translation = "「남은 건 성도회장인 당신의 결단에 달렸어.」"

[[dialogue]]
speaker = "unk"
original = "よし、フニも一緒に行こう！"
translation = "좋아, 후니도 같이 가자!"

[[dialogue]]
speaker = "フェニエル"
original = "「あ、ありがとうございます……っ！」"
translation = "「가, 감사합니다……!」"

[[dialogue]]
speaker = "unk"
original = "そうして俺たちは、寮長の最強タッグと共に、アステライト攻略を開始するのだった――"
translation = "그렇게 우리들은 기숙사장의 최강 태그와 함께 아스텔라이트 공략을 시작하는 것이었다──"

