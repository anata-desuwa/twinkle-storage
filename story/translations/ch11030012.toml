[[dialogue]]
speaker = "unk"
original = "第２話,脚本家は面倒くさい（前編）,P"
translation = "제2화, 각본가는 번거로워 (전편), P"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「あっ……！\u3000お会いできて良かったです、会長さん。演劇部に来ていただけないでしょうか……？\u3000部長を止められるのは、会長さんしかいないんです……」"
translation = "「앗……! 뵐 수 있어서 다행이에요, 회장님. 연극부에 와주실 수 없을까요……? 부장님을 멈출 수 있는 건, 회장님뿐이에요……」"

[[dialogue]]
speaker = "unk"
original = "藍にすがるように頼まれ、演劇部室へと向かうと──"
translation = "아이에게 매달리듯 부탁받아, 연극부실로 향하자──"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「あああ、違う、違う、違う！\u3000語彙が足りん！\u3000もっと内から滲み出る感情を伝える言葉はないものか！」"
translation = "「아아아, 아냐, 아냐, 아냐! 어휘가 부족해! 좀 더 내면에서 배어 나오는 감정을 전달할 단어는 없는 거냐!」"

[[dialogue]]
speaker = "unk"
original = "ロクサーナが頭を抱えながら、脚本執筆と向き合っていた。"
translation = "록사나가 머리를 감싸 쥐며, 각본 집필과 마주하고 있었다."

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「藍、コーヒーをよこせ！\u3000悪魔のように黒く、地獄のように熱いヤツをな！」"
translation = "「아이, 커피를 가져와라! 악마처럼 검고, 지옥처럼 뜨거운 놈으로 말이야!」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「は、はい、ただいま～！」"
translation = "「네, 네, 지금 갑니다~!」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「部長は会長さんに取材した後から、アイデアが降臨したみたいで……あれから毎日、部室に籠って、家にも戻らず、脚本を書き続けているんです」"
translation = "「부장님은 회장님께 취재한 뒤부터, 아이디어가 강림한 모양이라…… 그때부터 매일, 부실에 틀어박혀서, 집에도 가지 않고, 각본을 계속 쓰고 계세요」"

[[dialogue]]
speaker = "unk"
original = "あれから３日経ってるよ！？"
translation = "그 뒤로 3일이나 지났어!?"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「はい、今晩で３徹だったと思います。部長は脚本執筆に夢中になってる間は、身の回りの一切合切が雑になっちゃうんです」"
translation = "「네, 오늘 밤으로 3일 밤낮인 것 같아요. 부장님은 각본 집필에 몰두하고 있는 동안에는, 주변의 모든 게 엉망이 되어버리거든요」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「放っておいたら、ご飯も食べなかったり……昔からよくあることなんだそうです。一度スイッチが入っちゃうと、完成するまで<ruby>梃子<rt>てこ</rt></ruby>でも動かないし、授業にも出ないんです」"
translation = "「내버려 두면, 밥도 안 먹기도 하고…… 옛날부터 자주 있던 일이라고 해요. 한번 스위치가 들어가면, 완성될 때까지 지렛대 써도 안 움직이고, 수업에도 안 나가세요」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「１年生の演劇部員が部長の脚本執筆のサポートをするんですけど、今回は部長が私を指名しまして……」"
translation = "「1학년 연극부원이 부장님의 각본 집필 서포트를 하는데, 이번에는 부장님이 저를 지명하셔서……」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「──ん？\u3000藍、誰と話して……ああ、いつの間にやら会長が来ていたのか。すまない、今、手が離せなくてな」"
translation = "「──응? 아이, 누구랑 얘기하고…… 아아, 어느새 회장이 와 있었나. 미안하군, 지금 손을 뗄 수가 없어서 말이야」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「礼を言うぞ、この前の取材のおかげで、激しいインスピレーションを受けてしまってな」"
translation = "「고맙다고 말해두지, 요전번의 취재 덕분에, 격렬한 인스피레이션을 받아버렸거든」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「書いても書いても手が止まらん。これは後世の演劇部にまで受け継がれる大作になるぞ！」"
translation = "「써도 써도 손이 멈추질 않아. 이건 후세의 연극부에까지 계승될 대작이 될 거다!」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「あの、部長、ひとまず休まれた方がいいと思いますけど……体に毒ですよ？」"
translation = "「저기, 부장님, 일단 좀 쉬시는 게 좋을 것 같은데요…… 몸에 독이에요?」"

[[dialogue]]
speaker = "unk"
original = "会長権限で、執筆活動を一時的に──"
translation = "회장 권한으로, 집필 활동을 일시적으로──"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「湧き出るアイデアの源泉を止めようとする行為は罪と呼ぶ他ない。神であろうが、会長であろうが、私の執筆の手を止めさせようとする者は全て敵だ！」"
translation = "「솟구치는 아이디어의 원천을 막으려 하는 행위는 죄라고 부를 수밖에 없어. 신이든, 회장이든, 나의 집필을 멈추게 하려는 자는 전부 적이다!」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「そもそも今現在、私が缶詰めになっているのは、会長のせいだ。となれば、会長も私の脚本執筆に協力するのが筋ではないか？」"
translation = "「애초에 지금 현재, 내가 박혀 있는 건 회장 탓이다. 그렇다면, 회장도 나의 각본 집필에 협력하는 게 도리 아닌가?」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「それは、さすがに無理筋ですよぉ！」"
translation = "「그건, 역시 억지예요~!」"

[[dialogue]]
speaker = "unk"
original = "そうかも……"
translation = "그럴지도……"

[[dialogue]]
speaker = "unk"
original = "そうかな……"
translation = "그럴까……"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「会長さんが説得されかかってますぅ！？」"
translation = "「회장님이 설득당하려 하고 계세요!?」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「確実に今晩中に書き上がるのだ。頼む、このままあと半日、書かせてくれ。掴んだ発想の尻尾を逃がしてしまったら再び掴めるかは、私にもわからんのだ」"
translation = "「확실히 오늘 밤 중에는 다 써낼 거다. 부탁하마, 이대로 반나절만 더 쓰게 해줘. 붙잡은 발상의 꼬리를 놓쳐버리면 다시 붙잡을 수 있을지는, 나도 모르거든」"

[[dialogue]]
speaker = "unk"
original = "今晩までだからね？"
translation = "오늘 밤까지만이야?"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「恩に着る。確実に仕上げみせよう」"
translation = "「신세 지지. 확실히 완성해 보이마」"

[[dialogue]]
speaker = "unk"
original = "そして、ロクサーナの執筆サポートが始まった。"
translation = "그리고, 록사나의 집필 서포트가 시작되었다."

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「部長が執筆中に飲むのは、濃いめに入れたブラックコーヒーだけです」"
translation = "「부장님이 집필 중에 마시는 건, 진하게 탄 블랙커피뿐이에요」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「砂糖もミルクもなしです。甘いカフェオレを差し出したら、すっごく怒られました……」"
translation = "「설탕도 프림도 없어요. 달콤한 카페오레를 내밀었더니, 엄청나게 화를 내셨거든요……」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「甘いお菓子も常に補充してください。フルーツグミやブドウ糖の塊のラムネなんかがいいそうです。脳に糖分を巡らせて、頭をフル回転させるんだそうです」"
translation = "「단 과자도 항상 보충해 주셔야 해요. 과일 구미나 포도당 덩어리인 라무네 같은 게 좋다고 하세요. 뇌에 당분을 돌게 해서, 머리를 풀 회전시키는 거래요」"

[[dialogue]]
speaker = "unk"
original = "それなのに甘いコーヒーはダメなんだ……"
translation = "그런데도 달콤한 커피는 안 되는구나……"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「そうなんです。糖分を苦い珈琲で流し込むからいいんだそうです。難しいですよね。天才は変わった人が多いって言いますから」"
translation = "「그래요. 당분을 쓴 커피로 씻어내니까 좋은 거래요. 어렵죠. 천재는 특이한 사람이 많다고 하니까요」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「ああ、そうだ、いいぞ、いいぞ……死んだと思っていたアイツがここで颯爽と──！」"
translation = "「아아, 그래, 좋아, 좋아…… 죽은 줄 알았던 그 녀석이 여기서 늠름하게──!」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「むうう……違う、安っぽい。こんなセリフならば誰にだって書ける」"
translation = "「으으음…… 아냐, 값싸 보여. 이런 대사라면 누구라도 쓸 수 있어」"

[[dialogue]]
speaker = "unk"
original = "行き詰まってない？"
translation = "막히지 않았어?"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「問題ない。極めて順調だ。邪魔をするな」"
translation = "「문제없다. 지극히 순조로워. 방해하지 마라」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「ふああ……もうこんな時間ですね……部長、ホントに終わるんでしょうか……」"
translation = "「후아아…… 벌써 시간이 이렇게 됐네요…… 부장님, 정말로 끝날까요……」"

[[dialogue]]
speaker = "unk"
original = "ロクサーナには俺から上手いこと言っておく"
translation = "록사나에게는 내가 잘 말해둘게"

[[dialogue]]
speaker = "unk"
original = "あとは俺がやるから帰っていいよ"
translation = "나머지는 내가 할 테니까 돌아가도 좋아"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「会長さんは演劇部員ではないのに、いいんですか？\u3000それでは、お言葉に甘えて……お疲れさまでした」"
translation = "「회장님은 연극부원도 아니신데, 괜찮으시겠어요? 그럼, 호의를 받아들여서…… 수고하셨습니다」"

[[dialogue]]
speaker = "unk"
original = "ぺこりと頭を下げて申し訳なさそうに帰宅する藍を見送る。演劇部室には俺とロクサーナだけが残った。"
translation = "꾸벅 고개를 숙이며 미안한 기색으로 귀가하는 아이를 배웅한다. 연극부실에는 나와 록사나만이 남았다."

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「なんだ、藍は帰らせたのか。残っているのは会長だけか？\u3000会長様はご多忙だろうに、私のわがままに付き合ってくれるとはな」"
translation = "「뭐야, 아이는 보냈나. 남은 건 회장뿐인가? 회장님께서는 무척 바쁘실 텐데, 나의 어리광을 받아주다니 말이야」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「もうひと踏ん張りで終わる目途もついたので、腹ごしらえでもしようと思ってな」"
translation = "「조금만 더 하면 끝날 가망도 보였으니, 배 좀 채울까 해서 말이지」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「カップ麺の買い置きがあったと思うが……会長も食わないか？」"
translation = "「컵라면 사다 둔 게 있을 텐데…… 회장도 먹지 않겠나?」"

[[dialogue]]
speaker = "unk"
original = "差し出されたシーフードのカップ麺を受け取り、お湯を注いで３分後。"
translation = "내밀어진 씨푸드 컵라면을 받아 들고, 뜨거운 물을 부은 지 3분 뒤."

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「ふーっ、ふーっ、ふーっ……ずぞぞぞぞ」"
translation = "「후── 후── 후──…… 호로록」"

[[dialogue]]
speaker = "unk"
original = "会長と部長、長同士がカップ麺をすする音が演劇部室に響いた。"
translation = "회장과 부장, 장들끼리 컵라면을 훌쩍이는 소리가 연극부실에 울려 퍼졌다."

[[dialogue]]
speaker = "unk"
original = "長い夜は、まだ続く。"
translation = "긴 밤은, 아직 계속된다."

