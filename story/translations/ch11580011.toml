[[dialogue]]
speaker = "unk"
original = "第１話,異世界での触れ合い・前編,P"
translation = "제1화, 이세계에서의 접촉·전편, P"

[[dialogue]]
speaker = "unk"
original = "――これは、陽彩や他の魔法少女たちがすぐには元の世界へ戻れず、追加で１週間ほどの滞在を余儀なくされた、『可能性』の世界。"
translation = "――이것은, 아키사나 다른 마법 소녀들이 바로 원래 세계로 돌아가지 못하고, 추가로 1주일 정도 체류를 할 수밖에 없었던, 『가능성』의 세계."

[[dialogue]]
speaker_original = "陽彩"
speaker_translation = "히이로"
original = "「すまないな。わざわざ案内までしてもらって」"
translation = "「미안하군. 일부러 안내까지 해줘서」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「いえいえ♪\u3000向こうの世界に戻るゲートを開くまでに、どうやらちょっとクールタイムが必要みたいですから」"
translation = "「아니에요♪ 저쪽 세계로 돌아가는 게이트를 열기까지, 아무래도 약간의 쿨타임이 필요한 것 같으니까요」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「それに、私も陽彩さんとは、ゆっくりお話がしてみたかったんですよ～♪」"
translation = "「게다가, 저도 아키사 씨와는, 천천히 이야기를 나누어보고 싶었거든요~♪」"

[[dialogue]]
speaker_original = "陽彩"
speaker_translation = "히이로"
original = "「言っておくが、いろはたちと比べて、ぼくは人付き合いが得意じゃない。話をしても面白いどうかかは保証できないぞ」"
translation = "「말해두지만, 이로하 일행에 비하면, 나는 대인관계가 서툴러. 이야기를 해도 재미있을지는 보장 못 한다」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「あははっ☆\u3000全然大丈夫ですよ～！\u3000その分、私が喋って陽彩さんを楽しませちゃいますから♪」"
translation = "「아하하☆ 전혀 괜찮아요~! 그만큼, 제가 떠들어서 아키사 씨를 즐겁게 해드릴 테니까요♪」"

[[dialogue]]
speaker_original = "陽彩"
speaker_translation = "히이로"
original = "（ああ、これは<b>押しが強い</b>タイプか……まあ、エリザやいろはで慣れてはいるが……）"
translation = "（아아, 이건 <b>밀어붙이는</b> 타입인가…… 뭐, 엘리자나 이로하 덕분에 익숙하긴 하지만……）"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「それで、陽彩さんが図書館に来たいって言ったのは、こっちの世界で何か知りたかったことがあるからなんですかね？」"
translation = "「그래서, 아키사 씨가 도서관에 오고 싶다고 한 건, 이쪽 세계에서 뭔가 알고 싶었던 게 있어서인가요?」"

[[dialogue]]
speaker_original = "陽彩"
speaker_translation = "히이로"
original = "「ああ。まあ……異世界に来る機会なんて早々ないだろうからな。この世界の、三界や星力について調べてみたいと思ったんだ」"
translation = "「아아. 뭐…… 이세계에 올 기회는 좀처럼 없을 테니까. 이 세계의, 삼계나 성력에 대해 조사해보고 싶다고 생각했어」"

[[dialogue]]
speaker = "unk"
original = "それから陽彩は、気になった本を机に山積みにし、本を読み始めた。しばらく集中していて、ひと区切りついたところで──"
translation = "그러고 나서 아키사는, 신경 쓰이는 책을 책상에 산더미처럼 쌓아두고 책을 읽기 시작했다. 한참 집중하다가, 일단락되었을 때──"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「じ～っ……」"
translation = "「빤히~……」"

[[dialogue]]
speaker_original = "陽彩"
speaker_translation = "히이로"
original = "「そのだな……ぼくはあまり気にしない方だが、流石にじろじろ見すぎじゃないか？」"
translation = "「저기 말이야…… 나는 별로 신경 쓰지 않는 편이지만, 역시 너무 뚫어지게 보는 거 아니야?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「あっ、すみませ～ん♪\u3000読書に没頭する陽彩さん、オモチャで遊ぶ赤ちゃんみたいな顔で、可愛かったのでつい……てへぺろ☆」"
translation = "「앗, 죄송해용~♪ 독서에 몰두하는 아키사 씨, 장난감을 가지고 노는 아기 같은 얼굴이라, 귀여워서 그만…… 테헤페로☆」"

[[dialogue]]
speaker_original = "陽彩"
speaker_translation = "히이로"
original = "「なっ！？\u3000そ、そんな顔はしていないっ！」"
translation = "「뭐!? 그, 그런 얼굴은 하지 않았어!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「おぉっ♪\u3000今の照れた顔、すごく可愛くていいですね～<emoji=heart04>\u3000これはぜひ記憶魔法で脳内保存しとかないと～☆」"
translation = "「오옷♪ 지금 수줍어하는 얼굴, 너무 귀엽고 좋네요~<emoji=heart04> 이건 꼭 기억 마법으로 뇌내 저장해둬야겠어요~☆」"

[[dialogue]]
speaker_original = "陽彩"
speaker_translation = "히이로"
original = "「記憶魔法！？\u3000待て、なんだそれは！\u3000本当に保存してたら盗撮だぞ！？」"
translation = "「기억 마법!? 기다려, 그게 뭐야! 정말로 저장하고 있다면 도촬이라고!?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「はあぁっ<emoji=heart04>\u3000いいですね～♪\u3000陽彩さん、性格はクールなボクっ娘なんですが、一方でふと見せる、どこか小動物を思わせる仕草や外見が保護欲をかき立てられるというか～♪」"
translation = "「하아아앗<emoji=heart04> 좋네요~♪ 아키사 씨, 성격은 쿨한 나코인데, 한편으로 문득 보여주는, 어딘가 소동물을 떠올리게 하는 몸짓이나 외형이 보호 본능을 자극한다고 할까~♪」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「魔法少女アニメ的に言うと、序盤は敵だけど、それにはやむを得ない事情があって、中盤から和解して仲間になりそうな良さがあります！」"
translation = "「마법 소녀 애니메이션식으로 말하자면, 초반에는 적이지만, 거기에는 어쩔 수 없는 사정이 있어서, 중반부터 화해하고 동료가 될 것 같은 장점이 있어요!」"

[[dialogue]]
speaker_original = "陽彩"
speaker_translation = "히이로"
original = "「全然わからん……というか、ぼくはそんな経緯はたどっていない」"
translation = "「전혀 모르겠어…… 그보다, 나는 그런 경위를 밟지 않았어」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「あっ、そのちょっとジト目な感じもいいですね～♪\u3000陽彩さんの素の部分が覗けている感じがしますよ～♪」"
translation = "「앗, 그 살짝 곁눈질하는 느낌도 좋네요~♪ 아키사 씨의 본모습이 엿보이는 느낌이 들어요~♪」"

[[dialogue]]
speaker_original = "陽彩"
speaker_translation = "히이로"
original = "「ああもう、下手に記憶魔法とか聞いたら、集中して本が読めないじゃないか！\u3000仕方ない……トレジアンナ、この世界のことで色々質問してもいいか？」"
translation = "「아아 정말, 어설프게 기억 마법 같은 소리를 들으니 집중해서 책을 읽을 수가 없잖아! 어쩔 수 없지…… 트레지안나, 이 세계에 대해 여러 가지 질문해도 될까?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「はい♪\u3000もちろん構いませんよ～」"
translation = "「네♪ 물론 상관없어요~」"

[[dialogue]]
speaker = "unk"
original = "トレジアンナは周囲に迷惑をかけないよう、自分たちを包むように防音結界を張った。"
translation = "트레지안나는 주변에 폐를 끼치지 않도록, 자신들을 감싸듯이 방음 결계를 쳤다."

[[dialogue]]
speaker = "unk"
original = "その中で、陽彩はトレジアンナに様々なことを尋ねていった。"
translation = "그 안에서, 아키사는 트레지안나에게 여러 가지를 물어보았다."

[[dialogue]]
speaker_original = "陽彩"
speaker_translation = "히이로"
original = "「なるほど……！\u3000三界は決められた時期に、その湖を通ることで行き来ができるのか。面白いな」"
translation = "「과연……! 삼계는 정해진 시기에, 그 호수를 통과함으로써 오갈 수 있는 건가. 흥미롭군」"

[[dialogue]]
speaker_original = "陽彩"
speaker_translation = "히이로"
original = "「そして、この世界では守護星から力を授けられた星騎士が、リクリエという天災から人々を守る為に戦っていて、ここはその最前線である星騎士たちの学園……！」"
translation = "「그리고, 이 세계에서는 수호성으로부터 힘을 부여받은 성기사가, 리크리에라는 천재지변으로부터 사람들을 지키기 위해 싸우고 있고, 이곳은 그 최전선인 성기사들의 학원……!」"

[[dialogue]]
speaker_original = "陽彩"
speaker_translation = "히이로"
original = "「参った……まるでおとぎ話のような世界だ、興味深すぎるぞ。頭の中で疑問や想像がどんどん膨らんで、もっと知りたくなってきてしまう！」"
translation = "「항복이다…… 마치 동화 같은 세계군, 너무 흥미로워. 머릿속에서 의문이나 상상이 점점 부풀어서, 더 알고 싶어져 버려!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ふふっ♪\u3000陽彩さん、どうやら未知のことを知るのが好きなタイプみたいですね～♪\u3000瞳がすごくキラキラしてますよ～☆」"
translation = "「후훗♪ 아키사 씨, 아무래도 미지의 것을 아는 걸 좋아하는 타입인가 보네요~♪ 눈동자가 정말 반짝반짝해요~☆」"

[[dialogue]]
speaker_original = "陽彩"
speaker_translation = "히이로"
original = "「なっ！？\u3000そ、そんな目はしていないっ！\u3000だが……人より知的好奇心が強いのは、まあ間違ってない……」"
translation = "「뭐!? 그, 그런 눈은 하지 않았어! 하지만…… 남보다 지적 호기심이 강한 건, 뭐 틀린 말은 아니야……」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「わかりますよ～♪\u3000私も同じタイプですから！\u3000つい好奇心で、未知を求めて体が動いちゃいますよね～♪」"
translation = "「이해해요~♪ 저도 같은 타입이니까요! 나도 모르게 호기심 때문에, 미지를 찾아 몸이 움직여버리곤 하죠~♪」"

[[dialogue]]
speaker_original = "陽彩"
speaker_translation = "히이로"
original = "「トレジアンナも？」"
translation = "「트레지안나도?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「はい♪\u3000せっかくですから、陽彩さんには図書館の本に書かれてないことも教えちゃいましょうかね～」"
translation = "「네♪ 기왕 이렇게 된 거, 아키사 씨에게는 도서관 책에 쓰여 있지 않은 것도 가르쳐드려 볼까요~」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ロストアイテムや、それに関係する魔女の話を☆」"
translation = "「로스트 아이템이나, 그것과 관련된 마녀의 이야기를요☆」"

[[dialogue]]
speaker = "unk"
original = "それから話は弾んで、２人はお互いのことを尋ねて、語り合った。"
translation = "그러고 나서 이야기는 활기를 띠었고, 두 사람은 서로에 대해 묻고 이야기를 나누었다."

[[dialogue]]
speaker_original = "陽彩"
speaker_translation = "히이로"
original = "「まさか、トレジアンナの正体が大昔の魔女とは……そして、三界とは別に世界樹を中心とした魔女の住む森があり、そこはリクリエの干渉を受けずに存続し続けてきた……」"
translation = "「설마, 트레지안나의 정체가 아주 먼 옛날의 마녀라니…… 그리고, 삼계와는 별도로 세계수를 중심으로 한 마녀들이 사는 숲이 있고, 그곳은 리크리에의 간섭을 받지 않고 존속해왔다……」"

[[dialogue]]
speaker_original = "陽彩"
speaker_translation = "히이로"
original = "「そして、ロストアイテムはリクリエに飲み込まれても残り続ける存在強度を持ち、その起源は大昔の魔女に作られた物が多いと……」"
translation = "「그리고, 로스트 아이템은 리크리에에 삼켜져도 계속 남을 정도의 존재 강도를 가졌으며, 그 기원은 아주 먼 옛날 마녀들에 의해 만들어진 물건이 많다고……」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「その一部は、私が作った物も含まれてるんですよね～。しかもまだ、回収しきれてなくて行方不明のやつが幾つかあって……」"
translation = "「그중 일부는, 제가 만든 물건도 포함되어 있거든요~. 게다가 아직, 다 회수하지 못해서 행방불명인 녀석이 몇 개 있어서……」"

[[dialogue]]
speaker_original = "陽彩"
speaker_translation = "히이로"
original = "「……ちなみに、トレジアンナは本当のところ、何歳なんだ？」"
translation = "「……그나저나, 트레지안나는 사실, 몇 살이지?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「いやですね～、陽彩さん☆\u3000同じ女性同士であっても、乙女の年齢はトップシークレットですよ♪」"
translation = "「아이고 참, 아키사 씨☆ 같은 여성끼리라도, 소녀의 나이는 톱 시크릿이랍니다♪」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「そもそも私、長寿の魔女であることに加えて魔法で成長も止めているので、名実ともに永遠の乙女なんですから☆」"
translation = "「애초에 저, 장수하는 마녀인 데다 마법으로 성장도 멈춰두었으니, 명실상부한 영원한 소녀니까요☆」"

[[dialogue]]
speaker_original = "陽彩"
speaker_translation = "히이로"
original = "「胡散臭くて、嘘なのか本当なのかわからないな……」"
translation = "「수상해서 거짓말인지 진실인지 모르겠군……」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「あははっ☆\u3000ちなみに、陽彩さんはＳＦ好きで本をよく読んでるとのことですけど、そちらの世界の<b>悪魔</b>については、どのように考えていらっしゃいますか？」"
translation = "「아하하☆ 참고로, 아키사 씨는 SF를 좋아해서 책을 자주 읽는다고 하셨는데, 그쪽 세계의 <b>악마</b>에 대해서는 어떻게 생각하시나요?」"

[[dialogue]]
speaker_original = "陽彩"
speaker_translation = "히이로"
original = "「……トレジアンナがぼくと同じタイプなら、ぼくたちの世界のことが気になるのは当然か」"
translation = "「……트레지안나가 나와 같은 타입이라면, 우리 세계의 일이 신경 쓰이는 건 당연한가」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「はい。できればもう少し、悪魔のことについて詳しく知れたらな～と思いまして☆」"
translation = "「네. 가능하다면 악마에 대해 조금 더 자세히 알 수 있었으면 해서요~☆」"

[[dialogue]]
speaker_original = "陽彩"
speaker_translation = "히이로"
original = "「……わかった。キミたちには迷惑もかけたし、世界がこうして１度繋がった以上、次がないとは言えない。ぼくの知っていることはひと通り話しておこう」"
translation = "「……알았어. 너희에게는 폐도 끼쳤고, 세계가 이렇게 한 번 연결된 이상, 다음이 없으리란 보장도 없지. 내가 아는 것은 대강 이야기해주지」"

[[dialogue]]
speaker = "unk"
original = "その後、悪魔について２人で話し、考察なども語り合っているうちに、夜になってしまった。"
translation = "그 후, 악마에 대해 둘이서 이야기하고, 고찰 등도 나누는 사이에 밤이 되어버렸다."

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「いや～、すっかり話し込んじゃいましたね～」"
translation = "「이야~, 어느새 이야기가 길어졌네요~」"

[[dialogue]]
speaker_original = "陽彩"
speaker_translation = "히이로"
original = "「そうだな……えっと」"
translation = "「그렇군…… 저기」"

[[dialogue]]
speaker = "unk"
original = "陽彩は目線を合わさず、ちょっと照れ臭そうに言う。"
translation = "아키사는 시선을 맞추지 않고, 조금 쑥스러운 듯이 말한다."

[[dialogue]]
speaker_original = "陽彩"
speaker_translation = "히이로"
original = "「トレジアンナ……その、ありがとう。今日は充実した１日だった」"
translation = "「트레지안나…… 그, 고마워. 오늘은 충실한 하루였어」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「！\u3000ふふっ、私もです♪\u3000陽彩さん、またお話しましょう♪」"
translation = "「! 후훗, 저도요♪ 아키사 씨, 다음에 또 이야기해요♪」"

[[dialogue]]
speaker = "unk"
original = "トレジアンナがにこやかに手を差し出す。陽彩は一瞬驚くが――"
translation = "트레지안나가 미소 지으며 손을 내민다. 아키사는 잠시 놀라지만――"

[[dialogue]]
speaker_original = "陽彩"
speaker_translation = "히이로"
original = "「ああ。ぼくの話についてこれる奴は、なかなかいないからな」"
translation = "「아아. 내 이야기에 따라올 수 있는 녀석은, 좀처럼 없으니까 말이지」"

[[dialogue]]
speaker = "unk"
original = "口元を緩ませて、トレジアンナの手を取り、握手を交わすのだった。"
translation = "입가에 미소를 띠며, 트레지안나의 손을 잡고 악수를 나누는 것이었다."

