[[dialogue]]
speaker = "unk"
original = "俺とレティシアがお互いに『好き』であることを伝えあってから、数日が経過した。"
translation = "나와 레티시아가 서로 『좋아함』을 전하고 나서 며칠이 경과했다."

[[dialogue]]
speaker = "unk"
original = "レティシアとは正式に交際の約束を交わしたわけではない。一時的な協力関係を了承してもらっただけで、明日にも敵対する可能性は大いにある。"
translation = "레티시아와 정식으로 교제 약속을 나눈 것은 아니다. 일시적인 협력 관계를 승낙받았을 뿐, 내일이라도 적대할 가능성은 충분히 있다."

[[dialogue]]
speaker = "unk"
original = "けれど普通の男女の友人よりは、お互いのことを意識している。敵のような味方のような、友人のような恋人のような……"
translation = "하지만 평범한 남녀 친구보다는 서로를 의식하고 있다. 적 같은 아군 같은, 친구 같은 연인 같은……"

[[dialogue]]
speaker = "unk"
original = "そんな曖昧な距離感を保っていたのだが、ある夜、転機が訪れた──"
translation = "그런 애매한 거리감을 유지하고 있었으나, 어느 날 밤 전환기가 찾아왔다──"

[[dialogue]]
speaker = "レティシア"
original = "「こんな夜遅くに、魔王の部屋を訪れるのは初めてね」"
translation = "「이런 늦은 밤에 마왕의 방을 방문하는 건 처음이네」"

[[dialogue]]
speaker = "unk"
original = "極星学園生の外出は、ある程度緩和されたとはいえ制限されている。レティシアが『俺に用事がある』というから、こうして特別に許可をしたのだが……"
translation = "극성 학원생들의 외출은 어느 정도 완화되었다고는 하나 제한되어 있다. 레티시아가 『나에게 용건이 있다』고 했기에 이렇게 특별히 허가를 내준 것인데……"

[[dialogue]]
speaker = "レティシア"
original = "「用事といっても、大したことじゃないのだけど……よかったら、私に教えてくれないかしら？」"
translation = "「용건이라고 해도 대단한 건 아니지만…… 괜찮다면 나에게 가르쳐주지 않을래?」"

[[dialogue]]
speaker = "クロト"
original = "「……何を？」"
translation = "「……무엇을?」"

[[dialogue]]
speaker = "レティシア"
original = "「決まってるわ。お互いを意識している異性が２人きりですること。経験しておきたいの」"
translation = "「뻔하잖아. 서로를 의식하는 이성이 단둘이서 하는 것. 경험해 보고 싶어」"

[[dialogue]]
speaker = "unk"
original = "レティシアの口から似合わない言葉が飛び出て、驚いた。"
translation = "레티시아의 입에서 어울리지 않는 말이 튀어나와 깜짝 놀랐다."

[[dialogue]]
speaker = "レティシア"
original = "「貴方は私を『好き』と言ってくれた。私も、貴方のことが──５番目くらいには『好き』」"
translation = "「당신은 나를 『좋아한다』고 말했어. 나도 당신을── 5번째 정도로는 『좋아해』」"

[[dialogue]]
speaker = "unk"
original = "極星学園の幼なじみの次くらい──そういう意味での５番目。嫌な気はしない。今のレティシアなりの、最大限の好意を伝えられている気がするから。"
translation = "극성 학원의 소꿉친구들 다음 정도── 그런 의미에서의 5번째. 기분 나쁘지는 않다. 지금의 레티시아 나름대로 최대한의 호의를 전하고 있다는 기분이 드니까."

[[dialogue]]
speaker = "レティシア"
original = "「ルヴィの説得のために、私は変わらないといけないわ。必要がないと切り捨てていた、たくさんのことを経験しておきたい」"
translation = "「루비를 설득하기 위해 나는 변해야만 해. 필요 없다고 잘라냈던 수많은 것들을 경험해 보고 싶어」"

[[dialogue]]
speaker = "レティシア"
original = "「だから教えて？\u3000お互いを憎からず想っている男女がする、エッチなこと」"
translation = "「그러니까 가르쳐줘. 서로를 나쁘지 않게 생각하는 남녀가 하는 야한 일」"

[[dialogue]]
speaker = "クロト"
original = "「……教えられるかどうか。俺だって初めてなんだ」"
translation = "「……가르쳐줄 수 있을지 모르겠어. 나도 처음이거든.」"

[[dialogue]]
speaker = "レティシア"
original = "「あら。あんなにたくさん女の子がいるから、てっきりプレイボーイかと思ってたのに……でも別に構わないわ」"
translation = "「어머. 그렇게 여자애들이 많은데 당연히 플레이보이인 줄 알았더니…… 하지만 상관없어」"

[[dialogue]]
speaker = "レティシア"
original = "「教えてくれなくてもいい。私と一緒に、学んでくれる？」"
translation = "「가르쳐주지 않아도 돼. 나와 함께 배워볼래?」"

[[dialogue]]
speaker = "unk"
original = "レティシアのまっすぐな瞳に、俺は頷いた──"
translation = "레티시아의 곧은 눈동자에 나는 고개를 끄덕였다──"

[[dialogue]]
speaker = "unk"
original = "レティシアの希望で、俺が仰向けになる騎乗位をすることになった。それにしても……"
translation = "레티시아의 희망으로 내가 누운 자세에서 하는 기승위를 하기로 했다. 그건 그렇고……"

[[dialogue]]
speaker = "クロト"
original = "「どうして戦闘服に……？」"
translation = "「어째서 전투복으로……?」"

[[dialogue]]
speaker = "レティシア"
original = "「いざという時に、あなたの寝首をかけるかも──なんてね？」"
translation = "「만약의 상황에 당신의 목을 칠지도── 라고나 할까?」"

[[dialogue]]
speaker = "レティシア"
original = "「こっちの方が痛みに耐性があるの。初めては痛いって言うし……あなたも私が苦しい顔をしていない方が、気が楽でしょう？」"
translation = "「이쪽이 통증 내성이 더 강하거든. 처음은 아프다고들 하니까…… 당신도 내가 괴로운 표정을 짓지 않는 편이 마음 편하겠지?」"

[[dialogue]]
speaker = "unk"
original = "とても合理的な理由での変身だった──けれど、俺のことまで考えて気配りをしてくれたことは嬉しい。"
translation = "매우 합리적인 이유로의 변신이었다── 하지만 나까지 배려해 주었다는 사실이 기쁘다."

[[dialogue]]
speaker = "レティシア"
original = "「……凄いのね。あなたのそれ……すごく大きくなってる」"
translation = "「……대단하네. 당신의 그거…… 굉장히 커졌어」"

[[dialogue]]
speaker = "レティシア"
original = "「私の身体で、興奮してくれているのね」"
translation = "「내 몸을 보고 흥분해 주는구나」"

[[dialogue]]
speaker = "unk"
original = "普段からスタイルのいい女の子だとは思っていたけれど……服をはだけると一段と凄い。"
translation = "평소에도 몸매가 좋은 아이인 줄은 알았지만…… 옷을 풀어 헤치니 한층 더 엄청나다."

[[dialogue]]
speaker = "unk"
original = "胸はたっぷりと大きく、腰はくびれて、俺の体にもっちりと乗ったお尻も柔らかくて──興奮するなという方が無理な話だ。"
translation = "가슴은 풍만하고 허리는 잘록하며, 내 몸 위에 묵직하게 올라탄 엉덩이도 부드러워서── 흥분하지 않는 것이 무리인 이야기다."

[[dialogue]]
speaker = "レティシア"
original = "「性知識は、一応あるの。ルヴィが教えてくれたから」"
translation = "「성 지식은 일단 있어. 루비가 가르쳐줬으니까」"

[[dialogue]]
speaker = "クロト"
original = "「……ルヴィネが？\u3000意外だ」"
translation = "「……루비네가? 의외다」"

[[dialogue]]
speaker = "レティシア"
original = "「心配してくれてたんだと思う。極星学園に入学した頃から私、男の子に告白される機会が増えていたから」"
translation = "「걱정해 준 거라고 생각해. 극성 학원에 입학했을 무렵부터 나, 남자애들한테 고백받는 기회가 늘었었으니까」"

[[dialogue]]
speaker = "レティシア"
original = "「『いつか好きな男の子とする時のために』って……あの時は必要のない無駄な知識と思っていたけれど。今は感謝ね」"
translation = "「『언젠가 좋아하는 남자애랑 할 때를 위해서』라며…… 그때는 필요 없는 쓸데없는 지식이라고 생각했지만 지금은 감사하네」"

[[dialogue]]
speaker = "レティシア"
original = "「勃起した男性器を、女性器に入れて、出し入れして……男性が我慢できなくなったら、セックスはおわり。これで合ってるかしら？」"
translation = "「발기한 남성기를 여성기에 넣고 왔다 갔다 하고…… 남자가 참지 못하게 되면 섹스는 끝. 이걸로 맞을까?」"

[[dialogue]]
speaker = "unk"
original = "合っているけれど、淡白すぎる……"
translation = "맞기는 한데 너무 담백해……"

[[dialogue]]
speaker = "レティシア"
original = "「男性器じゃ、だめ？\u3000じゃあどう言ったらいいかしら。教えて？」"
translation = "「남성기가 아니면 안 돼? 그럼 뭐라고 해야 할까. 가르쳐줘?」"

[[dialogue]]
speaker = "unk"
original = "俺より歳上で余裕はあるけれど、性のことをほとんど何も知らないレティシア。きっと教科書に載っているような事柄しか知らないはずだ。"
translation = "나보다 연상이라 여유는 있지만, 성에 대해서는 거의 아무것도 모르는 레티시아. 분명 교과서에나 실릴 법한 사항밖에 모를 것이다."

[[dialogue]]
speaker = "unk"
original = "こんなまっさらな初心な女の子に、余計なことを教えていいのだろうかと思いつつ──"
translation = "이런 깨끗하고 순진한 아이에게 불필요한 것을 가르쳐도 될까 생각하면서도──"

[[dialogue]]
speaker = "レティシア"
original = "「……チ○ポ？\u3000あなたのそれ、チ○ポって言ってほしいの？\u3000それで女性器は──ええ。わかったわ。言う通りにしてあげる」"
translation = "「……자지? 당신의 그거, 자지라고 불러줬으면 좋겠어? 그리고 여성기는── 응. 알았어. 시키는 대로 해줄게」"

[[dialogue]]
speaker = "レティシア"
original = "「あなたのチ○ポ……私のおま○こに入れるから。ジッとしてて……」"
translation = "「당신의 자지…… 내 보지에 넣을 테니까. 가만히 있어……」"

[[dialogue]]
speaker = "レティシア"
original = "「はぁ、あぁっ……<emoji=heart04>\u3000ん、んんんうっ……<emoji=heart04>」"
translation = "「하아, 아앗…… <emoji=heart04> 응, 으으으윽…… <emoji=heart04>」"

[[dialogue]]
speaker = "レティシア"
original = "「全部入った……ん、ぅ<emoji=heart04>\u3000すごい……内側から、ぐいぐい広げられて……ぞくぞくする……」"
translation = "「전부 들어갔어…… 응, 윽 <emoji=heart04> 굉장해…… 안쪽에서 꾹꾹 넓혀져서…… 소름 끼쳐……」"

[[dialogue]]
speaker = "unk"
original = "レティシアの性器は、すでにしっとりと濡れていた。興奮していたのは、俺だけではなかったみたいだ。"
translation = "레티시아의 성기는 이미 촉촉하게 젖어 있었다. 흥분하고 있었던 건 나뿐만이 아니었던 모양이다."

[[dialogue]]
speaker = "レティシア"
original = "「チ○ポ、硬い……<emoji=heart04>\u3000あ、これ……嫌じゃない……<emoji=heart04>\u3000あったかいのが、お腹の奥で、じんわり広がって……<emoji=heart04>」"
translation = "「자지, 딱딱해…… <emoji=heart04> 아, 이거…… 싫지 않아…… <emoji=heart04> 따뜻한 게 뱃속 깊은 곳에서 은은하게 퍼져서…… <emoji=heart04>」"

[[dialogue]]
speaker = "レティシア"
original = "「動いて、あげるっ……射精しやすいように、いっぱいこすって、あげるからっ……んんぅっ<emoji=heart04>」"
translation = "「움직여, 줄게…… 사정하기 쉽게 잔뜩 비벼줄 테니까…… 응으윽 <emoji=heart04>」"

[[dialogue]]
speaker = "レティシア"
original = "「はぁっ……はぁあっ……<emoji=heart04>\u3000あっ……はぁっ……ふぅっ……んんんっ……<emoji=heart04>\u3000はぁ、あ、ぁああっ……<emoji=heart04>」"
translation = "「하앗…… 하아앗…… <emoji=heart04> 앗…… 하앗…… 후우…… 음음윽…… <emoji=heart04> 하아, 아, 아아앗…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "大きく股を開いたレティシアに、ゆっくりとストロークをされる。"
translation = "다리를 크게 벌린 레티시아가 천천히 스트로크를 한다."

[[dialogue]]
speaker = "unk"
original = "張り詰めたペニスを、柔らかい膣肉できつく締めあげられ、思わず腰が浮くほどの気持ちよさ。"
translation = "팽팽해진 페니스를 부드러운 질 근육으로 꽉 조여대어, 나도 모르게 허리가 뜰 정도의 기분 좋음."

[[dialogue]]
speaker = "レティシア"
original = "「あっ……んんっ……<emoji=heart04>\u3000ふふっ♪\u3000あなた、すごく余裕の、なさそうな顔してる……チ○ポ、気持ちいいの？」"
translation = "「앗…… 으응…… <emoji=heart04> 후훗♪ 당신, 굉장히 여유 없어 보이는 표정이야…… 자지, 기분 좋아?」"

[[dialogue]]
speaker = "レティシア"
original = "「おま○こにチ○ポの出し入れ……これで合ってる？\u3000男の子って、自分でするん、でしょう……？\u3000私、下手じゃない……？\u3000……んぅっ<emoji=heart04>」"
translation = "「보지에 자지 넣었다 빼기…… 이걸로 맞아? 남자애들은 혼자서 하는 거지……? 나, 서툴지 않아……? ……응윽 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "自慰なんて比べ物にならない。レティシアに包まれて、しごかれる方が圧倒的に気持ちいいことを伝えた──"
translation = "자위 따위와는 비교도 되지 않는다. 레티시아에게 감싸여 비벼지는 쪽이 압도적으로 기분 좋다는 것을 전했다──"

[[dialogue]]
speaker = "レティシア"
original = "「そうっ……<emoji=heart04>\u3000なんだ、セックスって、案外簡単、なのね……よかった……はぁ、んんっ……<emoji=heart04>」"
translation = "「그렇구나…… <emoji=heart04> 뭐야, 섹스라는 거 생각보다 간단하네…… 다행이야…… 하아, 으응…… <emoji=heart04>」"

[[dialogue]]
speaker = "レティシア"
original = "「チ○ポ、いっぱいシコシコしてあげるっ……んぅ<emoji=heart04>\u3000はぁ、はぁあっ……<emoji=heart04>\u3000私のおま○こでたくさんっ……んんぅ、ぁ、あぁあっ……<emoji=heart04>」"
translation = "「자지 잔뜩 시코시코 해줄게…… 응윽 <emoji=heart04> 하아, 하아앗…… <emoji=heart04> 내 보지로 잔뜩…… 으응윽, 아, 아아앗…… <emoji=heart04>」"

[[dialogue]]
speaker = "レティシア"
original = "「男の子は……手でしごく、のよね……？\u3000だったら、締めつけも、強い方が、いいのかしらっ……？\u3000んんんっ……<emoji=heart04>」"
translation = "「남자애들은…… 손으로 훑는 거지……? 그렇다면, 조이는 것도 강한 쪽이 좋은 걸까……? 으으음…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ぎゅっ、ぎゅっ──とレティシアの膣内の締まりが強くなる。ピストンをしながら、俺のペニスへ刺激を増やしてくれていた。"
translation = "꽉, 꽉── 하고 레티시아의 질 내벽의 조임이 강해진다. 피스톤을 하면서 내 페니스로 자극을 늘려주고 있었다."

[[dialogue]]
speaker = "レティシア"
original = "「あっ……ふふふっ♪\u3000今の、いいのね？\u3000チ○ポが震えてるの、よくわかる……んんぅっ……<emoji=heart04>」"
translation = "「앗…… 후후후♪ 지금 거, 좋구나? 자지가 떨리는 거, 잘 느껴져…… 으응윽…… <emoji=heart04>」"

[[dialogue]]
speaker = "レティシア"
original = "「おま○こに力を、込めてっ……<emoji=heart04>\u3000ぎゅ、ぅっ<emoji=heart04>\u3000ぎゅ、ぅっ<emoji=heart04>\u3000んんっ……こんな、感じ……？\u3000はぁ、んんっ……<emoji=heart04>」"
translation = "「보지에 힘을 줘서…… <emoji=heart04> 꽉, 윽 <emoji=heart04> 꽉, 윽 <emoji=heart04> 으응…… 이런 느낌……? 하아, 으응…… <emoji=heart04>」"

[[dialogue]]
speaker = "レティシア"
original = "「あ──ぁ、あっ<emoji=heart04>\u3000チ○ポ硬いっ……<emoji=heart04>\u3000奥のところ、好き、かもっ……<emoji=heart04>\u3000奥に、当てるとっ……あ、あぁ<emoji=heart04>\u3000んんっ……<emoji=heart04>」"
translation = "「아── 아, 앗 <emoji=heart04> 자지 딱딱해…… <emoji=heart04> 깊숙한 곳, 좋아할지도…… <emoji=heart04> 깊숙이 닿으면…… 아, 아아 <emoji=heart04> 으응…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "きっとレティシアの性格からして、自慰も経験なんてないはずだ。自身の性器の、気持ちいい所に、俺のペニスを導いてポイントを探っている──"
translation = "분명 레티시아의 성격상 자위조차 경험이 없을 것이다. 자신의 성기에서 기분 좋은 곳으로 내 페니스를 유도하며 포인트를 찾고 있다──"

[[dialogue]]
speaker = "unk"
original = "夢中でお尻を上下する彼女のおっぱいもダイナミックに揺れて、俺もどんどん昂っていく。"
translation = "정신없이 엉덩이를 상하로 움직이는 그녀의 가슴도 다이내믹하게 흔들려, 나도 점점 고조되어 간다."

[[dialogue]]
speaker = "レティシア"
original = "「……おっぱい、好き？\u3000んんっ……はぁっ……<emoji=heart04>\u3000いいのよ、しっかり見て……<emoji=heart04>\u3000あなたなら……見られるの、嫌いじゃないっ……から<emoji=heart04>」"
translation = "「……가슴, 좋아해? 으응…… 하앗…… <emoji=heart04> 괜찮아, 제대로 봐줘…… <emoji=heart04> 당신이라면…… 보여지는 거, 싫지 않으니까 <emoji=heart04>」"

[[dialogue]]
speaker = "レティシア"
original = "「手、伸ばしてっ……触っていいから……はぁ、あぁっ<emoji=heart04>」"
translation = "「손, 뻗어서…… 만져도 되니까…… 하아, 아앗 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "レティシアの大きな胸は、ずっしりと重たくて、手のひらに吸い付く。柔らかくてハリがあって、興奮せずにいられない。"
translation = "레티시아의 커다란 가슴은 묵직하고 무거워서 손바닥에 착 달라붙는다. 부드럽고 탄력이 있어 흥분하지 않을 수 없다."

[[dialogue]]
speaker = "レティシア"
original = "「あぁ、ああぁっ……はぁあ、んんぅ<emoji=heart04>\u3000セックス、気持ちいい……<emoji=heart04>\u3000んんっ……おっぱい、もっとぎゅって、して……？」"
translation = "「아아, 아아앗…… 하아아, 으응윽 <emoji=heart04> 섹스, 기분 좋아…… <emoji=heart04> 으응…… 가슴, 좀 더 꽉 해줘……?」"

[[dialogue]]
speaker = "レティシア"
original = "「んんぅっ<emoji=heart04>\u3000は、あぁっ<emoji=heart04>\u3000それ、いいっ……先っぽ、好きっ──ぁ、あっ<emoji=heart04>\u3000んんんっ<emoji=heart04>」"
translation = "「으응윽 <emoji=heart04> 하, 아앗 <emoji=heart04> 그거, 좋아…… 끝부분, 좋아── 아, 앗 <emoji=heart04> 으으음 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "乳首を指先で転がすと、心地よさそうに口角を上げるレティシア。"
translation = "유두를 손가락 끝으로 굴리자, 기분 좋은 듯 입꼬리를 올리는 레티시아."

[[dialogue]]
speaker = "unk"
original = "とろんと蕩けた瞳が、普段の彼女とのギャップになって、たまらない。"
translation = "황홀하게 풀린 눈동자가 평소의 그녀와 갭을 이뤄 참을 수 없다."

[[dialogue]]
speaker = "レティシア"
original = "「ね、ねぇっ……<emoji=heart04>\u3000もっとして欲しいこと、ない……？\u3000んんぅ<emoji=heart04>\u3000は、あぁっ<emoji=heart04>\u3000んんっ……<emoji=heart04>\u3000何でも、言って……<emoji=heart04>」"
translation = "「저, 저기…… <emoji=heart04> 더 해줬으면 하는 거, 없어……? 으응윽 <emoji=heart04> 하, 아앗 <emoji=heart04> 으응…… <emoji=heart04> 뭐든 말해줘…… <emoji=heart04>」"

[[dialogue]]
speaker = "レティシア"
original = "「教えてっ……チ○ポが喜ぶことっ、教えて……？\u3000してあげるっ……あ、あぁっ<emoji=heart04>\u3000はぁ、んぅっ<emoji=heart04>」"
translation = "「알려줘…… 자지가 기뻐하는 거, 알려줘……? 해줄게…… 아, 아앗 <emoji=heart04> 하아, 응윽 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "『好き』とたくさん言ってほしい──俺は彼女のおっぱいを揉みしだきながら、そう伝えた。"
translation = "『좋아해』라고 많이 말해주길 바란다── 나는 그녀의 가슴을 주무르며 그렇게 전했다."

[[dialogue]]
speaker = "レティシア"
original = "「すっ……好きっ……<emoji=heart04>\u3000セックス、好き……<emoji=heart04>\u3000気持ちいいの、好き……<emoji=heart04>\u3000あ、ぁっ！？\u3000チ○ポ、ぐいぐいって、大きくっ……んんんぅ<emoji=heart04>」"
translation = "「좋…… 좋아해…… <emoji=heart04> 섹스, 좋아해…… <emoji=heart04> 기분 좋은 거, 좋아해…… <emoji=heart04> 아, 앗!? 자지가 꾹꾹 하고 커져서…… 으으으음 <emoji=heart04>」"

[[dialogue]]
speaker = "レティシア"
original = "「そういうこと……？\u3000口でちゃんと伝えたら、嬉しい……ってこと……？\u3000ええ、わかったわ……んんぅ<emoji=heart04>\u3000はぁ、あぁあっ……<emoji=heart04>」"
translation = "「그런 거야……? 입으로 제대로 전하면 기쁘다……는 거지……? 응, 알았어…… 으응윽 <emoji=heart04> 하아, 아아앗…… <emoji=heart04>」"

[[dialogue]]
speaker = "レティシア"
original = "「好き……好きよ……<emoji=heart04>\u3000隙間なくくっついて、あったかいの……好き……<emoji=heart04>\u3000安心する……ふわふわする……あ、あぁっ<emoji=heart04>\u3000好き、好きっ……<emoji=heart04>」"
translation = "「좋아해…… 좋아해…… <emoji=heart04> 틈 없이 달라붙어서 따뜻한 거…… 좋아해…… <emoji=heart04> 안심돼…… 둥실둥실해…… 아, 아앗 <emoji=heart04> 좋아해, 좋아해…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "レティシアと繋がっているところがどんどん熱くなっていく。彼女も、絶頂に向かっている──"
translation = "레티시아와 이어져 있는 곳이 점점 뜨거워진다. 그녀도 절정을 향하고 있다──"

[[dialogue]]
speaker = "レティシア"
original = "「ご、ごめんなさいっ……ゆっくりじゃ、もうだめっ……速く、し、したいっ……だ、だめ……？」"
translation = "「미, 미안해…… 천천히는 이제 안 돼…… 빨리 하, 하고 싶어…… 아, 안 돼……?」"

[[dialogue]]
speaker = "unk"
original = "リードする側なのに、俺の許可を仰いでくる。"
translation = "리드하는 쪽이면서 내 허락을 구한다."

[[dialogue]]
speaker = "unk"
original = "歳上で、妖艶で、ミステリアスなのに……甘えてくる。彼女は元々、そういう女の子なんだろう。"
translation = "연상이고 요염하고 미스테리어스한데…… 어리광을 부린다. 그녀는 원래 그런 여자아이인 거겠지."

[[dialogue]]
speaker = "unk"
original = "そんなレティシアが愛おしくて──"
translation = "그런 레티시아가 사랑스러워서──"

[[dialogue]]
speaker = "クロト"
original = "「速くしてくれると嬉しいな──レティシアっ……！」"
translation = "「빨리 해주면 기쁘겠어── 레티시아!」"

[[dialogue]]
speaker = "レティシア"
original = "「…………うんっ<emoji=heart04>」"
translation = "「…………으응 <emoji=heart04>」"

[[dialogue]]
speaker = "レティシア"
original = "「あっあっ、あっあっあっ<emoji=heart04>\u3000んんっ、んっんっんっんっ<emoji=heart04>\u3000ふぅ、んんっ<emoji=heart04>\u3000んんぁ、あ、あぁぁっ<emoji=heart04>\u3000あぁぁあっ<emoji=heart04>」"
translation = "「앗앗, 앗앗앗 <emoji=heart04> 으응, 응응응응 <emoji=heart04> 후우, 으응 <emoji=heart04> 으응아, 아, 아아아앗 <emoji=heart04> 아아아앗 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "お尻が波打つくらいの激しい騎乗位ピストンが、ペニスに襲い掛かった。"
translation = "엉덩이가 물결칠 정도의 격렬한 기승위 피스톤이 페니스를 덮쳐왔다."

[[dialogue]]
speaker = "レティシア"
original = "「はぁ、あっあっあっ<emoji=heart04>\u3000チ○ポ、すごいっ、あ、あっ<emoji=heart04>\u3000ガチガチ、でっ<emoji=heart04>\u3000あったかいっ……奥、ぐりぐりって──ぁ、ああぁっ<emoji=heart04>」"
translation = "「하아, 앗앗앗 <emoji=heart04> 자지, 굉장해, 아, 앗 <emoji=heart04> 딱딱해서 <emoji=heart04> 따뜻해…… 안쪽을 구리구리 하고── 아, 아아앗 <emoji=heart04>」"

[[dialogue]]
speaker = "レティシア"
original = "「す、好きっ……<emoji=heart04>\u3000これ、好きっ……<emoji=heart04>\u3000あなたの、硬いチ○ポっ<emoji=heart04>\u3000速い出し入れ、気持ち、いいっ<emoji=heart04>\u3000あっあっあっ、あぁ、あぁっ<emoji=heart04>」"
translation = "「조, 좋아해…… <emoji=heart04> 이거, 좋아해…… <emoji=heart04> 당신의 딱딱한 자지 <emoji=heart04> 빠른 왕복, 기분 좋아 <emoji=heart04> 앗앗앗, 아아, 아앗 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "快感を貪るように、かつて得られなかった温もりを離さないとばかりに、強い杭打ちをするレティシアが、エロくて、可愛くて、仕方がない。"
translation = "쾌감을 탐하듯, 일찍이 얻지 못했던 온기를 놓지 않으려는 듯 강하게 말뚝질을 하는 레티시아가 음란하고 귀여워서 어쩔 줄 모르겠다."

[[dialogue]]
speaker = "unk"
original = "紅潮した表情。揺れるおっぱい。ペニスを飲み込む女性器──全てから目が離せなかった。"
translation = "홍조를 띤 표정. 흔들리는 가슴. 페니스를 집어삼키는 여성기── 모든 것에서 눈을 뗄 수 없었다."

[[dialogue]]
speaker = "レティシア"
original = "「はぁっふぅっんんんっ<emoji=heart04>\u3000あっあっあっ<emoji=heart04>\u3000んんぅ、はぁ、あっあっあっあっあっ<emoji=heart04>\u3000と、止まら、ないのっ<emoji=heart04>\u3000お尻、止まらないっ……<emoji=heart04>」"
translation = "「하앗후우으음 <emoji=heart04> 앗앗앗 <emoji=heart04> 으응윽, 하아, 앗앗앗앗앗 <emoji=heart04> 멈, 멈추지 않아 <emoji=heart04> 엉덩이가 안 멈춰…… <emoji=heart04>」"

[[dialogue]]
speaker = "レティシア"
original = "「気持ちいいっ<emoji=heart04>\u3000チ○ポ気持ちいいっ<emoji=heart04>\u3000セックス好きっ……おま○こで繋がるの、好きっ……ぁ、あぁあっ<emoji=heart04>\u3000はあ、あ、あぁっ<emoji=heart04>」"
translation = "「기분 좋아 <emoji=heart04> 자지 기분 좋아 <emoji=heart04> 섹스 좋아해…… 보지로 이어지는 거 좋아해…… 아, 아아앗 <emoji=heart04> 하아, 아, 아앗 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "初めてとは思えないほどに乱れるレティシアが可愛くて、もっと感じさせてあげたくなる。"
translation = "처음이라고는 믿기지 않을 정도로 흐트러진 레티시아가 귀여워 좀 더 느끼게 해주고 싶어진다."

[[dialogue]]
speaker = "unk"
original = "俺は結合部の少し上にある、クリトリスをそっと撫でた。"
translation = "나는 결합부 조금 위에 있는 클리토리스를 살며시 쓰다듬었다."

[[dialogue]]
speaker = "レティシア"
original = "「──んんんぅうっ！？\u3000あ、あ、ぁあっ<emoji=heart04>\u3000今の、すごっ──んんんっ<emoji=heart04>\u3000そこ、何っ……それ、好きっ……あ、あぁあっ<emoji=heart04>」"
translation = "「──으으으음윽!? 아, 아, 아앗 <emoji=heart04> 방금 거 굉장── 으으음 <emoji=heart04> 거기, 뭐야…… 그거 좋아…… 아, 아아앗 <emoji=heart04>」"

[[dialogue]]
speaker = "レティシア"
original = "「もっとしてっ……そこ、触って──あ、あぁあっ<emoji=heart04>\u3000ん、んんぅっ<emoji=heart04>\u3000ふぁ、あ、あぁ、あぁああっ<emoji=heart04>\u3000んん～っ<emoji=heart04>」"
translation = "「더 해줘…… 거기 만져줘── 아, 아아앗 <emoji=heart04> 응, 으응윽 <emoji=heart04> 하아, 아, 아아, 아아아앗 <emoji=heart04> 으응~ <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "レティシアは敏感な方なのかもしれない。優しく、けれど小刻みに速く。クリトリスへ刺激を続ける。"
translation = "레티시아는 민감한 편일지도 모른다. 부드럽게, 하지만 잘게 빠르게. 클리토리스에 자극을 계속한다."

[[dialogue]]
speaker = "レティシア"
original = "「ひぁ、あ、あぁっ<emoji=heart04>\u3000あ、あ、ぁ、ううぅっ<emoji=heart04>\u3000あ、あ、あぁあ、あ、あ、ぁ、ああっ<emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000気持ちいい、気持ちいい、のっ<emoji=heart04>」"
translation = "「히아, 아, 아앗 <emoji=heart04> 아, 아, 아, 우우욱 <emoji=heart04> 아, 아, 아아아, 아, 아, 아, 아앗 <emoji=heart04> 으응윽 <emoji=heart04> 기분 좋아, 기분 좋은 거야 <emoji=heart04>」"

[[dialogue]]
speaker = "レティシア"
original = "「はぁ、あ、あぁああっ<emoji=heart04>\u3000チ○ポ、びくびくっ<emoji=heart04>\u3000ずっとしてるっ……こ、これっ<emoji=heart04>\u3000もう、で、出そう、なのっ……？」"
translation = "「하아, 아, 아아아앗 <emoji=heart04> 자지가 움찔움찔해 <emoji=heart04> 계속 그러고 있어…… 이, 이거 이제 나, 나올 것 같아……?」"

[[dialogue]]
speaker = "unk"
original = "愛液をしとどにまぶされて、狭い膣内でこすられ続けて、俺も限界が近い──"
translation = "애액을 듬뿍 묻힌 채 좁은 질 안에서 계속 비벼져, 나도 한계가 가까웠다──"

[[dialogue]]
speaker = "レティシア"
original = "「はぁ、はぁ、はあ、ぁああっ<emoji=heart04>\u3000あ、あっ？\u3000私も、な、何か、来るっ？\u3000何か来るっ<emoji=heart04>\u3000魔王、私、変なの、おま○こ、切なく、なって──んんんっ<emoji=heart04>」"
translation = "「하아, 하아, 하아, 아아앗 <emoji=heart04> 아, 앗? 나도, 무, 뭔가 와? 뭔가 와 <emoji=heart04> 마왕, 나, 이상해, 보지가 애달파져서── 으으으음 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "絶頂が近いんだ、と教えてあげた。教科書には載っていない性の知識を、レティシアはすぐに吸収した。"
translation = "절정이 가까운 거라고 알려주었다. 교과서에는 실려 있지 않은 성 지식을 레티시아는 금방 흡수했다."

[[dialogue]]
speaker = "レティシア"
original = "「イ、イクっ？\u3000これがっ……う、んっ<emoji=heart04>\u3000あ、あ、ああっ<emoji=heart04>\u3000イク<emoji=heart04>\u3000イクっ<emoji=heart04>\u3000イクのっ<emoji=heart04>\u3000あなたのチ○ポで、おま○こ、イク、ぅっ<emoji=heart04>」"
translation = "「가, 가? 이게…… 으, 응 <emoji=heart04> 아, 아, 아앗 <emoji=heart04> 가 <emoji=heart04> 가 <emoji=heart04> 가는 거야 <emoji=heart04> 당신의 자지로 보지 가버려, 윽 <emoji=heart04>」"

[[dialogue]]
speaker = "レティシア"
original = "「ふあぁあっあっあっあっあっ──イク<emoji=heart04>\u3000イクっ<emoji=heart04>\u3000イクイクっ<emoji=heart04>\u3000イクイクイクイクっ──あ、ぁ、あぁあっ！」"
translation = "「후아아앗앗앗앗앗── 가 <emoji=heart04> 가 <emoji=heart04> 가버려가버려 <emoji=heart04> 가버려가버려가버려── 아, 아, 아아앗!」"

[[dialogue]]
speaker = "レティシア"
original = "「んん、んんんぅぅぅうう～～～～っ──<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「으응, 으으으으으음~~~~ <emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "レティシア"
original = "「あぁあぁあぁあぁあぁあぁああああ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아아아아아아아아아아아아아~~~~앗 <emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "レティシア"
original = "「あ、あぁあっ──んんんぅっ！\u3000んん、んんう～っ<emoji=heart04>\u3000あったかいのが、たくさんっ……出て、る、ぅっ……あ、あぁああっ……<emoji=heart04>」"
translation = "「아, 아아앗── 으으으음윽! 으응, 으으음~ <emoji=heart04> 따뜻한 게 잔뜩…… 나오고 있어…… 아, 아아아앗…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ずっと堰き止めていた迸りが、レティシアのお腹で弾け続ける。"
translation = "계속 막아두었던 분출이 레티시아의 뱃속에서 계속 터져 나온다."

[[dialogue]]
speaker = "レティシア"
original = "「ふうぅっ<emoji=heart04>\u3000ぁ、ああぁあっ……はぁ、あぁっ……<emoji=heart04>\u3000んん、んぁ、ああぁっ……<emoji=heart04>」"
translation = "「후우으 <emoji=heart04> 아, 아아아앗…… 하아, 아앗…… <emoji=heart04> 으응, 으아, 아아아앗…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "どくん、どくんと撃ち放つたび、レティシアの身体が痙攣を繰り返す。"
translation = "두근, 두근 하며 내뿜을 때마다 레티시아의 몸이 경련을 반복한다."

[[dialogue]]
speaker = "unk"
original = "一滴残らず射精しろと言われているみたいに、ペニスを何度も何度も女性器で揉みしだかれて──"
translation = "한 방울도 남기지 말고 사정하라는 듯 페니스를 몇 번이고 몇 번이고 여성기로 주물러져──"

[[dialogue]]
speaker = "レティシア"
original = "「んんぁぁっ……はああぁっ……ふぅうー……<emoji=heart04>」"
translation = "「으응아아앗…… 하아아앗…… 후우으…… <emoji=heart04>」"

[[dialogue]]
speaker = "レティシア"
original = "「抜け、ちゃった……んんぅ……<emoji=heart04>\u3000すごかった……チ○ポから、びゅうびゅうって……<emoji=heart04>」"
translation = "「빠져버렸어…… 으응윽…… <emoji=heart04> 굉장했어…… 자지에서 뷰륫뷰륫 하고…… <emoji=heart04>」"

[[dialogue]]
speaker = "レティシア"
original = "「いつ止まるのか、わからないくらい……男の子って……１回で、こんなに出るのね……ふぅうっ……<emoji=heart04>」"
translation = "「언제 멈출지 모를 정도로…… 남자애들은…… 한 번에 이렇게나 나오는구나…… 후우으…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "射精した俺自身がびっくりするほどの量。溜めきれなかった精液がごぽごぽとレティシアの秘所からあふれ出し、俺の身体に垂れ落ちていく。"
translation = "사정한 나 자신도 깜짝 놀랄 정도의 양. 다 담지 못한 정액이 고포고포 하며 레티시아의 비소에서 넘쳐흘러 내 몸 위로 떨어진다."

[[dialogue]]
speaker = "レティシア"
original = "「……普段はこんなに、出ないの？\u3000私が相手だから、たくさん、出たの……？」"
translation = "「……평소에는 이렇게 안 나와? 내가 상대라서 잔뜩 나온 거야……?」"

[[dialogue]]
speaker = "レティシア"
original = "「……不思議。そんなこと、あるのね……」"
translation = "「……신기해. 그런 일도 있구나……」"

[[dialogue]]
speaker = "クロト"
original = "「……レティシア、どうだった？」"
translation = "「……레티시아, 어땠어?」"

[[dialogue]]
speaker = "レティシア"
original = "「気持ち、良かった……。あなたとぴったり繋がって、あったかい精液、注がれるの……これ……」"
translation = "「기분 좋았어……. 당신과 딱 맞게 이어져서 따뜻한 정액이 쏟아지는 거…… 이거……」"

[[dialogue]]
speaker = "レティシア"
original = "「…………すごく、好き……<emoji=heart04>」"
translation = "「…………정말 좋아…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "倒れこむようにして抱き着いてきたレティシアと──"
translation = "쓰러지듯 매달려온 레티시아와──"

[[dialogue]]
speaker = "レティシア"
original = "「んぅちゅ……んれぇ、んちゅる……<emoji=heart04>」"
translation = "「으응 츄…… 응레, 응츄릅…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "初めて、キスをした。"
translation = "처음으로 키스를 했다."

[[dialogue]]
speaker = "レティシア"
original = "「……今さらだけど、順番があべこべね。先にキスからするべきだったかしら……？」"
translation = "「……이제 와서지만 순서가 거꾸로네. 먼저 키스부터 했어야 했을까……?」"

[[dialogue]]
speaker = "unk"
original = "急に冷静なことを言うレティシアが面白くて、俺は苦笑しながらキスを返す。"
translation = "갑자기 냉정한 말을 하는 레티시아가 재미있어 나는 쓴웃음을 지으며 키스를 돌려준다."

[[dialogue]]
speaker = "レティシア"
original = "「ん……ちゅ<emoji=heart04>\u3000んぅ、ちゅぱ……<emoji=heart04>」"
translation = "「음…… 츄 <emoji=heart04> 응윽, 츄파…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "デネブに住む平行世界人の彼女。"
translation = "데네브에 사는 평행세계인인 그녀."

[[dialogue]]
speaker = "unk"
original = "いずれ、離ればなれになるかもしれない相手──そう思うとなおさら、今この瞬間が愛おしくて。"
translation = "언젠가 떨어지게 될지도 모르는 상대── 그렇게 생각하니 더더욱 지금 이 순간이 사랑스러워서."

[[dialogue]]
speaker = "レティシア"
original = "「れぇ、んちゅる、んぅ……ちゅぱ……<emoji=heart04>\u3000好きよ……魔王……んちゅぅ……<emoji=heart04>」"
translation = "「레, 응츄릅, 응…… 츄파…… <emoji=heart04> 좋아해…… 마왕…… 응츄…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その夜はずっと、レティシアと共に過ごすのだった。"
translation = "그날 밤은 계속 레티시아와 함께 시간을 보내는 것이었다."

