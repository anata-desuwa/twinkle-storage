[[dialogue]]
speaker = "unk"
original = "第２話,れっつ忍者♪,P"
translation = "제2화, 렛츠 닌자♪, P"

[[dialogue]]
speaker = "シズル"
original = "「いやはや、大変な目に遭ってしまいましたね。都会というのは本当に何が起こるか分からないです」"
translation = "「이런이런, 큰일을 당해버렸네요. 도시라는 건 정말 무슨 일이 일어날지 알 수 없어요」"

[[dialogue]]
speaker = "せつな"
original = "「お願いですからあまり心配させないで欲しいでござるよ」"
translation = "「부탁이니 너무 걱정시키지 말아주었으면 하는 것이오」"

[[dialogue]]
speaker = "シズル"
original = "「ごめんなさい。でも、折角の社会勉強の機会ですから……」"
translation = "「죄송해요. 하지만 모처럼의 사회 공부 기회니까……」"

[[dialogue]]
speaker = "せつな"
original = "「社会勉強が必要なほど、師匠の人生経験は浅くないと思うのでござるが……？」"
translation = "「사회 공부가 필요할 정도로 스승님의 인생 경험이 얕지는 않다고 생각하오만……?」"

[[dialogue]]
speaker = "シズル"
original = "「そんなことないです。私なんてまだまだ世間知らずの若輩者です」"
translation = "「그렇지 않아요. 저 같은 건 아직 세상 물정 모르는 풋내기예요」"

[[dialogue]]
speaker = "せつな"
original = "「と・に・か・く、外に出る時は必ず供の者を連れるでござる！\u3000わかったでござるか？」"
translation = "「어·쨌·든, 밖에 나갈 때는 반드시 동행인을 데리고 가는 것이오! 알겠소?」"

[[dialogue]]
speaker = "シズル"
original = "「そうですね。では、そのような時には魔王さんに案内をお願いしてもいいですか？」"
translation = "「그렇네요. 그럼 그럴 때는 마왕님께 안내를 부탁드려도 될까요?」"

[[dialogue]]
speaker = "unk"
original = "それは構いませんけど……"
translation = "그건 상관없습니다만……"

[[dialogue]]
speaker = "unk"
original = "えっ、俺ですか？"
translation = "엣, 저 말인가요?"

[[dialogue]]
speaker = "シズル"
original = "「あはっ、やったぁ、ありがとうございます♪」"
translation = "「아핫, 만세, 감사합니다♪」"

[[dialogue]]
speaker = "せつな"
original = "「どうして主様でござる？\u3000せつなでもいいではありませぬか！」"
translation = "「어째서 주인님이오? 세츠나라도 되지 않소!」"

[[dialogue]]
speaker = "シズル"
original = "「せつなより地理に詳しそうですし心強いですから」"
translation = "「세츠나보다 지리에 밝을 것 같고 든든하니까요」"

[[dialogue]]
speaker = "シズル"
original = "「というわけで魔王さん、いっぱい楽しいところに連れて行ってください♪」"
translation = "「그런 고로 마왕님, 즐거운 곳에 많이 데려다주세요♪」"

[[dialogue]]
speaker = "unk"
original = "任せて！"
translation = "맡겨줘!"

[[dialogue]]
speaker = "せつな"
original = "「待つでござる。今日はもう出かけないでお屋敷に居るでござる。この後、師匠の歓迎の宴を開くでござるから」"
translation = "「기다리시오. 오늘은 이제 나가지 말고 저택에 있는 것이오. 이따가 스승님의 환영 연회를 열 것이니 말이오」"

[[dialogue]]
speaker = "シズル"
original = "「えっ、そうなのですか？」"
translation = "「엣, 그런가요?」"

[[dialogue]]
speaker = "シズル"
original = "「急におしかけたというのに、そんな宴まで開いていただいて……」"
translation = "「갑자기 찾아왔는데도 그런 연회까지 열어주시다니……」"

[[dialogue]]
speaker = "シズル"
original = "「ヘレナさんにご迷惑をおかけするわけにはいきませんね、大人しくいい子にして待っています」"
translation = "「헬레나 씨에게 폐를 끼칠 수는 없겠네요, 얌전히 착한 아이로 기다리고 있을게요」"

[[dialogue]]
speaker = "せつな"
original = "「そうしてくだされ……主様、念のために師匠から目を離さないでいてもらえまするか？」"
translation = "「그렇게 하시오…… 주인님, 만약을 위해 스승님에게서 눈을 떼지 말고 있어 주겠소?」"

[[dialogue]]
speaker = "シズル"
original = "「もう、せつなったら、いつからそんな心配性になっちゃったんですか？」"
translation = "「정말, 세츠나도 참, 언제부터 그렇게 걱정이 많아진 거예요?」"

[[dialogue]]
speaker = "unk"
original = "確かに普通なら何も心配するところではないが、相手はシズルさんである。"
translation = "분명 보통이라면 아무 걱정할 게 없겠지만, 상대는 시즈루 씨다."

[[dialogue]]
speaker = "unk"
original = "話を聞いていると、目を離した隙に煙のように姿を消してしまった、なんてことがあっても不思議ではない。"
translation = "이야기를 듣고 있으면, 눈을 뗀 사이에 연기처럼 사라져 버렸다 해도 이상할 게 없다."

[[dialogue]]
speaker = "unk"
original = "俺は決して油断しないように、用意が出来るまでの間、シズルさんを見張ることにしたのだった。"
translation = "나는 결코 방심하지 않도록, 준비가 될 때까지 시즈루 씨를 지켜보기로 했다."

[[dialogue]]
speaker = "ヘレナ"
original = "「よくぞ参られたシズル殿。今日は目いっぱい楽しんでいって欲しい」"
translation = "「잘 왔네, 시즈루 공. 오늘은 마음껏 즐기다 가길 바라네」"

[[dialogue]]
speaker = "シズル"
original = "「ありがとうございます、九浄の当主様」"
translation = "「감사합니다, 구죠의 당주님」"

[[dialogue]]
speaker = "ヘレナ"
original = "「そう畏まるな。そうだな……私のことは今後、ヘレナちゃんと呼ぶがいい」"
translation = "「그렇게 격식을 차리지 말게. 그렇지…… 나를 앞으로는 헬레나 쨩이라고 부르게나」"

[[dialogue]]
speaker = "シズル"
original = "「紫桜の里の者にとって、当主様は大恩あるお方ですから……さすがにそのような呼び方は出来ません」"
translation = "「자앵의 마을 사람들에게 당주님은 큰 은혜가 있는 분이라서…… 역시 그런 식으로 부를 수는 없어요」"

[[dialogue]]
speaker = "シズル"
original = "「ではヘレナさん、とお呼びしますね」"
translation = "「그럼 헬레나 씨, 라고 부를게요」"

[[dialogue]]
speaker = "ヘレナ"
original = "「うむ、よい！\u3000その愛らしい笑顔で呼ばれると、幼い子供に甘えられているような気になるな！\u3000実に創作意欲をかき立てる！」"
translation = "「음, 좋군! 그 사랑스러운 미소로 불리니, 어린아이에게 응석받이가 된 기분이 드는군! 실로 창작 의욕을 자극하는구나!」"

[[dialogue]]
speaker = "蘭美"
original = "「当主様、食事の席ですので……暴走はお控えください」"
translation = "「당주님, 식사 자리이니…… 폭주는 삼가 주십시오」"

[[dialogue]]
speaker = "ヘレナ"
original = "「おっと、これは失礼した」"
translation = "「오호, 이거 실례했군」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ああ、そうだ。折角だから我がメイド隊を紹介しておくとしようか……まずはこちらがメイド長を務める蘭美だ」"
translation = "「아아, 그렇지. 모처럼이니 나의 메이드대를 소개해 두도록 할까…… 우선 이쪽이 메이드장을 맡고 있는 라비다」"

[[dialogue]]
speaker = "蘭美"
original = "「羽宮蘭美です。どうぞお見知り置きください」"
translation = "「하네야 라비입니다. 부디 잘 부탁드립니다」"

[[dialogue]]
speaker = "シズル"
original = "「はい、よろしくお願いします」"
translation = "「네, 잘 부탁드려요」"

[[dialogue]]
speaker = "ヘレナ"
original = "「それから閃、美鶴……ヨミヨミの紹介は必要ないな」"
translation = "「그리고 센, 미츠루…… 요미요미의 소개는 필요 없겠지」"

[[dialogue]]
speaker = "ヨミ"
original = "「ご無沙汰しております。紫桜の里ではお世話になりました」"
translation = "「오랜만입니다. 자앵의 마을에서는 신세 많이 졌습니다」"

[[dialogue]]
speaker = "シズル"
original = "「こちらこそお世話になりました。お変わりなくお元気そうで何よりです」"
translation = "「저야말로 신세 많이 졌어요. 변함없이 건강해 보이셔서 다행이에요」"

[[dialogue]]
speaker = "シズル"
original = "「そうですか……この方々がせつなの同僚、日頃よりお世話になっている方々というわけですね？」"
translation = "「그렇군요…… 이분들이 세츠나의 동료, 평소에 신세를 지고 있는 분들이라는 거군요?」"

[[dialogue]]
speaker = "せつな"
original = "「九浄家メイド隊、せつなの頼もしい仲間でござるよ！」"
translation = "「구죠 가 메이드대, 세츠나의 든든한 동료들이오!」"

[[dialogue]]
speaker = "蘭美"
original = "「こちらこそ、せつなにはいつも助けられているわ」"
translation = "「우리야말로 세츠나에게 항상 도움받고 있어」"

[[dialogue]]
speaker = "蘭美"
original = "「師匠の教えがいいのね。頑張り屋で明るくいい子で……今やメイド隊には欠かせない存在よ」"
translation = "「스승님의 가르침이 좋은 거겠지. 노력파에 밝고 착한 아이라…… 이제 메이드대에는 없어서는 안 될 존재야」"

[[dialogue]]
speaker = "シズル"
original = "「ありがとうございます、自分のことのように嬉しいです」"
translation = "「감사합니다, 제 일처럼 기쁘네요」"

[[dialogue]]
speaker = "せつな"
original = "「そ、そんなに持ち上げられると恥ずかしいでござるよ！」"
translation = "「그, 그렇게 칭찬받으면 부끄러운 것이오!」"

[[dialogue]]
speaker = "シズル"
original = "「こんな素晴らしい縁に恵まれたなら何も憂うことはありませんね。せつなのこと、今後ともよろしくお願いします」"
translation = "「이런 멋진 인연을 만났다면 아무 걱정할 게 없겠네요. 세츠나를 앞으로도 잘 부탁드립니다」"

[[dialogue]]
speaker = "蘭美"
original = "「ええ、この私に任せておきなさい♪」"
translation = "「네, 이 나에게 맡겨두렴♪」"

[[dialogue]]
speaker = "ヘレナ"
original = "「こう見えて蘭美は、世界最高のメイドを決める大会『メイド・オブ・メイド』で２位の成績を収めているからな」"
translation = "「이래 뵈도 라비는 세계 최고의 메이드를 결정하는 대회 『메이드 오브 메이드』에서 2위 성적을 거두었으니까」"

[[dialogue]]
speaker = "ヘレナ"
original = "「蘭美に任せておけば間違いない、と言い切れる程には優秀だぞ」"
translation = "「라비에게 맡겨두면 틀림없다, 고 단언할 수 있을 정도로 우수하다네」"

[[dialogue]]
speaker = "蘭美"
original = "「そういうことね！\u3000──ところで当主様の口にした『こう見えて』だけど、それは私が少しばかり幼く見えるということを暗に指しているの」"
translation = "「그런 거구나! ──그건 그렇고 당주님이 말씀하신 『이렇게 보여도』 말인데, 그건 내가 조금 어려 보인다는 걸 암시하고 있는 거야」"

[[dialogue]]
speaker = "蘭美"
original = "「けれど実のところ、私はそんなにちっちゃくないのよ。だからせつなのことは安心して任せてくれていいわ！」"
translation = "「하지만 사실은, 나 그렇게 조그맣지 않거든. 그러니까 세츠나의 일은 안심하고 맡겨줘도 돼!」"

[[dialogue]]
speaker = "シズル"
original = "「…………ええと……」"
translation = "「…………어라……」"

[[dialogue]]
speaker = "シズル"
original = "「蘭美さんは、小さくないのでは？」"
translation = "「라비 씨는, 작지 않은 거 아닌가요?」"

[[dialogue]]
speaker = "蘭美"
original = "「は……！？」"
translation = "「하……!?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ほう……」"
translation = "「호오……」"

[[dialogue]]
speaker = "シズル"
original = "「体とか私の方が全然小さいですし、少しお話ししただけでもとってもしっかりした方だと分かりますし」"
translation = "「몸이라든가 제가 훨씬 더 작고, 조금 이야기해본 것만으로도 무척 야무진 분이라는 걸 알 수 있는걸요」"

[[dialogue]]
speaker = "シズル"
original = "「むしろお姉ちゃんみたいで、甘えたくなっちゃいます♪」"
translation = "「오히려 언니 같아서, 어리광부리고 싶어져요♪」"

[[dialogue]]
speaker = "蘭美"
original = "「はうっ！！？」"
translation = "「하우우!!?」"

[[dialogue]]
speaker = "せつな"
original = "「ああっ、蘭美殿の撃ち抜かれる音が聞こえたでござる！」"
translation = "「아앗, 라비 공의 심장이 꿰뚫리는 소리가 들린 것이오!」"

[[dialogue]]
speaker = "蘭美"
original = "「あ、慌てないでせつな……私は大丈夫よ……」"
translation = "「어, 당황하지 마 세츠나…… 난 괜찮아……」"

[[dialogue]]
speaker = "蘭美"
original = "「そう……私がお姉ちゃん……。いいわ、貴方がそう思うなら……いつでも甘えていいのよ……ふふ……」"
translation = "「그래…… 내가 언니……. 좋아, 네가 그렇게 생각한다면…… 언제든 어리광부려도 좋아…… 후후……」"

[[dialogue]]
speaker = "シズル"
original = "「えへへ、ありがとうございます♪」"
translation = "「에헤헤, 감사합니다♪」"

[[dialogue]]
speaker = "蘭美"
original = "「あら、飲み物がもうなくなりそうね？\u3000他にも何か食べたいものがあったら言って頂戴。最速で持ってきてあげるから」"
translation = "「어머, 음료가 벌써 다 떨어져 가네? 그 외에도 뭔가 먹고 싶은 게 있으면 말하렴. 제일 빨리 가져다줄 테니까」"

[[dialogue]]
speaker = "ヨミ"
original = "「メイド長がシズルさんにデレデレです……」"
translation = "「메이드장이 시즈루 씨에게 데레데레해요……」"

[[dialogue]]
speaker = "せつな"
original = "「師匠は天然でああいうことをするでござる……本当に恐ろしい人でござる……」"
translation = "「스승님은 천연으로 저런 짓을 하는 것이오…… 정말로 무서운 사람인 것이오……」"

[[dialogue]]
speaker = "unk"
original = "その後もシズルさんを歓迎する宴は、にぎやかに続いていった。"
translation = "그 후로도 시즈루 씨를 환영하는 연회는 시끌벅적하게 이어졌다."

[[dialogue]]
speaker = "unk"
original = "恐ろしい事にシズルさんは、蘭美以外のメイド隊のメンバーも次々と虜にしていき……"
translation = "무서운 사실은 시즈루 씨가 라비 이외의 메이드대 멤버들도 차례차례 포로로 만들어가더니……"

[[dialogue]]
speaker = "unk"
original = "いつの間にか、みんなの妹ちゃんポジションへと収まってしまっていたのだった。"
translation = "어느샌가 모두의 여동생 포지션으로 안착해버리고 만 것이었다."

