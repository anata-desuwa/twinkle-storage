[[dialogue]]
speaker = "unk"
original = "それからも、バトルフェスタ・ペンタグラムは引き続き行われた。"
translation = "그 후로도 배틀 페스타 펜타그램은 계속해서 이어졌다."

[[dialogue]]
speaker = "unk"
original = "両学園と附属校、守護天使や魔女と様々な星騎士たちが参加し、シャドウとの名勝負はアリーナでも中継され、大いに盛り上がった。"
translation = "양 학원과 부속 학교, 수호천사와 마녀 등 다양한 성기사들이 참가했고, 섀도우와의 명승부는 아레나에서도 중계되어 크게 달아올랐다."

[[dialogue]]
speaker = "unk"
original = "そして――"
translation = "그리고――"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「みんな～！\u3000グラスは持った～？」"
translation = "「모두~! 잔 들었어~?」"

[[dialogue]]
speaker = "unk"
original = "飲み物は配り終えたぞ！"
translation = "음료는 다 나눠줬어!"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「よ～し、じゃあフィオナ、お願い！」"
translation = "「좋~아, 그럼 피오나, 부탁해!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はい。それでは――」"
translation = "「네. 그러면――」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「みなさん、本日はお疲れ様でした！\u3000そして、両学園の創立記念日を祝しまして！」"
translation = "「여러분, 오늘 정말 수고 많으셨습니다! 그리고 양 학원의 창립기념일을 축하하며!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「カンパーイ！！」"
translation = "「건배!!」"

[[dialogue]]
speaker = "unk"
original = "バトルフェスタ終了の打ち上げもとい──（本当は）本日のメインイベントである『両学園創立記念パーティー』がスタートしたのだった。"
translation = "배틀 페스타 종료 뒤풀이 겸――(사실은) 오늘의 메인 이벤트인 『양 학원 창립기념 파티』가 시작되었다."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「妃竜院マハムート！」"
translation = "「키류인 마하무트!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あなたの方から話しかけて来るとはね、プリムラ。何か用かしら？」"
translation = "「네 쪽에서 말을 걸어오다니, 프리뮬라. 무슨 용건일까?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「我は貴様に、宣戦布告に来たのじゃ！」"
translation = "「짐은 네놈에게 선전포고를 하러 왔느니라!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「へぇ、この竜たる私に、恐れ知らずなことをするじゃない」"
translation = "「헤에, 이 용인 나에게 겁도 없이 덤벼들다니.」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「今日のバトル……貴様がいなければ、正直勝てなかったのじゃ」"
translation = "「오늘 배틀…… 네놈이 없었다면 솔직히 이길 수 없었느니라.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「……それで？」"
translation = "「……그래서?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「だからこそ、サチの幸運を突破してみせたマム！\u3000我は貴様に、いずれ勝ってみせるのじゃ！」"
translation = "「그렇기에 사치의 행운을 돌파해 보인 마무! 짐은 네놈에게 머지않아 이겨 보이겠느니라!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「なるほど。……ふっ、そんな不遜なことを言うのは、あなたで２人目ね」"
translation = "「과연. ……훗, 그런 불손한 소리를 하는 건 네가 두 번째네.」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「２人目？」"
translation = "「두 번째?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「１人目はどこぞの生意気なドリルロールよ。まぁ、本気だと言うなら、せいぜい頑張ってみせなさい」"
translation = "「첫 번째는 어느 건방진 드릴 롤이야. 뭐, 진심이라 한다면 어디 한번 열심히 해보렴.」"

[[dialogue]]
speaker = "unk"
original = "――プリムラの宣言を受けた後、マハムートはその１人目に会いに行っていた。"
translation = "――프리뮬라의 선언을 들은 후, 마하무트는 그 첫 번째 인물을 만나러 갔다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ヒルディオーネ。私のシャドウ、倒してみせたそうじゃない」"
translation = "「힐디오네. 내 섀도우를 쓰러뜨렸다며.」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「マム……！」"
translation = "「마무……!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「――ええ。次の星霊祭では本物のあなたに勝たなくてはなりませんもの」"
translation = "「――네. 다음 성령제에서는 진짜 당신에게 이겨야만 하니까요.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「そう。なら期待できそうね。けれど――」"
translation = "「그래. 그럼 기대해 볼 만하겠네. 하지만――」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ええ、わかっていますわ。あなたがその時まで、同じ強さでいるはずがない。あなたに勝つ為に、私ももっと強くなってみせますわ」"
translation = "「네, 알고 있어요. 당신이 그때까지 똑같은 강함으로 머물러 있을 리 없죠. 당신에게 이기기 위해 저도 더 강해져 보이겠어요.」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「あなたのライバルとして、必ず」"
translation = "「당신의 라이벌로서, 반드시요.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「そう。なら、その時を楽しみにしているわ」"
translation = "「그래. 그럼 그때를 기대하고 있을게.」"

[[dialogue]]
speaker = "unk"
original = "ライバルの力強い視線を受けて、マムは不敵な笑みで応えるのだった――"
translation = "라이벌의 힘찬 시선을 받으며 마무는 불패의 미소로 화답하는 것이었다――"

[[dialogue]]
speaker = "unk"
original = "一方、その頃。"
translation = "한편, 그 무렵."

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「会長さん、ちょっとお時間よろしいでしょうか？」"
translation = "「회장님, 잠시 시간 괜찮으신가요?」"

[[dialogue]]
speaker = "unk"
original = "フニ、お疲れ様。どうしたんだ？"
translation = "후니, 수고했어. 무슨 일이야?"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「あの、実は会長さんにお伝えしたいことがあって……」"
translation = "「저기, 사실 회장님께 전하고 싶은 말이 있어서……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「今度の星霊祭……私、会長さんと戦ってみたいです！」"
translation = "「이번 성령제…… 저, 회장님과 싸워보고 싶어요!」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「マムとヒルディーお姉様みたいに……ライバルとして！」"
translation = "「마무와 힐디 언니분처럼…… 라이벌로서요!」"

[[dialogue]]
speaker = "unk"
original = "俺はそんな風に、フェニエルから宣言されるのだった――"
translation = "나는 그런 식으로 페니엘에게 선언받는 것이었다――"

[[dialogue]]
speaker_original = "女生徒Ａ"
speaker_translation = "여학생 A"
original = "「リーリアちゃん！\u3000マリオンさんのシャドウと戦うところ、中継見てたよ！\u3000めっちゃカッコよくて、感動しちゃった～！」"
translation = "「리리아 짱! 마리온 씨의 섀도우랑 싸우는 거 중계로 봤어! 진짜 멋있어서 감동했어~!」"

[[dialogue]]
speaker_original = "女生徒Ｂ"
speaker_translation = "여학생 B"
original = "「私もリーリアちゃんのシャドウと戦ったんだけど、魔弾の早撃ち凄すぎて、ビックリしちゃった！」"
translation = "「나도 리리아 짱 섀도우랑 싸웠는데 마탄 속사가 너무 빨라서 깜짝 놀랐어!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「みんな、ありがと～♪\u3000褒めてくれて、マジカル嬉しい～☆」"
translation = "「모두 고마워~♪ 칭찬해 줘서 매지컬 기뻐~☆」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「リーリアちゃん、よかったね♪\u3000みんな、ちゃんと見てくれてて！」"
translation = "「리리아 짱, 잘됐다♪ 모두 제대로 봐주고 있어서!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「今日のリーリアさんは、爆裂本気で頑張ってましたから♪\u3000私も星騎士として、もっと強くなりたいって思いました！」"
translation = "「오늘의 리리아 씨는 폭렬 진심으로 노력했으니까요♪ 저도 성기사로서 더 강해지고 싶다고 생각했어요!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「早撃ちも驚いたけど、何より融合魔弾！\u3000あれは心躍るカッコよさで痺れたな～！」"
translation = "「속사도 놀랐지만 무엇보다 융합 마탄! 그건 마음을 설레게 하는 멋짐이라 전율했는걸!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ふふっ、そうでしょ～？\u3000やっぱり可愛い私が学園にいるのはウィンウィンですよね～♪」"
translation = "「후훗, 그렇지? 역시 귀여운 내가 학원에 있는 건 윈윈이라니까요~♪」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「あまり調子に乗らせ過ぎてもよくないですが……まあ、今日くらいはノープロブレムでしょう」"
translation = "「너무 우쭐하게 만드는 것도 좋지 않지만…… 뭐, 오늘 정도는 노 프로블럼이겠죠.」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「リーリアちゃん、本当に嬉しそうだしね♪」"
translation = "「리리아 짱, 정말 기뻐 보이고 말이야♪」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「えへへへっ♪」"
translation = "「에헤헤헤헷♪」"

[[dialogue]]
speaker = "unk"
original = "カフェテリアの各所で一緒に戦った星騎士たちが和気あいあいと話す中、フィオナは会場を歩いていた。"
translation = "카페테리아 곳곳에서 함께 싸운 성기사들이 화기애애하게 대화하는 가운데 피오나는 회장을 걷고 있었다."

[[dialogue]]
speaker = "unk"
original = "そして、１人の星騎士に声をかける。"
translation = "그리고 한 명의 성기사에게 말을 건다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ヴィーナスさん」"
translation = "「비너스 씨.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「フィオナ！\u3000パーティーは楽しんでる？」"
translation = "「피오나! 파티는 즐기고 있어?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はい。会場をひと回りして、みなさんに挨拶してきました」"
translation = "「네. 회장을 한 바퀴 돌며 여러분께 인사드리고 왔어요.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「それで改めて、ヴィーナスさんにお礼が言いたくて」"
translation = "「그래서 다시 한번 비너스 씨께 감사를 드리고 싶어서요.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「お礼？\u3000もしかして、最後にバトルした時の話？」"
translation = "「감사? 혹시 마지막에 배틀했을 때 이야기?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はい。今日はありがとうございました」"
translation = "「네. 오늘 정말 감사했습니다.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「フィオナがお礼を言うなら、私も言わなくちゃいけないわね！」"
translation = "「피오나가 고맙다고 한다면 나도 말해야겠네!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「今日はフィオナと全力で戦えて嬉しかったわ！\u3000すごく楽しかった！\u3000ありがとう♪」"
translation = "「오늘 피오나와 전력으로 싸울 수 있어서 기뻤어! 정말 즐거웠어! 고마워♪」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あの……実は、ヴィーナスさんにご相談があるのですが……」"
translation = "「저기…… 사실 비너스 씨께 상의드릴 게 있는데요……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「相談？」"
translation = "「상담?」"

[[dialogue]]
speaker = "unk"
original = "フィオナは頷いてから、ちょっと恥ずかしそうな顔で――"
translation = "피오나는 고개를 끄덕인 뒤 조금 부끄러운 얼굴로――"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「その……よければなんですが、<ruby>模擬戦<rt>バトル</rt></ruby>だけじゃなくて、今度から訓練も一緒にやりませんか？」"
translation = "「그…… 괜찮으시다면 모의전뿐만 아니라 이제부터 훈련도 같이 하지 않으실래요?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「私、これを機にヴィーナスさんと、もっと切磋琢磨できたらと思っていて……」"
translation = "「저, 이번 기회에 비너스 씨와 좀 더 절차탁마할 수 있었으면 해서……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「えっ、いいの！？\u3000もちろん大歓迎よ！」"
translation = "「엣, 좋아!? 물론 대환영이야!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「フィオナと沢山戦ったら、リクリエなんて目じゃないくらい、絶対に強くなれるわ！」"
translation = "「피오나와 잔뜩 싸우면 리크리에 따위는 상대도 안 될 만큼 무조건 강해질 거야!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「バトルももちろんなんですが、普段のトレーニングはどういうことをやってるのかとか、そういうことも……」"
translation = "「배틀도 물론입니다만 평소 트레이닝은 어떤 식으로 하는지 그런 것도……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「？\u3000バトルを沢山するわ！！！」"
translation = "「? 배틀을 잔뜩 할 거야!!!」"

[[dialogue]]
speaker = "unk"
original = "一生実戦形式の模擬戦をするだけなんだ……"
translation = "평생 실전 형식의 모의전만 하는 거구나……"

[[dialogue]]
speaker = "unk"
original = "フィオナ……ヴィーナスの訓練はその……"
translation = "피오나…… 비너스의 훈련은 그게……"

[[dialogue]]
speaker = "unk"
original = "俺の補足にフィオナは一瞬顔面蒼白になったような気がしたが──"
translation = "나의 보충 설명에 피오나는 순간 얼굴이 창백해진 것 같았지만──"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「やりましょう、やってみせます！\u3000何百回かヴィーナスさんと戦えば、私もまだまだ強くなれるはずです！」"
translation = "「하겠습니다, 해 보이고 말겠어요! 몇백 번이라도 비너스 씨와 싸우면 저도 아직 더 강해질 수 있을 거예요!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「いいわね、フィオナ！\u3000そういう熱いヤツ、私も大好きだわ！」"
translation = "「좋네, 피오나! 그런 뜨거운 거 나도 정말 좋아해!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ありがとうございます！！\u3000それじゃあ――」"
translation = "「감사합니다!! 그럼――」"

[[dialogue]]
speaker = "unk"
original = "フィオナは握手を求めて、手を差し出しながら言う。"
translation = "피오나는 악수를 청하며 손을 내밀며 말한다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「これからまた、よろしくお願いします。ヴィーナスさん」"
translation = "「앞으로 다시 잘 부탁드립니다. 비너스 씨.」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは嬉しそうな笑顔で、両手でフィオナの手を取り――"
translation = "비너스는 기쁜 듯한 미소로 두 손으로 피오나의 손을 맞잡으며――"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ええ！\u3000私たち、これからもっと仲良くなりましょう♪」"
translation = "「네! 우리 이제부터 좀 더 친하게 지내요♪」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はい。よろしくお願いします」"
translation = "「네. 잘 부탁드립니다.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あとは私、フィオナと２人でどこか遊びに行きたいわ！」"
translation = "「그리고 난 피오나랑 둘이서 어딘가 놀러 가고 싶어!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「他にもお泊り会とか！\u3000私たち、そういうのしたことなかったでしょ？」"
translation = "「그 외에도 파자마 파티라든가! 우리 그런 거 해본 적 없잖아?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「し、知り合ってから結構経つので、改めてそういうことをしようとすると、なんだかちょっと気恥ずかしいですね……」"
translation = "「아, 알고 지낸 지 꽤 됐는데, 새삼스레 그런 걸 하려고 하니 왠지 조금 쑥스럽네요……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そうかしら？\u3000私はすごく楽しみよ♪」"
translation = "「그럴까? 난 정말 기대돼♪」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……ふふっ」"
translation = "「……후훗.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「やっぱり、ヴィーナスさんには敵いませんね」"
translation = "「역시 비너스 씨에겐 당할 수가 없네요.」"

[[dialogue]]
speaker = "unk"
original = "こうして、２人は前よりも仲良く、これからの予定について話し合い、盛り上がるのだった――"
translation = "이렇게 두 사람은 전보다 더 사이좋게 앞으로의 예정에 대해 이야기하며 분위기를 띄우는 것이었다──"

