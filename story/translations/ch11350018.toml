[[dialogue]]
speaker = "ルネア"
original = "「あっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000すごい<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁんっ<emoji=heart04>\u3000ふあぁあっ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 하앙읏<emoji=heart04> 응우읏<emoji=heart04> 대단해<emoji=heart04> 앗<emoji=heart04> 하아앙읏<emoji=heart04> 후아아앗<emoji=heart04> 기분 좋아<emoji=heart04> 응우읏<emoji=heart04> 하아앗<emoji=heart04> 후아아앙읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ルネア"
original = "「あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はぁんっ<emoji=heart04><emoji=heart04>\u3000ダメぇっ<emoji=heart04>\u3000おま○こ、気持ちいいの登って来ちゃってるのぉ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「앙읏<emoji=heart04> 앙읏<emoji=heart04> 하앙읏<emoji=heart04><emoji=heart04> 안 돼<emoji=heart04> 보지, 기분 좋은 게 올라오고 있어～～읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ルネア"
original = "「んああぁ～っ<emoji=heart04><emoji=heart04>\u3000シンのおち○ちん、また膨らんできたぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000シンにダメ押しの種付けされちゃうっ<emoji=heart04><emoji=heart04>」"
translation = "「응아아아～앗<emoji=heart04><emoji=heart04> 신의 자지, 또 부풀어 올랐어<emoji=heart04> 앙읏<emoji=heart04> 앙읏<emoji=heart04> 신에게 결정타인 씨앗 뿌리기를 당해버려<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ルネア"
