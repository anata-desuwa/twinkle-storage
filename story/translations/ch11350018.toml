[[dialogue]]
speaker = "unk"
original = "僕は彼女の子宮にペニスをぴったりと押し付けて、大量の精を注ぎ込む。"
translation = "나는 그녀의 자궁에 페니스를 꼭 밀착시키고, 대량의 정액을 쏟아붓는다."

[[dialogue]]
speaker = "ルネア"
original = "「あっ<emoji=heart04><emoji=heart04>\u3000はあああぁ～～～っ<emoji=heart04>\u3000卵子にいっぱい種付けされちゃってるぅっ<emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふああぁ～っ……<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04><emoji=heart04> 하아아아아～～～앗<emoji=heart04> 난자에 잔뜩 씨앗 뿌리기를 당하고 있어<emoji=heart04> 응응읏<emoji=heart04> 하아앗<emoji=heart04> 후아아아～앗……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ルネア"
original = "「ふあぁっ<emoji=heart04>\u3000はあぁっ……<emoji=heart04>\u3000本当に受精して、シンとの赤ちゃんできちゃうぅ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000はあぁ～っ……<emoji=heart04>」"
translation = "「후아앗<emoji=heart04> 하아앗……<emoji=heart04> 정말로 수정해서, 신과의 아기 생겨버려<emoji=heart04> 응우읏<emoji=heart04> 후우읏<emoji=heart04> 하아앗～……<emoji=heart04>」"

[[dialogue]]
speaker = "ルネア"
original = "「子宮の中すごく温かくて、キュンキュンしててぇ……<emoji=heart04>\u3000あああっ、卵子が精子に包まれるの、幸せ感じちゃってるぅ……<emoji=heart04>」"
translation = "「자궁 속이 엄청 따뜻하고, 큥큥거리고 있어……<emoji=heart04> 아아앗, 난자가 정자에 둘러싸이는 거, 행복을 느끼고 있어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そうして、射精が止まり、しばしの余韻を味わった後……僕はゆっくりとペニスを引き抜く。"
translation = "그렇게, 사정이 멈추고 잠시 여운을 맛본 후…… 나는 천천히 페니스를 빼낸다."

[[dialogue]]
speaker = "ルネア"
original = "「あっ……はぁんっ<emoji=heart04>」"
translation = "「앗……하앙읏<emoji=heart04>」"

[[dialogue]]
speaker = "ルネア"
original = "「んっ……<emoji=heart04>\u3000はあぁぁっ<emoji=heart04>\u3000すっごぉい……<emoji=heart04>\u3000シンの精液、中に入りきらなくて、溢れてきちゃったぁ……<emoji=heart04>」"
translation = "「응읏……<emoji=heart04> 하아아앗<emoji=heart04> 굉장해……<emoji=heart04> 신의 정액, 안에 다 들어가지 못하고, 넘쳐흐르고 있어……<emoji=heart04>」"

[[dialogue]]
speaker = "ルネア"
original = "「こんなにいっぱい出されちゃってたのね……<emoji=heart04>\u3000んふぅ<emoji=heart04>」"
translation = "「이렇게나 잔뜩 싸버렸구나……<emoji=heart04> 응후<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "お腹を擦りながら、幸せそうな顔でそんなことを言うルネア。"
translation = "배를 문지르며, 행복한 얼굴로 그런 말을 하는 루네아."

[[dialogue]]
speaker = "unk"
original = "それを見ていると――僕も正直な『欲』が湧いてきてしまう。"
translation = "그것을 보고 있자니―― 나도 솔직한 『욕망』이 솟아나고 만다."

[[dialogue]]
speaker = "シン"
original = "「……あのさ、ルネア」"
translation = "「……저기, 루네아」"

[[dialogue]]
speaker = "ルネア"
original = "「うん？\u3000どうしたの、シン？」"
translation = "「응? 왜 그래, 신?」"

[[dialogue]]
speaker = "シン"
original = "「もしも……もしもの話なんだけど……」"
translation = "「만약…… 만약의 이야기인데……」"

[[dialogue]]
speaker = "シン"
original = "「本当に今日……妊娠しちゃってたりしたら、ルネアは産んでくれる……？」"
translation = "「정말로 오늘…… 임신해 버렸다면, 루네아는 낳아줄 거야……?」"

[[dialogue]]
speaker = "unk"
original = "ドキドキしながら口にして、そっと視線を上げると――"
translation = "두근거리며 입을 열고, 살짝 시선을 올리자――"

[[dialogue]]
speaker = "ルネア"
original = "「――もちろん<emoji=heart04>」"
translation = "「――물론이지<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "彼女はまさに女神のような、慈愛に満ちた微笑みを浮かべていて。"
translation = "그녀는 그야말로 여신과 같은, 자애로운 미소를 짓고 있었다."

[[dialogue]]
speaker = "ルネア"
original = "「大好きなシンの赤ちゃんだもの。本当にできちゃった時は、喜んで産むわ<emoji=heart04>」"
translation = "「가장 좋아하는 신의 아기인걸. 정말로 생겨버렸을 때는, 기꺼이 낳을 거야<emoji=heart04>」"

[[dialogue]]
speaker = "シン"
original = "「……こういうのは、学園を卒業してからだと思ってたけど――」"
translation = "「……이런 건, 학원을 졸업하고 나서라고 생각했지만――」"

[[dialogue]]
speaker = "unk"
original = "僕だって男だ――だから、覚悟を決めて、告げる。"
translation = "나도 남자다―― 그러니, 각오를 다지고, 고한다."

[[dialogue]]
speaker = "シン"
original = "「ルネア、僕と結婚してくれますか？」"
translation = "「루네아, 나와 결혼해 주겠습니까?」"

[[dialogue]]
speaker = "ルネア"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "シン"
original = "「僕もルネアに、子供を産んでほしい。一生一緒にいたい」"
translation = "「나도 루네아에게, 아이를 낳아줬으면 좋겠어. 평생 함께하고 싶어」"

[[dialogue]]
speaker = "ルネア"
original = "「結婚！？\u3000ほ、本当にいいの……？」"
translation = "「결혼!? 혀, 정말로 괜찮은 거야……?」"

[[dialogue]]
speaker = "シン"
original = "「うん。ルネアのこと、心から愛してるから」"
translation = "「응. 루네아를, 진심으로 사랑하니까」"

[[dialogue]]
speaker = "シン"
original = "「だから――これから家族が増えるんだし、沢山稼げるようにならなくちゃね！」"
translation = "「그러니까―― 이제부터 가족이 늘어날 테니, 잔뜩 벌 수 있게 되어야지!」"

[[dialogue]]
speaker = "ルネア"
original = "「～～～っ<emoji=heart04>\u3000シンっ！\u3000嬉しいっ<emoji=heart04>」"
translation = "「～～～앗<emoji=heart04> 신! 기뻐<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ルネアはそのまま僕に抱き着いて、キスをして来る。"
translation = "루네아는 그대로 나에게 안겨, 키스를 해 온다."

[[dialogue]]
speaker = "ルネア"
original = "「んっ……ちゅっ<emoji=heart04>」"
translation = "「응읏…… 츄읏<emoji=heart04>」"

[[dialogue]]
speaker = "ルネア"
original = "「――宇宙一大好きよ、シン<emoji=heart04>\u3000愛しているわ<emoji=heart04>」"
translation = "「――우주에서 제일 좋아해, 신<emoji=heart04> 사랑하고 있어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "僕の女神様はそう言って、心から幸せそうな笑顔を浮かべてくれるのだった――"
translation = "나의 여신님은 그렇게 말하며, 진심으로 행복한 미소를 지어주는 것이었다――"

