translation = "「앗<emoji=heart04> 앗<emoji=heart04> 하앙읏<emoji=heart04><emoji=heart04> 안 돼 안 돼<emoji=heart04> 나도 와<emoji=heart04><emoji=heart04> 수정과 함께, 절정 올라와버려<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ルネア"
