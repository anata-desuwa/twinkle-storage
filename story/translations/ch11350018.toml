[[dialogue]]
speaker = "unk"
original = "僕――<ruby>咲良<rt>さくら</rt></ruby>シンと、転入生として流星学園にやって来たルネアが恋人として付き合うようになって、しばらく経ったある日のこと。"
translation = "나――사쿠라 신과, 전학생으로서 유성 학원에 온 루네아가 연인으로서 사귀게 된 지, 얼마 지나지 않은 어느 날의 일."

[[dialogue]]
speaker = "unk"
original = "その日は週末で、ルネアは僕の家へ泊まりにやって来ていた。"
translation = "그날은 주말이라, 루네아는 나의 집으로 자러 와 있었다."

[[dialogue]]
speaker = "ルネア"
original = "「ふふっ<emoji=heart04>\u3000シン、今日は待ちに待ったお泊りの日よ<emoji=heart04>」"
translation = "「후훗<emoji=heart04> 신, 오늘은 고대하고 고대하던 외박하는 날이야<emoji=heart04>」"

[[dialogue]]
speaker = "シン"
original = "「ああ、だからルネア……コホン」"
translation = "「아아, 그러니까 루네아…… 콜록」"

[[dialogue]]
speaker = "unk"
original = "僕は１度咳払いしてから、彼女の目を見て、言う。"
translation = "나는 한 번 헛기침을 하고 나서, 그녀의 눈을 보고, 말한다."

[[dialogue]]
speaker = "シン"
original = "「今夜は、キミの全部を僕のものにしちゃうからね――女神様」"
translation = "「오늘 밤은, 너의 전부를 내 것으로 만들어 버릴 테니까――여신님」"

[[dialogue]]
speaker = "ルネア"
original = "「えっ！？」"
translation = "「엣!?」"

[[dialogue]]
speaker = "シン"
original = "（よしっ、この日の為に考えておいた決め台詞が、見事に決まった……！）"
translation = "（좋아, 이날을 위해 생각해 두었던 결정적인 대사가, 멋지게 성공했다……!）"

[[dialogue]]
speaker = "unk"
original = "僕は内心でそう思いながらガッツポーズをした――のだが。"
translation = "나는 속으로 그렇게 생각하며 승리의 포즈를 취했다――하지만."

[[dialogue]]
speaker = "ルネア"
original = "「そ、それってつまり……シンは、わたしの子宮でさえも自分のものにしたい――」"
translation = "「그, 그건 즉…… 신은, 나의 자궁마저도 자신의 것으로 만들고 싶다――」"

[[dialogue]]
speaker = "ルネア"
original = "「女神でさえも孕ませたいって……そういうこと！？」"
translation = "「여신마저도 임신시키고 싶다는…… 그런 뜻!?」"

[[dialogue]]
speaker = "シン"
original = "「ん？」"
translation = "「응?」"

[[dialogue]]
speaker = "ルネア"
original = "「あ、あのねあのねっ！\u3000実はわたし、平行世界で、別の女神の子供と出会ったの……！」"
translation = "「아, 있잖아 있잖아! 실은 나, 평행 세계에서, 다른 여신의 아이와 만났어……!」"

[[dialogue]]
speaker = "ルネア"
original = "「それってつまり、わたしも望めば、シンの赤ちゃんを孕めちゃうってことで～……<emoji=heart04>」"
translation = "「그건 즉, 나도 원하면, 신의 아기를 임신할 수 있다는 거잖아～……<emoji=heart04>」"

[[dialogue]]
speaker = "シン"
original = "「えっと……ルネア？」"
translation = "「음…… 루네아?」"

[[dialogue]]
speaker = "ルネア"
original = "「あっ、でもそんな……ダメよ、シンっ<emoji=heart04>\u3000わたしたちにはまだ早いわ<emoji=heart04>\u3000学生の身分なんだもの……<emoji=heart04>」"
translation = "「앗, 하지만 그런…… 안 돼, 신<emoji=heart04> 우리에게는 아직 일러<emoji=heart04> 학생 신분인걸……<emoji=heart04>」"

[[dialogue]]
speaker = "ルネア"
original = "「そういう子作りエッチは、学園を卒業するまでは……ね？」"
translation = "「그런 아이 만들기 섹스는, 학원을 졸업할 때까지는…… 알았지?」"

[[dialogue]]
speaker = "unk"
original = "そう言いつつも、ルネアの瞳は、期待という名の星の輝きに満ちていて――"
translation = "그렇게 말하면서도, 루네아의 눈동자는, 기대라는 이름의 별의 반짝임으로 가득 차 있었고――"

[[dialogue]]
speaker = "ルネア"
original = "「ああっ<emoji=heart04>\u3000ダメよ、シン<emoji=heart04>\u3000そんな孕ませる気満々の目で、わたしのことを見たりしちゃ……<emoji=heart04>\u3000ふうぅっ……はあぁぁっ<emoji=heart04>」"
translation = "「아앗<emoji=heart04> 안 돼, 신<emoji=heart04> 그런 임신시킬 생각 만만한 눈으로, 나를 보거나 하면……<emoji=heart04> 후우읏…… 하아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "服を脱いで布団の上で仰向けになり、僕の手をぎゅっと握りながら、ルネアはそんなことを言った。"
translation = "옷을 벗고 이불 위에서 천장을 바라보며, 나의 손을 꽉 쥐면서, 루네아는 그런 말을 했다."

[[dialogue]]
speaker = "シン"
original = "（べ、別にそういう目で見ているつもりはないんだけど……）"
translation = "（벼, 별로 그런 눈으로 보고 있는 건 아닌데……）"

[[dialogue]]
speaker = "unk"
original = "しかし、恋人がせっかくエッチな期待をしてくれているのに、わざわざ水を差したくはない。"
translation = "하지만, 연인이 모처럼 야한 기대를 해주고 있는데, 굳이 김을 빼고 싶지는 않다."

[[dialogue]]
speaker = "unk"
original = "……というか、いつもより興奮しているルネアの姿はとてもエッチで、恋人としてもがぜん盛り上がってしまう。"
translation = "……랄까, 평소보다 흥분하고 있는 루네아의 모습은 매우 야해서, 연인으로서도 더욱 달아오르게 된다."

[[dialogue]]
speaker = "ルネア"
original = "「あっ<emoji=heart04>\u3000シンのおち○ちん、もう大きくなってる……<emoji=heart04>\u3000はあぁぁっ<emoji=heart04>\u3000はふうぅ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 신의 자지, 벌써 커졌어……<emoji=heart04> 하아아앗<emoji=heart04> 하후우……<emoji=heart04>」"

[[dialogue]]
speaker = "ルネア"
original = "「んっ……ふあぁぁっ<emoji=heart04>\u3000すごい<emoji=heart04>\u3000おち○ちん、いつもより大きくて固いわ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000んふぅっ……<emoji=heart04>」"
translation = "「응읏…… 후아아앗<emoji=heart04> 대단해<emoji=heart04> 자지, 평소보다 크고 단단해<emoji=heart04> 응아앗<emoji=heart04> 응후읏……<emoji=heart04>」"

[[dialogue]]
speaker = "ルネア"
original = "「あんっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000シン、ダメぇ<emoji=heart04>\u3000そんな本気のおち○ちんを擦り付けられたら、雌の本能が疼いて、勝手に濡れてきちゃう<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000んふぅ<emoji=heart04>」"
translation = "「앙읏<emoji=heart04> 후아앗<emoji=heart04> 신, 안 돼<emoji=heart04> 그런 진심인 자지를 비벼대면, 암컷의 본능이 쑤셔서, 저절로 젖어버려<emoji=heart04> 응응읏<emoji=heart04> 응후우<emoji=heart04>」"

[[dialogue]]
speaker = "ルネア"
original = "「はあぁっ<emoji=heart04>\u3000おま○こ、愛液いっぱい溢れてきて、受け入れ準備しちゃうのぉ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000ふうぅ……<emoji=heart04>」"
translation = "「하아앗<emoji=heart04> 보지, 애액 잔뜩 흘러넘쳐서, 받아들일 준비를 해버려<emoji=heart04> 응우읏<emoji=heart04> 후우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ルネアの秘部はいつもに増して濡れていて、少しペニスを擦り付けただけで、あっという間に愛液でぬるぬるになる。"
translation = "루네아의 은밀한 부분은 평소보다 더욱 젖어 있었고, 살짝 페니스를 비벼댄 것만으로, 순식간에 애액으로 미끌미끌해진다."

[[dialogue]]
speaker = "シン"
original = "「ルネア、もう挿れちゃっても大丈夫そうかな……？」"
translation = "「루네아, 이제 넣어버려도 괜찮을까……?」"

[[dialogue]]
speaker = "ルネア"
original = "「んっ<emoji=heart04>\u3000うん……<emoji=heart04>\u3000でも、あくまで普通のエッチじゃないとダメよ？」"
translation = "「응읏<emoji=heart04> 응……<emoji=heart04> 하지만, 어디까지나 평범한 섹스가 아니면 안 돼?」"

[[dialogue]]
speaker = "ルネア"
original = "「決して孕ませるつもりでしちゃ……ダメなんだからね<emoji=heart04>」"
translation = "「결코 임신시킬 생각으로 하면…… 안 되는 거야<emoji=heart04>」"

[[dialogue]]
speaker = "シン"
original = "「わ、わかった……じゃあ、行くよ？」"
translation = "「아, 알았어…… 그럼, 간다?」"

[[dialogue]]
speaker = "ルネア"
original = "「んっ……<emoji=heart04>\u3000ふわぁぁっ――<emoji=heart04>」"
translation = "「응읏……<emoji=heart04> 후와아앗――<emoji=heart04>」"

[[dialogue]]
speaker = "ルネア"
original = "「んぅぅぅ～～っ<emoji=heart04><emoji=heart04>\u3000あああっ<emoji=heart04>\u3000シンのおち○ちん、おま○こに入ってくるぅぅぅっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응우우우～～읏<emoji=heart04><emoji=heart04> 아아앗<emoji=heart04> 신의 자지, 보지에 들어온다아아앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ルネア"
original = "「あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふあぁっ……<emoji=heart04>\u3000んっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んあぁっ……<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앙읏<emoji=heart04> 하아앗<emoji=heart04> 후아앗……<emoji=heart04> 응읏<emoji=heart04> 앗<emoji=heart04> 하아앗<emoji=heart04> 응아앗……<emoji=heart04> 응우읏<emoji=heart04> 앗<emoji=heart04> 하아앗<emoji=heart04> 응아앗<emoji=heart04> 후아아앙읏<emoji=heart04>」"

[[dialogue]]
speaker = "ルネア"
original = "「んっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000ダメぇ<emoji=heart04>\u3000おち○ちん、いつもよりすごく感じちゃう<emoji=heart04>\u3000はぁうっ<emoji=heart04>\u3000んふぅっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000はあぁんっ<emoji=heart04>」"
translation = "「응읏<emoji=heart04> 후아앗<emoji=heart04> 안 돼<emoji=heart04> 자지, 평소보다 엄청 느껴져<emoji=heart04> 하아우읏<emoji=heart04> 응후읏<emoji=heart04> 응아앗<emoji=heart04> 하아앙읏<emoji=heart04>」"

[[dialogue]]
speaker = "ルネア"
original = "「ダメなのにぃ、子作りエッチ意識して、体が敏感に反応しちゃってるのぉ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000んああぁっ<emoji=heart04>」"
translation = "「안 되는데, 아이 만들기 섹스를 의식해서, 몸이 민감하게 반응해버려<emoji=heart04> 앗<emoji=heart04> 앙읏<emoji=heart04> 후아앗<emoji=heart04> 응아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ルネア"
original = "「シンのおち○ちん、気持ちいいっ<emoji=heart04>\u3000はあぁあっ<emoji=heart04>\u3000すごく気持ちいいよぉ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「신의 자지, 기분 좋아<emoji=heart04> 하아아앗<emoji=heart04> 엄청 기분 좋다구<emoji=heart04> 앗<emoji=heart04> 하앙읏<emoji=heart04> 응아앗<emoji=heart04> 응우읏<emoji=heart04> 후아아앙읏<emoji=heart04>」"

[[dialogue]]
speaker = "ルネア"
original = "「シン<emoji=heart04>\u3000キスっ<emoji=heart04>\u3000キスもしてぇ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんっ――<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000んちゅっ……<emoji=heart04>」"
translation = "「신<emoji=heart04> 키스<emoji=heart04> 키스도 해줘<emoji=heart04> 앗<emoji=heart04> 응응읏――<emoji=heart04> 츄읏<emoji=heart04> 응츄읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "僕はルネアのおねだりに応えて、そっと唇を奪う。"
translation = "나는 루네아의 조름에 응하여, 살며시 입술을 빼앗는다."

[[dialogue]]
speaker = "ルネア"
original = "「んむっ<emoji=heart04>\u3000ちゅっ……ちゅむっ<emoji=heart04>\u3000ちゅぱっ<emoji=heart04>\u3000れろちゅっ<emoji=heart04>\u3000シン、舌も<emoji=heart04>\u3000舌も絡めて<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000んちゅっ<emoji=heart04>\u3000ちゅぱっ<emoji=heart04>\u3000もっと、ラブラブしたいのぉ<emoji=heart04>」"
translation = "「응무읏<emoji=heart04> 츄읏…… 츄무읏<emoji=heart04> 츄파앗<emoji=heart04> 레로츄읏<emoji=heart04> 신, 혀도<emoji=heart04> 혀도 얽어줘<emoji=heart04> 츄읏<emoji=heart04> 응츄읏<emoji=heart04> 츄파앗<emoji=heart04> 좀 더, 러브러브 하고 싶어<emoji=heart04>」"

[[dialogue]]
speaker = "ルネア"
original = "「あっ<emoji=heart04>\u3000んむっ<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000ちゅぷぷっ<emoji=heart04>\u3000ちゅるっ<emoji=heart04>\u3000ちゅれるっ<emoji=heart04>\u3000ちゅるるっ<emoji=heart04>\u3000れるれるっ<emoji=heart04>\u3000れろちゅっ<emoji=heart04>\u3000――はあぁあ<emoji=heart04>\u3000ラブラブきしゅ、気持ちひい<emoji=heart04>」"
translation = "「앗<emoji=heart04> 응무읏<emoji=heart04> 츄읏<emoji=heart04> 츄푸푸읏<emoji=heart04> 츄루읏<emoji=heart04> 츄레루읏<emoji=heart04> 츄루루읏<emoji=heart04> 레루레루읏<emoji=heart04> 레로츄읏<emoji=heart04> ――하아아<emoji=heart04> 러브러브 키스, 기분 좋아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "エッチをしながらのキスで、僕も興奮が高まってきて、目の前で揺れる大きな胸に手が伸びてしまう。"
translation = "섹스를 하면서 하는 키스로, 나도 흥분이 고조되어, 눈앞에서 흔들리는 커다란 가슴에 손이 뻗어 버린다."

[[dialogue]]
speaker = "ルネア"
original = "「んっ<emoji=heart04>\u3000ちゅぱっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000シン、ダメぇ<emoji=heart04>\u3000今おっぱい触られたら、すごく感じちゃうっ<emoji=heart04>」"
translation = "「응읏<emoji=heart04> 츄파앗<emoji=heart04> 앗<emoji=heart04> 하앙읏<emoji=heart04> 신, 안 돼<emoji=heart04> 지금 가슴 만져지면, 엄청 느껴버려<emoji=heart04>」"

[[dialogue]]
speaker = "ルネア"
original = "「子作りエッチとキスで、乳首ビンビンに勃起しちゃってるのぉ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000そんな揉みしだいて、乳首コリコリしちゃダメぇ<emoji=heart04>」"
translation = "「아이 만들기 섹스와 키스로, 젖꼭지 팽팽하게 발기해버렸어<emoji=heart04> 앗<emoji=heart04> 앙읏<emoji=heart04> 하앙읏<emoji=heart04> 그렇게 주물러대서, 젖꼭지 꼬들꼬들하게 만들면 안 돼<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "揉んでいない方のおっぱいの乳首もぷっくりと勃起しているのを見て、僕はその魅力に抗えずに吸い付く。"
translation = "주무르지 않은 쪽의 가슴 젖꼭지도 볼록하게 발기하고 있는 것을 보고, 나는 그 매력에 저항하지 못하고 빨아들인다."

[[dialogue]]
speaker = "ルネア"
original = "「あっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>\u3000おっぱい吸い付いちゃダメぇ<emoji=heart04><emoji=heart04>\u3000はあぁあっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>\u3000おっぱい感じすぎてぇ<emoji=heart04>\u3000乳首キュンキュンしちゃうのぉっ<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 후아아앗<emoji=heart04> 가슴 빨아들이면 안 돼<emoji=heart04><emoji=heart04> 하아아앗<emoji=heart04> 응우읏<emoji=heart04> 후아아앗<emoji=heart04> 가슴 너무 느껴서<emoji=heart04> 젖꼭지가 큥큥거려<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ルネア"
original = "「シン、そんなにおっぱい飲みたいの？\u3000あんっ<emoji=heart04>\u3000だからって、赤ちゃん孕ませちゃうのはやっぱりダメよぉ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>」"
translation = "「신, 그렇게 가슴이 마시고 싶어? 앙읏<emoji=heart04> 그렇다고 해서, 아기를 임신시켜버리는 건 역시 안 돼<emoji=heart04> 응읏<emoji=heart04> 후우읏<emoji=heart04> 응아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ルネア"
original = "「あっ<emoji=heart04>\u3000でも、そんなに求められたらぁ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000子宮キュンキュンして、降りて来ちゃうっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はあぁあっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 하지만, 그렇게 요구받으면<emoji=heart04> 하앙읏<emoji=heart04> 자궁이 큥큥거려서, 내려와버려<emoji=heart04> 앙읏<emoji=heart04> 하아아앗<emoji=heart04> 후아아앙읏<emoji=heart04>」"

[[dialogue]]
speaker = "ルネア"
original = "「危ない日じゃないのに、卵子排卵しちゃう<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んあぁあっ<emoji=heart04>\u3000赤ちゃん作る準備始めちゃうよぉ<emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>」"
translation = "「위험한 날이 아닌데도, 난자가 배란돼버려<emoji=heart04> 앗<emoji=heart04> 응아아앗<emoji=heart04> 아기 만들 준비를 시작해버린다구<emoji=heart04> 응응우읏<emoji=heart04> 앗<emoji=heart04> 하앙읏<emoji=heart04>」"

[[dialogue]]
speaker = "ルネア"
original = "「はあぁあっ<emoji=heart04>\u3000んあぁんっ<emoji=heart04>\u3000腰が勝手に動いちゃう<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000中出しさせようと、自分から求めちゃってるぅ<emoji=heart04>」"
translation = "「하아아앗<emoji=heart04> 응아앙읏<emoji=heart04> 허리가 저절로 움직여<emoji=heart04> 앗<emoji=heart04> 앙읏<emoji=heart04> 안에 싸게 하려고, 스스로 요구해버리고 있어<emoji=heart04>」"

[[dialogue]]
speaker = "シン"
original = "「うぁっ……！\u3000ルネアのおま○こが絡みついて来て、これヤバい！」"
translation = "「우앗……! 루네아의 보지가 휘감겨 들어와서, 이거 위험해!」"

[[dialogue]]
speaker = "ルネア"
original = "「はぁん<emoji=heart04>\u3000シンのおち○ちん、またおっきくなったぁ<emoji=heart04>\u3000イっちゃいそう、なの？\u3000わたしの中に種付け射精、しちゃう気なのねっ<emoji=heart04>」"
translation = "「하앙<emoji=heart04> 신의 자지, 또 커졌어<emoji=heart04> 가버릴 것 같아? 내 안에 씨앗 뿌리기 사정, 할 생각인 거네<emoji=heart04>」"

[[dialogue]]
speaker = "ルネア"
original = "「わ、わかったわ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000シンがそこまで、本気なら<emoji=heart04>\u3000わたしもちゃんと受け入れる<emoji=heart04>\u3000んんぅ<emoji=heart04>\u3000はぁあんっ<emoji=heart04>」"
translation = "「아, 알았어<emoji=heart04> 앙읏<emoji=heart04> 신이 거기까지, 진심이라면<emoji=heart04> 나도 제대로 받아들일게<emoji=heart04> 응응우<emoji=heart04> 하아앙읏<emoji=heart04>」"

[[dialogue]]
speaker = "ルネア"
original = "「シン――大好きよ<emoji=heart04>\u3000わたしに可愛い赤ちゃん、孕ませてぇ<emoji=heart04>」"
translation = "「신―― 정말 좋아해<emoji=heart04> 나에게 귀여운 아기, 임신시켜줘<emoji=heart04>」"

[[dialogue]]
speaker = "シン"
original = "「うっ……！\u3000そんな宣言されたら！」"
translation = "「윽……! 그런 선언을 들으면!」"

[[dialogue]]
speaker = "シン"
original = "「――ルネア、もう出ちゃうっ！！」"
translation = "「――루네아, 이제 나올 것 같아!!」"

[[dialogue]]
speaker = "ルネア"
original = "「あっ<emoji=heart04>\u3000んあああぁっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04><emoji=heart04>\u3000種付け射精来たあぁ～～っ<emoji=heart04><emoji=heart04>\u3000んんんぅぅ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 응아아아앗<emoji=heart04> 하아아앙읏<emoji=heart04><emoji=heart04> 씨앗 뿌리기 사정 왔다아아～～읏<emoji=heart04><emoji=heart04> 응응응우우<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ルネアの孕ませおねだりに興奮して、僕はあえなくイってしまった――しかし。"
translation = "루네아의 임신시켜 달라는 조름에 흥분해서, 나는 허무하게 가버렸다――하지만."

[[dialogue]]
speaker = "シン"
original = "「あ、あれ……！？\u3000なんだこれ！？\u3000くぅっ……！」"
translation = "「아, 저거……!? 뭐야 이거!? 크읏……!」"

[[dialogue]]
speaker = "ルネア"
original = "「あっ！？\u3000はあああぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000シン、すごいぃっ<emoji=heart04>\u3000おち○ちん、すぐに大きくなって<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「앗!? 하아아아～～～앗<emoji=heart04><emoji=heart04><emoji=heart04> 신, 대단해<emoji=heart04> 자지, 금방 커져서<emoji=heart04> 앗<emoji=heart04> 앙읏<emoji=heart04> 하아앗<emoji=heart04> 후아아앙읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "射精してすぐに、僕のペニスは<b>何故か</b>再びフル勃起状態へと復活してしまった。"
translation = "사정하고 바로, 나의 페니스는 <b>왠지</b> 다시 풀 발기 상태로 부활해버렸다."

[[dialogue]]
speaker = "ルネア"
original = "「んうぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04>\u3000おち○ちん激しいっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んああぁっ<emoji=heart04>\u3000いっぱい擦れて、気持ちいいのぉ<emoji=heart04>」"
translation = "「응우읏<emoji=heart04> 앗<emoji=heart04> 하아아앙읏<emoji=heart04> 자지 격렬해<emoji=heart04> 앗<emoji=heart04> 후아앗<emoji=heart04> 하아앗<emoji=heart04> 응아아앗<emoji=heart04> 잔뜩 비벼져서, 기분 좋아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "もしかして、ルネアの『女神の力』だったりするのだろうか――興奮が射精前よりも更に昂って、もっと上の快楽を求めて腰が勝手に動いてしまう。"
translation = "혹시, 루네아의 『여신의 힘』이거나 하는 걸까――흥분이 사정 전보다 더욱 고조되어, 더 높은 쾌락을 찾아 허리가 저절로 움직여 버린다."

[[dialogue]]
speaker = "ルネア"
original = "「あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000そこっ<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んうぅ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000はああぁ～っ<emoji=heart04><emoji=heart04>」"
translation = "「앙읏<emoji=heart04> 앙읏<emoji=heart04> 하앙읏<emoji=heart04> 거기<emoji=heart04> 아아앗<emoji=heart04> 응우읏<emoji=heart04> 하아앗<emoji=heart04> 기분 좋아<emoji=heart04> 앙읏<emoji=heart04> 응우우<emoji=heart04> 후아앗<emoji=heart04> 하아아아～앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ルネア"
original = "「子宮口にどちゅどちゅって、力強いラブラブキスされてるぅ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000すごいっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000気持ちいぃよぉ<emoji=heart04><emoji=heart04>」"
translation = "「자궁 입구에 도츄도츄하고, 힘찬 러브러브 키스를 받고 있어<emoji=heart04> 아앙읏<emoji=heart04> 대단해<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 하앙읏<emoji=heart04> 기분 좋다구<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ルネア"
original = "「はあぁっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>\u3000もっとぉ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000シン、もっと突いてぇ～っ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「하아앗<emoji=heart04> 응우읏<emoji=heart04> 후아아앗<emoji=heart04> 더어<emoji=heart04> 앙읏<emoji=heart04> 앙읏<emoji=heart04> 응아앗<emoji=heart04> 신, 더 찔러줘～읏<emoji=heart04><emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 하아아앙읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ルネア"
original = "「気持ちいいっ<emoji=heart04>\u3000気持ち良くて排卵しちゃうっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「기분 좋아<emoji=heart04> 기분 좋아서 배란해버려<emoji=heart04> 앗<emoji=heart04> 앙읏<emoji=heart04> 후아아앙읏<emoji=heart04>」"

[[dialogue]]
speaker = "ルネア"
original = "「あっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000卵子出ちゃうっ<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000卵子がシンの精子に囲まれて、逃げられずに赤ちゃん孕んじゃうっ<emoji=heart04>\u3000んふぅぅん<emoji=heart04>」"
translation = "「앗<emoji=heart04> 응아앗<emoji=heart04> 난자 나와버려<emoji=heart04> 아아앗<emoji=heart04> 난자가 신의 정자에 둘러싸여서, 도망치지 못하고 아기를 임신해버려<emoji=heart04> 응후우우응<emoji=heart04>」"

[[dialogue]]
speaker = "ルネア"
original = "「ああっ<emoji=heart04>\u3000卵子の中、シンが入って来てるよぉ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000はぁあん<emoji=heart04>\u3000このまま一発で受精しちゃうのぉ<emoji=heart04><emoji=heart04>」"
translation = "「아앗<emoji=heart04> 난자 속, 신이 들어오고 있어<emoji=heart04><emoji=heart04><emoji=heart04> 하아앙<emoji=heart04> 이대로 한 방에 수정해버려<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ルネアがそんな妄想を口にするたび、僕も本当に孕ませることを想像してしまって、どんどん２度目の射精感が高まってくる。"
translation = "루네아가 그런 망상을 입에 담을 때마다, 나도 정말로 임신시키는 것을 상상해버려서, 점점 두 번째 사정감이 고조되어 온다."

[[dialogue]]
speaker = "シン"
original = "「っ……ルネア、僕、また出ちゃいそうだ！」"
translation = "「읏…… 루네아, 나, 또 나와버릴 것 같아!」"

[[dialogue]]
speaker = "ルネア"
original = "「あぁあんっ<emoji=heart04>\u3000シン<emoji=heart04>\u3000ダメぇ<emoji=heart04>\u3000いま中に出されたら、赤ちゃん本当にできちゃうっ<emoji=heart04>」"
translation = "「아아앙읏<emoji=heart04> 신<emoji=heart04> 안 돼<emoji=heart04> 지금 안에 싸지르면, 아기 정말로 생겨버려<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "僕は込み上げる射精感に抗えず、腰を更に激しくピストンさせる。"
translation = "나는 치밀어 오르는 사정감에 저항하지 못하고, 허리를 더욱 격렬하게 피스톤질시킨다."

[[dialogue]]
speaker = "ルネア"
original = "「あっ<emoji=heart04><emoji=heart04>\u3000ふああぁ～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000今激しくしたら、わたしもイっちゃうっ<emoji=heart04>\u3000受精してイっちゃうぅ～～っ<emoji=heart04><emoji=heart04>」"
