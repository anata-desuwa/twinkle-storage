translation = "「앗<emoji=heart04> 하아앗<emoji=heart04><emoji=heart04> 후아아아～～앗<emoji=heart04><emoji=heart04><emoji=heart04> 가<emoji=heart04> 신, 가버릴 거야아앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

