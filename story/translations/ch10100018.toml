[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ふむふむ……ここが皆さまが勉強しておられる教室ですか」"
translation = "「흠흠…… 여기가 여러분이 공부하시는 교실인가요.」"

[[dialogue]]
speaker = "unk"
original = "放課後、俺はマグダレナさんの希望で学内の案内をしていた。"
translation = "방과 후, 나는 막달레나 씨의 희망으로 교내 안내를 하고 있었다."

[[dialogue]]
speaker = "unk"
original = "マグダレナさんは興味深そうに教室を見回し、机や教卓をまじまじと見つめて、その様子は外見よりも幼く見えた。"
translation = "막달레나 씨는 흥미로운 듯 교실을 둘러보고, 책상이나 교탁을 빤히 쳐다보았는데, 그 모습은 외견보다 어려 보였다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「あなたと一緒に授業を受けるのも楽しそうですね」"
translation = "「당신과 함께 수업을 듣는 것도 즐거울 것 같네요.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「例えば隣の席だったり……あ、ひとつ後ろの席も捨てがたいですね。ずっとあなたを見つめていられますから」"
translation = "「예를 들어 옆자리라든가…… 아, 한 칸 뒷자리도 버리기 아깝네요. 계속 당신을 바라보고 있을 수 있으니까요.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「先生もいいかもしれません。居眠りはいけませんよーって。ふふふっ」"
translation = "「선생님도 좋을지도 모르겠네요. 꾸벅꾸벅 졸면 안 돼요~ 라면서. 후후훗.」"

[[dialogue]]
speaker = "unk"
original = "その微笑みが俺に向けられると、ドキッと心臓が跳ねる。"
translation = "그 미소가 나를 향하자, 두근 하고 심장이 뛴다."

[[dialogue]]
speaker = "unk"
original = "こんな先生がいたら男子生徒はたまらないだろう。いろんな意味で。"
translation = "이런 선생님이 있다면 남학생들은 견디지 못할 것이다. 여러 의미로."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「あら、何かお悩みですか？\u3000マグダレナ先生に何でも言ってくださいね」"
translation = "「어라, 무슨 고민이라도 있나요? 막달레나 선생님에게 뭐든 말해 보세요.」"

[[dialogue]]
speaker = "unk"
original = "何でも……何でも……"
translation = "뭐든…… 뭐든……"

[[dialogue]]
speaker = "unk"
original = "それなら……"
translation = "그렇다면……"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ふふふ……」"
translation = "「후후후……」"

[[dialogue]]
speaker = "unk"
original = "ムラムラしてしまったと正直に打ち明けると、マグダレナさんは俺を保健室に連れてきた。"
translation = "성욕이 끓어올랐다고 솔직하게 털어놓자, 막달레나 씨는 나를 보건실로 데려왔다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ではどうしてしまったのか、もう一度教えてください」"
translation = "「그럼 어떻게 된 건지, 다시 한번 알려주세요.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「マグダレナ先生を見ていたら……おち○ちんが大きくなって、しまいました……」"
translation = "「막달레나 선생님을 보고 있었더니…… 자지가 커져 버렸, 어요……」"

[[dialogue]]
speaker = "unk"
original = "まるで何も知らない子どものように、もじもじと恥ずかしそうに訴える。"
translation = "마치 아무것도 모르는 아이처럼, 머뭇거리며 부끄러운 듯 호소한다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「うふふ、よく言えました。……あら、確かにおち○ちんが大きくなってますね～」"
translation = "「우후후, 잘 말했어요. ……어라, 정말로 자지가 커져 있네요~」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「でもここは調子の悪い生徒が来る場所ですから心配いりませんよ。守護天使のマグダレナ先生に任せてください」"
translation = "「하지만 여기는 몸 상태가 안 좋은 학생이 오는 곳이니까 걱정할 것 없답니다. 수호천사 막달레나 선생님에게 맡겨주세요.」"

[[dialogue]]
speaker = "unk"
original = "守護天使が教師になっているのはさておき、神聖な存在が身近にいて、こうして大胆な姿を見せてくれることに興奮を覚える。"
translation = "수호천사가 교사가 되어 있는 건 차치하고, 신성한 존재가 곁에 있으며 이렇게 대담한 모습을 보여주는 것에 흥분을 느낀다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「おま○こでおち○ちんゴシゴシして、白いおしっこをびゅーって出せば、ちゃ～んと治りますからね」"
translation = "「보지로 자지 문질문질해서, 하얀 오줌을 뷰웃 하고 내보내면, 처어언천히 나을 테니까요.」"

[[dialogue]]
speaker = "unk"
original = "まるで小さな子を諭すように優しく、わかりきったことを教示するマグダレナさん。"
translation = "마치 어린아이를 타이르듯 다정하게, 뻔한 사실을 가르쳐 주는 막달레나 씨."

[[dialogue]]
speaker = "unk"
original = "どこで学んだのか、本来高位の存在である守護天使の口から卑猥な言葉が出てきたことに衝撃を覚える。"
translation = "어디서 배운 건지, 본래 고위 존재인 수호천사의 입에서 음란한 단어가 튀어나온 것에 충격을 받는다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ほら、ここがおち○ちんを入れるところです。おま○こっていうんですよ」"
translation = "「자, 여기가 자지를 넣는 곳이에요. 보지라고 한답니다.」"

[[dialogue]]
speaker = "unk"
original = "秘裂を自ら広げて女性器を見せつけるマグダレナさん。"
translation = "비열을 스스로 벌려 성기를 과시하는 막달레나 씨."

[[dialogue]]
speaker = "unk"
original = "微笑みながらも頬を上気させ、期待の表情を浮かべていた。"
translation = "미소 지으면서도 뺨을 붉히며, 기대에 찬 표정을 짓고 있었다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「おち○ちんが大きくなったままだとつらいですからね。先生のおま○こ使って、おち○ちんスッキリさせてください」"
translation = "「자지가 커진 채로 있으면 괴로우니까요. 선생님의 보지 써서, 자지 시원하게 해주세요.」"

[[dialogue]]
speaker = "unk"
original = "むっちりとした肉感的な太ももが大胆に露わになり、少し身じろぎしただけで豊満なおっぱいが揺れる。"
translation = "통통하고 육감적인 허벅지가 대담하게 드러나고, 살짝 몸을 뒤척이는 것만으로도 풍만한 가슴이 흔들린다."

[[dialogue]]
speaker = "unk"
original = "そんな淫らに誘われて堪えられるはずがなく、吸い込まれるようにペニスを押し込んだ。"
translation = "그런 음란한 유혹을 견뎌낼 수 있을 리 없었고, 빨려 들어가듯 페니스를 밀어 넣었다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ふぁ……んああ～っ……<emoji=heart04>\u3000ぁん……すごい……<emoji=heart04>」"
translation = "「하아…… 응아아~……<emoji=heart04> 앙…… 굉장해……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "パンパンに膨らんだ亀頭が膣口を広げて、マグダレナさんの蕩けた声が保健室に響く。"
translation = "팽팽하게 부푼 귀두가 질 입구를 넓히고, 막달레나 씨의 황홀한 목소리가 보건실에 울려 퍼진다."

[[dialogue]]
speaker = "unk"
original = "先端が中に侵入すると、マグダレナさんの中はうっすらと濡れていて、ふわふわの肉がペニスを柔らかく包み込む。"
translation = "끝부분이 안으로 침입하자, 막달레나 씨의 안은 얇게 젖어 있었고, 폭신폭신한 살점이 페니스를 부드럽게 감싸 안는다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ふぅ……はぁ……あなたが私の中に入ってきて、あなたの温もりを直接感じます」"
translation = "「후우…… 하아…… 당신이 제 안으로 들어와서, 당신의 온기를 직접 느껴요.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「はあぁ……熱い……ん──は──はあぁん<emoji=heart04>\u3000私の中で、動いているのがわかります……はぁ……あ……んん<emoji=heart04>」"
translation = "「하아아…… 뜨거워…… 응── 하── 하아앙<emoji=heart04> 제 안에서, 움직이는 게 느껴져요…… 하아…… 아…… 응응<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マグダレナさん呼吸に合わせるように、膣壁が収縮と弛緩を繰り返す。"
translation = "막달레나 씨의 호흡에 맞추는 듯이, 질벽이 수축과 이완을 반복한다."

[[dialogue]]
speaker = "unk"
original = "下半身で感じる熱さはまさしく本物で、仮の体だなんて信じられない。"
translation = "하반신으로 느껴지는 뜨거움은 그야말로 진짜여서, 가짜 몸이라니 믿기지 않는다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「んん、ぁ……あなたのに私の中を広げられて、今までに感じたことのない感覚で……これが女の快感なのですね」"
translation = "「응응, 아…… 당신의 것으로 제 안이 넓혀져서, 지금까지 느껴본 적 없는 감각이라…… 이것이 여자의 쾌감이군요.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「この体では初めて……いえ、マグダレナという守護天使にとっても初めてのことですが、想像よりも心地良いです」"
translation = "「이 몸으로는 처음…… 아니, 막달레나라는 수호천사에게 있어서도 처음 있는 일입니다만, 상상보다 기분 좋아요.」"

[[dialogue]]
speaker = "unk"
original = "繋がっているだけでも蜜の量が増してきて、ペニスにも血流が集まってくる。"
translation = "연결되어 있는 것만으로도 애액의 양이 늘어나고, 페니스에도 혈류가 모여든다."

[[dialogue]]
speaker = "unk"
original = "優しく包まれる快感に浸りながら、男を惑わす大きな双丘へと手を伸ばした。"
translation = "부드럽게 감싸이는 쾌감에 젖어 들며, 남자를 현혹하는 커다란 쌍구로 손을 뻗었다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「あっ……おっぱいも……ん、はぁ……<emoji=heart04>\u3000あなたの、手が……はぁ……あっ、はぁ──ふ──んっ<emoji=heart04>」"
translation = "「앗…… 가슴도…… 응, 하아……<emoji=heart04> 당신의, 손이…… 하아…… 앗, 하아── 후── 응읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "手のひらに収まりきらない、大きくて柔らかなおっぱい。"
translation = "손바닥에 다 들어오지 않는, 크고 부드러운 가슴."

[[dialogue]]
speaker = "unk"
original = "ふわふわで、むっちりして、ぎゅっと握ると肉が指の間からはみ出してしまう。"
translation = "폭신폭신하고, 포동포동해서, 꽉 쥐면 살점이 손가락 사이로 빠져나와 버린다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「んっ……はぁ……どうぞ、好きなだけ触ってください……んん……あ、あぁん……<emoji=heart04>」"
translation = "「응읏…… 하아…… 어서요, 마음껏 만져주세요…… 응응…… 아, 아앙……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "少し力を込めるだけで指が沈むのが心地良く、まるで極上のお菓子のようで、いつまでも触っていられそうだ。"
translation = "살짝 힘을 주는 것만으로 손가락이 가라앉는 것이 기분 좋고, 마치 극상의 과자 같아서 언제까지나 만지고 있을 수 있을 것 같다."

[[dialogue]]
speaker = "unk"
original = "胸を揉まれながら、体を震わせて快感に喘ぐのも情欲をそそる。"
translation = "가슴을 주물려지며, 몸을 떨며 쾌감에 헐떡이는 것도 정욕을 자극한다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「あ……はぁ……私の胸はいかがですか？\u3000……ふふっ、おっぱいを触りながらおち○ちんが震えていますね。かわいいです<emoji=heart04>」"
translation = "「아…… 하아…… 제 가슴은 어떠신가요? ……후훗, 가슴을 만지면서 자지가 떨리고 있네요. 귀여워요<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「おち○ちんをスッキリさせるにはもっと動かないといけませんよ。ほら……ね？」"
translation = "「자지를 시원하게 하려면 더 움직여야 한답니다. 자…… 네?」"

[[dialogue]]
speaker = "unk"
original = "天使とは思えない妖艶さを帯びた笑みで続きを促すマグダレナさん。"
translation = "천사라고는 믿기지 않는 요염함을 띤 미소로 다음을 재촉하는 막달레나 씨."

[[dialogue]]
speaker = "unk"
original = "甘く響く言葉に誘われるように、大きく腰を動かしていく。"
translation = "달콤하게 울리는 말에 이끌리듯, 크게 허리를 움직여 간다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ひやああっ<emoji=heart04>\u3000はぁ……んっ……ふぁっ……中で、擦れて……あっ、はぁ、はんっ<emoji=heart04>」"
translation = "「히야아앗<emoji=heart04> 하아…… 응읏…… 하앗…… 안에서, 쓸려서…… 앗, 하아, 항<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "硬くなったペニスがマグダレナさんの中を押し広げ、粘膜を摩擦する。"
translation = "단단해진 페니스가 막달레나 씨의 안을 밀어 넓히며, 점막을 마찰한다."

[[dialogue]]
speaker = "unk"
original = "すると膣壁が押し返してきて、ぷにぷにとした肉の弾力に締め付けられるのがたまらない。"
translation = "그러자 질벽이 되밀어 오며, 말랑말랑한 살의 탄력에 조여지는 것이 참을 수 없다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「大きいのが、私の中で動いて……んはっ……はぁ……はぁっ、あっ、んんっ<emoji=heart04>」"
translation = "「커다란 게, 제 안에서 움직여서…… 응핫…… 하아…… 하앗, 앗, 응읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ふぁ……はぁ、はぁ……その調子ですよ。もっとおち○ちんゴシゴシしてください……あっ、はっ……ふあぁっ<emoji=heart04>」"
translation = "「하아…… 하아, 하아…… 그 상태예요. 더 자지 문질문질 해주세요…… 앗, 핫…… 후아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスを突き出す度にとろりとした蜜の感触が絡みつく。"
translation = "페니스를 찌를 때마다 걸쭉한 애액의 감촉이 휘감긴다."

[[dialogue]]
speaker = "unk"
original = "腰を引くとマグダレナさんの中に納まっていた部分が露わになり、ぬらついた肉棒がいやらしく光を反射していた。"
translation = "허리를 빼면 막달레나 씨의 안에 담겨 있던 부분이 드러나고, 번들거리는 육봉이 야하게 빛을 반사하고 있었다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「あぁ……おち○ちん、大きくて硬いです……んはぁ、あっ……はっ、は……あんっ<emoji=heart04>」"
translation = "「아아…… 자지, 크고 단단해요…… 응하아, 앗…… 핫, 하…… 안앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「はぁ……あっ、はっ……んん……おま○この中でビクビクして……<emoji=heart04>\u3000うふふっ、おち○ちんが元気で嬉しいです<emoji=heart04>」"
translation = "「하아…… 앗, 핫…… 응응…… 보지 안에서 파르르 떨며……<emoji=heart04> 우후훗, 자지가 활기차서 기뻐요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "普段の聖母のような姿とは裏腹に、卑猥な言葉を使い、艶めかしい吐息を漏らすマグダレナさん。"
translation = "평소의 성모 같은 모습과는 정반대로, 음란한 말을 사용하며 요염한 숨결을 내뱉는 막달레나 씨."

[[dialogue]]
speaker = "unk"
original = "その淫らな様に興奮をかき立てられ、下半身に込める力が強くなる。"
translation = "그 음란한 모습에 흥분이 고조되어, 하반신에 들어가는 힘이 강해진다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ふあぁ……あんっ……<emoji=heart04>\u3000いいですよ、もっと……はぁ、あっ……あ、んん～っ<emoji=heart04>」"
translation = "「후아아…… 앙……<emoji=heart04> 좋아요, 더…… 하아, 앗…… 아, 응응~<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「おち○ちん、硬くて、太くて……あっ、はっ……はぁ……いっぱい擦れてますっ……<emoji=heart04>」"
translation = "「자지, 단단하고, 굵어서…… 앗, 핫…… 하아…… 잔뜩 쓸리고 있어요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「んんっ、はぁっ、あん……はぁ、あっ、あ……<emoji=heart04>\u3000先生、気持ちいいっ……ふぁ、あ……あぁんっ<emoji=heart04>」"
translation = "「응읏, 하앗, 앙…… 하아, 앗, 아……<emoji=heart04> 선생님, 기분 좋아…… 하아, 아…… 아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マグダレナさんの中でペニスが脈打ち、先走りを吐き出して愛液と混じり合う。"
translation = "막달레나 씨의 안에서 페니스가 맥동하며, 쿠퍼액을 뱉어내 애액과 뒤섞인다."

[[dialogue]]
speaker = "unk"
original = "下半身の奥で熱が圧縮され、解き放つ準備をするのがわかる。"
translation = "하반신 깊은 곳에서 열기가 압축되어, 해방할 준비를 하는 것이 느껴진다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「おち○ちん、ドクドクして……はぁっ、あっ、あっ……ふあぁ、あっ……ぁん……<emoji=heart04>」"
translation = "「자지, 움찔움찔하며…… 하앗, 앗, 앗…… 후아아, 앗…… 앙……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ふぁああ～～っ<emoji=heart04>\u3000それ、深い……先生のおま○こ、ズンズンされてますっ……<emoji=heart04>\u3000はぁ……んんっ……<emoji=heart04>」"
translation = "「후아아아~~<emoji=heart04> 그거, 깊어…… 선생님의 보지, 쿡쿡 찔리고 있어요……<emoji=heart04> 하아…… 응읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "突き入れた衝撃で胸が重そうに揺れて、視覚からも情欲を刺激する。"
translation = "찔러 넣는 충격으로 가슴이 무겁게 흔들려, 시각적으로도 정욕을 자극한다."

[[dialogue]]
speaker = "unk"
original = "ゆさゆさと揺れる乳房があまりに煽情的で、見ているだけでも射精してしまいそうなぐらいだ。"
translation = "흔들흔들 흔들리는 유방이 너무나 선정적이어서, 보고 있는 것만으로도 사정해 버릴 것만 같다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「あっ、そこ……出っ張ってるところが、当たって……んんっ……<emoji=heart04>\u3000はぁっ、はぁ……はっ、はぁ……<emoji=heart04>」"
translation = "「앗, 거기…… 튀어나온 곳이, 닿아서…… 응읏……<emoji=heart04> 하앗, 하아…… 핫, 하아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「んんっ……はぁっ、あ……はぁっ……声が、出てしまいますっ……ふぁっ、あぁ～～っ<emoji=heart04>」"
translation = "「응읏…… 하앗, 아…… 하앗…… 목소리가, 나와 버려요…… 하앗, 아아~~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "甘い嬌声が俺の興奮を増幅させる。"
translation = "달콤한 교성이 나의 흥분을 증폭시킨다."

[[dialogue]]
speaker = "unk"
original = "限界がまた近付き、俺の中の熱が爆発寸前に膨れ上がる。"
translation = "한계가 다시 다가오고, 내 안의 열기가 폭발 직전까지 부풀어 오른다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「んんっ……<emoji=heart04>\u3000おち○ちん、また震えて……ふっ、はぁ……あんっ<emoji=heart04>\u3000マグダレナ先生のおま○こ、そんなに気持ちいいですか？」"
translation = "「응읏……<emoji=heart04> 자지, 또 떨려서…… 훗, 하아…… 앙<emoji=heart04> 막달레나 선생님의 보지, 그렇게 기분 좋나요?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「はい、マグダレナ先生のおま○こ、すごく気持ちいいです……っ。俺のおち○ちんも気持ちいいですか？」"
translation = "「네, 막달레나 선생님의 보지, 정말 기분 좋아요……. 제 자지도 기분 좋나요?」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「あっ、はんっ──はい……っ<emoji=heart04>\u3000ふはっ、はっ……はぁ……<emoji=heart04>\u3000あなたのおち○ちん、出たり入ったりして、気持ちいいです<emoji=heart04>」"
translation = "「앗, 항── 네……<emoji=heart04> 후핫, 핫…… 하아……<emoji=heart04> 당신의 자지, 들어왔다 나갔다 해서, 기분 좋아요<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「あっ、はっ、んんっ……先生のおま○こ、とっても気持ち良くなってますっ……<emoji=heart04>\u3000あんっ……はっ、はぁっ……<emoji=heart04>」"
translation = "「앗, 핫, 응읏…… 선생님의 보지, 너무 기분 좋아졌어요……<emoji=heart04> 앙…… 핫, 하앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "羞恥に頬を赤く染めながら、痴態をさらすマグダレナさん。"
translation = "수치심에 뺨을 붉게 물들이며, 치태를 드러내는 막달레나 씨."

[[dialogue]]
speaker = "unk"
original = "しかしその恥すら快感に変えて、ますます艶っぽい声でよがる。"
translation = "하지만 그 부끄러움조차 쾌감으로 바꾸어, 더욱 요염한 목소리로 신음한다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「んんん～～っ<emoji=heart04>\u3000はぁ……はっ、はぁっ……<emoji=heart04>\u3000あっ、あっ、あっ……あんっ<emoji=heart04>」"
translation = "「응응응~~<emoji=heart04> 하아…… 핫, 하앗……<emoji=heart04> 앗, 앗, 앗…… 앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "燃えるような情欲に衝き動かされて、よがる彼女の唇を奪う。"
translation = "타오르는 듯한 정욕에 이끌려, 신음하는 그녀의 입술을 빼앗는다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「んんっ……<emoji=heart04>\u3000ちゅっ、ちゅるるっ……くちゅっ……んちゅるっ、ちゅぱっ、んっ……<emoji=heart04>\u3000キス、激しいです……ちゅっ、ちゅっ、ちゅぅっ<emoji=heart04>」"
translation = "「응읏……<emoji=heart04> 츄, 츄르르…… 쿠츄…… 응츄르, 츄파, 응……<emoji=heart04> 키스, 격렬해요…… 츄, 츄, 츄우<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「はぁ、あっ、んっ……ちゅぅっ、ちゅるるっ<emoji=heart04>\u3000キスしながら、突かれて……んふっ、んちゅるっ、じゅるるっ<emoji=heart04>」"
translation = "「하아, 앗, 응…… 츄우, 츄르르<emoji=heart04> 키스하면서, 찔려져서…… 응훗, 응츄르, 쥬르르<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「気持ち、いいっ……<emoji=heart04>\u3000はあぁっ、あっ、はっ……はんっ……<emoji=heart04>\u3000おち○ちん、好きっ……あっ、はぁんっ……<emoji=heart04>」"
translation = "「기분, 좋아……<emoji=heart04> 하아앗, 앗, 핫…… 항……<emoji=heart04> 자지, 좋아…… 앗, 하앙……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "快楽をより欲する淫らな姿に本能が沸き立ち、スパートをかけた。"
translation = "쾌락을 더욱 갈구하는 음란한 모습에 본능이 끓어올라, 스퍼트를 올렸다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「はぁ、はっ……はっ、はっ、はんっ<emoji=heart04>\u3000すごいです……ぁ……あん……ふぁ、あぁんっ<emoji=heart04>\u3000気持ちいところ、擦れて……ひぁああっ<emoji=heart04>」"
translation = "「하아, 핫…… 핫, 핫, 항<emoji=heart04> 굉장해요…… 아…… 앙…… 하아, 아앙<emoji=heart04> 기분 좋은 곳, 쓸려서…… 히아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "守護天使であるマグダレナさんが、俺のペニスではしたなく喘いでいる。"
translation = "수호천사인 막달레나 씨가, 나의 페니스에 상스럽게 헐떡이고 있다."

[[dialogue]]
speaker = "unk"
original = "その痴態に情欲が燃え上がり、全力で肉棒を打ち付ける。"
translation = "그 치태에 정욕이 불타올라, 전력으로 육봉을 내리친다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ひやぁああっ！？\u3000奥、当たってっ……んんっ<emoji=heart04>\u3000はっ、あっ、あっ、あんっ……<emoji=heart04>」"
translation = "「히야아아앗!? 안쪽, 닿아서…… 응읏<emoji=heart04> 핫, 앗, 앗, 앙……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ふあぁっ、はぁっ、ぁんっ……<emoji=heart04>\u3000もっと、もっとぉ……私のおま○こ、たくさん使ってください……もっとぉ……っ<emoji=heart04>」"
translation = "「후아앗, 하앗, 앙……<emoji=heart04> 더, 더어…… 제 보지, 잔뜩 써주세요…… 더어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "全力で腰を振っていると、マクダレナさんの体を使って自慰をしているみたいだ。"
translation = "전력으로 허리를 흔들고 있으니, 막달레나 씨의 몸을 이용해 자위하고 있는 것만 같다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「はぁっ、あっ……はっ、はんっ……<emoji=heart04>\u3000すごい、ですっ……ふぁっ、はぁ……あっ、はっ、はんっ……<emoji=heart04>」"
translation = "「하앗, 앗…… 핫, 항……<emoji=heart04> 굉장, 해요…… 하앗, 하아…… 앗, 핫, 항……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "けれど彼女の表情は快楽に歪み、口から漏れるのは艶めかしい声だけだ。"
translation = "하지만 그녀의 표정은 쾌락에 일그러지고, 입에서 새어 나오는 것은 요염한 목소리뿐이다."

[[dialogue]]
speaker = "unk"
original = "ペニスを前後に動かす度に、ずぶ濡れになった性器からジュプジュプと卑猥な音が響く。"
translation = "페니스를 앞뒤로 움직일 때마다, 흠뻑 젖은 성기에서 쥬퓩쥬퓩 음란한 소리가 울린다."

[[dialogue]]
speaker = "unk"
original = "他に誰もいない保健室に二人きり、緊張と背徳をスパイスにしながら、男と女の営みに没頭する。"
translation = "아무도 없는 보건실에 둘이서만, 긴장과 배덕을 조미료 삼아 남녀의 행위에 몰두한다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「おっぱいも、もっと……はぁ、あ……私のおっぱい、揉みくちゃにしてくださいっ……<emoji=heart04>」"
translation = "「가슴도, 더…… 하아, 아…… 제 가슴, 엉망진창으로 주물러 주세요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "求められるがまま、潰れるんじゃないかと思うほど強く握る。"
translation = "원하는 대로, 으스러지지 않을까 싶을 정도로 강하게 쥔다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「んん～～っ<emoji=heart04><emoji=heart04>」"
translation = "「응응~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "痛みではなく快感に悶えるマグダレナさん。"
translation = "고통이 아니라 쾌감에 몸부림치는 막달레나 씨."

[[dialogue]]
speaker = "unk"
original = "豊満な胸を揉みしだきながら、ギンギンに硬くなったペニスを思い切り突き入れ続ける。"
translation = "풍만한 가슴을 주무르면서, 팽팽하게 단단해진 페니스를 힘껏 계속 찔러 넣는다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ひぁああっ、あっ、あんっ<emoji=heart04>\u3000胸と、おま○こ一緒にされて……ふわぁっ、あぁっ……<emoji=heart04>\u3000んんっ……はぁっ、はっ……はぁんっ……<emoji=heart04>」"
translation = "「히아아앗, 앗, 앙<emoji=heart04> 가슴이랑, 보지 같이 당해서…… 후아앗, 아아……<emoji=heart04> 응읏…… 하앗, 핫…… 하앙……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「マグダレナさんはエッチな先生ですね」"
translation = "「막달레나 씨는 야한 선생님이네요.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「っ！？」"
translation = "「!?」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「は、はいっ……マグダレナ先生は、エッチな先生ですっ<emoji=heart04>\u3000いやらしい先生でごめんなさいっ<emoji=heart04>\u3000でもおち○ちん気持ちいいんですっ<emoji=heart04>」"
translation = "「하, 하잇…… 막달레나 선생님은, 야한 선생님이에요<emoji=heart04> 음란한 선생님이라서 죄송해요<emoji=heart04> 하지만 자지 기분 좋은걸요<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「はぁっ……はぁっ、はっ……ぁんっ<emoji=heart04>\u3000おま○こいっぱいズボズボされてっ、気持ちいいっ<emoji=heart04>」"
translation = "「하앗…… 하앗, 핫…… 앙<emoji=heart04> 보지 잔뜩 퍽퍽 당해서, 기분 좋아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "言葉でなじられ、羞恥に染まりながらもますます快楽のボルテージが上がっていく。"
translation = "말로 매도당하며 수치에 물들면서도 더욱더 쾌락의 볼티지가 올라간다."

[[dialogue]]
speaker = "unk"
original = "生産された精が尿道を上ってきて、トドメとばかりに亀頭で子宮口を突き上げる。"
translation = "생산된 정액이 요도를 타고 올라와, 마무리를 짓듯 귀두로 자궁구를 찔러 올린다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ひやぁっ、はぁっ……あ、あんっ<emoji=heart04>\u3000ごめんなさいっ、マグダレナ先生はいやらしい先生ですっ……<emoji=heart04>」"
translation = "「히야앗, 하앗…… 아, 앙<emoji=heart04> 죄송해요, 막달레나 선생님은 음란한 선생님이에요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「はぁっ、はっ、はんっ……いやらしいマグダレナ先生をもっと気持ち良くしてください……<emoji=heart04>」"
translation = "「하앗, 핫, 항…… 음란한 막달레나 선생님을 더 기분 좋게 해주세요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ひぁああっ<emoji=heart04>\u3000あ、んああっ<emoji=heart04>\u3000はっ、はっ……んん～～っ<emoji=heart04>\u3000ふぁっ、はっ、はんっ<emoji=heart04>」"
translation = "「히아아앗<emoji=heart04> 아, 응아앗<emoji=heart04> 핫, 핫…… 응응~~<emoji=heart04> 하앗, 핫, 항<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "前兆を知らせるように粘膜がひくひくと震える。"
translation = "전조를 알리듯 점막이 파르르 떨린다."

[[dialogue]]
speaker = "unk"
original = "そして俺も限界を迎え、熱く滾るものをマグダレナさんの中で解き放った。"
translation = "그리고 나도 한계를 맞이하여, 뜨겁게 끓어오르는 것을 막달레나 씨의 안에서 해방했다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ああぁ──────」"
translation = "「아아아──────」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ふっ――んんぁあああ～～～っ<emoji=heart04><emoji=heart04>\u3000はっ……あ……んんっ……<emoji=heart04>」"
translation = "「훗── 응응아아아아~~~<emoji=heart04><emoji=heart04> 핫…… 아…… 응읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "柔らかく包んでいた膣がぎゅっと収縮して、搾り取るようにペニスを締め付ける。"
translation = "부드럽게 감싸고 있던 질이 꽉 수축하며, 짜내듯이 페니스를 조인다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「んんっ……はっ……あんっ……<emoji=heart04>\u3000おち○ちんがドクドクして……はぁ……熱いの、入ってきてますっ……<emoji=heart04>」"
translation = "「응읏…… 핫…… 앙……<emoji=heart04> 자지가 움찔움찔하며…… 하아…… 뜨거운 거, 들어오고 있어요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "多幸感と官能が入り混じった表情で射精を受け止めるマグダレナさん。"
translation = "다행감과 관능이 뒤섞인 표정으로 사정을 받아내는 막달레나 씨."

[[dialogue]]
speaker = "unk"
original = "俺は歯を食いしばりながら、ぐっと力を込めて天使の中へと注ぎ続ける。"
translation = "나는 이를 악물면서, 꾹 힘을 주어 천사의 안으로 계속 쏟아붓는다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ふあぁ……はっ……まだ、出て……はぁ、あっ……あんっ……<emoji=heart04>」"
translation = "「후아아…… 핫…… 아직, 나오고…… 하아, 앗…… 앙……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そして子宮にたっぷりと精を飲ませ、ようやく射精が終わった。"
translation = "그리고 자궁에 듬뿍 정액을 마시게 하고서야, 겨우 사정이 끝났다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ふぅ……おち○ちんスッキリしましたか？」"
translation = "「후우…… 자지 시원해졌나요?」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「……なんて、ふざけすぎでしたかね。ふふっ」"
translation = "「……라니, 너무 장난쳤나요. 후훗.」"

[[dialogue]]
speaker = "unk"
original = "まだ熱っぽさが抜けない顔で、いたずらっぽく微笑むマグダレナさん。"
translation = "아직 열기가 가시지 않은 얼굴로, 장난스럽게 미소 짓는 막달레나 씨."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「エッチまでできるなんて、さすがアニマ様の作られた体はよくできていますね」"
translation = "「섹스까지 할 수 있다니, 역시 아니마 님이 만드신 몸은 잘 만들어졌네요.」"

[[dialogue]]
speaker = "unk"
original = "しかし精巧に作られている分、睡眠や食事、それに排泄も必要なんだとか。"
translation = "하지만 정교하게 만들어진 만큼, 수면이나 식사, 그리고 배설도 필요하다고 한다."

[[dialogue]]
speaker = "unk"
original = "人と同じ営みができるのは、不便でもあるということだ。"
translation = "인간과 같은 생활을 할 수 있다는 것은, 불편하기도 하다는 뜻이다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「え？\u3000先生プレイをどこで覚えたか……？\u3000それはまぁ……秘密です」"
translation = "「에? 선생님 플레이를 어디서 배웠냐고요……? 그건 뭐…… 비밀입니다.」"

[[dialogue]]
speaker = "unk"
original = "やりすぎを恥じるような照れ笑いがかわいい。"
translation = "지나친 장난을 부끄러워하는 듯한 수줍은 미소가 귀엽다."

[[dialogue]]
speaker = "unk"
original = "けれど少しだけ真面目な声になって――"
translation = "하지만 조금 진지한 목소리가 되어──"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「愛し合う男と女は交わるものと存じます。ですから……私とあなたの領域を深く重ねたかったのです」"
translation = "「사랑하는 남녀는 맺어지는 것이라 생각합니다. 그러니까…… 저와 당신의 영역을 깊게 겹치고 싶었습니다.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「守護天使なのにふしだらと思われたかもしれませんね」"
translation = "「수호천사인데 천박하다고 생각하셨을지도 모르겠네요.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そんなことはないです。俺だって同じことを思っていましたから」"
translation = "「그렇지 않아요. 저도 같은 생각을 하고 있었으니까요.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ですが、聞けばもっとすごいプレイもあるとか。興味がないと言えばウソになってしまいますね」"
translation = "「하지만, 듣자하니 더 대단한 플레이도 있다더군요. 관심이 없다고 하면 거짓말이겠죠.」"

[[dialogue]]
speaker = "unk"
original = "俺もマグダレナさんといろんなことがしてみたい。"
translation = "나도 막달레나 씨와 여러 가지 일을 해보고 싶다."

[[dialogue]]
speaker = "unk"
original = "はにかむ守護天使様にキスで返事をする。"
translation = "수줍어하는 수호천사님께 키스로 대답을 대신한다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「んっ……ちゅっ、ちゅぅっ<emoji=heart04>\u3000はぁ……んちゅっ、ちゅるる<emoji=heart04>」"
translation = "「응읏…… 츄, 츄우<emoji=heart04> 하아…… 응츄, 츄르르<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ちゅるっ、ちゅっ……ちゅぱ、ちゅるるっ<emoji=heart04>\u3000ふはぁ……れるれる、ちゅっ、じゅるる……んふぅ……<emoji=heart04>」"
translation = "「츄르, 츄…… 츄파, 츄르르<emoji=heart04> 후하아…… 레로레로, 츄, 쥬르르…… 응후……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "軽くするつもりがまたスイッチが入ってしまって、唇がふやけるぐらいキスが続いたのだった。"
translation = "가볍게 할 생각이었는데 다시 불이 붙어버려서, 입술이 불어날 정도로 키스가 이어졌던 것이었다."

