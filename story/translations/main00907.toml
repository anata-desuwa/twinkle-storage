[[dialogue]]
speaker = "unk"
original = "第９話,ボン・ボヤージュ,B"
translation = "제9화, 봉 보야주, B"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──オオオオオオオオッッ！」"
translation = "「──오오오오오오오오옷!」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「っ……！」"
translation = "「윽……!」"

[[dialogue]]
speaker_original = "カヤ"
speaker_translation = "카야"
original = "「先ほどの比ではない出力を確認──」"
translation = "「방금 전과 비교할 수 없는 출력을 확인──」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「フ──いくらか成長はしたようだな」"
translation = "「흐── 어느 정도 성장은 한 모양이군」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「緋宮くん……」"
translation = "「히노미야 군……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "（凄まじい鬼気……前会長の抜けた分まで奮闘しているような……）"
translation = "（엄청난 귀기…… 전 회장님이 빠진 몫까지 분투하고 있는 듯한……）"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──ふぅ……」"
translation = "「──후우……」"

[[dialogue]]
speaker = "unk"
original = "みなぎっていた全身の力が抜けていく。それは抑えつけていた自分への怒りだったのかもしれない。"
translation = "넘쳐흐르던 전신의 힘이 빠져나간다. 그것은 억눌러왔던 자신에 대한 분노였을지도 모른다."

[[dialogue]]
speaker = "unk"
original = "ともあれ、ヴィーナスのいないフォーメーションで奮闘した俺たちは──彼女たちへ力を示してみせた。"
translation = "어쨌든, 비너스가 없는 포메이션으로 분투한 우리는── 그녀들에게 힘을 보여주었다."

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「くくくっ──なるほどな」"
translation = "「크크큭── 과연 그렇군」"

[[dialogue]]
speaker = "unk"
original = "クラウディアと名乗った少女は、どこか満足したように魔法杖をしまう。"
translation = "클라우디아라고 자칭한 소녀는, 어딘가 만족한 듯 마법 지팡이를 넣는다."

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「うむ！\u3000実に昂ぶる戦いであったぞ！\u3000余は満足だ、これをもってお主らを合格としよう！」"
translation = "「음! 실로 흥분되는 싸움이었다! 여는 만족한다, 이것으로 그대들을 합격으로 하겠다!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「姫にこれ以上暴れられては、基地の方が持ちませんからね」"
translation = "「공주님께서 이 이상 날뛰시면, 기지가 버티지 못하니까요」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「はっはっは。しかしせーとかいというのも中々やるのう、余は驚いたぞ！」"
translation = "「핫핫하. 하지만 성도회라는 것도 꽤 하는구나, 여는 놀랐다!」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「彼らも毎日<ruby>研鑽<rt>けんさん</rt></ruby>を積んでいるようですから。私も負けてはいられませんね……！」"
translation = "「그들도 매일 연마를 쌓고 있는 듯하니까요. 저도 지고 있을 수만은 없겠네요……!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "（にしては、全然へばってないようですけど……）"
translation = "（그렇다고 하기엔, 전혀 지치지 않은 것 같습니다만……）"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "（やはり底知れませんね。魔女の総帥──）"
translation = "（역시 속을 알 수 없군요. 마녀의 총수──）"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「──では。改めて、あなた方──魔女の経路をお借りしてもよろしいでしょうか？」"
translation = "「──그러면. 다시 한번, 당신들── 마녀의 경로를 빌려도 괜찮겠습니까?」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「うむ。好きに使うがよいぞ」"
translation = "「음. 마음껏 쓰는 것이 좋다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「セドナさんも──それでいいでしょうか？」"
translation = "「세드나 씨도── 그걸로 괜찮으실까요?」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「……ああ。いいだろう。姫の決めたことだ、異存はない」"
translation = "「……아아. 좋다. 공주가 결정한 일이다, 이의는 없다」"

[[dialogue]]
speaker = "unk"
original = "セドナさんにとってもかの少女は上役であるのか、あっさりと許諾してくれた。"
translation = "세드나 씨에게도 저 소녀는 상사인 것인지, 순순히 허락해 주었다."

[[dialogue]]
speaker = "unk"
original = "これで……"
translation = "이것으로……"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「今回限りの特例だ。今から『うろ』を通じて貴様らを魔界へ送ってやる」"
translation = "「이번 한정의 특례다. 지금부터 『빈 구멍』을 통해 너희들을 마계로 보내주겠다」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ただし連れていけるのは『６人』までだ──この場でメンバーを決めろ。３分待ってやる」"
translation = "「단 데려갈 수 있는 건 『6명』까지다── 이 자리에서 멤버를 정해라. 3분 기다려 주겠다」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「さ、３分だけでありますか！？」"
translation = "「사, 3분뿐인 것입니까!?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「それに今すぐって──人間界を離れるんだったら、準備とか……！」"
translation = "「게다가 지금 당장이라니── 인간계를 떠나는 거라면, 준비라든가……!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「準備だ？\u3000腑抜けたことを抜かすな。常在戦場──仮にも騎士を名乗るのなら、覚悟に<ruby>暇<rt>いとま</rt></ruby>など不要」"
translation = "「준비? 정신 빠진 소리를 지껄이지 마라. 상재전장── 설령 기사를 자처하는 것이라면, 각오에 겨를 따윈 불필요」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「第一、貴様らには火急の用があるのだろうが。すぐに支度をしてやるだけこちらの親切心と思え」"
translation = "「첫째, 너희들에게는 화급한 용무가 있을 것 아닌가. 당장 채비를 해주는 것만으로 이쪽의 친절이라고 생각해라」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……ああ。早く向かえるに越したことはない──すぐにでも話し合って決めさせてもらう」"
translation = "「……아아. 빨리 향할 수 있는 게 제일이다── 당장이라도 상의해서 결정하도록 하겠다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「何人かは確定ですね」"
translation = "「몇 명은 확정되었네요」"

[[dialogue]]
speaker = "unk"
original = "そうして俺たちは選抜メンバーを選ぶことにした。"
translation = "그렇게 우리는 선발 멤버를 고르기로 했다."

[[dialogue]]
speaker = "unk"
original = "行き先は魔界──待ち構えるは霊力を操る未曾有の大敵。危険な行軍になることは必至だ。"
translation = "행선지는 마계── 기다리고 있는 것은 영력을 조종하는 미증유의 대적. 위험한 행군이 될 것은 필연이다."

[[dialogue]]
speaker = "unk"
original = "まずは俺とフィオナ──"
translation = "우선은 나와 피오나──"

[[dialogue]]
speaker = "unk"
original = "どちらも星徒会を率いる会長で、また流れる<b>血筋</b>からしても必須の戦力と判断された。"
translation = "둘 다 성도회를 이끄는 회장이며, 또한 흐르는 <b>혈통</b>으로 보아도 필수적인 전력이라고 판단되었다."

[[dialogue]]
speaker = "unk"
original = "そしてサーシャ先輩とソフィアちゃん──奏姉妹。"
translation = "그리고 사샤 선배와 소피아짱── 카나데 자매."

[[dialogue]]
speaker = "unk"
original = "魔界生まれの魔族である彼女たちもまた、今回の旅には欠かせない要員だった。"
translation = "마계 태생의 마족인 그녀들 역시, 이번 여행에는 빠뜨릴 수 없는 요원이었다."

[[dialogue]]
speaker = "unk"
original = "そして残る２人にはマトイとユウリ──"
translation = "그리고 남은 2명은 마토이와 유우리──"

[[dialogue]]
speaker = "unk"
original = "属性的にも、足りないサポートを補う形だ。"
translation = "속성적으로도, 부족한 서포트를 보충하는 형태다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──この６人で行く。みんな、頼んだ」"
translation = "「──이 6명으로 간다. 모두, 부탁한다」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「承知した。アイリーン、終着点の設定をしておいてやれ」"
translation = "「알겠다. 아이린, 종착점 설정을 해두어라」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「はい──比較的安全な地帯へお送りいたします」"
translation = "「네── 비교적 안전한 지대로 보내드리겠습니다」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「っしゃあ！\u3000ヴィーナスのためにも気合入れてくぞ！」"
translation = "「좋았어! 비너스를 위해서라도 기합 넣고 간다!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（私で大丈夫かな……？\u3000ううん、でもヴィーナスだって頑張ってるんだから、私だって……！）"
translation = "（내가 괜찮을까……? 아니, 하지만 비너스도 힘내고 있으니까, 나도……!）"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「こんな形で魔界へ帰ることになるなんて……」"
translation = "「이런 식으로 마계로 돌아가게 될 줄이야……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふ。頑張りましょうね、ソフィ♪」"
translation = "「후후. 힘내자, 소피♪」"

[[dialogue]]
speaker = "unk"
original = "魔界選抜６人──"
translation = "마계 선발 6인──"

[[dialogue]]
speaker = "unk"
original = "俺たちはしばらく人間界からお別れし、未知の世界を突き進む。"
translation = "우리는 잠시 인간계와 작별하고, 미지의 세계를 헤쳐나간다."

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「ワガハイを忘れるなニャン！\u3000６人と１匹だニャン！」"
translation = "「나 님을 잊지 마라 냥! 6명과 1마리다 냥!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「シリアスが崩れるんだよ、おまえ」"
translation = "「진지함이 깨지잖아, 너」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ルリエル、セーラさん──しばらく学園を空けることになりますが、留守をよろしくお願いいたします」"
translation = "「루리엘, 세라 씨── 잠시 학원을 비우게 되겠습니다만, 부재중을 잘 부탁드립니다」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「──もちろんです！\u3000流星市国……いえ人間界の平和はわたし達が守ります！」"
translation = "「──물론입니다! 유성 시국…… 아니 인간계의 평화는 저희가 지키겠습니다!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「うんうん。プリマステラの子たちにも協力してもらうし──滅多なことがなければ大丈夫だって」"
translation = "「응응. 프리마 스텔라 아이들에게도 협력받을 거고── 별일 없으면 괜찮을 거야」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「アナも頼んだ。魔界に行ったら俺も連絡が取れなくなる──必要なら先生たちを頼ってくれ」"
translation = "「아나도 부탁한다. 마계에 가면 나도 연락이 끊길 거야── 필요하다면 선생님들을 의지해 줘」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はい。アニマ先輩と一緒に、別ルートでの捜索も視野に入れておきます」"
translation = "「네. 아니마 선배와 함께, 다른 루트에서의 수색도 시야에 넣어 두겠습니다」"

[[dialogue]]
speaker = "unk"
original = "これで準備は整った。"
translation = "이것으로 준비는 갖춰졌다."

[[dialogue]]
speaker = "unk"
original = "後はただ、魔界へ行ってヴィーナスの身柄を救出するのみ。"
translation = "남은 것은 그저, 마계로 가서 비너스의 신병을 구출하는 것뿐."

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「セット完了──『世界樹のうろ』は正確に魔界へ繋がりました。いつでも行けます」"
translation = "「세트 완료── 『세계수의 빈 구멍』은 정확히 마계로 연결되었습니다. 언제든지 가실 수 있습니다」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「よし。順番に並べ、もたもたするな！」"
translation = "「좋아. 순서대로 서라, 꾸물거리지 마라!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「は、はいぃ！？」"
translation = "「네, 네에엣!?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "（魔界と言っても広大ですが、どちらへ出るのでしょうか……？）"
translation = "（마계라고 해도 광대합니다만, 어디로 나가게 될까요……?）"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……さすがにドキドキしてきましたね」"
translation = "「……역시 두근거리기 시작했네요」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「覚悟を決めるしかないわね。平気、会長くん？」"
translation = "「각오를 다지는 수밖에 없겠지. 괜찮아, 회장 군?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ええ。こんなにも速やかに手配してくれて──ありがたい限りですよ」"
translation = "「예. 이렇게나 신속하게 준비해 주셔서── 감사할 따름입니다」"

[[dialogue]]
speaker = "unk"
original = "俺の胸はどんな緊張よりも喜びに満ちていた。"
translation = "내 가슴은 어떤 긴장보다도 기쁨으로 가득 차 있었다."

[[dialogue]]
speaker = "unk"
original = "これでヴィーナスに近づける──そう思うと、武者震いさえ湧いてきた。"
translation = "이것으로 비너스에게 다가갈 수 있다── 그렇게 생각하니, 무사시(武者震い)까지 솟아났다."

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「『<ruby>世界樹<rt>ユグドラシル</rt></ruby>』起動──目標は魔界Ⅳ－Ｒ１３地点！\u3000<ruby>良き旅を<rt>ボン・ボヤージュ</rt></ruby>！」"
translation = "「『세계수』 기동── 목표는 마계 IV-R13 지점! 좋은 여행을!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（待っていてくれ──ヴィーナス！）"
translation = "（기다려 줘── 비너스!）"

