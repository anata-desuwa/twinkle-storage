[[dialogue]]
speaker = "unk"
original = "第１２話,梨緒とベアト,B"
translation = "제12화, 리오와 베아토"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「っ……はぁ……」"
translation = "「윽…… 하아……」"

[[dialogue]]
speaker = "unk"
original = "流星市国・新市街の広場。その中央に造られたモニュメントは、三界の調和をイメージしているのだとか。"
translation = "유성시국·신시가지 광장. 그 중앙에 세워진 모뉴먼트는 삼계의 조화를 이미지한 것이라고 한다."

[[dialogue]]
speaker = "unk"
original = "その片隅で、梨緒は痛みに顔を歪めていた。"
translation = "그 한구석에서 리오는 고통에 얼굴을 일그러뜨리고 있었다."

[[dialogue]]
speaker = "unk"
original = "庇うように押さえた腕からは、ポタポタと血が雫となって垂れている。"
translation = "감싸듯 억누른 팔에서는 피가 뚝뚝 방울져 떨어지고 있다."

[[dialogue]]
speaker = "unk"
original = "そこに現れたのは──"
translation = "그곳에 나타난 것은──"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「はぁはぁ、梨緒ちゃん、大丈夫！？」"
translation = "「하아 하아, 리오짱, 괜찮아!?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「待っていたぞ、ベアト」"
translation = "「기다리고 있었다, 베아토.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「え──」"
translation = "「에──」"

[[dialogue]]
speaker = "unk"
original = "ベアトリスが意表を突かれて目を見開く。"
translation = "베아트리스가 허를 찔려 눈을 크게 뜬다."

[[dialogue]]
speaker = "unk"
original = "梨緒は表情を強張らせながらも、真っ直ぐベアトリスを見つめていた。"
translation = "리오는 표정을 굳히면서도 똑바로 베아트리스를 바라보고 있었다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「騙して悪いが、この傷はナターシャがつけたものだ」"
translation = "「속여서 미안하지만, 이 상처는 나타샤가 낸 거야.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「吸血鬼は嗅覚が鋭いと聞いた。そして血の匂いには特別敏感だとも」"
translation = "「흡혈귀는 후각이 예민하다고 들었어. 그리고 피 냄새에는 특별히 민감하다고도.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だから私の血の匂いを感じれば、君が来ると思った。君の優しさを利用させてもらった」"
translation = "「그래서 내 피 냄새를 느끼면 네가 올 거라고 생각했지. 네 상냥함을 이용했어.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「そ、そうなんだ……大丈夫なんだね……」"
translation = "「그, 그렇구나…… 다행이다……」"

[[dialogue]]
speaker = "unk"
original = "予想外の出来事に、困惑と安堵が混ざったような表情を浮かべるベアトリス。"
translation = "예상치 못한 사태에 당혹감과 안도감이 섞인 듯한 표정을 짓는 베아트리스."

[[dialogue]]
speaker = "unk"
original = "その顔には涙の跡が浮かんでいた。"
translation = "그 얼굴에는 눈물 자국이 남아 있었다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（赦すとか、受け入れるとか、難しいことは私にはまだわからない……それでも……！）"
translation = "(용서한다거나, 받아들인다거나, 어려운 건 나도 아직 모르겠어…… 그래도……!)"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ごめん、また梨緒ちゃんの前に現れちゃったね。私はもういない方がいいって言ったのに……」"
translation = "「미안해, 또 리오짱 앞에 나타나 버렸네. 나는 이제 없는 게 좋다고 말했는데……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「じゃあね、梨緒ちゃん──」"
translation = "「그럼 안녕, 리오짱──」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「行くな、ベアト！」"
translation = "「가지 마, 베아토!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「──！？」"
translation = "「──!?」"

[[dialogue]]
speaker = "unk"
original = "背中を向けようとするベアトリスを、梨緒の声が引き留める。"
translation = "등을 돌리려는 베아트리스를 리오의 목소리가 붙잡는다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「敵か味方かよりも、もう仲間を失いたくない。君を失いたくない」"
translation = "「적인지 아군인지보다, 더 이상 동료를 잃고 싶지 않아. 너를 잃고 싶지 않아.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だから待ってくれ。もう一度話をしよう」"
translation = "「그러니까 기다려 줘. 다시 한번 이야기하자.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「梨緒ちゃん……」"
translation = "「리오짱……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「君が何のためにアルタイルに来て、新星学園に入ったのか。事情があるなら知りたい」"
translation = "「네가 무엇을 위해 알타이르에 왔고, 신성학원에 들어왔는지. 사정이 있다면 알고 싶어.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ベアトが私たちを騙して、裏でほくそ笑んでたとは思っていない」"
translation = "「베아토가 우리를 속이고 뒤에서 비웃고 있었다고는 생각하지 않아.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「でも敵だったら敵でいい。騙していたのならそれでいい。だけど君の言葉で言ってくれないと納得しない」"
translation = "「하지만 적이라면 적이어도 좋아. 속이고 있었다면 그걸로 됐어. 하지만 네 입으로 말해주지 않으면 납득할 수 없어.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だからベアトが何のために戦っているのか、私に教えてほしい」"
translation = "「그러니까 베아토가 무엇을 위해 싸우고 있는지, 나에게 가르쳐 줘.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「い、いいの……？」"
translation = "「괘, 괜찮은 거야……?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「私、何もできなかった。梨緒ちゃんを傷つけただけだった」"
translation = "「나, 아무것도 못 했어. 리오짱을 상처 입혔을 뿐이었어.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「それでも……情けないと思わない？」"
translation = "「그런데도…… 한심하다고 생각하지 않아?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「大丈夫だ、情けなさなら私も負けてない！」"
translation = "「괜찮아, 한심함이라면 나도 지지 않으니까!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ええっ！？」"
translation = "「에엣!?」"

[[dialogue]]
speaker = "unk"
original = "予想だにしなかった梨緒の返事に、ベアトリスが素っ頓狂な声を上げる。"
translation = "예상치 못한 리오의 대답에 베아트리스가 엉뚱한 소리를 내지른다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「負けて、負けて、負け続けて、世界まで滅ぼされて、それでもおめおめと生き残って、そんな私より情けないやつなんているか……！」"
translation = "「지고, 지고, 계속 져서 세계까지 멸망당하고, 그러고도 뻔뻔하게 살아남은 나보다 한심한 녀석이 어디 있겠어……!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「そ、そんなことないし、梨緒ちゃんは立派だと思うけど……」"
translation = "「그, 그렇지 않아, 리오짱은 훌륭하다고 생각하지만……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「でも……うん……梨緒ちゃんがそこまで言うのなら、私も……言うね」"
translation = "「하지만…… 응…… 리오짱이 그렇게까지 말한다면, 나도…… 말할게.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「私は、デネブもアルタイルも滅びない道を見つけたかった」"
translation = "「나는 데네브도 알타이르도 멸망하지 않는 길을 찾고 싶었어.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ルヴィは私に教えてくれた。デネブを守るには、アルタイルを滅ぼさなきゃいけない。それしかないって」"
translation = "「루비는 나에게 알려줬어. 데네브를 지키려면 알타이르를 멸망시켜야만 한다고. 그것밖에 없다고.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「どちらかを救うには、どちらかを見捨てないといけない。私はそれが嫌だった」"
translation = "「어느 한쪽을 구하려면 다른 한쪽을 저버려야만 해. 나는 그게 싫었어.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「吸血鬼はとっても生命力が強い種族なんだけど、ごくまれに虚弱体質で生まれることもあるの。それが私だった」"
translation = "「흡혈귀는 매우 생명력이 강한 종족이지만, 아주 드물게 허약 체질로 태어나는 경우도 있어. 그게 나였어.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「たまたま旅の人に助けられて、大きくなることができたけど、私は一族の中で見捨てられる側だった」"
translation = "「우연히 여행자에게 도움을 받아 성장할 수 있었지만, 나는 일족 안에서 버려지는 쪽이었어.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「私は見捨てられる側の心細さも、怖さも知ってる。だから私はアルタイルの人たちも見捨てたくないと思って……アルタイルへ向かった」"
translation = "「나는 버려지는 쪽의 불안함도, 무서움도 알고 있어. 그래서 나는 알타이르 사람들도 저버리고 싶지 않다고 생각해서…… 알타이르로 향했어.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ここを使えばきっとアルタイルに行ける……はず」"
translation = "「이곳을 통하면 분명 알타이르로 갈 수 있을…… 거야.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「魔界に伝わる伝承によれば……<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>に落ちた渡し守は、三界とは違う世界に行き、大きな力を手に入れた」"
translation = "「마계에 전해지는 전승에 따르면…… 경계의 호수에 빠진 뱃사공은 삼계와는 다른 세계로 가서 큰 힘을 얻었대.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「きっと鏡界の湖は、時空の穴に近いものだと思う。だからこの穴を超えれば……」"
translation = "「분명 경계의 호수는 시공의 구멍에 가까운 것이라고 생각해. 그러니까 이 구멍을 넘으면……」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「待ちなさい、ベアト」"
translation = "「기다리렴, 베아토.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ルヴィ！？\u3000どうしてここに……！？」"
translation = "「루비!? 어떻게 여기에……!?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「それはこっちのセリフよ。深夜に１人でこんなところに来てなんのつもり？」"
translation = "「그건 내가 할 대사야. 심야에 혼자서 이런 곳에 오다니 무슨 생각이지?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「私、思ったの。自分たちの世界を守るためでも、他の世界を犠牲にしたくないって」"
translation = "「나, 생각했어. 우리 세계를 지키기 위해서라도 다른 세계를 희생시키고 싶지 않다고.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「アルタイルに行けば、両方の世界を救う方法が何か見つかるかもしれない」"
translation = "「알타이르에 가면 양쪽 세계를 모두 구할 방법을 찾을 수 있을지도 몰라.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「だから私、アルタイルに行くよ」"
translation = "「그러니까 나, 알타이르에 갈게.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「な──！？\u3000言ったでしょう、これからアルタイルを滅ぼすって！\u3000それしかないのよ！？」"
translation = "「뭐──!? 말했잖아, 이제부터 알타이르를 멸망시킬 거라고! 그것밖에 없단 말이야!?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ルヴィを信じてないわけじゃないよ。でもルヴィも知らない方法が他にあるかもしれない」"
translation = "「루비를 믿지 않는 게 아니야. 하지만 루비도 모르는 방법이 따로 있을지도 몰라.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「だからって体ひとつでアルタイルに行くつもり？\u3000無茶だわ！」"
translation = "「그렇다고 맨몸으로 알타이르에 갈 셈이야? 무모해!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「時空の穴は簡単にコントロールできるものじゃない。アルタイルに辿り着くどころか、バラバラになるかもしれないわ」"
translation = "「시공의 구멍은 쉽게 제어할 수 있는 게 아니야. 알타이르에 도착하기는커녕 뿔뿔이 흩어질지도 모른다고.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「それでも行くよ。何もしないまま諦めるよりはマシだから」"
translation = "「그래도 갈게. 아무것도 안 하고 포기하는 것보다는 나으니까.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「──！\u3000穴が開いた！\u3000今なら！」"
translation = "「──! 구멍이 열렸다! 지금이라면!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「待ちなさい！\u3000どうしてもというなら力ずくで──」"
translation = "「기다려! 정 그렇다면 힘으로라도──」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ごめん！」"
translation = "「미안!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「くっ……！？\u3000ベアト！？」"
translation = "「큭……!? 베아토!?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「そうして、私はルヴィの制止を振り切って、時空の穴へと飛び込んだ」"
translation = "「그렇게 나는 루비의 제지를 뿌리치고 시공의 구멍으로 뛰어들었어.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「そしたらアルタイルの魔界……しかも鏡界の湖の近くに出ちゃって」"
translation = "「그랬더니 알타이르의 마계…… 그것도 경계의 호수 근처로 나오게 돼서.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「さらにその時モンスターが現れて、咄嗟に倒したら、流星市国への留学生だと勘違いされちゃって」"
translation = "「게다가 그때 몬스터가 나타나서 급히 쓰러뜨렸더니, 유성시국으로 온 유학생이라고 착각받아 버렸어.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「その流れで新星学園に入ることに……」"
translation = "「그 흐름대로 신성학원에 들어가게 된 거야……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「そして新星学園に入った私は、留学生を装いながら、デネブとアルタイル両方が生き残る道を探した」"
translation = "「그리고 신성학원에 들어간 나는 유학생인 척하면서 데네브와 알타이르 양쪽이 살아남을 길을 찾았어.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「最初、私がデネブから来たって言わなかったのは、アルタイルがどう考えているかわからなかったから」"
translation = "「처음에 내가 데네브에서 왔다고 말하지 않은 건, 알타이르가 어떻게 생각하고 있는지 몰랐기 때문이야.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「もしアルタイルがデネブのように、平行世界を犠牲にするつもりだったら、私の身に危険が及ぶ可能性があった」"
translation = "「만약 알타이르가 데네브처럼 평행세계를 희생시킬 생각이었다면 내 신변이 위험해질 가능성이 있었어.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「でもアルタイルはデネブと一緒に戦おうとした。だから本当のことを言えたはずなのに……」"
translation = "「하지만 알타이르는 데네브와 함께 싸우려 했어. 그래서 사실대로 말할 수 있었을 텐데……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「梨緒ちゃんやみんなに嫌われたくなくて、信じてもらえるか不安で……言えなかった」"
translation = "「리오짱이나 모두에게 미움받고 싶지 않아서, 믿어줄지 불안해서…… 말하지 못했어.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「私は、デネブもアルタイルも救いたかった。そのためにアルタイルに来た。そのはずなのに……」"
translation = "「나는 데네브도 알타이르도 구하고 싶었어. 그러기 위해 알타이르에 왔어. 그랬을 텐데……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「私は何もできなかった。２つの世界を救う方法なんて見つからなかったし、極星学園との戦いを止めることもできなかった」"
translation = "「나는 아무것도 하지 못했어. 두 세계를 구할 방법 같은 건 찾지 못했고, 극성학원과의 싸움을 멈추는 것도 불가능했어.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「もしこの気持ちが否定されたらと思うと怖くて、本当のことを言えなかった」"
translation = "「만약 이 마음이 부정당하면 어쩌나 싶어 무서워서 사실대로 말할 수 없었어.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「諦めない梨緒ちゃんを見習いたかったけど、ダメだった」"
translation = "「포기하지 않는 리오짱을 본받고 싶었지만 안 됐어.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「私が弱かったから、梨緒ちゃんを傷つけた」"
translation = "「내가 약했기 때문에 리오짱을 상처 입혔어.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ごめん……ごめんなさい……梨緒ちゃん」"
translation = "「미안해…… 미안해…… 리오짱.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「私……どうすればいいのかな……？」"
translation = "「나…… 어떻게 하면 좋을까……?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……先にひとつ言っておく」"
translation = "「……먼저 하나 말해둘게.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「何もできなくても、失敗しても、その気持ちがなかったことにはならない。それが間違ったことになるわけじゃない」"
translation = "「아무것도 못 했어도, 실패했어도, 그 마음이 없었던 일이 되지는 않아. 그게 잘못된 일이 되는 것도 아니야.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「少なくとも、私はそう思う」"
translation = "「적어도 나는 그렇게 생각해.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だから堂々としているんだ。私はデネブとアルタイル、２つの世界を救おうとしているんだって」"
translation = "「그러니까 당당하게 있어. 나는 데네브와 알타이르, 두 세계를 구하려고 하는 거라고.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ありがとう、ベアトリス。君の言葉で言ってくれて。私は君を信じる」"
translation = "「고마워, 베아트리스. 네 입으로 말해줘서. 나는 너를 믿어.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「確かに君は出自を偽っていた。今、私たちにとって極星学園は敵で、君はそこからやってきた」"
translation = "「확실히 너는 출신을 속이고 있었어. 지금 우리에게 극성학원은 적이고, 너는 그곳에서 왔지.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「それでも……私は君を赦す」"
translation = "「그래도…… 나는 너를 용서해.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「いいの……？」"
translation = "「괜찮은 거야……?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ああ。まぁ、赦すという言い方が適切かはわからないが……」"
translation = "「아아. 뭐, 용서한다는 표현이 적절할지는 모르겠지만……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「君は君なりにデネブとアルタイル、２つの世界を救おうとしていた。私もリクリエから世界を守りたいと思っている。君と私の目的は同じだ」"
translation = "「너는 너 나름대로 데네브와 알타이르, 두 세계를 구하려고 했어. 나도 리크리에로부터 세계를 지키고 싶어. 너와 나의 목적은 같아.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だから今後も、私と一緒に戦ってくれ」"
translation = "「그러니까 앞으로도 나와 함께 싸워줘.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「梨緒……ちゃん」"
translation = "「리오…… 짱.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「君は言ってくれたな。もし私が泣いていたら、その涙を拭ってくれると」"
translation = "「너는 말해줬지. 만약 내가 울고 있다면 그 눈물을 닦아주겠다고.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私はどうやら泣き虫のようだから……その約束を果たしてほしい」"
translation = "「나는 아무래도 울보인 모양이니까…… 그 약속을 지켜줬으면 좋겠어.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「うん、任せて……梨緒ちゃん！」"
translation = "「응, 맡겨줘…… 리오짱!」"

