[[dialogue]]
speaker = "unk"
original = "第１話,トワ先生と初めてのバレンタイン,P"
translation = "제1화, 토와 선생님과 첫 발렌타인, P"

[[dialogue]]
speaker = "unk"
original = "トワちゃん先生と恋人になってから、初めて迎えるバレンタイン。"
translation = "토와짱 선생님과 연인이 되고 나서, 처음으로 맞이하는 발렌타인."

[[dialogue]]
speaker = "unk"
original = "俺は約束通り、その夜、星徒会室で彼女を待っていた。"
translation = "나는 약속대로, 그날 밤, 성도회실에서 그녀를 기다리고 있었다."

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「失礼します。会長くん、お疲れ様♪」"
translation = "「실례합니다. 회장 군, 수고했어♪」"

[[dialogue]]
speaker = "unk"
original = "お疲れ様。待ってたよ"
translation = "수고했어. 기다리고 있었어"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「う、うん。それじゃあ……今日はバレンタインということで――」"
translation = "「으, 응. 그러면…… 오늘은 발렌타인이라는 의미로――」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「じゃ……じゃ～ん♪\u3000なんとトワ先生も今回、バレンタインフォームに覚醒しちゃいました～」"
translation = "「짜…… 짠~♪ 무려 토와 선생님도 이번에, 발렌타인 폼으로 각성해 버렸습니다~」"

[[dialogue]]
speaker = "unk"
original = "えぇっ！？\u3000いつの間に！？"
translation = "에엣!? 어느 사이에!?探"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「実は、イクシーちゃんたちと色々あってね～。そ、それで……どうかな？\u3000ちょっとフリフリが多くて、少女趣味が強いかもしれないけど……」"
translation = "「사실은, 이쿠시짱 일행이랑 여러 가지 일이 있어서 말이야~. 그, 그래서…… 어때? 조금 프릴이 많아서, 소녀 취향이 강할지도 모르지만……」"

[[dialogue]]
speaker = "unk"
original = "そんなことない！\u3000めちゃくちゃ可愛いよ！"
translation = "그렇지 않아! 엄청나게 귀여워!"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「はわわっ！？\u3000か、会長くん、そんなに力強く……！\u3000あ、ありがとう<emoji=heart04>\u3000嬉しいな……えへへへぇ<emoji=heart04>」"
translation = "「하와와!? 회, 회장 군, 그렇게 힘차게……! 고, 고마워<emoji=heart04> 기쁘네…… 에헤헤헤<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「それでね……はい<emoji=heart04>\u3000私、バレンタインチョコを作ってきたんだ。会長くん、受け取ってくださいっ……！」"
translation = "「그래서 말이야…… 자<emoji=heart04> 나, 발렌타인 초코를 만들어 왔어. 회장 군, 받아 주세요……!」"

[[dialogue]]
speaker = "unk"
original = "緊張した様子で、彼女は可愛くラッピングされた小箱を差し出してくる。俺はそれを受け取り、お礼を言った。"
translation = "긴장한 모습으로, 그녀는 귀엽게 포장된 작은 상자를 내민다. 나는 그것을 받아 들고, 감사를 표했다."

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「う、うん……どういたしまして<emoji=heart04>\u3000えへへ……<emoji=heart04>」"
translation = "「으, 응…… 천만에요<emoji=heart04> 에헤헤……<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「――あっ、うん♪\u3000もちろん食べて大丈夫だよ！」"
translation = "「――앗, 응♪ 물론 먹어도 괜찮아!」"

[[dialogue]]
speaker = "unk"
original = "包装を開けると、中には小さなハート型のチョコがいくつも並んでいた。それを見て、トワちゃんは恥ずかしそうに指先をもじもじさせる。"
translation = "포장을 뜯자, 안에는 작은 하트 모양의 초코가 여러 개 늘어서 있었다. 그것을 보고, 토와짱은 부끄러운 듯 손가락을 꼼지락거린다."

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「形は最初、ハート型ってあざと過ぎるかなぁって思ったんだけど……でも、恋人になってから初めてのバレンタインだし……思いっきり気持ち込めてみちゃった<emoji=heart04>」"
translation = "「짜…… 짠~♪ 무려 토와 선생님도 이번에, 발렌타인 폼으로 각성해 버렸습니다~」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「え？\u3000――本命チョコって感じがして嬉しい？\u3000えへへ……それなら、勇気出してよかった<emoji=heart04>」"
translation = "「에엣!? 어느 사이에!?」"

[[dialogue]]
speaker = "unk"
original = "俺はそのうちの１つを手に取り、口に運ぶ。"
translation = "「사실은, 이쿠시짱 일행이랑 여러 가지 일이 있어서 말이야~. 그, 그래서…… 어때? 조금 프릴이 많아서, 소녀 취향이 강할지도 모르지만……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ど、どうかな……？\u3000美味しくできてる……？」"
translation = "「그렇지 않아! 엄청나게 귀여워!」"

[[dialogue]]
speaker = "unk"
original = "うん、うまいっ！\u3000幸せな甘さだ"
translation = "「하와와!? 회, 회장 군, 그렇게 힘차게……! 고, 고마워<emoji=heart04> 기쁘네…… 에헤헤헤<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「えへへ、よかったぁ～<emoji=heart04>\u3000実はね、私、男の子にチョコを作るのはこれが初めてで……<emoji=heart04>\u3000学生の頃は、友チョコを作って交換するくらいだったんだ」"
translation = "「그래서 말이야…… 자<emoji=heart04> 나, 발렌타인 초코를 만들어 왔어. 회장 군, 받아 주세요……!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「――って、はわわっ！？\u3000会長くん！？」"
translation = "긴장한 모습으로, 그녀는 귀엽게 포장된 작은 상자를 내민다. 나는 그것을 받아 들고, 감사를 표했다."

[[dialogue]]
speaker = "unk"
original = "俺はそっと近づき、彼女の頬に手を添えて言う。"
translation = "「으, 응…… 천만에요<emoji=heart04> 에헤헤……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "今日のトワちゃん、すごく可愛い"
translation = "「――앗, 응♪ 물론 먹어도 괜찮아!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「はうぅ……<emoji=heart04>\u3000会長くん……<emoji=heart04>」"
translation = "포장을 뜯자, 안에는 작은 하트 모양의 초코가 여러 개 늘어서 있었다. 그것을 보고, 토와짱은 부끄러운 듯 손가락을 꼼지락거린다."

[[dialogue]]
speaker = "unk"
original = "頬を撫でながら顔を寄せると、トワちゃんは瞳を細め、小さく唇を突き出してくれた。俺はその唇に自分の唇を重ねる。"
translation = "볼을 쓰다듬으며 얼굴을 가까이 대자, 토와짱은 눈을 가늘게 뜨고, 살짝 입술을 내밀어 주었다. 나는 그 입술에 나의 입술을 겹친다."

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「んっ……<emoji=heart04>\u3000ちゅっ……んちゅっ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 쪽…… 츄릅……<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「……はあぁ<emoji=heart04>\u3000キス、チョコの味がする……<emoji=heart04>」"
translation = "「……하아<emoji=heart04> 키스에서 초코 맛이 나……<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「え……？\u3000――バレンタインフォームが初々しくて可愛い……？\u3000も、もしかすると、私の恋愛経験が初めてなのが反映されてたりするのかな……？」"
translation = "「에……? ――발렌타인 폼이 풋풋해서 귀엽다고……? 호, 혹시 내 연애 경험이 처음인 게 반영된 걸까……?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「先生としてはちょっと恥ずかしいけど……１人の女の子として好きな男の子にチョコを渡すって意味では、よかったかも……えへへ<emoji=heart04>」"
translation = "「선생님으로서는 좀 부끄럽지만…… 한 명의 여자아이로서 좋아하는 남자아이에게 초코를 건넨다는 의미에서는, 다행일지도…… 에헤헤<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「――今日はもっとイチャイチャしたい……？\u3000う、うん……私も……<emoji=heart04>」"
translation = "「――오늘은 좀 더 꽁냥거리고 싶어……? 으, 응…… 나도……<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「先生ももう仕事は終わってるし、夜に２人きりだから……このまま、もう少しだけ……ね<emoji=heart04>」"
translation = "「선생님도 이제 일은 끝났고, 밤에 둘뿐이니까…… 이대로, 조금만 더…… 응?<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "彼女をそっと抱き寄せると、トワちゃんの小さな体が温かく震えた。"
translation = "그녀를 살며시 끌어안자, 토와짱의 작은 몸이 따뜻하게 떨렸다."

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ふあっ……<emoji=heart04>\u3000恋人になってからしばらく経つのに、会長くんに抱き締められると、今でもドキドキしちゃう……<emoji=heart04>」"
translation = "「후앗……<emoji=heart04> 연인이 된 지 꽤 지났는데도, 회장 군이 꽉 안아주면 지금도 두근거려 버려……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺でドキドキしてくれて嬉しい"
translation = "「나 때문에 두근거려 줘서 기뻐.」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「――男として、ちゃんと意識してもらえてるって思うから……？」"
translation = "「――남자로써, 제대로 의식받고 있다고 생각하니까……?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「じゃあ、会長くんも……ちゃんと私のこと、女の子として見てくれてるんだね<emoji=heart04>」"
translation = "「그럼, 회장 군도…… 제대로 나를 여자아이로 봐주고 있는 거네<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「こうして抱き合ってると、会長くんの心臓のドキドキが、私にも伝わってきてるから……<emoji=heart04>」"
translation = "「이렇게 껴안고 있으면, 회장 군의 심장 고동이 나한테도 전해져 오니까……<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ふふっ……そう思ったら、私もすごく嬉しくなっちゃう……<emoji=heart04>」"
translation = "「후훗…… 그렇게 생각하니 나도 너무 기뻐져……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "トワちゃんのこと、好きだから"
translation = "「토와짱을 좋아하니까.」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「私も……<emoji=heart04>\u3000ちゅっ<emoji=heart04>」"
translation = "「나도……<emoji=heart04> 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "トワちゃんは俺の耳元にキスをして、そっと囁く。"
translation = "토와짱은 내 귓가에 키스를 하고, 살며시 속삭인다."

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「会長くん……大好き……<emoji=heart04>」"
translation = "「회장 군…… 너무 좋아해……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "……っ！！"
translation = "「……윽!!」"

[[dialogue]]
speaker = "unk"
original = "そんなふうに囁かれたら、男として抑えきれるはずもなく――"
translation = "그런 식으로 속삭여지면, 남자로서 억누를 수 있을 리도 만무하여――"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「あっ<emoji=heart04>\u3000会長くん……んっ……<emoji=heart04>\u3000ちゅっ……んちゅっ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 회장 군…… 응……<emoji=heart04> 쪽…… 츄릅……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その日、俺たちは遅くまで、星徒会室に居残り続けてしまうのだった。"
translation = "그날, 우리들은 늦게까지 성도회실에 계속 남아 있게 되는 것이었다."

