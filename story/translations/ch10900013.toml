[[dialogue]]
speaker = "unk"
original = "第３話,魔王の兄妹デート,P"
translation = "제3화, 마왕의 남매 데이트, P"

[[dialogue]]
speaker = "unk"
original = "メイプルと仲良くなってから、しばらく経ったある休日。"
translation = "메이플과 친해진 뒤로 한참이 지난 어느 휴일."

[[dialogue]]
speaker = "unk"
original = "俺は彼女と２人で出かける約束をして、街へとやって来ていた――"
translation = "나는 그녀와 둘이서 외출하기로 약속하고 거리로 나왔다――"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「よし、着いた～♪\u3000――じゃあ、何して遊ぼっか、お兄ちゃん？\u3000スイーツビュッフェの予約時間まで、まだしばらくあるんだよね～」"
translation = "「좋아, 도착~♪ ――자, 뭐 하고 놀까, 오빠? 스위츠 뷔페 예약 시간까지는 아직 시간이 좀 있네~」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「あ、そうだ！\u3000せっかくだし、お兄ちゃんとの絆を深める為に、デートっぽいこととかしよっか♪」"
translation = "「아, 맞다! 이왕 이렇게 된 거, 오빠랑 유대를 깊게 다지기 위해서 데이트 같은 거나 할까♪」"

[[dialogue]]
speaker = "unk"
original = "で、デート……！？"
translation = "데, 데이트……!?"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「うん♪\u3000だって、兄妹２人でお出かけしてるわけだし、別におかしくはないでしょ？」"
translation = "「응♪ 그야 남매 둘이서 외출한 거니까, 별로 이상할 건 없잖아?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「――自称・妹だよねって？\u3000もう、そこをツッコむのは野暮というものだよ、お兄ちゃん」"
translation = "「――자칭 여동생 아니냐고? 정말, 그런 걸 따지는 건 멋없다구, 오빠」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「というわけで、手を繋いでもいい？」"
translation = "「그런 의미에서, 손 잡아도 돼?」"

[[dialogue]]
speaker = "unk"
original = "手を？\u3000メイプルがいいなら……"
translation = "손을? 메이플이 괜찮다면……"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「じゃあ、繋ぐね？\u3000――えいっ♪」"
translation = "「그럼, 잡을게? ――에잇♪」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「にへへ……♪\u3000お兄ちゃんの手、こうして触ってみると大きいね！\u3000男の人と手を繋いだのは、小さい時にパパと出かけた時以来かな～？」"
translation = "「니헤헤……♪ 오빠 손, 이렇게 만져보니까 크네! 남자랑 손을 잡은 건, 어릴 때 아빠랑 나갔을 때 이후 처음이려나~?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「このまま時間までショッピングでもして回ろっか♪\u3000――それじゃあ、しゅっぱ～つ♪」"
translation = "「이대로 시간까지 쇼핑이라도 하며 돌아다닐까♪ ――그럼, 추울바알~♪」"

[[dialogue]]
speaker = "unk"
original = "そうして、予約しているスイーツビュッフェの時間になり、俺たちは店に入った。"
translation = "그렇게 예약해둔 스위츠 뷔페 시간이 되어, 우리들은 가게로 들어갔다."

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「――ん～！\u3000美味しい～♪\u3000マカロンが食べ放題なんて、幸せ～♪」"
translation = "「――음~! 맛있어~♪ 마카롱이 무한 리필이라니, 행복해~♪」"

[[dialogue]]
speaker = "unk"
original = "メイプルが皿に取ってきたのは、山盛りになった色とりどりのマカロンであった。"
translation = "메이플이 접시에 담아온 것은 산더미처럼 쌓인 형형색색의 마카롱이었다."

[[dialogue]]
speaker = "unk"
original = "マカロンが好きなのか？"
translation = "마카롱을 좋아하는 건가?"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「うん♪\u3000魔界にもあるお菓子なんだよ。高級品だからたまにしか食べられなかったけど……」"
translation = "「응♪ 마계에도 있는 과자거든. 고급품이라 가끔밖에 못 먹었지만……」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「カラフルで甘くて、子供の頃から宝石みたいなお菓子ってイメージで……こうしていつかお腹いっぱい食べてみたいって、夢だったんだ～♪」"
translation = "「알록달록하고 달콤해서, 어릴 때부터 보석 같은 과자라는 이미지라…… 이렇게 언젠가 배불리 먹어보고 싶다고 생각한 게 꿈이었어~♪」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「でも、人間界のマカロンはすごいね！\u3000魔界のより値段は安いのに、こんなに美味しいなんて♪」"
translation = "「그렇지만 인간계의 마카롱은 대단하네! 마계보다 가격은 싼데 이렇게나 맛있다니♪」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「あむっ♪\u3000もぐもぐ……食べるたびに笑顔でふにゃふにゃになっちゃう♪」"
translation = "「아무♪ 우물우물…… 먹을 때마다 미소가 지어지면서 노곤노곤해져♪」"

[[dialogue]]
speaker = "unk"
original = "夢中になって頬張る彼女がなんだか可愛くて、つい世話を焼きたくなってしまう。"
translation = "정신없이 먹어대는 그녀가 왠지 귀여워서, 나도 모르게 챙겨주고 싶어진다."

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「え？\u3000口元にマカロンの欠片がくっ付いている？\u3000――取ってくれるの？」"
translation = "「어? 입가에 마카롱 조각이 붙어있어? ――떼어 주는 거야?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ん……♪\u3000にへへ、ありがとう、お兄ちゃん♪」"
translation = "「응……♪ 니헤헤, 고마워, 오빠♪」"

[[dialogue]]
speaker = "unk"
original = "スイーツビュッフェを楽しんだ後、店を出た俺たちだったが、ちょっとした問題が発生していた。"
translation = "스위츠 뷔페를 즐긴 후 가게를 나온 우리들이었지만, 약간의 문제가 발생했다."

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「う～、調子に乗って、食べ過ぎちゃったかも……」"
translation = "「우~ 신나서 너무 많이 먹어버렸을지도……」"

[[dialogue]]
speaker = "unk"
original = "大丈夫か？\u3000少しどこかに座って休むか？"
translation = "괜찮아? 어디 좀 앉아서 쉴까?"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「うん、ごめん。そうしたいかな……」"
translation = "「응, 미안. 그러고 싶어……」"

[[dialogue]]
speaker = "unk"
original = "俺は周りを見回すが、ベンチとかはなさそうだ。ならばと思い立ち――"
translation = "나는 주변을 둘러보았지만, 벤치 같은 건 보이지 않았다. 그렇다면 하고 결심하고는――"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「って、えっ！？\u3000お兄ちゃん、何を――」"
translation = "「엇, 에엣!? 오빠, 뭘――」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ひゃっ！？」"
translation = "「히얏!?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「こ、これって……お姫様抱っこ！？\u3000ち、ちょっと待って、なんでいきなり……！？」"
translation = "「이, 이건…… 공주님 안기!? 자, 잠깐만, 왜 갑자기……!?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「――近くに座れる場所がないから、探しながら移動する？」"
translation = "「――근처에 앉을 만한 곳이 없으니까, 찾으면서 이동하자고?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「で、でも、お姫様抱っこをする必要は……！\u3000兄妹らしさ的には、おんぶとか……！」"
translation = "「하, 하지만 공주님 안기를 할 필요는……! 남매다움으로 치면 업어주기라든가……!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「――おんぶはお腹が圧迫されそう？\u3000た、確かにそうかもだけど……！」"
translation = "「――업어주는 건 배가 압박될 것 같아? 과, 확실히 그럴지도 모르지만……!」"

[[dialogue]]
speaker = "unk"
original = "もしかしてメイプル、恥ずかしがってる？"
translation = "혹시 메이플, 부끄러워하고 있어?"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「へ！？\u3000ち、違……」"
translation = "「헤!? 아, 아니……」"

[[dialogue]]
speaker = "unk"
original = "口ごもった彼女は、いつもの眼帯を取り出して装着する。"
translation = "말문이 막힌 그녀는 평소의 안대를 꺼내어 착용한다."

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ふっ……ふははは！\u3000何を言い出すのだ、お兄ちゃん！\u3000魔王を目指している我が、この程度のことで恥ずかしがるわけがあるまい！？」"
translation = "「훗…… 후하하하! 무슨 소릴 하는 거냐, 오빠! 마왕을 목표로 하는 내가, 이 정도 일로 부끄러워할 리가 없지 않으냐!?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「我が言いたいのは……そう！\u3000魔王の威厳的に問題があるということだ！」"
translation = "「내가 말하고 싶은 건…… 그래! 마왕의 위엄에 문제가 있다는 것이다!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「故に、ここはやはり、おんぶに切り替えるべき――って、何をニヤニヤしているのだ、お兄ちゃん！？」"
translation = "「고로, 여기서는 역시 업어주는 것으로 바꿔야―― 아니, 왜 실글벙글 웃고 있는 거냐, 오빠!?」"

[[dialogue]]
speaker = "unk"
original = "ふっ……甘いな、妹よ！"
translation = "훗…… 무르구나, 여동생아!"

[[dialogue]]
speaker = "unk"
original = "魔王として、困っている者を助けるのは当然のこと。それが可愛い妹の為ならば、尚更だ。故に、その提案は却下すると宣言する。"
translation = "마왕으로서 곤란해하는 자를 돕는 것은 당연한 일. 그것이 귀여운 여동생을 위해서라면 더더욱이다. 고로, 그 제안은 기각한다고 선언한다."

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ちょっ……こういう時だけ、ノリノリで魔王を名乗るのはずるいぞ、お兄ちゃん！？」"
translation = "「잠깐…… 이럴 때만 신나서 마왕을 자처하는 건 치사하다구, 오빠!?」"

[[dialogue]]
speaker = "unk"
original = "俺はメイプルを腕に抱えたまま、移動を開始する。"
translation = "나는 메이플을 팔에 안은 채 이동을 시작한다."

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ま、待って！\u3000本当にこのまま運ぶの！？」"
translation = "「기, 기다려! 정말 이대로 운반하는 거야!?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「うぅ～……！」"
translation = "「우으~……!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "（お兄ちゃん相手なのに、なんかドキドキしちゃう……！）"
translation = "（오빠 상대인데, 왠지 두근거려 버려……!）"

[[dialogue]]
speaker = "unk"
original = "それから運んでいる間、赤くなった顔を両手で隠しながらも、指の間からチラチラとこちらを見てくるメイプルなのだった。"
translation = "그 뒤로 옮겨지는 동안, 붉어진 얼굴을 양손으로 가리면서도 손가락 사이로 힐끔힐끔 이쪽을 쳐다보는 메이플이었다."

