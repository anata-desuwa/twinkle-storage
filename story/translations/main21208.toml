[[dialogue]]
speaker = "unk"
original = "第８話,陸の孤島,B"
translation = "제8화, 육지의 고도"

[[dialogue]]
speaker = "unk"
original = "流星市国は、日本の東京都内に位置する独立国家である。故にこの小国の異常に、周囲が気づかないはずがない。"
translation = "유성시국은 일본 도쿄도 내에 위치한 독립 국가이다. 고로 이 소국의 이상을 주변에서 눈치채지 못할 리가 없다."

[[dialogue]]
speaker = "unk"
original = "リクリエの本波が過ぎれば、すぐに日本国からの救助がやってくる──チナはそう思っていた。"
translation = "리크리에의 본파가 지나가면 곧바로 일본으로부터 구조가 올 것이다── 치나는 그렇게 생각하고 있었다."

[[dialogue]]
speaker = "unk"
original = "しかし数日が過ぎても、救援は来なかった──"
translation = "그러나 며칠이 지나도 구원은 오지 않았다──"

[[dialogue]]
speaker = "unk"
original = "異常な状況下で、チナは懸命に働いた。"
translation = "이상 상황 속에서 치나는 필사적으로 일했다."

[[dialogue]]
speaker = "unk"
original = "モンスターと対峙する時は、星力に目覚めているルヴィネとベアトリスを頼り、流星市国の案内はチナが担当する。"
translation = "몬스터와 대치할 때는 성력에 눈을 뜬 루비네와 베아트리스를 의지하고, 유성시국의 안내는 치나가 담당한다."

[[dialogue]]
speaker = "unk"
original = "そうして避難民の数は日を追うごとに増えていった。"
translation = "그렇게 피난민의 수는 날이 갈수록 늘어만 갔다."

[[dialogue]]
speaker = "unk"
original = "ある日、妖精族の少女、グレイス・オベロニアと出会った。"
translation = "어느 날, 요정족 소녀 그레이스 오베로니아와 만났다."

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「生き返りましたぁ～っ……！\u3000ごはんとお水、ありがとうございました！」"
translation = "「살아났어요~……! 밥이랑 물, 정말 감사합니다!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ふふ。元気な子ね」"
translation = "「후후. 활기찬 아이네요.」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「はい！\u3000暗い時こそ、明るく笑えというのがオベロニアの教えです！」"
translation = "「네! 어두울 때일수록 밝게 웃으라는 것이 오베로니아의 가르침입니다!」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「ところでチナさん、さっきお店で拾ってたクッキー、いつ食べるんですか？\u3000私、気になって気になって仕方がないのですが……！」"
translation = "「그런데 치나 씨, 아까 가게에서 주웠던 쿠키, 언제 먹을 건가요? 저, 궁금해서 궁금해서 견딜 수가 없는데요……!」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「非常食だよこれは。いざって時のために取っとくの」"
translation = "「비상식량이야, 이건. 만약의 사태를 위해서 남겨두는 거라고.」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「……今がその非常時では？\u3000じゅるり」"
translation = "「……지금이 바로 그 비상사태 아닌가요? 쥬르륵.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「チナさん。少しなら問題ないでしょう、分けてあげたら？」"
translation = "「치나 씨. 조금이라면 문제없겠죠, 나눠주는 게 어때요?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ルヴィネの頼みでもこればっかりは聞けねーな！\u3000ケーカク的に食べないと、すぐになんにもなくなっちゃうぞ！」"
translation = "「루비네의 부탁이라도 이것만큼은 못 들어주겠네! 계획적으로 먹지 않으면 금방 아무것도 없어져 버린다고!」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「ぐすん。ひもじいですね……」"
translation = "「흑흑. 배고프네요……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「アタシよりも１コ上って話だったのに、落ち着きのない奴だな……」"
translation = "「나보다 한 살 위라고 들었는데, 참을성 없는 녀석이네……」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「お腹の空き方に年齢は関係ありません！\u3000むしろ育ち盛りだからこそお腹が空くんです！」"
translation = "「배고픈 정도에 나이는 관계없습니다! 오히려 성장기니까 배가 고픈 겁니다!」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ああ言えばこう言う……あのな、働かざる者食うべからず、ってコトワザがあるだろ？」"
translation = "「말하면 말대꾸는…… 야, 일하지 않는 자 먹지도 마라, 라는 속담 알지?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「あはは……じゃ、じゃあいつもみたいにパトロールして、そのご褒美ならどうかな、チナちゃん？」"
translation = "「아하하…… 저, 저기 그럼 평소처럼 순찰하고, 그 보상이라면 어떨까, 치나짱?」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「いい考えです！\u3000張り切ってお出かけしましょう、ベアトリスさん！」"
translation = "「좋은 생각입니다! 기운차게 나가보자고요, 베아트리스 씨!」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「いや、グレイスはモンスターと戦えないだろ……何の役に立つんだよ」"
translation = "「아니, 그레이스는 몬스터랑 못 싸우잖아…… 무슨 도움이 된다는 거야.」"

[[dialogue]]
speaker = "unk"
original = "厳しい環境下でも元気に笑うグレイスは、チナたちにとって精神的な支えとなった──"
translation = "혹독한 환경 속에서도 밝게 웃는 그레이스는 치나 일행에게 정신적인 지주가 되었다──"

[[dialogue]]
speaker = "unk"
original = "──それから数日後。今度はルヴィネが、不思議な少女を連れてきた。"
translation = "──그로부터 며칠 후. 이번에는 루비네가 신기한 소녀를 데려왔다."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「レティシア・オルティースさん。年齢は私たちの１つ上みたい。仲良くしてあげて」"
translation = "「레티시아 오르티스 씨예요. 나이는 우리보다 한 살 위인 것 같아. 사이좋게 지내줘요.」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「よ、よろしくね、レティシアちゃん」"
translation = "「자, 잘 부탁해, 레티시아짱.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「お前、ずーっと黙ってるな……どっかケガでもしてるのか？」"
translation = "「너, 계속 입 다물고 있네…… 어디 다치기라도 한 거야?」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「きっとお腹が空いてるんですね……可哀想です……」"
translation = "「분명 배가 고픈 거겠죠…… 불쌍해요……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「それはないだろ。グレイスじゃねーんだから」"
translation = "「그럴 리 없잖아. 그레이스도 아니고.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「この子、ちょっと特殊な環境にいたせいかしら……感情表現が苦手みたいなの。みんな、気にしてあげてくれるかしら」"
translation = "「이 아이, 조금 특수한 환경에 있었던 탓인지…… 감정 표현이 서툰 모양이에요. 모두 신경 써주겠어요?」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「暗いやつだなぁ……」"
translation = "「어두운 녀석이네……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「だ、だめだよ～チナちゃん。そんなこと言ったら」"
translation = "「아, 안 돼~ 치나짱. 그런 소리 하면.」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「仕方ありません。お近づきの印に……どうぞ。昨夜くすねたチナさんのクッキーです」"
translation = "「어쩔 수 없군요. 친해진 기념으로…… 여기요. 어젯밤에 슬쩍한 치나 씨의 쿠키입니다.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「んなっ！？\u3000グレイスいつの間にっ……このやろ～！？」"
translation = "「뭐랏!? 그레이스 언제 어느 사이에…… 이 자식이~!?」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「…………ふふ」"
translation = "「…………후후.」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「あっ……笑いましたよ、この子！」"
translation = "「앗…… 웃었어요, 이 아이!」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「笑われてんだよ、お前が！！」"
translation = "「비웃음당하는 거야, 네가!!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「よかった。あまり喋らないから心配してたの」"
translation = "「다행이다. 말을 거의 안 해서 걱정했거든요.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「レティシアちゃん、何か困ったことがあったら、私たちに相談してね！」"
translation = "「레티시아짱, 뭔가 곤란한 일이 있으면 우리한테 상담해줘!」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「…………ん」"
translation = "「…………응.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「へへっ、モンスターが現れたら、アタシの後ろに隠れるんだぞ！」"
translation = "「헤헷, 몬스터가 나타나면 내 뒤에 숨으라고!」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「…………？」"
translation = "「…………?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「なんでそこで首をかしげるんだよ」"
translation = "「왜 거기서 고개를 갸웃거리는 거야.」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「ぷぷ。自分より小さい女の子に隠れられるわけないでしょう」"
translation = "「푸푸. 자기보다 작은 여자애 뒤에 숨을 수 있을 리 없잖아요.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「なんだとー！？」"
translation = "「뭐라고~!?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ちなみにレティシアさんは、守護星もセレスティアも持っているわ。私とベアトリスさんに続く、３人目の星騎士ね」"
translation = "「참고로 레티시아 씨는 수호성도 셀레스티아도 가지고 있어요. 저와 베아트리스 씨를 잇는 세 번째 성기사예요.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ななな、なんだとー！？」"
translation = "「뭐, 뭐뭐, 뭐라고~!?」"

[[dialogue]]
speaker = "unk"
original = "リクリエを<ruby>寿<rt>ことほ</rt></ruby>ぐ宗教団体で生まれ育ったレティシアは、常識というものを何も知らなかった。人間性にも乏しかった。"
translation = "리크리에를 축복하는 종교 단체에서 태어나 자란 레티시아는 상식이라는 것을 전혀 몰랐다. 인간성도 부족했다."

[[dialogue]]
speaker = "unk"
original = "しかしチナたちの献身的な付き合いで、彼女は少しずつ、ヒトとして生きる力を身に着けていく。"
translation = "하지만 치나 일행의 헌신적인 교류로 그녀는 조금씩 인간으로서 살아가는 힘을 익혀나간다."

[[dialogue]]
speaker = "unk"
original = "少ない食料を分け合い、みなで日々を生き抜くために力を合わせた。"
translation = "적은 식량을 나누고, 모두가 하루하루를 버텨내기 위해 힘을 합쳤다."

[[dialogue]]
speaker = "unk"
original = "極星学園の５人は、この時から毎日を一緒に過ごすことになる──"
translation = "극성학원의 다섯 명은 이때부터 매일을 함께 보내게 된다──"

[[dialogue]]
speaker = "unk"
original = "──１週間が過ぎた頃、とうとう避難地で限界を訴える声が出始めた。"
translation = "──일주일이 지났을 무렵, 결국 피난처에서 한계를 호소하는 목소리가 나오기 시작했다."

[[dialogue]]
speaker = "unk"
original = "水も食料も供給が圧倒的に追いつかない。いつまで経っても助けは来ない。"
translation = "물도 식량도 공급이 압도적으로 따라가지 못한다. 아무리 기다려도 도움은 오지 않는다."

[[dialogue]]
speaker = "unk"
original = "散発的に発生するアステラとモンスターに怯え、夜もまともに眠れない日々……"
translation = "산발적으로 발생하는 아스테라와 몬스터에 겁에 질려, 밤에도 제대로 잠들지 못하는 나날……"

[[dialogue]]
speaker = "unk"
original = "体調を崩す者が出始めた。小さな子供が熱を出し、母親がパニックを起こした。"
translation = "몸 상태가 나빠지는 사람이 나오기 시작했다. 어린아이가 열을 내고, 어머니가 패닉을 일으켰다."

[[dialogue]]
speaker_original = "流星市国民"
speaker_translation = "유성시 국민"
original = "「ルヴィネさん！\u3000あなたがここにいろというから、ずっと耐えてきたが……もう限界だ！！」"
translation = "「루비네 씨! 당신이 여기 있으라고 해서 계속 참아왔지만…… 이제 한계다!!」"

[[dialogue]]
speaker_original = "流星市国民"
speaker_translation = "유성시 국민"
original = "「市国の外には家族がいる！\u3000早く会いたいんだ！\u3000会いに行かせてくれ！！」"
translation = "「시국 밖에는 가족이 있어! 빨리 만나고 싶단 말이야! 만나러 가게 해줘!!」"

[[dialogue]]
speaker_original = "流星市国民"
speaker_translation = "유성시 국민"
original = "「救助が来ないなら、俺たちが動けばいい！\u3000避難するんだ、いいだろ！？」"
translation = "「구조가 오지 않는다면 우리가 움직이면 돼! 피난하는 거야, 괜찮지!?」"

[[dialogue]]
speaker_original = "流星市国民"
speaker_translation = "유성시 국민"
original = "「ここから逃げよう！\u3000なあ！？」"
translation = "「여기서 도망치자! 응!?」"

[[dialogue]]
speaker = "unk"
original = "モンスターに対抗できるのは、ルヴィネとベアトリス、レティシアの３名のみ。３人がいなければ身動きも取れない状況だった。"
translation = "몬스터에 대항할 수 있는 것은 루비네와 베아트리스, 레티시아 세 명뿐. 세 사람이 없으면 꼼짝도 할 수 없는 상황이었다."

[[dialogue]]
speaker = "unk"
original = "流星市国の外まで護衛をしてくれと頼む市民たちに、ルヴィネは大きく息を吐いて──"
translation = "유성시국 밖까지 호위를 해달라고 부탁하는 시민들에게 루비네는 크게 한숨을 내쉬고──"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……それはできないの」"
translation = "「……그건 할 수 없어요.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「でも──何も伝えずに納得してもらうのも、無理ね。説明するわ」"
translation = "「하지만── 아무것도 전하지 않고 납득해달라는 것도 무리겠네요. 설명할게요.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「グレイスさんとチナさんと……あとは数人、市国民の方を連れていくわ」"
translation = "「그레이스 씨와 치나 씨와…… 그리고 몇 분, 시국민 분들을 데려가겠어요.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ねえルヴィネちゃん。本当に、喋っちゃって大丈夫……？」"
translation = "「저기 루비네짱. 정말로 말해버려도 괜찮아……?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「仕方ないわ。このままだと本当に結束がなくなってしまう」"
translation = "「어쩔 수 없어요. 이대로라면 정말로 결속이 무너져 버릴 거예요.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「留守を頼むわね。レティシアさんはまだ戦いに不慣れだから……」"
translation = "「집을 부탁해요. 레티시아 씨는 아직 전투에 익숙하지 않으니까……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「うん、任せて……！」"
translation = "「응, 맡겨줘……!」"

[[dialogue]]
speaker = "unk"
original = "そうしてルヴィネは──数人の同伴者を連れて、流星市国と日本国の国境付近へ進んだ。"
translation = "그렇게 루비네는── 몇 명의 동행자를 데리고 유성시국과 일본국의 국경 부근으로 나아갔다."

[[dialogue]]
speaker = "unk"
original = "そして──チナは目を疑った。"
translation = "그리고── 치나는 눈을 의심했다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「な、なんだコレ……？\u3000空気が、ねじれてる……？」"
translation = "「뭐, 뭐야 이게……? 공기가 비틀려 있어……?」"

[[dialogue]]
speaker = "unk"
original = "空間が歪んで、黒とも透明とも言えない奇怪な断裂が、そこにはあった。"
translation = "공간이 왜곡되어, 검은색인지 투명한지 알 수 없는 기괴한 단절이 그곳에 있었다."

[[dialogue]]
speaker = "unk"
original = "その場に落ちていた瓦礫を投げ込むと、磁力が反発するような動きで押し戻される。もしも無理に進もうとすれば──それは考えただけで恐ろしい。"
translation = "그 자리에 떨어져 있던 잔해를 던져 넣자, 자력이 반발하는 듯한 움직임으로 튕겨 나간다. 만약 억지로 나아가려 한다면── 그것은 생각만 해도 끔찍했다."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「避難をさせられない理由がこれよ。もう十分ね。大聖堂に戻りましょう」"
translation = "「피난을 시킬 수 없는 이유가 이거예요. 이제 충분하죠. 대성당으로 돌아가요.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「さっき見せたとおり、流星市国は今……『壁』で覆われているの。陸の孤島と言えば伝わるかしら」"
translation = "「방금 보여드린 대로 유성시국은 지금…… 『벽』으로 뒤덮여 있어요. 육지의 고도라고 하면 전달이 될까요.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「壁はドームのような半球体で、流星市国をすっぽりと覆っている……ある程度上空まで飛び上がれば、空にも同じものがあるわ」"
translation = "「벽은 돔 같은 반구체로 유성시국을 완전히 뒤덮고 있어요…… 어느 정도 상공까지 날아오르면 하늘에도 같은 것이 있죠.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「星力を持ってしても突破できない。外部から救助が来ないんじゃない、来られないの」"
translation = "「성력을 가지고도 돌파할 수 없어요. 외부에서 구조가 오지 않는 게 아니라, 오지 못하는 거예요.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「それはわかったよ……でも、ルヴィネ。原因はなんなんだ……？\u3000なんであんなことになってるんだよ？」"
translation = "「그건 알겠어…… 하지만 루비네. 원인이 뭐야……? 왜 저런 게 생긴 거냐고?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……あの壁が現れたのは、緋宮クロトのせいよ」"
translation = "「……저 벽이 나타난 것은 히노미야 쿠로토 때문이에요.」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「え──！？」"
translation = "「에──!?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「今まで黙っていてごめんなさい……かつてあなたたちを守っていた存在が裏切り者だと知ったら、心が折れてしまう人も出てしまうんじゃないかと思って……言えなかった」"
translation = "「지금까지 침묵해서 미안해요…… 한때 당신들을 지키던 존재가 배신자라는 것을 알면 마음이 꺾여버리는 사람도 나오지 않을까 생각해서…… 말할 수 없었어요.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ここにいる皆には伝えたわよね。私があの『仮面の女』を倒したと……」"
translation = "「여기 있는 모두에게는 전했었죠. 제가 그 『가면을 쓴 여자』를 쓰러뜨렸다고……」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「まともな訓練も積んでいない私が、どうして『仮面の女』を倒せるほどの星力を宿しているのか──」"
translation = "「제대로 된 훈련도 쌓지 않은 제가 어떻게 『가면을 쓴 여자』를 쓰러뜨릴 정도의 성력을 품고 있는지──」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「それは私が、女神テルル……様から。遣わされた存在だからよ」"
translation = "「그것은 제가 여신 테루루…… 님으로부터 보내진 존재이기 때문이에요.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「女神様の、遣い……！？」"
translation = "「여신님의 사자……!?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「そう。ついこの間まで、私は天界の田舎で暮らす、何の力もないただの天使だった」"
translation = "「네. 요전번까지만 해도 저는 천계의 시골에서 사는, 아무런 힘도 없는 평범한 천사였어요.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「そんな私にお声を届けて、力と啓示を授けてくださったのがテルル、様」"
translation = "「그런 저에게 목소리를 들려주시고, 힘과 계시를 내려주신 분이 테루루 님.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「人間界が滅び、リクリエがやってくる──それを阻止するために、この星力を振るいなさい、と仰ったの」"
translation = "「인간계가 멸망하고 리크리에가 찾아온다── 그것을 저지하기 위해 이 성력을 휘두르라고 말씀하셨죠.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「そしてもう１つ……人間界にいる魔王、緋宮クロトは──」"
translation = "「그리고 또 하나…… 인간계에 있는 마왕 히노미야 쿠로토는──」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「我が身可愛さに逃げ出した──だから彼の代わりに、人類の救世主になりなさいって」"
translation = "「제 몸 하나 아까워서 도망쳤다── 그러니까 그를 대신해서 인류의 구세주가 되라고요.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「……マジ、かよ」"
translation = "「……진짜냐.」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「そっ──そんなことない！\u3000あるわけないです！\u3000ありえません！！\u3000魔王さんは、そんな人じゃない！！！」"
translation = "「그럴── 그럴 리 없어요! 그럴 리 없습니다! 말도 안 돼요!! 마왕님은 그런 분이 아니에요!!!」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「グレイス……？」"
translation = "「그레이스……?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「そうよね。すぐには信じてもらえないと思う……だから、今まで伝えるのをためらっていたの」"
translation = "「그렇죠. 바로 믿어주실 거라 생각하지 않아요…… 그래서 지금까지 전하는 것을 망설였던 거예요.」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「信じない！\u3000信じないですからっ……！\u3000いくら命の恩人のルヴィネさんでも、い、言っていいことと悪いことがあります！！」"
translation = "「안 믿어요! 안 믿는다고요……! 아무리 생명의 은인인 루비네 씨라도 하, 해도 될 말이 있고 안 될 말이 있습니다!!」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「お、おいグレイス。落ち着けって……」"
translation = "「어, 어이 그레이스. 진정하라고……」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「これが落ち着いていられますか！？\u3000あの人は、英雄です！\u3000私たちのために命を賭けて、いつも戦ってくれていました……！」"
translation = "「이게 진정하게 생겼습니까!? 그분은 영웅입니다! 우리를 위해 목숨을 걸고 언제나 싸워주셨다고요……!」"

[[dialogue]]
speaker_original = "流星市国民"
speaker_translation = "유성시 국민"
original = "「……俺も、その妖精の女の子と同じ意見だ。緋宮クロトは、あの『仮面の女』に立ち向かっていた。この目ではっきり見た……」"
translation = "「……나도 저 요정 여자애랑 같은 의견이다. 히노미야 쿠로토는 그 『가면을 쓴 여자』에게 맞서고 있었다. 이 눈으로 똑똑히 봤어……」"

[[dialogue]]
speaker_original = "流星市国民"
speaker_translation = "유성시 국민"
original = "「私も、モンスターから家族を助けてもらったことがあります。クロトさんは、いつだって私たちの味方で……」"
translation = "「저도 몬스터로부터 가족을 구함 받은 적이 있어요. 쿠로토 씨는 언제나 우리의 편이었고……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ね、ねぇチナちゃん。クロトさんってそんなに凄い人なの……？」"
translation = "「저, 저기 치나짱. 쿠로토 씨라는 사람 그렇게 대단한 사람이야……?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「直接会ったことはないんだよな。それに、自分を『魔王』だって自称してる変なやつで……だけど」"
translation = "「직접 만난 적은 없지만 말이야. 게다가 자신을 『마왕』이라고 자처하는 이상한 녀석이라…… 하지만」"

[[dialogue]]
speaker = "unk"
original = "星騎士としては、かくあるべしと言われるような、真面目でひたむきな男であったと、チナの両親は言っていた。"
translation = "성기사로서는 마땅히 그래야 한다고 말할 정도로 성실하고 한결같은 남자였다고 치나의 부모님은 말했었다."

[[dialogue]]
speaker_original = "流星市国民"
speaker_translation = "유성시 국민"
original = "「というか……魔王クロトが逃げ出した。代わりにルヴィネさん、あなたがやってきた──そこまではいいとして、だ」"
translation = "「그나저나…… 마왕 쿠로토가 도망쳤다. 대신 루비네 씨 당신이 왔다── 거기까지는 그렇다 쳐도 말이야.」"

[[dialogue]]
speaker_original = "流星市国民"
speaker_translation = "유성시 국민"
original = "「それと、あの『壁』がどう関係しているっていうんだ……？」"
translation = "「그거랑 저 『벽』이 무슨 상관이라는 거야……?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……魔王クロトは、逃げ出すときに『ある力』を使ったの。魔王にだけ備わっているのか、どこかで手に入れたものなのかはわからないけれど」"
translation = "「……마왕 쿠로토는 도망칠 때 『어떤 힘』을 사용했어요. 마왕에게만 갖춰진 것인지, 어딘가에서 손에 넣은 것인지는 모르겠지만요.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「それは──平行世界を跳躍する力」"
translation = "「그것은── 평행세계를 도약하는 힘.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「信じ難い情報を矢継ぎ早にごめんなさい。でも……私たちの暮らす世界は、１つじゃない。３つあるの」"
translation = "「믿기 힘든 정보를 연달아 전해서 미안해요. 하지만…… 우리가 사는 세계는 하나가 아니에요. 세 개가 있죠.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「知ってるよ。三界……人間界、天界、魔界だろ？」"
translation = "「알고 있어. 삼계…… 인간계, 천계, 마계잖아?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「いいえ、それだけじゃない。女神様は仰ったわ。人間界、天界、魔界──それをひっくるめて、ここは『デネブの世界』だって」"
translation = "「아니요, 그뿐만이 아니에요. 여신님은 말씀하셨죠. 인간계, 천계, 마계── 그것을 통틀어서 여기는 『데네브의 세계』라고요.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「…………でねぶ？」"
translation = "「…………데네브?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「そう。そして世界は１つじゃない、３つある……デネブ、アルタイル、ベガ」"
translation = "「네. 그리고 세계는 하나가 아니에요, 세 개가 있죠…… 데네브, 알타이르, 베가.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「つまりは平行世界……魔王クロトは、絶望的な状況になったデネブに見切りをつけて、アルタイル世界へ逃亡したと聞いたわ」"
translation = "「즉 평행세계…… 마왕 쿠로토는 절망적인 상황이 된 데네브를 버리고 알타이르 세계로 도망쳤다고 들었어요.」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「わ、わけがわかりませんっ……ルヴィネさん、疲れておかしくなってしまったんですか！？」"
translation = "「도, 도무지 모르겠습니다…… 루비네 씨, 지쳐서 이상해진 건가요!?」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「平行世界？\u3000デネブ？\u3000アルタイルっ？\u3000そんなおかしなことを言って、クロトさんが逃げただなんて……」"
translation = "「평행세계? 데네브? 알타이르? 그런 이상한 소리를 하면서 쿠로토 씨가 도망쳤다니……」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「信じろという方が無理なのはわかる。でも、事実よ」"
translation = "「믿으라는 게 무리라는 건 알아요. 하지만 사실이에요.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「本来、平行世界は交わらない。跳躍して移動する術はない──それを強引に実行した結果、空間に『ひずみ』が生まれた」"
translation = "「본래 평행세계는 겹치지 않아요. 도약해서 이동하는 술법은 없죠── 그것을 억지로 실행한 결과, 공간에 『왜곡』이 생겼어요.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「それが……あの、空気がねじれた『壁』の正体……？」"
translation = "「그게…… 저 공기가 비틀린 『벽』의 정체……?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「そう。あの壁がある限り、私たちはこの流星市国から出られない。外から入ってくることもできない……だから、陸の孤島」"
translation = "「네. 저 벽이 있는 한 우리는 이 유성시국에서 나갈 수 없어요. 밖에서 들어오는 것도 불가능하죠…… 그래서 육지의 고도.」"

[[dialogue]]
speaker = "unk"
original = "始めこそ、突拍子もない話であったが──避難民たちはルヴィネの言葉を信じた。"
translation = "처음에는 엉뚱한 이야기였지만── 피난민들은 루비네의 말을 믿었다."

[[dialogue]]
speaker = "unk"
original = "まともな救援も保護も望めないこの世界で、誰よりも矢面に立ち、モンスターと戦っているのはルヴィネだったから。"
translation = "제대로 된 구원도 보호도 바랄 수 없는 이 세계에서, 누구보다 앞장서서 몬스터와 싸우고 있는 것은 루비네였으니까."

[[dialogue]]
speaker = "unk"
original = "ベアトリスもレティシアも守護星を得てはいるが、ルヴィネの力は規格外だった。"
translation = "베아트리스도 레티시아도 수호성을 얻었지만 루비네의 힘은 규격 외였다."

[[dialogue]]
speaker = "unk"
original = "あの『仮面の女』を倒すほどの星力を宿す彼女が言うのだからと──みんな信じた。"
translation = "그 『가면을 쓴 여자』를 쓰러뜨릴 정도의 성력을 품은 그녀가 하는 말이니── 모두 믿었다."

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「……嘘です。絶対に嘘っ……魔王さんは……私と、や、約束を……」"
translation = "「……거짓말이에요. 절대로 거짓말…… 마왕님은…… 저와 야, 약속을……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「グレイスちゃん……」"
translation = "「그레이스짱……」"

[[dialogue]]
speaker_original = "流星市国民"
speaker_translation = "유성시 국민"
original = "「……な、なあ。だったらどうなるんだ？\u3000俺たち、ずっとここでモンスターに怯えるしかないのか……？」"
translation = "「……저, 저기. 그럼 어떻게 되는 거야? 우리 계속 여기서 몬스터에게 겁먹으며 살 수밖에 없는 거야……?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「いいえ。私は毎日、空間のひずみを調べに行っている。少しずつだけど、ひずみが元に戻ろうと動いているのはわかっているわ」"
translation = "「아니요. 저는 매일 공간의 왜곡을 조사하러 가고 있어요. 조금씩이지만 왜곡이 원래대로 돌아가려고 움직이는 것을 알고 있어요.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「時間はかかるけれど、いつかは解除される……はずよ」"
translation = "「시간은 걸리겠지만 언젠가는 해제될…… 거예요.」"

[[dialogue]]
speaker_original = "流星市国民"
speaker_translation = "유성시 국민"
original = "「そ、それっていつなんだ！？」"
translation = "「그, 그게 언제인데!?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「…………おそらく、３ヵ月か、４ヵ月」"
translation = "「…………아마도, 3개월이나, 4개월.」"

[[dialogue]]
speaker_original = "流星市国民"
speaker_translation = "유성시 국민"
original = "「そんなに持つわけない！！\u3000食い物だっていつか底をつく……薬だっていくら残ってるか、それにこれから冬がくる！\u3000みんな死ぬぞ！？」"
translation = "「그렇게 버틸 리가 없어!! 식량도 언젠가 바닥날 테고…… 약도 얼마나 남았을지, 게다가 이제 곧 겨울이 와! 다들 죽을 거라고!?」"

[[dialogue]]
speaker_original = "流星市国民"
speaker_translation = "유성시 국민"
original = "「なぁ！\u3000力と啓示をもらったんなら、女神様にお伝えしてくれよ！\u3000あの『ひずみ』を消してくれって！\u3000できないのか！？」"
translation = "「어이! 힘과 계시를 받았다면, 여신님께 전해달라고! 저 『왜곡』을 없애달라고 말이야! 못 하는 거야!?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ごめんなさい。私に戦う力を与えて、人間界に呼ぶだけでも、かなり無茶をされているの。テルル様は相当に消耗されている。これ以上の助けは……」"
translation = "「죄송해요. 제게 싸울 힘을 주시고, 인간계에 부르는 것만으로도, 상당히 무리를 하고 계시거든요. 테루루 님은 상당히 소모되신 상태예요. 그 이상의 도움은……」"

[[dialogue]]
speaker_original = "流星市国民"
speaker_translation = "유성시 국민"
original = "「何だよそれっ……！\u3000『仮面の女』に殺されなくても、ここで飢え死にするか、モンスターに殺されるのを待つなら同じことじゃねえか！？」"
translation = "「그게 뭐야……! 『가면의 여자』에게 살해당하지 않아도, 여기서 굶어 죽거나, 몬스터에게 살해당하기를 기다린다면 마찬가지 아니냐고!?」"

[[dialogue]]
speaker_original = "流星市国民"
speaker_translation = "유성시 국민"
original = "「何が女神の遣いだ！！\u3000何とかするために来たんだろ、だったら何とかしろよ！！」"
translation = "「뭐가 여신의 사자야!! 어떻게든 하려고 온 거잖아, 그럼 어떻게든 해보라고!!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「おっさん、そんな言い方ないだろ！？\u3000ルヴィネがどれだけアタシらのために……！」"
translation = "「아저씨, 말이 너무 심하잖아!? 루비네가 얼마나 우리를 위해서……!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「いいの、チナさん。そこの人の言うとおり……女神の遣いであるのに、不自由を強いてしまっている……」"
translation = "「괜찮아요, 치나 씨. 저분의 말씀대로…… 여신의 사자임에도 불구하고, 부자유를 강요하고 말았네요……」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「本当にごめんなさい。私が至らないばかりに……」"
translation = "「정말로 죄송해요. 제가 부족한 탓에……」"

[[dialogue]]
speaker = "unk"
original = "ルヴィネが平身低頭、額を地べたにこすりつけて謝罪をした。少女に激昂して、謝罪までさせてしまった男は、ようやく頭にのぼった血が引く。"
translation = "루비네가 평신저두, 이마를 땅바닥에 문지르며 사죄를 했다. 소녀에게 격앙되어, 사죄까지 하게 만든 남자는, 그제야 머리에 끝까지 올랐던 피가 가라앉는다."

[[dialogue]]
speaker_original = "流星市国民"
speaker_translation = "유성시 국민"
original = "「あ、ぅ……す、すまない……俺、どうかしてた……」"
translation = "「아, 으…… 미, 미안하다…… 내가, 어떻게 됐었나 봐……」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「まともに食事も睡眠もとれない状況だもの……無理もないわ。私の方こそ、ごめんなさい」"
translation = "「제대로 식사도 수면도 취할 수 없는 상황인걸요…… 무리도 아니에요. 저야말로, 죄송해요.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「この状況下で、数ヵ月を生き延びるのは困難を極めるわ。モンスターの対策をしながら、動植物がほとんどない都市でのサバイバル」"
translation = "「이 상황에서, 수개월을 살아남는 것은 지극히 곤란해요. 몬스터 대책을 세우면서, 동식물이 거의 없는 도시에서의 서바이벌.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「でも、どうか強く心を持って。希望を捨てないで欲しい」"
translation = "「하지만, 부디 마음을 굳게 먹어주세요. 희망을 버리지 않았으면 해요.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「不出来な女神の遣いではあるけれど……この流星市国の人達を私は守りたい」"
translation = "「부족한 여신의 사자이긴 하지만…… 이 유성시국의 사람들을 저는 지키고 싶어요.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「誰一人、モンスターに襲わせない。私が守る。だから──ついてきてはくれないかしら」"
translation = "「단 한 사람도, 몬스터에게 습격당하게 두지 않겠어요. 제가 지킬게요. 그러니까── 따라와 주시지 않겠나요.」"

[[dialogue]]
speaker = "unk"
original = "長い沈黙の果てに──１人の流星市国民が呟いた。"
translation = "긴 침묵 끝에── 한 명의 유성시국민이 중얼거렸다."

[[dialogue]]
speaker_original = "流星市国民"
speaker_translation = "유성시 국민"
original = "「──ルヴィネ様」"
translation = "「──루비네 님.」"

[[dialogue]]
speaker = "unk"
original = "この少女が、女神テルルが遣わした、世界の最後の希望であるのなら。"
translation = "이 소녀가, 여신 테루루가 보내신, 세계의 마지막 희망이라면."

[[dialogue]]
speaker_original = "流星市国民"
speaker_translation = "유성시 국민"
original = "「ルヴィネ様……お願いします……！」"
translation = "「루비네 님…… 부탁드립니다……!」"

[[dialogue]]
speaker = "unk"
original = "命に代えても守ると告げる少女の言葉に、確かな意思とまごころがこもっているのを皆が感じていたから。"
translation = "목숨을 바꿔서라도 지키겠다고 말하는 소녀의 말에, 확고한 의지와 진심이 담겨 있는 것을 모두가 느꼈으니까."

[[dialogue]]
speaker_original = "流星市国民"
speaker_translation = "유성시 국민"
original = "「どうか私たちを助けてください、ルヴィネ様……！！」"
translation = "「부디 저희를 도와주세요, 루비네 님……!!」"

[[dialogue]]
speaker = "unk"
original = "その日から、大聖堂に身を寄せる避難民たちは、ルヴィネのことを女神テルルと同じくらいに慕い、敬うようになった──"
translation = "그날부터, 대성당에 몸을 의탁한 피난민들은, 루비네를 여신 테루루와 마찬가지로 따르고, 공경하게 되었다──"

