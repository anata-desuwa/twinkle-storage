[[dialogue]]
speaker = "unk"
original = "第１３話,高次元の存在,B"
translation = "제14화, 고차원의 존재, B"

[[dialogue]]
speaker = "unk"
original = "荘厳でありながら、あまりに無機質。"
translation = "장엄하면서도 너무나 무기질적이다."

[[dialogue]]
speaker = "unk"
original = "整然としていながら、あまりに異形。"
translation = "정연하면서도 너무나 이형이다."

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「……………………」"
translation = "「……………………」"

[[dialogue]]
speaker = "unk"
original = "あの煌嶺すらが唾を飲み、見上げている──"
translation = "그 코레이조차 침을 삼키며 올려다보고 있다──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（────まずい）"
translation = "（────위험해）"

[[dialogue]]
speaker = "unk"
original = "カチカチ、カチカチ。"
translation = "딱딱, 딱딱."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（化け物────────）"
translation = "（괴물────────）"

[[dialogue]]
speaker = "unk"
original = "無意識のうちに膝が震え、奥歯が音を立てている……！"
translation = "무의식중에 무릎이 떨리고 어금니가 소리를 내고 있다……!"

[[dialogue]]
speaker = "unk"
original = "ダメだ──俺が、こんなザマでは！！！"
translation = "안 돼── 내가 이런 꼴이어서야!!!"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「────お前が、『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』か！！！！」"
translation = "「────네놈이, 『<ruby>제로스<rt>XELOS</rt></ruby>』냐!!!!」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「その啖呵……不敬が過ぎるわね。けれど褒めてあげましょう、緋宮クロト」"
translation = "「그 기세…… 불경이 도를 넘는구나. 하지만 칭찬해 주지, 히노미야 쿠로토」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネL"
speaker_translation = "할로우 루비네 L"
original = "「かつてディザスターハンドを相手にしても心を折らなかった、レナーテ・<ruby>Ｚ<rt>ジグ</rt></ruby>・サイフリート──」"
translation = "「과거 디재스터 핸드를 상대로도 마음이 꺾이지 않았던 레나테 <ruby>지그<rt>Z</rt></ruby> 자이프리트──」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネL"
speaker_translation = "할로우 루비네 L"
original = "「彼女の心は、お父様の御姿を見ただけでへし折れた」"
translation = "「그녀의 마음은 아버님의 모습을 본 것만으로 꺾였어」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネL"
speaker_translation = "할로우 루비네 L"
original = "「脆弱な人類にとって、お父様の御姿は──ただ見るだけでも多大な負荷を、脳と心にかけるもの」"
translation = "「취약한 인류에게 있어 아버님의 모습은── 그저 보는 것만으로도 막대한 부하를 뇌와 마음에 가하는 법」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「よくぞ声を張り上げられたわね。流石は人類最後の希望と言ったところかしら」"
translation = "「용케도 소리를 높였구나. 역시 인류 마지막 희망이라 할 만하네」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……魔王。大丈夫？」"
translation = "「……마왕. 괜찮아?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。だけど……」"
translation = "「아아. 하지만……」"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「あ……ぁあぁ……」"
translation = "「아…… 아아아……」"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「そんな……」"
translation = "「말도 안 돼……」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「こんなにも……『差』がある、だなんて──」"
translation = "「이렇게나…… 『격차』가 있다니──」"

[[dialogue]]
speaker = "unk"
original = "相対しただけで、星騎士の陣営はひどい有様だ──"
translation = "대치한 것만으로도 성기사 진영은 처참한 꼴이다──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ルヴィネ、お願いがある──君の星力は温かい。みんなの心が折れないように、支えてあげて欲しい」"
translation = "「루비네, 부탁이 있어── 네 성력은 따뜻해. 모두의 마음이 꺾이지 않도록 지탱해 주었으면 해」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「貴方はどうするの！？\u3000まさか──」"
translation = "「당신은 어쩌려고!? 설마──」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「────はい。お父様。御心のままに」"
translation = "「────예. 아버님. 뜻대로 하소서」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「高次元の存在であるお父様のお言葉を、翻訳して伝えましょう」"
translation = "「고차원 존재이신 아버님의 말씀을 번역해서 전해 줄게」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネL"
speaker_translation = "할로우 루비네 L"
original = "「今より『<ruby>再創生<rt>リ・クリエイション</rt></ruby>』を実行に移す──だそうよ？」"
translation = "「지금부터 『<ruby>리크리에<rt>再創生</rt></ruby>』를 실행에 옮긴다──고 하시네?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「────やってみろ！\u3000ディマイズ・ブレイカーッ！！！」"
translation = "「────해볼 테면 해봐라! 디마이즈 브레이커!!!」"

[[dialogue]]
speaker = "unk"
original = "全霊の掌打を、創造神に浴びせかけ──"
translation = "모든 힘을 실은 장타를 창조신에게 날렸으나──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くっ…………！！」"
translation = "「큭…………!!」"

[[dialogue]]
speaker = "unk"
original = "その全てが、すり抜ける──"
translation = "그 모든 것이 스쳐 지나간다──"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「無様ね。低次元存在である貴方が、触れられるわけがないでしょう」"
translation = "「꼴사납구나. 저차원 존재인 네가 만질 수 있을 리가 없잖아」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「さぁ──お父様が戯れてくださるわ。身に余る光栄を噛みしめなさい」"
translation = "「자── 아버님께서 유희를 베풀어 주실 거야. 과분한 영광을 뼈저리게 느끼렴」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「カオス・イージッ──」"
translation = "「카오스 이지──」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「が、ぁあっぁああっ──！！！！」"
translation = "「크, 아아아아악──!!!!」"

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「ク──クロトッ！？」"
translation = "「쿠── 쿠로토!?」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「緋宮会長ッ──！！」"
translation = "「히노미야 회장님──!!」"

[[dialogue]]
speaker = "unk"
original = "今の俺が展開できる絶対防御の盾を、『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』の攻撃が<b>素通り</b>し、肉体を直撃した。"
translation = "지금의 내가 전개할 수 있는 절대방어의 방패를, 『<ruby>제로스<rt>XELOS</rt></ruby>』의 공격이 <b>그대로</b> <b>관통</b>하여 육체를 직격했다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ぅ──ぐぶっ……！\u3000がっ──ぶはぁッ──！！」"
translation = "「으── 윽헉……! 커헉── 쿨럭──!!」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「あなたはお父様よりも低次元の生命体……故に干渉することはできない」"
translation = "「너는 아버님보다 저차원의 생명체…… 그러므로 간섭할 수 없어」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「わかりやすく例えましょうか──あなたは、紙の上に描かれたキャラクターから、頬を撫でられたことはあるかしら？」"
translation = "「이해하기 쉽게 비유해 줄까? 넌 종이 위에 그려진 캐릭터가 네 뺨을 쓰다듬는 걸 겪어본 적이 있니?」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「そんなことはありえない。２次元に存在する線が、３次元のあなたに触れることはできない」"
translation = "「그런 일은 있을 수 없어. 2차원에 존재하는 선이 3차원의 너에게 닿을 수는 없으니까」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネL"
speaker_translation = "할로우 루비네 L"
original = "「けれど３次元存在であるあなたは、２次元存在に一方的に干渉することができるでしょう？」"
translation = "「하지만 3차원 존재인 너는 2차원 존재에게 일방적으로 간섭할 수 있잖아?」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネL"
speaker_translation = "할로우 루비네 L"
original = "「ページを破ればいい。燃やせばいい。インクで塗りつぶすことだってできる──」"
translation = "「페이지를 찢으면 돼. 태우면 돼. 잉크로 칠해 뭉개버릴 수도 있지──」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネL"
speaker_translation = "할로우 루비네 L"
original = "「お父様ははるか先……１１次元空間に存在する『神』。低次元存在には触れることすら叶わない」"
translation = "「아버님은 아득히 저 너머…… 11차원 공간에 존재하는 『신』. 저차원 존재는 닿는 것조차 허락되지 않아」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「はぁっ……はぁっ……！！」"
translation = "「하아…… 하아……!!」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「──お父様。このルヴィネ、お父様の為される奇蹟を目に焼き付けます」"
translation = "「──아버님. 이 루비네, 아버님께서 행하시는 기적을 눈에 새기겠습니다」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「私だけの手で再創生を果たせなかった恥を胸に刻み、今後の糧といたしますので……どうかお見せください」"
translation = "「제 손으로 리크리에를 완수하지 못한 수치를 가슴에 새기고 앞으로의 거름으로 삼을 테니…… 부디 보여주소서」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネL"
speaker_translation = "할로우 루비네 L"
original = "「創造神の──御力を！」"
translation = "「창조신의── 권능을!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ぐ、ァッ──！！！」"
translation = "「크, 으윽──!!!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「お、おおぉぉぉおッ──！！！」"
translation = "「으, 으아아아아앗──!!!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「────、──────ッ！！！」"
translation = "「────, ──────앗!!!」"

[[dialogue]]
speaker = "unk"
original = "諦めて、たまるか。"
translation = "포기하고, 말까보냐."

[[dialogue]]
speaker = "unk"
original = "俺は──"
translation = "나는──"

[[dialogue]]
speaker = "unk"
original = "絶対に──"
translation = "절대로──"

