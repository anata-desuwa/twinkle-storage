[[dialogue]]
speaker = "unk"
original = "第４話,恋愛チャージボム,P"
translation = "그렇게 말하며 마인은 빨간 망토의 후드로 얼굴을 가리면서 내 손을 살며시 잡는 것이었다."

[[dialogue]]
speaker = "unk"
original = "１日レンタル彼氏の一件を通して、ネーゼマインと正式な恋人として付き合うことになった――のだが、あの日以来、彼女の様子がどうもおかしい。"
translation = "제4화, 연애 차지 봄, P"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「あっ、会長……どうしたの？\u3000――私に話があるから、会いにきた？\u3000そ、そうなんだ～」"
translation = "1일 렌탈 남자친구 사건을 통해 네제마인과 정식 연인으로 사귀게 되었다――만, 그날 이후 그녀의 상태가 아무래도 이상하다."

[[dialogue]]
speaker = "ネーゼマイン"
original = "「えっと～、ごめ～ん♪\u3000私、今日は用事あるから～……それじゃ！」"
translation = "「앗, 회장…… 무슨 일이야? ――나한테 할 말이 있어서 만나러 왔어? 그, 그렇구나~」"

[[dialogue]]
speaker = "unk"
original = "ちょっと待って！\u3000なんで逃げるの！？"
translation = "「에또~, 미아~안♪ 나 오늘 볼일이 있어서~…… 그럼 이만!」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "（思わず空き教室まで逃げてきちゃった……。あ～もう、なにやってんだ私は……これで何度目だって話だよ。まさか――）"
translation = "잠깐 기다려! 왜 도망치는 거야!?"

[[dialogue]]
speaker = "ネーゼマイン"
original = "（あの日から、会長の顔を直視できなくなっちゃうなんて……！\u3000これじゃ、普通の女の子みたいじゃん……！）"
translation = "(나도 모르게 빈 교실까지 도망쳐버렸어……. 아~ 정말, 나 뭐 하는 거야…… 이게 벌써 몇 번째냐구. 설마――)"

[[dialogue]]
speaker = "ネーゼマイン"
original = "（なんでこうなってんの！？\u3000なんか心にあった恋愛スイッチが押されて、爆弾が爆発したみたいに前の自分と激変しちゃってるんだけど！？）"
translation = "(그날부터 회장의 얼굴을 똑바로 볼 수 없게 되다니……! 이래선 평범한 여자애 같잖아……!)"

[[dialogue]]
speaker = "ネーゼマイン"
original = "（これって前に心理学の本で読んだ、精神のパラダイムシフトってやつ……！？\u3000そうなるだけ私、会長に対する恋愛感情を今まで抑え込んでたってこと……！？）"
translation = "(왜 이렇게 된 거야!? 왠지 마음속에 있던 연애 스위치가 눌려서, 폭탄이 터진 것처럼 예전의 나와는 급변해버렸는데!?)"

[[dialogue]]
speaker = "ネーゼマイン"
original = "（会長を前にするだけで、まともに見れないし喋れないくらい、胸がドキドキしちゃうとか……！\u3000あ～もう、どうしてこうなった……！？）"
translation = "(이거 전에 심리학 책에서 읽었던 정신의 패러다임 시프트라는 건가……!? 그렇게 될 정도로 나, 회장에 대한 연애 감정을 지금까지 억눌러왔다는 거야……!?)"

[[dialogue]]
speaker = "ネーゼマイン"
original = "（確かにいつか、普通の恋愛がしてみたいと思ってたけど、いざ自覚してみると、問題だらけなんだけど……！）"
translation = "(회장 앞에 서기만 해도 제대로 쳐다보지도 못하고 말도 못 할 정도로 가슴이 두근거린다니……! 아~ 정말, 왜 이렇게 된 거야……!?)"

[[dialogue]]
speaker = "unk"
original = "見つけた！\u3000マイン、話を聞いてくれ！"
translation = "(확실히 언젠가 평범한 연애를 해보고 싶다고 생각했지만, 막상 자각하고 보니 문제투성이잖아……!)"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「うわっ！？\u3000会長、追いかけてきたの！？\u3000待って待って！\u3000今は心の準備が追いついてないから……！」"
translation = "찾았다! 마인, 내 말을 좀 들어줘!"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「――最近、私の様子がおかしくてストレス解消ができてるのか心配？\u3000あっ、ちょっ！？」"
translation = "「우왓!? 회장, 쫓아온 거야!? 기다려 기다려! 지금은 마음의 준비가 덜 됐으니까……!」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「そんないきなり手を握って、真正面から目を見つめてくるのは、今はマズいっていうか……！」"
translation = "「――최근 내 상태가 이상해서 스트레스 해소가 되고 있는지 걱정된다구? 앗, 잠까!?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "（あ～～～っ！\u3000顔が近い近い近い！\u3000ていうか、前から別に顔立ち嫌いじゃなかったけど、今はイケメンすぎて直視できない！）"
translation = "「그렇게 갑자기 손을 잡고 정면에서 눈을 빤히 쳐다보는 건 지금은 곤란하달까……!」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "（ヤバいヤバいヤバい、自分でわかる！\u3000ドキドキがキャパオーバーする！\u3000ここで更に、甘い言葉なんか囁かれたりしたら……！）"
translation = "(아~~~! 얼굴이 가까워 가까워 가까워! 그보다 전부터 딱히 생김새가 싫지는 않았지만, 지금은 너무 잘생겨서 똑바로 못 보겠어!)"

[[dialogue]]
speaker = "unk"
original = "マインのことが好きだから、力になりたんだ"
translation = "(위험해 위험해 위험해, 스스로도 알 수 있어! 두근거림이 캐퍼시티를 초과해! 여기서 더 달콤한 말이라도 속삭여진다면……!)"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ぐはぁっ！！！」"
translation = "마인을 좋아하니까, 힘이 되어주고 싶어."

[[dialogue]]
speaker = "unk"
original = "ちょっ！？\u3000マイン！？"
translation = "「구하앗!!!」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「――う～ん、イケメンすぎ……って、あれ？\u3000ここは……保健室？」"
translation = "잠깐!? 마인!?"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「あ、会長……！？\u3000――急に倒れた私を、保健室に運んできてくれたの？\u3000ご、ごめん……逃げたり、ぶっ倒れたり、迷惑ばっかりかけて……」"
translation = "「――으음, 너무 잘생겼…… 어라? 여기는…… 보건실?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ちゃんと事情……話さないとだよね。実はさ……」"
translation = "「아, 회장……!? ――갑자기 쓰러진 나를 보건실까지 옮겨준 거야? 미, 미안…… 도망치고, 쓰러지고, 민폐만 끼쳐서……」"

[[dialogue]]
speaker = "unk"
original = "マインはそれから、自身の心境の変化について、恥ずかしそうにしながらもちゃんと話してくれた。"
translation = "「제대로 사정…… 이야기해야겠지. 사실은 말야……」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「――そういうわけで、なんか今も会長の顔を見ようとするとドキドキしちゃうから、上手く目を合わせられなくて……」"
translation = "마인은 그 후, 자신의 심경 변화에 대해 부끄러워하면서도 제대로 이야기해주었다."

[[dialogue]]
speaker = "ネーゼマイン"
original = "「あ！\u3000だけど、ストレス解消のことは心配しなくて大丈夫だから！」"
translation = "「――그런 이유로, 왠지 지금도 회장의 얼굴을 보려고 하면 두근거려서 눈을 잘 못 맞추겠어서……」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「自分でも不思議なんだけど、今は会長見てドキドキすると、ストレスが吹っ飛んじゃう感じで、悪戯どころじゃないっていうか……」"
translation = "「아! 하지만 스트레스 해소 건은 걱정 안 해도 괜찮으니까!」"

[[dialogue]]
speaker = "unk"
original = "それって……俺のこと、"
translation = "「나도 신기한데, 지금은 회장을 보고 두근거리면 스트레스가 싹 날아가 버리는 느낌이라 장난칠 때가 아니랄까……」"

[[dialogue]]
speaker = "unk"
original = "好きって思ってくれてるから？"
translation = "그건…… 나를,"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「え！？\u3000う、うん……そうなるかな。今まで恋愛的な『好き』って、わからなかったはずなのに――」"
translation = "좋아한다고 생각해주고 있기 때문이야?"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「今はなんか、自分でも戸惑うくらいに、会長のこと……こんなに好きだったんだって自覚してる」"
translation = "「에!? 으, 응…… 그렇게 되려나. 지금까지 연애적인 『좋아함』은 몰랐을 텐데――」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「なんかいざ本当に付き合い出したら、また面倒臭いことになってて、ごめん……」"
translation = "「지금은 왠지 나조차 당황스러울 정도로 회장을…… 이렇게나 좋아했었다고 자각하고 있어」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「――えっ！？\u3000あ、頭を撫でてもいいかって……いきなりなんで！？」"
translation = "「왠지 막상 정말로 사귀기 시작하니까 또 귀찮은 일이 되어버려서 미안……」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「べ、別に嫌じゃないけど……さっきも言った通り、今の時点でドキドキしてるから……その――」"
translation = "「――엣!? 머, 머리를 쓰다듬어도 되냐니…… 갑자기 왜!?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「も、もしするなら、優しくしないで欲しい……」"
translation = "「딱히 싫지는 않지만…… 아까도 말했듯이 지금 시점에서 이미 두근거리고 있으니까…… 그게――」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「あっ……会長の手、温かい……ん……<emoji=heart04>」"
translation = "「마, 만약 할 거라면 상냥하게 하지 말아줬으면 해……」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「か、会長ってば、優しくしないでって言ったのに嘘つき……<emoji=heart04>\u3000こんな、優しく撫でたりして……はあぁ……<emoji=heart04>」"
translation = "「앗…… 회장의 손, 따뜻해…… 응……❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「……ど、どうしよう……こうされるだけで私、すごく幸せを感じちゃう体になってるんだけど……<emoji=heart04>」"
translation = "「회장도 참, 상냥하게 하지 말라고 했는데 거짓말쟁이……❤️ 이렇게 상냥하게 쓰다듬어 주다니…… 하아아……❤️」"

[[dialogue]]
speaker = "unk"
original = "安心できる？"
translation = "「……어, 어쩌지…… 이래 주는 것만으로 나, 굉장히 행복을 느끼는 몸이 되어버렸는데……❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「う、うん……<emoji=heart04>\u3000ドキドキするけど、気持ちよくて落ち着く感じがする♪\u3000これでいいのかって疑心暗鬼になりそうなくらい……<emoji=heart04>」"
translation = "안심이 돼?"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「――それなら定期的にして慣れてもらわないとな、って？\u3000そんなこと続けられたら私、会長なしじゃ生きられなくなっちゃうんだけど……」"
translation = "「으, 응……❤️ 두근거리지만 기분 좋아서 차분해지는 느낌이 들어♪ 이래도 되는 건가 의구심이 들 정도로……❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「――そうなったら嬉しい？\u3000も、もうっ、会長ってば……」"
translation = "「――그렇다면 정기적으로 해줘서 익숙해지게 해야겠네, 라니? 그런 걸 계속 당하면 나, 회장 없이는 못 살게 되어버릴 텐데……」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「……あのさ、会長。ずっと言えなかったけど……ようやくわかったから、改めてちゃんと言うね？」"
translation = "「――그렇게 되면 기쁘다구? 정, 정말이지 회장도 참……」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「私、会長のこと……好きだよ。前の私には、戻れないくらいに」"
translation = "「……있지, 회장. 계속 말하지 못했지만…… 이제야 알았으니까 다시 한번 제대로 말할게?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「――へ！？\u3000か、可愛くて、キスしたい気分になった！？」"
translation = "「나, 회장을…… 좋아해. 예전의 나로는 돌아갈 수 없을 정도로」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「い、今それはドキドキし過ぎて死んじゃうから、慣れてステップアップするまで、もう少し待って欲しい……」"
translation = "「――헤!? 귀, 귀여워서 키스하고 싶은 기분이 들었다구!?」"

[[dialogue]]
speaker = "unk"
original = "わかってる。これからゆっくりと付き合うよ"
translation = "「지, 지금 그건 너무 두근거려서 죽어버릴 것 같으니까, 익숙해져서 스텝 업 할 때까지 조금만 더 기다려줬으면 해……」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ん……<emoji=heart04>\u3000ありがと、会長……♪」"
translation = "알고 있어. 앞으로 천천히 사귀어 가자."

[[dialogue]]
speaker = "unk"
original = "そうして、はにかみながらも――"
translation = "「응……❤️ 고마워, 회장……♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「にひひ……♪」"
translation = "그렇게 수줍어하면서도――"

[[dialogue]]
speaker = "unk"
original = "ネーゼマインはようやく、いつもの笑顔を見せてくれたのだった。"
translation = "「니히히……♪」"

