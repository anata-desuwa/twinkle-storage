[[dialogue]]
speaker = "unk"
original = "第８話,星々の連携,B"
translation = "제8화, 별들의 연계, B"

[[dialogue]]
speaker = "ユウリ"
original = "「──全力強化だ、ルリ！」"
translation = "「──전력 강화다, 루리!」"

[[dialogue]]
speaker = "ルリエル"
original = "「お任せあれ──！」"
translation = "「맡겨 주시옵소서──!」"

[[dialogue]]
speaker = "モンスター"
original = "「ィィィ！」"
translation = "「이이이!」"

[[dialogue]]
speaker = "ユウリ"
original = "「力を借りるぜ」"
translation = "「힘을 빌린다」"

[[dialogue]]
speaker = "ユウリ"
original = "「イグニッションアサルト！」"
translation = "「이그니션 어설트!」"

[[dialogue]]
speaker = "unk"
original = "ルリエルの加護を浴びたユウリの一閃が、アステラ最奥のモンスターをぶちのめす。"
translation = "루리엘의 가호를 받은 유우리의 일섬이, 아스테라 최심부의 몬스터를 때려눕힌다."

[[dialogue]]
speaker = "モンスター"
original = "「イイイイイッ……！！」"
translation = "「이이이이이……!!」"

[[dialogue]]
speaker = "unk"
original = "主を失った巣は空間ごと消滅していき……"
translation = "주인을 잃은 둥지는 공간째 소멸해 가고……"

[[dialogue]]
speaker = "ユウリ"
original = "「ふぅ──っと、これでようやく４つ解放か」"
translation = "「후우──, 이걸로 겨우 넷 해방인가」"

[[dialogue]]
speaker = "ルリエル"
original = "「ほっ。疲れましたがようやくこれで……ってまたアステラが増えてます！？\u3000ひええぇ」"
translation = "「휴. 지쳤지만 겨우 이걸로…… 앗 또 아스테라가 늘어났습니까!? 히이이익」"

[[dialogue]]
speaker = "unk"
original = "１５分というスピードでアステライトのひとつを解放したユウリにルリエル。"
translation = "15분이라는 속도로 아스테라이트 하나를 해방한 유우리와 루리엘."

[[dialogue]]
speaker = "unk"
original = "しかし彼女らが降り立った先に見たのは、さらに増殖したアステラの影という影だった。"
translation = "하지만 그녀들이 내려선 곳에서 본 것은, 더욱 증식한 아스테라의 그림자라는 그림자였다."

[[dialogue]]
speaker = "ユウリ"
original = "「今日はさっきの戦闘だけでけっこう力使ってんだけど……な……！」"
translation = "「오늘은 방금 전투만으로 꽤 힘을 썼는데…… 말이지……!」"

[[dialogue]]
speaker = "ルリエル"
original = "「気張るしかありませんね……ふぁいおー！」"
translation = "「힘낼 수밖에 없겠네요…… 파이팅!」"

[[dialogue]]
speaker = "unk"
original = "次々と生まれ落ちるモンスターに応戦する２人。"
translation = "차례차례 태어나는 몬스터에 응전하는 두 사람."

[[dialogue]]
speaker = "unk"
original = "星力は無限ではないため、燃費も考えて対処しなくてはならないが……"
translation = "성력은 무한하지 않으므로, 연비도 고려하여 대처해야 하지만……"

[[dialogue]]
speaker = "ユウリ"
original = "「ああもう、また──！」"
translation = "「아아 정말, 또──!」"

[[dialogue]]
speaker = "unk"
original = "新たな敵影に反応しかけるユウリ──しかし、そこに現れたのはモンスターではなかった。"
translation = "새로운 적의 그림자에 반응하려던 유우리── 하지만, 그곳에 나타난 것은 몬스터가 아니었다."

[[dialogue]]
speaker = "unk"
original = "正体は一羽の小さいフェニックス。"
translation = "정체는 한 마리의 작은 피닉스."

[[dialogue]]
speaker = "unk"
original = "その羽ばたきは闇の竜巻をいくつも起こして、範囲内のモンスターを消滅させた。"
translation = "그 날갯짓은 어둠의 회오리를 여러 개 일으켜, 범위 내의 몬스터를 소멸시켰다."

[[dialogue]]
speaker = "ルリエル"
original = "「今の──って……！」"
translation = "「방금 그건── 설마……!」"

[[dialogue]]
speaker = "フィオナ"
original = "「──お待たせしました、ユウリ。ルリエル」"
translation = "「──기다리게 해서 죄송합니다, 유우리. 루리엘」"

[[dialogue]]
speaker = "ユウリ"
original = "「フィオナ──！」"
translation = "「피오나──!」"

[[dialogue]]
speaker = "ルリエル"
original = "「おおおっ会長！\u3000なんと頼もしい援軍でありましょーか！」"
translation = "「오오오 회장! 이 얼마나 든든한 원군이 아니겠습니까!」"

[[dialogue]]
speaker = "ニャリオン"
original = "「ニャーッニャッニャッニャッ！\u3000時間稼ぎご苦労であったニャ家来ども！\u3000このフィオナ嬢が来たからにはもう安心ニャン！」"
translation = "「냐아앗 냐냐냐냐! 시간 벌이 수고했다 냥 가신들아! 이 피오나 아가씨가 왔으니 이젠 안심이냥!」"

[[dialogue]]
speaker = "ユウリ"
original = "「なんでおまえに偉そうにされるのかはわかんねーけど……助かる！\u3000一気に解放してくぞ！」"
translation = "「왜 네놈에게 잘난 척을 당해야 하는지는 모르겠지만…… 살았다! 단숨에 해방해 나간다!」"

[[dialogue]]
speaker = "ルリエル"
original = "「あいあいさー！」"
translation = "「아이 아이 싸!」"

[[dialogue]]
speaker = "モンスター"
original = "「ウィイイイイイ！！」"
translation = "「위이이이이!!」"

[[dialogue]]
speaker = "セーラ"
original = "「アナちゃん──そっち行ける！？」"
translation = "「아나짱── 저쪽 갈 수 있어!?」"

[[dialogue]]
speaker = "アナ"
original = "「ノープロブレム──逆サイドの警戒をお願いします、桐原先輩」"
translation = "「노 프라블럼── 반대편 경계를 부탁드립니다, 키리하라 선배」"

[[dialogue]]
speaker = "unk"
original = "アナの放った業炎の矢が一列に並んだ小アステラをまとめて消し飛ばす。"
translation = "아나가 쏜 업염의 화살이 일렬로 늘어선 작은 아스테라를 한꺼번에 날려버린다."

[[dialogue]]
speaker = "unk"
original = "無防備なその背後に忍び寄った敵の群れを、雷撃銃が刹那の間に消し炭へと変えた。"
translation = "무방비한 그 등 뒤로 다가온 적 무리를, 뇌격총이 찰나의 순간에 숯덩이로 바꾸었다."

[[dialogue]]
speaker = "セーラ"
original = "「だいぶ減らしたけど──」"
translation = "「꽤 줄였지만──」"

[[dialogue]]
speaker = "アナ"
original = "「まだまだ、ですね」"
translation = "「아직 멀었네요」"

[[dialogue]]
speaker = "unk"
original = "星徒会という特級戦力である彼女らは、わずか２名でこの区域の掃討を任されていた。"
translation = "성도회라는 특급 전력인 그녀들은, 불과 2명으로 이 구역의 소탕을 맡고 있었다."

[[dialogue]]
speaker = "unk"
original = "先の戦闘による疲弊も相まって、暗雲立ち込める状況である。"
translation = "이전 전투로 인한 피로까지 겹쳐, 암운이 드리우는 상황이다."

[[dialogue]]
speaker = "モンスター"
original = "「イイイイイィィ……！！」"
translation = "「이이이이이이……!!」"

[[dialogue]]
speaker = "マトイ"
original = "「インパルスアイリス」"
translation = "「임펄스 아이리스」"

[[dialogue]]
speaker = "アナ"
original = "「！\u3000マトイ先輩」"
translation = "「! 마토이 선배」"

[[dialogue]]
speaker = "マトイ"
original = "「お待たせしました──！\u3000って言っても、私しかいないんですけど……！」"
translation = "「기다리셨습니다──! 라고 해도, 저밖에 없지만요……!」"

[[dialogue]]
speaker = "unk"
original = "そこに舞い戻ってきたのはマトイだった。"
translation = "그곳에 다시 돌아온 것은 마토이였다."

[[dialogue]]
speaker = "アナ"
original = "「いえ……頼もしいです」"
translation = "「아뇨…… 든든합니다」"

[[dialogue]]
speaker = "モンスター"
original = "「ウィィィィィイ！！」"
translation = "「위이이이이!!」"

[[dialogue]]
speaker = "セーラ"
original = "「あたしらもろにアタッカーって感じだからさー。１人でも盾役がいてくれると、超やりやすいんだよ──ねっ！」"
translation = "「우리들은 완전히 공격수라는 느낌이니까 말이야. 한 명이라도 방패 역할이 있어 주면, 엄청 편해진다구── 그치!」"

[[dialogue]]
speaker = "セーラ"
original = "「エレクトロバレット！」"
translation = "「일렉트로 버스트!」"

[[dialogue]]
speaker = "アナ"
original = "「レッドデルタ」"
translation = "「레드 델타」"

[[dialogue]]
speaker = "モンスター"
original = "「イイイイ──ッ！」"
translation = "「이이이이──!」"

[[dialogue]]
speaker = "unk"
original = "マトイの早駆けを<ruby>囮<rt>デコイ</rt></ruby>として、釣られたモンスターを雷撃と爆炎が舐め尽くす。"
translation = "마토이의 빠른 달리기를 미끼로 삼아, 유인된 몬스터를 뇌격과 폭염이 휩쓴다."

[[dialogue]]
speaker = "unk"
original = "彼女たちのフォーメーションは、どんどん効率の良い狩り方へと進化していった……。"
translation = "그녀들의 포메이션은, 점점 효율 좋은 사냥 방법으로 진화해 나갔다……."

