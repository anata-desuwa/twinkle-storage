[[dialogue]]
speaker = "unk"
original = "第４話,指切りげんまん,P"
translation = "제4화, 손가락 걸고 약속, P"

[[dialogue]]
speaker = "unk"
original = "グレイスと同じ時間を過ごすうち、俺は彼女のことを１人の異性として意識するようになっていた。"
translation = "그레이스와 같은 시간을 보내는 동안 나는 그녀를 한 명의 이성으로 의식하게 되었다."

[[dialogue]]
speaker = "unk"
original = "だから意を決して、休日にグレイスを遊びに誘うことにした──"
translation = "그래서 마음을 먹고 휴일에 그레이스를 놀러 가자고 권유하기로 했다──"

[[dialogue]]
speaker = "グレイス"
original = "「まさか魔王さんに、遊園地に誘っていただけるだなんて──驚きました！」"
translation = "「설마 마왕 씨가 유원지에 가자고 하실 줄이야── 놀랐어요!」"

[[dialogue]]
speaker = "グレイス"
original = "「でもでも、私だけなんて他の皆に悪い気が……」"
translation = "「하지만 하지만, 저만 가는 건 다른 애들한테 미안한 기분이……」"

[[dialogue]]
speaker = "unk"
original = "これ、２人用なんだ"
translation = "이거, 2인용이거든."

[[dialogue]]
speaker = "unk"
original = "バイトしてた時のチケットが余っててね"
translation = "알바했을 때 받은 티켓이 남아서 말이야."

[[dialogue]]
speaker = "グレイス"
original = "「なるほどです！\u3000じゃあ仕方がないですね！\u3000チナたちには悪いですが、今日は楽しませてもらいます！」"
translation = "「그렇군요! 그럼 어쩔 수 없네요! 치나 일행에겐 미안하지만 오늘은 즐겁게 놀게요!」"

[[dialogue]]
speaker = "グレイス"
original = "「でも……あはは。ちょ、ちょっとドキドキしますね……魔王さんと２人きりでお出かけだなんて」"
translation = "「하지만…… 아하하. 조, 조금 두근거리네요…… 마왕 씨랑 둘이서 외출이라니」"

[[dialogue]]
speaker = "グレイス"
original = "「な、なんだかデートみたいじゃありませんか……！？」"
translation = "「왠, 왠지 데이트 같지 않나요……!?」"

[[dialogue]]
speaker = "グレイス"
original = "「あ──い、いえいえ！\u3000誤解はしてないですよ！？\u3000あくまで余ってたチケットでお誘いしてもらっただけですし！」"
translation = "「아── 아, 아니 아니요! 오해는 안 했어요!? 어디까지나 남은 티켓으로 불러주신 것뿐이고!」"

[[dialogue]]
speaker = "グレイス"
original = "「故郷を離れた、平行世界人の私をおもてなししてくれてるだけって、ええもうバッチリわかってますとも……！」"
translation = "「고향을 떠난 평행세계인인 저를 대접해 주시는 것뿐이라고, 네 아주 잘 알고 있다고요……!」"

[[dialogue]]
speaker = "グレイス"
original = "「魔王さんの周りには可愛い女の子もたくさんいらっしゃいますし、ええもうこれっぽっちも乙女のトキメキ的な誤解なんて──」"
translation = "「마왕 씨 주변에는 귀여운 여자애들도 많이 있고, 네 정말 손톱만큼도 소녀의 설렘 같은 오해 따위는──」"

[[dialogue]]
speaker = "unk"
original = "えっと……デートのお誘い、なんだけど"
translation = "저기…… 데이트 신청한 건데."

[[dialogue]]
speaker = "グレイス"
original = "「はえぇええ──っ！？」"
translation = "「하에에에──!?」"

[[dialogue]]
speaker = "グレイス"
original = "「あ、あれれっ……ま、マジのやつです？\u3000これ、デートだったんです！？」"
translation = "「아, 어라라…… 지, 진짜예요? 이거 데이트였어요!?」"

[[dialogue]]
speaker = "unk"
original = "──あれは嘘だ"
translation = "──그건 거짓말이야."

[[dialogue]]
speaker = "unk"
original = "このチケット、余っていたと伝えたな"
translation = "이 티켓, 남았다고 말했었지."

[[dialogue]]
speaker = "グレイス"
original = "「そんなっ！？\u3000嘘だったのですか！？」"
translation = "「그럴 수가!? 거짓말이었나요!?」"

[[dialogue]]
speaker = "グレイス"
original = "「私とお出かけするために、わざわざ買った……ですか？」"
translation = "「저랑 외출하려고 일부러 샀다……는 건가요?」"

[[dialogue]]
speaker = "グレイス"
original = "「えっ、えっえっえっ──じゃ、じゃあ……本当の本当に……デート？」"
translation = "「엣, 엣엣엣── 그, 그럼…… 정말로 진짜로…… 데이트?」"

[[dialogue]]
speaker = "グレイス"
original = "「……………………ぷしゅー」"
translation = "「……………………푸슈─」"

[[dialogue]]
speaker = "unk"
original = "顔を真っ赤にして、フリーズしてしまった……"
translation = "얼굴을 새빨갛게 붉히고 굳어버렸다……"

[[dialogue]]
speaker = "unk"
original = "と、とりあえずアトラクションを楽しもう……！！"
translation = "일, 일단 어트랙션을 즐기자……!!"

[[dialogue]]
speaker = "遊園地のスタッフ"
original = "「お２人ですね。チケットを拝見いたします」"
translation = "「두 분이시군요. 티켓 확인하겠습니다」"

[[dialogue]]
speaker = "グレイス"
original = "「…………う、うすっ」"
translation = "「…………으, 얍」"

[[dialogue]]
speaker = "遊園地のスタッフ"
original = "「はい、確認いたしました。どうぞお楽しみください♪」"
translation = "「네, 확인되었습니다. 즐거운 시간 되세요♪」"

[[dialogue]]
speaker = "グレイス"
original = "「…………お、おすっ」"
translation = "「…………어, 옙」"

[[dialogue]]
speaker = "unk"
original = "口調もなんか変だし……"
translation = "말투도 왠지 이상하고……"

[[dialogue]]
speaker = "unk"
original = "右手と右足が一緒に出てるし……"
translation = "오른손이랑 오른발이 같이 나가고 있고……"

[[dialogue]]
speaker = "グレイス"
original = "「い、意識しちゃって……あうあう……」"
translation = "「의, 의식해버려서…… 아우아우……」"

[[dialogue]]
speaker = "グレイス"
original = "「──きゃっ！？\u3000躓いて──」"
translation = "「──꺅!? 발이 꼬여서──」"

[[dialogue]]
speaker = "unk"
original = "おっと！"
translation = "어이쿠!"

[[dialogue]]
speaker = "グレイス"
original = "「あ、あぁぁあ……私の肩を、ギュって……力、強い……」"
translation = "「아, 아아아…… 내 어깨를 꽉…… 힘, 세다……」"

[[dialogue]]
speaker = "グレイス"
original = "「……………………ぷっしゅ～」"
translation = "「……………………푸슈우~」"

[[dialogue]]
speaker = "unk"
original = "手、繋いでいこうか"
translation = "손 잡고 갈까."

[[dialogue]]
speaker = "グレイス"
original = "「……あ、あい。よろしく、お願い、シマス……」"
translation = "「……아, 알겠, 습니다. 잘, 부탁, 드림미다……」"

[[dialogue]]
speaker = "unk"
original = "ここまで意識されてしまうだなんてびっくりだけど、悪い気はしない。"
translation = "이렇게까지 의식할 줄이야 깜짝 놀랐지만 기분이 나쁘지는 않다."

[[dialogue]]
speaker = "unk"
original = "俺は彼女の緊張がほぐせるように、遊園地中を連れまわすのだった──"
translation = "나는 그녀의 긴장이 풀릴 수 있도록 유원지 곳곳을 데리고 다녔다──"

[[dialogue]]
speaker = "グレイス"
original = "「いきなりのデートという展開に、受け入れるのに少し時間がかかりましたが……」"
translation = "「갑작스러운 데이트라는 전개에 받아들이는 데 시간이 좀 걸렸지만……」"

[[dialogue]]
speaker = "グレイス"
original = "「──とっても楽しかったです！\u3000お誘いいただきありがとうございましたっ！」"
translation = "「──정말 즐거웠어요! 초대해 주셔서 감사합니다!」"

[[dialogue]]
speaker = "unk"
original = "いつものグレイスに戻ってくれてよかった"
translation = "평소의 그레이스로 돌아와 줘서 다행이야."

[[dialogue]]
speaker = "グレイス"
original = "「あはは……お恥ずかしい限りです。昔から、女の子の友達とばかり遊んでましたし……」"
translation = "「아하하…… 부끄러울 따름이에요. 옛날부터 여자애 친구들이랑만 놀았고……」"

[[dialogue]]
speaker = "グレイス"
original = "「男の子と２人きりのお出かけも、デートも初めてだったので……」"
translation = "「남자애랑 둘이서 외출하는 것도, 데이트도 처음이라서……」"

[[dialogue]]
speaker = "unk"
original = "グレイス、モテそうだけど"
translation = "그레이스, 인기 많을 것 같은데."

[[dialogue]]
speaker = "グレイス"
original = "「そ、そう見えます？\u3000んー……まあ、手紙とかは、ちょくちょく貰いますけれど」"
translation = "「그, 그렇게 보여요? 음─…… 뭐, 편지 같은 건 가끔 받긴 하지만요」"

[[dialogue]]
speaker = "グレイス"
original = "「全部断ってました。星徒会のお仕事で忙しいですし、それに──」"
translation = "「전부 거절했어요. 성도회 일로 바쁘기도 하고, 그리고──」"

[[dialogue]]
speaker = "グレイス"
original = "「私、好きな人がいるんです。ずっと昔から……」"
translation = "「저, 좋아하는 사람이 있거든요. 아주 옛날부터……」"

[[dialogue]]
speaker = "グレイス"
original = "「えへへ、でもその人、彼女がいたので。告白する前から振られちゃったんですけどね！」"
translation = "「에헤헤, 근데 그 사람 여자친구가 있었거든요. 고백하기도 전에 차여버린 셈이지만요!」"

[[dialogue]]
speaker = "グレイス"
original = "「……あれだけ意識してたら、ごまかしても無駄だから言っちゃいますけど。魔王さん、ですからね？」"
translation = "「……이만큼 의식하고 있으면 얼버무려봤자 소용없으니까 말해버리겠는데. 마왕 씨, 거든요?」"

[[dialogue]]
speaker = "グレイス"
original = "「１０年間、ずーっと蓋をしてきましたけど。本当は……ずっとずっと、大好きでした……」"
translation = "「10년 동안 계속 뚜껑을 덮어왔지만. 사실은…… 계속 계속, 정말 좋아했어요……」"

[[dialogue]]
speaker = "unk"
original = "君の好きな人と俺は、正確には違う"
translation = "네가 좋아하는 사람이랑 나는 엄밀히 말하면 달라."

[[dialogue]]
speaker = "グレイス"
original = "「……そうですね。あの人はもういません」"
translation = "「……그렇네요. 그 사람은 이제 없죠」"

[[dialogue]]
speaker = "unk"
original = "グレイスのことが好きだよ"
translation = "그레이스를 좋아해."

[[dialogue]]
speaker = "unk"
original = "でも、アルタイルの俺は──"
translation = "하지만 알타이르의 나는──"

[[dialogue]]
speaker = "グレイス"
original = "「…………っ！」"
translation = "「…………윽!」"

[[dialogue]]
speaker = "unk"
original = "だから……俺の恋人になってくれないか"
translation = "그러니까…… 내 연인이 되어주지 않을래?"

[[dialogue]]
speaker = "unk"
original = "君の憧れの人に近づけるよう努力をする"
translation = "네가 동경하는 사람에게 다가갈 수 있도록 노력을 할게"

[[dialogue]]
speaker = "グレイス"
original = "「…………嬉しいです、魔王さん」"
translation = "「…………기뻐요, 마왕 씨」"

[[dialogue]]
speaker = "グレイス"
original = "「──はい。私を、あなたの彼女にしてください！」"
translation = "「──네. 저를, 당신의 여자친구로 삼아주세요!」"

[[dialogue]]
speaker = "グレイス"
original = "「約束してくれますか。今度こそ……私の前からいなくならないって！」"
translation = "「약속해 주실 건가요. 이번에야말로…… 제 앞에서 사라지지 않겠다고!」"

[[dialogue]]
speaker = "unk"
original = "そうして俺は頷き──グレイスの差しだした小指に、自身の小指を絡めて。"
translation = "그렇게 나는 고개를 끄덕이며── 그레이스가 내민 새끼손가락에, 자신의 새끼손가락을 걸었다."

[[dialogue]]
speaker = "unk"
original = "１０年越しの、世界すらを飛び越えた指切りをもう一度交わすのだった──"
translation = "10년의 세월을 넘어, 세계마저 뛰어넘은 약속을 다시 한번 나누는 것이었다──"

