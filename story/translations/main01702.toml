[[dialogue]]
speaker = "unk"
original = "第２話,失望,B"
translation = "제2화, 실망, B"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「──ふぅ」"
translation = "「──휴」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "（ここへ来ると……少々、昔を思い出してしまいますね）"
translation = "（여기에 오면…… 조금, 옛날이 생각나 버리는군요）"

[[dialogue]]
speaker = "unk"
original = "希崎レイトとして生を受けた青年は、ギエルという名を<ruby>賜<rt>たまわ</rt></ruby>って生まれ変わった。"
translation = "키자키 레이토로서 태어난 청년은, 기엘이라는 이름을 하사받아 다시 태어났다."

[[dialogue]]
speaker = "unk"
original = "アポロの従者として『新月』の星力を分け与えられた彼は、ようやく念願の何者かたる力を手にした。"
translation = "아폴로의 종자로서 『신월』의 성력을 나눠 받은 그는, 마침내 염원하던 누군가로서의 힘을 손에 넣었다."

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "（アポロ様……あなたに出会えたことが、私にとって唯一の幸運）"
translation = "（아폴로 님…… 당신을 만난 것이, 저에게 있어 유일한 행운）"

[[dialogue]]
speaker = "unk"
original = "青年のアイデンティティはいつしかギエルそのものに染まった。"
translation = "청년의 정체성은 어느새 기엘 그 자체로 물들었다."

[[dialogue]]
speaker = "unk"
original = "主アポロが野望へ向かって突き進む限り──その身が尽き果てようとも、執事として永劫仕えることを誓っていた。"
translation = "주군 아폴로가 야망을 향해 돌진하는 한── 그 몸이 다할지라도, 집사로서 영원히 섬길 것을 맹세하고 있었다."

[[dialogue]]
speaker_original = "避難する女性"
speaker_translation = "피난하는 여성"
original = "「はぁっ、はぁっ……ッ……も、もうダメ──っ……！」"
translation = "「하아, 하아…… 윽…… 이, 이제 안 돼──!」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「諦めないで──！\u3000私たちが最後まで、皆さんを守り抜きますから──！」"
translation = "「포기하지 마세요──! 저희가 끝까지, 여러분을 지켜낼 테니까요──!」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「さて……宴も佳境と言ったところですが」"
translation = "「자…… 연회도 클라이맥스라고 할 수 있겠군요」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「ふふ……粘りますねえ。ですが無駄ですよ、星騎士の皆さん──くくくっ！」"
translation = "「후후…… 끈질기군요. 하지만 소용없습니다, 성기사 여러분── 크크크!」"

[[dialogue]]
speaker_original = "馬人型モンスター"
speaker_translation = "마인형 몬스터"
original = "「──ヒヒイイイイイィィィィン────！！」"
translation = "「──히히이이이이이잉────!!」"

[[dialogue]]
speaker = "unk"
original = "ギエルは生まれくるモンスターたちを操り、破壊の狂想曲を奏でていた。"
translation = "기엘은 태어나는 몬스터들을 조종하며, 파괴의 광상곡을 연주하고 있었다."

[[dialogue]]
speaker_original = "教皇庁の衛兵Ａ"
speaker_translation = "교황청 위병 A"
original = "「──あいつだ！\u3000あいつがモンスターたちを指揮してるぞ！」"
translation = "「──저놈이다! 저놈이 몬스터들을 지휘하고 있어!」"

[[dialogue]]
speaker_original = "教皇庁の衛兵Ｂ"
speaker_translation = "교황청 위병 B"
original = "「あの男は……仮面の少女ほど強くない！\u3000抑えろ──！」"
translation = "「저 남자는…… 가면의 소녀만큼 강하지 않아! 막아라──!」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「やれやれ……舐められたものですねえ。死ぬがよろしい」"
translation = "「이런이런…… 얕보이는군요. 죽는 것이 좋겠습니다」"

[[dialogue]]
speaker_original = "教皇庁の衛兵Ｂ"
speaker_translation = "교황청 위병 B"
original = "「がはっ────！？」"
translation = "「커헉────!?」"

[[dialogue]]
speaker_original = "教皇庁の衛兵Ａ"
speaker_translation = "교황청 위병 A"
original = "「ひ……ひいい────！？」"
translation = "「히…… 히이이────!?」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「あなた──！」"
translation = "「당신──!」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「──ふはははは！\u3000ご安心めされよ人の子よ、じきに全ての命はゼロへ還るのですから！」"
translation = "「──푸하하하하! 안심하십시오 인간의 아이여, 곧 모든 생명은 제로로 돌아갈 테니까요!」"

[[dialogue]]
speaker = "unk"
original = "『新月』の星術をふるい──ギエルは街を蹂躙していく。"
translation = "『신월』의 성술을 휘두르며── 기엘은 거리를 유린해 간다."

[[dialogue]]
speaker = "unk"
original = "すべては魂をも捧げた主のために。"
translation = "모든 것은 영혼마저 바친 주군을 위해."

[[dialogue]]
speaker = "unk"
original = "だが……そんな彼の愉悦も、長くは続かなかった。"
translation = "하지만…… 그런 그의 희열도, 오래가지는 못했다."

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker_original = "喜ぶ市民"
speaker_translation = "기뻐하는 시민"
original = "「空が……空が戻ったぞ！」"
translation = "「하늘이…… 하늘이 돌아왔다!」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「建物も元に戻って……！」"
translation = "「건물도 원래대로 돌아오고……!」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「星術のコンディションも完全に復活したようね──これなら不足はないわ！」"
translation = "「성술의 컨디션도 완전히 부활한 것 같네요── 이 정도면 부족함은 없어요!」"

[[dialogue]]
speaker = "unk"
original = "天を覆っていた異色の空が、晴れやかな蒼穹へと変わった。"
translation = "하늘을 뒤덮고 있던 이색적인 하늘이, 맑고 푸른 창공으로 바뀌었다."

[[dialogue]]
speaker = "unk"
original = "立ちどころに戻っていく異変に、市民らは歓喜に湧いた。"
translation = "즉시 되돌아가는 이변에, 시민들은 환희에 휩싸였다."

[[dialogue]]
speaker = "unk"
original = "ギエルは天を仰いだ。"
translation = "기엘은 하늘을 올려다보았다."

[[dialogue]]
speaker = "unk"
original = "フィーニスの塔の頂上で生じた異変──"
translation = "피니스의 탑 꼭대기에서 발생한 이변──"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「アポロ……様……？」"
translation = "「아폴로…… 님……?」"

[[dialogue]]
speaker = "unk"
original = "同時に『天蓋』の解除をも察したギエルは、主に何が起きたのかを理解してしまった。"
translation = "동시에 『천개』의 해제마저 감지한 기엘은, 주군에게 무슨 일이 일어났는지 이해해 버렸다."

[[dialogue]]
speaker = "unk"
original = "誰よりもアポロの近くで仕えてきた彼だからこそ──その波動の変質に、気づかずにはいられない。"
translation = "누구보다 아폴로 가까이에서 섬겨왔던 그였기에── 그 파동의 변질을, 눈치채지 않을 수 없었다."

[[dialogue]]
speaker = "unk"
original = "そして、希崎レイト青年の胸に去来したのは、あの日ぶりに味わう絶望の色だった。"
translation = "그리고, 키자키 레이토 청년의 가슴에 스쳐 지나간 것은, 그날 이후 처음으로 맛보는 절망의 색이었다."

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "（……ああ）"
translation = "（……아아）"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "（残念です……アポロ様。あなたこそ、我が永劫の主であると信じていたのに）"
translation = "（유감입니다…… 아폴로 님. 당신이야말로, 저의 영원한 주군이라고 믿고 있었는데）"

[[dialogue]]
speaker = "unk"
original = "それは新月のごとき澄んだ暗さだった。"
translation = "그것은 신월과 같은 맑은 어둠이었다."

[[dialogue]]
speaker = "unk"
original = "ぽつりとこの世に落ちたひと粒の影が、フィーニスの塔へ向けて飛び立った。"
translation = "뚝 떨어져 이 세상에 내려앉은 한 방울의 그림자가, 피니스의 탑을 향해 날아올랐다."

