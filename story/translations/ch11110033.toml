[[dialogue]]
speaker = "unk"
original = "第３話,ベアトと水泳デート,P"
translation = "제3화, 베아토와 수영 데이트, P"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「手を交互に回しながら、はぁはぁっ、水を蹴るように足を動かして……」"
translation = "「손을 번갈아 휘두르면서, 하아하아, 물을 차듯이 발을 움직여서……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ぷはっ。どうですか？\u3000上手に泳げてますか？」"
translation = "「푸하. 어때요? 잘 헤엄치고 있나요?」"

[[dialogue]]
speaker = "unk"
original = "上手い上手い、しっかり泳げてるよ"
translation = "잘해 잘해, 제대로 헤엄치고 있어"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「えへへ、良かったです。この間、リゾート結界の新モードに挑戦した時に、選管のみんなに泳ぎ方を教えてもらったんですよ」"
translation = "「에헤헤, 다행이에요. 얼마 전 리조트 결계의 신모드에 도전했을 때, 선관 모두에게 수영하는 법을 배웠거든요.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「みんなそれぞれ違った泳ぎ方を教えようとしてくれて、でも途中で話が脱線して──ふふ、あれは面白かったなぁ」"
translation = "「모두 제각각 다른 수영법을 가르쳐주려고 해서, 중간에 이야기가 샜지만──후후, 그건 재밌었지.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「海で泳ぐ方法？\u3000それなら、こうだ！\u3000手足を思いっきりバタバタさせれば、どこまででも泳げるぞ！」"
translation = "「바다에서 수영하는 방법? 그렇다면 이거다! 손발을 힘껏 파닥거리면 어디까지든 헤엄칠 수 있다고!」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「犬かきでそこまで速度が出るのはアポロだけだよ。大事なのは水音を立てないことじゃない？\u3000獲物に気付かれちゃうから」"
translation = "「개헤엄으로 그렇게 속도가 나는 건 아폴로뿐이야. 중요한 건 물소리를 내지 않는 거 아냐? 사냥감에게 들키니까.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「そう静かに速く泳げるのもナターシャくらいだ。基本はやはりクロールや平泳ぎじゃないか？」"
translation = "「그렇게 조용하고 빠르게 헤엄칠 수 있는 것도 나탸샤 정도지. 기본은 역시 크롤이나 평영 아니겠어?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「もっとも、まずは水に浮くことに慣れるのが先決だと思うぞ。浮かないことには溺れてしまうからな」"
translation = "「무엇보다 우선 물에 뜨는 것에 익숙해지는 게 먼저라고 생각해. 뜨지 않으면 가라앉아 버리니까.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「つったら、やっぱ手足をバタバタ動かすのが一番だろ！\u3000動いてねーと沈んでいくばっかだからな！」"
translation = "「그렇다면 역시 손발을 파닥파닥 움직이는 게 최고라니까! 움직이지 않으면 계속 가라앉기만 할 테니까!」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「それだと体力を消耗しちゃうって。水面から目と鼻だけを出して、静かにしたたかに、水を蹴って浮くのが潜伏泳法のコツだよ」"
translation = "「그러면 체력을 소모해 버린다니까. 수면에서 눈과 코만 내놓고 조용하고 끈기 있게 물을 차서 뜨는 게 잠복 수영의 요령이야.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「潜伏する必要はないだろう。むしろ両手両足を大きく広げて、体の力をできるだけ抜いて水面に寝転がるといい」"
translation = "「잠복할 필요는 없겠지. 오히려 양손 양발을 크게 벌리고 몸의 힘을 최대한 빼서 수면에 눕는 게 좋아.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「背泳ぎってヤツだろー？\u3000でも、それはナターシャやベアトみてーにデッカい浮き袋が胸についてるヤツ限定じゃねーのかっ！？」"
translation = "「배영이라는 거잖아? 하지만 그건 나탸샤나 베아토처럼 커다란 부표가 가슴에 달린 녀석들 한정 아니냐고!?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「あたしとか梨緒は、手足をバタバタさせた方が浮けるって！\u3000絶対そーだぜっ！」"
translation = "「나나 리오는 손발을 파닥거려야 뜰 수 있다니까! 절대 그렇다구!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……待て、聞き捨てならない。胸の大きさが関係あるかはさておき、ナターシャほどじゃないが私もそれなりにあるんだぞ」"
translation = "「……잠깐, 그냥 넘길 수 없는 말이네. 가슴 크기가 관계있는지는 차치하고, 나탸샤 정도는 아니지만 나도 나름대로 있다고.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「なら背泳ぎ勝負でもする？\u3000案外、梨緒が最初に脱落しちゃうかもよ？」"
translation = "「그럼 배영 승부라도 할래? 의외로 리오가 가장 먼저 탈락할지도 몰라?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「望むところだ……！\u3000ちょっと大きめのブイがついているからって調子に乗るんじゃないぞナターシャ！\u3000むしろ過剰な浮力は不安定さに繋がるんだからなっ！」"
translation = "「바라던 바다……! 좀 커다란 부이가 달려 있다고 우쭐대지 마라 나탸샤! 오히려 과도한 부력은 불안정함으로 이어진다고!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「それから泳ぎ方を教えるのそっちのけで、誰が最後まで水に浮いていられるのか勝負になって──気付いたら、ただみんなと海ではしゃぎ回ってて」"
translation = "「그러다가 수영 가르쳐주는 건 뒷전이고 누가 마지막까지 물에 떠 있을 수 있는지 승부가 돼서──정신 차려보니 그냥 다 같이 바다에서 떠들며 놀고 있었어요.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「おかげで泳ぎ方はほとんど我流になっちゃいました。沈まないようにするのだけは得意中の得意になりましたけど♪」"
translation = "「덕분에 수영법은 거의 자기류가 되어버렸어요. 가라앉지 않게 하는 것만큼은 특기 중의 특기가 되었지만요♪」"

[[dialogue]]
speaker = "unk"
original = "背泳ぎ勝負か……"
translation = "배영 승부라……"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「わわっ、どこを見てるんですかっ。エッチですよ、エッチ……！\u3000そういうのは、バレないように覗いてください……！」"
translation = "「와왓, 어딜 보고 있는 건가요. 변태예요, 변태……! 그런 건 안 들키게 훔쳐봐 주세요……!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「バレないように覗かれる分には、私も恥ずかしくありませんから……。会長さんに見られる分には、その、私も悪い気はしませんし……」"
translation = "「안 들키게 훔쳐보는 거라면 저도 부끄럽지 않으니까요……. 회장님이 보는 거라면, 그게, 저도 기분이 나쁘지는 않고요……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「って──私はなんの話をっ！？\u3000そうじゃなくてですね、今日は泳ぎの練習に付き合って欲しいってお願いしてるんですっ！」"
translation = "「아니── 난 무슨 소리를 하는 거야앗!? 그게 아니라요, 오늘은 수영 연습을 도와달라고 부탁드리는 거예요!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「結局、我流になっちゃいましたから、改めてきちんとした泳ぎ方を覚えたくて。会長さんの時間をもらっちゃって悪いんですけど」"
translation = "「결국 자기류가 되어버렸으니까, 다시금 제대로 된 수영법을 배우고 싶어서요. 회장님의 시간을 뺏어서 죄송하지만요.」"

[[dialogue]]
speaker = "unk"
original = "俺も楽しんでるから気にしないで"
translation = "나도 즐기고 있으니까 신경 쓰지 마"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「そう言ってもらえると安心です。私も、その、楽しいですよ？」"
translation = "「그렇게 말씀해 주시니 안심이에요. 저도, 그게, 즐거워요?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「会長さんに手取り足取り、泳ぎ方を教えてもらえて。勇気を出してお願いしてみて正解でした」"
translation = "「회장님에게 하나하나 수영법을 배울 수 있어서. 용기 내서 부탁해 보길 잘했어요.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「それにここなら……誰にも邪魔されずに２人きりで過ごせますしね……？」"
translation = "「게다가 여기라면…… 아무에게도 방해받지 않고 둘이서만 보낼 수 있으니까요……?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「って──さっきから私、何を言って……！？\u3000あはは、海に入ってるのに顔が熱くなってきちゃいましたっ」"
translation = "「아니── 방금 전부터 나 무슨 말을……!? 아하하, 바다에 들어와 있는데 얼굴이 뜨거워져 버렸어요.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「泳ぎましょう！\u3000泳げるうちに泳がなくちゃ損ですし！」"
translation = "「헤엄쳐요! 헤엄칠 수 있을 때 헤엄치지 않으면 손해니까요!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「こうして泳げるのも今だけかもしれませんからっ。星力がなくなったら、水に沈む体質になっちゃうかもしれませんし！」"
translation = "「이렇게 헤엄칠 수 있는 것도 지금뿐일지도 모르니까요! 성력이 없어지면 물에 가라앉는 체질이 되어버릴지도 모르고요!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ということで、バシャバシャバシャ～～！！」"
translation = "「그런 의미에서, 첨벙첨벙첨벙~~!!」"

[[dialogue]]
speaker = "unk"
original = "その時は"
translation = "그때는"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「はい？」"
translation = "「네?」"

[[dialogue]]
speaker = "unk"
original = "その時は俺が支えるよ"
translation = "그때는 내가 지탱해 줄게"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「～～っ！！\u3000ふ、不思議、です。選管のみんなにも同じようなこと言ってもらったのに……」"
translation = "「~~!! 시, 신기해요. 선관 모두에게도 비슷한 말을 들었는데……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「会長さんに言われると、なんだか胸がドキドキして……。今にも全力で泳ぎ回りたいほどソワソワしちゃって……」"
translation = "「회장님이 말해주니까 왠지 가슴이 두근거려서……. 지금 당장이라도 전력으로 헤엄치고 싶을 만큼 근질근질해서……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「それじゃあ、お願いしてもいいですか？」"
translation = "「그러면 부탁해도 될까요?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「もし私がいつか泳げない体になったら、こうして……支えてくれるって」"
translation = "「만약 제가 언젠가 헤엄칠 수 없는 몸이 되면, 이렇게…… 지탱해 주겠다고.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「……ふふ、約束ですよ？\u3000浮き輪じゃ嫌ですからね？\u3000こうして体に手を回して……しっかり私を支えてくださいよ？」"
translation = "「……후후, 약속이에요? 튜브는 싫으니까요? 이렇게 몸에 손을 두르고…… 꽉 저를 지탱해 주셔야 해요?」"

[[dialogue]]
speaker = "unk"
original = "ベアトがそう望むなら"
translation = "베아토가 그렇게 원한다면"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ふふ、もう少し泳ぐの下手っぴのままでいるべきでした。そうしたら、こうしてたくさん会長さんと密着できたのに」"
translation = "「후후, 좀 더 수영을 못하는 채로 있을 걸 그랬어요. 그랬다면 이렇게 잔뜩 회장님과 밀착할 수 있었을 텐데.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「普段恥ずかしくて中々近くで見られないお顔とか……じーっと見られたのに……」"
translation = "「평소엔 부끄러워서 좀처럼 가까이서 볼 수 없었던 얼굴이라든가…… 빤히 볼 수 있었을 텐데……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「んっ……<emoji=heart04>\u3000ちゅっ……んんっ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 츄…… 으응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「え、えへへ、どうしましょう……。沈んじゃいそうです……。星力も失っていないのに……」"
translation = "「에, 에헤헤, 어쩌죠……. 가라앉을 것 같아요……. 성력도 잃지 않았는데……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「約束……果たしてくださいね？\u3000ちゃんと支えていてくださいよ？」"
translation = "「약속…… 지켜주셔야 해요? 제대로 지탱하고 있어 주세요?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ぎゅっと私のこと抱き締めて……私を溺れさせないでください」"
translation = "「꽉 저를 껴안아서…… 저를 빠뜨리지 말아 주세요.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「んっ<emoji=heart04>\u3000んふ、ちゅっ、んんっ……<emoji=heart04>」"
translation = "「응<emoji=heart04> 응후, 츄, 으응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「はぁはぁ、えへへ……溺れちゃいそうです<emoji=heart04>」"
translation = "「하아하아, 에헤헤…… 빠져버릴 것 같아요<emoji=heart04>」"

