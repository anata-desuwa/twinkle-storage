[[dialogue]]
speaker = "unk"
original = "数日後──俺はライブの練習場所であるトレーニング施設へと向かった。"
translation = "며칠 후── 나는 라이브 연습 장소인 트레이닝 시설로 향했다."

[[dialogue]]
speaker = "unk"
original = "ヘレナちゃん謹製の人工戦闘服のお披露目をしてくれるのだそう──とても楽しみだ。"
translation = "헬레나짱이 정성껏 만든 인공 전투복을 선보여 준다고 한다── 무척 기대된다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「待たせたわね、クロト！\u3000ようやくメルエルの着替えが終わったわ！」"
translation = "「기다리게 했네, 쿠로토! 겨우 메르엘의 옷 갈아입히기가 끝났어!」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「本人は恥ずかしがってるけど、めちゃくちゃ可愛いよ。期待してて」"
translation = "「본인은 부끄러워하고 있지만 엄청나게 귀여워. 기대해도 좋아」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それじゃあメルエル～！\u3000出てきなさい！」"
translation = "「그럼 메르엘~! 나오렴!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「え、えへへっ……どうかな会長くんっ……へ、変じゃない……？」"
translation = "「에, 에헤헤…… 어때 회장군…… 이, 이상하지 않아……?」"

[[dialogue]]
speaker = "unk"
original = "すごく似合ってる！"
translation = "정말 잘 어울려!"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「そ、そうっ？\u3000よかったぁ～っ……アイドル衣装、とっても可愛いから不安だったんだ……！」"
translation = "「그, 그래? 다행이다아~…… 아이돌 의상, 너무 귀여워서 불안했거든……!」"

[[dialogue]]
speaker = "unk"
original = "めちゃくちゃ可愛いよ！\u3000自信持って！"
translation = "엄청나게 귀여워! 자신감을 가져!"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あ、ありがとう会長くんっ……え、えへへ～っ<emoji=heart04>」"
translation = "「고, 고마워 회장군…… 에, 에헤헤~<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「流石はヘレナちゃんの作った服。サイズもばっちりね！」"
translation = "「과연 헬레나짱이 만든 옷이야. 사이즈도 딱이네!」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「うん。よく似合ってるよ。これは私も負けていられないかな」"
translation = "「응. 정말 잘 어울려. 이건 나도 지고 있을 순 없겠는걸」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あ、そうだよっ。１人だけアイドル衣装も恥ずかしいし、レミカちゃんもお着替えして欲しいな……！」"
translation = "「아, 맞다. 혼자만 아이돌 의상인 건 부끄러우니까 레미카짱도 갈아입었으면 좋겠어……!」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「オッケー。じゃあパパっとここで着替えちゃうね」"
translation = "「오케이. 그럼 여기서 후다닥 갈아입을게」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「そんな、ダメだよっ！？\u3000会長くんもいるんだし、隣のお部屋で──」"
translation = "「안 돼, 그러면 안 된다구!? 회장군도 있는데 옆방에서──」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「心配ご無用よ！\u3000アイドル衣装は人工戦闘服。レミカはもうコツを掴んでるの！」"
translation = "「걱정할 것 없어! 아이돌 의상은 인공 전투복. 레미카는 이미 요령을 터득했거든!」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「そういうこと。それじゃあ行くよ！\u3000愛戸レミカ──キュートスタイルッ！」"
translation = "「그런 말씀. 그럼 간다! 아이도 레미카── 큐트 스타일!」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「──と、私の衣装はこんな感じ。どうかな、会長」"
translation = "「──자, 내 의상은 이런 느낌이야. 어때, 회장?」"

[[dialogue]]
speaker = "unk"
original = "普段と印象が全然違うよ！"
translation = "평소랑 인상이 완전히 달라!"

[[dialogue]]
speaker = "unk"
original = "レミカも可愛いね……！"
translation = "레미카도 귀엽네……!"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「ふふ、ありがと。自分でもかなり気に入ってるんだ、この衣装」"
translation = "「후후, 고마워. 나도 꽤 마음에 들어, 이 의상」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「すっごく可愛い～っ♪\u3000普段のクールビューティな感じもいいけど、こっちもすごく素敵だよ！」"
translation = "「정말 귀여워~♪ 평소의 쿨 뷰티한 느낌도 좋지만 이쪽도 정말 멋져!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「２人が並ぶと可愛さも抜群ね！\u3000これはもうライブの成功、間違いなし！」"
translation = "「둘이 나란히 서니 귀여움도 발군이네! 이건 이제 라이브 성공은 떼놓은 당상이야!」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「それはちょっと気が早いよ。でも……うん。こうやってライブ衣装を着ると気も引き締まるね。ワクワクしてきた」"
translation = "「그건 좀 설레발이야. 하지만…… 응. 이렇게 라이브 의상을 입으니 마음이 다잡히네. 두근거리기 시작했어」"

[[dialogue]]
speaker = "unk"
original = "レミカはもう変身できるんだ"
translation = "레미카는 벌써 변신할 수 있구나"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「うん。ヘレナさんから衣装を貰った時、精神的なアプローチがないと、戦闘服としての覚醒は難しいって聞いてたんだけど」"
translation = "「응. 헬레나 씨에게 의상을 받았을 때 정신적인 접근이 없으면 전투복으로서의 각성은 어렵다고 들었지만」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「試着で袖を通した時から、すぐに馴染んだんだ。即日にフォーム起動できるようになったよ」"
translation = "「시착할 때 소매를 넣는 순간 바로 익숙해졌어. 당일에 바로 폼 기동을 할 수 있게 됐지」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「す、すごいっ……これがワールドクラスのアイドルの実力ってことなのかな！？」"
translation = "「대, 대단해…… 이게 월드 클래스 아이돌의 실력이라는 건가!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「前々から、カワイイ系のアイドルになりたいってずっと言ってたもの。念願が叶ったんだもの、当然かもね」"
translation = "「전부터 귀여운 계열 아이돌이 되고 싶다고 계속 말해왔는걸. 염원이 이루어졌으니 당연할지도 모르지」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「──でも油断は禁物よ！\u3000アイドルは１日にして成らず！\u3000私とクロトのトレーニングは厳しいわよ！\u3000覚悟することね！」"
translation = "「──하지만 방심은 금물이야! 아이돌은 하루아침에 이루어지지 않아! 나와 쿠로토의 트레이닝은 엄격하다구! 각오하도록 해!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「は、はいっ！」"
translation = "「네, 네!」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスはコーチの経験はあるの？"
translation = "비너스는 코치 경험이 있어?"

[[dialogue]]
speaker = "unk"
original = "俺は芸能事務所でバイトしたことあるけど"
translation = "나는 연예 기획사에서 알바해 본 적은 있지만"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ないわよ？\u3000でもアイドルアニメはたくさん見てるし、レミカの練習も見学してたもの！\u3000きっといいアドバイスができると思うわ♪」"
translation = "「없어? 하지만 아이돌 애니메이션은 잔뜩 봤고 레미카의 연습도 구경했는걸! 분명 좋은 조언을 해줄 수 있을 거야♪」"

[[dialogue]]
speaker = "unk"
original = "今さらだけどコーチ、俺たちで大丈夫？"
translation = "이제 와서 묻는 거지만 코치, 우리로 괜찮겠어?"

[[dialogue]]
speaker = "unk"
original = "そんな簡単にいくかなあ……"
translation = "그렇게 간단히 될까나……"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「もちろん。会長は現場での経験があるし、ヴィーナスは勘がいいでしょ。何にも考えてなさそうなのに、常に正解を当てそうって言うか」"
translation = "「물론이지. 회장은 현장 경험이 있고 비너스는 감이 좋잖아. 아무 생각 없어 보이면서도 항상 정답을 맞힌다고 해야 하나」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「褒められてるのかしら……？」"
translation = "「칭찬인 걸까……?」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「会長くんとヴィーナスちゃんがコーチしてくれるのは、私も嬉しいかな……！」"
translation = "「회장군이랑 비너스짱이 코치해 주는 건 나도 기뻐……!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「この数日、レミカちゃんから貰ったＣＤで予習はしてきてるから。体力も自信あるし、びしばしお願いします！」"
translation = "「지난 며칠 동안 레미카짱에게 받은 CD로 예습해 왔으니까. 체력도 자신 있고, 빡세게 부탁드려요!」"

[[dialogue]]
speaker = "unk"
original = "それじゃあ１曲目、通してみようか！"
translation = "그럼 1곡째, 처음부터 끝까지 한번 해볼까!"

[[dialogue]]
speaker = "unk"
original = "──よし！"
translation = "──좋아!"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「いきなり通しか……まあ本番まで時間もないしね。メルエル、ミスは気にしないでいいから。お互いの呼吸を合わせるところから始めよっか」"
translation = "「갑자기 완창인가…… 뭐 공연까지 시간도 없으니까. 메르엘, 실수는 신경 쓰지 않아도 돼. 서로의 호흡을 맞추는 것부터 시작하자」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「うん、わかった。じゃあ配置につきますっ！」"
translation = "「응, 알았어. 그럼 위치 잡을게!」"

[[dialogue]]
speaker = "unk"
original = "──トレーニング施設の開けた場所に並ぶ、メルエルとレミカ。２人の表情は真剣そのものだ。"
translation = "──트레이닝 시설의 탁 트인 장소에 나란히 선 메르엘과 레미카. 두 사람의 표정은 진지함 그 자체다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それじゃあミュージックいくわよっ！\u3000ふっふーん、気になるところがあったらガンガン指摘しちゃうんだから！」"
translation = "「그럼 뮤직 큐! 훗훙, 눈에 띄는 부분이 있으면 마구마구 지적해 줄 테니까!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「う、うんっ！\u3000お願いします！」"
translation = "「으, 응! 부탁해!」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「──いつでもいいよ。準備はパーフェクトだから」"
translation = "「──언제든 좋아. 준비는 완벽하니까」"

[[dialogue]]
speaker = "unk"
original = "こうして……彼女たちのアイドル訓練は始まった。"
translation = "이렇게…… 그녀들의 아이돌 훈련이 시작되었다."

[[dialogue]]
speaker = "unk"
original = "練習はきっと途方もなく大変だろう。けれど俺もできる限り、フォローしていこうと思うのだった──"
translation = "연습은 분명 끝도 없이 힘들겠지. 하지만 나도 가능한 한 서포트해 나가자고 생각하는 것이었다──"

