[[dialogue]]
speaker = "unk"
original = "第２話,ルヴィネのバイト遍歴,P"
translation = "제2화, 루비네의 알바 편력"

[[dialogue]]
speaker = "unk"
original = "極星学園の皆の、アルタイル滞在はまだまだ続く──今日は５人全員が、星徒会室へやって来ていた。"
translation = "극성학원의 모두의 알타이르 체류는 아직 계속된다── 오늘은 5명 전원이 성도회실에 와 있었다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「そういや小耳に挟んだんだけどさ。魔王も新星学園に転入する前は、アルバイトばっかりしてたって本当なのか？」"
translation = "「그러고 보니 얼핏 들었는데 말이야. 마왕도 신성학원에 전입하기 전에는 아르바이트만 했다는 게 진짜야?」"

[[dialogue]]
speaker = "unk"
original = "学費を貯めなきゃいけなかったから"
translation = "학비를 모아야 했으니까"

[[dialogue]]
speaker = "unk"
original = "ああ、そうだよ"
translation = "아아, 맞아"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「へぇ。私と魔王には、意外な共通点があったのね」"
translation = "「헤에. 나와 마왕에겐 의외의 공통점이 있었네」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「と言っても、私がバイトをしていたのは、デネブの人達に献身を見せつけるため……打算の行動ではあったけれど……」"
translation = "「라고 해도, 내가 알바를 했던 건 데네브 사람들에게 헌신을 과시하기 위해…… 타산적인 행동이긴 했지만……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ルヴィって本当に色々なところで働いてたよね。お洒落なカフェに、映画館に、美術館──」"
translation = "「루비는 정말 여러 곳에서 일했었지. 세련된 카페에, 영화관, 미술관──」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「スイーツショップとかステーキハウスとかでも働いてましたから、美味しいご飯の情報もたくさん貰えてました！」"
translation = "「디저트 가게나 스테이크 하우스 같은 데서도 일했으니까, 맛있는 음식 정보도 잔뜩 얻을 수 있었어요!」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「でも冷凍マグロの倉庫バイトとか、工事現場みたいな体力を使う仕事も多かったわよね」"
translation = "「하지만 냉동 참치 창고 알바나, 공사 현장 같은 체력을 쓰는 일도 많았었지」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「アタシが知ってるだけでも１０や２０じゃ利かないくらいの場所で働いてたしなー……いつ寝てるんだって感じだったから心配だったよ」"
translation = "「내가 아는 것만 해도 10군데, 20군데로는 부족할 정도로 많은 곳에서 일했으니까 말이야~…… 언제 자는 건가 싶어서 걱정이었다고」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「へぇぇ……意外かも。うちの会長だけだと思ってたよ、そんなにたくさんのバイトをしてる人って」"
translation = "「헤에…… 의외일지도. 우리 회장님뿐인 줄 알았어, 그렇게나 많은 알바를 하는 사람은」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「変わり種のバイトについては……依頼が来る以上は請けようと思っていただけよ。デネブはどこも人手が足りないし……」"
translation = "「특이한 알바에 대해서는…… 의뢰가 들어오는 이상은 맡으려고 생각했을 뿐이야. 데네브는 어디든 일손이 부족하고……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「人心掌握のため、とは言いますが……ルヴィネさん、案外アルバイトそのものを楽しんでいたのでは？」"
translation = "「인심 장악을 위해서라고는 하지만…… 루비네 씨, 의외로 아르바이트 자체를 즐겼던 거 아닌가요?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「まあ、そうね──性に合っていたのかしら。大変だったけれど、労働そのものは楽しかったと思うわ」"
translation = "「뭐, 그래── 적성에 맞았던 걸까. 힘들었지만 노동 그 자체는 즐거웠다고 생각해」"

[[dialogue]]
speaker = "unk"
original = "わかる。労働って楽しいよな"
translation = "알아. 노동은 즐겁지"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「職場の数だけ、色々なヒトがいるものね。できることも増えていくし……」"
translation = "「직장의 수만큼 다양한 사람이 있으니까 말이야. 할 수 있는 일도 늘어나고……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「でも流石のルヴィネおばちゃんも、うちのクロトのバイト遍歴には敵わないんじゃないかしら！」"
translation = "「하지만 역시 루비네 아줌마라도 우리 쿠로토의 알바 편력에는 당해내지 못하지 않을까!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「…………っ」"
translation = "「…………윽」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「前会長。またそうやって無自覚に対立をあおるようなことを……」"
translation = "「전 회장님. 또 그렇게 무의식적으로 대립을 부추기는 짓을……」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……魔王がいくらバイト漬けだったからといって、職歴の数で私が負けるとは思えないけれど？」"
translation = "「……마왕이 아무리 알바에 절어 살았다고 해도, 직력의 수에서 내가 질 거라고는 생각되지 않는데?」"

[[dialogue]]
speaker = "unk"
original = "勝つのは──俺だ！！"
translation = "이기는 건── 나다!!"

[[dialogue]]
speaker = "unk"
original = "試してみるか？"
translation = "시험해 볼래?"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「じゃあ早速、勝負スタートね！！」"
translation = "「그럼 당장 승부 스타트야!!」"

[[dialogue]]
speaker = "unk"
original = "そうしてルヴィネとバイト遍歴の数で勝負することになったのだが──"
translation = "그렇게 루비네와 알바 편력 횟수로 승부하게 되었는데──"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「回転寿司屋！\u3000ライブ会場の設営！\u3000ドーナツショップ！\u3000交通量調査──！」"
translation = "「회전초밥집! 라이브 공연장 설치! 도넛 가게! 교통량 조사──!」"

[[dialogue]]
speaker = "unk"
original = "ゲームセンター！\u3000ボドゲカフェ！"
translation = "게임 센터! 보드게임 카페!"

[[dialogue]]
speaker = "unk"
original = "ペットショップ！\u3000カレースタンド！"
translation = "펫 숍! 카레 전문점!"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……やるわね魔王。今のところ、互角のようだわ」"
translation = "「……제법이네 마왕. 지금까지는 호각인 모양이야」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「す、すげえ。ルヴィに張り合ってる……！？\u3000魔王のやつ、そこまでバイト漬けだったのか！」"
translation = "「우, 와아. 루비랑 맞서고 있어……!? 마왕 녀석, 저 정도로 알바에 절어 있었던 건가!」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「まさかルヴィと肩を並べるバイト戦士がいただなんて……」"
translation = "「설마 루비와 어깨를 나란히 하는 알바 전사가 있었을 줄이야……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「さ、最初はただの雑談だったはずなのに……今は私、会長を応援しちゃってる！\u3000負けないで会長……！」"
translation = "「처, 처음엔 그냥 잡담이었을 텐데…… 지금은 나, 회장님을 응원하게 돼버려! 지지 마요 회장님……!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ですが経歴の数で争っては、いつまで経っても勝敗が決まりそうにないですね」"
translation = "「하지만 경력의 수로 다Format투면 언제까지 지나도 승패가 결정 나지 않을 것 같네요」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「よーし、それじゃあ相手のやったことのないアルバイトをたくさん挙げた方が勝ちにしましょう！\u3000今決めたわ！」"
translation = "「좋아, 그렇다면 상대가 해보지 않은 아르바이트를 많이 대는 쪽이 이기는 걸로 하자! 방금 정했어!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あらあら～、うふふ♪」"
translation = "「어머어머~, 우후후♪」"

[[dialogue]]
speaker = "unk"
original = "花嫁修業教室──どうだルヴィネ！？"
translation = "신부 수업 교실── 어때 루비네!?"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「バイト漬けだったのだから、ブライダル関係のアルバイトも経験済みよ。舐めないで頂戴」"
translation = ""

[[dialogue]]
speaker = "unk"
original = "くっ……やるな！"
translation = "큭…… 제법인데!"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「反撃しましょう──メイド喫茶。男性の貴方には難しいはずよ。私はオムライスにハートを描いて、萌え萌えキュンをしたことがあるわ」"
translation = "「반격하겠어── 메이드 카페. 남자인 당신에겐 어려울 텐데. 나는 오므라이스에 하트를 그리고, 모에모에 큥을 해본 적이 있어」"

[[dialogue]]
speaker = "unk"
original = "舐めるな！\u3000経験済みだぞ！"
translation = ""

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「何であるんだよ！？」"
translation = "「왜 있는 건데!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「会長は女装メイド喫茶で、かつてナンバーワンの実力者でした」"
translation = "「회장님은 여장 메이드 카페에서 과거 넘버원의 실력자였습니다」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「なんでこの副会長は誇らしげなんだ！？」"
translation = "「왜 이 부회장은 자랑스러워하는 거야!?」"

[[dialogue]]
speaker = "unk"
original = "──芸能事務所のプロデューサー！"
translation = "──연예 기획사 프로듀서!"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「──っ！？\u3000何ですって……！？」"
translation = "「──윽!? 뭐라고……!?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ルヴィがアイドルのプロデュースをしていたのは、聞いたことがないかも……！？」"
translation = "「루비가 아이돌 프로듀스를 했다는 건 들어본 적 없을지도……!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「来ました。これはチェックメイトでしょうか」"
translation = "「왔네요. 이건 체크메이트일까요」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ま、まだだ！\u3000ルヴィはまだ負けてない！」"
translation = "「아, 아직이야! 루비는 아직 지지 않았어!」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「ルヴィ、こちらも奥の手を出すべきです！\u3000あるじゃないですか、超レアのアルバイトが！！」"
translation = "「루비, 이쪽도 비장의 카드를 꺼내야 해요! 있잖아요, 초 레어 아르바이트가!!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「えっ──グレイス！？\u3000貴女、まさか──」"
translation = "「엣── 그레이스!? 당신, 설마──」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「……あったわね。あのルヴィが１日で辞めちゃったお仕事」"
translation = "「……있었지. 그 루비가 하루 만에 그만둬버린 일」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「ええ！\u3000ルヴィはですね、昔──！」"
translation = "「네! 루비는요, 옛날에──!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「──やっ、やめなさい！\u3000止まりなさい！！\u3000待って！\u3000お願い──！」"
translation = "「──그, 그만둬! 멈춰!! 기다려! 부탁이야──!」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「ルヴィは……Ｖチューバーだったことがあります！！」"
translation = "「루비는…… 버튜버였던 적이 있습니다!!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「──────やめて！！！！！」"
translation = "「──────하지 마!!!!!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「なななっ、なんですってーーー！？」"
translation = "「뭐뭐뭐, 뭐라고요───!?」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「ポラリスプロダクションから持ち込まれたお仕事で、現役星騎士Ｖチューバーという肩書きでデビューしたんですよっ！」"
translation = "「폴라리스 프로덕션에서 제안받은 업무로, 현역 성기사 버튜버라는 타이틀로 데뷔했었다고요!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「あったね～……私たちが１年生の頃だっけ。Ｖチューバーの『<ruby>明星<rt>あけぼし</rt></ruby>ルミナ』ちゃん……」"
translation = "「있었지~…… 우리가 1학년 때였나. 버튜버인 『<ruby>명성<rt>아케보시</rt></ruby> 루미나』짱……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「あのルヴィが、めっちゃキャラ作ってたんだよなぁ……きゃぴきゃぴした感じで挨拶して……」"
translation = "「그 루비가 엄청 캐릭터 잡고 있었다니까…… 꺄피꺄피한 느낌으로 인사하고……」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「でもデビュー初日の配信で、すぐに声でバレちゃったのよね。コメント欄が『ルヴィネ様』一色になって──」"
translation = "「하지만 데뷔 첫날 방송에서 곧장 목소리로 들켜버렸지. 코멘트 창이 『루비네 님』으로 도배돼서──」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「む、蒸し返さないで頂戴……いくら求められたからといって、あれは請けるべきではなかったわ……」"
translation = "「드, 들추지 말아줘…… 아무리 요청받았다고 해도 그건 맡지 말았어야 했어……」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「そんなに気にしなくても。大量の送金チャットで製作費はペイできたじゃないですか！\u3000ポラプロさんも損失はなかったって言ってましたよ？」"
translation = "「그렇게 신경 쓰지 않아도. 대량의 후원 채팅으로 제작비는 회수했잖아요! 폴라프로 씨도 손실은 없었다고 하셨고요?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「忘れたいのよ！\u3000察しなさい、グレイス！！」"
translation = "「잊고 싶단 말이야! 눈치 좀 챙겨, 그레이스!!」"

[[dialogue]]
speaker = "unk"
original = "俺、Ｖチューバーはしたことがない……！"
translation = "나, 버튜버는 해본 적 없어……!"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「やりました！\u3000これで一勝一敗ですよ、ルヴィ！」"
translation = "「해냈어요! 이걸로 일승일패네요, 루비!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「というか気になりますね、<ruby>明星<rt>あけぼし</rt></ruby>ルミナ。デネブに行けば調べられるでしょうか？」"
translation = "「그나저나 궁금해지네요, <ruby>명성<rt>아케보시</rt></ruby> 루미나. 데네브에 가면 조사할 수 있을까요?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「私の負けよ、魔王……殺して頂戴」"
translation = "「나의 패배야, 마왕…… 죽여줘」"

[[dialogue]]
speaker = "unk"
original = "こうして第一次アルバイト遍歴バトルは幕を閉じた。"
translation = "이렇게 제1차 아르바이트 편력 배틀은 막을 내렸다."

[[dialogue]]
speaker = "unk"
original = "ルヴィネとは会長という役職以外にも、共通点が多いなと感じる１日なのだった──"
translation = "루비네와는 회장이라는 직책 외에도 공통점이 많다고 느끼는 하루였다──"

