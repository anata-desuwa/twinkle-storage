[[dialogue]]
speaker = "unk"
original = "バレンタイン当日の朝。"
translation = "발렌타인 당일 아침."

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「し、失礼致します、会長……！」"
translation = "「시, 실례하겠습니다, 회장님……!」"

[[dialogue]]
speaker = "unk"
original = "俺が星徒会室で待っていると、約束の時間より少し早く、イクシーが姿を見せた。"
translation = "내가 성도회실에서 기다리고 있자 약속 시간보다 조금 일찍 이쿠시가 모습을 드러냈다."

[[dialogue]]
speaker = "unk"
original = "おはよう、イクシー。その衣装は……？"
translation = "안녕, 이쿠시. 그 의상은……?"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「え、えっと……これは、先日覚醒した『バレンタインフォーム』でして……」"
translation = "「에, 에또…… 이건 요전에 각성한 『발렌타인 폼』이라서요……」"

[[dialogue]]
speaker = "unk"
original = "驚きつつも、その衣装がイクシーによく似合っていて可愛いと伝える。"
translation = "놀라면서도, 그 의상이 이쿠시에게 잘 어울려서 귀엽다고 전한다."

[[dialogue]]
speaker = "unk"
original = "リボンやフリルが多いデザインは、普段からリボンを好む彼女の雰囲気にぴったりだった。"
translation = "리본이나 프릴이 많은 디자인은, 평소부터 리본을 좋아하는 그녀의 분위기에 딱이었다."

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「あ、ありがとうございます<emoji=heart04>\u3000会長に褒めていただけて……光栄です……<emoji=heart04>」"
translation = "「아, 감사합니다<emoji=heart04> 회장님이 칭찬해 주시다니…… 영광이에요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（はぁぁ……<emoji=heart04>\u3000会長に可愛いって言われちゃいました……！\u3000胸がドキドキして、落ち着きません……！）"
translation = "（하아아……<emoji=heart04> 회장님이 귀엽다고 해주셨어요……! 가슴이 두근거려서, 진정이 안 돼요……!）"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「その……今日はお忙しいのに、私のためにお時間を作っていただき、ありがとうございます……！」"
translation = "「그…… 오늘은 바쁘신데도, 저를 위해 시간을 내주셔서 감사합니다……!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「それで……この衣装を見れば、もうお察しかと思うのですが――」"
translation = "「그래서…… 이 의상을 보시면 이미 짐작하셨겠지만――」"

[[dialogue]]
speaker = "unk"
original = "イクシリオンは小さく深呼吸をしてから、丁寧にラッピングされた箱を差し出した。耳まで真っ赤に染めながら、少し震える手で――"
translation = "익실리온은 작게 심호흡을 하고 나서, 정성스럽게 포장된 상자를 내밀었다. 귀 끝까지 새빨갛게 물들이며, 조금 떨리는 손으로――"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「か、会長に……バレンタインチョコを作ってきました！\u3000ど、どうぞ……！」"
translation = "「회, 회장님께…… 발렌타인 초콜릿을 만들어 왔어요! 부, 부디……!」"

[[dialogue]]
speaker = "unk"
original = "俺はそのチョコを受け取り、笑顔で答える。"
translation = "나는 그 초콜릿을 받고, 미소로 답한다."

[[dialogue]]
speaker = "unk"
original = "ありがとう、イクシー。本当に嬉しいよ"
translation = "고마워, 이쿠시. 정말 기뻐"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「は、はい……<emoji=heart04>」"
translation = "「네, 네……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その場で食べてもいいかと聞くと、イクシリオンは驚いたように顔を上げ、すぐにこくりと頷いた。"
translation = "그 자리에서 먹어도 되냐고 묻자, 익실리온은 놀란 듯 고개를 들더니 곧바로 끄덕였다."

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「えっ！？\u3000あっ……も、もちろんですっ！」"
translation = "「엣!? 아…… 무, 물론이죠!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（ああぁ……<emoji=heart04>\u3000会長が、私の作ったチョコを手に取って――食べてくれてる……<emoji=heart04>）"
translation = "（아아아……<emoji=heart04> 회장님이, 내가 만든 초콜릿을 손에 들고―― 먹어주고 있어……<emoji=heart04>）"

[[dialogue]]
speaker = "unk"
original = "うん、うまい！\u3000甘くてすごく美味しいよ！"
translation = "음, 맛있다! 달콤하고 정말 맛있어!"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「！\u3000あ、ありがとうございます……<emoji=heart04>」"
translation = "「! 아, 감사합니다……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（はあぁ……<emoji=heart04>\u3000美味しいと言ってもらえて嬉しい……<emoji=heart04>\u3000まるで……私自身を味わってもらっているみたいな……<emoji=heart04>）"
translation = "（하아아……<emoji=heart04> 맛있다고 해주셔서 기뻐……<emoji=heart04> 마치…… 저 자신을 맛보여드리고 있는 것 같은……<emoji=heart04>）"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（あっ、だ、ダメです！\u3000そんな……会長がチョコだけじゃなく、私のバレンタインフォームまで味わいたいだなんて……っ！）"
translation = "（앗, 아, 안 돼요! 그런…… 회장님이 초콜릿뿐만 아니라, 제 발렌타인 폼까지 맛보고 싶어 하시다니……!）"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（こ、こんなこと考えてたら……次はホワイトデーでエッチな展開になってしまうことを妄想して……っ<emoji=heart04>）"
translation = "（이, 이런 걸 생각하고 있으면…… 다음은 화이트데이에 야한 전개가 되어버리는 걸 망상해서……<emoji=heart04>）"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「――え、えへへへぇ<emoji=heart04>」"
translation = "「――에, 에헤헤헤<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "い、イクシー？\u3000大丈夫か？"
translation = "이, 이쿠시? 괜찮아?"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「へっ！？\u3000――な、なんか変な顔をしてましたか！？\u3000し、失礼しましたっ！\u3000チョコを美味しいって言ってもらえて、嬉しくてつい……！」"
translation = "「헷!? ――저, 뭔가 이상한 표정을 짓고 있었나요!? 시, 실례했습니다! 초콜릿을 맛있다고 해주셔서, 기쁜 나머지 그만……!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「そ、そう！\u3000ちょっと気が緩んじゃっただけなんです！\u3000だ、大丈夫ですからっ！」"
translation = "「그, 그래요! 잠깐 정신줄을 놓았을 뿐이에요! 개, 괜찮으니까요!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（あぁぁっ……<emoji=heart04>\u3000会長のこと考えてたら、頭の中が妄想でいっぱいに……！\u3000これって、スランプ脱出ってことなんでしょうか！？）"
translation = "（아아앗……<emoji=heart04> 회장님 생각을 했더니, 머릿속이 망상으로 가득……! 이건 슬럼프 탈출이라는 걸까요!?）"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（いえ、でも……好きな人にエッチな妄想ばっかりするのって、やっぱりよくない気が……！）"
translation = "（아니, 그래도…… 좋아하는 사람에게 야한 망상만 하는 건, 역시 좋지 않은 기분이……!）"

[[dialogue]]
speaker = "unk"
original = "（なんかまた変な妄想してる気がする……）"
translation = "（왠지 또 이상한 망상을 하고 있는 기분이 들어……）"

[[dialogue]]
speaker = "unk"
original = "けれど、その表情にはもう緊張の色はなく、どこか幸せそうな笑みが浮かんでいた。"
translation = "하지만 그 표정에는 이제 긴장한 기색은 없고, 어딘가 행복해 보이는 미소가 떠올라 있었다."

[[dialogue]]
speaker = "unk"
original = "それならまぁいいか、と俺は微笑ましく見守りながら、チョコをもう一口味わうのだった。"
translation = "그렇다면 뭐 됐나, 하고 나는 흐뭇하게 지켜보며 초콜릿을 한 입 더 맛보는 것이었다."

[[dialogue]]
speaker = "unk"
original = "イクシリオンが退室した直後、入れ替わるようにして、今度はトワ先生とルルカが星徒会室に入ってきた。"
translation = "익실리온이 퇴실한 직후, 교대하듯이 이번에는 토와 선생님과 루루카가 성도회실로 들어왔다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「キュー、キュー、キューッとおはドルフィン☆\u3000お兄ちゃん、キラキラバレンタインだよ～♪」"
translation = "「큐, 큐, 큐~하고 오하돌핀☆ 오빠, 반짝반짝 발렌타인이야~♪」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「し、失礼しま～す……！」"
translation = "「시, 실례합니~다……!」"

[[dialogue]]
speaker = "unk"
original = "まさかの２人同時登場に、俺は思わず目を丸くする。しかも２人とも、バレンタインフォーム！？"
translation = "설마 했던 2인 동시 등장에 나는 나도 모르게 눈을 크게 뜬다. 게다가 둘 다 발렌타인 폼!?"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ふふっ、まあ、ちょっと色々あってね～☆\u3000というわけで、まずはトワ先生からどうぞ～♪」"
translation = "「후훗, 뭐, 좀 여러 가지 일이 있어서 말야~☆ 그런 고로, 우선은 토와 선생님부터 하세요~♪」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「か、会長くん……はいっ！\u3000せ、先生からの……バレンタインチョコです……！」"
translation = "「회, 회장군…… 여기! 선, 선생님이 주는…… 발렌타인 초콜릿이에요……!」"

[[dialogue]]
speaker = "unk"
original = "先生、ありがとうございます。嬉しいです"
translation = "선생님, 감사합니다. 기뻐요"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「え、えへへ……<emoji=heart04>\u3000どういたしまして……<emoji=heart04>\u3000ウェディングフォームの時はお世話になったから、そのお礼も込めて、ね？」"
translation = "「에, 에헤헤……<emoji=heart04> 천만에요……<emoji=heart04> 웨딩 폼 때는 신세를 졌으니까, 그 보답도 담아서, 알았지?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「次はあたしの番だね～♪\u3000お兄ちゃん、妹からのバレンタインチョコレートだよ<emoji=heart04>」"
translation = "「다음은 내 차례네~♪ 오빠, 여동생이 주는 발렌타인 초콜릿이야<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ルルカも、ありがとう。嬉しいよ"
translation = "루루카도 고마워. 기쁘네"

[[dialogue]]
speaker = "unk"
original = "俺はルルカの頭を撫でながら、お礼を言う。"
translation = "나는 루루카의 머리를 쓰다듬으며 인사를 한다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あっ……えへへ<emoji=heart04>\u3000もう、お兄ちゃん。そういうことしてると、そのうち勘違いさせちゃうよ～？\u3000気をつけないと刺されちゃうからね<emoji=heart04>」"
translation = "「앗…… 에헤헤<emoji=heart04> 정말, 오빠. 그런 짓 하고 있으면, 머지않아 착각하게 만든다구~? 조심하지 않으면 찔려버릴 테니까<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "えっ、いきなり何！？\u3000怖いんだけど！？"
translation = "엣, 갑자기 뭐야!? 무서운데!?"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「まったく、お兄ちゃんは……困ってる時は察しがいいのに、こういうとこだけ鈍いんだから～。まあ、無意識で撫でてるあたりが『いつもの癖』って感じだけど♪」"
translation = "「정말이지, 오빠는…… 곤란할 때는 눈치가 빠른데, 이런 쪽만 둔하다니까~. 뭐, 무의식적으로 쓰다듬는 점이 『평소의 버릇』이라는 느낌이지만♪」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ふふっ、確かにそうだね。先生も気をつけた方がいいと思うな～？」"
translation = "「후훗, 확실히 그렇네. 선생님도 조심하는 게 좋다고 생각해~?」"

[[dialogue]]
speaker = "unk"
original = "２人が顔を見合わせて笑う様子に、俺は少し考えて――あることを思いつく。"
translation = "두 사람이 서로 얼굴을 마주 보며 웃는 모습에 나는 잠시 생각하다가―― 어떤 생각이 떠오른다."

[[dialogue]]
speaker = "unk"
original = "先生の頭も、撫でていいですか？"
translation = "선생님 머리도 쓰다듬어도 될까요?"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「はわっ！？\u3000な、なにを言ってるのかな、会長くんっ！？」"
translation = "「하왓!? 무, 무슨 소리를 하는 걸까, 회장군!?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「おっ、そう来たか～♪\u3000でも確かに、あたしだけって不公平かもね～。トワちゃん先生、せっかくだし撫でてもらってもいいと思いますよ？\u3000今日はバレンタインですし♪」"
translation = "「오, 그렇게 나왔나~♪ 하지만 확실히 나만 받는 건 불공평할지도~. 토와짱 선생님, 이왕 이렇게 된 거 쓰다듬 받아도 괜찮다고 생각해요? 오늘은 발렌타인이니까요♪」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「えぇぇ！？\u3000で、でも……先生が生徒に頭を撫でてもらうだなんて……！」"
translation = "「에에에!? 하, 하지만…… 선생님이 학생에게 머리를 쓰다듬 받다니……!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「あ、いや！\u3000別に嫌じゃないよ！？\u3000ただ、その……他の生徒に見られたりしたら、ちょっと……<emoji=heart04>」"
translation = "「아, 아니! 딱히 싫은 건 아냐!? 다만, 그…… 다른 학생이 보기라도 하면 좀……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ちょこっとだけなら大丈夫ですよ！\u3000あたしが入り口、見張ってますから♪」"
translation = "「아주 잠깐이면 괜찮아요! 내가 입구, 지키고 있을 테니까♪」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「う、うぅ～……！\u3000そ、そこまでお膳立てされちゃうとぉ～！」"
translation = "「으, 으으~……! 저, 저렇게까지 판을 깔아주면~!」"

[[dialogue]]
speaker = "unk"
original = "先生、ちょっとだけ失礼しますね"
translation = "선생님, 잠시만 실례할게요"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「えっ！？\u3000ひゃっ……<emoji=heart04>」"
translation = "「엣!? 히얏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はそっと先生の頭を撫でた。"
translation = "나는 살며시 선생님의 머리를 쓰다듬었다."

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「あっ……<emoji=heart04>\u3000ふあぁっ……<emoji=heart04>」"
translation = "「앗……<emoji=heart04> 후아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（か、会長くんに撫でられてる……<emoji=heart04>\u3000教師としてはよくないのに……でも……）"
translation = "（회, 회장군에게 쓰다듬 받고 있어……<emoji=heart04> 교사로서는 좋지 않은데…… 하지만……）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「はふぅ……<emoji=heart04>\u3000え……えへへ……<emoji=heart04>」"
translation = "「하후우……<emoji=heart04> 에…… 에헤헤……<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（嬉しくて……顔が緩んじゃう……<emoji=heart04>）"
translation = "（기뻐서…… 얼굴이 풀려버려……<emoji=heart04>）"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ふふっ♪\u3000よかったですね、トワちゃん先生♪」"
translation = "「후훗♪ 잘 됐네요, 토와짱 선생님♪」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「あ、あぅ……<emoji=heart04>」"
translation = "「아, 아우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "まるで少女のように、恥ずかしそうに頬を染めてこくりと頷くトワ先生。その表情に、俺も自然と笑みがこぼれてしまうのだった。"
translation = "마치 소녀처럼 부끄러운 듯 뺨을 붉히며 끄덕이는 토와 선생님. 그 표정에 나도 자연스레 미소가 지어지는 것이었다."

