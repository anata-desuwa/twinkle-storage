[[dialogue]]
speaker = "unk"
original = "第１２話,昏き太陽,B"
translation = "제12화, 어두운 태양, B"

[[dialogue]]
speaker = "unk"
original = "もう何度目かわからない剣と拳の応酬を終える。"
translation = "벌써 몇 번째인지 알 수 없는 검과 주먹의 응수를 끝낸다."

[[dialogue]]
speaker = "クロト"
original = "「はああああああっっっ────！」"
translation = "「하아아아아아앗──！」"

[[dialogue]]
speaker = "unk"
original = "正拳を繰り出すもかわされる。"
translation = "정권을 내지르지만 피해진다."

[[dialogue]]
speaker = "unk"
original = "しかし、反撃はない。霞と闘っているような手応えだ。"
translation = "하지만, 반격은 없다. 안개와 싸우는 듯한 감각이다."

[[dialogue]]
speaker = "ギエル"
original = "「フフフ──その拳はもう見切りましたよ。さあ、次の一手はなんですか？」"
translation = "「후후후── 그 주먹은 이미 간파했습니다. 자, 다음 수는 무엇입니까?」"

[[dialogue]]
speaker = "クロト"
original = "「っ……！」"
translation = "「읏……!」"

[[dialogue]]
speaker = "unk"
original = "ギエルは先ほどから徹底した回避戦法を取っていた。"
translation = "기엘은 방금 전부터 철저한 회피 전법을 취하고 있었다."

[[dialogue]]
speaker = "unk"
original = "こちらがダメージを負うこともないが、代わりに全くスキを晒さない戦闘スタイル。"
translation = "이쪽이 피해를 입는 일은 없지만, 대신 전혀 빈틈을 보이지 않는 전투 스타일."

[[dialogue]]
speaker = "unk"
original = "露骨な時間稼ぎであり、こうしている間にもアポロが遠くでアステラとモンスターを撒いているだろう。"
translation = "노골적인 시간 끌기이며, 이렇게 있는 동안에도 아폴로가 멀리서 아스테라와 몬스터를 뿌리고 있을 것이다."

[[dialogue]]
speaker = "unk"
original = "ヴィーナスたちも次々と湧き出る底なしのモンスターに手を焼いている。"
translation = "비너스들도 연이어 솟아나는 끝없는 몬스터에 고전하고 있다."

[[dialogue]]
speaker = "unk"
original = "姑息な防衛戦線によって、事態は千日手の様相を呈していたが……"
translation = "교활한 방어 전선으로 인해, 사태는 천일야화의 양상을 띠고 있었지만……"

[[dialogue]]
speaker = "unk"
original = "しかし、そこへ。"
translation = "하지만, 그때."

[[dialogue]]
speaker = "フィオナ"
original = "「邪魔です──」"
translation = "「방해됩니다──」"

[[dialogue]]
speaker = "フィオナ"
original = "「──」"
translation = "「──」"

[[dialogue]]
speaker = "ギエル"
original = "「っ！\u3000ぬぅ──っ！？」"
translation = "「읏! 누읏──!?」"

[[dialogue]]
speaker = "クロト"
original = "「っ……フィオナ！？」"
translation = "「읏…… 피오나!?」"

[[dialogue]]
speaker = "unk"
original = "突如、俺たちの間に割って入った影と攻撃。"
translation = "갑자기 우리 사이에 끼어든 그림자와 공격."

[[dialogue]]
speaker = "unk"
original = "完全なる不意打ちとなったそれは、ギエルのフォームを大きく崩すことに成功していた。"
translation = "완전한 기습이 된 그것은, 기엘의 자세를 크게 무너뜨리는 데 성공했다."

[[dialogue]]
speaker = "ギエル"
original = "「っ……！？\u3000なんです、あなたこそ男同士の語らいを邪魔するとは、無粋な──」"
translation = "「읏……!? 뭡니까, 당신이야말로 남자끼리의 대화를 방해하다니, 무례한──」"

[[dialogue]]
speaker = "フィオナ"
original = "「退いてください。あなたに用はありませんので」"
translation = "「비켜주세요. 당신에게 볼일은 없으니까요」"

[[dialogue]]
speaker = "ギエル"
original = "「づっ──ぐぅぁっっ！？」"
translation = "「끄읏── 크아앗!?」"

[[dialogue]]
speaker = "クロト"
original = "「っ──！？」"
translation = "「읏──!?」"

[[dialogue]]
speaker = "unk"
original = "攻撃をまともに受けたギエルは浮遊に割く星力すら尽き、そのまま街中へ吸い込まれるように墜落していった。"
translation = "공격을 정통으로 맞은 기엘은 부유에 쓸 성력마저 다해, 그대로 시가지로 빨려 들어가듯 추락해갔다."

[[dialogue]]
speaker = "クロト"
original = "「フィオ……ナ……？」"
translation = "「피오……나……?」"

[[dialogue]]
speaker = "unk"
original = "その威力。その出力。"
translation = "그 위력. 그 출력."

[[dialogue]]
speaker = "unk"
original = "命の斟酌すら感じられない危険の領域で、手加減の余地を微塵も感じなかった。"
translation = "생명의 참작조차 느껴지지 않는 위험의 영역에서, 봐줄 여지를 조금도 느끼지 못했다."

[[dialogue]]
speaker = "フィオナ"
original = "「お訊ねします緋宮会長。仮面の少女はどこへ行きましたか」"
translation = "「묻겠습니다 히노미야 회장. 가면의 소녀는 어디로 갔습니까」"

[[dialogue]]
speaker = "クロト"
original = "「あっちだけど……ってフィオナ！？\u3000せめて一緒に──」"
translation = "「저쪽이지만…… 잠깐 피오나!? 하다못해 같이──」"

[[dialogue]]
speaker = "unk"
original = "方角を聞くやいなや、独りでに疾駆していってしまうフィオナ。"
translation = "방향을 묻자마자, 혼자서 질주해버리는 피오나."

[[dialogue]]
speaker = "unk"
original = "数ではこちらが優勢の状況を作れたにも関わらず、独断専行する理由なんて……"
translation = "수적으로는 이쪽이 우세한 상황을 만들 수 있었음에도 불구하고, 독단 전행하는 이유라니……"

[[dialogue]]
speaker = "ソフィア"
original = "「ようやくモンスターが収まりました……フィオナ会長は！？」"
translation = "「겨우 몬스터가 수습되었습니다…… 피오나 회장님은요!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ど、どうしちゃったのフィオナ──追わなきゃ！」"
translation = "「어, 어떻게 된 거야 피오나── 쫓아가야 해!」"

[[dialogue]]
speaker = "クロト"
original = "「ああ……！」"
translation = "「아아……!」"

[[dialogue]]
speaker = "unk"
original = "俺たちも状況をわからぬまま、アポロ──を追うフィオナ──を追う。"
translation = "우리도 상황을 알지 못한 채, 아폴로──를 쫓는 피오나──를 쫓는다."

[[dialogue]]
speaker = "クロト"
original = "（そういえば──いつか、言ってたな──）"
translation = "（그러고 보니── 언젠가, 말했었지──）"

[[dialogue]]
speaker = "unk"
original = "彼女の星力は太陽。"
translation = "그녀의 성력은 태양."

[[dialogue]]
speaker = "unk"
original = "ゆえにその全力は、熱しすぎるから使えないと。"
translation = "그러므로 그 전력은, 너무 뜨거워서 사용할 수 없다고."

[[dialogue]]
speaker = "unk"
original = "しかし今の彼女は、明らかにその領域に達していた。"
translation = "하지만 지금의 그녀는, 명백히 그 영역에 도달해 있었다."

[[dialogue]]
speaker = "unk"
original = "計り知れぬ想いが……彼女を突き動かしているようだった。"
translation = "헤아릴 수 없는 마음이…… 그녀를 움직이고 있는 듯했다."

[[dialogue]]
speaker = "アポロ"
original = "「わーっはっはっはっは！\u3000ウム、さすがにこれだけ広げればアイツらの処理も追いつくまい！\u3000愉快痛快だ」"
translation = "「와ー핫핫핫핫하! 음, 역시 이 정도 넓히면 저 녀석들의 처리도 따라잡지 못하겠지! 유쾌 통쾌하다」"

[[dialogue]]
speaker = "unk"
original = "流星市国の全景を眼下に収めるアポロ。"
translation = "유성 시국의 전경을 눈 아래에 담는 아폴로."

[[dialogue]]
speaker = "unk"
original = "各地のアステラが破壊をもたらす様を<ruby>鳥瞰<rt>ちょうかん</rt></ruby>しながら、腕を組んで豪快に笑っていた。"
translation = "각지의 아스테라가 파괴를 가져오는 모습을 조감하면서, 팔짱을 끼고 호탕하게 웃고 있었다."

[[dialogue]]
speaker = "unk"
original = "そこへ──"
translation = "그때──"

[[dialogue]]
speaker = "アポロ"
original = "「んっ──おぉっと。もう追いついたのか？」"
translation = "「응── 오옷. 벌써 따라잡았나?」"

[[dialogue]]
speaker = "unk"
original = "挨拶代わりの一撃をいなして、アポロは笑いながら振り返る。"
translation = "인사 대신의 일격을 피하고, 아폴로는 웃으며 뒤돌아본다."

[[dialogue]]
speaker = "unk"
original = "そこに浮かんでいたのはフィオナと──"
translation = "그곳에 떠 있던 것은 피오나와──"

[[dialogue]]
speaker = "unk"
original = "その肩に必死でしがみつくニャリオンだった。"
translation = "그 어깨에 필사적으로 매달린 냐리온이었다."

[[dialogue]]
speaker = "アポロ"
original = "「んっんー？\u3000なんだ、魔王かと思ったら初めて見る顔だな！」"
translation = "「응응ー? 뭐야, 마왕인가 했더니 처음 보는 얼굴이군!」"

[[dialogue]]
speaker = "フィオナ"
original = "「ええ。始めまして、<b>アポロ</b>さん」"
translation = "「네. 처음 뵙겠습니다, <b>아폴로</b> 씨」"

[[dialogue]]
speaker = "ニャリオン"
original = "「フィ、フィオナ嬢……」"
translation = "「피, 피오나 아가씨……」"

[[dialogue]]
speaker = "unk"
original = "口調こそ落ち着いているものの、フィオナの眼光に余裕は微塵もない。"
translation = "말투는 침착하지만, 피오나의 눈빛에 여유는 조금도 없다."

[[dialogue]]
speaker = "unk"
original = "そしてニャリオンもまた、彼女から感じる熱の理由をわかっていた。"
translation = "그리고 냐리온 또한, 그녀에게서 느껴지는 열의 이유를 알고 있었다."

[[dialogue]]
speaker = "アポロ"
original = "「わっはっは、苦しゅうない！\u3000このアポロ様が直々に相手をしてやろう」"
translation = "「왓핫하, 괴롭지 않다! 이 아폴로 님이 직접 상대해주지」"

[[dialogue]]
speaker = "フィオナ"
original = "「光栄ですね。邪魔も入りません」"
translation = "「영광이네요. 방해도 들어오지 않겠고요」"

[[dialogue]]
speaker = "unk"
original = "臨戦態勢へ移行するアポロ。"
translation = "임전 태세로 이행하는 아폴로."

[[dialogue]]
speaker = "unk"
original = "アステラを数十足しても及ばないほどの瘴気が、彼女の大剣に集約されていく。"
translation = "아스테라를 수십 마리 합쳐도 미치지 못할 정도의 장기가, 그녀의 대검에 집약되어 간다."

[[dialogue]]
speaker = "unk"
original = "フィオナもまた、真っ向からその脅威に受けて立とうとし……"
translation = "피오나 또한, 정면으로 그 위협을 받아들이려 하고……"

[[dialogue]]
speaker = "ニャリオン"
original = "「ま……待つニャン、フィオナ嬢！\u3000何か得体の知れない力を持っているかもしれないニャン、一人で戦うのは無茶ニャン！」"
translation = "「기…… 기다리는 냥, 피오나 아가씨! 뭔가 정체 모를 힘을 가지고 있을지도 모르는 냥, 혼자서 싸우는 건 무리냥!」"

[[dialogue]]
speaker = "フィオナ"
original = "「ありえません」"
translation = "「있을 수 없습니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「<b>知らない</b>なんてことは」"
translation = "「<b>모른다</b>는 것은」"

[[dialogue]]
speaker = "unk"
original = "瞬間。"
translation = "순간."

[[dialogue]]
speaker = "unk"
original = "その脅威に呼応するかのように、フィオナの星力もまた爆発を遂げた。"
translation = "그 위협에 호응하듯이, 피오나의 성력 또한 폭발을 이루었다."

[[dialogue]]
speaker = "アポロ"
original = "「へえ……こりゃ……！」"
translation = "「헤에…… 이거……!」"

[[dialogue]]
speaker = "unk"
original = "アポロを挟むようにして召喚の魔法陣が展開される。"
translation = "아폴로를 사이에 두듯이 소환의 마법진이 전개된다."

[[dialogue]]
speaker = "アポロ"
original = "「なーるほどっ！\u3000直接ケンカ売ってくるだけあってそれなりの──んおぉっ！？」"
translation = "「나ー루호도! 직접 싸움을 걸어오는 만큼 그만한── 응오옷!?」"

[[dialogue]]
speaker = "unk"
original = "アポロの言葉を待つまでもなく。"
translation = "아폴로의 말을 기다릴 필요도 없이."

[[dialogue]]
speaker = "unk"
original = "神速の踏み込みをもって、フィオナ本体による追撃が彼女を襲った。"
translation = "신속의 발 디딤과 함께, 피오나 본체에 의한 추격이 그녀를 덮쳤다."

[[dialogue]]
speaker = "アポロ"
original = "「オ、オマエ──ヒーローのセリフ中は攻撃しないのが礼儀──」"
translation = "「너, 너 말이야── 히어로의 대사 중에는 공격하지 않는 것이 예의──」"

[[dialogue]]
speaker = "フィオナ"
original = "「だったら、なんです？」"
translation = "「그렇다면, 어떻다는 건가요?」"

[[dialogue]]
speaker = "unk"
original = "燃え、滾り、熱し立ち昇る太陽の星力。"
translation = "불타오르고, 끓어오르고, 뜨겁게 솟아오르는 태양의 성력."

[[dialogue]]
speaker = "unk"
original = "どんなピンチに陥った時も、アルモタヘルの奇襲をいなした際も……"
translation = "어떤 위기에 빠졌을 때도, 아르모타헬의 기습을 피했을 때도……"

[[dialogue]]
speaker = "unk"
original = "いつだとて冷静さを欠かさなかった彼女。"
translation = "언제나 냉정함을 잃지 않았던 그녀."

[[dialogue]]
speaker = "unk"
original = "しかし今、その瞳にあったものは……激情。"
translation = "하지만 지금, 그 눈동자에 담긴 것은…… 격정."

[[dialogue]]
speaker = "unk"
original = "彼女を包み込む闇のオーラが、その心を表すかのように<ruby>赫灼<rt>かくやく</rt></ruby>と猛っていた。"
translation = "그녀를 감싸는 어둠의 오라가, 그 마음을 나타내듯이 혁작하게 맹렬했다."

[[dialogue]]
speaker = "アポロ"
original = "「づっ──ちいっ──<b>興</b>を知らないヤツめ！\u3000このアポロ様が成敗してくれる！」"
translation = "「끄읏── 쳇── <b>흥</b>을 모르는 녀석! 이 아폴로 님이 성패해주마!」"

[[dialogue]]
speaker = "フィオナ"
original = "「どうぞ、やれるものなら」"
translation = "「부디, 할 수 있다면」"

[[dialogue]]
speaker = "unk"
original = "息もつかせぬ怒涛の攻めがアポロを追い詰める。"
translation = "숨 돌릴 틈 없는 노도의 공격이 아폴로를 몰아붙인다."

[[dialogue]]
speaker = "ニャリオン"
original = "「や──やりすぎニャン、フィオナ嬢！\u3000こんなに星力を消耗したらスッカラカンで……しばらく戦えなくなってしまうニャンよ！」"
translation = "「너── 너무 심한 냥, 피오나 아가씨! 이렇게 성력을 소모하면 텅 비어서…… 한동안 싸울 수 없게 되는 냥이야!」"

[[dialogue]]
speaker = "フィオナ"
original = "「構いません。ニャリオン、リミッターを外してくれる？」"
translation = "「상관없습니다. 냐리온, 리미터를 풀어줄래요?」"

[[dialogue]]
speaker = "ニャリオン"
original = "「ニャ、ニャぁ……も、もうどうとでもなれニャン！」"
translation = "「냐, 냐아…… 이, 이제 될 대로 되라 냥!」"

[[dialogue]]
speaker = "unk"
original = "ニャリオンの存在までがフィオナの中へ還っていき、最後の一線までもを解放する。"
translation = "냐리온의 존재마저 피오나의 내부로 돌아가고, 마지막 한계선까지 해방한다."

[[dialogue]]
speaker = "unk"
original = "すると彼女の星力はさらに限度を越えて膨れ上がり、そのまま連続に継ぐ連続の詠唱へと移行した。"
translation = "그러자 그녀의 성력은 더욱 한도를 넘어 팽창하고, 그대로 연속에 이은 연속의 영창으로 이행했다."

[[dialogue]]
speaker = "フィオナ"
original = "「なぜ──」"
translation = "「왜──」"

[[dialogue]]
speaker = "アポロ"
original = "「ん──！？」"
translation = "「응──!?」"

[[dialogue]]
speaker = "フィオナ"
original = "「なぜあなたは、その仮面を被るのですか？」"
translation = "「왜 당신은, 그 가면을 쓰는 것입니까?」"

[[dialogue]]
speaker = "unk"
original = "射出された闇の剣を、アポロの大剣が叩き割って潰した。"
translation = "사출된 어둠의 검을, 아폴로의 대검이 후려쳐 부쉈다."

[[dialogue]]
speaker = "unk"
original = "激化の一途を辿る戦闘とは正反対に、フィオナの口調は重く静かに沈んでいく。"
translation = "격화 일로를 걷는 전투와는 정반대로, 피오나의 말투는 무겁고 조용히 가라앉는다."

[[dialogue]]
speaker = "アポロ"
original = "「さあ、な……！\u3000でも──ヒーローっつったら仮面を着けるもんだ、それで十分だろ！？」"
translation = "「글쎄, 나……! 하지만── 히어로라면 가면을 쓰는 법이다, 그걸로 충분하잖아!?」"

[[dialogue]]
speaker = "unk"
original = "流星ライダーアポロ。"
translation = "유성 라이더 아폴로."

[[dialogue]]
speaker = "unk"
original = "かつて流れていたその番組を模して、彼女は<b>そういう存在</b>と相成った。"
translation = "과거에 방영되었던 그 프로그램을 본떠, 그녀는 <ruby>그런 존재<rt>・・ ・・</rt></ruby>가 되었다."

[[dialogue]]
speaker = "unk"
original = "その由縁は、クロト達からも聞かされているものだったが……"
translation = "그 유래는, 쿠로토들에게서도 들었던 것이었지만……"

[[dialogue]]
speaker = "フィオナ"
original = "「十分ではありません。知らないのなら、教えてあげます──私が」"
translation = "「충분하지 않습니다. 모른다면, 알려드리겠습니다── 제가」"

[[dialogue]]
speaker = "unk"
original = "鮮烈なる光芒がアポロへと降り注ぐ。"
translation = "선명한 광망이 아폴로에게 쏟아진다."

[[dialogue]]
speaker = "unk"
original = "大剣を振ろうとモンスターを生もうと、その全てが聖なる光に包まれては消されていった。"
translation = "대검을 휘두르든 몬스터를 낳든, 그 모든 것이 성스러운 빛에 휩싸여 사라져갔다."

[[dialogue]]
speaker = "フィオナ"
original = "「先ほど──塔の内部で『月の壁画』を見ました。覚えがあるはずです、あなたも」"
translation = "「방금 전── 탑 내부에서 『달의 벽화』를 봤습니다. 기억이 있을 겁니다, 당신도」"

[[dialogue]]
speaker = "アポロ"
original = "「へ、壁画だ……？\u3000あたしはそんなの知らないぞ！」"
translation = "「벼, 벽화라……? 나는 그런 거 모른다고!」"

[[dialogue]]
speaker = "unk"
original = "終わりなきフィオナの召喚と連撃。"
translation = "끝없는 피오나의 소환과 연격."

[[dialogue]]
speaker = "unk"
original = "モンスターの対処に手間取っていたクロトたちさながら、アポロは無限に等しい召喚獣たちを相手にしなければならなかった。"
translation = "몬스터 대처에 애를 먹었던 쿠로토들처럼, 아폴로는 무한에 가까운 소환수들을 상대해야 했다."

[[dialogue]]
speaker = "unk"
original = "そしてついに、彼女の防戦も限界に達する。"
translation = "그리고 마침내, 그녀의 방어도 한계에 달한다."

[[dialogue]]
speaker = "アポロ"
original = "「いい加減にしろ、いつまでも粘着してきやがって！\u3000うざいんだよ！」"
translation = "「적당히 좀 해, 언제까지 달라붙는 거야! 짜증 난다고!」"

[[dialogue]]
speaker = "アポロ"
original = "「流星…………ストーーーーーム！！！」"
translation = "「유성………… 스토ーー옴!!!」"

[[dialogue]]
speaker = "フィオナ"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "unk"
original = "天へ掲げた大剣の切っ先へ流星の力が集い──拡散する。"
translation = "하늘로 치켜든 대검의 끝에 유성의 힘이 모여── 확산된다."

[[dialogue]]
speaker = "unk"
original = "“星読事変”の際、ヴィーナスの日誌を書き換え、世界のリクリエ侵攻を加速させた混沌の旋風が巻き起こる。"
translation = "“별 읽기 사변” 때, 비너스의 일지를 고쳐 쓰고, 세계의 리크리에 침공을 가속화시켰던 혼돈의 선풍이 휘몰아친다."

[[dialogue]]
speaker = "アポロ"
original = "「ふっふ──もう手加減してやらないからな！\u3000オマエみたいなしつこいヤツはこの場で星にしてやる！」"
translation = "「훗후── 이제 봐주지 않을 테니까! 너 같은 끈질긴 녀석은 이 자리에서 별로 만들어주마!」"

[[dialogue]]
speaker = "unk"
original = "さらに今度の嵐は指向性を持たされていた。"
translation = "게다가 이번 폭풍은 지향성을 띠고 있었다."

[[dialogue]]
speaker = "unk"
original = "命尽きた星々のきらめきが、フィオナただ一人を目がけて襲う──！"
translation = "생명이 다한 별들의 반짝임이, 피오나 단 한 사람만을 겨냥해 덮친다──!"

[[dialogue]]
speaker = "unk"
original = "──が。"
translation = "──하지만."

[[dialogue]]
speaker = "フィオナ"
original = "「燃えろ……」"
translation = "「타올라라……」"

[[dialogue]]
speaker = "アポロ"
original = "「ぇ──ん、なっ…………！？」"
translation = "「에── 뭐, 뭣이…………!?」"

[[dialogue]]
speaker = "unk"
original = "彼女の守護星は太陽。"
translation = "그녀의 수호성은 태양."

[[dialogue]]
speaker = "unk"
original = "その力を象徴するかのごとく、フィオナの頭上には太陽──を模した闇の大球体が召喚された。"
translation = "그 힘을 상징하듯이, 피오나의 머리 위에는 태양──을 본뜬 어둠의 대구체가 소환되었다."

[[dialogue]]
speaker = "unk"
original = "星力が燃え盛るプロミネンスのように溢れ出し、触れたそばから襲いくる流星たちを浄化してゆく。"
translation = "성력이 불타오르는 홍염처럼 넘쳐흐르고, 닿는 족족 덮쳐오는 유성들을 정화해간다."

[[dialogue]]
speaker = "unk"
original = "それはあたかも、死した星々が天に召されていくかのように。"
translation = "그것은 마치, 죽은 별들이 하늘로 소환되어 가는 것처럼."

[[dialogue]]
speaker = "アポロ"
original = "「な……なんで、だ……」"
translation = "「어…… 어째서, 인데……」"

[[dialogue]]
speaker = "フィオナ"
original = "「今からその仮面を剥ぎます。眩しいので注意してください」"
translation = "「지금부터 그 가면을 벗기겠습니다. 눈부실 테니 주의하세요」"

