[[dialogue]]
speaker = "unk"
original = "第１話,アニュラス・セイファート,P"
translation = "제1화, 아뉴라스 세이파트"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「お疲れ様です、緋宮会長。今日はアステラの攻略について、良い意見交換ができたと思います」"
translation = "「수고하셨습니다, 히노미야 회장. 오늘은 아스텔라 공략에 대해 좋은 의견 교환이 되었다고 생각합니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「後で今日の話し合いをまとめたデータを送りますので、新星星徒会のほうでも周知なさってください」"
translation = "「나중에 오늘 논의를 정리한 데이터를 보낼 테니 신성 성도회 쪽에서도 주지시켜 주세요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふふっ……苦労しているようですけど、あなたなら大丈夫だと思いますよ。ようは慣れの問題ですから」"
translation = "「후후…… 고생하고 있는 모양이지만 당신이라면 괜찮을 거예요. 요는 익숙함의 문제니까요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ではまた、別の機会に」"
translation = "「그럼 다음에 또 뵙죠」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「……あの男が、新星の新しい星徒会長」"
translation = "「……저 남자가 신성의 새로운 성도회장」"

[[dialogue]]
speaker = "unk"
original = "流星学園の星徒会室を後にし、敷地内を歩いていると――"
translation = "유성학원의 성도회실을 뒤로하고 부지 내를 걷고 있자니──"

[[dialogue]]
speaker = "unk"
original = "（何か、視線を感じる……？）"
translation = "(뭔가 시선이 느껴지는데……?)"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「……お父様が認めるほどの男なのだろうか。とてもじゃないが、強そうには見えないな」"
translation = "「……아버님께서 인정하실 정도의 남자인 걸까. 아무리 봐도 강해 보이지는 않는데」"

[[dialogue]]
speaker = "unk"
original = "新星星徒会室へ戻る道中、尾行を確認するために寄り道をしてみると――"
translation = "신성 성도회실로 돌아가는 도중, 미행을 확인하기 위해 길을 돌아가 보자──"

[[dialogue]]
speaker = "unk"
original = "（やっぱり、誰かがつけてきている……）"
translation = "(역시 누군가가 따라오고 있어……)"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「買い食いだと？\u3000たるんでいるんじゃないのか？\u3000星徒会長という立場でありながら、なぜ模範的な行動を取ろうとしない」"
translation = "「군것질이라고? 해이해진 것 아닌가? 성도회장이라는 입장이면서 어째서 모범적인 행동을 취하려 하지 않는 거지」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「むぅ……もう少し観察を続けるか」"
translation = "「음…… 좀 더 관찰을 계속해 볼까」"

[[dialogue]]
speaker = "unk"
original = "そうして、新星学園の校門前まで戻ってきたところで、俺は背後へ向けて告げた。"
translation = "그렇게 신성학원의 교문 앞까지 돌아왔을 때, 나는 등 뒤를 향해 말했다."

[[dialogue]]
speaker = "unk"
original = "……誰だ？"
translation = "……누구냐?"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「……ようやく気付いたか。周囲の警戒を怠っているな。そんな様子で新星の星徒会長など務まるのか？」"
translation = "「……이제야 눈치챘나. 주위 경계를 게을리하고 있군. 그런 모습으로 신성의 성도회장 같은 걸 맡을 수 있겠나?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「私の名は、アニュラス・セイファート」"
translation = "「내 이름은 아뉴라스 세이파트」"

[[dialogue]]
speaker = "unk"
original = "セイファート！？\u3000それって……！"
translation = "세이파트!? 그거 설마……!"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「そう。私は、新星の学園長である『ジェラルド・セイファート』の娘だ」"
translation = "「그래. 나는 신성의 학원장인 『제럴드 세이파트』의 딸이다」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「最近、お父様が興味を持っている生徒がいると聞いてな。新星最強の九浄ヴィーナスに勝った男というのは、お前で間違いないな？」"
translation = "「최근 아버님께서 흥미를 느끼는 학생이 있다고 들어서 말이지. 신성 최강인 쿠죠 비너스를 이긴 남자라는 게 네가 맞겠지?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「……何？\u3000もし間違っていたらどうするつもりなのか、だと？」"
translation = "「……뭐? 만약 틀렸다면 어쩔 셈이냐고?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「う、うるさいなっ。私は確信をもっていたのだ。フィオナ会長と仲良さげに話している男性など、新星の会長しかいないはずだからな！」"
translation = "「시, 시끄럽다! 나는 확신하고 있었다고. 피오나 회장과 다정하게 이야기하는 남성 따위 신성의 회장밖에 없을 테니까!」"

[[dialogue]]
speaker = "unk"
original = "尾行はよくないと思うぞ？"
translation = "미행은 좋지 않다고 생각하는데?"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「び、尾行なんて卑怯な真似、していない。観察……そう！\u3000観察していたんだ！」"
translation = "「미, 미행 같은 비겁한 짓은 하지 않았다. 관찰…… 그래! 관찰하고 있었던 거다!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「尾行などという騎士道精神に反するような行動を取ると思わないで欲しい！\u3000失礼だぞ！？」"
translation = "「미행 같은 기사도 정신에 반하는 행동을 취할 거라 생각하지 말아줬으면 좋겠군! 실례라고!?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「む……ま、まあ、確かに声もかけずに見ていたことは事実だ。そこは謝罪しよう。すまなかった」"
translation = "「음…… 뭐, 확실히 말도 걸지 않고 지켜본 것은 사실이다. 그 점은 사과하지. 미안했다」"

[[dialogue]]
speaker = "unk"
original = "（意外と素直だ……）"
translation = "(의외로 솔직하다……)"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「しかしそれはそれ、これはこれだ。お前が本当にお父様の興味を引くほどの人物なのか、私にその実力を見せてもらいたい」"
translation = "「하지만 그건 그거고 이건 이거다. 네가 정말로 아버님의 흥미를 끌 정도의 인물인지 나에게 그 실력을 보여줬으면 한다」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「最近はどこに行ってもお前の話ばかりだ……私はこの目で確かめるまで、噂などには決して踊らされないからな」"
translation = "「요즘은 어딜 가도 네 이야기뿐이다…… 나는 이 눈으로 확인할 때까지 소문 따위에는 결코 휘둘리지 않으니까」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「魔剣の力を解き放つ……！\u3000はああぁぁぁッ！」"
translation = "「마검의 힘을 해방한다……! 하아아아앗!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「グラトニーデザイアッ！！！」"
translation = "「글러트니 디자이어!!!」"

[[dialogue]]
speaker = "unk"
original = "（星徒会メンバーに匹敵するレベルで強い！）"
translation = "(성도회 멤버에 필적할 정도로 강해!)"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「――どうやら、ここまでのようだな」"
translation = "「──아무래도 여기까지인 모양이군」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「なるほど。確かな実力はあるようだ。しかし、まだまだだ」"
translation = "「과연. 확실한 실력은 있는 모양이다. 하지만 아직 멀었어」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「お父様にはまだ遠く及ばん。それに、その調子では私にも勝てるかどうか怪しい。本当にあの九浄ヴィーナスに勝ったのか？」"
translation = "「아버님께는 아직 한참 못 미친다. 게다가 그 상태로는 나에게 이길 수 있을지도 의문이군. 정말로 그 쿠죠 비너스를 이긴 건가?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「……これでも私は、実技試験では流星学園１年の首席だ。お父様の恥とならないように、努力を続けてきたからな」"
translation = "「……이래 봬도 나는 실기 시험에서 유성학원 1학년 수석이다. 아버님의 명예에 먹칠하지 않도록 노력을 계속해 왔으니까」"

[[dialogue]]
speaker = "unk"
original = "学園長も強かった？"
translation = "학원장님도 강했어?"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「お父様のことを知らないのか？\u3000現役時代には英雄的活躍をした人物だぞ。私じゃなくとも、憧れている生徒は多いはずだ」"
translation = "「아버님에 대해 모르는 건가? 현역 시절에는 영웅적 활약을 한 인물이다. 내가 아니더라도 동경하는 학생은 많을 거다」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「星力が衰えた今でも、剣技のみで生半可な者には負けないはずだ。私の剣もお父様から習ったものだからな」"
translation = "「성력이 쇠퇴한 지금도 검술만으로 어설픈 자에게는 지지 않으실 거다. 나의 검도 아버님께 배운 것이니까」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「機会があれば稽古をつけてもらうといい……いや、最近のお父様は忙しそうにしているから無理か……」"
translation = "「기회가 된다면 지도를 받아보는 게 좋을 거다…… 아니, 요즘 아버님은 바빠 보이시니 무리인가……」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「なんにせよ、時間を取らせて悪かったな。私の期待するほどの人物ではなかった、ということはわかった」"
translation = "「어쨌든 시간을 뺏어서 미안했군. 내가 기대했던 만큼의 인물은 아니었다는 건 알았다」"

[[dialogue]]
speaker = "unk"
original = "……待て"
translation = "……기다려"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「ん？\u3000どうした」"
translation = "「응? 왜 그러지」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「実力の優劣ならば、ついたと思うが？」"
translation = "「실력의 우열이라면 가려졌다고 생각한다만?」"

[[dialogue]]
speaker = "unk"
original = "次会う時までに、納得させられるようになる"
translation = "다음에 만날 때까지 납득시킬 수 있게 되겠어"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「……ふむ、心意気は私の好みだな。私も悔しさをバネにしてきたから、お前の気持ちはわかる」"
translation = "「……흠, 기개는 내 취향이군. 나도 분함을 발판 삼아 왔으니 네 기분은 이해한다」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「いいだろう、本気ならば受けて立とう」"
translation = "「좋다, 진심이라면 받아주지」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「では、新星の会長、また会おう。私もその日まで、鍛錬に精を出すこととする」"
translation = "「그럼 신성의 회장, 다음에 또 보자. 나도 그날까지 단련에 힘쓰도록 하겠다」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「その時、お父様から教わった剣技も披露してやろう。楽しみにしているといい」"
translation = "「그때 아버님께 배운 검술도 선보여 주지. 기대하고 있는 게 좋아」"

[[dialogue]]
speaker = "unk"
original = "俺は燃え上がる決意を胸に、その日から特訓を開始するのだった。"
translation = "나는 불타오르는 결의를 가슴에 품고 그날부터 특훈을 개시하는 것이었다."

