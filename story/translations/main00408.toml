[[dialogue]]
speaker = "unk"
original = "第９話,氷雪の姉妹,B"
translation = "제9화, 빙설의 자매, B"

[[dialogue]]
speaker = "unk"
original = "さらに一方──"
translation = "더욱이 한편──"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「イイイイイィィ……！！」"
translation = "「이이이이이이이……!!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「──ふっ！\u3000とっ──やっ！」"
translation = "「──훗! 톳──얏!」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「イイイィィィ……！？」"
translation = "「이이이이이……!?」"

[[dialogue]]
speaker = "unk"
original = "氷上の妖精が舞っていた。"
translation = "얼음 위의 요정이 춤추고 있었다."

[[dialogue]]
speaker = "unk"
original = "彼女の描いた剣とステップの軌跡には、粉雪の刃が滞空して迫るモンスターを切りつける。"
translation = "그녀가 그린 검과 스텝의 궤적에는, 가루눈의 칼날이 체공하며 다가오는 몬스터를 베어낸다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "（避ける──守る──斬る。常に冷静に、辺りを見回して）"
translation = "（피한다──지킨다──벤다. 항상 냉정하게, 주변을 둘러보며）"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「イイイイ～～～ッ！！」"
translation = "「이이이이~~~ㅅ!!」"

[[dialogue]]
speaker = "unk"
original = "全身に纏う氷のヴェールは障壁の役割を持ちながら、接近する相手に強烈な冷気を浴びせて機動力を奪う。"
translation = "전신에 두른 얼음의 베일은 장벽의 역할을 하면서, 접근하는 상대에게 강렬한 냉기를 쐬어 기동력을 빼앗는다."

[[dialogue]]
speaker = "unk"
original = "かたやソフィアの俊敏な動きはとらえどころなく、徹底したヒットアンドアウェイによって一帯の敵が殲滅された。"
translation = "한편 소피아의 민첩한 움직임은 종잡을 수 없었고, 철저한 히트 앤드 어웨이에 의해 일대의 적이 섬멸되었다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ふぅ、ふぅ……こんなところでしょうか。確かに通常の個体より手強いようです」"
translation = "「후우, 후우…… 이 정도일까요. 확실히 통상의 개체보다 벅찬 듯합니다」"

[[dialogue]]
speaker = "unk"
original = "舞いが終わる。"
translation = "춤이 끝난다."

[[dialogue]]
speaker = "unk"
original = "常に懐へ切り込み、撹乱と陽動と攻撃を絶え間なく繰り返すソフィアの戦闘スタイルは多大なスタミナを要求する。"
translation = "항상 품속으로 파고들어, 교란과 양동과 공격을 끊임없이 반복하는 소피아의 전투 스타일은 막대한 체력을 요구한다."

[[dialogue]]
speaker = "unk"
original = "そこへ……"
translation = "그때……"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「イイイイイィィ……！！」"
translation = "「이이이이이이이……!!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker = "unk"
original = "一匹。氷漬けからよみがえったモンスターが彼女の背後をついた。"
translation = "한 마리. 얼음 속에 갇혔다가 되살아난 몬스터가 그녀의 등 뒤를 노렸다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "（冷気が、足りなかった──！？）"
translation = "（냉기가, 부족했던 건가──!?）"

[[dialogue]]
speaker = "unk"
original = "焦るなと自分に言い聞かせるソフィア。"
translation = "초조해하지 말라고 자신에게 타이르는 소피아."

[[dialogue]]
speaker = "unk"
original = "それなら冷静に、さらなる氷術を浴びせればいいだけだと──"
translation = "그렇다면 냉정하게, 더욱더 얼음술을 쐬어주면 될 뿐이라고──"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「フローズンインパクト」"
translation = "「프로즌 임팩트」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「イイイィィィ……！！」"
translation = "「이이이이이……!!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「──あ……」"
translation = "「──아……」"

[[dialogue]]
speaker = "unk"
original = "ソフィアが次の踏み込みに移るまでもなく。"
translation = "소피아가 다음 발 구름으로 옮겨가기도 전에."

[[dialogue]]
speaker = "unk"
original = "背後から飛来した絶対零度の斬撃が、モンスターの頭部を儚く刈り取った。"
translation = "등 뒤에서 날아온 절대 영도의 참격이, 몬스터의 머리 부분을 허무하게 베어냈다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「──強くなったわね、ソフィ」"
translation = "「──강해졌네, 소피」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「……別に。姉さんの知っている頃の私じゃありませんから」"
translation = "「……별로요. 언니가 알고 있는 시절의 제가 아니니까요」"

[[dialogue]]
speaker = "unk"
original = "攻撃の主──サーシャが大鎌を背負い降り立つ。"
translation = "공격의 주역──사샤가 대낫을 짊어지고 내려선다."

[[dialogue]]
speaker = "unk"
original = "これで彼女たちの周りには、氷漬けになった屍が転がるのみとなっていた。"
translation = "이로써 그녀들 주변에는, 얼음 속에 갇힌 시체만이 뒹굴고 있었다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「今のだって……私だけでもやれましたから。ただ、ちょっと休憩してただけで」"
translation = "「방금 것도…… 저 혼자서도 할 수 있었으니까요. 다만, 잠깐 쉬고 있었을 뿐이에요」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふふ。ソフィが冷やしておいてくれたから、一撃で倒すことができたのよ。えらいえらい」"
translation = "「후후후. 소피가 차갑게 해두었기 때문에, 한 방에 쓰러뜨릴 수 있었던 거야. 착하다 착해」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「あ……頭を撫でないでください！\u3000私ももう子どもじゃないんです！」"
translation = "「아…… 머리를 쓰다듬지 말아 주세요! 저도 이제 어린애가 아니에요!」"

[[dialogue]]
speaker = "unk"
original = "可愛がるサーシャの右手から、顔を真っ赤にして逃れるソフィア。"
translation = "귀여워하는 사샤의 오른손에서, 얼굴을 새빨갛게 하고 도망치는 소피아."

[[dialogue]]
speaker = "unk"
original = "先ほどまでの冷徹な立ち回りとは似ても似つかぬ動揺を見せていた。"
translation = "방금 전까지의 냉철한 움직임과는 전혀 닮지 않은 동요를 보이고 있었다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「流星に進学したのは聞いていたけれど……まさか星徒会に入ってるなんて思わなかったわ。ふふ、お揃いね」"
translation = "「유성에 진학한 건 들었지만…… 설마 성도회에 들어와 있을 줄은 몰랐네. 후후, 똑같네」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「べ……別に姉さんの真似をしたわけじゃありません。憧れの人がいたから、入ったんです」"
translation = "「벼, 별로 언니를 흉내 낸 건 아니에요. 동경하는 사람이 있었기 때문에, 들어간 거예요」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「へえ……」"
translation = "「헤에……」"

[[dialogue]]
speaker = "unk"
original = "強がるソフィアを見て、サーシャは心の中で微笑む。"
translation = "강한 척하는 소피아를 보고, 사샤는 마음속으로 미소 짓는다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「流星のみんなには良くしてもらってる？」"
translation = "「유성의 모두에게는 잘 지내고 있어?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「……はい。少々、皆さん不真面目なところがありますが……その分フィオナ会長がいるので」"
translation = "「……네. 조금, 여러분 불성실한 면이 있지만…… 그만큼 피오나 회장님이 계시니까요」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そっか。それが、ソフィの憧れの人？」"
translation = "「그렇구나. 그게, 소피가 동경하는 사람?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「はい！\u3000フィオナ会長は素晴らしい御仁です。私はあの人の偉大さに心打たれて、ああなりたいって思ったんです！」"
translation = "「네! 피오나 회장님은 훌륭한 분이세요. 저는 그분의 위대함에 감명받아, 그렇게 되고 싶다고 생각했어요!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふふ。私はまだ会ったことないけど……ソフィがそう言うなら、きっと素敵な子なんでしょうね」"
translation = "「후후후. 나는 아직 만나본 적 없지만…… 소피가 그렇게 말한다면, 분명 멋진 아이겠지」"

[[dialogue]]
speaker = "unk"
original = "屈託なく笑うソフィアを見て、サーシャもまた朗らかに微笑む。"
translation = "근심 없이 웃는 소피아를 보고, 사샤 또한 명랑하게 미소 짓는다."

[[dialogue]]
speaker = "unk"
original = "離れた妹がこうして健やかに育っているなら心配は要らないか──と。"
translation = "떨어져 있던 여동생이 이렇게 건강하게 자라고 있다면 걱정할 필요는 없겠지──라고."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "（でも……ちょっとくらい嫉妬してくれてもいいですけど……）"
translation = "（하지만…… 조금 정도는 질투해 줘도 괜찮은데요……）"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ソフィ？」"
translation = "「소피?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「なんでもありませんっ」"
translation = "「아무것도 아니에요」"

[[dialogue]]
speaker = "unk"
original = "こうしている間も、二人は湧き出るモンスターたちの討伐を背中合わせで続けていた。"
translation = "이렇게 있는 동안에도, 두 사람은 솟아나는 몬스터들의 토벌을 등 맞대고 계속하고 있었다."

[[dialogue]]
speaker = "unk"
original = "それでも世間話に興じていられるのは、戦闘における呼吸が言語不要なほど合致していたからである。"
translation = "그럼에도 불구하고 세상 돌아가는 이야기를 즐길 수 있는 것은, 전투에서의 호흡이 언어 불필요할 정도로 일치했기 때문이다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「それより……姉さんは、どうなんですか？\u3000会長職を退いて、今は会計に就いたみたいですけど……」"
translation = "「그것보다…… 언니는, 어떤가요? 회장직에서 물러나, 지금은 회계직에 취임한 것 같습니다만……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あら、よく知ってるのね」"
translation = "「어머, 잘 알고 있네」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「た──たまたまです！\u3000敵情視察です！」"
translation = "「타──타마마예요! 적정 시찰이에요!」"

[[dialogue]]
speaker = "unk"
original = "敵じゃないでしょう、とたしなめながらサーシャは笑った。"
translation = "적이 아니잖아, 라고 타이르면서 사샤는 웃었다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そうね──私も毎日楽しいわ。最近はクロトくんっていう可愛い後輩も入ってきたし……なんて、自分たちの会長に言っちゃいけないわね」"
translation = "「그렇네── 나도 매일 즐거워. 최근에는 쿠로토 군이라는 귀여운 후배도 들어왔고…… 라니, 자기들의 회장에게 말하면 안 되겠네」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「……むむぅ」"
translation = "「……으으음」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「な、なら姉さんは……私のことはどう思っているんですか」"
translation = "「그, 그럼 언니는…… 저를 어떻게 생각하고 있나요」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「どうって……」"
translation = "「어떻게라니……」"

[[dialogue]]
speaker = "unk"
original = "ソフィアにサーシャ。奏姉妹は共に魔界の出身である。"
translation = "소피아에 사샤. 카나데 자매는 함께 마계 출신이다."

[[dialogue]]
speaker = "unk"
original = "一般の魔族が人間界へ留学するのは困難を極めることだったが、二人は共にその高いハードルを超えた。"
translation = "일반 마족이 인간계로 유학하는 것은 극도로 어려운 일이었지만, 두 사람은 함께 그 높은 장벽을 넘었다."

[[dialogue]]
speaker = "unk"
original = "その上で、姉離れのため距離を取ろうとする自分を、一体どう思っているのかソフィアは問うている。"
translation = "게다가, 언니에게서 독립하기 위해 거리를 두려는 자신을, 대체 어떻게 생각하고 있는지 소피아는 묻고 있다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そうね──ソフィは私にとって、世界で唯一の、とっても可愛い妹よ」"
translation = "「그렇네── 소피는 나에게 있어서, 세상에서 유일한, 정말로 귀여운 여동생이야」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「たとえ……どんなに離れていてもね」"
translation = "「설령…… 아무리 떨어져 있어도 말이야」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「あ……」"
translation = "「아……」"

[[dialogue]]
speaker = "unk"
original = "サーシャが先んじて留学した時。"
translation = "사샤가 먼저 유학했을 때."

[[dialogue]]
speaker = "unk"
original = "ソフィアは、慕っていた姉から離れざるをえなくなった。"
translation = "소피아는, 따르던 언니에게서 떨어질 수밖에 없었다."

[[dialogue]]
speaker = "unk"
original = "それから彼女も成長し、人間界へ来て、フィオナと出会い、今のソフィアが形成されたわけであるが……"
translation = "그 후 그녀도 성장하여, 인간계로 와서, 피오나와 만나, 지금의 소피아가 형성된 것이지만……"

[[dialogue]]
speaker = "unk"
original = "たとえ距離が縮まろうと遠ざかろうと、二人の関係に何も変わりはないとサーシャは言う。"
translation = "설령 거리가 가까워지든 멀어지든, 두 사람의 관계에는 아무것도 변함이 없다고 사샤는 말한다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ホントなら抱きしめてナデナデしてほっぺすりすりまでしてあげたいところなのだけど……なんか嫌われちゃいそうだし」"
translation = "「사실이라면 안아주고 쓰담쓰담 해주고 볼 부비부비까지 해주고 싶은데…… 왠지 미움받을 것 같고」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「そ、それが嫌だから流星にきたんですっ。やらなくて正解ですっ」"
translation = "「그, 그게 싫어서 유성에 온 거예요. 안 하는 게 정답이에요」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふふ。なら、また許してくれる日を待っているわ」"
translation = "「후후후. 그럼, 다시 허락해 줄 날을 기다리고 있을게」"

[[dialogue]]
speaker = "unk"
original = "ソフィアの氷剣が舞い、サーシャの氷鎌が走った。"
translation = "소피아의 얼음 검이 춤추고, 사샤의 얼음 낫이 달렸다."

[[dialogue]]
speaker = "unk"
original = "出没していたモンスターの大半を狩り尽くすと、残るは大型の一頭のみとなっていた。"
translation = "출몰하던 몬스터의 대부분을 사냥하자, 남은 것은 대형 한 마리뿐이었다."

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「ウィイイイイイ！！」"
translation = "「위이이이이이!!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ちょっと手強そうですね」"
translation = "「조금 벅찰 것 같네요」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ええ。でも、最後は一緒に力を合わせれば──」"
translation = "「응. 하지만, 마지막은 함께 힘을 합치면──」"

[[dialogue]]
speaker = "unk"
original = "と、姉妹が同じ方向を見据えたその時。"
translation = "그리고, 자매가 같은 방향을 바라본 그때."

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「イイイイ──ッ！」"
translation = "「이이이이──ㅅ!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「！？」"
translation = "「!?」"

[[dialogue]]
speaker = "unk"
original = "繁華街から射出された業炎の矢が通り過ぎ、残る最後の一匹を消し炭に変えた。"
translation = "번화가에서 발사된 업염의 화살이 지나가, 남은 마지막 한 마리를 숯덩이로 만들었다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「な……なんですか今の……」"
translation = "「뭐…… 뭐예요 방금 건……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「アナちゃんの本気ね。ふふ、いい相方を見つけられたみたい」"
translation = "「아나짱의 진심이네. 후후, 좋은 짝을 찾은 것 같아」"

[[dialogue]]
speaker = "unk"
original = "にこやかに笑うサーシャを、ソフィアはやや気難しそうな顔で見つめた。"
translation = "상냥하게 웃는 사샤를, 소피아는 다소 까다로운 듯한 얼굴로 바라보았다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "（ほら、結局私以外でも……）"
translation = "（거봐, 결국 나 말고도……）"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「？」"
translation = "「?」"

[[dialogue]]
speaker = "unk"
original = "姉妹の心は近いようで遠く、遠いようで近く。"
translation = "자매의 마음은 가까운 듯 멀고, 먼 듯 가깝다."

[[dialogue]]
speaker = "unk"
original = "交わした言葉はさほど多くなかったものの、その共闘は２人にとって意味のある時間となった。"
translation = "나눈 말은 그다지 많지 않았지만, 그 공동 투쟁은 두 사람에게 의미 있는 시간이 되었다."

