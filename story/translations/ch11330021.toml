[[dialogue]]
speaker = "unk"
original = "第１話,突然の変身,P"
translation = "제1화, 갑작스러운 변신, P"

[[dialogue]]
speaker = "unk"
original = "放課後、本を借りようと思って図書館を訪ねると──"
translation = "방과 후, 책을 빌리려고 도서관을 방문하자──"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "華やかな衣装に身を包んだリィベルがカウンターに座っていた。"
translation = "화려한 의상을 몸에 두른 리벨이 카운터에 앉아 있었다."

[[dialogue]]
speaker = "unk"
original = "俺の視線に気が付いたのか、リィベルがこちらを軽く睨む。"
translation = "내 시선을 눈치챘는지, 리벨이 이쪽을 가볍게 노려본다."

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「な、何よ。……何か言いたいことがあるんでしょう」"
translation = "「뭐, 뭐야. ……할 말이 있는 모양이네」"

[[dialogue]]
speaker = "unk"
original = "すっごく似合ってる！"
translation = "엄청 잘 어울려!"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「はぁ！？」"
translation = "「하아!?」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「……そうじゃなくて、他に言うことがあるでしょう？」"
translation = "「……그게 아니라, 다른 할 말이 있잖아?」"

[[dialogue]]
speaker = "unk"
original = "……はちゃめちゃに可愛い？"
translation = "……터무니없이 귀여운데?"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「っ！\u3000そ、そういうことじゃないわよ！」"
translation = "「윽! 그, 그런 소리가 아니야!」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「は～い、図書館ではお静かに……って会長じゃないですか。どうしたんですか？」"
translation = "「네~에, 도서관에서는 조용히…… 어라, 회장님 아니신가요. 무슨 일이죠?」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「どうしたもこうしたもないわ。魔王が私のこの格好を可愛いとか似合ってるとか言って話にならないの」"
translation = "「무슨 일이고 자시고 없어. 마왕이 내 이런 차림을 귀엽다느니 잘 어울린다느니 하면서 말이 안 통한다고」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「それは会長の言うとおりだと思いますけど……ちょうどいい機会ですから、この姿について、会長に相談してみましょう」"
translation = "「그건 회장님 말씀이 맞다고 생각합니다만…… 마침 좋은 기회니까, 이 모습에 대해서 회장님께 상담해 보죠」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「この魔王、頼りになるのかしら……。はぁ、まぁいいわ」"
translation = "「이 마왕, 의지가 되는 걸까……. 하아, 뭐 됐어」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「信じられないかもしれないけれど、朝起きたらこの格好になっていて、元に戻れないの。おかげでみんな制服を着ている中、これで授業を受ける羽目になったわ……」"
translation = "「믿기지 않겠지만, 아침에 일어나 보니 이런 차림이 되어 있어서 원래대로 돌아갈 수가 없어. 덕분에 다들 교복을 입고 있는 와중에 이걸로 수업을 듣는 처지가 됐다고……」"

[[dialogue]]
speaker = "unk"
original = "星騎士あるあるだから気にしないで"
translation = "성기사라면 흔히 있는 일이니까 신경 쓰지 마"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「そうなの！？」"
translation = "「정말!?」"

[[dialogue]]
speaker = "unk"
original = "ある日突然、星騎士の戦闘服が変わって元に戻らない──まれによくある話だ。"
translation = "어느 날 갑자기, 성기사의 전투복이 바뀌어 원래대로 돌아오지 않는다── 드물지만 자주 있는 이야기다."

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「はい。この図書館にもトワちゃん先生が書かれたレポートで記録が残っています」"
translation = "「네. 이 도서관에도 토와 짱 선생님이 쓰신 리포트로 기록이 남아 있습니다」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「結婚したい気持ちが溢れて戦闘服がウェディングドレスになったとか、異空間に閉じ込められたと思ったらバニー服を着ていた、などですね」"
translation = "「결혼하고 싶은 마음이 넘쳐서 전투복이 웨딩드레스가 되었다거나, 이공간에 갇혔다고 생각했더니 바니걸 복장을 입고 있었다, 같은 것들이죠」"

[[dialogue]]
speaker = "unk"
original = "バニーは俺も当事者なのだが、黙っておこう。傷口を自分から広げる真似はしない。"
translation = "바니는 나도 당사자지만, 가만히 있자. 상처를 스스로 벌리는 짓은 하지 않는다."

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「また、自力で戦闘服を変化させられる方もいらっしゃいますね。ただ、その場合は、細部の調整が難しいので大胆なデザインになることもあるようです」"
translation = "「또한, 자력으로 전투복을 변화시킬 수 있는 분도 계시죠. 다만 그 경우에는 세부 조정이 어렵기 때문에 대담한 디자인이 되기도 하는 모양이에요」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「なるほど。モネがたまに着ている、サンタみたいな水着みたいな戦闘服は調整がうまくいかなかったのね」"
translation = "「과연. 모네가 가끔 입는 산타 같기도 하고 수영복 같기도 한 전투복은 조정이 잘 안 된 거였구나」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「いえ、あれは……ヘレナさんのデザインした人工戦闘服なのでまた別というか……その、あまり、話題にしないでもらえると助かります……」"
translation = "「아니요, 그건…… 헬레나 씨가 디자인한 인공 전투복이라 또 별개라고 할까…… 그, 너무 화제로 삼지 않아 주시면 감사하겠습니다……」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「そう……ひとまず星騎士の戦闘服が変化することは分かったわ。でも、私のこれについては原因からして不明のままよ」"
translation = "「그래…… 일단 성기사의 전투복이 변화한다는 건 알았어. 하지만 내 이건 원인부터가 불명인 채라고」"

[[dialogue]]
speaker = "unk"
original = "星騎士の場合、外的な要因で戦闘服が変化したケースが多い。"
translation = "성기사의 경우, 외적인 요인으로 전투복이 변화한 케이스가 많다."

[[dialogue]]
speaker = "unk"
original = "リィベルは厳密には星騎士ではないので、単純に当てはめることはできないが……"
translation = "리벨은 엄밀히 말하면 성기사가 아니기에 단순하게 대입할 수는 없지만……"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「え？\u3000……昨日、変わったことはなかったか？\u3000別に何も。いつも通りに登校して授業を受けて、放課後は図書委員の仕事をしながら魔将の候補者を探していたわ」"
translation = "「에? ……어제, 변한 건 없었냐고? 딱히 아무것도. 평소처럼 등교해서 수업을 듣고, 방과 후에는 도서위원 일을 하면서 마장 후보자를 찾고 있었어」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「そのあとは……寮に帰って、晩ご飯を食べて、お風呂入って、寝たわ。いわゆる普通の生活ね」"
translation = "「그다음엔…… 기숙사에 돌아가서 저녁 먹고, 목욕하고, 잤어. 소위 말하는 평범한 생활이지」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「……あ、あと、寝る前に小説をいくらか読んだわ。でも、本当にそれくらいで、何も変わったことなんてなかったのよ」"
translation = "「……아, 그리고 자기 전에 소설을 좀 읽었어. 하지만 정말 그 정도고, 아무런 변한 일 따위 없었다고」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ちなみに、小説は何を読みました？」"
translation = "「참고로 소설은 뭘 읽으셨나요?」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「主人公が死後、中華風の世界に生まれ変わって宮廷で成り上がるやつ。つい盛り上がって、シリーズ一気読みしてしまったわ。おかげで今も少し眠たいのよ」"
translation = "「주인공이 죽은 뒤 중화풍 세계에 환생해서 궁정에서 출세하는 녀석. 그만 몰입해서 시리즈를 정주행해 버렸어. 덕분에 지금도 조금 졸리네」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ああ、あの！\u3000コミック化もしてる人気シリーズですね。じゃあ原因はそれです」"
translation = "「아아, 그거! 코믹스화도 된 인기 시리즈네요. 그럼 원인은 그겁니다」"

[[dialogue]]
speaker = "unk"
original = "それだね"
translation = "그거네"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「はぁ！？\u3000小説を読んだだけで戦闘服が変わるわけないでしょう！？」"
translation = "「하아!? 소설을 읽었다고 전투복이 바뀔 리가 없잖아!?」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「いいえ、リィベルさん。図書委員たる者が何を言っているんですか」"
translation = "「아니요, 리벨 씨. 도서위원인 분이 무슨 소리를 하시는 건가요」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「一冊の本、いえ、たった一文でさえ人生を変えうるのです。シリーズ一気読みしたら戦闘服が変わるなんてむしろ当たり前じゃないですか」"
translation = "「책 한 권, 아니, 단 한 문장조차 인생을 바꿀 수 있습니다. 시리즈를 정주행했다면 전투복이 바뀌는 건 오히려 당연하지 않습니까」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「リィベルさんの衣装、どこかで見たと思ったんですけど、まさしく小説の挿絵にそっくりです」"
translation = "「리벨 씨의 의상, 어디서 봤다 싶었는데 딱 소설 삽화랑 판박이예요」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「そうかしら……そうかも……」"
translation = "「그런가…… 그럴지도……」"

[[dialogue]]
speaker = "unk"
original = "リィベルは特殊な存在だ。彼女の力の源は深淵書庫の魔本であり、他の本に影響されるというのはあり得る。"
translation = "리벨은 특수한 존재다. 그녀의 힘의 근원은 심연서고의 마도서이며, 다른 책에 영향을 받는다는 것은 있을 법한 일이다."

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「でも待って。仮にそうだとして……仮に、仮によ。私がえっちな小説や露出度多めの漫画を読んだら、『そういう格好』になってしまう可能性があるということ？」"
translation = "「하지만 잠깐만. 만약 그렇다고 치고…… 만약에, 만약에 말이야. 내가 야한 소설이나 노출도 높은 만화를 읽으면 『그런 차림』이 되어 버릴 가능성이 있다는 거야?」"

[[dialogue]]
speaker = "？？？"
original = "「その質問には私から答えよう」"
translation = "「그 질문에는 내가 답해주지」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「あなたは──」"
translation = "「당신은──」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「私はレナーテ・<ruby>Ｚ<rt>ジグ</rt></ruby>・サイフリート。ここではジグと呼ばれているよ。私の『<ruby>天機<rt>てんき</rt></ruby>の星眼』は視たものの可能性を見通すことができる」"
translation = "「나는 레나테 Z 지크 사이프리트. 여기서는 지크라고 불리고 있어. 나의 『천기의 성안』은 본 것의 가능성을 꿰뚫어 볼 수 있지」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「つまり……」"
translation = "「그러니까……」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「そう、私には視えているよ。君がえっちな本を読んで、えっちな姿になる可能性が」"
translation = "「그래, 내게는 보인다고. 네가 야한 책을 읽고 야한 모습이 될 가능성이」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「はぁ～～～～～！？」"
translation = "「하아~~~~~!?」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ふふっ。面白い話が聞こえたからつい悪ノリしてしまった。まぁ、信じるかどうかは君次第だけどね。じゃあ、これで失礼するよ」"
translation = "「후훗. 재미있는 이야기가 들리길래 그만 장난을 좀 쳤어. 뭐, 믿을지 말지는 네 자유지만 말이야. 그럼 이만 실례할게」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「ちょっと、待ちなさ……行ってしまったわね」"
translation = "「잠깐, 기다려…… 가 버렸네」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「はぁ～……なんかどっと疲れたわ。モネ、本を選んでちょうだい。絶対いかがわしい気分にならない真面目なのを」"
translation = "「하아~…… 왠지 확 피곤해졌어. 모네, 책 좀 골라줘. 절대 야한 기분이 들지 않을 진지한 걸로」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「そうですね……では、難解な哲学の本などいかがでしょう」"
translation = "「그렇네요…… 그럼 난해한 철학 책 같은 건 어떠신가요?」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「いいわね。これでこの姿も解除されるし、変な恰好になることもないはず」"
translation = "「좋네. 이걸로 이 모습도 해제될 거고, 이상한 차림이 될 일도 없을 거야」"

[[dialogue]]
speaker = "unk"
original = "──翌日、リィベルは哲学の本をしっかり読み込み、哲学者っぽい服装で登校してきた。"
translation = "──다음 날, 리벨은 철학 책을 열심히 읽고 철학자 같은 복장으로 등교했다."

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「どうしてこうなるのよ～～～～～っ！？」"
translation = "「어째서 이렇게 되는 거야~~~~~!?」"

[[dialogue]]
speaker = "unk"
original = "ちなみに、戦闘服は深淵書庫に戻ると解除された。"
translation = "참고로 전투복은 심연서고로 돌아가자 해제되었다."

