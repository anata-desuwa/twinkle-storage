[[dialogue]]
speaker = "unk"
original = "第４話,転入生の献身的生活,P"
translation = "제4화, 전입생의 헌신적인 생활, P"

[[dialogue]]
speaker = "unk"
original = "フニとの付き合いも長くなり始めた頃。母さんが出張で家を空けることになり、その間フニが俺の家でメイドのバイトをしてくれることになった――"
translation = "후니와 알고 지낸 지도 꽤 되었을 무렵. 어머니가 출장으로 집을 비우게 되어, 그동안 후니가 우리 집에서 메이드 아르바이트를 해주기로 했다──"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「はい、ケーキと紅茶をお持ち致しました、ご主人様♪」"
translation = "「네, 케이크와 홍차를 가져왔습니다, 주인님♪」"

[[dialogue]]
speaker = "unk"
original = "でも、ご主人様呼びは慣れないな……"
translation = "하지만 주인님이라는 호칭은 익숙하지 않네……"

[[dialogue]]
speaker = "unk"
original = "今日もありがとう、フニ"
translation = "오늘도 고마워, 후니."

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「えへへ……♪\u3000この場では会長さんのメイドですので」"
translation = "「에헤헤……♪ 이 자리에서는 회장님의 메이드니까요.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「それとも、ご主人様って呼ばれるのは、お嫌でしたか……？」"
translation = "「아니면, 주인님이라고 불리는 게 싫으셨나요……?」"

[[dialogue]]
speaker = "unk"
original = "嫌じゃないから困る"
translation = "싫지 않아서 곤란해."

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ふふっ、じゃあこのまま、ご主人様って呼びますね♪」"
translation = "「후훗, 그럼 이대로 주인님이라고 부를게요♪」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「あっ、ちなみに紅茶のお砂糖は、いつもご主人様が飲む際の分量を既に入れてありますので」"
translation = "「앗, 참고로 홍차 설탕은 평소에 주인님이 드실 때의 분량을 미리 넣어두었어요.」"

[[dialogue]]
speaker = "unk"
original = "すっかりメイドが板に付いたなぁ"
translation = "완전히 메이드가 몸에 배었네."

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「最近は自分でも、ひょっとしたら天職かもと思ったりします」"
translation = "「최근에는 스스로도 어쩌면 천직일지도 모른다고 생각하곤 해요.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「地元にいた時から、将来は誰かの役に立てるような大人になりたいって思ってましたから。……メイドは性に合ってるのかもしれません」"
translation = "「고향에 있을 때부터 장래에는 누군가에게 도움이 될 수 있는 어른이 되고 싶다고 생각했거든요. ……메이드는 적성에 맞을지도 몰라요.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「でも本当は、メイドというより、決めた１人に献身的に尽くしたいというか……」"
translation = "「하지만 사실은 메이드라기보다, 정해진 한 사람에게 헌신적으로 다하고 싶달까……」"

[[dialogue]]
speaker = "unk"
original = "え……？"
translation = "에……?"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「と、とりあえず、紅茶が冷めてしまう、前にどうぞっ」"
translation = "「어, 어쨌든 홍차가 식기 전에 드세요!」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「それから、イチゴのショートケーキも。フォークで……はい、あ～ん♪」"
translation = "「그리고 딸기 쇼트케이크도. 포크로…… 자, 아~앙♪」"

[[dialogue]]
speaker = "unk"
original = "さ、さすがにそれは恥ずかしい……"
translation = "아, 역시 그건 부끄러워……"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「こういうの、前から１度やってみたかったんです。メイドがご主人様に奉仕しているだけですから……ね？」"
translation = "「이런 거, 전부터 한 번 해보고 싶었어요. 메이드가 주인님께 봉사하고 있는 것뿐이니까…… 그쵸?」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「どうぞ、ご主人様♪\u3000あ～ん♪\u3000……えへへ、どうです？\u3000甘くて美味しいですか？」"
translation = "「자, 주인님♪ 아~앙♪ ……에헤헤, 어때요? 달콤하고 맛있나요?」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ご主人様の顔を見ていたら、私も何だか嬉しくなっちゃいます♪\u3000もう１口、あ～ん♪」"
translation = "「주인님의 얼굴을 보고 있으니 저도 왠지 기뻐져요♪ 한 입 더, 아~앙♪」"

[[dialogue]]
speaker = "unk"
original = "結局、ショートケーキは最後のイチゴまでフニに食べさせてもらってしまった――"
translation = "결국 쇼트케이크는 마지막 딸기까지 후니가 먹여주게 되었다──"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「その……どうでしたか？\u3000私、上手くご主人様にご奉仕できてましたかっ？」"
translation = "「그…… 어땠나요? 저, 주인님께 봉사를 잘 해드렸나요?」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「あ……えへへ♪\u3000だったら、良かったです♪\u3000それで出来れば……いつもの、頑張ったご褒美を……」"
translation = "「아…… 에헤헤♪ 그렇다면 다행이에요♪ 그래서 가능하다면…… 평소의, 열심히 한 보상을……」"

[[dialogue]]
speaker = "unk"
original = "（フニの頭を優しく撫でる）"
translation = "(후니의 머리를 상냥하게 쓰다듬는다)"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ん……<emoji=heart04>\u3000ご主人様の手、温かくて、優しくて、少しくすぐったくて……でも、安心します……」"
translation = "「응……<emoji=heart04> 주인님의 손, 따뜻하고, 상냥하고, 조금 간지럽지만…… 그래도 안심돼요……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「えへへ、こうして撫でられると私、嬉しくて幸せな気分になっちゃいます……♪」"
translation = "「에헤헤, 이렇게 쓰다듬어지면 저, 기쁘고 행복한 기분이 되어버려요……♪」"

[[dialogue]]
speaker = "unk"
original = "フニの髪って、柔らかくて触り心地がいい"
translation = "후니의 머리카락은 부드러워서 촉감이 좋아."

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「そ、そうですか？\u3000あっ、ご主人様、そこは……」"
translation = "「그, 그런가요? 앗, 주인님, 거기는……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「やんっ<emoji=heart04>\u3000頭の羽は、くすぐったいですよぉ……」"
translation = "「양<emoji=heart04> 머리의 날개는 간지러워요오……」"

[[dialogue]]
speaker = "unk"
original = "ご、ごめん、つい……"
translation = "미, 미안, 나도 모르게……"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「い……嫌ではないんですけど、その、ちょっと敏感で……感じ過ぎちゃうというか……」"
translation = "「시…… 싫지는 않지만, 그게, 좀 민감해서…… 너무 느껴버린달까……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「でも、会長さんが相手なら、私……」"
translation = "「하지만 회장님이 상대라면 저……」"

[[dialogue]]
speaker = "unk"
original = "フニ……"
translation = "후니……"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「んっ<emoji=heart04>\u3000あっ……<emoji=heart04>\u3000会長さん……<emoji=heart04>」"
translation = "「응<emoji=heart04> 앗……<emoji=heart04> 회장님……<emoji=heart04>」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「２人共、ただいま～！\u3000思ってたより早く帰って来れちゃった～……って」"
translation = "「둘 다 다녀왔어~! 생각보다 일찍 돌아올 수 있었…… 어라.」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「あ」"
translation = "「아.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ぴゃあぁぁぁっ！？\u3000リノさん！？」"
translation = "「퍄아아앗!? 리노 씨!?」"

[[dialogue]]
speaker = "unk"
original = "か、母さん。これはその……！"
translation = "어, 엄마. 이건 그게……!"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ふふふっ♪\u3000あらあら。これはこれは……ごゆっくり～♪」"
translation = "「후후후♪ 어머나 어머나. 이거 참…… 천천히 하렴~♪」"

[[dialogue]]
speaker = "unk"
original = "ち、違わないけど、違うんだぁぁぁ！"
translation = "다, 다르지 않지만 다르다고오오!"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「き、今日はその、すみませんでした……」"
translation = "「오, 오늘은 그게, 죄송했습니다……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「私が調子に乗っちゃったから、会長さんに恥をかかせてしまって……」"
translation = "「제가 우쭐해지는 바람에 회장님께 창피를 드려서……」"

[[dialogue]]
speaker = "unk"
original = "いや、俺も下心全開だったし……"
translation = "아니, 나도 흑심 전개였고……"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「え……か、会長さん、私に下心、持ってくれてたんですか……？」"
translation = "「에…… 회, 회장님, 저한테 흑심 품어주신 건가요……?」"

[[dialogue]]
speaker = "unk"
original = "今回のことで気付いたけど……好きだ"
translation = "이번 일로 깨달았는데…… 좋아해."

[[dialogue]]
speaker = "unk"
original = "フニは良い子だし、可愛いし……"
translation = "후니는 착한 아이고, 귀엽고……"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「はわわっ！？\u3000で、でも私、片目の問題もありますし、田舎娘ですし……こんな私でも、良いんですか……？」"
translation = "「하와왓!? 하, 하지만 저, 한쪽 눈 문제도 있고, 시골 처녀이고…… 이런 저라도 괜찮은 건가요……?」"

[[dialogue]]
speaker = "unk"
original = "フニがいいんだ。付き合ってほしい"
translation = "후니가 좋은 거야. 사귀어줬으면 좋겠어."

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「あ……はいっ。私も会長さんのことが、好きです……！\u3000お付き合い、是非よろしくお願いします……！」"
translation = "「아…… 네! 저도 회장님을 좋아해요……! 사귀는 거, 부디 잘 부탁드립니다……!」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「えへへ……♪\u3000会長さんと恋人になれるなんて、何だか夢みたいです……」"
translation = "「에헤헤……♪ 회장님과 연인이 되다니, 왠지 꿈만 같아요……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「でも、恋人同士なら、今度は私の部屋で、気兼ねなくご主人様呼びが出来ちゃいますね……<emoji=heart04>」"
translation = "「하지만 연인 사이라면, 이번엔 제 방에서 마음 놓고 주인님이라고 부를 수 있겠네요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "次にスキンシップした時は、果たして理性を保つことが出来るだろうか……と可愛い恋人を前に、そわそわしてしまうのであった。"
translation = "다음에 스킨십을 할 때는 과연 이성을 유지할 수 있을까…… 하며 귀여운 연인을 앞에 두고 안절부절못하게 되는 것이었다."

