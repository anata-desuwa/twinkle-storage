[[dialogue]]
speaker = "unk"
original = "第４話,最高のペアリング（後編）,P"
translation = "제4화, 최고의 페어링 (후편), P"

[[dialogue]]
speaker = "シャロン"
original = "「お邪魔しますっ。わぁ、会長さまのお家……♪」"
translation = "「실례하겠습니다. 와아, 회장님 댁……♪」"

[[dialogue]]
speaker = "シャロン"
original = "「ではさっそくお菓子の封を開けて……ん～っ<emoji=heart04>\u3000甘くて香ばしい匂いでいっぱいですね♪」"
translation = "「그럼 바로 과자 봉투를 열어서…… 음~っ<emoji=heart04> 달콤하고 고소한 냄새로 가득하네요♪」"

[[dialogue]]
speaker = "シャロン"
original = "「お店にいる時からずっと我慢できなかったんですっ。早速ですけど、おやつの時間にしましょう」"
translation = "「가게에 있을 때부터 계속 참을 수 없었어요. 바로지만, 간식 시간으로 해요.」"

[[dialogue]]
speaker = "シャロン"
original = "「ではお紅茶のためにお湯を沸かして……お菓子はトースターで少し温めましょうか」"
translation = "「그럼 홍차를 위해 물을 끓이고…… 과자는 토스터로 조금 데울까요?」"

[[dialogue]]
speaker = "シャロン"
original = "「カフェで皆さまとワイワイお話ししながらのお茶会も好きですけど……」"
translation = "「카페에서 여러분과 시끌벅적하게 이야기하며 즐기는 찻자리도 좋지만……」"

[[dialogue]]
speaker = "シャロン"
original = "「会長さまとふたりきりのティータイム……準備しているだけでもドキドキして、すごく楽しいですっ<emoji=heart04>」"
translation = "「회장님과 단둘이 보내는 티타임…… 준비하는 것만으로도 두근거려서, 정말 즐거워요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "シャロンがポットに沸いたお湯を注ぐ。茶葉が開くと、ふわりとバラの香りが広がった。"
translation = "샤론이 포트에 끓는 물을 붓는다. 찻잎이 피어나자, 부드럽게 장미 향기가 퍼졌다."

[[dialogue]]
speaker = "unk"
original = "これがシャロンのブレンドティー？"
translation = "이게 샤론의 블렌드 티?"

[[dialogue]]
speaker = "シャロン"
original = "「ふふ、そうです。でもまだ完成じゃないですよ。ここにお砂糖とミルクを入れまして……」"
translation = "「후후, 맞아요. 하지만 아직 완성은 아니랍니다. 여기에 설탕과 우유를 넣어서……」"

[[dialogue]]
speaker = "シャロン"
original = "「できました。ほんのりとバラの香る、あなたの心を癒す甘々ミルクティー……名付けて、マイ・スイートハート・ブレンドですっ、えへへ<emoji=heart04>」"
translation = "「완성됐어요. 은은하게 장미 향이 나는, 당신의 마음을 치유해 줄 달콤달콤 밀크티…… 이름하여, 마이 스위트하트 블렌드예요, 에헤헤<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「会長さまのお茶は、まだ淹れないんですか？」"
translation = "「회장님의 차는, 아직 안 우려내나요?」"

[[dialogue]]
speaker = "unk"
original = "順番、順番"
translation = "순서, 순서"

[[dialogue]]
speaker = "シャロン"
original = "「はぁ……順番ですか……？」"
translation = "「하아…… 순서인가요……?」"

[[dialogue]]
speaker = "シャロン"
original = "「ちなみにこのお紅茶は、サランさまがおっしゃるには、こちらのマカロンと合わせるといいそうで……」"
translation = "「참고로 이 홍차는, 사란 님 말씀으로는 이 마카롱과 곁들이면 좋다고 해서……」"

[[dialogue]]
speaker = "シャロン"
original = "「半分っこしましょうね。はい、会長さま、お口あけてくださーい。あーん♪」"
translation = "「반씩 나눠 먹기로 해요. 자, 회장님, 입 벌려주세요. 아앙~♪」"

[[dialogue]]
speaker = "シャロン"
original = "「どうです？\u3000美味しいですか？」"
translation = "「어때요? 맛있나요?」"

[[dialogue]]
speaker = "unk"
original = "シャロンのあーんで１００倍美味しい"
translation = "샤론이 해주는 아앙 덕분에 100배는 맛있어"

[[dialogue]]
speaker = "シャロン"
original = "「そんなにですか？\u3000でしたら会長さま、私にもあーんしてください<emoji=heart04>」"
translation = "「그 정도인가요? 그렇다면 회장님, 저에게도 아앙 해주세요<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「あーん……♪」"
translation = "「아앙……♪」"

[[dialogue]]
speaker = "シャロン"
original = "「もぐもぐ……ふふ、本当ですね。会長さまにあーんしてもらうと、試食した時よりも格別に美味しいですっ。確かに１００倍美味しいですねっ」"
translation = "「우물우물…… 후후, 정말이네요. 회장님이 아앙 해주니까 시식했을 때보다 각별히 맛있어요. 확실히 100배는 맛있네요」"

[[dialogue]]
speaker = "シャロン"
original = "「お口の中が幸せなうちに、ミルクティーを一口……ずず」"
translation = "「입안이 행복한 동안에 밀크티를 한 모금…… 후루룩」"

[[dialogue]]
speaker = "シャロン"
original = "「んんーーーっ！！？\u3000お口の中にバラが咲きましたっ！？」"
translation = "「음음ーーー!!? 입안에 장미가 피어났어요!?」"

[[dialogue]]
speaker = "unk"
original = "甘みと香りが大爆発！"
translation = "단맛과 향기가 대폭발!"

[[dialogue]]
speaker = "シャロン"
original = "「ふぁぁ……<emoji=heart04>\u3000お花畑でティーパーティーしてるみたいです……美味しすぎて、うっとりしちゃいますっ……<emoji=heart04>」"
translation = "「후아아……<emoji=heart04> 꽃밭에서 티 파티를 하는 것 같아요…… 너무 맛있어서 황홀해져 버려요……<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「さすがはサランさまのオススメです……フードペアリングで美味しさが何倍にもなりました……！」"
translation = "「역시 사란 님의 추천다워요…… 푸드 페어링으로 맛이 몇 배나 좋아졌어요……!」"

[[dialogue]]
speaker = "シャロン"
original = "「では、そろそろ会長さまのブレンドティーを……どのお菓子と合わせるんですか？」"
translation = "「그럼, 슬슬 회장님의 블렌드 티를…… 어떤 과자와 곁들일 건가요?」"

[[dialogue]]
speaker = "unk"
original = "俺が合わせるお菓子はこのカヌレだよ"
translation = "내가 곁들일 과자는 이 카눌레야"

[[dialogue]]
speaker = "シャロン"
original = "「えっ……？\u3000カヌレはあのお店には置いていなかったと思いますけど……その包装は──」"
translation = "「엣……? 카눌레는 그 가게에는 없었던 것 같은데…… 그 포장은──」"

[[dialogue]]
speaker = "シャロン"
original = "「あっ！？\u3000もしかして、私が差し上げたカヌレですか！？\u3000まだ残っていたんですか！？」"
translation = "「앗!? 설마, 제가 드렸던 카눌레인가요!? 아직 남아있었나요!?」"

[[dialogue]]
speaker = "unk"
original = "シャロンからもらったカヌレを、さっき冷蔵庫から取り出して温め直した。"
translation = "샤론에게 받은 카눌레를 조금 전 냉장고에서 꺼내 다시 데웠다."

[[dialogue]]
speaker = "unk"
original = "大事な大事な大本命のバレンタインプレゼントだ。なくなってしまうのがもったいなくて、ちょっとずつゆっくり食べていた。"
translation = "소중하고 소중한 진심 어린 발렌타인 선물이다. 없어져 버리는 게 아까워서 조금씩 천천히 먹고 있었다."

[[dialogue]]
speaker = "シャロン"
original = "「もう、会長さまってば……言ってくれれば、いつでも作りますのに……それと、こちらのブレンドティーは……」"
translation = "「정말, 회장님도 참…… 말해주셨으면 언제든 만들어 드렸을 텐데…… 그리고, 이 블렌드 티는……」"

[[dialogue]]
speaker = "unk"
original = "チョコに合う紅茶だよ"
translation = "초코에 어울리는 홍차야"

[[dialogue]]
speaker = "シャロン"
original = "「優しくて、爽やかないい香り……なんだか会長さまらしいです」"
translation = "「다정하고 상쾌한 좋은 향기…… 왠지 회장님다워요」"

[[dialogue]]
speaker = "シャロン"
original = "「まずはカヌレを……会長さまが食べさせてくださるのですか？\u3000あーんっ……もぐっ♪」"
translation = "「우선 카눌레를…… 회장님이 먹여주시는 건가요? 아앙…… 냠♪」"

[[dialogue]]
speaker = "シャロン"
original = "「会長さまも、あーんしてくらはい♪」"
translation = "「회장님도 아앙 해주세요♪」"

[[dialogue]]
speaker = "シャロン"
original = "「もぐもぐ……自画自賛になってしまいますけど、とても美味しくできましたね。では、会長さまのお紅茶を……ずず……」"
translation = "「우물우물…… 자화자찬이 되어버리지만, 정말 맛있게 됐네요. 그럼, 회장님의 홍차를…… 후루룩……」"

[[dialogue]]
speaker = "unk"
original = "シャロンの手作りカヌレとブレンドティーの相性は抜群だ。カヌレの香ばしさが、紅茶の熱で広がって──"
translation = "샤론의 수제 카눌레와 블렌드 티의 궁합은 발군이다. 카눌레의 고소함이 홍차의 열기로 퍼져나가──"

[[dialogue]]
speaker = "シャロン"
original = "「っ……う、うぅぅっ……ひぅぅ……っ！」"
translation = "「윽…… 우, 우으으…… 히으……!」"

[[dialogue]]
speaker = "unk"
original = "美味しくなかった……！？"
translation = "맛이 없었나……!?"

[[dialogue]]
speaker = "シャロン"
original = "「違います違います！\u3000ごめんなさいっ、この涙は、その、嬉し泣きなんです。勝手に涙が出てきちゃっただけで……！」"
translation = "「아니에요 아니에요! 죄송해요, 이 눈물은, 그, 기뻐서 나오는 눈물이에요. 멋대로 눈물이 나와버린 것뿐이라……!」"

[[dialogue]]
speaker = "シャロン"
original = "「とっても……とっても美味しくって、最高の組み合わせで……！」"
translation = "「너무나도…… 너무나도 맛있어서, 최고의 조합이라서……!」"

[[dialogue]]
speaker = "シャロン"
original = "「私のお菓子との相性を一番に考えてくれたのが、とっても、とっても嬉しくって……」"
translation = "「제 과자와의 궁합을 제일 먼저 생각해 주신 게 너무나도, 너무나도 기뻐서……」"

[[dialogue]]
speaker = "シャロン"
original = "「会長さまが恋人で、私、今すっごく幸せなんです。ますます、あなたを好きになってしまいました……<emoji=heart04>」"
translation = "「회장님이 연인이라서, 저 지금 너무나 행복해요. 점점 더 당신을 좋아하게 되어버렸어요……<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「また作りますから、また一緒に食べましょうね。あなたのブレンドティーも添えて」"
translation = "「또 만들 테니까, 또 같이 먹어요. 당신의 블렌드 티도 곁들여서」"

[[dialogue]]
speaker = "シャロン"
original = "「大好きです……愛してます、会長さま……ちゅっ<emoji=heart04>」"
translation = "「정말 좋아해요…… 사랑해요, 회장님…… 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "シャロンと重ねた唇から、チョコレートと紅茶の香りが漂う。"
translation = "샤론과 겹친 입술에서 초콜릿과 홍차의 향기가 감돈다."

[[dialogue]]
speaker = "unk"
original = "どんなスイーツよりも甘くて、幸せだった。"
translation = "어떤 디저트보다도 달콤하고 행복했다."

