[[dialogue]]
speaker = "unk"
original = "第３話,傭兵はお金好き,P"
translation = "제3화, 용병은 돈을 좋아해"

[[dialogue]]
speaker = "unk"
original = "セナリィと出会ってから数か月。俺は公安委員会の任務以外でも、彼女と行動することが多くなっていた――"
translation = "세나리와 만난 지 수개월. 나는 공안위원회의 임무 외에도 그녀와 행동하는 일이 많아졌다――"

[[dialogue]]
speaker = "紅明"
original = "「いや～、猫の手ならぬ悪の手、めっちゃ助かったよ～。ホルスタミンの偽物売ってる元締め、見つけ出すのに凄い苦労してたからさ」"
translation = "「이야~ 고양이 손이라도 빌리고 싶은, 아니 악의 손, 진짜 도움 됐어~. 홀스타민 가짜 파는 주동자 찾아내는 데 엄청 고생하고 있었거든.」"

[[dialogue]]
speaker = "セナリィ"
original = "「いえいえ、報酬に見合う働きをさせて頂いただけですわ。もし今後も困り事がございましたら、是非ご贔屓に……」"
translation = "「아니요, 보수에 걸맞은 일을 했을 뿐이에요. 혹시 앞으로도 곤란한 일이 생기면 부디 애용해 주시길……」"

[[dialogue]]
speaker = "紅明"
original = "「うん、秘密結社ゴールデングース、覚えておくよ。それで報酬だけど……はいこれ、小切手ね！」"
translation = "「응, 비밀 결사 골든 구스, 기억해 둘게. 그래서 보수인데…… 자 여기, 수표야!」"

[[dialogue]]
speaker = "セナリィ"
original = "「拝見させて頂きますわ。……え！？\u3000こ、これは！？」"
translation = "「확인해 보겠습니다. ……어!? 이, 이것은!?」"

[[dialogue]]
speaker = "紅明"
original = "「今回の件、アタシはもちろん、善哉乳業の取締役……アタシのお母さんも凄く感謝しててさ。金額に色付けてくれって言われたんだ」"
translation = "「이번 건, 나뿐만 아니라 젠자이 유업의 이사…… 우리 엄마도 엄청 감사해하고 있어서 말이야. 금액 좀 얹어주라고 하더라고.」"

[[dialogue]]
speaker = "セナリィ"
original = "「提示額の倍！？\u3000思わぬサプライズですわぁ～～～っ！？」"
translation = "「제시액의 두 배!? 생각지도 못한 서프라이즈예요～～～!?」"

[[dialogue]]
speaker = "セナリィ"
original = "「ふっ、ふふっ……！\u3000１度にこれだけの大金……今夜は缶コーヒー片手に札束鑑賞会ですわ♪」"
translation = "「훗, 후후……! 한 번에 이 정도의 거금…… 오늘 밤은 캔 커피 한 손에 들고 돈다발 감상회예요♪」"

[[dialogue]]
speaker = "unk"
original = "札束鑑賞会って何！？"
translation = "돈다발 감상회는 뭐야!?"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「にひひ♪\u3000セナリィはお金に目がないからね～」"
translation = "「니히히♪ 세나리는 돈에 사족을 못 쓰니까 말이야~」"

[[dialogue]]
speaker = "紅明"
original = "「そうなんだ！\u3000本当にやってるトコ想像したら、ちょっとウケる☆」"
translation = "「그렇구나! 진짜로 하고 있는 모습 상상하니까 좀 웃긴데☆」"

[[dialogue]]
speaker = "セナリィ"
original = "「はっ……！\u3000ひょっとして、これを元手にギャンブルをすれば、１週間くらいで１００倍にすることも可能なのでは……？」"
translation = "「핫……! 혹시 이걸 밑천으로 도박을 하면 일주일 만에 100배로 불리는 것도 가능한 거 아닐까요……?」"

[[dialogue]]
speaker = "unk"
original = "マイン、止めなくていいのか！？"
translation = "마인, 안 말려도 되는 거야!?"

[[dialogue]]
speaker = "unk"
original = "絶対に失敗するやつ！"
translation = "절대로 실패할 패턴이야!"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ん？\u3000公安委員会としてってこと？\u3000まあ、上が何も言って来ない限りは、私にとっては業務外かな～」"
translation = "「응? 공안위원회로서 말이야? 뭐, 위에서 아무 말 없는 이상 나한테는 업무 외적인 일이라서~」"

[[dialogue]]
speaker = "セナリィ"
original = "「１００倍ともなれば、夢だった札束ベッドが実現出来ますわ♪\u3000ああ、それで眠ったら、一体どんなに幸福な気分を味わえるのか……ふふ、ふふふ……♪」"
translation = "「100배나 된다면 꿈이었던 돈다발 침대가 실현 가능해요♪ 아아, 거기서 잠들면 대체 얼마나 행복한 기분을 맛볼 수 있을지…… 후후, 후후후……♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「そうそう、会長の人脈が加わったことで、ゴールデングースも順調に依頼が増えて来てるわけだし。ここで１つ、ドカンと賭けるのも悪くないんじゃない？」"
translation = "「그래그래, 회장의 인맥이 가세하면서 골든 구스도 순조롭게 의뢰가 늘고 있잖아. 여기서 한 번 크게 걸어보는 것도 나쁘지 않지 않아?」"

[[dialogue]]
speaker = "セナリィ"
original = "「そうですわよね！\u3000何より、悪即善……リスクを背負わないことには、大きな儲けは得られませんもの。今度こそ勝ってみせますわ！」"
translation = "「그렇죠! 무엇보다 악즉선…… 리스크를 짊어지지 않고서는 큰 이득을 얻을 수 없으니까요. 이번에야말로 이겨 보이겠어요!」"

[[dialogue]]
speaker = "unk"
original = "紅明からも何とか言ってやってくれ！"
translation = "코우메이도 어떻게 좀 말해줘!"

[[dialogue]]
speaker = "unk"
original = "それっていつも負けてるってことだよね！？"
translation = "그거 항상 지고 있다는 소리잖아!?"

[[dialogue]]
speaker = "紅明"
original = "「ん～、そうだな～……セナっち、アタシとしては、仕事に集中する方が結果的にお金は増えると思うぜ？」"
translation = "「음~ 그렇네~…… 세나치, 나로서는 일에 집중하는 게 결과적으로 돈은 더 늘어날 거라고 생각한다구?」"

[[dialogue]]
speaker = "紅明"
original = "「別にギャンブルは否定しないさ。ただ、それって息抜きにするもので、負けても笑える範囲でやるべきっしょ」"
translation = "「딱히 도박을 부정하는 건 아니야. 다만 그건 기분 전환으로 하는 거고, 져도 웃어넘길 수 있는 범위에서 해야 한다구.」"

[[dialogue]]
speaker = "紅明"
original = "「宝くじと同じで、ラッキーを楽しむ為にやるのであって、大金を稼ぐ為にギャンブルをするのは違うんと思うんだよね」"
translation = "「복권이랑 똑같이 운을 즐기기 위해 하는 거지, 큰돈을 벌기 위해 도박을 하는 건 아니라고 생각하거든.」"

[[dialogue]]
speaker = "セナリィ"
original = "「た、確かに、宝くじには全額つぎ込んだりしませんわね……。それに、本物のお金持ちである紅明様が仰るなら……」"
translation = "「하, 확실히 복권에 전액을 쏟아붓거나 하지는 않죠……. 게다가 진짜 부자인 코우메이 님이 말씀하신다면……」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「別に負けてもいいじゃん？」"
translation = "「별로 져도 상관없잖아?」"

[[dialogue]]
speaker = "セナリィ"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「紅明先輩が言ったように、楽しめばいいんじゃない？\u3000大金賭けたギャンブルをさ」"
translation = "「코우메이 선배가 말한 것처럼 즐기면 되잖아? 거금을 건 도박을 말이야.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「戦場じゃないし、負けて命を失うわけでも無し。そう考えればローリスクハイリターン……当たれば１００倍、ガッポガッポの大儲け♪」"
translation = "「전장도 아니고, 져서 목숨을 잃는 것도 아니잖아. 그렇게 생각하면 로우 리스크 하이 리턴…… 맞으면 100배, 돈벼락을 맞는 거지♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「こんな楽しいことはそう無いと思うよ～？\u3000それにたまには、頑張った自分へのご褒美があっても、私はいいんじゃないかと思うな～」"
translation = "「이렇게 즐거운 일은 별로 없을걸~? 그리고 가끔은 열심히 한 자신에게 주는 포상이 있어도 난 괜찮다고 생각해~」"

[[dialogue]]
speaker = "セナリィ"
original = "「ごくり……そ、そうですわ。命を賭ける戦場に比べれば、ギャンブル場はまるで天国……！\u3000楽しいに決まってますわ……！」"
translation = "「꿀꺽…… 그, 그래요. 목숨을 거는 전장에 비하면 도박장은 그야말로 천국……! 즐거울 게 뻔해요……!」"

[[dialogue]]
speaker = "紅明"
original = "「確かに楽しむのは大事っしょ！\u3000つーか、あれだ！\u3000マイマイの話聞いてたら、昔を思い出して、アタシもギャンブルに行ってみたくなって来たし☆」"
translation = "「확실히 즐기는 건 중요하다구! 아니, 그거다! 마이마이 이야기 듣다 보니까 옛날 생각나서 나도 도박하러 가보고 싶어졌다구☆」"

[[dialogue]]
speaker = "unk"
original = "ちょっ、紅明さん！？"
translation = "잠깐, 코우메이 씨!?"

[[dialogue]]
speaker = "紅明"
original = "「こう見えて、私も昔は悪童と呼ばれていた時期があって、悟空と賭場で遊んだことも……とにかく！\u3000セナっちが行くなら、アタシも久しぶりにパーッと遊ぶっしょ☆」"
translation = "「이래 봬도 나도 옛날엔 악동이라 불리던 시기가 있어서 오공이랑 도박장에서 놀기도…… 아무튼! 세나치가 간다면 나도 오랜만에 팍팍 놀아보자구☆」"

[[dialogue]]
speaker = "セナリィ"
original = "「紅明様がそう仰るなら、喜んでご案内致しますわ！\u3000ふふふっ、大金ゲットして見せますわよ～っ！」"
translation = "「코우메이 님이 그렇게 말씀하신다면 기꺼이 안내해 드리죠! 후후후, 거금을 획득해 보이겠어요~!」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「にひひ♪\u3000そう来なくっちゃ、セナリィじゃないよね！\u3000私も行く～♪」"
translation = "「니히히♪ 그래야 세나리지! 나도 갈래~♪」"

[[dialogue]]
speaker = "unk"
original = "３人共、戻って来ーい！"
translation = "세 사람 다 돌아와-!"

[[dialogue]]
speaker = "unk"
original = "いや、アカンて！"
translation = "아니, 안 된다니까!"

[[dialogue]]
speaker = "unk"
original = "そうして、セナリィは大金を賭けたギャンブルに挑んだ――"
translation = "그렇게 세나리는 거금을 건 도박에 도전했다――"

[[dialogue]]
speaker = "セナリィ"
original = "「来た来た来た、来ましたわ！\u3000ここで全額倍プッシュですわ！\u3000これに勝てば、本当に１００倍！\u3000札束ベッドでグッドナイトですわ！」"
translation = "「왔다 왔다 왔다, 왔어요! 여기서 전액 더블 업이에요! 여기서 이기면 정말로 100배! 돈다발 침대에서 굿나잇이에요!」"

[[dialogue]]
speaker = "セナリィ"
original = "「ふふふっ、星騎士の私の動体視力を持ってすれば、スロットの目押しなど、何てことないですわ！\u3000さあさあ、行きますわよ……ここですわ！\u3000止まりなさい、トリプルセブン！」"
translation = "「후후후, 별의 기사인 저의 동체 시력을 가지고 있다면 슬롯 눈 맞추기 정도는 아무것도 아니에요! 자자, 갑니다…… 여기예요! 멈추세요, 트리플 세븐!」"

[[dialogue]]
speaker = "セナリィ"
original = "「勝った……！\u3000ん……？\u3000待ちなさい、何ですの、このモードは！？\u3000ボタン押してからの謎モードチェンジは卑怯じゃないですの！？」"
translation = "「이겼다……! 응……? 기다려보세요, 뭐예요 이 모드는!? 버튼 누르고 나서 수수께끼의 모드 체인지는 비겁하잖아요!」"

[[dialogue]]
speaker = "セナリィ"
original = "「ちょっ……ダメダメダメ！\u3000そこで止まったら、マジでキレますわよ！\u3000あっ！\u3000ああっ！？\u3000あああぁぁぁ～～～～～～っ！！！」"
translation = "「잠깐…… 안 돼 안 돼 안 돼! 거기서 멈추면 진짜 화낼 거예요! 앗! 아앗!? 아아아아아～～～～!」"

[[dialogue]]
speaker = "セナリィ"
original = "「はっ……！？\u3000何だ、夢か……５０倍まで稼いだ大金を一瞬で溶かしたかと思って、焦りましたわ……」"
translation = "「핫……!? 뭐야, 꿈인가…… 50배까지 벌었던 거금을 한순간에 날린 줄 알고 식겁했네요……」"

[[dialogue]]
speaker = "unk"
original = "いえ、現実です"
translation = "아니요, 현실입니다"

[[dialogue]]
speaker = "セナリィ"
original = "「ホワイ！？」"
translation = "「와이!?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「いや～、今日は楽しかったけど、残念だったね～、にひひ♪」"
translation = "「이야~ 오늘은 즐거웠지만 아쉬웠네~, 니히히♪」"

[[dialogue]]
speaker = "セナリィ"
original = "「ど――」"
translation = "「어――」"

[[dialogue]]
speaker = "セナリィ"
original = "「どうしてこうなるんですのぉぉぉ～～～～～～っ！？」"
translation = "「어째서 이렇게 되는 거예요～～～～～～!」"

[[dialogue]]
speaker = "紅明"
original = "「まあまあ、セナっち、元気出して！\u3000代わりに、今夜はアタシが焼肉奢るっしょ！\u3000ウェ～イ☆」"
translation = "「자자, 세나치, 기운 내! 대신 오늘 밤엔 내가 소고기 쏠게! 웨~이☆」"

[[dialogue]]
speaker = "unk"
original = "ちゃっかり１人勝ちしてたしね"
translation = "혼자서 쏠쏠하게 땄으니까 말이야"

[[dialogue]]
speaker = "セナリィ"
original = "「キーッ、羨ましくて悔しいですわぁぁぁ～～～っ！」"
translation = "「키익, 부러워서 분해요～～～!」"

[[dialogue]]
speaker = "紅明"
original = "「あはははっ！\u3000妬むな妬むな！\u3000まあ今度、新しい依頼も紹介するから！」"
translation = "「아하하하! 질투하지 마 질투하지 마! 뭐 다음에 새로운 의뢰도 소개해 줄 테니까!」"

[[dialogue]]
speaker = "unk"
original = "散財はしたものの、意外と気が合ったのか、いつの間にか紅明と仲良くなったセナリィなのだった。"
translation = "돈은 탕진했지만, 의외로 마음이 맞았는지 어느새 코우메이와 친해진 세나리였다."

