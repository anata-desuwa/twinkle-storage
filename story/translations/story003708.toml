[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "（イングリットとは、武闘都市ウリルの近くの平原で出会った。その時はヴァレリーも一緒だった）"
translation = "(잉그리드와는 무투 도시 우릴 근처의 평원에서 만났다. 그때는 발레리도 함께였다)"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "（イザベラさんの魔法で感知したところによると、イングリットは星力も持たずにモンスターと戦い、致命傷を負ってコラプサーの力に目覚めた）"
translation = "(이자벨라 씨의 마법으로 감지한 바에 따르면, 잉그리드는 성력도 없이 몬스터와 싸우다 치명상을 입고 콜랩서의 힘에 눈을 떴다)"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "（そのままモンスターを全滅させたイングリットは、ウリルの戦士もみんな倒して、あてもなく彷徨っていて……）"
translation = "(그대로 몬스터를 전멸시킨 잉그리드는 우릴의 전사들도 모두 쓰러뜨리고 정처 없이 방황하고 있었고……)"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "（初めて見たイングリットはボロボロで、幽霊みたいだった。でもあの鋭い眼光は、よく覚えてる）"
translation = "(처음 본 잉그리드는 엉망진창이었고 유령 같았다. 하지만 그 날카로운 눈빛은 생생히 기억나)"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「あなたがイングリットさんですね。私は……」"
translation = "「당신이 잉그리드 씨군요. 저는……」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「斬る」"
translation = "「벤다」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「なに、今の！？\u3000いきなり斬りかかられた！？」"
translation = "「뭐야, 방금!? 갑자기 베려고 했어!?」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「レイラ、無事ですか！？」"
translation = "「레이라, 무사합니까!?」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「大丈夫！\u3000ヴァレリーは危ないから下がってて！」"
translation = "「괜찮아! 발레리는 위험하니까 물러나 있어!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「私は百目騎レイラ！\u3000ブラックホールと契約する星騎士コラプサーの首領です！\u3000敵ではありません！」"
translation = "「저는 도우메키 레이라! 블랙홀과 계약하는 성기사 콜랩서의 수령입니다! 적이 아니에요!」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「……星騎士と言ったな？」"
translation = "「……성기사라고 했나?」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「ハハハハ！\u3000私は運がいい！\u3000これほど早く星騎士と戦う機会に巡り合えるとはな！」"
translation = "「하하하하! 운이 좋구나! 이토록 빨리 성기사와 싸울 기회를 얻게 될 줄이야!」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「ちょうどいい。モンスターやウリルの出涸らしどもでは退屈していたところだ」"
translation = "「마침 잘됐다. 몬스터나 우릴의 찌꺼기 놈들에게는 지루해하던 참이었다」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「私と──」"
translation = "「나와──」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「戦え！！」"
translation = "「싸워라!!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「くっ……！」"
translation = "「큭……!」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「そらそら、逃げ回ってばかりでは勝てんぞ！\u3000得意の星術とやらを見せてみろ！」"
translation = "「어이 어이, 도망만 다녀서는 이길 수 없다고! 특기인 성술이라는 걸 보여줘 봐라!」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「錯乱しているようですね。戦って無力化するしかありません」"
translation = "「착란 상태인 것 같군요. 싸워서 무력화시킬 수밖에 없습니다」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「無力化って言われてもブラックホールは手加減できないよ！\u3000ヴァレリーも手伝って！」"
translation = "「무력화라고 해도 블랙홀은 힘 조절이 안 된다고! 발레리도 좀 도와줘!」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「回復星術を持つ私まで斬られては共倒れです。私はここで観てますから頑張ってください」"
translation = "「회복 성술을 가진 저까지 베였다간 공멸입니다. 저는 여기서 구경할 테니 힘내세요」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「えー！\u3000私が斬られるとこ見たいだけでしょー！」"
translation = "「에─! 내가 베이는 걸 보고 싶을 뿐이잖아─!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「ちくせうちくせう、どうしてこんなことに……とりあえず地面にエルゴフォースブラスター！」"
translation = "「제기랄 제기랄, 어째서 이렇게 된 거야…… 우선 지면에 에르고 포스 블래스터!」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「くっ……！？\u3000何だ、今の黒い塊は？\u3000大地が消えただと！？」"
translation = "「큭……!? 뭐야, 방금 그 검은 덩어리는? 대지가 사라졌다고!?」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「今のは警告です。私は星術でブラックホールを生み出すことができます。だからこれ以上の戦闘は……」"
translation = "「방금 건 경고입니다. 저는 성술로 블랙홀을 만들어낼 수 있어요. 그러니 이 이상의 전투는……」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「ぶらっくほーる？\u3000なんだそれは？」"
translation = "「블랙홀? 그게 뭐지?」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「え？\u3000……ええと、ブラックホールというのは、何でも吸い込む穴のようなものと思われていますが、実際には星が生命活動を終え、自らの質量によって──」"
translation = "「에? ……어 그러니까, 블랙홀이란 건 무엇이든 빨아들이는 구멍 같은 것으로 여겨지지만, 실제로는 별이 생명 활동을 마치고 자신의 질량에 의해──」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「ごちゃごちゃうるさい！」"
translation = "「이러쿵저러쿵 시끄럽다!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「うっそ！\u3000自分から聞いてきたのに！？\u3000ダメ、全く話が通じないっ！」"
translation = "「거짓말! 본인이 물어봐 놓고!? 안 돼, 말이 전혀 안 통해!」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「本気で戦う気がないのか？\u3000ならその気にさせてやる。──ドゥーム・エクスキューション！」"
translation = "「진심으로 싸울 생각이 없는 거냐? 그렇다면 그럴 마음이 들게 해주지. ──둠 익스큐션!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「くっ、本当に本気だ……！\u3000でもヴァレリーは当てにならないし……ここで死ぬわけにもいかない……！」"
translation = "「큭, 정말 진심이야……! 하지만 발레리는 의지가 안 되고…… 여기서 죽을 수는 없어……!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「それならこっちも──デッドエンド・コラプサァーッ！！」"
translation = "「그렇다면 이쪽도── 데드 엔드 콜랩서어어엇!!」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「ぐわああぁっ！！」"
translation = "「구와아아악!!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "（私のブラックホールは吸い込んだものを圧縮、消滅させる。モンスターも、魔獣も、そしておそらく星騎士も。星力の護りもコラプサーの力で無力化されてしまう）"
translation = "(나의 블랙홀은 빨아들인 것을 압축하고 소멸시킨다. 몬스터도, 마수도, 그리고 아마 성기사도. 성력의 가호도 콜랩서의 힘으로 무력화되어 버려)"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "（でも、コラプサー同士なら多少の耐性がある。ソースは私。練習中に自爆してイザベラさんに爆笑されたことあるし！）"
translation = "(하지만 콜랩서끼리는 어느 정도 내성이 있어. 소스는 나. 연습 중에 자폭해서 이자벨라 씨한테 폭소당한 적도 있으니까!)"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "（一瞬。一瞬だけ当てることができれば……）"
translation = "(순간. 아주 잠깐만 맞출 수 있다면……)"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「…………きゅう」"
translation = "「…………끼유」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「よかった。生きてる……」"
translation = "「다행이다. 살아있어……」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「……すー」"
translation = "「……드르렁」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「本当に変わらないね、あなたは……」"
translation = "「정말 변하질 않네, 당신은……」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「変わらないでいてくれてよかった。あなたは知らないだろうけど、私はあなたに憧れているんだよ」"
translation = "「변하지 않아 줘서 다행이야. 당신은 모르겠지만, 나는 당신을 동경하고 있거든」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「お父様もお母様も亡くなって、会社も奪われて、星騎士にもなれなくて……全てを諦めて、投げ出して、私はコラプサーになった。でもあなたは違う」"
translation = "「아버님도 어머님도 돌아가시고, 회사도 빼앗기고, 성기사도 되지 못하고…… 모든 것을 포기하고 내팽개치고 나는 콜랩서가 되었어. 하지만 당신은 달라」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「あなたは星騎士になれなくても、自分を信じて、戦って力を得た。どんなに無謀で愚かでも、それが私には眩しいんだ」"
translation = "「당신은 성기사가 되지 못해도 자신을 믿고 싸워서 힘을 얻었어. 아무리 무모하고 어리석어도 그것이 나에게는 눈부셔」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「だからこれからもよろしくね、イングリット」"
translation = "「그러니까 앞으로도 잘 부탁해, 잉그리드」"

