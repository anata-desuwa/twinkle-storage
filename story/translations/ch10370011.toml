[[dialogue]]
speaker = "unk"
original = "第１話,ふわふわ美食ガール,P"
translation = "제1화, 폭신폭신 미식 걸"

[[dialogue]]
speaker = "unk"
original = "ある日の昼休み、カフェテリアに昼食をとりに行くと、何やら困っている様子の女の子と出会った。"
translation = "어느 날 점심시간, 카페테리아에 점심을 먹으러 가니 웬일인지 곤란해 보이는 여자아이와 만났다."

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「う～ん、どうしよ～。やっぱり１度、教室に戻らないとダメかなぁ～？」"
translation = "「으음, 어떡하지~. 역시 한 번 교실에 돌아가지 않으면 안 되려나~?」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「あぅ～……お腹減ったよぉ……」"
translation = "「아우~…… 배고파아……」"

[[dialogue]]
speaker = "unk"
original = "どうしたんだ？"
translation = "무슨 일이야?"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ぽよ？\u3000あっ、星徒会長さんだぁ～。こんにちは～」"
translation = "「뽀요? 앗, 성도회장님이다~. 안녕하세요~」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「……うん、実は困ってて～。サラン、お昼ご飯を食べに来たんだけど、実は教室にお財布を忘れて来ちゃって」"
translation = "「……응, 사실 곤란해서~. 사란, 점심 먹으러 왔는데 사실 교실에 지갑을 두고 와버렸어.」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「でも、誰かに借りるのも悪いかな～って思っちゃって……」"
translation = "「하지만 누군가에게 빌리는 것도 미안할까 싶어서……」"

[[dialogue]]
speaker = "unk"
original = "だったら、俺が貸すよ"
translation = "그렇다면 내가 빌려줄게."

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「会長さんが？\u3000いいの？」"
translation = "「회장님이? 그래도 돼?」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「わぁ～、ありがと～♪\u3000ねぇ、せっかくだし、一緒にお昼食べない？」"
translation = "「와아~, 고마워~♪ 저기, 이왕 이렇게 된 거 같이 점심 먹지 않을래?」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「これまでお話したことなかったよね？\u3000サラン、会長さんと仲良くなりたいな～♪」"
translation = "「지금까지 이야기해 본 적 없었지? 사란, 회장님이랑 친해지고 싶어~♪」"

[[dialogue]]
speaker = "unk"
original = "何かの縁だし、ご一緒させて貰おうかな"
translation = "무슨 인연인 것 같으니 함께하도록 할까."

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「わ～い、楽しいお昼ご飯になりそう♪\u3000それじゃあ一緒に注文しに行こ～」"
translation = "「와~이, 즐거운 점심시간이 될 것 같아♪ 그럼 같이 주문하러 가자~」"

[[dialogue]]
speaker = "unk"
original = "注文後、テーブルに着いて料理を待つ間、俺は彼女に自己紹介する。"
translation = "주문 후 테이블에 앉아 요리를 기다리는 동안 나는 그녀에게 자기소개를 한다."

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「うん、キミのことは御前試合を見ていたから知ってるよ～。あの時は格好よかったなぁ～♪」"
translation = "「응, 너에 대해서는 어전 시합을 보고 있어서 알고 있어~. 그때 멋있었지~♪」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「今度はサランが自己紹介するね。名前は、桜十路サランっていうの～」"
translation = "「이번엔 사란이 자기소개할게. 이름은 아사히나 사란이라고 해~」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「新星学園の２年生で、プリマステラをやっているんだぁ～。よろしくね～♪」"
translation = "「신성학원 2학년이고 프리마스텔라를 하고 있어~. 잘 부탁해~♪」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ねぇねぇ、キミのこと、『会長ちゃん』って呼んでもいいかなぁ？\u3000友達としてのあだ名、みたいな～」"
translation = "「저기저기, 너를 『회장짱』이라고 불러도 될까? 친구로서의 별명 같은 거 말이야~」"

[[dialogue]]
speaker = "unk"
original = "ちょっと恥ずかしいけど……"
translation = "조금 부끄럽지만……"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「え～、そんなことないよ～。サランは、可愛いと思うけどな～」"
translation = "「에~, 그렇지 않아~. 사란은, 귀엽다고 생각하는데~」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「……呼んでもいいの？\u3000わ～い、これから仲良くしようね、会長ちゃん♪」"
translation = "「……불러도 돼? 와~이, 앞으로 사이좋게 지내자, 회장짱♪」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「あっ、店員さんが呼んでるよ～。料理が出来たみたい～」"
translation = "「앗, 점원분이 부르고 있어~. 요리가 다 된 모양이야~」"

[[dialogue]]
speaker = "unk"
original = "それから２人で料理をとって来ると――"
translation = "그러고 나서 둘이서 요리를 가져오자――"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「それじゃあ、手を合わせて……いただきま～す♪\u3000今日の日替わりメニュー、美味しそ～♪」"
translation = "「그럼, 손을 모으고…… 잘 먹겠습니다~♪ 오늘의 데일리 메뉴, 맛있어 보여~♪」"

[[dialogue]]
speaker = "unk"
original = "り、量多くないか……？"
translation = "야, 양이 너무 많지 않아……?"

[[dialogue]]
speaker = "unk"
original = "サランの前には、日替わりメニューだけでなく、他の定食などが軽く４～５人分は並んでいた。"
translation = "사란의 앞에는 데일리 메뉴뿐만 아니라, 다른 정식 등이 가볍게 4~5인분은 늘어서 있었다."

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ぽよ？\u3000そうかな～？\u3000サランはいつもこれくらい食べるよ？」"
translation = "「뽀요? 그런가~? 사란은 언제나 이 정도는 먹어?」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「あ～ん、もぐもぐ……ん～！\u3000美味しい～♪」"
translation = "「아~앙, 우물우물…… 음~! 맛있어~♪」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「幸せで、ふわふわ～♪」"
translation = "「행복해서, 폭신폭신해~♪」"

[[dialogue]]
speaker = "unk"
original = "（こっちまで幸せな気持ちになって来る笑顔だ）"
translation = "(이쪽까지 행복한 기분이 들게 하는 미소다)"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ふわぁ、ごちそうさま～♪」"
translation = "「후아, 잘 먹었습니다~♪」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「今日のお昼ご飯も、凄く美味しかった～♪」"
translation = "「오늘 점심밥도, 정말 맛있었어~♪」"

[[dialogue]]
speaker = "unk"
original = "本当に全部残さず食べるなんて……！"
translation = "정말로 전부 남기지 않고 먹다니……!"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「えへへ、お腹もいっぱいで、ふわふわする～♪」"
translation = "「에헤헤, 배도 부르고, 기분이 둥실둥실해~♪」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「いえ～い、気分良いのでサラン歌っちゃいま～す♪\u3000ふわふわ、ぷくぷく、らんららん♪」"
translation = "「이예~이, 기분이 좋으니까 사란 노래 부를게요~♪ 폭신폭신, 뭉게뭉게, 랄라란♪」"

[[dialogue]]
speaker = "unk"
original = "どうしたいきなり！？"
translation = "갑자기 왜 이래!?"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ん～？\u3000サラン、別に酔ってらいよ～？」"
translation = "「으~음? 사란, 딱히 취하지 않았어~?」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ほら～？\u3000お酒臭くなんからいでしょ～？」"
translation = "「봐봐~? 술 냄새 같은 거 안 나잖아~?」"

[[dialogue]]
speaker = "unk"
original = "いや、呂律回ってないし！"
translation = "아니, 발음 꼬였거든!"

[[dialogue]]
speaker_original = "心配性の女生徒"
speaker_translation = "걱정 많은 여학생"
original = "「ねぇ、ちょっと見てよ。あれ、星徒会長じゃない？」"
translation = "「저기, 좀 봐봐. 저거, 성도회장 아니야?」"

[[dialogue]]
speaker_original = "噂好きの女生徒"
speaker_translation = "소문 좋아하는 여학생"
original = "「なんか星徒会長が、昼間から女子生徒を泥酔させてるらしいよ……！」"
translation = "「왠지 성도회장이, 대낮부터 여학생을 만취시킨 모양이야……!」"

[[dialogue]]
speaker = "unk"
original = "ちょっ！？\u3000俺は何もやってなーい！"
translation = "잠깐!? 난 아무것도 안 했어-!"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「えへへ～、ふわふわ～♪」"
translation = "「에헤헤~, 둥실둥실해~♪」"

[[dialogue]]
speaker = "unk"
original = "こうしてまた１人、個性的な女の子と知り合うこととなったのだった。"
translation = "이렇게 또 한 명, 개성적인 여자아이와 알게 된 것이었다."

