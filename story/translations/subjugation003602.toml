[[dialogue]]
speaker = "unk"
original = "イレーナもウェディングフォームが発現し、他の戦闘服に変身できなくなったらしい。"
translation = "이레이나도 웨딩 폼이 발현되어 다른 전투복으로 변신할 수 없게 된 모양이다."

[[dialogue]]
speaker = "unk"
original = "この状態を解除するには、結婚式を挙げる必要があるのだが──"
translation = "이 상태를 해제하려면 결혼식을 올릴 필요가 있는데──"

[[dialogue]]
speaker = "イレーナ"
original = "「言っておくけど、別にあんたと結婚したいってわけじゃないから！」"
translation = "「말해두겠는데, 딱히 너랑 결혼하고 싶다는 뜻은 아니니까!」"

[[dialogue]]
speaker = "イレーナ"
original = "「でもあんたなら事情も知ってるし、何度か式を挙げてて慣れてるだろうし……あたしが知ってる男の中じゃあんたが一番マシだから……」"
translation = "「하지만 너라면 사정도 알고 있고, 몇 번이나 식을 올려봐서 익숙할 테고…… 내가 아는 남자 중에서는 네가 제일 나으니까……」"

[[dialogue]]
speaker = "イレーナ"
original = "「と、とにかく協力しなさいっ！！」"
translation = "「아, 아무튼 협력하라구!!」"

[[dialogue]]
speaker = "unk"
original = "わかった、協力するよ"
translation = "알았어, 협력할게."

[[dialogue]]
speaker = "イレーナ"
original = "「当然よ。元を辿ればあんたのせいみたいなもんだし」"
translation = "「당연하지. 거슬러 올라가면 네 탓이나 마찬가지니까.」"

[[dialogue]]
speaker = "イレーナ"
original = "「ひとまず新郎は確保したわ。だけど問題は──」"
translation = "「일단 신랑은 확보했어. 하지만 문제는──」"

[[dialogue]]
speaker = "シャロン"
original = "「イレーナさま！\u3000そのお姿は！！」"
translation = "「이레이나 님! 그 모습은!!」"

[[dialogue]]
speaker = "イレーナ"
original = "「げ……」"
translation = "「게헥……」"

[[dialogue]]
speaker = "シャロン"
original = "「お、お美しいです、イレーナさま……」"
translation = "「오, 아름다우세요, 이레이나 님……」"

[[dialogue]]
speaker = "シャロン"
original = "「お相手はどなたですか？\u3000って聞くまでもありませんね、会長さま！」"
translation = "「상대는 누구신가요? ……라고 물어볼 필요도 없겠네요, 회장님!」"

[[dialogue]]
speaker = "unk"
original = "あ……ええと……"
translation = "아…… 에구구……"

[[dialogue]]
speaker = "シャロン"
original = "「式はいつですか？\u3000私も絶対に参列します！」"
translation = "「결혼식은 언제인가요? 저도 절대로 참설할게요!」"

[[dialogue]]
speaker = "シャロン"
original = "「あぁ、イレーナさまと会長さまが結婚なさったら……きっと素敵なご家庭を築かれることでしょう！」"
translation = "「아아, 이레이나 님과 회장님이 결혼하신다면…… 분명 멋진 가정을 꾸리시겠죠!」"

[[dialogue]]
speaker = "シャロン"
original = "「２人のお子様なら聡明でお可愛らしい子がお生まれになるでしょうね……その時は私にもぜひ抱っこさせてください！」"
translation = "「두 분의 아이라면 총명하고 귀여운 아이가 태어날 거예요…… 그때는 저에게도 꼭 안아보게 해주세요!」"

[[dialogue]]
speaker = "イレーナ"
original = "「あーっ、そこまで！\u3000妄想で勝手に話を進めるんじゃないわよ！」"
translation = "「아─앗, 거기까지! 망상으로 멋대로 이야기 진행하지 말라구!」"

[[dialogue]]
speaker = "イレーナ"
original = "「いい？\u3000こんな格好してるけど、あたしは結婚するわけでも何でもないの！\u3000あのね──」"
translation = "「알겠어? 이런 복장을 하고 있지만, 나는 결혼하는 것도 뭐도 아니라니까! 그게 말이지──」"

[[dialogue]]
speaker = "シャロン"
original = "「はぅ……では戦闘服がウェディングドレスに変化して戻らなくなっただけだと……」"
translation = "「하우…… 그럼 전투복이 웨딩드레스로 변화해서 돌아오지 않게 된 것뿐이라고……」"

[[dialogue]]
speaker = "イレーナ"
original = "「どうしてそんなにがっかりしてるのよ」"
translation = "「어째서 그렇게 실망하고 있는 거야」"

[[dialogue]]
speaker = "シャロン"
original = "「だって、イレーナさまと会長さまが結婚するって、想像しただけで素敵なことじゃありませんか」"
translation = "「그치만, 이레이나 님과 회장님이 결혼한다는 건 상상만 해도 멋진 일이잖아요」"

[[dialogue]]
speaker = "イレーナ"
original = "「冗談はやめてよ。こんなのと結婚なんて……」"
translation = "「농담은 관둬. 이런 녀석이랑 결혼이라니……」"

[[dialogue]]
speaker = "unk"
original = "ひ、ひどい……"
translation = "너, 너무해……"

[[dialogue]]
speaker = "シャロン"
original = "「でも、そのウェディングフォームを解除するために、結婚式は挙げなくちゃいけないんですよね？」"
translation = "「하지만, 그 웨딩 폼을 해제하기 위해서 결혼식을 올려야만 하는 거죠?」"

[[dialogue]]
speaker = "イレーナ"
original = "「そうなんだけど……１つ大きな問題があるのよね」"
translation = "「그렇긴 한데…… 한 가지 큰 문제가 있단 말이지」"

[[dialogue]]
speaker = "シャロン"
original = "「問題、ですか？」"
translation = "「문제, 인가요?」"

[[dialogue]]
speaker = "イレーナ"
original = "「これまではあたしが神官として結婚式を挙げてきたけど、さすがに自分で自分の結婚式を挙げるわけにはいかないわ」"
translation = "「지금까지는 내가 신관으로서 결혼식을 올려왔지만, 역시 스스로 자신의 결혼식을 올릴 수는 없잖아」"

[[dialogue]]
speaker = "イレーナ"
original = "「誰かに神官役を頼む必要があるんだけど、誰に頼むべきか……」"
translation = "「누군가에게 신관 역할을 부탁해야 하는데, 누구에게 부탁해야 할지……」"

[[dialogue]]
speaker = "シャロン"
original = "「私──じゃ、ダメですよね……」"
translation = "「저──로는, 안 되겠죠……」"

[[dialogue]]
speaker = "イレーナ"
original = "「そうね。あんたにお願いできれば良かったんだけど、あんたはシスターであって神官じゃない。だからこの役目をお願いすることは出来ないわ」"
translation = "「그래. 너한테 부탁할 수 있었다면 좋았겠지만, 너는 시스터지 신관이 아니야. 그러니까 이 역할을 부탁할 수는 없어」"

[[dialogue]]
speaker = "イレーナ"
original = "「教皇庁の他の神官にお願いして、話が広がるのもイヤだし……そもそも偽りの結婚式の神官なんて引き受けてくれる人はいなさそうだし……」"
translation = "「교황청의 다른 신관에게 부탁해서 이야기가 퍼지는 것도 싫고…… 애초에 가짜 결혼식의 신관 같은 걸 맡아줄 사람은 없을 것 같고……」"

[[dialogue]]
speaker = "unk"
original = "１人心当たりがあるかも"
translation = "한 사람 짚이는 데가 있을지도."

[[dialogue]]
speaker = "unk"
original = "俺はＤＩＳＣを取り出すと、早速その相手に連絡する。"
translation = "나는 DISC를 꺼내어, 곧바로 그 상대에게 연락한다."

[[dialogue]]
speaker = "ジュエリー"
original = "『やあ、我が愛しの助手よ。キミの方から連絡をしてくれるとは嬉しいね』"
translation = "『야아, 나의 사랑스러운 조수여. 자네가 먼저 연락을 주다니 기쁘군.』"

[[dialogue]]
speaker = "ジュエリー"
original = "『ちょうど私もキミに相談したいことがあったんだ。至急、結婚式場まで来てくれないか』"
translation = "『마침 나도 자네에게 상담하고 싶은 것이 있었네. 지체 말고 결혼식장까지 와주지 않겠나.』"

[[dialogue]]
speaker = "ジュエリー"
original = "『ではまた後ほど』"
translation = "『그럼 이따가 보세.』"

[[dialogue]]
speaker = "unk"
original = "あ、ちょっと待っ──"
translation = "아, 잠시만 기다──"

[[dialogue]]
speaker = "イレーナ"
original = "「どうだったの？\u3000引き受けてもらえなかったの？」"
translation = "「어땠어? 거절당한 거야?」"

[[dialogue]]
speaker = "unk"
original = "そうじゃないけど、結婚式場に来てくれって"
translation = "그건 아닌데, 결혼식장으로 와달래."

[[dialogue]]
speaker = "シャロン"
original = "「結婚式場？\u3000なんだかタイムリーな場所ですね」"
translation = "「결혼식장? 왠지 시기적절한 장소네요.」"

[[dialogue]]
speaker = "イレーナ"
original = "「……すごく嫌な予感がしてきたわ」"
translation = "「……굉장히 불길한 예감이 들어.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「やあ、待っていたよ」"
translation = "「야아, 기다리고 있었네.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「おや、一緒にいるのはイレーナさんじゃないか？\u3000どうして我が助手と一緒にいるんだい？」"
translation = "「오야, 같이 있는 건 이레이나 양 아닌가? 어째서 나의 조수와 함께 있는 거지?」"

[[dialogue]]
speaker = "イレーナ"
original = "「実は少々困ったことになってしまって……会長さんに相談に乗ってもらっていたんです」"
translation = "「사실은 조금 곤란한 일이 생겨서…… 회장님에게 상담을 받고 있었어요.」"

[[dialogue]]
speaker = "unk"
original = "実はその事で頼みがあるんだ"
translation = "실은 그 일로 부탁이 있어."

[[dialogue]]
speaker = "ジュエリー"
original = "「頼みごとかい？\u3000私で力になれることがあるならば協力は惜しまないよ」"
translation = "「부탁인가? 나라도 힘이 될 수 있는 일이라면 협력을 아끼지 않겠네.」"

[[dialogue]]
speaker = "イレーナ"
original = "「ありがとうございます。実は──」"
translation = "「감사합니다. 사실은──」"

[[dialogue]]
speaker = "unk"
original = "イレーナは突然ウェディングフォームが発現したこと、それを解除するために結婚式を挙げなければならなくなったことを説明した。"
translation = "이레이나는 갑자기 웨딩 폼이 발현된 것과, 그것을 해제하기 위해 결혼식을 올려야만 하게 된 것을 설명했다."

[[dialogue]]
speaker = "ジュエリー"
original = "「ふむ……事情はわかったよ。それなら助手が私に連絡してきた理由も推察できる。神官役を頼みたい、そういう事だろう？」"
translation = "「흠…… 사정은 알겠네. 그렇다면 조수가 나에게 연락해 온 이유도 추측할 수 있군. 신관 역할을 부탁하고 싶다, 그런 거겠지?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「私はブラウン神父の子孫だ。結婚式の作法は理解しているし、真似事くらいなら務まるだろう」"
translation = "「나는 브라운 신부의 후손이다. 결혼식의 예법은 이해하고 있고, 흉내 정도라면 해낼 수 있겠지.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「だが、今回の件に関してはキミたちの力にはなれそうにないね」"
translation = "「하지만, 이번 건에 관해서는 자네들의 힘이 되어줄 수 없을 것 같군.」"

[[dialogue]]
speaker = "イレーナ"
original = "「そうですか……すみません、無理を言ってしまって」"
translation = "「그런가요…… 죄송해요, 무리한 부탁을 해서.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ああ、神官役を引き受けるのが嫌だというわけではないよ。ただ、引き受けられない事情があるんだ」"
translation = "「아아, 신관 역할을 맡는 게 싫다는 뜻은 아니네. 다만, 맡을 수 없는 사정이 있어서 말이야.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「論より証拠、その目で見てもらった方が理解は早いだろう」"
translation = "「백문이 불여일견, 직접 눈으로 보는 편이 이해가 빠르겠지.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「明解に換言するならば──」"
translation = "「명쾌하게 환언하자면──」"

[[dialogue]]
speaker = "ジュエリー"
original = "「私も花嫁なんだ」"
translation = "「나도 신부라네.」"

