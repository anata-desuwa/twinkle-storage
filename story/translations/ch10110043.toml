[[dialogue]]
speaker = "unk"
original = "第３話,煩悩ＶＳ彼氏,P"
translation = "제3화, 번뇌 VS 남자친구, P"

[[dialogue]]
speaker = "unk"
original = "その日、マトイは浅草安倍野神社へ来て、巫女の力の自主練を行っていた。"
translation = "그날, 마토이는 아사쿠사 아베노 신사에 와서, 무녀 힘의 자율 연습을 하고 있었다."

[[dialogue]]
speaker = "unk"
original = "ミヤハルは用事があるとのことで、マトイ１人で訓練をしているところへ――"
translation = "미야하루는 볼일이 있다고 해서, 마토이 혼자 훈련을 하고 있는 곳에──"

[[dialogue]]
speaker = "unk"
original = "やあ、マトイ。訓練頑張っているね"
translation = "안녕, 마토이. 훈련 열심히 하고 있네"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あれ、会長？\u3000どうしてここに……？」"
translation = "「어라, 회장? 어째서 여기에……?」"

[[dialogue]]
speaker = "unk"
original = "目を丸くするマトイに歩み寄り、手で頬に触れる。"
translation = "눈을 동그랗게 뜨는 마토이에게 다가가, 손으로 뺨을 만진다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ひゃっ！？\u3000な、何！？\u3000突然どうしたの！？」"
translation = "「히얏!? 뭐, 뭐야!? 갑자기 왜 그래!?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「――え？\u3000巫女の力で私に召喚された影？」"
translation = "「──에? 무녀의 힘으로 나에게 소환된 그림자?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「――それで、私の煩悩を叶えたいから、なんでも言って欲しいって？」"
translation = "「──그래서, 내 번뇌를 이루어 주고 싶으니까, 뭐든 말해 달라고?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「いやいやいや、本物の会長だよね！？\u3000どういうこと！？」"
translation = "「아니아니아니, 진짜 회장 맞지!? 어떻게 된 거야!?」"

[[dialogue]]
speaker = "unk"
original = "バレたか……"
translation = "들켰나……"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「普通にそれくらい分かるよ！\u3000だって――」"
translation = "「평범하게 그 정도는 알지! 그야──」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「だ、大好きな彼氏の、ことなんだし……」"
translation = "「사, 사랑하는 남자친구에 대한 거니까……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「――ん？\u3000ミヤハルから、巫女修業で煩悩解放した時の話を聞いたって？」"
translation = "「──음? 미야하루에게서, 무녀 수행으로 번뇌 해방했을 때의 이야기를 들었다고?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あ、あいつ～」"
translation = "「아, 그 녀석~」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「でも会長……私たち、その、恋人なんだしっ。わざわざそんな、カッコつけなくたって……」"
translation = "「하지만 회장…… 우리들, 그, 연인이니까. 굳이 그렇게, 멋 부리지 않아도……」"

[[dialogue]]
speaker = "unk"
original = "嫉妬しちゃったんだ"
translation = "질투해 버렸어"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker = "unk"
original = "俺はマトイに理由を打ち明ける。"
translation = "나는 마토이에게 이유를 털어놓는다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「――私の煩悩で会長の影が出てきたって話を聞いて、それで嫉妬を……？」"
translation = "「──내 번뇌로 회장의 그림자가 나왔다는 이야기를 듣고, 그래서 질투를……?」"

[[dialogue]]
speaker = "unk"
original = "『壁ドン』とか……"
translation = "『카베동』이라든가……"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「た、確かにされたけども……！」"
translation = "「화, 확실히 당하긴 했지만……!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「で、でも、私――唇とかは許してないから！」"
translation = "「하, 하지만, 나―― 입술 같은 건 허락 안 했으니까!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「それに、お姫様抱っこだって……！」"
translation = "「게다가, 공주님 안기까지……!」"

[[dialogue]]
speaker = "unk"
original = "お姫様抱っこ……？"
translation = "공주님 안기……?"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あっ、いや、なんでもないです……っ！」"
translation = "「앗, 아니, 아무것도 아니에요……!」"

[[dialogue]]
speaker = "unk"
original = "そこで顔を赤くして、視線を逸らすマトイ。"
translation = "거기서 얼굴을 붉히며, 시선을 피하는 마토이."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「――って、会長！？\u3000きゃっ！？」"
translation = "「――랄까, 회장님!? 꺄앗!?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「こ、これって……お姫様抱っこ！？」"
translation = "「이, 이건…… 공주님 안기!?」"

[[dialogue]]
speaker = "unk"
original = "俺はマトイの体を抱き上げながら、耳元で囁く。"
translation = "나는 마토이의 몸을 안아 올리며, 귓가에 속삭인다."

[[dialogue]]
speaker = "unk"
original = "愛しているよ、マトイ"
translation = "사랑해, 마토이"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ふあぁっ<emoji=heart04>\u3000そんな急に言われたら……<emoji=heart04>」"
translation = "「후아아<emoji=heart04> 그렇게 갑자기 말하면……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はそのまま正面から向き直ると、彼女に顔を寄せて――"
translation = "나는 그대로 정면에서 마주 보며, 그녀에게 얼굴을 가까이 대고――"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あぅぅっ……<emoji=heart04>\u3000んっ<emoji=heart04>」"
translation = "「아으으……<emoji=heart04> 응<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そっと唇を奪う。"
translation = "살며시 입술을 훔친다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ちゅっ……<emoji=heart04>\u3000んっ……はあぁぁ<emoji=heart04>」"
translation = "「쪽……<emoji=heart04> 응…… 하아아아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "……影の時と、どっちがドキドキした？"
translation = "……그림자일 때랑, 어느 쪽이 더 두근거렸어?"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そ、そんなの……」"
translation = "「그, 그런 건……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「本物の会長の方に決まってるでしょ……<emoji=heart04>」"
translation = "「진짜 회장님 쪽인 게 당연하잖아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「世界で１番……大好きな彼氏だもん<emoji=heart04>」"
translation = "「세상에서 제일…… 사랑하는 남자친구인걸<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あっ……んっ<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「앗…… 응<emoji=heart04> 쪽……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ん……<emoji=heart04>\u3000会長、もっと……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 회장님, 좀 더……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "と、その時。少し離れたところから物音がした。"
translation = "하고, 그 때. 조금 떨어진 곳에서 물소리가 났다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ふぇっ！？」"
translation = "「훼엣!?」"

[[dialogue]]
speaker = "unk"
original = "視線を向けると、建物の影に隠れて、こちらを覗いている人物が１人。"
translation = "시선을 돌리자, 건물 그늘에 숨어서 이쪽을 훔쳐보고 있는 인물이 한 명."

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「アカン、つい身を乗り出してもうたわぁ……<emoji=heart04>」"
translation = "「아칸, 그만 몸을 내밀어 버렸구마안……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ミヤハル！？\u3000ちょっ、なに覗いてんの！？」"
translation = "「미야하루!? 잠깐, 뭘 훔쳐보고 있는 거야!?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「というか、今日は用事があるから、夜まで家を空けるって言ってなかった！？」"
translation = "「그보다, 오늘은 용무가 있어서 밤까지 집을 비운다고 하지 않았어!?」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「ん～、それなぁ……」"
translation = "「음~, 그거 말이제……」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「実はウソなんや<emoji=heart04>\u3000友達カップルの情事を見て、うちも恋愛を学ぼうと思うてな？」"
translation = "「실은 거짓말이라카이<emoji=heart04> 친구 커플의 정사를 보고, 내도 연애를 배워볼까 싶어서 말이제?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「情事じゃない！\u3000そこまで行ってないから！！」"
translation = "「정사 아니야! 거기까지 안 갔으니까!!」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「ほんまゴメンなぁ？\u3000どうぞうちのことは気にせんと、そのままゆっくり続きをしてくれて構わへんから<emoji=heart04>\u3000どうぞどうぞ～<emoji=heart04>」"
translation = "「진짜 미안하데이? 아무쪼록 내 신경 쓰지 말고, 그대로 천천히 다음을 계속해도 상관없응께<emoji=heart04> 어서 어서~<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「できるかぁーーーっ！！！」"
translation = "「할 수 있겠냐고ーーー!!!」"

[[dialogue]]
speaker = "unk"
original = "お姫様抱っこされたまま、赤い顔で叫ぶマトイなのであった――"
translation = "공주님 안기를 당한 채, 붉어진 얼굴로 외치는 마토이였다――"

