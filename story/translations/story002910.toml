[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「みんなが繋いだバトン！\u3000絶対っ、絶対っ、私が勝ってゴールに持ち帰るんだぁっ！」"
translation = "「모두가 이어준 바통! 절대, 절대, 제가 이겨서 골에 가져갈 거예요!」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "『速い、速い、速いっ！\u3000大玉転がしの雪辱を果たすため、そして、新星学園の勝利のため！\u3000カティア選手、ミネコ選手を猛追っ！』"
translation = "『빠르다, 빠르다, 빠르다! 큰 공 굴리기의 설욕을 갚기 위해, 그리고, 신성 학원의 승리를 위해! 카티아 선수, 미네코 선수를 맹추격!』"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「後ろから凄い圧……！\u3000確かに速いけど……だから楽しい！\u3000アンカーになった甲斐があったよ！」"
translation = "「뒤에서 엄청난 압박……! 확실히 빠르지만…… 그래서 즐거워! 앵커가 된 보람이 있었어!」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「アンカーっていいよね……みんなの期待と信頼を背負って、みんなの頑張りを無にするかもしれないプレシャーがのしかかって……あぁ、ゾクゾク来るっ」"
translation = "「앵커는 좋지…… 모두의 기대와 신뢰를 짊어지고, 모두의 노력을 물거품으로 만들지도 모르는 압박감이 짓눌러 오고…… 아아, 소름이 돋아」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「でも私、追われるのは得意だから、逃げ足には自信があるんだよねー☆」"
translation = "「하지만 나는, 쫓기는 건 특기니까, 도망치는 발에는 자신이 있거든ー☆」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「なっ……！」"
translation = "「뭐엇……!」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "『なんということでしょうっ！\u3000追いつくかと思ったカティア選手の加速よりも更に速く！\u3000ミネコ選手、ドンドン突き放していきますっ！』"
translation = "『이럴 수가! 따라잡을까 했던 카티아 선수의 가속보다도 더욱 빠르게! 미네코 선수, 점점 거리를 벌려 나갑니다!』"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "『残りはトラック半周ですね。これは勝負あったでしょうか……？』"
translation = "『남은 거리는 트랙 반 바퀴네요. 이것으로 승부가 결정된 걸까요……?』"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「まだ、まだっ、まだまだーっ！」"
translation = "「아직, 아직, 아직 멀었어요!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "（私は星騎士としてはヨワヨワで、大玉転がしじゃ恥ずかしいところを見せて……このままじゃ本当にダメダメなままだ！）"
translation = "（저는 성기사로서는 약골이고, 큰 공 굴리기에서는 부끄러운 모습을 보여서…… 이대로라면 정말 글러 먹은 채로 남아버려!）"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "（戦いで役に立てない私をリレーの選手に選んでくれて、アンカーまで任されたんだ……！）"
translation = "（싸움에서 도움이 되지 못하는 저를 계주 선수로 뽑아주고, 앵커까지 맡겨주셨어요……!）"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「応援してくれてるみんなのためにも！\u3000絶対に、勝ぁつっ！」"
translation = "「응원해 주는 모두를 위해서라도! 절대로, 이길 거예요!」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「別に競技に負けたからって死ぬわけでもないしさ、勝ったからって億万長者になれるわけでもないじゃん」"
translation = "「딱히 경기에서 졌다고 죽는 것도 아니고, 이겼다고 억만장자가 되는 것도 아니잖아」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「それでもみんなはこの勝負に真剣になって、全力で挑んで、魂を燃やす……どうしてそこまですんだろ？」"
translation = "「그런데도 모두는 이 승부에 진심이 되어서, 전력으로 도전하고, 영혼을 불태우네…… 왜 그렇게까지 하는 걸까?」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「そんなの決まってる──それが青春だからだよっ！」"
translation = "「그런 건 정해져 있어── 그게 청춘이니까!」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「青春……」"
translation = "「청춘……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「なんでも真剣に挑む人は、とっても格好いいんだよ！\u3000美鶴ちゃんもカティアちゃんが走る姿に、心を動かされてるんでしょ！？」"
translation = "「뭐든지 진심으로 도전하는 사람은, 정말 멋있는 거야! 미츠루짱도 카티아짱이 달리는 모습에, 마음이 움직이고 있는 거잖아!?」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「ん、まあ……今のカティア、チョー格好いい」"
translation = "「응, 뭐…… 지금의 카티아, 완전 멋있어」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「だったら一緒に、その想いを声にしよ！\u3000カティアちゃんに伝えてあげてっ！」"
translation = "「그렇다면 함께, 그 마음을 소리 내자! 카티아짱에게 전해 줘!」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「がんばれ……がんばれ……カティアっ！」"
translation = "「힘내라…… 힘내라…… 카티아!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「がんばれ、がんばれ、カ・ティ・ア！」"
translation = "「힘내라, 힘내라, 카・티・아!」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「勝てるぞ、勝てるぞ、し・ん・せ・い！」"
translation = "「이길 수 있다, 이길 수 있다, 시・인・성!」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「勝てるぞ、勝てるぞ、新星っ！\u3000絶対っ、絶対に勝てるっ……もうちょっと……！」"
translation = "「이길 수 있다, 이길 수 있다, 신성! 절대, 절대로 이길 수 있어…… 조금만 더……!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「イケるよ、カティアちゃんっ！\u3000あと、ほんのちょっとだよーっ！」"
translation = "「할 수 있어, 카티아짱! 앞으로, 정말 아주 조금이야ー!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「はぁっ！\u3000はぁっ、はぁっ、はぁっ、はぁっ！」"
translation = "「하아! 하아, 하아, 하아, 하아!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "（苦しいっ！\u3000疲れたっ！\u3000もう限界！\u3000ちゃんと走れてるのかもよくわかんないっ！）"
translation = "（괴로워! 지쳤어! 이제 한계야! 제대로 달리고 있는 건지도 잘 모르겠어!）"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "（でも、でもでも！\u3000みんなに応援されると、まだまだ頑張れる！\u3000胸の奥から力が湧いてくるっ！）"
translation = "（하지만, 하지만 하지만! 모두가 응원해 주니, 아직 더 힘낼 수 있어! 가슴 속에서 힘이 솟아나!）"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "（みんなの期待は、苦しくて重いけど──）"
translation = "（모두의 기대는, 괴롭고 무겁지만──）"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「絶対、絶対っ！\u3000絶対に負けないワーーーーーンっ！」"
translation = "「절대, 절대! 절대로 지지 않겠어요오오오오옹!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「あたしの星力、全部、全部くれてやるっ！\u3000だから、だからっ！\u3000この一瞬だけでいい、眩しく輝きたいっ！」"
translation = "「제 성력, 전부, 전부 줄 거예요! 그러니까, 그러니까! 이 한순간만이라도 좋아, 눈부시게 빛나고 싶어!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「私がっ！\u3000勝つんだぁあぁあぁぁぁぁぁっ！！」"
translation = "「제가! 이기는 거다아아아아아아아아!」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「え、なにっ！？」"
translation = "「에, 뭐야!?」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「うぅうぅうぅぅぅぅぅぅっ！」"
translation = "「으으으으으으으으으으으으으!」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "『まあまあ、すごいです！\u3000カティア選手、すごい追い上げです！\u3000まだこれだけの力が残っていたんですね』"
translation = "『와아 와아, 대단합니다! 카티아 선수, 굉장한 추격입니다! 아직 이 정도의 힘이 남아있었군요』"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「ウソでしょーっ！？\u3000私の逃げ足より速いなんてっ！？」"
translation = "「거짓말이겠죠!? 내 도망치는 발보다 빠르다니!?」"

[[dialogue]]
speaker = "unk"
original = "カティアの絞り出したスピードとパワーは、流れ星をも上回る──！"
translation = "카티아가 쥐어짜낸 스피드와 파워는, 유성마저 능가한다──!"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ミネコさん、ふんばってくださーい！」"
translation = "「미네코 씨, 힘내세요ー!」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「くぅうううううぅぅぅぅぅぅぅっ！」"
translation = "「크으으으으으으으으으으으으으!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「うぅわぁあぁああぁぁぁぁぁっ！」"
translation = "「우와아아아아아아아아아아!」"

[[dialogue]]
speaker = "unk"
original = "ゴールテープまで、あと１ｍ。"
translation = "골 테이프까지, 앞으로 1m."

[[dialogue]]
speaker = "unk"
original = "そこでミネコとカティアの体は交差し──"
translation = "그곳에서 미네코와 카티아의 몸이 교차하고──"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "『ゴーール、インッッッ！！！\u3000勝者は──』"
translation = "『고오올, 인!!! 승자는──』"

[[dialogue]]
speaker = "unk"
original = "カティアだ！！！"
translation = "카티아다!!!"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「～～～～～ッッッッッ！！！」"
translation = "「～～～～～읍읍읍읍읍!!!」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「やりやがった！\u3000やりやがったなぁ、ワン公！」"
translation = "「해냈구나! 해냈어, 멍멍이!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「はぁっ！\u3000はぁっ！\u3000はぁっ！\u3000はぁっ！\u3000あ、あれ……私っ、か、勝った……ワン？」"
translation = "「하아! 하아! 하아! 하아! 아, 저…… 저, 이, 이겼…… 와앙?」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「あれれぇ……負けちゃったかぁ……」"
translation = "「어라라…… 져버렸나아……」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「はぁっ……や、やったぁ……はぁ、はぁっ、はぁっ！\u3000もう、一歩も、動け、ないっ……！」"
translation = "「하아…… 해, 해냈어요…… 하아, 하아, 하아! 이제, 한 발짝도, 움직일, 수 없어……!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「トラック１周だけなのに、フルマラソンでも走り切ったみたいですぅ……」"
translation = "「트랙 한 바퀴뿐인데, 풀 마라톤이라도 완주한 것 같아요오……」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「追いつかれちゃうとは思わなかったなぁ……凄かったよ、キミの走り」"
translation = "「따라잡힐 거라고는 생각 못 했네…… 대단했어, 너의 달리기」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「へへ……私もやればできる子だったワン……」"
translation = "「헤헤…… 저도 하면 되는 아이였던 와앙……」"

[[dialogue]]
speaker = "unk"
original = "最高の走りだったよ"
translation = "최고의 달리기였어"

[[dialogue]]
speaker = "unk"
original = "よくやったな、カティア"
translation = "잘했어, 카티아"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「あ……ありがとうございます。魔王様にカッコいいとこ見せられて、良かったですガオ……♪」"
translation = "「아…… 감사합니다. 마왕님께 멋있는 모습을 보여드릴 수 있어서, 좋았어요 가오……♪」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「カティアちゃんの追い上げ、ずごがっだよぉ～！\u3000私、感動しぢゃっだぁ～～！」"
translation = "「카티아짱의 추격, 너무 멋있었어어～! 나, 감동해 버렸어어～～!」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「へへ……あたしもつい見入っちまったぜ。よくやった、ワン公！」"
translation = "「헤헤…… 나도 모르게 넋을 잃고 봤다. 잘했어, 멍멍이!」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「めっちゃカッコよかったよ」"
translation = "「엄청 멋있었어」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「うん。うちのチア服に何が足りてなかったのか。カティアのおかげでわかった気がする」"
translation = "「응. 우리 치어 복에 뭐가 부족했는지. 카티아 덕분에 알 것 같아」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ずびっ……何が、足りてなかったの～……？」"
translation = "「흐읍…… 뭐가, 부족했던 거야～……?」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「チアガールの服ってさ、頑張る人を本気で応援してる時に花開いて、眩しいくらいに輝くんだよね」"
translation = "「치어리더 옷은 말이야, 열심히 하는 사람을 진심으로 응원할 때 꽃을 피우고, 눈부실 정도로 빛나는 거야」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「だから、練習じゃしっくり来なかったってわけ。こんなの本番じゃなきゃ気づけないよ」"
translation = "「그러니까, 연습 때는 착 달라붙지 않았던 거지. 이런 건 실전이 아니면 깨달을 수 없어」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「それがうちの感じてた物足りなさの正体かな。同じ服なのに、今じゃ最高に輝いて見える」"
translation = "「그게 내가 느끼고 있던 부족함의 정체일까. 같은 옷인데도, 지금은 최고로 빛나 보여」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「ああ、最高のチア衣装だぜ！」"
translation = "「아아, 최고의 치어 의상이다!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「アオハルの輝き、だねっ！」"
translation = "「청춘의 반짝임, 이네!」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「悪くないね、アオハル」"
translation = "「나쁘지 않네, 청춘」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「あー、くやしーっ！」"
translation = "「아ー, 분해ー!」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「でも追いつかれそうな時は最高にゾクゾクしたなぁ……いやぁ、たまらないね」"
translation = "「하지만 따라잡힐 것 같았을 때는 최고로 소름 돋았지…… 이야, 참을 수 없네」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "『学園対抗リレーは見事、新星学園の勝利です。全競技を終え、新星学園が大きくリードとなりました』"
translation = "『학원 대항 계주는 멋지게, 신성 학원의 승리입니다. 모든 경기를 마치고, 신성 학원이 크게 리드하게 되었습니다』"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "『しかし、全ては明日の舞闘会決勝戦で決まります』"
translation = "『하지만, 모든 것은 내일의 무투회 결승전에서 결정됩니다』"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「えーと、決勝戦で戦うのは──」"
translation = "「음ー, 결승전에서 싸우는 건──」"

[[dialogue]]
speaker = "？？？"
original = "「カティア、最高の走りだったわよ」"
translation = "「카티아, 최고의 달리기였어」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「マム……！」"
translation = "「마무……!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「新星有利の状況、よく作り出してくれたわ。ここまでお膳立てされたら、無様を晒すわけにはいかないわね」"
translation = "「신성 학원에 유리한 상황, 잘 만들어 주었어. 여기까지 판이 깔렸으니, 추태를 보일 수는 없겠지」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「アナタたちからのバトンは確かに受け取ったわ。あとは私に任せておきなさい」"
translation = "「너희들로부터의 바통은 확실히 받았어. 나머지는 나에게 맡겨 둬」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「血のにじむような努力、決して無駄にはしないわ。決勝戦で流星学園を完膚なきまでに叩きのめしてあげる！」"
translation = "「피눈물 나는 노력, 결코 헛되이 하지 않을 거야. 결승전에서 유성 학원을 완벽하게 때려눕혀 주겠어!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「イ、イエス・マム！\u3000よろしくお願いします！」"
translation = "「예, 예스 마무! 잘 부탁드립니다!」"

[[dialogue]]
speaker = "unk"
original = "流星への対抗心を燃やすマムへと、最後のバトンは託されたのだった。"
translation = "유성 학원에 대한 대항심을 불태우는 마무에게, 마지막 바통은 맡겨진 것이었다."

