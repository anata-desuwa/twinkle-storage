[[dialogue]]
speaker = "unk"
original = "第３話,新春アイスダンス,P"
translation = "제3화, 신춘 아이스 댄스, P"

[[dialogue]]
speaker = "unk"
original = "学園の新学期が近づいた、冬期休暇のとある日──俺はソフィに誘われてアリーナへとやってきていた。"
translation = "학원 개학이 다가온 겨울 방학의 어느 날── 나는 소피의 권유로 아레나에 와 있었다."

[[dialogue]]
speaker = "unk"
original = "彼女が所属するフィギュア部では毎年、新春を祝うアイスダンスがあり、その催しは両校隔てなく見ることができるのだそう。"
translation = "그녀가 소속된 피겨부에서는 매년 신년을 축하하는 아이스 댄스가 열리며, 그 행사는 양쪽 학교 구분 없이 관람할 수 있다고 한다."

[[dialogue]]
speaker = "unk"
original = "星力を用いて張られた氷の上で踊るフィギュア部のダンスはとても綺麗だった──"
translation = "성력을 이용해 얼린 빙판 위에서 춤추는 피겨부의 댄스는 무척 아름다웠다──"

[[dialogue]]
speaker = "ソフィア"
original = "「ふぅっ。どうでしたか、会長さん。フィギュア部のアイスダンス、楽しんでいただけていますか？」"
translation = "「후우. 어땠나요, 회장님. 피겨부의 아이스 댄스, 즐거우셨나요?」"

[[dialogue]]
speaker = "unk"
original = "ああ、とても感動した！"
translation = "아아, 정말 감동했어!"

[[dialogue]]
speaker = "舞亜"
original = "「あは、良かったねソフィ。しっかり準備した甲斐があったんじゃない？」"
translation = "「아하, 잘됐네 소피. 열심히 준비한 보람이 있잖아?」"

[[dialogue]]
speaker = "ソフィア"
original = "「べ、別に私はいつも通りです」"
translation = "「딱, 딱히 저는 평소대로였어요」"

[[dialogue]]
speaker = "舞亜"
original = "「えー、そうかな。何度もプログラムを確認して、すっごい気合いが入ってたよね。これは会長さんにかっこいいところ見せたいんだな～って思ったんだけど」"
translation = "「에이, 그럴까나. 몇 번이나 프로그램을 확인하면서 엄청나게 기합이 들어가 있었잖아. 이건 회장님한테 멋진 모습을 보여주고 싶어서구나~ 하고 생각했는데」"

[[dialogue]]
speaker = "ソフィア"
original = "「そそ、そんなことないですからっ。フィギュア部の新春記念のダンスは、別に大会じゃありません。得点なんて付かないんですから……！」"
translation = "「그, 그렇지 않다니까요. 피겨부의 신춘 기념 댄스는 딱히 대회가 아니에요. 점수 같은 건 안 매긴단 말이에요……!」"

[[dialogue]]
speaker = "舞亜"
original = "「ん～。別に隠すようなことでもないと思うんだけど……まあいいや」"
translation = "「음~. 딱히 숨길 일도 아니라고 생각하는데…… 뭐, 됐어」"

[[dialogue]]
speaker = "ソフィア"
original = "「もう、舞亜さんってば余計なことまで言うんですから……」"
translation = "「정말이지, 마이아 씨는 쓸데없는 소리까지 한다니까요……」"

[[dialogue]]
speaker = "ソフィア"
original = "「少し休憩をはさんで午後の部もありますので、良かったらこのまま見ていってください」"
translation = "「잠시 휴식 후에 오후 공연도 있으니까, 괜찮으시면 이대로 계속 봐주세요」"

[[dialogue]]
speaker = "unk"
original = "ありがとう。楽しみにしてる"
translation = "고마워. 기대하고 있을게"

[[dialogue]]
speaker = "ソフィア"
original = "「午前中で印象に残ったシーンとかありました？\u3000演技の参考にしたいので、良ければ聞かせて欲しいです」"
translation = "「오전 중에 인상 깊었던 장면 같은 거 있었나요? 연기에 참고하고 싶으니까 괜찮으시면 들려주세요」"

[[dialogue]]
speaker = "unk"
original = "着物姿で滑っているのが新鮮だった"
translation = "기모노 차림으로 스케이트를 타는 게 신선했어"

[[dialogue]]
speaker = "舞亜"
original = "「あー、そっか。会長さんはあんまりフィギュアスケートは見ないんだっけ。ドレス以外の服で滑ることも多いんだよ。燕尾服着たり」"
translation = "「아─ 그렇구나. 회장님은 피겨 스케이팅을 별로 안 보던가. 드레스 말고 다른 옷을 입고 타는 경우도 많아. 연미복을 입기도 하고」"

[[dialogue]]
speaker = "ソフィア"
original = "「もちろん大会では専用のユニフォームですけれど。今日みたいなエキシビションではビジュアルから楽しませることもありますからね」"
translation = "「물론 대회에서는 전용 유니폼을 입지만요. 오늘 같은 에キシビション(갈라쇼)에서는 비주얼적인 면으로 즐거움을 주기도 하니까요」"

[[dialogue]]
speaker = "ソフィア"
original = "「アニメキャラクターのコスプレで滑っている海外の選手とか、ネットで見たことありませんか？\u3000フィギュアスケートって意外と自由なんですよ」"
translation = "「애니메이션 캐릭터 코스프레를 하고 타는 해외 선수 같은 거 인터넷에서 본 적 없으신가요? 피겨 스케이팅은 의외로 자유롭거든요」"

[[dialogue]]
speaker = "舞亜"
original = "「まぁでもソフィは別の理由もありそうだけど……その恰好、けっこう気に入ってる？」"
translation = "「뭐, 그래도 소피는 다른 이유도 있을 것 같은데…… 그 차림, 꽤 마음에 들어?」"

[[dialogue]]
speaker = "ソフィア"
original = "「はい。着物って見た目よりもずっと温かいので。氷の上でもソーホットです♪」"
translation = "「네. 기모노는 보기보다 훨씬 따뜻하니까요. 얼음 위에서도 소 핫(So hot) 해요♪」"

[[dialogue]]
speaker = "舞亜"
original = "「どうりで滑ってる時、イキイキしてると思った。でもソフィ、今日はずっとその恰好で本当にいいの？」"
translation = "「어쩐지 스케이트 탈 때 생기발랄하다 했어. 그런데 소피, 오늘 계속 그 차림으로 정말 괜찮겠어?」"

[[dialogue]]
speaker = "ソフィア"
original = "「えっと……？\u3000何か問題があったりしますか？\u3000午後のプログラムも、この衣装で問題なく滑れるはずですが……」"
translation = "「저기……? 무슨 문제라도 있나요? 오후 프로그램도 이 의상으로 문제없이 스케이트를 탈 수 있을 텐데요……」"

[[dialogue]]
speaker = "舞亜"
original = "「でも会長さん的にはちょっぴりがっかりしてるんじゃないのかな。可愛い彼女のアイスダンスを見に来てるんだし……」"
translation = "「하지만 회장님 입장에서는 조금 실망하고 있지 않을까. 귀여운 여자친구의 아이스 댄스를 보러 온 걸 테고……」"

[[dialogue]]
speaker = "ソフィア"
original = "「かわ……！？\u3000彼女……」"
translation = "「귀여……!? 여, 여자친구……」"

[[dialogue]]
speaker = "舞亜"
original = "「フィギュアスケートの時の、ちゃんとしたドレス姿も見たい～って思ってるんじゃないかな～って」"
translation = "「피겨 스케이트를 탈 때의 제대로 된 드레스 차림도 보고 싶다~고 생각하고 있지 않을까~ 해서」"

[[dialogue]]
speaker = "ソフィア"
original = "「あ……うぅ……そ、そうでしょうか？」"
translation = "「아…… 으으…… 그, 그럴까요?」"

[[dialogue]]
speaker = "舞亜"
original = "「私のスケートのファンの人たちも、男女問わずみんなドレスのデザイン、楽しみにしてるよ。観客にとっては大事なものだと思うけど」"
translation = "「내 스케이트 팬들도 남녀 불문하고 다들 드레스 디자인을 기대하고 있거든. 관객에게는 중요한 요소라고 생각하는데」"

[[dialogue]]
speaker = "ソフィア"
original = "「な、なるほど……会長さんは、あの……普段の私のドレス姿も、見てみたいって思ってくれていたり……？」"
translation = "「그, 그렇군요…… 회장님은, 저기…… 평소 제 드레스 차림도 보고 싶다고 생각해주시고 계셨나요……?」"

[[dialogue]]
speaker = "unk"
original = "ドレス姿も綺麗だから大好きだよ"
translation = "드레스 차림도 예쁘니까 정말 좋아해"

[[dialogue]]
speaker = "ソフィア"
original = "「……っ！\u3000そ、そそ、そうですかっ」"
translation = "「……윽! 그, 그그, 그렇습니까」"

[[dialogue]]
speaker = "舞亜"
original = "「あ、でもそっか。ソフィは温かい恰好の方がいいんだっけ。ごめんごめん、余計なお世話だったかな」"
translation = "「아, 하지만 그렇네. 소피는 따뜻한 복장이 더 좋다고 했었지. 미안 미안, 괜한 참견이었나 보네」"

[[dialogue]]
speaker = "ソフィア"
original = "「──ちょっと失礼します」"
translation = "「──잠시 실례하겠습니다」"

[[dialogue]]
speaker = "ソフィア"
original = "「──お待たせしました」"
translation = "「──오래 기다리셨습니다」"

[[dialogue]]
speaker = "舞亜"
original = "「おー。いつもの格好だ。ふふ、でもいいの？\u3000さっきの着物に比べて寒いんじゃない？」"
translation = "「오~ 평소 입던 옷이네. 후후, 하지만 괜찮아? 아까 입었던 기모노에 비하면 춥지 않아?」"

[[dialogue]]
speaker = "ソフィア"
original = "「リンクに立てばすぐに集中して寒さなんてわからなくなりますから。それに……」"
translation = "「링크에 서면 금방 집중해서 추위 같은 건 모르게 되니까요. 게다가……」"

[[dialogue]]
speaker = "ソフィア"
original = "「ふふ。会長さんに喜んでもらいたかったので」"
translation = "「후후. 회장님이 기뻐해 주셨으면 해서요」"

[[dialogue]]
speaker = "舞亜"
original = "「あ、その笑顔、すごくきれい。艶っぽい感じ。午後のソフィの演技、私も楽しみになってきたかも」"
translation = "「아, 그 미소, 정말 예뻐. 요염한 느낌이야. 오후 소피의 연기, 나도 기대되기 시작했을지도」"

[[dialogue]]
speaker = "ソフィア"
original = "「……そろそろ時間です。行きましょう、舞亜さん」"
translation = "「……슬슬 시간입니다. 가요, 마이아 씨」"

[[dialogue]]
speaker = "舞亜"
original = "「そうだね～。それじゃあ会長さん、楽しんでいってね」"
translation = "「그렇네~. 그럼 회장님, 즐겁게 감상해줘」"

[[dialogue]]
speaker = "ソフィア"
original = "「アイスダンスが終わったら、一緒に帰りましょう。会長さん」"
translation = "「아이스 댄스가 끝나면 같이 돌아가요, 회장님」"

[[dialogue]]
speaker = "unk"
original = "ソフィアと舞亜、そして大勢のフィギュア部員が氷の上で舞う姿を、俺は最後まで特等席で見学した。"
translation = "소피아와 마이아, 그리고 수많은 피겨 부원들이 얼음 위에서 춤추는 모습을 나는 마지막까지 특등석에서 견학했다."

[[dialogue]]
speaker = "unk"
original = "ダンスが美しかったのもそうだけど、寒がりのソフィが俺のために着替えてくれたことが何よりも嬉しいのだった──"
translation = "댄스가 아름다웠던 것도 그렇지만, 추위를 잘 타는 소피가 나를 위해 옷을 갈아입어 준 것이 무엇보다 기뻤다──"

