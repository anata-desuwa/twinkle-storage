[[dialogue]]
speaker = "unk"
original = "第１３話,『ＸＥＬＯＳ』,B"
translation = "제13화, 『XELOS』, B"

[[dialogue]]
speaker = "ベアトリス"
original = "「ん～、ジューシー♪\u3000この餃子サイコーだよ、アポロちゃん！」"
translation = "「음~, 쥬시해♪ 이 만두 최고야, 아폴로짱!」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「ふふん。あたしの餃子は特別だからな」"
translation = "「후훈. 내 만두는 특별하니까 말이야.」"

[[dialogue]]
speaker = "unk"
original = "アポロ特製の餃子に舌鼓を打つベアトリス。"
translation = "아폴로 특제 만두를 맛있게 먹는 베아트리스."

[[dialogue]]
speaker = "unk"
original = "こうしてベアトリスが戻ってきて、俺もほっとしている。"
translation = "이렇게 베아트리스가 돌아와서 나도 안심하고 있다."

[[dialogue]]
speaker = "梨緒"
original = "「相変わらずニンニクが好きだな、吸血鬼なのに」"
translation = "「여전히 마늘을 좋아하는군, 흡혈귀면서.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「だって美味しいんだも～ん！\u3000ほら、ナターシャちゃんも食べようよ！」"
translation = "「그치만 맛있는걸~! 자, 나타샤짱도 먹자!」"

[[dialogue]]
speaker = "ナターシャ"
original = "「いや私、匂いの強いものは食べない主義なんで」"
translation = "「아뇨, 전 냄새가 강한 건 안 먹는 주의라서요.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「そんなこと言わずにさ！\u3000とっても美味しいから！」"
translation = "「그러지 말고! 정말 맛있으니까!」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ガーリックハラスメントだよ、それ」"
translation = "「갈릭 해러스먼트예요, 그거.」"

[[dialogue]]
speaker = "クロト"
original = "「新しいハラスメントが誕生したな……」"
translation = "「새로운 해러스먼트가 탄생했군……」"

[[dialogue]]
speaker = "ナターシャ"
original = "「でもさ、私たちは黙って見てたけど、もしベアトが本当に敵だったらどうしたの？」"
translation = "「근데 말이야, 우리는 가만히 보고 있었지만, 만약 베아토가 정말 적이었다면 어떡했을 거야?」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「その時はその時であたしが何とかしたさ」"
translation = "「그때는 그때대로 내가 어떻게든 했겠지.」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「ま、それはないって信じてたけど。梨緒の仲間なら、あたしにとっても仲間だからな」"
translation = "「뭐, 그럴 일은 없다고 믿었지만. 리오의 동료라면 나에게도 동료니까 말이야.」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「ナターシャこそ、ベアトのことあんまり疑ってなかったみたいだが」"
translation = "「나타샤야말로 베아토를 별로 의심하지 않는 것 같던데.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「正直、ベアトがスパイはありえないって。全然基本がなってないし、もし味方のスパイだったら足を引っ張られる前に消してるレベル」"
translation = "「솔직히 베아토가 스파이라는 건 말이 안 돼요. 전혀 기본이 안 돼 있고, 만약 아군 스파이였다면 발목 잡히기 전에 지워버렸을 레벨이라.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ナターシャちゃんひどいっ！？」"
translation = "「나타샤짱 너무해!?」"

[[dialogue]]
speaker = "unk"
original = "本気か冗談かわからないナターシャに、ショックを受けるベアトリス。"
translation = "진심인지 농담인지 모를 나타샤의 말에 충격을 받는 베아트리스."

[[dialogue]]
speaker = "unk"
original = "選挙管理委員会の仲間が戻ってきて、本当に良かった。"
translation = "선거관리위원회 동료가 돌아와서 정말 다행이다."

[[dialogue]]
speaker = "ベアトリス"
original = "「ごめんなさい、会長さん、ヴィーナスさん。私、本当は極星学園の副会長でした」"
translation = "「죄송해요, 회장님, 비너스 씨. 저, 사실은 극성학원의 부회장이었어요.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「でもアルタイルを滅ぼす意志はありません。デネブもアルタイルも救いたいと思っています」"
translation = "「하지만 알타이르를 멸망시킬 의사는 없어요. 데네브도 알타이르도 구하고 싶다고 생각해요.」"

[[dialogue]]
speaker = "クロト"
original = "「それなら俺たち同じだ。これからもよろしく、ベアトリス」"
translation = "「그렇다면 우리와 같아. 앞으로도 잘 부탁해, 베아트리스.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「はい！」"
translation = "「네!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「雨が降って自家用車ってやつね！」"
translation = "「비 온 뒤에 자가용차라는 거네!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「へ……？」"
translation = "「헤……?」"

[[dialogue]]
speaker = "クロト"
original = "「雨降って地固まる、って言いたいんだと思う……」"
translation = "「비 온 뒤에 땅 굳어진다, 라고 말하고 싶은 거라 생각해……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「あ、ああ……なるほど？」"
translation = "「아, 아아…… 그렇구나?」"

[[dialogue]]
speaker = "unk"
original = "相変わらず微妙に慣用句を間違えるヴィーナスだった。"
translation = "여전히 미묘하게 관용구를 틀리는 비너스였다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「フィオナはもう大丈夫なの？」"
translation = "「피오나는 이제 괜찮아?」"

[[dialogue]]
speaker = "フィオナ"
original = "「はい、ゆっくり休んだおかげですっかり良くなりました。もう魔王因子も機能しています」"
translation = "「네, 푹 쉰 덕분에 말끔히 나았습니다. 이제 마왕 인자도 기능하고 있어요.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ラクシャは？」"
translation = "「락샤는?」"

[[dialogue]]
speaker = "ラクシャ"
original = "「ま、ちょっとは元気になったかな。ボクも餃子いただきーっと。あ、これほんとに美味しい」"
translation = "「뭐, 조금은 기운이 났으려나. 나도 만두 잘 먹겠습니다~. 아, 이거 진짜 맛있다.」"

[[dialogue]]
speaker = "リノ"
original = "「みんなー、探してた資料あったわよ～！\u3000ジグが言っていた“真なる神”の解明に繋がるかもしれないわ」"
translation = "「얘들아, 찾던 자료가 있었어~! 지그가 말했던 “진정한 신”의 해명으로 이어질지도 몰라.」"

[[dialogue]]
speaker = "クロト"
original = "「！\u3000本当に？」"
translation = "「! 정말이야?」"

[[dialogue]]
speaker = "リノ"
original = "「ええ。ネビュラには昔イザベラっていう考古学者がいてね。彼女が研究していたの」"
translation = "「응. 네뷸라에는 옛날에 이자벨라라는 고고학자가 있었거든. 그녀가 연구하고 있었어.」"

[[dialogue]]
speaker = "リノ"
original = "「魔王ラクシスの時代に存在した『チャカパラ神』と、それを信じる『バジュラ教』に代表されるように……」"
translation = "「마왕 락시스 시대에 존재했던 『차카파라 신』과 그것을 믿는 『바주라 교』에 대표되듯이……」"

[[dialogue]]
speaker = "リノ"
original = "「女神テルルと異なる神を信じ、厄災を『天啓』と呼ぶ信仰は、名前を変えていろんな時代に出現していた」"
translation = "「여신 테루루와 다른 신을 믿으며 재앙을 『천계』라고 부르는 신앙은 이름을 바꿔 여러 시대에 출현했었어.」"

[[dialogue]]
speaker = "リノ"
original = "「信じる神の名前は違うけど、その教義は同じ。リクリエを神の意志として受け入れようというもの」"
translation = "「믿는 신의 이름은 다르지만 그 교의는 같아. 리크리에를 신의 의지로서 받아들이자는 것이지.」"

[[dialogue]]
speaker = "リノ"
original = "「教義以外に共通点らしいものはない。だけどそれは不自然でしょ？\u3000文化や時代が違えば信仰も変わってくるものなのに」"
translation = "「교의 외에는 공통점 같은 게 없어. 하지만 그건 부자연스럽잖아? 문화나 시대가 다르면 신앙도 바뀌기 마련인데.」"

[[dialogue]]
speaker = "リノ"
original = "「だからイザベラは、それらを同じ神を信仰しているものと解釈し、その神をこう名付けた」"
translation = "「그래서 이자벨라는 그것들을 같은 신을 신앙하는 것으로 해석하고 그 신을 이렇게 이름 붙였어.」"

[[dialogue]]
speaker = "リノ"
original = "「女神と異なる信仰を持つ神──『<ruby>Ｘｅｎｏ<rt>ゼノ</rt></ruby>\u3000<ruby>Ｌｏｒｄ<rt>ロード</rt></ruby>\u3000<ruby>Ｓａｎｃｔｉｆｉｅｄ<rt>サンクティファイド</rt></ruby>』」"
translation = "「여신과 다른 신앙을 가진 신── 『<ruby>Xeno<rt>제노</rt></ruby> <ruby>Lord<rt>로드</rt></ruby> <ruby>Sanctified<rt>산크티파이드</rt></ruby>』」"

[[dialogue]]
speaker = "リノ"
original = "「それぞれの頭を取って『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』──と」"
translation = "「각각의 앞글자를 따서 『<ruby>XELOS<rt>제로스</rt></ruby>』라고.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「チャカパラ神よりかっこいいじゃない！\u3000なんかムカつくわね！」"
translation = "「차카파라 신보다 멋있잖아! 왠지 짜증 나네!」"

[[dialogue]]
speaker = "梨緒"
original = "「『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』……」"
translation = "「『<ruby>XELOS<rt>제로스</rt></ruby>』……」"

[[dialogue]]
speaker = "unk"
original = "それがリクリエを進める神の名。"
translation = "그것이 리크리에를 진행하는 신의 이름."

[[dialogue]]
speaker = "unk"
original = "実在しているのかも不明だが、もし存在するとすれば、ジグが語る“真なる神”とはそれのことだろう。"
translation = "실재하는지도 불분명하지만, 만약 존재한다면 지그가 말하는 “진정한 신”이란 그것을 말하는 것이리라."

[[dialogue]]
speaker = "梨緒"
original = "「敵の言葉を鵜呑みにするわけにはいかないが、あえて否定せず、正しいと仮定してみると……」"
translation = "「적의 말을 곧이곧대로 받아들일 수는 없지만, 굳이 부정하지 않고 옳다고 가정해 보면……」"

[[dialogue]]
speaker = "unk"
original = "『チャカパラ神』を信仰する『バジュラ教団』はこう主張していた。"
translation = "『차카파라 신』을 신앙하는 『바주라 교단』은 이렇게 주장하고 있었다."

[[dialogue]]
speaker = "unk"
original = "『リクリエは崇高なるチャカパラ様の啓示！』"
translation = "『리크리에는 숭고하신 차카파라 님의 계시!』"

[[dialogue]]
speaker = "unk"
original = "『チャカパラ神は、女神をも超越する“大宇宙”のご意思である！』"
translation = "『차카파라 신은 여신조차 초월하는 “대우주”의 의지이시다!』"

[[dialogue]]
speaker = "unk"
original = "──と。"
translation = "──라고."

[[dialogue]]
speaker = "敗残の亡霊"
original = "『よって……世界の再創生とは……女神をも超越する……チャカパラ神のご意思なのだァ……ッ……！！』"
translation = "『따라서…… 세계의 재창생이란…… 여신조차 초월하는…… 차카파라 신의 의지인 것이다아……윽……!!』"

[[dialogue]]
speaker = "unk"
original = "とも語っていた。"
translation = "라고도 말했었다."

[[dialogue]]
speaker = "ジグ"
original = "「私は<ruby>Ｚ<rt>ジグ</rt></ruby>。“真なる神の騎士”だ」"
translation = "「나는 <ruby>Z<rt>지그</rt></ruby>. “진정한 신의 기사”다.」"

[[dialogue]]
speaker = "ジグ"
original = "「言葉通りの意味さ。私が仕えるのは、世界を創り<ruby>給<rt>たも</rt></ruby>うた真なる神。女神なんて所詮お飾りだよ」"
translation = "「말 그대로의 의미야. 내가 섬기는 분은 세계를 창조하신 진정한 신. 여신 따윈 결국 장식일 뿐이지.」"

[[dialogue]]
speaker = "クロト"
original = "「彼らの言葉が正しいと仮定するなら、女神テルルの上に、さらなる上位存在──『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』がいる」"
translation = "「그들의 말이 옳다고 가정한다면 여신 테루루 위에 더 상위의 존재── 『<ruby>XELOS<rt>제로스</rt></ruby>』가 있어.」"

[[dialogue]]
speaker = "クロト"
original = "「ジグの言う通りだとすると、世界を創造したのも女神ではなく『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』ということになる」"
translation = "「지그의 말대로라면 세계를 창조한 것도 여신이 아니라 『<ruby>XELOS<rt>제로스</rt></ruby>』라는 것이 돼.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「世界の信仰が覆るね。時代が時代なら流星教に目をつけられるかも」"
translation = "「세계의 신앙이 뒤집히겠네요. 시대가 시대였다면 유성교에 찍혔을지도 몰라요.」"

[[dialogue]]
speaker = "unk"
original = "もしこんなことを発表すれば、世界は大騒ぎになるだろう。"
translation = "만약 이런 것을 발표한다면 세계는 큰 소동이 일어날 것이다."

[[dialogue]]
speaker = "unk"
original = "いや、荒唐無稽な説で相手にされない可能性もあるかもしれないが。"
translation = "아니, 황당무계한 설이라 상대해주지 않을 가능성도 있겠지만."

[[dialogue]]
speaker = "ヴィーナス"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "クロト"
original = "「ヴィーナス？」"
translation = "「비너스?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「全然話についていけないわ！」"
translation = "「전혀 이야기를 못 따라가겠어!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「チャカパラとか『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』とか、よくわかんない名前ばっかり出てきて覚えられないもの！」"
translation = "「차카파라니 『<ruby>XELOS<rt>제로스</rt></ruby>』니, 잘 모르는 이름만 잔뜩 나와서 못 외우겠단 말이야!」"

[[dialogue]]
speaker = "クロト"
original = "「そ、そうか……また細かく説明するよ」"
translation = "「그, 그렇구나…… 나중에 다시 자세히 설명해 줄게.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「あー、そういえばこういう子だったねー」"
translation = "「아~ 그러고 보니 이런 애였지~」"

[[dialogue]]
speaker = "クロト"
original = "「ラクシャは守護天使としてどう思う？」"
translation = "「락샤는 수호천사로서 어떻게 생각해?」"

[[dialogue]]
speaker = "ラクシャ"
original = "「んー……」"
translation = "「음~……」"

[[dialogue]]
speaker = "unk"
original = "ラクシャに話を向けると、彼女は難しい物理学の講義を聞くみたいに、しかめっ面をしていた。"
translation = "락샤에게 말을 건네자, 그녀는 어려운 물리학 강의를 듣는 것처럼 찌푸린 얼굴을 하고 있었다."

[[dialogue]]
speaker = "ラクシャ"
original = "「女神以上の存在が本当にいるとして、ボクたち守護天使はそれを直接認識できないようになっている」"
translation = "「여신 이상의 존재가 정말 있다고 해도 우리 수호천사는 그것을 직접 인식할 수 없게 되어 있어.」"

[[dialogue]]
speaker = "ラクシャ"
original = "「だからボクからはノーコメントとしか言えないよ」"
translation = "「그러니까 나로서는 노코멘트라고밖에 할 수 없네.」"

[[dialogue]]
speaker = "クロト"
original = "「……そうか」"
translation = "「……그렇군.」"

[[dialogue]]
speaker = "unk"
original = "守護天使は女神に近い高位存在だ。"
translation = "수호천사는 여신에 가까운 고위 존재다."

[[dialogue]]
speaker = "unk"
original = "だから守護天使なりの意見をもらえればと思ったんだが、それは難しいようだ。"
translation = "그래서 수호천사 나름의 의견을 들을 수 있을까 했지만, 그것은 어려운 모양이다."

[[dialogue]]
speaker = "リノ"
original = "「『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』が実在しているか、それが女神より上位の存在であるかはまだ仮説の段階よ」"
translation = "「『<ruby>XELOS<rt>제로스</rt></ruby>』가 실재하는지, 그것이 여신보다 상위 존재인지는 아직 가설 단계야.」"

[[dialogue]]
speaker = "リノ"
original = "「研究では仮説を立てて検証していくのが大事。肯定する材料も、否定する材料もこれから探していきましょう」"
translation = "「연구에서는 가설을 세우고 검증해 나가는 게 중요해. 긍정할 재료도, 부정할 재료도 앞으로 찾아보도록 하자.」"

[[dialogue]]
speaker = "unk"
original = "女神より上位に存在するとされ、<ruby>再創造<rt>リクリエ</rt></ruby>を望むとされる『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』。"
translation = "여신보다 상위에 존재한다고 여겨지며 <ruby>재창생<rt>리크리에</rt></ruby>을 원한다고 하는 『<ruby>XELOS<rt>제로스</rt></ruby>』."

[[dialogue]]
speaker = "unk"
original = "その情報を集めることが、世界の謎を解き明かすことに繋がるのかもしれない。"
translation = "그 정보를 모으는 것이 세계의 수수께끼를 밝혀내는 것으로 이어질지도 모른다."

[[dialogue]]
speaker = "クロト"
original = "「そうそう、今日、買い出しの途中でルヴィネがアルバイトしてるところを見かけたんだ」"
translation = "「맞다, 오늘 장 보러 가는 길에 루비네가 아르바이트하고 있는 걸 봤어.」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「何かわかったことはあるか？」"
translation = "「뭐 알아낸 건 있나?」"

[[dialogue]]
speaker = "クロト"
original = "「ルヴィネが担々麺が好きなことくらいかな……」"
translation = "「루비네가 탄탄면을 좋아한다는 것 정도일까……」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「なんだそりゃ」"
translation = "「그게 뭐야.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「あはは、ルヴィは担々麺にはうるさいからね……」"
translation = "「아하하, 루비는 탄탄면에는 까다로우니까……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「おかげで私たちも担々麺食べたくなって、お昼は担々麺にしたのよねー」"
translation = "「덕분에 우리도 탄탄면이 먹고 싶어져서 점심은 탄탄면으로 했지~」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「でもデネブまんじゅうは探してもみつからなかったわ。残念」"
translation = "「하지만 데네브 만쥬는 찾아봐도 없더라. 아쉬워.」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「そりゃそうだろ。誰が買うんだ」"
translation = "「그야 당연하지. 누가 사겠냐.」"

[[dialogue]]
speaker = "クロト"
original = "「ははは……」"
translation = "「하하하……」"

[[dialogue]]
speaker = "クロト"
original = "「ただ、ルヴィネはちゃんと人々を守っていた。モンスターと戦う彼女は、純粋に世界を救おうとしているように見えたよ」"
translation = "「다만 루비네는 제대로 사람들을 지키고 있었어. 몬스터와 싸우는 그녀는 순수하게 세계를 구하려 하는 것처럼 보였어.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「だって極星の星徒会長だもん。デネブの人にとって、ルヴィは間違いなく英雄だよ」"
translation = "「그야 극성의 성도회장인걸. 데네브 사람들에게 루비는 틀림없이 영웅이야.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「平行世界同士の生存競争は止めたいと思ってるけど、私はルヴィを信じてる」"
translation = "「평행세계끼리의 생존 경쟁은 멈추고 싶다고 생각하지만, 나는 루비를 믿어.」"

[[dialogue]]
speaker = "unk"
original = "ベアトリスのルヴィネへの信頼は今も揺らいでいない。"
translation = "베아트리스의 루비네에 대한 신뢰는 지금도 흔들리지 않았다."

[[dialogue]]
speaker = "unk"
original = "普通のデネブの住民からすれば、それが当然なのだろう。"
translation = "평범한 데네브 주민의 입장에서 보면 그것이 당연한 것이리라."

[[dialogue]]
speaker = "梨緒"
original = "「アルタイルとデネブが共調するには、ルヴィネを説得することが不可欠だ」"
translation = "「알타이르와 데네브가 공조하려면 루비네를 설득하는 것이 필수적이야.」"

[[dialogue]]
speaker = "梨緒"
original = "「だが私たちはルヴィネに疑いを持っている。彼女がリクリエの側にいるのではないかとな」"
translation = "「하지만 우리는 루비네에게 의구심을 품고 있어. 그녀가 리크리에 쪽에 있는 게 아닐까 하고.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ルヴィが……！？\u3000そんなはずないよ！\u3000だったらデネブを救うはずないもん！」"
translation = "「루비가……!? 그럴 리 없어! 그랬다면 데네브를 구할 리 없는걸!」"

[[dialogue]]
speaker = "梨緒"
original = "「問題はそこだ。ルヴィネが破滅寸前の世界を救ったというが、１人の天使にそんなことが可能なのか？」"
translation = "「문제는 거기야. 루비네가 파멸 직전의 세계를 구했다고 하지만, 한 명의 천사에게 그런 일이 가능한 걸까?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「で、でも実際にデネブはこうして……」"
translation = "「하, 하지만 실제로 데네브는 이렇게……」"

[[dialogue]]
speaker = "梨緒"
original = "「ああ、デネブが存続しているのは事実だ。だが不自然なんだ。彼女の何もかもが」"
translation = "「아아, 데네브가 존속하고 있는 건 사실이야. 하지만 부자연스러워. 그녀의 모든 것이.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "梨緒"
original = "「ベアトにまでルヴィネを疑えとは言わない。だけどルヴィネについては調査させてもらう」"
translation = "「베아토에게까지 루비네를 의심하라고 하지는 않겠어. 하지만 루비네에 대해서는 조사하도록 하겠어.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ううん、それなら私もやるよ。疑いが晴れれば、梨緒ちゃんたちもそれでいいんだもんね？」"
translation = "「아니, 그렇다면 나도 할게. 의심이 풀리면 리오짱들도 그걸로 된 거잖아?」"

[[dialogue]]
speaker = "梨緒"
original = "「ああ、もし誤解ならその方がいいからな」"
translation = "「아아, 만약 오해라면 그편이 좋으니까.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「でもどうやってルヴィネのことを調べるの？\u3000本人に聞いてみる？」"
translation = "「근데 어떻게 루비네를 조사할 거야? 본인에게 물어봐?」"

[[dialogue]]
speaker = "梨緒"
original = "「いや、答えてくれるわけないだろう……インタビューじゃあるまいし」"
translation = "「아니, 대답해 줄 리 없잖아…… 인터뷰도 아니고.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「はーい。それなら考えがあるんだけど……」"
translation = "「네~. 그럼 생각이 하나 있는데요……」"

[[dialogue]]
speaker = "unk"
original = "手を上げながら提案するナターシャに、みんなの注目が集まる。"
translation = "손을 들며 제안하는 나타샤에게 모두의 시선이 집중된다."

[[dialogue]]
speaker = "unk"
original = "そして──"
translation = "그리고──"

[[dialogue]]
speaker = "ナターシャ"
original = "「みんなでルヴィネを尾行してみるってのはどうかな？」"
translation = "「다 같이 루비네를 미행해 보는 건 어떨까요?」"

