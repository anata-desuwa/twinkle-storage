[[dialogue]]
speaker = "unk"
original = "第４話,小さな竜へ愛を込めて,P"
translation = "제4화, 작은 용에게 사랑을 담아"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あら～、会長くん♪\u3000どうかしたの？」"
translation = "「어머~, 회장군♪ 무슨 일이야?」"

[[dialogue]]
speaker = "unk"
original = "ある日、３年生の教室へ向かっていると、サーシャさんと出会った。"
translation = "어느 날, 3학년 교실로 향하던 중 사샤 씨와 만났다."

[[dialogue]]
speaker = "unk"
original = "俺はマムに書類を渡しにきたことを伝え、しばし談笑していたのだが――"
translation = "나는 마무에게 서류를 전하러 왔다는 것을 말하고 잠시 담소를 나누고 있었는데――"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ん？\u3000――きゃあぁっ！？」"
translation = "「응? ――꺄아아악!?」"

[[dialogue]]
speaker = "unk"
original = "わっぷ……！？"
translation = "우왓……!?"

[[dialogue]]
speaker = "unk"
original = "突然、俺はサーシャさんに抱き着かれ、その大きな胸に顔が埋もれてしまう。"
translation = "갑자기 나는 사샤 씨에게 안겨, 그 커다란 가슴에 얼굴이 파묻히고 만다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「か、会長くん、蜂よ～！\u3000校内に蜂が飛んでるわ！」"
translation = "「회, 회장군, 벌이야~! 교내에 벌이 날아다녀!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「いやあぁ～～～っ！\u3000こっちに来ないで！\u3000会長くん、蜂を早く捕まえてぇ～～～っ！」"
translation = "「싫어어어어~~! 이쪽으로 오지 마! 회장군, 벌을 빨리 잡아줘어어어~~!」"

[[dialogue]]
speaker = "unk"
original = "さ、サーシャさん、腕を離して……！"
translation = "사, 사샤 씨, 팔을 놓아주세요……!"

[[dialogue]]
speaker = "unk"
original = "胸に埋もれて息が出来なくて、蜂よりも先に窒息の危機である。"
translation = "가슴에 파묻혀 숨을 쉴 수 없어, 벌보다 먼저 질식할 위기다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「やれやれ……騒がしいと思って来てみれば、何をやっているのかしら？\u3000貴方達」"
translation = "「이런이런…… 소란스럽다 싶어 와봤더니 뭘 하고 있는 거니? 당신들.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「マム～！\u3000蜂が！\u3000蜂が入って来てるの！\u3000助けて～～～っ！」"
translation = "「마무~! 벌이! 벌이 들어왔어! 도와줘어어어~~!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「全く、サーシャの虫嫌いにも困ったものね。いつまで経っても慣れやしないんだから……」"
translation = "「정말이지, 사샤의 벌레 혐오도 골칫거리네. 시간이 아무리 흘러도 익숙해지질 않으니……」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「引力操作――ほら、迷子を捕まえてあげたわよ」"
translation = "「인력 조작―― 자, 길 잃은 아이를 잡아줬어.」"

[[dialogue]]
speaker = "unk"
original = "それから廊下の窓を開ける音がして……"
translation = "그러고 나서 복도 창문을 여는 소리가 들리고……"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「今回は逃がしてあげるから、もう迷い込むんじゃないわよ」"
translation = "「이번에는 놓아줄 테니 다시는 길을 잃지 말렴.」"

[[dialogue]]
speaker = "unk"
original = "マムのそう言う声が聞こえたところで、俺の意識は途絶えたのだった――"
translation = "마무의 그런 목소리가 들린 시점에서 나의 의식은 끊어지고 말았다――"

[[dialogue]]
speaker = "unk"
original = "次に起きた時には、保健室のベッドの上だった。"
translation = "다음에 일어났을 때는 보건실 침대 위였다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「目が覚めた？\u3000会長」"
translation = "「정신이 들어? 회장.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「やれやれ、仮にも学園最強の星徒会長が、女性の胸で息できなくて失神とか、恋人の私まで恥ずかしくなるじゃない」"
translation = "「이런이런, 명색이 학원 최강의 성도회장이 여자 가슴에 숨이 막혀 실신이라니, 연인인 나까지 부끄러워지잖아.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ふん……まあ、サーシャの大きな胸に埋もれて、嫌な気分じゃなかったでしょうけど？」"
translation = "「흥…… 뭐, 사샤의 커다란 가슴에 파묻혀서 기분이 나쁘지는 않았겠지만?」"

[[dialogue]]
speaker = "unk"
original = "ご、ごめん！\u3000決してわざとじゃ――"
translation = "미, 미안! 결코 일부러 그런 게――"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「冗談よ。サーシャの方から抱き着いて来たんでしょう？\u3000恐れ知らずにも、私へ抱き着いてきたこともあったし」"
translation = "「농담이야. 사샤 쪽에서 안겨 온 거겠지? 겁도 없이 나에게 안겨 온 적도 있었으니까.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「って、会長？\u3000な、何……？」"
translation = "「그건 그렇고, 회장? 뭐, 뭐야……?」"

[[dialogue]]
speaker = "unk"
original = "俺はマムの両手を取って握りながら、目を見て言う。"
translation = "나는 마무의 양손을 잡고 쥐며 눈을 보고 말한다."

[[dialogue]]
speaker = "unk"
original = "俺、小さくて可愛いマムが好きです！"
translation = "나, 작고 귀여운 마무가 좋아요!"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「へ？\u3000ま、まぁ、恋人として付き合っているんだから、それはそうでしょうけれど……」"
translation = "「헤? 뭐, 뭐어, 연인으로서 사귀고 있으니까 그건 그렇겠지만……」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「もしかして、私がサーシャの大きな胸に嫉妬してるとか思ったわけ？」"
translation = "「혹시 내가 사샤의 커다란 가슴에 질투하고 있다고 생각한 거야?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「別に、私はそんなの気にしないわよ」"
translation = "「딱히 나는 그런 거 신경 안 써.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「確かに、昔は小さいと戦いに不利だと思って、大きくなりたいと思っていた時期もあったわ」"
translation = "「확실히 옛날에는 작으면 전투에 불리하다고 생각해서 커지고 싶어 했던 시기도 있었지.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「妃竜院家では、散々皮肉を言われもした。当主の座が欲しい連中から、小さい癖に態度がデカいとか、そんなことを遠回しに何度もね」"
translation = "「키류인 가문에서는 온갖 비아냥을 듣기도 했어. 당주 자리를 탐내는 녀석들이 작은 주제에 태도가 거만하다느니, 그런 소리를 돌려서 몇 번이나 했거든.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「でも、小さくても勝つ方法はいくらでもあるわ。小柄な身体を活かして相手の懐に飛び込む武術だったり、手足の延長のように使えるくらい引力操作の技術を磨いたりね」"
translation = "「하지만 작아도 이기는 방법은 얼마든지 있어. 작은 몸을 살려 상대의 품으로 파고드는 무술이라든가, 손발의 연장처럼 쓸 수 있을 정도로 인력 조작 기술을 연마한다든가 말이야.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「むしろ堂々と胸を張って、言ってやったわ――」"
translation = "「오히려 당당하게 가슴을 펴고 말해줬지――」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「こそこそと陰口ばかり叩いてる奴の方が、図体の割に器が小さいってね」"
translation = "「속닥속닥 뒷담화만 까는 녀석이 덩치에 비해 그릇이 작다고 말이야.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あとは、まぁ……女として、一族の跡取りを作る為に、体が小さいと目ぼしい男を見つけるのが大変、という懸念があったけれど――」"
translation = "「그리고 뭐…… 여자로서 일족의 후계자를 만들기 위해 몸이 작으면 눈에 띄는 남자를 찾는 게 힘들 거라는 우려가 있었지만――」"

[[dialogue]]
speaker = "unk"
original = "マムは俺の目を見ながら、ふっと笑って……"
translation = "마무는 나의 눈을 보며 훗 웃고는……"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「幸い、それも<b>誰かさん</b>のおかげで目途が立ったしね。……ふふっ」"
translation = "「다행히 그것도 <b>누구</b> <b>씨</b> 덕분에 목표가 섰으니까. ……후후.」"

[[dialogue]]
speaker = "unk"
original = "マムはすごく可愛くて、魅力的ですよ"
translation = "마무는 정말 귀엽고 매력적이에요."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「そこまで言うなら、今すぐ証明してみせなさい」"
translation = "「그렇게까지 말한다면 지금 당장 증명해 보렴.」"

[[dialogue]]
speaker = "unk"
original = "イエス・マム"
translation = "예스 마무."

[[dialogue]]
speaker = "unk"
original = "俺はマムの背中に手を回して、そっと抱き寄せる。"
translation = "나는 마무의 등에 손을 돌려 살며시 끌어안는다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ん……<emoji=heart04>」"
translation = "「응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「それで終わり？\u3000私は竜なんだから、こんな弱い力じゃ気持ちが伝わらないわよ？\u3000だから――」"
translation = "「걸로 끝이야? 나는 용이니까 이런 약한 힘으로는 마음이 전해지지 않아. 그러니까――」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「もっと強く抱き締めなさい」"
translation = "「더 세게 껴안으렴.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んんっ<emoji=heart04>\u3000そうよ、それくらいでいいわ。次は、頭も撫でなさい……<emoji=heart04>」"
translation = "「응윽<emoji=heart04> 그래, 그 정도면 됐어. 다음은 머리도 쓰다듬으렴……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んっ……ふぅ<emoji=heart04>\u3000そう、そっちは優しくよ。それから……」"
translation = "「응…… 후우<emoji=heart04> 그래, 그쪽은 상냥하게야. 그리고……」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「言葉でも、何度も伝えなさい」"
translation = "「말로도 몇 번이고 전하렴.」"

[[dialogue]]
speaker = "unk"
original = "マム、愛してる"
translation = "마무, 사랑해."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んんっ<emoji=heart04>」"
translation = "「응윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "彼女の耳元で愛を囁くと、小さな体が震えるのがわかった。"
translation = "그녀의 귓가에 사랑을 속삭이자 작은 몸이 떨리는 것이 느껴졌다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「もっと……<emoji=heart04>」"
translation = "「더……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "好きだよ。誰よりも"
translation = "좋아해. 누구보다도."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「じゃあ……命令よ」"
translation = "「그럼…… 명령이야.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「畏怖をもって、私にキスしなさい<emoji=heart04>」"
translation = "「경외심을 갖고 나에게 키스하렴<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は１度、抱き締めていた体を離すと――"
translation = "나는 한 번 껴안았던 몸을 떼어내고는――"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んっ……<emoji=heart04>」"
translation = "「응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ちゅっ<emoji=heart04>」"
translation = "「쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "彼女の小さな唇にキスをする。"
translation = "그녀의 작은 입술에 키스한다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「もっとよ……<emoji=heart04>\u3000んんっ……<emoji=heart04>」"
translation = "「더 해줘……<emoji=heart04> 응윽……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ちゅっ……ちゅっ<emoji=heart04>」"
translation = "「쪽…… 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "珍しく甘えてくれるマムが本当に愛おしくて。"
translation = "드물게 응석을 부려주는 마무가 정말로 사랑스러워서."

[[dialogue]]
speaker = "unk"
original = "その後、学園のチャイムが鳴るまで、熱を帯びた触れ合いを続けてしまうのであった――"
translation = "그 후 학원 종이 울릴 때까지 열기를 띤 접촉을 계속하게 되는 것이었다――"

