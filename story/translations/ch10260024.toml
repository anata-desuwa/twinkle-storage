[[dialogue]]
speaker = "unk"
original = "第４話,じゃれ合いはこれからも,P"
translation = "제4화, 장난은 앞으로도 계속, P"

[[dialogue]]
speaker = "unk"
original = "リーリアとじゃれ合った日からしばらくが経ち、とある放課後。"
translation = "리리아와 장난을 친 날로부터 시간이 흐른 어느 방과 후."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「いや～、センパイってば、私のこと好きすぎちゃって困るな～☆」"
translation = "「이야～ 선배도 참, 저를 너무 좋아하셔서 곤란하다니까요～☆」"

[[dialogue]]
speaker = "unk"
original = "はいはい、愛してますよ～"
translation = "네네, 사랑합니다～."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「って、もっと心込めて下さいよ、センパ～イ！\u3000まあ、言葉にしてくれるのは嬉しいですけど♪」"
translation = "「잠깐, 좀 더 마음을 담아주세요, 선배～! 뭐, 말로 해주는 건 기쁘지만요♪」"

[[dialogue]]
speaker = "unk"
original = "デスクワーク中だから、後でね"
translation = "서류 작업 중이니까 나중에 하자."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そうですよ、リーリアさん。会長に構ってアピールしてないで、仕事して下さい。遊びじゃなく手伝いに来てるんですよね？」"
translation = "「맞아요, 리리아 씨. 회장님께 놀아달라고 어필하지 말고 일하세요. 놀러 온 게 아니라 도와주러 온 거잖아요?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「心配ナッシング☆\u3000ほら、アナちゃん、さっきの書類はもうできてるから♪」"
translation = "「걱정 내싱☆ 봐요, 아나 짱, 아까 서류는 벌써 다 됐으니까♪」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……見かけによらず、仕事できますね、リーリアさん。学園の成績も上位ですし……」"
translation = "「……겉보기와 다르게 일 잘하네요, 리리아 씨. 학원 성적도 상위권이고……」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ふふん、可愛い見た目に騙されるなかれ♪\u3000こう見えても、私は若くして学園へのスパイ任務に抜擢された、ネビュラの優秀なエージェントなんだから☆」"
translation = "「후훗, 귀여운 외모에 속지 마시라♪ 이래 봬도 저는 어린 나이에 학원 스파이 임무에 발탁된 네뷸라의 우수한 에이전트니까☆」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「いや可愛いとは別に言ってないですけど。――でも、最近すっかり、リーリアさんも星徒会メンバーみたいな感じになっちゃいましたね」"
translation = "「아니, 귀엽다고는 딱히 안 했는데요. ――하지만 최근 들어 완전히 리리아 씨도 성도회 멤버 같은 느낌이 되어버렸네요.」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「私はセンパイの可愛い後輩彼女にして、有能秘書なんで☆」"
translation = "「저는 선배의 귀여운 후배 여자친구이자 유능한 비서니까요☆」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はいはい、ごちそうさまです」"
translation = "「네네, 잘 먹었습니다.」"

[[dialogue]]
speaker = "unk"
original = "というか、リーリアって若かったんだな"
translation = "그나저나 리리아는 어렸구나."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「え」"
translation = "「어.」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ちょっと待って下さい、センパイ。何ですその反応？\u3000確かに今まで年齢明かしたことなかったですけど……まさかすごく高齢だと思ってたとか言わないですよね！？」"
translation = "「잠깐만요, 선배. 그 반응은 뭐예요? 확실히 지금까지 나이를 밝힌 적은 없었지만…… 설마 엄청 고령이라고 생각했다든가 그런 말은 안 하시겠죠!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「まあ、正体が魔女だと聞いて、実は見た目が若いだけで、私たちの何倍も年上なのに、会長よりも年下の後輩と偽って、『センパ～イ☆』とかあざとく言ってた――」"
translation = "「뭐, 정체가 마녀라고 듣고 사실은 겉모습만 젊을 뿐 우리보다 몇 배는 연상인데 회장님보다 어린 후배인 척 속이고 『선～배☆』라며 요염하게 말하고 있었다――」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「みたいな、そういうちょっと気まずいパターンもあり得ると思ってたので、若いと聞いてほっとしました。……で、実際はどのくらい年上なんです？」"
translation = "「같은 그런 좀 껄끄러운 패턴도 있을 수 있다고 생각했기에 젊다는 말을 듣고 안심했어요. ……그래서 실제로는 얼마나 연상인가요?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「アナちゃん！？」"
translation = "「아나 짱!?」"

[[dialogue]]
speaker = "unk"
original = "俺はそこで深呼吸をして――"
translation = "나는 거기서 심호흡을 하고――"

[[dialogue]]
speaker = "unk"
original = "心の準備はできてる"
translation = "마음의 준비는 되어 있어."

[[dialogue]]
speaker = "unk"
original = "リーリア、大丈夫だ"
translation = "리리아, 괜찮아."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「センパイ！？\u3000いや、待って！\u3000なんか年上であることが確定になってません！？\u3000違いますから！\u3000私、ちゃんとセンパイよりも年下ですから！！！」"
translation = "「선배!? 아니, 잠깐만요! 왠지 연상인 게 확정되어 있잖아요!? 아니거든요! 저 제대로 선배보다 연하거든요!!!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「アナちゃんと同い年！\u3000リアル年齢がちょうど学園に通うのにぴったりだったってのが、スパイに選ばれた理由の１つなんです！\u3000本当ですよ！？」"
translation = "「아나 짱이랑 동갑! 리얼 연령이 딱 학원에 다니기에 적당했다는 게 스파이로 뽑힌 이유 중 하나란 말이에요! 진짜예요!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……冗談です。この前、私と会長でセドナさんと話す機会があって、世間話でリーリアさんってぶっちゃけ何歳なんですかって聞いてたんで」"
translation = "「……농담이에요. 요전에 저랑 회장님이 세도나 씨와 이야기할 기회가 있어서 잡담으로 리리아 씨는 솔직히 몇 살인가요 하고 물어봤었거든요.」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「えっ……ってことは、センパイもわかってやってたんですか！？\u3000可愛い彼女を騙しましたね～！？」"
translation = "「엣…… 그렇다는 건 선배도 알고서 그러신 거예요!? 귀여운 여자친구를 속였군요～!?」"

[[dialogue]]
speaker = "unk"
original = "てへぺろ☆"
translation = "데헤페로☆"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「くっ……可愛い！\u3000怒りたいのに許しちゃう！」"
translation = "「큭…… 귀여워! 화내고 싶은데 용서하게 돼!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「バカップルですか。――よし、会長。エスメラルダ先生から確認を頼まれてた書類が終わったんで、ちょっと職員室に届けて来ます」"
translation = "「바보 커플인가요. ――좋아요, 회장님. 에스메랄다 선생님께 확인 부탁받았던 서류가 끝났으니 잠시 교무실에 다녀올게요.」"

[[dialogue]]
speaker = "unk"
original = "と、アナが席を外し、星徒会室で２人になるや否や――"
translation = "그렇게 아나가 자리를 비우고 성도회실에 둘만 남게 되자마자――"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「セ～ンパイ<emoji=heart04>」"
translation = "「선～배<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リーリアは、すすすっと俺の隣に寄ってきて、"
translation = "리리아는 스르륵 내 옆으로 다가와서,"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「２人きりになったので、ちょっと休憩しましょ<emoji=heart04>\u3000じゃれ合いモードもお休みして、優しくして欲しいです。ん～<emoji=heart04>」"
translation = "「둘만 남았으니까 잠시 쉬어요<emoji=heart04> 장난 모드도 쉬고 다정하게 대해줬으면 좋겠어요. 음～<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ちゅっ……<emoji=heart04>」"
translation = "「츄……<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ん……センパイ、好き……<emoji=heart04>\u3000ちゅっ……ちゅっ……<emoji=heart04>」"
translation = "「응…… 선배, 좋아해요……<emoji=heart04> 츄…… 츄……<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「んっ……ふぅ……<emoji=heart04>\u3000えへへ……イチャイチャの甘さでとろけちゃいそう……<emoji=heart04>」"
translation = "「응…… 후우……<emoji=heart04> 에헤헤…… 꽁냥거리는 달콤함에 녹아버릴 것 같아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「センパイ、頭も撫でて欲しいです<emoji=heart04>\u3000あ……<emoji=heart04>」"
translation = "「선배, 머리도 쓰다듬어 줬으면 좋겠어요<emoji=heart04> 아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「はあぁ……<emoji=heart04>\u3000じゃれ合いもいいですけど、こうして優しくされるのも、やっぱり好きです……<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 장난치는 것도 좋지만 이렇게 다정하게 대해주는 것도 역시 좋아요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ね、センパイ……？\u3000キス、もう１回……<emoji=heart04>」"
translation = "「저기, 선배……? 키스, 한 번 더……<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「――え？\u3000あんまりやり過ぎるとムラムラしちゃう、ですか？」"
translation = "「――에? 너무 많이 하면 근질근질해진다, 고요?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ふふっ……<emoji=heart04>\u3000センパイのえっち<emoji=heart04>」"
translation = "「후훗……<emoji=heart04> 선배 변태<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そんな風にしばらくイチャイチャしていると――"
translation = "그런 식으로 한참 꽁냥거리고 있자니――"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「じ～っ……」"
translation = "「지이익……」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「って、うわぁ！？\u3000アナちゃん！？\u3000もう戻って来てたの！？」"
translation = "「앗, 우와아!? 아나 짱!? 벌써 돌아온 거야!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ええ。しかし、なるほど……会長と２人きりになると、リーリアさんってそんな感じになるんですね」"
translation = "「네. 하지만 과연…… 회장님과 둘만 있으면 리리아 씨는 그런 느낌이 되는군요.」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「～～～っ！」"
translation = "「～～～윽!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「あっ、私のことはお構いなく。どうぞ続けて下さい」"
translation = "「앗, 제 일은 신경 쓰지 마세요. 부디 계속하시길.」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「いや無理でしょ！」"
translation = "「아니 무리잖아!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……しかし、ヒトとは変わるものですね。最初はスパイ活動としてあざとく会長に擦り寄ってたのに、今ではすっかり本気になってしまってメロメロと……」"
translation = "「……하지만 사람이란 변하는 법이군요. 처음에는 스파이 활동으로서 요염하게 회장님께 달라붙었었는데 지금은 완전히 진심이 되어버려서 헤롱헤롱하고……」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「い、今のは、他の人には秘密にして～！」"
translation = "「지, 지금 건 다른 사람한테는 비밀로 해줘～!」"

[[dialogue]]
speaker = "unk"
original = "顔を真っ赤にして慌てるリーリア。俺はそんな彼女も可愛いと思って、つい笑ってしまうのだった。"
translation = "얼굴을 새빨갛게 붉히며 당황하는 리리아. 나는 그런 그녀도 귀엽다고 생각해서 그만 웃어버리는 것이었다."

