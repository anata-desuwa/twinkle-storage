[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「――ってな感じでさ、いろいろあったわけよ」"
translation = "「──라는 느낌으로 말이야, 이런저런 일이 있었다고.」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「ほんっと、シンってば肝心な時にいてくれないんだから。タイミング悪いの、反省してよね」"
translation = "「정마알, 신은 중요한 때 곁에 없어 준다니까. 타이밍 나쁜 거 반성하라고.」"

[[dialogue]]
speaker_original = "シン"
speaker_translation = "신"
original = "「それ僕が悪いの？」"
translation = "「그게 내 잘못이야?」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「恋人のピンチに駆けつけられないなんて、彼氏失格でしょーが」"
translation = "「연인의 위기에 달려와 주지 못하다니 남자친구 실격이라구-」"

[[dialogue]]
speaker_original = "シン"
speaker_translation = "신"
original = "「それを言われると返す言葉がないなぁ」"
translation = "「그 말을 들으니 할 말이 없네.」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「次は絶対アタシの隣にいて。これはお願いじゃなくて命令だから」"
translation = "「다음엔 꼭 내 옆에 있어 줘. 이건 부탁이 아니라 명령이니까.」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「それと……こっちは命令じゃなくてお願いの方なんだけど……」"
translation = "「그리고…… 이건 명령이 아니라 부탁 쪽인데……」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「……寂しかった。だから慰めて」"
translation = "「……외로웠어. 그러니까 위로해줘.」"

[[dialogue]]
speaker_original = "シン"
speaker_translation = "신"
original = "「うん、いくらでも慰めるよ」"
translation = "「응, 얼마든지 위로해 줄게.」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「ぎゅうってして欲しい。あと、髪を撫でるやつも」"
translation = "「꽉 안아줬으면 좋겠어. 그리고 머리 쓰다듬어 주는 것도.」"

[[dialogue]]
speaker_original = "シン"
speaker_translation = "신"
original = "「ふふっ、今日のナナカは甘えんぼだなぁ」"
translation = "「후후, 오늘 나나카는 어리광쟁이네.」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「誰のせいよ、まったく。アタシがこうなる前に何とかしてよね」"
translation = "「누구 때문인데 정말. 내가 이렇게 되기 전에 어떻게든 좀 해보라구.」"

[[dialogue]]
speaker_original = "シン"
speaker_translation = "신"
original = "「わかってるよ。今回はごめんね、傍にいてあげられなくて」"
translation = "「알고 있어. 이번엔 미안해, 곁에 있어 주지 못해서.」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「うん……すっごく反省して。それと……いっぱいいっぱい……愛して……」"
translation = "「응…… 아주 많이 반성해. 그리고…… 가득가득…… 사랑해줘……」"

[[dialogue]]
speaker = "unk"
original = "こうしてじゃれ合うように言葉を交わしながら、恋人同士の関係に戻っていく。"
translation = "이렇게 장난치듯 말을 주고받으며, 연인 사이의 관계로 돌아간다."

[[dialogue]]
speaker = "unk"
original = "幼馴染のナナカから、僕の恋人のナナカへ。"
translation = "소꿉친구인 나나카에서, 나의 연인인 나나카로."

[[dialogue]]
speaker = "unk"
original = "それは難しいようでいて、とっても簡単なことだった。"
translation = "그것은 어려운 듯하면서도, 아주 간단한 일이었다."

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「あっ……ここでしちゃうの……？」"
translation = "「앗…… 여기서 해버리는 거야……?」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「ううん、ダメじゃないけど……誰か来ちゃうかもしれないし……」"
translation = "「으응, 안 되는 건 아니지만…… 누가 올지도 모르고……」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「だ、だから、あまり激しくしないでよね。声出ちゃうと危ないから」"
translation = "「그, 그러니까 너무 격렬하게 하지는 마. 소리 나오면 위험하니까.」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「ひゃん！\u3000ちょっ、言ったそばからっ……あっ、やっ、そこ……<emoji=heart04>」"
translation = "「햔! 잠깐, 말하자마자…… 앗, 야앗, 거기……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「もぉ……シンのえっち……まあ、アタシも人のことは言えないけどさ」"
translation = "「정말…… 신은 변태…… 뭐, 나도 남 말 할 처지는 아니지만.」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「シンと恋人同士になってから、なんだかんだで結構えっちなこともしちゃってるし。最初はすっごく恥ずかしかったけど、今では……」"
translation = "「신이랑 연인이 되고 나서, 이러니저러니 해도 꽤 야한 짓도 해버리고 있고. 처음엔 엄청 부끄러웠지만, 지금은……」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「ひゃんっ！\u3000だ、だから不意打ちするなっての～～！\u3000えっちなことするの慣れたけど、慣れないことだってあるんだからっ」"
translation = "「햔! 그, 그러니까 기습하지 말라니까~~! 야한 짓 하는 건 익숙해졌지만, 익숙해지지 않는 것도 있단 말이야!」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「もうっ、してもいいけど、びっくりさせんじゃないよ。声、我慢しなくちゃなんないんだから」"
translation = "「정말이지, 해도 좋지만 깜짝 놀라게 하지 말라구. 소리 참아야 한단 말이야.」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「んんっ……そう、そっとね……優しく触っても、十分気持ちいいから……ふぁっ、あっ、シン……<emoji=heart04>」"
translation = "「으응…… 그래, 살며시…… 살살 만져도 충분히 기분 좋으니까…… 하아, 앗, 신……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「うう、いつもより濡れるの早いかも……アタシ、期待しちゃってたのかなぁ」"
translation = "「우우, 평소보다 젖는 게 빠를지도…… 나, 기대하고 있었나 봐.」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「シンも……いつもより興奮してるでしょ？\u3000わかるよ。息も荒くなってるし、それに……その、おち○ちん、も。凄いことになってるよね<emoji=heart04>」"
translation = "「신도…… 평소보다 흥분했지? 알아. 숨도 거칠어졌고, 그리고…… 그, 자지, 도. 굉장한 상태가 됐네<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「アタシで興奮してくれたんだ……ふふっ、なんか嬉しい。もっともっと、シンがアタシに夢中になったらいいのに」"
translation = "「나 때문에 흥분해 줬구나…… 후훗, 왠지 기뻐. 좀 더, 좀 더 신이 나한테 푹 빠졌으면 좋겠는데.」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「って、態度で示さなくていいからぁ！\u3000そこは普通言葉でしょ、もっと愛の言葉を囁けってのっ」"
translation = "「그렇다고 태도로 보여주지 않아도 된다니까! 그건 보통 말로 하는 거잖아, 좀 더 사랑의 말을 속삭이라구!」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「……えっちの時は結構意地悪なんだよねー、シンは。うん、だいたいわかってたけどさ」"
translation = "「……야한 짓 할 때는 꽤 심술궂단 말이지, 신은. 응, 대충 알고 있었지만 말이야.」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「アタシも……自分が素直じゃないのはわかってるし、言えって言われてすぐ言うタイプじゃないから……」"
translation = "「나도…… 내가 솔직하지 못한 건 알고 있고, 말하라고 해서 바로 말하는 타입이 아니니까……」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「幼馴染なんだもんね、ちっとも似てないようでいて、似てるところもあるから……うん、いいよ、したいようにしても。行動でアタシに伝えて」"
translation = "「소꿉친구인걸, 조금도 안 닮은 것 같으면서도 닮은 구석도 있으니까…… 응, 좋아, 하고 싶은 대로 해도. 행동으로 나한테 전해줘.」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「んんっ……あんっ<emoji=heart04>\u3000シンの手、いつもより優しいね……。気持ちいいよ<emoji=heart04>」"
translation = "「으응…… 앙<emoji=heart04> 신의 손, 평소보다 부드럽네……. 기분 좋아<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「アタシは全部、シンのだから……ふあっ、はぁ……その代わり、シンの全部も、アタシが独り占めしちゃうんだから」"
translation = "「나는 전부 신의 거니까…… 후아, 하아…… 그 대신, 신의 전부도 내가 독차지할 거니까.」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「ふふっ、アタシもこう見えて独占欲強いんだから、覚悟してよね」"
translation = "「후훗, 나도 이래 봬도 독점욕 강하니까 각오하라구.」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「んくっ、はぁん……<emoji=heart04>\u3000もぉ、シンってばうますぎ……アタシの弱点全部知ってます～みたいに的確に愛撫してきて……」"
translation = "「응긋, 하앙……<emoji=heart04> 정말, 신은 너무 잘해…… 내 약점 전부 알고 있다는 듯이 정확하게 애무해 오고……」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「でも、そんな風に全部知られちゃってるのも、なんかいいね。好き<emoji=heart04>」"
translation = "「하지만 그렇게 전부 들켜버린 것도 왠지 좋네. 좋아해<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「うん……シンのことも、好き<emoji=heart04>\u3000大好き<emoji=heart04>」"
translation = "「응…… 신도 좋아해<emoji=heart04> 정말 좋아해<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「大好きなシンの手で……やらしいアタシになっちゃった<emoji=heart04>\u3000ほら、くぱって開いて、シンのこと欲しがってるでしょ」"
translation = "「좋아하는 신의 손길에…… 야한 내가 되어버렸어<emoji=heart04> 자, 벌름 벌려서 신을 원하고 있잖아.」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「そ、それでね……アタシの方は、もう準備出来てるから……シンがよければそろそろ……ね<emoji=heart04>」"
translation = "「그, 그래서 말인데…… 나는 이제 준비됐으니까…… 신만 괜찮으면 슬슬…… 응?<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「ふふ……おち○ちん、かっこよくなってる。そんな見せつけなくても大丈夫だよ」"
translation = "「후후…… 자지, 멋있어졌네. 그렇게 과시하지 않아도 괜찮아.」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「うん、来て……早くシンと繋がりたい……<emoji=heart04>」"
translation = "「응, 와줘…… 빨리 신이랑 연결되고 싶어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「んあぁっっ<emoji=heart04>\u3000入って……来たぁ<emoji=heart04>」"
translation = "「응아아앗<emoji=heart04> 들어…… 왔어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「シンのおち○ちん、感じるよ……アタシで興奮してガチガチになってるね……<emoji=heart04>」"
translation = "「신의 자지, 느껴져…… 나 때문에 흥분해서 딱딱해졌네……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「んふっ……遠慮しないでもっと奥まで……うん、そんな感じ……アタシの一番奥まで入って来て……<emoji=heart04>」"
translation = "「응후…… 사양 말고 좀 더 깊숙이…… 응, 그런 느낌…… 나의 가장 안쪽까지 들어와 줘……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「はぁぁ～～～っ、とうちゃーく<emoji=heart04>\u3000全部入っちゃったね。うん……凄く満ち足りた感じ……やっとシンがアタシのところに帰ってきたんだなぁって実感してる」"
translation = "「하아아~~~ 도착<emoji=heart04> 전부 들어왔네. 응…… 정말 충만한 느낌…… 드디어 신이 나한테 돌아왔구나 하고 실감 나.」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「ふふっ、ナカでビクンビクンしてるね<emoji=heart04>\u3000そんなにアタシのおま○こ、気持ちいい？」"
translation = "「후훗, 안에서 움찔움찔하고 있네<emoji=heart04> 그렇게 내 보지, 기분 좋아?」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「もちろんアタシも……すっごく気持ちいいよ<emoji=heart04>\u3000奥でぐりぃって当たるたび、えっちな声が出ちゃいそうで」"
translation = "「물론 나도…… 너무 기분 좋아<emoji=heart04> 안쪽에서 찌릿하고 닿을 때마다 야한 소리가 나올 것 같아서.」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「ちょっ！\u3000待って待って！\u3000急にピストン始めないでってばぁ<emoji=heart04>」"
translation = "「잠깐! 기다려 기다려! 갑자기 피스톤 시작하지 말라니까아<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「ううっ、ぐちゅぐちゅ言ってる……こんなのされたら、いくら我慢強いアタシでもあんあん言っちゃうじゃん……」"
translation = "「우우, 구축구축 소리 나…… 이런 짓 당하면 아무리 참을성 많은 나라도 앙앙 소리 내버리잖아……」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「にしても、ほんとにエッチに慣れちゃったよね。最初は２人ともあんなにぎこちなかったのに<emoji=heart04>」"
translation = "「그나저나 정말 야한 짓에 익숙해져 버렸네. 처음엔 둘 다 그렇게 서툴렀는데<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「あぁんっ、あっ、あっ、はぁんっ<emoji=heart04>\u3000おち○ちん凄いっ……んんっ、くぁっ、あんっ<emoji=heart04>\u3000気持ちいいよ、シン……<emoji=heart04>」"
translation = "「아앙, 앗, 앗, 하앙<emoji=heart04> 자지 굉장해…… 응, 쿠앗, 앙<emoji=heart04> 기분 좋아, 신……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「こ、声出ちゃうけど、ちょっとくらいなら平気だよね？\u3000ていうか、こんなの我慢する方が無理だし……」"
translation = "「소, 소리 나와버리지만 조금 정도는 괜찮겠지? 그보다 이런 거 참는 게 무리고……」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「もぉ、腰使いえっちすぎ<emoji=heart04>\u3000幼馴染のアタシをこんなにいじめてどうしたいの？」"
translation = "「정말, 허리 놀림 너무 야해<emoji=heart04> 소꿉친구인 나를 이렇게 괴롭혀서 어쩌고 싶은 거야?」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「んくっ、ふっ、ふぁっ、はぁんっ<emoji=heart04>\u3000アタシを気持ちよくして……自分も気持ちよくなりたいんだよね……ごめん、今更聞くことでもなかったね」"
translation = "「응긋, 훗, 후아, 하앙<emoji=heart04> 나를 기분 좋게 해주고…… 자신도 기분 좋아지고 싶은 거지…… 미안, 이제 와서 물을 일도 아니었네.」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「いいよ、一緒に気持ちよくなろ<emoji=heart04>\u3000アタシももっと……気持ちよくして欲しいし<emoji=heart04>」"
translation = "「좋아, 같이 기분 좋아지자<emoji=heart04> 나도 좀 더…… 기분 좋게 해줬으면 좋겠고<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「あぁん<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000おっぱいも……して<emoji=heart04>\u3000うんっ、いっぱい触れて欲しい<emoji=heart04>」"
translation = "「아앙<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 가슴도…… 해줘<emoji=heart04> 응, 잔뜩 만져줬으면 좋겠어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「はぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000だんだん激しく……なってきたね<emoji=heart04>\u3000んうっ<emoji=heart04>\u3000いいよ、我慢しないで。アタシも開き直っちゃうから<emoji=heart04>」"
translation = "「하앗<emoji=heart04> 앙<emoji=heart04> 앗<emoji=heart04> 점점 격렬해…… 지고 있네<emoji=heart04> 응읏<emoji=heart04> 좋아, 참지 마. 나도 에라 모르겠다 해버릴 거니까<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「ふふっ、生徒会長失格？\u3000もう、そんなこと気にしないでよ。今のアンタはアタシの恋人なんだから、そっちに専念しなっての<emoji=heart04>」"
translation = "「후훗, 학생회장 실격? 정말, 그런 거 신경 쓰지 마. 지금의 당신은 내 연인이니까 그쪽에 전념하라구<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「そうそう<emoji=heart04>\u3000んんっ、あんっ<emoji=heart04>\u3000アタシの気持ちいいとこ、もっとずんずんしてっ<emoji=heart04>\u3000シンのおち○ちんでアタシのおま○こいじめてぇっ<emoji=heart04>」"
translation = "「그래그래<emoji=heart04> 응, 앙<emoji=heart04> 내 기분 좋은 곳, 좀 더 푹푹 찔러줘<emoji=heart04> 신의 자지로 내 보지 괴롭혀줘어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「あぁぁぁーーーっ<emoji=heart04>\u3000あぁん<emoji=heart04>\u3000やっ、凄いぃ<emoji=heart04>\u3000こんなのダメぇ<emoji=heart04>\u3000感じ過ぎちゃうからぁ<emoji=heart04>」"
translation = "「아아아아──앗<emoji=heart04> 아앙<emoji=heart04> 야앗, 굉장해애<emoji=heart04> 이런 거 안 돼애<emoji=heart04> 너무 느껴버리니까아<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「気持ちよすぎて声出ちゃう<emoji=heart04>\u3000やっ<emoji=heart04>\u3000やぁん<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000えっちしてるのバレちゃう……シンと気持ちいいとこぐちゅぐちゅしてるの見られちゃう<emoji=heart04>」"
translation = "「너무 기분 좋아서 소리 나와버려<emoji=heart04> 야앗<emoji=heart04> 야앙<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 야한 짓 하는 거 들켜버려…… 신이랑 기분 좋은 곳 질척질척하게 하는 거 들켜버려어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「み、見られても……別にいいけどっ<emoji=heart04>\u3000シンと恋人同士のままでい続けるのは変わらないしっ<emoji=heart04>\u3000あっ、でもやっぱり恥ずかしいから……んぅっ<emoji=heart04>」"
translation = "「드, 들켜도…… 상관없지만! <emoji=heart04> 신이랑 연인 사이로 계속 남는 건 변함없으니까! <emoji=heart04> 앗, 그래도 역시 부끄러우니까…… 응으읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「や、やっぱりいつもよりヌルヌルがいっぱい出ちゃってる～<emoji=heart04>\u3000普段はこんなじゃないのに<emoji=heart04>\u3000今日は特別感じちゃってるみたい<emoji=heart04>」"
translation = "「역시 평소보다 미끌미끌한 게 잔뜩 나와버려어~<emoji=heart04> 평소엔 이렇지 않은데<emoji=heart04> 오늘은 특별히 느끼고 있는 것 같아<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「繋がってるとこ、グプグプ言ってるし……あ～んっ、もう。後で床掃除しなきゃだよ……」"
translation = "「연결된 곳, 구프구프 소리 나고…… 아앙, 정말. 나중에 바닥 청소해야 하잖아……」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「もう全部今更だよねっ<emoji=heart04>\u3000いいよ、今は全部忘れて気持ちよくなっちゃお？\u3000シンも気にしないで全力でアタシを愛してよね<emoji=heart04>」"
translation = "「이젠 다 상관없지! <emoji=heart04> 좋아, 지금은 전부 잊고 기분 좋아지자? 신도 신경 쓰지 말고 전력으로 나를 사랑해줘<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「んううっ<emoji=heart04>\u3000んぐっ<emoji=heart04>\u3000すごぉ<emoji=heart04>\u3000シンが夢中になってアタシを求めてるっ<emoji=heart04>\u3000こんなのダメっ<emoji=heart04>\u3000最初から好きで好きでたまんないのに、もっと好きになっちゃうからぁ<emoji=heart04>」"
translation = "「응우웃<emoji=heart04> 응긋<emoji=heart04> 굉장해애<emoji=heart04> 신이 푹 빠져서 나를 원하고 있어! <emoji=heart04> 이런 건 안 돼! 처음부터 너무너무 좋아서 어쩔 줄 모르겠는데, 더 좋아하게 돼버리니까아<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「いいよ、シン<emoji=heart04>\u3000もっと激しくして<emoji=heart04>\u3000ズンズンって激しくアタシを突いてぇっ<emoji=heart04>」"
translation = "「좋아, 신<emoji=heart04> 좀 더 격렬하게 해줘<emoji=heart04> 푹푹 격렬하게 나를 찔러줘어! <emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「はぁぁっ<emoji=heart04>\u3000あぁん<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000気持ちいいよぉ<emoji=heart04>\u3000シン<emoji=heart04>\u3000好き<emoji=heart04>\u3000好きぃ<emoji=heart04>」"
translation = "「하아아앗<emoji=heart04> 아앙<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 기분 좋아아<emoji=heart04> 신<emoji=heart04> 좋아해<emoji=heart04> 좋아해애<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「もっとアタシで気持ちよくなって<emoji=heart04>\u3000んぅうっ<emoji=heart04>\u3000んぐっ<emoji=heart04>\u3000はぁぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んあぁぁぁーーーっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「좀 더 나로 기분 좋아져줘<emoji=heart04> 응으웃<emoji=heart04> 응긋<emoji=heart04> 하아아앗<emoji=heart04> 앙<emoji=heart04> 앙<emoji=heart04> 응아아아아──앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「ごめんっ、アタシそんなにもたないかもっ<emoji=heart04>\u3000イっちゃいそう<emoji=heart04>\u3000シンっ<emoji=heart04>\u3000シン<emoji=heart04>\u3000シンっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「미안, 나 그렇게 오래 못 버틸지도! <emoji=heart04> 가버릴 것 같아<emoji=heart04> 신! <emoji=heart04> 신<emoji=heart04> 신잇! ! ! <emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「あぁぁぁっ<emoji=heart04>\u3000好き<emoji=heart04>\u3000大好きだよ<emoji=heart04>\u3000ずっとずっと、こうしてたいっ<emoji=heart04>\u3000シンとくっついてたいの<emoji=heart04>」"
translation = "「아아아앗<emoji=heart04> 좋아해<emoji=heart04> 정말 좋아해<emoji=heart04> 계속 계속 이러고 싶어! <emoji=heart04> 신이랑 꼭 붙어 있고 싶단 말이야<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「アタシのこと、絶対離さないでね<emoji=heart04>\u3000逃げないようにぎゅうって捕まえといて<emoji=heart04>\u3000あたしもっ、シンにしがみついてるからっっ<emoji=heart04>」"
translation = "「나, 절대 놓지 마<emoji=heart04> 못 도망가게 꽉 붙잡아 둬<emoji=heart04> 나도 신한테 매달리고 있을 테니까! ! <emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「んあぁぁっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000おち○ちんすごっ<emoji=heart04>\u3000いつもより絶対おっきくなってるよね<emoji=heart04>\u3000んもぉ、そこまでアタシに興奮しちゃってるんだ？\u3000めちゃくちゃ嬉しいよぉ<emoji=heart04>」"
translation = "「응아아앗<emoji=heart04> 하앙<emoji=heart04> 자지 굉장해! <emoji=heart04> 평소보다 분명히 커졌지? <emoji=heart04> 정말, 그 정도로 나한테 흥분한 거야? 너무 기뻐어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「はぁっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000来てぇ<emoji=heart04>\u3000早く来てぇ<emoji=heart04>\u3000来てくれないと、アタシ先にイっちゃうからぁ<emoji=heart04>」"
translation = "「하앗<emoji=heart04> 하앗<emoji=heart04> 하앗<emoji=heart04> 싸줘어<emoji=heart04> 빨리 싸줘어<emoji=heart04> 안 싸주면 나 먼저 가버릴 거니까아<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「もうダメぇ<emoji=heart04>\u3000無理っ<emoji=heart04>\u3000イク<emoji=heart04>\u3000イっちゃう<emoji=heart04>\u3000我慢出来ないから早くぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「이제 안 돼애<emoji=heart04> 무리잇<emoji=heart04> 가<emoji=heart04> 가버려<emoji=heart04> 못 참겠으니까 빨리이~~~잇<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「うあっ<emoji=heart04>\u3000ああぁっ<emoji=heart04>\u3000やっ、おち○ちん凄いっっ<emoji=heart04>\u3000来てっ<emoji=heart04>\u3000もっとズンズン来てぇーーーっ<emoji=heart04>」"
translation = "「우앗<emoji=heart04> 아아앗<emoji=heart04> 야앗, 자지 굉장해! ! <emoji=heart04> 싸줘! <emoji=heart04> 좀 더 푹푹 찔러줘어어──엇<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「イク<emoji=heart04>\u3000イっちゃう<emoji=heart04>\u3000アタシもうイクよ<emoji=heart04>\u3000イクっ<emoji=heart04>\u3000イクイクイクっっ<emoji=heart04>\u3000シンのおち○ちんでイっちゃう～～～っっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가<emoji=heart04> 가버려<emoji=heart04> 나 이제 가<emoji=heart04> 가<emoji=heart04> 가가가앗! ! <emoji=heart04> 신의 자지로 가버려어어~~~엇! ! <emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「んくぅ～～～～～っ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000イクっ<emoji=heart04>\u3000シン<emoji=heart04>\u3000好き<emoji=heart04>\u3000好き好き好きぃぃっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응쿠우~~~~~엇<emoji=heart04> 응응<emoji=heart04> 가아<emoji=heart04> 신<emoji=heart04> 좋아해<emoji=heart04> 좋아좋아좋아해애애잇<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「イっくぅ～～～～～～～～～～っっっ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가버려어어어어어어어어어엇! ! ! <emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「はぁ<emoji=heart04>\u3000はぁ<emoji=heart04>\u3000はぁ<emoji=heart04>\u3000……いっぱい……出されちゃった……<emoji=heart04>」"
translation = "「하아<emoji=heart04> 하아<emoji=heart04> 하아<emoji=heart04> ……잔뜩…… 싸버렸네……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「んくっ<emoji=heart04>\u3000アタシのナカでビクンビクンしてる……元気に射精してるね……<emoji=heart04>」"
translation = "「응긋<emoji=heart04> 내 안에서 움찔움찔하고 있어…… 팔팔하게 사정하고 있네……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「はぁっ<emoji=heart04>\u3000精液の量多いよ……全部入りきらないじゃん……<emoji=heart04>」"
translation = "「하앗<emoji=heart04> 정액 양 많아…… 전부 다 안 들어가잖아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「まーだビュルビュル出してるし……こんなに出されたらおなかがタプタプになっちゃうっての<emoji=heart04>」"
translation = "「아직도 뷰르뷰르 나오고 있고…… 이렇게 싸대면 배가 타프타프해진단 말이야<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「うん……やじゃないよ<emoji=heart04>\u3000嬉しい<emoji=heart04>\u3000おま○こにシンの精液入れてもらって……幸せだなぁって感じちゃってる<emoji=heart04>」"
translation = "「응…… 싫지 않아<emoji=heart04> 기뻐<emoji=heart04> 보지에 신의 정액 넣어줘서…… 행복하다고 느끼고 있어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「だ、だからね……遠慮しないでいっぱい出して……シンが出したいだけ……アタシに注いでいいから<emoji=heart04>」"
translation = "「그, 그러니까 말이야…… 사양 말고 잔뜩 싸줘…… 신이 싸고 싶은 만큼…… 나한테 쏟아부어도 되니까<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「あんっ<emoji=heart04>\u3000今ナカでビクンってしたぁ<emoji=heart04>\u3000もう、シンのえっち<emoji=heart04>」"
translation = "「아앙<emoji=heart04> 방금 안에서 움찔했어어<emoji=heart04> 정말, 신은 변태<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「でも……気持ちいいもんね。もっとしたいって思うのも、当然だよね<emoji=heart04>」"
translation = "「하지만…… 기분 좋은걸. 더 하고 싶다고 생각하는 것도 당연하지<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「アタシだって、そのぉ……<emoji=heart04>\u3000もぉ、バカぁ<emoji=heart04>\u3000今、人のことえっちだーって思ったでしょ？」"
translation = "「나도, 그게……<emoji=heart04> 정말, 바보오<emoji=heart04> 방금 남보고 변태라고 생각했지?」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「んぅぅ……<emoji=heart04>\u3000やっと射精終わったの？\u3000スッキリした？」"
translation = "「응으으……<emoji=heart04> 드디어 사정 끝났어? 시원해?」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「えへへ……彼氏を満足させられて、彼女的には達成感あり、かな<emoji=heart04>」"
translation = "「에헤헤…… 남자친구를 만족시켜서 여자친구로서는 달성감 있네, 일까나<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「もちろん、これで満足したわけじゃないよ。お互いに……ねっ<emoji=heart04>」"
translation = "「물론 이걸로 만족한 건 아니야. 서로…… 그치?<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「シンのおち○ちんも、アタシの中でまだ出したいよ～って言ってるし<emoji=heart04>」"
translation = "「신의 자지도 내 안에서 아직 더 싸고 싶어~ 라고 말하고 있고<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「んぁっ<emoji=heart04>\u3000抜けちゃう……あぁ～、抜けちゃった……」"
translation = "「응아앗<emoji=heart04> 빠진다…… 아아~ 빠져버렸다……」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「はぁ<emoji=heart04>\u3000はぁ<emoji=heart04>\u3000はぁ<emoji=heart04>\u3000あんなにおっきいのが入ってたから、ちょっとだけ喪失感」"
translation = "「하아<emoji=heart04> 하아<emoji=heart04> 하아<emoji=heart04> 그렇게 큰 게 들어있었으니까 조금은 상실감」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「んんっ……<emoji=heart04>\u3000せっかく入れてもらったのも、漏れて出ちゃう<emoji=heart04>」"
translation = "「응으읏……<emoji=heart04> 기껏 넣어준 것도 새어 나와버려<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「やんっ<emoji=heart04>\u3000こら、かき出さなくてもいいんだからねっ。どうせもっと……たっぷり注いでもらうんだし<emoji=heart04>」"
translation = "「야앙<emoji=heart04> 이봐, 긁어내지 않아도 된다니까. 어차피 더…… 듬뿍 쏟아부어 줄 거잖아<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「ねえ、シン……<emoji=heart04>\u3000シンの精液のせいで、アタシえっちな子になっちゃった<emoji=heart04>」"
translation = "「저기, 신……<emoji=heart04> 신의 정액 때문에 나 야한 아이가 되어버렸어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「やらしくなった彼女を……彼氏さんはどうするつもり？」"
translation = "「야해진 여자친구를…… 남자친구님은 어쩔 셈이야?」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「シンがしたいこと……何でもしていいんだからね<emoji=heart04>」"
translation = "「신이 하고 싶은 거…… 뭐든지 해도 되니까 말이야<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「ふふっ、おち○ちん上向いたぁ<emoji=heart04>\u3000もう、元気なんだから<emoji=heart04>」"
translation = "「후훗, 자지가 위를 향했네<emoji=heart04> 정말, 기운 넘치니까<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「あ、でもこれ以上ここでするのはまずいかな？\u3000どうする？\u3000バレるの前提で続けちゃう？」"
translation = "「아, 근데 더 이상 여기서 하는 건 좀 그런가? 어떻게 할래? 들키는 거 전제로 계속해버려?」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「って、それはさすがにまずいか～。今気付かれなかったのは、ラッキーだったってことで……」"
translation = "「라니, 그건 역시 좀 그런가~. 방금 안 들킨 건 운이 좋았던 걸로 하고……」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「じゃあ、続きは……どっちかの部屋で……ね？\u3000たくさんエッチしよ<emoji=heart04>」"
translation = "「그럼 다음은…… 둘 중 한 명 방에서…… 응? 잔뜩 야한 짓 하자<emoji=heart04>」"

