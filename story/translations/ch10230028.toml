[[dialogue]]
speaker = "unk"
original = "クリスマスの夜。俺はシャロンに呼び出されて深夜のカフェテリアを訪れていた。"
translation = "크리스마스 밤. 나는 샤론의 부름을 받고 심야의 카페테리아를 방문했다."

[[dialogue]]
speaker = "unk"
original = "『どうしても会長さまにお渡ししたいプレゼントがあるんです』──シャロンがそう話していたのを思い出す。"
translation = "『꼭 회장님께 드리고 싶은 선물이 있어요』── 샤론이 그렇게 말했던 것이 떠오른다."

[[dialogue]]
speaker = "unk"
original = "だけどどこにもプレゼントらしき物は見当たらない……というか、そもそも暗くてよくわからないと……"
translation = "하지만 어디에도 선물 같은 건 보이지 않는다…… 아니, 애초에 어두워서 잘 모르겠다고 생각하는데……"

[[dialogue]]
speaker = "シャロン"
original = "「くしゅん……！」"
translation = "「에취……!」"

[[dialogue]]
speaker = "unk"
original = "不意にどこからともなく可愛いくしゃみが聞こえてきた。"
translation = "갑자기 어디선가 귀여운 재채기 소리가 들려왔다."

[[dialogue]]
speaker = "unk"
original = "その声のする方へ行ってみると──"
translation = "그 소리가 나는 쪽으로 가보니──"

[[dialogue]]
speaker = "シャロン"
original = "「あ……会長さま<emoji=heart04>\u3000お待ちしておりました<emoji=heart04>」"
translation = "「아…… 회장님❤️ 기다리고 있었어요❤️」"

[[dialogue]]
speaker = "クロト"
original = "「シャ、シャロン！？」"
translation = "「샤, 샤론!?」"

[[dialogue]]
speaker = "シャロン"
original = "「えへへ……<emoji=heart04>\u3000ちょっぴり大胆すぎましたかね……<emoji=heart04>\u3000自分でもずっと心臓の音が鳴り止まないくらいで……<emoji=heart04>」"
translation = "「에헤헤……❤️ 조금 너무 대담했나요……❤️ 저 스스로도 계속 심장 소리가 멈추지 않을 정도라……❤️」"

[[dialogue]]
speaker = "unk"
original = "クリームまみれの体を恥ずかしそうにくねらせるシャロン。"
translation = "크림 범벅이 된 몸을 부끄러운 듯 배배 꼬는 샤론."

[[dialogue]]
speaker = "unk"
original = "もしかしてプレゼントっていうのは──"
translation = "설마 선물이라는 건──"

[[dialogue]]
speaker = "シャロン"
original = "「はい……私がプレゼントです……<emoji=heart04>\u3000せっかくのクリスマスですから、会長さまに私というクリスマスケーキを召し上がっていただこうかと思いまして……<emoji=heart04>」"
translation = "「네…… 제가 선물이에요……❤️ 모처럼의 크리스마스니까 회장님께 저라는 크리스마스 케이크를 드시게 할까 해서요……❤️」"

[[dialogue]]
speaker = "シャロン"
original = "「どうぞ、ご遠慮なく召し上がってください<emoji=heart04>\u3000会長さまに恥ずかしい姿を見られて、体も、その……<emoji=heart04>\u3000火照り始めてしまっていますし……<emoji=heart04>」"
translation = "「자, 사양 말고 드셔주세요❤️ 회장님께 부끄러운 모습을 보여서 몸도, 그……❤️ 달아오르기 시작했으니까요……❤️」"

[[dialogue]]
speaker = "unk"
original = "肌の熱で溶けたクリームがシャロンの大きな乳房やお腹をいやらしく伝っていく。"
translation = "피부의 열기로 녹은 크림이 샤론의 커다란 유방과 배를 음란하게 타고 흘러내린다."

[[dialogue]]
speaker = "unk"
original = "その扇情的な光景と甘いクリームの匂いが瞬く間に俺の理性を吹き飛ばしていって──"
translation = "그 선정적인 광경과 달콤한 크림 냄새가 순식간에 나의 이성을 날려버렸고──"

[[dialogue]]
speaker = "シャロン"
original = "「あぁんっ……ひぃあっ、あふっ……<emoji=heart04>\u3000んはぁ、おっぱい舐められてしまっています……<emoji=heart04>\u3000恥ずかしっ、あぁんっ、でも嬉しいっ……<emoji=heart04>」"
translation = "「아앙…… 히익, 아후……❤️ 하아, 가슴을 핥아지고 있어요……❤️ 부끄러워, 아앙, 그래도 기뻐……❤️」"

[[dialogue]]
speaker = "シャロン"
original = "「いかがでしょう、あっ……はぁんっ……<emoji=heart04>\u3000お口に合いましたか<emoji=heart04>\u3000会長さまへの特製クリスマスケーキ……<emoji=heart04>」"
translation = "「어떠신가요, 앗…… 하앙……❤️ 입맛에 맞으시나요❤️ 회장님을 위한 특제 크리스마스 케이크……❤️」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、最高に美味しいよ」"
translation = "「아아, 최고로 맛있어」"

[[dialogue]]
speaker = "シャロン"
original = "「え、えへへ……光栄です……<emoji=heart04>\u3000隅々まで、はぁはぁ、召し上がってくださって構いませんからね……<emoji=heart04>」"
translation = "「에, 에헤헤…… 영광이에요……❤️ 구석구석까지, 하아 하아, 드셔도 상관없으니까요……❤️」"

[[dialogue]]
speaker = "シャロン"
original = "「おっぱいも、お腹も、アソコも……<emoji=heart04>\u3000もちろん、んっ……唇も……ちゅっ、ちゅっ……<emoji=heart04>」"
translation = "「가슴도, 배도, 거기도……❤️ 물론, 음…… 입술도…… 쪽, 쪽……❤️」"

[[dialogue]]
speaker = "unk"
original = "シャロンはクリーム以上に甘い接吻をプレゼントしながら、好きに触っていいとばかりに俺の手を自分の胸に乗せる。"
translation = "샤론은 크림보다 달콤한 입맞춤을 선물하며, 마음껏 만져도 좋다는 듯 내 손을 자신의 가슴 위에 얹는다."

[[dialogue]]
speaker = "unk"
original = "生クリームで潤んだ乳房はいつも以上にツヤが出ていて、食べ心地はもちろん、揉み心地も抜群だった。"
translation = "생크림으로 젖은 유방은 평소보다 더 윤기가 흘렀고, 맛은 물론 주무르는 느낌도 발군이었다."

[[dialogue]]
speaker = "unk"
original = "だけど、こんなに興奮させられてしまうと──"
translation = "하지만 이렇게 흥분하게 되면──"

[[dialogue]]
speaker = "シャロン"
original = "「はぁはぁ、いいんですよ……<emoji=heart04>」"
translation = "「하아 하아, 괜찮아요……❤️」"

[[dialogue]]
speaker = "unk"
original = "俺の心中を察したようにシャロンがズボンのチャックを開けてくる。"
translation = "내 마음을 알아챈 듯 샤론이 바지 지퍼를 내린다."

[[dialogue]]
speaker = "シャロン"
original = "「私の体……会長さまの召し上がりたいように召し上がってください<emoji=heart04>\u3000私も今夜は、はぁはぁ……<emoji=heart04>\u3000最後まで召し上がっていただきたいです……<emoji=heart04>」"
translation = "「제 몸…… 회장님이 드시고 싶은 대로 드셔주세요❤️ 저도 오늘 밤은, 하아 하아……❤️ 끝까지 먹히고 싶어요……❤️」"

[[dialogue]]
speaker = "unk"
original = "今までシャロンとエッチする時は必ずお尻でだったけど、シスターとしてはお尻でさせてくれることすら極めて寛大だったと言える。"
translation = "지금까지 샤론과 섹스할 때는 반드시 엉덩이로만 했지만, 시스터로서 엉덩이를 허락해 준 것만으로도 극히 관대했다고 할 수 있다."

[[dialogue]]
speaker = "シャロン"
original = "「あ……。もしかしてお尻の方がお好みだったでしょうか……？」"
translation = "「아……. 혹시 엉덩이 쪽이 취향이셨나요……?」"

[[dialogue]]
speaker = "シャロン"
original = "「会長さまがそう仰るのでしたら……。お尻の方もいつも通りしっかりと清めておりますので……」"
translation = "「회장님이 그렇게 말씀하신다면……. 엉덩이 쪽도 평소처럼 깨끗이 씻어두었으니까……」"

[[dialogue]]
speaker = "クロト"
original = "「そうじゃなくて……いいのか？\u3000初めての相手が俺で」"
translation = "「그게 아니라…… 괜찮겠어? 첫 상대가 나라도」"

[[dialogue]]
speaker = "シャロン"
original = "「もちろんでございますよ。そうでなければ私もこのようなことはいたしません……<emoji=heart04>\u3000誰でもない会長さまにもらっていただきたいのです。この聖なる夜に……」"
translation = "「물론이지요. 그렇지 않다면 저도 이런 짓은 하지 않아요……❤️ 다른 누구도 아닌 회장님이 가져가 주셨으면 해요. 이 성스러운 밤에……」"

[[dialogue]]
speaker = "シャロン"
original = "「心の底からお慕いしているあなたさまに初めてを捧げるのであれば……きっと女神さまも祝福してくださるでしょうから」"
translation = "「마음속 깊이 사모하는 당신께 처음을 바치는 것이라면…… 분명 여신님도 축복해 주실 테니까요」"

[[dialogue]]
speaker = "unk"
original = "キャンドルの灯りでもはっきりとわかるくらいシャロンが顔を赤くして微笑みかけてくる。"
translation = "촛불 빛으로도 선명히 보일 정도로 샤론이 얼굴을 붉히며 미소 짓는다."

[[dialogue]]
speaker = "unk"
original = "大きく開かれた股間も仄かに光っていたのは、きっと生クリームのせいだけじゃないだろう。"
translation = "크게 벌어진 가랑이가 은은하게 빛나고 있었던 것은 분명 생크림 때문만은 아닐 것이다."

[[dialogue]]
speaker = "シャロン"
original = "「どうか召し上がっていただけますか？\u3000今まで食べさせてあげられなかった私の体を、今夜こそは大好きなあなたさまに捧げたいのです……」"
translation = "「부디 드셔주시겠어요? 지금까지 맛보게 해드리지 못했던 제 몸을 오늘 밤이야말로 사랑하는 당신께 바치고 싶어요……」"

[[dialogue]]
speaker = "シャロン"
original = "「それとも、こんなクリスマスプレゼントは、罰当たりすぎますかね……？」"
translation = "「아니면 이런 크리스마스 선물은 너무 벌받을 짓일까요……?」"

[[dialogue]]
speaker = "unk"
original = "返事代わりに、ガチガチに勃起したペニスを彼女の秘部へそっと押し当てる。"
translation = "대답 대신 팽팽하게 발기한 자지를 그녀의 비부에 살며시 갖다 댄다."

[[dialogue]]
speaker = "シャロン"
original = "「ふぁぁぁ……<emoji=heart04>\u3000先っぽが当たって……<emoji=heart04>」"
translation = "「후아아아……❤️ 끝부분이 닿아서……❤️」"

[[dialogue]]
speaker = "クロト"
original = "「挿れたら我慢できずに動くかもしれない」"
translation = "「삽입하면 참지 못하고 움직일지도 몰라」"

[[dialogue]]
speaker = "シャロン"
original = "「はぁはぁ、構いませんよ……<emoji=heart04>\u3000むしろたくさん動いて欲しいです……<emoji=heart04>」"
translation = "「하아 하아, 상관없어요……❤️ 오히려 잔뜩 움직여 주셨으면 해요……❤️」"

[[dialogue]]
speaker = "シャロン"
original = "「大好きなあなたさまに、んっ、ちゅっ……<emoji=heart04>\u3000私の体を心ゆくまで味わっていただきたいですから……<emoji=heart04>」"
translation = "「사랑하는 당신께, 음, 쪽……❤️ 제 몸을 마음껏 맛보게 해드리고 싶으니까요……❤️」"

[[dialogue]]
speaker = "unk"
original = "挿入を待ち焦がれるようにシャロンがキスしてくると、俺は唇を重ね返しながらゆっくりとペニスを沈めて──"
translation = "삽입을 애타게 기다리듯 샤론이 키스해 오자, 나는 입술을 겹치며 천천히 자지를 밀어 넣었고──"

[[dialogue]]
speaker = "シャロン"
original = "「あっ──はぁああああんんんっっ～～<emoji=heart04>\u3000ふぁっ、あぁっ……あっ、はぁあんっっ……<emoji=heart04>」"
translation = "「앗── 하아아아앙앙앗~~❤️ 후아, 아아…… 앗, 하아앙앗……❤️」"

[[dialogue]]
speaker = "シャロン"
original = "「はいっ、入ってっ……<emoji=heart04>\u3000会長さまのおち○ちんが、確かに私の膣内にっ……<emoji=heart04>」"
translation = "「네에, 들어와서……❤️ 회장님의 자지가 확실히 제 질 안에……❤️」"

[[dialogue]]
speaker = "シャロン"
original = "「幸せっ、ですっ……<emoji=heart04>\u3000ようやく私、会長さまに、あっ、あっ、操を捧げることができたのですねっ……<emoji=heart04>」"
translation = "「행복해요앗……❤️ 드디어 저, 회장님께, 앗, 앗, 정조를 바칠 수 있게 된 거군요앗……❤️」"

[[dialogue]]
speaker = "unk"
original = "官能的な嬌声を上げて悶えながら、シャロンが繋がった場所を嬉しそうに見つめる。"
translation = "관능적인 교성을 지르며 몸부림치면서 샤론이 연결된 곳을 기쁜 듯이 바라본다."

[[dialogue]]
speaker = "unk"
original = "本当なら痛みが収まるまでじっとしていたいが、シャロンの膣内があまりにも気持ち良くて、腰が勝手に動いてしまう。"
translation = "원래라면 통증이 가라앉을 때까지 가만히 있고 싶지만, 샤론의 질 안이 너무나 기분 좋아서 허리가 멋대로 움직인다."

[[dialogue]]
speaker = "シャロン"
original = "「お気になさらずとも、あっ、はぁっ、構いませんよっ……<emoji=heart04>\u3000ちっとも、ふぁぁっ、痛くありませんからっ……<emoji=heart04>」"
translation = "「신경 쓰지 않으셔도, 앗, 하아, 괜찮아요앗……❤️ 조금도, 후아아, 아프지 않으니까요앗……❤️」"

[[dialogue]]
speaker = "シャロン"
original = "「むしろ、とまって欲しくありませんっ……<emoji=heart04>\u3000動いてっ、あっ、あっ、動き続けてくださいっ……<emoji=heart04>」"
translation = "「오히려 멈추지 말아 주세요앗……❤️ 움직여줘요, 앗, 앗, 계속 움직여 주세요앗……❤️」"

[[dialogue]]
speaker = "シャロン"
original = "「もっと感じたいんですっ……<emoji=heart04>\u3000会長さまと繋がってる感覚をっ……<emoji=heart04>\u3000あなたのおち○ちんの感触をっ……<emoji=heart04>」"
translation = "「더 느끼고 싶어요앗……❤️ 회장님과 연결되어 있는 감각을……❤️ 당신의 자지의 감촉을……❤️」"

[[dialogue]]
speaker = "unk"
original = "そう言ってシャロンがただでさえ狭いおま○こをさらに締め付けてきてくれる。"
translation = "그렇게 말하며 샤론이 가뜩이나 좁은 보지를 더욱 조여온다."

[[dialogue]]
speaker = "unk"
original = "火傷しそうなくらい熱い愛液にペニスが包まれて気持ちいい。"
translation = "데일 정도로 뜨거운 애액에 자지가 감싸여 기분이 좋다."

[[dialogue]]
speaker = "unk"
original = "トロトロの柔肉が四方八方から絡みついてきて──"
translation = "걸쭉한 부드러운 살결이 사방팔방에서 얽혀와서──"

[[dialogue]]
speaker = "シャロン"
original = "「嬉しいっ、あふぁっ、幸せっ……<emoji=heart04>\u3000私、本当に、あっ、あっ、会長さまとセックスしていてっ……<emoji=heart04>」"
translation = "「기뻐요앗, 아후아, 행복해……❤️ 저, 정말로, 앗, 앗, 회장님과 섹스하고 있어서……❤️」"

[[dialogue]]
speaker = "シャロン"
original = "「お尻ではなく、アソコでっ……<emoji=heart04>\u3000おち○ちんとおま○こでっ……<emoji=heart04>」"
translation = "「엉덩이가 아니라 거기로……❤️ 자지와 보지로……❤️」"

[[dialogue]]
speaker = "シャロン"
original = "「ダメです、ふぁぁぁっ、イ、イっちゃっ……<emoji=heart04>\u3000幸せすぎて、あっ、あっ、あっ、イってしまいますっ……<emoji=heart04>」"
translation = "「안 돼요, 후아아아, 가, 가버렷……❤️ 너무 행복해서, 앗, 앗, 앗, 가버려요앗……❤️」"

[[dialogue]]
speaker = "unk"
original = "まだ動き始めたところなのに、シャロンがビクンビクンと体を痙攣させてテーブルをギシギシと揺らす。"
translation = "이제 막 움직이기 시작했을 뿐인데 샤론이 파르르 몸을 경련하며 테이블을 삐걱삐걱 흔든다."

[[dialogue]]
speaker = "unk"
original = "それだけ俺とのセックスを幸せに思ってくれていると思うと、さらに腰が止まらなくなってしまう。"
translation = "그만큼 나와의 섹스를 행복하게 여기고 있다고 생각하니 더욱 허리가 멈추지 않게 된다."

[[dialogue]]
speaker = "シャロン"
original = "「はぁっ、あっ、あんっ<emoji=heart04>\u3000会長さまのおち○ちん、大きくて……はぁっ、あんっ<emoji=heart04>」"
translation = "「하아, 앗, 앙❤️ 회장님의 자지, 커서…… 하아, 앙❤️」"

[[dialogue]]
speaker = "シャロン"
original = "「子宮にっ、赤ちゃんの部屋にっ、あっ、あっ、おち○ちんがズンズンきてっ……<emoji=heart04>」"
translation = "「자궁에, 아기 방에, 앗, 앗, 자지가 푹푹 들어와서……❤️」"

[[dialogue]]
speaker = "シャロン"
original = "「これだけで、はふぁぁっ、懐妊してしまいそうっ……<emoji=heart04>\u3000おま○こ、キュンキュンして……はっ……ああぁんっ<emoji=heart04>」"
translation = "「이것만으로도, 하후아아, 임신해 버릴 것 같아요……❤️ 보지가 큥큥거려서…… 하…… 아아앙❤️」"

[[dialogue]]
speaker = "unk"
original = "亀頭が奥にぶつかると、ねだるように子宮口が吸いついてくる。"
translation = "귀두가 안쪽에 부딪히자 조르듯이 자궁구가 달라붙는다."

[[dialogue]]
speaker = "unk"
original = "それだけシャロンが俺の子種を求めているのがわかって、めちゃくちゃに興奮が高まった。"
translation = "그만큼 샤론이 내 씨앗을 원하고 있다는 것이 느껴져 미친 듯이 흥분이 고조되었다."

[[dialogue]]
speaker = "シャロン"
original = "「くはぁぁっ、あっ、はぁぁぁっっ……<emoji=heart04><emoji=heart04>\u3000おち○ちんっ、どんどん膨らんでっ……<emoji=heart04><emoji=heart04>」"
translation = "「쿠하아아, 앗, 하아아아앗……❤️❤️ 자지, 점점 부풀어서……❤️❤️」"

[[dialogue]]
speaker = "シャロン"
original = "「会長さまも感じてくださってっ……<emoji=heart04>\u3000私の体で気持ち良くなってくださってっ……<emoji=heart04>」"
translation = "「회장님도 느껴주셔서……❤️❤️ 제 몸으로 기분 좋아져 주셔서……❤️❤️」"

[[dialogue]]
speaker = "シャロン"
original = "「もっと、んふぁぁぁっ……<emoji=heart04>\u3000もっと気持ち良くなってくださいっ……<emoji=heart04>」"
translation = "「더, 음후아아아……❤️ 더 기분 좋아져 주세요앗……❤️」"

[[dialogue]]
speaker = "シャロン"
original = "「私の体を味わい尽くして欲しいんですっ……<emoji=heart04>\u3000今までお尻で我慢させてしまった分、召し上がっていただきたいんですっ……<emoji=heart04>」"
translation = "「제 몸을 맛보아 주셨으면 해요앗……❤️ 지금까지 엉덩이로 참게 해드린 만큼 드셔주셨으면 해요앗……❤️」"

[[dialogue]]
speaker = "シャロン"
original = "「私もっ、んっ、んちゅぅっ、ちゅぁむぅんっ……<emoji=heart04>\u3000ずっと会長さまに食べられたいと思っておりましたからっ……<emoji=heart04>」"
translation = "「저도, 음, 음츄우, 츄아무웅……❤️ 계속 회장님께 먹히고 싶다고 생각했으니까요앗……❤️」"

[[dialogue]]
speaker = "unk"
original = "火照りきった唇をシャロンがしゃにむに重ねてきてくれる。"
translation = "달아오른 입술을 샤론이 막무가내로 겹쳐온다."

[[dialogue]]
speaker = "unk"
original = "自ら俺に食べられようと、ぎゅっと俺に抱きついてくれる。"
translation = "스스로 나에게 먹히려는 듯 꽉 나에게 매달린다."

[[dialogue]]
speaker = "unk"
original = "そこには貞淑なシスターとしての彼女の姿はない。"
translation = "그곳에 정숙한 시스터로서의 그녀의 모습은 없다."

[[dialogue]]
speaker = "unk"
original = "今、目の前にいるのは──"
translation = "지금 눈앞에 있는 것은──"

[[dialogue]]
speaker = "シャロン"
original = "「好きっ、あぁんっ、好きなんですっ……<emoji=heart04>\u3000会長さまのことが大好きっ……<emoji=heart04>」"
translation = "「좋아해요, 아앙, 좋아해요앗……❤️ 회장님을 너무 좋아해……❤️」"

[[dialogue]]
speaker = "シャロン"
original = "「本当はずっと、あっ、あっ、お尻ではなくおま○こで、あなたのおち○ちんを受け止めたかったっ……<emoji=heart04>」"
translation = "「사실은 계속, 앗, 앗, 엉덩이가 아니라 보지로 당신의 자지를 받아내고 싶었어……❤️」"

[[dialogue]]
speaker = "シャロン"
original = "「こうして私の全てを、あなたにプレゼントしたかったっ……<emoji=heart04>」"
translation = "「이렇게 저의 모든 것을 당신에게 선물하고 싶었어……❤️」"

[[dialogue]]
speaker = "シャロン"
original = "「大好きな会長さまと、ふぁっ、あぁあんっ……<emoji=heart04>\u3000たくさんたくさん、愛し合いたかったんですっ……<emoji=heart04>」"
translation = "「사랑하는 회장님과, 후아, 아아앙……❤️ 많이 많이 사랑을 나누고 싶었어요앗……❤️」"

[[dialogue]]
speaker = "unk"
original = "ただひたすらに俺を一途に思ってくれる女の子だけだ──"
translation = "그저 한결같이 나만을 생각하는 여자아이뿐이다──"

[[dialogue]]
speaker = "シャロン"
original = "「くはっ、あっ、あっ、あっ、あっ、あぁぁあああああっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「쿠하, 앗, 앗, 앗, 앗, 아아아아아아앗~~❤️❤️❤️」"

[[dialogue]]
speaker = "シャロン"
original = "「激しっ、あふぁあっ、嬉しいっっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000会長さまが、あっ、あっ、あっ、こんなにも私に夢中になってくださってっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「격렬해, 아후아앗, 기뻐어❤️❤️❤️ 회장님이, 앗, 앗, 앗, 이렇게나 저에게 빠져주셔서❤️❤️❤️」"

[[dialogue]]
speaker = "シャロン"
original = "「あぁっ、イクっ、イクイクイクぅぅっっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000んん～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아앗, 가, 가버렷, 가버려 가버려 가버렷어어어<emoji=heart04><emoji=heart04><emoji=heart04> 응으으～～～～읏<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「はぁ、はぁは……我慢できなっ、はしたなく、ふぁぁぁっ、果ててしまってっっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하아, 하아 하아…… 참을 수 없어엇, 천박하게, 화아아앗, 가버리고 말아서어엇……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "激しいばかりのピストンを受けて、シャロンが何度も何度も絶頂してくれる。"
translation = "격렬하기만 한 피스톤질을 받으며, 샤론이 몇 번이고 몇 번이고 절정에 달한다."

[[dialogue]]
speaker = "unk"
original = "彼女の俺への想いがこれ以上ないほど伝わってきて、その姿がさらに抽挿を加速させてくる。"
translation = "그녀의 나를 향한 마음이 이보다 더할 수 없을 정도로 전해져 와서, 그 모습이 더욱 삽입을 가속시킨다."

[[dialogue]]
speaker = "シャロン"
original = "「会長さまっ、あっ、あっ、会長さまっ<emoji=heart04>\u3000お慕いしておりますっ、会長さまぁっ<emoji=heart04>」"
translation = "「회장님, 앗, 앗, 회장님<emoji=heart04> 사모하고 있습니다앗, 회장님으으앗<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「どうか私をっ、ふぁっ、あっ、あっ、私をあなたの女にっ、女にしてくださいっ……<emoji=heart04>」"
translation = "「부디 저를, 화앗, 앗, 앗, 저를 당신의 여자로, 여자로 만들어 주세요옷……<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「今この瞬間だけはシスターであることも忘れてしまうくらい愛して欲しいっ……<emoji=heart04>\u3000１人の女になりたいっ……<emoji=heart04>」"
translation = "「지금 이 순간만큼은 시스터라는 것도 잊어버릴 정도로 사랑해 주길 원해요옷……<emoji=heart04> 한 명의 여자가 되고 싶어욧……<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「ワガママなことを言って申し訳ありませんっ……<emoji=heart04>\u3000だけどっ、あっ、あっ、私っ、私っっ……<emoji=heart04>」"
translation = "「이기적인 말을 해서 죄송합니다앗……<emoji=heart04> 하지만, 앗, 앗, 저, 저어엇……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ワガママなもんか。"
translation = "이기적이라니."

[[dialogue]]
speaker = "unk"
original = "俺だってシャロンを自分のものにしたいんだから……！"
translation = "나 역시 샤론을 내 것으로 만들고 싶으니까……!"

[[dialogue]]
speaker = "シャロン"
original = "「はふぁあああああっっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あはぁんっ、あぁっ、あっ、あっ、あぁぁああああっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하후아아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 아하앙, 아앗, 앗, 앗, 아아아아아아아앗～～<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「しゅごいっ<emoji=heart04>\u3000おち○ちんっ、バキバキになってっ<emoji=heart04>\u3000ドクンドクン震えてっっ<emoji=heart04>」"
translation = "「대단해욧<emoji=heart04> 자지, 바짝 서서엇<emoji=heart04> 두근두근 떨리고 있어엇<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「会長さまの子種がっ、精子がのぼってきてるのわかりますっ<emoji=heart04>\u3000私をあなたの女にしてくれようとしてるのがわかりますっ<emoji=heart04>」"
translation = "「회장님의 씨앗이, 정액이 올라오고 있는 게 느껴져요옷<emoji=heart04> 저를 당신의 여자로 만들어 주려 한다는 걸 알 수 있어요옷<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「受精させてくださいっ<emoji=heart04>\u3000孕ませてくださいっ<emoji=heart04>\u3000あなたのお子を宿したいっ……<emoji=heart04>\u3000このままっ、このままっ……<emoji=heart04>」"
translation = "「수정시켜 주세요옷<emoji=heart04> 임신시켜 주세요옷<emoji=heart04> 당신의 아이를 품고 싶어욧……<emoji=heart04> 이대로, 이대로……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺もシャロンを孕ませたい。"
translation = "나도 샤론을 임신시키고 싶다."

[[dialogue]]
speaker = "unk"
original = "大切な初めてを捧げてくれた彼女に、こんなにも俺を想ってくれている彼女に、俺の精子を受け止めてもらいたい！"
translation = "소중한 처음을 바쳐준 그녀에게, 이렇게나 나를 생각해 주는 그녀에게, 나의 정액을 받아내게 하고 싶어!"

[[dialogue]]
speaker = "シャロン"
original = "「あっ、あっ、あっ<emoji=heart04>\u3000きてるっ、きてますっ、ああああっ、感じるだけでイクっ<emoji=heart04>\u3000イクイクイクぅっっ<emoji=heart04>」"
translation = "「앗, 앗, 앗<emoji=heart04> 오고 있어, 오고 있어요옷, 아아아앗, 느끼는 것만으로 가버렷<emoji=heart04> 가버려 가버려 가버려엇<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「出してっ、ふぁっ、あっ、あぁっ、出してくださいっ<emoji=heart04>\u3000私の子宮にっ、赤ちゃんの部屋にっ<emoji=heart04>」"
translation = "「내보내 줘요, 화앗, 앗, 아앗, 내보내 주세요옷<emoji=heart04> 제 자궁에, 아기방에에옷<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「大好きなあなたの精子っ、あなたの子種っ<emoji=heart04>\u3000この聖なる夜に、たくさんたくさんっ<emoji=heart04>」"
translation = "「정말 좋아하는 당신의 정액, 당신의 씨앗<emoji=heart04> 이 성스러운 밤에, 가득가득히옷<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「プレゼントっ──していただきたいですぅぅっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「선물──해주셨으면 해요오오옷～～<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「ふぁっ──あっ、あはぁああああああああんんんんっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「화앗──앗, 아하아아아아아아아앙으으으으읏～～<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "子宮口にペニスの先端を押しつけて、彼女のお腹にありったけの精子を注ぎ込む。"
translation = "자궁구에 페니스의 끝을 밀어붙이고, 그녀의 배 안에 있는 대로 정액을 쏟아붓는다."

[[dialogue]]
speaker = "シャロン"
original = "「熱いっ……<emoji=heart04>\u3000いっぱい入ってっ……<emoji=heart04>\u3000会長さまの精子っ、あっ、あふぁぁぁっ、ドピュドピュきてぇっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「뜨거워어……<emoji=heart04> 잔뜩 들어와서어……<emoji=heart04> 회장님의 정액, 앗, 아후아아앗, 푸슉푸슉 나오고 있어어……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「し、しあわへっ……<emoji=heart04>\u3000はふぁぁぁ……<emoji=heart04>\u3000しあわへれふぅっ……<emoji=heart04>\u3000会長さまの子種が、お腹の中にぃ……っ……<emoji=heart04>」"
translation = "「해, 행복해여……<emoji=heart04> 하후아아아……<emoji=heart04> 행복해여어어엇……<emoji=heart04> 회장님의 씨앗이, 배 속에에……읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ぎゅっと彼女の体を抱き締めて、一滴残らず膣内へ出していく。"
translation = "꽉 그녀의 몸을 껴안고, 한 방울도 남기지 않고 질 내에 사정한다."

[[dialogue]]
speaker = "unk"
original = "そして、どれだけ射精し続けていたか……"
translation = "그리고, 얼마나 계속 사정하고 있었을까……"

[[dialogue]]
speaker = "シャロン"
original = "「ふぁ……<emoji=heart04>\u3000はぁー、はぁー、はぁー……<emoji=heart04>\u3000こんなになるほど、はぁはぁ、たくさん注いでくださって……<emoji=heart04>」"
translation = "「후아……<emoji=heart04> 하아─, 하아─, 하아─……<emoji=heart04> 이렇게 될 정도로, 하아하아, 잔뜩 쏟아주셔서……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "精を出し尽くして一回り小さくなったペニスを見て、シャロンがのぼせた顔で微笑む。"
translation = "정을 다 쏟아내고 한층 작아진 페니스를 보며, 샤론이 황홀한 얼굴로 미소 짓는다."

[[dialogue]]
speaker = "シャロン"
original = "「えへへ……<emoji=heart04>\u3000すみません、プレゼントを贈るつもりがついプレゼントをねだってしまって……<emoji=heart04>」"
translation = "「에헤헤……<emoji=heart04> 죄송해요, 선물을 드릴 생각이었는데 그만 선물을 조르고 말아서……<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「ですが本当に嬉しいです……<emoji=heart04>\u3000こんなにもたくさん会長さまの子種を、愛を、注いでいただけて……<emoji=heart04>」"
translation = "「하지만 정말 기뻐요……<emoji=heart04> 이렇게나 잔뜩 회장님의 씨앗을, 사랑을, 쏟아주셔서……<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「おかげで最高のクリスマスになりました……<emoji=heart04>\u3000会長さまからのクリスマスプレゼント、えへへ、大切にいたしますね……<emoji=heart04>」"
translation = "「덕분에 최고의 크리스마스가 되었어요……<emoji=heart04> 회장님이 주신 크리스마스 선물, 에헤헤, 소중히 간직할게요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "幸せそうにお腹を撫でるシャロン。"
translation = "행복하게 배를 쓰다듬는 샤론."

[[dialogue]]
speaker = "unk"
original = "その嬉しそうな顔を、仕草を見ているだけで、またしても愛が込み上がってくる。"
translation = "그 기뻐 보이는 얼굴을, 몸짓을 보는 것만으로도, 또다시 사랑이 북받쳐 오른다."

[[dialogue]]
speaker = "シャロン"
original = "「……ふふ、良ければおかわりも召し上がりますか？」"
translation = "「……후후, 괜찮으시다면 한 그릇 더 드시겠어요?」"

[[dialogue]]
speaker = "シャロン"
original = "「私もまだまだ会長さまに食べてもらいたいです……<emoji=heart04>」"
translation = "「저도 아직 회장님이 더 먹어주셨으면 해요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺の昂ぶりを察したようにシャロンがおま○こを擦り付ける。"
translation = "나의 고양감을 알아챈 듯 샤론이 보지를 비벼온다."

[[dialogue]]
speaker = "シャロン"
original = "「会長さまのエッチなクリームで、私の体をデコレートしちゃってください……<emoji=heart04>」"
translation = "「회장님의 야한 크림으로, 제 몸을 데코레이션해 주세요……<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「忘れられないホワイトクリスマスを、会長さまと過ごしたいです……<emoji=heart04>」"
translation = "「잊을 수 없는 화이트 크리스마스를, 회장님과 보내고 싶어요……<emoji=heart04>」"

