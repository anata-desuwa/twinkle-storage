[[dialogue]]
speaker = "unk"
original = "第３話,マジカル新婚ドリーマー,P"
translation = "제3화, 매지컬 신혼 드리머, P"

[[dialogue]]
speaker = "unk"
original = "目を覚ましたら、何故かリビングのソファーの上。"
translation = "눈을 떴더니, 왠지 거실 소파 위."

[[dialogue]]
speaker = "unk"
original = "しかもリーリアは新婚ごっこのような話ぶりで、俺は困惑してしまっていた。"
translation = "게다가 리리아는 신혼 놀이를 하는 듯한 말투여서, 나는 당혹스러워하고 있었다."

[[dialogue]]
speaker = "リーリア"
original = "「そうですよ～☆\u3000私とセンパイは学園を卒業した後に結婚して、今はこうして一緒に暮らしてるんじゃないですか～」"
translation = "「맞아요~☆ 저랑 선배는 학원을 졸업한 뒤에 결혼해서, 지금은 이렇게 같이 살고 있잖아요~」"

[[dialogue]]
speaker = "unk"
original = "学園を卒業して、結婚……？"
translation = "학원을 졸업하고, 결혼……?"

[[dialogue]]
speaker = "リーリア"
original = "「センパイ？\u3000本当に大丈夫ですか？\u3000なんだかさっきから、様子が変ですけど……」"
translation = "「선배? 정말 괜찮으세요? 왠지 아까부터 상태가 이상한데……」"

[[dialogue]]
speaker = "unk"
original = "──そこで突然、俺の脳裏に『学園を卒業した後、リーリアと結婚した』記憶が、ゆっくりと思い出されてきて、自然と状況が飲み込めてくる。"
translation = "──그때 갑자기, 내 뇌리에 『학원을 졸업한 후, 리리아와 결혼했다』는 기억이 천천히 떠올라, 자연스럽게 상황이 이해되기 시작했다."

[[dialogue]]
speaker = "リーリア"
original = "「――寝ぼけてて、頭が回らなくなってたみたい？\u3000な～んだ、心配しちゃったじゃないですか～」"
translation = "「――잠결이라 머리가 안 돌아갔던 모양이네요? 뭐야~ 걱정했잖아요~」"

[[dialogue]]
speaker = "リーリア"
original = "「それよりお正月なんで、学生時代の晴れ着フォームを久しぶりに着てみたんですけど、どうですか～？」"
translation = "「그보다 설날이라서, 학생 시절의 나들이옷 폼을 오랜만에 입어봤는데, 어떤가요~?」"

[[dialogue]]
speaker = "リーリア"
original = "「ふふふっ☆\u3000今も変わらずに可愛いでしょ～♪\u3000結婚した奥様が魔女でよかったですね、センパイ<emoji=heart04>」"
translation = "「후후훗☆ 지금도 변함없이 귀엽죠~♪ 결혼한 부인이 마녀라서 다행이네요, 선배<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「え？\u3000――パッドもお洒落ですごく可愛いけど、胸元がセクシーすぎて他の人に見られちゃうから妬ける？」"
translation = "「에? ――패드도 세련되고 정말 귀엽지만, 가슴팍이 너무 섹시해서 다른 사람에게 보일까 봐 질투 난다고요?」"

[[dialogue]]
speaker = "リーリア"
original = "「もう～<emoji=heart04>\u3000センパイったら、恋人になって何年経ってると思ってるんですかぁ♪\u3000私のこと好き過ぎて、未だにヤキモチを焼いちゃうの、ほんと可愛いんですから～<emoji=heart04>」"
translation = "「정말~<emoji=heart04> 선배도 참, 연인이 된 지 몇 년이나 지났다고 생각하는 거예요~♪ 나를 너무 좋아해서 아직도 질투를 하다니, 정말 귀엽다니까요~<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「まあ～、でも？\u3000センパイとの可愛い<b>赤ちゃん</b>もできちゃったわけですし、生まれた後は赤ちゃん連れてセクシー系もあれじゃないですか～」"
translation = "「뭐~ 하지만? 선배와의 귀여운 <b>아기</b>도 생겨버렸고, 태어난 뒤에는 아기를 데리고 섹시 계열은 좀 그렇지 않을까요~」"

[[dialogue]]
speaker = "unk"
original = "赤ちゃん！？！？"
translation = "아기!?!?"

[[dialogue]]
speaker = "unk"
original = "リーリアがぶっちゃけた爆弾発言に、俺は衝撃を受ける――おかしい！\u3000それは記憶がないよ！？"
translation = "리리아가 털어놓은 폭탄 발언에 나는 충격을 받았다――이상해! 그건 기억에 없다고!?"

[[dialogue]]
speaker = "リーリア"
original = "「あ～っ、さてはまだ寝ぼけたフリしてますね？\u3000社会人になって同棲し始めてから、センパイが毎日するから、あっという間にできちゃったんじゃないですか～<emoji=heart04>」"
translation = "「아~ 이제 보니 아직 잠이 덜 깬 척하고 있네요? 사회인이 되어 동거하기 시작한 뒤로, 선배가 매일 하니까 순식간에 생겨버린 거잖아요~<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「で、それで『ちゃんと幸せにするから結婚しよう』ってプロポーズしてくれたんですよね？\u3000忘れたなんて言わせませんよ～？」"
translation = "「그, 그래서 『꼭 행복하게 해줄 테니까 결혼하자』라고 프로포즈해 줬잖아요? 잊었다고는 안 할 거죠~?」"

[[dialogue]]
speaker = "unk"
original = "しかも、できちゃった婚、だと！？"
translation = "게다가, 속도위반 결혼이라니!?"

[[dialogue]]
speaker = "unk"
original = "思い出せないが、俺ならやりかねない気もする……！"
translation = "기억나지는 않지만, 나라면 그러고도 남을 것 같다는 기분도 든다……!"

[[dialogue]]
speaker = "リーリア"
original = "「だからこれからは、可愛い奥さんと可愛い赤ちゃんの為に、２倍頑張らなきゃダメなんですからね、旦那様<emoji=heart04>」"
translation = "「그러니까 앞으로는, 귀여운 부인과 귀여운 아기를 위해서 두 배로 노력해야 한다고요, 서방님<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「私も赤ちゃんを産んで落ち着いたら、新星学園のマジカル可愛い<b>先生</b>として、頑張りますから！」"
translation = "「저도 아기를 낳고 안정이 되면, 신성 학원의 매지컬 귀여운 <b>선생님</b>으로서 열심히 할 테니까요!」"

[[dialogue]]
speaker = "unk"
original = "お腹を幸せそうにさすりながら、微笑むリーリア。"
translation = "배를 행복한 듯 쓰다듬으며 미소 짓는 리리아."

[[dialogue]]
speaker = "リーリア"
original = "「ただ、赤ちゃんが産まれるのはすっごく楽しみですけど、センパイの恋人として過ごす時間はもうすぐ最後になるので、そこは寂しくもありますね～」"
translation = "「다만, 아기가 태어나는 건 정말 기대되지만, 선배의 연인으로서 지내는 시간은 이제 곧 마지막이라 생각하니 그건 좀 쓸쓸하기도 하네요~」"

[[dialogue]]
speaker = "リーリア"
original = "「なので今年は、『最後の２人きりイチャイチャデート』をたくさん企画しちゃいましょう♪」"
translation = "「그러니까 올해는, 『마지막 단둘만의 꽁냥꽁냥 데이트』를 많이 계획해 봐요♪」"

[[dialogue]]
speaker = "リーリア"
original = "「――え？\u3000子供が産まれたら、もうイチャイチャしてくれないのかって？」"
translation = "「――에? 아이가 태어나면 이제 꽁냥거려 주지 않는 거냐고요?」"

[[dialogue]]
speaker = "リーリア"
original = "「なに言っちゃってるんですか～♪\u3000そこは当然、可愛い後輩妻との新章『初めての子連れイチャイチャデート編』が始まります☆」"
translation = "「무슨 소리를 하시는 거예요~♪ 그때는 당연히, 귀여운 후배 아내와의 신장 『첫 아이 동반 꽁냥꽁냥 데이트 편』이 시작되는 거죠☆」"

[[dialogue]]
speaker = "リーリア"
original = "「ちなみにですけど、センパイの呼び方も『あなた』とか『パパ』とかに変えた方がいいんですかね～？」"
translation = "「그나저나 선배를 부르는 호칭도 『당신』이라든가 『아빠』라든가로 바꾸는 게 좋을까요~?」"

[[dialogue]]
speaker = "リーリア"
original = "「センパイは、どういう呼ばれ方がお好みですか？\u3000ふふふっ☆」"
translation = "「선배는 어떤 호칭이 취향인가요? 후후훗☆」"

[[dialogue]]
speaker = "リーリア"
original = "「と、家であんまり長居してたら、お寺さんが混んじゃいますね」"
translation = "「아, 집에서 너무 오래 머물면 절에 사람이 많아지겠네요.」"

[[dialogue]]
speaker = "リーリア"
original = "「まあとにかく、この晴れ着を着たのは、夫婦２人きりでする最後の初詣デートくらい、センパイの視線を独り占めしちゃいたいっていう乙女心なわけです<emoji=heart04>」"
translation = "「뭐 어쨌든, 이 나들이옷을 입은 건 부부 단둘이서 하는 마지막 첫 참배 데이트 정도는 선배의 시선을 독차지하고 싶다는 소녀심이라구요<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「今回はお願いしておきたいことが沢山ありますから、早く出かけましょう♪\u3000センパイ<emoji=heart04>」"
translation = "「이번에는 부탁하고 싶은 게 잔뜩 있으니까, 얼른 나가요♪ 선배<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リーリアは笑顔で俺の手を取る。そうして、彼女に引っ張られるまま、俺は初詣に出かけていく――"
translation = "리리아는 웃으며 내 손을 잡는다. 그렇게 그녀에게 이끌려 나는 첫 참배를 나선다――"

[[dialogue]]
speaker = "リーリア"
original = "「って、どうしました、センパイ？」"
translation = "「어라, 왜 그러세요, 선배?」"

[[dialogue]]
speaker = "unk"
original = "リーリア、これからもっと幸せにするからな"
translation = "리리아, 앞으로 더 행복하게 해줄게."

[[dialogue]]
speaker = "リーリア"
original = "「……！\u3000はいっ♪\u3000私も――」"
translation = "「……! 네♪ 저도――」"

[[dialogue]]
speaker = "unk"
original = "目覚めると、そこはリビングではなく、俺の部屋のベッドの上だった。"
translation = "잠에서 깨어나니, 그곳은 거실이 아니라 내 방 침대 위였다."

[[dialogue]]
speaker = "リーリア"
original = "「あ……うぅぅ……<emoji=heart04>\u3000せ、センパイ……<emoji=heart04>」"
translation = "「아…… 으으으……<emoji=heart04> 서, 선배……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "横を見ると、そこには俺と並んで寝ているリーリアがいた。いつになく恥ずかしそうに、真っ赤になっている彼女と目が合う。"
translation = "옆을 보니 그곳에는 나와 나란히 자고 있는 리리아가 있었다. 평소답지 않게 부끄러운 듯 얼굴이 새빨개진 그녀와 눈이 마주친다."

[[dialogue]]
speaker = "unk"
original = "もしかして、リーリアの能力で夢を……？"
translation = "설마, 리리아의 능력으로 꿈을……?"

[[dialogue]]
speaker = "リーリア"
original = "「はうぅっ……<emoji=heart04>\u3000ま――」"
translation = "「하우으……<emoji=heart04> 서――」"

[[dialogue]]
speaker = "リーリア"
original = "「まさか本当に絵馬の願いが叶っちゃうとは思わなかったんですうぅぅぅ～～～～～～っ！！！」"
translation = "「설마 정말로 에마의 소원이 이루어질 줄은 몰랐다구요오오오오~~~~~~!!!」"

[[dialogue]]
speaker = "unk"
original = "どうやら俺と同じ『夢』を見ていたらしいリーリアは、恥ずかしそうに顔を両手を覆いながら叫んでしまうのだった。"
translation = "아무래도 나와 같은 『꿈』을 꾼 모양인 리리아는, 부끄러운 듯 얼굴을 두 손으로 가리며 소리를 지르고 말았다."

