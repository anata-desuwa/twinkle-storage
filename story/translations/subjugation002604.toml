[[dialogue]]
speaker = "ヴィーナス"
original = "「しょ……賞金１０万テルスですって！？」"
translation = "「상…… 상금 10만 텔루스라고!?」"

[[dialogue]]
speaker = "ソフィア"
original = "「学生のイベントの域を超えています……！」"
translation = "「학생 이벤트의 범주를 넘어서고 있습니다……!」"

[[dialogue]]
speaker = "アポロ"
original = "「じゅ、１０万テルスっていくらだ！？\u3000ぶどうグミ何個買える！？」"
translation = "「1, 10만 텔루스면 얼마야!? 포도 구미 몇 개 살 수 있어!?」"

[[dialogue]]
speaker = "ルリエル"
original = "「１００個は買えますよう！」"
translation = "「100개는 살 수 있어욧!」"

[[dialogue]]
speaker = "サーシャ"
original = "「それどころじゃないんじゃないかしら？」"
translation = "「그 정도 수준이 아닐 것 같은데?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ますますどこから湧いたお金なのよ！」"
translation = "「점점 더 어디서 솟아난 돈인 거야!」"

[[dialogue]]
speaker = "ヘレナ"
original = "「私のポケットマネーだ。フ……これぞ実業家の大盤振る舞いというものよ」"
translation = "「내 용돈이다. 후…… 이것이 실업가의 통 큰 기부라는 거지.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「さらに水着コンテストはエントリー費無料、誰でも歓迎！\u3000どうだ？\u3000興味が湧いてきたか？」"
translation = "「게다가 수영복 콘테스트는 엔트리 비용 무료, 누구든 환영! 어떠냐? 흥미가 생기나?」"

[[dialogue]]
speaker = "ルリエル"
original = "「はいっ！」"
translation = "「네!」"

[[dialogue]]
speaker = "アポロ"
original = "「ああ！\u3000こりゃ～激アツのイベントだぜ！」"
translation = "「그래! 이거 완전 핫한 이벤트인데!」"

[[dialogue]]
speaker = "マトイ"
original = "「私は──出てもどうせなぁ……勝てっこないし……見られるのも恥ずいし……」"
translation = "「나는── 나가봤자 어차피…… 이길 리도 없고…… 남들 앞에 서는 것도 부끄럽고……」"

[[dialogue]]
speaker = "ソフィア"
original = "「そうですね……この手の審査じゃ、大人っぽいほうがいいに決まってます」"
translation = "「그렇네요…… 이런 심사는 어른스러운 편이 유리한 게 당연하니까요.」"

[[dialogue]]
speaker = "アナ"
original = "「つまり、だいなまいとばでぃが有利……と」"
translation = "「즉, 다이너마이트 바디가 유리하다…… 이거군.」"

[[dialogue]]
speaker = "ソフィア"
original = "「ってことは……姉さん！？」"
translation = "「그렇다는 건…… 언니!?」"

[[dialogue]]
speaker = "サーシャ"
original = "「あらあら」"
translation = "「어머나.」"

[[dialogue]]
speaker = "unk"
original = "優勝を狙える"
translation = "우승을 노릴 수 있어."

[[dialogue]]
speaker = "unk"
original = "サーシャさんなら"
translation = "사샤 씨라면."

[[dialogue]]
speaker = "サーシャ"
original = "「ふふ。会長くんがそう言うなら、張り切って出場しちゃおうかしら？」"
translation = "「후후. 회장군이 그렇게 말한다면 힘내서 출전해 볼까?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「フ……確かにサーシャは優勝候補かもしれない。だが、そう簡単にはゆくまいぞ」"
translation = "「후…… 확실히 사샤는 우승 후보일지도 모르지. 하지만 그렇게 호락호락하지는 않을 거다.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「まさか……ヘレナちゃん自ら出る気！？」"
translation = "「설마…… 헬레나 짱 본인이 나갈 생각!?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「それも悪くはない──が、否」"
translation = "「그것도 나쁘지 않군── 하지만 아니다.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「今回は我が軍の誇るトップモデルを用意した。いでよ！」"
translation = "「이번에는 우리 군이 자랑하는 톱 모델을 준비했다. 나와라!」"

[[dialogue]]
speaker = "トリシャ"
original = "「……えっと……あの……こちらでよろしかったですか……？」"
translation = "「……저기…… 그게…… 이쪽으로 오면 되는 건가요……?」"

[[dialogue]]
speaker = "ルリエル"
original = "「うおぉ……」"
translation = "「우와아……」"

[[dialogue]]
speaker = "マトイ"
original = "「でっか……」"
translation = "「크다……」"

[[dialogue]]
speaker = "アナ"
original = "「またスイカが……」"
translation = "「또 수박이……」"

[[dialogue]]
speaker = "unk"
original = "どうしてここに"
translation = "어째서 여기에."

[[dialogue]]
speaker = "unk"
original = "トリシャさん！？"
translation = "트리샤 씨!?"

[[dialogue]]
speaker = "トリシャ"
original = "「あ、会長さん……どうも。あの、ヘレナさんに呼ばれて……水着、というのも……初めて着ました。なんだか下着みたいですね……フフフ」"
translation = "「아, 회장님…… 안녕하세요. 그게, 헬레나 씨가 부르셔서…… 수영복이라는 것도…… 처음 입어봤어요. 왠지 속옷 같네요…… 후후후.」"

[[dialogue]]
speaker = "マトイ"
original = "「いつもの内気な話し方の割に、やけに大胆な水着……」"
translation = "「평소의 내성적인 말투에 비해 묘하게 대담한 수영복……」"

[[dialogue]]
speaker = "unk"
original = "トリシャさんもコンテストに？"
translation = "트리샤 씨도 콘테스트에?"

[[dialogue]]
speaker = "トリシャ"
original = "「はい……ええと、正直よくわかってはいないのですが……コンテストに出るといいことがある、と」"
translation = "「네…… 저기, 솔직히 잘은 모르겠습니다만…… 콘테스트에 나가면 좋은 일이 생길 거라고.」"

[[dialogue]]
speaker = "トリシャ"
original = "「１位になれば……たくさん友達ができると言われました。ふふ……それなら参加したいと思った次第、です」"
translation = "「1위가 되면…… 친구를 많이 사귈 수 있다고 들었습니다. 후후…… 그렇다면 참가하고 싶다고 생각한 바, 입니다.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「うむ。エントリー感謝するぞ、トリシャ」"
translation = "「음. 엔트리 고맙군, 트리샤.」"

[[dialogue]]
speaker = "トリシャ"
original = "「お安い御用です。それに……」"
translation = "「별말씀을요. 게다가……」"

[[dialogue]]
speaker = "トリシャ"
original = "「フフフ……会長さんはもう友達ですから。フレンドリーにボディタッチ」"
translation = "「후후후…… 회장님은 이미 친구니까요. 프렌들리 하게 바디 터치.」"

[[dialogue]]
speaker = "unk"
original = "柔らかな感触が……"
translation = "부드러운 감촉이……."

[[dialogue]]
speaker = "unk"
original = "！？"
translation = "!? "

[[dialogue]]
speaker = "マトイ"
original = "「ちょっ……！？」"
translation = "「잠깐……!?」"

[[dialogue]]
speaker = "ルリエル"
original = "「おおっ！\u3000大胆ですね～！」"
translation = "「오옷! 대담하시네욧~!」"

[[dialogue]]
speaker = "トリシャ"
original = "「フフフ……他にも友達がたくさん。なんだかテンションが上がってしまいますね……フフフフフ」"
translation = "「후후후…… 그 밖에도 친구가 잔뜩. 왠지 텐션이 올라가 버리네요…… 후후후후후.」"

