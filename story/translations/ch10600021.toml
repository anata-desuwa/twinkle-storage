[[dialogue]]
speaker = "unk"
original = "第１話,レミカに告白,P"
translation = "제1화, 레미카에게 고백, P"

[[dialogue]]
speaker = "unk"
original = "学園内での映画撮影をサポートしたり、アーネストのライブを補佐したり……共に時間を過ごすうち、俺はどんどんレミカに惹かれていった。"
translation = "학원 내에서의 영화 촬영을 서포트하거나, 어네스트의 라이브를 보좌하거나…… 함께 시간을 보내는 동안, 나는 점점 레미카에게 끌리게 되었다."

[[dialogue]]
speaker = "unk"
original = "世界を魅了する歌姫である彼女と、一介の学生でしかない自分は不釣り合いかもしれない。そう悩んだこともある。"
translation = "세계를 매료시키는 가희인 그녀와, 일개 학생일 뿐인 자신은 어울리지 않을지도 모른다. 그렇게 고민한 적도 있다."

[[dialogue]]
speaker = "unk"
original = "だけどもう覚悟を決めた。想いの一つを伝える勇気も持てない男に、あのレミカが惚れてくれるとは思えなかったから──"
translation = "하지만 이제 각오를 다졌다. 마음 하나를 전할 용기도 가지지 못하는 남자에게, 그 레미카가 반해줄 거라고는 생각되지 않았으니까──"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「ふぅっ……これで今日の練習は終了かな。会長、遅くまで付き合ってくれてありがとね」"
translation = "「후우…… 이걸로 오늘 연습은 종료일까. 회장님, 늦게까지 함께해줘서 고마워」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「キュートスタイルでレッスンするの、久しぶりだったから気合い入っちゃった」"
translation = "「큐트 스타일로 레슨 하는 거, 오랜만이라서 기합이 들어가 버렸어」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「──うん。アーネストは１日限定の約束だから解散しちゃったけど……」"
translation = "「──응. 어네스트는 1일 한정 약속이라서 해산해 버렸지만……」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「事務所がさ、この衣装を埋もれさせるのはもったいないって言ってくれたんだ」"
translation = "「기획사에서 말이야, 이 의상을 썩히는 건 아깝다고 말해줬거든」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「それで今度、ソロライブをキュートスタイルでやってみることになったんだよね。全部、会長のおかげ」"
translation = "「그래서 이번에, 솔로 라이브를 큐트 스타일로 해보기로 했어. 전부 회장님 덕분이야」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「で、この衣装でライブの練習をするなら、たくさんの時間を過ごしてきたこの場所がいいかなって思って」"
translation = "「그래서, 이 의상으로 라이브 연습을 한다면, 많은 시간을 보내온 이 장소가 좋겠다고 생각했어」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「環境って自分が思う以上に影響が大きいから。おかげで事務所のレッスンスタジオよりも張り切れた気がするよ」"
translation = "「환경이란 게 생각 이상으로 영향이 크니까. 덕분에 기획사의 레슨 스튜디오보다 더 기운이 났던 것 같아」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「だから今日、ここを貸し切りにしてくれてありがとう」"
translation = "「그러니까 오늘, 이곳을 대관해줘서 고마워」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「相変わらず会長の指摘も的確だし……この調子ならパーフェクトなライブになりそうだよ」"
translation = "「여전히 회장님의 지적도 정확하고…… 이 기세라면 퍼펙트한 라이브가 될 것 같아」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「あ……そう言えばさ、話って何？\u3000練習が終わった後でいいって言ってたけど」"
translation = "「아…… 그러고 보니 말이야, 할 얘기라는 게 뭐야? 연습이 끝난 뒤에 해도 된다고 했었지」"

[[dialogue]]
speaker = "unk"
original = "レミカに聞いて欲しいことがあるんだ"
translation = "레미카에게 들어줬으면 하는 게 있어"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「うん、何でも言って。会長にはお世話になってるし、どんな無理難題でもＯＫだよ」"
translation = "「응, 뭐든 말해 봐. 회장님한테는 신세 지고 있기도 하고, 어떤 무리한 부탁이라도 OK야」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「もし星徒会の広報でアイドルが必要とかだったら……ふふ♪\u3000お世話になってるし、友達価格で社長に交渉しちゃうよ」"
translation = "「만약 성도회 홍보에 아이돌이 필요하다거나 하면…… 후후♪ 신세 지고 있으니까, 친구 가격으로 사장님한테 협상해 볼게」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「私としては、会長のお願いならタダでいいんだけど。一応事務所の所属だし、ポラプロの顔も立てないとね」"
translation = "「내 입장에서는 회장님 부탁이라면 공짜라도 좋지만. 일단 사무소 소속이기도 하고, 폴라 프로의 체면도 세워줘야 하니까」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「……会長？」"
translation = "「……회장님?」"

[[dialogue]]
speaker = "unk"
original = "俺と付き合って欲しい"
translation = "나랑 사귀어 줬으면 좋겠어"

[[dialogue]]
speaker = "unk"
original = "──好きだ"
translation = "──좋아해"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「えっ──」"
translation = "「엣──」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「あっ……え、えっと……ずいぶんとストレート、なんだね……？」"
translation = "「앗…… 어, 에또…… 굉장히 스트레이트, 하네……?」"

[[dialogue]]
speaker = "unk"
original = "驚かせちゃったかな"
translation = "놀라게 해버렸나"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「うん……結構、驚いてる。ぜんぜん予想してなかったな」"
translation = "「응…… 상당히, 놀랐어. 전혀 예상하지 못했는걸」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「実は私、告白されることって結構多いんだ。学園の人からもそうだし、芸能界の人からもそう」"
translation = "「사실 나, 고백받는 일이 꽤 많거든. 학원 사람들도 그렇고, 연예계 사람들도 그렇고」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「みんな、それっぽいシチュエーション……って言って伝わるかな？\u3000話があるからって呼び出す場所、そこからもうバレバレなんだよね」"
translation = "「다들, 그런 법한 시츄에이션…… 이라고 말하면 전해지려나? 할 말이 있다고 불러내는 장소, 거기서부터 벌써 다 들통나거든」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「うん。おしゃれなレストランとか、夜景の見える展望台とかに誘ってくるから」"
translation = "「응. 멋진 레스토랑이라든가, 야경이 보이는 전망대 같은 곳으로 불러내니까」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「だから事前にいつも断ってたんだ。事務所の方針もあるし、プライベートでちょっとでも誤解される行動はしたくなかったから」"
translation = "「그래서 사전에 항상 거절해 왔어. 사무소 방침도 있고, 사생활에서 조금이라도 오해받을 행동은 하고 싶지 않았으니까」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「だから……うん、驚いた。まさかトレーニング施設で告白されるだなんて思わかったよ」"
translation = "「그래서…… 응, 놀랐어. 설마 트레이닝 시설에서 고백받을 줄은 생각도 못 했거든」"

[[dialogue]]
speaker = "unk"
original = "レミカと多くの時間を過ごした場所だから"
translation = "레미카와 많은 시간을 보낸 장소니까"

[[dialogue]]
speaker = "unk"
original = "告白するならここがよかったんだ"
translation = "고백한다면 여기가 좋았어"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「まさかＯＫされるとは思わなかった……って顔だね。そんな緊張したり謙遜しなくていいのに。同級生だよ、私たち」"
translation = "「설마 OK 받을 줄은 몰랐다…… 라는 얼굴이네. 그렇게 긴장하거나 겸손해하지 않아도 되는데. 동급생이잖아, 우리」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「ＯＫの理由って……私も会長が好きだから、だけど？\u3000ていうかそれ以外に理由ってある？」"
translation = "「OK한 이유라니…… 나도 회장님을 좋아하니까, 인데? 애초에 그거 말고 이유가 더 있어?」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「そうだよ。会長が好き。あなたと仲良くなってから、毎日がずっと楽しいんだ」"
translation = "「맞아. 회장님을 좋아해. 당신이랑 친해지고 나서부터, 매일이 계속 즐거웠어」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「新曲とか、ダンスの動画とか。私のリリースするもの全部チェックして、感想を伝えてくれるのも嬉しいし……」"
translation = "「신곡이라든가, 댄스 영상이라든가. 내가 릴리스하는 것들 전부 체크해서 감상을 전해주는 것도 기쁘고……」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「臨時でプロデューサーをお願いした時も、二つ返事で引き受けてくれるよね。映画の撮影の時も、アーネストのライブの時も」"
translation = "「임시로 프로듀서를 부탁했을 때도 선뜻 승낙해 줬었지. 영화 촬영 때도, 어니스트 라이브 때도」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「──そうだよ？\u3000初めて異性として意識したのは、あの映画のプロモーション撮影で、夜の校舎を歩いた時」"
translation = "「──그래. 처음으로 이성으로서 의식한 건, 그 영화 프로모션 촬영 때 밤의 교사를 걸었을 때야」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「同い年の男の子と手を繋いだのなんて初めてだったし。ずーっと心臓がドキドキ鳴ってたから……」"
translation = "「동갑내기 남자애랑 손을 잡은 것 따윈 처음이었고. 계~속 심장이 두근두근 울렸으니까……」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「でも告白する勇気、持てなかったんだ。私って芸能人だからプライベートとかないし。窮屈な思い、きっとさせちゃうだろうなって思ったら……」"
translation = "「하지만 고백할 용기는 없었어. 난 연예인이니까 사생활 같은 건 없고. 답답한 기분을 분명 느끼게 할 거라고 생각했더니……」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「だから、好きって言ってくれて……付き合おうって言ってくれて、すごく嬉しいよ、会長」"
translation = "「그러니까, 좋아한다고 말해줘서…… 사귀자고 말해줘서, 정말 기뻐, 회장님」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「告白、お受けします。私をあなたの彼女にしてください」"
translation = "「고백, 수락할게요. 저를 당신의 여자친구로 만들어 주세요」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「……返事、こんな感じでいいかな。ごめん。告白されたことはあっても……ＯＫするの、初めてだから」"
translation = "「……대답, 이런 느낌이면 될까. 미안. 고백받은 적은 있어도…… OK 하는 건, 처음이라서」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「ズレてなかったら嬉しいんだけど……うんっ、それならよかった」"
translation = "「어긋나지 않았다면 기쁘겠는데…… 응, 그렇다면 다행이야」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「で──会長。目の前に恋人になった女の子がいるわけなんだけど。そのまま突っ立ってるだけ？」"
translation = "「자── 회장님. 눈앞에 연인이 된 여자애가 있는데. 그대로 서 있기만 할 거야?」"

[[dialogue]]
speaker = "unk"
original = "……キスしていい？"
translation = "……키스해도 돼?"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「……そこは聞かない方がパーフェクトかも、なんてね。うん──して欲しいな<emoji=heart04>」"
translation = "「……그건 묻지 않는 편이 퍼펙트할지도, 라니깐. 응── 해줬으면 좋겠어<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「んっ……ちゅ<emoji=heart04>\u3000ちゅっ……ちゅっ……ぷぁ……<emoji=heart04>」"
translation = "「음…… 츄<emoji=heart04> 츄…… 츄…… 푸하……<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「あー……なるほど、なるほど……」"
translation = "「아─…… 과연, 과연 그렇구나……」"

[[dialogue]]
speaker = "unk"
original = "何が『なるほど』？"
translation = "뭐가 『과연』이야?"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「いや、私ってさ。今まで散々、恋とかキスとかをテーマにステージで歌ってきたでしょ？」"
translation = "「아니, 나 말이야. 지금까지 잔뜩 사랑이라든가 키스 같은 걸 테마로 무대에서 노래해 왔잖아?」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「イメージはしてたんだ。好きな男の子にキスされた時の女の子の気持ち。リアルに想像して、それを歌とダンスに込めてたつもりだったんだけど……」"
translation = "「이미지 트레이닝은 했었어. 좋아하는 남자애한테 키스 받았을 때의 여자애의 기분. 리얼하게 상상해서 그걸 노래와 댄스에 담았다고 생각했었는데……」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「本当に『つもり』だったみたい……<emoji=heart04>」"
translation = "「정말로 『생각뿐』이었던 모양이야……<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「現実に経験してみたら、私のイメージが全然パーフェクトじゃないことに気づいたっていう。そういう意味で、なるほど……ってこと」"
translation = "「현실에서 경험해 보니까, 내 이미지가 전혀 퍼펙트하지 않았다는 걸 깨달았다는 거. 그런 의미에서, 과연 그렇구나…… 라는 뜻」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「すごいね、現実のキスってこんなにすごいんだ……<emoji=heart04>」"
translation = "「굉장하네, 현실의 키스는 이렇게 굉장하구나……<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「ねぇ会長。もう一回……してもいい？」"
translation = "「있지 회장님. 한 번 더…… 해도 돼?」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「うん……んっ……ちゅ、ちゅぅっ……ちゅ、ちゅっ……<emoji=heart04>」"
translation = "「응…… 음…… 츄, 츄우…… 츄, 츄……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その後も、頬を真っ赤に染めたレミカと、何度も何度もキスを交わした。"
translation = "그 후로도 볼을 새빨갛게 물들인 레미카와 몇 번이고 몇 번이고 키스를 나누었다."

[[dialogue]]
speaker = "unk"
original = "正直、レミカが告白を受け入れてくれたこと、大好きな女の子とキスができたことが嬉しすぎて……"
translation = "솔직히 레미카가 고백을 받아준 것, 좋아하는 여자애와 키스를 할 수 있었다는 사실이 너무나도 기뻐서……"

[[dialogue]]
speaker = "unk"
original = "『ドキドキする』以外の感想が出てこない、ボキャブラリーの貧しい俺なのだった──"
translation = "『두근거린다』 이외의 감상은 떠오르지 않는, 어휘력이 빈곤한 나였다──"

