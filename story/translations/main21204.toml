[[dialogue]]
speaker = "unk"
original = "第４話,極星学園の星徒会,B"
translation = "제4화, 극성학원의 성도회, B"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「どうぞグレイスさん。お近づきの印に、マイベスト・フェイバリットな和菓子。すあまをどうぞ」"
translation = "「자요, 그레이스 씨. 친해진 기념으로 마이 베스트 페이보릿 화과자. 수아마를 드세요.」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「はむっ、もぐもぐっ……んー♪\u3000てっきりお水も満足にいただけないと思ってましたが……！」"
translation = "「함냐, 우물우물…… 음~♪ 하마터면 물도 제대로 못 마실 줄 알았는데……!」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「甘いお菓子にお茶までいただけるだなんて感激です！\u3000私、捕虜というものを誤解していたかもしれません。存外、悪くないものですね！」"
translation = "「달콤한 과자에 차까지 주시다니 감격이에요! 저, 포로라는 것을 오해하고 있었을지도 모르겠네요. 생각보다 나쁘지 않군요!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「うふふ♪\u3000会長くんから、極星学園の子は丁重におもてなししなさいって言われてるの。くつろいじゃってね♪」"
translation = "「우후후♪ 회장님이 극성학원 아이는 정중하게 대접하라고 하셨거든. 편하게 쉬어~♪」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「和菓子もいいけど、桜十路のケーキもあるわよ。チョコとラズベリー、どっちが好きかしら～？」"
translation = "「화과자도 좋지만, 사쿠라쥬로의 케이크도 있어. 초코랑 라즈베리 중 어느 쪽이 좋아~?」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「どっちも好きです！\u3000両方ください！」"
translation = "「둘 다 좋아요! 둘 다 주세요!」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「グレイス、お前なぁ……！\u3000もうちょい警戒心を持てっての！\u3000アタシらは一時停戦してるだけだ、いつか敵になるかもなんだぞ！」"
translation = "「그레이스, 너 말이야……! 좀 더 경계심을 가지라고! 우린 일시 정전 중일 뿐이야, 언제 적이 될지 모른다고!」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「もちろんわかってますよ。でも必要以上の警戒は不要なはずです」"
translation = "「물론 알고 있어요. 하지만 필요 이상의 경계는 불필요할 터입니다.」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「向けられた好意を跳ねのければ、それだけ相互理解のハードルも上がるでしょう。それに今、私たちに提供されるものに毒などが入る可能性は限りなく低いはず」"
translation = "「호의를 뿌리치면 그만큼 상호 이해의 허들도 높아지겠죠. 게다가 지금 우리에게 제공되는 것에 독 같은 게 들어있을 가능성은 한없이 낮을 거예요.」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「強い説得を受けましたし、魔王さんは私たちの命も救ってくれましたし……」"
translation = "「강한 설득도 받았고, 마왕님은 우리 목숨도 구해 주셨고……」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「それにチナが今日まで無事なのが、何よりの証拠でしょう。私、何か間違ってますか？」"
translation = "「게다가 치나가 오늘까지 무사한 게 무엇보다도 증거잖아요. 제가 뭐 틀린 말 했나요?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「……このやろ～。基本的にアホなくせに、たまに筋が通ったことを言いやがって……！」"
translation = "「……이 녀석이~. 기본적으로 바보인 주제에 가끔 정론을 말한다니까……!」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「もぐもぐっ……ん～。美味ですが、このすあま。デネブで食べるやつとあまり変わりませんね」"
translation = "「우물우물…… 음~. 맛있긴 한데 이 수아마, 데네브에서 먹는 거랑 별로 다르지 않네요.」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「せっかくの平行世界。ここでしか食べられないものをぜひ食べたいものです。アルタイルまんじゅうとかないんでしょうか？」"
translation = "「기왕 온 평행세계. 여기서만 먹을 수 있는 걸 꼭 먹어보고 싶네요. 알타이르 만쥬 같은 건 없나요?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「デネブにも、デネブまんじゅうなかったじゃない！\u3000おあいそよ！」"
translation = "「데네브에도 데네브 만쥬 없었잖아! 피장파장이야!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「確かに『おあいこ』ですね。さぁグレイスさん。飲み物はどうします？\u3000やはり和菓子にぴったりな渋いお茶でしょうか」"
translation = "「과연 『피장파장』이군요. 자, 그레이스 씨. 음료는 뭘로 하시겠어요? 역시 화과자에 딱 맞는 떫은 차일까요.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ケーキに合うのは紅茶よね～？\u3000砂糖とミルクもたくさん入れてあげちゃうわ～♪」"
translation = "「케이크에 어울리는 건 홍차지~? 설탕이랑 우유도 듬뿍 넣어줄게~♪」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「どっちも好きです！\u3000両方ください！」"
translation = "「둘 다 좋아요! 둘 다 주세요!」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「だーかーらっ。ちょっとは遠慮しろ！\u3000同じ役員として恥ずかしいんだっての……！」"
translation = "「그~러~니~까~. 좀 사양을 하라고! 같은 임원으로서 부끄럽단 말이야……!」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「レティシア、お前からも何とか言ってやってくれよ……！」"
translation = "「레티시아, 너도 뭐라고 좀 해줘 봐……!」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「当て身で気絶させてもいいかしら？」"
translation = "「당신을 기절시켜서 조용히 시켜도 될까?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「じ、実力行使以外で……」"
translation = "「시, 실력 행사 이외의 방법으로……」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「ふふ、だったら無理ね。戦闘時でないグレイスは、口で注意して聞く子じゃないもの」"
translation = "「후후, 그렇다면 무리겠네. 전투 중이 아닐 때의 그레이스는 말로 주의를 준다고 듣는 아이가 아니니까.」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「レティシア。そのケーキ食べないんですか？\u3000だったらください！」"
translation = "「레티시아. 그 케이크 안 먹을 거예요? 그럼 저 주세요!」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「いいわよ。ちゃんと椅子に座って、お行儀よく食べてね」"
translation = "「그래. 제대로 의자에 앉아서 얌전하게 먹으렴.」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「わーい！\u3000了解です！！」"
translation = "「와아! 알겠습니다!!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「むむむっ……？\u3000自分のぶんのケーキをさりげなく渡すその仕草……！」"
translation = "「음음음……? 자기 몫의 케이크를 자연스럽게 건네주는 그 몸짓……!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「私にはわかるわ。レティシアちゃん、あなたがこの子たちの『お姉ちゃん』ね～♪」"
translation = "「난 알 수 있어. 레티시아짱, 당신이 이 아이들의 『언니』구나~♪」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「どういう意図の問いかけかわからないけれど、確かに私が最年長だわ。それがどうかしたのかしら？」"
translation = "「어떤 의도의 질문인지 모르겠지만 확실히 내가 최연장자야. 그게 어쨌다는 거지?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「私も新星学園の『お姉ちゃん』なの～♪\u3000ふふ、私たち仲良しになれそうね？」"
translation = "「나도 신성학원의 『언니』거든~♪ 후후, 우리 친하게 지낼 수 있을 것 같지?」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「お断りしておくわ。あっちに行ってちょうだい？」"
translation = "「거절하겠어. 저쪽으로 가 줄래?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あ～ん、またすげなく断られちゃったわ～」"
translation = "「아앙, 또 매정하게 거절당해 버렸네~」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「う、うちの役員たちがすみません、すみませんっ……！」"
translation = "「저, 저희 임원들이 죄송합니다, 죄송해요……!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「いえいえ……」"
translation = "「아뇨아뇨……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「グレイスちゃんもレティシアちゃんも、別の世界に来てるからちょっとテンション上がってるのかも。あははっ……」"
translation = "「그레이스짱도 레티시아짱도 다른 세계에 와서 조금 텐션이 올라간 걸지도 몰라요. 아하하……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「いや普段通りだろ。こいつらいっつもこんな感じだよ」"
translation = "「아니 평소랑 똑같아. 이 녀석들 언제나 이런 느낌이라고.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「星徒会のメンバーってキャラが濃いもんね……振り回される側の気持ち、よーくわかるよ……」"
translation = "「성도회 멤버들은 개성이 강하니까 말이야…… 휘둘리는 쪽의 기분, 아주 잘 알아……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「新顔に負けてられないわ！\u3000マトイ、新星星徒会の濃さも見せつけてやりなさい！！」"
translation = "「새 얼굴에게 질 수 없지! 마토이, 신성 성도회의 진한 맛도 보여주라고!!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「よ～し、こんな時のために仕込んでおいた一発芸を……って誰がやるかぁ！！」"
translation = "「좋아, 이런 때를 위해 준비해둔 개인기를…… 누가 하겠냐!!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「えっと……」"
translation = "「저기……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「あっ、会長さん！\u3000選管のみんなも！」"
translation = "「앗, 회장님! 선관 여러분도!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……ずいぶんとにぎやかだな。ベアト」"
translation = "「……꽤나 시끌벅적하네. 베아토.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ごめんね、うちの役員が騒いじゃって……」"
translation = "「미안해, 우리 임원이 소란을 피워서……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……気にするな」"
translation = "「……신경 쓰지 마라.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「……？\u3000梨緒ちゃん、どうかしたの？」"
translation = "「……? 리오짱, 왜 그래?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「いや──何でもない。私も片付けを手伝おう」"
translation = "「아니── 아무것도 아니다. 나도 정리를 돕지.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ありがとう、梨緒ちゃん！」"
translation = "「고마워, 리오짱!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「改めて、アルタイルにようこそ。極星学園のみんな」"
translation = "「새삼스럽지만 알타이르에 온 걸 환영해. 극성학원 여러분.」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「はい、お邪魔してます！\u3000もぐもぐ……」"
translation = "「네, 실례하고 있습니다! 우물우물……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「お前まだ食ってんのかよ。それで魔王。アタシらに話ってことは……」"
translation = "「너 아직도 먹고 있냐. 그래서 마왕. 우리에게 할 말이 있다는 건……」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「──ごくん。ルヴィのこと、ですね？」"
translation = "「──꿀꺽. 루비에 대한 거군요?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。俺たちが今まで見たこと、聞いたこと……人によっては重複してる部分もあるだろうけど、改めて伝えるよ」"
translation = "「아아. 우리가 지금까지 보고 들은 것…… 사람에 따라서는 중복되는 부분도 있겠지만 다시 한번 전할게.」"

[[dialogue]]
speaker = "unk"
original = "この世界には『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』と呼ばれる創造神が存在すること。"
translation = "이 세계에는 『<ruby>XELOS<rt>제로스</rt></ruby>』라 불리는 창조신이 존재한다는 것."

[[dialogue]]
speaker = "unk"
original = "ルヴィネは『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』によって創り出された、女神テルルに代わる次の女神、その幼体であること。"
translation = "루비네는 『<ruby>XELOS<rt>제로스</rt></ruby>』에 의해 창조된, 여신 테루루를 대신할 다음 여신, 그 유체라는 것."

[[dialogue]]
speaker = "unk"
original = "ルヴィネの目的は、リクリエを起こして世界を刷新すること。"
translation = "루비네의 목적은 리크리에를 일으켜 세계를 쇄신하는 것."

[[dialogue]]
speaker = "unk"
original = "俺たちアルタイルの星騎士は、デネブと共存の道を探り、掴み取りたいと思っていることを改めて伝えた。"
translation = "우리 알타이르의 성기사는 데네브와 공존의 길을 찾고 쟁취하고 싶어 한다는 것을 다시 한번 전했다."

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「……創造神『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』。そしてルヴィは、新しい女神様になる女の子……ですか」"
translation = "「……창조신 『<ruby>XELOS<rt>제로스</rt></ruby>』. 그리고 루비는 새로운 여신님이 될 여자아이…… 인가요.」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「やっぱり何度聞いても、混乱してしまいますね。もう今さら頭ごなしに拒絶するつもりはありませんが……」"
translation = "「역시 몇 번을 들어도 혼란스럽네요. 이제 와서 무턱대고 거절할 생각은 없지만……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「まあ、な。にわかには信じがたいって、なっちゃうよな……」"
translation = "「뭐, 그렇지. 곧이곧대로 믿기 힘들긴 하겠지……」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「あら、そうかしら。ルヴィが私たちを騙すはずがない。この人達は嘘を吐いて、私たちデネブの結束を揺らがせようとしているのよ」"
translation = "「어머, 그럴까. 루비가 우리를 속일 리 없어. 이 사람들은 거짓말을 해서 우리 데네브의 결속을 흔들려는 거야.」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「それ以外、私には考えられないけれど？」"
translation = "「그거 말고는 생각할 수 없는데?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「レティシアちゃん、でも……」"
translation = "「레티시아짱, 하지만……」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「ルヴィはずっと私たちとデネブを守ってくれていた。あの子はいつだって正しい。間違わない」"
translation = "「루비는 줄곧 우리와 데네브를 지켜주었어. 그 아이는 언제나 옳아. 틀리지 않아.」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「その上、急に『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』だなんて言われても……女神テルルよりも上位の存在がいるだなんて、信じる方が愚かね」"
translation = "「게다가 갑자기 『<ruby>XELOS<rt>제로스</rt></ruby>』라니…… 여신 테루루보다 상위의 존재가 있다니, 믿는 쪽이 어리석네.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「でも、デネブのフィーニスの塔で、ルヴィは怪しい動きをしていた。それをベアトも見たって言ってるし……」"
translation = "「하지만 데네브의 피니스의 탑에서 루비는 수상한 움직임을 보였어. 그걸 베아토도 봤다고 했고……」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「きっと何か誤解があるのよ。それ以外にない。ふふ、これで話は終わりね？」"
translation = "「분명 무언가 오해가 있는 거야. 그럴 수밖에 없어. 후후, 이걸로 이야기는 끝이지?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「そこで終わったら今までと同じじゃねーか。アタシは真実を探る。デネブのためならルヴィとだって戦う……だからちょっとでも情報が欲しい」"
translation = "「거기서 끝나면 지금까지랑 똑같잖아. 난 진실을 찾겠어. 데네브를 위해서라면 루비와도 싸우겠어…… 그러니까 조금이라도 정보가 필요해.」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「あの、魔王さん。ルヴィが自身を女神だと認めたと言いますが……その時の映像や音声はないんでしょうか？」"
translation = "「저기, 마왕님. 루비가 스스로를 여신이라고 인정했다고 하셨는데…… 그때의 영상이나 음성은 없나요?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……すまない。はっきり提示できる証拠はないんだ」"
translation = "「……미안해. 확실히 제시할 수 있는 증거는 없어.」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「できるわけないわよね。だって口から出まかせの嘘なんだもの。チナ、こんな曖昧な情報でルヴィを疑うの？」"
translation = "「그럴 수 없겠지. 왜냐하면 입에서 나오는 대로 내뱉은 거짓말이니까. 치나, 이런 애매한 정보로 루비를 의심하는 거야?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「証拠はなくてもアタシは……アルタイルの人間も、多少は信用してもいいと思ってる」"
translation = "「증거는 없어도 난…… 알타이르 사람들도 어느 정도는 신용해도 좋다고 생각해.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「それにベアト──うちの副会長がこれだけ食い下がってるんだ。ルヴィと一番付き合いの長いベアトが、だ」"
translation = "「게다가 베아토── 우리 부회장이 이만큼이나 물러서지 않고 있어. 루비와 가장 오래 알고 지낸 베아토가 말이야.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「アタシは少なくとも、ルヴィと直接話すまでは、あいつを疑うって決めたんだ」"
translation = "「난 적어도, 루비와 직접 이야기하기 전까지는 그 녀석을 의심하기로 정했어.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「チナちゃん……！」"
translation = "「치나짱……!」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ベアトは抜けまくってるし、ドジもするし、簡単に騙せるお人好しだけど……」"
translation = "「베아토는 얼빠진 구석도 있고, 덜렁대기도 하고, 쉽게 속아 넘어가는 사람 좋은 녀석이지만……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「チナちゃん……！？」"
translation = "「치나짱……!?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「でも、一度決めたらテコでも動かない芯のあるやつだ。そのベアトがルヴィを疑ってるんなら……白黒はっきりさせねーとな」"
translation = "「하지만, 한번 결정하면 지렛대로도 움직이지 않을 심지가 곧은 녀석이야. 그 베아토가 루비를 의심하고 있다면…… 흑백을 분명히 가려야지.」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「私も同じ考えです。しかし、あのルヴィがリクリエ側……悪い夢だったらどんなにいいか……」"
translation = "「저도 같은 생각입니다. 하지만, 그 루비가 리크리에 측이라니…… 나쁜 꿈이라면 얼마나 좋을까요……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「そう、だな……」"
translation = "「그래, 그렇네……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そんなにルヴィネって信頼できる子なのかしら？\u3000どう見ても怪しいのに……」"
translation = "「그렇게나 루비네라는 아이가 신뢰할 수 있는 아이니? 아무리 봐도 수상한데……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「お前らアルタイルの住人から見たら、ルヴィは怪しいのかもな。でも、逆の立場になってみろよ」"
translation = "「너희 알타이르 주민들이 보기엔 루비가 수상할지도 모르지. 하지만, 입장을 바꿔서 생각해 봐.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「いきなり現れたデネブの人間に『緋宮クロトはお前たちを騙している。本当はリクリエ側で暗躍する敵なんだ』って言われて、信じられるか？」"
translation = "「갑자기 나타난 데네브 사람이 『히노미야 쿠로토는 너희를 속이고 있다. 사실은 리크리에 측에서 암약하는 적이다』라고 말하면, 믿을 수 있겠어?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それは……」"
translation = "「그건……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「そんで魔王が言うんだ。『誤解だ、俺はみんなの仲間だ。今までどおり一緒に戦ってくれ』ってな。どうだ、九浄ヴィーナス」"
translation = "「그래서 마왕이 말하는 거지. 『오해다, 나는 모두의 동료다. 지금까지처럼 함께 싸워줘』라고 말이야. 어때, 쿠죠 비너스.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「う～……！」"
translation = "「으으……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……だったらやっぱり、俺たちはお互いを知るべきだろう」"
translation = "「……그렇다면 역시, 우리는 서로를 알아야만 해.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「１０年前のデネブで何があったのか、キミたち４人とルヴィネはどう知り合ったのか……俺たちに、聞かせてくれないか？」"
translation = "「10년 전 데네브에서 무슨 일이 있었는지, 너희 네 사람과 루비네는 어떻게 알게 되었는지…… 우리에게 들려주지 않겠어?」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「……面倒だし、意味を感じないけれど」"
translation = "「……번거롭고, 의미도 못 느끼겠지만.」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「相互理解のためには、お腹を割って話す必要があると思います。賛成ですよ、私は」"
translation = "「상호 이해를 위해서는 속을 터놓고 이야기할 필요가 있다고 생각합니다. 찬성이에요, 저는.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「いいよ。じゃあ、アタシが話す。……ただ、どこから話したもんかな？」"
translation = "「좋아. 그럼, 내가 이야기할게. ……다만, 어디서부터 이야기해야 할까?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「そうだな……１０年前の流星群のことから話すか。たぶんそれより前の歴史は、デネブとアルタイルで大きなズレはないだろうし」"
translation = "「그렇지…… 10년 전 유성우 때부터 이야기할까. 아마 그 이전의 역사는 데네브와 알타이르 사이에 큰 차이가 없을 테니까.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「アタシが初めてルヴィに会ったのは、流星群の直後だった」"
translation = "「내가 처음 루비를 만난 건, 유성우 직후였어.」"

