[[dialogue]]
speaker = "unk"
original = "第１話,アニマファーストコンタクト・前編,P"
translation = "제1화, 아니마 퍼스트 컨택트 · 전편"

[[dialogue]]
speaker = "unk"
original = "俺が星徒会長になってから、しばらく経ったある日のこと──"
translation = "내가 성도회장이 되고 나서 얼마 지나지 않은 어느 날──"

[[dialogue]]
speaker = "アニマ"
original = "「フヒ、毎度ありダ。購買部の出張販売にやって来たヨ、ヴィーナス」"
translation = "「후히, 매번 고맙다로우. 매점 출장 판매를 하러 왔다요, 비너스.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ええ、待ってたわ！\u3000ありがとう、アニマ先輩」"
translation = "「응, 기다렸어! 고마워, 아니마 선배.」"

[[dialogue]]
speaker = "マトイ"
original = "「ヴィーナス、さっき誰に電話してるかと思ったら……また頼んでたの？」"
translation = "「비너스, 아까 누구한테 전화하나 했더니…… 또 부탁한 거야?」"

[[dialogue]]
speaker = "アニマ"
original = "「やあ、マトイ。その通りダ。３時のおやつタイムにオススメ、アニマの特製焼き菓子セットだヨ♪」"
translation = "「야아, 마토이. 그 말대로다로우. 3시 간식 타임에 추천하는 아니마 특제 구움과자 세트다요♪」"

[[dialogue]]
speaker = "unk"
original = "あなたは確か、購買部の店員の……"
translation = "당신은 분명 매점 점원인……"

[[dialogue]]
speaker = "アニマ"
original = "「フヒ♪\u3000星徒会長もこんにちはダ。こうしてちゃんと話すのは初めてだナ？」"
translation = "「후히♪ 성도회장도 안녕이다로우. 이렇게 제대로 이야기하는 건 처음이네?」"

[[dialogue]]
speaker = "アニマ"
original = "「ならば、アニマの自己紹介をしよう。ご存じ購買部の美少女看板娘にして、天才錬金術師のアニマだ」"
translation = "「그렇다면 아니마의 자기소개를 하겠다로우. 아시다시피 매점의 미소녀 간판 아가씨이자 천재 연금술사인 아니마라다.」"

[[dialogue]]
speaker = "アニマ"
original = "「リクリエに対抗する為、世界を救う発明の実現を目指していル。だが、それ以外にも請われれば何でも作るヨ。気安く声をかけてくれ♪」"
translation = "「리크리에에 대항하기 위해 세계를 구하는 발명의 실현을 목표로 하고 있다로우. 하지만 그 외에도 요청받으면 뭐든 만든다요. 편하게 말 걸어달라요♪」"

[[dialogue]]
speaker = "アニマ"
original = "「……おや？\u3000なんだか意外そうな顔だネ」"
translation = "「……오야? 왠지 의외라는 표정이네.」"

[[dialogue]]
speaker = "アニマ"
original = "「ああ、なるほど。アニマはこう見えて、人と話すのは好きだし、接客は得意なんダ♪」"
translation = "「아아, 과연. 아니마는 이래 봬도 사람과 대화하는 걸 좋아하고 접객은 특기라다요♪」"

[[dialogue]]
speaker = "アニマ"
original = "「ともかく、これから仲良くしてくれると嬉しいヨ、会長。そうだ──」"
translation = "「어쨌든 앞으로 친하게 지내주면 기쁘겠다요, 회장. 맞아──」"

[[dialogue]]
speaker = "アニマ"
original = "「お近付きの印に、軽い実験でもおひとついかがカナ？」"
translation = "「친해진 기념으로 가벼운 실험이라도 하나 어떠냐로우?」"

[[dialogue]]
speaker = "アニマ"
original = "「この飴玉は、アニマが完成させたばかりの発明でネ。『使用者の星力を一時的に倍増させる』という優れものダ」"
translation = "「이 알사탕은 아니마가 막 완성한 발명품이라다요. 『사용자의 성력을 일시적으로 배가시킨다』는 뛰어난 물건이라다.」"

[[dialogue]]
speaker = "アニマ"
original = "「ちょうど実験に協力してくれる相手を探していたところだったんだヨ。どうだい、会長？」"
translation = "「마침 실험에 협력해 줄 상대를 찾고 있던 참이었다요. 어때, 회장?」"

[[dialogue]]
speaker = "マトイ"
original = "「う～ん、会長。アニマ先輩の薬は、効果は凄いけど、副作用がその……大変だから、試すかどうかはちょっと考えた方がいいと思う、よ……？」"
translation = "「으음, 회장. 아니마 선배의 약은 효과는 굉장하지만 부작용이 그…… 장난 아니니까 시험해 볼지는 좀 생각해보는 게 좋다고 봐……?」"

[[dialogue]]
speaker = "アニマ"
original = "「ああ。そういえば、マトイには前に、別の薬を試して貰ったことがあったネ」"
translation = "「아아. 그러고 보니 마토이에게는 전에 다른 약을 시험하게 한 적이 있었네.」"

[[dialogue]]
speaker = "アニマ"
original = "「主人公属性になりたい、とマトイが言っていたので、星力のオーラによって注目を集め易くする薬を作ったんダが……」"
translation = "「주인공 속성이 되고 싶다고 마토이가 말하길래 성력의 오라를 통해 주목을 끌기 쉽게 만드는 약을 만들었다만……」"

[[dialogue]]
speaker = "アニマ"
original = "「マトイが薬を飲んだタイミングで、ヴィーナスが星徒会室にやって来てネ──」"
translation = "「마토이가 약을 먹은 타이밍에 비너스가 성도회실에 찾아와서 말이다로우──」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あら？\u3000珍しいわね、マトイがアニマ先輩と一緒にいるなん……て……」"
translation = "「어라? 드문 일이네, 마토이가 아니마 선배랑 같이 있……다니……」"

[[dialogue]]
speaker = "マトイ"
original = "「ヴィーナス？\u3000私をじっと見つめて、どうかした？」"
translation = "「비너스? 나를 빤히 쳐다보고 왜 그래?」"

[[dialogue]]
speaker = "マトイ"
original = "「も、もしかして……薬の効果で、私が主人公っぽく見えてたり！？」"
translation = "「호, 혹시…… 약 효과 때문에 내가 주인공처럼 보이고 있다거나!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「マトイ……な、何だか私、マトイを見てるとドキドキするの。その……いきなりで驚くかもだけど──」"
translation = "「마토이…… 왠지 나, 마토이를 보고 있으면 두근거려. 그…… 갑작스러워서 놀라겠지만──」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「マトイのこと……お姉様、って呼んでもいい？」"
translation = "「마토이를…… 언니라고 불러도 돼?」"

[[dialogue]]
speaker = "マトイ"
original = "「は？\u3000……えっと、私たち同級生──」"
translation = "「하? ……에또, 우리 동급생──」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「お姉様、好き！」"
translation = "「언니, 좋아해!」"

[[dialogue]]
speaker = "マトイ"
original = "「百合漫画！？\u3000近い近い近い！」"
translation = "「백합 만화!? 가까워 가까워 가까워!」"

[[dialogue]]
speaker = "マトイ"
original = "「何これどうなってるんですか！？\u3000アニマ先輩！」"
translation = "「이거 뭐야 어떻게 된 거예요!? 아니마 선배!」"

[[dialogue]]
speaker = "アニマ"
original = "「フム、薬の副作用みたいだネ。目立つオーラだけでなく、固有のフェロモンも出ているようダ」"
translation = "「후무, 약의 부작용인 모양이다로우. 눈에 띄는 오라뿐만 아니라 고유의 페로몬도 나오고 있는 것 같다다.」"

[[dialogue]]
speaker = "アニマ"
original = "「名付けて『お姉様フェロモン』！」"
translation = "「이름하여 『언니 페로몬』!」"

[[dialogue]]
speaker = "マトイ"
original = "「余裕か！\u3000そんなことより、ヴィーナスを止めるの手伝って下さい！」"
translation = "「여유 부릴 때예요! 그것보다 비너스를 멈추는 것 좀 도와주세요!」"

[[dialogue]]
speaker = "アニマ"
original = "「残念だが無理な相談ダ。何故なら──」"
translation = "「안타깝지만 무리한 부탁이다로우. 왜냐하면──」"

[[dialogue]]
speaker = "アニマ"
original = "「フェロモンの効果はアニマにも発揮されているからダ、お姉様<emoji=heart04>」"
translation = "「페로몬의 효과는 아니마에게도 발휘되고 있기 때문이다다, 언니<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「うわぁぁぁっ、ゾンビものだったぁぁぁっ！」"
translation = "「우와아아악, 좀비물이었어어어억!」"

[[dialogue]]
speaker = "マトイ"
original = "「その後、薬の効果が切れるまで逃げ回る羽目になったわ……」"
translation = "「그 뒤로 약 효과가 떨어질 때까지 도망 다니는 신세가 됐었지……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ちょっと待って。その時の記憶、私ないんだけど……？」"
translation = "「잠깐 기다려. 그때 기억, 나한테는 없는데……?」"

[[dialogue]]
speaker = "アニマ"
original = "「まあ、そんなわけダ、会長。効果が強力な反面、何かしらの副作用は想定される」"
translation = "「뭐, 그런 셈이다다, 회장. 효과가 강력한 반면 어떠한 부작용은 상정된다다.」"

[[dialogue]]
speaker = "アニマ"
original = "「天才錬金術師の名にかけて、体に害は無いと誓うが……フヒ♪\u3000どうするかネ？\u3000それでも薬を試してみるかい？」"
translation = "「천재 연금술사의 이름을 걸고 몸에 해는 없다고 맹세하겠다만…… 후히♪ 어떻게 하겠냐로우? 그래도 약을 시험해 보겠나?」"

[[dialogue]]
speaker = "アニマ"
original = "「……ほう、実験に協力すると？\u3000それは何故ダ？」"
translation = "「……호오, 실험에 협력하겠다고? 그건 왜냐로우?」"

[[dialogue]]
speaker = "unk"
original = "本気で世界を救うつもりだから"
translation = "진심으로 세계를 구할 생각이니까"

[[dialogue]]
speaker = "unk"
original = "俺もあなたと同じで、"
translation = "나도 당신과 마찬가지로,"

[[dialogue]]
speaker = "アニマ"
original = "「っ！\u3000フヒッ！\u3000まさかそこを真に受けるとはネ……」"
translation = "「윽! 후히! 설마 그걸 곧이곧대로 받아들일 줄이야……」"

[[dialogue]]
speaker = "アニマ"
original = "「フヒヒッ、ヒヒッ、ハーハッハッ！\u3000面白い！\u3000キミに興味がわいて来たヨ、会長！」"
translation = "「후히히, 히히, 하하하하하! 재밌다다! 너에게 흥미가 생겼다요, 회장!」"

[[dialogue]]
speaker = "アニマ"
original = "「ああ、そうだとも！\u3000アニマも本気で世界を救うつもりダ！」"
translation = "「아아, 그렇고말고! 아니마도 진심으로 세계를 구할 생각이다다!」"

[[dialogue]]
speaker = "アニマ"
original = "「今回の薬も、その為に作ったものダ！\u3000一時的とはいえ、星力を倍増させられれば、戦闘における切り札となり得ル！」"
translation = "「이번 약도 그를 위해 만든 거라다요! 일시적이라곤 해도 성력을 배가시킬 수 있다면 전투에서 비장의 카드가 될 수 있다다!」"

[[dialogue]]
speaker = "アニマ"
original = "「キミが本気だというなら、あえて言うヨ！\u3000アニマが世界を救う為にその身を捧げるがいい！」"
translation = "「네가 진심이라면 감히 말하겠다요! 아니마가 세계를 구하기 위해 그 몸을 바치도록 해라다!」"

[[dialogue]]
speaker = "unk"
original = "（アニマから手渡された薬を飲む）"
translation = "(아니마에게서 건네받은 약을 마신다)"

[[dialogue]]
speaker = "ヴィーナス"
original = "「クロトが爆発したぁぁぁ──ッ！？」"
translation = "「쿠로토가 폭발했어어어──어!?」"

[[dialogue]]
speaker = "マトイ"
original = "「ちょっ、会長ぉぉぉ──ッ！？」"
translation = "「잠깐, 회장님으으으──윽!?」"

[[dialogue]]
speaker = "unk"
original = "←To Be Continued..."
translation = "←To Be Continued..."

