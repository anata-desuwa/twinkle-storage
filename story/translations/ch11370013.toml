[[dialogue]]
speaker = "unk"
original = "第３話,レミカとレジェンドアイドル,P"
translation = "제3화, 레미카와 레전드 아이돌, P"

[[dialogue]]
speaker = "unk"
original = "あれからレミカは、リトルフォームの姿を元にしたアバターでＶチューバーデビューし、汐ルカルカと『歌ってみた』のコラボ動画を配信。"
translation = "그 뒤로 레미카는 리틀 폼의 모습을 바탕으로 한 아바타로 VTuber 데뷔를 하여, 시오 루카루카와 『불러보았다』 콜라보 영상을 배포."

[[dialogue]]
speaker = "unk"
original = "新生Ｖチューバー『<ruby>詩道<rt>しどう</rt></ruby>ミソラ』として、本格的に活動を始めていた。"
translation = "신생 VTuber 『시도 미소라』로서, 본격적으로 활동을 시작하고 있었다."

[[dialogue]]
speaker = "ルルカ"
original = "「――というわけで♪\u3000今日はレミカ先輩ではなく、新たなＶチューバー及び、妹仲間のミソラちゃんとして……」"
translation = "「――그런 이유로♪ 오늘은 레미카 선배가 아니라, 새로운 VTuber이자 여동생 동료인 미소라짱으로서……」"

[[dialogue]]
speaker = "ルルカ"
original = "「『歌ってみた』コラボ大成功のお祝いだよ～！\u3000ドンドン、パフパフ～♪」"
translation = "「『불러보았다』 콜라보 대성공 축하 파티야~! 둥둥, 파프파프~♪」"

[[dialogue]]
speaker = "unk"
original = "デビューおめでとう！"
translation = "데뷔 축하해!"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「ありがとう♪\u3000ルカルカと……ルルカと一緒に歌えたことで、自分が目指している『可愛いアイドル』に、また１歩近づけた気がするよ」"
translation = "「고마워♪ 루카루카와…… 루루카와 함께 노래한 덕분에, 내가 목표로 하는 『귀여운 아이돌』에 또 한 걸음 다가간 기분이 들어」"

[[dialogue]]
speaker = "ルルカ"
original = "「こちらこそ♪\u3000あたしも、ミソラちゃんの言葉のおかげで、自分の歌に少し自信が持てるようになったよ！」"
translation = "「나야말로♪ 나도 미소라짱의 말 덕분에 내 노래에 조금 자신을 가질 수 있게 됐어!」"

[[dialogue]]
speaker = "ルルカ"
original = "「何より、ミソラちゃんと一緒に歌うの、本当に楽しくて……」"
translation = "「무엇보다 미소라짱이랑 같이 노래하는 거, 정말 즐거워서……」"

[[dialogue]]
speaker = "ルルカ"
original = "「歌が好きって気持ちを諦めずに、ルカルカとして活動してきてよかったなって、改めて思ったんだ♪\u3000ありがとう！」"
translation = "「노래를 좋아한다는 마음을 포기하지 않고 루카루카로서 활동해 오길 잘했다고 다시 한번 생각했어♪ 고마워!」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「私も、すごく楽しかった。だからこれからも、ルルカとＶチューバーのアイドルユニットとして、一緒に歌っていけたら嬉しいな」"
translation = "「나도 정말 즐거웠어. 그러니까 앞으로도 루루카와 VTuber 아이돌 유닛으로서 함께 노래해 나갈 수 있다면 기쁠 거야」"

[[dialogue]]
speaker = "ルルカ"
original = "「うん♪\u3000絶対伸びるし、また動画を上げていこう！」"
translation = "「응♪ 분명 대박 날 테니까 또 영상을 올리자!」"

[[dialogue]]
speaker = "unk"
original = "２人はお互い笑顔を浮かべて、握手を交わした。"
translation = "두 사람은 서로 미소를 지으며 악수를 나누었다."

[[dialogue]]
speaker = "unk"
original = "――と、そこで、レミカが思い出したように口を開く。"
translation = "――그러다 거기서 레미카가 생각난 듯 입을 열었다."

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「そうだ、ルルカにもう１つ、ぶっちゃけて聞きたいことがあったんだ」"
translation = "「맞다, 루루카에게 한 가지 더 솔직하게 물어보고 싶은 게 있었어」"

[[dialogue]]
speaker = "ルルカ"
original = "「聞きたいこと？」"
translation = "「물어보고 싶은 거?」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「私がルルカの歌声を気に入ったきっかけなんだけど……実は、自分が尊敬してるアイドルに、雰囲気がすごく似てたからなんだ」"
translation = "「내가 루루카의 노랫소리를 마음에 들어 하게 된 계기인데…… 사실 내가 존경하는 아이돌이랑 분위기가 정말 닮았거든」"

[[dialogue]]
speaker = "ルルカ"
original = "「えっ！？」"
translation = "「엣!?」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「昔、魔族でありながら、人間界でトップアイドルとして活躍していた――」"
translation = "「옛날에 마족이면서 인간계에서 톱 아이돌로 활약했던――」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「<ruby>汐凪<rt>しおなぎ</rt></ruby>シャルル」"
translation = "「시오나기 샤를」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「ルルカは……シャルルさんと、何か関係があったりする？」"
translation = "「루루카는…… 샤를 씨와 무슨 관계가 있거나 해?」"

[[dialogue]]
speaker = "ルルカ"
original = "「ぎくぎくぅっ……！？」"
translation = "「기, 기극……!?」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「うん。そのわかりやすい反応……やっぱり関係ありそうだね」"
translation = "「응. 그 알기 쉬운 반응…… 역시 관계가 있는 모양이네」"

[[dialogue]]
speaker = "ルルカ"
original = "「う、うぅ……はい……正直に言います……」"
translation = "「우, 우으…… 네…… 솔직히 말할게요……」"

[[dialogue]]
speaker = "ルルカ"
original = "「汐凪シャルルは……あたしのお母さんなんです……」"
translation = "「시오나기 샤를은…… 제 엄마예요……」"

[[dialogue]]
speaker = "unk"
original = "それから、ルルカの紹介を通して、レミカは流星市国内の喫茶店で、シャルルさんと顔を合わせることになった。"
translation = "그 후 루루카의 소개를 통해 레미카는 유성시국 내의 카페에서 샤를 씨와 대면하게 되었다."

[[dialogue]]
speaker = "ルルカ"
original = "「それじゃあ改めて……こちらがあたしのお母さんです」"
translation = "「그럼 다시 한번…… 이쪽이 제 엄마예요」"

[[dialogue]]
speaker = "シャルル"
original = "「は～い♪\u3000レミカちゃん、初めまして♪\u3000ルルカちゃんのママをしてます、海野辺シャルルで～す♪」"
translation = "「안녕~♪ 레미카짱, 처음 봐요♪ 루루카짱의 엄마를 하고 있는 우미노베 샤를이에요~♪」"

[[dialogue]]
speaker = "unk"
original = "ルルカの隣に腰かけている女性がにこやかな笑顔で挨拶をする。"
translation = "루루카의 옆에 앉아 있는 여성이 화사한 미소로 인사를 건넨다."

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「は、初めまして。ルルカさんと仲よくさせて頂いております、愛戸レミカです」"
translation = "「처, 처음 뵙겠습니다. 루루카 씨와 사이좋게 지내고 있는 아이도 레미카입니다」"

[[dialogue]]
speaker = "unk"
original = "周囲の注目を避けるため、レミカはリトルフォームに変身していた。"
translation = "주위의 주목을 피하기 위해, 레미카는 리틀 폼으로 변신해 있었다."

[[dialogue]]
speaker = "unk"
original = "シャルルさんも有名な元アイドルの為、目立たないような変装をして来ていた。"
translation = "샤를 씨도 유명한 전직 아이돌이었기에, 눈에 띄지 않도록 변장을 하고 와 있었다."

[[dialogue]]
speaker = "unk"
original = "――それでも、彼女の笑顔にはひと目で思わず惹きつけられるような、魅力ある『可愛さ』が溢れていて。"
translation = "――그럼에도, 그녀의 미소에는 한눈에 무심코 마음이 끌릴 정도의, 매력 있는 『귀여움』이 넘쳐흐르고 있어서."

[[dialogue]]
speaker = "シャルル"
original = "「きゃ～っ♪\u3000テレビで見てる現役のトップアイドルと、こうしてお話できるなんて～♪\u3000私、心キラキラしてきちゃうわ～♪」"
translation = "「꺄~♪ TV에서 보던 현역 톱 아이돌과 이렇게 이야기할 수 있다니~♪ 저, 마음이 반짝반짝해져 버려요~♪」"

[[dialogue]]
speaker = "ルルカ"
original = "「お母さん、し～っ！\u3000し～っ！\u3000ちょっと声大きいから！」"
translation = "「엄마, 쉿! 쉿! 목소리가 좀 크다니까!」"

[[dialogue]]
speaker = "シャルル"
original = "「あら、ごめんなさ～い♪\u3000てへっ<emoji=heart04>」"
translation = "「어머, 미안해~♪ 데헷<emoji=heart04>」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "（し、シャルルさん、お母さんになっても変わらず可愛い……！）"
translation = "(샤, 샤를 씨, 어머니가 되어서도 변함없이 귀여워……!)"

[[dialogue]]
speaker = "シャルル"
original = "「会長くんも久しぶりね～♪\u3000前のクリスマスの時以来かしら？」"
translation = "「회장 군도 오랜만이네~♪ 지난 크리스마스 때 이후일까?」"

[[dialogue]]
speaker = "unk"
original = "シャルルさん、ご無沙汰してます"
translation = "「샤를 씨, 오랜만입니다.」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「……まさかレジェンドアイドルと、こうして直接お会いできるなんて、光栄です」"
translation = "「……설마 레전드 아이돌과 이렇게 직접 뵐 수 있다니, 영광입니다.」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「ルルカさんがシャルルさんと血縁関係にあるかもしれないと気づいたのは、偶然だったんですが……」"
translation = "「루루카 씨가 샤를 씨와 혈연관계일지도 모른다고 눈치챈 건 우연이었지만……」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「もしお会いできるならと、ルルカさんにお願いさせてもらったんです」"
translation = "「혹시 뵐 수 있다면 하고, 루루카 씨에게 부탁드렸던 거예요.」"

[[dialogue]]
speaker = "シャルル"
original = "「こちらこそ、今のトップアイドルに会えて、すごく嬉しいわ♪」"
translation = "「나야말로, 지금의 톱 아이돌을 만나서 정말 기쁘단다♪」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「私、アイドルとして活動する中で、シャルルさんが現役だった頃のライブ映像を今でも何度も見返していて……ずっと、参考にさせてもらっているんです」"
translation = "「저, 아이돌로 활동하면서 샤를 씨가 현역이었던 시절의 라이브 영상을 지금도 몇 번이나 돌려보고 있어서…… 계속, 참고하고 있어요.」"

[[dialogue]]
speaker = "シャルル"
original = "「それ、知ってるわ♪\u3000インタビューで私の名前が出た時、すごく嬉しかったのよ～♪」"
translation = "「그거 알고 있단다♪ 인터뷰에서 내 이름이 나왔을 때, 정말 기뻤단다~♪」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「ほ、本当ですか！？\u3000そんなふうに思ってもらえてたなんて……」"
translation = "「저, 정말인가요!? 그렇게 생각해주고 계셨다니……」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「あ、あの！\u3000……シャルルさん、もしよければ、お聞きしたいことがあって――」"
translation = "「저, 저기! ……샤를 씨, 혹시 괜찮으시다면 여쭤보고 싶은 게 있어서――」"

[[dialogue]]
speaker = "シャルル"
original = "「ええ♪\u3000なんでも聞いてちょうだい」"
translation = "「응♪ 뭐든지 물어보렴.」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「私、シャルルさんのような『可愛いアイドル』を目指していて……」"
translation = "「저, 샤를 씨 같은 『귀여운 아이돌』을 목표로 하고 있어서……」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「現役時代、どんなことを意識してアイドル活動をされていたのか、ぜひお話を聞いてみたかったんです」"
translation = "「현역 시절에 어떤 점을 의식하며 아이돌 활동을 하셨는지, 꼭 이야기를 들어보고 싶었어요.」"

[[dialogue]]
speaker = "シャルル"
original = "「あ～、確かにそういう話って、インタビューとかでも話したことなかったわね」"
translation = "「아~ 확실히 그런 이야기는 인터뷰 같은 데서도 한 적이 없었네.」"

[[dialogue]]
speaker = "シャルル"
original = "「そうね……私、自分がどうなりたいかってことは、デビューしてから、少しずつ考えるようになったの」"
translation = "「글쎄…… 난 내가 어떻게 되고 싶은가 하는 건 데뷔하고 나서 조금씩 생각하게 되었어.」"

[[dialogue]]
speaker = "シャルル"
original = "「私、それまでは魔界の田舎街に住んでいて、アイドルの存在なんて知らなかったから。……それで、子供の頃は、自分の歌を褒められるのが嬉しかったけど――」"
translation = "「난 그때까지 마계의 시골 마을에 살고 있어서 아이돌이라는 존재조차 몰랐거든. ……그래서 어릴 때는 내 노래를 칭찬받는 게 기뻤지만――」"

[[dialogue]]
speaker = "シャルル"
original = "「人間界に来てアイドルになって、活動を続けるうちに、私の歌を聴いた人が笑顔になってくれることの方が、もっと嬉しいってことに気づくようになったのよ」"
translation = "「인간계에 와서 아이돌이 되고 활동을 계속하는 동안, 내 노래를 들은 사람이 미소 지어 주는 게 훨씬 더 기쁘다는 걸 깨닫게 되었단다.」"

[[dialogue]]
speaker = "シャルル"
original = "「だから、元アイドルとして、レミカちゃんに伝えるなら……」"
translation = "「그러니까 전직 아이돌로서 레미카 짱에게 전해준다면……」"

[[dialogue]]
speaker = "シャルル"
original = "「『可愛いアイドル』を目指すのは素敵だけど、今のレミカちゃんを応援してくれているファンの存在も、忘れないであげて欲しいってことかしら」"
translation = "「『귀여운 아이돌』을 목표로 하는 건 멋지지만, 지금의 레미카 짱을 응원해주는 팬들의 존재도 잊지 말아 주었으면 한다는 걸까.」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「……今の、私を……」"
translation = "「……지금의, 저를……」"

[[dialogue]]
speaker = "シャルル"
original = "「ふふっ♪\u3000少なくとも私は、アイドルとしての輝きを磨き続ける、今のレミカちゃんが大好きよ♪」"
translation = "「후훗♪ 적어도 나는, 아이돌로서의 광채를 계속 갈고닦는 지금의 레미카 짱이 정말 좋단다♪」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「……ありがとうございます。私、ちゃんと考えてみます」"
translation = "「……감사합니다. 저, 제대로 생각해 볼게요.」"

[[dialogue]]
speaker = "シャルル"
original = "「ねぇ、レミカちゃん。サイン、貰ってもいい？」"
translation = "「저기, 레미카 짱. 사인, 받아도 될까?」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「えっ！？\u3000シャルルさんが、私のサインを……！？」"
translation = "「엣!? 샤를 씨가, 제 사인을……!?」"

[[dialogue]]
speaker = "シャルル"
original = "「ええ♪\u3000私、今では立派なアイドルオタクだから♪\u3000推している子のサインは欲しいわ！」"
translation = "「에에♪ 나, 지금은 훌륭한 아이돌 오타쿠니까♪ 덕질하는 아이의 사인은 갖고 싶단다!」"

[[dialogue]]
speaker = "unk"
original = "レジェンドアイドルが、アイドルオタク！？"
translation = "레전드 아이돌이, 아이돌 오타쿠!?"

[[dialogue]]
speaker = "ルルカ"
original = "「うん、実はそうなんだよね～。今日みたいに変装して、よくライブに行ったりしてるし」"
translation = "「응, 사실 그래~. 오늘처럼 변장하고, 자주 라이브에 가기도 하고 말이야」"

[[dialogue]]
speaker = "ルルカ"
original = "「しかも、お母さん……女の子アイドル推しなんだよ？」"
translation = "「게다가, 엄마…… 여자 아이돌 덕후라니까?」"

[[dialogue]]
speaker = "シャルル"
original = "「つまり、私もレミカちゃんの大ファンってこと♪」"
translation = "「즉, 나도 레미카짱의 대팬이라는 소리♪」"

[[dialogue]]
speaker = "シャルル"
original = "「だから――これからも、ずっと応援してるわ♪」"
translation = "「그러니까―― 앞으로도, 계속 응원할게♪」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「光栄です……♪\u3000私、もっと頑張ります！」"
translation = "「영광입니다……♪ 저, 더욱 열심히 할게요!」"

[[dialogue]]
speaker = "unk"
original = "その後も、シャルルさんやルルカと一緒に、歌やアイドルの話で盛り上がり――"
translation = "그 후로도, 샤를 씨나 루루카와 함께, 노래나 아이돌 이야기로 분위기가 달아올랐고――"

[[dialogue]]
speaker = "unk"
original = "レミカはまた１つ、自分の目指す『可愛いアイドル』への手がかりを胸に刻むのだった。"
translation = "레미카는 다시 한번, 자신이 목표로 하는 『귀여운 아이돌』에 대한 실마리를 가슴에 새기는 것이었다."

