[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「──とまぁ、コラプサー事件の振り返りはこんなものかな。レポートはまとまりそう？」"
translation = "「──뭐, 콜랩서 사건의 회고는 이 정도려나. 리포트는 정리될 것 같아?」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「あ、こちらにいたんですね、魔王さん。コハルコさんも」"
translation = "「아, 여기 계셨군요, 마왕님. 코하루코 씨도.」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「あれ、どうしたの、レイラ？\u3000何か会長さんに用事？」"
translation = "「어라, 무슨 일이야, 레이라? 회장님에게 볼일이라도?」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「はい。私たちコラプサーはあの事件の後、守護星であるブラックホールとのリンクが弱くなり、戦闘力も低下しました」"
translation = "「네. 저희 콜랩서는 그 사건 이후, 수호성인 블랙홀과의 링크가 약해져 전투력도 저하되었습니다.」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「なのでリクリエと戦うために、改めて訓練する必要があるんですが、その相手を魔王さんにお願いしようと思いまして」"
translation = "「그래서 리크리에와 싸우기 위해 새롭게 훈련할 필요가 있는데, 그 상대를 마왕님께 부탁드리고자 해서요.」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「なるほど。それじゃ私も──」"
translation = "「그렇구나. 그럼 나도──」"

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「自分が魔女だってわかって、魔法も使えるようになったけど、まだまだ不慣れだから、私も会長さんに見てもらおうかな」"
translation = "「자신이 마녀라는 걸 알게 되고 마법도 쓸 수 있게 됐지만, 아직 서투르니까 나도 회장님이 봐줬으면 해.」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「それはいいですけど、どうしてアリーナに移動したんです？」"
translation = "「그건 좋습니다만, 어째서 아레나로 이동한 거죠?」"

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「だって本物のレイラだったら、トレーニングルームなんて消滅させちゃうでしょ。前より弱くなったっていっても、それでもブラックホールだし」"
translation = "「그야 진짜 레이라라면 트레이닝 룸 같은 건 소멸시켜 버릴 거 아냐. 전보다 약해졌다고 해도, 그래도 블랙홀이니까.」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「あ～……確かに……気を抜くととんでもないことになりますね」"
translation = "「아~…… 확실히…… 방심하면 엄청난 일이 벌어지겠네요.」"

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「というわけで、アリーナでのびのびやらせてもらうよ。ハッカーコンビの力、見せてあげる」"
translation = "「그런 고로, 아레나에서 마음껏 해보겠어. 해커 콤비의 힘을 보여줄게.」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「戦闘ではハッカー関係なくないですか？」"
translation = "「전투에서는 해커랑 상관없지 않나요?」"

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「ノリなんだから、そういうことは言わなくていいの」"
translation = "「분위기 타는 거니까, 그런 소린 안 해도 돼.」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「はーい。それじゃ胸を借りるつもりで行きますね、魔王さん！」"
translation = "「네에. 그럼 한 수 배운다는 생각으로 가겠습니다, 마왕님!」"

