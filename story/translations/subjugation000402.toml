[[dialogue]]
speaker = "unk"
original = "――新星学園２年生、桜十路サラン。"
translation = "──신성학원 2학년, 사쿠라코지 사란."

[[dialogue]]
speaker = "unk"
original = "ヴィーナスの九浄家に並ぶ、流星市国内の名家『五名門』の１つ、『桜十路家』の令嬢である。"
translation = "비너스의 쿠죠 가문과 어깨를 나란히 하는 유성시국 내 명가 '오명문' 중 하나인 '사쿠라코지 가문'의 영애다."

[[dialogue]]
speaker = "unk"
original = "桜十路家は、世界中に影響力を持つ『桜十路コンツェルン』という企業グループを経営しており、グループ会社である『桜十路食品』に始まり、流星市国内のあらゆる流通を司る。"
translation = "사쿠라코지 가문은 전 세계에 영향력을 가진 '사쿠라코지 콘체른'이라는 기업 그룹을 경영하고 있으며, 그룹 계열사인 '사쿠라코지 식품'을 시작으로 유성시국 내의 모든 유통을 주관한다."

[[dialogue]]
speaker = "unk"
original = "そして、彼女自身も『美食家』として有名。食の分野において天才的なセンスを持ち、趣味でお菓子作りも得意としているが、その腕前は趣味の範疇に収まらず――"
translation = "그리고 그녀 자신도 '미식가'로 유명하다. 음식 분야에서 천재적인 감각을 지녔으며 취미로 과자 만들기도 즐기는데, 그 솜씨는 취미의 범주에 머물지 않고──"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ハロウィンパーティーで売るお菓子を考えて、色々作ってきたよ～♪\u3000食べて食べて～♪」"
translation = "「할로윈 파티에서 팔 과자를 생각해서 여러 가지 만들어 왔어~♪ 먹어봐 먹어봐~♪」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「お～、チョコレートにクッキー、グミにキャンディー、ケーキまであるよ。豪華だね～」"
translation = "「오~ 초콜릿에 쿠키, 구미에 캔디, 케이크까지 있네. 호화롭다~.」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「昨日の今日でもう試作品を仕上げてきて下さるなんて、ありがとうございますわ、サラン様♪」"
translation = "「어제 말씀드리고 오늘 바로 시제품을 완성해 오시다니 감사합니다와, 사란 님♪」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「早速、試食してさせて頂きますわね。それでは、<ruby>私<rt>わたくし</rt></ruby>も好きなチョコレートから……ぱくっ……もぐもぐ――」"
translation = "「당장 시식해 보도록 하겠어요. 그럼 저도 좋아하는 초콜릿부터…… 냠…… 우물우물──」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「っ……！\u3000こ、これは……！？」"
translation = "「읏……! 이, 이것은……!?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「めっ……滅茶苦茶うめぇですわッ！！！\u3000想像を遥かに上回って、思わず口の中がビックリする程に！？」"
translation = "「조…… 더럽게 맛있습니다와!!! 상상을 훨씬 초월해서 나도 모르게 입안이 깜짝 놀랄 정도로요와!?」"

[[dialogue]]
speaker = "unk"
original = "美味しい！\u3000やっぱりサランはすごいな！"
translation = "맛있어! 역시 사란은 대단하네!"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「えへへ～、褒めてもらってふわふわ～♪」"
translation = "「에헤헤~ 칭찬받으니까 몸이 붕 뜨는 기분이야~♪」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「マインちゃんはどうかな？\u3000お口に合いそう？」"
translation = "「마인짱은 어때? 입맛에 좀 맞아?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ん……そうだね、私も美味しいと思うよ。見た目も綺麗だし、専門店で売ってるお菓子みたいだよね」"
translation = "「응…… 그렇네, 나도 맛있다고 생각해. 모양도 예쁘고, 전문점에서 파는 과자 같아.」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「そっか～、それならよかった～♪\u3000売り物だから、いつもより頑張って作ってみたの～」"
translation = "「그렇구나~, 다행이다~♪ 파는 물건이니까, 평소보다 더 힘내서 만들어 봤어~」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「サラン様、どれも本当にすごいですわ！\u3000<ruby>私<rt>わたくし</rt></ruby>、世界中を周りながら色んな高級菓子を口にしてきましたけれど、お世辞なしにそれと渡り合える味ですわ！」"
translation = "「사란 님, 어느 것이든 정말 대단해요! 저, 전 세계를 돌며 여러 고급 과자를 먹어왔지만, 빈말이 아니라 그것들과 겨룰 만한 맛이에요!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「見た目も実に上品……それでいて若い女子層にウケそうな可愛いらしさもあって……これはまさに、天才の技！」"
translation = "「겉모양도 참으로 품위 있고…… 그러면서도 젊은 여성층에게 인기 있을 법한 귀여움도 있어서…… 이건 그야말로, 천재의 솜씨!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「これはイケる……準備数を大幅に上方修正できる程に、イケますわ！」"
translation = "「이건 됩니다…… 준비 수량을 대폭 상향 수정할 수 있을 정도로, 됩니다와!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「断言できますわ！\u3000これは当日、爆売れしますわよ！」"
translation = "「단언할 수 있어요! 이건 당일, 불티나게 팔릴 거예요!」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「本当～？\u3000えへへ、そんな褒めてもらえると、照れちゃうかも～♪」"
translation = "「정말~? 에헤헤, 그렇게 칭찬해주면 쑥스러울지도~♪」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ただ、問題はどのお菓子を販売するかですわ。本当は全部売り出したいところですけれど、作れるのはサラン様１人」"
translation = "「다만, 문제는 어느 과자를 판매하느냐예요. 사실은 전부 내놓고 싶지만, 만들 수 있는 건 사란 님 혼자뿐.」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「商品の選定が悩ましいですわ……」"
translation = "「상품 선정이 고민되네요와……」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「あ～、そっか～。数を沢山作らなきゃいけないんだもんね～」"
translation = "「아~, 그렇구나~. 수량을 많이 만들어야 하니까 말이지~」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「マインちゃんは、どれが気に入ったとかある？」"
translation = "「마인짱은 어떤 게 맘에 든다거나 하는 거 있어?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「私？\u3000……う～ん、私は味オンチなところがあるからな～」"
translation = "「나? ……으~음, 나는 맛에 좀 둔한 편이라서 말이야~」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ぽよ？\u3000そうなの？」"
translation = "「뽀요? 그래?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「なんで、桜十路先輩は私の好みは気にしなくて大丈夫ですよ。自分が美味しいと思うお菓子を作っちゃって下さい」"
translation = "「그러니 사쿠라코지 선배는 제 취향은 신경 쓰지 않아도 괜찮아요. 자신이 맛있다고 생각하는 과자를 만들어 주세요.」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「え～？\u3000でもサランは、マインちゃんの好みも知りたいけどな～」"
translation = "「에~? 하지만 사란은 마인짱의 취향도 알고 싶은걸~」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「誰でも好みの味は必ずあるはずでしょ？\u3000セナリィちゃんはチョコレートが好きみたいだし、マインちゃんだって何か好きな食べ物が――」"
translation = "「누구든 좋아하는 맛은 반드시 있잖아? 세나리짱은 초콜릿을 좋아하는 것 같고, 마인짱도 뭔가 좋아하는 음식이──」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「にひひ♪\u3000まあまあ、私のことは置いておいて。どうせなら、会長の好みを聞いてみたらいかがですか？」"
translation = "「니히히♪ 자자, 제 이야기는 제쳐두고. 이왕이면 회장의 취향을 물어보는 게 어때요?」"

[[dialogue]]
speaker = "unk"
original = "えっ？\u3000俺？"
translation = "에? 나?"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「そうそう。今まで、会長の好物について尋ねたことなかったし。いい機会だから教えて欲しいな～」"
translation = "「맞아 맞아. 지금까지 회장의 좋아하는 음식에 대해 물어본 적 없었으니까. 좋은 기회니까 가르쳐 줬으면 좋겠네~」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「言われてみればそうかも～。会長ちゃんは、どんな食べ物が好きなの？」"
translation = "「듣고 보니 그럴지도~. 회장짱은 어떤 음식을 좋아해?」"

[[dialogue]]
speaker = "unk"
original = "そうして、販売するお菓子の相談は進み、クッキーやマシュマロ、チョコレートを散りばめた『カップケーキ』を作ることに決まった。比較的王道と言えるラインナップだ。"
translation = "그렇게 판매할 과자에 대한 상담은 진행되었고, 쿠키나 마시멜로, 초콜릿을 흩뿌린 '컵케이크'를 만들기로 결정되었다. 비교적 왕도라고 할 수 있는 라인업이다."

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「それじゃあ、会長様、マイン。今日はここまでで解散ということで」"
translation = "「그러면 회장님, 마인. 오늘은 여기까지 하고 해산하는 걸로 하죠.」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「<ruby>私<rt>わたくし</rt></ruby>はこの後、カップケーキの材料についての相談の為、サラン様のご自宅まで行ってきますわ」"
translation = "「저는 이따가 컵케이크 재료에 대해 상의하기 위해 사란 님의 댁까지 다녀오겠어요」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「マインちゃん、会長ちゃん、また明日ね～♪」"
translation = "「마인짱, 회장짱, 내일 봐~♪」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「は～い、お疲れ様で～す」"
translation = "「네~이, 수고하셨습니다~.」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「……ふぅ。さてと、私たちも帰りますかね～っと」"
translation = "「……후우. 자 그럼, 우리도 돌아가 볼까나~ 하고.」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「――ん？\u3000どうしたの、会長？」"
translation = "「──응? 왜 그래, 회장?」"

[[dialogue]]
speaker = "unk"
original = "マイン、様子が変だったけど……大丈夫？"
translation = "마인, 상태가 이상해 보였는데…… 괜찮아?"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「え？\u3000あ～……よく見てるね～、会長は。気づかれちゃってるなら、隠しておけないよね」"
translation = "「에? 아~…… 잘 보고 있네~, 회장은. 들켜버렸다면 숨길 수 없겠지.」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ここだけの話にして欲しいんだけど――」"
translation = "「여기서만 하는 이야기로 해줬으면 좋겠는데──」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「私さ、桜十路先輩のことが、正直苦手なんだよね～」"
translation = "「나 말이야, 사쿠라코지 선배가 솔직히 좀 거북하단 말이지~.」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「別に嫌ってるわけじゃないんだよ？\u3000ただ、人間だからさ、性格の合う合わないってやっぱりあるわけじゃん？」"
translation = "「딱히 싫어하는 건 아니라고? 다만 인간이니까, 성격이 맞고 안 맞고 하는 건 역시 있는 법이잖아?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「会長はわかってるかもしれないけど……私は自分のこと、善良な人間じゃないって自覚があるんだ」"
translation = "「회장은 알고 있을지도 모르지만…… 나는 내 자신이 선량한 인간이 아니라는 자각이 있어.」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「捻くれてて、悪戯好きで、腹黒くて……分類するなら、悪属性ってやつ」"
translation = "「비뚤어지고, 장난 좋아하고, 속이 검고…… 분류하자면 악 속성이라는 녀석.」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「一方の桜十路先輩は、善属性だよね？\u3000純真で、明るくて、ふわふわしてて――」"
translation = "「반면에 사쿠라코지 선배는 선 속성이잖아? 순진하고, 밝고, 둥실둥실하고──」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「普通に喋ること自体はできるけど……私、先輩と話しているとさ、なんだか眩しくなっちゃうんだよね～」"
translation = "「평범하게 대화하는 것 자체는 가능하지만…… 나, 선배랑 이야기하고 있으면 말이야, 왠지 눈이 부셔버린단 말이지~.」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「その善性に照らされて……自分でも面倒臭いところだと思うけど、自己嫌悪しちゃうわけ」"
translation = "「그 선함에 비춰져서…… 스스로도 번거로운 부분이라고 생각하지만, 자기혐오를 해버린달까.」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ああ、私の心はこんなに悪側なんだ、ってさ」"
translation = "「아아, 내 마음은 이렇게나 악한 쪽이구나, 하고 말이야.」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「なんというか……住んでいる世界が違うって思っちゃうんだよね～」"
translation = "「뭐랄까…… 살고 있는 세계가 다르다고 느껴버린단 말이지~.」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「……本当はさ、今日の試食会、桜十路先輩のお菓子を食べた時に、セナリィの言うような美味しい味だってのが、私にはわからなかったんだよね」"
translation = "「……사실은 말이야, 오늘 시식회 때 사쿠라코지 선배의 과자를 먹었을 때, 세나리가 말하는 것처럼 맛있는 맛이라는 걸 나는 잘 모르겠더라고.」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「私は美的感覚とか味覚が、他の人とはとことんズレてるから」"
translation = "「나는 미적 감각이나 미각이 다른 사람들이랑은 완전히 어긋나 있으니까.」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「でも、そんなこと、相手には言えないじゃん？」"
translation = "「하지만 그런 거, 상대방한테 말할 순 없잖아?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「――つまりは、そういうこと。だから、桜十路先輩とは距離を置いて、付き合うようにするよ」"
translation = "「──즉, 그런 거야. 그러니까 사쿠라코지 선배와는 거리를 두고 지내려고 해.」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「セナリィのよく言う、ビジネスパートナーとしてね」"
translation = "「세나리가 자주 말하는 비즈니스 파트너로서 말이야.」"

[[dialogue]]
speaker = "unk"
original = "無理に親しくなる必要はないけど――"
translation = "무리하게 친해질 필요는 없지만──"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ん？\u3000――自分の好物くらいは、教えてあげてもいいんじゃないかって？」"
translation = "「응? ──자기가 좋아하는 것 정도는 가르쳐 줘도 괜찮지 않겠냐고?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「……ん～、でもなぁ……」"
translation = "「……으~음, 그렇지만 말이야……」"

[[dialogue]]
speaker = "unk"
original = "マインは少し、考えるような顔をしたが……"
translation = "마인은 잠시 고민하는 듯한 표정을 지었지만……"

[[dialogue]]
speaker = "unk"
original = "結局、その話は適当にはぐらかされて、有耶無耶になってしまうのだった。"
translation = "결국 그 이야기는 적당히 얼버무려져서 유야무야되고 말았다."

