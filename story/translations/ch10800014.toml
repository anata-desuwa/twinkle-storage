[[dialogue]]
speaker = "unk"
original = "第４話,２人だけのシークレット,P"
translation = "제4화, 둘만의 시크릿"

[[dialogue]]
speaker = "フラン"
original = "「行け行け新星！\u3000押せ押せ新星！\u3000よーし、そこだ！\u3000行っけぇえぇええぇぇぇっ！」"
translation = "「가자 가자 신성! 밀어붙여 신성! 좋아, 거기다! 가아아아아아아앗!」"

[[dialogue]]
speaker = "フラン"
original = "「うぉおぉおおぉぉぉぉぉっ！\u3000入ったぁああぁぁぁゴォオォォォォォォルッッ！！」"
translation = "「우오오오오오오오오! 들어갔다아아아아아아 골으으으으으으으으윽!!」"

[[dialogue]]
speaker = "unk"
original = "今日は女子サッカー部の地方予選トーナメント準決勝。ここで勝てば新星学園は決勝に駒を進め、全国への切符が確実なものになる。"
translation = "오늘은 여자 축구부 지방 예선 토너먼트 준결승. 여기서 이기면 신성학원은 결승에 진출해 전국 대회 티켓이 확실해진다."

[[dialogue]]
speaker = "unk"
original = "今のゴールで２対２となり、同点に並んだところだ。"
translation = "방금 골로 2 대 2가 되어 동점이 된 상황이다."

[[dialogue]]
speaker = "アナ"
original = "「ハーフタイムを終えての後半３０分。現在のチーム力は、ほぼ五分五分ですね」"
translation = "「하프타임을 마치고 후반 30분. 현재 팀 전력은 거의 막상막하네요.」"

[[dialogue]]
speaker = "アナ"
original = "「しかし、走り回っている新星サッカー部はかなり疲れが見えています。相手チームはまだ控えのメンバーも残していますし、余力があるように見えますね」"
translation = "「하지만 계속 뛰어다니고 있는 신성 축구부는 꽤 지친 기색이 보입니다. 상대 팀은 아직 후보 선수도 남아 있고 여력이 있어 보이네요.」"

[[dialogue]]
speaker = "unk"
original = "解説のアナさん、ありがとうございます"
translation = "해설 아나 씨, 감사합니다"

[[dialogue]]
speaker = "アナ"
original = "「ノープロブレムです。ですが、会長もちゃんと試合を見てください」"
translation = "「노 프라블럼입니다. 하지만 회장님도 제대로 시합을 봐주세요.」"

[[dialogue]]
speaker = "アナ"
original = "「応援しているフラン先輩ばかり見ているの、わかっていますから」"
translation = "「응원하고 있는 프랑 선배만 보고 있는 거, 알고 있으니까요.」"

[[dialogue]]
speaker = "unk"
original = "気づかれてたか。"
translation = "들켰나."

[[dialogue]]
speaker = "unk"
original = "全国の切符のかかった白熱している試合よりも、額に汗しながら、フィールドの選手に呼びかけるように応援しているフランに目を奪われていた。"
translation = "전국 티켓이 걸린 달아오르는 시합보다도, 이마에 땀을 흘리며 필드의 선수에게 외치듯 응원하고 있는 프랑에게 눈을 빼앗기고 있었다."

[[dialogue]]
speaker = "フラン"
original = "「いいぞーいいぞー！\u3000いいぞーいいぞー！\u3000あーっ！\u3000惜しーいっ！」"
translation = "「좋아─ 좋아─! 좋아─ 좋아─! 아─! 아깝다─!」"

[[dialogue]]
speaker = "unk"
original = "ノーマークからの渾身のシュートはゴールポストに弾かれてしまい、新星側の応援席から失念のため息が出る。"
translation = "노마크 상황에서의 회심의 슈팅은 골대를 맞고 튕겨 나갔고, 신성 측 응원석에서는 아쉬움의 탄식이 터져 나온다."

[[dialogue]]
speaker = "フラン"
original = "「おいおい、ガッカリしてる暇なんてねーぞ！\u3000今ウチに流れが来てんだ！」"
translation = "「어이어이, 실망하고 있을 틈 없다고! 지금 우리한테 흐름이 왔어!」"

[[dialogue]]
speaker = "フラン"
original = "「みんな、声援を届けるんだ！\u3000オレたちの応援は、フィールドに届いて、力になる！\u3000なっ！」"
translation = "「다들 응원을 보내는 거야! 우리의 응원은 필드에 닿아서 힘이 된다! 알았지!」"

[[dialogue]]
speaker = "フラン"
original = "「行っけー行け行け新星！\u3000押っせー押せ押せ新星！」"
translation = "「가자─ 가자 가자 신성! 밀어붙여─ 밀어붙여 신성!」"

[[dialogue]]
speaker = "アナ"
original = "「……残りはロスタイムで２分ほど。ですがこれはよくないですね」"
translation = "「……남은 건 로스타임으로 2분 정도. 하지만 이건 좋지 않네요.」"

[[dialogue]]
speaker = "アナ"
original = "「相手チームのワンツーが綺麗に決まり、ディフェンダー不在。突っ込んだキーパーもかわされて……あ、入りました」"
translation = "「상대 팀의 원투 패스가 깔끔하게 성공하며 수비수 부재. 돌진한 키퍼까지 제쳐지고…… 아, 들어갔습니다.」"

[[dialogue]]
speaker = "アナ"
original = "「決勝ゴールですね。ここからの逆転は絶望的です」"
translation = "「결승 골이네요. 여기서부터의 역전은 절망적입니다.」"

[[dialogue]]
speaker = "フラン"
original = "「諦めるには、まだ早え！\u3000試合は終わってねえぞ！\u3000行っけー行け行け新星！\u3000押っせー押せ押せ新星！」"
translation = "「포기하기엔 아직 일러! 시합은 끝나지 않았다고! 가자─ 가자 가자 신성! 밀어붙여─ 밀어붙여 신성!」"

[[dialogue]]
speaker = "unk"
original = "しかし、フランの不屈の想いは届くことはなく、無情にも試合終了のホイッスルが鳴り響き。"
translation = "하지만 프랑의 불굴의 마음은 닿지 않았고, 무정하게도 경기 종료 휘슬이 울려 퍼졌다."

[[dialogue]]
speaker = "unk"
original = "我らが新星学園チームは、決勝目前での敗北を喫した。"
translation = "우리 신성학원 팀은 결승 문턱에서 패배를 맛보았다."

[[dialogue]]
speaker = "フラン"
original = "「くそっ、惜しかったなあ……！\u3000応援がもっと届いてれば……！」"
translation = "「젠장, 아까웠는데……! 응원이 좀 더 닿았더라면……!」"

[[dialogue]]
speaker = "フラン"
original = "「よく頑張ったー！\u3000いい試合だったぜー！」"
translation = "「잘 싸웠다─! 좋은 경기였어─!」"

[[dialogue]]
speaker = "unk"
original = "涙をぬぐって退場する選手たちにねぎらいの言葉をかけるフラン。"
translation = "눈물을 닦으며 퇴장하는 선수들에게 격려의 말을 건네는 프랑."

[[dialogue]]
speaker = "フラン"
original = "「みんなの応援も、心がひとつになってて最高だったぜ！」"
translation = "「모두의 응원도 마음이 하나가 되어서 최고였다고!」"

[[dialogue]]
speaker = "フラン"
original = "「はー、さすがに喉枯れちまった……水分補給とトイレに行ってくるわ。ちょっとの間、頼んだぜ」"
translation = "「하─ 과연 목이 다 쉬어버렸네…… 수분 보충이랑 화장실 좀 다녀올게. 잠시만 부탁한다.」"

[[dialogue]]
speaker = "アナ"
original = "「……おや。会長もお手洗いですか。大丈夫です、遅くなってもノープロブレムです」"
translation = "「……어라. 회장님도 화장실인가요. 괜찮습니다, 늦어져도 노 프라블럼입니다.」"

[[dialogue]]
speaker = "フラン"
original = "「っくぅ……！」"
translation = "「윽……!」"

[[dialogue]]
speaker = "unk"
original = "涙を払って、元気よく"
translation = "눈물을 털어내고 활기차게"

[[dialogue]]
speaker = "unk"
original = "フラン"
translation = "프랑"

[[dialogue]]
speaker = "フラン"
original = "「……ッ！\u3000な、なんだ、会長も応援に来てたのかよ」"
translation = "「……윽! 뭐, 뭐야, 회장도 응원하러 왔었냐.」"

[[dialogue]]
speaker = "フラン"
original = "「いやぁ、今のすげえいい試合だったよな！\u3000次やったら絶対に勝てるぜ！」"
translation = "「아니 뭐, 방금 거 진짜 좋은 경기였지! 다음에 하면 무조건 이길 거야!」"

[[dialogue]]
speaker = "フラン"
original = "「試合よりもオレを見てたぁ？\u3000ったく、オレなんか見てないで応援しろよ。最高の試合だったんだぜ」"
translation = "「시합보다 날 보고 있었다고? 나 원 참, 나 같은 거 보지 말고 응원이나 하라고. 최고의 시합이었단 말이야.」"

[[dialogue]]
speaker = "フラン"
original = "「知ってるか？\u3000ウチのチームさ、毎日毎日、雨の日も雪の日も陽が落ちるまで練習して、頑張ってたんだぜ」"
translation = "「알고 있어? 우리 팀 말이야, 매일매일 비가 오나 눈이 오나 해가 질 때까지 연습하며 힘냈다고.」"

[[dialogue]]
speaker = "フラン"
original = "「もちろん相手のチームだって、ウチに勝ったくらいだ。血の滲むようなすげえ練習してたんだろうけどさ」"
translation = "「물론 상대 팀도 우리를 이길 정도니까 피나는 연습을 엄청 했겠지만 말이야.」"

[[dialogue]]
speaker = "フラン"
original = "「力は五分五分だったんだ。オレの声援がもっと背中を押せてれば……てのは思い上がりか」"
translation = "「실력은 막상막하였어. 내 응원이 좀 더 등을 밀어줄 수 있었더라면…… 하는 건 오만인가.」"

[[dialogue]]
speaker = "unk"
original = "どうしてフランは応援団にいるんだ？"
translation = "어째서 프랑은 응원단에 있는 거야?"

[[dialogue]]
speaker = "フラン"
original = "「あー、よく言われるんだよな。『応援するより自分でやった方がオレらしくないか？』ってさ」"
translation = "「아─ 자주 듣는 소리야. 『응원하는 것보다 직접 뛰는 게 너답지 않아?』라고 말이지.」"

[[dialogue]]
speaker = "フラン"
original = "「オレは戦士だ。戦って誰かを守るのが仕事だ」"
translation = "「난 전사다. 싸워서 누군가를 지키는 게 일이야.」"

[[dialogue]]
speaker = "フラン"
original = "「だけど戦ってるのは戦士だけじゃねえ。『生きることは戦い』だからな。みんなそれぞれの戦いがある」"
translation = "「하지만 싸우고 있는 건 전사뿐만이 아니야. 『사는 건 싸움』이니까 말이지. 다들 각자의 싸움이 있어.」"

[[dialogue]]
speaker = "フラン"
original = "「部活やってるやつだってそうだろ。だからオレは、一生懸命戦ってるやつの力になってやりてえんだ」"
translation = "「부활동 하는 녀석들도 그렇잖아. 그래서 나는 열심히 싸우는 녀석들의 힘이 되어주고 싶은 거야.」"

[[dialogue]]
speaker = "フラン"
original = "「ま、最初は声がデカいからって応援団にスカウトされて、付き合いで入ったんだけどな」"
translation = "「뭐, 처음엔 목소리가 크다는 이유로 응원단에 스카우트돼서 의리로 들어왔지만 말이야.」"

[[dialogue]]
speaker = "フラン"
original = "「応援団のほかの連中や、部活のやつらの真剣なところ見てたら、みんなの戦いを少しでも助けたいって思ったんだ」"
translation = "「응원단의 다른 녀석들이나 부활동 녀석들의 진지한 모습을 보니까, 모두의 싸움을 조금이라도 돕고 싶다고 생각했어.」"

[[dialogue]]
speaker = "フラン"
original = "「知ってるか？\u3000仲間が自分を信じてくれてるってだけで、自分でも信じられないような力が出せるんだ」"
translation = "「알고 있어? 동료가 자신을 믿어주고 있다는 것만으로도 자신조차 믿을 수 없는 힘이 나온다는 거.」"

[[dialogue]]
speaker = "フラン"
original = "「普通なら勝てっこない相手でも勝てちまう……会長だって、そういう経験あるだろ？」"
translation = "「평소라면 절대 이길 수 없는 상대라도 이길 수 있게 된다고…… 회장도 그런 경험 있지?」"

[[dialogue]]
speaker = "フラン"
original = "「……なんてな。はは、熱弁しちまった」"
translation = "「……라니. 하하, 열변을 토해버렸네.」"

[[dialogue]]
speaker = "unk"
original = "フランはすごくかっこいいよ"
translation = "프랑은 정말 멋있어"

[[dialogue]]
speaker = "フラン"
original = "「んなっ……！？\u3000別に大したことしてねえよ。オレは当たり前のことをしてるだけっつーか、そういうのは選手に言ってくれ」"
translation = "「뭐랏……!? 별로 대단한 일 한 거 아니야. 난 당연한 걸 하고 있을 뿐이랄까, 그런 건 선수들한테 말해줘.」"

[[dialogue]]
speaker = "unk"
original = "当たり前なら、涙を浮かべたりしないよ"
translation = "당연한 거라면 눈물을 글썽이거나 하지 않아"

[[dialogue]]
speaker = "フラン"
original = "「な、涙！？\u3000な、泣いてなんかねえし！\u3000これは、その、なんだ、そう！\u3000汗が目に入っただけで……！」"
translation = "「누, 눈물!? 누, 운 건 아니라고! 이건, 그, 뭐냐, 그래! 땀이 눈에 들어갔을 뿐이야……!」"

[[dialogue]]
speaker = "フラン"
original = "「そりゃ胸にジンとキたから、ちょっとくらいは涙が出ちまったかもだけど……ちょっとだけ！\u3000ちょっとだけだかんな！？」"
translation = "「그야 가슴이 찡했으니까 조금 정도는 눈물이 났을지도 모르지만…… 조금이야! 조금뿐이라고 알았어!?」"

[[dialogue]]
speaker = "フラン"
original = "「あー、くそっ！\u3000格好悪ぃとこ見られた……このことは絶対、みんなには内緒だからな！？\u3000絶対だぞ！？」"
translation = "「아─ 젠장! 못난 꼴을 보였군…… 이 일은 절대 다른 사람들한텐 비밀이야!? 알았지!?」"

[[dialogue]]
speaker = "unk"
original = "ああ、約束だ"
translation = "아아, 약속할게"

[[dialogue]]
speaker = "フラン"
original = "「本当だろうな？\u3000ったく……あんたと話してると調子狂わされっぱなしだぜ……」"
translation = "「진짜겠지? 나 원 참…… 당신이랑 얘기하고 있으면 페이스가 휘말리기만 한다고……」"

[[dialogue]]
speaker = "フラン"
original = "「さーてと、気ぃ取り直して！」"
translation = "「자─ 그럼 기분 전환하고!」"

[[dialogue]]
speaker = "フラン"
original = "「まだ応援は終わりじゃねえ。全国の切符は残念だったけど、３位決定戦があるからな。次も気張って応援するぜ！」"
translation = "「아직 응원은 끝난 게 아니야. 전국 티켓은 아쉽게 됐지만 3위 결정전이 남았으니까. 다음도 힘내서 응원할 거야!」"

[[dialogue]]
speaker = "フラン"
original = "「次はオレじゃなくって、試合を見るんだぞ？\u3000余所見してるとぶっ飛ばすからな！」"
translation = "「다음엔 내가 아니라 시합을 보라고? 한눈팔면 날려버릴 테니까!」"

