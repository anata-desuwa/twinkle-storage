[[dialogue]]
speaker = "unk"
original = "……あれから。３人で『解放』のロストアイテム探しを続けるも、どうしても気まずい空気はぬぐえず──"
translation = "……그 후. 세 명이서 『해방』의 로스트 아이템 찾기를 계속해도 아무래도 어색한 공기는 지울 수 없었고──"

[[dialogue]]
speaker = "シズハ"
original = "「私、ちょっと外を飛んで、校舎の周辺を見て回って来るね！」"
translation = "「나, 잠깐 밖을 날아서 교사 주변을 둘러보고 올게!」"

[[dialogue]]
speaker = "ディーラック"
original = "「まぁ、あれサ。大丈夫、シズハちゃんのことはボクが見とくからサ～」"
translation = "「뭐, 저거라네. 괜찮아, 시즈하짱은 내가 봐둘 테니까 말이라네~」"

[[dialogue]]
speaker = "unk"
original = "シズハは、そう言うディーラックと共に、どこかへ飛び去ってしまった。"
translation = "시즈하는 그렇게 말하는 디럭쿠와 함께 어딘가로 날아가 버렸다."

[[dialogue]]
speaker = "サーシャ"
original = "「……会長くん、さっきの話の続きだけれど――」"
translation = "「……회장군, 아까 하던 이야기의 계속인데――」"

[[dialogue]]
speaker = "サーシャ"
original = "「シズハちゃんのことを、どうか助けてあげて欲しいの」"
translation = "「시즈하짱을 부디 도와주었으면 해」"

[[dialogue]]
speaker = "サーシャ"
original = "「私では……あの子のことを助けられないから」"
translation = "「나로서는…… 그 아이를 도와줄 수 없으니까」"

[[dialogue]]
speaker = "unk"
original = "……どうしてですか？"
translation = "……어째서인가요?"

[[dialogue]]
speaker = "サーシャ"
original = "「私は、シズハちゃんが間違ったことをしていても、それを正してあげることができない」"
translation = "「나는 시즈하짱이 잘못된 일을 하고 있어도 그것을 바로잡아 줄 수가 없어」"

[[dialogue]]
speaker = "サーシャ"
original = "「……私ね、どうしても他人の気持ちを考えるのが苦手なの」"
translation = "「……나는 말이야, 아무래도 타인의 마음을 헤아리는 게 서툴러」"

[[dialogue]]
speaker = "サーシャ"
original = "「だから、自覚のない内に間違ったことをしてしまう。今回もそう――」"
translation = "「그래서 자각하지 못하는 사이에 잘못된 일을 저지르고 말아. 이번에도 그래――」"

[[dialogue]]
speaker = "unk"
original = "そうして、サーシャさんは事情を俺に打ち明けた。いや……それはサーシャさんの懺悔でもあったのかもしれない。"
translation = "그렇게 사샤 씨는 사정을 내게 털어놓았다. 아니…… 그것은 사샤 씨의 참회이기도 했을 것이다."

[[dialogue]]
speaker = "unk"
original = "シズハには亡くなってしまったお姉さんがいること。そして――"
translation = "시즈하에게는 돌아가신 언니가 있다는 것. 그리고――"

[[dialogue]]
speaker = "サーシャ"
original = "「私……シズハちゃんに、『お姉ちゃん』と呼んでくれてもいいって言っちゃったの」"
translation = "「나…… 시즈하짱에게, 『언니』라고 불러도 괜찮다고 말해버렸어」"

[[dialogue]]
speaker = "サーシャ"
original = "「普段から口にしている、軽口の延長だったわ」"
translation = "「평소에 입에 담던 가벼운 농담의 연장이었지」"

[[dialogue]]
speaker = "サーシャ"
original = "「もちろんシズハちゃんに対しても、星徒会のみんなに対しても、私なりの方法で親愛の情を示しただけ。口から出まかせを言ったわけじゃないわ」"
translation = "「물론 시즈하짱에 대해서도, 성도회 모두에 대해서도 나름대로의 방법으로 친애의 정을 표시했을 뿐이야. 입에 발린 말을 한 건 아니야」"

[[dialogue]]
speaker = "サーシャ"
original = "「それでも『シズハちゃんの姉』という存在の重さを、真剣に考えていたとは言えない」"
translation = "「그래도 『시즈하짱의 언니』라는 존재의 무게를 진지하게 생각했다고는 할 수 없어」"

[[dialogue]]
speaker = "サーシャ"
original = "「『みんなのお姉ちゃん』になりたい、なんていう私の下らない欲望が、シズハちゃんにとってどんな毒になるのか、ちょっと考えればわかったはずなのに」"
translation = "「『모두의 언니』가 되고 싶다는 나의 하찮은 욕망이 시즈하짱에게 어떤 독이 될지, 조금만 생각하면 알 수 있었을 텐데」"

[[dialogue]]
speaker = "サーシャ"
original = "「しかも始末に悪いのはね……こんな状況になってもなお、シズハちゃんの言葉に共感している自分がいること」"
translation = "「게다가 더 좋지 않은 점은 말이야…… 이런 상황이 되었음에도 여전히 시즈하짱의 말에 공감하고 있는 내가 있다는 거야」"

[[dialogue]]
speaker = "シズハ"
original = "「……か、仮に、認識が歪んでいたとして、それってそんなに困ること？」"
translation = "「……가, 가령 인식이 왜곡되어 있다고 쳐서, 그게 그렇게 곤란한 일인가요?」"

[[dialogue]]
speaker = "シズハ"
original = "「私は、サーシャさんが本当にお姉ちゃんだったら、嬉しいよ？\u3000サーシャさんは、私が妹だったら嫌？」"
translation = "「저는 사샤 씨가 정말 언니라면 기뻐요! 사샤 씨는 제가 여동생이면 싫은가요?」"

[[dialogue]]
speaker = "サーシャ"
original = "「シズハちゃんの本当のお姉ちゃんに成り代わってしまったことがね……私、嬉しかったのよ」"
translation = "「시즈하짱의 진짜 언니를 대신하게 된 것이 말이야…… 나, 기뻤던 거야」"

[[dialogue]]
speaker = "サーシャ"
original = "「それだけじゃないわ。シズハちゃんの気持ちが、視線が……<b>気持ち良かったの</b>」"
translation = "「그뿐만이 아니야. 시즈하짱의 마음이, 시선이…… <b>기분</b> <b>좋았어</b>」"

[[dialogue]]
speaker = "サーシャ"
original = "「シズハちゃんの目を見た……？\u3000『この世界に頼れるのは、あなたしかいない』とでも言うような、すがるような目だったわ」"
translation = "「시즈하짱의 눈을 봤니……? 『이 세상에서 의지할 수 있는 건 당신뿐이야』라고 말하는 듯한, 매달리는 듯한 눈이었어」"

[[dialogue]]
speaker = "サーシャ"
original = "「ソフィも昔からよく、私にああいう目を向けてきてくれたわ」"
translation = "「소피도 예전부터 자주 나에게 그런 눈을 보내주곤 했지」"

[[dialogue]]
speaker = "サーシャ"
original = "「私ね……妹からああいう感情を向けられると、ゾクゾクしちゃうのよ」"
translation = "「나 말이야…… 여동생에게 그런 감정을 받으면 전율하게 돼버려」"

[[dialogue]]
speaker = "サーシャ"
original = "「ふふ、呆れるでしょう？\u3000『こんなのはよくない、物事は正しくあるべきだ』と思う理性とは別に──」"
translation = "「후후, 어이가 없지? 『이런 건 좋지 않아, 사물은 올발라야 해』라고 생각하는 이성과는 별개로──」"

[[dialogue]]
speaker = "サーシャ"
original = "「『正しさなんてどうでもいい、この時のために私は<b>お姉ちゃん</b>をやっているんだ』っていう悪い私がそこにいるの」"
translation = "「『올바름 따위 아무래도 좋아, 이때를 위해서 나는 <b>언니</b> 노릇을 하고 있는 거야』라는 나쁜 내가 그곳에 있어」"

[[dialogue]]
speaker = "サーシャ"
original = "「あまりにも醜悪で、自分勝手だと思わないかしら？」"
translation = "「너무나도 추악하고 제멋대로라고 생각하지 않니?」"

[[dialogue]]
speaker = "サーシャ"
original = "「だから、会長くん。どうかお願い……シズハちゃんを助けてあげて」"
translation = "「그러니까 회장군. 제발 부탁이야…… 시즈하짱을 구해줘」"

[[dialogue]]
speaker = "サーシャ"
original = "「私ではダメなの」"
translation = "「나로서는 안 돼」"

[[dialogue]]
speaker = "サーシャ"
original = "「自己中心的で、他人に無関心な私の言葉では、シズハちゃんに届かない」"
translation = "「자기중심적이고 타인에게 무관심한 나의 말로는 시즈하짱에게 닿지 않아」"

[[dialogue]]
speaker = "サーシャ"
original = "「シズハちゃんが間違った結論を出した時に、私ではそれを正してあげることができないから」"
translation = "「시즈하짱이 잘못된 결론을 내렸을 때, 나로서는 그것을 바로잡아 줄 수 없으니까」"

[[dialogue]]
speaker = "unk"
original = "そう言って、サーシャさんは再び俺に頭を下げる。"
translation = "그렇게 말하며 사샤 씨는 다시 한번 내게 고개를 숙인다."

[[dialogue]]
speaker = "unk"
original = "俺はそんな彼女に対して――首を横に振った。"
translation = "나는 그런 그녀를 향해―― 고개를 가로저었다."

[[dialogue]]
speaker = "unk"
original = "それはできません"
translation = "그건 할 수 없습니다"

[[dialogue]]
speaker = "サーシャ"
original = "「そんな、どうして……？」"
translation = "「그럴 수가, 어째서……?」"

[[dialogue]]
speaker = "unk"
original = "俺は、サーシャさんが他人に無関心なんて\nそんなことはないと思っています"
translation = "저는 사샤 씨가 타인에게 무관심하다는 것, 그런 일은 없다고 생각하고 있습니다"

[[dialogue]]
speaker = "unk"
original = "サーシャさんが自分自身のことを見てきたように、俺だってサーシャさんを見てきた。決して長い時間ではないかもしれないが、密度の高い時間を過ごしてきた自負はある。"
translation = "사샤 씨가 자기 자신을 지켜봐 왔듯이, 저 또한 사샤 씨를 지켜봐 왔습니다. 결코 긴 시간은 아닐지 모르지만, 밀도 높은 시간을 보냈다는 자부심은 있습니다."

[[dialogue]]
speaker = "unk"
original = "だって、ソフィアとの交換日記\n今も忘れずに続けてるでしょう？"
translation = "왜냐면 소피아와의 교환 일기, 지금도 잊지 않고 계속하고 있잖아요?"

[[dialogue]]
speaker = "サーシャ"
original = "「それは……」"
translation = "「그건……」"

[[dialogue]]
speaker = "unk"
original = "交換日記――それはお正月に、サーシャさんがソフィアと仲直りする為、これから姉妹２人でやろうと決めた約束事だ。"
translation = "교환 일기―― 그것은 설날에 사샤 씨가 소피아와 화해하기 위해, 앞으로 자매 둘이서 하자고 결정한 약속이다."

[[dialogue]]
speaker = "unk"
original = "あれ以来、２人は毎日１度は必ず顔を合わせて、日記の受け渡しを行っている。"
translation = "그 이후로 두 사람은 매일 한 번은 반드시 얼굴을 마주하고 일기를 주고받고 있다."

[[dialogue]]
speaker = "unk"
original = "そんな、姉妹の絆の証――"
translation = "그런 자매의 유대의 증거――"

[[dialogue]]
speaker = "unk"
original = "確かに、サーシャさんはヒトよりも\n他人への興味が薄いのかもしれません"
translation = "분명 사샤 씨는 다른 사람보다 타인에 대한 흥미가 옅을지도 모릅니다"

[[dialogue]]
speaker = "unk"
original = "それだけでなく、意外と自分の欲望に忠実な面もある。"
translation = "그뿐만 아니라 의외로 자신의 욕망에 충실한 면도 있죠."

[[dialogue]]
speaker = "unk"
original = "――だけど、欲望に自制が効かないわけでもないし、他人に無関心でもない。"
translation = "――하지만 욕망에 자제력이 없는 것도 아니고, 타인에게 무관심하지도 않아요."

[[dialogue]]
speaker = "unk"
original = "正直に答えて下さい。サーシャさんにとって\nシズハは妹のように大切な存在ですか？"
translation = "솔직하게 대답해 주세요. 사샤 씨에게 시즈하는 여동생처럼 소중한 존재인가요?"

[[dialogue]]
speaker = "サーシャ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "少し考えるように目を伏せた後――"
translation = "잠시 생각하듯 눈을 내리깐 뒤――"

[[dialogue]]
speaker = "unk"
original = "サーシャさんは首を横に振った。"
translation = "사샤 씨는 고개를 가로저었다."

[[dialogue]]
speaker = "サーシャ"
original = "「私にとって、本当の妹のソフィとは比べられない。ソフィの方が大切よ」"
translation = "「나에게 진짜 여동생인 소피와는 비교할 수 없어. 소피가 더 소중해」"

[[dialogue]]
speaker = "サーシャ"
original = "「でも――」"
translation = "「하지만――」"

[[dialogue]]
speaker = "サーシャ"
original = "「シズハちゃんを見て見ぬフリはできない。だって、関わりを持ってしまったんだもの」"
translation = "「시즈하짱을 보고도 못 본 척할 수는 없어. 왜냐면 관계를 맺어버렸는걸」"

[[dialogue]]
speaker = "サーシャ"
original = "「私の本当の妹じゃなくとも、シズハちゃんとの関係は大切にしたい。だから……助けてあげたい」"
translation = "「내 진짜 여동생이 아닐지라도 시즈하짱과의 관계는 소중히 여기고 싶어. 그러니까…… 도와주고 싶어」"

[[dialogue]]
speaker = "unk"
original = "なら、サーシャさんは大丈夫です"
translation = "그렇다면 사샤 씨는 괜찮습니다"

[[dialogue]]
speaker = "unk"
original = "――ソフィアはサーシャさんにとって、大切な妹に違いない。けれど、それは『妹だから大切』なんじゃない。"
translation = "――소피아는 사샤 씨에게 소중한 여동생임에 틀림없다. 하지만 그것은 『여동생이라서 소중한』 것이 아니다."

[[dialogue]]
speaker = "unk"
original = "一緒に生まれ育ったソフィアを、大切な存在だとサーシャさんが自分で決めたのだ。"
translation = "함께 태어나 자란 소피아를 소중한 존재라고 사샤 씨가 스스로 결정한 것이다."

[[dialogue]]
speaker = "unk"
original = "そして、サーシャさんは自分の大切なものの為なら、どこまでも真摯になれるヒトだ。"
translation = "그리고 사샤 씨는 자신의 소중한 것을 위해서라면 어디까지나 진지해질 수 있는 사람이다."

[[dialogue]]
speaker = "unk"
original = "そうじゃなかったら、自分の時間を何よりも大切にするサーシャさんが、交換日記なんて続けられるはずがない。"
translation = "그렇지 않았다면 자신의 시간을 무엇보다 소중히 여기는 사샤 씨가 교환 일기 따위를 계속할 수 있었을 리가 없다."

[[dialogue]]
speaker = "unk"
original = "だから、シズハを本当に大切に思うのなら\n厳しくすることからも逃げないでください"
translation = "그러니 시즈하를 정말 소중하게 생각한다면 엄격하게 대하는 것에서도 도망치지 말아 주세요"

[[dialogue]]
speaker = "サーシャ"
original = "「シズハちゃんに、きび、しく…………」"
translation = "「시즈하짱에게 엄격하게…………」"

[[dialogue]]
speaker = "サーシャ"
original = "「……そっか。そうよね、会長くん。確かに私は、『姉妹』というわかりやすい関係に甘えてた」"
translation = "「……그렇구나. 그렇네, 회장군. 확실히 나는 『자매』라는 알기 쉬운 관계에 어리광 부리고 있었어」"

[[dialogue]]
speaker = "サーシャ"
original = "「『お姉ちゃん』だから、『妹』だから……優しくして当たり前、優しくするべきだって。考えもせずに、サボってきたんだわ」"
translation = "「『언니』니까, 『여동생』이니까…… 상냥하게 대하는 게 당연하고, 상냥하게 해야만 한다고. 생각도 하지 않고 게으름을 피워왔던 거야」"

[[dialogue]]
speaker = "サーシャ"
original = "「でも……そうじゃないのね」"
translation = "「하지만…… 그게 아니었구나」"

[[dialogue]]
speaker = "サーシャ"
original = "「『姉妹』だからとか、『家族』だからとか、そういう枠組みにはめ込むんじゃなくて……」"
translation = "「『자매』라서라든가, 『가족』이라서라든가 그런 틀에 끼워 맞추는 게 아니라……」"

[[dialogue]]
speaker = "サーシャ"
original = "「私が誰を好きで、誰を大切にしたいのか……そういう自分勝手を、私自身が決める」"
translation = "「내가 누구를 좋아하고 누구를 소중히 하고 싶은지…… 그런 제멋대로인 것을 나 자신이 결정해」"

[[dialogue]]
speaker = "サーシャ"
original = "「時には振られてしまうこともあるだろうけれど……ヒトとヒトとの関係って、そもそもそういう面倒臭いものだものね」"
translation = "「때로는 거절당하는 일도 있겠지만…… 사람과 사람 사이의 관계라는 건 원래 그런 번거로운 것이니까」"

[[dialogue]]
speaker = "サーシャ"
original = "「その面倒臭さから、本当は……逃げちゃいけなかったんだわ」"
translation = "「그 번거로움에서 사실은…… 도망치면 안 됐던 거야」"

[[dialogue]]
speaker = "サーシャ"
original = "「ありがとう、会長くん。私は他人に興味が持てなかったんじゃなくて、自分の気持ちに対して怠惰だったのね」"
translation = "「고마워, 회장군. 나는 타인에게 흥미를 가질 수 없었던 게 아니라, 내 마음에 대해 나태했던 거네」"

[[dialogue]]
speaker = "サーシャ"
original = "「『お姉ちゃん』だから優しくするんじゃなくて……あなたのことを大切にしたいから、厳しくする」"
translation = "「『언니』라서 상냥하게 대하는 게 아니라…… 너를 소중히 여기고 싶으니까 엄격하게 할게」"

[[dialogue]]
speaker = "サーシャ"
original = "「ふふ。自分から告白するのって……ちょっと怖くて、ドキドキするわね」"
translation = "「후후. 스스로 고백하는 건…… 조금 무섭고 두근거리네」"

[[dialogue]]
speaker = "サーシャ"
original = "「シズハちゃんもソフィも、こんな気持ちだったのかしら？」"
translation = "「시즈하짱도 소피도 이런 기분이었을까?」"

[[dialogue]]
speaker = "サーシャ"
original = "「もしかしたら振られちゃうかもしれないけれど……それでも」"
translation = "「어쩌면 거절당할지도 모르지만…… 그래도」"

[[dialogue]]
speaker = "サーシャ"
original = "「私の気持ち、今度はちゃんとシズハちゃんに、届けてみようと思うわ」"
translation = "「내 진심을 이번에는 제대로 시즈하짱에게 전해보려고 해」"

[[dialogue]]
speaker = "unk"
original = "サーシャさんは力強く、そう言ってみせるのだった。"
translation = "사샤 씨는 힘차게 그렇게 말해 보였다."

