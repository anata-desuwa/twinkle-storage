[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「準備かんりょー！\u3000おししょー様、よろしくお願いします！」"
translation = "「준비 완료-! 스승님, 잘 부탁드립니다!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ええと。よ、よろしくお願いしますっ」"
translation = "「에또. 자, 잘 부탁드립니닷」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「久しぶりの師匠の修行……ワクワクするでござるな～」"
translation = "「오랜만에 하는 스승님의 수행…… 두근거리는구려~」"

[[dialogue]]
speaker_original = "シズル"
speaker_translation = "시즈루"
original = "「いいえ、今日はせつなが、みなさんの修行をつけてあげてください」"
translation = "「아니요, 오늘은 세츠나가 여러분의 수행을 지도해 주세요.」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「ど、どうしてでござるか？\u3000せっかくだから師匠に修行をつけてもらいたいでござる！」"
translation = "「어, 어째서 소? 기왕 하는 거 스승님께 수행을 받고 싶소!」"

[[dialogue]]
speaker_original = "シズル"
speaker_translation = "시즈루"
original = "「いつまでも教わるだけの立場に甘んじていてはいけません。里の未来のためにも誰かを導き育てることを覚えていかなくては」"
translation = "「언제까지고 배우기만 하는 입장에 안주해서는 안 됩니다. 마을의 미래를 위해서라도 누군가를 이끌고 키우는 법을 배워가야 해요.」"

[[dialogue]]
speaker_original = "シズル"
speaker_translation = "시즈루"
original = "「せつな、あなたが里を離れ、どれだけの研鑽を重ねたのか……今こそ成長した姿を、私に見せてください」"
translation = "「세츠나, 당신이 마을을 떠나 얼마나 많은 연마를 거듭했는지…… 지금이야말로 성장한 모습을 제게 보여주세요.」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「師匠……」"
translation = "「스승님……」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「わかったでござる！\u3000見事、師匠の期待に応え、みなさんのことを立派な忍に育て上げてみせるでござるよ！」"
translation = "「알겠소! 훌륭히 스승님의 기대에 부응하여, 여러분을 어엿한 닌자로 키워내 보이겠소!」"

[[dialogue]]
speaker = "unk"
original = "それから場所を変えて、いよいよ忍者修行が始まった！"
translation = "그 뒤 장소를 옮겨서, 드디어 닌자 수행이 시작되었다!"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ござる師匠！\u3000ご指導よろしくでござる！」"
translation = "「고자루 스승님! 지도 잘 부탁드린다 소!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ウズメさんまでござるって言い出しちゃったし……」"
translation = "「우즈메 씨까지 고자루라니 말하기 시작했고……」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「形から入るのが忍の極意でござる！\u3000だよね～、師匠？」"
translation = "「겉모습부터 흉내 내는 게 닌자의 극의라 소! 그치~ 스승님?」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「ウズメ殿の言う通りでござる！\u3000さあ、ヨミ殿も主様も！」"
translation = "「우즈메 공의 말대로요! 자, 요미 공도 주군도!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「わかりました……で、ござる」"
translation = "「알겠습니다…… 이오.」"

[[dialogue]]
speaker = "unk"
original = "了解でござる！"
translation = "알겠소!"

[[dialogue]]
speaker_original = "シズル"
speaker_translation = "시즈루"
original = "「もし怪我をしても私が秘薬で治しますから、安心して全力を出して下さいね」"
translation = "「혹시 다치더라도 제가 비약으로 고쳐줄 테니까, 안심하고 전력을 다해주세요.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こやぁっ！\u3000例のしみる薬……でござる？」"
translation = "「코얏! 그 따가운 약…… 이오?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「しみるのこわいけど、でも気になる！」"
translation = "「따가운 건 무섭지만, 그래도 궁금해!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「さあ！\u3000全員心の準備はいいでござるか？\u3000さっそく修行を開始するでござる！」"
translation = "「자! 전원 마음의 준비는 됐소? 즉시 수행을 개시하겠소!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「最初は簡単なところから……ランニングでござる！」"
translation = "「처음은 간단한 것부터…… 러닝이오!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ほぇ？\u3000いやいや、ござる師匠～、それはいくらなんでもあたしらを舐めすぎっしょ～」"
translation = "「호에? 아냐아냐, 고자루 스승님~ 그건 아무리 그래도 우리를 너무 얕보는 거 아냐~?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ただのランニングなら大丈夫……きっと大丈夫……」"
translation = "「그냥 러닝이라면 괜찮아…… 분명 괜찮을 거야……」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「もちろんただのランニングではござらぬよ。ここは忍の里、走るだけでも危険がいっぱいでござる！」"
translation = "「물론 그냥 러닝은 아니오. 여기는 닌자 마을, 달리는 것만으로도 위험이 가득하오!」"

[[dialogue]]
speaker_original = "シズル"
speaker_translation = "시즈루"
original = "「つまり罠だらけのところを走り抜けろ、ということですね」"
translation = "「즉 함정투성이인 곳을 달려 나가라는 뜻이군요.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こやぁぁん！\u3000一気にハードル上がってますってば～～！！」"
translation = "「코야앙! 단숨에 난이도가 올라갔다니까요~~!!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「安心するでござる。あくまで修行体験用のやわらかコースでござるよ」"
translation = "「안심하오. 어디까지나 수행 체험용인 부드러운 코스요.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「それってどのくらいやわらかなんです？」"
translation = "「그건 어느 정도로 부드러운 건가요?」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「絶対に死なないでござる」"
translation = "「절대로 죽지는 않소.」"

[[dialogue]]
speaker_original = "シズル"
speaker_translation = "시즈루"
original = "「一番大事なことですね。死んじゃったら全部おしまいですから」"
translation = "「가장 중요한 점이네요. 죽어버리면 모든 게 끝이니까요.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「それ以外は……」"
translation = "「그 외에는……」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「さあ、踏破を目指して頑張るでござる！」"
translation = "「자, 돌파를 목표로 힘내보자 소!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「死なないこと以外、保証なし！？」"
translation = "「죽지 않는 것 말고는 보장 없음!?」"

[[dialogue]]
speaker = "unk"
original = "無理ならリタイアする？"
translation = "무리라면 기권할래?"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「そ、それはダメですっ！\u3000九浄家メイド隊の名にかけて、挑む前から逃げ出すわけにはいきませんっ！」"
translation = "「그, 그건 안 돼요! 쿠죠 가문 메이드대의 이름을 걸고, 도전하기도 전에 도망칠 수는 없습니닷!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「そーだよヨミヨミ。ちょっちこわいけど、一緒に頑張ろう！」"
translation = "「맞아 요미요미. 조금 무섭지만 같이 힘내자!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「それではっ、よーい、どん！」"
translation = "「그러면, 제자리에, 출발!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ひゃぁぁぁ～～～っ！？\u3000いきなり落とし穴～～～！！」"
translation = "「히야아아아~~앗!? 갑자기 함정~~!!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「竹槍！？\u3000穴の中、竹槍いっぱいありますよ！\u3000あんなの死んじゃいますって～～！！」"
translation = "「죽창!? 구멍 안에 죽창이 가득해요! 저런 건 죽어버린다니까요~~!!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「いたたっ！！\u3000刺さったよぉ～～～！！」"
translation = "「아얏!! 찔렸어어어~~~!!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「師匠、出番でござる！」"
translation = "「스승님, 차례요!」"

[[dialogue]]
speaker_original = "シズル"
speaker_translation = "시즈루"
original = "「はぁーい！\u3000おっきな傷もちっちゃな傷も、致命傷っぽい傷も、ぜ～んぶ私にお任せですよ！」"
translation = "「네에~! 큰 상처도 작은 상처도, 치명상 같은 상처도 저어언부 제게 맡겨주세요!」"

[[dialogue]]
speaker_original = "シズル"
speaker_translation = "시즈루"
original = "「そーれ、ぬりぬり……ぬりぬり……」"
translation = "「자아, 발라발라…… 발라발라……」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「傷が……なくなった！？\u3000すっご……どんなミラクルなの？」"
translation = "「상처가…… 없어졌어!? 대박…… 무슨 미라클이야?」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「師匠の秘薬があれば、どんな怪我でもし放題でござるよ」"
translation = "「스승님의 비약이 있다면 어떤 부상이라도 마음껏 당해도 괜찮소.」"

[[dialogue]]
speaker_original = "シズル"
speaker_translation = "시즈루"
original = "「こらー、あんまり調子に乗るとめっちゃしみしみ秘薬にしちゃいますよ？」"
translation = "「이봐요, 너무 우쭐대면 엄청나게 따가따가한 비약으로 바꿔버릴 거예요?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「そ、それだけは勘弁っ……でござる！」"
translation = "「그, 그것만은 봐주시오……!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「ランニングはこれにて終了でござる！\u3000体験修行は次に移るでござる！」"
translation = "「러닝은 이것으로 종료요! 체험 수행은 다음으로 넘어가겠소!」"

[[dialogue]]
speaker = "unk"
original = "ついに忍術修行？"
translation = "드디어 인술 수행?"

[[dialogue]]
speaker = "unk"
original = "いよいよ忍法修行？"
translation = "드디어 인법 수행?"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「初心者にはどっちも無理でござるな」"
translation = "「초보자에게는 둘 다 무리요.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「なら、そろそろ終了ということで……」"
translation = "「그럼 이제 종료하는 걸로……」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「待ってよ～、音を上げるの早すぎっしょ！\u3000こっからが本番じゃない！」"
translation = "「기다려봐~ 포기가 너무 빠르잖아! 이제부터가 본방 아니야!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「あぅぅ……」"
translation = "「아으으……」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「とにかく！\u3000次は手裏剣投げでござる！」"
translation = "「어쨌든! 다음은 수리검 던지기요!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ほっ、それなら安全そうですね」"
translation = "「홋, 그거라면 안전해 보이네요.」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「向かい合って、手裏剣を投げ合うだけの簡単な修行でござる」"
translation = "「서로 마주 보고 수리검을 주고받는 간단한 수행이오.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「全然安全じゃなかった！\u3000とんでもなく危険な修行です！」"
translation = "「전혀 안전하지 않아! 엄청나게 위험한 수행이에요!」"

[[dialogue]]
speaker_original = "シズル"
speaker_translation = "시즈루"
original = "「大丈夫ですよ、ちゃんと手裏剣傷専用の秘薬も用意してありますから♪」"
translation = "「괜찮아요, 제대로 수리검 상처 전용 비약도 준비해 뒀으니까요♪」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「結局ケガはするんじゃないですか～っ！」"
translation = "「결국 다치긴 하는 거잖아요~~!」"

[[dialogue]]
speaker = "unk"
original = "避けることもできるでしょ？"
translation = "피할 수도 있잖아?"

[[dialogue]]
speaker = "unk"
original = "手裏剣を弾き落とせば？"
translation = "수리검을 쳐내면?"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「あ、なるほど……無防備に受け止めることしか考えてませんでした」"
translation = "「아, 과연…… 무방비하게 얻어맞을 생각만 하고 있었어요.」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「いつもの戦闘訓練のつもりでやればいいってことだし？\u3000簡単簡単♪」"
translation = "「평소 하던 전투 훈련이라 생각하고 하면 된다는 거지? 간단간단♪」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「はーい、それじゃあ手裏剣を配るでござるよ～」"
translation = "「네-에, 그럼 수리검을 나눠주겠소~」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「そりゃそりゃそりゃあ～～～っ！！」"
translation = "「이얏 이얏 이얏~~앗!!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こやぁっ！\u3000いっぺんにいくつも投げないで下さい～っ！！」"
translation = "「코얏! 한꺼번에 여러 개 던지지 마세요~~앗!!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「ヨミ殿も反撃を！\u3000やられっぱなしでは九浄家メイド隊の名がすたるでござる！」"
translation = "「요미 공도 반격을! 당하고만 있어서는 쿠죠 가문 메이드대의 이름이 깎이오!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「わ、わかりましたぁー！\u3000ええーーいっ！」"
translation = "「아, 알겠습니다아-! 에잇!!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あっまーい！\u3000ていていていっ！」"
translation = "「무르네! 테이 테이 테이!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「はぁっ……はぁっ……はぁっ……なかなかハードな修行体験でした……」"
translation = "「하아…… 하아…… 하아…… 꽤나 하드한 수행 체험이었어요……」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ずっと弱音を吐いてたけど、最後までやり通すなんてヨミヨミ、やるじゃん♪」"
translation = "「계속 약한 소리를 해댔지만, 마지막까지 해내다니 요미요미, 제법이잖아♪」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ウズメさんこそ。途中からこっちも本気になっちゃいました」"
translation = "「우즈메 씨야말로요. 중간부터 이쪽도 진심이 되어버렸답니다」"

[[dialogue]]
speaker_original = "シズル"
speaker_translation = "시즈루"
original = "「厳しい修行の後に芽生える友情、実に美しい光景ですね……」"
translation = "「엄격한 수행 뒤에 싹트는 우정, 정말로 아름다운 광경이네요……」"

[[dialogue]]
speaker = "unk"
original = "このまま本当に忍者になっちゃう？"
translation = "이대로 정말 닌자가 되어버릴 거야?"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ふふ～ん、それも悪くないかも♪」"
translation = "「후후~ㄴ, 그것도 나쁘지 않을지도♪」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「さすがにそれはダメですよ～」"
translation = "「역시 그건 안 돼요~」"

[[dialogue]]
speaker_original = "シズル"
speaker_translation = "시즈루"
original = "「そうですね、それはやめておきましょう。今回の修行はあくまで体験ですからね」"
translation = "「그렇네요, 그건 관둬두도록 하죠. 이번 수행은 어디까지나 체험이니까요」"

[[dialogue]]
speaker_original = "シズル"
speaker_translation = "시즈루"
original = "「それに前途有望な星騎士さんを引き抜いてしまったら、ヘレナさんに対して不義理になってしまいます」"
translation = "「게다가 전도유망한 성기사님을 가로채 버리면, 헬레나 씨에게 면목이 없게 되어버리니까요」"

[[dialogue]]
speaker_original = "シズル"
speaker_translation = "시즈루"
original = "「滅びかけた里を復興へ導いてくれたあのお方には、返しきれないほどの恩義がありますから」"
translation = "「멸망해 가던 마을을 부흥으로 이끌어 주신 그분에게는, 다 갚지 못할 정도의 은혜가 있으니까요」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「襲撃後の村は酷い状態でござった。当主様の助けが無ければ今も村の者は苦しい生活を強いられていたでござろう」"
translation = "「습격 후의 마을은 참혹한 상태였소. 당주님의 도움이 없었다면 지금도 마을 사람들은 고통스러운 생활을 강요받고 있었을 것이오」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「しかし！\u3000この通り、紫桜の里は当主様のおかげで蘇ったのでござる！\u3000まさに恩人なのでござる！」"
translation = "「하지만! 이 보시오, 자앵마을은 당주님 덕분에 되살아난 것이오! 그야말로 은인인 것이오!」"

[[dialogue]]
speaker = "unk"
original = "村の景色を見渡しながら、せつなは目を輝かせる。"
translation = "마을의 풍경을 둘러보며, 세츠나는 눈을 반짝인다."

[[dialogue]]
speaker = "unk"
original = "俺たちがこの村に来たのは視察という任務も兼ねてのことだったが、そんな事件が起きた場所のようには思えない。"
translation = "우리들이 이 마을에 온 것은 시찰이라는 임무도 겸해서였지만, 그런 사건이 일어난 장소라고는 생각되지 않는다."

[[dialogue]]
speaker = "unk"
original = "その平和な様子から、復興は順調に進んでいると見て良さそうだった。"
translation = "그 평화로운 모습에서, 부흥은 순조롭게 진행되고 있다고 봐도 좋을 것 같았다."

