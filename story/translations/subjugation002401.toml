[[dialogue]]
speaker = "unk"
original = "その日、俺は魔法少女たちと共に、因縁の相手と対峙していた――"
translation = "그날, 나는 마법소녀들과 함께 인연의 상대와 대치하고 있었다──"

[[dialogue]]
speaker = "ディーラック"
original = "「サチちゃん……キミたちもしつこいね、毎度毎度ボクの邪魔をしてサァッ！」"
translation = "「사치짱…… 너희도 참 끈질기네, 매번 매번 나의 방해를 하고 말이야앗!」"

[[dialogue]]
speaker = "サチ"
original = "「ディーラックさん、今日こそ決着をつけます！」"
translation = "「디럭쿠 씨, 오늘이야말로 결판을 내겠어요!」"

[[dialogue]]
speaker = "unk"
original = "『幸運』の能力で高い戦闘力を持ち、流星学園附属校の生徒会長を務める魔法少女『白詰サチ』。"
translation = "『행운』의 능력으로 높은 전투력을 가졌으며, 유성학원 부속교의 학생회장을 맡고 있는 마법소녀 『시라츠메 사치』."

[[dialogue]]
speaker = "ディーラック"
original = "「無理だね！\u3000くらうのサッ！！」"
translation = "「무리라네! 맛 좀 보라구!!」"

[[dialogue]]
speaker = "unk"
original = "『ロストアイテム』を暴走させることができ、これまで暗躍し続けてきたエネルギー生命体『ディーラック』。"
translation = "『로스트 아이템』을 폭주하게 할 수 있으며, 지금까지 암약해 온 에너지 생명체 『디럭쿠』."

[[dialogue]]
speaker = "シズハ"
original = "「ディーちゃん！\u3000これ以上の悪さはもう止めて！」"
translation = "「디짱! 더 이상의 나쁜 짓은 이제 그만둬!」"

[[dialogue]]
speaker = "unk"
original = "以前、ディーラックと一緒に過ごしていたことがあり、体内の『聖杯』を力の源とする魔法少女『染井シズハ』。"
translation = "이전에 디럭쿠와 함께 지낸 적이 있으며, 체내의 『성배』를 힘의 원천으로 삼는 마법소녀 『소메이 시즈하』."

[[dialogue]]
speaker = "ディーラック"
original = "「シズハちゃん、悪いけど今のキミに用はないのサ！」"
translation = "「시즈하짱, 미안하지만 지금의 너에게는 볼일이 없다네!」"

[[dialogue]]
speaker = "トマル"
original = "「逃がしません！\u3000一本集中！」"
translation = "「놓치지 않겠어요! 일본집중!」"

[[dialogue]]
speaker = "unk"
original = "サチの友人で、新星学園星徒会書記のマトイの『<b>弟</b>』である『詠野トマル』。"
translation = "사치의 친구이자 신성학원 성도회 서기인 마토이의 『<b>남동생</b>』인 『에이노 토마루』."

[[dialogue]]
speaker = "ディーラック"
original = "「くっ……！？」"
translation = "「큭……!?」"

[[dialogue]]
speaker = "unk"
original = "トマルが矢を放ち、ディーラックはそれを弾くが――矢に触れたことでトマルの星力が帯電、体が痺れて動きが鈍くなる。"
translation = "토마루가 화살을 쏘고 디럭쿠는 그것을 튕겨내지만── 화살에 닿은 것으로 토마루의 성력이 대전되어 몸이 저려 움직임이 둔해진다."

[[dialogue]]
speaker = "ディーラック"
original = "「トマルちゃんの『星力を留める』能力、敵に回すとここまで厄介とはね……！\u3000エネルギー生命体のボクには、相性最悪サ！」"
translation = "「토마루짱의 『성력을 머무르게 하는』 능력, 적으로 돌리니 이토록 성가실 줄이야……! 에너지 생명체인 나에게는 상성이 최악이라네!」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「隙ができた！\u3000サチ、今じゃ！」"
translation = "「빈틈이 생겼느니라! 사치, 지금이니라!」"

[[dialogue]]
speaker = "unk"
original = "かつてディーラックによって作り出された『悪の終末兵器』であり、今はサチの相棒として共に戦う魔法少女『プリムラ』が、支援砲撃を撃ちながら叫ぶ。"
translation = "과거 디럭쿠에 의해 만들어진 『악의 종말병기』이자, 지금은 사치의 파트너로서 함께 싸우는 마법소녀 『프리뮬라』가 지원 포격을 쏘며 외친다."

[[dialogue]]
speaker = "サチ"
original = "「トレジアンナさん！\u3000ルーレットロッド、フルスロットルでお願いします！」"
translation = "「트레지안나 씨! 룰렛 로드, 풀 스로틀로 부탁드려요!」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「はい！\u3000ディーラックさん、行きますよ～！\u3000ルーレットスタート！」"
translation = "「네! 디럭쿠 씨, 갑니다요~! 룰렛 스타트!」"

[[dialogue]]
speaker = "unk"
original = "サチの武器である杖から声がする。その声の主は、ロストアイテムに封印されている自称・先代魔法少女で、サチを魔法少女に任命した『トレジアンナ』さんだ。"
translation = "사치의 무기인 지팡이에서 목소리가 들린다. 그 목소리의 주인공은 로스트 아이템에 봉인되어 있는 자칭 전대 마법소녀이자 사치를 마법소녀로 임명한 『트레지안나』 씨다."

[[dialogue]]
speaker = "トレジアンナ"
original = "「――ジャックポットです！\u3000サチさん！」"
translation = "「──잭팟이에요! 사치 씨!」"

[[dialogue]]
speaker = "サチ"
original = "「タイダルフィーバーッ！！」"
translation = "「타이달 피버!!」"

[[dialogue]]
speaker = "ディーラック"
original = "「ぐうぅ――っ！？」"
translation = "「구우우──윽!?」"

[[dialogue]]
speaker = "ディーラック"
original = "「かはっ……！」"
translation = "「커헉……!」"

[[dialogue]]
speaker = "unk"
original = "サチの星術がクリティカルヒットし、ディーラックは口から<b>ある物</b>を吐き出し、本来の姿へと戻る。それは――"
translation = "사치의 성술이 크리티컬 히트하여 디럭쿠는 입에서 <b>어떤</b> <b>물건</b>을 토해내고 본래의 모습으로 돌아간다. 그것은──"

[[dialogue]]
speaker = "サチ"
original = "「解放のロストアイテム……！」"
translation = "「해방의 로스트 아이템……!」"

[[dialogue]]
speaker = "ディーラック"
original = "「っ……！\u3000簡単には渡さないのサ！」"
translation = "「윽……! 쉽게 넘겨주지는 않겠다네!」"

[[dialogue]]
speaker = "unk"
original = "サチとディーラックがそれを回収しようと、同時に飛び出す。"
translation = "사치와 디럭쿠가 그것을 회수하기 위해 동시에 뛰어든다."

[[dialogue]]
speaker = "unk"
original = "先に解放のロストアイテムを手にしたのは――"
translation = "먼저 해방의 로스트 아이템을 손에 넣은 것은──"

[[dialogue]]
speaker = "サチ"
original = "「獲りました！\u3000――きゃっ！？」"
translation = "「잡았어요! ──꺄악!?」"

[[dialogue]]
speaker = "unk"
original = "ディーラックのタックルを受けて、サチが吹っ飛ばされる。"
translation = "디럭쿠의 태클을 받고 사치가 날아간다."

[[dialogue]]
speaker = "unk"
original = "サチ！"
translation = "사치!"

[[dialogue]]
speaker = "unk"
original = "俺は全速力で駆けて、彼女の体をキャッチする。"
translation = "나는 전속력으로 달려가 그녀의 몸을 캐치한다."

[[dialogue]]
speaker = "サチ"
original = "「えっ！？\u3000あ、ありがとうございます、お兄さん……！」"
translation = "「엣!? 아, 감사합니다, 오빠……!」"

[[dialogue]]
speaker = "ディーラック"
original = "「どうやら、今回はここまでみたいだネ。……解放のロストアイテムは、預けておくよ」"
translation = "「아무래도 이번에는 여기까지인 것 같네. ……해방의 로스트 아이템은 맡겨두겠다네」"

[[dialogue]]
speaker = "unk"
original = "ディーラックは別のロストアイテムを使ったのか、幻が消え行くように姿が薄れて、またどこかへ逃げ去ってしまった。"
translation = "디럭쿠는 다른 로스트 아이템을 사용한 것인지, 환영이 사라지듯 모습이 흐릿해지며 다시 어딘가로 도망쳐 버렸다."

[[dialogue]]
speaker = "シズハ"
original = "「ディーちゃん……」"
translation = "「디짱……」"

[[dialogue]]
speaker = "プリムラ"
original = "「ディーラックにはまた逃げられてしまったが――やっと取り戻したのじゃ」"
translation = "「디럭쿠에게는 또 놓쳐버렸지만── 드디어 되찾았느니라」"

[[dialogue]]
speaker = "トマル"
original = "「これが、解放のロストアイテム……。これでついに……」"
translation = "「이것이 해방의 로스트 아이템……. 이것으로 드디어……」"

[[dialogue]]
speaker = "サチ"
original = "「はい。トレジアンナさんの封印を解いて、元の姿を取り戻すことができます」"
translation = "「네. 트레지안나 씨의 봉인을 풀고 원래 모습을 되찾을 수 있어요」"

[[dialogue]]
speaker = "unk"
original = "サチの髪飾りが点滅して、そこからトレジアンナさんの声が響く。"
translation = "사치의 머리 장식이 점멸하며 그곳에서 트레지안나 씨의 목소리가 울린다."

[[dialogue]]
speaker = "トレジアンナ"
original = "「いや～、ついにこの時がやって来ましたね～♪\u3000ここまで長かったから、感慨深いですよ～」"
translation = "「이야~ 드디어 이 순간이 왔군요~♪ 여기까지 길었으니까 감개무량해요~」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「では、皆さんお待ちかね、私の本当の姿をお披露目しちゃいますよ～！」"
translation = "「그럼 여러분이 기다리시던 저의 진짜 모습을 선보이겠어요~!」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「いざ――解放です！」"
translation = "「자── 해방이에요!」"

[[dialogue]]
speaker = "unk"
original = "これが……！"
translation = "이것이……!"

[[dialogue]]
speaker = "トレジアンナ"
original = "「じゃじゃ～ん☆\u3000それでは、改めまして！」"
translation = "「짜잔~☆ 그럼 다시 한번!」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「マジにマジカル☆\u3000凛とリリカル！\u3000華麗にカレイド♪」"
translation = "「매지컬하게 매지컬☆ 늠름하게 리리컬! 화려하게 카레이도♪」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「トレジアンナこと、『<ruby>蒐集<rt>しゅうしゅう</rt></ruby>の魔法少女』トレジャー☆アンナ、ここにふっか～つ♪\u3000素敵にステッキ、決めちゃいますよ～！」"
translation = "「트레지안나이자, 『수집의 마법소녀』 트레저☆안나, 여기에 부~활♪ 멋지게 스틱, 결정해 보겠어요~!」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「キラッ☆」"
translation = "「반짝☆」"

[[dialogue]]
speaker = "unk"
original = "復活した先代魔法少女は、そうして華麗に決めポーズで、ウィンクしてみせるのだった――"
translation = "부활한 전대 마법소녀는 그렇게 화려하게 결정 포즈를 취하며 윙크해 보였다──"

