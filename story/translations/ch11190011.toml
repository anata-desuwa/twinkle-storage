[[dialogue]]
speaker = "unk"
original = "第１話,大怪盗と祓魔師,P"
translation = "제1화, 대괴도와 엑소시스트, P"

[[dialogue]]
speaker = "unk"
original = "怪盗事件から少し経ったある日のこと。"
translation = "괴도 사건으로부터 조금 지난 어느 날."

[[dialogue]]
speaker = "unk"
original = "俺は大聖堂カフェテリアへと、昼食をしにやって来ていた――"
translation = "나는 대성당 카페테리아로 점심을 먹으러 와 있었다──"

[[dialogue]]
speaker = "ミネコ"
original = "「おっ、会長～♪\u3000もしかして今日は、お昼ご飯１人？」"
translation = "「오, 회장~♪ 설마 오늘 점심은 혼자야?」"

[[dialogue]]
speaker = "ミネコ"
original = "「――ふふっ、ラッキー♪\u3000じゃあ今日は、私と一緒にお昼ご飯にしちゃう？」"
translation = "「──후후, 럭키♪ 그럼 오늘은 나랑 같이 점심 먹을래?」"

[[dialogue]]
speaker = "ミネコ"
original = "「私的には大歓迎だよ♪\u3000ジュエリーに勝つ為にも、会長とは仲良くなりたいからね♪」"
translation = "「나로서는 대환영이야♪ 주얼리에게 이기기 위해서라도 회장이랑은 친해지고 싶으니까♪」"

[[dialogue]]
speaker = "ジュエリー"
original = "「そう簡単にはさせないよ、ミネコ」"
translation = "「그렇게 쉽게는 안 될걸, 미네코.」"

[[dialogue]]
speaker = "ミネコ"
original = "「おやおや、噂をすれば名探偵のご登場だね♪」"
translation = "「이런 이런, 호랑이도 제 말 하면 온다더니 명탐정님 등장하셨네♪」"

[[dialogue]]
speaker = "ジュエリー"
original = "「彼は私の助手だからね。キミが話しかけているのを見かければ、スルーできるはずもないだろう？」"
translation = "「그는 내 조수니까 말이야. 네가 말을 걸고 있는 걸 본다면 그냥 지나칠 리 없잖아?」"

[[dialogue]]
speaker = "フェリシー"
original = "「こんにちは～♪\u3000そちらの子は、会長くんやジュエリーの友達？」"
translation = "「안녕하세요~♪ 그쪽 아이는 회장군이나 주얼리의 친구야?」"

[[dialogue]]
speaker = "ミネコ"
original = "「うんっ、そうなんだ～♪\u3000よろしくね☆」"
translation = "「응, 맞아~♪ 잘 부탁해☆」"

[[dialogue]]
speaker = "ジュエリー"
original = "「待ちたまえ。友達と言うと語弊がある。明解に換言するならば、ライバルと言ったところだ」"
translation = "「기다리게나. 친구라고 하면 어폐가 있지. 명쾌하게 환언하자면 라이벌이라 할 수 있겠군.」"

[[dialogue]]
speaker = "unk"
original = "フェリシー、今日はジュエリーとお昼？"
translation = "펠리시, 오늘은 주얼리랑 점심이야?"

[[dialogue]]
speaker = "フェリシー"
original = "「うん♪\u3000一緒に食べようって約束してたんだ」"
translation = "「응♪ 같이 먹기로 약속했었어.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ちょうどいい機会だ。同じ『選星者』として、フェリシーには紹介しておこう」"
translation = "「마침 좋은 기회다. 같은 『선성자』로서 펠리시에게는 소개해 두지.」"

[[dialogue]]
speaker = "フェリシー"
original = "「え？\u3000選星者？」"
translation = "「에? 선성자?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ミネコもそれでいいかい？」"
translation = "「미네코도 그걸로 괜찮겠어?」"

[[dialogue]]
speaker = "ミネコ"
original = "「選星者同士なら、私はオッケーだよ♪」"
translation = "「선성자끼리라면 난 오케이~♪」"

[[dialogue]]
speaker = "ミネコ"
original = "「それじゃ、自分の口から直接名乗らせてもらおうかな――」"
translation = "「그럼 내 입으로 직접 통성명해 볼까──」"

[[dialogue]]
speaker = "ミネコ"
original = "「私は流星学園１年の『ミネコ・フランボワーズ』。キミと同じ選星者の１人、『大怪盗』の役職を承った者だよ♪」"
translation = "「나는 유성학원 1학년인 『미네코 플랑보와즈』. 너와 같은 선성자 중 한 명인 『대괴도』의 역직을 받은 사람이야♪」"

[[dialogue]]
speaker = "unk"
original = "選星者――それは、女神から『<ruby>役職<rt>ロール</rt></ruby>』を授けられた者のことを指すという。それ故に、海外では『ロールスター』という呼び方もされたりするとか。"
translation = "선성자── 그것은 여신으로부터 『역직』을 부여받은 자를 지칭한다고 한다. 그리하여 해외에서는 『롤스타』라는 명칭으로 불리기도 한다나."

[[dialogue]]
speaker = "unk"
original = "ミネコの役職は『大怪盗』。ジュエリーは『名探偵』。フェリシーは『<ruby>祓魔師<rt>エクソシスト</rt></ruby>』。"
translation = "미네코의 역직은 『대괴도』. 주얼리는 『명탐정』. 펠리시는 『엑소시스트』."

[[dialogue]]
speaker = "unk"
original = "選星者は女神からの啓示により、生まれながらにそのことを自覚し、役職に応じた特殊な能力を与えられている。"
translation = "선성자는 여신의 계시에 의해 태어날 때부터 그 사실을 자각하고 역직에 따른 특수한 능력을 부여받는다."

[[dialogue]]
speaker = "フェリシー"
original = "「大怪盗！？\u3000それじゃあミネコちゃんが、まさかあの……！？」"
translation = "「대괴도!? 그럼 미네코짱이 설마 그……!?」"

[[dialogue]]
speaker = "ミネコ"
original = "「そう、世界を騒がす怪盗の片割れ、『大怪盗フランボウ』とは、ズバリ私のこと！\u3000――あっ、ちなみに、これは秘密でお願いね♪」"
translation = "「맞아, 세계를 떠들썩하게 하는 괴도의 한 축, 『대괴도 플랑보』가 바로 나! ──앗, 참고로 이건 비밀로 해줘♪」"

[[dialogue]]
speaker = "フェリシー"
original = "「いや、カフェテリアのど真ん中で堂々と公言しちゃってるけど！？\u3000大丈夫なの……！？」"
translation = "「아니, 카페테리아 한복판에서 당당하게 공언하고 있잖아!? 괜찮은 거야……!?」"

[[dialogue]]
speaker = "ミネコ"
original = "「ふふふ、問題ないよ♪\u3000この会話の情報は、後でみんなの頭の中からちょちょいっと消しておくから♪」"
translation = "「후후후, 문제없어♪ 이 대화 정보는 나중에 다들 머릿속에서 살짝 지워둘 거니까♪」"

[[dialogue]]
speaker = "フェリシー"
original = "「え？\u3000それってどういう……？」"
translation = "「에? 그게 무슨……?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「それが『大怪盗』の能力なんだよ、フェリシー」"
translation = "「그게 『대괴도』의 능력이란다, 펠리시.」"

[[dialogue]]
speaker = "ミネコ"
original = "「私の能力は『情報改竄』。目に見える物理的なものから、頭の中にある記憶まで、書き換えることができる」"
translation = "「내 능력은 『정보 개찬』. 눈에 보이는 물리적인 것부터 머릿속 기억까지 고쳐 쓸 수 있어.」"

[[dialogue]]
speaker = "ミネコ"
original = "「たとえば、いつの間にかジュエリーのクラスメイトとして、流星学園に通っていたことにしたりね♪」"
translation = "「예를 들어 어느샌가 주얼리의 클래스메이트로서 유성학원에 다니고 있었던 것으로 만든다거나 말이야♪」"

[[dialogue]]
speaker = "フェリシー"
original = "「あ！\u3000道理でジュエリーの友達なのに、今まで見かけたことがないなって……！」"
translation = "「아! 어쩐지 주얼리의 친구인데 지금까지 본 적이 없다 했더니……!」"

[[dialogue]]
speaker = "ミネコ"
original = "「ちなみに、キミのことは調べてあるから、自己紹介は不要だよ、『<ruby>恵原<rt>めぐはら</rt></ruby>フェリシー』ちゃん♪\u3000学園に潜入するに当たって、同じ選星者は下調べしておいたからね」"
translation = "「참고로 네 정보는 조사해 뒀으니까 자기소개는 필요 없어, 『에바라 펠리시』짱♪ 학원에 잠입할 때 같은 선성자는 미리 조사해 뒀거든.」"

[[dialogue]]
speaker = "ミネコ"
original = "「ただ、心の内でどう思うかまでは、実際に聞かないと私にもわからない。――ということで、フェリシーちゃんに１つ質問してもいい？」"
translation = "「다만 마음속으로 어떻게 생각하는지까지는 직접 들어보지 않으면 나도 몰라. ──그런 의미에서 펠리시짱에게 질문 하나 해도 될까?」"

[[dialogue]]
speaker = "ミネコ"
original = "「『祓魔師』のキミとしては――『大怪盗』の私をどう思う？」"
translation = "「『엑소시스트』인 너로서는── 『대괴도』인 나를 어떻게 생각해?」"

[[dialogue]]
speaker = "フェリシー"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "フェリシー"
original = "「私は――」"
translation = "「나는──」"

[[dialogue]]
speaker = "フェリシー"
original = "「……ヒトの物を盗むのは、理由はどうあれ、悪いことだと思う」"
translation = "「……남의 물건을 훔치는 건 이유야 어찌 됐든 나쁜 일이라고 생각해.」"

[[dialogue]]
speaker = "フェリシー"
original = "「大怪盗には大怪盗なりの誇りがあるんだと思う。だけど、誇りがあって相手を選べば、犯罪が許されるわけじゃない」"
translation = "「대괴도에게는 대괴도 나름의 긍지가 있을 거라 생각해. 하지만 긍지가 있고 상대를 고른다고 해서 범죄가 허용되는 건 아냐.」"

[[dialogue]]
speaker = "フェリシー"
original = "「でも……選星者は女神様が選んだ存在だから、『大怪盗』が世界に必要なんだってことも、私は信じてる」"
translation = "「하지만…… 선성자는 여신님이 선택한 존재니까 『대괴도』가 세상에 필요하다는 것도 나는 믿어.」"

[[dialogue]]
speaker = "フェリシー"
original = "「女神様は祝福や救いと同時に、試練をお与えになる。だからきっと、この世のすべてのことには意味があると思うの」"
translation = "「여신님은 축복과 구원인 동시에 시련을 주시기도 해. 그러니까 분명 이 세상의 모든 일에는 의미가 있다고 생각해.」"

[[dialogue]]
speaker = "フェリシー"
original = "「まだ私は、その意味のすべてを知っているわけじゃない。だから同じ選星者として、あなたからも学ばせてほしい……かな♪」"
translation = "「아직 나는 그 의미를 전부 아는 건 아니야. 그러니까 같은 선성자로서 당신에게서도 배우고 싶어…… 일까나♪」"

[[dialogue]]
speaker = "ミネコ"
original = "「私が怪盗をやっているのは、使命ではなく『趣味』だと言っても？」"
translation = "「내가 괴도 일을 하는 건 사명이 아니라 『취미』라고 해도?」"

[[dialogue]]
speaker = "フェリシー"
original = "「私はまだあなたのことをよく知らないから、何を言われても、まずは知るところからだよ」"
translation = "「나는 아직 당신을 잘 모르니까, 무슨 말을 들어도 일단은 알아가는 것부터 시작이야.」"

[[dialogue]]
speaker = "フェリシー"
original = "「私は祓魔師として、祓うべきか否かは自分の目で見てから決める。だから、これから仲良くなって――」"
translation = "「나는 엑소시스트로서 퇴마해야 할지 말지는 내 눈으로 보고 결정해. 그러니까 앞으로 친하게 지내면서──」"

[[dialogue]]
speaker = "フェリシー"
original = "「あなたが間違ったことをしていると思ったら、友達として私が魔を祓って、改心させる」"
translation = "「당신이 잘못된 일을 하고 있다고 생각되면 친구로서 내가 마를 물리치고 개심시킬 거야.」"

[[dialogue]]
speaker = "ミネコ"
original = "「私たち、友達にはなれそう？」"
translation = "「우리 친구가 될 수 있을까?」"

[[dialogue]]
speaker = "フェリシー"
original = "「もちろん。ミネコ、って呼んでもいいかな？」"
translation = "「물론이지. 미네코라고 불러도 될까?」"

[[dialogue]]
speaker = "ミネコ"
original = "「オッケー♪\u3000じゃあ私も、フェリシーって呼ぶね」"
translation = "「오케이♪ 그럼 나도 펠리시라고 부를게.」"

[[dialogue]]
speaker = "フェリシー"
original = "「うんっ。今日からよろしくね、ミネコ」"
translation = "「응. 오늘부터 잘 부탁해, 미네코.」"

[[dialogue]]
speaker = "unk"
original = "２人はそうして、笑顔で握手を交わすのだった。"
translation = "두 사람은 그렇게 웃으며 악수를 나누었다."

[[dialogue]]
speaker = "ミネコ"
original = "「――あっ、そうだ！\u3000こうして選星者同士、せっかく知り合ったんだし、仲を深める為にも『お泊り会』しない？」"
translation = "「──앗, 맞다! 이렇게 선성자끼리 모처럼 알게 됐으니 친목 도모를 위해서라도 『파자마 파티』 하지 않을래?」"

[[dialogue]]
speaker = "フェリシー"
original = "「いいねいいね♪\u3000ミネコも多分、流星寮住まいだよね？\u3000だったら、私の部屋に来る？」"
translation = "「좋아 좋아♪ 미네코도 아마 유성 기숙사에 살지? 그럼 내 방으로 올래?」"

[[dialogue]]
speaker = "ミネコ"
original = "「いいの？\u3000ありがと～♪\u3000そうと決まれば、当然ジュエリーも参加ね！」"
translation = "「정말? 고마워~♪ 그렇게 정해졌으면 당연히 주얼리도 참가하는 거다!」"

[[dialogue]]
speaker = "ジュエリー"
original = "「え、また私もかい？\u3000キミとのお泊り会は、この前したばかりだろう」"
translation = "「에, 나도 또야? 너랑 파자마 파티는 요전에 방금 했잖아.」"

[[dialogue]]
speaker = "フェリシー"
original = "「何それ、私知らないんだけど！？\u3000なんで私も呼んでくれなかったの、ジュエリ～！」"
translation = "「뭐야, 난 몰랐는데!? 왜 나도 안 불러준 거야, 주얼리~!」"

[[dialogue]]
speaker = "ジュエリー"
original = "「いや、その時は計画的なものではなく、突然夜にミネコが部屋に押しかけてきて、半ば無理矢理そのまま居座ってだね……」"
translation = "「아니, 그때는 계획적인 게 아니라 갑자기 밤에 미네코가 방에 들이닥쳐서 반쯤 억지로 그대로 눌러앉아서 말이지……」"

[[dialogue]]
speaker = "ミネコ"
original = "「そこは因縁の名探偵相手だからね～。距離を縮めるには、多少強引に行かないとダメかな～って思ったんだよ♪」"
translation = "「그건 인연이 깊은 명탐정 상대니까 말이야~. 거리를 좁히려면 다소 강제로 밀어붙이지 않으면 안 되겠다 싶었거든♪」"

[[dialogue]]
speaker = "ミネコ"
original = "「ねぇ、いいじゃん、ジュエリー。こうしてフェリシーとも友達になったわけだし、役職的には敵同士でも、プライベートでは仲良くしようよ～」"
translation = "「있지, 괜찮잖아, 주얼리. 이렇게 펠리시랑도 친구가 됐으니 역직상으로는 적이라도 사적으로는 사이좋게 지내자~」"

[[dialogue]]
speaker = "ジュエリー"
original = "「どういう理屈なんだ。むしろやりづらいだろう」"
translation = "「대체 무슨 논리야. 오히려 일하기 껄끄럽잖아.」"

[[dialogue]]
speaker = "ミネコ"
original = "「あっ！\u3000会長もお泊り会、参加しちゃう？」"
translation = "「앗! 회장도 파자마 파티 참가할래?」"

[[dialogue]]
speaker = "unk"
original = "いや俺は男だし、さすがに……"
translation = "아니, 난 남자고 역시 그건 좀……"

[[dialogue]]
speaker = "フェリシー"
original = "「え～？\u3000私は全然気にしないよ？\u3000会長くんなら変なことしないって信じてるし♪」"
translation = "「에~? 나는 전혀 신경 안 써! 회장군이라면 이상한 짓 안 할 거라고 믿으니까♪」"

[[dialogue]]
speaker = "unk"
original = "そうして、なんだかんだお泊り会が決定したのだった――"
translation = "그렇게 우여곡절 끝에 파자마 파티가 결정되었다──"

