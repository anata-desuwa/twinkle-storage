[[dialogue]]
speaker = "unk"
original = "第１話,マトイのお母さん,P"
translation = "제1화, 마토이의 어머니, P"

[[dialogue]]
speaker = "unk"
original = "マトイがノヴァフォームを手に入れてから少し経ったある日の放課後。俺は恋人でもある彼女と一緒に、トレーニング施設で訓練を行っていた。"
translation = "마토이가 노바 폼을 손에 넣고 조금 지난 어느 날 방과 후. 나는 연인이기도 한 그녀와 함께 트레이닝 시설에서 훈련을 하고 있었다."

[[dialogue]]
speaker = "unk"
original = "Ｓランクモンスター複数体を仮想敵として出現させ、２人で挑んでいたのだが――"
translation = "S랭크 몬스터 여러 마리를 가상 적으로 출현시켜 둘이서 도전하고 있었는데――"

[[dialogue]]
speaker = "unk"
original = "よし、やったぞ！\u3000両学園の最速記録を更新だ！"
translation = "좋아, 해냈어! 양 학원의 최속 기록을 경신이다!"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「うん！\u3000息ピッタリだったね、えへへ♪」"
translation = "「응! 호흡이 척척 맞았네, 에헤헤♪」"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「ノヴァフォーム、少しずつ慣れてきた感じがするよ」"
translation = "「노바 폼, 조금씩 익숙해지는 느낌이 들어.」"

[[dialogue]]
speaker = "unk"
original = "ふと、ぱちぱちと拍手する音が聞こえて――"
translation = "문득 짝짝 하고 박수 치는 소리가 들려오고――"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「お２人とも素晴らしかったです。姉さまの新しい力、見させて頂きました」"
translation = "「두 분 다 훌륭했습니다. 누님(姉さま)의 새로운 힘, 잘 보았습니다.」"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「トマル！\u3000来てたの？」"
translation = "「토마루! 왔었어?」"

[[dialogue]]
speaker = "unk"
original = "流星学園附属校３年生、詠野トマル――"
translation = "유성 학원 부속교 3학년, 에이노 토마루――"

[[dialogue]]
speaker = "unk"
original = "彼は、マトイの<b>弟</b>である。"
translation = "그는 마토이의 <b>남동생</b>이다."

[[dialogue]]
speaker = "unk"
original = "とはいえ、トマルはマトイのような『普通の女の子』になりたいという憧れを持つ、いわゆる男の娘である。"
translation = "그렇긴 하지만, 토마루는 마토이 같은 『평범한 여자아이』가 되고 싶다는 동경을 품은 소위 '오토코노코'다."

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「姉さま、とても格好良かったです。これからは姉さまに憧れる生徒も多くなりそうですね」"
translation = "「누님, 정말 멋졌어요. 이제부터 누님을 동경하는 학생들도 많아질 것 같네요.」"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「ありがとう。どうなるかは正直わからないけど、私は私らしく、普通を忘れないように頑張るよ」"
translation = "「고마워. 어떻게 될지는 솔직히 모르겠지만, 나는 나답게 평범함을 잊지 않도록 노력할게.」"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「これは特別な力だから。会長のおかげで使えるようになっただけで、私ひとりの力ってわけじゃない」"
translation = "「이건 특별한 힘이니까. 회장님 덕분에 사용할 수 있게 된 것뿐이지, 나 혼자만의 힘이라는 건 아니야.」"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「大切なのは、普通じゃない力に驕らず、努力し続けること。それこそが困難な状況に陥った時、諦めず立ち上がれる強さに変わるって、この前の戦いでわかったから」"
translation = "「중요한 건 평범하지 않은 힘에 자만하지 않고 계속 노력하는 것. 그것이야말로 곤란한 상황에 처했을 때 포기하지 않고 일어설 수 있는 강함으로 바뀐다는 걸 지난 전투에서 알았으니까.」"

[[dialogue]]
speaker = "？？？"
original = "「ふふっ、マトイ、また１つ成長したのね♪」"
translation = "「후훗, 마토이, 또 하나 성장했구나♪」"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「えっ……！？\u3000その声は――」"
translation = "「에……!? 그 목소리는――」"

[[dialogue]]
speaker = "unk"
original = "振り返ると、そこにはマトイが大人になったかのような綺麗な女性がいて――"
translation = "뒤를 돌아보자 그곳에는 마토이가 어른이 된 것 같은 아름다운 여성이 있었고――"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「お母さん！？」"
translation = "「엄마!?」"

[[dialogue]]
speaker_original = "マトイ母"
speaker_translation = "마토이 엄마"
original = "「は～い♪\u3000トマルに案内して貰って、来ちゃった♪」"
translation = "「안녕~♪ 토마루가 안내해 줘서 와버렸어♪」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「会長さま、紹介しますね。こちら、私たち<ruby>姉弟<rt>きょうだい</rt></ruby>の母さまで――」"
translation = "「회장님, 소개할게요. 이쪽은 저희 남매의 어머니로――」"

[[dialogue]]
speaker_original = "マトイ母"
speaker_translation = "마토이 엄마"
original = "「<ruby>詠野<rt>よみの</rt></ruby>マモリで～す♪\u3000普通の主婦をやってます♪\u3000子供たちがいつもお世話になってます、会長くん♪\u3000特にマトイは、色々とね？\u3000ふふっ♪」"
translation = "「에이노 마모리라고 해요~♪ 평범한 주부랍니다♪ 아이들이 항상 신세 지고 있어요, 회장군♪ 특히 마토이는 여러 가지로 말이죠? 후훗♪」"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「お母さん、どうして学園に……！？」"
translation = "「엄마, 어떻게 학원에……!?」"

[[dialogue]]
speaker_original = "マトイ母"
speaker_translation = "마토이 엄마"
original = "「マトイが星騎士として普通じゃない力を手に入れたったって聞いたから、気になってつい♪」"
translation = "「마토이가 성기사로서 평범하지 않은 힘을 손에 넣었다고 들어서, 궁금해서 그만♪」"

[[dialogue]]
speaker_original = "マトイ母"
speaker_translation = "마토이 엄마"
original = "「ほら、写真も沢山撮ったのよ♪\u3000よく写ってるでしょ～？」"
translation = "「봐봐, 사진도 잔뜩 찍었단다♪ 잘 나왔지~?」"

[[dialogue]]
speaker = "unk"
original = "そう言いながら、ＤＩＳＣの画面を俺たちに見せてくるマモリさん。"
translation = "그렇게 말하며 DISC 화면을 우리에게 보여주는 마모리 씨."

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「ちょっ、何枚撮ってるの！？」"
translation = "「잠깐, 몇 장이나 찍은 거야!?」"

[[dialogue]]
speaker_original = "マトイ母"
speaker_translation = "마토이 엄마"
original = "「今日はお父さん、仕事だから。後で見せてあげようと思って～」"
translation = "「오늘은 아빠가 일하느라 바쁘니까. 나중에 보여주려고~」"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「やめてよ、恥ずかしい！」"
translation = "「하지 마, 부끄러워!」"

[[dialogue]]
speaker_original = "マトイ母"
speaker_translation = "마토이 엄마"
original = "「ふふっ、マトイってば、照れちゃって～♪」"
translation = "「후훗, 마토이도 참, 수줍어하기는~♪」"

[[dialogue]]
speaker_original = "マトイ母"
speaker_translation = "마토이 엄마"
original = "「あ、そうだ。会長くんも撮ったのよ、ほら♪」"
translation = "「아, 맞다. 회장군도 찍었어, 자♪」"

[[dialogue]]
speaker = "unk"
original = "えっ、俺も！？"
translation = "에, 나도!?"

[[dialogue]]
speaker_original = "マトイ母"
speaker_translation = "마토이 엄마"
original = "「うん、格好良かったから♪\u3000それに、マトイの彼氏さんだしね♪\u3000お父さんの為にも偵察をしとこうと思って～」"
translation = "「응, 멋있었으니까♪ 게다가 마토이의 남자친구기도 하고 말이야♪ 아빠를 위해서라도 정찰을 해두려고~」"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「偵察って！\u3000いやいや、会長に失礼でしょ！」"
translation = "「정찰이라니! 아니아니, 회장님한테 실례잖아!」"

[[dialogue]]
speaker = "unk"
original = "ご、ご両親への挨拶が遅れてしまいましてっ"
translation = "부, 부모님께 인사가 늦었습니다!"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「ほら、会長が気を遣っちゃってるじゃん！」"
translation = "「봐, 회장님이 신경 쓰고 있잖아!」"

[[dialogue]]
speaker_original = "マトイ母"
speaker_translation = "마토이 엄마"
original = "「大丈夫よ、会長くん。うちのお父さんは、可愛い娘に彼氏ができて気が気じゃないだけで、中身は優しい普通のおじさんだから♪」"
translation = "「괜찮아, 회장군. 우리 아빠는 귀여운 딸에게 남자친구가 생겨서 안절부절못할 뿐이지, 속은 다정한 평범한 아저씨니까♪」"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「いやフォローになってないよ！？」"
translation = "「아니, 그게 무슨 위로야!?」"

[[dialogue]]
speaker_original = "マトイ母"
speaker_translation = "마토이 엄마"
original = "「あっ、そうだわ。お近づきの印に――」"
translation = "「아, 맞다. 친해진 기념으로――」"

[[dialogue]]
speaker_original = "マトイ母"
speaker_translation = "마토이 엄마"
original = "「私と組手をしない？」"
translation = "「나랑 대련하지 않을래?」"

[[dialogue]]
speaker = "unk"
original = "えっ！？"
translation = "에!?"

[[dialogue]]
speaker = "unk"
original = "そして、マモリさんの希望で、『星術を使わない』という制限での組手を行うことになったのだが――"
translation = "그리고 마모리 씨의 희망으로 『성술을 사용하지 않는다』는 제한 하에 대련을 하게 되었는데――"

[[dialogue]]
speaker_original = "マトイ母"
speaker_translation = "마토이 엄마"
original = "「なるほど、実戦経験の豊富さが伺えるいい動きだわ。だけど――それっ！」"
translation = "「과연, 실전 경험이 풍부하다는 게 느껴지는 좋은 움직임이네. 하지만―― 이거다!」"

[[dialogue]]
speaker = "unk"
original = "俺がマモリさんへと突き出した拳は、巻き取るように掴まれて、投げられてしまう。転がるように距離を取り――"
translation = "내가 마모리 씨에게 내지른 주먹은 휘감기듯 붙잡혀 던져지고 만다. 구르듯이 거리를 벌리고――"

[[dialogue]]
speaker = "unk"
original = "つ、強い……！"
translation = "강, 강하다……!"

[[dialogue]]
speaker_original = "マトイ母"
speaker_translation = "마토이 엄마"
original = "「ふぅ～♪\u3000この辺りで止めときましょうか。これ以上はガチの戦いになっちゃうだろうし……」"
translation = "「후우~♪ 이쯤에서 멈출까요. 이 이상은 진심 어린 싸움이 되어버릴 테니까……」"

[[dialogue]]
speaker = "unk"
original = "星術は使わずとも、星力で身体能力を底上げしているのに、結局一本も取れなかった。それどころかむしろ、力を逆手に取られている感じがした。これは――"
translation = "성술은 쓰지 않아도 성력으로 신체 능력을 끌어올리고 있는데 결국 한 판도 따내지 못했다. 오히려 힘을 역이용당하고 있다는 느낌이 들었다. 이것은――"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「母さまは、合気道が使えるんですよ。それも普通じゃないレベルで」"
translation = "「어머니는 합기도를 하실 줄 알아요. 그것도 평범하지 않은 수준으로요.」"

[[dialogue]]
speaker_original = "マトイ母"
speaker_translation = "마토이 엄마"
original = "「え～、これくらい割と普通じゃない？」"
translation = "「에~ 이 정도는 꽤 평범하지 않아?」"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「いや普通じゃないから！\u3000普通の主婦は、星騎士と組手で互角以上に戦えたりしないっ！」"
translation = "「아니, 전혀 안 평범하니까! 평범한 주부는 성기사랑 대련해서 대등 이상으로 싸우지 못해!」"

[[dialogue]]
speaker_original = "マトイ母"
speaker_translation = "마토이 엄마"
original = "「そう？\u3000でもとりあえず、お母さん、久しぶりに強い子と戦えて嬉しかった～♪」"
translation = "「그래? 하지만 어쨌든 엄마는 오랜만에 강한 아이랑 싸울 수 있어서 기뻤어~♪」"

[[dialogue]]
speaker_original = "マトイ母"
speaker_translation = "마토이 엄마"
original = "「さてと、これで会長くんとも拳を交えて語り合った仲になったわけだし～♪\u3000お母さんに教えて欲しいんだけど～」"
translation = "「그럼 이제 회장군과도 주먹을 섞으며 대화한 사이가 된 셈이고~♪ 엄마한테 가르쳐줬으면 좋겠는데~」"

[[dialogue]]
speaker_original = "マトイ母"
speaker_translation = "마토이 엄마"
original = "「ぶっちゃけ、マトイとはどこまで行ってるの？\u3000例えばキスとか――」"
translation = "「솔직히 말해서 마토이랑은 어디까지 갔니? 예를 들면 키스라든가――」"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「ちょっと！\u3000娘の前でなに聞いてんの！？\u3000普通に教えるわけないでしょ！？」"
translation = "「잠깐! 딸 앞에서 뭘 묻는 거야!? 당연히 안 가르쳐주지!」"

[[dialogue]]
speaker_original = "マトイ母"
speaker_translation = "마토이 엄마"
original = "「え～？\u3000いいじゃない～。家だといつも、会長くんの話題を振ると、これでもかってくらい饒舌に話してるのに」"
translation = "「에~? 좋잖아~. 집에서는 항상 회장군 화제를 꺼내면 이래도 되나 싶을 정도로 달변가처럼 말하면서.」"

[[dialogue]]
speaker_original = "マトイ母"
speaker_translation = "마토이 엄마"
original = "「あれが格好いいとか～、何が凄かったとか～、ベタ褒めよ？\u3000ベタ褒め。完全にノロケよね～♪」"
translation = "「그게 멋있다느니~ 뭐가 대단했다느니~ 아주 칭찬 일색이라구? 완전히 닭살 돋는 자랑이지~♪」"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「わあああああああああっ！！！\u3000やめてやめて！\u3000会長の前でっ、恥ずかしいからっ！！」"
translation = "「와아아아아아아아아앗!!! 하지 마 하지 마! 회장님 앞에서 부끄러우니까!!」"

[[dialogue]]
speaker_original = "マトイ母"
speaker_translation = "마토이 엄마"
original = "「ふふっ、マトイったら顔が赤くなってる～♪」"
translation = "「후훗, 마토이 얼굴이 빨개졌네~♪」"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「会長、まともに話聞かなくていいから！\u3000完全にこの母、からかって楽しんでるだけだから！」"
translation = "「회장님, 제대로 듣지 않아도 돼! 완전히 이 엄마, 놀리면서 즐기고 있는 것뿐이니까!」"

[[dialogue]]
speaker = "unk"
original = "大丈夫。むしろ家でも褒めてくれてて嬉しい"
translation = "괜찮아. 오히려 집에서도 칭찬해 줘서 기쁜걸."

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「えっ！？\u3000あっ……だ、だって、その――」"
translation = "「에!? 앗…… 그, 그치만 그――」"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「か、会長のこと……好きだし」"
translation = "「회, 회장님…… 좋아하니까.」"

[[dialogue]]
speaker = "unk"
original = "俺も好きだ"
translation = "나도 좋아해."

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「あ……えへへぇ<emoji=heart04>」"
translation = "「아…… 에헤헤헤<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ母"
speaker_translation = "마토이 엄마"
original = "「あら、ふふっ、お熱いわね♪\u3000会長くん、いい彼氏じゃない♪」"
translation = "「어머나, 후훗, 뜨겁네♪ 회장군, 좋은 남자친구잖아♪」"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「う、うん……<emoji=heart04>」"
translation = "「으, 응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ母"
speaker_translation = "마토이 엄마"
original = "「改めて、会長くん。――マトイのこと、これからもよろしく頼むわね♪」"
translation = "「다시 한번, 회장군. ――마토이를 앞으로도 잘 부탁하네♪」"

[[dialogue]]
speaker = "unk"
original = "もちろんです。マモリさん"
translation = "「물론입니다. 마모리 씨.」"

[[dialogue]]
speaker_original = "マトイ母"
speaker_translation = "마토이 엄마"
original = "「あっ、ちなみに私のことは、お義母さんって呼んでくれてもいいわよ♪」"
translation = "「앗, 참고로 나에 대해서는 장모님이라고 불러줘도 괜찮아♪」"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「それは早過ぎるから……！」"
translation = "「그건 너무 빠르니까……!」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「はっ……！\u3000ということは、会長さまが私の義兄さまに！？\u3000……末永く、よろしくお願いいたします、義兄さま♪」"
translation = "「핫……! 그렇다는 건, 회장님이 저의 형부님이 되는 건가요!? ……오래도록 잘 부탁드립니다, 형부님♪」"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「トマル！？\u3000それはちょっと、私が危機感覚えるくらい破壊力高いんだけど！？」"
translation = "「토마루!? 그건 좀, 내가 위기감을 느낄 정도로 파괴력이 높은데!?」"

[[dialogue]]
speaker = "unk"
original = "楽しそうに話す３人に、俺は詠野家の一家団欒を垣間見た気がして、微笑ましい気持ちになるのだった――"
translation = "즐겁게 대화하는 세 사람을 보며, 나는 에이노 가의 단란한 가족애를 엿본 것 같아 미소가 지어지는 기분이었다――"

