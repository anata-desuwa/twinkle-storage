[[dialogue]]
speaker = "フィオナ"
original = "「同じ流星学園といっても、雰囲気は異なるものなのですね。かと思えば似ているところもあって……これが平行世界……！」"
translation = "「같은 유성 학원이라고 해도, 분위기는 다른 것이군요. 그러면서도 비슷한 점도 있고…… 이것이 평행 세계……!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「フィオナがいつになく目を輝かせてる気がするわ……」"
translation = "「피오나가 평소와 다르게 눈을 반짝이는 것 같아……」"

[[dialogue]]
speaker = "unk"
original = "この辺りで一度休憩しようか"
translation = "이쯤에서 한번 쉬자"

[[dialogue]]
speaker = "マグダレナ"
original = "「そうですね。この世界の話も詳しくお伺いしたいですし」"
translation = "「그러죠. 이 세계의 이야기도 자세히 여쭤보고 싶고요」"

[[dialogue]]
speaker = "リア"
original = "「ふふ、それじゃあみんなで何か甘い物でも食べよっか」"
translation = "「후후, 그럼 다 같이 뭔가 달콤한 거라도 먹을까」"

[[dialogue]]
speaker = "聖沙"
original = "「ところであなた、咲良クンと同じく生徒会長で魔王らしいわね？」"
translation = "「그런데 당신, 사쿠라 군과 마찬가지로 학생회장이자 마왕인 것 같네?」"

[[dialogue]]
speaker = "聖沙"
original = "「なんでもその立場を利用して、たくさんの女の子にちょっかいを出しているだとか」"
translation = "「뭐든지 그 입장을 이용해서, 많은 여자아이들에게 수작을 걸고 있다고 하던데」"

[[dialogue]]
speaker = "unk"
original = "ちょっかいなんて出してない"
translation = "수작 같은 건 안 걸었어"

[[dialogue]]
speaker = "聖沙"
original = "「問答無用！\u3000いい？\u3000生徒会長ってのはね、みんなの『期待』と『責任』を背負う大事な役職なの。軟派な人には決して務まらないわ」"
translation = "「묻지도 따지지도 않아! 알겠어? 학생회장이라는 건 말이지, 모두의 『기대』와 『책임』을 짊어지는 중요한 직책이야. 경박한 사람에게는 결코 맡길 수 없어」"

[[dialogue]]
speaker = "unk"
original = "わかってるつもりだ"
translation = "알고 있을 생각이다"

[[dialogue]]
speaker = "聖沙"
original = "「え？\u3000そう？\u3000あなたはずいぶん素直なのね……」"
translation = "「에? 그래? 당신은 꽤 솔직하네……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「フッ……心配は無用よ。なんてったって、クロトは御前試合で私に勝ったんだから！」"
translation = "「훗…… 걱정은 무용지물이야. 뭐라고 해도, 쿠로토는 어전 시합에서 나를 이겼으니까!」"

[[dialogue]]
speaker = "聖沙"
original = "「御前試合？\u3000何それ？\u3000会長の座をかけて一騎打ち……？」"
translation = "「어전 시합? 그게 뭔데? 회장 자리를 걸고 일대일 승부……?」"

[[dialogue]]
speaker = "聖沙"
original = "「え～っ、そんなのアリなの！？\u3000そんなことできるなら私だって咲良クンと──ってそうじゃないわ！\u3000会長を決めるのは普通選挙でしょ！\u3000戦闘民族なの！？」"
translation = "「에～엣, 그런 게 가능한 거야!? 그런 걸 할 수 있다면 나도 사쿠라 군과── 아니 그게 아니지! 회장을 정하는 건 보통 선거잖아! 전투 민족이야!?」"

[[dialogue]]
speaker = "聖沙"
original = "「成り行きで会長になったあなたが、本当に会長にふさわしいか、私が試してあげる。いざ尋常に──勝負よ！！」"
translation = "「어쩌다 회장이 된 당신이, 정말로 회장에 적합한지, 내가 시험해 줄게. 자, 정정당당하게── 승부야!!」"

[[dialogue]]
speaker = "unk"
original = "しょ、勝負！？"
translation = "스, 승부!?」"

[[dialogue]]
speaker = "聖沙"
original = "「何も力比べをしようというわけじゃないわ。あなたの器量を測ってあげようってだけ」"
translation = "「딱히 힘겨루기를 하자는 건 아니야. 당신의 도량을 재어주겠다는 것뿐」"

[[dialogue]]
speaker = "雑魚魔族"
original = "「イー！」"
translation = "「이이!」"

[[dialogue]]
speaker = "聖沙"
original = "「ふふ、そら見なさい。魔族もあなたの器を確かめたがって──」"
translation = "「후후, 거봐. 마족도 당신의 그릇을 확인하고 싶어──」"

[[dialogue]]
speaker = "聖沙"
original = "「って、魔族ぅ！！？」"
translation = "「라고, 마족으으!!?」"

[[dialogue]]
speaker = "unk"
original = "大変だ、みんなのお菓子が！"
translation = "큰일이다, 모두의 과자가!"

[[dialogue]]
speaker = "聖沙"
original = "「んもうっ！\u3000お姉さまのお菓子を勝手に食べないで！\u3000ああもう、こんなにたくさん現れて……！！」"
translation = "「정말! 언니의 과자를 멋대로 먹지 마! 아아 정말, 이렇게나 많이 나타나다니……!!」"

[[dialogue]]
speaker = "聖沙"
original = "「まぁいいわ、悪さをするならやっつけるだけよ！」"
translation = "「뭐 됐어, 나쁜 짓을 한다면 해치워 버릴 뿐이야!」"

[[dialogue]]
speaker = "聖沙"
original = "「主と共に在り、峻烈の紫光を以て引き裂け迅雷の天使──エクラエル！」"
translation = "「주와 함께 있으라, 준열한 자줏빛 빛으로 찢어발겨라 신뢰의 천사── 에클라엘!」"

[[dialogue]]
speaker = "聖沙"
original = "「さぁ、あなたも早く変身しなさい。どちらがより多くの魔族をやっつけられるか勝負よ！」"
translation = "「자, 당신도 빨리 변신해. 누가 더 많은 마족을 해치울 수 있는지 승부야!」"

[[dialogue]]
speaker = "聖沙"
original = "「私にやっつけられた魔族は挙手ー！」"
translation = "「나에게 해치워진 마족은 거수ー!」"

[[dialogue]]
speaker = "雑魚魔族"
original = "「イー！\u3000イー！」"
translation = "「이이! 이이!」"

[[dialogue]]
speaker = "聖沙"
original = "「ふむふむ。じゃあ彼にやっつけられた魔族は挙手ー！」"
translation = "「흐음흐음. 그럼 그에게 해치워진 마족은 거수ー!」"

[[dialogue]]
speaker = "雑魚魔族"
original = "「イー！\u3000イー！\u3000イー！\u3000イー！」"
translation = "「이이! 이이! 이이! 이이!」"

[[dialogue]]
speaker = "聖沙"
original = "「う……。ま、負けたわ……」"
translation = "「우……. 져, 졌어……」"

[[dialogue]]
speaker = "聖沙"
original = "「くぅ～っ！\u3000でもあなたに生徒会長や魔王としての素質が最低限あることはわかったわ。とりあえず……それは認めてあげる」"
translation = "「크으～! 하지만 당신에게 학생회장이나 마왕으로서의 최소한의 소질이 있다는 건 알았어. 일단…… 그건 인정해 줄게」"

[[dialogue]]
speaker = "聖沙"
original = "「だけど油断はしないことね。いつ如何なる時も誰かと真剣勝負をしていると思いなさい」"
translation = "「하지만 방심하지 마. 언제 어떤 때라도 누군가와 진검 승부를 하고 있다고 생각해야 해」"

[[dialogue]]
speaker = "聖沙"
original = "「生徒会長として、魔王として、みんなを率いて立ちたいと思うのなら尚更ね」"
translation = "「학생회장으로서, 마왕으로서, 모두를 이끌고 서고 싶다고 생각한다면 더욱 그렇지」"

[[dialogue]]
speaker = "unk"
original = "ああ！"
translation = "알았어!"

[[dialogue]]
speaker = "聖沙"
original = "「良い返事よ。ふふ、咲良クンより断然見込みがあるじゃない」"
translation = "「좋은 대답이야. 후후, 사쿠라 군보다 훨씬 가망이 있잖아」"

[[dialogue]]
speaker = "リア"
original = "「くすくす。聖沙ちゃんったら、少し見ない間に随分と会長さんと仲良しになっちゃって。シン君にちょっと似てるからかな？」"
translation = "「쿡쿡. 미사짱도, 잠깐 못 본 사이에 회장님과 꽤 친해졌네. 신 군과 조금 닮아서 그런가?」"

[[dialogue]]
speaker = "聖沙"
original = "「ち、違います、お姉さま……！\u3000私はただ彼の器量を測っていただけで……！」"
translation = "「아, 아니에요, 언니……! 저는 단지 그의 도량을 재고 있었을 뿐이에요……!」"

[[dialogue]]
speaker = "リア"
original = "「ふふ、相変わらず素直じゃないんだから♪」"
translation = "「후후, 여전히 솔직하지 못하네♪」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それにしてもモンスターじゃなくて魔族……なのよね。私たちの世界の魔族とは似ても似つかないわ」"
translation = "「그나저나 몬스터가 아니라 마족……이네. 우리 세계의 마족과는 전혀 닮지 않았어」"

[[dialogue]]
speaker = "フィオナ"
original = "「ええ、こちらの世界の魔族はソフィアのように人間に近い姿をしているのですが……」"
translation = "「네, 이쪽 세계의 마족은 소피아처럼 인간에 가까운 모습을 하고 있습니다만……」"

[[dialogue]]
speaker = "聖沙"
original = "「えっと、こっちの世界の魔族も本当はそうなの。でも力のない魔族は人間界に来ると、あんなふうな姿になっちゃうみたい」"
translation = "「에또, 이쪽 세계의 마족도 사실은 그래. 하지만 힘이 없는 마족은 인간계에 오면, 저런 모습이 되어 버리는 것 같아」"

[[dialogue]]
speaker = "聖沙"
original = "「逆に言えば、人間界でも姿を保てる魔族は、それだけ強力な魔族ってことなのよ」"
translation = "「반대로 말하면, 인간계에서도 모습을 유지할 수 있는 마족은, 그만큼 강력한 마족이라는 거야」"

[[dialogue]]
speaker = "マグダレナ"
original = "「なるほど、そのような事情があるのですね。世界の<b>理</b>からして異なる……興味深いです」"
translation = "「과연, 그런 사정이 있는 것이군요. 세계의 <b>이치</b>부터가 다르다니…… 흥미롭습니다」"

[[dialogue]]
speaker = "マグダレナ"
original = "「しかし申し訳ございません。少し気になる気配が。もしかするとルリエルさまかもしれません」"
translation = "「하지만 죄송합니다. 조금 신경 쓰이는 기운이. 어쩌면 루리엘 님일지도 모릅니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「っっ。やはりこちらの世界に迷い込んでいたのですね。すぐに向かいましょう」"
translation = "「크읏. 역시 이쪽 세계에 길을 잃고 들어와 있었군요. 바로 가봅시다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そうね。きっと見知らぬ世界に一人で迷い込んで寂しい想いをしちゃっているはずだわ」"
translation = "「그러게. 분명 낯선 세계에 혼자 길을 잃고 외로운 생각을 하고 있을 거야」"

[[dialogue]]
speaker = "リア"
original = "「なら引き続き案内するね。主要な場所を探した方がいいと思うから」"
translation = "「그럼 계속 안내해 줄게. 주요한 장소를 찾는 게 좋을 것 같으니까」"

[[dialogue]]
speaker = "聖沙"
original = "「さっきは少し遅れを取ったけど、次は負けないわ。どちらが先にルリエルさんを見つけられるか──勝負よ！」"
translation = "「아까는 조금 뒤처졌지만, 다음은 지지 않을 거야. 누가 먼저 루리엘 씨를 찾을 수 있을지── 승부야!」"

[[dialogue]]
speaker = "マグダレナ"
original = "「しかしこれは……本当にルリエルさまの気配、なのでしょうか」"
translation = "「하지만 이건…… 정말로 루리엘 님의 기운, 일까요」"

[[dialogue]]
speaker = "マグダレナ"
original = "「何か妙なものが混じっているような……」"
translation = "「뭔가 이상한 것이 섞여 있는 듯한……」"

