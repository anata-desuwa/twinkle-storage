[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「……ふにゅ、ふわぁ～……ん……まだ眠いなぁ……って、あれぇ？」"
translation = "「……후뉴, 후와아~……음…… 아직 졸리네…… 어라?」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ここ……会長ちゃんのお部屋……？\u3000あ、そうだ……昨日は会長ちゃんの家にお泊りして、その後……」"
translation = "「여기…… 회장짱 방……? 아, 맞다…… 어제는 회장짱 집에서 자고, 그 뒤에……」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「エッチ、したんだよね……<emoji=heart04>\u3000す～っ……えへへ、あんなにいっぱいしたからかなぁ。お部屋の中、すっごくエッチな匂いするぅ……<emoji=heart04>」"
translation = "「섹스, 했었지……<emoji=heart04> 스으읍…… 에헤헤, 그렇게 많이 해서 그런가. 방 안에서, 엄청 야한 냄새 나아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「って、あんっ……<emoji=heart04>\u3000会長ちゃんったら……<emoji=heart04>」"
translation = "「그치만, 안앗……<emoji=heart04> 회장짱도 참……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「あんなにエッチしたのに、朝勃ちでおち○ちん、大きくなってる……<emoji=heart04>」"
translation = "「그렇게 섹스했는데도, 아침 발기로 자지, 커져 있어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「これって会長ちゃん……もっとサランとエッチしたい……ってこと、だよね……♪」"
translation = "「이건 회장짱…… 사란이랑 더 섹스하고 싶다……는 거지……♪」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「だって、寝ててもおち○ちん……あんっ<emoji=heart04>\u3000サランのおま○こに、擦り付けてくるんだもん……♪\u3000たぶん……うん、きっとそうだよね……<emoji=heart04>」"
translation = "「그치만, 자고 있어도 자지를…… 안앗<emoji=heart04> 사란의 보지에, 문지르고 있는걸……♪ 아마…… 응, 분명 그럴 거야……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「だから……サランがエッチな気持ちになっても、しょうがないよね……うん<emoji=heart04>」"
translation = "「그러니까…… 사란이 야한 기분이 되어도, 어쩔 수 없겠지…… 응<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「会長ちゃん……寝てるところごめんね……<emoji=heart04>\u3000おち○ちん、ちょっとだけ借りるから……あんっ<emoji=heart04>」"
translation = "「회장짱…… 자고 있는데 미안해……<emoji=heart04> 자지, 조금만 빌릴 테니까…… 안앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「もう会長ちゃんったら、寝てる間も擦り付けてくるから……んんっ<emoji=heart04>\u3000サランもまた、ぬるぬるになっちゃってる……ふあぁっ……<emoji=heart04>」"
translation = "「정말 회장짱도 참, 자는 동안에도 문질러 대니까…… 으응<emoji=heart04> 사란도 다시, 미끌미끌해져 버렸어…… 후아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「会長ちゃんのおち○ちん、おまたで擦ると、気持ちいい……<emoji=heart04>\u3000えへへ、これ毎朝できたら幸せかもぉ……はぁんっ……<emoji=heart04>」"
translation = "「회장짱의 자지, 가랑이로 문지르면, 기분 좋아……<emoji=heart04> 에헤헤, 이거 매일 아침 할 수 있으면 행복할지도오…… 하앙……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「朝起きてエッチして～……お昼はイチャイチャして～……夜寝る前に、またいっぱいエッチして～……<emoji=heart04>\u3000はあぁ……<emoji=heart04>」"
translation = "「아침에 일어나서 섹스하고~…… 낮에는 꽁냥꽁냥하고~…… 밤에 자기 전에, 또 잔뜩 섹스하고~……<emoji=heart04> 하아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「想像するだけで、おま○こキュンキュンしちゃう……<emoji=heart04>\u3000んんっ……<emoji=heart04>」"
translation = "「상상하는 것만으로도, 보지가 큥큥거려……<emoji=heart04> 으응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「そんな生活、きっと会長ちゃんも幸せ……だよね<emoji=heart04>\u3000ふうぅ……<emoji=heart04>\u3000だから……いいよね<emoji=heart04>\u3000おち○ちん、おま○こで食べちゃっても……<emoji=heart04>」"
translation = "「그런 생활, 분명 회장짱도 행복……하겠지<emoji=heart04> 후우우……<emoji=heart04> 그러니까…… 괜찮지<emoji=heart04> 자지, 보지로 먹어버려도……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「それじゃあ……いただきま～す<emoji=heart04>\u3000って……あっ――」"
translation = "「그럼…… 잘 먹겠습니다<emoji=heart04> 어…… 앗――」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「んん……」"
translation = "「음……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「おはよう、サラン……って、あれ……？\u3000なんかあそこが……気持ちいい……？」"
translation = "「안녕, 사란…… 어, 어라……? 왠지 거기가…… 기분 좋아……?」"

[[dialogue]]
speaker = "unk"
original = "確か……昨日はサランのお泊りだった。両家公認の関係で、しかも初めてのお泊り。"
translation = "분명…… 어제는 사란이 자고 가는 날이었다. 양가 공인 관계에, 게다가 처음으로 자고 가는 날."

[[dialogue]]
speaker = "unk"
original = "こんな状況で我慢できるはずもなく、昨晩はサランとエッチしまくってしまった。サランの肉付きのいい体は、それはもう極上の気持ち良さで――"
translation = "이런 상황에서 참을 수 있을 리도 없었고, 어젯밤에는 사란과 섹스를 엄청나게 해버렸다. 사란의 살집 좋은 몸은, 그야말로 극상의 기분 좋음이라서――"

[[dialogue]]
speaker = "unk"
original = "このままズブズブと快楽の沼にハマったらまずい……せめて今日からは、自制しなくては。寝起きの頭で、そんなことをぼーっと考えていると……"
translation = "이대로 쾌락의 늪에 푹 빠지면 위험해…… 적어도 오늘부터는, 자제해야지. 잠이 덜 깬 머리로, 그런 생각을 멍하니 하고 있자니……"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「会長ちゃん、おはよ～♪\u3000今日も外は天気良さげだよ～♪」"
translation = "「회장짱, 안녕~♪ 오늘도 밖은 날씨 좋아 보여~♪」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そりゃあ、よかった……って、違う違う！\u3000なんか始まってるって！」"
translation = "「그거 다행이네…… 가 아니라! 왠지 시작되고 있다고!」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「だって会長ちゃん、起きたらおち○ちん、大きくなってたから……<emoji=heart04>\u3000いいかな～って思って……♪」"
translation = "「그치만 회장짱, 일어나니까 자지, 커져 있었으니까……<emoji=heart04> 괜찮으려나~ 싶어서……♪」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「それに、エッチって、すっごく気持ちいいんだもん……<emoji=heart04>\u3000だから……ね？\u3000会長ちゃん……お願い<emoji=heart04>」"
translation = "「게다가, 섹스라는 거, 엄청 기분 좋은걸……<emoji=heart04> 그러니까…… 응? 회장짱…… 부탁이야<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「サランのおま○この中に……おち○ちん入れて<emoji=heart04>」"
translation = "「사란의 보지 안에…… 자지 넣어줘<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "自制しようと思う心は、恋人の甘い誘惑で一瞬にして砕け散った。"
translation = "자제하려던 마음은, 연인의 달콤한 유혹에 순식간에 박살 났다."

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「やっ<emoji=heart04>\u3000あぁぁっ――――<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「얏<emoji=heart04> 아아앗――――<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ふああぁぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000会長ちゃんのおち○ちん、サランの中にぐ～って入ってきてるぅ～<emoji=heart04>\u3000あっ……あんっ<emoji=heart04>\u3000はあぁっ……んっ<emoji=heart04>\u3000あっ……ふあぁっ……<emoji=heart04>」"
translation = "「후아아아아~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 회장짱의 자지, 사란 안으로 꾸욱 들어오고 있어어~<emoji=heart04> 앗…… 안앗<emoji=heart04> 하아앗…… 응<emoji=heart04> 앗…… 후아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「んっ……昨日いっぱいしたから<emoji=heart04>\u3000おま○こ、おち○ちんに慣れてて、あんっ……<emoji=heart04>\u3000なんだかふわふわ～って、安心しちゃう……あっ<emoji=heart04>\u3000はあぁんっ……<emoji=heart04>」"
translation = "「응…… 어제 잔뜩 했으니까<emoji=heart04> 보지가, 자지에 익숙해져서, 안앗……<emoji=heart04> 왠지 폭신폭신~ 하게, 안심돼버려…… 앗<emoji=heart04> 하아앙……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「やっぱり会長ちゃんも、エッチしたかったんだ……ふあぁっ<emoji=heart04>\u3000おち○ちんが嬉しがってるの、わかるよぉ……んあぁんっ<emoji=heart04>」"
translation = "「역시 회장짱도, 섹스하고 싶었던 거야…… 후아앗<emoji=heart04> 자지가 기뻐하는 거, 느껴져어…… 응아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「エッチ過ぎるサランが悪い……まさかサランが、こんなにエッチな子だとは思わなかった」"
translation = "「너무 야한 사란이 잘못이야…… 설마 사란이, 이렇게 야한 아이일 줄은 몰랐어」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「あんっ<emoji=heart04>\u3000サランにエッチなこと教えたのは、会長ちゃんだもん……っ<emoji=heart04>\u3000あっ……ふあぁっ<emoji=heart04>」"
translation = "「안앗<emoji=heart04> 사란한테 야한 거 가르쳐준 건, 회장짱인걸……<emoji=heart04> 앗…… 후아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「昨日あんなに、エッチしたのに……あんっ<emoji=heart04>\u3000またしたくなっちゃうくらい、エッチが気持ちいいって……んっ<emoji=heart04>\u3000はあぁんっ……<emoji=heart04>」"
translation = "「어제 그렇게, 섹스했는데도…… 안앗<emoji=heart04> 또 하고 싶어질 정도로, 섹스가 기분 좋다고…… 응<emoji=heart04> 하아앙……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「おち○ちんの味<emoji=heart04>\u3000サランに教えたのは、会長ちゃんなんだから……<emoji=heart04>\u3000ふあぁっ……んああぁっ<emoji=heart04>」"
translation = "「자지의 맛<emoji=heart04> 사란한테 가르쳐준 건, 회장짱이니까……<emoji=heart04> 후아앗…… 응아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「頭がふわふわして～……おなかの中がきゅ～ってなって<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000会長ちゃんのこと、い～っぱい感じられて……あんっ<emoji=heart04>」"
translation = "「머리가 폭신폭신해져서~…… 배 속이 뀨우~ 하게 되고<emoji=heart04> 으응<emoji=heart04> 회장짱을, 가~득 느낄 수 있어서…… 안앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「好き～って気持ちが<emoji=heart04>\u3000抑えられなく、なっちゃうんだもん<emoji=heart04>\u3000あっ、あんっ<emoji=heart04>\u3000会長ちゃんがいけないんだよ……<emoji=heart04>\u3000あっ……ふあぁっ<emoji=heart04>」"
translation = "「좋아해~ 라는 마음이<emoji=heart04> 억눌러지지 않게, 되어버리는걸<emoji=heart04> 앗, 안앗<emoji=heart04> 회장짱이 나쁜 거야……<emoji=heart04> 앗…… 후아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「んっ……ふうぅっ<emoji=heart04>\u3000はっ……んあぁっ<emoji=heart04>\u3000サランがエッチになっちゃった責任……あっ<emoji=heart04>\u3000会長ちゃんにも、とってもらわなくちゃ<emoji=heart04>」"
translation = "「응…… 후우웃<emoji=heart04> 핫…… 응아앗<emoji=heart04> 사란이 야하게 되어버린 책임…… 앗<emoji=heart04> 회장짱도, 져야만 해<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「はあぁっ……<emoji=heart04>\u3000だから、お願い<emoji=heart04>\u3000昨日みたいに……んっ<emoji=heart04>\u3000サランのおま○こ、いっぱい突いて……はあぁっ……<emoji=heart04>」"
translation = "「하아앗……<emoji=heart04> 그러니까, 부탁이야<emoji=heart04> 어제처럼…… 응<emoji=heart04> 사란의 보지, 잔뜩 찔러줘…… 하아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「会長ちゃんのおち○ちん……サランの奥にズンズンって、いっぱい奥に突っ込んでぇ<emoji=heart04>\u3000あぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「회장짱의 자지…… 사란의 깊숙한 곳에 즈음즈음하고, 잔뜩 안쪽까지 쑤셔 넣어줘어<emoji=heart04> 아앗<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ぎゅ～っていっぱい抱きしめながらぁ、あんっ<emoji=heart04>\u3000そう、壊れちゃうくらいに<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000ぎゅ～ってぇ<emoji=heart04>\u3000はあぁっ<emoji=heart04>」"
translation = "「규우~ 하고 잔뜩 껴안으면서어, 안앗<emoji=heart04> 그래, 망가질 정도로<emoji=heart04> 응아앗<emoji=heart04> 규우~ 하게에<emoji=heart04> 하아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「んっ<emoji=heart04>\u3000えへへ……<emoji=heart04>\u3000サランの抱き心地……気持ちぃ～い？<emoji=heart04>\u3000あっ、あんっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 에헤헤……<emoji=heart04> 사란의 품속…… 기분 조오아?<emoji=heart04> 앗, 안앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「はあぁっ……ふあぁっ<emoji=heart04>\u3000そーだよぉ……あぁんっ<emoji=heart04>\u3000お胸も、おま○こも、ぜーんぶ会長ちゃんだけのものだよ<emoji=heart04>\u3000……んっ<emoji=heart04>」"
translation = "「하아앗…… 후아앗<emoji=heart04> 그래애…… 아앙<emoji=heart04> 가슴도, 보지도, 저언부 회장짱만의 것이야<emoji=heart04> ……응<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「いーっぱい触ってぇ……あっ<emoji=heart04>\u3000い～っぱい気持ちよく、なってほしいなぁ<emoji=heart04>\u3000……んっ、あぁんっ<emoji=heart04>」"
translation = "「가~아득 만져줘어…… 앗<emoji=heart04> 가~아득 기분 좋게, 되었으면 좋겠어어<emoji=heart04> ……응, 아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「会長ちゃんがサランのこと……んんっ<emoji=heart04>\u3000毎日抱きたいって、思ってくれるなら……いいんだよ？\u3000はあぁっ……<emoji=heart04>」"
translation = "「회장짱이 사란을…… 으응<emoji=heart04> 매일 안고 싶다고, 생각해준다면…… 괜찮아? 하아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「桜十路のおじいちゃんも……あんっ<emoji=heart04>\u3000会長ちゃんなら、一緒に暮らしてもいいって……んあぁっ<emoji=heart04>\u3000同棲してもいいって、言ってくれてるからぁ……はあぁんっ<emoji=heart04>」"
translation = "「사쿠라코지의 할아버지도…… 안앗<emoji=heart04> 회장짱이라면, 같이 살아도 된다고…… 응아앗<emoji=heart04> 동거해도 된다고, 말씀해주셨으니까아…… 하아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「そうしたら～……んんっ<emoji=heart04>\u3000こうやって毎日、ぎゅーって抱っこしあいながら……エッチしながら、過ごせるようになっちゃうね<emoji=heart04>\u3000あんっ<emoji=heart04>」"
translation = "「그러면~…… 으응<emoji=heart04> 이렇게 매일, 규우~ 하고 서로 안으면서…… 섹스하면서, 지낼 수 있게 되겠네<emoji=heart04> 안앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「あっ<emoji=heart04>\u3000んふっ……<emoji=heart04>\u3000会長ちゃん、おま○この中で……はあぁっ<emoji=heart04>\u3000おち○ちん、すっごく大きくなってる……あっ、あんっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 응훗……<emoji=heart04> 회장짱, 보지 안에서…… 하아앗<emoji=heart04> 자지, 엄청나게 커지고 있어…… 앗, 안앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「んっ、ふあぁっ……<emoji=heart04>\u3000もしかして……期待してくれてる？\u3000ふうぅっ……<emoji=heart04>\u3000実はサランも……っ<emoji=heart04>」"
translation = "「응, 후아앗……<emoji=heart04> 혹시…… 기대하고 있어? 후우우……<emoji=heart04> 사실 사란도……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「一緒に住むって、どんな風なのかなってぇ<emoji=heart04>\u3000そう思ってたけど……あっ<emoji=heart04>」"
translation = "「같이 산다는 건, 어떤 느낌일까아 하고오<emoji=heart04> 그렇게 생각했지만…… 앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「毎日<emoji=heart04>\u3000会長ちゃんといっぱい、エッチできるって思ったらぁ……んあぁっ<emoji=heart04>\u3000早く同棲したいなって……はあぁ<emoji=heart04>\u3000ダメ、かな……？」"
translation = "「매일<emoji=heart04> 회장짱이랑 잔뜩, 섹스할 수 있다고 생각하니까아…… 응아앗<emoji=heart04> 빨리 동거하고 싶어져서…… 하아아<emoji=heart04> 안 돼, 려나……?」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「あっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000おち○ちん、急に激しく……<emoji=heart04>\u3000会長ちゃんも嬉しいんだ……あんっ、気持ちいいっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 후아앗<emoji=heart04> 자지, 갑자기 격렬하게……<emoji=heart04> 회장짱도 기쁜 거구나…… 안앗, 기분 좋아<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「サランと一緒……<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000こんな気持ちいいこと、好きな人と毎日できるなんて……んんっ<emoji=heart04>\u3000想像しただけで嬉しくなっちゃうよぅ……<emoji=heart04>\u3000んあぁっ<emoji=heart04>」"
translation = "「사란이랑 똑같아……<emoji=heart04> 하아앗<emoji=heart04> 이런 기분 좋은 걸, 좋아하는 사람이랑 매일 할 수 있다니…… 으응<emoji=heart04> 상상만 해도 기뻐져버려어……<emoji=heart04> 응아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「とはいえ、現実的ではないかもな……まだ俺たち、学生だし」"
translation = "「그렇긴 해도, 현실적이지 않을지도 몰라…… 아직 우리, 학생이고」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「むぅ……でも、会長ちゃんのおち○ちんは……んっ<emoji=heart04>\u3000サランと一緒にいたいって、言ってるよ～？」"
translation = "「무우…… 하지만, 회장짱의 자지는…… 응<emoji=heart04> 사란이랑 같이 있고 싶다고, 말하고 있어~?」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ほら、ぎゅ～って<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000おま○こ少し締め付けるだけで、ビクンビクンって<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000会長ちゃんも本当は嬉しいくせに～……あんっ<emoji=heart04>」"
translation = "「봐봐, 규우~ 하게<emoji=heart04> 으응<emoji=heart04> 보지를 조금 조이는 것만으로도, 비큰비큰하고<emoji=heart04> 하아앗<emoji=heart04> 회장짱도 사실은 기쁘면서~…… 안앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ねぇ……会長ちゃんも、おま○こにおち○ちん入れるの、好きなんでしょ～？\u3000んっ……<emoji=heart04>\u3000エッチするの気持ちいい～って、思ってくれてるんでしょ？」"
translation = "「있지…… 회장짱도, 보지에 자지 넣는 거, 좋아하잖아~? 응……<emoji=heart04> 섹스하는 거 기분 좋아~ 라고, 생각하고 있잖아?」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「じゃあもう、決めちゃお？\u3000会長ちゃんは、今日から一緒にサランと暮らすの……あんっ<emoji=heart04>\u3000エッチしたいときにしてぇ、サランと幸せに暮らすんだよ……あぁんっ<emoji=heart04>」"
translation = "「그럼 이제, 정해버리자? 회장짱은, 오늘부터 같이 사란이랑 사는 거야…… 안앗<emoji=heart04> 섹스하고 싶을 때 하고오, 사란이랑 행복하게 사는 거야…… 아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「──大丈夫、だよ？<emoji=heart04>\u3000同棲の意味、サランだってわかってるもん……あっ、あぁんっ<emoji=heart04>」"
translation = "「──괜찮아, 알았지?<emoji=heart04> 동거의 의미, 사란도 알고 있는걸…… 앗, 아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「んっ……はあぁっ<emoji=heart04>\u3000会長ちゃんと結婚して、ずーっと一緒にいるって、ことだよねっ……<emoji=heart04>\u3000あっ……はあぁんっ<emoji=heart04>」"
translation = "「응…… 하아앗<emoji=heart04> 회장짱이랑 결혼해서, 저어기 계속 같이 있는다는, 거지이……<emoji=heart04> 앗…… 하아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「夢みたいな生活、ってことだよね<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000同棲するってことは、会長ちゃんと結婚するための、練習ってことだよね<emoji=heart04>」"
translation = "「꿈같은 생활, 이라는 거지이<emoji=heart04> 안앗<emoji=heart04> 동거한다는 건, 회장짱이랑 결혼하기 위한, 연습이라는 거지이<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「サラン、全部わかってるからぁ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000会長ちゃんと一緒にいたいから、同棲したいって思ってるの<emoji=heart04>\u3000あぁんっ……ふあぁっ<emoji=heart04>」"
translation = "「사란, 전부 알고 있으니까아<emoji=heart04> 응아앗<emoji=heart04> 회장짱이랑 같이 있고 싶으니까, 동거하고 싶다고 생각하는 거야<emoji=heart04> 아앙…… 후아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「会長ちゃんと結婚して、子供もい～っぱい作って<emoji=heart04>\u3000幸せな家族になるのぉ<emoji=heart04>\u3000あっ……ふああぁんっ<emoji=heart04>」"
translation = "「회장짱이랑 결혼해서, 아이도 가~아득 만들고<emoji=heart04> 행복한 가족이 되는 거야아<emoji=heart04> 앗…… 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「サランの夢なの<emoji=heart04>\u3000んっ<emoji=heart04>\u3000会長ちゃんとずっと、一緒にいたいって夢<emoji=heart04>」"
translation = "「사란의 꿈이야<emoji=heart04> 응<emoji=heart04> 회장짱이랑 계속, 같이 있고 싶다는 꿈<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「会長ちゃんは、サランと結婚するの……いや？」"
translation = "「회장짱은, 사란이랑 결혼하는 거…… 싫어?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「イヤなわけない……！\u3000サランと結婚したい」"
translation = "「싫을 리가 없잖아……! 사란이랑 결혼하고 싶어」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「会長ちゃ……ふあっ――――<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「회장짱…… 후앗――――<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「んあああぁぁぁ～～～っ<emoji=heart04><emoji=heart04>\u3000激しいピストンきたぁぁぁ～～～っ<emoji=heart04>\u3000あっ、あっ、あっ、ふああぁんっ<emoji=heart04>\u3000おま○こ気持ちいいっ、あっ、あっ、あっ、はああぁんっ<emoji=heart04>」"
translation = "「응아아아아~~앗<emoji=heart04><emoji=heart04> 격렬한 피스톤 왔다아아아~~앗<emoji=heart04> 앗, 앗, 앗, 후아아앙<emoji=heart04> 보지 기분 좋아, 앗, 앗, 앗, 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「あぁっ<emoji=heart04>\u3000あっ、あっ、んあぁんっ<emoji=heart04>\u3000やっと、会長ちゃんの口から、言ってくれたぁ<emoji=heart04>\u3000あっ、あっ、あっ、おち○ちん凄いの<emoji=heart04>\u3000あっ、ふああぁっ<emoji=heart04>」"
translation = "「아앗<emoji=heart04> 앗, 앗, 응아앙<emoji=heart04> 드디어, 회장짱 입에서, 들어버렸어어<emoji=heart04> 앗, 앗, 앗, 자지 대단해에<emoji=heart04> 앗, 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「会長ちゃんと結婚<emoji=heart04>\u3000はっ、はっ、はっ、んああぁっ<emoji=heart04>\u3000ずーっと一緒に<emoji=heart04>\u3000んっ、んっ、あっ、ふあぁっ<emoji=heart04>\u3000こども作るの<emoji=heart04>\u3000あっ、あっ、あっ、ふああぁんっ<emoji=heart04>」"
translation = "「회장짱이랑 결혼<emoji=heart04> 핫, 핫, 핫, 응아아앗<emoji=heart04> 저어기 계속 같이<emoji=heart04> 응, 응, 앗, 후아앗<emoji=heart04> 아이 만드는 거야<emoji=heart04> 앗, 앗, 앗, 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「だから、会長ちゃん<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000お願い<emoji=heart04>\u3000会長ちゃんのこども、サラン欲しいよぉ<emoji=heart04>\u3000あっ、あっ、あっ、んああぁんっ<emoji=heart04>」"
translation = "「그러니까, 회장짱<emoji=heart04> 안앗<emoji=heart04> 부탁이야<emoji=heart04> 회장짱의 아이, 사란 갖고 싶어어<emoji=heart04> 앗, 앗, 앗, 응아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「はぁっ、んっ、あっ……はあぁっ<emoji=heart04>\u3000そう、そうだよ<emoji=heart04>\u3000あっ、あっ、んあぁっ<emoji=heart04>」"
translation = "「하앗, 응, 앗…… 하아앗<emoji=heart04> 그래, 그거야아<emoji=heart04> 앗, 앗, 응아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「会長ちゃんがぎゅーってしてくれてるおっぱいで、会長ちゃんのこども育てたい<emoji=heart04>\u3000あっ、あっ、あっ、ふああぁんっ<emoji=heart04>」"
translation = "「회장짱이 규우~ 하고 해주고 있는 가슴으로, 회장짱의 아이 키우고 싶어<emoji=heart04> 앗, 앗, 앗, 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「サランのお乳、会長ちゃんも飲んでね<emoji=heart04>\u3000んっ、はあぁっ<emoji=heart04>\u3000だって会長ちゃんがせーし出してくれるから、お乳が出るように、なるんだもん<emoji=heart04>\u3000あっ、あっ、あんっ<emoji=heart04>」"
translation = "「사란의 젖, 회장짱도 마셔줘어<emoji=heart04> 응, 하아앗<emoji=heart04> 그치만 회장짱이 정액 내주니까, 젖이 나오게, 되는 거니까아<emoji=heart04> 앗, 앗, 안앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「サランのおっぱいも、おま○こも、ぜーんぶ会長ちゃんのものなんだからぁ<emoji=heart04>\u3000あっ、あっ、あっ、ふあぁっ<emoji=heart04>\u3000好きに触って、気持ちよくなってほしいのぉ<emoji=heart04>」"
translation = "「사란의 가슴도, 보지도, 저언부 회장짱의 것이니까아<emoji=heart04> 앗, 앗, 앗, 후아앗<emoji=heart04> 마음껏 만지고, 기분 좋아졌으면 좋겠어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ひぁっ<emoji=heart04>\u3000あっ、あっ、ふああぁんっ<emoji=heart04>\u3000んっ、あぁんっ<emoji=heart04>\u3000はあぁっ、だからね<emoji=heart04>\u3000会長ちゃん<emoji=heart04>」"
translation = "「히앗<emoji=heart04> 앗, 앗, 후아아앙<emoji=heart04> 응, 아앙<emoji=heart04> 하아앗, 그러니까 말야<emoji=heart04> 회장짱<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「いっぱい<emoji=heart04>\u3000ああっ、あんっ<emoji=heart04>\u3000いっぱい、壊れちゃうくらい突いてぇ<emoji=heart04>\u3000あっ、あっ、んああぁんっ<emoji=heart04>」"
translation = "「잔뜩<emoji=heart04> 아앗, 안앗<emoji=heart04> 잔뜩, 망가질 정도로 찔러줘어<emoji=heart04> 앗, 앗, 응아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「サランがお腹いっぱいになるくらい、どちゅどちゅってっ<emoji=heart04>\u3000あっ、あっ、はああぁぁっ<emoji=heart04>\u3000会長ちゃんのおち○ちん、食べさせてぇ<emoji=heart04>」"
translation = "「사란이 배부를 정도로, 도츄도츄하게엣<emoji=heart04> 앗, 앗, 하아아아앗<emoji=heart04> 회장짱의 자지, 먹여줘어<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「んああぁぁっ<emoji=heart04>\u3000そこ<emoji=heart04>\u3000それしゅき<emoji=heart04>\u3000会長ちゃんのおち○ちん、グリグリってされるのしゅきぃ<emoji=heart04>\u3000あっ、あっ、あんっ、気持ちいいのぉ<emoji=heart04>」"
translation = "「응아아아앗<emoji=heart04> 거기<emoji=heart04> 그거 죠아<emoji=heart04> 회장짱의 자지로, 그리그리하게 되는 거 죠아아<emoji=heart04> 앗, 앗, 안앗, 기분 좋아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「しきゅーに会長ちゃんのおち○ちん、擦られるのしゅき<emoji=heart04>\u3000幸せになるぅ<emoji=heart04>\u3000しゅきって言われてる気がして、おま○こキュンキュンしちゃうぅ<emoji=heart04>」"
translation = "「자궁에 회장짱의 자지, 문질러지는 거 죠아<emoji=heart04> 행복해져어<emoji=heart04> 좋아한다고 말해주는 기분이 들어서, 보지가 큥큥거려어<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「結婚したら毎日、あぁんっ<emoji=heart04>\u3000会長ちゃんの好きな時に、サランのおま○こ使ってね？\u3000あっ、あっ、あっ、はあぁんっ<emoji=heart04>」"
translation = "「결혼하면 매일, 아앙<emoji=heart04> 회장짱이 원할 때, 사란의 보지 써줘, 알았지? 앗, 앗, 앗, 하아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ふあぁっ<emoji=heart04>\u3000だから今はもっと<emoji=heart04>\u3000んああぁっ<emoji=heart04>\u3000もっと会長ちゃんのおち○ちん<emoji=heart04>\u3000サランのおま○こゴシゴシしてぇっ<emoji=heart04>\u3000あっ、あっ、あっ、ふああぁっ<emoji=heart04>」"
translation = "「후아앗<emoji=heart04> 그러니까 지금은 더<emoji=heart04> 응아아앗<emoji=heart04> 더 회장짱의 자지<emoji=heart04> 사란의 보지에 고시고시해줘엇<emoji=heart04> 앗, 앗, 앗, 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ああぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>\u3000おま○こ、バカになっちゃう<emoji=heart04>\u3000でも、気持ちいいっ<emoji=heart04>\u3000気持ちいいのぉ<emoji=heart04>\u3000あっ、あっ、あっ、んああぁんっ<emoji=heart04>」"
translation = "「아아앗<emoji=heart04> 앗<emoji=heart04> 후아아앗<emoji=heart04> 보지, 바보가 되어버려어<emoji=heart04> 하지만, 기분 좋아아<emoji=heart04> 기분 좋은걸오오<emoji=heart04> 앗, 앗, 앗, 응아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「会長ちゃんのせーし、いっぱい出して<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000こどもできるようにいっぱい、濃いせーしいっぱいっ<emoji=heart04>\u3000はぁぁぁん<emoji=heart04>」"
translation = "「회장짱의 정액, 잔뜩 내보내 줘<emoji=heart04> 안앗<emoji=heart04> 아이 생길 수 있게 잔뜩, 진한 정액 가아득<emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「エッチなサランに、たっくさんせーし出して<emoji=heart04>\u3000はああぁ<emoji=heart04>\u3000びゅーって、会長ちゃんのせーし<emoji=heart04>\u3000いっぱい欲しいのぉ<emoji=heart04>\u3000んああぁんっ<emoji=heart04>」"
translation = "「야한 사란한테, 가아득 정액 내줘어<emoji=heart04> 하아아아<emoji=heart04> 뷰우~ 하고, 회장짱의 정액<emoji=heart04> 잔뜩 갖고 싶어어<emoji=heart04> 응아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「会長ちゃんのせーし、全部サランのものだよ<emoji=heart04>\u3000あんっ、あんっ、あんっ<emoji=heart04>\u3000もう勝手に出したらダメだから<emoji=heart04>」"
translation = "「회장짱의 정액, 전부 사란의 것이야<emoji=heart04> 안앗, 안앗, 안앗<emoji=heart04> 이제 마음대로 내보내면 안 되니까아<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ふああぁぁっ<emoji=heart04>\u3000サランのおま○こで、全部飲むんだからぁっ<emoji=heart04>\u3000あっ、あっ、あっ……はああぁんっ<emoji=heart04>」"
translation = "「후아아아앗<emoji=heart04> 사란의 보지로, 전부 마셔버릴 거니까앗<emoji=heart04> 앗, 앗, 앗…… 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「んっ、はああぁっ<emoji=heart04>\u3000そろそろダメ<emoji=heart04>\u3000サランもう、イキそうなのぉ<emoji=heart04>\u3000あっ、あっ、あっ、んああぁっ<emoji=heart04>」"
translation = "「응, 하아아앗<emoji=heart04> 이제 안 돼<emoji=heart04> 사란 이제, 갈 것 같아아<emoji=heart04> 앗, 앗, 앗, 응아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「あっ、はぁっ……会長ちゃんも<emoji=heart04>\u3000イク？\u3000イキそうなのっ？\u3000んふぅぅぅ……<emoji=heart04>」"
translation = "「앗, 하앗…… 회장짱도<emoji=heart04> 가? 갈 것 같아? 응후우우우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「あんっ<emoji=heart04>\u3000中でおち○ちん、ぴくぴくって膨らんでるの、わかるっ<emoji=heart04>\u3000会長ちゃんも<emoji=heart04>\u3000イキそうなんだぁっ<emoji=heart04>」"
translation = "「안앗<emoji=heart04> 안에서 자지, 피쿠피쿠하고 부풀어 오르는 거, 느껴져엇<emoji=heart04> 회장짱도<emoji=heart04> 갈 것 같구나아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「いっしょに、いっしょにイこっ<emoji=heart04>\u3000会長ちゃんと一緒がいいっ<emoji=heart04>\u3000あっ、あっ、あっ、ふああぁっ<emoji=heart04>\u3000……あんっ、んああぁぁっ<emoji=heart04>」"
translation = "「같이, 같이 가자앗<emoji=heart04> 회장짱이랑 같이 가고 싶어엇<emoji=heart04> 앗, 앗, 앗, 후아아앗<emoji=heart04> ……안앗, 응아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「会長ちゃん<emoji=heart04>\u3000あ、ダメ<emoji=heart04>\u3000サランいく<emoji=heart04>\u3000……イっちゃう<emoji=heart04>」"
translation = "「회장짱<emoji=heart04> 아, 안 돼<emoji=heart04> 사란 가아<emoji=heart04> ……가버려엇<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「あっあっあっあっあっ<emoji=heart04>\u3000イク……イクイクイクイクイクッ<emoji=heart04><emoji=heart04>\u3000あああぁぁぁぁぁぁっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗앗앗앗앗<emoji=heart04> 가…… 가가가가각<emoji=heart04><emoji=heart04> 아아아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「っ……イックぅぅぅーーーーーーっ<emoji=heart04><emoji=heart04>\u3000ふあぁあああぁぁぁぁぁぁぁぁぁ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「윽…… 가아아아아아앗――――――<emoji=heart04><emoji=heart04> 후아아아아아아아아아아아아아아아아~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「あっ<emoji=heart04>\u3000ふぁぁぁっ<emoji=heart04>\u3000はぁぁ……<emoji=heart04>\u3000会長ちゃんのせーし、しきゅーに入ってくるぅ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000びゅーって、いっぱいぃ<emoji=heart04>\u3000あぁぁっ……ふああぁっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 후아아아앗<emoji=heart04> 하아아……<emoji=heart04> 회장짱의 정액, 자궁으로 들어와아<emoji=heart04> 하아앗<emoji=heart04> 뷰우~ 하고, 가아득<emoji=heart04> 아아앗…… 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「おち○ちんとしきゅーがくっついて……っ<emoji=heart04>\u3000ちゅーちゅー吸ってるの<emoji=heart04>」"
translation = "「자지랑 자궁이 딱 붙어서……엇<emoji=heart04> 츄우츄우 빨아들이고 있어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「えへへへ……っ<emoji=heart04>\u3000なんだかキス、してる……っ<emoji=heart04>\u3000みたいだね……<emoji=heart04>\u3000はふぅぅ<emoji=heart04>」"
translation = "「에헤헤헤……엇<emoji=heart04> 왠지 키스, 하고 있는……엇<emoji=heart04> 것 같네……<emoji=heart04> 하후우우<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「会長ちゃんのおち○ちんと、サランのおま○こっ<emoji=heart04>\u3000チューって……えへへ<emoji=heart04>\u3000これ……すっごく幸せぇ<emoji=heart04>」"
translation = "「회장짱의 자지랑, 사란의 보지이<emoji=heart04> 츄우~ 하고…… 에헤헤<emoji=heart04> 이거…… 엄청 행복해애<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「はあぁ……<emoji=heart04>\u3000会長ちゃんに愛されてるんだ～って、実感するぅ……<emoji=heart04>\u3000んんっ……<emoji=heart04>\u3000サランずっと、こうされていたい……かも<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 회장짱한테 사랑받고 있구나~ 하고, 실감 나아……<emoji=heart04> 으응……<emoji=heart04> 사란 계속, 이러고 있고 싶을……지도<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「これからもこんな毎日が送れちゃうなんて……っ<emoji=heart04>\u3000サラン、凄くふわふわで、幸せぇ……<emoji=heart04>」"
translation = "「앞으로도 이런 매일을 보낼 수 있다니……엇<emoji=heart04> 사란, 너무 폭신폭신하고, 행복해애……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「会長ちゃんも……そう思う？<emoji=heart04>\u3000そっかぁ<emoji=heart04>\u3000だってこんなにいっぱい、精子出してくれてるんだもんね……<emoji=heart04>」"
translation = "「회장짱도…… 그렇게 생각해? <emoji=heart04> 그렇구나아<emoji=heart04> 그치만 이렇게나 잔뜩, 정액 내줬는걸 말야……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「あんっ<emoji=heart04>\u3000会長ちゃんのおち○ちん……まだ大きいままだね？」"
translation = "「안앗<emoji=heart04> 회장짱의 자지…… 아직 큰 채로네?」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「えへへ……<emoji=heart04>\u3000もう１回……おかわりしちゃう？」"
translation = "「에헤헤……<emoji=heart04> 한 번 더…… 한 그릇 더 해버릴까?」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「サランは……大歓迎、だよ<emoji=heart04>\u3000あ……っ<emoji=heart04>」"
translation = "「사란은…… 대환영, 이야<emoji=heart04> 아……앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "極上の据え膳を前にして、断れるはずもなく。その後、俺は何度もサランの体をおかわりしてしまうのだった――"
translation = "극상의 진수성찬을 앞에 두고, 거절할 수 있을 리도 없었다. 그 후, 나는 몇 번이고 사란의 몸을 더 먹어버리고 마는 것이었다――"

