[[dialogue]]
speaker = "unk"
original = "第１話,ジュリエッテの自爆,P"
translation = "제1화, 줄리엣테의 자폭, P"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「あらあら魔王様じゃございませんか。こんなところで奇遇でございますわね」"
translation = "「어머어머 마왕님이 아니십니까. 이런 곳에서 우연이옵니다요」"

[[dialogue]]
speaker = "unk"
original = "コラプサーがどうしてここに？"
translation = "코랩서가 왜 여기에?"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「ふふ、そう警戒しなくても大丈夫でございますよ。わたくしに敵意はございませんから」"
translation = "「후후, 그렇게 경계하지 않으셔도 괜찮사옵니다. 와타쿠시에게 적의는 없사옵니다」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「警戒するのも無理はありませんが……ご安心くださいませ。このわたくし、ジュリエッテ・ハルヴィーノは魔王様に危害を加えませんわ」"
translation = "「경계하시는 것도 무리는 아니옵니다만…… 안심하시옵소서. 이 와타쿠시, 줄리엣테 하르비노는 마왕님께 해를 가하지 않을 것이옵니다」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "（そう、魔王様にはわたくしの野望……三界を支配するための駒になっていただかなければいけませんからね♪）"
translation = "（그렇사옵니다, 마왕님께는 와타쿠시의 야망…… 삼계를 지배하기 위한 말이 되어 주셔야 하옵니다요♪）"

[[dialogue]]
speaker = "ジュリエッテ"
original = "（野望のためならば今は魔王だろうが、コラプサーだろうが、いくらでも媚を売ってあげますでございますの♪）"
translation = "（야망을 위해서라면 지금은 마왕이든, 코랩서든, 얼마든지 아양을 떨어 드릴 것이옵니다요♪）"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「フフフ、我ながら完ッ璧な作戦でございますわ～！」"
translation = "「후후후, 스스로 생각해도 완벽한 작전이옵니다아~!」"

[[dialogue]]
speaker = "unk"
original = "何か企んでるの？"
translation = "무언가 꾸미고 있는 거야?"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「ギクッ！？\u3000な、何も企んでなどございませんわよ……おほほほほ」"
translation = "「움찔!? 아, 아무것도 꾸미고 있지 않사옵니다요…… 오호호호호」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「そ、それよりも魔王様っ、今日はどのようなご予定で？\u3000もしよろしければ、わたくしがお供──」"
translation = "「그, 그것보다 마왕님, 오늘은 어떤 예정이시옵니까? 혹시 괜찮으시다면, 와타쿠시가 수행을──」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「あら、会長さんと……ジュリエッテ様？」"
translation = "「어머, 회장님과…… 줄리엣테님?」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「げっ！？\u3000シャルレーヌ様！？」"
translation = "「겍!? 샤를렌님!?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「人の顔を見てその反応は失礼ではありませんか？\u3000ジュリエッテ様」"
translation = "「사람 얼굴을 보고 그 반응은 실례가 아닙니까? 줄리엣테님」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「でもまあ？\u3000あのハルヴィーノ家の落ちこぼれに礼儀を求めるなんて～無理な話かもしれませんけどぉ♪」"
translation = "「하지만 뭐어? 그 하르비노 가문의 낙오자에게 예의를 바라는 건~ 무리한 이야기일지도 모르겠네요오♪」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「な、ななななな！？\u3000このメスガ──コホン！\u3000……シャルレーヌ様こそ少々礼儀に欠けているのではございませんか？」"
translation = "「나, 나나나나나!? 이 암컷──커험! ……샤를렌님이야말로 조금 예의에 어긋나는 것이 아니옵니까?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「だってジュリエッテ様はハルヴィーノの家をお捨てになったのでしょう？\u3000家を捨てた貴族など平民以下じゃないですか～？」"
translation = "「왜냐하면 줄리엣테님은 하르비노 가문을 버리셨잖아요? 가문을 버린 귀족은 평민 이하가 아닙니까아~?」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「ぎぃぃぃぃ～～～っ！\u3000本っ当に腹が立つでございますわ～！！」"
translation = "「끼이이이이~~~~~윽! 정~말이지 화가 나는 것이옵니다아~!!」"

[[dialogue]]
speaker = "unk"
original = "なんだか因縁が深そうだね"
translation = "왠지 악연이 깊어 보이네"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「ただの顔見知りでございますわ！」"
translation = "「그저 아는 얼굴일 뿐이옵니다요!」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「一応ハルヴィーノ家も、魔界のシャリオン十貴族の１つですからね～♪」"
translation = "「일단 하르비노 가문도, 마계의 샤리온 십귀족 중 하나이기는 하니까요오~♪」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「ただハルヴィーノ家は斜陽気味で、シャリオンでも微妙な立ち位置なんです。そんなハルヴィーノ家の中でも、ジュリエッテ様は特に……」"
translation = "「다만 하르비노 가문은 사양세라서, 샤리온에서도 미묘한 위치이옵니다. 그런 하르비노 가문 중에서도, 줄리엣테님은 특히……」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「失踪されたとお聞きして心配しておりましたが……まさかコラプサーになっているなんて思いませんでした。くふ♪\u3000墜ちるとこまで堕ちましたね～♪」"
translation = "「실종되셨다고 들어서 걱정했습니다만…… 설마 코랩서가 되어 있을 줄은 몰랐습니다. 크후♪ 떨어질 데까지 떨어지셨네요오~♪」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「ふんっ、シャルレーヌ様には一生分からないでございましょうよ」"
translation = "「흥, 샤를렌님께는 평생 이해할 수 없을 것이옵니다요」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "（わたくしと違い、星力にも立場にも恵まれたシャルレーヌ様には、わたくしの気持ちなど……）"
translation = "（와타쿠시와 달리, 성력에도 입장에도 혜택받은 샤를렌님께는, 와타쿠시의 마음 따위……）"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「会長さんは敵であるコラプサーなんかと一緒にいないで、私と一緒にお出かけしましょう？」"
translation = "「회장님은 적인 코랩서 따위와 같이 있지 마시고, 저와 함께 외출하시죠?」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「そ、そうはさせませんでございますわ！\u3000魔王様はわたくしと一緒にいますの！」"
translation = "「그, 그렇게는 못 하옵니다요! 마왕님은 와타쿠시와 함께 계십니다요!」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「むっ……私の会長さんを奪わないでくれます～？」"
translation = "「음…… 제 회장님을 빼앗지 말아 주시겠어요오~?」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「別に魔王様はシャルレーヌ様のものではないでございます」"
translation = "「별로 마왕님은 샤를렌님의 것이 아니옵니다」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「これから私のものになるんですけど～？」"
translation = "「앞으로 저의 것이 될 건데요오~?」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「そ、そうはさせませんわ！\u3000魔王様はわたくしのものにしますの！」"
translation = "「그, 그렇게는 못 하옵니다! 마왕님은 와타쿠시의 것으로 만들 것이옵니다!」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「え～？\u3000敵であるコラプサーが会長さんに近づこうとしてるのって、す～っごく怪しいんですけどー」"
translation = "「에~? 적인 코랩서가 회장님께 다가가려고 하는 거, 너~무 수상한데요오~」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「それは……！\u3000その、企業秘密でございますわ！」"
translation = "「그것은……! 그, 기업 비밀이옵니다요!」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「企業秘密……やっぱり怪しいですね。ねえ会長さん、やっぱり私と行きましょう？\u3000コラプサーなんて相手にする必要あります？」"
translation = "「기업 비밀…… 역시 수상하네요. 저기 회장님, 역시 저와 같이 가시죠? 코랩서 따위를 상대할 필요가 있습니까?」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「待ってくださいませっ！\u3000魔王様、わたくしと一緒にいてくださいませ！」"
translation = "「기다려 주시옵소서! 마왕님, 와타쿠시와 함께 있어 주시옵소서!」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「ちょっと必死になりすぎじゃないですか～？\u3000ちゃんと理由を説明してくれないと、会長さんを渡せませんよ～」"
translation = "「좀 너무 필사적이신 거 아닙니까아~? 제대로 이유를 설명해 주지 않으면, 회장님을 넘겨줄 수 없어요오~」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「分かりましたわ……！\u3000なら教えてあげますわ……！」"
translation = "「알겠사옵니다……! 그럼 알려 드리겠사옵니다……!」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「わ、わたくし……わたくしは……魔王様に一目惚れしたんでございますの～！！」"
translation = "「와, 와타쿠시…… 와타쿠시는…… 마왕님께 첫눈에 반한 것이옵니다아~!!」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「……………………」"
translation = "「……………………」"

[[dialogue]]
speaker = "unk"
original = "ええええええええええ！？"
translation = "에에에에에에에에에에!?"

[[dialogue]]
speaker = "ジュリエッテ"
original = "（……ど、どちゃくそデカい嘘をついてしまいましたわ～～！！）"
translation = "（……엄, 엄청나게 큰 거짓말을 해 버렸사옵니다아~~!!）"

[[dialogue]]
speaker = "ジュリエッテ"
original = "（で、ですが、あのシャルレーヌ様も呆気に取られてますし、ギリギリセーフでございますわ！）"
translation = "（하, 하지만, 저 샤를렌님도 어이없어 하고 계시니, 간신히 세이프이옵니다요!）"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「わたくし、魔王様のことを心からお慕い申してございますの！\u3000なので、シャルレーヌ様には渡せませんの！」"
translation = "「와타쿠시, 마왕님을 진심으로 사모하고 있사옵니다! 그러니, 샤를렌님께는 넘겨줄 수 없사옵니다!」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「……くふ♪」"
translation = "「……크후♪」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「へぇ～、そうなんですか～。ジュリエッテ様って、会長さんのことお好きだったんですね～」"
translation = "「헤에~, 그렇습니까아~. 줄리엣테님, 회장님을 좋아하셨군요오~」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「そ、そうでございますわ……！\u3000わたくし、魔王様にメロメロでございますの！」"
translation = "「그, 그렇사옵니다요……! 와타쿠시, 마왕님께 홀딱 반했사옵니다!」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「じゃあ、今日のところはジュリエッテ様に会長さんを譲って差し上げましょう♪」"
translation = "「그럼, 오늘은 줄리엣테님께 회장님을 양보해 드리겠습니다아♪」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「<b>２人きり</b>で～……楽しんでくださいね<emoji=heart04>\u3000くふふふ<emoji=heart04>」"
translation = "「<b>둘이서</b>~…… 즐기시옵소서<emoji=heart04> 크후후후<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "（は、ハメられましたわー！！）"
translation = "（당, 당했습니다아ー!!）"

[[dialogue]]
speaker = "ジュリエッテ"
original = "（シャルレーヌ様、わたくしの嘘を見抜いた上で引き下がりやがったのですわ～！）"
translation = "（샤를렌님, 와타쿠시의 거짓말을 간파한 채 물러나신 것이옵니다아~！）"

[[dialogue]]
speaker = "unk"
original = "ええと……"
translation = "음……"

[[dialogue]]
speaker = "ジュリエッテ"
original = "（気まずいですわ！\u3000逃げ出したいですわ！\u3000絶体絶命でございますわ！）"
translation = "（어색하옵니다! 도망치고 싶사옵니다! 절체절명이옵니다!）"

[[dialogue]]
speaker = "ジュリエッテ"
original = "（で、ですが……野望のためにも、ここで退くわけにはいきませんわ！\u3000女は度胸！\u3000最後まで嘘を貫き通してやるでございますわ！！）"
translation = "（하, 하지만…… 야망을 위해서라도, 여기서 물러설 수는 없사옵니다! 여자는 배짱! 끝까지 거짓말을 관철해 보일 것이옵니다!!）"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「ま、魔王様……！\u3000わたくし、本気でございますから……！\u3000本気で魔王様のことを好いてございます！」"
translation = "「마, 마왕님……! 와타쿠시, 진심이옵니다만……! 진심으로 마왕님을 좋아하고 있사옵니다!」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「ですから覚悟してくださいませ！\u3000ぜーったいに、魔王様をわたくしのものにしてやるでございますから！」"
translation = "「그러니 각오하시옵소서! 절~대로, 마왕님을 와타쿠시의 것으로 만들 것이옵니다!」"

