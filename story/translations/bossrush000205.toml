[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「──とまぁ、ここまでがリクリエの使徒・ジグとの戦いの顛末だ」"
translation = "「──뭐, 여기까지가 리크리에의 사도 지그와의 싸움의 전말이다.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「やぁ、少しいいかい？」"
translation = "「여어, 잠시 실례해도 될까?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ジグ？\u3000どうしてここに？」"
translation = "「지그? 어째서 여기에?」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「アガサがこっちにいるって聞いてね。魔王にも言いたいことがあったし」"
translation = "「아가사가 이쪽에 있다고 들어서 말이야. 마왕에게도 하고 싶은 말이 있었고.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「リクリエの使徒として迷惑をかけてすまなかった。本当に申し訳ないことをした」"
translation = "「리크리에의 사도로서 폐를 끼쳐서 미안했어. 정말 면목 없는 짓을 저질렀군.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「そしてありがとう。私が今ここにいるのはみんなのおかげだよ」"
translation = "「그리고 고마워. 내가 지금 여기 있는 건 모두 덕분이야.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ジグ……」"
translation = "「지그……」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「それと魔王にひとつ頼みがあってね」"
translation = "「그리고 마왕에게 부탁이 하나 있는데 말이야.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「長い間リクリエの使徒になっていたせいか、星術の扱いがしっくりこなくてね。ちょっと肩ならしに付き合ってもらいたいんだ」"
translation = "「오랫동안 리크리에의 사도로 있었던 탓인지, 성술을 다루는 게 영 어색해서 말이야. 가볍게 몸 좀 푸는 데 어울려줬으면 좋겠어.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そういうことなら星徒会に任せなさい！\u3000星徒会<ruby>ＶＳ<rt>バーサス</rt></ruby>選挙管理委員会のガチンコバトル、受けて立つわ！」"
translation = "「그런 거라면 성도회에 맡겨줘! 성도회 <ruby>VS<rt>버서스</rt></ruby> 선거관리위원회의 진검승부, 받아주겠어!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ええっ、今そういう流れだった！？\u3000肩ならしって話じゃあ……」"
translation = "「에엣, 지금 그런 흐름이었어!? 몸풀기라는 이야기였는데……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「こうなった前会長は止められませんね」"
translation = "「이렇게 된 전 회장님은 멈출 수 없겠네요.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「うふふ～、ヴィーナスちゃんは相変わらずね～」"
translation = "「우후후~, 비너스 짱은 여전하네~」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「なになに～？\u3000梨緒とジグがいるって聞いたから来てみたんだけど、なんか盛り上がってる感じ？」"
translation = "「뭐야 뭐야~? 리오랑 지그가 있다고 해서 와봤는데, 왠지 달아오른 분위기네?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「よーし、クイズ大会のリベンジだ！」"
translation = "「좋아, 퀴즈 대회의 리벤지다!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ふぇええ～っ、心の準備が～っ」"
translation = "「후에에에~, 마음의 준비가~」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「どうやらジグの意図に誤解があるようだが──」"
translation = "「아무래도 지그의 의도에 오해가 있는 모양이다만──」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「まぁいい、勝負なら受けて立つ！」"
translation = "「뭐 좋다, 승부라면 받아주마!」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「おやおや、騒がしくなってきたね」"
translation = "「오야오야, 시끌벅적해졌네.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「思っていたのと違うけど、せっかくの機会だ。遠慮なくぶつかり合おうじゃないか」"
translation = "「생각했던 거랑은 다르지만, 모처럼의 기회다. 사양 말고 부딪쳐 보자고.」"

