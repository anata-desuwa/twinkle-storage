[[dialogue]]
speaker = "unk"
original = "ヴィーナスに正式にプロポーズをした翌日──"
translation = "비너스에게 정식으로 프로포즈를 한 다음 날──"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふふっ。今日もリゾート結界で、思いっきりイチャイチャするわよ♪」"
translation = "「후훗. 오늘도 리조트 결계에서, 마음껏 꽁냥거릴 거야♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それで──あ！\u3000あれがリップルの言ってた水上コテージね！」"
translation = "「그래서──아! 저게 리플이 말했던 수상 코테지구나!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「すごい！\u3000本当に水の上にコテージが建っているわ。なんだか南の国に旅行しに来た、セレブの気分って感じね！」"
translation = "「대단해! 정말 물 위에 코테지가 세워져 있어. 왠지 남쪽 나라에 여행 온 셀럽 기분인걸!」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは正真正銘、九浄家という超がつくセレブの娘なのだが、その自覚がないところも彼女らしい。"
translation = "비너스는 명실상부, 쿠죠 가문이라는 초셀럽의 딸이지만, 그 자각이 없는 점도 그녀답다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「こんなに素敵なロケーションのプライベートビーチ……何だか新婚旅行に来てるみたい♪」"
translation = "「이렇게 멋진 로케이션의 프라이빗 비치…… 왠지 신혼여행을 온 것 같아♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……あなたも同じ気持ち？\u3000ふっふーん♪\u3000やっぱり私たち、相性ピッタリみたいね！」"
translation = "「……당신도 같은 기분? 훗후~운♪ 역시 우리들, 궁합이 딱 맞는 모양이네!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「よーし、それじゃあせっかくだし……新婚旅行の予行演習、してみましょうか！」"
translation = "「조아~, 그럼 모처럼이니까…… 신혼여행 예행연습, 해볼까!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「──え？\u3000まず何をして遊ぶのか……ですって？\u3000もー、魔王ともあろう者が、新婚旅行のこと、何にも分かってないみたいね！」"
translation = "「──에? 우선 뭘 하고 노느냐니…… 정말, 마왕이라는 사람이 신혼여행에 대해 아무것도 모르는 모양이네!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「教えてあげるわ。新婚旅行っていうのはね──」"
translation = "「알려줄게. 신혼여행이라는 건 말이지──」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「──ハネムーンベイビーを授かるためにするものなのよ！！」"
translation = "「──허니문 베이비를 가지기 위해 하는 거라고!!」"

[[dialogue]]
speaker = "unk"
original = "水上コテージに入るなり、たくさんキスをして、お互いの性器を触りあったり、水着を脱がせあったりしながらベッドへ倒れこんだ俺たち。"
translation = "수상 코테지에 들어가자마자, 잔뜩 키스를 하고, 서로의 성기를 만지거나 수영복을 벗겨주면서 침대로 쓰러진 우리들."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふふ～<emoji=heart04>\u3000あなたのおち○ちん、もう大きくなっちゃってる……<emoji=heart04>」"
translation = "「후후~<emoji=heart04> 당신의 자지, 벌써 커져 버렸어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスが、キスをしながらたくさん<ruby>擦<rt>さす</rt></ruby>ってくれたおかげで、すでに準備は万全。"
translation = "비너스가 키스를 하며 잔뜩 문질러준 덕분에, 이미 준비는 만전."

[[dialogue]]
speaker = "unk"
original = "女性器のすぐ近くにあるペニスを撫でながら、ヴィーナスは幸せそうに笑って……"
translation = "여성기 바로 근처에 있는 페니스를 어루만지며, 비너스는 행복한 듯 웃고는……"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ねぇ。今日もいつもみたいに、たっくさん私を愛してね？\u3000『パ～パ<emoji=heart04>』」"
translation = "「있지. 오늘도 평소처럼, 잔~뜩 나를 사랑해 줘? 『아~빠<emoji=heart04>』」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……またそういうことを言うんだから」"
translation = "「……또 그런 말을 하다니」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「いいじゃない。本当のことなんだし♪」"
translation = "「좋잖아. 사실인걸♪」"

[[dialogue]]
speaker = "unk"
original = "リクリエを退ける戦いの日々を経てわかった、俺と彼女の関係性。"
translation = "리크리에를 물리치는 싸움의 나날을 거치며 알게 된, 나와 그녀의 관계성."

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは並行世界の俺の娘だった。"
translation = "비너스는 평행 세계의 내 딸이었다."

[[dialogue]]
speaker = "unk"
original = "衝撃の事実ではあったけれど、だからといってすでに恋仲だった俺たちの関係は変わったりしなかった。むしろ──"
translation = "충격적인 사실이었지만, 그렇다고 해서 이미 연인 사이였던 우리들의 관계가 변하지는 않았다. 오히려──"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それにパパって呼ぶと、あなたのおち○ちん、すっごく反応してくれるじゃない？」"
translation = "「게다가 아빠라고 부르면, 당신의 자지, 엄청 반응해 주잖아?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「だから今日もたくさん呼んであげるわよ？\u3000嬉しいでしょ、パパ<emoji=heart04>」"
translation = "「그러니까 오늘도 잔뜩 불러줄게? 기쁘지, 아빠<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは最近、エッチしている時の背徳感のスパイスとして『パパ』の呼称を使うようになってしまった。"
translation = "비너스는 최근, 섹스할 때 배덕감이라는 조미료로서 『아빠』라는 호칭을 사용하게 되어버렸다."

[[dialogue]]
speaker = "unk"
original = "でも、このくらいの緩さがちょうどいいのかもしれない。俺たちはたくさんの奇蹟の果てに出会った。そして、親子だと分かる前に契っていたんだ。"
translation = "하지만 이 정도의 느긋함이 딱 좋을지도 모른다. 우리들은 수많은 기적 끝에 만났다. 그리고 부녀라는 걸 알기 전에 맺어졌다."

[[dialogue]]
speaker = "unk"
original = "真相がわかりました、だからもう抱くのは無理です──だなんて。できるわけがない。俺はヴィーナスを愛している。１人の女性として。"
translation = "진상을 알았으니 이제 안는 건 무리다──라니. 그럴 수 있을 리가 없다. 나는 비너스를 사랑한다. 한 명의 여성으로서."

[[dialogue]]
speaker = "unk"
original = "だから俺もヴィーナスの誘いに乗って──"
translation = "그래서 나도 비너스의 유혹에 넘어가──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あんまりお父さんをからかうと、本当に妊娠させるぞ？」"
translation = "「너무 아빠를 놀리면, 정말로 임신시킨다?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「────うんっ<emoji=heart04>」"
translation = "「────응<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "とびきり嬉しそうに笑うヴィーナスに応えて、俺はペニスを彼女の秘部へあてがって──"
translation = "유난히 기쁜 듯 웃는 비너스에게 화답하며, 나는 페니스를 그녀의 비부에 갖다 대고──"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「んんんぁあっ……はあ、あぁ、ぁああっ──あぁあぁああっ<emoji=heart04>」"
translation = "「응으으아앗…… 하아, 아아, 아아앗── 아아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「これ、好きぃ……<emoji=heart04>\u3000おっきいおち○ちん、おま○この奥まで、ずぶ～って入ってきてくれるの……大好きぃ……<emoji=heart04>」"
translation = "「이거, 좋아아……<emoji=heart04> 커다란 자지, 보지 안쪽까지 즈부우~ 하고 들어와 줘서…… 너무 좋아아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "コテージに入ってから、少しキスをしただけだというのに。ヴィーナスの女性器はすでにとろとろに濡れていた。"
translation = "코테지에 들어온 뒤로 겨우 키스를 조금 했을 뿐인데도. 비너스의 여성기는 이미 걸쭉하게 젖어 있었다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「しょうがないでしょう……？\u3000だってこれ、ハネムーンエッチの予行演習なんだもの……いつもより濡れちゃうのも当たり前よ……<emoji=heart04>」"
translation = "「어쩔 수 없잖아……? 그야 이건, 허니문 섹스의 예행연습인걸…… 평소보다 젖는 것도 당연해……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それに……パパのおち○ちん、いつも私を気持ちよくしてくれるから……ジョーケー反射？\u3000ってやつかしら<emoji=heart04>」"
translation = "「게다가…… 아빠의 자지, 언제나 나를 기분 좋게 해주니까…… 조건반사? 라는 걸까<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "相変わらず間違った言葉遣い。何から何までこの子が愛おしくて、もう止まれなかった。"
translation = "여전히 틀린 말투. 하나부터 열까지 이 아이가 사랑스러워서, 이제 멈출 수 없었다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「んんぁああっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000あ、ぁあっ<emoji=heart04>\u3000んんぅ、んんっ<emoji=heart04>\u3000ふうぅ、ぁ、あぁ、あぁっ──<emoji=heart04>」"
translation = "「응으아아앗<emoji=heart04> 하앗<emoji=heart04> 아, 아앗<emoji=heart04> 응으, 응<emoji=heart04> 후우우, 아, 아아, 아아앗──<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「おち○ちん、いっぱいずぷずぷって、出たり、入ったりっ……んん！\u3000ふぅっ……はぁ、ぁ、んんっ、あ、あぁあっ<emoji=heart04>」"
translation = "「자지, 잔뜩 즈부즈부하고, 나갔다, 들어왔다…… 응! 후우…… 하아, 아, 응, 아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふぅっ<emoji=heart04>\u3000ふぅうっ<emoji=heart04>\u3000んんん<emoji=heart04>\u3000何だか、いつもより、硬い、かもぉっ<emoji=heart04>\u3000あ、ああ、ぅぅんっ<emoji=heart04>」"
translation = "「후우<emoji=heart04> 후우우<emoji=heart04> 응으으<emoji=heart04> 왠지, 평소보다, 딱딱한, 것 같아아<emoji=heart04> 아, 아아, 으응<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "露出多めのヴィーナスの水着を前にして、興奮しない男なんていない。"
translation = "노출이 많은 비너스의 수영복을 앞에 두고 흥분하지 않을 남자는 없다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「んんっ<emoji=heart04>\u3000水着……？\u3000あは、私の水着、可愛いからっ……おち○ちん、興奮、してくれたの？\u3000ん、んんっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 수영복……? 아하, 내 수영복, 귀여우니까…… 자지, 흥분, 해준 거야? 응, 응<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ありが、とぉっ……<emoji=heart04>\u3000とっても、嬉しいわ<emoji=heart04>\u3000はぁ、んぅ、んぁあっ<emoji=heart04>」"
translation = "「고마워어……<emoji=heart04> 정말로, 기뻐<emoji=heart04> 하아, 응, 응아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「水着っ……あなたに喜んでもらえるのは、どういうのかなって──ぁっ<emoji=heart04>\u3000思いながら、作った、からぁっ……<emoji=heart04>」"
translation = "「수영복…… 당신이 기뻐해 줄 만한 게 어떤 걸까 하고──아앗<emoji=heart04> 생각하면서, 만들었, 으니까아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「たくさん見て、たっくさん、興奮してっ……<emoji=heart04>\u3000あ、はあ、ぅう、んんぅっ、ふぅっ<emoji=heart04>」"
translation = "「잔뜩 보고, 잔~뜩, 흥분해 줘……<emoji=heart04> 아, 하아, 으우, 응으, 후우<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふふ～……<emoji=heart04>\u3000あなたがリクエスト、してくれるなら<emoji=heart04>\u3000はぁ、んんっ<emoji=heart04>\u3000水着、いつでも、んぁっ<emoji=heart04>\u3000着てあげるっ──あ、奥っ……そこ好きぃっ<emoji=heart04>」"
translation = "「후후~……<emoji=heart04> 당신이 리퀘스트, 해준다면<emoji=heart04> 하아, 응<emoji=heart04> 수영복, 언제든, 응아앗<emoji=heart04> 입어줄게── 아, 안쪽…… 거기 좋아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「気持ちいいっ……んん<emoji=heart04>\u3000おち○ちん、気持ちいいのっ……はぁ、あぁ、んんぅ、ふぅう、ぁ、あああっ<emoji=heart04>」"
translation = "「기분 좋아…… 응<emoji=heart04> 자지, 기분 좋아아…… 하아, 아아, 응으, 후우우, 아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスを背中から優しく、包むようにして抱きしめながらのピストン。"
translation = "비너스를 뒤에서 부드럽게 감싸 안으며 피스톤질을 한다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「この体勢……なんだかすっごく、ドキドキするわ……<emoji=heart04>\u3000んんっ、ふぅっ<emoji=heart04>\u3000はぁ、んんっ<emoji=heart04>」"
translation = "「이 체위…… 왠지 엄청나게 두근거려……<emoji=heart04> 응, 후우<emoji=heart04> 하아, 응<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「背中いっぱいに、あなたを感じるから……嬉しい、のかしら？\u3000あっ、んん、ふぅ、んあぁ<emoji=heart04>」"
translation = "「등 전체로 당신이 느껴지니까…… 기쁜, 걸까? 앗, 응, 후우, 응아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「顔、見えないのに、ぁ、んんっ<emoji=heart04>\u3000とっても、とっても安心しちゃうの……<emoji=heart04>」"
translation = "「얼굴, 안 보이는데도, 아, 응<emoji=heart04> 정말로, 정말로 안심돼버려……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "学園の同級生で、親子で、恋人──ヴィーナスと繋がると、色々な縁が温もりとなって俺たちを包み込む。"
translation = "학원 동급생이자 부녀이자 연인── 비너스와 이어지면, 다양한 인연이 온기가 되어 우리를 감싼다."

[[dialogue]]
speaker = "unk"
original = "目の前にあるヴィーナスの真っ白な首筋が綺麗で、思わず甘噛みしてしまう。"
translation = "눈앞에 있는 비너스의 새하얀 목덜미가 아름다워, 나도 모르게 가볍게 깨문다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ひぅううっ──<emoji=heart04>\u3000あ、んんっ<emoji=heart04>\u3000も、もぉおっ……パパったら♪\u3000またキスマーク、付けちゃって……<emoji=heart04>」"
translation = "「히으으으읏──<emoji=heart04> 아, 응<emoji=heart04> 정, 정말이지…… 아빠도 참♪ 또 키스마크 남기고……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──いやだった？」"
translation = "「──싫었어?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ううん<emoji=heart04>\u3000あなたがしてくれることなら、私っ……何でも好きっ<emoji=heart04>\u3000……あ、んん、ふぅっ<emoji=heart04>」"
translation = "「으응<emoji=heart04> 당신이 해주는 거라면, 난…… 뭐든 좋아<emoji=heart04> ……아, 응, 후우<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「くすぐったいし、んん<emoji=heart04>\u3000学園で隠すのも大変なんだけどっ……あぅ、ふっ、んぅっ<emoji=heart04>」"
translation = "「간지럽고, 응<emoji=heart04> 학원에서 숨기는 것도 힘들지만…… 아우, 후, 응<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あなたのものに、されてる気がするから……んんっ<emoji=heart04>\u3000好きよっ……んん、ぁ、はぁああっ<emoji=heart04>」"
translation = "「당신의 것이 된 기분이 드니까…… 응<emoji=heart04> 좋아해…… 응, 아, 하아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「えへっ<emoji=heart04>\u3000……もっと、私のこと触って？\u3000もっと私のこと……パパのものにしてぇ<emoji=heart04>」"
translation = "「에헷<emoji=heart04> ……더, 나를 만져줘? 더 나를…… 아빠의 것으로 만들어줘어」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ほら、おっぱい……おっぱいも、いっぱい触って<emoji=heart04>\u3000モミモミしながら、おち○ちん、パンパンって──ぁああああっ<emoji=heart04>」"
translation = "「자, 가슴…… 가슴도 잔뜩 만져줘<emoji=heart04> 주물주물 하면서, 자지, 팡팡하고──아아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは俺が何をしても喜んでくれる。頭を撫でたり、ぎゅっと抱きしめたり、キスをしたり──本当に何でもだ。"
translation = "비너스는 내가 무엇을 해도 기뻐해 준다. 머리를 쓰다듬거나, 꽉 껴안거나, 키스를 하거나── 정말 무엇이든."

[[dialogue]]
speaker = "unk"
original = "欲望のままにおっぱいを揉みしだいたとしても──"
translation = "욕망대로 가슴을 주물러댔다고 해도──"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「んんんっ<emoji=heart04>\u3000あ、あぁっ<emoji=heart04>\u3000あぁああっ<emoji=heart04>\u3000好き<emoji=heart04>\u3000んんんっ<emoji=heart04>\u3000おっぱい、もっと握って<emoji=heart04>\u3000ぎゅーって、ぎゅーってして<emoji=heart04>」"
translation = "「응으으으응<emoji=heart04> 아, 아아앗<emoji=heart04> 아아아아앗<emoji=heart04> 좋아<emoji=heart04> 응으으으응<emoji=heart04> 가슴, 더 꽉 잡아줘<emoji=heart04> 꽉, 꽉 해줘<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「はぁ、んんっ<emoji=heart04>\u3000いっぱい触って、それでもっと、私のおっぱい、大きくしてぇっ……<emoji=heart04>」"
translation = "「하아, 응<emoji=heart04> 잔뜩 만지고, 그리고 더, 내 가슴, 크게 해줘어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「もう十分、大きいと思うけど……」"
translation = "「이미 충분히 크다고 생각하는데……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「んんっ、ダメ<emoji=heart04>\u3000だって、将来っ、んん<emoji=heart04>\u3000赤ちゃん、できた時に……おっぱい、たくさん、あげたい、からぁっ<emoji=heart04>」"
translation = "「응, 안 돼<emoji=heart04> 그야, 나중에, 응<emoji=heart04> 아기 생겼을 때…… 젖, 잔뜩, 주고 싶으니까아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「大きい方が、おっぱい、いっぱい出る……でしょ？\u3000えっ……ち、ちがうの？」"
translation = "「큰 쪽이 모유가 잔뜩 나오겠……지? 엣…… 아, 아니야?」"

[[dialogue]]
speaker = "unk"
original = "彼女の天然で、ちょっとおバカなところが、本当に愛おしい。"
translation = "그녀의 천연스럽고 조금 바보 같은 점이 정말 사랑스럽다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「違わないよ。いっぱいおっぱい出せるように、もっと大きくしてやるからな」"
translation = "「틀리지 않아. 모유 잔뜩 줄 수 있게, 더 크게 만들어줄 테니까」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「うんっ<emoji=heart04>\u3000してっ<emoji=heart04>\u3000えへへ～っ<emoji=heart04>\u3000……あ、あんんっ<emoji=heart04>\u3000あ、ふうっ<emoji=heart04>\u3000モミモミ、気持ちいいっ……んん、パパぁ、好きぃっ……<emoji=heart04>」"
translation = "「응<emoji=heart04> 해줘<emoji=heart04> 에헤헤~<emoji=heart04> ……아, 아응<emoji=heart04> 아, 후우<emoji=heart04> 주물주물, 기분 좋아…… 응, 아빠아, 좋아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「んんっ──おち○ちん、どんどん硬く、な、なってきてる、ぅっ……んぁああっ<emoji=heart04>」"
translation = "「응── 자지, 점점 딱딱해, 지, 지고 있어…… 응아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あ、あ、ぁ──<emoji=heart04>\u3000乳首、そんなつまんで、コリコリしたら、ぁ、んんっ……！<emoji=heart04>」"
translation = "「아, 아, 아──<emoji=heart04> 유두, 그렇게 꼬집어서 만지작거리면, 아, 응……!<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「赤ちゃんに、おっぱいあげてる時に、んんっ<emoji=heart04>\u3000か、感じちゃう、かもぉ<emoji=heart04>\u3000──ぁ、ぁあ、ぁ、あぁぁああっ<emoji=heart04>」"
translation = "「아기한테 젖 줄 때, 응<emoji=heart04> 느껴버릴지도 몰라아── 아, 아아, 아, 아아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "新婚旅行の予行演習なのに、さらにその先まで妄想を始めてしまったヴィーナス。本当に、俺との子供が欲しいんだなと、はっきり感じた。"
translation = "신혼여행 예행연습인데, 더 나중까지 망상을 시작해 버린 비너스. 정말로 나와의 아이를 원한다는 걸 명확히 느꼈다."

[[dialogue]]
speaker = "unk"
original = "その気持ちに俺も応えたい──この子を孕ませたいという気持ちが、どんどん高まっていく。"
translation = "그 마음에 나도 보답하고 싶다── 이 아이를 임신시키고 싶다는 기분이 점점 고조되어 간다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふうぅっ<emoji=heart04>\u3000あ、あ、あ──<emoji=heart04>\u3000おち○ちん、もっと、は、速くしたく……なってきちゃった……？」"
translation = "「후우우<emoji=heart04> 아, 아, 아──<emoji=heart04> 자지, 더, 빠, 빠르게 하고 싶어…… 졌어……?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「えへ……いっぱい、んんっ<emoji=heart04>\u3000パンパンされてきたから、わかるのっ……乱暴に、動きたがってるなー……って<emoji=heart04>」"
translation = "「에헤…… 잔뜩, 응<emoji=heart04> 팡팡 당했으니까 알 것 같아…… 난폭하게 움직이고 싶어 하는구나~ 하고<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「遠慮しないで？\u3000私の身体で、いっぱい興奮して……おち○ちん、気持ちよーく、シ、シコシコしちゃって……！\u3000パ、パパぁっ<emoji=heart04><emoji=heart04>」"
translation = "「사양하지 마? 내 몸으로 잔뜩 흥분해서…… 자지, 기분 좋~게 섹, 섹스해버려……! 아, 아빠아아<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "血管が焼ききれそうな興奮が湧き上がって、俺は腰の動きを速める──"
translation = "혈관이 타버릴 것 같은 흥분이 솟구쳐, 나는 허리 움직임을 빠르게 한다──"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「んんぁああ！\u3000あっあっあっ！\u3000んんぁあ！\u3000ふぅ、んんっ！\u3000強いの、き、きたっ<emoji=heart04>\u3000きちゃった、ぁああっ<emoji=heart04>」"
translation = "「응아아아! 앗앗앗! 응아아! 후우, 응! 강한 거, 와, 왔어<emoji=heart04> 와버렸다아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「後ろから、ぎゅうって抱きしめ、られながらぁ──ふぁああ！\u3000あぁあっ<emoji=heart04>\u3000ん、んんっ！\u3000んんんーっ……！」"
translation = "「뒤에서 꽉 껴안겨서── 파아아아! 아아앗<emoji=heart04> 응, 응! 응으으으윽……!」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスの細いウェストをホールドしながら、ちょっと乱暴かと思うくらいのピストンを続ける。"
translation = "비너스의 가느다란 허리를 고정한 채, 조금 난폭하다 싶을 정도의 피스톤질을 계속한다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あんっ<emoji=heart04>\u3000んん、んぁあ、はぁ、ううぅっ！\u3000おっぱい、すっごく、んあぁ<emoji=heart04>\u3000揺れ<emoji=heart04>\u3000揺れちゃって、るっ<emoji=heart04>」"
translation = "「안<emoji=heart04> 응, 응아아, 하아, 으으으윽! 가슴, 엄청나게, 응아아<emoji=heart04> 흔들려<emoji=heart04> 흔들리고 있어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「うん<emoji=heart04>\u3000私、優しいのより、こっちの方が、好きぃ<emoji=heart04>\u3000乱暴なえっち、好きなのっ、もっとパンパンして、あ、ぁぅっ<emoji=heart04>\u3000んぁああっ！」"
translation = "「응<emoji=heart04> 나, 부드러운 것보다 이쪽이 더 좋아아<emoji=heart04> 난폭한 섹스, 좋은걸, 더 팡팡해줘, 아, 아우<emoji=heart04> 응아아앗!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「おっぱい、ぎゅうって掴みながら、おま○こ、いっぱい突いて、突いてっ……<emoji=heart04>\u3000んぅ、ふぅう、んん、んぁ、あぁあっ<emoji=heart04>」"
translation = "「가슴 꽉 움켜쥐면서 보지 잔뜩 찔러줘, 찔러줘……<emoji=heart04> 응, 후우우, 응, 응아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ぴったり密着して、とろとろに濡れたヴィーナスの女性器を突き込む。"
translation = "딱 밀착해서 걸쭉하게 젖은 비너스의 여성기를 찔러넣는다."

[[dialogue]]
speaker = "unk"
original = "可愛い恋人のヴィーナス。彼女の望むものは何でも叶えてあげたい──そう伝えると。"
translation = "귀여운 연인 비너스. 그녀가 원하는 것은 무엇이든 들어주고 싶다── 그렇게 전하자."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「じゃ、じゃあね？\u3000キス……してぇ？<emoji=heart04>\u3000今日は、あんまりしてないものっ……私、パパといっぱい、キスしたい……っ<emoji=heart04>」"
translation = "「그, 그럼 있지? 키스…… 해줘어?<emoji=heart04> 오늘은 별로 안 했는걸…… 나, 아빠랑 잔뜩 키스하고 싶어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──っ！」"
translation = "「──윽!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「──ふむぅうっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ちゅるぅ、んちゅるう<emoji=heart04>\u3000キスしゅきぃ、んちゅっ、しゅきぃっ……ちゅるう、れろぉ<emoji=heart04>」"
translation = "「──후무우우읏<emoji=heart04><emoji=heart04><emoji=heart04> 츄루우, 응츄루우<emoji=heart04> 키스 조아아, 응츄, 조아아…… 츄루우, 레로오<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺に甘えたがっているみたいに、ヴィーナスの舌が伸びて、絡んでくる。"
translation = "나에게 어리광 부리고 싶은 것처럼, 비너스의 혀가 길게 뻗어 얽혀온다."

[[dialogue]]
speaker = "unk"
original = "激しいピストンをしながらの、激しいディープキス。"
translation = "격렬한 피스톤질을 동반한 격렬한 딥키스."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「んぅちゅるっ<emoji=heart04>\u3000んんりゅ<emoji=heart04>\u3000ちゅるう<emoji=heart04>\u3000んれぇっ<emoji=heart04>\u3000れろ、んれりゅ、れろれろっ<emoji=heart04>\u3000ちゅぱぁ<emoji=heart04>」"
translation = "「응으츄릅<emoji=heart04> 응으류<emoji=heart04> 츄루우<emoji=heart04> 응레에<emoji=heart04> 레로, 응레류, 레로레로<emoji=heart04> 츄파아<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「んれぇえっ<emoji=heart04>\u3000れろ、んちゅる、れるれる、ちゅぅ、ちゅるる<emoji=heart04>\u3000んぅ、ねぇ、おっぱいも、チューしながらっ、もっと触ってぇ……<emoji=heart04>」"
translation = "「응레에에<emoji=heart04> 레로, 응츄루, 레룰레룰, 츄우, 츄루루<emoji=heart04> 응, 있지, 가슴도 키스하면서 더 만져줘어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "深いキスをしながらヴィーナスのおっぱいを抱きかかえる。手のひらからこぼれそうな巨乳を揉みくちゃにしてやった。"
translation = "깊은 키스를 나누며 비너스의 가슴을 품에 안는다. 손바닥에서 넘칠 것 같은 거유를 마구 주물러 주었다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふぅうう<emoji=heart04>\u3000んんちゅ<emoji=heart04>\u3000気持ちいい……<emoji=heart04>\u3000ちゅぅう<emoji=heart04>\u3000んむちゅう<emoji=heart04>\u3000幸せぇっ……<emoji=heart04>\u3000ちゅう、んちゅる<emoji=heart04>\u3000んちゅぅる<emoji=heart04>」"
translation = "「후우우우<emoji=heart04> 응으츄<emoji=heart04> 기분 좋아……<emoji=heart04> 츄우우우<emoji=heart04> 응무츄우<emoji=heart04> 행복해……<emoji=heart04> 츄우, 응츄루<emoji=heart04> 응츄우루<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「パパ<emoji=heart04>\u3000いっぱい、んちゅる<emoji=heart04>\u3000せーえき、ちゅる<emoji=heart04>\u3000んちゅぱ<emoji=heart04>\u3000作ってぇ……ちゅる、んちゅぅ、れるれる、んちゅぅ～っ<emoji=heart04>」"
translation = "「아빠<emoji=heart04> 잔뜩, 응츄루, 정액, 츄루<emoji=heart04> 응츄파<emoji=heart04> 만들어줘어…… 츄루, 응츄우, 레룰레룰, 응츄우~<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「んちゅ、ちゅ、ちゅぅ<emoji=heart04>\u3000それで、奥にっ……んちゅ<emoji=heart04>\u3000びゅうぅぅぅって……してぇ<emoji=heart04>\u3000ちゅる、れるれる、れろぉっ──ぷあぁっ！」"
translation = "「응츄, 츄, 츄우<emoji=heart04> 그걸로, 안쪽에…… 응츄<emoji=heart04> 뷰우우우우 하고…… 해줘어<emoji=heart04> 츄루, 레룰레룰, 레로오── 푸아앗!」"

[[dialogue]]
speaker = "unk"
original = "そんな風に頼まれたら、拒むことなんてできない。いっそう強く、ペニスをヴィーナスへと叩き込む。"
translation = "그런 식으로 부탁받으면 거절할 수 없다. 한층 더 강하게 페니스를 비너스에게 쳐박는다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「んぁああっ！\u3000あぁああ、ぁ、あぁああっ！\u3000んんんぅ、ふぅう、ぁあ、あぁあ、ああっ！」"
translation = "「응아아앗! 아아아아, 아, 아아아앗! 응응응으, 후우우, 아아, 아아아, 아앗!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「おち○ちん、すごいっ、すごく強くなって、あ、あぁあ、んんんん！\u3000ふぅ、んぁ、あぁあ、あぁあああっ<emoji=heart04>」"
translation = "「자지, 대단해, 정말 강해져서, 아, 아아아, 응응응응! 후우, 응아, 아아아, 아아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「好きっ<emoji=heart04>\u3000あなたのことが好きっ<emoji=heart04>\u3000大好きなのぉっ<emoji=heart04>\u3000出して、私の中に精液、びゅうってしてぇっ！」"
translation = "「좋아<emoji=heart04> 당신이 좋아<emoji=heart04> 너무 좋아해애<emoji=heart04> 싸줘, 내 안에 정액, 뷰우우 하고 싸줘어!」"

[[dialogue]]
speaker = "unk"
original = "汗だくで抱き合いながら、お互い、ひたすらに好意を伝えあう。"
translation = "땀에 젖어 껴안은 채로, 서로 오로지 호의를 전한다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「うん<emoji=heart04>\u3000赤ちゃん欲しいのっ<emoji=heart04>\u3000大好きだから、妊娠したいっ<emoji=heart04>\u3000あ、ぅうっ<emoji=heart04>\u3000ふうぅっ……んぁ、ああ、ぁぁああっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 아기 갖고 싶어어<emoji=heart04> 너무 좋으니까 임신하고 싶어어<emoji=heart04> 아, 으으윽<emoji=heart04> 후우우우…… 응아, 아아, 아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「好き。好き、すき、しゅき、しゅきぃっ<emoji=heart04><emoji=heart04>\u3000──んん、ふぅう、んんんっ……あ、ぁあ、ぁ、あぁああっ！？」"
translation = "「좋아. 좋아, 좋아, 조아, 조아아<emoji=heart04><emoji=heart04> ──응, 후우우, 응응응…… 아, 아아, 아, 아아아앗!?」"

[[dialogue]]
speaker = "unk"
original = "ただでさえ狭いヴィーナスの膣内が、さらにきつくなっていく。"
translation = "안 그래도 좁은 비너스의 질 내부가 한층 더 조여온다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「く、くるぅっ<emoji=heart04>\u3000私<emoji=heart04>\u3000も、もぅっ、イっちゃ、イっちゃうっ。イっちゃうぅぅっ<emoji=heart04>」"
translation = "「오, 온다아<emoji=heart04> 나<emoji=heart04> 가, 가버려, 가버려어. 가버려어어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「はぁ、はぁ、はあっ、はぁああっ<emoji=heart04>\u3000あなたもイク？\u3000──うん、出して<emoji=heart04>\u3000出して出して出して出してっ！」"
translation = "「하아, 하아, 하앗, 하아아앗<emoji=heart04> 당신도 가? ──응, 싸줘<emoji=heart04> 싸줘 싸줘 싸줘 싸줘어!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「好き、大好きっ──だいだい、大しゅきぃぃっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000んんんぁああっ！\u3000あ、あぁああっ、イク、イクイクイクっ──イ──クぅうぅぅっ！」"
translation = "「좋아, 정말 좋아── 너어무, 너어무 조아아아아<emoji=heart04><emoji=heart04><emoji=heart04> 응으으아아앗! 아, 아아아앗, 간다, 가버려 가버려── 가── 버려어어어어!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「んんぁあぁぁああぁあああ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응아아아아아아아아아아아아아~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「出てるぅっ……！\u3000あああっ<emoji=heart04>\u3000精液、す、すごいっ、いっぱいぃっ……んんぁぁああぁっ……あ、ああ、ぁあああ～～～っ<emoji=heart04>」"
translation = "「나오고 있어……! 아아앗<emoji=heart04> 정액, 대, 대단해, 가득…… 응아아아아아아앗…… 아, 아아, 아아아아아~~~~앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "しっかりと繋がったまま、ヴィーナスの最奥でびゅくびゅくと精液を撃ち放つ。"
translation = "단단히 이어진 채로, 비너스의 가장 깊은 곳에 뷰릇뷰릇 정액을 쏟아낸다."

[[dialogue]]
speaker = "unk"
original = "腰が抜けそうなほどの快感が走り続け、最後の一滴までしっかりとペニスに力を込め、出し尽くし……"
translation = "허리가 빠질 것 같은 쾌감이 계속 달리고, 마지막 한 방울까지 확실히 페니스에 힘을 담아 다 쏟아내고……"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「んはぁっ、はぁああっ……はぁああー……<emoji=heart04>\u3000今日も、すごい射精、だったぁ……<emoji=heart04>」"
translation = "「응하아, 하아아앗…… 하아아아아……<emoji=heart04> 오늘도, 대단한 사정이었어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「うん。えっち、すっごく気持ちよかった……<emoji=heart04>\u3000あは……気持ちよすぎて、腰、抜けちゃった、かもぉ……<emoji=heart04>」"
translation = "「응. 섹스, 정말 기분 좋았어……<emoji=heart04> 아하…… 너무 기분 좋아서, 허리, 빠져버렸을지도오……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「──あなたも？\u3000……ふふ～<emoji=heart04>\u3000やっぱり私たちの相性、最高なのね……♪」"
translation = "「──당신도? ……후후~<emoji=heart04> 역시 우리들의 궁합, 최고구나……♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「はあぁあ……でも……ハネムーンえっちの練習、まだまだ終わりたくないし……一休みしたら、また違う体勢でしましょう？」"
translation = "「하아아아…… 하지만…… 허니문 섹스 연습, 아직 끝내고 싶지 않고…… 잠깐 쉬었다가, 다시 다른 체위로 할까?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「もちろん。何度でも大歓迎だよ」"
translation = "「물론이지. 몇 번이라도 대환영이야」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「えへへぇ<emoji=heart04>\u3000毎回、こんなにびゅーってしてたら……赤ちゃんができちゃう日も、そう遠くないわね<emoji=heart04>」"
translation = "「에헤헤에<emoji=heart04> 매번 이렇게 뷰우~ 하고 싸면…… 아기가 생기는 날도 그리 멀지 않겠네<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そうしたら、エッチ中のプレイだけじゃなく、ずーっと『パパ』って呼ぶことになっちゃうんじゃないかしら♪」"
translation = "「그렇게 되면, 섹스할 때 플레이뿐만 아니라, 계~속 『아빠』라고 부르게 되어버리는 거 아닐까♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふふっ<emoji=heart04>\u3000これからもよろしくね、パ～パっ<emoji=heart04>」"
translation = "「후훗<emoji=heart04> 앞으로도 잘 부탁해, 아~빠<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "嬉しそうにはにかむヴィーナス──愛しい娘で、恋人で、お嫁さんの女の子。"
translation = "기쁘게 수줍어하는 비너스── 사랑스러운 딸이자 연인이자 아내인 소녀."

[[dialogue]]
speaker = "unk"
original = "俺はずっとこの子と一緒にいることを、改めて心に誓うのだった──"
translation = "나는 계속 이 아이와 함께할 것을 다시 한번 마음속으로 맹세하는 것이었다──"

