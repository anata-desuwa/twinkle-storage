[[dialogue]]
speaker = "イレーナ"
original = "「は、早く開けなさいよ。約束通り来てあげたんだから」"
translation = "「어, 얼른 열어. 약속대로 와 줬으니까」"

[[dialogue]]
speaker = "イレーナ"
original = "「遅くなっちゃって悪かったわね。でもあんたも悪いのよ？\u3000聖女さま相手に『２人きりで聖夜を過ごしたい』なんて無茶言うもんだから」"
translation = "「늦어버려서 미안하게 됐네. 하지만 안타도 잘못한 거라고? 성녀님을 상대로 『둘이서만 성야를 보내고 싶다』느니 무리한 소리를 하니까」"

[[dialogue]]
speaker = "イレーナ"
original = "「抜け出してくるの、すごく大変だったんだからね。あんたの気持ちは、その、嬉しかったし……あたしもあんたと２人きりで……」"
translation = "「빠져나오는 거, 정말 힘들었단 말이야. 안타의 마음은, 그, 기뻤고…… 나도 안타와 둘이서……」"

[[dialogue]]
speaker = "イレーナ"
original = "「あたしだって、い、一応女の子だし？\u3000恋人と過ごすクリスマスに憧れがないと言えばウソになるし……」"
translation = "「나도, 이, 일단은 여자애고? 연인과 보내는 크리스마스에 동경이 없다고 하면 거짓말이기도 하고……」"

[[dialogue]]
speaker = "イレーナ"
original = "「ちょっと、聞いてる？\u3000とにかくここ開けなさいってば」"
translation = "「잠깐, 듣고 있어? 아무튼 여기 열라니까」"

[[dialogue]]
speaker = "イレーナ"
original = "「早く入れてくれないとあんたの母親にバレちゃうじゃない。どれだけ人を寒いリビングで待たせるつもり──」"
translation = "「빨리 들여보내 주지 않으면 당신 어머니한테 들켜버리잖아. 도대체 사람을 얼마나 추운 거실에서 기다리게 할 셈──」"

[[dialogue]]
speaker = "クロト"
original = "「すぅ……すぅ……すぅ……」"
translation = "「스으…… 스으…… 스으……」"

[[dialogue]]
speaker = "イレーナ"
original = "「……へぇ。なるほどなるほど。人にあれだけ苦労させておいて、自分は彼女を待ちきれずに寝落ち、ねぇ？」"
translation = "「……헤에. 과연 과연. 사람을 그렇게 고생시켜 놓고, 자신은 여자친구를 못 기다려서 잠들었다, 이거지?」"

[[dialogue]]
speaker = "イレーナ"
original = "「ふふふ、良い度胸じゃない♪\u3000よっぽどブラックサンタにお仕置きされたいみたいね……♪」"
translation = "「후후후, 배짱 좋은걸♪ 아주 블랙 산타에게 벌을 받고 싶은 모양이네……♪」"

[[dialogue]]
speaker = "イレーナ"
original = "「覚悟──しなさい？」"
translation = "「각오── 하렴?」"

[[dialogue]]
speaker = "イレーナ"
original = "「んっ、ふっ、んっ、んふぅんっ……！」"
translation = "「응, 흣, 응, 응후응……!」"

[[dialogue]]
speaker = "イレーナ"
original = "「んっ──んんっっ～～<emoji=heart04><emoji=heart04>\u3000あーらあら、また漏らしちゃったの？\u3000堪え性がっ、ないわねっ」"
translation = "「응── 으응~~<emoji=heart04><emoji=heart04> 어라라, 또 싸버린 거야? 참을성이, 없네」"

[[dialogue]]
speaker = "クロト"
original = "「あっ、イレーナ……！\u3000やめっ、もう出なっ……！」"
translation = "「앗, 이레나……! 그만, 이제 안 나……!」"

[[dialogue]]
speaker = "イレーナ"
original = "「はぁっ、はぁっ、んっ、はぁんっ。なーに言ってんのよっ<emoji=heart04>\u3000お仕置きは、んっ、ふっ、まだまだこれからなんだからっ<emoji=heart04>」"
translation = "「하아, 하아, 응, 하앙. 무슨 소리를 하는 거야<emoji=heart04> 벌은, 응, 흣, 이제부터 시작이니까<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「骨の髄まで搾り取って、からっからにしてあげるわっ<emoji=heart04>\u3000恋人を蔑ろにしてくれた罰よっ<emoji=heart04>」"
translation = "「뼛속까지 짜내서, 바짝 말려 줄게<emoji=heart04> 연인을 소홀히 대한 벌이야<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「くぁあ……！\u3000悪かった、俺が悪かったから……！！」"
translation = "「크아아……! 잘못했어, 내가 잘못했으니까……!!」"

[[dialogue]]
speaker = "unk"
original = "目覚めた時には体の自由は奪われていた。"
translation = "눈을 떴을 때는 몸의 자유를 빼앗긴 상태였다."

[[dialogue]]
speaker = "unk"
original = "「気持ち良さそうに寝てたわね♪」と満面の笑みで、勃起したペニスをグリグリと踏みつけていたイレーナの姿を覚えている。"
translation = "「기분 좋게 자고 있었네♪」라며 만면에 미소를 띠고, 발기한 페니스를 그리그리 짓밟고 있던 이레나의 모습이 기억난다."

[[dialogue]]
speaker = "unk"
original = "そのまま足コキに騎乗位、フェラや手コキ、パイズリとあらゆる手段で何度も精液を搾り取られ続けて、ブラックサンタの衣装が白く染まっていた。"
translation = "그대로 풋잡에 기승위, 펠라나 손음경, 파이즈리 등 온갖 수단으로 몇 번이고 정액을 계속 짜내어, 블랙 산타의 의상이 하얗게 물들어 있었다."

[[dialogue]]
speaker = "イレーナ"
original = "「一晩中、んはぁ、勃起させ続けてあげるわっ<emoji=heart04>\u3000一晩中、んっ、ふっ、下品なミルクビュービューさせ続けてあげるっ<emoji=heart04>」"
translation = "「밤새도록, 응하아, 발기시켜 줄게<emoji=heart04> 밤새도록, 응, 흣, 저질스러운 밀크 뷰뷰 나오게 해줄게<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「たとえ精巣が、空っぽに、なってもっ<emoji=heart04>\u3000おち○ぽだけは絶対に萎えさせてやんないんだからっ<emoji=heart04>」"
translation = "「설령 정소가, 텅텅, 비게 되더라도<emoji=heart04> 자지만큼은 절대로 죽게 두지 않을 거니까<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "本来ならとっくに萎えて何をされても勃ちやしない状態だ。"
translation = "본래라면 진작에 시들어서 무엇을 해도 발기하지 않을 상태다."

[[dialogue]]
speaker = "unk"
original = "しかし無理やり癒やされて、強引に勃たされて、ひたすらに過剰なまでの快楽を叩き込まれてしまう。"
translation = "하지만 억지로 치유받고, 강제로 발기당해서, 오로지 과잉된 쾌락을 주입당하고 만다."

[[dialogue]]
speaker = "イレーナ"
original = "「ほら、イキなさいっ<emoji=heart04>\u3000イケっ、イケイケっ<emoji=heart04>\u3000情けなくイッちゃえっ<emoji=heart04>」"
translation = "「자, 가버리렴<emoji=heart04> 가, 가버려 가버려<emoji=heart04> 한심하게 가버리라고<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「限界ギリギリ精子っ、ドピュドピュ出しちゃいなさいっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「한계 아슬아슬한 정자, 도퓨도퓨 내뿜어버려어<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「んふぁっ──あはぁぁあああんんっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응후앗──아하아아아앙앙읏<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「くぅ～～～っ！？」"
translation = "「크으으으윽!?」"

[[dialogue]]
speaker = "unk"
original = "快楽を浴びせられ続けた体は、すでに限界に近い──いや超えているはずなのに、まるで癖がついたように簡単に達してしまう。"
translation = "쾌락을 계속 뒤집어쓴 몸은 이미 한계에 가깝다──아니, 이미 넘었을 텐데도, 마치 버릇이 든 것처럼 간단히 가버리고 만다."

[[dialogue]]
speaker = "イレーナ"
original = "「んふふ……<emoji=heart04>\u3000何よ、まだまだ残ってるじゃない<emoji=heart04>\u3000もう出ないとか嘘ついちゃう悪ガキは、ブラックサンタがもっと搾り取ってあげるわ♪」"
translation = "「응후후……<emoji=heart04> 뭐야, 아직 잔뜩 남아 있잖아<emoji=heart04> 이제 안 나온다고 거짓말하는 나쁜 꼬맹이는, 블랙 산타가 더 쥐어짜 줄게♪」"

[[dialogue]]
speaker = "unk"
original = "イレーナの動きが加速し、ドロドロの膣がくたくたになったペニスを摩擦する。"
translation = "이레나의 움직임이 가속되고, 질척해진 질이 흐물흐물해진 자지를 마찰한다."

[[dialogue]]
speaker = "unk"
original = "もう壊れてしまうと体が悲鳴を上げるが、快楽は否応なく襲い掛かってくる。"
translation = "이제 망가져 버린다고 몸이 비명을 지르지만, 쾌락은 속수무책으로 엄습해 온다."

[[dialogue]]
speaker = "クロト"
original = "「～～～っ！\u3000本当に、もう無理だから……！」"
translation = "「~~~윽! 진짜로, 이제 무리니까……!」"

[[dialogue]]
speaker = "イレーナ"
original = "「男の子が弱音なんか吐かないの♪\u3000そもそもあんたの意見なんて最初から聞いてないんだから♪\u3000それじゃあ──」"
translation = "「남자가 약한 소리나 하고 그러면 안 되지♪ 애초에 네 의견 같은 건 처음부터 안 물어봤으니까♪ 자, 그럼──」"

[[dialogue]]
speaker = "クロト"
original = "「！！？」"
translation = "「!!?」"

[[dialogue]]
speaker = "イレーナ"
original = "「ふふ、なーに気の抜けた顔してるのよ<emoji=heart04>\u3000言ったでしょ<emoji=heart04>\u3000一晩中勃起させる、一晩中射精させるって<emoji=heart04>」"
translation = "「후후, 뭐니 그 얼빠진 얼굴은<emoji=heart04> 말했잖아<emoji=heart04> 밤새도록 발기시키고, 밤새도록 사정하게 하겠다고<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「無理やりにでも精子作らせてっ、んっ、ふっ、んんんっ<emoji=heart04>\u3000射精させてあげるからっ<emoji=heart04>」"
translation = "「억지로라도 정자 만들게 해서, 응, 훗, 으으음<emoji=heart04> 사정하게 해줄 테니까<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「んっ、はぁっ、んっ、んっ<emoji=heart04>\u3000爆発させてあげるっ<emoji=heart04>\u3000とことんまで、んっ、ふっ、苛めてあげるわっ<emoji=heart04>」"
translation = "「응, 하앗, 응, 응<emoji=heart04> 폭발시켜 줄게<emoji=heart04> 끝까지, 응, 훗, 괴롭혀 줄게<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「でもあんたが悪いのよ？\u3000あたしはただブラックサンタとしての務めを果たそうとしてるだーけ♪」"
translation = "「하지만 네가 나쁜 거라고? 난 그저 블랙 산타로서의 임무를 다하려는 것뿌운♪」"

[[dialogue]]
speaker = "イレーナ"
original = "「恋人を放置してぐっすり寝ちゃうような悪い子の彼氏を、んっ……ふっ……<emoji=heart04>\u3000良い子の彼氏に矯正してあげてるだけなんだから……<emoji=heart04>」"
translation = "「연인을 방치하고 쿨쿨 자버리는 나쁜 아이인 남자친구를, 응…… 훗……<emoji=heart04> 착한 아이인 남자친구로 교정해 주는 것뿐이니까……<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「パパになったら、クリスマスは遅くまで起きてないといけない日、なのよ<emoji=heart04>\u3000ふ、あっ……ほんと、情けない、んだからっ……<emoji=heart04>」"
translation = "「아빠가 되면, 크리스마스는 늦게까지 깨어 있어야 하는 날, 인 거야<emoji=heart04> 후, 앗…… 정말, 한심하다니까……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言って、俺をなじるように膣をギュウギュウと締めつけてくる。"
translation = "그렇게 말하며, 나를 힐난하듯 질을 꽉꽉 조여 온다."

[[dialogue]]
speaker = "イレーナ"
original = "「いつもみたいに、んっ、ふっ、あたしをあんあん言わせてみなさいよっ<emoji=heart04>\u3000ほーらぁ──ほらほらほらぁっ<emoji=heart04>」"
translation = "「평소처럼, 응, 훗, 나를 앙앙거리게 만들어 보라고<emoji=heart04> 자아── 자자자아앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「うぐぁぁぁっ……！！」"
translation = "「으구아아앗……!!」"

[[dialogue]]
speaker = "unk"
original = "挑発するようにお尻をグネグネ動かしながら、子宮口でグリグリと亀頭を擦り上げてくる。"
translation = "도발하듯이 엉덩이를 구불구불 움직이면서, 자궁구로 그리그리 귀두를 문지른다."

[[dialogue]]
speaker = "unk"
original = "後背位なんて男性優位もいいところなのに、完全にイレーナの遊び道具にされていた。"
translation = "후배위라는 남성 우위의 자세인데도, 완전히 이레나의 장난감 취급을 당하고 있었다."

[[dialogue]]
speaker = "イレーナ"
original = "「あははっ<emoji=heart04>\u3000面白いくらいおち○ぽが膣内で飛び跳ねてるわっ<emoji=heart04>\u3000何度も射精して、相当敏感になっちゃってるみたいねっ<emoji=heart04>」"
translation = "「아하핫<emoji=heart04> 재미있을 정도로 자지가 질 안에서 날뛰고 있어<emoji=heart04> 몇 번이나 사정해서, 상당히 민감해져 버린 모양이네<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「遠慮せずにイっていいのよっ<emoji=heart04>\u3000イキたいんでしょっ？\u3000あんたの大好きな聖女おま○こでイッていいのよ？」"
translation = "「사양 말고 가도 좋아<emoji=heart04> 가고 싶지? 네가 정말 좋아하는 성녀 보지로 가도 된다고?」"

[[dialogue]]
speaker = "イレーナ"
original = "「普段からサルみたいに求めてくるものねっ<emoji=heart04>\u3000ほーらぁ、遠慮せずにイキなさいよっ<emoji=heart04>\u3000可愛い彼女がご奉仕してあげてるんだからっ<emoji=heart04>」"
translation = "「평소에도 원숭이처럼 원해대더니 말이야<emoji=heart04> 자아, 사양 말고 가버리렴<emoji=heart04> 귀여운 여자친구가 봉사해 주고 있으니까 말이야<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ズン、ズンとリズミカルにイレーナが俺を責める。"
translation = "쿵, 쿵 하고 리드미컬하게 이레나가 나를 몰아붙인다."

[[dialogue]]
speaker = "unk"
original = "イレーナはもう俺の弱点を知り尽くしていて、的確に膣を締め、粘膜を擦りつけ、執拗に俺を嬲った。"
translation = "이레나는 이미 나의 약점을 속속들이 알고 있어서, 정확하게 질을 조이고, 점막을 비벼대며, 집요하게 나를 농락했다."

[[dialogue]]
speaker = "イレーナ"
original = "「いつまでもイかないと、まるであたしの体が気持ち良くないみたいじゃないっ<emoji=heart04>\u3000さっさとイキなさいってばっ<emoji=heart04>」"
translation = "「언제까지고 안 가면, 마치 내 몸이 기분 좋지 않은 것 같잖아<emoji=heart04> 얼른 가버리라니까<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「何度でもイッていいのよ？\u3000孕むくらい射精していいってあたしが言ってるのよ？\u3000イキなさいってば──」"
translation = "「몇 번이고 가도 좋아. 임신할 정도로 사정해도 좋다고 내가 말하고 있잖아? 가버리라니까──」"

[[dialogue]]
speaker = "イレーナ"
original = "「ほらほら<emoji=heart04>\u3000ほらほらほらほら<emoji=heart04><emoji=heart04>」"
translation = "「자자<emoji=heart04> 자자자자<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「あぁぁぁあっっ～～！！？」"
translation = "「아아아아앗~~!!?」"

[[dialogue]]
speaker = "イレーナ"
original = "「良い声で鳴くじゃないっ<emoji=heart04>\u3000それでこそ、んっ、はぁっ、んぁぁんっ、お仕置きし甲斐があるわっ<emoji=heart04>」"
translation = "「좋은 목소리로 우네<emoji=heart04> 그래야, 응, 하앗, 응아앙, 벌주는 보람이 있지<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「だけど苦しそうに喘ぎすぎなところは減点ねっ<emoji=heart04>\u3000気持ち良くしてあげてるんだから、もっと嬉しそうに喘ぎなさいっ<emoji=heart04>」"
translation = "「하지만 너무 괴로운 듯이 헐떡이는 점은 감점이야<emoji=heart04> 기분 좋게 해주고 있으니까, 좀 더 기쁜 듯이 헐떡이렴<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「これはお仕置きでもあり、プレゼントでもあるんだからっ<emoji=heart04>\u3000恋人が、んっ、ふっ、こんなに一生懸命腰を振ってくれてるのよっ？」"
translation = "「이건 벌이기도 하지만, 선물이기도 하니까<emoji=heart04> 연인이, 응, 훗, 이렇게 열심히 허리를 흔들어주고 있잖아?」"

[[dialogue]]
speaker = "unk"
original = "もう射精したくないのに、気持ち良くなりたくないのに、一方的に快感だけを押しつけられて……"
translation = "이제 사정하고 싶지 않은데, 기분 좋아지고 싶지 않은데, 일방적으로 쾌감만을 강요당해서……"

[[dialogue]]
speaker = "unk"
original = "だけど、それがだんだん──"
translation = "하지만, 그것이 점점──"

[[dialogue]]
speaker = "イレーナ"
original = "「あらあらっ、おかしいわねっ<emoji=heart04>\u3000さっきよりよっぽど、んっ、はぁんっ<emoji=heart04>\u3000おち○ぽ勃起してきてるわよっ？」"
translation = "「어라어랏, 이상하네<emoji=heart04> 아까보다 훨씬, 응, 하앙<emoji=heart04> 자지가 발기하고 있어?」"

[[dialogue]]
speaker = "イレーナ"
original = "「あたし、大して癒やしてあげてないのにっ<emoji=heart04>\u3000もしかして、あたしに苛められて感じちゃってるのかしらっ？」"
translation = "「나, 별로 치유해주지 않았는데<emoji=heart04> 설마, 나한테 괴롭힘당해서 느껴버리는 걸까?」"

[[dialogue]]
speaker = "クロト"
original = "「ち、違っ──くっ！」"
translation = "「아, 아니── 큭!」"

[[dialogue]]
speaker = "イレーナ"
original = "「んふふっ<emoji=heart04>\u3000声までよくなってるじゃないっ<emoji=heart04>\u3000へー、そうだったの<emoji=heart04>\u3000あんた、苛められて喜ぶタイプだったのね<emoji=heart04>」"
translation = "「응후훗<emoji=heart04> 목소리까지 좋아졌잖아<emoji=heart04> 헤ー, 그랬구나<emoji=heart04> 너, 괴롭힘당하며 좋아하는 타입이었네<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「気持ち悪いっ<emoji=heart04>\u3000ほんとド変態ねっ<emoji=heart04>\u3000動けなくされて、犯されてっ、お仕置きされてるのに、それが気持ちいいんだっ？」"
translation = "「기분 나빠<emoji=heart04> 정말 변태네<emoji=heart04> 움직이지 못하게 돼서, 범해지고, 벌받고 있는데, 그게 기분 좋은 거야?」"

[[dialogue]]
speaker = "クロト"
original = "「ぐっ──！？」"
translation = "「윽──!?」"

[[dialogue]]
speaker = "イレーナ"
original = "「あははっ<emoji=heart04>\u3000ヤッバいっ、マジで変態なのねっ<emoji=heart04>\u3000罵った途端、おち○ぽがドクンドクンし始めたわよっ<emoji=heart04>」"
translation = "「아하핫<emoji=heart04> 장난 아냐, 진짜로 변태네<emoji=heart04> 매도하자마자 자지가 움찔움찔하기 시작했다구<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「あんなに出したくない、射精したくないって言ってたクセに、んっ、はぁっ、すごい勢いで精子作っちゃってるじゃない<emoji=heart04>」"
translation = "「그렇게 내기 싫다, 사정하기 싫다 말했던 주제에, 응, 하앗, 엄청난 기세로 정자를 만들어내고 있잖아<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「むしろいつもより興奮しちゃってない？\u3000こんなのが会長や魔王だなんて笑っちゃうわっ<emoji=heart04>」"
translation = "「오히려 평소보다 흥분해버린 거 아냐? 이런 게 회장이나 마왕이라니 웃음이 나와<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "貶されて悔しいはずなのに、苛められて苦しいはずなのに、イレーナの言葉が耳に届く度にペニスが熱く火照ってしまう。"
translation = "비하당해서 분할 텐데, 괴롭힘당해서 괴로울 텐데, 이레나의 말이 귀에 닿을 때마다 페니스가 뜨겁게 달아올라 버린다."

[[dialogue]]
speaker = "イレーナ"
original = "「ほらぁっ、んっ、はぁっ、気持ちいいんでしょっ？\u3000認めちゃいなさいよっ、この変態っ<emoji=heart04>」"
translation = "「자아, 응, 하앗, 기분 좋지? 인정해버리라구, 이 변태<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「実はあたしにお仕置きされたくて、わざと寝てたんじゃないのっ？\u3000わざとあたしをイラつかせて犯されようとしてたんじゃないっ？」"
translation = "「사실은 나한테 벌 받고 싶어서, 일부러 자고 있었던 거 아냐? 일부러 나를 짜증 나게 해서 범해지려고 했던 거 아니냐구?」"

[[dialogue]]
speaker = "unk"
original = "否定したいのに声が出ない。このままだとマズい。本当にドＭのド変態に変えられてしまう。"
translation = "부정하고 싶은데 목소리가 나오지 않아. 이대로라면 위험해. 정말로 초M 초변태로 바뀌어 버리고 말아."

[[dialogue]]
speaker = "イレーナ"
original = "「違うのならどうしてやり返してこないのっ<emoji=heart04>\u3000悔しくないのっ？\u3000立ちバックで好き勝手に女の子に責め立てられてっ」"
translation = "「아니라면 어째서 되받아치지 않는 거야<emoji=heart04> 분하지도 않아? 뒤치기로 여자애한테 마음껏 몰아세워지면서<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「それともドＭ的にはこういうのがお好みだったのかしら<emoji=heart04>\u3000男性優位の体位なのに、女の子に苛められちゃうってシチュが<emoji=heart04>」"
translation = "「아니면 초M적으로는 이런 게 취향이었던 걸까<emoji=heart04> 남성 우위의 체위인데도, 여자애한테 괴롭힘당해 버린다는 시츄에이션이<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「早くやり返さないとまた出ちゃうわよっ<emoji=heart04>\u3000ぱっつぱっつに詰まったザーメン、あたしに搾り出されちゃうわよっ<emoji=heart04>」"
translation = "「빨리 되받아치지 않으면 또 나와 버릴걸<emoji=heart04> 빵빵하게 가득 찬 정액, 나한테 짜내져 버릴 거야<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "イレーナにやり返してやりたい。いつものように責めてやりたい。"
translation = "이레이나에게 되받아쳐 주고 싶다. 평소처럼 몰아세워 주고 싶다."

[[dialogue]]
speaker = "unk"
original = "なのにイレーナの罵倒が、嘲笑うかのような抽挿が、たまらなく気持ちいい。"
translation = "그런데도 이레이나의 매도가, 비웃는 듯한 추삽질이, 참을 수 없을 정도로 기분 좋아."

[[dialogue]]
speaker = "イレーナ"
original = "「あっ、あっ、あっ、あっ<emoji=heart04>\u3000その顔っ、めちゃくちゃ興奮しちゃうっ……<emoji=heart04>\u3000その悔しそうな悶え顔っ<emoji=heart04>\u3000いい<emoji=heart04>\u3000おま○こにきちゃうっ<emoji=heart04>」"
translation = "「앗, 앗, 앗, 앗<emoji=heart04> 그 얼굴, 엄청나게 흥분돼 버려……<emoji=heart04> 그 분한 듯한 번민의 얼굴<emoji=heart04> 좋아<emoji=heart04> 보지에 와버려<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「本当にド変態だったのねっ<emoji=heart04>\u3000今までちっとも知らなかったわっ<emoji=heart04>」"
translation = "「정말로 초변태였던 거네<emoji=heart04> 지금까지 조금도 몰랐어<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「いいわよっ<emoji=heart04>\u3000そういうことならあたしも、んふぅんっ<emoji=heart04>\u3000本気で苛めてあげるっ<emoji=heart04>」"
translation = "「좋아<emoji=heart04> 그런 거라면 나도, 응후운<emoji=heart04> 본심으로 괴롭혀 줄게<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「ブラックサンタとしてっ、恋人としてっ<emoji=heart04>\u3000マゾで変態なあんたに、お仕置きのプレゼントを贈ってあげるからっ<emoji=heart04>」"
translation = "「블랙 산타로서, 연인으로서<emoji=heart04> 마조에 변태인 너에게, 벌이라는 선물을 보내 줄 테니까<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "イレーナが嘲りと興奮の笑みを浮かべ、責め立てられて喘ぐばかりの俺を面白半分に苛めるように、執拗にお尻をぶつけてくる。"
translation = "이레이나가 조소와 흥분의 미소를 띄우며, 몰아세워져서 헐떡이기만 하는 나를 재미 반 괴롭히기 반으로 대하듯, 집요하게 엉덩이를 부딪쳐 온다."

[[dialogue]]
speaker = "イレーナ"
original = "「あっ、はぁっ、あっ、あぁんっ<emoji=heart04>\u3000ち○ぽビクビクしてる<emoji=heart04>\u3000出したいって言ってる<emoji=heart04>\u3000何よっ、もはや射精を我慢しようとすらしてないじゃないっ<emoji=heart04>」"
translation = "「앗, 하앗, 앗, 아앙<emoji=heart04> 자지 움찔거리고 있어<emoji=heart04> 내보내고 싶다고 말하고 있어<emoji=heart04> 뭐야, 이제 사정을 참으려고조차 하지 않잖아<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「さっきまではイかないように必死で耐えてたのにっ、今はもう『イかせてくださいイかせてください』って子どもみたいに喘いでるのがわかるわっ<emoji=heart04>」"
translation = "「아까까지는 안 가려고 필사적으로 견뎠으면서, 지금은 벌써 『가게 해주세요 가게 해주세요』라며 아이처럼 헐떡이는 게 느껴져<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「本当に変態ねっ<emoji=heart04>\u3000このド変態っ<emoji=heart04>\u3000聖なる夜にこんな変態っぷり晒しちゃってっ、恥を知りなさいっ<emoji=heart04>」"
translation = "「정말 변태네<emoji=heart04> 이 초변태<emoji=heart04> 거룩한 밤에 이런 변태 같은 꼴을 드러내다니, 부끄러운 줄 알아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "何度も射精したのに下半身が疼く。"
translation = "몇 번이나 사정했는데도 하반신이 욱신거린다."

[[dialogue]]
speaker = "unk"
original = "イレーナに変態と言われるだけでドクドクと精子がせり上がってきて……"
translation = "이레이나에게 변태라고 듣는 것만으로 울컥울컥 정자가 치밀어 올라와서……"

[[dialogue]]
speaker = "イレーナ"
original = "「出すなら早く出しなさいよ、この駄犬っ<emoji=heart04>\u3000いつまであたしに腰を振らせるつもりなのっ<emoji=heart04>」"
translation = "「낼 거라면 빨리 내라고, 이 똥개야<emoji=heart04> 언제까지 나한테 허리를 흔들게 할 셈이야<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「ほらイケっ<emoji=heart04>\u3000イっちゃいなさいっ<emoji=heart04>\u3000下品なマゾち○ぽミルクっ、とっととぶちまけなさいってばっ<emoji=heart04>」"
translation = "「자, 가<emoji=heart04> 가버리라고<emoji=heart04> 저질스러운 마조 자지 밀크, 얼른 쏟아버리란 말이야<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「あっ、あっ、あっ、あっ<emoji=heart04>\u3000きてるっ、きてるわっ、ものすごい量のマゾ精子っ、んぁぁぁ、のぼってきてるっ<emoji=heart04>」"
translation = "「앗, 앗, 앗, 앗<emoji=heart04> 오고 있어, 오고 있어, 엄청난 양의 마조 정자, 응아아아, 올라오고 있어<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「ありがたく思いなさいっ<emoji=heart04>\u3000あんたみたいなド変態に付き合ってくれる彼女なんて、それこそ聖女みたいなもんなんだからっ<emoji=heart04>」"
translation = "「고맙게 생각하라고<emoji=heart04> 너 같은 초변태를 상대해 주는 여자친구라니, 그야말로 성녀 같은 거니까<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「あたしへの愛と感謝を込めてイキ果てるのよっ<emoji=heart04>\u3000ありがとうございます、イレーナさまってねっ<emoji=heart04>」"
translation = "「나에 대한 사랑과 감사를 담아서 가버리는 거야<emoji=heart04> 감사합니다, 이레이나 님이라고 말하면서<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「さぁ言えっ、イケっ、あたしに感謝を捧げなさいっ、この駄犬っ<emoji=heart04>」"
translation = "「자, 말해, 가, 나에게 감사를 바치라고, 이 똥개야<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「変態でごめんなさいっ、イレーナさまっ<emoji=heart04>\u3000って情けなくっ、だらしなく叫ぶのっ<emoji=heart04>」"
translation = "「변태라서 죄송합니다, 이레이나 님<emoji=heart04> 이라고 한심하게, 칠칠치 못하게 외치는 거야<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そんなの想像だけで恥ずかしくて死んでしまいそうだ。"
translation = "그런 건 상상만으로 부끄러워서 죽어버릴 것 같다."

[[dialogue]]
speaker = "unk"
original = "でもなぜかその屈辱はとても甘美なものに思えて──"
translation = "하지만 왠지 그 굴욕은 무척이나 달콤한 것으로 느껴져서──"

[[dialogue]]
speaker = "イレーナ"
original = "「きちんと言えたらもっと苛めてあげるわよっ<emoji=heart04>\u3000一晩中、あんたの変態マゾち○ぽ、苛め抜いてあげるっ<emoji=heart04>」"
translation = "「제대로 말하면 더 괴롭혀 줄게<emoji=heart04> 밤새도록, 네 변태 마조 자지, 끝까지 괴롭혀 줄 테니까<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「ほら叫べっ<emoji=heart04>\u3000イケっ<emoji=heart04>\u3000イケっ<emoji=heart04>\u3000言えっ<emoji=heart04>\u3000言いなさいっ<emoji=heart04>」"
translation = "「자, 외쳐, 가, 가, 말해, 말하라고<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「聖なる夜にっ、んはぁぁあっっ<emoji=heart04>\u3000あんたの変態っぷりっ、曝け出しちゃなさぁああいっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「거룩한 밤에, 응하아아앗<emoji=heart04> 네 변태 같은 모습, 다 드러내 버리라아아아고오옷<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「くうぅっ──変態でごめんなさいっ、イレーナさまっ──！！」"
translation = "「쿠우웃── 변태라서 죄송합니다, 이레이나 님──!!」"

[[dialogue]]
speaker = "イレーナ"
original = "「くはっ──んんっ<emoji=heart04>\u3000んはぁぁぁあああああんんんんっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「쿠핫── 응응<emoji=heart04> 응하아아아아아아앙응응응으으으윽～～<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "部屋が揺れるほど叫んだ瞬間、体中の体液という体液を噴き出す勢いで射精してしまう。"
translation = "방이 흔들릴 정도로 외친 순간, 몸 안의 체액이란 체액은 다 뿜어낼 기세로 사정해 버린다."

[[dialogue]]
speaker = "イレーナ"
original = "「はぁああっ<emoji=heart04>\u3000ああっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000今までで一番熱くて、濃いザーメン、噴き出してる……っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하아아앗<emoji=heart04> 아앗<emoji=heart04> 응윽<emoji=heart04> 지금까지 중 가장 뜨겁고, 진한 정액, 뿜어져 나오고 있어……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "体が痙攣する。強引に命の種を搾り出される。脳の回路が焼けそうだ。"
translation = "몸이 경련한다. 강제로 생명의 씨앗을 짜내어진다. 뇌의 회로가 타버릴 것 같다."

[[dialogue]]
speaker = "unk"
original = "二度と勃起できないほどペニスから精子が噴き出して──……！！"
translation = "다시는 발기할 수 없을 정도로 페니스에서 정자가 뿜어져 나와──……!!"

[[dialogue]]
speaker = "イレーナ"
original = "「ふぁああ～～～っ<emoji=heart04>\u3000ああっ、子宮に、くるっ……<emoji=heart04>\u3000熱いの、ビュルビュルって……んぁあ～～っ<emoji=heart04>」"
translation = "「후아아아～～～<emoji=heart04> 아앗, 자궁에, 온다……<emoji=heart04> 뜨거운 게, 울컥울컥하면서…… 응아아～～<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「んはぁぁぁっ……<emoji=heart04>\u3000まだ出てる……<emoji=heart04>\u3000ん、ふぁぁっ……蛇口ひねったみたいにジョボジョボ出続けてっ……<emoji=heart04>」"
translation = "「응하아아앗……<emoji=heart04> 아직 나오고 있어……<emoji=heart04> 응, 후아앗…… 수도꼭지를 튼 것처럼 콸콸 계속 나와서……<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「全然あたしの膣内におさまりきらないっ<emoji=heart04>\u3000何よこれ、射精じゃなくておしっこじゃないでしょうねっ<emoji=heart04>」"
translation = "「전혀 내 질 내에 다 담기질 않아<emoji=heart04> 뭐야 이거, 사정이 아니라 오줌인 거 아냐?<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「でも駄犬に相応しい射精っぷりだわ……<emoji=heart04>\u3000お母様にも、あんたの情けない声聞かれちゃったんじゃないかしら？」"
translation = "「하지만 똥개에게 어울리는 사정 모습이네……<emoji=heart04> 어머니께도, 네 한심한 목소리가 들려버린 거 아닐까?」"

[[dialogue]]
speaker = "unk"
original = "結合部から精液を垂れ零しながら、呆然と口を開けて喘ぐ俺をイレーナがニヤニヤと見つめてくる。"
translation = "결합부에서 정액을 흘러넘치게 하며, 망연히 입을 벌리고 헐떡이는 나를 이레이나가 니야니야 웃으며 바라본다."

[[dialogue]]
speaker = "unk"
original = "その小馬鹿にした笑みを向けられるだけでもペニスがビクリと反応してしまう。"
translation = "그 비웃는 듯한 미소를 받는 것만으로도 페니스가 움찔하며 반응해 버린다."

[[dialogue]]
speaker = "イレーナ"
original = "「あらあら……<emoji=heart04>\u3000こんなにたくさんお仕置きしてあげたっていうのに、まだ足りないってわけ？」"
translation = "「어머어머……<emoji=heart04> 이렇게나 잔뜩 벌을 줬는데도, 아직 부족하다는 거야?」"

[[dialogue]]
speaker = "イレーナ"
original = "「本当に悪い子ね……<emoji=heart04>\u3000もはやご褒美になっちゃってるじゃない……<emoji=heart04>」"
translation = "「정말 나쁜 아이네……<emoji=heart04> 이제는 아예 포상이 되어버렸잖아……<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「でもいいわよ……<emoji=heart04>\u3000それがあんたの望みなら叶えてあげる……<emoji=heart04>」"
translation = "「하지만 좋아……<emoji=heart04> 그게 네 바람이라면 들어줄게……<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「優しい彼女に感謝することね……<emoji=heart04>\u3000今夜は徹底的に苛め抜いてあげるから……<emoji=heart04>」"
translation = "「상냥한 여자친구에게 감사하도록 해……<emoji=heart04> 오늘 밤은 철저하게 괴롭혀 줄 테니까……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "再び腰を揺らそうとしてくるイレーナ。"
translation = "다시 허리를 흔들려 하는 이레이나."

[[dialogue]]
speaker = "unk"
original = "その焦らすような腰遣いと聖女らしからぬ黒い笑みに、俺のペニスはより激しく疼いてしまうのであった。"
translation = "그 애태우는 듯한 허리 놀림과 성녀답지 않은 검은 미소에, 내 페니스는 더욱 격렬하게 욱신거리고 마는 것이었다."

