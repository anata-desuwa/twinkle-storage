[[dialogue]]
speaker = "unk"
original = "魔界への守護天使救出作戦も完了し──"
translation = "마계로의 수호천사 구출 작전도 완료되고──"

[[dialogue]]
speaker = "unk"
original = "季節は初夏。"
translation = "계절은 초여름."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「……ふぅ」"
translation = "「……후우.」"

[[dialogue]]
speaker = "unk"
original = "新星学園３年生、妃竜院マハムートは、水着姿でひと足早いバカンスを楽しんでいた。"
translation = "신성학원 3학년, 키류인 마하무트는 수영복 차림으로 한발 빠른 바캉스를 즐기고 있었다."

[[dialogue]]
speaker = "unk"
original = "彼女は、魔界の竜の一族『妃竜院家』の次期当主であり、新星学園の学生寮『ラルーナ』の寮長を務めている。"
translation = "그녀는 마계의 용 일족인 『키류인 가문』의 차기 당주이며, 신성학원의 학생 기숙사인 『라 루나』의 사감을 맡고 있다."

[[dialogue]]
speaker = "unk"
original = "ヴィーナスと並ぶ学園最強クラスの星騎士として畏怖を集めると同時に、寮生達からは寮母のように慕われる存在だ。"
translation = "비너스와 어깨를 나란히 하는 학원 최강 클래스의 성기사로서 경외를 받는 동시에, 기숙사생들로부터는 기숙사 엄마처럼 사모받는 존재다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「平和ね……。悪くないわ」"
translation = "「평화롭네……. 나쁘지 않아.」"

[[dialogue]]
speaker = "unk"
original = "彼女はビーチチェアーに優雅に腰かけ、海のさざ波に耳を澄ます。"
translation = "그녀는 비치 체어에 우아하게 앉아, 바다의 잔물결에 귀를 기울인다."

[[dialogue]]
speaker = "unk"
original = "ここは、『リゾート結界』のビーチ。"
translation = "이곳은 『리조트 결계』의 해변."

[[dialogue]]
speaker = "unk"
original = "学園の敷地内から繋がっている、とある天使の星術によって生み出された常夏の異空間である。"
translation = "학원 부지 내에서 이어지는, 어느 천사의 성술에 의해 만들어진 상하의 이공간이다."

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ヘイ、マム！\u3000ジュースお待ちドウでーす♪」"
translation = "「헤이, 마무! 쥬스 오래 기다리셨습니돠~♪」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あら、ありがとう。気が利くじゃない」"
translation = "「어머, 고마워. 눈치가 빠르네.」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「エヘヘ、アリガタキお言葉！\u3000ワタシも新星寮の寮生ですから、マムに尽くすのは当然のコトでーす♪」"
translation = "「에헤헤, 황송한 말씀! 저도 신성료의 기숙사생이니까, 마무에게 정성을 다하는 건 당연한 일입니돠♪」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ふふっ、いい心がけね、リップル」"
translation = "「후훗, 좋은 마음가짐이야, 리플.」"

[[dialogue]]
speaker = "unk"
original = "彼女は新星学園２年生、リップル。"
translation = "그녀는 신성학원 2학년, 리플."

[[dialogue]]
speaker = "unk"
original = "以前、クロト達が無人島へサバイバル合宿に出かけた際に出会い、学園へと迎え入れた天使だ。"
translation = "이전에 쿠로토 일행이 무인도로 서바이벌 합숙을 떠났을 때 만나, 학원으로 받아들인 천사다."

[[dialogue]]
speaker = "unk"
original = "そして他でもない、このリゾート結界を生み出した張本人である。"
translation = "그리고 다름 아닌 이 리조트 결계를 만들어낸 장본인이다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あら……？」"
translation = "「어머……?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「お、お休みのところ失礼します！」"
translation = "「시, 실례하겠습니다!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「マトイ！\u3000それに、カイチョー！\u3000ヘイ、ラッシャーセー♪\u3000リゾート結界へようこそでーす♪」"
translation = "「마토이! 그리고, 회장! 헤이, 어서 오세효♪ 리조트 결계에 오신 걸 환영합니돠♪」"

[[dialogue]]
speaker = "unk"
original = "こんにちは、リップル"
translation = "안녕, 리플."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「どうしたの、２人共？\u3000私に何か用かしら？」"
translation = "「무슨 일이니, 둘 다? 나에게 무슨 용건이라도 있니?」"

[[dialogue]]
speaker = "unk"
original = "実はマトイから、マムに相談があるらしくて"
translation = "사실 마토이가 마무에게 상담할 게 있다고 해서."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「相談……？」"
translation = "「상담……?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ま、マム！」"
translation = "「마, 마무!」"

[[dialogue]]
speaker = "unk"
original = "すると、マトイはその場でいきなり土下座をして――"
translation = "그러자 마토이는 그 자리에서 갑자기 도게자를 하며──"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「私を弟子にして下さいっ！！！」"
translation = "「저를 제자로 받아 주세요!!!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ワオ！\u3000ジャパニーズ・ドゲザ！！！」"
translation = "「와오! 재패니즈 도게자!!!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「は？\u3000するわけないでしょ」"
translation = "「하? 그럴 리 없잖아.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「即答！？」"
translation = "「즉답!?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「というか、なんで急にそんなことを頼みにきたのかしら？」"
translation = "「그보다, 왜 갑자기 그런 걸 부탁하러 온 거니?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「それは……」"
translation = "「그건……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「私が、星徒会メンバーの中で……最も弱いからです」"
translation = "「제가, 성도회 멤버 중에서…… 가장 약하기 때문입니다.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（あの時――リクリエとの決戦での無力感は、決して忘れることができない）"
translation = "(그때── 리크리에와의 결전에서의 무력감은 결코 잊을 수가 없어.)"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（圧倒的なリクリエの力を纏ったアポロちゃん）"
translation = "(압도적인 리크리에의 힘을 두른 아폴로 짱.)"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（そして、その後に現れた『リクリエの化身』）"
translation = "(그리고 그 후에 나타난 『리크리에의 화신』.)"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「──マクロ・ノヴァ・ブラスト──」"
translation = "「──매크로 노바 블래스트──」"

[[dialogue]]
speaker = "unk"
original = "ぐ──おおおおおおおおッッッ！！"
translation = "크── 으아아아아아아아악!!"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「会長────ッ！！！」"
translation = "「회장님────!!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（私はただ、見ていることしかできなかった。星徒会の盾役だったはずなのに、会長を守ることができなかった……）"
translation = "(나는 그저 지켜볼 수밖에 없었어. 성도회의 방패 역할이었을 텐데, 회장님을 지키지 못했어……)"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（どうしようもなく弱くて、普通の存在だった――）"
translation = "(어찌할 바 없이 약하고, 평범한 존재였어──)"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「――それと、最近出没しているっていう、新種のモンスターの件もありますし……」"
translation = "「──그리고 최근 출몰한다는 신종 몬스터 건도 있고요……」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ああ、今まで見たことのないような、異質な姿をしているっていう噂のやつね」"
translation = "「아아, 지금까지 본 적 없는 이질적인 모습을 하고 있다는 소문의 그거 말이구나.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「流星寮の生徒たちが苦戦してたところにヒルディオーネが駆け付けて、何とか倒したって話を聞いたけれど……」"
translation = "「유성 기숙사의 학생들이 고전하던 곳에 힐디오네가 달려가서 어떻게든 쓰러뜨렸다는 이야기는 들었다만……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「リクリエを会長が抑え込んだことで、モンスターの出現頻度は減っていました」"
translation = "「리크리에를 회장님이 억눌러 주신 덕분에 몬스터의 출현 빈도는 줄어들었습니다.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「でも、何故かまた、新種のモンスターが現れるようになった。だとしたら――」"
translation = "「하지만 어째서인지 다시 신종 몬스터가 나타나기 시작했어요. 그렇다면──」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「アポロちゃんとは別の、新たな『リクリエの使徒』が現れるかもしれない」"
translation = "「아폴로 짱과는 다른 새로운 『리크리에의 사도』가 나타날지도 몰라요.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そうなった時の為にも、私……もっと強くなりたいんです！」"
translation = "「그렇게 되었을 때를 위해서라도, 저…… 좀 더 강해지고 싶어요!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「なるほどね」"
translation = "「과연 그렇구나.」"

[[dialogue]]
speaker = "unk"
original = "と、その時だった。"
translation = "그때였다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「マム！\u3000おはようございまーすっ！」"
translation = "「마무! 안녕하세요!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「今日も水着フォームのご指導、よろしくお願いします！\u3000……って、会長と、マトイ先輩？」"
translation = "「오늘도 수영복 폼 지도, 잘 부탁드립니돠! ……어라, 회장님이랑 마토이 선배?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「流星学園附属校の、アムちゃん……？」"
translation = "「유성학원 부속교의 아무 짱……?」"

[[dialogue]]
speaker = "unk"
original = "２人の盾使いは互いに顔を見合わせるのだった――"
translation = "두 명의 방패 사용자는 서로의 얼굴을 마주 보았다──"

