[[dialogue]]
speaker = "unk"
original = "第１話,お母さんの訪問,P"
translation = "제1화, 엄마의 방문, P"

[[dialogue]]
speaker = "unk"
original = "今日の放課後は星徒会室で書類仕事だ。分量を考えるだけで憂鬱になるけど、頑張らないとな──"
translation = "오늘 방과 후는 성도회실에서 서류 작업이다. 분량만 생각해도 우울해지지만, 힘내야지──"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「おはようございます、会長。本日の業務は何でしょうか？」"
translation = "「좋은 아침입니다, 회장. 오늘의 업무는 무엇인가요?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「あ、私は緋宮リノと言います。リクリエに対抗するために、今日も頑張っていきましょう！」"
translation = "「아, 저는 히미야 리노라고 합니다. 리크리에 대항하기 위해, 오늘도 힘내봐요!」"

[[dialogue]]
speaker = "unk"
original = "母さんがどうしてここに！？"
translation = "엄마가 왜 여기에!?"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「むー。つまんない反応ね。お母さんが星術の研究をしてるのは知ってるでしょ？\u3000今日はお仕事で学園にお邪魔してたのよ」"
translation = "「무─. 심심한 반응이네. 엄마가 성술 연구를 하고 있다는 건 알고 있잖아? 오늘은 업무 때문에 학원에 들른 거야」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「トワ先生やエスメラルダ先生と一緒に、最新の研究レポートの共有とか、ディスカッションとかしてたの。実りのある時間だったわね♪」"
translation = "「토와 선생님이나 에스메랄다 선생님이랑 같이 최신 연구 리포트를 공유하거나 디스커션을 하거나 했지. 보람 있는 시간이었어♪」"

[[dialogue]]
speaker = "unk"
original = "──そういえば、母さんの服装も仕事に行く時のものだ。"
translation = "──그러고 보니, 엄마의 복장도 업무용이다."

[[dialogue]]
speaker = "unk"
original = "在宅で仕事をしていることも多いし、俺が帰るといつも家にいるイメージがあるけれど、母さんは星術の研究職に就いている。"
translation = "재택근무를 하는 경우도 많고, 내가 귀가하면 항상 집에 있는 이미지가 있지만, 엄마는 성술 연구직에 종사하고 있다."

[[dialogue]]
speaker = "unk"
original = "その界隈ではかなり有名な研究者らしいのだけど、俺はその分野に明るくないため詳しくは知らない。"
translation = "그 업계에서는 꽤 유명한 연구자인 모양이지만, 나는 그 분야에 밝지 않아 자세히는 모른다."

[[dialogue]]
speaker = "unk"
original = "それにしても、仕事着を着るとかなり雰囲気が変わるなぁ……"
translation = "그나저나, 일복을 입으니 분위기가 꽤 변하는구나……"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「──で、帰る前に、ついでに息子の学園生活も見ておきたいな～って思ったの。それでお邪魔したってわけ」"
translation = "「──그래서, 돌아가기 전에 덤으로 아들의 학원 생활도 봐두고 싶어서 말이야~. 그래서 방해하게 된 거란다」"

[[dialogue]]
speaker = "unk"
original = "部外者は勝手に入ったらダメだよ"
translation = "외부인은 마음대로 들어오면 안 된다고"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「しゅわっち。私が許可しました。廊下でばったりあったので、お誘いした次第です」"
translation = "「슈왓치. 제가 허가했습니다. 복도에서 우연히 마주쳐서, 초대한 참입니다」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「正式にお誘いされたのよ？\u3000いくら会長の母親だからって無断で入ったりしないわよ～」"
translation = "「정식으로 초대받은 거라고? 아무리 회장의 어머니라지만 무단으로 들어오거나 하지는 않아~」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「リノさんは星術研究において目覚ましい論文をいくつも発表しています」"
translation = "「리노 씨는 성술 연구에 있어 눈부신 논문을 몇 개나 발표했습니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「専門家の視点から様々な意見をお伺いしたいと思い、星徒会にお招きしました」"
translation = "「전문가의 시점에서 다양한 의견을 듣고 싶어서 성도회로 모셨습니다」"

[[dialogue]]
speaker = "unk"
original = "机の上に和菓子があるけど……？"
translation = "책상 위에 화과자가 있는데……?"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「リノさんにいただいたものですが、決して和菓子に釣られたわけではありません。純粋に学術研究の目的のためです」"
translation = "「리노 씨에게 받은 것입니다만, 결코 화과자에 낚인 것은 아닙니다. 순수하게 학술 연구의 목적을 위해서입니다」"

[[dialogue]]
speaker = "unk"
original = "きっと和菓子に釣られたんだろうなあと思いつつ──モンスターの対策のために有意義な話ができるのならいいことだ。"
translation = "분명 화과자에 낚인 거겠지 싶으면서도── 몬스터 대책을 위해 유익한 이야기를 나눌 수 있다면 좋은 일이다."

[[dialogue]]
speaker = "unk"
original = "もう少し待てば他の星徒会メンバーもやってくるだろうし。俺も書類仕事をしながら、耳を傾けておくことにしよう──"
translation = "조금 더 기다리면 다른 성도회 멤버들도 올 테고. 나도 서류 작업을 하면서 귀를 기울여 두기로 하자──"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「でねでね！\u3000これがまだ小さい頃のクロトよ！\u3000か～～～わいいでしょ～っ！」"
translation = "「그래서 말이야! 이게 아직 어렸을 때의 쿠로토야! 거~~~업나 귀엽지~?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「確かにキュート。女の子みたいです」"
translation = "「과연 큐트. 여자아이 같습니다」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「本当だ！\u3000う、うちの弟と同じくらい可愛い……！」"
translation = "「정말이다! 우, 우리 남동생만큼이나 귀여워……!」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「見た目は可愛いけどすっごくわんぱくだったのよ。ほら、こっちの写真。膝に絆創膏あるでしょ？\u3000走り回ってはよく転んでね～」"
translation = "「겉모습은 귀엽지만 엄청 개구쟁이였다니까. 봐봐, 이 사진. 무릎에 반창고 있지? 뛰어다니다 자주 넘어져서 말이야~」"

[[dialogue]]
speaker = "unk"
original = "星術のレクチャーどこ行った！？"
translation = "성술 강의는 어디 갔어!?"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「もー、そんなにカリカリしないの。このお喋りが終わったらちゃーんと真面目な話もするんだから」"
translation = "「정말, 그렇게 까칠하게 굴지 마. 이 수다가 끝나면 제대로 진지한 이야기도 할 거니까」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「それよりそっち。ずいぶん書類が溜まってるわね？\u3000うちの子、整理整頓は苦手だし……アナちゃん、迷惑かけてないかしら？」"
translation = "「그보다 저쪽. 서류가 꽤 쌓여 있네? 우리 아들, 정리정돈은 쥐약이고…… 아나짱, 민폐 끼치고 있지는 않니?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ノープロブレム。むしろ会長は、前会長よりも格段に書類仕事が得意なので、私の仕事も減りました」"
translation = "「노 프로블럼. 오히려 회장은 전 회장보다 격단으로 서류 작업에 능숙해서, 제 일도 줄었습니다」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あはは……そうだね。ヴィーナスはお仕事ほっぽり出して、すぐどこかに行っちゃってたし……」"
translation = "「아하하…… 그렇네. 비너스는 일을 내팽개치고 금방 어디론가 가버리곤 했으니까……」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「それなら良かったわ。この子が会長就任って聞いたときは不安だったけれど、ちゃんとしてるのなら安心ね」"
translation = "「그렇다면 다행이네. 이 아이가 회장 취임했다는 말을 들었을 때는 불안했지만, 잘하고 있다니 안심이야」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「じゃあお母さんも真面目にお話しようかしら。これでも学者としてそれなりだし、何でも聞いてね♪」"
translation = "「그럼 엄마도 진지하게 이야기해 볼까. 이래 봬도 학자로서 나름대로 실력이 있으니까, 뭐든 물어보렴♪」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「では、子供の時代の会長の写真を、もっとプリーズ」"
translation = "「그럼, 어린 시절의 회장의 사진을 더 플리즈」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「あー！\u3000それ聞いちゃう！？\u3000聞いちゃうのね！？\u3000ふふふっ、言っておくけど、とっておきはさっきの数倍イケるわよ！」"
translation = "「아~! 그거 물어보는 거야!? 물어보는 거구나!? 후후훗, 미리 말해두는데, 비장의 카드는 아까 거보다 몇 배는 더 대단하다고!」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「もー可愛くって可愛くって！\u3000これから見せるのは、さっきのよりもっと幼い頃の写真なんだけど──」"
translation = "「어찌나 귀엽고 귀여운지! 지금부터 보여줄 건 아까 거보다 더 어렸을 때 사진인데──」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「あの伝説のセリフ……『将来はお母さんと結婚する』をこの時、言ってくれたのよ～！！」"
translation = "「그 전설의 대사…… 『장래에는 엄마랑 결혼할래』를 이때 말해줬단다~~!!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そそそ、そんなことがっ！？\u3000まさかのプロポーズ！？」"
translation = "「그, 그, 그런 일이!? 설마 했던 프러포즈!?」"

[[dialogue]]
speaker = "unk"
original = "言ってないから！！"
translation = "말 안 했거든!!"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「証拠の音声データがありまーす。ＤＩＳＣを新調するたびにバックアップもばっちりでーす」"
translation = "「증거 음성 데이터가 있습니다~. DISC를 새로 바꿀 때마다 백업도 완벽하답니다~」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ぜひ聞きたい。お茶請けもあります、準備は万端」"
translation = "「부디 듣고 싶다. 곁들일 다과도 있습니다, 준비는 만반」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「わくわく、わくわく……！」"
translation = "「두근두근, 두근두근……!」"

[[dialogue]]
speaker = "unk"
original = "仕事を、しろーーー！！"
translation = "일해, 일하라고──!!"

[[dialogue]]
speaker = "unk"
original = "わざわざ星徒会室にまでやってきて親バカを発揮した母さん。"
translation = "일부러 성도회실까지 찾아와서 아들 바보 기질을 발휘한 엄마."

[[dialogue]]
speaker = "unk"
original = "この後、ヴィーナスとサーシャさんもやってきて、俺の幼少期の頃の画像は母さんの息子自慢と一緒に赤裸々に公開されたのだった。"
translation = "이후 비너스와 사샤 씨도 찾아와서, 내 어린 시절 이미지는 엄마의 아들 자랑과 함께 적나라하게 공개되어 버렸다."

[[dialogue]]
speaker = "unk"
original = "本当に何をしに来たんだよ、母さん……"
translation = "정말 뭐 하러 온 거야, 엄마……"

