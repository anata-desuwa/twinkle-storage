[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「やっと帰ってきたくま！\u3000まったく待たせすぎくま！」"
translation = "「드디어 돌아왔다곰! 정말 너무 오래 기다리게 했다곰!」"

[[dialogue]]
speaker = "unk"
original = "でも案内人は見つかったから"
translation = "그래도 안내인은 찾았으니까"

[[dialogue]]
speaker = "unk"
original = "ごめんね"
translation = "미안해"

[[dialogue]]
speaker_original = "ノルトハウゼン"
speaker_translation = "노르트하우젠"
original = "「案内人……？」"
translation = "「안내인……?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ごめんなさい、その辺りの説明をまだしていませんでしたね」"
translation = "「죄송해요, 그 부분에 대한 설명을 아직 안 드렸네요」"

[[dialogue]]
speaker = "unk"
original = "俺たちはノルトハウゼンさんにも、これまでの経緯を説明する。"
translation = "우리는 노르트하우젠 씨에게도 지금까지의 경위를 설명한다."

[[dialogue]]
speaker_original = "ノルトハウゼン"
speaker_translation = "노르트하우젠"
original = "「……つまり、この赤ちゃんクマロボさんの父親が車掌さまかもしれない、ということですか？」"
translation = "「……즉, 이 아기 곰 로봇 씨의 아버지가 차장님일지도 모른다는 말씀인가요?」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「そういうことくま！」"
translation = "「그 말이다곰!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「その案内人としてあなたは呼び出されたのだけれど、ここではなく少し離れた場所に召喚されてしまった、というわけね」"
translation = "「그 안내인으로서 당신이 불려 온 것이지만, 여기가 아니라 조금 떨어진 장소에 소환되어 버렸다는 거지」"

[[dialogue]]
speaker_original = "ノルトハウゼン"
speaker_translation = "노르트하우젠"
original = "「事情は理解しました」"
translation = "「사정은 이해했습니다.」"

[[dialogue]]
speaker_original = "ノルトハウゼン"
speaker_translation = "노르트하우젠"
original = "「わたくし、この子の力になりたいですわ！\u3000一刻も早く、お父さまを見つけてあげませんと！」"
translation = "「저, 이 아이의 힘이 되어주고 싶어요! 하루라도 빨리 아버님을 찾아줘야겠네요!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "（すごい、疑うパートがなかった……）"
translation = "(대단해, 의심하는 단계가 없었어……)"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "（あっさり信じたわね……）"
translation = "(너무 쉽게 믿어버리네……)"

[[dialogue]]
speaker_original = "ルルゥ"
speaker_translation = "루루"
original = "（とっても純粋なヒト、なの……）"
translation = "(정말 순수한 사람인 거야……)"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ところで……ずっと気になっていたのだけれど、あなたはどうして新星学園の制服を着ているのかしら？」"
translation = "「그런데…… 계속 신경 쓰였는데, 당신은 어째서 신성 학원의 교복을 입고 있는 거니?」"

[[dialogue]]
speaker_original = "ノルトハウゼン"
speaker_translation = "노르트하우젠"
original = "「あら……いけませんわ、わたくしリーリアさんに制服をお借りしたんですの。それをそのまま着てきてしまいました」"
translation = "「어머…… 이러면 안 되는데, 제가 리리아 씨에게 교복을 빌렸거든요. 그걸 그대로 입고 와버렸네요.」"

[[dialogue]]
speaker = "unk"
original = "リーリアの制服なんですか、それ？"
translation = "리리아의 교복인가요, 그거?"

[[dialogue]]
speaker_original = "ノルトハウゼン"
speaker_translation = "노르트하우젠"
original = "「はい、なんでも潜入用に用意していた、予備の制服だとか」"
translation = "「네, 뭐든 잠입용으로 준비해 뒀던 예비 교복이라던가.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「予備なら大丈夫よ、記念にもらっておきなさい。けれど……あの子の制服だと、胸の辺りがサイズ的に厳しくないかしら？」"
translation = "「예비라면 괜찮아, 기념으로 받아 두렴. 하지만…… 그 아이의 교복이라면 가슴 쪽 사이즈가 좀 끼지 않니?」"

[[dialogue]]
speaker_original = "ノルトハウゼン"
speaker_translation = "노르트하우젠"
original = "「いえ、そんなことはありませんよ。むしろ丁度いいですわ」"
translation = "「아니요, 그렇지 않아요. 오히려 딱 맞답니다.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「そうかしら？\u3000おかしいわね……」"
translation = "「그래? 이상하네……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あの、マム……それ以上はやめてあげてください……」"
translation = "「저기, 마무 선배…… 그 이상은 그만해 주세요……」"

[[dialogue]]
speaker = "unk"
original = "友達以外にはバレてないつもりなんです"
translation = "친구 말고는 안 들켰다고 생각하고 있거든요"

[[dialogue]]
speaker = "unk"
original = "リーリアの胸パッド……"
translation = "리리아의 가슴 패드……"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「そのわりにはあの子、この私に豊胸パッドをオススメしてきたわよ……？」"
translation = "「그것치고는 그 아이, 이 나에게 가슴 패드를 추천해 줬다고……?」"

[[dialogue]]
speaker = "unk"
original = "あの後輩、無敵か？\u3000もしマムが胸のサイズを気にしていたら、今頃命は無かったぞ……"
translation = "그 후배, 무적인가? 만약 마무 선배가 가슴 사이즈를 신경 쓰고 있었다면 지금쯤 목숨이 없었을 텐데……"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「まあ、そんなことはどうでもいいわ。それで、どうしてあなたがリーリアの制服を？」"
translation = "「뭐, 그런 건 아무래도 좋아. 그래서 어째서 당신이 리리아의 교복을?」"

[[dialogue]]
speaker_original = "ノルトハウゼン"
speaker_translation = "노르트하우젠"
original = "「わたくしがハルツの魔法使いだと名乗ると、実際に魔法を見せて欲しいといわれまして」"
translation = "「제가 하르츠의 마법사라고 소개하니 실제로 마법을 보여달라고 하시더라고요.」"

[[dialogue]]
speaker_original = "ノルトハウゼン"
speaker_translation = "노르트하우젠"
original = "「『虹を見たい』というリクエストを頂いたので、それに応えようとしたのですが、失敗してずぶ濡れになってしまいましたわ」"
translation = "「『무지개를 보고 싶다』는 요청을 받아서 그에 응하려 했습니다만, 실패해서 흠뻑 젖어버렸답니다.」"

[[dialogue]]
speaker_original = "ノルトハウゼン"
speaker_translation = "노르트하우젠"
original = "「花火が上手くいったものですから、もしかしたら、と思ったのですが……世の中そう上手くはいかないものですね」"
translation = "「불꽃놀이가 잘 됐길래 혹시나 싶었습니다만…… 세상일이 그렇게 마음대로 되지는 않네요.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「制服についてはわかったわ……もうひとついいかしら？」"
translation = "「교복에 대해서는 알겠어…… 하나 더 물어봐도 될까?」"

[[dialogue]]
speaker_original = "ノルトハウゼン"
speaker_translation = "노르트하우젠"
original = "「はい、なんでしょう？」"
translation = "「네, 무엇인가요?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「次に向かう世界はイリスクラウド、ということね。そこはどういう場所なのかしら？」"
translation = "「다음에 갈 세계는 이리스 클라우드라는 거지. 그곳은 어떤 곳이니?」"

[[dialogue]]
speaker_original = "ルルゥ"
speaker_translation = "루루"
original = "「そ、そうなの……それは知っておいた方がいいことだと思う、なの……」"
translation = "「그, 그런 거야…… 그건 알아두는 게 좋다고 생각하는 거야……」"

[[dialogue]]
speaker_original = "ノルトハウゼン"
speaker_translation = "노르트하우젠"
original = "「イリスクラウドは『アイゼングラート』『セントイリス』『ヴェルフォレット』『フレイマリン』『ニシキ』の五ヵ国から成る大陸ですの」"
translation = "「이리스 클라우드는 『아이젠그라트』 『센트 이리스』 『벨포렛』 『프레이마린』 『니시키』의 다섯 나라로 이루어진 대륙이랍니다.」"

[[dialogue]]
speaker_original = "ノルトハウゼン"
speaker_translation = "노르트하우젠"
original = "「各国は共同で開発された『ミストトレイン』によって行き来されますわ」"
translation = "「각국은 공동으로 개발된 『미스트 트레인』을 통해 오가게 돼요.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「『霧』はどうなったのでしょうか……？」"
translation = "「『안개』는 어떻게 되었나요……?」"

[[dialogue]]
speaker_original = "ノルトハウゼン"
speaker_translation = "노르트하우젠"
original = "「『<ruby>幻霧<rt>げんむ</rt></ruby>』のことをご存知ですのね？\u3000<ruby>幻霧<rt>げんむ</rt></ruby>は……変わらず大陸全土を覆っています」"
translation = "「『환무』에 대해 알고 계시는군요? 환무는…… 변함없이 대륙 전역을 뒤덮고 있어요.」"

[[dialogue]]
speaker_original = "ノルトハウゼン"
speaker_translation = "노르트하우젠"
original = "「わたくしもプトラさんと同じく特鉄隊に所属していますから、幻霧から生まれるミストモンスターと今も戦っていますわ」"
translation = "「저도 푸트라 씨와 마찬가지로 특철대에 소속되어 있어서, 환무에서 태어나는 미스트 몬스터와 지금도 싸우고 있답니다.」"

[[dialogue]]
speaker_original = "ルルゥ"
speaker_translation = "루루"
original = "「次はそんな大変な世界に行く、なの……？」"
translation = "「다음은 그런 험난한 세계에 가는 거야……?」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「パパを見つけるためなら、どんな危険な世界でも行くしかないくま！」"
translation = "「아빠를 찾기 위해서라면 아무리 위험한 세계라도 갈 수밖에 없다곰!」"

[[dialogue]]
speaker_original = "赤ちゃんクマロボ"
speaker_translation = "아기 곰 로봇"
original = "「ばぶー<emoji=heart04>」"
translation = "「바부~<emoji=heart04>」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「ではそろそろ出発するくま！」"
translation = "「그럼 슬슬 출발하는곰!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「待ってください！」"
translation = "「기다려 주세요!」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「ん？\u3000どうしたくま？」"
translation = "「응? 왜 그러곰?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「私も……一緒に連れて行ってもらえませんか？」"
translation = "「저도…… 같이 데려가 주시면 안 될까요?」"

[[dialogue]]
speaker = "unk"
original = "フィオナ……？"
translation = "피오나……?"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「緋宮会長、少しの間、流星市国の留守をお願いできないでしょうか？\u3000私も、この子の父親を見つけてあげたいんです」"
translation = "「히노미야 회장님, 잠시 동안 유성시국을 잘 부탁드려도 될까요? 저도 이 아이의 아버지를 찾아주고 싶어요」"

[[dialogue]]
speaker = "unk"
original = "気持ちはわかるけど……"
translation = "마음은 알겠지만……"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「手伝うのはいいわ。けれど、私の時のようにちゃんと元の世界に戻してもらえるのよね？」"
translation = "「돕는 건 좋아. 하지만 내 때처럼 제대로 원래 세계로 돌려보내 주는 거겠지?」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「それは大丈夫くま。用件が終わったら、ちゃんと送り返すくま！」"
translation = "「그건 걱정 마라곰. 볼일이 끝나면 제대로 돌려보내 주는곰!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「そう、ならいいわ。後は任せたわよ、フィオナ」"
translation = "「그래, 그렇다면 됐어. 뒷일은 맡길게, 피오나」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はい、お任せください！」"
translation = "「네, 맡겨주세요!」"

[[dialogue]]
speaker_original = "ルルゥ"
speaker_translation = "루루"
original = "「あ、あの！\u3000ルルゥもそろそろ、ゲシュペンス島に帰りたい、なの」"
translation = "「저, 저기! 루루도 이제 슬슬, 게슈펜스 섬으로 돌아가고 싶은 거인 거야」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「そうね、その方がいいわ。あなたのご主人様もきっと心配しているでしょうし」"
translation = "「그렇네, 그게 좋겠어. 당신의 주인님도 분명 걱정하고 있을 테니까」"

[[dialogue]]
speaker_original = "ルルゥ"
speaker_translation = "루루"
original = "「えへへっ……そうかもなの」"
translation = "「에헤헤…… 그럴지도 모르는 거인 거야」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「ちゃんと帰すくま！\u3000だけど、赤ちゃんの父親探しは一刻を争うくま！！」"
translation = "「제대로 돌려보내겠다곰! 하지만, 아기의 아빠 찾기는 일각을 다투는 일이다곰!!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「本当にそうだったかしら……？」"
translation = "「정말로 그랬던가……?」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「まずはこの子のパパを見つけてあげて、それからみんなを元の世界に帰すくま！\u3000くまは約束を破らないくま！！」"
translation = "「우선은 이 아이의 아빠를 찾아주고, 그러고 나서 모두를 원래 세계로 돌려보내겠다곰! 곰은 약속을 어기지 않는다곰!!」"

[[dialogue]]
speaker_original = "ルルゥ"
speaker_translation = "루루"
original = "「あ、あの……ちゃんと帰してもらえるなら、ルルゥは急がない、なのっ」"
translation = "「저, 저기…… 제대로 돌려보내 주신다면, 루루는 서두르지 않는 거야」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「まあ、あなたがそう言うのなら、構わないけれど」"
translation = "「뭐, 네가 그렇게 말한다면, 상관없지만」"

[[dialogue]]
speaker_original = "ベア子"
speaker_translation = "베아코"
original = "「それじゃあ、イリスクラウドに向かうのはあたしと黒ベア子、ノルトハウゼンさんにフィオナさんくまね？」"
translation = "「그럼, 이리스 클라우드로 향하는 건 나랑 흑베아코, 노르트하우젠 씨랑 피오나 씨인 거곰?」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「次の世界へ、レッツゴーくまーっ♪」"
translation = "「다음 세계로, 렛츠 고 곰!」"

[[dialogue]]
speaker = "unk"
original = "黒ベア子の元気な声と共に、またしてもあの黒い穴が宙に浮かび上がる。"
translation = "흑베아코의 활기찬 목소리와 함께, 또다시 그 검은 구멍이 허공에 떠오른다."

[[dialogue]]
speaker = "unk"
original = "その中に、４人の姿が消えていく。"
translation = "그 안으로, 4명의 모습이 사라져 간다."

[[dialogue]]
speaker = "unk"
original = "果たして赤ちゃんクマロボの父親なる存在は見つかるのか──"
translation = "과연 아기 곰 로봇의 아버지라는 존재는 찾을 수 있을 것인가──"

[[dialogue]]
speaker = "unk"
original = "可能性は薄そうだな、などと思いつつも、俺たちはその背中を見送ったのだった。"
