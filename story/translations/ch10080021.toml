[[dialogue]]
speaker = "unk"
original = "第１話,恋愛の勉強,P"
translation = "제1화, 연애 공부, P"

[[dialogue]]
speaker = "unk"
original = "色々あって恋人同士になった俺とアナだったが、お互い恋愛について意識しない人生をおくっていたため、２人の時間では『恋愛についての勉強』をするようになった──"
translation = "여러 일이 있어 연인이 된 나와 아나였지만, 서로 연애에 대해 의식하지 않는 인생을 살아왔기 때문에, 둘만의 시간에는 『연애에 대한 공부』를 하게 되었다──"

[[dialogue]]
speaker = "アナ"
original = "「――というわけで、今日はお家デートの勉強をしましょう」"
translation = "「――그런 고로, 오늘은 집 데이트 공부를 하죠」"

[[dialogue]]
speaker = "アナ"
original = "「会長とは既に何度かお家デートをしていますが……このところ、星徒会が忙しくてなかなか２人きりの時間が取れていませんでした」"
translation = "「회장님과는 이미 몇 번인가 집 데이트를 했습니다만…… 요 근래, 성도회가 바빠서 좀처럼 둘만의 시간을 갖지 못했습니다」"

[[dialogue]]
speaker = "アナ"
original = "「一応、遊べる道具は持って来ていますので、新たな発見は見込めるかと」"
translation = "「일단, 놀 수 있는 도구는 가져왔으니, 새로운 발견을 기대할 수 있을까 합니다」"

[[dialogue]]
speaker = "unk"
original = "それは……ジグソーパズル？"
translation = "그건…… 직소 퍼즐?"

[[dialogue]]
speaker = "アナ"
original = "「イエス。私の趣味の１つです」"
translation = "「예스. 제 취미 중 하나입니다」"

[[dialogue]]
speaker = "アナ"
original = "「ジグソーパズルは、人間界で出会った中でも非常に良いモノです。考えに行き詰った時に、脳をリラックスさせつつ回転を促すのにちょうどいい」"
translation = "「직소 퍼즐은 인간계에서 만난 것 중에서도 매우 좋은 물건입니다. 생각이 막혔을 때, 뇌를 리렉스시키면서 회전을 돕기에 딱 좋죠」"

[[dialogue]]
speaker = "アナ"
original = "「全体図を想像し、俯瞰しながら組み立てるので、問題解決力の向上に繋がる。更に完成したものを再度作り直す際は、記憶力のトレーニングにもなる」"
translation = "「전체도를 상상하며 조감하며 조립하므로, 문제 해결 능력 향상으로 이어집니다. 게다가 완성된 것을 다시 만들 때는 기억력 트레이닝도 되죠」"

[[dialogue]]
speaker = "アナ"
original = "「なので、今日はその良さを伝えることも兼ねて、会長も一緒にジグソーパズルをやりましょう」"
translation = "「그러니 오늘은 그 장점을 전하는 것도 겸해서, 회장님도 함께 직소 퍼즐을 하죠」"

[[dialogue]]
speaker = "unk"
original = "……俺の膝の上に座りながらやるのか？"
translation = "……내 무릎 위에 앉아서 하는 건가?"

[[dialogue]]
speaker = "アナ"
original = "「ノープロブレム。いつもの星徒会での仕事と同じ定位置です」"
translation = "「노 프로블럼. 평소 성도회 업무 때와 같은 정위치입니다」"

[[dialogue]]
speaker = "アナ"
original = "「むしろ、最近はこの体勢の方がしっくり来ます。会長が後ろにいるので、安心感があって落ち着く」"
translation = "「오히려 최근에는 이 자세가 더 딱 맞습니다. 회장님이 뒤에 계셔서 안심감이 있고 진정돼요」"

[[dialogue]]
speaker = "アナ"
original = "「――ん？\u3000星徒会室はいいけど、２人きりの時だと落ち着かない、ですか？」"
translation = "「――음? 성도회실은 괜찮지만, 둘만 있을 때면 진정이 안 된다, 인가요?」"

[[dialogue]]
speaker = "アナ"
original = "「――この体勢になると、どうしても密着するから変な気分になる？」"
translation = "「――이 자세가 되면 아무래도 밀착하게 되니까 이상한 기분이 든다?」"

[[dialogue]]
speaker = "アナ"
original = "「んっ……<emoji=heart04>\u3000こら、ダメですよ、会長。……今はジグソーパズルの時間……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 이봐요, 안 돼요, 회장님. ……지금은 직소 퍼즐 시간……<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「まあ……恋人同士ですし。う、後ろから抱き締めるくらいは別に構いませんが……<emoji=heart04>」"
translation = "「뭐…… 연인 사이니까요. 뒤, 뒤에서 껴안는 정도는 딱히 상관없습니다만……<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「と、とにかく今は、ジグソーパズルの良さを知ってもらいたいので、そちらに集中して下さい」"
translation = "「어, 어쨌든 지금은 직소 퍼즐의 장점을 알아주셨으면 하니, 그쪽에 집중해 주세요」"

[[dialogue]]
speaker = "アナ"
original = "「え～、じゃないです。ほら、ここの絵の繋がりとか分かりやすそうですよ。会長も一緒にピースを探して下さい」"
translation = "「에~, 가 아니에요. 자, 여기 그림이 이어지는 게 알기 쉬워 보여요. 회장님도 함께 피스를 찾아주세요」"

[[dialogue]]
speaker = "アナ"
original = "「１０００ピースのうち、半分くらい出来ましたね。少し休憩しますか？」"
translation = "「1000피스 중에 절반 정도 완성됐네요. 잠시 쉴까요?」"

[[dialogue]]
speaker = "unk"
original = "なら、俺も良いものを用意してるんだ"
translation = "그럼, 나도 좋은 걸 준비했어"

[[dialogue]]
speaker = "アナ"
original = "「冷蔵庫から持ってきたそれは……プリンですか？\u3000なるほど、和抹茶プリン。とても美味しそうです……！」"
translation = "「냉장고에서 가져온 그것은…… 푸딩인가요? 과연, 화(和) 말차 푸딩. 무척 맛있어 보입니다……!」"

[[dialogue]]
speaker = "アナ"
original = "「早速食べてもいいですか？\u3000――はい、いただきます」"
translation = "「당장 먹어도 될까요? ――네, 잘 먹겠습니다」"

[[dialogue]]
speaker = "アナ"
original = "「もぐもぐ……おっ……おぉぉぉ……！\u3000す、凄く美味しいです。抹茶の上品な甘さが口の中でとろけるように広がります……！」"
translation = "「우물우물…… 오…… 오오오……! 저, 정말 맛있습니다. 말차의 품격 있는 단맛이 입안에서 녹아내리듯 퍼집니다……!」"

[[dialogue]]
speaker = "アナ"
original = "「こ、このプリンは一体どこのメーカーの？\u3000和菓子好きとして、是非ともリピートしたい味です……！」"
translation = "「이, 이 푸딩은 대체 어느 메이커인가요? 화과자 애호가로서 꼭 리피트하고 싶은 맛입니다……!」"

[[dialogue]]
speaker = "アナ"
original = "「って、会長……？\u3000どうして嬉しそうに笑っているんですか？」"
translation = "「그나저나 회장님……? 어째서 기쁜 듯이 웃고 계신 건가요?」"

[[dialogue]]
speaker = "unk"
original = "手作りなんだ。アナの口に合って良かった"
translation = "수제야. 아나 입맛에 맞아서 다행이다"

[[dialogue]]
speaker = "アナ"
original = "「なっ……えぇっ！？\u3000会長がこれを作ったんですか……！？\u3000いつの間にそんな技術を……」"
translation = "「나…… 에엣!? 회장님이 이걸 만드신 건가요……!? 어느 사이에 그런 기술을……」"

[[dialogue]]
speaker = "アナ"
original = "「――付き合い始めた日のこと、ですか？\u3000はい、もちろん覚えていますが……」"
translation = "「――사귀기 시작한 날의 일, 말인가요? 네, 물론 기억하고 있습니다만……」"

[[dialogue]]
speaker = "アナ"
original = "「か、会長が私のことを好き……！？\u3000ま、まったく予想してなかったわけではありませんが……それでも、本当に私を選ぶなんて」"
translation = "「회, 회장님이 저를 좋아한다……!? 저, 전혀 예상하지 못한 건 아니었지만…… 그래도 정말로 저를 선택하시다니」"

[[dialogue]]
speaker = "アナ"
original = "「――い、嫌ではないです。会長は魅力的な男性だと……思います」"
translation = "「시, 싫지는 않습니다. 회장님은 매력적인 남성이라고…… 생각합니다」"

[[dialogue]]
speaker = "アナ"
original = "「優しいですし、器用で仕事もできる。前会長を打ち破る実力があり、それにも関わらず努力を常に怠らないで訓練し続けるのは、カッコいいと感じます……ですが」"
translation = "「다정하시고, 손재주도 좋고 일도 잘하시죠. 전 회장님을 꺾을 실력이 있으면서도, 그런데도 노력을 게을리하지 않고 계속 훈련하시는 건 멋지다고 느낍니다…… 하지만」"

[[dialogue]]
speaker = "アナ"
original = "「むしろ、会長は……私のどんなところが好き、なんですか？\u3000私は自分がそこまで可愛いとは、正直思っていません。前会長や、サーシャ先輩、マトイ先輩の方がずっと――」"
translation = "「오히려 회장님은…… 제 어떤 점이 좋으신 건가요? 저는 제 자신이 그렇게까지 귀엽다고는 솔직히 생각하지 않습니다. 전 회장님이나 사샤 선배, 마토이 선배가 훨씬──」"

[[dialogue]]
speaker = "アナ"
original = "「え？\u3000小動物みたいで可愛い？\u3000眼鏡が似合う？\u3000和菓子に目がなくてチョロい？\u3000マイペースなようで真面目なところ？\u3000クールなようで心優しい……ま、まだあるんですか？」"
translation = "「에? 소동물 같아서 귀엽다? 안경이 잘 어울린다? 화과자에 사족을 못 써서 쵸로이하다? 마이페이스 같으면서도 성실한 점? 쿨한 것 같으면서도 마음이 따뜻한…… 아, 아직 더 있나요?」"

[[dialogue]]
speaker = "アナ"
original = "「――い、一体いくつ出て来るんですか？\u3000数え切れないくらい好きポイントがあるって……。あ、あうぅ」"
translation = "「――대, 대체 몇 개나 나오는 건가요? 셀 수 없을 정도로 좋아하는 포인트가 있다니……. 아, 아우으」"

[[dialogue]]
speaker = "アナ"
original = "「も、もういいですっ！\u3000分かりました。会長が私のことを好きなのは、よく分かりましたから……」"
translation = "「이, 이제 됐습니다! 알겠어요. 회장님이 저를 좋아하는 건 아주 잘 알았으니까……」"

[[dialogue]]
speaker = "unk"
original = "美味しい和菓子の作り方、勉強するから"
translation = "맛있는 화과자 만드는 법, 공부할 테니까"

[[dialogue]]
speaker = "アナ"
original = "「だから付き合って欲しいと？\u3000和菓子を作ってくれる恋人は、確かに魅力的ですが……それよりも――」"
translation = "「그래서 사귀어 달라는 거였죠? 화과자를 만들어 주는 연인은 확실히 매력적입니다만…… 그보다도──」"

[[dialogue]]
speaker = "アナ"
original = "「私としては、男女の付き合い方を一緒に勉強してくれると……嬉しいです」"
translation = "「저로서는 남녀가 사귀는 법을 함께 공부해주시면…… 기쁘겠습니다」"

[[dialogue]]
speaker = "アナ"
original = "「会長との恋人関係に興味はありますが……私は恋愛、初心者ですので」"
translation = "「회장님과의 연인 관계에 흥미는 있습니다만…… 저는 연애 초보니까요」"

[[dialogue]]
speaker = "アナ"
original = "「……本当にあれから、和菓子の作り方を勉強していたんですね」"
translation = "「……정말로 그때부터 화과자 만드는 법을 공부하고 계셨군요」"

[[dialogue]]
speaker = "アナ"
original = "「――ようやく最近、披露できるレベルになった？\u3000私の為に、そこまでしなくても良かったのに……」"
translation = "「――겨우 최근에 선보일 수 있는 레벨이 됐다? 저를 위해 그렇게까지 하지 않으셔도 됐는데……」"

[[dialogue]]
speaker = "unk"
original = "好きな子には、やっぱり喜んでもらいたい"
translation = "좋아하는 아이는 역시 기쁘게 해주고 싶으니까"

[[dialogue]]
speaker = "アナ"
original = "「会長はまた、そういうことを……」"
translation = "「회장님은 또 그런 소리를……」"

[[dialogue]]
speaker = "unk"
original = "アナは正面から俺の膝の上に座り、じっと見上げて来る――"
translation = "아나는 정면에서 내 무릎 위에 앉아 가만히 올려다본다──"

[[dialogue]]
speaker = "アナ"
original = "「――ジグソーパズルは再開しないのかって？\u3000一応、会長から美味しい和菓子をもらいましたので……」"
translation = "「――직소 퍼즐은 재개하지 않느냐고요? 일단 회장님께 맛있는 화과자를 받았으니……」"

[[dialogue]]
speaker = "アナ"
original = "「先に、そのお礼をするのが筋かなと思いまして」"
translation = "「먼저 그 답례를 하는 게 도리라고 생각해서요」"

[[dialogue]]
speaker = "unk"
original = "アナ、可愛い……好きだ"
translation = "아나, 귀여워…… 좋아해"

[[dialogue]]
speaker = "アナ"
original = "「んっ……<emoji=heart04>\u3000会長、頭を撫でながら、耳元で囁くのはズルいです……」"
translation = "「응……<emoji=heart04> 회장님, 머리를 쓰다듬으면서 귓가에 속삭이는 건 반칙이에요……」"

[[dialogue]]
speaker = "アナ"
original = "「――私が会長のことを好きか？\u3000そんな野暮なこと、聞かないで下さい……<emoji=heart04>」"
translation = "「――제가 회장님을 좋아하냐고요? 그런 야보한 질문은 하지 말아 주세요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その後、２人でじっくりイチャイチャの勉強に勤しむのだった――"
translation = "그 후, 둘이서 듬뿍 꽁냥꽁냥 공부에 힘쓰는 것이었다──"

