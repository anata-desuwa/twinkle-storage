[[dialogue]]
speaker = "unk"
original = "第２話,自称・悪の終末兵器（後編）,P"
translation = "제2화, 자칭·악의 종말병기 (후편), P"

[[dialogue]]
speaker = "unk"
original = "プリムラと初めて出会い、<ruby>眷族<rt>けんぞく</rt></ruby>の契約をしてしてしまった後。俺達は場所を星徒会室へと移して、話し合うことになった――"
translation = "프리뮬러와 처음 만나 권속 계약을 맺어버린 후. 우리들은 장소를 성도회실로 옮겨 이야기를 나누게 되었다――"

[[dialogue]]
speaker = "サチ"
original = "「――なるほど。お兄さんとプリムラが契約を結んだ経緯は、大体わかりました」"
translation = "「――과연. 오빠와 프리뮬러가 계약을 맺게 된 경위는 대충 알겠습니다」"

[[dialogue]]
speaker = "サチ"
original = "「で、プリムラ！\u3000悪事はもうバレたんだから、いさぎよく契約を破棄しなさい！」"
translation = "「자, 프리뮬러! 나쁜 짓은 이미 들통났으니까 순순히 계약을 파기해!」"

[[dialogue]]
speaker = "プリムラ"
original = "「それができたらとっくにやっておるわ！\u3000こやつに飲ませた我の体の一部が、命令を全く受け付けぬのじゃ！」"
translation = "「그게 가능했으면 벌써 했느니라! 이 녀석에게 먹인 나의 신체 일부가 명령을 전혀 듣지 않는단 말이다!」"

[[dialogue]]
speaker = "サチ"
original = "「自分の一部に拒否されるって……お兄さんの方からも、契約は破棄できない感じですか？」"
translation = "「자기 일부에게 거부당하다니…… 오빠 쪽에서도 계약은 파기할 수 없는 느낌인가요?」"

[[dialogue]]
speaker = "unk"
original = "体内でぷるぷるとすり寄られてる感が……"
translation = "체내에서 말랑말랑하게 달라붙어 오는 느낌이……"

[[dialogue]]
speaker = "プリムラ"
original = "「懐柔されておるではないか！\u3000ぐぬぬ……まさか貴様が、我を眷族にする程の膨大な力を秘めていようとは……我が本来の力を取り戻せば、負けるはずないというのに……！」"
translation = "「회유당하고 있지 않느냐! 구누누…… 설마 네놈이 나를 권속으로 삼을 정도의 방대한 힘을 숨기고 있었을 줄이야…… 내가 본래의 힘을 되찾으면 질 리가 없는데……!」"

[[dialogue]]
speaker = "プリムラ"
original = "「――なに？\u3000そもそも我が一体何なのか、じゃと？\u3000最初に言うたであろう。我は『悪の終末兵器』なのじゃ！」"
translation = "「――뭐? 애초에 내가 대체 무엇이냐고? 처음에 말하지 않았느냐. 나는 『악의 종말병기』이니라!」"

[[dialogue]]
speaker = "サチ"
original = "「嘘臭い主張ですが、本当です。プリムラの正体は、ロストアイテムの１つ『賢者の石』を素材として作られた、リクリエを引き起こす為の終末兵器――」"
translation = "「거짓말 같은 주장이지만 사실이에요. 프리뮬러의 정체는 로스트 아이템 중 하나인 『현자의 돌』을 소재로 만들어진, 리크리에를 일으키기 위한 종말병기――」"

[[dialogue]]
speaker = "プリムラ"
original = "「『メルクリウス』。それが我の、兵器としての真名じゃ。周囲のエネルギーを種類問わず吸収し、無限に成長し続ける」"
translation = "「『메르쿠리우스』. 그것이 나의 병기로서의 진명이니라. 주위의 에너지를 종류 불문하고 흡수하여 무한히 성장해 나가지」"

[[dialogue]]
speaker = "プリムラ"
original = "「そうやってリクリエを引き起こすのが、我に与えられた命令じゃった」"
translation = "「그렇게 리크리에를 일으키는 것이 나에게 주어진 명령이었느니라」"

[[dialogue]]
speaker = "サチ"
original = "「ただし、プリムラが何者に作られ、命令されたのかは、自分でも知らないそうです。おそらく、黒幕は自身の存在を隠したかったのでしょう」"
translation = "「다만 프리뮬러가 누구에 의해 만들어지고 명령받았는지는 본인도 모른다고 해요. 아마 흑막은 자신의 존재를 숨기고 싶었겠죠」"

[[dialogue]]
speaker = "プリムラ"
original = "「むっ……その顔は、まだ半信半疑といった様子じゃな？\u3000よかろう、ならば見るがよい！」"
translation = "「무음…… 그 얼굴은, 아직 반신반의한다는 모양새로구나? 좋다, 그렇다면 보거라!」"

[[dialogue]]
speaker = "プリムラ"
original = "「この場から１歩も動かず、あそこの来客用の菓子受けにあるチョコを、取ってみせるのじゃ！」"
translation = "「이 자리에서 한 발짝도 움직이지 않고, 저기 손님용 과자 그릇에 있는 초코를 집어 보이겠느니라!」"

[[dialogue]]
speaker = "プリムラ"
original = "「ゆくぞ、体を変形させて――」"
translation = "「간다, 몸을 변형시켜서――」"

[[dialogue]]
speaker = "unk"
original = "すごい！\u3000腕がゴムみたいに伸びた！"
translation = "대단해! 팔이 고무처럼 늘어났어!"

[[dialogue]]
speaker = "プリムラ"
original = "「フハハハ！\u3000どうじゃ！\u3000もぐもぐ……我は自在に体の形状や性質を変化させることができるのじゃ！」"
translation = "「후하하하! 어떠냐! 우물우물…… 나는 자재로 몸의 형상이나 성질을 변화시킬 수 있느니라!」"

[[dialogue]]
speaker = "プリムラ"
original = "「体の一部を分離し、貴様に飲ませたのも、この能力の応用というわけじゃ」"
translation = "「몸의 일부를 분리해 네놈에게 먹인 것도, 이 능력의 응용이라는 것이지.」"

[[dialogue]]
speaker = "サチ"
original = "「賢者の石は、どのような物質でも構成し、生み出せるロストアイテムだそうです」"
translation = "「현자의 돌은 어떤 물질로도 구성하고 만들어낼 수 있는 로스트 아이템이라고 해요.」"

[[dialogue]]
speaker = "サチ"
original = "「もっとも、今は能力の大部分が封印されていて、ハンパに変形できるスライムみたいな感じですが」"
translation = "「그치만 지금은 능력의 대부분이 봉인되어 있어서, 어설프게 변형할 수 있는 슬라임 같은 느낌이지만요.」"

[[dialogue]]
speaker = "プリムラ"
original = "「ハンパなスライム言うな！\u3000我はサチの持つ封印のロストアイテムによって、本来の力を奪われているのじゃ……そのせいで、今は腕や髪といった体の一部しか変形させられん」"
translation = "「어설픈 슬라임이라 하지 마라! 나는 사치가 가진 봉인의 로스트 아이템에 의해 본래의 힘을 빼앗긴 것이니라…… 그 탓에 지금은 팔이나 머리카락 같은 몸의 일부밖에 변형시키지 못해.」"

[[dialogue]]
speaker = "プリムラ"
original = "「言っておくが、本来の我はこんなちんちくりんボディではないのじゃぞ？\u3000ボンキュッボンな、大人ボディなのじゃ！\u3000それが気づいた時にはこんな姿に……」"
translation = "「말해두겠는데, 본래의 나는 이런 꼬맹이 바디가 아니란 말이다? 본·큐·본 한 성인 바디니라! 그게 정신을 차려보니 이런 모습으로……」"

[[dialogue]]
speaker = "プリムラ"
original = "「１年前、サチが幸運にも『星の鎖』を手にしていなければ、我が敗北などするはずなかったのじゃ……」"
translation = "「1년 전, 사치가 운 좋게 『별의 쇠사슬』을 손에 넣지 않았더라면 내가 패배할 리 없었느니라……」"

[[dialogue]]
speaker = "サチ"
original = "「１年前に、私がちょうどロストアイテムを回収していたんです。それが封印のロストアイテム『星の鎖』でした。回収した直後に、プリムラと遭遇する事件が起きて――」"
translation = "「1년 전에 제가 마침 로스트 아이템을 회수하고 있었거든요. 그게 봉인의 로스트 아이템 『별의 쇠사슬』이었어요. 회수한 직후에 프리뮬러와 조우하는 사건이 일어나서――」"

[[dialogue]]
speaker = "プリムラ"
original = "「我が兵器として起動したばかりのところに、突然、サチが現れた。この幸運をまき散らす化け物とは、一進一退の攻防を繰り広げたが……」"
translation = "「내가 병기로서 가동한 지 얼마 안 된 참에 갑자기 사치가 나타났다. 이 행운을 뿌리고 다니는 괴물과는 일진일퇴의 공방을 펼쳤다만……」"

[[dialogue]]
speaker = "プリムラ"
original = "「星の鎖が命運を分けた。こやつは幸運にものをいわせて、我の懐に飛び込み……気づいた時には我は封印され、このような姿になっていた」"
translation = "「별의 쇠사슬이 명운을 갈랐지. 이 녀석은 행운을 앞세워 내 품속으로 뛰어들었고…… 정신을 차렸을 때 나는 봉인되어 이런 모습이 되어 있었다.」"

[[dialogue]]
speaker = "サチ"
original = "「私が首に下げて、いつも服の内側にしまっているペンダントが、星の鎖です。先にも見せましたが、プリムラが反抗しようとすれば、こうやって――」"
translation = "「제가 목에 걸고 항상 옷 안쪽에 넣어두는 펜던트가 별의 쇠사슬이에요. 아까도 보여드렸지만, 프리뮬러가 반항하려고 하면 이렇게――」"

[[dialogue]]
speaker = "サチ"
original = "「拘束っ！」"
translation = "「구속!」"

[[dialogue]]
speaker = "プリムラ"
original = "「ちょっ！？」"
translation = "「잠깐!?」"

[[dialogue]]
speaker = "サチ"
original = "「――このように、拘束と命じることで、鎖を召喚できるんです」"
translation = "「――이런 식으로, 구속이라고 명령함으로써 사슬을 소환할 수 있어요.」"

[[dialogue]]
speaker = "プリムラ"
original = "「お試し感覚で我を簀巻きにするでないわ！\u3000というか、さっき１回やって見せたじゃろ！」"
translation = "「시험 삼아 나를 멍석말이 하지 마라! 그보다 아까 한 번 보여줬지 않느냐!」"

[[dialogue]]
speaker = "サチ"
original = "「今現在プリムラは、私が星の鎖を所持していることもあって、学園から許可を貰って、私の管理下に置いている状態です」"
translation = "「현재 프리뮬러는 제가 별의 쇠사슬을 소지하고 있기도 해서, 학원에서 허가를 받아 제 관리하에 두고 있는 상태예요.」"

[[dialogue]]
speaker = "サチ"
original = "「なので、プリムラがお兄さんと無理矢理契約をしたことについては、私の監督不行き届きでした。大変申し訳ありません」"
translation = "「그래서 프리뮬러가 오빠와 억지로 계약을 한 것에 대해서는 제 감독 불찰이었습니다. 정말 죄송합니다.」"

[[dialogue]]
speaker = "サチ"
original = "「契約の解除方法についてはもちろん見つけ出しますし、プリムラも責任を持って更生させるので、今回のことはどうか、お許しいただけないでしょうか……？」"
translation = "「계약 해제 방법에 대해서는 물론 찾아낼 거고, 프리뮬러도 책임지고 갱생시킬 테니, 이번 일은 부디 용서해 주실 수 없을까요……?」"

[[dialogue]]
speaker = "プリムラ"
original = "「ふん、更生など誰がするか！\u3000我はあくまで悪の終末兵器として生まれた存在。いつか必ず力を取り戻し、世界征服をしてやるのじゃ！」"
translation = "「흥, 갱생 따위 누가 할쏘냐! 나는 어디까지나 악의 종말병기로서 태어난 존재. 언젠가 반드시 힘을 되찾아 세계정복을 하고 말 것이니라!」"

[[dialogue]]
speaker = "プリムラ"
original = "「故に、我のことを舐めて油断すれば、いつか体の内側から食い破られることになるぞ……！」"
translation = "「고로 나를 얕보고 방심했다간, 언젠가 몸 안쪽에서부터 뜯어 먹히게 될 것이야……!」"

[[dialogue]]
speaker = "プリムラ"
original = "「体から我の分体を取り除けない以上、主従を逆転するチャンスはこれからいくらでもあるのじゃからな！」"
translation = "「몸에서 나의 분체를 제거하지 못하는 이상, 주종을 역전할 찬스는 앞으로 얼마든지 있을 테니까 말이다!」"

[[dialogue]]
speaker = "サチ"
original = "「こら、プリムラ！\u3000アンタまだそんなこと言って……！」"
translation = "「얘, 프리뮬러! 너 아직도 그런 소리를……!」"

[[dialogue]]
speaker = "unk"
original = "いいよ、サチ。これからよろしく、プリムラ"
translation = "괜찮아, 사치. 앞으로 잘 부탁해, 프리뮬러."

[[dialogue]]
speaker = "プリムラ"
original = "「お、おう……って、いや少しはビビらんか！\u3000なに澄ました顔をしとるのじゃ！？」"
translation = "「어, 어우…… 아니, 조금은 겁먹으란 말이다! 어째서 태연한 얼굴을 하고 있는 것이냐!?」"

[[dialogue]]
speaker = "プリムラ"
original = "「さては貴様、我を逆に眷族にしたからと、調子に乗っておるな！？\u3000子供っぽい見た目だからと、舐めるでないわ！」"
translation = "「설마 네놈, 나를 역으로 권속으로 삼았다고 우쭐해 있는 거냐!? 어린애 같은 외모라고 얕보지 마라!」"

[[dialogue]]
speaker = "プリムラ"
original = "「――そうではないじゃと？\u3000だったら、なんだと……」"
translation = "「――그게 아니라고? 그렇다면 무엇이냐……」"

[[dialogue]]
speaker = "unk"
original = "今の目的は世界征服なんでしょ？\u3000なら――"
translation = "지금 목적은 세계정복이잖아? 그렇다면――"

[[dialogue]]
speaker = "プリムラ"
original = "「――我が世界を滅ぼすはずがない、と？」"
translation = "「――내가 세계를 멸망시킬 리가 없다, 고?」"

[[dialogue]]
speaker = "プリムラ"
original = "「フ……クク……フハハハハ！\u3000気に入ったぞ、貴様！」"
translation = "「후…… 크크…… 후하하하하! 마음에 들었다, 네놈!」"

[[dialogue]]
speaker = "プリムラ"
original = "「面白いことを言う！\u3000サチへの特異点としてだけでなく、一個人として貴様に興味が湧いてきたぞ！」"
translation = "「재미있는 소리를 하는구나! 사치에 대한 특이점으로서뿐만 아니라, 한 개인으로서 네놈에게 흥미가 생겼느니라!」"

[[dialogue]]
speaker = "プリムラ"
original = "「ますます我の眷属にしたくなった！\u3000改めて宣言するぞ、新星の星徒会長！」"
translation = "「점점 더 나의 권속으로 삼고 싶어졌구나! 다시 한번 선언하마, 신성의 성도회장!」"

[[dialogue]]
speaker = "プリムラ"
original = "「我は必ずや主導権を奪い返し、貴様を我の眷族にしてみせるのじゃ！\u3000首を洗って待っているがよいぞ！\u3000フハハハハハ！」"
translation = "「나는 반드시 주도권을 되찾아 네놈을 나의 권속으로 만들고 말 것이니라! 목을 씻고 기다리고 있거라! 후하하하하하!」"

[[dialogue]]
speaker = "unk"
original = "自称・悪の終末兵器は愉快そうに笑いながら、その瞳を力強く輝かせるのだった。"
translation = "자칭 악의 종말병기는 즐거운 듯이 웃으며 그 눈동자를 힘차게 빛내는 것이었다."

