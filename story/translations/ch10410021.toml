[[dialogue]]
speaker = "unk"
original = "第１話,お試しの恋人,P"
translation = "제1화, 시험 삼아 연인, P"

[[dialogue]]
speaker = "unk"
original = "ネーゼマインと恋人関係になってしばらく経ったある日、公安委員会の任務を終えた後に、２人で一息ついていた。"
translation = "네제마인과 연인 관계가 되고 시간이 좀 흐른 어느 날, 공안위원회 임무를 마친 뒤 둘이서 한숨 돌리고 있었다."

[[dialogue]]
speaker = "ネーゼマイン"
original = "「会長、コンビニへのお使いありがとね～。うん、そのブラックコーヒーで大丈夫～」"
translation = "「회장님, 편의점 심부름 고마워~. 응, 그 블랙 커피면 돼~」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「でも、奢ってくれなくても、別によかったのに。今日は私の方が仕事を手伝ってもらったわけだし、むしろ会長に奢ろうと思ってたんだけど……」"
translation = "「근데 안 사줘도 괜찮았는데. 오늘은 내가 업무 도움을 받은 셈이고 오히려 회장님한테 사주려고 했거든……」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「――彼氏として、彼女を労いたい？\u3000にひひ、なにそれ～、カッコつけちゃって～♪」"
translation = "「――남자친구로서 여자친구를 위로하고 싶다고? 니히히, 뭐야 그게~, 멋부리기는~♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ただ、言われてみればこの頃、恋人らしいことできてなかったよね？\u3000お互い学園の仕事でやたら忙しくて、全然会えてなかったし」"
translation = "「다만 듣고 보니 요즘 연인다운 걸 못 하긴 했네? 서로 학원 일로 너무 바빠서 전혀 못 만났고」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「まぁ、恋人って言っても、お試し中ではあるんだけどさ～」"
translation = "「뭐, 연인이라고 해도 시험 기간이긴 하지만 말이야~」"

[[dialogue]]
speaker = "unk"
original = "そう、マインとは、正式な恋人関係ではない。以前、俺が彼女に好きだと告白した時――"
translation = "그렇다, 마인과는 정식 연인 관계가 아니다. 예전에 내가 그녀에게 좋아한다고 고백했을 때――"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「会長～、私のことが好きってマジで言ってる？\u3000――そっか～、本気なのか～」"
translation = "「회장님~, 나를 좋아한다는 거 진심이야? ――그렇구나~, 진심이구나~」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「……ただ、私は多分、会長が思っているよりも性格のよくない女だと思うよ？\u3000なにせ、自分で自分のことが好きじゃないくらいだからね～、私は」"
translation = "「……다만 나는 아마 회장님이 생각하는 것보다 성격이 좋지 않은 여자라고 생각하는데? 뭐랄까, 나 스스로도 나 자신을 좋아하지 않을 정도니까 말이야~, 나는」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「それでも、私と付き合いたいと思う？\u3000――ふ～ん、物好きだね～」"
translation = "「그래도 나랑 사귀고 싶어? ――흐음~, 별난 사람이네~」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「なら、まずはお試しで付き合ってみるのはどうかな？\u3000私、恋愛経験は皆無だから、付き合うって実感が湧かないのが正直なところだけど……」"
translation = "「그럼 우선 시험 삼아 사귀어 보는 건 어때? 나 연애 경험은 전무해서 사귄다는 실감이 안 나는 게 솔직한 심정이지만……」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「会長のことは、まぁ……嫌いじゃないしね♪」"
translation = "「회장님은 뭐…… 싫어하지 않으니까♪」"

[[dialogue]]
speaker = "unk"
original = "――そんなことがあって、マインとは未だお試し関係のまま、現在に至る。"
translation = "――그런 일이 있어서 마인과는 여전히 시험 관계인 채로 현재에 이르고 있다."

[[dialogue]]
speaker = "ネーゼマイン"
original = "「せっかくだし、久しぶりになんか恋人らしいことでもしてこっか？」"
translation = "「이왕 이렇게 된 거 오랜만에 좀 연인다운 짓이라도 할까?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「例えば、そうだな～。夜遅いけど、ゲームセンターはまだ空いている時間だし……寄ってく？」"
translation = "「예를 들어 그렇네~. 밤늦었지만 게임 센터는 아직 열려 있는 시간이고…… 들렀다 갈래?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「――にひひ♪\u3000決まりだね。それじゃあ、ちょっとした夜デートってことで♪」"
translation = "「――니히히♪ 결정됐네. 그럼 가벼운 밤 데이트라는 걸로♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ほらほら～、会長、もっとしっかりゲームの操作しないと～♪」"
translation = "「자자~, 회장님, 좀 더 제대로 게임 조작해야지~♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「せっかく私の好きなアーケードゲームの『ボムボムマン』のプレイスキルを伝授してあげようとしてるのに、全然集中できてないよ～？」"
translation = "「내가 좋아하는 아케이드 게임인 『봄봄맨』 플레이 기술을 전수해 주려는데 전혀 집중을 못 하네~?」"

[[dialogue]]
speaker = "unk"
original = "だって、マインが密着してくるから……！"
translation = "그치만 마인이 밀착해 오니까……!"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「え～？\u3000会長、そんなエッチこと考えてたの～？\u3000やらしいんだ～<emoji=heart04>」"
translation = "「에~? 회장님, 그런 야한 생각 하고 있었던 거야~? 음란하네~♥」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「それに恋人なんだから、これくらいのスキンシップは慣れていかないと～。ほらほら～♪」"
translation = "「게다가 연인이니까 이 정도 스킨십은 익숙해져야지~. 자자~♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「きゃははっ♪\u3000太もも撫でてるだけなのに、会長の手、震えちゃってる～！\u3000このままだと、ゲームオーバーになっちゃうよ～？」"
translation = "「꺄하핫♪ 허벅지 만지고 있을 뿐인데 회장님 손 떨고 있어~! 이대로라면 게임 오버 된다고~?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ほら、耳元で応援してあげるから……がんばれ、がんばれ<emoji=heart04>\u3000――ふぅ～っ<emoji=heart04>」"
translation = "「자, 귓가에서 응원해 줄 테니까…… 힘내라, 힘내♥ ――후우~♥」"

[[dialogue]]
speaker = "unk"
original = "ひゃわぁっ！？\u3000耳に息が当たって……！"
translation = "히야왓!? 귀에 입김이 닿아서……!"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「きゃはははっ♪\u3000今、すっごい声が出たよ、会長～！\u3000もう１回聞かせて欲しいな～<emoji=heart04>」"
translation = "「꺄하하하♪ 지금 엄청난 소리가 났어, 회장님~! 한 번 더 듣고 싶은데~♥」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「あ♪\u3000ほらほら、ちゃんとゲーム画面見て～？\u3000このままじゃ追い詰められて、負けちゃうよ～？」"
translation = "「아♪ 자자, 제대로 게임 화면 봐~? 이대로는 몰려서 져버린다구~?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「――あ～、負けちゃったね～♪\u3000会長、情けな～い<emoji=heart04>\u3000女の子と密着したくらいで、動揺しちゃうなんて～。会長の、スケベ雑魚～<emoji=heart04>」"
translation = "「――아~, 져버렸네~♪ 회장님 한심해라~♥ 여자애랑 밀착한 정도로 동요하다니~. 회장님은 음란 허접~♥」"

[[dialogue]]
speaker = "unk"
original = "いやこれ、どんなプレイ！？"
translation = "아니 이거 무슨 플레이야!?"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「きゃははっ♪\u3000恋人の協力プレイってやつかな～？」"
translation = "「꺄하핫♪ 연인의 협력 플레이라는 걸까나~?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「――ん～？\u3000ゲームセンターに来たのに、ゲームを楽しまなくていいのかって？\u3000それじゃあ、協力プレイは止めちゃってもいいのかな～？」"
translation = "「――음~? 게임 센터에 왔는데 게임을 즐기지 않아도 되냐고? 그럼 협력 플레이는 그만둬도 되는 걸까나~?」"

[[dialogue]]
speaker = "unk"
original = "……もう１回、お願いします"
translation = "……한 번 더 부탁드립니다"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「にひひ♪\u3000仕方ないな～」"
translation = "「니히히♪ 어쩔 수 없네~」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「次はさっきよりも、長く続けられるように頑張ってね？\u3000会長<emoji=heart04>」"
translation = "「다음은 아까보다 더 오래 버틸 수 있도록 노력해 봐? 회장님♥」"

[[dialogue]]
speaker = "unk"
original = "その後、ゲームセンターを出ての帰り道。マインは大きく伸びをすると――"
translation = "그 후 게임 센터를 나와 돌아오는 길. 마인은 기지개를 크게 켜더니――"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ん～♪\u3000ストレス解消もできてスッキリした～♪」"
translation = "「음~♪ 스트레스 해소도 되고 개운해졌다~♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「あ、でも、会長は悶々としちゃって大変だったかな～？\u3000なんてね～、にひひ♪」"
translation = "「아, 그래도 회장님은 끙끙대느라 고생 좀 했으려나~? 농담이야, 니히히♪」"

[[dialogue]]
speaker = "unk"
original = "久しぶりにマインと遊べて、楽しかったよ"
translation = "오랜만에 마인과 놀아서 즐거웠어"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「……！\u3000……あ～、会長はそういうこと、面と向かって言うんだもんな～」"
translation = "「……! ……아~, 회장님은 그런 말을 대놓고 한다니까~」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ん～……あれ？\u3000会長、まつ毛の上になんか、ゴミが付いてるよ？」"
translation = "「음…… 어라? 회장님 속눈썹 위에 뭔가 먼지가 붙어 있어」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「――まだ取れてないね～。私が取ってあげるから、目を閉じてくれる？」"
translation = "「――아직 안 떨어졌네. 내가 떼어줄 테니까 눈 좀 감아볼래?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ん……ちゅっ<emoji=heart04>」"
translation = "「음…… 쪽♥」"

[[dialogue]]
speaker = "unk"
original = "ファッ！？\u3000い、今、キス……！？"
translation = "홧!? 지, 지금 키스……!? 코"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「にひひっ♪\u3000いい顔だね～♪」"
translation = "「니히히♪ 좋은 표정이네~♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「忙しい中、仕事と遊びに付き合ってくれた今日のお礼だよ♪」"
translation = "「바쁜 와중에 업무랑 놀이에 어울려준 오늘의 답례야♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「じゃあ会長、またね～♪」"
translation = "「그럼 회장님, 다음에 봐~♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「……ふぅ。久しぶりに会長とキス、しちゃったな～……」"
translation = "「……후우. 오랜만에 회장님이랑 키스해 버렸네~……」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "（本当は、頬っぺたにするつもりだったんだけど……）"
translation = "(사실은 뺨에 할 생각이었지만……)"

[[dialogue]]
speaker = "ネーゼマイン"
original = "（まぁ……うん。しばらく会えてなかったしね。その分ってことで……♪）"
translation = "(뭐…… 응. 한동안 못 만났으니까. 그만큼이라고 치고……♪)"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「にひひ……<emoji=heart04>」"
translation = "「니히히……♥」"

[[dialogue]]
speaker = "unk"
original = "その日は珍しく鼻歌を唄いながら、家への帰路に着くネーゼマインなのであった。"
translation = "그날은 드물게 콧노래를 부르며 집으로 향하는 네제마인이었다."

