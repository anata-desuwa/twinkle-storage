[[dialogue]]
speaker = "unk"
original = "第１話,恋愛パートナー契約、締結,P"
translation = "제1화, 연애 파트너 계약, 체결"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「会長様、私の呼び出しに応えていただき、ありがとうございます。話というのは他でもありませんわ」"
translation = "「회장님, 저의 호출에 응해주셔서 감사합니다. 드릴 말씀은 다름이 아니에요.」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「私、もう自分の心に嘘は付けませんの。ですから、言わせてください」"
translation = "「저, 이제 제 마음에 거짓말을 할 수는 없어요. 그러니까 말하게 해주세요.」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「愛してますわ、会長様。よろしければ、私と恋愛パートナーとして、契約を結んではいただけませんか？」"
translation = "「사랑해요, 회장님. 괜찮으시다면 저와 연애 파트너로서 계약을 맺어주시지 않겠나요?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「唐突で驚かれてますわよね。無理なら無理とハッキリ言ってくださいませ」"
translation = "「갑작스러워서 놀라셨겠죠. 무리라면 무리라고 확실히 말씀해 주세요.」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「綺麗さっぱりフッていただければ、私は先に進めますから……身勝手な振る舞い、お許しいただければ幸いですわ」"
translation = "「시원하게 차주신다면 저는 앞으로 나아갈 수 있으니까요…… 제멋대로인 행동, 용서해 주신다면 감사하겠습니다.」"

[[dialogue]]
speaker = "unk"
original = "俺も君のことが好きだ、セナリィ"
translation = "나도 널 좋아해, 세나리"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ふふ、そうですわよね。私と会長様では住む世界も身分も異なる身。私のことが好きだなんて──ん？」"
translation = "「후후, 그렇겠죠. 저와 회장님은 사는 세계도 신분도 다른 처지. 저를 좋아한다니── 응?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「好き……好きぃっ！？\u3000んぅえぇぇぇぇっ！？\u3000会長様、今、なんとおっしゃいましたの！？」"
translation = "「좋아해…… 좋아한다구욧!? 응에에에에엑!? 회장님, 지금 뭐라고 하셨나요!?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「聞き間違いでなければ、私のことが好き、と。それはつまり、その、おっ、ＯＫということでよろしいんですの！？\u3000私でよろしいんですの！？」"
translation = "「잘못 들은 게 아니라면 저를 좋아한다고. 그건 그러니까, 그, 오, OK라는 걸로 알아도 되는 건가요!? 저라도 괜찮은 건가요!?」"

[[dialogue]]
speaker = "unk"
original = "セナリィじゃなきゃダメなんだ"
translation = "세나리가 아니면 안 돼"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ふぁぁ……それほどまで、まっすぐに好意をぶつけられたのなんて生まれて初めてですわ……会長様、私の生涯の愛情を、あなたひとりに捧げます」"
translation = "「후아아…… 이 정도로 똑바로 호의를 받은 건 태어나서 처음이에요…… 회장님, 제 평생의 애정을 당신 한 사람에게 바치겠어요.」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「──なんて、ちょっと重いでしょうか、ふふ」"
translation = "「──랄까, 조금 무거운가요, 후후」"

[[dialogue]]
speaker = "unk"
original = "こうして、俺とセナリィは互いの想いを確認し合ったのだが。"
translation = "이렇게 해서, 나와 세나리는 서로의 마음을 확인했지만."

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「う～ん……私が会長様とお付き合いを始めたことは秘密にしておくべきでしょうか」"
translation = "「으음…… 제가 회장님과 사귀기 시작했다는 건 비밀로 해두어야 할까요」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「星徒会としても会長のスキャンダルはご法度でなくて？\u3000しかも、悪の華であるこの私との交際となると……」"
translation = "「성도회로서도 회장의 스캔들은 금기이지 않나요? 게다가 악의 꽃인 이 저와의 교제라고 하면……」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「チームの長が自ら風紀を乱していては、問題でしょう。風紀の乱れは、心の乱れですわ」"
translation = "「팀의 장이 스스로 풍기를 어지럽혀서야, 문제겠죠. 풍기의 문란은 마음의 문란입니다わ」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「……いえ、これは言い訳ですわね。もっとシンプルに、会長様と恋仲になっただなんて……他の人にバレたら恥ずかしいではありませんの」"
translation = "「……아니요, 이건 변명이군요. 좀 더 심플하게, 회장님과 연인 사이가 되었다니…… 다른 사람에게 들키면 부끄럽지 않겠어요」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「特にマインには内緒ですわ。あの小悪魔が知ったら、何を言われるか、わかったもんじゃありません」"
translation = "「특히 마인에게는 비밀이에요. 그 소악마가 알면 무슨 소리를 들을지, 알 수가 없으니까요」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ですが、弊社社員のミウやヒマワリには、契約書の調印を見届けてもらわなくてはいけませんし……」"
translation = "「하지만, 저희 회사 사원인 미우나 히마와리에게는 계약서 조인을 지켜보게 해야 하고……」"

[[dialogue]]
speaker = "unk"
original = "契約書？\u3000調印？"
translation = "계약서? 조인?"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ええ、先ほども申しましたけど、恋愛パートナー契約ですわ」"
translation = "「네, 아까도 말씀드렸지만, 연애 파트너 계약이에요」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「では、会長さん、こちらの契約書にサインと印鑑を。血判でも結構ですよ」"
translation = "「그럼, 회장님, 이쪽 계약서에 사인과 도장을. 혈서라도 괜찮아요」"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「セナリィ社長も、ここにサインと判子を押してください」"
translation = "「세나리 사장님도 여기에 사인과 도장을 찍어주세요」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「さらさらさら……ポン。押しましたわ！」"
translation = "「슥슥슥…… 쾅. 찍었어요!」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「はい、お名前と印鑑、確かに。これにておふたりの間に恋愛パートナー契約が成立しました」"
translation = "「네, 성함과 도장, 확실히. 이것으로 두 분 사이에 연애 파트너 계약이 성립되었습니다」"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「おめでとうございます、社長～！\u3000……でも、恋人になるのって、こんな流れだっけー？」"
translation = "「축하드려요, 사장님~! ……근데, 연인이 되는 게 이런 흐름이었던가?」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「細かいことはいいんだよ、ヒマワリちゃん。２人の気持ちを形に残すのが大事なんだから」"
translation = "「세세한 건 상관없어, 히마와리짱. 두 사람의 마음을 형태로서 남기는 게 중요한 거니까」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「でも社長と会長さんが手を組めば、向かうところ敵なしですね」"
translation = "「하지만 사장님과 회장님이 손을 잡으면, 거칠 것이 없겠네요」"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「新星学園の星徒会も、まるっとゴールデングースの味方になってくれるのかな？」"
translation = "「신성 학원의 성도회도 통째로 골든 구스의 편이 되어주려나?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「いいえ、私は星徒会の後ろ盾が欲しくて、会長様と交際を始めたわけではありません」"
translation = "「아니요, 저는 성도회의 뒷배가 갖고 싶어서 회장님과 교제를 시작한 게 아니에요」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「バックに強い組織をチラつかせてイキるなんて、まさに虎の威を借る狐。そこに悪の美学はカケラもありませんわ！」"
translation = "「배경에 강한 조직을 내비치며 거들먹거리는 건 그야말로 호가호위. 거기엔 악의 미학이라곤 눈곱만큼도 없어요!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「星徒会からの助力は望みませんが……会長様が私の恋愛パートナーとして……」"
translation = "「성도회의 도움은 바라지 않지만…… 회장님이 저의 연애 파트너로서……」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「そして、私がゴールデングースの総帥ではなく、セナリィという一人の女として困ったときには……あなたに甘えさせていただきますわね」"
translation = "「그리고, 제가 골든 구스의 총수가 아니라, 세나리라는 한 명의 여자로서 곤란할 때에는…… 당신에게 어리광 부리도록 하겠어요」"

[[dialogue]]
speaker_original = "ミウ＆ヒマワリ"
speaker_translation = "미우 & 히마와리"
original = "「きゃーーっ<emoji=heart04>」"
translation = "「꺄아아악<emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「──って、恥ずかしいことを言わせるんじゃありませんわ！」"
translation = "「──라니, 부끄러운 소리를 하게 만들지 말란 말이에요!」"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「社長が勝手に惚気たんじゃないですかー。はー、アッツいアッツーい！」"
translation = "「사장님이 마음대로 염장 지른 거잖아요~. 하아, 뜨거워 뜨거워!」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「社長をこんなにもメロメロに堕としてしまうなんて……会長さんは私よりもずっと策士ですね」"
translation = "「사장님을 이렇게까지 헤롱헤롱하게 타락시키다니…… 회장님은 저보다 훨씬 책사시네요」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ああ、ふたりとも。会長様とお付き合いを始めた件、くれぐれもマインには内緒ですわよ？」"
translation = "「아아, 두 사람 모두. 회장님과 사귀기 시작한 건 절대로 마인에게는 비밀이에요?」"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「ネーゼマインさんにですか？\u3000お祝いしてくれると思いますけど」"
translation = "「네제마인 씨에게 말인가요? 축하해 줄 거라고 생각하는데요」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「どうだか。『セナリィに彼氏ができるなんてね～、にひひ♪』とかなんとか、からかってくるに違いないですわ！」"
translation = "「글쎄요. 『세나리에게 남자친구가 생기다니 말이야~, 니히히♪』라든가 뭐라든가, 놀려댈 게 뻔해요!」"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「ああ～、わかる～」"
translation = "「아아~, 알 것 같아~」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「嬉々とした笑顔まで想像できます」"
translation = "「희희낙락한 미소까지 상상돼요」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「やあやあ、皆さんお揃いで。本日はお日柄もよく～」"
translation = "「야아야아, 여러분 다 모여 계시네. 오늘은 날씨도 좋고~」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ギクリ！\u3000マ、マイン！\u3000事前連絡もなしに、何の用ですの！？」"
translation = "「히익! 마, 마인! 사전 연락도 없이 무슨 용건이야!?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「うんにゃ、近くに来たから寄っただけなんだけど～。あれあれ？\u3000もしかして、みんなで私の悪口でも言ってた？」"
translation = "「아니이, 근처에 왔길래 들렀을 뿐인데~. 어라어라? 설마 다 같이 내 험담이라도 하고 있었어?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「そ、そそ、そんなことはありませんわよ！？\u3000ねえ、みんな！？」"
translation = "「그, 그그, 그럴 리가 없잖아!? 그치, 얘들아!?」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「ええ、ミーティングをしていました。ゴールデングースの社外秘なので、ネーゼマインさんにも言えない極秘事項です」"
translation = "「네, 미팅을 하고 있었습니다. 골든 구스의 기업 비밀이라 네제마인 씨에게도 말할 수 없는 극비 사항이에요」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「そこに社員じゃない会長がいるのに～？\u3000怪しいぞ～？\u3000……ま、いっか☆」"
translation = "「거기에 사원도 아닌 회장이 있는데~? 수상한데~? ……뭐, 상관없나☆」"

[[dialogue]]
speaker = "unk"
original = "とりあえずこの場は乗り切ったけれど、マインにバレるのも時間の問題のように思えた。"
translation = "일단 이 자리는 넘겼지만, 마인에게 들키는 것도 시간문제처럼 보였다."

