[[dialogue]]
speaker = "unk"
original = "第２話,真なる神,B"
translation = "제2화, 진정한 신, B"

[[dialogue]]
speaker = "梨緒"
original = "「真なる神……に関連する書籍はないか。ワード検索にも引っかかってはくれないな」"
translation = "「진정한 신……과 관련된 서적은 없나. 워드 검색에도 걸려주질 않는군」"

[[dialogue]]
speaker = "unk"
original = "翌日。選挙管理委員会のメンバーは、ジグの語った“真なる神”について調べていた。"
translation = "다음날. 선거관리위원회 멤버들은 지그가 말한 “진정한 신”에 대해 조사하고 있었다."

[[dialogue]]
speaker = "ナターシャ"
original = "「ディザスターハンドもついでに調べる？」"
translation = "「디재스터 핸드도 겸사겸사 조사할까?」"

[[dialogue]]
speaker = "梨緒"
original = "「……いや、その名称は私たちが付けたものだ。文献はないだろう。今は“真なる神”に集中しよう」"
translation = "「……아니, 그 명칭은 우리가 붙인 거야. 문헌은 없겠지. 지금은 “진정한 신”에 집중하자」"

[[dialogue]]
speaker = "unk"
original = "ディザスターハンドとの遭遇や、その情報は、ベアトリスたち他の選挙管理委員にも共有しておいた。"
translation = "디재스터 핸드와의 조우나 그 정보는 베아트리스들 다른 선거관리위원들에게도 공유해 두었다."

[[dialogue]]
speaker = "梨緒"
original = "（アポロはリクリエの使徒であった頃に、ディザスターハンドに一度助けられたそうだ。だがそんな彼女にとっても、あれは正体不明の存在らしい）"
translation = "(아폴로는 리크리에의 사도였던 시절에 디재스터 핸드에게 한 번 도움을 받았다고 해. 하지만 그런 그녀에게 있어서도 저건 정체불명의 존재인 모양이야)"

[[dialogue]]
speaker = "ベアトリス"
original = "「ムムムム……」"
translation = "「으으으음……」"

[[dialogue]]
speaker = "梨緒"
original = "「ベアトは何か見つけたか？」"
translation = "「베아토는 뭐 좀 찾았어?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ひゃぁっ！？」"
translation = "「히익!?」"

[[dialogue]]
speaker = "梨緒"
original = "「読んでいるのは……ここ数年のリクリエのレポートか。“真なる神”について情報はありそうか？」"
translation = "「읽고 있는 건…… 최근 몇 년간의 리크리에 레포트인가. “진정한 신”에 대한 정보가 있을 것 같아?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「う、ううん、“真なる神”のことは何も……。調べるなら昔の本の方がいいかもね……」"
translation = "「으, 으응, “진정한 신”에 대해서는 아무것도……. 조사한다면 옛날 책이 더 좋을지도 모르겠네……」"

[[dialogue]]
speaker = "アポロ"
original = "「んー……」"
translation = "「음─……」"

[[dialogue]]
speaker = "梨緒"
original = "「アポロ？」"
translation = "「아폴로?」"

[[dialogue]]
speaker = "アポロ"
original = "「神……といえば、ひとつ心当たりを思い出したんだ。フィオナから聞いた話なんだが──」"
translation = "「신…… 하니까 하나 짐작 가는 게 떠올랐어. 피오나에게 들은 이야기인데──」"

[[dialogue]]
speaker = "アポロ"
original = "「フィオナたちがフィーニスの塔の第零層を通った時、大昔の亡霊に出会ったらしい」"
translation = "「피오나 일행이 피니스의 탑 제0층을 지났을 때, 아주 옛날의 망령과 만났대」"

[[dialogue]]
speaker = "アポロ"
original = "「そしてそいつはこう言ったそうだ」"
translation = "「그리고 그 녀석은 이렇게 말했다더군」"

[[dialogue]]
speaker = "敗残の亡霊"
original = "『リク……リエは……黙示録の表す……崇高なる天の啓示……』"
translation = "『리크……리에는…… 묵시록이 나타내는…… 숭고한 하늘의 계시……』"

[[dialogue]]
speaker = "敗残の亡霊"
original = "『よって……世界の再創生とは……女神をも超越する……チャカパラ神のご意思なのだァ……ッ……！！』"
translation = "『따라서…… 세계의 재창생이란…… 여신조차 초월하는…… 차카파라 신의 뜻인 것이다아……!!』"

[[dialogue]]
speaker = "梨緒"
original = "「女神をも超越する神……ジグが言っていたことに近いな」"
translation = "「여신조차 초월하는 신…… 지그가 말했던 것과 가깝군」"

[[dialogue]]
speaker = "アポロ"
original = "「何でもその亡霊は３０００年前、魔王ラクシスと戦ったバジュラ教団ってやつで、女神じゃなくてチャカパラ神ってのを信仰していたらしい」"
translation = "「아무튼 그 망령은 3000년 전, 마왕 락시스와 싸웠던 바주라 교단이라는 녀석들로, 여신이 아니라 차카파라 신이라는 걸 신봉했다나 봐」"

[[dialogue]]
speaker = "梨緒"
original = "「そのチャカパラ神と、ジグの言う“真なる神”が同一の存在であるかもしれないわけか」"
translation = "「그 차카파라 신과 지그가 말하는 “진정한 신”이 동일한 존재일지도 모른다는 거군」"

[[dialogue]]
speaker = "アポロ"
original = "「女神より上にいる神……なんてのは信じがたいけどな。まぁその正体が何であれ、同じものを指している可能性は高いんじゃないか」"
translation = "「여신보다 위에 있는 신…… 같은 건 믿기 힘들지만 말이야. 뭐 그 정체가 무엇이든, 같은 것을 가리키고 있을 가능성은 높지 않겠어?」"

[[dialogue]]
speaker = "梨緒"
original = "「ああ。ではチャカパラ神にも範囲を広げて調べてみよう」"
translation = "「그래. 그럼 차카파라 신으로도 범위를 넓혀서 조사해 보자」"

[[dialogue]]
speaker = "ナターシャ"
original = "「うーん……チャカパラ神も調べてみたけど、全然本が見つからないね」"
translation = "「으음…… 차카파라 신도 조사해 봤는데, 전혀 책이 안 보이네」"

[[dialogue]]
speaker = "梨緒"
original = "「空振りか。そう簡単に見つかるとは思っていなかったが、歯がゆいな……」"
translation = "「허탕인가. 그리 쉽게 찾을 수 있을 거라 생각하진 않았지만, 답답하군……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「変な信仰って言うと、私も魔界で聞いたことあるような……」"
translation = "「이상한 신앙이라고 하면, 나도 마계에서 들어본 적 있는 것 같은데……」"

[[dialogue]]
speaker = "梨緒"
original = "「まだバジュラ教団が残っていたのか？」"
translation = "「아직 바주라 교단이 남아 있었나?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ああいや、信じてたのはチャカパラ神じゃなくて……ペルテラ？\u3000ああいや、ペンテラ様だったかな？」"
translation = "「아아 아니, 믿고 있었던 건 차카파라 신이 아니라…… 펠테라? 아아 아니, 펜테라 님이었나?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「そういう変な名前シリーズだと、私も聖庭園の資料で見たかな」"
translation = "「그런 이상한 이름 시리즈라면 나도 성정원 자료에서 본 것 같아」"

[[dialogue]]
speaker = "ナターシャ"
original = "「１０００年くらい前に、天界の田舎の方で、ジャミール神ってのを祀る信仰があったとか。すぐ消えちゃったらしいけどね」"
translation = "「1000년쯤 전에 천계 시골 쪽에서 자밀 신이라는 걸 모시는 신앙이 있었다나 봐. 금방 사라진 모양이지만 말이야」"

[[dialogue]]
speaker = "アポロ"
original = "「なんだそりゃ。チャカパラ神以外も似たようなのがあるのか？\u3000しかもふざけた名前ばっかりだな」"
translation = "「뭐야 그게. 차카파라 신 말고도 비슷한 게 있는 거야? 게다가 장난스러운 이름들뿐이잖아」"

[[dialogue]]
speaker = "梨緒"
original = "「……頭が痛くなってきた。名称が多数ある上に、それらが同一のものを指すかもわからないとは……」"
translation = "「……머리가 아파지기 시작했어. 명칭이 다수 있는 데다, 그것들이 동일한 것을 가리키는지도 알 수 없다니……」"

[[dialogue]]
speaker = "梨緒"
original = "「これ以上は私たちだけで探すのは難しそうだ。司書に資料の捜索を依頼しつつ、星徒会にも情報を共有しておこう」"
translation = "「이 이상은 우리끼리만 찾는 건 어려울 것 같아. 사서에게 자료 수색을 의뢰하면서 성도회에도 정보를 공유해 두자」"

[[dialogue]]
speaker = "ナターシャ"
original = "「そだね。それが効率的かも」"
translation = "「그렇네. 그게 효율적일지도」"

[[dialogue]]
speaker = "梨緒"
original = "（“真なる神”に関連する資料はなかった。だがチャカパラ神と同じ存在かもしれない……という推測ができたのは前進か）"
translation = "(“진정한 신”과 관련된 자료는 없었어. 하지만 차카파라 신과 같은 존재일지도 모른다는…… 추측을 할 수 있었던 건 전진인가)"

[[dialogue]]
speaker = "梨緒"
original = "「それともうひとつ、図書館で調べたいことがある」"
translation = "「그리고 또 하나, 도서관에서 조사하고 싶은 게 있어」"

[[dialogue]]
speaker = "梨緒"
original = "「私とジグが平行世界の出身であるかもしれない、ということは話しただろう」"
translation = "「나와 지그가 평행세계 출신일지도 모른다는 건 이야기했었지」"

[[dialogue]]
speaker = "梨緒"
original = "「その推測は筋が通っている。だがそれでも私は信じきれなかった。私が平行世界から来たのなら、居るべき者がここに居ないからだ」"
translation = "「그 추측은 일리가 있어. 하지만 그래도 나는 완전히 믿을 수 없었어. 내가 평행세계에서 왔다면, 있어야 할 자가 여기에 없기 때문이야」"

[[dialogue]]
speaker = "ベアトリス"
original = "「居るべき者……？」"
translation = "「있어야 할 자……?」"

[[dialogue]]
speaker = "梨緒"
original = "「アルタイルの私だ」"
translation = "「알타이르의 나야」"

[[dialogue]]
speaker = "ベアトリス"
original = "「！\u3000そうか……梨緒ちゃんが他の世界の梨緒ちゃんなら、こっちの世界の梨緒ちゃんもいないとおかしいんだ」"
translation = "「! 그렇구나…… 리오짱이 다른 세계의 리오짱이라면, 이쪽 세계의 리오짱도 없으면 이상한 거네」"

[[dialogue]]
speaker = "梨緒"
original = "「私が他の世界から来たのなら、この世界の私がいるはずだ」"
translation = "「내가 다른 세계에서 왔다면, 이 세계의 내가 있을 거야.」"

[[dialogue]]
speaker = "梨緒"
original = "「戸籍に関しては、梨緒・Ａ・クリステレスという人間が流星市国にいないか、キリカさんにお願いして調べてもらっている」"
translation = "「호적에 관해서는, 리오·A·크리스테레스라는 인간이 유성시국에 없는지 키리카 씨에게 부탁해서 조사해 달라고 했어.」"

[[dialogue]]
speaker = "梨緒"
original = "「本来は個人情報だが、平行世界関連のことなので特別に許可してもらった」"
translation = "「본래는 개인정보지만, 평행세계와 관련된 일이라 특별히 허가받았지.」"

[[dialogue]]
speaker = "梨緒"
original = "「だから図書館では、梨緒という星騎士の痕跡がないか、レポートなどで調べたい」"
translation = "「그러니 도서관에서는 리오라는 성기사의 흔적이 없는지, 레포트 같은 걸로 조사하고 싶어.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「うん、わかった。じゃあここ数年のを調べてみるね」"
translation = "「응, 알았어. 그럼 최근 몇 년간의 자료를 조사해 볼게.」"

[[dialogue]]
speaker = "ベアトリス"
original = "（最近の資料なら、ついでに私の調べものもできるかな。一緒に調べさせてもらおうっと）"
translation = "(최근 자료라면 내 조사도 같이 할 수 있겠지. 함께 조사하게 해달라고 해야지.)"

[[dialogue]]
speaker = "ナターシャ"
original = "「でもこっちの梨緒も星騎士になってるとは限らないよ？」"
translation = "「하지만 이쪽의 리오도 성기사가 되어 있으리란 법은 없잖아?」"

[[dialogue]]
speaker = "梨緒"
original = "「自分に星力があるとわかった時、私は迷わず星騎士を志した。この世界に私がいるのなら絶対に星騎士になっているはずだ」"
translation = "「나에게 성력이 있다는 걸 알았을 때, 나는 망설임 없이 성기사를 지망했어. 이 세계에 내가 있다면 반드시 성기사가 되어 있을 거야.」"

[[dialogue]]
speaker = "梨緒"
original = "（そうだ。無辜の人々を守るために、私は星騎士になった）"
translation = "(그래. 무고한 사람들을 지키기 위해 나는 성기사가 되었어.)"

[[dialogue]]
speaker = "幼い梨緒"
original = "『私が星騎士になれる……！？\u3000こんな私でも……？』"
translation = "『내가 성기사가 될 수 있어……!? 이런 나라도……?』"

[[dialogue]]
speaker = "unk"
original = "『星騎士になれば、私は──』"
translation = "『성기사가 되면, 나는──』"

[[dialogue]]
speaker = "梨緒"
original = "（元々私は弱かった。駆けっこは誰にも勝てなくて、勉強も得意じゃなくて、お絵かきも下手くそで……そんな自分が情けなくていつも泣いていた）"
translation = "(원래 나는 약했어. 달리기 시합은 누구에게도 이기지 못했고, 공부도 잘하지 못했고, 그림도 서툴러서…… 그런 자신이 한심해서 언제나 울고 있었지.)"

[[dialogue]]
speaker = "梨緒"
original = "（星騎士になれると聞いて、私は嬉しかった。そんな弱い自分でも戦えることが。誰かの役に立てることが）"
translation = "(성기사가 될 수 있다는 말을 듣고 나는 기뻤어. 그런 약한 나라도 싸울 수 있다는 게. 누군가에게 도움이 될 수 있다는 게.)"

[[dialogue]]
speaker = "ナターシャ"
original = "「絶対、か。すごい自信だね。まぁいいや、そこまで言うなら調べてみるよ」"
translation = "「반드시, 인가. 대단한 자신감이네. 뭐 좋아, 그렇게까지 말한다면 조사해 볼게.」"

[[dialogue]]
speaker = "梨緒"
original = "「ああ、頼む」"
translation = "「아아, 부탁하지.」"

[[dialogue]]
speaker = "unk"
original = "それから選挙管理委員会の４人は図書館の資料を調べたが──"
translation = "그 후 선거관리위원회의 4명은 도서관 자료를 조사했지만──"

[[dialogue]]
speaker = "ナターシャ"
original = "「戦闘レポートやら事件報告を漁ってみたけど名前はないね。クリステレス姓じゃない可能性も考えて、梨緒だけで検索してもヒットなし」"
translation = "「전투 레포트나 사건 보고를 뒤져봤지만 이름은 없네. 크리스테레스 성씨가 아닐 가능성도 생각해서 리오로만 검색해도 히트 없음.」"

[[dialogue]]
speaker = "梨緒"
original = "「さっきキリカさんからもメールが届いた。流星市国及びその近辺で、『梨緒・Ａ・クリステレス』という人間が住んでいた記録はないそうだ」"
translation = "「방금 키리카 씨에게서도 메일이 도착했어. 유성시국 및 그 근처에서 『리오·A·크리스테레스』라는 인간이 살았던 기록은 없다고 해.」"

[[dialogue]]
speaker = "梨緒"
original = "「私の痕跡はなし……か。すまない、無駄な時間を使わせたな」"
translation = "「나의 흔적은 없음…… 인가. 미안하다, 헛된 시간을 쓰게 했군.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ううん、確かめなきゃいけない大事なことだもん。無駄なんかじゃないよ」"
translation = "「으응, 확인해야만 하는 중요한 일인걸. 헛된 게 아니야.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「でも流星市国にいないなら、この世界の梨緒はどこにいるんだろうね？\u3000昔はイングランドに住んでたって言ってたしそこかな？」"
translation = "「하지만 유성시국에 없다면 이 세계의 리오는 어디에 있는 걸까? 예전엔 잉글랜드에 살았다고 했으니 거기일까?」"

[[dialogue]]
speaker = "梨緒"
original = "「新星学園ではなく、イングランドの流星学園分校という可能性もあるか……。マリーベルに聞いてみよう。あとは流星学園のジュエリーも確か同郷だったか」"
translation = "「신성학원이 아니라 잉글랜드의 유성학원 분교일 가능성도 있나……. 마리벨에게 물어보자. 그리고 유성학원의 쥬얼리도 분명 동향이었지.」"

[[dialogue]]
speaker = "アポロ"
original = "「いや──」"
translation = "「아니──」"

[[dialogue]]
speaker = "梨緒"
original = "「？\u3000アポロ、どうした？」"
translation = "「? 아폴로, 왜 그래?」"

[[dialogue]]
speaker = "アポロ"
original = "「ああいや、なんでもない……」"
translation = "「아아 아니, 아무것도 아니야……」"

[[dialogue]]
speaker = "unk"
original = "一瞬口を挟もうとしたアポロだが、険しい顔で言葉を呑み込む。"
translation = "순간 말참견을 하려던 아폴로였으나, 험악한 표정으로 말을 삼킨다."

[[dialogue]]
speaker = "梨緒"
original = "「珍しく歯切れが悪いな。君らしくない」"
translation = "「드물게 말끝을 흐리는군. 너답지 않아.」"

[[dialogue]]
speaker = "梨緒"
original = "「……何か心当たりがあるのか？」"
translation = "「……무언가 짚이는 구석이라도 있나?」"

[[dialogue]]
speaker = "アポロ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "アポロは首を振ることも頷くこともしないが、その無言の返事が、肯定を表していた。"
translation = "아폴로는 고개를 젓지도 끄덕이지도 않았으나, 그 침묵의 대답이 긍정을 나타내고 있었다."

[[dialogue]]
speaker = "梨緒"
original = "「思い付いたことがあるなら言ってくれ」"
translation = "「생각난 게 있다면 말해 줘.」"

[[dialogue]]
speaker = "梨緒"
original = "「たとえ目を背けたいことであっても、真相に近づかなければ前に進めない。知らなければいけないことなんだ」"
translation = "「설령 외면하고 싶은 일이라 해도, 진상에 다가가지 않으면 앞으로 나아갈 수 없어. 알아야만 하는 일이야.」"

[[dialogue]]
speaker = "アポロ"
original = "「……わかった」"
translation = "「……알았어.」"

[[dialogue]]
speaker = "アポロ"
original = "「アルタイルの梨緒は……もうこの世にいないんじゃないかと思うんだ」"
translation = "「알타이르의 리오는…… 이제 이 세상에 없는 게 아닐까 싶어.」"

[[dialogue]]
speaker = "梨緒"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker = "ナターシャ"
original = "「まぁ確かに、こんだけ痕跡がないとそういう可能性も考えるよね。でもアポロには、そう思う別の根拠がある感じかな？」"
translation = "「뭐 확실히, 이만큼 흔적이 없으면 그런 가능성도 생각하게 되지. 하지만 아폴로에게는 그렇게 생각하는 다른 근거가 있는 느낌일까?」"

[[dialogue]]
speaker = "アポロ"
original = "「ああ。また平行世界の話になるんだが……」"
translation = "「아아. 다시 평행세계 이야기가 된다만……」"

[[dialogue]]
speaker = "アポロ"
original = "「基本的に、同一人物は同じ世界に存在し得ない。あたしがそうであったように」"
translation = "「기본적으로 동일 인물은 같은 세계에 존재할 수 없어. 내가 그랬던 것처럼.」"

[[dialogue]]
speaker = "アポロ"
original = "「デネブのあたしが元の世界に戻ることで、長年眠っていたアルタイルのあたしは目を覚ました」"
translation = "「데네브의 내가 원래 세계로 돌아감으로써, 오랫동안 잠들어 있던 알타이르의 내가 눈을 떴지.」"

[[dialogue]]
speaker = "梨緒"
original = "「私が今こうして不自由なく行動できているのなら──」"
translation = "「내가 지금 이렇게 부자유 없이 행동하고 있다면──」"

[[dialogue]]
speaker = "アポロ"
original = "「アルタイルの梨緒はもういなくなってるかもしれない、ということだ」"
translation = "「알타이르의 리오는 이미 사라졌을지도 모른다는 소리다.」"

[[dialogue]]
speaker = "梨緒"
original = "「確かに、私がいないと推測するには十分だな。その可能性も探ってみるべきだろう」"
translation = "「확실히, 내가 없다고 추측하기엔 충분하군. 그 가능성도 찾아봐야겠어.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「んー……でも梨緒が命を落としていたとして、どう確かめる？\u3000どこに聞けばいいのかな？」"
translation = "「음─…… 하지만 리오가 목숨을 잃었다고 쳐도, 어떻게 확인하지? 어디에 물어봐야 할까?」"

[[dialogue]]
speaker = "梨緒"
original = "「……私が幼い頃、イングランドに住んでいた時、近所にモンスターが現れたことがあった」"
translation = "「……내가 어릴 적, 잉글랜드에 살았을 때 근처에 몬스터가 나타난 적이 있었어.」"

[[dialogue]]
speaker = "梨緒"
original = "「モンスターはすぐに討伐されたと聞いている。実際、私はそのモンスターをこの目で見てすらない」"
translation = "「몬스터는 금방 토벌되었다고 들었지. 실제로 나는 그 몬스터를 눈으로 본 적조차 없어.」"

[[dialogue]]
speaker = "梨緒"
original = "「だが、もしも亡くなっているとしたら、きっとその時だ」"
translation = "「하지만 만약 죽었다면, 분명 그때일 거야.」"

[[dialogue]]
speaker = "梨緒"
original = "「また特例になるが、その一件で犠牲者がいないか、教皇庁伝手に問い合わせるしかないだろう」"
translation = "「또 특례가 되겠지만, 그 사건으로 희생자가 없는지 교황청을 통해 문의하는 수밖에 없겠지.」"

[[dialogue]]
speaker = "アポロ"
original = "「それならあたしも一緒に頼んでみるぞ。同じ選管の仲間のことだからな」"
translation = "「그거라면 나도 같이 부탁해 주마. 같은 선관 동료의 일이니까 말이야.」"

[[dialogue]]
speaker = "梨緒"
original = "「ああ、助かる」"
translation = "「아아, 고맙군.」"

[[dialogue]]
speaker = "unk"
original = "それから梨緒とアポロは星見家に戻り、キリカを通して教皇庁に要請を伝えたのだった。"
translation = "그 후 리오와 아폴로는 호시미 가문으로 돌아가 키리카를 통해 교황청에 요청을 전달했다."

