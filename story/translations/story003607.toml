[[dialogue]]
speaker = "unk"
original = "俺たちが暴走したサチやプリムラを相手する一方で、変身したエントロフィーと戦うシズハ。"
translation = "우리가 폭주한 사치와 프리뮬라를 상대하는 동안, 변신한 엔트로피와 싸우는 시즈하."

[[dialogue]]
speaker = "unk"
original = "しかし――"
translation = "하지만――"

[[dialogue]]
speaker = "エントロフィー"
original = "「はぁ～、残念っすね～」"
translation = "「하아~ 아쉽슴다~」"

[[dialogue]]
speaker = "シズハ"
original = "「くっ……！」"
translation = "「큭……!」"

[[dialogue]]
speaker = "unk"
original = "シズハはディーラックとの連携が噛み合わず、一瞬の隙を突かれ、エントロフィーの手に捕らえられてしまった。"
translation = "시즈하는 디럭쿠와의 연계가 맞지 않아 찰나의 빈틈을 찔렸고, 엔트로피의 손에 붙잡히고 말았다."

[[dialogue]]
speaker = "シズハ"
original = "「なんてスピードなの……！」"
translation = "「엄청난 스피드야……!」"

[[dialogue]]
speaker = "エントロフィー"
original = "「きゃははっ☆\u3000めっちゃ速いでしょ～？\u3000ウチ、そこが自慢ポイントなんすよ～♪」"
translation = "「캬핫☆ 엄청 빠르죠~? 저, 그게 자랑 포인트임다~♪」"

[[dialogue]]
speaker = "エントロフィー"
original = "「まあ、それと『反転のロストアイテム』のワンタッチアウトな力が組み合わさってるのが、凶悪ではあるんすけど♪」"
translation = "「뭐, 그것과 『반전의 로스트 아이템』의 원터치 아웃 능력이 조합된 게 흉악하긴 하지만요♪」"

[[dialogue]]
speaker = "ディーラック"
original = "「こいつ……！」"
translation = "「이 자식이……!」"

[[dialogue]]
speaker = "ディーラック"
original = "（形態変化したら、ボクの目でも追い切れなかった……！\u3000速さだけなら、ボクよりも間違いなく上だ……！）"
translation = "(형태 변화를 하니 내 눈으로도 쫓을 수 없었어……! 속도만큼은 나보다 확실히 위다……!)"

[[dialogue]]
speaker = "シズハ"
original = "「くっ……うああぁっ……！？」"
translation = "「큭…… 으아아악……!?」"

[[dialogue]]
speaker = "unk"
original = "ふと、エントロフィーに掴まれて、苦しみ出すシズハ。"
translation = "갑자기 엔트로피에게 붙잡힌 채 고통스러워하기 시작하는 시즈하."

[[dialogue]]
speaker = "ディーラック"
original = "「！\u3000シズハちゃん……！？」"
translation = "「! 시즈하짱……!?」"

[[dialogue]]
speaker = "エントロフィー"
original = "「あ～、なるほど？\u3000これはもしかして、あれっすかね～？」"
translation = "「아~ 과연? 이건 혹시 그거임까~?」"

[[dialogue]]
speaker = "エントロフィー"
original = "「シズハのアネさんって確か、聖杯の力で生きているって話っすよね？\u3000それが反転させられるってことは、聖杯が機能不全になるってことで～」"
translation = "「시즈하 누님은 분명 성배의 힘으로 살아가고 있다는 이야기였죠? 그게 반전된다는 건 성배가 기능 부전에 빠진다는 거고~」"

[[dialogue]]
speaker = "エントロフィー"
original = "「下手したら死んじゃうかも、って感じっすかね？\u3000ん～、この場合はどうしよっかな～」"
translation = "「잘못하면 죽을지도 모른다는 느낌일까나~? 음~ 이럴 땐 어떻게 할까요~」"

[[dialogue]]
speaker = "シズハ"
original = "「くぅっ……うあああぁっ！？」"
translation = "「크윽…… 으아아아악!?」"

[[dialogue]]
speaker = "ディーラック"
original = "「やめろっ！！」"
translation = "「그만둬!!」"

[[dialogue]]
speaker = "unk"
original = "エントロフィーに向けて、飛び込むディーラック。"
translation = "엔트로피를 향해 뛰어드는 디럭쿠."

[[dialogue]]
speaker = "エントロフィー"
original = "「残念、見えてるっすよ♪」"
translation = "「아쉽네여, 다 보임다♪」"

[[dialogue]]
speaker = "ディーラック"
original = "「ぐあっ！？」"
translation = "「구악!?」"

[[dialogue]]
speaker = "unk"
original = "瞬時に回避して、手の甲でディーラックを弾き飛ばすエントロフィー。"
translation = "순식간에 회피하고 손등으로 디럭쿠를 쳐서 날려버리는 엔트로피."

[[dialogue]]
speaker = "エントロフィー"
original = "「ディーラックのアネさん、必死っすね～。そういえば、シズハのアネさんの聖杯を直そうとして、魔法少女に負けたんでしたっけ？」"
translation = "「디럭쿠 누님, 필사적이네여~. 그러고 보니 시즈하 누님의 성배를 고치려다 마법 소녀에게 졌었죠?」"

[[dialogue]]
speaker = "ディーラック"
original = "「くっ……！」"
translation = "「큭……!」"

[[dialogue]]
speaker = "ディーラック"
original = "（ボクは世界の裏側、どこまでも広がる真っ暗な空間――『虚数の海』から、ひとりきりで生まれた）"
translation = "(나는 세계의 이면, 끝없이 펼쳐진 새카만 공간―― 『허수의 바다』에서 홀로 태어났다)"

[[dialogue]]
speaker = "ディーラック"
original = "（善悪なんて、ボクは知らない）"
translation = "(선악 같은 건 나는 몰라)"

[[dialogue]]
speaker = "ディーラック"
original = "（ボクはエネルギー生命体として、本能のままにマイナスエネルギーを欲して喰らう。ただ……それだけだった）"
translation = "(나는 에너지 생명체로서 본능에 따라 마이너스 에너지를 갈구하고 먹어 치운다. 그저…… 그뿐이었다)"

[[dialogue]]
speaker = "unk"
original = "ディーラックは、生まれてからしばらくして――病院で闘病に励むシズハを見つけた。"
translation = "디럭쿠는 태어난 지 얼마 되지 않아―― 병원에서 투병 중인 시즈하를 발견했다."

[[dialogue]]
speaker = "unk"
original = "マイナスエネルギーを効率よく喰らう為に、ロストアイテムの『聖杯』を彼女に埋め込んだ。"
translation = "마이너스 에너지를 효율적으로 먹어 치우기 위해, 로스트 아이템인 『성배』를 그녀에게 심었다."

[[dialogue]]
speaker = "unk"
original = "そして、ディーラックが学園に『解放のロストアイテム』を送り込むよりも以前。"
translation = "그리고 디럭쿠가 학원에 『해방의 로스트 아이템』을 보내기보다 이전."

[[dialogue]]
speaker = "シズハ"
original = "「――今日からここに通い始めるのね♪」"
translation = "「――오늘부터 여기 다니기 시작하는 거네♪」"

[[dialogue]]
speaker = "ディーラック"
original = "「ああ。シズハちゃんが行きたいって言ってた学園だよ」"
translation = "「어어. 시즈하짱이 가고 싶다고 했던 학원이야」"

[[dialogue]]
speaker = "unk"
original = "聖杯の力で元気に歩けるようになり、退院したシズハは、流星学園附属校へと通い始めていた。"
translation = "성배의 힘으로 건강하게 걸을 수 있게 되어 퇴원한 시즈하는, 유성학원 부속교에 다니기 시작했다."

[[dialogue]]
speaker = "ディーラック"
original = "（……ボクはマイナスエネルギーを生み出す『家畜』として利用する為に、シズハちゃんに聖杯を埋め込んだ）"
translation = "(……나는 마이너스 에너지를 만들어내는 『가축』으로 이용하기 위해, 시즈하짱에게 성배를 심었다)"

[[dialogue]]
speaker = "ディーラック"
original = "（でも……心を持つヒトカスってのは、実際に接するようになると、想像よりもずっと面倒くさい下等生物だった）"
translation = "(하지만…… 마음을 가진 인간 쓰레기라는 건, 실제로 접하게 되니 상상보다 훨씬 성가신 하등 생물이었어)"

[[dialogue]]
speaker = "シズハ"
original = "「ディーちゃん、一緒にお風呂入ろ～♪」"
translation = "「디짱, 같이 목욕하자~♪」"

[[dialogue]]
speaker = "ディーラック"
original = "「はぁ？\u3000イヤなんだけど～……」"
translation = "「하아? 싫은데~……」"

[[dialogue]]
speaker = "unk"
original = "シズハは、なにかとディーラックと一緒に行動をしたがった。"
translation = "시즈하는 사사건건 디럭쿠와 함께 행동하고 싶어 했다."

[[dialogue]]
speaker = "シズハ"
original = "「ディーちゃん、一緒に寝よ～」"
translation = "「디짱, 같이 자자~」"

[[dialogue]]
speaker = "ディーラック"
original = "「いや、ボクはひとりで寝たいんだけど……？」"
translation = "「아니, 나는 혼자 자고 싶은데……?」"

[[dialogue]]
speaker = "unk"
original = "シズハには抱き着き癖があり、ぬいぐるみのように抱きしめられながら寝ることになるディーラック。"
translation = "시즈하에게는 매달리는 버릇이 있어, 인형처럼 껴안긴 채 잠들게 되는 디럭쿠."

[[dialogue]]
speaker = "シズハ"
original = "「すぅ……すぅ……」"
translation = "「새근…… 새근……」"

[[dialogue]]
speaker = "ディーラック"
original = "（……なんでボクは、下等生物なんかとくっ付いて寝てるんだ？）"
translation = "(……왜 내가 하등 생물 따위랑 딱 붙어서 자고 있는 거지?)"

[[dialogue]]
speaker = "ディーラック"
original = "（ヒトカスはヒトカス、ボクが生きるための食糧を生み出す家畜でしかないのに……）"
translation = "(인간 쓰레기는 인간 쓰레기, 내가 살기 위한 식량을 만들어내는 가축일 뿐인데……)"

[[dialogue]]
speaker = "ディーラック"
original = "（ダルい、キモい、めんどい……）"
translation = "(나른해, 기분 나빠, 귀찮아……)"

[[dialogue]]
speaker = "ディーラック"
original = "（けど、仕方ない……）"
translation = "(그래도 어쩔 수 없지……)"

[[dialogue]]
speaker = "ディーラック"
original = "（ヒトカス共が美味しい物を喰らう為に、動物やら野菜やらを育てているのと一緒サ……）"
translation = "(인간 쓰레기들이 맛있는 걸 먹기 위해 동물이나 채소 같은 걸 기르는 거랑 마찬가지야……)"

[[dialogue]]
speaker = "unk"
original = "そんなある日。"
translation = "그러던 어느 날."

[[dialogue]]
speaker = "シズハ"
original = "「あ……れ……？」"
translation = "「어……라……?」"

[[dialogue]]
speaker = "サチ"
original = "「シズハちゃん……どうしたの！？」"
translation = "「시즈하짱…… 왜 그래!?」"

[[dialogue]]
speaker = "unk"
original = "運動場で訓練していたシズハが突然、床に倒れ込んでしまった。"
translation = "운동장에서 훈련하던 시즈하가 갑자기 바닥에 쓰러지고 말았다."

[[dialogue]]
speaker = "シズハ"
original = "「なんか急に、クラっとして……」"
translation = "「왠지 갑자기 어질해서……」"

[[dialogue]]
speaker = "unk"
original = "透明化して、その様子を窺っていたディーラックは、思わず息をのんだ。"
translation = "투명화하여 그 모습을 엿보고 있던 디럭쿠는 저도 모르게 숨을 삼켰다."

[[dialogue]]
speaker = "ディーラック"
original = "（おい……ウソだろ……！？）"
translation = "(야…… 거짓말이지……!?)"

[[dialogue]]
speaker = "unk"
original = "術式でシズハの体内を精査する。"
translation = "술식으로 시즈하의 체내를 정밀 조사한다."

[[dialogue]]
speaker = "unk"
original = "すると――聖杯の表面に、無数の微細なヒビが走っているのが見えた。"
translation = "그러자―― 성배의 표면에 무수히 미세한 금이 가 있는 것이 보였다."

[[dialogue]]
speaker = "ディーラック"
original = "（ロストアイテムの……経年劣化だと……？\u3000そんな話、知らないぞ……！）"
translation = "(로스트 아이템의…… 경년 열화라고……? 그런 얘기는 들은 적 없어……!)"

[[dialogue]]
speaker = "ディーラック"
original = "（……いや、仕方ないのか……。ロストアイテムにも寿命があるってことなんだろう……）"
translation = "(……아니, 어쩔 수 없는 건가……. 로스트 아이템에도 수명이 있다는 거겠지……)"

[[dialogue]]
speaker = "unk"
original = "冷静に考えれば、結論は単純だった。"
translation = "냉정하게 생각하면 결론은 단순했다."

[[dialogue]]
speaker = "ディーラック"
original = "（なら、シズハちゃんは――ここまで）"
translation = "(그럼 시즈하짱은―― 여기까지)"

[[dialogue]]
speaker = "ディーラック"
original = "（聖杯が壊れるまで利用して……限界が来たら切り捨てる。そして次に利用できる他の奴を探す。それがいちばん、合理的だ）"
translation = "(성배가 부서질 때까지 이용하고…… 한계가 오면 버린다. 그리고 다음에 이용할 다른 녀석을 찾는다. 그게 가장 합리적이야)"

[[dialogue]]
speaker = "unk"
original = "――そのはずだった。"
translation = "――그럴 터였다."

[[dialogue]]
speaker = "unk"
original = "だが……そこまで考えた瞬間、なぜか思考が止まる。"
translation = "하지만…… 거기까지 생각한 순간, 왜인지 사고가 멈춘다."

[[dialogue]]
speaker = "ディーラック"
original = "（…………）"
translation = "(…………)"

[[dialogue]]
speaker = "unk"
original = "理由は分からない。"
translation = "이유는 모른다."

[[dialogue]]
speaker = "unk"
original = "ただ、次の一歩を踏み出せない。"
translation = "그저 다음 한 발을 내디딜 수 없다."

[[dialogue]]
speaker = "unk"
original = "しばらく沈黙した後、ディーラックは小さく呟く。"
translation = "잠시 침묵한 뒤 디럭쿠는 작게 중얼거린다."

[[dialogue]]
speaker = "ディーラック"
original = "「仕方ない……」"
translation = "「어쩔 수 없지……」"

[[dialogue]]
speaker = "ディーラック"
original = "（……『記憶のロストアイテム』の一件で、トレジアンナからはロストアイテムに関する知識を手に入れている）"
translation = "(……『기억의 로스트 아이템』 사건으로 트레지안나로부터 로스트 아이템에 관한 지식을 손에 넣었어)"

[[dialogue]]
speaker = "unk"
original = "シズハに聖杯を与える前、ディーラックは『記憶のロストアイテム』を使い、サチやプリムラを巻き込む騒動を起こしていた。"
translation = "시즈하에게 성배를 주기 전, 디럭쿠는 『기억의 로스트 아이템』을 사용해 사치나 프리뮬러를 휘말리게 한 소동을 일으켰었다."

[[dialogue]]
speaker = "unk"
original = "サチの記憶喪失に意識を逸らしつつ、真の狙いは、トレジアンナからロストアイテム製作に関する記憶を一時的に奪い、その知識を読み取る為であった。"
translation = "사치의 기억 상실로 의식을 돌리면서, 진정한 목적은 트레지안나로부터 로스트 아이템 제작에 관한 기억을 일시적으로 빼앗아 그 지식을 읽어내기 위함이었다."

[[dialogue]]
speaker = "unk"
original = "元々は、ロストアイテムを詳しく知ることで、マイナスエネルギーを効率良く得る為の手段に過ぎなかったが……。"
translation = "원래는 로스트 아이템을 자세히 앎으로써 마이너스 에너지를 효율적으로 얻기 위한 수단에 불과했지만……."

[[dialogue]]
speaker = "ディーラック"
original = "（……聖杯を修復するには、膨大なマイナスエネルギーが必要だ）"
translation = "(……성배를 수복하려면 방대한 마이너스 에너지가 필요해)"

[[dialogue]]
speaker = "ディーラック"
original = "（それが最も効率良く得られるのは――）"
translation = "(그걸 가장 효율적으로 얻을 수 있는 건――)"

[[dialogue]]
speaker = "unk"
original = "その後、ディーラックは『解放のロストアイテム』の事件を引き起こす。"
translation = "그 후 디럭쿠는 『해방의 로스트 아이템』 사건을 일으킨다."

[[dialogue]]
speaker = "unk"
original = "シズハの聖杯を使った『認識改変』によって生じる、大量のマイナスエネルギーを得る為に。"
translation = "시즈하의 성배를 사용한 『인식 개변』으로 인해 발생하는 대량의 마이너스 에너지를 얻기 위해."

[[dialogue]]
speaker = "unk"
original = "全ては――シズハの聖杯を修復する為……。"
translation = "모든 것은―― 시즈하의 성배를 수복하기 위해……."

[[dialogue]]
speaker = "ディーラック"
original = "「……触んな」"
translation = "「……만지지 마」"

[[dialogue]]
speaker = "エントロフィー"
original = "「は？\u3000なんて？」"
translation = "「하? 뭐라고여?」"

[[dialogue]]
speaker = "ディーラック"
original = "「それ以上、ヒトのもんに触んなって言ったんだっ！！\u3000さもないと――」"
translation = "「그 이상 남의 물건에 손대지 말라고 했잖아!! 안 그러면――」"

[[dialogue]]
speaker = "ディーラック"
original = "「お前をぶっ殺してやるッ！！！」"
translation = "「널 죽여버리겠어!!!」"

[[dialogue]]
speaker = "unk"
original = "ディーラックの体から爆発的に噴き出したマイナスエネルギーに、エントロフィーが一歩後ずさる。"
translation = "디럭쿠의 몸에서 폭발적으로 뿜어져 나온 마이너스 에너지에 엔트로피가 한 걸음 뒷걸음질 친다."

[[dialogue]]
speaker = "エントロフィー"
original = "「っ……！\u3000これは……すごい気迫っすね……！」"
translation = "「윽……! 이건…… 엄청난 기박임다……!」"

[[dialogue]]
speaker = "シズハ"
original = "「……ディーちゃんの記憶、私にも見えたよ」"
translation = "「……디짱의 기억, 나한테도 보였어」"

[[dialogue]]
speaker = "ディーラック"
original = "「！？\u3000シズハちゃん……？」"
translation = "「!? 시즈하짱……?」"

[[dialogue]]
speaker = "unk"
original = "ディーラックと精神がリンクしているせいか、シズハにはディーラックの記憶や、その時に抱いた感情が流れ込んできていた。"
translation = "디럭쿠와 정신이 링크되어 있는 탓인지, 시즈하에게는 디럭쿠의 기억이나 그때 품었던 감정이 흘러 들어오고 있었다."

[[dialogue]]
speaker = "シズハ"
original = "「私の為に……ありがとう」"
translation = "「나를 위해서…… 고마워」"

[[dialogue]]
speaker = "unk"
original = "その瞬間、シズハの体から眩い光が溢れ出す。"
translation = "그 순간 시즈하의 몸에서 눈부신 빛이 넘쳐흐른다."

[[dialogue]]
speaker = "エントロフィー"
original = "「この光は……！？\u3000くっ……！？」"
translation = "「이 빛은……!? 큭……!?」"

[[dialogue]]
speaker = "unk"
original = "シズハはその力で、エントロフィーの掴んでいた手をバチッと弾き飛ばした。"
translation = "시즈하는 그 힘으로 엔트로피가 잡고 있던 손을 파지직 튕겨냈다."

[[dialogue]]
speaker = "エントロフィー"
original = "「反転の力が無効化された……！？\u3000この感覚はまさか――」"
translation = "「반전의 힘이 무효화됐다……!? 이 감각은 설마――」"

[[dialogue]]
speaker = "エントロフィー"
original = "「マイナスエネルギーの力っすか！？」"
translation = "「마이너스 에너지의 힘임까!?」"

[[dialogue]]
speaker = "シズハ"
original = "「私……ディーちゃんの気持ちをわかったような気になっていたけど……そんな簡単なことじゃなかったんだよね？」"
translation = "「나…… 디짱의 마음을 이해한 것 같은 기분이 들었지만…… 그렇게 간단한 게 아니었지?」"

[[dialogue]]
speaker = "ディーラック"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "シズハ"
original = "「ディーちゃんの中にあったのは、簡単には言葉で言い表せない……ディーちゃん自身でもまだよくわかっていない……複雑な感情だったんだ」"
translation = "「디짱 안에 있던 건 간단히 말로 표현할 수 없는…… 디짱 자신도 아직 잘 모르는…… 복잡한 감정이었어」"

[[dialogue]]
speaker = "ディーラック"
original = "「そうサ……ボクにはよくわからない……」"
translation = "「그래…… 나도 잘 모르겠어……」"

[[dialogue]]
speaker = "ディーラック"
original = "「自分の感情もよくわからないのに、ましてや『絆』とか、わかるわけないだろう？」"
translation = "「내 감정도 잘 모르는데, 하물며 『인연』 같은 걸 알 리가 없잖아?」"

[[dialogue]]
speaker = "シズハ"
original = "「でも、私の為に怒ってくれた」"
translation = "「하지만 나를 위해서 화내줬어」"

[[dialogue]]
speaker = "ディーラック"
original = "「それもわからない……ただ、ムカついただけサ」"
translation = "「그것도 몰라…… 그저 짜증 났을 뿐이야」"

[[dialogue]]
speaker = "シズハ"
original = "「今はそれで十分だよ」"
translation = "「지금은 그걸로 충분해」"

[[dialogue]]
speaker = "unk"
original = "シズハ、大丈夫か！？"
translation = "시즈하, 괜찮아!?"

[[dialogue]]
speaker = "unk"
original = "俺は乱戦の中で隙を見て、駆けつける。"
translation = "나는 난전 속에서 틈을 봐서 달려간다."

[[dialogue]]
speaker = "シズハ"
original = "「会長、ナイスタイミング！」"
translation = "「회장, 나이스 타이밍!」"

[[dialogue]]
speaker = "シズハ"
original = "「あのね、私……今なら行ける気がするの。だから――」"
translation = "「있지, 나…… 지금이라면 할 수 있을 것 같아. 그러니까――」"

[[dialogue]]
speaker = "unk"
original = "俺はそこで気づく。"
translation = "나는 거기서 깨닫는다."

[[dialogue]]
speaker = "unk"
original = "シズハの心に灯った――眩い星の輝きに。"
translation = "시즈하의 마음에 깃든―― 눈부신 별의 광채를."

[[dialogue]]
speaker = "シズハ"
original = "「会長、お願い！\u3000私に力を貸して！」"
translation = "「회장, 부탁해! 나에게 힘을 빌려줘!」"

[[dialogue]]
speaker = "unk"
original = "俺は頷き、魔王の力を発動する。"
translation = "나는 고개를 끄덕이며 마왕의 힘을 발동한다."

[[dialogue]]
speaker = "unk"
original = "アルケインノヴァエクストリーム！！！"
translation = "알케인 노바 익스트림!!!"

[[dialogue]]
speaker = "シズハ"
original = "「――ディーちゃんとの関係は、マイナスエネルギーのように難しくて、簡単には理解できないのかもしれない」"
translation = "「――디짱과의 관계는 마이너스 에너지처럼 어렵고 간단히 이해할 수 없는 걸지도 몰라」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「それでも……私はディーちゃんのことを、『友達』って呼びたい！」"
translation = "「그래도…… 나는 디짱을 『친구』라고 부르고 싶어!」"

[[dialogue]]
speaker = "ディーラック"
original = "「……！\u3000これがシズハちゃんの覚醒した姿……！」"
translation = "「……! 이것이 시즈하짱의 각성한 모습……!」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「そう、私とディーちゃんの『絆』の力だよ」"
translation = "「응, 나와 디짱의 『인연』의 힘이야」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「私は――そう信じてる」"
translation = "「나는―― 그렇게 믿어」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「だから、ディーちゃん。私のお願い、聞いてくれる？」"
translation = "「그러니까 디짱. 내 부탁, 들어줄래?」"

[[dialogue]]
speaker = "ディーラック"
original = "「……はぁ」"
translation = "「……하아」"

[[dialogue]]
speaker = "ディーラック"
original = "「仕方ないなぁ……どうせ、シズハちゃんは１度言い出したら、止まらないんでしょ？」"
translation = "「어쩔 수 없네…… 어차피 시즈하짱은 한 번 말하기 시작하면 멈추지 않잖아?」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「うん。私は決めたから、その願いが叶うまで、いけいけゴーゴーだから！」"
translation = "「응. 나는 결정했으니까, 그 소원이 이루어질 때까지 가자가자 고고니까!」"

[[dialogue]]
speaker = "ディーラック"
original = "「だったら――面倒だけど聞いてあげるよ」"
translation = "「그렇다면―― 귀찮지만 들어줄게」"

[[dialogue]]
speaker = "エントロフィー"
original = "「くっ……ふふっ……♪」"
translation = "「큭…… 후훗……♪」"

[[dialogue]]
speaker = "エントロフィー"
original = "「きゃははははっ♪\u3000これは……マジですごいっす！\u3000めちゃくちゃ面白いじゃないっすか、シズハのアネさん！」"
translation = "「캬하하하핫♪ 이건…… 진심 장난 아님다! 엄청나게 재밌지 않슴까, 시즈하 누님!」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「行こう、ディーちゃん」"
translation = "「가자, 디짱」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「今こそ、心願成就――願いを叶える時だよ！」"
translation = "「지금이야말로 심원성취―― 소원을 이룰 때야!」"

[[dialogue]]
speaker = "ディーラック"
original = "「仕方ない、その願い――付き合ってあげるサ！」"
translation = "「어쩔 수 없지, 그 소원―― 같이 해줄게!」"

[[dialogue]]
speaker = "unk"
original = "覚醒したシズハとディーラックは並び立ち、共にエントロフィーへの反撃を開始するのだった。"
translation = "각성한 시즈하와 디럭쿠는 나란히 서서 함께 엔트로피를 향한 반격을 시작하는 것이었다."

