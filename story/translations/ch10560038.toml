[[dialogue]]
speaker = "unk"
original = "しかし、俺は腰を止めない。彼女の奥にある敏感な部分を、外さずに刺激し続ける。"
translation = "그러나, 나는 허리를 멈추지 않는다. 그녀의 안쪽에 있는 민감한 부분을, 놓치지 않고 계속 자극한다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
