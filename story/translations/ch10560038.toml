[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「やぁっ<emoji=heart04>\u3000そんなこと言っちゃダメぇ<emoji=heart04>\u3000恥ずかしいからぁ<emoji=heart04>」"
translation = "「야앗<emoji=heart04> 그런 말 하면 안 돼애<emoji=heart04> 부끄러우니까아<emoji=heart04>」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あっ！？\u3000会長、ダメぇっ<emoji=heart04>\u3000ストップ<emoji=heart04>\u3000あたしまだイったばかりだからぁっ<emoji=heart04>\u3000弱いところ、ぐりぐりし続けちゃあ～っ<emoji=heart04><emoji=heart04>」"
