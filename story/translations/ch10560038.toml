[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「んおぉ゛っ<emoji=heart04>\u3000おち○ちん、気持ちひいっ<emoji=heart04><emoji=heart04>\u3000ずっとイってるのに、もっとしゅごいの、奥からゾクゾクくりゅぅっ<emoji=heart04>」"
translation = "「응오읏<emoji=heart04> 자지, 기분 좋아읏<emoji=heart04><emoji=heart04> 계속 가고 있는데, 더 대단한 게, 안쪽에서부터 짜릿짜릿 와아읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「おっ<emoji=heart04>\u3000お゛っ<emoji=heart04>\u3000ふお゛ぉんっ<emoji=heart04>\u3000らめっ<emoji=heart04>\u3000らめらめっ<emoji=heart04>\u3000気持ち良くて、飛ぶっ<emoji=heart04>\u3000こんな気持ちひいのでイったら、飛んじゃうっ<emoji=heart04><emoji=heart04>」"
translation = "「옽<emoji=heart04> 오읏<emoji=heart04> 후오옹읏<emoji=heart04> 안 돼읏<emoji=heart04> 안 돼안 돼읏<emoji=heart04> 기분 좋아서, 날아갈 것 같아읏<emoji=heart04> 이런 기분 좋은 걸로 가면, 날아가버려읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「おっ、お、お、ぉ、んお゛ぉっ<emoji=heart04><emoji=heart04>\u3000きたっ<emoji=heart04>\u3000大きいのくりゅっ<emoji=heart04>\u3000イってる上から、しゅごく気持ちいいのきひゃうぅっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「옽, 오, 오, 오, 응오읏<emoji=heart04><emoji=heart04> 왔다읏<emoji=heart04> 큰 거 와아읏<emoji=heart04> 가고 있는 위에서, 엄청 기분 좋은 게 와아읏<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「お゛ぉっ、お、ぉ、お、お、ふお゛おぉっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イクっ<emoji=heart04>\u3000イクイグっ<emoji=heart04><emoji=heart04>\u3000おま○こ気持ち良すぎて、天国イっちゃうっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「오읏, 오, 오, 오, 오, 후오오오읏<emoji=heart04><emoji=heart04><emoji=heart04> 간다읏<emoji=heart04> 간다간드읏<emoji=heart04><emoji=heart04> 보지 기분 너무 좋아서, 천국 가버려읏<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「お゛っ、お、ぉ、お、お<emoji=heart04><emoji=heart04>\u3000ふお゛おおぉぉぉ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「오읏, 오, 오, 오, 오<emoji=heart04><emoji=heart04> 후오오오오오～～～읏<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「おち○ちんに負けて、イきゅううう゛ぅぅ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「자지한테 져서, 가아아아아아아아～～～～～～읏<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「お゛っ――んお゛おおおおおぉぉぉ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「오읏――응오오오오오오오오～～～～～～～～～읏<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「おっ―――――――――ふおおぉっ<emoji=heart04><emoji=heart04>\u3000ふはああぁっ……！！」"
translation = "「옽―――――――――후오오읏<emoji=heart04><emoji=heart04> 후하아아앗……!!」"

[[dialogue]]
speaker = "unk"
original = "アムが絶頂の大きな嬌声を上げたあと、体をガクガクと震わせながら、一瞬意識が飛んでいたのか、声が途切れる。"
translation = "아므가 절정의 큰 교성을 지른 후, 몸을 덜덜 떨면서, 한순간 의식이 날아갔는지, 목소리가 끊긴다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「んぁっ<emoji=heart04><emoji=heart04>\u3000ふおっ<emoji=heart04>\u3000お、ぉ、お、んお゛ぉ～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응아앗<emoji=heart04><emoji=heart04> 후오읏<emoji=heart04> 오, 오, 오, 응오오～～～～읏<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺も目の前がチカチカしそうな程の快楽の絶頂を味わいながら、彼女の中に欲望の白濁を注ぎ込む。"
translation = "나도 눈앞이 번쩍일 정도의 쾌락의 절정을 맛보면서, 그녀 안에 욕망의 백탁을 쏟아붓는다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「はああぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000おま○この奥、熱いのいっぱいっ<emoji=heart04><emoji=heart04>\u3000はふぁあぁ～～っ<emoji=heart04><emoji=heart04>\u3000ん゛うぅっ<emoji=heart04>\u3000んはぁ゛あぁああああ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「하아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 보지 안쪽, 뜨거운 거 잔뜩<emoji=heart04><emoji=heart04> 하후아아～～읏<emoji=heart04><emoji=heart04> 응으읏<emoji=heart04> 응하아아아아아아아～～읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「んふぁ゛ああっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000精液、奥にどくどくって叩き付けられる度に、気持ちよくてイクの止まらなっ――あっ！？」"
translation = "「응후아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 정액, 안쪽에 쿵쿵하고 때려 박힐 때마다, 기분 좋아서 가는 게 멈추지 않――앗!?」"

[[dialogue]]
speaker = "unk"
original = "その時、彼女の体がぶるりと震えて。"
translation = "그때, 그녀의 몸이 부르르 떨리고."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「はああぁっ<emoji=heart04><emoji=heart04>\u3000ダメっ<emoji=heart04>\u3000ダメダメっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふああ゛ぁ～～っっ<emoji=heart04><emoji=heart04>」"
translation = "「하아아앗<emoji=heart04><emoji=heart04> 안 돼읏<emoji=heart04> 안 돼안 돼읏<emoji=heart04> 응으읏<emoji=heart04> 앗<emoji=heart04> 후아아아읏～～읏읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「でるっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04><emoji=heart04>\u3000おしっこ出ちゃうぅぅ～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「나온다읏<emoji=heart04><emoji=heart04><emoji=heart04> 앗<emoji=heart04><emoji=heart04> 오줌 나와버려어～～～읏<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あ゛っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000――ふあ゛あああぁぁぁ～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아윽<emoji=heart04><emoji=heart04><emoji=heart04> ――후아아아아아～～앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺がペニスを引き抜くと同時に、アムは体をビクビク痙攣させながら、<b>本物の</b>おしっこを漏らしてしまった。"
translation = "내가 페니스를 뽑아내는 것과 동시에, 아므는 몸을 움찔움찔 경련시키며, 진짜 오줌을 흘려 버렸다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「はあぁあああ～～っ<emoji=heart04><emoji=heart04>\u3000本当におしっこ出ちゃってるぅ～……<emoji=heart04>」"
translation = "「하아아아아아～～앗<emoji=heart04><emoji=heart04> 정말로 오줌이 나와 버렸어～……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「んはあぁっ……<emoji=heart04>\u3000お漏らししてるところが鏡に映ってて、恥ずかしいよぉ……<emoji=heart04>\u3000子供みたいでカッコ悪いのに……」"
translation = "「응하아앗……<emoji=heart04> 오줌을 지리는 모습이 거울에 비쳐서, 부끄러워어……<emoji=heart04> 어린애 같아서 꼴사나운데……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「大丈夫、気持ち良さそうにおしっこしてるアム、可愛いよ」"
translation = "「괜찮아, 기분 좋게 오줌 누는 아므, 귀여워」"

[[dialogue]]
speaker = "unk"
original = "俺はそう言いながら、アムの首筋に愛を込めて口付けをする。"
translation = "나는 그렇게 말하며, 아므의 목덜미에 사랑을 담아 입맞춤을 한다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あっ<emoji=heart04>\u3000も、もう……会長のヘンタイ……<emoji=heart04>\u3000ベッドに行ってからは、負けないんだからね？」"
translation = "「앗<emoji=heart04> 모, 이제…… 회장군의 변태……<emoji=heart04> 침대에 가서는, 안 질 거니까?」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「んっ……ちゅっ<emoji=heart04>」"
translation = "「응읏…… 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その後、アムと一緒にシャワーを浴びながら、キスをして。"
translation = "그 후, 아므와 함께 샤워를 하면서, 키스를 하고."

[[dialogue]]
speaker = "unk"
original = "ベッドに場所を移してからも、何度も激しい勝負を繰り返してしまう俺たちなのだった。"
translation = "침대로 장소를 옮긴 후에도, 몇 번이고 격렬한 승부를 반복하는 우리들이었다."

