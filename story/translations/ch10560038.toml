translation = "「아읏<emoji=heart04><emoji=heart04><emoji=heart04> 거기<emoji=heart04> 거기 강하게 찌르면 안 돼읏<emoji=heart04> 안쪽의 느껴버리는 곳이야아<emoji=heart04> 앗, 앗, 하앙읏<emoji=heart04> 후아아아～읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「ねちっこく刺激されるの、気持ち良くなっちゃうっ<emoji=heart04>\u3000気持ち良すぎておかしくなっちゃうからぁ<emoji=heart04>\u3000ん゛っ、んふぅっ<emoji=heart04>\u3000んああぁっ<emoji=heart04><emoji=heart04>」"
translation = "「끈적하게 자극받는 거, 기분 좋아져버려읏<emoji=heart04> 기분 너무 좋아서 이상해져버리니까아<emoji=heart04> 응읏, 응후읏<emoji=heart04> 응아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「はあああ゛ぁっ<emoji=heart04>\u3000らめっ<emoji=heart04>\u3000らめらめぇっ<emoji=heart04><emoji=heart04>\u3000奥の方から気持ちいいの登って来ちゃうのぉっ<emoji=heart04><emoji=heart04>\u3000あっ、あっ、ふあ゛ああああぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「하아아아아읏<emoji=heart04> 안 돼읏<emoji=heart04> 안 돼안 돼애읏<emoji=heart04><emoji=heart04> 안쪽에서부터 기분 좋은 게 올라와버려어읏<emoji=heart04><emoji=heart04> 앗, 앗, 후아아아아아～～읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「イクっ<emoji=heart04>\u3000イクイクっ<emoji=heart04><emoji=heart04>\u3000あ゛っ――<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「간다읏<emoji=heart04> 간다간다읏<emoji=heart04><emoji=heart04> 아읏――<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「ふあ゛ああああぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000またイったぁ゛あああぁああぁあ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 또 갔어아아아아아아아아～～～읏<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "絶頂の嬌声と共に、アムの小さな体がガクガクと震える。"
