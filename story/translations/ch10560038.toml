[[dialogue]]
speaker = "unk"
original = "俺はぺニスを膣の一番奥まで挿入して、腰を大きく動かし始めた。"
translation = "나는 페니스를 질의 가장 안쪽까지 삽입하고, 허리를 크게 움직이기 시작했다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あ゛っ、あんっ、はあぁっ、あんっ<emoji=heart04><emoji=heart04>\u3000んぁ゛っ、あふぅっ、ふあぁっ<emoji=heart04>\u3000おち○ちん、奥の気持ちいいところ、どちゅどちゅ当たってるぅ<emoji=heart04><emoji=heart04>」"
translation = "「아읏, 앙읏, 하아앗, 앙읏<emoji=heart04><emoji=heart04> 응아읏, 아후읏, 후아앗<emoji=heart04> 자지, 안쪽의 기분 좋은 곳, 툭툭툭 닿고 있어아<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「らめっ<emoji=heart04>\u3000ん゛ああぁっ<emoji=heart04>\u3000深くて、刺激強くてしゅごいぃっ<emoji=heart04>\u3000あ゛っ、あんっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふあ゛あぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「안 돼읏<emoji=heart04> 응아아아앗<emoji=heart04> 깊고, 자극 강해서 대단해읏<emoji=heart04> 아읏, 앙읏<emoji=heart04> 하아앗<emoji=heart04> 후아아앙읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は腰を突き上げる度に、亀頭で膣の奥にある彼女の性感帯を狙って、ぐりぐりと刺激する。"
translation = "나는 허리를 밀어 올릴 때마다, 귀두로 질 안쪽에 있는 그녀의 성감대를 노려, 꾹꾹 자극한다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
