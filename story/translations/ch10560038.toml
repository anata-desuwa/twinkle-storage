translation = "「후아앗<emoji=heart04> 앙읏<emoji=heart04> 앗<emoji=heart04> 하아앗<emoji=heart04> 응아아앙읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は腰の動きを止めずに、彼女の浅いところの性感帯を愛撫し続けながら、囁く。"
translation = "나는 허리의 움직임을 멈추지 않고, 그녀의 얕은 곳의 성감대를 계속 애무하며, 속삭인다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「気持ち良くとろけちゃってる顔、すごくエッチだよ」"
