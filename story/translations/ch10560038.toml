translation = "「응아아아앗!? 회장, 안 돼애<emoji=heart04><emoji=heart04> 가고 있어<emoji=heart04> 계속 가고 있어어<emoji=heart04> 안에서 가는 거 멈출 수 없게 돼버리니까아～～읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あっ、あっ、あ゛っ<emoji=heart04><emoji=heart04>\u3000ふぁあ゛ああああ～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗, 앗, 아읏<emoji=heart04><emoji=heart04> 후아아아아아～～읏<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "足先がピンと伸びて、ガクガクとまた震える。"
translation = "발끝이 핀 하고 펴지고, 덜덜 또 떨린다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「気持ちひいのずっと続いてるぅ<emoji=heart04>\u3000頭の中バチバチして、あたし、おかしくなっちゃうよぉ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「기분 좋은 게 계속 이어지고 있어아<emoji=heart04> 머릿속이 찌릿찌릿해서, 나, 이상해져버린다구우～～읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「アム、大丈夫――」"
translation = "「아므, 괜찮아――」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「イクのは気持ち良くて悪いことじゃないから、いっぱいイっちゃって大丈夫だよ」"
translation = "「가는 건 기분 좋고 나쁜 일이 아니니까, 잔뜩 가버려도 괜찮아」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あ゛っ<emoji=heart04><emoji=heart04>\u3000んあ゛ああぁ～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「～～～읏<emoji=heart04><emoji=heart04><emoji=heart04> 아읏<emoji=heart04><emoji=heart04> 응아아아아～～읏<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "耳元で甘く囁きながら、更に腰の動きを速めると、アムが大きな嬌声を上げる。"
translation = "귓가에 달콤하게 속삭이며, 더욱 허리의 움직임을 빠르게 하자, 아므가 큰 교성을 지른다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「おっ<emoji=heart04>\u3000おち○ちん、しゅごいぃっ<emoji=heart04><emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000ふうぅ゛っ<emoji=heart04>\u3000らめっ<emoji=heart04>\u3000気持ち<emoji=heart04>\u3000気持ちひぃ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「옽<emoji=heart04> 자지, 대단해읏<emoji=heart04><emoji=heart04> 응응읏<emoji=heart04> 후우읏<emoji=heart04> 안 돼읏<emoji=heart04> 기분<emoji=heart04> 기분 좋아아～～읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「――んぉ゛っ！？\u3000お゛っ、おぉぉ<emoji=heart04><emoji=heart04>\u3000んお゛ぉぉっ<emoji=heart04>\u3000ふおぉお゛っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000奥、ぐりゅぐりゅ<emoji=heart04>\u3000おま○こに効きゅぅ<emoji=heart04>」"
