[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「ん～！\u3000久しぶりのデート、楽しかった～♪」"
translation = "「음~! 오랜만의 데이트, 즐거웠어~♪」"

[[dialogue]]
speaker = "unk"
original = "クリスマスの後日。しばらく２人きりでデートできなかった埋め合わせとして、俺たちは一緒に街へ遊びに出かけていた。"
translation = "크리스마스 며칠 뒤. 한동안 둘이서만 데이트하지 못했던 보상으로 우리는 함께 거리에 놀러 나갔다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「でも、夢中になり過ぎて、結構長い時間歩き回っちゃってたね♪\u3000ねぇ、会長……ちょっと休憩しちゃう？」"
translation = "「그치만 너무 열중해서 꽤 오랫동안 돌아다녔네♪ 저기, 회장…… 잠깐 쉴까?」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「どこでって……ふふっ、それはね～」"
translation = "「어디서냐니…… 후후, 그건 말이지~」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「ラ・ブ・ホ<emoji=heart04>\u3000クリスマス気分で、行ってみたいな～♪」"
translation = "「러·브·호·텔<emoji=heart04> 크리스마스 기분으로 가보고 싶어~♪」"

[[dialogue]]
speaker = "unk"
original = "附属生らしからぬ甘く誘うような笑みを浮かべて、上目遣いをしてくるアム。俺は思わず、ごくりと生唾を飲み込んでしまう。"
translation = "부속교생답지 않은 달콤하게 유혹하는 미소를 띄우며 위로 치켜뜬 눈으로 바라보는 아무. 나는 무심코 꿀꺽 침을 삼키고 만다."

[[dialogue]]
speaker = "unk"
original = "それから、ラブホに入り、俺が先にシャワーを浴びていると――"
translation = "그러고 나서 러브호텔에 들어가 내가 먼저 샤워를 하고 있자──"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「か・い・ちょ・お～<emoji=heart04>\u3000えいっ<emoji=heart04>」"
translation = "「회·장·님~<emoji=heart04> 에잇<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "アムが悪戯な笑顔を浮かべて、バスルームへ乱入してきた。"
translation = "아무가 장난스러운 미소를 띄우며 욕실로 난입해 왔다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「えへへっ<emoji=heart04>\u3000今日はクリスマスの埋め合わせだから、クリスマスフォームに衣装チェンジしちゃった～<emoji=heart04>」"
translation = "「에헤헤<emoji=heart04> 오늘은 크리스마스 보상 타임이니까 크리스마스 폼으로 의상 체인지했어~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "煽るように抱き着き、体を擦り付けてくるアム。そんな彼女に、俺はムラムラが我慢できなくなってしまって。"
translation = "도발하듯 매달리며 몸을 비벼오는 아무. 그런 그녀의 모습에 나는 욕정을 참을 수 없게 되어버리고."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「って、きゃっ……！？\u3000会長！？」"
translation = "「앗, 꺄악……!? 회장!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「悪戯してくる悪い子には、お仕置きだ」"
translation = "「장난치는 나쁜 아이에게는, 벌을 줘야지」"

[[dialogue]]
speaker = "unk"
original = "俺は彼女の足を抱えて、その小さな体を持ち上げた。"
translation = "나는 그녀의 다리를 안고, 그 작은 몸을 들어 올렸다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「こ、この体勢、ずるいっ……！\u3000あたし、動けないよ～！」"
translation = "「이, 이 자세, 치사해읏……! 나, 움직일 수 없잖아～!」"

[[dialogue]]
speaker = "unk"
original = "足をジタバタさせるアムの耳元で、俺は囁く。"
translation = "다리를 버둥거리는 아므의 귓가에, 나는 속삭인다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ほら、見て。バスルームの鏡に、アムの姿が映ってるよ」"
translation = "「자, 봐. 욕실 거울에, 아므의 모습이 비치고 있어」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「……！\u3000ちょ、ちょっと、会長っ。恥ずかしいよぉ～<emoji=heart04>\u3000はあぁ……<emoji=heart04>\u3000んふぅ……<emoji=heart04>」"
translation = "「……! 저, 잠깐, 회장! 부끄럽잖아～<emoji=heart04> 하아아……<emoji=heart04> 응후우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "頬を赤く染めて、まる見えになってしまっているおま○こを隠そうとするアム。しかし、期待するような吐息の漏れる音が聞こえてくる。"
translation = "뺨을 붉게 물들이고, 완전히 드러나 버린 보지를 감추려 하는 아므. 그러나, 기대하는 듯한 한숨이 새어 나오는 소리가 들려온다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「こら、アム。隠そうとしないで、自分でその大きなお尻を持って、おま○こが見えるようにちゃんと広げてみせて」"
translation = "「이봐, 아므. 감추려 하지 말고, 스스로 그 커다란 엉덩이를 잡고, 보지가 보이도록 제대로 벌려 보여줘」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「うぅ……<emoji=heart04>\u3000会長のエッチぃ……<emoji=heart04>」"
translation = "「으으……<emoji=heart04> 회장, 야해……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "あくまで優しく促すと、アムは恥ずかしそうに息を震わせながらも、鏡の前でお尻を掴んで、おま○こが見えるようにちゃんと広げてみせる。"
translation = "어디까지나 상냥하게 재촉하자, 아므는 부끄러운 듯 숨을 떨면서도, 거울 앞에서 엉덩이를 잡고, 보지가 보이도록 제대로 벌려 보인다."

[[dialogue]]
speaker = "unk"
original = "鏡に映る彼女の姿に興奮してきて、俺はペニスを、その大きなお尻に擦り付け始める。"
translation = "거울에 비치는 그녀의 모습에 흥분하여, 나는 페니스를, 그 커다란 엉덩이에 문지르기 시작한다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「ふあぁっ<emoji=heart04>\u3000ん……っ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000あんっ……<emoji=heart04>\u3000会長のおち○ちんで、お尻スリスリされてる……<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁ……っ<emoji=heart04>\u3000んふぅ<emoji=heart04>」"
translation = "「후아앗<emoji=heart04> 응……읏<emoji=heart04> 하아앗<emoji=heart04> 앙읏……<emoji=heart04> 회장의 자지로, 엉덩이 문질러지고 있어……<emoji=heart04> 앗<emoji=heart04> 하아아……읏<emoji=heart04> 응후우<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「お尻に擦り付けてるだけで、アムのおま○こ、濡れてきてるよ？」"
translation = "「엉덩이에 문지르는 것만으로, 아므의 보지, 젖어 오고 있어?」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「そ、それは会長が、よくお尻コキしてくるからぁ……<emoji=heart04>」"
translation = "「그, 그건 회장이, 자주 엉덩이 비벼줘서아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「んっ……ふうぅ……<emoji=heart04>\u3000あたしのお尻……会長に触られると、前より敏感に感じるようになっちゃったんだもん……<emoji=heart04>」"
translation = "「응읏……후우우……<emoji=heart04> 내 엉덩이…… 회장에게 만져지면, 전보다 민감하게 느끼게 돼버렸는걸……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "鏡に映っているアムのおま○こは、すっかり愛液がトロトロを垂れ落ちてくるくらいに、びしょ濡れになってしまっている。"
translation = "거울에 비치고 있는 아므의 보지는, 완전히 애액이 줄줄 흘러내릴 정도로, 흠뻑 젖어 버렸다."

[[dialogue]]
speaker = "unk"
original = "そして、アムの弾力あるお尻の感触を堪能していた俺のペニスも、すっかりバキバキに勃起してしまっていた。"
translation = "그리고, 아므의 탄력 있는 엉덩이의 감촉을 만끽하고 있던 나의 페니스도, 완전히 단단하게 발기해 버렸다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「もう挿れちゃっても大丈夫そうだな。アム――挿れちゃうよ？」"
translation = "「이제 넣어버려도 괜찮을 것 같네. 아므――넣어버린다?」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「ふあぁっ<emoji=heart04>\u3000おち○ちん、クリに擦れてる……<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000んふぅ……<emoji=heart04>」"
translation = "「후아앗<emoji=heart04> 자지, 클리에 스치고 있어……<emoji=heart04> 응응읏<emoji=heart04> 응후우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あっ<emoji=heart04>\u3000膣穴にずぷって入って……<emoji=heart04>\u3000んっ<emoji=heart04>\u3000あっ――<emoji=heart04>」"
translation = "「앗<emoji=heart04> 질 구멍에 쑥 하고 들어가서……<emoji=heart04> 응읏<emoji=heart04> 앗――<emoji=heart04>」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「ふあああぁ～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「후아아아아～～～앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はアムの中にペニスを挿入し、腰をゆっくりと動かし始めた。"
translation = "나는 아므 안에 페니스를 삽입하고, 허리를 천천히 움직이기 시작했다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あんっ<emoji=heart04>\u3000はふぅっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んふぅんっ……！\u3000あっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふああぁっ……！」"
translation = "「앙읏<emoji=heart04> 하후읏<emoji=heart04> 응읏<emoji=heart04> 응후우응읏……! 앗<emoji=heart04> 응아앗<emoji=heart04> 하아앗<emoji=heart04> 후아아앗……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「アム、セックスしているところ、鏡で見てごらん」"
translation = "「아므, 섹스하고 있는 모습, 거울로 봐봐」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「はあぁっ<emoji=heart04>\u3000あたしのおま○こに、会長の大きなおち○ちんがずぶずぶ入ってるぅ<emoji=heart04>」"
translation = "「하아앗<emoji=heart04> 내 보지에, 회장의 커다란 자지가 쑥쑥 들어가고 있어아<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「アムの顔、すごく気持ち良さそうな表情をしているよ」"
translation = "「아므의 얼굴, 엄청 기분 좋은 표정을 짓고 있어」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「やぁっ、ダメ<emoji=heart04>\u3000言わないで<emoji=heart04>\u3000恥ずかしいからぁ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「야앗, 안 돼<emoji=heart04> 말하지 마<emoji=heart04> 부끄러우니까아<emoji=heart04> 앗<emoji=heart04> 앙읏<emoji=heart04> 후아아앙읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は彼女の膣内――お腹側の浅いところにある性感帯を刺激し始める。"
translation = "나는 그녀의 질 안쪽――배 쪽의 얕은 곳에 있는 성감대를 자극하기 시작한다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あっ<emoji=heart04>\u3000そこ<emoji=heart04>\u3000ダメぇ<emoji=heart04>\u3000おま○この弱いところぉ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000はああぁっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 거기<emoji=heart04> 안 돼애<emoji=heart04> 보지의 약한 부분이야아<emoji=heart04> 하앙읏<emoji=heart04> 응아앗<emoji=heart04> 하아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「んうぅっ<emoji=heart04>\u3000この体勢だと、いつもよりおち○ちん強く当たってぇ<emoji=heart04>\u3000すごく感じちゃう<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んああぁっ<emoji=heart04>」"
translation = "「응으읏<emoji=heart04> 이 자세는, 평소보다 자지가 강하게 닿아서아<emoji=heart04> 엄청 느껴버려<emoji=heart04> 앗<emoji=heart04> 앙읏<emoji=heart04> 응아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「おま○こ気持ちいいっ……<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000そこ、ズリズリされるの気持ちいいのぉ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000んああぁ～っ<emoji=heart04><emoji=heart04>」"
translation = "「보지 기분 좋아읏……<emoji=heart04> 앗<emoji=heart04> 하앙읏<emoji=heart04> 거기, 질척질척 문질러지는 거 기분 좋아아<emoji=heart04> 응으읏<emoji=heart04> 후아앗<emoji=heart04> 응아아아～앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あんっ<emoji=heart04>\u3000ダメ<emoji=heart04>\u3000もうイっちゃう<emoji=heart04>\u3000会長、そんなねちっこくズリズリ繰り替えされたら……あっ<emoji=heart04>\u3000ふああぁ～っ<emoji=heart04>」"
translation = "「앙읏<emoji=heart04> 안 돼<emoji=heart04> 벌써 가버려<emoji=heart04> 회장, 그렇게 끈적하게 질척질척 반복하면……앗<emoji=heart04> 후아아아～앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あたし気持ち良くて、すぐにイっちゃうよぉ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000ふああぁんっっ<emoji=heart04><emoji=heart04>」"
translation = "「나 기분 좋아서, 바로 가버린다구우<emoji=heart04> 하아앗<emoji=heart04> 응으읏<emoji=heart04> 후아아앙읏읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は彼女の耳元で、甘く囁く。"
translation = "나는 그녀의 귓가에, 달콤하게 속삭인다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「大丈夫――イっていいよ」"
translation = "「괜찮아――가도 돼」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あっ<emoji=heart04>\u3000そんな風に言われたら<emoji=heart04>\u3000んううぅ～っ<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 그렇게 말하면<emoji=heart04> 응으으으～읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "アムは、ぶるりと体を身震いさせて、熱い吐息を漏らす。"
translation = "아므는, 부르르 몸을 떨며, 뜨거운 한숨을 흘린다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「んっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000ふうぅ～っ<emoji=heart04><emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ダメっ<emoji=heart04>\u3000おま○こ来ちゃうっ<emoji=heart04><emoji=heart04>」"
translation = "「응읏<emoji=heart04> 응으읏<emoji=heart04> 후우우～읏<emoji=heart04><emoji=heart04> 하아앗<emoji=heart04> 안 돼읏<emoji=heart04> 보지 와버려읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あっ、あっ<emoji=heart04>\u3000イクっ<emoji=heart04><emoji=heart04>\u3000イクイクイクイクっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗, 앗<emoji=heart04> 간다읏<emoji=heart04><emoji=heart04> 간다간다간다간다읏<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あっ――<emoji=heart04><emoji=heart04>」"
translation = "「앗――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「おま○こイっちゃうぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふあああぁぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「보지 가버려어～～～읏<emoji=heart04><emoji=heart04><emoji=heart04> 후아아아아아～～～읏<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "アムの体がビクビクッと大きく震えて、足先がピンと伸びる。"
translation = "아므의 몸이 움찔움찔 크게 떨리고, 발끝이 핀 하고 펴진다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
