[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「――あっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000んあああぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「――앗<emoji=heart04><emoji=heart04><emoji=heart04> 응아아아아～～～읏<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「また潮吹いちゃうぅ～～～んっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふあああぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「또 조수 나와버려어～～～응읏<emoji=heart04><emoji=heart04><emoji=heart04> 앗<emoji=heart04> 하아앗<emoji=heart04> 후아아아～～읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "再びエッチなおしっこを漏らして、ビクビクと体を震わせながら、イってしまうアム。"
translation = "다시 야한 오줌을 흘리고, 움찔움찔 몸을 떨면서, 가버리는 아므."

