[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「～～っ<emoji=heart04>\u3000はああぁ～っ<emoji=heart04><emoji=heart04>\u3000会長、またそんなこと言ったらぁ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふああぁ～っ<emoji=heart04><emoji=heart04>」"
translation = "「～～읏<emoji=heart04> 하아아아～읏<emoji=heart04><emoji=heart04> 회장, 또 그런 말 하면아<emoji=heart04> 앗<emoji=heart04> 응읏<emoji=heart04> 후아아아～읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「背筋、ゾクゾクって登ってきてぇ～っ……<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふうぅっ……！」"
translation = "「등골, 찌릿찌릿 올라와서어～읏……<emoji=heart04><emoji=heart04> 앗<emoji=heart04> 응읏<emoji=heart04> 후우읏……!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「んああぁっ<emoji=heart04>\u3000ダメっ<emoji=heart04>\u3000おま○こゾワゾワって気持ち良くなって、またイっちゃうっ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000ふううぅっ<emoji=heart04><emoji=heart04>」"
translation = "「응아아앗<emoji=heart04> 안 돼읏<emoji=heart04> 보지 짜릿짜릿 기분 좋아져서, 또 가버려읏<emoji=heart04><emoji=heart04> 앗<emoji=heart04> 응으읏<emoji=heart04> 후우우읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「はあぁっ<emoji=heart04>\u3000イク<emoji=heart04>\u3000イクイクイクっ――<emoji=heart04><emoji=heart04><emoji=heart04>」"
