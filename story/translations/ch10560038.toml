translation = "「야앗<emoji=heart04> 간 직후의 꼴사나운 이상한 얼굴, 보여지는 거 엄청 부끄러워어<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
