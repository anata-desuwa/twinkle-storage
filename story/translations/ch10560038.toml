translation = "연속으로 절정하여 점점 넋을 잃어가는 아므의 음란한 모습에, 나도 이제 흥분으로 참을 수 없게 되어."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
