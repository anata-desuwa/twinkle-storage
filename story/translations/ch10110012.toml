[[dialogue]]
speaker = "unk"
original = "第２話,普通のアプローチ,P"
translation = "제2화, 평범한 어프로치, P"

[[dialogue]]
speaker = "女子生徒Ａ"
original = "「会長、お疲れさまっ。これ、今日の調理実習で作ったクッキーなんだけど、よかったら食べて！」"
translation = "「회장님, 수고하셨어요. 이거 오늘 요리 실습 시간에 만든 쿠키인데, 괜찮으면 드세요!」"

[[dialogue]]
speaker = "女子生徒Ｂ"
original = "「わ、私も……あ、あんまり美味しくないかもしれないけど、よければ、どうぞ……」"
translation = "「저, 저도…… 별로 맛없을지도 모르지만, 괜찮으시다면 드세요……」"

[[dialogue]]
speaker = "unk"
original = "ありがとう、どれも美味しそうだ"
translation = "고마워, 다 맛있어 보이네."

[[dialogue]]
speaker = "ヴィーナス"
original = "「凄いことになってるわね。これが星徒会長効果ってやつなのかしら。両手で持ちきれないくらいクッキーをもらってるじゃない」"
translation = "「대단한 상황이네. 이게 성도회장 효과라는 걸까. 양손으로 다 들지 못할 정도로 쿠키를 받고 있잖아.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「なんだか私が星徒会長になった直後を思い出すわね。私も調理実習があった日は、色んな子からお菓子をもらったわ……」"
translation = "「왠지 내가 성도회장이 된 직후가 생각나네. 나도 요리 실습이 있던 날은 여러 아이들에게 과자를 받았었지……」"

[[dialogue]]
speaker = "マトイ"
original = "（う、うわぁ……そりゃそうだよね。みんなそうするよね……）"
translation = "(으, 으와아…… 그야 그렇겠지. 다들 그렇게 하겠지……)"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そうするって？」"
translation = "「그렇게 한다니?」"

[[dialogue]]
speaker = "マトイ"
original = "（作ったもの、会長にプレゼントするってこと！）"
translation = "(만든 거, 회장님한테 선물한다는 거!)"

[[dialogue]]
speaker = "マトイ"
original = "（御前試合でヴィーナスに勝ってから、みんな気になってるんだよ。やっぱりその、ちょ、ちょっとかっこよかったし……）"
translation = "(어전 시합에서 비너스에게 이긴 뒤로 다들 신경 쓰고 있다고. 역시 그게, 조, 조금 멋있었으니까……)"

[[dialogue]]
speaker = "マトイ"
original = "「ど、どうしようかな……やっぱりやめておこうかな……」"
translation = "「어, 어떡하지…… 역시 그만둘까……」"

[[dialogue]]
speaker = "unk"
original = "２人は調理実習、何を作ったんだ？"
translation = "두 사람은 요리 실습 때 뭘 만들었어?"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私はグループの子たちに全部任せたわ！\u3000ああいうグラム単位で量を測ったりするものって、苦手なのよ」"
translation = "「나는 그룹 애들한테 다 맡겼어! 그런 그램 단위로 양을 재거나 하는 건 서투르거든.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「だからずっと、お皿を出したり片づけたりしてたわね。……あれ？\u3000なんでお皿を出した後、すぐ片づけてたのかしら……？」"
translation = "「그래서 계속 접시를 꺼내거나 정리하거나 했지. ……어라? 왜 접시를 꺼낸 다음에 바로 정리하고 있었을까……?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ちなみにできたお菓子は全部アナにあげちゃったから、もうクロトの分はないわ！」"
translation = "「참고로 완성된 과자는 전부 아나한테 줘버렸으니까, 이제 쿠로토 몫은 없어!」"

[[dialogue]]
speaker = "マトイ"
original = "「私も、その……クッキーを作ったんだけど……。会長はそんなにもらってるんだったら、やっぱりもう、クッキーはお腹いっぱいだよね……？」"
translation = "「나도, 그…… 쿠키를 만들었는데……. 회장은 그렇게 많이 받았다면 역시 이제 쿠키는 배부르겠지……?」"

[[dialogue]]
speaker = "マトイ"
original = "「あー、わ、私もアナにあげてこよっかな！\u3000アナってお菓子をあげるとすっごく嬉しそうにしてくれるから、渡し甲斐があるんだよねっ」"
translation = "「아─ 나, 나도 아나한테 주고 올까! 아나는 과자를 주면 정말 기뻐해 주니까 주는 보람이 있거든!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あれ？\u3000でもそのクッキー、疲れてるクロトのために特別甘くしたって言ってなかったかしら？」"
translation = "「어라? 하지만 그 쿠키, 지쳐있는 쿠로토를 위해서 특별히 달게 만들었다고 하지 않았니?」"

[[dialogue]]
speaker = "マトイ"
original = "「ちょっ！？\u3000なに言ってるのヴィーナス！？」"
translation = "「잠깐!? 무슨 소리 하는 거야 비너스!?」"

[[dialogue]]
speaker = "マトイ"
original = "「か、会長！\u3000ヴィーナスが言ってるのはその、嘘ではないんだけど！\u3000誇張が大いに含まれてるというか……！」"
translation = "「회, 회장님! 비너스가 말하는 건 그게, 거짓말은 아니지만! 과장이 많이 섞여 있달까……!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「……なるほどね。マトイ、その慌てようで私、何か察しちゃったかもしれないわ」"
translation = "「……그렇구나. 마토이, 그 당황하는 기색을 보니 나, 뭔가 눈치챈 것 같아.」"

[[dialogue]]
speaker = "マトイ"
original = "「ヴィーナス、ちょっと待っ──」"
translation = "「비너스, 잠깐 기다──」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ズバリ！！！\u3000もう全部、誰かにあげちゃったのね！！！」"
translation = "「정답!!! 벌써 전부 누군가에게 줘버렸구나!!!」"

[[dialogue]]
speaker = "マトイ"
original = "「は？」"
translation = "「하?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「わかるわ。マトイの作ったお菓子ってすっごく美味しいもの。実習の後のお菓子交換のときも、まずみんなマトイのところへ行くわ」"
translation = "「알아. 마토이가 만든 과자는 정말 맛있으니까. 실습 후에 과자 교환할 때도 다들 먼저 마토이한테 가거든.」"

[[dialogue]]
speaker = "マトイ"
original = "「べ、別に普通レベルだよ。趣味でちょっとお菓子作りしてるくらいだし」"
translation = "「벼, 별로 평범한 수준이야. 취미로 조금 과자 만들기 하는 정도고.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そんなことないわ。私はマトイが作ったお菓子が、今まで食べてきたお菓子の中で１番好きよ」"
translation = "「그렇지 않아. 나는 마토이가 만든 과자가 지금까지 먹어본 과자 중에서 제일 좋아.」"

[[dialogue]]
speaker = "マトイ"
original = "「そ、そうなの……？\u3000ん……ありがとう、ヴィーナス」"
translation = "「그, 그래……? 응…… 고마워, 비너스.」"

[[dialogue]]
speaker = "unk"
original = "マトイの作ったクッキー、食べたかったな"
translation = "마토이가 만든 쿠키, 먹고 싶었는데."

[[dialogue]]
speaker = "マトイ"
original = "「へっ！？\u3000そ、そうなんだ……」"
translation = "「헤!? 그, 그렇구나……」"

[[dialogue]]
speaker = "unk"
original = "──仕事がなかなか片付かず、こんな時間になってしまった。"
translation = "──업무가 좀처럼 끝나지 않아 이런 시간이 되어버렸다."

[[dialogue]]
speaker = "マトイ"
original = "「あっ──ま、待って、会長っ！」"
translation = "「앗── 기, 기다려, 회장님!」"

[[dialogue]]
speaker = "マトイ"
original = "「お、お疲れさまっ……結構遅くまで仕事してたんだね」"
translation = "「수, 수고했어…… 꽤 늦게까지 일했네.」"

[[dialogue]]
speaker = "unk"
original = "マトイもこんな時間まで？"
translation = "「마토이도 이런 시간까지?」"

[[dialogue]]
speaker = "マトイ"
original = "「わ、私はその……会長のことを、待ってたっていうか……」"
translation = "「저, 저는 그게…… 회장님을, 기다렸다고 해야 할까……」"

[[dialogue]]
speaker = "マトイ"
original = "「その……これ。ずっと渡そうと思ってたんだけど、なかなかタイミングが見つけられなくて……」"
translation = "「그…… 이거. 계속 주려고 생각했는데, 좀처럼 타이밍을 못 잡아서……」"

[[dialogue]]
speaker = "マトイ"
original = "「調理実習で作ったクッキー……よ、よかったら、食べてもらえたら、嬉しい、かも……」"
translation = "「조리 실습 때 만든 쿠키…… 거, 괜찮다면, 먹어준다면, 기쁠지도……」"

[[dialogue]]
speaker = "unk"
original = "残ってたんだ！\u3000今、食べていい？"
translation = "남아 있었구나! 지금 먹어도 돼?"

[[dialogue]]
speaker = "マトイ"
original = "「へっ、い、今食べるの！？\u3000ちょっと待って、心の準備が……！」"
translation = "「헤, 지, 지금 먹는 거야!? 잠깐만, 마음의 준비가……!」"

[[dialogue]]
speaker = "マトイ"
original = "「すーーー……はーーー…………ど、どうぞ」"
translation = "「후우우우…… 하아아아………… 자, 여기」"

[[dialogue]]
speaker = "マトイ"
original = "（普通の味だと思うけど、決してマズくはない……よね？）"
translation = "（평범한 맛이라고 생각하지만, 결코 맛없지는…… 않겠지?）"

[[dialogue]]
speaker = "unk"
original = "甘くて凄く美味しいよ……！"
translation = "달고 정말 맛있어……!"

[[dialogue]]
speaker = "マトイ"
original = "「ほ、ほんとう……！？\u3000よ、よかったぁ……」"
translation = "「저, 정말……!? 다, 다행이다……」"

[[dialogue]]
speaker = "マトイ"
original = "「え、えへへ……そ、そんなに喜んでくれるなんて思わなかった。頑張って作ってよかったぁ……っ」"
translation = "「에, 에헤헤…… 그, 그렇게 기뻐해 줄 줄은 몰랐어. 열심히 만들길 잘했다……아」"

[[dialogue]]
speaker = "unk"
original = "疲れてる俺の為に作ってくれたっていうのは、本当に？"
translation = "지친 나를 위해 만들어 줬다는 건, 정말이야?"

[[dialogue]]
speaker = "マトイ"
original = "「あっ、そ、それは……う、うん。ほら、会長は今日みたいに、いつも夜遅くまで仕事頑張ってるから……。普通の私でも、何か労えたらなって……」"
translation = "「앗, 그, 그건…… 으, 응. 봐봐, 회장님은 오늘처럼 항상 밤늦게까지 일 열심히 하니까……. 평범한 나라도, 뭔가 위로가 된다면 해서……」"

[[dialogue]]
speaker = "マトイ"
original = "「──そんな、お礼なんていいよっ。私が勝手にやっただけだし……！」"
translation = "「──그런, 답례 같은 건 괜찮아! 내가 멋대로 한 것뿐이고……!」"

[[dialogue]]
speaker = "マトイ"
original = "「……あの、会長？\u3000その……もし嫌じゃなければ、なんだけど……。またお菓子作ったら、食べてもらってもいい、かな？」"
translation = "「……저기, 회장님? 그…… 혹시 싫지 않다면 말인데……. 또 과자 만들면, 먹어줘도 될, 까?」"

[[dialogue]]
speaker = "マトイ"
original = "「ほ、ほら私！\u3000お菓子作るのが趣味だって言ったでしょ。でも自分じゃ、美味しいかどうかって、客観的に見れないから……味見役になってくれたらな……って」"
translation = "「버, 봐봐 나! 과자 만드는 게 취미라고 했잖아. 하지만 스스로는 맛있는지 어떤지 객관적으로 볼 수 없으니까…… 맛보기 담당이 되어준다면 해서……」"

[[dialogue]]
speaker = "unk"
original = "もちろんいいよ！\u3000楽しみにしてる"
translation = "물론 좋지! 기대하고 있을게"

[[dialogue]]
speaker = "マトイ"
original = "「あ、ありがとう！\u3000私、会長に美味しいって言ってもらえるように、頑張るからっ。また正直な感想をよろしくお願いしますっ」"
translation = "「고, 고마워! 나, 회장님한테 맛있다는 소리 들을 수 있게 노력할 테니까. 또 솔직한 감상 부탁해!」"

[[dialogue]]
speaker = "マトイ"
original = "「えへへ……♪」"
translation = "「에헤헤……♪」"

[[dialogue]]
speaker = "unk"
original = "その日からよく、マトイがお菓子を持ってきて、２人でお茶会をするようになるのだった。"
translation = "그날부터 자주 마토이가 과자를 가져와서, 둘이서 찻자리를 갖게 되었다."

