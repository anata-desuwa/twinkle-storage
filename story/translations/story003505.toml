[[dialogue]]
speaker = "unk"
original = "レミカがライブを成功させた日から、１週間が経過しようとしていた。"
translation = "레미카가 라이브를 성공시킨 날로부터 일주일이 지나려 하고 있었다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「――会長くん……会長くん」"
translation = "「――회장군…… 회장군」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「朝だよ～、起きて♪」"
translation = "「아침이야~, 일어나♪」"

[[dialogue]]
speaker = "unk"
original = "目を覚ますと、そこには小さな天使の姿があって。"
translation = "눈을 뜨니 그곳에는 작은 천사의 모습이 있었다."

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「ふふっ……会長くん、おはよ<emoji=heart04>」"
translation = "「후훗…… 회장군, 안녕<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "って、メルエル！？\u3000どうして俺の部屋に！？"
translation = "그치만 메루엘!? 어떻게 내 방에!? 덕분에 나는 큰 소리를 지르고 말았다."

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「えへへ<emoji=heart04>\u3000幼なじみっぽいことがしてみたくて……朝のお迎えに来ちゃった♪」"
translation = "「에헤헤<emoji=heart04> 소꿉친구 같은 걸 해보고 싶어서…… 아침 마중을 와버렸어♪」"

[[dialogue]]
speaker = "unk"
original = "えぇ～っ！？\u3000と、大きな声を上げてしまう俺なのだった。"
translation = "에에~!? 하고 큰 소리를 지르고 마는 나였다."

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「はい♪\u3000会長くん、朝ご飯ができたよ。召し上がれ～♪」"
translation = "「자♪ 회장군, 아침밥 다 됐어. 맛있게 먹어~♪」"

[[dialogue]]
speaker = "unk"
original = "いただきます"
translation = "잘 먹겠습니다."

[[dialogue]]
speaker = "unk"
original = "手を合わせて、小さなメルエルが作ってくれた朝ご飯を食べる。"
translation = "두 손을 모으고 어린 메루엘이 차려준 아침밥을 먹는다."

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「会長くん、どうかな？」"
translation = "「회장군, 어때?」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「――すごく美味しい？\u3000えへへ<emoji=heart04>\u3000いつか会長くんに食べてもらいたいと思って、練習しておいてよかったぁ～♪」"
translation = "「――정말 맛있어? 에헤헤<emoji=heart04> 언젠가 회장군에게 먹여주고 싶다고 생각해서 연습해두길 잘했다~♪」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ふふっ、クロトってば、こんなに可愛い女の子に朝ご飯を作ってもらえるなんて、幸せものね～。このこの～♪」"
translation = "「후훗, 쿠로토도 참, 이렇게 귀여운 여자아이가 아침밥을 차려주다니 행복한 녀석이네~. 이 녀석~♪」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「あれ？\u3000でも確か、メルエルちゃんってクロトと同級生じゃなかったかしら？」"
translation = "「어라? 근데 분명 메루엘 짱은 쿠로토랑 동급생 아니었나?」"

[[dialogue]]
speaker = "unk"
original = "それにはちょっと事情があって……"
translation = "그게 좀 사정이 있어서……."

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「リノさん、会長くんをまた朝迎えに来てもいいでしょうか？」"
translation = "「리노 씨, 회장군을 내일 아침에도 데리러 와도 될까요?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ええ。もちろんいいわよ♪\u3000メルエルちゃんはいい子だから、お母さん、いつでも大歓迎～♪」"
translation = "「응. 물론이지♪ 메루엘 짱은 착한 아이니까 엄마는 언제든지 대환영이야~♪」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「ありがとうございます♪\u3000会長くん、そういうわけで、明日もまた幼なじみとして起こしにくるね<emoji=heart04>」"
translation = "「감사합니다♪ 회장군, 그런 고로 내일도 또 소꿉친구로서 깨우러 올게<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それから俺は、小さなメルエルと並んで学園に登校した。"
translation = "그 후 나는 어린 메루엘과 나란히 학원에 등교했다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「会長くん、おはよう♪\u3000――って、えぇええぇええぇえ～～～っ！？」"
translation = "「회장군, 안녕♪ ――어, 에에에에에에에에에~~!?」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「ふふっ、おはよう。大きな私♪」"
translation = "「후훗, 안녕. 큰 나♪」"

[[dialogue]]
speaker = "unk"
original = "上機嫌な様子で、小さなメルエルが大きなメルエルにひらひらと手を振ってみせる。"
translation = "기분 좋은 듯 어린 메루엘이 큰 메루엘에게 살랑살랑 손을 흔들어 보인다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「なっ、ななっ、なんで小さな私が、会長くんと一緒に……！？\u3000まさか、会長くんの家まで迎えに行ってたの！？」"
translation = "「나, 나나, 왜 어린 내가 회장군이랑 같이……!? 설마 회장군 집까지 마중 나갔던 거야!?」"

[[dialogue]]
speaker = "unk"
original = "実はそうなんだ……"
translation = "사실 그래……."

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「寝てる会長くんを起こしに行くって、すっごく幼なじみらしいでしょ？\u3000ずっとしてみたいって思ってたから♪」"
translation = "「자고 있는 회장군을 깨우러 가는 거, 정말 소꿉친구답지? 계속해보고 싶다고 생각했거든♪」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ど、どうして……？」"
translation = "「어, 어째서……?」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「今まで色々遠慮してたけど、全力で挑戦するべきだって、思い直したから」"
translation = "「지금까지 여러모로 사양해왔지만 전력으로 도전해야겠다고 생각을 고쳐먹었거든」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「じゃあね、会長くん<emoji=heart04>\u3000私、附属校のクラスに行くから、またお昼休みに♪」"
translation = "「그럼 안녕, 회장군<emoji=heart04> 나 부속 학교 반으로 갈 테니까 또 점심시간에 봐♪」"

[[dialogue]]
speaker = "unk"
original = "あ、ああ……"
translation = "아, 어어……."

[[dialogue]]
speaker = "unk"
original = "小さなメルエルは笑顔で手を振って、附属校の校舎へと向かっていく。"
translation = "어린 메루엘은 웃으며 손을 흔들고 부속 학교 교사 쪽으로 향한다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あ……か、会長くん、私たちも行こっか？\u3000あはは……」"
translation = "「아…… 회장군, 우리도 갈까? 아하하……」"

[[dialogue]]
speaker = "unk"
original = "なんとなく気まずい雰囲気が流れる中、俺たちは一緒に新星学園の方へと向かうのだった。"
translation = "왠지 모를 어색한 분위기가 흐르는 가운데, 우리는 함께 신성 학원 쪽으로 향했다."

[[dialogue]]
speaker = "unk"
original = "その日の昼休み。"
translation = "그날 점심시간."

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「はい♪\u3000会長くん、あ～ん♪」"
translation = "「자♪ 회장군, 아~♪」"

[[dialogue]]
speaker = "unk"
original = "隣に座った小さなメルエルが、周りに生徒たちがいる中でも昼食を口元に運んできてくれて、俺は気恥ずかしくなってしまう。"
translation = "옆에 앉은 어린 메루엘이 주변에 학생들이 있는데도 점심을 입가로 가져다주어 나는 쑥스러워지고 만다."

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「――こうやって会長くんに食べさせてあげるのも、前からしてみたかったんだ♪\u3000……ダメ、かな？」"
translation = "「――이렇게 회장군에게 먹여주는 것도 전부터 해보고 싶었어♪ ……안, 될까?」"

[[dialogue]]
speaker = "unk"
original = "照れながら言うメルエルを見て、俺は運んでもらった唐揚げを１口で頬張る。"
translation = "수줍게 말하는 메루엘을 보고 나는 건네준 가라아게를 한입에 넣는다."

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「あっ……！\u3000えへへ、嬉しい<emoji=heart04>\u3000じゃあもっと……あ～ん♪」"
translation = "「앗……! 에헤헤, 기뻐<emoji=heart04> 그럼 더…… 아~♪」"

[[dialogue]]
speaker = "unk"
original = "唐揚げを丸ごと１口で食べている途中なので、ちょっと待ってとジェスチャーで伝えようとしたところで、後ろから声が聞こえてくる。"
translation = "가라아게를 통째로 한입에 먹는 중이라 잠깐 기다려달라고 제스처로 전하려던 찰나, 뒤에서 목소리가 들려온다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「って、な、何をしてるのかな、私！？」"
translation = "「잠깐, 나, 나 지금 뭐 하는 거야!?」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「会長くんを誘って、一緒にお昼を食べてたんだよ♪」"
translation = "「회장군을 불러서 같이 점심 먹고 있었어♪」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「朝にも言ってた通り、私、もう遠慮しないって決めたから」"
translation = "「아침에도 말했듯이 나 이제 사양하지 않기로 했거든」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ち、ちょっといいかな！？\u3000小さい私と２人で話したいから、こっちに来て！」"
translation = "「자, 잠깐 괜찮을까!? 어린 나랑 둘이서 얘기하고 싶으니까 이쪽으로 와!」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「え？\u3000ちょっと！\u3000会長くんと過ごしてる途中なのに～……！」"
translation = "「에? 잠깐! 회장군이랑 시간 보내는 중인데~……!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「会長くん、ごめんね！\u3000お昼ご飯はまた今度～！」"
translation = "「회장군, 미안해! 점심밥은 다음에 또 봐!」"

[[dialogue]]
speaker = "unk"
original = "（メルエル、大丈夫だろうか……）"
translation = "（메루엘, 괜찮을까……）"

[[dialogue]]
speaker = "unk"
original = "急いでカフェテリアから出て行く２人を見て、ちょっと心配になってしまうのだった。"
translation = "서둘러 카페테리아에서 나가는 두 사람을 보고 조금 걱정이 되고 말았다."

[[dialogue]]
speaker = "unk"
original = "メルエルは、もう１人の小さな自分の手を引っ張り、人の居ない空き教室へとやって来ていた。"
translation = "메루엘은 또 다른 어린 자신의 손을 끌고 사람이 없는 빈 교실로 왔다."

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「もう、こういう時だけ積極的に行動して……」"
translation = "「정말, 이럴 때만 적극적으로 행동하고……」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あ、あのさ！\u3000なんで１人で勝手に行動し始めちゃったの！？」"
translation = "「저, 저기 말이야! 왜 혼자서 마음대로 행동하기 시작한 거야!?」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あんなにグイグイ行ったら、その、会長くんに迷惑……かけちゃうでしょ？」"
translation = "「그렇게 막무가내로 가면, 그게, 회장군에게 폐를…… 끼치게 되잖아?」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「だから、今までみたいに遠慮しないとって？\u3000そんな消極的だから、いつまで経っても私は――」"
translation = "「그러니까 지금까지처럼 사양해야 한다고? 그렇게 소극적이니까 언제까지고 나는――」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「会長くんに『好き』って気持ちも伝えられないし、恋人にもなれないんだよ」"
translation = "「회장군에게 『좋아한다』는 마음도 전하지 못하고 연인도 될 수 없는 거야」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「会長くんが誰を好きになるかは、会長くんが決めることだよ」"
translation = "「회장군이 누구를 좋아하게 될지는 회장군이 결정할 일이야」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「だけど、自分の気持ちを伝えることもなく、『好き』って気持ちを知られないまま、ずっと我慢してるなんて、私にはもう耐えられないよ」"
translation = "「하지만 자신의 마음을 전하지도 않고, 『좋아한다』는 마음을 들키지 않은 채 계속 참는 건 난 이제 견딜 수 없어」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「そ、それは……」"
translation = "「그, 그건……」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「消極的な気持ちが変わらないなら、私は元の１人に戻る気はないよ」"
translation = "「소극적인 마음이 변하지 않는다면 난 원래의 한 명으로 돌아갈 생각 없어」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「私、会長くんがレミカちゃんにアドバイスしたのを聞いてて、思ったんだ」"
translation = "「나 회장군이 레미카 짱에게 조언하는 걸 듣고 생각했어」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「今が、これまでの自分から変わるチャンスなんだって」"
translation = "「지금이 지금까지의 자신으로부터 변할 기회라고」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「だから――このまま私が、会長くんに好きだって告白する！」"
translation = "「그러니까―― 이대로 내가 회장군에게 좋아한다고 고백할 거야!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「えっ！？」"
translation = "「엣!?」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「恋に全力になれない大きな私よりも、ちっちゃい私を選んでって、告白するもん」"
translation = "「사랑에 전력을 다하지 못하는 큰 나보다 어린 나를 선택해달라고 고백할 거야」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「それで私を選んでもらえたら……私は元の１人には戻らない」"
translation = "「그래서 나를 선택해준다면…… 난 원래의 한 명으로 돌아가지 않을래」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「なっ……で、でも、それじゃあ、ヴィーナスちゃんやレミカちゃんの体が小さくなったままで、戻れなくなっちゃうかもしれないんだよ！？」"
translation = "「나, 앗…… 하, 하지만 그러면 비너스 짱이나 레미카 짱의 몸이 작아진 채로 돌아갈 수 없게 될지도 모른단 말이야!?」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「２人にはちゃんと謝るよ。でも、いざとなったらアニマ先輩に相談すれば、きっと何とかしてくれるはずだもん」"
translation = "「두 사람에게는 제대로 사과할게. 하지만 정 안 되면 아니마 선배에게 상담하면 분명 어떻게든 해주실 거야」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「私はたとえ周りに迷惑をかけてしまうことがあっても、会長くんへの好きって気持ちを譲りたくない……！」"
translation = "「나는 설령 주변에 폐를 끼치게 되는 일이 있더라도 회장군을 향한 좋아한다는 마음을 양보하고 싶지 않아……!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「っ……！」"
translation = "「윽……!」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「何も言えないよね？\u3000だって、私とあなたは同じ。会長くんのことが、大好きなんだから」"
translation = "「아무 말도 못 하겠지? 그야 나랑 당신은 똑같아. 회장군을 정말 좋아하니까」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「それじゃあ、私は行くね」"
translation = "「그럼 난 갈게」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あ……」"
translation = "「아……」"

[[dialogue]]
speaker = "unk"
original = "去って行くもう１人の自分にそれ以上何も声をかけられず、メルエルはその場に立ち尽くしてしまうのだった。"
translation = "떠나가는 또 다른 자신에게 더 이상 아무 말도 하지 못한 채 메루엘은 그 자리에 망연자실하게 서 있었다."

