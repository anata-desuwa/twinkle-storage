[[dialogue]]
speaker = "unk"
original = "それから数日が経過した。"
translation = "그로부터 며칠이 경과했다."

[[dialogue]]
speaker = "unk"
original = "俺とルリエル、ラファエロとステラの４人は協力して、赤ちゃんクマロボの面倒を見続けている。"
translation = "나와 루리엘, 라파엘로와 스텔라 네 사람은 협력하여 아기 곰 로봇을 계속 돌보고 있다."

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「そ、それにしても……黒ベア子さんはいつ頃この子を迎えに来るのでしょうか？」"
translation = "「그, 그나저나…… 흑베아코 씨는 언제쯤 이 아이를 데리러 올까요?」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「思ったよりも時間がかかっているようだね。ぼくもこんなに滞在が長引くとは思っていなかったよ」"
translation = "「생각보다 시간이 걸리는 모양이네. 나도 이렇게 체류가 길어질 줄은 몰랐어」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「幸いだったのはこの世界がとても住み心地よい場所であるという点かな。みんなとても親切にしてくれるし、寮の生活も快適だ」"
translation = "「다행인 점은 이 세계가 매우 살기 좋은 곳이라는 점일까. 모두 아주 친절하게 대해주고 기숙사 생활도 쾌적해」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「不思議なのはステラ、きみが寮の部屋に戻らずに生活しているということなんだが……」"
translation = "「희한한 건 스텔라, 네가 기숙사 방으로 돌아가지 않고 생활하고 있다는 건데……」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「ボクはちょっと……人の多い場所が苦手で……。親切な人ばかりだし、設備もちゃんとしてるのは分かるんですけど……」"
translation = "「나는 좀…… 사람이 많은 장소가 서툴러서……. 친절한 분들뿐이고 시설도 잘 갖춰져 있다는 건 알겠는데요……」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「ふむふむ。それで、この星徒会室の一角を間借りしているというわけなんだね」"
translation = "「흠흠. 그래서 이 성도회실의 한구석을 빌려 쓰고 있다는 거구나」"

[[dialogue]]
speaker = "unk"
original = "ステラは『なるべく引きこもらせてほしい』とのことで、星徒会室の一角をパーテーションで包囲して、即席の居住スペースを作り出していた。"
translation = "스텔라는 『가급적 틀어박히게 해달라』는 요청으로 성도회실의 한구석을 파티션으로 포위해 즉석 거주 공간을 만들어두고 있었다."

[[dialogue]]
speaker = "unk"
original = "まあ、いいんだけれども。ゲストの要望なので。"
translation = "뭐, 괜찮지만. 게스트의 요청이니까."

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「流星寮で生活していると……<ruby>星徒会室<rt>ここ</rt></ruby>に来るまでに、どうしても人がいっぱいいる場所を通らないといけませんし……」"
translation = "「유성 기숙사에서 생활하면…… 성도회실까지 오는 동안 아무래도 사람이 많은 곳을 지나야 하니까요……」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「それにこの部屋、なんだかとっても落ち着くんですよね……」"
translation = "「게다가 이 방, 왠지 무척 마음이 편안해지거든요……」"

[[dialogue]]
speaker = "unk"
original = "アルテもそんなことを言ってたな"
translation = "알테도 그런 말을 했었지"

[[dialogue]]
speaker = "unk"
original = "そう言えば以前……"
translation = "그러고 보니 예전에……"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「ああ、アルテなら確かに言いそうだ。あの子は夢幻美術館でも執務室に入り浸っているからね」"
translation = "「아아, 알테라면 확실히 그렇게 말할 법해. 그 아이는 몽환 미술관에서도 집무실에 박혀 사니까」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「しかし驚いたよ。アルテも以前、この世界へ飛ばされてきたことがあったなんて」"
translation = "「그나저나 놀랐어. 알테도 예전에 이 세계로 날려 온 적이 있었다니」"

[[dialogue]]
speaker = "unk"
original = "以前、黒ベア子がこの世界にやってきて、クマロボを大量発生させる事件を引き起こしたことがあった。"
translation = "예전에 흑베아코가 이 세계에 찾아와 곰 로봇을 대량 발생시키는 사건을 일으킨 적이 있었다."

[[dialogue]]
speaker = "unk"
original = "その時、ラファエロのいた芸術都市アテネスからやってきたのが、天才美少女藝術家のアルテだった。"
translation = "그때 라파엘로가 있던 예술 도시 아테네스에서 찾아온 것이 천재 미소녀 예술가 알테였다."

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「そういえばラファエロさんは……流星寮に絵を提供しているんですよね……？」"
translation = "「그러고 보니 라파엘로 씨는…… 유성 기숙사에 그림을 기증하고 계신 거죠……?」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「住まわせてもらっているお礼に絵を描いたんだけど、それをロビーに飾ってもらえてね」"
translation = "「신세 지는 보답으로 그림을 그렸는데, 그걸 로비에 장식해 주셨거든」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「それが思いのほか好評で、寮長のヒルディオーネさんからも次回作を期待されているんだ」"
translation = "「그게 생각보다 호평이라 기숙사 사감인 힐디오네 씨로부터 다음 작품도 기대받고 있어」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「近頃ではぼく自身の知名度も上がってきているみたいで、今日もここに来る前にサインを求められてしまったよ」"
translation = "「요즘엔 나 자신의 지명도도 올라가고 있는 것 같아서 오늘도 여기 오기 전에 사인을 요청받았지 뭐야」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「そ、そんなことになってたんですか……大変ですね……」"
translation = "「그, 그렇게 된 건가요…… 고생하시네요……」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「ふふっ……それが天才藝術家の宿命というものだからね。それにファンに囲まれるのは慣れているから問題ないよ」"
translation = "「후훗…… 그것이 천재 예술가의 숙명이라는 거니까. 게다가 팬들에게 둘러싸이는 건 익숙하니까 문제없어」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「……ステラは、人と接するのが苦手なのかい？」"
translation = "「……스텔라는 사람과 접하는 게 서투른 거니?」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「……苦手、です」"
translation = "「……서툴러요」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「もしよかったら、理由を聞いてもいいかな？」"
translation = "「혹시 괜찮다면 이유를 물어봐도 될까?」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「<ruby>花騎士<rt>フラワーナイト</rt></ruby>として開花したボクの能力というのが……自身が光を放ったり、触れたものを光らせたりする能力、なんです……」"
translation = "「꽃의 기사로서 개화한 나의 능력이란 게…… 스스로 빛을 내뿜거나 닿은 것을 빛나게 하는 능력, 이거든요……」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「能力に目覚めたばかりの頃は、上手くコントロールできなくて……それで周りの人たちの注目を、変に集めてしまうことがあって……」"
translation = "「능력에 갓 눈떴을 무렵에는 제대로 조절하지 못해서…… 그래서 주변 사람들의 시선을 이상하게 끌어버리는 일이 있어서……」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「悪目立ちしてからかわれたりしないように、って人と接するのを避けていたら……いつの間にか苦手になってしまってて……」"
translation = "「안 좋게 눈에 띄어서 놀림당하지 않도록 사람들과 접하는 걸 피하다 보니…… 어느샌가 서툴러지게 돼서……」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「自分の力を嫌だなって思ってた時期もありました。でも今は、この力のおかげで大切な人を守ることができるから、そこはよかったなって思えるようになりました」"
translation = "「내 힘이 싫다고 생각하던 시기도 있었어요. 하지만 지금은 이 힘 덕분에 소중한 사람을 지킬 수 있으니까 그 점은 다행이라고 생각하게 됐어요」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「それでも、やっぱり人前に出て話をしたりするのは苦手で……。だからラファエロさんは、すごいなって思います……」"
translation = "「그래도 역시 사람들 앞에 나서서 이야기를 하거나 하는 건 서툴러서……. 그래서 라파엘로 씨는 대단하다고 생각해요……」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「そんなに持ち上げるほどのことでもないよ。でもきみがそう思うなら、ぼくの立ち振る舞いを参考にしてみるといいかもしれない」"
translation = "「그렇게 치켜세울 정도의 일도 아니야. 하지만 네가 그렇게 생각한다면 내 행동거지를 참고해 보는 것도 좋을지 모르겠네」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「だけど、きみの姿勢も十分に立派だと思うよ。きちんと自身の力と向き合って、折り合いをつけようとしているじゃないか」"
translation = "「하지만 네 자세도 충분히 훌륭하다고 생각해. 제대로 자신의 힘과 마주하고 타협점을 찾으려 하고 있잖니」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「そうですか？\u3000えへへ……褒められると、嬉しくなっちゃいますね」"
translation = "「그런가요? 에헤헤…… 칭찬받으니까 기뻐지네요」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「おじゃましま～す♪\u3000今日も赤ちゃんクマロボさんの様子を見に来たのです！」"
translation = "「실례합니다~♪ 오늘도 아기 곰 로봇 씨의 상태를 보러 온 거예요!」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「あ……ルリエルさん。お、おはようございます」"
translation = "「아…… 루리엘 씨. 조, 좋은 아침이에요」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「どうですか、赤ちゃんクマロボさんの様子は？」"
translation = "「어때요, 아기 곰 로봇 씨의 상태는?」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「はい、とってもいい子にしてますよ」"
translation = "「네, 아주 착하게 잘 있어요」"

[[dialogue]]
speaker_original = "赤ちゃんクマロボ"
speaker_translation = "아기 곰 로봇"
original = "「ばぶー<emoji=heart04>」"
translation = "「바부ー<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「そうですか～。いい子にしていて偉いでちゅね～<emoji=heart04>」"
translation = "「그렇군요~. 착하게 있어서 기특해라~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ルリエルはすっかりこの子にメロメロだな"
translation = "루리엘은 완전히 이 아이에게 푹 빠졌네"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「だってだって、すっごく可愛いじゃないですかぁ～！！」"
translation = "「그치만 그치만, 정말 너무 귀엽잖아요~!!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ルリエルも母性に目覚めちゃったのかもしれません。この子の為だったら、『なんだってしてあげたい』って気持ちになっちゃいます！！」"
translation = "「루리엘도 모성에 눈을 떠버린 걸지도 몰라요. 이 아이를 위해서라면 『뭐든지 해주고 싶다』는 기분이 들어버려요!!」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「わ、わかります！\u3000もう可愛くて可愛くて仕方なくて……最近は寝ても覚めてもこの子のことばかり考えてしまうんです」"
translation = "「아, 알아요! 정말 귀여워서 어쩔 줄 모르겠어서…… 요즘은 자나 깨나 이 아이 생각뿐이에요」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「ステラほどではないが、ぼくもこの子の可愛さについては認めるよ」"
translation = "「스텔라만큼은 아니지만 나도 이 아이의 귀여움에 대해서는 인정해」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「そういえばステラ、さっきからずっと抱っこしていて疲れただろう？\u3000そろそろぼくが代わろうか。なに、遠慮はいらないよ」"
translation = "「그러고 보니 스텔라, 아까부터 계속 안고 있어서 힘들지 않니? 이제 내가 교대해 줄까. 자, 사양할 것 없어」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「待ってください！\u3000授業だったり星徒会の仕事だったりで一緒に居られる時間が少ないんですから、先にわたしに抱っこさせてくださいよ～」"
translation = "「잠깐만요! 수업이나 성도회 업무 때문에 같이 있을 수 있는 시간이 적으니까 먼저 제가 안게 해주세요~」"

[[dialogue]]
speaker = "unk"
original = "３人は代わる代わる赤ちゃんクマロボを抱っこしてあやしている。"
translation = "세 사람은 번갈아 가며 아기 곰 로봇을 안고 어르고 있다."

[[dialogue]]
speaker = "unk"
original = "親身になって面倒を見てくれるのは助かるのだが、この調子だと別れの時に辛くなるんじゃないだろうか？"
translation = "친신하게 돌봐주는 건 고맙지만 이 기세라면 헤어질 때 힘들어지지 않을까?"

[[dialogue]]
speaker = "unk"
original = "赤ちゃんクマロボに夢中な３人の様子を見ていると、そんな心配さえ感じてしまうのだった。"
translation = "아기 곰 로봇에 열중한 세 사람의 모습을 보고 있으면 그런 걱정마저 느껴지는 것이었다."

