[[dialogue]]
speaker = "unk"
original = "第１５話,真夜中の奇襲,B"
translation = "제15화, 한밤중의 기습, B"

[[dialogue]]
speaker = "unk"
original = "──４人がかりではあるが、ヴィーナスの記録を破った。その帰り道。"
translation = "──네 명이서이긴 하지만, 비너스의 기록을 깼다. 그 돌아오는 길."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「（今日はいい鍛錬ができた──けど、そのぶん体に負担がかかるってことは覚えとかないとな）」"
translation = "「(오늘은 좋은 단련을 했다──하지만, 그만큼 몸에 부담이 간다는 건 기억해 둬야겠군)」"

[[dialogue]]
speaker = "unk"
original = "俺はせめてもの努力として、明日のイメージトレーニングをしながら帰っていると……。"
translation = "나는 최소한의 노력으로, 내일의 이미지 트레이닝을 하면서 돌아가던 중……."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……ん？」"
translation = "「……응?」"

[[dialogue]]
speaker = "unk"
original = "向こうから──地鳴りとともに何か崩れる音が聞こえた。"
translation = "저쪽에서── 땅울림과 함께 무언가 무너지는 소리가 들렸다."

[[dialogue]]
speaker = "unk"
original = "そして……"
translation = "그리고……"

[[dialogue]]
speaker_original = "逃げてくる女性Ａ"
speaker_translation = "도망쳐 온 여성 A"
original = "「きゃああ！？\u3000モ、モンスターだわ、逃げないと……っ！」"
translation = "「꺄아아아!? 모, 몬스터야, 도망쳐야 해……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「！？\u3000モンスターだって──？」"
translation = "「!? 몬스터라고──?」"

[[dialogue]]
speaker = "unk"
original = "音の聞こえた方角からたくさんの人がこちらへ逃げてくる。その先には……"
translation = "소리가 들린 방향에서 많은 사람이 이쪽으로 도망쳐 온다. 그 앞에는……"

[[dialogue]]
speaker_original = "ダークキングフワッチ"
speaker_translation = "다크 킹 후왓치"
original = "「ウィイイイイイ！！」"
translation = "「위이이이이!!」"

[[dialogue]]
speaker_original = "ダークキングフワッチ"
speaker_translation = "다크 킹 후왓치"
original = "「イイイイイ！！」"
translation = "「이이이이이!!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「（大型モンスター──それも、大群……！！）」"
translation = "「(대형 몬스터── 그것도, 대군……!!)」"

[[dialogue]]
speaker = "unk"
original = "５──１０──いや、視認できるだけでも２０を超えるモンスターの群れが、市街地のど真ん中を荒らし回っていた。"
translation = "5──10──아니, 눈으로 확인할 수 있는 것만 해도 20을 넘는 몬스터 무리가, 시가지 한복판을 휩쓸고 있었다."

[[dialogue]]
speaker = "unk"
original = "まるで百鬼夜行──あれほどの大群は、幾度となくモンスターに追い回されてきた俺でも見たことがない。"
translation = "마치 백귀야행── 저 정도의 대군은, 몇 번이고 몬스터에게 쫓겨 다녔던 나조차 본 적이 없다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……っ！」"
translation = "「……!」"

[[dialogue]]
speaker = "unk"
original = "それを認識した瞬間、体がすくむのがわかった。幼い頃の自分が、あの中で泣いている姿を幻視してしまう。"
translation = "그것을 인식한 순간, 몸이 움츠러드는 것을 알았다. 어릴 적의 자신이, 저 안에서 울고 있는 모습을 환시해 버린다."

[[dialogue]]
speaker = "unk"
original = "だけど、今の俺は無力な子どもじゃない。"
translation = "하지만, 지금의 나는 무력한 아이가 아니다."

[[dialogue]]
speaker = "unk"
original = "この街を、世界を守る、星騎士なんだ──。"
translation = "이 도시를, 세계를 지키는, 성기사인 것이다──."

[[dialogue]]
speaker_original = "ダークキングフワッチ"
speaker_translation = "다크 킹 후왓치"
original = "「イイイイイ！！」"
translation = "「이이이이이!!」"

[[dialogue]]
speaker_original = "ダークキングフワッチ"
speaker_translation = "다크 킹 후왓치"
original = "「ウイイイイ──！！」"
translation = "「우이이이이──!!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「（このサイズのモンスターは──トレーニングテストに換算すれば、一体一体がＳランク級……！）」"
translation = "「(이 크기의 몬스터는── 트레이닝 테스트로 환산하면, 한 마리 한 마리가 S랭크급……!)」"

[[dialogue]]
speaker = "unk"
original = "──以前、アナに興味本位で訊ねてみたことがある。"
translation = "──이전에, 아나에게 흥미 본위로 물어본 적이 있다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "『──Ｓランクを越える設定？』"
translation = "『──S랭크를 넘는 설정이요?』"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "『このトレーニングにはセーフティシステムがついてるから、実際にはありえないと思いますが』"
translation = "『이 트레이닝에는 안전 시스템이 갖춰져 있으니, 실제로는 있을 수 없다고 생각합니다만』"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "『そうですね。もし、Ｓランクのモンスターが同時に何十体も出てきたら──さすがの現会長でも危ういかもしれません』"
translation = "『그렇네요. 만약, S랭크 몬스터가 동시에 수십 마리나 나온다면── 아무리 현 회장이라도 위험할지도 모릅니다』"

[[dialogue]]
speaker = "unk"
original = "あのアナでさえそう見立てを濁したほどの脅威。それが今、まさしく現実に顕現している。"
translation = "그 아나조차 그렇게 예측을 흐릴 정도의 위협. 그것이 지금, 바로 현실에 현현하고 있다."

[[dialogue]]
speaker = "unk"
original = "そんな相手に俺が単騎で挑んだら──たとえ体力全快だとしても、確実に死ぬ。"
translation = "그런 상대에게 내가 단기로 맞선다면── 설령 체력이 완전 회복된 상태라 해도, 확실히 죽는다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……っ」"
translation = "「……!」"

[[dialogue]]
speaker = "unk"
original = "呼吸が苦しい。"
translation = "호흡이 괴롭다."

[[dialogue]]
speaker = "unk"
original = "今にも足が止まってしまいそうだ。"
translation = "당장이라도 발이 멈춰 버릴 것 같다."

[[dialogue]]
speaker = "unk"
original = "ああ、くそ。強くなったと思ったのに……"
translation = "아아, 젠장. 강해졌다고 생각했는데……"

[[dialogue]]
speaker = "unk"
original = "あれから血反吐を吐く思いで努力してきたつもりだったのに……"
translation = "그때부터 피를 토하는 심정으로 노력해 왔다고 생각했는데……"

[[dialogue]]
speaker = "unk"
original = "俺は未だに、あの日見た星の輝きに追いつけないでいる──"
translation = "나는 아직도, 그날 본 별의 반짝임을 따라잡지 못하고 있다──"

[[dialogue]]
speaker_original = "逃げてくる女性Ｂ"
speaker_translation = "도망쳐 온 여성 B"
original = "「あ──あなた、新星学園の生徒さん！？\u3000お願い、助けて……！」"
translation = "「아── 당신, 신성 학원 학생이시죠!? 부탁해요, 도와줘요……!」"

[[dialogue]]
speaker_original = "逃げてくる女性Ｃ"
speaker_translation = "도망쳐 온 여성 C"
original = "「私からもお願いします──あのままじゃ、街も人もメチャクチャに……！」"
translation = "「저도 부탁드립니다── 저대로라면, 도시도 사람도 엉망진창이……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "unk"
original = "だがその時。声をかけられ、再び足に力が戻る。"
translation = "하지만 그때. 말을 걸려, 다시 발에 힘이 돌아온다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「もちろんです──モンスターには近づかないようしてください！」"
translation = "「물론입니다── 몬스터에게는 가까이 가지 않도록 해 주십시오!」"

[[dialogue]]
speaker = "unk"
original = "そうだ。助けるんだ。戦う力を持たない人たちを。"
translation = "그렇다. 구하는 거다. 싸울 힘을 가지지 못한 사람들을."

[[dialogue]]
speaker = "unk"
original = "ここで、誰かのために戦えないやつは──緋宮クロトなんかじゃない！"
translation = "여기서, 누군가를 위해 싸울 수 없는 녀석은── 히노미야 쿠로토 따위가 아니다!"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──来いモンスターども！\u3000おまえ達の大好物はここにあるぞ！」"
translation = "「──와라 몬스터 놈들아! 너희들의 가장 좋아하는 먹잇감은 여기에 있다!」"

