[[dialogue]]
speaker = "unk"
original = "――吸血鬼の中で、極めて稀に『デイマスター』と呼ばれる上位種が誕生することがある。"
translation = "──흡혈귀 중에서 극히 드물게 『데이 마스터』라 불리는 상위종이 탄생하는 경우가 있다."

[[dialogue]]
speaker = "unk"
original = "吸血鬼という魔族は、強力な自己再生能力と、長い寿命を持つ代わりに、日の光に極端に弱いという欠点を持つ。"
translation = "흡혈귀라는 마족은 강력한 자기 재생 능력과 긴 수명을 가진 대신, 햇빛에 극도로 취약하다는 결점이 있다."

[[dialogue]]
speaker = "unk"
original = "デイマスターとは、その『日の光に弱い』という欠点を克服した個体のこと。"
translation = "데이 마스터란 그 『햇빛에 약하다』라는 결점을 극복한 개체를 말한다."

[[dialogue]]
speaker = "unk"
original = "そして、ソフレはそのデイマスターとして、魔界の吸血鬼一族『ヴァートリン家』に生を受けた。"
translation = "그리고 소프레는 그 데이 마스터로서 마계의 흡혈귀 일족 『바르트린 가문』에서 태어났다."

[[dialogue]]
speaker = "unk"
original = "三姉妹の末っ子であったソフレは、デイマスターであることを両親にもてはやされて育った。"
translation = "삼 자매 중 막내였던 소프레는 데이 마스터라는 이유로 부모님의 총애를 받으며 자랐다."

[[dialogue]]
speaker = "unk"
original = "しかし、自身が家族の誰よりも優れていると言われ続けたことで調子に乗り、プライドは高く、どんどんワガママになっていった。"
translation = "하지만 자신이 가족 누구보다 뛰어나다는 말을 계속 들으며 자란 탓에 우쭐해졌고, 자존심은 높아지고 점점 제멋대로 변해갔다."

[[dialogue]]
speaker = "unk"
original = "そうして、家族の誰にも手が付けられない程、好き勝手に振る舞うようになったソフレは、やがて家から追放されることとなった――。"
translation = "그렇게 가족 누구도 손을 쓸 수 없을 정도로 멋대로 행동하게 된 소프레는 마침내 가문에서 추방당하게 되었다──."

[[dialogue]]
speaker = "unk"
original = "もちろん、凄く腹が立った。ムシャクシャして、色んな場所で暴れまわった。強大な星力を振るえば、誰にも止められはしなかった。"
translation = "물론 엄청나게 화가 났다. 짜증이 나서 온갖 곳에서 난동을 피웠다. 강대한 성력을 휘두르면 누구도 막을 수 없었다."

[[dialogue]]
speaker = "unk"
original = "すると、いつしか『暴虐の吸血鬼』なんて呼ばれるようになり、ソフレはますます調子に乗っていった。"
translation = "그러다 보니 어느새 『폭학의 흡혈귀』라 불리게 되었고, 소프레는 점점 더 우쭐해졌다."

[[dialogue]]
speaker = "unk"
original = "そのうち魔界にも飽きて退屈だと感じたソフレは、人間界へと乗り込むことにした。"
translation = "그러다 마계도 지겹고 따분해진 소프레는 인간계로 쳐들어 가기로 했다."

[[dialogue]]
speaker = "unk"
original = "人間というのは脆弱な種族の癖に、威勢だけはよくて、ムカつく連中だった。"
translation = "인간이라는 건 취약한 종족 주제에 기세만은 좋아서 짜증 나는 놈들이었다."

[[dialogue]]
speaker = "unk"
original = "でも、それを力で屈服させるのが面白くて、ソフレは魔界にいた時以上に暴れ回り続けた。"
translation = "하지만 그걸 힘으로 굴복시키는 게 재미있어서 소프레는 마계에 있을 때보다 더 격렬하게 난동을 부렸다."

[[dialogue]]
speaker = "unk"
original = "そして、１００年前のあの日……"
translation = "그리고 100년 전 그날……"

[[dialogue]]
speaker = "unk"
original = "ソフレはここ、流星市国で、イヤな祓魔師――フェリーチェ・パッショーネに出会うことになった――。"
translation = "소프레는 이곳 유성시국에서 기분 나쁜 엑소시스트── 펠리체 파쇼네와 만나게 되었다──."

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「かはっ！？\u3000ぐっ……！」"
translation = "「커헉!? 윽……!」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「お前……！\u3000ソフレに……一体なんの術式を使ったの！？\u3000星術が発動できないのだわ……！」"
translation = "「너……! 소프레에게…… 대체 어떤 술식을 쓴 거예요!? 성술이 발동되지 않는 거예요……!」"

[[dialogue]]
speaker_original = "フェリーチェ"
speaker_translation = "펠리체"
original = "「――どうやら、封印は上手くいったみたいだな」"
translation = "「──보아하니 봉인은 잘 된 모양이군」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「封印、ですって……！？」"
translation = "「봉인이라고요……!?」"

[[dialogue]]
speaker_original = "フェリーチェ"
speaker_translation = "펠리체"
original = "「そう、大きく２つの行動を封じる楔をアンタに打ち込んだ」"
translation = "「그래, 크게 두 가지 행동을 봉인하는 쐐기를 너에게 박아넣었어」"

[[dialogue]]
speaker_original = "フェリーチェ"
speaker_translation = "펠리체"
original = "「１つ目は、悪意を持っての殺傷行為及び、破壊行為の禁止」"
translation = "「첫 번째는 악의를 가진 살상 행위 및 파괴 행위의 금지」"

[[dialogue]]
speaker_original = "フェリーチェ"
speaker_translation = "펠리체"
original = "「２つ目は、流星市国の外に出られないという行動制限」"
translation = "「두 번째는 유성시국 밖으로 나갈 수 없다는 행동 제한」"

[[dialogue]]
speaker_original = "フェリーチェ"
speaker_translation = "펠리체"
original = "「以上２つを今後３００年間、封印させて……って、ありゃ？」"
translation = "「이상의 두 가지를 향후 300년 동안 봉인시키…… 어라?」"

[[dialogue]]
speaker_original = "フェリーチェ"
speaker_translation = "펠리체"
original = "「……あ～、上手く封印したつもりだったんだが――」"
translation = "「……아~ 제대로 봉인한 줄 알았는데──」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「まさか……失敗でもした？\u3000キャハハハ！\u3000ざまぁみろなのだわ！\u3000ソフレをそんな長い間封印できるわけが――」"
translation = "「설마…… 실패라도 한 거예요? 캬하하하! 꼴좋은 거예요! 소프레를 그렇게 긴 시간 봉인할 수 있을 리가──」"

[[dialogue]]
speaker_original = "フェリーチェ"
speaker_translation = "펠리체"
original = "「悪い、一桁間違えて、封印をかけたっぽい。３０００年間になってるみてぇだわ」"
translation = "「미안, 자릿수 하나를 틀려서 봉인을 건 모양이야. 3000년으로 되어 있네」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「は！？」"
translation = "「하!?」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「さ、３０００年！？\u3000嘘でしょ……！？\u3000吸血鬼だって、そんな長く生きることはできないのだわ！」"
translation = "「3, 3000년!? 거짓말인 거예요……!? 흡혈귀라도 그렇게 오래 살 수는 없는 거예요!」"

[[dialogue]]
speaker_original = "フェリーチェ"
speaker_translation = "펠리체"
original = "「いやマジで、すまん。アンタがあまりにもムカつく態度取るもんだから、加減が狂ったみてぇだわ」"
translation = "「아니 진짜 미안해. 네 태도가 너무 짜증 나서 조절이 안 됐나 봐」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「ふざけるんじゃないのだわッ！\u3000今すぐ、封印を解きなさい！！\u3000この下等種風情が！！！」"
translation = "「장난하지 말란 거예요! 지금 당장 봉인을 푸는 거예요!! 이 하등종 따위가!!!」"

[[dialogue]]
speaker_original = "フェリーチェ"
speaker_translation = "펠리체"
original = "「下等種ね……ははっ」"
translation = "「하등종이라…… 하하」"

[[dialogue]]
speaker_original = "フェリーチェ"
speaker_translation = "펠리체"
original = "「……まぁ、あれだ。確かにミスりはしたが――」"
translation = "「……뭐 됐다. 확실히 실수는 했지만──」"

[[dialogue]]
speaker_original = "フェリーチェ"
speaker_translation = "펠리체"
original = "「どちらにせよ、アンタには反省する時間が必要だろうよ。アタシが何を言ったところで、今は聞く耳を持たねぇだろうし」"
translation = "「어느 쪽이든 너에겐 반성할 시간이 필요할 거야. 내가 무슨 말을 해도 지금은 들을 귀가 없을 테니까」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「当たり前なのだわ！\u3000３０００年も封印されるくらいなら、殺された方がマシなのよ！！」"
translation = "「당연한 거예요! 3000년이나 봉인될 바에야 죽는 게 나은 거예요!!」"

[[dialogue]]
speaker_original = "フェリーチェ"
speaker_translation = "펠리체"
original = "「わかるぜ。ただ……あいにく、どんなにアンタにムカつこうが、アタシはエクソシスト。祈るのが専門で、殺すのが仕事じゃねぇんだわ」"
translation = "「이해해. 다만…… 안타깝게도 네가 아무리 짜증 나도 난 엑소시스트거든. 기도가 전문이지 죽이는 게 직업은 아니란 말이지」"

[[dialogue]]
speaker_original = "フェリーチェ"
speaker_translation = "펠리체"
original = "「いずれにしても――」"
translation = "「어찌 됐든──」"

[[dialogue]]
speaker_original = "フェリーチェ"
speaker_translation = "펠리체"
original = "「アンタは負けたんだよ。テメェが舐めた人間ってやつに」"
translation = "「넌 진 거야. 네가 우습게 본 인간이란 존재에게」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「くっ……！」"
translation = "「큭……!」"

[[dialogue]]
speaker_original = "フェリーチェ"
speaker_translation = "펠리체"
original = "「じゃあな。あばよ、吸血鬼――」"
translation = "「그럼 이만. 잘 있어라, 흡혈귀──」"

[[dialogue]]
speaker = "unk"
original = "そうして、ソフレは３０００年間、流星市国から出られなくなった。"
translation = "그렇게 소프레는 3000년 동안 유성시국에서 나갈 수 없게 되었다."

[[dialogue]]
speaker = "unk"
original = "実質、ゆるやかな死刑宣告。"
translation = "실질적으로 완만한 사형 선고."

[[dialogue]]
speaker = "unk"
original = "ソフレのプライドは、時間の経過と共にどんどんと失墜していった……。"
translation = "소프레의 자존심은 시간이 흐름에 따라 점점 더 실추되어 갔다……."

[[dialogue]]
speaker = "unk"
original = "封印されたソフレの身柄は、流星教皇庁――星見家の監視下におかれることになった。流星学園の星騎士として働くことを条件に、保護観察処分となったのだ。"
translation = "봉인된 소프레의 신변은 유성 교황청──호시미 가문의 감시하에 놓이게 되었다. 유성 학원의 성기사로서 일하는 것을 조건으로 보호 관찰 처분이 내려진 것이다."

[[dialogue]]
speaker = "unk"
original = "もちろん、やる気など出るはずもない。ソフレは暴虐の吸血鬼として有名になっていたから、周りから腫れ物扱いされ、近寄る者もいなかった。"
translation = "물론 의욕 따위 생길 리도 없었다. 소프레는 포학의 흡혈귀로서 유명했기에 주변에서는 건드리면 안 될 사람 취급을 받았고, 가까이 다가오는 자도 없었다."

[[dialogue]]
speaker = "unk"
original = "ソフレは吸血鬼だというのに、そこからの年月は長く感じた。何も面白くない、退屈な日々。それが３０００年も続くのだと思うたび、深く絶望した。"
translation = "소프레는 흡혈귀임에도 그 후의 세월은 길게 느껴졌다. 아무것도 재미없는 지루한 나날. 그것이 3000년이나 이어진다고 생각할 때마다 깊이 절망했다."

[[dialogue]]
speaker = "unk"
original = "だから、ソフレはいつしか、多くの時間を眠って過ごすようになった。"
translation = "그래서 소프레는 어느덧 대부분의 시간을 잠으로 보내게 되었다."

[[dialogue]]
speaker = "unk"
original = "眠っていれば、イヤなことを忘れられる。夢の中だけは自由だ。"
translation = "자고 있으면 싫은 일을 잊을 수 있다. 꿈속에서만큼은 자유다."

[[dialogue]]
speaker = "unk"
original = "ソフレは眠るのが好きになった。それが現実逃避だとしても……唯一の幸せだった。"
translation = "소프레는 잠자는 것을 좋아하게 되었다. 그것이 현실 도피라 할지라도…… 유일한 행복이었다."

[[dialogue]]
speaker = "unk"
original = "そうして、ソフレは授業をサボって昼寝しながらも、流星学園に通い続けた。"
translation = "그렇게 소프레는 수업을 빼먹고 낮잠을 자면서도 유성 학원에 계속 다녔다."

[[dialogue]]
speaker = "unk"
original = "３年生になるまで通ったら、また１年生からやり直し。３０００年の封印があるソフレは、死ぬまで学園を卒業することができない。"
translation = "3학년까지 다니면 다시 1학년부터 시작. 3000년의 봉인이 걸린 소프레는 죽을 때까지 학원을 졸업할 수 없다."

[[dialogue]]
speaker = "unk"
original = "たった１人、延々と学年のサイクルを繰り返す。何度も、何度も、延々と――。"
translation = "단 혼자서 끝없이 학년의 사이클을 반복한다. 몇 번이고, 몇 번이고, 끝도 없이──."

[[dialogue]]
speaker = "unk"
original = "そうして、すっかり授業に出なくなって、自分がいま何年生で、どこのクラスなのかも忘れた頃……"
translation = "그렇게 완전히 수업에 나가지 않게 되어 자신이 지금 몇 학년인지, 어느 반인지조차 잊었을 무렵……"

[[dialogue]]
speaker = "？？？"
original = "「ねぇ、キミがもしかして、暴虐の吸血鬼さん？」"
translation = "「저기, 네가 혹시 포학의 흡혈귀 씨야?」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「ん……ソフレの眠りを妨げるのは、一体誰なのだわ……？」"
translation = "「음…… 소프레의 잠을 방해하는 건 대체 누구인 거예요……?」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「やっぱり！\u3000ソフレ・ヴァートリンさんだよね！？」"
translation = "「역시! 소프레 바트린 씨 맞지!?」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「……！\u3000お前……フェリーチェ！？」"
translation = "「……! 너…… 펠리체!?」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「あっ、私がひいお祖母ちゃんに似てるのって、本当なんだね！\u3000お祖母ちゃんが私を見て、そっくりだってよく言ってたんだ～」"
translation = "「앗, 내가 증조할머니를 닮았다는 거 정말이었구나! 할머니가 나를 보고 똑 닮았다고 자주 말씀하셨거든~」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「ひいお祖母ちゃん……？\u3000ってことは、フェリーチェの子孫……？」"
translation = "「증조할머니……? 그렇다는 건 펠리체의 후손……?」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「うんっ！\u3000私、フェリーチェ・パッショーネのひ孫で、恵原フェリシーっていうの！」"
translation = "「응! 나, 펠리체 파쇼네의 증손녀인 에바라 펠리시라고 해!」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「よろしくね、吸血鬼さん♪」"
translation = "「잘 부탁해, 흡혈귀 씨♪」"

[[dialogue]]
speaker = "unk"
original = "それが、ソフレが封印されてから、９９年目の春。"
translation = "그것이 소프레가 봉인되고 나서 99년째 되는 봄."

[[dialogue]]
speaker = "unk"
original = "今から１年前の出来事だったのだわ――。"
translation = "지금으로부터 1년 전의 일이었던 거예요──."

[[dialogue]]
speaker = "unk"
original = "時は戻って、現在。"
translation = "때는 다시 돌아와 현재."

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「スヤスヤ……」"
translation = "「새근새근……」"

[[dialogue]]
speaker = "unk"
original = "保健室から逃げ出したソフレが、図書館の片隅で眠っていると――"
translation = "보건실에서 도망친 소프레가 도서관 구석에서 잠들어 있자──"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「図書館は居眠りする為の場所じゃないわよ」"
translation = "「도서관은 낮잠 자는 곳이 아니야.」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「ん……」"
translation = "「음……」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「ふわぁ～。酷く禍々しい気配がするかと思えば……」"
translation = "「후아암~. 지독하게 불길한 기척이 느껴진다 했더니……」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「ウィステリア。今日は面倒なことがあって疲れているから、元クラスメイトのよしみで、大目に見るのだわ……」"
translation = "「위스테리아. 오늘은 귀찮은 일이 있어서 피곤하니까 전 클래스메이트의 정을 봐서 눈감아 주는 거예요……」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「禍々しいとか言わないでくれる！？\u3000それ、私じゃなくて、この魔導書のせいだから！」"
translation = "「불길하다니 실례잖아!? 그거 내가 아니라 이 마도서 때문이니까!」"

[[dialogue]]
speaker = "unk"
original = "新星学園の図書館司書、ウィステリア。"
translation = "신성학원의 도서관 사서, 위스테리아."

[[dialogue]]
speaker = "unk"
original = "魔界の古い一族に生まれ、次期当主として幼い頃から呪術の英才教育を受けてきた才女。しかし、その際に呪いの魔導書を与えられ、彼女は常に軽度の不運に見舞われている。"
translation = "마계의 오래된 일족에서 태어나 차기 당주로서 어릴 때부터 주술 영재 교육을 받아온 재원. 하지만 그때 저주의 마도서를 받게 되어 그녀는 항상 가벼운 불운을 겪고 있다."

[[dialogue]]
speaker = "unk"
original = "そしてソフレが――１つ前の学年サイクルを繰り返していた時のクラスメイトでもあった。"
translation = "그리고 소프레가── 바로 이전 학년 사이클을 반복하고 있을 때의 클래스메이트이기도 했다."

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「ともかく……もう放課後なのだから、寝るなら自分の寮の部屋で寝なさい、ソフレ」"
translation = "「어쨌든…… 벌써 방과 후니까 잘 거면 자기 기숙사 방에서 자, 소프레.」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「そんなわかりやすいところで寝ていたら、すぐにまたフェリシーに見つかるのだわ……」"
translation = "「그런 알기 쉬운 곳에서 자면 금방 또 펠리시한테 들키는 거예요……」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「はぁ……相変わらずね。でも、恵原さんといえば――」"
translation = "「하아…… 여전하네. 하지만 에바라 씨라고 하면──」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「あなた、封印を解く方法が見つかったんでしょう？\u3000よかったじゃない」"
translation = "「너, 봉인을 풀 방법이 발견됐다며? 잘됐네.」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「フェリシーから聞いたの？」"
translation = "「펠리시한테 들은 거예요?」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「ええ。星騎士として活躍すれば、３０００年の刑期が短くなっていくって。嬉しそうに話してたわよ」"
translation = "「응. 성기사로서 활약하면 3000년의 형기가 단축된다고, 기쁜 듯이 이야기하더라고.」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「ふん……そんなの全部、今更なのだわ」"
translation = "「흥…… 그런 건 전부 이제 와서인 거예요.」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「ソフレのやる気はとっくの昔に失せて、もう残っていないのよ。今のモット―は、『働いたら負け』なのだわ」"
translation = "「소프레의 의욕은 훨씬 옛날에 사라져서 이제 남아있지 않아. 지금의 좌우명은 『일하면 지는 것』인 거예요.」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「そんな面倒臭いことなんか忘れて、平和に惰眠を貪っているのが１番なのよ――」"
translation = "「그런 귀찮은 일 따위 잊어버리고 평화롭게 늦잠이나 자는 게 최고인 거예요──」"

[[dialogue]]
speaker = "unk"
original = "と、その時だった。"
translation = "그때였다."

[[dialogue]]
speaker = "unk"
original = "あっ、ソフレ、見つけた！"
translation = "앗, 소프레 찾았다!"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「あら、会長くん、こんにちは」"
translation = "「어머, 회장군 안녕하세요.」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「お前……まさか、ソフレを探しにきたの？」"
translation = "「너…… 설마 소프레를 찾으러 온 거예요?」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「――保健室の調査依頼で聞きたいことがあって、フェリシーと手分けして探してた？\u3000なんなのだわ、それ。面倒な予感しかしないのよ……」"
translation = "「──보건실 조사 의뢰로 물어볼 게 있어서 펠리시랑 분담해서 찾고 있었다고? 뭐냐는 거예요, 그건. 귀찮은 예감밖에 안 드는 거예요……」"

[[dialogue]]
speaker = "unk"
original = "俺はフェリシーから、ソフレが１００年前に、フェリシーのひいお祖母ちゃんの手によって流星市国に封印された話を聞かされた――"
translation = "나는 펠리시로부터 소프레가 100년 전 펠리시의 증조할머니의 손에 의해 유성시국에 봉인되었다는 이야기를 들었다──"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「ソフレは、人間の私では想像もできない３０００年って長い刑期を突き付けられて、それから自暴自棄になってしまったんだと思う」"
translation = "「소프레는 인간인 나로서는 상상도 할 수 없는 3000년이라는 긴 형기를 선고받아서, 그 뒤로 자포자기해 버린 거라고 생각해.」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「封印のせいで、流星学園を卒業することなく、永遠に通い続けて」"
translation = "「봉인 때문에 유성 학원을 졸업하지 못하고 영원히 계속 다니면서」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「封印が解ける前に、どうせ次のリクリエがやってきて、何もかも滅茶苦茶になってしまうのだからって……」"
translation = "「봉인이 풀리기 전에 어차피 다음 리크리에가 찾아와서 모든 게 엉망이 될 테니까라면서……」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「未来に絶望して、やる気を無くしちゃったんだよ」"
translation = "「미래에 절망해서 의욕을 잃어버린 거야.」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「でもね、だからこそ、今のソフレはそこまで邪悪な存在じゃないって、私には感じられるんだ」"
translation = "「하지만 말이야, 그렇기 때문에 지금의 소프레는 그렇게 사악한 존재가 아니라고 나는 느껴져.」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「１００年前のソフレがどうだったのかは、わからない。だけど今は、絶望を知ったからこそ、前より人に優しくなれるようになったんじゃないかって思うの」"
translation = "「100년 전의 소프레가 어땠는지는 모르겠어. 하지만 지금은 절망을 알았기에 전보다 사람에게 다정해질 수 있었던 게 아닐까 싶어.」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「だから、私は今回の不審者の件をちゃんと解決して、ソフレにかかった疑いを晴らしたいんだ！」"
translation = "「그러니까 나는 이번 수상한 인물 사건을 제대로 해결해서 소프레에게 걸린 의심을 풀어주고 싶어!」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「アイツ、そんなことを……」"
translation = "「그 녀석, 그런 소리를……」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「でも、とんだ勘違いなのだわ。ソフレは優しくなんてないのよ。ただ封印の縛りで、人を傷付けられないだけ」"
translation = "「하지만 대단한 착각인 거예요. 소프레는 다정하지 않아. 그저 봉인의 제약 때문에 사람을 해칠 수 없을 뿐.」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「別に犯人として疑われようが、ソフレは構わないのだわ」"
translation = "「딱히 범인으로 의심받든 말든 소프레는 상관없는 거예요.」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「まったく、どうしようもないヘソ曲がりね」"
translation = "「정말이지 어쩔 수 없는 심술쟁이라니까.」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「そんなことじゃ、私もこの半年間、恵原さんの調べものを手伝った甲斐がないわ」"
translation = "「그러면 나도 지난 반년 동안 에바라 씨의 조사를 도와준 보람이 없잖아.」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「なによそれ……どういうことなのだわ？」"
translation = "「뭐야 그게…… 무슨 소리인 거예요?」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「どうもこうも、さっき言ってた、あなたの封印を解く方法が見つかったって話よ」"
translation = "「무슨 소리고 뭐고 아까 말했던 네 봉인을 풀 방법을 찾았다는 얘기야.」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「学園の星術研究の資料や、禁書庫になっている『地下図書館』の資料の一部にも当たって、恵原さんが必死に調査した成果なんでしょう？\u3000私も結構手伝ったんだから」"
translation = "「학원의 성술 연구 자료나 금서고인 『지하 도서관』의 자료 일부까지 뒤져가며 에바라 씨가 필사적으로 조사한 성과 아니겠어? 나도 꽤 도와줬다고.」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「って、その顔……ソフレ、あなたもしかして、聞かされてなかったの？」"
translation = "「어라, 그 표정은…… 소프레, 너 설마 듣지 못한 거야?」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「アイツ、そんなことは一言も……」"
translation = "「그 녀석, 그런 말은 한마디도……」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「偶然見つけたから、一緒に頑張ろうって、いつもの能天気にうるさい感じで……」"
translation = "「우연히 찾았으니까 같이 힘내자고 평소처럼 천하태평하게 시끄러운 느낌으로만……」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「……そう。恵原さんらしいわね」"
translation = "「……그래. 에바라 씨답네.」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「それで？\u3000あなたは自分の為に頑張ってくれた恵原さんの行動を知ってもなお、惰眠を貪り続ける気なのかしら？」"
translation = "「그래서? 너는 자신을 위해 힘써준 에바라 씨의 행동을 알고도 계속 늦잠이나 잘 생각이야?」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「別に……ソフレはそんなこと、頼んでなんかいないのだわ」"
translation = "「딱히…… 소프레는 그런 거 부탁한 적 없는 거예요.」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「私も、あなたと同じで面倒な呪いに悩まされる身だから、正直やけになる気持ちがわからないわけじゃないわ」"
translation = "「나도 너처럼 귀찮은 저주 때문에 고민하는 몸이라 솔직히 자포자기하고 싶은 기분을 모르는 건 아니야.」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「それでも、あれだけ歩み寄ってくれる相手に対して、勝手に決めつけて距離を取るのは感心しないわよ」"
translation = "「그래도 저렇게 다가와 주는 상대에 대해 멋대로 단정 짓고 거리를 두는 건 보기 좋지 않아.」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「……そんなの、善意の押し付けなのだわ」"
translation = "「……그런 건 선의를 강요하는 것일 뿐인 거예요.」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「あなただって悪ぶってるけど、さっき自分でも、平和に眠るのが１番だって言ってたじゃない」"
translation = "「너도 못된 척하지만 아까 스스로 평화롭게 잠드는 게 최고라고 했잖아.」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「それは……」"
translation = "「그건……」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「それにあなた、私に対して借りが１つあったでしょう？」"
translation = "「게다가 너, 나한테 빚이 하나 있었지?」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「学生時代に、私の教えた呪術のおかげで、封印の行動範囲制限を誤魔化して東京まで出られるようになった……まさか寝ぼけて忘れたわけじゃないわよね？」"
translation = "「학생 때 내가 가르쳐준 주술 덕분에 봉인의 행동 범위 제한을 속이고 도쿄까지 나갈 수 있게 됐던 거…… 설마 잠이 덜 깨서 잊은 건 아니겠지?」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「まさか、今その話を持ち出す気なの……？」"
translation = "「설마 지금 그 이야기를 꺼낼 생각인 거예요……?」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「恵原さんが抱えている事件を、あなたが協力して解決したら、その借りはチャラでいいわ」"
translation = "「에바라 씨가 맡은 사건을 네가 협력해서 해결하면 그 빚은 탕감해 줄게.」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「あなたは１度、ちゃんとあの子と向き合ってみなさい」"
translation = "「너는 한 번 제대로 그 아이와 마주해 봐.」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「ウィステリア……お前、司書になってから、少し変わったのかしら？\u3000学生時代のお前なら、そんなこと言わなかったはずよ」"
translation = "「위스테리아…… 너 사서가 되고 나서 조금 변한 거예요? 학생 때의 너라면 그런 말 안 했을 텐데.」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「ええ、そうかもね。だけど……」"
translation = "「응, 그럴지도 모르지. 하지만……」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「こんな呪い持ちの私でもね、ちゃんと向き合ってくれる人はいるんだって、気づいたのよ。図書委員の子たちだったり――」"
translation = "「이런 저주받은 나라도 제대로 마주해 주는 사람이 있다는 걸 깨달았거든. 도서위원 아이들이나──」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「そこにいる会長くんだったりね」"
translation = "「거기 있는 회장군처럼 말이야.」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「……って、噂をすれば、ほら――」"
translation = "「……아, 호랑이도 제 말 하면 온다더니──」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「ソフレ！」"
translation = "「소프레!」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「やっと見つけた！\u3000探したんだよ、も～」"
translation = "「드디어 찾았다! 한참 찾았잖아, 정말~」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「……会長。さっきからこっそりＤＩＳＣ弄ってたけど、さてはソフレの居場所をフェリシーに教えてたわね？」"
translation = "「……회장. 아까부터 몰래 DISC를 만지작거리더니 보아하니 소프레의 위치를 펠리시에게 가르쳐 준 거예요?」"

[[dialogue]]
speaker = "unk"
original = "無実はちゃんと晴らさないと"
translation = "무죄는 제대로 밝혀야지"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「はぁ……お前もフェリシーと同じで、お節介焼きなのだわ……」"
translation = "「하아…… 너도 펠리시랑 똑같이 참견쟁이인 거예요……」"

[[dialogue]]
speaker = "unk"
original = "ソフレは困ったような顔をして、肩をすくめるのだった。"
translation = "소프레는 곤란한 표정을 지으며 어깨를 으쓱였다."

