[[dialogue]]
speaker = "unk"
original = "海上や海中をひとしきり探した後、今度は砂浜でパテルストーンを探す。"
translation = "해상이나 바닷속을 한참 찾은 뒤, 이번에는 백사장에서 파텔 스톤을 찾는다."

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「うんしょ、うんしょ……」"
translation = "「영차, 영차……」"

[[dialogue]]
speaker = "unk"
original = "マグダレナのスコップが、ザク、ザクと砂を割って穴を掘る。"
translation = "막달레나의 삽이 서걱, 서걱 모래를 가르며 구멍을 판다."

[[dialogue]]
speaker = "unk"
original = "そしてスコップの切っ先がカツンと硬い音を立てて──"
translation = "그리고 삽 끝이 카캉 하고 딱딱한 소리를 내며──"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「あ、パテルストーン、ありました～♪」"
translation = "「아, 파텔 스톤, 찾았어요~♪」"

[[dialogue]]
speaker = "unk"
original = "お手柄だね"
translation = "장하네."

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「うふふ、ありがとうございます～」"
translation = "「우후후, 감사합니다~」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「アルモたんもパテルストーンを見つけたのだ！」"
translation = "「알모땅도 파텔 스톤을 찾은 것이다!」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「あたしもー！」"
translation = "「나도!」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「これで集めたパテルストーンは……２０個ですね。あといくつあるんでしょう？」"
translation = "「이걸로 모은 파텔 스톤은…… 20개네요. 앞으로 몇 개나 더 남았을까요?」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「あたしの感覚では、これで半分くらいかな」"
translation = "「내 감각으로는, 이걸로 절반 정도려나.」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「思ったよりあるのだ！\u3000でも遊びながらだからいいのだ！」"
translation = "「생각보다 많은 것이다! 하지만 놀면서 하는 거니까 괜찮은 것이다!」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「そうですね。まだまだ遊べちゃいます♪」"
translation = "「그렇네요. 아직 더 놀 수 있겠어요♪」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「ただ、夢中で掘っているうちに、砂浜を穴だらけにしてしまいました……埋めないといけませんね」"
translation = "「다만, 정신없이 파는 사이에 백사장을 구멍투성이로 만들어 버렸네요…… 메워야겠어요.」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「あ、でも砂がたくさんあるんですから、埋める前にこの砂で遊んでみませんか？\u3000砂のお城とか作ってみたかったんです」"
translation = "「아, 하지만 모래가 잔뜩 있으니까, 메우기 전에 이 모래로 놀아보지 않으실래요? 모래성 같은 걸 만들어 보고 싶었거든요.」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「それは楽しそうなのだ！\u3000アルモたんもやるのだ！」"
translation = "「그거 재밌어 보이는 것이다! 알모땅도 할 것이다!」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「魔王城を作るぞ～！\u3000世界を支配してやる～！」"
translation = "「마왕성을 만들자~! 세계를 지배해 주마~!」"

[[dialogue]]
speaker = "unk"
original = "俺も一緒にやる"
translation = "나도 같이 할게."

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「はい、みんなで立派なお城を作りましょう♪」"
translation = "「네, 다 함께 멋진 성을 만들어요♪」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「ここに砂を盛って……真ん中を一番高くして……ここから形を整えていきましょう」"
translation = "「여기에 모래를 쌓고…… 가운데를 가장 높게 해서…… 여기서부터 모양을 잡아나가죠.」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「私は会長と一緒に、お城のてっぺんを……ペタペタ」"
translation = "「저는 회장님과 함께 성 꼭대기를…… 토닥토닥.」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「ペタペタ……ペタペタ……えへへ♪\u3000一緒にお城を作って、会長と仲良しです♪」"
translation = "「토닥토닥…… 토닥토닥…… 에헤헤♪ 함께 성을 만들어서 회장님과 사이가 좋네요♪」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「はい、できました！」"
translation = "「네, 다 됐어요!」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「おお、マグダレナの背と同じぐらいの大きさの立派なお城なのだ！」"
translation = "「오오, 막달레나의 키와 비슷할 정도로 커다란 멋진 성인 것이다!」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「でもお城だけじゃ寂しい気がしますね。それじゃ……うんしょ、よいしょ……」"
translation = "「하지만 성만 있으면 허전한 기분이 드네요. 그럼…… 영차, 영차……」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「お、おお……これは……」"
translation = "「오, 오오…… 이건……」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「じゃーん！\u3000できました！」"
translation = "「짠! 다 됐어요!」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「お城の周りにすごい城壁ができてるのだ……蟻んこ一匹通さない鉄壁なのだ」"
translation = "「성 주변에 엄청난 성벽이 생긴 것이다…… 개미 한 마리 통과시키지 못할 철벽인 것이다.」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「さすが《境界》のマグダレナだね……」"
translation = "「역시 《경계》의 막달레나네……」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「たくさんお砂遊びできて楽しかったです。でもお片づけはちゃんとしないといけませんね」"
translation = "「모래놀이를 잔뜩 할 수 있어서 즐거웠어요. 하지만 뒷정리는 제대로 해야겠죠.」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「よいしょ、よいしょ……穴を埋めて……はい、ビーチが綺麗になりました♪」"
translation = "「영차, 영차…… 구멍을 메우고…… 네, 비치가 깨끗해졌어요♪」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「次は何をしましょうか。パテルストーンを探しながらできることは……」"
translation = "「다음은 뭘 할까요. 파텔 스톤을 찾으면서 할 수 있는 일은……」"

[[dialogue]]
speaker = "unk"
original = "潮干狩りなんかもいいかも"
translation = "조개잡이 같은 것도 괜찮을지도."

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「いいですね♪\u3000浜辺を探しながら、貝も採れたりして一石二鳥です。たくさん採れたらお料理しましょう」"
translation = "「좋네요♪ 해변을 뒤지면서 조개도 캘 수 있으니 일석이조예요. 많이 캐면 요리해요.」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「潮干狩りの道具なら、リップルから借りてるのだ！」"
translation = "「조개잡이 도구라면 리플한테 빌려둔 것이다!」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「じゃあ早速潮干狩りしましょう～♪」"
translation = "「그럼 당장 조개잡이 해요~♪」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「じゃりじゃり……じゃりじゃり……あ、貝が出てきました！\u3000この小さな貝はアサリでしょうか。こっちの大きいのはハマグリですね」"
translation = "「자갈자갈…… 자갈자갈…… 아, 조개가 나왔어요! 이 작은 조개는 바지락일까요. 이쪽 큰 건 대합이네요.」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「海藻も流れ着いてるね。あ、マグダレナのサンダルにも海藻付いてるよ。取ってあげる」"
translation = "「해초도 떠내려왔네. 아, 막달레나 샌들에도 해초가 붙어 있어. 떼어 줄게.」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「ありがとうございます～」"
translation = "「감사합니다~」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「こっちはカニがいるのだ！」"
translation = "「이쪽은 게가 있는 것이다!」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「どれどれ……あ、ホントですね、ちっちゃなカニがいます！\u3000横歩きしてかわいいですね～」"
translation = "「어디 어디…… 아, 정말이네요, 조그만 게가 있어요! 옆으로 걷는 게 귀엽네요~」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「そ～っと……つんつん、つんつん。あ、ハサミを振り上げて威嚇してます。イタズラしちゃってごめんなさい」"
translation = "「살며시…… 콕콕, 콕콕. 아, 집게를 치켜들고 위협하고 있어요. 장난쳐서 미안해.」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「あ、砂の中に硬いのが……あ、これはアサリじゃなくてパテルストーンですね。また１つ見つけました」"
translation = "「아, 모래 속에 딱딱한 게…… 아, 이건 바지락이 아니라 파텔 스톤이네요. 또 하나 찾았어요.」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「ふぅ……見てください、貝がたくさん採れましたよ♪\u3000大きなサザエも採れました♪」"
translation = "「후우…… 보세요, 조개를 잔뜩 캤어요♪ 커다란 소라도 잡았답니다♪」"

[[dialogue]]
speaker = "unk"
original = "ちなみになんだけど……"
translation = "참고로 말해두는데……"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「普通の海では勝手に貝や海藻を採っちゃいけない……？」"
translation = "「평범한 바다에서는 마음대로 조개나 해초를 채취하면 안 된다고요……?」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「……なるほど、漁業権というのがあって、漁師さん以外は採っちゃダメなんですね。潮干狩りはちゃんと決められた範囲で行われている、と」"
translation = "「……과연, 어업권이라는 게 있어서 어부 분들 말고는 채취하면 안 되는 거군요. 조개잡이는 제대로 정해진 범위 내에서 이루어진다, 고.」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「漁にも人が定めた領域があります。『領域』を司る守護天使として、ちゃんとルールは守らないといけませんね」"
translation = "「어업에도 사람이 정한 영역이 있군요. 『영역』을 관장하는 수호천사로서, 규칙은 제대로 지켜야겠네요.」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「でもここはリゾート結界だから採り放題なのだ！」"
translation = "「하지만 여기는 리조트 결계니까 마음껏 캐도 되는 것이다!」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「はい、めいっぱい潮干狩りを楽しんじゃいましょう♪」"
translation = "「네, 마음껏 조개잡이를 즐겨버리죠♪」"

[[dialogue]]
speaker = "？？？"
original = "「──」"
translation = "「──」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「──ッ」"
translation = "「──윽.」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「あれ？\u3000誰もいない……？」"
translation = "「어레? 아무도 없네……?」"

[[dialogue]]
speaker = "unk"
original = "何かあった？"
translation = "무슨 일 있어?"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「後ろに誰かいた気がするんですが……振り返ったら誰もいなくて……」"
translation = "「뒤에 누가 있었던 기분이 드는데…… 돌아보니 아무도 없어서……」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「きっと気のせいだと思います。気を取り直して潮干狩りを続けましょう♪」"
translation = "「분명 기분 탓일 거예요. 기운 차리고 조개잡이를 계속해요♪」"

[[dialogue]]
speaker = "unk"
original = "それからまたみんなで貝を採り、パテルストーンもいくつか見つけたのだった。"
translation = "그 뒤로 다시 다 함께 조개를 캐고, 파텔 스톤도 몇 개 찾아냈다."

