[[dialogue]]
speaker = "unk"
original = "アナとシュティレが飲み込まれたアステライトの内部では、ギガンドムが呼び出した大量の機械型モンスターがひしめいていた──"
translation = "아나와 슈틸레가 삼켜진 아스텔라이트 내부에서는 기간돔이 소환한 대량의 기계형 몬스터들이 바글거리고 있었다──"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「レッドデルタ──シュート！」"
translation = "「레드 델타── 슛!」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「──ガァアアッ！」"
translation = "「──가아아악!」"

[[dialogue]]
speaker = "unk"
original = "アナはひたすらに矢をつがえ、近くのモンスターを射抜き続ける。"
translation = "아나는 오로지 화살을 메기고 근처의 몬스터들을 계속해서 꿰뚫는다."

[[dialogue]]
speaker = "unk"
original = "捌ききれず接近を許した時は、攻撃を受けるしかない。元から弓兵は狙撃が専門。接近戦などできない。"
translation = "다 쳐내지 못하고 접근을 허용했을 때는 공격을 받아낼 수밖에 없다. 본래 궁병은 저격이 전문. 접근전 따위는 할 수 없다."

[[dialogue]]
speaker = "unk"
original = "だから機械型モンスターの鉄拳は、気合いで受けきる。むしろ攻撃に寄って吹き飛ばされれば距離が取れる──そうなれば弓兵の自分が有利だ。"
translation = "그러니 기계형 몬스터의 철권은 근성으로 받아낸다. 오히려 공격에 밀려 튕겨 나가면 거리를 벌릴 수 있다── 그렇게 되면 궁병인 자신이 유리하다."

[[dialogue]]
speaker = "unk"
original = "アナは火星とのリンクを最大まで開いて星力を練り続け、重傷を負った後輩を守りながら、大量の機械型モンスターを捌き続けていた。"
translation = "아나는 화성과와의 링크를 최대치까지 열어 성력을 계속 연마하며, 중상을 입은 후배를 지키면서 대량의 기계형 몬스터를 계속해서 상대하고 있었다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はぁっ……はっ──う、げほっ……！\u3000ま、まだ……お願い……マルス……力を貸して……」"
translation = "「하아…… 하── 윽, 게훅……! 아, 아직…… 부탁이야…… 마르스…… 힘을 빌려줘……」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「ぐっ……ア、アナお姉ちゃん……ダメです、それ以上、星力を使ったら……」"
translation = "「윽…… 아, 아나 언니…… 안 돼요, 그 이상 성력을 사용하면……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「シュティレさんこそ、私の後ろに隠れていてください……もう限界です。後は……私が何とかします」"
translation = "「슈틸레 씨야말로 제 뒤에 숨어 계세요…… 이제 한계예요. 나머지는…… 제가 어떻게든 할게요.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「い、いけません……アナお姉ちゃん。本当に、し、死んでしまいます……逃げましょう……！」"
translation = "「아, 안 돼요…… 아나 언니. 정말로 주, 죽고 말아요…… 도망쳐요……!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「無理です……こいつらは素早い。逃げても背中を撃たれるだけ……」"
translation = "「무리예요…… 이 녀석들은 빨라요. 도망쳐봤자 등 뒤를 저격당할 뿐……」"

[[dialogue]]
speaker = "unk"
original = "震える指先に力を込め、炎の矢を生み出す。"
translation = "떨리는 손가락 끝에 힘을 주어 불꽃의 화살을 만들어낸다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「どれだけ分の悪い相手でも……退いたり、しません……」"
translation = "「아무리 승산 없는 상대라도…… 물러나지, 않겠어요……」"

[[dialogue]]
speaker = "unk"
original = "目がかすんで的が見えない──ならば耳で音を聞いて、そこを撃つしかない。"
translation = "눈이 침침해져 과녁이 보이지 않는다── 그렇다면 귀로 소리를 듣고 그곳을 쏘는 수밖에."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「星徒会の先輩方なら……きっと……最後まで戦う……後輩を守り切る……！」"
translation = "「성도회의 선배님들이라면…… 분명…… 끝까지 싸울 거예요…… 후배를 지켜낼 거예요……!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「どこからでも、来い……！\u3000私は、諦めたりなんか、しません……！！」"
translation = "「어디서든 와라……! 나는 포기하거나 하지 않겠어……!!」"

[[dialogue]]
speaker = "unk"
original = "──最期の時は、確実に近づいていた。"
translation = "──최후의 때는 확실히 다가오고 있었다."

[[dialogue]]
speaker = "unk"
original = "同刻──外の戦いも決着しつつあった。"
translation = "같은 시각── 밖의 전투도 결판이 나려 하고 있었다."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「し、しまったナ……久しぶりだゾ、こんな窮地は……ぐゥ……！」"
translation = "「이, 이런다타…… 오랜만이다타, 이런 궁지는…… 윽……!」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「それに……クソ。弱体化薬、ラスト１個、だったの二……！」"
translation = "「게다가…… 빌어먹을. 약화약, 마지막 한 개였는데타……!」"

[[dialogue]]
speaker = "unk"
original = "アステラによる分断に成功したギガンドムは、アニマへの攻撃を執拗に繰り返していた。"
translation = "아스텔라를 통한 분단에 성공한 기간돔은 아니마를 향한 공격을 집요하게 반복하고 있었다."

[[dialogue]]
speaker = "unk"
original = "彼女の持つモンスター弱体化薬。それを脅威と感じているのは、ギガンドムの本能か。"
translation = "그녀가 가진 몬스터 약화약. 그것을 위협으로 느끼고 있는 것은 기간돔의 본능일까."

[[dialogue]]
speaker = "unk"
original = "モンスターは言葉を持たない。しかし、獣のように本能が発達しているのかもしれない。"
translation = "몬스터는 말을 하지 않는다. 하지만 짐승처럼 본능이 발달해 있는 것일지도 모른다."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「せっかくかばってくれているのに、会長、ごめんヨ……」"
translation = "「모처럼 감싸주고 있는데, 회장, 미안하다타……」"

[[dialogue]]
speaker = "unk"
original = "クロトの守護星は地球である。倒れ伏すたびに、その身に星力を宿す。"
translation = "쿠로토의 수호성은 지구이다. 쓰러질 때마다 그 몸에 성력을 깃들인다."

[[dialogue]]
speaker = "unk"
original = "アニマを守るために今もギガンドムに単身立ち向かい、打ち合っているが──明らかに分が悪い。"
translation = "아니마를 지키기 위해 지금도 기간돔에 단신으로 맞서 싸우고 있지만── 명백히 형세가 불리하다."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「フヒ、限界は近イ……。応援はまだ、来ないのカ……？」"
translation = "「후히, 한계가 가깝다타……. 지원은 아직 오지 않는 거냐다타……?」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「アナ……シュティレ……」"
translation = "「아나…… 슈틸레……」"

[[dialogue]]
speaker = "unk"
original = "ギガンドムが発生させたアステライト。その内部では、地上と同じくらいに激化した戦闘が繰り広げられているはず。"
translation = "기간돔이 발생시킨 아스텔라이트. 그 내부에서는 지상만큼이나 격렬한 전투가 펼쳐지고 있을 터."

[[dialogue]]
speaker = "unk"
original = "後輩たちは、まだ生きているだろうか──？"
translation = "후배들은 아직 살아 있을까──?"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "『はぁっ……はーっ……！\u3000よし、１体、撃破っ……ま、まだっ……うぐっ──！』"
translation = "『하아…… 하아……! 좋아, 1마리 격파…… 아, 아직…… 으윽──!』"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「ン……？\u3000なんダ、今、声ガ……？」"
translation = "「응……? 뭐야타, 지금 목소리가……?」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "『アナお姉ちゃん……！\u3000ダメです、それ以上は……血が、血が止まっていないのに……！』"
translation = "『아나 언니……! 안 돼요, 그 이상은…… 피가, 피가 멈추지 않는데……!』"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「……学園でシュティレと繋いだＤＩＳＣの通話……つなげたまま、だったナ……」"
translation = "「……학원에서 슈틸레와 연결했던 DISC 통화…… 연결된 채였나다타……」"

[[dialogue]]
speaker = "unk"
original = "アニマの懐にあるＤＩＳＣ。通話口から聞こえてくるのは、今にも息絶えそうなアナとシュティレの会話だった。"
translation = "아니마의 품 안에 있는 DISC. 통화구에서 들려오는 것은 금방이라도 숨이 끊어질 듯한 아나와 슈틸레의 대화였다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "『はぁ……ふぅ……シュティレさん……先ほどの会話の、続き、なんですけど……』"
translation = "『하아…… 후우…… 슈틸레 씨…… 아까 하던 대화의, 뒷부분인데요……』"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "『な、何を……今、そんなこと……！』"
translation = "『무, 무슨…… 지금 이런 상황에……!』"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "『──巨大ロボットを作るのが夢、と言っていましたよね』"
translation = "『──거대 로봇을 만드는 게 꿈이라고 하셨죠.』"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "『そんな夢を持つ女の子をどう思うのかと、気にしていましたよね……』"
translation = "『그런 꿈을 가진 여자아이를 어떻게 생각할지 걱정하셨잖아요……』"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「何だっテ……？\u3000シュティレの、夢……？」"
translation = "「뭐라고다타……? 슈틸레의 꿈……?」"

[[dialogue]]
speaker = "unk"
original = "アニマは、か細く聴こえる通話に、耳を澄ませる──"
translation = "아니마는 가냘프게 들려오는 통화에 귀를 기울인다──"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「私は素敵な夢だと、思いますよ……ロボットの制作。いいじゃないですか。とても……ロマンが、あります……」"
translation = "「저는 멋진 꿈이라고 생각해요…… 로봇 제작. 좋지 않나요. 무척…… 로망이 있어요……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そしてようやく繋がりました……シュティレさんの望む巨大ロボットは、おそらく……機械技術だけでは、作れない。違いますか？」"
translation = "「그리고 이제야 연결됐네요…… 슈틸레 씨가 원하는 거대 로봇은 아마…… 기계 기술만으로는 만들 수 없죠. 아닌가요?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「錬金術の奇蹟を借りなければ製造すらできないような、アニメに出てくるような巨大ロボットが……作りたいんじゃないですか……？」"
translation = "「연금술의 기적을 빌리지 않으면 제조조차 할 수 없는, 애니메이션에 나오는 것 같은 거대 로봇을…… 만들고 싶은 것 아닌가요……?」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「……そう、です」"
translation = "「……맞아요.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「私の目標は……小さい頃からの夢は……ファイナルフォームギガンドムのような、スーパーロボットを、作ることで……」"
translation = "「제 목표는…… 어릴 적부터의 꿈은…… 파이널 폼 기간돔 같은 슈퍼 로봇을 만드는 것이라서……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「知らない形態のギガンドム、ですね……」"
translation = "「모르는 형태의 기간돔이네요……」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「はい。エネルギーは自身の体内で生成する永久機関のため、無尽蔵で……」"
translation = "「네. 에너지는 자신의 체내에서 생성하는 영구기관이라서 무궁무진하고……」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「陸海空だけでなく、宇宙空間でも活動可能で……」"
translation = "「육해공뿐만 아니라 우주 공간에서도 활동 가능하며……」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「腕が無限に伸びて敵を追跡する、ロケットブースターパンチも搭載していて……」"
translation = "「팔이 무한히 늘어나 적을 추적하는 로켓 부스터 펀치도 탑재되어 있고……」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「一兆度もあるウルトラビームを何発でも撃てるんです……」"
translation = "「1조 도나 되는 울트라 빔을 몇 발이든 쏠 수 있어요……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ふふ……なるほど……それは確かに無理です。機械技術だけでは絶対に無理……錬金術が、必要ですね……」"
translation = "「후후…… 과연…… 그건 확실히 무리네요. 기계 기술만으로는 절대 무리…… 연금술이 필요하겠네요……」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「はい……流星附属に入学してしばらくしたある日……併設されている新星学園に、奇蹟を手中に収めた天才錬金術師がいる、と聞きました……」"
translation = "「네…… 유성 부속에 입학하고 얼마 지나지 않은 어느 날…… 병설된 신성학원에 기적을 손에 넣은 천재 연금술사가 있다는 소문을 들었습니다……」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「アニマ先輩の錬金術を見て、衝撃を受けました。会長が女の子になったりしてて……」"
translation = "「아니마 선배의 연금술을 보고 충격을 받았어요. 회장님이 여자아이가 되기도 하고……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「物理の法則を飛び越えてますからね、あの人のやることは……」"
translation = "「물리 법칙을 뛰어넘고 있으니까요, 그분이 하는 일은……」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「でも、正直に言えませんでした……どうして錬金術を学びたいんだと聞かれた時、ロボットが作りたいとは、言えませんでした……」"
translation = "「하지만 솔직히 말할 수 없었어요…… 왜 연금술을 배우고 싶냐는 질문을 받았을 때, 로봇을 만들고 싶다고는 말할 수 없었습니다……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……どうして、ですか？」"
translation = "「……어째서인가요?」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「馬鹿らしい夢だと、自覚しています。小さい頃から、何度も周りから笑われてきたから」"
translation = "「바보 같은 꿈이라고 자각하고 있어요. 어릴 때부터 몇 번이나 주변에서 비웃음을 샀으니까.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「他人から見たらくだらないものだということくらい、分かってるんです。だから……」"
translation = "「타인이 보기엔 하찮은 것이라는 것 정도는 알고 있어요. 그러니까……」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「くだらないものを作るために錬金術を使うなと、そう言われたらと思うと……」"
translation = "「하찮은 걸 만들기 위해 연금술을 쓰지 말라고, 그런 말을 들을까 봐 겁이 나서……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そんなことありませんよ。アニマ先輩は笑いません」"
translation = "「그럴 리 없어요. 아니마 선배는 웃지 않아요.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そこに確かな熱があれば。ロマンがあれば……あの人は、どんな馬鹿らしいことでも笑ったりしません」"
translation = "「그곳에 확실한 열정이 있다면. 로망이 있다면…… 그분은 아무리 바보 같은 일이라도 비웃지 않으세요.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「あの人ほど、ロマンの中で生きている人はいないんですから」"
translation = "「그분만큼 로망 속에서 살아가는 사람도 없으니까요.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「アナお姉ちゃん……」"
translation = "「아나 언니……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「任せてください。私が絶対に、あなたの夢を守って──く、ぅっ……！」"
translation = "「맡겨주세요. 제가 반드시 당신의 꿈을 지키고── 으, 윽……!」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「──グァアァッ！！」"
translation = "「──구아아악!!」"

[[dialogue]]
speaker = "unk"
original = "突然、通話が途切れた。おそらく、敵の攻撃によってシュティレのＤＩＳＣが破壊されたのだ。"
translation = "갑자기 통화가 끊겼다. 아마 적의 공격에 의해 슈틸레의 DISC가 파괴된 것이리라."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「……もっと、ちゃんと聞いておくべきだったナ」"
translation = "「……좀 더 제대로 들어뒀어야 했다타.」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「シュティレ……キミも、アニマと同じダ。狂っていル……！」"
translation = "「슈틸레…… 너도 아니마와 똑같다타. 미쳐있다타……!」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「フヒ♪\u3000死に際で語る夢が、一兆度のウルトラビームを無限発射とは……これを狂気と呼ばずに、なんと呼ブ！」"
translation = "「후히♪ 죽기 직전에 말하는 꿈이 1조 도의 울트라 빔 무한 발사라니…… 이걸 광기라고 부르지 않으면 뭐라고 부르겠나다타!」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「そうカ。錬金術でないと作れない巨大ロボット……アニマにロボットのことはよくわからないガ……」"
translation = "「그렇구나다타. 연금술이 아니면 만들 수 없는 거대 로봇…… 아니마는 로봇에 대해선 잘 모르지만다타……」"

[[dialogue]]
speaker = "unk"
original = "熱いモチベーション。狂気の炎。身を焦がすような好奇心──それらをひっくるめてアニマは『ロマン』と定義する。"
translation = "뜨거운 동기부여. 광기의 불꽃. 몸을 태울 듯한 호기심── 이것들을 통틀어 아니마는 『로망』이라 정의한다."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「ロマンならばわかるゾ……シュティレ！\u3000キミも！\u3000アニマと同類だったのだナ！！」"
translation = "「로망이라면 잘 안다타…… 슈틸레! 너도! 아니마와 동류였구나다타!!」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「つまりダ！\u3000今アニマは、ロマンを抱く将来有望な……錬金術師の卵を、失おうとしているわけダ！！」"
translation = "「즉이다타! 지금 아니마는 로망을 품은 장래 유망한…… 연금술사 꿈나무를 잃으려 하고 있는 셈이다타!!」"

[[dialogue]]
speaker = "unk"
original = "──救いたい。自分とは異なる、けれど熱く滾るロマンを抱く後輩を。"
translation = "──구하고 싶다. 자신과는 다르지만, 뜨겁게 끓어오르는 로망을 품은 후배를."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「……認められなイ！」"
translation = "「……인정 못 한다타!」"

[[dialogue]]
speaker = "unk"
original = "──<ruby>斃<rt>たお</rt></ruby>したい。この世界に灯る情熱の火を消そうとする、あの無粋な機械の人形を。"
translation = "──타도하고 싶다. 이 세계에 켜진 정열의 불꽃을 끄려 하는 저 무미건조한 기계 인형을."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「認められないゾ、そんなコト！！」"
translation = "「인정 못 한다타, 그런 건!!」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「会長！\u3000アニマに……このアニマに！\u3000同志を救い出せる力を、寄越セ──！！」"
translation = "「회장! 아니마에게…… 이 아니마에게! 동지를 구해낼 수 있는 힘을 내놔라다타──!!」"

