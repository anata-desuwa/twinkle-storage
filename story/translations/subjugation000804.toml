[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「いい！？\u3000料理が下手な人に限って、隠し味だの何だの言って、自分の好きな味付けをしたがるけど、私から言わせれば――」"
translation = "「잘 들어!? 요리 못 하는 사람일수록 숨은 맛이니 뭐니 하면서 자기가 좋아하는 간을 하려고 드는데, 내 입장에서 보자면──」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「レシピを馬鹿にしてんのか、って感じよ！」"
translation = "「레시피를 우습게 보는 거냐, 싶은 느낌이야!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「レシピは料理の説明書！\u3000その料理を美味しく作れる人が、作り方を分かりやすく示してくれたものよ！」"
translation = "「레시피는 요리 설명서야! 그 요리를 맛있게 만들 줄 아는 사람이 만드는 법을 알기 쉽게 보여준 거라고!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「せつな、貴方にも最速で伝わるように言ってあげるわ！\u3000さっきあなたが、忍者の里の秘伝だっていった特製ドリンクがあったわよね？」"
translation = "「세츠나, 너에게도 최속으로 전달되게 말해 줄게! 아까 네가 닌자 마을의 비전이라던 특제 드링크 있었지?」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「は、はいでござる」"
translation = "「네, 네, 그러하오.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「あなたはそれをチョコに入れようとしたけど、逆に聞くわ。なんでそのドリンクにチョコを入れないの？\u3000甘くて飲みやすくなるじゃない」"
translation = "「넌 그걸 초코에 넣으려고 했지만, 반대로 묻겠어. 왜 그 드링크에 초코를 넣지 않는 거야? 달콤해서 마시기 편해지잖아.」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「え？\u3000それは……古くより受け継がれてきた秘伝で……」"
translation = "「에? 그것은…… 옛날부터 전해 내려온 비전이라……」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「それはつまり、特製ドリンクのレシピってことよね？」"
translation = "「그건 즉 특제 드링크의 레시피라는 거잖아?」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「あ……！」"
translation = "「아……!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「気づいたかしら？\u3000せつな、あなたがチョコに特製ドリンクを入れるってことは、チョコを美味しく作る為の秘伝を崩そうとする行為なのよ！」"
translation = "「깨달았어? 세츠나, 네가 초코에 특제 드링크를 넣는다는 건 초코를 맛있게 만들기 위한 비전을 망가뜨리려는 행위야!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「だから、せつな。今後、料理が上手くなりたいなら心に刻んでおきさない」"
translation = "「그러니까 세츠나. 앞으로 요리를 잘하고 싶다면 가슴에 새겨둬.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「――レシピを守って、丁寧に料理を作りなさい。あなたが師匠の教えを守って、忍者になったのと同じように」"
translation = "「──레시피를 지키며 정성껏 요리를 만들어. 네가 스승의 가르침을 지켜 닌자가 된 것과 마찬가지로.」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「……！\u3000はい！\u3000せつな、これからはちゃんとレシピ通りに料理を作るでござる！」"
translation = "「……! 네! 세츠나, 이제부터는 제대로 레시피대로 요리를 만드는 소!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「それが分かったのなら、あとは私の教える通りに作れば、バッチリよ！」"
translation = "「그걸 알았다면 나머지는 내가 가르쳐 주는 대로만 하면 완벽해!」"

[[dialogue]]
speaker = "unk"
original = "そこからせつなは、蘭美の教える通り、丁寧に調理を進めていく。"
translation = "거기서부터 세츠나는 라비가 가르쳐 주는 대로 정성껏 조리를 진행해 나간다."

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「うん、いいわね。忍者だけあって、せつなは手先が器用ね。やればできるじゃない！」"
translation = "「응, 좋네. 닌자라서 그런지 세츠나는 손재주가 좋아. 하면 되잖아!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「えへへぇ♪\u3000お褒め頂き光栄にござる！」"
translation = "「에헤헤♪ 칭찬해 주시니 영광이오!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「しかし、蘭美殿の料理の腕前はさすがでござるな！\u3000速いのに丁寧で、実に美しい所作で、思わず感嘆のため息がもれてしまうでござる」"
translation = "「그나저나 라비 공의 요리 솜씨는 과연 대단하구려! 빠르면서도 정중하고, 실로 아름다운 몸짓이라 절로 감탄의 한숨이 새어 나오는 소이옵니다.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ふふんっ♪\u3000カッコいいでしょ？\u3000最速の美とはこういうことよ」"
translation = "「후훙♪ 멋있지? 최속의 미학이란 이런 거야.」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「蘭美殿。せつな、前から聞きたかったのでござるが……」"
translation = "「라비 공. 세츠나, 전부터 묻고 싶었던 것이 있소만……」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「うん？\u3000なにかしら？」"
translation = "「응? 뭔데?」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「蘭美殿がメイドをカッコいいと思うようになったきっかけとかって、なにかあるのでござるか？」"
translation = "「라비 공이 메이드를 멋지다고 생각하게 된 계기 같은 게 있소?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「きっかけ？」"
translation = "「계기?」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「その……蘭美殿は、魔界の地方を治める貴族の令嬢でござろう？」"
translation = "「그…… 라비 공은 마계 지방을 다스리는 귀족의 영애지 않소?」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「そんな方が世界一のメイドを目指そうと思うには、なにか強いきっかけがあったのではないかと思ったのでござる」"
translation = "「그런 분이 세계 최고의 메이드를 목표로 하려 한 것에는 뭔가 강한 계기가 있었던 게 아닌가 싶었던 소이옵니다.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ええ、そうね。よくある話よ」"
translation = "「그래, 그렇지. 흔한 이야기야.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「私が小さかった頃に、実家の屋敷へとある人間の女性がやってきたの」"
translation = "「내가 어렸을 때 본가의 저택으로 어떤 인간 여성이 찾아왔어.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「お母様が流星学園に通っていた頃の親友でね。老齢で引退することになった実家の前メイド長の後任として、迎え入れたのよ」"
translation = "「어머님이 유성학원에 다니던 시절의 절친이셨지. 고령으로 은퇴하게 된 본가의 전 메이드장의 후임으로서 모셔온 거야.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「その人――新しいメイド長はもう、やること為すこと、とにかく美しくてカッコいい淑女だったわ。それでいて、星騎士としても強かったの」"
translation = "「그분── 새로운 메이드장은 이제, 하는 일마다 그저 아름답고 멋진 숙녀였어. 그러면서도 성기사로서도 강했지.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「私はそんな彼女に、見惚れて、憧れてしまった。彼女の経歴を聞いて、納得したわ」"
translation = "「나는 그런 그녀에게 넋을 잃고 동경하게 됐어. 그녀의 경력을 듣고 납득했지.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「その人は昔、メイド・オブ・メイドで３回連続優勝を果たし、殿堂入りを果たした――」"
translation = "「그분은 옛날에 메이드 오브 메이드에서 3회 연속 우승을 차지해 명예의 전당에 오른──」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「『マスターメイド』の称号を持つ、正真正銘、世界最高のメイドだったのよ」"
translation = "「『마스터 메이드』의 칭호를 지닌, 명실상부 세계 최고의 메이드였던 거야.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「そのカッコよさに惹かれて、私は弟子入り志願をしたわ。両親は最初、驚いて反対したりもしたけれど――」"
translation = "「그 멋짐에 매료되어 나는 제자 입문을 자청했어. 부모님은 처음엔 놀라며 반대하기도 하셨지만──」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「私の心はメイドへの憧れで燃え上がって、決して冷めることはなかった。それは、今でもね」"
translation = "「내 마음은 메이드에 대한 동경으로 타올라 결코 식는 일은 없었어. 그건 지금도 마찬가지고.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「あとは、知っての通り。その人の指導で天才的な才能を開花させた私は、最速でメイドロードを駆け上がり、メイド・オブ・メイドで世界２位まで登り詰めて――」"
translation = "「나머지는 아는 바대로야. 그분의 지도로 천재적인 재능을 꽃피운 나는 최속으로 메이드 로드를 달려와, 메이드 오브 메이드에서 세계 2위까지 올라갔고──」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「こうして、九浄家の最年少メイド長に抜擢されて、今に至るというわけ」"
translation = "「이렇게 쿠죠 가문의 최연소 메이드장으로 발탁되어 지금에 이르게 된 거야.」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「蘭美殿にも、師匠がいたのでござるな！」"
translation = "「라비 공에게도 스승이 있었구려!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ええ。私にとって、いつか乗り越えるべき、最強にして最高にカッコいいラスボスがね♪」"
translation = "「그래. 나에게 있어 언젠가 뛰어넘어야 할, 최강이자 최고로 멋진 라스트 보스지♪」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「まあ、その前に私は、今の世界１位に勝たなければいけないわけだけど――」"
translation = "「뭐, 그전에 나는 지금의 세계 1위를 이겨야 하겠지만──」"

[[dialogue]]
speaker = "unk"
original = "それから蘭美の指導により、チョコが出来上がった。"
translation = "그러고 나서 라비의 지도에 의해 초코가 완성되었다."

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「冷蔵庫に入れて、１時間以上経ったでござる！」"
translation = "「냉장고에 넣고 1시간 이상 지난 소!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「じゃあ、仕上がりを確認してみるわよ」"
translation = "「그럼 완성도를 확인해 보자고.」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「御意！」"
translation = "「어의!」"

[[dialogue]]
speaker = "unk"
original = "せつながチョコの入った型を、冷蔵庫から取ってくる。"
translation = "세츠나가 초코가 든 틀을 냉장고에서 꺼내 온다."

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「蘭美殿、綺麗に固まっているでござるよ！\u3000このチョコを型から外せば完成でござるな！」"
translation = "「라비 공, 예쁘게 굳은 소이옵니다! 이 초코를 틀에서 빼내면 완성이오!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ん？\u3000せつな、チョコレートがなんか光って――」"
translation = "「응? 세츠나, 초콜릿이 뭔가 빛나──」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「え？\u3000こ、これはまさか――！？」"
translation = "「에? 이, 이건 설마──!?」"

[[dialogue]]
speaker = "unk"
original = "瞬間、厨房が白い光に包まれる。やがて、その光が収まると――"
translation = "순간, 주방이 하얀 빛에 휩싸인다. 이윽고 빛이 잦아들자──"

[[dialogue]]
speaker_original = "ゴーレム"
speaker_translation = "골렘"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「な……！」"
translation = "「나……!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「で、デジャヴでござるぅぅぅーーーーーーーーーっ！！！」"
translation = "「데, 데자뷔인 소이옵니다아아아아~~~~~~~~~!!!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「なんでそうなるぴょんッ！！？」"
translation = "「왜 그렇게 되는 거냣!!?」"

[[dialogue]]
speaker = "unk"
original = "思わずツッコんでしまう蘭美なのだった。"
translation = "자기도 모르게 딴지를 걸고 마는 라비였다."

