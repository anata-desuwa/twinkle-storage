[[dialogue]]
speaker = "unk"
original = "第３話,たとえそれが運命でも,P"
translation = "제3화, 설령 그것이 운명이라도"

[[dialogue]]
speaker = "unk"
original = "ある日、ヴィーナスは晴れ着フォームの能力を活かして、おみくじ占いをやっていたのだが――"
translation = "어느 날, 비너스는 설빔 폼의 능력을 살려 제비뽑기 점을 치고 있었는데──"

[[dialogue]]
speaker = "ヴィーナス"
original = "「な、なによこれ……」"
translation = "「뭐, 뭐야 이건……」"

[[dialogue]]
speaker = "ヘレナ"
original = "「む？\u3000顔色が冴えないが、占いがどうかしたのか、ヴィーナス？」"
translation = "「음? 안색이 좋지 않군. 점괘가 어떻길래 그러느냐, 비너스?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ヘレナちゃん……！\u3000見てよ、これ！\u3000おみくじの『縁談』のところ！」"
translation = "「헬레나짱……! 이것 좀 봐! 운세 뽑기의 『혼담』 부분!」"

[[dialogue]]
speaker = "ヘレナ"
original = "「なになに？\u3000『恋の運命』は最悪？\u3000今世で結ばれることなし、誰にも祝福されず、過酷な運命が待つ？」"
translation = "「어디 어디? 『사랑의 운명』은 최악? 현생에서 맺어질 일 없으며, 누구에게도 축복받지 못하고 가혹한 운명이 기다린다?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「これってどう考えても、私とクロトの恋人関係が破局しちゃう流れじゃない！」"
translation = "「이건 아무리 생각해도 나랑 쿠로토의 연인 관계가 파탄 난다는 흐름이잖아!」"

[[dialogue]]
speaker = "ヘレナ"
original = "「なるほど、これは酷い。しかも、ヴィーナスの占いはよく当たるからな。まるでそれが運命であるかのように」"
translation = "「과연, 이건 심하군. 게다가 비너스의 점은 잘 맞으니까 말이다. 마치 그것이 운명인 것처럼.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そうでしょ！？\u3000理不尽な結果だわ！」"
translation = "「그렇지!? 불합리한 결과야!」"

[[dialogue]]
speaker = "ヘレナ"
original = "「して、お前はこのまま、占いの結果を信じて、受け入れるのか？\u3000ヴィーナスよ」"
translation = "「그래서, 너는 이대로 점괘의 결과를 믿고 받아들일 셈이냐? 비너스여.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「……！\u3000いいえ！\u3000そんなわけないわ！\u3000私のクロトに対する『好き』は、はいそうですかと簡単に諦められるようなものじゃないんだから！」"
translation = "「……! 아니! 그럴 리 없잖아! 쿠로토를 향한 내 『좋아함』은, 아 예 그렇습니까 하고 간단히 포기할 수 있는 게 아니니까!」"

[[dialogue]]
speaker = "ヘレナ"
original = "「であろうな。ならば、話は簡単。我々がリクリエという運命に抗うのと同じだ、ヴィーナスよ――」"
translation = "「그렇겠지. 그렇다면 이야기는 간단하다. 우리가 리크리에라는 운명에 저항하는 것과 같다, 비너스여――」"

[[dialogue]]
speaker = "ヘレナ"
original = "「お前も、恋の運命に抗うしかあるまい」"
translation = "「너도 사랑의 운명에 저항할 수밖에 없겠지.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「……そうね。そうだわ！\u3000ありがとう、ヘレナちゃん。私、頑張ってみる！」"
translation = "「……그렇네. 맞아! 고마워, 헬레나짱. 나, 힘내 볼게!」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ふふっ、それでこそ、九浄家の娘だ」"
translation = "「후훗, 그래야 구죠 가문의 딸이지.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「よ～し、やってやるわ！」"
translation = "「조~아, 해보겠어!」"

[[dialogue]]
speaker = "unk"
original = "それから１週間ほど経って――"
translation = "그로부터 1주일 정도 지나서――"

[[dialogue]]
speaker = "ヴィーナス"
original = "「うぅ～！\u3000卵焼きを巻くのって、難しいわ！\u3000どうしても崩れちゃう……」"
translation = "「으으~! 계란말이를 마는 건 정말 어렵네! 자꾸만 망가져 버려……」"

[[dialogue]]
speaker = "蛍火"
original = "「ヴィーナスさん、頑張ってください！\u3000少しずつですが、前よりできるようになってますから！」"
translation = "「비너스 씨, 힘내세요! 조금씩이지만 전보다 잘하게 되셨으니까요!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ありがと、蛍火！\u3000私、頑張るわ！」"
translation = "「고마워, 호타루비! 나, 힘낼게!」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナス、料理を教わってたのか"
translation = "비너스, 요리를 배우고 있었던 건가."

[[dialogue]]
speaker = "蛍火"
original = "「あっ、師匠……！」"
translation = "「앗, 스승님……!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「えっ、クロト！？\u3000どうしてここにいることが……！？」"
translation = "「엣, 쿠로토!? 어떻게 여기 있는 걸……!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「って、ああぁぁ～～～っ！\u3000よそ見したら、卵焼きがぐちゃって、スクランブルエッグにぃ～～～っ！？」"
translation = "「그보다, 아아아아~~! 한눈팔았더니 계란말이가 뭉개져서 스크램블 에그가아~~!?」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスのちょっと焦げたスクランブルエッグが出来上がった後、カフェテリアの席で話を聞くことになった。"
translation = "비너스의 조금 탄 스크램블 에그가 완성된 후, 카페테리아 좌석에서 이야기를 듣게 되었다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「あむっ……もぐもぐ……また卵焼き失敗だわ……」"
translation = "「아구…… 우물우물…… 또 계란말이 실패야……」"

[[dialogue]]
speaker = "unk"
original = "変なタイミングで話しかけてごめん"
translation = "이상한 타이밍에 말을 걸어서 미안."

[[dialogue]]
speaker = "ヴィーナス"
original = "「ううん。私がクロトに隠し事をしてたのが原因なんだし……」"
translation = "「으응. 내가 쿠로토에게 비밀로 하고 있었던 게 원인이니까……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「でも、秘密にしてたのに、どうして私がカフェテリアにいるってわかったの？」"
translation = "「그렇지만 비밀로 했는데, 어떻게 내가 카페테리아에 있는 줄 알았어?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「――最近忙しそうにしてたから、ヘレナちゃんに聞いたら場所を教えてくれた？\u3000もう、ヘレナちゃんたら……」"
translation = "「――최근 바빠 보여서 헬레나짱에게 물어봤더니 장소를 알려줬다고? 정말, 헬레나짱도 참……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「――なんで蛍火から料理を教わってたのか？\u3000それは……ちょっと言いづらい事情があるというか……」"
translation = "「――왜 호타루비에게 요리를 배우고 있었냐고? 그건…… 좀 말하기 곤란한 사정이 있달까……」"

[[dialogue]]
speaker = "unk"
original = "俺はヴィーナスの頭に手を置き、髪を撫でながら言った。"
translation = "나는 비너스의 머리에 손을 얹고, 머리카락을 쓰다듬으며 말했다."

[[dialogue]]
speaker = "unk"
original = "俺はヴィーナスの恋人なんだから"
translation = "나는 비너스의 연인이니까."

[[dialogue]]
speaker = "unk"
original = "なにかあるなら頼って欲しい"
translation = "무슨 일이 있다면 의지해 줬으면 좋겠어."

[[dialogue]]
speaker = "ヴィーナス"
original = "「クロト……」"
translation = "「쿠로토……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あのね、実は……」"
translation = "「있잖아, 사실은……」"

[[dialogue]]
speaker = "unk"
original = "彼女から、おみくじ占いのことを打ち明けられる。"
translation = "그녀에게서 운세 뽑기 점에 대한 이야기를 듣게 된다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「でも、私は占い通りに恋人関係がダメになっちゃうのは嫌だったから……だったら、花嫁修行をしよう、って思ったの！」"
translation = "「하지만 나는 점괘대로 연인 관계가 틀어지는 건 싫었으니까…… 그렇다면 신부 수업을 하자, 라고 생각했어!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「誰から見ても恋人として相応しい、いい女になれば、周りからちゃんと祝福してもらえるでしょ？」"
translation = "「누가 봐도 연인으로서 어울리는 좋은 여자가 되면, 주변에서도 제대로 축복해 줄 거 아냐?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「だからまずは、料理とか、家事をできるようになろうと思って」"
translation = "「그래서 우선은 요리나 가사 일을 할 수 있게 되자고 생각해서.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それでね、私が花嫁修業を全部終えて、クロトに相応しい女の子だって宣言できるようになったら……」"
translation = "「그래서 말야, 내가 신부 수업을 전부 마치고 쿠로토에게 어울리는 여자아이라고 선언할 수 있게 되면……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「その時は、正々堂々とプロポーズをするわ──！」"
translation = "「그때는 정정당당하게 프로포즈를 할 거야──!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「だからクロト、覚悟して待ってなさい」"
translation = "「그러니까 쿠로토, 각오하고 기다려.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私、必ずやり遂げてみせるから！」"
translation = "「나, 반드시 해내 보일 테니까!」"

[[dialogue]]
speaker = "unk"
original = "どこまでも真っ直ぐな瞳で言うヴィーナスを前に、俺はスクランブルエッグを素早く口に運んで、全部頬張る。"
translation = "한없이 곧은 눈동자로 말하는 비너스를 앞에 두고, 나는 스크램블 에그를 재빨리 입으로 옮겨 전부 삼켰다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「ク、クロト……？」"
translation = "「크, 쿠로토……?」"

[[dialogue]]
speaker = "unk"
original = "飲み込んでから、俺は言った。"
translation = "삼키고 나서 나는 말했다."

[[dialogue]]
speaker = "unk"
original = "なら、俺は花嫁修行を手伝う！"
translation = "그럼, 내가 신부 수업을 도와줄게!"

[[dialogue]]
speaker = "ヴィーナス"
original = "「へ？」"
translation = "「헤?」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは呆気にとられたように、目をぱちくりさせるのだった――"
translation = "비너스는 어안이 벙벙한 듯 눈을 깜빡이는 것이었다――"

