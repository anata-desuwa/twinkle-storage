[[dialogue]]
speaker = "unk"
original = "第４話,スーパーパタンナーの本領発揮,P"
translation = "제4화, 슈퍼 파턴너의 본령 발휘"

[[dialogue]]
speaker = "美鶴"
original = "「会長さんのおかげで赤点も回避できたし、勉強を教えてもらったお礼もしなきゃね。体で払えばいい？」"
translation = "「회장님 덕분에 낙제도 면했으니 공부 가르쳐준 답례도 해야겠네. 몸으로 때워도 돼?」"

[[dialogue]]
speaker = "unk"
original = "体で！？"
translation = "몸으로!?"

[[dialogue]]
speaker = "美鶴"
original = "「なんでそんな驚いてんの。うちができることって言ったら、やっぱり服作りだから。会長さん専用の服、作ろうと思って」"
translation = "「왜 그렇게 놀라. 내가 할 수 있는 거라면 역시 옷 만들기니까. 회장님 전용 옷을 만들려고 생각 중이야.」"

[[dialogue]]
speaker = "美鶴"
original = "「社交界でも着られるスーツなんてどう？\u3000いざという時用にオーダーメイドのスーツが１着あると、会長として箔がつくかも」"
translation = "「사교계에서도 입을 수 있는 수트 같은 건 어때? 만약을 대비해 맞춤 수트가 한 벌 있으면 회장으로서 품위가 생길지도 몰라.」"

[[dialogue]]
speaker = "美鶴"
original = "「じゃ、決まりね。今日の放課後、会長さんの採寸やらせて」"
translation = "「그럼 결정됐네. 오늘 방과 후에 회장님 치수 잴게.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「へぇ、その採寸を星徒会室でやるってわけね」"
translation = "「헤에, 그 치수 측정을 성도회실에서 한다는 거네.」"

[[dialogue]]
speaker = "マトイ"
original = "「プロのお仕事ぶり、見てみたかったから楽しみ。ワクワク♪」"
translation = "「프로의 솜씨를 보고 싶었으니까 기대돼. 두근두근♪」"

[[dialogue]]
speaker = "美鶴"
original = "「見ててあんまり面白いものじゃないと思いますけど……まぁいいか」"
translation = "「봐서 그리 재밌는 건 아니라고 생각하지만…… 뭐, 됐나.」"

[[dialogue]]
speaker = "美鶴"
original = "「会長さん、測ってる時はあまり動かないでね。ミリ単位のズレも、できあがった時には大きなズレになるから」"
translation = "「회장님, 치수 잴 때는 너무 움직이지 마. 밀리미터 단위의 오차도 완성됐을 때는 큰 차이가 되니까.」"

[[dialogue]]
speaker = "美鶴"
original = "「胸囲、腹囲、股上、股下……いろいろ測るけど、腕や脚を通す時の快適さも大切。データがあればあるだけ、着心地のいい服が作れるし」"
translation = "「가슴둘레, 허리둘레, 밑위, 밑아래…… 여러 가지 재겠지만 팔다리를 움직일 때의 쾌적함도 중요해. 데이터가 많으면 많을수록 착용감이 좋은 옷을 만들 수 있으니까.」"

[[dialogue]]
speaker = "美鶴"
original = "「ピシッと決めてても、動きにくいんじゃ本末転倒。そこはうちの腕の見せ所」"
translation = "「겉모습은 멋져도 움직이기 불편하면 본말전도지. 그게 바로 내 실력을 보여줄 대목이야.」"

[[dialogue]]
speaker = "unk"
original = "プロの仕事、期待してるよ"
translation = "프로의 실력, 기대할게"

[[dialogue]]
speaker = "美鶴"
original = "「ん。男の人の服を作るのは初めてだから、ちょっと緊張してる」"
translation = "「응. 남자 옷을 만드는 건 처음이라 조금 긴장돼.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そういえば、うちのメイド隊には男の人はいないものね」"
translation = "「그러고 보니 우리 메이드대에는 남자가 없었지.」"

[[dialogue]]
speaker = "美鶴"
original = "「そーです。だから、会長さんが、うちの初めての<ruby>男<rt>ひと</rt></ruby>」"
translation = "「그렇죠. 그러니까 회장님이 제 첫 남자이에요.」"

[[dialogue]]
speaker = "マトイ"
original = "「美鶴ちゃん、ちょっとその言い方は……」"
translation = "「미츠루짱, 그 표현은 좀……」"

[[dialogue]]
speaker = "美鶴"
original = "「……？\u3000なんか変でした？」"
translation = "「……? 뭔가 이상했나요?」"

[[dialogue]]
speaker = "マトイ"
original = "「べ、別にー！\u3000なんにも変じゃないよ、大丈夫！」"
translation = "「아, 아니야! 아무것도 이상하지 않아, 괜찮아!」"

[[dialogue]]
speaker = "美鶴"
original = "「だからって、会長さんまで緊張しないでね。筋肉が強張ってても体型に影響出るし。それじゃ、始めます」"
translation = "「그러니까 회장님까지 긴장하지 마. 근육이 굳어 있어도 체형에 영향이 가니까. 그럼 시작할게요.」"

[[dialogue]]
speaker = "マトイ"
original = "（美鶴ちゃん、会長に対して、すごく自然体で話すんだね）"
translation = "(미츠루짱, 회장에게는 되게 자연스럽게 말하네)"

[[dialogue]]
speaker = "ヴィーナス"
original = "（『美鶴の心を開け大作戦』が功を奏したようね。さすがは私だわ！）"
translation = "(『미츠루의 마음을 열어라 대작전』이 성공한 모양이네. 역시 나야!)"

[[dialogue]]
speaker = "unk"
original = "美鶴は武器のように構えた巻き尺を俺の体に当て、数字をメモっていく。"
translation = "미츠루는 무기처럼 든 줄자를 내 몸에 대고 숫자를 메모해 나갔다."

[[dialogue]]
speaker = "美鶴"
original = "「身長……肩幅……袖丈……と。ふんふん、やっぱり女の子の数字と違う」"
translation = "「키…… 어깨너비…… 소매 길이…… 라고. 흠흠, 역시 여자애들 숫자랑은 다르네.」"

[[dialogue]]
speaker = "美鶴"
original = "「腕周りも、細身なのにちゃんと筋肉があるから、可動域もちゃんと考えなきゃだね」"
translation = "「팔 주변도 마른 편인데 근육이 제대로 잡혀 있으니까 가동 범위도 잘 고려해야겠어.」"

[[dialogue]]
speaker = "美鶴"
original = "「胸囲と腰回り測るから、手ぇ上げて。はい、バンザイ」"
translation = "「가슴둘레랑 허리 잴 거니까 손 들어봐. 자, 만세.」"

[[dialogue]]
speaker = "美鶴"
original = "「女の人だとバストトップとアンダーを測るけど、男の人ならいらないよね。あ、細身なのに胸板ある」"
translation = "「여자의 경우는 바스트 톱이랑 언더를 재지만 남자는 필요 없지. 아, 마른 것치고 가슴팍이 있네.」"

[[dialogue]]
speaker = "美鶴"
original = "「さわ、さわ……胸が柔らかくないの不思議。ちゃんと筋肉ついてるし、男らしい体つきって、こーゆーことなんだ」"
translation = "「조물, 조물…… 가슴이 말랑하지 않은 게 신기해. 근육이 잘 붙어 있고 남자다운 몸매라는 게 이런 거구나.」"

[[dialogue]]
speaker = "unk"
original = "あの、美鶴。ちょっとくすぐったい"
translation = "저기, 미츠루. 좀 간지러워"

[[dialogue]]
speaker = "美鶴"
original = "「ごめん。でも、これ、採寸だから」"
translation = "「미안. 하지만 이건 치수 측정이니까.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「採寸なら仕方ないわね！\u3000クロト、男の子ならくすぐったいのくらい我慢しなさい」"
translation = "「치수 측정이라면 어쩔 수 없네! 쿠로토, 남자애라면 간지러운 정도는 참아」"

[[dialogue]]
speaker = "美鶴"
original = "「次はウエスト……細く見えてたけど、やっぱり女の人より結構あるね。腹筋もカチカチで割れてる。会長さん、しっかり鍛えてるじゃん……さわさわ」"
translation = "「다음은 웨이스트…… 가늘어 보였는데 역시 여자보다 꽤 되네. 복근도 딱딱하게 갈라져 있고. 회장님, 운동 열심히 하나 본데…… 조물조물.」"

[[dialogue]]
speaker = "マトイ"
original = "「これも採寸なら仕方ない……ね？\u3000結構スキンシップが激しいものなんだね」"
translation = "「이것도 치수 측정이라면 어쩔 수 없…… 나? 스킨십이 꽤 격렬한걸.」"

[[dialogue]]
speaker = "美鶴"
original = "「そう、仕方ない仕方ない。はい、上半身終わり。次は下半身」"
translation = "「그래, 어쩔 수 없어. 자, 상체 끝. 다음은 하체.」"

[[dialogue]]
speaker = "マトイ"
original = "「か、下半身もやるんだ！？」"
translation = "「하, 하반신도 하는 거야!?」"

[[dialogue]]
speaker = "美鶴"
original = "「うん。スーツを作るなら上下セットじゃないとおかしいでしょ。あ、ズボンは脱がないでいいよ。そのままで平気」"
translation = "「응. 수트를 만든다면 상하 세트여야 하잖아. 아, 바지는 안 벗어도 돼. 그대로 재도 상관없어.」"

[[dialogue]]
speaker = "美鶴"
original = "「ヒップ……へー、お尻も硬いね。女の人と違う。太もももムチムチしてない。脂肪の付き方の違いかな……さわさわ」"
translation = "「힙…… 헤에, 엉덩이도 탄탄하네. 여자랑 달라. 허벅지도 물렁하지 않고. 지방이 붙는 방식의 차이인가…… 조물조물.」"

[[dialogue]]
speaker = "美鶴"
original = "「それじゃ股下。会長さん、ちょっと足開いて。脚の丈、内側から測るから」"
translation = "「그럼 밑아래. 회장님, 다리 좀 벌려봐. 다리 길이를 안쪽부터 잴 거니까.」"

[[dialogue]]
speaker = "unk"
original = "内股から！？"
translation = "가랑이 안쪽부터!?"

[[dialogue]]
speaker = "美鶴"
original = "「そーだよ。こっちからじゃないと、ちゃんとした数字分かんないし。裾が短くても長くても格好良くないからさ」"
translation = "「그렇다니까. 이쪽부터 안 재면 제대로 된 치수를 알 수 없거든. 밑단이 짧거나 길면 폼이 안 나잖아.」"

[[dialogue]]
speaker = "美鶴"
original = "「際どいとこだけど、変なとこは触んないし、採寸だから。プロのうちの仕事を信じて」"
translation = "「아슬아슬한 곳이지만 이상한 데는 안 만질 거고 이건 치수 측정이니까. 프로인 내 솜씨를 믿어줘.」"

[[dialogue]]
speaker = "マトイ"
original = "「私の気のせいかもしれないけど『採寸』って単語、免罪符になってないかなー！？」"
translation = "「내 기분 탓일지도 모르겠지만 『치수 측정』이라는 단어가 면죄부가 된 거 아니야!?」"

[[dialogue]]
speaker = "美鶴"
original = "「気のせい、気のせい。ん、しょ……わ、会長さん、足長いね。もうちょい上から測らないとダメかな」"
translation = "「기분 탓이야, 기분 탓. 자, 영차…… 와, 회장님 다리 길다. 좀 더 위쪽부터 재야 하려나.」"

[[dialogue]]
speaker = "マトイ"
original = "「わ、わ、わ！\u3000そこより上はセンシティブだよ！？」"
translation = "「와, 와, 와! 거기서 더 위는 민감한 부위라구!?」"

[[dialogue]]
speaker = "unk"
original = "（際どい、際どい……！）"
translation = "(아슬아슬해, 아슬아슬해……!)"

[[dialogue]]
speaker = "美鶴"
original = "「はい、おしまい。お疲れさまです」"
translation = "「자, 끝. 고생하셨습니다.」"

[[dialogue]]
speaker = "unk"
original = "立ってただけなのに、ドッと疲れた……"
translation = "서 있기만 했는데 기운이 다 빠졌어……"

[[dialogue]]
speaker = "美鶴"
original = "「どしたの？\u3000会長さん、顔真っ赤じゃん、ふふ。もしかして──」"
translation = "「왜 그래? 회장님, 얼굴이 새빨갛잖아, 후후. 혹시──」"

[[dialogue]]
speaker = "美鶴"
original = "「──えっちなこと、考えちゃってた？」"
translation = "「──야한 생각, 하고 있었어?」"

[[dialogue]]
speaker = "美鶴"
original = "「みんなが見てるのに、そんなことするわけないじゃん。うちは真面目に仕事してただけ」"
translation = "「다들 보고 있는데 그럴 리가 없잖아. 난 성실하게 일했을 뿐이야.」"

[[dialogue]]
speaker = "マトイ"
original = "「ふう……見てただけなのに、私もヒヤヒヤしちゃった……これで採寸は終わったんだよね？」"
translation = "「후우…… 보고만 있었는데 나까지 조마조마했어…… 이제 치수 측정은 끝난 거지?」"

[[dialogue]]
speaker = "美鶴"
original = "「必要な数字は揃ったから、これでバッチシ。超本気で作るから、完成を楽しみにしてて」"
translation = "「필요한 숫자는 다 모였으니 완벽해. 엄청 진심을 다해 만들 테니까 완성을 기대해 줘.」"

[[dialogue]]
speaker = "unk"
original = "それから、わずか数日後。星徒会室で美鶴の作った俺専用スーツのお披露目会が行われた。"
translation = "그리고 불과 며칠 후. 성도회실에서 미츠루가 만든 나 전용 수트의 발표회가 열렸다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「毎晩忙しそうにしてたみたいだけど、もう完成したの！？\u3000はちゃめちゃ早いわね！」"
translation = "「매일 밤 바쁘게 지내는 것 같더니 벌써 완성한 거야!? 엄청나게 빠르네!」"

[[dialogue]]
speaker = "美鶴"
original = "「はい。初めての男性の服だったので、気合入れちゃいました。自信作です。会長さん、試着してみてください」"
translation = "「네. 처음 만드는 남성복이라 기합 좀 넣었습니다. 자신작이에요. 회장님, 시착해 보세요.」"

[[dialogue]]
speaker = "unk"
original = "袖を通した美鶴ブランドのスーツは、ピッタリと体に張りつくようなフィット感なのに、動きやすくて、通気性も抜群。"
translation = "소매를 넣은 미츠루 브랜드의 수트는 몸에 딱 달라붙는 듯한 피트감인데도 움직이기 쉽고 통기성도 최고였다."

[[dialogue]]
speaker = "マトイ"
original = "「おお、格好いい……いつもより背が伸びて、なんだか脚も長く見えるね」"
translation = "「오오, 멋지다…… 평소보다 키도 커 보이고 왠지 다리도 길어 보여.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「さすがは美鶴、いい仕事だわ！」"
translation = "「역시 미츠루야, 훌륭한 솜씨네!」"

[[dialogue]]
speaker = "美鶴"
original = "「この世に唯一無二、会長さんの体型に合わせた専用スーツなんで。あんまり痩せたり太ったりして体型が変わると、着れなくなるから気をつけて」"
translation = "「세상에 단 하나뿐인, 회장님 체형에 맞춘 전용 수트니까요. 너무 살이 빠지거나 찌면 못 입게 되니까 조심하세요.」"

[[dialogue]]
speaker = "美鶴"
original = "「ま、その時はまた隅々まで採寸して調整するから」"
translation = "「뭐, 그때는 다시 구석구석 치수를 재서 조정해 줄 거지만요.」"

[[dialogue]]
speaker = "unk"
original = "どうやらヴィーナスの『美鶴の心を開け大作戦』は大成功──"
translation = "아무래도 비너스의 『미츠루의 마음을 열어라 대작전』은 대성공──"

[[dialogue]]
speaker = "美鶴"
original = "「でも、今度はふたりきりがいいかも……ふふ♪」"
translation = "「하지만 다음번에는 둘이서만 하는 게 좋을지도…… 후후♪」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ん？\u3000んんー？\u3000ちょっと美鶴ー？」"
translation = "「응? 응~? 미츠루~?」"

[[dialogue]]
speaker = "美鶴"
original = "「なんでしょう、お嬢様。何か問題でも？」"
translation = "「왜 그러시나요, 아가씨. 무슨 문제라도?」"

[[dialogue]]
speaker = "unk"
original = "もしかすると、大成功しすぎたのかもしれなかった。"
translation = "어쩌면 너무 대성공해버린 것일지도 몰랐다."

