[[dialogue]]
speaker = "unk"
original = "第４話,想いの届け方,P"
translation = "제4화, 마음을 전하는 방법, P"

[[dialogue]]
speaker = "unk"
original = "『ポラリスプロダクション』にミュージカルのオファーが舞い込んできた。"
translation = "『폴라리스 프로덕션』에 뮤지컬 제안이 들어왔다."

[[dialogue]]
speaker = "unk"
original = "同じ事務所であるトップアイドルのレミカの指導の下、藍は歌唱レッスンを受けているのだが──"
translation = "같은 소속사인 톱 아이돌 레미카의 지도 아래 아이는 가창 레슨을 받고 있었는데──"

[[dialogue]]
speaker = "藍"
original = "「はぁ、はぁ、ふぅ……ありがとう、ございました……！」"
translation = "「하아, 하아, 후우…… 감사, 했습니다……!」"

[[dialogue]]
speaker = "レミカ"
original = "「──うん。随分と声出るようになったね。ほんの数ヶ月で、すごく成長してる。伸びしろはあると思ってたけど、まさかここまでとはね」"
translation = "「──응. 제법 목소리가 나오게 됐네. 불과 몇 달 만에 엄청나게 성장했어. 잠재력은 있다고 생각했지만 설마 이 정도일 줄이야.」"

[[dialogue]]
speaker = "藍"
original = "「ありがとうごさいます。レミカ先輩の指導のおかげです。トップアイドルに直接教えてもらえるなんて、夢みたいです」"
translation = "「감사합니다. 레미카 선배님의 지도 덕분이에요. 톱 아이돌에게 직접 배울 수 있다니 꿈만 같아요.」"

[[dialogue]]
speaker = "レミカ"
original = "「同じ事務所なんだから遠慮しないでいいのに。でも、最近の藍、ちょっと変わったよね？」"
translation = "「같은 소속사인데 사양할 것 없대도. 근데 요즘 아이, 좀 변하지 않았어?」"

[[dialogue]]
speaker = "藍"
original = "「そ、そうでしょうか……？\u3000背は少し伸びたかもしれません……バストも前よりちょっと大きくなったかも……？」"
translation = "「그, 그런가요……? 키는 조금 컸을지도 모르겠네요…… 가슴도 전보다 조금 커졌을지도……?」"

[[dialogue]]
speaker = "レミカ"
original = "「まだ大きくなってるんだ！？\u3000成長期すごいなぁ……──って、スタイルの話じゃなくて」"
translation = "「아직도 크고 있는 거야!? 성장기 대단하네……── 아니, 스타일 얘기가 아니라.」"

[[dialogue]]
speaker = "レミカ"
original = "「元から可愛かったけど、今は綺麗になった気がする」"
translation = "「원래부터 귀여웠지만 지금은 예뻐진 것 같아.」"

[[dialogue]]
speaker = "藍"
original = "「き、綺麗に、ですか……！？\u3000そ、そんな……レミカ先輩の足元にも及ばないです！\u3000そう言ってもらえるのはすごく嬉しいですけど……特に心当たりは……」"
translation = "「예, 예뻐졌다고요……!? 그, 그럴 리가요…… 레미카 선배님 발끝에도 못 미쳐요! 그렇게 말씀해 주시는 건 정말 기쁘지만…… 딱히 짚이는 구석은……」"

[[dialogue]]
speaker = "レミカ"
original = "「藍さ、もしかして、恋、してない？」"
translation = "「아이, 혹시 사랑하고 있지 않아?」"

[[dialogue]]
speaker = "藍"
original = "「こ、こっ、恋ぃっ！？\u3000し、してないです！\u3000してないですよ！\u3000私、男の人、苦手なままですし……」"
translation = "「사, 사, 사랑이요!? 아, 안 하고 있어요! 안 하고 있다고요! 저, 남자분들 여전히 서투른걸요……」"

[[dialogue]]
speaker = "レミカ"
original = "「そう？\u3000当てが外れたかな？」"
translation = "「그래? 내가 짚은 게 빗나갔나?」"

[[dialogue]]
speaker = "藍"
original = "「どうして、そんな風に、おっ、思ったんですか……？」"
translation = "「어째서 그렇게 생, 생각하신 거예요……?」"

[[dialogue]]
speaker = "レミカ"
original = "「恋は、女を一番綺麗にするサプリメントだから。それにね、藍のラブソングに想いが乗った瞬間、うっすらと誰かの影が見えたの」"
translation = "「사랑은 여자를 가장 예쁘게 만드는 영양제니까. 그리고 말이야, 아이의 러브송에 진심이 담긴 순간, 살짝 누군가의 그림자가 보였어.」"

[[dialogue]]
speaker = "藍"
original = "「…………っ！」"
translation = "「…………!」"

[[dialogue]]
speaker = "レミカ"
original = "「家族でも、尊敬する人でもない……本当に好きな人を思い浮かべてないと、ああは歌えないよ」"
translation = "「가족도, 존경하는 사람도 아닌…… 정말 좋아하는 사람을 떠올리지 않으면 그렇게는 부를 수 없어.」"

[[dialogue]]
speaker = "藍"
original = "「わ、私が、恋……？\u3000恋しちゃってるんでしょうか……恋しても良いんでしょうか……？」"
translation = "「제, 제가 사랑……? 사랑하고 있는 걸까요…… 사랑해도 괜찮은 걸까요……?」"

[[dialogue]]
speaker = "レミカ"
original = "「あー、無自覚だったんだ？\u3000まあ、初恋ってそういうものかもね」"
translation = "「아~ 자각이 없었구나? 뭐, 첫사랑이란 건 그런 걸지도 모르겠네.」"

[[dialogue]]
speaker = "レミカ"
original = "「良いとか悪いとかじゃない。好きって気持ちは、しようと思ってするものじゃないし、止めようと思って止められるものでもないでしょ」"
translation = "「좋고 나쁘고의 문제가 아냐. 좋아한다는 감정은 하려고 해서 하는 것도 아니고, 멈추려고 해서 멈출 수 있는 것도 아니잖아.」"

[[dialogue]]
speaker = "レミカ"
original = "「相手も、藍に好かれてるって知ったら嬉しいんじゃないかな」"
translation = "「상대방도 아이가 좋아한다는 걸 알면 기쁘지 않을까.」"

[[dialogue]]
speaker = "藍"
original = "「そ、そうでしょうか……？」"
translation = "「그, 그럴까요……?」"

[[dialogue]]
speaker = "レミカ"
original = "「それで？\u3000誰を思い浮かべてたの？」"
translation = "「그래서? 누굴 떠올리고 있었어?」"

[[dialogue]]
speaker = "藍"
original = "「い、言えませんっ……！\u3000レミカ先輩にも、それだけは……！\u3000私なんかが好きになっちゃ、迷惑だと思いますし……」"
translation = "「마, 말 못 해요……! 레미카 선배님께도 그것만은……! 저 같은 게 좋아해 봤자 민폐라고 생각하고……」"

[[dialogue]]
speaker = "unk"
original = "２人ともお疲れさま"
translation = "둘 다 수고했어."

[[dialogue]]
speaker = "レミカ"
original = "「あ、会長」"
translation = "「아, 회장.」"

[[dialogue]]
speaker = "藍"
original = "「ぴゃっ！？\u3000か、か、会長さんっ！\u3000お疲れさまです」"
translation = "「퍄앗!? 회, 회, 회장님! 수고하셨습니다.」"

[[dialogue]]
speaker = "レミカ"
original = "「あ～、そういうことかぁ……共演をきっかけに恋仲になるなんてのは珍しい話じゃないけど……」"
translation = "「아~ 그런 거였구나…… 공연을 계기로 연인 사이가 되는 건 드문 일도 아니지만……」"

[[dialogue]]
speaker = "レミカ"
original = "「藍を初恋に目覚めさせちゃうなんて、会長ってば罪な男だね」"
translation = "「아이를 첫사랑에 눈뜨게 만들다니, 회장도 참 죄 많은 남자네.」"

[[dialogue]]
speaker = "レミカ"
original = "「ナイスタイミング、会長。ちょうどレッスン終わったところ。夜道は危ないし、藍を家まで送ってあげて」"
translation = "「나이스 타이밍이야, 회장. 마침 레슨 끝난 참이야. 밤길은 위험하니까 아이를 집까지 데려다줘.」"

[[dialogue]]
speaker = "藍"
original = "「えっ、レミカ先輩は？」"
translation = "「엣, 레미카 선배님은요?」"

[[dialogue]]
speaker = "レミカ"
original = "「私はまだやることがあるし、マネージャーに迎えに来てもらうから。会長、藍のこと、よろしくね」"
translation = "「나는 아직 할 일이 있고 매니저가 데리러 오기로 했으니까. 회장, 아이 좀 잘 부탁해.」"

[[dialogue]]
speaker = "unk"
original = "レミカに背中を押され、俺は藍を家まで送り届けることになった。"
translation = "레미카의 등 떠밀림에 나는 아이를 집까지 데려다주게 되었다."

[[dialogue]]
speaker = "藍"
original = "「レミカ先輩にいっぱい特訓してもらいました。現役トップアイドルにマンツーマンで教えてもらえるなんて、幸せな時間でしたよ」"
translation = "「레미카 선배님께 특훈을 잔뜩 받았어요. 현역 톱 아이돌에게 일대일로 배우다니 행복한 시간이었어요.」"

[[dialogue]]
speaker = "unk"
original = "レミカとどんな特訓をしてたの？"
translation = "레미카랑 어떤 특훈을 했어?"

[[dialogue]]
speaker = "藍"
original = "「声の出し方と、想いを言葉に乗せる練習です。これは台詞でも歌でも応用が利くからって」"
translation = "「목소리를 내는 법이랑 진심을 언어에 싣는 연습이에요. 이건 대사에서도 노래에서도 응용할 수 있다면서요.」"

[[dialogue]]
speaker = "unk"
original = "どうやるの？"
translation = "어떻게 하는 거야?"

[[dialogue]]
speaker = "藍"
original = "「やり方は何も難しくないんです。でも、準備と心構えが必要で──会長さん、復習に付き合ってもらえませんか？」"
translation = "「방법은 전혀 어렵지 않아요. 하지만 준비와 마음가짐이 필요해서── 회장님, 복습하는 거 좀 도와주시겠어요?」"

[[dialogue]]
speaker = "藍"
original = "「すー、はー、すー、はー……いきます」"
translation = "「습, 하, 습, 하…… 시작할게요.」"

[[dialogue]]
speaker = "藍"
original = "「相手の目を見つめて、胸の中を目の前の人のことだけでいっぱいにして──」"
translation = "「상대방의 눈을 빤히 쳐다보고 가슴 속을 눈앞의 사람 생각만으로 가득 채워서──」"

[[dialogue]]
speaker = "藍"
original = "「あなたが好き……大好きなんです……愛してます」"
translation = "「당신을 좋아해요…… 정말 좋아해요…… 사랑해요.」"

[[dialogue]]
speaker = "unk"
original = "…………っ！？"
translation = "…………!? 인공 지능이 감지한 문맥적 놀라움"

[[dialogue]]
speaker = "藍"
original = "「な、なんて……！\u3000ど、どうですか？\u3000グッと来ましたか？」"
translation = "「어, 어떤가요……? 즈, 좀 와닿으셨나요?」"

[[dialogue]]
speaker = "unk"
original = "勘違いしちゃうくらい、グッと来たよ……！"
translation = "착각할 정도로 와닿았어……!"

[[dialogue]]
speaker = "藍"
original = "「え、えへへ……上手くいきました……！\u3000会長さんへの想いをたっぷり込めましたから……レミカ先輩との特訓大成功です……！」"
translation = "「에, 에헤헤…… 성공했네요……! 회장님에 대한 마음을 듬뿍 담았으니까요…… 레미카 선배님과의 특훈 대성공이에요……!」"

[[dialogue]]
speaker = "藍"
original = "「勘違いしてくれても、いいんですけど……」"
translation = "「착각해 주셔도 괜찮지만요……」"

[[dialogue]]
speaker = "unk"
original = "……え？"
translation = "……어?"

[[dialogue]]
speaker = "藍"
original = "「な、なんでもないです♪\u3000さ、帰りましょう」"
translation = "「아, 아무것도 아니에요♪ 자, 가요.」"

[[dialogue]]
speaker = "藍"
original = "（今の私じゃ、これが精一杯……）"
translation = "(지금의 나로선 이게 최선……)"

[[dialogue]]
speaker = "藍"
original = "（でもいつか、そんな遠くない内に……演技の練習なんかじゃなく、会長さんに好きって伝えさせてくださいね）"
translation = "(하지만 언젠가, 그리 멀지 않은 미래에…… 연기 연습 같은 게 아니라 회장님께 정말 좋아한다고 전하게 해주세요.)"

