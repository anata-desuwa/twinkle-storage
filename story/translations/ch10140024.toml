[[dialogue]]
speaker = "unk"
original = "第４話,ファーストキス,P"
translation = "제4화, 퍼스트 키스, P"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「お、お邪魔しま～す……」"
translation = "「실, 실례하겠습니다~……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「わぁぁ～～。会長くんのお家、久しぶりに来ちゃったなぁ。……あっ、これ手土産です。お母さんと一緒に食べてね！」"
translation = "「와아아~~. 회장 군의 집, 오랜만에 왔네. ……앗, 이거 선물이에요. 어머니랑 같이 먹어!」"

[[dialogue]]
speaker = "unk"
original = "ちょっと高級なクッキーが入った紙袋を渡すと、会長くんは「ありがとうございます」と言って受け取ってくれた。"
translation = "조금 고급스러운 쿠키가 든 종이봉투를 건네자, 회장 군은 「고맙습니다」라고 말하며 받아 주었다."

[[dialogue]]
speaker = "unk"
original = "ちなみに母さんは出張中で数日は留守です"
translation = "참고로 엄마는 출장 중이라 며칠간 비어 있어"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「あ、あははっ。そうなんだぁ～。というかわたし、そんなにキョロキョロしてたかな……？」"
translation = "「아, 아하하. 그렇구나~. 그나저나 나, 그렇게 두리번거렸나……?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「うぐぅ、そりゃあ付き合ってる教え子の家に遊びに行くってなったら、お母さんになんて挨拶……というか、なんて名乗るべきか、悩んじゃうに決まってるよ！」"
translation = "「으구우, 그야 사귀고 있는 제자의 집에 놀러 가게 되면, 어머니께 어떻게 인사드려야 할지…… 아니, 뭐라고 자칭해야 할지, 고민되는 게 당연하잖아!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「えっ？\u3000母さんが出張で留守なのは事前に説明してた？\u3000はわわっ、わたしがお家デートに舞い上がって、聞いてなかっただけ……？」"
translation = "「엣? 엄마가 출장으로 비어 있는 건 미리 설명했었다고? 하와와, 내가 집 데이트에 들떠서 못 들었던 것뿐……?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「そ、それもそっか……お母さんの目があったら、せっかくのお家デートなのに、イチャイチャできないもんね」"
translation = "「그, 그것도 그렇네…… 어머니의 눈이 있으면, 어렵게 잡은 집 데이트인데 꽁냥거릴 수 없으니까.」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「って、何言ってるんだろうね、わたし！\u3000別にイチャイチャするのが目的でお家デートってわけでもないよねっ。あはは、あはははぁ～！」"
translation = "「아니, 무슨 말을 하는 거야, 나! 딱히 꽁냥거리는 게 목적으로 집 데이트를 하는 건 아니지. 아하하, 아하하하~!」"

[[dialogue]]
speaker = "unk"
original = "俺はいつだってもっとイチャイチャしたいよ"
translation = "나는 언제라도 더 꽁냥거리고 싶어"

[[dialogue]]
speaker = "unk"
original = "トワちゃんが嫌じゃなければ"
translation = "토와짱이 싫지 않다면"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（あわわわわわっ！？\u3000いつになく会長くんが積極的だ……！\u3000こ、これがお家デートの効果ってやつなのかなっ）"
translation = "（아와와와와앗!? 평소보다 회장 군이 적극적이야……! 이, 이게 집 데이트의 효과라는 걸까）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（でもでも！\u3000いきなりはダメだよっ！\u3000だってわたしの心の準備ができてないしっ）"
translation = "（그치만 그치만! 갑자기는 안 돼! 왜냐면 내 마음의 준비가 안 됐는걸）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「そ、そう言ってもらえるのは嬉しいけどぉ！\u3000真昼間から恋人同士がただ見つめ合ってるだけっていうのも、先生は不健全だと思うな……！」"
translation = "「그, 그렇게 말해주는 건 기쁘지만! 대낮부터 연인끼리 그저 서로 마주 보고만 있는 건, 선생님은 불건전하다고 생각해……!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「はいっ、というわけでお家デートの定番……じゃじゃ～ん、映画をレンタルしてきたよ！」"
translation = "「자, 그런 의미에서 집 데이트의 정석…… 짜잔, 영화를 빌려 왔어!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「この間のデートの恋愛映画が良かったから、友達にオススメを聞いて借りてきちゃった」"
translation = "「저번 데이트 때 본 연애 영화가 좋았어서, 친구한테 추천을 물어보고 빌려왔지.」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「うんっ。映画自体も良かったし、観終わった後で会長くんと作品の感想を語りあえたのが、すっごく楽しかったんだぁ。だから今日もできたらいいなって」"
translation = "「응. 영화 자체도 좋았고, 다 본 뒤에 회장 군이랑 작품 감상을 나눴던 게 정말 즐거웠거든. 그래서 오늘도 할 수 있으면 좋겠다고 생각해서.」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ほんと！？\u3000会長くんも同じこと思っててくれたなら、嬉しいよぉ。じゃあ早速、再生機にセットして、２人で鑑賞会、しちゃおっか♪」"
translation = "「정말!? 회장 군도 같은 생각을 해줬다면 기뻐. 그럼 바로 재생기에 세팅하고, 둘이서 감상회, 시작할까♪」"

[[dialogue]]
speaker = "unk"
original = "そしてリビングで映画を観始めて、３０分ほど経過して──"
translation = "그리고 거실에서 영화를 보기 시작하고 30분 정도 경과하여──"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（よ、よ～しっ。前回の映画館では周りに人もいたし、あの時はまだ初手繋ぎも済ませてなかったけど、今日のわたしはもうあの頃のわたしとは違うよ！）"
translation = "（조, 좋아! 지난번 영화관에서는 주변에 사람도 있었고, 그때는 아직 첫 손잡기도 안 끝냈었지만, 오늘의 나는 이제 그때의 나와는 달라!）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（今日は何と言っても２人きり！\u3000それに、この間のデートで手も繋いじゃったわけで、もう何も怖くないよ……！）"
translation = "（오늘은 무엇보다 둘뿐! 게다가 저번 데이트에서 손도 잡았으니, 이제 아무것도 무섭지 않아……!）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（映画も前回ほど過激じゃないけど、いい感じに甘めのラブストーリーで雰囲気もいい感じだし……）"
translation = "（영화도 지난번만큼 과격하진 않지만, 적당히 달달한 러브 스토리라 분위기도 좋은 느낌이고……）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（予習してきたブログによると、リラックスしてきてかつ、良い雰囲気になってきたら、こっそり彼氏に肩を預けたり、くっついちゃってもＯＫって書いてあったけど……本当かな？）"
translation = "（예습해 온 블로그에 따르면, 긴장이 풀리고 분위기가 좋아지면 슬쩍 남자친구에게 어깨를 기대거나 달라붙어도 OK라고 적혀 있었는데…… 정말일까?）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（………………チラッ）"
translation = "（………………힐끗）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（あ、あうぅぅ……会長くんと、目が合っちゃったぁ）"
translation = "（아, 아우우…… 회장 군이랑 눈이 마주쳐 버렸어）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（も、もしかして、わたしが考えてること、バレちゃったかな！？\u3000いやいや、もしかしてもしかすると、会長くんもわたしと同じこと考えてくれてたり……！？）"
translation = "（호, 혹시 내가 생각하는 거 들켰나!? 아니아니, 어쩌면 어쩌면, 회장 군도 나랑 같은 생각을 하고 있다거나……!?）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（あっ……会長くんの手、するするって伸びてきて……はぅぅぅっ）"
translation = "（앗…… 회장 군의 손이 스르륵 뻗어와서…… 하으으으）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（手、握られちゃったぁ……<emoji=heart04>\u3000会長くん、顔は画面の方を向いたままなのに、顔はちょっと赤くなってて、わたしのことをすごく意識してるのがわかる……）"
translation = "（손, 잡혀 버렸다……<emoji=heart04> 회장 군, 얼굴은 화면 쪽을 향한 채인데도 얼굴은 조금 빨개져서, 나를 굉장히 의식하고 있다는 게 느껴져……）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「えへ、えへへへぇぇ<emoji=heart04>」"
translation = "「에헤, 에헤헤헤에<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "（頑張って良かった。トワちゃん嬉しそう）"
translation = "（힘내길 잘했다. 토와짱 기뻐 보여）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（ど、どうしようっ。顔の頬がゆるゆるになっちゃうの、止められないっ）"
translation = "（어, 어쩌지. 입꼬리가 실룩실룩 올라가는 걸 멈출 수가 없어）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（嬉しいけど、ドキドキが止まらなくて……手から心臓の音、会長くんに聞こえちゃってないよね！？）"
translation = "（기쁘지만 두근거림이 멈추질 않아서…… 손에서 심장 소리, 회장 군에게 들리고 있는 거 아니겠지!?）"

[[dialogue]]
speaker = "unk"
original = "（それなら、今度は……）"
translation = "（그렇다면, 이번에는……）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（はうわぁっ！？\u3000手の握り方が、今度は恋人握り……！\u3000指と指の隙間に、相手の指がぴったりとくっついちゃう、恋人同士にしか許されない握り方になっちゃうっ）"
translation = "（하우와앗!? 손을 잡는 방식이 이번엔 깍지 끼기……! 손가락과 손가락 사이로 상대의 손가락이 딱 달라붙는, 연인끼리만 허락되는 잡기 방식이 됐어）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（あぁぁっ。会長くん、やっぱり男の子なんだなぁ……手、おっきくて、ドキドキするのに、なぜか安心しちゃうよぉ……）"
translation = "（아아아. 회장 군, 역시 남자구나…… 손, 커서 두근거리는데 왠지 안심이 돼……）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（そう言えばわたし、この場所で会長くんに赤ちゃん抱っこ、されちゃったんだよね……）"
translation = "（그러고 보니 나, 이 장소에서 회장 군에게 공주님 안기, 당했었지……）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（恋人になる前に、わたし、あんなに恥ずかしいところ見せちゃってたんだ……）"
translation = "（연인이 되기 전에 나, 그렇게 부끄러운 모습을 보여줬었구나……）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（それなのに会長くんは、面倒臭がったり、ドン引きしたりせずに、真剣にわたしの話を聞いてくれて……）"
translation = "（그런데도 회장 군은 귀찮아하거나 정떨어져 하지 않고, 진지하게 내 이야기를 들어줘서……）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（うん……やっぱりわたし、会長くんのこと、すごく好きだなぁ……）"
translation = "（응…… 역시 나, 회장 군을 정말 좋아해……）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（ドキドキして、顔も熱くて、いっぱいいっぱいだけど……今ならもう少しだけ、勇気を出せそうな気がする）"
translation = "（두근거리고 얼굴도 뜨거워서 정신없지만…… 지금이라면 조금만 더 용기를 낼 수 있을 것 같아）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（さりげな～く……は、できないかもしれないけど……）"
translation = "（자연스럽게~……는 못 할지도 모르지만……）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（会長くんが握ってくれてる手を引き寄せて……すすすっと）"
translation = "（회장 군이 잡아주고 있는 손을 끌어당겨서…… 스스슥）"

[[dialogue]]
speaker = "unk"
original = "ト、トワちゃん……？"
translation = "토, 토와짱……?"

[[dialogue]]
speaker = "unk"
original = "年下なのに、いつもわたしをリードしてくれる機会の多い会長くんの、少し焦ったような、緊張したような声が、愛おしかった。"
translation = "연하인데도 항상 나를 리드해 주는 기회가 많은 회장 군의, 조금 당황한 듯하고 긴장한 듯한 목소리가 사랑스러웠다."

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「こ、恋人同士って、恋愛映画を観ながら、ピッタリくっついたり、するらしいよ……？」"
translation = "「여, 연인끼리는 연애 영화를 보면서 딱 달라붙거나 한다나 봐……?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「もし嫌じゃなかったら、わたしたちもしてみたいなぁ……なんて」"
translation = "「혹시 싫지 않다면, 우리도 해보고 싶다…… 싶어서」"

[[dialogue]]
speaker = "unk"
original = "そんなの、嫌なわけないよ"
translation = "그런 거 싫을 리가 없잖아"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（あっ、会長くんの腕が、わたしの腕にぴたっとくっついて……服越しにだけど、会長くんの体温まで感じちゃう）"
translation = "（앗, 회장 군의 팔이 내 팔에 딱 달라붙어서…… 옷 너머지만 회장 군의 체온까지 느껴져）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（会長くんの顔、すごく近くて、吸い込まれそう……）"
translation = "（회장 군의 얼굴, 정말 가까워서 빨려 들어갈 것 같아……）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（っていうか！\u3000切なそうな顔して、すっごく近い所まで顔が迫って来てるよぉ……！？）"
translation = "（그보다! 애틋한 표정을 짓고는 엄청 가까운 곳까지 얼굴이 다가오고 있어……!?）"

[[dialogue]]
speaker = "unk"
original = "トワちゃん……"
translation = "토와짱……"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（あ、あわわ。これ、キスだ。しちゃうんだ……わたし。年下の恋人との、ファーストキス……）"
translation = "（아, 아와와. 이거 키스다. 하는구나…… 나. 연하의 연인과 하는 퍼스트 키스……）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「んっ、会長くん……」"
translation = "「응, 회장 군……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「……ちゅっ」"
translation = "「……쪽」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「あっ……えへへぇ。しちゃったね、キス」"
translation = "「앗…… 에헤헤. 해버렸네, 키스」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「会長くんも、初めてだったの……？\u3000うん、そう。わたしも初めて……」"
translation = "「회장 군도 처음이었어……? 응, 그래. 나도 처음이야……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「正直緊張しすぎて、何が何だかわからなかったけど……で、でもね？」"
translation = "「솔직히 너무 긴장해서 뭐가 뭔지 몰랐지만…… 그, 그래도 말이야?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「キミに……恋人にしか触らせない大切なところを触ってもらえて……なんだかとっても、気持ち良かった、かも<emoji=heart04>」"
translation = "「너에게…… 연인에게밖에 허락하지 않는 소중한 곳을 닿게 해서…… 왠지 무척 기분 좋았을지도<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そんなことを言ったら、次の瞬間、会長くんにもう１回唇を奪われてしまうのでした。"
translation = "그런 말을 하자, 다음 순간 회장 군에게 한 번 더 입술을 빼앗기고 마는 것이었다."

