[[dialogue]]
speaker = "unk"
original = "第７話,梨緒とベアトリス,B"
translation = "제7화, 리오와 베아트리스, B"

[[dialogue]]
speaker = "梨緒"
original = "「いや、あのだな……！\u3000私は別に、泣いてなんか……っ！」"
translation = "「아니, 저기 말이다……! 나는 딱히, 울고 있었던 게……!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「泣いてもいいんじゃないかな？\u3000星騎士が泣いちゃいけない理由なんて、ないと思う」"
translation = "「울어도 괜찮지 않을까? 성기사가 울면 안 된다는 이유 같은 건, 없다고 생각해.」"

[[dialogue]]
speaker = "unk"
original = "ベアトリスはそう言って、梨緒の顔をハンカチでぬぐった。"
translation = "베아트리스는 그렇게 말하며, 리오의 얼굴을 손수건으로 닦아주었다."

[[dialogue]]
speaker = "梨緒"
original = "「あ……ありがとう、ベアト」"
translation = "「아…… 고마워, 베아트.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「な、仲間……だから。これくらい当然だよ」"
translation = "「도, 동료……니까. 이 정도는 당연해.」"

[[dialogue]]
speaker = "unk"
original = "梨緒の顔を何度も優しくハンカチでぬぐうベアトリス。"
translation = "리오의 얼굴을 몇 번이고 상냥하게 손수건으로 닦아주는 베아트리스."

[[dialogue]]
speaker = "unk"
original = "その優しさと、友人に思い切り泣き顔を見られた気恥ずかしさも相まって、梨緒の涙はすっかり引っ込んでしまっていた。"
translation = "그 상냥함과, 친구에게 마음껏 우는 얼굴을 보였다는 부끄러움이 뒤섞여, 리오의 눈물은 쏙 들어가 버리고 말았다."

[[dialogue]]
speaker = "梨緒"
original = "「ありがとう、本当に……。もう大丈夫だ」"
translation = "「고마워, 정말로……. 이제 괜찮다.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「うん。ならよかった」"
translation = "「응. 그렇다면 다행이야.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「その……梨緒ちゃん。梨緒ちゃんが倒れたのは、あのジグって人のせいなんだよね？」"
translation = "「저기…… 리오 짱. 리오 짱이 쓰러진 건, 그 지그라는 사람 때문인 거지?」"

[[dialogue]]
speaker = "梨緒"
original = "「……ああ、そうだ」"
translation = "「……아아, 그렇다.」"

[[dialogue]]
speaker = "unk"
original = "本当は認めたくないとばかりに、梨緒が重々しく頷く。"
translation = "정말로 인정하고 싶지 않다는 듯이, 리오가 무겁게 고개를 끄덕인다."

[[dialogue]]
speaker = "ベアトリス"
original = "「だったらさ……あの人とはもう会わない方がいいんじゃないかな？」"
translation = "「그렇다면 말이야…… 그 사람과는 이제 만나지 않는 게 좋지 않을까?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「あの人が星徒会長で、梨緒ちゃんは副会長だったって言ってたよね」"
translation = "「그 사람이 성도회장이고, 리오 짱은 부회장이었다고 말했었지.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「梨緒ちゃんの仲間だったんでしょ？\u3000なら梨緒ちゃんが戦う必要はないと思う」"
translation = "「리오 짱의 동료였던 거잖아? 그렇다면 리오 짱이 싸울 필요는 없다고 생각해.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「それにあの人は強い。悔しいけど、私や梨緒ちゃんよりも」"
translation = "「게다가 그 사람은 강해. 분하지만, 나나 리오 짱보다도.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「新星星徒会の人たちがいるし、流星の会長さんもそのうち帰ってくるらしいし、梨緒ちゃんが倒れるくらいなら誰かに任せても──」"
translation = "「신성 성도회 사람들도 있고, 유성의 회장님도 조만간 돌아온다고 하니까, 리오 짱이 쓰러질 정도라면 누군가에게 맡겨도──」"

[[dialogue]]
speaker = "梨緒"
original = "「いや──それはできない」"
translation = "「아니── 그럴 수는 없다.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「どうして……？」"
translation = "「어째서……?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「詳しいことまではわからないけど、なんとなくだけど……きっと梨緒ちゃんはこれまで、たくさん頑張ってきたんたと思う」"
translation = "「자세한 것까지는 모르겠지만, 왠지 모르게…… 분명 리오 짱은 지금까지, 많이 노력해왔을 거라고 생각해.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「すっごくすっごく頑張って、たくさんたくさん傷ついてきた。だから梨緒ちゃんがこれ以上傷つくのを見てられないよ」"
translation = "「정말 정말 노력해서, 아주 아주 많이 상처 입어왔어. 그러니까 리오 짱이 여기서 더 상처 입는 걸 보고 싶지 않아.」"

[[dialogue]]
speaker = "梨緒"
original = "「ありがとう、ベアト。君は優しいな」"
translation = "「고마워, 베아트. 너는 상냥하구나.」"

[[dialogue]]
speaker = "梨緒"
original = "「だけど私は、ジグのことを人任せにはできない」"
translation = "「하지만 나는, 지그의 일을 남에게 맡길 수는 없다.」"

[[dialogue]]
speaker = "梨緒"
original = "「それは……諦めることになるから」"
translation = "「그건…… 포기하는 게 되니까.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「梨緒ちゃん……」"
translation = "「리오 짱……」"

[[dialogue]]
speaker = "梨緒"
original = "「うまく言えないが、それじゃダメなんだ……」"
translation = "「잘 설명할 수는 없지만, 그래선 안 되는 거다……」"

[[dialogue]]
speaker = "梨緒"
original = "「私はジグに何度も負けた。何度も何度も挑んで、その度に負けた。一度も勝ったことがない。それでも──」"
translation = "「나는 지그에게 몇 번이고 졌다. 몇 번이고 몇 번이고 도전해서, 그때마다 졌어. 단 한 번도 이긴 적이 없어. 그래도──」"

[[dialogue]]
speaker = "梨緒"
original = "「何度負けても、いくら傷ついても、諦めたら私が終わってしまう。……そんな気がするんだ」"
translation = "「몇 번을 져도, 아무리 상처 입어도, 포기하면 내가 끝나버려. ……그런 기분이 들어.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "手探りで絞り出した梨緒の言葉に、目を丸くするベアトリス。"
translation = "더듬더듬 쥐어짜 낸 리오의 말에, 눈을 동그랗게 뜨는 베아트리스."

[[dialogue]]
speaker = "ベアトリス"
original = "「……梨緒ちゃんはかっこいいね」"
translation = "「……리오 짱은 멋지네.」"

[[dialogue]]
speaker = "梨緒"
original = "「かっこいいっ？\u3000私がっ？」"
translation = "「멋지다니? 내가?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「自分がはっきりしてるというか……私とは全然違って、強いなって」"
translation = "「자신이 뚜렷하다고 해야 하나…… 나하고는 전혀 다르게, 강하구나 싶어서.」"

[[dialogue]]
speaker = "梨緒"
original = "「はっきりしてるだろうか……？\u3000さっきもうまく言えなかったし……それに私は強くなんて……」"
translation = "「뚜렷한 걸까……? 방금도 제대로 말하지 못했고…… 게다가 나는 강하지도……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「私はなんていうかこう……行き当たりばったりというか、流されてるというか……そんな感じで」"
translation = "「나는 뭐랄까…… 되는 대로 산다고 해야 하나, 휩쓸린다고 해야 하나…… 그런 느낌이라서.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「だから、自分を持ってる梨緒ちゃんがかっこよく見えるんだ」"
translation = "「그래서, 자기 주관이 있는 리오 짱이 멋져 보여.」"

[[dialogue]]
speaker = "梨緒"
original = "「…………君がそう言ってくれるなら、素直に誉め言葉として受け取ろう」"
translation = "「…………네가 그렇게 말해준다면, 솔직하게 칭찬으로 받아들이마.」"

[[dialogue]]
speaker = "梨緒"
original = "「ありがとう、ベアト」"
translation = "「고마워, 베아트.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「えへへ」"
translation = "「에헤헤.」"

[[dialogue]]
speaker = "unk"
original = "バツの悪そうな梨緒に、ベアトリスが照れ笑いを見せる。"
translation = "쑥스러운 듯한 리오에게, 베아트리스가 수줍은 미소를 보여준다."

[[dialogue]]
speaker = "ベアトリス"
original = "「梨緒ちゃんが勝つまで諦めないって言うなら、私もお手伝いするよ。そういうちょっと我がままなところ、学ばないといけないなって思ったから」"
translation = "「리오 짱이 이길 때까지 포기하지 않겠다면, 나도 도와줄게. 그런 조금 고집스러운 면, 배워야겠다고 생각했으니까.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「だから……１人で泣かないで欲しいな」"
translation = "「그러니까…… 혼자서 울지 않았으면 좋겠어.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「泣くならちゃんと、私の見えるところで泣いて。そうじゃないと、必要な時に助けられなくなっちゃう」"
translation = "「울 거라면 제대로, 내가 보이는 곳에서 울어줘. 그러지 않으면, 필요할 때 도와줄 수 없게 되니까.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「まだ結成して日は浅いかもしれないけど、私たちは同じ、選挙管理委員会の仲間でしょ？」"
translation = "「아직 결성한 지 얼마 안 됐을지도 모르지만, 우리는 같은 선거관리위원회의 동료잖아?」"

[[dialogue]]
speaker = "梨緒"
original = "「ああ、よろしく──」"
translation = "「아아, 잘 부탁──」"

[[dialogue]]
speaker = "梨緒"
original = "「い、いや、だから！\u3000私は別に泣いてないっ」"
translation = "「아, 아니, 그러니까! 나는 딱히 울지 않았어!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「え……梨緒ちゃん、そこから？\u3000流石にそれはちょっと無理があるんじゃ……」"
translation = "「에…… 리오 짱, 거기서부터? 아무리 그래도 그건 좀 무리가 있지 않아……?」"

[[dialogue]]
speaker = "梨緒"
original = "「だいたい、友達が泣いてたら、見て見ぬふりをするのも優しさじゃないのか！？」"
translation = "「애초에, 친구가 울고 있으면 못 본 척해주는 것도 상냥함 아닌가!?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「うわ、開き直っちゃった……！」"
translation = "「우와, 적반하장이다……!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「いいよ、わかったよ。今度梨緒ちゃんが泣いてるところ見かけたら、『梨緒ちゃんが泣くわけない！』って言って勝手に顔をハンカチでゴシゴシしちゃうから」"
translation = "「알았어, 알았다고. 다음에 리오 짱이 울고 있는 걸 발견하면, 『리오 짱이 울 리가 없어!』라고 말하면서 멋대로 얼굴을 손수건으로 빡빡 닦아버릴 테니까.」"

[[dialogue]]
speaker = "梨緒"
original = "「いや、それはやめてくれ……」"
translation = "「아니, 그건 하지 말아줘……」"

[[dialogue]]
speaker = "梨緒"
original = "「というか、コホンッ、色々とすまない。話を聞いてもらったお陰で、気持ちの整理はついた」"
translation = "「그보다, 크흠, 여러모로 미안하다. 이야기를 들어준 덕분에 마음 정리는 됐어.」"

[[dialogue]]
speaker = "梨緒"
original = "「ひとまず、できる範囲で詳しい話をしておきたい。ここに緋宮クロトと、選管のメンバーを集めてもらえないだろうか？」"
translation = "「우선은, 가능한 범위 내에서 자세한 이야기를 해두고 싶다. 이곳에 히노미야 쿠로토와, 선관 멤버들을 모아줄 수 있겠나?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「うん、了解♪\u3000人は私が呼んでくるから、梨緒ちゃんはまだ大人しくしててね」"
translation = "「응, 알았어♪ 사람은 내가 불러올 테니까, 리오 짱은 아직 얌전히 있어야 해?」"

