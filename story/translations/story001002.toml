[[dialogue]]
speaker = "unk"
original = "ここが『死神』の目撃情報があったという遊園地。"
translation = "이곳이 『사신』의 목격 정보가 있었다는 유원지."

[[dialogue]]
speaker = "unk"
original = "星徒会のみんなには他の目撃場所を当たってもらっている。無事に堕天使を討伐できればいいのだが。"
translation = "성도회 멤버들에게는 다른 목격 장소를 찾아봐 달라고 부탁했다. 무사히 타락천사를 토벌할 수 있으면 좋으련만."

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「ん？」"
translation = "「음?」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「あら」"
translation = "「어머」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「よお、会長じゃねえか！\u3000こんなところに１人で何の用だ？\u3000いや用なんていいからオレと勝負しようぜ！」"
translation = "「여어, 회장 아니냐! 이런 곳에 혼자서 무슨 용무냐? 아니 용무 따윈 됐으니까 나랑 승부하자고!」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「こんなところでお会いしたのも何かの縁──私と一緒に死んでくれませんか？」"
translation = "「이런 곳에서 뵙는 것도 무슨 인연── 저와 함께 죽어주시지 않겠어요?」"

[[dialogue]]
speaker = "unk"
original = "再会した途端、個性的な反応をする２人。"
translation = "재회하자마자 개성 넘치는 반응을 보이는 두 사람."

[[dialogue]]
speaker = "unk"
original = "彼女たちとの出会いは──"
translation = "그녀들과의 만남은──"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「女神様、どうか加護を……」"
translation = "「여신님, 부디 가호를……」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「ふぅ。今日もお迎えは来そうにありませんね」"
translation = "「후우. 오늘도 데리러 올 사람은 없을 것 같네요.」"

[[dialogue]]
speaker = "unk"
original = "（あ……ＤＩＳＣが落ちてる）"
translation = "(아…… DISC가 떨어져 있네)"

[[dialogue]]
speaker = "unk"
original = "それから彼女を探して……"
translation = "그 후 그녀를 찾아서……"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「あら？\u3000あなたは星徒会の……どうかされましたか？\u3000え、ＤＩＳＣ……？」"
translation = "「어머? 당신은 성도회의…… 무슨 일이신가요? 에, DISC……?」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「ああ、本当です……！\u3000まさかＤＩＳＣを落としてしまうなんて、このままでは大変不便な思いをするところでした」"
translation = "「아아, 정말이네요……! 설마 DISC를 떨어뜨리다니, 이대로라면 무척 불편한 상황이었을 거예요.」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「ありがとうございます。多忙な中、わざわざ私を探して届けてくださったのですね。なんとお優しいお方……」"
translation = "「감사합니다. 바쁘신 와중에 일부러 저를 찾아 전해주러 오셨군요. 어찌 이리 다정한 분이신지……」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「ぜひ──」"
translation = "「부디──」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「私と一緒に死んでいただけませんか？」"
translation = "「저와 함께 죽어주시지 않겠어요?」"

[[dialogue]]
speaker = "unk"
original = "！！？？"
translation = "!!??"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「おーい、グロリアー……って、またアレやってんのかよ！」"
translation = "「어─이, 글로리아─…… 어라, 또 저러고 있는 거냐!」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「わりぃな。本人はいたって真面目なんだが……いろいろあるんだ。気にしないでやってくれ」"
translation = "「미안하다. 본인은 아주 진지하거든…… 여러 가지 사정이 있어. 신경 쓰지 말아줘.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「コラ、グロリア。死んでくれっつうのはオレだけにしとけって言ってんだろ」"
translation = "「얘, 글로리아. 죽어달라는 소리는 나한테만 하라고 했잖아.」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「フランさん、私を気遣ってくれるのですね。……やっぱり一緒に死んでもらえませんか？」"
translation = "「프랑 씨, 저를 신경 써주시는 거군요. ……역시 같이 죽어주시지 않겠어요?」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「誰が死ぬかァ！」"
translation = "「누가 죽을까 보냐!」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「ん？\u3000あんた星徒会長じゃねえか。よしオレと御前試合しようぜ！」"
translation = "「응? 너 성도회장 아니냐. 좋아, 나랑 어전 시합 하자고!」"

[[dialogue]]
speaker = "unk"
original = "いきなり！？"
translation = "갑자기!?"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「フランさん、星徒会長になりたかったのですね。知りませんでした」"
translation = "「프랑 씨, 성도회장이 되고 싶었군요. 몰랐어요.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「いや全然」"
translation = "「아니 전혀.」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「おや。でしたらどうして？」"
translation = "「어라. 그렇다면 어째서죠?」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「決まってんだろ。星徒会長といやあ、その学園の最強だ。戦士たる者、強いやつと戦いたいじゃねえか！」"
translation = "「당연하잖아. 성도회장이라 하면 그 학원의 최강이다. 전사라면 강한 녀석과 싸워보고 싶은 법이지!」"

[[dialogue]]
speaker = "unk"
original = "悪いけど御前試合は簡単にはできない"
translation = "미안하지만 어전 시합은 쉽게 할 수 없어"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「……そうか。まぁいいぜ」"
translation = "「……그러냐. 뭐 좋다.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「なんせ会長は最強だからな。オレがもっと強くなって、あんたが戦うにふさわしい相手と認められるようになったら、その時は御前試合を受けてくれ」"
translation = "「어쨌든 회장은 최강이니까 말이야. 내가 더 강해져서 네가 싸울 만한 상대라고 인정하게 되면, 그때는 어전 시합을 받아달라고.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「オレは、フラン・アーテリアル。ちなみに部活は応援団だ」"
translation = "「나는 프랑 아테리얼. 참고로 동아리는 응원단이다.」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「改めまして、グロリア・アンビュラスと申します。以後お見知りおきを、優しい会長さん」"
translation = "「다시 인사드려요, 글로리아 앰뷸러스라고 합니다. 앞으로 잘 부탁드려요, 다정한 회장님.」"

[[dialogue]]
speaker = "unk"
original = "２人はどうして遊園地に？"
translation = "두 사람은 어째서 유원지에?"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「死神と戦うためさ。この遊園地には出るんだろ？\u3000大鎌持ってあの世に連れてくやつを吟味してる死神がよ」"
translation = "「사신과 싸우기 위해서지. 이 유원지에는 나온다며? 대낫을 들고 저세상으로 데려갈 놈을 고르고 있는 사신이 말이야.」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「私も同じく死神様とお会いするために……。死神様ならきっと私を連れていってくださると思いますから」"
translation = "「저도 마찬가지로 사신님을 뵙기 위해……. 사신님이라면 분명 저를 데려가 주실 거라고 생각하니까요.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「グロリアには悪いがオレが勝つぜ。オレは強いからな」"
translation = "「글로리아에겐 미안하지만 내가 이길 거다. 난 강하니까 말이야.」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「それは困ります……」"
translation = "「그건 곤란해요……」"

[[dialogue]]
speaker = "unk"
original = "実は『死神』のことだけど……"
translation = "사실 『사신』에 대한 건데……"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「ふーん、会長も死神を探してんのか。……本当は堕天使？」"
translation = "「흐음, 회장도 사신을 찾고 있는 거냐. ……사실은 타락천사?」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「堕天使になってるのは《試練》のパテル様か……ハッ、守護天使様に腕試しできるたぁちょうどいいじゃねえか！」"
translation = "「타락천사가 되어 있는 건 《시련》의 파텔 님인가…… 핫, 수호천사님께 실력을 겨뤄볼 수 있다니 딱 좋지 않냐!」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「死神様ではなかったのですね……」"
translation = "「사신님이 아니었군요……」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「……でも《試練》のパテル様なら実質死神では？\u3000お迎えに来てくださる？」"
translation = "「……하지만 《시련》의 파텔 님이라면 실질적으로 사신 아닌가요? 데리러 와주실까요?」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「気を取り直すの早いな」"
translation = "「기운 차리는 게 빠르네.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「よし、それじゃオレたちも一緒に探すぜ。オレと会長、どっちが死神を倒すか勝負だ！\u3000オレが勝ったら御前試合を受けてもらおうじゃねえか！」"
translation = "「좋아, 그럼 우리도 같이 찾자고. 나랑 회장, 누가 먼저 사신을 쓰러뜨릴지 승부다! 내가 이기면 어전 시합을 받아주기로 하자고!」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「いつもながらフランさんは勝負事がお好きですねぇ」"
translation = "「언제나 그렇듯 프랑 씨는 내기를 좋아하시네요.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「おう。オレの家は代々天界の戦士の家系でな、生きることは戦いだって親父から教わってきたんだ」"
translation = "「오우. 우리 집안은 대대로 천계 전사 가문이라서 말이야, 산다는 건 싸우는 것이라고 아버지께 배워왔거든.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「つまり戦うことは生きるってことだろ？\u3000だからオレは何が相手だって戦うぜ！」"
translation = "「즉 싸우는 게 곧 사는 거 아니겠냐? 그러니까 난 상대가 누구든 싸울 거야!」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「逆になっている気がしますが……でも私はフランさんのそういうところ好きですよ」"
translation = "「거꾸로 된 느낌이 듭니다만…… 그래도 전 프랑 씨의 그런 점이 좋아요.」"

[[dialogue]]
speaker = "unk"
original = "動機はともかく、プリマステラである２人の戦力は心強い。"
translation = "동기는 어쨌든, 프리마스텔라인 두 사람의 전력은 든든하다."

[[dialogue]]
speaker = "unk"
original = "こうして、彼女たちと一緒に遊園地を回ることになったのだった。"
translation = "이렇게 해서 그녀들과 함께 유원지를 돌게 되었다."

[[dialogue]]
speaker = "？？？"
original = "「……」"
translation = "「……」"

