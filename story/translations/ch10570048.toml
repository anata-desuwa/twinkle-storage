[[dialogue]]
speaker = "トリシャ"
original = "「会長さん……に、逃げてください……私が私でいられるうちに……」"
translation = "「회장님…… 도, 도망치세요…… 제가 제정신일 때……」"

[[dialogue]]
speaker = "クロト"
original = "「トリシャさん！？\u3000いったいどうしたんですか？」"
translation = "「트리샤 씨!? 대체 무슨 일이에요?」"

[[dialogue]]
speaker = "トリシャ"
original = "「お札……私のお札が……剥がれてしまいまして……」"
translation = "「부적…… 제 부적이…… 떨어져 버려서……」"

[[dialogue]]
speaker = "unk"
original = "よく見ると、トリシャさんのおでこに貼られていたお札がない。"
translation = "자세히 보니, 트리샤 씨의 이마에 붙어 있던 부적이 없다."

[[dialogue]]
speaker = "unk"
original = "確か映画の設定では、額に貼られたお札を剥がすと動けなくなるという話だったが……。"
translation = "분명 영화 설정으로는, 이마에 붙은 부적을 떼면 움직일 수 없게 된다는 이야기였던 것 같은데……."

[[dialogue]]
speaker = "トリシャ"
original = "「お札がないと……私……理性を保てなくなってしまいそうで……うううう……」"
translation = "「부적이 없으면…… 저…… 이성을 유지할 수 없게 될 것 같아서…… 으으으으……」"

[[dialogue]]
speaker = "クロト"
original = "「もしかして、ゾンビ化してしまうんですか？\u3000いくらなんでも人工戦闘服にそんな物騒な機能があるはず……いや、あの人なら何をしてもおかしくないけども」"
translation = "「설마, 좀비가 되어버리는 건가요? 아무리 그래도 인공 전투복에 그런 위험한 기능이 있을 리가…… 아니, 그 사람이라면 무슨 짓을 해도 이상하지 않지만」"

[[dialogue]]
speaker = "トリシャ"
original = "「ゾンビ化では……ありません……ですが、頭がおかしくなりそうなくらい、その……会長さんのこと、食べてしまいたくなるんです……」"
translation = "「좀비화는…… 아닙니다…… 하지만, 머리가 어떻게 되어버릴 정도로, 그…… 회장님을, 먹어버리고 싶어져요……」"

[[dialogue]]
speaker = "クロト"
original = "「それってつまりゾンビでは？」"
translation = "「그거 결국 좀비 아닌가요?」"

[[dialogue]]
speaker = "トリシャ"
original = "「ち、違うんです、食べると言っても、ごはんとしてではなく……」"
translation = "「아, 아니에요, 먹는다고 해도, 밥으로서가 아니라……」"

[[dialogue]]
speaker = "トリシャ"
original = "「性的に、です<emoji=heart04>\u3000会長さんのこと、好きになりすぎて、押し倒して、エッチなことしたくてしたくてたまらないんですっ……！」"
translation = "「성적으로, 예요<emoji=heart04> 회장님이 너무 좋아져서, 밀어 넘어뜨리고, 야한 짓을 하고 싶어서 견딜 수가 없단 말이에요……!」"

[[dialogue]]
speaker = "トリシャ"
original = "「いいですよね、食べても。恋人ですし、めちゃくちゃにしてもいいですよね。もう我慢できません、食べちゃいます<emoji=heart04>」"
translation = "「괜찮죠, 먹어도. 연인이니까, 엉망진창으로 만들어도 괜찮죠. 이제 참을 수 없어요, 먹어버릴래요<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「うわっ、ちょっと待ってください、トリシャさんっ！」"
translation = "「우와, 자, 잠깐 기다려 주세요, 트리샤 씨!」"

[[dialogue]]
speaker = "トリシャ"
original = "「会長さんのおち○ちん……もうすっかり勃起しているのですね……<emoji=heart04>」"
translation = "「회장님의 자지…… 벌써 완전히 발기해 버렸네요……<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「もしかして、こ、興奮しているのですか？\u3000星力で見えなくしているとは言え、屋外の風通しのいい場所で……互いに性器をむき出しにしているのですから……」"
translation = "「혹시, 흐, 흥분하신 건가요? 성력으로 보이지 않게 하고 있다고는 해도, 야외의 바람이 잘 통하는 곳에서…… 서로 성기를 노출하고 있으니까요……」"

[[dialogue]]
speaker = "unk"
original = "幽霊ゾンビをモデルに作られたトリシャさんのチーパオフォームには、周囲の人から自分たちの姿を隠す能力を備えているらしい。"
translation = "유령 좀비를 모델로 만들어진 트리샤 씨의 치파오 폼에는, 주위 사람들로부터 자신들의 모습을 숨기는 능력을 갖추고 있는 모양이다."

[[dialogue]]
speaker = "トリシャ"
original = "「以前にも……野外で交わったことがありますが……あれは結界の中でしたから、人が立ち入ることもありませんでしたし……」"
translation = "「이전에도…… 야외에서 섞인 적이 있습니다만…… 그때는 결계 안이었으니까, 사람이 들어올 일도 없었고……」"

[[dialogue]]
speaker = "トリシャ"
original = "「でも、今は……すぐ近くを人が行き交う危険な場所……なのに、淫らなまぐわいをしてしまうのですね……<emoji=heart04>」"
translation = "「하지만, 지금은…… 바로 근처를 사람이 오가는 위험한 장소…… 그런데도, 음란한 성교를 해버리는 거군요……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「トリシャさん、おま○こ濡れてきてますよ」"
translation = "「트리샤 씨, 보지 젖어오고 있다고요」"

[[dialogue]]
speaker = "トリシャ"
original = "「こ、これはっ……すみません、淫猥な想像をしてしまいました……お札がないせいで、完全に脳が発情しているようです……」"
translation = "「이, 이건…… 죄송합니다, 음란한 상상을 해버렸습니다…… 부적이 없는 탓에, 완전히 뇌가 발정해버린 것 같아요……」"

[[dialogue]]
speaker = "トリシャ"
original = "「ただでさえ幾度となくあなたに抱かれて、女の悦びを肉体に教え込まれているのですから……快楽を期待してしまうのです<emoji=heart04>」"
translation = "「안 그래도 몇 번이고 당신에게 안겨서, 여자의 기쁨을 육체에 가르침 받아버렸으니까…… 쾌락을 기대하게 되어버려요<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「普段は私が包み隠している場所……熟れてグチュグチュになっている雌の肉穴を……この長ぁ～いおち○ちんでほじって欲しくて……うずうずしているのです<emoji=heart04>」"
translation = "「평소에는 제가 숨기고 있는 장소…… 잘 익어서 구축구축해진 암컷의 구멍을…… 이 기~인 자지로 휘저어 주길 바라서…… 근질근질하고 있어요<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「早く……お願いです、早くハメて……周囲のことなんてどうでもいいですからっ<emoji=heart04>\u3000おち○ちんハメてくださいっっ<emoji=heart04>」"
translation = "「빨리…… 부탁이에요, 빨리 박아줘요…… 주변 일 따위 아무래도 좋으니까요<emoji=heart04> 자지 박아주세요<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「んあぁぁぁ～～～っ！！\u3000はぁんっ<emoji=heart04>\u3000はぁっ、はぁっ……一気にずっぷり入ってしまいましたぁ<emoji=heart04>」"
translation = "「응아아아아~~앗!! 하앙<emoji=heart04> 하앗, 하앗…… 한꺼번에 푹 들어와 버렸어요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "興奮に声を上ずらせるトリシャさんの期待に応じるように、張り詰めたペニスを根元まで突き入れた。"
translation = "흥분에 목소리가 들뜬 트리샤 씨의 기대에 부응하듯, 팽팽해진 페니스를 뿌리까지 찔러 넣었다."

[[dialogue]]
speaker = "トリシャ"
original = "「はぁっ、はぁぁぁっ……んくっ……会長さんの、おち○ちん長くて太い……いつもより興奮しているみたいです……」"
translation = "「하앗, 하아아앗…… 응윽…… 회장님의, 자지 길고 굵어…… 평소보다 흥분하고 있는 것 같아요……」"

[[dialogue]]
speaker = "トリシャ"
original = "「私も……いつもより感度が増しています<emoji=heart04>\u3000内側の粘膜が淫らに発情していて……会長さんのおち○ちんをおねだりしてしまいますっ<emoji=heart04>」"
translation = "「저도…… 평소보다 감도가 올라가 있어요<emoji=heart04> 안쪽 점막이 음란하게 발정해서…… 회장님의 자지를 조르게 돼요<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「んふっ、んぅぅ～～っ……挿入しているだけなのに、頭がおかしくなりそうなほどの快楽に襲われています……はぁっ、あっ……あぁぁっ<emoji=heart04>」"
translation = "「응후, 응으으~~읏…… 삽입하고 있을 뿐인데, 머리가 이상해질 정도의 쾌락이 덮쳐오고 있어요…… 하앗, 앗…… 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "発情効果が働いているせいだろうか、トリシャさんのおま○こは熱い蜜液にあふれ強烈に締め付けてくる。"
translation = "발정 효과가 작용하고 있는 탓일까, 트리샤 씨의 보지는 뜨거운 애액으로 넘쳐나며 강렬하게 조여온다."

[[dialogue]]
speaker = "unk"
original = "まるで媚薬に漬けられたように結合部から発情が伝播して、抑えがたいほどの欲望が膨れ上がる。"
translation = "마치 미약에 절여진 것처럼 결합부로부터 발정이 전파되어, 억누르기 힘들 정도의 욕망이 부풀어 오른다."

[[dialogue]]
speaker = "クロト"
original = "「動きますよ……トリシャさん……」"
translation = "「움직일게요…… 트리샤 씨……」"

[[dialogue]]
speaker = "unk"
original = "熱い息を吐き出しながらトリシャさんの身体を掴むと、じっくり味わうように身体を揺さぶり動かし始めた。"
translation = "뜨거운 숨을 내뱉으며 트리샤 씨의 몸을 붙잡고, 차분히 맛보듯이 몸을 흔들며 움직이기 시작했다."

[[dialogue]]
speaker = "トリシャ"
original = "「はぁっ！\u3000あっ、ん……あぁあああっ……<emoji=heart04>」"
translation = "「하앗! 앗, 응…… 아아아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「おま○こきゅうってなって……か、勝手に締め付けてしまいますっっ<emoji=heart04>\u3000んあっ、あ、やぁん……<emoji=heart04>」"
translation = "「보지가 꽉 조여져서…… 저, 저절로 조여버려요<emoji=heart04> 응앗, 아, 야앙……<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「欲しいっ、欲しいってはしたなく求めて……いやらしい肉壺です……更なる快楽を求めて……じくじくと粘つく蜜を分泌しているようです……」"
translation = "「원해, 원한다고 천박하게 구하며…… 상스러운 고기 항아리예요…… 더한 쾌락을 원하며…… 질척질척 끈적이는 꿀을 분비하고 있는 것 같아요……」"

[[dialogue]]
speaker = "トリシャ"
original = "「んうっ！\u3000ふっ、ふぅぅ～～～っ<emoji=heart04>\u3000ごめ……ごめんなさいっ、今勝手に達してしまいそうになりました……こんなにゆっくりに、してもらっているのに……<emoji=heart04>」"
translation = "「응웃! 후, 후우우~~~읏<emoji=heart04> 미안…… 죄송해요, 지금 멋대로 가버릴 뻔했어요…… 이렇게 천천히, 해주고 계시는데……<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「ぶちゅっ、ぶちゅって……繋がっている場所から音が出てしまいます……んんんっ、ふっ……音は聞こえないようになって……いるといいのですがっ……」"
translation = "「부츗, 부츗 하고…… 이어져 있는 곳에서 소리가 나버려요…… 응응응, 훗…… 소리는 들리지 않게…… 되어 있으면 좋겠는데……」"

[[dialogue]]
speaker = "トリシャ"
original = "「視界だけ防いでも、それ以外が駄目なら……交尾の音や匂いが……知られてしまうのに……んふぅぅ～～っ<emoji=heart04>」"
translation = "「시야만 막아도, 그 외가 안 된다면…… 교미하는 소리나 냄새가…… 알려져 버릴 텐데…… 응후우우~~읏<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「パンパンぬちゃぬちゃしてても、見えなければ問題ないですよ」"
translation = "「팍팍 쨔박쨔박 소리가 나도, 보이지 않으면 문제없어요」"

[[dialogue]]
speaker = "トリシャ"
original = "「パンパン……ぬちゃぬちゃ……<emoji=heart04>」"
translation = "「팍팍…… 쨔박쨔박……<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「いつも……愛し合う時は、そんな音、していますから……今回も……たくさん、セックスする音……」"
translation = "「항상…… 사랑을 나눌 때는, 그런 소리, 나니까요…… 이번에도…… 잔뜩, 섹스하는 소리……」"

[[dialogue]]
speaker = "トリシャ"
original = "「匂いも……濃い性臭が出てしまうのですね……経験者ならすぐわかる淫らな香りを……辺りに撒き散らしてしまうなんて……」"
translation = "「냄새도…… 진한 성취가 나와 버리는군요…… 경험자라면 금방 알 수 있는 음란한 향기를…… 주변에 뿌려버리다니……」"

[[dialogue]]
speaker = "クロト"
original = "「トリシャさんが嫌なら、今からやめてもいいんですよ？\u3000まだ、ギリギリ引き返せます」"
translation = "「트리샤 씨가 싫다면, 지금이라도 그만둬도 된다고요? 아직, 아슬아슬하게 되돌릴 수 있어요」"

[[dialogue]]
speaker = "unk"
original = "トリシャさんの耳元で囁きながら、子宮の入り口を固くなったペニスの先端でグリグリと押し上げる。"
translation = "트리샤 씨의 귓가에 속삭이며, 자궁 입구를 딱딱해진 페니스 끝으로 그리그리 밀어 올린다."

[[dialogue]]
speaker = "トリシャ"
original = "「そんな……ひどいこと言わないでください……こんなの我慢できるはずない、です……」"
translation = "「그런…… 심한 말 하지 말아 주세요…… 이런 거 참을 수 있을 리, 없어요……」"

[[dialogue]]
speaker = "unk"
original = "少し意地悪だったかもしれない。こんな刺激を与えられて、トリシャさんが拒めないということは分かっているのに……。"
translation = "조금 짓궂었을지도 모른다. 이런 자극을 주고서, 트리샤 씨가 거절할 수 없다는 것을 알고 있는데……."

[[dialogue]]
speaker = "トリシャ"
original = "「もうどうなってもいいですからっ……いつものように……私を奪って……全てを犯して……淫欲の沼に叩き落としてくださいっ……」"
translation = "「이제 어떻게 되어도 좋으니까…… 평소처럼…… 저를 빼앗고…… 모든 것을 범하고…… 음욕의 늪에 떨어뜨려 주세요……」"

[[dialogue]]
speaker = "トリシャ"
original = "「お願いです……激しく突いて……<emoji=heart04>」"
translation = "「부탁이에요…… 격렬하게 찔러줘요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "懇願の声に応えるように、少しずつピストンの動きを速めていく。"
translation = "간청하는 목소리에 응하듯, 조금씩 피스톤 운동을 빠르게 해 나간다."

[[dialogue]]
speaker = "トリシャ"
original = "「んあっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あぁぁぁ～～っ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000会長、さんっ<emoji=heart04>\u3000おち○ちん来てますっ<emoji=heart04>\u3000私のなか……いっぱいズブズブしてますっ<emoji=heart04>」"
translation = "「응앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 아아아아~~앗<emoji=heart04> 하앙<emoji=heart04> 앗<emoji=heart04> 회장, 님<emoji=heart04> 자지 오고 있어요<emoji=heart04> 제 안…… 잔뜩 즈부즈부 하고 있어요<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「ふうぅぅっ、んうっ<emoji=heart04>\u3000はぁっ、あっ、あっ、すごいっ<emoji=heart04>\u3000ねちっこい腰使い、で……私の淫らな場所を味わわれてますっっ<emoji=heart04>」"
translation = "「후우우, 응웃<emoji=heart04> 하앗, 앗, 앗, 대단해<emoji=heart04> 끈적한 허리 놀림으로…… 제 음란한 곳을 맛보고 계세요<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「んんっ……感じますか？\u3000私も……いつも以上に昂ぶっているのを……<emoji=heart04>\u3000おま○こも……何回も<ruby>膣内射精<rt>なかだし</rt></ruby>して頂いた後のような熟れ具合ですよ……」"
translation = "「응읏…… 느껴지시나요? 저도…… 평소 이상으로 고양되어 있는 걸……<emoji=heart04> 보지도…… 몇 번이나 질내 사정 받은 뒤처럼 익어버린 상태예요……」"

[[dialogue]]
speaker = "トリシャ"
original = "「おっぱいの方、だって……すごく……発情していますっ……<emoji=heart04>\u3000ほら、見てください……ずっしりと実って……重い……<emoji=heart04>」"
translation = "「가슴 쪽도…… 굉장히…… 발정해 있어요……<emoji=heart04> 자, 보세요…… 묵직하게 영글어서…… 무거워……<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「セックスの時はいつも夢中でちゅぱちゅぱ吸ってくれる、乳首も……ぱんぱんに膨れあがっていますよ……<emoji=heart04>」"
translation = "「섹스할 때는 항상 정신없이 츄파츄파 빨아주는, 유두도…… 팽팽하게 부풀어 올라 있어요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そんな風に言われてしまったら、目が引き付けられてしまう。"
translation = "그런 식으로 들어버리면, 눈길이 끌리고 만다."

[[dialogue]]
speaker = "unk"
original = "たわわに揺れるトリシャさんの大きな乳房に、下半身の熱がさらに増していくのを感じた。"
translation = "탐스럽게 흔들리는 트리샤 씨의 커다란 유방에, 하반신의 열기가 더욱 더해지는 것을 느꼈다."

[[dialogue]]
speaker = "トリシャ"
original = "「んふっ、興奮しましたか……？\u3000今おま○この中で膨らみましたよ<emoji=heart04>\u3000膣襞で伝わってきました……<emoji=heart04>」"
translation = "「응후, 흥분하셨나요……? 지금 보지 안에서 부풀어 올랐어요<emoji=heart04> 질 벽으로 전해져 왔어요……<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「ふあっ……あぁっ、あんっ<emoji=heart04>\u3000もっと私を感じて……味わってくださいっ<emoji=heart04>\u3000んあっ<emoji=heart04>\u3000あぁっ<emoji=heart04>\u3000はぁんっっ<emoji=heart04>」"
translation = "「후앗…… 아앗, 안<emoji=heart04> 더 저를 느끼고…… 맛봐주세요<emoji=heart04> 응앗<emoji=heart04> 아앗<emoji=heart04> 하앙<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「おち○ちんでズブズブされて……んん～っ<emoji=heart04>\u3000ぜ、全身が敏感になっているみたいです……おっぱいの先も、触って欲しくてうずうずしています……<emoji=heart04>」"
translation = "「자지로 즈부즈부 당해서…… 응응~<emoji=heart04> 전, 전신이 민감해진 것 같아요…… 가슴 끝도, 만져주길 바라서 근질근질해요……<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「今日は特別、ですからっっ……優しく抱いてくれるあなたも好きですが、激しく……痛いくらいに乱暴に抱き潰されたいですっっ<emoji=heart04>」"
translation = "「오늘은 특별, 하니까요…… 상냥하게 안아주는 당신도 좋지만, 격렬하게…… 아플 정도로 난폭하게 안겨 망가지고 싶어요<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「この長くて太いおち○ちんで私を壊してっっ……おかしくなるくらい入り口から奥までいじめてっ<emoji=heart04>」"
translation = "「이 길고 굵은 자지로 저를 부숴줘요…… 이상해질 정도로 입구부터 안쪽까지 괴롭혀줘요<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「んおっ！\u3000おお～～～っ<emoji=heart04>\u3000おふっ<emoji=heart04>\u3000すごっ<emoji=heart04>\u3000一気に激しくっ<emoji=heart04>\u3000こんなの初めてでっ、すごっ、おっ、おっ、おおおおおっ<emoji=heart04>」"
translation = "「응옷! 오오~~~옷<emoji=heart04> 오후<emoji=heart04> 굉장해<emoji=heart04> 단숨에 격렬하게<emoji=heart04> 이런 거 처음이라, 굉장, 오, 오, 오오오오옷<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「すごい声出てますっ<emoji=heart04>\u3000んうっ<emoji=heart04>\u3000んふぅ～～～っ<emoji=heart04>\u3000声だめっ<emoji=heart04>\u3000動物みたいな声、恥ずかしいのにっ<emoji=heart04>」"
translation = "「굉장한 목소리 나오고 있어요<emoji=heart04> 응웃<emoji=heart04> 응후우우~~~읏<emoji=heart04> 목소리 안 돼<emoji=heart04> 짐승 같은 목소리, 부끄러운데<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「んぐぅっ<emoji=heart04>\u3000奥ずぶうって<emoji=heart04>\u3000ぐりぐりするの駄目ぇぇぇっっ<emoji=heart04>」"
translation = "「응구웃<emoji=heart04> 안쪽 즈부우 하고<emoji=heart04> 그리그리 하는 거 안 돼애애앳<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "トリシャさんが獣じみた声を上げる。"
translation = "트리샤 씨가 짐승 같은 목소리를 낸다."

[[dialogue]]
speaker = "unk"
original = "それは普段の落ち着いたトリシャさんから想像も出来ない淫猥な喘ぎ声だった。"
translation = "그것은 평소의 차분한 트리샤 씨에게서는 상상도 할 수 없는 음란한 신음이었다."

[[dialogue]]
speaker = "トリシャ"
original = "「これっ、見えなくしてても絶対気付かれますっ！\u3000こんなっ、喘ぎ声我慢できませんしっ、入ってる穴もっ、すごい音、しててっ……んぉっ、おっ、おんっ<emoji=heart04>」"
translation = "「이거, 안 보이게 해도 절대 들켜요! 이런, 신음 참을 수 없고, 들어와 있는 구멍도, 굉장한 소리, 나고 있고…… 응옷, 옷, 응<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「壊れるっ<emoji=heart04>\u3000壊れちゃいます、からぁっっ<emoji=heart04>\u3000会長さんっ<emoji=heart04>\u3000あぁっ<emoji=heart04>\u3000駄目なのにっ、気持ちよくてっ<emoji=heart04>\u3000私っ私っ、どうすればいいのかっ……」"
translation = "「부서져<emoji=heart04> 부서져 버리니까요오앗<emoji=heart04> 회장님<emoji=heart04> 아앗<emoji=heart04> 안 되는데, 기분 좋아서<emoji=heart04> 저, 저, 어떻게 하면 좋을지……」"

[[dialogue]]
speaker = "トリシャ"
original = "「完全に交尾ですっ、愛し合う男女の睦み合いとは程遠いっ、肉欲を貪るだけの行為っ<emoji=heart04>\u3000ち○ぽっ<emoji=heart04>\u3000ち○ぽすごいっっ<emoji=heart04>\u3000んあっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000うあぁぁっ<emoji=heart04>」"
translation = "「완전히 교미예요, 사랑하는 남녀의 정나눔과는 거리가 먼, 육욕을 탐할 뿐인 행위<emoji=heart04> 자지<emoji=heart04> 자지 굉장해<emoji=heart04> 응앗<emoji=heart04> 앗<emoji=heart04> 우아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「もっとほじって<emoji=heart04>\u3000激しく<emoji=heart04>\u3000ち○ぽ使って<emoji=heart04>\u3000おま○こズボズボしてぇぇ～～～～っ<emoji=heart04>」"
translation = "「더 휘저어줘<emoji=heart04> 격렬하게<emoji=heart04> 자지 써서<emoji=heart04> 보지 즈보즈보 해줘어어어~~~~엇<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ここが外であることも忘れ、喘ぎ声を抑えることも忘れ、ただ本能のままに<ruby>媾<rt>まぐわ</rt></ruby>い合う。"
translation = "이곳이 야외라는 것도 잊고, 신음을 억누르는 것도 잊고, 그저 본능대로 교미한다."

[[dialogue]]
speaker = "トリシャ"
original = "「んうっ<emoji=heart04>\u3000ふおっ<emoji=heart04>\u3000おおおおおお～～～～っ<emoji=heart04>\u3000おぐっ<emoji=heart04>\u3000うっ<emoji=heart04>\u3000子宮壊れるっ<emoji=heart04>\u3000こんなっ、んあっ<emoji=heart04>\u3000うああぁぁっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>」"
translation = "「응웃<emoji=heart04> 후옷<emoji=heart04> 오오오오오오～～～～옷<emoji=heart04> 오긋<emoji=heart04> 웃<emoji=heart04> 자궁 망가져어<emoji=heart04> 이런 거, 응앗<emoji=heart04> 우아아아앗<emoji=heart04> 하앗<emoji=heart04> 안 <emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「か、会長さんぅぅ～～……んほっ<emoji=heart04>\u3000ほっ<emoji=heart04>\u3000突き上げられてっ、喋れない、からっっ<emoji=heart04>\u3000んおっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000んぅううううう～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「회, 회장님으으～～……응홋<emoji=heart04> 홋<emoji=heart04> 쳐올려져서, 말을 못 하겠, 어서어<emoji=heart04> 응옷<emoji=heart04> 옷<emoji=heart04> 응으으으으으으～～～옷<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「もう無理ぃぃ……イぐ……イぎますぅぅ……んおっ<emoji=heart04>\u3000おふっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000ふおおぉぉ～～～っ<emoji=heart04>」"
translation = "「이제 무리이이…… 가버렷…… 가버려요오오…… 응옷<emoji=heart04> 오훗<emoji=heart04> 옷<emoji=heart04> 옷<emoji=heart04> 후오오오오～～～옷<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「か、会長さんもっ……射精……ザーメン出してぇっっ<emoji=heart04>\u3000受精待ちしてるからぁっ<emoji=heart04>\u3000私の奥っ<emoji=heart04>\u3000ドプドプって<emoji=heart04>」"
translation = "「회, 회장님도…… 사정…… 정액 내보내 줘어어<emoji=heart04> 수정 대기 중이니까아<emoji=heart04> 내 안쪽 깊숙이<emoji=heart04> 울컥울컥하고<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "振り絞るような叫びに、俺も下半身から欲望がせり上がってきているのを感じる。"
translation = "쥐어짜는 듯한 비명에 나도 하반신에서 욕망이 치밀어 오르는 것을 느낀다."

[[dialogue]]
speaker = "クロト"
original = "「トリシャ、さんっ……！\u3000出しますよ！\u3000トリシャさんの、奥でっ……！！」"
translation = "「트리샤 씨……! 내보낼게요! 트리샤 씨의, 안쪽에서……!!」"

[[dialogue]]
speaker = "トリシャ"
original = "「お願いっ、しますっ！\u3000私っ、もう、ダメですからっ！\u3000んんっ、んっ、っ、う、んんっ、ん……うううっ……<emoji=heart04>」"
translation = "「부탁, 해요! 저, 이제, 한계니까요! 응응, 응, 윽, 우, 응응, 응…… 우우웃……<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「ザーメン、くださいっ<emoji=heart04>\u3000ち○ぽっ<emoji=heart04>\u3000ち○ぽ奥まで入れてっ<emoji=heart04>\u3000ドビュルぅ～～～って出してくださいぃぃ～～～～っ<emoji=heart04>」"
translation = "「정액, 주세요오<emoji=heart04> 자지이<emoji=heart04> 자지 끝까지 넣어서<emoji=heart04> 푸슛～～～하고 내보내 주세요오오～～～～옷<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「イぐっ<emoji=heart04>\u3000おっきいの来る<emoji=heart04>\u3000だめぇ<emoji=heart04>\u3000これだめっ<emoji=heart04>\u3000本当に壊れちゃう<emoji=heart04>\u3000体は耐えられても、心が馬鹿になっちゃいますぅうっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가버렷<emoji=heart04> 커다란 게 와<emoji=heart04> 안 돼에<emoji=heart04> 이거 안 돼앗<emoji=heart04> 정말로 망가져 버려어<emoji=heart04> 몸은 버텨내도, 마음이 바보가 되어버려요오옷<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「イぐうぅぅっっ<emoji=heart04>\u3000会長さんっ<emoji=heart04>\u3000またイぐっ<emoji=heart04>\u3000イっぢゃううううぅ～～～～～っっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가버려어어어엇<emoji=heart04> 회장님<emoji=heart04> 또 가버렷<emoji=heart04> 가버려어어어어～～～～～어어엇<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「ち○ぽっ<emoji=heart04>\u3000ち○ぽ<emoji=heart04>\u3000ち○ぽ<emoji=heart04>\u3000ち○ぽぉっ<emoji=heart04>\u3000んおおおおおおお～～～～～っ<emoji=heart04>\u3000おふっ<emoji=heart04>\u3000う゛っ<emoji=heart04>\u3000う゛ぉっ<emoji=heart04>\u3000おぐっ<emoji=heart04>\u3000おがしくなるぅぅ<emoji=heart04>\u3000んぶっ<emoji=heart04>」"
translation = "「자지이<emoji=heart04> 자지<emoji=heart04> 자지<emoji=heart04> 자지이잇<emoji=heart04> 응오오오오오오오～～～～～옷<emoji=heart04> 오훗<emoji=heart04> 윽<emoji=heart04> 우옷<emoji=heart04> 오긋<emoji=heart04> 이상해져어어<emoji=heart04> 응붓<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「んぐぁ、う……んん……あぁあああああああああっ！！！！！！！」"
translation = "「응구아, 우…… 응응…… 아아아아아아아아앗!!!!!!!」"

[[dialogue]]
speaker = "unk"
original = "絶叫と共にトリシャさんの身体が痙攣し、俺は火照りきったトリシャさんの身体を強く抱きしめ、振り絞るようにありったけの精を放った。"
translation = "절규와 함께 트리샤 씨의 몸이 경련하고, 나는 달아오를 대로 달아오른 트리샤 씨의 몸을 강하게 껴안으며, 쥐어짜듯 있는 힘껏 정액을 쏟아냈다."

[[dialogue]]
speaker = "トリシャ"
original = "「ふあぁっ……あぐっ、ううっ……すごい……激しい絶頂……来ちゃっいましたぁぁぁ……<emoji=heart04>」"
translation = "「후아앗…… 아긋, 우웃…… 굉장해…… 격렬한 절정…… 와버렸어요오오……<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「はぁぁぁっ……はぁっ、あっ……<emoji=heart04>\u3000会長さんも……おち○ちん、ビクンビクンしてます……びゅ～～～っ<emoji=heart04>\u3000て……すごい勢いの……射精<emoji=heart04>」"
translation = "「하아아앗…… 하앗, 앗……<emoji=heart04> 회장님 것도…… 고추, 파들파들 떨리고 있어요…… 뷰우우웃<emoji=heart04> 하고…… 엄청난 기세의…… 사정<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「んうっ……ふ……膣内射精気持ちいい、です……<emoji=heart04>\u3000ずっしり重くて……子種が沢山詰まった……会長さんのザーメン……好き<emoji=heart04>」"
translation = "「응웃…… 후…… 질 내 사정 기분 좋아, 요……<emoji=heart04> 묵직하고 무거워서…… 씨앗이 가득 찬…… 회장님의 정액…… 좋아<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「最後まで全部……出し切ってくださいね<emoji=heart04>\u3000このまま私に注ぎきって……欲しいです<emoji=heart04>」"
translation = "「마지막까지 전부…… 다 쏟아내 주세요<emoji=heart04> 이대로 저에게 다 부어주길…… 원해요<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ああ……全部、あげますよ……トリシャさんの中に、全部……っ……！」"
translation = "「아아…… 전부, 줄게요…… 트리샤 씨의 안에, 전부……!」"

[[dialogue]]
speaker = "トリシャ"
original = "「はぁ……はぁ……おち○ちんがまだ跳ねてます……んぅっ……硬さも全然……元気いっぱいで……すごい<emoji=heart04>」"
translation = "「하아…… 하아…… 고추가 아직 뛰고 있어요…… 응웃…… 딱딱함도 전혀…… 기운이 넘쳐서…… 굉장해<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "身体に蓄えられていた精液を全て注ぎ込むと、トリシャさんの中からゆっくりと自身を引き抜いた。"
translation = "몸에 축적되어 있던 정액을 모두 쏟아붓고는, 트리샤 씨의 안에서 천천히 자신의 것을 뽑아냈다."

[[dialogue]]
speaker = "unk"
original = "結合部から俺とトリシャさんの体液の混じり合ったものがトロリと垂れ落ちる。"
translation = "결합부에서 나와 트리샤 씨의 체액이 뒤섞인 것이 주르륵 흘러내린다."

[[dialogue]]
speaker = "トリシャ"
original = "「んぁ<emoji=heart04>\u3000はぁぁ～～っ……んうっ<emoji=heart04>\u3000ううっ、量が多すぎて溢れてきます……<emoji=heart04>」"
translation = "「응아<emoji=heart04> 하아아～～앗…… 응웃<emoji=heart04> 우우웃, 양이 너무 많아서 넘쳐흘러요……<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「おなかも重いですし……大量に注がれてしまいましたね……んんっ、ふっ……グッと力を入れたらドバッと溢れてしまいそうです……気をつけないと」"
translation = "「배도 묵직하고…… 대량으로 쏟아져 버렸네요…… 응응, 훗…… 윽 하고 힘을 주면 왈칵 넘쳐버릴 것 같아요…… 조심하지 않으면」"

[[dialogue]]
speaker = "トリシャ"
original = "「しかし……ごめんなさい、会長さん……私、すっかり取り乱してしまって……」"
translation = "「그치만…… 죄송해요, 회장님…… 저, 완전히 정신을 잃고서……」"

[[dialogue]]
speaker = "クロト"
original = "「だいぶ……落ち着きましたか……？」"
translation = "「좀…… 진정이 되었나요……?」"

[[dialogue]]
speaker = "トリシャ"
original = "「はい……欲情に任せて、はしたないことを口走ってしまいました……おかしくなってた時のこと、全部覚えてますので……お恥ずかしいです」"
translation = "「네…… 욕정에 맡겨서, 천박한 소리를 입에 담아버렸어요…… 제정신이 아니었을 때의 일, 전부 기억하고 있으니까…… 부끄러워요」"

[[dialogue]]
speaker = "クロト"
original = "「まさか、トリシャさんの口からち○ぽなんて言葉が出てくるとは思いませんでしたよ」"
translation = "「설마, 트리샤 씨의 입에서 자지라는 말이 나올 줄은 몰랐거든요」"

[[dialogue]]
speaker = "トリシャ"
original = "「そ、それはっ……忘れて……忘れてくださいっ……」"
translation = "「그, 그건…… 잊어…… 잊어주세요……」"

[[dialogue]]
speaker = "クロト"
original = "「無理です、最高にエロかったから。欲を言えば、またトリシャさんがち○ぽって言うの聞きたいですね」"
translation = "「무리예요, 최고로 에로했으니까. 욕심을 내자면, 또 트리샤 씨가 자지라고 말하는 걸 듣고 싶네요」"

[[dialogue]]
speaker = "トリシャ"
original = "「そんなの無理です、無理っ」"
translation = "「그런 건 무리예요, 무리」"

[[dialogue]]
speaker = "クロト"
original = "「言ってくれないと、また激しくエッチしちゃいますよ？」"
translation = "「말해주지 않으면, 또 격렬하게 섹스해버릴 거예요?」"

[[dialogue]]
speaker = "トリシャ"
original = "「それは……んんっ……もっと私を抱きたい、ということですか……？」"
translation = "「그건…… 응응…… 더 저를 안고 싶다는, 건가요……?」"

[[dialogue]]
speaker = "クロト"
original = "「そんな期待するような目をして……言っても言わなくても抱く。トリシャさんが溢れさせた分、また中出しするから」"
translation = "「그런 기대하는 듯한 눈을 하고선…… 말하든 안 하든 안을 거야. 트리샤 씨가 흘려버린 만큼, 다시 질 내 사정할 테니까」"

[[dialogue]]
speaker = "トリシャ"
original = "「はい……おねがいします……さっきよりも気持ちよくしてくださいね……」"
translation = "「네…… 부탁드려요…… 아까보다 더 기분 좋게 해주세요……」"

[[dialogue]]
speaker = "トリシャ"
original = "「これからもずっと……このち○ぽで、私に気持ちいいこと教えてくださいね<emoji=heart04>」"
translation = "「앞으로도 계속…… 이 자지로, 저에게 기분 좋은 거 가르쳐 주세요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "恥ずかしそうに言うトリシャさんが可愛すぎて、再び激しく抱いてしまうのだった。"
translation = "부끄러운 듯 말하는 트리샤 씨가 너무나 귀여워서, 다시금 격렬하게 안고 마는 것이었다."

