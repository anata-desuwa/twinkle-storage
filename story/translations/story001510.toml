[[dialogue]]
speaker = "unk"
original = "今回の一件はまだ終わっていない――そう言ったサチに、俺は緩みかけていた気を引き締める。"
translation = "이번 건은 아직 끝나지 않았다―― 그렇게 말한 사치에게 나는 풀려가던 긴장을 다시 조였다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「サチちゃん、一体どういうことなの……？」"
translation = "「사치짱, 대체 그게 무슨 소리야……?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「シズハちゃんは、『解放』のロストアイテムを初めて見たのはどのタイミングだったか、覚えてる？」"
translation = "「시즈하짱은 『해방』의 로스트 아이템을 처음 본 게 어느 타이밍이었는지 기억해?」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「え？\u3000えっと……サチちゃんとプリムラちゃんがロストアイテムを回収し始めようと変身して、その直後、駆け付けた時に……」"
translation = "「에? 그게…… 사치짱이랑 프리뮬라짱이 로스트 아이템을 회수하려고 변신했고 그 직후에 달려갔을 때……」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ということは、それ以前は『解放』のロストアイテムと接触した覚えがないんだよね？」"
translation = "「그렇다는 건 그 이전에는 『해방』의 로스트 아이템과 접촉한 기억이 없다는 거지?」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「うん。仮に、私が気づかない間に接近したとしても、ディーちゃんが気づくはずだから……」"
translation = "「응. 가령 내가 모르는 사이에 접근했다고 해도 디짱이 알아차렸을 테니까……」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「だとしたら、おかしいのはあの時、『解放』のロストアイテムが能力をまだ発動する素振りがなかったのにも関わらず――」"
translation = "「그렇다면 이상한 건 그때 『해방』의 로스트 아이템이 능력을 아직 발동할 기미가 없었는데도 불구하고――」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「シズハちゃんとサーシャさんが実の姉妹関係だと、既に全員が誤認していたこと」"
translation = "「시즈하짱과 사샤 씨가 친자매 관계라고 이미 모두가 오인하고 있었다는 거야」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「あ……！」"
translation = "「아……!」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「つまり、聖杯ちゃんはその時、既に暴走していた……！？」"
translation = "「즉 성배짱은 그때 이미 폭주하고 있었다……!?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「そう。だから、『解放』のロストアイテムとは別の要因があるんだよ。だけど、それにしてはタイミングが良すぎるよね？」"
translation = "「맞아. 그러니까 『해방』의 로스트 아이템과는 별개의 요인이 있는 거야. 하지만 그러기엔 타이밍이 너무 좋지?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「まるで『解放』のロストアイテムの出現に合わせるように聖杯が暴走した。これって本当に偶然……？」"
translation = "「마치 『해방』의 로스트 아이템 출현에 맞춘 듯이 성배가 폭주했어. 이게 정말 우연일까?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「偶然じゃないとしたら……誰かが意図して、これを引き起こしたということになる」"
translation = "「우연이 아니라면…… 누군가가 의도해서 이걸 일으켰다는 게 돼」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「そうじゃないですか？\u3000<b>ディーラックさん</b>」"
translation = "「그렇지 않나요? <b>디럭쿠</b> <b>씨</b>」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「え！？」"
translation = "「에!?」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「ん？\u3000ボクかい？」"
translation = "「응? 나 말인가?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「はい。違っていたら謝ります。でも、あなたが今、１番怪しい容疑者です」"
translation = "「네. 틀렸다면 사과하겠어요. 하지만 당신이 지금 가장 수상한 용의자예요」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「ふぅん。どうしてそう思うのサ？」"
translation = "「후음. 어째서 그렇게 생각하는 건가?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「まず１点。私たちは図書館に行って、『解放』のロストアイテムを見つけました。その場所に反応があったと教えてくれたのは、ディーラックさんです」"
translation = "「우선 첫 번째. 저희는 도서관에 가서 『해방』의 로스트 아이템을 찾았습니다. 그 장소에 반응이 있다고 알려준 건 디럭쿠 씨였죠」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「そうだね。それで、実際に見つけたんだろう？」"
translation = "「그랬지. 그래서 실제로 찾아냈잖아?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「はい、見つけました。ただし――」"
translation = "「네, 찾았습니다. 다만――」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ロストアイテムがあったのは、我の体の中じゃったがな！」"
translation = "「로스트 아이템이 있었던 건 짐의 몸속이었지만 말이다!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「つまりは、矛盾するんです。図書館でロストアイテムの反応があった、というディーラックさんの報告と」"
translation = "「즉, 모순되는 거예요. 도서관에서 로스트 아이템 반응이 있었다는 디럭쿠 씨의 보고와 말이죠」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「そうなのかい？\u3000あれれ～、おっかしいな～？\u3000確かにすごく大きいロストアイテム反応が、図書館からしたんだけどな～？」"
translation = "「그런 건가? 어라라~ 이상하네~? 분명 아주 큰 로스트 아이템 반응이 도서관에서 났었는데 말이라네~?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「そう言うと思ってました。あそこには別の、大きなロストアイテムが隠されていた。だからこそ、図書館という場所を選んだんですよね？」"
translation = "「그렇게 말할 줄 알았어요. 거기엔 다른 커다란 로스트 아이템이 숨겨져 있었다. 그렇기에 도서관이라는 장소를 고른 거겠죠?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ですが、２点目。『解放』のロストアイテムがもし聖杯の暴走の原因なら、あなたが気づかないはずがない」"
translation = "「하지만 두 번째. 『해방』의 로스트 아이템이 만약 성배 폭주의 원인이라면 당신이 모를 리가 없어요」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「う～ん、それについてはボクにもよくわからないのサ。いつの間にかボクも、シズハちゃんとサーシャちゃんが実の姉妹だと思い込んでいたからね」"
translation = "「으음, 그것에 대해서는 나도 잘 모르겠어. 어느샌가 나도 시즈하짱이랑 사샤 씨가 친자매라고 믿어버렸으니까 말이야」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「でも、間の悪い偶然というのも、あり得るんじゃないかな？」"
translation = "「하지만 운 나쁜 우연이라는 것도 있을 수 있지 않을까?」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「シズハちゃんの内心にはずっと、お姉ちゃんに会いたいという願望があったそうだからね」"
translation = "「시즈하짱의 내면에는 계속 언니를 만나고 싶다는 소원이 있었다고 하니까 말이야」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「……そうですね。確かにこれも、ディーラックさんがやったという証拠にはなりません」"
translation = "「……그렇네요. 확실히 이것도 디럭쿠 씨가 했다는 증거는 되지 않아요」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「だったら――」"
translation = "「그렇다면――」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「なので、トレジアンナさんの回収術式を受けてもらえませんか？」"
translation = "「그러니 트레지안나 씨의 회수 술식을 받아주시겠어요?」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ディーラックさん、ロストアイテムですよね？\u3000なので、トレジアンナさんの回収術式を受けて欲しいんです」"
translation = "「디럭쿠 씨, 로스트 아이템이죠? 그러니 트레지안나 씨의 회수 술식을 받아주셨으면 해요」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「何の為に？」"
translation = "「무엇을 위해서?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「これ以上の疑いを晴らす為です。回収術式を受けると、ディーラックさんは一時的に封印されますが――」"
translation = "「더 이상의 의심을 풀기 위해서예요. 회수 술식을 받으면 디럭쿠 씨는 일시적으로 봉인되겠지만――」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ディーラックさんがそれに抵抗しないなら、私たちはあなたのことを信用できます。もちろん、術式はすぐに解除すると約束します」"
translation = "「디럭쿠 씨가 그것에 저항하지 않는다면 저희는 당신을 신용할 수 있어요. 물론 술식은 바로 해제하겠다고 약속하죠」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ディーラックさんが無実なら、協力して頂けますよね？」"
translation = "「디럭쿠 씨가 결백하다면 협력해 주실 수 있죠?」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「えっと……ディーちゃん、別に構わないよね？\u3000ディーちゃんはこれまでずっと、私のそばに居たんだし、変なことなんてするわけ……」"
translation = "「그게…… 디짱, 별로 상관없지? 디짱은 지금까지 계속 내 곁에 있었고, 이상한 짓 같은 걸 할 리가……」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「じゃあ、回収術式を使いますね。トレジアンナさん、お願いします」"
translation = "「그럼, 회수 술식을 사용하겠어요. 트레지안나 씨, 부탁드려요」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「はい。痛くありませんから、大丈夫ですよ～。回収術式――え～いっ！」"
translation = "「네에. 아프지 않으니까 괜찮아요~. 회수 술식――에잇!」"

[[dialogue]]
speaker = "unk"
original = "トレジアンナさん――サチのルーレットロットから、術式の光が放たれる。ディーラックはそれを――"
translation = "트레지안나 씨――사치의 루렛 롯드에서 술식의 빛이 뿜어져 나온다. 디럭쿠는 그것을――"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「…………ん～、残念♪」"
translation = "「…………음~, 아쉬워라♪」"

[[dialogue]]
speaker = "unk"
original = "さっと避けた。"
translation = "홱 피했다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「ディーちゃん！？」"
translation = "「디짱!?」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「悪いね、シズハちゃん」"
translation = "「미안해, 시즈하짱」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「残念ですが……推理は合っていたみたいですね」"
translation = "「유감입니다만…… 추리가 맞았던 모양이네요」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「ひひっ……ひひひっ♪\u3000アハハハハハハッ！」"
translation = "「히힛…… 히히히♪ 아하하하하하하!」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「は～！\u3000失敗したなぁ～！\u3000さすがサチちゃん、生徒会長だから頭もいいんだね～。いや～、参った参った」"
translation = "「하~! 실패했네~! 역시 사치짱, 학생회장이라 그런지 머리도 좋구나~. 이야~ 항복 항복」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「もうちょっと長い間、近くで楽しめるかとも思ったんだけどな～……ふぅ。しかしまぁ、バレたなら仕方がない」"
translation = "「조금 더 오랫동안 가까이서 즐길 수 있을까 싶었는데 말이야~…… 후우. 하지만 뭐, 들켰다면 어쩔 수 없지」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「――改めて、自己紹介をしようか。ボクはディーラック」"
translation = "「――다시 한번 자기소개를 할까. 나는 디럭쿠」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「ロストアイテムから生まれた、『エネルギー生命体』サ」"
translation = "「로스트 아이템에서 태어난, 『에너지 생명체』라네」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「なっ……まさか……！？」"
translation = "「나앗…… 설마……!?」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「そう、キミならわかるよねぇ？\u3000自分でもロストアイテムを作り出せる程に精通し、その結果、放置するとヤバいと分かったから回収に乗り出した！」"
translation = "「그래, 너라면 알겠지? 스스로 로스트 아이템을 만들어낼 수 있을 정도로 정통해 있고, 그 결과 방치하면 위험하다는 걸 알았기에 회수에 나선 것!」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「『<ruby>蒐集<rt>しゅうしゅう</rt></ruby>』の<b>魔女</b>トレジアンナ！\u3000キミになら、ねぇ！？」"
translation = "「『수집』의 <b>마녀</b> 트레지안나! 너라면 말이야, 응!?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "unk"
original = "トレジアンナさんが、魔女……！？"
translation = "트레지안나 씨가, 마녀……!?"

[[dialogue]]
speaker = "unk"
original = "トレジアンナさんは否定しない。ということは、ロストアイテムにその身を封じられる前は、彼女も『魔女の森』にいたということなのだろうか。"
translation = "트레지안나 씨는 부정하지 않는다. 그렇다는 건, 로스트 아이템에 그 몸이 봉인되기 전에는 그녀도 『마녀의 숲』에 있었다는 소리인 걸까."

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「どうしてそのことを……？」"
translation = "「어떻게 그 사실을……?」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「知ってるに決まってるだろう？\u3000ボクはロストアイテム達から生まれた。そのロストアイテムの一部を製作してるのはキミなんだから！」"
translation = "「당연히 알고 말고. 나는 로스트 아이템들에게서 태어났어. 그 로스트 아이템의 일부를 제작하고 있는 게 너니까!」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「どういうことなの、ディーちゃん……！？」"
translation = "「어떻게 된 거야, 디짱……!?」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「ひひっ、教えてあげるよ。ロストアイテムっていうのは……使われる度に排熱――マイナスエネルギーっていうのが放出されるのサ」"
translation = "「히힛, 가르쳐 줄게. 로스트 아이템이라는 건…… 사용될 때마다 배열――마이너스 에너지라는 게 방출된다네」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「しかし、それは本来、世界に存在するはずのない虚数のエネルギー。物理法則を無視した異物みたいなものサ～」"
translation = "「하지만 그건 본래 세계에 존재할 리 없는 허수의 에너지. 물리 법칙을 무시한 이물질 같은 거라구~」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「本来のエネルギーは外に排出されれば、別のエネルギーに転換され、世界の中を循環していく……が、マイナスエネルギーはそうならない」"
translation = "「본래 에너지는 외부로 배출되면 다른 에너지로 전환되어 세계 속을 순환하지만…… 마이너스 에너지는 그렇게 되지 않아」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「永遠に処理されないゴミとして、リクリエを幾度乗り越えても、世界の裏に塵の山となって貯まっていたのサ」"
translation = "「영원히 처리되지 않는 쓰레기로서, 리크리에를 몇 번이나 넘겨도 세계의 이면에 먼지 더미처럼 쌓여 있었던 거지」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「そして今回、未だかつてない大きなリクリエが迫った時、その影響を受けて、マイナスエネルギーに突然変異が起きた。……自我が生まれたんだよ」"
translation = "「그리고 이번에 지금까지 없었던 거대한 리크리에가 다가왔을 때, 그 영향을 받아 마이너스 에너지에 돌연변이가 일어났어. ……자아가 태어난 거야」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「すなわち、貯まり続けたマイナスエネルギーが形を持って、ボクとなったというわけサ♪」"
translation = "「즉, 계속 쌓여온 마이너스 에너지가 형태를 갖춰 내가 되었다는 소리라네♪」"

[[dialogue]]
speaker = "unk"
original = "１つ、教えて欲しい"
translation = "하나, 묻고 싶은 게 있어"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「おや？\u3000なんだい、会長？」"
translation = "「오야? 뭐니, 회장?」"

[[dialogue]]
speaker = "unk"
original = "キミは……俺たちの敵なのか？"
translation = "너는…… 우리들의 적인가?"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「ハハッ！\u3000いい質問だね。ボクにとってキミたちは――」"
translation = "「하하! 좋은 질문이네. 나에게 있어 너희들은――」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「ズバリ『家畜』サ。何故ならマイナスエネルギーそのものであるボクの主食は、当然マイナスエネルギー」"
translation = "「정답은 『가축』이라네. 왜냐하면 마이너스 에너지 그 자체인 나의 주식은 당연히 마이너스 에너지」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「それを生み出すのは、ロストアイテムを使うキミたち、愚かな欲望にまみれた<b>ヒトカス</b>共サ♪」"
translation = "「그걸 만들어내는 건 로스트 아이템을 사용하는 너희들, 어리석은 욕망에 찌든 인간 쓰레기들 공통이라네♪」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「だからボクにとって、キミたちは餌。ヒトだって他の獣の肉を殺して食うだろう？\u3000それと同じ」"
translation = "「그러니 나에게 있어 너희는 먹이. 인간도 다른 짐승의 고기를 죽여서 먹잖아? 그것과 같아」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「時に可愛いと思うことはあるけれど、食べ頃となれば美味しく調理するサ」"
translation = "「가끔 귀엽다고 생각할 때도 있지만, 먹기 좋은 때가 되면 맛있게 조리하는 법이라구」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「今回や、<b>これまで</b>みたいにね」"
translation = "「이번이나, 지금까지처럼 말이야」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「これまで……？\u3000まさか……」"
translation = "「지금까지……? 설마……」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「前回とか、なかなか美味しかったよ？\u3000『記憶』のロストアイテムで、サチちゃんや会長の記憶を奪って」"
translation = "「지난번이라든가, 꽤 맛있었다고? 『기억』의 로스트 아이템으로 사치짱이나 회장의 기억을 빼앗아서」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「あれも貴様が仕組んだのか！？」"
translation = "「그것도 네놈이 꾸민 짓이냐!?」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「ひひひっ！\u3000その通り♪\u3000ボクはロストアイテムから生まれたマイナスエネルギー。だから、ロストアイテムにマイナスエネルギーを逆流させることができる」"
translation = "「히히히! 정답♪ 나는 로스트 아이템에서 태어난 마이너스 에너지. 그러니까 로스트 아이템에 마이너스 에너지를 역류시킬 수 있어」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「するとどうなるか？\u3000もう分かるよね？\u3000――暴走するんだよ、ロストアイテムが♪」"
translation = "「그러면 어떻게 될까? 이제 알겠지? ――폭주하는 거야, 로스트 아이템이♪」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「おのれ……！\u3000貴様……！」"
translation = "「이놈이……! 네놈이……!」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「あ、もしかしてプリムラちゃん怒ってる？\u3000いや～、でも予想外だったな～、今回の件」"
translation = "「아, 혹시 프리뮬라짱 화났어? 이야~ 그래도 예상 밖이었네~ 이번 건」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「プリムラちゃんは『解放』のロストアイテムで力を取り戻して、もっと大暴れしてくれるもんだと思ってたけど……１年ちょっとで、すっかりヒトらしくなっちゃって」"
translation = "「프리뮬라짱은 『해방』의 로스트 아이템으로 힘을 되찾아서 좀 더 크게 날뛰어 줄 거라 생각했는데…… 1년 좀 지나서 완전히 인간답게 되어버렸네」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ふん、我を甘くみるな！\u3000……って、待て」"
translation = "「흥, 나를 얕보지 마라! ……가 아니라, 기다려라」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「貴様、一体いつから暗躍していた？\u3000まさか……」"
translation = "「네놈, 도대체 언제부터 암약하고 있었지? 설마……」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「ひひっ……♪\u3000さて、ここでプリムラちゃんに問題です」"
translation = "「히힛……♪ 자, 여기서 프리뮬라짱에게 문제입니다」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「賢者の石から作られた、あらゆるエネルギーを吸収し変換する終末兵器のキミ。それを作ったのは、一体誰でしょう？」"
translation = "「현자의 돌로 만들어진, 모든 에너지를 흡수하고 변환하는 종말병기인 너. 그걸 만든 건 대체 누구일까요?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ディーラック、貴様が我を作ったのか！？」"
translation = "「디럭쿠, 네놈이 나를 만든 것이냐!?」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「正解～～～っ♪\u3000ボクがママでちゅよ～♪\u3000アハハハハハハッ！！！」"
translation = "「정다~압♪ 내가 엄마라구용~♪ 아하하하하하하!!!」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「ちなみに！\u3000こう見えて、ボクの性別は女の子サ♪\u3000だから――」"
translation = "「참고로! 이래 봬도 내 성별은 여자아이라네♪ 그러니까――」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「可愛い女の子のお願いに免じて、今日のところはボクを見逃してくれると嬉しいな～♪\u3000――どうだい、みんな？」"
translation = "「귀여운 여자아이의 부탁을 봐서, 오늘은 나를 못 본 척해 주면 좋겠는데~♪ ――어떠니, 다들?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ディーラックさん、教えて下さい」"
translation = "「디럭쿠 씨, 알려 주세요」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「ん？」"
translation = "「응?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「見逃したとして、あなたはこれからどうするんですか？\u3000ロストアイテムを暴走させるのを止められるんですか？」"
translation = "「못 본 척한다고 쳐도, 당신은 앞으로 어떻게 할 건가요? 로스트 아이템을 폭주시키는 걸 멈출 수 있나요?」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「う～ん……そうだ！\u3000お互いのテリトリーを設けるとかどう？\u3000ボクは流星市国に侵入しない。その代わり――」"
translation = "「으음…… 그렇지! 서로의 테리토리를 정하는 건 어때? 나는 유성시국에 침입하지 않을게. 그 대신――」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「外国でロストアイテムの事件が起こっても、キミたちは干渉しない。どうだい？」"
translation = "「외국에서 로스트 아이템 사건이 일어나도 너희는 간섭하지 않는다. 어때?」"

[[dialogue]]
speaker = "unk"
original = "ダメだ。認められるわけがない"
translation = "안 돼. 인정할 수 있을 리가 없잖아"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「お兄さんと同じく。あなたをこのまま野放しにはできません！」"
translation = "「오빠와 마찬가지예요. 당신을 이대로 내버려 둘 순 없습니다!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「だそうじゃ。我としても、生みの親の貴様には１発拳を入れてやりたい気分なのでな。大人しく捕まるがいい！」"
translation = "「그렇다느니라. 나로서도 낳아준 부모인 네놈에게는 한 방 먹여주고 싶은 기분이라서 말이지. 얌전히 잡히거라!」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「……ふぅ。交渉決裂か」"
translation = "「……후우. 협상 결렬인가」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「なら仕方ないね！\u3000それっ！」"
translation = "「그럼 어쩔 수 없네! 에잇!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「えっ！？\u3000あっ！？」"
translation = "「엣!? 앗!?」"

[[dialogue]]
speaker = "unk"
original = "サチのルーレットロット――トレジアンナさんの体が光る。"
translation = "사치의 루렛 롯드――트레지안나 씨의 몸이 빛난다."

[[dialogue]]
speaker = "unk"
original = "そこから『解放』のロストアイテムが抜け出て、ディーラックの方へと飛んで行く。"
translation = "그곳에서 『해방』의 로스트 아이템이 빠져나와 디럭쿠 쪽으로 날아간다."

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「勿体ぶって、さっさと自分の封印を解いておかなかったのは失策だったね、トレジアンナ！」"
translation = "「아껴두느라 얼른 자신의 봉인을 풀어두지 않은 건 실책이었네, 트레지안나!」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「復活はまたお預けサ♪\u3000こうやって後で回収できるように、事前に術式を仕込んでおいたんだよ」"
translation = "「부활은 또 다음 기회라구♪ 이렇게 나중에 회수할 수 있도록 사전에 술식을 심어두었거든」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「じゃあね、みんな！\u3000ボクは逃げさせてもらうよ！」"
translation = "「그럼 안녕, 얘들아! 나는 도망가겠어!」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「あっ！\u3000待って、ディーちゃん！」"
translation = "「앗! 기다려, 디짱!」"

[[dialogue]]
speaker = "unk"
original = "シズハの言葉には答えず、ディーラックは『解放』のロストアイテムを手に掴むと、素早く空へ逃げ去ろうとする。"
translation = "시즈하의 말에는 대답하지 않고, 디럭쿠는 『해방』의 로스트 아이템을 손에 쥐더니 재빨리 하늘로 도망치려 한다."

[[dialogue]]
speaker = "unk"
original = "しかし――"
translation = "하지만――"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「させないわ」"
translation = "「보내지 않아」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「……あ痛っ！？\u3000これは……！」"
translation = "「……아얏!? 이건……!」"

[[dialogue]]
speaker = "unk"
original = "天井に頭をぶつけるように、ディーラックが空中で見えない壁のようなものに阻まれる。"
translation = "천장에 머리를 부딪치듯, 디럭쿠가 공중에서 보이지 않는 벽 같은 것에 가로막힌다."

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「まさか、サーシャちゃんの<b>凍結</b>かい……！？」"
translation = "「설마, 사샤짱의 동결인가……!?」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「アリーナの周りを覆うように、空間を凍らせたわ。だから、逃げられないわよ、ディーラックちゃん」"
translation = "「아레나 주변을 덮듯이 공간을 얼렸어. 그러니까 도망갈 수 없어, 디럭쿠짱」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「いやいや、チートすぎでしょ……！\u3000その能力！」"
translation = "「아니 아니, 너무 치트잖아……! 그 능력!」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「……ねぇ、ディーラックちゃん。お姉ちゃん、今回の件はちょっと怒ってるの」"
translation = "「……있지, 디럭쿠짱. 언니, 이번 일은 조금 화났어」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「私だけだったら、許せたかもしれない。でも――」"
translation = "「나뿐이었다면 용서했을지도 몰라. 하지만――」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「あなたはシズハちゃんの心を弄んだ。そのことは私、絶対に許せない」"
translation = "「너는 시즈하짱의 마음을 가지고 놀았어. 그 사실은 나, 절대로 용서 못 해」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「……そうかい。だったら！」"
translation = "「……그래. 그렇다면!」"

[[dialogue]]
speaker = "unk"
original = "ディーラックは大きく口を開けると――"
translation = "디럭쿠는 입을 크게 벌리더니――"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「あ～ん！\u3000――ごくんっ！」"
translation = "「아~앙! ――꿀꺽!」"

[[dialogue]]
speaker = "unk"
original = "『解放』のロストアイテムを食べて、飲み込んだ。"
translation = "『해방』의 로스트 아이템을 먹고 삼켰다."

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「――解放」"
translation = "「――해방」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「ふぅ～～～」"
translation = "「후우~~~」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「ディーちゃんが変身した……！？」"
translation = "「디짱이 변신했어……!?」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「悪いけど……全力で暴れて、突破させてもらうサ！！！」"
translation = "「미안하지만…… 전력으로 날뛰어서 돌파해 주겠다네!!!」"

[[dialogue]]
speaker = "unk"
original = "変貌を遂げたディーラックとの戦闘が、開始されるのだった。"
translation = "변모를 이룬 디럭쿠와의 전투가 시작되는 것이었다."

