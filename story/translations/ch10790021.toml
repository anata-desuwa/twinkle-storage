[[dialogue]]
speaker = "unk"
original = "第１話,附属のプルちゃん,P"
translation = "제1화, 부속의 푸루짱, P"

[[dialogue]]
speaker = "unk"
original = "今日は用事があって流星附属校に来たのだが──"
translation = "오늘은 볼일이 있어서 유성 부속교에 왔는데──"

[[dialogue]]
speaker = "？？？"
original = "「ふんふふ～ん♪」"
translation = "「흠흐흥~♪」"

[[dialogue]]
speaker = "unk"
original = "パテル……！？"
translation = "파텔……!?"

[[dialogue]]
speaker = "？？？"
original = "「パテル～？\u3000誰のことかな？\u3000キュートでぷりちーな守護天使様のことなんて、あたし知らないな～」"
translation = "「파텔~? 누구를 말하는 걸까? 큐트하고 프리티한 수호천사님 같은 건, 나는 모르겠는데~」"

[[dialogue]]
speaker_original = "プルちゃん？"
speaker_translation = "푸루짱?"
original = "「あたしプルちゃん！\u3000カワイイカワイイ附属校のアイドルだよ！」"
translation = "「나는 푸루짱! 귀엽고 귀여운 부속교의 아이돌이야!」"

[[dialogue]]
speaker_original = "プルちゃん？"
speaker_translation = "푸루짱?"
original = "（な～んてね。後で話そっか、おにーさん）"
translation = "（라~ㄴ다나. 나중에 얘기할까, 오빠）"

[[dialogue]]
speaker = "unk"
original = "用事を済ませて、カフェテリアでパテルと落ち合った。"
translation = "볼일을 마치고, 카페테리아에서 파텔과 만났다."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「やぁ、魔王。ここで会うのは初めてだね」"
translation = "「여어, 마왕. 여기서 만나는 건 처음이네」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「あたしは附属の生徒じゃないって？\u3000そうだよ。あたしは制服をパク──借りてるだけで、附属校には在籍してない」"
translation = "「내가 부속 학생이 아니라고? 맞아. 나는 교복을 훔치── 빌렸을 뿐이지, 부속교에 재적하고 있지는 않아」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「でもこの制服を着て堂々としてたら、案外気付かれないもんだよ」"
translation = "「하지만 이 교복을 입고 당당하게 있으면, 의외로 들키지 않는 법이야」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「オペレーション・ペンタグラムで一緒に戦った子もいるけど、その子たちは逆に『守護天使がいるのは何か意味があるのかな』って思ってスルーしてくれるし」"
translation = "「오퍼레이션 펜타그램에서 같이 싸운 애들도 있지만, 그 애들은 반대로 『수호천사가 있는 건 뭔가 의미가 있는 걸까』라고 생각해서 그냥 넘어가 주거든」"

[[dialogue]]
speaker = "unk"
original = "そうなんだ……"
translation = "그렇구나……"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「あ、プルちゃん、会長さん、こんにちは。プルちゃんって会長さんと知り合いだったんだね」"
translation = "「아, 푸루짱, 회장님, 안녕하세요. 푸루짱은 회장님이랑 아는 사이였구나」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「うん、そうなんだ～。新星の会長さんって、優しくて頼りになって素敵だよね」"
translation = "「응, 그렇단다~. 신성의 회장님은, 상냥하고 의지가 돼서 멋지지」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「わかるなぁ……私もヒマワリちゃんも会長さんにはお世話になってるし」"
translation = "「이해해요…… 저도 히마와리짱도 회장님께는 신세를 지고 있으니까요」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「私はヒマワリちゃんと約束があるからこれで。会長さんもゴールデングースの事務所でまたお会いしましょう」"
translation = "「저는 히마와리짱과 약속이 있어서 이만. 회장님도 골든 구스 사무소에서 다시 봬요」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「じゃ～ね～」"
translation = "「안녕~」"

[[dialogue]]
speaker = "unk"
original = "普通に馴染んでる……！"
translation = "평범하게 녹아들어 있어……!"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「あたしのキュートさと順応力をもってすれば、附属生になりきるくらいわけないよ」"
translation = "「나의 큐트함과 적응력만 있다면, 부속생인 척하는 것쯤은 아무것도 아니야」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「でもかわいすぎて目立っちゃうとバレるから、そこは気をつけないといけないかなぁ～」"
translation = "「하지만 너무 귀여워서 눈에 띄면 들통나니까, 그 점은 조심해야 하려나~」"

[[dialogue]]
speaker = "unk"
original = "附属の先生に不審者がいるって伝えておこう"
translation = "부속 선생님께 수상한 사람이 있다고 전해둬야지"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「待って！\u3000バラしちゃダメ！\u3000大人しくしてるから言わないで～っ！」"
translation = "「잠깐! 까발리면 안 돼! 얌전히 있을 테니까 말하지 마~앗!」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「……別に言う気はない？\u3000もう、あたしをからかうなんて、悪い魔王様なんだから。こんなにキュートな死神を不審者呼ばわりなんて失礼だよ」"
translation = "「……딱히 말할 생각은 없다고? 정말, 나를 놀리다니 못된 마왕님이라니까. 이렇게 큐트한 사신을 수상한 사람 취급하다니 실례야」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ん？\u3000あたしが附属で何してるのかって？\u3000そうだなぁ……適当に校内を見て回ったり、気が向いたら授業聞いたりするくらいだけど」"
translation = "「응? 내가 부속에서 뭘 하고 있냐고? 글쎄…… 적당히 교내를 둘러보거나, 내키면 수업을 듣는 정도지만」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「あと、気になる子の様子を見たりかな」"
translation = "「그리고, 신경 쓰이는 아이의 상태를 보거나 할까」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「たとえば染井シズハ。彼女は本来病で命を落とすはずだったけど、ロストアイテムによって生きながらえた」"
translation = "「예를 들어 소메이 시즈하. 그녀는 본래 병으로 목숨을 잃었어야 했지만, 로스트 아이템에 의해 삶을 이어갔어」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「だから何かしら彼女に異変がないか、観察しているんだ」"
translation = "「그래서 혹시 그녀에게 이변이 없는지, 관찰하고 있는 거야」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ああ、警戒しなくても大丈夫だよ、魔王」"
translation = "「아아, 경계하지 않아도 괜찮아, 마왕」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ロストアイテムによる奇跡とはいえ、彼女は試練を乗り越えた。だから連れていくつもりはないよ。念のため様子を見ているだけ」"
translation = "「로스트 아이템에 의한 기적이라고는 해도, 그녀는 시련을 이겨냈어. 그러니까 데려갈 생각은 없어. 만약을 위해 지켜보고 있을 뿐이야」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ただ、このことは本人には秘密にしておいてほしいんだ」"
translation = "「다만, 이 일은 본인에게는 비밀로 해줬으면 좋겠어」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「かつての彼女の生活は、死神に付きまとわれているようなものだっただろうからね。死神に見られてるなんて知らない方がいいでしょ」"
translation = "「과거의 그녀의 생활은, 사신에게 따라다니는 것 같은 상태였을 테니까. 사신이 보고 있다는 건 모르는 편이 낫잖아」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「──！\u3000ごめん、ちょっと隠れるね」"
translation = "「──! 미안, 잠깐 숨을게」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「こんにちは、会長」"
translation = "「안녕하세요, 회장님」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「会長は知ってるかしら？\u3000附属の制服を着た謎の生徒が、附属校に出入りしてるって噂」"
translation = "「회장님은 알고 계시나요? 부속 교복을 입은 수수께끼의 학생이, 부속교를 드나든다는 소문」"

[[dialogue]]
speaker = "unk"
original = "（ギクッ）"
translation = "（찔끔）"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「！\u3000その反応……もしかしてその生徒を知ってるの？\u3000だったらその子のことを教えて」"
translation = "「! 그 반응…… 혹시 그 학생을 알고 있나요? 그렇다면 그 아이에 대해 알려주세요」"

[[dialogue]]
speaker = "unk"
original = "パテルが隠れている方に視線を送ると──"
translation = "파텔이 숨어 있는 쪽으로 시선을 보내자──"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "（言ったでしょ、秘密にしてって。適当にごまかしといて）"
translation = "（말했지, 비밀로 해달라고. 적당히 얼버무려 줘）"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「私、その子にどうしても会いたいの。だって──」"
translation = "「저, 그 아이를 꼭 만나고 싶어요. 왜냐하면──」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「その子、とっても美少女だって聞いたから！\u3000絶対お尻を触って仲良くなるわ！！」"
translation = "「그 아이, 엄청난 미소녀라고 들었거든요! 반드시 엉덩이를 만져서 친해질 거예요!!」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "（あたし狙われてる！？）"
translation = "（나 노려지고 있어!?）"

[[dialogue]]
speaker = "unk"
original = "深淵を覗く時、深淵もこちらを覗いている──そんな言葉が脳裏に浮かんだ。"
translation = "심연을 들여다볼 때, 심연 또한 이쪽을 들여다보고 있다── 그런 말이 뇌리에 스쳤다."

[[dialogue]]
speaker = "unk"
original = "パテルのお尻の運命はいかに。"
translation = "파텔의 엉덩이의 운명은 과연 어떻게 될 것인가."

