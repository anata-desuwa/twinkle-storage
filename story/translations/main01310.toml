[[dialogue]]
speaker = "unk"
original = "第１１話,ある一人の渡し守,B"
translation = "제11화, 어느 한 나루터 지기, B"

[[dialogue]]
speaker = "unk"
original = "旧森羅暦末期──"
translation = "구 신라력 말기──"

[[dialogue]]
speaker = "unk"
original = "世界は厄災に見舞われ、人々は英雄を求めていた。"
translation = "세계는 재앙을 만나, 사람들은 영웅을 바라고 있었다."

[[dialogue]]
speaker = "unk"
original = "これは、そんな時代を生きた、一人の男の物語である。"
translation = "이것은, 그런 시대를 살았던, 한 남자의 이야기이다."

[[dialogue]]
speaker = "unk"
original = "世界には滅亡の機が迫っていた。"
translation = "세계에는 멸망의 기회가 다가오고 있었다."

[[dialogue]]
speaker = "unk"
original = "セレーネ流星群──そう称された流れ星の雨が地上へと降り注ぎ、数多のアステライトが地上を埋め尽くした。"
translation = "셀레네 유성군── 그렇게 칭해진 별똥별의 비가 지상으로 쏟아져 내리고, 수많은 아스테라이트가 지상을 가득 메웠다."

[[dialogue]]
speaker = "unk"
original = "当時の人類はみな、それが再創生の機先であることを知らない。"
translation = "당시의 인류는 모두, 그것이 재창생의 기회임을 알지 못했다."

[[dialogue]]
speaker = "unk"
original = "魔王──リクリエ──スターナイト──そんな単語は世のどこにも存在していなかった。"
translation = "마왕── 리크리에── 스타 나이트── 그런 단어는 세상 어디에도 존재하지 않았다."

[[dialogue]]
speaker = "unk"
original = "ただ、住む世界にかつてない危機が訪れていることは理解していた。"
translation = "다만, 사는 세계에 전례 없는 위기가 찾아왔다는 것은 이해하고 있었다."

[[dialogue]]
speaker = "unk"
original = "だからこそ、人は、時代は、英雄を求めていた。"
translation = "그렇기에, 사람은, 시대는, 영웅을 바라고 있었다."

[[dialogue]]
speaker = "unk"
original = "なれば──後に『英雄』と称されることになる<b>彼</b>は、最初から英雄的な人物だったのだろうか？"
translation = "그렇다면── 후에 『영웅』이라 칭해지게 될 <b>그</b>는, 처음부터 영웅적인 인물이었을까?"

[[dialogue]]
speaker = "unk"
original = "答えは否だ。"
translation = "대답은 '아니오'다."

[[dialogue]]
speaker = "unk"
original = "人間界に住まう青年だったラクシスもまた、どこかに英雄を切望する一人だった。"
translation = "인간계에 살던 청년이었던 라크시스 또한, 어딘가에 영웅을 간절히 바라는 한 사람이었다."

[[dialogue]]
speaker = "unk"
original = "彼は<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>の<ruby>渡<rt>わた</rt></ruby>し<ruby>守<rt>もり</rt></ruby>として生活していた。"
translation = "그는 <ruby>경계의 호수<rt>라고 시에로</rt></ruby>의 나루터 지기로서 생활하고 있었다."

[[dialogue]]
speaker = "unk"
original = "三界を繋ぐ支点において、多くの種族がせわしなく行き交うのを見た。"
translation = "삼계를 잇는 지점에서, 많은 종족이 분주하게 오가는 것을 보았다."

[[dialogue]]
speaker = "unk"
original = "「どこかに、この世界を救ってくれる誰かがいないものだろうか」"
translation = "「어딘가에, 이 세계를 구해줄 누군가가 없는 것일까.」"

[[dialogue]]
speaker = "unk"
original = "度重なる天災により青年は家族を失っていた。"
translation = "거듭되는 천재지변으로 인해 청년은 가족을 잃었다."

[[dialogue]]
speaker = "unk"
original = "そんな彼の希求は、やがて予期せぬ形で実現することになる。"
translation = "그런 그의 희구는, 이윽고 예기치 않은 형태로 실현되게 된다."

[[dialogue]]
speaker = "unk"
original = "ある日──彼は鏡界の湖に<ruby>溺<rt>おぼ</rt></ruby>れてしまった。"
translation = "어느 날── 그는 경계의 호수에 빠져버렸다."

[[dialogue]]
speaker = "unk"
original = "決して生身で落ちてはいけない。意図しなかったこととはいえ、そんな禁忌を破る行いだった。"
translation = "결코 맨몸으로 떨어져서는 안 된다. 의도하지 않은 일이었다고는 하나, 그런 금기를 깨는 행위였다."

[[dialogue]]
speaker = "unk"
original = "彼は死を覚悟した。"
translation = "그는 죽음을 각오했다."

[[dialogue]]
speaker = "unk"
original = "溺れて死ぬか、あるいは幸運に三界のいずこかへ放り出されたとしても、無事で済むはずがないと思った。"
translation = "물에 빠져 죽거나, 혹은 운 좋게 삼계의 어딘가로 내던져진다고 해도, 무사할 리가 없다고 생각했다."

[[dialogue]]
speaker = "unk"
original = "だが、彼を待ち受けていたのは物語よりも数奇な運命だった。"
translation = "하지만, 그를 기다리고 있던 것은 이야기보다도 기이한 운명이었다."

[[dialogue]]
speaker = "unk"
original = "彼が導かれたのは──三界のどこでもない全くの<ruby>異次元宇宙<rt>マルチバース</rt></ruby>。"
translation = "그가 이끌린 곳은── 삼계의 어디도 아닌 완전히 이차원 우주."

[[dialogue]]
speaker = "unk"
original = "そこは、名を流星町といった。"
translation = "그곳은, 이름이 유성 마을이라고 했다."

