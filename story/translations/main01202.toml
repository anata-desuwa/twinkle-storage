[[dialogue]]
speaker = "unk"
original = "第２話,流星の騎士,B"
translation = "제2화, 유성의 기사, B"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（っ……）"
translation = "（……）"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（ここは──一体、なんだ……？）"
translation = "（여기는── 대체, 뭐지……?）"

[[dialogue]]
speaker = "unk"
original = "白い光に包まれて、呑まれて、そして……"
translation = "하얀 빛에 둘러싸여, 집어삼켜지고, 그리고……"

[[dialogue]]
speaker = "unk"
original = "困惑する俺の意識に──人間界の様子が映し出された。"
translation = "혼란스러워하는 나의 의식에── 인간계의 모습이 비쳤다."

[[dialogue]]
speaker_original = "警官Ａ"
speaker_translation = "경찰관 A"
original = "「最近はアステラの発生が多いな。国外も似たような状況らしい」"
translation = "「요즘은 아스테라 발생이 많군. 국외도 비슷한 상황인 것 같고」"

[[dialogue]]
speaker_original = "警官Ｂ"
speaker_translation = "경찰관 B"
original = "「ああ。だが……それもあって学園の星騎士たちも大層な人手不足と聞く。あの要員はそう簡単に増やせんし、参ったな」"
translation = "「아아. 하지만…… 그 때문에 학원의 성기사들도 엄청난 인력 부족이라고 들었어. 그 요원은 그렇게 쉽게 늘릴 수도 없고, 곤란하군.」"

[[dialogue]]
speaker = "unk"
original = "街の一角で２人の警察官が話をしていた。"
translation = "거리 한구석에서 두 명의 경찰관이 이야기를 나누고 있었다."

[[dialogue]]
speaker = "unk"
original = "彼らの前には巨大なアステライトが浮かび上がっており、すでに近隣の住民たちは急いで避難を開始している。"
translation = "그들 앞에는 거대한 아스테라이트가 떠올라 있었고, 이미 인근 주민들은 서둘러 피난을 시작하고 있었다."

[[dialogue]]
speaker = "unk"
original = "そこへ、大剣をたずさえた一人の男が通りかかる。"
translation = "그곳으로, 대검을 든 한 남자가 지나간다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「──六号級の未確認アステラとお見受けする。処理に当たるが、構わないか？」"
translation = "「──6호급 미확인 아스테라로 보입니다. 처리에 임하려 하는데, 괜찮겠습니까?」"

[[dialogue]]
speaker_original = "警官Ｂ"
speaker_translation = "경찰관 B"
original = "「おっと──あんたが噂の──教皇庁のトラブルシューターか」"
translation = "「이런── 당신이 소문의── 교황청의 트러블 슈터인가」"

[[dialogue]]
speaker_original = "警官Ａ"
speaker_translation = "경찰관 A"
original = "「助かるぜ。確か、流星の騎士だったか」"
translation = "「살았군. 분명, 유성의 기사였지?」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「自分で名乗っているわけではないがな」"
translation = "「스스로 이름을 대고 다니는 건 아니지만.」"

[[dialogue]]
speaker = "unk"
original = "その街並みは俺の知る流星市国とどことなく違っていた。"
translation = "그 거리 풍경은 내가 아는 유성 시국과는 어딘가 달랐다."

[[dialogue]]
speaker = "unk"
original = "これは……過去だ。俺が物心つくより前の、昔の光景だった。"
translation = "이것은…… 과거다. 내가 철들기 전의, 옛날 풍경이었다."

[[dialogue]]
speaker = "unk"
original = "でも、どうして……"
translation = "하지만, 어째서……"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「私は英雄ではない。だが、厄災に抗する手立てを失ったわけではない」"
translation = "「나는 영웅이 아니다. 하지만, 액재에 저항할 수단을 잃은 것은 아니다.」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「学園に属さなくなった今も──こうして、人里に巣食うリクリエの余波から人々を守ることで」"
translation = "「학원에 속하지 않게 된 지금도── 이렇게, 인가에 들끓는 리크리에의 여파로부터 사람들을 지킴으로써」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（これ──は──……）"
translation = "（이것──은──……）"

[[dialogue]]
speaker = "unk"
original = "馴染みある声音でようやく気づく。"
translation = "익숙한 목소리로 겨우 깨닫는다."

[[dialogue]]
speaker = "unk"
original = "これは……セイファート学園長の歩んできた、人生の軌跡だ。"
translation = "이것은…… 세이퍼트 학원장이 걸어온, 인생의 궤적이다."

[[dialogue]]
speaker = "unk"
original = "そこからさらに意識が埋没していき、やがて俺の視界は若かりし学園長のそれと一体となった。"
translation = "그곳에서 더욱 의식이 매몰되어 가더니, 이윽고 나의 시야는 젊은 시절 학원장의 그것과 하나가 되었다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "（リクリエ。３０００年越しに世界を襲う、終焉の<ruby>大厄災<rt>だいやくさい</rt></ruby>。私の使命は、常にその迎撃にあった）"
translation = "（리크리에. 3000년 만에 세계를 덮치는, 종언의 대액재. 나의 사명은, 항상 그것을 요격하는 데 있었다.)"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "（<ruby>星騎士<rt>スターナイト</rt></ruby>としての責務を終えた後も……ひとりでに各地を巡り、街や人々を守っていた）"
translation = "(<ruby>성기사<rt>스타 나이트</rt></ruby>로서의 책무를 마친 후에도…… 홀로 각지를 돌아다니며, 마을과 사람들을 지키고 있었다.)"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "（流星の騎士──そう、むずがゆくなるような名で呼ばれながらも）"
translation = "（유성의 기사── 그래, 간지러워지는 듯한 이름으로 불리면서도）"

[[dialogue]]
speaker = "unk"
original = "リクリエ現象にまつわるアステラやモンスターといった被害は、日を追うごとに増していた。"
translation = "리크리에 현상에 얽힌 아스테라나 몬스터 같은 피해는, 날이 갈수록 늘어나고 있었다."

[[dialogue]]
speaker = "unk"
original = "流星学園の星騎士たちが懸命にその対処へ当たっていたが限界はある。"
translation = "유성 학원의 성기사들이 열심히 그 대처에 임하고 있었지만 한계는 있었다."

[[dialogue]]
speaker = "unk"
original = "とりわけ、流星市国の外で発生するイレギュラーなアステラについては、星騎士の出動による対処が極めて難しくなっていた。"
translation = "특히, 유성 시국 밖에서 발생하는 불규칙적인 아스테라에 대해서는, 성기사의 출동에 의한 대처가 극히 어려워지고 있었다."

[[dialogue]]
speaker = "unk"
original = "よって……そんな星騎士たちの<ruby>掌<rt>てのひら</rt></ruby>からこぼれ落ちた範囲をカバーするのが、私の役目だった。"
translation = "따라서…… 그런 성기사들의 손바닥에서 흘러넘친 범위를 커버하는 것이, 나의 역할이었다."

[[dialogue]]
speaker_original = "流星教皇"
speaker_translation = "유성 교황"
original = "「──さすがだ。ジェラルド。たびたび無理を言ってすまないな」"
translation = "「──역시군. 제럴드. 자주 무리한 부탁을 해서 미안하네.」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「好き好んでやっていることだ。そちらこそ、こんな根無し草の支援を引き受けてくれて感謝する」"
translation = "「좋아서 하는 일이다. 그쪽이야말로, 이런 떠돌이의 지원을 맡아줘서 감사한다.」"

[[dialogue]]
speaker = "unk"
original = "次期流星教皇──マリウスとは旧知の仲だった。"
translation = "차기 유성 교황── 마리우스와는 오랜 친구 사이였다."

[[dialogue]]
speaker = "unk"
original = "彼は昨今の情勢を鑑み、表立って動けないような事件・騒動の後処理を決まって私に頼んできた。"
translation = "그는 작금의 정세를 감안하여, 표면적으로 움직일 수 없는 사건·소동의 뒷처리를 항상 나에게 부탁해 왔다."

[[dialogue]]
speaker = "unk"
original = "流星の騎士の名を知る者はごく少数に限られた。"
translation = "유성의 기사라는 이름을 아는 자는 극소수에 한정되었다."

[[dialogue]]
speaker = "unk"
original = "私には地位も名声もなく、ただ西へ東へ駆けずり回った。"
translation = "나에게는 지위도 명성도 없이, 그저 서쪽으로 동쪽으로 뛰어다녔다."

[[dialogue]]
speaker = "unk"
original = "私の旅路は、時に人間界をも飛び出した。"
translation = "나의 여정은, 때로는 인간계마저 뛰쳐나갔다."

[[dialogue]]
speaker_original = "マルキア"
speaker_translation = "마르키아"
original = "「──変な人ね。わざわざ魔界まできて、身を<ruby>擲<rt>なげう</rt></ruby>ってくれるなんて」"
translation = "「──이상한 사람이네. 일부러 마계까지 와서, 몸을 던져주는 걸 보니.」"

[[dialogue]]
speaker = "unk"
original = "魔界の果てで妻と出会った。"
translation = "마계의 끝에서 아내와 만났다."

[[dialogue]]
speaker = "unk"
original = "当時、その地は過酷なリクリエの煽りを受けて、破滅の郷と化していた。"
translation = "당시, 그곳은 가혹한 리크리에의 여파를 받아, 파멸의 고향으로 변해 있었다."

[[dialogue]]
speaker = "unk"
original = "彼女──マルキアはそこで『戦姫』と称され、日夜終わりなきモンスター達との闘争を続けていた。"
translation = "그녀── 마르키아는 그곳에서 『전희』라 칭해지며, 밤낮없이 끝없는 몬스터들과의 투쟁을 계속하고 있었다."

[[dialogue]]
speaker = "unk"
original = "そうすることでしか村や家族を守れなかったのだという。"
translation = "그렇게 하는 것으로밖에 마을이나 가족을 지킬 수 없었다고 한다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「力は大切だ。私もずっと、あまねく総てを守れる力を渇望している」"
translation = "「힘은 소중하다. 나도 줄곧, 널리 모든 것을 지킬 수 있는 힘을 갈망하고 있다.」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「だが……常に己一人を頼る必要は、どこにもない」"
translation = "「하지만…… 항상 자기 혼자에게 의지할 필요는, 어디에도 없다.」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「あなたが鬼神なら、私は奇人でよい。共にこの終わりなき闘争を終わらせよう」"
translation = "「당신이 귀신이라면, 나는 기인으로 족하다. 함께 이 끝없는 투쟁을 끝내자.」"

[[dialogue]]
speaker = "unk"
original = "私たちは互いの力を合わせ、<ruby>禍<rt>わざわ</rt></ruby>いの根を断つことに成功した。"
translation = "우리는 서로의 힘을 합쳐, 재앙의 뿌리를 끊는 데 성공했다."

[[dialogue]]
speaker = "unk"
original = "私たちは運命的に恋に落ち、やがて流星市国へと帰って穏やかな日々を過ごすこととなった。"
translation = "우리는 운명적으로 사랑에 빠졌고, 이윽고 유성 시국으로 돌아가 평온한 나날을 보내게 되었다."

[[dialogue]]
speaker_original = "マルキア"
speaker_translation = "마르키아"
original = "「いい子ね、アニュラス──しっかりパパを見習うのよ」"
translation = "「착한 아이네, 아뉴라스── 제대로 아빠를 본받으렴.」"

[[dialogue]]
speaker = "unk"
original = "そして娘が生まれた。"
translation = "그리고 딸이 태어났다."

[[dialogue]]
speaker = "unk"
original = "後にして思えば、あれこそ幸福というものだったのだろう。"
translation = "나중에 생각해보니, 그것이야말로 행복이라는 것이었으리라."

[[dialogue]]
speaker = "unk"
original = "なにせ私はその後の人生において、かの一瞬の輝きを永劫追い求めることになるのだから。"
translation = "왜냐하면 나는 그 후의 인생에서, 그 한순간의 빛을 영원히 쫓게 될 것이기 때문이다."

[[dialogue]]
speaker_original = "流星教皇"
speaker_translation = "유성 교황"
original = "「……マルキア殿が失踪した？」"
translation = "「……마르키아 님이 실종되었다고?」"

[[dialogue]]
speaker = "unk"
original = "ある日。妻が原因不明の失踪を遂げた。"
translation = "어느 날. 아내가 원인 불명의 실종을 당했다."

[[dialogue]]
speaker = "unk"
original = "私が国外のアステラ駆除へ出ている間の、ほんの数時間の出来事だった。"
translation = "내가 국외의 아스테라 구제에 나가 있는 동안의, 불과 몇 시간 만의 일이었다."

