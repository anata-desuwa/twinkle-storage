[[dialogue]]
speaker = "unk"
original = "第１話,モネのモテ期！？,P"
translation = "제1화, 모네의 인기 절정기!?"

[[dialogue]]
speaker = "unk"
original = "先日の事件で深淵書庫を出たリィベルは、新星学園に籍を置くこととなり、それに伴って<ruby>新星学園寮<rt>ラルーナ</rt></ruby>に入寮した。"
translation = "요전번 사건으로 심연서고를 나온 리벨은, 신성 학원에 적을 두게 되었고, 그에 따라 <ruby>신성 학원 기숙사<rt>라 루나</rt></ruby>에 입사했다."

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「モネ、髪の毛かわかして」"
translation = "「모네, 머리카락 말려줘」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「リィベルさん、お風呂上がりですか？\u3000いいですよ。……ふふ、リィベルさんの髪、長くてサラサラですごく綺麗」"
translation = "「리벨 씨, 목욕하고 나오셨나요? 좋아요. ……후후, 리벨 씨 머리카락, 길고 찰랑거려서 정말 예뻐요」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「髪ならあなたも伸ばせばいいじゃない」"
translation = "「머리카락이라면 너도 기르면 되잖아」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「私はちょっとくせっ毛なので、伸ばすと収拾がつかなくて……」"
translation = "「저는 약간 곱슬기라서, 기르면 수습이 안 돼서……」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「ふぅん」"
translation = "「흐응」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「モネ、課題やって」"
translation = "「모네, 과제 해줘」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「学園の課題は自分でやらないとダメですよ。お手伝いしますから、頑張りましょう？」"
translation = "「학원 과제는 스스로 하지 않으면 안 돼요. 도와드릴 테니까, 힘내볼까요?」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「うぅ、めんどくさい……数学なんてリクリエを滅ぼすのに要らないでしょうに」"
translation = "「우으, 귀찮아…… 수학 같은 건 리크리에를 멸망시키는 데 필요 없잖아」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「リクリエはともかく、数学の参考書もいいものです。一度じっくり読んでみてください」"
translation = "「리크리에는 둘째치고, 수학 참고서도 좋은 거예요. 한번 찬찬히 읽어보세요」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ちなみに参考書ならオススメは<ruby>隈参社<rt>くまさんしゃ</rt></ruby>ですね。図解がとてもわかりやすくて、夏休みの推薦図書にしたいくらいですよ」"
translation = "「참고로 참고서라면 추천하는 건 쿠마산샤예요. 도해가 아주 알기 쉬워서, 여름 방학 추천 도서로 삼고 싶을 정도예요」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「す、推薦図書！？\u3000参考書なのに！？」"
translation = "「추, 추천 도서!? 참고서인데!?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「じー……」"
translation = "「지이──……」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「あれ？\u3000今誰かいたような……？」"
translation = "「어라? 방금 누군가 있었던 것 같은……?」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「モネ。今度の週末、買い物に付き合って」"
translation = "「모네. 이번 주말에, 쇼핑 같이 가줘」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「えっと、今週末の予定は……はい、大丈夫ですよ。何を買いに行くんですか？」"
translation = "「엣, 이번 주말 예정은…… 네, 괜찮아요. 뭘 사러 가시는 건가요?」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「下着よ」"
translation = "「속옷이야」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「え、下着ですか！？」"
translation = "「에, 속옷인가요!?」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「そう。種類もサイズも多すぎて、何を買えばいいか分からないのよ」"
translation = "「그래. 종류도 사이즈도 너무 많아서, 뭘 사야 할지 모르겠어」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「なるほど……でも、私には荷が重いというか……」"
translation = "「그렇군요…… 하지만, 저에게는 짐이 무겁달까……」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「そうなの？」"
translation = "「그래?」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「リィベルさんは私でいいんですか？\u3000私、センスには自信がなくて……」"
translation = "「리벨 씨는 저로 괜찮으신가요? 저, 센스에는 자신이 없어서……」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「そうは言っても、ファッション雑誌だって読み込んでいるんでしょう？\u3000大丈夫よ、私はモネを信じているわ」"
translation = "「그렇게 말해도, 패션 잡지도 꼼꼼히 읽고 있잖아? 괜찮아, 나는 모네를 믿고 있어」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「わ、わかりました！\u3000不肖、紙屋敷モネ、リィベルさんの下着選びを成功させてみせます！」"
translation = "「아, 알겠습니다! 부족하지만 카미야시키 모네, 리벨 씨의 속옷 고르기를 성공시켜 보이겠어요!」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「じゃあ、週末はお買い物して、そのあと何か甘いものでも……」"
translation = "「그럼, 주말에는 쇼핑하고, 그 후에 뭔가 단것이라도……」"

[[dialogue]]
speaker = "？？？"
original = "「チョット待つで～す！！」"
translation = "「잠깐 기다리는 거여요～!!」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「わっ、リップルさん！？」"
translation = "「왓, 리플 씨!?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ワタシもモネと遊びに行きタイで～す！\u3000リィベルはモネをひとりジメしすぎでーす！」"
translation = "「와타시도 모네와 놀러 가고 싶슴다! 리벨은 모네를 너무 독차지함다!」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「何なの、この天使……寮で見かけたことはあるけど、なんでいつも水着なのよ」"
translation = "「뭐야, 이 천사는…… 기숙사에서 본 적은 있지만, 왜 항상 수영복인 거야」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「それはいつも夏のココロを忘れないタメでーす！\u3000水着は夏のショーチョーです！」"
translation = "「그건 언제나 여름의 마음을 잊지 않기 위해서임다! 수영복은 여름의 상징임다!」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「そう……」"
translation = "「그래……」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "（勢いで頷いてしまったけど意味がわからないわ。そんなに水着姿を人に見せたいのかしら）"
translation = "(기세에 눌려 고개를 끄덕였지만 의미를 모르겠어. 그렇게나 수영복 차림을 남에게 보여주고 싶은 걸까)"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「それより、リィベルはモネをドクセンしてます！\u3000断固コーギーします！」"
translation = "「그보다, 리벨은 모네를 독점하고 있슴다! 단호히 항의함쇼!」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「それを言うなら断固抗議では……え、独占、ですか？」"
translation = "「그걸 말하려면 단호히 항의…… 에, 독점, 인가요?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ソウです！\u3000モネは最近リィベルばっかりカマってます！\u3000ワタシはＢＩＧサビシイです！」"
translation = "「그렇슴다! 모네는 요즘 리벨만 챙겨줌다! 와타시는 BIG 외롭슴다!」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「そんなのモネの勝手でしょうに。子どもじゃないんだから我慢しなさい」"
translation = "「그런 건 모네 마음이잖아. 어린애도 아니니까 참아」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「リィベルさん、そんな言い方は……」"
translation = "「리벨 씨, 그런 말투는……」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「リィベルこそお子様でーす！\u3000いつもモネに甘えてバカリです！」"
translation = "「리벨이야말로 어린애임다! 언제나 모네에게 어리광만 부림다!」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「リップルさんも！」"
translation = "「리플 씨도!」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ムー……」"
translation = "「무우……」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「え、えっとえっと……」"
translation = "「에, 에또에또……」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ふたりとも、私のために争わないでください！！」"
translation = "「두 분 다, 저 때문에 싸우지 마세요!!」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "（言っちゃった～！ よりにもよって変なこと言っちゃったよ～！！）"
translation = "(말해버렸다～! 하필이면 이상한 소릴 해버렸어～!!)"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「あ、モネさんこんにちは。図書館にあるか探していただきたい本がありまして──」"
translation = "「아, 모네 씨 안녕하세요. 도서관에 있는지 찾아봐 주셨으면 하는 책이 있어서──」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「おや、お取込み中でしたか？」"
translation = "「오야, 한창 바쁘신 중이었나요?」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「イクシーさんまで！？」"
translation = "「익실 씨까지!?」"

[[dialogue]]
speaker = "unk"
original = "俺の彼女にモテ期が来た！？"
translation = "내 여자친구에게 인기 절정기가 왔다!?"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ってなんで会長が！？\u3000いつからそこに！？」"
translation = "「근데 왜 회장님이!? 언제부터 거기에!?」"

[[dialogue]]
speaker = "unk"
original = "リップルより前くらい"
translation = "리플보다 전부터"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「じゃ、じゃあ……さっきのも見てました、よね？」"
translation = "「그, 그럼…… 아까 그것도 보셨겠, 네요?」"

[[dialogue]]
speaker = "unk"
original = "俺の彼女がモテモテで鼻が高い"
translation = "내 여자친구가 인기가 많아서 어깨가 으쓱하네"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「も～、からかわないでくださーい！」"
translation = "「정말～, 놀리지 마세요!」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「あなたたち、付き合ってたのね。それならそうと言えばいいのに。私は今度でいいから、デートでも行ってきなさい」"
translation = "「너희들, 사귀고 있었구나. 그러면 그렇다고 말하면 좋을 텐데. 나는 다음에도 괜찮으니까, 데이트라도 다녀와」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「行ってラッシャイで～す！\u3000ゴユックリ～！」"
translation = "「다녀오심쇼여요! 푹 쉬다 오심쇼!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「デート楽しんできてくださいね、モネさん。……その後はしっぽりと……」"
translation = "「데이트 즐겁게 다녀오세요, 모네 씨. ……그 후에는 오붓하게……」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「うぅ、みんなの視線が生温かい……」"
translation = "「우으, 모두의 시선이 미적지근해……」"

[[dialogue]]
speaker = "unk"
original = "みんなの快諾も得て、無事（？）デートの約束を取り付けたのだった。"
translation = "모두의 쾌락도 얻어, 무사히(?) 데이트 약속을 잡아낸 것이었다."

