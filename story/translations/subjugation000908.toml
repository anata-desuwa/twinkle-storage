[[dialogue]]
speaker = "unk"
original = "１００年前。ソフレがフェリーチェに敗北し、封印の説明を聞いた後のこと――"
translation = "100년 전. 소프레가 펠리체에게 패배하고 봉인에 대한 설명을 들은 뒤──"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「くっ……！」"
translation = "「큭……!」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「どうして、ソフレが人間風情なんかに……！」"
translation = "「어째서 소프레가 인간 따위에게……!」"

[[dialogue]]
speaker_original = "フェリーチェ"
speaker_translation = "펠리체"
original = "「――本気でアンタにムカついたからな。アタシはただ、それを星術に込めてぶつけただけだ」"
translation = "「──진심으로 네가 짜증 났거든. 난 그냥 그 마음을 성술에 담아 부딪혔을 뿐이야.」"

[[dialogue]]
speaker_original = "フェリーチェ"
speaker_translation = "펠리체"
original = "「アタシはそういう強い気持ちを、力に変えられる『<ruby>祓魔師<rt>エクソシスト</rt></ruby>』なんでね」"
translation = "「난 그런 강한 마음을 힘으로 바꿀 수 있는 『엑소시스트』라서 말이지.」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「そんな……馬鹿なことが……！」"
translation = "「그런…… 말도 안 되는 일이……!」"

[[dialogue]]
speaker_original = "フェリーチェ"
speaker_translation = "펠리체"
original = "「こうして、実際に起こっただろ？\u3000逆転の奇跡ってやつが」"
translation = "「이렇게 실제로 일어났잖아? 역전의 기적이라는 게.」"

[[dialogue]]
speaker_original = "フェリーチェ"
speaker_translation = "펠리체"
original = "「でもまぁ、ムカつきはしたが、アンタのプライドの高さは嫌いじゃなかったぜ」"
translation = "「하지만 뭐, 짜증은 났지만 네 그 높은 자존심은 싫지 않았어.」"

[[dialogue]]
speaker_original = "フェリーチェ"
speaker_translation = "펠리체"
original = "「だから、封印するだけで勘弁してやるよ」"
translation = "「그러니까 봉인하는 정도로 봐주지.」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「３０００年も惨めに、生き恥を晒せだなんて……！」"
translation = "「3000년이나 비참하게 살아있는 치욕을 겪으라니……!」"

[[dialogue]]
speaker_original = "フェリーチェ"
speaker_translation = "펠리체"
original = "「お前のプライド高さは、死んでも直らんだろ。アタシにも直せる気がしねぇ」"
translation = "「네 그 높은 자존심은 죽어도 안 고쳐질 거 아냐. 나도 고칠 수 있을 것 같지 않고.」"

[[dialogue]]
speaker_original = "フェリーチェ"
speaker_translation = "펠리체"
original = "「アタシはアンタと同じ、プライド高いタチなんでね。相性最悪ってやつだ。だから――」"
translation = "「나도 너처럼 자존심 높은 성격이라서 말이야. 상성이 최악이라는 거지. 그러니까──」"

[[dialogue]]
speaker_original = "フェリーチェ"
speaker_translation = "펠리체"
original = "「せいぜい、死なずに待ってみろよ」"
translation = "「기왕이면 죽지 말고 기다려 봐.」"

[[dialogue]]
speaker_original = "フェリーチェ"
speaker_translation = "펠리체"
original = "「そうすりゃ案外、面白いことが起こるかもしれないぜ？」"
translation = "「그러면 의외로 재미있는 일이 일어날지도 모르잖아?」"

[[dialogue]]
speaker_original = "フェリーチェ"
speaker_translation = "펠리체"
original = "「じゃあな。あばよ、吸血鬼――」"
translation = "「그럼 이만. 잘 있어라, 흡혈귀──」"

[[dialogue]]
speaker_original = "フェリーチェ"
speaker_translation = "펠리체"
original = "「いつかアンタにも、よき祝福のあらんことを」"
translation = "「언젠가 너에게도 좋은 축복이 있기를.」"

[[dialogue]]
speaker = "unk"
original = "地下図書館でソフレの偽物達を全て倒し切り、防衛システムの一時的な停止まで持っていくことができた翌日。"
translation = "지하 도서관에서 소프레의 가짜들을 전부 물리치고 방어 시스템의 일시 정지까지 끌어낸 다음 날."

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「――改めて、保健室を調べてみた結果、地下図書館から空間を繋げた痕跡が見つかったわ」"
translation = "「──다시 보건실을 조사해 본 결과, 지하 도서관에서 공간을 연결한 흔적이 발견됐어.」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「つまり、目撃されていた不審者の正体は、地下図書館の防衛システムによって生み出された、ソフレの偽物だったってことで間違いないわ」"
translation = "「그러니까, 목격되었던 수상한 자의 정체는 지하 도서관의 방여 시스템에 의해 만들어진 소프레의 가짜였다는 게 틀림없겠네.」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「連中は、ソフレのコピーのことを実験体だって言っていたのだわ」"
translation = "「그놈들은 소프레의 복제본을 실험체라고 부르고 있었던 거예요.」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「実験って、一体何の目的で……？」"
translation = "「실험이라니, 대체 무슨 목적으로……?」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「もしその実験が、保健室に空間を繋げて出入りすることだったとすれば――」"
translation = "「만약 그 실험이 보건실에 공간을 연결해서 출입하는 것이었다고 한다면──」"

[[dialogue]]
speaker = "unk"
original = "防衛システムの行動範囲を広げる為？"
translation = "방어 시스템의 행동 범위를 넓히기 위해서?"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「……想像したくないけど、その可能性はあるわね」"
translation = "「……상상하고 싶지 않지만, 그럴 가능성은 있겠네.」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「ソフレをコピー対象に選んだのは、１００年前の封印術式で行動範囲の制限を受けているから」"
translation = "「소프레를 복제 대상으로 선택한 건, 100년 전의 봉인 술식으로 행동 범위의 제한을 받고 있기 때문이야.」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「その封印術式を解析したことで、今回実際に防衛システムが地上まで進出してきた……ってことですか？」"
translation = "「그 봉인 술식을 해석함으로써, 이번에 실제로 방어 시스템이 지상까지 진출해 왔다……는 건가요?」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「恐ろしいことにね。まさか、防衛システムがこんな暴走を引き起こすだなんて……」"
translation = "「공포스럽게도 말이지. 설마 방어 시스템이 이런 폭주를 일으키다니……」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「前にも、地下図書館の入り口のロックが勝手に外れてしまったことがあった。その時は原因が分からなかったけど――」"
translation = "「전에도 지하 도서관 입구의 잠금이 멋대로 풀려버린 적이 있었어. 그때는 원인을 몰랐지만──」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「それも今思えば、防衛システムの暴走だったのかもしれない。いずれにせよ、今後はもっとしっかり警戒していく必要があるわ」"
translation = "「그것도 지금 생각하면 방어 시스템의 폭주였을지도 몰라. 어쨌든 앞으로는 좀 더 철저히 경계할 필요가 있겠어.」"

[[dialogue]]
speaker = "unk"
original = "でも、とりあえず今回は一件落着かな"
translation = "하지만 일단 이번 일은 일단락된 걸까."

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「うん！\u3000今回の件がちゃんと活躍として認められて、ソフレの封印も刑期が短くなったしね！」"
translation = "「응! 이번 건이 제대로 활약으로 인정받아서, 소프레의 봉인 형기도 짧아졌고 말이야!」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「あら、そうなの？\u3000ソフレ、よかったじゃない」"
translation = "「어라, 그래? 소프레, 잘됐네.」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「短くなったと言っても、たった１００年ぽっちなのよ。これまで過ごした分を引いても、まだ２８００年分も残っているのだわ」"
translation = "「짧아졌다고 해도 고작 100년뿐인 거예요. 지금까지 지낸 만큼을 빼도 아직 2800년이나 남은 거예요.」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「え～？\u3000大進歩だよ！」"
translation = "「에~? 대진보라구!」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「これから私たちはリクリエを阻止する為に戦うわけだし、この調子で星騎士として活躍すれば、きっと学園を卒業するまでに間に合うって！」"
translation = "「앞으로 우리는 리크리에를 저지하기 위해 싸울 테고, 이 기세로 성기사로서 활약하면 분명 학원을 졸업하기 전까지는 맞출 수 있을 거야!」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「別に、次の卒業に間に合わせる必要もないのだわ」"
translation = "「딱히 다음 졸업에 맞출 필요도 없는 거예요.」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「いや、頑張ろうよ！\u3000だって――」"
translation = "「아니, 힘내보자! 그게──」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「私、ソフレと一緒に学園を卒業したいし！」"
translation = "「나, 소프레랑 같이 학원을 졸업하고 싶으니까!」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「で、卒業したら、一緒にイタリアへ旅行に行こう！\u3000お母さんやお祖母ちゃんに、伝説の吸血鬼と友達になったんだよって、紹介したいんだ！」"
translation = "「그래서 졸업하면 같이 이탈리아로 여행 가자! 엄마랑 증조할머니한테 전설의 흡혈귀랑 친구가 됐다고 소개해 주고 싶거든!」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「り、旅行って……いきなり何を言い出すのよ、お前は……」"
translation = "「여, 여행이라니…… 갑자기 무슨 소릴 하는 거냐, 너는……」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「今回で頑張ればソフレの封印は解けるって実感したから、目標ができたっていうか……ソフレと卒業旅行に行きたいなって思ったんだ！」"
translation = "「이번에 열심히 하면 소프레의 봉인이 풀릴 수 있다는 걸 실감했으니까 목표가 생겼달까…… 소프레랑 졸업 여행을 가고 싶다고 생각했어!」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「ソフレがなんでそんなこと……というか、そもそもお前と友達になった覚えはないのだわ！」"
translation = "「소프레가 왜 그런…… 그보다 애초에 너랑 친구가 된 기억은 없는 거예요!」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「これからなる予定だし！\u3000とにかく、一緒に学園を卒業できるように頑張ろうよ！」"
translation = "「앞으로 될 예정이고! 아무튼 같이 학원을 졸업할 수 있도록 노력하자!」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「ああもう、お前はいつもそうやって強引に……勝手に決めるんじゃないのだわ！\u3000大体――」"
translation = "「아 정말, 너는 언제나 그렇게 강압적으로…… 멋대로 정하지 마는 거예요! 애초에──」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「ソフレは１００年も遠出してなかったのだから、旅行バッグなんて持ってないのだわ！」"
translation = "「소프레는 100년이나 멀리 나간 적이 없으니까 여행 가방 같은 건 없는 거예요!」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「……それって」"
translation = "「……그거」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「旅行バッグがあれば、一緒に行くのはＯＫってこと！？」"
translation = "「여행 가방이 있으면 같이 가는 건 OK라는 뜻!?」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「は！？\u3000い、いやいや、今のは違うのだわ！\u3000まだ了承したわけじゃ……！」"
translation = "「하!? 아, 아니아니, 방금 건 틀린 거예요! 아직 승낙한 건……!」"

[[dialogue]]
speaker = "unk"
original = "前向きには考えてるってことだよね？"
translation = "긍정적으로 생각하고 있다는 뜻이지?"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「ちょっ、会長！？\u3000何を言っているのだわ！？」"
translation = "「잠깐, 회장!? 무슨 말을 하는 거예요!?」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「ふふっ、卒業旅行、いいじゃない」"
translation = "「후훗, 졸업 여행, 좋잖아.」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「ウィステリアまで！\u3000ち、違うから！」"
translation = "「위스테리아까지! 아, 아니니까!」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「ソフレはまだ何も認めてないのだわ～～～っ！」"
translation = "「소프레는 아직 아무것도 인정하지 않은 거예요~~~!」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「あっ……ふふっ！\u3000あははっ♪」"
translation = "「앗…… 후훗! 아하하♪」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「ソフレ、顔が赤くなってる～！」"
translation = "「소프레, 얼굴 빨개졌다~!」"

[[dialogue]]
speaker = "unk"
original = "ソフレの反応を見て、フェリシーは嬉しそうに笑うのだった。"
translation = "소프레의 반응을 보고 펠리시는 기쁜 듯이 웃는 것이었다."

