[[dialogue]]
speaker = "unk"
original = "第２話,学園対抗杯とまだ見ぬライバル,P"
translation = "제2화, 학원 대항배와 아직 보지 못한 라이벌, P"

[[dialogue]]
speaker = "unk"
original = "とある放課後、新星寮の近くを通りかかると、マハムート先輩とフィオナが話しているのを見かけた。"
translation = "어느 방과 후, 신성 기숙사 근처를 지나가다 마하무트 선배와 피오나가 이야기하는 것을 보았다."

[[dialogue]]
speaker = "マハムート"
original = "「ん……？\u3000あら、会長じゃない」"
translation = "「음……? 어라, 회장 아니니.」"

[[dialogue]]
speaker = "フィオナ"
original = "「緋宮会長、こんにちは。お邪魔してます」"
translation = "「히노미야 회장님, 안녕하세요. 실례하고 있습니다.」"

[[dialogue]]
speaker = "unk"
original = "こんにちは。２人で何を話してたの？"
translation = "안녕. 둘이서 무슨 얘기 하고 있었어?"

[[dialogue]]
speaker = "マハムート"
original = "「『学園対抗杯』のことについて話してたのよ。流星寮はどんな調子かってね」"
translation = "「『학원 대항배』에 대해 이야기하고 있었어. 유성 기숙사는 어떤 상태인지 말이지.」"

[[dialogue]]
speaker = "マハムート"
original = "「前にも話したけど、『学園対抗杯』を通じて、流星学園と新星学園はお互いに切磋琢磨し合っているの」"
translation = "「전에도 말했지만, 『학원 대항배』를 통해서 유성 학원과 신성학원은 서로 절차탁마하고 있어」"

[[dialogue]]
speaker = "unk"
original = "そういえば、学園対抗杯の内容って？"
translation = "그러고 보니, 학원 대항배의 내용은?"

[[dialogue]]
speaker = "マハムート"
original = "「会長の仕事を覚えるので忙しくて、『学園対抗杯』まで気が回らなかったって顔ね」"
translation = "「회장 업무를 익히느라 바빠서, 『학원 대항배』까지는 신경 쓸 겨를이 없었다는 표정이네」"

[[dialogue]]
speaker = "マハムート"
original = "「やれやれ仕方ないわね、教えてあげるわ。畏怖をもって感謝なさい」"
translation = "「이런 어쩔 수 없네, 가르쳐 주도록 하지. 경외심을 가지고 감사하도록 해」"

[[dialogue]]
speaker = "マハムート"
original = "「私たちは普段、アステラが出現するたびに出動しているでしょう？\u3000星徒会は直接アステラへ、その他のプリマステラは外に出たモンスターの掃討を行っている」"
translation = "「우리는 평소 아스텔라가 출현할 때마다 출동하고 있잖아? 성도회는 직접 아스텔라로, 그 외의 프리마스텔라는 밖으로 나온 몬스터의 소탕을 수행하고 있지」"

[[dialogue]]
speaker = "マハムート"
original = "「出現モンスターの種類や討伐数は学園の分析官によって、しっかり記録を付けられているというのは、星徒会の仕事をしているアナタなら知っているわね？」"
translation = "「출현 몬스터의 종류나 토벌 수는 학원의 분석관에 의해 확실히 기록되고 있다는 건, 성도회 일을 하고 있는 당신이라면 알고 있겠지?」"

[[dialogue]]
speaker = "マハムート"
original = "「その戦績を、新星学園と流星学園に振り分けて競うのが『学園対抗杯』よ」"
translation = "「그 전적을 신성학원과 유성 학원에 나누어 경쟁하는 것이 『학원 대항배』야」"

[[dialogue]]
speaker = "フィオナ"
original = "「『学園対抗杯』は毎年行われていて、１年ごとに結果が発表されます」"
translation = "「『학원 대항배』는 매년 열리고 있으며, 1년마다 결과가 발표됩니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「普段の戦績以外にも、いくつか成績が加点される年間行事があったりして、それらの成績も加味して、総合成績が出される形です」"
translation = "「평소의 전적 외에도 몇 가지 성적이 가점되는 연간 행사가 있기도 해서, 그런 성적들도 가미하여 종합 성적이 나오는 형태예요」"

[[dialogue]]
speaker = "マハムート"
original = "「『学園対抗杯』は私のように強くこだわっている生徒もいれば、特に気にしていない生徒も居るけれど、寮生は概ねこだわっているわね」"
translation = "「『학원 대항배』는 나처럼 강하게 집착하는 학생도 있는가 하면, 딱히 신경 쓰지 않는 학생도 있지만, 기숙사생들은 대체로 집착하는 편이지」"

[[dialogue]]
speaker = "マハムート"
original = "「それは、『学園対抗杯』の成績で次年度の寮の予算が大きく変動するからよ」"
translation = "「그건 『학원 대항배』의 성적에 따라 다음 연도 기숙사 예산이 크게 변동하기 때문이야」"

[[dialogue]]
speaker = "マハムート"
original = "「会長もこの前、新星寮と流星寮の設備格差を見たでしょう？」"
translation = "「회장도 요전에 신성 기숙사와 유성 기숙사의 시설 격차를 봤지?」"

[[dialogue]]
speaker = "フィオナ"
original = "「あ、あれは……元寮長のＯＧが、流星寮を愛する余り暴走した結果と言いますか……」"
translation = "「아, 그건…… 전 기숙사장인 OG가 유성 기숙사를 너무 사랑한 나머지 폭주한 결과라고나 할까……」"

[[dialogue]]
speaker = "フィオナ"
original = "「資産家の本気って凄いですよね……あはは」"
translation = "「자산가의 진심이란 대단하네요…… 아하하」"

[[dialogue]]
speaker = "マハムート"
original = "「とにかく、今年こそヒルディオーネのやつをギャフンと言わせてやるわ！」"
translation = "「어쨌든, 올해야말로 힐디오네 그 녀석을 꼼짝 못 하게 해주겠어!」"

[[dialogue]]
speaker = "unk"
original = "ヒルディオーネ？"
translation = "힐디오네?"

[[dialogue]]
speaker = "フィオナ"
original = "「流星寮の寮長<ruby>『白昼の極星』<rt>エトワール・イルソーレ</rt></ruby>の称号を持つ、流星学園の３年生です」"
translation = "「유성 기숙사의 기숙사장 <ruby>『백주의 극성』<rt>에투알 일소레</rt></ruby>이라는 칭호를 가진 유성 학원의 3학년입니다」"

[[dialogue]]
speaker = "マハムート"
original = "「<ruby>千園寺<rt>せんおんじ</rt></ruby>ヒルディオーネ。認めたくないけど、寮長のアイツのお陰で、流星寮が２年連続の勝利をもぎ取っていることは事実よ」"
translation = "「센온지 힐디오네. 인정하고 싶지는 않지만, 기숙사장인 그 녀석 덕분에 유성 기숙사가 2년 연속 승리를 거머쥐고 있는 건 사실이야」"

[[dialogue]]
speaker = "マハムート"
original = "「寮長に選ばれるだけあって、星徒会長のフィオナにも匹敵する実力者よ」"
translation = "「기숙사장에 뽑힐 만한 인재라, 성도회장인 피오나와도 필적하는 실력자야」"

[[dialogue]]
speaker = "フィオナ"
original = "「いえ、それどころか……もしヒルディオーネさんが寮長ではなく星徒会を選んでいたら、会長は私ではなかったかもしれません」"
translation = "「아니요, 그뿐만 아니라…… 만약 힐디오네 씨가 기숙사장이 아니라 성도회를 선택했다면, 회장은 제가 아니었을지도 모릅니다」"

[[dialogue]]
speaker = "unk"
original = "そんなに強いの！？"
translation = "그렇게 강해!?"

[[dialogue]]
speaker = "マハムート"
original = "「言っておくけど、私の方が強いわよ。直接対決はまだしたことないけれど……ヴィーナスやアナタにも、最強の座を譲るつもりはないわ」"
translation = "「말해두겠는데, 내가 더 강해. 직접 대결은 아직 해본 적 없지만…… 비너스나 당신에게도 최강의 자리를 내줄 생각은 없어」"

[[dialogue]]
speaker = "マハムート"
original = "「<ruby>宵闇の極星<rt>エトワール・ラルーナ</rt></ruby>という称号は伊達じゃないと言ったでしょう？」"
translation = "「<ruby>초저녁의 극성<rt>에투알 라 루나</rt></ruby>이라는 칭호는 허명이 아니라고 말했지?」"

[[dialogue]]
speaker = "マハムート"
original = "「寮長というのは、寮生達から選ばれた『最強』だということよ。頭に刻み込んでおきなさい」"
translation = "「기숙사장이라는 건 기숙사생들에게 선택받은 『최강』이라는 뜻이야. 머릿속에 새겨두도록 해」"

[[dialogue]]
speaker = "フィオナ"
original = "「ヒルディオーネさんもただ強いだけではなく、流星学園では模範生として尊敬も集めていて、寮生からは『お姉様』と慕われているんですよ」"
translation = "「힐디오네 씨는 그저 강할 뿐만 아니라, 유성 학원에서는 모범생으로서 존경도 받고 있고, 기숙사생들에게는 『언니분』이라 불리며 경애받고 있어요」"

[[dialogue]]
speaker = "マハムート"
original = "「後はそうね……特徴を一言で表すなら──」"
translation = "「다음은 그렇네…… 특징을 한마디로 표현하자면──」"

[[dialogue]]
speaker = "マハムート"
original = "「ズバリ、『ドリル』ね」"
translation = "「정곡을 찌르자면, 『드릴』이야」"

[[dialogue]]
speaker = "unk"
original = "なんて？"
translation = "뭐라고?"

[[dialogue]]
speaker = "マハムート"
original = "「ドリルよ。回転しながら穴を開けるやつ」"
translation = "「드릴이야. 회전하면서 구멍을 뚫는 녀석」"

[[dialogue]]
speaker = "マハムート"
original = "「まあ、そのうち嫌でも顔を合わせることになるでしょうし、実際に会ってみればすぐわかるわ」"
translation = "「뭐, 조만간 싫어도 얼굴을 마주하게 될 테니, 실제로 만나보면 바로 알게 될 거야」"

[[dialogue]]
speaker = "フィオナ"
original = "「ヒルディオーネさん、星騎士としては何となく緋宮会長に似ているかもしれませんね」"
translation = "「힐디오네 씨, 성기사로서는 왠지 히노미야 회장님과 닮았을지도 모르겠네요」"

[[dialogue]]
speaker = "フィオナ"
original = "「ひょっとしたら、意気投合するかもしれません」"
translation = "「어쩌면 의기투합할지도 몰라요」"

[[dialogue]]
speaker = "マハムート"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "マハムート"
original = "「会長、一応言っておくけれど」"
translation = "「회장, 일단 말해두겠는데」"

[[dialogue]]
speaker = "マハムート"
original = "「アナタはあくまで新星学園の星徒会長。流星寮の寮長と会っても、くれぐれも仲良くし過ぎないように」"
translation = "「당신은 어디까지나 신성학원의 성도회장. 유성 기숙사의 기숙사장과 만나더라도 부디 너무 사이좋게 지내지 않도록」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふふっ、だそうです。マムは、ヒルディオーネさんに個人的なライバル意識を持っているんですよ」"
translation = "「후훗, 그렇다네요. 마무는 힐디오네 씨에게 개인적인 라이벌 의식을 가지고 있거든요」"

[[dialogue]]
speaker = "マハムート"
original = "「会長、戯言を言うそこのお隣さんとも、仲良くしなくていいわよ」"
translation = "「회장, 헛소리를 하는 저기 옆 사람하고도 사이좋게 지낼 필요 없어」"

[[dialogue]]
speaker = "フィオナ"
original = "「えぇっ！？\u3000そんな～！」"
translation = "「에엣!? 너무해요~!」"

[[dialogue]]
speaker = "マハムート"
original = "「あら、どちら様だったかしら？\u3000流星学園のお嬢さん」"
translation = "「어머, 어느 분이셨더라? 유성 학원의 아가씨」"

[[dialogue]]
speaker = "フィオナ"
original = "「そんなこと言わないで、許して下さいよ、マム～！」"
translation = "「그런 말씀 마시고 용서해 주세요, 마무~!」"

[[dialogue]]
speaker = "unk"
original = "そんな風に先輩とじゃれ付くフィオナの姿は新鮮で、何だかんだ仲良げな２人に、俺は思わず笑ってしまうのだった。"
translation = "그런 식으로 선배에게 응석 부리는 피오나의 모습은 신선했고, 투닥거리면서도 사이좋아 보이는 두 사람의 모습에 나는 나도 모르게 웃음을 터뜨리고 말았다."

