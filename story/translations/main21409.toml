[[dialogue]]
speaker = "unk"
original = "第９話,偽りの１０年間,B"
translation = "제9화, 거짓된 10년"

[[dialogue]]
speaker = "unk"
original = "──ベアトリス・シェイド。"
translation = "── 베아트리스 셰이드."

[[dialogue]]
speaker = "unk"
original = "お父様から命令を受けて、地上に降り立った私が最初に出会った女の子。"
translation = "아버님께 명령을 받고 지상에 내려온 내가 처음으로 만난 여자아이."

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「大変な時に人間界に来ちゃった……」"
translation = "「힘든 시기에 인간계에 와버렸네……」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>から密航するだなんて、ずいぶんと無茶をしたわね」"
translation = "「<ruby>경계의 호수<rt>라고 시에로</rt></ruby>에서 밀항하다니, 제법 무모한 짓을 했군요.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「うん。到着したら人間界は大変なことになってるし……彗星の雨まで降りだしちゃうし……」"
translation = "「응. 도착했더니 인간계는 난리가 나 있고…… 혜성 비까지 내리기 시작하고……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「今朝までシェルターにいたんだけど、モンスターが入ってきちゃって……」"
translation = "「오늘 아침까지 쉘터에 있었는데 몬스터가 들어와 버려서……」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「それで戦っていたのね。無茶をしすぎよ？」"
translation = "「그래서 싸우고 있었던 거군요. 너무 무모해요.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「でもルヴィネちゃんが助けてくれたもん。結果オーライだよ、ねっ？」"
translation = "「하지만 루비네짱이 구해줬는걸. 결과 오라이야, 그치?」"

[[dialogue]]
speaker = "unk"
original = "──ちょうどいい。この子は利用できる。人間界で活動する足掛かりに、使わせてもらおう。"
translation = "── 마침 잘됐다. 이 아이는 이용할 수 있어. 인간계에서 활동할 발판으로 삼도록 하자."

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「今日は大勢助けられたね！\u3000よかったぁ！」"
translation = "「오늘은 많은 사람을 구했네! 다행이야!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ええ。まだ戦いが終わっていないと思って、シェルターにこもっている人たちがいるはずよ。明日も頑張りましょう」"
translation = "「네. 아직 싸움이 끝나지 않았다고 생각해서 쉘터에 틀어박혀 있는 사람들이 있을 거예요. 내일도 힘내죠.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「うん！\u3000ルヴィネちゃんがいてくれてよかった……どんなモンスターもあっという間に倒しちゃうんだもん」"
translation = "「응! 루비네짱이 있어 줘서 다행이야…… 어떤 몬스터도 순식간에 쓰러뜨려 버리는걸.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「流石は女神様の遣いだね。悪い使徒もやっつけられるくらい強いだなんて！」"
translation = "「역시 여신님의 사자네. 나쁜 사도도 물리칠 수 있을 정도로 강하다니!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ええ──そうね」"
translation = "「네── 그렇죠.」"

[[dialogue]]
speaker = "unk"
original = "彼女は私の言うことを何でも信じた。人なつっこい性格をしていて、能天気で、疑うことを知らない。"
translation = "그녀는 내 말을 무엇이든 믿었다. 사람을 잘 따르는 성격에 태평하고 의심할 줄 모른다."

[[dialogue]]
speaker = "unk"
original = "避難民が増えるたびに、私がどれだけ有能で信頼に足る天使であるかを、頼まなくても喋ってくれる。"
translation = "피난민이 늘어날 때마다 내가 얼마나 유능하고 신뢰할 만한 천사인지를 부탁하지 않아도 떠들어 준다."

[[dialogue]]
speaker = "unk"
original = "現場を見たわけでもないのに『仮面の女』を倒したという嘘だって信じるのだから……間抜けもいいところ。"
translation = "현장을 본 것도 아니면서 『가면의 여자』를 쓰러뜨렸다는 거짓말조차 믿으니…… 멍청하기 짝이 없다."

[[dialogue]]
speaker = "unk"
original = "本当に運がいい──こんな便利な子と最初に知り合いになれるだなんて。"
translation = "정말 운이 좋다── 이런 편리한 아이와 가장 먼저 알게 되다니."

[[dialogue]]
speaker = "unk"
original = "それからチナという、流星市国育ちの人間を救出した。この土地で生まれ育った彼女も、大いに私の役に立ってくれた。"
translation = "그 후 치나라는 유성시국 출신의 인간을 구출했다. 이 땅에서 나고 자란 그녀도 내게 큰 도움이 되어 주었다."

[[dialogue]]
speaker = "unk"
original = "私の手駒は、順調に増えていった。"
translation = "내 장기말은 순조롭게 늘어갔다."

[[dialogue]]
speaker = "unk"
original = "グレイス、そしてレティシア──歳が近い少女たちを選んで、そばに置くことにした。"
translation = "그레이스, 그리고 레티시아── 나이가 비슷한 소녀들을 골라 곁에 두기로 했다."

[[dialogue]]
speaker = "unk"
original = "お父様、見ていてください。未来で起こるアルタイルとの決戦までに、最強のデネブを作り上げてみせます。"
translation = "아버님, 지켜봐 주세요. 미래에 일어날 알타이르와의 결전 전까지 최강의 데네브를 만들어 보이겠습니다."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「今日のベアトリスさんの行動は、褒められたものではないわ。無茶はしないように言ったでしょう？」"
translation = "「오늘 베아트리스 씨의 행동은 칭찬받을 만한 게 아니에요. 무모한 짓은 하지 말라고 했잖아요?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「あなたが怪我をしたら、みんな悲しむわ。もちろん……私も」"
translation = "「당신이 다치면 모두가 슬퍼해요. 물론…… 저도요.」"

[[dialogue]]
speaker = "unk"
original = "心配したふりをして声をかける。"
translation = "걱정하는 척하며 말을 건넨다."

[[dialogue]]
speaker = "unk"
original = "こういう行動の積み重ねが、『絆』とかいうものを育てるらしい……手間はかかるけれど、やらなくては。"
translation = "이런 행동의 축적이 『인연』이라는 것을 키우는 모양이다…… 번거롭지만 해야만 한다."

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ごめんなさい……でも、放っておけなくて……」"
translation = "「미안해…… 하지만 가만히 있을 수가 없어서……」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「今後は自分の安全を最優先に。危ない敵はぜんぶ私が倒すから、任せて頂戴」"
translation = "「앞으로는 자신의 안전을 최우선으로 하세요. 위험한 적은 전부 제가 쓰러뜨릴 테니 제게 맡기세요.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「う、うん。頼らせて、もらうね……？」"
translation = "「으, 응. 의지하도록 할게……?」"

[[dialogue]]
speaker = "unk"
original = "完璧ね──これでいい。"
translation = "완벽해── 이걸로 됐어."

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「でも、ごめんなさい。同じ状況になったら私、また助けに行って、ケガしちゃうと思う……」"
translation = "「하지만 미안해. 똑같은 상황이 되면 나, 또 구하러 가서 다칠 것 같아……」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……なんですって？」"
translation = "「……뭐라고요?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「私、誰かが困ってたら見てみぬふりなんてできない……だから迷惑かけちゃうかも……ごめんね？」"
translation = "「나, 누군가 곤란해하고 있으면 못 본 척할 수 없어…… 그래서 폐를 끼칠지도 몰라…… 미안해?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "出会った時は素直だと思っていたけれど……この吸血鬼、意外と頑固なのよね……"
translation = "만났을 때는 순진하다고 생각했는데…… 이 흡혈귀, 의외로 고집이 세단 말이지……"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「私、魔界で生まれた吸血鬼なんだけど……ルヴィネちゃんは『影の一族』って知ってる？」"
translation = "「나, 마계에서 태어난 흡혈귀인데…… 루비네짱은 『그림자 일족』이라고 알아?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「いいえ、初めて聞くわ」"
translation = "「아니요, 처음 듣네요.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「そっか。影の一族はね、すごく強い体を持ってるんだけど、太陽の下を歩けないの。日光を浴びると、すぐに死んじゃうんだ」"
translation = "「그렇구나. 그림자 일족은 말이야, 아주 강한 몸을 가지고 있지만 태양 아래를 걸을 수 없어. 햇빛을 쬐면 금방 죽어버리거든.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……あなたは、そうじゃないみたいだけれど？」"
translation = "「……당신은 그렇지 않은 모양인데요?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「今は星力があるから平気なだけ。もっとちっちゃい時は、ずっと洞窟に住んでたんだよ」"
translation = "「지금은 성력이 있어서 괜찮은 것뿐이야. 더 어렸을 때는 계속 동굴에서 살았었어.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「私、吸血鬼なのに生まれつき体が弱くて。だから一族のみんなにも足手まといだって嫌われててね……」"
translation = "「나, 흡혈귀인데도 태어날 때부터 몸이 약해서. 그래서 일족 모두에게도 짐만 된다고 미움받았거든……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ルヴィネちゃんが倒してくれた『仮面の女』……魔界で暴れてたことがあるんだけど。その時に私、捨てられたの」"
translation = "「루비네짱이 쓰러뜨려 준 『가면의 여자』…… 마계에서 난동을 부린 적이 있는데. 그때 나, 버려졌어.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「一族が暮らしてる洞窟の近い所で、使徒が現れたって噂が届いて……」"
translation = "「일족이 사는 동굴 근처에 사도가 나타났다는 소문이 들려와서……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「私が眠ってる間に、みんな荷造りして出ていっちゃった……遠くに他の一族が使ってる洞窟があるから、そこに行こうって」"
translation = "「내가 잠든 사이에 다들 짐 싸서 나가버렸어…… 멀리 다른 일족이 쓰는 동굴이 있으니까 거기로 가자면서.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……どうして眠っていたのに、会話の内容を知っているの？」"
translation = "「……어째서 잠들어 있었는데 대화 내용을 알고 있는 거죠?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「寝たふり、してたから」"
translation = "「자는 척했으니까.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「なぜ？\u3000連れていってほしいと頼まないのは、合理的ではないわ」"
translation = "「왜죠? 데려가 달라고 부탁하지 않는 건 합리적이지 않아요.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「言えなかった。お父さんとお母さんが『目が覚めたら面倒だから、早く出よう』って。あんな言葉を聞いたら……」"
translation = "「말할 수 없었어. 아빠랑 엄마가 『잠에서 깨면 귀찮으니까 빨리 나가자』라고. 그런 말을 들으면……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「みんなの足を引っ張りたくなかったし……辛くて、声が出なかったし……」"
translation = "「모두의 발목을 잡고 싶지 않았고…… 괴로워서 목소리가 나오지 않았고……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「それで私、朝になったらおひさまの下に出ようって決めてたの。もう生きてても仕方ないって……ずっと泣いてた……」"
translation = "「그래서 나, 아침이 되면 햇님 아래로 나가기로 마음먹었어. 이제 살아봤자 소용없다고…… 계속 울었어……」"

[[dialogue]]
speaker = "unk"
original = "呑気そうな彼女が明かす過去は、ひどいものだった──"
translation = "태평해 보이던 그녀가 밝힌 과거는 처참한 것이었다──"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「そうしたらね？\u3000泣いてる私に気づいて、１人の星騎士さんが洞窟を覗いてくれたの」"
translation = "「그랬더니 말이야? 울고 있는 나를 발견하고 한 성기사 아저씨가 동굴 안을 들여다봐 줬어.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「優しいおじさんだった。あんなに優しくしてもらったの、生まれて初めてだった」"
translation = "「다정한 아저씨였어. 그렇게 다정하게 대해준 거 태어나서 처음이었어.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「『私にも娘がいる』『放っておけない』って、近くの村まで連れて行ってくれて……」"
translation = "「『나에게도 딸이 있다』 『가만히 둘 수 없다』라며 근처 마을까지 데려다주셨어……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「その人、有名な人だったみたい。村の人も『あなたの頼みなら』って、温かく私を迎えてくれた」"
translation = "「그분, 유명한 분이었나 봐. 마을 사람들도 『당신의 부탁이라면』이라며 따뜻하게 나를 맞아줬어.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「その時に、星騎士のおじさんに言われたの。『困ってる人がいたら、今度は君が助けてあげなさい』って」"
translation = "「그때 성기사 아저씨가 말씀하셨어. 『곤란한 사람이 있으면 이번엔 네가 도와주렴』이라고.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「命の恩人との大切な約束だから……ごめんね？」"
translation = "「생명의 은인과의 소중한 약속이니까…… 미안해?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……そう。ごめんなさい。あなたの覚悟に、水を差す真似をしてしまったわね」"
translation = "「……그래요. 미안해요. 당신의 각오에 찬물을 끼얹는 짓을 해버렸군요.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「そ、そんなっ……こっちこそ、暗い話しちゃってごめんね？」"
translation = "「그, 그런 건…… 나야말로 우울한 이야기 해서 미안해?」"

[[dialogue]]
speaker = "unk"
original = "世界は完璧ではない──太陽の下も歩けないような種族がいるだなんて。"
translation = "세계는 완벽하지 않다── 태양 아래도 걷지 못하는 종족이 있다니."

[[dialogue]]
speaker = "unk"
original = "私が女神になった暁には、全ての吸血鬼が太陽の下を歩けるようにしてあげよう──そう思った。"
translation = "내가 여신이 된 새벽에는 모든 흡혈귀가 태양 아래를 걸을 수 있게 해 주자── 그렇게 생각했다."

[[dialogue]]
speaker = "unk"
original = "ある日、私は高熱を出した。"
translation = "어느 날, 나는 고열이 났다."

[[dialogue]]
speaker = "unk"
original = "ヒトに親近感を持たれるようにと、霊力を帯びている以外、私は普通の天使と変わらない体の造りをしている。"
translation = "인간에게 친근감을 갖도록 영력을 띠고 있는 것 외에 나는 보통 천사와 다를 바 없는 몸 구조를 하고 있다."

[[dialogue]]
speaker = "unk"
original = "無理をすれば体調を崩す──知識で知っているのと、実際に経験するのは全くの別物。"
translation = "무리하면 몸 상태가 나빠진다── 지식으로 아는 것과 실제로 경험하는 것은 전혀 별개의 문제."

[[dialogue]]
speaker = "unk"
original = "あまりの辛さに気を失うほどで……けれど私は、みんなに救われた。"
translation = "너무나 고통스러워 정신을 잃을 정도였는데…… 하지만 나는 모두에게 구원받았다."

[[dialogue]]
speaker = "unk"
original = "チナが率先して……もちろん他の皆も。手厚く看病をしてくれた。"
translation = "치나가 앞장서서…… 물론 다른 모두도. 정성껏 간호를 해 주었다."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "（……どうしてかしら？）"
translation = "(……어째서일까?)"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "（みんなに優しくされると……胸のところが、温かい……）"
translation = "(모두가 다정하게 대해주면…… 가슴 쪽이 따뜻해……)"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "（汗をぬぐってくれるたび。額を優しくなでられるたび。心細い気持ちがほどけていって……）"
translation = "(땀을 닦아줄 때마다. 이마를 부드럽게 쓰다듬어 줄 때마다. 불안한 마음이 풀려가서……)"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "（みんなの優しさが…………うれしい──）"
translation = "(모두의 다정함이………… 기뻐──)"

[[dialogue]]
speaker = "unk"
original = "何をバカな──私は慌てて、その思いをかき消した。"
translation = "무슨 바보 같은── 나는 서둘러 그 생각을 지워버렸다."

[[dialogue]]
speaker = "unk"
original = "懐柔がうまくいっている証拠だ。"
translation = "회유가 잘 되고 있다는 증거다."

[[dialogue]]
speaker = "unk"
original = "こんなにも心配されるほどに、私は彼女たちの心を掴めているのだ。計画は順調だ──"
translation = "이토록 걱정받을 정도로 나는 그녀들의 마음을 사로잡고 있다. 계획은 순조롭다──"

[[dialogue]]
speaker = "unk"
original = "──また１つ、嘘を吐いた。"
translation = "── 또 하나의 거짓말을 했다."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「私の守護星は──ポラリス。みんなと、同じ……」"
translation = "「나의 수호성은── 폴라리스. 모두와 똑같아……」"

[[dialogue]]
speaker = "unk"
original = "私に守護星なんてない。使うのは霊力だ。みんなとは違う。"
translation = "내게 수호성 따위 없다. 사용하는 것은 영력이다. 모두와는 다르다."

[[dialogue]]
speaker = "unk"
original = "違うのに、仲間のふりをした。"
translation = "다른데도 동료인 척했다."

[[dialogue]]
speaker = "unk"
original = "その方が、信頼を得やすいと判断したから……"
translation = "그편이 신뢰를 얻기 쉽다고 판단했으니까……"

[[dialogue]]
speaker = "unk"
original = "この数年間で、嘘をいくつ重ねただろう──"
translation = "이 수년간 거짓말을 몇 개나 쌓아 올렸을까──"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ルヴィは今日もアルバイト？」"
translation = "「루비는 오늘도 아르바이트?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ええ。ヘルプを頼まれてしまったから」"
translation = "「네. 도움을 요청받아서요.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「そっかぁ……たまには５人で遊びたいなって思ってたんだけど」"
translation = "「그렇구나…… 가끔은 다섯 명이서 놀고 싶다고 생각했는데.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ごめんなさい。今度、ちゃんと時間を作るから……また誘って頂戴」"
translation = "「미안해요. 다음에 꼭 시간을 낼 테니…… 다시 권해 주세요.」"

[[dialogue]]
speaker = "unk"
original = "アルバイトを始めた理由も、人心掌握のため。"
translation = "아르바이트를 시작한 이유도 인심 장악을 위해서."

[[dialogue]]
speaker = "unk"
original = "デネブの救世主と言われる自分が市井に混じって働けば、それだけ人の目に留まる。"
translation = "데네브의 구세주라 불리는 자신이 저잣거리에 섞여 일하면 그만큼 사람들의 눈에 띈다."

[[dialogue]]
speaker = "unk"
original = "手と足を動かす指導者の姿はきっとプラスに映るはずだ。そう思って始めただけ。"
translation = "손과 발을 움직이는 지도자의 모습은 분명 긍정적으로 비칠 것이다. 그렇게 생각해서 시작했을 뿐."

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「あ、そうだ──じゃあみんなでルヴィのバイト先に遊びに行くよ！\u3000この前のカフェだよね？」"
translation = "「아, 맞다── 그럼 다 같이 루비 알바 장소로 놀러 갈게! 저번에 그 카페지?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「いいえ。今日は冷凍マグロの倉庫バイトだから」"
translation = "「아니요. 오늘은 냉동 참고 창고 알바니까요.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「そんなところでも働いてるの！？」"
translation = "「그런 곳에서도 일하는 거야!?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「実入りがいいのよ。近々、出費がかさむから」"
translation = "「수입이 좋거든요. 조만간 지출이 많아질 거라서요.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「そうなの？\u3000ルヴィがお願いしたら、学園からお金くらい出してもらえると思うんだけど……」"
translation = "「그래? 루비가 부탁하면 학원에서 돈 정도는 내줄 거라 생각하는데……」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「…………それでは意味がないのよ」"
translation = "「………… 그러면 의미가 없거든요.」"

[[dialogue]]
speaker = "unk"
original = "数週間後──"
translation = "몇 주 후──"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「え、えっ……これって！？」"
translation = "「어, 엣…… 이건!?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ベアト──誕生日、おめでとう」"
translation = "「베아토── 생일 축하해요.」"

[[dialogue]]
speaker = "unk"
original = "どうかしら？\u3000いくらでもお金なんて自由にできる立場の私が、アルバイトで貯めたお金でプレゼントを贈る。"
translation = "어떤가요? 얼마든지 돈을 마음대로 할 수 있는 입장의 내가 아르바이트로 모은 돈으로 선물을 준다."

[[dialogue]]
speaker = "unk"
original = "これでまた一歩、懐柔が進んだわ──"
translation = "이걸로 다시 한 걸음 회유가 진척됐어──"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "（信頼を勝ち得た自信がある。この１０年、私は努力を欠かさなかった）"
translation = "(신뢰를 얻었다는 자신감이 있다. 이 10년, 나는 노력을 게을리하지 않았다)"

[[dialogue]]
speaker = "unk"
original = "確かに嘘で始まった関係ではあったが、極星学園星徒会メンバーで過ごした時間も、デネブの流星市国で積み重ねた功績も、すべて本物だ。"
translation = "분명 거짓으로 시작된 관계였지만 극성학원 성도회 멤버로 보낸 시간도, 데네브의 유성시국에서 쌓아 올린 공적도 모두 진짜다."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "（その嘘も、すべてはこの世界と彼女たち、ひいてはデネブ世界の住民のため）"
translation = "(그 거짓말도 전부 이 세계와 그녀들, 나아가 데네브 세계의 주민을 위한 것)"

[[dialogue]]
speaker = "unk"
original = "この世界も、そこに生きる彼女たちも、まだまだ不完全すぎる。"
translation = "이 세계도 그곳에 사는 그녀들도 아직 너무나 불완전하다."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "（だから──今度こそ、彼女たちのために、私は無限に成長する、新しい世界を構築する必要がある）"
translation = "(그러니── 이번에야말로 그녀들을 위해 나는 무한히 성장하는 새로운 세계를 구축할 필요가 있다)"

[[dialogue]]
speaker = "unk"
original = "そのためには、テルルが構築した今の世界の仕組みが邪魔だ。"
translation = "그러기 위해서는 테루루가 구축한 지금 세계의 시스템이 방해된다."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "（ベアトたちと一緒に、みんなが不安におびえず、明日を心配しないで済む完全な世界を作る）"
translation = "(베아토 일행과 함께 모두가 불안에 떨지 않고 내일을 걱정하지 않아도 되는 완전한 세계를 만든다)"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "（──だから、その始まりに少しの『嘘』があったことを、許してほしいの……）"
translation = "(── 그러니 그 시작에 약간의 『거짓말』이 있었던 것을 용서해 주었으면 해……)"

[[dialogue]]
speaker = "unk"
original = "レティシアに「そんなことを気にしていたの？」って言ってもらえたら……"
translation = "레티시아가 「그런 걸 신경 쓰고 있었어?」라고 말해 준다면……"

[[dialogue]]
speaker = "unk"
original = "グレイスに「ルヴィは難しいことを考えすぎです！」って言ってもらえたら……"
translation = "그레이스가 「루비는 어려운 걸 너무 많이 생각해요!」라고 말해 준다면……"

[[dialogue]]
speaker = "unk"
original = "チナに「細かいことをグダグダ考えすぎなんだよ！」って言ってもらえたら……"
translation = "치나가 「세세한 걸 구구절절 너무 많이 생각한다고!」라고 말해 준다면……"

[[dialogue]]
speaker = "unk"
original = "ベアトに「まったく、ルヴィは仕方ないんだから……」って言ってもらえたら……"
translation = "베아토가 「정말이지, 루비는 어쩔 수 없다니까……」라고 말해 준다면……"

[[dialogue]]
speaker = "unk"
original = "ただそうやって、みんなに許してもらいたかっただけだった──"
translation = "그저 그렇게 모두에게 용서받고 싶었을 뿐이었다──"

[[dialogue]]
speaker = "unk"
original = "そんな簡単なことに……最後の瞬間まで気付けなかったなんて！"
translation = "그런 간단한 일을…… 마지막 순간까지 깨닫지 못했다니!"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「──────やめて！！！！！」"
translation = "「────── 그만둬!!!!」"

[[dialogue]]
speaker = "unk"
original = "厄災の右腕がベアトリスに向かって振り下ろされる。"
translation = "재앙의 오른팔이 베아트리스를 향해 휘둘러진다."

[[dialogue]]
speaker = "unk"
original = "そして絶命必至の一撃が──直撃した。"
translation = "그리고 절명할 수밖에 없는 일격이── 직격했다."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「………………ぁ」"
translation = "「……………… 아」"

[[dialogue]]
speaker = "unk"
original = "ベアトリスの眼前に展開された、不可視の防壁──本来ならばディザスターハンドの攻撃はその程度では止まらない。"
translation = "베아트리스의 눈앞에 전개된 불가시의 방벽── 본래라면 디재스터 핸드의 공격은 그 정도로 멈추지 않는다."

[[dialogue]]
speaker = "unk"
original = "しかし緋宮クロトが全身全霊を懸けたカオスイージスと、ルヴィネが懸命にブレーキをかけた状態だからこそ、厄災を受け止める奇蹟は起こった。"
translation = "하지만 히노미야 쿠로토가 전신전령을 다한 카오스 이지스와 루비네가 필사적으로 브레이크를 건 상태였기에 재앙을 받아내는 기적이 일어났다."

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「会長さん……！？」"
translation = "「회장님……!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「もう一度やれって言われても無理だ……それくらい、本当にぎりぎりだった……」"
translation = "「다시 하라고 해도 무리야…… 그 정도로 정말 아슬아슬했어……」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「…………ぁあぁあ」"
translation = "「………… 아아아아」"

[[dialogue]]
speaker = "unk"
original = "ルヴィネの膝から力が抜ける。"
translation = "루비네의 무릎에서 힘이 빠진다."

[[dialogue]]
speaker = "unk"
original = "安堵のあまりへたり込む、その彼女の様子は──女神の迷いを示す、これ以上ない仕草だった。"
translation = "안도한 나머지 주저앉은 그녀의 모습은── 여신의 망설임을 보여주는 더할 나위 없는 몸짓이었다."

