[[dialogue]]
speaker = "unk"
original = "第４話,２人のサチに挟まれて,P"
translation = "제4화, 두 명의 사치 사이에 끼여서, P"

[[dialogue]]
speaker = "unk"
original = "その日、俺が星徒会室で仕事をしていると、サチが慌てた様子で駆け込んできた。"
translation = "그날, 내가 성도회실에서 업무를 보고 있자, 사치가 당황한 기색으로 달려 들어왔다."

[[dialogue]]
speaker = "サチ"
original = "「お兄さん、すみません！\u3000ちょっとご相談がありまして……！」"
translation = "「오빠, 죄송합니다! 잠시 상담드릴 게 있어서요……!」"

[[dialogue]]
speaker = "unk"
original = "もしかして、ロストアイテムか？"
translation = "혹시, 로스트 아이템인가?"

[[dialogue]]
speaker = "サチ"
original = "「いえ、そういうわけではないんですけど――」"
translation = "「아니요, 그런 건 아닙니다만――」"

[[dialogue]]
speaker = "サチ"
original = "「ふふっ、お兄さん、星徒会のお仕事お疲れ様です♪」"
translation = "「후훗, 오빠, 성도회 업무 수고 많으세요♪」"

[[dialogue]]
speaker = "サチ"
original = "「み、見ての通り……ちょっとしたトラブルが起きてしまって……」"
translation = "「보, 보시는 바와 같이…… 약간의 트러블이 생겨버려서……」"

[[dialogue]]
speaker = "unk"
original = "サチが２人！？"
translation = "사치가 두 명!?"

[[dialogue]]
speaker = "サチ"
original = "「はい……リバースフォームの自主練をしていたら、能力の『アンラッキー』のせいか、気づいたらこんなふうに増えてしまって……」"
translation = "「네…… 리버스 폼 자율 연습을 하고 있었더니, 능력인 『언럭키』 탓인지, 정신을 차려보니 이렇게 늘어나 버려서……」"

[[dialogue]]
speaker = "サチ"
original = "「でも、考え方を変えれば――これって『ラッキー』かもしれませんよ？」"
translation = "「하지만, 생각을 바꾸면―― 이건 『럭키』일지도 몰라요?」"

[[dialogue]]
speaker = "サチ"
original = "「え……？\u3000ど、どういうこと？」"
translation = "「에……? 무, 무슨 소리야?」"

[[dialogue]]
speaker = "サチ"
original = "「だって、お兄さんに『ハーレムプレイ』をさせてあげられるでしょ♪」"
translation = "「그치만, 오빠에게 『하렘 플레이』를 시켜줄 수 있잖아요♪」"

[[dialogue]]
speaker = "サチ"
original = "「はぁっ！？\u3000そ、そんなエッチなのは……！」"
translation = "「하앗!? 그, 그런 야한 건……!」"

[[dialogue]]
speaker = "サチ"
original = "「じゃあ、『悪い子』である私の方だけが、お兄さんとイチャイチャしちゃおっかな♪」"
translation = "「그럼, 『나쁜 아이』인 저만 오빠랑 꽁냥꽁냥해버릴까나♪」"

[[dialogue]]
speaker = "サチ"
original = "「えぇっ！？\u3000ち、ちょっと待って……！」"
translation = "「에엣!? 잠, 잠깐만……!」"

[[dialogue]]
speaker = "サチ"
original = "「お兄さん、そういうわけなので～♪\u3000恋人同士のスキンシップ、いかがですか？」"
translation = "「오빠, 그렇게 된 거니까요~♪ 연인 사이의 스킨십, 어떠신가요?」"

[[dialogue]]
speaker = "unk"
original = "し、仕事の途中だし……"
translation = "이, 일하는 도중이고……"

[[dialogue]]
speaker = "サチ"
original = "「急ぎじゃないなら、気分転換ってことで～<emoji=heart04>\u3000――ダメですかぁ？」"
translation = "「급한 게 아니라면, 기분 전환 삼아서~<emoji=heart04> ――안 될까요오?」"

[[dialogue]]
speaker = "unk"
original = "黒い衣装のサチが距離を詰め、俺の太ももを指先ですりすりとなぞりながら、甘えるように見上げてくる。"
translation = "검은 의상의 사치가 거리를 좁히며, 내 허벅지를 손가락 끝으로 살살 문지르며 애교 부리듯 올려다본다."

[[dialogue]]
speaker = "サチ"
original = "「そ、そういうエッチなお願いの仕方は禁止です！」"
translation = "「그, 그런 야한 부탁 방식은 금지예요!」"

[[dialogue]]
speaker = "サチ"
original = "「でも、これを逃したら、私たち２人と同時にイチャイチャできる機会なんて、もう２度とないかもしれませんよ～？」"
translation = "「하지만 이걸 놓치면, 우리 둘과 동시에 꽁냥거릴 기회 같은 건 이제 두 번 다시 없을지도 모른다구요~?」"

[[dialogue]]
speaker = "unk"
original = "それは……確かに……！"
translation = "그건…… 확실히……!"

[[dialogue]]
speaker = "サチ"
original = "「お兄さん！？」"
translation = "「오빠!?」"

[[dialogue]]
speaker = "サチ"
original = "「ふふっ♪\u3000それじゃあ合意ということで――ラブラブなスキンシップ、始めちゃいますね<emoji=heart04>」"
translation = "「후훗♪ 그럼 합의한 걸로 알고―― 러브러브한 스킨십, 시작할게요<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「お兄さんの膝の上、失礼します♪\u3000――ぎゅ～っ<emoji=heart04>」"
translation = "「오빠 무릎 위, 실례할게요♪ ――꼬옥~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "黒いサチが俺の胸に顔を埋め、抱きついてくる。"
translation = "검은 사치가 내 가슴에 얼굴을 묻고 매달려 온다."

[[dialogue]]
speaker = "サチ"
original = "「すぅ～っ<emoji=heart04>\u3000はあぁ～<emoji=heart04>\u3000……お兄さんの匂いを嗅ぐと、ドキドキして……好きって気持ちが溢れてきちゃいます<emoji=heart04>」"
translation = "「스읍~<emoji=heart04> 하아아~<emoji=heart04> ……오빠 냄새를 맡으면 두근거려서…… 좋아한다는 마음이 넘쳐흘러 버려요<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「ちょっ……なにエッチなことしてるんですか！？\u3000そんなに思いきり嗅がないでくださいっ！\u3000恥ずかしいじゃないですかっ！」"
translation = "「잠깐…… 무슨 야한 짓을 하는 거예요!? 그렇게 대놓고 맡지 마세요! 부끄럽잖아요!」"

[[dialogue]]
speaker = "サチ"
original = "「ふふっ、いつまでも恥ずかしがってちゃダメだよ、私。２人で一緒にスキンシップしないと、ハーレムプレイにならないでしょ？」"
translation = "「후훗, 언제까지고 부끄러워하고 있으면 안 돼, 나. 둘이서 같이 스킨십을 안 하면 하렘 플레이가 안 되잖아?」"

[[dialogue]]
speaker = "サチ"
original = "「私はやるなんて言ってないからね！？\u3000というか『プレイ』って言うのは、エッチだから禁止！」"
translation = "「나는 하겠다고 말 안 했거든!? 그보다 『플레이』라고 말하는 건 야하니까 금지!」"

[[dialogue]]
speaker = "サチ"
original = "「反転した私と向き合うって決めたんじゃないの？\u3000もう、仕方ないな～」"
translation = "「반전된 나랑 마주하기로 결정한 거 아니었어? 정말, 어쩔 수 없네~」"

[[dialogue]]
speaker = "サチ"
original = "「それなら――私がお兄さんを１人占めしちゃうね♪」"
translation = "「그렇다면―― 내가 오빠를 독점해 버릴게♪」"

[[dialogue]]
speaker = "サチ"
original = "「お兄さん<emoji=heart04>\u3000キス、しちゃいますね<emoji=heart04>\u3000――ん～っ、ちゅっ<emoji=heart04>」"
translation = "「오빠<emoji=heart04> 키스, 할게요<emoji=heart04> ――음~, 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「あっ……！？」"
translation = "「앗……!?」"

[[dialogue]]
speaker = "unk"
original = "黒いサチに唇を奪われ、何度も甘いキスを重ねられる。"
translation = "검은 사치에게 입술을 빼앗겨, 몇 번이고 달콤한 키스가 이어진다."

[[dialogue]]
speaker = "サチ"
original = "「んちゅ～っ<emoji=heart04>\u3000ちゅっ、ちゅっ<emoji=heart04>\u3000お兄さん、大好きです<emoji=heart04>」"
translation = "「음쪼옥~<emoji=heart04> 쪽, 쪽<emoji=heart04> 오빠, 너무 좋아요<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「だ、ダメ～っ！！」"
translation = "「아, 안 돼~!!」"

[[dialogue]]
speaker = "サチ"
original = "「きゃっ！？\u3000ちょっと～、まだ始めたばかりなのに～！」"
translation = "「꺄악!? 잠깐만~ 이제 막 시작했는데~!」"

[[dialogue]]
speaker = "サチ"
original = "「お兄さんを１人占めなんて禁止だから！\u3000お兄さんは元々、私の恋人なんだから！\u3000たとえ相手がもう１人の私でも――渡したりしないからぁっ！」"
translation = "「오빠를 독점하는 건 금지니까! 오빠는 원래 내 연인이란 말이야! 설령 상대가 또 다른 나라고 해도―― 넘겨주지 않을 거니까앗!」"

[[dialogue]]
speaker = "サチ"
original = "「えいっ！」"
translation = "「에잇!」"

[[dialogue]]
speaker = "unk"
original = "本物のサチが俺の膝に乗り、真正面からじっと見つめてくる。"
translation = "본체의 사치가 내 무릎에 올라타 정면에서 빤히 바라본다."

[[dialogue]]
speaker = "サチ"
original = "「お兄さん……浮気なんて許しませんからね！？」"
translation = "「오빠…… 바람피우는 건 용서 못 하니까요!?」"

[[dialogue]]
speaker = "unk"
original = "は、はい。ごめんなさい"
translation = "네, 네. 미안해."

[[dialogue]]
speaker = "サチ"
original = "「だから――さっきの私よりも、ちゃんと愛を込めてキスしてください！」"
translation = "「그러니까―― 방금 전의 나보다도 제대로 사랑을 담아서 키스해 주세요!」"

[[dialogue]]
speaker = "サチ"
original = "「んっ……ちゅっ<emoji=heart04>」"
translation = "「응…… 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "サチは頬を真っ赤に染めながら、それでも勇気を振り絞った表情でキスしてくる。"
translation = "사치는 뺨을 새빨갛게 물들이면서도 용기를 쥐어짠 표정으로 키스해 온다."

[[dialogue]]
speaker = "unk"
original = "俺はその体を抱き寄せ、応えるように優しくキスをし返す。"
translation = "나는 그 몸을 끌어안고 응답하듯 부드럽게 키스를 되돌려준다."

[[dialogue]]
speaker = "サチ"
original = "「んんっ……お兄さん<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「으음…… 오빠<emoji=heart04> 쪽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "サチ、好きだよ"
translation = "사치, 좋아해."

[[dialogue]]
speaker = "サチ"
original = "「んっ……はい<emoji=heart04>\u3000私もです<emoji=heart04>」"
translation = "「응…… 네<emoji=heart04> 저도예요<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「お兄さん、好きです<emoji=heart04>\u3000愛してます<emoji=heart04>\u3000んちゅっ……<emoji=heart04>」"
translation = "「오빠, 좋아해요<emoji=heart04> 사랑해요<emoji=heart04> 음쪽……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「む～っ。お兄さん、私の方は好きじゃないんですか～？」"
translation = "「무우~. 오빠, 제 쪽은 좋아하지 않는 건가요~?」"

[[dialogue]]
speaker = "unk"
original = "俺は唇を離し、首を横に振る。そして頬を膨らませる黒いサチの頭を優しく撫でた。"
translation = "나는 입술을 떼고 고개를 가로저었다. 그리고 볼을 부풀리는 검은 사치의 머리를 부드럽게 쓰다듬었다."

[[dialogue]]
speaker = "unk"
original = "どっちもサチだから、ちゃんと好きだよ"
translation = "둘 다 사치니까, 당연히 좋아해."

[[dialogue]]
speaker = "unk"
original = "俺は、サチの表も裏も、全部ひっくるめて好きだ。それが偽りのない本心だった。"
translation = "나는 사치의 겉도 속도 전부 포함해서 좋아한다. 그것이 거짓 없는 본심이었다."

[[dialogue]]
speaker = "サチ"
original = "「お兄さん<emoji=heart04>\u3000えへへっ、私も大好きです<emoji=heart04>」"
translation = "「오빠<emoji=heart04> 에헤헤, 저도 너무 좋아요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "黒いサチは、本物のサチと目を合わせ、笑い合う。"
translation = "검은 사치는 본체의 사치와 눈을 맞추며 서로 웃는다."

[[dialogue]]
speaker = "サチ"
original = "「というわけで――最初に言った通り、ここからは２人で同時にイチャイチャしてもいいよね、私？」"
translation = "「그런 고로―― 처음에 말한 대로, 지금부터는 둘이서 동시에 꽁냥거려도 되지, 나?」"

[[dialogue]]
speaker = "サチ"
original = "「仕方ない……黒いあなたも、確かに私だからね」"
translation = "「어쩔 수 없네…… 검은 당신도 확실히 나니까.」"

[[dialogue]]
speaker = "サチ"
original = "「ふふっ♪\u3000じゃあ次は私からね<emoji=heart04>」"
translation = "「후훗♪ 그럼 다음은 내 차례네<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「お兄さん<emoji=heart04>\u3000ん～っ、ちゅっ<emoji=heart04>」"
translation = "「오빠<emoji=heart04> 음~, 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "横から黒いサチが顔を寄せ、俺の唇にキスをする。"
translation = "옆에서 검은 사치가 얼굴을 가까이 대고 내 입술에 키스한다."

[[dialogue]]
speaker = "サチ"
original = "「こ、交互だからね！\u3000お兄さん、私の方も……んっ<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「교, 교대로 하는 거니까! 오빠, 내 쪽도…… 응<emoji=heart04> 쪽……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「ちゅっ<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「쪽<emoji=heart04> 쪽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その後は、仕事のことも忘れてしまうくらい――"
translation = "그 뒤로는 일 같은 건 잊어버릴 정도로――"

[[dialogue]]
speaker = "unk"
original = "俺は２人のサチに挟まれながら、甘いスキンシップでゆっくりと理性を溶かされてしまうのだった。"
translation = "나는 두 명의 사치 사이에 끼인 채, 달콤한 스킨십에 서서히 이성이 녹아내려 버리는 것이었다."

