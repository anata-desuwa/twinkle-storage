[[dialogue]]
speaker = "unk"
original = "第４話,あなたの傍に,P"
translation = "제4화, 당신의 곁에, P"

[[dialogue]]
speaker = "unk"
original = "『ふたりきりで会えませんか』"
translation = "『둘이서만 만날 수 없을까요』"

[[dialogue]]
speaker = "unk"
original = "レイラからのメッセージにはそうあったので、放課後に校門前で待ち合わせることにした。"
translation = "레이라가 보낸 메시지에는 그렇게 적혀 있었기에, 방과 후에 교문 앞에서 만나기로 했다."

[[dialogue]]
speaker = "レイラ"
original = "「お待たせしました、魔王さん」"
translation = "「기다리게 해서 죄송해요, 마왕님」"

[[dialogue]]
speaker = "unk"
original = "俺も今来たとこだから"
translation = "나도 방금 막 왔어"

[[dialogue]]
speaker = "レイラ"
original = "「ふふっ、そう言うとまるでデートみたいですね…………あ」"
translation = "「후훗, 그렇게 말하니 마치 데이트 같네요………… 아」"

[[dialogue]]
speaker = "レイラ"
original = "（魔王さん、いつもより身だしなみがきちっとしてる……もしかして、デートだと思っていらっしゃる？）"
translation = "（마왕님, 평소보다 차림새가 깔끔해…… 혹시 데이트라고 생각하고 계신가?）"

[[dialogue]]
speaker = "レイラ"
original = "（でも、メッセージにはデートとは書いてないはず…………いや、冷静に考えて、ふたりきりで会いたいはデートの誘いだろ百目騎レイラぁ！）"
translation = "（하지만 메시지에는 데이트라고 안 썼을 텐데………… 아니, 냉정하게 생각해서 둘이서만 만나고 싶다는 건 데이트 신청이잖아, 도메키 레이라아!）"

[[dialogue]]
speaker = "レイラ"
original = "「あー、コホン。先日は大変な失礼をいたしました。今日はそのことを謝りたかったんです」"
translation = "「아—, 흠흠. 요 전에는 대단히 실례를 범했습니다. 오늘은 그 일을 사과드리고 싶었어요」"

[[dialogue]]
speaker = "レイラ"
original = "「男性に対し、胸の大きさのお話をすべきではないと、コハルコさんにも叱られてしまいました」"
translation = "「남성분께 가슴 크기에 대한 이야기를 해서는 안 된다고 코하루코 씨에게도 혼나버렸습니다」"

[[dialogue]]
speaker = "レイラ"
original = "「他意はなかったんです。本当に肩こりがつらいと伝えたかっただけで……いえ、言い訳はやめましょう」"
translation = "「딴뜻은 없었어요. 정말로 어깨결림이 힘들다고 전하고 싶었을 뿐이라…… 아니요, 변명은 그만두죠」"

[[dialogue]]
speaker = "レイラ"
original = "「さぞ居心地の悪い思いをされたと思います。本当にすみませんでした」"
translation = "「분명 불편한 기분이 드셨을 거라 생각해요. 정말 죄송했습니다」"

[[dialogue]]
speaker = "unk"
original = "こちらこそ、ごめん"
translation = "나야말로 미안해"

[[dialogue]]
speaker = "レイラ"
original = "「……意識しすぎて避けていた、ですか？\u3000いえ、元は私が悪いのですから気にしないでください」"
translation = "「……너무 의식해서 피하고 있었다, 고요? 아뇨, 원래는 제가 잘못한 거니까 신경 쓰지 마세요」"

[[dialogue]]
speaker = "レイラ"
original = "「今回の件で、私からお詫びをさせてください。魔王さんは何か欲しいものや、してほしいことはありませんか？」"
translation = "「이번 일로 제가 사과를 하게 해주세요. 마왕님은 뭔가 갖고 싶은 것이나, 하고 싶은 일 없으신가요?」"

[[dialogue]]
speaker = "unk"
original = "ならデートしてほしい"
translation = "그럼 데이트해줬으면 좋겠어"

[[dialogue]]
speaker = "レイラ"
original = "「はい、デートですね。分かりまし……デ、デ、デ、デートォッ！？」"
translation = "「네, 데이트네요. 알겠습…… 데, 데, 데, 데이트오옷!?」"

[[dialogue]]
speaker = "レイラ"
original = "「デートってあのリア充がやってる秘密の儀式ですか！？」"
translation = "「데이트라면 그 리얼충들이 한다는 비밀 의식인가요!?」"

[[dialogue]]
speaker = "レイラ"
original = "「……もちろんそのデート？\u3000こんな根暗のギークとデートなんて魔王さんも奇特な方ですね……」"
translation = "「……물론 그 데이트? 이런 음침한 기크와 데이트라니 마왕님도 특이한 분이시네요……」"

[[dialogue]]
speaker = "unk"
original = "俺はもうすでに、レイラを異性として意識してしまっている。確信はないけど、きっとその先の感情も。"
translation = "나는 이미 레이라를 이성으로서 의식하고 있다. 확신은 없지만, 분명 그 너머의 감정도."

[[dialogue]]
speaker = "レイラ"
original = "「……え、レイラといると楽しい、ですか？\u3000それは……その、ありがとうございます」"
translation = "「……에, 레이라와 있으면 즐겁다, 고요? 그건…… 그, 감사합니다」"

[[dialogue]]
speaker = "レイラ"
original = "「……私も、魔王さんといると、楽しいですし」"
translation = "「……저도 마왕님과 있으면 즐거우니까요」"

[[dialogue]]
speaker = "レイラ"
original = "「あ、いえ、なんでもありません！\u3000じゃあどこに行きましょうか？」"
translation = "「아, 아니요, 아무것도 아니에요! 그럼 어디로 갈까요?」"

[[dialogue]]
speaker = "レイラ"
original = "「ここが流星市国でも有名な、大盛り自慢の中華料理屋さんですね。一度来てみたかったんです」"
translation = "「여기가 유성시국에서도 유명한, 곱빼기가 자랑인 중화요리 집이군요. 한번 와보고 싶었어요」"

[[dialogue]]
speaker = "レイラ"
original = "「制限時間内に１０キロのチャーハンを食べきれば賞金がもらえるそうです」"
translation = "「제한 시간 내에 10킬로의 볶음밥을 다 먹으면 상금을 받을 수 있다고 해요」"

[[dialogue]]
speaker = "レイラ"
original = "「魔王さん、どうか刮目あれ！\u3000百目騎レイラの雄姿をご覧にいれますとも！」"
translation = "「마왕님, 부디 괄목하시길! 도메키 레이라의 웅장한 모습을 보여드리고 말고고요!」"

[[dialogue]]
speaker = "レイラ"
original = "「トゥ！\u3000ヘアー！」"
translation = "「투! 헤어!」"

[[dialogue]]
speaker = "レイラ"
original = "「１０キロのスペシャルチャーハン、たいへん美味でした。具材とお米の一体感、ムラのない味付け……素晴らしい職人技でしたね」"
translation = "「10킬로의 스페셜 볶음밥, 대단히 미미였습니다. 재료와 쌀의 일체감, 치우침 없는 간…… 훌륭한 장인 정신이었네요」"

[[dialogue]]
speaker = "レイラ"
original = "「そのあとのバケツ杏仁豆腐も絶品でした。柔らかさを保ったままあの形に固めるのは並みの技術ではありません」"
translation = "「그 뒤의 양동이 안닌두부도 일품이었어요. 부드러움을 유지하면서 저 형태대로 굳히는 건 보통 기술이 아니거든요」"

[[dialogue]]
speaker = "レイラ"
original = "「……レイラの食べっぷりに圧倒された？\u3000そうでしょうそうでしょう。昔から、両親からもいい食べっぷりだねーと褒められてきましたから」"
translation = "「……레이라의 먹성에 압도당했다? 그렇겠죠, 그렇겠죠. 옛날부터 부모님께도 복스럽게 잘 먹는다는 칭찬을 들어왔으니까요」"

[[dialogue]]
speaker = "レイラ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "レイラ"
original = "「魔王さん、少しだけ付き合っていただいてもいいですか？」"
translation = "「마왕님, 조금만 같이 가주실 수 있을까요?」"

[[dialogue]]
speaker = "レイラ"
original = "「両親のことを思い出したら、ここに来たくなってしまって。一緒に来てくれてありがとうございます」"
translation = "「부모님 생각이 났더니 이곳에 오고 싶어져서요. 함께 와주셔서 감사합니다」"

[[dialogue]]
speaker = "レイラ"
original = "「子どものころは両親と一緒に礼拝に来ていたんです。……魔王さんも、ですか？\u3000じゃあ気付かないうちにすれ違っていたのかもしれませんね」"
translation = "「어릴 때는 부모님과 함께 예배드리러 왔었어요. ……마왕님도요? 그럼 모르는 사이에 스쳐 지나갔을지도 모르겠네요」"

[[dialogue]]
speaker = "レイラ"
original = "「あの『太陽の壁画』に憧れて、私はコラプサーを結成したんです。私もあんな風になるんだー、って無邪気に両親に言っていました」"
translation = "「저 『태양의 벽화』를 동경해서 저는 콜랩서를 결성했어요. 나도 저렇게 될 거야— 하고 천진난만하게 부모님께 말하곤 했죠」"

[[dialogue]]
speaker = "レイラ"
original = "「今は魔王が救世の英雄であることは知っています。過去の魔王も、今代の魔王のあなたも、です」"
translation = "「지금은 마왕이 구세의 영웅이라는 걸 알고 있어요. 과거의 마왕도, 지금 세대의 마왕인 당신도요」"

[[dialogue]]
speaker = "レイラ"
original = "「それでも、幼心に抱いた憧れが消えることはありません」"
translation = "「그래도 어린 마음에 품었던 동경이 사라지지는 않아요」"

[[dialogue]]
speaker = "unk"
original = "俺も、そうだ"
translation = "나도 그래"

[[dialogue]]
speaker = "レイラ"
original = "「魔王さんにも憧れの人がいるんですね。……はい。もう会えないとしても、憧れが無になることはありません。諦めない限り、その光は私たちを照らしてくれるのです」"
translation = "「마왕님께도 동경하는 사람이 있군요. ……네. 이제 만날 수 없다 해도 동경이 허무로 돌아가지는 않아요. 포기하지 않는 한 그 빛은 우리를 비춰줄 거예요」"

[[dialogue]]
speaker = "レイラ"
original = "「道を踏み外した私に、そのことを教えてくれたのはあなたでした。魔王さんがいたから、私は誰も手にかけずにいられたのです」"
translation = "「길을 잘못 든 저에게 그 사실을 가르쳐준 건 당신이었어요. 마왕님이 계셨기에 저는 누구의 손도 더럽히지 않고 있을 수 있었어요」"

[[dialogue]]
speaker = "レイラ"
original = "「コラプサーのみんなは困った子ばかりですけど、私の新しい家族です。みんなで今度こそ、世界を救うために戦います」"
translation = "「콜랩서 아이들은 문제아들뿐이지만 저의 새로운 가족이에요. 다 함께 이번에야말로 세계를 구하기 위해 싸우겠어요」"

[[dialogue]]
speaker = "レイラ"
original = "「それを両親と、あなたに誓います」"
translation = "「그것을 부모님과 당신께 맹세할게요」"

[[dialogue]]
speaker = "レイラ"
original = "「だから、傍で見守っていてくださいね。ずっとずっと──私もあなたの傍にいたいですから」"
translation = "「그러니까 곁에서 지켜봐 주세요. 계속 계속── 저도 당신 곁에 있고 싶으니까요」"

