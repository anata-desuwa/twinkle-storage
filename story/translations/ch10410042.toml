[[dialogue]]
speaker = "unk"
original = "第２話,ネーゼマインとリノ,P"
translation = "제2화, 네제마인과 리노, P"

[[dialogue]]
speaker = "unk"
original = "その日、母さんの提案で、俺とマインと母さんの３人で遊ばないかという話になり、リゾート結界へとやって来ていた――"
translation = "그날, 엄마의 제안으로, 나와 마인과 엄마 셋이서 놀지 않겠느냐는 이야기가 나와서, 리조트 결계로 찾아왔다──"

[[dialogue]]
speaker = "リノ"
original = "「マインちゃん、今日はお母さんに付き合ってくれてありがとね」"
translation = "「마인짱, 오늘은 아줌마랑 놀아줘서 고마워.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「いえいえ♪\u3000家にも何度もお邪魔させて貰って、リノさんにはお世話になってますから」"
translation = "「아니에요♪ 댁에도 몇 번이나 실례했고, 리노 씨에게는 신세 지고 있으니까요.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「それで、今日は何して過ごします？」"
translation = "「그래서, 오늘은 뭐 하고 지낼까요?」"

[[dialogue]]
speaker = "リノ"
original = "「実は私ね、この前の公安委員会の一件で、心残りがあって～」"
translation = "「실은 나 말이야, 저번 공안위원회 일로 마음이 걸리는 게 있어서~」"

[[dialogue]]
speaker = "リノ"
original = "「というわけでクロト、サンオイルお願いね♪」"
translation = "「그런 고로 쿠로토, 선 오일 부탁해♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「まさかの、そうきましたか～♪」"
translation = "「설마, 그렇게 나오실 줄이야~♪」"

[[dialogue]]
speaker = "unk"
original = "紫外線はカットされてるけど……"
translation = "자외선은 차단되고 있는데……"

[[dialogue]]
speaker = "unk"
original = "リゾート結界は創造主である星騎士――リップルの力により、紫外線の影響はオフ設定にされている。その為、日焼け対策をする必要は特にないのだが……。"
translation = "리조트 결계는 창조주인 성기사── 리플의 힘에 의해, 자외선의 영향은 오프 설정되어 있다. 그 때문에, 자외선 차단을 할 필요는 딱히 없지만……."

[[dialogue]]
speaker = "リノ"
original = "「ふふっ、こういうのは気分よ、気分♪」"
translation = "「후훗, 이런 건 기분이야, 기분♪」"

[[dialogue]]
speaker = "リノ"
original = "「マインちゃんも一緒にどう？」"
translation = "「마인짱도 같이 어때?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「私ですか？\u3000ん～……」"
translation = "「저요? 응~……」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「私はこの前楽しんだので、一旦様子を見てますよ☆」"
translation = "「저는 저번에 즐겼으니까, 일단 지켜볼게요☆」"

[[dialogue]]
speaker = "unk"
original = "それから母さんの望みに応えて、サンオイルを塗ることになり――"
translation = "그리하여 엄마의 바람에 응해, 선 오일을 바르게 되었고──"

[[dialogue]]
speaker = "リノ"
original = "「――ふぅ、満足したわ～♪\u3000クロト、ありがと～♪」"
translation = "「──후우, 만족했어~♪ 쿠로토, 고마워~♪」"

[[dialogue]]
speaker = "リノ"
original = "「お母さん、ちょっと喉が渇いたから、海の家まで飲み物買って来るわね♪」"
translation = "「엄마, 조금 목이 마르니까, 해변의 집까지 음료수 좀 사 올게♪」"

[[dialogue]]
speaker = "unk"
original = "そうして立ち上がり、席を外す母さん。"
translation = "그렇게 일어서서, 자리를 비우는 엄마."

[[dialogue]]
speaker = "ネーゼマイン"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "マイン？\u3000どうかした？"
translation = "마인? 왜 그래?"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「……ねぇ、会長。やっぱ私もサンオイル塗ってくれない？」"
translation = "「……저기, 회장님. 역시 나도 선 오일 좀 발라줄래?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ほら、こういうのは気分だから」"
translation = "「봐봐, 이런 건 기분이니까.」"

[[dialogue]]
speaker = "unk"
original = "それから、マインにもサンオイルを塗ることになり、手にオイルを垂らして馴染ませていると――"
translation = "그리하여, 마인에게도 선 오일을 바르게 되었고, 손에 오일을 떨어뜨려 펴 바르고 있자──"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「リノさんにサンオイル塗るの、随分と手慣れてる感じだったね」"
translation = "「리노 씨에게 선 오일 바르는 거, 꽤 손에 익은 느낌이네.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「――親子だから？\u3000マッサージしたりとかと同じ感覚？」"
translation = "「──가족이라서? 마사지하거나 할 때랑 같은 감각?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ふ～ん、まぁ……私もたまに、お父さんの背中を足で踏み踏みしたりすることあるけど……」"
translation = "「흐~응, 뭐…… 나도 가끔, 아빠 등을 발로 밟아드리거나 할 때가 있긴 하지만……」"

[[dialogue]]
speaker = "unk"
original = "そんな会話をしながら、俺はマインの背中にサンオイルを塗り始めたのだが――"
translation = "그런 대화를 나누며, 나는 마인의 등에 선 오일을 바르기 시작했는데──"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ん……なんか会長、ぎこちなくない？」"
translation = "「응…… 왠지 회장님, 어색하지 않아?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「――好きな子相手だから、ドキドキする？」"
translation = "「──좋아하는 애가 상대니까, 두근거려?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「……ふ～ん、そうなんだ～」"
translation = "「……흐~응, 그렇구나~」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「にひひ……つまり会長は今、いやらしいこと考えてるんだ～？」"
translation = "「니히히…… 즉 회장님은 지금, 야한 생각을 하고 있다는 거네~?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「じゃあ～♪」"
translation = "「그럼~♪」"

[[dialogue]]
speaker = "unk"
original = "言いながら、ゴロンと寝返りを打ち、俺の方へ仰向けに向き直るマイン。"
translation = "말하면서, 홱 하고 몸을 뒤집어, 나를 향해 똑바로 눕는 마인."

[[dialogue]]
speaker = "ネーゼマイン"
original = "「前も塗ってみる？」"
translation = "「앞쪽도 발라볼래?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「きゃははっ☆\u3000会長、一気に顔赤くなってるよ～？」"
translation = "「캬하하☆ 회장님, 한순간에 얼굴이 빨개졌어~?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「でも、恋人なんだから、ちゃんと塗ってくれるよね～？\u3000お腹の辺りとかお願いしちゃおっかな～？」"
translation = "「하지만, 연인이니까, 제대로 발라줄 거지~? 배 근처라든가 부탁해볼까나~?」"

[[dialogue]]
speaker = "unk"
original = "段々とテンションの上がって来たマインが、悪戯スマイルを浮かべていると――"
translation = "점점 텐션이 올라간 마인이, 장난기 어린 미소를 짓고 있자──"

[[dialogue]]
speaker = "リノ"
original = "「ふふっ、楽しそうね♪」"
translation = "「후훗, 즐거워 보이네♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「えっ！？\u3000リノさん、いつの間に……！？」"
translation = "「엣!? 리노 씨, 언제 어느 사이에……!?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「……その、いつから見てました？」"
translation = "「……저기, 언제부터 보고 계셨어요?」"

[[dialogue]]
speaker = "リノ"
original = "「ごめんなさい。実は飲み物買いに行って来るっていうのは嘘で、こっそり様子をうかがってたの」"
translation = "「미안해. 실은 음료수 사러 간다는 건 거짓말이고, 몰래 지켜보고 있었어.」"

[[dialogue]]
speaker = "リノ"
original = "「マインちゃんがどんな子なのか、素の部分が知りたくて」"
translation = "「마인짱이 어떤 아이인지, 솔직한 모습을 알고 싶어서.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「あ～、なるほど……そうですよね～。前にサンオイル塗ってた時もちょっと見られちゃいましたし……」"
translation = "「아~ 그렇군요~. 저번에 선 오일 바를 때도 좀 들키긴 했지만……」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「――ごめんなさい、リノさん。私、定期的につい悪戯したくなっちゃう性質というか……」"
translation = "「──죄송해요, 리노 씨. 저, 정기적으로 그만 장난치고 싶어지는 성미라고나 할까……」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「なるべく、会長の彼女として、いい子に見せたいとは思ってたんですけど……」"
translation = "「가급적이면, 회장님의 여자친구로서, 착한 아이로 보이고 싶다고 생각은 했는데요……」"

[[dialogue]]
speaker = "リノ"
original = "「大丈夫よ、マインちゃん」"
translation = "「괜찮아, 마인짱.」"

[[dialogue]]
speaker = "リノ"
original = "「私、マインちゃんがクロトの恋人として不安だとか、そんな風には全然思ったりしてないから」"
translation = "「난 마인짱이 쿠로토의 연인으로서 불안하다거나, 그런 생각은 전혀 하지 않으니까.」"

[[dialogue]]
speaker = "リノ"
original = "「クロトが好きになった女の子だもの。それに、公安委員会でリコが認めているすごい子だってことも知ってる」"
translation = "「쿠로토가 좋아하게 된 여자애인걸. 게다가, 공안위원회에서 리코가 인정하는 대단한 아이라는 것도 알고 있어.」"

[[dialogue]]
speaker = "リノ"
original = "「たとえ『いい子』じゃなくたって、素敵な子だって信じているわ」"
translation = "「설령 『착한 아이』가 아니더라도, 멋진 아이라는 걸 믿고 있단다.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「リノさん……」"
translation = "「리노 씨……」"

[[dialogue]]
speaker = "リノ"
original = "「私はただ、マインちゃんのことをもっと知って、仲良くなりたかっただけなのよ」"
translation = "「난 그저, 마인짱을 좀 더 알고, 친해지고 싶었을 뿐이야.」"

[[dialogue]]
speaker = "リノ"
original = "「これから長～い付き合いになるかもしれないしね♪」"
translation = "「앞으로 기~인 인연이 될지도 모르니까 말이야♪」"

[[dialogue]]
speaker = "リノ"
original = "「だから、もし手伝って欲しいこととかがあったら言ってね」"
translation = "「그러니까, 혹시 도와줬으면 하는 게 있다면 말하렴.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker = "リノ"
original = "「ほら、イチャイチャする時に、お母さんが協力した方が作りやすいシチュエーションとかあるでしょう？」"
translation = "「봐봐, 꽁냥거릴 때, 엄마가 협력하는 편이 만들기 쉬운 시추에이션 같은 거 있잖니?」"

[[dialogue]]
speaker = "unk"
original = "ちょっと、母さん！？"
translation = "잠깐, 엄마!?"

[[dialogue]]
speaker = "リノ"
original = "「あら、だって母親としては、可愛い息子の彼女は応援したいじゃない？」"
translation = "「어머, 그치만 엄마로서는, 귀여운 아들의 여자친구는 응원해주고 싶잖아?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「息子の彼女を応援……にひっ、にひひっ♪\u3000きゃはははっ☆」"
translation = "「아들의 여자친구를 응원…… 니힛, 니히히♪ 캬하하하☆」"

[[dialogue]]
speaker = "unk"
original = "ネーゼマインは吹き出して、しばらく笑った後――"
translation = "네제마인은 뿜어버리더니, 한참을 웃고 난 뒤──"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「……リノさん、ありがとうございます。私も、リノさんのこと、もっとよく知りたくなっちゃいました♪」"
translation = "「……리노 씨, 감사합니다. 저도 리노 씨에 대해서, 좀 더 잘 알고 싶어졌어요♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「今度、一緒にどこか出かけませんか？\u3000２人で♪」"
translation = "「다음에, 같이 어디 놀러 안 가실래요? 둘이서만♪」"

[[dialogue]]
speaker = "リノ"
original = "「あら♪\u3000ふふっ、それはすごく楽しそう♪」"
translation = "「어머♪ 후훗, 그거 정말 즐겁겠는걸♪」"

[[dialogue]]
speaker = "unk"
original = "俺は仲間ハズレ！？"
translation = "나는 따돌리는 거야!?"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「にひひ♪\u3000会長、ざんね～ん☆」"
translation = "「니히히♪ 회장님, 아쉽겠네~☆」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「でも、素敵な彼女なら、彼氏のお母さんとはちゃんと仲良くしておかないとね～♪」"
translation = "「그치만, 멋진 여자친구라면, 남자친구네 어머니랑은 제대로 친해져 둬야 하니까 말이야~♪」"

[[dialogue]]
speaker = "unk"
original = "そこからは、母さんと打ち解けて、楽しそうに沢山話をするマインなのだった――"
translation = "그 후로, 엄마와 마음을 터놓고 즐겁게 많은 이야기를 나누는 마인이었다──"

