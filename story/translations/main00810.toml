[[dialogue]]
speaker = "unk"
original = "第１２話,漆黒の騎士,B"
translation = "제12화, 칠흑의 기사, B"

[[dialogue]]
speaker = "？？？"
original = "『無駄だ』"
translation = "『소용없다』"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「っ……喋っ……」"
translation = "「읏…… 말했……」"

[[dialogue]]
speaker = "unk"
original = "ようやく──異形の影が言葉を発した。"
translation = "드디어── 이형의 그림자가 말을 했다."

[[dialogue]]
speaker = "unk"
original = "甲冑越しにくぐもって聞こえたその声は、機械の駆動を思わせる鈍い重低音だった。"
translation = "갑옷 너머로 웅얼거리며 들린 그 목소리는, 기계의 구동을 연상시키는 둔한 중저음이었다."

[[dialogue]]
speaker = "？？？"
original = "『魔王の力は既に尽きている。呼び覚まそうとしても無駄なこと』"
translation = "『마왕의 힘은 이미 다했다. 불러 깨우려 해도 소용없는 일』"

[[dialogue]]
speaker = "？？？"
original = "『破滅の竜を討った程度で枯れ果てる──己が器としての未熟さを悔いよ』"
translation = "『파멸의 용을 토벌한 정도로 고갈되다니── 자신의 그릇으로서의 미숙함을 후회하라』"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「なん──だって……！？」"
translation = "「뭐──라고……!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「おまえは……何者だ。俺を、どこまで知っている──！？」"
translation = "「너는…… 누구냐. 나를, 어디까지 알고 있는 거냐──!?」"

[[dialogue]]
speaker = "？？？"
original = "『答える義理はない』"
translation = "『대답할 의무는 없다』"

[[dialogue]]
speaker = "unk"
original = "あまりにも意味深な騎士の言葉──"
translation = "너무나도 의미심장한 기사의 말──"

[[dialogue]]
speaker = "unk"
original = "しかし、俺の問いに対する返答は禍々しい攻撃の前動作だった。"
translation = "하지만, 나의 질문에 대한 대답은 사악한 공격의 전조 동작이었다."

[[dialogue]]
speaker = "？？？"
original = "『世界を救う──などと、よくもその程度で吠えたものだ』"
translation = "『세계를 구한다──니, 잘도 그 정도로 짖어댔군』"

[[dialogue]]
speaker = "？？？"
original = "『残滓に用はない。ここで散れ』"
translation = "『잔재에는 용무 없다. 여기서 흩어져라』"

[[dialogue]]
speaker = "unk"
original = "影の握る大剣へ──暗黒のエネルギーが収束していく。"
translation = "그림자가 쥔 대검으로── 암흑의 에너지가 수렴해 간다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「なんらかのチャージだ──かき消すぞ！」"
translation = "「뭔가 차징이다── 지워버리겠어!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「え、ええっ──光で対抗するわ──！」"
translation = "「에, 에에엣── 빛으로 맞설게──!」"

[[dialogue]]
speaker = "unk"
original = "闇の星術をかき消すように──ヴィーナスが光でもって応戦する。"
translation = "어둠의 성술을 지워버리려는 듯── 비너스가 빛으로 맞선다."

[[dialogue]]
speaker = "unk"
original = "だが、その一切が相殺できない。"
translation = "하지만, 그 모든 것이 상쇄되지 않는다."

[[dialogue]]
speaker = "unk"
original = "水が油と交わらないように、こちらの攻撃が何もかもすり抜けていく！"
translation = "물이 기름과 섞이지 않듯이, 이쪽의 공격이 모조리 빠져나간다!"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「っ、これは──！？」"
translation = "「윽, 이건──!?」"

[[dialogue]]
speaker = "unk"
original = "闇と光がかち合わない──"
translation = "어둠과 빛이 부딪히지 않는다──"

[[dialogue]]
speaker = "unk"
original = "そして何より、影の操る闇は、俺たちの使っている星術とも、あの魔女たちが見せた魔法とも異なるオーラ。"
translation = "그리고 무엇보다, 그림자가 조종하는 어둠은 우리가 사용하는 성술과도, 그 마녀들이 보여준 마법과도 다른 오라다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "（星力でも──）"
translation = "（성력으로도──）"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "（魔力でも──）"
translation = "（마력으로도──）"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（ない──！）"
translation = "（아니다──!）"

[[dialogue]]
speaker = "unk"
original = "気づいたひとつの可能性。"
translation = "깨달은 하나의 가능성."

[[dialogue]]
speaker = "unk"
original = "しかし、そこに思いを巡らせている時間はカケラもなかった。"
translation = "하지만, 거기에 생각을 돌릴 시간은 조각만큼도 없었다."

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『天壌無窮……<ruby>昏<rt>くら</rt></ruby>き断罪をここに下す』"
translation = "『천양무궁…… 어두운 단죄를 여기에 내리노라』"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『最終審判の時・闇の制裁』"
translation = "『최종 심판의 때・어둠의 제재』"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「っっっっっっっっっ────！！」"
translation = "「크으으으으으으으으으────!!」"

[[dialogue]]
speaker = "unk"
original = "とてつもない衝撃が──滅んだ朱雀暦の世界そのものを揺らした。"
translation = "엄청난 충격이── 멸망한 주작력의 세계 그 자체를 흔들었다."

[[dialogue]]
speaker = "unk"
original = "そして……"
translation = "그리고……"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ぐ──ぅっ……はっ……は、放しなさいッ──！\u3000ッ、何っ──つああぁっ！？」"
translation = "「크──윽…… 핫…… 노, 놓으세요옷──! 윽, 뭐엇── 츠아아앗!?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ヴィーナスちゃん──！？」"
translation = "「비너스짱──!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いつの間に──ヴィーナスを放せ、影！」"
translation = "「언제 사이에── 비너스를 놓아라, 그림자!」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスの身柄が──異形の影、その甲冑に抱き抱えられていた。"
translation = "비너스의 몸이── 이형의 그림자, 그 갑옷에 안겨 있었다."

[[dialogue]]
speaker = "unk"
original = "今の一瞬で、<ruby>拐<rt>さら</rt></ruby>ったというのか……！"
translation = "지금 이 한순간에, 납치했다는 말인가……!"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『九浄の娘──予言の書──壁画の真実を知る者──』"
translation = "『쿠죠의 딸── 예언의 서── 벽화의 진실을 아는 자──』"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『不穏である。デネブか、ベガか……あるべきでない世界線から混入した異分子。排除せねばならない』"
translation = "『불온하다. 데네브인가, 베가인가…… 마땅히 있어서는 안 될 세계선에서 혼입된 이분자. 배제해야 한다』"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ──！？」"
translation = "「윽──!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「──何の話を、しているのですか……！？」"
translation = "「──무슨 이야기를, 하고 계신 겁니까……!?」"

[[dialogue]]
speaker = "unk"
original = "甲冑の奥底から響く胡乱な言葉の数々。"
translation = "갑옷의 깊은 곳에서 울려 퍼지는 수상쩍은 말들."

[[dialogue]]
speaker = "unk"
original = "だが何よりも、俺にはヴィーナスがその腕に抱かれているのが許せない──！"
translation = "하지만 무엇보다, 나는 비너스가 그 팔에 안겨 있는 것을 용납할 수 없다──!"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「こちらを見ろ、影野郎──ッ！」"
translation = "「이쪽을 봐라, 그림자 자식──윽!」"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『────』"
translation = "『────』"

[[dialogue]]
speaker = "unk"
original = "傷を押して立ち上がり──怒涛のラッシュを影に浴びせる。"
translation = "상처를 참고 일어서── 분노의 러시를 그림자에게 퍼붓는다."

[[dialogue]]
speaker = "unk"
original = "しかし──"
translation = "하지만──"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『薄い。脆すぎる』"
translation = "『얇다. 너무나도 무르다』"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「が──っ！！」"
translation = "「커──억!!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「会長──！」"
translation = "「회장──!」"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『さらばだ。いずれ、新たなる地平で<ruby>見<rt>まみ</rt></ruby>える時も来よう』"
translation = "『잘 가거라. 언젠가, 새로운 지평에서 만날 때도 오겠지』"

[[dialogue]]
speaker = "unk"
original = "無情にも──"
translation = "무정하게도──"

[[dialogue]]
speaker = "unk"
original = "圧倒的な膂力で放たれた斬撃が、俺たちの攻撃をまとめて無に帰す。"
translation = "압도적인 완력으로 내뿜어진 참격이, 우리의 공격을 통째로 무로 돌린다."

[[dialogue]]
speaker = "unk"
original = "異形の影はヴィーナスを抱きかかえたまま、塔に穿たれた異次元の大穴へと去ってゆき──"
translation = "이형의 그림자는 비너스를 안은 채, 탑에 뚫린 이차원의 커다란 구멍으로 사라져 가고──"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロト──────ッッッ！！！」"
translation = "「쿠로토──────읏읏읏!!!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ヴィーナス──────ッッッ！！！」"
translation = "「비너스──────읏읏읏!!!」"

[[dialogue]]
speaker = "unk"
original = "眼前を漂白していく光。"
translation = "눈앞을 표백시키는 빛."

[[dialogue]]
speaker = "unk"
original = "塔から追放されるこの感覚。"
translation = "탑에서 추방당하는 이 감각."

[[dialogue]]
speaker = "unk"
original = "無に帰していく、かつての世界こそが……俺が第三階層で最後に見た光景だった。"
translation = "무로 돌아가는, 옛 세계야말로…… 내가 제3계층에서 마지막으로 본 광경이었다."

