[[dialogue]]
speaker = "unk"
original = "アルテが芸術都市『アテネス』に帰還してからのこと──"
translation = "아르테가 예술 도시 『아테네스』로 귀환한 뒤의 일──"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「……館長の部屋に来るのも、久しぶりに思えますね」"
translation = "「……관장님의 방에 오는 것도 오랜만인 것 같네요.」"

[[dialogue]]
speaker_original = "館長"
speaker_translation = "관장"
original = "「実際、こんなに長い間、アルテと顔を合わせずにいたのは初めてじゃないか？」"
translation = "「실제로 이렇게 오랫동안 아르테와 얼굴을 마주하지 않은 건 처음 아닌가?」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「そうですね。まぁ、私は向こうで楽しく過ごしていましたが。特にお肉は絶品で、館長にも食べさせてあげたいくらいでしたよ」"
translation = "「그렇네요. 뭐, 저는 저쪽에서 즐겁게 지냈지만요. 특히 고기는 일품이라, 관장님께도 맛보게 해주고 싶을 정도였어요.」"

[[dialogue]]
speaker_original = "館長"
speaker_translation = "관장"
original = "「異世界か……向こうの人たちにご迷惑をおかけしてないといいんだけど」"
translation = "「이세계인가…… 저쪽 사람들에게 폐를 끼치지 않았으면 좋겠는데.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「なんですか、その言いぐさは。向こうじゃ敵をちぎっては投げの大活躍だったんですから」"
translation = "「무슨 소리에요, 그 말투는. 저쪽에서는 적을 찢어서 내던지는 대활약이었으니까요.」"

[[dialogue]]
speaker_original = "館長"
speaker_translation = "관장"
original = "「そうなのか……？\u3000ならいいんだけど……いや、それならこっちでもそれくらい頑張ってほしいんだが……」"
translation = "「그런가……? 그렇다면 다행이지만…… 아니, 그렇다면 여기에서도 그만큼 힘내줬으면 좋겠는데……」"

[[dialogue]]
speaker_original = "館長"
speaker_translation = "관장"
original = "「ところでその格好は？\u3000水着かそれ以上に露出がある気がするんだが」"
translation = "「그런데 그 차림은? 수영복이나 그 이상으로 노출이 있는 것 같은데.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「向こうで変身したんですよ」"
translation = "「저쪽에서 변신한 거예요.」"

[[dialogue]]
speaker_original = "館長"
speaker_translation = "관장"
original = "「変身？」"
translation = "「변신?」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「ええ、念じることで服装が変わるんです。ちなみにこれくらいの露出は向こうでは普通でしたよ」"
translation = "「네, 염원하는 것으로 복장이 바뀌는 거예요. 참고로 이 정도 노출은 저쪽에서는 보통이었답니다.」"

[[dialogue]]
speaker_original = "館長"
speaker_translation = "관장"
original = "「異世界ではそんなことができるのか。……え、普通？」"
translation = "「이세계에서는 그런 게 가능한가. ……에, 보통?」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「む。何かふしだらなことを考えていませんか、館長？」"
translation = "「음. 뭔가 파렴치한 생각을 하고 있지 않나요, 관장님?」"

[[dialogue]]
speaker_original = "館長"
speaker_translation = "관장"
original = "「いや、だってだな……」"
translation = "「아니, 그게 말이지……」"

[[dialogue]]
speaker = "unk"
original = "肩どころか胸元もお腹も太ももも露出した姿で、それが普通と言われたら驚かざるを得ない。"
translation = "어깨는커녕 가슴께와 배, 허벅지도 노출된 모습이라, 그것이 보통이라는 말을 들으니 놀랄 수밖에 없다."

[[dialogue]]
speaker = "unk"
original = "何より、目の前のアルテの姿が大胆過ぎて意識せずにはいられない。"
translation = "무엇보다 눈앞의 아르테의 모습이 너무나 대담해서 의식하지 않을 수 없다."

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「私が居ない間、館長はどうでしたか？\u3000まるで永遠のように長く感じられたのではありませんか？」"
translation = "「제가 없는 동안 관장님은 어떠셨나요? 마치 영원처럼 길게 느껴지지 않았나요?」"

[[dialogue]]
speaker_original = "館長"
speaker_translation = "관장"
original = "「至って普通だったな」"
translation = "「지극히 평범했어.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「強がらなくてもいいんですよ。寂しかったのでしょう？\u3000この天才美少女藝術家が居なかったのですから」"
translation = "「강한 척하지 않아도 돼요. 외로웠지요? 이 천재 미소녀 예술가가 없었으니까요.」"

[[dialogue]]
speaker_original = "館長"
speaker_translation = "관장"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「まったく、仕方がありませんね。その寂しさを埋めるためにも、今夜はここで一緒に寝てあげることにしましょう」"
translation = "「정말이지, 어쩔 수 없네요. 그 외로움을 달래기 위해서라도 오늘 밤은 여기서 같이 자 주기로 하죠.」"

[[dialogue]]
speaker_original = "館長"
speaker_translation = "관장"
original = "「……それはどうも」"
translation = "「……그거 참 고맙군.」"

[[dialogue]]
speaker = "unk"
original = "しょっちゅう勝手に昼寝してるだろ、とは言わなかった。"
translation = "자주 멋대로 낮잠 자고 있잖아, 라는 말은 하지 않았다."

[[dialogue]]
speaker = "unk"
original = "それで機嫌を損ねてしまったら、絶対に後悔すると思ったから。"
translation = "그러다 기분을 상하게 해버리면 분명히 후회할 거라고 생각했으니까."

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「あっ……もう、強引ですね……」"
translation = "「앗…… 정말, 막무가내네요……」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「館長がこんな風に求めてくるなんて……これは私が居なくて相当寂しかったということですかね……」"
translation = "「관장님이 이런 식으로 원해오다니…… 이건 제가 없어서 상당히 외로웠다는 뜻일까요……」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「いいですよ……んんっ……今日は多少のことは大目に見てあげます……思う存分、この天才美少女成分を摂取してください」"
translation = "「좋아요…… 으응…… 오늘은 어느 정도의 일은 눈감아 드릴게요…… 마음껏 이 천재 미소녀 성분을 섭취해 주세요.」"

[[dialogue]]
speaker_original = "館長"
speaker_translation = "관장"
original = "「ああ……お言葉に甘えさせてもらうよ」"
translation = "「아아…… 호의를 받아들이도록 하지.」"

[[dialogue]]
speaker = "unk"
original = "アルテを後ろから抱きしめた俺は、片方の手で胸を掴み、もう片方の手でアルテの太股を抱え上げる。"
translation = "아르테를 뒤에서 껴안은 나는 한 손으로 가슴을 움켜쥐고, 다른 한 손으로 아르테의 허벅지를 안아 올린다."

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「いやらしい格好ですね……んんっ……は、んぅ……それに館長のこれ……」"
translation = "「야한 차림이네요…… 으응…… 하, 응…… 게다가 관장님의 이거……」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「私のあそこに当たってますよ……おち○ちん、こんなにいきり立たせて……鼻息が荒いにも程があります……んんっ……」"
translation = "「제 거거기에 닿고 있어요…… 자지, 이렇게 꼿꼿이 세워가지고…… 콧김이 거친 것도 정도가 있지요…… 으응……」"

[[dialogue]]
speaker = "unk"
original = "アルテの言う通り、俺のペニスはパンパンに怒張していた。"
translation = "아르테의 말대로 내 페니스는 팽팽하게 노성해 있었다."

[[dialogue]]
speaker = "unk"
original = "それを意識させるように、下半身を密着させアルテの局部へと擦りつける。"
translation = "그것을 의식하게 하듯 하반신을 밀착시켜 아르테의 국부에 문지른다."

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「はぁ、あ……んぅん……おち○ちん、こんなに硬くしてしまって……んんっ……そんなに私と交われることが、嬉しいんですか……？」"
translation = "「하아, 아…… 응…… 자지, 이렇게 딱딱하게 해버리고…… 으응…… 그렇게 저와 섞이는 것이 기쁜가요……?」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「ふふっ……こんなに興奮させてしまって……少し申し訳ない気持ちにもなってきますね……」"
translation = "「후훗…… 이렇게 흥분시켜 버리다니…… 조금 미안한 마음도 드네요……」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「仕方ないですね……太ももでもあそこでも、好きなだけ擦りつけるといいですよ」"
translation = "「어쩔 수 없네요…… 허벅지든 거기든, 마음껏 문질러도 좋아요.」"

[[dialogue]]
speaker = "unk"
original = "匂い付けでもするようにペニスをアルテの肌に押し付け、ゾクゾクするような快感を下半身に感じながら、胸だけでなく全身をまさぐっていく。"
translation = "냄새라도 묻히는 것처럼 페니스를 아르테의 피부에 짓누르며, 짜릿한 쾌감을 하반신에 느끼면서 가슴뿐만 아니라 온몸을 더듬어간다."

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「あっ、んん……館長の手……私の身体のラインを、確かめるみたいに……んんんっ……そんな、いやらしい触り方……あ……はぁ、あ、んんっ……」"
translation = "「앗, 응…… 관장님의 손…… 내 몸의 라인을 확인하는 것처럼…… 으으응…… 그런 야한 손길…… 아…… 하아, 아, 응……」"

[[dialogue]]
speaker = "unk"
original = "首元に顔をうずめて、汗ばんだ肌に舌を這わせる。"
translation = "목덜미에 얼굴을 묻고 땀에 젖은 피부에 혀를 놀린다."

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「あっ……！\u3000んぅ、あ……や……首筋、弱いんです……んんんっ……そんなに、舐めないで……」"
translation = "「앗……! 응, 아…… 싫…… 목덜미, 약해요…… 으으응…… 그렇게 핥지 마……」"

[[dialogue]]
speaker = "unk"
original = "彼女の声から、次第に余裕の色が失われていくのが分かった。"
translation = "그녀의 목소리에서 점차 여유가 사라져가는 것을 알 수 있었다."

[[dialogue]]
speaker_original = "館長"
speaker_translation = "관장"
original = "「アルテ……」"
translation = "「아르테……」"

[[dialogue]]
speaker = "unk"
original = "痛いほどに張り詰めたペニスの先端を、おもむろに彼女の入り口へと押し当てた。"
translation = "아플 정도로 팽창한 페니스의 끝을 서서히 그녀의 입구로 밀어붙였다."

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「っん……！\u3000なんですか、もう……入れたいんですか……？」"
translation = "「으응……! 뭐예요, 정말…… 넣고 싶은 건가요……?」"

[[dialogue]]
speaker = "unk"
original = "先端を少し潜らせただけで、花びらの内側からあふれ出した蜜液でベトベトに濡れるのが分かる。"
translation = "끝부분을 조금 밀어 넣은 것만으로도 꽃잎 안쪽에서 넘쳐흐른 애액으로 끈적하게 젖는 것을 느낀다."

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「仕方ありませんね。いいですよ……挿れて、ください……」"
translation = "「어쩔 수 없네요. 좋아요…… 삽입해 주세요……」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「あっ……！！\u3000んんんんんぅうっ……！！！」"
translation = "「앗……!! 으으으으응……!!!」"

[[dialogue]]
speaker = "unk"
original = "力強く、アルテの身体を引き寄せるようにして、ペニスを奥まで押し込む。"
translation = "힘차게 아르테의 몸을 끌어당기듯 페니스를 안쪽 깊숙이 밀어 넣는다."

[[dialogue]]
speaker = "unk"
original = "瞬く間に幹の部分から根元まで、すっぽりと温かい感触に包まれる。"
translation = "순식간에 기둥 부분부터 뿌리까지 따뜻한 감촉에 푹 감싸인다."

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「ああっ……んっ、あっ……ああ……！\u3000あ、んんっ……はぁっ、あ……ああっ……！」"
translation = "「아앗…… 응, 앗…… 아아……! 아, 응…… 하앗, 아…… 아앗……!」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「館長のが……あっ……あん……っ！\u3000はぁ、はっ、んっ……いつもより、大きい……んっ……！」"
translation = "「관장님 거가…… 앗…… 아앙……! 하아, 하앗, 응…… 평소보다 커…… 응……!」"

[[dialogue]]
speaker = "unk"
original = "そのままの勢いで、ゆるやかなピストンを始めると、彼女は驚いたように身体を跳ねさせる。"
translation = "그 기세 그대로 완만한 피스톤 운동을 시작하자 그녀는 놀란 듯 몸을 튀어 올린다."

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「はあっ、あっ、あっ……ん、んんっ……んぅ……はぁ、んぅ……あ、あああ……あ、あ、んんんっ……！」"
translation = "「하앗, 앗, 앗…… 응, 으응…… 응…… 하아, 응…… 아, 아아아…… 아, 아, 으으응……!」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「ん、ぁ……ちょっと、まって、ください……んんっ……いきなり、動くんですか……んんんっ……」"
translation = "「응, 아…… 잠깐만, 기다려, 주세요…… 응…… 갑자기 움직이는 건가요…… 으으응……」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「私と、久しぶりにできて……嬉しいのはわかりますが……あっ、ああ……！\u3000ちょっと、激し過ぎでしょう……んんんっ……！」"
translation = "「저와 오랜만에 해서…… 기쁜 건 알겠지만…… 앗, 아아……! 좀 너무 격렬하잖아요…… 으으응……!」"

[[dialogue]]
speaker_original = "館長"
speaker_translation = "관장"
original = "「そんなに激しくは動いてないぞ。今日のアルテはいつもより感じやすいのか……？」"
translation = "「그렇게 격렬하게 움직이진 않았어. 오늘 아르테는 평소보다 느끼기 쉬운 건가……?」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「そんな……ことは……」"
translation = "「그런…… 건……」"

[[dialogue]]
speaker_original = "館長"
speaker_translation = "관장"
original = "「嬉しいよ。アルテも俺と同じ気持ちだってこと」"
translation = "「기뻐. 아르테도 나와 같은 마음이라는 게.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「な、何を言っているんです……あっ、ん、ああぁあっ……！」"
translation = "「무, 무슨 말을 하는 거예요…… 앗, 응, 아아아앗……!」"

[[dialogue]]
speaker = "unk"
original = "余裕のある口ぶりで軽口を叩いてみせても、本心では久しぶりに会えたことが嬉しくて心を震わせている。"
translation = "여유 있는 어투로 농담을 던져봐도 본심은 오랜만에 만난 것이 기뻐서 마음을 떨고 있다."

[[dialogue]]
speaker = "unk"
original = "こうして抱きしめて、ひとつに交わり合うことにこの上ない喜びを感じてくれている。"
translation = "이렇게 껴안고 하나로 섞이는 것에 더할 나위 없는 기쁨을 느끼고 있다."

[[dialogue]]
speaker = "unk"
original = "そして、求めている。<b>求められる</b>ことを。"
translation = "그리고 원하고 있다. **원해지는** 것을."

[[dialogue]]
speaker_original = "館長"
speaker_translation = "관장"
original = "「アルテが居ない間、俺はずっと寂しかったぞ……こうして抱きしめたいとずっと思ってた……」"
translation = "「아르테가 없는 동안 난 계속 외로웠어…… 이렇게 껴안고 싶다고 계속 생각했지……」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「ぁ……う……そんなこと、言わなくていいですってば……」"
translation = "「아…… 으…… 그런 거 말 안 해도 된다니까요……」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「ふっ……んっ……ん……ひぁああっ……！\u3000館長のおち○ちん、いつもより、熱いです……」"
translation = "「훗…… 응…… 응…… 히아아앗……! 관장님 자지, 평소보다 뜨거워요……」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「はぁっ、はっ、んんっ……あっ……！\u3000ぞりぞりって、内側なぞるみたいに、すりつけてきて……はあぁ……」"
translation = "「하앗, 하앗, 응…… 앗……! 서걱서걱 안쪽을 훑는 것처럼 비벼대서…… 하아……」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「はぁはっ、あ……ん、んん……今日の館長、なんだかねちっこくて、ゾクゾクします……んんっ……！」"
translation = "「하아하앗, 아…… 응, 으응…… 오늘 관장님 왠지 끈적해서 소름 돋아요…… 응……!」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「んっ、はぁ……私のこと、そんなに抱きたかったんですか……？\u3000もう、いやらしい人です……んっ……はあぁ……ふぁああっ！」"
translation = "「응, 하아…… 저를 그렇게 안고 싶었나요……? 정말 야한 사람이에요…… 응…… 하아…… 화아아앗!」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「本当に、仕方ない人……はっ、あっ、あっ……私じゃないと、愛想尽かして、出ていっちゃうんですから……」"
translation = "「정말 어쩔 수 없는 사람…… 앗, 앗, 앗…… 제가 아니면 정떨어져서 나가버릴 테니까요……」"

[[dialogue]]
speaker_original = "館長"
speaker_translation = "관장"
original = "「ああ、だからもうどこにも行くなよ……」"
translation = "「그래, 그러니까 이제 아무 데도 가지 마……」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「やぁ、ぅ……どうして……そんなこと、言うんですか……んんんっ……そんなこと、言われたらぁ……」"
translation = "「아아, 으…… 어째서…… 그런 말을 하는 거예요…… 으으응…… 그런 말을 들으면어……」"

[[dialogue]]
speaker = "unk"
original = "内に秘めた喜びを示すように、俺を包み込んだ膣壁が切なそうに締め付けてくる。"
translation = "내면에 숨긴 기쁨을 나타내듯 나를 감싼 질벽이 애틋하게 조여온다."

[[dialogue]]
speaker = "unk"
original = "俺はわずかに残ったアルテの虚勢をはぎ取るように、彼女の膣の奥深くを貫いた。"
translation = "나는 얼마 남지 않은 아르테의 허세를 벗겨내듯 그녀의 질 깊숙한 곳을 꿰뚫었다."

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「あああっ……！\u3000んんっ、あっ、あっ、あああっ！\u3000あ、あっ、んんっ、あ、あああっ、ん、ああああっ<emoji=heart04>」"
translation = "「아아앗……! 응, 앗, 앗, 아아앗! 아, 앗, 응, 아, 아아앗, 응, 아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「あぁ、あ、んんっ……嬉しい、です……んんっ、あ……ああっ……そんなの、嬉しくなっちゃうじゃ……ないですか……あ、あああっ<emoji=heart04>」"
translation = "「아아, 아, 응…… 기뻐요…… 응, 아…… 아앗…… 그런 거 기뻐져 버리잖아요…… 아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "激しさを増したピストンに、彼女の本心がこぼれ出る。"
translation = "격렬해진 피스톤에 그녀의 본심이 쏟아져 나온다."

[[dialogue]]
speaker = "unk"
original = "そして、一度こぼれ出てしまえば、もうそれをせき止める術はなかった。"
translation = "그리고 한 번 쏟아져 나오면 더는 그것을 막을 방법이 없었다."

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「あっ、あ、あ、ああっ……んんんぅっ……あぁ、あ……あ、ああっ……<emoji=heart04>」"
translation = "「앗, 아, 아, 아앗…… 으으으응…… 아아, 아…… 아, 아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「あぁあ、んんっ……感じて、ますっ……館長にこんな風に、ズボズボしてもらえて……私っ、悦んじゃってますっ……<emoji=heart04>」"
translation = "「아아아, 응…… 느끼고 있어요…… 관장님에게 이런 식으로 박혀서…… 저, 기뻐하고 있어요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "館長"
speaker_translation = "관장"
original = "「ああ、分かるよ……アルテの中、洪水みたいになってるし、締め付けも凄くて……」"
translation = "「아아, 알아…… 아르테 안이 홍수처럼 됐고, 조임도 엄청나서……」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「っ、あ、んうううっ……だって、そうして欲しいと思ってたら……館長が抱きしめてくれて……」"
translation = "「윽, 아, 응으으윽…… 그치만 그렇게 해줬으면 좋겠다고 생각했더니…… 관장님이 안아줘서……」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「私のこと……こんなに求めてくれて……あああっ……嬉しくないはず、ないですっ……んん、あああっ……！」"
translation = "「나를…… 이렇게 원해줘서…… 아아앗…… 기쁘지 않을 리가 없어요…… 응, 아아앗……!」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「はあっ、あっ、あああっ！\u3000もっと、求めてくださいっ！\u3000んんっ……！\u3000もう、どこにも行くなって、身体に刻み付けてくださいっ！」"
translation = "「하앗, 앗, 아아앗! 좀 더 원해 주세요! 응……! 이제 아무 데도 가지 말라고 몸에 새겨주세요!」"

[[dialogue]]
speaker_original = "館長"
speaker_translation = "관장"
original = "「ああ……思いっきり刻み付けてやるよ」"
translation = "「아아…… 마음껏 새겨주지.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「あっ！\u3000あっ！\u3000あ、あぁあああっ<emoji=heart04>\u3000あ、んんっ<emoji=heart04>\u3000あ、んんっ、あ、あああ……感じ、る……んんぅううっ、あ、あああっ<emoji=heart04>」"
translation = "「앗! 앗! 아, 아아아앗<emoji=heart04> 아, 응<emoji=heart04> 아, 응, 아, 아아아…… 느껴…… 으으으응, 아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「ああ、あ、はあっ！\u3000あ、ん、あ、んんんっ！\u3000あ、あああっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000や、あ、んんぅううっ……<emoji=heart04>」"
translation = "「아아, 아, 하앗! 아, 응, 아, 으으응! 아, 아아앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 싫, 아, 으으으응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "絶対にどこにも行けないくらいアルテの身体をしっかり抱きしめながら、何度も何度も身体を打ち付ける。"
translation = "절대로 아무 데도 갈 수 없을 정도로 아르테의 몸을 꽉 껴안으며 몇 번이고 몇 번이고 몸을 부딪친다."

[[dialogue]]
speaker = "unk"
original = "一心不乱に身体を揺さぶり動かしながら、下半身に湧き立つような激しい熱を感じる。"
translation = "일심불란하게 몸을 흔들며 하반신에 끓어오르는 듯한 격렬한 열기를 느낀다."

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「ああっ<emoji=heart04>\u3000んん、あ、あああっ<emoji=heart04>\u3000んんぅ、あ、あ、あああっ、あ……んん、あ、ああぁああっ……<emoji=heart04>」"
translation = "「아앗<emoji=heart04> 응, 아, 아아앗<emoji=heart04> 으응, 아, 아, 아아앗, 아…… 응, 아, 아아아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「館長の、んんっ、あぁああ、っ、あ<emoji=heart04>\u3000私の中で……暴れて、ますっ……ああっ、ん、ぁ、ああっ……んんぅう、あ、あああっ……<emoji=heart04>」"
translation = "「관장님의, 응, 아아아아, 앗, 아<emoji=heart04> 제 안에서…… 날뛰고 있어요…… 아앗, 응, 아, 아앗…… 으으으, 아, 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「はぁ、あ……んんっ……館長っ、んんっ……イキそう、なんですね……んんっ、あ、あああっ……！」"
translation = "「하아, 아…… 응…… 관장님, 응…… 갈 것 같네요…… 응, 아, 아아앗……!」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「あっ、あ、んんっ、あ、あ、んんっ<emoji=heart04>\u3000おねがい……ですっ、んんっ……あ……そのまま、イッて……くださいっ……んんうっ<emoji=heart04>」"
translation = "「앗, 아, 응, 아, 아, 응<emoji=heart04> 부탁이에요, 응…… 아…… 그대로 가 주세요…… 으응<emoji=heart04>」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「一番、奥でっ<emoji=heart04>\u3000射精、してっ<emoji=heart04>\u3000熱いの、思いっきり、注ぎ込んで、くだ、さいっ<emoji=heart04>\u3000んんんっ、んうっ……！」"
translation = "「가장 깊은 곳에서<emoji=heart04> 사정해 줘요<emoji=heart04> 뜨거운 거 마음껏 쏟아부어 주세요<emoji=heart04> 으으응, 응윽……!」"

[[dialogue]]
speaker = "unk"
original = "ひと際乱れたアルテの嬌声に、押しとどめていた欲望が一気にせり上がってくる。"
translation = "유독 흐트러진 아르테의 교성에 억눌러왔던 욕망이 단번에 치솟아 오른다."

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「あっ！\u3000あ、あああっ！\u3000んんっ、く、イクっ、い、イキます、私も……あああっ、や、んんっ、あ、あ、あ、あああっ！」"
translation = "「앗! 아, 아아앗! 응, 윽, 가요, 가, 가버려요 저도…… 아아앗, 싫, 응, 아, 아, 아, 아아앗!」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「あああ、あっ、あ、あ、ああっ<emoji=heart04>\u3000んんっ、あ、ああっ、館長っ、館長っ、あ、ああっ、あ、んんっ、あ、もう、私、あ、ああああっ……<emoji=heart04>」"
translation = "「아아아, 앗, 아, 아, 아앗<emoji=heart04> 응, 아, 아앗, 관장님, 관장님, 아, 아앗, 아, 응, 아, 이제 나, 아, 아아아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「イク、イク、イッくぅっ<emoji=heart04>\u3000イクイクっ<emoji=heart04>\u3000ふぁっ、あ、あ、あ、あ<emoji=heart04>\u3000あっ──あっ──あっ──ああぁっ──」"
translation = "「가, 가, 가버려엇<emoji=heart04> 가버려가버려<emoji=heart04> 화앗, 아, 아, 아, 아<emoji=heart04> 앗── 앗── 앗── 아아앗──」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「や、んぅ……ぁ……あああああああああああああああああっ<emoji=heart04><emoji=heart04><emoji=heart04>！！！！！」"
translation = "「아, 응…… 아…… 아아아아아아아아아아아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04>!!!!!」"

[[dialogue]]
speaker = "unk"
original = "アルテの絶頂の叫びと共に、弾けるような欲望のほとばしりを感じる。"
translation = "아르테의 절정의 절규와 함께 터져 나오는 욕망의 분출을 느낀다."

[[dialogue]]
speaker = "unk"
original = "下半身がドクドクと脈打ち、熱い液体がアルテの膣内を満たしていく。"
translation = "하반신이 펄떡펄떡 고동치며 뜨거운 액체가 아르테의 질 안을 가득 채워간다."

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「ああっ、あっ、んんっ！\u3000せい、しっ、出てるっ……館長の、熱い精子、いっぱい注ぎ込まれてます……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아앗, 앗, 응! 정액, 나오고 있어…… 관장님의 뜨거운 정액, 잔뜩 쏟아부어지고 있어요……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「身体、ビクビクして……止まらない、んんっ、ああっ……<emoji=heart04>\u3000あ、は、あああ、んんっ、あ……んんぅ……あ、ああああっ……<emoji=heart04>」"
translation = "「몸이 파르르 떨려서…… 멈추지 않아, 응, 아앗……<emoji=heart04> 아, 하, 아아아, 응, 아…… 으응…… 아, 아아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "搾り取るようにペニスを締め上げながら、激しい絶頂の波に呑まれるアルテ。"
translation = "쥐어짜듯 페니스를 조여대며 격렬한 절정의 파도에 삼켜지는 아르테."

[[dialogue]]
speaker = "unk"
original = "硬直した身体から少しずつ力が抜け始めたのは、アルテの膣内を思う存分満たし尽くした後だった。"
translation = "경직된 몸에서 조금씩 힘이 빠지기 시작한 것은 아르테의 질 안을 마음껏 가득 채운 후였다."

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「はぁ……ふぅ……んん……んぅ……」"
translation = "「하아…… 후우…… 응…… 응……」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「見なくても、分かります……どれだけ出したんですか……」"
translation = "「보지 않아도 알아요…… 얼마나 내보낸 건가요……」"

[[dialogue]]
speaker_original = "館長"
speaker_translation = "관장"
original = "「自分でもびっくりするほど、だな……」"
translation = "「나조차 깜짝 놀랄 정도군……」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「少し顔を見られなかったくらいでこんなになってしまうなんて……館長はどれだけ私のことが好きなんですか……？」"
translation = "「잠시 얼굴을 보지 못한 것 정도로 이렇게 되어버리다니…… 관장님은 얼마나 저를 좋아하는 건가요……?」"

[[dialogue]]
speaker_original = "館長"
speaker_translation = "관장"
original = "「そんな事を言いながら、アルテの本音はちゃんと聞かせてもらったから」"
translation = "「그런 소리를 하면서 아르테의 본심은 제대로 들었으니까.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「さ、さて……何のことだか……」"
translation = "「그, 글쎄요…… 무슨 일인지……」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「でもまあ、これからはあなたの傍からいなくならないようにしてあげますよ……」"
translation = "「하지만 뭐, 이제부터는 당신 곁에서 사라지지 않도록 해 드릴게요……」"

[[dialogue]]
speaker = "unk"
original = "アルテは懸命にいつもの調子を取り戻そうとしているようだった。"
translation = "아르테는 필사적으로 평소의 어조를 되찾으려 하는 것 같았다."

[[dialogue]]
speaker = "unk"
original = "きっとそうしないと、明日からどうやって顔を合わせていいかわからなくなるから。"
translation = "분명 그렇게 하지 않으면 내일부터 어떻게 얼굴을 마주해야 할지 알 수 없게 될 테니까."

[[dialogue]]
speaker = "unk"
original = "だから無理やり取り繕おうとしているのだと思うと、アルテのことが可愛くて可愛くてたまらなくなってしまうのだった。"
translation = "그래서 억지로 꾸며내려 한다는 생각을 하니, 아르테가 너무나도 귀여워 견딜 수 없게 되어버리는 것이었다."

