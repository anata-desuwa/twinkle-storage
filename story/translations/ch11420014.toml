[[dialogue]]
speaker = "unk"
original = "第４話,最後の夜に,P"
translation = "제4화, 마지막 밤에"

[[dialogue]]
speaker = "unk"
original = "その知らせは、やはり突然だった。"
translation = "그 소식은 역시 갑작스러웠다."

[[dialogue]]
speaker = "ラファエロ"
original = "「そうか……それは吉報だね。いよいよアテネスに帰還する日がやってくるというわけだ」"
translation = "「그런가…… 그건 길보군. 드디어 아테네스로 귀환할 날이 다가온다는 뜻이군」"

[[dialogue]]
speaker = "ステラ"
original = "「思い返してみるとずいぶん長い間、この世界に居た気がしますね……」"
translation = "「되돌아보면 꽤 오랜 시간, 이 세계에 있었던 기분이 드네요……」"

[[dialogue]]
speaker = "unk"
original = "昨日の夜、ようやく全ての世界で事件が落ち着いたから、２人を元の世界に戻せるとベア子たちから知らせが来たのだった。"
translation = "어젯밤, 드디어 모든 세계에서 사건이 진정되었기에 두 사람을 원래 세계로 돌려보낼 수 있다는 소식이 베아코 일행으로부터 온 것이었다."

[[dialogue]]
speaker = "ステラ"
original = "「ここで過ごすのも今日が最後……。明日には黒ベア子さんたちが、ボクたちを送り返しに来るんですよね？」"
translation = "「여기서 지내는 것도 오늘이 마지막……. 내일이면 흑베아코 씨 일행이 저희를 돌려보내러 오는 거죠?」"

[[dialogue]]
speaker = "unk"
original = "多分大丈夫だよ！"
translation = "아마 괜찮을 거야!"

[[dialogue]]
speaker = "unk"
original = "黒くない方が言ってたから"
translation = "검지 않은 쪽이 말했으니까"

[[dialogue]]
speaker = "ルリエル"
original = "「なるほど！\u3000黒ベア子さんの方だと、今一つ信用に欠けましたが、黒くないベア子さんなら大丈夫そうですね～」"
translation = "「과연! 흑베아코 씨 쪽이라면 조금 신용이 부족했지만, 검지 않은 베아코 씨라면 괜찮을 것 같네요~」"

[[dialogue]]
speaker = "ルリエル"
original = "「とにかく今日で流星市国ともお別れですから、心残りの無いように楽しんでいってください♪」"
translation = "「어쨌든 오늘로 유성시국과도 작별이니까, 미련이 남지 않도록 즐겁게 지내다 가세요♪」"

[[dialogue]]
speaker = "ラファエロ"
original = "「さて、忙しくなりそうだ。やり残したことを全てやり尽くさないとね」"
translation = "「자, 바빠지겠는걸. 남겨둔 일을 전부 다 끝내야겠어」"

[[dialogue]]
speaker = "ステラ"
original = "「やり残したこと？\u3000ラファエロさんは何かあるんですか？」"
translation = "「남겨둔 일이요? 라파엘로 씨는 뭔가 있으신가요?」"

[[dialogue]]
speaker = "ラファエロ"
original = "「大作を作っている最中なんだ。あと一息というところまでは来ているから、何としても今夜までに完成させてみせるよ」"
translation = "「대작을 만들고 있는 중이야. 이제 한 고비만 넘기면 되는 지점까지 왔으니까, 무슨 일이 있어도 오늘 밤까지는 완성해 보이겠어」"

[[dialogue]]
speaker = "ステラ"
original = "「ラファエロさんって、本当に藝術家なんですね……」"
translation = "「라파엘로 씨는 정말 예술가시네요……」"

[[dialogue]]
speaker = "ラファエロ"
original = "「ふふ、いまさら何を言っているんだい？\u3000もしかしてステラはぼくが藝術家だと信じてなかったのかな？」"
translation = "「후후, 새삼스럽게 무슨 소릴 하는 거니? 설마 스텔라는 내가 예술가라는 걸 믿지 않았던 걸까?」"

[[dialogue]]
speaker = "ステラ"
original = "「あっ！\u3000ご、ごめんなさい……そういう意味じゃなくて……」"
translation = "「앗! 죄, 죄송해요…… 그런 뜻이 아니라……」"

[[dialogue]]
speaker = "ラファエロ"
original = "「分かっているよ。まさにきみの言う通り、ぼくはどこまでも、根っからの藝術家なんだ」"
translation = "「알고 있어. 정말 네 말대로, 나는 뼛속까지 예술가니까」"

[[dialogue]]
speaker = "ラファエロ"
original = "「だから、ひとつでも多くの作品を残すことで証を残し、そして……楽しい時間をくれたこの世界に、感謝の気持ちを示したいと思っている」"
translation = "「그러니 단 하나라도 더 많은 작품을 남겨 증거를 새기고, 그리고…… 즐거운 시간을 준 이 세계에 감사의 마음을 표하고 싶어」"

[[dialogue]]
speaker = "ステラ"
original = "「ラファエロさん……」"
translation = "「라파엘로 씨……」"

[[dialogue]]
speaker = "ラファエロ"
original = "「そういうきみは、残された時間をどうやって過ごすつもりなんだい？」"
translation = "「그나저나 너는 남은 시간을 어떻게 보낼 생각이니?」"

[[dialogue]]
speaker = "ステラ"
original = "「うーん、そうですね……」"
translation = "「으음, 글쎄요……」"

[[dialogue]]
speaker = "ステラ"
original = "「えへへ。会長さんにルリエルさん、ボクのわがままを聞いてくれてありがとうございます」"
translation = "「에헤헤. 회장님에 루리엘 씨, 제 이기심을 들어주셔서 감사합니다」"

[[dialogue]]
speaker = "ルリエル"
original = "「いえいえ、ちっとも構わないのです！\u3000むしろとってもワクワクしています♪」"
translation = "「아니에요, 전혀 상관없답니다! 오히려 무척 설레고 있어요♪」"

[[dialogue]]
speaker = "ルリエル"
original = "「それにしてもまさか、新星学園の星徒会室でお泊りすることになるなんて、思ってもみませんでした♪」"
translation = "「그나저나 설마 신성학원의 성도회실에서 하룻밤 묵게 될 줄은 생각지도 못했어요♪」"

[[dialogue]]
speaker = "ルリエル"
original = "「こうしてテントに入るとキャンプしてるみたいで、とっても新感覚なのです！」"
translation = "「이렇게 텐트에 들어오니 캠핑하는 것 같아서 무척 새로운 기분이에요!」"

[[dialogue]]
speaker = "ルリエル"
original = "「会長さんも恥ずかしがってないで、中に入ってきてくださいよ～♪」"
translation = "「회장님도 부끄러워하지 말고 안으로 들어오세요~♪」"

[[dialogue]]
speaker = "unk"
original = "遠慮しとくよ"
translation = "사양할게"

[[dialogue]]
speaker = "unk"
original = "いや、それはさすがに……"
translation = "아니, 그건 역시 좀……"

[[dialogue]]
speaker = "ステラ"
original = "「ふふふ……♪」"
translation = "「후후후……♪」"

[[dialogue]]
speaker = "ルリエル"
original = "「でもどうして、こんなことをしようと思ったんですか？」"
translation = "「그런데 어째서 이런 걸 하려고 생각하신 건가요?」"

[[dialogue]]
speaker = "ステラ"
original = "「この世界で過ごすのも今日が最後って言われて、その後ラファエロさんとお話して……」"
translation = "「이 세계에서 지내는 것도 오늘이 마지막이라는 말을 듣고, 그 후에 라파엘로 씨와 이야기를 나눴거든요……」"

[[dialogue]]
speaker = "ステラ"
original = "「それで、ラファエロさんは残りの時間をどうやって過ごすのか、聞いてみたんです」"
translation = "「그래서 라파엘로 씨는 남은 시간을 어떻게 보낼 건지 물어봤어요」"

[[dialogue]]
speaker = "ステラ"
original = "「ラファエロさんは藝術家として、ひとつでも作品を残して……楽しい時間をくれたこの世界に感謝の気持ちを示したいって言ってました」"
translation = "「라파엘로 씨는 예술가로서 작품을 하나라도 더 남겨서…… 즐거운 시간을 준 이 세계에 감사의 마음을 표하고 싶다고 하셨거든요」"

[[dialogue]]
speaker = "ステラ"
original = "「それで考えてみたんです。ボクがこの世界に示すことができる、感謝の気持ちって何なのかなって……」"
translation = "「그래서 생각해 봤어요. 제가 이 세계에 보여줄 수 있는 감사의 마음이란 게 뭘까 하고……」"

[[dialogue]]
speaker = "ルリエル"
original = "「なるほど！\u3000ステラさんはこうして引きこもることで、世界への感謝を示そうというわけですねっ！」"
translation = "「과연! 스텔라 씨는 이렇게 히키코모리 생활을 함으로써 세계에 감사를 표하겠다는 거군요!」"

[[dialogue]]
speaker = "ステラ"
original = "「違いますっ！\u3000そんなわけないじゃないですか！」"
translation = "「아니에요! 그럴 리가 없잖아요!」"

[[dialogue]]
speaker = "ステラ"
original = "「……ボクには、ラファエロさんのような特技はないから、この世界に何かを残していくことはできません」"
translation = "「……제게는 라파엘로 씨 같은 특기가 없어서 이 세계에 무언가를 남기고 갈 수는 없어요」"

[[dialogue]]
speaker = "ステラ"
original = "「だからせめて……感謝の気持ちは、ちゃんと示していきたいと思ったんですっ」"
translation = "「그러니 적어도…… 감사의 마음만큼은 제대로 전하고 싶다고 생각했어요」"

[[dialogue]]
speaker = "ステラ"
original = "「会長さん、ルリエルさん……短い間でしたけど、本当に楽しい時間をありがとうございました……」"
translation = "「회장님, 루리엘 씨…… 짧은 시간이었지만 정말 즐거운 시간을 보내게 해 주셔서 감사합니다……」"

[[dialogue]]
speaker = "ステラ"
original = "「今夜はこうやってゴロゴロしながら、お世話になった２人にいっぱいありがとうを言わせてください」"
translation = "「오늘 밤은 이렇게 뒹굴거리면서 신세를 진 두 분께 고맙다는 말을 잔뜩 하게 해 주세요」"

[[dialogue]]
speaker = "ルリエル"
original = "「ステラさん……」"
translation = "「스텔라 씨……」"

[[dialogue]]
speaker = "ステラ"
original = "「本当はラファエロさんも誘いたかったんですけど……ラファエロさんの残された時間を邪魔するわけにはいかないですから」"
translation = "「사실 라파엘로 씨도 초대하고 싶었지만…… 라파엘로 씨의 남은 시간을 방해할 수는 없으니까요」"

[[dialogue]]
speaker = "ルリエル"
original = "「わかりました！\u3000ラファエロさんの分まで、いっぱいゴロゴロしながら語り合いましょう♪」"
translation = "「알겠습니다! 라파엘로 씨 몫까지 잔뜩 뒹굴거리며 이야기꽃을 피워봐요♪」"

[[dialogue]]
speaker = "ステラ"
original = "「はいっ」"
translation = "「네!」"

[[dialogue]]
speaker = "unk"
original = "こうして俺たちは夜空が白み始めるまで、初めて会ったあの日からの思い出を語り合うのだった。"
translation = "이렇게 우리는 밤하늘이 밝아오기 시작할 때까지, 처음 만났던 그날부터의 추억을 이야기하는 것이었다."

