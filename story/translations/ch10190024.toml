[[dialogue]]
speaker = "unk"
original = "第４話,修行・イチャイチャお家デート,P"
translation = "제4화, 수행·꽁냥꽁냥 집 데이트, P"

[[dialogue]]
speaker = "せつな"
original = "「せつなの誕生日プレゼントは、主様と１日イチャイチャお家デートでお願いいたしまする！」"
translation = "「세츠나의 생일 선물은 주님과 하루 종일 꽁냥꽁냥 집 데이트를 하는 것으로 부탁드리오!」"

[[dialogue]]
speaker = "せつな"
original = "「え？\u3000それはいつもやってる……？」"
translation = "「에? 그건 평소에도 하고 있다고……?」"

[[dialogue]]
speaker = "せつな"
original = "「いえいえ、これはそういういつも通りのアレコレではないのでござる」"
translation = "「아니오, 이건 그런 평소와 다름없는 이런저런 것이 아니오.」"

[[dialogue]]
speaker = "せつな"
original = "「もうせつなも、主様の専属忍者兼恋人となって、それなりの時間が過ぎたでござる」"
translation = "「이미 세츠나도 주님의 전속 닌자 겸 연인이 되어 꽤 시간이 흘렀소.」"

[[dialogue]]
speaker = "せつな"
original = "「にも関わらず、いつまでも恋愛が恥ずかしいとか、言っていられないのでござりまする！」"
translation = "「그럼에도 언제까지나 연애가 부끄럽다느니 뭐라느니 하고 있을 수는 없는 것이오!」"

[[dialogue]]
speaker = "せつな"
original = "「だから今年の誕生日プレゼントは、主様のお時間を丸一日いただき、せつながプロデュースする『お家デート』を実行したいのでござる」"
translation = "「그러니 올해 생일 선물은 주님의 시간을 온종일 빌려, 세츠나가 프로듀스하는 『집 데이트』를 실행하고 싶소.」"

[[dialogue]]
speaker = "unk"
original = "プレゼントは別で用意しておくね"
translation = "선물은 따로 준비해 둘게."

[[dialogue]]
speaker = "unk"
original = "じゃあそれはそれとして"
translation = "그럼 그건 그거대로 하고,"

[[dialogue]]
speaker = "せつな"
original = "「ありがとうございまする、主様！\u3000一生懸命デートプランを考えてくるので、楽しみにしていてほしいでござる」"
translation = "「고맙소, 주님! 열심히 데이트 플랜을 짜올 테니 기대해 주었으면 하오.」"

[[dialogue]]
speaker = "unk"
original = "そして、せつなの誕生日当日。"
translation = "그리고 세츠나의 생일 당일."

[[dialogue]]
speaker = "unk"
original = "誕生日おめでとう、せつな"
translation = "생일 축하해, 세츠나."

[[dialogue]]
speaker = "せつな"
original = "「嬉しいでござる、主様！\u3000せつなもデートに向けて、おめかししてきたでござる♪」"
translation = "「기쁘오, 주님! 세츠나도 데이트를 위해 한껏 꾸미고 왔소♪」"

[[dialogue]]
speaker = "せつな"
original = "「えへへぇ～♪\u3000可愛いでござるか？\u3000せつなもこの衣装、気に入ってるでござる」"
translation = "「에헤헤~♪ 귀엽소? 세츠나도 이 의상, 마음에 쏙 들었소.」"

[[dialogue]]
speaker = "せつな"
original = "「主様に『可愛い』って言ってもらうの、やっぱり転げまわりたくなるほど恥ずかしいでござるが……それでもやっぱり、嬉しいでござる<emoji=heart04>」"
translation = "「주님께 『귀엽다』는 말을 듣는 건 역시 몸둘 바를 모를 정도로 부끄럽소만…… 그래도 역시 기쁘오<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
original = "「主様にもっともっと『可愛い』って言ってもらえるように、もっともっと修行して、堂々と並びたてるパートナーになるでござる」"
translation = "「주님께 더욱더 『귀엽다』는 말을 들을 수 있도록 더욱더 수행해서, 당당히 곁에 설 수 있는 파트너가 되겠소.」"

[[dialogue]]
speaker = "せつな"
original = "「にゃっ！？\u3000そ、その……まだ他の人がいる前では、勘弁してほしいでござるぅ。もちろん、ゆくゆくはそれもできるように、立派な恋人忍者になるつもりでござる」"
translation = "「냐앗!? 그, 그게…… 아직 다른 사람이 있는 앞에서는 봐주었으면 하오. 물론 머지않아 그것도 가능하도록 훌륭한 연인 닌자가 될 생각이오.」"

[[dialogue]]
speaker = "unk"
original = "誕生日だったのにちょっと意地悪だった"
translation = "생일인데 조금 짖궂었나."

[[dialogue]]
speaker = "unk"
original = "ごめん、ごめん"
translation = "미안, 미안."

[[dialogue]]
speaker = "せつな"
original = "「いえいえ、そのための修行デートでござる！」"
translation = "「아니오, 그러기 위한 수행 데이트요!」"

[[dialogue]]
speaker = "せつな"
original = "「いつもは主様にエスコートしてもらってばかりでござるが、今日はせつなが頑張りたいでござる」"
translation = "「평소에는 주님께 에스코트받기만 했소만, 오늘은 세츠나가 힘내고 싶소.」"

[[dialogue]]
speaker = "せつな"
original = "「というわけで、ジャジャーン！\u3000お家デートの定番、恋愛映画でござる！\u3000ヨミ殿にオススメを借りてきたでござる」"
translation = "「그런 의미에서, 짜잔! 집 데이트의 정석, 연애 영화요! 요미 공에게 추천받아 빌려왔소.」"

[[dialogue]]
speaker = "せつな"
original = "「あ、主様……鋭いでござるな。これは最もせつなが苦手にしているものと言っても、過言ではないでござりまする……」"
translation = "「아, 주님…… 날카롭구려. 이건 세츠나가 가장 서툴러 하는 것이라고 해도 과언이 아니오……」"

[[dialogue]]
speaker = "せつな"
original = "「何度か、別の映画を一人で観てみたのでござるが……あまりの羞恥で九浄家のお屋敷にある自室を半壊させてしまったでござる」"
translation = "「몇 번인가 다른 영화를 혼자서 보려 시도해 보았소만…… 너무나 수치스러운 나머지 쿠죠가 저택에 있는 제 방을 반파시키고 말았소.」"

[[dialogue]]
speaker = "unk"
original = "この家、大丈夫か……！？"
translation = "이 집, 괜찮은 건가……!?"

[[dialogue]]
speaker = "せつな"
original = "「だ、大丈夫でござる……！！\u3000今日は主様が一緒でござりまする！」"
translation = "「괘, 괜찮소……!! 오늘은 주님이 함께 계시지 않소!」"

[[dialogue]]
speaker = "せつな"
original = "「どんなに破廉恥で小っ恥ずかしい拷問を受けようとも、主様に手を握っていただければ暴れ出したりはしないでござる。忍びとはそういうものでござる！」"
translation = "「아무리 파렴치하고 낯간지러운 고문을 받더라도, 주님께서 손을 잡아주신다면 날뛰거나 하지는 않을 것이오. 닌자란 그런 법이오!」"

[[dialogue]]
speaker = "unk"
original = "恋愛映画はそういうものではないけどね！？"
translation = "연애 영화는 그런 게 아니라고 생각하는데!?"

[[dialogue]]
speaker = "せつな"
original = "「だ、ダメでござりまするか……？\u3000せつな、確かに恋愛映画は大の苦手ではござりまするが、興味がないわけではないでござる」"
translation = "「안, 안 되겠소……? 세츠나, 확실히 연애 영화는 정말 쥐약이오만, 흥미가 없는 건 아니오.」"

[[dialogue]]
speaker = "せつな"
original = "「正確に言えば、主様の恋人忍者になったことで、昔よりも明確に……興味が出てきたでござる」"
translation = "「정확히 말하자면, 주님의 연인 닌자가 됨으로써 예전보다 명확하게…… 흥미가 생겼소.」"

[[dialogue]]
speaker = "せつな"
original = "「せつな自身は、主様のそばにいて、たまに褒めてもらえさえすれば、満足でござる……」"
translation = "「세츠나 자신은 주님 곁에 있으며 가끔 칭찬받기만 해도 만족하오……」"

[[dialogue]]
speaker = "せつな"
original = "「ですが、世の恋人というのは、きっとそういう関係ではないと思ったのでござりまする……」"
translation = "「하지만 세상의 연인이라는 건 분명 그런 관계만이 아닐 거라 생각했소……」"

[[dialogue]]
speaker = "せつな"
original = "「せつなの一方的な満足ではなく、主様が恋人になにを求めているのか、みんなは恋人同士でするどんなことに憧れるのか、そういうことがせつなも知りたいのでござる」"
translation = "「세츠나의 일방적인 만족이 아니라, 주님이 연인에게 무엇을 바라는지, 다들 연인끼리 하는 어떤 일들을 동경하는지, 그런 것들을 세츠나도 알고 싶소.」"

[[dialogue]]
speaker = "せつな"
original = "「だからせつなと……恋愛映画を観て欲しいでござる」"
translation = "「그러니 세츠나와…… 연애 영화를 봐주었으면 하오.」"

[[dialogue]]
speaker = "unk"
original = "そんなの……いいに決まってる"
translation = "그런 건…… 당연히 좋지."

[[dialogue]]
speaker = "せつな"
original = "「主様っ<emoji=heart04>\u3000ありがとうございまするにゃん♪」"
translation = "「주님<emoji=heart04> 고맙소 냥♪」"

[[dialogue]]
speaker = "せつな"
original = "「それではさっそく、恋愛映画を再生機にセットして……」"
translation = "「그럼 당장 연애 영화를 재생기에 세팅하고……」"

[[dialogue]]
speaker = "せつな"
original = "「にゃにゃんっ！？\u3000主様、いつになく積極的でござる……っ」"
translation = "「냐냐냥!? 주님, 평소보다 적극적이오……!」"

[[dialogue]]
speaker = "せつな"
original = "「世の恋人は、彼女を膝の上に乗せて、くっついて映画を観たりする……でござるか？」"
translation = "「세상의 연인은 여자를 무릎 위에 앉히고 딱 붙어서 영화를 보거나…… 하오?」"

[[dialogue]]
speaker = "せつな"
original = "「そ、そうでござるな……ちょっと恥ずかしいでござるが、嫌ではないと申しまするか……主様の体温を背中全体に感じられて、むしろ嬉しいでござる<emoji=heart04>」"
translation = "「그, 그렇구려…… 조금 부끄럽소만 싫지는 않다고나 할까…… 주님의 체온을 등 전체로 느낄 수 있어서 오히려 기쁘오<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
original = "「今日は世間の恋人がどういうものかを学び、実践する日でござる。手を繋ぐのも、膝の上でくっつき合うのも、何でも試していくでござる」"
translation = "「오늘은 세상의 연인들이 어떤지 배우고 실천하는 날이오. 손을 잡는 것도, 무릎 위에서 밀착하는 것도 뭐든 시도해 보겠소.」"

[[dialogue]]
speaker = "せつな"
original = "「主様の方こそ、途中で照れ臭くなったとか言って、逃げたらダメでござるよ♪」"
translation = "「주님이야말로 도중에 쑥스러워졌다면서 도망치면 안 되오♪」"

[[dialogue]]
speaker = "せつな"
original = "「それじゃあ、２人でぬくぬくくっついたまま、めちゃ甘と評判の恋愛映画を観るでござる！」"
translation = "「그럼 둘이서 뜨끈뜨끈하게 붙은 채로, 아주 달달하다고 소문난 연애 영화를 보겠소!」"

[[dialogue]]
speaker = "unk"
original = "そうして、その日一日、俺とせつなはイチャイチャお家デートを実践するのだった。"
translation = "그렇게 그날 하루, 나와 세츠나는 꽁냥꽁냥 집 데이트를 실천했다."

[[dialogue]]
speaker = "unk"
original = "自分も相当イチャイチャしてると思うのだが、映画のキスシーンではしっかり真っ赤になって固まっているせつなは、やっぱり可愛いなと思った。"
translation = "본인들도 상당히 꽁냥거리고 있다고 생각하지만, 영화의 키스신에서는 여지없이 얼굴을 붉히며 굳어버리는 세츠나는 역시 귀엽다고 생각했다."

