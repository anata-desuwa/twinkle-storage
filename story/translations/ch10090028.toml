[[dialogue]]
speaker = "セーラ"
original = "「どうぞお客様。ご注文のドリンクです」"
translation = "「여기 있습니다, 손님. 주문하신 드링크입니다」"

[[dialogue]]
speaker = "クロト"
original = "「うむ。これはチップだ。取っておきたまえ」"
translation = "「음. 이건 팁이다. 받아두게나」"

[[dialogue]]
speaker = "セーラ"
original = "「あん……<emoji=heart04>\u3000お客様ったらもう……<emoji=heart04>」"
translation = "「앙……<emoji=heart04> 손님도 참 정말……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "お尻をスリスリと撫でながら胸の谷間にチップを挟む。"
translation = "엉덩이를 슬슬 문지르며 가슴 골 사이에 팁을 끼워 넣는다."

[[dialogue]]
speaker = "unk"
original = "ああ、とても良い気分だ。セーラさんの照れて困った顔がとても可愛い。"
translation = "아아, 무척 기분이 좋다. 세라 씨의 부끄러워하며 곤란해하는 얼굴이 무척 귀엽다."

[[dialogue]]
speaker = "クロト"
original = "「そらもっとチップをあげよう。今度は胸元をこちらに寄せたまえ」"
translation = "「자, 팁을 더 주지. 이번엔 가슴팍을 이쪽으로 가까이 대보게」"

[[dialogue]]
speaker = "セーラ"
original = "「んもう、セクハラし・す・ぎ<emoji=heart04>\u3000会長さんの中の大富豪のイメージどーなってんのさ<emoji=heart04>」"
translation = "「정말, 성희롱 너·무·해<emoji=heart04> 회장님 머릿속의 대부호 이미지는 대체 어떻게 된 거야<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「いいからいいから。賭けに勝ったら相手の言うこと何でも聞くって約束ですよね？」"
translation = "「됐으니까 됐으니까. 내기에서 이기면 상대방이 말하는 건 뭐든 듣기로 약속했죠?」"

[[dialogue]]
speaker = "セーラ"
original = "「わかってるけど……<emoji=heart04>\u3000んふ……<emoji=heart04>\u3000まさか大富豪になってバニーガールやってるうちをお金の力で好きにしたいって言われるとは……<emoji=heart04>」"
translation = "「알고는 있지만……<emoji=heart04> 응후……<emoji=heart04> 설마 대부호가 돼서 바니걸 하고 있는 나를 돈의 힘으로 마음대로 하고 싶다는 말을 들을 줄이야……<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「うち、そこまでお金に困ってないんだけどなー……<emoji=heart04>\u3000セクハラされてまでチップもらうつもりなんかないし<emoji=heart04>」"
translation = "「나, 그렇게까지 돈이 궁하진 않은데 말이야~……<emoji=heart04> 성희롱당하면서까지 팁 받을 생각은 없구<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「まぁそう言わずに。それより……今夜どうだね？」"
translation = "「뭐 그렇게 말하지 말고. 그보다…… 오늘 밤 어떤가?」"

[[dialogue]]
speaker = "セーラ"
original = "「ひゃぁん……<emoji=heart04>\u3000だからノリノリすぎだってば<emoji=heart04>」"
translation = "「히양……<emoji=heart04> 그러니까 너무 신났다니까<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「大富豪のお客様は、うちとの一晩にどのくらいの値段を付けてくれるんだろうね？」"
translation = "「대부호 손님은, 나랑 보내는 하룻밤에 어느 정도의 가격을 매겨주려나?」"

[[dialogue]]
speaker = "セーラ"
original = "「その金額次第では……ふふ<emoji=heart04>\u3000お誘いに乗っても構いませんよ？」"
translation = "「그 금액에 따라서는…… 후후<emoji=heart04> 유혹에 넘어가 줄 수도 있다구요?」"

[[dialogue]]
speaker = "unk"
original = "からかうようにセーラさんが笑みを浮かべてくる。"
translation = "놀리듯이 세라 씨가 미소를 지어 보인다."

[[dialogue]]
speaker = "unk"
original = "そうだな。もしも俺がカジノの常連富豪客で、ずっと狙っていたセーラさんにこう囁かれたとしたら──"
translation = "그렇군. 만약 내가 카지노의 단골 부호 손님이고, 계속 노리고 있던 세라 씨에게 이렇게 속삭였다면──"

[[dialogue]]
speaker = "セーラ"
original = "「きゃっ<emoji=heart04>\u3000お客様、部屋に入るなりこれは……<emoji=heart04>」"
translation = "「꺄악<emoji=heart04> 손님, 방에 들어오자마자 이건……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「良いではないか。この一晩に全財産を捧げたんだ。今夜はセーラくんを私の好きにさせてもらうぞ」"
translation = "「좋지 않은가. 이 하룻밤에 전 재산을 바쳤다. 오늘 밤은 세라 군을 내 마음대로 하도록 하겠네」"

[[dialogue]]
speaker = "unk"
original = "肉付きの良い桃尻を揉みながら、パンパンに勃起したペニスを擦り付けていく。"
translation = "살집 좋은 복숭아 엉덩이를 주무르며, 팽팽하게 발기한 자지를 문지른다."

[[dialogue]]
speaker = "セーラ"
original = "「はぁはぁ、興奮しすぎですよっ<emoji=heart04>\u3000そこまでして、んふ、うちを手に入れたいって言ってくれたのは光栄ですけど<emoji=heart04>」"
translation = "「하아 하아, 너무 흥분하셨어요<emoji=heart04> 그렇게까지 해서, 응후, 나를 손에 넣고 싶다고 말해준 건 영광이지만<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「少なくともシャワー浴びてからとか<emoji=heart04>\u3000せっかく高そうなホテルにまで来てるのにっ<emoji=heart04>」"
translation = "「적어도 샤워부터 한다든가<emoji=heart04> 어렵게 비싼 호텔까지 왔는데 말이야<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「待ちきれるものか。ああ、本当に素晴らしい体だ……」"
translation = "「기다릴 수 있을 리가 없지. 아아, 정말 훌륭한 몸이다……」"

[[dialogue]]
speaker = "セーラ"
original = "「あぁんっ……<emoji=heart04>\u3000揉みすぎ、ふぁっ<emoji=heart04>\u3000擦り付けすぎですってばっ<emoji=heart04>」"
translation = "「아앙……<emoji=heart04> 너무 주물러, 하앗<emoji=heart04> 너무 문지른다니까요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "顔を赤くして逃れようとするセーラさんの腕を引っ張って強引に止める。"
translation = "얼굴을 붉히며 벗어나려는 세라 씨의 팔을 잡아당겨 강제로 멈춘다."

[[dialogue]]
speaker = "unk"
original = "もし本当に俺がセーラさんを買ったとしたら、１分１秒だって無駄にしないだろう。"
translation = "만약 정말로 내가 세라 씨를 샀다면, 1분 1초도 낭비하지 않을 것이다."

[[dialogue]]
speaker = "unk"
original = "恋人同士でイチャイチャするのとは訳が違う。俺にはこの瞬間、この一晩しか彼女の体を自由にすることはできない。"
translation = "연인끼리 꽁냥거리는 것과는 차원이 다르다. 나에게는 이 순간, 이 하룻밤밖에 그녀의 몸을 자유롭게 할 수 없다."

[[dialogue]]
speaker = "unk"
original = "そう思うと、やはりシャワーなんかに時間を使っていられない。一刻も早くセーラさんを抱きたい……！"
translation = "그렇게 생각하니 역시 샤워 따위에 시간을 쓸 수 없다. 한시라도 빨리 세라 씨를 안고 싶다……!"

[[dialogue]]
speaker = "セーラ"
original = "「あっ、ちょっ<emoji=heart04>\u3000もう挿れちゃうんですかっ<emoji=heart04>\u3000いつもはもっと丁寧に、んひゃ、前戯してくれるのにっ<emoji=heart04>」"
translation = "「앗, 잠깐<emoji=heart04> 벌써 넣어버리는 거예요?<emoji=heart04> 평소에는 더 정성스럽게, 응햐, 애무해주면서<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「本気でこの一晩に、ふぁ、賭けてるんだっ……<emoji=heart04>\u3000本当に大枚はたいて、うちを買ったつもりでエッチしてきてっ……<emoji=heart04>」"
translation = "「진심으로 이 하룻밤에, 하아, 걸고 있구나……<emoji=heart04> 정말로 거금을 들여서, 나를 샀다는 생각으로 섹스해줘……<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「ここまで欲情してもらえるのは女冥利に尽きちゃうかもっ……<emoji=heart04>\u3000はふぁぁっっ……<emoji=heart04>\u3000は、入ってくるっっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「이렇게까지 욕정해주는 건 여자로서 행복한 일일지도……<emoji=heart04> 하후아아아……<emoji=heart04> 드, 들어온다아아……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「ふぁああんっ……<emoji=heart04>\u3000あはぁんっ……あぁっ……<emoji=heart04>\u3000んあぁあんっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아앙……<emoji=heart04> 아하앙…… 아아……<emoji=heart04> 응아아앙……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "肉棒を挿入した瞬間、圧倒的な達成感に包まれる。"
translation = "육봉을 삽입한 순간, 압도적인 달성감에 휩싸인다."

[[dialogue]]
speaker = "unk"
original = "押しても引いても靡かないガードの堅いバニーガールをようやく自分の物にして、じっくりと膣の感触を味わう。"
translation = "밀어도 당겨도 넘어오지 않던 가드 단단한 바니걸을 마침내 자신의 것으로 만들고, 느긋하게 질의 감촉을 음미한다."

[[dialogue]]
speaker = "セーラ"
original = "「あふぁっ、あぁっ……<emoji=heart04>\u3000お客様のおち○ちん、ふぁぁ、ついに挿れられちゃったっ……<emoji=heart04>」"
translation = "「아후앗, 아아……<emoji=heart04> 손님의 자지, 하아아, 결국 넣어버렸어……<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「ずっと、あっ、はぁっ……<emoji=heart04>\u3000それとなく躱してきたのにっ……<emoji=heart04>\u3000ついにセックスさせちゃってっ……<emoji=heart04>」"
translation = "「계속, 앗, 하아……<emoji=heart04> 교묘하게 피해왔는데……<emoji=heart04> 결국 섹스하게 해버리고……<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「うち、ワンナイトしちゃってるっ……<emoji=heart04>\u3000カジノのお客様に、あぁあん、お金で買われてっ……<emoji=heart04>」"
translation = "「나, 원나잇 해버리고 있어……<emoji=heart04> 카지노 손님에게, 아아앙, 돈으로 사져서……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺の心中を見抜いたように、セーラさんがバニーガール役に徹してくれる。"
translation = "내 심중을 꿰뚫어 본 듯이 세라 씨가 바니걸 역할에 몰입해 준다."

[[dialogue]]
speaker = "unk"
original = "改めて口に出されると背徳感が凄まじい。だけど、それが俺の性欲をさらに加速させてくる。"
translation = "다시 한번 입 밖으로 내뱉어지니 배덕감이 엄청나다. 하지만 그것이 내 성욕을 더욱 가속시킨다."

[[dialogue]]
speaker = "セーラ"
original = "「あっ、あっ、あっ、はぁあんっ……<emoji=heart04>\u3000熱いっ、ぶっといっ……<emoji=heart04>」"
translation = "「앗, 앗, 앗, 하아앙……<emoji=heart04> 뜨거워, 엄청 굵어……<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「普段と全然違うっ……<emoji=heart04>\u3000ふぁっ、あぁっ、初めての時くらい、はぁあんっ、おち○ちんバッキバキでっ……<emoji=heart04>」"
translation = "「평소랑 전혀 달라……<emoji=heart04> 하앗, 아아, 처음 했을 때만큼이나, 하아앙, 자지가 빳빳해서……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "緊張しているのか、セーラさんの膣内も恋人エッチの時よりキツキツだ。"
translation = "긴장하고 있는 것인지, 세라 씨의 질 내부도 연인 섹스 때보다 꽉 조인다."

[[dialogue]]
speaker = "unk"
original = "体も強ばっていて、ものすごく照れていることがわかる。"
translation = "몸도 굳어 있어서, 굉장히 부끄러워하고 있다는 것을 알 수 있다."

[[dialogue]]
speaker = "unk"
original = "そのワンナイト特有の恥じらいっぷりが可愛い。吸い付くでも拒むでもない戸惑いたっぷりの膣の動きに興奮してしまう。"
translation = "그 원나잇 특유의 수줍어하는 모습이 귀엽다. 달라붙지도 거부하지도 않는 당혹감 가득한 질의 움직임에 흥분하게 된다."

[[dialogue]]
speaker = "セーラ"
original = "「おち○ちん、ふぁぁ、すっごいグネグネ動かしてっ……<emoji=heart04>\u3000色々な場所、んふぅんっ、擦れちゃっ……<emoji=heart04>」"
translation = "「자지, 하아아, 엄청 꾸물꾸물 움직여서……<emoji=heart04> 여러 군데, 응후웅, 쓸려버렷……<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「なんだか本当に、あぁっ、うちの体を知らない人に抱かれちゃってる気分っ……<emoji=heart04>」"
translation = "「왠지 정말로, 아아, 내 몸을 모르는 사람에게 안기고 있는 기분이야……<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「明らかにうちの弱いところ、あぁあんっ、探しててっ……<emoji=heart04>\u3000弱い場所、ふぁ、見つけようとしててっ……<emoji=heart04>」"
translation = "「분명히 내 약한 곳을, 아아앙, 찾고 있어서……<emoji=heart04> 약한 장소, 하아, 찾아내려고 하고 있어서……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "恥ずかしいのかセーラさんが身を捩って阻もうとしてくる。"
translation = "부끄러운지 세라 씨가 몸을 비틀며 저지하려고 한다."

[[dialogue]]
speaker = "unk"
original = "そんな仕草が可愛いウサギがちょこちょこ暴れてるみたいで愛らしい。"
translation = "그런 몸짓이 귀여운 토끼가 깡충깡충 날뛰는 것 같아서 사랑스럽다."

[[dialogue]]
speaker = "unk"
original = "そんなウサギの腕を引っ張って、半ば無理やり膣内を<ruby>検<rt>あらた</rt></ruby>めていく。"
translation = "그런 토끼의 팔을 잡아당겨, 반쯤 억지로 질 내부를 조사해 나간다."

[[dialogue]]
speaker = "セーラ"
original = "「ちょっ、あっ、お客様、んふぅんっ……<emoji=heart04>\u3000ホント、恥ずかしっ……<emoji=heart04>」"
translation = "「잠깐, 앗, 손님, 응후웅……<emoji=heart04> 정말, 부끄러워……<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「そんなことしなくても、ふぁっ、あぁっ、気持ちいい、ですからっ……<emoji=heart04>\u3000お客様のおち○ちんで感じちゃってますからっ……<emoji=heart04>」"
translation = "「그렇게 안 해도, 하앗, 아아, 기분 좋으니까요……<emoji=heart04> 손님의 자지로 느껴버리고 있으니까요……<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「そんなにうちのおま○こ、はふぁっ、調べないでっ……<emoji=heart04>\u3000あぁっ、はぁあっ……<emoji=heart04>\u3000くふぁっ──ん゛ふぅんんっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「그렇게 내 보지, 하아앗, 조사하지 마……<emoji=heart04> 아아, 하아아……<emoji=heart04> 쿠하앗──응으으으음<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "少し上向きに角度を付けて突き上げた瞬間、セーラさんがビクビクビクぅっと声をくぐもらせて悶える。"
translation = "살짝 위쪽으로 각도를 주어 쳐올린 순간, 세라 씨가 부르르 떨며 목소리를 짓누르고 몸부림친다."

[[dialogue]]
speaker = "unk"
original = "ここか。セーラさんの弱点は……！"
translation = "여기인가. 세라 씨의 약점은……!"

[[dialogue]]
speaker = "セーラ"
original = "「ひぃあっ、ん゛んんっっ<emoji=heart04>\u3000お客様、だめっ、あっ、そこっ、くふぅんんんっっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「히이앗, 응으으음<emoji=heart04> 손님, 안 돼, 앗, 거기, 쿠후우우음……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「ホントに弱いトコだからっ、あっ、あぁっ、そこばっかりは、あふぅ、だめぇっ……<emoji=heart04>」"
translation = "「정말로 약한 곳이니까, 앗, 아아, 거기만큼은, 아후우, 안 돼애……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「はぁはぁ……いいからお尻を上げなさい。私の言うことをなんでも聞く約束だろう？」"
translation = "「하아 하아…… 됐으니까 엉덩이를 들어. 내 말을 뭐든지 듣기로 약속했잖아?」"

[[dialogue]]
speaker = "セーラ"
original = "「それはっ……<emoji=heart04>\u3000でもっ……<emoji=heart04>」"
translation = "「그건……<emoji=heart04> 하지만……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「全財産を払うと言ってるんだっ。私に買われたのは君じゃないのかね！\u3000お金が欲しいんじゃないのかっ？」"
translation = "「전 재산을 지불하겠다고 했잖아. 나한테 팔린 건 네가 아닌가! 돈이 갖고 싶은 게 아니었나?」"

[[dialogue]]
speaker = "セーラ"
original = "「っっ<emoji=heart04>\u3000は、はい、欲しいですっ……<emoji=heart04>\u3000お客様の、あぁっ、言うとおりにしますっ……<emoji=heart04>」"
translation = "「으으윽<emoji=heart04> 네, 네, 갖고 싶어요……<emoji=heart04> 손님이, 아아, 말하는 대로 할게요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "強く言うとセーラさんはブルりと震えて、お尻を持ち上げた。"
translation = "강하게 말하자 세라 씨는 부르르 떨며 엉덩이를 치켜들었다."

[[dialogue]]
speaker = "unk"
original = "途端に蜜が膣内から溢れてきて肉棒をにゅるりと蕩けさせてくる。"
translation = "그 즉시 애액이 질 내부에서 넘쳐흘러 육봉을 미끈하게 녹여온다."

[[dialogue]]
speaker = "セーラ"
original = "「ふぁぁっ、恥ずかしっ……<emoji=heart04>\u3000くはぁぁあ、感じちゃっっ……<emoji=heart04>」"
translation = "「하아아, 부끄러워……<emoji=heart04> 쿠하아아아, 느껴버렷……<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「うち、お金欲しさに自分からお尻振ってっ、あはぁあんっ<emoji=heart04>\u3000弱いところ、あっ、あっ、自分から当てにいっちゃってっ……<emoji=heart04>」"
translation = "「나, 돈 욕심에 스스로 엉덩이를 흔들고, 아하아앙<emoji=heart04> 약한 곳을, 앗, 앗, 스스로 갖다 대버려서……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "羞恥心いっぱいの顔で、けれど興奮した顔で喘ぐセーラさんがエロ可愛い。どうやらセーラさんも乗ってきたようだ。"
translation = "수치심 가득한 얼굴로, 하지만 흥분한 표정으로 헐떡이는 세라 씨가 에로틱하고 귀엽다. 아무래도 세라 씨도 분위기를 탄 모양이다."

[[dialogue]]
speaker = "クロト"
original = "「さぁもっと可愛いところを見せてくれっ。満足させてくれたら、隠し財産も切り崩そうじゃないかっ」"
translation = "「자, 좀 더 귀여운 모습을 보여다오. 만족시켜 준다면, 비상금까지 털어주지.」"

[[dialogue]]
speaker = "セーラ"
original = "「は、はいぃ<emoji=heart04>\u3000見てくださいっ<emoji=heart04>\u3000うちのエッチな姿、あっ、はぁっ、お好きなだけご覧くださいっ……<emoji=heart04>」"
translation = "「하, 하이이<emoji=heart04> 봐주세요<emoji=heart04> 제 야한 모습, 앗, 하아, 마음껏 봐주세요……<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「今夜のうちは、あっ、あっ、あっ……<emoji=heart04>\u3000お客様にご購入いただいた、おま○こウサギですからっ……<emoji=heart04>」"
translation = "「오늘 밤의 저는, 앗, 앗, 앗……<emoji=heart04> 손님이 구입해 주신, 보지 토끼니까요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺の性欲を煽るように、セーラさんが恥じらいながらもお尻をプリプリと振ってきてくれる。"
translation = "내 성욕을 부추기듯, 세라 씨가 수줍어하면서도 엉덩이를 살랑살랑 흔들어온다."

[[dialogue]]
speaker = "unk"
original = "その姿があまりに煽情的で、興奮のまま体が動く。"
translation = "그 모습이 너무나 선정적이라, 흥분한 채로 몸이 움직인다."

[[dialogue]]
speaker = "セーラ"
original = "「ん゛っ──ん゛ふぅぅんんんんっっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000んあっ、あっ、あっ、ん゛ぁあああああっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응으──응으으으으으으음<emoji=heart04><emoji=heart04><emoji=heart04> 응앗, 앗, 앗, 응아아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「はげしっ、ん゛ああっ、イクっ、イっちゃっ、あっ、あっ、あっ、そこガン突きされると、ん゛ん゛ん゛っ、イクぅぅぅっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「격해, 응아아, 가버려, 가버렷, 앗, 앗, 앗, 거기 끝까지 쳐올려지면, 응으으으, 가버려어어어엇~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「まっへっ、くふぁっ、まっへくだしゃいお客様ぁっ<emoji=heart04>\u3000いったんストッ──ん゛ふぁっ、本気れ、イっちゃへへっ<emoji=heart04>」"
translation = "「기라, 쿠하앗, 기라려주세여 손님아앗<emoji=heart04> 일단 스토──응으앗, 진쨔루, 가버려어어<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「はぁはぁっ、そんな君が見たいんじゃないかっ。私のでイキ狂う君が見たくて高い金を払ってるんだっ」"
translation = "「하아 하아, 그런 네가 보고 싶은 게 아닌가. 내 걸로 가버려서 미쳐버린 네가 보고 싶어서 비싼 돈을 내고 있는 거다.」"

[[dialogue]]
speaker = "unk"
original = "このワンナイトで彼女を堕としたい。いいや、堕とさなければいけない。"
translation = "이 원나잇으로 그녀를 타락시키고 싶다. 아니, 타락시켜야만 한다."

[[dialogue]]
speaker = "unk"
original = "またお金をチラつかせて体を売ってくれる関係にしたい。俺とのセックスが忘れられず誘ってくるような女の子にしたい。"
translation = "다시 돈을 내비치면 몸을 팔아주는 관계로 만들고 싶다. 나와의 섹스를 잊지 못하고 유혹해 오는 그런 여자아이로 만들고 싶다."

[[dialogue]]
speaker = "unk"
original = "金ならいくらでもある。その金で、俺は彼女を……！"
translation = "돈이라면 얼마든지 있다. 그 돈으로, 나는 그녀를……!"

[[dialogue]]
speaker = "セーラ"
original = "「ん゛はぁあんっっ<emoji=heart04>\u3000腕引っ張っちゃだめですっ<emoji=heart04>\u3000奥の奥までおち○ちん入っちゃっ<emoji=heart04>」"
translation = "「응하아앙<emoji=heart04> 팔 잡아당기면 안 돼요<emoji=heart04> 깊숙한 곳까지 자지가 들어와버렷<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「ふぁっ、ふぁああああっっ<emoji=heart04>\u3000イクっ、イクイクイクぅぅっっ<emoji=heart04>\u3000いつもより、ん゛あああっ、奥まで入ってきてぇ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하앗, 하아아아아앗<emoji=heart04> 가버려, 가가각가버려어어<emoji=heart04> 평소보다, 응아아앗, 깊숙이 들어와서어……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「ちがっ、あふぁっ<emoji=heart04>\u3000いつもの会長さんのセックスと全然違うっ……<emoji=heart04>\u3000本当に、あはぁあぁっ、別人みたいでっ……<emoji=heart04>」"
translation = "「아냐, 아후앗<emoji=heart04> 평소 회장님의 섹스랑 전혀 달라……<emoji=heart04> 정말로, 아하아아앗, 딴사람 같아서……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "耐えきれないとばかりにセーラさんが甲高い嬌声を響かせる。"
translation = "견딜 수 없다는 듯 세라 씨가 날카로운 교성을 울린다."

[[dialogue]]
speaker = "unk"
original = "激しく喘ぐ姿がたまらない。いつもよりも感じた声を出している彼女の姿に背徳感が燃え上がる。"
translation = "격하게 헐떡이는 모습이 참을 수 없다. 평소보다 더 느끼는 목소리를 내는 그녀의 모습에 배덕감이 타오른다."

[[dialogue]]
speaker = "セーラ"
original = "「ん゛ぁっ、あ゛ぁっ、あっ、あっ、あぁああああんっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응아앗, 아아앗, 앗, 앗, 아아아아아앙<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「ホントに無理やりイカせにきてるぅっ<emoji=heart04>\u3000だめっ、ん゛ぁあっ、いつもこんなこと、しないのにっ<emoji=heart04>」"
translation = "「정말로 억지로 가게 만들고 있어어<emoji=heart04> 안 돼, 응아아앗, 평소엔 이런 거, 안 하는데에<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「イクっ、ん゛ぁああっっ<emoji=heart04>\u3000今うち完全に、あ゛ふっ、会長さんのっ、お客様の玩具にされちゃってっっ……<emoji=heart04>」"
translation = "「가버려, 응아아아앗<emoji=heart04> 지금 나 완전히, 아후웃, 회장님의, 손님의 장난감이 되어버려서어……<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「だけど、はあぁああんっっ<emoji=heart04>\u3000たまにはこういうのもっっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하지만, 하아아아앙<emoji=heart04> 가끔은 이런 것도오……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "膣内から湯気が出そうなくらい結合部が熱くなってくる。"
translation = "질 내부에서 김이 날 정도로 결합부가 뜨거워진다."

[[dialogue]]
speaker = "unk"
original = "俺だけの興奮じゃない。セーラさんも俺と同じくらいいつもと違うセックスに発情していて……！"
translation = "나만의 흥분이 아니다. 세라 씨도 나만큼이나 평소와 다른 섹스에 발정해 있어서……!"

[[dialogue]]
speaker = "クロト"
original = "「はぁはぁっ、そらお尻が止まってるぞっ。さっきみたいに可愛く振って私を悦ばせなさいっ」"
translation = "「하아 하아, 거봐 엉덩이가 멈췄잖아. 아까처럼 귀엽게 흔들어서 나를 기쁘게 하렴.」"

[[dialogue]]
speaker = "セーラ"
original = "「は、はい、お客様っ<emoji=heart04>\u3000ん゛ぁっ、ん゛ふぅんっっ<emoji=heart04>\u3000ん゛ん゛ん゛んんんんっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하, 하이, 손님<emoji=heart04> 응아앗, 응으으음<emoji=heart04> 응으으으으으으으음~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "絶頂しながらもセーラさんが懸命にお尻を振ってくれる。いいや、お尻を振ることで絶頂しているのかもしれない。"
translation = "절정하면서도 세라 씨가 필사적으로 엉덩이를 흔들어준다. 아니, 엉덩이를 흔듦으로써 절정하고 있는 것일지도 모른다."

[[dialogue]]
speaker = "unk"
original = "まさに発情期のウサギだ。気付けば彼女からも俺の肉棒に腰を打ち付けてきて──"
translation = "그야말로 발정기의 토끼다. 어느샌가 그녀 또한 나의 육봉에 허리를 부딪쳐오며──"

[[dialogue]]
speaker = "セーラ"
original = "「ん゛ふっ、ん゛んんっっ<emoji=heart04>\u3000ヤバひっ、きもひいいっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응으, 응으으음<emoji=heart04> 야바히, 기모히이이이<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「お尻振っへ、お客様に媚びるのもっ<emoji=heart04>\u3000お客様に無理やりイかされちゃってふのもっっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「엉덩이 흔드러서, 손님한헤 아양 떠는 거또<emoji=heart04> 손님한헤 억지로 가버리게 되는 거또오……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「こんなの初めてでっ──ん゛ふぁぁああっっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000刺激的、しゅぎるぅっっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「이런 거 처으미라──응으하아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 자극저기야아……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "セーラさんのおま○こがキュンキュンと収縮する。その淫乱な膣の動きに俺のペニスにも熱いものが滾ってくる。"
translation = "세라 씨의 보지가 큥큥하며 수축한다. 그 음란한 질의 움직임에 내 페니스에도 뜨거운 것이 끓어오른다."

[[dialogue]]
speaker = "セーラ"
original = "「んぁっ、あっ、あっ、あっ、あっ<emoji=heart04>\u3000お客様のおち○ちっ、ああああっ、ビクンビクンしへっっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응앗, 앗, 앗, 앗, 앗<emoji=heart04> 손님의 자지이, 아아아앗, 비쿤비쿤 해버려서어……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「あふぁっ、きへりゅっ、ん゛あぁっっ、お客様の精子っ、ああああっ、のぼってきへりゅぅっっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아후앗, 기헤류, 응아아앗, 손님의 정액, 아아아앗, 올라오고 이써어어……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「本当にエッチなウサギだっ。いやらしく吸い付いてきてるぞっ。言いなさいっ、どこに出して欲しいのかねっ」"
translation = "「정말로 야한 토끼로군. 음란하게 달라붙고 있어. 말해봐라, 어디에 싸주길 원하나?」"

[[dialogue]]
speaker = "セーラ"
original = "「やめっ、あぁっ、そんなこと聞かないれっ<emoji=heart04>」"
translation = "「그만, 아아앗, 그런 거 묻지 마라여<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「それに答えちゃったらホントにうち、はふぁっ、お客様のものにされちゃっ<emoji=heart04>\u3000心まで、ふぁぁ、買われちゃっっ<emoji=heart04>」"
translation = "「거기에 대답해버리면 정말로 나, 하후앗, 손님의 것이 되어버려어<emoji=heart04> 마음까지, 하아아, 사버려어어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "彼女の心を、俺の金で、俺のペニスで──想像しただけで頭が沸騰する。"
translation = "그녀의 마음을, 나의 돈으로, 나의 페니스로── 상상하는 것만으로 머리가 비등한다."

[[dialogue]]
speaker = "unk"
original = "堕としたい……！\u3000普段の俺を乗り越えて、セーラさんの全てが欲しい……！"
translation = "타락시키고 싶다……! 평소의 나를 넘어서, 세라 씨의 모든 것을 갖고 싶어……!"

[[dialogue]]
speaker = "セーラ"
original = "「ん゛ひっ、あ゛ぁっっ<emoji=heart04>\u3000どしっ、どしてっ、イケなっ、あ゛あぁっ、奥寸止めしてっ、急になんでっ……<emoji=heart04>」"
translation = "「응히잇, 아아아앗<emoji=heart04> 어째, 어째서어, 못 가게, 아아아앗, 안쪽에서 직전 멈춤 하고, 갑자기 왜에……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「君が今後も永久に、私のものになると言えばイカせてあげるさ」"
translation = "「네가 앞으로도 영원히 내 것이 되겠다고 말하면 가게 해주지.」"

[[dialogue]]
speaker = "セーラ"
original = "「～～～っ……！\u3000今日はぁ、いちやだけのはずじゃあ……」"
translation = "「~~~~윽……! 오늘은, 하룻밤뿐이라고오……」"

[[dialogue]]
speaker = "クロト"
original = "「言えないならこのままお預けにしてあげようか。私は別にそれでも構わないぞっ」"
translation = "「말 못 하겠다면 이대로 애태우게 놔둘까. 나는 별로 상관없는데 말이야.」"

[[dialogue]]
speaker = "セーラ"
original = "「っっ<emoji=heart04>\u3000しょれはらめぇっ……<emoji=heart04>」"
translation = "「으으윽<emoji=heart04> 고건 안 돼애……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスを引き抜こうとした途端、セーラさんが自ら激しくお尻を振って、股間を肉棒に打ち付けてくる。"
translation = "페니스를 뽑으려던 찰나, 세라 씨가 스스로 격하게 엉덩이를 흔들며 가랑이를 육봉에 부딪쳐온다."

[[dialogue]]
speaker = "セーラ"
original = "「なりまひゅっ<emoji=heart04>\u3000なりまひゅぅっ<emoji=heart04>\u3000お客様のものに、お客様専用のおま○こウサギになりまひゅぅっ<emoji=heart04>」"
translation = "「댈게요오<emoji=heart04> 댈게요오오<emoji=heart04> 손님의 것으로, 손님 전용 보지 토끼가 댈게요오오<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「らから突いっ、突いてぇっ<emoji=heart04>\u3000奥いっぱい突いへイカせへくだひゃいっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「그러니까 박아, 박아줘어<emoji=heart04> 안쪽 가득 박아서 가게 해주세여어어<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「イキひゃいっ<emoji=heart04>\u3000お客様のおち○ちんでイカせへくだひゃいっ<emoji=heart04>」"
translation = "「가고 시퍼어<emoji=heart04> 손님의 자지로 가게 해주세여어<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「だしへっ<emoji=heart04>\u3000中にくだひゃいっ<emoji=heart04>\u3000お客様の精子れイキひゃいっ<emoji=heart04>\u3000思いっきりイっへみひゃいっ<emoji=heart04>」"
translation = "「싸줘어<emoji=heart04> 안에 싸주세여어<emoji=heart04> 손님의 정액으로 가고 시퍼어<emoji=heart04> 마음껏 가보고 시퍼어어<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「お願いしましゅ、お客様っ<emoji=heart04>\u3000うちのおま○こにっ、淫乱ウサギの発情おま○こにっ<emoji=heart04>」"
translation = "「부탁드려여, 손님<emoji=heart04> 제 보지에, 음란 토끼의 발정 보지에에<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「お客様のアツアツ精子っ、たくしゃんたくしゃんっ<emoji=heart04>」"
translation = "「손님의 뜨끈뜨끈 정액, 마니마니이<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「注ぎ込んれくだひゃぁぁぁいっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「부어주세여어어어어어엇<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「あ゛っ──あ゛ふぁああああああああああっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아으──아후아아아아아아아아아아아앗~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "セーラさんが心を売り渡してきた瞬間、激しい背徳感と征服感と共に、尋常じゃないほどの精子が噴き出した。"
translation = "세라 씨가 마음을 넘겨준 순간, 격렬한 배덕감과 정복감과 함께 심상치 않을 정도의 정액이 뿜어져 나왔다."

[[dialogue]]
speaker = "セーラ"
original = "「イきゅっ<emoji=heart04>\u3000イきゅイきゅイきゅぅぅっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가버려어<emoji=heart04> 가버려가버려가버려어어어~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「せーしの量しゅごひっ<emoji=heart04>\u3000やばひっ<emoji=heart04>\u3000いつもと全然ちがっっ<emoji=heart04>」"
translation = "「정액 양 어마어마해애<emoji=heart04> 야바히<emoji=heart04> 평소랑 전혀 달라아아<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「中出しれイクっ<emoji=heart04>\u3000きもひいいっっ<emoji=heart04>\u3000やばっ、あふっ、あああああああっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「질내사정으로 가버려어<emoji=heart04> 기모히이이이<emoji=heart04> 야바, 아후, 아아아아아아아아앗~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺も最高に気持ちいい。"
translation = "나도 최고로 기분 좋다."

[[dialogue]]
speaker = "unk"
original = "今俺はセーラさんを完全に自分のものにしたんだ……！！"
translation = "지금 나는 세라 씨를 완전히 나의 것으로 만들었다……!!"

[[dialogue]]
speaker = "セーラ"
original = "「はふぅっ……はぁーっ、はぁーっ、あはぁぁぁっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하아후우…… 하아, 하아, 아하아아아……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「バ、バカぁ……<emoji=heart04>\u3000洒落になんないっへ……<emoji=heart04>\u3000うちが変な趣味に目覚めちゃったら、あふぁ、どーするのさ……<emoji=heart04>」"
translation = "「바, 바보……<emoji=heart04> 농담이 아니라고오……<emoji=heart04> 내가 이상한 취미에 눈떠버리면, 아후아, 어쩔 거야……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ひとしきり射精を終えたところでセーラさんが蕩けきった顔で訴えてくる。"
translation = "한바탕 사정을 마친 뒤 세라 씨가 넋이 나간 얼굴로 호소해온다."

[[dialogue]]
speaker = "クロト"
original = "「目覚めさせたりしませんよ。今のでまたひとつ俺の虜になってもらったつもりですから」"
translation = "「눈뜨게 하지 않아요. 방금 걸로 또 하나 내 포로가 되어주셨을 테니까요.」"

[[dialogue]]
speaker = "セーラ"
original = "「っっ<emoji=heart04>\u3000確かになったけど……<emoji=heart04>\u3000あんなに積極的で強引な会長さん、新鮮だったし……<emoji=heart04>」"
translation = "「으으윽<emoji=heart04> 확실히 그렇게 됐지만……<emoji=heart04> 그렇게 적극적이고 강압적인 회장님, 신선했었고……<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「ロールプレイエッチって、思ってたより楽しいかも……<emoji=heart04>\u3000恋人の知らない一面をまた新しく知れるとゆーか……<emoji=heart04>」"
translation = "「역할극 섹스라는 거, 생각보다 즐거울지도……<emoji=heart04> 연인의 모르는 일면을 또 새롭게 알게 된다고나 할까……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "息荒く余韻に喘ぎながら、セーラさんが俺を見つめてきてくれる。"
translation = "거친 숨을 몰아쉬며 여운에 헐떡이면서, 세라 씨가 나를 바라봐준다."

[[dialogue]]
speaker = "セーラ"
original = "「でも、もしもお金持ちになったとしても絶対に他の女の子なんて買っちゃダメだよ……？\u3000それは約束してね……？」"
translation = "「하지만, 설령 부자가 된다고 해도 절대로 다른 여자 같은 건 사면 안 돼……? 그건 약속해줘……?」"

[[dialogue]]
speaker = "クロト"
original = "「もちろんですよ。セーラさんも他の男に目移りしないでくださいね？」"
translation = "「물론이죠. 세라 씨도 다른 남자에게 눈 돌리지 마세요?」"

[[dialogue]]
speaker = "セーラ"
original = "「ふふ、それは会長さん次第かな……<emoji=heart04>\u3000脱兎のごとくっていうくらいウサギはすぐに逃げていっちゃうものだから……<emoji=heart04>」"
translation = "「후후, 그건 회장님 하기 나름일까나……<emoji=heart04> 탈토(脫兎)라는 말이 있을 정도로 토끼는 금방 도망가버리는 법이니까……<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「逃がさないように、ふふ、しっかり虜にしてくれないとね？\u3000あと寂しい想いをさせるのも厳禁だから……<emoji=heart04>」"
translation = "「도망치지 못하게, 후후, 확실히 포로로 만들어줘야 해? 그리고 외롭게 만드는 것도 엄금이니까……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "言いながらセーラさんが腰を軽く動かして再び俺のモノを勃たせようとしてきてくれる。"
translation = "말하면서 세라 씨가 허리를 가볍게 움직여 다시 나의 것을 세우려고 해준다."

[[dialogue]]
speaker = "セーラ"
original = "「ということで、もっかい……しよ<emoji=heart04>」"
translation = "「그러니까, 한 번 더…… 하자<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「うちのここ、んふ、すっかりウサギさんになっちゃったみたいで、年中発情期になっちゃってるから……<emoji=heart04>」"
translation = "「내 여기, 응후, 완전히 토끼 씨가 되어버린 것 같아서, 일 년 내내 발정기가 되어버렸으니까……<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「今夜はお客様のおち○ちんで、えへへ……<emoji=heart04>\u3000一晩中悦ばせてもらいたいです……<emoji=heart04>」"
translation = "「오늘 밤은 손님의 자지로, 에헤헤……<emoji=heart04> 밤새도록 기쁘게 해줬으면 좋겠어요……<emoji=heart04>」"

