[[dialogue]]
speaker = "unk"
original = "遡ること数分前──"
translation = "거슬러 올라가 몇 분 전──"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふむふむ、なるほどなるほど」"
translation = "「흠흠, 과연 과연.」"

[[dialogue]]
speaker = "unk"
original = "何を見てるんだ？"
translation = "뭘 보고 있는 거야?"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ちょっと生徒たちの資料をね。そうだ、この子たちのことは知ってる？」"
translation = "「잠시 학생들 자료를 말이야. 맞다, 이 애들에 대해서 알고 있어?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「お悩み解決倶楽部──通称おなか部って名乗ってる子たちなんだけど」"
translation = "「고민 해결 클럽── 통칭 오나카부라고 자처하는 애들인데.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「なんでも非プリマステラの身ながら学内外問わず色々な人のお悩み相談に乗って回ってるそうよ。ふふ、素晴らしい奉仕精神の持ち主たちじゃない」"
translation = "「비 프리마스텔라 신분인데도 학원 안팎을 가리지 않고 여러 사람의 고민 상담을 해주고 다닌대. 후후, 훌륭한 봉사 정신의 소유자들이지 않니?」"

[[dialogue]]
speaker = "unk"
original = "ああ、その子たちなら知ってるよ"
translation = "아아, 그 애들이라면 알고 있어."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あなたって本当に顔が広いわね……。まさかまだプリマステラになってない子たちまで網羅してるなんて……」"
translation = "「너 정말 발이 넓구나……. 설마 아직 프리마스텔라가 되지 않은 애들까지 꿰고 있을 줄이야……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ま、顔見知りなら話は早いわ！\u3000この子たちを呼び出すわよ！\u3000あなたにも色々と協力してもらうから！」"
translation = "「뭐, 아는 사이라면 이야기가 빠르지! 이 애들을 불러낼 거야! 너에게도 이것저것 협력을 부탁할 거니까!」"

[[dialogue]]
speaker = "unk"
original = "協力って何を？"
translation = "협력이라니 뭘?"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それは始まってからのお楽しみよ♪」"
translation = "「그건 시작되고 나서의 즐거움이야♪」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「わかってますか？\u3000くれぐれも粗相のないようにですよ……？\u3000相手はプリマステラよりもさらに上、星騎士たちのトップたる星徒会なんですから……！」"
translation = "「알고 있죠? 제발 실수하지 않도록 해야 해요……? 상대는 프리마스텔라보다 훨씬 위, 성기사들의 정점인 성도회니까요……!」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「う、うん。でも本当に何の用なんだろう……。モナカたち、プリマステラでもないのに……」"
translation = "「으, 응. 하지만 정말 무슨 용무일까……. 모나카 일행은 프리마스텔라도 아닌데……」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「とにかく入りましょう……！\u3000星徒会室ってここですよね……？」"
translation = "「어쨌든 들어가죠……! 성도회실이 여기 맞죠……?」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「違うわよ～。その隣の部屋よ～」"
translation = "「아니야~. 그 옆방이야~」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「っっ。危ないところでした……！」"
translation = "「윽. 하마터면 큰일 날 뻔했어요……!」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「それと星徒会室に入る時は、お尻で扉を開けるのがマナーよ。星徒会メンバー以外、その神聖なドアノブに触れちゃいけない決まりなの」"
translation = "「그리고 성도회실에 들어갈 때는 엉덩이로 문을 여는 게 매너야. 성도회 멤버 말고는 그 신성한 문고리에 손을 대면 안 된다는 규칙이 있거든~」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「な、なんと、流石は学園のトップたる星徒会ですね……！\u3000わかりました、お尻で開けます……！」"
translation = "「나, 남다르군요, 역시 학원의 정점인 성도회예요……! 알겠습니다, 엉덩이로 열겠습니다……!」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「あわわ、シフォンちゃん……。きっとそれ……」"
translation = "「아와와, 시폰짱…… 분명 그거……」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「中々、んぐっ、難しいですね……！\u3000ふぉぉ……！\u3000お尻が<ruby>攣<rt>つ</rt></ruby>りそうです……！\u3000で、でも、やっと開い──」"
translation = "「꽤, 응극, 어렵네요……! 후아아……! 엉덩이에 쥐가 날 것 같아요……! 하, 하지만, 드디어 열렸──」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「って、ここ倉庫じゃないですか！？\u3000また私のこと騙しましたね！？」"
translation = "「잠깐, 여기 창고잖아요!? 또 저를 속였죠!?」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「あはは、ホントにシフォンは疑うことを知らないわね～。からかい甲斐があるわ～」"
translation = "「아하하, 정말 시폰은 의심할 줄을 모른다니까~. 놀리는 보람이 있어~」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「こ、このおふざけクソ女はぁ……！！」"
translation = "「이, 이 장난꾸러기 망할 여자가아……!!」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「お、落ち着いてシフォンちゃん。きっとパルちゃんなりに緊張をほぐそうとしてくれただけだから……」"
translation = "「지, 진정해 시폰짱. 분명 팔짱 나름대로 긴장을 풀어주려고 그런 걸 테니까……」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「よしよしモナカはよくわかってるわね～。ま、早く行きましょ。あんまり待たせると心証が悪くなっちゃうでしょ？」"
translation = "「옳지 옳지, 모나카는 잘 아네~. 뭐, 얼른 가자. 너무 기다리게 하면 인상이 나빠질 거 아냐?」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「誰のせいで無駄な時間を使ったと思ってるんですかっ！\u3000今度こそこの部屋ですよねっ……？\u3000よし、開けますよ、んぐぐぐぐっ……！」"
translation = "「누구 때문에 아까운 시간을 썼다고 생각하는 거예요! 이번에야말로 이 방 맞죠……? 좋아, 열게요, 응그그그극……!」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「えと、その……。お尻で開けなきゃいけないってマナーも嘘だから……」"
translation = "「저기, 그게……. 엉덩이로 열어야 한다는 매너도 거짓말이니까……」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「し、失礼します。１年Ｅ組おなか部部長のモナカ・ヘクセンハウスです……」"
translation = "「시, 실례하겠습니다. 1학년 E반 오나카부 부장인 모나카 헥센하우스입니다……」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「２年Ｆ組おなか部副部長の、くぁ、シフォン・デビルズホープです……」"
translation = "「2학년 F반 오나카부 부부장인, 쿠아, 시폰 데빌즈호프입니다……」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「平部員で３年のパルミエ・ダックワーズよ～」"
translation = "「평부원인 3학년 팔미에 다쿠아즈야~」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「揃ったようね。ええと……約一名なんだか様子がおかしいけど」"
translation = "「다 모인 모양이네. 음…… 약 한 명 정도 왠지 상태가 이상해 보이지만.」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「き、気にしないでください。少しお尻が攣りそうなだけでして……」"
translation = "「시, 신경 쓰지 마세요. 살짝 엉덩이에 쥐가 날 것 같을 뿐이라서……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「まぁいいわ。早速だけど今日はあなたたちに提案があるの！」"
translation = "「뭐, 됐어. 다름이 아니라 오늘은 너희에게 제안할 게 있어!」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「提案、ですか？\u3000廃部勧告や厳重注意ではなくて……？」"
translation = "「제안, 말인가요? 폐부 권고나 엄중 주의가 아니라……?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ええ。あなたたち、特別試験を受けてみるつもりはないかしら？」"
translation = "「응. 너희들, 특별 시험을 봐 볼 생각은 없니?」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「特別試験……？\u3000一体なんの……？」"
translation = "「특별 시험……? 대체 무슨……?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「もちろん、プリマステラになるための。よ！」"
translation = "「물론, 프리마스텔라가 되기 위한 것! 말이야!」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「へ……？\u3000ど、どういうことですか？\u3000私たち、ろくに自分の星力も制御できないような落第生ですよ……？」"
translation = "「헤……? 무, 무슨 말씀이세요? 저희는 제 성력도 제대로 제어하지 못하는 낙제생이라구요……?」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「う、うん……。この間の試験にも落ちちゃったところで……」"
translation = "「으, 응……. 요전번 시험에서도 떨어진 참이라……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「知っているわ。だけど私はそれ以上にあなたたちの直向きで献身的な精神を評価しているの」"
translation = "「알고 있어. 하지만 나는 그 이상으로 너희의 곧고 헌신적인 정신을 높게 사고 있거든.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「たとえプリマステラじゃなくとも、自分たちなりに誰かのためになろうとしている、あなたたちの健気な心根をね」"
translation = "「설령 프리마스텔라가 아니더라도, 자신들 나름대로 누군가를 위하려 노력하는 너희의 기특한 마음씨 말이야.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「そんな大袈裟な話じゃ……。モナカはプリマステラにもなれない落ちこぼれ、だから……。簡単なお悩み相談に乗ることくらいしかできないだけで……」"
translation = "「그렇게 거창한 건 아니에요……. 모나카는 프리마스텔라도 못 되는 낙오자, 니까……. 간단한 고민 상담이나 들어주는 것 말고는 할 수 있는 게 없어서……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふふ、その行動こそが尊いのよ。私はね、あなたたちのような人たちにこそプリマステラになってほしいと思ってるの」"
translation = "「후후, 그 행동이야말로 고귀한 거야. 나는 말이지, 너희 같은 사람이야말로 프리마스텔라가 되었으면 좋겠다고 생각하거든.」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「ですが特別試験って一体どんな……」"
translation = "「하지만 특별 시험이란 건 대체 어떤……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それはね、これよ」"
translation = "「그건 말이지, 이거야.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「ええと……。このお手紙は……？」"
translation = "「저기…… 이 편지는……?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「星徒会に届けられた相談事よ。これがちょっと厄介な依頼でね。本当は私たちで対処したいんだけど、最近は色々な事件が起きっぱなしで手が回せないものだから」"
translation = "「성도회에 도착한 상담거리야. 이게 조금 까다로운 의뢰라서 말이지. 원래는 우리가 대처하고 싶지만, 최근 여러 사건이 끊이지 않아서 손을 쓸 수가 없거든.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そこで試験を兼ねて、あなたたちに解決してもらおうと思ったわけ。もちろんモンスター退治だとか、そういうのじゃないわ」"
translation = "「그래서 시험을 겸해서, 너희가 해결해 줬으면 좋겠다고 생각했어. 물론 몬스터 퇴치 같은 그런 건 아니야.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「どうかしら？\u3000決して悪い話ではないと思うんだけど」"
translation = "「어떠니? 결코 나쁜 이야기는 아니라고 생각하는데.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「星徒会さんに届いた相談を、モナカたちが……」"
translation = "「성도회 분들에게 도착한 상담을, 모나카 일행이……」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「私たちにできるのでしょうか……」"
translation = "「저희가 할 수 있을까요……」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「いいじゃない。受けてみれば」"
translation = "「좋잖아. 한번 받아봐.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「パ、パルちゃん……？」"
translation = "「파, 팔짱……?」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「せっかくのチャンスでしょ？\u3000私も手伝ってあげるから」"
translation = "「모처럼 온 기회잖아? 나도 도와줄 테니까.」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「ど、どうしたんですか？\u3000いつもなら、いの一番に面倒くさがりますのに……」"
translation = "「어, 어찌 된 일인가요? 평소라면 제일 먼저 귀찮아하셨을 텐데……」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「シフォンとモナカがプリマステラになりたがってることはよーくわかってるもの。ここで愚図るほど私もワガママじゃないわ」"
translation = "「시폰이랑 모나카가 프리마스텔라가 되고 싶어 한다는 건 아주 잘 알고 있는걸. 여기서 꾸물거릴 정도로 나도 이기적이진 않아.」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「あなたたちが落ちこぼれじゃないことも、ね？\u3000ここでビシっとそれを証明しちゃいなさいよ」"
translation = "「너희가 낙오자가 아니라는 것도, 응? 여기서 멋지게 증명해 버리라고.」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「あいたっ！？\u3000お尻叩かないでください……！\u3000攣りそうなんですからっ……！」"
translation = "「아얏!? 엉덩이 때리지 마세요……! 쥐가 날 것 같단 말이에요……!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふふ、どうやら引き受けてもらえるみたいね。なら、他の相談事もお願いしちゃおうかしら」"
translation = "「후후, 아무래도 맡아주는 모양이네. 그럼 다른 상담거리도 부탁해 볼까.」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「へ…………？」"
translation = "「헤…………?」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「わわっ……。すごいお手紙の量……。これ全部、星徒会さんに届いたお悩み相談ってこと……？」"
translation = "「와와……. 엄청난 편지 양……. 이거 전부 성도회 분들에게 온 고민 상담이라는 거야……?」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ヴィ、ヴィーナスちゃ～ん……？\u3000なんだか話が違うんじゃないかしら～……？\u3000依頼は１つだけのはずでしょ～……？」"
translation = "「비, 비너스짱~? 왠지 이야기가 다르지 않아~……? 의뢰는 하나뿐이었잖아~……?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「いいじゃない。ついでよ、ついで。それにそもそも──」"
translation = "「좋잖아. 덤이야, 덤. 그리고 애초에──」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「待った待った！\u3000わかった、わかったわよぉ～……！」"
translation = "「잠깐 잠깐! 알았어, 알았다니까아~……!」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「……なんでしょう。そこはかとなく怪しい雰囲気を感じるのですが」"
translation = "「……뭘까요. 어딘지 모르게 수상한 분위기가 느껴지는데요.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「うん……。パルちゃんが何か誤魔化そうとしてる時の顔……だよね？」"
translation = "「응……. 팔짱이 뭔가 얼버무리려고 할 때의 표정……이지?」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「な、何も誤魔化してなんかないわ～。ほーら行きましょ？\u3000試験はもう始まってるわよ～」"
translation = "「아, 아무것도 얼버무리지 않았어~. 자, 얼른 가자? 시험은 이미 시작됐다고~」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「怪しいです……」"
translation = "「수상해요……」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「怪しいね……」"
translation = "「수상하네……」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「何も怪しくなんてないってばぁ～！」"
translation = "「아무것도 안 수상하다니까아~!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「さてクロト。あなたには試験監督兼お手伝いとしておなか部のみんなについてて欲しいんだけど。お願いできるかしら？」"
translation = "「자, 쿠로토. 너는 시험 감독 겸 도우미로서 오나카부 아이들을 따라다녀 줬으면 하는데. 부탁해도 될까?」"

[[dialogue]]
speaker = "unk"
original = "任せてくれ"
translation = "맡겨 줘."

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「あ、にぃ様がモナカたちのこと見てくれるんだ……？\u3000えへへ、良かった。にぃ様と一緒ならモナカも緊張しないでいられそう」"
translation = "「아, 오라버니가 우리를 봐주는구나……? 에헤헤, 다행이다. 오라버니와 함께라면 모나카도 긴장하지 않을 것 같아.」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ダーリン～。私の可愛さに免じて何も言わずに試験をパスさせて～？\u3000私の可愛いほっぺにキスさせてあげるから～♪」"
translation = "「달링~ 내 귀여움을 봐서 아무 말 말고 시험 통과시켜 줘~? 내 귀여운 볼에 키스하게 해줄 테니까~♪」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「なんだ、みんな会長さんと知り合いだったんですね？\u3000というかダーリンとにぃ様って、どんな呼び方ですか……」"
translation = "「뭐야, 다들 회장님과 아는 사이였나요? 그보다 달링에 오라버니라니, 대체 무슨 호칭인가요……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それじゃおなか部のみんな、健闘を祈ってるわよ！\u3000良い報告を期待しているわ！」"
translation = "「그럼 오나카부 여러분, 건투를 빌어! 좋은 보고 기다릴게!」"

