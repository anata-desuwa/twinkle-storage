[[dialogue]]
speaker = "unk"
original = "第２話,もっと一緒に,P"
translation = "제2화, 좀 더 함께"

[[dialogue]]
speaker = "unk"
original = "恋人関係になって以降、ヴィーナスは俺の家へ遊びにくることが多くなっていた――"
translation = "연인 관계가 된 이후, 비너스는 내 집에 놀러 오는 일이 많아졌다──"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふんふん、ふふ～ん♪」"
translation = "「음음, 음음음~♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「うん？\u3000――私の機嫌がよさそう？」"
translation = "「응? ──내 기분이 좋아 보여?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「えへへ♪\u3000だって今日は久しぶりに、２人きりで過ごせるんだもの！」"
translation = "「에헤헤♪ 그야 오늘은 오랜만에 둘이서만 보낼 수 있는걸!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「学園だとみんなで過ごすことが多いし、九浄家だとヘレナちゃんやメイド隊の子たちがいるでしょ？」"
translation = "「학원에선 다 같이 지낼 때가 많고, 쿠죠가에선 헬레나짱이나 메이드대 애들이 있잖아?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「みんなと一緒なのは、もちろん楽しいし好きよ。だけど恋人同士、たまには２人きりで思う存分イチャイチャしたくなる時もあるじゃない？」"
translation = "「모두와 함께인 건 물론 즐겁고 좋아해. 하지만 연인끼리 가끔은 둘이서 마음껏 꽁냥거리고 싶어질 때도 있잖아?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「この前のお正月デート？\u3000外で遊ぶのと、部屋で２人きりなのは別腹よ！\u3000今日はリノさんも出かけてるから、誰にも見られないし……」"
translation = "「저번 설날 데이트? 밖에서 노는 거랑 방에서 둘이 있는 건 별개지! 오늘은 리노 씨도 외출하셨으니까 아무에게도 안 들키고……」"

[[dialogue]]
speaker = "unk"
original = "そう言うと、ヴィーナスはソファーに座っている俺の前にきて、向き合う形で膝の上に腰かけてきた。"
translation = "그렇게 말하며 비너스는 소파에 앉아 있는 내 앞으로 와서, 마주 보는 형태로 무릎 위에 올라앉았다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「い～っぱい、スキンシップしちゃうんだから<emoji=heart04>\u3000ふふっ……<emoji=heart04>」"
translation = "「잔~뜩 스킨십할 거니까<emoji=heart04> 후훗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「まずは～、えいっ♪」"
translation = "「우선은~, 에잇♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ハグからよ<emoji=heart04>\u3000ぎゅ～っ<emoji=heart04>」"
translation = "「허그부터야<emoji=heart04> 꼬옥~<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふぅ……<emoji=heart04>\u3000久しぶりのハグ、温かくて落ち着くわ。クロトの、男の子な匂いもするし……<emoji=heart04>」"
translation = "「후우……<emoji=heart04> 오랜만의 허그, 따뜻해서 안심돼. 쿠로토의 남자다운 냄새도 나고……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「――クロトも？\u3000私って、甘くて良い匂いがするの？\u3000えへへ……♪\u3000そうなんだ」"
translation = "「──쿠로토도? 나한테서 달콤하고 좋은 냄새가 나? 에헤헤……♪ 그렇구나.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「――好きな匂い？\u3000うん、私もクロトの匂い、好きよ<emoji=heart04>」"
translation = "「──좋아하는 냄새? 응, 나도 쿠로토 냄새 좋아해<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ねぇ、クロト、頭も撫でて欲しいわ」"
translation = "「저기 쿠로토, 머리도 쓰다듬어줬으면 좋겠어.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「――あっ♪\u3000ふふっ……♪\u3000そう、クロトの優しい撫で方、好き……<emoji=heart04>」"
translation = "「──앗♪ 후훗……♪ 그래, 쿠로토의 상냥한 손길 좋아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「抱き締められながら、頭撫でられると、幸せ感じちゃうわ……♪」"
translation = "「안겨 있으면서 머리를 쓰다듬어지면 행복해져……♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ん……<emoji=heart04>\u3000それと同じくらい、好きって気持ちが込み上げてきて――」"
translation = "「음……<emoji=heart04> 그것만큼이나 좋아한다는 마음이 벅차올라서──」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロト……<emoji=heart04>」"
translation = "「쿠로토……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスが顔を上げて、上目遣いで見つめてくる。俺はそんな彼女の唇に――"
translation = "비너스가 고개를 들어 위를 올려다보며 나를 빤히 바라본다. 나는 그런 그녀의 입술에──"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あ……<emoji=heart04>\u3000んっ……ちゅっ……<emoji=heart04>」"
translation = "「아……<emoji=heart04> 음…… 쪽……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「はぁ……<emoji=heart04>\u3000キス……<emoji=heart04>\u3000今日はいっぱい、して……<emoji=heart04>\u3000ん……<emoji=heart04>」"
translation = "「하아……<emoji=heart04> 키스……<emoji=heart04> 오늘은 잔뜩 해줘……<emoji=heart04> 음……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ちゅっ……<emoji=heart04>\u3000んっ……<emoji=heart04>\u3000ちゅっ……<emoji=heart04>\u3000はあぁ……<emoji=heart04>」"
translation = "「쪽……<emoji=heart04> 음……<emoji=heart04> 쪽……<emoji=heart04> 하아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロト、好き……<emoji=heart04>」"
translation = "「쿠로토, 좋아해……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺も好きだ"
translation = "나도 좋아해."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「んっ……<emoji=heart04>\u3000もっと……<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「음……<emoji=heart04> 좀 더……<emoji=heart04> 쪽……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「…………クロト、私、恋人になってからいつも思うんだけど」"
translation = "「…………쿠로토, 나 연인이 되고 나서 항상 생각하는데.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「イチャイチャしてると、時間の進み早くない！？\u3000もう外が真っ暗だわ！」"
translation = "「꽁냥거리고 있으면 시간 가는 게 너무 빠르지 않아!? 벌써 밖이 캄캄해!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「星徒会の仕事をしようとする時は、あんなに長く感じるのに！\u3000逆にして欲しいわ！」"
translation = "「성도회 일을 하려고 할 때는 그렇게 길게 느껴지는데! 반대였으면 좋겠어!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「え？\u3000――暗いから、家まで送っていってくれるの？\u3000夜のお散歩デートね！\u3000ありがと、クロト♪」"
translation = "「에? ──어두우니까 집까지 데려다준다고? 밤 산책 데이트네! 고마워, 쿠로토♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あ～あ、毎日２人でイチャイチャする時間がもっとあればいいのにって、最近はすごく思うわ」"
translation = "「아아, 매일 둘이서 꽁냥거리는 시간이 더 많았으면 좋겠다고 요즘은 정말 자주 생각해.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「星徒会室でイチャイチャしてたらマトイに見つかって、学園では自重しろって怒られちゃったし」"
translation = "「성도회실에서 꽁냥거리다가 마토이한테 들켜서 학원에서는 자제하라고 혼나기도 했고.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「――って、あっという間に九浄家の近くまできちゃったわ。今日はここまでね……」"
translation = "「──어라, 눈 깜짝할 새에 쿠죠가 근처까지 와버렸네. 오늘은 여기까지네……」"

[[dialogue]]
speaker = "unk"
original = "残念そうな顔をするヴィーナスに、「また明日、学園で」と告げて、頭を撫でる。"
translation = "아쉬운 표정을 짓는 비너스에게 「내일 또 학원에서 보자」고 말하며 머리를 쓰다듬는다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「うん……」"
translation = "「응……」"

[[dialogue]]
speaker = "unk"
original = "俺は手を振って、自宅へ戻ろうとすると――"
translation = "나는 손을 흔들고 집으로 돌아가려 하자──"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロト、待って」"
translation = "「쿠로토, 기다려.」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスに呼び止められて、服の裾が摘ままれていることに気づいた。"
translation = "비너스가 불러 세우고는 옷자락을 붙잡고 있다는 것을 깨달았다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あのね……」"
translation = "「저기 말이야……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「もうちょっとだけ……一緒にいちゃダメ？」"
translation = "「조금만 더…… 같이 있으면 안 될까?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「もう夜遅いから、どこかに行くのとかは無理かもだけど……」"
translation = "「이미 밤이 늦어서 어디 가거나 하는 건 무리겠지만……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「その……手を繋いで一緒にいるだけでもいいっていうか……」"
translation = "「그게…… 손잡고 같이 있는 것만으로도 좋다고 해야 할까……」"

[[dialogue]]
speaker = "unk"
original = "ちょっと待ってて"
translation = "잠깐만 기다려봐."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロト……？」"
translation = "「쿠로토……?」"

[[dialogue]]
speaker = "unk"
original = "俺はその場でＤＩＳＣを取り出し、操作する。九浄家当主のヘレナさんと、メイド隊の閃に、ヴィーナスの帰りが少し遅くなるというメッセ―ジを送信しておいた。"
translation = "나는 그 자리에서 DISC를 꺼내 조작한다. 쿠죠가 당주인 헬레나 씨와 메이드대의 센에게, 비너스의 귀가가 조금 늦어질 것이라는 메시지를 보냈다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「――もうちょっと、一緒にいていいの？」"
translation = "「──조금 더 같이 있어도 되는 거야?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「えへへ……♪\u3000クロト、ありがと<emoji=heart04>」"
translation = "「에헤헤……♪ 쿠로토, 고마워<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「恋人繋ぎで、ね？」"
translation = "「깍지 끼고 손잡는 거다?」"

[[dialogue]]
speaker = "unk"
original = "嬉しそうに腕に抱きついてきたヴィーナスは、そう言って指を絡めてくる。"
translation = "기쁜 듯 팔에 매달려온 비너스는 그렇게 말하며 손가락을 얽어왔다."

[[dialogue]]
speaker = "unk"
original = "本当は俺も離れるのが名残惜しかった、とは気恥ずかしくて言えない代わりに、彼女の手をしっかりと握り返すのだった――"
translation = "사실은 나도 헤어지기 아쉬웠다는 말은 쑥스러워서 하지 못하는 대신, 그녀의 손을 꽉 맞잡아 주었다──"

