[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「模擬戦闘、終了です……ふぅ。いい汗をかきましたわ！」"
translation = "「모의 전투, 종료입니다…… 후우. 기분 좋은 땀을 흘렸네요!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「緋宮会長もお付き合いいただき、ありがとうございます。バニーフォームの扱い方もわかってきた気がしますわ」"
translation = "「히노미야 회장도 함께해주셔서 감사합니다. 바니 폼을 다루는 법도 알 것 같은 기분이 들어요.」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「と、ところで……このあとはもう予定などありませんわよね？」"
translation = "「그, 그런데…… 이 뒤로는 이제 예정 같은 거 없으시죠?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「訓練で喉が渇いたでしょう。私のお部屋で、その……ア、アイスティーでも飲みませんこと？」"
translation = "「훈련으로 목이 마르실 텐데. 제 방에서, 그…… 아, 아이스티라도 마시지 않겠어요?」"

[[dialogue]]
speaker = "unk"
original = "先輩の部屋でティータイム──これは俺と先輩の間だけで通じる符丁だ。"
translation = "선배의 방에서 티타임── 이것은 나와 선배 사이에서만 통하는 암호다."

[[dialogue]]
speaker = "unk"
original = "『誰にも見られない場所で２人きりで過ごしたい』、すなわち恋人としての営みをしないかという、先輩のいじらしい誘い方なのである。"
translation = "『아무에게도 보이지 않는 곳에서 단둘이서 지내고 싶다』, 즉 연인으로서의 행위를 하지 않겠느냐는 선배의 애처로운 유혹인 것이다."

[[dialogue]]
speaker = "unk"
original = "だが俺は以前から先輩と一緒に訪れてみたい場所があったので、この機会に打診してみることにした。"
translation = "하지만 나는 이전부터 선배와 함께 가보고 싶은 장소가 있었기에, 이 기회에 타진해보기로 했다."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「えっ──？\u3000今日は外でっ……ホテ……しゅ、宿泊施設を使いますのっ？」"
translation = "「엣──? 오늘은 밖에서…… 호테…… 수, 숙박 시설을 이용하는 건가요!?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「私、あまりそういう場所は得意ではないのですが……でも、会長が望むなら……」"
translation = "「저, 별로 그런 장소는 익숙하지 않지만…… 하지만 회장이 원하신다면……」"

[[dialogue]]
speaker = "unk"
original = "そうして学園を抜け出して、サングラスとマスクで変装した──余計に目立ってる気もするが──先輩を連れて、ラブホテルにチェックイン。"
translation = "그렇게 학원을 빠져나와, 선글라스와 마스크로 변장한── 오히려 더 눈에 띄는 기분도 들지만── 선배를 데리고 러브호텔에 체크인."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「え、えぇえっ……！？\u3000ほ、本当にこんな格好でいたしますのっ……！？」"
translation = "「에, 에에엣……!? 저, 정말로 이런 모습으로 하는 건가요!?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ば、バニーフォームにお着替えまでは、百歩ゆずってよいとしてっ……こ、このポールは何ですの！？」"
translation = "「바, 바니 폼으로 갈아입는 것까지는 백번 양보해서 그렇다 치고…… 이, 이 폴은 뭔가요!?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ホテルの部屋のど真ん中に、まるでお立ち台みたいに設置されてっ……あ、あぁっ……恥ずかしすぎますわ……！」"
translation = "「호텔 방 한가운데에 마치 무대처럼 설치되어 있고…… 아, 아앗…… 너무 부끄러워요……!」"

[[dialogue]]
speaker = "unk"
original = "恋人である先輩のバニー衣装を見てからというもの、コスチュームに合わせた非日常な空間でエッチがしてみたいとずっと思っていた。"
translation = "연인인 선배의 바니 의상을 본 뒤로, 코스튬에 맞춘 비일상적인 공간에서 섹스를 해보고 싶다고 줄곧 생각했다."

[[dialogue]]
speaker = "unk"
original = "そんなわけで色々調べた結果、ストリップダンスに使うようなお立ち台とポールが設置された、このラブホテルの部屋に行きついたのだった。"
translation = "그래서 이것저것 알아본 결과, 스트립 댄스에 사용하는 무대와 폴이 설치된 이 러브호텔 방에 도달한 것이었다."

[[dialogue]]
speaker = "unk"
original = "このまま挿入しちゃってもいいんだけど──Ｍっ気の強い先輩は、もうちょっとだけいじめてあげた方がきっと興奮してくれるだろう。"
translation = "이대로 삽입해버려도 좋지만── M 기질이 강한 선배는 좀 더 괴롭혀주는 편이 분명 흥분할 것이다."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「……ええっ？\u3000つ、繋がる前に、ポールダンスを披露して欲しい、ですって……！？」"
translation = "「……에엣? 하, 합치기 전에 폴 댄스를 선보여 달라고요……!?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「今まさに挿れようとしてたではないですかっ。ま、まだ辱め足りないんですの……！？」"
translation = "「지금 막 넣으려고 하셨잖아요. 아, 아직 수치심이 부족한 건가요……!?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「マニアックすぎますわ！\u3000会長、いくら私が貴方に惚れているからといって……な、何でも言う事を聞くと思ったら大間違いでしてよ！？」"
translation = "「너무 마니아틱해요! 회장, 아무리 제가 당신에게 반해있다고 해서…… 뭐, 뭐든 시키는 대로 할 거라고 생각하면 큰 오산이랍니다!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「<b>ヒルディー</b>、これは命令だよ？」"
translation = "「<b>힐디</b>, 이건 명령이야.」"

[[dialogue]]
speaker = "unk"
original = "俺はいつも通り、先輩呼びを止めて２人きりの時だけに使う、恋人としての口調で話しかける。"
translation = "나는 평소처럼 선배 호칭을 멈추고 단둘이 있을 때만 사용하는 연인으로서의 말투로 말을 건다."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「か、会長……<emoji=heart04>\u3000あぁぁぁっ<emoji=heart04>\u3000ダメ、ですわぁ……<emoji=heart04>」"
translation = "「회, 회장……<emoji=heart04> 아아아앗<emoji=heart04> 안 돼요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "一旦口ではそう言いつつも──強めに命令すると、結局ヒルディーは俺の言うことを聞いてしまう。"
translation = "일단 입으로는 그렇게 말하면서도── 강하게 명령하면 결국 힐디는 내 말을 듣고 만다."

[[dialogue]]
speaker = "unk"
original = "ＤＩＳＣで見せたポールダンスの動画のとおりに、お尻を突き出すようにポーズを決めたり。仰け反りながら豊かなおっぱいの谷間を見せてくれたり。"
translation = "DISC로 보여준 폴 댄스 영상대로 엉덩이를 내밀 듯 포즈를 취하거나, 몸을 젖히며 풍만한 가슴 골을 보여주거나."

[[dialogue]]
speaker = "unk"
original = "腕の力だけで捕まって逆さになって、１８０度の開脚をしてくれたり──俺は恋人である美少女バニーのポールダンスを間近でたっぷりと楽しんだ。"
translation = "팔 힘만으로 매달려 거꾸로 되어 180도 다리 벌리기를 해주거나── 나는 연인인 미소녀 바니의 폴 댄스를 가까이서 듬뿍 즐겼다."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「……はぁっ。ふぅうっ……<emoji=heart04>\u3000も、もう、よろしくて……？\u3000あんな恥ずかしい恰好、本当にもう許してくださいまし……<emoji=heart04>」"
translation = "「……하아. 후우……<emoji=heart04> 이, 이제 됐나요……? 그런 부끄러운 모습, 정말 이제 용서해주세요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「恥ずかしい……恥ずかしすぎますわ……会長……うぅっ……<emoji=heart04>」"
translation = "「부끄러워…… 너무 부끄러워요…… 회장…… 으으……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "今までの経験から、ヒルディーにマゾっ気があることはよく知っている。いやらしい姿を俺にたっぷり視姦されて、女性器はとろとろに濡れそぼっていた。"
translation = "지금까지의 경험으로 힐디에게 마조 기질이 있다는 건 잘 알고 있다. 야한 모습을 나에게 듬뿍 시간당해, 여성기는 걸쭉하게 젖어 있었다."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ま、まじまじとおま○こを見ないでくださいませ……それに、んんぅ……<emoji=heart04>\u3000会長のおち○ぽも、ものすごい熱さ……<emoji=heart04>」"
translation = "「마, 빤히 보지 말아 주세요…… 게다가, 응으……<emoji=heart04> 회장의 자지도 엄청난 열기……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「恋人バニーの、エッチなダンスで興奮、してしまいましたの……？\u3000もう、本当に変態な御方ですこと……<emoji=heart04>」"
translation = "「연인 바니의 야한 댄스로 흥분해버린 건가요……? 정말 변태 같은 분이시네요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「で、ではっ……来てくださいませ？\u3000ちゃんと言うことを聞いた恋人に、御慈悲を──<emoji=heart04>」"
translation = "「그, 그럼…… 와주세요? 말을 잘 들은 연인에게 자비를──<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は頷いて、限界まで勃起したペニスを女性器にあてがって──"
translation = "나는 고개를 끄덕이고, 한계까지 발기한 페니스를 여성기에 갖다 대고──"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ふぅううっ……ぁ、はあ、ぁぁあっ──<emoji=heart04><emoji=heart04>」"
translation = "「후우우우…… 아, 하아, 아아앗──<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ん、ぁっ……はぁあ、ふぅうっ……<emoji=heart04>\u3000入っちゃい、ましたわ……会長の、おっきなっ……おち○ぽっ……ん、ふぅうっ<emoji=heart04>」"
translation = "「응, 앗…… 하아아, 후우……<emoji=heart04> 들어와 버렸어요…… 회장의 커다란…… 자지…… 응, 후우<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "期待していたのは俺だけじゃない。ヒルディーの女性器はキツキツに締まっているのに、気を許せばヌルンっと抜けてしまいそうなほどのぬめり。"
translation = "기대하고 있었던 건 나뿐만이 아니다. 힐디의 여성기는 꽉 조이는데도, 방심하면 미끄덩 빠져버릴 것 같은 미끈거림."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ぐ、ぐちゅぐちゅに濡れている、だなんてっ<emoji=heart04>\u3000どうしてそうやって、言葉にしてしまいます、のぉっ……？」"
translation = "「질, 질척질척하게 젖어 있다니<emoji=heart04> 어째서 그렇게 말로 해버리는 건가요……?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「いつもそうやって私を、恥ずかしがらせるのですからっ<emoji=heart04>\u3000……はぁ、ふぅうっ<emoji=heart04>」"
translation = "「언제나 그렇게 저를 부끄럽게 만드니까요<emoji=heart04> ……하아, 후우<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「私、もう我慢、できませんの……会長、動いてくださいまし<emoji=heart04>\u3000エッチなウサギおま○こ、たくさんパンパン──んぁああっ！」"
translation = "「저, 이제 참을 수 없어요…… 회장, 움직여주세요<emoji=heart04> 야한 토끼 보지, 잔뜩 팡팡── 응아앗!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ふ、ふわぁあっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あ、はぁあっ<emoji=heart04>\u3000んっ、ふぅ、んんん、んぁ、あ、ぅう、んんぅ、ふぅううっ……んぁああ<emoji=heart04>」"
translation = "「후, 후와앗<emoji=heart04> 앗<emoji=heart04> 아, 하앗<emoji=heart04> 응, 후우, 응응, 응아, 아, 으우, 응응으, 후우우…… 응아아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「こ、この体勢、いつもと違って──んふぅうっ！？\u3000んぁ、あ、あぅっ<emoji=heart04>\u3000あ、あぁ、あ、あぁ、ふぅう、ふわぁぁっ<emoji=heart04>」"
translation = "「이, 이 자세, 평소랑 달라서── 응후우!? 응아, 아, 아윽<emoji=heart04> 아, 아아, 아, 아아, 후우, 후와아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「会長のおち○ぽ、普段と違うところにぃっ……んんっ<emoji=heart04>\u3000ふぅっ<emoji=heart04>\u3000当たってます、わ、ぁあ、ああっ……んんんぅ～っ……<emoji=heart04>」"
translation = "「회장의 자지, 평소랑 다른 곳에…… 응응<emoji=heart04> 후우<emoji=heart04> 닿고 있어요, 아, 아앗…… 응응응~……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ベッドに寝転ぶ正常位や後背位とは違う、立ったまま繋がって穿つセックス。初めての体位に、ヒルディーの身体はビクビクと震えっぱなしだ。"
translation = "침대에 눕는 정상위나 후배위와는 다른, 선 채로 연결되어 꿰뚫는 섹스. 처음 해보는 체위에 힐디의 몸은 비쿠비쿠 떨림이 멈추지 않는다."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「んんぁ、はぁ、ふぅ、んぁっ<emoji=heart04>\u3000あ、はぁ、ぁう、ふうう、んんっ、会長<emoji=heart04>\u3000あ、あっ<emoji=heart04>\u3000そんなズンズン、されたら、んん<emoji=heart04>」"
translation = "「응응아, 하아, 후우, 응앗<emoji=heart04> 아, 하아, 아우, 후우우, 응응, 회장<emoji=heart04> 아, 앗<emoji=heart04> 그렇게 즈응즈응 하면, 응응<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「おっぱいが、ゆ、揺れて、ふわぁ、あ、あぅ<emoji=heart04>\u3000しまいます、わぁ<emoji=heart04>\u3000恥ずかしい、恥ずかしい、です、ぅっ──んんんっ<emoji=heart04>」"
translation = "「가슴이, 흔, 흔들려서, 후와아, 아, 아윽<emoji=heart04> 버려요<emoji=heart04> 부끄러워, 부끄러워요── 응응응<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "どれだけ繋がっても、ヒルディーの羞恥心は初めてセックスした時からほとんど変わらない。彼女が一流のレディとしての教育を受けて来たからだろう。"
translation = "아무리 연결되어도 힐디의 수치심은 처음 섹스했을 때와 거의 변하지 않는다. 그녀가 일류 숙녀로서 교육을 받아왔기 때문일 것이다."

[[dialogue]]
speaker = "unk"
original = "おっぱいや女性器をまじまじと観察すると、いつだって顔を真っ赤にしてイヤイヤと可愛いリアクションをしてくれるから──"
translation = "가슴이나 여성기를 빤히 관찰하면 언제나 얼굴을 새빨갛게 물들이고 싫다며 귀여운 리액션을 해주니까──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「胸、隠しちゃダメだよ。ヒルディー」"
translation = "「가슴, 가리면 안 돼. 힐디.」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「んんんぅ～っ<emoji=heart04>\u3000あ、やぁっ<emoji=heart04>\u3000やぁんっ<emoji=heart04>\u3000意地悪です、会長っ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000おっぱい、たぷたぷって、恥ずかしい、ですのにっ<emoji=heart04>」"
translation = "「응응응~<emoji=heart04> 아, 싫어<emoji=heart04> 시러엇<emoji=heart04> 심술궂어요, 회장<emoji=heart04> 응<emoji=heart04> 가슴이 출렁거리는 거, 부끄러운데<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ずっと俺に見せて。その方がヒルディーも嬉しいでしょ──密着したまま、耳元で囁く。"
translation = "계속 나에게 보여줘. 그게 힐디도 기쁘잖아── 밀착한 채 귓가에 속삭인다."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「んぅうっ──ひぃいっ<emoji=heart04>\u3000ふぁ、あああぁっ<emoji=heart04>\u3000だ、だめです、わぁあっ……<emoji=heart04>\u3000お耳の近くで、そ、そんな、ぁ、ふぅ<emoji=heart04>」"
translation = "「응으윽── 히이익<emoji=heart04> 화, 아아아앗<emoji=heart04> 안, 안 돼요……<emoji=heart04> 귓가에서 그, 그런, 아, 후우<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ん、ふわぁ、あ、あぅうっ<emoji=heart04>\u3000おっぱいも、そんな、揉みながら、おち○ぽ突かれては、わ、私、ぃいっ……ふぁああ<emoji=heart04>」"
translation = "「응, 후와아, 아, 아으윽<emoji=heart04> 가슴도 그렇게 주무르면서 자지로 찔려서는, 저, 저어…… 화아아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "本当に恥ずかしくて嫌なら、真っすぐ目を見て言ってほしい──そんな風に、俺たちの間ではセーフワードが決められている。"
translation = "정말 부끄러워서 싫다면 똑바로 눈을 보고 말해줘── 그런 식으로 우리 사이에는 세이프 워드가 정해져 있다."

[[dialogue]]
speaker = "unk"
original = "だけどどんな羞恥責めをしても、ヒルディーがセーフワードを口にしたことはない。顔を真っ赤にしながらも、よだれを垂らしながら彼女は俺の言葉に従う。"
translation = "하지만 어떤 수치 플레이를 해도 힐디가 세이프 워드를 입에 담은 적은 없다. 얼굴을 새빨갛게 붉히면서도 침을 흘리며 그녀는 내 말에 따른다."

[[dialogue]]
speaker = "unk"
original = "いつもは誇り高い恋人が、そんな風に俺の前だけでマゾの側面を晒している姿を見ると、それだけで背筋がゾクゾクするのだった。"
translation = "평소에는 긍지 높은 연인이 그런 식으로 내 앞에서만 마조의 측면을 드러내는 모습을 보면 그것만으로도 등골이 짜릿해지는 것이었다."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「はぁ、ふうぅ、はぁあ、あ、あぅ、んんっ<emoji=heart04>\u3000んんぅ、ぁああっ<emoji=heart04>\u3000おち○ぽ、か、硬すぎ、ですのぉっ……ふわぁ、あぅう<emoji=heart04>」"
translation = "「하아, 후우, 하아아, 아, 아윽, 응응<emoji=heart04> 응응으, 아아앗<emoji=heart04> 자지, 너, 너무 딱딱해요…… 후와아, 아으으<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "──おっぱい大きくなった？\u3000とピストンまじりに聞いてみる。"
translation = "──가슴 커졌어? 라고 피스톤 도중에 물어본다."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ひ、ひぅ！？\u3000そ、そんなこと、ぉっ<emoji=heart04>\u3000乙女に聞くものじゃありません、わよっ……あ、あ、あぅ<emoji=heart04>\u3000ふぅ、ぁああっ<emoji=heart04>」"
translation = "「히, 히우!? 그, 그런 거<emoji=heart04> 처녀에게 묻는 게 아니에요…… 아, 아, 아윽<emoji=heart04> 후우, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「う、ぅっ……んんんっ……<emoji=heart04>\u3000そ、そうですわっ……会長とエッチ、するようになってから、そのっ……うぅうんんっ<emoji=heart04>」"
translation = "「우, 윽…… 응응응……<emoji=heart04> 그, 그래요…… 회장과 섹스하게 된 뒤로, 그…… 으으응응<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「少し、大きくなったような、気がしますわ──んぁあっ！？\u3000はぁ、ふぅうっ、んんん～<emoji=heart04>\u3000乳首、いじっちゃだめ<emoji=heart04>\u3000だめですわぁ<emoji=heart04>」"
translation = "「조금 커진 것 같은 기분이 들어요── 응아앗!? 하아, 후우, 응응응~<emoji=heart04> 유두, 만지면 안 돼<emoji=heart04> 안 돼요<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「素直に答えたご褒美って、ぁ、ぁ、ぁ、あぁあ<emoji=heart04>\u3000や、やぁ、んんっ<emoji=heart04>\u3000ふわあ、ぁ、あぅっ<emoji=heart04>」"
translation = "「솔직하게 대답한 포상이라니, 아, 아, 아, 아아아<emoji=heart04> 싫, 싫어, 응응<emoji=heart04> 후와아, 아, 아윽<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「そんなに、じ、じっくりいじるの、ダメですわっ<emoji=heart04>\u3000も、もっとおっぱい、大きくなって、しまいます──んん～っ！」"
translation = "「그렇게 자, 자세히 만지는 거 안 돼요<emoji=heart04> 가, 가슴 더 커져 버려요── 응응~!」"

[[dialogue]]
speaker = "unk"
original = "ピストンのたびに揺れるおっぱいと、ヒルディーのしなやかな体を包むぴっちりとしたスーツが視覚的にもたまらない。"
translation = "피스톤 때마다 흔들리는 가슴과 힐디의 유연한 몸을 감싸는 꽉 끼는 슈트가 시각적으로도 참을 수 없다."

[[dialogue]]
speaker = "unk"
original = "俺はピストンのたびに彼女の身体を褒めて、指摘して、羞恥心を昂らせていく。"
translation = "나는 피스톤 때마다 그녀의 몸을 칭찬하고, 지적하고, 수치심을 고조시켜 나간다."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「んぅ、ふぅっ──ぉっ<emoji=heart04>\u3000ぉっ……ほぉ、ぉっ……ふう、ぅうっ……<emoji=heart04>\u3000あ、あまりイジめないでっ……ください、ましぃっ<emoji=heart04>」"
translation = "「응으, 후우── 오<emoji=heart04> 오…… 호오, 오…… 후우, 우우……<emoji=heart04> 너, 너무 괴롭히지 말아…… 주세요<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「会長、普段は優しいのにっ……エッチする時、いつも私を恥ずかしがらせてっ……ふぅ、うぅっ……ぉっ<emoji=heart04>\u3000ほ、ぉっ<emoji=heart04>\u3000お、ぉ、ぉうっ……<emoji=heart04>」"
translation = "「회장, 평소에는 다정하면서…… 섹스할 때 언제나 저를 부끄럽게 만들고…… 후우, 우우…… 오<emoji=heart04> 호, 오<emoji=heart04> 오, 오, 오우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "──でもヒルディーは、イジめられるの好きでしょ？"
translation = "──하지만 힐디는 괴롭힘당하는 거 좋아하잖아?"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「そ、そんなことはっ<emoji=heart04>\u3000あ、あぅうっ<emoji=heart04>\u3000ふぁっ<emoji=heart04>\u3000んんっ、んう、ふぅう、んぁ、あ、あぁあ、あぁあっ<emoji=heart04>」"
translation = "「그, 그런 건<emoji=heart04> 아, 아으으<emoji=heart04> 화앗<emoji=heart04> 응응, 응우, 후우우, 응아, 아, 아아아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "素直な彼女が意識しやすいよう、囁いてみる。"
translation = "솔직한 그녀가 의식하기 쉽도록 속삭여본다."

[[dialogue]]
speaker = "unk"
original = "──ポールダンスの観客がいるところ、想像してみて。"
translation = "──폴 댄스 관객이 있는 곳, 상상해봐."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ひぅぅうっ──！？\u3000んぁ、あ、あぁあ、あぁあっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「히우우우──!? 응아, 아, 아아아, 아아앗……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「はぁあ、あぁ、あ、あぁああ～っ……<emoji=heart04>」"
translation = "「하아아, 아아, 아, 아아아아~……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「な、何てこと、言います、のぉっ……<emoji=heart04>\u3000そ、想像して、しまったでは、ないですか、ぁっ……<emoji=heart04>」"
translation = "「무, 무슨 말을 하시는 건가요……<emoji=heart04> 상, 상상해버렸지 않나요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「会長とエッチしてるの、み、見られてるところ、想像してしまってっ……ん、ふぅうっ<emoji=heart04>」"
translation = "「회장과 섹스하는 거, 보, 보여지고 있는 곳 상상해버려서…… 응, 후우우<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "途端に締まりのよくなる女性器に、不意打ち気味の激しいピストンをお見舞いする。"
translation = "갑자기 조임이 좋아지는 여성기에 기습적인 격렬한 피스톤을 선사한다."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「──んぅぁぁぁああぁっ！？\u3000あっあっあっ<emoji=heart04>\u3000ふぅ、んぁあっ<emoji=heart04>\u3000ふうぅ、んぁぁ、あ、あぁぁ、ぅう、んんんぅっ<emoji=heart04>」"
translation = "「──응으아아아아아앗!? 앗앗앗<emoji=heart04> 후우, 응아앗<emoji=heart04> 후우우, 응아아, 아, 아아아, 우우, 응응응으<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「か、会長っ<emoji=heart04>\u3000だ、ダメぇえぇ<emoji=heart04>\u3000ダメですわ、ぁっ<emoji=heart04>\u3000そんな激しくおち○ぽっ──お、ぉっ<emoji=heart04>\u3000ぉぉ、ぉっ<emoji=heart04>\u3000んんぅ<emoji=heart04>」"
translation = "「회, 회장님<emoji=heart04> 아, 안 돼애애<emoji=heart04> 안 돼요, 아앗<emoji=heart04> 그렇게 격하게 자지를── 오, 오<emoji=heart04> 오오, 오<emoji=heart04> 응응으<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "──見られてるのに感じちゃうんだ？\u3000ヒルディー、いやらしいな。"
translation = "──보여지고 있는데 느껴버리는 거야? 힐디, 음란하네."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ふわああ、ああ、ぁう、ぅううっ<emoji=heart04>\u3000んんぁ<emoji=heart04>\u3000ち、ちち、違います、のぉっ……私、エッチな子なんかじゃっ……ん、ぅ～っ！」"
translation = "「후와아아, 아아, 아우, 우우우<emoji=heart04> 응응아<emoji=heart04> 아, 아아, 아니에요…… 저, 야한 아이 같은 게…… 응, 우~!」"

[[dialogue]]
speaker = "unk"
original = "──お客さんに写真を撮られちゃうかも。ああ、エッチしてるヒルディー、撮影されちゃってるよ？"
translation = "──손님들이 사진을 찍어버릴지도 몰라. 아아, 섹스하는 힐디, 촬영당하고 있어?"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「やあぁあっ<emoji=heart04>\u3000あっあっあっ<emoji=heart04>\u3000ふぅ、んぅ～っ<emoji=heart04>\u3000ダメ<emoji=heart04>\u3000ダメ<emoji=heart04>\u3000ダメぇぇっ<emoji=heart04>\u3000んんぁ、はぁ、ぅうっ<emoji=heart04>」"
translation = "「야아앗<emoji=heart04> 앗앗앗<emoji=heart04> 후우, 응우~<emoji=heart04> 안 돼<emoji=heart04> 안 돼<emoji=heart04> 안 돼애애<emoji=heart04> 응응아, 하아, 우우<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「いやらしい私を見ていいのは、か、会長だけぇ<emoji=heart04>\u3000他の方になんて──ん、うぅう、ふぅう、んんぁ、あぁ、ぉお、ぉっ<emoji=heart04>」"
translation = "「음란한 저를 봐도 되는 건 회장뿐이에요<emoji=heart04> 다른 분에게는── 응, 우우, 후우우, 응응아, 아아, 오오, 오<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "お立ち台に上がって、架空の客に見せつけるセックスシチュエーション。「ダメ」と言いながらもその声は蕩けに蕩け、おま○こは普段以上に快感を貪っている。"
translation = "무대에 올라 가상의 관객에게 보여주는 섹스 시츄에이션. 「안 돼」라고 말하면서도 그 목소리는 녹아내릴 대로 녹아내리고, 보지는 평소 이상으로 쾌감을 탐하고 있다."

[[dialogue]]
speaker = "unk"
original = "ヒルディーの貞操観念とマゾ心が混ざりあって、脳内で異常な快楽物質を分泌しているのが見てわかるようだった。"
translation = "힐디의 정조 관념과 마조심이 섞여 뇌 내에서 이상한 쾌락 물질을 분비하고 있는 것이 눈에 보일 정도였다."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「んんぅ、ぉっ<emoji=heart04>\u3000お、ぉっ<emoji=heart04>\u3000ふぅう、ぅぉっ……ぉぉ、ぉ、ぉおっ……<emoji=heart04><emoji=heart04>」"
translation = "「응응으, 오<emoji=heart04> 오, 오<emoji=heart04> 후우우, 우오…… 오오, 오, 오오<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「はぁあ、ふぅうっ<emoji=heart04>\u3000はぁあ、ふぅ、うぅう、ぅうっ<emoji=heart04>\u3000か、かっ──会長っ？\u3000私、さっきからずっと、軽くイって、ぇっ……んぅぅ<emoji=heart04>」"
translation = "「하아아, 후우우<emoji=heart04> 하아아, 후우, 우우우, 우우<emoji=heart04> 회, 회── 회장님? 저, 아까부터 계속 살짝 가버려서…… 응으으<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ま、まだっ……おち○ぽイキませんのっ？\u3000ふぅ、ふぅうっ<emoji=heart04>\u3000おぉぁ<emoji=heart04>\u3000これ以上、おま○こぐりぐり、ほじられたら、ぁ、ああっ<emoji=heart04>\u3000頭、おかしくなってしまいますわぁぁ<emoji=heart04><emoji=heart04>」"
translation = "「아, 아직…… 자지 안 가나요? 후우, 후우우<emoji=heart04> 오오아<emoji=heart04> 이 이상 보지 그리그리 파헤쳐지면, 아, 아앗<emoji=heart04> 머리, 이상해져 버려요오오<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "──じゃあ射精したくなるように、ウサギのマネをして。"
translation = "──그럼 사정하고 싶어지도록 토끼 흉내를 내줘."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「え、えぇえっ！？\u3000そ、そんな、でも、恥ずかしいっ……<emoji=heart04>\u3000ふぅ、んぅ、んんんっ<emoji=heart04>」"
translation = "「에, 에에엣!? 그, 그런, 하지만 부끄러워……<emoji=heart04> 후우, 응우, 응응응<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "──恥ずかしいこと、大好きでしょ。やらないとおち○ぽ止めちゃうよ？"
translation = "──부끄러운 거 아주 좋아하잖아. 안 하면 자지 멈춰버릴 거야?"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ぁ、あっ──そんな、そんなぁぁっ<emoji=heart04>\u3000意地悪です、あなた様は、本当に意地悪ぅ<emoji=heart04>\u3000んぅう、ふぅう、ぁああっ<emoji=heart04>」"
translation = "「아, 앗── 그런, 그런어어엇<emoji=heart04> 심술궂어요, 당신은 정말 심술궂어<emoji=heart04> 응으으, 후우우, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「はふぅぅん<emoji=heart04>\u3000私が、あなた様の言うこと、拒めないってわかってて<emoji=heart04>\u3000はぁぁん<emoji=heart04>\u3000ふぅ、んんぅ、んぁ、あ、ああぁっ<emoji=heart04>」"
translation = "「하후우운<emoji=heart04> 제가 당신의 말을 거부할 수 없다는 걸 알면서<emoji=heart04> 하아앙<emoji=heart04> 후우, 응응으, 응아, 아, 아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「大勢の人の前で、こんなっ……ふぅっ、こんなぁっ<emoji=heart04>\u3000あはぁぁんっ<emoji=heart04>」"
translation = "「수많은 사람 앞에서 이런…… 후우, 이런어어엇<emoji=heart04> 아하아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「……うぅぅ<emoji=heart04>\u3000あぁぁっ。み、認めます、わぁっ……んんぅ<emoji=heart04>」"
translation = "「……으으으<emoji=heart04> 아아앗. 이, 인정할게요…… 응응으<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「私はぁ……<emoji=heart04>\u3000はぁぁぁん<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000恥ずかしいこと大好きな、淫乱おま○こだぴょんっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「저는……<emoji=heart04> 하아아앙<emoji=heart04> 아아앗<emoji=heart04> 부끄러운 거 아주 좋아하는 음란 보지다뿅<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ご主人様におち○ぽされてっ、びゅるびゅる中出しされたいぴょんっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ぴょんぴょんっ<emoji=heart04><emoji=heart04>」"
translation = "「주인님께 자지당해서 뷰루뷰루 질내사정 당하고 싶다뿅<emoji=heart04><emoji=heart04><emoji=heart04> 뿅뿅<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「────っ！」"
translation = "「────윽!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「んんぅうぁあぁ！？\u3000あっあっあっ<emoji=heart04>\u3000ふぅう、ぉっ<emoji=heart04>\u3000おぉ、おっおっ、ふぅう、お、ぉ、ぉおぉ～っ……！」"
translation = "「응응으으아아아!? 앗앗앗<emoji=heart04> 후우우, 오<emoji=heart04> 오오, 오오오, 후우우, 오, 오, 오오오~!!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「激しっ<emoji=heart04>\u3000ぉうっ<emoji=heart04>\u3000んんっ、ふぅっ<emoji=heart04>\u3000んぉっ<emoji=heart04>\u3000おち○ぽ、すご、ぉっ<emoji=heart04>\u3000お、おぉっ<emoji=heart04>」"
translation = "「격해<emoji=heart04> 오우<emoji=heart04> 응응, 후우<emoji=heart04> 응오<emoji=heart04> 자지, 굉장, 오<emoji=heart04> 오, 오오<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「も、もっとしてっ──ぴょんっ<emoji=heart04>\u3000ヒルディーのうさぎおま○こ、いっぱい使ってくださいましっ……ぴょん<emoji=heart04>\u3000ぴょっ──お、ぉっん<emoji=heart04>」"
translation = "「더, 더 해줘── 뿅<emoji=heart04> 힐디의 토끼 보지, 잔뜩 써주세요…… 뿅<emoji=heart04> 뾰── 오, 오응<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「──ぁ、あ、ぁ、あ、あ、あ、あ、あ、ぁっ<emoji=heart04>\u3000まだ太くなって、んぁ、あぅ、んんぅ、ふぅうっ<emoji=heart04><emoji=heart04>」"
translation = "「──아, 아, 아, 아, 아, 아, 아, 아, 아앗<emoji=heart04> 아직 굵어져서, 응아, 아우, 응응으, 후우우<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「あっ──イクっ<emoji=heart04>\u3000おま○こイクっ<emoji=heart04>\u3000イっちゃいますっ──ぁ、あ、あ、ぁ、あ、あ、ぁ、あっ──<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗── 가<emoji=heart04> 보지 가<emoji=heart04> 가버려요── 아, 아, 아, 아, 아, 아, 아, 앗──<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「出してっ<emoji=heart04>\u3000出してくださいませっ、あぁあんっ──イクイクっ<emoji=heart04>\u3000イクイクイクイクイクぅぅ<emoji=heart04><emoji=heart04>」"
translation = "「내보내 줘<emoji=heart04> 내보내 주세요, 아아앙── 가가가<emoji=heart04> 가가가가가가아아<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「イック、ぅぅうぅぅうう～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000んんぁぁぁ、あ、あぁあああぁあ～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가아악, 으으으으으으으으~~!!<emoji=heart04><emoji=heart04><emoji=heart04> 응응아아아, 아, 아아아아아아아~!!<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ポールに掴まって全身を震わせるヒルディーに、遠慮なく精を注ぎ込む。"
translation = "폴을 붙잡고 온몸을 떠는 힐디에게 사양 없이 정을 쏟아붓는다."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「んっふぅ、ぅう、ぅうあ、ぁ、あぁあ<emoji=heart04>\u3000びゅくびゅく、す、すっごい出てっ──あ、あぅっ<emoji=heart04>」"
translation = "「응후, 우, 우아, 아, 아아아<emoji=heart04> 뷰쿠뷰쿠, 어, 엄청 나와서── 아, 아윽<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「お腹、ぱんぱんに、なってしまいまっ──ふぅうっ<emoji=heart04><emoji=heart04>\u3000お、ぉぅっ<emoji=heart04>\u3000ぅ、んんぉ、ぉ、ぉお～～～……っ<emoji=heart04><emoji=heart04>」"
translation = "「배, 빵빵하게 되어버려── 후우우<emoji=heart04><emoji=heart04> 오, 오우<emoji=heart04> 우, 응응오, 오, 오오~~~……!!<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "片足だけのつま先立ちで、逃げることも敵わない恋人の子宮に向かって、最後の一滴まで精液を吐き出して──"
translation = "한쪽 발로만 까치발을 든 채 도망칠 수도 없는 연인의 자궁을 향해 마지막 한 방울까지 정액을 뱉어내고──"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「んんぁっ……はぁああっ……ふぅう～っ……ふぅうう～っ……<emoji=heart04><emoji=heart04>」"
translation = "「응응아…… 하아아앗…… 후우우~…… 후우우우~……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「すっ……すっごい……快感、でした、わぁ……<emoji=heart04>\u3000あ、ぅうっ……あ、足に力、は、入りませ、んっ……<emoji=heart04>」"
translation = "「어…… 엄청난…… 쾌감이었어요……<emoji=heart04> 아, 아우…… 다, 다리에 힘이, 아, 안 들어가요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「会長……？\u3000ま、満足、できまして……？\u3000おち○ぽ……もう打ち止め、ですか……？」"
translation = "「회장님……? 마, 만족하셨나요……? 자지…… 이제 끝인가요……?」"

[[dialogue]]
speaker = "unk"
original = "そんなわけはない。中出しされてこんなに身体を震わせてくれるバニーガールを前にして、１回で済むわけがない。"
translation = "그럴 리가 없다. 질내사정 당하고 이렇게 몸을 떨어주는 바니걸을 앞에 두고 한 번으로 끝날 리가 없다."

[[dialogue]]
speaker = "unk"
original = "少し時間を貰えれば、すぐに回復できるはずだ。"
translation = "조금 시간을 주면 금방 회복할 수 있을 것이다."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「も、もっと……したいのですわね……？\u3000ほ、本当にエッチな御方……<emoji=heart04>」"
translation = "「더…… 하고 싶으신 거군요……? 저, 정말 야한 분……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「で、では……ホテルの時間いっぱいまで……お相手いたしましてよ……<emoji=heart04>」"
translation = "「그, 그럼…… 호텔 시간 끝날 때까지…… 상대해드리겠어요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "中出し直後のとろとろの女性器をくぱっと開いて、ヒルディーは交尾の続きを俺に促してくれるのだった──"
translation = "질내사정 직후의 걸쭉한 여성기를 쿠팟 하고 벌리며, 힐디는 교미의 뒷부분을 나에게 재촉하는 것이었다──"

