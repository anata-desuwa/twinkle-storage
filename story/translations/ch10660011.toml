[[dialogue]]
speaker = "unk"
original = "第１話,さすらいの旅人、ラティエ,P"
translation = "제1화, 방랑하는 여행자, 라티에, P"

[[dialogue]]
speaker = "unk"
original = "とある日の放課後──流星学園の星徒会室を訪れた俺は、意外な人物と再会した。"
translation = "어느 날 방과 후── 유성학원의 성도회실을 방문한 나는 뜻밖의 인물과 재회했다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「行きますよ～っ！\u3000ルリエル渾身のー、カラーチェンジ！\u3000旅人さん、赤は持っていないはずですっ！」"
translation = "「갑니다아~! 루리엘 혼신의 컬러 체인지! 여행자님, 빨간색은 없을 게 분명해요!」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「はっはっ、慧眼だな。確かに赤はないが……む。トップから赤を引いたぞ。ついでにペアも出せるじゃないか。フフ、これで残り１枚だ」"
translation = "「하하, 혜안이군. 확실히 빨강은 없지만…… 흠. 덱 맨 위에서 빨강을 뽑았군. 내친김에 페어도 낼 수 있지 않은가. 후후, 이걸로 남은 건 1장이다」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「うわーん！\u3000また旅人さんのディスティニードローです～っ！\u3000どうやったら倒せるのですかぁ！？」"
translation = "「으앙! 또 여행자님의 데스티니 드로우예요~! 어떻게 해야 이길 수 있는 건가요!?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「あれ、でもＵＭＯって言ってないよーな？」"
translation = "「어라, 근데 UMO라고 안 말한 거 가튼데?」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「そうだったか？\u3000いかんな、また忘れてしまった。では２枚カードを引くとしようか」"
translation = "「그랬던가? 이거 안 되겠군, 또 잊어버렸어. 그럼 카드 두 장을 뽑도록 하지」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「やったのです～っ！\u3000これでまだまだ盤面は膠着状態！\u3000ここから盛り返すのですよ～っ！」"
translation = "「나이스예요~! 이걸로 아직 판세는 교착 상태! 여기서부터 되살아나는 거예요~!」"

[[dialogue]]
speaker = "unk"
original = "ラティエさん、何やってるんですか？"
translation = "라티에 씨, 뭐 하고 계세요?"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「ん？\u3000ああ、きみか。何、ちょっとした気まぐれだよ。つい最近、流星市国に帰ってきてね」"
translation = "「음? 아아, 자네인가. 별거 아냐, 그냥 기분 전환이지. 최근 유성시국으로 돌아와서 말이야」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「星徒会室を冷やかしに来たら、楠葉たちが札遊びに誘ってくれてね。意外と奥が深いものだよ、これは。なかなか勝てん」"
translation = "「성도회실에 구경 왔더니 쿠스하 일행이 카드 놀이에 끼워 주더군. 의외로 심오하더군, 이거. 좀처럼 이기기 힘들어」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ＵＭＯって言い忘れてなきゃ、もう１０回は勝ってますって……」"
translation = "「UMO라고 말하는 거 안 잊었으면 벌써 열 번은 이겼을 텐데……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「旅人さん、運はすごいですがルールにはまだ不慣れなのです！\u3000ルリエルが勝つには今がチャンスなのですぅ！」"
translation = "「여행자님, 운은 굉장하시지만 규칙에는 아직 서투르세요! 루리엘이 이기기에는 지금이 찬스예요!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ちなみにルリちーもよく言い忘れてるよん。二人していい勝負ってカンジ？\u3000一騎打ちだねぇ」"
translation = "「참고로 루리치도 자주 까먹는단 말씀. 둘이서 막상막하라는 느낌? 일대일 대결이네」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ところで会長さんは何の用事？\u3000一緒にＵＭＯしちゃう？」"
translation = "「그건 그렇고 회장님은 무슨 용건? 같이 UMO 할래?」"

[[dialogue]]
speaker = "unk"
original = "フィオナに用事があったんだけど"
translation = "피오나에게 용건이 있었는데"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「あぁ、フィオナなら出かけてるよ。もうすぐ帰ってくるんじゃねえか？」"
translation = "「아아, 피오나라면 외출 중이야. 곧 돌아오지 않겠어?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ルリちーたちの一騎打ちが終わったら、５人で遊ぼっか♪」"
translation = "「루리치 일행의 대결이 끝나면 다섯 명이서 놀자♪」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「はぅう。でもフィオナ会長、遅いのです。何かあったのでしょうか……４」"
translation = "「하우우. 하지만 피오나 회장님, 늦으시네요. 무슨 일이라도 있는 걸까요…… 4」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「ほう、星徒会長殿はやはり忙しい身の上なのかな？\u3000６」"
translation = "「허어, 성도회장 공은 역시 바쁜 몸인가 보군? 6」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「はい！\u3000この流星学園はとっても大きな学園ですから。フィオナ会長がいなければ一日ともたないのです！\u3000３っ」"
translation = "「네! 이 유성학원은 정말 거대한 학원이니까요. 피오나 회장님이 없으면 하루도 버티지 못해요! 3읏」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「もちろんルリエルたち星徒会メンバーも、日々学園のために東へ西へ、大活躍なのですよっ」"
translation = "「물론 루리엘들 성도회 멤버도 매일 학원을 위해 동으로 번쩍 서로 번쩍, 대활약 중이라구요」"

[[dialogue]]
speaker = "unk"
original = "その割には遊んでいるような……"
translation = "그것치고는 놀고 있는 것 같은데……"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「し、心外ですっ。今日はこのお部屋で待機するのがお仕事なのです！」"
translation = "「서, 섭섭해요. 오늘은 이 방에서 대기하는 게 일이라구요!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「会長さん、驚かないでくださいね。なんと今日は、流星の学園長がここにお邪魔するそうなのです！」"
translation = "「회장님, 놀라지 마세요. 무려 오늘은 유성의 학원장님이 여기에 들르신다고 해요!」"

[[dialogue]]
speaker = "unk"
original = "え、でも目の前に……"
translation = "어, 하지만 눈앞에……"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「（しーっ！\u3000ルリちーだけ、まだ気づいてないの。だから内緒ね♪）」"
translation = "「(쉬잇! 루리치만 아직 눈치 못 챘어. 그러니까 비밀이야♪)」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「あたしらは魔界で会ってるけどな、ルリのやつだけ初対面だろ？\u3000ラティエさんが学園長ってずっと気づかねーから面白くってな」"
translation = "「우리는 마계에서 만났었지만, 루리 저 녀석만 초면이잖아? 라티에 씨가 학원장이라는 걸 계속 눈치 못 채니까 재밌어서 말이지」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「旅人さんは知らないと思いますが、うちの学園長はとても謎に包まれているんですよ」"
translation = "「여행자님은 모르시겠지만, 저희 학원장님은 아주 베일에 싸여 계신 분이에요」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「ほう。学園長なのに謎の人物……姿を見せないということかな？」"
translation = "「허어. 학원장인데 정체불명이라…… 모습을 드러내지 않는다는 뜻인가?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「はい！\u3000いつも色んなところを気ままに放浪しているんです。なんと入学式の時ですら欠席していたのです！」"
translation = "「네! 항상 이곳저곳을 마음대로 방랑하고 계세요. 무려 입학식 때조차 결석하셨다니까요!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「おかげでフィオナ会長のお仕事も増えるばっかり。きっと自分勝手でワガママな、悪～い人なのですよ……！」"
translation = "「덕분에 피오나 회장님의 업무도 늘어나기만 하고. 분명 자기중심적이고 제멋대로인 나~쁜 분일 거예요……!」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「はっはっ。それは厄介だな。ずいぶんと自由人なようだ」"
translation = "「하하하. 그거 골치 아프군. 꽤나 자유인인 모양이야」"

[[dialogue]]
speaker = "unk"
original = "（楽しそうにルリエルと話してる……）"
translation = "(즐겁게 루리엘과 대화하고 있어……)"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「だからルリエル、学園長にお会いしたらビシっと言ってやるつもりなのです。ちょっとはお仕事をしてくださいっ！\u3000と」"
translation = "「그래서 루리엘, 학원장님을 만나면 따끔하게 말해줄 생각이에요. 일 좀 하세요! 라구요」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「うむ、それは結構だが……ＵＭＯで遊んでいるきみが言っても、相手には響かないかもしれんぞ？」"
translation = "「음, 그것도 좋지만…… UMO로 놀고 있는 자네가 말해도 상대에게 와닿지 않을지도 모른다고?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「大丈夫なのですっ。学園長が来る前にお片付けしてしまえば証拠はありません！\u3000ルリエルの作戦はばっちりなのです！」"
translation = "「괜찮아요. 학원장님이 오시기 전에 정리해 버리면 증거는 없으니까요! 루리엘의 작전은 완벽해요!」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「ははははっ！\u3000珍しいな。天使は生真面目な者が多いのだが、きみのような子もいるのだね。やはり世界は広い」"
translation = "「하하하하! 희한하군. 천사는 고지식한 자가 많은데, 자네 같은 아이도 있군 그래. 역시 세상은 넓어」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「──やっと見つけました！」"
translation = "「──겨우 찾았습니다!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あっ、フィオナ会長なのです。お疲れ様です～」"
translation = "「앗, 피오나 회장님이에요. 수고하셨어요~」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「や、星見嬢。ずいぶんと遅れた到着じゃないか」"
translation = "「여어, 호시미 양. 꽤 늦은 도착이군」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はぁ……お願いですからちゃんと指定した待ち合わせ場所にいてください。おかげで探し回ってしまいました」"
translation = "「하아…… 부탁이니까 제발 지정한 약속 장소에 있어 주세요. 덕분에 한참 찾아다녔잖아요」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「……そうだったか？\u3000はっはっ、すまない。忘れていたよ」"
translation = "「……그랬던가? 하하하, 미안하군. 잊어버렸어」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「まったくもう、あなたは……！」"
translation = "「정말이지 당신은……!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「フィオナ会長。こちら、流星市国に最近やってこられた、旅人のラティエさんなのです！\u3000とっても面白いお方で──」"
translation = "「피오나 회장님. 이분은 최근 유성시국에 오신 여행자 라티에 씨예요! 아주 재미있는 분이라서──」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……ラティエ学園長、あまりうちのルリエルをからかわないでくださいね」"
translation = "「……라티에 학원장님, 저희 루리엘을 너무 놀리지 마세요」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「──えぇええっ！\u3000学園長っ！？\u3000旅人さんが！？」"
translation = "「──에에에엣! 학원장님!? 여행자님이요!?」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「堅苦しいのは嫌いなんだ。ルリエル嬢のように気兼ねなく接してもらえた方が、私も嬉しくてね。つい旅人のまま通してしまったよ」"
translation = "「격식 차리는 건 질색이라서 말이지. 루리엘 양처럼 스스럼없이 대해주는 편이 나도 기뻐서 말이야. 그만 여행자인 채로 통해 버렸군」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「さ──それでは親睦会を始めようか。きみたちの学園生活のこと、色々と聞かせてもらえると嬉しいな？」"
translation = "「자── 그럼 친목회를 시작해 볼까. 자네들의 학원 생활에 대해 여러 가지 들려주면 기쁘겠군」"

[[dialogue]]
speaker = "unk"
original = "その後、流星星徒会の親睦会に俺も参加し、楽しい会食をすることになったのだが……ルリエルだけは終始、顔を真っ青にしていたのだった。"
translation = "그 후, 유성 성도회의 친목회에 나도 참가하여 즐거운 식사를 하게 되었는데…… 루리엘만은 시종일관 얼굴이 새파랗게 질려 있었다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ふぇええぇえ……失礼なこと、言いまくっちゃった気がしますぅ……た、退学とか、ならないですよねぇ……！？」"
translation = "「후에에에에…… 무례한 말을 잔뜩 해버린 것 같아요…… 퇴, 퇴학 같은 거 안 당하겠죠……!?」"

