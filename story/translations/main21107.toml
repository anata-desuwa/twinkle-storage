[[dialogue]]
speaker = "unk"
original = "第７話,破滅の誘惑,B"
translation = "제7화, 파멸의 유혹, B"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ジグ……？」"
translation = "「지그……?」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「君はかつて共に戦った仲間だ。だから言うよ」"
translation = "「너는 한때 함께 싸웠던 동료야. 그래서 말하는 거야」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「やり直そう、アガサ」"
translation = "「다시 시작하자, 아가사」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「──ッ」"
translation = "「──윽」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「君も自分の弱さを痛感したはずだ。だけど世界がなくなれば、その弱さもなかったことになる」"
translation = "「너도 자신의 약함을 통감했을 거야. 하지만 세계가 없어지면 그 약함도 없었던 게 돼」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「私の絶望も、君の弱さもまっさらにして、一から世界をやり直すんだ」"
translation = "「나의 절망도, 너의 약함도 깨끗이 비우고, 처음부터 세계를 다시 시작하는 거야」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「やり……なおす……」"
translation = "「다시…… 시작해……」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ああ、そうだ」"
translation = "「아아, 그래」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ベガの滅びの瞬間、私は“真なる神”を拝する機会を賜った」"
translation = "「베가의 멸망의 순간, 나는 “진정한 신”을 배알할 기회를 얻었어」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「そして気付いたんだ。神に抗おうとすることが愚かだったのだと」"
translation = "「그리고 깨달았지. 신에게 저항하려 했던 것이 어리석었다는 걸」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「だから私は願った。そんな愚かな自分を捨てて、何もかもなかったことにしたいと」"
translation = "「그래서 나는 바랐어. 그런 어리석은 자신을 버리고, 모든 걸 없었던 일로 하고 싶다고」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「神は私にその機会を与えてくださった」"
translation = "「신은 나에게 그 기회를 주셨어」"

[[dialogue]]
speaker = "unk"
original = "ジグが倒れた梨緒に向かって、微笑みながら手を差し伸べる。"
translation = "지그가 쓰러진 리오를 향해 미소 지으며 손을 내민다."

[[dialogue]]
speaker = "unk"
original = "梨緒が泣いていた時に『可能性はある』と言ってくれた時の笑顔が、仮面越しに見えた気がした。"
translation = "리오가 울고 있을 때 『가능성은 있어』라고 말해주던 그때의 미소가, 가면 너머로 보인 듯한 기분이 들었다."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「さぁ、一緒に行こう、アガサ」"
translation = "「자, 함께 가자, 아가사」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「弱くて役に立たない自分はここに捨てて、新しい自分になろう」"
translation = "「약하고 도움이 안 되는 자신은 여기에 버리고, 새로운 자신이 되는 거야」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「自分を……捨てる……」"
translation = "「자신을…… 버려……」"

[[dialogue]]
speaker = "unk"
original = "ジグの手を取るか逡巡する梨緒。"
translation = "지그의 손을 잡을지 주저하는 리오."

[[dialogue]]
speaker = "unk"
original = "潤んだ瞳に、ジグの優しい笑みが映る。"
translation = "물기 어린 눈동자에 지그의 상냥한 미소가 비친다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「わた、し……は──」"
translation = "「나, 는──」"

[[dialogue]]
speaker = "unk"
original = "そして梨緒は──"
translation = "그리고 리오는──"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「おおおおっ！！」"
translation = "「오오오오옷!!」"

[[dialogue]]
speaker = "unk"
original = "頭上から鮮血色の閃光が走り、梨緒とジグの間に槍撃が突き刺さる。"
translation = "머리 위에서 선혈색 섬광이 내달리며, 리오와 지그 사이에 창격이 꽂힌다."

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「スワローテイルダンス！」"
translation = "「스왈로 테일 댄스!」"

[[dialogue]]
speaker = "unk"
original = "高速で飛行するナターシャの残像が実像を持ち、分身を生む。"
translation = "고속으로 비행하는 나타샤의 잔상이 실체를 갖고 분신을 낳는다."

[[dialogue]]
speaker = "unk"
original = "さらに無数のナターシャの分身が、次々にジグに斬りかかった。"
translation = "나아가 무수한 나타샤의 분신이 차례차례 지그에게 달려들었다."

[[dialogue]]
speaker = "unk"
original = "しかしジグは平然と反応し、大剣の一振りでナターシャの分身を薙ぎ払う。"
translation = "하지만 지그는 태연하게 반응하며 대검을 한 번 휘둘러 나타샤의 분신을 베어 넘긴다."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「モンスターがいたはずだけど、あれだけじゃ不十分だったかな」"
translation = "「몬스터가 있었을 텐데, 그것만으론 부족했나 보네」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「極星従騎を残してきたからね。少しは持ちこたえてくれるはずだよ」"
translation = "「극성종기를 남겨두고 왔으니까. 조금은 버텨줄 거야」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ベアト……ナターシャ……」"
translation = "「베아트…… 나타샤……」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「あーあ、また顔ぐしゃぐしゃにして泣いちゃって。手のかかる委員長なんだから」"
translation = "「아-아, 또 얼굴 엉망으로 만들어서 울고 있네. 손 많이 가는 위원장이라니까」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ベアト、任せた！」"
translation = "「베아트, 맡길게!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「うん！」"
translation = "「응!」"

[[dialogue]]
speaker = "unk"
original = "ナターシャが梨緒とベアトリスを背に庇うと、ベアトリスは梨緒を抱え、来た道を全速力で飛ぶ。"
translation = "나타샤가 리오와 베아트리스를 등 뒤로 보호하자, 베아트리스는 리오를 안고 왔던 길을 전속력으로 난다."

[[dialogue]]
speaker = "unk"
original = "ベアトリスは神殿の最奥を離脱し、先刻の戦いでできた瓦礫に隠れた。"
translation = "베아트리스는 신전 가장 안쪽을 이탈해, 조금 전 전투로 생긴 잔해에 숨었다."

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「梨緒ちゃん、大丈夫！？」"
translation = "「리오짱, 괜찮아!?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「戻ら……ないと……ナターシャが……ジグが……」"
translation = "「돌아……가야……해…… 나타샤가…… 지그가……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ジグは、私が助けないと……ナターシャを、１人には……あ、うぅぅっ……ああぁっ……！」"
translation = "「지그는, 내가 구하지 않으면…… 나타샤를, 혼자 두게 할 순…… 아, 으으윽…… 아아앗……!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「落ち着いて、梨緒ちゃん！」"
translation = "「진정해, 리오짱!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「でも、このままじゃ、ナターシャが……っ……ジグ……ぅっ……うぅああっ……！」"
translation = "「하지만, 이대로라면, 나타샤가……윽…… 지그……으윽…… 으으아앗……!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「今の梨緒ちゃんが行っても何もできないよ！\u3000何が起きたの！？\u3000あの人と何があったのか教えて！？」"
translation = "「지금 리오짱이 가봤자 아무것도 할 수 없어! 무슨 일이 있었던 거야!? 그 사람이랑 무슨 일이 있었는지 알려줘!?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ぅっ……私は……わた、しは……何も、できなくて……」"
translation = "「윽…… 나는…… 나, 는…… 아무것도, 못 하고……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ジグは、私を支えてくれたのに……っ……私は、何も、してやれなくて……」"
translation = "「지그는, 나를 지탱해 줬는데……윽…… 나는, 아무것도, 해주지 못해서……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ジグは、未来を知って……誰よりも絶望していたのに……なのに……それでも戦って……」"
translation = "「지그는, 미래를 알고…… 누구보다 절망하고 있었는데…… 그런데…… 그런데도 싸우고……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私は、そんなジグを……見捨てて……っ」"
translation = "「나는, 그런 지그를…… 저버리고……윽」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私は──私の弱さに耐えられない！！」"
translation = "「나는── 나의 약함을 견딜 수 없어!!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「うぅっ、うぅっ……あああ……っ！\u3000う──ああぁあぁあああっ！！」"
translation = "「으윽, 으윽…… 아아아……윽! 우── 아아아아아아앗!!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「梨緒ちゃん……」"
translation = "「리오짱……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「私、梨緒ちゃんのために何ができるかわからないけど……それでも……」"
translation = "「나, 리오짱을 위해서 뭘 할 수 있을지 모르겠지만…… 그래도……」"

[[dialogue]]
speaker = "unk"
original = "ベアトリスが打ちひしがれる梨緒にそっと近づき、こぼれる涙をハンカチで優しく拭う。"
translation = "베아트리스가 낙담한 리오에게 살며시 다가가, 흐르는 눈물을 손수건으로 부드럽게 닦아준다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ベア、ト……」"
translation = "「베아, 트……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「約束したでしょ、梨緒ちゃんが泣いてたら、私が涙を拭うって」"
translation = "「약속했잖아, 리오짱이 울고 있으면, 내가 눈물을 닦아주겠다고」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「いいよ、わかったよ。今度梨緒ちゃんが泣いてるところ見かけたら、『梨緒ちゃんが泣くわけない！』って言って勝手に顔をハンカチでゴシゴシしちゃうから」"
translation = "「괜찮아, 알았어. 다음에 리오짱이 우는 걸 발견하면, 『리오짱이 울 리가 없지!』라면서 마음대로 얼굴을 손수건으로 슥슥 닦아버릴 거니까」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「君は言ってくれたな。もし私が泣いていたら、その涙を拭ってくれると」"
translation = "「너는 말해주었지. 만약 내가 울고 있다면, 그 눈물을 닦아주겠다고」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私はどうやら泣き虫のようだから……その約束を果たしてほしい」"
translation = "「나는 아무래도 울보인 모양이니…… 그 약속을 지켜줬으면 해」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「私じゃ梨緒ちゃんとジグさんのつらさや苦しみはわからないかもしれない。梨緒ちゃんの悲しみを受け止めきれないかもしれない」"
translation = "「나로선 리오짱과 지그 씨의 괴로움이나 고통은 모를지도 몰라. 리오짱의 슬픔을 다 받아내지 못할지도 몰라」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「それでも私は梨緒ちゃんの傍にいるよ。仲間だもん」"
translation = "「그래도 나는 리오짱 곁에 있을게. 동료인걸」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「────」"
translation = "「────」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「っ──うぅぅっ……ああぁっ、あっ、ああぁあああっ……！！」"
translation = "「윽── 으으으윽…… 아아앗, 앗, 아아아아아앗……!!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「梨緒ちゃん！？\u3000大丈夫！？」"
translation = "「리오짱!? 괜찮아!?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「違う、違うんだ……私は……うぅ、あぅぅっ……ああああっ！」"
translation = "「아니야, 아니야…… 나는…… 으으, 아으윽…… 아아아앗!」"

[[dialogue]]
speaker = "unk"
original = "溢れる涙を拭こうと、ベアトリスが少し強くハンカチを押し付ける。"
translation = "넘쳐흐르는 눈물을 닦으려, 베아트리스가 조금 강하게 손수건을 내리누른다."

[[dialogue]]
speaker = "unk"
original = "するとハンカチはあっという間にびしょびしょになってしまった。"
translation = "그러자 손수건은 순식간에 축축하게 젖어버리고 말았다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（私が泣いていた時、君も傷ついていた。私に笑いかけながら、君は闇の中にいた）"
translation = "(내가 울고 있을 때, 너도 상처 입고 있었어. 나에게 미소 지으면서, 너는 어둠 속에 있었어)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（負けず嫌いな私よりもあがいて、もがいて、苦しんでいた）"
translation = "(지기 싫어하는 나보다 더 발버둥 치고, 몸부림치고, 괴로워하고 있었어)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（泣き虫な私よりも、心の中で泣いていた。涙すら枯れ果てるほどに）"
translation = "(울보인 나보다도, 마음속으로 울고 있었어. 눈물조차 다 말라버릴 정도로)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（仲間なら、ジグの涙を拭ってやらなければいけなかった）"
translation = "(동료라면, 지그의 눈물을 닦아줘야만 했어)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（ジグの絶望に気付かなければいけなかったのに──）"
translation = "(지그의 절망을 눈치챘어야 했는데──)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（だけど何もできないまま、ベガは滅びてしまった）"
translation = "(하지만 아무것도 못한 채, 베가는 멸망해버렸어)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（ジグはリクリエの使徒にされ、私はそれすら忘却して、平行世界に漂着した）"
translation = "(지그는 리크리에의 사도가 되었고, 나는 그것조차 망각하고, 평행세계에 표착했어)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（今までジグの苦しみも絶望も知らずにのうのうと生きてきた）"
translation = "(지금까지 지그의 고통도 절망도 모른 채 태평하게 살아왔어)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（でも──）"
translation = "(하지만──)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（私はまだ生きている）"
translation = "(나는 아직 살아있어)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（ジグは今、あそこにいる）"
translation = "(지그는 지금, 저기에 있어)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（まだ私の声は届く。私の手は届く）"
translation = "(아직 내 목소리는 닿아. 내 손은 닿아)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（私の矢は届く。届かせる）"
translation = "(내 화살은 닿아. 닿게 하겠어)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（まだ終わっていない……！）"
translation = "(아직 끝나지 않았어……!)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……もう大丈夫だ。ありがとう、ベアト」"
translation = "「……이제 괜찮다. 고마워, 베아트」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「梨緒ちゃん……」"
translation = "「리오짱……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私がするべきことは、やり直しを願うことじゃない」"
translation = "「내가 해야 할 일은, 다시 시작하기를 바라는 게 아니야」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「あのいけ好かない仮面を叩き割って、すかした表情を歪ませて、絶望の闇から引きずり出すことだ」"
translation = "「저 재수 없는 가면을 때려 부수고, 거만한 표정을 일그러뜨려서, 절망의 어둠 속에서 끌어내는 거다」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ジグはきっと今も待っている──」"
translation = "「지그는 분명 지금도 기다리고 있어──」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「いや、もう待っていないかもしれない。私のことなんてとっくに愛想が尽きて、顔を見るのも嫌かもしれない」"
translation = "「아니, 이제 기다리지 않을지도 몰라. 나 같은 건 진작에 정이 떨어져서, 얼굴을 보는 것조차 싫을지도 모르지」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「それでも私は諦めない。ジグが参ったと言うまで、私の声を届け続けてやる！」"
translation = "「그래도 나는 포기하지 않아. 지그가 항복이라고 말할 때까지, 내 목소리를 계속해서 전해주겠어!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「あはは……言い方が梨緒ちゃんらしいね」"
translation = "「아하하…… 말투가 리오짱답네」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「でも、梨緒ちゃんらしさが戻って良かった」"
translation = "「그래도, 리오짱다움이 돌아와서 다행이야」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「すまない。迷惑をかけた、ベアト」"
translation = "「미안하다. 폐를 끼쳤군, 베아트」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ううん、迷惑じゃないよ。仲間だもん」"
translation = "「으응, 폐 아니야. 동료인걸」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「行こう。ナターシャが待っている」"
translation = "「가자. 나타샤가 기다리고 있어」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「うん！」"
translation = "「응!」"

