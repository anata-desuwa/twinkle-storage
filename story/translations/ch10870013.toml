[[dialogue]]
speaker = "unk"
original = "第３話,不死鳥の覚醒め,P"
translation = "제3화, 불사조의 각성<rt>눈뜸</rt></ruby>, P"

[[dialogue]]
speaker = "ヴァレリー"
original = "「さて、どこから話したものか。差し当たって私の略歴から始めましょうか」"
translation = "「자, 어디서부터 이야기할까. 일단 제 약력부터 시작할까요?」"

[[dialogue]]
speaker = "unk"
original = "そういうのって機密事項じゃないの？"
translation = "그런 건 기밀 사항 아니야?"

[[dialogue]]
speaker = "ヴァレリー"
original = "「いえいえ、何も包み隠すものなどありませんよ。組織はともかく、私のことについてはね」"
translation = "「아뇨아뇨, 아무것도 숨길 건 없답니다. 조직은 어쨌든 저 자신에 대해서는요」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「事前に調べ上げてあなたのことを知っているのと同様に、あなたにも私のことを知っていただきたいのです」"
translation = "「사전에 조사해서 당신에 대해 알고 있는 것과 마찬가지로 당신도 저에 대해 알아주셨으면 해요」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「いわゆる『推しに認知される』というヤツですかね、フフフ」"
translation = "「이른바 『최애에게 인지된다』는 그것일까요, 후후후」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「では、ご静聴ください。私、ヴァレリーが<ruby>覚醒<rt>めざ</rt></ruby>めに至る物語を」"
translation = "「그럼 경청해 주세요. 저, 발레리가 각성<rt>눈뜸</rt></ruby>에 이르는 이야기를」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「私はイギリスにある屋敷で産声をあげました」"
translation = "「저는 영국의 어느 저택에서 첫 울음을 터뜨렸습니다」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「使用人を幾人も抱えた広い屋敷、クリケットができるほどの広い庭。今思えば、非常に裕福な家庭でしたね」"
translation = "「하인을 여럿 거느린 넓은 저택, 크리켓을 할 수 있을 정도의 넓은 정원. 지금 생각하면 매우 유복한 가정이었죠」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「日々の食事に困ったこともありません――などというとキサナに『嫌味か』と怒られてしまうのですが」"
translation = "「하루하루 끼니를 걱정한 적도 없습니다――라고 하면 키사나에게 『비꼬는 거냐』며 화를 낼 테지만요」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「両親からは惜しみない愛情と教育を与えられ、『美しい物は心を豊かにするから』と、美術については特に熱心に教わりました」"
translation = "「부모님께서는 아낌없는 애정과 교육을 주셨고, 『아름다운 것은 마음을 풍요롭게 한다』며 미술에 대해서는 특히 열성적으로 가르치셨습니다」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「世界の名だたる美術館を訪れたのはもちろん、我が家にも多数の美術品がありましてね、寝ても覚めても美しい物に囲まれている環境で育ったのです」"
translation = "「세계 유수의 미술관을 방문한 것은 물론, 저희 집에도 다수의 미술품이 있어서 자나 깨나 아름다운 것에 둘러싸인 환경에서 자랐습니다」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「裕福自慢が鼻につきますかね？\u3000まあ、もう少しお耳汚しにお付き合いください。スッとする瞬間が訪れますから」"
translation = "「유복함 자랑이 거슬리시나요? 뭐, 조금만 더 귀를 더럽히는 데 동참해 주세요. 속이 시원해지는 순간이 올 테니까요」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「美術に囲まれ、美術を愛し、すくすくと育った私に大きな転機が訪れます。とある冬の夜のことです」"
translation = "「미술에 둘러싸여 미술을 사랑하며 무럭무럭 자란 제게 큰 전환점이 찾아옵니다. 어느 겨울밤의 일입니다」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「その冬一番の寒波が訪れたその日、私の住む屋敷は、火災に見舞われました」"
translation = "「그 겨울 최고의 한파가 찾아온 그날, 제가 살던 저택은 화재를 당했습니다」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「暖炉の火が燃え移ったのか、使用人の火の不始末か、はたまた何者かの放火か……数年経った今も、原因は定かではありませんが」"
translation = "「벽난로 불이 옮겨붙은 건지, 하인의 불조심 부족인지, 아니면 누군가의 방화인지…… 수년이 지난 지금도 원인은 확실치 않습니다만」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「私は身を焼くほどの業火に囲まれ、灰色の煙に視界を塞がれ、命の危険に晒されました」"
translation = "「저는 몸을 태울 듯한 업화에 둘러싸여 회색 연기에 시야를 가로막힌 채 목숨의 위험에 처했습니다」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「右も左もわからず、咄嗟に逃げ込んだその先は、数多の美術品を保管していた倉庫でした」"
translation = "「앞뒤 분간도 못 하고 다급히 도망친 그곳은 수많은 미술품을 보관하던 창고였습니다」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「残念ながら、そこにも火の手は回ってました。そんな絶体絶命の窮地に、私は見てしまったのです」"
translation = "「안타깝게도 그곳에도 불길은 번져 있었습니다. 그런 절체절명의 위기 속에서 저는 보고 만 것입니다」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「数百年もの年月、人の手を渡り、時代を紡いできた絵画が燃え朽ちる瞬間を」"
translation = "「수백 년의 세월 동안 사람들의 손을 거치며 시대를 자아온 회화가 불타 썩어가는 순간을」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「白磁の彫刻が折り重なって崩れ、青磁の壺が砕け、豪奢な鎧がひしゃげ、等しく炎の赤に染まる」"
translation = "「백자의 조각이 겹겹이 무너져 내리고, 청자 항아리가 깨지고, 화려한 갑옷이 일그러지며 똑같이 불꽃의 붉은색으로 물드는 것을」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「私や両親が愛した時価総額で数百億はくだらない美術品が、ものの数分で灰塵と化したのです」"
translation = "「저와 부모님이 사랑했던, 시가로 수백 억은 족히 나가는 미술품들이 단 몇 분 만에 잿더미로 변한 것입니다」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「やがて、屋敷までもが骨組みを残すだけの炭となりました……はぁ、はぁっ……あの凄惨な光景は今でも夢に見るんです。夢に見る度……くぅうぅ……！」"
translation = "「이윽고 저택까지도 뼈대만 남은 숯이 되었습니다…… 하아, 하앗…… 그 처참한 광경은 지금도 꿈에 나타나요. 꿈을 꿀 때마다…… 크으으……!」"

[[dialogue]]
speaker = "unk"
original = "辛いなら、それ以上話さなくても……"
translation = "괴롭다면 더 이상 말하지 않아도……"

[[dialogue]]
speaker = "ヴァレリー"
original = "「はぁ……はぁっ……お恥ずかしい限りなのですがね、興奮、してしまうんですよ……！」"
translation = "「하아…… 하앗…… 부끄럽기 짝이 없습니다만, 흥분, 해버리거든요……!」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「事細かに思い出すだけで、劣情を、抑えきれなく……はぁぁぁんっ……<emoji=heart04>\u3000し、失礼……しばしお待ちいただけますか……」"
translation = "「세세하게 떠올리는 것만으로 열정을 억누를 수 없게 되어서…… 하아아앙……<emoji=heart04> 죄, 죄송…… 잠시만 기다려 주시겠어요……」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「はぁっ、はぁ、はぁっ……私の胸の奥に眠っていた本性が目覚めたのは、そういった一件からです」"
translation = "「하앗, 하아, 하앗…… 제 가슴 깊은 곳에 잠들어 있던 본성이 깨어난 건 그런 사건 때문입니다」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「美しい作品が世から永遠に失われ、無惨に壊されていく喪失感……ただ美術品を鑑賞しているだけでは決して得られない仄暗い感動……！」"
translation = "「아름다운 작품이 세상에서 영원히 사라지고 처참하게 부서져 가는 상실감…… 그저 미술품을 감상하는 것만으로는 결코 얻을 수 없는 어두운 감동……!」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「業火に包まれて死にかけましたが、あの日、私は転生したかのような衝撃を覚えたんです……！」"
translation = "「업화에 휩싸여 죽을 뻔했지만, 그날 저는 환생한 것 같은 충격을 받았습니다……!」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「同時に私は能力に<ruby>覚醒<rt>めざ</rt></ruby>め、生存しました。生命を司る力を得たのも、陥った窮地によるものかもしれません」"
translation = "「동시에 저는 능력에 각성<rt>눈뜸</rt></ruby>하여 생존했습니다. 생명을 다스리는 힘을 얻은 것도 처했던 궁지 덕분일지도 모릅니다」"

[[dialogue]]
speaker = "unk"
original = "まるでフェニックスだ……"
translation = "마치 페닉스 같네……"

[[dialogue]]
speaker = "ヴァレリー"
original = "「フフフ、いいですね。幾度滅んでも蘇る……不変の肉体と魂……禁忌の美しさです……！」"
translation = "「후후후, 좋네요. 몇 번을 멸망해도 되살아나는…… 불변의 육체와 영혼…… 금기의 아름다움입니다……!」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「ちなみに屋敷は燃えてしまいましたが、私の家族や使用人たちに人的被害はなく、皆、健在のようです」"
translation = "「참고로 저택은 타버렸지만, 제 가족이나 하인들에게 인명 피해는 없었고 모두 건재한 것 같습니다」"

[[dialogue]]
speaker = "unk"
original = "……不幸中の幸いだったね"
translation = "……불행 중 다행이었네"

[[dialogue]]
speaker = "ヴァレリー"
original = "「それ以後、ほとんど顔を合わせてはいませんがね。拾われる形で組織に加わったものですから」"
translation = "「그 이후로는 거의 얼굴을 마주하지 않았지만요. 거두어지는 형태로 조직에 가담하게 되었으니까요」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「……ええ。あまりにも都合の良いタイミングでの組織への加入です」"
translation = "「……네. 너무나도 형편좋은 타이밍에 조직에 가입한 겁니다」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「屋敷に火を放ったのが、首領である可能性も否めませんが……今ではどうでもいいことです。むしろ、感謝すべきところですね」"
translation = "「저택에 불을 지른 것이 수령일 가능성도 부정할 수 없지만…… 이제 와서 어찌 되든 상관없는 일이죠. 오히려 감사해야 할 부분입니다」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「あのような機会がなければ、私が無上の恍惚を知ることはなかったのですから……<emoji=heart04>」"
translation = "「그런 기회가 없었다면 제가 무상의 황홀을 알 일은 없었을 테니까요……<emoji=heart04>」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「はぁ、はぁっ……己の過去を曝け出すのも、なかなかの快感……これはちょっとした露出プレイですね……はぁん……<emoji=heart04>」"
translation = "「하아, 하앗…… 자신의 과거를 적나라하게 드러내는 것도 상당한 쾌감…… 이건 일종의 노출 플레이군요…… 하앙……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "やっぱり変態だ―っ！！"
translation = "역시 변태다아!!"

[[dialogue]]
speaker = "ヴァレリー"
original = "「褒め言葉、ありがとうございます」"
translation = "「칭찬해 주셔서 감사합니다」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「何と言われようと、どう思われようと、改めるつもりはありません。私を更生させるつもりでしたら、それは愚考というもの」"
translation = "「뭐라고 불리든, 어떻게 생각하든 고칠 생각은 없어요. 저를 갱생시키려 한다면 그건 어리석은 생각입니다」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「あなたが私にこれ以上の恍惚を教えてくれるのであれば、或いは――ですけどね、フフフ」"
translation = "「당신이 제게 이 이상의 황홀을 가르쳐준다면 혹시 모를까―― 말이죠, 후후후」"

