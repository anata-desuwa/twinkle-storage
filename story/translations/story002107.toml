[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「──正体を見せるのデス、謎の者よ！」"
translation = "「──정체를 드러내세-요, 수수께끼의 존재여!」"

[[dialogue]]
speaker = "？？？"
original = "「フフフ……バレては仕方ナイ」"
translation = "「후후후…… 들켰으니 어쩔 수 없지.」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「！？\u3000なんだ、小人──？」"
translation = "「!? 뭐야, 난쟁이──?」"

[[dialogue]]
speaker = "unk"
original = "洞窟の陰から現れたのは、手乗りサイズの小人だった。"
translation = "동굴 그늘에서 나타난 것은 손바닥 사이즈의 난쟁이였다."

[[dialogue]]
speaker = "unk"
original = "白い羽衣を着た銀髪の少女で、幽玄な雰囲気をまとっている。"
translation = "하얀 날개옷을 입은 은발의 소녀로, 유현한 분위기를 두르고 있다."

[[dialogue]]
speaker = "unk"
original = "あの姿は……"
translation = "저 모습은……"

[[dialogue]]
speaker = "unk"
original = "雪女！？"
translation = "설녀!?"

[[dialogue]]
speaker_original = "雪女"
speaker_translation = "설녀"
original = "「──ソウ。いかにもワタシは雪女、冬が連れてきた『冬の化身』なのデース！」"
translation = "「──그-래. 보아하니 나는 설녀, 겨울이 데려온 『겨울의 화신』인 것이-에요!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "（ま、まるで小さいリップルさんのような見た目です……！）"
translation = "(마, 마치 작은 리플 씨 같은 모습이에요……!)"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふ、なんだか小さくて可愛いわね♪」"
translation = "「후후, 왠지 작고 귀엽네♪」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「確かに見た目は可愛いですが……明らかに異質な冷気を放っています！」"
translation = "「확실히 겉모습은 귀엽지만…… 명백히 이질적인 냉기를 내뿜고 있습니다!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「おかしいデース！\u3000ワタシはこのカタをリゾートへ招いた記憶はありまセーン！」"
translation = "「이상해-요! 저는 이 분을 리조트로 초대한 기억이 없습니-다!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「このプライベートビーチは、ワタシの招いたメンバーしか入れないハズですのに……！」"
translation = "「이 프라이빗 비치는 제가 초대한 멤버밖에 들어올 수 없을 텐데……!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「た、確かに──私たちにひっついてきたとかでもないよね……？」"
translation = "「하, 확실히── 우리한테 붙어왔다거나 한 것도 아니지……?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「侵入してきた──ってことかな？」"
translation = "「침입해 왔다──는 걸까?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ほら、隙間風と一緒にさ」"
translation = "「봐봐, 외풍이랑 같이 말이야.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「！\u3000なるほど」"
translation = "「! 그렇군요.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「どういうことだ、セーラ！？」"
translation = "「어떻게 된 거야, 세라!?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「隙間が生じてる──って、ソフィアちゃんが言ってたっしょ？\u3000つまりそこから入ってきたってこと。あの寒い寒い風と一緒にね」"
translation = "「틈새가 생겼다──고 소피아짱이 말했잖아? 즉 거기서 들어왔다는 거. 그 춥고 추운 바람이랑 같이 말이야.」"

[[dialogue]]
speaker_original = "雪女"
speaker_translation = "설녀"
original = "「フフ……いかにも。ワタシは冬の訪れと共にココへやってきたのデス」"
translation = "「후후…… 그렇-다. 나는 겨울의 방문과 함께 이곳에 온 것이-야.」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「トイウことは……海の家のメニューを書き換えたのもアナタなんですね！？」"
translation = "「그-렇다는 건…… 바다의 집 메뉴를 고쳐 쓴 것도 당신이군-요!?」"

[[dialogue]]
speaker_original = "雪女"
speaker_translation = "설녀"
original = "「その通りデス。焼きそばやラムネなんかより、人はカニ鍋のほうが好きにキマってイマース」"
translation = "「그렇습니-다. 야키소바나 라무네 같은 것보다, 사람은 게 전골을 더 좋아하게 마련이에-요.」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ユルしガタい暴言デス……！\u3000そんなのは押し付けるモノではアリマセン！」"
translation = "「용서하기 힘든 폭언이에-요……! 그런 건 강요하는 게 아님니-다!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「察するに──これまでの『冬のイタズラ』もまとめて、雪女ちゃんの影響ってことかな～？」"
translation = "「짐작건대── 지금까지의 『겨울의 장난』들도 전부 설녀짱의 영향이라는 걸까나~?」"

[[dialogue]]
speaker_original = "雪女"
speaker_translation = "설녀"
original = "「フッフッフ……その通りデストモ」"
translation = "「훗훗훗…… 그렇고말고-요.」"

[[dialogue]]
speaker_original = "雪女"
speaker_translation = "설녀"
original = "「この隙間から入ったワタシは、たくさんの冬現象をここで起こシタ……」"
translation = "「이 틈새로 들어온 나는, 수많은 겨울 현상을 여기서 일으켰-다……」"

[[dialogue]]
speaker_original = "雪女"
speaker_translation = "설녀"
original = "「すべては、そう。冬の素晴らしさをより伝えるために！」"
translation = "「모든 것은, 그래. 겨울의 훌륭함을 더 전하기 위해서!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「リ、リップルさんと真逆のことを！？」"
translation = "「리, 리플 씨와 정반대의 일을!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「なるほど、そういうことでしたか──」"
translation = "「과연, 그런 거였습니까──」"

[[dialogue]]
speaker = "unk"
original = "いわばウイルスのように入り込んだ雪女が、これまでの異変を起こしていたのだという。"
translation = "말하자면 바이러스처럼 침입한 설녀가 지금까지의 이변을 일으켰던 것이라고 한다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「──悪の権化め！\u3000この楽園に、冬を持ち込もうなどという暴挙はやめるのです！」"
translation = "「──악의 권화놈! 이 낙원에 겨울을 끌어들이려는 폭거는 그만두세요!」"

[[dialogue]]
speaker_original = "雪女"
speaker_translation = "설녀"
original = "「フフフ……そんなコトを言って、これに抗えるでしょうか？」"
translation = "「후후후…… 그런 소리를 하며 이것에 저항할 수 있을까요?」"

[[dialogue]]
speaker_original = "雪女"
speaker_translation = "설녀"
original = "「それそれ、冬は楽しいデスぞぉ～？」"
translation = "「자자, 겨울은 즐겁다구-요~?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「こ、これは！？」"
translation = "「이, 이것은!?」"

[[dialogue]]
speaker = "unk"
original = "お年玉！"
translation = "세뱃돈!"

[[dialogue]]
speaker = "unk"
original = "プレゼントだ！"
translation = "선물이다!"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「うひょー、大量のお年玉じゃねえか！\u3000やっぱ冬って最高だな！」"
translation = "「우효- 대량의 세뱃돈이잖아! 역시 겨울이 최고구만!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「わあ、プレゼントもたくさんです！\u3000何が入ってるんでしょう──わくわく♪」"
translation = "「와아, 선물도 가득해요! 뭐가 들어있을까요── 두근두근♪」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「くっ──皆さん！\u3000何を懐柔されているんですか！？」"
translation = "「큭── 여러분! 무엇에 회유당하고 계신 건가요!?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「誘惑に負けてはいけません……！\u3000ここはサマーリゾートですよ！？」"
translation = "「유혹에 지면 안 됩니다……! 여기는 서머 리조트라구요!?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "（別に負けてもいいんじゃないか……？）"
translation = "(별로 져도 상관없지 않을까……?)"

[[dialogue]]
speaker = "unk"
original = "雪女はそれからもソリや羽子板といった、魅惑的な冬の風物詩を繰り出してきた。"
translation = "설녀는 그 뒤로도 썰매나 하고이타 같은 매혹적인 겨울의 풍물시를 내놓았다."

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「く……イッタイなにが目的なのデス！」"
translation = "「큭…… 도-대체 목적이 뭐예-요!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ワタシのエンドレスサマーを邪魔するなんて許せません！\u3000冬ナラデハのことがしたいなら、外にいればいいデース！」"
translation = "「제 엔들리스 서머를 방해하다니 용서할 수 없습니-다! 겨울만의 일을 하고 싶다면 밖에 있으면 되잖아-요!」"

[[dialogue]]
speaker_original = "雪女"
speaker_translation = "설녀"
original = "「フフフ……ソレはドウでしょう」"
translation = "「후후후…… 그-건 어떨까-요.」"

[[dialogue]]
speaker_original = "雪女"
speaker_translation = "설녀"
original = "「このリゾート結界に隙間が生じてしまった原因。それは──アナタ自身の中にあるのデスよ、リップル──！」"
translation = "「이 리조트 결계에 틈새가 생긴 원인. 그것은── 당신 자신 안에 있는 것이-에요, 리플──!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「エ……！？」"
translation = "「엣……!?」"

