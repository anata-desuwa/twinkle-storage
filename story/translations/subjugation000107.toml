[[dialogue]]
speaker = "unk"
original = "俺たちが秋葉原に到着すると、会場のビルの周りに人だかりができていた。"
translation = "우리들이 아키하바라에 도착하자, 행사장 건물 주변에 인파가 몰려 있었다."

[[dialogue]]
speaker_original = "ファン"
speaker_translation = "팬"
original = "「新曲のリリイベ楽しみ～。でもちょっと人ヤバくない？」"
translation = "「신곡 리리스 이벤트 기대된다~. 근데 사람 너무 많은 거 아냐?」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「おお、人がたくさん……賑わいがあるのはいいことです」"
translation = "「오오, 사람이 많군요…… 활기찬 건 좋은 일입니다.」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「それどころではないぞ。下手をすれば怪我どころでは済まない」"
translation = "「그럴 때가 아니다. 까딱하면 부상 정도로 끝나지 않을 거야.」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「どうしてこんなに人が？\u3000まだ売り出し中だから先着順でも大丈夫って話だったけど……」"
translation = "「어째서 이렇게 사람이 많지? 아직 인지도를 쌓는 중이라 선착순이어도 괜찮다는 이야기였는데……」"

[[dialogue]]
speaker_original = "ファン"
speaker_translation = "팬"
original = "「会場限定版のＣＤとブロマイドのセット、ちゃんと数あんのかなー。ランダムでサイン入り封入とか、当たり狙うしかないっしょ」"
translation = "「행사장 한정판 CD랑 브로마이드 세트, 수량은 제대로 있는 건가. 랜덤으로 사인 들어있는 거 당첨 노릴 수밖에 없지.」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「それかー！」"
translation = "「그거였나!」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「どういうことです……？」"
translation = "「무슨 뜻인가요……?」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「アイドルには興味がなくて、希少なグッズを入手して、後で高額で売る目的の人がいるんです」"
translation = "「아이돌에게는 관심이 없고, 희귀 굿즈를 구해서 나중에 비싸게 팔려는 목적을 가진 사람들이 있는 거예요.」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「お金になりそうなものには何でも手を出してくるからなぁ……後でプレミア付くかもって期待もあるのかも」"
translation = "「돈이 될 만한 거라면 뭐든 달려드니까요…… 나중에 프리미엄이 붙을지도 모른다는 기대도 있겠죠.」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「聞いたことがある。テンバ・イヤーというやつだな」"
translation = "「들어본 적 있다. 텐바이어라는 녀석들이군.」"

[[dialogue]]
speaker = "unk"
original = "だいたい合ってます"
translation = "대체로 맞아요."

[[dialogue]]
speaker_original = "ファン？"
speaker_translation = "팬?"
original = "「早く整理券配れー！\u3000こちとら客だぞ！」"
translation = "「빨리 번호표 나눠줘! 여기 손님이라고!」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「うーん、確かに整理券配らないといけないんだけど、このままじゃ転売目的の人にも渡っちゃうし……」"
translation = "「으음, 확실히 번호표를 나눠줘야 하는데, 이대로는 전매 목적의 사람들에게도 넘어가 버리고……」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「つまり、本当のファンかどうか見分けたいということでしょうか」"
translation = "「즉, 진짜 팬인지 아닌지 가려내고 싶다는 말씀이시군요.」"

[[dialogue]]
speaker = "unk"
original = "じゃあこういうのはどうでしょう？"
translation = "그럼 이런 건 어떨까요?"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「……ふむ……ふむ。なるほど。そういうことか」"
translation = "「……흠…… 흠. 그렇군. 그런 건가.」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「うん、それでやってみようか。イベント会社の人とも話してみるね」"
translation = "「응, 그걸로 해보자. 이벤트 회사 사람하고도 이야기해 볼게.」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「整理券配布を開始しますので、列に並んでお待ちくださーい！」"
translation = "「번호표 배포를 시작할 테니, 줄을 서서 기다려 주세─요!」"

[[dialogue]]
speaker = "unk"
original = "列の整理が始まると、イベントに参加できないと不安がった人たちからざわめきが上がる。"
translation = "줄 정리가 시작되자, 이벤트에 참가하지 못할까 봐 불안해하는 사람들 사이에서 웅성거림이 일어났다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「みなさ～ん、落ち着いてくださーい。列を形成しているところですので、少々お待ちくださいね」"
translation = "「여러분~, 진정하세요. 줄을 세우는 중이니 잠시만 기다려 주세요.」"

[[dialogue]]
speaker_original = "ファン"
speaker_translation = "팬"
original = "「そんなこと言われてもー、ホントに整理券あんの？」"
translation = "「그런 말을 해도, 진짜 번호표 있는 거야?」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「お気持ちは理解いたします。ですが会場スペースが限られており、安全のために制限せざるを得ないのです」"
translation = "「그 마음은 이해합니다. 하지만 회장 공간이 한정되어 있어, 안전을 위해 제한할 수밖에 없는 상황입니다.」"

[[dialogue]]
speaker_original = "ファン"
speaker_translation = "팬"
original = "「わかってるけどさぁ、最初から申し込みにするとか、もうちょっと何とかならなかったの？」"
translation = "「알고는 있지만, 처음부터 신청제로 하든가 뭔가 대책이 있었어야지!」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ご指摘仰る通りです。今回はこのような混雑を想定しておらず、ご迷惑をおかけしてしまいました」"
translation = "「지적하신 말씀이 맞습니다. 이번에는 이 정도 혼잡을 예상하지 못해 폐를 끼쳐 드렸습니다.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「我々の不手際です。大変申し訳ありません」"
translation = "「저희의 불찰입니다. 대단히 죄송합니다.」"

[[dialogue]]
speaker_original = "ファン"
speaker_translation = "팬"
original = "「う……そんなに頭下げられると文句言えないじゃん……」"
translation = "「으…… 그렇게 고개를 숙이면 뭐라 할 수가 없잖아……」"

[[dialogue]]
speaker = "unk"
original = "不満げなファンの女の子だったが、マグダレナさんの柔らかな雰囲気が態度を和らげているようだ。"
translation = "불만 가득하던 팬 소녀였지만, 마그달레나 씨의 부드러운 분위기가 태도를 누그러뜨린 듯했다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ところで、今日、出演予定のアイドルグループのメンバーのお名前はご存じでしょうか？」"
translation = "「그런데, 오늘 출연 예정인 아이돌 그룹의 멤버 이름은 알고 계신가요?」"

[[dialogue]]
speaker_original = "ファン"
speaker_translation = "팬"
original = "「そんなの知ってるに決まってるじゃん！\u3000あたしクレミちゃん推し！」"
translation = "「그거야 당연히 알지! 난 쿠레미 쨩 오시야!」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「お答えありがとうございます。整理券をどうぞ。入場時間になりましたら、こちらをお持ちください」"
translation = "「답변 감사합니다. 번호표 받으세요. 입장 시간이 되면 이것을 지참해 주세요.」"

[[dialogue]]
speaker_original = "ファン"
speaker_translation = "팬"
original = "「あ、今のってそういう……？\u3000さっきはきついこと言ってごめんなさい。初めてのイベントだったんで……」"
translation = "「아, 방금 그게 그런 거였어……? 아까 심한 말 해서 미안해요. 첫 이벤트라 예민해서……」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「いえいえ。こちらこそすみませんでした。イベントお楽しみくださいね」"
translation = "「아뇨 아뇨. 저희야말로 죄송했습니다. 이벤트 즐겁게 즐기세요.」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「メンバーの名前を答えて──」"
translation = "「멤버의 이름을 대보──」"

[[dialogue]]
speaker_original = "ファン？"
speaker_translation = "팬?"
original = "（そんなのさっきＤＩＳＣで調べてから楽勝だっての。チョロいぜ）"
translation = "(그런 건 아까 DISC로 검색해 봐서 낙승이지. 쉽구먼.)"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「もらおうかと思ったが、質問を変えよう。今日発売の新曲のタイトルは？」"
translation = "「──려고 했으나, 질문을 바꾸지. 오늘 발매되는 신곡의 타이틀은?」"

[[dialogue]]
speaker_original = "ファン？"
speaker_translation = "팬?"
original = "「えっ？」"
translation = "「엣?」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「どうした？\u3000アイドルのファンなのだから答えられるだろう？\u3000正確でなくてもだいたい合っていれば構わないぞ」"
translation = "「왜 그러지? 아이돌의 팬이라면 대답할 수 있겠지? 정확하지 않아도 대략 맞으면 상관없다.」"

[[dialogue]]
speaker_original = "ファン？"
speaker_translation = "팬?"
original = "「思い出すのでちょっと待ってくださいって。ええっと……」"
translation = "「생각해 낼 테니까 잠깐만 기다려 봐요. 그러니까……」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「残念、時間切れだ。正解は『ドキドキ☆ワルプルギス\u3000恋の呪い<emoji=heart04>』だ」"
translation = "「유감, 시간 초과다. 정답은 『두근두근☆발푸르기스 사랑의 저주♥』다.」"

[[dialogue]]
speaker_original = "ファン？"
speaker_translation = "팬?"
original = "「何だその怪しすぎる曲名！？」"
translation = "「뭐야 그 수상하기 짝이 없는 곡 제목은!?」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「そういうアイドルなのだ。我も驚いたが。──とはいえ、イベントに並ぶなら知らぬ方がおかしいと思うが」"
translation = "「그런 아이돌인 거다. 와가도 놀랐지만. ──그나저나, 이벤트에 줄을 서면서 모르는 게 더 이상하다고 생각한다만.」"

[[dialogue]]
speaker_original = "ファン？"
speaker_translation = "팬?"
original = "「まさか答えられなかったから整理券を配らないってわけじゃないだろうな！？\u3000聞いてないぞ！」"
translation = "「설마 대답 못 했다고 번호표 안 주는 건 아니겠지!? 그런 소린 못 들었다고!」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「いや？\u3000整理券は配るが」"
translation = "「아니? 번호표는 주겠다만.」"

[[dialogue]]
speaker_original = "ファン？"
speaker_translation = "팬?"
original = "「ならいいんだよ──って、２００３番！？\u3000番号めちゃくちゃ後じゃないか！\u3000これじゃ限定グッズ買えないだろ！\u3000詐欺だ詐欺だ！」"
translation = "「그럼 됐어── 뭐야, 2003번!? 번호가 왜 이렇게 뒤야! 이러면 한정 굿즈 못 사잖아! 사기야 사기!」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「詐欺？\u3000告知サイトには、混雑の場合は整理券を発行すると書いてある。何も虚偽はない」"
translation = "「사기? 공지 사이트에는 혼잡할 경우 번호표를 발행한다고 적혀 있다. 허위 사실은 없지.」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「文句があるなら好きにぶちまけるがいい。だがこちらも抗弁の用意はある」"
translation = "「불만이 있다면 마음대로 떠들어라. 하지만 우리도 항변할 준비는 되어 있다.」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「お前のような者が紛れ込んでいるから必要な措置だと肝に銘じておくがいい」"
translation = "「너 같은 자들이 섞여 있기 때문에 필요한 조치였다는 걸 명심하도록 해라.」"

[[dialogue]]
speaker_original = "ファン？"
speaker_translation = "팬?"
original = "「くっ……！\u3000こんなアイドルグループ解散しちまえ！」"
translation = "「큭……! 이런 아이돌 그룹 해체나 해버려라!」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "（毅然とした対応はアルモタヘルさんの方が向いているみたいだね）"
translation = "(의연한 대응은 아르모타헬 씨가 더 적합한 것 같네.)"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「みなさーん、整理券はまだありますからね。押さないでくださいね～」"
translation = "「여러분─, 번호표는 아직 있으니까요. 밀지 말아 주세요~.」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「質問は思ったより有効のようだな。ファンとやらでないのが反応でわかるぞ」"
translation = "「질문은 생각보다 유효한 모양이군. 팬인지 아닌지가 반응에서 딱 보이는구나.」"

[[dialogue]]
speaker = "unk"
original = "しばらくすると人波がはけていって──"
translation = "잠시 후 인파가 빠져나갔고──"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「ようやく混雑がなくなったか。通りがすっきりしたな」"
translation = "「드디어 혼잡이 사라졌나. 거리가 탁 트였군.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「怪我をされた方もなく、無事に進行できましたね。本当に良かったです」"
translation = "「부상당한 분도 없이 무사히 진행되었네요. 정말 다행이에요.」"

[[dialogue]]
speaker = "unk"
original = "お疲れ様でした"
translation = "고생하셨습니다."

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「皆さんありがとうございました。おかげでお客さんと秋葉原が守られました」"
translation = "「여러분 감사합니다. 덕분에 손님들과 아키하바라를 지킬 수 있었어요.」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「会長さんもアイディアありがとね♪」"
translation = "「회장님도 아이디어 고마워요♪」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「今日は我ながらよく働いた。これはケバブを５０人前──いや１００人前食さねば足りるまい」"
translation = "「오늘은 나름대로 열심히 일했다. 이건 케밥을 50인분── 아니 100인분은 먹지 않으면 수지타산이 맞지 않겠어.」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「でも開場時間になったらまた整理よろしくお願いしますね」"
translation = "「하지만 개장 시간이 되면 다시 정리 부탁드릴게요.」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「何……！？」"
translation = "「뭐……!?」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「あ、想像しただけで腹が空く……ダメだ、意識が──」"
translation = "「아, 상상만으로 배가 고파진다…… 안 돼, 의식이──」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「アルモタヘル！？\u3000アルモタヘルーーーッ！？」"
translation = "「아르모타헬!? 알무타헤에에엘──!?」"

[[dialogue]]
speaker = "unk"
original = "その後、なんやかんやありつつもみんなで頑張って──"
translation = "그 후, 이런저런 일이 있었지만 다 함께 열심히 노력해서──"

[[dialogue]]
speaker = "unk"
original = "なんとか無事にイベントは幕を閉じたのだった。"
translation = "어떻게든 무사히 이벤트는 막을 내렸다."

