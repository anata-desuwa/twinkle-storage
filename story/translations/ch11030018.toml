[[dialogue]]
speaker = "ロクサーナ"
original = "「う～～む……違う、違う、違うッ！」"
translation = "「으음…… 아냐, 아냐, 아냐!」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「愛とはこんなぬるい感情ではないはずだ！\u3000もっと情熱的にっ……求め合いっ……ぐぬぬぅ！」"
translation = "「사랑이란 이런 미지근한 감정이 아닐 거다! 좀 더 정열적으로…… 서로를 원하며…… 으으으!」"

[[dialogue]]
speaker = "unk"
original = "机に向かっているロクサーナは、頭を掻きむしりながら、脚本執筆に情熱を燃やし、脳細胞を酷使していた。"
translation = "책상에 앉아 있는 록사나는, 머리를 벅벅 긁으며, 각본 집필에 정열을 불태우고 뇌세포를 혹사하고 있었다."

[[dialogue]]
speaker = "クロト"
original = "「行き詰まってるなら、軽く息抜きでもしたら？\u3000俺で良ければ付き合うけど」"
translation = "「막히고 있다면, 가볍게 기분 전환이라도 할래? 나라도 괜찮다면 같이 가줄게」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「息抜きか、良い提案だ。よし、会長。ちょっとペニスを貸せ」"
translation = "「기분 전환인가, 좋은 제안이군. 좋아, 회장. 잠깐 페니스 좀 빌려다오」"

[[dialogue]]
speaker = "クロト"
original = "「……はい？」"
translation = "「……네?」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「実体験は何よりの資料となる。だが、舞台はここではない。私たちの初めての性行為は──」"
translation = "「실체험은 그 무엇보다 좋은 자료가 된다. 하지만, 무대는 여기가 아니야. 우리의 첫 성행위는──」"

[[dialogue]]
speaker = "unk"
original = "反論の隙もないまま、ロクサーナに手を引かれ、俺が連れていかれたその先は……"
translation = "반론할 틈도 없이, 록사나에게 손을 이끌려, 내가 끌려간 그곳은……"

[[dialogue]]
speaker = "ロクサーナ"
original = "「ここだ！」"
translation = "「여기다!」"

[[dialogue]]
speaker = "クロト"
original = "「罰当たり～～～っ！」"
translation = "「벌받을 짓이야~~~!」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「今悩んでいたのは『貞淑なシスターが欲望に負け、仕える神の御前でありながら淫らな快楽にその身を堕とす』というシーンでな。男はそういうのが好きなのだろう？」"
translation = "「지금 고민하던 건 『정숙한 시스터가 욕망에 굴복해, 모시는 신의 앞인데도 음란한 쾌락에 그 몸을 타락시킨다』라는 장면이거든. 남자는 그런 걸 좋아하겠지?」"

[[dialogue]]
speaker = "クロト"
original = "「……大好きです」"
translation = "「……아주 좋아합니다」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「この場合、女が積極的な方が、より背徳感が増すな……よし、会長。ペニスを出して、仰向けに転がれ」"
translation = "「이 경우, 여자가 적극적인 편이, 더 배덕감이 넘치겠어…… 좋아, 회장. 페니스를 꺼내고, 하늘을 보고 누워라」"

[[dialogue]]
speaker = "unk"
original = "ロクサーナに言われるがまま、下半身を丸出しにして祭壇の前で寝転がる。"
translation = "록사나가 시키는 대로, 하반신을 다 드러내고 제단 앞에서 드러눕는다."

[[dialogue]]
speaker = "ロクサーナ"
original = "「ふむ、ペニスの先端の割れ目から透明な汁が出ている。これが俗にいう我慢汁というやつだな？」"
translation = "「흠, 페니스 끝 갈라진 틈에서 투명한 즙이 나오고 있군. 이게 흔히 말하는 쿠퍼액이라는 놈인가?」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「あくまで知識では知っているが、現物を見るのは初めてだ。おお……まるで、小便のようにとめどなく溢れている」"
translation = "「어디까지나 지식으로만 알고 있었지만, 실물을 보는 건 처음이다. 오오…… 마치, 소변처럼 쉼 없이 흘러넘치고 있어」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「う～む……ペニスという学術的な呼称は、若干興が冷めるな。陰茎……イチモツ……様々な呼称があるが、どれがお前好みだ？」"
translation = "「으~음…… 페니스라는 학술적인 호칭은, 약간 흥이 깨지는군. 음경…… 거시기…… 다양한 호칭이 있다만, 어느 쪽이 네 취향이지?」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「──ち○ぽ？\u3000男性器をち○ぽと呼ばれるのがいいのか。ち○ぽ……ち○ぽ……ふむ」"
translation = "「──자지? 남성기를 자지라고 부르는 게 좋은 건가. 자지…… 자지…… 흠.」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「なるほど、私がち○ぽと口にする度、面白いくらいに反応しているな、くっくっく<emoji=heart04>」"
translation = "「과연, 내가 자지라고 입에 담을 때마다 재미있을 정도로 반응하는군, 큭큭큭<emoji=heart04>」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「ち○ぽは上下に摩擦されることにより、性的快感が得られる。その快感が限界に達した時、射精がおこなわれる。私の知識に間違いはないな？」"
translation = "「자지는 위아래로 마찰됨으로써 성적 쾌감을 얻지. 그 쾌감이 한계에 달했을 때, 사정이 이루어진다. 내 지식에 틀림은 없나?」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「ち○ぽの下にぶら下がっているのが睾丸……品性に欠ける呼び方をすれば、キンタマ、だったか？」"
translation = "「자지 아래에 매달려 있는 것이 고환…… 품위가 떨어지는 표현을 빌리자면, 불알이었던가?」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「この中で精子が作られ、蓄えられているのだな。どのようにち○ぽから飛び出て、射精に至るのか、実に興味深い」"
translation = "「이 안에서 정자가 만들어져 비축되는 것이군. 어떻게 자지에서 튀어나와 사정에 이르는 것인지, 실로 흥미롭다.」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「随分と過剰な反応を示しているが……ろくに触れてもいないのに、今にも果ててしまいそうな顔だな」"
translation = "「제법 과한 반응을 보이고 있다만…… 제대로 만지지도 않았는데 금방이라도 가버릴 것 같은 얼굴이구나.」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「早漏にも程があるが、まあ、初めての性行為ならば、異常な興奮を示すのも致し方なしか。かく言う私も、いつになく膣が濡れているからな」"
translation = "「조루에도 정도가 있다만, 뭐, 첫 성행위라면 이상 흥분을 보이는 것도 어쩔 수 없는 일인가. 나 역시 평소와 다르게 질이 젖어 있으니 말이다.」"

[[dialogue]]
speaker = "クロト"
original = "「ロクサーナも興奮してるの……！？」"
translation = "「록사나도 흥분하고 있는 거야……!?」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「ふん、喜ぶな、凡骨め。性行為を前にし、膣が潤うのはち○ぽを受け入れるための生理現象に過ぎん」"
translation = "「흥, 기뻐하지 마라, 범골 놈아. 성행위를 앞두고 질이 젖는 것은 자지를 받아들이기 위한 생리 현상에 불과하다.」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「どれ、愛液をち○ぽに塗りたくってやる。お前のち○ぽは私の膣口に対して、大きく見えるからな。膣内への挿入はスムーズに行われるに越したことはない」"
translation = "「어디, 애액을 자지에 듬뿍 발라 주마. 네 자지는 내 질구에 비해 크게 보이니까 말이야. 질 내부로의 삽입은 부드러운 편이 좋겠지.」"

[[dialogue]]
speaker = "unk"
original = "互いに体液を滴らせるロクサーナと俺の性器とが触れ合う。"
translation = "서로의 체액을 흘리는 록사나와 나의 성기가 맞닿는다."

[[dialogue]]
speaker = "ロクサーナ"
original = "「んっ……！？\u3000なんだ、ち○ぽというのは、こんなにも熱いものなのか……？\u3000お前、熱があるんじゃないだろうな？」"
translation = "「응……!? 뭐야, 자지라는 건 이렇게나 뜨거운 것인가……? 너, 열이라도 있는 건 아니겠지?」"

[[dialogue]]
speaker = "クロト"
original = "「勃起して、血が巡ってると体温よりずっと熱くなるんだよ……」"
translation = "「발기해서 피가 도니까 체온보다 훨씬 뜨거워지는 거야……」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「ふむ、そういうものか。やはり体験してみなければわからぬものだな……んっ、んぅ……」"
translation = "「흠, 그런 것인가. 역시 체험해 보지 않으면 모르는 법이구나…… 응, 으응……」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「ち○ぽと膣が触れ合っている……こうやって……んぅ、んっ……挿入せずに性器を擦り合わせるのは、素股というのだったな」"
translation = "「자지와 질이 맞닿아 있어…… 이렇게…… 으응, 응…… 삽입하지 않고 성기를 비비는 것을 스마타라고 했었지.」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「んっ、んぁっ……上に乗って、体を動かすというのは、なかなかに重労働だな……引きこもりの脚本家の身にはなかなか堪える……」"
translation = "「응, 으아…… 위에 올라타 몸을 움직이는 건 꽤나 중노동이군…… 히키코모리 각본가 몸에는 꽤나 버거워……」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「だが、ぴりぴりと電気のような刺激が、股間から全身に巡るな……これは性的な快感か……」"
translation = "「하지만 찌릿찌릿 전기 같은 자극이 가랑이에서 온몸으로 퍼지는군…… 이것이 성적인 쾌감인가……」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「ち○ぽはどくどくと心臓のように脈打っている……くっくっ、愉快な反応だ……ん？\u3000呆けた顔をして、どうした、会長」"
translation = "「자지가 두근두근 심장처럼 맥동하고 있어…… 큭큭, 유쾌한 반응이다…… 응? 멍청한 표정을 짓고 왜 그러지, 회장.」"

[[dialogue]]
speaker = "クロト"
original = "「はっ、はぁ……早く、ロクサーナの中に、入りたい……！」"
translation = "「하아, 하아…… 빨리, 록사나의 안에, 들어가고 싶어……!」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「まったく、雌のような切ない声を漏らすな。物欲しそうな顔するんじゃない」"
translation = "「정말이지, 암컷 같은 애절한 소리를 내지 마라. 탐욕스러운 얼굴 하지 말고.」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「より一層、焦らしたくなってしまうだろうが……まったく、堪え性のない男だ……では、そろそろ膣に──いや、膣という呼称も、いささか興が削がれるな」"
translation = "「더욱 애태우고 싶어지게 만들지 마라…… 정말이지 참을성 없는 남자군…… 그럼 슬슬 질에── 아니, 질이라는 호칭도 조금 흥이 깨지는군.」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「男は、女性器をま○こなどというと興奮を掻き立てられるのだったか？」"
translation = "「남자는 여성기를 보지라고 부르면 흥분이 고조된다고 했었나?」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「くっくっく、まったくお前のち○ぽは正直だな。そんなにも私のま○ことの接触を欲しているか。では、そろそろ入れるとしよう……」"
translation = "「큭큭큭, 정말이지 네 자지는 정직하구나. 그렇게나 내 보지와의 접촉을 원하느냐. 그럼 이제 넣어 보기로 하지……」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「んっ……やはり、お前のち○ぽは大きすぎるだろう……男性器は、女性器の中に入るようにできているはずだが、本当に入るのか……？」"
translation = "「응…… 역시 네 자지는 너무 크지 않나…… 남성기는 여성기 안에 들어가게 되어 있을 텐데, 정말 들어가는 건가……?」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「ここに、合わせて……んぅっ！\u3000ここか……ま○ことち○ぽが触れたな、このまま、体重を、かければっ……！」"
translation = "「여기에 맞춰서…… 으응! 여기인가…… 보지와 자지가 닿았군, 이대로 체중을 실으면……!」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「ん、ぅぐっ……！\u3000うっ、んぅおっ、ま○こが、こじ開けられるっ……！\u3000まるで、肉でできた杭だな……ちょっとした拷問だぞ、これは──！」"
translation = "「음, 으윽……! 윽, 으응, 보지가 억지로 벌려져……! 마치 고기로 만든 말뚝이군…… 이건 조금 고문 수준이다──!」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「ぅお、広げられ、てっ……んぅうぅぐっ！\u3000はっ、あっ、んぅぁあぁああぁっ……！」"
translation = "「으오, 벌려져서…… 으으으윽! 하앗, 아앗, 응, 으아아아아아앗……!」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「はぁ、あっ、んぁ、あぁあぁぁ……！\u3000は、入った……ち○ぽ、入ったぞっ……！」"
translation = "「하아, 앗, 응, 아아아아아……! 드, 들어갔다…… 자지, 들어갔다고……!」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「んぐぅうぅっ……んぅっ、はぁーっ、はぁーっ……！\u3000私の中に、お前がいる……ち○ぽというのは、とんでもない存在感だな……！」"
translation = "「으구우읏…… 응, 하아, 하아……! 내 안에 네가 있어…… 자지라는 건 엄청난 존재감이구나……!」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「自分でも触れたことのない奥の奥に、ち○ぽが突き刺さっている……これは本当に未体験の感覚だ……！」"
translation = "「스스로도 만져본 적 없는 안쪽 깊숙한 곳에 자지가 꽂혀 있어…… 이건 정말 미체험의 감각이다……!」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「膣口を大きく広げられていて、圧迫感を覚えるが……想像よりは痛く、ないな……私の癒しの力が為せる業かしれん」"
translation = "「질구가 크게 벌려져서 압박감이 느껴지지만…… 상상보다는 아프지 않군…… 내 치유의 힘 덕분일지도 모르겠어.」"

[[dialogue]]
speaker = "クロト"
original = "「っ……ロクサーナの中、気持ち良すぎて…………気を抜いたら、すぐ出そうだ……」"
translation = "「윽…… 록사나의 안, 너무 기분 좋아서………… 정신 놓으면 바로 나올 것 같아……」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「はっ……まだ入れたばかりなのにか？\u3000私はまだ性行為の快感を得られてないぞ」"
translation = "「하앗…… 이제 막 넣었을 뿐인데 말이냐? 나는 아직 성행위의 쾌감을 얻지 못했다고.」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「積み上げたもの全てを台無しにしても構わぬとすら思えるほどの悦楽……こんなものではあるまい……」"
translation = "「쌓아 올린 모든 것을 망쳐도 상관없다고 느껴질 정도의 열락…… 이 정도는 아닐 터……」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「さて、動くぞ？\u3000可愛らしく喘いでみせろ」"
translation = "「자, 움직인다? 사랑스럽게 신음해 보렴.」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「んぅ、あっ……はぁ……<ruby>膣内<rt>なか</rt></ruby>で擦れると、ち○ぽは更に硬くなるのだな……」"
translation = "「으응, 앗…… 하아…… 질 안에서 비벼지니 자지가 더욱 딱딱해지는구나……」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「奥にち○ぽの先が届く度、体に電気が流れ……んぅ、んふぅ、おっ……ち○ぽで、内側から、声が、押し出されるっ……んぉおぉっ<emoji=heart04>」"
translation = "「안쪽 깊이 자지 끝이 닿을 때마다 몸에 전기가 흐르고…… 응, 으응, 훗…… 자지 때문에 안쪽에서 목소리가 밀려 나와…… 응오오옷<emoji=heart04>」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「なる、ほどなっ……これもまた未体験の感覚だ……なかなかに興味深いっ……んっ、んぅ、ふっ、んぉぅ<emoji=heart04>」"
translation = "「과연 그렇군…… 이것 또한 미체험의 감각이다…… 꽤나 흥미롭군…… 응, 으응, 훗, 응오옷<emoji=heart04>」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「私と離れないよう、手を繋げっ……んぅ、そう、これは手綱だ……お前という暴れ馬、乗りこなしてみせる」"
translation = "「나와 떨어지지 않게 손을 잡아라…… 응, 그래, 이건 고삐다…… 너라는 야생마, 길들여 주마.」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「くっくっ、もっと、動きたいんだな……？\u3000容赦なく、私の処女を貪りたいのだな……ち○ぽが私のま○こもお前を求めているのがわかるぞ」"
translation = "「큭큭, 더 움직이고 싶은 모양이군……? 가차 없이 내 처녀를 탐하고 싶은 거겠지…… 자지가 내 보지도 너를 원하고 있다는 걸 알려주는군.」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「だが、私が上に乗っているからな、自分のリズムでは動けなかろう。ち○ぽを焦らされているお前の顔……実に可愛らしい」"
translation = "「하지만 내가 위에 타고 있으니까 말이야, 네 리듬으로는 움직일 수 없겠지. 자지 때문에 안달 난 네 얼굴…… 실로 사랑스럽구나.」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「お互い初めてなんだ、一度きりの童貞と処女喪失、ゆっくり愉しもうじゃないか……」"
translation = "「서로 처음이잖아, 단 한 번뿐인 동정과 처녀 상실, 천천히 즐기자고……」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「上になって動くというのは、なかなかに難しい……んっ、あっ……んぉ……はっ、おぉん……」"
translation = "「위에 올라와 움직이는 건 꽤 어렵군…… 응, 앗…… 응오…… 하아, 오오응……」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「腰の角度を変えると、当たる場所が変わるのだな……なんとも、んぉっ、興味、深いっ……<emoji=heart04>」"
translation = "「허리 각도를 바꾸면 닿는 곳이 변하는구나…… 정말이지, 응옷, 흥미롭군……<emoji=heart04>」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「快感を得られる部分を探るというのは……なんとも……んぉっ？<emoji=heart04>」"
translation = "「쾌감을 얻을 수 있는 부분을 찾는다는 건…… 정말이지…… 응옷?<emoji=heart04>」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「なんだ、今の感覚は……？\u3000恥骨の下ら辺を、ち○ぽでごりごり擦ると、んぅっ<emoji=heart04>\u3000排尿を、促されるような……んぅ、おっ……んぉほっ……ほぉんっ<emoji=heart04>」"
translation = "「뭐지, 방금 그 감각은……? 치골 아랫부분을 자지로 고드득 비비니까, 으응<emoji=heart04> 배뇨를 재촉받는 것 같은…… 응, 오오옷…… 응오홋…… 호오옹<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「Ｇスポットってやつ……？」"
translation = "「G스팟이라는 거야……?」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「じーすぽっと……？\u3000なんだそれは、知らん言葉だ……自分の体だというのに知らん場所があるとはっ……んぅうぅぅっ<emoji=heart04>」"
translation = "「지 스팟……? 뭐야 그건, 모르는 단어다…… 내 몸인데도 모르는 장소가 있다니…… 으응으으읏<emoji=heart04>」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「はぁっ、はぁーっ、はぁーっ……なんでだ……繋がっていると、不思議なことに、お前のことが愛しく思えてくる……<emoji=heart04>\u3000んぁ、おぅ、んぉぉんっ……」"
translation = "「하아, 하아, 하아…… 어째서지…… 이어져 있으니 신기하게도 네가 사랑스럽게 느껴져……<emoji=heart04> 응, 아오, 응오오옹……」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「んっ……おい、目の前で、女が唇を差し出しているのだぞ。いくら鈍いお前でも、するべきことに気づけ……んぅ<emoji=heart04>」"
translation = "「응…… 야, 눈앞에서 여자가 입술을 내밀고 있다고. 아무리 둔한 너라도 해야 할 일을 깨달아라…… 응<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "キスのおねだりをしてくるロクサーナの唇に、舞台上の演技ではなく、本物のキスを添えた。"
translation = "키스를 조르는 록사나의 입술에, 무대 위의 연기가 아닌 진짜 키스를 남겼다."

[[dialogue]]
speaker = "ロクサーナ"
original = "「んぅ、ちゅっ……ふふ、上出来だ……んぅ、ちゅ……ちゅぱ、ちゅっ……ちゅぷっ」"
translation = "「응, 쪽…… 후후, 잘했다…… 응, 쪽…… 츄파, 쪽…… 츄웁」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「んぅぶっ……ちゅぴ、ちゅぷっ……れろっ……んぅ……れぇろ、れろっ、れろぉん……<emoji=heart04>」"
translation = "「응으읍…… 츄피, 츄웁…… 레로…… 응…… 레에로, 레로, 레로오옹……<emoji=heart04>」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「お前と私の唾液が混ざり合っていぅ……んれろっ、ちゅば……なんとも、淫猥な接吻だ……これは舞台の上ではやれんな……ちゅばっ……<emoji=heart04>」"
translation = "「너와 나의 타액이 뒤섞이고 있어…… 응 레로, 츄바…… 정말이지 음란한 입맞춤이다…… 이건 무대 위에서는 못 하겠어…… 츄바앗……<emoji=heart04>」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「ちゅるっ……ちゅばっ、んぅ……ぢゅる、んはぁ……ふふ、キスを交わしてるだけでち○ぽが反応している」"
translation = "「츄릅…… 츄바앗, 응…… 쥬르, 하아…… 후후, 키스를 나누는 것만으로 자지가 반응하고 있어.」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「私の唾液は、そんなにも官能的か……？\u3000望むなら、いくらでもくれてやる……んぁぁ……<emoji=heart04>」"
translation = "「내 타액이 그렇게나 관능적이냐……? 원한다면 얼마든지 주마…… 응아아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "半開きになったロクサーナの口から垂らされる唾液は、まるで甘い媚薬だ。飲み下す度、勃起はいきり立ち、頭が呆けてしまう。"
translation = "반쯤 벌어진 록사나의 입에서 흘러나오는 침은 마치 달콤한 미약 같다. 삼킬 때마다 발기는 더욱 거세지고 머릿속이 멍해진다."

[[dialogue]]
speaker = "ロクサーナ"
original = "「んぉ、おっ……<emoji=heart04>\u3000お前のち○ぽはどこまで大きくなるんだ……私のま○こが、お前のち○ぽに作り変えられてしまいそうだぞ」"
translation = "「응오, 오옷……<emoji=heart04> 네 자지는 어디까지 커지는 거냐…… 내 보지가 네 자지 모양으로 변해버릴 것 같아.」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「だが、私の腰使いだけでは物足りないとでも言いたそうな顔だな。いいぞ、下から突き上げろ。互いに快楽を貪り合うのが、セックスの醍醐味なのだろう？」"
translation = "「하지만 내 허리놀림만으로는 부족하다는 듯한 얼굴이군. 좋다, 밑에서 쳐올려라. 서로 쾌락을 탐하는 것이 섹스의 묘미겠지?」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「んんぅっ！？\u3000んぉ、おっ、んぉぅっ<emoji=heart04>\u3000あっ、あ、あっ、ち○ぽ、奥っ、奥に、ごつごつ、当たるっ<emoji=heart04>」"
translation = "「응응으읏!? 응오, 오옷, 응오옷<emoji=heart04> 앗, 아, 앗, 자지가 깊숙이, 안쪽 끝에 우글우글 닿아……!<emoji=heart04>」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「おっ、んぉ<emoji=heart04>\u3000我慢汁と愛液が、ぐちゃぐちゃと音を立てて……そ、そうか、性行為とは音までもが、こんなにも淫猥でっ……<emoji=heart04>」"
translation = "「옷, 응오<emoji=heart04> 쿠퍼액과 애액이 질척질척 소리를 내며…… 그, 그런가, 성행위란 소리마저 이렇게나 음탕해서……<emoji=heart04>」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「五感全てで興奮を掻き立てられるものなのだなっ……この表現は、取り入れねば、なるまいっ……んぉ、あ゛っ、んぁお……おっ、んぉん、ほぉん<emoji=heart04>」"
translation = "「오감 전부로 흥분을 자극받는 것이로구나…… 이 표현은 꼭 도입해야겠어…… 응오, 아윽, 응아오…… 옷, 응온, 호온<emoji=heart04>」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「はぁ、おっ、んぉっ<emoji=heart04>\u3000ぐぅうぅ、貴重な体験だというのに……覚えてなくてはいけないのにっ……快感に消し飛ばされるっ<emoji=heart04>」"
translation = "「하아, 옷, 응옷<emoji=heart04> 으으윽, 귀중한 체험인데…… 기억하고 있어야 하는데…… 쾌감에 휩쓸려 날아가 버려<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ロクサーナの気持ちよくなってる顔、すっごく可愛い……！」"
translation = "「록사나가 기분 좋아진 얼굴, 정말 귀여워……!」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「なっ……！？\u3000ふ、ふざけるな、凡骨ぅ……快楽に溺れ、唾液を零す顔が……可愛いはずなどっ……<emoji=heart04>」"
translation = "「나, 앗……!? 장, 장난치지 마라, 범골 놈아…… 쾌락에 빠져 침을 흘리는 얼굴이…… 귀여울 리가……<emoji=heart04>」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「威厳もプライドもない下劣な顔っ……見たのは、お前だけだぞっ……他のどの部員にも見せられるものかっ……！」"
translation = "「위엄도 프라이드도 없는 천박한 얼굴…… 본 건 너뿐이다…… 다른 부원 그 누구에게도 보여줄 수 있을 것 같으냐……!」"

[[dialogue]]
speaker = "unk"
original = "いつもの尊大な態度からは想像もつかない表情を、より一層乱したくなり、突き上げピストンは勢いを増した。"
translation = "평소의 오만한 태도라고는 상상도 할 수 없는 표정을 더욱 흐트러뜨리고 싶어져서, 추올리는 피스톤질에 속도가 붙었다."

[[dialogue]]
speaker = "ロクサーナ"
original = "「んぉっ！？\u3000おっ、おぉんっ<emoji=heart04>\u3000急にやる気を出す、なっ……おぉんっ<emoji=heart04>\u3000んぅっ、ち○ぽ、んぉ、おぁ、おぉんっ<emoji=heart04>」"
translation = "「응옷!? 오옷, 오오옹<emoji=heart04> 갑자기 의욕 내지 마라…… 오오옹<emoji=heart04> 응읏, 자지, 응오, 오아, 오오옹<emoji=heart04>」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「んぉ、くぅうぅぅん<emoji=heart04>\u3000子宮っ、ごつごつ叩かれてっ、我慢汁っ、注がれてぇっ……きっ、きもひ、きもひ、いい……<emoji=heart04>」"
translation = "「응오, 쿠우우웅<emoji=heart04> 자궁, 고드득 치이고, 쿠퍼액 부어져서…… 기, 기분 좋아, 기분 좋아……<emoji=heart04>」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「んぉっ、おっ、んぉ、んおぉほっ<emoji=heart04>\u3000ま○こ、おかしくなっ、おっ、んぉっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000んぉおおんっ<emoji=heart04>」"
translation = "「응오옷, 오옷, 응오, 응오오홋<emoji=heart04> 보지, 이상해져서, 오옷, 응오옷<emoji=heart04> 옷<emoji=heart04> 응오오오옹<emoji=heart04>」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「もっと、もっと、下から突けっ、私のま○こを屈服させるまで、貫いてみせろっ<emoji=heart04>\u3000私への恨みつらみをぶつけてみせろっ<emoji=heart04>」"
translation = "「더, 더 밑에서 찔러라, 내 보지를 굴복시킬 때까지 꿰뚫어 보란 말이다<emoji=heart04> 나에 대한 원망을 쏟아부어 보라고!<emoji=heart04>」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「んぉおぉんっ！？\u3000はっ、んぁあぁぁっ<emoji=heart04>\u3000オナニーとはまるで別の快感……恋人同士の営みっ……こればかりは一度経験してみなくては得られん……<emoji=heart04>」"
translation = "「응오오오옹!? 하앗, 응아아아앗<emoji=heart04> 자위와는 완전히 다른 쾌감…… 연인끼리의 행위…… 이것만은 한 번 경험해 보지 않으면 알 수 없어……<emoji=heart04>」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「んぉっ、おっ、はぁっ、んはぁあぁぁっ<emoji=heart04><emoji=heart04>\u3000あっ、はぁっ、あぁっ、そうだっ<emoji=heart04>\u3000もっと、もっと叩きつけてっ……獣のように、交わりあうっ……<emoji=heart04>」"
translation = "「응오옷, 오옷, 하앗, 응하아아앗<emoji=heart04><emoji=heart04> 앗, 하앗, 아앗, 그래!<emoji=heart04> 더, 더 내리쳐줘…… 짐승처럼 서로 뒤섞이는 거야……<emoji=heart04>」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「はぁ、んぉ、おっおっんぉっ<emoji=heart04>\u3000あっ、はぁっ、ひぃぐっ！？\u3000そこ、そこ、いいっ、いいぃっ<emoji=heart04>」"
translation = "「하아, 응오, 옷옷응옷<emoji=heart04> 앗, 하앗, 히익!? 거기, 거기 좋아, 좋아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「あっ、んぉ……ま○こが痺れて、お前と私の境目がわからなくなるっ……<emoji=heart04>\u3000これが、ち○ぽの虜になるということかっ……<emoji=heart04>」"
translation = "「앗, 응오…… 보지가 저려서 너와 나의 경계를 모르게 되겠어……<emoji=heart04> 이것이 자지의 포로가 된다는 것인가……<emoji=heart04>」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「んぁ、あっ、あっああぁっ<emoji=heart04>\u3000クる、クるっ……んっ、手を握る力が強く……？」"
translation = "「응아, 앗, 앗아아앗<emoji=heart04> 온다, 온다…… 응, 손을 잡는 힘이 강해져……?」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「んぉ、あぁ、これは絶頂の合図か……<emoji=heart04>\u3000私と繋がりを深めようとは可愛いことをするじゃないかっ……<emoji=heart04>」"
translation = "「응오, 아아, 이건 절정의 신호인가……<emoji=heart04> 나와의 유대를 깊게 하려 하다니 귀여운 짓을 하는구나……<emoji=heart04>」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「はっ、んぉっ、おっおっ、んぉんっ<emoji=heart04>\u3000ど、どうした、今にも果ててしまいそうな顔、だなっ<emoji=heart04>」"
translation = "「하앗, 응오옷, 옷옷, 응온앗<emoji=heart04> 어, 어서 해라, 금방이라도 사정해 버릴 것 같은 얼굴이구나!<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ロクサーナ、もう我慢、できなっ……くっ……出る、このままだと、中にっ……！」"
translation = "「록사나, 이제 못 참겠어…… 윽…… 나온다, 이대로라면 안에……!」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「ああ、構わんっ、私の子宮に、中出し……キンタマに詰まっている精子を、全て私に吐き出すんだ、このまま、出すんだぞっ……<emoji=heart04>」"
translation = "「아아, 상관없다! 내 자궁에 질내사정…… 불알에 가득 찬 정자를 전부 나에게 쏟아내라, 이대로 내보내란 말이다……<emoji=heart04>」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「私のま○こに吐き出す時の顔、覚えててやる……お前の全てを、私に見せろっ<emoji=heart04>」"
translation = "「내 보지에 쏟아낼 때의 얼굴, 기억해 주마…… 네 모든 것을 나에게 보여라!<emoji=heart04>」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「んぉおぉんっ！？\u3000んぉ、おかしくっ、おかしくなるっ<emoji=heart04>\u3000ま○こ、ま○こ、ち○ぽでイカされっ……<emoji=heart04>」"
translation = "「응오오오옹!? 응오, 이상해, 이상해져<emoji=heart04> 보지, 보지, 자지로 가버려서……<emoji=heart04>」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「ち○ぽっ、今までで一番大きくっ……イクのか？\u3000射精っ、射精、するのだなっ……？<emoji=heart04>」"
translation = "「자지, 지금까지 중 가장 커져서…… 가는 거냐? 사정, 사정하는 거군……?<emoji=heart04>」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「このまま、中に出してしまうしかないなっ<emoji=heart04>\u3000構わんっ、そのまま精子をよこせ、注げっ……私の奥の奥まで、お前で満たせっ……<emoji=heart04>」"
translation = "「이대로 안에 싸버리는 수밖에 없겠구나!<emoji=heart04> 상관없어, 그대로 정자를 다 내놔라, 부어라…… 내 안쪽 끝까지 너로 가득 채워라……<emoji=heart04>」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「んひぃんっ<emoji=heart04>\u3000おっ、んぉおぉんっ<emoji=heart04>\u3000おんっ<emoji=heart04>\u3000おぁ、はぁっ、んぉっ、おっ、クる、クる、クるっ<emoji=heart04>」"
translation = "「응히잉<emoji=heart04> 옷, 응오오오옹<emoji=heart04> 오응<emoji=heart04> 오아, 하앗, 응오옷, 옷, 온다, 온다, 온다!<emoji=heart04>」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「んぉんっ<emoji=heart04>\u3000おっんぉおおぉんっ<emoji=heart04>\u3000クるっ、クるっ、んぃイッッッ──んぅんぐぅうぅううぅ～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「응오옹<emoji=heart04> 옷 응오오오오옹<emoji=heart04> 온다, 온다, 응, 가버렷── 응으으으으으으으으으으음~~~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「んぅおっ！？\u3000ふぁっ<emoji=heart04>\u3000あ゛っ、んぉ、おっ、んぉおぁあぁあぁぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응오옷!? 하앗<emoji=heart04> 아앗, 응오, 오옷, 응오오아아아아아아아~~~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「はっ！\u3000はぁっ、はっ、はぁっ！\u3000んぁ、あっ、中に、どくんどくんっ、精子、精子っ、流れ込んでっ<emoji=heart04>」"
translation = "「하앗! 하앗, 하앗, 하앗! 응아, 앗, 안에 울컥울컥 정자, 정자가 흘러 들어와……<emoji=heart04>」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「んぉ！？\u3000ど、どれだけ出すつもりだっ、ふぉ、子宮が満たされっ……ぉんっ、か、快感が、いつまでも止まらんっ、こんな絶頂、知らんぞっ……<emoji=heart04>」"
translation = "「응오!? 얼, 얼마나 낼 셈이냐, 훗, 자궁이 가득 차서…… 응옷, 쾌, 쾌감이 언제까지고 멈추지 않아, 이런 절정은 모른단 말이다……<emoji=heart04>」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「あ゛っ、んあっ、お゛ぁっ……また大きな波がっ……？\u3000んぉ、おっ、んぉおっ、ま○こ、ま○こ、イクッ、イグ、イッぐぅっっっん……<emoji=heart04><emoji=heart04>」"
translation = "「아앗, 응앗, 오앗…… 또 큰 파도가……? 응오, 오옷, 응오옷, 보지, 보지 가버려, 가, 가버렷……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「はぁっ<emoji=heart04>\u3000はぁーっ<emoji=heart04>\u3000なんだっ、これは……想像を遥かに超えているっ……<emoji=heart04>\u3000溺れたら、二度と戻れなくなるっ……<emoji=heart04>」"
translation = "「하앗<emoji=heart04> 하아아<emoji=heart04> 뭐야, 이건…… 상상을 훨씬 뛰어넘고 있어……<emoji=heart04> 빠져들면 다시는 돌아오지 못하겠어……<emoji=heart04>」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「んぉっ……<emoji=heart04>\u3000中から精液が零れて……ま○こがお前のち○ぽの形に広がっているではないか……<emoji=heart04>」"
translation = "「응오……<emoji=heart04> 안에서 정액이 흘러나와서…… 보지가 네 자지 모양으로 벌어져 있지 않으냐……<emoji=heart04>」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「ぁ……ふぁ、あっ、はぁ、あっ、ふぁぁっ………<emoji=heart04>\u3000まったく……容赦なく出してくれたものだな……<emoji=heart04>」"
translation = "「아…… 하아, 앗, 하아, 앗, 하아아아………<emoji=heart04> 정말이지…… 가차 없이 쏟아냈구나……<emoji=heart04>」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「全身の火照りが鎮まらん……子宮で受け止めたお前の精子に、愛しさすら覚えてしまっている……<emoji=heart04>」"
translation = "「전신의 열기가 식지 않아…… 자궁으로 받아낸 네 정자에 애정마저 느껴버리고 말았다……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "うっとりと蕩けた笑みを浮かべながら、ロクサーナは下腹部を優しく円を描くように撫でる。"
translation = "황홀하게 풀린 미소를 지으며, 록사나는 아랫배를 부드럽게 원을 그리듯 쓰다듬는다."

[[dialogue]]
speaker = "ロクサーナ"
original = "「肉欲というのは満足すればするほど、止められなくなるものらしいが……」"
translation = "「육욕이라는 건 만족하면 할수록 멈출 수 없게 되는 모양이다만……」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「んぉ、はぁっ、はーっ、はーっ……んぅうぅぅ……どうやら……私はとんでもないことを知ってしまったようだな……<emoji=heart04>」"
translation = "「응오, 하앗, 하아, 하아…… 응으으으…… 아무래도…… 나는 엄청난 것을 알아버린 모양이군……<emoji=heart04>」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「経験してみなければ喩えようもない快感だ……先人が性の快楽に溺れてしまう理由、言葉ではなく体で理解した……<emoji=heart04>」"
translation = "「경험해 보지 않으면 비유할 수조차 없는 쾌감이다…… 선인들이 성의 쾌락에 빠져버리는 이유, 말이 아니라 몸으로 이해했어……<emoji=heart04>」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「一応、感謝しておくぞ、会長。恋人のお前とでなければ、ここまでの快感に至ることはなかっただろう」"
translation = "「일단 고맙다고 해 두마, 회장. 연인인 네가 아니었다면 이 정도의 쾌감에 이르지는 못했을 거다.」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「はぁぁ……脳をインスピレーションが駆け巡っている……この快感と感動を忘れぬ内に書き留めたいのはやまやまだが、今は執筆よりもお前とのセックスを優先したい」"
translation = "「하아아…… 뇌에 영감이 휘몰아치고 있어…… 이 쾌감과 감동을 잊기 전에 적어두고 싶은 마음이 굴뚝같지만, 지금은 집필보다 너와의 섹스를 우선하고 싶군.」"

[[dialogue]]
speaker = "クロト"
original = "「……え？」"
translation = "「……에?」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「言っただろう。『貞淑なシスターが淫らな快楽にその身を堕とす』と。この程度の不貞では堕落とは言わん」"
translation = "「말했지? 『정숙한 시스터가 음란한 쾌락에 그 몸을 타락시킨다』고. 이 정도의 부정으로는 타락이라고 할 수 없어.」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「お前のち○ぽもこれだけ出していながら、既に勃ち上がろうとしているのだからな。ちっとも満足していないのだろう？」"
translation = "「네 자지도 이만큼이나 냈으면서 이미 다시 일어서려 하고 있지 않으냐. 조금도 만족하지 못한 것이지?」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「未知の快感を教えてくれた、せめてもの礼だ。キンタマが空っぽになるまで私の体を使わせてやる」"
translation = "「미지의 쾌감을 가르쳐준 최소한의 예의다. 불알이 텅 빌 때까지 내 몸을 쓰게 해 주마.」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「いつも私にいいようにやられているんだ。仕返しのひとつもしてみせろ」"
translation = "「항상 내 뜻대로 휘둘렸잖아. 복수라도 한 번 해 보라고.」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「私の性への探求心とお前の精力、どっちが先に尽きるか、勝負といこうじゃないか、くっくっく<emoji=heart04>」"
translation = "「나의 성에 대한 탐구심과 네 정력, 어느 쪽이 먼저 바닥날지 승부해 보자고, 큭큭큭<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「思いっきり中に出しといてなんだけど……避妊具は？」"
translation = "「마음껏 안에 싸버리고 나서 하는 말이지만…… 피임 기구는?」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「一度、中に出したなら二度も三度も大して変わらん。もしお前の子を孕んでしまったら、私が責任を取ってお前を養ってやる」"
translation = "「한 번 안에 냈다면 두 번이고 세 번이고 큰 차이 없다. 만약 네 아이를 임신하게 된다면 내가 책임지고 너를 먹여 살려 주마.」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「さぁ、来い。どこまでも、私を愛してみせろ<emoji=heart04>」"
translation = "「자, 와라. 어디까지고 나를 사랑해 보렴<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そのまま俺たちはお互いの精魂が尽き、足腰が立たなくなるまで、神の御前で堕落の一途を辿るのであった──"
translation = "그대로 우리들은 서로의 정혼이 다하고 허리를 가누지 못할 때까지 신의 앞에서 타락의 일로를 걷는 것이었다──"

