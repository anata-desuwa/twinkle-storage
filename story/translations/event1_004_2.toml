[[dialogue]]
speaker = "unk"
original = "マトイやトマルと話す内にわかってきたが、どうやら短期の記憶喪失になってしまったらしい。"
translation = "마토이나 토마루와 이야기하는 동안 알게 되었지만, 아무래도 단기 기억상실증에 걸려버린 모양이다."

[[dialogue]]
speaker = "マトイ"
original = "「そんな……まさか、会長が記憶喪失だなんて……！」"
translation = "「그런…… 설마, 회장님이 기억상실이라니……!」"

[[dialogue]]
speaker = "unk"
original = "まさか、トマルが男だなんて……！"
translation = "설마, 토마루가 남자였다니……!"

[[dialogue]]
speaker = "マトイ"
original = "「記憶喪失よりも気にするの、そこ！？」"
translation = "「기억상실보다 신경 쓰는 게 거기야!?」"

[[dialogue]]
speaker = "トマル"
original = "「……私、男ですけど、姉さまのような素敵な女の子に憧れているんです」"
translation = "「……저, 남자이긴 하지만, 언니처럼 멋진 여자아이를 동경하고 있어요」"

[[dialogue]]
speaker = "トマル"
original = "「体の作りは変えられませんけど、外見は努力で変えられますから」"
translation = "「몸의 구조는 바꿀 수 없지만, 외견은 노력으로 바꿀 수 있으니까요」"

[[dialogue]]
speaker = "マトイ"
original = "「その結果、普通の女の子をも超越した美少女が誕生しちゃってるわけだけど……」"
translation = "「그 결과, 평범한 여자아이조차 초월한 미소녀가 탄생해 버린 셈이지만……」"

[[dialogue]]
speaker = "トマル"
original = "「？\u3000私は、姉さまの方が普通に可愛いと思いますけど……」"
translation = "「? 저는 언니 쪽이 평범하게 귀엽다고 생각하는데요……」"

[[dialogue]]
speaker = "unk"
original = "可愛いのはもちろん、可憐な美少女って感じ"
translation = "귀여운 것은 물론, 가련한 미소녀라는 느낌이다"

[[dialogue]]
speaker = "トマル"
original = "「お恥ずかしい限りです……。とはいえ、性別は会長さまと同じ男ですから、遠慮せずに気安く接してください」"
translation = "「부끄러울 따름입니다……. 그건 그렇고, 성별은 회장님과 같은 남자니까, 부담 갖지 말고 편하게 대해 주세요」"

[[dialogue]]
speaker = "マトイ"
original = "「うん。トマルは普通じゃないくらい可愛い、私の自慢の弟よ」"
translation = "「응. 토마루는 평범하지 않을 정도로 귀여운, 내 자랑스러운 동생이야」"

[[dialogue]]
speaker = "トマル"
original = "「わ、私のことはさておき、会長さまの記憶喪失のことです！」"
translation = "「제, 제 일은 제쳐두고, 회장님의 기억상실 건이에요!」"

[[dialogue]]
speaker = "トマル"
original = "「会長さま、マトイ姉さまのことは覚えてらっしゃるんですよね？」"
translation = "「회장님, 마토이 언니에 대해서는 기억하고 계신 거죠?」"

[[dialogue]]
speaker = "マトイ"
original = "「ヴィーナスやアナ、サーシャさんのことは覚えている……でも、トマルのことは思い出せない、だっけ？」"
translation = "「비너스나 아나, 사샤 씨는 기억하고 있어…… 하지만, 토마루에 대해서는 떠올릴 수 없다, 였지?」"

[[dialogue]]
speaker = "トマル"
original = "「私が初めて会長さまと会ったのが、会長に就任されて間もなくの時期でしたから、おそらく――」"
translation = "「제가 처음 회장님과 만난 게, 회장으로 취임하신 지 얼마 안 된 시기였으니까, 아마도――」"

[[dialogue]]
speaker = "マトイ"
original = "「御前試合が終わった直後くらいから、最近までの記憶が抜けちゃってるってことかぁ……」"
translation = "「어전 시합이 끝난 직후 정도부터, 최근까지의 기억이 빠져버렸다는 거네……」"

[[dialogue]]
speaker = "マトイ"
original = "「でもなんで突然、記憶喪失なんかに……？\u3000頭でも強く打ったとか？\u3000だけど、会長を診察した先生は、外傷はないって言ってたし……」"
translation = "「근데 왜 갑자기 기억상실 같은 게……? 어디 머리라도 세게 부딪혔나? 하지만 회장님을 진찰한 선생님은 외상은 없다고 하셨고……」"

[[dialogue]]
speaker = "トマル"
original = "「……私に１つ、心当たりがあります」"
translation = "「……저한테 짐작 가는 곳이 하나 있어요」"

[[dialogue]]
speaker = "トマル"
original = "「会長さまは今、おそらく<b>サチさま</b>と同じ状況です」"
translation = "「회장님은 지금, 아마도 <b>사치</b> <b>님</b>과 같은 상황일 거예요」"

[[dialogue]]
speaker = "マトイ"
original = "「えっ！？\u3000それって、サチちゃんも記憶喪失になってるってこと！？」"
translation = "「엣!? 그 말은, 사치 짱도 기억상실이 됐다는 거야!?」"

[[dialogue]]
speaker = "unk"
original = "サチ？\u3000どこかで聞いたことあるような……"
translation = "사치? 어디선가 들어본 적이 있는 것 같은데……"

[[dialogue]]
speaker = "トマル"
original = "「実は、サチさまのことで協力していただきたくて、私は会長さまを探していたのです」"
translation = "「사실 사치 님의 일로 협력을 구하고 싶어서, 저는 회장님을 찾고 있었던 거예요」"

[[dialogue]]
speaker = "？？？"
original = "「――あー、テステス！\u3000トマルさん！\u3000トマルさん、聞こえてますか～！？」"
translation = "「――아, 테스 테스! 토마루 씨! 토마루 씨, 들리시나요~!?」"

[[dialogue]]
speaker = "マトイ"
original = "「！？\u3000誰の声……？\u3000校内放送とも違うけど……どこから聞こえてきてるの？」"
translation = "「!? 누구 목소리……? 교내 방송이랑은 다른데…… 어디서 들려오는 거야?」"

[[dialogue]]
speaker = "トマル"
original = "「トレジアンナさん、聞こえてます！\u3000ひょっとして、ロストアイテムを見つけたんですか？」"
translation = "「트레지안나 씨, 들려요! 혹시 로스트 아이템을 찾은 건가요?」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「はい～。今、新星学園の校門前で戦ってます。人払いの星術は使ってるので、被害者はいませんが……」"
translation = "「네에~. 지금 신성 학원 교문 앞에서 싸우고 있어요. 인척 차단 성술은 쓰고 있어서 피해자는 없지만……」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「魔法少女のお２人が大ピンチです～！\u3000どうかヘルプをお願いします～！」"
translation = "「마법소녀 두 분이 대위기예요~! 부디 도움을 부탁드려요~!」"

[[dialogue]]
speaker = "unk"
original = "魔法、少女……？"
translation = "마법, 소녀……?"

[[dialogue]]
speaker = "トマル"
original = "「わかりました！\u3000今いきます！」"
translation = "「알겠습니다! 지금 갈게요!」"

[[dialogue]]
speaker = "トマル"
original = "「すみません、会長さま、姉さま。詳しい説明は後ほどちゃんとしますが……」"
translation = "「죄송해요, 회장님, 언니. 자세한 설명은 나중에 제대로 하겠지만……」"

[[dialogue]]
speaker = "トマル"
original = "「私たちの魔法少女活動に、協力していただけませんか！？」"
translation = "「저희의 마법소녀 활동에 협력해 주시지 않겠나요!?」"

[[dialogue]]
speaker = "unk"
original = "現場に向かうと、そこには空中を高速で飛び回る本と格闘する、２人の少女の姿があった。"
translation = "현장으로 향하자, 그곳에는 공중을 고속으로 날아다니는 책과 격투하는 두 소녀의 모습이 있었다."

[[dialogue]]
speaker = "？？？"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "（なんだ、あの本……！？）"
translation = "(뭐지, 저 책은……!?)"

[[dialogue]]
speaker = "サチ"
original = "「くっ……！\u3000速い……！\u3000それにやっぱり、こっちの動きを読まれてる……！」"
translation = "「큭……! 빨라……! 게다가 역시, 이쪽의 움직임을 읽히고 있어……!」"

[[dialogue]]
speaker = "プリムラ"
original = "「なにをやっとるんじゃ、サチ！\u3000敵に読まれる以前の問題、全然我と動きを合わせられておらんではないか！」"
translation = "「무얼 하고 있는 것이냐, 사치! 적에게 읽히기 이전의 문제다, 전혀 나와 움직임을 맞추지 못하고 있지 않느냐!」"

[[dialogue]]
speaker = "サチ"
original = "「思い出せないんだから、仕方ないでしょ！\u3000覚えてるなら、プリムラが合わせてよ！」"
translation = "「기억이 안 나니까 어쩔 수 없잖아! 기억하고 있다면 프리뮬러가 맞춰줘!」"

[[dialogue]]
speaker = "プリムラ"
original = "「我はちゃんとやっておるわ！\u3000ええい、情けない姿を晒しおって……！」"
translation = "「나는 제대로 하고 있느니라! 에잇, 한심한 꼴을 보이다니……!」"

[[dialogue]]
speaker = "トマル"
original = "「サチさま！\u3000プリムラさま！\u3000加勢します！」"
translation = "「사치 님! 프리뮬러 님! 가세하겠습니다!」"

[[dialogue]]
speaker = "マトイ"
original = "「なんだかわからないけど、とりあえずあの本を倒せばいいのよね？」"
translation = "「뭔지는 모르겠지만, 일단 저 책을 쓰러뜨리면 되는 거지?」"

[[dialogue]]
speaker = "トマル"
original = "「そうです！\u3000――って、いけない！\u3000ロストアイテムがまた逃げようとしてます！」"
translation = "「맞아요! ――앗, 안 돼! 로스트 아이템이 다시 도망치려 해요!」"

[[dialogue]]
speaker = "トマル"
original = "「サーバントアロー！」"
translation = "「서번트 애로우!」"

[[dialogue]]
speaker = "ロストアイテム"
original = "「…………！」"
translation = "「…………!」"

[[dialogue]]
speaker = "プリムラ"
original = "「足が止まった！\u3000逃がさん！」"
translation = "「발이 묶였다! 놓치지 않느니라!」"

[[dialogue]]
speaker = "サチ"
original = "「よし！\u3000私が拘束して――」"
translation = "「좋아! 내가 구속해서――」"

[[dialogue]]
speaker = "プリムラ"
original = "「ちょっ！？\u3000なんでお前も一緒に突撃しとるんじゃ！\u3000おわぁっ！？」"
translation = "「잠깐!? 왜 너도 같이 돌격하는 것이냐! 으와앗!?」"

[[dialogue]]
speaker = "サチ"
original = "「きゃあっ！？」"
translation = "「꺄악!?」"

[[dialogue]]
speaker = "トマル"
original = "「お２人とも、大丈夫ですか！？」"
translation = "「두 분 다 괜찮으세요!?」"

[[dialogue]]
speaker = "ロストアイテム"
original = "「…………♪」"
translation = "「…………♪」"

[[dialogue]]
speaker = "マトイ"
original = "「あっ、本に逃げられちゃった……」"
translation = "「앗, 책을 놓쳐버렸네……」"

[[dialogue]]
speaker = "プリムラ"
original = "「さ、サチぃ～！\u3000貴様という奴は――」"
translation = "「사, 사치~! 네놈이라는 녀석은――」"

[[dialogue]]
speaker = "プリムラ"
original = "「なにをやっとるんじゃ、馬鹿者ぉぉぉっ！\u3000拘束する役は体を変形させられる我と、いつも決まっておろうが！」"
translation = "「무얼 하고 있는 것이냐, 바보 같은 놈! 구속하는 역할은 몸을 변형시킬 수 있는 나와 하는 것으로 언제나 정해져 있지 않느냐!」"

[[dialogue]]
speaker = "サチ"
original = "「あのね……！\u3000だから、そういうの思い出せないんだって言ってるでしょ！？\u3000ちゃんと口に出して言いなさいよ！」"
translation = "「저기 말야……! 그러니까 그런 거 기억 안 난다고 말했잖아!? 제대로 입 밖으로 내서 말하란 말이야!」"

[[dialogue]]
speaker = "トマル"
original = "「やはり……今のままだと、ロストアイテムの回収は難しそうですね……」"
translation = "「역시…… 지금 상태로는 로스트 아이템 회수는 어려워 보이네요……」"

[[dialogue]]
speaker = "unk"
original = "ロストアイテムって、さっきの本のこと？"
translation = "로스트 아이템이란 게 아까 그 책을 말하는 건가?"

[[dialogue]]
speaker = "トマル"
original = "「はい。あれがサチさまと、そしておそらく会長さまの記憶も奪った原因――」"
translation = "「네. 저게 사치 님과, 그리고 아마도 회장님의 기억도 앗아간 원인――」"

[[dialogue]]
speaker = "トマル"
original = "「『記憶のロストアイテム』です」"
translation = "「『기억의 로스트 아이템』이에요」"

[[dialogue]]
speaker = "unk"
original = "トマルは真剣な表情で告げるのだった。"
translation = "토마루는 진지한 표정으로 고하는 것이었다."

