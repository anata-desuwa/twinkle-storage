[[dialogue]]
speaker = "unk"
original = "第５話,煌嶺の野望,B"
translation = "제5화, 코레이의 야망, B"

[[dialogue]]
speaker = "煌嶺"
original = "「聞こえなかったか？\u3000妾がこの新星学園の学園長になると言ったのだ」"
translation = "「들리지 않았나? 소첩이 이 신성학원의 학원장이 되겠다고 말했다.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「無論聞こえているとも。ただ、貴殿の申し出は意外であった」"
translation = "「물론 들었느니라. 다만 귀공의 제안은 의외였도다.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「学園長というのは存外面倒なものだ。キュリオスの主・煌嶺は奔放で知られているが、失礼ながら学園長が務まるのかと思ってな」"
translation = "「학원장이라는 것은 생각보다 번거로운 것이니라. 큐리오스의 주인 코레이는 분방하기로 알려져 있다만, 실례지만 학원장직을 수행할 수 있을까 싶어서 말이도다.」"

[[dialogue]]
speaker = "煌嶺"
original = "「これでも妾は一国の主。組織を束ねる苦労は理解しているとも」"
translation = "「이래 봬도 소첩은 일국의 주인. 조직을 거느리는 고충은 이해하고 있다.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「しかし学園長の職務を行う間、キュリオスをどうするのだ？\u3000国を長く留守にするわけにもいくまい」"
translation = "「허나 학원장의 직무를 수행하는 동안 큐리오스는 어찌할 것이냐? 나라를 오래 비울 수도 없을 터이니라.」"

[[dialogue]]
speaker = "煌嶺"
original = "「大交流の度にキュリオスと新星学園を行き来すれば良かろう」"
translation = "「대교류 때마다 큐리오스와 신성학원을 오가면 될 일이지.」"

[[dialogue]]
speaker = "煌嶺"
original = "「ラティエとはキュリオスで<ruby>見<rt>まみ</rt></ruby>えたが、あやつは流星学園の学園長なのだろう？\u3000なら常にここにいる必要はあるまい」"
translation = "「라티에와는 큐리오스에서 만났지만, 그 녀석은 유성학원의 학원장이지 않나? 그럼 항상 여기에 있을 필요는 없겠지.」"

[[dialogue]]
speaker = "ヘレナ"
original = "（相変わらず余計なことをしてくれるな、<ruby>ラティエ<rt>やつ</rt></ruby>は……）"
translation = "(여전히 쓸데없는 짓을 해 주는구나, 라티에은……)"

[[dialogue]]
speaker = "煌嶺"
original = "「随分と邪険にしてくれるではないか、ヘレナ殿。そんなに妾が気に入らぬか？」"
translation = "「상당히 박대해 주는군, 헬레나 공. 그렇게 소첩이 마음에 안 드나?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「いやいや、ただの確認だとも」"
translation = "「아니 아니, 그저 확인일 뿐이로다.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「貴殿は学園というものを知らない。就任してから、想像していたものと違うとなってはお互い不幸だからな」"
translation = "「귀공은 학원이라는 것을 모르느니라. 취임하고 나서 상상했던 것과 다르다고 하게 되면 서로 불행해지니까 말이도다.」"

[[dialogue]]
speaker = "煌嶺"
original = "「なるほど。それはご心配痛み入る。さすが傾いていた九浄家を建て直したヘレナ殿だ」"
translation = "「과연. 그 걱정 참으로 고맙군. 과연 기울어가던 쿠죠 가문을 다시 세운 헬레나 공답다.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "煌嶺"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "静かに視線と意志をぶつけ合うヘレナと煌嶺。"
translation = "조용히 시선과 의지를 부딪치는 헬레나와 코레이."

[[dialogue]]
speaker = "unk"
original = "相手は悪名高きキュリオスの主。星騎士の学園の長にふさわしいとは思えない。"
translation = "상대는 악명 높은 큐리오스의 주인. 성기사 학원의 장에 어울린다고는 생각되지 않는다."

[[dialogue]]
speaker = "unk"
original = "何よりヘレナの直感が告げていた。彼女を学園長にしてはいけないと。"
translation = "무엇보다 헬레나의 직감이 고하고 있었다. 그녀를 학원장으로 삼아서는 안 된다고."

[[dialogue]]
speaker = "ヘレナ"
original = "「ならば問おう。貴殿はなぜ学園長になりたいのだ？」"
translation = "「그렇다면 묻겠도다. 귀공은 왜 학원장이 되고 싶은 것이냐?」"

[[dialogue]]
speaker = "煌嶺"
original = "「簡単だ」"
translation = "「간단하다.」"

[[dialogue]]
speaker = "煌嶺"
original = "「妾は欲しい。この学園が。星騎士が」"
translation = "「소첩은 갖고 싶다. 이 학원이. 성기사가.」"

[[dialogue]]
speaker = "煌嶺"
original = "「欲するものは手に入れる。それが妾だ」"
translation = "「원하는 것은 손에 넣는다. 그것이 소첩이다.」"

[[dialogue]]
speaker = "unk"
original = "煌嶺の宝石のような瞳が、炎を灯したように爛々と輝く。"
translation = "코레이의 보석 같은 눈동자가 불을 지핀 듯 이글이글 빛난다."

[[dialogue]]
speaker = "unk"
original = "そこに映るのは、ただ純粋な欲望。"
translation = "그곳에 비치는 것은 그저 순수한 욕망."

[[dialogue]]
speaker = "unk"
original = "“欲しい”──その感情が煌嶺という存在を衝き動かしていた。"
translation = "“갖고 싶다”── 그 감정이 코레이라는 존재를 움직이고 있었다."

[[dialogue]]
speaker = "理事Ａ"
original = "「そ、それだけのことで学園長に……？」"
translation = "「겨, 겨우 그런 일로 학원장에……?」"

[[dialogue]]
speaker = "煌嶺"
original = "「それだけ、とはつれないな。“欲しい”は立派な動機だぞ？」"
translation = "「겨우라니, 너무하군. “갖고 싶다”는 훌륭한 동기라고?」"

[[dialogue]]
speaker = "煌嶺"
original = "「先日のガーディアンとの戦いは見せてもらった。取るに足らぬ有象無象かと思っていたが、中々に悪くない」"
translation = "「요전번 가디언과의 싸움은 잘 보았다. 보잘것없는 오합지졸인가 생각했다만, 제법 나쁘지 않더군.」"

[[dialogue]]
speaker = "煌嶺"
original = "「今の実力であれば妾どころか、キュリオスの精兵にも及ばぬ」"
translation = "「지금 실력이라면 소첩은커녕 큐리오스의 정예병에게도 미치지 못한다.」"

[[dialogue]]
speaker = "煌嶺"
original = "「だが見どころはある。秘めた星々の輝きは、磨けばより鋭さを増し、乱麻を絶つが如く敵を斬る剣となるだろう」"
translation = "「하지만 가능성은 있다. 숨겨진 별들의 광채는 닦으면 더욱 예리함을 더해, 난마를 끊는 것과 같이 적을 베는 검이 되겠지.」"

[[dialogue]]
speaker = "煌嶺"
original = "「そして、妾が学園長になるのはもうひとつ理由がある」"
translation = "「그리고 소첩이 학원장이 되려는 이유는 하나 더 있다.」"

[[dialogue]]
speaker = "unk"
original = "煌嶺がにぃっと笑みを深めた。"
translation = "코레이가 씨익 미소를 깊게 지었다."

[[dialogue]]
speaker = "unk"
original = "まるで虎視眈々と得物を狙う肉食獣のように。"
translation = "마치 호시탐탐 먹잇감을 노리는 육식수처럼."

[[dialogue]]
speaker = "煌嶺"
original = "「妾はこの世界を守る。たとえ他の世界を滅ぼしてもな」"
translation = "「소첩은 이 세계를 지킨다. 설령 다른 세계를 멸망시키더라도 말이다.」"

[[dialogue]]
speaker = "理事Ｂ"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker = "unk"
original = "その瞬間、会議室の空気が変わった。"
translation = "그 순간 회의실의 공기가 바뀌었다."

[[dialogue]]
speaker = "unk"
original = "煌嶺の堂々とした宣言は、浮足立っていた理事たちの心を鷲掴みにし、女帝の存在感が場を侵食していく。"
translation = "코레이의 당당한 선언은 들떠 있던 이사들의 마음을 움켜쥐었고, 여제의 존재감이 장내를 침식해 나간다."

[[dialogue]]
speaker = "ヘレナ"
original = "「なるほど。あの動画は貴殿の仕業であったか」"
translation = "「과연. 그 동영상은 귀공의 짓이었느냐.」"

[[dialogue]]
speaker = "煌嶺"
original = "「さてな」"
translation = "「글쎄다.」"

[[dialogue]]
speaker = "unk"
original = "厳しい視線を向けるヘレナに対し、煌嶺が不敵に笑んだ。"
translation = "엄한 시선을 보내는 헬레나에 대해 코레이가 불적하게 웃었다."

[[dialogue]]
speaker = "煌嶺"
original = "「この世界──アルタイルを守ればデネブが滅ぶ。それは嘆かわしいことだ」"
translation = "「이 세계── 알타이르를 지키면 데네브가 멸망한다. 그것은 한탄스러운 일이지.」"

[[dialogue]]
speaker = "煌嶺"
original = "「暴君で知られる妾とて、平行世界の民を皆殺しにしたいわけではない。だがこの世界を守るためならば妾は迷わん」"
translation = "「폭군으로 알려진 소첩이라 해도 평행세계의 백성을 몰살하고 싶은 것은 아니다. 하지만 이 세계를 지키기 위해서라면 소첩은 망설이지 않는다.」"

[[dialogue]]
speaker = "煌嶺"
original = "「生存競争であるというなら、この戦い、受けて立とうではないか！」"
translation = "「생존 경쟁이라 한다면, 이 싸움, 받아들여 주지 않겠나!」"

[[dialogue]]
speaker = "理事Ｂ"
original = "「おお……！」"
translation = "「오오……!」"

[[dialogue]]
speaker = "unk"
original = "煌嶺を訝しんでいた理事までもが、眼の色を変えて彼女を見ていた。"
translation = "코레이를 의아하게 여기던 이사들조차 눈빛을 바꾸어 그녀를 바라보고 있었다."

[[dialogue]]
speaker = "unk"
original = "キュリオスの女帝はただ強いだけではない。人心を掌握し、虜にし──我が物にする。"
translation = "큐리오스의 여제는 그저 강하기만 한 것이 아니다. 인심을 장악하고, 포로로 삼아── 자신의 것으로 만든다."

[[dialogue]]
speaker = "unk"
original = "それが欲望の化身たる彼女の力だった。"
translation = "그것이 욕망의 화신인 그녀의 힘이었다."

[[dialogue]]
speaker = "煌嶺"
original = "「おっと。部下から連絡だ……ほう、良い甘味の店が見つかったとな」"
translation = "「오호. 부하에게서 연락이군…… 호오, 괜찮은 단맛을 내는 가게를 찾았다고?」"

[[dialogue]]
speaker = "煌嶺"
original = "「何？\u3000先着１０名限定の隠しメニュー……？\u3000うむ、それは今すぐ向かわねばなるまい。妾はそれが“欲しい”のだからな」"
translation = "「뭐? 선착순 10명 한정 숨겨진 메뉴……? 음, 그것 참 지금 당장 향하지 않으면 안 되겠군. 소첩은 그것을 “원하”니까 말이다.」"

[[dialogue]]
speaker = "煌嶺"
original = "「ではまた会おう。次の理事会を楽しみにしているぞ」"
translation = "「그럼 다음에 또 보지. 다음 이사회를 기대하고 있으마.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "悠々と会議室を後にする煌嶺を、ヘレナは渋い顔で見送った。"
translation = "유유히 회의실을 뒤로하는 코레이를, 헬레나는 떫은 표정으로 배웅했다."

