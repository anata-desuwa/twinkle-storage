[[dialogue]]
speaker = "unk"
original = "第１話,嵐の槍,B"
translation = "제1화, 폭풍의 창, B"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「くたばれ、魔王……！」"
translation = "「뒈져라, 마왕……!」"

[[dialogue]]
speaker = "unk"
original = "嵐が大槍を包み、風雷の塊と化した一撃が俺めがけて迫る。"
translation = "폭풍이 거대한 창을 감싸고 풍뢰의 덩어리가 된 일격이 나를 향해 육박한다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ぐっ……！」"
translation = "「큭……!」"

[[dialogue]]
speaker = "unk"
original = "暴威を紙一重で躱すも、余波だけで体が切り刻まれる。"
translation = "폭위를 종이 한 장 차이로 피했으나 여파만으로 몸이 베여 나간다."

[[dialogue]]
speaker = "unk"
original = "直撃せずとも並のモンスターなら細切れになる破壊力だ。"
translation = "직격하지 않더라도 평범한 몬스터라면 갈기갈기 찢길 파괴력이다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「お前のせいで、アタシの家族は……！」"
translation = "「너 때문에 내 가족은……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「君の家族……？\u3000なんのことだ、君はいったい！？」"
translation = "「네 가족……? 무슨 소리야, 넌 대체 누구냐!?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「お前はアタシたちの世界を破壊した……！\u3000この魔王め……！」"
translation = "「넌 우리들의 세계를 파괴했어……! 이 마왕 놈……!」"

[[dialogue]]
speaker = "unk"
original = "小柄な体躯で大きな槍を振り回し、執拗に俺を襲う。"
translation = "작은 체구로 거대한 창을 휘두르며 집요하게 나를 습격한다."

[[dialogue]]
speaker = "unk"
original = "彼女から感じる星力は並外れていて、容赦なく繰り出される連撃に防戦一方になっていた。"
translation = "그녀에게서 느껴지는 성력은 비정상적이었고, 가차 없이 쏟아지는 연격에 방어하기 급급했다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「緋宮クロト！\u3000お前はここで終わらせる！」"
translation = "「히노미야 쿠로토! 넌 여기서 끝내주마!」"

[[dialogue]]
speaker = "unk"
original = "そして一撃一撃から感じる、強い敵意と憎悪。"
translation = "그리고 일격 일격에서 느껴지는 강한 적의와 증오."

[[dialogue]]
speaker = "unk"
original = "ともすれば向けられただけで絶命しそうな殺気が、俺を狙っていた。"
translation = "자칫 마주하기만 해도 절명할 것 같은 살기가 나를 노리고 있었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（魔王の力が使えれば……いや、今はダメだ）"
translation = "(마왕의 힘을 쓸 수 있다면…… 아니, 지금은 안 돼.)"

[[dialogue]]
speaker = "unk"
original = "今また俺が暴走すれば、流星市国がどうなるかわかったものではない。"
translation = "지금 또다시 내가 폭주한다면 유성시국이 어떻게 될지 알 수 없다."

[[dialogue]]
speaker = "unk"
original = "最悪、敗北どころでは済まない。この世界が崩壊してしまう。"
translation = "최악의 경우 패배 정도로 끝나지 않는다. 이 세계가 붕괴해 버린다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロトばっかり狙ってるんじゃないわよ！\u3000好き勝手はさせないわ！」"
translation = "「쿠로토만 노리게 두지 않겠어! 마음대로 하게 놔두지 않을 거야!」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「行け、極星従騎・スレイプニル！」"
translation = "「가라, 극성종기·슬레이프니르!」"

[[dialogue]]
speaker = "unk"
original = "俺を助けようとしたヴィーナスたちの前に、先ほど戦っていたガーディアンが立ちはだかる。"
translation = "나를 도우려던 비너스 일행의 앞을, 조금 전 싸웠던 가디언이 가로막는다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「さっきのガーディアン……まだいたんだ……」"
translation = "「아까 그 가디언…… 아직 남아 있었구나……」"

[[dialogue]]
speaker_original = "スレイプニル"
speaker_translation = "슬레이프니르"
original = "「ブルルル……！」"
translation = "「부르르르……!」"

[[dialogue]]
speaker = "unk"
original = "“極星従騎”と呼ばれたガーディアンが、その剣に光をまとわせて突進する。"
translation = "“극성종기”라 불린 가디언이 그 검에 빛을 두르고 돌진한다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「っ……やっぱり強い……！」"
translation = "「윽…… 역시 강해……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「君は何者だ！？\u3000何のために街を破壊する！」"
translation = "「너는 정체가 뭐냐!? 무엇을 위해서 거리를 파괴하는 거지!」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「あん？」"
translation = "「앙?」"

[[dialogue]]
speaker = "unk"
original = "配下を率いて街を蹂躙する彼女の行いは、リクリエの使徒として現れたアポロを思い起させる。"
translation = "부하를 이끌고 거리를 유린하는 그녀의 행보는, 리크리에의 사도로서 나타났던 아폴로를 떠올리게 한다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「まさか新しいリクリエの使徒……なのか？\u3000だけど仮面は──」"
translation = "「설마 새로운 리크리에의 사도……인 건가? 하지만 가면은──」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「リクリエの使徒？\u3000アタシが……？」"
translation = "「리크리에의 사도? 내가……?」"

[[dialogue]]
speaker = "unk"
original = "問われた彼女は若干の逡巡を見せて──"
translation = "질문을 받은 그녀는 약간의 주저함을 보이더니──"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "<size=50>「んなわけねえだろうがっ！！」</size>"
translation = "<size=50>「그럴 리가 없잖아!!」</size>"

[[dialogue]]
speaker = "unk"
original = "同刻。"
translation = "같은 시각."

[[dialogue]]
speaker = "unk"
original = "選挙管理委員会の４人も、街を破壊するガーディアンと対峙していた。"
translation = "선거관리위원회의 4명도 거리를 파괴하는 가디언과 대치하고 있었다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「モンスターだろうが、ガーディアンだろうが、好きにはさせない！\u3000そら！」"
translation = "「몬스터든 가디언이든 마음대로 하게 두지 않아! 에잇!」"

[[dialogue]]
speaker_original = "スレイプニル"
speaker_translation = "슬레이프니르"
original = "「ヒィイン……！」"
translation = "「히이잉……!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「今のを弾いたか。手強いな……！」"
translation = "「방금 걸 튕겨냈나. 만만치 않군……!」"

[[dialogue]]
speaker = "unk"
original = "空を疾駆しながら街を破壊するガーディアン。"
translation = "하늘을 질주하며 거리를 파괴하는 가디언."

[[dialogue]]
speaker = "unk"
original = "その剣は舗装された地面を切り裂き、蹄がビルを蹴ると、砕けたコンクリートが散乱する。"
translation = "그 검은 포장된 지면을 찢어발기고, 말굽이 빌딩을 걷어차자 부서진 콘크리트 파편이 흩날린다."

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「えっと、えっと、えっと……」"
translation = "「에또, 에또, 에또……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "（デネブからの攻撃が始まったってこと？\u3000こんなに早くに始まるなんて──）"
translation = "(데네브로부터의 공격이 시작됐다는 거야? 이렇게 빨리 시작되다니──)"

[[dialogue]]
speaker_original = "スレイプニル"
speaker_translation = "슬레이프니르"
original = "「ヒヒィイン！」"
translation = "「히히이잉!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ベアト、逃げろ！」"
translation = "「베아트, 도망쳐!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「あ──！？」"
translation = "「아──!?」"

[[dialogue]]
speaker = "unk"
original = "ベアトリスにガーディアンの刃が迫るが──"
translation = "베아트리스에게 가디언의 칼날이 육박하지만──"

[[dialogue]]
speaker_original = "スレイプニル"
speaker_translation = "슬레이프니르"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "しかしベアトリスに届く寸前、切っ先が止まった。"
translation = "하지만 베아트리스에게 닿기 직전, 칼끝이 멈췄다."

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「動かなくなった！？」"
translation = "「움직이지 않아!?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「理由はわからないが──好機だ！」"
translation = "「이유는 모르겠지만── 기회다!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「今度は仕留めるぞ！\u3000力を合わせろ！」"
translation = "「이번에야말로 해치우자! 힘을 합쳐!」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「了解。ちゃんと決めてね」"
translation = "「라져. 제대로 끝내줘」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「任せろ！\u3000メテオライトキャリバーッ！！」"
translation = "「맡겨둬! 메테오라이트 캐리버!!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「対象撃破。大丈夫か、ベアト？」"
translation = "「대상 격파. 괜찮아, 베아트?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「は、はい……」"
translation = "「네, 네……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「戦闘中に気を抜くな。無事だったから良かったものの、さっきは危なかったぞ」"
translation = "「전투 중에 방심하지 마. 무사했으니 망정이지, 방금은 위험했다고」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「すみません……」"
translation = "「죄송합니다……」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「おや、また敬語？\u3000戻っちゃった？」"
translation = "「어라, 다시 존댓말? 돌아와 버렸어?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ああいえ、その、ごめんなさいっ」"
translation = "「아, 아니, 그게, 죄송해요!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「出遅れてしまったが、星徒会と早く合流しよう。魔王の方が気になる──」"
translation = "「늦어버렸지만, 성도회와 빨리 합류하자. 마왕 쪽이 신경 쓰여──」"

[[dialogue]]
speaker = "？？？"
original = "「さて、私もそろそろ舞台に上がろうか」"
translation = "「자, 나도 슬슬 무대에 올라가 볼까」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「！？\u3000この声は──」"
translation = "「!? 이 목소리는──」"

[[dialogue]]
speaker = "unk"
original = "梨緒が咄嗟に背後を振り返る。"
translation = "리오가 찰나에 뒤를 돌아본다."

[[dialogue]]
speaker = "unk"
original = "そして次の瞬間、梨緒の眼が驚愕に見開かれた。"
translation = "그리고 다음 순간, 리오의 눈이 경악으로 크게 떠졌다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ジグ……！？」"
translation = "「지그……!?」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「おや。私のことを知っているのかい？\u3000どこかで会ったかな」"
translation = "「어라. 나를 알고 있는 건가? 어디선가 만난 적이 있었나」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「あたしは知らないぞ。誰だオマエは！？」"
translation = "「난 모른다고. 누구냐 넌!?」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「そうだね、初対面だから名乗らせてもらおう」"
translation = "「그렇네, 초면이니 통성명을 하도록 하지」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「私は<ruby>Ｚ<rt>ジグ</rt></ruby>。“真なる神の騎士”だ」"
translation = "「나는 <ruby>Z<rt>지그</rt></ruby>. “진정한 신의 기사”다」"

