[[dialogue]]
speaker = "unk"
original = "ロストアイテム捜索パーティの分断……そのきっかけは、ほんの些細なことだった。"
translation = "로스트 아이템 수색 파티의 분단…… 그 계기는 아주 사소한 일이었다."

[[dialogue]]
speaker = "unk"
original = "プリムラがサチと口喧嘩して、そのままお互いにヒートアップしてしまい━━"
translation = "프리뮬러가 사치와 말다툼을 하다가 그대로 서로 열이 올라버려━━"

[[dialogue]]
speaker = "プリムラ"
original = "「――ふん。サチがこんな体たらくではやってられん」"
translation = "「――흥. 사치가 이런 꼴이라니 더는 못 해 먹겠구나」"

[[dialogue]]
speaker = "プリムラ"
original = "「我は別行動させてもらうぞ」"
translation = "「나는 따로 행동하겠느니라」"

[[dialogue]]
speaker = "unk"
original = "そう言って１人、違う場所へ向かおうとする。"
translation = "그렇게 말하고 혼자 다른 곳으로 향하려 한다."

[[dialogue]]
speaker = "unk"
original = "それを放っておけず、サチの方はトマルに任せて、マトイと一緒にプリムラの後を追いかけることにした――"
translation = "그걸 내버려 둘 수 없어 사치 쪽은 토마루에게 맡기고 마토이와 함께 프리뮬러의 뒤를 쫓기로 했다――"

[[dialogue]]
speaker = "プリムラ"
original = "「全く、別に我１人でも困らんのに、わざわざ追いかけてくるとは……お節介な眷族じゃ」"
translation = "「정말이지, 딱히 나 혼자라도 상관없거늘 굳이 쫓아오다니…… 참견쟁이 권속이로구나」"

[[dialogue]]
speaker = "unk"
original = "聞きたいことがあったから"
translation = "묻고 싶은 게 있어서"

[[dialogue]]
speaker = "プリムラ"
original = "「ふん。あいにく我は今、機嫌が悪いのじゃ。喧嘩の仲裁とかぬかすのであれば、なにも答えてやらぬぞ」"
translation = "「흥. 안타깝게도 나는 지금 기분이 좋지 않느니라. 싸움 중재 같은 소리를 할 거라면 아무것도 대답해 주지 않을 것이니라」"

[[dialogue]]
speaker = "プリムラ"
original = "「――なぬ？\u3000記憶喪失だから、サチと我がそもそもどういう関係なのか、よくわかってないじゃと？」"
translation = "「――뭐라? 기억상실이라 사치와 내가 애초에 어떤 관계인지 잘 모르겠다고?」"

[[dialogue]]
speaker = "プリムラ"
original = "「はぁ……そうじゃったな。まあよい。貴様が記憶を失ったのは、一部我のせいでもある」"
translation = "「하아…… 그랬었지. 뭐 좋다. 네가 기억을 잃은 건 일부 내 탓이기도 하니까」"

[[dialogue]]
speaker = "プリムラ"
original = "「……我がもともと賢者の石というロストアイテムであることは、もう話したじゃろう？」"
translation = "「……내가 원래 현자의 돌이라는 로스트 아이템이라는 건 이미 이야기했었지?」"

[[dialogue]]
speaker = "プリムラ"
original = "「我の真の名は、何者かが賢者の石を使って作り出した終末兵器『メルクリウス』という」"
translation = "「나의 진정한 이름은 누군가가 현자의 돌을 사용해 만들어낸 종말 병기 『메르쿠리우스』라고 하느니라」"

[[dialogue]]
speaker = "プリムラ"
original = "「言っておくが、我が悪の終末兵器だというのは自称ではない。今から約１年前、我は何者かによって流星市国に投入された」"
translation = "「말해두지만 내가 악의 종말 병기라는 건 자칭이 아니니라. 지금으로부터 약 1년 전, 나는 누군가에 의해 유성시국에 투입되었느니라」"

[[dialogue]]
speaker = "プリムラ"
original = "「その目的は、流星市国を中心にリクリエを引き起こす為じゃ」"
translation = "「그 목적은 유성시국을 중심으로 리크리에를 일으키기 위함이지」"

[[dialogue]]
speaker = "マトイ"
original = "「ま、待って待って！\u3000人為的にリクリエを起こそうとしたやつがいるってこと！？\u3000それって一体、誰なの！？」"
translation = "「잠, 잠깐 잠깐! 인위적으로 리크리에를 일으키려 한 녀석이 있다는 거야!? 그게 대체 누구야!?」"

[[dialogue]]
speaker = "プリムラ"
original = "「我にもわからん！」"
translation = "「나도 모르느니라!」"

[[dialogue]]
speaker = "マトイ"
original = "「わからん、って……！」"
translation = "「모른다니……!」"

[[dialogue]]
speaker = "プリムラ"
original = "「何者かから、世界を滅ぼすように命令を受けて目覚めたのは確かじゃが、その者に関する情報は、我の中にも全く存在しないのじゃ」"
translation = "「누군가로부터 세계를 멸망시키라는 명령을 받고 깨어난 것은 확실하나, 그자에 관한 정보는 내 안에도 전혀 존재하지 않느니라」"

[[dialogue]]
speaker = "マトイ"
original = "「それって……その何者かが自分の正体を隠そうとしたってこと？」"
translation = "「그건…… 그 누군가가 자신의 정체를 숨기려 했다는 거야?」"

[[dialogue]]
speaker = "プリムラ"
original = "「おそらくはな」"
translation = "「아마도 그렇겠지」"

[[dialogue]]
speaker = "マトイ"
original = "「で、でも、プリムラちゃんが本当に終末兵器なら、なんでニュースになったりしてないの？\u3000なにか大事件になっててもおかしくないよね？」"
translation = "「하, 하지만 프리뮬러 짱이 정말로 종말 병기라면 왜 뉴스 같은 데 안 나왔어? 뭔가 큰 사건이 됐어도 이상하지 않잖아?」"

[[dialogue]]
speaker = "プリムラ"
original = "「我が投入された直後、活動を開始しようとしたその瞬間に、最悪な相手と遭遇したからじゃ」"
translation = "「내가 투입된 직후, 활동을 개시하려던 그 순간에 최악의 상대와 조우했기 때문이니라」"

[[dialogue]]
speaker = "unk"
original = "それって、もしかして……？"
translation = "그건 혹시……?"

[[dialogue]]
speaker = "プリムラ"
original = "「そう、サチのやつじゃ。運の悪いことに、我が目覚めたその時、すぐ近くで、あやつは別のロストアイテムを回収し終わった直後じゃった」"
translation = "「그래, 사치 녀석이니라. 운 없게도 내가 깨어난 그때, 바로 근처에서 그 녀석은 다른 로스트 아이템을 막 회수해낸 직후였느니라」"

[[dialogue]]
speaker = "プリムラ"
original = "「そして、これまた不運にも、トレジアンナが人払いの星術を使っていた為、我の存在は誰に知られることもなく、サチと出会って、戦い――」"
translation = "「그리고 이 또한 불운하게도 트레지안나가 인척 차단 성술을 쓰고 있었기에 내 존재는 누구에게도 알려지지 않은 채 사치와 만나 싸웠고――」"

[[dialogue]]
speaker = "プリムラ"
original = "「運勢最悪なことに、サチが回収したばかりのロストアイテムによって、力の大部分を封印されて、敗れ去ったのじゃ」"
translation = "「운세 최악이게도 사치가 막 회수한 로스트 아이템에 의해 힘의 대부분을 봉인당해 패배하고 말았느니라」"

[[dialogue]]
speaker = "プリムラ"
original = "「その後はあの馬鹿、何を思ったか我を生かして更生させるとか言い出して……今に至るというわけじゃ」"
translation = "「그 후에는 그 바보가 무슨 생각을 했는지 나를 살려두고 갱생시키겠다느니 소리를 해대서…… 지금에 이르게 된 것이니라」"

[[dialogue]]
speaker = "unk"
original = "なんとなく、２人の関係はわかったよ"
translation = "어느 정도 두 사람의 관계는 알겠어"

[[dialogue]]
speaker = "プリムラ"
original = "「つまり、我とサチはもともと敵同士だったというわけじゃ。因縁の相手……別に喧嘩してもおかしくはなかろう？」"
translation = "「즉 나와 사치는 원래 적대 관계였다는 것이니라. 인연의 상대…… 딱히 싸워도 이상할 건 없지 않느냐?」"

[[dialogue]]
speaker = "プリムラ"
original = "「――なんじゃ、眷族よ。まだ納得のいってなさそうな顔じゃな？」"
translation = "「――뭐냐, 권속이여. 아직 납득이 안 간다는 표정이구나?」"

[[dialogue]]
speaker = "unk"
original = "今のプリムラは、サチに何か怒ってるよね？"
translation = "지금 프리뮬러는 사치에게 뭔가 화가 나 있지?"

[[dialogue]]
speaker = "プリムラ"
original = "「……だったら、なんだと言うんじゃ？\u3000なにに対して怒っているか知りたいとでも？」"
translation = "「……그렇다면 뭐 어쨌다는 것이냐? 무엇 때문에 화가 났는지 알고 싶기라도 하다는 것이냐?」"

[[dialogue]]
speaker = "プリムラ"
original = "「我は言う気はないぞ。たとえ眷族……貴様であってもじゃ」"
translation = "「나는 말할 생각 없느니라. 설령 권속…… 너라고 해도 말이다」"

[[dialogue]]
speaker = "プリムラ"
original = "「第一、別に言わなくとも、ロストアイテムを回収し、その能力を解除すれば、サチも貴様も忘れている記憶を取り戻す」"
translation = "「애초에 굳이 말하지 않아도 로스트 아이템을 회수해서 그 능력을 해제하면 사치도 너도 잊고 있는 기억을 되찾을 것이니라」"

[[dialogue]]
speaker = "プリムラ"
original = "「そうすれば、我がわざわざ口にする必要はない。違うか？\u3000眷族よ」"
translation = "「그렇게 되면 내가 굳이 입 밖으로 낼 필요는 없지. 아니냐? 권속이여」"

[[dialogue]]
speaker = "マトイ"
original = "「会長、ちょっと……」"
translation = "「회장님, 잠깐만요……」"

[[dialogue]]
speaker = "unk"
original = "そこでマトイが、耳打ちしてくる。"
translation = "거기서 마토이가 귓속말을 해온다."

[[dialogue]]
speaker = "マトイ"
original = "「プリムラちゃんとサチちゃんを仲直りさせる為にも、トマルが教えてくれた秘策を使うべきじゃない？」"
translation = "「프리뮬러 짱이랑 사치 짱을 화해시키기 위해서라도 토마루가 알려준 비책을 써야 하지 않을까?」"

[[dialogue]]
speaker = "unk"
original = "（試しにやってみるか……）"
translation = "(시험 삼아 해볼까……)"

[[dialogue]]
speaker = "プリムラ"
original = "「なんじゃ、まだなにか言うことがあるのか、眷族よ？\u3000なんと言われようとも、我は――」"
translation = "「뭐냐, 아직 더 할 말이 있는 것이냐, 권속이여? 무슨 말을 듣든 나는――」"

[[dialogue]]
speaker = "プリムラ"
original = "「って、いきなり我の手を取ったりして……なんじゃ？」"
translation = "「앗, 갑자기 내 손을 잡다니…… 뭐냐?」"

[[dialogue]]
speaker = "プリムラ"
original = "「――いま、気づいたじゃと？\u3000一体何に……」"
translation = "「――지금 깨달았다고? 대체 무엇을……」"

[[dialogue]]
speaker = "unk"
original = "プリムラって……すごく可愛いよね！"
translation = "프리뮬러는…… 정말 귀엽네!"

[[dialogue]]
speaker = "プリムラ"
original = "「ファッ！？」"
translation = "「화앗!?」"

[[dialogue]]
speaker = "unk"
original = "プリムラを異性として見るなら、すごく美少女だと思う。小さくて可愛いし、金色の髪も褐色の肌も宝石のようだ。なにより――"
translation = "프리뮬러를 이성으로 본다면 정말 미소녀라고 생각한다. 작고 귀여운 데다 금빛 머리카락도 갈색 피부도 보석 같다. 무엇보다――"

[[dialogue]]
speaker = "unk"
original = "今こうして、サチに怒りつつも、サチの記憶を取り戻す為にロストアイテムを回収しようと奔走していることが、頭を撫でたくなるくらい可愛いと思う。"
translation = "지금 이렇게 사치에게 화를 내면서도 사치의 기억을 되찾기 위해 로스트 아이템을 회수하려고 동분서주하는 모습이 머리를 쓰다듬어 주고 싶을 만큼 귀엽다고 생각한다."

[[dialogue]]
speaker = "unk"
original = "そんな風に、プリムラを褒めまくる。"
translation = "그런 식으로 프리뮬러를 엄청나게 칭찬한다."

[[dialogue]]
speaker = "プリムラ"
original = "「な、撫でたくなるっていうか……もう既に我の頭を撫でているではないか！\u3000ええい、気安く我の頭を撫でるでない！」"
translation = "「쓰, 쓰다듬고 싶다니…… 이미 내 머리를 쓰다듬고 있지 않느냐! 에잇, 함부로 내 머리를 쓰다듬지 말거라!」"

[[dialogue]]
speaker = "プリムラ"
original = "「それに可愛いとか、馬鹿にしておるのか、貴様！？\u3000我は悪の終末兵器なのじゃぞ！？」"
translation = "「게다가 귀엽다니, 바보 취급 하는 것이냐, 네놈!? 나는 악의 종말 병기이니라!?」"

[[dialogue]]
speaker = "プリムラ"
original = "「そんな安い褒め言葉で我が喜ぶとでも！？\u3000フ……フヘへへ♪」"
translation = "「그런 값싼 칭찬에 내가 기뻐할 줄 알고!? 후…… 후헤헤헤♪」"

[[dialogue]]
speaker = "unk"
original = "（き、効いてるーーーっ！？）"
translation = "(머, 먹히고 있어ーーー!?)"

[[dialogue]]
speaker = "マトイ"
original = "（ちょ、チョロい……！\u3000トマルの言ってた通り、誰かに騙されないか不安になるレベルで、褒め言葉に弱い……！）"
translation = "(너, 너무 쉬워……! 토마루가 말한 대로 누가 속이지 않을까 불안해질 정도로 칭찬에 약해……!)"

[[dialogue]]
speaker = "プリムラ"
original = "「頭をそんな撫でたら髪が乱れるじゃろうが、さっさと手を退けんか馬鹿者め！\u3000フヘへへ……♪」"
translation = "「머리를 그렇게 쓰다듬으면 머리카락이 헝클어지지 않느냐, 어서 손을 떼지 못할까 바보 같은 녀석! 후헤헤헤……♪」"

[[dialogue]]
speaker = "マトイ"
original = "（と言いつつ、もっと撫でろという顔をしている……！）"
translation = "(라고 말하면서 더 쓰다듬어 달라는 표정을 짓고 있어……!)"

[[dialogue]]
speaker = "マトイ"
original = "（会長、プリムラちゃんから聞き出すなら、デレデレしてる今がチャンスだよっ！）"
translation = "(회장님, 프리뮬러 짱에게서 정보를 캐내려면 데레데레하고 있는 지금이 찬스야!)"

[[dialogue]]
speaker = "unk"
original = "マトイから目配せをされて、少し考える。"
translation = "마토이의 눈짓을 받고 조금 생각한다."

[[dialogue]]
speaker = "unk"
original = "プリムラは素直じゃないし、自分のことを悪だと言う。だけど……さっき褒めた言葉は嘘じゃない。"
translation = "프리뮬러는 솔직하지 못하고 자신을 악이라고 말한다. 하지만…… 방금 칭찬한 말은 거짓이 아니다."

[[dialogue]]
speaker = "プリムラ"
original = "「――なぬ？\u3000我にお願いごとがあるじゃと？」"
translation = "「――뭐냐? 나에게 부탁할 것이 있다고?」"

[[dialogue]]
speaker = "プリムラ"
original = "「し、仕方がないのう……眷族の頼みなら、聞いてやらないこともないぞ？\u3000一体何じゃ？」"
translation = "「어, 어쩔 수 없구나…… 권속의 부탁이라면 들어주지 못할 것도 없느니라. 대체 무엇이냐?」"

[[dialogue]]
speaker = "unk"
original = "素直に言えないことってあると思う。でも――"
translation = "솔직하게 말할 수 없는 것도 있다고 생각해. 하지만――"

[[dialogue]]
speaker = "unk"
original = "素直に言わなきゃ伝わらないこともあって……勇気を出して伝えなきゃいけない時もあるんだって、覚えておいて欲しい。"
translation = "솔직하게 말하지 않으면 전해지지 않는 것도 있어서…… 용기를 내서 전해야 할 때도 있다는 걸 기억해 줬으면 좋겠어."

[[dialogue]]
speaker = "プリムラ"
original = "「……ふん」"
translation = "「……흥」"

[[dialogue]]
speaker = "プリムラ"
original = "「我が眷族の忠告なら、仕方がない。一応……覚えておくのじゃ」"
translation = "「나의 권속의 충고라면 어쩔 수 없지. 일단은…… 기억해 두겠느니라」"

[[dialogue]]
speaker = "unk"
original = "そう言って、唇を尖らせるプリムラを見て――"
translation = "그렇게 말하며 입술을 삐죽이는 프리뮬러를 보고――"

[[dialogue]]
speaker = "unk"
original = "本当は、怒っているんじゃなくて、拗ねているのかもしれない……なんだかそんな風に感じたのだった。"
translation = "사실은 화가 난 게 아니라 토라져 있는 것일지도 모른다…… 왠지 그런 느낌이 들었다."

