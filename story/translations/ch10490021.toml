[[dialogue]]
speaker = "unk"
original = "第１話,笑顔の似合う彼女,P"
translation = "제1화, 미소가 어울리는 그녀, P"

[[dialogue]]
speaker = "unk"
original = "紅明と恋人関係になって、クリスマスが近付いてきたある日のこと。２人でデートに行こうと待ち合わせていたのだが――"
translation = "코우메이와 연인 사이가 되고 크리스마스가 다가온 어느 날. 둘이서 데이트를 가기로 약속하고 만났는데──"

[[dialogue]]
speaker = "紅明"
original = "「ダーリン～♪\u3000お待たせ～☆」"
translation = "「달링~♪ 오래 기다렸지~☆」"

[[dialogue]]
speaker = "unk"
original = "紅明、その格好は……！？"
translation = "코우메이, 그 차림은……!?"

[[dialogue]]
speaker = "紅明"
original = "「うしし♪\u3000驚いた？\u3000変装っしょ、変装♪」"
translation = "「우시시♪ 놀랐어? 변장이라구, 변장♪」"

[[dialogue]]
speaker = "紅明"
original = "「――逆に目立つと思う？\u3000こういうのは堂々としてる方が逆にバレないもんだって♪」"
translation = "「──오히려 눈에 띌 것 같아? 이런 건 당당하게 있는 게 오히려 안 들키는 법이라구♪」"

[[dialogue]]
speaker = "紅明"
original = "「というわけで、ひと足早いクリスマス気分で、デートにレッツゴ～♪」"
translation = "「그런 고로 한발 빠른 크리스마스 기분으로 데이트에 렛츠 고~♪」"

[[dialogue]]
speaker = "紅明"
original = "「ダーリン、見て見て、これ！\u3000めっちゃ可愛くない？\u3000アタシにピッタリの牛モチーフのリング♪\u3000あっ、しかも色違いもあるじゃ～ん☆」"
translation = "「달링, 이것 좀 봐봐! 완전 귀엽지 않아? 나한테 딱 맞는 소 모티브 링♪ 앗, 게다가 다른 색깔도 있잖아~☆」"

[[dialogue]]
speaker = "紅明"
original = "「プチプラのアクセサリーだから安いし、ペアで買っちゃう？\u3000――高いのじゃなくていいのかって？」"
translation = "「저렴한 액세서리라 싸니까 세트로 살까? ──비싼 거 아니어도 괜찮냐구?」"

[[dialogue]]
speaker = "紅明"
original = "「アタシはプチプラ――値段が安いアクセサリーって好きなんだよね～。学生らしさっていうかさ。それに安いからこそ、面白いのもあるしね！」"
translation = "「나는 이런 저렴한 액세서리 좋아하거든~. 학생답기도 하고 말이야. 게다가 싸니까 오히려 재미있는 것도 있고!」"

[[dialogue]]
speaker = "unk"
original = "紅明が付けたら、またバズるかもしれないな"
translation = "코우메이가 하면 또 화제가 될지도 모르겠네"

[[dialogue]]
speaker = "紅明"
original = "「いや～、現代のＳＮＳってすごいよね～。アタシ的には、好きだと感じたものを投稿してるだけなんだけど、あっという間に広まって、インフルエンサーなんて呼ばれたりしてさ」"
translation = "「이랴~ 현대의 SNS는 대단하다니까~. 나로서는 좋다고 느낀 걸 올릴 뿐인데 순식간에 퍼져서 인플루언서라고 불리기도 하고 말이야」"

[[dialogue]]
speaker = "紅明"
original = "「タレント冥利には尽きるんだけどね。バズった影響で商品が売れたりして、喜んでくれる人もいたりして。でも、有名になると、それはそれで――」"
translation = "「탤런트로서는 보람 있는 일이지만 말이야. 화제가 된 영향으로 상품이 팔리거나 해서 기뻐해 주는 사람도 있고. 하지만 유명해지면 그것대로──」"

[[dialogue]]
speaker = "女性Ａ"
original = "「ねぇ、あのサンタコスのめっちゃ可愛い子、もしかして芸能人の紅明ちゃんじゃない……！？」"
translation = "「어머, 저 산타 코스프레 한 완전 귀여운 애, 혹시 연예인 코우메이 짱 아니야……!?」"

[[dialogue]]
speaker = "女性Ｂ"
original = "「え、マジ？\u3000うわっ、本物じゃん……！\u3000一緒に写真撮りたいんだけど～！」"
translation = "「어, 진짜? 우와, 진짜잖아……! 같이 사진 찍고 싶은데~!」"

[[dialogue]]
speaker = "女性Ａ"
original = "「あのっ、牛紅明ちゃんですよね？\u3000私、大ファンです……！\u3000よかったら、サインもらえないでしょうか……！」"
translation = "「저기, 규우 코우메이 짱 맞죠? 저 완전 팬이에요……! 괜찮으시다면 사인 좀 받을 수 있을까요……!」"

[[dialogue]]
speaker = "紅明"
original = "「変装がバレた！？」"
translation = "「변장이 들켰다!?」"

[[dialogue]]
speaker = "unk"
original = "ですよねー"
translation = "그럴 줄 알았어"

[[dialogue]]
speaker = "紅明"
original = "「堂々としてたら逆にバレない説、ダメだったか～！\u3000うぅ～……アタシの大ファンだって、言ってくれるのは嬉しいけど……！」"
translation = "「당당하게 있으면 오히려 안 들킨다는 설, 안 통했네~! 으으~…… 내 열성 팬이라고 말해주는 건 기쁘지만……!」"

[[dialogue]]
speaker = "紅明"
original = "「今日はオフなんだ、すまねぇ！\u3000逃げるぜ、ダーリン！」"
translation = "「오늘은 쉬는 날이라 미안해! 도망가자, 달링!」"

[[dialogue]]
speaker = "女性Ｂ"
original = "「あっ、待って、紅明ちゃん！\u3000せめて握手！\u3000握手だけでも～！」"
translation = "「앗, 기다려요 코우메이 짱! 적어도 악수! 악수만이라도~!」"

[[dialogue]]
speaker = "紅明"
original = "「あ～、今日のデートも、ファンの子たちにバレちった……。ごめんね、ダーリン」"
translation = "「아~ 오늘 데이트도 팬들한테 들켜버렸네……. 미안해, 달링」"

[[dialogue]]
speaker = "unk"
original = "なんだか、告白した日のことを思い出すな"
translation = "왠지 고백했던 날이 생각나네"

[[dialogue]]
speaker = "紅明"
original = "「あはは、そうだよね。前に街でデートした時――」"
translation = "「아하하, 그렇네. 전에 거리에서 데이트했을 때──」"

[[dialogue]]
speaker = "紅明"
original = "「今日みたいにファンの子に見つかっちゃって、何度もデートが中断になっちゃって……」"
translation = "「오늘처럼 팬들한테 들켜서 몇 번이나 데이트가 중단됐었지……」"

[[dialogue]]
speaker = "紅明"
original = "「落ち込んでたアタシに、ダーリンが『これからもデートの機会は沢山あるから大丈夫』って言ってくれたんだよね」"
translation = "「풀 죽어 있던 나한테 달링이 『앞으로 데이트할 기회는 많으니까 괜찮아』라고 말해줬었지」"

[[dialogue]]
speaker = "紅明"
original = "「アタシのことが好きだから、デートするのが大変でも気にしないって、笑顔で。んモー、ときめきＭＡＸハートだったよね」"
translation = "「나를 좋아하니까 데이트하는 게 힘들어도 상관없다면서 웃으며 말이야. 음모, 설렘 MAX 하트였지」"

[[dialogue]]
speaker = "紅明"
original = "「今日はさ、アタシ的にその時のリベンジデートのつもりだったんよ。でも、やっぱそう上手くはいかんね……」"
translation = "「오늘은 말이야, 나름대로 그때의 리벤지 데이트일 생각이었어. 근데 역시 그렇게 잘 풀리지는 않네……」"

[[dialogue]]
speaker = "紅明"
original = "「ダーリンに迷惑かけたくないし、気分切り替えて、家デートにしよっか。いつも通りになっちゃうけど……」"
translation = "「달링한테 폐 끼치고 싶지 않으니까 기분 전환해서 집 데이트로 할까. 평소처럼 되어버리겠지만……」"

[[dialogue]]
speaker = "unk"
original = "紅明に悲しそうな顔は似合わない"
translation = "코우메이에게 슬픈 표정은 어울리지 않아"

[[dialogue]]
speaker = "紅明"
original = "「え？\u3000ダーリン……？」"
translation = "「어? 달링……?」"

[[dialogue]]
speaker = "紅明"
original = "「ヘイ！\u3000アタシのファンだと言ってくれた、そこの女の子たち！\u3000世の為人の為、元気なサンタが戻ってきたぜ☆」"
translation = "「헤이! 내 팬이라고 말해준 거기 여자애들! 세상을 위해 사람을 위해, 활기찬 산타가 돌아왔다구☆」"

[[dialogue]]
speaker = "女性Ａ"
original = "「えっ、紅明ちゃん！？\u3000なんで……！？」"
translation = "「어, 코우메이 짱!? 어째서……!?」"

[[dialogue]]
speaker = "紅明"
original = "「さっきは断っちゃったけど、アタシ、ファンの子たちには笑顔になって欲しいからさ。サインと、一緒に写真撮りたいって、言ってたじゃん？\u3000リベンジさせてくれないかな？」"
translation = "「아까는 거절했지만 나, 팬들이 미소 지었으면 좋겠거든. 사인하고 같이 사진 찍고 싶다고 했었지? 리벤지하게 해주지 않을래?」"

[[dialogue]]
speaker = "女性Ｂ"
original = "「わ、私たちの為にわざわざ……！？\u3000やばっ……なんか感激で涙出てきたんだけど……！」"
translation = "「저, 저희를 위해서 일부러……!? 대박…… 왠지 감격해서 눈물 나는데……!」"

[[dialogue]]
speaker = "紅明"
original = "「って、そこは笑わんか～い！\u3000なんつってね♪\u3000あと、サンタとして……はいこれ、クリスマスプレゼント☆」"
translation = "「이봐, 거기선 웃어야지~! 농담이라구♪ 그리고 산타로서…… 자 이거, 크리스마스 선물☆」"

[[dialogue]]
speaker = "紅明"
original = "「中身は、アタシが最近気に入ってる、プチプラのアクセなんだけど、気に入ってくれたら嬉しいな♪」"
translation = "「내용물은 내가 요즘 꽂힌 저렴한 액세서리인데, 마음에 들면 좋겠네♪」"

[[dialogue]]
speaker = "紅明"
original = "「日が落ちて、アタシに気付く人もいなくなってきたかな？」"
translation = "「해가 지고 나니 나를 알아보는 사람도 없어진 걸까?」"

[[dialogue]]
speaker = "紅明"
original = "「ダーリン、ありがとね。ファンの人たちの笑顔を沢山見れて、すごく嬉しかったよ」"
translation = "「달링, 고마워. 팬들의 미소를 잔뜩 볼 수 있어서 정말 기뻤어」"

[[dialogue]]
speaker = "unk"
original = "俺が提案したのは、バレるのを気にせずデートをして、紅明に気付いてくれたファンがいたら、足を止めてきちんと対応するというものだった。"
translation = "내가 제안한 것은 들키는 걸 신경 쓰지 말고 데이트를 하다가 코우메이를 알아본 팬이 있으면 발걸음을 멈추고 제대로 대응해 주자는 것이었다."

[[dialogue]]
speaker = "紅明"
original = "「だけど、ダーリンは楽しかった？\u3000人の数が多くて対応しきれない時に、マネージャーっぽいことをやらせちゃってたけど……」"
translation = "「하지만 달링은 즐거웠어? 사람 수가 많아서 대응하기 힘들 때 매니저 같은 일을 시켜버렸는데……」"

[[dialogue]]
speaker = "unk"
original = "俺も、紅明の笑顔が見れて嬉しかった"
translation = "나도 코우메이의 미소를 볼 수 있어서 기뻤어"

[[dialogue]]
speaker = "紅明"
original = "「ダーリン……！\u3000やっぱりアタシ、今のダーリンが大好きっしょ<emoji=heart04>」"
translation = "「달링……! 역시 난 지금의 달링이 너무 좋다구❤️」"

[[dialogue]]
speaker = "紅明"
original = "「ん～、ちゅっちゅっ<emoji=heart04>」"
translation = "「응~ 츄츄❤️」"

[[dialogue]]
speaker = "unk"
original = "ちょっ！？\u3000暗くてもキスはバレるから！"
translation = "잠깐!? 어두워도 키스는 들킨다니까!"

[[dialogue]]
speaker = "紅明"
original = "「えへへ～<emoji=heart04>\u3000それじゃあ、続きはこの後、アタシの家に行ったら、ゆっくりと……ね？」"
translation = "「에헤헤~❤️ 그럼 뒷이야기는 이따가 내 집에 가면 천천히…… 응?」"

[[dialogue]]
speaker = "紅明"
original = "「手を繋いで帰るくらいはいいっしょ？\u3000それに、ほら――」"
translation = "「손을 잡고 돌아가는 정도는 괜찮잖아? 게다가 봐봐──」"

[[dialogue]]
speaker = "紅明"
original = "「恋人繋ぎした手をこうして……ダーリンのコートのポケットに入れれば、バレないっしょ<emoji=heart04>」"
translation = "「연인끼리 맞잡은 손을 이렇게…… 달링 코트 주머니에 넣으면 안 들키잖아❤️」"

[[dialogue]]
speaker = "unk"
original = "その後はファンに見つかることなく、紅明とぴったり寄り添いながら、帰り道の時間を過ごすだった――"
translation = "그 후로는 팬들에게 들키는 일 없이 코우메이와 딱 붙어서 귀갓길 시간을 보냈다──"

