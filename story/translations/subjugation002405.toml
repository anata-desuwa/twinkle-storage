[[dialogue]]
speaker = "unk"
original = "サチの幸運がなくなってから２週間ほど経ったある日、俺たちはトレジアンナさんから呼び出しを受けて、再び集合することになった――"
translation = "사치의 행운이 없어진 지 2주 정도 지난 어느 날, 우리들은 트레지안나 씨의 호출을 받고 다시 집합하게 되었다──"

[[dialogue]]
speaker = "トレジアンナ"
original = "「じゃじゃ～ん☆\u3000これを見て下さい、みなさん！」"
translation = "「짜잔~☆ 이것 좀 보세요, 여러분!」"

[[dialogue]]
speaker = "トマル"
original = "「トレジアンナさま、それは……新しい武器、ですか？」"
translation = "「트레지안나 님, 그것은…… 새로운 무기인가요?」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「はい♪\u3000私も現代っぽく戦闘スタイルをアップデートしようと思って、ネビュラから提供して頂いた技術を元に作り出した、魔法少女ステッキです♪」"
translation = "「네♪ 저도 현대스럽게 전투 스타일을 업데이트하려고 네뷸라에서 제공받은 기술을 바탕으로 만들어낸 마법소녀 지팡이랍니다♪」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「私は『光の魔女』ではありませんから、当時、『光魔法』の知識は記憶できても、習得だけはできなかったんですよ」"
translation = "「저는 『빛의 마녀』가 아니니까 당시 『빛 마법』 지식은 기억할 수 있어도 습득만은 할 수 없었거든요」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「ですが、ネビュラの現代技術によって今、ついに疑似的に再現できるようになり、コレクション解禁になったというわけです♪」"
translation = "「하지만 네뷸라의 현대 기술 덕분에 지금 드디어 의사적으로 재현할 수 있게 되어 컬렉션 해금되었다는 이야기예요♪」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「あとは、もう１つ。サチさんにも渡したいものがあって」"
translation = "「그리고 하나 더. 사치 씨에게도 주고 싶은 게 있어서요」"

[[dialogue]]
speaker = "サチ"
original = "「私に、ですか？」"
translation = "「저에게요?」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「はい。サチさん専用にアップデートした『セレスティア』です」"
translation = "「네. 사치 씨 전용으로 업데이트한 『셀레스티아』예요」"

[[dialogue]]
speaker = "unk"
original = "トレジアンナさんはそう言って、星騎士が戦闘服へ変身する為に使うそれをサチに渡す。"
translation = "트레지안나 씨는 그렇게 말하며 성기사가 전투복으로 변신하기 위해 사용하는 그것을 사치에게 건넨다."

[[dialogue]]
speaker = "unk"
original = "試して欲しいと言われて、サチが変身してみると――"
translation = "시험해 보라는 말에 사치가 변신해 보자──"

[[dialogue]]
speaker = "サチ"
original = "「この力は……！？」"
translation = "「이 힘은……!?」"

[[dialogue]]
speaker = "unk"
original = "見た目こそ変わらないが、サチ本人だけでなく、俺たちも違いを感じ取ることができた。"
translation = "겉모습은 변하지 않았지만 사치 본인뿐만 아니라 우리들도 차이를 느낄 수 있었다."

[[dialogue]]
speaker = "プリムラ"
original = "「この感じ……シズハと同じなのじゃ！」"
translation = "「이 느낌…… 시즈하와 같느니라!」"

[[dialogue]]
speaker = "シズハ"
original = "「うん。サチちゃんから星力だけじゃなくて、私の中の聖杯ちゃんと同じ――『魔力』が出ているのを感じるよ！」"
translation = "「응. 사치짱에게서 성력뿐만 아니라 내 안의 성배짱과 같은── 『마력』이 나오고 있는 게 느껴져!」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「そう。２人の天才――学園が誇る錬金術師のアニマさんと、ネビュラの現代魔法技術を支える研究者・ツェツィーリエさんに協力をお願いして、共同で作り上げました」"
translation = "「맞아요. 두 명의 천재── 학원이 자랑하는 연금술사인 아니마 선배와 네뷸라의 현대 마법 기술을 지탱하는 연구자 체칠리에 씨에게 협력을 부탁해 공동으로 만들어냈습니다」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「本来星騎士は、魔王である会長さんのような例外を除いて、星力しか使えません」"
translation = "「본래 성기사는 마왕인 회장님 같은 예외를 제외하고 성력밖에 쓸 수 없어요」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「ですが、そのアップデートした戦闘服は、星力を魔力に変換することができ、魔女と同じように『魔法』を使うことができるようになります」"
translation = "「하지만 그 업데이트한 전투복은 성력을 마력으로 변환할 수 있어 마녀와 똑같이 『마법』을 쓸 수 있게 됩니다」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「また、人工ノヴァフォームの技術を取り入れ、事前に星力をチャージしておくことが可能となりました」"
translation = "「또한 인공 노바 폼 기술을 도입해 사전에 성력을 차지해 두는 것이 가능해졌어요」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「この仕様によって、以前よりも高出力かつ、星術と魔法のスムーズな並列使用を実現しています！」"
translation = "「이 사양 덕분에 이전보다 고출력이면서 성술과 마법의 매끄러운 병렬 사용을 실현했답니다!」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「つまり！\u3000正真正銘、サチさん専用の『魔法少女衣装』というわけです！」"
translation = "「즉! 명실상부한 사치 씨 전용 『마법소녀 의상』이라는 거죠!」"

[[dialogue]]
speaker = "サチ"
original = "「私が、魔法を使えるように……？」"
translation = "「내가 마법을 쓸 수 있게……?」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「私の力では現状、サチさんに幸運の力を戻すことはできません」"
translation = "「제 힘으로는 현시점에서 사치 씨에게 행운의 힘을 돌려줄 수는 없어요」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「ですが魔法の力なら、差し上げることができます！\u3000……まあ、サチさんは魔法少女を名乗るのは嫌かもしれませんが」"
translation = "「하지만 마법의 힘이라면 드릴 수 있어요! ……뭐, 사치 씨는 마법소녀라고 자처하는 건 싫을지도 모르겠지만요」"

[[dialogue]]
speaker = "サチ"
original = "「いいえ。トレジアンナさん」"
translation = "「아니요. 트레지안나 씨」"

[[dialogue]]
speaker = "サチ"
original = "「――私のために、ありがとうございます」"
translation = "「──저를 위해 정말 감사해요」"

[[dialogue]]
speaker = "サチ"
original = "「本当は、私のほうからお願いすべきでした。……トレジアンナさんの知っている魔法を、教えてほしいです」"
translation = "「사실은 제가 먼저 부탁드려야 했어요. ……트레지안나 씨가 알고 있는 마법을 가르쳐 주셨으면 해요」"

[[dialogue]]
speaker = "サチ"
original = "「私を、本物の魔法少女にしてくれますか……？」"
translation = "「저를 진짜 마법소녀로 만들어 주시겠어요……?」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "unk"
original = "トレジアンナさんはサチの言葉を聞いて、目を見開いたあと――"
translation = "트레지안나 씨는 사치의 말을 듣고 눈을 크게 뜬 뒤──"

[[dialogue]]
speaker = "トレジアンナ"
original = "「はい、もちろんです！\u3000だって……」"
translation = "「네, 물론이죠! 그야……」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「私はサチさんのお助け妖精ポジションですから♪」"
translation = "「저는 사치 씨의 도우미 요정 포지션이니까요♪」"

[[dialogue]]
speaker = "unk"
original = "そう言って、嬉しそうに微笑むのだった。"
translation = "그렇게 말하며 기쁜 듯이 미소 지었다."

[[dialogue]]
speaker = "unk"
original = "それから数日後――トレジアンナさんの探知魔法に、新たなロストアイテム反応が観測された。"
translation = "그로부터 며칠 뒤── 트레지안나 씨의 탐지 마법에 새로운 로스트 아이템 반응이 관측되었다."

[[dialogue]]
speaker = "unk"
original = "俺たちがそこへ向かうと――"
translation = "우리들이 그곳으로 향하자──"

[[dialogue]]
speaker = "ディーラック"
original = "「やあ。待っていたよ、魔法少女のみんな」"
translation = "「여어. 기다리고 있었다네, 마법소녀 여러분」"

[[dialogue]]
speaker = "unk"
original = "周囲の景色が急に暗くなり、ふわりとディーラックが姿を現す。"
translation = "주변 풍경이 갑자기 어두워지더니 둥실 디럭쿠가 모습을 드러낸다."

[[dialogue]]
speaker = "シズハ"
original = "「ディーちゃん……」"
translation = "「디짱……」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「これは、物理的な出入りを封鎖する結界魔法……！」"
translation = "「이것은 물리적인 출입을 봉쇄하는 결계 마법……!」"

[[dialogue]]
speaker = "ディーラック"
original = "「ボクもそろそろ、決着をつけたいと思っていたからサ。ロストアイテムの反応で、キミたちをおびき出させてもらったよ」"
translation = "「나도 슬슬 결판을 내고 싶다고 생각하던 참이라네. 로스트 아이템 반응으로 너희를 유인했어」"

[[dialogue]]
speaker = "ディーラック"
original = "「で、キミたちももう気づいてるんだろう？\u3000サチちゃんの幸運が、ボクに奪われたことにサ」"
translation = "「그래서 너희도 이제 눈치챘겠지? 사치짱의 행운이 나에게 빼앗겼다는 사실을 말이야」"

[[dialogue]]
speaker = "サチ"
original = "「はい。前にわざわざ姿を現した目的は、それだったんですね」"
translation = "「네. 지난번에 굳이 모습을 드러낸 목적은 그것이었군요」"

[[dialogue]]
speaker = "ディーラック"
original = "「解放のロストアイテムを取られちゃったのは予定外だったけど……でも、そのおかげで<b>これ</b>を作り出すことができたよ」"
translation = "「해방의 로스트 아이템을 뺏긴 건 예정 밖이었지만…… 하지만 그 덕분에 <b>이것</b>을 만들어낼 수 있었다네」"

[[dialogue]]
speaker = "unk"
original = "そう言って、ディーラックが自分の前に浮かせて見せたのは――"
translation = "그렇게 말하며 디럭쿠가 자기 앞에 띄워 보여준 것은──"

[[dialogue]]
speaker = "ディーラック"
original = "「『幸運のロストアイテム』。サチちゃんから奪った能力『<ruby>幸運流星<rt>ラッキースター</rt></ruby>』を元に、ボクが作り上げた逸品サ」"
translation = "「『행운의 로스트 아이템』. 사치짱에게서 빼앗은 능력 『<ruby>행운유성<rt>럭키 스타</rt></ruby>』을 바탕으로 내가 만들어낸 일품이라네」"

[[dialogue]]
speaker = "ディーラック"
original = "「それじゃあ……早速、始めようか。――あ～ん」"
translation = "「그럼…… 바로 시작해 볼까. ──아~앙」"

[[dialogue]]
speaker = "unk"
original = "ディーラックは大きく口を開けると、幸運のロストアイテムをごっくんと飲み込む。そして……"
translation = "디럭쿠는 입을 크게 벌리더니 행운의 로스트 아이템을 꿀꺽 삼킨다. 그리고……"

[[dialogue]]
speaker = "ディーラック"
original = "「――招来」"
translation = "「──초래」"

[[dialogue]]
speaker = "サチ"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "ディーラック"
original = "「さあ、残念だけど――キミたちの運命は、ここからはハズレのみサ……！」"
translation = "「자, 유감스럽지만── 너희의 운명은 이제부터 꽝뿐이라네……!」"

[[dialogue]]
speaker = "unk"
original = "新たな異様へと変貌し、圧倒的な威圧感を放つディーラックとの戦闘が、開始されるのだった――"
translation = "새로운 이형으로 변모하여 압도적인 위압감을 뿜어내는 디럭쿠와의 전투가 시작되었다──"

