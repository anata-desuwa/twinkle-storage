[[dialogue]]
speaker = "unk"
original = "今日はメテオラとの面会のため、ネビュラ基地を訪れていた。"
translation = "오늘은 메테오라와의 면회를 위해, 네뷸라 기지를 방문했다."

[[dialogue]]
speaker = "unk"
original = "名目上は拘束されているメテオラだが、今となってはかなりの自由が許されている。"
translation = "명목상으로는 구속되어 있는 메테오라지만, 지금에 와서는 상당한 자유가 허용되어 있다."

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「えへへへへ、魔王♪\u3000魔王♪\u3000会いに来てくれて嬉しいぞー♪」"
translation = "「에헤헤헤헤, 마왕♪ 마왕♪ 만나러 와줘서 기뻐!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「今日はやけに甘えん坊だね？」"
translation = "「오늘따라 유독 어리광쟁이네?」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「だってー、ずーっとずーっと魔王に会いたかったんだぞー。あたしな、魔王のことを考えるだけで、体がポッポして、ドキドキするようになっちゃったんだぞ？」"
translation = "「그치마안, 계에속 계에속 마왕이 보고 싶었는걸. 나 말이야, 마왕을 생각하는 것만으로도 몸이 화끈거리고 두근두근거리게 되어버렸어.」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「エンジュのこと考えてても、こんな風にならないのになー。でも、ネビュラのお医者さんは、病気じゃないっていうんだぞ……なんなんだ、これー」"
translation = "「엔쥬를 생각해도 이렇지는 않은데 말이야. 하지만 네뷸라의 의사 선생님은 병이 아니라고 하던데…… 대체 뭐야, 이거.」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「はぅ……今もだぞ……魔王の近くにいるとな？\u3000お腹の下の方がムズムズして……キューンってするんだぁ……」"
translation = "「하우…… 지금도야…… 마왕 곁에 있으면 말이지? 배 아래쪽이 근질근질해서…… 찌릿찌릿해……」"

[[dialogue]]
speaker = "unk"
original = "俺を見つめるメテオラの瞳が甘く蕩け、微かな涙を宿している。口から漏れる熱い吐息が、俺の顔をくすぐった。"
translation = "나를 바라보는 메테오라의 눈동자가 달콤하게 녹아내리며, 옅은 눈물을 머금고 있다. 입에서 새어 나오는 뜨거운 숨결이 내 얼굴을 간지럽혔다."

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「お股からとろとろのおしっこ出ちゃうしなー……うぅ……あたしの体、ヘンになっちゃったのかなー……？」"
translation = "「가랑이에서 걸쭉한 오줌이 나와버리고…… 으으…… 내 몸, 이상해져 버린 걸까……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ちょ、ちょっと待って……メテオラ、もしかして、発情してる……？\u3000自分でしたりはしてないのか？\u3000オ、オナニーとか……」"
translation = "「저, 잠시만…… 메테오라, 설마 발정하고 있는 거야……? 스스로 하거나 하지는 않아? 자, 자위라든가……」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「おなにー？\u3000おなにーってなんだ？\u3000おもしろいのか！？\u3000食べたことはないなー！」"
translation = "「자위? 자위가 뭐야? 재미있는 거야!? 먹어본 적은 없는데!」"

[[dialogue]]
speaker = "unk"
original = "メテオラは体型こそ大人のそれだけれど、教育を受ける機会がなかったのか、性に関する知識が皆無らしかった。"
translation = "메테오라는 체형만큼은 성인의 그것이었지만, 교육을 받을 기회가 없었는지 성에 관한 지식이 전무한 듯했다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「面白いっていうか、気持ちいいこと……？\u3000エクスタシー……絶頂に達すると、こう、ふわーって……」"
translation = "「재미있다기보다, 기분 좋은 것……? 엑스터시…… 절정에 달하면 이렇게, 화아아 하고……」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「きもちいいのか？\u3000えくすたしー？\u3000ぜっちょー？\u3000魔王はあたしが知らないの、いろいろ知ってるんだなー！」"
translation = "「기분 좋은 거야? 엑스터시? 절정? 마왕은 내가 모르는 걸 여러 가지 알고 있구나!」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「あたしの体がヘンなのは、おなにーのせいなのか？\u3000なー、なー、魔王、きもちいいこと教えてくれー！」"
translation = "「내 몸이 이상한 건 자위 때문이야? 응? 응? 마왕, 기분 좋은 거 가르쳐줘!」"

[[dialogue]]
speaker = "unk"
original = "性的な行為に対して、無知な彼女に教えてしまっていいものか躊躇いはしたけれど。"
translation = "성적인 행위에 대해 무지한 그녀에게 가르쳐줘도 될지 망설여졌지만."

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「あたし、魔王に触ってほしいし、魔王に触りたいぞ……なー、いいだろー？\u3000痛くしないからー」"
translation = "「나, 마왕이 만져줬으면 좋겠고, 마왕을 만지고 싶어…… 응, 괜찮지? 아프게 안 할 테니까.」"

[[dialogue]]
speaker = "unk"
original = "無意識に発情した熱い体を、無邪気に擦りつけられては、我慢もあっという間に決壊してしまうのだった。"
translation = "무의식중에 발정한 뜨거운 몸을 천진난만하게 비벼대니, 인내심도 순식간에 무너져 내리는 것이었다."

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「服を脱いでベッドに寝るのかー。魔王はヘンなことしたいんだなー？」"
translation = "「옷을 벗고 침대에 눕는 거구나. 마왕은 이상한 걸 하고 싶은 거지?」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「これがおなにーってやつか？\u3000あたしはちっともわかんないからなー。魔王にお任せだー。きもちよーくしてほしいぞ」"
translation = "「이게 자위라는 거야? 나는 조금도 모르니까 말이야. 마왕에게 맡길게. 기분 좋게 해줬으면 좋겠어.」"

[[dialogue]]
speaker = "unk"
original = "ズボンをおろし、ペニスを取り出す。突然訪れた初体験の機会にも怯むことなく、ペニスはいつも以上に硬く勃起していた。"
translation = "바지를 내리고 자지를 꺼낸다. 갑작스럽게 찾아온 첫 경험의 기회에도 위축되지 않고, 자지는 평소보다 더욱 단단하게 발기해 있었다."

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「わー、魔王のち○ちんだー！\u3000あれれ？\u3000あたしの知ってるち○ちんと違うぞ？\u3000施設の子のち○ちんは、もっとちっちゃくてー、ゾウさんみたいだったぞ」"
translation = "「와아, 마왕 자지다! 어라라? 내가 아는 자지랑은 다른데? 시설 애들 자지는 더 조그맣고 코끼리 같았어.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「一応、ち○ちんは知ってて、見たことあるんだ？」"
translation = "「일단 자지는 알고 있고, 본 적도 있는 거야?」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「おー、ち○ちんは知ってるぞ！\u3000男はち○ちんからおしっこするんだよなー！」"
translation = "「응, 자지는 알고 있어! 남자는 자지로 오줌을 싸는 거잖아!」"

[[dialogue]]
speaker = "unk"
original = "生殖器としての正しい使用法を、メテオラの耳元で囁いた。"
translation = "생식기로서의 올바른 사용법을 메테오라의 귓가에 속삭였다."

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「──え？\u3000あたしのお股に、ち○ちんを入れるのか？\u3000そんなことしてどーすんだ？」"
translation = "「──에? 내 가랑이에 자지를 넣는 거야? 그런 짓을 해서 뭐하게?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「好きな人と愛を確かめ合うため……かな？\u3000そうすると、お互いに気持ちよくなれるんだよ」"
translation = "「좋아하는 사람과 사랑을 확인하기 위해서…… 일까? 그러면 서로 기분이 좋아질 수 있어.」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「そんだけできもちいいのかー！\u3000楽チンだなー！\u3000あたし、魔王のこと好きだしな！」"
translation = "「그것만으로 기분 좋아지는 거야! 간편하네! 나, 마왕을 좋아하니까!」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「ん……？\u3000あれー……？\u3000あたしのお股、おもらししちゃってるなー……魔王が近くにいると、こうなっちゃうんだ……赤ちゃんみたいで恥ずかしいぞ……」"
translation = "「응……? 어라……? 내 가랑이, 오줌을 지려버렸네…… 마왕이 근처에 있으면 이렇게 돼버려…… 아기 같아서 부끄러워……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「おしっこじゃないよ。そうなるのが普通だから、恥ずかしがらなくて大丈夫。えぇと……コレをメテオラのココに入れるんだけど……」"
translation = "「오줌이 아니야. 그렇게 되는 게 정상이니까 부끄러워하지 않아도 괜찮아. 에 그러니까…… 이걸 메테오라의 여기에 넣을 건데……」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「ち○ちんを、お股に入れるんだなー……？\u3000そーすると、あたしのドキドキが止まるのか？\u3000さっきよりもっとドキドキしてるぞ……？」"
translation = "「자지를 가랑이에 넣는 거구나……? 그러면 내 두근거림이 멈추는 거야? 아까보다 더 두근거리고 있어……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「今から入れるところは、お股じゃなくて──」"
translation = "「지금부터 넣을 곳은 가랑이가 아니라──」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「──おま……おま○こ？\u3000お股のこと、おま○こってゆーのか？\u3000へー、初めて聞いたぞ……おま○こ……おま○こかー」"
translation = "「──보…… 보지? 가랑이를 보지라고 부르는 거야? 헤에, 처음 들었어…… 보지…… 보지구나.」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「ん……？\u3000なんでだ……？\u3000おま○こって言葉……なんか恥ずかしいぞ……ドキドキしちゃうな……えへへへへ……<emoji=heart04>」"
translation = "「음……? 왜지……? 보지라는 말…… 왠지 부끄러워…… 두근거려 버리네…… 에헤헤헤헤…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "メテオラのおっぱいに手を添えると、とくん、とくんと心臓の鼓動が手に伝わってくる。触り心地のいい乳房を、そのまま優しくまさぐった。"
translation = "메테오라의 가슴에 손을 얹으니, 두근, 두근 하고 심장 박동이 손으로 전해져 온다. 감촉이 좋은 유방을 그대로 부드럽게 주물렀다."

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「あはは、おっぱいもみもみ、くすぐったいぞ。魔王はおっぱい好きなのかー？\u3000赤ちゃんみたいだなー、んふふ」"
translation = "「아하하, 가슴 조물조물, 간지러워. 마왕은 가슴을 좋아하는 거야? 아기 같네, 응후후.」"

[[dialogue]]
speaker = "unk"
original = "メテオラはおっぱいを触られるくすぐったさに身悶えていたけれど、次第に表情に変化が表れてくる。"
translation = "메테오라는 가슴이 만져지는 간지러움에 몸을 뒤척였지만, 점차 표정에 변화가 나타나기 시작한다."

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「んぅ……ふぅ、んっ……？\u3000なんだ……魔王、なんかしたのか……？\u3000おっぱい、ぞわぞわするぞ……」"
translation = "「응으…… 후우, 윽……? 뭐야…… 마왕, 무슨 짓 한 거야……? 가슴이 근질근질거려……」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「ふにゃあ……先っぽがビリビリする……んっ！\u3000ふひゃぁ、魔王に触られると……ぞわぞわがおっきくなるぞ……」"
translation = "「후냐아…… 끝부분이 찌릿찌릿해…… 윽! 후히야아, 마왕이 만지니까…… 근질거림이 커져 버려……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「気持ちいい？」"
translation = "「기분 좋아?」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「ふぇ……？\u3000あ……そー、だな……これ、きもちいいのかも……うぅ……くすぐったくて恥ずかしいけど、きもちいいぞ……もっとぉ、もっとおっぱい触ってぇ……」"
translation = "「후에……? 아…… 그으, 래…… 이거, 기분 좋은 걸지도…… 으으…… 간지럽고 부끄럽지만, 기분 좋아…… 더어, 더 가슴 만져줘……」"

[[dialogue]]
speaker = "unk"
original = "手に余るほどのおっぱいをたぷたぷ揺らしたり、指先で尖端を甘く擦ると、反応が徐々に変わってきた。"
translation = "손에 다 들어오지 않을 정도의 가슴을 출렁출렁 흔들거나, 손끝으로 끝부분을 달콤하게 문지르자, 반응이 서서히 변해왔다."

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「ううぅ……あたしの体、ヘンになっちゃってるぞ……なぁ、魔王……おま○こがうずうずして、熱いんだぁ……」"
translation = "「으으으…… 내 몸, 이상하게 돼버렸어…… 저기, 마왕…… 보지가 근질근질해서, 뜨거워……」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「うぁ、ち○ちんどくんどくんして、アチアチだぞ……こんなおっきーの、ホントにあたしの中に入るのかー？」"
translation = "「우아, 자지 가 두근두근거려서, 뜨끈뜨끈해…… 이렇게 큰 거, 정말로 내 안에 들어가는 거야?」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「んんっ……あっ……ち○ちんでぐりぐりされてる……ふぁやっ！？\u3000そ、そこ、そこ、あたしのおま○こだな……！」"
translation = "「으응…… 앗…… 자지로 문질러지고 있어…… 화얏!? 거, 거기, 거기, 내 보지구나……!」"

[[dialogue]]
speaker = "unk"
original = "膣穴を探り当て、ペニスの尖端から垂れる我慢汁とメテオラの愛液が絡まる。このまま腰を押し進めるだけで、メテオラの膣内に入り込める。"
translation = "질 구멍을 찾아내어, 페니스 끝에서 늘어지는 쿠퍼액과 메테오라의 애액이 뒤섞인다. 이대로 허리를 밀어 넣는 것만으로도, 메테오라의 질 안으로 침입할 수 있다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「メテオラとセックスするよ」"
translation = "「메테오라와 섹스할게」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「せ、せっくす……？\u3000ち○ちんをおま○こに入れるの、せっくすってゆーのか……う、うんっ……いいぞっ……ち○ちん入れて……せっくす、しよ……！」"
translation = "「세, 섹스……? 자지를 보지에 넣는 걸, 섹스라고 하는 건가…… 으, 응…… 좋아…… 자지 넣어줘…… 섹스, 하자……!」"

[[dialogue]]
speaker = "unk"
original = "まだ誰も迎えたことのない膣穴を、太い肉杭で乱暴にこじ開けた。"
translation = "아직 아무도 맞이한 적 없는 질 구멍을, 굵은 고기 말뚝으로 난폭하게 비집어 열었다."

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「ひぃんっ！？\u3000ふぁ……んぅ、んぃ、ふぁあぁんっ！？」"
translation = "「히잉!? 화…… 응윽, 응이, 화아앙!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ごめん、メテオラ……初めてだし、痛いよな……！」"
translation = "「미안, 메테오라…… 처음이라 아프지……!」"

[[dialogue]]
speaker = "unk"
original = "オナニーもエクスタシーも知らず、自分で慣らしたことも、異物を挿入したこともない膣穴が初めて受け入れたのが、俺のペニスだ。"
translation = "자위도 엑스타시도 모르고, 스스로 길들인 적도, 이물을 삽입한 적도 없는 질 구멍이 처음으로 받아들인 것이, 나의 페니스다."

[[dialogue]]
speaker = "unk"
original = "狭くて熱いメテオラの膣内は、今までに感じたことのないほどの快感をもたらしてくれていた。"
translation = "좁고 뜨거운 메테오라의 질 안은, 지금까지 느껴본 적 없는 정도의 쾌감을 가져다주고 있었다."

[[dialogue]]
speaker = "unk"
original = "でも、狭い穴を乱暴にこじ開けられているメテオラはきっと、破瓜の痛みを感じているはず──"
translation = "하지만, 좁은 구멍을 난폭하게 비집어 열리고 있는 메테오라는 분명, 파과의 통증을 느끼고 있을 터──"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「はーっ……はぁ、はーっ、んぅっ、んぃ、ひぃんっ……<emoji=heart04>\u3000これ、きもひ、いい……きもひ、いいぞぉ……<emoji=heart04>」"
translation = "「하아…… 하아, 하아, 응윽, 응이, 히잉……<emoji=heart04> 이거, 기분, 좋아…… 기분, 좋다구……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「え……？\u3000痛くないのか？」"
translation = "「에……? 아프지 않아?」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「ちっとも痛くなんてないぞ……きもちいいだけぇ……おま○こ、ち○ちんで広げられるの、すぅっごくきもひいいっ……<emoji=heart04>」"
translation = "「조금도 아프지 않아…… 기분 좋기만 해…… 보지, 자지로 벌려지는 거, 저어어엉말 기분 좋아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「こんなのぜんぜん知んなかったぞ……<emoji=heart04>\u3000なんで誰も教えてくんなかったんだぁ……？\u3000ふぁぁ……せっくす、すげー……<emoji=heart04>」"
translation = "「이런 거 전혀 몰랐어……<emoji=heart04> 왜 아무도 안 가르쳐준 거야……? 화아…… 섹스, 굉장해……<emoji=heart04>」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「まおー……もっと、もっとだぞ……ち○ちんで、きもちよくなりたい……おま○こ、いじってぇ……<emoji=heart04>」"
translation = "「마왕…… 더, 더 해줘…… 자지로, 기분 좋아지고 싶어…… 보지, 만져줘……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "強がっているわけでもない。彼女の性格ならば痛いなら痛いとハッキリ口にしているはすだ。"
translation = "강한 척하는 것도 아니다. 그녀의 성격이라면 아프면 아프다고 확실히 입에 담았을 터다."

[[dialogue]]
speaker = "unk"
original = "痛みはなく、快感だけだというなら、もっと、より深く。まだ入り口付近で留まっていたペニスを膣内へと埋め込む。"
translation = "통증은 없고 쾌감뿐이라면, 더, 더욱 깊게. 아직 입구 부근에 머물러 있던 페니스를 질 안으로 파묻는다."

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「んひぁ、あっ、ふぁ、あぁぁあぁぁ……<emoji=heart04>\u3000はっ、ひぁ、はひゃぁぁんっ……<emoji=heart04>\u3000ごつん……って、ち○ちんっ、あたしのお腹の奥に、当たったぞぉ……<emoji=heart04>」"
translation = "「응히아, 앗, 화, 아아아아아아……<emoji=heart04> 핫, 히아, 하햐아앙……<emoji=heart04> 고쿤…… 하고, 자지, 내 배 깊숙한 곳에 닿았어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「しゅごぉ……まおーのち○ちん、こんなとこまで届くのかぁ……不思議だぁ……こんなの初めてだぞ……<emoji=heart04>」"
translation = "「스고오…… 마왕의 자지, 이런 곳까지 닿는구나…… 신기해…… 이런 거 처음이야……<emoji=heart04>」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「えへへ……嬉しいなー……魔王も、きもちいいかー……？」"
translation = "「에헤헤…… 기쁘네…… 마왕도, 기분 좋아……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ……メテオラの中、気持ち良すぎて、すぐに出ちゃいそうだ……！」"
translation = "「아아…… 메테오라의 안, 너무 기분 좋아서 금방 나올 것 같아……!」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「ふぇ……？\u3000ち○ちんから、出ちゃう……？\u3000おしっこか？\u3000あたしのおま○こは、おトイレじゃないぞぉ……」"
translation = "「후에……? 자지에서, 나와……? 오줌이야? 내 보지는, 화장실이 아니라구……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「おしっこじゃなくて、ち○ちんが気持ちよくなると精液って汁が出るんだけど……それをおま○この中に出すと赤ちゃんができるんだよ」"
translation = "「오줌이 아니라, 자지가 기분 좋아지면 정액이라는 액체가 나오는데…… 그걸 보지 안에 내보내면 아기가 생기는 거야」"

[[dialogue]]
speaker = "unk"
original = "性行為に及びながら性教育をするなんて順序がデタラメもいいとこだ。"
translation = "성행위에 임하면서 성교육을 하다니 순서가 엉망진창인 것도 정도가 있다."

[[dialogue]]
speaker = "unk"
original = "しかし何も知らない彼女を汚してしまった背徳感は、快感へと変換されてしまっている。"
translation = "하지만 아무것도 모르는 그녀를 더럽혀버렸다는 배덕감은, 쾌감으로 변환되어 버리고 만다."

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「せーえき……？\u3000え、えぇぇ……赤ちゃんって、せっくすでできるのかぁ！？\u3000魔王、あたしと赤ちゃん作っちゃうのかぁ……！？」"
translation = "「저엉액……? 에, 에에…… 아기는 섹스로 생기는 거야!? 마왕, 나랑 아기 만드는 거야……!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「中に出したら、だよ……もちろん、外に──」"
translation = "「안에 내보내면, 말이지…… 물론, 밖에──」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「赤ちゃん産みたいぞ……魔王の赤ちゃんなら、絶対元気で、かわいいしなー。あたしがママになったら、すごーく大切にするぞ<emoji=heart04>」"
translation = "「아기 낳고 싶어…… 마왕의 아기라면, 분명 건강하고 귀여울 테니까. 내가 엄마가 되면, 어어엄청 소중히 할 거야<emoji=heart04>」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「おま○こ、きもちよくしてほしいし、きもちよくなってほしい……中に、せーえき出して……♪」"
translation = "「보지, 기분 좋게 해줬으면 좋겠고, 기분 좋아졌으면 좋겠어…… 안에, 정액 내보내줘……♪」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それ、反則……！」"
translation = "「그건, 반칙이야……!」"

[[dialogue]]
speaker = "unk"
original = "事の重大さをどれだけ理解しているかは計りかねるけど、そんな可愛いことを言われたら、メテオラへの愛しさが爆発的に膨らんでしまう。"
translation = "일의 중대함을 얼마나 이해하고 있는지는 가늠하기 어렵지만, 그런 귀여운 말을 들으면 메테오라에 대한 사랑스러움이 폭발적으로 부풀어 오르고 만다."

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「んぁぁ……ち○ちん、もっとアツアツでカチカチになったぞ……<emoji=heart04>\u3000あたしのこと、ママにしちゃうんだな？」"
translation = "「응아아…… 자지, 더 뜨끈뜨끈하고 딱딱해졌어……<emoji=heart04> 나를 엄마로 만드는 거구나?」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「ひゃぁっ……！？\u3000んぁ、はっ、はぅんっ……<emoji=heart04>\u3000お腹の奥まで、ち○ちんで、いっぱいだぞぉ……<emoji=heart04>」"
translation = "「히얏……!? 응아, 핫, 하응……<emoji=heart04> 배 깊숙한 곳까지 자지로 가득 차버렸어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「はっ、はぁ、ち○ちん、こすれてっ……きもちいい、きもちいいぞ……まおーもきもちいいんだよな、いっぱい、きもちよくなってっ……<emoji=heart04>」"
translation = "「핫, 하아, 자지, 비벼져서…… 기분 좋아, 기분 좋아…… 마왕도 기분 좋은 거지, 잔뜩 기분 좋아져줘……<emoji=heart04>」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「んぅっ！？\u3000んっ、ひぅくっ、ん、んっ<emoji=heart04>\u3000ち○ちんっ、出たり、入ったりぃ<emoji=heart04>\u3000ひぅっ、んっ、んっ、ふぎゅっ<emoji=heart04>\u3000すごいぞ、ずんずんって、はっ、はぅ、んぅうぅぅっ<emoji=heart04>」"
translation = "「응윽!? 응, 히욱, 응, 응<emoji=heart04> 자지, 나갔다 들어왔다 해<emoji=heart04> 히욱, 응, 응, 후규<emoji=heart04> 굉장해, 즈응즈응 하고, 핫, 하으, 응으으윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "快感で震える狭い膣肉の間をかき分け、メテオラの最奥と入口を何度も往復する。"
translation = "쾌감으로 떨리는 좁은 질 근육 사이를 헤치며, 메테오라의 가장 깊은 곳과 입구를 몇 번이고 왕복한다."

[[dialogue]]
speaker = "unk"
original = "限界まで張りつめたペニスがメテオラの奥を乱暴に小突く度、快感の波が俺とメテオラを昂らせる。"
translation = "한계까지 부풀어 오른 페니스가 메테오라의 안쪽을 난폭하게 툭툭 칠 때마다, 쾌감의 파도가 나와 메테오라를 고조시킨다."

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「はっ、ぁんっ<emoji=heart04>\u3000あっ、あん、しゅき、しゅきぃっ<emoji=heart04>\u3000はぁ、あっ、あっ、ひぅ、ん、んんぅうぅん<emoji=heart04>」"
translation = "「핫, 아앙<emoji=heart04> 앗, 앙, 쥬아, 쥬아아<emoji=heart04> 하아, 앗, 앗, 히우, 응, 응응으으응<emoji=heart04>」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「んぁ、はっ、はひんっ<emoji=heart04>\u3000ヘンな感じだけど、ちっともイヤじゃないぞ……おま○こがキューンって……もっと、してっ、もっと、もっともっともっとぉ<emoji=heart04>」"
translation = "「응아, 핫, 하힝<emoji=heart04> 이상한 느낌이지만, 조금도 싫지 않아…… 보지가 큥 하고…… 더 해줘, 더, 더더더더어<emoji=heart04>」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「ぁんっ<emoji=heart04>\u3000んぅ、んぁっ、ひゃぅっ、はぁ、んぅぅっ<emoji=heart04>\u3000ずんずんされると、ヘンな声っ\u3000出ちゃうぞ……<emoji=heart04>」"
translation = "「앙<emoji=heart04> 응윽, 응아, 하우, 하아, 응으윽<emoji=heart04> 즈응즈응 당하니까, 이상한 목소리 나와버려……<emoji=heart04>」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「あたしもっ、しゅき、魔王っ、しゅきっ、しゅきぃっ、だぁいしゅきだぞ……<emoji=heart04>\u3000ん、んぅっ<emoji=heart04>\u3000はっ、はぁ、あぁんっ<emoji=heart04>」"
translation = "「나도 쥬아, 마왕, 쥬아, 쥬아아, 정말 쥬아해……<emoji=heart04> 응, 응윽<emoji=heart04> 핫, 하아, 아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "刻一刻と積み上がる快感は、着実に絶頂の高みへと導く。あと少し、もうほんの少しでメテオラの膣内を俺で満たせる。"
translation = "시시각각 쌓여가는 쾌감은 착실히 절정의 높이로 인도한다. 조금만 더, 이제 조금만 더 있으면 메테오라의 질 안을 나로 채울 수 있다."

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「あっ<emoji=heart04>\u3000あ、あっ、あぁんっ<emoji=heart04>\u3000はっ、はぁ、まおー、激しっ、ふぁ、あ、んぁ、はぁあぁぁんっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 아, 앗, 아앙<emoji=heart04> 핫, 하아, 마왕, 격렬해, 화, 아, 응아, 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "無知な彼女に中出しするなんて理性では駄目だと分かっていても、メテオラが愛しくて止まらない。"
translation = "무지한 그녀에게 질내 사정을 하다니 이성으로는 안 된다는 것을 알고 있어도, 메테오라가 사랑스러워 견딜 수 없다."

[[dialogue]]
speaker = "unk"
original = "俺の精を望むメテオラの中に吐き出したい。愛しい彼女に俺の子を身籠らせたいと、雄の本能が訴える。"
translation = "나의 정을 바라는 메테오라의 안에 쏟아내고 싶다. 사랑스러운 그녀에게 나의 아이를 배게 하고 싶다고 수컷의 본능이 호소한다."

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「イッ、イキそぉ……？\u3000せーえきか？\u3000せーえき出るのか？\u3000赤ちゃんの素、出そうなんだなー？」"
translation = "「이가, 이키소오……? 정액이야? 정액 나오는 거야? 아기의 소질, 나올 것 같은 거구나?」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「せーえき、あたしのおなかに、出すんだよなっ？\u3000魔王のせーえき欲しいぞっ、あたしの中で、きもちよくなって……このまま、せーえきちょーだぁいっ……<emoji=heart04>」"
translation = "「정액, 내 배 안에 내보내는 거지? 마왕의 정액 갖고 싶어, 내 안에서 기분 좋아져줘…… 이대로 정액 줘어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "メテオラの乳房を強く掴みながら、より量を増した愛液がねっとりとペニスに絡みつく。"
translation = "메테오라의 유방을 강하게 움켜쥐면서, 더욱 양이 늘어난 애액이 끈적하게 페니스에 달라붙는다."

[[dialogue]]
speaker = "unk"
original = "お互いの体温が等しくなり、性器と性器が溶けて、ひとつにくっついてしまったかのようにすら錯覚していた。"
translation = "서로의 체온이 같아지고, 성기와 성기가 녹아 하나로 합쳐져 버린 것 같은 착각마저 들고 있었다."

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「あっ、あっ、あぁ、ぁ、あぁぁっ！？\u3000はぁっ、あっ、あっ、ち○ちんっ、ち○ちんいっぱぁいっ……<emoji=heart04>」"
translation = "「앗, 앗, 아아, 아, 아아앗!? 하앗, 앗, 앗, 자지, 자지 가득해……<emoji=heart04>」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「あっ、あっ<emoji=heart04>\u3000んぁああぁっ<emoji=heart04>\u3000ち○ちん、またおっきくなってるぞっ<emoji=heart04>\u3000せーえき出ちゃうんだなっ<emoji=heart04>」"
translation = "「앗, 앗<emoji=heart04> 응아아앗<emoji=heart04> 자지, 또 커지고 있어<emoji=heart04> 정액 나와버리는 거구나<emoji=heart04>」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「はぁ、ん、んぅんっ！\u3000せーえき、出してっ、いいんだからなっ……<emoji=heart04>\u3000いっぱい、いっぱい、あたしできもちよくなれっ……<emoji=heart04>」"
translation = "「하아, 응, 응으응! 정액, 내보내도 되니까 말이야……<emoji=heart04> 잔뜩, 잔뜩, 나로 기분 좋아져줘……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺の昂りを見透かしたように、精を求めるメテオラの膣肉がキュウッと強く収縮した。"
translation = "나의 고조를 꿰뚫어 본 듯이, 정을 갈구하는 메테오라의 질 근육이 뀨우 하고 강하게 수축했다."

[[dialogue]]
speaker = "unk"
original = "それが俺へのトドメだった。限界を迎えた射精感はもう止められない。"
translation = "그것이 나에 대한 최후의 일격이었다. 한계에 도달한 사정감은 이제 멈출 수 없다."

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「んぁ、あぁぁっ……！？\u3000な、なんだこれぇ……？\u3000頭がふわふわして、ぞくぞくぞわぞわで、どっかに飛んでっちゃいそうだぞっ……<emoji=heart04>」"
translation = "「응아, 아아앗……!? 뭐, 뭐야 이거……? 머리가 둥실둥실하고, 소름이 쫙 돋아서, 어디론가 날아가 버릴 것 같아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「一番気持ちよくなる時は『イク』っていうんだ……俺も、イクッ……！」"
translation = "「제일 기분 좋아질 때를 『사정한다』고 해…… 나도, 사정한다……!」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「イ、イク……？\u3000あたし、イク、のかっ……？\u3000んわ、あっ、やだっ、怖い、イクの怖いぞ……<emoji=heart04>\u3000魔王、ぎゅーって……ぎゅーってしてぇ……<emoji=heart04>」"
translation = "「사, 사정……? 나도 사정하는 거야? 응와, 앗, 싫어, 사정하는 거 무서워……<emoji=heart04> 마왕, 꽉…… 꽉 안아줘……<emoji=heart04>」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「はぁんっ<emoji=heart04>\u3000ギューッてされたら、もっときもちくなってきひゃ……ひぁっ！？\u3000ぞくぞくとぞわぞわがいっぺんにぃっ……<emoji=heart04>」"
translation = "「하앙<emoji=heart04> 꽉 안아주니까 더 기분 좋아져서 히햐…… 히앗!? 소름 돋는 게 한꺼번에……<emoji=heart04>」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「ぁ、はっ、ヘンになぅ……イク、イク、イクッ……しゅきっ、しゅきだぞっ、魔王っだいしゅきっ、だぁいしゅきぃいぃぃっ……<emoji=heart04><emoji=heart04>」"
translation = "「아, 핫, 이상하게 돼…… 간다, 간다, 가버렷…… 쥬아, 쥬아해, 마왕 정말 쥬아, 정말 쥬아아아아앗……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「ん、んんんんっ<emoji=heart04>\u3000イク、イク、イクイクイクイックぅうぅぅぅんッ<emoji=heart04><emoji=heart04>」"
translation = "「응, 응응응응<emoji=heart04> 간다, 간다, 가버려어어어어응<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「ッんんんーーーっ！？\u3000っくぅぅうぅうぅんっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「읏응응응ーー앗!? 읏쿠우우우우응<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "失神しそうなほどの絶頂感が全身を突き抜け、精液を勢いよくメテオラの子宮へと叩きつける。"
translation = "정신을 잃을 정도의 절정감이 전신을 꿰뚫고, 정액을 기세 좋게 메테오라의 자궁으로 때려 박는다."

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「んふぁっ！？\u3000え、あっ、はっ、はぁっ<emoji=heart04>\u3000なっ、んぁ、あっ、はっ、はぁ、はぁっ！？\u3000んぇ、あ、あっ！？」"
translation = "「응화!? 에, 앗, 핫, 하앗<emoji=heart04> 낫, 응아, 앗, 핫, 하아, 하앗!? 응에, 아, 앗!?」"

[[dialogue]]
speaker = "unk"
original = "自分を襲った感覚を理解できないまま、メテオラは電流のように駆け巡る絶頂の甘い痺れに全身を震わせる。"
translation = "자신을 덮친 감각을 이해하지 못한 채, 메테오라는 전류처럼 몰아치는 절정의 달콤한 저림에 전신을 떨었다."

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「んんぅっ<emoji=heart04>\u3000な、なんだ、これっ？\u3000今のがイクってやつなのかぁ……あ、はぁ、んぁ、はぁあぁ……しゅごいぃ……<emoji=heart04>」"
translation = "「응응윽<emoji=heart04> 뭐, 뭐야, 이거? 방금 게 간다는 그거야? 아, 하아, 응아, 하아아…… 대단해……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺もまた今までで最も強烈な射精衝動に身を委ねながら、メテオラの体を強く抱きしめ、ペニスの脈動が治まるのを待ち続けた。"
translation = "나 또한 지금까지 중 가장 강렬한 사정 충동에 몸을 맡기며, 메테오라의 몸을 강하게 껴안고 페니스의 고동이 가라앉기를 계속 기다렸다."

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「はぁんっ<emoji=heart04>\u3000んぁ、あ、あぁっ……<emoji=heart04>\u3000しゅごぉ……ち○ちんがどくんどくんしてるぞ……せーえき出てるの、わかるなー……<emoji=heart04>」"
translation = "「하앙<emoji=heart04> 응아, 아, 아아……<emoji=heart04> 스고오…… 자지가 두근두근대고 있어…… 정액 나오는 거, 알겠어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "メテオラを背後から抱きしめたまま、腰を揺らして、最後の一滴までメテオラの膣内へと搾り出した。"
translation = "메테오라를 뒤에서 껴안은 채 허리를 흔들어, 마지막 한 방울까지 메테오라의 질 안으로 짜냈다."

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「んぁ……っ<emoji=heart04>\u3000ち○ちん、抜けちゃったー……」"
translation = "「응아……<emoji=heart04> 자지, 빠져버렸다─……」"

[[dialogue]]
speaker = "unk"
original = "過去一番の射精を終え、雄としての役目を果たしたペニスが、メテオラの膣内からずるりと抜ける。"
translation = "과거 최고의 사정을 마치고, 수컷으로서의 역할을 다한 페니스가 메테오라의 질 안에서 스르륵 빠진다."

[[dialogue]]
speaker = "unk"
original = "ぽっかりと俺の形に開いた膣穴から、たっぷりと吐き出した精液が逆流し、どろりと溢れ出た。"
translation = "펑 하고 나의 형태대로 열린 질 구멍에서, 듬뿍 쏟아낸 정액이 역류하여 주르륵 흘러넘쳤다."

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「あははは……魔王、ぎゅーってしすぎだぞ。いっしょーけんめーだったなー」"
translation = "「아하하하…… 마왕, 너무 꽉 안았어. 열심히였네」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「え……？\u3000あっ、ご、ごめんっ……！」"
translation = "「에……? 앗, 미, 미안……!」"

[[dialogue]]
speaker = "unk"
original = "メテオラの声で我に返り、両腕の拘束を緩める。最後の最後まで快感を貪ろうと必死になり過ぎた。"
translation = "메테오라의 목소리에 정신을 차리고, 두 팔의 구속을 푼다. 마지막의 마지막까지 쾌감을 탐하려고 너무 필사적이었다."

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「えへへへー……せっくす、すーっっっごくきもちよかったぞ。魔王もか？」"
translation = "「에헤헤헤─…… 섹스, 저어어엉말 기분 좋았어. 마왕도 그래?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「う、うん、最高だった……」"
translation = "「으, 응, 최고였어……」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「きもちいいこと教えてくれてありがとな、魔王っ。またせっくすしよーなっ！\u3000ぎゅーーーっ<emoji=heart04>」"
translation = "「기분 좋은 거 가르쳐줘서 고마워, 마왕. 또 섹스하자! 꽈아아아악<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "メテオラは加減を覚えたハグで、俺を優しく抱きしめるのだった。"
translation = "메테오라는 힘 조절을 배운 허그로 나를 다정하게 껴안았다."

