[[dialogue]]
speaker = "unk"
original = "第3話,マリオン無双,P"
translation = "제3화, 마리온 무쌍, P"

[[dialogue]]
speaker = "unk"
original = "マリオンさんが新星学園へ頻繁に出入りするようになったことで、１つ思わぬ弊害が生まれていた。"
translation = "마리온 씨가 신세이 학원에 빈번하게 드나들게 되면서, 한 가지 생각지도 못한 폐해가 생겨나고 있었다."

[[dialogue]]
speaker = "マリオン"
original = "「まあまあ、うふふっ♪\u3000そんな警戒なさらなくとも、よろしいのに……」"
translation = "「자자, 우후훗♪ 그렇게 경계하지 않으셔도 괜찮을 텐데……」"

[[dialogue]]
speaker = "閃"
original = "「そうはいきません。マリオンさん、あなたがここ最近、新星学園の女子生徒達を口説き回っていることは知っていますよ？」"
translation = "「그렇게는 안 됩니다. 마리온 씨, 당신이 요 근래 신세이 학원의 여학생들을 꼬시고 다니는 건 알고 있다고요?」"

[[dialogue]]
speaker = "unk"
original = "あの……マリオンさん……？"
translation = "저기…… 마리온 씨……?"

[[dialogue]]
speaker = "マリオン"
original = "「まあ、会長様。そんなジト目で見ないで下さいまし。お可愛らしくて私、胸がキュンとしてしまいます……<emoji=heart04>」"
translation = "「어머, 회장님. 그런 가자미눈으로 보지 말아주세요. 너무 귀여우셔서 저, 가슴이 큥 하고 뛰어버려요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ダメだこのメイド……！\u3000まるで効いてない……！"
translation = "안 되겠다 이 메이드……! 전혀 먹히질 않아……!"

[[dialogue]]
speaker = "せつな"
original = "「マリオン殿のことはメイドとして尊敬しているでござるが……しかし、九浄家メイド隊の仲間まで口説こうとするのであれば、見過ごすわけには参りませぬ！」"
translation = "「마리온 공은 메이드로서 존경하고 있소만…… 하오나, 쿠죠 가문 메이드대의 동료까지 꼬시려 한다면 묵과할 수 없소!」"

[[dialogue]]
speaker = "閃"
original = "「ましてや、その相手が純真なヨミとなれば、尚更です。星見家メイド隊の好きにさせるわけにはいきません」"
translation = "「하물며 그 상대가 순진한 요미라면 더더욱 그렇습니다. 호시미 가문 메이드대 마음대로 하게 둘 순 없어요」"

[[dialogue]]
speaker = "ヨミ"
original = "「えっと……私はマリオンさんから普通に挨拶されただけなんですけど、なんでこんな一触即発の状況に……？」"
translation = "「저기…… 저는 마리온 씨에게 평범하게 인사를 받았을 뿐인데, 왜 이렇게 일촉즉발인 상황이……?」"

[[dialogue]]
speaker = "unk"
original = "閃、せつな、ヨミは、九浄家メイド隊に所属する３人だ。マリオンの所属する星見家メイド隊とは、何故か組織的に対立意識が強いらしいと、俺はヴィーナスから聞いていた。"
translation = "센, 세츠나, 요미는 쿠죠 가문 메이드대에 소속된 세 사람이다. 마리온이 소속된 호시미 가문 메이드대와는 왠지 조직적으로 대립 의식이 강하다고 비너스에게 들은 적이 있었다."

[[dialogue]]
speaker = "マリオン"
original = "「ヨミ様の仰る通りですよ。私はただ、ヨミ様がお可愛らしいので声をおかけしただけです」"
translation = "「요미 님이 말씀하신 대로예요. 저는 그저, 요미 님이 너무 귀여우셔서 말을 걸었을 뿐이랍니다」"

[[dialogue]]
speaker = "ヨミ"
original = "「こやっ！？\u3000そんな……私が可愛いだなんて……照れちゃいます……」"
translation = "「코얏!? 그런…… 제가 귀엽다니…… 부끄러워요……」"

[[dialogue]]
speaker = "マリオン"
original = "「ふふっ、お世辞ではありませんよ。私はいつだって本気でお可愛いと思って口にしていますので」"
translation = "「후훗, 빈말이 아니에요. 저는 언제나 진심으로 귀엽다고 생각해서 입 밖으로 내는 거니까요」"

[[dialogue]]
speaker = "ヨミ"
original = "「ありがとうございます。でも、マリオンさんの方が美人で仕事ができて、素敵だと思いますよ？」"
translation = "「감사합니다. 하지만 마리온 씨가 더 미인이시고 일도 잘하셔서 멋지다고 생각해요!」"

[[dialogue]]
speaker = "マリオン"
original = "「まあまあ、うふふっ♪\u3000そんなお褒めいただけるなんて、ヨミ様、思わずお持ち帰りしたくなってしまうお可愛さですこと……<emoji=heart04>」"
translation = "「자자, 우후훗♪ 그런 칭찬을 해주시다니, 요미 님, 저도 모르게 보쌈해가고 싶어질 정도의 귀여움이네요……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「えっと……？\u3000お持ち帰り……の意味はよくわかりませんが、褒め言葉ってことですよね？\u3000ありがとうございます♪」"
translation = "「저기……? 보쌈……의 의미는 잘 모르겠지만, 칭찬이라는 뜻이죠? 감사합니다♪」"

[[dialogue]]
speaker = "せつな"
original = "「さすがヨミ殿でござる！\u3000持ち前の純真さで、マリオン殿の色仕掛けを見事に跳ね除けておりまする！」"
translation = "「역시 요미 공이오! 타고난 순진함으로 마리온 공의 미인계를 훌륭히 튕겨내고 있구려!」"

[[dialogue]]
speaker = "閃"
original = "「どうやら我々、九浄家メイド隊の勝ちみたいですね。今日のところはこれで鞘に納めて――」"
translation = "「아무래도 저희 쿠죠 가문 메이드대의 승리인 것 같군요. 오늘은 이쯤에서 칼을 거두고――」"

[[dialogue]]
speaker = "マリオン"
original = "「あら？\u3000お２人は私の相手をして下さらないのですか？\u3000せっかくこうしてお会いできたのですから……」"
translation = "「어라? 두 분은 저를 상대해 주지 않으시는 건가요? 어렵게 이렇게 만났는데……」"

[[dialogue]]
speaker = "マリオン"
original = "「私、お２人とも仲良くしたいです。うふふっ<emoji=heart04>」"
translation = "「저, 두 분과도 사이좋게 지내고 싶어요. 우후훗<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
original = "「なっ！？\u3000いつの間にせつなの近くに！？\u3000いや、マリオン殿が２人！？\u3000これは分身の術でござるか！？」"
translation = "「닛!? 어느 사이에 세츠나의 근처에!? 아니, 마리온 공이 두 명!? 이것은 분신술이오!?」"

[[dialogue]]
speaker = "マリオン"
original = "「ふふっ、そのようなものです。私、人形使いですので♪」"
translation = "「후훗, 그런 셈이죠. 저, 인형술사니까요♪」"

[[dialogue]]
speaker = "マリオン"
original = "「さて、せつな様。私、前からあなたのお耳と尻尾がすごくお可愛くて触ってみたいと思っていたんです<emoji=heart04>」"
translation = "「자, 세츠나 님. 저, 전부터 당신의 귀와 꼬리가 무척 귀여워서 만져보고 싶다고 생각했답니다<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「なでなでしても、よろしいですか？」"
translation = "「쓰담쓰담해도 괜찮을까요?」"

[[dialogue]]
speaker = "せつな"
original = "「ほわぁぁぁ<emoji=heart04>\u3000そんな、耳に息を優しく吹きかけるように囁いちゃダメでござるぅ……<emoji=heart04>」"
translation = "「호와아아아<emoji=heart04> 그렇게 귀에 숨을 살살 불어넣듯이 속삭이면 안 되오오……<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「なでなでしても、よろしいですよね<emoji=heart04>」"
translation = "「쓰담쓰담해도 괜찮은 거겠죠<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
original = "「ああ、マリオン殿……なんだか、甘くていい匂いがするでござるぅ……お、恐るべき色香に……体が勝手に……！」"
translation = "「아아, 마리온 공…… 왠지 달콤하고 좋은 냄새가 나오…… 무, 무시무시한 색기에…… 몸이 멋대로……!」"

[[dialogue]]
speaker = "マリオン"
original = "「あ、今頷きましたよね？\u3000なでなでしちゃいますね<emoji=heart04>」"
translation = "「아, 지금 고개 끄덕이셨죠? 쓰담쓰담 해버릴게요<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「はい、なでなで～<emoji=heart04>\u3000うふっ<emoji=heart04>\u3000お耳と尻尾、ピクピク反応してお可愛らしいですこと……<emoji=heart04>」"
translation = "「자, 쓰담쓰담~<emoji=heart04> 우후<emoji=heart04> 귀랑 꼬리가 파르르 반응해서 참 귀엽기도 해라……<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
original = "「ほわぁぁぁっ<emoji=heart04>\u3000大人のお触りテクニックで、体がふにゃふにゃになってしまうでござるぅぅぅ<emoji=heart04>\u3000ふにゃあ……ごろごろ……<emoji=heart04>」"
translation = "「호와아아아앗<emoji=heart04> 어른스러운 손놀림에 몸이 흐물흐물해져 버리오오오<emoji=heart04> 후냐아…… 고로고로……<emoji=heart04>」"

[[dialogue]]
speaker = "閃"
original = "「せ、せつなぁぁぁっ！？\u3000はっ……！」"
translation = "「세, 세츠나아아앗!? 핫……!」"

[[dialogue]]
speaker = "マリオン"
original = "「うふふっ<emoji=heart04>\u3000次は閃様、あなたの番ですよ<emoji=heart04>」"
translation = "「우후훗<emoji=heart04> 다음은 센 님, 당신 차례예요<emoji=heart04>」"

[[dialogue]]
speaker = "閃"
original = "「３人目の人形！？\u3000しまった、人形は１体だと思い込んで……！\u3000いやでも、予測の星眼でも察知できないなんて、そんなこと……！？」"
translation = "「세 번째 인형!? 아차, 인형은 하나라고만 생각해서……! 아니 그보다, 예측의 성안으로도 감지할 수 없다니, 그런 일이……!?」"

[[dialogue]]
speaker = "マリオン"
original = "「私、こう見えても一時期、流星学園の星徒会長をやっていましたので♪」"
translation = "「저, 이래 봬도 한때 류세이 학원의 성도회장을 지냈으니까요♪」"

[[dialogue]]
speaker = "マリオン"
original = "「――閃様、あなたは護衛メイドとして、とても優秀な方ですね。私がヨミ様と挨拶しようとしたら、即反応して駆けつけた」"
translation = "「――센 님, 당신은 호위 메이드로서 무척 우수한 분이시네요. 제가 요미 님과 인사하려 하자마자 즉각 반응해서 달려오셨으니」"

[[dialogue]]
speaker = "閃"
original = "「む、無駄です。私は色仕掛けに屈したりしません。私には、ヴィーナスお嬢様という心に決めた絶対の主が――」"
translation = "「무, 무익합니다. 저는 미인계 따위에 굴하지 않아요. 제게는 비너스 아가씨라는 마음속에 정한 절대적인 주인이――」"

[[dialogue]]
speaker = "マリオン"
original = "「ああ、その健気な忠誠心がまた、実にお可愛い<emoji=heart04>\u3000大丈夫ですよ。私はそんな百合の花を摘むようなことを致しません。外側からちょっと、優しく愛でるだけです<emoji=heart04>」"
translation = "「아아, 그 기특한 충성심이 또한 참으로 귀여워라<emoji=heart04> 괜찮아요. 저는 그런 백합꽃을 꺾는 짓은 하지 않으니까요. 겉에서 조금만, 상냥하게 애지중지할 뿐이랍니다<emoji=heart04>」"

[[dialogue]]
speaker = "閃"
original = "「な、何を言って……ふあっ！？\u3000あ、頭をなでられて……」"
translation = "「무, 무슨 말을…… 후앗!? 머, 머리를 쓰다듬어져서……」"

[[dialogue]]
speaker = "マリオン"
original = "「閃様、メイドとして頑張っていて、偉い偉い<emoji=heart04>\u3000本当は閃様も、星見家メイド隊に対立心があるわけではありませんよね？」"
translation = "「센 님, 메이드로서 노력하고 있어서 장해요 장해<emoji=heart04> 사실 센 님도 호시미 가문 메이드대에게 대립심이 있는 건 아니죠?」"

[[dialogue]]
speaker = "マリオン"
original = "「九浄家メイド隊として、ヴィーナス様に忠誠を誓うからこそ、星見家メイド隊の私と一定の距離を保とうとした。違いますか？」"
translation = "「쿠죠 가문 메이드로서 비너스 님께 충성을 맹세하기에, 호시미 가문 메이드인 저와 일정 거리를 유지하려 한 것. 아닌가요?」"

[[dialogue]]
speaker = "閃"
original = "「そ、それは……！」"
translation = "「그, 그것은……!」"

[[dialogue]]
speaker = "マリオン"
original = "「私相手に、そんな肩肘は張らなくてよいのです。あなたが立派なメイドだと、私はもう知っていますから」"
translation = "「저를 상대로 그렇게 어깨에 힘줄 필요는 없답니다. 당신이 훌륭한 메이드라는 건 제가 이미 알고 있으니까요」"

[[dialogue]]
speaker = "マリオン"
original = "「だから、これからは同じメイドとして、仲良く致しましょう<emoji=heart04>\u3000……ね？」"
translation = "「그러니 이제부터는 같은 메이드로서 사이좋게 지내요<emoji=heart04> ……네?」"

[[dialogue]]
speaker = "閃"
original = "「ああっ……マリオン……お姉様……<emoji=heart04>」"
translation = "「아앗…… 마리온…… 언니……<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「まあまあ、うふふっ♪\u3000お２人とも、実にお可愛いらしい反応ですこと<emoji=heart04>\u3000これは私が責任を持って、お持ち帰――いえ、介抱せねばなりませんね<emoji=heart04>」"
translation = "「자자, 우후훗♪ 두 분 다 참으로 귀여운 반응이네요<emoji=heart04> 이건 제가 책임지고 보쌈―― 아니, 간호해 드려야겠네요<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「せつなさんだけでなく、閃先輩までふにゃふにゃに……！\u3000そんな……！」"
translation = "「세츠나 씨뿐만 아니라 센 선배까지 흐물흐물하게……! 그런……!」"

[[dialogue]]
speaker = "ヨミ"
original = "「――すごいです！\u3000これが、メイドを極めたマリオンさんの力なんですねっ」"
translation = "「――대단해요! 이것이 메이드의 극의에 달한 마리온 씨의 힘이군요!」"

[[dialogue]]
speaker = "unk"
original = "いやちょっと違うと思う……"
translation = "아니, 좀 다른 것 같은데……"

[[dialogue]]
speaker = "unk"
original = "純真に憧れの眼差しを向けるヨミに、思わずツッコミを入れてしまう俺なのだった。"
translation = "순수하게 동경의 눈빛을 보내는 요미에게 나도 모르게 츳코미를 넣어버리는 나였다."

[[dialogue]]
speaker = "unk"
original = "そして後日、マリオンさんに対して、九浄家メイド隊の警戒レベルがまた１つ上がったという。"
translation = "그리고 며칠 후, 마리온 씨에 대한 쿠죠 가문 메이드대의 경계 레벨이 또 한 단계 올라갔다고 한다."

