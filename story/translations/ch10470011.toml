[[dialogue]]
speaker = "unk"
original = "第１話,幼なじみとの再会,P"
translation = "제1화, 소꿉친구와의 재회"

[[dialogue]]
speaker = "unk"
original = "それはヴィーナスとの御前試合が終わった、数日後のこと──"
translation = "그것은 비너스와의 어전 시합이 끝난, 며칠 뒤의 일──"

[[dialogue]]
speaker = "unk"
original = "はい、どうぞお入り下さい"
translation = "「네, 어서 들어오세요.」"

[[dialogue]]
speaker = "メルエル"
original = "「失礼します。……あっ、やっぱり！！\u3000やっぱりキミだったんだぁ。久しぶりだねっ！」"
translation = "「실례합니다. ……앗, 역시!! 역시 너였구나. 오랜만이야!」"

[[dialogue]]
speaker = "メルエル"
original = "「その……私のこと、覚えてないかな？\u3000私だよ、姫咲メルエル！」"
translation = "「그…… 나, 기억 안 나려나? 나야, 히메사키 메르엘!」"

[[dialogue]]
speaker = "unk"
original = "えっ！\u3000『覚えてない』って……お、俺？"
translation = "엣! 『기억 안 나』라니…… 나, 나 말이야?"

[[dialogue]]
speaker = "メルエル"
original = "「うん！\u3000私たち、１０年前くらいかな？\u3000一緒に遊んだことがあるんだけど……」"
translation = "「응! 우리, 10년 전쯤인가? 같이 논 적이 있는데……」"

[[dialogue]]
speaker = "unk"
original = "えっと……ごめん、実は……"
translation = "어…… 미안, 사실은……"

[[dialogue]]
speaker = "メルエル"
original = "「え？\u3000幼少期の記憶があんまりない……？\u3000そうなんだ……」"
translation = "「어? 어릴 적 기억이 별로 없어……? 그렇구나……」"

[[dialogue]]
speaker = "メルエル"
original = "「ということは……もしかしたら、私が出会ったキミは記憶を失って、目覚めた直後だったのかもしれないね」"
translation = "「그렇다는 건…… 어쩌면, 내가 만났던 너는 기억을 잃고, 깨어난 직후였을지도 모르겠네.」"

[[dialogue]]
speaker = "メルエル"
original = "「うん……だって１０年前のキミは、年齢のわりにはちょっとぼんやりしたところがあったから」"
translation = "「응…… 그치만 10년 전의 너는 나이에 비해서 좀 멍한 구석이 있었으니까.」"

[[dialogue]]
speaker = "メルエル"
original = "「でもそれなら、改めて自己紹介しないとだね！」"
translation = "「하지만 그렇다면, 다시 자기소개를 해야겠네!」"

[[dialogue]]
speaker = "メルエル"
original = "「私は新星学園２年生の姫咲メルエル。生まれも育ちも天界で、<ruby>聖庭園<rt>せいていえん</rt></ruby>ってところ出身だよ。よろしくね♪」"
translation = "「나는 신성학원 2학년 히메사키 메르엘. 나고 자란 곳도 천계고, 성정원이라는 곳 출신이야. 잘 부탁해♪」"

[[dialogue]]
speaker = "メルエル"
original = "「１０年くらい前、お父さんの仕事の都合で半年だけ流星市国にいたことがあって……キミとはその時に出会ったんだ」"
translation = "「10년 전쯤에 아빠 일 때문에 반년 동안만 유성시국에 있었던 적이 있어서…… 너와는 그때 만났어.」"

[[dialogue]]
speaker = "メルエル"
original = "「大聖堂の日曜ミサに参加した時に仲良くなってね？\u3000半年間、毎週ミサの後に一緒に遊んでたんだよ！」"
translation = "「대성당의 일요 미사에 참가했을 때 친해졌거든? 반년 동안 매주 미사가 끝난 뒤에 같이 놀았었어!」"

[[dialogue]]
speaker = "メルエル"
original = "「だから私たち、いわゆる幼なじみなの♪」"
translation = "「그러니까 우리, 이른바 소꿉친구인 거야♪」"

[[dialogue]]
speaker = "unk"
original = "大聖堂の……日曜ミサ……"
translation = "대성당의…… 일요 미사……"

[[dialogue]]
speaker = "メルエル"
original = "「──こ、こんにちはっ。わたし、メルエル。キミのおなまえは？」"
translation = "「──아, 안녕. 나, 메르엘이야. 네 이름은 뭐야?」"

[[dialogue]]
speaker = "メルエル"
original = "「──もし、わたしたちがおおきくなって、それでも■■■■だったときは……」"
translation = "「──만약 우리가 어른이 되어서도 여전히 ■■■■일 때는……」"

[[dialogue]]
speaker = "メルエル"
original = "「──うぅ……わたし、ぜったいにわすれないよ！\u3000キミがわすれたとしても、わたしは……」"
translation = "「──으으…… 나, 절대로 잊지 않을게! 네가 잊어버린다고 해도, 나는……」"

[[dialogue]]
speaker = "unk"
original = "そうか……確かに、俺たち会ったことがある"
translation = "그렇구나…… 확실히, 우리 만난 적이 있어."

[[dialogue]]
speaker = "メルエル"
original = "「本当！？\u3000はっきりとじゃなくても思い出してくれて、嬉しい♪」"
translation = "「정말!? 확실하게는 아니더라도 떠올려 줘서 기뻐♪」"

[[dialogue]]
speaker = "メルエル"
original = "「ううん、そんな全然、謝らなくてもいいよ。……今こうして再会できて、私はそれだけで嬉しいから」"
translation = "「아니야, 전혀 사과하지 않아도 돼. ……지금 이렇게 재회할 수 있어서, 나는 그것만으로도 기쁘니까.」"

[[dialogue]]
speaker = "メルエル"
original = "「……昔、天界へ帰る時に、星騎士になってこの学園でまた会おうって、キミと約束をしてたんだ」"
translation = "「……옛날에 천계로 돌아갈 때, 성기사가 되어서 이 학원에서 다시 만나자고 너와 약속했었어.」"

[[dialogue]]
speaker = "メルエル"
original = "「でも、入学した時にキミを探しても見つからなくて、ちょっぴり落ち込んじゃったりすることもあったけど……」"
translation = "「하지만 입학했을 때 너를 찾아도 보이지 않아서 조금 우울해지기도 했지만……」"

[[dialogue]]
speaker = "メルエル"
original = "「御前試合で戦う姿を見て、間違いなくキミだって思って。私、居ても立ってもいられなくて、こうして会いに来ちゃったんだ。えへへ♪」"
translation = "「어전 시합에서 싸우는 모습을 보고 틀림없이 너라고 생각했어. 나, 가만히 있을 수가 없어서 이렇게 만나러 와버렸어. 에헤헤♪」"

[[dialogue]]
speaker = "unk"
original = "もう星騎士を目指す約束してたんだな"
translation = "벌써 성기사를 목표로 하기로 약속했었구나."

[[dialogue]]
speaker = "unk"
original = "俺、１０年前の時点で、"
translation = "나, 10년 전 시점에서,"

[[dialogue]]
speaker = "メルエル"
original = "「──５年前、セイファート学園長に助けられたことがきっかけで星騎士に？\u3000そっか。だから私との約束を忘れてても、キミはこの学園にやって来たんだね」"
translation = "「──5년 전, 세이파트 학원장님께 도움을 받은 것이 계기가 되어 성기사가? 그렇구나. 그래서 나와의 약속을 잊었어도 너는 이 학원에 오게 된 거네.」"

[[dialogue]]
speaker = "メルエル"
original = "「私はそれが凄く嬉しいな。何はともあれ──」"
translation = "「나는 그게 너무 기뻐. 아무튼──」"

[[dialogue]]
speaker = "メルエル"
original = "「これからまた、幼なじみとしてよろしくね！\u3000会長くん♪」"
translation = "「앞으로 다시 소꿉친구로서 잘 부탁해! 회장군♪」"

[[dialogue]]
speaker = "unk"
original = "ああ、こちらこそよろしく、メルエル"
translation = "아아, 나야말로 잘 부탁해, 메르엘."

[[dialogue]]
speaker = "メルエル"
original = "「うんっ！\u3000せっかくだし、会長くんとは昔より仲良くなれたら嬉しいな～、なんて……えへへ♪」"
translation = "「응! 이왕 이렇게 된 거, 회장군과는 예전보다 더 사이좋게 지낼 수 있으면 좋겠다~ 싶어서…… 에헤헤♪」"

[[dialogue]]
speaker = "メルエル"
original = "「……ん？\u3000この『会長くん』って呼び方？」"
translation = "「……응? 이 『회장군』이라는 호칭?」"

[[dialogue]]
speaker = "メルエル"
original = "「ほら、キミはこれから、新星学園代表の星騎士になるわけでしょ？\u3000だから会長くんって響き、なんだか格好よくて素敵だなぁって♪」"
translation = "「봐봐, 너는 이제부터 신성학원 대표 성기사가 되는 거잖아? 그래서 회장군이라는 어감이 왠지 멋있고 근사해서♪」"

[[dialogue]]
speaker = "メルエル"
original = "「御前試合の時も、凄く格好よかったし！\u3000……あっ、会長くん、もしかして照れてる？」"
translation = "「어전 시합 때도 정말 멋있었어! ……앗, 회장군, 혹시 부끄러워하는 거야?」"

[[dialogue]]
speaker = "メルエル"
original = "「ふふっ、その照れた顔、昔を思い出すなぁ……」"
translation = "「후훗, 그 수줍어하는 얼굴, 옛날 생각이 나네……」"

[[dialogue]]
speaker = "メルエル"
original = "（あの時交わした<b>もう１つの約束</b>も、いつかキミに思い出して欲しい）"
translation = "(그때 나누었던 <b>또</b> <b>하나의</b> <b>약속</b>도 언젠가 네가 떠올려 줬으면 좋겠어.)"

[[dialogue]]
speaker = "メルエル"
original = "（だって１０年ぶりに再会して、わかっちゃったから）"
translation = "(그야 10년 만에 재회하고 깨달아 버렸으니까.)"

[[dialogue]]
speaker = "メルエル"
original = "（１０年経っても私はまだ、キミのことが『好き』なんだって）"
translation = "(10년이 지나도 나는 아직 너를 『좋아』한다는 걸.)"

[[dialogue]]
speaker = "メルエル"
original = "（私の初恋の男の子……思い出の中の淡い恋心だったかもしれない。だけど、再会した今はもう、そうじゃなくなってる）"
translation = "(나의 첫사랑 소년…… 추억 속의 옅은 연심이었을지도 몰라. 하지만 재회한 지금은 이제 그렇지 않아.)"

[[dialogue]]
speaker = "メルエル"
original = "（何気ない仕草や、言葉１つ１つに胸が高鳴っちゃうくらい、好き。……キミが好き）"
translation = "(무심한 몸짓이나 말 한마디 한마디에 가슴이 설렐 정도로 좋아. ……네가 좋아.)"

[[dialogue]]
speaker = "メルエル"
original = "（だから今度こそ……一意専心、キミを振り向かせて見せるんだから！）"
translation = "(그러니까 이번에야말로…… 일의전심, 네가 나를 돌아보게 만들 테니까!)"

