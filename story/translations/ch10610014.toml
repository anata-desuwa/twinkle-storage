[[dialogue]]
speaker = "unk"
original = "第4話,マリオン大戦,P"
translation = "제4화, 마리온 대전, P"

[[dialogue]]
speaker = "unk"
original = "マリオンが専属メイドみたいにお世話をしてくれるようになってから、付き合いも長くなってきたある日のこと。"
translation = "마리온이 전속 메이드처럼 뒷바라지를 해주게 된 뒤로 교류도 길어진 어느 날의 일."

[[dialogue]]
speaker = "マリオン"
original = "「～♪\u3000～～♪」"
translation = "「~♪ ～～♪」"

[[dialogue]]
speaker = "マリオン"
original = "「――おや？\u3000会長様、何か私に言いたそうな顔をしてらっしゃいますね。いかがされましたか？」"
translation = "「――어라? 회장님, 뭔가 제게 하고 싶은 말이 있는 듯한 얼굴을 하고 계시네요. 무슨 일이신가요?」"

[[dialogue]]
speaker = "unk"
original = "最近のマリオン……なんか数が増えてない？"
translation = "최근의 마리온…… 왠지 수가 늘어나지 않았어?"

[[dialogue]]
speaker = "マリオン"
original = "「え？\u3000……ああ、そういうことですか。確かに最近は、複数体で身の回りをお世話させていただいておりましたね」"
translation = "「에? ……아아, 그런 거였나요. 확실히 최근에는 여러 구체로 신변을 돌봐드리고 있었지요」"

[[dialogue]]
speaker = "マリオン"
original = "「実は先日、人形達全員で誰が会長様の担当になるか、大揉めする事案が発生致しまして」"
translation = "「사실 요전 날, 인형들 전원이 누가 회장님 담당이 될지를 두고 크게 다투는 사안이 발생했거든요」"

[[dialogue]]
speaker = "マリオン"
original = "「なんでそうなったかと申しますと、原因は嫉妬によるものです。会長様のお可愛さに我慢できなくなり、人形達が不満を噴出させたのです」"
translation = "「왜 그렇게 되었냐 하면 원인은 질투 때문입니다. 회장님의 귀여움을 견딜 수 없게 되어 인형들이 불만을 터뜨린 거예요」"

[[dialogue]]
speaker = "マリオン"
original = "「話し合いは熾烈を極め、やがて人形達は、担当の座を手に入れる為にバトルロイヤルまで行う事態に……」"
translation = "「회의는 치열하기 그지없었고, 이윽고 인형들은 담당 자리를 차지하기 위해 배틀 로얄까지 벌이는 사태에……」"

[[dialogue]]
speaker = "unk"
original = "まさかのマリオン大戦勃発！？"
translation = "설마 했던 마리온 대전 발발!?"

[[dialogue]]
speaker = "マリオン"
original = "「――あら、人形達が嫉妬だなんて冗談だとお思いですか？\u3000嘘ではないですよ。本当にあったことです」"
translation = "「――어머, 인형들이 질투한다는 게 농담이라고 생각하시나요? 거짓말이 아니에요. 정말로 있었던 일이랍니다」"

[[dialogue]]
speaker = "マリオン"
original = "「（会長様には秘密にしていますが、私は自分と寸分違わぬ同スペックの人形を作ることが可能ですから……）」"
translation = "「(회장님께는 비밀로 하고 있지만, 저는 저와 조금도 다르지 않은 동일 스펙의 인형을 만드는 게 가능하니까요……)」"

[[dialogue]]
speaker = "マリオン"
original = "「（それこそ、<b>中身の人格</b>まで）」"
translation = "「(그것도 바로, <b>내면의</b> <b>인격</b>까지 말이죠)」"

[[dialogue]]
speaker = "マリオン"
original = "「それに私は、最初から会長様に対して、本気でお可愛いと思っていますよ？」"
translation = "「게다가 저는 처음부터 회장님에 대해 진심으로 귀엽다고 생각하고 있다고요?」"

[[dialogue]]
speaker = "unk"
original = "け、結婚とか子育てしたいっていうのも……？"
translation = "겨, 결혼이라든가 육아를 하고 싶다는 것도……?"

[[dialogue]]
speaker = "マリオン"
original = "「ええ、本当です。私、子供を産むことに興味がありまして」"
translation = "「네, 정말이에요. 저, 아이를 낳는 것에 흥미가 있거든요」"

[[dialogue]]
speaker = "マリオン"
original = "「実は、もともと私は人間界の生まれではないのです。育った場所が特殊な環境でして、自分の子供を産んで育てるという意識を、長い間持ったことがありませんでした」"
translation = "「사실 원래 저는 인간계 태생이 아니에요. 자란 곳이 특수한 환경이라 제 아이를 낳아 기른다는 의식을 오랫동안 가져본 적이 없었습니다」"

[[dialogue]]
speaker = "マリオン"
original = "「それに加えて、私は自分の能力で、分身とも言える人形を作り出すことができましたから、昔は他人への関心自体が薄い性格でした」"
translation = "「거기에 더해 저는 제 능력으로 분신이라 할 수 있는 인형을 만들어낼 수 있었기에, 옛날에는 타인에 대한 관심 자체가 희박한 성격이었죠」"

[[dialogue]]
speaker = "マリオン"
original = "「しかしある時、流星学園に通うことが決まって、長い間住んでいた故郷を離れ、人間界へとやってきたのです」"
translation = "「하지만 어느 때, 류세이 학원에 다니기로 결정되어 오랫동안 살았던 고향을 떠나 인간계로 오게 되었습니다」"

[[dialogue]]
speaker = "マリオン"
original = "「そこでトワのような友人ができて、星徒会に入って、多くの子達と関わるようになりました」"
translation = "「그곳에서 토와 같은 친구가 생기고, 성도회에 들어가 많은 아이와 관계를 맺게 되었죠」"

[[dialogue]]
speaker = "マリオン"
original = "「そうする内に、次第に私は、<b>自分ではない他の誰か</b>に強い関心を抱くようになったのです」"
translation = "「그러는 사이 점차 저는 <b>내가</b> <b>아닌</b> <b>다른</b> <b>누군가</b>에게 강한 관심을 갖게 된 것입니다」"

[[dialogue]]
speaker = "マリオン"
original = "「そして、今では会長様も知っての通り、可愛い子を見ると愛でずにはいられない性格になってしまって――」"
translation = "「그리고 지금은 회장님도 아시다시피 귀여운 아이를 보면 사랑해주지 않고서는 못 배기는 성격이 되어버려서――」"

[[dialogue]]
speaker = "マリオン"
original = "「結果、自分の分身ではなく、自分の子供が欲しいなと思うようになったというわけです」"
translation = "「결과적으로 제 분신이 아니라 제 아이를 갖고 싶다고 생각하게 됐다는 이야기예요」"

[[dialogue]]
speaker = "マリオン"
original = "「会長様との、お可愛い子を<emoji=heart04>\u3000……うふふっ<emoji=heart04>」"
translation = "「회장님과의 귀여운 아이를<emoji=heart04> ……우후훗<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「――子供がほしいっていうのは、わかっていただけましたか？\u3000それならよかったです♪」"
translation = "「――아이를 갖고 싶다는 건 이해해 주셨나요? 그렇다면 다행이에요♪」"

[[dialogue]]
speaker = "マリオン"
original = "「……？\u3000会長様、どうされました？」"
translation = "「……? 회장님, 왜 그러시나요?」"

[[dialogue]]
speaker = "unk"
original = "マリオンは俺のこと……どう思ってるんだ？"
translation = "마리온은 나를…… 어떻게 생각하고 있는 거야?"

[[dialogue]]
speaker = "マリオン"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker = "unk"
original = "俺はマリオンを、異性として好きになってしまっているが、マリオンが特別そうじゃないなら、心から好きだと思える相手と子供を作った方がいいと思う。そう伝えると――"
translation = "나는 마리온을 이성으로서 좋아하게 되어버렸지만, 마리온이 특별히 그렇지 않다면 진심으로 좋아할 수 있는 상대와 아이를 만드는 게 좋다고 생각한다. 그렇게 전하자――"

[[dialogue]]
speaker = "マリオン"
original = "「……ふふっ、何を仰るかと思えば、会長様――」"
translation = "「……후훗, 무슨 말씀을 하시나 했더니, 회장님――」"

[[dialogue]]
speaker = "マリオン"
original = "「先程、嫉妬したって言ったじゃないですか」"
translation = "「방금 질투했다고 말씀드렸잖아요」"

[[dialogue]]
speaker = "マリオン"
original = "「確かに、出会ったばかりの頃は気に入った男の子ではあっても、好きだとは言い切れなかったかもしれません」"
translation = "「확실히 처음 만났을 무렵에는 마음에 드는 남자아이일지언정 좋아한다고 단정 짓지는 못했을지도 모릅니다」"

[[dialogue]]
speaker = "マリオン"
original = "「お可愛いから、ついからかいたくなる気持ちも、多少……いえ、すごくありました」"
translation = "「귀여우니까 나도 모르게 놀리고 싶어지는 기분도 어느 정도…… 아니, 아주 많이 있었고요」"

[[dialogue]]
speaker = "マリオン"
original = "「ですが……私達が会長様の担当である私に嫉妬したのは、会長様のことがどんどん好きになっていって、気持ちを抑えられなくなったからです」"
translation = "「하지만…… 저희가 회장님의 담당인 저에게 질투한 것은, 회장님이 점점 좋아져서 마음을 억누를 수 없게 되었기 때문이에요」"

[[dialogue]]
speaker = "マリオン"
original = "「会長様――私は今、あなたのことが本当に好きですよ」"
translation = "「회장님―― 저는 지금 당신을 정말로 좋아한답니다」"

[[dialogue]]
speaker = "マリオン"
original = "「それで……先程、会長様の言ったことも、本気と受け取ってよろしいですか？」"
translation = "「그래서…… 아까 회장님이 하신 말씀도 진심으로 받아들여도 될까요?」"

[[dialogue]]
speaker = "マリオン"
original = "「私のこと……好きだって、確かに言って下さいましたよね？」"
translation = "「저를…… 좋아한다고 분명히 말씀해 주셨죠?」"

[[dialogue]]
speaker = "マリオン"
original = "「ふふっ<emoji=heart04>\u3000聞き間違えじゃないとわかったら、私、もう我慢できなくなっちゃいますよ？」"
translation = "「후훗<emoji=heart04> 잘못 들은 게 아니라는 걸 알았다면 저, 이제 더는 못 참게 되어버릴 거예요?」"

[[dialogue]]
speaker = "unk"
original = "ちょっ、なんで入口の鍵閉めたの！？"
translation = "잠깐, 왜 입구 문을 잠근 거야!?"

[[dialogue]]
speaker = "マリオン"
original = "「うふふっ、第二次マリオン大戦勃発です<emoji=heart04>」"
translation = "「우후훗, 제2차 마리온 대전 발발입니다<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「んっ……<emoji=heart04>」"
translation = "「응읏……<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「――大丈夫です、会長様……<emoji=heart04>\u3000複数の私達で全身をマッサージさせていただくだけですから、力を抜いて下さい……<emoji=heart04>」"
translation = "「――괜찮아요, 회장님……<emoji=heart04> 여러 명의 저희가 전신을 마사지해 드릴 뿐이니까 힘을 빼주세요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "な、何も考えられなくなる……"
translation = "아, 아무것도 생각할 수 없게 돼……"

[[dialogue]]
speaker = "マリオン"
original = "「ふふっ、お可愛いらしい顔ですこと……<emoji=heart04>\u3000私達によるあなたの為だけのハーレム、どうかたっぷりとご堪能下さいませ……<emoji=heart04>」"
translation = "「후훗, 참으로 귀여운 얼굴이네요……<emoji=heart04> 저희에 의한 당신만을 위한 하렘을 부디 마음껏 만끽하시길……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その後、俺はマリオン達に埋もれて、濃密な甘い時を過ごすのだった――"
translation = "그 후, 나는 마리온들에게 파묻혀서 농밀하고 달콤한 시간을 보내는 것이었다――"

