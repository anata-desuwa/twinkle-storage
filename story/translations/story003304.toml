[[dialogue]]
speaker = "パテル"
original = "「次は釣りとかどう？\u3000魚がパテルストーンを飲み込んでるかも」"
translation = "「다음은 낚시 같은 거 어때? 물고기가 파텔 스톤을 삼켰을지도 몰라.」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「網ならアルモたんに任せろなのだー！\u3000この網は何でも捕まえられるのだ！」"
translation = "「그물이라면 알모땅에게 맡기는 것이다! 이 그물은 뭐든지 잡을 수 있는 것이다!」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「でも、本当に釣りでパテルストーンが見つかるのでしょうか？」"
translation = "「하지만 정말로 낚시로 파텔 스톤을 찾을 수 있을까요?」"

[[dialogue]]
speaker = "パテル"
original = "「パテルストーンは本来あたしの力。だからあたしのところに引き寄せられる。──多分！」"
translation = "「파텔 스톤은 원래 내 힘. 그러니까 나한테 끌려오게 돼 있어. ──아마도!」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「多分なのだ！？」"
translation = "「아마도인 것이다!?」"

[[dialogue]]
speaker = "unk"
original = "でもみんなで釣りをするのは楽しそう"
translation = "그래도 다 같이 낚시하는 건 즐거울 것 같아."

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「確かにそうなのだ！\u3000アルモたんはやりたいのだ！」"
translation = "「확실히 그런 것이다! 알모땅은 하고 싶은 것이다!」"

[[dialogue]]
speaker = "unk"
original = "俺とアルモたん、マグダレナとパテルの二組に分かれて釣りを始める。"
translation = "나와 알모땅, 막달레나와 파텔 두 팀으로 나뉘어 낚시를 시작한다."

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「会長、釣れたのだ？」"
translation = "「회장, 잡힌 것이다?」"

[[dialogue]]
speaker = "unk"
original = "そんなすぐには釣れないよ"
translation = "그렇게 금방 잡히지는 않아."

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「そうなのかー……早く出番が来てほしいのだ」"
translation = "「그런 것인가─…… 빨리 차례가 왔으면 좋겠는 것이다.」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「うずうず……うずうず……」"
translation = "「근질근질…… 근질근질……」"

[[dialogue]]
speaker = "unk"
original = "アルモたんはお魚好き？"
translation = "알모땅은 생선 좋아해?"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「好きなのだ！\u3000お肉が一番好きだけど、お魚も美味しいのだ！」"
translation = "「좋아하는 것이다! 고기를 제일 좋아하지만, 생선도 맛있는 것이다!」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「アジ、イワシ、サーモン、タイ、マグロ、ブリ……美味しいお魚は数えきれないのだ！」"
translation = "「전갱이, 정어리, 연어, 도미, 참치, 방어…… 맛있는 생선은 셀 수 없는 것이다!」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「食べ方も、お寿司にお刺身に、煮魚や照り焼きもいいのだ！\u3000全部好きなのだ！」"
translation = "「먹는 법도 초밥에 회, 생선 조림이나 데리야키도 좋은 것이다! 전부 좋아하는 것이다!」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「え？\u3000バーベキューならホイル焼きがおすすめ？\u3000野菜と一緒にアルミホイルに包んで、金網の上でじゅう～っと…………じゅるり」"
translation = "「에? 바비큐라면 호일 구이를 추천한다고? 채소랑 같이 알루미늄 호일에 싸서 석쇠 위에서 지글지글…… 쥬르륵.」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「もう待ちきれないぞー！\u3000アルモたんが海に入ってお魚獲ってくるのだ～！」"
translation = "「이제 못 기다리겠다─! 알모땅이 바다에 들어가서 생선 잡아올 것이다~!」"

[[dialogue]]
speaker = "unk"
original = "もうちょっと待って"
translation = "조금만 더 기다려 봐."

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「待てないのだ～！\u3000このままじゃお腹空きすぎて死んじゃうのだ～っ！」"
translation = "「못 기다리는 것이다~! 이대로는 배가 너무 고파서 죽어버리는 것이다~!」"

[[dialogue]]
speaker = "unk"
original = "来た──！"
translation = "왔다──!"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「ヒットなのだ！！」"
translation = "「히트인 것이다!!」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「おお……釣り竿がグイグイ引いてるのだ……これは大物なのだ……！\u3000会長、頑張るのだ！」"
translation = "「오오…… 낚싯대가 쭉쭉 당겨지는 것이다…… 이건 대물인 것이다……! 회장, 힘내는 것이다!」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「会長、頑張れ、頑張れなのだ！」"
translation = "「회장, 힘내라, 힘내라인 것이다!」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「獲物が近づいてきたのだ……もう少し……もう少しなのだ……」"
translation = "「사냥감이 가까워진 것이다…… 조금만 더…… 조금만 더인 것이다……」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「よーし、後はアルモたんに任せるのだ！\u3000えいっ──！」"
translation = "「좋아, 나머지는 알모땅에게 맡기는 것이다! 에잇──!」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「獲ったのだ～！！」"
translation = "「잡은 것이다~!!」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「大きなお魚なのだ！\u3000とっても美味しそうなのだ！」"
translation = "「커다란 생선인 것이다! 아주 맛있어 보이는 것이다!」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「ホイル焼きにするのが楽しみなのだ……じゅるり」"
translation = "「호일 구이로 해 먹을 게 기대되는 것이다…… 쥬르륵.」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「すごい大物ですね～♪\u3000会長もアルモタヘルもお見事でした♪」"
translation = "「굉장한 대물이네요~♪ 회장님도 아르모타헬도 훌륭했어요♪」"

[[dialogue]]
speaker = "？？？"
original = "「そ～っと……」"
translation = "「살며시……」"

[[dialogue]]
speaker = "パテル"
original = "「コチョコチョコチョ～っ」"
translation = "「간질간질간질~」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「あはは、あははははっ！\u3000くすぐったいのだ！」"
translation = "「아하하, 아하하하하! 간지러운 것이다!」"

[[dialogue]]
speaker = "パテル"
original = "「アハハ、隙だらけだよ♪」"
translation = "「아하하, 빈틈투성이야♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「パテル、せっかく獲ったお魚を逃がしたらどうするんですか」"
translation = "「파텔, 어렵게 잡은 생선을 놓치면 어떡해요.」"

[[dialogue]]
speaker = "パテル"
original = "「ごめんごめん。がら空きだったからつい、ね」"
translation = "「미안 미안. 텅 비어 있길래 그만.」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「アルモたんはこれしきじゃお魚を逃がさないぞ！\u3000絶対食べるのだ！」"
translation = "「알모땅은 이 정도로 생선을 놓치지 않는다! 반드시 먹을 것이다!」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「ん？\u3000今、何かキラッと光ったのだ」"
translation = "「응? 지금 뭔가 반짝하고 빛난 것이다.」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「パテルストーン！\u3000お魚の口から出てきたのだ！\u3000このお魚、とっても食いしん坊さんなのだ！」"
translation = "「파텔 스톤! 생선 입에서 나온 것이다! 이 생선, 아주 먹보인 것이다!」"

[[dialogue]]
speaker = "パテル"
original = "「ほら、言ったでしょ。あたしのところに引き寄せられてくるって」"
translation = "「봐, 말했지. 나한테 끌려온다고.」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「会長、この調子でどんどん釣るのだ！\u3000アルモたんもどんどん捕まえるのだ！」"
translation = "「회장, 이 기세로 팍팍 낚는 것이다! 알모땅도 팍팍 잡는 것이다!」"

[[dialogue]]
speaker = "？？？"
original = "「──」"
translation = "「──」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「誰だ──なのだっ」"
translation = "「누구냐──인 것이다!」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「あれ？\u3000誰もいないのだ。後ろに誰かいた気がしたのに……」"
translation = "「어레? 아무도 없는 것이다. 뒤에 누가 있었던 기분이 들었는데……」"

[[dialogue]]
speaker = "unk"
original = "また来た……！"
translation = "또 왔다……!"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「やった！\u3000またヒットなのだ！\u3000今度はどんな魚が釣れ──」"
translation = "「나이스! 또 히트인 것이다! 이번엔 어떤 생선이 낚일──」"

[[dialogue]]
speaker = "サメ"
original = "「シャーーーッ！！」"
translation = "「샤아아아앗!!」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「サメなのだーーー！！？」"
translation = "「상어인 것이다──!!?」"

[[dialogue]]
speaker = "サメ"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "パテル"
original = "「あ、またサメが逃げようとしてるね」"
translation = "「아, 또 상어가 도망치려 하네.」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「逃がさないのだ！\u3000捕まえるのだっ！\u3000……ふん！」"
translation = "「안 놓치는 것이다! 잡는 것이다! ……흡!」"

[[dialogue]]
speaker = "unk"
original = "アルモたんの網の口が大きく広がり、サメの巨体を呑み込むように捕獲した。"
translation = "알모땅의 그물 입구가 크게 벌어지며 상어의 거구를 삼키듯이 포획했다."

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「ふふん、この網に捕まえられない獲物はない……のだ！」"
translation = "「후훙, 이 그물에 잡히지 않는 사냥감은 없는…… 것이다!」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「でも網の中にサメがいませんよ？」"
translation = "「하지만 그물 안에 상어가 없는데요?」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「あれ？」"
translation = "「어라?」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「え～っ！？\u3000サメじゃなくてパテルストーンが網の中に入っているのだ！？」"
translation = "「에~!? 상어가 아니라 파텔 스톤이 그물 안에 들어있는 것이다!?」"

[[dialogue]]
speaker = "パテル"
original = "「う～ん、どうなってるんだろうねー。サメと関係あるのかな？」"
translation = "「으음, 어떻게 된 걸까. 상어랑 관계가 있는 걸까?」"

[[dialogue]]
speaker = "パテル"
original = "「ま、パテルストーンは手に入れられたし、結果オーライってことで♪」"
translation = "「뭐, 파텔 스톤은 손에 넣었으니 결과 오라이라는 걸로♪」"

[[dialogue]]
speaker = "unk"
original = "その後も釣りを続けたが、釣果は上がるものの、サメは釣れなかった。"
translation = "그 후로도 낚시를 계속했지만, 수확은 늘어났어도 상어는 낚이지 않았다."

