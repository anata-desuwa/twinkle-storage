[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「申し訳ありません、ご主人様。この始末はいかようにも。どんな罰でもお受けします」"
translation = "「죄송합니다, 주인님. 이 뒤처리는 어떻게든. 어떤 벌이라도 받겠습니다」"

[[dialogue]]
speaker = "unk"
original = "普段と同じ淡々とした口調で謝罪を述べ、恭しく頭を下げるキリカ。"
translation = "평소와 다름없는 담담한 어조로 사죄를 고하며 공손히 머리를 숙이는 키리카."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そこに四つん這いになれ」"
translation = "「거기에 엎드려라」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「……かしこまりました」"
translation = "「……알겠습니다」"

[[dialogue]]
speaker = "unk"
original = "キリカは先ほどの言葉通り、躊躇いなく、まるで機械のように命令に従う。"
translation = "키리카는 방금 전의 말대로 주저 없이, 마치 기계처럼 명령에 따른다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「動くなよ」"
translation = "「움직이지 마」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "胸と秘部を剥き出しにされ、目隠しをされならも、四つん這いの姿勢を維持して命令を守るキリカ。"
translation = "가슴과 비부를 노출당하고, 눈이 가려진 채이면서도, 엎드린 자세를 유지하며 명령을 지키는 키리카."

[[dialogue]]
speaker = "unk"
original = "羞恥のせいか、それとも厳しい仕打ちに怯えているのか、細く引き締まった体がかすかに震え、元々色白な肌が淡く紅潮していた。"
translation = "수치심 때문인지, 아니면 엄한 처우에 겁을 먹은 것인지, 가늘고 탄탄한 몸이 미세하게 떨리고, 원래 하얀 피부가 옅게 홍조를 띠고 있었다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「罰を与えてください、ご主人様……」"
translation = "「벌을 내려주세요, 주인님……」"

[[dialogue]]
speaker = "unk"
original = "メイドとして完璧なキリカが粗相をするはずがなく、そもそも俺は彼女のご主人様ではない。"
translation = "메이드로서 완벽한 키리카가 실수를 할 리가 없었고, 애초에 나는 그녀의 주인님이 아니다."

[[dialogue]]
speaker = "unk"
original = "要するに、<b>そういう設定</b>で行われる一種の<ruby>戯れ<rt>プレイ</rt></ruby>だ。"
translation = "요컨대, <b>그런</b> <b>설정</b>으로 진행되는 일종의 유희<rt>플레이</rt>다."

[[dialogue]]
speaker = "unk"
original = "俺とキリカは師弟として絆を深めていくうち男女の仲になり、そして体を重ねるようになった。"
translation = "나와 키리카는 사제로서 유대를 쌓아가는 동안 남녀 사이가 되었고, 이윽고 몸을 겹치는 사이가 되었다."

[[dialogue]]
speaker = "unk"
original = "最初は冗談半分で試しただけだったのだが、キリカが意外な適応を見せ、いつしか同種のプレイを好んでするようになって──"
translation = "처음에는 농담 반으로 시도해 본 것뿐이었지만, 키리카가 의외의 적응력을 보였고, 어느새 동종의 플레이를 즐기게 되어──"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「はぁ……ふぅ……ご主人様ぁ……」"
translation = "「하아…… 후우…… 주인님……」"

[[dialogue]]
speaker = "unk"
original = "今の俺はキリカの主人であり、キリカの全てを自由にできる権利がある。"
translation = "지금의 나는 키리카의 주인이며, 키리카의 모든 것을 자유롭게 할 권리가 있다."

[[dialogue]]
speaker = "unk"
original = "全能感めいた不思議な高揚を感じながら、丸みを帯びたお尻に手を伸ばす。"
translation = "전능감 같은 신기한 고양감을 느끼며, 둥그스름한 엉덩이로 손을 뻗는다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「っ……」"
translation = "「윽……」"

[[dialogue]]
speaker = "unk"
original = "手が触れる寸前、お尻を叩かれると思ったのか、ビクッと下半身が跳ねた。"
translation = "손이 닿기 직전, 엉덩이를 맞을 거라 생각했는지, 움찔하며 하반신이 튀어 올랐다."

[[dialogue]]
speaker = "unk"
original = "体を強張らせるキリカのお尻をそのまま無遠慮に撫で回す。"
translation = "몸을 굳히는 키리카의 엉덩이를 그대로 거침없이 주무른다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「んん……はぁ……は、ん……」"
translation = "「응응…… 하아…… 하, 응……」"

[[dialogue]]
speaker = "unk"
original = "きめ細やかな肌が心地良く、女性らしい肉の柔らかさも素晴らしい。"
translation = "결이 고운 피부가 기분 좋고, 여성스러운 살집의 부드러움도 훌륭하다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ふ……は……はぁは……ふっ、んん……」"
translation = "「후…… 하…… 하아 하…… 훗, 응……」"

[[dialogue]]
speaker = "unk"
original = "目隠しのせいで敏感になっているのか、いつもクールなキリカのものとは思えない艶めかしい吐息がこぼれる。"
translation = "눈가리개 때문에 예민해진 것인지, 평소의 쿨한 키리카라고는 생각되지 않는 요염한 숨결이 새어 나온다."

[[dialogue]]
speaker = "unk"
original = "キリカの体をもっと味わいたくて、豊満な乳房を強く握った。"
translation = "키리카의 몸을 좀 더 맛보고 싶어서, 풍만한 유방을 강하게 움켜쥐었다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「んんっ……！\u3000んはぁ……はぁっ、くぅっ……ふ……はん……」"
translation = "「응윽……! 응하아…… 하앗, 쿠윽…… 후…… 하응……」"

[[dialogue]]
speaker = "unk"
original = "芸術品のような胸を荒々しく揉みしだかれ、痛みとも快感ともつかない声を漏らすキリカ。"
translation = "예술품 같은 가슴을 거칠게 주물러대자, 아픔인지 쾌감인지 모를 소리를 흘리는 키리카."

[[dialogue]]
speaker = "unk"
original = "動くなという命令のせいで抵抗を許されず、四つん這いのままじっと耐えることしかできないでいた。"
translation = "움직이지 말라는 명령 때문에 저항도 못 하고, 엎드린 채 가만히 견딜 수밖에 없었다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ふっ……くっ……ご主人様の、手が…………あ、はん……んぅ……」"
translation = "「훗…… 윽…… 주인님의, 손이………… 아, 하응…… 응으……」"

[[dialogue]]
speaker = "unk"
original = "硬くなりかけてきた乳首をぎゅっと摘まむ。"
translation = "딱딱해지기 시작한 유두를 꽉 꼬집는다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「んん～～っ……！」"
translation = "「응응～～윽……!」"

[[dialogue]]
speaker = "unk"
original = "その瞬間、苦悶と快感の混ざった声が上がった。"
translation = "그 순간, 고통과 쾌감이 섞인 목소리가 터져 나왔다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ふっ、んっ……はぁ、ぁん…………ん……ふ……んっ……」"
translation = "「훗, 응…… 하아, 아앙………… 응…… 후…… 응……」"

[[dialogue]]
speaker = "unk"
original = "乳房を揉みくちゃにされ、乳首をつねられ、痛みすら快楽に変わっていく。"
translation = "유방이 마구 주물러지고, 유두가 비틀리며, 통증조차 쾌락으로 변해간다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「あぁっ……乳首、きゅっとされて……んんっ……！\u3000はぁ……ふあぁ、あっ……ぁん……」"
translation = "「아앗…… 유두, 꽉 조여져서…… 응윽……! 하아…… 후아아, 앗…… 아앙……」"

[[dialogue]]
speaker = "unk"
original = "視界を奪われた暗闇の中で、何をされるかわからない恐怖。無抵抗のまま弄ばれる屈辱。"
translation = "시야를 빼앗긴 어둠 속에서, 무엇을 당할지 모르는 공포. 무저항인 채 농락당하는 굴욕."

[[dialogue]]
speaker = "unk"
original = "しかしその恐怖と屈辱がキリカの情欲を燃え上がらせているようでもあった。"
translation = "하지만 그 공포와 굴욕이 키리카의 정욕을 불타오르게 하는 듯도 했다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「んんっ……はぁ、はん……ふっ……あ……あ……ん……」"
translation = "「응윽…… 하아, 하응…… 훗…… 아…… 아…… 응……」"

[[dialogue]]
speaker = "unk"
original = "あのキリカが女らしい喘ぎを漏らし、指を押し返すほどに乳首を硬く尖らせている。"
translation = "그 키리카가 여자다운 신음을 흘리며, 손가락을 밀어낼 정도로 유두를 딱딱하고 뾰족하게 세우고 있다."

[[dialogue]]
speaker = "unk"
original = "腕を振り上げ、肉付きのいい尻を叩くと──"
translation = "팔을 휘둘러 살집 좋은 엉덩이를 때리자──"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ひぃんっ！？」"
translation = "「히잉!?」"

[[dialogue]]
speaker = "unk"
original = "平手が尻の肉を打った瞬間、小気味良い音が響き、甲高い声で鳴いた。"
translation = "손바닥이 엉덩이 살을 때린 순간, 경쾌한 소리가 울려 퍼졌고, 그녀는 날카로운 비명을 질렀다."

[[dialogue]]
speaker = "unk"
original = "蹂躙されるがままになっていて、この女を自分のものにしたという征服感がたまらない。"
translation = "유린당하는 대로 내맡겨진 이 여자를 자신의 것으로 만들었다는 정복감이 참을 수 없다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ふぅ、ふぅ…………はぁ、は…………はあぁ……」"
translation = "「후우, 후우………… 하아, 하………… 하아아……」"

[[dialogue]]
speaker = "unk"
original = "それでも命令された姿勢をいじらしく保ったまま、荒い息を吐くキリカ。"
translation = "그런데도 명령받은 자세를 애처롭게 유지한 채, 거친 숨을 내뱉는 키리카."

[[dialogue]]
speaker = "unk"
original = "はだけたメイド服から覗く肌がしっとりと汗ばみ、いやらしく腰をくねらせ、剥き出しの秘部からは透明な蜜を垂らしている。"
translation = "흐트러진 메이드복 사이로 보이는 피부가 촉촉하게 땀에 젖어, 야하게 허리를 뒤틀며 노출된 비부에서는 투명한 애액을 흘리고 있다."

[[dialogue]]
speaker = "unk"
original = "淫猥な姿に興奮をかき立てられ、怒張したペニスをキリカの秘部に突き付ける。"
translation = "음란한 모습에 흥분이 고조되어, 팽창한 자지를 키리카의 비부에 들이댄다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「あ──」"
translation = "「아──」"

[[dialogue]]
speaker = "unk"
original = "ここからが本当のお仕置き。"
translation = "여기서부터가 진짜 벌."

[[dialogue]]
speaker = "unk"
original = "そして腰を突き出し、ペニスを一気にキリカの中へと押し込んだ。"
translation = "그리고 허리를 내밀어, 자지를 단숨에 키리카의 안으로 밀어 넣었다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ふぁああ～～～～～～っ<emoji=heart04>」"
translation = "「후아아아～～～～～～윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "濡れそぼった秘部がぐちゅっといやらしい音を立てて、赤黒いペニスを呑み込んでいく。"
translation = "흠뻑 젖은 비부가 구축하며 야한 소리를 내고, 거무스름한 자지를 삼켜간다."

[[dialogue]]
speaker = "unk"
original = "キリカの中はとろとろの蜜で満たされいて、熱く火照った膣肉に包まれながら腰を大きく動かす。"
translation = "키리카의 안은 걸쭉한 애액으로 가득 차 있었고, 뜨겁게 달아오른 질 내부의 살에 감싸인 채 허리를 크게 움직인다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「はぁっ、はんっ……ご主人様のおち○ちんが、入ってきて……お腹の中で、擦れてますっ……ふっ……んはっ、はぁっ……<emoji=heart04>」"
translation = "「하앗, 하응…… 주인님의 자지가, 들어와서…… 배 속에서, 쓸리고 있어요…… 훗…… 응핫, 하앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「何も見えなくて、ご主人様だけ感じます……熱いぃ……ふぁっ、はぁっ……ご主人様の、熱いぃっ……はっ、あ……ふああっ……<emoji=heart04>」"
translation = "「아무것도 안 보여서, 주인님만 느껴져요…… 뜨거워어…… 하앗, 하앗…… 주인님의, 뜨거워엇…… 핫, 아…… 후아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "柔らかな肉がうねってペニスを奥へと誘い、粘膜が絡みついて至上の快楽をもたらす。"
translation = "부드러운 살이 꿈틀대며 자지를 안쪽으로 유혹하고, 점막이 얽혀들어 지고의 쾌락을 가져다준다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「はぁは、あっ……はぁっ……ご主人様の、おち○ちん、大きいですっ……ふっ、はぁ……あっ、はぁっ……<emoji=heart04>」"
translation = "「하아 하, 앗…… 하앗…… 주인님의, 자지, 커요…… 훗, 하아…… 앗, 하앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ふああっ、はぁ、ああっ……は、ふぅ……<emoji=heart04>\u3000キリカのおま○この中で、ご主人様のおち○ちんが動いてますぅっ……<emoji=heart04>」"
translation = "「후아앗, 하아, 아앗…… 하, 후우……<emoji=heart04> 키리카의 보지 안에서, 주인님의 자지가 움직이고 있어요오……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "動くなと命令され、四つん這いのまま貫かれてだらしなく喘ぐキリカ。"
translation = "움직이지 말라는 명령을 받고, 엎드린 채 꿰뚫려 속절없이 신음하는 키리카."

[[dialogue]]
speaker = "unk"
original = "強く、優秀で、冷静で、そんなキリカが強制的に快楽を与えられ、甲高い嬌声を上げてよがるのがたまらない。"
translation = "강하고, 우수하고, 냉정하고, 그런 키리카가 강제적으로 쾌락을 주입받아, 날카로운 교성을 지르며 느끼는 것이 참을 수 없다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「んんっ、は……はんっ……ご主人様の、太くて……ふぁ、はぁっ……中から広げられてっ……<emoji=heart04>」"
translation = "「응윽, 하…… 하응…… 주인님의, 굵어서…… 하아, 하앗…… 안쪽부터 벌려져서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「お仕置きで感じているのか」"
translation = "「벌을 받으면서 느끼고 있는 거냐」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「いえそんな――」"
translation = "「아니요 그런──」"

[[dialogue]]
speaker = "unk"
original = "口答えしようとした瞬間、思い切り力を込めてペニスを突き入れた。"
translation = "말대꾸를 하려던 순간, 힘껏 힘을 주어 자지를 찔러 넣었다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「んん～～～っ！？」"
translation = "「응응～～～윽!?」"

[[dialogue]]
speaker = "unk"
original = "自身の淫乱さと浅ましさを刻み込むために、ズン、ズンと荒々しく打ち込む。"
translation = "자신의 음란함과 천박함을 각인시키기 위해, 즈음, 즈음 하고 거칠게 박아넣는다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ひああぁっ<emoji=heart04>\u3000ひゃんっ<emoji=heart04>\u3000ふぁあああっ<emoji=heart04>\u3000あ──あぁんっ<emoji=heart04>」"
translation = "「히아아앗<emoji=heart04> 히양<emoji=heart04> 후아아앗<emoji=heart04> 아──아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「も、申し訳ございません、ご主人様…………はっ、あっ……は──んんーーっ！！」"
translation = "「죄, 죄송합니다, 주인님………… 핫, 앗…… 하──응응ーー윽!!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「本当にいやらしいメイドだ──」"
translation = "「정말 음란한 메이드군──」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「んんっ……！」"
translation = "「응윽……!」"

[[dialogue]]
speaker = "unk"
original = "耳元で囁いた瞬間、キリカの体が震えた。"
translation = "귓가에 속삭인 순간, 키리카의 몸이 떨렸다."

[[dialogue]]
speaker = "unk"
original = "ペニスで突かれて喘ぎ、感じると言葉で<ruby>詰<rt>なじ</rt></ruby>られる。"
translation = "자지로 찔리며 신음하고, 느낀다고 말로 힐난당한다."

[[dialogue]]
speaker = "unk"
original = "逃げ場のない責め。けれど今のキリカには被虐の悦びに変わる。"
translation = "도망칠 곳 없는 고문. 하지만 지금의 키리카에게는 피학의 기쁨으로 변한다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「申し訳、ありません……キリカはご主人様にお仕置きされて、感じてしまう、はしたないメイドですっ……！」"
translation = "「죄송, 합니다…… 키리카는 주인님께 벌을 받고, 느껴버리는, 천박한 메이드입니다……!」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ご主人様のたくましい肉棒で、いやらしいキリカにもっとお仕置きしてくださいっ！」"
translation = "「주인님의 늠름한 육봉으로, 음란한 키리카에게 더 벌을 주세요!」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ふっ、あっ……はぁん……淫乱メイドのキリカを躾けてください、ご主人様ぁっ……<emoji=heart04>」"
translation = "「훗, 앗…… 하앙…… 음란 메이드인 키리카를 길들여 주세요, 주인님……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "懺悔しながら膣壁はひくひくと嬉しそうにペニスを締め付けていて、本当に淫乱なメイドだ。"
translation = "참회하면서도 질벽은 실룩실룩 기쁜 듯이 자지를 조여대고 있어, 정말 음란한 메이드다."

[[dialogue]]
speaker = "unk"
original = "そう、俺は主人なんだからメイドを躾けないと。"
translation = "그래, 나는 주인이니까 메이드를 길들여야지."

[[dialogue]]
speaker = "unk"
original = "だから壊れるぐらい激しく、キリカがキリカでなくなるくらい、全力で加速させる。"
translation = "그러니 망가질 정도로 격렬하게, 키리카가 키리카가 아니게 될 정도로, 전력으로 가속시킨다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ひあぁああ～～～っ<emoji=heart04>\u3000あっ、あっ、あんっ……激しっ──んんっ<emoji=heart04>\u3000ふあぁっ、あっ、あっ……んぁああっ……<emoji=heart04>」"
translation = "「히아아아아～～～윽<emoji=heart04> 앗, 앗, 아앙…… 격해──응윽<emoji=heart04> 후아앗, 앗, 앗…… 응아아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「おち○ちんで、キリカのおま○こ、いっぱいにされてっ……はっ、あっ、んんっ……<emoji=heart04>」"
translation = "「자지로, 키리카의 보지, 가득 채워져서…… 핫, 앗, 응윽……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「奥に、当たってっ……ひぁっ、はんっ……<emoji=heart04>\u3000ご主人様のたくましい肉棒で、キリカの子宮、ズンズンされてますぅっ……<emoji=heart04>」"
translation = "「안쪽에, 닿아서…… 히앗, 하응……<emoji=heart04> 주인님의 늠름한 육봉으로, 키리카의 자궁, 즈음즈음 되고 있어요오……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "目隠しが取れて露わになったキリカの顔はすっかり快楽で蕩けていた。"
translation = "눈가리개가 벗겨져 드러난 키리카의 얼굴은 완전히 쾌락으로 녹아내려 있었다."

[[dialogue]]
speaker = "unk"
original = "口から涎を垂らし、だらしない表情で喘ぎ、あの冷徹なメイド長とはもはや別人のよう。"
translation = "입에서 침을 흘리며, 멍한 표정으로 신음하는 모습은 그 냉철한 메이드장과는 이미 딴판이다."

[[dialogue]]
speaker = "unk"
original = "勢いよくペニスを突き出すとメイド服からこぼれた乳房が揺さぶられ、奥にぶつかる度にキリカの体が跳ねる。"
translation = "기세 좋게 자지를 내지르자 메이드복에서 쏟아진 유방이 흔들리고, 안쪽에 부딪힐 때마다 키리카의 몸이 튀어 오른다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ふはぁっ、はっ、あっ、あんっ<emoji=heart04>\u3000おち○ちん、ビクビクしてっ……あっ、はぁっ……んぁっ、はっ、はぁっ……<emoji=heart04>」"
translation = "「후하앗, 핫, 앗, 아앙<emoji=heart04> 자지, 파르르 떨려서…… 앗, 하앗…… 응앗, 핫, 하앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "蕩けそうなほど蜜で潤った粘膜が隙間なく絡みつく。"
translation = "녹아내릴 정도로 애액으로 젖은 점막이 빈틈없이 얽혀든다."

[[dialogue]]
speaker = "unk"
original = "ペニスがドクドクと鼓動し、欲望で爆発しそうに張り詰める。"
translation = "자지가 두근두근 맥동하며, 욕망으로 폭발할 듯이 팽팽해진다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「はぁは、んっ……んん～っ……イくっ、イキますっ……<emoji=heart04>\u3000ご主人様のおち○ちんで、キリカのおま○こ、イキますっ……」"
translation = "「하아 하, 응…… 응응～윽…… 가요, 갑니다……<emoji=heart04> 주인님의 자지로, 키리카의 보지, 가버려요……」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「だ、ダメッ……<emoji=heart04>\u3000これ以上、突かれたら、イッてしまい、ますっ……ふぁっ、あっ、あぁっ……あ──」"
translation = "「아, 안 돼……<emoji=heart04> 이 이상, 찔리면, 가버려, 요…… 하앗, 앗, 아앗…… 아──」"

[[dialogue]]
speaker = "unk"
original = "半狂乱のように喘ぐキリカを意に介さず、そのまま奥めがけて突く。"
translation = "반광란 상태로 신음하는 키리카를 아랑곳하지 않고, 그대로 안쪽을 향해 찌른다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ふああぁあ～～～～～っ！？」"
translation = "「후아아아～～～～～윽!?」"

[[dialogue]]
speaker = "unk"
original = "亀頭が子宮に届いた瞬間、キリカの全身が震え、張り裂けそうな嬌声が響いた。"
translation = "귀두가 자궁에 닿은 순간, 키리카의 전신이 떨리며, 터질 듯한 교성이 울려 퍼졌다."

[[dialogue]]
speaker = "unk"
original = "だが勢いを緩めることなく、またペニスを打ち込む。"
translation = "하지만 기세를 늦추지 않고, 다시 자지를 박아넣는다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「んんんーーーっ！？」"
translation = "「응응응ーー윽!?」"

[[dialogue]]
speaker = "unk"
original = "絶頂の最中に奥を叩かれてキリカが快楽に悶える。"
translation = "절정의 한복판에서 안쪽을 강타당하자 키리카가 쾌락에 몸부림친다."

[[dialogue]]
speaker = "unk"
original = "追い打ちをかけるように、さらに亀頭を子宮口へとぶつけた。"
translation = "확인사살을 하듯, 더욱 귀두를 자궁구에 부딪혔다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ひぁああんっ<emoji=heart04>\u3000あっ、はっ……ダメダメ、ダメですっ……<emoji=heart04>\u3000頭、おかしくなるっ……ふぁっ、あっ……んぁ、はぁっ……<emoji=heart04>」"
translation = "「히아아앙<emoji=heart04> 앗, 핫…… 안 돼 안 돼, 안 돼요……<emoji=heart04> 머리, 이상해져…… 하앗, 앗…… 응아, 하앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "キリカの制止を聞かず、しゃにむに腰を動かし続ける。"
translation = "키리카의 제지를 듣지 않고, 막무가내로 허리를 계속 움직인다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ふぁあっ、あっ、ああっ……<emoji=heart04>\u3000ダメッ、おかしく、なりますぅっ……ふあっ、ああぁっ……<emoji=heart04>\u3000あっ、あっ、あっ、あっ……ダメ、ダメッ……<emoji=heart04>」"
translation = "「후아앗, 앗, 아앗……<emoji=heart04> 안 돼, 이상해, 져요오…… 하앗, 아아앗……<emoji=heart04> 앗, 앗, 앗, 앗…… 안 돼, 안 돼……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ひぁっ、あっ、ああぁんっ<emoji=heart04>\u3000ダメぇっ……おま○こ溶けるっ……はあぁっ、あっ、あっ……ぁん、あぁ──」"
translation = "「히앗, 앗, 아아앙<emoji=heart04> 안 돼…… 보지 녹아버려…… 하아아앗, 앗, 앗…… 아앙, 아아──」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ひぁあああーーーーっ<emoji=heart04><emoji=heart04>」"
translation = "「히아아아아ーーーー윽<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "あっけなくまた絶頂に達した。"
translation = "허무하게 다시 절정에 달했다."

[[dialogue]]
speaker = "unk"
original = "膣壁がぎゅっとしがみつくようにペニスを締め付け、その圧迫感が心地良い。"
translation = "질벽이 꽉 매달리듯 자지를 조여오고, 그 압박감이 기분 좋다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「はあぁ、ひぃっ、ひっ……んんーーっ<emoji=heart04>\u3000はぁはっ、はっ……あっ、あっ、あ、あぁんっ<emoji=heart04>」"
translation = "「하아아, 히잇, 히잇…… 응응ーー윽<emoji=heart04> 하아 하앗, 핫…… 앗, 앗, 아, 아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「壊れ……壊れるっ……はっ、はっ、んんっ……ひぁああっ<emoji=heart04>\u3000ふっ、ああぁっ……イキすぎて、壊れてしまいますぅっ……<emoji=heart04>」"
translation = "「망가져…… 망가져요…… 핫, 핫, 응윽…… 히아아앗<emoji=heart04> 훗, 아아앗…… 너무 가서, 망가져 버려요오……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "知ったことか。お仕置きなのだから、それぐらいでなければ意味がない。"
translation = "알 바 아니다. 벌을 주는 것이니, 그 정도가 아니면 의미가 없다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ダメ、ダメダメダメぇっ……<emoji=heart04>\u3000ご主人様の、おち○ちんが……子宮にぃっ――んんっ<emoji=heart04>\u3000あっ、あっ、あっ……あぁんっ<emoji=heart04>」"
translation = "「안 돼, 안 돼 안 돼 안 돼애……<emoji=heart04> 주인님의, 자지가…… 자궁에에──응윽<emoji=heart04> 앗, 앗, 앗…… 아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ご主人様、お許しを……んはっ、ああっ……<emoji=heart04>\u3000キリカは……キリカは壊れてしまいますぅっ……<emoji=heart04>」"
translation = "「주인님, 용서를…… 응핫, 아앗……<emoji=heart04> 키리카는…… 키리카는 망가져 버려요오……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「あっ、はっ、はっ……はっ、あぁんっ……<emoji=heart04>\u3000助、けて……はぁあっ、あっ、あっ……はっ、んん～～っ<emoji=heart04>」"
translation = "「앗, 핫, 핫…… 핫, 아앙……<emoji=heart04> 살려, 줘요…… 하아앗, 앗, 앗…… 핫, 응응～～윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "絶え間なく襲い来る快楽こそがキリカへの罰。"
translation = "끊임없이 몰려오는 쾌락이야말로 키리카에게 내리는 벌."

[[dialogue]]
speaker = "unk"
original = "イッたお仕置きにまたイかせてやる。"
translation = "가버린 벌로 다시 가게 해준다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ふああぁっ<emoji=heart04>\u3000あぁっ、あんっ<emoji=heart04>\u3000はあぁっ、はっ、はっ……あ――んん～～～っ<emoji=heart04>」"
translation = "「후아아앗<emoji=heart04> 아앗, 아앙<emoji=heart04> 하아아앗, 핫, 핫…… 아──응응～～～윽<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「壊れ、るっ……はぁっ、はぁっ、は、あぁんっ<emoji=heart04>\u3000ふはっ、はっ、あっ……ひああっ<emoji=heart04>\u3000イキすぎて、ダメぇっ……<emoji=heart04>」"
translation = "「망가, 져…… 하앗, 하앗, 하, 아앙<emoji=heart04> 후핫, 핫, 앗…… 히아앗<emoji=heart04> 너무 가서, 안 돼……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「はぁはっ、あっ、あんっ……<emoji=heart04>\u3000ひぃんっ……ふぁっ、はぁっ、はあぁっ……<emoji=heart04>\u3000子宮ズンズンされてっ……ダメ、またイッ──」"
translation = "「하아 하앗, 앗, 아앙……<emoji=heart04> 히잉…… 하앗, 하앗, 하아아앗……<emoji=heart04> 자궁 즈음즈음 돼서…… 안 돼, 또 가──」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「んんん～～～～～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「응응응～～～～～～～윽<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "連続して３度目の絶頂。ペニスを咥え込んだ膣が押し潰さんばかりに収縮する。"
translation = "연속해서 세 번째 절정. 자지를 물고 늘어진 질이 으깨버릴 듯이 수축한다."

[[dialogue]]
speaker = "unk"
original = "そして亀頭を子宮に密着させて──"
translation = "그리고 귀두를 자궁에 밀착시켜서──"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ふぁあああああ～～～～～～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아아～～～～～～～～～～～～～～윽<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「んぁああっ、あっ、あんっ……<emoji=heart04>\u3000おち○ちん、ドクドクして……熱いぃっ……んはっ、あぁ～っ<emoji=heart04>」"
translation = "「응아아앗, 앗, 아앙……<emoji=heart04> 자지, 움찔움찔해서…… 뜨거워어…… 응핫, 아아～앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ご主人様の精液、ビューッて……ん……んんっ……<emoji=heart04>\u3000奥に、たくさん……ふぁっ、はぁっ……あぁんっ……<emoji=heart04>」"
translation = "「주인님의 정액, 뷰우우 하고…… 응…… 응윽……<emoji=heart04> 안쪽에, 가득…… 하앗, 하앗…… 아앙……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "腹の一番奥で精液を受け止め、意識が焼き切れるような快楽に悶えながら懸命に四つん這いの姿勢を支えるキリカ。"
translation = "배 가장 안쪽에서 정액을 받아내며, 의식이 타버릴 듯한 쾌락에 몸부림치면서도 필사적으로 엎드린 자세를 유지하는 키리카."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「んんっ……ん～～～っ<emoji=heart04><emoji=heart04>\u3000キリカの子宮に、ご主人様の精子が入ってきて……ご主人様、ご主人様ぁっ……<emoji=heart04>」"
translation = "「응윽…… 응～～～윽<emoji=heart04><emoji=heart04> 키리카의 자궁에, 주인님의 정자가 들어와서…… 주인님, 주인님……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ご主人様に種付けされて……ふぁああっ……<emoji=heart04>\u3000種付けで、またイッてますぅっ……ふっ、ああぁっ……<emoji=heart04>」"
translation = "「주인님께 씨내림 당해서…… 후아아앗……<emoji=heart04> 씨내림으로, 또 가버려요오…… 훗, 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "この射精でお仕置きも終わり。キリカの子宮にたらふく俺の精液を注ぎ込む。"
translation = "이 사정으로 벌도 끝. 키리카의 자궁에 내 정액을 잔뜩 쏟아붓는다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「あ……あ……あ……熱いので、お腹、いっぱいに……ん……ぁ、はあぁ……<emoji=heart04>」"
translation = "「아…… 아…… 아…… 뜨거워서, 배, 가득…… 응…… 아, 하아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「はぁ、はぁ、はぁ…………あ、はあぁ……はぁ……<emoji=heart04>」"
translation = "「하아, 하아, 하아………… 아, 하아아…… 하아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "最後までキリカの中に出し切り、膣口からは受け止めきれなかった精液が溢れていた。"
translation = "마지막까지 키리카의 안으로 다 쏟아내자, 질 입구에서는 다 받아내지 못한 정액이 넘쳐흐르고 있었다."

[[dialogue]]
speaker = "unk"
original = "整えられていた髪は乱れ、メイド長としての気品と貫禄はなく、そこにあるのはただ快楽に溺れた女の姿だった。"
translation = "정돈되어 있던 머리카락은 헝클어지고, 메이드장으로서의 기품과 관록은 사라진 채, 그곳에는 그저 쾌락에 빠진 여자의 모습만이 있었다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ご主人、さま……」"
translation = "「주인, 님……」"

[[dialogue]]
speaker = "unk"
original = "それでも今にくずおれそうな体を必死に支え、いじらしく命令を守ろうとしている。"
translation = "그런데도 금방이라도 쓰러질 듯한 몸을 필사적으로 지탱하며, 애처롭게 명령을 지키려 하고 있다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「よく頑張ったな」"
translation = "「잘 버텼다」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「はぁ……はぁ……お仕置きいただいて、ありがとうございました……」"
translation = "「하아…… 하아…… 벌을 주셔서, 감사합니다……」"

[[dialogue]]
speaker = "unk"
original = "最後までお仕置きを受けきったキリカに、口付けのご褒美を与える。"
translation = "끝까지 벌을 다 받은 키리카에게, 입맞춤이라는 보상을 내린다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「んちゅっ……ちゅっ……ちゅぱっ、ちゅるっ<emoji=heart04>\u3000ちゅれろっ、れろ……んっ……ちゅるっ……じゅるるっ<emoji=heart04>」"
translation = "「응츄…… 츄…… 츄파, 츄르릅<emoji=heart04> 츄레로, 레로…… 응…… 츄르릅…… 쥬르르<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ちゅっく、ちゅっ、ちゅぅっ……ちゅるるんっ<emoji=heart04>\u3000れろ、れろ……ん、ふ……じゅるじゅる……じゅりゅ、じゅるるるっ<emoji=heart04>\u3000ぷぁっ──」"
translation = "「츄윽, 츄, 츄우…… 츄르르응<emoji=heart04> 레로, 레로…… 응, 후…… 쥬르쥬르…… 쥬류, 쥬르르르<emoji=heart04> 푸핫──」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「いやらしいメイドのキリカをまた躾けてください……ご主人様……<emoji=heart04>」"
translation = "「음란한 메이드인 키리카를 다시 길들여 주세요…… 주인님……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ふぅ……お尻まで叩くなんて、ずいぶん熱が入られていましたね」"
translation = "「후우…… 엉덩이까지 때리시다니, 제법 열이 오르셨나 보네요」"

[[dialogue]]
speaker = "unk"
original = "服装を整えると、すっかりいつものキリカに戻っていた。"
translation = "복장을 정돈하자, 완전히 평소의 키리카로 돌아와 있었다."

[[dialogue]]
speaker = "unk"
original = "キリカもかなり盛り上がってたように見えたが、言うと怖いので黙っておいた。"
translation = "키리카도 꽤 흥분했던 것처럼 보였지만, 말하면 무서우니까 입을 다물었다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「あくまで私の主人は星見家と教皇様、お嬢様です。私とあなたはプライベートな関係ですので、お間違えなきよう」"
translation = "「어디까지나 제 주인은 호시미 가문과 교황님, 아가씨입니다. 저와 당신은 사적인 관계이니, 착오 없으시길」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「今日あなたに責められた分は、いずれ戦闘訓練でお返しするとしましょう。覚悟しておいてください」"
translation = "「오늘 당신에게 당한 만큼은, 조만간 전투 훈련에서 되돌려드리도록 하죠. 각오해 두세요」"

[[dialogue]]
speaker = "unk"
original = "想像しただけで震える。調子に乗った代償は大きそうだ。"
translation = "상상만 해도 떨린다. 우쭐거린 대가는 꽤 클 것 같다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「そろそろお帰りの時刻ですが、こんな時間に客人をお一人で帰すわけにはいきません」"
translation = "「슬슬 돌아가실 시간입니다만, 이런 시간에 손님을 혼자 보낼 수는 없지요」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ご自宅までお送りします。……参りましょう」"
translation = "「댁까지 바래다드리겠습니다. ……가시죠」"

[[dialogue]]
speaker = "unk"
original = "キリカがそっと手を差し出す。"
translation = "키리카가 살며시 손을 내민다."

[[dialogue]]
speaker = "unk"
original = "俺はその手を握り返し、惜しむようにゆっくりと歩き出した。"
translation = "나는 그 손을 맞잡고, 아쉬운 듯 천천히 걷기 시작했다."

