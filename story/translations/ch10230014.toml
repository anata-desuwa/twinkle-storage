[[dialogue]]
speaker = "unk"
original = "第４話,シスターの看病,P"
translation = "제4화, 시스터의 간호, P"

[[dialogue]]
speaker = "unk"
original = "あれは子ども会の手伝いの後──"
translation = "그건 어린이회 일을 도운 뒤──"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「椅子も綺麗に拭いて……と。ふぅ、これでお掃除も終わりですね。お借りするときは、使う前よりも美しく。お疲れ様でした！」"
translation = "「의자도 깨끗이 닦고…… 자. 후우, 이걸로 청소도 끝이네요. 빌릴 때는 사용하기 전보다 아름답게. 수고하셨습니다!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「会長さま。今日はお手伝いいただきありがとうございました。おかげさまで子どもたちにも満足していただけたと思います」"
translation = "「회장님. 오늘 도와주셔서 감사합니다. 덕분에 아이들도 만족했을 거라 생각해요」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「あ、会長さまがこけて──」"
translation = "「아, 회장님이 넘어지──」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「会長さまがバケツの水を被って……！？\u3000大丈夫ですかっ！？」"
translation = "「회장님이 양동이 물을 뒤집어쓰고……!? 괜찮으신가요앗!?」"

[[dialogue]]
speaker = "unk"
original = "へくしょんっ！"
translation = "에취!"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「なるほど、それで風邪を引いたと。気が抜けてたわね」"
translation = "「과연, 그래서 감기에 걸린 거구나. 긴장이 풀렸었네」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「おお、会長よ、熱を出してしまうとは情けない」"
translation = "「오오, 회장이여, 열을 내다니 한심하구나」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「いや情けなくはないけど……大丈夫？\u3000ほんとに顔赤いね……」"
translation = "「아니 한심한 건 아니지만…… 괜찮아? 정말 얼굴이 빨갛네……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「最近忙しかったものね。たまにはゆっくりお休みしてね～」"
translation = "「요즘 바빴으니까 말이야. 가끔은 푹 쉬렴~」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そうよ。お休みしてる間くらい、星徒会は私たちで何とかするわ。主にアナが！」"
translation = "「그래. 쉬는 동안만큼은 성도회는 우리가 어떻게든 할게. 주로 아나가!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「任されました。会長の判子が必要な書類だけ残しておきます」"
translation = "「맡겨주십시오. 회장의 직인이 필요한 서류만 남겨두겠습니다」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「それ、学園に行きたくなくなりそう……」"
translation = "「그거, 학원에 가기 싫어질 것 같아……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「じゃ、うるさくしても悪いし、私たちそろそろ帰るから。もし何かあったら連絡してね」"
translation = "「그럼, 시끄럽게 하면 안 좋으니까 우리 슬슬 갈게. 혹시 무슨 일 있으면 연락해」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「お目覚めになりましたか？」"
translation = "「깨어나셨나요?」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「……はい、お薬を飲んだ後眠られていたようです。おかげで熱もすっかり下がったみたいですね」"
translation = "「……네, 약을 드신 뒤에 잠드셨던 모양이에요. 덕분에 열도 푹 내려간 것 같네요」"

[[dialogue]]
speaker = "unk"
original = "頭に柔らかいものが当たってるような"
translation = "머리에 부드러운 게 닿아있는 것 같은데"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「お邪魔でしたか？\u3000頭のところがお硬いと心苦しいかと思って、膝枕をさせていただいているのですが」"
translation = "「방해되었나요? 머리 두는 곳이 딱딱하면 마음이 아플 것 같아서 무릎베개를 해드리고 있었습니다만」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「あ、急に動かないでください。クラッとしてしまいますよ」"
translation = "「아, 갑자기 움직이지 마세요. 어질어질하실 거예요」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ほら、今はじっとしていてください」"
translation = "「자, 지금은 가만히 계세요」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ふふっ、この前とは介抱するのが逆になってしまいましたね。どうです、私の太ももは。なかなか肉付きはいいので硬くはないと思うのですが」"
translation = "「후훗, 요전번과는 간호하는 게 반대가 되어버렸네요. 어떠신가요, 제 허벅지는. 제법 살집이 있어서 딱딱하진 않을 거라 생각합니다만」"

[[dialogue]]
speaker = "unk"
original = "気持ちいいよ"
translation = "기분 좋아"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「なら良かったです。石の方がマシだと言われてしまっては立つ瀬がありませんから」"
translation = "「그럼 다행이네요. 돌덩이가 낫다는 말을 들으면 면목이 없으니까요」"

[[dialogue]]
speaker = "unk"
original = "ありがとう"
translation = "고마워"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「いえいえ、お礼などいりませんよ。私は女神様の代わりに手を差し伸べているに過ぎませんから」"
translation = "「아니요 아니요, 감사 인사는 필요 없어요. 저는 여신님을 대신해 손을 내밀고 있을 뿐이니까요」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「……こうして見つめ合うと、恥ずかしくなってしまいますね。あっ、大丈夫ですっ。目を逸らさなくて大丈夫ですよっ」"
translation = "「……이렇게 서로 마주 보니 부끄러워지네요. 앗, 괜찮습니다앗. 눈을 돌리지 않아도 괜찮아요앗」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「会長さまの看病をしているだけですから、シスターとして何もやましいことはありません。……ありません！」"
translation = "「회장님을 간호하고 있을 뿐이니까, 시스터로서 아무런 부끄러운 점은 없습니다. ……없습니다!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「そうですね……何かお話を――」"
translation = "「그렇네요…… 무슨 이야기라도──」"

[[dialogue]]
speaker = "unk"
original = "シャロンはどうして人の世話を焼くんだ？"
translation = "샤론은 어째서 남을 챙겨주는 거야?"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「それは……女神様の愛を世にあまねく届かせるためです」"
translation = "「그건…… 여신님의 사랑을 세상에 널리 전하기 위해서입니다」"

[[dialogue]]
speaker = "unk"
original = "愛？"
translation = "사랑?"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「はい、愛です。女神様はこの世界を、この世に生きる命を愛しておられます。だってこんな私をお救いになられたのですから」"
translation = "「네, 사랑이에요. 여신님은 이 세계를, 이 세상에 살아가는 생명을 사랑하고 계세요. 왜냐하면 이런 저를 구해주셨으니까요」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「しかし皆が救われるわけではありません。望まぬ形で命を落とす人々は大勢います」"
translation = "「하지만 모두가 구원받는 것은 아닙니다. 원치 않는 형태로 목숨을 잃는 사람들은 아주 많아요」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「誰に言われずとも知っています。この世界は厳しい。理不尽なことはたくさんあります」"
translation = "「누가 말해주지 않아도 알고 있습니다. 이 세계는 가혹해요. 불합리한 일은 잔뜩 있습니다」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「不敬虔と言われるかもしれませんが……女神様の愛が届かないこともあるでしょう」"
translation = "「불경하다고 하실지도 모르겠지만…… 여신님의 사랑이 닿지 않는 일도 있겠죠」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「女神様にもきっと何らかのご事情があるのでしょう。今迫っているリクリエもきっとそうです」"
translation = "「여신님께도 분명 나름의 사정이 있으실 거예요. 지금 다가오는 리크리에 성도 분명 그럴 거고요」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「女神様だけではどうしようもない、何らかの力がリクリエには働いている。でなければ世界が滅ぶなどありえません」"
translation = "「여신님만으로는 어찌할 수 없는 어떤 힘이 리크리에에는 작용하고 있다. 그렇지 않으면 세계가 멸망할 리가 없으니까요」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「だからこそ私が世界の果てまで届かせるのです。私をお救いになった女神様の愛を」"
translation = "「그렇기에 제가 세계의 끝까지 전하는 것입니다. 저를 구해주신 여신님의 사랑을」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「私が女神様に救われたように、私がこの世界に生きる誰かを救います。私はそのためにシスターとなりました」"
translation = "「제가 여신님께 구원받았듯이, 제가 이 세계에 살아가는 누군가를 구하겠습니다. 저는 그러기 위해 시스터가 되었습니다」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「だから私のする善き行いは全て、女神様の愛なのです」"
translation = "「그러니 제가 하는 모든 선한 행위는 여신님의 사랑인 거예요」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「女神様の愛、感じておられますか？」"
translation = "「여신님의 사랑, 느끼고 계신가요?」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「……感じておられるようですね。とても安らかな顔をされています」"
translation = "「……느끼고 계신 모양이네요. 아주 평온한 얼굴을 하고 계세요」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「眠くなったらそのままお眠りください。私がついておりますので」"
translation = "「졸리시면 그대로 주무세요. 제가 곁에 있을 테니까요」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「……おやすみなさい、会長さま」"
translation = "「……안녕히 주무세요, 회장님」"

