[[dialogue]]
speaker = "unk"
original = "第２話,アナと惚れ薬,P"
translation = "제2화, 아나와 사랑의 묘약, P"

[[dialogue]]
speaker = "unk"
original = "購買部まで買い物に出かけた俺は、アナとアニマ先輩が一緒にいるところを見つけた。"
translation = "구매부까지 쇼핑하러 나간 나는 아나와 아니마 선배가 함께 있는 것을 발견했다."

[[dialogue]]
speaker = "アニマ"
original = "「頼むヨ～、アナ。この小瓶の薬を、会長にこっそり飲ませてくれるだけでいいんダ！」"
translation = "「부탁한다구~ 아나. 이 작은 병의 약을 회장에게 몰래 먹여주기만 하면 돼!」"

[[dialogue]]
speaker = "アナ"
original = "「却下です。副作用の詳細がわからないものを、会長で試すのは感心しません。私の恋人なんですよ」"
translation = "「거절입니다. 부작용의 상세를 모르는 것을 회장님께 시험하는 건 좋지 않습니다. 제 연인이라고요」"

[[dialogue]]
speaker = "unk"
original = "（アナ、俺のことを心配して……！）"
translation = "(아나, 나를 걱정해서……!)"

[[dialogue]]
speaker = "アニマ"
original = "「このとーりダ。ほら、アナの大好きな抹茶クレープ専門店のプラチナ割引チケットもつけちゃうヨ？」"
translation = "「이것 좀 보라구. 자, 아나가 아주 좋아하는 말차 크레페 전문점 플래티넘 할인 티켓도 얹어줄게?」"

[[dialogue]]
speaker = "アナ"
original = "「……話を聞きましょう」"
translation = "「……이야기를 들어보죠」"

[[dialogue]]
speaker = "unk"
original = "――ちょっと待って！！"
translation = "――잠깐 기다려!!"

[[dialogue]]
speaker = "アニマ"
original = "「おや、会長。いつの間にそこにいたんダ？\u3000急に声を出したら驚くじゃないカ」"
translation = "「오야, 회장. 어느 사이에 거기 있었나? 갑자기 소리를 내면 놀라잖아」"

[[dialogue]]
speaker = "アニマ"
original = "「しかし、聞いていたのなら話は早イ！\u3000アナはもうアニマの手中ダ。キミにはこの薬を飲んでもらうゾ！」"
translation = "「하지만 듣고 있었다면 이야기가 빠르지! 아나는 이미 아니마의 수중이다. 너는 이 약을 마셔줘야겠어!」"

[[dialogue]]
speaker = "アナ"
original = "「話を聞くと言ったまでです。この前みたいに会長に翼が生え、山奥に消えてしまうようなことは避けたいです。薬の内容を教えてください」"
translation = "「이야기를 듣겠다고 했을 뿐입니다. 저번처럼 회장님께 날개가 돋아 산속으로 사라져버리는 일은 피하고 싶습니다. 약의 내용을 알려주세요」"

[[dialogue]]
speaker = "アニマ"
original = "「フヒヒ、ではご紹介しよウ！\u3000この薬は……じゃじゃん！\u3000アニマ特製のラブラブポーションボム！」"
translation = "「후히히, 그럼 소개해 주지! 이 약은…… 짜잔! 아니마 특제 러브러브 포션 밤!」"

[[dialogue]]
speaker = "アニマ"
original = "「ボムと名は付いているが、小瓶に入ってる通り飲み薬。簡単に言えば惚れ薬だナ」"
translation = "「밤이라고 이름 붙었지만 작은 병에 든 대로 마시는 약. 간단히 말하면 사랑의 묘약이다」"

[[dialogue]]
speaker = "アニマ"
original = "「こいつを飲めばたちまち、相手のことを好きで好きでたまらなくなり、スキンシップをしたくなるという一品サ！」"
translation = "「이걸 마시면 금세 상대방을 너무 좋아서 못 견디게 되고 스킨십을 하고 싶어지는 일품이지!」"

[[dialogue]]
speaker = "アナ"
original = "「スキンシップなんて会長といつもしています。つまり、リスクゼロで抹茶クレープチケットをゲット。今日は良い日ですね」"
translation = "「스킨십 같은 건 회장님과 항상 하고 있습니다. 즉 리스크 제로로 말차 크레페 티켓을 겟. 오늘은 좋은 날이네요」"

[[dialogue]]
speaker = "unk"
original = "で、副作用は……？"
translation = "그래서 부작용은……?"

[[dialogue]]
speaker = "アニマ"
original = "「フヒヒ♪\u3000それはわからなイ！\u3000わからないから試すんダロウ？\u3000ほれアナ、チケットは渡しておこう」"
translation = "「후히히♪ 그건 모른다! 모르니까 시험해 보는 거 아니겠어? 자 아나, 티켓은 미리 주지」"

[[dialogue]]
speaker = "アナ"
original = "「儲けました。で、この薬……私が飲ませるんですよね？」"
translation = "「이득 봤네요. 그래서 이 약…… 제가 먹이는 거죠?」"

[[dialogue]]
speaker = "アニマ"
original = "「当たり前ダ。アニマが飲ませたら、会長がアニマに惚れちゃうかもしれないゾ？」"
translation = "「당연하지. 아니마가 먹였다가 회장이 아니마에게 반해버릴지도 모른다구?」"

[[dialogue]]
speaker = "アナ"
original = "「それは絶対にダメです！\u3000……えっと、飲ませる前に私の星力を込めるんですね」"
translation = "「그건 절대 안 됩니다! ……엣또, 먹이기 전에 제 성력을 담는 거군요」"

[[dialogue]]
speaker = "アニマ"
original = "「そうダ♪\u3000込められた星力の使い手に惚れるよう、配合してあるからナ」"
translation = "「그렇다♪ 담긴 성력의 사용자에게 반하도록 배합해 뒀으니까 말야」"

[[dialogue]]
speaker = "アナ"
original = "「では……」"
translation = "「그럼……」"

[[dialogue]]
speaker = "アナ"
original = "「薬に星力、チャージ完了です。会長、どうぞ」"
translation = "「약에 성력 차지 완료입니다. 회장님, 드세요」"

[[dialogue]]
speaker = "unk"
original = "ええい──ままよ！"
translation = "에잇── 될 대로 돼라!"

[[dialogue]]
speaker = "アニマ"
original = "「フヒヒッ！\u3000いい飲みっぷりダ♪\u3000どうだ会長、何か変化はあるかナ？」"
translation = "「후히히! 시원하게 마시는군♪ 어떠냐 회장, 뭔가 변화가 있나?」"

[[dialogue]]
speaker = "unk"
original = "…………特に何もない？"
translation = "…………딱히 아무 일도 없는데?"

[[dialogue]]
speaker = "アニマ"
original = "「むぅ、やはりカ。実はさっき、アニマの星力を込めた薬を、シュティレにも飲ませたんだが、効果がなかったんダ。今回の薬は失敗カ……」"
translation = "「무으, 역시나인가. 사실 아까 아니마의 성력을 담은 약을 슈틸레에게도 먹였는데 효과가 없었거든. 이번 약은 실패인가……」"

[[dialogue]]
speaker = "アナ"
original = "「弟子を実験台にするのは感心しませんよ」"
translation = "「제자를 실험체로 삼는 건 좋지 않아요」"

[[dialogue]]
speaker = "アニマ"
original = "「錬金術の発展のためならと、喜んで協力してくれたんダ。無理強いはしていないヨ」"
translation = "「연금술의 발전을 위해서라면이라며 기꺼이 협력해 줬다구. 억지로는 안 시켰어」"

[[dialogue]]
speaker = "アナ"
original = "「……そういうことなら。では約束通り、チケットはいただきます。会長、今日の放課後にさっそく行きましょう。クレープ食べ放題です」"
translation = "「……그렇다면야. 그럼 약속대로 티켓은 받겠습니다. 회장님, 오늘 방과 후에 당장 가죠. 크레페 무한 리필입니다」"

[[dialogue]]
speaker = "unk"
original = "惚れ薬は失敗作。何の作用もなかったことに、俺は安堵したのだった――"
translation = "사랑의 묘약은 실패작. 아무런 작용도 없었다는 것에 나는 안도했다──"

[[dialogue]]
speaker = "unk"
original = "――翌日。"
translation = "――다음 날."

[[dialogue]]
speaker = "アニマ"
original = "「やれやれ、なぜうまくいかなかったかナ？\u3000配合は完ぺきだったはずなんだガ……」"
translation = "「이런 이런, 왜 잘 안 됐을까? 배합은 완벽했을 텐데……」"

[[dialogue]]
speaker = "シュティレ"
original = "「マスター……！」"
translation = "「마스터……!」"

[[dialogue]]
speaker = "アニマ"
original = "「おぉシュティレ。どうかしたのカ？\u3000キミが廊下を走るだなんて珍しい──」"
translation = "「오오 슈틸레. 무슨 일이야? 네가 복도를 달리다니 드문 일이──」"

[[dialogue]]
speaker = "シュティレ"
original = "「──愛しています！\u3000結婚してください！！」"
translation = "「──사랑합니다! 결혼해 주세요!!」"

[[dialogue]]
speaker = "アニマ"
original = "「ハ！？\u3000なっ、何を急に……アニマたちは女同士だゾ。こ、こら、変なところを触るんじゃなイ！！」"
translation = "「하!? 뭐, 뭐야 갑자기…… 아니마들은 여자끼리라구. 이, 이봐, 이상한 곳을 만지지 마!!」"

[[dialogue]]
speaker = "シュティレ"
original = "「マスター、愛しています。熱いベーゼがしたいです。ぶいぶいぶいのぶいっ」"
translation = "「마스터, 사랑합니다. 뜨거운 베제를 하고 싶습니다. 브이브이브이의 브잇」"

[[dialogue]]
speaker = "アニマ"
original = "「おおぉ、周囲が見えないほどテンションのネジが取れてしまっているナ……もしかしなくても、昨日の惚れ薬は遅効性カ。丸１日経過した今になって効果が出ていル！」"
translation = "「오오오, 주변이 안 보일 정도로 텐션의 나사가 빠져버렸군…… 혹시가 아니라 어제의 사랑의 묘약은 지효성이었나. 꼬박 하루가 지난 지금에야 효과가 나오고 있어!」"

[[dialogue]]
speaker = "アニマ"
original = "「しかも、スキンシップというよリ──」"
translation = "「게다가 스킨십이라기보다──」"

[[dialogue]]
speaker = "シュティレ"
original = "「結婚しましょう。結婚です。ハネムーン。マスターと結婚したいです、ぶいぶいっ」"
translation = "「결혼해요. 결혼입니다. 허니문. 마스터와 결혼하고 싶습니다, 브이브이」"

[[dialogue]]
speaker = "アニマ"
original = "「惚れるという過程をすっ飛ばして、求婚し続けるモンスターと化しているゾ……！\u3000まずい、早く解毒薬を作らねバ！」"
translation = "「반한다는 과정을 건너뛰고 구혼을 계속하는 몬스터로 변해버렸어……! 큰일이다, 빨리 해독약을 만들어야 해!」"

[[dialogue]]
speaker = "シュティレ"
original = "「愛しています。さぁマスター、シュティレと一緒にゴールイン。結婚してロボットアニメのように合体しましょう。ぶいっ」"
translation = "「사랑합니다. 자 마스터, 슈틸레와 함께 골인. 결혼해서 로봇 애니메이션처럼 합체해요. 브잇」"

[[dialogue]]
speaker = "アニマ"
original = "「ＩＱの低下と異常な興奮作用が見られるナ！？\u3000これが副作用なのカ……？」"
translation = "「IQ 저하와 이상 흥분 작용이 보이는데!? 이것이 부작용인가……?」"

[[dialogue]]
speaker = "アニマ"
original = "「やばいゾ！\u3000会長の効果が出たら……アナの身ガ！！」"
translation = "「위험해! 회장에게 효과가 나타나면…… 아나의 신변이!!」"

[[dialogue]]
speaker = "アナ"
original = "「――流石はトワ先生です。星体力学、そのような応用があるのですね」"
translation = "「――과연 토와 선생님입니다. 성체역학, 그런 응용이 있군요」"

[[dialogue]]
speaker = "トワ先生"
original = "「アナちゃんは飲み込みが早いから教え甲斐があるな～♪\u3000これからもわからないことがあったら何でも聞いてね！」"
translation = "「아나짱은 습득이 빨라서 가르칠 맛이 난다니까~♪ 앞으로도 모르는 게 있으면 뭐든 물어봐!」"

[[dialogue]]
speaker = "unk"
original = "アナーーーーーー！！！"
translation = "아나아아아아아아아!!!"

[[dialogue]]
speaker = "アナ"
original = "「大きな声を出してどうしたのですか？\u3000星徒会長ともあろうお方が、廊下を走っては……」"
translation = "「큰 소리를 내고 무슨 일인가요? 성도회장이나 되시는 분이 복도를 달리면……」"

[[dialogue]]
speaker = "トワ先生"
original = "「そうだよ会長くん、キミはみんなのお手本にならないといけないのに──」"
translation = "「맞아 회장군, 너는 모두의 본보기가 되어야 하는데──」"

[[dialogue]]
speaker = "アナ"
original = "「え、ちょっと顔が近いで――んむぅうっ！？」"
translation = "「에, 조금 얼굴이 가깝── 음무우웃!?」"

[[dialogue]]
speaker = "トワ先生"
original = "「ぎゃーー！？\u3000待って待って、教師の前でそんな熱いキスを――って、本当に何で～～っ！？」"
translation = "「갸아아!? 잠깐 잠깐, 교사 앞에서 그런 뜨거운 키스를── 아니 정말 왜 이래~~!?」"

[[dialogue]]
speaker = "アナ"
original = "「ん、ちゅ……ちゅぱっ……！\u3000なな、何を急にっ！？」"
translation = "「음, 츄…… 츄릅……! 머머, 뭐야 갑자기!?」"

[[dialogue]]
speaker = "unk"
original = "アナ、結婚しよう！"
translation = "아나, 결혼하자!"

[[dialogue]]
speaker = "アナ"
original = "「ふぁぁああ――！？」"
translation = "「후아아아아──!?」"

[[dialogue]]
speaker = "トワ先生"
original = "「何これ何これ、何が起こってるの――！？」"
translation = "「뭐야 이거 뭐야 이거, 무슨 일이 일어나는 거야──!?」"

[[dialogue]]
speaker = "unk"
original = "愛してるんだ！\u3000結婚しよう！"
translation = "사랑해! 결혼하자!"

[[dialogue]]
speaker = "アナ"
original = "「あ、えっと……は…………はい<emoji=heart04>」"
translation = "「아, 엣또…… 하………… 네<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
original = "「わあぁぁ！\u3000おめでとおおお？？\u3000って、婚期が遅れるだけでも辛いのに！\u3000目の前で生徒に先越されちゃったーーー！！？？」"
translation = "「와아아! 축하해애애?? 가 아니라, 혼기가 늦어지는 것만으로도 괴로운데! 눈앞에서 제자한테 추월당했어어어──!!??」"

[[dialogue]]
speaker = "アニマ"
original = "「会長、目を覚ますんダ──解毒薬、シュート！！」"
translation = "「회장, 정신 차려── 해독약, 슛!!」"

[[dialogue]]
speaker = "アナ"
original = "「お、おはようございます……会長、記憶はいかがですか？」"
translation = "「좋, 좋은 아침입니다…… 회장님, 기억은 어떠신가요?」"

[[dialogue]]
speaker = "unk"
original = "うぅ……何も思い出せない……"
translation = "으으…… 아무것도 기억 안 나……"

[[dialogue]]
speaker = "アニマ"
original = "「ほっ……シュティレと同じだナ。薬の効果で暴走している間の記憶は消えるらしイ！\u3000これでめでたシ、めでたシ――」"
translation = "「휴우…… 슈틸레와 똑같구만. 약의 효과로 폭주하는 동안의 기억은 사라지는 모양이네! 이걸로 경사로세, 경사로세──」"

[[dialogue]]
speaker = "アナ"
original = "「なるわけないでしょう！\u3000私、私っ……人前であんな恥ずかしいことを……！！」"
translation = "「그렇게 될 리가 없잖아요! 저, 저어…… 사람들 앞에서 그런 부끄러운 짓을……!!」"

[[dialogue]]
speaker = "アニマ"
original = "「ま、まぁいいじゃないカ。相思相愛のキミたちのことダ、きっとプロポーズまがいなイチャイチャもすでに色々しているんダロウ？」"
translation = "「뭐, 뭐어 어떠냐. 서로 사랑하는 너희들이니, 분명 프로포즈 같은 꽁냥거림도 이미 여러 가지로 하고 있겠지?」"

[[dialogue]]
speaker = "アニマ"
original = "「錬金術に失敗は付きものダ！\u3000ここは海のように広い心で、細かいことは水にながしてだナ……？」"
translation = "「연금술에 실패는 따라다니는 법이다! 여기서는 바다처럼 넓은 마음으로, 세세한 건 물에 흘려보내는 게 어떠냐……?」"

[[dialogue]]
speaker = "アナ"
original = "「とはいえ、会長を実験台に差し出した私にも責任はあります……」"
translation = "「그렇다고는 해도, 회장님을 실험대로 내놓은 저에게도 책임은 있습니다……」"

[[dialogue]]
speaker = "アナ"
original = "「２人きりの時であれば、ああいったトラブルが起きるのもやぶさかではなかったのですが……丸１日の遅効性は想定外でした」"
translation = "「둘만 있을 때라면, 그런 트러블이 일어나는 것도 마다하지 않았을 텐데…… 꼬박 하루가 걸리는 지효성은 예상 밖이었습니다」"

[[dialogue]]
speaker = "アニマ"
original = "「お、おォう。これが『ごちそうさま』というやつなのカ……？」"
translation = "「오, 오오. 이것이 『잘 먹었습니다』라고 하는 그것인가……?」"

[[dialogue]]
speaker = "トワ先生"
original = "「ううぅっ、流れ弾で私だけひどいダメージ……も、もういっそのこと、私も錬金術の力を借りるしか……」"
translation = "「으으윽, 눈먼 화살에 나만 심한 데미지…… 이, 이제 차라리 나도 연금술의 힘을 빌릴 수밖에……」"

[[dialogue]]
speaker = "unk"
original = "なぜか頬を赤らめてモジモジしているアナと、珍しくドン引きの顔をしているアニマ先輩、そしてなぜかさめざめと涙を流すトワ先生……"
translation = "왠지 볼을 붉히며 머뭇거리고 있는 아나와, 드물게 질린 표정을 짓고 있는 아니마 선배, 그리고 왠지 하염없이 눈물을 흘리는 토와 선생님……"

[[dialogue]]
speaker = "unk"
original = "一体全体、何があったのか。いくら考えても、ずきずきと痛む頭では思い出せないのだった──"
translation = "도대체 무슨 일이 있었던 걸까. 아무리 생각해도, 지끈지끈 아픈 머리로는 기억해낼 수 없었다──"

