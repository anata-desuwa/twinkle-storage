[[dialogue]]
speaker = "unk"
original = "第５話,最悪のマレフィック,B"
translation = "제5화, 최악의 마레픽, B"

[[dialogue]]
speaker = "unk"
original = "そうして、一夜が明け──"
translation = "그렇게, 하룻밤이 지나──"

[[dialogue]]
speaker = "unk"
original = "翌朝になって俺たちの元へ飛び込んできたのは、血相を変えたトリシャさんだった。"
translation = "다음 날 아침 우리에게 달려온 것은, 핏발 선 얼굴의 트리샤 씨였다."

[[dialogue]]
speaker = "トリシャ"
original = "「こ──仔羊える迷い子たちよ！\u3000いいから聞いて落ち着くのです！」"
translation = "「크── 어린양인 길 잃은 아이들이여! 그러니 진정하고 들으세요!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ま、まずはトリシャが落ち着いて？」"
translation = "「자, 일단 트리샤가 진정해 봐」"

[[dialogue]]
speaker = "unk"
original = "昨晩、共に夕食のテーブルを囲んだトリシャさんは、一旦自分のねぐらへ帰ったはずだった。"
translation = "어젯밤, 함께 저녁 식사 테이블을 둘러쌌던 트리샤 씨는, 일단 자신의 거처로 돌아갔을 터였다."

[[dialogue]]
speaker = "unk"
original = "しかし、明くる日になって再びここへ戻ってきた。"
translation = "하지만, 다음 날이 되어 다시 이곳으로 돌아왔다."

[[dialogue]]
speaker = "トリシャ"
original = "「こほん。失礼。私としたことが取り乱しました。しかし、これほどの凶星を目にして驚くなというほうが無理というもの」"
translation = "「커흠. 실례. 저답지 않게 당황했습니다. 하지만, 이 정도의 흉성을 보고 놀라지 말라는 것이 무리라는 것」"

[[dialogue]]
speaker = "トリシャ"
original = "「単刀直入に申し上げましょう。仔羊たち。あなた達は早急に人間界へ帰るべきです」"
translation = "「단도직입적으로 말씀드리겠습니다. 어린양들이여. 당신들은 조속히 인간계로 돌아가야 합니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「人間界へ──？」"
translation = "「인간계로──?」"

[[dialogue]]
speaker = "クロト"
original = "「心配しなくても、大いなる冬が完全に落ち着いたら帰るつもりだけど……」"
translation = "「걱정하지 않으셔도, 대자연의 겨울이 완전히 잠잠해지면 돌아갈 생각이지만……」"

[[dialogue]]
speaker = "トリシャ"
original = "「それでは遅い。なるべく直ちに、今すぐにもです」"
translation = "「그때는 늦습니다. 가능한 한 즉시, 지금 당장이라도요」"

[[dialogue]]
speaker = "ラティエ"
original = "「ふむ。人間界で何か起きているのか？」"
translation = "「흠. 인간계에서 무슨 일이 일어나고 있는 건가?」"

[[dialogue]]
speaker = "unk"
original = "同じく夕食を囲んだのち、大酒を飲んで泊まり込んでいたラティエ学園長も顔を出した。"
translation = "마찬가지로 저녁 식사를 함께한 후, 술을 많이 마시고 묵고 있던 라티에 학원장도 얼굴을 내밀었다."

[[dialogue]]
speaker = "トリシャ"
original = "「はい。人間界全域に恐るべき凶兆が出ている──これは千年に一度、いえ、それ以上ともいえる最悪の<ruby>凶星<rt>マレフィック</rt></ruby>です！」"
translation = "「네. 인간계 전역에 두려운 흉조가 나타나고 있습니다── 이것은 천년에 한 번, 아니, 그 이상이라고도 할 수 있는 최악의 흉성입니다!」"

[[dialogue]]
speaker = "マトイ"
original = "「！？」"
translation = "「!?」"

[[dialogue]]
speaker = "unk"
original = "トリシャさんは緊迫した面持ちでそう告げた。"
translation = "트리샤 씨는 긴박한 표정으로 그렇게 고했다."

[[dialogue]]
speaker = "unk"
original = "彼女の首に提げられたペンデュラムが、かつてないほど強烈な光を放っていた。"
translation = "그녀의 목에 걸린 펜듈럼이, 전례 없을 정도로 강렬한 빛을 내뿜고 있었다."

[[dialogue]]
speaker = "トリシャ"
original = "「振り子の示すところによれば──人間界は今、<ruby>熾烈<rt>しれつ</rt></ruby>な災禍に見舞われています。魔界の星々も<ruby>戦<rt>おのの</rt></ruby>いていますが、それ以上に」"
translation = "「추가 가리키는 바에 따르면── 인간계는 지금, 치열한 재앙에 휩싸여 있습니다. 마계의 별들도 전율하고 있지만, 그 이상으로」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「な、何よそれ！\u3000黒騎士を倒したってのに早々にやばそうじゃない！？」"
translation = "「뭐, 뭐야 그거! 검은 기사를 쓰러뜨렸는데 벌써부터 위험해 보이잖아!?」"

[[dialogue]]
speaker = "ニャリオン"
original = "「でも占いは占いニャン……？\u3000そこまでアテになるのかニャン……？」"
translation = "「하지만 점은 점이다냥……? 그렇게까지 믿을 만한 거냐냥……?」"

[[dialogue]]
speaker = "クロト"
original = "「トリシャさんの占星術は俺たちでいうところの星術だ。それが反応してるってことは……」"
translation = "「트리샤 씨의 점성술은 우리로 치면 성술이다. 그게 반응하고 있다는 건……」"

[[dialogue]]
speaker = "フィオナ"
original = "「人間界全体を襲う災禍──リクリエ現象の可能性が濃厚ですね」"
translation = "「인간계 전체를 덮치는 재앙── 리크리에 현상의 가능성이 농후하네요」"

[[dialogue]]
speaker = "unk"
original = "向こうが実際どうなっているのか知りたいが、魔界からすぐに連絡は通じない。"
translation = "저쪽이 실제로 어떻게 되었는지 알고 싶지만, 마계에서 바로 연락이 닿지 않는다."

[[dialogue]]
speaker = "unk"
original = "緊急事態だというなら──直接動くしかないだろう。"
translation = "긴급 상황이라고 한다면── 직접 움직일 수밖에 없을 것이다."

[[dialogue]]
speaker = "トリシャ"
original = "「ゆえに叶うのであれば即刻、あなた方は帰るべきでしょう。せっかくできたお友達と別れるのは……非常に残念ですが……」"
translation = "「그러므로 가능하다면 즉각, 당신들은 돌아가야 할 것입니다. 모처럼 생긴 친구들과 헤어지는 것은…… 매우 유감이지만……」"

[[dialogue]]
speaker = "マトイ"
original = "「また会いに来ますよ！\u3000今度は星徒会のみんなも連れて！」"
translation = "「또 만나러 올게! 이번에는 성도회 모두도 데리고!」"

[[dialogue]]
speaker = "サーシャ"
original = "「そうね。私とソフィからしたら地元だし」"
translation = "「그렇지. 나와 소피에게는 고향이니까」"

[[dialogue]]
speaker = "トリシャ"
original = "「フフ……ありがとうございます。こう見えて私は魔界の各地を渡ってきた流浪の占い師」"
translation = "「후후…… 고맙습니다. 이렇게 보여도 저는 마계의 각지를 떠돌아다닌 유랑 점술사」"

[[dialogue]]
speaker = "トリシャ"
original = "「もしかすると、いずれは私が人間界へ赴くこともあるやもしれません……」"
translation = "「어쩌면, 언젠가는 제가 인간계로 갈 일도 있을지 모릅니다……」"

[[dialogue]]
speaker = "unk"
original = "トリシャさんのお告げを受け、俺たちは至急人間界へ戻ることを決めた。"
translation = "트리샤 씨의 예언을 받아, 우리는 급히 인간계로 돌아가기로 결정했다."

[[dialogue]]
speaker = "ユウリ"
original = "「つっても、レゾフを放ってはおけないよな」"
translation = "「그렇다고 해도, 레조프를 내버려 둘 수는 없지」"

[[dialogue]]
speaker = "ラティエ"
original = "「ふむ。ならば私はこちらへ残ろう、スタンピードの余波がまだ来ないとも限らない」"
translation = "「흠. 그렇다면 나는 이곳에 남도록 하지, 스탬피드의 여파가 아직 오지 않는다고 단정할 수 없으니」"

[[dialogue]]
speaker = "フィオナ"
original = "「学園長──ありがとうございます。それなら安心です」"
translation = "「학원장님── 고맙습니다. 그렇다면 안심입니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「ですが、事が済みましたら……すぐに学園へ帰ってきてくださいね。私では務まらない業務が溜まっていますから」"
translation = "「하지만, 일이 끝나시면…… 바로 학원으로 돌아와 주세요. 저로서는 감당할 수 없는 업무가 쌓여 있으니까요」"

[[dialogue]]
speaker = "ソフィア"
original = "「そうです！\u3000それに……新星のセイファート学園長もいなくなってしまった以上、もっとしっかりしてもらわないと困ります」"
translation = "「맞아요! 게다가…… 신성의 세이퍼트 학원장님도 사라져 버린 이상, 더 확실하게 해 주셔야 곤란합니다」"

[[dialogue]]
speaker = "ラティエ"
original = "「やれやれ……逃がしてはくれないか。もう少し旅情に浸っていたかったのだがな」"
translation = "「이런이런…… 도망치게 해 주지 않는군. 좀 더 여정에 젖어 있고 싶었는데 말이야」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「学園かー……大して離れてたわけでもないのに、なんか懐かしい気もしちゃうわね」"
translation = "「학원인가ー…… 딱히 멀리 떨어져 있던 것도 아닌데, 왠지 모르게 그립게 느껴지네」"

[[dialogue]]
speaker = "クロト"
original = "「よし。じゃあ戻ろう──アナ達も心配して待ってるはずだ」"
translation = "「좋아. 그럼 돌아가자── 아나들도 걱정하며 기다리고 있을 거야」"

