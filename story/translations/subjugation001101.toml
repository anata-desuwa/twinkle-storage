[[dialogue]]
speaker = "unk"
original = "――某日、東京の渋谷エリアにてアステライトが出現。"
translation = "──어느 날, 도쿄의 시부야 지역에서 아스텔라이트가 출현."

[[dialogue]]
speaker = "unk"
original = "その連絡を受けて、俺たち新星学園星徒会は出動し、アステラ内部に突入。"
translation = "그 연락을 받고 우리 신성학원 성도회는 출동하여 아스텔라 내부로 돌입."

[[dialogue]]
speaker = "unk"
original = "ボスモンスターと思われる個体と交戦を開始していたのだが――"
translation = "보스 몬스터로 추정되는 개체와 교전을 개시하고 있었는데──"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロト！\u3000気を付けて！\u3000こいつ、いつもの奴より強いわ！」"
translation = "「쿠로토! 조심해! 이 녀석, 평소 녀석보다 강해!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「リクリエが近づいている影響かもしれません」"
translation = "「리크리에가 다가오고 있는 영향일지도 모릅니다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「会長、Ｓランクモンスター『ガルア・ネルア』、来ます」"
translation = "「회장님, S랭크 몬스터 『가루아 네루아』, 옵니다.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「私が攻撃を防ぎつつ引きつけるから、みんなはその隙に攻撃して！」"
translation = "「내가 공격을 막으며 끌어들일 테니까, 모두는 그 틈에 공격해!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「わかったわ、お願いマトイちゃん！\u3000行くわよ～！」"
translation = "「알았어, 부탁해 마토이짱! 가자~!」"

[[dialogue]]
speaker_original = "ガルア・ネルア"
speaker_translation = "가루아 네루아"
original = "「グオオォォォッ！」"
translation = "「구오오오옷!」"

[[dialogue]]
speaker = "unk"
original = "強敵相手に戦闘が激しさを増していく――と、その時だった。"
translation = "강적을 상대로 전투가 격렬해져 가던── 그때였다."

[[dialogue]]
speaker = "？？？"
original = "「ふっふっふ、待たせたな」"
translation = "「훗훗훗, 오래 기다렸지.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「えっ？」"
translation = "「엣?」"

[[dialogue]]
speaker = "？？？"
original = "「真打ち登場！」"
translation = "「주인공 등장!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「だ、誰……！？」"
translation = "「누, 누구……!?」"

[[dialogue]]
speaker = "？？？"
original = "「邪悪なる者よ、我が闇に抱かれて、無に還るがいい！\u3000――必殺奥義！！」"
translation = "「사악한 자여, 나의 어둠에 안겨 무로 돌아가거라! ──필살 오의!!」"

[[dialogue]]
speaker = "？？？"
original = "「暗・黒・滅・竜・波ッ！！！」"
translation = "「암·흑·멸·룡·파!!!」"

[[dialogue]]
speaker_original = "ガルア・ネルア"
speaker_translation = "가루아 네루아"
original = "「！？」"
translation = "「!?」"

[[dialogue]]
speaker_original = "ガルア・ネルア"
speaker_translation = "가루아 네루아"
original = "「グオオォォォ――ッ！！？」"
translation = "「구오오오──옷!!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「――敵の消滅を確認しました。今の技は一体……！？」"
translation = "「──적의 소멸을 확인했습니다. 방금 기술은 대체……!?」"

[[dialogue]]
speaker = "？？？"
original = "「ふふふ、これがあたしの……我がモノクラウン家に伝わる、必殺の星術『ドラゴンバスター』！」"
translation = "「후후후, 이것이 나의…… 우리 모노크라운 가문에 전해지는 필살의 성술 『드래곤 버스터』!」"

[[dialogue]]
speaker = "？？？"
original = "「もとい、それをカッコよく改名した『暗黒滅竜波』だよ！」"
translation = "「아니, 그걸 멋있게 개명한 『암흑멸룡파』야!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「技自体は同じなんだ……」"
translation = "「기술 자체는 똑같은 거네……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「でも、すごい威力のビームだったわ！\u3000私たちが消耗させた後とはいえ、決めきれてなかった相手にトドメを刺す一撃だもの！」"
translation = "「하지만 엄청난 위력의 빔이었어! 우리가 소모시킨 뒤였다고는 해도 결정타를 날리지 못하던 상대에게 숨통을 끊는 일격이었는걸!」"

[[dialogue]]
speaker = "unk"
original = "助かったよ。ところで、キミは一体……？"
translation = "도움이 됐어. 그런데 너는 대체……?"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「学園では見たことない子よね～？」"
translation = "「학원에서는 본 적 없는 아이네~?」"

[[dialogue]]
speaker = "？？？"
original = "「ふっ、よくぞ聞いた！\u3000我が名は――」"
translation = "「훗, 잘 물어봤다! 나의 이름은──」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「メイプルちゃーん！」"
translation = "「메이플짱──!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「――あっ、いた！\u3000もう！\u3000メイプルちゃん、先生と一緒に進まないとダメだって言ったのに！」"
translation = "「──앗, 여기 있다! 정말! 메이플짱, 선생님이랑 같이 가지 않으면 안 된다고 말했는데!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ちょっと、トワちゃん！\u3000いいところだったのに、ネタバレしないでよ！？」"
translation = "「잠깐, 토와짱! 좋은 타이밍이었는데 스포일러 하지 마!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「トワちゃん先生！\u3000この子と知り合いなの？」"
translation = "「토와짱 선생님! 이 아이랑 아는 사이야?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「よかった、ボスモンスターは倒したんだね！\u3000えっと……彼女はちょっと事情があって、私の家で預かってる子で……」"
translation = "「다행이다, 보스 몬스터는 쓰러뜨렸구나! 저기…… 그녀는 좀 사정이 있어서 우리 집에서 맡고 있는 아이인데……」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「――我が名は『メイプル・モノクラウン』！」"
translation = "「──나의 이름은 『메이플 모노크라운』!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「魔界よりやってきた、『クルセイダース』の子孫にして、来たるリクリエを打ち倒し、新たなる魔王となる者！」"
translation = "「마계에서 건너온, 『크루세이더스』의 후예이자, 다가올 리크리에를 쳐부수고 새로운 마왕이 될 자!」"

[[dialogue]]
speaker = "unk"
original = "ま、魔王……！？"
translation = "마, 마왕……!?"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ふっふっふ、その通り。お前のことは聞いているぞ。新星学園の会長――緋宮クロト！」"
translation = "「훗훗훗, 그렇다. 네 얘기는 들었다고. 신성학원의 회장── 히노미야 쿠로토!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「人間界で魔王と噂されている存在。この目で実際に会って、確かめようと思っていたけど……じ～っ」"
translation = "「인간계에서 마왕이라고 소문난 존재. 이 눈으로 직접 만나서 확인하려고 생각했는데…… 지──익」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「――うん、悪くない。魔王の座を譲る気はないけど……」"
translation = "「──음, 나쁘지 않아. 마왕의 자리를 넘겨줄 생각은 없지만……」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「あたしの『お兄ちゃん』としてなら、認めてあげてもいいかな」"
translation = "「나의 『오빠』로서라면 인정해 줄 수도 있어.」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「え……なんて？」"
translation = "「에…… 뭐라고?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「というわけで、これからよろしくね！\u3000お兄ちゃん♪」"
translation = "「그런 고로, 앞으로 잘 부탁해! 오빠♪」"

[[dialogue]]
speaker = "unk"
original = "どういうこと！？"
translation = "어떻게 된 거야!?"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あら～♪」"
translation = "「어머나~♪」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ルルカさんが知ったら、黙ってなさそうですね」"
translation = "「루루카 씨가 알면 가만히 있지 않겠네요.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「妹なんていたの？\u3000私、初耳なんだけど！」"
translation = "「여동생 같은 게 있었어? 나, 처음 듣는데!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「いや、多分違うと思う……」"
translation = "「아니, 아마 아닐 거라고 생각해……」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「にへへ♪」"
translation = "「니헤헤♪」"

[[dialogue]]
speaker = "unk"
original = "そんなわけで、俺は謎の女の子・メイプルと新たに出会ったのだった――"
translation = "그런 연유로, 나는 정체불명의 소녀 메이플과 새롭게 만나게 된 것이었다──"

