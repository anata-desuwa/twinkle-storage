[[dialogue]]
speaker = "unk"
original = "第３話,世界征服作戦！,P"
translation = "제3화,세계 정복 작전!,P"

[[dialogue]]
speaker = "カティア"
original = "「魔王様～！」"
translation = "「마왕님~!」"

[[dialogue]]
speaker = "カティア"
original = "「魔王様魔王様！\u3000今日はどうやって世界征服するんですか？\u3000世界を恐怖と混乱に陥れてやりましょうワン！」"
translation = "「마왕님 마왕님! 오늘은 어떻게 세계 정복을 하실 건가요? 세계를 공포와 혼란에 빠뜨려 버리자고요 멍!」"

[[dialogue]]
speaker = "カティア"
original = "「ワクワク♪」"
translation = "「두근두근♪」"

[[dialogue]]
speaker = "unk"
original = "じゃあ、とりあえず街に……"
translation = "그럼, 일단 거리에……"

[[dialogue]]
speaker = "カティア"
original = "「なるほど、まずは情報収集ですね！\u3000さすが魔王様ですワン！\u3000それじゃレッツゴー……ガオ！」"
translation = "「과연, 일단은 정보 수집이군요! 역시 마왕님이세요 멍! 그럼 레츠 고…… 갸오!」"

[[dialogue]]
speaker = "カティア"
original = "「クックック……愚民どもめ、魔王様の世界征服計画が進行しているとも知らずに……せいぜい仮初めの幸福を享受しているがいいガオ」"
translation = "「크크크…… 어리석은 백성들이여, 마왕님의 세계 정복 계획이 진행되고 있다는 것도 모르고…… 실컷 덧없는 행복을 누리고 있는 게 좋을 거다 갸오」"

[[dialogue]]
speaker = "カティア"
original = "「え、この語尾ですか……ワン」"
translation = "「에, 이 어미 말인가요…… 멍」"

[[dialogue]]
speaker = "カティア"
original = "「ほら、世界征服を企む魔王の部下には個性が必要じゃないですか。だから犬系の魔族として犬アピールをしようと思いまして。特に口癖とか魔界の方言とかじゃないです」"
translation = "「이것 봐요, 세계 정복을 꾀하는 마왕의 부하에게는 개성이 필요하지 않습니까. 그래서 개 계열 마족으로서 개 어필을 하려고 생각했습니다. 딱히 입버릇이라거나 마계의 사투리 같은 건 아니에요」"

[[dialogue]]
speaker = "カティア"
original = "「このカティア、魔王様のためなら犬にもなりますワン！」"
translation = "「이 카티아, 마왕님을 위해서라면 개라도 될 거예요 멍!」"

[[dialogue]]
speaker = "カティア"
original = "「ん……？\u3000くんくん……とってもいい匂いがします！\u3000お昼食べたのにお腹が空いてきました！」"
translation = "「응……? 킁킁…… 아주 좋은 냄새가 나요! 점심을 먹었는데도 배가 고파졌어요!」"

[[dialogue]]
speaker = "カティア"
original = "「でも今は魔王様と偵察の真っ最中……ガマンガマン……」"
translation = "「하지만 지금은 마왕님과 정찰 중…… 참자 참자……」"

[[dialogue]]
speaker = "unk"
original = "ちょっと買い食いしようか"
translation = "잠깐 군것질이나 할까"

[[dialogue]]
speaker = "カティア"
original = "「いいんですか！？」"
translation = "「정말요!?」"

[[dialogue]]
speaker = "カティア"
original = "「なるほど、世界征服には適切な補給が不可欠ということですね。さすが魔王様です」"
translation = "「과연, 세계 정복에는 적절한 보급이 필수불가결하다는 것이군요. 역시 마왕님이세요」"

[[dialogue]]
speaker = "カティア"
original = "「どれどれ……あれが噂のメロンパンですか。この辺りでは有名だと聞いたことがあります」"
translation = "「어디 보자…… 저것이 소문의 멜론빵인가요. 이 근방에서는 유명하다고 들은 적이 있어요」"

[[dialogue]]
speaker = "unk"
original = "メロンパン２つくださーい"
translation = "멜론빵 두 개 주세요ー"

[[dialogue]]
speaker = "カティア"
original = "「さすが魔王様！\u3000魔王様の下賜、ありがたく頂戴します！」"
translation = "「역시 마왕님! 마왕님의 하사품, 감사히 받겠습니다!」"

[[dialogue]]
speaker = "カティア"
original = "「おお、このメロンパンすごくおっきいです！\u3000それでは……あむっ」"
translation = "「오오, 이 멜론빵 엄청 커요! 그럼…… 아앙」"

[[dialogue]]
speaker = "カティア"
original = "「ん～！\u3000表面がサクサクで、甘くて、パンもふわっふわでおいしいです！」"
translation = "「음~! 표면이 바삭바삭하고, 달콤하고, 빵도 폭신폭신해서 맛있어요!」"

[[dialogue]]
speaker = "カティア"
original = "「うちの村でも小麦を作ってましたから、私パンにはうるさいんですが、これは花丸あげたいくらいです」"
translation = "「저희 마을에서도 밀을 재배했었으니까, 제가 빵에는 까다로운 편인데, 이건 백 점 만점에 백 점을 주고 싶을 정도예요」"

[[dialogue]]
speaker = "カティア"
original = "「はむはむ……あむ……ごちそうさま！\u3000大きいのにあっという間に食べ終わっちゃいました」"
translation = "「냠냠…… 앙…… 잘 먹었습니다! 큰데도 순식간에 다 먹어 버렸어요」"

[[dialogue]]
speaker = "カティア"
original = "「そうだ！\u3000世界を手に入れた暁には、メロンパン食べ放題にしましょう！\u3000最高だと思いませんか？」"
translation = "「맞다! 세계를 손에 넣는 날에는, 멜론빵 무한 리필로 해요! 최고라고 생각하지 않으세요?」"

[[dialogue]]
speaker = "カティア"
original = "「──む！\u3000この匂いは……お肉！\u3000ほうほう、メンチカツなるものがあるんですね」"
translation = "「──흠! 이 냄새는…… 고기! 호오, 멘치카츠라는 것이 있군요」"

[[dialogue]]
speaker = "カティア"
original = "「世界征服のためにはあらゆる情報が必要……ですよね？」"
translation = "「세계 정복을 위해서는 모든 정보가 필요…… 하죠?」"

[[dialogue]]
speaker = "unk"
original = "そうだな！"
translation = "그렇지!"

[[dialogue]]
speaker = "カティア"
original = "「さすが魔王様！\u3000というわけでいただきます！\u3000ガブッ」"
translation = "「역시 마왕님! 그런 고로 잘 먹겠습니다! 덥석」"

[[dialogue]]
speaker = "カティア"
original = "「ん～～っ、肉汁がジューシーでたまりません！\u3000村じゃそんなにお肉は食べられなかったから、もう天国ですよ！\u3000人間界ですけど！」"
translation = "「음~~, 육즙이 풍부해서 참을 수가 없어요! 마을에서는 그렇게 고기를 먹을 수 없었으니까, 이제 천국이에요! 인간계지만요!」"

[[dialogue]]
speaker = "カティア"
original = "「村のみんなにも食べさせてあげたいなぁ……」"
translation = "「마을 사람들한테도 먹여주고 싶다아……」"

[[dialogue]]
speaker = "unk"
original = "故郷が好き？"
translation = "고향이 좋아?"

[[dialogue]]
speaker = "カティア"
original = "「そ、そんなわけないじゃないですかっ」"
translation = "「서, 설마 그럴 리가 없잖아요!」"

[[dialogue]]
speaker = "カティア"
original = "「畑仕事手伝えってうるさいし、野菜料理ばっかだし、シチューのお肉はちょっとしか入ってないし」"
translation = "「밭일 거들라고 시끄럽게 하고, 채소 요리뿐이고, 스튜에는 고기가 조금밖에 안 들어 있고」"

[[dialogue]]
speaker = "カティア"
original = "「人間界の楽しさを知ってしまったら、とても村に帰る気になりませんね」"
translation = "「인간계의 즐거움을 알아버렸으니, 도저히 마을로 돌아갈 마음이 들지 않네요」"

[[dialogue]]
speaker = "カティア"
original = "「……置いてきた花、どうなってるかな。今はマーガレットが見頃だろうなぁ」"
translation = "「……두고 온 꽃은 어떻게 됐을까. 지금쯤 마거리트가 한창일 텐데」"

[[dialogue]]
speaker = "カティア"
original = "「村のみんな、今頃何してるのかな……お母さんとお父さん寂しがってないかなぁ……」"
translation = "「마을 사람들은 지금쯤 뭘 하고 있을까…… 엄마랑 아빠가 외로워하고 있진 않을까……」"

[[dialogue]]
speaker = "カティア"
original = "「あ──」"
translation = "「아──」"

[[dialogue]]
speaker = "カティア"
original = "「魔王様魔王様。あの女の子……キョロキョロして何かあったみたいですね」"
translation = "「마왕님 마왕님. 저 여자아이…… 두리번거리는 걸 보니 무슨 일이라도 생긴 것 같아요」"

[[dialogue]]
speaker = "小さな女の子"
original = "「うぅ……ひぐ……ぐすっ……」"
translation = "「으윽…… 흑…… 훌쩍……」"

[[dialogue]]
speaker = "カティア"
original = "「ねぇきみ、どうしたの？」"
translation = "「얘야, 무슨 일 있니?」"

[[dialogue]]
speaker = "小さな女の子"
original = "「ママ、いなくなっちゃって……さっきまでちゃんとおててつないでたのに」"
translation = "「엄마가, 없어져 버렸어…… 아까까지 제대로 손잡고 있었는데」"

[[dialogue]]
speaker = "カティア"
original = "「そっか。それは大変だね」"
translation = "「그렇구나. 그거 큰일이네」"

[[dialogue]]
speaker = "カティア"
original = "（やっぱり迷子みたいですね。こういう時、人間界だとどうするんですか？）"
translation = "（역시 미아인 것 같네요. 이럴 때, 인간계에서는 어떻게 하나요?）"

[[dialogue]]
speaker = "カティア"
original = "（……なるほど、交番に連れていけばいいんですね。でも他にできることがあるような……そうだっ）"
translation = "（……과연, 파출소에 데려가면 되는군요. 하지만 그 외에 할 수 있는 일이 있을 것 같은데…… 맞다!）"

[[dialogue]]
speaker = "カティア"
original = "「ねぇ、ちょっと手を出してくれる？\u3000ママと手をつないでた方」"
translation = "「얘, 잠깐 손 좀 내밀어 줄래? 엄마랑 손잡고 있던 쪽」"

[[dialogue]]
speaker = "小さな女の子"
original = "「え？\u3000こう……でいいの？」"
translation = "「응? 이렇게…… 하면 돼?」"

[[dialogue]]
speaker = "カティア"
original = "「ありがとう。ちょっとじっとしててね」"
translation = "「고마워. 잠깐 가만히 있어 봐」"

[[dialogue]]
speaker = "カティア"
original = "「くんくんくん……くんくん……お母さんの匂いは……」"
translation = "「킁킁킁…… 킁킁…… 엄마 냄새는……」"

[[dialogue]]
speaker = "カティア"
original = "「見つけました！」"
translation = "「찾았습니다!」"

[[dialogue]]
speaker = "カティア"
original = "「お母さんが早く見つかってよかったです。あの子、すごく喜んでましたね」"
translation = "「어머니를 빨리 찾아서 다행이에요. 그 아이, 엄청 기뻐했죠」"

[[dialogue]]
speaker = "unk"
original = "よくやったな、カティア"
translation = "잘했어, 카티아"

[[dialogue]]
speaker = "カティア"
original = "「えへへ～♪\u3000光栄です♪」"
translation = "「에헤헤~♪ 영광입니다♪」"

[[dialogue]]
speaker = "カティア"
original = "「これからも悪の道を突き進み──あれ、なんか悪いことしたっけ……？」"
translation = "「앞으로도 악의 길을 헤쳐나가── 어라, 뭔가 나쁜 짓 했었나……?」"

[[dialogue]]
speaker = "カティア"
original = "「ま、魔王様がほめてくれたんだからいいか♪」"
translation = "「마, 마왕님이 칭찬해 주셨으니까 됐나♪」"

