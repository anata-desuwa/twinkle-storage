[[dialogue]]
speaker = "ヘレナ"
original = "「よくやってくれた。貴殿らの助力に感謝する」"
translation = "「잘 해주었느니라. 귀공들의 조력에 감사하노라.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「新種のモンスターについてはこちらでも調査しておく。何かわかったらヴィーナスを通じて伝えよう」"
translation = "「신종 몬스터에 대해서는 이쪽에서도 조사해 두겠노라. 뭔가 알게 되면 비너스를 통해 전하도록 하지.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「さて、お待ちかねの報酬だが──」"
translation = "「자, 기다리던 보상이다만──」"

[[dialogue]]
speaker = "セーラ"
original = "「いやー、たんまりもらっちゃったね～♪\u3000お財布ほっくほくだよ～♪」"
translation = "「이야~, 듬뿍 받아버렸네~♪ 지갑이 빵빵해~♪」"

[[dialogue]]
speaker = "unk"
original = "すごく色を付けてもらえたもんね"
translation = "보너스를 꽤 챙겨주셨으니까"

[[dialogue]]
speaker = "ユウリ"
original = "「こりゃ後輩に豪勢な誕生日会を開いてやってもおつりがくるぜ。せっかくだし打ち上げがてらクレープでも食べに行かねえか？」"
translation = "「이 정도면 후배에게 호화로운 생일 파티를 열어주고도 남겠는걸. 이왕 이렇게 된 거 뒤풀이 겸 크레이프라도 먹으러 가지 않을래?」"

[[dialogue]]
speaker = "ユーリス"
original = "「あ、いや。私はここで失礼するよ」"
translation = "「아, 아뇨. 저는 여기서 실례할게요.」"

[[dialogue]]
speaker = "ユウリ"
original = "「んだよノリ悪りぃな。なんか予定でもあんのかよ？」"
translation = "「뭐야, 분위기 깨게. 무슨 예정이라도 있는 거냐?」"

[[dialogue]]
speaker = "ユーリス"
original = "「そういうわけじゃないんだけど……。お金が、その……」"
translation = "「그런 건 아니지만……. 돈이, 그……」"

[[dialogue]]
speaker = "セーラ"
original = "「え？\u3000たった今、たくさんもらったところじゃん」"
translation = "「에? 방금 막 잔뜩 받은 참이잖아.」"

[[dialogue]]
speaker = "ユーリス"
original = "「祖国の復興資金の足しになればと全て送金しちゃったからね……。あ、でも私のことは気にしないでみんなで食べに行っちゃってよ」"
translation = "「조국의 부흥 자금에 보탬이 되었으면 해서 전부 송금해버렸거든요……. 아, 하지만 제 일은 신경 쓰지 말고 다들 먹으러 가세요.」"

[[dialogue]]
speaker = "ユウリ"
original = "「ったく、使命感が強すぎるってのも考えもんだな。いいから行くぞ。一人でも欠けてたら打ち上げになんねーじゃねえか」"
translation = "「정말이지, 사명감이 너무 강한 것도 문제라니까. 됐으니까 가자고. 한 명이라도 빠지면 뒤풀이가 안 되잖아.」"

[[dialogue]]
speaker = "ユーリス"
original = "「えっ、でも──わわっ！？」"
translation = "「엣, 하지만── 와와!?」"

[[dialogue]]
speaker = "ユウリ"
original = "「あたしらと一緒にいる時くらい肩の力抜けっつったじゃねえか。今は王子じゃなくて、ただのいち生徒として過ごせよ。クレープくらい奢ってやっから」"
translation = "「우리랑 같이 있을 때 정도는 어깨에 힘 좀 빼라고 했잖아. 지금은 왕자가 아니라 그냥 한 명의 학생으로 지내라구. 크레이프 정도는 쏴줄 테니까.」"

[[dialogue]]
speaker = "ユーリス"
original = "「ユウリさん……」"
translation = "「유우리 씨……」"

[[dialogue]]
speaker = "セーラ"
original = "「ふふ、ごめんね♪\u3000うちの親方、昔かたぎの強引なお人でして♪」"
translation = "「후후, 미안해♪ 우리 대장님이 옛날 스타일의 막무가내인 분이라서♪」"

[[dialogue]]
speaker = "ユウリ"
original = "「だからねじり鉢巻き渡されても困るんすけど！？」"
translation = "「그러니까 머리띠 넘겨줘도 곤란하다니까요!?」"

[[dialogue]]
speaker = "unk"
original = "ユーリスは今回のＭＶＰだしね"
translation = "유리스는 이번 MVP이기도 하고"

[[dialogue]]
speaker = "ユーリス"
original = "「そ、そうかな……？\u3000けっこう迷惑をかけてしまったと思うんだけど」"
translation = "「그, 그럴까……? 꽤 폐를 끼쳐버렸다고 생각하는데.」"

[[dialogue]]
speaker = "セーラ"
original = "「そーそ。そもそも王子がいなかったらカジノへの潜入もままならなかったわけだし♪」"
translation = "「그래 그래. 애초에 왕자님이 없었으면 카지노 잠입도 제대로 못 했을 테니까♪」"

[[dialogue]]
speaker = "ユウリ"
original = "「女子会っつーのも初めてだろ？\u3000ま、会長さんもいるけど」"
translation = "「여자들끼리 모이는 것도 처음이지? 뭐, 회장님도 있긴 하지만.」"

[[dialogue]]
speaker = "unk"
original = "今だけ女の子扱いしてもよろしくてよ"
translation = "지금만 여자애 취급해 드려도 되요"

[[dialogue]]
speaker = "ユウリ"
original = "「何キャラだよ」"
translation = "「무슨 캐릭터냐고.」"

[[dialogue]]
speaker = "ユーリス"
original = "「みんな、ありがとう……。ふふ、それじゃお言葉に甘えちゃおうかな」"
translation = "「모두, 고마워……. 후후, 그럼 사양 말고 받아들여 볼까나.」"

[[dialogue]]
speaker = "セーラ"
original = "「よーし、それじゃクレープ買ったら王子の部屋に直行だ～！\u3000まだ戦闘服もカジノ仕様のままだし、着替えて朝まで盛り上がっちゃおうよ♪」"
translation = "「좋아, 그럼 크레이프 사면 왕자님 방으로 직행이다~! 아직 전투복도 카지노 사양 그대로고, 갈아입으면서 아침까지 불태워보자고♪」"

[[dialogue]]
speaker = "ユウリ"
original = "「は、はぁ！？\u3000またバニーガールになれっつーんすかっ！？\u3000もう嫌っすよ、絶対に嫌っすっ！」"
translation = "「하, 하아!? 또 바니걸이 되라는 소리임!? 이제 싫다구, 절대 싫음!」"

[[dialogue]]
speaker = "ユーリス"
original = "「ふふ、私ももう一度見たいな、ユウリさんのバニーガール姿。とても似合っていたよ」"
translation = "「후후, 저도 한 번 더 보고 싶네요, 유우리 씨의 바니걸 모습. 정말 잘 어울렸거든요.」"

[[dialogue]]
speaker = "ユウリ"
original = "「調子に乗んなよポンコツ王子！？\u3000つかあんただけバニー着てねえのもおかしいよなぁ……？」"
translation = "「우쭐대지 마라, 폰코츠 왕자!? 그보다 너만 바니 안 입고 있는 것도 이상하잖아……?」"

[[dialogue]]
speaker = "ユーリス"
original = "「えっ！？」"
translation = "「엣!?」"

[[dialogue]]
speaker = "セーラ"
original = "「あーそれ、うちもずっと思ってた。絶対王子も似合うよね～。あれだけ立派なものも、ふふ、お持ちだったし？」"
translation = "「아- 그거, 나도 계속 생각했어. 절대 왕자님도 잘 어울릴 거야~. 그만큼 훌륭한 것도, 후후, 가지고 계셨고?」"

[[dialogue]]
speaker = "ユーリス"
original = "「い、いや、私は。この通り普段は男として生きている身だしっ」"
translation = "「아, 아니, 저는. 보시다시피 평소에는 남자로 살고 있는 몸이고!」"

[[dialogue]]
speaker = "セーラ"
original = "「うちらの前では性別気にするなっつったじゃーん♪\u3000それに王子の部屋でなら、ユリアーナちゃんに戻っても構わないよね～？」"
translation = "「우리 앞에서는 성별 신경 쓰지 말라고 했잖아~♪ 게다가 왕자님 방에서라면 유리아나 짱으로 돌아가도 상관없지?」"

[[dialogue]]
speaker = "ユウリ"
original = "「友達になったついでだ。大切なことを教えてやんぜ。人を弄っていいのはな、弄られる覚悟のあるやつだけだ！」"
translation = "「친구가 된 김에 말이지. 중요한 걸 가르쳐주마. 사람을 놀려도 되는 건 말이야, 놀림받을 각오가 된 녀석뿐이라고!」"

[[dialogue]]
speaker = "ユーリス"
original = "「～～っっ！？\u3000無理っ、無理だっ！\u3000あんな恥ずかしい格好、私にはとても……！\u3000会長、助けて……！」"
translation = "「~~!? 무리야, 무리라고! 그런 부끄러운 복장, 나에게는 도저히……! 회장, 도와줘……!」"

[[dialogue]]
speaker = "unk"
original = "俺もユリアーナのバニー姿を見てみたいな"
translation = "나도 유리아나의 바니 모습 보고 싶네"

[[dialogue]]
speaker = "ユーリス"
original = "「会長っっ～～！！？」"
translation = "「회장님~~!!?」"

[[dialogue]]
speaker = "ユウリ"
original = "「おら、行くぞ。あんたには散々恥ずかしい思いさせられたからな。ふふ、覚悟しときやがれ」"
translation = "「어이, 가자. 너한테는 실컷 부끄러운 꼴을 당했으니까 말이야. 후후, 각오하고 있으라고.」"

[[dialogue]]
speaker = "セーラ"
original = "「色仕掛け大会も開いちゃおうよ♪\u3000可愛いバニーガール３人で会長さんを誘惑して、ドキドキさせちゃお♪」"
translation = "「미인계 대회도 열어버리자♪ 귀여운 바니걸 세 명에서 회장님을 유혹해서 두근거리게 만들자고♪」"

[[dialogue]]
speaker = "ユーリス"
original = "「ま、待ってっ……！\u3000似合わないっ、絶対私にはバニーガールなんて似合わないからっ……！！」"
translation = "「기, 기다려……! 안 어울려, 절대 나한테는 바니걸 같은 거 안 어울리니까……!!」"

[[dialogue]]
speaker = "ユーリス"
original = "「お願いだから勘弁してぇっっ～～！！！」"
translation = "「부탁이니까 좀 봐줘~~!!!」"

