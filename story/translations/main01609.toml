[[dialogue]]
speaker = "unk"
original = "第１１話,断片,B"
translation = "제11화, 단편, B"

[[dialogue]]
speaker = "リノ"
original = "「とはいえ──最後まで油断は禁物よ。あれはまだ残っているから」"
translation = "「그렇다고 해도── 마지막까지 방심은 금물이야. 저건 아직 남아있으니까」"

[[dialogue]]
speaker = "ルリエル"
original = "「そ、そうです！\u3000仮面！\u3000仮面はどうなりましたか──？」"
translation = "「그, 그렇습니다! 가면! 가면은 어떻게 되었습니까──?」"

[[dialogue]]
speaker = "ユウリ"
original = "「砕けて……そのへんに散らばってんな」"
translation = "「부서져서…… 그 근처에 흩어져 있네」"

[[dialogue]]
speaker = "unk"
original = "散らばる仮面の断片にはどれも、よどんだ瘴気が色濃くくすぶり続けていた。"
translation = "흩어진 가면의 단편들에는 모두, 침체된 장기가 짙게 계속 피어오르고 있었다."

[[dialogue]]
speaker = "unk"
original = "この状態でさえ一時的な破壊にすぎない。一刻も早く封じる必要がある。"
translation = "이 상태로조차 일시적인 파괴에 불과하다. 한시라도 빨리 봉인할 필요가 있다."

[[dialogue]]
speaker = "アポロ"
original = "「気をつけろ。まだ、破片といえどもリクリエの強烈な瘴気を帯びているはずだ。下手したら取り込まれる」"
translation = "「조심해. 아직, 파편이라고 해도 리크리에의 강렬한 장기를 띠고 있을 것이다. 자칫하면 흡수당한다」"

[[dialogue]]
speaker = "クロト"
original = "「母さん。これは……」"
translation = "「엄마. 이건……」"

[[dialogue]]
speaker = "リノ"
original = "「ええ。再生が行われる前に回収しましょう。ただし、危険だから各個分かれて」"
translation = "「응. 재생이 이루어지기 전에 회수하자. 다만, 위험하니까 각자 흩어져서」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「おっけ──クロト、集めるわよ！」"
translation = "「오케이── 쿠로토, 모으자!」"

[[dialogue]]
speaker = "クロト"
original = "「ああ。どんな細かい破片も残さないよう」"
translation = "「아아. 어떤 미세한 파편도 남기지 않도록」"

[[dialogue]]
speaker = "リノ"
original = "「ありがとう、みんな──お願いするわね」"
translation = "「고마워, 모두── 부탁할게」"

[[dialogue]]
speaker = "unk"
original = "母さんが『シエルの筐』を取り出す。"
translation = "엄마가 『시엘의 궤』를 꺼낸다."

[[dialogue]]
speaker = "unk"
original = "キューブのような形状からフタを開くと、聖なる光が辺り一面へあふれ出した。"
translation = "큐브와 같은 형태에서 뚜껑을 열자, 성스러운 빛이 사방으로 흘러넘쳤다."

[[dialogue]]
speaker = "ルリエル"
original = "「これが天界の聖遺物……！\u3000神々しいオーラを感じます……！」"
translation = "「이것이 천계의 성유물……! 신성한 오라를 느낍니다……!」"

[[dialogue]]
speaker = "アポロ"
original = "「なるほどな……確かにただの箱じゃない。これなら封印できるかもしれない」"
translation = "「과연…… 확실히 단순한 상자가 아니군. 이걸로 봉인할 수 있을지도 모르겠다」"

[[dialogue]]
speaker = "リノ"
original = "「元々、特級の天災が封じられていたのを空けてもらったのよ。ずいぶん無理を言ったんだから」"
translation = "「원래, 특급 천재가 봉인되어 있던 걸 비워 달라고 했어. 꽤 무리한 부탁을 했지」"

[[dialogue]]
speaker = "ニャリオン"
original = "「んじゃゴミ拾いといくニャンよ！\u3000ワガハイは怖いから触らないでおくニャンが」"
translation = "「그럼 쓰레기 줍기 시작하는 거냥! 나 님은 무서우니까 만지지 않을 거냥」"

[[dialogue]]
speaker = "ユウリ"
original = "「おい」"
translation = "「어이」"

[[dialogue]]
speaker = "セーラ"
original = "「あ、アポロちゃんも一応触らないほうがいいかな？\u3000何が起こるかわかんないから」"
translation = "「아, 아폴로짱도 일단 만지지 않는 게 좋을까? 무슨 일이 일어날지 모르니까」"

[[dialogue]]
speaker = "アポロ"
original = "「そうだな。悪いが、任せたぞ」"
translation = "「그렇겠지. 미안하지만, 맡기겠다」"

[[dialogue]]
speaker = "ルリエル"
original = "「全部お任せなのですよ～！」"
translation = "「전부 맡겨주시는 것이어요~!」"

[[dialogue]]
speaker = "アポロ"
original = "「……ありがとう。本当に、いい奴らだな」"
translation = "「……고맙다. 정말로, 좋은 녀석들이구나」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
original = "「ええ──自慢の仲間たちです」"
translation = "「네── 자랑스러운 동료들입니다」"

[[dialogue]]
speaker = "unk"
original = "それから俺たちはフィーニスの塔の頂上に散らばった破片を慎重に回収していった。"
translation = "그 후 우리는 피니스의 탑 꼭대기에 흩어진 파편을 신중하게 회수해 나갔다."

[[dialogue]]
speaker = "unk"
original = "『シエルの筐』の封印力は大したもので、内部に収めたピースからは一切の瘴気を感じ取れなくなっていた。"
translation = "『시엘의 궤』의 봉인력은 대단해서, 내부에 담은 조각에서는 일절의 장기를 감지할 수 없게 되었다."

[[dialogue]]
speaker = "ユウリ"
original = "「うし、あそこに落ちてるのがラストだな──」"
translation = "「좋아, 저기에 떨어져 있는 게 마지막이군──」"

[[dialogue]]
speaker = "マトイ"
original = "「よかった……これで……」"
translation = "「다행이다…… 이걸로……」"

[[dialogue]]
speaker = "unk"
original = "最後のピースに手をかけようとする。その時だ。"
translation = "마지막 조각에 손을 대려고 한다. 그때였다."

[[dialogue]]
speaker = "ギエル"
original = "「ああ……いけませんねえ。英雄ともあろうものが、最後の最後でお役目を放棄してしまうなんて」"
translation = "「아아…… 안 되겠군요. 영웅이라고 하는 분이, 마지막 순간에 임무를 포기해 버리시다니」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker = "クロト"
original = "「ギエル──どうしてここに……」"
translation = "「기엘── 어떻게 여기에……」"

[[dialogue]]
speaker = "ギエル"
original = "「どうして？\u3000これは異なことを仰る。主のもとへ駆けつけるのは、従者として当然の定めでしょう」"
translation = "「어떻게? 이상한 말씀을 하시는군요. 주군께 달려가는 것은, 종자로서 당연한 숙명이지요」"

[[dialogue]]
speaker = "ギエル"
original = "「本来は、地上のコントロールを命じられていたのですがね。主に何かあってはいけないと思い……ただちに馳せ参じた次第ですよ」"
translation = "「본래는, 지상의 컨트롤을 명받았으나 말입니다. 주군께 무슨 일이 생겨서는 안 된다고 생각하여…… 즉시 달려온 것입니다」"

[[dialogue]]
speaker = "unk"
original = "その場にあらわれた燕尾服の男──ギエルが、最後の断片を拾っていった。"
translation = "그 자리에 나타난 연미복의 남자── 기엘이, 마지막 단편을 주워 갔다."

[[dialogue]]
speaker = "アポロ"
original = "「ギエル……待て。そいつを拾ったらダメだ」"
translation = "「기엘…… 기다려. 그걸 주우면 안 돼」"

[[dialogue]]
speaker = "ギエル"
original = "「おやおや。アポロ様。どうされました？\u3000仮面を脱いで、そのような者たちと馴れ合うなど」"
translation = "「오호라. 아폴로 님. 무슨 일이십니까? 가면을 벗고, 그런 자들과 어울리시다니」"

[[dialogue]]
speaker = "アポロ"
original = "「あたしは……あたしは目を覚ました。世界を壊せばいいだなんて馬鹿げてた」"
translation = "「나는…… 나는 눈을 떴다. 세계를 부수면 된다니 바보 같았다」"

[[dialogue]]
speaker = "アポロ"
original = "「オマエにも──迷惑かけた。悪かった。だから、それ以上アポロの幻影を追っちゃいけない」"
translation = "「너에게도── 폐를 끼쳤다. 미안했다. 그러니, 그 이상 아폴로의 환영을 쫓으면 안 돼」"

[[dialogue]]
speaker = "アポロ"
original = "「オマエはただの人間だ。まだ引き返せる。妹たちと一緒に」"
translation = "「너는 그저 인간이다. 아직 되돌릴 수 있어. 여동생들과 함께」"

[[dialogue]]
speaker = "ギエル"
original = "「なるほど。あなたが私の主だったなら従ったでしょう──が。『使徒』を捨てたあなた様に仕える義理はありませんねぇ」"
translation = "「과연. 당신이 저의 주군이었다면 따랐겠지요── 허나. 『사도』를 버리신 당신께 섬길 의리는 없군요」"

[[dialogue]]
speaker = "ソフィア"
original = "「っ、この人……！」"
translation = "「윽, 이 사람……!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「待ちなさいよ──せっかく戦いは終わったのよ！\u3000アポロだって正気に戻って──」"
translation = "「기다려 봐요── 모처럼 싸움은 끝났다고요! 아폴로도 제정신으로 돌아왔고──」"

[[dialogue]]
speaker = "ギエル"
original = "「で？\u3000世界は何も変わっていない。それじゃあいけない」"
translation = "「그래서요? 세계는 아무것도 변하지 않았습니다. 그래서는 안 되지요」"

[[dialogue]]
speaker = "ギエル"
original = "「何が仲間──所詮はひねた選民思想。あなた達のような正義だの、友情だの、そうした欺瞞が私は何より嫌いなのですよ」"
translation = "「무엇이 동료── 결국은 비뚤어진 선민사상. 당신들 같은 정의라느니, 우정이라느니, 그런 기만이 저는 무엇보다 싫습니다」"

[[dialogue]]
speaker = "ギエル"
original = "「元・<ruby>主<rt>あるじ</rt></ruby>にこれが不要というのなら……私が定めを受け継ぎ、真の終焉を拝ませていただくとしましょう！」"
translation = "「전 주인에게 이것이 불필요하다면…… 제가 숙명을 이어받아, 진정한 종언을 보여드리도록 하지요!」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
original = "「──ッ！」"
translation = "「──읏!」"

[[dialogue]]
speaker = "クロト"
original = "「やめろギエル──おまえまで取り込まれるぞ！」"
translation = "「그만둬 기엘── 너까지 집어삼켜질 거다!」"

[[dialogue]]
speaker = "unk"
original = "ギエルの拾い上げた最後の破片に、リクリエの瘴気が宿り始める。"
translation = "기엘이 주워 올린 마지막 파편에, 리크리에의 장기가 깃들기 시작한다."

[[dialogue]]
speaker = "unk"
original = "それに対抗するかのように『シエルの筐』がかつてないほど<ruby>赫灼<rt>かくしゃく</rt></ruby>した。"
translation = "그것에 대항하듯이 『시엘의 궤』가 전례 없을 정도로 <ruby>붉게 빛났다<rt>혁작</rt></ruby>."

[[dialogue]]
speaker = "リノ"
original = "「させないわ──ソレは必ずこの場で封印する。私の命に代えても──！」"
translation = "「안 돼── 그건 반드시 이 자리에서 봉인할 거야. 내 목숨과 바꿔서라도──!」"

[[dialogue]]
speaker = "ギエル"
original = "「天界の聖遺物……なるほど。魔女の動きは掴んでいましたが、そのアイテムは想定外だ」"
translation = "「천계의 성유물…… 과연. 마녀의 움직임은 파악하고 있었지만, 그 아이템은 상정 외로군요」"

[[dialogue]]
speaker = "ギエル"
original = "「ですが──無駄だ。世界を終わらせる厄災は、いかなる外殻にも縛られない！」"
translation = "「하지만── 소용없습니다. 세계를 끝낼 액재는, 어떠한 외피에도 묶이지 않아요!」"

[[dialogue]]
speaker = "クロト"
original = "「！？」"
translation = "「!?」"

[[dialogue]]
speaker = "unk"
original = "ギエルを覆っていた『影』が破片に共鳴した。"
translation = "기엘을 덮고 있던 『그림자』가 파편에 공명했다."

[[dialogue]]
speaker = "unk"
original = "すると、その現象へ呼応するかのように──『筐』内部に収めたはずの断片までもが暴走を始めた！"
translation = "그러자, 그 현상에 호응하듯이── 『궤』 내부에 수납했을 터인 단편마저 폭주하기 시작했다!"

[[dialogue]]
speaker = "ギエル"
original = "「さあ──『使徒』の仮面よ！\u3000新たな主導者の誕生を祝して集うがいい──！」"
translation = "「자── 『사도』의 가면이여! 새로운 주도자의 탄생을 축하하며 모여라──!」"

[[dialogue]]
speaker = "ユウリ"
original = "「なっ……待て！\u3000せっかく集めた破片が──！」"
translation = "「나…… 기다려! 모처럼 모은 파편이──!」"

[[dialogue]]
speaker = "リノ"
original = "「く──っ……！？\u3000ダメ、流出が抑えられない──！」"
translation = "「크──읏……!? 안 돼, 유출을 막을 수 없어──!」"

[[dialogue]]
speaker = "unk"
original = "ギエルの掲げる一欠片へ向けて集約されていく仮面の断片！"
translation = "기엘이 내건 한 조각을 향해 집약되어 가는 가면의 단편!"

[[dialogue]]
speaker = "unk"
original = "爆発的に膨れ上がる負のエネルギーが、ギエルの全身を包み込んで──"
translation = "폭발적으로 부풀어 오르는 부정적인 에너지가, 기엘의 전신을 감싸고──"

[[dialogue]]
speaker = "ギエル"
original = "「さあ──終曲の調べを奏でるとしましょうか！」"
translation = "「자── 종곡의 선율을 연주해 보도록 할까요!」"

