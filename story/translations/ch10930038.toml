[[dialogue]]
speaker = "unk"
original = "改めてチーパオフォームを見せて欲しいと頼んだところ、俺の家で披露してもらうことになった。"
translation = "다시 한번 치파오 폼을 보여달라고 부탁했더니, 우리 집에서 선보여 주기로 했다."

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「では行きますっ、変身！」"
translation = "「그럼 갑니다, 변신!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「と、こんな感じだね。どうかな？」"
translation = "「자, 이런 느낌이야. 어때?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「すごくいいよ。可愛くて凜々しい」"
translation = "「정말 좋아. 귀엽고 늠름해.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「そ、そうかなぁ？\u3000えへへ……確かにそうかも。退魔の道士がモチーフみたいだからね」"
translation = "「그, 그럴까? 에헤헤…… 확실히 그럴지도. 퇴마 도사가 모티브인 것 같으니까.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「そうだ、よければこれ、撮影してみない？\u3000陸上部でフォームを確認する時用のビデオカメラがあるんだけど」"
translation = "「맞다, 괜찮으면 이거 촬영해 보지 않을래? 육상부에서 폼 확인할 때 쓰는 비디오 카메라가 있는데.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いいね！\u3000何度もミルフィーにお願いするのも悪いし、録画しておけばいつでも見返せるよ」"
translation = "「좋네! 매번 밀피에게 부탁하는 것도 미안하고, 녹화해 두면 언제든 다시 볼 수 있겠어.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「見たい時は言ってくれたら、何回だって見せてあげるんだけどな……」"
translation = "「보고 싶을 땐 말해주면 몇 번이고 보여줄 텐데……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ま、いいか。自分でも見たいし、録画するのは大事だよ、きっと」"
translation = "「뭐, 상관없나. 나도 보고 싶고, 녹화하는 건 중요하니까, 분명.」"

[[dialogue]]
speaker = "unk"
original = "こうして、ミルフィーのチーパオフォームを録画することになったんだけど……。"
translation = "이렇게 밀피의 치파오 폼을 녹화하게 되었는데……."

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「……あのー、会長くん？\u3000私の気のせいじゃないと思うんだけど……」"
translation = "「……저기, 회장군? 내 기분 탓이 아니라고 생각하는데……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「おち○ちんのところ、すごいことになってない？」"
translation = "「자지 있는 쪽, 엄청나게 되어 있지 않아?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ごめん、ミルフィーのふとももがチラチラ見えてエッチだから……」"
translation = "「미안, 밀피의 허벅지가 살짝살짝 보여서 야하니까……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「もう、そういうつもりで見せたわけじゃないんだけど」"
translation = "「정말, 그런 의도로 보여준 건 아닌데.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「……まだ時間あるよね？\u3000ちょっとだけ、しちゃおうか<emoji=heart04>」"
translation = "「……아직 시간 있지? 조금만 해버릴까<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ちょっとだけしちゃおうかって言ったのは私だけど……んっ……カメラ、そこに置いたままするんだ？」"
translation = "「조금만 해버릴까라고 말한 건 나지만…… 응…… 카메라, 거기 둔 채로 하는 거야?」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「電源オンになったままだよね？\u3000しかも、レンズがこっち向いてるし」"
translation = "「전원 켜진 채지? 게다가 렌즈가 이쪽을 향하고 있고.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「これって……はめ録り、だよね……エッチしてるとこ撮るの？」"
translation = "「이거…… 하메도리(섹스 촬영)지…… 섹스하는 거 찍는 거야?」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「別に嫌とは言ってないけど……それにエッチを撮るのは何度もしてるしね」"
translation = "「딱히 싫다고는 안 했지만…… 게다가 섹스 찍는 건 여러 번 했으니까.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「びゅ～～って……おま○こに中出しされてるところも、たくさん撮られちゃったね……」"
translation = "「뷰우우 하고…… 보지에 질내사정 당하는 모습도 잔뜩 찍혀버렸네……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「後で見て、エッチじゃなかった？」"
translation = "「나중에 보니까 야하지 않았어?」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「うん……すごくエッチだった<emoji=heart04>」"
translation = "「응…… 정말 야했어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ふあっ<emoji=heart04>\u3000会長くんのおち○ちんすごいことになってるよ？\u3000私のおま○この感触思い出して勃起しちゃったんだよね？」"
translation = "「후앗<emoji=heart04> 회장군 자지 엄청나게 됐어? 내 보지의 감촉을 떠올리고 발기해 버린 거지?」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ふふふっ、すーりすーりすーり……んぁ……割れ目でこすっちゃうよ……」"
translation = "「후후훗, 비비적 비비적…… 응아…… 갈라진 틈으로 비벼줄게……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「くちゅくちゅ言ってるね……んんっ、あっ……私のエッチなお汁、会長くんのにくっつけちゃうんだから」"
translation = "「쿠츄쿠츄 소리 나네…… 응읏, 앗…… 내 야한 즙, 회장군 거에 묻혀버릴 거니까.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「……マーキング<emoji=heart04>\u3000このかっこいいおち○ちんは私のものです～って」"
translation = "「……마킹<emoji=heart04> 이 멋진 자지는 제 것입니다~ 하고.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「はぁっ……はぁっ……んくっ……おち○ちんカチカチ……すぐ入れられそうだね……そろそろ入れちゃう？」"
translation = "「하아…… 하아…… 응윽…… 자지 딱딱해…… 금방 넣을 수 있겠네…… 슬슬 넣을까?」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「いいよ、入れても……今日は大丈夫な日だから……んんっ……ごむ、つけなくても……いいよ<emoji=heart04>」"
translation = "「괜찮아, 넣어도…… 오늘은 안전한 날이니까…… 응읏…… 고무, 안 끼워도…… 돼<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「やぁんッ<emoji=heart04>\u3000あっ、ごむなしだってわかった途端、おち○ちんビクンってさせてぇ……もぉ、会長くんのエッチ<emoji=heart04>」"
translation = "「야앙!<emoji=heart04> 앗, 노콘이라고 알자마자 자지 움찔거리기는…… 정말, 회장군 변태<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ミルフィーだって生でする方が好きなくせに」"
translation = "「밀피도 생으로 하는 걸 더 좋아하면서.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「だってぇ……んふっ……生で直接おち○ちん挿れる方が……気持ちいいんだもん<emoji=heart04>」"
translation = "「그치만…… 응훗…… 생으로 직접 자지 삽입하는 게…… 더 기분 좋은걸<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「エッチなザーメンびゅ～って出してもらうのも……好きだし<emoji=heart04>」"
translation = "「야한 정액 뷰우우 하고 내보내 주는 것도…… 좋고<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「もぉ、会長くんと何度もエッチしたせいで、すっかり中出しが好きになっちゃった。ごむエッチだと、なんだか物足りなく感じちゃう<emoji=heart04>」"
translation = "「정말, 회장군이랑 몇 번이나 섹스한 탓에 완전히 질내사정이 좋아져 버렸어. 고무 섹스면 왠지 아쉽게 느껴져 버려<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「だから今日は生で出来てよかったね、お互いに<emoji=heart04>」"
translation = "「그러니까 오늘은 생으로 할 수 있어서 다행이네, 서로<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「生ハメだけじゃなくて、生中出しするところまで撮影できちゃうな」"
translation = "「생하메뿐만 아니라 생질내사정 하는 모습까지 촬영할 수 있겠네.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「うん<emoji=heart04>\u3000私のおま○こでいっぱい気持ちよくなって……んんっ……隙間から溢れるくらいたくさん出してね<emoji=heart04>」"
translation = "「응<emoji=heart04> 내 보지로 잔뜩 기분 좋아져서…… 응읏…… 틈새로 넘칠 정도로 잔뜩 내보내 줘<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「会長くんがしたいだけしていいから<emoji=heart04>\u3000ちなみに私は……最低３回はしたいかも<emoji=heart04>」"
translation = "「회장군이 하고 싶은 만큼 해도 되니까<emoji=heart04> 참고로 나는…… 최소한 3번은 하고 싶을지도<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そんなこと言って、ミルフィーが言った回数で満足したことないだろ」"
translation = "「말은 그렇게 해도 밀피가 말한 횟수로 만족한 적 없잖아.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「そ、そうだっけ？\u3000でも、会長くんのおち○ちんだってずっと元気だし……私のおま○こに入りたそうにしてくれるから……もっとしてもいいよねって」"
translation = "「그, 그랬던가? 하지만 회장군 자지도 계속 쌩쌩하고…… 내 보지에 들어가고 싶어 하니까…… 더 해도 괜찮겠지 싶어서.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「もぉ、前は少しエッチなだけだったのに……会長くんとつきあい始めてから、すっかりスケベな子になっちゃった<emoji=heart04>」"
translation = "「정말, 전에는 조금 야할 뿐이었는데…… 회장군이랑 사귀기 시작하고 나서 완전히 밝히는 아이가 되어버렸어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「はめ録りなんて絶対ありえないって思ってたのに……んっ……おち○ちんズボズボしてるとこだけじゃなく、おしりの穴まで撮られちゃって……何度も何度も……」"
translation = "「하메도리 같은 건 절대 있을 수 없다고 생각했는데…… 응…… 자지 즈보즈보 하는 곳뿐만 아니라 똥구멍까지 찍혀버리고…… 몇 번이고 몇 번이고……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「こんなのもし誰かに見られたら、私もうおしまいだよぉ……」"
translation = "「이런 거 혹시 누구한테 들키면 나 이제 끝이야아……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「絶対誰にも見せないでね。あくまで自分たちの鑑賞用なんだから<emoji=heart04>」"
translation = "「절대 아무한테도 보여주지 마. 어디까지나 우리끼리 감상용이니까<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「私も……会長くんが忙しくてエッチ出来ない日とか、はめ録りエッチの動画見たりするし」"
translation = "「나도…… 회장군이 바빠서 섹스 못 하는 날이라든가, 하메도리 섹스 영상 보기도 하고.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「思い出しながらオナニーして気持ちよくなっちゃうんだよ<emoji=heart04>」"
translation = "「떠올리면서 자위해서 기분 좋아져 버린다구<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「会長くんも……シコシコするなら私たちのはめ録りをおかずにしてね<emoji=heart04>」"
translation = "「회장군도…… 딸칠 거면 우리 하메도리를 반찬 삼아 줘<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ということで、ものすごく興奮するおかずにするために……今日はいつも以上にエッチなはめ録りしよ<emoji=heart04>」"
translation = "「그런 의미에서 엄청나게 흥분되는 반찬으로 만들기 위해…… 오늘은 평소보다 더 야하게 하메도리 하자<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「えへへ……もうすっかりおま○こ興奮しちゃった<emoji=heart04>\u3000会長くんのおち○ちんでほじって欲しくてむらむらしてるみたい<emoji=heart04>」"
translation = "「에헤헤…… 벌써 보지가 완전히 흥분해 버렸어<emoji=heart04> 회장군 자지로 쑤셔줬으면 해서 안달 난 것 같아<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「もう我慢できなくなっちゃった<emoji=heart04>\u3000お願い、早く挿れて……<emoji=heart04>」"
translation = "「이제 못 참겠어<emoji=heart04> 부탁이야, 빨리 넣어줘……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ふあぁぁっ！！\u3000はぁん！\u3000あっ……<emoji=heart04>\u3000入った……会長くんのおち○ちん……入れられちゃったぁ<emoji=heart04>」"
translation = "「후아아앗!! 하앙! 앗……<emoji=heart04> 들어왔어…… 회장군 자지…… 넣어졌어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「さきっぽの膨らんだところが……むりむりむりぃ～～って割れ目に押し込まれる一部始終を……カメラで撮られちゃった<emoji=heart04>」"
translation = "「끝부분의 부푼 곳이…… 무리무리무리이~~ 하고 갈라진 틈으로 밀려 들어오는 시종일관을…… 카메라로 찍혀버렸어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「はぁっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000んはぁっ<emoji=heart04>\u3000やっぱりごむなしち○ちん気持ちいいよぉ<emoji=heart04>\u3000生だと全然違うしっ……」"
translation = "「하앗<emoji=heart04> 하앗<emoji=heart04> 응하앗<emoji=heart04> 역시 노콘 자지 기분 좋아아<emoji=heart04> 생은 완전히 다르고……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「それにっ……今日はいつもより太い気がするよぉ<emoji=heart04>\u3000なんで？\u3000どうしてなの？\u3000私の気のせいかなぁ？」"
translation = "「게다가…… 오늘은 평소보다 굵은 것 같아아<emoji=heart04> 왜? 어째서야? 내 기분 탓인가?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っっ……ミルフィーのチーパオフォームがやらしいから……」"
translation = "「윽…… 밀피의 치파오 폼이 야하니까……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「そうだよね<emoji=heart04>\u3000新しい戦闘服でする最初のエッチは興奮するから<emoji=heart04>\u3000チアの時もすごかったもん、私覚えてるよ」"
translation = "「그렇지<emoji=heart04> 새로운 전투복 입고 하는 첫 섹스는 흥분되니까<emoji=heart04> 치어리더 때도 대단했었지, 나 기억하고 있어.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「がんばれ、がんばれーって……パンパンしてあげたら……んうっ<emoji=heart04>\u3000太くて<emoji=heart04>\u3000硬くて<emoji=heart04>\u3000すごく気持ちよかったよね<emoji=heart04>」"
translation = "「힘내라, 힘내라ㅡ 하고…… 팡팡 해줬더니…… 응웃<emoji=heart04> 굵고<emoji=heart04> 딱딱해서<emoji=heart04> 정말 기분 좋았었지<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「今日はどうする？\u3000チアの時みたいに、私が腰振りして、たくさんパンパンする？\u3000それとも……」"
translation = "「오늘은 어떻게 할까? 치어리더 때처럼 내가 허리 흔들어서 잔뜩 팡팡 할까? 아니면……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「すっかり発情してる私のおま○こ<emoji=heart04>\u3000会長くんのかっこいいおち○ちんで躾けてみちゃう？」"
translation = "「완전히 발정해 있는 내 보지<emoji=heart04> 회장군의 멋진 자지로 길들여 볼래?」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「どっちでも……すごく気持ちよくなれると思うよ<emoji=heart04>」"
translation = "「어느 쪽이든…… 정말 기분 좋아질 수 있을 거야<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ねえ、早く決めて<emoji=heart04>\u3000会長くんがズボズボしてくれないと……こっちが動いておち○ちん気持ちよくしちゃうんだから<emoji=heart04>」"
translation = "「저기, 빨리 결정해 줘<emoji=heart04> 회장군이 즈보즈보 안 해주면…… 이쪽이 움직여서 자지 기분 좋게 해버릴 거니까<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「んあぁぁっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000すごいぃっっ<emoji=heart04>\u3000うあっ<emoji=heart04>\u3000下からズンズンって……すごいよぉ<emoji=heart04>」"
translation = "「응아아앗<emoji=heart04> 하앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 대단해에읏<emoji=heart04> 우앗<emoji=heart04> 밑에서 즈응즈응 하고…… 굉장해에<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「やぁっ<emoji=heart04>\u3000だめっ<emoji=heart04>\u3000奥まで全部入れちゃ……んぅ～～～っ<emoji=heart04>\u3000ふあっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000奥だめっ<emoji=heart04>\u3000そこっ<emoji=heart04>\u3000気持ちいいからっ<emoji=heart04>」"
translation = "「야앗<emoji=heart04> 안 돼<emoji=heart04> 안쪽까지 전부 넣으면…… 응으으으읏<emoji=heart04> 후앗<emoji=heart04> 앗<emoji=heart04> 아앙앗<emoji=heart04> 안쪽은 안 돼<emoji=heart04> 거기<emoji=heart04> 기분 좋으니까앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「はぁっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000スピードは速くないから……余計に生のおち○ちんを感じちゃう<emoji=heart04>」"
translation = "「하앗<emoji=heart04> 하앗<emoji=heart04> 스피드는 빠르지 않으니까…… 오히려 생자지가 더 잘 느껴져어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ゆっくりと……出たり……入ったりしてぇ……ううっ、丸見え<emoji=heart04>\u3000全部撮られちゃってるのに……<emoji=heart04>」"
translation = "「천천히…… 나갔다…… 들어왔다 해서…… 으으, 다 보여<emoji=heart04> 전부 찍히고 있는데……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「せっかくのハメ録りなんだから、エッチなミルフィーを余すことなく撮らないとな」"
translation = "「모처럼의 하메도리니까, 야한 밀피를 남김없이 찍어야지.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「もぉ<emoji=heart04>\u3000それは合ってるんだけど……恥ずかしいよぉ<emoji=heart04>」"
translation = "「정말<emoji=heart04> 그 말은 맞는데…… 부끄러워어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「やっ<emoji=heart04>\u3000やだぁ<emoji=heart04>\u3000会長くん、斜めに出し入れするのだめぇ<emoji=heart04>\u3000おま○こにまっすぐ入れてくれないと……」"
translation = "「앗<emoji=heart04> 싫어어<emoji=heart04> 회장군, 비스듬히 넣었다 뺐다 하는 거 안 돼애<emoji=heart04> 보지에 똑바로 넣어줘야지……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ううっ、わかってるくせにぃ<emoji=heart04>\u3000ぶぽっぶぽってエッチな音……出ちゃうの<emoji=heart04>\u3000これ、音も撮ってるんだよね？」"
translation = "「으으, 알고 있으면서어<emoji=heart04> 부폿부폿 하고 야한 소리…… 나버려어<emoji=heart04> 이거 소리도 찍고 있는 거지?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「もちろんだ。しっかりおま○この音鳴らして、後で一緒に確認しような」"
translation = "「물론이지. 제대로 보지 소리 울리게 해서 나중에 같이 확인하자.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ううっ、一緒にはめ録りしたの見るのぉ？\u3000そんなの恥ずかしすぎるよぉ<emoji=heart04>」"
translation = "「으으, 같이 하메도리 한 거 보는 거야아? 그런 거 너무 부끄러워어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「だけど……それ見たらいつもより興奮してすごいエッチができちゃうかも<emoji=heart04>」"
translation = "「하지만…… 그거 보면 평소보다 흥분해서 대단한 섹스를 할 수 있을지도 몰라<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「って……んぁっ<emoji=heart04>\u3000あっ、今硬くなったぁ<emoji=heart04>\u3000もう、エッチなおち○ちんなんだからぁ<emoji=heart04>」"
translation = "「그보다…… 응앗<emoji=heart04> 앗, 지금 딱딱해졌어어<emoji=heart04> 정말, 야한 자지라니까아<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「でもっ……私のおま○こだってエッチだもん<emoji=heart04>\u3000会長くんのと同じくらい、気持ちいいこと大好きで……んんっ、いっぱいズポズポして欲しい<emoji=heart04>」"
translation = "「그치만…… 내 보지도 야한걸<emoji=heart04> 회장군 거만큼이나 기분 좋은 거 너무 좋아해서…… 응읏, 잔뜩 즈포즈포 해줬으면 좋겠어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「恥ずかしいけど音が出ちゃうのは仕方ないし<emoji=heart04>\u3000会長くんが興奮してくれるなら……いいよ<emoji=heart04>\u3000いっぱいおま○こほじってね<emoji=heart04>」"
translation = "「부끄럽지만 소리가 나는 건 어쩔 수 없고<emoji=heart04> 회장군이 흥분해 준다면…… 좋아<emoji=heart04> 잔뜩 보지 쑤셔줘<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ふあぁぁっ<emoji=heart04>\u3000あぁっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000すごいっ<emoji=heart04>\u3000さっきまでと全然違うぅ<emoji=heart04>\u3000激しくズンズンって<emoji=heart04>\u3000んあぁぁ～～～っ<emoji=heart04>」"
translation = "「후아아앗<emoji=heart04> 아앗<emoji=heart04> 하앙앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 굉장해<emoji=heart04> 아까랑은 완전히 달라아<emoji=heart04> 격렬하게 즈응즈응 하고<emoji=heart04> 응아아아~~앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「やぁっ<emoji=heart04>\u3000は、激しすぎるよぉ<emoji=heart04>\u3000気持ちいいけどっ、そんなに揺らされるとっ、私っ<emoji=heart04>」"
translation = "「야앗<emoji=heart04> 너, 너무 격렬해에<emoji=heart04> 기분 좋지만, 그렇게 흔들리면, 나앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「おっぱいばるんばるんってなっちゃうからぁ<emoji=heart04>」"
translation = "「가슴이 출렁출렁하게 되어버리니까아<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「待って待ってっ<emoji=heart04>\u3000もぉもぉもぉ<emoji=heart04>\u3000わざとおっぱいが揺れるように腰振ってぇっ<emoji=heart04>」"
translation = "「잠깐 잠깐앗<emoji=heart04> 정말정말정말<emoji=heart04> 일부러 가슴이 흔들리게 허리를 흔들고오<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「そんなことばっかしてるとっ、だるんだるんの長いおっぱいになっちゃうんだからねっ<emoji=heart04>」"
translation = "「자꾸 그런 짓만 하면, 축 처진 긴 가슴이 되어버릴 거니까 말이야앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ミルフィーの長乳なんて最高にドスケベだろ。もう既に長乳化しかかってると思うぞ」"
translation = "「밀피의 긴 젖이라니 최고로 도스케베하잖아. 이미 벌써 긴 젖이 되어가고 있다고 생각한다고.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「そそそ、そんなぁっ<emoji=heart04>\u3000まだまだぷりんぷりんのお乳でいたいのにぃ～～～っ<emoji=heart04>」"
translation = "「그그그, 그럴 수가앗<emoji=heart04> 아직은 탱글탱글한 젖으로 남고 싶은데에~~~엣<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「でも、エッチのたびに念入りに揉みほぐされてたから……やらしいおっぱいにされちゃったなぁって最近思ってたけど……」"
translation = "「하지만 섹스할 때마다 정성껏 주물러졌으니까…… 야한 가슴이 되어버렸네 하고 최근에 생각했었지만……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「長いお乳に……されてたんだね、会長くんの手で……<emoji=heart04>」"
translation = "「긴 젖으로…… 만들어지고 있었구나, 회장군의 손에……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「だ、大丈夫、私だってまだまだピチピチだもん、おち○ちんハメハメされながらおっぱい揺らされても、頑張って維持するんだからぁ<emoji=heart04>」"
translation = "「괘, 괜찮아, 나도 아직은 싱싱한걸, 자지 하메하메 당하면서 가슴이 흔들려도 열심히 유지할 거니까아<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「会長くん好みの長乳になるにはまだ早いんだから！\u3000もっとたくさん……数え切れないほどエッチして……そうしたらとろとろおっぱいになっちゃうのかも<emoji=heart04>」"
translation = "「회장군 취향인 긴 젖이 되기엔 아직 이르다구! 더 많이…… 셀 수 없을 정도로 섹스하고…… 그러다 보면 흐물흐물한 가슴이 되어버릴지도 모르지만<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「とにかくっ、まだまだ足りないんだからっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000んあっ<emoji=heart04>\u3000おっぱいだけじゃなく……こっちも……おま○この方も、可愛がってよぉ<emoji=heart04>」"
translation = "「어쨌든, 아직 부족하니까앗<emoji=heart04> 응읏<emoji=heart04> 응앗<emoji=heart04> 가슴뿐만 아니라…… 이쪽도…… 보지 쪽도 예뻐해 줘어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「かっこいいおち○ちんで……会長くん好みのおま○こに育ててよ<emoji=heart04>\u3000最高に気持ちいいエッチができるように……一緒にがんばろ？\u3000ねっ？」"
translation = "「멋진 자지로…… 회장군 취향인 보지로 키워줘어<emoji=heart04> 최고로 기분 좋은 섹스를 할 수 있도록…… 같이 힘내자? 응?」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「んんぅっ<emoji=heart04>\u3000んぁっ<emoji=heart04>\u3000いいよ、好きなだけ揺らしても<emoji=heart04>\u3000会長くんの好きにしていいからっ<emoji=heart04>\u3000いっぱいいっぱい気持ちよくしてぇっ<emoji=heart04>」"
translation = "「응응읏<emoji=heart04> 응앗<emoji=heart04> 좋아, 마음껏 흔들어도<emoji=heart04> 회장군 마음대로 해도 되니까앗<emoji=heart04> 잔뜩잔뜩 기분 좋게 해줘어엇<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ああぁっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000んあぁぁぁっ<emoji=heart04>\u3000入ってるとこっ、音すごいっ<emoji=heart04>\u3000おっぱいもばるんばるんって揺れてっ<emoji=heart04>」"
translation = "「아아앗<emoji=heart04> 하앗<emoji=heart04> 하앗<emoji=heart04> 응아아아앗<emoji=heart04> 들어와 있는 곳, 소리 굉장해에<emoji=heart04> 가슴도 출렁출렁 흔들리고오<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「こんなの恥ずかしいのにっ<emoji=heart04>\u3000んもうっ<emoji=heart04>\u3000どうしてこんなに気持ちよくなっちゃうのっっ<emoji=heart04>」"
translation = "「이런 거 부끄러운데엣<emoji=heart04> 정말이지<emoji=heart04> 어째서 이렇게 기분 좋아져 버리는 거야아<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「はぁんっ<emoji=heart04>\u3000あぁっ<emoji=heart04>\u3000ひうっ<emoji=heart04>\u3000そ、そこっ<emoji=heart04>\u3000そこいい<emoji=heart04>\u3000そこっ、もっと突いて<emoji=heart04>\u3000奥のとこ、いっぱいいっぱいいじめてぇっっ<emoji=heart04>」"
translation = "「하앙<emoji=heart04> 아앗<emoji=heart04> 히윽<emoji=heart04> 거, 거기<emoji=heart04> 거기 좋아<emoji=heart04> 거기, 좀 더 찔러줘<emoji=heart04> 안쪽 깊은 곳, 잔뜩잔뜩 괴롭혀줘어어엇<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「やぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000こんなのだめっ<emoji=heart04>\u3000気持ちよすぎておかしくなっちゃう<emoji=heart04>」"
translation = "「야앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 이런 거 안 돼<emoji=heart04> 너무 기분 좋아서 이상해져 버려<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「やっ<emoji=heart04>\u3000はっ<emoji=heart04>\u3000はっ<emoji=heart04>\u3000ふああぁぁ～～～っ<emoji=heart04>\u3000もうだめっっ<emoji=heart04>\u3000イく<emoji=heart04>\u3000イっちゃいそうなのっ<emoji=heart04>\u3000さっき始めたばかりなのにっ<emoji=heart04>」"
translation = "「얏<emoji=heart04> 핫<emoji=heart04> 핫<emoji=heart04> 후아아아아~~~앗<emoji=heart04> 이제 안 돼에<emoji=heart04> 가버려<emoji=heart04> 가버릴 것 같아아<emoji=heart04> 방금 시작했을 뿐인데엣<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ご、ごめんっ<emoji=heart04>\u3000ごめんなさいっ、会長くんっ<emoji=heart04>\u3000私っ、おち○ちんに弱いからっ<emoji=heart04>\u3000ざこおま○こだからっ<emoji=heart04>\u3000もう無理っ<emoji=heart04>\u3000先にイっちゃう<emoji=heart04>」"
translation = "「미, 미안해<emoji=heart04> 미안해요, 회장군<emoji=heart04> 나, 자지에 약하니까아<emoji=heart04> 허접 보지니까앗<emoji=heart04> 이제 무리야<emoji=heart04> 먼저 가버릴게」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「あぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000会長くんのおち○ちんっ、まだせーしびゅ～～ってしないのにっ、私ばっかり気持ちよくなっちゃってっっ<emoji=heart04>」"
translation = "「아앗<emoji=heart04> 앙<emoji=heart04> 앙<emoji=heart04> 회장군의 자지, 아직 정액 뷰우우~ 하고 안 나오는데, 나만 기분 좋아져 버려서어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ごめんねっ、先イくからっ<emoji=heart04>\u3000会長くんも追いかけてっ<emoji=heart04>\u3000きてっ<emoji=heart04>\u3000すき<emoji=heart04>\u3000んあぁぁあっっ、すきすきすきっっ<emoji=heart04>\u3000会長くんっっ<emoji=heart04>」"
translation = "「미안해, 먼저 가니까아<emoji=heart04> 회장군도 따라와줘<emoji=heart04> 와줘<emoji=heart04> 좋아해<emoji=heart04> 응아아아앗, 좋아해 좋아해 좋아해애<emoji=heart04> 회장군으으으윽<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「イく<emoji=heart04>\u3000イきそうっ<emoji=heart04>\u3000もうイっっくっ……<emoji=heart04>\u3000やぁあぁぁぁっ<emoji=heart04>\u3000イくイくイくぅ～～～～っ<emoji=heart04>」"
translation = "「가버려<emoji=heart04> 가버릴 것 같아<emoji=heart04> 이제 가버어어엇……<emoji=heart04> 야아아아아앗<emoji=heart04> 가버려 가버려 가버려어어어~~~~앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「イぐぅぅぅぅ～～～～～～～～っっっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000んぐっ<emoji=heart04>\u3000ふっ<emoji=heart04>\u3000ふあぁぁぁ～～～～っ<emoji=heart04>」"
translation = "「가버어어어어어~~~~~~~~~~~~~~~~어엇<emoji=heart04><emoji=heart04><emoji=heart04> 응긋<emoji=heart04> 훗<emoji=heart04> 후아아아아~~~~앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「はぁぁっ<emoji=heart04>\u3000はぁ<emoji=heart04>\u3000はぁ<emoji=heart04>\u3000はぁっ……<emoji=heart04>」"
translation = "「하아아앗<emoji=heart04> 하아<emoji=heart04> 하아<emoji=heart04> 하아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「すごい……イっちゃったぁ<emoji=heart04>\u3000うぐっ……会長くんも……追いかけてくれたんだね……ありがとぉ……<emoji=heart04>」"
translation = "「대단해…… 가버렸어어<emoji=heart04> 우긋…… 회장군도…… 따라와 줬구나…… 고마워어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「んうっ<emoji=heart04>\u3000ふぁ<emoji=heart04>\u3000私の一番奥……おち○ちんねじ込んで……すごくドピュドピュしてるね……<emoji=heart04>\u3000んふふ……中出しせーし<emoji=heart04>」"
translation = "「응웃<emoji=heart04> 후아<emoji=heart04> 내 제일 안쪽…… 자지 비틀어 넣어서…… 엄청 도퓨도퓨 나오고 있네……<emoji=heart04> 응후후…… 질내사정 정액<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「生エッチだけじゃなく……生中出しも……しちゃったぁ<emoji=heart04>\u3000これ以上気持ちいいことないよね……」"
translation = "「생섹스뿐만 아니라…… 생질내사정도…… 해버렸네<emoji=heart04> 이 이상 기분 좋은 건 없겠지……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ふふっ、まだびゅるびゅる出てる……最初の１発目はいつも勢いすごいよね<emoji=heart04>\u3000せーしの量も……多いし<emoji=heart04>\u3000すごく濃いの<emoji=heart04>」"
translation = "「후후, 아직 뷰르뷰르 나오고 있어…… 첫 번째 발은 언제나 기세가 대단하네<emoji=heart04> 정액 양도…… 많고<emoji=heart04> 엄청 진해<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「私のこと……絶対妊娠させるぞ～って……頑張ってるみたい<emoji=heart04>\u3000ごめんね、今日は赤ちゃん出来ない日で」"
translation = "「나를…… 반드시 임신시키겠다아~ 라면서…… 노력하고 있는 것 같아<emoji=heart04> 미안해, 오늘은 아기 안 생기는 날이라서」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「出来る日は……ちゃんとごむつけてるし……ほんとは受精してあげたいのになぁ<emoji=heart04>」"
translation = "「생기는 날에는…… 제대로 고무 끼고 있고…… 사실은 수정해주고 싶은데 말이야아<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「んんっ<emoji=heart04>\u3000はぁぁっ……ようやく射精が終わったの？\u3000たくさん私の子宮に注いで気持ちよかった？」"
translation = "「응읏<emoji=heart04> 하아아앗…… 드디어 사정이 끝난 거야? 잔뜩 내 자궁에 쏟아부어서 기분 좋았어?」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「私は……気持ちよかったよ<emoji=heart04>\u3000いっぱい出してくれてありがとね<emoji=heart04>」"
translation = "「나는…… 기분 좋았어<emoji=heart04> 잔뜩 내줘서 고마워<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「あんっ<emoji=heart04>\u3000抜けちゃうっっ<emoji=heart04>\u3000もぉぉ……まだおち○ちんパンパンなのにもう抜いちゃうの？」"
translation = "「앙<emoji=heart04> 빠져버려어엇<emoji=heart04> 정말이지…… 아직 자지 팽팽한데 벌써 빼버리는 거야?」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「まだまだできるよね？\u3000タマタマもずっしりしてるし……もっとせーし出したいんだよね<emoji=heart04>」"
translation = "「아직 더 할 수 있지? 불알도 묵직하고…… 정액 더 내고 싶은 거지이<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「私ももっと……おなかにせーし入れて欲しいな<emoji=heart04>\u3000せっかくのごむなしエッチなんだし<emoji=heart04>」"
translation = "「나도 좀 더…… 배 안에 정액 넣어줬으면 좋겠어어<emoji=heart04> 어렵게 얻은 노콘 섹스니까아<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「こんなおねだりするなんて、我ながらエッチになったなぁって思うけど……でも、大好きな人とすることだから、気持ちいいし、気持ちよくなって欲しいし」"
translation = "「이런 조르기를 하다니, 나도 참 야해졌구나 싶지만…… 그래도, 제일 좋아하는 사람이랑 하는 거니까, 기분 좋고, 기분 좋아졌으면 좋겠어서」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「会長くんもそう思わない？」"
translation = "「회장군도 그렇게 생각 안 해?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「思うよ。ミルフィーにも気持ちよくなって欲しい」"
translation = "「생각해. 밀피도 기분 좋아졌으면 좋겠어.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「えへへぇ<emoji=heart04>\u3000言わせちゃったみたいだけど、でも嬉しいよ<emoji=heart04>\u3000大好き<emoji=heart04>」"
translation = "「에헤헤에<emoji=heart04> 말하게 해버린 것 같지만, 그래도 기뻐어<emoji=heart04> 정말 좋아해<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「もぉ、後ろ向きでおち○ちん挿れると、いいとこに当たるから気持ちいいけど……やっぱり顔を見ながらするエッチがいいな<emoji=heart04>」"
translation = "「정말, 뒤로 자지 삽입하면, 좋은 곳에 닿아서 기분 좋지만…… 역시 얼굴을 보면서 하는 섹스가 좋아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「次は向かい合ってしよ？\u3000ぎゅうぎゅうに抱き合いながらエッチしたい<emoji=heart04>」"
translation = "「다음은 마주 보고 하자? 꽉 껴안으면서 섹스하고 싶어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「だからもう１回<emoji=heart04>\u3000ねっ<emoji=heart04>」"
translation = "「그러니까 한 번 더<emoji=heart04> 응?<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "こうして俺とミルフィーは、体位を変えてもっと愛し合い続けるのだった。"
translation = "이렇게 나와 밀피는, 체위를 바꿔가며 더욱 계속해서 서로를 사랑했다."

