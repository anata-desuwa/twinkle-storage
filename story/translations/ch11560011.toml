[[dialogue]]
speaker = "unk"
original = "第１話,異世界での華やかな生活,P"
translation = "제1화, 이세계에서의 화려한 생활"

[[dialogue]]
speaker = "unk"
original = "陽彩との戦いに決着がつき──"
translation = "히요리와의 싸움에 결착이 나고──"

[[dialogue]]
speaker = "unk"
original = "『悪魔のロストアイテム』を寄生型生物から引きはがすため、オムニスと陽彩は元の世界へ転移していった。"
translation = "『악마의 로스트 아이템』을 기생형 생물로부터 떼어내기 위해 옴니스와 히요리는 원래 세계로 전이해 갔다."

[[dialogue]]
speaker = "いろは"
original = "「よーし、そうと決まったらカラオケに行こっ♪」"
translation = "「조아ー써, 그렇게 정해졌으면 노래방에 가자♪」"

[[dialogue]]
speaker = "花織"
original = "「あのさ、カラオケに行っても知らない曲ばっかりじゃない？\u3000一応ここ、異世界だからね？」"
translation = "「저기 말이야, 노래방에 가도 모르는 노래뿐이지 않아? 일단 여기, 이세계니까 말이야?」"

[[dialogue]]
speaker = "いろは"
original = "「わかってるよ～。でも、こっちの世界の歌、どんなのがあるか気になるじゃん！」"
translation = "「알고 있어~. 하지만 이쪽 세계 노래, 어떤 게 있는지 궁금하잖아!」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「いいですね～。僭越ながらこちらの世界の魔法少女アニメの主題歌を披露しますよ☆」"
translation = "「좋네요~. 외람되오나 이쪽 세계의 마법소녀 애니메이션 주제가를 선보일게요☆」"

[[dialogue]]
speaker = "いろは"
original = "「本当！？\u3000うっわ、テンション上がる～っ！」"
translation = "「정말!? 우와, 텐션 올라가네~!」"

[[dialogue]]
speaker = "unk"
original = "──いろははもうこの世界を満喫するモードに入っていた。"
translation = "──이로하는 벌써 이 세계를 만끽하는 모드에 들어와 있었다."

[[dialogue]]
speaker = "unk"
original = "だが花織は内心、穏やかでいられなかった。"
translation = "하지만 카오리는 내심 평온할 수 없었다."

[[dialogue]]
speaker = "花織"
original = "（いろはってば本当にすごいよ……こういう状況でも全然平気って感じで）"
translation = "(이로하 녀석 정말 대단해…… 이런 상황에서도 전혀 아무렇지 않다는 듯이)"

[[dialogue]]
speaker = "花織"
original = "（オムちゃんだけ元の世界に戻ったって、それ、ウチらだけこの世界に取り残されたってことじゃん）"
translation = "(옴짱만 원래 세계로 돌아갔다는 건, 그건 우리만 이 세계에 남겨졌다는 거잖아)"

[[dialogue]]
speaker = "花織"
original = "（トレジアンナさんは大丈夫って顔してるけど、陽彩ちゃんに取りついた寄生型悪魔を無事に切り離せるって保証もないし）"
translation = "(트레지아나 씨는 괜찮다는 표정이지만, 히요리짱에게 들러붙은 기생형 악마를 무사히 떼어낼 수 있다는 보장도 없고)"

[[dialogue]]
speaker = "花織"
original = "（それにちゃんと元の世界に戻れてるのかも、もう一度ウチらのところに戻って来れるのかも……）"
translation = "(게다가 제대로 원래 세계로 돌아갔는지도, 다시 우리 있는 곳으로 돌아올 수 있을지도……)"

[[dialogue]]
speaker = "花織"
original = "（なのに、なんでいろはは、あんな能天気でいられんのさ）"
translation = "(그런데 왜 이로하는 저렇게 태평할 수 있는 거야)"

[[dialogue]]
speaker = "サチ"
original = "「あの……」"
translation = "「저기……」"

[[dialogue]]
speaker = "花織"
original = "「はいっ！」"
translation = "「네!」"

[[dialogue]]
speaker = "サチ"
original = "「いろいろ不安かと思いますが、こちらにいらっしゃる間、みなさんのことは私たちが全力でサポートします！」"
translation = "「여러 가지로 불안하시겠지만, 여기 계시는 동안 여러분은 저희가 전력으로 서포트하겠습니다!」"

[[dialogue]]
speaker = "サチ"
original = "「トレジアンナさんはああいう感じのヒトですが、裏では色々考えて行動する人なので……きっとオムニスさんも大丈夫ですよ」"
translation = "「트레지아나 씨는 저런 느낌의 분이지만, 뒤에서는 여러 가지 생각하고 행동하는 분이라…… 분명 옴니스 씨도 괜찮을 거예요」"

[[dialogue]]
speaker = "花織"
original = "「うん……ありがとう。わからないことだらけで迷惑をかけるかもだけど……よろしくね」"
translation = "「응…… 고마워. 모르는 것투성이라 폐를 끼칠지도 모르겠지만…… 잘 부탁해」"

[[dialogue]]
speaker = "サチ"
original = "「はいっ、よろしくお願いします」"
translation = "「네! 잘 부탁드립니다」"

[[dialogue]]
speaker = "花織"
original = "「あはは……」"
translation = "「아하하……」"

[[dialogue]]
speaker = "花織"
original = "（こんな年下の子に、励まされちゃって……情けないなぁ……）"
translation = "(이런 어린아이한테 격려나 받고…… 한심하네……)"

[[dialogue]]
speaker = "花織"
original = "「うわ……」"
translation = "「우와……」"

[[dialogue]]
speaker = "いろは"
original = "「なにこれ！\u3000ここがサチちゃんたちの住んでる寮！？\u3000ちょっと豪華すぎじゃない？」"
translation = "「뭐야 이거! 여기가 사치짱 일행이 살고 있는 기숙사!? 좀 너무 호화로운 거 아냐?」"

[[dialogue]]
speaker = "花織"
original = "（ちょっとどころじゃないんですけど！\u3000これ本当に学園の寮なの？）"
translation = "(조금 정도가 아닌데요! 이거 정말 학원 기숙사 맞아?)"

[[dialogue]]
speaker = "花織"
original = "（お嬢様ばっかの<ruby>武良穂<rt>たけらほ</rt></ruby>に通ってる陽彩ちゃんならともかく、ウチらじゃ場違い感半端ないって！）"
translation = "(아가씨들뿐인 타케라호에 다니는 히요리짱이라면 몰라도 우리에겐 위화감 장난 아니라고!)"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「おーっほっほっほ！\u3000ようこそおいでくださいましたわ、異世界の魔法少女の方々。サチさんより事情は伺っておりますわ」"
translation = "「오ー홋홋홋! 잘 오셨어요, 이세계의 마법소녀 분들. 사치 씨로부터 사정은 들었답니다」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「部屋には余裕がありますので、３人程度であれば問題なく受け入れられますの。滞在中はここ『流星寮イルソーレ』でゆっくりおくつろぎくださいませ♪」"
translation = "「방에는 여유가 있으니 세 명 정도라면 문제없이 받아들일 수 있어요. 머무시는 동안 여기 『유성 기숙사 일 솔레』에서 푹 쉬어 주세요♪」"

[[dialogue]]
speaker = "ここあ"
original = "「ありがとうございます！\u3000突然で申し訳ありませんが、お邪魔させてもらいますっ」"
translation = "「감사합니다! 갑작스러워서 죄송합니다만, 신세 좀 질게요!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「あら、そちらの方、どうかされましたの？」"
translation = "「어머, 그쪽 분, 무슨 일 있으신가요?」"

[[dialogue]]
speaker = "花織"
original = "「えっ！\u3000う、ウチ？」"
translation = "「엣! 나, 나?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「先ほどから私のことをじーっと見つめていらっしゃったので。何か気になることでもございましたか？」"
translation = "「아까부터 저를 빤히 쳐다보고 계시길래. 뭔가 신경 쓰이는 거라도 있으신가요?」"

[[dialogue]]
speaker = "花織"
original = "「え、ええと……すごく高貴な感じがするっていうか、オーラがすごいっていうか！\u3000そういうのに見とれちゃって！」"
translation = "「어, 에또…… 굉장히 고귀한 느낌이 든다고나 할까, 오라가 대단하다고나 할까! 그런 거에 넋을 잃고 봐버려서!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「わ、私に……？」"
translation = "「저, 저를……?」"

[[dialogue]]
speaker = "いろは"
original = "「カオリンはえっと、なんだっけ……そうそう、ミーハーなんだよね！」"
translation = "「카오린은 에또, 뭐였더라…… 맞아 맞아, 연예인 같은 거 좋아하거든!」"

[[dialogue]]
speaker = "ここあ"
original = "「にゃはは、セレブみたいなのに興味ある感じ？」"
translation = "「냐하하, 셀럽 같은 거에 흥미 있는 느낌?」"

[[dialogue]]
speaker = "花織"
original = "「失礼だったらごめんなさいっ！\u3000でもでも、すっごく素敵な方だなって！！」"
translation = "「실례였다면 죄송해요! 하지만 하지만, 정말 멋진 분이라고 생각해서!!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「おーっほっほっほ、謝ることはありませんのよ！\u3000高貴な者は見られるのも務め。そういうことなら、存分に眺めてもらって構いませんわ♪」"
translation = "「오ー홋홋홋, 사과할 것 없답니다! 고귀한 자는 보여지는 것도 의무. 그런 거라면 마음껏 바라보셔도 상관없어요♪」"

[[dialogue]]
speaker = "花織"
original = "「あ、ありがとうございます……」"
translation = "「가, 감사합니다……」"

[[dialogue]]
speaker = "花織"
original = "（堂々としてて凄いっ！\u3000でも見てることがバレてると、恥ずかしくて逆に見つめられないよぉ～）"
translation = "(당당해서 굉장해! 하지만 보고 있는 걸 들키니까 부끄러워서 반대로 못 쳐다보겠어어~)"

[[dialogue]]
speaker = "サチ"
original = "「それではみなさん、お部屋の方にご案内しますね」"
translation = "「그럼 여러분, 방으로 안내해 드릴게요」"

[[dialogue]]
speaker = "いろは"
original = "「おねがいしま～す♪」"
translation = "「부탁해용~♪」"

[[dialogue]]
speaker = "舞亜"
original = "「サチちゃん、やっほ～♪」"
translation = "「사치짱, 야호~♪」"

[[dialogue]]
speaker = "サチ"
original = "「あ、舞亜先輩。大会の遠征から戻られたんですね？」"
translation = "「아, 마이아 선배. 대회 원정에서 돌아오셨군요?」"

[[dialogue]]
speaker = "舞亜"
original = "「そーなの。そっちの人たちはお客様？」"
translation = "「그으래. 그쪽 사람들은 손님?」"

[[dialogue]]
speaker = "サチ"
original = "「はい、いろいろ事情があって、しばらく流星寮で過ごしてもらうことになりました」"
translation = "「네, 여러 가지 사정이 있어서 당분간 유성 기숙사에서 지내게 되었어요」"

[[dialogue]]
speaker = "舞亜"
original = "「そーなんだ。柊舞亜です、ヨロシク～」"
translation = "「그렇구나. 히이라기 마이아야, 잘 부탁해~」"

[[dialogue]]
speaker = "ここあ"
original = "「にゃはは、よろしくね～♪」"
translation = "「냐하하, 잘 부탁해~♪」"

[[dialogue]]
speaker = "花織"
original = "（うっわ、何、この人！？\u3000すっごい美人だし……芸能人！？）"
translation = "(우와, 뭐야 이 사람!? 엄청 미인이고…… 연예인!?)"

[[dialogue]]
speaker = "いろは"
original = "「えーっ、プロのフィギュアスケートの選手なの！？\u3000すっご！！」"
translation = "「에ー엣, 프로 피겨 스케이팅 선수야!? 대박!!」"

[[dialogue]]
speaker = "サチ"
original = "「ただのプロ選手じゃありませんよ、なんと金メダルを取ったこともあるんですから」"
translation = "「단순한 프로 선수가 아니에요, 무려 금메달을 딴 적도 있으니까요」"

[[dialogue]]
speaker = "舞亜"
original = "「あはは、そんなに持ち上げられると恥ずかしいよ～」"
translation = "「아하하, 그렇게 치켜세워주니 부끄러운걸~」"

[[dialogue]]
speaker = "花織"
original = "（さっきのヒルディオーネ寮長さんといい、この舞亜さんといい、すごい人ばっかり……よく見たら、なんかオーラのある人だらけ）"
translation = "（아까 힐디 오네 사감님도 그렇고, 이 마이아 씨도 그렇고, 대단한 사람들뿐…… 잘 보니 왠지 오라가 있는 사람들투성이야）"

[[dialogue]]
speaker = "花織"
original = "（あっちの人はいかにも高貴な生まれです、って感じの雰囲気だし……）"
translation = "（저쪽 사람은 그야말로 고귀한 태생입니다, 라는 느낌의 분위기고……）"

[[dialogue]]
speaker = "花織"
original = "（あっちの人はキリッとしててカッコいい……そこら中にタダ者じゃない感じの人でいっぱいじゃん……）"
translation = "（저쪽 사람은 늠름해서 멋있어…… 사방에 보통내기가 아닌 느낌의 사람들로 가득하잖아……）"

[[dialogue]]
speaker = "花織"
original = "（こんなトコでこれから何日も過ごすとか、ウチ、本当にやってけるの……？）"
translation = "（이런 곳에서 앞으로 며칠이나 지내야 한다니, 나, 정말 잘 해낼 수 있을까……?）"

[[dialogue]]
speaker = "unk"
original = "流星寮と、そこに住まうヒトたちに圧倒される花織。"
translation = "유성 기숙사와 그곳에 거주하는 사람들에게 압도당하는 카오리."

[[dialogue]]
speaker = "unk"
original = "こうして不安でいっぱいな、魔法少女たちの異世界生活が始まったのだった。"
translation = "이렇게 불안으로 가득한, 마법 소녀들의 이세계 생활이 시작된 것이었다."

