[[dialogue]]
speaker = "unk"
original = "第３話,風紀委員とデート,P"
translation = "제3화, 풍기위원과 데이트, P"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「ボンジュール、会長さん」"
translation = "「봉쥬르, 회장님.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「あ、すみません。時々出てしまうんです。母国にいた時のくせで」"
translation = "「아, 죄송합니다. 가끔 튀어나오네요. 고국에 있을 때의 버릇이라서.」"

[[dialogue]]
speaker = "unk"
original = "オシャレでいいと思う"
translation = "세련되고 좋다고 생각해."

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「そう……でしょうか？\u3000会長さんがそう言うなら気にしないことにします」"
translation = "「그……럴까요? 회장님이 그렇게 말씀하신다면 신경 쓰지 않기로 하겠어요.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「今日は休日なのに、私のわがままにお付き合いいただいてありがとうございます」"
translation = "「오늘은 휴일인데 제 이기적인 부탁에 어울려 주셔서 감사합니다.」"

[[dialogue]]
speaker = "unk"
original = "以前、流星学園で会った時に――"
translation = "이전에 유성학원에서 만났을 때──"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「私に悩み──ですか？」"
translation = "「제게 고민── 말인가요?」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「もちろんありますよ。風紀委員として注意する際は、なぜそのルールがあるのかを理解してもらうよう努めていますが、ちゃんと伝えられているかどうか……」"
translation = "「물론 있지요. 풍기위원으로서 주의를 줄 때는 왜 그 규칙이 있는지 이해시키려 노력하고 있습니다만, 제대로 전달되고 있는지 어떤지……」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「それに取り締まる立場になると、人は時に驕ります。ちゃんと風紀委員の責務を果たせているか自省する日々です」"
translation = "「게다가 단속하는 입장이 되면 사람은 때때로 오만해집니다. 제대로 풍기위원의 책무를 다하고 있는지 자성하는 나날이에요.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「それとつまらないことなのですが……同年代の女の子がどんな遊びをしているのかわからなくて」"
translation = "「그리고 사소한 것입니다만…… 또래 여자애들이 어떤 놀이를 하는지 잘 모르겠어서요.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「フランスでは勉学や武術に時間をかけていましたし、私は風紀委員ですから他の生徒の模範にならなくてはいけません」"
translation = "「프랑스에서는 학업과 무술에 시간을 쏟았고, 저는 풍기위원이니까 다른 학생의 모범이 되어야 하거든요.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「一緒に遊ぶとしても、風紀委員がいては堅苦しく感じるかもしれませんし……私も年頃の女の子ですから人並に遊びたい気持ちはあるのですが……」"
translation = "「함께 논다고 해도 풍기위원이 있으면 거북하게 느낄지도 모르고…… 저도 한창때의 여자애니까 남들처럼 놀고 싶은 마음은 있습니다만……」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「話は聞かせてもらった！」"
translation = "「이야기는 다 들었다!」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「ユウリさん……！？」"
translation = "「유우리 씨……!?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「それなら実際に遊びに行くのが早いだろ。ついでに会長さんも行こうぜ！」"
translation = "「그렇다면 실제로 놀러 가는 게 제일 빠르잖아. 하는 김에 회장님도 같이 가자고!」"

[[dialogue]]
speaker = "unk"
original = "というわけで今日は、エリスに普通の女の子の遊びを体験してもらうことになったのだが……"
translation = "그리하여 오늘은 에리스에게 평범한 여자아이의 놀이를 체험하게 해주기로 했는데……"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「ユウリさんは……他の人助けがあるから行けなくなった？\u3000ふふ、ユウリさんらしいですね」"
translation = "「유우리 씨는…… 다른 사람을 돕는 일이 생겨서 못 가게 됐다? 후후, 유우리 씨답네요.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「え、でも伝言がある？」"
translation = "「에, 하지만 전언이 있다고요?」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「女の子らしい遊びと言えばウインドウショッピング、スイーツの食べ歩き……なるほど、どれもあまり経験がないですね」"
translation = "「여자애다운 놀이라고 하면 윈도우 쇼핑, 디저트 맛집 탐방…… 과연, 어느 것 하나 경험이 별로 없네요.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「ではまずは食べ歩きがしたいです。スイーツには興味がありますから」"
translation = "「그럼 우선은 맛집 탐방을 하고 싶어요. 디저트에는 흥미가 있으니까요.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「これがクリームブリュレクレープ……フランスでは見ないですが、とても魅力的に感じます。それでは……はむ」"
translation = "「이것이 크림 브륄레 크레이프…… 프랑스에서는 못 보던 것인데 무척 매력적으로 느껴지네요. 그럼…… 냠.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「ん～っ！\u3000クリームの甘さとブリュレの香ばしさ、バニラの風味……これは素晴らしい……！」"
translation = "「음~!! 크림의 달콤함과 브륄레의 고소함, 바닐라 풍미…… 이건 훌륭하네요……!」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「ミルクレープもそうでしたが、フランスで生まれたものがこうも変わるのですね。美味しくて面白いです」"
translation = "「밀크레이프도 그랬지만, 프랑스에서 태어난 것이 이렇게나 변하는군요. 맛있고 재미있어요.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「あら……頬にクリームが付いています。いえ、そちらではなく左側……ああ、もう少し下です」"
translation = "「어라…… 뺨에 크림이 묻었어요. 아니요, 그쪽이 아니라 왼쪽…… 아, 조금 더 아래예요.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「ふふ、私が拭いてあげますね。ほら、綺麗になりましたよ」"
translation = "「후후, 제가 닦아드릴게요. 자, 깨끗해졌어요.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「……あ、顔が近かったですね。あはは……」"
translation = "「……아, 얼굴이 가까웠네요. 아하하……」"

[[dialogue]]
speaker = "unk"
original = "次はショッピング！"
translation = "다음은 쇼핑!"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「あ……この口紅、とっても艶やかで綺麗……。私にも似合うでしょうか？」"
translation = "「아…… 이 립스틱, 정말 화사하고 예쁘다……. 제게도 어울릴까요?」"

[[dialogue]]
speaker = "unk"
original = "似合うけど色っぽくて刺激的かも"
translation = "어울리지만 섹시해서 자극적일지도."

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「色っぽいなんて初めて言われました。女性として魅力的……と受け止めていいのでしょうか」"
translation = "「섹시하다는 말은 처음 들어봤어요. 여성으로서 매력적……이라고 받아들여도 되는 걸까요.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「風紀委員としては問題かもしれませんが、言われると嬉しい言葉なのですね」"
translation = "「풍기위원으로서는 문제일지도 모르지만, 들으면 기쁜 말이네요.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「この口紅、ほんとに買っちゃおうかな……」"
translation = "「이 립스틱, 정말 사버릴까나……」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「あれ……？\u3000会長さんと私。男性と二人きりで街を出歩いて……」"
translation = "「어라……? 회장님과 저. 남자와 둘이서 거리를 걷고……」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "（よく考えたら、これはデートなのでは……！？）"
translation = "(잘 생각해보니, 이건 데이트인 게……!?)"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「え……？\u3000顔が赤い、ですか……？\u3000いえいえいえ、お気遣いなくっ。あはは、あははは……」"
translation = "「에……? 얼굴이 붉다, 고요……? 아니아니아니요, 신경 쓰지 마세요. 아하하, 아하하하……」"

[[dialogue]]
speaker = "unk"
original = "最後はカラオケ！"
translation = "마지막은 노래방!"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「！\u3000行きたいです！」"
translation = "「! 가고 싶어요!」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「前々から興味があったのですが、なかなか決心がつかなくて……憧れだったんです、この国のカラオケ」"
translation = "「전부터 흥미가 있었습니다만, 좀처럼 결심이 서지 않아서…… 동경했었거든요, 이 나라의 노래방.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「遅くなってはいけないので１８時までです。もちろん、２人きりだからといってふしだらなことはいけませんよ」"
translation = "「늦어지면 안 되니까 18시까지예요. 물론 둘뿐이라고 해서 불순한 짓을 해서는 안 된답니다.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「母から教わった日本の歌もあるんです。では……時間の限り楽しみましょう！」"
translation = "「어머니께 배운 일본 노래도 있어요. 그럼…… 시간 닿는 데까지 즐겨보죠!」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「ふふふ、気の向くままに歌うことがこんなに楽しいとは思いませんでした。また行ってみたいです」"
translation = "「후후후, 마음 가는 대로 노래하는 것이 이렇게 즐거울 줄은 몰랐어요. 또 가보고 싶네요.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「あれ、会長さん、大丈夫ですか？\u3000ぐったりされているようですが……平気？\u3000ならいいんですけど」"
translation = "「어라, 회장님, 괜찮으신가요? 기진맥진하신 것 같습니다만…… 괜찮아? 그럼 다행입니다만.」"

[[dialogue]]
speaker = "unk"
original = "（実はすごい音痴だったなんて言えない……）"
translation = "(사실 엄청난 음치였다고는 말 못 해……)"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「今日は、会長さんのおかげで初めてのところにたくさん行くことができました。とても楽しかったです。ありがとうございます」"
translation = "「오늘은 회장님 덕분에 처음 가보는 곳에 많이 갈 수 있었어요. 정말 즐거웠습니다. 감사합니다.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「……だから会長さんに折り入ってお願いがあるんです。会長さんにしか頼めないことで……その……」"
translation = "「……그래서 회장님께 간곡히 부탁드릴 게 있어요. 회장님께밖에 부탁할 수 없는 일이라서…… 그게……」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「わ、私を口説いてくれませんか！？」"
translation = "「저, 저를 유혹해 주시지 않겠어요!?」"

