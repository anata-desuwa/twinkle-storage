[[dialogue]]
speaker = "unk"
original = "結局あの後、ロストアイテムはどこかへ消えてしまい、とりあえず星徒会室に戻って今後の相談をすることになった。"
translation = "결국 그 후 로스트 아이템은 어딘가로 사라져 버렸고, 일단 성도회실로 돌아가 향후 대책을 상의하기로 했다."

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ついに現れましたね。封印を解くことができるかもしれないロストアイテムが……！」"
translation = "「드디어 나타났군요. 봉인을 풀 수 있을지도 모르는 로스트 아이템이……!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「仮ですが、『解放』のロストアイテムと名づけておきましょうか！」"
translation = "「임시지만 『해방의 로스트 아이템』이라고 이름 붙여 둘까요!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ひとまず、力の制御は戻って、変身を解くことはできたのじゃ。しかし――」"
translation = "「일단 힘의 제어는 돌아와서 변신을 풀 수는 있었느니라. 하지만――」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「今の我は、サチの了承がなくとも自力でまたあの姿に変身できると感じる。一部ではあるが、本来の我の力が戻ってきているのじゃ」"
translation = "「지금의 나는 사치의 허락이 없더라도 자력으로 다시 그 모습으로 변신할 수 있다고 느껴지느니라. 일부이긴 하지만 본래 나의 힘이 돌아오고 있는 것이니라.」"

[[dialogue]]
speaker = "unk"
original = "プリムラは正真正銘、世界を滅ぼす終末兵器として作られた存在だ。"
translation = "프리뮬라는 명실상부, 세계를 멸망시킬 종말병기로서 만들어진 존재다."

[[dialogue]]
speaker = "unk"
original = "しかしその力は現在、サチが持っているペンダント型のロストアイテム『星の鎖』によって大部分が封印されている。"
translation = "하지만 그 힘은 현재 사치가 가진 펜던트형 로스트 아이템 『별의 쇠사슬』에 의해 대부분 봉인되어 있다."

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「解放の、ロストアイテム……」"
translation = "「해방의 로스트 아이템……」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "（もし封印を解く能力が本物なのだとしたら……トレジアンナさんは元の姿に戻ることができる。それに、プリムラも……）"
translation = "(만약 봉인을 푸는 능력이 진짜라면…… 트레지안나 씨는 원래 모습으로 돌아갈 수 있어. 그리고 프리뮬라도……)"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "（だけど……もし封印が解けたら、プリムラはどうするんだろう……？）"
translation = "(하지만…… 만약 봉인이 풀리면 프리뮬라는 어떻게 할까……?)"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "（……学園に残るのかな？\u3000それとも……）"
translation = "(……학원에 남으려나? 아니면……)"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「――ただ、よりによってタイミングが悪いのじゃ。トマルが不在の時に……」"
translation = "「――다만, 하필이면 타이밍이 좋지 않느니라. 토마루가 부재중일 때에……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そうね。お世話になった親戚の方が亡くなったとかで、マトイちゃんとトマルちゃん、数日学園を休んでいるから……」"
translation = "「맞아. 신세를 졌던 친척분이 돌아가셨다나 해서 마토이짱이랑 토마루짱, 며칠 학원을 쉬고 있으니까……」"

[[dialogue]]
speaker = "unk"
original = "場所は北陸の方だと聞いていた。星騎士なら飛べばすぐの距離ではあるが、いつ現れるかわからないロストアイテム相手に呼びつけるわけにもいかない。"
translation = "장소는 호쿠리쿠 쪽이라고 들었다. 성기사라면 날아가면 금방인 거리이긴 하지만, 언제 나타날지 모르는 로스트 아이템 상대로 불러낼 수도 없는 노릇이다."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「うむ。ロストアイテムは共通して、気配を隠して逃げるのが上手い。トマルの追跡能力がないのは痛手なのじゃ」"
translation = "「음. 로스트 아이템은 공통적으로 기척을 숨기고 도망치는 데 능하니라. 토마루의 추적 능력이 없는 건 뼈아픈 실책이니라.」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「まあでも、実際にいない以上、ここにいるメンバーで頑張るしかないわよね！」"
translation = "「뭐, 하지만 실제로 없는 이상 여기 있는 멤버들끼리 힘낼 수밖에 없지!」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「大丈夫！\u3000本気で見つけたいって願えば、何とかなるわ、きっと！\u3000みんなで力を合わせて頑張りましょう♪」"
translation = "「괜찮아! 진심으로 찾고 싶다고 바라면 어떻게든 될 거야, 분명! 다 같이 힘을 합쳐서 노력하자♪」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「……って、そうだわ！\u3000会長さんと、ちゃんと挨拶しておかないとね♪」"
translation = "「……앗, 그렇지! 회장님이랑 제대로 인사해 둬야지♪」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「改めまして――」"
translation = "「다시 한번――」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「ごきげんよう、会長さん♪\u3000私はサーシャお姉ちゃんの妹で、附属校３年生の<ruby>染井<rt>そめい</rt></ruby>シズハって言います！」"
translation = "「평안하신가요, 회장님♪ 저는 사샤 누나의 여동생이고, 부속교 3학년인 소메이 시즈하라고 합니다!」"

[[dialogue]]
speaker = "unk"
original = "初めまして"
translation = "처음 뵙겠습니다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「会長さんの話は、みんなから聞いてるよ。リクリエを退けてみせた英雄だって♪」"
translation = "「회장님 이야기는 모두에게 들었어. 리크리에를 물리쳐 보인 영웅이라고♪」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「うん？\u3000どうしたの？\u3000――聞きたいことがある？」"
translation = "「응? 왜 그래? ――물어보고 싶은 게 있어?」"

[[dialogue]]
speaker = "unk"
original = "サーシャさんの妹って……\n妹分とか、妹的な存在ってこと？"
translation = "사샤 씨의 여동생이라니…… 아는 동생이나 여동생 같은 존재라는 뜻인가요?"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「……？\u3000私は普通に、サーシャお姉ちゃんと血の繋がった妹だけど……」"
translation = "「……? 나는 평범하게 사샤 누나랑 피가 섞인 친여동생인데……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ええ。会長くん、どうしてそう思ったのかしら？\u3000確かに会ったのは今日が初めかもしれないけど……」"
translation = "「응. 회장군, 어째서 그렇게 생각한 걸까? 확실히 만난 건 오늘이 처음일지도 모르지만……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「私にはソフィのほかにもう１人妹がいるって、前に言ったことがあったでしょう？」"
translation = "「나에겐 소피 말고도 또 한 명의 여동생이 있다고 전에 말한 적 있었지?」"

[[dialogue]]
speaker = "unk"
original = "いや、そんなはずは……"
translation = "아니, 그럴 리가……"

[[dialogue]]
speaker = "unk"
original = "ふと、しばらく考えていたら、何だか聞いたことがあったような気がしてきて――"
translation = "문득 한동안 생각하고 있으니 왠지 들은 적이 있는 것 같은 기분이 들어서――"

[[dialogue]]
speaker = "unk"
original = "ごめん。何か勘違いしてたみたいだ"
translation = "미안해요. 뭔가 착각한 모양이에요."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「あははっ♪\u3000まぁ、学園に転入してきたのはついこの間のことだし、そう思われても仕方ないよね」"
translation = "「아하하♪ 뭐, 학원에 전입해 온 건 바로 요전의 일이고, 그렇게 생각해도 어쩔 수 없지」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「私ね、今でこそ元気な体になったけど、つい２ヶ月前までは病気で寝たきりの状態で、ずっと病院にいたの」"
translation = "「나 말이야, 지금에야 건강한 몸이 됐지만 불과 2개월 전까지는 병으로 누워만 있는 상태로 계속 병원에 있었거든」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「今の医学では治らない、いわゆる不治の病ってやつでね。しかも、体はもう本当に全然動かなくて、心臓も日に日に弱って行って、余命わずかとまで言われてた」"
translation = "「지금 의학으로는 고칠 수 없는 소위 불치병이라는 녀석이라서. 게다가 몸은 이제 정말 전혀 움직이지 않고 심장도 날이 갈수록 약해져 가서 여명 얼마 남지 않았다는 소리까지 들었어」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「――そんな状態で、どうやって病気が治ったのか気になるよね？\u3000本当に奇跡みたいな出会いだったんだけど……ある日突然、ロストアイテムが私の前に現れたの」"
translation = "「――그런 상태에서 어떻게 병이 나았는지 궁금하지? 정말 기적 같은 만남이었는데…… 어느 날 갑자기 로스트 아이템이 내 앞에 나타났어」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「そして、ロストアイテムの力で、私はこうして元気に歩けるようになった」"
translation = "「그리고 로스트 아이템의 힘으로 나는 이렇게 건강하게 걸을 수 있게 됐어」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「ディーちゃんが私のところへやって来たのは、それからすぐのことだったわ」"
translation = "「디짱이 내게 찾아온 건 그로부터 바로 뒤의 일이었지」"

[[dialogue]]
speaker = "unk"
original = "ディーちゃん……？"
translation = "디짱……?"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「うん！\u3000トレジアンナさんみたいに喋るロストアイテムでね。って、あれ？\u3000そういえばさっきからディーちゃん、全然喋らないような……？」"
translation = "「응! 트레지안나 씨처럼 말하는 로스트 아이템이라서. 앗, 어라? 그러고 보니 아까부터 디짱, 전혀 말을 안 하는 것 같은데……?」"

[[dialogue]]
speaker = "unk"
original = "ふと、俺は肩をトントンと叩かれる。後ろを振り返ると――"
translation = "문득 누군가 어깨를 툭툭 두드린다. 뒤를 돌아보니――"

[[dialogue]]
speaker = "？？？"
original = "「ばぁっ♪」"
translation = "「바아~♪」"

[[dialogue]]
speaker = "unk"
original = "おわぁっ！？"
translation = "오와악!?"

[[dialogue]]
speaker_original = "ディーちゃん"
speaker_translation = "디짱"
original = "「ひひっ♪\u3000初めまして、会長♪\u3000ボクがその『ディーちゃん』なのサ♪」"
translation = "「히히♪ 처음 뵙겠습니다, 회장♪ 내가 바로 그 『디짱』이라네♪」"

[[dialogue]]
speaker = "unk"
original = "ビックリした……！"
translation = "깜짝이야……!"

[[dialogue]]
speaker_original = "ディーちゃん"
speaker_translation = "디짱"
original = "「フフッ、ドッキリ成功～♪\u3000ボクはヒトのそういう反応が大好物だからね～。ご馳走様なのサ！」"
translation = "「후후, 깜짝 카메라 성공~♪ 난 인간의 그런 반응이 제일 좋거든~. 잘 먹었네♪」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「もう、またそういう悪戯して！\u3000驚かせる為にわざと喋らないようにしてたわね！？」"
translation = "「정말, 또 그런 장난을! 놀라게 하려고 일부러 말 안 하고 있었지!?」"

[[dialogue]]
speaker_original = "ディーちゃん"
speaker_translation = "디짱"
original = "「まあまあ、これがボクのコミュニケーションってやつだから、許してよ～☆」"
translation = "「뭐 어때, 이게 내 커뮤니케이션이라는 거니까 용서해 줘~☆」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「さて、ディーちゃんというのは愛称で、ボクの本当の名前は『ディーラック』って言うのサ」"
translation = "「자, 디짱이라는 건 애칭이고 내 진짜 이름은 『디럭쿠』라고 한다네♪」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「いわゆる魔法少女の使い魔っていうと、わかりやすいかな？\u3000そんなわけで、これからシズハちゃん共々よろしく頼むよ、会長♪」"
translation = "「소위 마법소녀의 사역마라고 하면 이해하기 쉬우려나? 그런 고로 앞으로 시즈하짱과 함께 잘 부탁하네, 회장♪」"

[[dialogue]]
speaker = "unk"
original = "ああ、よろしく。ディーラック"
translation = "아아, 그래. 디럭쿠."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「じ～っ……」"
translation = "「지긋~……」"

[[dialogue]]
speaker = "unk"
original = "ふと、何やらシズハがこちらの腰回りを観察していることに気づく。かと思うと――"
translation = "문득 왠지 시즈하가 이쪽의 허리춤을 관찰하고 있다는 것을 깨닫는다. 그러자――"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「えいっ♪」"
translation = "「에잇♪」"

[[dialogue]]
speaker = "unk"
original = "キャーーーーーーーーーーーー！？"
translation = "꺄아아아아아아아아아아아아!? "

[[dialogue]]
speaker = "unk"
original = "突然背後に回り込まれ、両手で遠慮なく尻を揉みしだかれた。"
translation = "갑자기 뒤로 돌아와 양손으로 사정없이 엉덩이를 주물렀다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「ふふっ♪\u3000会長さん……思った通り、すごくいいお尻をしてるわ♪」"
translation = "「후후♪ 회장님…… 생각한 대로 정말 좋은 엉덩이를 가졌네♪」"

[[dialogue]]
speaker = "unk"
original = "突然なにしてるの！？"
translation = "갑자기 뭐 하는 거예요!?"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「ひひっ♪\u3000実はシズハちゃん、生粋の<b>お尻フェチ</b>なんだよね～」"
translation = "「히히♪ 사실 시즈하짱, 골수 **엉덩이 페티시**거든~」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「ディーちゃん。そんな、大きな声で私の性癖を発表されたら、その、恥ずかしいよ……」"
translation = "「디짱. 그렇게 큰 소리로 내 성적 취향을 발표하면, 그게, 부끄럽잖아……」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「他人のケツを勝手に揉みしだくのは恥ずかしくないのか……？」"
translation = "「남의 엉덩이를 멋대로 주무르는 건 부끄럽지 않은 것이냐……?」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「確かに私は、お尻の形と柔らかさに、芸術性と美しさと魅力を感じているけれど！\u3000できればすれ違う人々、老若男女全てのヒトのお尻を揉みしだきたいと思っているけれども！」"
translation = "「확실히 나는 엉덩이의 형태와 부드러움에서 예술성과 아름다움과 매력을 느끼고 있지만! 가급적 스쳐 지나가는 사람들, 남녀노소 모든 인간의 엉덩이를 주무르고 싶다고 생각하고 있지만!」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「ひひっ♪\u3000欲望が全部漏れちゃってるネ～」"
translation = "「히히♪ 욕망이 다 새어 나오고 있네~」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「実際にお尻を触るのは、セクハラのためではないわ！\u3000これはそう、コミュニケーション手段としてだから！」"
translation = "「실제로 엉덩이를 만지는 건 성희롱을 위해서가 아니야! 이건 그래, 커뮤니케이션 수단으로서니까!」"

[[dialogue]]
speaker = "unk"
original = "こ、コミュニケーション手段……？"
translation = "커, 커뮤니케이션 수단……?"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「そう！\u3000ほら、お互いのお尻を触ると……気持ちが近づいて、すぐに仲良くなれるでしょ？」"
translation = "「그래! 봐봐, 서로의 엉덩이를 만지면…… 마음이 가까워져서 금방 친해질 수 있잖아?」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「あっ、なので会長も私のお尻、触ってくださいね♪」"
translation = "「앗, 그러니 회장님도 제 엉덩이 만져주세요♪」"

[[dialogue]]
speaker = "unk"
original = "と、シズハは俺の手を取ると……なんと自らお尻を触らせてきた。"
translation = "하고 시즈하는 내 손을 잡더니…… 무려 스스로 엉덩이를 만지게 해왔다."

[[dialogue]]
speaker = "unk"
original = "柔らか……って、えぇーーーーーっ！？"
translation = "부드러…… 아니, 에에에에에엑!?"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ちょっ！？\u3000何やってるんですか、お兄さん！？\u3000エッチなのは禁止ですよ！？」"
translation = "「잠깐!? 뭐 하시는 거예요, 오빠!? 야한 건 금지라고요!?」"

[[dialogue]]
speaker = "unk"
original = "待って！\u3000今のは不意打ちだから！"
translation = "기다려! 방금 건 기습이었다고!"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「ふふっ♪\u3000これで私たちは『お尻合い』ですね、<b>会長</b>♪\u3000お尻だけに！」"
translation = "「후후♪ 이걸로 우리는 『엉덩이 친구』네요, **회장님**♪ 엉덩이만큼은!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あら～♪」"
translation = "「어머나~♪」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「ひひひっ♪\u3000どう考えても、やってることがボクよりも酷いのサ～」"
translation = "「히히히♪ 아무리 생각해도 하는 짓이 나보다 더 심하다네~」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「やれやれ、破廉恥な……清楚そうな見た目にそぐわぬセクハラ魔人っぷりなのじゃ……」"
translation = "「이런 이런, 파렴치하군…… 청초해 보이는 외모에 어울리지 않는 성희롱 마인이지 않느냐……」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「おっ、プリムラちゃん、言ったな～？\u3000それ～♪」"
translation = "「오호, 프리뮬라짱, 말 다 했어~? 에잇~♪」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「んなぁっ！？\u3000こらぁ、シズハ！\u3000我の尻を無断で触るでない！」"
translation = "「으냐앗!? 이봐, 시즈하! 나의 엉덩이를 무단으로 만지지 마라!」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「う～ん、プリムラちゃん、相変わらずプリプリでモチモチないいお尻だこと♪」"
translation = "「음~ 프리뮬라짱, 여전히 탱글탱글하고 쫀득쫀득한 좋은 엉덩이네♪」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「や、やめっ……ひゃあぁっ！？\u3000貴様っ……破廉恥なのじゃあぁぁぁっ！」"
translation = "「그, 그만…… 히야앗!? 네놈…… 파렴치하도다아아아아앗!」"

[[dialogue]]
speaker = "unk"
original = "こうして俺は、シズハと『お知り合い』になったのだった――"
translation = "이렇게 나는 시즈하와 『알고 지내는 사이(엉덩이 친구)』가 된 것이었다――"

