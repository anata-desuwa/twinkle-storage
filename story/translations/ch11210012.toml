[[dialogue]]
speaker = "unk"
original = "第２話,ブラックホール・ストマック,P"
translation = "제2화, 블랙홀 스토맥, P"

[[dialogue]]
speaker = "unk"
original = "休日、昼食を摂ろうとバーガーショップに入った。"
translation = "휴일, 점심을 먹으려고 버거샵에 들어갔다."

[[dialogue]]
speaker = "unk"
original = "せっかくの陽気なので、オープンテラスの席を取ろうとすると──"
translation = "모처럼 날씨가 좋으니 노천 테라스석을 잡으려 하자──"

[[dialogue]]
speaker = "レイラ"
original = "「うぅ、ひもじい……」"
translation = "「으으, 배고파……」"

[[dialogue]]
speaker = "レイラ"
original = "「あ、魔王さん、こんにちは。混んでますし、魔王さんさえよければ相席しませんか？」"
translation = "「아, 마왕님, 안녕하세요. 붐비는데 마왕님만 괜찮으시다면 합석하실래요?」"

[[dialogue]]
speaker = "unk"
original = "ありがとう。お邪魔するね"
translation = "고마워. 실례할게."

[[dialogue]]
speaker = "レイラ"
original = "「はい、どうぞ。……え、悲しそう？\u3000私が、ですか？」"
translation = "「네, 앉으세요. ……네, 슬퍼 보인다고요? 제가요?」"

[[dialogue]]
speaker = "レイラ"
original = "「えっと、とある事情でお金を使いこんでしまってですね、もっと食べたいんですけど一番安いハンバーガーひとつで我慢しています……」"
translation = "「저기, 어떤 사정으로 돈을 다 써버려서요. 더 먹고 싶지만 가장 싼 햄버거 하나로 참고 있답니다……」"

[[dialogue]]
speaker = "レイラ"
original = "「え、ハンバーガーひとつあげる……？\u3000そんな、申し訳ないですよ」"
translation = "「네, 햄버거 하나 준다고요……? 아뇨, 죄송해서 못 받아요.」"

[[dialogue]]
speaker = "unk"
original = "ちょっと頼み過ぎちゃったから"
translation = "좀 많이 시켜버려서 그래."

[[dialogue]]
speaker = "レイラ"
original = "「……ふふ、やっぱりあなたは優しい人ですね」"
translation = "「……후후, 역시 당신은 상냥한 사람이군요.」"

[[dialogue]]
speaker = "レイラ"
original = "「ご厚意を無下にするわけには参りません。では、いただきます」"
translation = "「호의를 무시할 수는 없죠. 그럼 잘 먹겠습니다.」"

[[dialogue]]
speaker = "レイラ"
original = "「うめ、うめ……てりやきうめ……」"
translation = "「우적, 우적…… 데리야끼 마시쪙……」"

[[dialogue]]
speaker = "unk"
original = "一週間後。同じバーガーショップでまたレイラと出会った。"
translation = "일주일 후. 같은 버거샵에서 다시 레이라와 만났다."

[[dialogue]]
speaker = "レイラ"
original = "「あ、魔王さん、こんにちは。相席いかがですか？」"
translation = "「아, 마왕님, 안녕하세요. 합석 어떠신가요?」"

[[dialogue]]
speaker = "unk"
original = "あ、ありがとう……"
translation = "아, 고마워……"

[[dialogue]]
speaker = "レイラ"
original = "「どうしたんですか、火山でイエティでも見たような顔してますよ？」"
translation = "「왜 그러세요, 화산에서 예티라도 본 것 같은 얼굴을 하고 계시네요?」"

[[dialogue]]
speaker = "レイラ"
original = "「……え、ハンバーガーが山積み？\u3000ええ、ええ！\u3000お金が入ったんです！\u3000実は──」"
translation = "「……에, 햄버거가 산더미라고요? 네, 네! 돈이 들어왔거든요! 실은──」"

[[dialogue]]
speaker = "レイラ"
original = "「お待たせしました。今日はコハルコさんもご一緒なんですね？」"
translation = "「오래 기다리셨습니다. 오늘은 코하루코 씨도 함께시네요?」"

[[dialogue]]
speaker = "ウェンディ"
original = "「ええ、彼女には実行犯というか……まぁ、専門家として助言をお願いしました」"
translation = "「네, 그녀에게는 실행범이라고 해야 하나…… 뭐, 전문가로서 조언을 부탁했습니다.」"

[[dialogue]]
speaker = "コハルコ"
original = "「急いでいたとはいえ、先日は大変ご迷惑をお掛けしました……」"
translation = "「서두르느라 그랬다지만, 요전번에는 큰 결례를 범했습니다……」"

[[dialogue]]
speaker = "ウェンディ"
original = "「ええ、まさか基地のシステムがまるごと掌握されるとは思いませんでした。セドナ長官からもセキュリティ強化の指令を受けています。そのためのこの場です」"
translation = "「네, 설마 기지 시스템이 통째로 장악당할 줄은 몰랐습니다. 세드나 장관님으로부터 보안 강화 지령도 내려왔고요. 그를 위한 자리입니다.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「その前に２人は……その、わだかまりとかはないんですか？」"
translation = "「그전에 두 사람은…… 그게, 앙금 같은 건 없나요?」"

[[dialogue]]
speaker = "コハルコ"
original = "「確かに敵対はしましたけど、それは理由あってのことですし、命を狙われたことも一度や二度ではないので気にしてません」"
translation = "「확실히 적대하긴 했지만, 그건 이유가 있어서 그랬던 거고, 목숨을 위협받은 적도 한두 번이 아니어서 신경 안 써요.」"

[[dialogue]]
speaker = "コハルコ"
original = "「まぁ、家族を狙われてたら再起不能にしてましたけど」"
translation = "「뭐, 가족을 건드렸다면 재기 불능으로 만들었겠지만요.」"

[[dialogue]]
speaker = "レイラ"
original = "（こわっ……コハルコさん、目が笑ってない……）"
translation = "(무서워…… 코하루코 씨, 눈이 웃고 있지 않아……)"

[[dialogue]]
speaker = "コハルコ"
original = "「今は趣味が合う友達ですね。パソコン談議ができる人は貴重ですから」"
translation = "「지금은 취미가 맞는 친구예요. 컴퓨터 담론을 나눌 수 있는 사람은 귀하니까요.」"

[[dialogue]]
speaker = "レイラ"
original = "「私も、コハルコさんには畏れ多くも親しくしていただいております……」"
translation = "「저도 코하루코 씨께 과분하게도 가깝게 대해주심을 받고 있습니다……」"

[[dialogue]]
speaker = "ウェンディ"
original = "「でしたら問題はありませんね。実はレイラに提案があるんです」"
translation = "「그렇다면 문제는 없겠네요. 실은 레이라에게 제안이 있습니다.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「ネビュラのサイバー担当をお願いできませんか？」"
translation = "「네뷸라의 사이버 담당을 맡아주지 않겠습니까?」"

[[dialogue]]
speaker = "レイラ"
original = "「私に、ですか？」"
translation = "「제게 말인가요?」"

[[dialogue]]
speaker = "コハルコ"
original = "「私の推薦なんだ。私は忙しくて新規案件は受けられないし、レイラの実力なら私も太鼓判だよ」"
translation = "「내 추천이야. 난 바빠서 신규 안건은 못 받는데, 레이라 실력이라면 나도 보증하거든.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「聞くところによれば、レイラは食費で難儀しているそうですね」"
translation = "「듣기로는 레이라가 식비 때문에 곤란해하고 있다더군요.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「現在も戦闘員として生活費を支給していますが、サイバー担当を引き受けていただければ、その分の報酬を上乗せしてお支払いします」"
translation = "「현재도 전투원으로서 생활비를 지급하고 있지만, 사이버 담당을 맡아주시면 그만큼의 보수를 얹어서 지급하겠습니다.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「ちなみにこれくらい……」"
translation = "「참고로 이 정도……」"

[[dialogue]]
speaker = "レイラ"
original = "「そんなに頂けるんですか！？\u3000牛丼に卵とみそ汁も付けられますね！」"
translation = "「그렇게나 많이 주시나요!? 규동에 계란이랑 된장국도 추가할 수 있겠네요!」"

[[dialogue]]
speaker = "ウェンディ"
original = "「……は？」"
translation = "「……네?」"

[[dialogue]]
speaker = "レイラ"
original = "「いえ、ものの例えです。すみません」"
translation = "「아뇨, 비유하자면 그렇다는 거예요. 죄송합니다.」"

[[dialogue]]
speaker = "レイラ"
original = "「百目騎レイラ、謹んでお引き受けいたします。誠心誠意、務めて参りますのでよろしくお願いいたします」"
translation = "「도메키 레이라, 감사히 받아들이겠습니다. 성심성의껏 임할 테니 잘 부탁드립니다.」"

[[dialogue]]
speaker = "レイラ"
original = "「──というわけなんですよ！」"
translation = "「──라는 일이었답니다!」"

[[dialogue]]
speaker = "レイラ"
original = "「これで思う存分ハンバーガーが食べられます。魔王さんにはこの前てりやきバーガーをいただきましたから、今日は私がお裾分けします」"
translation = "「이걸로 마음껏 햄버거를 먹을 수 있어요. 마왕님께는 지난번에 데리야끼 버거를 얻어먹었으니 오늘은 제가 나눠드릴게요.」"

[[dialogue]]
speaker = "レイラ"
original = "「どうぞ、デミグラスシチューバーガーです！\u3000召し上がってください！」"
translation = "「자요, 데미글라스 스튜 버거입니다! 드셔보세요!」"

[[dialogue]]
speaker = "unk"
original = "あっつっ！！"
translation = "앗 뜨거!!"

[[dialogue]]
speaker = "レイラ"
original = "「アツアツなので気を付けてください……って遅かったですね。すみません」"
translation = "「뜨거우니까 조심하세요…… 라고 하기엔 늦었네요. 죄송합니다.」"

[[dialogue]]
speaker = "レイラ"
original = "「では、私はこのトンカツバーガーをいただきます……ひゅごっ」"
translation = "「그럼 저는 이 돈까스 버거를 먹을게요…… 퓨걱.」"

[[dialogue]]
speaker = "unk"
original = "ひと口でいった！？"
translation = "한입에 갔어!?"

[[dialogue]]
speaker = "レイラ"
original = "「……もぐもぐ……サクサク、ジューシーなトンカツとシャキシャキのキャベツ、硬めのバンズの相性が最高ですね」"
translation = "「……우물우물…… 바삭바삭, 쥬시한 돈까스와 아삭아삭한 양배추, 단단한 번의 조화가 최고네요.」"

[[dialogue]]
speaker = "レイラ"
original = "「ひゅごっ……このカプレーゼバーガー、トマトの酸味とモッツァレラの旨みが見事に融合しています。百億万点」"
translation = "「퓨걱…… 이 카프레제 버거, 토마토의 신맛과 모짜렐라의 감칠맛이 멋지게 융합되어 있어요. 100억만 점.」"

[[dialogue]]
speaker = "レイラ"
original = "「ひゅごっ……ひゅごっ……ひゅごっ……」"
translation = "「퓨걱…… 퓨걱…… 퓨걱……」"

[[dialogue]]
speaker = "unk"
original = "次々とハンバーガーがレイラに飲み込まれていく。"
translation = "차례차례 햄버거가 레이라에게 빨려 들어간다."

[[dialogue]]
speaker = "unk"
original = "レイラは操る星術だけでなく、胃袋もブラックホールのようだった……。"
translation = "레이라는 부리는 성술뿐만 아니라 위장도 블랙홀 같았다……."

