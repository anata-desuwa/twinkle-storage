[[dialogue]]
speaker = "unk"
original = "その日、俺とルルカは撮影スタジオを訪れていた。Ｖチューバー活動で３Ｄ配信をするために、スタジオを借りたのだ。"
translation = "그날, 나와 루루카는 촬영 스튜디오를 방문했다. VTuber 활동으로 3D 방송을 하기 위해 스튜디오를 빌린 것이다."

[[dialogue]]
speaker = "unk"
original = "配信の際にはルルカの本当の姿は映らないが、気分が乗るからという理由で可愛らしい変身服に身を包んでいた。"
translation = "방송 시에는 루루카의 실제 모습은 찍히지 않지만, 기분이 난다는 이유로 귀여운 변신복을 몸에 걸치고 있었다."

[[dialogue]]
speaker = "unk"
original = "てきぱきと作業をこなした為か、撮影はあっという間に終了。思いがけず時間がたっぷりと余ってしまった。"
translation = "척척 작업을 해낸 덕분인지, 촬영은 순식간에 종료. 생각지도 못하게 시간이 듬뿍 남아버렸다."

[[dialogue]]
speaker = "unk"
original = "密室に、恋人同士が２人きり。おまけにルルカは可愛らしいコスチュームを着ている。そんなシチュエーションとくれば──"
translation = "밀실에, 연인끼리 단둘이. 게다가 루루카는 귀여운 코스튬을 입고 있다. 그런 상황이라고 한다면──"

[[dialogue]]
speaker = "ルルカ"
original = "「んんっ<emoji=heart04>\u3000あ、はぁぁ、あっ……<emoji=heart04>\u3000ふぁあ、あぁ<emoji=heart04>」"
translation = "「응읏<emoji=heart04> 아, 하아아, 앗……<emoji=heart04> 화아, 아아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "エッチなことを始めてしまうのも、当然の流れと言えた。"
translation = "엣치한 짓을 시작해버리는 것도, 당연한 흐름이라고 할 수 있었다."

[[dialogue]]
speaker = "ルルカ"
original = "「お兄ちゃん……なんかいつもより勃起するの、早い気がするー……<emoji=heart04>\u3000おち○ぽ、すっごいガチガチ<emoji=heart04>」"
translation = "「오빠…… 왠지 평소보다 발기하는 거, 빠른 것 같아─……<emoji=heart04> 자지, 엄청 딱딱해<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ルルカも。おま○こ、ぬるぬるだぞ」"
translation = "「루루카도. 보지, 미끌미끌하다고」"

[[dialogue]]
speaker = "ルルカ"
original = "「そ、それは……んぅ<emoji=heart04>\u3000仕方ないよぉ……お互いのお部屋以外の場所でエッチするの、初めてだもん……ふぁあん<emoji=heart04>」"
translation = "「그, 그건…… 응으<emoji=heart04> 어쩔 수 없잖아아…… 서로의 방 이외의 장소에서 엣치하는 거, 처음인걸…… 화아앙<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「えへ……さっきまで撮影に使ってたカメラ、そのまんま置いてあるのも変な感じ……<emoji=heart04>\u3000エッチなビデオの撮影みたい<emoji=heart04>」"
translation = "「에헤…… 아까까지 촬영에 쓰던 카메라, 그대로 놓여 있는 것도 이상한 기분……<emoji=heart04> 엣치한 비디오 촬영 같아<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「──せっかくだから、カメラ使ってみるか？」"
translation = "「──기왕 이렇게 된 거, 카메라 써볼까?」"

[[dialogue]]
speaker = "ルルカ"
original = "「えっ、ええっ！？\u3000そ、それは流石に恥ずかしいかも……」"
translation = "「엣, 에엣!? 그, 그건 역시 부끄러울지도……」"

[[dialogue]]
speaker = "ルルカ"
original = "「んくっ、はぁ……<emoji=heart04>\u3000で、でも、リスナーの人たちに見られてると思うと、ちょっとだけ興奮しちゃう、かも。……もちろん、本当には絶対、しないけどぉ」"
translation = "「응긋, 하아……<emoji=heart04> 하, 하지만, 리스너 사람들이 보고 있다고 생각하면, 조금 아주 조금 흥분될지도. ……물론, 진짜로는 절대, 안 하겠지만 말야아」"

[[dialogue]]
speaker = "ルルカ"
original = "「じゃ、じゃあ♪\u3000……せっかくだし、このまましてみよっかな？」"
translation = "「그, 그럼♪ ……기왕 하는 거, 이대로 해볼까나?」"

[[dialogue]]
speaker = "ルルカ"
original = "「Ｖチューバー『汐ルカルカ』の……秘密の裏配信♪\u3000えへっ、ちょっと変態っぽいシチュだけど……<emoji=heart04>」"
translation = "「VTuber 『시오 루카루카』의…… 비밀 뒷방송♪ 에헷, 조금 변태 같은 상황이지만……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「じゃーあ。今から配信開始、ってことで。ロールプレイ、開始……♪」"
translation = "「그으럼. 지금부터 방송 개시, 인 걸로. 롤플레이, 시작……♪」"

[[dialogue]]
speaker = "ルルカ"
original = "「んーっと……。や、やっほぉ～<emoji=heart04>\u3000あ、ぁ、んぅ<emoji=heart04>\u3000んふぁっ、はあっ、はああっ<emoji=heart04>」"
translation = "「으음…… 야, 야호오~<emoji=heart04> 아, 아, 응으<emoji=heart04> 응화앗, 하앗, 하아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「リスナーのお兄ちゃん、お姉ちゃん<emoji=heart04>\u3000お、おはルルカぁ～っ<emoji=heart04>\u3000汐、ルカルカ、でぇ～すっ<emoji=heart04>」"
translation = "「리스너 오빠들, 언니들<emoji=heart04> 오, 오하 루루카아~<emoji=heart04> 시오 루카루카, 입니~다앗<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「メンバー限定配信に来てくれてっ、ぁ、んっ<emoji=heart04>\u3000ありがとぉ<emoji=heart04>」"
translation = "「멤버 한정 방송에 와줘서, 아, 응<emoji=heart04> 고마워어<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「んぅ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000今日はみんなに重大発表があってぇ……突然だけど、レンタルスタジオからお送りすることに、しましたぁ～<emoji=heart04>」"
translation = "「응으<emoji=heart04> 앙<emoji=heart04> 오늘은 모두에게 중대 발표가 있어서어…… 갑작스럽지만, 렌탈 스튜디오에서 보내드리기로, 했습니당~<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「今、ルカルカのこと、後ろからぎゅうぅって抱きしめてくれてる人がいるんだけど～……え、えへへ<emoji=heart04>\u3000この人、ルカルカの、彼氏さん<emoji=heart04>\u3000年上の恋人なの<emoji=heart04>」"
translation = "「지금, 루카루카를 뒤에서 꼬옥 안아주고 있는 사람이 있는데에~…… 에, 에헤헤<emoji=heart04> 이 사람, 루카루카의 남자친구분<emoji=heart04> 연상의 연인이야」"

[[dialogue]]
speaker = "ルルカ"
original = "「今まで秘密にしててごめんね<emoji=heart04>\u3000ん、んぁあっ<emoji=heart04>\u3000Ｖチューバーなのに、アイドルなのに……ファンのみんなを裏切っちゃって、ぇっ……<emoji=heart04>\u3000んっ、ふああっ<emoji=heart04>」"
translation = "「지금까지 비밀로 해서 미안해<emoji=heart04> 응, 응아앗<emoji=heart04> VTuber인데, 아이돌인데…… 팬 여러분을 배신해버려서, 엣……<emoji=heart04> 응, 후아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「あっ、はぁっ、はあっ……<emoji=heart04>\u3000そのお詫びにぃ、今日はぁっ……大好きな恋人お兄ちゃんとの、ハメ撮り配信、しちゃいまぁすっ<emoji=heart04>」"
translation = "「앗, 하앗, 하앗……<emoji=heart04> 그 사죄의 의미로오, 오늘은으으윽…… 정말 좋아하는 연인 오빠와의, 섹스 영상 방송, 해버릴게요옷<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「えへっ、えへへっ<emoji=heart04>\u3000い～っぱい、見ていってね<emoji=heart04>\u3000ん、んんぅっ<emoji=heart04>\u3000ふぅ、ぁっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>」"
translation = "「에헷, 에헤헷<emoji=heart04> 마~니, 보고 가줘<emoji=heart04> 응, 응응으윽<emoji=heart04> 후우, 앗<emoji=heart04> 아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「お兄ちゃんが手マンしやすいように、おま○こ突き出す恥ずかしいポーズ、ずうっと続けるてるからね<emoji=heart04>\u3000ん、くぅ、ふぅうっ<emoji=heart04>」"
translation = "「오빠가 손만 하기 편하게, 보지 내미는 부끄러운 포즈, 계속하고 있을 테니까<emoji=heart04> 응, 쿠우, 후우우윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "女性器からこぼれ出る愛液を指先ですくい取って、ルルカの大好きなクリトリスを甘く撫でこすっていく。"
translation = "여성기에서 흘러나오는 애액을 손가락 끝으로 떠내어, 루루카가 정말 좋아하는 클리토리스를 달콤하게 문질러 나간다."

[[dialogue]]
speaker = "ルルカ"
original = "「ふやぁあぁあっ<emoji=heart04>\u3000やっ、やぁあんっ<emoji=heart04>\u3000クリ弱いの、弱いから<emoji=heart04>\u3000んぅく、ふぅううっ<emoji=heart04>」"
translation = "「후야아아앗<emoji=heart04> 야, 야아앙앗<emoji=heart04> 클리 약해, 약하니까아<emoji=heart04> 응으쿠, 후우우우윽<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「やぁんっ<emoji=heart04>\u3000コメントすっごい荒れてるー……ごめんねえ、みんなぁ……<emoji=heart04>」"
translation = "「야앙앗<emoji=heart04> 코멘트 엄청 난리 났어─…… 미안해애, 모두들……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「彼氏いないって宣言してたのにぃ……あれ、嘘だったの<emoji=heart04>\u3000本当は年上の彼氏いるの<emoji=heart04>\u3000いっつも、学園終わったら、エッチしてるの<emoji=heart04>」"
translation = "「남자친구 없다고 선언했었는데에…… 그거, 거짓말이었어<emoji=heart04> 사실은 연상의 남자친구 있어<emoji=heart04> 어언제나, 학교 끝나면, 엣치하고 있어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "真っ赤な顔と、とろけた眼差しのルルカはカメラから目線を離さない。"
translation = "새빨개진 얼굴과, 황홀해진 눈빛의 루루카는 카메라에서 시선을 떼지 않는다."

[[dialogue]]
speaker = "unk"
original = "ルカルカになりきって、架空のコメントを読んでいるみたいだ。"
translation = "루카루카가 된 기분으로, 가상의 코멘트를 읽고 있는 모양이다."

[[dialogue]]
speaker = "ルルカ"
original = "「『どこの誰だよその男』って、い、言われてもぉっ<emoji=heart04>\u3000ひみつ～♪\u3000内緒、だよぉ<emoji=heart04>\u3000ん、ふぁっ、はああっ、んぅぅぅ<emoji=heart04>」"
translation = "「『어디 사는 누구야 그 남자』라고, 마, 말해도옷<emoji=heart04> 비밀~♪ 내숭, 이야아<emoji=heart04> 응, 화앗, 하아앗, 응으으으<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「お兄ちゃんのお顔はぁ、配信ではうつりません～<emoji=heart04>\u3000んふっ、ふあっ、んんっ<emoji=heart04>\u3000はぁ、はぁ、んっ、んぅっ～<emoji=heart04>」"
translation = "「오빠 얼굴으은, 방송에서는 안 나와요~<emoji=heart04> 응훗, 후앗, 응응<emoji=heart04> 하아, 하아, 응, 응으윽~<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「えへへ……ルカルカのおっぱいと、おま○こは配信できるけどぉ<emoji=heart04>\u3000恋人のお兄ちゃんだけはぜ～ったい、映せないの<emoji=heart04>\u3000ごめんね<emoji=heart04>」"
translation = "「에헤헤…… 루카루카의 가슴이랑, 보지는 방송할 수 있지만아<emoji=heart04> 연인인 오빠만은 저얼~대, 비출 수 없어<emoji=heart04> 미안해<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「『俺もお兄ちゃんだぞ』って言われてもぉ……そんなの困るよぉ<emoji=heart04>\u3000んぅう……<emoji=heart04>」"
translation = "「『나도 오빠라고』라고 말해도오…… 그런 건 곤란해애<emoji=heart04> 응으으……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「ルカルカがエッチしたいって思うのは、このおっきなおち○ぽ持ってる、お兄ちゃんだけなの<emoji=heart04><emoji=heart04>」"
translation = "「루카루카가 엣치하고 싶다고 생각하는 건, 이 커다란 자지를 가진, 오빠뿐인걸<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「コンドーム着けてない、ナマのおち○ぽ<emoji=heart04>\u3000ルカルカのおま○こにずぶ～ってしてもいいのは──恋人のお兄ちゃんだけ<emoji=heart04>」"
translation = "「콘돔 안 낀, 생자지<emoji=heart04> 루카루카의 보지에 즈부우─ 하고 넣어도 되는 건── 연인인 오빠뿐<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「ふぇあっ<emoji=heart04>\u3000ふぇあぁぁあっ<emoji=heart04>\u3000挿入っちゃった、ああぁ<emoji=heart04>」"
translation = "「훼앗<emoji=heart04> 훼아아아앗<emoji=heart04> 삽입해버렸어, 아아아<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「み、見えたぁ？\u3000そ、そうだよぉっ……んっ、はっ、はあっ<emoji=heart04>\u3000このおち○ぽ、だけ、なんだぁ～<emoji=heart04>」"
translation = "「보, 보였어? 그, 그래애…… 응, 핫, 하앗<emoji=heart04> 이 자지, 뿐, 이라구우~<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「カメラの向こうのお兄ちゃんたちはぁ、ここぉ<emoji=heart04>\u3000ち○ぽ咥えてる、ルカルカのちっちゃな割れ目、見ながらぁっ……シコシコ、しててぇ<emoji=heart04>」"
translation = "「카메라 너머의 오빠들은으, 여기이<emoji=heart04> 자지 물고 있는, 루카루카의 조그만 갈라진 틈, 보면서어…… 자위, 하고 있어줘어<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ルカルカ……初めてのハメ撮りエッチなのに、ずいぶん台詞がこなれてる感じがするんだが？」"
translation = "「루루카…… 첫 섹스 영상 촬영 엣치인데, 제법 대사가 능숙한 느낌인데?」"

[[dialogue]]
speaker = "ルルカ"
original = "「え、えぇ？\u3000んっ、あっ、あっ、はあぁんっ<emoji=heart04>\u3000あ、そ、そんなこと、はぁっ……<emoji=heart04>」"
translation = "「에, 에에? 응, 앗, 앗, 하아앙앗<emoji=heart04> 아, 그, 그런 거, 하앗……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「もしかして、そういう配信も……ちょっと見てたりする？」"
translation = "「설마, 그런 방송도…… 조금 보고 있거나 해?」"

[[dialogue]]
speaker = "ルルカ"
original = "「ん、んぅ<emoji=heart04>\u3000そのー……そ、それはぁ……<emoji=heart04>」"
translation = "「응, 응으<emoji=heart04> 그게─…… 그, 그건으으윽……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「こっそりエッチな配信、見てたんだな？\u3000──お仕置きだ」"
translation = "「몰래 엣치한 방송, 보고 있었구나? ──벌이다.」"

[[dialogue]]
speaker = "ルルカ"
original = "「ひぁぁぁっ<emoji=heart04>！\u3000あっあっあっ<emoji=heart04>\u3000んん、んぅううっ<emoji=heart04>\u3000ご、ごめんなさぁい<emoji=heart04>\u3000み、見てたのっ<emoji=heart04>\u3000そういうエッチな配信も、こっそり、見てたのっ<emoji=heart04>」"
translation = "「히아아앗<emoji=heart04>! 앗앗앗<emoji=heart04> 응응, 응으으윽<emoji=heart04> 죄, 죄송해여어어<emoji=heart04> 보, 보고 있었어어<emoji=heart04> 그런 엣치한 방송도, 몰래, 보고 있었어어<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「く、クリ撫でながら、おち○ぽずぷずぷぅ<emoji=heart04>\u3000ふううぅっ<emoji=heart04>\u3000んーっ<emoji=heart04>\u3000んぅう、んんうぅぅっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「크, 클리 만지면서, 자지 즈푸즈푸우<emoji=heart04> 후우우윽<emoji=heart04> 응─<emoji=heart04> 응으으, 응응으으윽<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ほら。喘いでばっかりじゃなく、ちゃんとカメラの向こうのみんなとお話しして？」"
translation = "「자. 신음만 내지 말고, 제대로 카메라 너머의 모두와 이야기해야지?」"

[[dialogue]]
speaker = "ルルカ"
original = "「う、うんっ<emoji=heart04>\u3000みんな、見てぇ<emoji=heart04>\u3000ルカルカ、この体勢でずぷずぷされるの、好きぃ<emoji=heart04>\u3000好きだからぁ、お顔、ふやけちゃうのぉ<emoji=heart04>」"
translation = "「으, 응<emoji=heart04> 모두들, 봐줘어<emoji=heart04> 루카루카, 이 자세로 즈푸즈푸 당하는 거, 좋아해애<emoji=heart04> 좋아하니까아, 얼굴, 풀려버리는 거야아<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「俺の膝に乗って甘えるの、大好きだもんな？」"
translation = "「내 무릎에 앉아서 어리광 부리는 거, 정말 좋아하잖아?」"

[[dialogue]]
speaker = "ルルカ"
original = "「うんっ<emoji=heart04>\u3000うんっ<emoji=heart04>\u3000好きぃ<emoji=heart04>\u3000大好きぃ<emoji=heart04>\u3000はあっ、はあああっ、んふぁっ、ふあぁぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「응<emoji=heart04> 응<emoji=heart04> 좋아해애<emoji=heart04> 정말 좋아해애<emoji=heart04> 하앗, 하아아앗, 응화앗, 후아아앙앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「ルカルカぁ、お兄ちゃんのお膝に座るの、好きなのぉ<emoji=heart04>\u3000ひぁ、あぁ、あぁああっ<emoji=heart04>」"
translation = "「루카루카아, 오빠 무릎에 앉는 거, 좋아하는걸요오<emoji=heart04> 히아, 아아, 아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「動画の編集とかぁ、ちょっとしたお喋り配信とかぁ、お、お兄ちゃんのお膝に座って、やってたのぉ……<emoji=heart04>\u3000はあっ、んくっ、ふぁあっ<emoji=heart04>」"
translation = "「동영상 편집이라든가아, 간단한 잡담 방송 같은 거어, 오, 오빠 무릎에 앉아서, 했었는걸요오……<emoji=heart04> 하앗, 응쿠, 후아앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「本命彼氏とイチャイチャしながら配信してたんだよな？\u3000リスナーに悪いと思わないのか？」"
translation = "「진짜 남자친구랑 꽁냥거리면서 방송하고 있었던 거지? 리스너들에게 미안하다고 생각 안 해?」"

[[dialogue]]
speaker = "ルルカ"
original = "「はああぁぁんっ<emoji=heart04><emoji=heart04>\u3000お、思うぅっ<emoji=heart04>\u3000悪いことしてるぅっ<emoji=heart04>\u3000だからお仕置き、もっとしてぇっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하아아아앙앗<emoji=heart04><emoji=heart04> 새, 생각해애앗<emoji=heart04> 나쁜 짓 하고 있어어앗<emoji=heart04> 그러니까 벌, 더 줘어엇<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「くぅうっ！？<emoji=heart04>\u3000ふおっ？<emoji=heart04>\u3000ふぉ、ぉぁあっ<emoji=heart04>\u3000ひぅ、んんぅっ<emoji=heart04>\u3000や、やばぁ<emoji=heart04>\u3000おち○ぽ、すっごい奥まで、ん、んんぅ～っ<emoji=heart04>」"
translation = "「쿠우우윽!?<emoji=heart04> 후오?<emoji=heart04> 후오, 오아앗<emoji=heart04> 히우, 응응으윽<emoji=heart04> 야, 야바아<emoji=heart04> 자지, 엄청 깊숙이까지, 응, 응응으으~윽<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ほら、もっと股、開いて。いっぱい見てもらわないとお詫びにならないだろ？」"
translation = "「자, 다리 더 벌리고. 많이 보여주지 않으면 사죄가 안 되잖아?」"

[[dialogue]]
speaker = "ルルカ"
original = "「う、うぅんっ<emoji=heart04>\u3000いっぱい見てぇ<emoji=heart04>\u3000カメラの、んぅ、向こうのっ、あ、ぅうう、ふぅっ<emoji=heart04>\u3000お兄ちゃんたち、ぃっ……あ、んぅ、うぅ<emoji=heart04>！」"
translation = "「으, 으응<emoji=heart04> 많이 봐줘어<emoji=heart04> 카메라의, 응으, 너머에 있는으윽, 아, 우우우, 후우<emoji=heart04> 오빠들으을, 이잇…… 아, 응, 우으, 우으<emoji=heart04>!」"

[[dialogue]]
speaker = "ルルカ"
original = "「ルカルカの、ちっちゃなおま○こ、と、とろとろぉっ……<emoji=heart04>\u3000はあっ、はぁん<emoji=heart04>\u3000恋人ち○ぽ呑み込んで、きゅうきゅう、締めちゃう、ふう、ふぅうぅうっ<emoji=heart04>」"
translation = "「루카루카의, 조그만 보지, 가, 가아, 녹진녹진해애……<emoji=heart04> 하앗, 하앙<emoji=heart04> 연인의 자지 삼키고, 꽉꽉, 조여버려어, 후우, 후우우우윽<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「はぁ、はぁあっ……い、い～っぱい、シコシコしてぇ<emoji=heart04>\u3000ルカルカをオカズに、おち○ぽっ、シコシコ、してぇっ<emoji=heart04>」"
translation = "「하아, 하아앗…… 마, 마~니 자위해줘어<emoji=heart04> 루카루카를 반찬 삼아, 자지이, 시코시코, 해줘어엇<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「ああぁ、『俺もルカルカとやりたい』……って言われてもぉ、駄目だよぉ<emoji=heart04>\u3000ルカルカのおま○こは、このお兄ちゃん、んぅぅ<emoji=heart04>\u3000専用だからぁ<emoji=heart04>」"
translation = "「아아아, 『나도 루카루카랑 하고 싶다』……고 말해도오, 안 돼애<emoji=heart04> 루카루카의 보지는, 이 오빠, 응으으<emoji=heart04> 전용이니까아<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「はぁあ、ふぅうっ、ふぅうっ、ふぅうーっ……<emoji=heart04>\u3000お兄ちゃんのおち○ぽ、すっごいよぉっ……<emoji=heart04>」"
translation = "「하아아, 후우우, 후우우, 후우우─윽……<emoji=heart04> 오빠 자지, 굉장해애……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「あっ、あっ、はああっ<emoji=heart04>\u3000んくっ、ふあっ、ひぅ、んくう<emoji=heart04>\u3000気持ちいいとこ、ずりずり当たるの、ずぅっと、あ、当たるのぉっ<emoji=heart04>」"
translation = "「앗, 앗, 하아앗<emoji=heart04> 응쿠, 후앗, 히우, 응쿠우<emoji=heart04> 기분 좋은 곳, 드륵드륵 닿아, 계에속, 아, 닿아아아<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「エッチ気持ちいい、気持ちいいからっ<emoji=heart04>\u3000じっくり、楽しみたいのにっ──<emoji=heart04><emoji=heart04>\u3000んっ、ふあっ、はああ<emoji=heart04>\u3000あっ、はあっ、あっ、ああっ、んっ、ふああっ<emoji=heart04><emoji=heart04>！」"
translation = "「엣치 기분 좋아, 기분 좋으니까아<emoji=heart04> 느긋하게, 즐기고 싶은데에──<emoji=heart04><emoji=heart04> 응, 후앗, 하아아<emoji=heart04> 앗, 하앗, 앗, 아앗, 응, 후아앗<emoji=heart04><emoji=heart04>!」"

[[dialogue]]
speaker = "unk"
original = "ルルカの女性器がぎゅぎゅっと締め付けて……『おねだり』をしてくる。"
translation = "루루카의 보지가 꽉꽉 조여오며…… 『조르기』를 해온다."

[[dialogue]]
speaker = "unk"
original = "だから俺も、ピストンに少し力を込めることにした。"
translation = "그래서 나도, 피스톤질에 조금 힘을 싣기로 했다."

[[dialogue]]
speaker = "ルルカ"
original = "「ふぁぁあぁあっ<emoji=heart04>\u3000あーっ<emoji=heart04>\u3000あっあっあっ<emoji=heart04>\u3000すごいっ、おち○ぽ、ずんずん、来てるっ<emoji=heart04>\u3000ひぁ、ひぁぁあぁあ～っ<emoji=heart04>」"
translation = "「후아아아아앗<emoji=heart04> 아─앗<emoji=heart04> 앗 앗 앗<emoji=heart04> 굉장해, 자지, 쿡쿡, 들어오고 있어<emoji=heart04> 히아, 히아아아아아~<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「お、お兄ちゃっ、おち○ぽっ<emoji=heart04>\u3000あぅ<emoji=heart04>\u3000すごっ<emoji=heart04>\u3000お、奥ぅっ──んぁ、ぁ、ぁ、ぁ──ふああっ<emoji=heart04>\u3000！そこ駄目、おち○ぽでとんとん、駄目、駄目ぇ<emoji=heart04>！」"
translation = "「오, 오빠아, 자지이<emoji=heart04> 아우<emoji=heart04> 굉장해<emoji=heart04> 기, 깊은 곳──응아, 아, 아, 아──후아앗<emoji=heart04> ! 거기 안 돼, 자지로 툭툭, 안 돼, 안 돼애<emoji=heart04>!」"

[[dialogue]]
speaker = "unk"
original = "駄目、なんて言いながら……ルルカは自らの両膝をしっかりと抱え込む。"
translation = "안 돼, 라고 말하면서도…… 루루카는 자신의 양 무릎을 꽉 껴안는다."

[[dialogue]]
speaker = "unk"
original = "あまりにも可愛いすぎるから、彼女の弱点である耳も舐めてやることにした。"
translation = "너무나도 사랑스럽기에, 그녀의 약점인 귀도 핥아주기로 했다."

[[dialogue]]
speaker = "ルルカ"
original = "「──ひぅうううう！？<emoji=heart04>\u3000ひぁ、ひぁぁぁあっ<emoji=heart04>\u3000お、お兄ちゃっ、お耳らめ、らめぇえっ<emoji=heart04>\u3000あたし、お耳弱い、弱いのぉっ<emoji=heart04>」"
translation = "「──히으으으으으!?<emoji=heart04> 히아, 히아아아앗<emoji=heart04> 오, 오빠아, 귀는 안 돼, 안 돼애앳<emoji=heart04> 나, 귀 약해, 약하단 말야앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「配信でよく耳舐めやってるじゃん？\u3000ほら、奥までずっぷりいくぞ」"
translation = "「방송에서 귀 핥기 자주 하잖아? 자, 깊숙한 곳까지 푹 들어간다」"

[[dialogue]]
speaker = "ルルカ"
original = "「──ぁ、ぁぁ、ぁあぁああ～っ<emoji=heart04>\u3000へああぁ、ふぇあぁあぁっ<emoji=heart04>\u3000あっあっ<emoji=heart04>\u3000あぁ、ぁあぁあああっ<emoji=heart04>\u3000しゅご、しゅごぃ、いぃいっ<emoji=heart04>」"
translation = "「──아, 아아, 아아아아아~<emoji=heart04> 헤아아, 페아아아앗<emoji=heart04> 앗 앗<emoji=heart04> 아아, 아아아아아앗<emoji=heart04> 죠아, 죠아아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「ち○ぽ、されながら、お耳ぃ、ぐちゅぐちゅ──んぉっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あぇっ<emoji=heart04>\u3000あぁあ～っ<emoji=heart04>\u3000は、ひぃ、ひぅうっ<emoji=heart04>」"
translation = "「자지, 당하면서, 귀이, 구츄구츄──응옷<emoji=heart04> 앗<emoji=heart04> 아엣<emoji=heart04> 아아아~<emoji=heart04> 하, 히이, 히으으읏<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「頭の中、どろどろに、な、なりゅぅうっ<emoji=heart04>\u3000はぇ、はぇええっ<emoji=heart04>\u3000あぇえっ<emoji=heart04>\u3000変なお顔、しちゃう、カメラに撮られちゃう、うぅうっ<emoji=heart04>」"
translation = "「머릿속이, 녹아내, 릴 것 가태애앳<emoji=heart04> 하에, 하에에엣<emoji=heart04> 아에엣<emoji=heart04> 이상한 표정, 지어버려, 카메라에 찍혀버려, 으으읏<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「あそこ、きゅっきゅって締め付けてきてるな……っ、もうイキそうか？」"
translation = "「거기, 꽉꽉 조여오고 있네…… 하아, 벌써 가버릴 것 같아?」"

[[dialogue]]
speaker = "ルルカ"
original = "「──うんっ<emoji=heart04>\u3000うん、うんっ<emoji=heart04>\u3000イクっ<emoji=heart04>\u3000イっちゃう<emoji=heart04>\u3000もうイクっ、お兄ちゃんのおっきなおち○ぽでイク<emoji=heart04>\u3000イクイク、イクっ<emoji=heart04>」"
translation = "「──응<emoji=heart04> 응, 응<emoji=heart04> 가버려<emoji=heart04> 가버릴 것 같아<emoji=heart04> 이제 가버려, 오빠의 커다란 자지로 가버려<emoji=heart04> 가버려 가버려, 가버렷<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「……大好きだぞ、ルルカ」"
translation = "「……사랑한다, 루루카」"

[[dialogue]]
speaker = "ルルカ"
original = "「あっ、耳元で囁くの、駄目ぇ<emoji=heart04>\u3000お兄ちゃんの声、大好きだからぁ<emoji=heart04>\u3000ドキドキするからぁ<emoji=heart04>\u3000囁くの、駄目、駄目駄目、駄目なの──っ<emoji=heart04><emoji=heart04>」"
translation = "「앗, 귓가에서 속삭이는 거, 안 돼애<emoji=heart04> 오빠 목소리, 정말 좋아하니까아<emoji=heart04> 두근두근거리니까아<emoji=heart04> 속삭이는 거, 안 돼, 안 돼 안 돼, 안 된단 말야──앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「お兄ちゃんの声でイっちゃう、イっちゃう、んはっ、はあっ、はああっ<emoji=heart04><emoji=heart04>\u3000イク、イク、イク、イク～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「오빠 목소리로 가버려, 가버려, 응핫, 하앗, 하아앗<emoji=heart04><emoji=heart04> 가, 가, 가, 가버려어어어어어어어어엇<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「っ……ふぇあぁぁあぁぁぁああああああああ～～～ッ<emoji=heart04><emoji=heart04>」"
translation = "「윽…… 페아아아아아아아아아아아아아아아아아아~~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「ふぅっ<emoji=heart04>\u3000ふうぅうっ<emoji=heart04>\u3000あぁっ<emoji=heart04>\u3000はぅ、うぅうっ<emoji=heart04>\u3000すっごい、出てっ……る、うぅっ……<emoji=heart04>」"
translation = "「후우<emoji=heart04> 후우우읏<emoji=heart04> 아앗<emoji=heart04> 하우, 우우읏<emoji=heart04> 엄청, 나오고 있……어, 으으……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "逃げ場のない彼女をがっちりと固定し、女性器の最奥へ気のすむまで射精を続けた。"
translation = "도망칠 곳 없는 그녀를 단단히 고정하고, 보지의 가장 깊은 곳에 마음이 풀릴 때까지 사정을 계속했다."

[[dialogue]]
speaker = "ルルカ"
original = "「ひっは、あぁあっ……あぁっ<emoji=heart04>\u3000ふぅっ……ふぅうっ……ふぅうーっ……<emoji=heart04>\u3000はぁあーっ……ふぅ、うぅうーっ……<emoji=heart04>」"
translation = "「히하, 아아앗…… 아앗<emoji=heart04> 후우…… 후우우…… 후우우─<emoji=heart04> 하아아─…… 후우, 우우우─……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「お兄ちゃんの精液っ……すっごくいっぱい……はぁあっ……こんなにいっぱい……嬉しい……嬉しいよぉっ……<emoji=heart04>」"
translation = "「오빠의 정액…… 엄청 잔뜩…… 하아앗…… 이렇게나 잔뜩…… 기뻐…… 기뻐어……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ルカルカ。ほら、最後の挨拶しないと」"
translation = "「루카루카. 자, 마지막 인사 해야지」"

[[dialogue]]
speaker = "ルルカ"
original = "「ぁ──はぁ──はぁあっ──う、うんっ……<emoji=heart04>」"
translation = "「아──하아──하아앗──으, 응……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「か、カメラ、ちゃんと見ながら……中出し、されたおま○こも、しっかり、見せつけるようにして……っと<emoji=heart04>」"
translation = "「카, 카메라, 제대로 보면서…… 질내사정, 당한 보지도, 확실히, 보여주듯이…… 하고<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「お、お兄ちゃん、お姉ちゃん……きょ、今日のっ、裏配信っ……楽しめた、かなー……<emoji=heart04>」"
translation = "「오, 오빠, 언니…… 오, 오늘, 뒷방송…… 즐거웠으려나─……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「ルカルカと、このお兄ちゃんのっ……ラブラブ、ドスケベ、ハメ撮り配信っ……リクエストあったら、また、しちゃうかもぉっ……<emoji=heart04>」"
translation = "「루카루카와, 이 오빠의…… 러브러브, 도스케베, 섹스 영상 방송…… 리퀘스트 있으면, 또, 해버릴지도오……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「来て欲しい衣装とか、やって欲しいプレイとかあったら、コメントで教えてねぇ……<emoji=heart04>」"
translation = "「입어줬으면 하는 의상이나, 하고 싶은 플레이 같은 거 있으면, 코멘트로 알려줘어……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「だ、だいたいのプレイはもう経験済み、だからぁ<emoji=heart04>\u3000えっちぃ配信、で、できると、思うからぁ……<emoji=heart04>」"
translation = "「대, 대부분의 플레이는 이미 경험 완료, 니까아<emoji=heart04> 야한 방송, 할 수 있을 거라, 생각하니까아……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「じゃ、じゃぁ<emoji=heart04>\u3000今日はこのあたりで、おしまい<emoji=heart04>\u3000動画の高評価、お気に入り登録、お願いしまぁす……<emoji=heart04>」"
translation = "「그, 그럼<emoji=heart04> 오늘은 이쯤에서, 끝<emoji=heart04> 영상 고평가, 즐겨찾기 등록, 부탁드려요오……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「それじゃあ、またねぇっ……<emoji=heart04>\u3000ん、んぅ<emoji=heart04>\u3000お、おつルカ～っ……<emoji=heart04>」"
translation = "「그럼, 다음에 봐아……<emoji=heart04> 응, 응으<emoji=heart04> 오, 오츠루카~……<emoji=heart04>」"

