[[dialogue]]
speaker = "unk"
original = "第３話,トリシャの変化,P"
translation = "제3화, 트리샤의 변화, P"

[[dialogue]]
speaker = "unk"
original = "それは、水着コンテストが終わって後日のこと──"
translation = "그것은, 수영복 콘테스트가 끝나고 며칠 뒤의 일──"

[[dialogue]]
speaker = "トリシャ"
original = "「ふふ……にへ……にへへ……」"
translation = "「후후…… 헤헤…… 헤헤헤……」"

[[dialogue]]
speaker = "unk"
original = "嬉しいことでも？"
translation = "기쁜 일이라도?"

[[dialogue]]
speaker = "unk"
original = "どうしました？"
translation = "무슨 일이에요?"

[[dialogue]]
speaker = "トリシャ"
original = "「ふふふ……実は、ですね」"
translation = "「후후후…… 사실은, 말이죠」"

[[dialogue]]
speaker = "トリシャ"
original = "「水着コンテストが終わってから……学園を歩いていると、見知らぬ子たちから話しかけられることが増えまして」"
translation = "「수영복 콘테스트가 끝나고 나서…… 학원을 걷다 보면, 모르는 아이들이 말을 걸어오는 일이 늘어서요」"

[[dialogue]]
speaker = "トリシャ"
original = "「何人か……新たにお友達が増えたのです。にへへ」"
translation = "「몇 명인가…… 새로 친구가 늘었답니다. 헤헤」"

[[dialogue]]
speaker = "トリシャ"
original = "「今までは……占いのお願いをされることが多かったのですが……」"
translation = "「지금까지는…… 점을 쳐달라는 부탁을 받는 일이 많았습니다만……」"

[[dialogue]]
speaker = "トリシャ"
original = "「コンテストの後は私のことについてよく聞かれるようになりました。出身地や、なぜ占いを始めたのか、など……」"
translation = "「콘테스트 후에는 저에 대해서 자주 질문받게 되었습니다. 출신지나, 왜 점술을 시작했는지, 등등……」"

[[dialogue]]
speaker = "トリシャ"
original = "「私は学園生ではありませんのに、皆さん、とても良くしてくださって……」"
translation = "「저는 학원생이 아닌데도, 여러분, 정말 잘 대해주셔서……」"

[[dialogue]]
speaker = "トリシャ"
original = "「それと──妙に体のことについて聞かれるようになりました。私のスタイルの秘訣？\u3000など……」"
translation = "「그리고── 묘하게 몸에 대해서 질문받게 되었습니다. 제 스타일의 비결? 같은 것들……」"

[[dialogue]]
speaker = "トリシャ"
original = "「とはいえ、私も特に気を遣っているわけではないので……回答には少々困ってしまいました」"
translation = "「그렇다고는 해도, 저도 딱히 신경을 쓰고 있는 건 아니라서…… 답변하기엔 조금 곤란해졌습니다」"

[[dialogue]]
speaker = "トリシャ"
original = "「特別なことというと、占いですが……これが身体の発育に影響を与えてきたとは思いませんし……」"
translation = "「특별한 것이라고 하면 점술입니다만…… 이것이 신체 발육에 영향을 주었다고는 생각지 않고요……」"

[[dialogue]]
speaker = "unk"
original = "美ボディだ"
translation = "아름다운 몸매야"

[[dialogue]]
speaker = "unk"
original = "天然ものだ"
translation = "천연이네"

[[dialogue]]
speaker = "トリシャ"
original = "「そう……なのでしょうか」"
translation = "「그……런 것일까요」"

[[dialogue]]
speaker = "トリシャ"
original = "「そもそも、私の体なんて、何も面白いことはありませんのに……人間界では興味の対象となるのですね。不思議です」"
translation = "「애초에, 제 몸 따위, 아무런 재미있는 구석도 없는데…… 인간계에서는 흥미의 대상이 되는군요. 신기합니다」"

[[dialogue]]
speaker = "unk"
original = "トリシャさんは、未だ自分のボディの強烈さには無自覚のようだった。"
translation = "트리샤 씨는, 아직 자신의 몸매가 가진 강렬함에는 무자각한 듯했다."

[[dialogue]]
speaker = "トリシャ"
original = "「それにしても……人間界に来て、楽しいことばかりです」"
translation = "「그건 그렇고…… 인간계에 와서, 즐거운 일들뿐이에요」"

[[dialogue]]
speaker = "トリシャ"
original = "「お正月も体験しましたし、初めての海も楽しむことができました」"
translation = "「하츠모데도 체험했고, 처음 가본 바다도 즐길 수 있었습니다」"

[[dialogue]]
speaker = "トリシャ"
original = "「人間界の季節について……私も、たくさんの文化を知ることができました。ふふ……あなたのおかげです」"
translation = "「인간계의 계절에 대해서…… 저도, 많은 문화를 알 수 있었습니다. 후후…… 당신 덕분이에요」"

[[dialogue]]
speaker = "unk"
original = "どんどん経験しよう"
translation = "점점 더 경험하자"

[[dialogue]]
speaker = "unk"
original = "他のイベントも"
translation = "다른 이벤트도"

[[dialogue]]
speaker = "トリシャ"
original = "「ふふふ……そうですね。こちらには、まだまだ多くのイベントがあると聞きました」"
translation = "「후후후…… 그렇네요. 이곳에는, 아직 많은 이벤트가 있다고 들었습니다」"

[[dialogue]]
speaker = "トリシャ"
original = "「暦に合わせて行われる風習。それは……占いにも通じるものがあります」"
translation = "「달력에 맞춰 행해지는 풍습. 그것은…… 점술과도 통하는 면이 있습니다」"

[[dialogue]]
speaker = "アポロ"
original = "「──あ！\u3000あんなところに魔王とトリシャがいるぞ」"
translation = "「──아! 저기 마왕이랑 트리샤가 있잖아!」"

[[dialogue]]
speaker = "ルリエル"
original = "「あ、ほんとです！」"
translation = "「아, 정말이에요!」"

[[dialogue]]
speaker = "トリシャ"
original = "「おや……アポロさんに、ルリエルさん」"
translation = "「어라…… 아폴로 씨에, 루리엘 씨」"

[[dialogue]]
speaker = "アポロ"
original = "「あたしら、いま鬼ごっこで鬼から逃げてる最中なんだ！\u3000ちょっとばかし隠れさせてくれ！」"
translation = "「우리, 지금 술래잡기에서 술래한테 도망치는 중이야! 잠깐만 숨겨줘!」"

[[dialogue]]
speaker = "ルリエル"
original = "「ここはなんとか安全そうですね。休憩いたしましょう」"
translation = "「여기는 어떻게든 안전해 보이네요. 휴식하도록 하죠」"

[[dialogue]]
speaker = "unk"
original = "鬼は誰なの？"
translation = "술래는 누구야?"

[[dialogue]]
speaker = "アポロ"
original = "「ユウリだ！\u3000あたしが冷蔵庫のアイス勝手に食べたら、すごい形相で追いかけてきてな」"
translation = "「유우리다! 내가 냉장고 아이스크림을 멋대로 먹었더니, 엄청난 형상으로 쫓아와서 말이야」"

[[dialogue]]
speaker = "ルリエル"
original = "「なぜか一緒にいたわたしまで追い回されているんです～」"
translation = "「어째서인지 같이 있던 저까지 쫓기고 있다니까요~」"

[[dialogue]]
speaker = "トリシャ"
original = "「それは……鬼ごっこではなく、ただ怒らせてしまっただけではないのでしょうか……？」"
translation = "「그건…… 술래잡기가 아니라, 그냥 화나게 해버린 것뿐 아닐까요……?」"

[[dialogue]]
speaker = "アポロ"
original = "「ま、そういうことだから次のゲームからはトリシャも一緒にやろうぜ！\u3000魔王もな！」"
translation = "「뭐, 그렇게 됐으니까 다음 게임부터는 트리샤도 같이 하자고! 마왕도 말이야!」"

[[dialogue]]
speaker = "ルリエル"
original = "「はい！\u3000会長さんも、よろしければ！」"
translation = "「네! 회장님도, 괜찮으시다면!」"

[[dialogue]]
speaker = "トリシャ"
original = "「フフフ……わかりました。後ほど必ず向かいますね……」"
translation = "「후후후…… 알겠습니다. 나중에 반드시 갈게요……」"

[[dialogue]]
speaker = "unk"
original = "アポロとルリエルは休憩を終えると、そのまま鬼から逃げるべく去っていった……。"
translation = "아폴로와 루리엘은 휴식을 마치자, 그대로 술래로부터 도망치기 위해 떠나갔다……."

[[dialogue]]
speaker = "トリシャ"
original = "「にへへ……友達の輪……お２人とも、人間界で出会った新たな絆です。ああ……こういった経験は、今までなかったものですね」"
translation = "「니헤헤…… 친구의 고리…… 두 분 다, 인간계에서 만난 새로운 인연이에요. 아아…… 이런 경험은, 지금까지 없었던 것이네요」"

[[dialogue]]
speaker = "unk"
original = "トリシャさんの人柄"
translation = "트리샤 씨의 인품"

[[dialogue]]
speaker = "unk"
original = "よかった"
translation = "다행이다"

[[dialogue]]
speaker = "トリシャ"
original = "「ありがとうございます。会長さんと一緒にいると、とても楽しい……です」"
translation = "「감사합니다. 회장님과 함께 있으면, 무척 즐거워……요」"

[[dialogue]]
speaker = "トリシャ"
original = "「ですが……時おり、寂しさを覚えることもあります」"
translation = "「하지만…… 때때로, 외로움을 느낄 때도 있어요」"

[[dialogue]]
speaker = "トリシャ"
original = "「私は……またいつか、旅に出なくてはなりません。いなくなった師を追うために」"
translation = "「저는…… 언젠가 다시, 여행을 떠나야만 해요. 사라진 스승님을 쫓기 위해서」"

[[dialogue]]
speaker = "トリシャ"
original = "「今の楽しいひとときにもまた、別れがくるかと思うと……ナーバスになってしまいますね」"
translation = "「지금의 즐거운 한때에도 다시, 이별이 올 거라 생각하면…… 초조해져 버리네요」"

[[dialogue]]
speaker = "トリシャ"
original = "「今後、私が寂しさに耐えられるのか……占ってみましょうか……」"
translation = "「앞으로, 제가 외로움을 견딜 수 있을지…… 점쳐 볼까요……?」"

[[dialogue]]
speaker = "トリシャ"
original = "「……え？\u3000占う必要はない？」"
translation = "「……에? 점칠 필요는 없다구요?」"

[[dialogue]]
speaker = "unk"
original = "一緒についていく"
translation = "함께 따라간다"

[[dialogue]]
speaker = "unk"
original = "どこへでも"
translation = "어디까지라도"

[[dialogue]]
speaker = "トリシャ"
original = "「会長さん……」"
translation = "「회장님……」"

[[dialogue]]
speaker = "トリシャ"
original = "「……にへへ」"
translation = "「……니헤헤」"

[[dialogue]]
speaker = "トリシャ"
original = "「良かったです……大切なあなたがいてくれて。私は、幸せ者ですね」"
translation = "「다행이에요…… 소중한 당신이 있어 주어서. 저는, 행복한 사람이네요」"

