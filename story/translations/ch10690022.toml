[[dialogue]]
speaker = "unk"
original = "第２話,セシアのママ宣言,P"
translation = "제2화, 세시아의 마마 선언, P"

[[dialogue]]
speaker = "unk"
original = "セシアのアプローチ宣言があってから、少し経ったある日のこと。"
translation = "세시아의 어프로치 선언이 있고 나서 얼마간 시간이 흐른 어느 날의 일."

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「会長、人間界では、恋人を持った女性は最終的に『ママ』になるでしょう？」"
translation = "「회장님, 인간계에서는 연인을 가진 여성은 최종적으로 『마마』가 되죠?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「なら、わたくしは――」"
translation = "「그렇다면 저는──」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ズバリ、あなたの『ママ』になりたいわ！」"
translation = "「정답은 당신의 『마마』가 되고 싶어요!」"

[[dialogue]]
speaker = "unk"
original = "どういうこと！？"
translation = "무슨 소리야!?"

[[dialogue]]
speaker = "unk"
original = "翌日の朝――"
translation = "다음 날 아침──"

[[dialogue]]
speaker = "？？？"
original = "「もう、疲れていたからって、こんなところで寝ちゃうなんて……」"
translation = "「정말이지, 피곤하다고 이런 데서 잠들어 버리다니……」"

[[dialogue]]
speaker = "？？？"
original = "「起きて、会長。朝よ」"
translation = "「일어나세요, 회장님. 아침이에요」"

[[dialogue]]
speaker = "unk"
original = "ん……母さん？"
translation = "음…… 엄마?"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「そう、わたくしがあなたのママよ♪」"
translation = "「그래요, 제가 당신의 마마예요♪」"

[[dialogue]]
speaker = "unk"
original = "セシア！？\u3000なんでここに！？"
translation = "세시아!? 왜 여기 있어!?"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ふふっ、昨日言ったでしょう？\u3000会長のママになるって」"
translation = "「후후, 어제 말했잖아요? 회장님의 마마가 되겠다고」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「わたくしが将来、本当のママになる為の予行練習――つまりは、将来を見据えた蓄積ということね♪」"
translation = "「제가 장래에 진짜 마마가 되기 위한 예행연습── 즉, 미래를 내다본 축적이라는 거죠♪」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「セシアちゃん、クロトは起きたかしら～？」"
translation = "「세시아 짱, 쿠로토는 일어났니~?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「あっ、リノママ～♪\u3000セシア、ちゃんと会長を起こせたわ♪」"
translation = "「앗, 리노 마마~♪ 세시아, 제대로 회장님을 깨웠어요♪」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「あら～、セシアちゃん、よくできました♪\u3000よしよし～♪」"
translation = "「어머나~, 세시아 짱, 잘했구나♪ 착하지 착해~♪」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「えへへ～<emoji=heart04>\u3000ママに褒められて、セシアとっても嬉しいわ<emoji=heart04>」"
translation = "「에헤헤~<emoji=heart04> 마마한테 칭찬받아서 세시아 정말 기뻐요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "子供みたいに甘えているというカオス！"
translation = "아이처럼 어리광부리고 있다는 카오스!"

[[dialogue]]
speaker = "unk"
original = "ママがママに"
translation = "마마가 마마에게"

[[dialogue]]
speaker = "unk"
original = "――というか、セシアが母さんと会うのは、初めてのはずでは！？\u3000それがいつの間にか仲良くなってる！？"
translation = "──그보다 세시아가 엄마랑 만나는 건 처음일 텐데!? 어느새 그렇게 친해진 거야!?"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「会長、リノママ、とっても素敵なママね♪\u3000わたくし、観察する間もなく出会ってひと目でこの人はママだと直感したわ」"
translation = "「회장님, 리노 마마는 정말 멋진 마마네요♪ 저, 관찰할 것도 없이 만나자마자 한눈에 이 사람은 마마라고 직감했어요」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ふふっ、クロトったら、こういう小さな子がタイプだったのね。大丈夫よ、お母さん――」"
translation = "「후훗, 쿠로토도 참, 이런 어린애가 타입이었구나. 괜찮단다 얘야──」"

[[dialogue]]
speaker = "unk"
original = "母さんはぐっと親指を立てて……"
translation = "엄마는 척 하고 엄지를 치켜세우며……"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「息子がどんな性癖でもちゃんと受け止めるから☆」"
translation = "「아들이 어떤 성벽이든 제대로 받아들여 줄 테니까☆」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「それじゃあリノママ、行ってきま～す♪」"
translation = "「그럼 리노 마마, 다녀오겠습니당♪」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「いってらっしゃ～い♪\u3000また夕食の時にね、セシアちゃん♪」"
translation = "「다녀오렴~♪ 또 저녁때 보자, 세시아 짱♪」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「は～い♪\u3000セシア、学園でお勉強頑張ってくるわ♪」"
translation = "「네에♪ 세시아, 학원에서 공부 열심히 하고 올게요♪」"

[[dialogue]]
speaker = "unk"
original = "夕食も一緒にする流れになってるし！"
translation = "저녁 식사도 같이하는 흐름이 됐어!"

[[dialogue]]
speaker = "unk"
original = "なんか既に"
translation = "뭔가 이미"

[[dialogue]]
speaker = "unk"
original = "母さんとセシアの馴染む速度が異常で、完全に置いてけぼりにされていた。"
translation = "엄마와 세시아의 동화 속도가 이상해서 완전히 소외당하고 있었다."

[[dialogue]]
speaker = "unk"
original = "そうして、俺たちは家を出て、一緒に登校することになり――"
translation = "그렇게 우리들은 집을 나와 함께 등교하게 되었고──"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「会長、手を繋いでもいいかしら？」"
translation = "「회장님, 손을 잡아도 될까요?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「――ありがとう♪\u3000じゃあ、繋ぐわね」"
translation = "「──고마워요♪ 그럼 잡을게요」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ん……♪\u3000ふふっ、こうして繋ぐのはデートの時以来ね」"
translation = "「음……♪ 후후, 이렇게 잡는 건 데이트 때 이후네요」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「やっぱり、リノママの手とは違う感じがするわ。それと……この前ともちょっと違う感じがする」"
translation = "「역시 리노 마마의 손과는 다른 느낌이 들어요. 그리고…… 저번이랑도 조금 다른 느낌이 들어」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「――今日はわたくしがママになっているからかしら？\u3000なんだか……」"
translation = "「──오늘은 제가 마마가 되어 있어서일까요? 왠지……」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「嬉しいのと同時に、ドキドキするの♪」"
translation = "「기쁜 것과 동시에 두근거려요♪」"

[[dialogue]]
speaker = "unk"
original = "その言葉に、俺はまたドキッとしてしまう。"
translation = "그 말에 나는 또 가슴이 철렁한다."

[[dialogue]]
speaker = "unk"
original = "それから学園が近づいてくると、周りの視線が増えてきて、気恥ずかしく感じたりしたのだが――"
translation = "그리고 학원이 가까워지자 주변의 시선이 늘어나서 쑥스럽게 느껴지기도 했지만──"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「～～♪\u3000～～～♪」"
translation = "「~~♪ ~~~♪」"

[[dialogue]]
speaker = "unk"
original = "（まぁ、セシアが楽しそうだし、いっか）"
translation = "（뭐, 세시아가 즐거워 보이니까 됐나）"

[[dialogue]]
speaker = "unk"
original = "上機嫌に鼻唄を歌うセシアを見ていると、そんな気になって、結局学園に着くまでそのまま手を繋いで歩き続けたのだった――"
translation = "기분 좋게 콧노래를 부르는 세시아를 보고 있자니 그런 마음이 들어, 결국 학원에 도착할 때까지 그대로 손을 잡고 계속 걸었다──"

[[dialogue]]
speaker = "unk"
original = "その日の放課後。"
translation = "그날 방과 후."

[[dialogue]]
speaker = "unk"
original = "俺はセシアと２人で夕食の買い物をして帰ることになった。"
translation = "나는 세시아와 둘이서 저녁거리를 장보고 돌아가게 되었다."

[[dialogue]]
speaker = "unk"
original = "母さんからＤＩＳＣの通知が届いて、頼まれたのだ。"
translation = "엄마한테 DISC 알림이 와서 부탁받은 것이다."

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「会長、買い物袋を持ってくれてありがとう♪」"
translation = "「회장님, 장바구니 들어줘서 고마워요♪」"

[[dialogue]]
speaker = "unk"
original = "どういたしまして"
translation = "천만에"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ふふっ♪\u3000こうして一緒に買い物をして歩いていると、ママになったって感じがするわ♪」"
translation = "「후훗♪ 이렇게 함께 장을 보고 걸으니 마마가 된 느낌이 들어요♪」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「夫婦ってもしかして、こんな感じなのかしら？\u3000……って、あら？」"
translation = "「부부라는 건 혹시 이런 느낌일까요? ……어라?」"

[[dialogue]]
speaker = "unk"
original = "ふと、セシアの視線がある方向に向く。"
translation = "문득 세시아의 시선이 어느 한 방향을 향한다."

[[dialogue]]
speaker = "unk"
original = "そこにはセシアよりも小さな女の子が、１人で辺りをキョロキョロしながら歩いていた。"
translation = "그곳에는 세시아보다 작은 여자아이가 혼자서 주변을 두리번거리며 걷고 있었다."

[[dialogue]]
speaker = "unk"
original = "セシアはその子の近くへ歩いて行き――"
translation = "세시아는 그 아이 가까이로 다가가──"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ねぇ、ちょっといいかしら？」"
translation = "「얘야, 잠시 괜찮겠니?」"

[[dialogue]]
speaker_original = "女の子"
speaker_translation = "여자아이"
original = "「え……？\u3000お、お姉ちゃん、誰……？」"
translation = "「어……? 어, 언니, 누구야……?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「わたくしは――」"
translation = "「나는──」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「通りすがりのママよ」"
translation = "「지나가는 마마야」"

[[dialogue]]
speaker_original = "女の子"
speaker_translation = "여자아이"
original = "「ママを名乗る怪しいヒト……！？」"
translation = "「마마라고 자칭하는 수상한 사람……!?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「それで……もしかしてあなた、迷子だったりするかしら？」"
translation = "「그래서…… 혹시 너, 길을 잃은 거니?」"

[[dialogue]]
speaker = "unk"
original = "その後、女の子から話を聞くと、セシアの予想通り、女の子は買い物中にお母さんとはぐれてしまった迷子だった。"
translation = "그 후 여자아이에게 이야기를 들어보니, 세시아의 예상대로 아이는 장을 보던 중 엄마와 떨어진 미아였다."

[[dialogue]]
speaker = "unk"
original = "セシアはそっと彼女の頭に手を置いて、撫でると――"
translation = "세시아는 살며시 그녀의 머리에 손을 얹고 쓰다듬으며──"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「よく１人で泣かずに頑張ったわね。もう大丈夫よ」"
translation = "「혼자서 울지 않고 잘 버텼구나. 이제 괜찮단다」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「わたくしたちが必ず、あなたのママを見つけてあげるわ」"
translation = "「우리들이 반드시 너의 마마를 찾아줄게」"

[[dialogue]]
speaker = "unk"
original = "それから俺たちは、女の子の話を聞きながら、その辺りを歩いて回った。"
translation = "그 후 우리들은 여자아이의 이야기를 들으며 그 주변을 돌아다녔다."

[[dialogue]]
speaker = "unk"
original = "幸い、すぐに彼女のお母さんは見つかって、事無きを得た。"
translation = "다행히 곧 그녀의 어머니를 찾을 수 있었고, 아무 일 없이 해결되었다."

[[dialogue]]
speaker = "unk"
original = "女の子と別れた直後、セシアは彼女に手を振りながら……"
translation = "여자아이와 헤어진 직후, 세시아는 그녀에게 손을 흔들며……"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「あの子、すぐにママが見つかってよかったわ」"
translation = "「저 아이, 금방 마마를 찾아서 다행이에요」"

[[dialogue]]
speaker = "unk"
original = "そう言って優しく微笑むセシアの横顔は、何だか見惚れてしまうくらい慈愛に満ちていて――"
translation = "그렇게 말하며 부드럽게 미소 짓는 세시아의 옆모습은 왠지 넋을 잃고 볼 정도로 자애가 가득해서──"

[[dialogue]]
speaker = "unk"
original = "……セシア、突然なんだけどさ"
translation = "……세시아, 갑작스럽지만 말이야"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「？\u3000どうしたの、会長？\u3000真剣な顔をして――」"
translation = "「? 왜 그래요, 회장님? 진지한 얼굴을 하고──」"

[[dialogue]]
speaker = "unk"
original = "改めて俺と、恋人として付き合って欲しい"
translation = "정식으로 나랑 연인으로 사귀어 줘"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「え？」"
translation = "「엣?」"

[[dialogue]]
speaker = "unk"
original = "彼女は驚いた顔で目をぱちくりさせて……"
translation = "그녀는 놀란 얼굴로 눈을 깜빡이다가……"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「それはわたくしも望んでいたことだけれど……でも、いきなりどうして？\u3000何かあったの？」"
translation = "「그건 저도 바라던 일이지만…… 하지만 갑자기 왜요? 무슨 일 있었나요?」"

[[dialogue]]
speaker = "unk"
original = "正直、上手く言葉にできないんだ。でも――"
translation = "솔직히 말로 잘 설명은 못 하겠어. 하지만──"

[[dialogue]]
speaker = "unk"
original = "今日、俺はセシアと一緒にいて、セシアのことをもっと知りたいと感じた、と素直な気持ちを話す。"
translation = "오늘 나는 세시아와 함께 있으면서 세시아에 대해 더 알고 싶다고 느꼈다고, 솔직한 마음을 이야기한다."

[[dialogue]]
speaker = "unk"
original = "……ダメかな？"
translation = "……안 될까?"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「――いいえ。そんなことない。わたくし、とっても嬉しいわ」"
translation = "「──아뇨. 그렇지 않아요. 저, 정말 기뻐요」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「今……本当に、心から嬉しい。思わず、踊り出してしまいそうなくらい♪」"
translation = "「지금…… 정말로 진심으로 기뻐요. 나도 모르게 춤이라도 출 것 같을 정도로♪」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「これからもよろしくね、会長」"
translation = "「앞으로도 잘 부탁해요, 회장님」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「恋人としても、素敵な経験を蓄積して行きましょう♪」"
translation = "「연인으로서도 멋진 경험을 축적해 가요♪」"

[[dialogue]]
speaker = "unk"
original = "そうして彼女が浮かべた笑顔に、やっぱり俺は、心惹かれる感じがしていて。"
translation = "그렇게 그녀가 띄운 미소에 역시 나는 마음이 끌리는 느낌이 들어서."

[[dialogue]]
speaker = "unk"
original = "ああ、よろしく、セシア"
translation = "아아, 잘 부탁해, 세시아"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ふふっ♪\u3000今日からわたくしが会長のママね」"
translation = "「후훗♪ 오늘부터 제가 회장님의 마마네요」"

[[dialogue]]
speaker = "unk"
original = "いや、それはちょっと……"
translation = "아니, 그건 좀……"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ええっ！？\u3000恋人になったのに！？」"
translation = "「에엣!? 연인이 됐는데도!?」"

[[dialogue]]
speaker = "unk"
original = "本気で意外そうな顔をする彼女が面白くて、俺は思わず笑ってしまうのだった――"
translation = "진심으로 의외라는 표정을 짓는 그녀가 재미있어서 나는 나도 모르게 웃음을 터뜨리고 말았다──"

