[[dialogue]]
speaker = "unk"
original = "バレンタインの後日。恋人のルルカが俺の家へ遊びにやって来ていた時のこと。"
translation = "발렌타인 후일. 연인인 루루카가 우리 집에 놀러 왔을 때의 일."

[[dialogue]]
speaker = "ルルカ"
original = "「お兄ちゃん<emoji=heart04>\u3000ん～っ……ちゅっ<emoji=heart04>」"
translation = "「오빠<emoji=heart04> 응~…… 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "改めてルルカが手作りしてきてくれたピンク色のハート型ルビーチョコを一緒に味わいながら、甘い香りと共に、俺たちは唇を重ね合っていた。"
translation = "새삼 루루카가 직접 만들어 온 분홍색 하트 모양 루비 초코를 함께 맛보며, 달콤한 향기와 함께 우리들은 입술을 겹치고 있었다."

[[dialogue]]
speaker = "ルルカ"
original = "「んむっ……んちゅっ<emoji=heart04>\u3000ちゅむっ……れろちゅっ<emoji=heart04>\u3000ちゅぱっ……ちゅぷぷっ<emoji=heart04>\u3000れろちゅっ<emoji=heart04>\u3000ちゅむむっ<emoji=heart04>\u3000れるれるっ、ちゅれるっ<emoji=heart04>ちゅるるるっ<emoji=heart04>\u3000ちゅぱぁっ……<emoji=heart04>」"
translation = "「음무…… 응츄<emoji=heart04> 츄무…… 레로츄<emoji=heart04> 츄파…… 츄푸푸<emoji=heart04> 레로츄<emoji=heart04> 츄무무<emoji=heart04> 레루레루, 츄레루<emoji=heart04> 츄루루루<emoji=heart04> 츄파아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "舌を絡め合うキスを交わしたあと、一旦唇を離す。ルルカは余韻を楽しむように、自分の唇をぺろりと舐めながら微笑んだ。"
translation = "혀를 서로 얽는 키스를 나눈 뒤, 일단 입술을 뗀다. 루루카는 여운을 즐기듯 자신의 입술을 낼름 핥으며 미소 지었다."

[[dialogue]]
speaker = "ルルカ"
original = "「はあぁっ……<emoji=heart04>\u3000えへへ<emoji=heart04>\u3000チョコを食べたばかりだから、いつもより甘いキスだったね……<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 에헤헤<emoji=heart04> 초코를 막 먹은 참이라, 평소보다 달콤한 키스였네……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「それで、『試したいこと』っていうのは、一体……？」"
translation = "「그래서, 『시험해 보고 싶은 것』이라는 건, 대체……?」"

[[dialogue]]
speaker = "unk"
original = "イチャイチャして甘いムードに包まれる中、今日も疑似配信エッチをしようという流れになって、ルルカから一緒にチョコを食べてほしいと言われたのだ。"
translation = "꽁냥거리며 달콤한 분위기에 휩싸인 가운데, 오늘도 의사 방송 섹스를 하자는 흐름이 되어, 루루카로부터 함께 초코를 먹어 달라는 말을 들은 것이다."

[[dialogue]]
speaker = "ルルカ"
original = "「えへへ、チョコの効果は、すぐにわかると思うよ<emoji=heart04>\u3000それじゃあ、お兄ちゃん――」"
translation = "「에헤헤, 초코의 효과는 금방 알 수 있을 거라고 생각해<emoji=heart04> 그럼, 오빠――」"

[[dialogue]]
speaker = "ルルカ"
original = "「ルルカとバレンタインのオフパコ配信……しちゃお<emoji=heart04>」"
translation = "「루루카랑 발렌타인 오프파코 방송…… 해버리자<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そうしてルルカは、自身がイメージする仮想空間を展開する能力『ルルカワールド』を発動。"
translation = "그렇게 루루카는 자신이 이미지하는 가상 공간을 전개하는 능력 『루루카 월드』를 발동."

[[dialogue]]
speaker = "unk"
original = "Ｖチューバーとしてチョコ作り配信を行った際の『キッチン』を、周囲に忠実に再現してみせたのだが――"
translation = "V튜버로서 초코 만들기 방송을 진행했을 때의 『키친』을 주위에 충실히 재현해 보였는데――"

[[dialogue]]
speaker = "ルルカ"
original = "「はぁっ、はぁっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふうぅっ……！」"
translation = "「하아, 하아<emoji=heart04> 응<emoji=heart04> 후우……!」"

[[dialogue]]
speaker = "unk"
original = "疑似配信の撮影を始めてまもなく、俺はルルカの様子がなんだかおかしいことに気づいた。"
translation = "의사 방송 촬영을 시작하고 얼마 지나지 않아, 나는 루루카의 상태가 어딘지 이상하다는 것을 깨달았다."

[[dialogue]]
speaker = "クロト"
original = "「どうした……？\u3000なんかルルカ、いつもより興奮してないか？」"
translation = "「왜 그래……? 왠지 루루카, 평소보다 흥분해 있지 않아?」"

[[dialogue]]
speaker = "ルルカ"
original = "「んうぅっ<emoji=heart04>\u3000えっと、実はぁ……<emoji=heart04>\u3000本当はさっきのチョコ、バレンタインフォームの能力で作った、<b>媚薬</b>入りのやつで――」"
translation = "「응우우<emoji=heart04> 저기, 사실은 말이야……<emoji=heart04> 사실 아까 그 초코, 발렌타인 폼의 능력으로 만든, <b>미약</b>이 들어간 거라서――」"

[[dialogue]]
speaker = "クロト"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker = "ルルカ"
original = "「それをお兄ちゃんに食べさせて、発情したところをあたしが手玉に取って……エッチするつもりだったの……<emoji=heart04>」"
translation = "「그걸 오빠한테 먹여서, 발정한 모습을 내가 손바닥 위에서 굴리며…… 섹스할 생각이었는데……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「でも……食べてもらうチョコを間違えて、逆に渡しちゃったみたいで……<emoji=heart04>」"
translation = "「그런데…… 먹어줄 초코를 착각해서, 반대로 건네줘 버린 것 같아서……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「つまり、俺にイタズラしようと思っていたら、<b>自分が</b>媚薬入りの食べて発情してしまった……と？」"
translation = "「그러니까, 나한테 장난을 치려고 하다가, <b>자기가</b> 미약이 든 걸 먹고 발정해 버렸다…… 이거지?」"

[[dialogue]]
speaker = "ルルカ"
original = "「ご、ごめなさいぃっ<emoji=heart04>\u3000お兄ちゃん、お願い……っ<emoji=heart04>\u3000あたし、もう我慢できないくらい、体が熱くなってきててぇ……！」"
translation = "「죄, 죄송해요오<emoji=heart04> 오빠, 부탁이야……<emoji=heart04> 나, 이제 참을 수 없을 정도로 몸이 뜨거워져서어……!」"

[[dialogue]]
speaker = "unk"
original = "事情を理解した俺は、すでにエッチ前の気分になっていたこともあり、少し悪戯心が湧いてきてしまう。"
translation = "사정을 이해한 나는, 이미 섹스 전의 기분이 되어 있었던 것도 있어서, 약간의 장난기가 솟아나고 만다."

[[dialogue]]
speaker = "クロト"
original = "「なら――どうしたいのか、ちゃんとカメラに向かって言わないと」"
translation = "「그럼―― 어떻게 하고 싶은지, 제대로 카메라를 향해서 말해야지.」"

[[dialogue]]
speaker = "ルルカ"
original = "「こ、今回は――」"
translation = "「이, 이번에는――」"

[[dialogue]]
speaker = "ルルカ"
original = "「媚薬チョコで自爆して発情しちゃったあたしに、お兄ちゃんからエッチなお仕置きをしてもらおうと思いますぅっ<emoji=heart04>」"
translation = "「미약 초코로 자폭해서 발정해 버린 저에게, 오빠가 야한 벌을 주셨으면 해요오<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「あっ！？\u3000あっ、あっ……あっ、ああっ、ふああぁぁあああぁっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗!? 앗, 앗…… 앗, 아앗, 후아아아아아아아아<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "と、ルルカはまるで絶頂したかのように背筋を仰け反らせ、体を震わせた。おま○こからは大量の愛液が溢れ、キッチンの床にポタポタと滴り落ちていく。"
translation = "하고, 루루카는 마치 절정이라도 한 것처럼 등줄기를 젖히며 몸을 떨었다. 보지에서는 대량의 애액이 넘쳐흘러, 주방 바닥에 뚝뚝 떨어져 간다."

[[dialogue]]
speaker = "ルルカ"
original = "「も、もうダメっ<emoji=heart04>\u3000お兄ちゃんっ<emoji=heart04>\u3000おち○ぽっ……！」"
translation = "「이, 이제 안 돼<emoji=heart04> 오빠아<emoji=heart04> 자지이……!」"

[[dialogue]]
speaker = "ルルカ"
original = "「――おち○ぽ、欲しいのぉっ！！\u3000おま○こ疼いて、もう我慢できないよぉ～っ<emoji=heart04><emoji=heart04>」"
translation = "「――자지, 갖고 싶어어!! 보지 욱신거려서, 이제 못 참겠어어~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「はぁっ、はぁっ<emoji=heart04>\u3000ルルカの発情おま○こ、もうぐちょぐちょになってるから、お兄ちゃんのおち○ぽ挿れてぇ～っ<emoji=heart04><emoji=heart04>」"
translation = "「하아, 하아<emoji=heart04> 루루카의 발정 보지, 벌써 축축해졌으니까, 오빠 자지 넣어줘어~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はそんなルルカの発情している姿に興奮して、既にガチガチに勃起してしまったペニスを膣穴に擦り付ける。"
translation = "나는 그런 루루카의 발정해 있는 모습에 흥분해서, 이미 딱딱하게 발기해 버린 페니스를 질 구멍에 문지른다."

[[dialogue]]
speaker = "ルルカ"
original = "「お、お兄ちゃん、おま○こ大丈夫だから、早くっ、早くぅ～っ<emoji=heart04>」"
translation = "「오, 오빠, 보지 괜찮으니까, 빨리, 빨리이~<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「いや、これは配信なんだから、ちゃんと丁寧に見せないとダメだろ？」"
translation = "「아니, 이건 방송이니까, 제대로 정중하게 보여주지 않으면 안 되잖아?」"

[[dialogue]]
speaker = "unk"
original = "俺がわざと焦らすように言うと、ルルカは自ら腰を振り、おま○こをペニスに擦り付けながら、懇願するように言う。"
translation = "내가 일부러 애태우듯이 말하자, 루루카는 스스로 허리를 흔들며, 보지를 페니스에 문지르면서 간청하듯 말한다."

[[dialogue]]
speaker = "ルルカ"
original = "「はぁっ、はぁっ<emoji=heart04>\u3000配信プレイはもうどうでもいいからぁっ！\u3000早くおま○こ挿れてよぉ～っ<emoji=heart04>」"
translation = "「하아, 하아<emoji=heart04> 방송 플레이는 이제 어찌 돼도 좋으니까아! 빨리 보지에 넣어줘어~<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「こら！\u3000ルルカは配信者だろ？\u3000ちゃんと配信をやらないなら、挿れてやらないぞ！」"
translation = "「이놈! 루루카는 방송인이잖아? 제대로 방송을 하지 않으면, 안 넣어줄 거야!」"

[[dialogue]]
speaker = "ルルカ"
original = "「やぁっ<emoji=heart04>\u3000ご、ごめなさいぃっ<emoji=heart04>\u3000わかりました！\u3000ちゃんとしますっ！\u3000配信しますからぁっ<emoji=heart04>」"
translation = "「야앗<emoji=heart04> 죄, 죄송해요오<emoji=heart04> 알겠습니다! 제대로 할게요! 방송 할 테니까아<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「なんでもするから、おち○ぽっ<emoji=heart04>\u3000妹おま○こに早く――お兄ちゃんのおち○ぽ挿れて下さいぃぃ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「뭐든지 할 테니까, 자지이<emoji=heart04> 여동생 보지에 빨리―― 오빠 자지 넣어주세요오오~~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「それじゃあ、お仕置きセックスとして、ちゃんと実況するんだぞ！」"
translation = "「그럼, 벌 섹스로서 제대로 실황하는 거다!」"

[[dialogue]]
speaker = "ルルカ"
original = "「あっ――<emoji=heart04><emoji=heart04>」"
translation = "「앗――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「ふああああぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000おち○ぽ入って来たあああぁ～～～～～～んっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 자지 들어왔어어어어어~~어언<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺が熱を帯びたペニスを奥まで挿し込むと、ルルカは甘く甲高い声を漏らして、全身を震わせた。"
translation = "내가 열기를 띤 페니스를 안쪽까지 삽입하자, 루루카는 달콤하고 높은 목소리를 흘리며 전신을 떨었다."

[[dialogue]]
speaker = "ルルカ"
original = "「はぁんっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04>\u3000気持ちいい～～っ<emoji=heart04><emoji=heart04>あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000はああぁ～っ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふあああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「하앙<emoji=heart04> 앗<emoji=heart04> 안<emoji=heart04> 응아아앙<emoji=heart04> 기분 좋아~~앗<emoji=heart04><emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 응아앗<emoji=heart04> 하아아아~앗<emoji=heart04> 응<emoji=heart04> 앗<emoji=heart04> 하아앗<emoji=heart04> 후아아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "まずは浅く挿れるつもりだったのに、ルルカはペニスを根元まで咥え込むように自ら腰を押し付けてくる。"
translation = "처음에는 얕게 삽입할 생각이었는데, 루루카는 페니스를 뿌리까지 물어버리듯 스스로 허리를 밀어붙여 온다."

[[dialogue]]
speaker = "ルルカ"
original = "「はああぁっ<emoji=heart04>\u3000おち○ぽっ<emoji=heart04>\u3000おち○ぽ気持ちいぃ～～っ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000んああぁ～っ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふあぁんっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04>」"
translation = "「하아아앗<emoji=heart04> 자지잇<emoji=heart04> 자지 기분 좋아아~~앗<emoji=heart04><emoji=heart04> 앗<emoji=heart04> 하앙<emoji=heart04> 후아앗<emoji=heart04> 응아아아~앗<emoji=heart04> 응<emoji=heart04> 하아앗<emoji=heart04> 후아앙<emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「お兄ちゃんの極太おち○ぽパコパコするの、堪らないのぉ～っ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んああぁっ<emoji=heart04>\u3000おま○こ気持ちいいよぉ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「오빠의 굵직한 자지로 박아대는 거, 참을 수 없어어~앗<emoji=heart04><emoji=heart04> 앗<emoji=heart04> 안<emoji=heart04> 응아아앗<emoji=heart04> 보지 기분 좋아아~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「こら、これはお仕置き配信なんだから、ちゃんとリスナーさんに向けて実況しなきゃ意味ないだろ？\u3000さもないと、俺もちゃんと動いてやらないぞっ」"
translation = "「이봐, 이건 벌칙 방송이니까, 제대로 리스너분들을 향해 실황하지 않으면 의미 없잖아? 안 그러면 나도 제대로 움직여주지 않을 거야.」"

[[dialogue]]
speaker = "unk"
original = "俺はそう言って、わざと動きを緩め、焦らすように腰を引き気味にする。"
translation = "나는 그렇게 말하며, 일부러 움직임을 늦추고 애태우듯이 허리를 뒤로 뺀다."

[[dialogue]]
speaker = "ルルカ"
original = "「ああぁっ、お兄ちゃん緩めちゃダメぇ<emoji=heart04>\u3000実況っ<emoji=heart04>\u3000ちゃんと実況しますっ<emoji=heart04>\u3000配信するからぁ<emoji=heart04>\u3000もっと妹おま○こ、お仕置きして下さいぃっ！」"
translation = "「아아앗, 오빠 멈추면 안 돼애<emoji=heart04> 실황<emoji=heart04> 제대로 실황할게요<emoji=heart04> 방송할 테니까아<emoji=heart04> 좀 더 여동생 보지, 벌해 주세요오옷!」"

[[dialogue]]
speaker = "ルルカ"
original = "「はぁっ、はぁっ<emoji=heart04>\u3000お兄ちゃんのおち○ぽ、いつもより気持ちいいですぅっ<emoji=heart04>\u3000媚薬でおま○こ、いつもより感じちゃってますぅっ<emoji=heart04><emoji=heart04>」"
translation = "「하앗, 하앗<emoji=heart04> 오빠 자지, 평소보다 기분 좋아여어엇<emoji=heart04> 미약 때문에 보지, 평소보다 더 느껴버리고 있어여어엇<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「発情した妹おま○こ、いつもより敏感で、極太カリにズリズリされると、頭バチバチするくらい気持ちいいですぅ～～っ<emoji=heart04><emoji=heart04>\u3000はぁっ、んっ、あっ<emoji=heart04>\u3000はあぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「발정 난 여동생 보지, 평소보다 민감해서, 굵은 귀두에 문질문질 당하면 머리가 지릿지릿할 정도로 기분 좋아여어어~~엇<emoji=heart04><emoji=heart04> 하앗, 응, 앗<emoji=heart04> 하아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「じゃあ、ここは？」"
translation = "「그럼, 여기는?」"

[[dialogue]]
speaker = "ルルカ"
original = "「あっ！！\u3000そこっ<emoji=heart04>\u3000カリでズリズリされたら、ふあああぁっ<emoji=heart04><emoji=heart04>\u3000おま○この気持ちいいところ、すごく感じちゃうぅっ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んあああぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「앗!! 거기이<emoji=heart04> 귀두로 문질문질 당하니까, 후아아아앗<emoji=heart04><emoji=heart04> 보지의 기분 좋은 곳, 엄청 느껴져어엇<emoji=heart04><emoji=heart04> 앗<emoji=heart04> 하아앗<emoji=heart04> 응아아아아~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はルルカの浅い部分にある敏感なところを狙って、ペニスで何度も擦り上げた。"
translation = "나는 루루카의 얕은 부분에 있는 민감한 곳을 노려, 페니스로 몇 번이고 문질러 올렸다."

[[dialogue]]
speaker = "ルルカ"
original = "「あああっ、ダメダメっ<emoji=heart04><emoji=heart04>\u3000そこ、気持ち良すぎるのぉ<emoji=heart04>\u3000おま○こビクビク感じて、もうイっちゃうぅっ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000ふあああぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「아아앗, 안 돼안 돼앗<emoji=heart04><emoji=heart04> 거기, 너무 기분 좋아아<emoji=heart04> 보지 파들파들 느껴져서, 이제 가버려어엇<emoji=heart04><emoji=heart04> 앗<emoji=heart04> 하앙<emoji=heart04> 응앗<emoji=heart04> 후아아아아~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「なら、リスナーのみんなに、しっかりイキ顔を見せるんだ！」"
translation = "「그럼, 리스너 모두에게 제대로 가버리는 얼굴을 보여주는 거야!」"

[[dialogue]]
speaker = "ルルカ"
original = "「はいぃっ<emoji=heart04>\u3000イキますっ<emoji=heart04>\u3000あっ、イクっ<emoji=heart04>\u3000イクイクイクイクぅっ<emoji=heart04><emoji=heart04>」"
translation = "「네에엣<emoji=heart04> 가요오옷<emoji=heart04> 앗, 가, 가가가가가아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「あ゛っ――イクうううぅぅぅ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふあ゛ああああぁぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아으윽――가아아아아아아아아~~~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 후아아아아아아아아아아~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "全身をぶるぶると震わせ、潮を吹きながら絶頂を迎えるルルカ。だが俺は、そのまま腰を止めずに動かし続ける。"
translation = "전신을 부르르 떨며, 애액을 뿜으면서 절정에 달하는 루루카. 하지만 나는 그대로 허리를 멈추지 않고 계속 움직인다."

[[dialogue]]
speaker = "ルルカ"
original = "「んあ゛ああああっ！？\u3000お兄ちゃん、ダメぇっ<emoji=heart04>\u3000イったばかりで敏感だから、気持ちいいの止まらなくて、またイっちゃううぅっ<emoji=heart04><emoji=heart04>」"
translation = "「응아아아아앗!? 오빠, 안 돼애앗<emoji=heart04> 방금 가버려서 민감하니까, 기분 좋은 게 안 멈춰서, 또 가버려어어엇<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「あっ、あっあっあっ<emoji=heart04>\u3000ふあ゛ああぁ～～っ<emoji=heart04><emoji=heart04>\u3000イクっ<emoji=heart04>\u3000イクイクイクっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗, 앗앗앗앗<emoji=heart04> 후아아아아~~앗<emoji=heart04><emoji=heart04> 가앗<emoji=heart04> 가가가앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「ああああ゛っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000またイクううぅぅーーーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000んあ゛あああああぁぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아아아아윽<emoji=heart04><emoji=heart04><emoji=heart04> 또 가아아아아아아ーーーーーー앗<emoji=heart04><emoji=heart04><emoji=heart04> 응아아아아아아아아아~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ルルカは再び絶頂の波に呑まれ、プシッと音を立てて勢いよく潮を吹いた。"
translation = "루루카는 다시 절정의 파도에 휩쓸려, 푸쉿 소리를 내며 기세 좋게 애액을 뿜었다."

[[dialogue]]
speaker = "ルルカ"
original = "「んっ<emoji=heart04>\u3000はあああぁっ<emoji=heart04><emoji=heart04>\u3000これダメ、セックス気持ちよすぎりゅうぅぅ～～っ<emoji=heart04><emoji=heart04>\u3000ふああぁっ、あっ、あっ、あんっ<emoji=heart04>\u3000はああぁっ<emoji=heart04><emoji=heart04>\u3000あっ、あっ、んああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「응<emoji=heart04> 하아아아앗<emoji=heart04><emoji=heart04> 이거 안 돼, 섹스 너무 기분 좋아아아아~~앗<emoji=heart04><emoji=heart04> 후아아앗, 앗, 앗, 아앙<emoji=heart04> 하아아앗<emoji=heart04><emoji=heart04> 앗, 앗, 응아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「おち○ぽ気持ちいぃ～～っ<emoji=heart04><emoji=heart04>\u3000セックス、好きっ、好きっ、しゅきぃっ<emoji=heart04>\u3000もうずっと、これしてたいぃぃぃ～～っ<emoji=heart04><emoji=heart04>\u3000あっ、あっ、はああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「자지 기분 좋아아~~앗<emoji=heart04><emoji=heart04> 섹스, 좋아, 좋아, 조아아앗<emoji=heart04> 이제 계속, 이거 하고 싶어어어어~~앗<emoji=heart04><emoji=heart04> 앗, 앗, 하아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「お願いしますぅっ！\u3000ルルカをお兄ちゃんの性奴隷にして下さいぃっ<emoji=heart04>\u3000お兄ちゃん専用の妹オナホでいいからぁっ！\u3000もっとおま○こパコパコしてぇ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「부탁이에여어엇! 루루카를 오빠의 성노예로 삼아주세여어어엇<emoji=heart04> 오빠 전용 여동생 오나홀이라도 좋으니까아앗! 좀 더 보지 퍽퍽해 줘어어~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「違うだろ！\u3000ルルカは立派な配信者になるんだろ！？」"
translation = "「틀리잖아! 루루카는 훌륭한 스트리머가 될 거잖아!?」"

[[dialogue]]
speaker = "ルルカ"
original = "「そう、だけどぉっ<emoji=heart04><emoji=heart04>\u3000媚薬チョコレートを食べた時だけはっ、お兄ちゃんのエッチ奴隷になるのぉっ<emoji=heart04><emoji=heart04>\u3000ならせてくださいぃぃっ<emoji=heart04><emoji=heart04>」"
translation = "「그렇, 지만아앗<emoji=heart04><emoji=heart04> 미약 초콜릿을 먹었을 때만큼은으으윽, 오빠의 야한 노예가 될래애<emoji=heart04><emoji=heart04> 되게 해주세요오오옷<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「普段はお歌を歌ったり、企画でリスナーさんを喜ばせる配信者だけど、２人きりの時はお兄ちゃんの妹オナホにならせてえぇぇ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「평소에는 노래를 부르거나, 기획으로 리스너분들을 기쁘게 하는 스트리머지만, 둘만 있을 때는 오빠의 여동생 오나홀이 되게 해줘어어어~~엇<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「これじゃお仕置きにならないな……！\u3000それならもっと腰の動きを遅くして、焦らした方がいいか？」"
translation = "「이래서는 벌이 안 되겠는걸……! 그렇다면 허리 움직임을 더 늦춰서, 애태우는 편이 나으려나?」"

[[dialogue]]
speaker = "unk"
original = "俺はそう言うと、またわざと腰の動きを緩める。途端に、ルルカは焦ったように腰を動かし、必死に求めてくる。"
translation = "나는 그렇게 말하며, 다시 일부러 허리 움직임을 늦춘다. 그 순간, 루루카는 초조한 듯 허리를 움직이며, 필사적으로 매달려 온다."

[[dialogue]]
speaker = "ルルカ"
original = "「やぁっ<emoji=heart04>\u3000お兄ちゃん、ダメぇっ<emoji=heart04><emoji=heart04>\u3000腰の動き止めないでぇっ<emoji=heart04>\u3000おま○こもっとイジメて欲しいのぉっ！\u3000ルルカのおま○こ、もっと突いてイかせてぇ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「하앗<emoji=heart04> 오빠, 안 돼애<emoji=heart04><emoji=heart04> 허리 움직임 멈추지 마아<emoji=heart04> 보지 더 괴롭혀줬으면 좋겠어어! 루루카의 보지, 더 찔러서 가게 해줘어어~~엇<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「なんで今日はお仕置きされてるのか、わかってるのか？」"
translation = "「왜 오늘은 벌을 받고 있는지, 알고 있어?」"

[[dialogue]]
speaker = "ルルカ"
original = "「ルルカがお兄ちゃんにイジメてもらうのが大好きな、マゾ妹だからっ！\u3000――ああぁっ、ごめんなさい、違いますっ<emoji=heart04>\u3000ルルカがイタズラしようとしたからですぅっ<emoji=heart04><emoji=heart04>」"
translation = "「루루카가 오빠한테 괴롭힘당하는 걸 정말 좋아하는, 마조 여동생이라서! ――아아앗, 죄송해요, 아니에요<emoji=heart04> 루루카가 장난치려고 했기 때문이에요옷<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「イタズラしてごめんなさいぃっ<emoji=heart04>\u3000ルルカは今日からお兄ちゃんの性奴隷なので、もう２度とイタズラはしませんん～～っ<emoji=heart04><emoji=heart04>」"
translation = "「장난쳐서 죄송해요오옷<emoji=heart04> 루루카는 오늘부터 오빠의 성노예니까, 이제 두 번 다시 장난은 안 칠게요오오~~옷<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「お歌の動画も、配信も、これまで以上に頑張りますぅっ<emoji=heart04>\u3000それで、疲れた時はお兄ちゃんにオナホにしてもらいますっ<emoji=heart04>\u3000あっ、あんっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04><emoji=heart04>」"
translation = "「노래 영상도, 방송도, 지금까지보다 더 열심히 할게요오옷<emoji=heart04> 그래서, 힘들 때는 오빠가 오나홀로 삼아주세요옷<emoji=heart04> 앗, 안<emoji=heart04> 후아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「頭空っぽにして、気持ちよくだけなって、幸せいっぱいおま○こになれば、それでルルカは元気いっぱいになれるからぁっ<emoji=heart04>\u3000あっ、はぁんっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「머릿속을 텅 비우고, 기분 좋게만 돼서, 행복 가득한 보지가 되면, 그걸로 루루카는 기운이 가득해질 수 있으니까아앗<emoji=heart04> 앗, 하안<emoji=heart04> 응아아안<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「お兄ちゃんにイタズラするんじゃなくてっ<emoji=heart04>\u3000最初から『おち○ぽでイジメてください』ってちゃんとおねだりしますぅっ<emoji=heart04><emoji=heart04>」"
translation = "「오빠한테 장난치는 게 아니라앗<emoji=heart04> 처음부터 『자지로 괴롭혀주세요』라고 제대로 조를게요오옷<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「配信してっ<emoji=heart04>\u3000おま○こしてっ<emoji=heart04>\u3000配信してっ<emoji=heart04>\u3000おま○こしてもらうっ<emoji=heart04>\u3000それが幸せループなのぉ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「방송하고옷<emoji=heart04> 보지하고옷<emoji=heart04> 방송하고옷<emoji=heart04> 보지하고옷<emoji=heart04> 그게 행복 루프인 거야아~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「よしっ！\u3000ちゃんと言えたご褒美に――イカせまくってやるっ！」"
translation = "「좋아! 제대로 말한 포상으로―― 잔뜩 가게 해주마!」"

[[dialogue]]
speaker = "ルルカ"
original = "「あっ――<emoji=heart04><emoji=heart04>」"
translation = "「앗――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「んあ゛ああああぁぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000本気のおち○ぽピストンきたあああぁぁぁ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응아아아아아아아아~~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 진심 자지 피스톤 왔다아아아아아아아~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「あっ、あっ、あっ、あんっ、ふあああぁんっ<emoji=heart04><emoji=heart04>\u3000んっ、あっ、あっ、あんっ、んあああぁんっ<emoji=heart04><emoji=heart04>\u3000あっ、あっ、あんっ、あんっ、はああぁぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「앗, 앗, 앗, 안, 후아아아안<emoji=heart04><emoji=heart04> 응, 앗, 앗, 안, 응아아아안<emoji=heart04><emoji=heart04> 앗, 앗, 안, 안, 하아아아안<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺が激しく腰を打ちつけるたびに、ルルカは快楽に呑まれるように甘い声を上げて喘ぐ。"
translation = "내가 격렬하게 허리를 부딪칠 때마다, 루루카는 쾌락에 삼켜지듯 달콤한 목소리를 내며 헐떡인다."

[[dialogue]]
speaker = "ルルカ"
original = "「んあああぁっ<emoji=heart04><emoji=heart04>\u3000おち○ぽ、奥の気持ちいいところ、どちゅどちゅ突き当たってるうぅ～～っ<emoji=heart04><emoji=heart04>\u3000はああぁっ<emoji=heart04>\u3000好きっ<emoji=heart04>\u3000そこ好きいいぃ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「응아아아앗<emoji=heart04><emoji=heart04> 자지, 안쪽의 기분 좋은 곳, 콰직콰직 부딪치고 있어어어~~앗<emoji=heart04><emoji=heart04> 하아아앗<emoji=heart04> 좋아<emoji=heart04> 거기 좋아아아~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「気持ちいいっ<emoji=heart04>\u3000気持ちいいですっ<emoji=heart04><emoji=heart04>\u3000おち○ぽ最高ですぅ～～っ<emoji=heart04><emoji=heart04>\u3000あっ、あっ、あっ、あんっ<emoji=heart04>\u3000ありがとうございますぅ～～っ<emoji=heart04><emoji=heart04>\u3000あ゛っ――<emoji=heart04><emoji=heart04>」"
translation = "「기분 좋아<emoji=heart04> 기분 좋아요옷<emoji=heart04><emoji=heart04> 자지 최고예요오오~~앗<emoji=heart04><emoji=heart04> 앗, 앗, 앗, 안<emoji=heart04> 감사합니다아아~~앗<emoji=heart04><emoji=heart04> 아앗――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「ふあ゛あああああ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아아아아아~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ルルカは再び絶頂に達したようで、おま○こがきゅうっと激しく締め付けてくる。"
translation = "루루카는 다시 절정에 달한 듯, 보지가 꽉 하고 격렬하게 조여온다."

[[dialogue]]
speaker = "ルルカ"
original = "「んあ゛あああっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000気持ちいぃ～～っ<emoji=heart04><emoji=heart04>\u3000あぁんっ、あっ、あっ、ふあぁっ<emoji=heart04>\u3000イかせてくれてありがとうございますぅ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「응아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 기분 좋아아~~앗<emoji=heart04><emoji=heart04> 아안, 앗, 앗, 후아앗<emoji=heart04> 가게 해주셔서 감사합니다아아~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「お願いしますっ<emoji=heart04>\u3000もっとっ<emoji=heart04>\u3000もっとぉっ<emoji=heart04>\u3000あっ、あっ、あっ、あんっ<emoji=heart04>\u3000んあ゛あああっ<emoji=heart04><emoji=heart04>」"
translation = "「부탁드려요옷<emoji=heart04> 더옷<emoji=heart04> 더어옷<emoji=heart04> 앗, 앗, 앗, 안<emoji=heart04> 응아아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「妹おま○こ、めちゃくちゃにして下さいぃ～～っ<emoji=heart04><emoji=heart04>\u3000あっ、あっ、あん、あんっ、ふあああ゛ぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「여동생 보지, 엉망진창으로 만들어 주세요오오~~앗<emoji=heart04><emoji=heart04> 앗, 앗, 안, 안, 후아아아아안<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ルルカは快感に支配された獣のように、腰を振り乱す。俺もそれに呼応するように、本能のまま快楽を追い求め、腰を激しく打ちつけた。"
translation = "루루카는 쾌감에 지배된 짐승처럼 허리를 마구 흔든다. 나도 그것에 호응하듯 본능대로 쾌락을 추구하며 허리를 격렬하게 부딪쳤다."

[[dialogue]]
speaker = "ルルカ"
original = "「――おっ！？\u3000んお゛おおぉぉ～～っ<emoji=heart04><emoji=heart04>\u3000おち○ぽ、奥にグリってきたあああぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「――오!? 응오오오오오~~ <emoji=heart04><emoji=heart04> 자지, 안쪽에 구릿하고 들어왔어어어어어~~ <emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「おっ、おっ、おっ、おんっ<emoji=heart04>\u3000んお゛おぉぉ～～っ<emoji=heart04><emoji=heart04>\u3000おっおっおっおっ<emoji=heart04>\u3000ふおおお゛ぉ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「오, 오, 오, 온 <emoji=heart04> 응오오오오~~ <emoji=heart04><emoji=heart04> 오오오오 <emoji=heart04> 후오오오오~~ <emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ルルカの甘く絶叫する声が部屋中に響き渡り、快楽の波が何度も押し寄せてくる。思わず俺も唸り声を漏らしながら、より深く奥まで突き入れていく。"
translation = "루루카의 달콤하게 절규하는 목소리가 방 안에 울려 퍼지고, 쾌락의 파도가 몇 번이고 밀려온다. 나도 모르게 신음 소리를 내뱉으며, 더욱 깊숙한 안쪽까지 찔러 넣는다."

[[dialogue]]
speaker = "ルルカ"
original = "「んお゛おおぉっ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000気持ちいいですぅ～～っ<emoji=heart04><emoji=heart04>\u3000おっ、おんっおんっおんっ<emoji=heart04>\u3000んおおお゛ぉんっ<emoji=heart04><emoji=heart04>」"
translation = "「응오오오오 <emoji=heart04> 기분 좋아 <emoji=heart04> 기분 좋아요오~~ <emoji=heart04><emoji=heart04> 오, 온온온 <emoji=heart04> 응오오오온 <emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「ふおおお゛ぉおっ<emoji=heart04><emoji=heart04>\u3000来るっ<emoji=heart04>\u3000何回もイってるのに、もっと大きいの来ちゃいますうぅ～～っ<emoji=heart04><emoji=heart04>\u3000おっおっおっおっ<emoji=heart04>\u3000んお゛おおぉぉぉ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「후오오오오오 <emoji=heart04><emoji=heart04> 온다 <emoji=heart04> 몇 번이나 가버렸는데, 더 큰 게 와버려요오~~ <emoji=heart04><emoji=heart04> 오오오오 <emoji=heart04> 응오오오오오~~ <emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ルルカ、俺ももうイキそうだっ……！」"
translation = "「루루카, 나도 이제 갈 것 같아……!」"

[[dialogue]]
speaker = "ルルカ"
original = "「来てぇっ<emoji=heart04><emoji=heart04>\u3000お兄ちゃんの精液、おま○こに欲しいですぅっ<emoji=heart04><emoji=heart04>」"
translation = "「와줘요 <emoji=heart04><emoji=heart04> 오빠의 정액, 보지에 갖고 싶어요오 <emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「妹おま○こ、種付け射精で孕ませて下さぁいっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000おっおっおっおっおっ<emoji=heart04><emoji=heart04>\u3000ふお゛おおぉぉぉ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「여동생 보지, 씨뿌리기 사정으로 임신시켜 주세요오오 <emoji=heart04><emoji=heart04><emoji=heart04> 오오오오오 <emoji=heart04><emoji=heart04> 후오오오오오~~~ <emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「きたっ<emoji=heart04><emoji=heart04>\u3000きましたっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イクっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イクイクイクイグっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000お゛、ぉ、おっぉおっ、お゛ぉおっ！！！\u3000んおおお゛ぉぉぉ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「왔다 <emoji=heart04><emoji=heart04> 왔어요 <emoji=heart04><emoji=heart04><emoji=heart04> 간다 <emoji=heart04><emoji=heart04><emoji=heart04> 가가각가버려 <emoji=heart04><emoji=heart04><emoji=heart04> 오, 오, 오오오, 오오오!!! 응오오오오오~~~ <emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ルルカ、中に出すぞっ！！！」"
translation = "「루루카, 안에 내보낸다!!」"

[[dialogue]]
speaker = "ルルカ"
original = "「あ゛っ――――<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아으―――― <emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「んああああああぁぁぁっ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>\u3000イックううううううぅぅぅ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응아아아아아아아 <emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04> 가버려어어어어어어어어~~~~~~~~~ <emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は快楽の頂点に達し、理性を忘れてルルカの奥まで押し付けながら、欲望のままに全ての精を吐き出した。"
translation = "나는 쾌락의 정점에 달해, 이성을 잊고 루루카의 안쪽까지 밀어붙이면서, 욕망이 이끄는 대로 모든 정을 쏟아냈다."

[[dialogue]]
speaker = "ルルカ"
original = "「ふあ゛ああああああぁぁぁっ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>\u3000お兄ちゃんの精液、中にいっぱい入って来てるううぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아아아아아 <emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04> 오빠의 정액, 안에 잔뜩 들어오고 있어어어~~~ <emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「あ゛っ、んああああぁぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000子宮熱くて、連続でイクっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000んっ――はあああぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「아으, 응아아아아아~~~ <emoji=heart04><emoji=heart04><emoji=heart04> 자궁 뜨거워서, 연속으로 가버려 <emoji=heart04><emoji=heart04><emoji=heart04> 응――하아아아아~~ <emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "中に精を注ぐたび、ルルカの体は震え、快楽に身を委ねるようにビクビクと痙攣した。"
translation = "안에 정을 쏟을 때마다, 루루카의 몸은 떨렸고, 쾌락에 몸을 맡기듯 파르르 경련했다."

[[dialogue]]
speaker = "ルルカ"
original = "「あっ、んはああぁ～っ……<emoji=heart04><emoji=heart04>\u3000中出し気持ちいいっ……<emoji=heart04><emoji=heart04>\u3000はあぁっ……<emoji=heart04>\u3000んふうぅ～っ……<emoji=heart04>」"
translation = "「앗, 응하아아~…… <emoji=heart04><emoji=heart04> 질내사정 기분 좋아…… <emoji=heart04><emoji=heart04> 하아…… <emoji=heart04> 응후우~…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "射精の熱が収まり、しばし絶頂の余韻に浸った後、俺はそっと腰を引いて、ペニスを抜く。"
translation = "사정의 열기가 가라앉고, 잠시 절정의 여운에 잠긴 뒤, 나는 살며시 허리를 뒤로 빼며 페니스를 뽑는다."

[[dialogue]]
speaker = "ルルカ"
original = "「あっ……はぁんっ……<emoji=heart04>\u3000ふうぅ……<emoji=heart04>」"
translation = "「앗……하앙…… <emoji=heart04> 후우…… <emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「媚薬エッチ……すごく気持ちよかったぁ……<emoji=heart04>\u3000それに、お兄ちゃんにお仕置きされちゃうのも……<emoji=heart04>」"
translation = "「미약 섹스…… 정말 기분 좋았어…… <emoji=heart04> 게다가, 오빠한테 벌 받아버리는 것도…… <emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「はあぁ……<emoji=heart04>\u3000ちょっと癖になっちゃうかも……<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 조금 버릇이 돼버릴지도……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ごめん、ルルカ。俺……興奮し過ぎて、少しやり過ぎたかもしれない……」"
translation = "「미안, 루루카. 나…… 너무 흥분해서, 조금 과하게 해버렸을지도 몰라……」"

[[dialogue]]
speaker = "unk"
original = "落ち着いてきた俺は、反省しながらルルカのうなじにキスをする。"
translation = "진정된 나는, 반성하며 루루카의 목덜미에 키스를 한다."

[[dialogue]]
speaker = "ルルカ"
original = "「んっ……<emoji=heart04>\u3000えへへ、大丈夫……あたしも媚薬で興奮しちゃってたから<emoji=heart04>\u3000でも、無我夢中になって、全然実況できてなかったかも……<emoji=heart04>」"
translation = "「응윽……<emoji=heart04> 에헤헤, 괜찮아…… 나도 비약 때문에 흥분해버렸으니까<emoji=heart04> 하지만, 정신없이 빠져버려서, 전혀 실황하지 못했을지도……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「いや、さっきのルルカはすごくエッチだったから、大丈夫だと思うぞ。その……気持ちよくなりたくて、懇願しちゃう姿とか……」"
translation = "「아니, 아까의 루루카는 굉장히 야했으니까, 괜찮을 거라고 생각해. 그…… 기분 좋아지고 싶어서, 간청하는 모습이라든가……」"

[[dialogue]]
speaker = "unk"
original = "俺はさっきまでのルルカの淫らな姿を思い返し、体の熱が再び戻ってきてしまう。"
translation = "나는 조금 전까지의 루루카의 음란한 모습을 떠올리며, 몸의 열기가 다시 돌아오고 만다."

[[dialogue]]
speaker = "ルルカ"
original = "「あっ……！\u3000お兄ちゃん、もう元気になってきてる……<emoji=heart04>」"
translation = "「앗……! 오빠, 벌써 기운차리고 있어……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「ねぇ、お兄ちゃん。あのね、あたし――」"
translation = "「있지, 오빠. 저기 말이야, 나――」"

[[dialogue]]
speaker = "ルルカ"
original = "「お兄ちゃんとのセックスで元気チャージされちゃうエッチな<b>妹オナホ</b>……もっとイジメてほしいな<emoji=heart04>」"
translation = "「오빠와의 섹스로 기운이 충전돼버리는 야한 <b>여동생</b> <b>오나홀</b>…… 좀 더 괴롭혀줬으면 좋겠어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "媚薬の効果が和らいでも、ルルカの瞳には未だ淫らな熱が灯っていて。"
translation = "비약의 효과가 누그러져도, 루루카의 눈동자에는 여전히 음란한 열기가 머물러 있었다."

[[dialogue]]
speaker = "unk"
original = "俺は彼女の耳元に顔を寄せ、囁いた。"
translation = "나는 그녀의 귓가에 얼굴을 가까이 대고, 속삭였다."

[[dialogue]]
speaker = "クロト"
original = "「じゃあ――次はちゃんとリスナーさんに実況するんだぞ？」"
translation = "「그럼―― 다음은 제대로 리스너분들에게 실황하는 거다?」"

[[dialogue]]
speaker = "ルルカ"
original = "「う、うん<emoji=heart04>\u3000――頑張ります<emoji=heart04>」"
translation = "「으, 응<emoji=heart04> ―― 열심히 할게요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その後も配信プレイを続けるが、ルルカは媚薬が抜けても実況を忘れるほど淫らに乱れ、俺も夢中で何度も精を出してしまうのだった。"
translation = "그 후로도 방송 플레이를 계속하지만, 루루카는 비약이 빠진 뒤에도 실황을 잊을 정도로 음란하게 흐트러졌고, 나도 정신없이 몇 번이고 정액을 쏟아내고 마는 것이었다."

