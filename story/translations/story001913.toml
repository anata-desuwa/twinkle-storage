[[dialogue]]
speaker = "ウズメイア"
original = "「は～、つきたてのお餅うま～。トリシャさんは何食べてるの？」"
translation = "「하~, 갓 친 떡 마시쪙~. 트리샤 씨는 뭐 먹어?」"

[[dialogue]]
speaker = "トリシャ"
original = "「あむ、もむ……きな粉と黒蜜です……悪魔的甘さで……とても幸せです……」"
translation = "「암, 냠…… 콩가루와 흑설탕 시럽입니다…… 악마적인 달콤함이라…… 너무 행복해요……」"

[[dialogue]]
speaker = "ウズメイア"
original = "「それ、絶対美味しいヤツじゃ～ん！\u3000あたしも真似しよ～っと！」"
translation = "「그거 완전 맛있는 거잖아~! 나도 따라 해야지~!」"

[[dialogue]]
speaker = "トリシャ"
original = "「ふふ……よければ一口どうぞ……自分でついたお餅というのも……また美味しさひとしお……ですね」"
translation = "「후후…… 괜찮다면 한 입 드세요…… 직접 친 떡이라는 것도…… 맛이 각별…… 하네요.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ほんそれ～！\u3000うまま～♪」"
translation = "「ㄹㅇ인정~! 마시쪙~♪」"

[[dialogue]]
speaker = "フィオナ"
original = "「磯辺に大根おろし、みたらしにずんだまで……しょっぱいのと甘いのでいくつでも食べてしまいます」"
translation = "「김에 간 무, 조청에 완두콩 앙금까지…… 짠 것과 단 것으로 몇 개든 먹게 돼요.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「つきたてのお餅はやっぱり格別よね！\u3000これを食べちゃったら、もう普通のお餅には戻れないわ！」"
translation = "「갓 친 떡은 역시 특별하네! 이걸 먹어버리면 이제 평범한 떡으로는 돌아갈 수 없어!」"

[[dialogue]]
speaker = "舞亜"
original = "「もぐ……もぐ……とっても美味しいね、ソフィ」"
translation = "「우물…… 우물…… 정말 맛있네, 소피.」"

[[dialogue]]
speaker = "ソフィア"
original = "「うん……うぅ、美味しすぎるから、気を抜くと食べすぎちゃいそうです……」"
translation = "「응…… 으으, 너무 맛있어서 정신 놓으면 과식할 것 같아요……」"

[[dialogue]]
speaker = "オオヒメ"
original = "「おや？\u3000舞亜殿とソフィア殿はあまり食が進んでいないようだが……腹が減っていないのか？」"
translation = "「오야? 마아 공과 소피아 공은 별로 먹지 않는 것 같다만…… 배가 고프지 않은 것인가?」"

[[dialogue]]
speaker = "舞亜"
original = "「あ、ヒメさん。ううん、お腹が空いてない訳じゃないよ。本当はいろんな味を試しながら、たくさん食べたいんだけどね」"
translation = "「아, 히메 씨. 아냐, 배가 안 고픈 건 아냐. 사실은 여러 가지 맛을 보면서 잔뜩 먹고 싶지만 말이야.」"

[[dialogue]]
speaker = "ソフィア"
original = "「過剰な炭水化物とカロリーはアスリートの天敵ですから……１日の許容摂取量を超えないよう、控えめにしてるんです」"
translation = "「과도한 탄수화물과 칼로리는 운동선수의 천적이니까요…… 하루 허용 섭취량을 넘지 않도록 자제하고 있어요.」"

[[dialogue]]
speaker = "舞亜"
original = "「私たち、まだまだ食べ盛りのわんぱく世代だからね。食事制限はどんな戦いよりも心が折れそうになるよ」"
translation = "「우리, 아직 한창 먹을 나이인 개구쟁이 세대니까 말이야. 식단 조절은 어떤 싸움보다 마음이 꺾일 것 같아져.」"

[[dialogue]]
speaker = "ソフィア"
original = "「忘年会、クリスマス、お正月と……年末年始は暴飲暴食の誘惑との戦いなんです。フィギュアスケートは特に体重管理が厳しい競技ですから」"
translation = "「송년회, 크리스마스, 정초…… 연말연시는 폭음폭식의 유혹과의 싸움이에요. 피겨 스케이팅은 특히 체중 관리가 엄격한 경기니까요.」"

[[dialogue]]
speaker = "オオヒメ"
original = "「なんと……気が回らず、失礼した。素晴らしい芸が産まれる裏には、並々ならぬ苦労があるのだな」"
translation = "「이런…… 미처 생각이 미치지 못해 실례했다. 멋진 장기가 탄생하는 이면에는 예사롭지 않은 고충이 있군.」"

[[dialogue]]
speaker = "オオヒメ"
original = "「先日の神楽舞には、非常に感銘を受けた。今でもあの幻想的な光景は目に焼きついている」"
translation = "「지난번 카구라 춤에는 무척 감명받았다. 지금도 그 환상적인 광경이 눈에 선해.」"

[[dialogue]]
speaker = "舞亜"
original = "「ありがと。おかげで私も自分の新しい可能性に気付けたよ。個人の技ももっと伸ばせる気がする」"
translation = "「고마워. 덕분에 나도 자신의 새로운 가능성을 깨달았어. 개인 기량도 더 늘릴 수 있을 것 같아.」"

[[dialogue]]
speaker = "オオヒメ"
original = "「フィギュアスケートにも興味が湧いた。私にもあのような軽やかな滑りができるものなのだろうか」"
translation = "「피겨 스케이팅에도 흥미가 생겼다. 나에게도 그런 가벼운 활주가 가능할까.」"

[[dialogue]]
speaker = "ソフィア"
original = "「守護天使様にこういうことを言ってしまうのもなんですが、どうでしょう……世界トップクラスとなると、幼少の頃からやっている方が大半です」"
translation = "「수호천사님께 이런 말씀을 드리는 것도 좀 그렇습니다만, 글쎄요…… 세계 톱 클래스가 되려면 어린 시절부터 시작한 분들이 대다수예요.」"

[[dialogue]]
speaker = "ソフィア"
original = "「アイススケートでしたら今からでも滑れるとは思いますが、フィギュアとなると少し難しいかと」"
translation = "「아이스 스케이트라면 지금부터라도 탈 수 있겠지만, 피겨라면 조금 어려울지도 몰라요.」"

[[dialogue]]
speaker = "舞亜"
original = "「え、そんなにかな。シューッて滑って、クルクルーってやるくらいなら誰でもできるんじゃない？」"
translation = "「에, 그 정도인가. 슉 하고 미끄러지고 핑글핑글 도는 것 정도라면 누구나 할 수 있는 거 아냐?」"

[[dialogue]]
speaker = "ソフィア"
original = "「誰でもは無理！\u3000もう、舞亜ってば天才肌なんだから」"
translation = "「아무나 못 해! 정말, 마아는 천재 타입이라니까.」"

[[dialogue]]
speaker = "舞亜"
original = "「ははは。でも、とりあえずやってみればいいんじゃないかな。フィギュア部に来てくれたら、ヒメさんにも滑り方教えてあげる」"
translation = "「하하하. 그래도 일단 해보면 좋지 않을까. 피겨부에 오면 히메 씨한테도 타는 법 가르쳐 줄게.」"

[[dialogue]]
speaker = "ソフィア"
original = "「舞亜、今、話してる相手が守護天使様なの分かってます……？」"
translation = "「마아, 지금 대화하는 상대가 수호천사님인 거 알고 있어……?」"

[[dialogue]]
speaker = "舞亜"
original = "「もちろん。ヒメさんは守護天使だよ？」"
translation = "「물론이지. 히메 씨는 수호천사잖아?」"

[[dialogue]]
speaker = "オオヒメ"
original = "「畏まる必要はない。今の私は守護天使であると同時に、あなたたちの演技に魅せられた１人のファンだからな」"
translation = "「어려워할 필요 없다. 지금의 나는 수호천사인 동시에 그대들의 연기에 매료된 한 명의 팬이니까.」"

[[dialogue]]
speaker = "ソフィア"
original = "「オオヒメさんがそう言われるなら構いませんけど……」"
translation = "「오오히메 씨가 그렇게 말씀하신다면 상관없지만요……」"

[[dialogue]]
speaker = "舞亜"
original = "「そっか、嬉しいね。でも気に入ってくれたところ悪いけど、フィギュアスケートの選手寿命って長くないんだよね」"
translation = "「그렇구나, 기쁘네. 하지만 맘에 들어 해 준 건 고맙지만, 피겨 스케이팅 선수의 수명은 길지 않거든.」"

[[dialogue]]
speaker = "舞亜"
original = "「ヒメさんのおかげでちょっと長生きしたけど、お餅をお腹いっぱい食べられるようになるのも、そう遠くない話かも」"
translation = "「히메 씨 덕분에 좀 오래 살게 됐지만, 떡을 배불리 먹을 수 있게 되는 날도 그리 멀지 않은 이야기일지도 몰라.」"

[[dialogue]]
speaker = "オオヒメ"
original = "「そうか。いずれ、２人の演技が見られなくなる時が来るのだな。それは寂しい……」"
translation = "「그런가. 언젠가 두 사람의 연기를 볼 수 없게 될 때가 오겠구나. 그것은 외롭군……」"

[[dialogue]]
speaker = "ソフィア"
original = "「でも、選手生命が短いからこそ、私たちは一瞬一瞬を完全燃焼させて、悔いが残らないようにしているんです」"
translation = "「하지만 선수 생명이 짧기 때문에 저희는 순간순간을 완전 연소해서 후회가 남지 않도록 하고 있어요.」"

[[dialogue]]
speaker = "オオヒメ"
original = "「クールに見えて、内に秘めた炎は誰よりも熱いのだな……流石は私の推し、素敵だ。２人の切磋琢磨を最後まで見届けさせてもらおう。……いや、応援させてくれ」"
translation = "「쿨해 보여도 내면에 감춘 불꽃은 누구보다 뜨겁구나…… 역시 나의 최애, 멋지다. 두 사람의 절차탁마를 마지막까지 지켜보게 해다오. ……아니, 응원하게 해줘.」"

[[dialogue]]
speaker = "舞亜"
original = "「ふふ、心強いファンができちゃった。応援してくれるファンのために、まだまだ頑張らなきゃね」"
translation = "「후후, 든든한 팬이 생겨버렸네. 응원해 주는 팬을 위해서라도 아직 더 열심히 해야겠어.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふぅ……美味しすぎて、ついつい食べ過ぎちゃったわ。お腹ぽんぽこりんで眠くなってきたわね……」"
translation = "「후우…… 너무 맛있어서 그만 과식해 버렸어. 배가 빵빵해서 졸려오네……」"

[[dialogue]]
speaker = "トリシャ"
original = "「まどろみの刻の中……余興におみくじなど……いかがでしょう……？」"
translation = "「비몽사몽한 시간에…… 여흥으로 운세 뽑기 같은 건…… 어떠신가요……?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「うむ、良きである。ここはひとつ、今年の運勢を見てもらうとしよう」"
translation = "「음, 좋구나. 여기서 올해의 운세를 한번 보기로 하자.」"

[[dialogue]]
speaker = "トリシャ"
original = "「かしこまりました……ヘレナさんの……ですか？」"
translation = "「알겠습니다…… 헬레나 씨의 것…… 인가요?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「いや『世界』の運勢をだ。昨年は世界にとって幾度も窮地の訪れる凶年だったが、果たして今年はどう出るかな」"
translation = "「아니, 『세계』의 운세를 말이다. 작년은 세계에 몇 번이고 위기가 찾아온 흉년이었지만, 과연 올해는 어찌 될까.」"

[[dialogue]]
speaker = "トリシャ"
original = "「世界の運勢ですか……少々、お待ちを……カシャカシャ……」"
translation = "「세계의 운세인가요…… 잠시만 기다려 주세요…… 달그락달그락……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ドドンと大吉、いえ、ウルトラスーパー大吉くらいがいいわね！」"
translation = "「통 크게 대길, 아니 울트라 슈퍼 대길 정도가 좋겠네!」"

[[dialogue]]
speaker = "フィオナ"
original = "「そんなおみくじあるんでしょうか……？」"
translation = "「그런 운세 뽑기가 있을까요……?」"

[[dialogue]]
speaker = "トリシャ"
original = "「出ました……結果は『小吉』……『<ruby>諍<rt>いさか</rt></ruby>い──波乱万丈。艱難辛苦が待っている』……とのことです……」"
translation = "「나왔습니다…… 결과는 『소길』…… 『다툼── 파란만장. 간난신고가 기다리고 있다』……라고 합니다……」"

[[dialogue]]
speaker = "フィオナ"
original = "「リクリエとの戦いはまだ終わっていませんからね。さもありなんです」"
translation = "「리크리에와의 싸움은 아직 끝나지 않았으니까요. 그럴 법하네요.」"

[[dialogue]]
speaker = "トリシャ"
original = "「ですが……まだ続きがあります……『願い──諦めなければ希望あり』……と」"
translation = "「하지만…… 아직 뒷내용이 있습니다…… 『소원── 포기하지 않으면 희망이 있다』……라고요.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「最高のおみくじ結果ね！\u3000私たちが諦めるなんて、空と海がひっくり返ったって有り得ないもの！」"
translation = "「최고의 운세 결과네! 우리가 포기하다니, 하늘과 바다가 뒤집혀도 있을 수 없는 일인걸!」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ふふふ、それでこそ我が娘だ。な、魔王よ」"
translation = "「후후후, 그래야 내 딸이지. 그치, 마왕?」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスの言う通りです\n俺たちは絶対に諦めません！"
translation = "비너스의 말이 맞아요.\\n우리는 절대로 포기하지 않습니다!"

[[dialogue]]
speaker = "unk"
original = "これからも俺たちの前には更なる強敵が現れ、世界を救うための戦いはより激しさを増していくだろう。"
translation = "앞으로도 우리 앞에는 더 강력한 적이 나타나고, 세계를 구하기 위한 싸움은 더욱 격렬해질 것이다."

[[dialogue]]
speaker = "unk"
original = "だが倒れるわけにはいかない。いや、倒れるはずがない。"
translation = "하지만 쓰러질 수는 없다. 아니, 쓰러질 리가 없다."

[[dialogue]]
speaker = "unk"
original = "世界のため、みんなの力を貸してほしい"
translation = "세계를 위해 모두의 힘을 빌려줘."

[[dialogue]]
speaker = "フィオナ"
original = "「もちろんです、緋宮会長」"
translation = "「물론입니다, 히노미야 회장님.」"

[[dialogue]]
speaker = "トリシャ"
original = "「私に可能ならば……なんなりとお申し付けください……世のため……友達のため……」"
translation = "「제게 가능하다면…… 무엇이든 말씀해 주세요…… 세상을 위해…… 친구를 위해……」"

[[dialogue]]
speaker = "ウズメイア"
original = "「当たり前っしょ～♪\u3000あたしたちのズッ友パワーは無限だよね～♪」"
translation = "「당연하잖아~♪ 우리들의 찐친 파워는 무한이라구~♪」"

[[dialogue]]
speaker = "舞亜"
original = "「引退するまで、世界には無事でいてもらわないとね」"
translation = "「은퇴할 때까지 세계는 무사히 있어야 하니까 말이야.」"

[[dialogue]]
speaker = "ソフィア"
original = "「推してくれる守護天使様まで現れちゃいましたしね」"
translation = "「응원해 주는 수호천사님까지 나타나 버렸으니까요.」"

[[dialogue]]
speaker = "オオヒメ"
original = "「推しが引退するまで世界を滅ぼさせるわけにはいかないな。今まで不在にしていた分も、摂理の守護に努めるとしよう」"
translation = "「최애가 은퇴할 때까지 세계를 멸망하게 둘 수는 없지. 지금까지 부재했던 만큼 섭리의 수호에 힘쓰도록 하마.」"

[[dialogue]]
speaker = "マグダレナ"
original = "「今追っているドラマのシーズン１０が制作予定ですからね。完結までは見届けませんと」"
translation = "「지금 챙겨보는 드라마 시즌 10이 제작 예정이니까요. 완결까지는 지켜봐야죠.」"

[[dialogue]]
speaker = "オオヒメ"
original = "「それはいつまでも終わらないやつでは……？」"
translation = "「그건 영원히 끝나지 않는 거 아닌가……?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「クロト、あなたは絶対に私が守ってみせるわ！」"
translation = "「쿠로토, 당신은 절대로 내가 지켜낼 거야!」"

[[dialogue]]
speaker = "unk"
original = "俺たちはこんなにも多くの頼れる仲間同士で支え合っているのだから。"
translation = "우리는 이렇게나 많은 믿음직한 동료들끼리 서로를 지탱하고 있으니까."

[[dialogue]]
speaker = "unk"
original = "来年も、そのまた先も、新たな年を迎えるため、俺たちは戦う決意を新たにするのだった。"
translation = "내년에도, 그다음에도 새로운 해를 맞이하기 위해 우리는 싸울 결의를 다지는 것이었다."

