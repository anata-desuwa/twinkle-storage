[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「へいお待ち！\u3000ティンクル☆くるせいだーすコラボ、第二弾！」"
translation = "「자 기다리셨다! 팅클☆크루세이더스 콜라보 제2탄!」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「始まり始まりなのです～♪」"
translation = "「시작인 거예요~♪」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ぬっふっふ……ついにこの時がやってきたみたいだね！」"
translation = "「누흐흐…… 드디어 이때가 온 모양이네!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「何やらまた、波乱が巻き起こりそうな予感ですが……」"
translation = "「무언가 또 파란이 일어날 것 같은 예감입니다만……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「星騎士とクルセイダース……私たちが力を合わせれば、何があっても、きっとなんとかなるわ！」"
translation = "「성기사와 크루세이더스…… 우리가 힘을 합치면 무슨 일이 있어도 분명 어떻게든 될 거야!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ふ～んだ。誰が相手だろうと、この魔王マカロン様の邪魔は、絶対にさせないんだからっ！」"
translation = "「흥이다. 상대가 누구든 이 마왕 마카론 님의 방해는 절대 못 하게 할 거니까!」"

[[dialogue]]
speaker_original = "パッキー"
speaker_translation = "팟키"
original = "「クックック……果たして、俺様のお眼鏡にかなうミラクルバストとの出会いはあるのか……！」"
translation = "「큭큭큭…… 과연 이 몸의 안목에 차는 미라클 바스트와의 만남이 있을 것인가……!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「とにかくこれは、色々と目が離せないようですね！」"
translation = "「어쨌든 이건 여러모로 눈을 뗄 수 없겠네요!」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「ってことで、ティンクルスターナイツ×ティンクル☆くるせいだーすコラボイベント、第二弾──」"
translation = "「그런 고로, 팅클 스타 나이츠×팅클☆크루세이더스 콜라보 이벤트 제2탄──」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「い～っぱい、楽しんでくださいね～♪」"
translation = "「많~이 즐겨주세요~♪」"

