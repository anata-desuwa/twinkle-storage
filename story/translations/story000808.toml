[[dialogue]]
speaker = "unk"
original = "後日──"
translation = "며칠 뒤──"

[[dialogue]]
speaker_original = "女生徒"
speaker_translation = "여학생"
original = "「見つけてくれて本当にありがとう！\u3000とても……とても大切な物だったから！\u3000ほとんどもう諦めかけてて……！」"
translation = "「찾아줘서 정말 고마워! 정말…… 정말 소중한 물건이었거든! 거의 포기하고 있었는데……!」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「えへへ。良かったね、喜んでもらえて」"
translation = "「에헤헤. 다행이다, 기뻐해 줘서.」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「ええ。あの笑顔を見られただけで頑張った甲斐があるというものです」"
translation = "「네. 저 미소를 본 것만으로도 노력한 보람이 있네요.」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「体おも～い、だる～い。ちょっと働き過ぎちゃったわ～」"
translation = "「몸이 무거~워, 나른~해. 좀 과하게 일해버렸나 봐~」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「ふふ、モナカがマッサージしてあげるね？\u3000モナカたちのために、たくさん動き回ってくれてたみたいだし」"
translation = "「후후, 모나카가 마사지해 줄게? 모나카 일행을 위해서 많이 움직여준 것 같기도 하고.」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「なら、お願いしちゃおうかしら～。モナカのマッサージは気持ちいいのよね～」"
translation = "「그럼, 부탁해 볼까나~. 모나카의 마사지는 기분 좋거든~」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「待ってください、モナカ。そこまでする必要はないかもしれませんよ」"
translation = "「잠깐만요, 모나카. 그렇게까지 할 필요는 없을지도 몰라요.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「ふぇ？\u3000どうして？」"
translation = "「후에? 어째서?」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「このグータラ女がおなか部に届いた相談をこっそり星徒会に押しつけていたからですよ。それもずーっと前から」"
translation = "「이 게으름뱅이 여자가 오나카부에 들어온 상담을 몰래 성도회에 떠넘기고 있었으니까요. 그것도 아주 예전부터요.」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ギクっ！\u3000ど、どうしてそれを……！」"
translation = "「찔끔! 어, 어떻게 그걸……!」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「ヴィーナスさんから聞きました。ちっとも相談が届かないわけです」"
translation = "「비너스 씨한테 들었습니다. 조금도 상담이 들어오지 않던 이유가 있었군요.」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「今回の件も星徒会の机にこっそり手紙を置こうとしたところをヴィーナスさんに見つかって始まったそうですね？」"
translation = "「이번 건도 성도회 책상에 몰래 편지를 두려던 걸 비너스 씨에게 들켜서 시작된 거라면서요?」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「しかもヴィーナスさんに怒られないように、私たちのことを言い訳に使って──」"
translation = "「심지어 비너스 씨에게 혼나지 않으려고, 우리를 핑계로 삼아서──」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「シフォンもモナカも、すごく臆病で繊細な子でねっ？\u3000自分の羽根の色をずっと気にしてたり、自分を落ちこぼれだって言い続けたりしてるのよ……！」"
translation = "「시폰이랑 모나카는 엄청 겁 많고 섬세한 애들이라구? 자기 날개 색을 계속 신경 쓰거나, 자길 낙제생이라고 계속 말한다니까……!」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「だから年長者としてあまり難しい仕事は受けさせたくなくて……！\u3000もしも失敗しちゃったら立ち直れなくなっちゃうかもしれないから……！」"
translation = "「그러니까 연장자로서 너무 어려운 일은 맡게 하고 싶지 않아서……! 만약 실패라도 하면 다시 못 일어날지도 모르니까……!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「なるほどね、事情はわかったわ。パルミエさんの気持ちもわからなくもないし」"
translation = "「과연, 사정은 알겠어. 팔미에 씨의 마음도 이해 못 하는 건 아니지만.」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ほっ……。助かった……」"
translation = "「휴우…… 살았다……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「でも、それならいっそ思いっきり難しい相談を２人に頼んでみましょ！」"
translation = "「하지만, 그렇다면 차라리 아주 어려운 상담을 두 사람에게 부탁해 보자!」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「えっ！？\u3000ど、どういうこと～？」"
translation = "「엣!? 어, 어떻게 된 거야~?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「私も２人のことは気になってたのよ。あと一歩でプリマステラになれそうな人材なのに勿体ないって」"
translation = "「나도 두 사람은 신경 쓰였거든. 조금만 더 하면 프리마스텔라가 될 수 있을 인재인데 아깝다고 생각했지.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「だからこそあえて崖から突き落としてみようってこと♪\u3000一皮むけてくれるかもしれないわ♪\u3000例えば──」"
translation = "「그러니까 오히려 절벽에서 밀어 떨어뜨려 보자는 거야♪ 한 꺼풀 벗겨질지도 모르니까♪ 예를 들면──」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「へぇ、なるほどね～。確かに面白いかも。そういうお悩み相談なら、あの子たちも本気になれるかもしれないし」"
translation = "「헤에, 과연 그렇네~. 확실히 재밌을지도. 그런 고민 상담이라면 그 애들도 진심이 될 수 있을 것 같고.」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「それに上手くいけば星徒会に仕事を押しつけてたこともシフォンにバレないし……♪\u3000ふふふ、喜んで協力させてもらうわ」"
translation = "「게다가 잘 풀리면 성도회에 일을 떠넘긴 것도 시폰한테 안 들킬 테고……♪ 후후후, 기꺼이 협력할게.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「パルちゃん……。マッサージなし」"
translation = "「팔짱…… 마사지 없어.」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「え～！\u3000結果的に押しつけてた仕事はやったじゃな～い！\u3000校門の掃除も、倉庫の整理も、カフェテリアの手伝いとかも～！」"
translation = "「에~! 결과적으로 떠넘겨진 일은 다 했잖아~! 교문 청소도, 창고 정리도, 카페테리아 일손 돕기도~!」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「当然ですよ。今までどれだけの相談を星徒会に押しつけてきたんですか。おなか部を作ろうって言ったのはパルミエでしょうに」"
translation = "「당연하죠. 지금까지 얼마나 많은 상담을 성도회에 떠넘겨온 건가요. 오나카부를 만들자고 한 건 팔미에였으면서.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「そうだよ。次からはモナカにちゃんと相談して？\u3000もし本当に難しい相談なら、にぃ様に協力してってお願いしたりするから……」"
translation = "「맞아. 다음부터는 모나카한테 제대로 상담해 줘? 만약 정말 어려운 상담이면 오라버니한테 도와달라고 부탁할 테니까……」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「あら……」"
translation = "「어라라……」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「……確かにこれからはあんまり星徒会に仕事を押しつける必要はなさそうね。ふふ、本当に一皮むけられたみたいだし」"
translation = "「……확실히 이제부터는 딱히 성도회에 일을 떠넘길 필요는 없겠네. 후후, 정말 한 꺼풀 벗겨진 것 같고.」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「何か言いましたか？」"
translation = "「뭐라고 하셨나요?」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ううん、何も♪」"
translation = "「아니, 아무것도♪」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「でも……えへへ。本物のモンスターを倒して、３人揃ってプリマステラにしてもらえて良かったね？」"
translation = "「하지만…… 에헤헤. 진짜 몬스터를 쓰러뜨리고, 세 명 다 같이 프리마스텔라가 되어서 다행이다, 그치?」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「怪我の功名でしたけどね。てっきり勝手な真似をして当分試験も受けられないかと思いましたが」"
translation = "「전화위복이었지만요. 하마터면 멋대로 행동했다고 한동안 시험도 못 치게 될 줄 알았어요.」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「辞退もさせてくれなかったものね～。はぁ、これからの学園生活が憂鬱だわ～」"
translation = "「사퇴도 못 하게 했는걸~. 하아, 앞으로의 학원 생활이 우울해~」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「そういえばあのモンスターはどうして新星学園に現れたのでしょうか？」"
translation = "「그러고 보니 그 몬스터는 어째서 신성학원에 나타난 걸까요?」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「モンスターに化けた水精ちゃんをうちの部室に匿ってたからじゃない？\u3000ほら２人が一度取り逃がしちゃった時も部室に隠してたのよ」"
translation = "「몬스터로 변신한 수정이를 우리 부실에 숨겨줬기 때문 아니야? 봐봐, 둘이 한 번 놓쳤을 때도 부실에 숨겨뒀었거든.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「仲間だと思って、つい部室に来ちゃったってこと……？\u3000ならラッキーだったね。おかげで指輪を取り戻せたから……」"
translation = "「동료인 줄 알고 무심코 부실에 왔다는 거네……? 그럼 럭키였네. 덕분에 반지를 되찾았으니까……」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「……待ってください。あの盗まれたように見せかけていたお菓子、パルミエが買ったとか言ってませんでした？」"
translation = "「……잠깐만요. 그 도둑맞은 것처럼 보였던 과자, 팔미에가 샀다고 하지 않았나요?」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「そのお金ってどこから出てるんです？\u3000あなたお金にだらしなくて年中金欠ですよね？」"
translation = "「그 돈은 어디서 난 거죠? 당신, 돈 관리에 허술해서 연중 금전난이잖아요?」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ギクっ」"
translation = "「찔끔.」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「思えば、身に覚えのないお菓子が昨日も置いてありました。まさかまた貴重な部費を使い込んで──」"
translation = "「생각해 보니 짐작 가는 곳 없는 과자가 어제도 놓여 있었어요. 설마 또 귀중한 부비를 써버린 건──」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ひ、必要経費よ～。だってシフォン、いつも倹約倹約でお菓子の１つも買ってくれないから～」"
translation = "「피, 필요 경비라구~. 그게 시폰이 맨날 절약 절약 하느라 과자 하나 안 사주니까~」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「だからいつも言ってるじゃないですか！\u3000部費はお菓子を買うためのお金じゃないんですよ！」"
translation = "「그러니까 늘 말하잖아요! 부비는 과자를 사기 위한 돈이 아니라고요!」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ついでに高級枕も買っちゃった♪\u3000２人もお昼寝する時、使ってくれていいわよ～♪」"
translation = "「덤으로 고급 베개도 샀지롱♪ 둘도 낮잠 잘 때 써도 된다구~♪」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「ですから無駄遣いしないでくださいって！」"
translation = "「그러니까 낭비하지 마시라고요!」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「ふふ、たまにはいいじゃない。モナカ、お茶淹れてくるね？\u3000パルちゃんの買ったお菓子でお茶会でもしよ？」"
translation = "「후후, 가끔은 괜찮잖아. 모나카가 차 우려 올게? 팔짱이 산 과자로 다과회라도 할까?」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「あらあら、流石はモナカね～。もちろん茶葉も買ってきてあるわよ～」"
translation = "「어머어머, 역시 모나카네~. 물론 찻잎도 사 왔어~」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「はぁ……。また今月も財政難が続きそうですね……」"
translation = "「하아…… 이번 달도 재정난이 계속될 것 같네요……」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「あ……。このアラート……」"
translation = "「아……. 이 알람……」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「どうやらまた街のどこかにアステラが出現したみたいですね……」"
translation = "「아무래도 또 거리 어딘가에 아스텔라가 출현한 모양이네요……」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ホント最近多いわね～？\u3000物騒な世の中だわ～」"
translation = "「정말 요새 자주 생기네~? 흉흉한 세상이야~」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「他人事みたいに言ってないで行きますよ。私たちはもうプリマステラなんですから」"
translation = "「남 일처럼 말하지 말고 가자고요. 우린 이제 프리마스텔라니까요.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「今もモンスターに襲われて困ってる人がいるかもしれないもんね。早く駆けつけて、少しでも助けになってあげなきゃ」"
translation = "「지금도 몬스터한테 습격당해서 곤란해하는 사람이 있을지도 모르니까. 빨리 달려가서 조금이라도 도움이 되어줘야 해.」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「もーせっかくお茶会を始めようってところだったのに。ふふ、でもまぁ仕方ないわね。面倒だけど２人に付き合うわ」"
translation = "「정말~ 모처럼 다과회를 시작하려던 참이었는데. 후후, 뭐 어쩔 수 없네. 귀찮지만 둘을 따라갈게.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「それじゃあ行こう！\u3000おなか部、出動だよ！」"
translation = "「그럼 가자! 오나카부, 출동이야!」"

