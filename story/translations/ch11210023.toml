[[dialogue]]
speaker = "unk"
original = "第３話,出禁のレイラ,P"
translation = "제3화, 출입 금지 레이라"

[[dialogue]]
speaker = "unk"
original = "レイラとのデートは仕切り直しになった。その待ち合わせに向かっていると──"
translation = "레이라와의 데이트는 다시 약속을 잡았다. 그 약속 장소로 향하고 있는데──"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「テメエは出禁だ！\u3000さっさと出てけ！」"
translation = "「네년은 출입 금지다! 냉큼 나가!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「そんなぁ！」"
translation = "「그럴 수가아!」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「テメエが出入りすると店が潰れんだよ！」"
translation = "「네년이 드나들면 가게가 망한다고!」"

[[dialogue]]
speaker = "unk"
original = "そのレイラが飲食店からつまみ出されていた。しかもつまみ出したのは彼女の仲間であるキサナだ。"
translation = "그 레이라가 음식점에서 쫓겨나고 있었다. 게다가 쫓아낸 것은 그녀의 동료인 키사나다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「お、魔王じゃねえか。ちょうどいい。そのバカ、オマエのツレだろ。早く連れてけ」"
translation = "「오, 마왕 아니냐. 잘됐네. 그 바보, 네 일행이지. 빨리 데려가」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「じゃあな」"
translation = "「그럼 이만」"

[[dialogue]]
speaker = "unk"
original = "何があったの？"
translation = "무슨 일 있었어?"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「私、魔王さんもご存知の通りたくさん食べるので、食べ放題のお店をよく利用するのですが、ことごとく出禁を食らっていまして……」"
translation = "「저, 마왕님도 아시다시피 많이 먹어서 무한 리필 가게를 자주 이용하는데, 가는 곳마다 출입 금지를 당해서요……」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「さっきのお店で流星市国の食べ放題全てで出禁になってしまいました」"
translation = "「방금 가게로 유성시국의 모든 무한 리필 가게에서 출입 금지가 되어버렸습니다」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「こんなことが、こんなことが許されていいんですか……っ！」"
translation = "「이런 일이, 이런 일이 허용되어도 되는 건가요……!」"

[[dialogue]]
speaker = "unk"
original = "残念ながら当然"
translation = "안타깝지만 당연해"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「なんですと！？」"
translation = "「이게 무슨 소리예요!?」"

[[dialogue]]
speaker = "unk"
original = "レイラの健啖ぶりは大食いという範疇には収まらない。食べ放題のお店からすればたまったものではないだろう。"
translation = "레이라의 먹성은 대식가라는 범주에는 들어가지 않는다. 무한 리필 가게 입장에서는 견디기 힘들 것이다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「前回は私の用事で振り回してしまいましたから、デートで食べすぎないよう、先に何か食べていこうと思ったのですが……恥ずかしいところをお見せしてしまいました」"
translation = "「지난번엔 제 볼일로 휘둘러버렸으니까, 데이트에서 너무 많이 먹지 않도록 먼저 뭘 좀 먹어두려고 했는데…… 부끄러운 모습을 보여드리고 말았네요」"

[[dialogue]]
speaker = "unk"
original = "よく分からないが、レイラなりの気遣いということだろうか。"
translation = "잘은 모르겠지만 레이라 나름대로의 배려라는 것일까."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「……恋人なんだから、そんなに気を遣わなくても大丈夫？\u3000……魔王さん、優しいです。キのつく魔族とは大違いです」"
translation = "「……연인이니까 그렇게 신경 쓰지 않아도 괜찮다니? ……마왕님, 다정하세요. 키로 시작하는 마족이랑은 딴판이에요」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「それに、今日デートで行くのは空腹の心配が要らないところ……？\u3000そんな楽園が本当にあるんですか！？」"
translation = "「게다가 오늘 데이트로 가는 곳은 공복 걱정 없는 곳……? 그런 낙원이 정말로 있는 건가요!?」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「海だぁ！」"
translation = "「바다다아!」"

[[dialogue]]
speaker = "unk"
original = "ここは本物の海ではなく、リップルによって作られたリゾート結界だ。ここでは星術によって夏の海を再現している。"
translation = "여기는 진짜 바다가 아니라 리플에 의해 만들어진 리조트 결계다. 여기서는 성술에 의해 여름 바다를 재현하고 있다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「訓練でプライベート結界をお借りしたことはありますけど、こちら側のリゾート結界にお邪魔するのは初めてですね」"
translation = "「훈련으로 프라이빗 결계를 빌린 적은 있지만, 이쪽 리조트 결계에 발을 들이는 건 처음이네요」"

[[dialogue]]
speaker = "unk"
original = "水着、似合ってる"
translation = "수영복, 잘 어울려"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「な！？\u3000と、突然何を言ってるんですか。魔王さんのエッチ……でも、ありがとうございます」"
translation = "「나!? 가, 갑자기 무슨 말을 하는 거예요. 마왕님 변태…… 하지만 감사해요」"

[[dialogue]]
speaker = "unk"
original = "照れのあまり、くねくねするレイラ。可愛いけどちょっと刺激的すぎる。"
translation = "부끄러운 나머지 몸을 배배 꼬는 레이라. 귀엽지만 조금 자극적이다."

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ラッシャッセー、カイチョー！\u3000と、珍シイお客サンですね？」"
translation = "「어서옵쇼, 회장! 그리고 희귀한 손님이네?」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「私は百目騎レイラと申します。コラプサーの……いえ、今日は違いますね。魔王さんとデートに来ました」"
translation = "「저는 도우메키 레이라라고 합니다. 콜랩서의…… 아니, 오늘은 다르네요. 마왕님과 데이트하러 왔어요」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「Ｏｈ！\u3000カイチョーとレイラ、ＢＩＧナカヨシ！\u3000ラブラブですね！」"
translation = "「Oh! 회장이랑 레이라, BIG 사이좋음! 러브러브네!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「そんな、私と魔王さんがラブラブだなんて……本当のことですけど<emoji=heart04>」"
translation = "「세상에, 저랑 마왕님이 러브러브라니…… 사실이지만요<emoji=heart04>」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「リップルさん。ところでこちら、食べ放題と伺ったのですが、それは<ruby>真実<rt>トゥルー</rt></ruby>ですか？」"
translation = "「리플 씨. 그런데 여기, 무한 리필이라고 들었는데 그건 <ruby>진실<rt>트루</rt></ruby>인가요?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「モチのロンです！\u3000リゾート結界は全メニュー、タベホーダイでーす！」"
translation = "「물론이지! 리조트 결계는 전 메뉴, 무한 리필이야~!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「すごい！\u3000楽園は本当にあったんだ！」"
translation = "「대단해! 낙원은 정말 있었어!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「じゃあ、まずカレーをお願いします！」"
translation = "「그럼 우선 카레 부탁드릴게요!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「はーい、タダイマー！」"
translation = "「네이, 금방 가져다줄게!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「うめ……うめ……海の家とは思えない本格的なカレーですね。あとを引く辛さでスプーンが止まりません」"
translation = "「우메(맛있어)…… 우메…… 바닷가 집이라고는 생각되지 않는 본격적인 카레네요. 계속 당기는 매운맛에 숟가락이 멈추지 않아요」"

[[dialogue]]
speaker = "unk"
original = "おかわりもいいぞ"
translation = "더 먹어도 돼"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「はい！\u3000ではラーメンもいただきます。醤油、味噌、塩、とんこつのメジャーどころだけでなく、まぜそばまで完備とは、リゾート結界おそるべし」"
translation = "「네! 그럼 라멘도 먹겠습니다. 간장, 된장, 소금, 돈코츠의 메이저한 것들뿐만 아니라 비빔 소바까지 완비라니, 리조트 결계 무시무시하네요」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「すいませーん！\u3000全部ください！」"
translation = "「저기요~! 전부 다 주세요!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「タダイマー！」"
translation = "「금방 가져다줄게!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「んー！\u3000味によって麺まで違う！\u3000とんこつにはやっぱり細麺ですよね。ひゅごっ……うめ……うめ……」"
translation = "「음~! 맛에 따라 면까지 달라! 돈코츠에는 역시 가는 면이죠. 휴고옷…… 우메…… 우메……」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「リップルさん、ハンバーガーはお取り扱いありますか？」"
translation = "「리플 씨, 햄버거도 취급하시나요?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ハイ！\u3000オススメはＢＩＧステーキをハサんだステーキバーガーです！」"
translation = "「하이! 추천은 BIG 스테이크를 끼운 스테이크 버거야!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「じゃあそれを──ハッ！\u3000リップルさん、少しお耳を」"
translation = "「그럼 그걸── 핫! 리플 씨, 잠깐 귓속말 좀」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「……ふむふむ、なるホド。それはグッドアイディアです！\u3000サッソクやってみまーす！」"
translation = "「……흐음흐음, 과연. 그건 굿 아이디어야! 바로 해볼게!」"

[[dialogue]]
speaker = "unk"
original = "リップルがキッチンに入り、しばらくして戻ってくる。"
translation = "리플이 주방으로 들어가고 잠시 후 돌아온다."

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「オマタセしましタ！」"
translation = "「기다리셨지!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「デカァァァァいッ説明不要！\u3000ＢＩＧバーガータワー！」"
translation = "「데카아아아아아아아아앗 설명 불필요! BIG 버거 타워!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「人の顔ほどもある巨大バーガーを贅沢にも積み重ねた逸品！\u3000まさしく食の重犯罪！\u3000罪重ねるだけに！\u3000ＨＡＨＡＨＡ！！」"
translation = "「사람 얼굴만 한 거대 버거를 사치스럽게도 쌓아 올린 일품! 그야말로 식의 중범죄! 층층이(죄) 쌓인 만큼! HAHAHA!!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「これこそ人の夢！\u3000人の業！\u3000圧巻です。生きててよかった……うめ……うめ……」"
translation = "「이것이야말로 사람의 꿈! 사람의 업! 압권입니다. 살아있길 잘했어…… 우메…… 우메……」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「ん？\u3000魔王さん、私の顔に何か付いてます？」"
translation = "「응? 마왕님, 제 얼굴에 뭐 묻었나요?」"

[[dialogue]]
speaker = "unk"
original = "幸せそうに食べるなって"
translation = "행복하게 먹는다 싶어서"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「はい！\u3000だって幸せですから！\u3000……うめ……うめ……うめぇ……」"
translation = "「네! 왜냐하면 행복하니까요! ……우메…… 우메…… 우메에……」"

[[dialogue]]
speaker = "unk"
original = "一心不乱にハンバーガーを頬張るレイラ。見ているだけでこっちも幸せになりそうな笑顔だった。"
translation = "일심불란하게 햄버거를 입에 넣는 레이라. 보고 있는 것만으로 이쪽도 행복해질 것 같은 미소였다."

