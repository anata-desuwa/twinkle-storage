[[dialogue]]
speaker = "unk"
original = "第２話,演劇とヒメ,P"
translation = "제2화, 연극과 히메"

[[dialogue]]
speaker = "unk"
original = "今日はヒメのために、新星学園を案内していた。"
translation = "오늘은 히메를 위해 신성학원을 안내하고 있었다."

[[dialogue]]
speaker = "unk"
original = "彼女がとりわけ興味を持ったのは演劇部だ。"
translation = "그녀가 특히 관심을 보인 곳은 연극부다."

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「……ふぅ。こんなところでしょうか」"
translation = "「……후우. 이 정도면 됐을까요」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「見事な演技だった、藍殿。稽古中に押しかけてしまってすまないな」"
translation = "「훌륭한 연기였다, 아이 공. 연습 중에 들이닥쳐서 미안하군」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「いえいえそんな、守護天使様にお褒めいただくなんて、畏れ多いです……」"
translation = "「아뇨아뇨 천만에요, 수호천사님께 칭찬을 듣다니 황송할 따름입니다……」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「だがこれから研鑽を積み、本番ではより真に迫った演技になる。脚本が真価を発揮するのはその時だ。そうだろう？」"
translation = "「하지만 앞으로 연마를 쌓아 본 공연에서는 더욱 실감 나는 연기가 되겠지. 각본이 진가를 발휘하는 건 그때일 것이다. 그렇지 않나?」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「ほう、わかるか。さすがは守護天使といったところだな」"
translation = "「호오, 알아보는가. 과연 수호천사라 할 만하군」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「まぁ、芸を見るのはただの趣味なのだが。私の権能とは特に関係ないところだ」"
translation = "「뭐, 예능을 보는 건 그저 취미일 뿐이다. 나의 권능과는 딱히 관계없는 분야지」"

[[dialogue]]
speaker = "unk"
original = "そろそろ次の部に行く？"
translation = "슬슬 다음 부활동 가볼까?"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「おっと、その前に体験入部といかないか？\u3000舞台に興味があるのなら、一度役者になってみるのも悪くなかろう」"
translation = "「어이쿠, 그전에 체험 입부라도 해보지 않겠나? 무대에 흥미가 있다면 한 번 배우가 되어보는 것도 나쁘지 않을 텐데」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「私が役者に……ということか？\u3000お願いしたいところではあるが、稽古で忙しいのではないか？」"
translation = "「내가 배우를…… 말인가? 부탁하고 싶은 마음은 굴뚝같다만, 연습으로 바쁘지 않느냐?」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「部長がお客さんに親切にするなんて珍しいですね。いつもは人が来ても邪魔だって追い返すのに」"
translation = "「부장님이 손님에게 친절하게 굴다니 희한하네요. 평소엔 사람이 와도 방해된다고 쫓아내면서」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「私とて守護天使に褒められれば機嫌も良くなるものだ。それに取材も兼ねている。守護天使とお近づきになる機会はそうそうないからな」"
translation = "「나도 수호천사에게 칭찬받으면 기분이 좋아지기 마련이다. 게다가 취재도 겸하고 있지. 수호천사와 가까워질 기회는 좀처럼 없으니까 말이다」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「なるほど、そういうことであればお言葉に甘えさせてもらおう」"
translation = "「과연, 그렇다면 호의를 받아들이도록 하지」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「では藍、ラプンツェルの台本を持ってきてくれ」"
translation = "「그럼 아이, 라푼젤 대본을 가져와라」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「ラプンツェル……塔の上から長い髪を垂らして、王子を招き入れるのだったか。\u3000ん？\u3000もしかして私がやるのはラプンツェルか……？」"
translation = "「라푼젤…… 탑 위에서 긴 머리카락을 늘어뜨려 왕자를 불러들이는 내용이었던가. 응? 설마 내가 맡는 게 라푼젤인가……?」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「もちろんだ。せっかくの体験入部だというのに、端役をやってどうする」"
translation = "「당연하지. 기껏 체험 입부를 하는데 단역을 맡아서 어떡하나」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「そして相手役の王子は会長だ。会長は我が部の舞台の主役を務めたこともあるからな、優しくエスコートしてくれるぞ」"
translation = "「그리고 상대역인 왕자는 회장이다. 회장은 우리 부 무대의 주연을 맡은 적도 있으니 말이지, 다정하게 에스코트해 줄 거다」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「なっ！？\u3000そそ、それは心の準備が──」"
translation = "「나앗!? 그그, 그것은 마음의 준비가──」"

[[dialogue]]
speaker = "unk"
original = "よろしく、ヒメ"
translation = "잘 부탁해, 히메"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「あ……うぅ……よ、よろしく頼む」"
translation = "「아…… 으으…… 저, 잘 부탁한다」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「台本をどうぞ。書き込みもあるので少し読みにくいかもしれませんが」"
translation = "「대본 여기요. 메모도 있어서 조금 읽기 힘들 수도 있어요」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「あ、ありがとう。どれどれ……なるほど、舞台の脚本はこうなっているのか」"
translation = "「고, 고맙다. 어디 보자…… 과연, 무대 각본은 이렇게 되어 있군」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「ひぁっ！？\u3000キ、キスのシーンもあるのか！？」"
translation = "「히아앗!? 키, 키스 장면도 있는 거냐!?」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「キスくらいで驚いてどうする。これでも随分マイルドにしたのだ。原典では王子と──」"
translation = "「키스 정도로 놀라서 어쩌나. 이래 봬도 상당히 순화한 거다. 원전에서는 왕자와──」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「わ～～～～っ！？\u3000それは言わなくていい！」"
translation = "「와~~~~~!? 그건 말하지 않아도 된다!」"

[[dialogue]]
speaker = "unk"
original = "そして台本読みの後、実際に演技をしてみることに。"
translation = "그리고 대본 리딩 후, 실제로 연기를 해보기로 했다."

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「王子はラプンツェルの髪を梯子にして塔を登りました。しかしラプンツェルは、初めて見た男性に驚き、怯えてしまいます」"
translation = "「왕자는 라푼젤의 머리카락을 사다리 삼아 탑을 올랐습니다. 하지만 라푼젤은 처음 본 남성에게 놀라 겁을 먹고 맙니다」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「あ、あの……」"
translation = "「저, 저기……」"

[[dialogue]]
speaker = "unk"
original = "君があの歌声の主だったんだね"
translation = "네가 그 노랫소리의 주인공이었구나"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「は、はい……塔の中では他にすることがありませんでしたので……。お<ruby>義母様<rt>かあさま</rt></ruby>はうるさいと言うのですが、あなたのお気に召したのでしょうか」"
translation = "「네, 네…… 탑 안에서는 달리 할 일이 없었기에……. 새어머님께서는 시끄럽다고 하십니다만, 당신의 마음에 드셨을까요」"

[[dialogue]]
speaker = "unk"
original = "ああ、今までで最高の歌だよ"
translation = "아아, 지금까지 들은 것 중 최고의 노래야"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「──！\u3000そ、そうですか……」"
translation = "「──! 그, 그런가요……」"

[[dialogue]]
speaker = "unk"
original = "君の髪もとっても綺麗だ"
translation = "네 머리카락도 정말 아름다워"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「そんな……お恥ずかしいです……」"
translation = "「그런…… 부끄럽습니다……」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "（王子に褒められてあんなに嬉しそうに……初めてとは思えない演技ですね）"
translation = "（왕자에게 칭찬받아서 저렇게 기뻐하다니…… 처음이라고는 믿기지 않는 연기네요）"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "（いや、あれは演技か？\u3000チョロいだけにしか見えんが）"
translation = "（아니, 저게 연기인가? 그냥 금방 넘어가는 걸로밖엔 안 보인다만）"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「何度か会ううちにラプンツェルの恐怖心は薄れ、やがて王子に好意を抱くようになる。そして２人はしっぽりと──」"
translation = "「몇 번 만나는 동안 라푼젤의 공포심은 옅어지고, 이윽고 왕자에게 호감을 품게 된다. 그리고 두 사람은 오붓하게──」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「待て待て待て待て！？\u3000舞台どころではなくなってしまうぞ！？」"
translation = "「기다려 기다려 기다려 기다려!? 무대 문제가 아니게 되어버리잖아!?」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「まったく、そこがラプンツェルの肝だろうに。とはいえ廃部になってはたまらんから、演劇部の脚本ではキスでごまかしてある」"
translation = "「정말이지, 그게 라푼젤의 핵심일 텐데. 뭐 폐부가 되면 곤란하니까, 연극부 대본에서는 키스로 얼버무려 뒀어」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「そ、そうか、それなら大丈夫……」"
translation = "「그, 그런가, 그렇다면 다행……」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「──ではない！？\u3000そうだ、そのシーンがあるのだったな……」"
translation = "「──이 아니잖아!? 맞다, 그 장면이 있었지……」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「……キスするふり？\u3000ま、まぁ、そういうことなら──って近い近い近い！？」"
translation = "「……키스하는 척? 뭐, 뭐어, 그런 거라면── 그보다 가까워 가까워 가까워!?」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「何を臆している！\u3000守護天使だろうが役者ならば容赦はせんぞ！」"
translation = "「무얼 겁내고 있나! 수호천사라 해도 배우라면 용서치 않겠다!」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「そう言われても……！？」"
translation = "「그렇게 말해도……!?」"

[[dialogue]]
speaker = "unk"
original = "嫌ならここでやめておくけど"
translation = "싫으면 여기서 그만둘게"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「い、嫌ではないんだが……」"
translation = "「시, 싫은 건 아니다만……」"

[[dialogue]]
speaker = "unk"
original = "それじゃいくよ"
translation = "그럼 간다"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「ま、ままま、待って、心の準備が──」"
translation = "「기, 기기기, 기다려, 마음의 준비가──」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「ひぁああああああ～～～～～～～～っ！！？」"
translation = "「히야아아아아아아～～～～～～～～앗!!?」"

[[dialogue]]
speaker = "unk"
original = "ヒメは目を回してひっくり返ってしまい、演劇部の体験入部は中止に。"
translation = "히메는 눈을 돌리며 뒤집어져 버렸고, 연극부의 체험 입부는 중지."

[[dialogue]]
speaker = "unk"
original = "「役者は大変なのだな……」と後にヒメは語ったのだった。"
translation = "「배우는 힘든 것이로군……」이라고 후에 히메는 말했던 것이었다."

