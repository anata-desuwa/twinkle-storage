[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「さすがにこの時間は、誰もいませんね」"
translation = "「역시 이 시간에는, 아무도 없네요」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「大聖堂に無断で入ったらまずいんじゃない……？\u3000どうしてこんなところに……」"
translation = "「대성당에 무단으로 들어오면 안 되는 거 아냐……? 어째서 이런 곳에……」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「私があなたをどれだけ愛しているのか──真実の愛を女神様の前で証明しようと思いまして」"
translation = "「제가 당신을 얼마나 사랑하고 있는지── 진실한 사랑을 여신님 앞에서 증명하려고 생각해서요」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「証明って……どうやって？」"
translation = "「증명이라니…… 어떻게?」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「こうやって、ですよ」"
translation = "「이렇게, 말이에요」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「私の矢は、対象の愛を刺激し、心を剥き出しにさせる力があります。そしてそれは私も例外ではありません」"
translation = "「제 화살은, 대상의 사랑을 자극하고, 마음을 드러나게 하는 힘이 있습니다. 그리고 그것은 저 또한 예외가 아니에요」"

[[dialogue]]
speaker = "unk"
original = "戦闘服に変身したウルスラは、自分の武器である矢を左の胸元──心臓の真上にあてがうと、まるで自害するかのようにその矢を心臓に突き入れた。"
translation = "전투복으로 변신한 우르술라는, 자신의 무기인 화살을 왼쪽 가슴팍── 심장 바로 위에 갖다 대더니, 마치 자결이라도 하려는 듯 그 화살을 심장에 찔러 넣었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ウルスラっ！？」"
translation = "「우르술라!?」"

[[dialogue]]
speaker = "unk"
original = "矢は、すぅ……と溶けるように消え、そして──"
translation = "화살은, 스윽…… 하고 녹아내리듯 사라지고, 그리고──"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「んぁっはあぁぁんっ……<emoji=heart04>」"
translation = "「응아아하아아앙……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ウルスラは甘い喘ぎを大聖堂に響かせた。"
translation = "우르술라는 달콤한 신음을 대성당에 울려 퍼뜨렸다."

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「はぁ、はっ……んぁぁ……会長さんを愛する気持ちが溢れてっ……<emoji=heart04>\u3000抑えられなくってっ……止まらなくってぇ……っ<emoji=heart04>」"
translation = "「하아, 하윽…… 응아아…… 회장님을 사랑하는 마음이 넘쳐흘러서어……<emoji=heart04> 억누를 수 없게 돼서어…… 멈추지 않아서어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「ふはぁ、はぁ……これが、矢によって解き放たれた、私の本心……<emoji=heart04>\u3000会長さんが欲しくて、欲しくて、たまらないんですうぅ……<emoji=heart04>」"
translation = "「후하아, 하아…… 이것이, 화살에 의해 해방된, 저의 본심……<emoji=heart04> 회장님이 갖고 싶어서, 갖고 싶어서, 견딜 수 없어요오……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「んぁあぁはぁぁぁぁんっ……<emoji=heart04>\u3000会長さん、しゅきっ、しゅきっ、だぁいしゅきぃっ……<emoji=heart04>」"
translation = "「응아아아하아아아앙……<emoji=heart04> 회장님, 죠아, 죠아, 너어무 죠아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ウルスラ……え、ちょ、何を……！？」"
translation = "「우르술라…… 에, 저기, 뭘……!?」"

[[dialogue]]
speaker = "unk"
original = "突然好き好きオーラ全開になったウルスラは、俺に近づき、体を摺り寄せてきた。"
translation = "갑자기 좋아해 좋아해 오라를 전개한 우르술라는, 나에게 다가와 몸을 비벼왔다."

[[dialogue]]
speaker = "unk"
original = "たわわな胸が腕に押し付けられ、脚を絡ませ、股間が太ももに擦りつけられる。"
translation = "풍만한 가슴이 팔에 눌리고, 다리를 얽으며, 가랑이가 허벅지에 문질러진다."

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「あれぇ？\u3000会長さんのおち○ぽ、バキバキに勃起してませぇん？\u3000ねーぇ？」"
translation = "「어라아? 회장님 자지, 딱딱하게 발기해 있지 않아아? 그치이?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「お、おち○ぽって──あっ……！」"
translation = "「자, 자지라니── 앗……!」"

[[dialogue]]
speaker = "unk"
original = "ウルスラの細い指が、ズボンに浮き上がった性器の輪郭をなぞる。"
translation = "우르술라의 가느다란 손가락이, 바지 위로 툭 불거진 성기의 윤곽을 덧그린다."

[[dialogue]]
speaker = "unk"
original = "ウルスラと恋人同士になって数ヶ月、数えきれないくらい肌を重ねているけれど、ウルスラの口から下品な男性器の呼び名が発されたのは初めてだ。"
translation = "우르술라와 연인 사이가 된 지 수개월, 셀 수 없을 정도로 몸을 섞어왔지만, 우르술라의 입에서 저질스러운 남성기의 호칭이 튀어나온 것은 처음이다."

[[dialogue]]
speaker = "unk"
original = "普段は『アソコ』『男性器』くらいで、恥ずかしさを堪えて『おち○ちん』を言うのが、やっとだったはずなのに。"
translation = "평소에는 『거기』 『남성기』 정도로, 부끄러움을 참고 『고추』라고 말하는 게 고작이었을 텐데."

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「はぁ、はぁっ……すっごぉい……<emoji=heart04>\u3000私のおま○こに何度もズポズポ入ってきて、い～っぱいイかせてくれたカッコいいおち○ぽっ……<emoji=heart04>\u3000はぁっ、んぁぁっ……<emoji=heart04>」"
translation = "「하아, 하아…… 굉장해……<emoji=heart04> 내 보지에 몇 번이나 퍽퍽 들어와서, 가드윽 가게 해준 멋진 자지……<emoji=heart04> 하아, 응아아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ウルスラの声で『おま○こ』なんて言葉も初めて耳にした。熱っぽい吐息が耳に注がれ、淫語という媚薬が理性をトロトロに溶かす。"
translation = "우르술라의 목소리로 『보지』 같은 말도 처음으로 귀에 담았다. 뜨거운 숨결이 귓가에 쏟아지고, 음어라는 미약이 이성을 걸쭉하게 녹인다."

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「私のおま○こがぐっちょぐちょに濡れてるのバレちゃってますよね……ぬめぬめのマン汁、ズボンにまで染みちゃってますもんね……<emoji=heart04>」"
translation = "「제 보지가 축축하게 젖어있는 거 들켜버렸죠…… 미끈미끈한 애액이, 바지에까지 배어버렸는걸요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ウルスラの股間が擦りつけられているズボンには染みができていて、ねっちょりと糸を引いていた。"
translation = "우르술라의 가랑이가 비벼지고 있는 바지에는 얼룩이 생겨 있었고, 끈적하게 실을 긋고 있었다."

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「はぁっ、はぁ……したいです……会長さんと濃ゆぅいセックスぅ……<emoji=heart04>\u3000パンパンパンって、肉と肉をぶつけ合うドスケベセックスぅ……<emoji=heart04>」"
translation = "「하아, 하아…… 하고 싶어요…… 회장님이랑 진득한 섹스으……<emoji=heart04> 팡팡팡 하고, 살과 살을 부딪치는 초음란 섹스으……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「ね……シましょ<emoji=heart04>\u3000女神様の前で、濃厚な愛を誓っちゃいましょ、ねっ？\u3000ちゅ、ちゅっ、ちゅっ<emoji=heart04>」"
translation = "「저기…… 해해요<emoji=heart04> 여신님 앞에서, 농후한 사랑을 맹세해버려요, 네? 쪽, 쪽, 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "いかに神聖な場所だろうが、何度もキスを浴びせてくる愛しい彼女の誘惑に抗えるはずがなかった。"
translation = "아무리 신성한 장소라 한들, 몇 번이고 키스를 퍼붓는 사랑스러운 그녀의 유혹을 뿌리칠 수 있을 리 없었다."

[[dialogue]]
speaker = "unk"
original = "ウルスラはぐっしょりと愛液の染み込んだ股間を自分で破くと、俺に挿入すべき場所を示すように大きく股を広げた。"
translation = "우르술라는 애액이 듬뿍 스며든 가랑이를 스스로 찢더니, 나에게 삽입해야 할 곳을 가리키듯 다리를 크게 벌렸다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「本当に、ここで……？」"
translation = "「정말로, 여기서……?」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「最も神聖な場所で、淫らに愛し合うだなんて……最っっっ高に興奮しちゃうじゃないですかぁっ……<emoji=heart04>」"
translation = "「가장 신성한 장소에서, 음란하게 사랑을 나누다니…… 최애애고로 흥분돼버리잖아요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「ほらぁ……ぱくぱく開いたおま○こ、奥まで丸見えになってますよぉ……会長さんのおち○ぽ欲しくて、疼いちゃってるんですよぉ……<emoji=heart04>」"
translation = "「봐요…… 뻐끔뻐끔 벌어진 보지, 안쪽까지 다 보이고 있어요…… 회장님 자지가 갖고 싶어서, 욱신거리고 있다고요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「はぁっ、はぁ、会長さぁんのだってぇ……先っぽからカウパーがどばどばあふれて……ぶっとぉい血管も浮き出て……なんてドスケベなおち○ぽ……<emoji=heart04>」"
translation = "「하아, 하아, 회장님 것도오…… 끝부분에서 쿠퍼액이 펑펑 넘쳐서…… 굵직한 혈관도 툭 불거지고…… 정말 음란한 자지……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「こんなの見せられたら、どんな女の子だって屈しちゃいます……<emoji=heart04>\u3000奥まで入れられて、子宮コンコンされたら、しゅきしゅきになっちゃいますよぉ……<emoji=heart04>」"
translation = "「이런 걸 보면, 어떤 여자애라도 굴복해버려요……<emoji=heart04> 안쪽까지 박혀서, 자궁 콩콩 당하면, 좋아 죽게 돼버릴 거예요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「すぅ、はぁ、すぅ……ううぅぅんっ<emoji=heart04>\u3000おち○ぽの蒸れた匂いがここまで届いて……はぁぁん、子宮っ、きゅんきゅんしゅるぅ……<emoji=heart04>」"
translation = "「스으, 하아, 스으…… 으으으응<emoji=heart04> 자지의 큼큼한 냄새가 여기까지 닿아서…… 하아앙, 자궁이, 큥큥거려어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「はぁ、もう我慢できませんっ……早くぅ、早く挿入て、つよつよち○ぽぶちこんでくだしゃぁい……<emoji=heart04>」"
translation = "「하아, 이제 못 참겠어요…… 빨리이, 빨리 삽입해줘요, 강한 자지 박아주세여어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「おち○ぽっ、たくましいカッコいいおち○ぽっ<emoji=heart04>\u3000早くぅ、早くぅっ……<emoji=heart04>\u3000焦らすのは、なしですっ……待ちきれないんですからぁっ……<emoji=heart04>」"
translation = "「자지이, 늠름하고 멋진 자지이<emoji=heart04> 빨리이, 빨리이……<emoji=heart04> 애태우는 건, 없기에요…… 못 기다리겠으니까아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「私の発情おま○こっ……本気汁でねちゃねちゃのどろっどろぉ……<emoji=heart04>\u3000勃起ち○ぽ欲しすぎて、ヨダレ垂らしちゃってますからぁ……<emoji=heart04>」"
translation = "「제 발정 난 보지이…… 본능적인 애액으로 끈적끈적 질척질척……<emoji=heart04> 발기한 자지가 너무 갖고 싶어서, 침을 흘리고 있으니까요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "勢いに流され、大量かつ粘度の高い愛液をあふれさせる割れ目へとペニスを近づける。"
translation = "기세에 휩쓸려, 대량의 끈적이는 애액을 흘려보내는 갈라진 틈으로 페니스를 가까이 가져간다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あっ……コンドーム──」"
translation = "「앗…… 콘돔──」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「んもぉ……そんな邪魔なの、いらないですよぉ……な・ま・で<emoji=heart04>\u3000生ち○ぽを生ま○こにぶち込んでぇ……生ハメ孕まセックスするんですよぉ……<emoji=heart04>」"
translation = "「정말이지…… 그런 거추장스러운 건 필요 없어요…… 생·으·로<emoji=heart04> 생자지를 생보지에 처박아서…… 생삽입 임신 섹스 하는 거예요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "今まで避妊具を着けずに挿入なんてしたことない。生ですることのリスクくらい、ウルスラだって分かっているはずなのに。"
translation = "지금까지 피임 기구를 착용하지 않고 삽입한 적은 없다. 노콘으로 하는 것의 리스크 정도는 우르슬라도 알고 있을 텐데."

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「はぁっ……はぁ、強いオスに媚び媚びのドスケベおま○こぉ……<emoji=heart04>\u3000どちゅどちゅ思う存分突き倒して……使い潰してくらしゃぁいっ……<emoji=heart04>」"
translation = "「하앗…… 하아, 강한 수컷에게 아양 떠는 초음란 보지이……<emoji=heart04> 질퍽질퍽 마음껏 찔러대서…… 망가뜨려 주세여어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "腰をくねらせ、淫猥なダンスを舞う。ヒクついてる膣内に直接入れたら絶対気持ちいいに決まってる。"
translation = "허리를 비틀며 음란한 춤을 춘다. 벌름거리는 질 안에 직접 넣으면 분명 기분 좋을 것이 뻔하다."

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「んふぅっ<emoji=heart04>\u3000会長さんの目、オスむき出しで怖ぁくなってますっ……<emoji=heart04>\u3000おま○こに入りたくて犯したくて仕方ないおち○ぽ、悦びすぎて勃ちすぎですよぉ……<emoji=heart04>」"
translation = "「응후웃<emoji=heart04> 회장님의 눈, 수컷 본능이 드러나서 무서워졌어요……<emoji=heart04> 보지에 들어가고 싶어서, 범하고 싶어서 어쩔 줄 모르는 자지, 너무 기뻐서 잔뜩 발기했네요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「あっ<emoji=heart04>\u3000カッタぁくてアッツぅいの当たりましたぁ……もうちょっと下ぁ……あんっ<emoji=heart04>\u3000あっ、会長さんっ、そこ、そこっ、そのままぁっ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 딱딱하고 뜨거운 게 닿았어요…… 조금만 더 아래…… 아응<emoji=heart04> 앗, 회장님, 거기, 거기이, 그대로오……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「ひぁ、あぁあぁっ……<emoji=heart04>\u3000ちょっぴり挿入りっ──んぉっ<emoji=heart04>\u3000奥まで、一気にっ、貫いてっ──」"
translation = "「히아, 아아아앗……<emoji=heart04> 조금 삽입됐── 응옷<emoji=heart04> 안쪽까지, 단숨에, 꿰뚫어 줘──」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「んぅっ<emoji=heart04>\u3000きゅふぅううぅうぅぅぅぅんっ<emoji=heart04><emoji=heart04>」"
translation = "「응으읏<emoji=heart04> 큐후우우우우우우우우우웃<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスは吸い込まれるようにウルスラの最奥に届いた。"
translation = "페니스는 빨려 들어가듯 우르술라의 가장 깊은 곳에 닿았다."

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「はぁ、はひっ<emoji=heart04>\u3000はっ、はぁ、んぁあぁっ<emoji=heart04>\u3000入れられただけで、ちょっと、イッひゃいまちたぁ……<emoji=heart04>」"
translation = "「하아, 하히잇<emoji=heart04> 하, 하아, 응아아앗<emoji=heart04> 넣어지는 것만으로도, 조금, 가버렸어여어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「んぁっ<emoji=heart04>\u3000はぁっ、はぁ、はぁっ<emoji=heart04>\u3000ゴムがないと引っかかりがなくって……こんな簡単に、入っちゃうれすねぇっ……<emoji=heart04>」"
translation = "「응앗<emoji=heart04> 하앗, 하아, 하앗<emoji=heart04> 콘돔이 없으니까 걸리는 게 없어서…… 이렇게 간단히, 들어와 버리네여어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「簡単に入ったのは、ウルスラのおま○こがぐちゃぐちゃなせいだよ……っ」"
translation = "「간단히 들어온 건, 우르술라의 보지가 엉망진창인 탓이야……!」"

[[dialogue]]
speaker = "unk"
original = "初の生挿入。薄いゴムの被膜がないだけなのに、亀頭粘膜に伝わる生の感覚は、まるで別物だった。"
translation = "첫 생삽입. 얇은 고무 피막이 없을 뿐인데, 귀두 점막에 전해지는 생생한 감각은 마치 별개였다."

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「んぅくっ……<emoji=heart04>\u3000はっ、あっはぁぁ<emoji=heart04>\u3000いつもよりおち○ぽの熱が感じられてぇ……<emoji=heart04>\u3000生ハメって、こんなに、きもちいいんですねっ……<emoji=heart04>」"
translation = "「응으윽……<emoji=heart04> 핫, 앗하아아<emoji=heart04> 평소보다 자지의 열기가 느껴져서어……<emoji=heart04> 생삽입이란 거, 이렇게나, 기분 좋은 거네여……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "熱くて、とろとろで、めちゃくちゃに気持ちいい。こんな快感、知っちゃダメだった。"
translation = "뜨겁고, 걸쭉하고, 미칠 듯이 기분 좋다. 이런 쾌감, 알아버리면 안 되는 것이었다."

[[dialogue]]
speaker = "unk"
original = "理性がぐずぐすに溶けて、ペニスをハメてる気持ちいい穴のことしか考えられなくなる。もう手遅れだ。"
translation = "이성이 흐물흐물하게 녹아, 페니스를 박고 있는 기분 좋은 구멍 생각밖에 할 수 없게 된다. 이미 늦었다."

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「はぁ、あっ、もっと動いて……動きましょお……おま○ことおち○ぽっ、一緒にズリズリ擦って、きもちよくなりましょぉ……<emoji=heart04>」"
translation = "「하아, 앗, 좀 더 움직여 줘요…… 움직이자구여…… 보지랑 자지이, 같이 비비적비비적 문질러서, 기분 좋아져여어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「んぅいひっ<emoji=heart04>\u3000んぉ、ふっ、ほぉっ<emoji=heart04>\u3000しゅごぉっ<emoji=heart04>\u3000おち○ぽがっ、おま○こゴリゴリ引っ掻いてるぅっ<emoji=heart04>\u3000こんな激しいピストンっ、んぉっ<emoji=heart04>\u3000ぉ、ほぉぅんっ<emoji=heart04>」"
translation = "「응으이힛<emoji=heart04> 응오, 훗, 호옷<emoji=heart04> 대단해애<emoji=heart04> 자지가아, 보지를 고리고리 긁고 있어어엇<emoji=heart04> 이런 격렬한 피스톤, 응옷<emoji=heart04> 오, 호오웅<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「あっ<emoji=heart04>\u3000ああぁんっ<emoji=heart04>\u3000おち○ぽしゅごいぃっ<emoji=heart04>\u3000んひっ<emoji=heart04>\u3000ひぃっ<emoji=heart04>\u3000深いところまで、届いて、おま○ことろけひゃいますぅっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 아아앙<emoji=heart04> 자지 대단해애<emoji=heart04> 응힛<emoji=heart04> 히잇<emoji=heart04> 깊은 곳까지 닿아서, 보지가 녹아버려여어엇<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ウルスラがいけないんだからなっ……俺のこと煽って……くぅぅっ……！」"
translation = "「우르술라가 나쁜 거니까…… 나를 도발하고…… 쿠우우읏……!」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「んぉっ<emoji=heart04>\u3000はぉっ、んぉほっ、ずっぷ、ずっぷぅ<emoji=heart04>\u3000んぅうぅぅっ<emoji=heart04>\u3000会長さんと繋がって、ひとつになってるの<emoji=heart04>\u3000嬉しっ<emoji=heart04>\u3000しあわしぇれすぅ<emoji=heart04>」"
translation = "「응옷<emoji=heart04> 하옷, 응오홋, 쥬웁, 쥬우웁<emoji=heart04> 응으으으읏<emoji=heart04> 회장님과 연결돼서, 하나가 된 거<emoji=heart04> 기뻐어<emoji=heart04> 행복해여어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「ほふっ、はーっ、はぁぁあぁーっ、んひぃいぃっ<emoji=heart04>\u3000こんらのセックスじゃないれすよねっ<emoji=heart04>\u3000交尾っ、お下品交尾れしゅよねっ<emoji=heart04>」"
translation = "「호훗, 하아─, 하아아아─, 응히이잇<emoji=heart04> 이건 섹스가 아니네여어<emoji=heart04> 교미이, 저질 교미네여어어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ウルスラは内心、こんな激しいセックス──いや、理性をなくした獣みたいな交尾をしたいと思っていたのか。"
translation = "우르술라는 내심, 이런 격렬한 섹스── 아니, 이성을 잃은 짐승 같은 교미를 하고 싶다고 생각했던 것일까."

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「会長さんのおち○ぽでっ、子宮ぐりぐりされないとっ<emoji=heart04>\u3000おま○こ、イケなくなっちゃったんですからぁっ<emoji=heart04>」"
translation = "「회장님의 자지로오, 자궁을 구리구리 당하지 않으면어엇<emoji=heart04> 보지, 못 가게 되어버렸으니까아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「ドスケベま○こにしたのは、会長さんのおち○ぽなんですからねっ<emoji=heart04>\u3000会長さんがいけないんですからねっ<emoji=heart04>」"
translation = "「초음란 보지로 만든 건, 회장님의 자지니까여어어<emoji=heart04> 회장님이 나쁜 거니까여어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「孕みたがりの発情おま○こ、ザーメンで溺れさせてッ──んぉ、ほぉおぉぉっ<emoji=heart04>\u3000ぐちょぐちょぬるぬるぅっ<emoji=heart04>\u3000ふぅんっ、おま○こおがしくにゃりそっ<emoji=heart04>」"
translation = "「임신하고 싶어 하는 발정 보지, 정액으로 익사시켜 줘어── 응오, 호오오오옷<emoji=heart04> 구적구적 미끌미끌으으읏<emoji=heart04> 후웅, 보지 이상해져 버릴 거 가태애<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ウルスラがそう望むなら俺も──"
translation = "우르술라가 그렇게 바란다면 나도──"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「はぉ、ほぁっ、しゅっごぉい<emoji=heart04>\u3000おち○ぽっ、激しくなったぁっ<emoji=heart04>\u3000出たり、入ったり、出たり、入ったりぃ<emoji=heart04>\u3000おま○こっ、ごりっごりぃ<emoji=heart04>」"
translation = "「하오, 호앗, 대애단해<emoji=heart04> 자지이, 격렬해졌어어엇<emoji=heart04> 나왔다, 들어갔다, 나왔다, 들어갔다아아<emoji=heart04> 보지이, 고리고리이이<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「はぉ、はぉんっ<emoji=heart04>\u3000生ハメ交尾がこんなにきもちいいなんて知りまへんれしたっ<emoji=heart04>\u3000こんなの知ったら、バカにぃっ、ばかばかおま○こになっぢゃいまひゅぅん<emoji=heart04>」"
translation = "「하오, 하온<emoji=heart04> 생삽입 교미가 이렇게 기분 좋은 줄 몰랐어여어<emoji=heart04> 이런 거 알면, 바보가아, 바보바보 보지가 되어버려여어어웅<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「んぉっ、あっあっあっ<emoji=heart04>\u3000ずーっとずーっとおち○ぽ入れてたいれすっ<emoji=heart04>\u3000会長さんと離れたくないれすっ<emoji=heart04>\u3000ぢゅぷぢゅぷしていたいれすっ<emoji=heart04>\u3000んぉぉおぉんっ<emoji=heart04>」"
translation = "「응옷, 앗앗앗<emoji=heart04> 계속 계속 자지 넣고 싶어여어<emoji=heart04> 회장님이랑 떨어지기 싫어여어<emoji=heart04> 쥬푸쥬푸 하고 싶어여어<emoji=heart04> 응오오오온<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「んひっ、おま○こからっ、頭のてっぺんまでぇっ<emoji=heart04>\u3000おち○ぽっ、おち○ぽにぃ、貫かれへるぅぅんっ<emoji=heart04>\u3000んひぉ、あー、そこっ<emoji=heart04>\u3000そこぉっ<emoji=heart04>」"
translation = "「응힛, 보지에서어, 머리 꼭대기까지이이<emoji=heart04> 자지이, 자지에에, 꿰뚫리고 있어어어웅<emoji=heart04> 응히오, 아─, 거기이<emoji=heart04> 거기이잇<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「もう、イッちゃいそっ<emoji=heart04>\u3000あっ、あっ<emoji=heart04>\u3000これヤッバぁ<emoji=heart04>\u3000イクイクイックぅうぅぅっ<emoji=heart04><emoji=heart04>」"
translation = "「이제, 가버릴 거 가태애<emoji=heart04> 앗, 앗<emoji=heart04> 이거 대박이야아<emoji=heart04> 가아악 가가각 가버려어어어어엇<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「んふ、はっ、ぁおんっ<emoji=heart04>\u3000きもひよしゅぎっ<emoji=heart04>\u3000ざこざこおま○こ、すぐイッちゃいまひゅっ<emoji=heart04>\u3000どんどんおバカになっぢゃいまひゅっ<emoji=heart04>」"
translation = "「응후, 핫, 아온<emoji=heart04> 너무 기분 조아아<emoji=heart04> 좁보 보지, 금방 가버려여어<emoji=heart04> 점점 바보가 되어버려여어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「はぉんっ<emoji=heart04>\u3000んはっ、あへっ、会長しゃんもっ、もうすぐイキしょ？\u3000イキしょぉれすよねぇ？」"
translation = "「하온<emoji=heart04> 응핫, 아헷, 회장님도오, 이제 곧 가겠져? 가겠져어어?」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「おち○ぽ、ぷくぅううっって膨らんでますもぉんっ<emoji=heart04>\u3000イキたいんれすよねっ？」"
translation = "「자지이, 푸쿠우우우웃 하고 부풀어 올랐는걸요오오<emoji=heart04> 가고 싶은 거져어?」"

[[dialogue]]
speaker = "unk"
original = "饒舌に射精欲を煽ってくる彼女に、俺は頭を縦に振ることと、乱暴に腰を動かすことしかできない。"
translation = "요염하게 사정욕을 부추기는 그녀에게, 나는 고개를 끄덕이는 것과 난폭하게 허리를 움직이는 것밖에 할 수 없었다."

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「いいれすよぉっ<emoji=heart04>\u3000おま○こに、遠慮なく出ひてっ、孕ませ汁ぅ、びゅーっびゅーっびゅーって<emoji=heart04>\u3000たぁっぷり中出ししちゃってくださいれ<emoji=heart04>」"
translation = "「괜찮아여어어<emoji=heart04> 보지에, 사양 말고 내보내 줘여어, 임신시키는 즙으으, 뷰우웃 뷰우웃 뷰우웃 하고오<emoji=heart04> 드으음뿍 질내사정 해버려주세여어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「はぉんっ、ほっ、いいっ、いいんですよぉ<emoji=heart04>\u3000彼女れすもんっ<emoji=heart04>\u3000そにょままぁ、私の奥ぅ、子宮にぃ<emoji=heart04>」"
translation = "「하오온, 홋, 좋아여, 좋아여어어<emoji=heart04> 여자친구인걸요오<emoji=heart04> 그으대로오, 제 안쪽으으, 자궁에에에<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「どぴゅっ、どぴゅっどぴゅうぅぅぅぅって<emoji=heart04>\u3000子宮もラブラブザーメン欲しがってまひゅからっ<emoji=heart04>\u3000ぜぇんぶ私のおま○こが、独り占めしちゃうんでぇす<emoji=heart04>」"
translation = "「도퓨, 도퓨 도퓨우우우우우우 하고오오<emoji=heart04> 자궁도 러브러브 정액을 원하고 있으니까여어어<emoji=heart04> 저어언부 제 보지가, 독차지해버릴 거예에에여」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「ほらっ、ほらっほらぁっ、おま○こっ、おま○こにっ、ぴゅっぴゅしてっ<emoji=heart04>\u3000出ぁして、出して、出してっ<emoji=heart04>」"
translation = "「자아, 자아 자아아, 보지에, 보지에에, 퓨퓨 해줘어어<emoji=heart04> 내애줘, 내줘, 내줘어어엇<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "不安定な体勢にもかかわらず、ウルスラがぐりぐりと腰を捻り、ペニスに刺激を与えてくる。"
translation = "불안정한 자세임에도 불구하고, 우르술라가 구리구리 허리를 비틀며 페니스에 자극을 준다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くぅうぅっ！？\u3000激しすぎるって、待ってっ、出る、出ちゃうからっ……！」"
translation = "「쿠우우읏!? 너무 격렬하다고, 잠깐, 나온다, 나올 것 같으니까……!」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「んふっ、ふふっ<emoji=heart04>\u3000いいれすよっ、イッちゃいましょっ<emoji=heart04>\u3000孕ませザーメンぶちまけちゃいましょっ<emoji=heart04>\u3000子宮にいっぱい塗りこんでっ、ぉんっ<emoji=heart04>」"
translation = "「응훗, 후훗<emoji=heart04> 좋아여어, 가버리자구여어<emoji=heart04> 임신시키는 정액 쏟아버리자구여어<emoji=heart04> 자궁에 잔뜩 발라줘서어, 온<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ウルスラのおま○こは、俺の性感帯を的確に刺激し、絶頂に至らしめる苛烈な腰振りで追い込んでいく。"
translation = "우르술라의 보지는 나의 성감대를 정확하게 자극하며, 절정에 이르게 하는 가혹한 허리 놀림으로 몰아붙인다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くぁっ！？\u3000イ、イッくぅっ……！」"
translation = "「쿠앗!? 가, 가버려엇……!」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「んんはぁっ<emoji=heart04>\u3000いい、いいれすよぉっ、いっしょっ<emoji=heart04>\u3000いっしょにイキましょーねっ<emoji=heart04>\u3000先にイッちゃったら、もう１発おかわりおねだりしちゃいますからねっ<emoji=heart04>」"
translation = "「응응하앗<emoji=heart04> 좋아여, 좋아여어어, 같이이<emoji=heart04> 같이 가버려여어어<emoji=heart04> 먼저 가버리면, 한 판 더 리필해달라고 조를 거니까여어어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ザーメンをねだる膣肉の攻勢に抗えず、普段のセックスで得たことのない未知の刺激に、あっという間に射精欲の頂点を突破した。"
translation = "정액을 갈구하는 질 근육의 공세에 저항하지 못하고, 평소의 섹스에서 얻어본 적 없는 미지의 자극에 순식간에 사정욕의 정점을 돌파했다."

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「はぁんっ、おち○ぽっ、おっきくなりまひたぁっ<emoji=heart04>\u3000くらひゃいっ、キンタマでぐつぐつのザーメンっ、ぜぇんぶ吐き出しへぇ<emoji=heart04>」"
translation = "「하아앙, 자지이, 커졌어여어어<emoji=heart04> 주세여어어, 불알에서 부글부글 끓는 정액으으, 저어언부 뱉어내 줘여어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「ぜぇんぶ、会長さんのザーメンっ、私の中に出してっ<emoji=heart04>\u3000初めての、中出しザーメンくらさいっ<emoji=heart04>\u3000んぉおっ<emoji=heart04>\u3000んぉほっ、はぉっ、ほぁ、あっ、んぉほぉぉっ<emoji=heart04>」"
translation = "「저어언부, 회장님의 정액으으, 제 안에 내보내 줘여어<emoji=heart04> 첫, 질내사정 정액 주세여어어<emoji=heart04> 응오오옷<emoji=heart04> 응오홋, 하옷, 호아, 앗, 응오호오오옷<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「あっ、は、ふぉっ<emoji=heart04>\u3000あっ、あん、ぉんッ<emoji=heart04>\u3000しゅきっ、しゅきれすっ、しゅきしゅきしゅきっだぁいしゅきぃいぃぃっ<emoji=heart04>」"
translation = "「앗, 하, 후옷<emoji=heart04> 앗, 앙, 온<emoji=heart04> 조아, 조아해여어, 조아조아조아 조오오오아해여어어어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「あっ、んぉあぉっ！\u3000イクッ、イキそ<emoji=heart04>\u3000おま○こっ、おま○こイクッイクッイッグぅうぅぅぅんっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗, 응오아옷! 가버려, 갈 것 가태애<emoji=heart04> 보지이, 보지 가버려 가버려 가가가가버려어어어어어어어웅<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「んっおぉうぅうぅううぅぅんっ<emoji=heart04><emoji=heart04>」"
translation = "「응오오오우우우우우우우우웅<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「んほぉおっ！？\u3000ほぉっ、んひぃいぃぃっ<emoji=heart04>\u3000おっ、はぉっ<emoji=heart04>\u3000んぉ、はっ、おっ、んぉおんっ<emoji=heart04>」"
translation = "「응호오옷!? 호옷, 응히이이이잇<emoji=heart04> 오, 하옷<emoji=heart04> 응오, 핫, 오, 응오온<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "大量の射精が始まると同時、ウルスラも全身を痙攣させ、獣の咆哮のような嬌声を上げながら絶頂に達する。"
translation = "대량의 사정이 시작됨과 동시에 우르술라도 온몸을 경련시키며, 짐승의 포효 같은 교성을 지르며 절정에 달한다."

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「んぅくぅうぅぅっ！？\u3000んふっ、ふっ、んぅいっ<emoji=heart04>\u3000びゅくびゅくぅっ<emoji=heart04>\u3000膣奥にっ、ザーメンっ、当たりまひゅっ<emoji=heart04>」"
translation = "「응으쿠우우우웃!? 응훗, 훗, 응으잇<emoji=heart04> 뷰쿠뷰쿠우웃<emoji=heart04> 질 안쪽에에, 정액이이, 닿아여어어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「んはっ<emoji=heart04>\u3000子宮にっ、アッちゅぅいのっ、注がれへぅ……<emoji=heart04>\u3000びゅーびゅーっ、びゅくっびゅくぅ、ってぇ<emoji=heart04>\u3000んぅ、はっ、んぁはぁっ……んはぁあぁぁっ<emoji=heart04>」"
translation = "「응핫<emoji=heart04> 자궁에에, 뜨거우운 게에, 부어지고 있어어어……<emoji=heart04> 뷰우뷰우우, 뷰쿠 뷰쿠우, 하고오오<emoji=heart04> 응으, 핫, 응아하앗…… 응하아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "精を流しこむ度、ビクビクと体を激しく震わせるウルスラ。"
translation = "정액을 쏟아부을 때마다 파르르 몸을 격렬하게 떠는 우르술라."

[[dialogue]]
speaker = "unk"
original = "膣肉もキツく締めつけてきて、確実に子を宿そうと搾り取ってくる。"
translation = "질 근육도 꽉 조여오며, 확실하게 아이를 배려는지 쥐어짜 온다."

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「んひぃっ<emoji=heart04>\u3000もっともっともっとぉ<emoji=heart04>\u3000おぉんっ<emoji=heart04>\u3000ふぉ、ほっ、欲ひいっ、ほぉおぉんっ<emoji=heart04>」"
translation = "「응히잇<emoji=heart04> 좀 더 좀 더 좀 더어어<emoji=heart04> 오오온<emoji=heart04> 포, 홋, 원해여어, 호오오오온<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「待っ……ぐぅうぅっ！？\u3000はっ……まだ出るっ……！？」"
translation = "「잠깐…… 구우우읏!? 핫…… 아직 나온다……!?」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「はぉんっ<emoji=heart04>\u3000ほっ、はーっ、ぉほっ、ほぁ、ひぎゅぅぅ……おち○ぽっ、ひゅっごぉ……いっ、どびゅっどびゅうっ<emoji=heart04>」"
translation = "「하오온<emoji=heart04> 홋, 하─, 오홋, 호아, 히규우우…… 자지이, 대애단해…… 도퓨 도퓨우웃<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「はぁっ、はぁーっ、んほぁあぁん……<emoji=heart04>\u3000生ハメぇ、にゃか出しぃ……さいっこぉおぉ……<emoji=heart04>」"
translation = "「하아, 하아─, 응호아아앙……<emoji=heart04> 생삽입으으, 질내사저엉…… 최고오오오오……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「おち○ぽ、おちー○ぽぉ<emoji=heart04>\u3000残り汁も、ぜぇんぶ……私の中に出してっ、出してぇっ……んふひひっ<emoji=heart04>」"
translation = "「자지이, 자아─지이이<emoji=heart04> 남은 찌꺼기도, 저어언부…… 제 안에 내줘, 내줘어어…… 응후히힛<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "生物のようにうごめくウルスラの膣肉に、尿道に残る最後の一滴まで吸いつくされた。"
translation = "생물처럼 꿈틀거리는 우르술라의 질 근육에 요도에 남은 마지막 한 방울까지 빨려 나갔다."

[[dialogue]]
speaker = "unk"
original = "萎えたペニスがウルスラの膣口から抜けると、開いたままの穴からは愛液と精液の白濁カクテルがどろりと溢れ出た。"
translation = "시든 페니스가 우르술라의 질 입구에서 빠지자, 열린 채인 구멍에서는 애액과 정액의 백탁 칵테일이 주르륵 넘쳐흘렀다."

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「ふぁあぁんっ……<emoji=heart04>\u3000こんなにいっぱぁい……たっぷりのザーメンは愛情の証、ですよねぇ……<emoji=heart04>」"
translation = "「후아아앙……<emoji=heart04> 이렇게나 마아안이…… 듬뿍 담긴 정액은 애정의 증거, 인 거져어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「んふふっ、出し切ってフニャフニャのおち○ぽもかぁわいいです……<emoji=heart04>\u3000でもぉ、まだまだキンタマにザーメン残ってますよねぇ……？」"
translation = "「응후후, 다 쏟아내서 흐물흐물해진 자지도 귀여워요……<emoji=heart04> 하지만요오, 아직 불알에 정액 남아있져어……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だ、出し切ったよ！\u3000もう出ないって！」"
translation = "「다, 다 쏟아냈어! 이제 안 나온다고!」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「嘘つきさんはダーメっ<emoji=heart04>\u3000んっ、んぅふっ<emoji=heart04>\u3000ほらっ、ほーらっ<emoji=heart04>\u3000もう一搾りぃ、おちー○ぽっ、おち○ぽがーんばれ、がんばれおちー○ぽぉ<emoji=heart04>」"
translation = "「거짓말쟁이는 안─돼애<emoji=heart04> 응, 응으훗<emoji=heart04> 자아, 자아아<emoji=heart04> 한 번 더 짜내기이, 자아─지이, 자지 힘내라, 힘내라 자아─지이이<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「萎えてる暇なんてあげないですよぉっ……<emoji=heart04>\u3000まだまだぁ、キンタマもがーんばれっ……新鮮ザーメンつーくれっ<emoji=heart04>」"
translation = "「시들어 있을 틈 따위 안 줄 거예여어어……<emoji=heart04> 아직아직아직, 불알도 히임내라아…… 신선한 정액 마안드러어어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "一旦は硬さが失われたペニスだが、ウルスラのムチムチの太ももやお尻で擦られ、強制的に再び勃たされてしまう。"
translation = "일단은 강직함이 사라졌던 페니스였지만, 우르술라의 탱탱한 허벅지와 엉덩이에 문질러져 강제적으로 다시 발기하고 만다."

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「あはっ<emoji=heart04>\u3000またムクムクおっきくなってきましたぁ……んふふっ、勃起ち○ぽは、おま○こにしまうのがマナーですもんね<emoji=heart04>」"
translation = "「아하<emoji=heart04> 다시 뭉클뭉클 커졌어여어…… 응후후, 발기 자지는, 보지에 집어넣는 게 매너니까여어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「美味しくいただいちゃいまぁす……<emoji=heart04>\u3000会長さんのおち○ぽ、何回入れても飽きませぇんっ<emoji=heart04>\u3000んぁっはぁぁあぁんっ<emoji=heart04>」"
translation = "「맛있게 먹어버릴게여어……<emoji=heart04> 회장님의 자지, 몇 번을 넣어도 질리지 않아여어어<emoji=heart04> 응아아앗하아아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ウルスラは延々と昂り続け、あられもない喘ぎを大聖堂の中に響かせた。"
translation = "우르술라는 끊임없이 고조되며, 꼴사나운 신음을 대성당 안에 울려 퍼뜨렸다."

[[dialogue]]
speaker = "unk"
original = "これがウルスラの矢によって露わになった、ウルスラの本心。ウルスラが俺を求める心はどこまでも貪欲だ。"
translation = "이것이 우르술라의 화살에 의해 드러난 우르술라의 본심. 우르술라가 나를 원하는 마음은 어디까지나 탐욕스럽다."

[[dialogue]]
speaker = "unk"
original = "ウルスラの矢の効果はまだ切れそうにない──"
translation = "우르술라의 화살 효과는 아직 끊길 기미가 보이지 않는다──"

