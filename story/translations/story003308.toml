[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「いけーっ、フカヒレー！\u3000アビスシャークパレード！」"
translation = "「가라, 샥스 군! 어비스 샤크 퍼레이드!」"

[[dialogue]]
speaker_original = "パテル？"
speaker_translation = "파텔?"
original = "「──」"
translation = "「──」"

[[dialogue]]
speaker = "unk"
original = "分身がパテルストーンに戻ると、パテルが小さな手のひらでそれを受け止める。"
translation = "분신이 파텔 스톤으로 돌아가자 파텔이 작은 손바닥으로 그것을 받아낸다."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「……お疲れ様。あなたの言ってることはわかるけどね」"
translation = "「……수고했어. 당신이 말하는 건 이해하지만 말이야.」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「やったー！\u3000あたしの勝ちー！\u3000欠片の分際であたしに試練を与えようなんて生意気なんだから！」"
translation = "「야호! 내가 이겼다! 파편 주제에 나한테 시련을 주려 하다니 건방지다니까!」"

[[dialogue]]
speaker = "unk"
original = "そして朝日が昇っていき──"
translation = "그리고 아침 해가 떠오르며──"

[[dialogue]]
speaker = "unk"
original = "サメと死神の夜が明けた。"
translation = "상어와 사신의 밤이 밝았다."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「は～、疲れたー」"
translation = "「하~ 피곤해라.」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「あ～あ、せっかくかわいい水着着たのに、死神トークしすぎたよ。あたしがかわいくなくなっちゃったら、どうしてくれるのさ」"
translation = "「아~아, 기껏 귀여운 수영복 입었는데 사신 토크를 너무 많이 했어. 내가 안 귀여워지면 어쩔 거야.」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「んじゃ、みんなのところに戻ろっか」"
translation = "「그럼 다들 있는 곳으로 돌아갈까.」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ただいま～。こっちは終わったよ」"
translation = "「다녀왔어~. 이쪽은 끝났어.」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「お帰りなさ～い」"
translation = "「어서 오세요~.」"

[[dialogue]]
speaker = "unk"
original = "こっちは大丈夫だった？"
translation = "이쪽은 괜찮았어?"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「ギガロドンなら全部やっつけたのだ！\u3000水着守護天使の敵じゃなかったのだ！」"
translation = "「기갈로돈이라면 전부 해치운 것이다! 수영복 수호천사의 적이 아니었던 것이다!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「倒したら全部パテルストーンになりました。ドウゾです！」"
translation = "「쓰러뜨리니까 전부 파텔 스톤이 되었슴다. 여기요!」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ありがと。それじゃパテルストーンもらうね」"
translation = "「고마워. 그럼 파텔 스톤 받을게.」"

[[dialogue]]
speaker = "unk"
original = "パテルストーンが光となり、パテルの中に吸い込まれていく。"
translation = "파텔 스톤이 빛이 되어 파텔 안으로 흡수되어 간다."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「はい、これであたしの力も元通り～」"
translation = "「자, 이걸로 내 힘도 원래대로~」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「手伝ってくれてありがとう、マグダレナ、アルモタヘル」"
translation = "「도와줘서 고마워, 막달레나, 아르모타헬.」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「同じ守護天使ですから、これくらいお安い御用ですよ♪」"
translation = "「같은 수호천사니까 이 정도는 누워서 떡 먹기예요♪」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「リップルも邪魔してごめんね」"
translation = "「리플도 방해해서 미안해.」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「イエイエ、パテルストーンを集められてよかったです！」"
translation = "「아뇨아뇨, 파텔 스톤을 모을 수 있어서 다행임다!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「サメは確かにサーファーには危険デスが、人気があるのもジジツ。うまく活用すれば、リゾート結界をもっと楽しくデキるかもしれません！」"
translation = "「상어는 확실히 서퍼에게 위험함다만, 인기가 있는 것도 사실임다. 잘 활용하면 리조트 결계를 더 즐겁게 만들 수 있을지도 모름다!」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「リップルは前向きなのだ」"
translation = "「리플은 긍정적인 것이다.」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「じゃあ用事も済んだし、あたしはこれで──」"
translation = "「그럼 용건도 끝났으니 난 이만──」"

[[dialogue]]
speaker = "unk"
original = "ちょっと待ったーっ！"
translation = "잠깐만──!"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「へ？」"
translation = "「헤?」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「まだまだ遊び足りないのだ！\u3000パテルも一緒に遊ぶのだ～っ！」"
translation = "「아직 더 놀고 싶은 것이다! 파텔도 같이 노는 것이다~!」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「でもあたしの用事終わったし」"
translation = "「하지만 내 용건은 끝났고.」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「いいじゃないですか。昨日はパテルストーンを探しながらでしたし、今度はそういうのを気にせず遊びませんか？」"
translation = "「괜찮잖아요. 어제는 파텔 스톤을 찾으면서였고, 이번엔 그런 거 신경 쓰지 말고 놀지 않을래요?」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「しかもパテルは私たちを監視しながらだったんですよね？\u3000なら今日は仕事を忘れて、本気で遊びましょう」"
translation = "「게다가 파텔은 저희를 감시하면서였죠? 그럼 오늘은 일을 잊고 진심으로 놀아요.」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「もちろんワタシも大歓迎でーす！」"
translation = "「물론 저도 대환영임다!」"

[[dialogue]]
speaker = "unk"
original = "俺もパテルと本気で遊びたい"
translation = "나도 파텔이랑 진심으로 놀고 싶어"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ま、いっか。今は忙しくないし、そこまで言うなら付き合ってあげるよ♪」"
translation = "「뭐, 상관없나. 지금은 바쁘지도 않고 그렇게까지 말한다면 같이 놀아줄게♪」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「決まりなのだ！」"
translation = "「결정인 것이다!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「この旗をイチバン早く取ったヒトの勝ちでーす！\u3000位置に付いて～……レディー……」"
translation = "「이 깃발을 가장 먼저 잡는 사람이 이기는 검다! 제자리에~…… 레디……」"

[[dialogue]]
speaker = "unk"
original = "ＧＯ！！"
translation = "GO!!"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「負けないのだ！」"
translation = "「지지 않는 것이다!」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「私だって──」"
translation = "「저도──」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「ひゃんっ！？」"
translation = "「히양!?」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「マグダレナがこけたのだ！\u3000今のうちに──」"
translation = "「막달레나가 넘어진 것이다! 이때를 틈타──」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「いくよフカヒレ！\u3000ウェーブライドソウルテイカー！」"
translation = "「가라 샥스 군! 웨이브 라이드 소울 테이커!」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「サメに乗るのはアリなのだ！？」"
translation = "「상어를 타는 건 반칙인 것이다!?」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「いえーい！\u3000あたしの勝ち～！」"
translation = "「이예이! 내가 이겼다~!」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「そりゃーっ！」"
translation = "「이럇!」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「あー、外れたのだ……スイカ割り、次は会長の番なのだ」"
translation = "「아~ 빗나간 것이다…… 수박 깨기, 다음은 회장 차례인 것이다.」"

[[dialogue]]
speaker = "unk"
original = "任せて！"
translation = "맡겨줘!"

[[dialogue]]
speaker = "unk"
original = "アルモたんから棒を受け取ると、目隠しをしてその場で１０回転。"
translation = "알모땅에게 막대기를 건네받고 눈을 가린 채 그 자리에서 10바퀴 회전."

[[dialogue]]
speaker = "unk"
original = "フラつきながらスイカを目指す。"
translation = "비틀거리며 수박을 향해 나아간다."

[[dialogue]]
speaker = "？？？"
original = "「会長、右です右！\u3000あ、ちょっと行きすぎましたっ、少し左ですっ！」"
translation = "「회장님, 오른쪽이에요 오른쪽! 아, 조금 너무 갔어요, 약간 왼쪽입니다!」"

[[dialogue]]
speaker = "？？？"
original = "「あ、また行きすぎなのだ！\u3000そこを右なのだ！」"
translation = "「아, 또 너무 간 것이다! 거기서 오른쪽인 것이다!」"

[[dialogue]]
speaker = "？？？"
original = "「後ろ後ろー！\u3000バックだよー！」"
translation = "「뒤야 뒤~! 백이야~!」"

[[dialogue]]
speaker = "？？？"
original = "「違うのだ！\u3000さっきので合ってるのだ！\u3000前に出るのだ！」"
translation = "「아닌 것이다! 아까 그게 맞는 것이다! 앞으로 나가는 것이다!」"

[[dialogue]]
speaker = "？？？"
original = "「そこを９０度左！\u3000５歩前！」"
translation = "「거기서 90도 왼쪽! 5걸음 앞!」"

[[dialogue]]
speaker = "？？？"
original = "「スイカから離れてます！\u3000スイカは後ろですよ！」"
translation = "「수박에서 멀어지고 있어요! 수박은 뒤쪽이에요!」"

[[dialogue]]
speaker = "unk"
original = "（１人怪しいのがいる……？）"
translation = "(한 명 수상한 녀석이 있는데……?)"

[[dialogue]]
speaker = "？？？"
original = "「そう、そのまま近づいて……今なのだ！」"
translation = "「그래, 그대로 다가가서…… 지금인 것이다!」"

[[dialogue]]
speaker = "？？？"
original = "「そこです、いけますよ！」"
translation = "「거기예요, 할 수 있어요!」"

[[dialogue]]
speaker = "？？？"
original = "「ダメダメ、そこを右だよ！」"
translation = "「안 돼 안 돼, 거기서 오른쪽이야!」"

[[dialogue]]
speaker = "unk"
original = "そこだ！"
translation = "거기다!"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「お見事です、会長！\u3000スイカが綺麗に割れましたね！」"
translation = "「훌륭해요, 회장님! 수박이 예쁘게 깨졌네요!」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「これでスイカが食べられるのだ～！」"
translation = "「이걸로 수박을 먹을 수 있는 것이다~!」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ちぇ、あたしのイタズラバレてたか～」"
translation = "「쳇, 내 장난 들켰나~」"

[[dialogue]]
speaker = "unk"
original = "いろんな遊びをしている間に時間が過ぎていき、やがて日が傾いてきた。"
translation = "여러 가지 놀이를 하는 동안 시간이 흘러 어느덧 해가 기울었다."

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「たくさん遊んで満足なのだ～♪」"
translation = "「잔뜩 놀아서 만족인 것이다~♪」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「楽しかったですね～♪」"
translation = "「즐거웠네요~♪」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「え～、２人ともこれくらいで満足してるの？\u3000あたしは全然だよ」"
translation = "「에~ 둘 다 이 정도로 만족하는 거야? 난 전혀 아니거든.」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「へ？」"
translation = "「헤?」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「まだまだこんなもんじゃ終わらせないよ！\u3000あたしの本気を見せてあげるんだから！」"
translation = "「아직 이 정도로 끝내지 않을 거야! 내 진심을 보여줄 거니까!」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「名付けて──パテルの肝試し試練！」"
translation = "「이름하여── 파텔의 담력 시험 시련!」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「ええ～～っ！？」"
translation = "「에에~~!?」"

