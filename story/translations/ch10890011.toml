[[dialogue]]
speaker = "unk"
original = "第１話,癒しのお散歩タイム,P"
translation = "제1화, 치유의 산책 타임, P"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「もごっ」"
translation = "「모곳」"

[[dialogue]]
speaker = "unk"
original = "学園に向かう道中、ホットドッグを頬張るシアン先輩とバッタリ出会った。"
translation = "학원으로 향하는 도중, 핫도그를 입에 물고 있는 시안 선배와 딱 마주쳤다."

[[dialogue]]
speaker = "unk"
original = "目が合うと、バツが悪そうに咀嚼し、一気に飲み込む。"
translation = "눈이 마주치자 멋쩍은 듯 우물거리며 단숨에 삼킨다."

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「もぐもぐ……よっ、会長さん」"
translation = "「우물우물…… 여어, 회장님」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「ちょっと時間が空いたから飯食いながら散歩してたとこだ。お行儀が悪くて、すまねえな」"
translation = "「잠깐 시간이 나서 밥 먹으면서 산책하던 참이다. 품행이 단정치 못해 미안하구만」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「あー……もしかして会長さんも腹減ってるか？」"
translation = "「아ー…… 혹시 회장님도 배고픈가?」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「遠慮すんなよ。腹減ってたから、うっかり買いすぎちまったけど、こんなには食えねえからな」"
translation = "「부담 갖지 마. 배고파서 무심코 너무 많이 사버렸는데, 이만큼은 못 먹으니까 말이야」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「アメリカンドッグだろ、タコスだろ、ケバブだろ……いろいろあるぜ。どれがいい？」"
translation = "「아메리칸 도그도 있고, 타코스도 있고, 케밥도 있고…… 여러 가지 있다고. 어느 게 좋아?」"

[[dialogue]]
speaker = "unk"
original = "ジャンクフードばかりですね"
translation = "정크 푸드뿐이네요"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「ああ、こういう手っ取り早く食えるのが、あたしの主食でな」"
translation = "「아아, 이런 빨리 먹을 수 있는 게 내 주식이라서 말이야」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「慌ただしい仕事だからよ。仕事柄、片手で手早く食べられるのを口にする機会が多くてさ」"
translation = "「정신없는 일이라서 그래. 직업상 한 손으로 빨리 먹을 수 있는 걸 입에 담을 기회가 많거든」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「刑事ドラマで張り込みの<ruby>刑事<rt>デカ</rt></ruby>があんパン食ってるシーンあるだろ。アレみたいな感じだ。手早く、効率的に栄養補給できるのがベストなんだ」"
translation = "「형사 드라마에서 잠복 중인 형사가 단팥빵 먹는 장면 있잖아. 그거 같은 느낌이야. 빠르고 효율적으로 영양을 보충하는 게 베스트지」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「久しぶりに流星市国に戻ってきたら、新しい店が増えてて驚いたぜ。これならバリエーションにも困らねえ。大助かりだ」"
translation = "「오랜만에 유성시국으로 돌아왔더니 새로운 가게가 늘어서 놀랐어. 이 정도면 종류도 걱정 없겠군. 아주 큰 도움이 돼」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「ジャンクフードばかりも体には良かねえんだろうけど……職業病みたいなもんかな。別に不便に感じちゃいねえしさ」"
translation = "「정크 푸드만 먹는 것도 몸에는 안 좋겠지만…… 직업병 같은 걸까나. 딱히 불편하게 느끼진 않으니까」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「ま、会長さんが素敵なディナーにでも誘ってくれるんなら、話は別だけどな、はは」"
translation = "「뭐, 회장님이 멋진 저녁 식사라도 초대해 준다면 이야기는 달라지겠지만 말이야, 하하」"

[[dialogue]]
speaker = "unk"
original = "今度、ゆっくりご飯食べに行きましょう"
translation = "다음에 천천히 밥 먹으러 가요"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「……は？\u3000マジで言ってんのか」"
translation = "「……하? 진심으로 하는 소리냐」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「まあ……言っちまった手前、断りゃしねえけどよ。いつ予定が空くかもわからねえからな」"
translation = "「뭐…… 뱉은 말이 있으니 거절하진 않겠지만. 언제 예정이 빌지 모르니까 말이야」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「任務は突然入るし、休暇申請なんて通った試しはねえし……公安に入ってから休みらしい休みも取っちゃいねえ」"
translation = "「임무는 갑자기 들어오고, 휴가 신청 같은 건 받아들여진 적도 없고…… 공안에 들어온 뒤로 휴가다운 휴가도 못 챙겼어」"

[[dialogue]]
speaker = "unk"
original = "ちゃんと休んでる人に心当たりが……"
translation = "제대로 쉬고 있는 사람 중에 짚이는 사람이……"

[[dialogue]]
speaker = "unk"
original = "ブラック企業かな……？"
translation = "블랙 기업인가……?"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「てへぺろ☆」"
translation = "「테헤페로☆」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「なんか言いたそうな顔してんな……言いたいことはなんとなくわかるけどよ」"
translation = "「뭔가 말하고 싶은 표정이군…… 무슨 말을 하고 싶은지는 대충 알 것 같다만」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「いや、言わなくていい。言葉にされると、あたしの心が折れちまうかもしんねえし」"
translation = "「아니, 말하지 않아도 돼. 말로 내뱉어지면 내 마음이 꺾여버릴지도 모르니까」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「ま、世界が平和になって、あたしも仕事を辞めて、落ち着いたらな。飯でもなんでも誘ってくれよ……もぐもぐ」"
translation = "「뭐, 세계가 평화로워지고 나도 일을 그만두고 안정되면 말이야. 밥이든 뭐든 불러달라고…… 우물우물」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「あー、美味かった。やっぱ、ここのホットドッグは絶品だな」"
translation = "「아ー, 맛있었다. 역시 여기 핫도그는 절품이군」"

[[dialogue]]
speaker = "unk"
original = "シアン先輩はホットドッグをたいらげると、唇の端についていたケチャップをぺろりと舐め取る。"
translation = "시안 선배는 핫도그를 다 먹어 치우더니 입가에 묻어있던 케첩을 핥아 낸다."

[[dialogue]]
speaker = "unk"
original = "せっかくの休憩なのにお邪魔じゃなかったです？"
translation = "겨우 얻은 휴식인데 방해되지 않았나요?"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「はっ、邪魔だったら、端っから隠れてやり過ごしてるよ。そういうのは得意だからさ」"
translation = "「핫, 방해였다면 처음부터 숨어서 지나쳤겠지. 그런 건 특기니까」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「任務中は張り詰めっぱなしなんでな。こうやって、余計なこと考えずに、駄弁ってられる時間ってのは嫌いじゃねえんだ」"
translation = "「임무 중에는 내내 긴장하고 있으니까 말이야. 이렇게 쓸데없는 생각 안 하고 수다 떨 수 있는 시간은 싫지 않아」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「束の間の平和を享受してる、って感じでさ。こういう時間を少しでも長く味わえるよう、あたしらは陰ながら頑張ってんだ……」"
translation = "「잠깐의 평화를 누리는 느낌이라서 말이지. 이런 시간을 조금이라도 길게 맛볼 수 있도록 우린 남몰래 노력하고 있는 거야……」"

[[dialogue]]
speaker = "unk"
original = "懐からケースを取り出すと、手慣れた仕草で白くて細長いスティックを咥えた。"
translation = "품에서 케이스를 꺼내더니 익숙한 손놀림으로 하얗고 가느다란 스틱을 입에 물었다."

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「そういや、会長さんは、会ってすぐにあたしの素性に勘づいてたみたいだけど……どの辺で分かった？」"
translation = "「그나저나 회장님은 만나자마자 내 정체를 눈치챈 것 같던데…… 어느 부분에서 알았지?」"

[[dialogue]]
speaker = "unk"
original = "どの辺っていうか……雰囲気全般？"
translation = "어느 부분이라기보다…… 분위기 전반이요?"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「雰囲気、ねえ？\u3000年上オーラが出ちまってんのかな……これでも上手いこと擬態してるつもりなんだけどよ」"
translation = "「분위기, 라? 연상 오라가 나오고 있는 건가…… 이래 봬도 잘 의태하고 있다고 생각했는데 말이야」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「……ちなみにだけど、あたしのコレはタバコじゃねえからな？\u3000シガレットチョコだぞ」"
translation = "「……참고로 말해두는데, 내 이건 담배가 아니라고? 시가렛 초코야」"

[[dialogue]]
speaker = "unk"
original = "チョコだったの！？"
translation = "초코였어요!?"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「当たり前だろ。あたしをなんだと思ってんだ」"
translation = "「당연하잖아. 날 뭐라고 생각하는 거야」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「タバコなんて吸ってたら、臭いが体に染みついちまうだろ。任務に差し障りしかねえよ」"
translation = "「담배 같은 걸 피우면 냄새가 몸에 배어버리잖아. 임무에 지장만 줄 뿐이라고」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「口寂しいから咥えてるだけだ。食後のスイーツだよ」"
translation = "「입이 심심해서 물고 있을 뿐이야. 식후 디저트라고」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「疑ってんのか？\u3000嘘じゃねえから。食ってみろよ」"
translation = "「의심하는 거야? 거짓말 아니니까 먹어봐」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「……っと、案の定、呼び出しだ。悪ぃな、会長さん。いつかは豪華なディナーに行けるの、楽しみにしてるぜ」"
translation = "「……앗, 아니나 다를까 호출이군. 미안해, 회장님. 언젠가 호화로운 저녁 식사 하러 가는 거 기대하고 있을게」"

[[dialogue]]
speaker = "unk"
original = "押し付けられ、無理やり口にねじこまれたシガレットは、確かに甘くて、ほろ苦いビターチョコだった。"
translation = "떠맡겨지듯 억지로 입에 밀어 넣어진 시가렛은 확실히 달콤하고 쌉싸름한 비터 초콜릿이었다."

