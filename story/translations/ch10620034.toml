[[dialogue]]
speaker = "unk"
original = "第４話,ジュエリーとの未来,P"
translation = "제4화, 주얼리와의 미래, P"

[[dialogue]]
speaker = "unk"
original = "ジュエリーがウェディングフォームを手に入れてからというもの――２人で将来のことを語らう時間が、前よりも増えた気がする。"
translation = "주얼리가 웨딩 폼을 손에 넣은 뒤로―― 둘이서 장래에 대해 이야기하는 시간이 전보다 늘어난 느낌이 든다."

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「助手。先日、結婚式場でモデルとして写真の撮影をした時……改めて私に愛を誓ってくれただろう？」"
translation = "「조수. 요전번에 결혼식장에서 모델로 사진 촬영을 했을 때…… 다시금 나에게 사랑을 맹세해 주었지?」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「その影響もあってか、最近はキミとの将来に思いを馳せるのが、とても楽しいんだ」"
translation = "「그 영향 때문인지, 요즘은 너와의 장래에 생각을 떨치는 것이 무척 즐겁단다」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「ついには、こんな物まで用意してしまってね──」"
translation = "「급기야는, 이런 것까지 준비해 버렸어──」"

[[dialogue]]
speaker = "unk"
original = "ジュエリーはそう言って、１冊の小さなノートを取り出してみせた。"
translation = "주얼리는 그렇게 말하며, 한 권의 작은 노트를 꺼내 보였다."

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「これは『未来予想手帳』だ。私たちの将来に考えを巡らして、書き綴っている」"
translation = "「이건 『미래 예상 수첩』이야. 우리의 장래를 곰곰이 생각하며 적어 내려가고 있지」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「――ん、見てもいいのかって？」"
translation = "「――음, 봐도 되냐고?」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「ふふっ、言っただろう？\u3000<b>私たち</b>の将来のプランが書いてある、と」"
translation = "「후훗, 말했잖아? <b>우리</b>의 장래 플랜이 적혀 있다고」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「だから私は、キミにも見てほしいんだ。私が思い描いている、私たちの未来を」"
translation = "「그러니까 나는, 너도 봐주었으면 해. 내가 그리고 있는, 우리의 미래를」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「そうだな……ベタなところで言えば、子供の名前などを考えてみた」"
translation = "「그렇네…… 뻔한 부분부터 말하자면, 아이의 이름 같은 걸 생각해 봤어」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「キミとの子供なら、名前の案はいくらでも出てくるんだが……いざ真剣に考えると、これがなかなか難しいものでね」"
translation = "「너와의 아이라면 이름 안은 얼마든지 나오지만…… 막상 진지하게 생각하니 이게 꽤 어려운 일이더군」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「候補はいろいろ書き出しているが、一向に絞り切ることができない。むしろ日ごとに増えていくから困ったものだ」"
translation = "「후보는 여러 가지 적어두었지만, 도저히 하나로 좁힐 수가 없어. 오히려 날마다 늘어가니 곤란한 노릇이야」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「キミとの子どもならたくさん欲しいけれど……何人産むかは応相談かな。ふふっ<emoji=heart04>」"
translation = "「너와의 아이라면 많이 갖고 싶지만…… 몇 명을 낳을지는 상의해 봐야겠지. 후훗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「あとは家の間取りも想像してみたんだ」"
translation = "「그리고 집 구조도 상상해 봤어」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「子どもの人数にもよるだろうが、私としてはできるだけ広い家がいいな」"
translation = "「아이의 인원수에 따라 다르겠지만, 나로서는 가능한 한 넓은 집이 좋겠어」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「とはいえ、流星市国でそれほど大きな家に住むのは難しいかもしれないから、助手さえよければイギリスの方で暮らしたり……そんなことも考えたりね」"
translation = "「그렇긴 해도 유성시국에서 그렇게 큰 집에 사는 건 어려울지도 모르니까, 조수만 괜찮다면 영국 쪽에서 살거나…… 그런 생각도 하곤 해」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「ああ、もちろん全てを勝手に決めるつもりはないよ。だから……キミの意見もしっかり聞かせて欲しいんだ、我が助手」"
translation = "「아아, 물론 모든 것을 마음대로 결정할 생각은 없어. 그러니까…… 너의 의견도 확실히 들려주었으면 한다, 나의 조수」"

[[dialogue]]
speaker = "unk"
original = "色々考えてくれてて嬉しいよ、ジュエリー"
translation = "여러 가지로 생각해 줘서 기뻐, 주얼리"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「キミとの理想の未来を想像することは、推理を組み立てているみたいで、とても楽しいんだ」"
translation = "「너와의 이상적인 미래를 상상하는 건 추리를 조립하는 것 같아서 무척 즐겁단다」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「思考の訓練にもなるし、今から考えておいて決して損にはならないからね」"
translation = "「사고 훈련도 되고, 지금부터 생각해 두어서 결코 손해 볼 일은 없으니까 말이야」"

[[dialogue]]
speaker = "unk"
original = "俺たちの将来設計だしな"
translation = "우리들의 장래 설계니까 말이야"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「ふふっ、そういうことだ」"
translation = "「후훗, 그런 셈이지」"

[[dialogue]]
speaker = "unk"
original = "と、手帳の内容を見ている内に、あるページが目に留まる。"
translation = "하며 수첩의 내용을 보던 중, 어느 페이지가 눈에 머문다."

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「ああ、それは私の学園卒業後のことについてだよ」"
translation = "「아아, 그건 나의 학원 졸업 후의 일에 대해서야」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「このまま探偵業を仕事として続けていくならば、ちゃんとした『探偵事務所』を構えるのも、選択肢の１つだろうと思ってね」"
translation = "「이대로 탐정업을 직업으로서 계속해 나간다면, 제대로 된 『탐정 사무소』를 차리는 것도 선택지 중 하나라고 생각해서 말이지」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「しかし……正直迷っている」"
translation = "「하지만…… 솔직히 망설여져」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「もし私が卒業後も探偵業を続けると言えば、キミはおそらく、助手として私を手伝う道を選ぶだろう？」"
translation = "「만약 내가 졸업 후에도 탐정업을 계속한다고 하면, 너는 아마 조수로서 나를 돕는 길을 택하겠지?」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「けれど私にとって……謎解きは『趣味』なんだ」"
translation = "「하지만 나에게 있어…… 수수께끼 풀이는 『취미』야」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「それを職業にして、キミに負担をかけるのは本意ではない」"
translation = "「그걸 직업으로 삼아서 너에게 부담을 주는 건 본의가 아니야」"

[[dialogue]]
speaker = "unk"
original = "負担……？"
translation = "부담……?"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「私は『名探偵』という選星者の能力の都合上、今まで『殺人事件』にも何度も遭遇してきた」"
translation = "「나는 『명탐정』이라는 선성자의 능력 사정상, 지금까지 『살인 사건』에도 몇 번이나 조우해 왔어」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「探偵の『<ruby>業<rt>ごう</rt></ruby>』というやつだ。当たり前だが……人の死体を見るのは気分のいいものではないし、犯人と対峙して危険に巻き込まれることも少なくない」"
translation = "「탐정의 『업』이라는 녀석이지. 당연하지만…… 사람의 시체를 보는 건 기분 좋은 일이 아니고, 범인과 대치해서 위험에 휘말리는 일도 적지 않아」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「私は愛するキミがそんな目に遭うくらいなら……正直、探偵にならなくてもいいと思っている」"
translation = "「나는 사랑하는 네가 그런 꼴을 당할 바에야…… 솔직히 탐정이 되지 않아도 좋다고 생각하고 있어」"

[[dialogue]]
speaker = "unk"
original = "ジュエリーは探偵をするのは嫌？"
translation = "주얼리는 탐정 하는 게 싫어?"

[[dialogue]]
speaker = "unk"
original = "俺のことを抜きにして考えた時――"
translation = "내 일을 빼고 생각했을 때――"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「それは……」"
translation = "「그건……」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「……私は昔から、肌が弱い体質もあるし、ズボラな性格もあって、両親に迷惑をかけることが多かった」"
translation = "「……나는 옛날부터 피부가 약한 체질이기도 하고, 덜렁대는 성격도 있어서 부모님께 폐를 끼치는 일이 많았어」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「人の役に立てることなんて、『謎解きが得意』なことくらいしかなかったんだ。幼い時はまだ星力にも目覚めていなかったしね」"
translation = "「남에게 도움이 될 수 있는 건 『수수께끼 풀이를 잘하는 것』 정도밖에 없었지. 어릴 때는 아직 성력에도 눈뜨지 않았을 때였고 말이야」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「だから、事件を解決し続ける内に、『日傘探偵』と呼ばれて、人々から頼られることが……とても嬉しくて、誇らしかった」"
translation = "「그래서 사건을 계속 해결하는 동안 『양산 탐정』이라 불리며 사람들에게 의지 받는 것이…… 무척 기쁘고 자랑스러웠어」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「自分の趣味で人の役に立てるというのは、本当に幸せなことだよ」"
translation = "「자신의 취미로 남에게 도움이 될 수 있다는 건 정말 행복한 일이야」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「『日傘探偵』という呼び名は、明解に換言するならば、私にとって――『誇り』なんだ」"
translation = "「『양산 탐정』이라는 별명은 명쾌하게 환언하자면 나에게 있어―― 『긍지』란다」"

[[dialogue]]
speaker = "unk"
original = "探偵が嫌じゃないなら、俺は続けてほしい"
translation = "탐정이 싫지 않다면 나는 계속했으면 좋겠어"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「……いいのかい？」"
translation = "「……괜찮겠니?」"

[[dialogue]]
speaker = "unk"
original = "俺は頷く。"
translation = "나는 고개를 끄덕인다."

[[dialogue]]
speaker = "unk"
original = "ジュエリーが事件を解決する際に、真実を明かす時の姿は本当にカッコいいと、俺は心から思っている。"
translation = "주얼리가 사건을 해결할 때 진실을 밝히는 모습은 정말 멋지다고 나는 진심으로 생각하고 있다."

[[dialogue]]
speaker = "unk"
original = "『日傘探偵』は、俺にとっても誇りなんだ"
translation = "『양산 탐정』은 나에게 있어서도 긍지야"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「ああ……」"
translation = "「아아……」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「キミはいつだって、私を喜ばせる言葉をかけてくれる」"
translation = "「너는 언제나 나를 기쁘게 하는 말을 해주는구나」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「そうだね……わかるよ。私もキミの優しいところが好きだし、星徒会長として仕事する姿も、星騎士として戦う姿もカッコよくて……とても好きだ」"
translation = "「그렇네…… 알겠어. 나도 너의 다정한 면을 좋아하고, 성도회장으로서 일하는 모습도, 성기사로서 싸우는 모습도 멋있어서…… 무척 좋아해」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「それと同じように、キミは探偵としての私も好いてくれているということなんだね」"
translation = "「그것과 마찬가지로 너는 탐정으로서의 나도 좋아해 주고 있다는 거구나」"

[[dialogue]]
speaker = "unk"
original = "お互いの顔と顔の距離が、自然と近づく。"
translation = "서로의 얼굴과 얼굴 사이 거리가 자연스럽게 가까워진다."

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「……心から愛しているよ。我が助手<emoji=heart04>」"
translation = "「……진심으로 사랑해. 나의 조수<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "静かに唇を重ねる。"
translation = "조용히 입술을 포갠다."

[[dialogue]]
speaker = "unk"
original = "柔らかく、確かめ合うような、甘いキス。"
translation = "부드럽고 확인하듯 달콤한 키스."

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「んっ……ちゅっ……<emoji=heart04>」"
translation = "「응…… 츄……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺も、世界で１番愛してるよ、ジュエリー"
translation = "나도 세상에서 제일 사랑해, 주얼리"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「ふふっ……<emoji=heart04>\u3000キミという『真実の愛』を見つけられて、私は幸せ者だ<emoji=heart04>」"
translation = "「후훗……<emoji=heart04> 너라는 『진실한 사랑』을 찾아내서 나는 행복한 사람이야<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺にとってどんな宝石よりも価値のある笑顔で、ジュエリーが微笑む。"
translation = "나에게 어떤 보석보다 가치 있는 미소로 주얼리가 웃는다."

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「助手……ん……<emoji=heart04>\u3000ちゅっ……ちゅっ……<emoji=heart04>」"
translation = "「조수…… 응……<emoji=heart04> 츄…… 츄……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "温かな触れ合いの中で未来を想像しながら、俺たちはそっと寄り添い合うのだった。"
translation = "따스한 접촉 속에서 미래를 상상하며 우리는 살며시 서로 기대었다."

