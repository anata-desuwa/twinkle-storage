[[dialogue]]
speaker = "unk"
original = "第３話,ハロウィン百合デート,P"
translation = "제3화, 할로윈 백합 데이트, P"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「う、うぅ……ハロウィンはもう過ぎたのに、この格好で街を歩くのは、やっぱりちょっと恥ずかしい、です……」"
translation = "「으, 으으…… 할로윈은 이미 지났는데, 이 차림으로 거리를 걷는 건 역시 좀 부끄러워, 요……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「でも、取材の為に、頑張らないと……！」"
translation = "「하지만, 취재를 위해서 힘내야지……!」"

[[dialogue]]
speaker = "unk"
original = "ハロウィンからしばらく経ったある休日。俺はハロウィンフォームのヒトリと共に、秋葉原へとやって来ていた。"
translation = "할로윈으로부터 시간이 좀 흐른 어느 휴일. 나는 할로윈 폼인 히토리와 함께 아키하바라에 와 있었다."

[[dialogue]]
speaker = "unk"
original = "というのも――"
translation = "그 이유라고 한다면――"

[[dialogue]]
speaker = "unk"
original = "――百合漫画を描く為の、取材？"
translation = "――백합 만화를 그리기 위한 취재?"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「は、はい。年末に同人誌の大きな即売会があるというのは、会長さんもご存知ですよね……？」"
translation = "「네, 네. 연말에 동인지 큰 즉매회가 있다는 건 회장님도 알고 계시죠……?」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「わたし、そこに向けて百合漫画を描いてる途中なんですけど……ちょっと、行き詰まってしまっていて……」"
translation = "「저, 거기를 목표로 백합 만화를 그리는 중인데…… 조금, 막혀 버려서……」"

[[dialogue]]
speaker = "unk"
original = "美術部に所属しているヒトリは、自身でも趣味で絵や百合漫画を描いていた。前に見せてもらったことがあるが、その絵は驚くほど上手かった。"
translation = "미술부에 소속된 히토리는 스스로도 취미로 그림이나 백합 만화를 그리고 있었다. 전에 본 적이 있는데, 그 그림은 놀라울 정도로 잘 그렸다."

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「女の子同士がハロウィンデートをするシーンなんですけど、いいイメージがなかなか浮かんで来なくて……」"
translation = "「여자아이끼리 할로윈 데이트를 하는 장면인데, 좋은 이미지가 좀처럼 떠오르지 않아서……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「なので、会長さん、お願いします――」"
translation = "「그러니까 회장님, 부탁드려요――」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「わたしと、女の子同士のデートをしてもらえないでしょうか……！？」"
translation = "「저랑 여자아이끼리의 데이트를 해 주실 수 없을까요……!?」"

[[dialogue]]
speaker = "unk"
original = "いや、俺は男なんだけど！？"
translation = "아니, 난 남자인데!?"

[[dialogue]]
speaker = "unk"
original = "そんな事情があって、２人でデートすることになったのだが――"
translation = "그런 사정이 있어서 둘이서 데이트를 하게 된 것이지만――"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「そ、それにしても、会長さんのハロウィンフォーム……すごく似合ってます……！」"
translation = "「그, 그건 그렇고 회장님의 할로윈 폼…… 정말 잘 어울려요……!」"

[[dialogue]]
speaker = "unk"
original = "う、うん……ありがとう……"
translation = "으, 응…… 고마워……"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「どこからどう見ても、百合の花がバックに咲いているような美少女で、感嘆のため息が漏れてしまいます……！」"
translation = "「어디를 봐도 백합꽃이 배경에 피어 있는 듯한 미소녀라서 감탄 섞인 한숨이 나와 버려요……!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「さすがアニマ先輩ですね……！\u3000会長さんが女の子に変身した状態を維持しつつ、新たにハロウィンフォームまで作り上げてしまうだなんて……！」"
translation = "「역시 아니마 선배님이시네요……! 회장님이 여자아이로 변신한 상태를 유지하면서 새로 할로윈 폼까지 만들어 버리시다니……!」"

[[dialogue]]
speaker = "unk"
original = "最初はいつもの『星力倍増薬』の副作用で、性別転換するだけのつもりだったのだ――しかし。"
translation = "처음에는 평소 쓰던 『성력 배증약』의 부작용으로 성별 전환만 할 생각이었다―― 하지만."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「フヒ♪\u3000ならばちょうどイイ。会長のハロウィンフォームも、作ってしまおうじゃないカ♪」"
translation = "「후히♪ 그렇다면 마침 잘 됐군. 회장의 할로윈 폼도 만들어 버리자고♪」"

[[dialogue]]
speaker = "unk"
original = "ハロウィンデートの取材という話をアニマ先輩にしたら、ノリノリであっという間に俺のハロウィンフォームを完成させてしまったのである。"
translation = "할로윈 데이트 취재 이야기를 아니마 선배에게 했더니, 신이 나서 순식간에 내 할로윈 폼을 완성해 버린 것이다."

[[dialogue]]
speaker = "unk"
original = "とはいえ、セレスティアを使って『変身』できるというだけで、ヒトリのように特殊な能力や新しい力に目覚めたりはしなかった。"
translation = "그렇다고는 해도 셀레스티아를 사용해 『변신』할 수 있을 뿐, 히토리처럼 특수한 능력이나 새로운 힘에 눈을 뜨지는 않았다."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「フヒ？\u3000これではただの、早着替えできるコスプレ衣装でしかない……ダト？\u3000だが、それがいい！\u3000違うカ、会長？」"
translation = "「후히? 이래서는 그냥 빨리 갈아입을 수 있는 코스프레 의상일 뿐이라…… 고? 하지만 그게 좋지! 안 그런가, 회장?」"

[[dialogue]]
speaker = "unk"
original = "何もよくないのだが……？？？"
translation = "하나도 안 좋은데……???"

[[dialogue]]
speaker = "unk"
original = "そんなこんながあって始まった、俺とヒトリの百合デート。"
translation = "이런저런 일이 있어 시작된 나와 히토리의 백합 데이트."

[[dialogue]]
speaker = "unk"
original = "経緯はぶっ飛んでいるが、何はともあれ彼女とのデートである。彼氏としてはそれなりに楽しみにしていたのだが──"
translation = "경위는 엉망진창이지만 어쨌든 그녀와의 데이트다. 남자친구로서는 나름대로 기대하고 있었는데──"

[[dialogue]]
speaker = "unk"
original = "あの……ヒトリさん？"
translation = "저기…… 히토리 씨?"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ひゃ、ひゃい……！\u3000なんでしょう……！？」"
translation = "「햐, 햐이……! 무슨 일이신가요……!?」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「――な、なんでそんなに緊張しているのか、ですか？」"
translation = "「――왜, 왜 그렇게 긴장하고 있느냐고요?」"

[[dialogue]]
speaker = "unk"
original = "俺とヒトリのデートは初めてというわけではない。にも関わらず、手を繋ごうとしても、何やら恥ずかしがって距離を取られてしまっている。それどころか……"
translation = "나와 히토리의 데이트는 처음이 아니다. 그럼에도 불구하고 손을 잡으려 해도 왠지 부끄러워하며 거리를 두고 있다. 그뿐만 아니라……"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「――め、目も合わせようとしない？\u3000そ、それは……えっと……その……」"
translation = "「――누, 눈도 맞추려 하지 않는다니? 그, 그건…… 저기…… 그……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「じ、実は……会長さんが美人すぎて……お顔を直視できなくて……！」"
translation = "「사실…… 회장님이 너무 미인이셔서…… 얼굴을 똑바로 쳐다볼 수가 없어서요……!」"

[[dialogue]]
speaker = "unk"
original = "彼氏としては複雑なんだけど……"
translation = "남자친구로서는 복잡한데……"

[[dialogue]]
speaker = "unk"
original = "男の姿でそんなこと言われたことないから"
translation = "남자의 모습일 때 그런 소릴 들어본 적이 없으니까."

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「あっ、い、いえっ。わたしは男の会長さんのお顔も好きですよ……！？」"
translation = "「앗, 아, 아뇨. 저는 남자인 회장님의 얼굴도 좋아해요……!?」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ただ……」"
translation = "「다만……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「会長さんって、女の子になると真の姿になったみたいに、色々パワーアップするといいますか……」"
translation = "「회장님은 여자아이가 되면 진정한 모습이 된 것처럼 여러모로 파워 업 한다고 할까……」"

[[dialogue]]
speaker = "unk"
original = "俺の真の姿は男の方だよ！？"
translation = "내 진정한 모습은 남자 쪽이라고!?"

[[dialogue]]
speaker = "unk"
original = "と、その時だった。"
translation = "그때였다."

[[dialogue]]
speaker_original = "男"
speaker_translation = "남자"
original = "「ねぇ、そこのお２人さん。ちょっといいかな～？」"
translation = "「저기, 거기 두 사람. 잠깐 시간 좀 될까~?」"

[[dialogue]]
speaker = "unk"
original = "背後から、俺とヒトリの間に挟まるように、見知らぬ男が割って入って来た。金髪で軽そうな感じの――年齢は２０代前半くらいだろうか。"
translation = "등 뒤에서 나와 히토리 사이를 가로막듯 낯선 남자가 끼어들었다. 금발에 가벼워 보이는 느낌의―― 나이는 20대 초반 정도일까."

[[dialogue]]
speaker_original = "男"
speaker_translation = "남자"
original = "「おっ、どっちの子も可愛いねぇ～。暇なら俺と遊ばない？」"
translation = "「오, 둘 다 귀엽네~. 한가하면 나랑 놀지 않을래?」"

[[dialogue]]
speaker = "unk"
original = "そう言って男は、俺とヒトリの肩に手を置く。"
translation = "그렇게 말하며 남자는 나와 히토리의 어깨에 손을 얹는다."

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ひっ……お、男の人……！？」"
translation = "「히익…… 나, 남자……!?」"

[[dialogue]]
speaker = "unk"
original = "俺は、ヒトリの肩に置かれた方の手首を掴むと、男の目を真っ直ぐに見る。"
translation = "나는 히토리의 어깨에 얹힌 쪽의 손목을 잡고 남자의 눈을 똑바로 쳐다본다."

[[dialogue]]
speaker_original = "男"
speaker_translation = "남자"
original = "「え……？\u3000な、何？\u3000手がビクとも動かな――」"
translation = "「어……? 뭐, 뭐야? 손이 꿈쩍도 안――」"

[[dialogue]]
speaker = "unk"
original = "百合に挟まる男は……罪が重いよ？"
translation = "백합 사이에 끼어드는 남자는…… 죄가 무거워?"

[[dialogue]]
speaker = "unk"
original = "お兄さん――"
translation = "형씨――"

[[dialogue]]
speaker = "unk"
original = "それからニコッと笑って、手を離すと……"
translation = "그러고는 싱긋 웃으며 손을 놓아주자……"

[[dialogue]]
speaker_original = "男"
speaker_translation = "남자"
original = "「……な、なんかよく分からないけど、すんません！！！\u3000失礼しましたぁぁぁ～～～っ！！！」"
translation = "「……뭔, 뭔지 모르겠지만 죄송합니다!!! 실례했습니다아아아아~~앗!!!」"

[[dialogue]]
speaker = "unk"
original = "男は逃げるように去って行った。"
translation = "남자는 도망치듯 떠나갔다."

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "ふぅ……ヒトリ、大丈夫だった？"
translation = "후우…… 히토리, 괜찮았어?"

[[dialogue]]
speaker = "unk"
original = "ぼーっとしている様子のヒトリに声を掛けると――"
translation = "멍하니 있는 듯한 히토리에게 말을 걸자――"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「……お姉様……！」"
translation = "「……언니……!」"

[[dialogue]]
speaker = "unk"
original = "え？"
translation = "어?"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ああ、そうです……！\u3000今回は同い年の女の子じゃなくて、年上の女の子とのてぇてぇを描けばよかったんです！」"
translation = "「아아, 맞아요……! 이번에는 동갑내기 여자아이가 아니라 연상의 여자아이와의 '테에테에'를 그리면 됐던 거예요!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「この憧れるような想い……！\u3000会長さん……今日から女の子の姿になった時は、『お姉様』と呼んでもいいでしょうか！？」"
translation = "「이 동경하는 듯한 마음……! 회장님…… 오늘부터 여자아이 모습이 되었을 때는 『언니』라고 불러도 될까요!?」"

[[dialogue]]
speaker = "unk"
original = "いや、どういうこと！？"
translation = "아니, 그게 무슨 소리야!?"

[[dialogue]]
speaker = "unk"
original = "いつもとは違う、キラキラとした瞳を俺に向けて来るヒトリ。"
translation = "평소와는 다른 반짝이는 눈동자를 나에게 보내는 히토리."

[[dialogue]]
speaker_original = "ゆーちゃん"
speaker_translation = "유짱"
original = "「てーてー！\u3000てーてー！」"
translation = "「테에테에! 테에테에!」"

[[dialogue]]
speaker = "unk"
original = "姿は見えないが、近くで興奮しているらしいゆーちゃんの声が沢山聞こえてくるのだった。"
translation = "모습은 보이지 않지만 근처에서 흥분한 듯한 유짱의 목소리가 잔뜩 들려왔다."

[[dialogue]]
speaker = "unk"
original = "その後――街のカフェにて。"
translation = "그 후―― 거리의 카페에서."

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「お、お姉様……よろしくお願いします……！」"
translation = "「어, 언니…… 잘 부탁드려요……!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「あ、あ～ん……♪」"
translation = "「아, 아~앙……♪」"

[[dialogue]]
speaker = "unk"
original = "頼んだストロベリーパフェを、スプーンで食べさせてあげると……"
translation = "주문한 딸기 파페를 스푼으로 먹여주자……"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「――あむっ♪\u3000もぐもぐ……ん～～～っ<emoji=heart04>」"
translation = "「――아암♪ 우물우물…… 음~~~<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「お姉様のご尊顔は眩しくて直視できませんが、てぇてぇ味がします……♪\u3000はあぁぁ♪」"
translation = "「언니의 존안은 눈부셔서 직시할 수 없지만, 테에테에한 맛이 나요……♪ 하아아♪」"

[[dialogue]]
speaker_original = "ゆーちゃん"
speaker_translation = "유짱"
original = "「てーてー♪」"
translation = "「테에테에♪」"

[[dialogue]]
speaker = "unk"
original = "俺の顔を見ないように伏し目がちで照れつつも、嬉しそうにネコミミをピコピコさせるヒトリの姿がそこにはあった――"
translation = "내 얼굴을 보지 못하고 눈을 내리깐 채 부끄러워하면서도 기쁜 듯 고양이 귀를 쫑긋거리는 히토리의 모습이 그곳에 있었다――"

