[[dialogue]]
speaker = "unk"
original = "第２話,姉離れは寂しいもの,P"
translation = "제2화, 언니에게서 독립하는 건 외로운 법, P"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「……どうしたのソフィ？\u3000あんまりフォークが進んでないみたいだけど、嫌いなものでもあった？\u3000お姉ちゃんが食べてあげようか？」"
translation = "「……왜 그래 소피? 포크가 별로 안 움직이는 것 같은데, 싫어하는 거라도 있어? 누나가 대신 먹어줄까?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「子供扱いしないでください。苦手なものは人間界に来る前にある程度克服しました。昔みたいに姉さんに食べてもらうようなことはありません」"
translation = "「아이 취급하지 마세요. 못 먹는 건 인간계에 오기 전에 어느 정도 극복했습니다. 예전처럼 언니가 먹여주는 일은 없어요.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あら、そうなの～。だったらどうして？」"
translation = "「어라, 그렇구나~. 그렇다면 왜 그래?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「……なぜ、新星の会長さんがここにいらっしゃるんですか。２人で久しぶりに食事をしよう、という話だったはずですが」"
translation = "「……왜 신성의 회장님이 여기에 계신 건가요. 둘이서 오랜만에 식사하자고 했던 이야기였을 텐데요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「いえ、別に会長さんがいること自体は気にしてません。ただ、相変わらずの気分屋でため息が止まらないだけです」"
translation = "「아니, 딱히 회장님이 있는 것 자체는 신경 쓰지 않아요. 그저 여전히 기분파인 언니 때문에 한숨이 멈추지 않을 뿐입니다.」"

[[dialogue]]
speaker = "unk"
original = "せっかくの姉妹水入らずだったのに、ごめん"
translation = "간만의 자매끼리 오붓한 시간이었는데, 미안."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「会長さんが謝ることはありませんよ。どうせ、私がいることを知らされずに、姉さんから食事に誘われたんですよね？」"
translation = "「회장님이 사과할 일은 아니에요. 어차피 제가 있다는 걸 알리지 않고 언니가 식사에 초대한 거겠죠?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「だって～、どうせならみんなで食べたほうが、ご飯も美味しくなると思って。会長くんも１人でお昼ご飯食べようとしてたし～」"
translation = "「그치만~ 어차피라면 다 같이 먹는 게 밥도 맛있어질 것 같아서. 회장 군도 혼자서 점심 먹으려 하고 있었고~」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「とまあ、こういう人であることは姉妹である私が一番よくわかっているので、気にしなくていいです」"
translation = "「뭐, 이런 사람이라는 건 자매인 제가 제일 잘 알고 있으니 신경 쓰지 마세요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「すみません、フィオナ会長から電話が。少し席を外します」"
translation = "「죄송합니다, 피오나 회장님에게 전화가. 잠시 자리를 비울게요.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「いってらっしゃ～い」"
translation = "「다녀와~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ごめんなさいね、会長くん。巻き込んじゃって」"
translation = "「미안해, 회장 군. 휘말리게 해서.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「私と１対１で話すよりも、会長くんがいてくれたほうがリラックスして話せるかなと思ったんだけど……逆効果だったみたい」"
translation = "「나랑 1대 1로 대화하는 것보다, 회장 군이 있어 주는 게 더 편하게 대화할 수 있을까 생각했는데…… 역효과였나 봐.」"

[[dialogue]]
speaker = "unk"
original = "昔から、あまり仲は……？"
translation = "예전부터 별로 사이가……?"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「いえ？\u3000魔界にいた頃はお姉ちゃんお姉ちゃんって言って、どこに行くにも私の後ろについてくるような、すっごく甘えてくる子だったのよ～」"
translation = "「아니? 마계에 있었을 때는 누나 누나 거리면서 어디를 가든 내 뒤를 따라다니던, 엄청 어리광 부리는 아이였어~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「それが今では立派に独り立ちしちゃって……」"
translation = "「그게 지금은 훌륭하게 자립해버려서……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「お姉ちゃん、すっごく寂しいわ～～～っ！」"
translation = "「누나, 너무너무 외로워~~~!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「昔は抱きしめたり、ほっぺすりすりしても嫌がらないどころか、嬉しそうに抱きしめ返してくれたのに～～～っ！」"
translation = "「예전에는 껴안거나 볼을 부비부비해도 싫어하기는커녕, 기쁜 듯이 같이 껴안아 줬는데~~~!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ぐすん……まあでもそうよね。ソフィも姉離れするような年齢よね。そうよね。わかってる。わかってるわ……」"
translation = "「훌쩍…… 뭐 하지만 그렇겠지. 소피도 언니에게서 독립할 나이지. 그렇지. 알고 있어. 알고 있다고……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「……でも」"
translation = "「……하지만」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そういう、ちょっと反抗的なソフィも、可愛いと思わないかしら？\u3000うふふ、どうにかして昔みたいに、甘えさせたいって気になっちゃう♪」"
translation = "「그런, 조금 반항적인 소피도 귀엽다고 생각하지 않아? 우후후, 어떻게든 예전처럼 어리광 부리게 하고 싶어지네♪」"

[[dialogue]]
speaker = "unk"
original = "（だいぶ厄介なシスコンだ……！）"
translation = "（상당히 성가신 시스콘이다……!）"

[[dialogue]]
speaker = "unk"
original = "（シスコンはシスコンなんだろうけど……）"
translation = "（시스콘은 시스콘이겠지만……）"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ただいま戻りました。なんの話をしていたんですか？」"
translation = "「방금 돌아왔습니다. 무슨 이야기를 하고 있었나요?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ソフィの反抗期について話してたのよ♪」"
translation = "「소피의 사춘기에 대해 이야기하고 있었어♪」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「なっ……！\u3000は、反抗期なんかじゃありませんっ！\u3000姉さんとはウマが合わないというだけで、反抗期なんて子供っぽいものと勘違いされるのは不服ですっ！」"
translation = "「나앗……! 사, 사춘기 같은 게 아니에요! 언니와는 성미가 맞지 않을 뿐이지, 사춘기 같은 어린애 같은 걸로 오해받는 건 불쾌합니다!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「だ、大体姉さんも妹離れするべきなんじゃないですか。いつまでも自分に甘えてくれる存在がいるとは、思わないほうがいいですよ」"
translation = "「애, 애초에 언니도 동생에게서 독립해야 하는 거 아닌가요. 언제까지나 자신에게 어리광 부려주는 존재가 있을 거라고 생각하지 않는 게 좋아요.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「なぁんでそんなこと言うの～～！\u3000お姉ちゃん、泣いちゃうわよ？」"
translation = "「어째서 그런 말을 하는 거야~~! 누나, 울어버릴 거야?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「こんな公衆の面前で泣くのはやめてください！\u3000恥ずかしいです」"
translation = "「이런 공공장소에서 우는 건 그만두세요! 창피합니다.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「じゃあ妹離れできないお姉ちゃんは、妹を抱きしめてなでなでしてもいいってことよね？」"
translation = "「그럼 동생에게서 독립 못 하는 누나는, 동생을 껴안고 쓰담쓰담해도 된다는 거지?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ダメです」"
translation = "「안 됩니다.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ソフィ、お姉ちゃん権限を行使してもいいのよ？」"
translation = "「소피, 누나 권한을 행사해도 된다고?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「そんなものはありません。ダメです」"
translation = "「그런 건 없습니다. 안 돼요.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「……わかったわ。今日のところは諦めることにします」"
translation = "「……알았어. 오늘은 이만 포기할게.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「明日も明後日もそれ以降もずっとそうしてください」"
translation = "「내일도 모레도 그 이후로도 쭉 그렇게 해주세요.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「……会長くん。お姉ちゃんは今、猛烈に妹成分を欲しているわ」"
translation = "「……회장 군. 누나는 지금, 맹렬하게 여동생 성분을 원하고 있어.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「だから……会長くんを妹だと思って、抱きしめていいかしら？」"
translation = "「그러니까…… 회장 군을 여동생이라 생각하고 껴안아도 될까?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「はあっ！？！？」"
translation = "「하앗!?!?」"

[[dialogue]]
speaker = "unk"
original = "ダメです"
translation = "안 됩니다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あら残念～。仕方ないわね。妹成分の補給は、また今度まで取っておくことにするわ」"
translation = "「어라 아쉽네~. 어쩔 수 없지. 여동생 성분 보충은 다음에 할게.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "（……か、会長さんに妹の立場を取られるくらいなら、許してあげなくも……）"
translation = "（……회, 회장님에게 여동생 자리를 뺏길 바에야, 허락해 주지 못할 것도……）"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ソフィ？\u3000何か言った？」"
translation = "「소피? 뭐라고 했어?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「い、いえ、何もっ。それより、こんなくだらない話をしていては、ご飯を食べる前に休み時間が終わってしまいますっ。早く食べましょうっ」"
translation = "「아, 아니요, 아무것도. 그보다 이런 쓸데없는 이야기를 하느라 밥을 먹기 전에 쉬는 시간이 끝나버리겠어요. 빨리 먹죠.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「それもそうね。料理が冷めちゃうわ～」"
translation = "「그것도 그렇네. 요리가 식어버리겠어~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あ、ソフィ？\u3000久しぶりに、あーん、してあげる♪\u3000ほーら♪」"
translation = "「아, 소피? 오랜만에, 아~ 해줄게♪ 자아♪」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「結構です！」"
translation = "「됐습니다!」"

[[dialogue]]
speaker = "unk"
original = "ソフィアの言葉が聞こえていた俺には、もはや仲の良い姉妹のじゃれ合いにしか見えず──"
translation = "소피아의 말을 듣고 있던 나에게는, 이제 사이좋은 자매의 장난으로밖에 보이지 않아──"

[[dialogue]]
speaker = "unk"
original = "思わず、微笑ましくなってしまうのだった。"
translation = "나도 모르게 흐뭇해지고 마는 것이었다."

