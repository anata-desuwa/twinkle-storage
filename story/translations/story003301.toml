[[dialogue]]
speaker = "unk"
original = "リップルから『リゾート結界で不思議なものを拾った』と知らせを受け、俺は結界内の海の家に向かった。"
translation = "리플로부터 『리조트 결계에서 신기한 것을 주웠다』는 소식을 듣고, 나는 결계 내의 바다의 집으로 향했다."

[[dialogue]]
speaker = "リップル"
original = "「カイチョー！\u3000ヘイ、ラッシャーセー！\u3000見てほしいのはコレでーす！」"
translation = "「회장님! 헤이, 어서 오십쇼! 보여드리고 싶은 건 이검다!」"

[[dialogue]]
speaker = "unk"
original = "リップルが差し出したのは、霊力を放つ小さな欠片だった。"
translation = "리플이 내민 것은 영력을 내뿜는 작은 파편이었다."

[[dialogue]]
speaker = "unk"
original = "守護天使が持つ霊力の結晶──『<ruby>霊屑<rt>クロスダスト</rt></ruby>』に近いような気もするが……"
translation = "수호천사가 가진 영력의 결정── 『영설』에 가까운 느낌도 들지만……"

[[dialogue]]
speaker = "？？？"
original = "「だ～れだ？」"
translation = "「누~구게?」"

[[dialogue]]
speaker = "unk"
original = "突然後ろから、小さな手で目隠しをされた。だがこの声の主ならわかる。"
translation = "갑자기 뒤에서 작은 손으로 눈이 가려졌다. 하지만 이 목소리의 주인이라면 알 수 있다."

[[dialogue]]
speaker = "unk"
original = "パテル！"
translation = "파텔!"

[[dialogue]]
speaker = "パテル"
original = "「せいか～い♪\u3000久しぶりだね、おにーさん♪」"
translation = "「정다~압♪ 오랜만이야, 오빠♪」"

[[dialogue]]
speaker = "リップル"
original = "「おや、ドナタですか？」"
translation = "「오야, 누구심까?」"

[[dialogue]]
speaker = "パテル"
original = "「あたしは『淘汰』の摂理を司る守護天使──《試練》のパテルだよ。よろしく」"
translation = "「나느 『도태』의 섭리를 다스리는 수호천사 ── 《시련》의 파텔이야. 잘 부탁해」"

[[dialogue]]
speaker = "リップル"
original = "「お～、パテルも守護天使なのですね！\u3000ヨロシクでーす！\u3000オペレーション・ペンタグラムではセシアにお世話にナリました！」"
translation = "「오~, 파텔도 수호천사였슴까! 반갑슴다! 오퍼레이션 펜타그램에서는 세시아가 신세를 졌슴다!」"

[[dialogue]]
speaker = "パテル"
original = "「こちらこそ、守護天使の本体を解放してくれて感謝するよ」"
translation = "「나야말로 수호천사의 본체를 해방해 줘서 고마워」"

[[dialogue]]
speaker = "unk"
original = "その水着はどうしたの？"
translation = "그 수영복은 어떻게 된 거야?"

[[dialogue]]
speaker = "パテル"
original = "「ああ、これ？」"
translation = "「아아, 이거?」"

[[dialogue]]
speaker = "パテル"
original = "「ペンタグラムで守護天使の本体が解放されて、霊力に融通が利くようになったから、星騎士を真似してチョイチョイっと弄ってみたんだ」"
translation = "「펜타그램에서 수호천사의 본체가 해방되어서 영력을 융통할 수 있게 됐으니까, 성기사를 흉내 내서 조금 만져봤지」"

[[dialogue]]
speaker = "パテル"
original = "「どうどう？\u3000かわいい？\u3000似合ってる？\u3000パテルちゃんマジ天使？」"
translation = "「어때 어때? 귀여워? 어울려? 파텔 짱 완전 천사?」"

[[dialogue]]
speaker = "リップル"
original = "「ハイ！\u3000ＢＩＧカワイイでーす！」"
translation = "「예! BIG 귀엽슴다!」"

[[dialogue]]
speaker = "unk"
original = "（パテルは最初から天使では……？）"
translation = "(파텔은 처음부터 천사였던 게……?)"

[[dialogue]]
speaker = "パテル"
original = "「はいそこー、考えてることバレバレー。パテルちゃんはいつもの恰好でも水着でも、キュートでぷりちーな守護天使様なのだよ」"
translation = "「거기 당신, 생각하는 거 다 들킨다구. 파텔 짱은 평소 차림이든 수영복이든 큐트하고 프리티한 수호천사님이시랍니다」"

[[dialogue]]
speaker = "リップル"
original = "「でもどうしてパテルがリゾート結界に？\u3000遊びにキテくれたんですか？」"
translation = "「그런데 어째서 파텔이 리조트 결계에? 놀러 오신 검까?」"

[[dialogue]]
speaker = "パテル"
original = "「それはねー……」"
translation = "「그건 말이지~……」"

[[dialogue]]
speaker = "パテル"
original = "「ほら、前にあたしが堕天使だった時に、分身して逃げたことがあったでしょ？」"
translation = "「있잖아, 예전에 내가 타락천사였을 때 분신해서 도망친 적 있었지?」"

[[dialogue]]
speaker = "パテル"
original = "「あの時に、分身の何体かがリゾート結界に逃げ込んでたみたいでさ」"
translation = "「그때 분신 몇 마리가 리조트 결계로 도망쳐 들어왔던 모양이야」"

[[dialogue]]
speaker = "パテル"
original = "「だけど守護天使の本体がペンタグラムで解放されたから堕天使じゃなくなって、霊力だけが結晶として残されたってわけ」"
translation = "「하지만 수호천사의 본체가 펜타그램에서 해방되면서 타락천사가 아니게 됐고, 영력만이 결정으로 남겨졌다는 소리지」"

[[dialogue]]
speaker = "パテル"
original = "「この結晶は、<ruby>霊屑<rt>クロスダスト</rt></ruby>の欠片ってとこかな」"
translation = "「이 결정은 영설의 파편 같은 거랄까」"

[[dialogue]]
speaker = "パテル"
original = "「つまりはあたしの力の一部。だからあたしが責任を持って回収しに来たんだ」"
translation = "「즉 내 힘의 일부. 그래서 내가 책임지고 회수하러 온 거야」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「あら～？」"
translation = "「어머나~?」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「パテルがリゾート結界にいるのだ。珍しいのだ」"
translation = "「파텔이 리조트 결계에 있는 것이다. 희귀한 것이다」"

[[dialogue]]
speaker = "パテル"
original = "「あ、マグダレナとアルモタヘルだ。しかも今日はちっちゃい方」"
translation = "「아, 막달레나랑 아르모타헬이다. 게다가 오늘은 조그만 쪽이네」"

[[dialogue]]
speaker = "パテル"
original = "「大鎌使いとして、ちっちゃいアルモタヘルとは決着付けないとって思ってたんだよね。ここで会ったが百万年目！\u3000やるか～！？」"
translation = "「대낫 사용자로서 조그만 아르모타헬과는 결판을 내야겠다고 생각했거든. 여기서 만난 게 백만 년 만이네! 한판 붙을래~!?」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「やらないぞ。アルモたんとマグダレナは、リップルから不思議な欠片のことを聞いて調査しに来たのだ」"
translation = "「안 할 거다. 알모땅이랑 막달레나는 리플에게 신기한 파편 이야기를 듣고 조사하러 온 것이다」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「どうしてパテルがここにいるんですか？」"
translation = "「어째서 파텔이 여기 있는 건가요?」"

[[dialogue]]
speaker = "パテル"
original = "「それはね～……」"
translation = "「그건 말이지~……」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「ふむふむ……なるほどなのだ！\u3000リゾート結界で見つかったのは、パテルの力の一部だったのだ」"
translation = "「흐음흐음…… 과연 그런 것이다! 리조트 결계에서 발견된 건 파텔의 힘의 일부였던 것이다」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「それなら私たちも欠片を探すのを手伝います。同じ守護天使として放っておけませんからね」"
translation = "「그렇다면 저희도 파편 찾는 걸 도울게요. 같은 수호천사로서 모른 척할 수는 없으니까요」"

[[dialogue]]
speaker = "パテル"
original = "「ありがとー。助かるよ」"
translation = "「고마워~. 도움이 되겠네」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「でもパテルだけ水着なのはずるいぞ！\u3000アルモたんも水着を着たいのだ！」"
translation = "「하지만 파텔만 수영복인 건 치사한 것이다! 알모땅도 수영복을 입고 싶은 것이다!」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「私も水着欲しいです～っ」"
translation = "「저도 수영복 갖고 싶어요~」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「というわけで──」"
translation = "「그리하여──」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「ママダレナたちも水着に着替えちゃいました♪」"
translation = "「마마달레나들도 수영복으로 갈아입었답니다♪」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「水着守護天使参上！\u3000なのだ！」"
translation = "「수영복 수호천사 등장! 인 것이다!」"

[[dialogue]]
speaker = "リップル"
original = "「ワオ！\u3000ママダレナたちもＢＩＧカワイイでーす！」"
translation = "「와오! 마마달레나들도 BIG 귀엽슴다!」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「海で欠片探しって、宝探しみたいなのだ。ワクワクするのだ♪」"
translation = "「바다에서 파편 찾기라니 보물 찾기 같은 것이다. 두근거리는 것이다♪」"

[[dialogue]]
speaker = "パテル"
original = "「宝探しか～、確かにそれっぽいね。でも探すのがただの欠片じゃ味気ないし……名付けて『パテルストーン』！\u3000一番多く見つけた人はあたしがご褒美あげるね♪」"
translation = "「보물 찾기라~ 확실히 그런 느낌이네. 하지만 찾는 게 그냥 파편이면 재미없으니까…… 이름하여 『파텔 스톤』! 제일 많이 찾은 사람한테는 내가 보상 줄게♪」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「よーし、リゾート結界で遊びながらパテルストーンを探すのだ！」"
translation = "「좋아, 리조트 결계에서 놀면서 파텔 스톤을 찾는 것이다!」"

