[[dialogue]]
speaker = "unk"
original = "第２話,チナとの対話,B"
translation = "제2화, 치나와의 대화, B"

[[dialogue]]
speaker = "unk"
original = "チナが新星学園に拘束されて３日が経過した。緋宮クロトたちはまだ帰還していない。"
translation = "치나가 신성학원에 구속된 지 3일이 지났다. 히노미야 쿠로토 일행은 아직 귀환하지 않았다."

[[dialogue]]
speaker = "unk"
original = "そしてチナは出された食事に手を付けず、未だに沈黙を続けていた。"
translation = "그리고 치나는 내놓은 식사에 손을 대지 않은 채 여전히 침묵을 지키고 있었다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "（敵に利用されるくらいなら……このまま死んでやる……）"
translation = "(적에게 이용당할 바에야…… 이대로 죽어버리겠어……)"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "（でも魔王クロトがアルタイルに逃げたのは、間違いだったのか……？\u3000どうしてルヴィは──）"
translation = "(하지만 마왕 쿠로토가 알타이르로 도망쳤다는 게 틀린 거였나……? 어째서 루비는──)"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「こんにちは、香堂チナさん」"
translation = "「안녕하세요, 코도 치나 씨.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「！\u3000何の用だ……？」"
translation = "「! 무슨 용무냐……?」"

[[dialogue]]
speaker = "unk"
original = "チナの眼光には敵意と警戒心が込められていたが、シノは動じずに名乗る。"
translation = "치나의 눈빛에는 적의와 경계심이 서려 있었지만, 시노는 동요하지 않고 이름을 밝힌다."

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「初めまして。私は十六夜シノ。新星学園の学園長です」"
translation = "「처음 뵙겠습니다. 저는 이자요이 시노. 신성학원의 학원장입니다.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「は……？\u3000こんな若い女が学園長なわけないだろ。バカにしてるのか？」"
translation = "「하……? 이런 젊은 여자가 학원장일 리 없잖아. 바보 취급 하는 거냐?」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「これが本当なんです。私も新星学園の学園長にならないかと声をかけられた時は、とても驚きましたけど」"
translation = "「이게 사실이랍니다. 저도 신성학원의 학원장이 되지 않겠느냐는 제안을 받았을 때는 무척 놀랐지만요.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「就任したのは最近ですが、ちゃんと理事会で選ばれたんですよ」"
translation = "「취임한 지는 얼마 안 됐지만, 제대로 이사회에서 선출되었답니다.」"

[[dialogue]]
speaker = "unk"
original = "そう言って職員証を見せるシノ。そこには彼女の顔写真とともに学園長という役職が記されていた。"
translation = "그렇게 말하며 직원증을 보여주는 시노. 거기에는 그녀의 얼굴 사진과 함께 학원장이라는 직함이 적혀 있었다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「……お前が学園長だろうがどうでもいい。だいたい、その学園長が何しに来たんだ？」"
translation = "「……네가 학원장이든 뭐든 상관없어. 대체 그 학원장이란 게 뭘 하러 온 거냐?」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「チナさんと食事をしたいと思いまして」"
translation = "「치나 씨와 식사를 하고 싶어서요.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「食事？\u3000アタシが食べないから心配して来たのか？」"
translation = "「식사? 내가 안 먹으니까 걱정돼서 온 거냐?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ハッ、残念だったな。人質になってデネブの足を引っ張るくらいなら、アタシはこのまま死ぬ……！」"
translation = "「흥, 유감이겠군. 인질이 되어 데네브의 발목을 잡을 바에야 난 이대로 죽겠다……!」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「あなたは一度、命を捨てて特攻をかけた身。デネブにとって人質の価値があるかは疑問です」"
translation = "「당신은 한 번 목숨을 버리고 특공을 걸었던 몸. 데네브에게 인질로서의 가치가 있을지는 의문이네요.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「であれば今は、食事を摂って体力を養い、脱出の機会を窺う方が、デネブや極星学園にとって利益になる可能性が高いのでは？」"
translation = "「그렇다면 지금은 식사를 해서 체력을 기르고 탈출 기회를 엿보는 편이 데네브나 극성학원에게 이득이 될 가능성이 높지 않을까요?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「なんだと……！」"
translation = "「뭐라고……!」"

[[dialogue]]
speaker = "unk"
original = "シノは冷静に反論しつつ、手に提げていた袋を差し出す。"
translation = "시노는 냉정하게 반박하면서 손에 들고 있던 봉투를 내민다."

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「これ、よかったらどうぞ」"
translation = "「이거, 괜찮다면 드세요.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「！\u3000それは<ruby>肉肉飯店<rt>ローローハンテン</rt></ruby>の肉まん……！」"
translation = "「! 그건 고기고기 반점의 고기만두……!」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「はい。とても美味しいと評判で、さっき買ってきました。とてもいい匂いがしてお腹がペコペコになってしまいます」"
translation = "「네. 아주 맛있다고 소문나서 방금 사 왔어요. 아주 좋은 냄새가 나서 배가 꼬르륵 고파지네요.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「肉肉飯店……あなたもよくご存じのお店ですよね？」"
translation = "「고기고기 반점…… 당신도 잘 아는 가게죠?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「あなたが平行世界デネブから来たのならば、アルタイルにも『香堂チナ』がいるはず。そこでこちらの世界の『香堂チナ』さんについて調べさせてもらいました」"
translation = "「당신이 평행세계 데네브에서 왔다면 알타이르에도 『코도 치나』가 있을 터. 그래서 이쪽 세계의 『코도 치나』 씨에 대해 조사해 보았습니다.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「出身は流星市国。肉肉飯店の近くにお住まいで、そこの肉まんが好物だそうです」"
translation = "「출신은 유성시국. 고기고기 반점 근처에 살고 있고, 그곳의 고기만두를 아주 좋아한다고 하더군요.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「こちらの彼女はあなたより幼い。年齢から推測すると、デネブはアルタイルより１０年ほど時間が進んでいるようですね」"
translation = "「이쪽의 그녀는 당신보다 어립니다. 나이로 추측하건대 데네브는 알타이르보다 10년 정도 시간이 앞서 있는 모양이네요.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「現在、彼女は眠っています。命に別状はないようですが、以前のアポロさんと同じく時間が止まったような状態です」"
translation = "「현재 그녀는 잠들어 있습니다. 생명에 지장은 없는 모양입니다만, 이전의 아폴로 씨처럼 시간이 멈춘 듯한 상태예요.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「話を聞くと、この前あなたがアルタイルに来た時も、一時的に同じ状態になったそうです」"
translation = "「이야기를 들어보니 요전에 당신이 알타이르에 왔을 때도 일시적으로 같은 상태가 되었다고 하더군요.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「同じ世界に同一存在がいる影響なのでしょう。なのでデネブに帰還する手段がわかり次第、あなたにはお帰り願いますね」"
translation = "「같은 세계에 동일 존재가 있는 영향이겠죠. 그러니 데네브로 귀환할 수단을 아는 대로 당신을 돌려보내 드릴게요.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「それならアタシを殺せばいいだろ」"
translation = "「그럴 거면 날 죽이면 되잖아.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「いえ、いけません。同一存在であるあなたが死ねば、彼女にどんな影響が及ぶか予想できません」"
translation = "「아니요, 안 됩니다. 동일 존재인 당신이 죽으면 그녀에게 어떤 영향이 미칠지 예상할 수 없으니까요.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「この世界の『香堂チナ』を守るためにも、あなたを傷つけるわけにはいきません」"
translation = "「이 세계의 『코도 치나』를 지키기 위해서라도 당신을 해칠 수는 없습니다.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「……だから食え、ってか？\u3000わざわざアタシの知ってる店の肉まんを持ってきて、皮肉のつもりか？」"
translation = "「……그러니까 먹어라, 이거냐? 일부러 내가 아는 가게의 고기만두를 가져와서 비꼬는 거냐?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「肉肉飯店はデネブにはもうない。１０年前のリクリエで壊されたままだ。アタシが知ってる街はみんななくなっちまった」"
translation = "「고기고기 반점은 데네브에는 이제 없어. 10년 전 리크리에 때 부서진 그대로다. 내가 아는 거리는 전부 사라져 버렸어.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「それをアタシの前に持ってきて、『これをお前が滅ぼそうとした』って、そう言いたいのかよ？」"
translation = "「그걸 내 앞에 가져와서 『이걸 네가 멸망시키려 했다』고, 그렇게 말하고 싶은 거냐고!」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「いいえ。私が肉肉飯店の肉まんを選んだのは、あなたの好物と聞いたからです。深い意味はありませんよ」"
translation = "「아니요. 제가 고기고기 반점의 고기만두를 고른 건 당신이 좋아하는 음식이라고 들었기 때문입니다. 깊은 의미는 없어요.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「私はあなたを非難する気はありません。その資格もありません」"
translation = "「저는 당신을 비난할 생각이 없습니다. 그럴 자격도 없고요.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「『カルネアデスの板』ではありませんが……人には、生き物には、生きる権利があります。時に他者を害してでも」"
translation = "「『카르네아데스의 판자』는 아니지만…… 사람에게는, 생물에게는 살 권리가 있습니다. 때로는 타인을 해치더라도요.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「平行世界のどちらかが滅びなければいけない。その前提に立つならば、あなたに非はありません」"
translation = "「평행세계 중 어느 한쪽이 멸망해야만 한다. 그 전제에 선다면 당신에게 잘못은 없습니다.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「──ですが」"
translation = "「──하지만.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「あなたはアルタイルを滅ぼしたいわけではない。むしろアルタイルにいる自分の家族や、生まれ育った街も守りたい」"
translation = "「당신은 알타이르를 멸망시키고 싶은 게 아니에요. 오히려 알타이르에 있는 자신의 가족이나 나고 자란 거리도 지키고 싶어 하죠.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「破壊される流星市国の街を見て、あなた自身が心を痛めている。……そうじゃないですか？」"
translation = "「파괴되는 유성시국의 거리를 보며 당신 자신이 마음 아파하고 있다. ……그렇지 않나요?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「だからどうした……！\u3000やりたいとかやりたくないじゃない、やらなくちゃいけないんだ！」"
translation = "「그래서 어쨌다는 거야……! 하고 싶다거나 하기 싫다거나 하는 문제가 아니야, 해야만 한단 말이다!」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「私は新星学園の学園長になる前、民間企業の社長として商売をしていました」"
translation = "「저는 신성학원의 학원장이 되기 전, 민간 기업의 사장으로서 장사를 했습니다.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「だから思うんです。取引の理想はウィンウィン……両者が得をすることだと」"
translation = "「그래서 생각해요. 거래의 이상은 윈윈…… 양쪽 모두가 이득을 보는 것이라고요.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「私はあなたとも、デネブともウィンウィンでありたい」"
translation = "「저는 당신과도, 데네브와도 윈윈이고 싶습니다.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「そして『アルタイルとデネブの両方を救う』──その選択こそ、両者にとって最も大きな利益となる、ウィンウィンの取引だと思うんです」"
translation = "「그리고 『알타이르와 데네브 양쪽 모두를 구한다』── 그 선택이야말로 양쪽 모두에게 가장 큰 이익이 되는 윈윈 거래라고 생각합니다.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「お前もバカなのか！？\u3000それができないからアタシたちは──」"
translation = "「너도 바보냐!? 그게 안 되니까 우리는──」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「私だって何の根拠もなく提案しているわけではありません。これを見ていただけますか？」"
translation = "「저도 아무런 근거 없이 제안하는 게 아닙니다. 이것 좀 봐주시겠어요?」"

[[dialogue]]
speaker = "unk"
original = "シノはそう言ってリモコンを操作し、会議室のスクリーンに映像を投影する。"
translation = "시노는 그렇게 말하며 리모컨을 조작해 회의실 스크린에 영상을 투영한다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「！？\u3000これは……？」"
translation = "「!? 이건……?」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「私たちはディザスターハンドと呼んでいます。破滅そのものと表現するに相応しい、巨大な手です」"
translation = "「저희는 디재스터 핸드라고 부르고 있습니다. 파멸 그 자체라고 표현하기에 걸맞은 거대한 손이죠.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ディザスターハンド……？」"
translation = "「디재스터 핸드……?」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「その様子ですと、ご存じないのですね。ディザスターハンドはまだデネブには現れていないのでしょう」"
translation = "「그 반응을 보니 모르시는 모양이군요. 디재스터 핸드는 아직 데네브에는 나타나지 않았나 봅니다.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「もうひとつ。平行世界ベガについて聞いたことはありますか？\u3000ここアルタイルとも、あなたのデネブとも違う世界です」"
translation = "「하나 더. 평행세계 베가에 대해 들어본 적 있나요? 여기 알타이르와도, 당신의 데네브와도 다른 세계입니다.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「……ルヴィネ会長から聞いたことがある。確か、もう滅んだ世界って言っていた」"
translation = "「……루비네 회장님께 들은 적 있어. 분명 이미 멸망한 세계라고 하셨지.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「ええ、そうです。そしてそのベガを滅ぼしたのが、このディザスターハンドとされています」"
translation = "「네, 맞아요. 그리고 그 베가를 멸망시킨 것이 이 디재스터 핸드라고 알려져 있습니다.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「──！！」"
translation = "「──!!」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「私たちはベガの数少ない生き残りから話を聞きました。残念ながらベガは……ディザスターハンドに勝てなかった」"
translation = "「저희는 베가의 얼마 안 되는 생존자에게 이야기를 들었습니다. 안타깝게도 베가는…… 디재스터 핸드에게 이기지 못했습니다.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「ですがアルタイルとデネブが力を合わせれば、このディザスターハンドに……リクリエに勝てるかもしれない。私はそう考えています」"
translation = "「하지만 알타이르와 데네브가 힘을 합친다면 이 디재스터 핸드에게…… 리크리에에게 이길 수 있을지도 모릅니다. 저는 그렇게 생각합니다.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「リクリエに……勝てる……」"
translation = "「리크리에에게…… 이길 수 있다……」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「……すみません、長々と話をしてしまいましたね。でも私が今話したこと、少し考えてみていただけると嬉しいです」"
translation = "「……죄송해요, 너무 길게 이야기했네요. 하지만 제가 지금 말한 것들, 조금 생각해 봐 주시면 기쁘겠습니다.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「じゃあとりあえず──肉まん食べませんか？\u3000せっかく買ってきたのに、このままでは冷めてしまいます」"
translation = "「그럼 우선── 고기만두 드시지 않겠어요? 어렵게 사 왔는데 이대로는 식어버릴 거예요.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「さ、どうぞ。もちろん毒は入っていませんよ」"
translation = "「자, 드세요. 물론 독은 들어있지 않답니다.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "差し出された肉まんを、チナは無言で受け取る。"
translation = "내밀어진 고기만두를 치나는 무언으로 받아든다."

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「では私もいただきます。……あむ」"
translation = "「그럼 저도 먹겠습니다. ……함냐.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「ん～♪\u3000さすが煌嶺さんのオススメ、これは絶品ですね♪」"
translation = "「음~♪ 역시 코레이 씨의 추천답게 정말 일품이네요♪」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「……あむ」"
translation = "「……함냐.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「──！\u3000ぅ……うぅ……」"
translation = "「──! 윽…… 으으……」"

[[dialogue]]
speaker = "unk"
original = "そしてチナも一口肉まんをかじり、懐かしい味に目を潤ませるのだった。"
translation = "그리고 치나도 고기만두를 한 입 베어 물고는 그리운 맛에 눈시울을 붉히는 것이었다."

