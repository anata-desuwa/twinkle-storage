[[dialogue]]
speaker = "unk"
original = "第５話,天蓋,B"
translation = "제5화, 천개, B"

[[dialogue]]
speaker_original = "エリシア"
speaker_translation = "엘리시아"
original = "「っ──！」"
translation = "「윽──!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「っ──！」"
translation = "「윽──!」"

[[dialogue]]
speaker = "unk"
original = "仕留めた──"
translation = "마무리 지었다──"

[[dialogue]]
speaker = "unk"
original = "そう思った一撃も、返しの大剣によって強引な相打ちへ持ち込まれる。"
translation = "그렇게 생각했던 일격도, 되받아치는 대검에 의해 억지로 무승부로 이어진다."

[[dialogue]]
speaker = "unk"
original = "流星、新星の総力を結集させてなお互角。"
translation = "유성, 신성의 총력을 결집시키고도 여전히 호각."

[[dialogue]]
speaker = "unk"
original = "底なしに膨れ上がるアポロの力は、むしろ今断ち切らなければまずいと予感した。"
translation = "끝없이 팽창하는 아폴로의 힘은, 오히려 지금 끊어내지 않으면 위험하다고 예감했다."

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「ふう……やれやれ。しぶといものですね、星騎士というのは」"
translation = "「후우…… 이럴 수가. 질긴 생명이군요, 성기사라는 것은」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ……そうだろ。世界の平和を守る本物の<ruby>英雄<rt>ヒーロー</rt></ruby>だからな、心が折れない限り戦い続けるんだ」"
translation = "「아아…… 그렇겠지. 세계의 평화를 지키는 진짜 영웅이니까, 마음이 꺾이지 않는 한 계속 싸우는 거야」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「……そういう根性が私は何より嫌いです。所詮、ただ力に恵まれただけの偶然でしょうに」"
translation = "「……그런 근성을 저는 무엇보다 싫어합니다. 결국, 그저 힘을 타고났을 뿐인 우연일 뿐인데 말입니다」"

[[dialogue]]
speaker = "unk"
original = "ギエルの眼光に憎しみが宿っていた。"
translation = "기엘의 눈빛에 증오가 깃들어 있었다."

[[dialogue]]
speaker = "unk"
original = "彼の事情も気にはなるが……今はアポロの件が先決だ。"
translation = "그의 사정도 신경 쓰이지만…… 지금은 아폴로의 일이 먼저다."

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「アポロ様。彼もまだ、魔王としての目覚めは遠い様子。真っ向勝負にこだわる理由も、もはやないかと」"
translation = "「아폴로님. 그도 아직, 마왕으로서의 각성은 먼 듯합니다. 정면 승부를 고집할 이유도, 더 이상 없을 듯합니다만」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「……そうだな」"
translation = "「……그렇군」"

[[dialogue]]
speaker_original = "エリシア"
speaker_translation = "엘리시아"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "unk"
original = "アポロが空に手を掲げる。"
translation = "아폴로가 하늘에 손을 치켜든다."

[[dialogue]]
speaker = "unk"
original = "街が破壊されるのを恐れて──誰もが身構えた。"
translation = "도시가 파괴되는 것을 두려워하며── 모두가 몸을 움츠렸다."

[[dialogue]]
speaker_original = "エリシア"
speaker_translation = "엘리시아"
original = "「姉さんっ──！\u3000お願いです、目を覚ましてください！\u3000私たちの生まれ育った街を、こんな風にしていいはずがありません！」"
translation = "「언니──! 부탁이에요, 정신 차리세요! 우리가 나고 자란 도시를, 이렇게 만들어도 될 리가 없잖아요!」"

[[dialogue]]
speaker_original = "エリシア"
speaker_translation = "엘리시아"
original = "「いつかまた一緒に遊ぼうって──約束したじゃないですかっ！？」"
translation = "「언젠가 다시 같이 놀자고── 약속했잖아요!?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「────」"
translation = "「────」"

[[dialogue]]
speaker = "unk"
original = "エリシアの悲痛な訴えがアポロに届く。"
translation = "엘리시아의 비통한 호소가 아폴로에게 닿는다."

[[dialogue]]
speaker = "unk"
original = "だが──"
translation = "하지만──"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ああ……安心しろ」"
translation = "「아아…… 안심해라」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「何もかもまっさらになったら──また会えるさ。エリシア」"
translation = "「모든 것이 완전히 새로워지면── 다시 만날 수 있을 거야. 엘리시아」"

[[dialogue]]
speaker_original = "エリシア"
speaker_translation = "엘리시아"
original = "「────」"
translation = "「────」"

[[dialogue]]
speaker = "unk"
original = "彼女は再び──妹の名を呼んだ。"
translation = "그녀는 다시── 여동생의 이름을 불렀다."

[[dialogue]]
speaker = "unk"
original = "そして、どこからか、雫の落ちるような音が、玲瓏と響く。"
translation = "그리고, 어디선가, 물방울이 떨어지는 듯한 소리가, 맑고 고운 소리로 울려 퍼진다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「確かに昔……星見フィオナという女はいた」"
translation = "「확실히 옛날…… 호시미 피오나라는 여자는 있었다」"

[[dialogue]]
speaker = "unk"
original = "今までになく落ち着いたアポロ。"
translation = "지금까지 없이 차분해진 아폴로."

[[dialogue]]
speaker = "unk"
original = "仮面なき彼女の頬から滴るは、寸毫の濁りもない透明の涙。"
translation = "가면 없는 그녀의 뺨에서 떨어지는 것은, 티끌만큼의 흐림도 없는 투명한 눈물."

[[dialogue]]
speaker = "unk"
original = "その瞳は、どこか遠くを見ているようで……"
translation = "그 눈동자는, 어딘가 먼 곳을 바라보는 듯했고……"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「だが……奴は疲れてしまったのだ。魔王を志し、修練に耐え、あげく敗戦の汚辱を晒すことに」"
translation = "「하지만…… 그 녀석은 지쳐버린 것이다. 마왕을 지망하고, 수련을 견디고, 결국 패전의 오욕을 드러내는 것에」"

[[dialogue]]
speaker_original = "エリシア"
speaker_translation = "엘리시아"
original = "「姉……さん……？」"
translation = "「언니……?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「リクリエは自然の摂理。神の意志。人の子に抗えるものではない」"
translation = "「리크리에는 자연의 섭리. 신의 의지. 인간의 자식이 거스를 수 있는 것이 아니다」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「だから、世界は滅ぶ。ここに崩れる。そして新たな世が生まれる。全ては細胞の代謝の如くに」"
translation = "「그러니까, 세계는 멸망한다. 여기서 무너진다. 그리고 새로운 세상이 태어난다. 모든 것은 세포의 대사처럼」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「アポロ……」"
translation = "「아폴로……」"

[[dialogue]]
speaker = "unk"
original = "今の彼女はアポロなのか？\u3000フィオナなのか？"
translation = "지금의 그녀는 아폴로인가? 피오나인가?"

[[dialogue]]
speaker = "unk"
original = "その口調や語彙からして、元の人格すらあの瘴気に乗っ取られているように見える。"
translation = "그 말투나 어휘로 보아, 원래 인격조차 저 장기에 잠식당하고 있는 것처럼 보인다."

[[dialogue]]
speaker = "unk"
original = "そして、何の前触れもなく──それは起こった。"
translation = "그리고, 아무런 예고도 없이── 그것은 일어났다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「天蓋」"
translation = "「천개」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ん──わああっ！？」"
translation = "「응── 와아앗!?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「マ、マトイちゃ──大丈夫！？」"
translation = "「마, 마토이짱── 괜찮아!?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「って、私も、あれ……わっ！？」"
translation = "「어, 나도, 어라…… 왓!?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「姉さんっ──！？」"
translation = "「언니──!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「みんな──っ！？」"
translation = "「모두──윽!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「な──何なのよ急に──！」"
translation = "「뭐── 뭐야 갑자기──!」"

[[dialogue]]
speaker = "unk"
original = "アポロを止めるべく空を飛んでいたヴィーナスたちが、なぜか揃って地面へと墜落してしまう。"
translation = "아폴로를 막기 위해 하늘을 날고 있던 비너스들이, 어째서인지 모두 지면으로 추락해 버린다."

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「うちらで止めるよ──！」"
translation = "「우리들이 막을게──!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「了解です」"
translation = "「알겠습니다」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「コキュートス──スピナー！」"
translation = "「코퀴토스── 스피너!」"

[[dialogue]]
speaker = "unk"
original = "そんな事故を察して、地上にいた面々が即座にアポロへと攻撃を見舞う。"
translation = "그런 사고를 감지하고, 지상에 있던 멤버들이 즉시 아폴로에게 공격을 퍼붓는다."

[[dialogue]]
speaker = "unk"
original = "雷の──"
translation = "번개의──"

[[dialogue]]
speaker = "unk"
original = "火の──"
translation = "불의──"

[[dialogue]]
speaker = "unk"
original = "氷の──"
translation = "얼음의──"

[[dialogue]]
speaker = "unk"
original = "それぞれの星術が色とりどりの属性を宿して、相手の発動を食い止める。"
translation = "각각의 성술이 다채로운 속성을 담고, 상대의 발동을 저지한다."

[[dialogue]]
speaker = "unk"
original = "はずだった。"
translation = "그랬어야 했다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「シンフォニックブラスター！ ──あ、あれ！？\u3000音は出るのに……効果が出ません！？」"
translation = "「심포닉 블래스터! ──어, 어라!? 소리는 나는데…… 효과가 나오지 않아요!?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「っ……！？\u3000な、なんで……」"
translation = "「윽……!? 어, 어째서……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……火が」"
translation = "「……불이」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「……マジ？」"
translation = "「……진심이야?」"

[[dialogue]]
speaker = "unk"
original = "ソフィアちゃんの剣が氷をまとわない。"
translation = "소피아짱의 검이 얼음을 두르지 않는다."

[[dialogue]]
speaker = "unk"
original = "セーラさんの銃から弾が出ない。"
translation = "세라 씨의 총에서 탄환이 나오지 않는다."

[[dialogue]]
speaker = "unk"
original = "アナの矢に火が点かない。"
translation = "아나의 화살에 불이 붙지 않는다."

[[dialogue]]
speaker = "unk"
original = "そして、地に堕ちたみんな、二度と飛び上がることができない。"
translation = "그리고, 땅에 떨어진 모두는, 두 번 다시 날아오를 수 없다."

[[dialogue]]
speaker = "unk"
original = "それは──絶望に他ならない状況だった。"
translation = "그것은── 절망과 다름없는 상황이었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……星術が」"
translation = "「……성술이」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「使え、ない……」"
translation = "「쓸, 수 없어……」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「……フッ」"
translation = "「……훗」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……守護星とのリンクが、切断されました。再構築不可能」"
translation = "「……수호성과의 링크가, 절단되었습니다. 재구축 불가능」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「ニャ……せっかくのワガハイの、本気が……」"
translation = "「냐…… 모처럼 나의, 진심이……」"

[[dialogue]]
speaker_original = "エリシア"
speaker_translation = "엘리시아"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "エリシアにならって俺たちは天を仰いだ。"
translation = "엘리시아를 따라 우리들은 하늘을 올려다보았다."

[[dialogue]]
speaker = "unk"
original = "夜空に広がる星々──しかし、その輝きは先ほどよりわずかに薄れている。"
translation = "밤하늘에 펼쳐진 별들── 하지만, 그 빛은 조금 전보다 미세하게 옅어져 있다."

[[dialogue]]
speaker = "unk"
original = "何やら膜のようなものが、地上と星空とを隔てているようだった。"
translation = "무언가 막 같은 것이, 지상과 별하늘을 가로막고 있는 듯했다."

[[dialogue]]
speaker = "unk"
original = "割れた仮面の破片が夜空をただよい、謎の障壁を形成している。"
translation = "깨진 가면의 파편이 밤하늘을 떠돌며, 수수께끼의 장벽을 형성하고 있다."

[[dialogue]]
speaker = "unk"
original = "あっけなく。"
translation = "어이없게도."

[[dialogue]]
speaker = "unk"
original = "あまりにもあっけなく──俺たちは打つ手立ての全てを失った。"
translation = "너무나도 어이없게── 우리들은 손쓸 수 있는 모든 수단을 잃었다."

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「羽のもげたコバエのようだ。所詮、星との交信さえできなければ<ruby>星騎士<rt>スターナイト</rt></ruby>など脅威ではない」"
translation = "「날개 꺾인 쉬파리 같군요. 결국, 별과의 교신조차 할 수 없다면 성기사 따위는 위협이 되지 않습니다」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「地震──」"
translation = "「지진──」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「れ──連絡！？\u3000こんな時に──」"
translation = "「여── 연락!? 이런 때에──」"

[[dialogue]]
speaker = "unk"
original = "突如発生した大地震。"
translation = "돌연 발생한 대지진."

[[dialogue]]
speaker = "unk"
original = "そして、両星徒会全員のＤＩＳＣから一斉に<ruby>緊急連絡通知<rt>エマージェンシーコール</rt></ruby>が鳴る。"
translation = "그리고, 양쪽 성도회 전원의 디스크에서 일제히 긴급 연락 통지가 울린다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──もしもし。こちら新星生徒会」"
translation = "「──여보세요. 여기는 신성 성도회」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "『新星学園学園長セイファート。これより緊急の通達を行う』"
translation = "『신성 학원 학원장 세이퍼트. 지금부터 긴급 통지를 하겠다』"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「し……新星の学園長さんです！」"
translation = "「시…… 신성 학원장님이세요!」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "『現在、世界各地で星力の制御が不能と化している。同時に大規模なアステラと地殻変動が発生し、抑えるのも困難な状態だ』"
translation = "『현재, 세계 각지에서 성력의 제어가 불능 상태가 되고 있다. 동시에 대규모 아스테라와 지각 변동이 발생하여, 억제하는 것도 곤란한 상태다』"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "『前例のない事態に被害は今も広がっている。本来であれば総員出動の場面だが、星術もままならない今そうもいかない』"
translation = "『전례 없는 사태에 피해는 지금도 확산되고 있다. 본래라면 총원 출동할 상황이지만, 성술도 제대로 쓸 수 없는 지금은 그럴 수도 없다』"

[[dialogue]]
speaker = "unk"
original = "応援かと淡い期待を抱いたがそんなことはなかった。"
translation = "응원일까 하고 헛된 기대를 품었지만 그런 일은 없었다."

[[dialogue]]
speaker = "unk"
original = "むしろ、この絶望がより広範囲に作用していることを告げられ……"
translation = "오히려, 이 절망이 더 광범위하게 작용하고 있음을 고지받고……"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "『ゆえに星騎士全員に告げる。即時に撤退し、身の安全を確保せよ。繰り返す、即時撤退しろ』"
translation = "『그러므로 성기사 전원에게 고한다. 즉시 철수하여, 몸의 안전을 확보하라. 반복한다, 즉시 철수하라』"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そんな……！」"
translation = "「그런……!」"

[[dialogue]]
speaker = "unk"
original = "無慈悲な撤退命令が下った。"
translation = "무자비한 철수 명령이 내려졌다."

[[dialogue]]
speaker = "unk"
original = "元凶が目の前にいるというのに、星騎士は<ruby>疾<rt>と</rt></ruby>く逃げろと。"
translation = "원흉이 눈앞에 있는데도, 성기사는 빨리 도망치라고."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "『この現象も一時的なものである可能性が高い。守護星との連絡が可能になるまで、待機せよ。これは命令だ』"
translation = "『이 현상도 일시적인 것일 가능성이 높다. 수호성과의 연락이 가능해질 때까지, 대기하라. 이것은 명령이다』"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「学園長──お待ちください、学園長！\u3000ここにその元凶が──」"
translation = "「학원장── 잠시만 기다려 주십시오, 학원장! 여기에 그 원흉이──」"

[[dialogue]]
speaker = "unk"
original = "訴えむなしく、ＤＩＳＣの通信は切れてしまう。"
translation = "호소도 허무하게, 디스크의 통신은 끊겨 버린다."

[[dialogue]]
speaker = "unk"
original = "そこに残されたのは……星の力を失った、ただの学生たちだけだった。"
translation = "그곳에 남겨진 것은…… 별의 힘을 잃은, 그저 학생들뿐이었다."

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「無駄な抵抗はやめるべきです。星の加護がなければあなた達などただの肉塊──無論、私も例外ではありませんがね」"
translation = "「쓸데없는 저항은 그만두어야 합니다. 별의 가호가 없다면 당신들 따위는 그저 고깃덩어리── 물론, 저도 예외는 아닙니다만」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……っ……！」"
translation = "「……윽……!」"

[[dialogue]]
speaker = "unk"
original = "アポロは世界を破壊するリクリエの使徒。"
translation = "아폴로는 세계를 파괴하는 리크리에의 사도."

[[dialogue]]
speaker = "unk"
original = "もし、あの、石版に描かれていたような破滅を体現できる存在とするなら──"
translation = "만약, 저, 석판에 그려져 있던 것과 같은 파멸을 구현할 수 있는 존재라고 한다면──"

[[dialogue]]
speaker = "unk"
original = "もはや人の手で敵う相手ではない。"
translation = "더 이상 인간의 힘으로 당해낼 상대가 아니다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロト……」"
translation = "「쿠로토……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……命令だ。仕方ない。撤退してくれ」"
translation = "「……명령이다. 어쩔 수 없어. 철수해 줘」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「でもっ……！\u3000このままじゃ、ホントにぜんぶ壊されちゃう──！」"
translation = "「하지만……! 이대로는, 정말로 전부 부서져 버려──!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「こうなったらどの道そうなる。だから、今すぐみんなを連れて逃げるんだ。これは会長命令だ！」"
translation = "「이렇게 되면 어차피 그렇게 돼. 그러니까, 지금 당장 모두를 데리고 도망쳐. 이건 회장 명령이다!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ちょっ……ちょっと待ってよ。緋宮くんはどうするの……？」"
translation = "「잠…… 잠깐만. 히노미야 군은 어떻게 할 건데……?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……残るつもりですか。会長」"
translation = "「……남을 생각이십니까. 회장」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「フフフ、自己犠牲ですか。なるほど確かに英雄らしくて反吐が出ますねぇ」"
translation = "「후후후, 자기희생입니까. 과연 확실히 영웅다워서 구역질이 나는군요」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「ですが、何ができるというのです！？\u3000どだい星術も使えない人間程度、アポロ様の前では肉の壁にすらなりやしませんよ！」"
translation = "「하지만, 무엇을 할 수 있다는 것입니까!? 애초에 성술도 쓸 수 없는 인간 정도, 아폴로님 앞에서는 고기 벽조차 되지 못합니다!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──ああ。確かに」"
translation = "「──아아. 확실히」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ただの人間なら──そうだろうな」"
translation = "「그냥 인간이라면── 그렇겠지」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「！？」"
translation = "「!?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「何──」"
translation = "「뭐──」"

[[dialogue]]
speaker = "unk"
original = "こちらへ落下してきた流れ星を──闇の拳撃で打ち払う。"
translation = "이쪽으로 낙하해 온 별똥별을── 어둠의 권격으로 쳐낸다."

[[dialogue]]
speaker = "unk"
original = "それは、先ほどまでとなんら遜色ない俺の全力だった。"
translation = "그것은, 조금 전까지와 전혀 다름없는 나의 전력이었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「残念ながら──緋宮クロトって星騎士は特別製らしくてな。カーテン一枚程度で止まる気はない」"
translation = "「유감스럽게도── 히노미야 쿠로토라는 성기사는 특별 제작인 것 같아서 말이야. 커튼 한 장 정도로 멈출 생각은 없어」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「どういうことです……？\u3000星との交信は、紛れもなく天蓋により遮断したはず──」"
translation = "「무슨 말씀이십니까……? 별과의 교신은, 틀림없이 천개에 의해 차단했을 터──」"

[[dialogue]]
speaker = "unk"
original = "今も夜空を覆い尽くす謎の<ruby>帳<rt>とばり</rt></ruby>。"
translation = "지금도 밤하늘을 뒤덮고 있는 수수께끼의 장막."

[[dialogue]]
speaker = "unk"
original = "あれの影響で、あらゆる星騎士がその力を失っているようだったが──俺だけは違う。"
translation = "저것의 영향으로, 모든 성기사가 그 힘을 잃고 있는 듯했지만── 나만은 다르다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「もしかして──会長は、そもそも空と交信しない……？」"
translation = "「혹시── 회장님은, 애초에 하늘과 교신하지 않는……?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「！\u3000そっか──緋宮くんの守護星は、地球だから──！」"
translation = "「! 그렇구나── 히노미야 군의 수호성은, 지구니까──!」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker = "unk"
original = "そう。"
translation = "그렇다."

[[dialogue]]
speaker = "unk"
original = "俺の守護星は地球──地を這いつくばるごとに、何度でもよみがえる不屈の加護。"
translation = "나의 수호성은 지구── 땅을 기어 다닐 때마다, 몇 번이고 되살아나는 불굴의 가호."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「地に足が着いている限り──俺は折れない。最後まで付き合ってもらうぞ、アポロ」"
translation = "「땅에 발이 닿아 있는 한── 나는 꺾이지 않아. 끝까지 상대해 줘야겠어, 아폴로」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「フン……最後までしぶといヤツだ」"
translation = "「흥…… 끝까지 끈질긴 녀석이군」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「だが、だとしても──それ以外の連中を狙うだけだ。消えろ」"
translation = "「하지만, 그렇다고 해도── 그 외의 녀석들을 노릴 뿐이다. 사라져라」"

[[dialogue]]
speaker_original = "エリシア"
speaker_translation = "엘리시아"
original = "「っっ──！」"
translation = "「윽윽──!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「止められません──桁違いの出力です──」"
translation = "「막을 수 없습니다── 차원이 다른 출력입니다──」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「っっ……！！」"
translation = "「윽윽……!!」"

[[dialogue]]
speaker = "unk"
original = "アポロを中心に地面へ亀裂が走っていく。"
translation = "아폴로를 중심으로 지면에 균열이 달려간다."

[[dialogue]]
speaker = "unk"
original = "どんなに応援を呼んだとて、人間でも魔族でも天使でも食い止めることは敵うまい。"
translation = "아무리 응원을 불렀다 한들, 인간이든 마족이든 천사든 막아내는 것은 불가능할 것이다."

[[dialogue]]
speaker = "unk"
original = "だから──"
translation = "그러니까──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「早く逃げろ、みんな──ここは俺が止める！\u3000何度も言わせるな──命令だ！」"
translation = "「빨리 도망쳐, 모두── 여기는 내가 막는다! 몇 번이나 말하게 하지 마── 명령이다!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「──クロトっ！？」"
translation = "「──쿠로토!?」"

[[dialogue]]
speaker_original = "エリシア"
speaker_translation = "엘리시아"
original = "「無茶です緋宮会長──ッ！」"
translation = "「무리예요 히노미야 회장──윽!」"

[[dialogue]]
speaker = "unk"
original = "たとえ俺の全力を尽くしたとしても──今のアポロに敵うはずがないことはわかっていた。"
translation = "설령 나의 전력을 다한다 해도── 지금의 아폴로를 당해낼 수 없을 것이라는 것은 알고 있었다."

[[dialogue]]
speaker = "unk"
original = "でも、だけど、もし０．００００１％でも彼女たちを活かせる可能性があるのなら向かわない手はない。"
translation = "하지만, 그렇지만, 만약 0.00001%라도 그녀들을 살릴 가능성이 있다면 맞서지 않을 이유가 없다."

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「──愚かな」"
translation = "「──어리석은」"

[[dialogue]]
speaker = "unk"
original = "アポロへ迫る。"
translation = "아폴로에게 다가선다."

[[dialogue]]
speaker = "unk"
original = "拳が届く。"
translation = "주먹이 닿는다."

[[dialogue]]
speaker = "unk"
original = "せめてこの一発が、一人でも多くの命を救えればいいと──"
translation = "적어도 이 한 방이, 한 명이라도 더 많은 생명을 구할 수 있기를──"

