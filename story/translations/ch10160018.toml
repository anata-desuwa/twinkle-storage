[[dialogue]]
speaker = "unk"
original = "ヒトリと晴れて恋人になって、しばらくが経ったある日のこと──"
translation = "히토리와 정식으로 연인이 되고, 얼마간의 시간이 흐른 어느 날──"

[[dialogue]]
speaker = "unk"
original = "俺はヒトリと、スキンシップに慣れる練習をしていた。"
translation = "나는 히토리와, 스킨십에 익숙해지는 연습을 하고 있었다."

[[dialogue]]
speaker = "ヒトリ"
original = "「ん……会長さんの手、優しくてドキドキします……」"
translation = "「응…… 회장님의 손, 상냥해서 두근거려요……」"

[[dialogue]]
speaker = "クロト"
original = "「頬を撫でるの、慣れてきた？」"
translation = "「뺨 어루만지는 거, 익숙해졌어?」"

[[dialogue]]
speaker = "ヒトリ"
original = "「はい……温かくて、気持ち良くて……安心します……」"
translation = "「네…… 따뜻하고, 기분 좋아서…… 안심돼요……」"

[[dialogue]]
speaker = "unk"
original = "ヒトリ曰く、恋人になったのだから、恥ずかしがって逃げたりしたくないとのことで──"
translation = "히토리 말로는, 연인이 되었으니까 부끄러워하며 도망치고 싶지 않다나 봐서──"

[[dialogue]]
speaker = "unk"
original = "手を繋ぐことから始めて、次に頭を撫でる。今は頬を撫でるところまでステップアップしていた。"
translation = "손을 잡는 것부터 시작해서, 다음은 머리를 쓰다듬기. 지금은 뺨을 어루만지는 단계까지 스텝 업 해 있었다."

[[dialogue]]
speaker = "ヒトリ"
original = "「はぁ……んん……会長さん……頬から顎へ撫でるの、気持ち良いです……んふぅ……」"
translation = "「하아…… 응…… 회장님…… 뺨에서 턱으로 쓰다듬는 거, 기분 좋아요…… 응후……」"

[[dialogue]]
speaker = "unk"
original = "ヒトリの色っぽい表情や声に、俺はついムラムラしてしまう。"
translation = "히토리의 색기 어린 표정과 목소리에, 나는 그만 성욕이 솟구치고 만다."

[[dialogue]]
speaker = "ヒトリ"
original = "「あ……会長さん、その……会長さんのアソコが、大きく……」"
translation = "「아…… 회장님, 그…… 회장님의 거기가, 커다랗게……」"

[[dialogue]]
speaker = "ヒトリ"
original = "「い、いえっ、謝らなくて大丈夫ですっ……むしろ、わたしでそんな風になってくれたのが、嬉しいというか……」"
translation = "「아, 아니요, 사과하지 않으셔도 괜찮아요…… 오히려, 저 때문에 그렇게 되어준 게, 기쁘다고나 할까……」"

[[dialogue]]
speaker = "ヒトリ"
original = "「あの……今日は、会長さんにお願いがあって……」"
translation = "「저기…… 오늘은, 회장님께 부탁이 있어서……」"

[[dialogue]]
speaker = "ヒトリ"
original = "「わたしの部屋に……来てもらえませんか？」"
translation = "「제 방에…… 와주시지 않겠나요?」"

[[dialogue]]
speaker = "ヒトリ"
original = "「……会長さんとしちゃう時、いつも恥ずかしがって逃げてばっかりで……迷惑かけてるなって思って……だ、だからその」"
translation = "「……회장님이랑 할 때, 항상 부끄러워하며 도망치기만 해서…… 폐를 끼치고 있다고 생각해서…… 그, 그래서 그게」"

[[dialogue]]
speaker = "ヒトリ"
original = "「──わ、わたしのこと、縛ってもらっていいでしょうかっ！？」"
translation = "「──저, 저를, 묶어주실 수 있을까요!?」"

[[dialogue]]
speaker = "クロト"
original = "「──このくらいで大丈夫？\u3000手首、痛くないか？」"
translation = "「──이 정도면 괜찮아? 손목, 아프지 않아?」"

[[dialogue]]
speaker = "ヒトリ"
original = "「はい。優しくしてくれて、ありがとうございます……」"
translation = "「네. 상냥하게 대해주셔서, 감사합니다……」"

[[dialogue]]
speaker = "ヒトリ"
original = "「はぁ、ん……会長さんに、恥ずかしいところ、見られちゃってる……っ」"
translation = "「하아, 응…… 회장님한테, 부끄러운 모습, 보여지고 있어……윽」"

[[dialogue]]
speaker = "unk"
original = "恥ずかしくなっても逃げられないように、手首を縛って欲しい──"
translation = "부끄러워져도 도망칠 수 없도록, 손목을 묶어주길 바란다──"

[[dialogue]]
speaker = "unk"
original = "それが、俺とエッチする為にヒトリが提案した方法だった。"
translation = "그것이, 나와 섹스하기 위해 히토리가 제안한 방법이었다."

[[dialogue]]
speaker = "ヒトリ"
original = "「か、会長さんのおち○ちん……想像よりも凄いです……はぁぁ……大きくて、逞しくて、反り返ってて……男の人の濃い匂いがします……ふぅぅ……」"
translation = "「회, 회장님의 자지…… 상상보다 굉장해요…… 하아아…… 크고, 늠름하고, 휘어져 있어서…… 남자의 진한 냄새가 나요…… 후우우……」"

[[dialogue]]
speaker = "ヒトリ"
original = "「あ……か、顔が近いです……ひ、ひょっとして……キスしちゃうんですか？」"
translation = "「아…… 어, 얼굴이 가까워요…… 호, 혹시…… 키스하시는 건가요?」"

[[dialogue]]
speaker = "ヒトリ"
original = "「んあっ、会長さん……ちゅっ、んちゅっ……んはぁっ……！」"
translation = "「응앗, 회장님…… 츄, 웁…… 응하앗……!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「会長さんとついに、初めてのキス、しちゃいました……凄く、てぇてぇ、です……」"
translation = "「회장님이랑 드디어, 첫 키스, 해버렸어요…… 너무, 귀여워요……」"

[[dialogue]]
speaker = "ヒトリ"
original = "「んっ、もう１回しちゃうんですか？\u3000……んちゅっ、ちゅっ、ちゅうっ<emoji=heart04>\u3000んんっ、キス凄い<emoji=heart04>\u3000幸せで、頭がふわふわして来ちゃいます……んちゅっ<emoji=heart04>」"
translation = "「응, 한 번 더 하시는 건가요? ……웁, 츄, 츄우<emoji=heart04> 응응, 키스 굉장해<emoji=heart04> 행복해서, 머리가 둥실둥실해져 버려요…… 츄웁<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
original = "「あっ、舌が入って……ふあぁっ、これ凄いぃ<emoji=heart04>\u3000ちゅっ、ちゅぷっ、んちゅる……頭とろけちゃう……ちゅむっ、ちゅぷるっ、ちゅぅ<emoji=heart04>」"
translation = "「앗, 혀가 들어와서…… 후아앗, 이거 굉장해애<emoji=heart04> 츄, 츄릅, 응츄루…… 머리가 녹아버려…… 츄웁, 츄르릅, 츄우<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
original = "「舌絡めるの気持ちいい……ちゅっ、ちゅぷぷっ、んちゅるっ<emoji=heart04>\u3000キス、好きになっちゃいますぅ……んちゅぅ、ちゅむっ、ちゅぷぅ<emoji=heart04>」"
translation = "「혀 섞는 거 기분 좋아…… 츄, 츄릅, 응츄루<emoji=heart04> 키스, 좋아하게 되어버려요…… 응츄우, 츄웁, 츄푸우<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
original = "「んんっ！？\u3000ぷはぁっ……か、会長さんのおち○ちん、当たってますぅ、ん、はぁ……！\u3000愛液で凄いことになっちゃってるの、恥ずかしい……んあぁんっ<emoji=heart04>」"
translation = "「응응!? 푸하앗…… 회, 회장님의 자지, 닿고 있어요, 응, 하아……! 애액으로 굉장한 상태가 된 거, 부끄러워…… 응아앙<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
original = "「はぁぁっ……んんっ、会長さんのぉ、熱くて固くてぇ……ふぅぅっ……擦られるだけで、興奮してきちゃいますぅ……んぅっ、あっ、そこ……ふあぁぁっ<emoji=heart04>」"
translation = "「하아아앗…… 응응, 회장님의 거, 뜨겁고 딱딱해서어…… 후우우웃…… 비벼지는 것만으로, 흥분되어 버려요…… 응윽, 앗, 거기…… 후아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
original = "「さ、先っぽがクリに当たってぇ……んっ、んふぅっ、はぁんっ……だ、ダメぇ、そこは敏感なのぉ……あっ、んっ、感じちゃうぅ……はぁっ、んんっ、んあぁっ<emoji=heart04>」"
translation = "「끄, 끝부분이 클리에 닿아서어…… 응, 응후윽, 하앙…… 아, 안 돼애, 거기는 민감한걸요오…… 앗, 응, 느껴버려어…… 하앗, 응응, 응아앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ヒトリ……俺、もう……」"
translation = "「히토리…… 나, 이제……」"

[[dialogue]]
speaker = "ヒトリ"
original = "「は、はい……ふぅぅ、その、わ、わたしの、お、おま○こ……っ、愛液でぬるぬるになっちゃってるので……も、もう大丈夫だと思います……」"
translation = "「네, 네…… 후우우, 그게, 제, 보, 보지……윽, 애액으로 미끌미끌해져 버렸으니까…… 이, 이제 괜찮을 거라 생각해요……」"

[[dialogue]]
speaker = "ヒトリ"
original = "「あっ、おち○ちんがショーツの裏側にぃ……ふあぁぁっ<emoji=heart04>」"
translation = "「앗, 자지가 팬티 안쪽에에…… 후아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
original = "「き、来ちゃうぅ……んうぅっ、先っぽで入り口、押し広げられてぇ……はぁ、はぁっ……会長さんが、本当にわたしの中に入って……ああぁ──<emoji=heart04>」"
translation = "「오, 온다아…… 응우윽, 끝부분으로 입구, 벌려져서어…… 하아, 하앗…… 회장님이, 정말로 제 안에 들어와서…… 아아아──<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はヒトリの処女膜の奥へ、ペニスを突き入れた。"
translation = "나는 히토리의 처녀막 안쪽으로, 페니스를 찔러 넣었다."

[[dialogue]]
speaker = "ヒトリ"
original = "「んっ────ふあああぁぁぁああああああ～～～～っっ<emoji=heart04>！！」"
translation = "「응윽────후아아아아아아아아아아아아아아～～～～앗앗<emoji=heart04>!!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「はぁっ、はぁっ……会長さんの、入ったぁ……んっ<emoji=heart04>\u3000んんっ……大きくて、熱くて凄いぃ……っ<emoji=heart04>」"
translation = "「하앗, 하앗…… 회장님의 거, 들어왔다아…… 응<emoji=heart04> 응응…… 크고, 뜨거워서 굉장해애……윽<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
original = "「は、はい、ちょっと痛みはあります、けど……でも、大丈夫です。それ以上に、なんだか幸せな気持ちで……会長さんとこうして、繋がれたのが嬉しいな、なんて……えへへ」"
translation = "「네, 네, 조금 통증은 있어요, 하지만…… 그래도, 괜찮아요. 그 이상으로, 왠지 행복한 기분이라…… 회장님이랑 이렇게, 이어질 수 있어서 기쁘네, 라니…… 에헤헤」"

[[dialogue]]
speaker = "ヒトリ"
original = "「んんっ！？\u3000ちゅっ、んちゅっ、またキスぅ……ちゅうっ、ちゅぶっ、ちゅぱっ……ちゅむっ、ちゅぷるっ、ちゅぶぶっ……<emoji=heart04>」"
translation = "「응응!? 츄, 웁, 또 키스으…… 츄우, 츄웁, 츄파…… 츄웁, 츄르릅, 츄부부……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
original = "「会長さんの舌、気持ちいい……ちゅっ、ちゅぷぷっ、んちゅう……んっ、好きです……ちゅぷっ、ちゅむむっ、ちゅぱっ……会長さん、好き……<emoji=heart04>」"
translation = "「회장님의 혀, 기분 좋아…… 츄, 츄릅, 응츄우…… 응, 좋아해요…… 츄웁, 츄무무, 츄파…… 회장님, 좋아……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
original = "「んあぁっ、キスでおま○こ、キュンってなってぇ……<emoji=heart04>\u3000ちゅむっ、ちゅぷっ、ちゅるっ……初めてなのに、気持ちよくなって来ちゃう……ちゅぱぁっ、はぁっ、んうぅっ……」"
translation = "「응아앗, 키스로 보지, 큥 해버려서어……<emoji=heart04> 츄웁, 츄웁, 츄루…… 처음인데, 기분 좋아져 버려…… 츄파앗, 하앗, 응우윽……」"

[[dialogue]]
speaker = "ヒトリ"
original = "「会長さん……わたし、大丈夫です……お、おま○こ、キスのおかげでおち○ちんに慣れてきたので……も、もしよかったら……」"
translation = "「회장님…… 저, 괜찮아요…… 보, 보지, 키스 덕분에 자지에 익숙해졌으니까…… 호, 혹시 괜찮으시다면……」"

[[dialogue]]
speaker = "ヒトリ"
original = "「──は、はい。その……よろしくお願いします……」"
translation = "「──네, 네. 그게…… 잘 부탁드립니다……」"

[[dialogue]]
speaker = "ヒトリ"
original = "「んっ……ふあぁぁぁぁぁぁぁっ<emoji=heart04><emoji=heart04><emoji=heart04>！」"
translation = "「응…… 후아아아아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04>!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「んうぅ、はぁんっ……ふあぁっ、おち○ちん、中で擦れてぇ……<emoji=heart04>\u3000はぁっ、んんっ……ぬぽぬぽ気持ちいいっ、あぁんっ<emoji=heart04>\u3000んっ、んあぁっ……あぁんっ、凄いのぉっ<emoji=heart04>」"
translation = "「응우, 하앙…… 후아앗, 자지, 안에서 비벼져서어……<emoji=heart04> 하앗, 응응…… 질퍽질퍽 기분 좋아, 아앙<emoji=heart04> 응, 응아앗…… 아앙, 굉장해애<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
original = "「せ、セックス、こんな気持ちいいなんてぇ……あんっ、ふあぁんっ<emoji=heart04>\u3000んうっ、わたし、初めてなのにぃ<emoji=heart04>\u3000あっ、んっ、はぁんっ……ふぅ、ふぅっ……んあぁぁっ<emoji=heart04>」"
translation = "「세, 섹스, 이렇게 기분 좋다니이…… 앙, 후아앙<emoji=heart04> 응윽, 저, 처음인데에<emoji=heart04> 앗, 응, 하앙…… 후우, 후우…… 응아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
original = "「そ、そこ気持ちいいですぅ……ふあぁっ<emoji=heart04>\u3000んあぁんっ<emoji=heart04>\u3000その上のところぉ、ふぅ、ふぅぅっ<emoji=heart04>\u3000カリで撫でられると、気持ちよくて、愛液溢れちゃうぅ……ふあぁぁっ<emoji=heart04><emoji=heart04>」"
translation = "「거, 거기 기분 좋아요오…… 후아앗<emoji=heart04> 응아앙<emoji=heart04> 그 위쪽이이, 후우, 후우우우<emoji=heart04> 귀두로 쓰다듬어지면, 기분 좋아서, 애액 넘쳐버려어…… 후아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
original = "「あっ、か、会長さん……いきなりおっぱい触っちゃ、ダメですぅ……んはぁっ、あぁんっ<emoji=heart04>\u3000は、恥ずかしいのぉ……ふぅぅっ、はぁんっ……<emoji=heart04>」"
translation = "「앗, 회, 회장님…… 갑자기 가슴 만지면, 안 돼요오…… 응하앗, 아앙<emoji=heart04> 부, 부끄러운걸요오…… 후우우, 하앙……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
original = "「会長さんの手が優しくて、感じちゃう……んふぅ、ふあぁっ……おま○こキュンキュンして、もっと気持ちよくなっちゃいますぅ……<emoji=heart04>\u3000はぁっ、んんっ……ふあぁぁんっ<emoji=heart04>」"
translation = "「회장님의 손이 상냥해서, 느껴버려…… 응후, 후아앗…… 보지 큥큥거려서, 더 기분 좋아져 버려요……<emoji=heart04> 하앗, 응응…… 후아아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
original = "「あっ、あっ、乳首ダメぇ……<emoji=heart04>\u3000クリクリするの気持ちいいっ、んあぁっ……乳首とおま○こ同時に擦られるの、凄いのぉっ。ふひぃっ……ふぅぅ、ひぃぃんっ……<emoji=heart04>！」"
translation = "「앗, 앗, 유두 안 돼애……<emoji=heart04> 굴리는 거 기분 좋아, 응아앗…… 유두랑 보지 동시에 비벼지는 거, 굉장해애. 후히익…… 후우우, 히이이잉……<emoji=heart04>!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「お、おま○こ、勝手におち○ちんに絡みついちゃいますぅ<emoji=heart04>\u3000んうぅっ、はあぁんっ……会長さんのおち○ちんも、また大きくなって……ふぅぅっ、んあぁっ<emoji=heart04>」"
translation = "「보, 보지가, 멋대로 자지에 휘감겨버려요오<emoji=heart04> 응우윽, 하아앙…… 회장님의 자지도, 또 커져서…… 후우우, 응아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
original = "「会長さんも、気持ちいいですか？\u3000はぁぁ、あぁんっ……そ、そうなんですね。嬉しいですっ……ふぅぅ、あっ、はあぁんっ<emoji=heart04>」"
translation = "「회장님도, 기분 좋으신가요? 하아아, 아앙…… 그, 그렇군요. 기뻐요…… 후우우, 앗, 하아앙<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
original = "「も、もっと動いて大丈夫ですから……はぁっ、はぁっ、ふあぁっ……わたしで、いっぱい気持ちよく、なって下さい……ふぅ、ふぅっ……んあぁぁぁっ<emoji=heart04>！」"
translation = "「더, 더 움직이셔도 괜찮으니까…… 하앗, 하앗, 후아앗…… 저로, 잔뜩 기분 좋아져, 주세요…… 후우, 후우…… 응아아아앗<emoji=heart04>!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「あっ、はぁんっ、ふあぁっ<emoji=heart04>\u3000おち○ちん、一番奥まで来てますぅ……ふぅっ、うぅんっ、はぁぁっ<emoji=heart04>\u3000奥も、気持ちいいのぉ……あぁんっ、はぁぁっ、んあぁぁんっ<emoji=heart04>」"
translation = "「앗, 하앙, 후아앗<emoji=heart04> 자지, 가장 안쪽까지 오고 있어요…… 후우, 우응, 하아아앗<emoji=heart04> 안쪽도, 기분 좋아아…… 아앙, 하아아, 응아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
original = "「子宮口とおち○ちん、キスしちゃってます<emoji=heart04>\u3000ふっ、ふぅっ、はぁんっ！\u3000奥でちゅっちゅってするたび、ドキドキして……あっ、んあぁっ、ふあぁぁんっ<emoji=heart04>！」"
translation = "「자궁구랑 자지가, 키스하고 있어요<emoji=heart04> 훗, 후우, 하앙! 안쪽에서 쪽쪽거릴 때마다, 두근거려서…… 앗, 응아앗, 후아아아앙<emoji=heart04>!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「はあぁんっ、んうっ、ふあぁんっ<emoji=heart04>\u3000おま○こに、おち○ちんキス、凄いっ……はぁっ、ふぅぅっ、んあぁぁっ<emoji=heart04>\u3000凄くいいのぉっ……あっ、んふぅっ、ふあぁぁんっ<emoji=heart04>」"
translation = "「하아앙, 응윽, 후아앙<emoji=heart04> 보지에, 자지 키스, 굉장해…… 하앗, 후우우, 응아아앗<emoji=heart04> 너무 좋아아…… 앗, 응후, 후아아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
original = "「か、会長さん、お口でもぉ……はぁっ、はぁんっ<emoji=heart04>\u3000お口でもキスしたいです……ふっ、ふうぅっ、あぁんっ！」"
translation = "「회, 회장님, 입으로도오…… 하앗, 하앙<emoji=heart04> 입으로도 키스하고 싶어요…… 훗, 후우우, 아앙!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「あっ、来たぁ……んちゅうっ、ちゅっ、ちゅむるっ……<emoji=heart04>」"
translation = "「앗, 왔다아…… 응츄우, 츄, 츄무루……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ヒトリ、もしかして、キスするの気に入った……？」"
translation = "「히토리, 혹시, 키스하는 거 마음에 들었어……?」"

[[dialogue]]
speaker = "ヒトリ"
original = "「ちゅぱっ……ふぁい、キスしゅきっ<emoji=heart04>\u3000むちゅっ、ちゅうっ、ちゅぱぁっ……しゅきですっ<emoji=heart04>\u3000ちゅむっ、ちゅぷるっ、んちゅうっ……ぷちゅっ、ちゅれろ、ちゅぱぁっ<emoji=heart04>」"
translation = "「츄파…… 하이, 키슈 죠아<emoji=heart04> 웁, 츄우, 츄파앗…… 죠아해요오<emoji=heart04> 츄웁, 츄르릅, 응츄우…… 푸츄, 츄레로, 츄파앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「じゃあ、これからはキス、いっぱいしようか」"
translation = "「그럼, 이제부터 키스, 잔뜩 할까」"

[[dialogue]]
speaker = "ヒトリ"
original = "「んっ……ふ、ふぁい……<emoji=heart04>\u3000ちゅっ、ちゅむっ、んちゅるっ……んはぁ……は、はい、会長さんといっぱい、キスしたいでしゅ<emoji=heart04>\u3000で、でもぉっ……」"
translation = "「응…… 하, 하이……<emoji=heart04> 츄, 츄웁, 응츄루…… 응하아…… 하, 하이, 회장님이랑 잔뜩, 키스하고 싶어효<emoji=heart04> 하, 하지만요오……」"

[[dialogue]]
speaker = "ヒトリ"
original = "「ちゅぷっ、んちゅっ、ぷはぁっ……出来ればその、キスだけじゃなくてぇっ……<emoji=heart04>」"
translation = "「츄웁, 응츄, 푸하앗…… 가능하면 그게, 키스뿐만이 아니라아……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
original = "「これからは、セックスもいっぱい……したい、です<emoji=heart04>」"
translation = "「이제부터는, 섹스도 잔뜩…… 하고 싶어, 요<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「っ……ヒトリッ！」"
translation = "「윽…… 히토리!」"

[[dialogue]]
speaker = "unk"
original = "俺はその言葉に興奮し、ピストンを激しくした。"
translation = "나는 그 말에 흥분하여, 피스톤을 격렬하게 했다."

[[dialogue]]
speaker = "ヒトリ"
original = "「ふあああぁぁぁああああああ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000か、会長さん、激しいぃっ！\u3000あっ、あっ、んあぁぁぁっ！\u3000奥、奥凄いのぉっ<emoji=heart04>\u3000はぁっ、んうぅっ、はあぁぁんっ！」"
translation = "「후아아아아아아아아아아아아아아～～～앗<emoji=heart04><emoji=heart04><emoji=heart04> 회, 회장님, 격렬해애! 앗, 앗, 응아아아앗! 안쪽, 안쪽 굉장해애<emoji=heart04> 하앗, 응우윽, 하아아앙!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「んあぁっ、奥っ、奥にキスされるの気持ちいいですっ<emoji=heart04>\u3000あっ、はぁっ、んあぁぁんっ！\u3000激しく求められるの、嬉しいですっ……あっ、はぁっ、ふあぁぁんっ<emoji=heart04>」"
translation = "「응아앗, 안쪽, 안쪽에 키스 받는 거 기분 좋아요오<emoji=heart04> 앗, 하앗, 응아아앙! 격렬하게 원해지는 거, 기뻐요…… 앗, 하앗, 후아아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
original = "「わたしのおま○こ、おち○ちんキスでっ、メロメロになっちゃぅっ<emoji=heart04>\u3000あっ、あっ、んあぁぁんっ！\u3000子宮まで、喜んじゃってますぅ<emoji=heart04>\u3000はっ、はっ、ふあぁぁんっ！」"
translation = "「제 보지, 자지 키스로오, 헤롱헤롱하게 되어버렷<emoji=heart04> 앗, 앗, 응아아앙! 자궁까지, 기뻐하고 있어요오<emoji=heart04> 하앗, 하앗, 후아아아앙!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「好きっ、好きぃっ<emoji=heart04>\u3000大好きですぅ<emoji=heart04>\u3000ちゅっ、んちゅっ、ちゅうっ<emoji=heart04>\u3000上も下も、もっとキスぅ……ちゅっ、ちゅぶぶっ、んちゅるっ<emoji=heart04>\u3000ちゅぶっ、ちゅばっ、むちゅるっ<emoji=heart04>」"
translation = "「좋아, 좋아아<emoji=heart04> 정말 좋아해요오<emoji=heart04> 츄, 응츄, 츄우<emoji=heart04> 위도 아래도, 더 키스으…… 츄, 츄부부, 응츄루<emoji=heart04> 츄웁, 츄바, 웁츄루<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
original = "「んぶぅっ、ちゅぱっ、ぷはぁっ<emoji=heart04>\u3000あっ、あっ、そこぉ！\u3000ふうぅっ、んあっ、はあぁぁんっ！\u3000いいっ、気持ちいいですっ、あぁんっ<emoji=heart04>\u3000はっ、はっ、ふあぁぁんっ<emoji=heart04>」"
translation = "「응부웃, 츄파, 푸하앗<emoji=heart04> 앗, 앗, 거기이! 후우우, 응앗, 하아아앙! 좋아, 기분 좋아요, 아앙<emoji=heart04> 하앗, 하앗, 후아아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
original = "「あっ、お、おち○ちん、まだ大きくっ<emoji=heart04>\u3000はぁんっ、んあっ、ふあぁんっ！\u3000おち○ちんがごりごりってして、凄いのぉっ<emoji=heart04>\u3000はっ、はぁんっ、んあぁぁんっ<emoji=heart04>」"
translation = "「앗, 자, 자지, 아직 더 커져엇<emoji=heart04> 하앙, 응앗, 후아앙! 자지가 고리고리거려서, 굉장해애<emoji=heart04> 하앗, 하앙, 응아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
original = "「出そう、なんですかっ？\u3000わたしも、もうっ、はあぁんっ<emoji=heart04>\u3000おま○こに気持ちいいのが、集まってきて……っ！\u3000ふっ、ふぅぅっ、あぁぁんっ<emoji=heart04>」"
translation = "「나올 것, 같나요? 저도, 이제, 하아앙<emoji=heart04> 보지에 기분 좋은 게, 모여들어서……! 훗, 후우우, 아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
original = "「い、一緒にっ……はぁっ、ふぅっ、んあぁっ！\u3000一緒にイキたいですっ<emoji=heart04>\u3000ひとりだと怖いからっ……あっ、あっ、ふあぁぁんっ<emoji=heart04>」"
translation = "「가, 같이이…… 하앗, 후우, 응아앗! 같이 가고 싶어요오<emoji=heart04> 혼자면 무서우니까…… 앗, 앗, 후아아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
original = "「あっ、あっ、きたっ<emoji=heart04>\u3000わ、わたしも気持ちいいの、きちゃいますっ<emoji=heart04>\u3000ふっ、ふぅっ、んあぁぁっ<emoji=heart04>」"
translation = "「앗, 앗, 왔다아<emoji=heart04> 저, 저도 기분 좋은 거, 와버려요오<emoji=heart04> 훗, 후우, 응아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
original = "「おち○ちんも、膨らんでっ<emoji=heart04>\u3000あっ、ふぁっ、はぁんっ<emoji=heart04>\u3000んっい、はあっ、はああぁんっ<emoji=heart04>」"
translation = "「자지도, 부풀어서어<emoji=heart04> 앗, 하앗, 하앙<emoji=heart04> 응이, 하앗, 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
original = "「出してっ<emoji=heart04>\u3000射精してくださいっ<emoji=heart04>\u3000わたしの中にっ、気持ちよくなった証、いっぱい注いでぇっ<emoji=heart04>\u3000はっ、はっ、ふあぁぁぁっ<emoji=heart04>」"
translation = "「내보내 줘엇<emoji=heart04> 사정해 주세요오<emoji=heart04> 제 안에에, 기분 좋아진 증거, 잔뜩 쏟아줘어어<emoji=heart04> 하앗, 하앗, 후아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
original = "「来る、くるくるっ<emoji=heart04>\u3000キちゃいますっ<emoji=heart04>\u3000イっちゃう<emoji=heart04>\u3000あっ、あっあっあっ、イク、いくいくいく──」"
translation = "「온다, 온다온다아<emoji=heart04> 와버려요오<emoji=heart04> 가버려어<emoji=heart04> 앗, 앗앗앗, 가, 가가각──」"

[[dialogue]]
speaker = "ヒトリ"
original = "「っ……ふあああああああああっ<emoji=heart04><emoji=heart04>\u3000イ、クぅぅぅ────────―っっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「윽…… 후아아아아아아아아아앗<emoji=heart04><emoji=heart04> 가, 가아아아아────────―앗앗앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
original = "「はああぁっ<emoji=heart04>\u3000会長さん、好きっ<emoji=heart04>\u3000わたしも好きですぅ……<emoji=heart04>」"
translation = "「하아아앗<emoji=heart04> 회장님, 좋아<emoji=heart04> 저도 좋아해요……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
original = "「んうぅっ……<emoji=heart04>\u3000凄いぃ……会長さんの精液、まだ出てるぅ……<emoji=heart04>」"
translation = "「응우윽……<emoji=heart04> 굉장해…… 회장님의 정액, 아직 나오고 있어……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
original = "「はぁぁ……子宮いっぱいに注がれて、幸せですぅ……<emoji=heart04>」"
translation = "「하아아…… 자궁 가득 쏟아져서, 행복해요……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
original = "「あっ……おち○ちん、抜けちゃ……はぁんっ<emoji=heart04>」"
translation = "「앗…… 자지, 빠져버려…… 하앙<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
original = "「んふぅ……<emoji=heart04>\u3000会長さんの精液、入りきらなくて出てきちゃいます……<emoji=heart04>」"
translation = "「응후……<emoji=heart04> 회장님의 정액, 다 안 들어가서 새어 나와 버려요……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
original = "「あ……会長さん……？」"
translation = "「아…… 회장님……?」"

[[dialogue]]
speaker = "unk"
original = "俺はヒトリの頭を優しく撫でる。"
translation = "나는 히토리의 머리를 상냥하게 쓰다듬는다."

[[dialogue]]
speaker = "クロト"
original = "「初めてのエッチ、よく頑張ったな」"
translation = "「첫 섹스, 잘 참았네」"

[[dialogue]]
speaker = "ヒトリ"
original = "「ん……<emoji=heart04>\u3000はい<emoji=heart04>\u3000わたし、頑張りました<emoji=heart04>\u3000会長さんが気持ちよくなってくれたのなら嬉しいです……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 네<emoji=heart04> 저, 열심히 했어요<emoji=heart04> 회장님이 기분 좋아지셨다면 기뻐요……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
original = "「その……こ、これからはもっと頑張りたいというか……こういうことしても、逃げないようにしたいので……」"
translation = "「그게…… 이, 이제부터는 더 열심히 하고 싶다고나 할까…… 이런 일을 해도, 도망치지 않게 되고 싶으니까……」"

[[dialogue]]
speaker = "unk"
original = "そう口にするヒトリは、太ももをもじもじと擦り合わせていて──"
translation = "그렇게 말하는 히토리는, 허벅지를 꼼지락거리며 비벼대고 있었고──"

[[dialogue]]
speaker = "ヒトリ"
original = "「今日はまだ、練習をしたいなって……<emoji=heart04>」"
translation = "「오늘은 아직, 연습을 하고 싶네에……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「っ……ヒトリ！」"
translation = "「윽…… 히토리!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「あっ……凄いっ、会長さんのすぐに大きくなって……<emoji=heart04>\u3000あんっ<emoji=heart04>」"
translation = "「앗…… 굉장해, 회장님의 거 금방 커져서……<emoji=heart04> 앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その日は夜遅くなるまで、何度も繰り返しお互いを求め続けてしまうのだった。"
translation = "그날은 밤늦게까지, 몇 번이고 반복해서 서로를 계속 원하고 말았다."

