[[dialogue]]
speaker = "エルデリーゼ"
original = "「さぁ、着きましたわよ会長様。今宵はこちらで私と『でえと』いたしましょう！」"
translation = "「자, 도착했습니다, 회장님. 오늘 밤은 이곳에서 저와 『데이트』를 합시다!」"

[[dialogue]]
speaker = "クロト"
original = "「ここって……」"
translation = "「여기는……」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「お察しの通り『らぶほてる』ですわ」"
translation = "「짐작하신 대로 『러브호텔』입니다.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「なんでも想い人同士が愛を育むための施設なのでしょう？\u3000相思相愛の私たちにぴったりではありませんか」"
translation = "「뭐든지 서로 사랑하는 사람들이 사랑을 키우기 위한 시설이겠지요? 상사상애인 저희에게 딱 맞지 않습니까.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「それに、ふふふ。一度で良いから、会長様と深夜の逢い引きというものをしてみたかったのですの！」"
translation = "「게다가, 후후후. 한 번이라도 좋으니, 회장님과 심야의 밀회라는 것을 해보고 싶었습니다!」"

[[dialogue]]
speaker = "unk"
original = "どうやらそっちが本音らしい。相変わらずこっそり寮を抜け出して夜遊びするのが好きみたいだ。"
translation = "아무래도 그쪽이 본심인 듯하다. 여전히 몰래 기숙사를 빠져나와 밤놀이하는 것을 좋아하는 것 같다."

[[dialogue]]
speaker = "unk"
original = "とはいえ──"
translation = "그렇다고 해도──"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「こ、ここならアムとも絶対に出くわしませんし、二人きりでゆっくり過ごすことができます」"
translation = "「여, 여기라면 아무와도 절대 마주치지 않고, 둘이서 느긋하게 보낼 수 있습니다.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「前は『でえと』中に出くわして、ろくにイチャイチャすることもできませんでしたから……」"
translation = "「전에는 『데이트』 중에 마주쳐서, 제대로 애정 행각을 벌일 수도 없었으니까요……」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「なのであなた様さえ良ければ、その……」"
translation = "「그러니 당신께서 괜찮으시다면, 그……」"

[[dialogue]]
speaker = "クロト"
original = "「いいよ。入ろうか」"
translation = "「좋아. 들어갈까.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「っっ。か、感謝いたしますわ！」"
translation = "「윽. 가, 감사합니다!」"

[[dialogue]]
speaker = "unk"
original = "一緒にイチャつきたくてエルデリーゼが計画してくれたのだと思うと途端に嬉しくなる。こうも笑顔で喜ばれると尚更だ。"
translation = "함께 애정 행각을 벌이고 싶어서 엘데리제가 계획해 준 것이라고 생각하니 갑자기 기뻐진다. 이렇게 웃는 얼굴로 기뻐하니 더욱 그렇다."

[[dialogue]]
speaker = "unk"
original = "それにラブホへ連れてこられたということは──"
translation = "게다가 러브호텔로 끌고 왔다는 것은──"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「あ……！\u3000ふ、ふしだらなお顔をされないでくださいませ……！」"
translation = "「아……! 흐, 흐트러진 표정을 짓지 말아주세요……!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「今宵はそのようなことをするつもりでお呼びしたわけではありませんからねっ？\u3000あ、あくまで二人きりで過ごすためであって……！」"
translation = "「오늘 밤은 그런 짓을 할 생각으로 부른 것이 아니니까요! 아, 어디까지나 둘이서 보내기 위해서이지……!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「のーたっち、のーせっくす、ですわよ……！」"
translation = "「노 터치, 노 섹스, 입니다!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「──あ、あれほど忠告いたしましたのに」"
translation = "「──아, 그렇게나 충고를 했는데도」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「どうして、はぁはぁ、こうなっていますのっ！」"
translation = "「어째서, 하아하아, 이렇게 되고 있는 겁니까!」"

[[dialogue]]
speaker = "クロト"
original = "「エルデリーゼがこれ見よがしにシャワーを浴びに行くから」"
translation = "「엘데리제가 보란 듯이 샤워를 하러 가니까.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「わ、私はこういうことを期待して浴室へ向かったわけでは……！\u3000ただ汗を流そうと思っただけで……！」"
translation = "「저, 저는 이런 것을 기대하고 욕실로 향한 것이 아닙니다……! 그저 땀을 씻어내려고 했을 뿐인데……!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ひとまず下ろしてくださいませ……！\u3000まだ身も清め終えていませんから……！」"
translation = "「일단 내려주세요……! 아직 몸도 다 씻지 못했으니까요……!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「そ、そのあとでしたら、いくらでも──ひゃっ！？」"
translation = "「그, 그 후라면, 얼마든지── 힉!?」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ちょっ、あっ……！\u3000な、何を擦り付けてきているのです……！\u3000あぁ、やめっ、くんくんしないで……！」"
translation = "「잠깐, 앗……! 무, 무엇을 비벼 대는 겁니까……! 아아, 그만, 킁킁거리지 마세요……!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「恥ずかしっ、せめて汗を流してから……！\u3000はぁはぁっ、今夜はまだお風呂にも入っていませんので……！」"
translation = "「부끄러워, 하다못해 땀이라도 씻어내고……! 하아하아, 오늘 밤은 아직 목욕도 하지 않았으니까요……!」"

[[dialogue]]
speaker = "unk"
original = "腕の中でジタバタと暴れるエルデリーゼを抱き寄せながら、髪や首筋にぐっと鼻を近づける。"
translation = "팔 안에서 버둥거리는 엘데리제를 끌어안으며, 머리카락이나 목덜미에 꾹 코를 갖다 댄다."

[[dialogue]]
speaker = "unk"
original = "ああ、この幼さが残る肢体や蕾のような匂いが堪らなくて──"
translation = "아아, 이 앳된 모습이 남은 육체와 봉오리 같은 냄새가 참을 수 없어서──"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「も、もうっ。あなた様はいつもいつも何に興奮なされているのですかっ……！」"
translation = "「모, 정말. 당신은 언제나 무엇에 흥분하고 계신 겁니까……!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「自分で言うのもなんですが、少しおかしいですわ……！\u3000私の体や匂いに欲情されるなんて……！」"
translation = "「제가 말하기는 뭐하지만, 조금 이상합니다……! 제 몸이나 냄새에 욕정하시다니……!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「私は、その、周囲の方々と比べて発育も悪いですし……。魅力的な体をしているとは、とても言えなくて……」"
translation = "「저는, 그, 주위 분들과 비교해서 발육도 나쁘고요……. 매력적인 몸을 하고 있다고는, 도저히 말할 수 없어서……」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「なのにあなた様と言えば、はぁはぁ、でえとする度いつもこうして求めてきて……！」"
translation = "「그런데도 당신께서는, 하아하아, 데이트할 때마다 항상 이렇게 원하고……!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「も、もしかして、そういうご趣味がありますのっ……？\u3000世間的に、そのっ、お、お変態と言われるような……！」"
translation = "「호, 혹시, 그런 취미가 있으신 겁니까……? 세상적으로, 그, 흐, 변태라고 불리는 듯한……!」"

[[dialogue]]
speaker = "unk"
original = "そう尋ねられると……。"
translation = "그렇게 질문받으니……."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ひゃっ……！\u3000ビ、ビクンってして……！？」"
translation = "「힉……! 바, 발딱 서서……!?」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「あうぅ、ほ、本当にお変態でしたのね。まぁ、その……。こんな粗末な体を好んでいただけるのはとても嬉しい、ですけど……」"
translation = "「아우우, 혀, 정말로 변태셨군요. 뭐, 그……. 이런 보잘것없는 몸을 좋아해 주시는 것은 매우 기쁘지만……」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「私も……あなた様に欲情していただけるのは、やぶさかではありませんし……」"
translation = "「저도…… 당신께서 욕정해 주시는 것은, 마다하지 않고요……」"

[[dialogue]]
speaker = "unk"
original = "照れたようにモジモジと身を揺らされて、よりいっそうペニスが熱く滾ってしまう。"
translation = "부끄러워하며 꼼지락 몸을 흔들자, 더욱더 페니스가 뜨겁게 달아오른다."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「きゃっ……！？\u3000待っ……！！\u3000何を挿れようとなさって……！」"
translation = "「꺅……!? 기, 기다려……!! 무엇을 넣으려고 하시는 겁니까……!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「待ってくださっ、せ、せめてシャワーを浴びてベッドに戻ってから──」"
translation = "「기다려주세요, 셰, 최소한 샤워를 하고 침대로 돌아간 후에──」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「あぁあんっ！？\u3000あっ、はぁっ、あっ、あっ、あぁぁあんっっ」"
translation = "「아아앙!? 앗, 하앗, 앗, 앗, 아아아앙!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ま、待ってと申していますのに……！\u3000あなた様はいつもいつも、はぁあんっ、強引、すぎますわっ……！」"
translation = "「기, 기다리라고 말씀드렸는데……! 당신은 언제나, 하아앙, 너무 강압적입니다!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「しかもこんな体勢でっ……！\u3000ふぁっ、あぁっ……！\u3000お、お鏡の前でっ……！」"
translation = "「게다가 이런 자세로! 팟, 아앗……! 거, 거울 앞에서!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「恥ずかしっ──んふぅんっ……！\u3000あなた様のが入っているところまで、はぁっ、あぁっ、ま、丸見えでっ……！」"
translation = "「부끄러워── 응후웅! 당신의 것이 들어가 있는 곳까지, 하앗, 아앗, 모, 모두 보여서!」"

[[dialogue]]
speaker = "unk"
original = "羞恥心からかエルデリーゼの狭くて小さな膣が普段以上にギュウギュウ締め付けてくる。"
translation = "수치심 때문인지 엘데리제의 좁고 작은 보지가 평소보다 꽉꽉 조여온다."

[[dialogue]]
speaker = "unk"
original = "そうして恥じらう姿と強い締まりが、さらに性欲を加速させてきて――"
translation = "그렇게 부끄러워하는 모습과 강한 조임이, 더욱 성욕을 가속시켜서――"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ひぃあんっ、あぁあんっ……！！\u3000お、おち○ぽ様が膣内で膨らんでっ……！」"
translation = "「히이앙, 아아앙……!! 자지 님이 보지 안에서 부풀어……!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「本当に、ふぁぁっ、何に興奮しておりますのっ……！\u3000こ、この変態っ、お変態っ……！」"
translation = "「정말로, 파아앗, 무엇에 흥분하고 계신 겁니까! 이, 이 변태, 변태!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「どうして私、あぁ、んはぁんっ、このような人を愛してしまってっ……！！\u3000このエルデリーゼ、一生の不覚……！\u3000不覚、ですわ……！」"
translation = "「어째서 제가, 아아, 응하앙, 이런 사람을 사랑해 버려서……!! 이 엘데리제, 평생의 실수……! 실수, 입니다!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「何より悔しいのが、んんんっっ……！！\u3000こんな辱めを受けてしまっているというのに私っ……！！」"
translation = "「무엇보다 분한 것은, 응응응! 이런 모욕을 당하고 있는데도 제가……!!」"

[[dialogue]]
speaker = "unk"
original = "抽挿を繰り返していく間に、エルデリーゼの声がどんどん甘くなっていく。膣内もますます濡れそぼってきた。"
translation = "피스톤 운동을 반복하는 사이에, 엘데리제의 목소리가 점점 달콤해진다. 보지 안도 더욱더 젖어든다."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「あっ、あっ<emoji=heart04>\u3000優しっ<emoji=heart04>\u3000ふぁぁっっ<emoji=heart04>\u3000急に優しくトントン突かないで、くださいませっ<emoji=heart04>」"
translation = "「앗, 앗<emoji=heart04> 상냥해<emoji=heart04> 파아앗<emoji=heart04> 갑자기 상냥하게 쿵쿵 찌르지 말아, 주세요<emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「卑怯っ<emoji=heart04>\u3000卑怯ですわっ<emoji=heart04>\u3000私がこれ好きなのをご存じだからってっ<emoji=heart04>」"
translation = "「비겁해<emoji=heart04> 비겁합니다<emoji=heart04> 제가 이것을 좋아하는 것을 아신다고<emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「そんなに奥ばかり、あぁっ、優しくズンズンされたら、ふぁぁぁっ、か、感じちゃ……<emoji=heart04>\u3000嬉しくなって、しまいますからぁ……<emoji=heart04>」"
translation = "「그렇게 안쪽만, 아앗, 상냥하게 푹푹 당하면, 파아아앗, 느, 느껴버려……<emoji=heart04> 기뻐져, 버리니까요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "可愛い喘ぎ声がラブホテルの浴室に響き渡る。声が出るたび恥ずかしそうに悶える姿がとても愛おしかった。"
translation = "귀여운 신음 소리가 러브호텔 욕실에 울려 퍼진다. 소리가 나올 때마다 부끄러워하며 몸부림치는 모습이 너무나 사랑스러웠다."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「あっ、あっ、あっ<emoji=heart04>\u3000太もも、ふぁっ、スリスリ撫でられてっ……<emoji=heart04>\u3000首筋、あふっ、ペロペロ舐められてっ……<emoji=heart04>」"
translation = "「앗, 앗, 앗<emoji=heart04> 허벅지, 팟, 스윽스윽 쓰다듬어지고<emoji=heart04> 목덜미, 아훗, 낼름낼름 핥아지고<emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「欲望に、ふぁぁっっ、忠実すぎますわよっ<emoji=heart04>\u3000求めてくださるのは、あぁんっ、嬉しいですけれどっ<emoji=heart04>」"
translation = "「욕망에, 파아앗, 너무 충실합니다<emoji=heart04> 원해 주시는 것은, 아앙, 기쁘지만<emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ですがベッドに戻るまで、あぁっ、シャワーを終えるまで待ってくだされば良かったのにっ<emoji=heart04>」"
translation = "「하지만 침대로 돌아갈 때까지, 아앗, 샤워를 마칠 때까지 기다려 주셨으면 좋았을 텐데<emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「私だって、ふぁ、あぁんっ、何も本当に、のーたっち、のーせっくすで終わるつもりだったわけはっ……<emoji=heart04>」"
translation = "「저도, 파, 아앙, 정말로, 노 터치, 노 섹스로 끝낼 생각이었던 것은<emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「身を清め終えたら、あっ、あぁんっ<emoji=heart04>\u3000大好きなあなた様と、ふぁぁ、こ、こうして愛し合いたいと思っていた次第でっ……<emoji=heart04>」"
translation = "「몸을 다 씻고 나면, 앗, 아앙<emoji=heart04> 너무 좋아하는 당신과, 파아, 이, 이렇게 사랑하고 싶다고 생각했던 참이라<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "快感に流されるように、エルデリーゼから本音と嬌声が漏れてくる。おま○こがペニスに抱きつくようにキツく締まってくる。"
translation = "쾌감에 휩쓸리듯, 엘데리제에게서 본심과 교성이 새어 나온다. 보지가 페니스에 안기듯이 꽉 조여온다."

[[dialogue]]
speaker = "unk"
original = "そんな彼女の姿が、あまりにも可愛くて──"
translation = "그런 그녀의 모습이, 너무나 귀여워서──"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「あっ、はぁっ、あっ、あぁあああんっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000激しっ、ふぁああんっ<emoji=heart04>\u3000激しすぎ、ますわぁっ<emoji=heart04>」"
translation = "「앗, 하앗, 앗, 아아아아앙<emoji=heart04><emoji=heart04><emoji=heart04> 격렬해, 파아앙<emoji=heart04> 너무 격렬합니다<emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ダメっ、あぁんっ、それダメですっ<emoji=heart04>\u3000気持ち良く、ああああっ、なりすぎてしまいますからぁっ<emoji=heart04>」"
translation = "「안 돼, 아앙, 그거 안 돼요<emoji=heart04> 너무 기분 좋, 아아아앗, 아져 버리니까요<emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「おま○こ持ち上げられちゃっ、あふぁぁっ<emoji=heart04>\u3000おち○ぽ様に、ふぁ、あぁっ、また私の大切なところっ、気持ち良くされてしまってぇ<emoji=heart04>」"
translation = "「보지가 들어 올려져, 아파아앗<emoji=heart04> 자지 님에게, 파, 아앗, 또 저의 소중한 곳, 기분 좋게 당해 버려서<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "抱えた腕から落ちてしまいそうになるほど、ピストンの快感にビクンビクンと悶え喘ぐエルデリーゼ。"
translation = "안고 있는 팔에서 떨어질 것 같을 정도로, 피스톤의 쾌감에 움찔움찔 몸부림치며 신음하는 엘데리제."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「最初の頃は、あっ、はぁっ、もっと苦しかったのにっ、あああっ、痛かったのにっ<emoji=heart04>」"
translation = "「처음에는, 앗, 하앗, 더 괴로웠는데, 아아앗, 아팠는데<emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「なのに、んはぁぁっっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000最近はもう、こうも簡単におち○ぽ様を受け入れてしまっていてっ<emoji=heart04>」"
translation = "「그런데, 응하아앗<emoji=heart04><emoji=heart04><emoji=heart04> 요즘은 벌써, 이렇게나 간단히 자지 님을 받아들이고 있어서<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "意識的にか、はたまた無意識にか。突き上げる動きに合わせて、エルデリーゼがキュウキュウと膣を収縮させてくれる。"
translation = "의식적으로인지, 아니면 무의식적으로인지. 솟구쳐 오르는 움직임에 맞춰, 엘데리제가 큐우큐우 보지을 수축시켜 준다."

[[dialogue]]
speaker = "unk"
original = "その快感とペニスを求めるような動きがより俺を昂ぶらせてきて、狭すぎる膣内をさらに激しく突き込んでしまう。"
translation = "그 쾌감과 페니스를 원하는 듯한 움직임이 더욱 나를 흥분시켜서, 너무 좁은 보지 안을 더욱 격렬하게 찔러 넣고 만다."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「あっ、あっ、あっ、あっ<emoji=heart04>\u3000気持ちいいっ、ふぁぁぁっっ、お腹の中しあわせっ……<emoji=heart04>」"
translation = "「앗, 앗, 앗, 앗<emoji=heart04> 기분 좋아<emoji=heart04> 파아아앗, 배 속이 행복해……<emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「本当に悪い遊びを、あふぁっ<emoji=heart04>\u3000教えられてしまったものっ、ですっ<emoji=heart04>」"
translation = "「정말로 나쁜 놀이를, 아훗<emoji=heart04> 배워 버린 것, 입니다<emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「こんなこと、ふぁ、あっ、はぁああんっ<emoji=heart04>\u3000夜間外出より、よっぽどイケナイことですのにっ<emoji=heart04>」"
translation = "「이런 일, 파, 앗, 하아아앙<emoji=heart04> 야간 외출보다, 훨씬 나쁜 짓인데<emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「でも、んはぁぁっっ<emoji=heart04>\u3000気持ちいいっ、す、好きぃっ……<emoji=heart04>」"
translation = "「하지만, 응하아앗<emoji=heart04> 기분 좋아<emoji=heart04> 좋, 좋아해<emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「あなた様とセックスするの、あっ、はぁっ、あっ、あっ、たまらなく幸せで、気持ち良くてっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「당신과 섹스하는 거, 앗, 하앗, 앗, 앗, 참을 수 없이 행복하고, 기분 좋아서<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「私もっ、私の体もっ、あっ、あっ、あっ<emoji=heart04>\u3000すっかりあなた様に変えられてしまいましたっ<emoji=heart04>」"
translation = "「저도, 제 몸도, 앗, 앗, 앗<emoji=heart04> 완전히 당신에게 바뀌어 버렸습니다<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "火照りを増していく彼女に釣られるように、こちらもまた欲望が膨れあがっていく。"
translation = "달아오름을 더해가는 그녀에게 이끌리듯, 이쪽도 다시 욕망이 부풀어 오른다."

[[dialogue]]
speaker = "unk"
original = "熱い滾りが体の奥からのぼってきて──"
translation = "뜨거운 열기가 몸속 깊은 곳에서부터 올라와서──"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「くはぁっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000おち○ぽ様が、バクンバクン膣内で脈打ってっ<emoji=heart04>」"
translation = "「크하앗<emoji=heart04> 아앙<emoji=heart04> 자지 님이, 쿵쾅쿵쾅 보지 안에서 맥동하고<emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「あなた様が何をしようとしているのかわかってしまう自分がっ、あぁんっ<emoji=heart04>\u3000恥ずかしいっ<emoji=heart04>」"
translation = "「당신이 무엇을 하려고 하는지 알아버리는 자신이, 아앙<emoji=heart04> 부끄러워<emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「それを期待してしまっている自分がっ、あっ、あっ、あっ<emoji=heart04>\u3000とてつもなくイケナク思えてっ<emoji=heart04>」"
translation = "「그것을 기대해 버리고 있는 자신이, 앗, 앗, 앗<emoji=heart04> 너무나 나쁘게 느껴져<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスの膨張を手伝うように、エルデリーゼが小さな膣を一生懸命に動かして肉棒を扱いてくる。"
translation = "페니스의 팽창을 돕듯이, 엘데리제가 작은 보지을 열심히 움직여 육봉을 주무른다."

[[dialogue]]
speaker = "unk"
original = "まだまだぎこちない──だけど着実に上手くなってきているその膣遣いに堪らなく興奮してしまう。"
translation = "아직 서툴지만── 확실히 능숙해지고 있는 그 보지 사용에 참을 수 없이 흥분하고 만다."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ふぁっ、あっ、あっ<emoji=heart04>\u3000のぼってきてますっ<emoji=heart04>\u3000熱いのがっ、せーしがぁ、あぁっ、もうそこにまでっ<emoji=heart04>」"
translation = "「팟, 앗, 앗<emoji=heart04> 올라오고 있어요<emoji=heart04> 뜨거운 것이, 정액이, 아앗, 벌써 거기까지<emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「おま○こが、あふぁぁっっ<emoji=heart04>\u3000あさましく締まっちゃっ<emoji=heart04>\u3000すっかり中出しの快感を覚えさせられてしまっていてっ<emoji=heart04>」"
translation = "「보지가, 아파아앗<emoji=heart04> 야하게 조여서<emoji=heart04> 완전히 안에 싸는 쾌감을 배우게 되어 버려서<emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「恥ずかしいっ、んふぁっ、恥ずかしいのにっ<emoji=heart04>\u3000あああっっ<emoji=heart04>\u3000欲しいっ、欲しい欲しい欲しいっ<emoji=heart04>」"
translation = "「부끄러워, 응팟, 부끄러운데<emoji=heart04> 아아앗<emoji=heart04> 원해, 원해 원해 원해<emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「あなた様にまた白いおしっこを出していただけると思うだけで──～～っっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000達してしまいそうっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「당신에게 또 하얀 오줌을 받을 수 있다고 생각하는 것만으로──~~윽<emoji=heart04><emoji=heart04><emoji=heart04> 가버릴 것 같아<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "エルデリーゼが腕の中で淫らに体を振ってくる。"
translation = "엘데리제가 팔 안에서 음란하게 몸을 흔든다."

[[dialogue]]
speaker = "unk"
original = "もっと気持ち良くなりたいと、中出しして欲しいと懇願するように、蕩けた顔で俺を見上げてくる。"
translation = "더 기분 좋아지고 싶다고, 안에 싸 달라고 간청하듯이, 녹아내린 얼굴로 나를 올려다본다."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「あっ、はぁっ、あぁっ、イ、イクっ<emoji=heart04>\u3000イってしまいますっ<emoji=heart04>」"
translation = "「앗, 하앗, 아앗, 이, 이크<emoji=heart04> 가버립니다<emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ついこの前まで、あなた様とお付き合いするまで、こんなこと知らなかったのにっ<emoji=heart04>」"
translation = "「바로 얼마 전까지, 당신과 사귀기 전까지, 이런 것 몰랐는데<emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「セックスの気持ちよさもっ、イク気持ちよさもっ、あっ、あっ、何も知りませんでしたのにっ<emoji=heart04>」"
translation = "「섹스의 기분 좋음도, 가는 기분 좋음도, 앗, 앗, 아무것도 몰랐는데<emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「あぁでもダメぇっ、もうダメぇっ<emoji=heart04>\u3000一度知っしまったら、もうっ<emoji=heart04>」"
translation = "「아아 하지만 안 돼, 이제 안 돼<emoji=heart04> 한 번 알아 버렸다면, 이제<emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「イキたいっ<emoji=heart04>\u3000イクぅっ<emoji=heart04>\u3000ふあぁああっ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000おま○こ気持ちいいっ<emoji=heart04>\u3000おち○ぽ様、あっ、あっ、すごい、すごいすごいすごいすごいぃっっ<emoji=heart04>」"
translation = "「가고 싶어<emoji=heart04> 이쿠<emoji=heart04> 후아아아앗<emoji=heart04> 기분 좋아<emoji=heart04> 보지 기분 좋아<emoji=heart04> 자지 님, 앗, 앗, 대단해, 대단해 대단해 대단해 대단해<emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「出してっ<emoji=heart04>\u3000出してくださいませっ<emoji=heart04>」"
translation = "「싸 줘<emoji=heart04> 싸 주세요<emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「私のちっさなおま○こにっ、あっ、はぁっ、あぁあんっ<emoji=heart04>\u3000あなた様のあっつい精子っ<emoji=heart04>\u3000逞しい子種っ<emoji=heart04>」"
translation = "「저의 작은 보지에, 앗, 하앗, 아아앙<emoji=heart04> 당신의 뜨거운 정액<emoji=heart04> 늠름한 씨앗<emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「たっぷり、ふぁああっ、たっぷりぃぃっ<emoji=heart04>」"
translation = "「듬뿍, 파아앗, 듬뿍<emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「たっぷりっ──ビュービューなさってぇぇぇぇえええっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「듬뿍── 뷰뷰 해 주세요오오오오옷~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「あっ、ああああああっっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イクイクイクぅぅっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗, 아아아아아앗!!<emoji=heart04><emoji=heart04><emoji=heart04> 이쿠 이쿠 이쿠웃~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ドビュルルルルっ！！\u3000ビュビュビュゥゥゥゥっっ～～！！！"
translation = "도뷰르르르르!! 뷰뷰뷰우우우웃~~!!!"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「きもひいっ、はふぅぅっっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000お腹の中、あああっ、火傷しちゃ──くはぁぁ、れも、きもひいいっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「기모찌이, 하후우웃<emoji=heart04><emoji=heart04><emoji=heart04> 배 속이, 아아앗, 데어 버렸── 크하아, 그래도, 기모찌이이……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「あたままっしろにっ、ち、ちからぬけへぇっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「머릿속이 하얗게, 히, 힘이 빠져버려……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「な、中イキしへいましゅっ……<emoji=heart04><emoji=heart04><emoji=heart04>\u3000す、少し前まれ、ふぁぁぁっ、ちっともこんにゃの、知りませんれしひゃのにぃ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아, 안에 싸 버렸으……<emoji=heart04><emoji=heart04><emoji=heart04> 조, 조금 전까지, 파아앗, 전혀 이런 거, 몰랐는데에……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "中出しの快感にエルデリーゼがトロトロになって喘ぐ。"
translation = "안에 싸는 쾌감에 엘데리제가 흐물흐물해져 신음한다."

[[dialogue]]
speaker = "unk"
original = "いつも気品に満ちて大人びた姿を見せてくれているが故に、こうして余裕なく快感に悶える姿がエッチでたまらない。"
translation = "항상 기품이 넘치고 어른스러운 모습을 보여주고 있었기에, 이렇게 여유 없이 쾌감에 몸부림치는 모습이 야릇해서 참을 수 없다."

[[dialogue]]
speaker = "unk"
original = "箱入り娘のお嬢様にイケナイことを仕込んでしまっているようで、どうしようもなくゾクゾクしてしまう。"
translation = "온실 속 아가씨에게 나쁜 짓을 가르쳐 버린 것 같아서, 어찌할 수 없이 짜릿해진다."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「あ゛っ、あ゛ひぃんっ<emoji=heart04>\u3000ら、らめっ、あ゛あぁあっ<emoji=heart04>\u3000まだイっへっ<emoji=heart04>\u3000いま奥突かれたりゃっ<emoji=heart04>」"
translation = "「아윽, 아히잉<emoji=heart04> 아, 안 돼, 아아아앗<emoji=heart04> 아직 가버렸는데<emoji=heart04> 지금 안쪽 찔리면<emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ん゛あ゛っ<emoji=heart04>\u3000あ゛っ<emoji=heart04>\u3000あ゛っ<emoji=heart04>\u3000あ゛っ<emoji=heart04>\u3000あ゛っ<emoji=heart04>\u3000ほんとうにらめれふっ、らめぇっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응아윽<emoji=heart04> 아윽<emoji=heart04> 아윽<emoji=heart04> 아윽<emoji=heart04> 아윽<emoji=heart04> 정말로 안 돼에, 안 돼애<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「イキュっ<emoji=heart04>\u3000で、でりゅっ<emoji=heart04>\u3000あ゛ぁああっっ、でりゅぅぅぅぅっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「이큐<emoji=heart04> 나, 나와<emoji=heart04> 아아아앗, 나와아아아앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「あ゛っ──あ゛ぁぁぁぁぁぁぁっっ～～…………<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아윽── 아아아아아아앗~~…………<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "じょろろろろろ……"
translation = "조로로로로로……"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「あ、あふぁぁ……<emoji=heart04>\u3000こ、この私が、お漏らし、にゃんへぇぇ……<emoji=heart04>」"
translation = "「아, 아파아……<emoji=heart04> 이, 이 제가, 오줌을, 싸다니이……<emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「恥ずかひっ……<emoji=heart04>\u3000恥ずかししゅぎへ、あふぁぁ、死んじゃっ……<emoji=heart04>」"
translation = "「부끄러워……<emoji=heart04> 너무 부끄러워서, 아파아, 죽을 것 같아……<emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「だけど、んはぁぁぁ……<emoji=heart04><emoji=heart04><emoji=heart04>\u3000き、きもひいい……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하지만, 응하아아……<emoji=heart04><emoji=heart04><emoji=heart04> 기, 기모찌이……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「お漏らしするの、ふはぁ、あぁぁぁ……<emoji=heart04>\u3000イクのと同じくらい、んはぁぁ、きもひいいれふ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「오줌 싸는 거, 푸하아, 아아아아……<emoji=heart04> 가는 거랑 똑같이, 응하아아, 기모찌이입니다……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ビクンビクンと痙攣しながら、エルデリーゼが恍惚とした顔で力なくおしっこを漏らし続ける。"
translation = "움찔움찔 경련하면서, 엘데리제가 황홀한 얼굴로 힘없이 오줌을 계속 흘린다."

[[dialogue]]
speaker = "unk"
original = "俺もまたそんな彼女に白いおしっこを注ぎ続ける。"
translation = "나 또한 그런 그녀에게 하얀 오줌을 계속 쏟아붓는다."

[[dialogue]]
speaker = "unk"
original = "そうして二人して放尿をしていると──エルデリーゼが力尽きたように、ぐったりと俺の背中に身を預けてきた。"
translation = "그렇게 둘이서 방뇨를 하고 있자── 엘데리제가 힘이 다한 듯이, 축 늘어져 나의 등에 몸을 기댄다."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「はぁーっ、はぁーっ……<emoji=heart04>\u3000こ、今宵もまた、ふぁぁぁ、イケナイことを教えられてしまいましたわ……<emoji=heart04>」"
translation = "「하아ー앗, 하아ー앗……<emoji=heart04> 오, 오늘 밤도 또, 파아아, 나쁜 것을 배워 버렸습니다……<emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「どんどん私、はぁはぁ、あなた様に悪い子へ変えられてしまっている気がします……<emoji=heart04>」"
translation = "「점점 제가, 하아하아, 당신에게 나쁜 아이로 바뀌어 버리고 있는 기분이 듭니다……<emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「で、ですが……<emoji=heart04>」"
translation = "「하, 하지만……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "エッチなおしっこをちょろちょろと漏らしながら、緩みきった口を持ち上げて淫らに微笑みかけてきてくれる。"
translation = "야릇한 오줌을 졸졸 흘리면서, 풀어진 입을 들어 올려 음란하게 미소 지어준다."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「あなた様になら、はぁはぁ……<emoji=heart04>\u3000どんな風に変えられてしまっても構わないと思っている自分がいますわ……<emoji=heart04>」"
translation = "「당신이라면, 하아하아……<emoji=heart04> 어떤 식으로 바뀌어 버려도 상관없다고 생각하는 제가 있습니다……<emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ですからもっともっと……えへへ<emoji=heart04>\u3000私にイケナイことを教えてくださいませ……<emoji=heart04>」"
translation = "「그러니 더욱더…… 에헤헤<emoji=heart04> 저에게 나쁜 것을 가르쳐 주세요……<emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「せっかく『らぶほてる』にも参ったのですから、はぁはぁ、今宵はその……<emoji=heart04>」"
translation = "「모처럼 『러브호텔』에도 왔으니, 하아하아, 오늘 밤은 그……<emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「一晩中あなた様と、イケナイ『でえと』をさせていただきたい、ですわ……<emoji=heart04>」"
translation = "「밤새도록 당신과, 나쁜 『데이트』를 하고 싶습니다……<emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼＢ"
original = "「あっ、あ、あぁっ、んっ……んっ、んんぅ……ふぁ、はぁぁ、んんっ……くぁ、ああっ……ふっ、んっ、んあぁっ……あ、あ、んっ、くぁ、あふあぁ……」"
translation = "「앗, 아, 아앗, 응…… 응, 응으으…… 파, 하아아, 응응…… 크아, 아앗…… 훗, 응, 응아앗…… 아, 아, 응, 크아, 아후아아……」"

[[dialogue]]
speaker = "エルデリーゼＢ"
original = "「んぁぁああっ……んっ、はっ、あぅ、んはぁっ……はぁっ、あっ、あっ、あああっ……あぁっ、あ、あぁっ、んああぁ……ん、はふ、ふ、あああっ……あう、ふあぁぁ……」"
translation = "「응아아아앗…… 응, 핫, 아우, 응하앗…… 하앗, 앗, 앗, 아아아앗…… 아앗, 아, 아앗, 응아아아…… 응, 하후, 후, 아아아앗…… 아우, 후아아아……」"

[[dialogue]]
speaker = "エルデリーゼＢ"
original = "「あ、ふぁ、はああぁぁ……はっ、はぁ、ふぅ……ん、んぅぅ……はぁっ、はぁ……ふぅ……あ、ん、んぅぅ……ふぅ、はぁ……あぁ……はぁ……あぁ……んん……」"
translation = "「아, 파, 하아아아아…… 핫, 하아, 후우…… 응, 응으으…… 하앗, 하아…… 후우…… 아, 응, 응으으…… 후우, 하아…… 아아…… 하아…… 아아…… 응응……」"

