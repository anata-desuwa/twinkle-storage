[[dialogue]]
speaker = "unk"
original = "第３話,おでかけはイノセントホワイト,P"
translation = "제3화, 외출은 이노센트 화이트, P"

[[dialogue]]
speaker = "unk"
original = "とある日の放課後、俺はリーリアと一緒に街へ出かけていた。"
translation = "어느 날 방과 후, 나는 리리아와 함께 거리로 나갔다."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "（ま、まさかセンパイに冗談で提案した放課後デートが、ＯＫ貰えてしまうとは……！）"
translation = "(서, 설마 선배한테 농담으로 제안한 방과 후 데이트가 OK를 받을 줄이야……!)"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "（けど、センパイの今までの態度からは、どうにも腑に落ちない。ひょっとして何か企んでいるのでは……！？）"
translation = "(하지만 선배의 지금까지 태도로 봐서는 아무래도 납득이 안 가. 혹시 뭔가 꾸미고 있는 거 아냐……!?)"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "（……はっ！\u3000まさか、私の抱えている『秘密』に勘付いた？\u3000私の素性をこのデートから探ろうとしている？）"
translation = "(……핫! 설마 내가 품고 있는 『비밀』을 눈치챘나? 내 정체를 이 데이트를 통해 캐내려고 하는 거야?)"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "（もしそうなら、決してバレないように立ち振る舞わなきゃ……！）"
translation = "(만약 그렇다면 절대로 들키지 않게 행동해야 해……!)"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「センパイが私の誘いに乗って来るなんて思わなかったな～。一体どういう風の吹き回しです？」"
translation = "「선배가 내 유혹에 넘어올 줄은 몰랐네~. 대체 무슨 바람이 분 거예요?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「あっ、もしかして☆\u3000ついに私のこと、好きになっちゃいました？\u3000まあ、こんな可愛い後輩に毎日迫られてたら、それも仕方ないですよね～♪」"
translation = "「앗, 혹시☆ 드디어 제가 좋아진 거예요? 뭐, 이런 귀여운 후배가 매일 대시하면 그것도 어쩔 수 없겠죠~♪」"

[[dialogue]]
speaker = "unk"
original = "いや、毎日来るから、実は友達少ないのかなって……"
translation = "아니, 매일 오길래 사실 친구가 적은가 싶어서……"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「憐れまれてる！？\u3000ちゃんと居ますから！\u3000というか私、むしろ友達多いですから！\u3000……ってセンパイ！\u3000その『え～、うそ～』みたいな顔止めて貰えます！？」"
translation = "「동정받고 있어!? 제대로 있다고요! 그보다 저 오히려 친구 많거든요! ……그건 그렇고 선배! 그 『에~ 거짓말~』 같은 표정 좀 그만해 줄래요!?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ちょっ、笑ってるじゃないですか！\u3000私のこと、からかいましたね……！？」"
translation = "「잠깐, 웃고 있잖아요! 나를 놀렸죠……!?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「もう！\u3000センパイってば、私に対してばっかり、そういうことするんですから！」"
translation = "「정말! 선배는 꼭 나한테만 그런다니까요!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「デートなんですから、最初会った時みたいに、紳士的なセンパイでリードして下さい！」"
translation = "「데이트니까 처음 만났을 때처럼 신사적인 선배로서 리드해 주세요!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ほら、デートらしく腕を組んで行きますよ……！」"
translation = "「자, 데이트답게 팔짱 끼고 가요……!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「センパイ……腕に抱き着いたのに、相変わらずの平然とした顔……。他の男子なら、これだけでイチコロなはずなのに……」"
translation = "「선배…… 팔에 매달렸는데 여전히 태연한 얼굴……. 다른 남자라면 이것만으로도 한 방일 텐데……」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "（だけど、このデートの主導権は渡さない。何も疑われることなく、私の可愛さを見せつけてやるんだから……！）"
translation = "(하지만 이 데이트의 주도권은 넘겨주지 않아. 아무 의심도 사지 않고 나의 귀여움을 보여줄 테니까……!)"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ここ、凄い人ごみですね。あっ、信号、青になりましたよ」"
translation = "「여기 사람 엄청 많네요. 앗, 신호 초록불 됐어요」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「……って、わわっ！？\u3000人の波に流される！？」"
translation = "「……앗, 와와앗!? 인파에 휩쓸려!?」"

[[dialogue]]
speaker = "unk"
original = "（リーリアの手を取り、引き寄せる）"
translation = "(리리아의 손을 잡고 끌어당긴다)"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「あ……」"
translation = "「아……」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ありがとうございます、センパイ……」"
translation = "「고마워요, 선배……」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "（な、なんか一瞬ドキッとして、顔が熱くなってるんですが……！？）"
translation = "(왠, 왠지 순간 두근거려서 얼굴이 뜨거워지는데요……!?)"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "（いやいやいや、さっきまで腕組んでたし、今更センパイから手を握られた程度で、なんでこんな……！？）"
translation = "(아니아니아니, 방금까지 팔짱 끼고 있었고 이제 와서 선배가 손 잡은 정도로 왜 이러는 거야……!?)"

[[dialogue]]
speaker = "unk"
original = "それから今度は、オープンカフェでスイーツを食べることになったのだが──"
translation = "그러고 나서 이번에는 오픈 카페에서 디저트를 먹게 되었는데──"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「えっと……２人でそれぞれパフェを頼みましたよね？」"
translation = "「저기…… 둘이서 각각 파페를 시켰죠?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「でも、スプーンが２つ付いたパフェが来ちゃってますね……」"
translation = "「근데 숟가락이 두 개 꽂힌 파페가 와버렸네요……」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「これって多分、カップルで頼んだと誤解されたやつですよね……！？」"
translation = "「이거 아마 커플이 시킨 거라고 오해받은 거겠죠……!?」"

[[dialogue]]
speaker = "unk"
original = "もう１個頼む？"
translation = "하나 더 시킬까?"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "（こ、ここで断ったら、私の方が恥ずかしがってるのバレバレに……！）"
translation = "(여, 여기서 거절하면 내가 부끄러워하는 거 다 들통나……!)"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「い、いや、せっかくのデートですし！\u3000これを２人で食べるのも、面白そうじゃないですか……？☆」"
translation = "「아, 아니, 기왕 데이트인데! 이걸 둘이서 먹는 것도 재밌을 것 같지 않나요……?☆」"

[[dialogue]]
speaker = "unk"
original = "（口元にスプーンでパフェを運び『あ～ん』する）"
translation = "(입가에 숟가락으로 파페를 가져가서 『아~앙』 한다)"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「え？\u3000わ、わかりました。あ～ん……って！！！\u3000何をやってるんですかセンパイ！？！？」"
translation = "「에? 아, 알겠어요. 아~앙…… 근데!!! 뭐 하시는 거예요 선배!?!?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「き、今日のセンパイ、やっぱり何か変ですよ！？」"
translation = "「오, 오늘 선배 역시 뭔가 이상해요!?」"

[[dialogue]]
speaker = "unk"
original = "実は、この前の埋め合わせをしようと思ってて……"
translation = "사실 지난번 일을 보답하려고 생각해서……"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「星徒会室で、恥をかかせちゃった件？\u3000……いや、あれは私の自爆で、これだと利害一致してませんから！」"
translation = "「성도회실에서 창피 주게 한 일? ……아니, 그건 내 자폭이었고 이건 이해관계가 일치하지 않거든요!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「な、何かセンパイが変に優しいと、調子が狂うというか……」"
translation = "「뭔, 뭔가 선배가 이상하게 다정하니까 페이스가 말린달까……」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「へ？\u3000い、いや別に、センパイにあ～んして貰うのは、嫌じゃありませんけど……」"
translation = "「헤? 아, 아니 딱히 선배가 아~앙 해주는 게 싫지는 않지만……」"

[[dialogue]]
speaker = "unk"
original = "ひょっとして、デートは初めてだった？"
translation = "혹시 데이트는 처음이었어?"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「そ、そんなわけないじゃないですか！」"
translation = "「그, 그럴 리가 없잖아요!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「私が男子とのデートごときで緊張しているとでも？\u3000『あ～ん』だって、何度もしてもらったことありますから！」"
translation = "「내가 남자와의 데이트 따위로 긴장하고 있을 것 같아? 『아~앙』 같은 건 몇 번이나 받아봤거든요!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "（本当は男の子とのデートも、『あ～ん』も初めてですけど！！\u3000そんなこと、口が裂けてもセンパイには言えないし！）"
translation = "(사실은 남자애와의 데이트도, 『아~앙』도 처음이지만!! 그런 거 입이 찢어져도 선배한테는 말 못 해!)"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ほ、ほらセンパイ！\u3000早く私に『あ～ん』してくださいっ！\u3000センパイとイチャイチャする程度、可愛い私にとっては造作もないことなんです！」"
translation = "「자, 자 선배! 빨리 나한테 『아~앙』 해주세요! 선배랑 꽁냥거리는 것 정도 귀여운 나한테는 식은 죽 먹기라고요!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「今更積極的なセンパイとイチャイチャするのが恥ずかしいとか、そんなこと全然まったくちょっともなくて、ラクショーなんですよ！！！」"
translation = "「이제 와서 적극적인 선배랑 꽁냥거리는 게 부끄럽다거나 그런 거 전혀 아예 조금도 없고, 낙승이거든요!!!」"

[[dialogue]]
speaker = "unk"
original = "俺はそれ以上ツッコまず、だよねと話を打ち切ると、真っ赤な顔で大見得を切るリーリアにパフェを『あ～ん』してあげるのだった。"
translation = "나는 더 이상 캐묻지 않고 그렇구나 하며 말을 끊고는, 새빨개진 얼굴로 큰소리치는 리리아에게 파페를 『아~앙』 해주는 것이었다."

[[dialogue]]
speaker = "unk"
original = "……リーリアがテンパりまくってくれたお陰で誤魔化せてるけど、俺だって恥ずかしくてドキドキして、ちょっと嬉しかったのは、この生意気な後輩には秘密だ。"
translation = "……리리아가 엄청 당황해준 덕분에 얼버무리고 있지만, 나도 부끄러워서 두근거리고 조금 기뻤다는 건 이 건방진 후배에게는 비밀이다."

