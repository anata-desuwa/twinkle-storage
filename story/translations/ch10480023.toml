[[dialogue]]
speaker = "unk"
original = "第３話,マムと初めての試練,P"
translation = "제3화, 맘과 첫 번째 시련, P"

[[dialogue]]
speaker = "unk"
original = "とある週末、マムが俺の家へ遊びに来ることになった。"
translation = "어느 주말, 맘이 우리 집에 놀러 오게 되었다."

[[dialogue]]
speaker = "リノ"
original = "「それじゃあマムちゃん、クロトのことお願いね～」"
translation = "「그럼 마무짱, 쿠로토를 잘 부탁해~」"

[[dialogue]]
speaker = "マハムート"
original = "「はい、お任せ下さい」"
translation = "「네, 맡겨주세요」"

[[dialogue]]
speaker = "リノ"
original = "「ふふっ、頼りになる彼女さんね♪\u3000また今度、ゆっくりお話でもしましょうね～」"
translation = "「후훗, 의지가 되는 여자친구네♪ 다음에 또 천천히 이야기 나누자고~」"

[[dialogue]]
speaker = "unk"
original = "母さんは手を振りながら、出かけて行く。今日はこれから用事があるとのことで、夜まで家を空けることになっていた。"
translation = "어머니는 손을 흔들며 외출하신다. 오늘은 지금부터 용무가 있다고 하셔서, 밤까지 집을 비우게 되어 있었다."

[[dialogue]]
speaker = "マハムート"
original = "「……ふぅ、これでリノさんへのご挨拶と、付き合い始めたことの報告は、何とか無事に終わったわね」"
translation = "「……후우, 이걸로 리노 씨께 인사드리는 거랑, 사귀기 시작했다는 보고는 어떻게든 무사히 끝났네」"

[[dialogue]]
speaker = "マハムート"
original = "「――って、何よ。私だって、初めてのことは緊張くらいするわよ」"
translation = "「――랄까, 뭐야. 나라고 해서 처음 하는 일에 긴장 정도는 한다고」"

[[dialogue]]
speaker = "マハムート"
original = "「というか、会長を本当の彼氏として認めるのはまだまだこれからなんだから、後でダメでした、別れました、なんて報告をしないで済むように頑張りなさい」"
translation = "「그보다, 회장을 진짜 남자친구로 인정하는 건 이제부터니까, 나중에 안 됐어요, 헤어졌어요, 같은 보고를 하지 않도록 힘내도록 해」"

[[dialogue]]
speaker = "マハムート"
original = "「――具体的にはどうやったら、本当の彼氏として認めてもらえるのか？\u3000……それは恋人として、段階的に試練を突破していくのよ」"
translation = "「――구체적으로 어떻게 해야 진짜 남자친구로 인정받을 수 있냐고? ……그건 연인으로서 단계적으로 시련을 돌파해 나가는 거야」"

[[dialogue]]
speaker = "マハムート"
original = "「『リノさんにお付き合いを認めてもらう』というのも、その１つね。それと、今日はもう１つ――」"
translation = "「『리노 씨에게 교제를 인정받는 것』도 그중 하나지. 그리고 오늘은 하나 더――」"

[[dialogue]]
speaker = "マハムート"
original = "「『初めて彼氏の家で遊ぶ』という試練をクリアするのよ……！」"
translation = "「『처음으로 남자친구 집에서 놀기』라는 시련을 클리어하는 거야……!」"

[[dialogue]]
speaker = "マハムート"
original = "「ん？\u3000何よ、首を傾げたりして……」"
translation = "「응? 뭐야, 고개를 갸웃거리기는……」"

[[dialogue]]
speaker = "unk"
original = "それって……俺というより"
translation = "그건…… 나보다도"

[[dialogue]]
speaker = "マハムート"
original = "「――私が試練を受けるみたいになっている？」"
translation = "「――내가 시련을 받는 것처럼 되어 있다고?」"

[[dialogue]]
speaker = "マハムート"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "マハムート"
original = "「不公平だわ。会長、貴方も今日中に何か１つ、試練をクリアしなさい」"
translation = "「불공평해. 회장, 당신도 오늘 중에 뭔가 하나 시련을 클리어해」"

[[dialogue]]
speaker = "unk"
original = "えぇっ！？\u3000いきなりそんなこと言われても"
translation = "에엣!? 갑자기 그런 말을 들어도"

[[dialogue]]
speaker = "マハムート"
original = "「さて、恋人として部屋で過ごすことになったわけだけど……」"
translation = "「자, 연인으로서 방에서 시간을 보내게 됐는데……」"

[[dialogue]]
speaker = "マハムート"
original = "「彼氏としてクリアする試練、何か思い付いたかしら？」"
translation = "「남자친구로서 클리어할 시련, 뭔가 떠오른 거라도 있어?」"

[[dialogue]]
speaker = "unk"
original = "マムと手を繋ぎたいです"
translation = "마무랑 손을 잡고 싶어요"

[[dialogue]]
speaker = "マハムート"
original = "「は？\u3000何を言っているのかしら、貴方は……」"
translation = "「하? 무슨 소리를 하는 거야, 당신은……」"

[[dialogue]]
speaker = "マハムート"
original = "「スキンシップはもっと……半年くらい段階を踏んでからでしょう？」"
translation = "「스킨십은 좀 더…… 반년 정도 단계를 밟은 뒤에 해야 하는 거 아냐?」"

[[dialogue]]
speaker = "unk"
original = "手を繋ぐだけでそこまで！？"
translation = "손을 잡는 것만으로 그렇게까지!?"

[[dialogue]]
speaker = "unk"
original = "期待が打ち砕かれて、ガックリと肩を落とすと――"
translation = "기대가 무너져서 털썩 어깨를 늘어뜨리자――"

[[dialogue]]
speaker = "マハムート"
original = "「……そんなにショックを受ける程、私と手を繋ぎたかったの？」"
translation = "「……그렇게 쇼크를 받을 정도로 나랑 손을 잡고 싶었어?」"

[[dialogue]]
speaker = "マハムート"
original = "「……やれやれ、仕方がないわね……」"
translation = "「……이런이런, 어쩔 수 없네……」"

[[dialogue]]
speaker = "unk"
original = "マムは手を差し出して、言う。"
translation = "마무는 손을 내밀며 말한다."

[[dialogue]]
speaker = "マハムート"
original = "「そこまでやる気があるのなら……彼氏らしいところ、見せてもらおうかしら」"
translation = "「그렇게까지 의욕이 있다면…… 남자친구다운 모습, 한번 보여줘 볼까」"

[[dialogue]]
speaker = "マハムート"
original = "「――ほら、いいわよ……するなら私の気が変わらない内に、早くしなさい」"
translation = "「――자, 됐어…… 할 거면 내 마음이 바뀌기 전에 빨리 해」"

[[dialogue]]
speaker = "unk"
original = "マムのそういう優しいところ、好きです"
translation = "마무의 그런 다정한 점, 좋아해요"

[[dialogue]]
speaker = "マハムート"
original = "「全く、調子がいいんだから……」"
translation = "「정말이지, 비위도 좋다니까……」"

[[dialogue]]
speaker = "unk"
original = "俺はマムの手を、そっと握る。"
translation = "나는 마무의 손을 살며시 잡는다."

[[dialogue]]
speaker = "マハムート"
original = "「……！\u3000ん…………」"
translation = "「……! 윽…………」"

[[dialogue]]
speaker = "マハムート"
original = "「……ふぅ」"
translation = "「……후우」"

[[dialogue]]
speaker = "マハムート"
original = "「……え？\u3000さ、さっきも言ったでしょう……私だって、初めてのことぐらいあるわよ」"
translation = "「……에? 아, 아까도 말했잖아…… 나라고 해서 처음인 것 정도는 있다고」"

[[dialogue]]
speaker = "unk"
original = "照れてるマム、ちょっと可愛いです"
translation = "부끄러워하는 마무, 조금 귀여워요"

[[dialogue]]
speaker = "マハムート"
original = "「っ……！\u3000そういうのは、わざわざ口にしなくていい！」"
translation = "「윽……! 그런 건 굳이 입 밖으로 내지 않아도 돼!」"

[[dialogue]]
speaker = "マハムート"
original = "「繋ぎ方を変えたい？\u3000……恋人繋ぎに？\u3000そ、それって指を絡めるアレ！？」"
translation = "「잡는 법을 바꾸고 싶어? ……연인 잡기로? 그, 그거 손가락을 얽는 그거!?」"

[[dialogue]]
speaker = "マハムート"
original = "「それはダメよ！\u3000――なんでって、それは……」"
translation = "「그건 안 돼! ――왜냐하면, 그건……」"

[[dialogue]]
speaker = "マハムート"
original = "「なんか、いやらしいじゃない！」"
translation = "「왠지, 야하잖아!」"

[[dialogue]]
speaker = "unk"
original = "手を繋ぐだけなのに……！"
translation = "손을 잡는 것뿐인데……!"

[[dialogue]]
speaker = "マハムート"
original = "「残念そうな顔をしたって、２度は許してあげないわよ」"
translation = "「아쉬운 표정을 지어도 두 번은 허락 안 해줄 거야」"

[[dialogue]]
speaker = "マハムート"
original = "「というかまた、貴方じゃなくて、私への試練みたいになってるじゃない！」"
translation = "「그보다 또 당신이 아니라 나한테 주는 시련처럼 됐잖아!」"

[[dialogue]]
speaker = "マハムート"
original = "「とにかく、恋人繋ぎは普通の繋ぎ方にもっと慣れてからよ」"
translation = "「어쨌든, 연인 잡기는 평범하게 잡는 법에 좀 더 익숙해진 다음이야」"

[[dialogue]]
speaker = "マハムート"
original = "「――じゃあこれから、もっと手を繋ぐようにしていいかって？」"
translation = "「――그럼 앞으로 좀 더 손을 잡아도 되냐고?」"

[[dialogue]]
speaker = "マハムート"
original = "「それは……まあ、１回繋いだわけだし……」"
translation = "「그건…… 뭐, 한 번 잡았으니까……」"

[[dialogue]]
speaker = "マハムート"
original = "「ただ、あんまり目立つ場所では無しよ。私は、威厳ある寮長なんだから……」"
translation = "「다만, 너무 눈에 띄는 장소에서는 안 돼. 나는 위엄 있는 기숙사장이니까……」"

[[dialogue]]
speaker = "unk"
original = "なら今度、デートに行きましょう"
translation = "그럼 다음에 데이트 가요"

[[dialogue]]
speaker = "マハムート"
original = "「そうね、デートの時なら……まあ、いいわよ」"
translation = "「그래, 데이트 때라면…… 뭐, 좋아」"

[[dialogue]]
speaker = "unk"
original = "マムは可愛くこくりと頷いてくれて、今から次の機会が楽しみになるのだった――"
translation = "마무는 귀엽게 고개를 끄덕여 주었고, 지금부터 다음 기회가 기대되는 것이었다――"

