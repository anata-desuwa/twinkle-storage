[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ようやく見つけたわよ！」"
translation = "「겨우 찾았네!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「緋宮会長も、なんとか無事のようですね……！」"
translation = "「히노미야 회장도, 어떻게든 무사하신 것 같네요……!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「くっ……！」"
translation = "「크읏……!」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「てかあの子、ちょっと泣いてない？」"
translation = "「근데 쟤, 좀 울고 있지 않아?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「花粉症でしょうか……？」"
translation = "「꽃가루 알레르기일까요……?」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「お昼寝でもしていたのかもしれませんね」"
translation = "「낮잠이라도 자고 있었을지도 모르겠네요」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「んも～っ！\u3000泣いてなんかないし、寝起きでもないよっ！」"
translation = "「흥! 울고 있는 것도 아니고, 잠에서 깬 것도 아니거든!」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「めっちゃ元気だった」"
translation = "「엄청 기운 넘치네」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「ではでは、おとなしくお縄を頂戴するのです～！」"
translation = "「자자, 얌전히 포박당하는 거예요~!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「うぅ～……それにしてもまさか、世界を越えてまで追ってくるなんて……！」"
translation = "「으으~…… 그건 그렇고 설마, 세계를 넘어서까지 쫓아올 줄이야……!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そんなの当たり前でしょ！\u3000どういうつもりか知らないけど、クロトを返してもらうわよ！」"
translation = "「그런 건 당연하잖아! 무슨 생각인지는 모르겠지만, 쿠로토를 돌려받겠어!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ふ～んだ、そうはさせないんだから！」"
translation = "「흥이다, 그렇게는 안 될걸!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ていうかクロトっ、あなた大丈夫なの！？\u3000いつまでもボ～ッとしてる場合じゃないわよもう！\u3000バカバカ！」"
translation = "「그나저나 쿠로토! 당신 괜찮은 거야!? 언제까지 멍하니 있을 때가 아니잖아 이제! 바보 바보!」"

[[dialogue]]
speaker = "unk"
original = "……っ！"
translation = "……윽!"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「にっひっひ～、無駄だよ～だ。お兄ちゃんにかけた拘束の暗示は、そう簡単には解けないんだからっ」"
translation = "「니힛힛~, 소용없지롱. 오빠에게 건 구속의 암시는, 그렇게 쉽게 풀리지 않으니까!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「なによそれ、ずるいわ！」"
translation = "「뭐야 그거, 치사해!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「なるほど、なかなか厄介ですね……」"
translation = "「과연, 꽤나 까다롭군요……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あの様子だと、自力での脱出は難しそうです……」"
translation = "「저 상태로는, 자력으로 탈출하기는 어려울 것 같습니다……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふんっ。だったらまずは、メイプルを正気に戻すところからね！」"
translation = "「흥. 그렇다면 우선은, 메이플을 제정신으로 되돌리는 것부터야!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「むぅ～……本当は、力ずくでっていうつもりじゃなかったけど、そうも言ってられないみたいだね」"
translation = "「음~…… 사실은, 힘으로 할 생각은 아니었지만, 그렇게 말하고 있을 때가 아닌 것 같네」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「いいよ、このマカロン様が、直々に相手になってあげる！\u3000さあ、かかってこ～い！」"
translation = "「좋아, 이 마카롱 님이, 직접 상대해 줄게! 자, 덤벼 봐~!」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「ひええええっ！？\u3000なんだか物騒な雰囲気ですよっ……！」"
translation = "「히에에에에엑!? 뭔가 험악한 분위기예요……!」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「さっきまでの威勢はどこ行ったんでいっ」"
translation = "「아까까지의 기세는 어디 갔대!」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「これでは、トントロを割られてしまいます～っ！」"
translation = "「이러다가는, 톤토로가 깨져 버려요~!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「にっひっひ～、このマカロン様の圧倒的なオーラに、恐れをなしちゃった？」"
translation = "「니힛힛~, 이 마카롱 님의 압도적인 오라에, 겁을 먹었니?」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「なんでい、そっちこそ、一人でこのヤンチャを続けるつもりなわけ？」"
translation = "「뭐야, 너야말로, 혼자서 이 말썽을 계속할 생각인 거야?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ふっふ～ん、多少の人数の不利なんて、そんなの全然へっちゃらだもんね～っ」"
translation = "「훗훗~, 약간의 수적 불리함 따위, 그런 거 전혀 아무렇지도 않거든~!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「毎日修行もしてるし、牛乳もちゃんと飲んでるし……このマカロンさまは、やればできる子なんだからっ！」"
translation = "「매일 수련도 하고 있고, 우유도 제대로 마시고 있고…… 이 마카롱 님은, 하면 되는 아이니까!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「シンお兄ちゃんから魔王因子を奪った奴らなんかには、絶対に負けないよっ！」"
translation = "「신 오빠에게서 마왕 인자를 빼앗은 녀석들한테는, 절대로 안 질 거야!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ま、まあ、私ほどじゃなさそうだけど、確かにこれは、一筋縄ではいかなそうかも……！」"
translation = "「마, 뭐, 나만큼은 아닌 것 같지만, 확실히 이건, 만만치 않을지도……!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「それに、このまま正面からぶつかっては、身動きできない緋宮会長を巻き込んでしまう可能性もありますね……！」"
translation = "「게다가, 이대로 정면으로 부딪쳤다가는, 움직일 수 없는 히노미야 회장을 휘말리게 할 가능성도 있네요……!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あら……？\u3000そういえば……」"
translation = "「어머……? 그러고 보니……」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「おや、きょろきょろとして、どうかしましたか？\u3000お腹でも空いてしまいましたか？」"
translation = "「어라, 두리번거리며, 무슨 일 있으신가요? 배라도 고파지셨나요?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「違いますよっ、そんなに食いしん坊じゃありませんっ」"
translation = "「아닙니다! 그렇게 식탐이 많지 않아요!」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「トントロは、食べられませんからね」"
translation = "「톤토로는, 먹을 수 없으니까요」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「食べませんっ」"
translation = "「안 먹어요!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「にひひ、早速仲間割れしてるじゃ～ん」"
translation = "「니히히, 벌써부터 내분이 일어나는구만~」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「まだ割れてませんからねっ！？」"
translation = "「아직 안 갈라졌거든요!?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「よ～っし、サクッとあいつらを片付けちゃうから、お兄ちゃんはその間、そこでおとなしくしててよねっ」"
translation = "「좋~았어, 후딱 저 녀석들을 처리해 버릴 테니까, 오빠는 그동안, 거기서 얌전히 있어 줘야 해!」"

[[dialogue]]
speaker = "unk"
original = "メイプル……やめるんだ……っ！"
translation = "메이플…… 그만둬……!"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「えっ……！\u3000うそっ……！？」"
translation = "「엣……! 거짓말……!?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あっ、見て下さいっ！\u3000会長さん、少しずつ動けるようになってきているみたいです……！」"
translation = "「앗, 보세요! 회장님, 조금씩 움직일 수 있게 된 것 같습니다……!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「そんなはずは……！」"
translation = "「그럴 리가……!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「いいわよクロト、あなたの本気を見せてやりなさい！\u3000私が許可するわ！」"
translation = "「좋아 쿠로토, 당신의 진심을 보여줘! 내가 허락할게!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ど、どんなに呼びかけたって、無駄だよっ、意味ないんだからっ」"
translation = "「아, 아무리 불러봤자, 소용없어! 의미 없으니까!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「緋宮会長！\u3000意志を強く持って下さい！」"
translation = "「히노미야 회장! 의지를 강하게 가지세요!」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「気合いだーっ！」"
translation = "「기합이다!」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「根性です～っ！」"
translation = "「근성이에요~!」"

[[dialogue]]
speaker = "unk"
original = "……メイプルっ！"
translation = "……메이플!"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「えっ……！？」"
translation = "「엣……!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「やったわ、暗示が解けたのね！」"
translation = "「해냈어, 암시가 풀린 거네!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「あーっ！\u3000催眠アプリの効果が切れちゃった！」"
translation = "「아앗! 최면 앱 효과가 끊어져 버렸어!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「効果時間はもっとあったはずなのに、自力で動けるようになるなんて、想定外だよ……！」"
translation = "「효과 시간은 더 남아 있었을 텐데, 자력으로 움직일 수 있게 되다니, 예상 밖이야……!」"

[[dialogue]]
speaker = "unk"
original = "みんな、心配かけてごめん"
translation = "모두, 걱정 끼쳐서 미안하다"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふふっ、私たちの声のおかげで、やる気に目覚めたんじゃない？」"
translation = "「후훗, 우리 목소리 덕분에, 의욕이 생겨난 거 아냐?」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「なんなら、アタシらに助けられるまでもなかったかもね。あんた、なかなか根性あるね！」"
translation = "「아니, 우리한테 도움받을 필요도 없었을지도 모르겠네. 너, 꽤 근성 있잖아!」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「しかし、危ないところだったのは事実……。お礼は、そちらの世界のおいしいおやつで構いませんよ」"
translation = "「하지만, 위험할 뻔했던 것은 사실……. 답례는, 저쪽 세계의 맛있는 간식으로 괜찮아요」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「やめんか。いや、あっちの世界のスウィーツは、確かにアタシも気になってはいたけど……」"
translation = "「그만둬. 아니, 저쪽 세계의 스위츠는, 확실히 나도 궁금하긴 했지만……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「とにかく、これで一安心ですね」"
translation = "「어쨌든, 이걸로 한시름 놓았네요」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「はいっ」"
translation = "「네!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「って、ちょっとーっ！\u3000あたしのこと無視して、解決ムードにならないでよ～っ！」"
translation = "「잠깐만! 나를 무시하고, 해결 분위기 만들지 말라고~!」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「おっと、あとはこっちの暴れん坊を、なんとかしなきゃだね」"
translation = "「이런, 이제 이 말썽꾸러기를, 어떻게든 해야겠네」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふっふーん。それじゃあ改めて、あなたも正気に戻してあげるわ！」"
translation = "「훗훗. 그럼 다시 한번, 너도 제정신으로 되돌려 줄게!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「何を企んでいたかはわかりませんが……」"
translation = "「무엇을 꾸미고 있었는지는 모르겠지만……」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「観念するのです～！」"
translation = "「순순히 따르는 거예요~!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「んも～っ！\u3000どうあっても抵抗する気っ！？\u3000企むも何も、悪いのはそっちなんだから～っ！」"
translation = "「흥! 어떻게든 저항할 생각이야!? 꾸미고 말고 할 것도 없이, 나쁜 건 너희들이잖아~!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ただ、奪った魔王因子を返してくれればいいだけなのにっ」"
translation = "「그냥, 빼앗은 마왕 인자를 돌려주기만 하면 되는데!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そういえば……奪ったとか返してとかって、一体どういうこと……？」"
translation = "「그러고 보니…… 빼앗았다거나 돌려달라거나, 대체 무슨 말이야……?」"

[[dialogue]]
speaker = "unk"
original = "それが……"
translation = "그게……"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「えっと、ホントにどういうこと……？」"
translation = "「그러니까, 정말로 무슨 말이야……?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「何か認識の食い違いがあるようですが……あの気迫、話し合いでは止められそうにありません……！」"
translation = "「뭔가 인식의 차이가 있는 것 같습니다만…… 저 기백, 대화로는 막을 수 없을 것 같아요……!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「さあ、正々堂々、実力行使させてもらうよ！」"
translation = "「자, 정정당당하게 실력 행사를 하겠어!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「あなたたちに教えてあげるっ。魔王の正当な後継者は、このマカロンさまなんだからーっ！」"
translation = "「너희들에게 알려 줄게. 마왕의 정당한 후계자는, 이 마카롱 님이니까!」"

