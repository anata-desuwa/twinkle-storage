[[dialogue]]
speaker = "unk"
original = "第３話,友達として,P"
translation = "제3화, 친구로서, P"

[[dialogue]]
speaker = "unk"
original = "流星寮のクリスマスパーティーの準備は順調に進んでいた。"
translation = "유성 기숙사의 크리스마스 파티 준비는 순조롭게 진행되고 있었다."

[[dialogue]]
speaker = "unk"
original = "アイデアを出すターンも終わり、個別の作業が増えてきた、そんなある日。"
translation = "아이디어를 내는 단계도 끝나고, 개별 작업이 늘어난 어느 날."

[[dialogue]]
speaker = "アニュラス"
original = "「……ちょっと待て」"
translation = "「……잠깐 기다려라.」"

[[dialogue]]
speaker = "アポロ"
original = "「どうしたんだ？\u3000急に真剣な声して……」"
translation = "「왜 그래? 갑자기 진지한 목소리를 하고……」"

[[dialogue]]
speaker = "アニュラス"
original = "「アポロならわかるだろう？\u3000この場所は流星ライダーが死闘を繰り広げた場所だ！」"
translation = "「아폴로라면 알겠지? 이곳은 유성 라이더가 사투를 벌였던 장소다!」"

[[dialogue]]
speaker = "unk"
original = "それって第何話？"
translation = "그거 제몇 화야?"

[[dialogue]]
speaker = "unk"
original = "そうなの？"
translation = "정말이야?"

[[dialogue]]
speaker = "アポロ"
original = "「いや、似てるってだけだぞ。ここじゃないはずだ」"
translation = "「아니, 닮았을 뿐이라고. 여기는 아닐 거야.」"

[[dialogue]]
speaker = "アポロ"
original = "「あたしも前に勘違いしたけど、調べてもらったら違うってわかったんだ。アニュラスは流星ライダーを見始めたばっかだし、間違うのも仕方ないぞ」"
translation = "「나도 전에는 착각했었는데, 조사해 보니까 다르다는 걸 알았거든. 아뉴라스는 유성 라이더를 보기 시작한 지 얼마 안 됐으니, 착각하는 것도 어쩔 수 없지.」"

[[dialogue]]
speaker = "アニュラス"
original = "「ぐぬぬ……まだまだ修行が足りないと言うことか……」"
translation = "「그으으…… 아직 수행이 부족하다는 뜻인가……」"

[[dialogue]]
speaker = "アポロ"
original = "「でもここ、いいよなぁ。戦いたくなっちゃう場所だ」"
translation = "「그래도 여기, 괜찮네. 싸우고 싶어지는 장소야.」"

[[dialogue]]
speaker = "アニュラス"
original = "「同感だ。学習のために流星ライダーを見せてもらったが、正義のために悪と戦う姿は感動ものだったからな」"
translation = "「동감이다. 학습을 위해 유성 라이더를 시청했다만, 정의를 위해 악과 싸우는 모습은 감동적이었으니까.」"

[[dialogue]]
speaker = "アニュラス"
original = "「流星剣騎とはまた違った清々しい良さがある！\u3000それは認めざるをえないだろう！」"
translation = "「유성검기하고는 또 다른 상쾌한 장점이 있군! 그것은 인정하지 않을 수 없겠지!」"

[[dialogue]]
speaker = "アポロ"
original = "「そうだ！\u3000流星ライダーＶＳ流星剣騎ファイバー……ここで、やるか？」"
translation = "「맞아! 유성 라이더 VS 유성검기 파이버…… 여기서 해 볼까?」"

[[dialogue]]
speaker = "アニュラス"
original = "「いいだろう……私とアポロなら良い戦いが出来るはずだ」"
translation = "「좋다…… 나와 아폴로라면 좋은 싸움을 할 수 있겠지.」"

[[dialogue]]
speaker = "unk"
original = "ここで戦闘するつもりなの！？"
translation = "여기서 전투할 셈이야!?"

[[dialogue]]
speaker = "unk"
original = "ちょっと待った！"
translation = "잠깐 기다려!"

[[dialogue]]
speaker = "アニュラス"
original = "「駄目だったか？」"
translation = "「안 되는 건가?」"

[[dialogue]]
speaker = "アポロ"
original = "「パーティーの出し物の練習だぞ？\u3000ちょっとだけっ、ちょっとだけだから！」"
translation = "「파티 장기자랑 연습이라고? 조금만, 조금만 할 테니까!」"

[[dialogue]]
speaker = "アニュラス"
original = "「安心してくれ、迷惑になるようなことは決してしない。あくまでデモンストレーションだ」"
translation = "「안심해라, 민폐가 될 만한 일은 결코 하지 않겠다. 어디까지나 시연이다.」"

[[dialogue]]
speaker = "unk"
original = "ちょっとだけだよ？"
translation = "조금만이다?"

[[dialogue]]
speaker = "unk"
original = "そこまで言うなら……"
translation = "그렇게까지 말한다면……"

[[dialogue]]
speaker = "アニュラス"
original = "「ありがとう！\u3000では行くぞ、アポロ！」"
translation = "「고맙다! 그럼 간다, 아폴로!」"

[[dialogue]]
speaker = "アポロ"
original = "「変身！」"
translation = "「변신!」"

[[dialogue]]
speaker = "アポロ"
original = "「どうだっ！\u3000これがあたしのクリスマスフォーーームッ！！」"
translation = "「어떠냐! 이것이 나의 크리스마스 포오오옴!!」"

[[dialogue]]
speaker = "アニュラス"
original = "「かっこいいぞ、アポロ。可愛い中にも強さを感じるな」"
translation = "「멋지군, 아폴로. 귀여움 속에서도 강함이 느껴진다.」"

[[dialogue]]
speaker = "アポロ"
original = "「えへへっ、ありがとな。アニュラスはちゃんとかっこいいって言ってくれるから好きだ」"
translation = "「에헤헤, 고마워. 아뉴라스는 제대로 멋지다고 말해주니까 좋아.」"

[[dialogue]]
speaker = "アニュラス"
original = "「アポロに可愛さしか感じないなんて、その目は節穴かと言いたいくらいだ。燃える正義の心を強く感じるのに」"
translation = "「아폴로에게서 귀여움밖에 느끼지 못하다니, 그 눈은 장식인가라고 말하고 싶을 정도군. 불타는 정의의 마음이 강하게 느껴지는데 말이다.」"

[[dialogue]]
speaker = "アポロ"
original = "「アニュラスはわかってるな。流星ライダーのことも、すぐ好きになってくれたし」"
translation = "「아뉴라스는 역시 잘 아네. 유성 라이더도 금방 좋아해 줬고.」"

[[dialogue]]
speaker = "アニュラス"
original = "「歩む道は異なれど、目指すものは同じだからな」"
translation = "「걷는 길은 다를지라도, 지향하는 바는 같으니까 말이다.」"

[[dialogue]]
speaker = "アポロ"
original = "「おうっ！\u3000アニュラスと仲良くなれて、ほんとよかったぜ！」"
translation = "「오우! 아뉴라스랑 친해질 수 있어서 정말 다행이야!」"

[[dialogue]]
speaker = "unk"
original = "人が集まって来ちゃったみたいだ"
translation = "사람들이 모여버린 것 같아"

[[dialogue]]
speaker = "unk"
original = "仲良くしてるとこ申し訳ないけど"
translation = "사이좋은 와중에 미안하지만"

[[dialogue]]
speaker = "アポロ"
original = "「うわ、ほんとだ！\u3000どうしたらいいんだ？」"
translation = "「우와, 진짜네! 어쩌면 좋지?」"

[[dialogue]]
speaker = "アニュラス"
original = "「善良な市民に迷惑をかけるわけにはいかない。模擬戦闘は断念しよう」"
translation = "「선량한 시민에게 폐를 끼칠 수는 없지. 모의 전투는 단념하겠다.」"

[[dialogue]]
speaker = "アポロ"
original = "「じゃあ次の機会だな！」"
translation = "「그럼 다음 기회에 하자!」"

[[dialogue]]
speaker = "アニュラス"
original = "「クリスマスパーティーまでに、練習する機会は何度もあるだろう」"
translation = "「크리스마스 파티 전까지 연습할 기회는 얼마든지 있겠지.」"

[[dialogue]]
speaker = "アポロ"
original = "「おう！\u3000でもアニュラスがすぐに諦めたのはちょっと意外だったぞ」"
translation = "「오우! 근데 아뉴라스가 금방 포기한 건 좀 의외였어.」"

[[dialogue]]
speaker = "アニュラス"
original = "「意外とはなんだ、失礼な。私だってちゃんと考えているんだ」"
translation = "「의외라니 무슨 소린가, 실례군. 나도 제대로 생각하고 있다.」"

[[dialogue]]
speaker = "アニュラス"
original = "「まだまだ試行錯誤の途中だが、『流星の騎士』として私はもっと成長したい。上手くいかないこともあるが、しかし最終的には前に進んでいたいんだ」"
translation = "「아직 시행착오 중이다만, 『유성의 기사』로서 나는 더욱 성장하고 싶다. 잘 되지 않을 때도 있지만, 결국에는 앞으로 나아가고 싶군.」"

[[dialogue]]
speaker = "アポロ"
original = "「悩むのはいいことだと思うぞ。流星ライダーだって、時には悩み、苦しみ、成長してきたんだ」"
translation = "「고민하는 건 좋은 거라고 생각해. 유성 라이더도 때로는 고민하고 괴로워하며 성장해 왔으니까.」"

[[dialogue]]
speaker = "アポロ"
original = "「ヒーローには必要なことだ。アニュラスも流星の騎士を目指すんなら、大いに悩んでいいぞ！」"
translation = "「히어로에게는 필요한 일이야. 아뉴라스도 유성의 기사를 목표로 한다면, 마음껏 고민해도 좋아!」"

[[dialogue]]
speaker = "アニュラス"
original = "「そうだな。迷惑をかけることもあるだろうが、よろしく頼む」"
translation = "「그렇군. 폐를 끼칠 때도 있겠지만, 잘 부탁한다.」"

[[dialogue]]
speaker = "アポロ"
original = "「へへっ、ようやく調子が戻ってきたな。ちょっと堅苦しいけど、アニュラスらしくていいぞ」"
translation = "「헤헤, 이제야 평소대로 돌아왔네. 좀 딱딱하긴 해도 아뉴라스다워서 좋아.」"

[[dialogue]]
speaker = "unk"
original = "それもアニュラスの長所だから"
translation = "그것도 아뉴라스의 장점이니까"

[[dialogue]]
speaker = "unk"
original = "自分らしさは大事だよ"
translation = "자신다움은 중요해"

[[dialogue]]
speaker = "アニュラス"
original = "「流星の騎士として、自分の正義を<ruby>枉<rt>ま</rt></ruby>げるつもりはない。私は私らしく、更なる成長を目指そう！」"
translation = "「유성의 기사로서, 자신의 정의를 굽힐 생각은 없다. 나는 나답게, 한층 더 성장을 목표로 하겠다!」"

[[dialogue]]
speaker = "アポロ"
original = "「いいと思うぞ！\u3000もし間違ってたら、あたしが教えてやるから」"
translation = "「좋다고 생각해! 만약 틀렸다면 내가 가르쳐 줄 테니까.」"

[[dialogue]]
speaker = "アポロ"
original = "「アニュラスの友達として、なっ！」"
translation = "「아뉴라스의 친구로서 말이야!」"

[[dialogue]]
speaker = "アニュラス"
original = "「ああ、頼むぞ！」"
translation = "「음, 부탁하마!」"

[[dialogue]]
speaker = "unk"
original = "がっちりと握手するアニュラスとアポロ。"
translation = "굳게 악수하는 아뉴라스와 아폴로."

[[dialogue]]
speaker = "unk"
original = "まるで少年漫画の１シーンのように、２人の笑顔は清々しいものだった。"
translation = "마치 소년 만화의 한 장면처럼, 두 사람의 미소는 상쾌한 것이었다."

