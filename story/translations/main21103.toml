[[dialogue]]
speaker = "unk"
original = "第３話,メルエルとナターシャ,B"
translation = "제3화, 메르엘과 나타샤, B"

[[dialogue]]
speaker = "unk"
original = "メルエルは魔王の血族だった。"
translation = "메르엘은 마왕의 혈족이었다."

[[dialogue]]
speaker = "unk"
original = "そしてナターシャはそれを知りながら、メルエルに秘密にしていた。"
translation = "그리고 나타샤는 그것을 알면서도 메르엘에게 비밀로 하고 있었다."

[[dialogue]]
speaker = "unk"
original = "その事実に、メルエルが目を見開く。"
translation = "그 사실에 메르엘이 눈을 크게 뜬다."

[[dialogue]]
speaker = "メルエル"
original = "「私が魔王の血族だって知ってたの？\u3000いつから……？\u3000留学生として新星学園に来た時から？\u3000それとももっと昔……？」"
translation = "「내가 마왕의 혈족이라는 걸 알고 있었어? 언제부터……? 유학생으로서 신성학원에 왔을 때부터? 아니면 더 옛날……?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「昔から。初めて会った時から、メルエルが魔王だって知ってたよ」"
translation = "「옛날부터. 처음 만났을 때부터 메르엘이 마왕이라는 걸 알고 있었어.」"

[[dialogue]]
speaker = "メルエル"
original = "「え……？\u3000じゃあ──」"
translation = "「에……? 그럼──」"

[[dialogue]]
speaker = "ナターシャ"
original = "「そ。お察しの通り。私はメルエルの幼なじみなんかじゃない」"
translation = "「그래. 짐작하는 대로야. 나는 메르엘의 소꿉친구 같은 게 아니야.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「出会った時から今の今まで、私がメルエルの近くにいたのは任務のため」"
translation = "「만났을 때부터 지금까지 내가 메르엘 곁에 있었던 건 임무 때문이야.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「私は小さい頃からずっと……それこそ物心つく前から、メルエルの監視と護衛をしてたんだ」"
translation = "「나는 어릴 때부터 계속…… 그야말로 철들기 전부터 메르엘의 감시와 호위를 해왔어.」"

[[dialogue]]
speaker = "メルエル"
original = "「────」"
translation = "「────」"

[[dialogue]]
speaker = "unk"
original = "長年の幼なじみ──と思っていた相手からの告白に、メルエルが言葉を失って唖然とする。"
translation = "오랜 소꿉친구라고 생각했던 상대의 고백에 메르엘이 말을 잃고 망연자실한다."

[[dialogue]]
speaker = "ナターシャ"
original = "「私は仕事込みで新星学園に来てるからね。表向きは魔王って悪者でしょ？\u3000だから天界でも一応警戒して監視しようってなったの」"
translation = "「나는 업무를 포함해서 신성학원에 온 거니까. 겉으로는 마왕이라는 악당이잖아? 그래서 천계에서도 일단 경계해서 감시하자고 된 거야.」"

[[dialogue]]
speaker = "unk"
original = "ナターシャが新星学園にやってきた時、その任務は魔王である俺を監視することだと言っていた。"
translation = "나타샤가 신성학원에 왔을 때, 그 임무는 마왕인 나를 감시하는 것이라고 말했었다."

[[dialogue]]
speaker = "unk"
original = "だがナターシャが監視していた<ruby>魔王<rt>……</rt></ruby>には、メルエルも含まれていたんだ。"
translation = "하지만 나타샤가 감시하고 있던 마왕에는 메르엘도 포함되어 있었던 것이다."

[[dialogue]]
speaker = "ナターシャ"
original = "「私はリガルタから直々に指令を受けて、メルエルの護衛をしてたってわけ」"
translation = "「나는 리갈타에게 직접 지령을 받아서 메르엘의 호위를 해왔던 거지.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「えっと、ちょっと待って。リガルタは天界の魔王なのよね？」"
translation = "「저기, 잠깐 기다려 봐. 리갈타는 천계의 마왕인 거지?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「メルエルは魔王の血族で、そのリガルタから命令されていたってことは……」"
translation = "「메르엘은 마왕의 혈족이고, 그 리갈타에게 명령받았다는 건……」"

[[dialogue]]
speaker = "メルエル"
original = "「私は、リガルタ様の──」"
translation = "「나는 리갈타 님의──」"

[[dialogue]]
speaker = "ナターシャ"
original = "「娘だよ」"
translation = "「딸이야.」"

[[dialogue]]
speaker = "メルエル"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker = "ナターシャ"
original = "「メルエルも薄々気付いてたんじゃない？\u3000一緒に住んでる家族が、本当の家族じゃないって」"
translation = "「메르엘도 어렴풋이 눈치채고 있지 않았어? 함께 살고 있는 가족이 진짜 가족이 아니라는 걸.」"

[[dialogue]]
speaker = "メルエル"
original = "「それは……」"
translation = "「그건……」"

[[dialogue]]
speaker = "メルエル"
original = "（考えたことがないわけじゃない……お父さんもお母さんも、私のことをすごく大切にしてくれてるのは、わかる。私だって２人のことが大好きだ）"
translation = "（생각해 본 적이 없는 건 아니야…… 아빠도 엄마도 나를 정말 소중히 여겨주고 있다는 건 알아. 나도 두 사람을 정말 좋아해.）"

[[dialogue]]
speaker = "メルエル"
original = "（だけど私が人間界に来る時、お父さんの転勤が急に決まった。その時だけじゃない。不自然な転勤は今までも何度かあった）"
translation = "（하지만 내가 인간계에 올 때 아빠의 전근이 갑자기 결정됐어. 그때뿐만이 아니야. 부자연스러운 전근은 지금까지도 몇 번인가 있었어.）"

[[dialogue]]
speaker = "メルエル"
original = "（こっそり自分の出生記録を調べたりしたこともあったけど……ナターシャちゃんの話が本当なら、私なんかが１人で調べたってわかるわけなかったんだ）"
translation = "（몰래 내 출생 기록을 조사해 본 적도 있었지만…… 나타샤 짱의 말이 정말이라면 나 같은 게 혼자 조사해 봤자 알 수 있을 리가 없었어.）"

[[dialogue]]
speaker = "unk"
original = "思い当たる節があるのか、メルエルの顔から血の気が失せていく。"
translation = "짐작 가는 구석이 있는지 메르엘의 얼굴에서 핏기가 가신다."

[[dialogue]]
speaker = "梨緒"
original = "「じゃあ神殿の中でガーディアンが見せたあの幻影は……」"
translation = "「그럼 신전 안에서 가디언이 보여준 그 환영은……」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ああ、アレね」"
translation = "「아아, 그거 말이지.」"

[[dialogue]]
speaker = "ナターシャの母"
original = "『あなたの命は天界のためにある』"
translation = "『네 목숨은 천계를 위해 있다』"

[[dialogue]]
speaker = "ナターシャの母"
original = "『あの子を守りなさい。もしあの子が死ぬなら、あなたが代わりに死になさい』"
translation = "『그 아이를 지키렴. 만약 그 아이가 죽는다면 네가 대신 죽으렴』"

[[dialogue]]
speaker = "ナターシャの母"
original = "『それが天界に生きる天使たちのためであり、あなたの生まれた意味よ』"
translation = "『그것이 천계에 사는 천사들을 위한 길이며, 네가 태어난 의미란다』"

[[dialogue]]
speaker = "梨緒"
original = "「君の母は『あの子を守れ』と言っていた。それが──」"
translation = "「너의 어머니는 『그 아이를 지키라』고 했어. 그게──」"

[[dialogue]]
speaker = "ナターシャ"
original = "「そ。メルエルのこと」"
translation = "「그래. 메르엘을 말하는 거야.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「私も、私の母さんも、リガルタの部下で、聖庭園に仕えていた」"
translation = "「나도, 우리 엄마도 리갈타의 부하로 성정원을 섬기고 있었어.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「『メルエルが死ぬなら、お前が代わりに死ね』──そう命令され、その言葉を今までずっと守ってきた」"
translation = "「『메르엘이 죽는다면 네가 대신 죽어라』── 그런 명령을 받았고, 그 말을 지금까지 계속 지켜왔어.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「だから私は──あなたが嫌いだよ、メルエル」"
translation = "「그러니까 나는── 네가 싫어, 메르엘.」"

[[dialogue]]
speaker = "メルエル"
original = "「……っ」"
translation = "「……윽」"

[[dialogue]]
speaker = "ナターシャ"
original = "「いい顔。メルエルが泣いてるところ、昔から好きなんだよね」"
translation = "「좋은 표정이네. 메르엘이 울고 있는 모습, 옛날부터 좋아했거든.」"

[[dialogue]]
speaker = "梨緒"
original = "「ナターシャ、君は……」"
translation = "「나타샤, 너는……」"

[[dialogue]]
speaker = "アポロ"
original = "「うぅ……」"
translation = "「으으……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ナターシャちゃん……」"
translation = "「나타샤 짱……」"

[[dialogue]]
speaker = "ナターシャ"
original = "「──って、こんなくだらない話してる場合じゃなかった。このままじゃ天使も天界も危ないんだった」"
translation = "「──랄까, 이런 시시한 이야기를 하고 있을 때가 아니었지. 이대로라면 천사도 천계도 위험하니까.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「まぁホントのこと話して、メルエルのいい顔見れたから、私的には結果オーライって感じなんだけど」"
translation = "「뭐, 사실대로 말해서 메르엘의 좋은 표정을 볼 수 있었으니까, 나로서는 결과 오라이라는 느낌이지만.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「私情で脱線しちゃってごめんね。さて、仕事仕事っと」"
translation = "「사적인 감정으로 이야기가 샜네, 미안. 자, 일하자 일.」"

[[dialogue]]
speaker = "メルエル"
original = "「──ごめん、ナターシャちゃん」"
translation = "「──미안해, 나타샤 짱.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「……それは何に対してのごめん？\u3000別にメルエルは悪くないじゃん。命令したのはリガルタなんだしさ」"
translation = "「……그건 뭐에 대한 미안함이야? 딱히 메르엘은 잘못 없잖아. 명령한 건 리갈타니까.」"

[[dialogue]]
speaker = "メルエル"
original = "「私はたぶん、色んなことを知らない」"
translation = "「나는 아마, 많은 것들을 모르고 있어.」"

[[dialogue]]
speaker = "メルエル"
original = "「きっと私は、色んな人に守られてて……自分でも知らない色んなものの上に、私の平穏があったってことなんだよね」"
translation = "「분명 나는 수많은 사람에게 보호받고 있었고…… 스스로도 모르는 여러 희생 위에 나의 평온이 있었다는 거네.」"

[[dialogue]]
speaker = "メルエル"
original = "「ナターシャちゃんや、お父さん、お母さん……リガルタ様や、ナターシャちゃんのご両親……」"
translation = "「나타샤 짱이나, 아빠, 엄마…… 리갈타 님이나, 나타샤 짱의 부모님……」"

[[dialogue]]
speaker = "メルエル"
original = "「他にも、きっともっとたくさんの人たちのお世話になってたってことだと思う」"
translation = "「그 외에도 분명 훨씬 더 많은 분의 신세를 지고 있었던 거라고 생각해.」"

[[dialogue]]
speaker = "メルエル"
original = "「そういう色んなことを知らなかったこと、知ろうともしてなかったことが、悔しい」"
translation = "「그런 여러 가지를 몰랐던 것, 알려고도 하지 않았던 것이 분해.」"

[[dialogue]]
speaker = "メルエル"
original = "「私と一緒にいてくれたナターシャちゃんが、ずっと冷たい気持ちを隠していて……それに気づけなかったことが、悲しい」"
translation = "「나와 함께 있어 준 나타샤 짱이 계속 차가운 마음을 숨기고 있었고…… 그걸 알아채지 못했던 게 슬퍼.」"

[[dialogue]]
speaker = "メルエル"
original = "「でも……ううん、だから──」"
translation = "「하지만…… 아니, 그러니까──」"

[[dialogue]]
speaker = "メルエル"
original = "「教えて、ナターシャちゃん」"
translation = "「가르쳐 줘, 나타샤 짱.」"

[[dialogue]]
speaker = "メルエル"
original = "「私の為すべきこと。何を背負うために、今まで生かされてきたのか」"
translation = "「내가 해야 할 일. 무엇을 짊어지기 위해 지금까지 살아올 수 있었는지.」"

[[dialogue]]
speaker = "メルエル"
original = "「そういうこと、ちゃんと知りたい」"
translation = "「그런 것들을 제대로 알고 싶어.」"

[[dialogue]]
speaker = "unk"
original = "メルエルが潤んだ瞳で、ナターシャを真っ直ぐ見つめる。"
translation = "메르엘이 젖은 눈동자로 나타샤를 똑바로 응시한다."

[[dialogue]]
speaker = "unk"
original = "その目には、強く確かな意志が宿っていた。"
translation = "그 눈에는 강하고 확실한 의지가 깃들어 있었다."

[[dialogue]]
speaker = "ナターシャ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ふぅん、これが高貴な血筋の振る舞いってやつ？」"
translation = "「흐응, 이게 고귀한 혈통의 태도라는 거야?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「自分が何者なのか、少し前まで知らなかった癖に、覚悟ってそんなにすぐ決まるもの？」"
translation = "「자신이 누구인지 조금 전까지도 몰랐던 주제에, 각오가 그렇게 금방 정해지는 거야?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「メルエルのその目、私、嫌いだな」"
translation = "「메르엘의 그 눈, 나, 싫어하거든.」"

[[dialogue]]
speaker = "メルエル"
original = "「うん。そうだと思った」"
translation = "「응. 그럴 거라고 생각했어.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「はぁ……今のメルエルに何言っても効きそうにないなぁ。我ながら短い反逆だったね」"
translation = "「하아…… 지금의 메르엘에게는 무슨 말을 해도 안 통할 것 같네. 나름대로 짧은 반역이었어.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「んじゃまぁ、メルエルのお望み通り、伝えるべきことを伝えるよ。まずは嘘の訂正からだけど……」"
translation = "「그럼 뭐, 메르엘의 바람대로 전해야 할 것을 전해줄게. 우선은 거짓말의 정정부터지만……」"

[[dialogue]]
speaker = "ナターシャ"
original = "「聖庭園の長老リガルタは、もう何ヵ月も前に死んでる。先のフィヴォス流星群の時に、命と引き換えに聖庭園を守って、ね」"
translation = "「성정원의 장로 리갈타는 이미 몇 달 전에 죽었어. 지난 피보스 유성우 때, 목숨과 맞바꿔 성정원을 지키고서 말이야.」"

[[dialogue]]
speaker = "クロト"
original = "「なんだって……！？」"
translation = "「뭐라고……!?」"

[[dialogue]]
speaker = "unk"
original = "フィヴォス流星群──それは、リクリエの使徒だった時のアポロが起こした災害だ。"
translation = "피보스 유성우── 그것은 리크리에의 사도였던 시절의 아폴로가 일으킨 재앙이다."

[[dialogue]]
speaker = "unk"
original = "あの流星群は人間界だけではなく、魔界や天界でも同じように発生していたという。"
translation = "그 유성우는 인간계뿐만 아니라 마계나 천계에서도 똑같이 발생했다고 한다."

[[dialogue]]
speaker = "ナターシャ"
original = "「今はどこも慌ただしいから、リガルタの死は公にされてない。聖庭園の議員と、一部の関係者だけが知ってる秘密」"
translation = "「지금은 어디나 어수선하니까 리갈타의 죽음은 공표되지 않았어. 성정원의 의원과 일부 관계자만 알고 있는 비밀이지.」"

[[dialogue]]
speaker = "メルエル"
original = "「そう……だったんだ」"
translation = "「그랬……구나.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「私もその場に居合わせて、彼の最期を看取った」"
translation = "「나도 그 자리에 함께 있었고, 그의 임종을 지켜봤어.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「私的には、ざまぁ──って言いたいとこなんだけど、一番偉いやつが命張っちゃったからね。末端の私としては文句言えなくなったわけ」"
translation = "「나로서는 꼴좋다──라고 말하고 싶은 참이지만, 제일 높은 녀석이 목숨을 걸어버렸으니까 말이야. 말단인 나로서는 불평할 수 없게 된 거지.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「人に命を張らせておいて自分の娘は大事とか、ほんと嫌いなジジイだったけど、そこはちゃんと責務を果たしたと思うよ」"
translation = "「남에게는 목숨을 걸게 해놓고 자기 딸은 소중하다니, 정말 싫은 영감탱이였지만, 그 부분은 제대로 책무를 다했다고 생각해.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「で、そのリガルタから預かり物」"
translation = "「자, 그리고 그 리갈타가 맡긴 물건.」"

[[dialogue]]
speaker = "unk"
original = "そう言ってナターシャが取り出したものは──"
translation = "그렇게 말하며 나타샤가 꺼낸 것은──"

[[dialogue]]
speaker = "メルエル"
original = "「これは……鍵？」"
translation = "「이건…… 열쇠?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「そう、鍵」"
translation = "「그래, 열쇠.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「聖庭園の地下に宝物庫があって、『魔王の血を引く天使』がこの鍵を使うことで、扉が開くんだってさ」"
translation = "「성정원 지하에 보물고가 있는데, 『마왕의 피를 이어받은 천사』가 이 열쇠를 사용하면 문이 열린대.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「んで、宝物庫の中にはアルケインコードが刻まれた秘宝があるらしいよ」"
translation = "「그리고 보물고 안에는 아르케인 코드가 새겨진 비보가 있다는 모양이야.」"

[[dialogue]]
speaker = "メルエル"
original = "「アルケインコード──！\u3000確か、ノヴァフォームにも必要なものなんだよね？」"
translation = "「아르케인 코드──! 분명 노바 폼에도 필요한 거였지?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「そう。魔王の系譜にある者だけが会得できる秘術」"
translation = "「맞아. 마왕의 계보에 있는 자만이 터득할 수 있는 비술.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「私はどんなコードが刻まれてるかは知らないし、今使えるものかどうかもわからないけどね」"
translation = "「나는 어떤 코드가 새겨져 있는지는 모르고, 지금 쓸 수 있는 건지도 모르겠지만 말이야.」"

[[dialogue]]
speaker = "メルエル"
original = "「でもそのアルケインコードがあれば、天界を守れるかもしれない……！」"
translation = "「하지만 그 아르케인 코드가 있다면 천계를 지킬 수 있을지도 몰라……!」"

[[dialogue]]
speaker = "メルエル"
original = "「ありがとう、ナターシャちゃん。その鍵、使わせてもらうね」"
translation = "「고마워, 나타샤 짱. 그 열쇠, 사용할게.」"

[[dialogue]]
speaker = "unk"
original = "メルエルが決意を込めた表情で、ナターシャの手から鍵を受け取る。"
translation = "메르엘이 결의를 담은 표정으로 나타샤의 손에서 열쇠를 받아 든다."

[[dialogue]]
speaker = "メルエル"
original = "「話したいこと、いっぱいあるけど……今は天界を救う方法を考えるのが先だから」"
translation = "「하고 싶은 말은 잔뜩 있지만…… 지금은 천계를 구할 방법을 생각하는 게 먼저니까.」"

[[dialogue]]
speaker = "メルエル"
original = "「聖庭園を守った後に……お話する時間を作ってくれたら、嬉しいな」"
translation = "「성정원을 지킨 뒤에…… 이야기할 시간을 내준다면 기쁠 거야.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「はぁ……私、メルエルのそういう底なしに前向きなところ、本当に嫌い」"
translation = "「하아…… 나, 메르엘의 그런 끝없이 긍정적인 부분, 정말 싫어.」"

[[dialogue]]
speaker = "メルエル"
original = "「いいよ、私のこと嫌いでも」"
translation = "「괜찮아, 나를 싫어해도.」"

[[dialogue]]
speaker = "メルエル"
original = "「だって、ほんとの気持ちを言ってくれないよりはずっといいから」"
translation = "「그치만 진심을 말해주지 않는 것보다는 훨씬 나으니까.」"

[[dialogue]]
speaker = "unk"
original = "メルエルはナターシャの呆れる顔から目を逸らさず、そう言って微笑むのだった。"
translation = "메르엘은 어이없어하는 나타샤의 얼굴에서 눈을 떼지 않고 그렇게 말하며 미소 짓는 것이었다."

