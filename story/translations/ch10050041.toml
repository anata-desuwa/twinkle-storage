[[dialogue]]
speaker = "unk"
original = "第１話,ソフィアのパンケーキ,P"
translation = "제1화,소피아의 팬케이크,P"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「サラン、またお菓子を貰いにきたゆ！」"
translation = "「사란, 또 과자를 받으러 왔유!」"

[[dialogue]]
speaker = "サラン"
original = "「ぽよ？\u3000ジャクリーヌちゃんいらっしゃいなの～♪」"
translation = "「뽀요? 재클린짱 어서 오시라요~♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「トリックオアトリート。お菓子をよこすゆ～♪」"
translation = "「트릭 오어 트릿. 과자를 내놓으라유~♪」"

[[dialogue]]
speaker = "ソフィア"
original = "「ジャクリーヌさん、今日でなくてもよくサラン先輩にお菓子をねだりにいっているのでしょう？」"
translation = "「재클린 씨, 오늘이 아니더라도 사란 선배에게 자주 과자를 조르러 가시지 않나요?」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「サランのお菓子は絶品なの！\u3000いつだって食べたいゆ♪」"
translation = "「사란의 과자는 일품이라유! 언제든지 먹고 싶다유♪」"

[[dialogue]]
speaker = "サラン"
original = "「会長ちゃんにソフィアちゃんもいらっしゃ～い♪」"
translation = "「회장짱에게 소피아짱도 어서 오시라요~♪」"

[[dialogue]]
speaker = "ソフィア"
original = "「ハロウィンパーティーは盛況のようですが、サラン先輩のお店も大繁盛しているようですね」"
translation = "「할로윈 파티는 성황인 것 같습니다만, 사란 선배의 가게도 대성황인 것 같네요」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「行列が出来てたゆ！」"
translation = "「줄이 길게 늘어서 있었유!」"

[[dialogue]]
speaker = "サラン"
original = "「おかげさまでなの～」"
translation = "「덕분이라요~」"

[[dialogue]]
speaker = "ソフィア"
original = "「さすがはお菓子作りの天才です」"
translation = "「역시 과자 만들기의 천재이십니다」"

[[dialogue]]
speaker = "ソフィア"
original = "「それで……お願いしていた、アレは……どうでしょう……？」"
translation = "「그래서…… 부탁드렸던, 그것은…… 어떻게 되었을까요……?」"

[[dialogue]]
speaker = "サラン"
original = "「もちろん用意できてるよ～♪」"
translation = "「물론 준비되어 있다요~♪」"

[[dialogue]]
speaker = "ソフィア"
original = "「あ、ありがとうございます！」"
translation = "「아, 감사합니다!」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ソフィアはサランに何かお願いしてたゆ？」"
translation = "「소피아는 사란에게 뭔가 부탁했유?」"

[[dialogue]]
speaker = "ソフィア"
original = "「実はパンケーキをお願いしていたのです」"
translation = "「실은 팬케이크를 부탁드렸습니다」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「パンケーキ？\u3000ソフィアはパンケーキが好きなのかゆ？」"
translation = "「팬케이크? 소피아는 팬케이크를 좋아하는 거유?」"

[[dialogue]]
speaker = "ソフィア"
original = "「ケーキの中では１番好きですね」"
translation = "「케이크 중에서는 가장 좋아합니다」"

[[dialogue]]
speaker = "ソフィア"
original = "「私の生まれ育ったレゾフという土地は年中雪に覆われた冷たい場所でした」"
translation = "「제가 태어나고 자란 레조프라는 땅은 일 년 내내 눈에 덮인 차가운 장소였습니다」"

[[dialogue]]
speaker = "ソフィア"
original = "「そんな故郷で食べられるケーキと言えば、復活祭で食べられる『クリーチ』だけだったのですが……」"
translation = "「그런 고향에서 먹을 수 있는 케이크라고 하면, 부활절에 먹을 수 있는 『크리치』뿐이었는데……」"

[[dialogue]]
speaker = "ソフィア"
original = "「人間界にやってきて、それこそ多種多様なケーキが存在していることを知りました」"
translation = "「인간계에 와서, 그야말로 다종다양한 케이크가 존재한다는 것을 알게 되었습니다」"

[[dialogue]]
speaker = "ソフィア"
original = "「中でも私を魅了したのがパンケーキです！」"
translation = "「그중에서도 저를 매료시킨 것이 팬케이크입니다!」"

[[dialogue]]
speaker = "ソフィア"
original = "「あのフワフワの柔らかさ。口に含んだだけでホカホカしてしまう温かさ……まさにケーキオブケーキです！」"
translation = "「그 폭신폭신한 부드러움. 입에 머금는 것만으로도 따끈따끈해지는 따뜻함…… 그야말로 케이크 중의 케이크입니다!」"

[[dialogue]]
speaker = "ソフィア"
original = "「私のハロウィンフォームにパンケーキを作る機能が備わっているのは、そのリスペクトを表しているのかもしれません」"
translation = "「제 할로윈 폼에 팬케이크를 만드는 기능이 갖춰져 있는 것은, 그 존경심을 나타내는 것일지도 모릅니다」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「自分で作れるなら、パンケーキはいつでも食べられるゆ？\u3000なのにどうしてサランにお願いしたんだゆ？」"
translation = "「스스로 만들 수 있다면, 팬케이크는 언제든지 먹을 수 있는 거유? 그런데 왜 사란에게 부탁한 거유?」"

[[dialogue]]
speaker = "ソフィア"
original = "「何を言うんです！\u3000お菓子作りの天才、サラン先輩の作るパンケーキですよ！\u3000そんなの特別美味しいに決まってます！」"
translation = "「무슨 말씀을 하시는 건가요! 과자 만들기의 천재, 사란 선배가 만드는 팬케이크예요! 그런 건 특별히 맛있을 게 당연합니다!」"

[[dialogue]]
speaker = "ソフィア"
original = "「だからひとつ選べと言われたら、パンケーキ一択に決まってます！」"
translation = "「그러니 하나를 고르라고 한다면, 팬케이크 일택일 게 당연합니다!」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「それはそうゆ！\u3000サランの作るケーキなら特別ゆ！」"
translation = "「그건 그렇유! 사란이 만드는 케이크라면 특별하유!」"

[[dialogue]]
speaker = "ソフィア"
original = "「わかっていただけたところで……サラン先輩、お願いします」"
translation = "「이해해 주셨으니…… 사란 선배, 부탁드립니다」"

[[dialogue]]
speaker = "サラン"
original = "「はい、どうぞ～♪」"
translation = "「네, 여기요~♪」"

[[dialogue]]
speaker = "ソフィア"
original = "「おおおお～～～～<emoji=heart04>」"
translation = "「오오오오~~~~<emoji=heart04>」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「香りだけでもう美味しそうなの<emoji=heart04>」"
translation = "「향기만으로도 벌써 맛있을 것 같유<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
original = "「では、さっそく頂きますね……あ～、んむっ<emoji=heart04>」"
translation = "「그럼, 바로 맛보겠습니다…… 아~, 음<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
original = "「お、美味しい……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「마, 맛있어……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
original = "「口の中に入れたら溶けて消えそうな柔らかい舌触り……確かなのにしつこさを感じさせない甘味……」"
translation = "「입안에 넣으면 녹아 사라질 듯한 부드러운 감촉…… 확실하면서도 느끼함을 느끼게 하지 않는 단맛……」"

[[dialogue]]
speaker = "ソフィア"
original = "「最高です！\u3000今まで食べたパンケーキの中でも１番です！\u3000みなさーん、理想のパンケーキはここにありましたよ～っ！」"
translation = "「최고예요! 지금까지 먹었던 팬케이크 중에서도 최고입니다! 여러분, 이상적인 팬케이크는 여기에 있었습니다!」"

[[dialogue]]
speaker = "サラン"
original = "「えへへ、ありがとう～♪」"
translation = "「에헤헤, 고마워요~♪」"

[[dialogue]]
speaker = "ソフィア"
original = "「あむっ、もぐもぐ……こうなってくると、ひと口ひと口味わって大切に食べたいですね……一度に食べてしまうなんてもったいない」"
translation = "「냠, 우물우물…… 이렇게 되니, 한 입 한 입 음미하며 소중히 먹고 싶네요…… 한 번에 다 먹어버리는 건 아까워요」"

[[dialogue]]
speaker = "サラン"
original = "「心配しなくてもたくさん作ってあるから大丈夫……ぽよ？」"
translation = "「걱정 안 해도 많이 만들어 뒀으니 괜찮다요…… 뽀요?」"

[[dialogue]]
speaker = "ソフィア"
original = "「ん、どうしました？」"
translation = "「응, 무슨 일인가요?」"

[[dialogue]]
speaker = "サラン"
original = "「無くなっちゃったみたい……」"
translation = "「없어져 버린 것 같다요……」"

[[dialogue]]
speaker = "ソフィア"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker = "サラン"
original = "「たくさん作ってたんだけど、ジャクリーヌちゃんが……」"
translation = "「많이 만들었었는데, 재클린짱이……」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「本当なの！\u3000すっごく美味しいパンケーキなの！」"
translation = "「정말이라유! 엄청 맛있는 팬케이크라유!」"

[[dialogue]]
speaker = "サラン"
original = "「いつの間にか残りを全部食べちゃったみたい」"
translation = "「어느새 나머지를 전부 먹어버린 것 같다요」"

[[dialogue]]
speaker = "ソフィア"
original = "「がーーーーーーーーーーーーん！！！！！！！！」"
translation = "「가ーーーーーーーーーーーー앙!!!!!!!!」"

[[dialogue]]
speaker = "サラン"
original = "「ジャクリーヌちゃん。それはソフィアちゃんのために作ったものなんだから勝手に食べちゃダメかも～」"
translation = "「재클린짱. 그건 소피아짱을 위해 만든 거니까 마음대로 먹으면 안 된다요~」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ソフィアが美味しそうに食べるから我慢できなかったゆ」"
translation = "「소피아가 맛있게 먹으니까 참을 수 없었유」"

[[dialogue]]
speaker = "ソフィア"
original = "「あ……あ……私の……パンケーキ……」"
translation = "「아…… 아…… 나의…… 팬케이크……」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「わ、悪気はなかったゆ～！！！」"
translation = "「자, 악의는 없었유~!!!」"

[[dialogue]]
speaker = "サラン"
original = "「逃げちゃだめだよ～、えいっ」"
translation = "「도망치면 안 된다요~, 에잇」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ゆゆっ！？\u3000動けないゆ！！」"
translation = "「유윳!? 움직일 수 없다유!!」"

[[dialogue]]
speaker = "サラン"
original = "「ジャクリーヌちゃんは１ヶ月おやつ抜きだよ～」"
translation = "「재클린짱은 한 달간 간식 금지라요~」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ゆ！？\u3000それは酷いゆ！」"
translation = "「유!? 그건 너무 심하유!」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「何とか３日、いや２日で許して欲しいの！\u3000１ヶ月もサランのお菓子を食べられないなんて死んじゃうの！」"
translation = "「어떻게든 3일, 아니 2일로 용서해 주길 바란다유! 한 달 동안 사란의 과자를 못 먹는 건 죽는 거유!」"

[[dialogue]]
speaker = "サラン"
original = "「だめです♪\u3000ちゃんと反省しようね～」"
translation = "「안 돼요♪ 제대로 반성하자요~」"

[[dialogue]]
speaker = "サラン"
original = "「ソフィアちゃん、パンケーキのおかわりはすぐに用意するから安心してね～」"
translation = "「소피아짱, 팬케이크는 바로 준비할 테니 안심하라요~」"

[[dialogue]]
speaker = "ソフィア"
original = "「ほ、本当ですか！？」"
translation = "「호, 정말인가요!?」"

[[dialogue]]
speaker = "サラン"
original = "「ぽよ～、任せて～」"
translation = "「뽀요~, 맡겨 달라요~」"

[[dialogue]]
speaker = "unk"
original = "その後、新たにパンケーキが用意され、ソフィアとついでに俺も一緒にそれを味わうことが出来たのだった。"
translation = "그 후, 새로 팬케이크가 준비되었고, 소피아와 덤으로 나도 함께 그것을 맛볼 수 있었다."

[[dialogue]]
speaker = "unk"
original = "その間、隣で悲痛な叫びを上げているジャクリーヌを尻目に──"
translation = "그동안, 옆에서 비통한 절규를 내뱉고 있는 재클린을 뒤로하고서──"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ごめんなさいなの～！\u3000もうしないから許して欲しいゆ～～～～～っ！！！」"
translation = "「죄송하다요~! 다시는 안 그럴 테니 용서해 주길 바란다유~~~~~~~!!!」"

