[[dialogue]]
speaker = "unk"
original = "第９話,未熟でも、二人なら,B"
translation = "제9화, 미숙하더라도, 둘이서라면, B"

[[dialogue]]
speaker = "クロト"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "午後５時──今日の活動を始めて半日が過ぎた。"
translation = "오후 5시── 오늘의 활동을 시작하고 반나절이 지났다."

[[dialogue]]
speaker = "unk"
original = "俺は、そろそろレゾフへ戻ろうと……"
translation = "나는, 슬슬 레조프로 돌아가려고……"

[[dialogue]]
speaker = "フィオナ"
original = "「──緋宮会長」"
translation = "「──히노미야 회장」"

[[dialogue]]
speaker = "クロト"
original = "「……フィオナ」"
translation = "「……피오나」"

[[dialogue]]
speaker = "unk"
original = "街の裏手には、フィオナが待ち構えていた。"
translation = "마을 뒷편에는, 피오나가 기다리고 있었다."

[[dialogue]]
speaker = "フィオナ"
original = "「危ないですよ。その近辺には──強大な魔獣のねぐらが固まっていると、親切な旅人さんも言っていました」"
translation = "「위험합니다. 그 근처에는── 강대한 마수의 소굴이 모여 있다고, 친절한 떠돌이 여행자 씨도 말했습니다」"

[[dialogue]]
speaker = "クロト"
original = "「……ああ。それは俺も聞いた」"
translation = "「……아아. 그건 나도 들었어」"

[[dialogue]]
speaker = "クロト"
original = "「だから、今のうちに一掃しておいたんだ。万が一ってこともある──街の近くは片付けておいたほうが安全だろ」"
translation = "「그래서, 지금 당장 일소해 뒀어. 만일의 경우도 있으니까── 마을 근처는 정리해 두는 편이 안전하잖아」"

[[dialogue]]
speaker = "フィオナ"
original = "「お一人で……ですか？」"
translation = "「혼자서…… 말인가요?」"

[[dialogue]]
speaker = "クロト"
original = "「聞き込みを終えて、時間が余ってたからな」"
translation = "「탐문을 마치고, 시간이 남아서 말이야」"

[[dialogue]]
speaker = "unk"
original = "他のみんなの手を煩わせるわけにもいかなかった──"
translation = "다른 모두의 수고를 끼칠 수도 없었다──"

[[dialogue]]
speaker = "unk"
original = "俺はそう付け足して、街へ戻ろうとする……。"
translation = "나는 그렇게 덧붙이고, 마을로 돌아가려고 한다……."

[[dialogue]]
speaker = "フィオナ"
original = "「本当に、それだけでしょうか」"
translation = "「정말로, 그것뿐일까요」"

[[dialogue]]
speaker = "unk"
original = "しかしフィオナは俺を阻むようにして、こちらをどっしりと睨んでいた。"
translation = "하지만 피오나는 나를 가로막듯이, 이쪽을 굳건히 노려보고 있었다."

[[dialogue]]
speaker = "フィオナ"
original = "「『森』を探していたんじゃないですか？」"
translation = "「『숲』을 찾고 있었던 것 아닌가요?」"

[[dialogue]]
speaker = "クロト"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "フィオナ"
original = "「図星ですね。お一人で──近くの森林地帯へ出向き、魔獣すら掃討しながらヴィーナスさんを探していた」"
translation = "「정곡을 찔렀네요. 혼자서── 근처의 산림 지대로 가서, 마수조차 소탕하면서 비너스 씨를 찾고 있었다」"

[[dialogue]]
speaker = "フィオナ"
original = "「長老さんから聞きました。北方へ向かえば、手つかずの針葉樹林がいくつも広がっていると」"
translation = "「장로님에게 들었습니다. 북쪽으로 향하면, 손대지 않은 침엽수림이 여러 개 펼쳐져 있다고」"

[[dialogue]]
speaker = "unk"
original = "どうやらお見通しらしかった。俺は素直に白状する。"
translation = "아무래도 꿰뚫어 본 모양이었다. 나는 솔직하게 자백한다."

[[dialogue]]
speaker = "クロト"
original = "「みんなで向かう前に、ある程度の目星はつけておいた方がいいかと思ってさ」"
translation = "「모두가 가기 전에, 어느 정도의 짐작은 해두는 편이 좋을 것 같아서」"

[[dialogue]]
speaker = "クロト"
original = "「レゾフの住人だって寄りつかないような地帯だ。前もって現場を見ておいたほうが安全だろ」"
translation = "「레조프의 주민조차 가까이 가지 않는 지대다. 미리 현장을 봐두는 편이 안전하잖아」"

[[dialogue]]
speaker = "フィオナ"
original = "「確かに──効率の面だけで言えば有益なことかもしれません。でも」"
translation = "「확실히── 효율적인 면만 본다면 유익한 일일지도 모릅니다. 하지만」"

[[dialogue]]
speaker = "フィオナ"
original = "「ここは魔界。私たちの想像もつかない脅威が、どこに潜んでいるともしれないんです」"
translation = "「여기는 마계. 우리의 상상도 할 수 없는 위협이, 어디에 숨어 있을지 모릅니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「なのに……お一人で魔獣の巣を掃討するなんて、危険すぎます。緋宮会長の実力があったとしても！」"
translation = "「그런데…… 혼자서 마수의 소굴을 소탕하다니, 너무 위험합니다. 히노미야 회장의 실력이 있었다고 해도!」"

[[dialogue]]
speaker = "クロト"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "フィオナ"
original = "「──無理をしないでください。緋宮会長」"
translation = "「──무리하지 마세요. 히노미야 회장」"

[[dialogue]]
speaker = "クロト"
original = "「……っ」"
translation = "「……윽」"

[[dialogue]]
speaker = "unk"
original = "接近したフィオナが──ぎゅっと俺の両手を握った。"
translation = "가까이 다가온 피오나가── 꽉 나의 양손을 잡았다."

[[dialogue]]
speaker = "unk"
original = "冷え切った掌に、彼女の熱が伝わってくる。"
translation = "차가워진 손바닥에, 그녀의 열이 전해져 온다."

[[dialogue]]
speaker = "フィオナ"
original = "「ほら。両手にこんな傷をつけて……きっと激しい戦闘になったんですよね」"
translation = "「이것 보세요. 양손에 이런 상처를 내고…… 분명 격렬한 전투가 있었던 거겠죠」"

[[dialogue]]
speaker = "フィオナ"
original = "「今日だって──ほとんど寝れていないはずです。昨日も不眠の状態だったのに」"
translation = "「오늘도── 거의 잠을 못 잤을 겁니다. 어제도 불면 상태였는데」"

[[dialogue]]
speaker = "クロト"
original = "「……仮眠はしたさ。それに、俺は自前で回復だって……」"
translation = "「……가면은 했어. 게다가, 나는 스스로 회복도……」"

[[dialogue]]
speaker = "フィオナ"
original = "「足りません。煌竜を倒し、黒騎士と戦って、ネビュラとも……消耗は過去にないほど<ruby>著<rt>いちじる</rt></ruby>しいはずなんです」"
translation = "「부족합니다. 황룡을 쓰러뜨리고, 검은 기사와 싸우고, 네뷸라와도…… 소모는 과거에 없을 정도로 현저할 것입니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「昨日の夜もそうでした。マトイさんのことを気遣って、私たちを休ませながらも……緋宮会長は夜になると抜け出していた」"
translation = "「어젯밤에도 그랬습니다. 마토이 씨를 배려해서, 우리를 쉬게 하면서도…… 히노미야 회장은 밤이 되면 빠져나갔습니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「気持ちが先走ってしまうのはわかります。そんな中でも、星徒会長として仲間に気配りするところも尊敬します」"
translation = "「마음이 앞서 나가는 것은 이해합니다. 그런 와중에도, 성도 회장으로서 동료에게 신경 쓰는 점도 존경합니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「ですが……もう少しくらい、私たちを頼ってくれてもいいんじゃないでしょうか。せっかくの仲間なんですから」"
translation = "「하지만…… 조금 더, 우리를 의지해 줘도 괜찮지 않을까요. 모처럼의 동료이지 않습니까」"

[[dialogue]]
speaker = "クロト"
original = "「フィオナ……」"
translation = "「피오나……」"

[[dialogue]]
speaker = "フィオナ"
original = "「私は少し前、計り知れない試練に見舞われて、自分一人ではどうしようもなくなった時、ヴィーナスさんならどうするのかを尋ねました」"
translation = "「저는 조금 전, 헤아릴 수 없는 시련에 닥쳐서, 저 혼자서는 어떻게 할 수 없게 되었을 때, 비너스 씨라면 어떻게 할지 물었습니다」"

[[dialogue]]
speaker = "クロト"
original = "「ヴィーナスは、なんて……？」"
translation = "「비너스는, 뭐라고……?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ま、みんなに任せればいいんじゃない？\u3000私たちって１人じゃないし♪」"
translation = "「뭐, 모두에게 맡기면 되지 않을까? 우리들은 혼자가 아니잖아♪」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私が頼ってるのはクロトだけじゃないもの。アナにもマトイにもサーシャさんにも、最近じゃ流星のみんなにだってお世話になってる」"
translation = "「내가 의지하는 건 쿠로토뿐만이 아닌 걸. 아나에게도 마토이에게도 사샤 씨에게도, 요즘은 유성의 모두에게도 신세를 지고 있어」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「もちろんフィオナもね。だから──もし絶望的な未来が見えたら、お任せしちゃうかも！」"
translation = "「물론 피오나도. 그러니까── 만약 절망적인 미래가 보인다면, 맡겨버릴지도!」"

[[dialogue]]
speaker = "クロト"
original = "「ははっ……そりゃなんとも、ヴィーナスらしいセリフだ」"
translation = "「하하…… 그거 참, 비너스다운 대사군」"

[[dialogue]]
speaker = "フィオナ"
original = "「はい。私もとてもそう思います」"
translation = "「네. 저도 정말 그렇게 생각합니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「自分にできないことは、全部できそうな仲間に丸投げ……それこそが、新星学園星徒会フィクサーの真の力なのでしょう」"
translation = "「자신이 할 수 없는 일은, 전부 할 수 있을 것 같은 동료에게 떠넘기기…… 그것이야말로, 신성 학원 성도회 픽서의 진정한 힘일 것입니다」"

[[dialogue]]
speaker = "unk"
original = "確かにその通りだ。"
translation = "확실히 그 말대로다."

[[dialogue]]
speaker = "unk"
original = "ヴィーナスはいつも無茶振りで、唐突で、猪突猛進で……だけど、いつだって俺たち仲間を頼りにしていた。"
translation = "비너스는 언제나 억지스럽고, 돌발적이고, 저돌맹진이었지만…… 하지만, 언제나 우리 동료들을 의지하고 있었다."

[[dialogue]]
speaker = "unk"
original = "俺はそれを彼女なりのわがままだと捉えていた。でも……"
translation = "나는 그것을 그녀 나름의 제멋대로라고 생각했다. 하지만……"

[[dialogue]]
speaker = "クロト"
original = "「……それで、いいのか」"
translation = "「……그래도, 괜찮은 건가」"

[[dialogue]]
speaker = "クロト"
original = "「マトイやサーシャ先輩、それにフィオナたちを頼っても……」"
translation = "「마토이나 사샤 선배, 그리고 피오나들을 의지해도……」"

[[dialogue]]
speaker = "フィオナ"
original = "「もちろんです。私たちは別の学園ですが──今は運命共同体です」"
translation = "「물론입니다. 우리는 다른 학원이지만── 지금은 운명 공동체입니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「本当に大事な想いなら……抱え込まないで、仲間に打ち明けてください。私たちだってそれを背負えます」"
translation = "「정말로 소중한 마음이라면…… 혼자서 짊어지지 말고, 동료에게 털어놓으세요. 우리도 그것을 짊어질 수 있습니다」"

[[dialogue]]
speaker = "クロト"
original = "「フィオナ……ありがとう。そうかもな」"
translation = "「피오나…… 고마워. 그럴지도 모르겠네」"

[[dialogue]]
speaker = "クロト"
original = "「ちょっと──先走りすぎてたみたいだ。みんなに心配かけてちゃ本末転倒だな」"
translation = "「좀── 너무 앞서 나갔던 것 같다. 모두에게 걱정을 끼치면 본말전도지」"

[[dialogue]]
speaker = "フィオナ"
original = "「ええ。わかってくれればよいのです」"
translation = "「네. 알아주시면 됩니다」"

[[dialogue]]
speaker = "unk"
original = "凝り固まっていた考えが、フィオナの温かい言葉によって氷解していく気がした。"
translation = "굳어 있던 생각이, 피오나의 따뜻한 말에 의해 얼음이 녹듯 풀리는 기분이 들었다."

[[dialogue]]
speaker = "クロト"
original = "「それにしても……はは。フィオナにこんなことを言われるなんて、思わなかったよ」"
translation = "「그렇다고 해도…… 하하. 피오나에게 이런 말을 들을 줄은, 생각도 못 했어」"

[[dialogue]]
speaker = "フィオナ"
original = "「あ……」"
translation = "「아……」"

[[dialogue]]
speaker = "フィオナ"
original = "「仮面の少女アポロを抹殺します──願わくは、私自ら、この手で」"
translation = "「가면의 소녀 아폴로를 말살하겠습니다── 바라건대, 저 스스로, 이 손으로」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「フィオナは──自分の役目に縛られすぎてる。無理をしすぎよ、どう見ても」"
translation = "「피오나는── 자신의 역할에 너무 얽매여 있어. 너무 무리하고 있어, 아무리 봐도」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「本当はお姉さんのことを助けたいのに……みんなに迷惑がかかるからって、本心を押し殺してる。違う？」"
translation = "「사실은 언니를 돕고 싶은데…… 모두에게 폐가 될까 봐, 본심을 억누르고 있어. 아니야?」"

[[dialogue]]
speaker = "フィオナ"
original = "「……お恥ずかしい。いつか、ヴィーナスさんにも指摘されました」"
translation = "「……부끄럽습니다. 언젠가, 비너스 씨에게도 지적받았습니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「自分のことがよく見えていない──未熟なのは、お互い様だったようですね」"
translation = "「자신의 일이 잘 보이지 않는다── 미숙한 것은, 피차일반이었던 것 같네요」"

[[dialogue]]
speaker = "クロト"
original = "「かもしれないな。人間としても、魔王としても」"
translation = "「그럴지도 모르겠네. 인간으로서도, 마왕으로서도」"

[[dialogue]]
speaker = "クロト"
original = "「でもそれは──まだまだ伸びしろがあるってことだろ」"
translation = "「하지만 그것은── 아직 성장할 여지가 있다는 거잖아」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふふ、そうですね」"
translation = "「후후, 그렇네요」"

[[dialogue]]
speaker = "フィオナ"
original = "「それに──じっとしていられないのは私も同じ」"
translation = "「게다가── 가만히 있지 못하는 것은 저도 마찬가지」"

[[dialogue]]
speaker = "フィオナ"
original = "「なら、未熟な者同士……せめて高め合うべきじゃないでしょうか」"
translation = "「그렇다면, 미숙한 사람끼리…… 하다못해 서로 발전해야 하지 않을까요」"

[[dialogue]]
speaker = "クロト"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker = "クロト"
original = "「手合わせ──ってことか？」"
translation = "「맞대결── 이라는 건가?」"

[[dialogue]]
speaker = "フィオナ"
original = "「ええ。鍛錬の相手というなら、魔獣よりも不足はないかと」"
translation = "「네. 단련 상대라고 한다면, 마수보다 부족함이 없을 것입니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「それに──今の私たちならきっと。お互いに、得られるものがあるはずです」"
translation = "「게다가── 지금의 우리라면 분명. 서로에게, 얻을 수 있는 것이 있을 것입니다」"

[[dialogue]]
speaker = "クロト"
original = "「今の……なるほどな」"
translation = "「지금의…… 과연」"

[[dialogue]]
speaker = "マグダレナ"
original = "「魔王──そう呼ばれた存在の系譜です」"
translation = "「마왕── 그렇게 불린 존재의 계보입니다」"

[[dialogue]]
speaker = "クロト"
original = "「……わかった」"
translation = "「……알았다」"

[[dialogue]]
speaker = "クロト"
original = "「敵は黒騎士──得体も知れない最強の相手だ。足りないものを埋め合うなら、今しかない」"
translation = "「적은 검은 기사── 정체도 알 수 없는 최강의 상대다. 부족한 것을 서로 채울 수 있다면, 지금밖에 없어」"

[[dialogue]]
speaker = "フィオナ"
original = "「ええ。磨き上げましょう──あの影に届くまで、私たちの刃を」"
translation = "「네. 갈고닦읍시다── 그 그림자에 닿을 때까지, 우리의 칼날을」"

