[[dialogue]]
speaker = "unk"
original = "第４話,親友と恋人,P"
translation = "제4화, 절친과 연인, P"

[[dialogue]]
speaker = "unk"
original = "ある日の放課後――俺が星徒会の仕事を終えて帰り支度をしていたところで、ヒトリが何やら神妙な顔つきで訪ねてきた。"
translation = "어느 날 방과 후―― 내가 성도회 일을 마치고 돌아갈 준비를 하고 있을 때 히토리가 왠지 진지한 표정으로 찾아왔다."

[[dialogue]]
speaker = "ヒトリ"
original = "「あ、あの……会長さん。今日は大事なお話がありまして……」"
translation = "「저, 저기…… 회장님. 오늘은 중요한 드릴 말씀이 있어서요……」"

[[dialogue]]
speaker = "unk"
original = "ヒトリ、何かあったのか？"
translation = "히토리, 무슨 일 있어?"

[[dialogue]]
speaker = "ヒトリ"
original = "「その……今日はわたしが、というよりも…」"
translation = "「그게…… 오늘은 제가라기보다는……」"

[[dialogue]]
speaker = "ヒトリ"
original = "「ゆーちゃんが、会長さんと話したいと言っていて……」"
translation = "「유짱이 회장님이랑 이야기하고 싶다고 해서……」"

[[dialogue]]
speaker = "ゆーちゃん"
original = "「ゆー……」"
translation = "「유우……」"

[[dialogue]]
speaker = "unk"
original = "ヒトリの友達である、ゆーちゃん。俺はその姿を、たまにしか見ることができない。"
translation = "히토리의 친구인 유짱. 나는 그 모습을 가끔밖에 볼 수 없다."

[[dialogue]]
speaker = "unk"
original = "基本的には、時々気配を感じたり、声が聞こえたり聞こえなかったりするぐらい。今日は、小さいながらも声を聴きとることができる。"
translation = "기본적으로는 때때로 기척을 느끼거나 목소리가 들리기도 하고 안 들리기도 하는 정도. 오늘은 작게나마 목소리를 알아들을 수 있다."

[[dialogue]]
speaker = "ヒトリ"
original = "「実はゆーちゃん……最近、成仏を考え始めているらしくて……」"
translation = "「사실 유짱…… 최근에 성불을 생각하기 시작한 것 같아서……」"

[[dialogue]]
speaker = "unk"
original = "えっ！？\u3000そんな、どうして……"
translation = "엣!? 설마, 어째서……"

[[dialogue]]
speaker = "ヒトリ"
original = "「わたしと会長さんがお付き合いをするようになってからも、ゆーちゃんはいつもそばで、わたしたちのことを見守ってくれていました……」"
translation = "「저랑 회장님이 사귀게 된 후로도 유짱은 언제나 곁에서 저희를 지켜봐 주었어요……」"

[[dialogue]]
speaker = "ヒトリ"
original = "「その……デートしている時や……キスとか、している時も……」"
translation = "「그게…… 데이트할 때나…… 키스 같은 거, 할 때도……」"

[[dialogue]]
speaker = "ヒトリ"
original = "「わたしは昔から、幽霊に<b>憑かれる</b>とはそういうものだとわかっているので……全然、気にしていなかったんですけど……」"
translation = "「저는 옛날부터 유령에게 <b>씌어</b> <b>있다는</b> 건 그런 것이라고 알고 있었기에…… 전혀 신경 쓰지 않았지만……」"

[[dialogue]]
speaker = "ヒトリ"
original = "「でも、ゆーちゃんの方が気にしていたみたいです」"
translation = "「하지만 유짱 쪽이 신경을 썼던 모양이에요」"

[[dialogue]]
speaker = "ヒトリ"
original = "「わたしや会長さんが、いつも見られて気恥ずかしい思いをしているんじゃないか、って……」"
translation = "「저나 회장님이 항상 보이고 있어서 부끄러워하고 있는 게 아닐까 하고……」"

[[dialogue]]
speaker = "ヒトリ"
original = "「それで、『わたしのことは会長さんに任せられるから、自分はそろそろ成仏してもいいんじゃないか』って言いだしてて……」"
translation = "「그래서, 『나는 회장님께 맡길 수 있으니까 자신은 이제 성불해도 되지 않을까』라고 말하기 시작해서……」"

[[dialogue]]
speaker = "unk"
original = "……ヒトリは納得してるのか？"
translation = "……히토리는 납득하고 있는 거야?"

[[dialogue]]
speaker = "ヒトリ"
original = "「……いいえ。わたしは、ゆーちゃんとまだ、一緒に居たいです」"
translation = "「……아니요. 저는 유짱이랑 아직 같이 있고 싶어요」"

[[dialogue]]
speaker = "ヒトリ"
original = "「わたしにとって……ゆーちゃんは大切な、友達だから」"
translation = "「저에게…… 유짱은 소중한 친구니까」"

[[dialogue]]
speaker = "ヒトリ"
original = "「でも、だからこそちゃんと、会長さんに聞いておかなくちゃって、思ったんです……」"
translation = "「하지만 그렇기에 제대로 회장님께 물어봐야겠다고 생각했어요……」"

[[dialogue]]
speaker = "ヒトリ"
original = "「会長さんがゆーちゃんの存在を、どう思っているのかについては……実はずっと、気になっていました……」"
translation = "「회장님이 유짱의 존재를 어떻게 생각하는지에 대해서는…… 사실 계속 신경 쓰였거든요……」"

[[dialogue]]
speaker = "ヒトリ"
original = "「会長さんも、すべては見えなくても気配や声を感じることがあるって、言っていましたよね……？」"
translation = "「회장님도 전부는 보이지 않아도 기척이나 목소리를 느낄 때가 있다고 하셨죠……?」"

[[dialogue]]
speaker = "ヒトリ"
original = "「わたしには、霊感があります。それに、わたしを救ってくれたみんな――幽霊たちの居場所を作りたいって想いもあります」"
translation = "「저에게는 영감이 있어요. 게다가 저를 구해준 모두―― 유령들의 보금자리를 만들고 싶다는 생각도 있고요」"

[[dialogue]]
speaker = "ヒトリ"
original = "「なので、不知火ヒトリは……これからも、死ぬまでずっと、幽霊と一緒の人生です」"
translation = "「그래서 시라누이 히토리는…… 앞으로도 죽을 때까지 평생 유령과 함께하는 인생이에요」"

[[dialogue]]
speaker = "ヒトリ"
original = "「だからこそ……会長さんにちゃんと聞いておかなきゃいけないことが、あります……」"
translation = "「그렇기에…… 회장님께 제대로 물어봐야 할 것이 있어요……」"

[[dialogue]]
speaker = "ヒトリ"
original = "「会長さんは、わたしにだけ見えて、自分には見えない幽霊という存在が、嫌だったり、怖かったりは、しませんか……？」"
translation = "「회장님은 저에게만 보이고 자신에게는 보이지 않는 유령이라는 존재가 싫거나 무섭지는 않으신가요……?」"

[[dialogue]]
speaker = "ヒトリ"
original = "「もし本当は嫌なのなら……わたしは……会長さんとは……」"
translation = "「만약 정말로 싫으시다면…… 저는…… 회장님과는……」"

[[dialogue]]
speaker = "unk"
original = "だけど幽霊を含めてヒトリだと思ってる"
translation = "하지만 유령을 포함해서 히토리라고 생각하고 있어."

[[dialogue]]
speaker = "unk"
original = "幽霊のことは俺にはよくわからない。"
translation = "유령에 대해서는 나도 잘 몰라."

[[dialogue]]
speaker = "unk"
original = "──彼女自身が言う通り、ヒトリという人間と幽霊の存在は不可分だ。"
translation = "──그녀 자신이 말한 대로 히토리라는 인간과 유령의 존재는 불가분이다."

[[dialogue]]
speaker = "unk"
original = "そして俺は、『成仏を望まない幽霊の居場所を作りたい』と言ったヒトリを尊敬している。その夢を叶えて欲しいと思っている。"
translation = "그리고 나는 『성불을 원치 않는 유령의 보금자리를 만들고 싶다』고 말한 히토리를 존경하고 있어. 그 꿈을 이루어 주길 바라고 있다."

[[dialogue]]
speaker = "unk"
original = "だから、ゆーちゃんが成仏しようと思っている理由が、俺たちを気遣ってのことなら、成仏なんてしなくていい。"
translation = "그러니까 유짱이 성불하려는 이유가 우리를 배려해서라면 성불 같은 건 안 해도 돼."

[[dialogue]]
speaker = "unk"
original = "だって、俺はゆーちゃんの存在もひっくるめて、ヒトリという女の子のことを好きになったのだから。"
translation = "왜냐하면 나는 유짱의 존재까지 통틀어서 히토리라는 여자아이를 좋아하게 된 거니까."

[[dialogue]]
speaker = "ゆーちゃん"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "unk"
original = "俺が自分の想いを伝えると――"
translation = "내가 내 마음을 전하자――"

[[dialogue]]
speaker = "ヒトリ"
original = "「会長さん……ありがとうございます」"
translation = "「회장님…… 감사합니다」"

[[dialogue]]
speaker = "ヒトリ"
original = "「わたし……ゆーちゃんのことも、会長さんのことも、どっちも大切だから……怖くて、なかなか言い出せなかったんです……」"
translation = "「저…… 유짱도 회장님도 둘 다 소중하니까…… 무서워서 좀처럼 말을 꺼내지 못했어요……」"

[[dialogue]]
speaker = "ヒトリ"
original = "「普通の人は、見えない存在である幽霊が怖いって、わかっていたから……」"
translation = "「보통 사람은 보이지 않는 존재인 유령이 무섭다는 걸 알고 있었으니까……」"

[[dialogue]]
speaker = "ヒトリ"
original = "「でも、会長さんがそう言ってくれるなら……勇気を出して、自分の気持ちを伝えられます」"
translation = "「하지만 회장님이 그렇게 말씀해 주신다면…… 용기를 내서 제 마음을 전할 수 있어요」"

[[dialogue]]
speaker = "unk"
original = "そう言うと、ヒトリは向き直った。俺には見えないけど、小さく気配を感じる、彼女の親友の方へと。"
translation = "그렇게 말하며 히토리는 몸을 돌렸다. 내게는 보이지 않지만 작게 기척이 느껴지는 그녀의 절친 쪽으로."

[[dialogue]]
speaker = "ヒトリ"
original = "「ねぇ、ゆーちゃん？」"
translation = "「저기, 유짱?」"

[[dialogue]]
speaker = "ゆーちゃん"
original = "「ゆー……？」"
translation = "「유우……?」"

[[dialogue]]
speaker = "ヒトリ"
original = "「わたしね……ゆーちゃんには成仏して欲しくない。これからもずっと、そばにいて欲しいって思ってる」"
translation = "「나 말이야…… 유짱이 성불하지 않았으면 좋겠어. 앞으로도 계속 곁에 있어 줬으면 좋겠다고 생각해」"

[[dialogue]]
speaker = "ヒトリ"
original = "「ゆーちゃんはわたしとずっと一緒に居てくれた、大切な――『親友』だから」"
translation = "「유짱은 나랑 계속 함께해 준 소중한―― 『절친』이니까」"

[[dialogue]]
speaker = "ヒトリ"
original = "「一緒に居すぎるから、なんか気恥ずかしくて……ずっと言えなかったけど――」"
translation = "「너무 같이 있어서 왠지 쑥스러워가지고…… 계속 말 못 했지만――」"

[[dialogue]]
speaker = "ヒトリ"
original = "「大好きだよ、ゆーちゃん」"
translation = "「정말 좋아해, 유짱」"

[[dialogue]]
speaker = "ゆーちゃん"
original = "「……！\u3000ゆー♪」"
translation = "「……! 유우♪」"

[[dialogue]]
speaker = "ヒトリ"
original = "「え？\u3000わっ……！？\u3000あっ……ふふふっ♪\u3000ゆーちゃん、そんな抱き着いて来て――これからもずっと一緒に居てくれるの？」"
translation = "「어? 왓……!? 앗…… 후후후♪ 유짱, 그렇게 매달려 오면―― 앞으로도 계속 같이 있어 주는 거야?」"

[[dialogue]]
speaker = "ヒトリ"
original = "「えへへ……ありがとう♪」"
translation = "「에헤헤…… 고마워♪」"

[[dialogue]]
speaker = "unk"
original = "見えないけど、『てぇてぇ』だな"
translation = "보이지 않지만 '테에테에'하네."

[[dialogue]]
speaker = "unk"
original = "嬉しそうなヒトリの様子に、俺も嬉しくなって頷いていると――"
translation = "기뻐 보이는 히토리의 모습에 나도 기뻐져서 고개를 끄덕이고 있자――"

[[dialogue]]
speaker = "ヒトリ"
original = "「って、ゆーちゃん、会長さんの方に行って、どうしたの……？」"
translation = "「어라, 유짱, 회장님 쪽으로 가서 왜 그래……?」"

[[dialogue]]
speaker = "ゆーちゃん"
original = "「ゆー<emoji=heart04>\u3000――ちゅっ<emoji=heart04>」"
translation = "「유우<emoji=heart04> ――쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "不意に、俺の頬に柔らかな感覚があった。"
translation = "느닷없이 내 뺨에 부드러운 감촉이 느껴졌다."

[[dialogue]]
speaker = "ヒトリ"
original = "「ちょっ、ゆーちゃん！？\u3000会長さんに何してるの！？」"
translation = "「잠깐, 유짱!? 회장님한테 뭐 하는 거야!?」"

[[dialogue]]
speaker = "unk"
original = "えっ？\u3000俺、今なんかされた……？"
translation = "엣? 나 지금 뭐 당한 거야……?"

[[dialogue]]
speaker = "ヒトリ"
original = "「ど、どうしてそんな……いきなり頬っぺたに、き、きき――キスなんてっ！！！」"
translation = "「어, 어째서 그렇게…… 갑자기 뺨에 키, 키키―― 키스를 하는 거야!!!」"

[[dialogue]]
speaker = "unk"
original = "えぇっ！？"
translation = "에엣!?"

[[dialogue]]
speaker = "ゆーちゃん"
original = "「ゆ～～<emoji=heart04>」"
translation = "「유우~~<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
original = "「――こ、これまで遠慮してたけど、これからもずっとわたしと一緒にいるってことは……実質、ゆーちゃんも会長さんと恋人！？」"
translation = "「――그, 그동안 사양해 왔지만 앞으로도 계속 나랑 같이 있다는 건…… 실질적으로 유짱도 회장님이랑 연인!?」"

[[dialogue]]
speaker = "ヒトリ"
original = "「そ、それは……うぅ～～～！\u3000――だ、ダメっ！」"
translation = "「그, 그건…… 으으으~~! ――안 돼!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「か、会長さんは――わたしの恋人なのっ！\u3000たとえゆーちゃんでも、簡単には譲れないんだからぁ～～～っ！」"
translation = "「회, 회장님은―― 내 연인이란 말이야! 비록 유짱이라도 쉽게 양보할 수 없으니까아아아~~앗!」"

[[dialogue]]
speaker = "unk"
original = "そんな今まで見たことのないような嫉妬心を見せる彼女が可愛くて、俺は思わず笑ってしまう。"
translation = "그런 지금까지 본 적 없는 질투심을 보이는 그녀가 귀여워서 나는 나도 모르게 웃어 버린다."

[[dialogue]]
speaker = "unk"
original = "ヒトリ、こっち向いて"
translation = "히토리, 이쪽 봐봐."

[[dialogue]]
speaker = "ヒトリ"
original = "「えっ？\u3000は、はい……！」"
translation = "「엣? 네, 네……!」"

[[dialogue]]
speaker = "unk"
original = "俺は彼女を振り向かせると――"
translation = "나는 그녀를 돌아보게 하고는――"

[[dialogue]]
speaker = "ヒトリ"
original = "「って、会長さん……！？\u3000あっ……！\u3000んんっ<emoji=heart04>」"
translation = "「어라, 회장님……!? 앗……! 응응<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
original = "「ちゅっ<emoji=heart04>\u3000んんぅ……か、会長さん……<emoji=heart04>」"
translation = "「쪽<emoji=heart04> 응으…… 회, 회장님……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ヒトリ。ゆーちゃんに負けないくらい愛してる"
translation = "히토리. 유짱에게 지지 않을 정도로 사랑해."

[[dialogue]]
speaker = "ヒトリ"
original = "「……！\u3000わ、わたしも……」"
translation = "「……! 저, 저도……」"

[[dialogue]]
speaker = "ヒトリ"
original = "「ゆーちゃんに負けないくらい、会長さんのこと、愛してます……<emoji=heart04>」"
translation = "「유짱에게 지지 않을 정도로 회장님을 사랑해요……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
original = "「ちゅっ……<emoji=heart04>」"
translation = "「쪽……<emoji=heart04>」"

[[dialogue]]
speaker = "ゆーちゃん"
original = "「てーてー♪」"
translation = "「테에테에♪」"

[[dialogue]]
speaker = "unk"
original = "いつもよりも嬉しそうな、ゆーちゃんの声がそばから聞こえたのだった。"
translation = "평소보다 기뻐 보이는 유짱의 목소리가 곁에서 들려왔다."

