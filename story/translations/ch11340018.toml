[[dialogue]]
speaker = "unk"
original = "驚くべきことに、あの遊園地デートで交際がスタートしてから今日まで、グレイスとは毎日エッチなことをしている……"
translation = "놀랍게도, 그 유원지 데이트에서 교제가 시작된 이후 오늘까지, 그레이스와는 매일 야한 짓을 하고 있다……"

[[dialogue]]
speaker = "unk"
original = "世界の危機が迫っているのに弛んでいると言われれば、その通りかもしれない。けれど──"
translation = "세계의 위기가 다가오고 있는데 해이해졌다고 말한다면, 그 말대로일지도 모른다. 하지만──"

[[dialogue]]
speaker = "グレイス"
original = "「魔王さんっ、魔王さんっ<emoji=heart04>\u3000ぎゅーってして、チューしてくださいっ<emoji=heart04>」"
translation = "「마왕님, 마왕님♥ 꼬옥 안아주고, 뽀뽀해 주세요♥」"

[[dialogue]]
speaker = "クロト"
original = "「……うん。おいで、グレイス」"
translation = "「……응. 이리 와, 그레이스」"

[[dialogue]]
speaker = "グレイス"
original = "「はいっ<emoji=heart04>\u3000えへへっ、ぎゅーーーっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「네엣♥ 에헤헷, 꼬오오오옥♥♥♥」"

[[dialogue]]
speaker = "グレイス"
original = "「んぅ……ちゅっ<emoji=heart04>\u3000んちゅ、れるれるっ<emoji=heart04>\u3000魔王さん、しゅきれすっ……んちゅ<emoji=heart04>」"
translation = "「응…… 츄♥ 응츄, 레로레로♥ 마왕님, 좋아해여…… 응츄♥」"

[[dialogue]]
speaker = "unk"
original = "彼女と触れ合うたびに、想いの強さをはっきりと感じる。"
translation = "그녀와 접촉할 때마다, 마음의 강함을 분명하게 느낀다."

[[dialogue]]
speaker = "unk"
original = "１０年の間に募らせていた想いは相当なものだったのだろう。彼女の好意のアプローチはいつもストレートで、甘く──それが嬉しい。"
translation = "10년 동안 쌓아온 마음은 상당한 것이었으리라. 그녀의 호의적인 접근은 언제나 직선적이고, 달콤해서── 그것이 기쁘다."

[[dialogue]]
speaker = "グレイス"
original = "「──ぷぁ<emoji=heart04>\u3000魔王さん、好き……大好きです……<emoji=heart04>」"
translation = "「──푸하♥ 마왕님, 좋아해…… 정말 좋아해요……♥」"

[[dialogue]]
speaker = "クロト"
original = "「俺も大好きだよ、グレイス」"
translation = "「나도 정말 좋아해, 그레이스」"

[[dialogue]]
speaker = "グレイス"
original = "「魔王さん。あの、今日のえっち、なんですけど……」"
translation = "「마왕님. 저기, 오늘 섹스 말인데요……」"

[[dialogue]]
speaker = "クロト"
original = "「──また、試してみたいことができた？」"
translation = "「──또, 시험해보고 싶은 게 생겼어?」"

[[dialogue]]
speaker = "グレイス"
original = "「はいっ<emoji=heart04>」"
translation = "「네엣♥」"

[[dialogue]]
speaker = "unk"
original = "グレイスはとても好奇心が強く、気になったことは試さねば気がすまない性格をしている。"
translation = "그레이스는 매우 호기심이 강하고, 신경 쓰이는 것은 시험해보지 않으면 직성이 풀리지 않는 성격을 가지고 있다."

[[dialogue]]
speaker = "unk"
original = "今日までも、正常位、騎乗位、後背位、対面座位などの本番は言うに及ばず、フェラやパイズリ、乳首舐め手コキとか足コキとか──"
translation = "오늘까지도, 정상위, 기승위, 후배위, 대면좌위 등의 본방은 말할 것도 없고, 펠라나 파이즈리, 유두 애무, 손코키나 발코키라든가──"

[[dialogue]]
speaker = "unk"
original = "何かしら１日に１つ、試したいプレイのネタを拾ってくるのだ。ホントに子犬みたいだな……"
translation = "무언가 하루에 하나씩, 시험해보고 싶은 플레이 소재를 찾아오는 것이다. 정말 강아지 같네……"

[[dialogue]]
speaker = "クロト"
original = "「いいよ。何がしたいんだ？」"
translation = "「좋아. 뭘 하고 싶어?」"

[[dialogue]]
speaker = "グレイス"
original = "「はい！\u3000昨日の夜にですね、ネットで見つけてですね！\u3000道具も準備してきましたっ！」"
translation = "「네! 어제 밤에요, 인터넷에서 발견해서요! 도구도 준비해 왔답니다!」"

[[dialogue]]
speaker = "unk"
original = "…………道具？？？"
translation = "…………도구???"

[[dialogue]]
speaker = "グレイス"
original = "「わ、わぁぁぁ……<emoji=heart04>\u3000えっちなビデオで見たのとおんなじ、格好しちゃいましたぁ……<emoji=heart04>」"
translation = "「와, 와아아……♥ 야한 비디오에서 본 거랑 똑같은 차림을 해버렸어요……♥」"

[[dialogue]]
speaker = "unk"
original = "──で、こうなったってわけだ。"
translation = "──그래서, 이렇게 됐다는 거다."

[[dialogue]]
speaker = "グレイス"
original = "「ほ、本当に動けないです……がっちり手錠で捕まえられて、このまま魔王さんのおち○ぽでいっぱいぱんぱんされちゃうんですね……<emoji=heart04>」"
translation = "「저, 정말로 움직일 수 없어요…… 수갑으로 꽉 붙잡혀서, 이대로 마왕님의 자지로 가득 팡팡 당해버리는 거군요……♥」"

[[dialogue]]
speaker = "unk"
original = "女の子に手錠をかけて、身動きができないようにするＭ向けの拘束プレイ。捕まえられてる感を出したいと戦闘服に変身までする徹底っぷり。"
translation = "여자아이에게 수갑을 채워 몸을 움직이지 못하게 하는 M 성향의 구속 플레이. 붙잡혀 있는 느낌을 내고 싶다며 전투복으로 변신까지 하는 철저함."

[[dialogue]]
speaker = "unk"
original = "……グレイスと付き合ってると、本当に退屈しないな。"
translation = "……그레이스와 사귀고 있으면, 정말 지루할 틈이 없군."

[[dialogue]]
speaker = "グレイス"
original = "「えっちなビデオの女の人、逃げられない～っ、気持ちよすぎる～って、ずうっとあんあんいってました……<emoji=heart04>」"
translation = "「야한 비디오의 여자분, 도망칠 수 없어~, 너무 기분 좋아~ 라면서, 계속 앙앙거리고 있었어요……♥」"

[[dialogue]]
speaker = "グレイス"
original = "「これ、大好きな魔王さんにされたら、ど、どうなっちゃうんだろうって……気になっちゃって……<emoji=heart04>」"
translation = "「이거, 정말 좋아하는 마왕님한테 당하면, 어, 어떻게 되어버릴까…… 궁금해져서……♥」"

[[dialogue]]
speaker = "unk"
original = "気になったのなら仕方がない。恋人のペニスでしっかりイカせて、グレイスのエッチな好奇心を満たしてあげないといけない。"
translation = "궁금해졌다면 어쩔 수 없다. 연인의 페니스로 확실히 가게 해서, 그레이스의 야한 호기심을 채워줘야만 한다."

[[dialogue]]
speaker = "グレイス"
original = "「あ、ぁあっ……魔王さんのおち○ぽ……まだ何もしてないのに、ガッチガチです……興奮、してくれてるんですね<emoji=heart04>」"
translation = "「아, 아앗…… 마왕님의 자지…… 아직 아무것도 안 했는데, 딱딱해요…… 흥분, 해주신 거네요♥」"

[[dialogue]]
speaker = "グレイス"
original = "「おっぱいもおま○こも、隠せないです……恥ずかしくて、ど、ドキドキしてっ……はあぁぁっ……<emoji=heart04>」"
translation = "「가슴도 보지도, 숨길 수 없어요…… 부끄러워서, 두, 두근거려서…… 하아아앗……♥」"

[[dialogue]]
speaker = "グレイス"
original = "「──んんっ<emoji=heart04>\u3000や、やーです……おま○この入口、おち○ぽでスリスリするだけじゃ、やーです……<ruby>挿入<rt>い</rt></ruby>れてください、魔王さん……<emoji=heart04>」"
translation = "「──응읏♥ 시, 싫어어…… 보지 입구, 자지로 문지르기만 하는 건 싫어요…… 삽입해 주세요, 마왕님……♥」"

[[dialogue]]
speaker = "unk"
original = "たっぷりと膨らんだおっぱいに、つぅっと愛液が垂れる女性器。おまけにこの子は俺のことが大好きで、ペニスの侵入を待ちわびている。"
translation = "잔뜩 부풀어 오른 가슴에, 주르륵 애액이 흐르는 여성기. 게다가 이 아이는 나를 정말 좋아해서, 페니스의 침입을 간절히 기다리고 있다."

[[dialogue]]
speaker = "クロト"
original = "「……始めたら止まれないぞ、グレイス」"
translation = "「……시작하면 멈출 수 없다고, 그레이스」"

[[dialogue]]
speaker = "グレイス"
original = "「はいっ……来てくださいっ<emoji=heart04>\u3000早く、魔王さんと繋がりたいですっ……来て、来てっ<emoji=heart04>\u3000ずぷーって、してくださいっ<emoji=heart04>」"
translation = "「네…… 와주세요♥ 빨리, 마왕님과 이어지고 싶어요…… 와줘, 와줘요♥ 즈뿝, 하고 해주세요♥」"

[[dialogue]]
speaker = "グレイス"
original = "「ふぁあああ──あぁぁぁあぁあっ……<emoji=heart04>」"
translation = "「화아아아──아아아아아앗……♥」"

[[dialogue]]
speaker = "グレイス"
original = "「ふぅう、ぅうう～っ<emoji=heart04>\u3000おっきぃい……<emoji=heart04>\u3000かったぁい……<emoji=heart04>\u3000おち○ぽ、一気に入っちゃい、ましたぁ……<emoji=heart04>」"
translation = "「후우우, 우우우~♥ 커다래……♥ 딱딱해……♥ 자지, 단번에 들어와 버렸어요……♥」"

[[dialogue]]
speaker = "グレイス"
original = "「ぁ、あ<emoji=heart04>\u3000まだ動いてないのにっ……繋がってるだけで、気持ちいーです……魔王さんのおち○ぽ、気持ちいい……<emoji=heart04>」"
translation = "「아, 아♥ 아직 움직이지도 않았는데…… 이어져 있는 것만으로도, 기분 조와요…… 마왕님의 자지, 기분 좋아……♥」"

[[dialogue]]
speaker = "unk"
original = "ぎゅぅぎゅぅと甘くペニスを揉んでくる、グレイスの女性器。明らかにいつもより締まりが強い──"
translation = "규우규우 달콤하게 페니스를 조여오는, 그레이스의 여성기. 분명 평소보다 조임이 강하다──"

[[dialogue]]
speaker = "グレイス"
original = "「変わったプレイだから、私、いつもよりドキドキしちゃってるのかも……あ、ぁっ<emoji=heart04>\u3000ふぅう……<emoji=heart04>」"
translation = "「색다른 플레이라, 저, 평소보다 더 두근거리고 있는 걸지도…… 아, 앗♥ 후우……♥」"

[[dialogue]]
speaker = "unk"
original = "ぞく、ぞくぞくっ──と震えるたびに、グレイスの大きなおっぱいがふるふると揺れる。"
translation = "조옥, 조옥조옥── 하고 떨릴 때마다, 그레이스의 커다란 가슴이 출렁출렁 흔들린다."

[[dialogue]]
speaker = "unk"
original = "快感が奔っているところ申し訳ないが、今日は女の子が不利なシチュ。男が一方的に求められる拘束プレイ──ならば。"
translation = "쾌감이 달리고 있는 와중에 미안하지만, 오늘은 여자애가 불리한 시추에이션. 남자가 일방적으로 몰아붙이는 구속 플레이── 라면."

[[dialogue]]
speaker = "グレイス"
original = "「んぁあっ<emoji=heart04>\u3000あ、あぁぁっ……あ、はぁあっ……<emoji=heart04>\u3000急に、う、動くだなんてぇっ……んんんぅっ<emoji=heart04>」"
translation = "「응아앗♥ 아, 아아앗…… 아, 하아앗……♥ 갑자기, 우, 움직이다니이잇…… 응응응읏♥」"

[[dialogue]]
speaker = "グレイス"
original = "「ふぁぁっ……<emoji=heart04>\u3000はぁああ、うぅう、んんぅ～……あぁあっ<emoji=heart04>\u3000あふぅっ……<emoji=heart04>」"
translation = "「화아앗……♥ 하아아, 우우우, 응응우~…… 아아앗♥ 아후웃……♥」"

[[dialogue]]
speaker = "グレイス"
original = "「すっ、ごい、ですっ<emoji=heart04>\u3000あ、あぁあっ<emoji=heart04>\u3000魔王さん、いつもは、優しくっ<emoji=heart04>\u3000う、動くよ？\u3000って<emoji=heart04>\u3000言ってくれる、のにぃいっ……<emoji=heart04>」"
translation = "「어, 엄청나요♥ 아, 아아앗♥ 마왕님, 평소에는, 상냥하게♥ 우, 움직일게? 라고♥ 말해주는데에엣……♥」"

[[dialogue]]
speaker = "グレイス"
original = "「あっ……あぁあっ……ふぅっ……んぁあぁっ<emoji=heart04>\u3000今日はいきなり、ぱんぱんっ<emoji=heart04>\u3000は、始まって──んぅ、ぁぁああっ……<emoji=heart04>」"
translation = "「앗…… 아아앗…… 후웃…… 응아아앗♥ 오늘은 갑자기, 팡팡♥ 시, 시작해서── 응우, 아아아앗……♥」"

[[dialogue]]
speaker = "unk"
original = "──俺に無理やりされたかったんだろ？\u3000そう伝えながら、グレイスの狭い膣内を掻き分けるように、ペニスをねじ込む。"
translation = "──나한테 억지로 당하고 싶었던 거잖아? 그렇게 전하며, 그레이스의 좁은 질 안을 헤치고 나아가듯 페니스를 비틀어 넣는다."

[[dialogue]]
speaker = "グレイス"
original = "「はぁあっ<emoji=heart04>\u3000はいっ<emoji=heart04>\u3000魔王さん、んんぅうっ<emoji=heart04>\u3000いつも優しい、からぁっ<emoji=heart04>\u3000え、えへへっ<emoji=heart04>\u3000今日はちょっぴり、乱暴な……んぅ！」"
translation = "「하아앗♥ 네♥ 마왕님, 응응우우읏♥ 항상 상냥하니까아♥ 에, 에헤헷♥ 오늘은 조금, 거친…… 응읏!」"

[[dialogue]]
speaker = "グレイス"
original = "「あ、あああっ<emoji=heart04>\u3000凄いれすっ……おち○ぽガチガチっ<emoji=heart04>\u3000気持ちいいところ、ぐりぐり、当たって──ぅぅうっ<emoji=heart04>\u3000ふぁぁああっ……<emoji=heart04>」"
translation = "「아, 아아앗♥ 굉장해여…… 자지 빳빳해♥ 기분 좋은 곳, 구리구리, 닿아서── 우우우읏♥ 화아아아앗……♥」"

[[dialogue]]
speaker = "unk"
original = "ピストンのたびに、たぷっ、たぷっとグレイスのおっぱいが揺れる。初めての時は、恥ずかしいと隠していたのに──"
translation = "피스톤을 할 때마다, 타푿, 타푿 하고 그레이스의 가슴이 흔들린다. 처음이었을 때는 부끄럽다며 숨겼었는데──"

[[dialogue]]
speaker = "グレイス"
original = "「おっぱいっ<emoji=heart04>\u3000あ、あぁっ<emoji=heart04>\u3000じぃって、見られてっ──ふぅ、ぅうっ<emoji=heart04>\u3000も、もっと見てください、魔王さん、もっと見て……<emoji=heart04>」"
translation = "「가슴♥ 아, 아앗♥ 빤히, 보여져서── 후우, 우웃♥ 더, 더 봐주세요, 마왕님, 더 봐줘……♥」"

[[dialogue]]
speaker = "グレイス"
original = "「私のえっちなところ、たくさん見てっ……おち○ぽ硬く、してくださ──ううぅうっ<emoji=heart04>\u3000ぁ、あああ、あぁああっ……はぁぁああ～<emoji=heart04>」"
translation = "「제 야한 부분, 많이 봐줘요…… 자지 딱딱하게, 해주세── 우우우우읏♥ 아, 아아아, 아아아앗…… 하아아아아~♥」"

[[dialogue]]
speaker = "unk"
original = "男の興奮のオカズに、自分の身体を使われていることをはっきりと悦んでいるグレイス。"
translation = "남자의 흥분 소재로 자신의 몸이 쓰이고 있다는 것을 분명히 기뻐하고 있는 그레이스."

[[dialogue]]
speaker = "unk"
original = "拘束プレイを試してみたいと言うだけはある──俺の恋人は、どうやらマゾっ気があるみたいだ。"
translation = "구속 플레이를 시도해보고 싶다고 말할 만하다── 내 연인은, 아무래도 마조 기질이 있는 모양이다."

[[dialogue]]
speaker = "unk"
original = "ぷっくり育った乳首に強く吸い付きながら、ストロークを続ける。"
translation = "통통하게 부푼 젖꼭지를 강하게 빨면서, 스트로크를 계속한다."

[[dialogue]]
speaker = "グレイス"
original = "「ひゃうぅうっ<emoji=heart04>\u3000あ、あっ<emoji=heart04>\u3000おっぱい、ちゅーって<emoji=heart04>\u3000ひあぁ、あぁっ<emoji=heart04>\u3000それ、好きれしゅっ<emoji=heart04>\u3000んぅっ<emoji=heart04>」"
translation = "「히야우우웃♥ 아, 앗♥ 가슴, 츄우 하고♥ 히아아, 아앗♥ 그거, 조와해여♥ 응읏♥」"

[[dialogue]]
speaker = "グレイス"
original = "「あ、あぁ、あぁ～……っ<emoji=heart04>\u3000乳首、ころころ、転がされるの、それしゅき、ぃっ<emoji=heart04>\u3000あ、ああ、うぅっ<emoji=heart04>\u3000ふわあぁ、あぁあっ<emoji=heart04>」"
translation = "「아, 아아, 아아~……♥ 젖꼭지, 데굴데굴, 굴려지는 거, 그거 조와, 아♥ 아, 아아, 우웃♥ 후와아아, 아아앗♥」"

[[dialogue]]
speaker = "グレイス"
original = "「あ、あひぃっ<emoji=heart04>\u3000ふあぁあっ<emoji=heart04>\u3000身動き、ぜんぜっ<emoji=heart04>\u3000取れないから、ぁっ<emoji=heart04>\u3000気持ちいいの、逃げられ、な──ひぅぅうっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아, 아히잇♥ 후아아앗♥ 몸놀림, 전혀어♥ 할 수 없으니까아♥ 기분 좋은 거, 도망칠 수, 없── 히우우우웃♥♥♥」"

[[dialogue]]
speaker = "グレイス"
original = "「あ、やぁあっ──！？\u3000イっちゃ、うっ<emoji=heart04>\u3000イク、イク、ぅぅぅうぅ～っ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아, 야아앗──!? 가버려어, 엇♥ 가, 가, 가아아아아~앗……♥♥♥」"

[[dialogue]]
speaker = "unk"
original = "がくがくがくっ──グレイスの身体が小刻みに痙攣し、繋がった鎖がちゃらちゃらと金属音を鳴らす。"
translation = "가들가들가들── 그레이스의 몸이 잘게 경련하고, 연결된 쇠사슬이 찰랑찰랑 금속음을 울린다."

[[dialogue]]
speaker = "unk"
original = "これだけでイクだなんて、今日はずいぶんと早いな。ペニスを咥えこむ女性器がじゅんっと湿り気を増して、さらにきつく締めあげてくる──"
translation = "이것만으로 가버리다니, 오늘은 유독 빠르군. 페니스를 머금은 여성기가 쥬운 하고 습기를 더하며, 더욱 꽉 조여온다──"

[[dialogue]]
speaker = "unk"
original = "こんなに夢中で求められたら、止まる余裕なんてあるわけがない。"
translation = "이렇게 정신없이 원해진다면, 멈출 여유 따위 있을 리가 없다."

[[dialogue]]
speaker = "グレイス"
original = "「あ、ああぁっ？\u3000イって、るのにっ……おち○ぽ止まらな、いっ<emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000あ、あぁあっ<emoji=heart04>\u3000ひぅうぅっ<emoji=heart04>\u3000んぁあぁっ<emoji=heart04>」"
translation = "「아, 아아아앗? 가고 있는데…… 자지 멈추지 않아, 앗♥ 응응읏♥ 아, 아아앗♥ 히우우우읏♥ 응아아앗♥」"

[[dialogue]]
speaker = "クロト"
original = "「今日はずっと俺のペースでして、いいんだろ？\u3000それとも止めて欲しいか」"
translation = "「오늘은 계속 내 페이스대로 해도 되는 거지? 아니면 멈춰줬으면 좋겠나?」"

[[dialogue]]
speaker = "グレイス"
original = "「──────ッ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000と、止めないでくだ、さいっ<emoji=heart04>\u3000魔王さんの、お好きなように、ぱんぱんっ<emoji=heart04>\u3000し、してっ、くださいぃっ<emoji=heart04>」"
translation = "「──────읏♥♥♥ 머, 멈추지 말아주세요♥ 마왕님, 마음대로, 팡팡♥ 해, 주세요오오♥」"

[[dialogue]]
speaker = "グレイス"
original = "「イっちゃってるっ、私の、おま○こっ<emoji=heart04>\u3000いっぱい突いてっ<emoji=heart04>\u3000もっと<b>使って</b>──くださいぃいっ<emoji=heart04>」"
translation = "「가버리고 있는, 제, 보지♥ 잔뜩 찔러줘요♥ 더 <b>사용해</b>── 주세요오오잇♥」"

[[dialogue]]
speaker = "unk"
original = "受け身のシチュエーションにぴったりの言葉遣い。グレイスの求めに応えて、俺はオナニーでもするみたいに、彼女の女性器を<b>使う</b>。"
translation = "수동적인 상황에 딱 맞는 말투. 그레이스의 요구에 응해, 나는 자위라도 하는 것처럼 그녀의 여성기를 <b>사용한다</b>."

[[dialogue]]
speaker = "グレイス"
original = "「うぁっ<emoji=heart04>\u3000あ、ぁ、あぁっ<emoji=heart04>\u3000ふぅう、んんんぅっ<emoji=heart04>\u3000す、ごい、れすっ<emoji=heart04>\u3000どす、どすって<emoji=heart04>\u3000ぁあ、あぁ、あぁあっ<emoji=heart04>」"
translation = "「우아앗♥ 아, 아, 아아앗♥ 후우우, 응응응읏♥ 거, 굉장해여♥ 퍽, 퍽 하고♥ 아아, 아아, 아아앗♥」"

[[dialogue]]
speaker = "グレイス"
original = "「奥のところ、らめ、らめぇええっ<emoji=heart04>\u3000動けないのに、そんな突いたら──ひぁ、あ、あぁ、あぁああっ<emoji=heart04>」"
translation = "「안쪽 부분, 안대, 안대애애앳♥ 움직이지 못하는데, 그렇게 찌르면── 히아, 아, 아아, 아아아앗♥」"

[[dialogue]]
speaker = "グレイス"
original = "「ま、またイっちゃいましゅっ<emoji=heart04>\u3000あ、あぁ、あ、ああっ──<emoji=heart04>」"
translation = "「또, 또 가버려어♥ 아, 아아, 아, 아아앗──♥」"

[[dialogue]]
speaker = "グレイス"
original = "「ふううぅう、うぅぅぅううう～～～──っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후우우우, 우우우우우우우～～～──읏♥♥♥」"

[[dialogue]]
speaker = "unk"
original = "柔らかいのにキツキツの女性器がまた締まりを増す──だが俺は止まらない。狭くなって抵抗の強まった膣内をペニスでほじくり、奥を穿つ。"
translation = "부드러우면서도 꽉 조이는 여성기가 다시금 조임이 강해진다── 하지만 나는 멈추지 않는다. 좁아져서 저항이 강해진 질 안을 자지로 후벼 파고, 안쪽을 꿰뚫는다."

[[dialogue]]
speaker = "グレイス"
original = "「うぁあ、あ、あぁっ<emoji=heart04>\u3000はぁあっ……うぅうっ<emoji=heart04>\u3000ん、んんぅ～っ……<emoji=heart04>」"
translation = "「으아아, 아, 아앗♥ 하아앗…… 으으읏♥ 응, 응응으～읏……♥」"

[[dialogue]]
speaker = "グレイス"
original = "「きょ、今日の私っ<emoji=heart04>\u3000変、れしゅっ<emoji=heart04>\u3000おま○こすっごくイキやすくって──ふぅ、うぅうっ<emoji=heart04>」"
translation = "「오, 오늘의 나♥ 이, 이상해여♥ 보지 정말 가기 쉬워져서── 후우, 우으읏♥」"

[[dialogue]]
speaker = "グレイス"
original = "「こ、これ以上、されたらっ……おかしくなっちゃい、ますっ……魔王さん、魔王さんっ……あ、あぁああっ<emoji=heart04>\u3000んぅ～っ<emoji=heart04>」"
translation = "「이, 이 이상 당하면…… 이상해져 버려, 요…… 마왕님, 마왕님…… 아, 아아아앗♥ 응으～읏♥」"

[[dialogue]]
speaker = "unk"
original = "激しくしたら、もっと乱れてくれるのか？"
translation = "격렬하게 하면, 좀 더 흐트러져 주려나?"

[[dialogue]]
speaker = "unk"
original = "ぜひ、見てみたい。俺はグレイスの細い腰をがっちり捕まえて──"
translation = "부디, 보고 싶다. 나는 그레이스의 가느다란 허리를 꽉 붙잡고──"

[[dialogue]]
speaker = "グレイス"
original = "「んぁぁぁぁああっ！？\u3000あ、あ、あぁああぁっ！\u3000あっあっあっあっあっあっあっ<emoji=heart04>\u3000うあぁ、ひあぁぁ、あっぁあっ<emoji=heart04>」"
translation = "「응아아아아앗!? 아, 아, 아아아아앗! 앗앗앗앗앗앗앗♥ 으아아, 히아아, 앗아앗♥」"

[[dialogue]]
speaker = "グレイス"
original = "「魔王さっ<emoji=heart04>\u3000奥らめっ<emoji=heart04>\u3000らめらめらめっ<emoji=heart04>\u3000おま○この奥、ずんずんらめれすぅうっ<emoji=heart04>\u3000あぁぁあぁああっ<emoji=heart04><emoji=heart04>」"
translation = "「마왕니잇♥ 안쪽 안대♥ 안대안대안대♥ 보지 안쪽, 쿵쾅쿵쾅 안대여어엇♥ 아아아아아앗♥♥」"

[[dialogue]]
speaker = "グレイス"
original = "「気持ちいいっ<emoji=heart04>\u3000おち○ぽ気持ちいいれすっ<emoji=heart04>\u3000あ、あぁっ<emoji=heart04>\u3000んっんっんっんっ<emoji=heart04>\u3000ぁ、あぁ、あぁぁああ～～っ<emoji=heart04>」"
translation = "「기분 좋아♥ 자지 기분 좋아여♥ 아, 아앗♥ 응응응응♥ 아, 아아, 아아아아아～～앗♥」"

[[dialogue]]
speaker = "グレイス"
original = "「ま──またくりゅっ<emoji=heart04>\u3000来ちゃいますだめだめっ<emoji=heart04>\u3000あ、あぁ、あぁ～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「또── 또 와여♥ 와버려요 안대안대♥ 아, 아아, 아아～앗♥♥♥」"

[[dialogue]]
speaker = "グレイス"
original = "「ふぅうっ<emoji=heart04>\u3000ひぁあ、ぁあっ<emoji=heart04>\u3000あ、あぁあっ<emoji=heart04>\u3000んんんんっ<emoji=heart04>\u3000あっああっあっ<emoji=heart04>\u3000あぁぁぁあああ～っ<emoji=heart04><emoji=heart04>」"
translation = "「후우웃♥ 히아아, 아앗♥ 아, 아아앗♥ 응응응응♥ 앗아앗앗♥ 아아아아아아아～앗♥♥」"

[[dialogue]]
speaker = "unk"
original = "あの子供っぽいグレイスが、１本のペニスでここまで乱れるなんて誰が想像できるだろう。"
translation = "그 어린애 같은 그레이스가, 자지 하나에 이렇게까지 흐트러질 줄 누가 상상이나 했을까."

[[dialogue]]
speaker = "unk"
original = "可愛くあえぎを漏らす唇を強引に奪う──"
translation = "귀엽게 신음 소리를 흘리는 입술을 강제로 빼앗는다──"

[[dialogue]]
speaker = "グレイス"
original = "「んむうぅうっ！？\u3000んぅうっ<emoji=heart04>\u3000んじゅりゅ、んりゅれりゅれるっ<emoji=heart04>\u3000んぅちゅる、れぇ、れろれる、れろぉっ<emoji=heart04>」"
translation = "「음무우우읏!? 응으읏♥ 응쥬류, 응류레류레룻♥ 응으츄루, 레에, 레로레루, 레로오♥」"

[[dialogue]]
speaker = "グレイス"
original = "「魔王、しゃんっ<emoji=heart04>\u3000ちゅーらめぇっ<emoji=heart04>\u3000ふぅむむぅう<emoji=heart04>\u3000じゅるるっ<emoji=heart04>\u3000んぇれりゅれろ、んちゅる<emoji=heart04>\u3000もっと、感じちゃ──んぅう！」"
translation = "「마왕, 님♥ 츄우, 안 돼애♥ 후무무우♥ 쥬루룻♥ 응에레류레로, 응츄루♥ 더, 느껴버려──응으으!」"

[[dialogue]]
speaker = "unk"
original = "グレイスはエッチもそうだが、キスが大好きだ。"
translation = "그레이스는 섹스도 그렇지만, 키스를 정말 좋아한다."

[[dialogue]]
speaker = "unk"
original = "特に舌を深く絡めあうやつがお気に入りで、セックスの最中にこれをするとすぐに達してしまう。"
translation = "특히 혀를 깊게 얽는 것을 좋아해서, 섹스 도중에 이것을 하면 금방 가버린다."

[[dialogue]]
speaker = "グレイス"
original = "「ふぅうっ<emoji=heart04>\u3000ふぅーっ<emoji=heart04>\u3000んじゅれりゅれりゅっ<emoji=heart04>\u3000んれりゅれるれる、れろぉっ──んん、んんんぅうっ！\u3000ふぅう、んんんうーっ！」"
translation = "「후우우♥ 후우─♥ 응쥬레류레류♥ 응레류레루레루, 레로오──응응, 응응응으윽! 후우우, 응응응우─!」"

[[dialogue]]
speaker = "グレイス"
original = "「ふぅうううーっ！？\u3000んぅうぅっ<emoji=heart04>\u3000んぅう、んんぅう～～～っ……<emoji=heart04>」"
translation = "「후우우우우─!? 응으으윽♥ 응으으, 응응으으～～～……♥」"

[[dialogue]]
speaker = "unk"
original = "咥内をめちゃくちゃにかき回され、ポルチオをピストンで責められながら、何度目かもわからない絶頂をするグレイス。"
translation = "입안을 엉망진창으로 휘저어지고, 포르치오를 피스톤으로 공략당하며, 몇 번째인지도 모를 절정을 맞이하는 그레이스."

[[dialogue]]
speaker = "グレイス"
original = "「じゅるちゅるっ、れるれるれるっ<emoji=heart04>\u3000んぅ、れぇえ、れる、んちゅぅ～……魔王、さぁん……んんちゅる<emoji=heart04>\u3000しゅき……<emoji=heart04>」"
translation = "「쥬루츄루, 레루레루레루♥ 응으, 레에, 레루, 응츄우～…… 마왕, 님…… 응응츄루♥ 좋아해……♥」"

[[dialogue]]
speaker = "unk"
original = "絶頂後の余韻に当てられた、グレイスの蕩けた告白が、キスの合間にこぼれる。"
translation = "절정 후의 여운에 휩싸인 그레이스의 황홀한 고백이 키스 틈새로 흘러나온다."

[[dialogue]]
speaker = "unk"
original = "それを聞いた途端、ゾクゾクと昂ぶり、俺も限界が近くなってきた──名残惜しさを感じながら唇を離して、ラストスパート。"
translation = "그 말을 듣자마자 오싹오싹하게 고조되어, 나도 한계가 가까워졌다── 아쉬움을 느끼며 입술을 떼고, 라스트 스퍼트."

[[dialogue]]
speaker = "グレイス"
original = "「──んんぅうっ<emoji=heart04>\u3000あっあっあっあっあっ！\u3000あっあっあっあっあっあっあっ！」"
translation = "「──응응으윽♥ 앗앗앗앗앗! 앗앗앗앗앗앗앗앗!」"

[[dialogue]]
speaker = "グレイス"
original = "「ま、おっ──さんっ？\u3000イ、イっちゃい、そう、れすかっ？\u3000私のおま○こで、イっちゃいうそう、なんれすかっ？」"
translation = "「마, 왕──님? 가, 가버릴, 것, 가타요? 제 보지루, 가버릴 것 가튼 건가요?」"

[[dialogue]]
speaker = "unk"
original = "──もう我慢できない。"
translation = "──더는 참을 수 없다."

[[dialogue]]
speaker = "グレイス"
original = "「あ、あ、あぁ、あぁあっ<emoji=heart04>\u3000嬉しい、ですっ<emoji=heart04>\u3000今日もいっぱい<emoji=heart04>\u3000くださいっ<emoji=heart04>\u3000おま○こに、びゅーって、精液くださいっ<emoji=heart04>」"
translation = "「아, 아, 아아, 아아앗♥ 기뻐요♥ 오늘도 가득♥ 주세요♥ 보지에, 뷰우우하고, 정액 주세요♥」"

[[dialogue]]
speaker = "unk"
original = "──全部、出す。グレイスに中出しする！"
translation = "──전부, 낸다. 그레이스에게 질내사정한다!"

[[dialogue]]
speaker = "グレイス"
original = "「はいっ<emoji=heart04>\u3000してっ<emoji=heart04>\u3000してくださいっ<emoji=heart04>\u3000あっあっあっあっあっ！\u3000好き、好き、好きっ<emoji=heart04>\u3000好き好き好き、好きぃっ<emoji=heart04>」"
translation = "「하이잇♥ 해줘요♥ 해주세요♥ 앗앗앗앗앗! 좋아, 좋아, 좋아♥ 좋아좋아좋아, 좋아아♥」"

[[dialogue]]
speaker = "グレイス"
original = "「魔王さん好きっ<emoji=heart04>\u3000大好きっ<emoji=heart04>\u3000大好きです──ぅあぁあぁあっ！？」"
translation = "「마왕님 좋아♥ 정말 좋아♥ 정말 좋아해요──으아아아앗!?」"

[[dialogue]]
speaker = "グレイス"
original = "「イクっ<emoji=heart04>\u3000一番、すごいのっ<emoji=heart04>\u3000すごいの来ましゅっ<emoji=heart04>\u3000イクっ<emoji=heart04>\u3000イクイクイクイクっ<emoji=heart04>\u3000イク、イクイク、イクぅ──っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가버려♥ 제일, 굉장한 거♥ 굉장한 거 와요♥ 가버려♥ 가버려가버려가버려가버려♥ 가, 가버려, 가버려──어♥♥♥」"

[[dialogue]]
speaker = "グレイス"
original = "「ふぇあぁあぁぁああぁぁああぁぁぁああ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「훼아아아아아아아아아아아아아아아아～～～♥♥♥」"

[[dialogue]]
speaker = "グレイス"
original = "「あ、あぁああっ<emoji=heart04>\u3000すごぃっ<emoji=heart04>\u3000お腹の奥でっ<emoji=heart04>\u3000びゅうびゅうっ──ひぅうっ<emoji=heart04>\u3000あ、ああ、あぁああぁっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아, 아아아앗♥ 굉장해♥ 배 속 깊은 곳에서♥ 뷰우뷰우──히우윽♥ 아, 아아, 아아아아앗……♥♥♥」"

[[dialogue]]
speaker = "unk"
original = "手錠の拘束で、腰をよじるくらいしか自由のないグレイスにペニスを突きさし、子宮に刷り込むように精液を放つ。"
translation = "수갑 구속 때문에 허리를 비트는 것 말고는 자유가 없는 그레이스에게 페니스를 찔러넣고, 자궁에 새겨넣듯이 정액을 쏟아낸다."

[[dialogue]]
speaker = "グレイス"
original = "「あったかいっ……これ、大好きっ……魔王さんっ……あ、あぁ、ぅ、ぅううっ──<emoji=heart04><emoji=heart04>」"
translation = "「따뜻해…… 이거, 정말 좋아…… 마왕님…… 아, 아아, 으, 으으윽──♥♥」"

[[dialogue]]
speaker = "unk"
original = "一滴も残さず。溜め込んだものをすべて。恋人の妖精の女の子に、種付けをして──"
translation = "한 방울도 남기지 않고. 모아둔 것을 전부. 연인인 요정 소녀에게 씨를 뿌리고──"

[[dialogue]]
speaker = "グレイス"
original = "「はあぁああっ……ふぅぅう～っ……<emoji=heart04>\u3000お射精、す～っごく……長かった、ですねー……<emoji=heart04>」"
translation = "「하아아아앗…… 후우우우～♥ 사정, 어어어엄청…… 길었네요……♥」"

[[dialogue]]
speaker = "unk"
original = "射精が終わり、栓を担っていたペニスを引き抜くと──どぷどぷ、ごぽごぽと精液があふれ出てくる。"
translation = "사정이 끝나고 마개 역할을 하던 페니스를 뽑아내자── 도프도프, 고포고포하며 정액이 넘쳐 흐른다."

[[dialogue]]
speaker = "グレイス"
original = "「あ、あぁあっ……やー、です……<emoji=heart04>\u3000出ていかないで……魔王さんが、せっかく出して、くれたのに……<emoji=heart04>」"
translation = "「아, 아아앗…… 시러요……♥ 나오지 마…… 마왕님이, 어렵게 내준 건데……♥」"

[[dialogue]]
speaker = "unk"
original = "もじもじと力の入らないお尻を動かして、精液の逆流を止めようとするグレイスがいじらしい。"
translation = "꼼지락거리며 힘이 들어가지 않는 엉덩이를 움직여 정액의 역류를 막으려는 그레이스가 애처롭다."

[[dialogue]]
speaker = "クロト"
original = "「もう１回してあげるから」"
translation = "「한 번 더 해줄 테니까.」"

[[dialogue]]
speaker = "グレイス"
original = "「本当ですかっ……<emoji=heart04>\u3000えへへへっ、うれしーですー……<emoji=heart04>」"
translation = "「정말인가요……♥ 에헤헤헤, 기뻐요오……♥」"

[[dialogue]]
speaker = "unk"
original = "ふやけ顔のまま、俺のことを熱っぽい視線で見上げてくるグレイス。"
translation = "풀린 얼굴 그대로, 나를 뜨거운 시선으로 올려다보는 그레이스."

[[dialogue]]
speaker = "グレイス"
original = "「じゃあ魔王さん……ちゅー、してください……<emoji=heart04>\u3000えっちなちゅーして、おち○ぽ硬ぁくしてください……<emoji=heart04>」"
translation = "「그럼 마왕님…… 뽀뽀, 해주세요……♥ 야한 뽀뽀 해서, 자지 딱딱하게 해주세요……♥」"

[[dialogue]]
speaker = "グレイス"
original = "「んぅちゅ……ちゅ、ちゅぱ……<emoji=heart04>\u3000えへへ<emoji=heart04>\u3000どんどん、おち○ぽおっきくなって、いきますー……<emoji=heart04>」"
translation = "「응으츄…… 츄, 츄파……♥ 에헤헤♥ 점점, 자지 커지고 있어요─……♥」"

[[dialogue]]
speaker = "unk"
original = "毎日毎日、エッチばかりするだなんてただれた関係かもしれないけれど……"
translation = "매일매일 섹스만 하다니 문란한 관계일지도 모르지만……"

[[dialogue]]
speaker = "unk"
original = "この子といつまで一緒にいられるか、わからない──だからこそ。"
translation = "이 아이와 언제까지 함께 있을 수 있을지 모른다── 그렇기에."

[[dialogue]]
speaker = "グレイス"
original = "「んちゅぅ……ん、ぁあっ<emoji=heart04>\u3000ぬるんって、挿入って、きましたぁ……<emoji=heart04>」"
translation = "「응츄우…… 응, 아앗♥ 미끄덩하고, 삽입해 왔어요……♥」"

[[dialogue]]
speaker = "unk"
original = "このかけがえのない時間が、愛おしくて。"
translation = "이 무엇과도 바꿀 수 없는 시간이 사랑스러워서."

[[dialogue]]
speaker = "グレイス"
original = "「魔王さん、好き……大好きです……えへへ<emoji=heart04>」"
translation = "「마왕님, 좋아해요…… 정말 좋아해요…… 에헤헤♥」"

[[dialogue]]
speaker = "unk"
original = "俺たちは疲れ果てて眠りに落ちるまで、ずっと繋がり続けるのだった。"
translation = "우리들은 기진맥진해서 잠이 들 때까지, 계속해서 이어져 있었다."

