[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「サプライズ歓迎会をするわよー！」"
translation = "「서프라이즈 환영회를 할 거야~!」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスの声かけにより、今回の隠し芸大会に参加した面々が集合した。"
translation = "비너스의 부름에 따라, 이번 장기 자랑 대회에 참가한 면면이 집결했다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「歓迎会……誰のですか？」"
translation = "「환영회…… 누구 건가요?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「決まってるじゃない！\u3000ヒメちゃんよ！」"
translation = "「당연하잖아! 히메짱이야!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ヒメちゃん……？\u3000ヒメちゃん……って、もしかして、オオヒメ様のことですか！？」"
translation = "「히메짱……? 히메짱……이라니, 설마 오오히메 님을 말씀하시는 건가요!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そうよ。本人が『アルモたん』みたいにきゃわわな愛称で呼んでほしいって言ってたわ。だから、ヒメちゃん」"
translation = "「그래. 본인이 『알모땅』처럼 귀여운 애칭으로 불러달라고 했거든. 그러니까 히메짱.」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「オオヒメが呼びにくければ、ヒメとでも呼んでくれ。私にはいささか可愛すぎる響きだが……」"
translation = "「오오히메가 부르기 힘들다면 히메라고 불러다오. 나에게는 다소 너무 귀여운 어감이다만……」"

[[dialogue]]
speaker = "unk"
original = "ヒメの実際の発言がこれなので、ヴィーナスの認識は大分ズレていた。"
translation = "히메의 실제 발언이 이거였기에, 비너스의 인식은 꽤 어긋나 있었다."

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ちょっち恐れ多いけど、めちゃかわ～。ギャップ萌えってヤツ～？」"
translation = "「조금 황송하지만, 대박 귀여워~. 갭 모에라는 거잖아~?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「でも、歓迎会ね……ヒメさんの好きな芸は散々披露しちゃったじゃない？\u3000また隠し芸する？」"
translation = "「하지만 환영회라…… 히메 씨가 좋아하는 장기는 실컷 보여줬잖아? 또 장기 자랑을 해?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そうなのよねー。ヒメちゃんは喜んでくれるでしょうけど、二番煎じじゃ物足りないし、他にも大きな催しが欲しいところだわ！」"
translation = "「그렇긴 하네~. 히메짱은 기뻐해 주겠지만, 재탕은 성에 안 차고, 다른 큰 행사가 필요해!」"

[[dialogue]]
speaker = "unk"
original = "（ヴィーナスがド派手にやりたいだけでは）"
translation = "(비너스가 화려하게 하고 싶을 뿐 아닌가.)"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「歓談中に申し訳ないけれど、お嬢様、少しばかり厄介なことになってしまったわ」"
translation = "「담소 중에 죄송합니다만 아가씨, 조금 골치 아픈 일이 생겨버렸어요.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あら、どうかしたの？」"
translation = "「어라, 무슨 일이야?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「年末、色々と慌ただしかった影響で、鏡餅用のお餅がつけていないのよ。由々しき事態だわ！」"
translation = "「연말에 여러모로 분주했던 영향으로 카가미모치용 떡을 치지 못했어요. 중대한 사태예요!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それは確かに困るわね！」"
translation = "「그건 확실히 곤란하네!」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「お餅がないというのは……人間界では大騒ぎするほどの……事件なのでしょうか……？」"
translation = "「떡이 없다는 게…… 인간계에서는 소동을 피울 정도의…… 사건인가요……?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「お正月に鏡餅がないなんて一大事に決まってるわ！\u3000九浄家一丸となって、お餅つきの用意をしないと──」"
translation = "「정초에 카가미모치가 없다니 큰일인 게 당연하잖아! 쿠죠 가문이 하나로 뭉쳐서 떡치기 준비를 해야──」"

[[dialogue]]
speaker = "unk"
original = "それなら餅つきを歓迎会にしたら？"
translation = "그럼 떡치기를 환영회로 하는 건 어때?"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それよ！\u3000大名案だわ、クロト！\u3000みんなでお餅つきパーティーをやりましょ！」"
translation = "「그거야! 대박 명안이야, 쿠로토! 다 같이 떡치기 파티를 하자!」"

[[dialogue]]
speaker = "unk"
original = "そして、翌日。早速、九浄家総出でのお餅つきパーティーが開催された。"
translation = "그리고 다음 날. 곧바로 쿠죠 가문 총출동 떡치기 파티가 개최되었다."

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「年越しに続いてお招きいただき、感謝の極みだ。こうして集まるのは、賑やかでいいことだ」"
translation = "「연말연시에 이어 초대받다니 감사의 극치다. 이렇게 모이는 것은 떠들썩해서 좋구나.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「みんなはお餅つきってやったことある？」"
translation = "「다들 떡치기 해본 적 있어?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「杵と臼を使って、ぺったんぺったんするアレですよね。幼い頃に一度やった気がしないでもないような……」"
translation = "「절구와 공이를 써서 떡방아를 찧는 그거 말이죠. 어릴 때 한 번 해본 것 같기도 하고……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そう、お月様で兎がやってるアレよ。九浄家では毎年の風物詩なの。つきたてのお餅は、出来合いとは一味違って最高よ！」"
translation = "「그래, 달에서 토끼가 하는 그거야. 쿠죠 가문의 매년 연례행사지. 갓 친 떡은 기성품과는 차원이 다른 최고라고!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「というわけで、フィオナ、見ざる言わざる働かざる者、食うべからず！\u3000あなたもお餅つきに参加するのよ！」"
translation = "「그런 고로, 피오나. 일하지 않는 자, 먹지도 마라! 너도 떡치기에 참가하는 거야!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「わかりました。でもつく方と捏ねる方、どっちにしましょう……？」"
translation = "「알겠습니다. 하지만 찧는 쪽과 빚는 쪽, 어느 쪽으로 할까요……?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「私が捏ねるから、フィオナがつく方やって。ぺったん、ぺったん、ってやれば簡単にできるから。ぺたんぺたんじゃないわよ」"
translation = "「내가 빚을 테니까 피오나가 찧는 쪽을 해. 떡방아를 쿵덕쿵덕 찧으면 간단히 되니까. 쿵떡쿵떡이 아니라고.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ぺったんとぺたんには違いがあるのでしょうか……？」"
translation = "「쿵덕쿵덕과 쿵떡쿵떡에 차이가 있는 건가요……?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「違うわよ～！\u3000ぺったんはぺったんで、ぺたんはぺたんなんだから！」"
translation = "「다르다고~! 쿵덕은 쿵덕이고 쿵떡은 쿵떡이니까!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「だからどう違うんですか……？」"
translation = "「그러니까 어떻게 다르냐고요……?」"

[[dialogue]]
speaker = "unk"
original = "フィオナが困惑しているその一方で──"
translation = "피오나가 당혹스러워하는 한편──"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「トリシャさん、行っくよ～。そーれ、ぺったんこ～、ぺったんこ～♪」"
translation = "「트리샤 씨, 간다구~. 영차, 쿵덕쿵덕, 쿵덕쿵덕♪」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「よい、しょっ……あちちち……炊き立てのもち米……アツアツですね……」"
translation = "「영, 차…… 뜨거거거…… 갓 지은 찹쌀…… 뜨끈뜨끈하네요……」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「だいじょぶ？\u3000やっぱ、あたしが捏ねよっか」"
translation = "「괜찮아? 역시 내가 빚을까?」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「いえ、力仕事は向いていませんので……それに捏ねる方のコツが掴めてきましたし……このまま……」"
translation = "「아니요, 힘쓰는 일은 어울리지 않으니까요…… 그리고 빚는 요령을 알 것 같기도 하고…… 이대로……」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「そ？\u3000んじゃ、ぺったんこ～、ぺったんこ～」"
translation = "「그래? 그럼 쿵덕쿵덕, 쿵덕쿵덕~」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「よいしょっ……よいしょっ……あちち……でも、友達との共同作業……すごく楽しい……にへへ……♪」"
translation = "「영차…… 영차…… 뜨거워…… 하지만 친구와의 공동 작업…… 정말 즐거워…… 니헤헤……♪」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ふっ……遅れなんて、私にかかれば有って無きが如しよ！\u3000すぐに取り返して見せるわ！」"
translation = "「훗…… 지체된 것 따위 나에게 맡기면 없는 것과 마찬가지야! 곧바로 만회해 보이겠어!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「はぁあぁぁぁっ、ぺったんぺったんぺったんたーん！」"
translation = "「하아아아아앗, 쿵덕쿵덕쿵덕쿵덕!」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ふふ、出たな、蘭美の秘奥義・超高速もちつき。大量のもち米が、１分でつき立ての美味なる餅と化す」"
translation = "「후후, 나왔군, 라비의 비오의·초고속 떡치기. 대량의 찹쌀이 1분 만에 갓 친 맛있는 떡으로 변한다.」"

[[dialogue]]
speaker = "unk"
original = "なんて速さだ！\n（ぺったん……ぺったん）"
translation = "엄청난 속도다!\\n(쿵덕…… 쿵덕)"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「誰のお胸がぺったんですって！？」"
translation = "「누구 가슴이 쿵덕이라는 거야!?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「誰も言っておらぬぞ、蘭美」"
translation = "「아무도 말 안 했다, 라비.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「どこからか心の声が聞こえたような気がしたのだけど……まあいいわ、そんなことよりも餅つきよ！」"
translation = "「어디선가 마음의 소리가 들린 것 같은 기분이 들었는데…… 뭐 됐어, 그런 것보다 떡치기야!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「さぁ、次のもち米を持ってきなさい！\u3000全てぺったんぺったんにしてやるわ！」"
translation = "「자, 다음 찹쌀을 가져오렴! 전부 떡으로 만들어 주마!」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「つき立てのお餅が、次から次にできるぞ！\u3000皆の者、熱い内に食せ！」"
translation = "「갓 친 떡이 차례차례 완성되는구나! 모두들 뜨거울 때 먹어라!」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「だが喉に詰まらないよう気をつけるのだぞ！\u3000ほれ、魔王も食え、食え。これぞ本物の餅だ」"
translation = "「단, 목에 걸리지 않게 조심해야 한다! 자, 마왕도 먹어라, 먹어. 이것이야말로 진짜 떡이다.」"

[[dialogue]]
speaker = "unk"
original = "はふはふ、もぐもぐ\nつきたてのお餅、うんま～～い！"
translation = "하후하후, 우물우물.\\n갓 친 떡, 맛있어~~!"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「最後まで作戦に参加できなかったけど、お呼ばれしちゃってよかったのかな……？」"
translation = "「마지막까지 작전에 참가하지 못했는데 초대받아도 괜찮았던 걸까……?」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「呼ばれてるからにはいいんじゃない？\u3000遠慮なくお餅いただいちゃおうっと。……うん、おいしい」"
translation = "「초대받았으니까 괜찮지 않아? 사양 말고 떡 먹어버리자. ……응, 맛있다.」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「ん～、お餅おいしー！\u3000ね、ミーちゃん♪」"
translation = "「음~, 떡 맛있다! 그치, 미짱♪」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「ふふ……」"
translation = "「후후……」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「そんなところで黄昏れてどうしました、オオヒメ。みなさまの輪の中に入りづらいのですか？」"
translation = "「그런 곳에서 황혼을 등지고 왜 그러시나요, 오오히메. 여러분의 고리 안에 들어가기 힘드신가요?」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「いや、そうではない。食を楽しむ皆の姿に喜びを感じているのだ」"
translation = "「아니, 그렇지 않다. 음식을 즐기는 모두의 모습에서 기쁨을 느끼고 있는 것이다.」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「私が司る摂理は普遍──光や水、空気……『世にあるべきもの』を行き渡らせること。故に私は《天恵》の二つ名を持つ」"
translation = "「내가 다스리는 섭리는 보편── 빛이나 물, 공기…… 『세상에 있어야 할 것』을 널리 퍼뜨리는 것. 고로 나는 《천혜》라는 이명을 가지고 있지.」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「農作物とは光と水、土の結晶だ。餅の原料であるもち米もまた、光や水によって育まれたもの。私の力が世界に貢献している証そのものだ」"
translation = "「농작물이란 빛과 물, 흙의 결정이다. 떡의 원료인 찹쌀 또한 빛과 물에 의해 길러진 것. 나의 힘이 세계에 공헌하고 있다는 증거 그 자체다.」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「美味しい餅を口にした者たちが、余すことなく笑顔を浮かべている。私の力で生まれたものが、人々を幸せにしていることが、こんなにも喜ばしい」"
translation = "「맛있는 떡을 입에 넣은 자들이 아낌없이 미소를 짓고 있다. 나의 힘으로 태어난 것이 사람들을 행복하게 하고 있다는 것이 이렇게나 기쁘구나.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「なるほど……あなたらしいですね。せっかくですから、私もあなたがもたらした豊穣のおこぼれにあずかるとしましょう」"
translation = "「과연…… 당신답네요. 기왕 이렇게 된 거, 저도 당신이 가져다준 풍요의 콩고물을 얻어먹도록 하죠.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「あ～ん。うふふ……何も付けていないのに、ほのかな甘みがあって美味しいです」"
translation = "「아~앙. 우후후…… 아무것도 묻히지 않았는데 은은한 단맛이 있어서 맛있어요.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「はい、あなたもどうぞ♪」"
translation = "「자, 당신도 드세요♪」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「ああ、頂こう。……うむ、美味い」"
translation = "「아아, 먹지. ……음, 맛있다.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「おや、あんこもあるのですね。しかも抹茶あんまで……！\u3000これはおもちを食べるのが止まらなくなってしまいます。オオヒメはどれがお好きですか？」"
translation = "「오야, 팥소도 있군요. 게다가 말차 팥소까지……! 이건 떡 먹는 걸 멈출 수 없게 되겠어요. 오오히메는 어떤 걸 좋아하시나요?」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「そうだな……ひとまず全部試してみるとするか」"
translation = "「글쎄…… 일단 전부 시도해 보기로 할까.」"

[[dialogue]]
speaker = "unk"
original = "餅はまだまだつき上がる。楽しいパーティはまだまだ終わりを迎えそうにない。"
translation = "떡은 계속해서 쳐진다. 즐거운 파티는 아직 끝을 맞이할 것 같지 않다."

