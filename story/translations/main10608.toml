[[dialogue]]
speaker = "unk"
original = "第８話,第８話『余は諦めない』,B"
translation = "제8화, 제8화 『짐은 포기하지 않는다』, B"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「えー光の魔女クラウディア、クラウディアをよろしくお願いするぞ。１２月２５日はクラウディア・イルゼ・フォン・ゴットフリートの誕生日……」"
translation = "「에~ 빛의 마녀 클라우디아, 클라우디아를 잘 부탁하노라. 12월 25일은 클라우디아 일제 폰 고트프리트의 생일……」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「選挙演説みたいになってきた……」"
translation = "「선거 연설처럼 됐네……」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ふう。サンタ稼業も楽ではないな」"
translation = "「후우. 산타 노릇도 쉽지 않구나」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「だが、これだけプレゼントを配れば、きっと大衆の意識に余の誕生日というものが刷り込まれたであろう」"
translation = "「하지만 이만큼 선물을 뿌렸으니 분명 대중의 의식에 짐의 생일이라는 것이 각인되었겠지」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「いずれ人間界でも、世界中の民が余の生誕を祝うというわけだ！\u3000あっはっは！」"
translation = "「머지않아 인간계에서도 전 세계의 백성들이 짐의 탄생을 축하하게 될 것이로다! 앗핫하!」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「よ！\u3000さすがクラウディア様！」"
translation = "「오! 역시 클라우디아 님!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「世間の声はどうだ、ちぇちゅーりえ？」"
translation = "「세상의 반응은 어떠냐, 체츄리에?」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「そーですねぇ……あ、あそこでさっき会った子が遊んでますよ」"
translation = "「글쎄…… 아, 저기서 아까 만난 애가 놀고 있네」"

[[dialogue]]
speaker_original = "ブランコに乗る男子"
speaker_translation = "그네 타는 남학생"
original = "「あのねあのね、僕と同じくらいの女の子がお菓子くれたんだよ」"
translation = "「있잖아 있잖아, 나랑 비슷한 또래 여자애가 과자를 줬어」"

[[dialogue]]
speaker_original = "ブランコに乗る女子"
speaker_translation = "그네 타는 여학생"
original = "「わたしのところにも来たよ！\u3000ちっさいお人形くれた！」"
translation = "「나한테도 왔어! 조그만 인형을 줬어!」"

[[dialogue]]
speaker_original = "ブランコに乗る男子"
speaker_translation = "그네 타는 남학생"
original = "「お菓子もいいけど、僕はゲームが欲しいな」"
translation = "「과자도 좋지만 난 게임을 갖고 싶어」"

[[dialogue]]
speaker_original = "ブランコに乗る女子"
speaker_translation = "그네 타는 여학생"
original = "「そろそろクリスマスだね！\u3000サンタさんにお願いするプレゼント、何にしよっかな～？」"
translation = "「슬슬 크리스마스네! 산타 할아버지한테 부탁할 선물 뭐로 할까~?」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「むぅ……！」"
translation = "「으으……!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「まだクリスマスなどと抜かしておる。サンタクロース──なかなか強力なライバルよ」"
translation = "「아직도 크리스마스 따위를 지껄이고 있구나. 산타클로스── 제법 강력한 라이벌이로다」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「サンタ人気は根強いみたいですねぇ」"
translation = "「산타 인기는 뿌리 깊네~」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「うむ。だが、この調子でプレゼントを配っていけば──きっと意識も変わっていくはずだ……！」"
translation = "「음. 하지만 이 기세로 선물을 뿌려 나간다면── 분명 의식도 변해갈 것이니라……!」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「その意気だよ、クラウディア様！」"
translation = "「그 기세야, 클라우디아 님!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ふう……ただ、少し休憩だ」"
translation = "「후우…… 다만, 조금 휴식이로다」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ところでちぇちゅーりえよ。このロッド、余が自分に振るとどうなるのだ？」"
translation = "「그건 그렇고 체츄리에여. 이 로드를 짐이 자신에게 휘두르면 어떻게 되느냐?」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「自分に？\u3000あー……それは試したことなかったけど、何かプレゼントが降ってくるんじゃないかな？」"
translation = "「자신한테? 아~…… 그건 시험해 본 적 없지만, 뭔가 선물이 떨어지지 않을까?」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ほう！？\u3000それは景気のいい話ではないか！」"
translation = "「호오!? 그거 참 신나는 이야기 아니냐!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「なぜ今までやらなかったのか。余の欲しいものはいくらでもあるぞ……むふふ、夢が膨らむようだ！」"
translation = "「왜 지금까지 하지 않았던 건가. 짐이 갖고 싶은 건 얼마든지 있느니라…… 무후후, 꿈이 부푸는구나!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「そーれ……メリーマイバースデ～！！」"
translation = "「자아…… 메리 마이 버스데이~!!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「──出たぞ！」"
translation = "「──나왔도다!」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「ほほう、これは──『ビフテキさん次郎』だね」"
translation = "「호호오, 이건── 『비프스테이크 씨 지로』네」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「なんなのだ、それは」"
translation = "「그게 무엇이냐」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「まるで肉厚のビーフステーキ──のような味を目指した駄菓子らしい。原材料は魚のすり身」"
translation = "「마치 두툼한 비프스테이크── 같은 맛을 목표로 한 불량 식품 같네. 원재료는 생선 살」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「もぐもぐ……うーん、悪くはないが、誕生日プレゼントとしてはパンチが弱いぞ。ごちそーさま」"
translation = "「우물우물…… 으음, 나쁘지는 않다만 생일 선물로서는 임팩트가 약하도다. 잘 먹었노라」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「食べるの早っ！？」"
translation = "「먹는 거 빨라!?」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「もういっぺんだ！\u3000食べ物はもういい。余は新しいドールハウスが欲しいぞ。魔法でカスタマイズして遊ぶのだ」"
translation = "「한 번 더다! 먹을 건 이제 됐다. 짐은 새로운 돌 하우스를 원하노라. 마법으로 커스터마이즈해서 놀 것이니라」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「これは……ワラ人形だね。ドール違いだ」"
translation = "「이건…… 짚 인형이네. 인형이긴 한데 종류가 달라」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「も……もういっぺんだ！\u3000なんでもいいから余の欲しいものを出せ！」"
translation = "「하…… 한 번 더다! 뭐든 좋으니 짐이 갖고 싶은 걸 내놓아라!」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「すごい、ビフテキ人形だ」"
translation = "「굉장해, 비프스테이크 인형이야」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「──なぜ混ざるのだ！？\u3000欠陥品だぞこれは、振れば振るほどトンチンカンなものが出てくるではないか！」"
translation = "「──왜 섞이는 것이냐!? 결함품이로다 이건, 휘두르면 휘두를수록 뚱딴지같은 것만 나오지 않느냐!」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「うーん、まだまだオリジナルフォームの性能には遠いか……」"
translation = "「으음, 아직 오리지널 폼의 성능에는 한참 멀었나 보네……」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「でも、おかげでいい実験結果が得られたよ。ありがとうクラウディア様」"
translation = "「하지만 덕분에 좋은 실험 결과를 얻었어. 고마워 클라우디아 님」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「やれやれ……やはり自分に使うものではないということか」"
translation = "「이런이런…… 역시 자신에게 쓰는 물건은 아니라는 뜻인가」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「というか、よくよく考えたらなぜ余は自分の誕生日に他人へプレゼントを配っているのだ？\u3000何もかもあべこべな気がしてきたぞ」"
translation = "「그보다 곰곰이 생각해보니 왜 짐은 자신의 생일에 남에게 선물을 뿌리고 있는 것이냐? 모든 게 뒤죽박죽인 기분이 드는구나」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「急に冷静になられるとアタシが困るっていうか……」"
translation = "「갑자기 냉정해지시면 제가 곤란해진다랄까……」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「このままクラウディア様の誕生日が忘れ去られてもいいの？\u3000このままじゃ世間はクリスマス一色だよ」"
translation = "「이대로 클라우디아 님의 생일이 잊혀져도 괜찮아? 이대로라면 세상은 크리스마스 일색이라구」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「おお、そうだった。余の誕生日を知らしめるためならなんでもするぞ」"
translation = "「오오, 그랬지. 짐의 생일을 알리기 위해서라면 뭐든 하겠노라」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「よっ！\u3000魔女界いち～！」"
translation = "「오! 마녀계 제일~!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「──見つけたぞ！」"
translation = "「──찾았다!」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「──クラウディア様！\u3000ツェツィーリエ！\u3000ここにいたんですね！」"
translation = "「──클라우디아 님! 체칠리에! 여기 있었군요!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「む？」"
translation = "「음?」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「あ、やば」"
translation = "「아, 위험해」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「まったく、手間をかけさせてくれる──姫様。帰りますよ」"
translation = "「정말이지, 수고를 끼치게 하는군── 공주님. 돌아갑시다」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「嫌だ。余にはまだまだやることがあるのだ」"
translation = "「싫도다. 짐에게는 아직 할 일이 남아 있느니라」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「やること──？」"
translation = "「할 일──?」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「クラウディア様の服……それって……」"
translation = "「클라우디아 님의 옷…… 그건……」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「アタシのＮＥＷ発明品でーす♪」"
translation = "「제 NEW 발명품이에요♪」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ふっふっふ。この服のおかげで余はサンタを超える存在となったのだ！」"
translation = "「훗훗훗. 이 옷 덕분에 짐은 산타를 초월하는 존재가 되었노라!」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「やっぱりツェツィーリエのせいじゃない！」"
translation = "「역시 체칠리에 때문이잖아!」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「いやあ、アタシはただクラウディア様の笑顔が見たくてこの戦闘服を造っただけっていうか」"
translation = "「아니 뭐, 저는 그저 클라우디아 님의 미소를 보고 싶어서 이 전투복을 만들었을 뿐이랄까」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「──っていうか待って、発明とか聞いてない。その開発費はどこから出たっていうんです……？」"
translation = "「──랄까 잠깐, 발명이라니 듣지 못했어. 그 개발비는 어디서 나왔다는 거죠……?」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「まあまあ、細かいことは気にせず。クラウディア様の笑顔はプライスレスだよ」"
translation = "「자자, 세세한 건 신경 쓰지 말고. 클라우디아 님의 미소는 프라이스리스라구요」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「ま……またネビュラの運用資金が～～！」"
translation = "「또…… 또 네뷸라의 운용 자금이～～!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「おめかしは基地でもできます。姫様。無断での外出は禁止と、再三言い付けていたはずです」"
translation = "「꽃단장은 기지에서도 할 수 있습니다. 공주님. 무단 외출은 금지라고, 재삼 일러두었을 텐데요」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「よいではないか！\u3000お主たちだって学園やら九浄家やらと<b>ふれんどりい</b>にしておる」"
translation = "「좋지 아니한가! 네놈들 또한 학원이나 쿠죠 가문과 <b>프렌들리</b>하게 지내고 있지 않느냐」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「もはや魔女と人間が交流する開国の時代！\u3000今どき外出禁止など古いのだ！」"
translation = "「이제는 마녀와 인간이 교류하는 개국의 시대! 지금 시대에 외출 금지라니 구식이로다!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「なるほど……確かに、魔女と人間の交流は解禁されました。今までのような<ruby>古色蒼然<rt>こしょくそうぜん</rt></ruby>とした規律は通じないでしょう」"
translation = "「과연…… 확실히, 마녀와 인간의 교류는 해금되었습니다. 지금까지와 같은 고색창연한 규율은 통하지 않겠지요」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「だろう？」"
translation = "「그렇지?」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「──が！\u3000私と姫様の間にある『ネビュラとのおやくそく』はまだ活きております！」"
translation = "「──하지만! 저와 공주님 사이에 있는 『네뷸라와의 약속』은 아직 살아 있습니다!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「なので姫様だけは無断外出禁止！\u3000ちゃんと私の許可を得てからでないと外出はなりません！」"
translation = "「그러니 공주님만은 무단 외출 금지! 제대로 저의 허가를 얻고 나서가 아니면 외출은 안 됩니다!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「なあっ！？\u3000ず、ずるいぞそんなの！\u3000オーボーだ！\u3000殿様商売だ！」"
translation = "「뭐앗!? 치, 치사하도다 그런 건! 횡포로다! 배짱 장시로다!」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「殿様商売ではないよ」"
translation = "「배짱 장사가 아니야」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「姫様を自由にさせたら大抵ろくなことにならない──今は大事な時期だというのに、魔女全体が誤解されるような事をしでかすに決まっている」"
translation = "「공주님을 자유롭게 놔두면 대체로 제대로 된 일이 안 생겨── 지금은 중요한 시기인데도, 마녀 전체가 오해받을 만한 일을 저지를 게 뻔합니다」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「言いがかりはよすのだ！\u3000余がどんな誤解を与えたという！？」"
translation = "「생트집은 그만두는 것이니라! 짐이 어떤 오해를 주었다는 말이냐!?」"

[[dialogue]]
speaker_original = "ブランコに乗る男子"
speaker_translation = "그네 타는 남학생"
original = "「そういえばさっきの子、ひかりの魔女だって言ってたよ」"
translation = "「그러고 보니 아까 그 누나, 빛의 마녀라고 말했어」"

[[dialogue]]
speaker_original = "ブランコに乗る女子"
speaker_translation = "그네 타는 여학생"
original = "「へー！\u3000魔女ってお菓子くれるんだ」"
translation = "「헤에! 마녀는 과자를 주는구나」"

[[dialogue]]
speaker_original = "ブランコに乗る男子"
speaker_translation = "그네 타는 남학생"
original = "「ハロウィンだけかと思ってたよ。季節ごとに来てくれるのかも」"
translation = "「할로윈 때뿐인 줄 알았어. 계절마다 와줄지도 몰라」"

[[dialogue]]
speaker_original = "ブランコに乗る女子"
speaker_translation = "그네 타는 여학생"
original = "「なら、今度のお正月もお菓子配ってくれそう！」"
translation = "「그럼, 이번 설날에도 과자 나눠줄 것 같아!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「──立派に間違った認識を与えているようですが？」"
translation = "「──훌륭하게 잘못된 인식을 심어주고 있는 듯합니다만?」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「別によいではないか。地域密着というやつだ」"
translation = "「별로 상관없지 않느냐. 지역 밀착이라는 것이니라」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「いや、それは問題ですから……ほら、基地にはクラウディア様のお菓子もありますよ？」"
translation = "「아니, 그건 문제니까요…… 자, 기지에는 클라우디아 님이 좋아하시는 과자도 있다고요?」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ふん。そんなもので<ruby>籠絡<rt>ろうらく</rt></ruby>されるほど、余は子どもではない！\u3000嫌だ嫌だ、まだ余の野望は達成されておらんのだ！」"
translation = "「흥. 그런 것으로 농락당할 정도로, 짐은 어린애가 아니니라! 싫도다 싫도다, 아직 짐의 야망은 달성되지 않았느니라!」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「あ、逃げた！」"
translation = "「아, 도망쳤다!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「追うぞ──！」"
translation = "「쫓는다──!」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「ひえー、大変だー！」"
translation = "「히에~, 큰일이다!」"

