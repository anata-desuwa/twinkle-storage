[[dialogue]]
speaker = "unk"
original = "蜂だか蝶だかのように、ふらふらと甘い香りに惹かれ、学園内のカフェテリアに立ち寄る。"
translation = "벌인지 나비인지처럼, 비틀비틀 달콤한 향기에 이끌려 학원 내의 카페테리아에 들른다."

[[dialogue]]
speaker = "unk"
original = "中では可愛らしいハートマークの装飾が飛び交っており、バレンタインデーが近づいているのを否が応でも感じさせられた。"
translation = "안에서는 귀여운 하트 마크 장식이 날아다니고 있어, 발렌타인 데이가 다가오고 있음을 싫어도 느끼게 했다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「もう少し、ブランデーの量を増やしてもいいんじゃないかしら？\u3000お酒の風味を強く感じられた方が、大人の恋人イベントっぽくならない？」"
translation = "「조금 더 브랜디 양을 늘려도 되지 않을까? 술 풍미가 강하게 느껴지는 편이, 어른스러운 연인 이벤트 같지 않아?」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「でも、お酒の風味が得意じゃない方もいらっしゃいますし、子どもたちにも配ることを考えると──あっ、会長さま」"
translation = "「하지만 술 풍미를 좋아하지 않는 분도 계시고, 아이들에게도 나눠줄 것을 생각하면── 앗, 회장님」"

[[dialogue]]
speaker = "unk"
original = "２人ともその衣装は……？"
translation = "둘 다 그 의상은……?"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「新しく変身できるようになったバレンタインフォームよ。不本意ながら必要に迫られてね」"
translation = "「새롭게 변신할 수 있게 된 발렌타인 폼이야. 본의 아니게 필요에 쫓겨서 말이지」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「私もイレーナさまにコツを教わって変身できるようになりました！」"
translation = "「저도 이레이나 님께 요령을 배워서 변신할 수 있게 되었어요!」"

[[dialogue]]
speaker = "unk"
original = "必要性？"
translation = "필요성?"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「実は教皇庁主催で、バレンタインイベントが催されることになりまして」"
translation = "「사실 교황청 주최로 발렌타인 이벤트가 열리게 되었거든요」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「そのイベントを盛り上げろって教皇庁に言われて、イベントで配るお菓子を作ってるところなのよ。つまりこれも仕事ってわけ」"
translation = "「그 이벤트를 북돋우라고 교황청에서 명령해서, 이벤트에서 나눠줄 과자를 만들고 있는 중이야. 즉 이것도 업무라는 소리」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「おや、意外そうな顔をされていますね、会長さま。確かに教皇庁にはお堅いイメージがあるかもしれません」"
translation = "「오야, 의외라는 표정을 짓고 계시네요, 회장님. 확실히 교황청에는 딱딱한 이미지가 있을지도 모르겠어요」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あたしも面食らったわ。教皇庁の外まで聞こえそうな、変な悲鳴まであげちゃったわよ」"
translation = "「나도 어안이 벙벙했어. 교황청 밖까지 들릴 것 같은, 이상한 비명까지 질러버렸다고」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「『リクリエで不安が多い世相だからこそ、愛を感じて安らぎを覚えてほしい』ってのが教皇庁の判断なんだって……だからって、ねぇ？」"
translation = "「『리크리에로 불안이 많은 시국이니까 더더욱, 사랑을 느끼고 안식을 얻길 바란다』는 게 교황청의 판단이래…… 그렇다고 해서, 그치?」"

[[dialogue]]
speaker = "unk"
original = "不服そうだ"
translation = "불만스러워 보인다"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「不服も不服、大不服よ。教皇庁の命令だから、仕方な～くチョコにまみれてるの」"
translation = "「불만이고 말고, 대불만이야. 교황청의 명령이니까, 어쩔 수~ 없이 초코에 파묻혀 있는 거라고」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「イレーナさま、ダメですよ。チョコを作る時は笑顔じゃないと。嫌そうな顔をしていると苦くなっちゃいますよ」"
translation = "「이레이나 님, 안 돼요. 초코를 만들 때는 웃는 얼굴이어야죠. 싫은 표정을 짓고 있으면 써져 버린다고요」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「はいはい、ニッコニッコニッコ♪\u3000美味しくな～れ、甘くな～れ……って、いつまでやればいいのよ？\u3000これ何個作ればいいの？」"
translation = "「네 네, 싱글벙글 싱글벙글♪ 맛있어져라~, 달콤해져라~…… 대체 언제까지 해야 하는 거야? 이거 몇 개나 만들어야 해?」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「そうですね……イレーナさまの人気を考えれば、ざっと１０００個は必要かと」"
translation = "「글쎄요…… 이레이나 님의 인기를 생각하면, 대략 1000개는 필요하지 않을까 싶네요」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「はぁ！？\u3000なんでそうなるのよ！？」"
translation = "「하아!? 왜 그렇게 되는 건데!?」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「イレーナさまは故郷イタリアだけでなく、流星市国でも聖女として老若男女に敬われ、慕われていますから、至極当然かと」"
translation = "「이레이나 님은 고향 이탈리아뿐만 아니라 유성시국에서도 성녀로서 남녀노소에게 존경받고 사랑받고 계시니까, 지극히 당연하죠」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「何よそれ……さすがに言いすぎでしょ……」"
translation = "「뭐야 그게…… 아무리 그래도 너무 과장이잖아……」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「でも教皇庁からは、無理のない範囲で、と言われているのですよね？」"
translation = "「하지만 교황청에서는 무리가 없는 범위 내에서 하라고 하셨잖아요?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「言われてるけど、だからといってイベントに来た人を手ぶらで帰らせるわけにはいかないでしょ」"
translation = "「듣긴 했지만, 그렇다고 해서 이벤트에 온 사람을 빈손으로 돌려보낼 수는 없잖아」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「せっかくお菓子をもらいに来たのに、悲しい顔されるのはゴメンよ」"
translation = "「기껏 과자를 받으러 왔는데, 슬픈 표정을 짓는 건 사양이야」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ふふ……イレーナさまは流星市国のみなさまを愛されているのですね」"
translation = "「후후…… 이레이나 님은 유성시국 여러분을 사랑하고 계시는군요」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「べ、別にそんなんじゃないわよ！\u3000足りなくて文句が出たら、上司にくどくど言われるのは私なんだから、それが嫌なだけ！」"
translation = "「벼, 별로 그런 거 아니야! 부족해서 불만이 나오면, 상사한테 구시렁구시렁 소리를 듣는 건 나니까, 그게 싫을 뿐이야!」"

[[dialogue]]
speaker = "unk"
original = "（イレーナらしいな）"
translation = "(이레이나답군)"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "（ですね。イレーナさまは相変わらず素直じゃないです）"
translation = "(그러게요. 이레이나 님은 여전히 솔직하지 못하시네요)"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「とにかく数を揃えないとダメね。でも何を作るにしたって、助っ人が欲しいわ……」"
translation = "「어쨌든 수를 갖춰야겠어. 하지만 뭘 만들든 간에, 도우미가 필요해……」"

[[dialogue]]
speaker = "？？？"
original = "「お邪魔いたします」"
translation = "「실례하겠습니다」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あら、どちらさまでしょう？\u3000私たちに何かご用でしょうか？」"
translation = "「어라, 누구신가요? 저희에게 무슨 용건이라도?」"

[[dialogue]]
speaker = "？？？"
original = "「こちらからチョコの甘～い匂いと、とても強いバレンタインの波動を感じたものですから」"
translation = "「이쪽에서 초코의 달콤~한 냄새와, 아주 강한 발렌타인의 파동이 느껴졌거든요」"

[[dialogue]]
speaker = "？？？"
original = "「ちょこっと覗いてみようかと思いまして。チョコだけに<emoji=heart04>」"
translation = "「살짝 들여다볼까 해서요. 초코니까 톡 하고요<emoji=heart04>」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「バレンタインの……波動？」"
translation = "「발렌타인의…… 파동?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "（あんたの知り合い？\u3000なんかただならぬ気配を感じるんだけど……）"
translation = "(너 아는 사람이야? 왠지 심상치 않은 기운이 느껴지는데……)"

[[dialogue]]
speaker = "unk"
original = "いや、初対面だ"
translation = "아니, 초면이야"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「申し遅れました。私、流星学園３年生の──ウルスラ・バレンタインと申します」"
translation = "「인사가 늦었습니다. 저는 유성 학원 3학년인── 우르술라 발렌타인이라고 합니다」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「何やら難儀しているようにお見受けしますが、よろしければ私に、バレンタインのお手伝いをさせていただけませんか？」"
translation = "「무언가 난처해하고 계신 듯 보입니다만, 괜찮으시다면 제가 발렌타인 준비를 도와드려도 될까요?」"

