[[dialogue]]
speaker = "ソフィア"
original = "「──滅！！」"
translation = "「──멸!!」"

[[dialogue]]
speaker = "アポロ"
original = "「おおっすごいぜソフィア！\u3000氷結の星術で虫たちを氷漬けだ！」"
translation = "「오오 대단한걸 소피아! 빙결의 성술로 벌레들을 얼려버렸어!」"

[[dialogue]]
speaker = "ソフィア"
original = "「──さらに滅！！」"
translation = "「──한 번 더 멸!!」"

[[dialogue]]
speaker = "アナ"
original = "「今度は流氷を一撃ノックアウト──さすがです！」"
translation = "「이번엔 유빙을 일격에 넉아웃── 역시 대단하십니다!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "（普段のアステラ討伐より張り切ってない？）"
translation = "(평소의 아스텔라 토벌보다 더 힘내고 있지 않아?)"

[[dialogue]]
speaker = "サーシャ"
original = "（寒さの恨みは恐ろしいわ～）"
translation = "(추위에 대한 원한은 무섭네~)"

[[dialogue]]
speaker = "unk"
original = "この『冬のイタズラ』という現象は──"
translation = "이 『겨울의 장난』이라는 현상은──"

[[dialogue]]
speaker = "unk"
original = "リゾート結界の各地において、冷たい隙間風や流れ着く流氷といった形でたびたび発生するとのことだった。"
translation = "리조트 결계의 각지에서, 차가운 외풍이나 흘러들어오는 유빙 같은 형태로 종종 발생한다는 모양이었다."

[[dialogue]]
speaker = "unk"
original = "無限かき氷を溶かし尽くした後も、ビーチのあちこちで『冬』めいた現象が目撃されるようになっていた。"
translation = "무한 빙수를 다 녹인 후에도, 해변 여기저기서 『겨울』 같은 현상이 목격되게 되었다."

[[dialogue]]
speaker = "フィオナ"
original = "「参りましたね……向こうのヤシの木がいつの間にかモミの木に変わっていました」"
translation = "「난처하네요…… 저쪽의 야자수가 어느샌가 전나무로 바뀌어 있었어요」"

[[dialogue]]
speaker = "マトイ"
original = "「そんなのもアリなの！？」"
translation = "「그런 것도 가능한 거야!?」"

[[dialogue]]
speaker = "ルリエル"
original = "「ひええ、ツリー型の魔獣が襲ってきますぅ～！」"
translation = "「히에에, 트리형 마수가 습격해와요~!」"

[[dialogue]]
speaker = "ユウリ"
original = "「任せな、ルリ。あたしの炎で撃退してやる──」"
translation = "「맡겨둬, 루리. 내 불꽃으로 격퇴해주지──」"

[[dialogue]]
speaker = "アポロ"
original = "「ん？\u3000待てユウリ、あの樹の枝になんかぶら下がってるぞ。あれは──」"
translation = "「응? 잠깐 유우리, 저 나무 가지에 뭔가 매달려 있어. 저건──」"

[[dialogue]]
speaker = "unk"
original = "ポチ袋だ"
translation = "세뱃돈 봉투다"

[[dialogue]]
speaker = "アポロ"
original = "「ってことは……お年玉だ！」"
translation = "「그렇다는 건…… 세뱃돈이다!」"

[[dialogue]]
speaker = "ユウリ"
original = "「なんでツリーにお年玉がついてるんだよ」"
translation = "「어째서 트리에 세뱃돈이 붙어 있는 거냐고」"

[[dialogue]]
speaker = "リップル"
original = "「冬の風物詩だからデース！\u3000冬のイタズラは冬にまつわることがなんでも起きてしまうのデース！」"
translation = "「겨울의 풍물시니까 그런 거예용─! 겨울의 장난은 겨울에 관련된 일이라면 뭐든지 일어나버리는 거예용─!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ま、でもいいんじゃない？\u3000私たちへのお駄賃ってことで──」"
translation = "「뭐, 그래도 괜찮지 않아? 우리한테 주는 용돈이라고 생각하면──」"

[[dialogue]]
speaker = "ソフィア"
original = "「お年玉──滅！！」"
translation = "「세뱃돈── 멸!!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「──えぇぇっ！？\u3000お年玉はもらっておくもんじゃないの！？」"
translation = "「──에에에!? 세뱃돈은 받아둬야 하는 거 아냐!?」"

[[dialogue]]
speaker = "ソフィア"
original = "「我らが常夏の楽園に、冬の風物詩など不要です！」"
translation = "「우리들의 상하 낙원에, 겨울의 풍물시 따위는 불필요합니다!」"

[[dialogue]]
speaker = "ユウリ"
original = "「徹底してやがるぜ……」"
translation = "「철저하구만……」"

[[dialogue]]
speaker = "ソフィア"
original = "「ほら、新星会長さんもボサッとしてないで！\u3000襲い来る冬の魔の手からリゾートを守るのですよ！」"
translation = "「자, 신성 회장님도 멍하니 있지 말고! 습격해오는 겨울의 마수로부터 리조트를 지키는 거예요!」"

[[dialogue]]
speaker = "unk"
original = "ひときわ張り切るソフィア隊長によって、冬のイタズラたちは順調に駆逐されていった……。"
translation = "유독 의욕이 넘치는 소피아 대장에 의해, 겨울의 장난들은 순조롭게 구축되어 갔다……."

[[dialogue]]
speaker = "リップル"
original = "「──フゥ。ベリーベリーサンキューです、ソフィア。おかげでナントカ落ち着きました」"
translation = "「──후우. 베리 베리 땡큐입니더, 소피아. 덕분에 어떻게든 진정됐어요」"

[[dialogue]]
speaker = "ソフィア"
original = "「ええ、お安い御用です。私たちの終わりなき夏\u3000～ジ・エンドレス・サマー～\u3000を壊させるわけにはいきませんから」"
translation = "「네, 별거 아닙니다. 우리들의 끝없는 여름 ~지 엔들리스 서머~ 를 망치게 둘 수는 없으니까요」"

[[dialogue]]
speaker = "unk"
original = "ガシッと握手を交わす２人。"
translation = "꽉 악수를 나누는 두 사람."

[[dialogue]]
speaker = "unk"
original = "すっかり意気投合してしまっている。"
translation = "완전히 의기투합해버렸다."

[[dialogue]]
speaker = "リップル"
original = "「ジツは、ワタシ、このトコナツの結界で世界を覆い尽くそうとカンガえているのですっ！」"
translation = "「사실, 전 이 상하의 결계로 세계를 뒤덮어버리려고 생각하고 있어용!」"

[[dialogue]]
speaker = "リップル"
original = "「このリゾート開発を繰り返していけば──いずれ世界は真のエンドレスサマーに包まれ、みんなハッピー♪\u3000になれる素敵ケイカクなのですっ！」"
translation = "「이 리조트 개발을 반복해 나가면── 언젠가 세계는 진정한 엔들리스 서머에 감싸여, 모두 해피♪하게 될 수 있는 멋진 계획입니당!」"

[[dialogue]]
speaker = "ソフィア"
original = "「実に素晴らしいアイディアですね！\u3000私も協力を惜しみません」"
translation = "「실로 훌륭한 아이디어군요! 저도 협력을 아끼지 않겠습니다」"

[[dialogue]]
speaker = "アナ"
original = "「まずいです。あの計画にシンパができてしまいました」"
translation = "「큰일이네요. 저 계획에 동조자가 생겨버렸습니다」"

[[dialogue]]
speaker = "ソフィア"
original = "「この調子でリゾートから徹底的に冬を追い出し、我らが真の楽園を取り戻すのです……！」"
translation = "「이 기세로 리조트에서 철저하게 겨울을 몰아내고, 우리들의 진정한 낙원을 되찾는 겁니다……!」"

[[dialogue]]
speaker = "リップル"
original = "「その意気です、オー！」"
translation = "「그 기세예용, 오─!」"

[[dialogue]]
speaker = "ユウリ"
original = "（あの熱気があればこのままでもいいんじゃねーか……？）"
translation = "(저 열기라면 이대로도 괜찮지 않겠냐……?)"

[[dialogue]]
speaker = "セーラ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "ユウリ"
original = "「ん？\u3000どした、セーラさん」"
translation = "「응? 왜 그래, 세라 씨」"

[[dialogue]]
speaker = "セーラ"
original = "「あ、えっと……」"
translation = "「아, 그게……」"

[[dialogue]]
speaker = "セーラ"
original = "（んー……気のせいかな？\u3000今、影っぽいのが横切ったように見えたけど──）"
translation = "(음~…… 기분 탓인가? 지금 그림자 같은 게 가로지른 것처럼 보였는데──)"

[[dialogue]]
speaker = "？？？"
original = "「フッフッフ……冬をオイダス、とは」"
translation = "「훗훗훗…… 겨울을 몰아낸다, 라」"

[[dialogue]]
speaker = "？？？"
original = "「果たしてそうウマクいくカナ……？」"
translation = "「과연 그렇게 잘 될까나……?」"

