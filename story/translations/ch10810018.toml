[[dialogue]]
speaker = "unk"
original = "夜のパトロールを終え、俺たちは星徒会室に戻ってきた。"
translation = "밤의 순찰을 마치고 우리는 학생회실로 돌아왔다."

[[dialogue]]
speaker = "グロリア"
original = "「ふう……お疲れさまです。モンスターと戦っていっぱい汗をかいてしまいました……はふぅ……」"
translation = "「후우…… 수고하셨어요. 몬스터랑 싸우느라 땀을 잔뜩 흘려버렸네요…… 하아……」"

[[dialogue]]
speaker = "unk"
original = "気休めにしかならないだろうに、グロリアさんはぱたぱたと手うちわで仰ぐ。"
translation = "위안밖에 안 될 텐데도 글로리아 씨는 파닥파닥 손부채질을 한다."

[[dialogue]]
speaker = "unk"
original = "その微風に乗って、汗を滴らせる彼女からは、無意識に男をその気にさせるフェロモンが撒き散らされていた。"
translation = "그 미풍을 타고, 땀을 흘리는 그녀에게서는 무의식적으로 남자를 자극하는 페로몬이 흩뿌려지고 있었다."

[[dialogue]]
speaker = "グロリア"
original = "「今日も守られてばかりでしたね。あなたには返しきれないほどの御恩ができてしまいました。なにかご奉仕して差し上げられることがあればいいのですけど……」"
translation = "「오늘도 보호받기만 했네요. 당신에게 갚지 못할 만큼의 은혜를 입어버렸어요. 뭔가 봉사해드릴 수 있는 게 있으면 좋을 텐데……」"

[[dialogue]]
speaker = "グロリア"
original = "「あ、あの……会長さん？\u3000お腹の辺りに、硬いものが当たっているのですけどこれは……？\u3000あっ……もしかして、お、おち○ちんですか？」"
translation = "「저, 저기…… 회장님? 배 근처에 딱딱한 게 닿고 있는데 이건……? 앗…… 혹시 자, 자지인가요?」"

[[dialogue]]
speaker = "クロト"
original = "「ちゃんと知ってるんですね」"
translation = "「제대로 알고 있네요」"

[[dialogue]]
speaker = "グロリア"
original = "「い、いえ、授業で習った以上のことはあまり……。おち○ちんを刺激すると精液が出て、女性の卵子と受精して、着床すると子を授かるということくらいしか……」"
translation = "「아, 아니요, 수업 시간에 배운 것 이상은 잘…… 자지를 자극하면 정액이 나오고, 여성의 난자와 수정해서 착상하면 아이를 갖게 된다는 것 정도밖에는……」"

[[dialogue]]
speaker = "unk"
original = "保健体育の授業そのままの説明だけれど、赤面したグロリアさんの口からたどたどしく告げられるとペニスに響く。"
translation = "보건 체육 수업 그대로의 설명이지만, 붉어진 글로리아 씨의 입에서 더듬더듬 흘러나오니 페니스에 울린다."

[[dialogue]]
speaker = "グロリア"
original = "「勃起してるんですよね……？\u3000おち○ちんって、こんなに硬くなるんですね……大きく腫れて、ズボンの中で窮屈そう……。会長さん、苦しいですよね……？」"
translation = "「발기하고 있는 거죠……? 자지라는 건 이렇게나 딱딱해지는 거군요…… 크게 부풀어서 바지 속이 답답해 보여요. 회장님, 괴로우시죠……?」"

[[dialogue]]
speaker = "クロト"
original = "「うん……」"
translation = "「응……」"

[[dialogue]]
speaker = "グロリア"
original = "「一度勃起してしまうと精液を吐き出すまで、おち○ちんは鎮まらないんですよね……？」"
translation = "「한번 발기해버리면 정액을 토해낼 때까지 자지는 가라앉지 않는 거죠……?」"

[[dialogue]]
speaker = "クロト"
original = "「……うん？」"
translation = "「……응?」"

[[dialogue]]
speaker = "unk"
original = "グロリアさんの性知識には大きな勘違いがあった。でも、今はその勘違いに乗るとしよう。"
translation = "글로리아 씨의 성 지식에는 큰 오해가 있었다. 하지만 지금은 그 오해를 이용하기로 하자."

[[dialogue]]
speaker = "グロリア"
original = "「フランさんの言う通り、私がエロいせいなんですね……ごめんなさい。ちゃんと責任を取って、おち○ちんを鎮めさせていただきます」"
translation = "「프랑 씨 말대로 제가 야한 탓이군요…… 죄송해요. 제대로 책임을 지고 자지를 가라앉혀 드릴게요」"

[[dialogue]]
speaker = "グロリア"
original = "「でも、やり方がわからなくて……会長さん、どうすればよろしいですか……？」"
translation = "「하지만 방법을 잘 몰라서…… 회장님, 어떻게 하면 될까요……?」"

[[dialogue]]
speaker = "グロリア"
original = "「あ……あぅ……」"
translation = "「아…… 아으……」"

[[dialogue]]
speaker = "unk"
original = "寝転がったグロリアさんの胸元をはだけさせ、そのしっとりと汗ばんだおっぱいにペニスを挟み込む。"
translation = "누워있는 글로리아 씨의 가슴팍을 헤치고, 그 촉촉하게 땀에 젖은 가슴 사이에 페니스를 끼워 넣는다."

[[dialogue]]
speaker = "グロリア"
original = "「私のおっぱいにおち○ちんを挟んで……こ、これは何をしているのでしょうか……？\u3000うぅ……男性に乳房を見せるなんて、恥ずかしいです……」"
translation = "「제 가슴에 자지를 끼우고…… 이, 이건 무엇을 하는 건가요……? 으으…… 남성에게 유방을 보여주다니 부끄러워요……」"

[[dialogue]]
speaker = "クロト"
original = "「おち○ちんを刺激しないと精液は出せなくて……だからグロリアさんのおっぱいを使わせてほしいです」"
translation = "「자지를 자극하지 않으면 정액을 낼 수 없어서…… 그래서 글로리아 씨의 가슴을 빌리고 싶어요」"

[[dialogue]]
speaker = "グロリア"
original = "「そういうものなのですか……ふぁ……これが会長さんのおち○ちん……熱くて大きい……」"
translation = "「그런 건가요…… 화아…… 이게 회장님의 자지…… 뜨겁고 커요……」"

[[dialogue]]
speaker = "グロリア"
original = "「本物のおち○ちん、初めて見ました……こんなに大きいものを股間に宿しているだなんて、男性の体って不思議……」"
translation = "「진짜 자지, 처음 봤어요…… 이렇게 큰 걸 가랑이에 품고 있다니, 남성의 몸이란 참 신기해요……」"

[[dialogue]]
speaker = "unk"
original = "寝転がっても形の崩れないグロリアさんのおっぱいの谷間は、もちもちふわふわで最高の感触だ。"
translation = "누워 있어도 형태가 무너지지 않는 글로리아 씨의 가슴 골짜기는, 말랑말랑 폭신폭신해서 최고의 감촉이다."

[[dialogue]]
speaker = "unk"
original = "軽く動いただけで、すぐに射精してしまいそうだけれど、いくらなんでもそれはもったいない。"
translation = "가볍게 움직이기만 해도 금방 사정해 버릴 것 같지만, 아무리 그래도 그건 너무 아깝다."

[[dialogue]]
speaker = "グロリア"
original = "「それで、あの、私は何をすれば……？\u3000寝転がったままでは、ご奉仕にならないのでは……？」"
translation = "「그래서, 저기, 저는 무엇을 하면……? 누워 있는 채로는 봉사가 되지 않는 게……?」"

[[dialogue]]
speaker = "グロリア"
original = "「乳房で、おち○ちんを挟んでいるのですよね……？\u3000あの、おっぱいでこのようなことを、してもいいのですか……？」"
translation = "「유방으로 자지를 끼우고 있는 것이지요……? 저기, 가슴으로 이런 짓을 해도 괜찮은 건가요……?」"

[[dialogue]]
speaker = "クロト"
original = "「おっぱいでおち○ちんを挟むのを、パイズリっていうんです」"
translation = "「가슴으로 자지를 끼우는 걸 파이즈리라고 해요」"

[[dialogue]]
speaker = "グロリア"
original = "「ぱい、ずり……ぱいずり、ですか……なんだか、えっちな響きがします……」"
translation = "「파이, 즈리…… 파이즈리, 인가요…… 왠지 야한 울림이 나요……」"

[[dialogue]]
speaker = "クロト"
original = "「おっぱいの大きい子にしかできない特別な技なんです。おっぱいに挟んで、こうやって擦ると……」"
translation = "「가슴이 큰 여자애만 할 수 있는 특별한 기술이에요. 가슴에 끼워서 이렇게 문지르면……」"

[[dialogue]]
speaker = "グロリア"
original = "「んぅ……んっ、んぅ、んっ……んっ、んっ……！」"
translation = "「응으…… 응, 응으, 응…… 응, 응……!」"

[[dialogue]]
speaker = "unk"
original = "もちもちおっぱいを左右から押して、谷間の圧を上げる。"
translation = "말랑말랑한 가슴을 좌우에서 눌러 골짜기의 압력을 높인다."

[[dialogue]]
speaker = "グロリア"
original = "「はっ、はぁ、これが、ぱいずり、なんですね……？\u3000苦しそうなお顔になってますけど……大丈夫ですか……？」"
translation = "「하, 하아, 이것이 파이즈리라는 것이군요……? 괴로운 표정이 되셨는데…… 괜찮으신가요……?」"

[[dialogue]]
speaker = "クロト"
original = "「苦しいんじゃなくて、気持ちいいんです。グロリアさんのおっぱい、最高で……」"
translation = "「괴로운 게 아니라 기분 좋은 거예요. 글로리아 씨의 가슴, 최고라서……」"

[[dialogue]]
speaker = "グロリア"
original = "「そ、そうなんですね。私のおっぱいが会長さんの役に立っているなら、とても嬉しいです……<emoji=heart04>」"
translation = "「그, 그렇군요. 제 가슴이 회장님께 도움이 된다면 정말 기뻐요……<emoji=heart04>」"

[[dialogue]]
speaker = "グロリア"
original = "「これがせめてもの恩返しになるなら……私のおっぱいで、たくさん、ぱいずりしてくださいね」"
translation = "「이것이 조금이나마 은혜를 갚는 게 된다면…… 제 가슴으로 잔뜩 파이즈리해 주세요」"

[[dialogue]]
speaker = "グロリア"
original = "「んっ、あっ、はぁ……はぁ、ふぁふ……おち○ちんの熱さ、伝わってきます……私のおっぱいまで、あったかく、なってきました……あっ、んっ……」"
translation = "「응, 앗, 하아…… 하아, 화후…… 자지의 뜨거움이 전해져 와요…… 제 가슴까지 따뜻해졌어요…… 앗, 응……」"

[[dialogue]]
speaker = "グロリア"
original = "「あっ、はぁ、はっ……すごい……ぴょこぴょこって、おち○ちんが、私のおっぱいの間を、何度も、何度も……！」"
translation = "「앗, 하아, 하…… 대단해…… 움찔움찔하면서 자지가 제 가슴 사이를 몇 번이고, 몇 번이고……!」"

[[dialogue]]
speaker = "グロリア"
original = "「んっ……どうです？\u3000私のおっぱい、きもちいいですか？\u3000いっぱい、興奮、していますか……？」"
translation = "「응…… 어때요? 제 가슴, 기분 좋은가요? 잔뜩 흥분하고 있나요……?」"

[[dialogue]]
speaker = "グロリア"
original = "「あっ……おち○ちんの先っぽからとろとろのお水が出ています……おしっこ……？\u3000もしかして、これが精液……？」"
translation = "「앗…… 자지 끝부분에서 걸쭉한 물이 나오고 있어요…… 오줌……? 설마 이게 정액……?」"

[[dialogue]]
speaker = "クロト"
original = "「我慢汁って言って、気持ちよくなると自然と出てくるんですよ」"
translation = "「쿠퍼액이라고 해서, 기분 좋아지면 자연스럽게 나오는 거예요」"

[[dialogue]]
speaker = "グロリア"
original = "「がまん、じる……？\u3000さっきから知らないことばかりです……会長さんのおかげで、ちょっぴり物知りになってしまいました……ふふ<emoji=heart04>」"
translation = "「쿠퍼, 액……? 아까부터 모르는 것 투성이에요…… 회장님 덕분에 조금 박식해져 버렸네요…… 후후<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "グロリアさんにまたがったまま、両手で挟んでいるおっぱいを、パン生地をこねるみたいに前後に動かす。"
translation = "글로리아 씨에게 올라탄 채로, 양손으로 끼우고 있는 가슴을 빵 반죽을 치대듯 전후로 움직인다."

[[dialogue]]
speaker = "グロリア"
original = "「はぁ、はっ、あんまり、激しく、揉まれると……おっぱい、取れちゃいます……」"
translation = "「하아, 하, 너무 격하게 주물러지면…… 가슴, 떨어져 나가 버려요……」"

[[dialogue]]
speaker = "グロリア"
original = "「でも、どうしてでしょう……あなたに触られている部分が熱くなって……おっぱいがジンジンと痺れるみたいで……」"
translation = "「하지만 어째서일까요…… 당신에게 만져지는 부분이 뜨거워져서…… 가슴이 징징대며 저리는 것 같고……」"

[[dialogue]]
speaker = "グロリア"
original = "「腰もそんなに動かして……おち○ちん気持ちいいんですか……？\u3000んぅ、はぁ、はぅ……んふぅん……」"
translation = "「허리도 그렇게 움직이고…… 자지 기분 좋은가요……? 응으, 하아, 하으…… 응후웅……」"

[[dialogue]]
speaker = "unk"
original = "困惑顔でペニスを見つめる無知なグロリアさんのおっぱいを好き放題に犯し、背筋がぞくぞくとする。"
translation = "곤혹스러운 얼굴로 페니스를 바라보는 무지한 글로리아 씨의 가슴을 마음껏 범하자 등줄기가 오싹거린다."

[[dialogue]]
speaker = "グロリア"
original = "「はふ……んぁ、はぅ……んっ……！\u3000んぁ、ひぅんっ、あっ、あっ、や、ぬるぬるしてて、とってもえっちです……！」"
translation = "「하후…… 응아, 하으…… 응……! 응아, 히웅, 앗, 앗, 여, 미끌미끌해서 무척 야해요……!」"

[[dialogue]]
speaker = "unk"
original = "我慢汁を垂らすペニスは胸の谷間を抜け、何度もグロリアさんの顔の真ん前に突きつけられた。"
translation = "쿠퍼액을 흘리는 페니스는 가슴 골짜기를 빠져나와 몇 번이나 글로리아 씨의 얼굴 정면에 들이대졌다."

[[dialogue]]
speaker = "グロリア"
original = "「んっ……ふぁ……すん、すんっ……これがおち○ちんの匂い……ですか？」"
translation = "「응…… 화아…… 킁, 킁…… 이것이 자지의 냄새…… 인가요?」"

[[dialogue]]
speaker = "unk"
original = "シャワーも浴びておらず、清潔とは言い難いペニスからは、自分のところにまですえた臭いが漂ってくる。"
translation = "샤워도 하지 않아 청결하다고는 하기 힘든 페니스에서는 자신에게까지 큼큼한 냄새가 풍겨온다."

[[dialogue]]
speaker = "グロリア"
original = "「鼻の奥がツーンってしますけど……全然、嫌な匂いじゃないです……なんだか、くらくら……ぼーっとしちゃいまふ……」"
translation = "「코끝이 찡하지만…… 전혀 싫은 냄새가 아니에요…… 왠지 아찔아찔…… 멍해져 버려요……」"

[[dialogue]]
speaker = "グロリア"
original = "「んぅ……すん、すんっ……おち○ちん……おち○ちんの匂い……すぅ、はぁ……くん、くん……んんぅ……！」"
translation = "「응으…… 킁, 킁…… 자지…… 자지의 냄새…… 후우, 하아…… 킁, 킁…… 응응으……!」"

[[dialogue]]
speaker = "unk"
original = "香しい松茸を楽しむみたいに、グロリアさんは鼻を鳴らして、ペニスの匂いを胸いっぱいに吸い込む。"
translation = "향기로운 송이버섯을 즐기듯, 글로리아 씨는 콧소리를 내며 페니스의 냄새를 가슴 깊이 들이마신다."

[[dialogue]]
speaker = "グロリア"
original = "「んぅふ……はぁ、はっ……！\u3000なんだか、ぞくぞく、してきまひたぁ……会長さんにぱいずりして、おっぱいもみもみされるの、気持ちいいです……」"
translation = "「응으후…… 하아, 하……! 왠지 오싹오싹해졌어요…… 회장님께 파이즈리하고 가슴을 주물러지는 거, 기분 좋아요……」"

[[dialogue]]
speaker = "unk"
original = "やわもちおっぱいの中心にある乳首を見ると、ぷっくりと勃起し、弄ってほしそうに自己主張をしていた。"
translation = "말랑말랑한 가슴 중심에 있는 유두를 보니 봉긋하게 발기하여 만져달라는 듯 자기주장을 하고 있었다."

[[dialogue]]
speaker = "unk"
original = "コリコリに勃起した乳首を指先で捏ねる。"
translation = "딱딱하게 발기한 유두를 손가락 끝으로 비빈다."

[[dialogue]]
speaker = "グロリア"
original = "「んぅっ！？\u3000はっ、あ、ふぁ……あふ……んぅ……んふぅっ……<emoji=heart04>\u3000ひぁ、あっ、乳首っ、くりくりされると、びりびり、しちゃいまふっ……<emoji=heart04>」"
translation = "「응으잇!? 하, 아, 화아…… 아후…… 응으…… 응후읏……<emoji=heart04> 히아, 앗, 유두, 비벼지니까 찌릿찌릿해져요……<emoji=heart04>」"

[[dialogue]]
speaker = "グロリア"
original = "「はぁ、はっ、ふぁぁ……知らない、です……こんな気持ちいいことがあったなんて……全然、知らないです……はぁ、はぁあぁっ……」"
translation = "「하아, 하, 화아…… 몰랐어요…… 이런 기분 좋은 일이 있었다니…… 전혀 몰랐어요…… 하아, 하아아앗……」"

[[dialogue]]
speaker = "unk"
original = "グロリアさんの口から溢れる甘い熱息が亀頭に吹きかけられると、更にペニスが昂ぶる。"
translation = "글로리아 씨의 입에서 넘쳐흐르는 달콤한 열기가 귀두에 닿자 페니스가 더욱 고조된다."

[[dialogue]]
speaker = "unk"
original = "乳間を犯すピストンは更に加速した。"
translation = "가슴 사이를 범하는 피스톤은 더욱 가속되었다."

[[dialogue]]
speaker = "グロリア"
original = "「んぅっ！\u3000あ、はぁ、はぅんっ、んぅふぅ……！\u3000やっ、おち○ちん、激しいです……<emoji=heart04>」"
translation = "「응으읏! 아, 하아, 하운, 응으후……! 얏, 자지, 격렬해요……<emoji=heart04>」"

[[dialogue]]
speaker = "グロリア"
original = "「はぁ、あ、はぁ……もっと、もっとぉ……乳首、乳首弄ってくらはい……会長さんにイジイジしてほしいんれふ……<emoji=heart04>」"
translation = "「하아, 아, 하아…… 좀 더, 좀 더어…… 유두, 유두 만져주세여…… 회장님이 조물조물해주길 원해여……<emoji=heart04>」"

[[dialogue]]
speaker = "グロリア"
original = "「はぁ、強めに、キュゥゥって……んはぁっ……！\u3000それ好きぃ、好きです……愛してます……もっと、もっと、おっぱい、きもちよく、してぇ……<emoji=heart04>」"
translation = "「하아, 강하게 뀨우우우 하고…… 응하앗……! 그거 좋아여, 좋아해요…… 사랑해요…… 좀 더, 좀 더, 가슴, 기분 좋게, 해줘……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "おっぱいには膣のようにひだがあるわけでもなく、フェラのように敏感な部分を的確に攻めたり激しく吸いついてくるわけでもない。"
translation = "가슴에는 질처럼 주름이 있는 것도 아니고, 펠라처럼 민감한 부분을 정확히 공략하거나 격렬하게 빨아당기는 것도 아니다."

[[dialogue]]
speaker = "unk"
original = "摩擦は決して強くないのに、何も知らないグロリアさんを性の快感に目覚めさせ、いけないことをしている興奮が射精感を後押しした。"
translation = "마찰은 결코 강하지 않은데도, 아무것도 모르는 글로리아 씨를 성적 쾌감에 눈뜨게 하여 못된 짓을 하고 있다는 흥분이 사정감을 부추겼다."

[[dialogue]]
speaker = "グロリア"
original = "「んぁ……性行為をする時は、このおち○ちんを、女性器に入れるんですよね……？\u3000こんなに大きなのが、本当に入っちゃうんですか……？」"
translation = "「응아…… 성행위를 할 때는 이 자지를 여성기에 넣는 것이지요……? 이렇게 큰 게 정말로 들어가 버리는 건가요……?」"

[[dialogue]]
speaker = "グロリア"
original = "「はぁ、んぁ……こんなのが女性器に入ってきたら、どうなってしまうんでしょう……？\u3000きっと、すごく気持ちいいんですよね……？」"
translation = "「하아, 응아…… 이런 게 여성기에 들어오면 어떻게 되어 버릴까요……? 분명 무척 기분 좋겠지요……?」"

[[dialogue]]
speaker = "unk"
original = "そう遠くない未来、処女喪失の瞬間を、うっとりと夢想するグロリアさんのその顔にやられてしまった。"
translation = "머지않은 미래, 처녀 상실의 순간을 황홀하게 몽상하는 글로리아 씨의 그 얼굴에 당해버리고 말았다."

[[dialogue]]
speaker = "クロト"
original = "「くっ……来てる……もうすぐ出そうですっ……！」"
translation = "「큭…… 온다…… 곧 나올 것 같아요……!」"

[[dialogue]]
speaker = "グロリア"
original = "「ふぇ……えっ……？\u3000出る？\u3000出るって、もしかして、精液、ですかっ……？」"
translation = "「후에…… 엣……? 나온다? 나온다니 혹시 정액인가요……?」"

[[dialogue]]
speaker = "グロリア"
original = "「ひぁ、あっ、おち○ちん、またおっきく、かたぁくなってます……！\u3000我慢汁の匂いも濃くなって……びくんびくんして……ひぁ、ちょっと怖いです……！」"
translation = "「히아, 앗, 자지, 또 커지고 딱딱해졌어요……! 쿠퍼액 냄새도 짙어지고…… 파르르 떨면서…… 히아, 조금 무서워요……!」"

[[dialogue]]
speaker = "クロト"
original = "「大丈夫ですからっ……！\u3000このまま、グロリアさんのおっぱいの中に……！」"
translation = "「괜찮으니까요……! 이대로 글로리아 씨의 가슴 속에……!」"

[[dialogue]]
speaker = "グロリア"
original = "「はぁ、うぅ……い、いいですよ……私の、おっぱいに、いっぱい精液、出してください……ぶっかけてくださぁい……<emoji=heart04>」"
translation = "「하아, 우으…… 조, 좋아요…… 제 가슴에 정액 잔뜩 내보내 주세요…… 뿌려주세요……<emoji=heart04>」"

[[dialogue]]
speaker = "グロリア"
original = "「精液、だ、出して……おち○ちん、鎮めて……ください、私のおっきくてえっちなおっぱいに、いっぱい、いっぱい……精液……出して、く、くらひゃぁい……<emoji=heart04>」"
translation = "「정액, 내, 내보내서…… 자지 가라앉혀 주세요, 제 크고 야한 가슴에 잔뜩, 잔뜩…… 정액…… 내보내 주세여어……<emoji=heart04>」"

[[dialogue]]
speaker = "グロリア"
original = "「ふぁ、んぁ、あ、あっ……！？\u3000おち○ちん、びくんびくん、どくんどくんって――」"
translation = "「화아, 응아, 아, 앗……!? 자지가 움찔움찔 두근두근거려서――」"

[[dialogue]]
speaker = "グロリア"
original = "「ひゃぁんっ！？\u3000んぁ、あっ、わっ、んぁぷっ！？」"
translation = "「히야앙!? 응아, 앗, 와, 응아푸!?」"

[[dialogue]]
speaker = "unk"
original = "初めて自分で導いた射精を、グロリアさんは顔面とおっぱいで受け止めた。"
translation = "처음으로 스스로 이끌어낸 사정을 글로리아 씨는 얼굴과 가슴으로 받아냈다."

[[dialogue]]
speaker = "グロリア"
original = "「ひぁっ！\u3000やっ、す、すごいですっ、んぅ！\u3000ひゃ、あっ、あ、熱いのが、いっぱぁいっ……きゃんっ！？」"
translation = "「히앗! 얏, 대, 대단해요, 응으! 히야, 앗, 아, 뜨거운 게 가드윽…… 꺄앙!?」"

[[dialogue]]
speaker = "unk"
original = "精液を避けようにも、俺に跨がられて、胸を鷲掴みにされているグロリアさんは身動きが取れない。"
translation = "정액을 피하려 해도 나에게 올라타 가슴을 움켜쥐여진 글로리아 씨는 움직일 수 없다."

[[dialogue]]
speaker = "グロリア"
original = "「んあ、あっ、まだ、んぁはっ……！\u3000まだ、ぴゅるぴゅる、精液出て……ぱいずりで、いっぱい、気持ちよぉく、なってくれたんですね……ふふ<emoji=heart04>」"
translation = "「응아, 앗, 아직, 응아하……! 아직 퓨루퓨루 정액이 나와서…… 파이즈리로 잔뜩 기분 좋아진 거군요…… 후후<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "射精が止まるまで抵抗もすることなく、恍惚の笑みを浮かべながら白濁のシャワーを浴び続けたのだった。"
translation = "사정이 멈출 때까지 저항도 하지 않고 황홀한 미소를 지으며 백탁의 샤워를 계속해서 맞았다."

[[dialogue]]
speaker = "グロリア"
original = "「んぁ、はぁ、ぁぷっ……精液で、溺れてしまうかと思いました……射精って、こんなにたくさん出るものなんですね？」"
translation = "「응아, 하아, 아푸…… 정액에 빠져버리는 줄 알았어요…… 사정이란 건 이렇게나 많이 나오는 거군요?」"

[[dialogue]]
speaker = "unk"
original = "ひとしきり射精を終えたところで、精液まみれになったグロリアさんはうっとりと惚けた顔で問いかけてきた。"
translation = "한바탕 사정을 마친 시점에 정액 범벅이 된 글로리아 씨는 황홀하게 넋이 나간 얼굴로 물어왔다."

[[dialogue]]
speaker = "クロト"
original = "「グロリアさんのおっぱいが気持ち良すぎて、いつもよりたくさん出てしまいました。すみません」"
translation = "「글로리아 씨의 가슴이 너무 기분 좋아서 평소보다 많이 나와 버렸어요. 죄송합니다」"

[[dialogue]]
speaker = "グロリア"
original = "「そうなんですね……ふふ、気にしないでください。会長さんのお役に立てたのなら、何よりです」"
translation = "「그렇군요…… 후후, 신경 쓰지 마세요. 회장님께 도움이 되었다면 무엇보다 기뻐요」"

[[dialogue]]
speaker = "グロリア"
original = "「あなたが私で興奮して……気持ちよくなってくれたのが、とっても嬉しいんです……<emoji=heart04>」"
translation = "「당신이 나 때문에 흥분해서…… 기분 좋아진 게 무척 기쁘답니다……<emoji=heart04>」"

[[dialogue]]
speaker = "グロリア"
original = "「愛する人を快感の高みへ導くのって……とてもときめくものなんですね……<emoji=heart04>」"
translation = "「사랑하는 사람을 쾌감의 절정으로 인도하는 건…… 무척 설레는 일이군요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ドロドロの精液を顔や胸に張りつかせたまま微笑むグロリアさんが、たまらなくいやらしくて、どうしようもなく可愛く見えた。"
translation = "걸쭉한 정액을 얼굴과 가슴에 묻힌 채 미소 짓는 글로리아 씨가 견딜 수 없이 음란하고 어쩌지도 못할 만큼 귀엽게 보였다."

[[dialogue]]
speaker = "グロリア"
original = "「はぁ……顔もおっぱいも、精液でべとべとです……すん、すん……嗅いだことのない、独特な匂い……」"
translation = "「하아…… 얼굴도 가슴도 정액으로 끈적끈적해요…… 킁, 킁…… 맡아본 적 없는 독특한 냄새……」"

[[dialogue]]
speaker = "グロリア"
original = "「つまめるくらい濃くって……精液というから、もっとさらっとした液体かと思っていたのですけど……ねっとりしているんですね……ぺろっ」"
translation = "「집어 올릴 수 있을 정도로 진해서…… 정액이라고 하니 좀 더 묽은 액체인 줄 알았는데…… 꾸덕꾸덕하네요…… 홀짝」"

[[dialogue]]
speaker = "unk"
original = "唇に張り付いていた精液を、味見するみたいにぺろりと舐め取る。"
translation = "입술에 붙어 있던 정액을 맛보듯 낼름 핥아 먹는다."

[[dialogue]]
speaker = "グロリア"
original = "「んぅ……むぐっ……！？\u3000ちょっとしょっぱくて、苦いれふ……これは、大人の味れひゅね……」"
translation = "「응으…… 무긋……!? 조금 짭짤하고 써여…… 이건 어른의 맛이네여……」"

[[dialogue]]
speaker = "グロリア"
original = "「むぐ、むぐ……でも、これが会長さんの味だと思うと全然、嫌じゃないれふ……なんだか愛しい味です……<emoji=heart04>」"
translation = "「무그, 무그…… 하지만 이게 회장님의 맛이라고 생각하면 전혀 싫지 않아여…… 왠지 사랑스러운 맛이에요……<emoji=heart04>」"

[[dialogue]]
speaker = "グロリア"
original = "「あ……おち○ちんの方ばかり見ていて、あなたが射精する時の顔をじっくり見れませんでした……」"
translation = "「아…… 자지 쪽만 보고 있느라 당신이 사정할 때의 얼굴을 자세히 보지 못했어요……」"

[[dialogue]]
speaker = "グロリア"
original = "「次は私のおっぱいに夢中になっている会長さんを、じっくり見ててあげますからね、ふふ<emoji=heart04>」"
translation = "「다음에는 제 가슴에 열중하고 있는 회장님을 빤히 봐 드릴 테니까요, 후후<emoji=heart04>」"

[[dialogue]]
speaker = "グロリア"
original = "「あら……？\u3000おち○ちんがまだ勃起したままですけど……こんなにたっぷり射精したのに鎮まってないんですか？」"
translation = "「어라……? 자지가 아직 발기한 채예요…… 이렇게 듬뿍 사정했는데도 가라앉지 않은 건가요?」"

[[dialogue]]
speaker = "グロリア"
original = "「まだ射精し足りないってことでしょうか……？\u3000それなら、あの……もう１回、ぱいずり……しておきます？」"
translation = "「아직 사정이 부족하다는 걸까요……? 그렇다면 저기…… 한 번 더 파이즈리…… 해둘까요?」"

[[dialogue]]
speaker = "グロリア"
original = "「今度は、会長さんの気持ちよくなってる顔、ちゃんと見ておきますからね……ふふ<emoji=heart04>」"
translation = "「이번에는 회장님의 기분 좋아하는 얼굴, 제대로 봐 드릴게요…… 후후<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "この後、すっかりグロリアさんのふわもちおっぱいの虜になってしまったペニスは、なかなか収まってくれず。"
translation = "이후 글로리아 씨의 말랑폭신한 가슴의 포로가 되어버린 페니스는 좀처럼 가라앉아 주지 않았고."

[[dialogue]]
speaker = "unk"
original = "もう３回出し切るまで、グロリアさんのパイズリご奉仕にお世話されてしまったのだった。"
translation = "결국 세 번 더 쏟아낼 때까지 글로리아 씨의 파이즈리 봉사를 받게 되었던 것이다."

