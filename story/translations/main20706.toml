[[dialogue]]
speaker = "unk"
original = "第６話,デネブの夜,B"
translation = "제6화, 데네브의 밤, B"

[[dialogue]]
speaker = "クロト"
original = "「ふぅ……。個室にシャワーもあるんだな。至れり尽くせりだ」"
translation = "「후우……. 개인실에 샤워실도 있구나. 정말 없는 게 없네」"

[[dialogue]]
speaker = "unk"
original = "連戦の汗を流した後、ベッドに体を預ける。"
translation = "연전의 땀을 씻어낸 뒤 침대에 몸을 맡긴다."

[[dialogue]]
speaker = "クロト"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "今まで余裕がなかったけど、一度落ち着くと今日起きたことを思い出す。"
translation = "지금까지는 여유가 없었지만, 일단 진정되자 오늘 일어난 일들이 떠오른다."

[[dialogue]]
speaker = "unk"
original = "チナと戦ったり、デネブでルヴィネと遭遇したりと、本当にいろいろなことがあった。"
translation = "치나와 싸우거나 데네브에서 루비네와 조우하는 등 정말 많은 일이 있었다."

[[dialogue]]
speaker = "unk"
original = "それに──"
translation = "그리고──"

[[dialogue]]
speaker = "unk"
original = "自分の中にあるリクリエの力に呑み込まれ、我を失ってヴィーナスや梨緒を攻撃した。"
translation = "내 안에 있는 리크리에의 힘에 집어삼켜져 이성을 잃고 비너스와 리오를 공격했다."

[[dialogue]]
speaker = "unk"
original = "２人を傷つけた。この拳で。"
translation = "두 사람을 상처 입혔다. 이 주먹으로."

[[dialogue]]
speaker = "unk"
original = "暴走していた時は意識がぼやけていたのに、あの時の感触は鮮明に思い出されてしまう。"
translation = "폭주하고 있을 때는 의식이 흐릿했는데, 그때의 감촉은 선명하게 떠오르고 만다."

[[dialogue]]
speaker = "unk"
original = "俺がもっと強ければ、２人を傷つけずに済んだかもしれない。"
translation = "내가 좀 더 강했더라면 두 사람을 상처 입히지 않았을지도 모른다."

[[dialogue]]
speaker = "unk"
original = "それにディザスターハンドの正体は、ベガの俺だった。"
translation = "게다가 디재스터 핸드의 정체는 베가의 나였다."

[[dialogue]]
speaker = "unk"
original = "梨緒は俺を憎むことはなかったが、『緋宮クロト』が世界を滅ぼしたことに変わりはなく、罪悪感を覚えずにはいられない。"
translation = "리오는 나를 미워하지 않았지만, 『히노미야 쿠로토』가 세계를 멸망시킨 사실은 변함이 없어 죄책감을 느끼지 않을 수 없다."

[[dialogue]]
speaker = "unk"
original = "この手でみんなの大事なものを、誰かの大切な人を、壊し尽くした。想像するだけで心に重いものがのしかかる。"
translation = "이 손으로 모두의 소중한 것을, 누군가의 소중한 사람을 모조리 파괴했다. 상상하는 것만으로 마음이 무거워진다."

[[dialogue]]
speaker = "クロト"
original = "「──でも」"
translation = "「──하지만」"

[[dialogue]]
speaker = "unk"
original = "俯いてばかりはいられない。"
translation = "고개만 숙이고 있을 수는 없다."

[[dialogue]]
speaker = "unk"
original = "彼女たちを傷つけた分、前に進み、みんなや世界を守る。"
translation = "그녀들을 상처 입힌 만큼 앞으로 나아가 모두와 세계를 지킨다."

[[dialogue]]
speaker = "unk"
original = "厄災の化身に堕ちないように心を強く持ち、己を鍛える。"
translation = "재앙의 화신으로 타락하지 않도록 마음을 굳게 먹고 자신을 단련한다."

[[dialogue]]
speaker = "unk"
original = "それが俺にできる罪滅ぼしだ。"
translation = "그것이 내가 할 수 있는 속죄다."

[[dialogue]]
speaker = "クロト"
original = "（リクリエの力は星力や魔力とは異なる。到底制御できるものじゃない。……そう思っていたけど）"
translation = "(리크리에의 힘은 성력이나 마력과는 다르다. 도저히 제어할 수 있는 게 아니야. ……그렇게 생각했지만)"

[[dialogue]]
speaker = "unk"
original = "でもチナとの戦いでは、リクリエの力をほんの少しだけ自分のものにすることができた。"
translation = "하지만 치나와의 싸움에서는 리크리에의 힘을 아주 조금이나마 내 것으로 만들 수 있었다."

[[dialogue]]
speaker = "クロト"
original = "（自分の中にあるリクリエの力の強さや性質をより理解できれば、この力を制御できるようになるかもしれない……）"
translation = "(내 안에 있는 리크리에의 힘의 강도나 성질을 더 잘 이해한다면 이 힘을 제어할 수 있게 될지도 몰라……)"

[[dialogue]]
speaker = "unk"
original = "魔王の力が十全に使えない以上、使えるならリクリエの力だって使ってやる。"
translation = "마왕의 힘을 온전히 쓸 수 없는 이상, 쓸 수 있다면 리크리에의 힘이라도 써주겠어."

[[dialogue]]
speaker = "unk"
original = "それにディザスターハンドに勝つには、今までの魔王の力だけでは足りない。"
translation = "게다가 디재스터 핸드를 이기려면 지금까지의 마왕의 힘만으로는 부족하다."

[[dialogue]]
speaker = "クロト"
original = "（<ruby>厄災<rt>リクリエ</rt></ruby>の力だろうと、使いこなしてみせる──！）"
translation = "(<ruby>재앙<rt>리크리에</rt></ruby>의 힘이라도 길들여 보이겠어──!)"

[[dialogue]]
speaker = "unk"
original = "その頃、ヴィーナスはリノの部屋で過ごしていた。"
translation = "그 무렵, 비너스는 리노의 방에서 시간을 보내고 있었다."

[[dialogue]]
speaker = "リノ"
original = "「今日はおばあちゃんと一緒に寝ましょうね～♪」"
translation = "「오늘은 할머니랑 같이 자자꾸나~♪」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「わ～い♪」"
translation = "「와아~♪」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「……でも、おばあちゃんはおばあちゃんなのよね」"
translation = "「……하지만 할머니는 할머니네요」"

[[dialogue]]
speaker = "unk"
original = "リノを前にして、不思議そうに首を傾げるヴィーナス。"
translation = "리노를 앞에 두고 신기하다는 듯 고개를 갸웃거리는 비너스."

[[dialogue]]
speaker = "unk"
original = "するとリノもきょとんとして同じように首を捻った。"
translation = "그러자 리노도 어리둥절해하며 똑같이 고개를 꼬았다."

[[dialogue]]
speaker = "リノ"
original = "「？\u3000おばあちゃんはおばあちゃんよ？」"
translation = "「? 할머니는 할머니지?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「だって、今一緒にいるクロトは平行世界のパパでしょ」"
translation = "「그게, 지금 같이 있는 쿠로토는 평행세계의 파파잖아요」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「でも目の前にいるのは、デネブのリノさん……デネブで生まれた私にとっては、“平行世界の”が付かないおばあちゃんなのよね」"
translation = "「하지만 눈앞에 계신 분은 데네브의 리노 씨…… 데네브에서 태어난 나에게 있어서는 “평행세계의”가 붙지 않는 할머니란 말이죠」"

[[dialogue]]
speaker = "リノ"
original = "「ああ、そういうことー。ふふ、平行世界ってややこしいわね」"
translation = "「아아, 그런 거구나. 후후, 평행세계라는 건 참 복잡하네」"

[[dialogue]]
speaker = "unk"
original = "リノが腕を広げ、ヴィーナスの体をぎゅっと抱き締める。"
translation = "리노가 팔을 벌려 비너스의 몸을 꼬옥 껴안는다."

[[dialogue]]
speaker = "unk"
original = "外見では２人の年齢はそう離れていないように見えるが、正真正銘祖母と孫の関係だ。"
translation = "겉보기에는 두 사람의 나이 차이가 그리 나 보이지 않지만, 명실상부한 조모와 손녀 관계다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「おばあちゃん……」"
translation = "「할머니……」"

[[dialogue]]
speaker = "リノ"
original = "「こうして孫を抱き締める日が来るなんて思わなかった。あの子の娘がこんなに大きくなってるなんて嬉しいわ」"
translation = "「이렇게 손녀를 안아줄 날이 올 줄은 몰랐어. 그 아이의 딸이 이렇게나 컸다니 정말 기쁘구나」"

[[dialogue]]
speaker = "リノ"
original = "「あなたが平行世界に旅立った時、あなたはまだお母さんのお腹の中にいた」"
translation = "「네가 평행세계로 떠났을 때 넌 아직 엄마 배 속에 있었단다」"

[[dialogue]]
speaker = "リノ"
original = "「きっとあなたのお母さんは自分を犠牲にして、まだ生まれていないあなたを成長させてアルタイルに送り込んだのね」"
translation = "「분명 네 엄마는 자신을 희생해서 아직 태어나지 않은 너를 성장시켜 알타이르로 보낸 거겠지」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ママが私を……」"
translation = "「엄마가 나를……」"

[[dialogue]]
speaker = "リノ"
original = "「あなたをこの目で見ることはできないと思っていたけど……会えてよかった」"
translation = "「너를 내 눈으로 직접 볼 수 없을 거라 생각했는데…… 만나서 다행이야」"

[[dialogue]]
speaker = "リノ"
original = "「本当なら秘密基地じゃなくて、もっとちゃんとした場所でお出迎えしたかったけどね」"
translation = "「원래라면 비밀기지가 아니라 좀 더 제대로 된 장소에서 맞이하고 싶었지만 말이야」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ううん、この秘密基地だってかっこよくて素敵な場所だわ」"
translation = "「아니에요, 이 비밀기지도 멋지고 근사한 곳인걸요」"

[[dialogue]]
speaker = "リノ"
original = "「そう、なら良かった。……おかえり、ヴィーナスちゃん」"
translation = "「그래, 그렇다면 다행이구나. ……어서 오렴, 비너스짱」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「うん……ただいま」"
translation = "「응…… 다녀왔어요」"

