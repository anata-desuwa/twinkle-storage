[[dialogue]]
speaker = "unk"
original = "第５話,マリオンの実力,B"
translation = "제5화, 마리온의 실력, B"

[[dialogue]]
speaker = "unk"
original = "キリカ師匠とマリオンさんが模擬戦をすると聞きつけて、アリーナにはメイド隊の子たちを中心として、人が集まってきていた。"
translation = "키리카 스승님과 마리온 씨가 모의전을 한다는 소문을 듣고 아레나에는 메이드대 아이들을 중심으로 사람들이 모여들고 있었다."

[[dialogue]]
speaker = "フェニエル"
original = "「わぁ～、私たちだけじゃなく、流星学園の生徒の人たちも沢山集まってきてますね……！」"
translation = "「와~ 우리뿐만 아니라 유성학원 학생들도 잔뜩 모여들고 있네요……!」"

[[dialogue]]
speaker = "ナミエル"
original = "「注目されるのは当然です。キリカさんは学園に通っていた当時、メイドの職務や修行があるため星徒会に入ることはなかったそうですが――」"
translation = "「주목받는 건 당연합니다. 키리카 씨는 학원에 다닐 당시 메이드 직무와 수행이 있어 성도회에 들어가는 일은 없었다고 합니다만──」"

[[dialogue]]
speaker = "ナミエル"
original = "「学園随一の実力者として、数々の異変を解決していたことから、今でも星騎士として有名な方ですから」"
translation = "「학원 제일의 실력자로서 수많은 이변을 해결했었기에 지금도 성기사로서 유명한 분이니까요」"

[[dialogue]]
speaker = "ナミエル"
original = "「そんなキリカさんと、<b>あの</b>マリオンさんが戦うとなれば……」"
translation = "「그런 키리카 씨와 <b>그</b> 마리온 씨가 싸우게 된다면……」"

[[dialogue]]
speaker = "マリオン"
original = "「うふふっ♪\u3000まさかキリカさんと戦うことになるだなんて、思いませんでした<emoji=heart04>\u3000いつ以来でしょう？」"
translation = "「우후훗♪ 설마 키리카 씨와 싸우게 될 줄은 몰랐네요<emoji=heart04> 이게 얼마 만이죠?」"

[[dialogue]]
speaker = "キリカ"
original = "「私が学園に通ってた時以来ですね。あなたが特別講師として授業した際に、模擬戦で手合わせをしました」"
translation = "「제가 학원에 다닐 때 이후군요. 당신이 특별 강사로서 수업했을 때 모의전으로 대련을 했었습니다」"

[[dialogue]]
speaker = "unk"
original = "特別講師？"
translation = "특별 강사?"

[[dialogue]]
speaker = "ナミエル"
original = "「マリオンさんは、星見家のメイドとして戦闘技術も一級品で、現在もキリカさんと同じく特別星騎士として、有事の際には戦闘許可が与えられています」"
translation = "「마리온 씨는 호시미 가문의 메이드로서 전투 기술도 일급품이라 현재도 키리카 씨와 마찬가지로 특별 성기사로서 유사시에는 전투 허가가 주어집니다」"

[[dialogue]]
speaker = "ナミエル"
original = "「ですから、模擬戦の相手として、流星学園で特別講師として招かれることもあるんです」"
translation = "「그러니까 모의전의 상대로서 유성학원에 특별 강사로 초빙되기도 한답니다」"

[[dialogue]]
speaker = "フェニエル"
original = "「キリカさんがお強い星騎士なのは、会長さんとよく訓練しているのを見かけて知っていましたが、マリオンさんもお強い方だったんですね……！」"
translation = "「키리카 씨가 강한 성기사인 건 회장님이랑 자주 훈련하는 걸 봐서 알고 있었지만 마리온 씨도 강한 분이었군요……!」"

[[dialogue]]
speaker = "ナミエル"
original = "「強いなんてものじゃありません。あの方は――」"
translation = "「강하다는 말로 부족합니다. 그분은──」"

[[dialogue]]
speaker = "キリカ"
original = "「構えて下さい、マリオンさん」"
translation = "「자세를 잡으세요 마리온 씨」"

[[dialogue]]
speaker = "キリカ"
original = "「私は最初から、全力でぶつからせてもらいます」"
translation = "「전 처음부터 전력으로 부딪히겠습니다」"

[[dialogue]]
speaker = "マリオン"
original = "「キリカさんの全力ですか。……ならば私も、本気でお相手せねばなりませんね」"
translation = "「키리카 씨의 전력인가요. ……그렇다면 저도 진심으로 상대해 드려야겠네요」"

[[dialogue]]
speaker = "マリオン"
original = "「――変身」"
translation = "「──변신」"

[[dialogue]]
speaker = "フェニエル"
original = "「あれが、マリオンさんの戦闘服姿……！」"
translation = "「저게 마리온 씨의 전투복 모습……!」"

[[dialogue]]
speaker = "ナミエル"
original = "「はい。マリオンさんの星術は、人形を召喚して兵隊のように操ります。ですが、その真骨頂は――」"
translation = "「네. 마리온 씨의 성술은 인형을 소환해서 병사처럼 부립니다. 하지만 그 진면목은──」"

[[dialogue]]
speaker = "マリオン"
original = "「人形縫製」"
translation = "「인형 봉제」"

[[dialogue]]
speaker = "unk"
original = "え？"
translation = "에?"

[[dialogue]]
speaker = "フェニエル"
original = "「ま、マリオンさんが３人に分裂した……！？」"
translation = "「마, 마리온 씨가 세 명으로 분열했어……!?」"

[[dialogue]]
speaker = "ナミエル"
original = "「マリオンさんの本気は、見た目だけでなく強さまで瓜２つと思わせる、<b>自分自身の人形</b>まで作り出すこと」"
translation = "「마리온 씨의 진심은 외견뿐만 아니라 강함까지 똑같다고 생각될 정도로 <b>자기</b> <b>자신인</b> <b>인형</b>까지 만들어내는 것」"

[[dialogue]]
speaker = "ナミエル"
original = "「通称『ドールズマスター』」"
translation = "「통칭 『돌즈 마스터』」"

[[dialogue]]
speaker = "ナミエル"
original = "「今から１２年前に流星学園に通っていたＯＧであり――」"
translation = "「지금으로부터 12년 전 유성학원에 다녔던 OG이자──」"

[[dialogue]]
speaker = "ナミエル"
original = "「当時最強の、流星学園星徒会長だった方です」"
translation = "「당시 최강이었던 유성학원 성도회장이었던 분입니다」"

[[dialogue]]
speaker = "マリオン"
original = "「さあ、行きますよ？\u3000キリカさん」"
translation = "「자, 갑니다? 키리카 씨」"

[[dialogue]]
speaker = "キリカ"
original = "「がっ……ぐっ……！」"
translation = "「윽…… 윽……!」"

[[dialogue]]
speaker = "マリオン"
original = "「どうやら、ここまでのようですね」"
translation = "「아무래도 여기까지인 것 같네요」"

[[dialogue]]
speaker = "unk"
original = "あの師匠が、負けるなんて……！"
translation = "그 스승님이 지다니……!"

[[dialogue]]
speaker = "フェニエル"
original = "「沢山の人形を操って、まるで軍隊みたいで……１人であんな数を使いこなせるなんて……すごい……！」"
translation = "「수많은 인형을 조종해서 마치 군대처럼…… 혼자서 저런 수를 다루다니…… 대단해……!」"

[[dialogue]]
speaker = "フェニエル"
original = "「マリオンさんは戦いながらも、次々と人形を作り出していくことができます。そうして増えに増えた圧倒的物量で場を制圧する……それがあの方の強さです」"
translation = "「마리온 씨는 싸우면서도 차례차례 인형을 만들어 낼 수 있어요. 그렇게 늘리고 늘린 압도적인 물량으로 장내를 제압하는 것…… 그것이 그분의 강함입니다」"

[[dialogue]]
speaker = "キリカ"
original = "「っ……マリオンさん……やはりあなたは、私よりも強い……」"
translation = "「윽…… 마리온 씨…… 역시 당신은 저보다 강해……」"

[[dialogue]]
speaker = "キリカ"
original = "「それだけじゃなく……メイドとしても、誇るべき優秀な能力を持っている……なのに……！」"
translation = "「그뿐만 아니라…… 메이드로서도 자랑스러워해야 할 우수한 능력을 갖추고 있어…… 그런데……!」"

[[dialogue]]
speaker = "キリカ"
original = "「どうして、自分がメイド長に相応しくないなどと言うのですか……！？」"
translation = "「어째서 자신이 메이드장에 어울리지 않는다고 말하는 건가요……!?」"

[[dialogue]]
speaker = "キリカ"
original = "「なぜ、私にメイド長の座を譲ったのですか……！？」"
translation = "「왜 저에게 메이드장 자리를 양보한 거죠……!?」"

[[dialogue]]
speaker = "キリカ"
original = "「私にはやはり、納得ができません……！」"
translation = "「저는 역시 납득할 수 없습니다……!」"

[[dialogue]]
speaker = "マリオン"
original = "「……理由は、大きくわけて２つありますが……そうですね、その内の１つを少し話しますと――」"
translation = "「……이유는 크게 나누어 두 가지가 있습니다만…… 글쎄요, 그중 하나를 조금 이야기하자면――」"

[[dialogue]]
speaker = "マリオン"
original = "「私が星見家のメイドとして働こうと思ったのは、流星学園のことを好きになったからです」"
translation = "「제가 호시미 가문의 메이드로서 일하겠다고 생각한 건, 유성학원을 좋아하게 됐기 때문이에요」"

[[dialogue]]
speaker = "マリオン"
original = "「星見家のメイドになれば、流星学園を――そこに通うお可愛くて若い子達の成長を、見守ることができますから」"
translation = "「호시미 가문의 메이드가 되면, 유성학원을―― 그곳에 다니는 귀엽고 어린 아이들의 성장을 지켜볼 수 있으니까요」"

[[dialogue]]
speaker = "マリオン"
original = "「私がメイド長になったのは、その延長です」"
translation = "「제가 메이드장이 된 건 그 연장선상입니다」"

[[dialogue]]
speaker = "マリオン"
original = "「でも、キリカさん。あなたは私とは違いますよね？」"
translation = "「하지만 키리카 씨. 당신은 저와는 다르죠?」"

[[dialogue]]
speaker = "マリオン"
original = "「星見家メイド隊の長であれば、星見家のメイドとして相応しくあるべきです。私はあなたがその座に最も相応しいと思った」"
translation = "「호시미 가문 메이드대의 장이라면, 호시미 가문의 메이드로서 걸맞은 모습이어야 해요. 저는 당신이 그 자리에 가장 어울린다고 생각했어요」"

[[dialogue]]
speaker = "マリオン"
original = "「キリカさん、あなたは自分のことを、メイド長としてこれまで相応しくないと思っていたんですか？」"
translation = "「키리카 씨, 당신은 지금까지 스스로를 메이드장으로서 어울리지 않는다고 생각했나요?」"

[[dialogue]]
speaker = "キリカ"
original = "「それは……任されたからには、相応しくあろうと心がけています」"
translation = "「그건…… 맡겨진 이상은 걸맞은 사람이 되도록 유의하고 있습니다」"

[[dialogue]]
speaker = "マリオン"
original = "「任されたからには、ですか。真面目なキリカさんらしい答えですが……」"
translation = "「맡겨진 이상은, 인가요. 성실한 키리카 씨다운 답변입니다만……」"

[[dialogue]]
speaker = "マリオン"
original = "「……うん、決めました」"
translation = "「……으음, 결정했어요」"

[[dialogue]]
speaker = "マリオン"
original = "「そういうことであれば、やはりメイド長の座は返してもらいましょうか♪\u3000風邪を引いて、迷惑をかけた責任として」"
translation = "「그렇다면 역시 메이드장 자리는 돌려받도록 할까요♪ 감기에 걸려 폐를 끼친 책임으로서」"

[[dialogue]]
speaker = "キリカ"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker = "マリオン"
original = "「もしメイド長の座が欲しいのなら、今度は力づくで奪って下さい。だって、そうでしょう？」"
translation = "「만약 메이드장 자리를 원한다면, 이번에는 힘으로 빼앗아 보세요. 그야, 그렇잖아요?」"

[[dialogue]]
speaker = "マリオン"
original = "「あなたの言い分では、強い私の方がメイド長に相応しいということですから」"
translation = "「당신의 주장대로라면 강한 제가 메이드장에 더 어울린다는 뜻이니까요」"

[[dialogue]]
speaker = "マリオン"
original = "「そういうわけで、後は会長様、よろしくお願い致しますね♪」"
translation = "「그런 고로, 뒷일은 회장님, 잘 부탁드릴게요♪」"

[[dialogue]]
speaker = "マリオン"
original = "「それでは皆様、失礼致します」"
translation = "「그럼 여러분, 실례하겠습니다」"

[[dialogue]]
speaker = "キリカ"
original = "「あ……」"
translation = "「아……」"

[[dialogue]]
speaker = "キリカ"
original = "「私は……」"
translation = "「나는……」"

[[dialogue]]
speaker = "unk"
original = "去っていくマリオンさんに、師匠はそれ以上、声をかけることができなかった。"
translation = "떠나가는 마리온 씨에게 스승님은 그 이상 말을 걸 수 없었다."

