[[dialogue]]
speaker = "unk"
original = "第４話,アルモたんと新婚ごっこ,P"
translation = "제4화, 알모땅과 신혼 놀이"

[[dialogue]]
speaker = "unk"
original = "その日はアルモと２人きりで、リゾート結界のプライベートビーチへと遊びに来ていた。"
translation = "그날은 알모와 둘이서만 리조트 결계의 프라이빗 비치에 놀러 와 있었다."

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「会長、今日はアルモたんと２人きりで、いっぱいイチャイチャするぞ♪」"
translation = "「회장, 오늘은 알모땅과 둘이서만 잔뜩 꽁냥꽁냥할 것이다♪」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「最近、会長は仕事で忙しくて……全然ぎゅ～ってしてもらえてなかったからな！」"
translation = "「최근 회장은 일 때문에 바빠서…… 전혀 꼬옥 해주지 않았으니까 말이지!」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「だから今日は、アルモたんが思いっきり甘えちゃうのだ<emoji=heart04>」"
translation = "「그러니까 오늘은 알모땅이 마음껏 어리광 부릴 것이다<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「それでな、この前の『将来の話』、覚えているか？\u3000今日はその練習も兼ねて――」"
translation = "「그리고 말이지, 요전번의 『장래 이야기』 기억하고 있는 것이다? 오늘은 그 연습도 겸해서――」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「アルモたんと『新婚さんごっこ』をするのだ<emoji=heart04>」"
translation = "「알모땅과 『신혼부부 놀이』를 하는 것이다<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "新婚さんごっこ！？"
translation = "신혼부부 놀이!?"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「ふふっ、会長、驚いて顔が赤くなっているぞ♪」"
translation = "「후훗, 회장, 놀라서 얼굴이 빨개진 것이다♪」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「アルモたん、会長とラブラブなごっこ遊びがしたいのだ<emoji=heart04>\u3000……ダメか？」"
translation = "「알모땅, 회장과 러브러브한 놀이가 하고 싶은 것이다<emoji=heart04> ……안 되는 것이다?」"

[[dialogue]]
speaker = "unk"
original = "そんなふうに言われて、断れるはずもない。"
translation = "그런 말을 듣고 거절할 수 있을 리 없다."

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「えへへっ、よかったのだ♪\u3000じゃあまずは、新婚さんの朝といえば――『おはようのチュー』からなのだ♪」"
translation = "「에헤헷, 다행인 것이다♪ 그럼 우선, 신혼부부의 아침이라고 하면―― 『좋은 아침 뽀뽀』부터인 것이다♪」"

[[dialogue]]
speaker = "unk"
original = "アルモがちょこんと両手を俺の胸に当て背伸びをすると、控えめなキスをしてくる。"
translation = "알모가 앙증맞게 양손을 내 가슴에 대고 발돋움을 하더니, 조심스러운 키스를 해온다."

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「ん～っ……ちゅっ<emoji=heart04>\u3000えへへ……<emoji=heart04>\u3000これで今から、会長はアルモたんの<b>旦那さま</b>だぞ♪」"
translation = "「음~…… 쪽<emoji=heart04> 에헤헤……<emoji=heart04> 이걸로 지금부터 회장은 알모땅의 <b>서방님</b>인 것이다♪」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「次は……『今日の予定を相談する時間』なのだ！」"
translation = "「다음은…… 『오늘의 예정을 상담하는 시간』인 것이다!」"

[[dialogue]]
speaker = "unk"
original = "俺の腕に抱き着いてきたアルモと並んで、そのまま海辺をゆっくりと散歩する。"
translation = "내 팔에 매달려 온 알모와 나란히, 그대로 해변을 천천히 산책한다."

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「旦那さま、今日はどこでデートするのだ？\u3000浜辺でピクニックか？\u3000それとも海で一緒にぷかぷかするのだ？」"
translation = "「서방님, 오늘은 어디서 데이트할 것인가? 해변에서 피크닉인가? 아니면 바다에서 같이 둥둥 떠다닐 것인가?」"

[[dialogue]]
speaker = "unk"
original = "そう言いながら、アルモは俺の手を自分の腰へと誘導し、体を密着させてくる。"
translation = "그렇게 말하며 알모는 내 손을 자신의 허리로 유도해, 몸을 밀착시켜 온다."

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「新婚さんは、手をつなぐだけじゃ足りないのだ。こうやって……体でもくっつきあうものなのだ♪」"
translation = "「신혼부부는 손을 잡는 것만으로는 부족한 것이다. 이렇게…… 몸으로도 서로 달라붙는 법인 것이다♪」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「えへへ<emoji=heart04>\u3000旦那さまの腕、落ち着くのだ～<emoji=heart04>」"
translation = "「에헤헤<emoji=heart04> 서방님의 팔, 안심되는 것이다~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それから、俺たちはビーチチェアーに移動し、２人並んで腰かけた。"
translation = "그러고 나서 우리는 비치 체어로 이동해 둘이 나란히 앉았다."

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「じゃあ次は……お昼の『あーん』タイムなのだ♪」"
translation = "「그럼 다음은…… 점심의 『아~앙』 타임인 것이다♪」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「旦那さま、お口を開けるのだ。アルモたんが作ってきたお弁当を食べさせてあげるぞ♪」"
translation = "「서방님, 입을 벌리는 것이다. 알모땅이 만들어 온 도시락을 먹여주겠다구♪」"

[[dialogue]]
speaker = "unk"
original = "アルモは能力で『煉獄』からお弁当箱を取り出し、でき立てのまま保存されている生姜焼きを箸で差し出す。"
translation = "알모는 능력으로 『연옥』에서 도시락통을 꺼내, 갓 만든 상태로 보존된 돼지고기 생강구이를 젓가락으로 내민다."

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「はい、お肉をあ～んなのだ<emoji=heart04>」"
translation = "「자, 고기를 아~앙 하는 것이다<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺が食べて、美味しいと伝えると、アルモはぱあっと嬉しそうに笑う。"
translation = "내가 먹고 맛있다고 전하자, 알모는 파앗 하고 기쁜 듯이 웃는다."

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「えへへっ♪\u3000旦那さまが美味しそうに食べる顔、好きなのだ<emoji=heart04>」"
translation = "「에헤헷♪ 서방님이 맛있게 먹는 얼굴, 좋은 것이다<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「今度は旦那さまの番なのだ。アルモたんにも……お肉を食べさせて欲しいのだ<emoji=heart04>」"
translation = "「이번엔 서방님 차례인 것이다. 알모땅에게도…… 고기를 먹여줬으면 하는 것이다<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "交代して、俺が食べさせてあげると――アルモは幸せそうに目を細める。"
translation = "교대해서 내가 먹여주자―― 알모는 행복한 듯 눈을 가늘게 뜬다."

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「んっ……♪\u3000はむっ……もぐもぐ……♪\u3000美味なのだ<emoji=heart04>\u3000これも新婚さんの特権なのだ～♪」"
translation = "「응……♪ 함냐…… 우물우물……♪ 별미인 것이다<emoji=heart04> 이것도 신혼부부의 특권인 것이다~♪」"

[[dialogue]]
speaker = "unk"
original = "そうしてお弁当を食べ終えると、アルモは満足げに身を寄せてきた。"
translation = "그렇게 도시락을 다 먹자, 알모는 만족스러운 듯 몸을 기대왔다."

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「旦那さま……次はお昼寝タイムなのだ。新婚さんは、お昼寝も一緒にするのだ♪」"
translation = "「서방님…… 다음은 낮잠 타임인 것이다. 신혼부부는 낮잠도 같이 자는 법인 것이다♪」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「だから、アルモたんに膝枕をして欲しいのだ<emoji=heart04>」"
translation = "「그러니까 알모땅에게 무릎베개를 해줬으면 하는 것이다<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "アルモは俺の太ももに頭を乗せると、俺が撫でようと近づけた手に頬をすり寄らせてくる。"
translation = "알모는 내 허벅지에 머리를 얹더니, 내가 쓰다듬으려 다가간 손에 뺨을 비벼온다."

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「はふぅ……<emoji=heart04>\u3000旦那さまの手、優しくて大好きなのだ……♪\u3000頭なでなで……して欲しいのだ……♪」"
translation = "「하후우……<emoji=heart04> 서방님의 손, 다정해서 너무 좋은 것이다……♪ 머리 쓰담쓰담…… 해줬으면 하는 것이다……♪」"

[[dialogue]]
speaker = "unk"
original = "撫でているうちに、アルモは微笑みながら、寝息を立て始めた。"
translation = "쓰다듬는 사이, 알모는 미소 지으며 숨소리를 내기 시작했다."

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「……すぅ……ん……旦那さま、だいすき……なのだ……」"
translation = "「……스으…… 응…… 서방님, 사랑해…… 인 것이다……」"

[[dialogue]]
speaker = "unk"
original = "小一時間ほど経ち、アルモが目を覚ます。"
translation = "한 시간 정도 지나 알모가 눈을 뜬다."

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「……んっ、旦那さまの膝枕が気持ちよくて、本当に寝ちゃってたのだ……♪」"
translation = "「……응, 서방님의 무릎베개가 기분 좋아서 정말 잠들어버린 것이다……♪」"

[[dialogue]]
speaker = "unk"
original = "俺も少し寝ちゃってた"
translation = "나도 조금 잠들었어."

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「えへへっ♪\u3000なら次は、おはようのチューを兼ねた、新婚さんの『誓いのちゅー』をしちゃうのだ<emoji=heart04>」"
translation = "「에헤헷♪ 그럼 다음은, 좋은 아침 뽀뽀를 겸한 신혼부부의 『맹세의 뽀뽀』를 해버리는 것이다<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「会長……愛しているぞ<emoji=heart04>\u3000ん～っ、ちゅっ……<emoji=heart04>」"
translation = "「회장…… 사랑하는 것이다<emoji=heart04> 응~, 쪽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "今度のキスは、ゆっくり長めだった。"
translation = "이번 키스는 천천히 길었다."

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「んむっ……ちゅっ……<emoji=heart04>\u3000はあぁっ……<emoji=heart04>\u3000新婚さんのキスは、いつもより甘くて……美味なのだ……<emoji=heart04>」"
translation = "「음뭇…… 쪽……<emoji=heart04> 하아아……<emoji=heart04> 신혼부부의 키스는 평소보다 달콤해서…… 별미인 것이다……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "アルモはキス、好きだよな"
translation = "알모는 키스, 좋아하네."

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「うん……♪\u3000会長とのキス、大好きなのだ<emoji=heart04>」"
translation = "「응……♪ 회장과의 키스, 너무 좋은 것이다<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「お肉を食べるよりも、もっと大好きなのだ<emoji=heart04>\u3000愛を感じる、『幸せの味』がするのだ……<emoji=heart04>」"
translation = "「고기를 먹는 것보다 훨씬 더 좋은 것이다<emoji=heart04> 사랑이 느껴지는, 『행복의 맛』이 나는 것이다……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言うと、アルモはぎゅ～っと俺に抱き着いて、小さなキスを何度も重ねてくる。"
translation = "그렇게 말하자 알모는 꼬옥 나에게 매달려 작은 키스를 몇 번이고 거듭해 온다."

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「ん～っ<emoji=heart04>\u3000ちゅっ……ちゅっ……<emoji=heart04>\u3000会長……今日はまだまだいっぱい、キスをおかわりしたいのだ<emoji=heart04>」"
translation = "「음~<emoji=heart04> 쪽…… 쪽……<emoji=heart04> 회장…… 오늘은 아직 잔뜩, 키스를 리필하고 싶은 것이다<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その後も、俺たちは新婚ごっこを続けて――お腹いっぱいになるほどに幸せな休日を過ごすのだった。"
translation = "그 후로도 우리는 신혼 놀이를 계속하며―― 배가 부를 정도로 행복한 휴일을 보내는 것이었다."

