[[dialogue]]
speaker = "unk"
original = "水着コンテスト、結果発表──"
translation = "수영복 콘테스트, 결과 발표──"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「さあ、いよいよ審査のお時間デス──皆サン誰に投票するか決まりマシタか～？」"
translation = "「자아, 드디어 심사 시간입니닷── 여러분 누구에게 투표할지 결정하셨나용~?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「なんか光の玉がステージに集まってる──あれは何……？」"
translation = "「왠지 빛의 구슬이 스테이지로 모이고 있어── 저건 뭐야……?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「観客の意見を星力に変換して吸い上げるシステムのようです」"
translation = "「관객의 의견을 성력으로 변환해서 빨아올리는 시스템인 것 같네요.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「相変わらずなんでもアリね……」"
translation = "「여전히 뭐든 가능하네……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「リップルさんはリゾートのためならなんでも作ってしまうのです」"
translation = "「리플 씨는 리조트를 위해서라면 뭐든지 만들어 버리는 거예요.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「あたしの優勝もあるか！？」"
translation = "「내 우승도 있을까!?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「うーん……残念だけど、会場の雰囲気を見る限りでは……」"
translation = "「으음…… 아쉽지만, 회장 분위기를 봐서는……」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「フ……決まっているというものだ」"
translation = "「후…… 결정되어 있다는 것이지.」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「さあ……集計が終了シマシタ……いよいよ結果発表デス！」"
translation = "「자아…… 집계가 끝났습니닷…… 드디어 결과 발표입니닷!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ごく……」"
translation = "「꿀꺽……」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「優勝は……カイチョ―デ～～～～～～～ス！！」"
translation = "「우승은…… 회자앙입니드아아아아아아악!!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「！？」"
translation = "「!?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「へ！？」"
translation = "「헤!?」"

[[dialogue]]
speaker = "unk"
original = "俺？"
translation = "나?"

[[dialogue]]
speaker = "unk"
original = "え？"
translation = "에?"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ハーイ！\u3000ビーチのお客サンから圧倒的票数を集めて優勝デース！」"
translation = "「하잇! 비치의 관객분들에게 압도적 표수를 모아서 우승입니닷!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「皆サン最後には目がハートになってマシター！\u3000リップルも納得デース！」"
translation = "「여러분 마지막에는 눈이 하트가 되어 있었어욧! 리플도 납득입니닷!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「た、確かにあのお姫様抱っこは劇的だったけど……！」"
translation = "「확, 확실히 그 공주님 안기는 극적이었지만……!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ヘレナちゃん、これって──」"
translation = "「헬레나짱, 이건──」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「これは迂闊──飛び入り可、かつ、男女の規定を定めていなかったとは」"
translation = "「이건 우활── 돌발 참가가 가능하고, 게다가 남녀 규정을 정해두지 않았을 줄이야.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「そして審査員は女子ばかり──これでは魔王に惹かれるのも無理はないというもの！」"
translation = "「그리고 심사위원은 여자들뿐── 이래서야 마왕에게 이끌리는 것도 무리가 아니라는 것이지!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あらあら……確かに私も会長くんにキュンってしちゃったけど」"
translation = "「어머어머…… 확실히 나도 회장군에게 심쿵해 버렸지만.」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「会長さん、さすがです！」"
translation = "「회장님, 역시 대단하세요!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「おめでとうございマース！\u3000初代水着グランプリの栄冠はカイチョーのものデース！」"
translation = "「축하드립니닷! 초대 수영복 그랑프리의 영관은 회장의 것입니닷!」"

[[dialogue]]
speaker = "unk"
original = "そんなつもりじゃ……"
translation = "그럴 생각은 아니었는데……"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「参ったな。せっかくのプロモーションの機会が……」"
translation = "「곤란하군. 어렵게 잡은 홍보 기회가……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「諦めなさい、ヘレナちゃん。公正な審査の結果でしょ♪」"
translation = "「포기해, 헬레나짱. 공정한 심사 결과잖아♪」"

[[dialogue]]
speaker_original = "観覧の女の子Ａ"
speaker_translation = "관람하는 여자아이 A"
original = "「やっぱ、最後に会長が全部持ってったよね！」"
translation = "「역시, 마지막에 회장이 다 가져갔네!」"

[[dialogue]]
speaker_original = "観覧の女の子Ｂ"
speaker_translation = "관람하는 여자아이 B"
original = "「ええ。あんなシチュエーション、女子なら一度は憧れるわ……」"
translation = "「응. 저런 상황, 여자라면 한 번쯤은 동경하거든……」"

[[dialogue]]
speaker = "unk"
original = "そんなこんなで──"
translation = "이러쿵저러쿵해서──"

[[dialogue]]
speaker = "unk"
original = "リゾート初の水着コンテストは、まさかの結果で幕を下ろすのだった。"
translation = "리조트 첫 수영복 콘테스트는, 설마 했던 결과로 막을 내리는 것이었다."

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「星徒会の皆サン、ご参加いただきどうもありがとうございマシター！\u3000おかげでイベントは大成功デース！」"
translation = "「성도회 여러분, 참가해 주셔서 정말 감사했습니닷! 덕분에 이벤트는 대성공입니닷!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ええ。こちらとしても嬉しいけど……今回、参加したのはヘレナちゃんのせいなのよ」"
translation = "「그래. 우리로서도 기쁘지만…… 이번에 참가한 건 헬레나짱 때문인걸.」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「私の水着……ですか」"
translation = "「제 수영복…… 인가요.」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ハーイ。その事情は先日お聞きシマシタ」"
translation = "「하잇. 그 사정은 요전날 들었습니닷.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「い、いいの？\u3000勝手にＰＲの場にされそうだったのに……」"
translation = "「괘, 괜찮아? 마음대로 홍보의 장으로 쓰일 뻔했는데……」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「そのような思惑があったとは知りまセンでしたが、イベントのおかげでたくさんの人がリゾート結界に来てくれマシタ！」"
translation = "「그러한 의도가 있었다는 건 몰랐습니닷만, 이벤트 덕분에 많은 분이 리조트 결계에 와주셨습니닷!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「盛り上がってたくさんのハッピーを感じられたので、ワタシは大変感謝していマース！」"
translation = "「북적이며 많은 해피를 느낄 수 있었기에, 전 매우 감사하고 있습니닷!」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「リップルは海よりも広い心の持ち主だ。私も感謝している」"
translation = "「리플은 바다보다 넓은 마음의 소유자로군. 나도 감사하고 있다.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「おう！\u3000あたしもバナナボートもらえたぞ、早くこれで海へ繰り出そうぜ！」"
translation = "「오우! 나도 바나나 보트 받았다고, 빨리 이걸로 바다에 나가자구!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「元気ね……！」"
translation = "「활기차네……!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ふむ……参加賞のドリンクチケットもあるので、後日また来るのはアリですね」"
translation = "「흠…… 참가상인 드링크 티켓도 있으니, 나중에 다시 오는 건 괜찮겠네요.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「みんな……もう、すっかり楽しんじゃって」"
translation = "「다들…… 벌써, 완전히 즐기고 있잖아.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「フフ……どうだ？\u3000ＷＩＮ－ＷＩＮだろう？」"
translation = "「후후…… 어떠냐? 윈-윈(WIN-WIN)이지?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「優勝は逃してしまったが、これでも十分プロモーションにはなった。いっそこの機に、男性用水着にも参入してみるか……」"
translation = "「우승은 놓쳤지만, 이걸로도 충분히 홍보는 되었다. 차라리 이 기회에 남성용 수영복에도 진출해 볼까……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「転んでもただじゃ起きませんね……」"
translation = "「넘어져도 그냥 일어나지는 않네요……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「商魂たくましすぎるわよ」"
translation = "「상혼이 너무 억척스럽다고.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「トリシャも、無理を聞いてもらってすまなかったな」"
translation = "「트리샤도, 무리한 부탁을 들어줘서 미안했군.」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「いえ……得難い経験ができました。それに……優勝はできませんでしたが、たくさん声をかけてもらいました」"
translation = "「아니요…… 얻기 힘든 경험을 할 수 있었어요. 게다가…… 우승은 못 했지만, 많은 분이 말을 걸어 주셨거든요.」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「フフ……またビーチで遊ぼう、と言ってくれた子もいました……にへへ……ヘレナさんのおかげ、です……」"
translation = "「후후…… 다시 비치에서 놀자고 해준 아이도 있었어요…… 헤헤…… 헬레나 씨 덕분, 이에요……」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「素晴らしいデース！\u3000リゾート結界はフレンズの輪も広げマース！」"
translation = "「멋집니닷! 리조트 결계는 친구의 고리도 넓힙니닷!」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「では、魔王。優勝賞金だ」"
translation = "「그럼, 마왕. 우승 상금이다.」"

[[dialogue]]
speaker = "unk"
original = "受け取れませんよ"
translation = "받을 수 없어요"

[[dialogue]]
speaker = "unk"
original = "こんな大金……"
translation = "이런 큰돈을……"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「遠慮するでない。九浄家当主ヘレナちゃんが、約束を破るケチんぼと思われるわけにはいかんのだ」"
translation = "「사양 말거라. 쿠죠 가문의 당주 헬레나짱이 약속을 어기는 구두쇠로 여겨질 수는 없으니 말이다.」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あーっ！\u3000会長さんがこっそり優勝賞金をもらってますー！」"
translation = "「아앗! 회장님이 몰래 우승 상금을 받고 있어욧!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「なに！？\u3000独り占めか！？\u3000ホントは魔王もグミ・パーティしたいだろ、なあ！？」"
translation = "「뭐!? 독점인가!? 사실 마왕도 구미 파티 하고 싶잖아, 그치!?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふ……なんだかんだ、いいイベントだったわね♪」"
translation = "「후후…… 이러니저러니 해도 좋은 이벤트였네♪」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「リゾート結界はこれからもたくさんのハッピーをお届けシマース！\u3000皆サン、どうぞよろしくデ～～ス！」"
translation = "「리조트 결계는 앞으로도 많은 해피를 전해드리겠습니닷! 여러분, 부디 잘 부탁드립니드아아앗!」"

[[dialogue]]
speaker = "unk"
original = "そうして、てんやわんやの１日は終わりを迎えるのだった……。"
translation = "그렇게, 시끌벅적했던 하루는 끝을 맞이하는 것이었다……."

