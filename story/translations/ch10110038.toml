[[dialogue]]
speaker = "unk"
original = "とある休日。俺は恋人のマトイと、街へデートに出かけていた。"
translation = "어느 휴일. 나는 연인인 마토이와 시내로 데이트를 나갔다."

[[dialogue]]
speaker = "unk"
original = "その帰り際のこと――"
translation = "그 돌아가는 길의 일――"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「辺りも暗くなってきたし、今日はそろそろ帰ろうか」"
translation = "「주변도 어두워졌고 오늘은 슬슬 돌아갈까.」"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「う、うん……」"
translation = "「으, 응……」"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「……あ、あのね、会長！」"
translation = "「……저, 저기 말이야, 회장님!」"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「えっと、その……ね？」"
translation = "「저기, 그…… 있지?」"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「今日はまだ私……帰りたくないかも～……な、なんて……」"
translation = "「오늘은 아직 나…… 돌아가고 싶지 않을지도~…… 라니……」"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「だから、もし……会長さえよければ……」"
translation = "「그러니까 만약…… 회장님만 괜찮다면……」"

[[dialogue]]
speaker = "unk"
original = "そうして、俺は珍しくマトイの方から誘われる形で、ラブホテルに入ることになった――"
translation = "그렇게 나는 드물게 마토이가 먼저 권하는 형태로 러브호텔에 들어가게 되었다――"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「会長……<emoji=heart04>\u3000んっ……ちゅっ<emoji=heart04>\u3000ちゅぷぷっ……<emoji=heart04>」"
translation = "「회장님……<emoji=heart04> 응…… 쪽<emoji=heart04> 츕, 츄릅……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「んちゅっ……<emoji=heart04>\u3000ちゅぷっ……れろちゅっ<emoji=heart04>\u3000んむっ、ちゅっ<emoji=heart04>\u3000ちゅうぅっ……れろちゅっ、ちゅぷぷっ<emoji=heart04>」"
translation = "「응츄……<emoji=heart04> 츕…… 레로츄<emoji=heart04> 음, 쪽<emoji=heart04> 츄우우…… 레로츄, 츕츄릅……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「んむっ、ちゅぱっ……ぷはぁっ<emoji=heart04>\u3000はぁ……はぁ……はぁぁ<emoji=heart04>」"
translation = "「음, 츄파…… 푸하아<emoji=heart04> 하아…… 하아…… 하아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「マトイ……」"
translation = "「마토이……」"

[[dialogue]]
speaker = "unk"
original = "俺がそのまま、マトイをベッドに押し倒そうとすると――"
translation = "내가 그대로 마토이를 침대에 밀어 넘어뜨리려 하자――"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「あっ、待って、会長……！\u3000あのね、今日は……」"
translation = "「앗, 잠깐만, 회장님……! 저기 말이야, 오늘은……」"

[[dialogue]]
speaker = "unk"
original = "マトイから提案されたのは、彼女が上になる騎乗位だった。"
translation = "마토이가 제안한 것은 그녀가 위로 올라오는 기승위였다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「いつも気持ちよくしてもらってるから、今日は私が、会長を気持ちよくするね……<emoji=heart04>」"
translation = "「항상 기분 좋게 해주니까, 오늘은 내가 회장님을 기분 좋게 해줄게……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それにしても、どうしてノヴァフォームに変身……？」"
translation = "「그나저나 어째서 노바 폼으로 변신을……?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そ、それは……このノヴァフォームのお陰で、私は星騎士として一歩前に進めた気がしてる」"
translation = "「그, 그건…… 이 노바 폼 덕분에 나는 성기사로서 한 걸음 앞으로 나아간 기분이 들어.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「だから恋愛に関しても、もっと積極的な自分になれたらと思ってて……」"
translation = "「그러니까 연애에 대해서도 좀 더 적극적인 내가 될 수 있었으면 해서……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「その……私、なかなか自分からエッチしたいって言い出せなくて……いつも会長から察して、誘ってくれてたでしょ？」"
translation = "「그게…… 저, 좀처럼 먼저 하고 싶다는 말을 못 꺼내서…… 항상 회장님이 눈치채고 유혹해 주셨잖아요?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「会長のこと、好きだなぁって気持ちが高まりすぎると、切なくなって……いっぱいこうやって、触れ合いたくなっちゃう。なのにいっつも、リードされてばっかり」"
translation = "「회장님을 좋아하는 마음이 너무 커지면 애틋해져서…… 이렇게 잔뜩 서로 닿고 싶어져요. 그런데도 언제나 리드당하기만 하고」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「でもこの姿なら、いつもの自分より勇気が出せるんじゃないかなぁ、って……」"
translation = "「하지만 이 모습이라면, 평소의 저보다 용기를 낼 수 있지 않을까 해서……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「と言いつつ、結局脱いじゃうんだけど……えへへ」"
translation = "「말은 그렇게 하면서, 결국 벗어버리지만요…… 에헤헤」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「なるほど……わかった。じゃあ今日は、色々マトイにお願いするよ」"
translation = "「과연…… 알았어. 그럼 오늘은 여러 가지로 마토이에게 부탁할게」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「うんっ……頑張るね<emoji=heart04>」"
translation = "「응…… 열심히 할게<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「でも、その代わり、手を繋いだままでいてくれると、安心するかも……<emoji=heart04>」"
translation = "「하지만, 그 대신에 손을 잡은 채로 있어 주면 안심될지도……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は恋人繋ぎでそっと握り返して、頷く。"
translation = "나는 연인 잡기로 살며시 맞잡으며 고개를 끄덕인다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「はあぁ……<emoji=heart04>\u3000改めて見ると……会長のおち○ちん、やっぱり普通じゃなくて、すごい……<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 새삼스럽게 다시 보니까…… 회장님의 자지, 역시 평범하지 않고 대단해……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「――もう大きくなっちゃってて、恥ずかしい？」"
translation = "「――벌써 커져 버려서 부끄러워요?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「でも、それだけ期待、してくれてるんだよね……？\u3000それに、強いオスって感じがして……私は、好き<emoji=heart04>」"
translation = "「하지만 그만큼 기대해 주고 있는 거겠죠……? 게다가 강한 수컷이라는 느낌이 들어서…… 저는 좋아요<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「はぁっ……私に対して、エッチな気持ちを抱いてくれてる、証拠でもあるし……」"
translation = "「하아…… 저에 대해서 야한 마음을 품어주고 있다는 증거이기도 하고……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「それが……何だか嬉しいなぁ<emoji=heart04>」"
translation = "「그게…… 왠지 기쁘네요<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あっ、おち○ちんムクムクって、もっと大きくなって……<emoji=heart04>」"
translation = "「앗, 자지가 불끈불끈하고 더 커져서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「マトイが男を悦ばせるようなことを言うから……」"
translation = "「마토이가 남자를 기쁘게 할 만한 소리를 하니까……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そ、そうなの？\u3000私は思ったこと、普通に言っただけなんだけど……はふぅっ<emoji=heart04>」"
translation = "「그, 그래요? 저는 생각한 걸 그냥 말했을 뿐인데…… 하후우<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「と、とりあえず……濡らして、準備するね？\u3000……はぁぁっ<emoji=heart04>」"
translation = "「이, 일단…… 적셔서 준비할게요? ……하아아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言ってマトイは、スマタを開始する。"
translation = "그렇게 말하며 마토이는 스마타를 시작한다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あっ、んしょっ……んんっ<emoji=heart04>\u3000おち○ちん、すごく固くて、熱ぅいっ<emoji=heart04>\u3000あ、はあぁ……<emoji=heart04>」"
translation = "「앗, 응차…… 응으<emoji=heart04> 자지, 엄청 딱딱하고 뜨거워어<emoji=heart04> 아, 하아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あっ……あんっ<emoji=heart04>\u3000んっ……ふうぅっ<emoji=heart04>\u3000はあぁっ……んんっ<emoji=heart04>\u3000あっ……んっ<emoji=heart04>\u3000はぁ、ふぅぅ……<emoji=heart04>」"
translation = "「앗…… 앙<emoji=heart04> 응…… 후우우<emoji=heart04> 하아아…… 응으<emoji=heart04> 앗…… 응<emoji=heart04> 하아, 후우우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「マトイ、すごく濡れてる……」"
translation = "「마토이, 엄청 젖었어……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「んっ<emoji=heart04>\u3000会長のこれが……はぁぁ<emoji=heart04>\u3000いつも、私の中に入って……いっぱい気持ち良く、してくれてるんだって思ったら<emoji=heart04>\u3000はあぁっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 회장님의 이게…… 하아아<emoji=heart04> 항상 제 안에 들어와서…… 잔뜩 기분 좋게 해주고 있다고 생각하니까<emoji=heart04> 하아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あぁぁ……<emoji=heart04>\u3000いつもの気持ちいいの、思い出しちゃってぇ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000愛液、溢れて来ちゃう……<emoji=heart04>\u3000あっ……あんっ<emoji=heart04>\u3000はあぁっ、ふうぅっ<emoji=heart04>」"
translation = "「아아아……<emoji=heart04> 평소의 기분 좋은 게 떠올라 버려서어<emoji=heart04> 응으<emoji=heart04> 애액이 넘쳐흘러 버려요……<emoji=heart04> 앗…… 앙<emoji=heart04> 하아아, 후우우<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マトイのエッチな言葉に、俺も彼女の中の感触を思い出してしまう。"
translation = "마토이의 야한 말에 나도 그녀 안의 감촉을 떠올리고 만다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あんっ<emoji=heart04>\u3000すごいっ……<emoji=heart04>\u3000会長の、ギンギンに大きくなって……<emoji=heart04>」"
translation = "「앙<emoji=heart04> 대단해……<emoji=heart04> 회장님 거, 빳빳하게 커져서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あっ、あんっ<emoji=heart04>\u3000私のクリも勃起しちゃって<emoji=heart04>\u3000あふぅぅ<emoji=heart04>\u3000おち○ちん、擦れると感じちゃう……<emoji=heart04>」"
translation = "「앗, 앙<emoji=heart04> 제 클리도 발기해 버려서<emoji=heart04> 아후우우<emoji=heart04> 자지가 스치면 느껴버려요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「んっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ……<emoji=heart04>\u3000太くて逞しいカリに、擦られて<emoji=heart04>\u3000あっ、はぁっ……ふあぁっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 앗<emoji=heart04> 하아아……<emoji=heart04> 굵고 늠름한 귀두에 비벼져서<emoji=heart04> 앗, 하아…… 후아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あんっ<emoji=heart04>\u3000クリが押し負けて、体震えちゃう<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000あぁぁっ……はぁんっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>」"
translation = "「앙<emoji=heart04> 클리가 눌려서 몸이 떨려버려요<emoji=heart04> 응으<emoji=heart04> 아아아…… 하앙<emoji=heart04> 앗<emoji=heart04> 응우우<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「はあぁっ……<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000会長のおち○ちん、すぉごいっ<emoji=heart04>\u3000あっ……あんっ<emoji=heart04>\u3000はあぁっ、ふあぁあっ<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 기분 좋아<emoji=heart04> 회장님 자지, 대단해애<emoji=heart04> 앗…… 앙<emoji=heart04> 하아아, 후아아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「愛液、まだ増えて……<emoji=heart04>\u3000くちゅくちゅいってるよぉ<emoji=heart04>\u3000はぁぁっ<emoji=heart04>\u3000んんっ……はあぁっ、んあぁあっ<emoji=heart04>」"
translation = "「애액이 아직 더 늘어나서……<emoji=heart04> 질척질척 소리 나요오<emoji=heart04> 하아아<emoji=heart04> 응으…… 하아아, 응아아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「はぁっ……はぁっ……<emoji=heart04>\u3000んんんっ<emoji=heart04>」"
translation = "「하아…… 하아……<emoji=heart04> 응응응<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「会長、そろそろ……はぁぁぁ<emoji=heart04>\u3000十分濡れて、大丈夫だと思うから……中、入れちゃうね……？<emoji=heart04>」"
translation = "「회장님, 슬슬…… 하아아아<emoji=heart04> 충분히 젖어서 괜찮을 것 같으니까…… 안에 넣을게요……?<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マトイはそう言って、１度繋いでいた片手を離して、ペニスの先端を膣穴にあてがうと――"
translation = "마토이는 그렇게 말하며, 잡고 있던 한쪽 손을 놓고 페니스의 끝을 질 구멍에 갖다 대더니――"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「んっ<emoji=heart04>\u3000入れるね……<emoji=heart04>\u3000はあぁっ……ふうぅっ……<emoji=heart04>」"
translation = "「응<emoji=heart04> 넣을게……<emoji=heart04> 하아아…… 후우우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あっ……んあぁぁっ<emoji=heart04><emoji=heart04>」"
translation = "「앗…… 응아아아<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「――ふ、あああぁっ<emoji=heart04><emoji=heart04>\u3000あぁぁんっ<emoji=heart04>\u3000入っ……たぁっ<emoji=heart04>\u3000んっ、はあぁっ……ふうぅっ<emoji=heart04>\u3000はぁっ……はぁっ<emoji=heart04>」"
translation = "「――후, 아아아아<emoji=heart04><emoji=heart04> 아아앙<emoji=heart04> 들어…… 갔다아<emoji=heart04> 응, 하아아…… 후우우<emoji=heart04> 하아…… 하아<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「んっ……<emoji=heart04>\u3000おち○ちん、おっきいぃ<emoji=heart04>\u3000中、熱いのでいっぱいになってる……<emoji=heart04>\u3000はあぁっ、ふうぅぅっ<emoji=heart04>」"
translation = "「응……<emoji=heart04> 자지, 커어어<emoji=heart04> 안이 뜨거운 걸로 가득 찼어……<emoji=heart04> 하아아, 후우우우<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「マトイ、大丈夫か……？」"
translation = "「마토이, 괜찮아……?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「う、うんっ<emoji=heart04>\u3000会長のおち○ちん、すごいからぁ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000入れただけで、腰震えちゃって……<emoji=heart04>\u3000ん、んん～っ<emoji=heart04>」"
translation = "「으, 응<emoji=heart04> 회장님 자지가 대단해서어<emoji=heart04> 아앙<emoji=heart04> 넣은 것만으로 허리가 떨려버려서…… <emoji=heart04> 응, 응으~<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「で、でも痛いとかじゃなくて……あぁんっ<emoji=heart04>\u3000気持ち良すぎて、やばいって方、だからぁ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000はぁ、はぁぁっ<emoji=heart04>」"
translation = "「하, 하지만 아픈 게 아니라…… 아앙<emoji=heart04> 너무 기분 좋아서 위험한 쪽이니까아<emoji=heart04> 하앙<emoji=heart04> 하아, 하아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あぁぁっ<emoji=heart04>\u3000少し、落ち着いてきたから……動く、ね？」"
translation = "「아아아<emoji=heart04> 조금 진정됐으니까…… 움직일게?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「んっ――<emoji=heart04><emoji=heart04>」"
translation = "「응――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あっ、ふあああぁっ<emoji=heart04><emoji=heart04>\u3000あっ、あんっ<emoji=heart04>\u3000はあぁっ……んあぁあっ<emoji=heart04>\u3000んっ、はあぁっ……んんっ<emoji=heart04>\u3000あっ、はぁんっ<emoji=heart04>\u3000はあぁっ、んうぅっ<emoji=heart04>」"
translation = "「앗, 후아아아아<emoji=heart04><emoji=heart04> 앗, 앙<emoji=heart04> 하아아…… 응아아아<emoji=heart04> 응, 하아아…… 응으<emoji=heart04> 앗, 하앙<emoji=heart04> 하아아, 응우우<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あっ……<emoji=heart04>\u3000会長、ど、どう？\u3000んんんっ<emoji=heart04>\u3000気持ちよく、できてるかなぁ？<emoji=heart04>\u3000……はふぅぅん<emoji=heart04>」"
translation = "「앗……<emoji=heart04> 회장님, 어, 어때요? 응응응<emoji=heart04> 기분 좋게 해드리고 있나요? <emoji=heart04> ……하후우운<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああっ。マトイのおま○こ、温かくて柔らかくて、最高に気持ちいい……っ」"
translation = "「아앗. 마토이의 보지, 따뜻하고 부드러워서 최고로 기분 좋아……!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あああっ<emoji=heart04>\u3000会長に褒められると嬉しくて、んんっ<emoji=heart04>\u3000おま○こ、喜んじゃうっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000はあぁっ……ふうぅっ<emoji=heart04>」"
translation = "「아아앗<emoji=heart04> 회장님한테 칭찬받으니까 기뻐서, 응으<emoji=heart04> 보지가 좋아해요! <emoji=heart04> 아앙<emoji=heart04> 하아아…… 후우우<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あっ……<emoji=heart04>\u3000ごめんねっ、今日は私が、ご奉仕してるんだった……っ<emoji=heart04>\u3000んふぅぅっ<emoji=heart04>\u3000はぁぁ、夢中になり過ぎないように、しないと……<emoji=heart04>\u3000はあぁぁっ、んうぅっ<emoji=heart04>」"
translation = "「앗……<emoji=heart04> 미안해요, 오늘은 제가 봉사하는 거였는데……! <emoji=heart04> 응후우우<emoji=heart04> 하아아, 너무 빠져들지 않도록 해야 하는데…… <emoji=heart04> 하아아아, 응우우<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「はぁぁっ<emoji=heart04>\u3000はふぅぅん……<emoji=heart04>\u3000腰をグラインド、させてみたりとかぁ<emoji=heart04>\u3000はぁぁん<emoji=heart04>\u3000こういうの、どう、かなぁ……？<emoji=heart04>」"
translation = "「하아아<emoji=heart04> 하후우운……<emoji=heart04> 허리를 그라인드 해본다거나아<emoji=heart04> 하아아앙<emoji=heart04> 이런 거, 어때요……? <emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「んっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000はあぁぁっ……んんんっ<emoji=heart04>\u3000んっ、んあぁあっ<emoji=heart04>\u3000はあぁっ……ふうぅっ<emoji=heart04>\u3000んっ、んっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000はあぁっ……はふぅぅんっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 응<emoji=heart04> 하아아아…… 응응응<emoji=heart04> 응, 응아아아<emoji=heart04> 하아아…… 후우우<emoji=heart04> 응, 응<emoji=heart04> 응으<emoji=heart04> 하아아…… 하후우운<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あっ<emoji=heart04>\u3000会長、気持ち良さそうな顔、してる……えへへ、嬉しいっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んんっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 회장님, 기분 좋아 보이는 표정 짓고 있어…… 에헤헤, 기뻐요! <emoji=heart04> 응<emoji=heart04> 응으<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あっ<emoji=heart04>\u3000はあぁっ……んあぁっ<emoji=heart04>\u3000これ、私も気持ちいい<emoji=heart04>\u3000んっ<emoji=heart04>\u3000あああっ……ふあぁっ<emoji=heart04>\u3000いいところ、当たって<emoji=heart04>\u3000あっ、はぁんっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 하아아…… 응아아<emoji=heart04> 이거, 저도 기분 좋아요<emoji=heart04> 응<emoji=heart04> 아아앗…… 후아아<emoji=heart04> 좋은 곳에 닿아서<emoji=heart04> 앗, 하앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「んっ<emoji=heart04>\u3000会長……キス<emoji=heart04>\u3000キスもするね？\u3000んっ……ちゅうっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 회장님…… 키스<emoji=heart04> 키스도 할게요? 응…… 츄<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「んちゅっ<emoji=heart04>\u3000ちゅむっ……ちゅぷぷっ<emoji=heart04>\u3000ちゅぱっ……れろちゅっ<emoji=heart04>\u3000はぁっ、んむっ……ちゅるるっ<emoji=heart04>\u3000ちゅぱっ……れろちゅっ、ちゅるるっ<emoji=heart04>」"
translation = "「음츄<emoji=heart04> 츄웁…… 츕츕<emoji=heart04> 츄파…… 레로츄<emoji=heart04> 하아, 음…… 츄르르<emoji=heart04> 츄파…… 레로츄, 츄르르<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「んふぅっ……会長、しゅきぃ<emoji=heart04>\u3000んむっ……ちゅっ、ちゅぱっ<emoji=heart04>\u3000ちゅむっ……ちゅるるっ、れろちゅっ<emoji=heart04>」"
translation = "「음후우…… 회장님, 좋아해애<emoji=heart04> 음…… 츄, 츄파<emoji=heart04> 츄웁…… 츄르르, 레로츄<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ちゅっ……ぷはぁっ<emoji=heart04>\u3000はあぁぁっ……<emoji=heart04>\u3000キス、気持ちぃい……<emoji=heart04>\u3000あっ、あぁぁんっ<emoji=heart04>」"
translation = "「츄…… 푸하아<emoji=heart04> 하아아아……<emoji=heart04> 키스, 기분 좋아……<emoji=heart04> 앗, 아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「はあぁっ……ふうぅっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000あぁぁっ<emoji=heart04>\u3000会長、ごめん……<emoji=heart04>」"
translation = "「하아아…… 후우우<emoji=heart04> 응으<emoji=heart04> 아아아<emoji=heart04> 회장님, 미안해……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「マトイ、どうしたんだ……？」"
translation = "「마토이, 왜 그래……?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あ、あのね……っ<emoji=heart04>\u3000んんんっ……あんっ<emoji=heart04>\u3000私もう、我慢、出来なくなって、きちゃっててぇ……<emoji=heart04>\u3000はぁぁぁん<emoji=heart04>」"
translation = "「저, 저기 있잖아……! <emoji=heart04> 응응응…… 앙<emoji=heart04> 저 이제 참을 수 없게 되어버려서어……<emoji=heart04> 하아아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「本当はもっとご奉仕して、気持ちよく、してあげたかったんだけど……<emoji=heart04>\u3000あぁぁっ<emoji=heart04>\u3000余裕無くなってきちゃった……あっ<emoji=heart04>\u3000はあぁっ……んんんっ<emoji=heart04>」"
translation = "「원래는 더 봉사해서 기분 좋게 해주고 싶었는데……<emoji=heart04> 아아아<emoji=heart04> 여유가 없어져 버렸어…… 앗<emoji=heart04> 하아아…… 응응응<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「腰、止まらなくてっ<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000私の方が、気持ちよくなっちゃててっ……<emoji=heart04>\u3000あぁぁんっ……あっ<emoji=heart04>\u3000ふあぁぁあっ<emoji=heart04>」"
translation = "「허리가 멈추지 않아서! <emoji=heart04> 아아앗<emoji=heart04> 제 쪽이 더 기분 좋아져 버려서…… <emoji=heart04> 아아앙…… 앗<emoji=heart04> 후아아아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あっ<emoji=heart04>\u3000あのね……だから、はしたないんだけど……んんんっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 저기 말이야…… 그래서, 천박하지만…… 응응응<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あっあっあっ<emoji=heart04>\u3000いつも、みたいに……<emoji=heart04>\u3000会長も動いてくれたりすると、嬉しい、かもぉ……<emoji=heart04>」"
translation = "「앗앗앗<emoji=heart04> 평소처럼…… <emoji=heart04> 회장님도 움직여 주거나 하면 기쁠지도오…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「マトイ……！」"
translation = "「마토이……!」"

[[dialogue]]
speaker = "unk"
original = "恥ずかしそうに言う彼女に興奮して、俺も下から突き上げるように腰を動かすと――"
translation = "부끄러운 듯 말하는 그녀에게 흥분해서, 나도 아래에서 밀어 올리듯 허리를 움직이자――"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あっ！？\u3000ふあああぁっ<emoji=heart04><emoji=heart04>\u3000すごいっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ、んあぁっ……<emoji=heart04>\u3000これ、これが欲しかったのっ<emoji=heart04>\u3000んっ、はあぁっ……ふああぁっ<emoji=heart04>」"
translation = "「앗!? 후아아아아<emoji=heart04><emoji=heart04> 대단해! <emoji=heart04> 앗<emoji=heart04> 하아아, 응아아…… <emoji=heart04> 이거, 이걸 원했어! <emoji=heart04> 응, 하아아…… 후아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「一緒に動くダブルピストン、気持ちいいっ<emoji=heart04>\u3000あんっ、あんっ<emoji=heart04>\u3000はあぁっ……ふああぁっ<emoji=heart04>\u3000好き<emoji=heart04>\u3000これ、やっぱり好きぃ<emoji=heart04>\u3000あっ、あっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「함께 움직이는 더블 피스톤, 기분 좋아! <emoji=heart04> 앙, 앙<emoji=heart04> 하아아…… 후아아<emoji=heart04> 좋아해<emoji=heart04> 이거, 역시 좋아아<emoji=heart04> 앗, 앗<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「会長、ごめん、ごめんね<emoji=heart04>\u3000あっ、あっ<emoji=heart04>\u3000んああぁっ<emoji=heart04>\u3000でも、２人で動くの、気持ちいいの<emoji=heart04>\u3000あっ、あっ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000はあぁっ……んああぁっ<emoji=heart04>」"
translation = "「회장님, 미안, 미안해<emoji=heart04> 앗, 앗<emoji=heart04> 응아아아<emoji=heart04> 하지만 둘이서 움직이는 거, 기분 좋아<emoji=heart04> 앗, 앗<emoji=heart04> 기분 좋아! <emoji=heart04> 하아아…… 응아아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「謝らなくて大丈夫っ。俺も十分気持ちいいし……マトイにも気持ちよく、なって欲しいからっ。"
translation = "「사과하지 않아도 괜찮아. 나도 충분히 기분 좋고…… 마토이도 기분 좋아졌으면 하니까.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「むしろ、今日はマトイに頑張ってもらったし……何かしてほしいことがあったら、何でも言って」"
translation = "「오히려 오늘은 마토이가 힘써줬고…… 뭔가 하고 싶은 게 있다면 뭐든지 말해줘.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「～～～っ<emoji=heart04><emoji=heart04>\u3000会長っ……<emoji=heart04>」"
translation = "「~~~! <emoji=heart04><emoji=heart04> 회장님…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「じ、じゃあ……その……んんんっ<emoji=heart04>\u3000１つ、お願いしてもいい……？」"
translation = "「저, 저기…… 그게…… 응응응<emoji=heart04> 한 가지 부탁해도 될까……?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あっ<emoji=heart04>\u3000あのね……はぁぁんっ<emoji=heart04>\u3000孕ませエッチとか、して、みたいかもぉ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 저기 말이야…… 하아아앙<emoji=heart04> 임신시키기 섹스 같은 거 해보고 싶을지도오<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あっ、えっとぉ、んんんっ……<emoji=heart04>\u3000あくまでイメージ！\u3000イメージプレイねっ<emoji=heart04>\u3000でも――」"
translation = "「앗, 에또, 응응응…… <emoji=heart04> 어디까지나 이미지! 이미지 플레이야! <emoji=heart04> 하지만――」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あぁんっ<emoji=heart04>\u3000そういう想像、会長に子作りのためのセックス……種付けしてもらえたら、んんんっ<emoji=heart04>\u3000すごく興奮しそうな気がして……ダメかなぁ？<emoji=heart04>」"
translation = "「아앙<emoji=heart04> 그런 상상, 회장님에게 아기를 만들기 위한 섹스…… 씨내리기를 받는다면, 응응응<emoji=heart04> 엄청 흥분될 것 같은 기분이 들어서…… 안 될까? <emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「って、会長っ！？\u3000あっ、あんっ<emoji=heart04>\u3000激しっ……あんっ<emoji=heart04>\u3000ふあああっ<emoji=heart04>」"
translation = "「앗, 회장님!? 앗, 앙<emoji=heart04> 격해…… 앙<emoji=heart04> 후아아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あっ、あんっ<emoji=heart04>\u3000はあぁっ、んうぅっ……あっ<emoji=heart04>\u3000ピストンすごっ……あっ、あんっ<emoji=heart04>\u3000はあぁあっ……いいっ<emoji=heart04>\u3000あっ、んうぅっ……はあぁっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>」"
translation = "「앗, 앙<emoji=heart04> 하아아, 응우우…… 앗<emoji=heart04> 피스톤 대단해…… 앗, 앙<emoji=heart04> 하아아아…… 좋아! <emoji=heart04> 앗, 응우우…… 하아아<emoji=heart04> 후아아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「――普通にそういうこと言っちゃうのは、エッチ過ぎ？\u3000あっ、あんっ<emoji=heart04>\u3000だ、だって……はあぁっ<emoji=heart04>\u3000んあぁっ……<emoji=heart04>」"
translation = "「――평범하게 그런 소리를 해버리는 건 너무 야해? 앗, 앙<emoji=heart04> 하, 하지만…… 하아아<emoji=heart04> 응아아…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「好きな人と沢山エッチしてたら、普通はスケベになっちゃうよぉ<emoji=heart04>\u3000あっ、あん<emoji=heart04>\u3000だって……こんなに気持ち、いいんだもんっ<emoji=heart04>……あっ、あっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>」"
translation = "「좋아하는 사람이랑 잔뜩 섹스하면 보통은 음란해져 버려요오<emoji=heart04> 앗, 앙<emoji=heart04> 그치만…… 이렇게 기분 좋은걸! <emoji=heart04> ……앗, 앗<emoji=heart04> 후아아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺ももう、我慢できない。……孕ませエッチ、全力でしちゃうからな」"
translation = "「나도 이제 못 참겠어. ……임신시키기 섹스, 전력으로 해줄 테니까.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「うんっ<emoji=heart04>\u3000うんっ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000私も頑張って、動くから……会長――」"
translation = "「응! <emoji=heart04> 응! <emoji=heart04><emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 저도 열심히 움직일 테니까…… 회장님――」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「私のこと孕ませるつもりで、会長の子種、いっぱい中出しして欲しいですっ<emoji=heart04>」"
translation = "「저를 임신시킬 생각으로, 회장님의 씨앗, 잔뜩 질내사정 해주세요! <emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「マトイ……！」"
translation = "「마토이……!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あっ――<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗――<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ふあぁぁああぁっ<emoji=heart04>\u3000本気ピストン来たあぁぁっ<emoji=heart04>\u3000あっ、あっ、あっ<emoji=heart04>\u3000はぁぁんっ<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000ふあぁぁんっ<emoji=heart04>」"
translation = "「후아아아아아아<emoji=heart04> 본격적인 피스톤 왔다아아아! <emoji=heart04> 앗, 앗, 앗<emoji=heart04> 하아아앙<emoji=heart04> 아아앗<emoji=heart04> 후아아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あんっ、あんっ、あんっ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000あっ、あっ、あっ<emoji=heart04>\u3000んああぁっ<emoji=heart04>\u3000んっ、ふうぅっ……<emoji=heart04>\u3000はっ、あああっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04>」"
translation = "「앙, 앙, 앙<emoji=heart04> 기분 좋아! <emoji=heart04> 앗, 앗, 앗<emoji=heart04> 응아아아<emoji=heart04> 응, 후우우…… <emoji=heart04> 핫, 아아앗<emoji=heart04> 응아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あっ、あっ、あっ、ふああぁんっ<emoji=heart04>\u3000おち○ちんすごいっ<emoji=heart04>\u3000あっ、あああっ<emoji=heart04>\u3000気持ち良すぎるよぉっ<emoji=heart04>\u3000あんっ、あんっ、あぁぁん<emoji=heart04>\u3000ふわあぁぁんっ<emoji=heart04>」"
translation = "「앗, 앗, 앗, 후아아앙<emoji=heart04> 자지 대단해! <emoji=heart04> 앗, 아아앗<emoji=heart04> 너무 기분 좋아아! <emoji=heart04> 앙, 앙, 아아앙<emoji=heart04> 후아아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「マトイ、好きだ！」"
translation = "「마토이, 좋아해!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「んっ、私もぉ<emoji=heart04>\u3000あっ、あっ、あっ<emoji=heart04>\u3000会長好きっ、大好きぃ<emoji=heart04>\u3000あぁぁんっ<emoji=heart04>\u3000んんんっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「응, 저도요오<emoji=heart04> 앗, 앗, 앗<emoji=heart04> 회장님 좋아, 정말 좋아해애<emoji=heart04> 아아앙<emoji=heart04> 응응응<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あんっ、あんっ、あんっ<emoji=heart04>\u3000おま○こ気持ちいいっ<emoji=heart04>\u3000おま○こ気持ち良過ぎなのぉっ<emoji=heart04>\u3000ああああっ<emoji=heart04>\u3000ふぅぅっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04>」"
translation = "「앙, 앙, 앙<emoji=heart04> 보지 기분 좋아! <emoji=heart04> 보지 너무 기분 좋아아! <emoji=heart04> 아아아앗<emoji=heart04> 후우우<emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺も気持ち良過ぎて、もうイキそうだ……！」"
translation = "「나도 너무 기분 좋아서 이제 갈 것 같아……!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「う、うんっ、出してぇっ<emoji=heart04>\u3000はぁぁぁん<emoji=heart04>\u3000会長の子種、私の中にいっぱいっ<emoji=heart04>」"
translation = "「으, 응, 내보내 줘어! <emoji=heart04> 하아아아앙<emoji=heart04> 회장님의 씨앗, 내 안에 잔뜩! <emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あぁぁん<emoji=heart04>\u3000子種どぴゅどぴゅして、孕ませてぇっ<emoji=heart04>」"
translation = "「앙<emoji=heart04> 앙<emoji=heart04> 아아앙<emoji=heart04> 씨앗 퓨퓨해서 임신시켜줘어! <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マトイが腰の動きをより一層激しくする。"
translation = "마토이가 허리 움직임을 한층 더 격렬하게 한다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「んっ、んっ、んうぅっ<emoji=heart04>\u3000あっ、あっ、あああっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04>\u3000あはぁぁぁん<emoji=heart04>\u3000いいっ<emoji=heart04>\u3000いいよぉ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>\u3000気持ちいいのぉっ<emoji=heart04>」"
translation = "「응, 응, 응우우<emoji=heart04> 앗, 앗, 아아앗<emoji=heart04> 하아아앙<emoji=heart04> 아하아아아앙<emoji=heart04> 좋아! <emoji=heart04> 좋아아<emoji=heart04> 후아아아<emoji=heart04> 기분 좋아아! <emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000ダメっ<emoji=heart04>\u3000イキそう<emoji=heart04>\u3000大きいの来ちゃうっ<emoji=heart04>\u3000はああぁっ<emoji=heart04>\u3000ふあぁぁあんっ<emoji=heart04><emoji=heart04>」"
translation = "「앙<emoji=heart04> 앙<emoji=heart04> 앙<emoji=heart04> 아아앗<emoji=heart04> 안 돼! <emoji=heart04> 갈 것 같아<emoji=heart04> 큰 거 와버려어! <emoji=heart04> 하아아아<emoji=heart04> 후아아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ああああっ<emoji=heart04>\u3000くるっ<emoji=heart04>\u3000気持ちいいっ、きもちぃっ、きもちぃぃっ<emoji=heart04><emoji=heart04>\u3000はあああっ<emoji=heart04>\u3000あっ、あっ、あっ、あっ<emoji=heart04><emoji=heart04>\u3000イクイクイクイクっ<emoji=heart04><emoji=heart04>」"
translation = "「아아아앗<emoji=heart04> 온다! <emoji=heart04> 기분 좋아, 기분 좋아아, 기분 좋아아아! <emoji=heart04><emoji=heart04> 하아아앗<emoji=heart04> 앗, 앗, 앗, 앗<emoji=heart04><emoji=heart04> 가가각가버려! <emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「マトイ、中に出すぞ！」"
translation = "「마토이, 안에 낸다!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「来てっ<emoji=heart04>\u3000出してぇっ！\u3000あっ<emoji=heart04>\u3000ふああああっ<emoji=heart04>\u3000イクっ、イっちゃうっ<emoji=heart04>\u3000イっちゃうぅぅぅ────っ<emoji=heart04><emoji=heart04>」"
translation = "「와줘! <emoji=heart04> 내보내 줘! 앗<emoji=heart04> 후아아아앗<emoji=heart04> 가, 가버려! <emoji=heart04> 가버려어어어어────! <emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ふあぁぁあああぁぁぁーーっ<emoji=heart04><emoji=heart04>\u3000イックうぅぅぅ～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아아아아아아아ーー! <emoji=heart04><emoji=heart04> 가버려어어어어어어～～～～～～～～! <emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は溜まりに溜まった欲望を、彼女の中に解き放った。"
translation = "나는 쌓이고 쌓인 욕망을 그녀의 안에 해방했다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「はあぁぁぁああ～～～っ<emoji=heart04>\u3000会長の子種、子宮まで届いてるぅぅっ<emoji=heart04>\u3000ふわあぁぁ～～っ<emoji=heart04>」"
translation = "「하아아아아아아～～～! <emoji=heart04> 회장님 씨앗, 자궁까지 닿고 있어어어! <emoji=heart04> 후아아아아～～! <emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あっ、あああ～っ<emoji=heart04>\u3000中出し気持ちいいっ<emoji=heart04>\u3000は、ああぁ～～っ<emoji=heart04>」"
translation = "「앗, 아아아～! <emoji=heart04> 질내사정 기분 좋아! <emoji=heart04> 하, 아아아～～! <emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くっ……ヤバい、まだ出る……！」"
translation = "「큭…… 위험해, 아직 나와……!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あっ<emoji=heart04>\u3000会長……<emoji=heart04>\u3000すごぉい<emoji=heart04>\u3000はぁぁんっ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 회장님…… <emoji=heart04> 대단해애<emoji=heart04> 하아아앙…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そして、ようやく射精が止まり――"
translation = "그리고 마침내 사정이 멈추고――"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あっ……おち○ちん抜けちゃう……<emoji=heart04>\u3000んんっ<emoji=heart04>」"
translation = "「앗…… 자지 빠져버려…… <emoji=heart04> 응으<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「はぁ……はぁ……はぁぁ<emoji=heart04>\u3000はふぅぅ、今までのエッチで１番気持ち良かったかも……<emoji=heart04>」"
translation = "「하아…… 하아…… 하아아<emoji=heart04> 하후우우, 지금까지 했던 섹스 중에 제일 기분 좋았을지도…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺も。すごく興奮した……」"
translation = "「나도. 정말 흥분했어……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「はあぁ……んん<emoji=heart04>\u3000お腹の中、会長でいっぱいになってて……温かくて幸せ<emoji=heart04>」"
translation = "「하아아…… 응응<emoji=heart04> 배 속이 회장님으로 가득 차서…… 따뜻하고 행복해<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……マトイ、その台詞は俺に効く」"
translation = "「……마토이, 그 대사는 나한테 치명적이야」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「マトイは普通にエッチ過ぎる」"
translation = "「마토이는 평범하게 너무 야해」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そ、そうかな……？」"
translation = "「그, 그럴까……?」"

[[dialogue]]
speaker = "unk"
original = "だって、孕ませプレイとかしちゃうのは、それはつまり……俺と将来、結婚するのが嫌じゃないということで。"
translation = "그야 임신시키기 플레이 같은 걸 하는 건, 그건 즉…… 나랑 나중에 결혼하는 게 싫지 않다는 뜻이니까."

[[dialogue]]
speaker = "unk"
original = "それを説明すると――"
translation = "그것을 설명하자――"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あ……エッチ中のテンションで色々言っちゃったけど……冷静に考えると……た、確かに……」"
translation = "「아…… 섹스 중의 텐션으로 여러 가지 말해버렸지만…… 냉정하게 생각하면…… 하, 확실히……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ご、ごめんね。なんか私だけ、将来の妄想とか、恥ずかしいのダダ漏れで……っ」"
translation = "「미, 미안해. 왠지 나만 미래의 망상 같은 거, 부끄러운 게 다 새어 나와서……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……今はイメージだったとしても」"
translation = "「……지금은 이미지라고 해도」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「もし本当にできちゃった時は……ちゃんと責任取るから」"
translation = "「만약 정말로 생겨버렸을 때는…… 제대로 책임질 테니까」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「……！\u3000そ、それって……」"
translation = "「……! 그, 그건……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「えへへぇ<emoji=heart04>\u3000ありがとう、会長<emoji=heart04>」"
translation = "「에헤헤에<emoji=heart04> 고마워요, 회장님<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マトイはそう言うと、俺の唇にキスをして──"
translation = "마토이는 그렇게 말하며 내 입술에 키스를 하고──"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「んっ<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000……大好きだよ、会長<emoji=heart04>」"
translation = "「응<emoji=heart04> 츄<emoji=heart04> ……사랑해요, 회장님<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「――あっ、でも……」"
translation = "「――앗, 하지만……」"

[[dialogue]]
speaker = "unk"
original = "ふと、彼女は思い出したように言う。"
translation = "문득 그녀는 생각난 듯이 말한다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「最初に言ってた、私が気持ち良くするっていうのは失敗しちゃったから、次はもっと頑張るね<emoji=heart04>」"
translation = "「처음에 말했던, 제가 기분 좋게 해주겠다는 건 실패해 버렸으니까, 다음엔 더 열심히 할게요<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「いっぱい気持ちよくしてもらっちゃったし…………んんっ<emoji=heart04>」"
translation = "「잔뜩 기분 좋게 받아버렸고………… 응으<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その後、マトイは愛おしそうに、俺にいっぱい奉仕してくれるのだった――"
translation = "그 후, 마토이는 사랑스럽다는 듯이 나에게 잔뜩 봉사해 주는 것이었다――"

