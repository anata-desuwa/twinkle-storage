[[dialogue]]
speaker = "unk"
original = "第１２話,立ちはだかる壁,B"
translation = "제12화, 가로막는 벽, B"

[[dialogue]]
speaker = "unk"
original = "──そして、その日以降。"
translation = "──그리고, 그날 이후."

[[dialogue]]
speaker = "unk"
original = "打倒ヴィーナスを掲げた俺の特訓は、がぜん激しさを増すこととなった。"
translation = "타도 비너스를 내건 나의 특훈은, 한층 더 격렬해지게 되었다."

[[dialogue]]
speaker = "クロト"
original = "「はぁ、はぁ……測定結果は５７秒、か」"
translation = "「하아, 하아…… 측정 결과는 57초, 인가」"

[[dialogue]]
speaker = "クロト"
original = "「よし。これでＡランクに挑戦できるようになったぞ」"
translation = "「좋아. 이걸로 A랭크에 도전할 수 있게 됐어」"

[[dialogue]]
speaker = "マトイ"
original = "「緋宮くん、すごい成長速度！\u3000もう普通の生徒と比べても全然強いよ」"
translation = "「히노미야 군, 굉장한 성장 속도! 벌써 일반 학생들과 비교해도 훨씬 강해」"

[[dialogue]]
speaker = "マトイ"
original = "「ただ、今回の場合は目標が目標なんだけど……」"
translation = "「다만, 이번 경우는 목표가 목표라서 그렇지만……」"

[[dialogue]]
speaker = "アナ"
original = "「ハードルが果てしなく高すぎですね。せめてプリマステラくらいなら、目指すにも現実味があるのですが」"
translation = "「넘어야 할 벽이 끝없이 높네요. 적어도 프리마 스텔라 정도라면, 목표로 삼기에도 현실성이 있을 텐데요」"

[[dialogue]]
speaker = "クロト"
original = "「大丈夫。まだ時間はある」"
translation = "「괜찮아. 아직 시간은 있어」"

[[dialogue]]
speaker = "unk"
original = "大丈夫でないとすれば、むしろこれからか。"
translation = "괜찮지 않다고 한다면, 오히려 지금부터일까."

[[dialogue]]
speaker = "unk"
original = "なぜならこれは朝練──今日はまだまだ授業が控えているのだ。"
translation = "왜냐하면 이것은 아침 훈련── 오늘은 아직 수업이 남아 있기 때문이다."

[[dialogue]]
speaker = "トワ先生"
original = "「と、ゆうわけでぇ──今日の授業は一旦ここまで♪」"
translation = "「자, 그리하여── 오늘 수업은 일단 여기까지♪」"

[[dialogue]]
speaker = "トワ先生"
original = "「それじゃ、今から抜き打ち小テストをしまーす。文句は言わせませーんっ」"
translation = "「그럼, 지금부터 깜짝 쪽지 시험을 보겠어요ー. 불만은 받지 않겠어요읏」"

[[dialogue]]
speaker = "クラスの女子Ａ"
original = "「えーっ！」"
translation = "「에ー엣!」"

[[dialogue]]
speaker = "クラスの女子Ｂ"
original = "「ぶーぶー。鬼ー！」"
translation = "「부우부우. 악마야ー!」"

[[dialogue]]
speaker = "アナ"
original = "「特訓、放課後の部──開始！」"
translation = "「특훈, 방과 후 부── 시작!」"

[[dialogue]]
speaker = "サーシャ"
original = "「今日はお姉さんも応援するわよ～」"
translation = "「오늘은 언니도 응원해 줄게～」"

[[dialogue]]
speaker = "マトイ"
original = "「サーシャさん、なら本を読んでないで手伝ってください……」"
translation = "「사샤 씨, 그럼 책 읽지 말고 도와주세요……」"

[[dialogue]]
speaker = "unk"
original = "──明くる日も明くる日も、鍛錬と授業の繰り返し。"
translation = "──다음 날도 다음 날도, 단련과 수업의 반복."

[[dialogue]]
speaker = "unk"
original = "周囲のみんなの協力もあって、俺は見違えるように実力をつけてきたものの……"
translation = "주변 모두의 협력도 있어서, 나는 몰라보게 실력을 키웠지만……"

[[dialogue]]
speaker = "ダークキングフワッチ"
original = "「イイイイイッ……！！」"
translation = "「크으으으으읏……!!」"

[[dialogue]]
speaker = "アナ"
original = "「制限時間オーバー……チャレンジ失敗です」"
translation = "「제한 시간 초과…… 도전 실패입니다」"

[[dialogue]]
speaker = "クロト"
original = "「はあ、はあ……くそ。あと少しで倒せそうだったのに」"
translation = "「하아, 하아…… 젠장. 조금만 더 하면 쓰러뜨릴 수 있었는데」"

[[dialogue]]
speaker = "unk"
original = "ようやくたどり着いたＳランクモンスターへの挑戦権。"
translation = "겨우 도달한 S랭크 몬스터에게의 도전권."

[[dialogue]]
speaker = "unk"
original = "しかしその相手は厳しく、２人のサポートを受けてもクリアさえままならない状況が続いていた。"
translation = "하지만 그 상대는 만만치 않아, 두 사람의 서포트를 받아도 클리어조차 쉽지 않은 상황이 계속되고 있었다."

[[dialogue]]
speaker = "クロト"
original = "「ヴィーナスはこれを１０秒か……とんでもないな。改めて」"
translation = "「비너스는 이걸 10초라…… 새삼스레 엄청나네.」"

[[dialogue]]
speaker = "アナ"
original = "「普通、最初に掲げる目標じゃない。会長だって一朝一夕でああなったわけじゃないだろうし」"
translation = "「보통, 처음에 내거는 목표가 아니죠. 회장도 하루아침에 그렇게 된 건 아닐 테고」"

[[dialogue]]
speaker = "マトイ"
original = "「や……やっぱ無理かな……なんとか会長を説得して、退学だけはやめてもらうとか……」"
translation = "「아…… 역시 무리일까…… 어떻게든 회장을 설득해서, 퇴학만은 면하게 한다든가……」"

[[dialogue]]
speaker = "クロト"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "何度も続く失敗に、諦めムードがただよい始める。"
translation = "몇 번이고 계속되는 실패에, 포기하는 분위기가 감돌기 시작한다."

[[dialogue]]
speaker = "unk"
original = "けど──"
translation = "하지만──"

[[dialogue]]
speaker = "クロト"
original = "「いや……悪い、２人とも。俺は──まだ挑戦を続けるよ」"
translation = "「아니…… 미안, 두 사람 다. 나는── 아직 도전을 계속할 거야」"

[[dialogue]]
speaker = "マトイ"
original = "「緋宮くん……」"
translation = "「히노미야 군……」"

[[dialogue]]
speaker = "アナ"
original = "「付き合うと言った手前、構いませんが。気にはなります」"
translation = "「함께하겠다고 말한 이상, 상관없습니다만. 신경이 쓰입니다」"

[[dialogue]]
speaker = "アナ"
original = "「次期会長はどうしてそこまで──律儀に勝負を受けようとするのですか？」"
translation = "「차기 회장님은 왜 그렇게까지── 융통성 있게 승부를 받아들이려고 하는 건가요?」"

[[dialogue]]
speaker = "クロト"
original = "「それは……」"
translation = "「그건……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "『緋宮クロト──あなたは私と戦って勝ち、その真の力をみんなに知らしめるのよ！』"
translation = "『히노미야 쿠로토── 당신은 나와 싸워 이기고, 그 진정한 힘을 모두에게 알리는 거예요!』"

[[dialogue]]
speaker = "unk"
original = "無茶振り……と言って差し支えない、ヴィーナスの宣言。"
translation = "억지……라고 해도 무방할, 비너스의 선언."

[[dialogue]]
speaker = "unk"
original = "俺はそれを二つ返事で了承した。それがなぜかと問われれば……"
translation = "나는 그것을 두말없이 승낙했다. 그것이 왜냐고 묻는다면……"

[[dialogue]]
speaker = "クロト"
original = "「……わからない。今のところは、なんとなくとしか言えない」"
translation = "「……모르겠어. 지금으로서는, 그냥 그렇다고밖에 말할 수 없어」"

[[dialogue]]
speaker = "マトイ"
original = "「がくっ。そ、そんなんで決めちゃっていいの！？」"
translation = "「털썩. 그, 그런 걸로 결정해도 되는 거야!?」"

[[dialogue]]
speaker = "クロト"
original = "「理由はある気がするけど、うまく言語化できないんだ。そうだな」"
translation = "「이유는 있는 것 같지만, 제대로 말로 표현할 수가 없어. 그러니까」"

[[dialogue]]
speaker = "クロト"
original = "「俺はこんな体質だから、大きな声じゃ言えないけど……昔から街中で何度もモンスターと戦うような目に遭ってきた」"
translation = "「나는 이런 체질이라, 큰 소리로는 말할 수 없지만…… 예전부터 길거리에서 몇 번이나 몬스터와 싸우는 일을 겪어 왔어」"

[[dialogue]]
speaker = "クロト"
original = "「同じように、力を持たない一般人が襲われている現場だって何度も見てきた。その度にできる限りのことはしてきた」"
translation = "「마찬가지로, 힘을 가지지 못한 일반인이 습격당하는 현장도 몇 번이나 봐 왔어. 그때마다 할 수 있는 한의 일은 해 왔고」"

[[dialogue]]
speaker = "アナ"
original = "「……星騎士めいた経験はあったわけですね」"
translation = "「……성기사 같은 경험은 있었던 거네요」"

[[dialogue]]
speaker = "unk"
original = "俺とモンスターの戦いは星騎士のみんなみたいにスマートじゃない、泥臭いやり合いが多かったけど。"
translation = "나와 몬스터의 싸움은 성기사 모두처럼 스마트하지 않고, 진흙탕 싸움이 많았지만."

[[dialogue]]
speaker = "unk"
original = "それでも──"
translation = "그래도──"

[[dialogue]]
speaker = "クロト"
original = "「ああ。だから……挑まれてるなら受けて立つのが自然かなって思った。それだけだ」"
translation = "「아아. 그러니까…… 도전을 받았으니 응하는 것이 자연스럽다고 생각했어. 그뿐이야」"

[[dialogue]]
speaker = "アナ"
original = "「ふむ。次期会長も中々のお馬鹿さんですね」"
translation = "「흠. 차기 회장님도 꽤나 바보시네요」"

[[dialogue]]
speaker = "unk"
original = "その理由に間違いはない。ただ、どこか自分でも芯を捉えていない気がしていた。"
translation = "그 이유에 틀림은 없다. 다만, 어딘가 나 자신도 핵심을 잡지 못하고 있다는 생각이 들었다."

[[dialogue]]
speaker = "unk"
original = "もし、この試合の相手がヴィーナスでなかったとしたら──"
translation = "만약, 이 시합의 상대가 비너스가 아니었다면──"

[[dialogue]]
speaker = "unk"
original = "俺は同じように受けていたのだろうか……？"
translation = "나는 똑같이 받아들였을까……?"

[[dialogue]]
speaker = "アナ"
original = "「いずれにせよ──退かないのであれば鍛える以外に道はありません。まだ、いけますか？」"
translation = "「어쨌든── 물러서지 않는다면 단련하는 것 외에는 길이 없습니다. 아직, 괜찮으신가요?」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、もちろんだ」"
translation = "「아아, 물론이지」"

[[dialogue]]
speaker = "unk"
original = "バトルモードが立ち上がり、ランクの選択画面へ移る。"
translation = "배틀 모드가 시작되고, 랭크 선택 화면으로 넘어간다."

[[dialogue]]
speaker = "unk"
original = "もちろん、選ぶのは最高級のＳ──"
translation = "물론, 선택하는 것은 최고급의 S──"

[[dialogue]]
speaker = "サーシャ"
original = "「ハーイやってる～？\u3000応援に来たわよ～」"
translation = "「하ー이 하고 있니～? 응원하러 왔어～」"

[[dialogue]]
speaker = "クロト"
original = "「サーシャさん……！？」"
translation = "「사샤 씨……!?」"

[[dialogue]]
speaker = "アナ"
original = "「もう夜も遅いのに。まだ学校に残っていたんですか」"
translation = "「벌써 밤도 늦었는데. 아직 학교에 남아 계셨습니까」"

[[dialogue]]
speaker = "サーシャ"
original = "「それはこっちのセリフよ～アナちゃん。もう日付も変わりそうだし、余裕で門限破ってるからね～？」"
translation = "「그건 내가 할 말이야～ 아나짱. 벌써 날짜도 바뀔 것 같고, 여유롭게 통금 시간 어기고 있으니까～?」"

[[dialogue]]
speaker = "サーシャ"
original = "「あら、もうＳランクモンスターを相手にしてるのね。すごいわ、クロトくん」"
translation = "「어머, 벌써 S랭크 몬스터를 상대하고 있네. 대단하다, 쿠로토 군」"

[[dialogue]]
speaker = "クロト"
original = "「ありがとうございます。ですが、先行きはなかなか見えず……」"
translation = "「감사합니다. 하지만, 앞길은 좀처럼 보이지 않고……」"

[[dialogue]]
speaker = "サーシャ"
original = "「ふふふ。それなら、私がサポートに入ってあげましょうか？」"
translation = "「후후후. 그렇다면, 제가 서포트에 들어가 드릴까요?」"

[[dialogue]]
speaker = "マトイ"
original = "「！\u3000サーシャさんの援護なら、確かにクリアできるかも……」"
translation = "「! 사샤 씨의 원호라면, 확실히 클리어할 수 있을지도……」"

[[dialogue]]
speaker = "クロト"
original = "「……いや」"
translation = "「……아니」"

[[dialogue]]
speaker = "unk"
original = "俺の目標はあくまでＳランクをクリアすることじゃない。ヴィーナスに勝つことなんだ。"
translation = "나의 목표는 어디까지나 S랭크를 클리어하는 것이 아니다. 비너스에게 이기는 것이다."

[[dialogue]]
speaker = "unk"
original = "なら……"
translation = "그렇다면……"

[[dialogue]]
speaker = "クロト"
original = "「──アナ。バトルの時間制限を『１０秒』に設定できるか？」"
translation = "「──아나. 배틀의 시간 제한을 『10초』로 설정할 수 있어?」"

[[dialogue]]
speaker = "アナ"
original = "「え。できますけど……」"
translation = "「예. 할 수 있습니다만……」"

[[dialogue]]
speaker = "マトイ"
original = "「それって……」"
translation = "「그건……」"

[[dialogue]]
speaker = "サーシャ"
original = "「ふふ。本気でヴィーナスちゃんの記録を破る気なのね──面白いじゃない♪」"
translation = "「후후. 진심으로 비너스짱의 기록을 깨려는 거네── 재미있잖아♪」"

[[dialogue]]
speaker = "unk"
original = "出現する最強クラスの仮想モンスター。"
translation = "출현하는 최강 클래스의 가상 몬스터."

[[dialogue]]
speaker = "unk"
original = "せめてこいつを彼女と同じレベルに倒せないと、戦って勝つどころじゃない……！"
translation = "적어도 이 녀석을 그녀와 같은 수준으로 쓰러뜨리지 못하면, 싸워서 이기는 건 고사하고……!"

[[dialogue]]
speaker = "クロト"
original = "「行くぞ──みんなもサポートを頼む」"
translation = "「간다── 모두도 서포트를 부탁해」"

[[dialogue]]
speaker = "アナ"
original = "「了解」"
translation = "「알겠습니다」"

[[dialogue]]
speaker = "マトイ"
original = "「頑張ってね、緋宮くん！」"
translation = "「힘내, 히노미야 군!」"

[[dialogue]]
speaker = "サーシャ"
original = "「ふふふ、教え甲斐がありそうだわ」"
translation = "「후후후, 가르칠 보람이 있을 것 같네」"

