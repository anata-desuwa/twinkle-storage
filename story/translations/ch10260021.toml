[[dialogue]]
speaker = "unk"
original = "第１話,２度目の告白,P"
translation = "제1화, 두 번째 고백, P"

[[dialogue]]
speaker = "unk"
original = "それは、リクリエとの戦いに１つの区切りがついた後――"
translation = "그것은, 리크리에와의 싸움에 일단락이 난 뒤――"

[[dialogue]]
speaker = "unk"
original = "放課後の夕暮れ時、俺はリーリアから改めて話があると、空き教室に呼び出しを受けていた。"
translation = "방과 후 해 질 녘, 나는 리리아로부터 다시 할 말이 있다는 호출을 받고 빈 교실로 향했다."

[[dialogue]]
speaker = "リーリア"
original = "「セ～ンパイ♪」"
translation = "「선～배♪」"

[[dialogue]]
speaker = "リーリア"
original = "「お待たせマジカル☆\u3000可愛い後輩のお願いを聞いてくれて、ありがとうございます♪」"
translation = "「기다리게 해서 매지컬☆ 귀여운 후배의 부탁을 들어주셔서 감사합니다♪」"

[[dialogue]]
speaker = "unk"
original = "改まって、今日はどうしたんだ？"
translation = "새삼스럽게, 오늘은 무슨 일이야?"

[[dialogue]]
speaker = "リーリア"
original = "「えっと……ほら、私たちって彼氏彼女のお付き合いをしていたじゃないですか」"
translation = "「저기…… 봐요, 저희 남자친구 여자친구로 사귀고 있었잖아요.」"

[[dialogue]]
speaker = "unk"
original = "そう、俺とリーリアは学園生活を通して、恋人同士となっていた――"
translation = "그래, 나와 리리아는 학원 생활을 통해 연인 사이가 되었다――"

[[dialogue]]
speaker = "unk"
original = "俺から彼女に告白した際も、場所はこの空き教室だった。"
translation = "내가 그녀에게 고백했을 때도, 장소는 이 빈 교실이었다."

[[dialogue]]
speaker = "リーリア"
original = "「センパ～イ、こんなところに可愛い後輩を呼び出して、ひょっとして告白でもしちゃう気ですか～？\u3000――なんちゃって☆」"
translation = "「선～배, 이런 곳에 귀여운 후배를 불러내고, 설마 고백이라도 할 생각인가요～? ――농담이에요☆」"

[[dialogue]]
speaker = "unk"
original = "リーリア、好きだ。俺と付き合って欲しい"
translation = "리리아, 좋아해. 나랑 사귀어 줘."

[[dialogue]]
speaker = "リーリア"
original = "「ふふっ、そうですか～。やっぱり～……って、え？」"
translation = "「후훗, 그런가요～. 역시～…… 어, 네?」"

[[dialogue]]
speaker = "リーリア"
original = "「ち、ちょっと待って下さい。いきなり何ですかセンパイ！？\u3000何かのドッキリですか！？」"
translation = "「자, 잠깐만요. 갑자기 무슨 소리예요 선배!? 무슨 몰래카메라 같은 건가요!?」"

[[dialogue]]
speaker = "unk"
original = "マジです"
translation = "진심이야."

[[dialogue]]
speaker = "リーリア"
original = "「な、なんで……」"
translation = "「어, 어째서……」"

[[dialogue]]
speaker = "unk"
original = "俺は、リーリアは可愛いし、一緒にいると楽しいからだと伝える。"
translation = "나는 리리아가 귀엽고, 같이 있으면 즐겁기 때문이라고 전한다."

[[dialogue]]
speaker = "unk"
original = "リーリアは……どうかな？"
translation = "리리아는…… 어때?"

[[dialogue]]
speaker = "リーリア"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "リーリア"
original = "「……わ、私も……センパイと一緒にいると楽しいです」"
translation = "「……저, 저도…… 선배랑 같이 있으면 즐거워요.」"

[[dialogue]]
speaker = "リーリア"
original = "「だから……その……」"
translation = "「그러니까…… 그……」"

[[dialogue]]
speaker = "リーリア"
original = "「私でよければ……よ、よろしくお願いします……」"
translation = "「저라도 괜찮다면…… 자, 잘 부탁드려요……」"

[[dialogue]]
speaker = "unk"
original = "そうして、彼女は俺の告白を受け入れてくれたのだった――"
translation = "그렇게 그녀는 나의 고백을 받아주었던 것이었다――"

[[dialogue]]
speaker = "リーリア"
original = "「でも……」"
translation = "「하지만……」"

[[dialogue]]
speaker = "リーリア"
original = "「私、あれから１度、ネビュラの魔女としてセンパイと戦っちゃったりして、なんか恋人を裏切る形になっちゃったじゃないですか」"
translation = "「저, 그때 이후로 한 번, 네뷸라의 마녀로서 선배랑 싸우기도 했고, 왠지 연인을 배신한 꼴이 되어버렸잖아요.」"

[[dialogue]]
speaker = "unk"
original = "彼女の正体は『魔女』だ。"
translation = "그녀의 정체는 『마녀』다."

[[dialogue]]
speaker = "unk"
original = "俺たち星騎士の行動を監視する為、ネビュラから新星学園へと送り込まれていたスパイ――それがリーリアだった。"
translation = "우리 성기사의 행동을 감시하기 위해, 네뷸라에서 신성 학원으로 보내진 스파이―― 그것이 리리아였다."

[[dialogue]]
speaker = "unk"
original = "そして彼女は、アポロやギエルとの戦いの前、ネビュラの魔女として俺たちを止めようと立ちはだかった。"
translation = "그리고 그녀는 아폴로나 기엘과의 싸움 전, 네뷸라의 마녀로서 우리를 막아서기 위해 앞을 가로막았다."

[[dialogue]]
speaker = "unk"
original = "俺は気にしてないよ。というか――"
translation = "난 신경 안 써. 그보다――"

[[dialogue]]
speaker = "リーリア"
original = "「――薄々は、私の正体がネビュラの魔女なんじゃないかって、気づいてた……？」"
translation = "「――어렴풋이는, 제 정체가 네뷸라의 마녀가 아닐까 하고, 눈치채고 있었나요……?」"

[[dialogue]]
speaker = "リーリア"
original = "「……はい。私も何となくわかってました。センパイは優しいから……私が秘密を抱えていても、それをスルーして受け入れてくれてるんだってことは」"
translation = "「……네. 저도 왠지 알고 있었어요. 선배는 다정하니까…… 제가 비밀을 품고 있어도, 그걸 모르는 척 받아주고 있다는 걸요.」"

[[dialogue]]
speaker = "リーリア"
original = "「私が敵対して、しれっと学園に戻ってきた後も、センパイは何事もなかったように、私と恋人として付き合い続けてくれています。ただ――」"
translation = "「제가 적대하고 나서 뻔뻔하게 학원으로 돌아온 뒤에도, 선배는 아무 일도 없었다는 듯이 저와 연인으로서 계속 사귀어 주고 계세요. 다만――」"

[[dialogue]]
speaker = "リーリア"
original = "「あやふやにしたままじゃ、私が嫌なんです」"
translation = "「애매하게 둔 채로는 제가 싫어요.」"

[[dialogue]]
speaker = "リーリア"
original = "「私はこれから、嘘偽りなく、センパイとの関係を続けていきたい。だから――」"
translation = "「저는 앞으로, 거짓 없이 선배와의 관계를 이어가고 싶어요. 그러니까――」"

[[dialogue]]
speaker = "unk"
original = "リーリアは一呼吸おいて、俺の目を見て告げた。"
translation = "리리아는 한 호흡 가다듬고, 내 눈을 보며 말했다."

[[dialogue]]
speaker = "リーリア"
original = "「今度こそ、私を――センパイの本当の彼女にしてください」"
translation = "「이번에야말로 저를―― 선배의 진짜 여자친구로 삼아주세요.」"

[[dialogue]]
speaker = "unk"
original = "俺たちと敵対した時のように、真剣で、ちょっと不安に揺れる瞳。"
translation = "우리와 적대했을 때처럼, 진지하고, 조금 불안하게 흔들리는 눈동자."

[[dialogue]]
speaker = "unk"
original = "俺はそんな彼女の頬に触れて――"
translation = "나는 그런 그녀의 뺨을 만지며――"

[[dialogue]]
speaker = "unk"
original = "リーリアは俺の本当の彼女だ"
translation = "리리아는 내 진짜 여자친구야."

[[dialogue]]
speaker = "unk"
original = "大丈夫。これまでも、これからもずっと――"
translation = "괜찮아. 지금까지도, 앞으로도 계속――"

[[dialogue]]
speaker = "リーリア"
original = "「センパイ……あっ……<emoji=heart04>」"
translation = "「선배…… 앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はリーリアにそっと、キスをする。"
translation = "나는 리리아에게 살며시 키스를 한다."

[[dialogue]]
speaker = "リーリア"
original = "「ん……<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 츄……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「はあぁ……<emoji=heart04>\u3000センパイ……<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 선배……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「大好きです……<emoji=heart04>」"
translation = "「정말 좋아해요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺もだ。好きだよ、リーリア"
translation = "나도야. 좋아해, 리리아."

[[dialogue]]
speaker = "リーリア"
original = "「んっ……<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 츄……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それからも、俺たちは２度目の告白の甘い余韻に浸り続けるのだった――"
translation = "그 뒤로도 우리는 두 번째 고백의 달콤한 여운에 계속 젖어 있었다――"

[[dialogue]]
speaker = "unk"
original = "そうして気づけば、外はすっかり暗くなっていた。"
translation = "그러다 정신을 차려보니 밖은 완전히 어두워져 있었다."

[[dialogue]]
speaker = "リーリア"
original = "「夢中でいっぱいしちゃいましたね……センパイ<emoji=heart04>」"
translation = "「정신없이 잔뜩 해버렸네요…… 선배<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "空き教室の片隅に座って寄り添いながら、リーリアは俺の肩に頭を乗せている。"
translation = "빈 교실 한구석에 나란히 앉아, 리리아는 내 어깨에 머리를 기대고 있다."

[[dialogue]]
speaker = "unk"
original = "実は、リーリアに聞きたいことがあったんだ"
translation = "사실, 리리아에게 묻고 싶은 게 있었어."

[[dialogue]]
speaker = "リーリア"
original = "「？\u3000はい、何でしょう？」"
translation = "「? 네, 뭔가요?」"

[[dialogue]]
speaker = "unk"
original = "リクリエとの決戦前、リーリアが俺たちを止める為に立ちはだかった時。あの場でリーリアが言っていたこと――"
translation = "리크리에와의 결전 전, 리리아가 우리를 막기 위해 가로막았을 때. 그 자리에서 리리아가 했던 말――"

[[dialogue]]
speaker = "リーリア"
original = "「私は星騎士じゃないから、人間界とか、三界の平穏みたいなのって、実はいうほど興味ないんだ。うん。だから本当にごめん」"
translation = "「나는 성기사가 아니니까, 인간계라든가 삼계의 평온 같은 거, 사실 말하는 것만큼 흥미 없어. 응. 그러니까 정말 미안.」"

[[dialogue]]
speaker = "unk"
original = "あれも、嘘だったんじゃないかなって"
translation = "그것도 거짓말이었던 게 아닐까 해서."

[[dialogue]]
speaker = "リーリア"
original = "「嘘……ってことはないですよ。あはは、私、悪い子なんで。センパイや友達のみんな以外、本当にそこまで大事には思っていません」"
translation = "「거짓말……까진 아니에요. 아하하, 저, 나쁜 아이라서요. 선배나 친구들 말고는 정말 그 정도로 소중하게 생각하지 않거든요.」"

[[dialogue]]
speaker = "リーリア"
original = "「頑張ってどうにかなるなら、みんな幸せハッピーエンドがいいですけど、そういうケースばっかりじゃないと思うんです」"
translation = "「노력해서 어떻게든 된다면 모두가 행복한 해피엔딩이 좋겠지만, 그런 케이스만 있는 건 아니라고 생각해요.」"

[[dialogue]]
speaker = "リーリア"
original = "「露悪的だったというか、わざとらしかったと言われれば……はい、そうですね。私も悪役令嬢としての修行が足りないかもしれません」"
translation = "「악역인 척했다기보다, 부자연스러웠다고 하신다면…… 네, 그렇네요. 저도 악역 영애로서의 수행이 부족할지도 모르겠어요.」"

[[dialogue]]
speaker = "リーリア"
original = "「あの時は、ああやって自分に発破をかけないと……センパイやアナちゃんを突き放さないと、銃を向ける覚悟ができなかったから」"
translation = "「그때는 그렇게 스스로를 다그치지 않으면…… 선배나 아나 짱을 밀어내지 않으면, 총을 겨눌 각오를 할 수 없었으니까요.」"

[[dialogue]]
speaker = "リーリア"
original = "「人間界のこと、好きですよ。学園に来て、友達ができて、センパイと出会って、魔女の森にいた頃よりずっと楽しくて……大切な場所であることは間違いありません」"
translation = "「인간계, 좋아해요. 학원에 와서 친구가 생기고, 선배를 만나고, 마녀의 숲에 있을 때보다 훨씬 즐겁고…… 소중한 장소인 건 틀림없어요.」"

[[dialogue]]
speaker = "リーリア"
original = "「本当はあの時も、センパイたちと一緒に人間界を守りたかった。でも……私は結局、ネビュラの魔女としての使命も捨て切れませんでした」"
translation = "「사실 그때도 선배들과 함께 인간계를 지키고 싶었어요. 하지만…… 저는 결국 네뷸라의 마녀로서의 사명도 다 버리지 못했거든요.」"

[[dialogue]]
speaker = "unk"
original = "申し訳なさそうに言う彼女の頭を、俺はそっと撫でる。"
translation = "미안한 듯 말하는 그녀의 머리를 나는 살며시 쓰다듬는다."

[[dialogue]]
speaker = "unk"
original = "なら、これからは一緒に守ろう"
translation = "그럼, 이제부터는 함께 지키자."

[[dialogue]]
speaker = "リーリア"
original = "「……！\u3000センパイ……」"
translation = "「……! 선배……」"

[[dialogue]]
speaker = "unk"
original = "嘘偽りなく、って決めたんだろ？"
translation = "거짓 없이, 라고 정했잖아?"

[[dialogue]]
speaker = "リーリア"
original = "「……はい。私、これからはセンパイのそばで、一緒に戦います」"
translation = "「……네. 저, 이제부터는 선배 곁에서 함께 싸울게요.」"

[[dialogue]]
speaker = "リーリア"
original = "「より一層ウィンウィンな関係――可愛い後輩彼女として！」"
translation = "「한층 더 윈윈인 관계―― 귀여운 후배 여자친구로서요!」"

[[dialogue]]
speaker = "リーリア"
original = "「えへへ♪」"
translation = "「에헤헤♪」"

[[dialogue]]
speaker = "unk"
original = "そう言って、彼女は俺と手を恋人繋ぎにしながら、明るく微笑むのだった。"
translation = "그렇게 말하며 그녀는 나와 손을 연인끼리 맞잡고 밝게 미소 짓는 것이었다."

