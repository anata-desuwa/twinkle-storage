[[dialogue]]
speaker = "unk"
original = "ある日の放課後。俺は星徒会の書類仕事で、夜遅くまで残業することになってしまっていた――"
translation = "어느 날 방과 후. 나는 성도회 서류 작업 때문에 밤늦게까지 잔업을 하게 되었다――"

[[dialogue]]
speaker = "フェニエル（覚醒）"
original = "「会長さん、今日も星徒会のお仕事、お疲れ様でした」"
translation = "「회장군, 오늘도 성도회 일 수고하셨습니다」"

[[dialogue]]
speaker = "unk"
original = "なんとか一区切りがつき、ソファーで休憩していると、手伝ってくれていた恋人のフニが、近くにやって来る。"
translation = "간신히 일단락 짓고 소파에서 휴식하고 있자, 도와주고 있던 연인 후니가 가까이 다가온다."

[[dialogue]]
speaker = "クロト"
original = "「ありがとう。フニが手伝ってくれたおかげで、なんとか終わったよ」"
translation = "「고마워. 후니가 도와준 덕분에, 겨우 끝났어」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
original = "「いえ、私は会長さんの専属メイドですから♪\u3000えへへっ」"
translation = "「아닙니다, 저는 회장군의 전속 메이드니까요♪ 에헤헷」"

[[dialogue]]
speaker = "クロト"
original = "「なら……メイドさんに１つお願いしてもいいかな？」"
translation = "「그럼…… 메이드에게 하나 부탁해도 될까?」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
original = "「はい♪\u3000なんでも仰って下さい」"
translation = "「네♪ 뭐든지 말씀해 주세요」"

[[dialogue]]
speaker = "クロト"
original = "「じゃあ――」"
translation = "「그럼――」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
original = "「あっ……ふふっ」"
translation = "「앗…… 후훗」"

[[dialogue]]
speaker = "unk"
original = "俺が耳元で小さくお願いを口にすると、彼女は微笑んで。"
translation = "내가 귓가에 작게 부탁을 속삭이자, 그녀는 미소 지었다."

[[dialogue]]
speaker = "フェニエル（覚醒）"
original = "「かしこまりました。疲れを癒す、マッサージですね♪」"
translation = "「알겠습니다. 피로를 풀어주는, 마사지군요♪」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
original = "「では、ご奉仕させて頂きますね――<b>ご主人様</b><emoji=heart04>」"
translation = "「그럼, 봉사해 드리겠습니다―― <b>주인님</b><emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
original = "「んっ……<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 쪽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "フニの柔らかな唇が、<ruby>啄<rt>ついば</rt></ruby>むように俺の唇に触れて……お互いの舌を入れて絡め合う。"
translation = "후니의 부드러운 입술이, 쪼아 먹듯이 내 입술에 닿고…… 서로의 혀를 넣어 얽히게 한다."

[[dialogue]]
speaker = "フェニエル（覚醒）"
original = "「んむっ……ちゅぷぷっ<emoji=heart04>\u3000れろちゅっ<emoji=heart04>\u3000ちゅれるっ<emoji=heart04>\u3000れるれるっ<emoji=heart04>\u3000ちゅぱっ<emoji=heart04>\u3000はあぁっ……ちゅむるっ\u3000ちゅるるっ<emoji=heart04>\u3000れろちゅっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ちゅぱぁっ……<emoji=heart04>」"
translation = "「음뭇…… 츕츕<emoji=heart04> 낼름쪽<emoji=heart04> 쪽낼름<emoji=heart04> 낼름낼름<emoji=heart04> 쭈압<emoji=heart04> 하아앗…… 쪽물<emoji=heart04> 쭈르륵<emoji=heart04> 낼름쪽<emoji=heart04> 응<emoji=heart04> 쭈우압……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それから、しばらく甘いキスを堪能した後――"
translation = "그리고 나서, 잠시 달콤한 키스를 만끽한 후――"

[[dialogue]]
speaker = "unk"
original = "フニは綺麗な柔肌をさらけ出しながら、俺の膝の上に乗るような体勢になっていた。"
translation = "후니는 아름다운 맨살을 드러내면서, 내 무릎 위에 올라타는 자세가 되어 있었다."

[[dialogue]]
speaker = "フェニエル"
original = "「んっ……<emoji=heart04>\u3000はあぁ……<emoji=heart04>\u3000ご主人様はそのまま楽になさっていて下さいね<emoji=heart04>\u3000私が誠心誠意、けっぱってご奉仕させて頂きますので<emoji=heart04>」"
translation = "「응……<emoji=heart04> 하아아……<emoji=heart04> 주인님은 그대로 편하게 계세요<emoji=heart04> 제가 정성껏 열심히 봉사해 드릴 테니까요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "彼女はそう言うと、ゆっくりと秘部をペニスへと擦り付け始める。"
translation = "그녀는 그렇게 말하더니, 천천히 은밀한 부분을 페니스에 문지르기 시작한다."

[[dialogue]]
speaker = "フェニエル"
original = "「んんっ……<emoji=heart04>\u3000はあぁ……<emoji=heart04>\u3000ふうぅ……<emoji=heart04>」"
translation = "「응응……<emoji=heart04> 하아아……<emoji=heart04> 후우……<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「ご主人様とエッチできると思ったら、おま○こ喜んで、もう濡れて来ちゃってます<emoji=heart04>\u3000あっ……んうぅ……<emoji=heart04>」"
translation = "「주인님과 야한 짓을 할 수 있다고 생각했더니, 보지 기뻐서 벌써 젖어 버렸어요<emoji=heart04> 앗…… 응으윽……<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「んっ……<emoji=heart04>\u3000あと……この体勢、ご主人さまが楽だと思ったんですけど、ちょっと恥ずかしいかもしれません<emoji=heart04>\u3000はあぁ……<emoji=heart04>\u3000んふぅっ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 그리고…… 이 자세, 주인님이 편할 거라고 생각했는데, 조금 부끄러울지도 몰라요<emoji=heart04> 하아아……<emoji=heart04> 응후웃……<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「ドキドキして……<emoji=heart04>\u3000エッチなおつゆがいっぱい溢れて来て、もうこんなにぬるぬるになっちゃってます<emoji=heart04>」"
translation = "「두근거려서……<emoji=heart04> 야한 국물이 잔뜩 흘러나와서, 벌써 이렇게 미끌미끌해졌어요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "温かでぬるぬるの感触が気持ち良くて、俺のペニスはみるみる大きく勃起して行く。"
translation = "따뜻하고 미끌미끌한 감촉이 기분 좋아서, 내 페니스는 순식간에 크게 발기해 간다."

[[dialogue]]
speaker = "フェニエル"
original = "「はあぁ……<emoji=heart04>\u3000準備できました……<emoji=heart04>\u3000ご主人様のおち○ちん、私の中にお迎えさせて頂きますね……<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 준비됐어요……<emoji=heart04> 주인님의 자지, 제 안으로 맞이해 드릴게요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "フニはペニスにそっと手で触れると、膣穴へと導いて――"
translation = "후니는 페니스에 살짝 손을 대고, 질 구멍으로 이끌어――"

[[dialogue]]
speaker = "フェニエル"
original = "「んふぅ……<emoji=heart04>\u3000あっ――<emoji=heart04><emoji=heart04>」"
translation = "「응후……<emoji=heart04> 앗――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「ふあああぁ～～っ<emoji=heart04><emoji=heart04>\u3000んっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000おち○ちん、お帰りなさいませぇ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000んああぁんっ……<emoji=heart04>」"
translation = "「후아아아아앙~~앗<emoji=heart04><emoji=heart04> 응<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 자지, 어서 오세요오<emoji=heart04> 하아앗<emoji=heart04> 후아앗<emoji=heart04> 응아아아앙……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "淫らな水音を立てながら、お尻を上下に振り始める。"
translation = "음란한 물소리를 내며, 엉덩이를 위아래로 흔들기 시작한다."

[[dialogue]]
speaker = "フェニエル"
original = "「はああぁっ<emoji=heart04>\u3000私のおま○こ、ご主人様をお迎えできて喜んでますぅ<emoji=heart04>\u3000んふぅっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふああぁんっ……<emoji=heart04>」"
translation = "「하아아앗<emoji=heart04> 제 보지, 주인님을 맞이할 수 있어서 기뻐하고 있어요오<emoji=heart04> 응후웃<emoji=heart04> 하아앗<emoji=heart04> 후아아앙……<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「あっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000ご主人様専用のフニおま○こ、ちょっと挿れて動いただけで、なまら気持ち良くなっちゃってますぅ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 응으윽<emoji=heart04> 응아앗<emoji=heart04> 주인님 전용 후니 보지, 살짝 넣고 움직였을 뿐인데, 나마라 기분 좋아져 버렸어요오<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「はうぅんっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はあぁんっ<emoji=heart04>\u3000ご立派で逞しいおち○ちん、ありがとうございますぅ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000おま○こ気持ちいいですぅ<emoji=heart04>」"
translation = "「하우웅앗<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 하아앙앗<emoji=heart04> 훌륭하고 늠름한 자지, 감사합니다아<emoji=heart04> 앗<emoji=heart04> 후아앗<emoji=heart04> 보지 기분 좋아요오<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「ご主人様は気持ち良くなれていらっしゃいますか？\u3000あっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んふぅっ……<emoji=heart04>」"
translation = "「주인님은 기분 좋아지고 계신가요? 앗<emoji=heart04> 응<emoji=heart04> 응후웃……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、すごく気持ちいいよ」"
translation = "「아아, 엄청 기분 좋아」"

[[dialogue]]
speaker = "unk"
original = "それはもう、多幸感で理性がすぐとろけてしまう程に。"
translation = "그것은 이미, 다행감으로 이성이 금방 녹아버릴 정도로."

[[dialogue]]
speaker = "unk"
original = "今ではもう数え切れないくらい味わってきたフニのおま○こは、すっかり俺のペニスに合わせた専用の形になっており、挿れただけですぐに天国のような快楽に包まれてしまう。"
translation = "지금은 이미 셀 수 없을 만큼 맛보아 온 후니의 보지는, 완전히 내 페니스에 맞춘 전용 모양이 되어 있었고, 넣기만 해도 금방 천국과 같은 쾌락에 휩싸여 버린다."

[[dialogue]]
speaker = "フェニエル"
original = "「あっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000えへへ<emoji=heart04>\u3000嬉しくなって、おま○こもっと気持ち良くなっちゃいます<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふうぅっ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 하앙앗<emoji=heart04> 에헤헤<emoji=heart04> 기뻐져서, 보지 더 기분 좋아져요<emoji=heart04> 하아앗<emoji=heart04> 응<emoji=heart04> 후우웃……<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「ご主人様にももっと気持ち良くなって頂きたいです<emoji=heart04>\u3000私に何かできることがあれば、遠慮なく仰って下さいっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000んふぅっ……<emoji=heart04>」"
translation = "「주인님도 더 기분 좋아지셨으면 좋겠어요<emoji=heart04> 제가 할 수 있는 일이 있다면, 사양 말고 말씀해 주세요옷<emoji=heart04> 앗<emoji=heart04> 응아앗<emoji=heart04> 응후웃……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「じゃあ、俺がもし……フニのことを<b>孕ませたい</b>って言ったら？」"
translation = "「그럼, 내가 만약…… 후니를 <b>임신시키고</b> 싶다고 말하면?」"

[[dialogue]]
speaker = "フェニエル"
original = "「ぴゃっ！？\u3000な、なして……！？」"
translation = "「뺘앗!? 무, 무슨……!?」"

[[dialogue]]
speaker = "クロト"
original = "「フニのこと、それくらい愛してるから――」"
translation = "「후니를, 그만큼 사랑하니까――」"

[[dialogue]]
speaker = "unk"
original = "俺は言いながら、彼女のうなじに繰り返し口づけを落としていく。"
translation = "나는 말하면서, 그녀의 목덜미에 반복해서 입맞춤을 떨어뜨린다."

[[dialogue]]
speaker = "フェニエル"
original = "「あっ<emoji=heart04>\u3000ご主人様<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000キス、感じちゃいますぅ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000んあぁっ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 주인님<emoji=heart04> 하아앗<emoji=heart04> 응으윽<emoji=heart04> 키스, 느껴져요오<emoji=heart04> 후우웃<emoji=heart04> 응아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「フニ、好きだ……愛してる。俺の赤ちゃん生んで欲しい」"
translation = "「후니, 좋아해…… 사랑해. 내 아기 낳아 줬으면 좋겠어」"

[[dialogue]]
speaker = "フェニエル"
original = "「はあぁっ<emoji=heart04>\u3000そ、そんなこと言われたら、私……<emoji=heart04>」"
translation = "「하아앗<emoji=heart04> 그, 그런 말 들으면, 저……<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「ご主人様の赤ちゃん、本当に欲しくなっちゃいます<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふうぅっ……<emoji=heart04>」"
translation = "「주인님의 아기, 정말로 갖고 싶어져요<emoji=heart04> 앗<emoji=heart04> 응<emoji=heart04> 후우웃……<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「でも、ご主人様が望んで下さるなら――」"
translation = "「하지만, 주인님께서 원하신다면――」"

[[dialogue]]
speaker = "unk"
original = "フニはちらっとこちらを振り向きながら、嬉しそうな天使の微笑みを浮かべて。"
translation = "후니는 슬쩍 이쪽을 돌아보며, 기쁜 듯한 천사의 미소를 짓는다."

[[dialogue]]
speaker = "フェニエル"
original = "「どうか私に、可愛い赤ちゃんを沢山生ませて下さい<emoji=heart04>」"
translation = "「부디 저에게, 귀여운 아기를 잔뜩 낳게 해 주세요<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「っ……フニっ……！」"
translation = "「윽…… 후니잇……!」"

[[dialogue]]
speaker = "フェニエル"
original = "「あっ<emoji=heart04><emoji=heart04>\u3000ふあああぁ～っ<emoji=heart04>\u3000ご主人様<emoji=heart04>\u3000おち○ちん突き上げて来てますぅっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04><emoji=heart04> 후아아아앙~~앗<emoji=heart04> 주인님<emoji=heart04> 자지 솟아오르고 있어요옷<emoji=heart04> 하아앗<emoji=heart04> 앙<emoji=heart04> 후아앗<emoji=heart04> 응아아아앙앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "興奮が昂った俺は、自分からも腰を動かし始める。"
translation = "흥분이 고조된 나는, 나 자신도 허리를 움직이기 시작한다."

[[dialogue]]
speaker = "フェニエル"
original = "「んっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふあああぁっ<emoji=heart04><emoji=heart04>\u3000おま○この奥までどちゅどちゅ来て、すごいですうぅ～っ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 하아앗<emoji=heart04> 후아아아앗<emoji=heart04><emoji=heart04> 보지 깊숙한 곳까지 푹푹 들어와서, 굉장해요오~~옷<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 하앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「おま○こ気持ちいいですっ<emoji=heart04>\u3000気持ち良くして下さって、ありがとうございますぅ～っ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「보지 기분 좋아요옷<emoji=heart04> 기분 좋게 해 주셔서, 감사합니다아~~옷<emoji=heart04> 앗<emoji=heart04> 하앙앗<emoji=heart04> 후아아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はそこで、フニの背中の羽に手を伸ばす。"
translation = "나는 거기서, 후니의 등 뒤의 날개에 손을 뻗는다."

[[dialogue]]
speaker = "unk"
original = "手探りで羽の付け根の辺りに指を押し込むと――"
translation = "더듬거리며 날개 뿌리 근처에 손가락을 밀어 넣자――"

[[dialogue]]
speaker = "フェニエル"
original = "「ぴゃっ！？\u3000ふああああああぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「뺘앗!? 후아아아아아아앙~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "彼女はひと際、大きな嬌声を上げる。"
translation = "그녀는 유난히 큰 교성을 지른다."

[[dialogue]]
speaker = "フェニエル"
original = "「ご、ご主人様<emoji=heart04>\u3000そこ<emoji=heart04>\u3000ダメですっ<emoji=heart04>\u3000な、なんかなまら感じて、おま○こキュンキュンしちゃいますぅ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000んあぁんっ<emoji=heart04>」"
translation = "「주, 주인님<emoji=heart04> 거기<emoji=heart04> 안 돼요옷<emoji=heart04> 무, 뭔가 나마라 느껴져서, 보지 큥큥거려요오<emoji=heart04><emoji=heart04> 앗<emoji=heart04> 하앙앗<emoji=heart04> 응아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「あっ<emoji=heart04>\u3000ひぃんっ<emoji=heart04>\u3000ひあぁんっ<emoji=heart04>\u3000感じますっ<emoji=heart04>\u3000変な感じで、体がゾクゾクしちゃいますぅ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 히이잉앗<emoji=heart04> 히아앙앗<emoji=heart04> 느껴져요옷<emoji=heart04> 이상한 느낌으로, 몸이 오싹거려요오<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 후아아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「実はまた、ネットで調べて――」"
translation = "「실은 또, 인터넷으로 알아봤는데――」"

[[dialogue]]
speaker = "フェニエル"
original = "「え？\u3000んっ<emoji=heart04>\u3000――天使はセックス中に羽の付け根を刺激すると、子作りスイッチが入って妊娠しやすくなる……ですか？」"
translation = "「에? 응<emoji=heart04> ――천사는 섹스 중에 날개 뿌리를 자극하면, 아기 만들기 스위치가 켜져서 임신하기 쉬워진다……고요?」"

[[dialogue]]
speaker = "フェニエル"
original = "「そ、そんなことが……？\u3000あっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000でも――<emoji=heart04>」"
translation = "「그, 그런 일이……? 앗<emoji=heart04> 후아앗<emoji=heart04> 하지만――<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「んっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000なんかおま○こ、確かに勝手に動いて、子宮が下りて来ているような感じが……<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000んふぅっ……<emoji=heart04>」"
translation = "「응<emoji=heart04> 후우웃<emoji=heart04> 뭔가 보지, 확실히 저절로 움직여서, 자궁이 내려오는 듯한 느낌이……<emoji=heart04> 앙<emoji=heart04> 하앙앗<emoji=heart04> 응후웃……<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「あっ<emoji=heart04>\u3000これ<emoji=heart04>\u3000気のせいじゃないですっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000本当に子宮口がおち○ちんにぴったり吸い付いて、エッチなキスするみたいになっちゃってますぅ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 이거<emoji=heart04> 기분 탓이 아니에요옷<emoji=heart04> 하아앗<emoji=heart04> 정말로 자궁구가 자지에 딱 달라붙어서, 야한 키스하는 것처럼 되어 버렸어요오<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「き、危険日じゃないのに、なんか――<b>卵子</b>が出ちゃいそうな気分になっちゃいます<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000おま○こ、さっきよりも敏感に感じますぅ<emoji=heart04><emoji=heart04>」"
translation = "「기, 위험일이 아닌데, 뭔가―― <b>난자</b>가 나와 버릴 것 같은 기분이 들어요<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 보지, 아까보다 민감하게 느껴져요오<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「っ……！」"
translation = "「윽……!」"

[[dialogue]]
speaker = "フェニエル"
original = "「はあぁっ<emoji=heart04>\u3000おち○ちん、膨らんでますっ<emoji=heart04>\u3000もしかしてご主人様、お射精が近くなってきたんですか？」"
translation = "「하아앗<emoji=heart04> 자지, 부풀어 오르고 있어요옷<emoji=heart04> 혹시 주인님, 사정이 가까워진 건가요?」"

[[dialogue]]
speaker = "フェニエル"
original = "「――私の反応がエッチ過ぎるから？\u3000あんっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>」"
translation = "「――제 반응이 너무 야해서요? 앙<emoji=heart04> 응아앗<emoji=heart04> 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「はあぁっ<emoji=heart04>\u3000ご主人様に興奮してもらえて、嬉しいです<emoji=heart04>\u3000んっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000私、けっぱって動きますからっ<emoji=heart04>」"
translation = "「하아앗<emoji=heart04> 주인님께 흥분시켜 드릴 수 있어서, 기뻐요<emoji=heart04> 응<emoji=heart04> 하아앗<emoji=heart04> 저, 열심히 움직일게요옷<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「ご主人様の子種、どうか私の子宮にいっぱいお恵み下さいませ<emoji=heart04>\u3000んうぅっ――<emoji=heart04><emoji=heart04>」"
translation = "「주인님의 씨앗, 부디 제 자궁에 잔뜩 내려 주세요오<emoji=heart04> 응으윽――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「あっ<emoji=heart04><emoji=heart04>\u3000ふあああぁぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04><emoji=heart04> 후아아아아아아앙~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「んうぅっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んふぅっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「응으윽<emoji=heart04> 후우웃<emoji=heart04> 응<emoji=heart04> 후아앗<emoji=heart04> 하아아앙앗<emoji=heart04><emoji=heart04> 앗<emoji=heart04> 응<emoji=heart04> 응후웃<emoji=heart04> 하아앗<emoji=heart04> 응으윽<emoji=heart04> 응아앗<emoji=heart04> 후아아앙앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "フニは腰の動きを激しくして、俺の射精を促して来る。"
translation = "후니는 허리의 움직임을 격렬하게 하여, 나의 사정을 재촉해 온다."

[[dialogue]]
speaker = "unk"
original = "膨れ上がるように高まる快楽に堪らず、俺も腰を合わせて突き上げる。"
translation = "부풀어 오르듯이 높아지는 쾌락을 참지 못하고, 나도 허리를 맞추어 솟구쳐 올린다."

[[dialogue]]
speaker = "フェニエル"
original = "「あっ<emoji=heart04>\u3000はぁんっ<emoji=heart04><emoji=heart04>\u3000ご主人様<emoji=heart04>\u3000おち○ちんで子宮口にどちゅどちゅキスされるの、なまら気持ちいいですぅっ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 하앙앗<emoji=heart04><emoji=heart04> 주인님<emoji=heart04> 자지로 자궁구에 푹푹 키스당하는 거, 나마라 기분 좋아요오옷<emoji=heart04><emoji=heart04> 앗<emoji=heart04> 후아앗<emoji=heart04> 응아아아앙앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「んんぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000おま○こ、なまら気持ち良くて、幸せですぅっ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふあああぁっ<emoji=heart04><emoji=heart04>」"
translation = "「응으윽<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 응아앗<emoji=heart04> 기분 좋아옷<emoji=heart04> 보지, 나마라 기분 좋아서, 행복해요오옷<emoji=heart04><emoji=heart04> 앗<emoji=heart04> 하아앗<emoji=heart04> 후아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「おち○ちんありがとうございます<emoji=heart04>\u3000気持ち良くして下さって、ありがとうございますぅ～～っ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「자지 감사합니다<emoji=heart04> 기분 좋게 해 주셔서, 감사합니다아~~옷<emoji=heart04><emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 하앙앗<emoji=heart04> 응아아아앙앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「っ……好きだ、フニ！\u3000俺の赤ちゃんを生んでくれっ！」"
translation = "「윽…… 좋아해, 후니! 내 아기를 낳아 줘엇!」"

[[dialogue]]
speaker = "unk"
original = "昂る興奮のままに欲望を口にしながら、俺は彼女の羽の付け根を再び指で刺激する。"
translation = "고조되는 흥분 그대로 욕망을 입에 담으면서, 나는 그녀의 날개 뿌리를 다시 손가락으로 자극한다."

[[dialogue]]
speaker = "フェニエル"
original = "「ぴゃっ<emoji=heart04>\u3000ふあああぁぁぁ～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ご主人様<emoji=heart04>\u3000それ、なまら感じちゃいますぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「뺘앗<emoji=heart04> 후아아아아아앙~~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 주인님<emoji=heart04> 그거, 나마라 느껴져요오~~~옷<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「ふああぁっ<emoji=heart04>\u3000おま○こキュンキュンしてぇ<emoji=heart04>\u3000『好き』が溢れて来ちゃいますぅ～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04>」"
translation = "「후아아앗<emoji=heart04> 보지 큥큥거리고오<emoji=heart04> 『좋아해』가 흘러넘쳐 나와요오~~~옷<emoji=heart04><emoji=heart04><emoji=heart04> 앗<emoji=heart04> 응아앗<emoji=heart04> 후아앗<emoji=heart04> 하아아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000しゅきっ<emoji=heart04>\u3000私もご主人様のこと、愛してますぅ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 앙<emoji=heart04> 슉히잇<emoji=heart04> 저도 주인님을, 사랑해요오<emoji=heart04><emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 하앙앗<emoji=heart04> 후아아앙앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「しゅきっ<emoji=heart04>\u3000しゅきしゅきっ<emoji=heart04>\u3000だいしゅきなご主人様の赤ちゃん、孕ませて下しゃあいっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふあああぁっ<emoji=heart04><emoji=heart04>」"
translation = "「슉히잇<emoji=heart04> 슉히슉히잇<emoji=heart04> 가장 좋아하는 주인님의 아기, 임신시켜 주세여엇<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 하아앗<emoji=heart04> 후아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「くっ……俺、もうそろそろイキそうだ……！」"
translation = "「크윽…… 나, 이제 곧 절정할 것 같아……!」"

[[dialogue]]
speaker = "フェニエル"
original = "「あっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000私も<emoji=heart04>\u3000おっきいの来ちゃいましゅぅっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000んあああぁっ<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 응아앗<emoji=heart04> 저도<emoji=heart04> 커다란 거 와여어옷<emoji=heart04> 응응<emoji=heart04> 하아앗<emoji=heart04> 후아앗<emoji=heart04> 응아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "限界まで高まった射精欲に促されて、俺は腰を激しく振り上げる。"
translation = "한계까지 고조된 사정 욕구에 이끌려, 나는 허리를 격렬하게 솟구쳐 올린다."

[[dialogue]]
speaker = "フェニエル"
original = "「ぴゃあぁっ<emoji=heart04><emoji=heart04>\u3000おち○ちんしゅごいぃっ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04><emoji=heart04>\u3000んっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「뺘아아앗<emoji=heart04><emoji=heart04> 자지 대단해에옷<emoji=heart04><emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 후아앗<emoji=heart04> 하아아앙앗<emoji=heart04><emoji=heart04> 응<emoji=heart04> 앗<emoji=heart04> 하아앗<emoji=heart04> 후아아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「はああぁっ<emoji=heart04><emoji=heart04>\u3000ご主人様、下しゃいっ<emoji=heart04>\u3000精液、おま○この中にいっぱいぃ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふあああぁっ<emoji=heart04><emoji=heart04>」"
translation = "「하아아앗<emoji=heart04><emoji=heart04> 주인님, 주세여엇<emoji=heart04> 정액, 보지 안에 잔뜩이이<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 후아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「赤ちゃんっ<emoji=heart04>\u3000赤ちゃん下しゃいませぇっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「아기잇<emoji=heart04> 아기 주세여어엇<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 후아아앙앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「フニの卵子に、ご主人様の精子、受精させて下しゃあいっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んあああぁ～っ<emoji=heart04><emoji=heart04>」"
translation = "「후니의 난자에, 주인님의 정자, 수정시켜 주세여어엇<emoji=heart04><emoji=heart04><emoji=heart04> 앗<emoji=heart04> 하아앗<emoji=heart04> 응아아아앙~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「っ……！\u3000フニ、もう出るっ！！\u3000出すぞっ！！！」"
translation = "「윽……! 후니, 이제 나와!! 싼다앗!!!」"

[[dialogue]]
speaker = "フェニエル"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はいぃっ<emoji=heart04><emoji=heart04>\u3000フニもイキましゅうっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はあぁっ<emoji=heart04><emoji=heart04>\u3000ふあああぁ～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 네에엣<emoji=heart04><emoji=heart04> 후니도 절정해여어옷<emoji=heart04><emoji=heart04><emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 하아앗<emoji=heart04><emoji=heart04> 후아아아아앙~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「ひああああぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イク<emoji=heart04><emoji=heart04>\u3000イクイクイクイクイクっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「히아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 절정<emoji=heart04><emoji=heart04> 절정절정절정절정절정앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「イっ――――<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「자아――――<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「イっきゅうううぅぅぅ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふああああああぁぁぁ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「자아아아아아아아아아아아아아아아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04> 후아아아아아아아아아아아아아아아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は子宮口にペニスを強く押し付けながら、極限の快楽と共に、煮えたぎった欲望を解き放った。"
translation = "나는 자궁구에 페니스를 강하게 밀어붙이면서, 극한의 쾌락과 함께, 끓어오르는 욕망을 해방했다."

[[dialogue]]
speaker = "フェニエル"
original = "「はあああぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ご主人様のせーえき、奥にびゅうぅ～<emoji=heart04>\u3000って、いっぱい入って来てましゅぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하아아아아앙~~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 주인님의 정애액, 안쪽에 쓔욱~<emoji=heart04> 하고, 잔뜩 들어오고 있어여어~~~옷<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「あっ<emoji=heart04><emoji=heart04>\u3000んああぁ～～っ<emoji=heart04><emoji=heart04>\u3000しゅごいっ<emoji=heart04>\u3000熱い精液で子宮が満たされて、幸せになっちゃいましゅぅ～っ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000はあぁ～っ<emoji=heart04>」"
translation = "「앗<emoji=heart04><emoji=heart04> 응아아아앙~~앗<emoji=heart04><emoji=heart04> 대단해옷<emoji=heart04> 뜨거운 정액으로 자궁이 가득 채워져서, 행복해져여어~옷<emoji=heart04> 응<emoji=heart04> 하아아~앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "目の前の女の子を孕ませることを念じながら、子宮にありったけの精を注いでいく。"
translation = "눈앞의 여자아이를 임신시킬 것을 염원하면서, 자궁에 가진 모든 정액을 쏟아붓는다."

[[dialogue]]
speaker = "フェニエル"
original = "「んあぁっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>\u3000卵子が幸せでいっぱいに包まれて、受精しちゃいましゅぅ……<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ……<emoji=heart04>」"
translation = "「응아앗<emoji=heart04> 후아앗<emoji=heart04> 난자가 행복으로 가득 채워져서, 수정되어 버려여어……<emoji=heart04> 앗<emoji=heart04> 하아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「んっ……<emoji=heart04>\u3000ご主人様の赤ちゃん、本当にできちゃいそうです……<emoji=heart04>\u3000はあぁ……<emoji=heart04>\u3000んふぅ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 주인님의 아기, 정말로 생길 것 같아요……<emoji=heart04> 하아아……<emoji=heart04> 응후……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そうして、長い射精を終えて、俺はペニスを引き抜いた。"
translation = "그렇게, 긴 사정을 마치고, 나는 페니스를 뽑았다."

[[dialogue]]
speaker = "フェニエル"
original = "「んっ……<emoji=heart04>\u3000はあぁ……<emoji=heart04>\u3000ふうぅ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 하아아……<emoji=heart04> 후우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "彼女の中に入り切らなかった欲望が、白濁となって膣穴から溢れ出してくる。"
translation = "그녀 안에 다 들어가지 못한 욕망이, 백탁액이 되어 질 구멍에서 흘러넘친다."

[[dialogue]]
speaker = "フェニエル"
original = "「ご主人様……中にいっぱいお射精頂いて、ありがとうございました……<emoji=heart04>」"
translation = "「주인님…… 안에 잔뜩 사정해 주셔서, 감사했습니다……<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「ご主人様は、気持ち良くなって頂けましたか……？」"
translation = "「주인님은, 기분 좋아지셨나요……?」"

[[dialogue]]
speaker = "クロト"
original = "「ああ。これ以上ないくらい興奮して、気持ち良かった……」"
translation = "「아아. 더할 나위 없이 흥분했고, 기분 좋았어……」"

[[dialogue]]
speaker = "フェニエル"
original = "「んっ<emoji=heart04>\u3000えへへ<emoji=heart04>\u3000ちゃんと癒すご奉仕ができてたのなら、嬉しいです……<emoji=heart04>」"
translation = "「응<emoji=heart04> 에헤헤<emoji=heart04> 제대로 치유하는 봉사를 할 수 있었다면, 기뻐요……<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「私もすごく気持ち良くて、なまら幸せな気持ちになっちゃいました……<emoji=heart04>」"
translation = "「저도 엄청 기분 좋아서, 나마라 행복한 기분이 되어 버렸어요……<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「……あの、ご主人様」"
translation = "「……저기, 주인님」"

[[dialogue]]
speaker = "フェニエル"
original = "「今までは私、ご主人様が望んでいらっしゃるかわからなかったので、言えなかったんですけど……」"
translation = "「지금까지는 제가, 주인님께서 원하시는지 몰라서, 말할 수 없었는데요……」"

[[dialogue]]
speaker = "フェニエル"
original = "「よろしければ……『子作りご奉仕』、これからもまたさせて頂いてもよろしいでしょうか……？」"
translation = "「괜찮으시다면…… 『아기 만들기 봉사』, 앞으로도 또 해 드려도 괜찮을까요……?」"

[[dialogue]]
speaker = "unk"
original = "照れながら横目でそんなことを言うフニに、俺は猛烈な愛おしさを掻き立てられてしまって。"
translation = "부끄러워하며 곁눈질로 그런 말을 하는 후니에게, 나는 맹렬한 사랑스러움을 자극받아 버려서."

[[dialogue]]
speaker = "クロト"
original = "「フニ、愛してる」"
translation = "「후니, 사랑해」"

[[dialogue]]
speaker = "フェニエル"
original = "「あっ<emoji=heart04>\u3000ご主人様<emoji=heart04>\u3000うなじにキス、くすぐったいです……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 주인님<emoji=heart04> 목덜미에 키스, 간지러워요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それからも熱が冷めやらず、俺は彼女にマッサージの延長をお願いしてしまうのだった――"
translation = "그 후로도 열이 식지 않아, 나는 그녀에게 마사지의 연장을 부탁하고 마는 것이었다――"

