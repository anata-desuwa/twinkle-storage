[[dialogue]]
speaker = "アポロ（大人）"
original = "「く、ぅ……ヒーローは、負けな──」"
translation = "「크, 윽…… 히어로는, 지지 않──」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「くぁあああああっ！？」"
translation = "「콰아아아아악!?」"

[[dialogue]]
speaker = "unk"
original = "街を守るヒーロー、アポロは怪人に敗北した。"
translation = "거리의 평화를 지키는 히어로, 아폴로는 괴인에게 패배했다."

[[dialogue]]
speaker = "unk"
original = "あろうことか、怪人はアポロをアジトに連れ去って──"
translation = "설상가상으로 괴인은 아폴로를 아지트로 끌고 가서──"

[[dialogue]]
speaker = "アポロ"
original = "「うぅっ……くそぉっ……」"
translation = "「으윽…… 제길……」"

[[dialogue]]
speaker = "unk"
original = "足ごと抱きかかえられ、あられもない格好で拘束されるアポロ。"
translation = "다리째로 안겨 들어 올려져, 수치스러운 모습으로 구속당하는 아폴로."

[[dialogue]]
speaker = "unk"
original = "先ほどの戦闘で身を守るスーツは破け、女として大事なところが剥き出しになってしまっている。"
translation = "조금 전의 전투로 몸을 지키던 슈트는 찢겨 나가, 여자로서 소중한 곳이 고스란히 드러나 있다."

[[dialogue]]
speaker = "アポロ"
original = "「こんなところに連れてきて、あたしに何をするつもりだっ！？」"
translation = "「이런 곳에 데려와서, 나한테 뭘 할 셈이냐!?」"

[[dialogue]]
speaker = "クロト"
original = "「女を捕まえてやることなんて決まっているだろう？\u3000ここならいくら泣き叫ぼうと助けは来ないぞ」"
translation = "「여자를 붙잡아서 할 일이야 뻔하지 않나? 여기라면 아무리 울부짖어도 도움은 오지 않는다」"

[[dialogue]]
speaker = "アポロ"
original = "「っ……この外道が……！」"
translation = "「윽…… 이 외도 같은 녀석이……!」"

[[dialogue]]
speaker = "unk"
original = "女ヒーローが悪の怪人に捕まり、辱めを受ける──という設定だ。"
translation = "여히어로가 악의 괴인에게 붙잡혀 능욕당한다──는 설정이다."

[[dialogue]]
speaker = "unk"
original = "俺はアポロと恋人になって、彼女の初めてをもらった。"
translation = "나는 아폴로와 연인이 되어, 그녀의 처음을 가졌다."

[[dialogue]]
speaker = "unk"
original = "今日はちょっと趣向を変えて、アポロの演技力向上も兼ねて、一風変わったシチュエーションを試していた。"
translation = "오늘은 조금 취향을 바꿔서, 아폴로의 연기력 향상도 겸해 색다른 상황극을 시도하고 있었다."

[[dialogue]]
speaker = "クロト"
original = "「お前の惨めな姿は全世界に配信されている。いつもお前が守ってやっているやつらに、女の部分を晒す気分はどうだ？」"
translation = "「네 비참한 모습은 전 세계로 송출되고 있다. 언제나 네가 지켜주던 녀석들에게 네 여자의 부분을 노출하는 기분은 어떠냐?」"

[[dialogue]]
speaker = "アポロ"
original = "「なっ……！？\u3000くぅぅっ……」"
translation = "「뭐……!? 큭……」"

[[dialogue]]
speaker = "unk"
original = "顔を真っ赤にしながら歯を食いしばり、悔しさと羞恥に震えるアポロ。"
translation = "얼굴을 새빨갛게 물들이며 이를 악물고, 분함과 수치심에 부들부들 떠는 아폴로."

[[dialogue]]
speaker = "unk"
original = "実際はカメラで撮影などしていないが、アポロの表情は真に迫っていた。"
translation = "실제로는 카메라로 촬영 같은 건 하고 있지 않지만, 아폴로의 표정은 실감이 났다."

[[dialogue]]
speaker = "クロト"
original = "「正義の味方が堕ちるところを民衆に見せてやる。ヒーローが犯されて無様に喘ぐ姿を見れば、希望など簡単に打ち砕かれるだろう」"
translation = "「정의의 사자가 타락하는 모습을 민중에게 보여주지. 히어로가 범해지며 볼품없이 헐떡이는 모습을 보면, 희망 따위 간단히 무너져 내리겠지」"

[[dialogue]]
speaker = "アポロ"
original = "「いいや、正義は悪に屈しない！\u3000お前に穢されようと、あたしの心が折れることはない！」"
translation = "「아니, 정의는 악에 굴하지 않아! 너에게 더럽혀질지언정, 내 마음이 꺾이는 일은 없다!」"

[[dialogue]]
speaker = "クロト"
original = "「言ったな。では試してやる」"
translation = "「그렇게 나오시나. 그렇다면 시험해 주지」"

[[dialogue]]
speaker = "アポロ"
original = "「ッ──！」"
translation = "「윽──!」"

[[dialogue]]
speaker = "unk"
original = "ペニスを見せつけるように秘部に沿えると、一瞬アポロが怯えた表情を見せた。"
translation = "자지를 과시하듯 비부에 갖다 대자, 순간 아폴로가 겁에 질린 표정을 지었다."

[[dialogue]]
speaker = "unk"
original = "だがすぐに気丈さを取り戻して、キッと強くにらむ。"
translation = "하지만 곧바로 기개를 되찾고는, 부릅뜬 눈으로 강하게 노려본다."

[[dialogue]]
speaker = "アポロ"
original = "「言ったはずだ、正義は悪に屈しないと。やれるものならやってみろ！」"
translation = "「말했을 텐데, 정의는 악에 굴하지 않는다고. 할 수 있다면 해봐라!」"

[[dialogue]]
speaker = "unk"
original = "怒張したペニスを、容赦なくアポロの秘部に突き立てて──"
translation = "노장한 자지를 가차 없이 아폴로의 비부에 박아 넣으며──"

[[dialogue]]
speaker = "アポロ"
original = "「ぐぅぅぅっ……！」"
translation = "「구우우웃……!」"

[[dialogue]]
speaker = "クロト"
original = "「どうだ、俺のペニスは？\u3000これでお前のような生意気な女を泣かせてきたんだ」"
translation = "「어떠냐, 내 자지는? 이걸로 너 같은 건방진 여자를 울려왔지」"

[[dialogue]]
speaker = "アポロ"
original = "「っ……こんなもの、気持ち悪いだけだ……！」"
translation = "「윽…… 이런 거, 기분 나쁠 뿐이다……!」"

[[dialogue]]
speaker = "unk"
original = "アポロは顔を歪めて反抗するが、体は反応し、柔らかい膣壁がひくひくと震えながら締め付けてくる。"
translation = "아폴로는 얼굴을 일그러뜨리며 저항하지만, 몸은 반응하여 부드러운 질벽이 움찔움찔 떨리며 조여 온다."

[[dialogue]]
speaker = "unk"
original = "子を作るために育った、孕み頃の女の体だ。"
translation = "아이를 만들기 위해 자라난, 임신하기 딱 좋은 여자의 몸이다."

[[dialogue]]
speaker = "クロト"
original = "「そうか。ならばこいつの味を、お前の体に刻み込んでやるとしよう」"
translation = "「그러냐. 그렇다면 이놈의 맛을 네 몸에 새겨주도록 하지」"

[[dialogue]]
speaker = "アポロ"
original = "「くぁああっ……！\u3000ふぁあっ……あ……くっ……うぅっ……！」"
translation = "「콰아악……! 하아…… 아…… 윽…… 으윽……!」"

[[dialogue]]
speaker = "アポロ"
original = "「ち○ぽが、あたしの中で、動いて……くぅぅっ……！\u3000ふっ……はっ……ああぁっ……！」"
translation = "「자지가, 내 안에서, 움직여…… 큭……! 하…… 하앗…… 아아아앗……!」"

[[dialogue]]
speaker = "unk"
original = "羽交い絞めにしたままペニスを突き上げると、その度にアポロの口から呻きが漏れる。"
translation = "뒤에서 결박한 채로 자지를 쳐올리자, 그때마다 아폴로의 입에서 신음이 새어 나온다."

[[dialogue]]
speaker = "unk"
original = "アポロは手足をもがかせて拘束を脱しようとするが、戦いに敗れた後の体力ではそれは叶わない。"
translation = "아폴로는 손발을 버둥거리며 구속에서 벗어나려 하지만, 싸움에서 패배한 뒤의 체력으로는 역부족이다."

[[dialogue]]
speaker = "アポロ"
original = "「くっ……うっ……はぁっ……大き、い……んんっ……中から、広げられてる……うぅっ……！」"
translation = "「큭…… 윽…… 하아…… 커, 커다란 게…… 으응…… 안에서부터, 벌려지고 있어…… 으윽……!」"

[[dialogue]]
speaker = "クロト"
original = "「悪の怪人に無様に犯される気分はどうだ？」"
translation = "「악의 괴인에게 한심하게 범해지는 기분은 어떠냐?」"

[[dialogue]]
speaker = "アポロ"
original = "「はんっ……下手くそで粋がって、無様なのはお前の方、だ……はぁっ……んんっ……」"
translation = "「항…… 서툰 솜씨로 으스대기는, 한심한 건 네 쪽이, 다…… 하아…… 으응……」"

[[dialogue]]
speaker = "アポロ"
original = "「んくっ……うぅ……こんなんじゃ、あたしは何も感じない、ぞ……っ」"
translation = "「응윽…… 으으…… 이런 거로는, 나는 아무것도 느끼지 않는, 다…… 윽」"

[[dialogue]]
speaker = "unk"
original = "抵抗するアポロを責めようと、弱い場所を探るように膣内にペニスを擦り当てていく。"
translation = "저항하는 아폴로를 괴롭히듯, 약한 곳을 탐색하듯이 질 내에 자지를 비벼댄다."

[[dialogue]]
speaker = "アポロ"
original = "「くっ……うぅぅ……中からゴリゴリ、ゴリゴリって、力任せに……」"
translation = "「큭…… 으으으…… 안에서 고릿고릿, 고릿고릿하고, 힘으로만 몰아붙여서……」"

[[dialogue]]
speaker = "unk"
original = "そして膣の浅いところの手前側、いわゆるＧスポットを亀頭で摩擦する。"
translation = "그리고 질의 얕은 곳 입구 쪽, 이른바 G스팟을 귀두로 마찰한다."

[[dialogue]]
speaker = "アポロ"
original = "「ひぃいいっ！？」"
translation = "「히이이익!?」"

[[dialogue]]
speaker = "クロト"
original = "「いい声で鳴くじゃないか。感じないんじゃなかったのか？」"
translation = "「좋은 목소리로 우는군. 느끼지 않는 거 아니었나?」"

[[dialogue]]
speaker = "アポロ"
original = "「な、何でもない……！\u3000こんなので、気持ち良くなるわけ──」"
translation = "「아, 아무것도 아냐……! 이런 걸로, 기분 좋아질 리가──」"

[[dialogue]]
speaker = "unk"
original = "もう一度、さっきと同じところにペニスを押し当ててやる。"
translation = "다시 한번, 방금 전과 같은 곳에 자지를 밀어붙여 준다."

[[dialogue]]
speaker = "アポロ"
original = "「んんん～～～～っ<emoji=heart04>\u3000くっ……おま○この、同じところ、ぐりぐりって……んくっ……うぅっ……」"
translation = "「으으으으~~~~윽<emoji=heart04> 큭…… 보지의, 같은 곳을, 구릿구릿하고…… 응윽…… 으윽……」"

[[dialogue]]
speaker = "アポロ"
original = "「あっ……ふっ……んんっ……ち○ぽ、大きいっ……んぁっ、あっ……そこは、やめ……ん～～っ<emoji=heart04>」"
translation = "「아…… 하…… 으응…… 자지, 너무 커…… 응아, 아…… 거기는, 안 돼…… 으으음~~윽<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「はあぁっ……んひっ……ひぃぃっ<emoji=heart04>\u3000あたしは……正義のヒーローは、屈しない……っ」"
translation = "「하아앗…… 응힉…… 히이익<emoji=heart04> 나는…… 정의의 히어로는, 굴하지 않아…… 윽」"

[[dialogue]]
speaker = "クロト"
original = "「だが愛液が溢れて床に垂れているぞ。小便を漏らしたみたいだ」"
translation = "「하지만 애액이 넘쳐서 바닥에 흐르고 있군. 꼭 오줌을 지린 것 같다」"

[[dialogue]]
speaker = "アポロ"
original = "「～～～～～っ」"
translation = "「~~~~~~~~~윽」"

[[dialogue]]
speaker = "unk"
original = "痴態を指摘され、羞恥と屈辱に震えるアポロ。"
translation = "치태를 지적당하자, 수치심과 굴욕에 부르르 떠는 아폴로."

[[dialogue]]
speaker = "unk"
original = "ペニスで容赦なく突き上げながら、大きく実った胸を力任せに揉み潰す。"
translation = "자지로 가차 없이 쳐올리며, 크게 영근 가슴을 힘껏 움켜쥐어 뭉개버린다."

[[dialogue]]
speaker = "アポロ"
original = "「ひぐぅぅっ……<emoji=heart04>\u3000んんっ……おっぱいまで……はぁ、はっ……あっ……はあぁっ……」"
translation = "「히구우웃……<emoji=heart04> 응윽…… 가슴까지…… 하아, 하…… 아…… 하아앗……」"

[[dialogue]]
speaker = "アポロ"
original = "「んはぁ……はぁっ……おま○こと、一緒にぃ……んんっ……くっ、うぅっ……<emoji=heart04>」"
translation = "「은하아…… 하앗…… 보지랑, 같이이…… 으응…… 큭, 으윽……<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「ち○ぽ、動きながら……おっぱい、揉みくちゃにされてぇ……あっ……んあっ……んんぅ……っ<emoji=heart04>」"
translation = "「자지, 움직이면서…… 가슴, 엉망진창으로 주물러져서…… 아…… 응아…… 응으…… 윽<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「見せつけるように揺らして、男好きするいい乳じゃないか。胸を揉まれてさらに濡らしているぞ」"
translation = "「자랑이라도 하듯 흔들리는 게, 남자들이 좋아할 만한 좋은 젖통이군. 가슴이 주물러지니 더 젖어 들고 있다고」"

[[dialogue]]
speaker = "アポロ"
original = "「ち、違うっ！\u3000あたしは感じてなんか──」"
translation = "「아, 아냐! 나는 느끼고 같은 거──」"

[[dialogue]]
speaker = "unk"
original = "反論しようとするアポロを遮って、硬くなった乳首を指で潰す。"
translation = "반박하려는 아폴로의 말을 가로막고, 딱딱해진 유두를 손가락으로 으깬다."

[[dialogue]]
speaker = "アポロ"
original = "「んひぃぃぃっ<emoji=heart04>\u3000あっ……乳首、ダメっ……はっ、あっ……おま○こぐりぐりしながら、乳首、一緒にぃ……っ<emoji=heart04>」"
translation = "「응히이이익<emoji=heart04> 아…… 유두, 안 돼…… 하, 아…… 보지 구릿구릿하면서, 유두, 같이이…… 윽<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「ひぁっ……あっ……んんっ……<emoji=heart04>\u3000乳首、くりくりするの、やめ──ひぅぅっ<emoji=heart04>\u3000やめ、やめろぉ……っ」"
translation = "「히아…… 아…… 으응……<emoji=heart04> 유두, 만지작거리는 거, 그만── 히우우웃<emoji=heart04> 그만, 그만둬…… 윽」"

[[dialogue]]
speaker = "アポロ"
original = "「ひあああぁっ<emoji=heart04>\u3000またち○ぽ、ゴリゴリってぇっ<emoji=heart04>\u3000はぁはっ、あっ、んんっ……あっ、はっ……ふああっ……<emoji=heart04>」"
translation = "「히아아아앗<emoji=heart04> 또 자지가, 고릿고릿하고오옷<emoji=heart04> 하아하, 아, 으응…… 아, 하…… 후아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「おいおい、完全にメスの声になってるじゃないか。そんなことじゃお前を信じていた民衆ががっかりするぞ」"
translation = "「이봐 이봐, 완전히 암컷의 목소리가 됐잖아. 그런 식이면 너를 믿었던 민중들이 실망할 거다」"

[[dialogue]]
speaker = "アポロ"
original = "「──！\u3000そうだ、あたしには、守るべき人たちがいる……！\u3000みんなが、見てるんだ……！」"
translation = "「──! 맞아, 나에게는 지켜야 할 사람들이 있어……! 모두가 보고 있어……!」"

[[dialogue]]
speaker = "アポロ"
original = "「くっ……うっ……あたしはヒーローなんだ……！\u3000何をされようと、悪には屈しない……！」"
translation = "「큭…… 윽…… 나는 히어로야……! 무슨 일을 당하든, 악에게 굴하지 않아……!」"

[[dialogue]]
speaker = "unk"
original = "ヒーローの矜持を思い出し、喘ぎを漏らしながらも、強気を取り戻すアポロ。"
translation = "히어로의 긍지를 떠올리며, 신음을 흘리면서도 강한 기색을 되찾는 아폴로."

[[dialogue]]
speaker = "unk"
original = "そんなアポロにほくそ笑みながら、思い切りペニスを突き上げる。"
translation = "그런 아폴로를 비웃으며, 힘껏 자지를 쳐올린다."

[[dialogue]]
speaker = "アポロ"
original = "「んひぃぃいいいいいっ<emoji=heart04><emoji=heart04>」"
translation = "「응히이이이이이익<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「んぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ち○ぽ、奥に、どちゅどちゅって<emoji=heart04>\u3000ひぁっ<emoji=heart04>\u3000あぁあっ<emoji=heart04>」"
translation = "「응아앗<emoji=heart04> 아<emoji=heart04> 아<emoji=heart04> 자지, 안쪽에, 도득도득하고<emoji=heart04> 히아<emoji=heart04> 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「くひっ<emoji=heart04>\u3000ひぃんっ<emoji=heart04>\u3000奥に、ゴツンって、来てる<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ひっ<emoji=heart04>\u3000子宮、届いてるぅっ<emoji=heart04>」"
translation = "「쿠힉<emoji=heart04> 히잉<emoji=heart04> 안쪽에, 툭 하고, 오고 있어<emoji=heart04> 응<emoji=heart04> 힉<emoji=heart04> 자궁에, 닿고 있어어엇<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「ひぎっ<emoji=heart04>\u3000いっ<emoji=heart04>\u3000ひぁっ<emoji=heart04>\u3000んあっ～～っ<emoji=heart04>\u3000動けないのにっ<emoji=heart04>\u3000怪人ち○ぽで、むちゃくちゃに突かれてっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ひぁああっ<emoji=heart04>」"
translation = "「히깃<emoji=heart04> 익<emoji=heart04> 히아<emoji=heart04> 응아아~~앗<emoji=heart04> 움직이지도 못하는데<emoji=heart04> 괴인 자지에, 엉망진창으로 찔려서<emoji=heart04> 아<emoji=heart04> 히아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "奥を突かれた途端、アポロが激しい嬌声を撒き散らす。"
translation = "안쪽을 찔리자마자 아폴로가 격렬한 교성을 쏟아낸다."

[[dialogue]]
speaker = "アポロ"
original = "「ひぐっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んぁああっ<emoji=heart04>\u3000やめ、やめろっ<emoji=heart04>\u3000おま○こ壊れるっ<emoji=heart04>\u3000壊れちゃうぅっ<emoji=heart04>\u3000あひっ<emoji=heart04>\u3000ひっ<emoji=heart04>\u3000ひぃんっ<emoji=heart04>」"
translation = "「히굿<emoji=heart04> 응<emoji=heart04> 응아아앗<emoji=heart04> 그만, 그만둬<emoji=heart04> 보지 망가져<emoji=heart04> 망가져 버려어엇<emoji=heart04> 아힉<emoji=heart04> 힉<emoji=heart04> 히잉<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「いいじゃないか。壊れるまで抱き潰してやるよ」"
translation = "「좋지 않나. 망가질 때까지 안아주마」"

[[dialogue]]
speaker = "アポロ"
original = "「んひぃっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000そんなの、らめ<emoji=heart04>\u3000らめぇっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ひぁっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んんっ<emoji=heart04>」"
translation = "「응히잇<emoji=heart04> 아<emoji=heart04> 응<emoji=heart04> 그런 거, 안 대<emoji=heart04> 안 대애애<emoji=heart04> 아<emoji=heart04> 히아<emoji=heart04> 응<emoji=heart04> 으응<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「ひっ<emoji=heart04>\u3000ひんっ<emoji=heart04>\u3000奥、らめっ<emoji=heart04>\u3000そんなに、突かれたらっ<emoji=heart04>\u3000あひぃっ<emoji=heart04>\u3000ひぃぃっ<emoji=heart04>」"
translation = "「힉<emoji=heart04> 히잉<emoji=heart04> 안쪽, 안 대<emoji=heart04> 그렇게, 찔리면<emoji=heart04> 아히잇<emoji=heart04> 히이이익<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "荒々しく子宮口を叩き、アポロの体を内側から蹂躙する。"
translation = "거칠게 자궁구를 때리며 아폴로의 몸을 안쪽에서부터 유린한다."

[[dialogue]]
speaker = "unk"
original = "正義の味方を力ずくでねじ伏せ、欲望のはけ口にする快感に酔い痴れる。"
translation = "정의의 사자를 힘으로 찍어 눌러 욕망의 배출구로 삼는 쾌감에 도취된다."

[[dialogue]]
speaker = "アポロ"
original = "「くひぃっ<emoji=heart04>\u3000ひっ<emoji=heart04>\u3000ひっ<emoji=heart04>\u3000ひぃあああっ<emoji=heart04>\u3000んぁっ──あっ──あっ──ひやぁあああっ<emoji=heart04>」"
translation = "「쿠히잇<emoji=heart04> 힉<emoji=heart04> 힉<emoji=heart04> 히이아아앗<emoji=heart04> 응아── 아── 아── 히야아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「正義は悪に屈しないんじゃなかったのか？\u3000見ているやつらもお前の淫乱さに呆れているぞ」"
translation = "「정의는 악에 굴하지 않는 거 아니었나? 보고 있는 녀석들도 네 음란함에 기가 찰 거다」"

[[dialogue]]
speaker = "アポロ"
original = "「ちが、うっ……んぁっ<emoji=heart04>\u3000ひっ<emoji=heart04>\u3000あたしは、屈して、なんか……──ひああっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000正義は、負け、ない……んんんっ<emoji=heart04>」"
translation = "「아니, 야…… 응아앗<emoji=heart04> 힉<emoji=heart04> 나는, 굴하고, 같은 거……── 히아앗<emoji=heart04> 아<emoji=heart04> 정의는, 지지, 않아…… 으으음<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「ひぁっ<emoji=heart04>\u3000んぁっ<emoji=heart04>\u3000ヒーローは、悪に、屈しな──ふああぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あたしは、気持ち良くなって、なんかぁ……」"
translation = "「히아앗<emoji=heart04> 응아앗<emoji=heart04> 히어로는, 악에, 굴하지 않── 후아아앗<emoji=heart04> 아<emoji=heart04> 나는, 기분 좋아지고, 같은 거어……」"

[[dialogue]]
speaker = "アポロ"
original = "「んひぃいいっ<emoji=heart04>\u3000ち○ぽ、太くて、硬いぃっ<emoji=heart04>\u3000んぁっ<emoji=heart04>\u3000あたしのおま○こ、ち○ぽの形にされてるぅっ<emoji=heart04>」"
translation = "「응히이이익<emoji=heart04> 자지, 굵고, 딱딱해에엣<emoji=heart04> 응아앗<emoji=heart04> 내 보지, 자지 모양이 되어버려어엇<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "アポロを犯す。心も体も犯し尽くしてやる。"
translation = "아폴로를 범한다. 마음도 몸도 전부 범해주마."

[[dialogue]]
speaker = "unk"
original = "邪悪な心のままに、全力で子宮を打ち付ける。"
translation = "사악한 마음이 시키는 대로 온 힘을 다해 자궁을 때린다."

[[dialogue]]
speaker = "アポロ"
original = "「んひぃいいっ<emoji=heart04>\u3000ひっ<emoji=heart04>\u3000いっ<emoji=heart04>\u3000んぁっ<emoji=heart04>\u3000んんあぁぁああああっ<emoji=heart04>」"
translation = "「응히이이익<emoji=heart04> 힉<emoji=heart04> 익<emoji=heart04> 응아앗<emoji=heart04> 응응아아아아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「らめっ<emoji=heart04>\u3000ほんとに、おま○こ壊れるぅっ<emoji=heart04>\u3000んぁ<emoji=heart04>\u3000あ<emoji=heart04>\u3000あ<emoji=heart04>\u3000ひぁああっ<emoji=heart04>」"
translation = "「안 대<emoji=heart04> 정말로, 보지 망가져어엇<emoji=heart04> 응아<emoji=heart04> 아<emoji=heart04> 아<emoji=heart04> 히아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「みんながお前の痴態を見ているぞ？」"
translation = "「모두가 네 치태를 보고 있다고?」"

[[dialogue]]
speaker = "アポロ"
original = "「やめっ<emoji=heart04>\u3000やめろっ<emoji=heart04>\u3000見ないでくれっ<emoji=heart04>\u3000ひぎっ<emoji=heart04>\u3000ぃぃっ<emoji=heart04>\u3000みんなの前で犯されてっ<emoji=heart04>\u3000イッちゃうっ<emoji=heart04>」"
translation = "「그만<emoji=heart04> 그만둬<emoji=heart04> 보지 말아줘<emoji=heart04> 히깃<emoji=heart04> 이잇<emoji=heart04> 모두의 앞에서 범해져서<emoji=heart04> 가버려어엇<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「らめっ<emoji=heart04>\u3000ヒーローなのに<emoji=heart04>\u3000正義の味方なのに<emoji=heart04>\u3000イヤだっ<emoji=heart04>\u3000イキたくないっ<emoji=heart04>\u3000イキたくないぃっ<emoji=heart04>」"
translation = "「안 대<emoji=heart04> 히어로인데<emoji=heart04> 정의의 사자인데<emoji=heart04> 싫어엇<emoji=heart04> 가고 싶지 않아<emoji=heart04> 가고 싶지 않아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「ひっ<emoji=heart04>\u3000いっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んぐぅっ<emoji=heart04>\u3000無理やり、犯されてるのに、おま○こイッちゃうっ<emoji=heart04>」"
translation = "「힉<emoji=heart04> 익<emoji=heart04> 응<emoji=heart04> 응구웃<emoji=heart04> 억지로, 범해지고 있는데, 보지 가버려어엇<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「んぎっ<emoji=heart04>\u3000ひぃっ<emoji=heart04>\u3000イキたくないのにっ<emoji=heart04>\u3000ヒーローなのにっ<emoji=heart04>\u3000怪人ち○ぽに、おま○こ屈しちゃうぅっ<emoji=heart04>」"
translation = "「응깃<emoji=heart04> 히잇<emoji=heart04> 가고 싶지 않은데에엣<emoji=heart04> 히어로인데에엣<emoji=heart04> 괴인 자지에, 보지 굴복해버려어어엇<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「お前の子宮に子種を注ぎ、正義のヒーローを孕ませてやる。怪人の子を身籠って腹を大きくした姿をさらすがいい」"
translation = "「네 자궁에 씨물을 쏟아부어, 정의의 히어로를 임신시켜 주지. 괴인의 아이를 배어 배가 불룩해진 모습을 세상에 드러내라」"

[[dialogue]]
speaker = "アポロ"
original = "「んひっ──<emoji=heart04>\u3000それは、らめっ<emoji=heart04>\u3000らめらめっ<emoji=heart04>\u3000それだけは、らめぇぇっ<emoji=heart04>」"
translation = "「응힉──<emoji=heart04> 그건, 안 대<emoji=heart04> 안 대안 대<emoji=heart04> 그것만은, 안 대애애애<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「やめっ<emoji=heart04>\u3000やめろぉっ<emoji=heart04>\u3000イクっ<emoji=heart04>\u3000イッちゃうっ<emoji=heart04>\u3000子宮に、出されたらイッちゃうからぁっ<emoji=heart04>\u3000孕んじゃうからぁっ<emoji=heart04>」"
translation = "「그만<emoji=heart04> 그만둬어엇<emoji=heart04> 가<emoji=heart04> 가버려어엇<emoji=heart04> 자궁에, 싸버리면 가버리니까아앗<emoji=heart04> 임신해 버리니까아앗<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「んぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あぁっ<emoji=heart04>\u3000ち○ぽ、子宮に、どちゅどちゅって<emoji=heart04>\u3000種付けしようとしてるっ<emoji=heart04>」"
translation = "「응아앗<emoji=heart04> 아<emoji=heart04> 아아앗<emoji=heart04> 자지, 자궁에, 도득도득하고<emoji=heart04> 씨 뿌리려고 하고 있어어엇<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「やめろ、やめろぉっ<emoji=heart04>\u3000怪人ち○ぽで、種付けされる<emoji=heart04>\u3000ひあぁっ<emoji=heart04>\u3000ああっ<emoji=heart04>\u3000ふぁああっ<emoji=heart04>\u3000怪人の赤ちゃん、孕ませられるっ<emoji=heart04>」"
translation = "「그만둬, 그만둬어어엇<emoji=heart04> 괴인 자지로, 씨 뿌려져어엇<emoji=heart04> 히아아앗<emoji=heart04> 아앗<emoji=heart04> 후아아앗<emoji=heart04> 괴인의 아기, 들어서 버려어엇<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「ひぃああっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんんっ<emoji=heart04>\u3000子宮にドピュドピュ射精されて<emoji=heart04>\u3000イクっ<emoji=heart04>\u3000孕んじゃうぅっ<emoji=heart04>」"
translation = "「히이아앗<emoji=heart04> 아<emoji=heart04> 아<emoji=heart04> 으으음<emoji=heart04> 자궁에 푸슉푸슉 사정당해서<emoji=heart04> 가<emoji=heart04> 임신해 버려어어엇<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「ひっ──ひぐっ──<emoji=heart04>\u3000らめらめらめっ<emoji=heart04>\u3000イヤなのにっ<emoji=heart04>\u3000あたしの卵子<emoji=heart04>\u3000怪人の精子に、屈しちゃうっ<emoji=heart04>」"
translation = "「힉──히굿──<emoji=heart04> 안 대안 대안 대<emoji=heart04> 싫은데에엣<emoji=heart04> 내 난자<emoji=heart04> 괴인의 정자에, 굴복해버려어엇<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「ひぃああっ<emoji=heart04>\u3000んああっ<emoji=heart04>\u3000ち○ぽドクドクして、射精しようとしてるっ<emoji=heart04>\u3000出すなっ、出すなぁっ<emoji=heart04>」"
translation = "「히이아앗<emoji=heart04> 응아아앗<emoji=heart04> 자지 울컥울컥하면서, 사정하려고 하고 있어어엇<emoji=heart04> 싸지 마, 싸지 마아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「んぁっ<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000ち○ぽビクビクって、爆発しそうっ<emoji=heart04>\u3000出るっ<emoji=heart04>\u3000出るぅっ<emoji=heart04>\u3000やめろ、やめろ、やめろぉっ──」"
translation = "「응아앗<emoji=heart04> 아아앗<emoji=heart04> 자지 움찔움찔하고, 폭발할 것 같아어엇<emoji=heart04> 나온다<emoji=heart04> 나와아아앗<emoji=heart04> 그만둬, 그만둬, 그만둬어어엇──」"

[[dialogue]]
speaker = "クロト"
original = "「民衆ども、お前たちのヒーローが悪に屈する瞬間を目に焼き付けろ……！」"
translation = "「민중들이여, 너희의 히어로가 악에 굴복하는 순간을 눈에 새겨라……!」"

[[dialogue]]
speaker = "アポロ"
original = "「やめろぉぉおおお～～～～～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「그만둬어어어어어어어어~~~~~~~~~엇<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「んひっ──ひぁあああ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응힉──히아아아아아아아아~~~~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「んぎっ<emoji=heart04>\u3000ひっ<emoji=heart04>\u3000ひいぃっ<emoji=heart04>\u3000ドクドク、出て<emoji=heart04>\u3000イッてりゅっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000おま○こイッてりゅぅぅっ<emoji=heart04>」"
translation = "「응깃<emoji=heart04> 힉<emoji=heart04> 히이이익<emoji=heart04> 울컥울컥, 나와서<emoji=heart04> 가고 있어어엇<emoji=heart04> 응응<emoji=heart04> 보지 가버리고 있어어어어엇<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「ひぁああっ<emoji=heart04>\u3000あちゅいぃっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000んぁっ<emoji=heart04>\u3000あちゅいの<emoji=heart04>\u3000中に、出てりゅっ<emoji=heart04>\u3000怪人の子ども、孕まされてりゅぅっ<emoji=heart04>」"
translation = "「히아아앗<emoji=heart04> 뜨거워어엇<emoji=heart04> 응응<emoji=heart04> 응아앗<emoji=heart04> 뜨거운 게<emoji=heart04> 안에, 나오고 있어어엇<emoji=heart04> 괴인의 아이, 들어서 버리고 있어어어엇<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスを子宮口に叩きつけ、アポロの奥に精を吐き出す。"
translation = "자지를 자궁구에 들이받으며 아폴로의 깊숙한 곳에 정을 토해낸다."

[[dialogue]]
speaker = "unk"
original = "正義のヒーローを堕とし、子を孕ませる──そんな下卑た欲望をありったけ子宮に注ぐ。"
translation = "정의의 히어로를 타락시키고 아이를 배게 한다── 그런 천박한 욕망을 있는 대로 자궁에 쏟아붓는다."

[[dialogue]]
speaker = "アポロ"
original = "「せーえきいっぱい、注がれてっ<emoji=heart04>\u3000らめっ<emoji=heart04>\u3000怪人せーし、受精しひゃうっ<emoji=heart04>\u3000んひぃっ<emoji=heart04>\u3000ひぐっ……んん～～っ<emoji=heart04>」"
translation = "「저-엉액 잔뜩, 쏟아져서어어엇<emoji=heart04> 안 대<emoji=heart04> 괴인 저-엉자, 수정돼버려어어엇<emoji=heart04> 응히잇<emoji=heart04> 히굿…… 으으음~~윽<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「あっ……あっ……<emoji=heart04>\u3000ドプドプって、たくさん入ってきてる……<emoji=heart04>\u3000んっ……<emoji=heart04>\u3000こんなの絶対、孕んじゃうぅ……<emoji=heart04>」"
translation = "「아…… 아……<emoji=heart04> 꿀렁꿀렁하고, 잔뜩 들어오고 있어……<emoji=heart04> 응……<emoji=heart04> 이런 건 절대, 임신해 버려어어……<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「ふはぁ……はぁ……はぁ……ん、はあぁ……<emoji=heart04>」"
translation = "「푸하아…… 하아…… 하아…… 응, 하아아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスが抜けると、大量に注がれた精液がごぼっとこぼれる。"
translation = "자지가 빠져나가자, 대량으로 주입된 정액이 울컥 쏟아져 나온다."

[[dialogue]]
speaker = "unk"
original = "正義の味方を征服し、蹂躙し、屈服させた証だ。"
translation = "정의의 사자를 정복하고, 유린하고, 굴복시킨 증거다."

[[dialogue]]
speaker = "アポロ"
original = "「みんなの前で、イッちゃった……はぁ……はあぁ……<emoji=heart04>」"
translation = "「모두의 앞에서, 가버렸어…… 하아…… 하아아……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「民衆に謝罪するんだな。ヒーローなのに悪に屈してごめんなさい、と」"
translation = "「민중에게 사죄해야겠지. 히어로인데 악에게 굴복해서 죄송합니다, 라고」"

[[dialogue]]
speaker = "アポロ"
original = "「あ……<emoji=heart04>」"
translation = "「아……<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「あたし……アポロは、ヒーローなのに……悪いやつに犯されて……イッちゃいました……<emoji=heart04>」"
translation = "「나…… 아폴로는, 히어로인데…… 나쁜 녀석에게 범해져서…… 가버렸습니다……<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「怪人ち○ぽに屈しちゃう、ザコま○こで、ごめんなさい……<emoji=heart04>」"
translation = "「괴인 자지에 굴복해 버리는, 허접 보지라서, 죄송합니다……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "完全に屈服し、敗北を宣言したアポロに熱いものを覚える。"
translation = "완전히 굴복하여 패배를 선언한 아폴로에게 뜨거운 무언가를 느낀다."

[[dialogue]]
speaker = "unk"
original = "あのアポロをここまで染めてしまったことに罪悪感がなくはないものの、圧倒的な興奮が上回った。"
translation = "그 아폴로를 여기까지 물들여 버렸다는 죄책감이 없지는 않았으나, 압도적인 흥분이 앞섰다."

[[dialogue]]
speaker = "アポロ"
original = "「はぁ……すごかったな……ほんとに……。お前、怪人役やるのうますぎだろ……」"
translation = "「하아…… 굉장했어…… 정말로……. 너, 괴인 역 연기 너무 잘하는 거 아냐……」"

[[dialogue]]
speaker = "アポロ"
original = "「じゃあ──」"
translation = "「그럼──」"

[[dialogue]]
speaker = "アポロ"
original = "「あたしの番だな」"
translation = "「내 차례네」"

[[dialogue]]
speaker = "unk"
original = "アポロが不敵な笑顔を浮かべ、俺を押し倒してその上に跨る。"
translation = "아폴로가 대담한 미소를 지으며 나를 밀어트리고 그 위에 올라탄다."

[[dialogue]]
speaker = "クロト"
original = "「アポロ……？」"
translation = "「아폴로……?」"

[[dialogue]]
speaker = "アポロ"
original = "「ヒーローが悪に負けたままってわけにはいかないだろ？\u3000お前が参りましたって言うまで、徹底的に搾り取ってやるからな！」"
translation = "「히어로가 악에게 지고만 있을 수는 없잖아? 네가 잘못했다고 빌 때까지 철저하게 짜내 줄 테니까!」"

[[dialogue]]
speaker = "アポロ"
original = "「さっきの屈辱を倍返し、いや十倍返しにしてやる！\u3000悪の怪人め、覚悟しろ！」"
translation = "「아까의 굴욕을 두 배, 아니 열 배로 갚아주마! 악의 괴인 놈아, 각오해라!」"

[[dialogue]]
speaker = "クロト"
original = "「え？？\u3000あああっ──！？」"
translation = "「에?? 아아앗──!?」"

[[dialogue]]
speaker = "unk"
original = "攻守が逆転し、足腰立たなくなるまでアポロに絞られたのだった──"
translation = "공수가 역전되어, 허리를 못 쓸 때까지 아폴로에게 쥐어 짜여 버린 것이었다──"

