[[dialogue]]
speaker = "unk"
original = "ここは──星徒会室？"
translation = "여기는── 성도회실?"

[[dialogue]]
speaker = "unk"
original = "おかしいです。私は、アステラの中でシュティレさんと一緒に戦っていたはず……"
translation = "이상해요. 저는 아스텔라 안에서 슈틸레 씨와 함께 싸우고 있었을 텐데……"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あ～、よかった。書類がぜんぜん見つからなくて困ってたの。さっすがアナちゃんね～♪」"
translation = "「아~ 다행이다. 서류가 전혀 보이지 않아서 곤란했거든. 역시 아나 짱이야~♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふっふーん、当然よね！\u3000アナがいないとうちの星徒会は１日も持たないんだから！」"
translation = "「훗흥, 당연하지! 아나가 없으면 우리 성도회는 하루도 못 버틴다니까!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「もう、アナにばっかり頼ったらダメだよ！\u3000でもありがとうアナ、助かっちゃった」"
translation = "「정말, 아나한테만 너무 의지하면 안 돼! 그래도 고마워 아나, 도움이 됐어.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ノープロブレム。補佐するのが私の役目です」"
translation = "「노 프로블럼. 보좌하는 것이 제 역할입니다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「まあ、それとは別に、先輩方にはもう少ししっかりしていただきたいですが」"
translation = "「뭐, 그것과는 별개로 선배님들께서 조금 더 정신을 차려주셨으면 합니다만.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そうよね～。私たち、何でもアナちゃんに頼りすぎだったかも」"
translation = "「그렇지~. 우리, 뭐든 아나 짱에게 너무 의지했었을지도.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「反省しましょう、反省！」"
translation = "「반성하자, 반성!」"

[[dialogue]]
speaker = "unk"
original = "──違います。反省なんていりません。"
translation = "──아니에요. 반성 같은 건 필요 없어요."

[[dialogue]]
speaker = "unk"
original = "だって私は、いつも先輩たちに、守ってもらっていました。"
translation = "왜냐하면 저는 항상 선배들에게 보호받고 있었으니까요."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「大丈夫、アナちゃん！」"
translation = "「괜찮아, 아나 짱!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「遅れちゃってごめんね！\u3000あとは私たちに任せておいて！」"
translation = "「늦어서 미안해! 나머지는 우리한테 맡겨둬!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「よくもうちの可愛い後輩をいじめてくれたわね！\u3000どっかーんと百倍返しよ！！」"
translation = "「감히 우리 귀여운 후배를 괴롭히다니! 콰광 하고 백 배로 갚아주겠어!!」"

[[dialogue]]
speaker = "unk"
original = "──いつも感謝していました。口に出したこと、ありませんでしたけれど。"
translation = "──항상 감사하고 있었어요. 입 밖으로 낸 적은 없었지만요."

[[dialogue]]
speaker = "unk"
original = "私にとって、あなたたちは憧れそのもの。"
translation = "제게 있어 당신들은 동경 그 자체."

[[dialogue]]
speaker = "unk"
original = "優しい先輩。甘えられる先輩。頼りになる先輩。"
translation = "상냥한 선배. 응석 부릴 수 있는 선배. 의지가 되는 선배."

[[dialogue]]
speaker = "unk"
original = "──どんな時でも傍にいてくれる、大切な人たち。"
translation = "──어떤 때라도 곁에 있어 주는 소중한 사람들."

[[dialogue]]
speaker = "unk"
original = "だから焦っていました。ノヴァフォームの存在を知ったその日から、大好きな先輩たちの足を引っ張っている思いが、日に日に膨らんでいきました。"
translation = "그래서 조급했어요. 노바 폼의 존재를 알게 된 그날부터, 좋아하는 선배들의 발목을 잡고 있다는 생각이 날이 갈수록 커져만 갔어요."

[[dialogue]]
speaker = "unk"
original = "早くノヴァフォームに目覚めたい。迷惑な存在になりたくない。焦る、焦る、焦る──"
translation = "빨리 노바 폼에 눈뜨고 싶어. 폐를 끼치는 존재가 되고 싶지 않아. 조급해, 조급해, 조급해──"

[[dialogue]]
speaker = "unk"
original = "ずっと焦り続けて、今日まで来ました──"
translation = "계속 조급해하며 오늘까지 왔습니다──"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「──アナお姉ちゃん！\u3000目を開けてください……！\u3000しっかり……しっかりして……！」"
translation = "「──아나 언니! 눈을 뜨세요……! 정신 차려…… 정신 차려요……!」"

[[dialogue]]
speaker = "unk"
original = "これは、シュティレさんの声……？"
translation = "이건 슈틸레 씨의 목소리……?"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ああ──そっか」"
translation = "「아── 그렇구나.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「私、戦い続けて、倒れて……」"
translation = "「나, 계속 싸우다가 쓰러져서……」"

[[dialogue]]
speaker = "unk"
original = "早く戻らないと──あの子を守らないと。"
translation = "빨리 돌아가야 해── 저 아이를 지켜야 해."

[[dialogue]]
speaker = "unk"
original = "大好きな先輩に失望されるだなんていう、くだらない焦りよりももっと強い思いが胸に宿る。"
translation = "좋아하는 선배에게 실망할지도 모른다는 시시한 조급함보다 훨씬 더 강한 마음이 가슴에 깃든다."

[[dialogue]]
speaker = "unk"
original = "自分を慕ってくれる後輩を守りたい。"
translation = "자신을 따르는 후배를 지키고 싶어."

[[dialogue]]
speaker = "unk"
original = "私の焦りなんてどうでもいい。どうでもいいんです──"
translation = "나의 조급함 따윈 아무래도 좋아. 아무래도 좋단 말이야──"

[[dialogue]]
speaker = "unk"
original = "大切なものを守る力を、どうか、私に──"
translation = "소중한 것을 지킬 힘을, 제발 내게──"

[[dialogue]]
speaker = "unk"
original = "──アナ！！！！"
translation = "──아나!!!!"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「あ──」"
translation = "「아──」"

[[dialogue]]
speaker = "unk"
original = "会長の声が聞こえる。"
translation = "회장의 목소리가 들려."

[[dialogue]]
speaker = "unk"
original = "今ならいける──輝きが見える！！"
translation = "지금이라면 갈 수 있어── 빛이 보여!!"

[[dialogue]]
speaker = "unk"
original = "よく頑張ったな……！！"
translation = "정말 잘 버텨줬어……!!"

[[dialogue]]
speaker = "unk"
original = "輝き？"
translation = "빛?"

[[dialogue]]
speaker = "unk"
original = "それは──私の、新しい力……？"
translation = "그것은── 나의 새로운 힘……?"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「──はい」"
translation = "「──네.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「お願いします、会長……！！」"
translation = "「부탁드려요, 회장……!!」"

[[dialogue]]
speaker = "unk"
original = "アルケインノヴァ……エクストリーム！！"
translation = "아케인 노바…… 익스트림!!"

[[dialogue]]
speaker = "unk"
original = "俺は持てる全ての魔王の力を込めて、アナの中に宿る輝きに触れた。"
translation = "나는 가진 모든 마왕의 힘을 담아 아나 안에 깃든 빛에 닿았다."

[[dialogue]]
speaker = "unk"
original = "そして降り立つ──覚醒した火星の天使が。"
translation = "그리고 내려앉는다── 각성한 화성의 천사가."

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「──しゅわっち。遅いですよ、会長」"
translation = "「──슈왓치. 늦었어요, 회장.」"

[[dialogue]]
speaker = "unk"
original = "アナ、気が付いたか……！"
translation = "아나, 정신이 들어……!"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「……危ない所でした。ああいうのが走馬灯って言うんでしょうか。でも、もう問題ありません。戦線に復帰します」"
translation = "「……위험한 참이었습니다. 저런 걸 주마등이라고 하는 걸까요. 하지만 이제 문제없습니다. 전선에 복귀할게요.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「アナお姉ちゃん、怪我が治って……さっきとは比較にならない星力を……これが、ノヴァフォーム？」"
translation = "「아나 언니, 상처가 낫고…… 아까와는 비교도 안 되는 성력을…… 이게 노바 폼?」"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「ご心配をおかけしました、シュティレさん。さぁ、反撃開始です」"
translation = "「걱정 끼쳐 드렸네요, 슈틸레 씨. 자, 반격 개시입니다.」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「ガァァァアア──！！」"
translation = "「가아아아아──!!」"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「突破します──エクスプロージョン・オメガ！」"
translation = "「돌파합니다── 익스플로전 오메가!」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「ギィィイイ──！？」"
translation = "「기이이이──!?」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「さっきまであんなに手こずっていたのに……星力総量、解析不能レベル！」"
translation = "「방금 전까지 그렇게 애먹었는데…… 성력 총량, 해석 불능 레벨!」"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「アステラを破壊しましょう。会長がここにいるということは、外はアニマ先輩が戦ってくれているんですよね？」"
translation = "「아스텔라를 파괴하죠. 회장이 여기 있다는 건 밖은 아니마 선배가 싸워주고 계신 거겠죠?」"

[[dialogue]]
speaker = "unk"
original = "ああ！"
translation = "아아!"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「それではいきます。プラネットマルス・ノヴァ──セット！！」"
translation = "「그럼 갑니다. 플래닛 마르스 노바── 셋!!」"

[[dialogue]]
speaker = "unk"
original = "アナの放った炎熱の弓矢が、アステライトを内部から粉砕していく──！"
translation = "아나가 쏜 염열의 화살이 아스텔라이트를 내부에서 분쇄해 나간다──!"

[[dialogue]]
speaker_original = "ギガンドム"
speaker_translation = "기간돔"
original = "「グギギ──ギ──！」"
translation = "「구기기── 기──!」"

[[dialogue]]
speaker_original = "アニマ（覚醒）"
speaker_translation = "아니마(각성)"
original = "「やれやれ、大概しつこいナ、キミ。アニマの火力だけじゃあトドメまでは刺せないカ──って？」"
translation = "「이런이런, 더럽게 끈질기다타, 너. 아니마의 화력만으로는 숨통을 끊을 수 없는 건가다타── 어라?」"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「本日２度目のしゅわっち」"
translation = "「오늘 두 번째 슈왓치.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「私もしゅわっち。遅れてすみません、マスター」"
translation = "「저도 슈왓치. 늦어서 죄송합니다, 마스터.」"

[[dialogue]]
speaker_original = "アニマ（覚醒）"
speaker_translation = "아니마(각성)"
original = "「フヒ！\u3000ずいぶんおめかししたナ、アナ？\u3000シュティレも無事でなによりダ」"
translation = "「후히! 제법 멋지게 차려입었다타, 아나? 슈틸레도 무사해서 다행이다타.」"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「そういうアニマ先輩こそ。お互い、実りのある戦いだったようです」"
translation = "「그런 아니마 선배야말로요. 서로 결실이 있는 전투였던 모양이네요.」"

[[dialogue]]
speaker_original = "アニマ（覚醒）"
speaker_translation = "아니마(각성)"
original = "「うむ、それじゃあ幕引きと行こうカ？」"
translation = "「음, 그럼 막을 내려볼까다타?」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「はい、シュティレもお手伝いいたします」"
translation = "「네, 슈틸레도 돕겠습니다.」"

[[dialogue]]
speaker = "unk"
original = "よし──行くぞ！！"
translation = "좋아── 가자!!"

[[dialogue]]
speaker = "unk"
original = "俺たち４人は、決着をつけるためのギガンドムへ突撃する。"
translation = "우리 네 명은 결판을 내기 위해 기간돔으로 돌격한다."

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「カーマイン・アロー……シュート！！」"
translation = "「카마인 애로우…… 슛!!」"

