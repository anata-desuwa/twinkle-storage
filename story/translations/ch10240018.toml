[[dialogue]]
speaker = "unk"
original = "ヨミと恋人関係になってから、しばらく経ったある日──"
translation = "요미와 연인 관계가 되고 나서 시간이 좀 흐른 어느 날──"

[[dialogue]]
speaker = "ヨミ"
original = "「こやんっ♪\u3000も、もう、会長ってば……尻尾のモフり方がやらしいですよ？」"
translation = "「코양♪ 정, 정말, 회장님도 참…… 꼬리 만지는 법이 야해요.」"

[[dialogue]]
speaker = "ヨミ"
original = "「あっ、近いです会長……くんくん……んっ……耳に息吹き掛けちゃダメですぅ……<emoji=heart04>」"
translation = "「앗, 가까워요 회장님…… 킁킁…… 응…… 귀에 입김 불면 안 돼요……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「んふぅ……くんくん、くんくん♪\u3000はぁぁ……♪\u3000会長の匂いを嗅いでいると、うっとりしちゃいますぅ……♪」"
translation = "「응후…… 킁킁, 킁킁♪ 하아아……♪ 회장님 냄새를 맡고 있으면 황홀해져요……♪」"

[[dialogue]]
speaker = "ヨミ"
original = "「えぇ……今日はトレーニング施設を貸し切ってるって……職権乱用じゃないですか。そ、そういうのはよくないと思います……くんくん♪」"
translation = "「에에…… 오늘은 트레이닝 시설을 대관했다니…… 직권 남용 아니에요? 그, 그런 건 좋지 않다고 생각해요…… 킁킁♪」"

[[dialogue]]
speaker = "unk"
original = "しかし、そんなことを言いつつも、ヨミの顔は早くも蕩けだしている。匂いフェチであるヨミは、俺の汗の匂いをたくさん嗅ぐと、発情してしまうのだった。"
translation = "하지만 그런 말을 하면서도 요미의 얼굴은 벌써 녹아내리고 있다. 냄새 페티시인 요미는 내 땀 냄새를 잔뜩 맡으면 발정해버리는 것이었다."

[[dialogue]]
speaker = "クロト"
original = "「ヨミ……ダメかな？」"
translation = "「요미…… 안 될까?」"

[[dialogue]]
speaker = "ヨミ"
original = "「き、急に呼び捨てはずるいですよぉ……もう、会長の爆裂スケベ……<emoji=heart04>」"
translation = "「기, 갑자기 말을 놓는 건 반칙이에요…… 정말, 회장님은 폭렬 변태……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "こくり、と頷くヨミを更衣室へと連れ込み、俺は彼女を押し倒した──"
translation = "고개를 끄덕이는 요미를 탈의실로 데려가, 나는 그녀를 밀어트렸다──"

[[dialogue]]
speaker = "ヨミ"
original = "「──って、会長！？\u3000ど、どうして私の脇に顔を近づけて、鼻をくんくんさせてるんです！？」"
translation = "「──랄까, 회장님!? 어, 어째서 제 겨드랑이에 얼굴을 가까이 대고 코를 킁킁거리는 건가요!?」"

[[dialogue]]
speaker = "クロト"
original = "「いや、今日はヨミヨミの匂いを嗅ぎながら、エッチしたいなー、と思って」"
translation = "「아니, 오늘은 요미요미의 냄새를 맡으면서 하고 싶어서」"

[[dialogue]]
speaker = "ヨミ"
original = "「こやぁっ！？\u3000何でですか！？」"
translation = "「코얏!? 왜 그러시는 거예요!?」"

[[dialogue]]
speaker = "ヨミ"
original = "「いや、確かに私はいつも、会長のことをくんくんしてますけれど、するのとされるのでは違うと言いますか……！」"
translation = "「아니, 확실히 저는 항상 회장님 냄새를 킁킁대지만, 하는 것과 당하는 것은 다르다고 할까……!」"

[[dialogue]]
speaker = "ヨミ"
original = "「い、今はトレーニングの後ですし、絶対に汗臭いですから……ああぁぁぁぁっ。そ、そんな積極的に嗅がれると、恥ずかしいっていうかぁ……！」"
translation = "「지, 지금은 트레이닝 직후라 분명 땀 냄새가 날 텐데…… 아아아아악. 그, 그렇게 적극적으로 맡으시면 부끄럽다고나 할까……!」"

[[dialogue]]
speaker = "ヨミ"
original = "「その……やっぱり、シャワー浴びてからにしませんか！？」"
translation = "「그…… 역시 샤워하고 나서 하면 안 될까요!?」"

[[dialogue]]
speaker = "クロト"
original = "「俺も匂いフェチの──ヨミの気持ちが知りたいんだ。ダメかな？」"
translation = "「나도 냄새 페티시인── 요미의 기분을 알고 싶어. 안 될까?」"

[[dialogue]]
speaker = "ヨミ"
original = "「うぅ……！\u3000そ、そう言われてしまうと……こやんっ！？」"
translation = "「으으……! 그, 그렇게 말씀하시면…… 코양!?」"

[[dialogue]]
speaker = "ヨミ"
original = "「ふあぁっ<emoji=heart04>\u3000尻尾の付け根撫でるの、ダメぇっ……<emoji=heart04>\u3000感じちゃい、ますからぁ……あんんっ<emoji=heart04>」"
translation = "「후아앗<emoji=heart04> 꼬리 뿌리 만지는 거, 안 돼에……<emoji=heart04> 느껴버리, 니까요…… 앙응<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「ふぅぅっ、はぁ、はぁ、んっ、んんぅ……わ、わかりましたぁ。でも、私は会長の匂いが大好きですけど、か、会長が私の匂いを好きになれるかは、わかりませんよ……？」"
translation = "「후우우, 하아, 하아, 응, 으응…… 아, 알겠습니다아. 하지만 저는 회장님 냄새를 정말 좋아하지만, 회, 회장님이 제 냄새를 좋아하게 될지는 모르겠어요……?」"

[[dialogue]]
speaker = "ヨミ"
original = "「だからもし、途中で嫌になったりしたら、シャワーを浴びて仕切り直しを……んんっ<emoji=heart04>」"
translation = "「그러니까 혹시 도중에 싫어지면 샤워하고 다시 시작을…… 응응<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「あっ……か、会長のおち○ぽ様、私のおま○こに当たって、ます……<emoji=heart04>\u3000んっ、ふあぁっ<emoji=heart04>」"
translation = "「앗…… 회, 회장님의 자지님, 제 보지에 닿고, 있어요……<emoji=heart04> 응, 후아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「こやんっ、おち○ぽ様おっきい……<emoji=heart04>\u3000ああ、逞しくて太くて……くんくん<emoji=heart04>\u3000凄くエッチなオスの匂いがしますぅ……<emoji=heart04>\u3000ふぅぅっ、体震えちゃうぅ……<emoji=heart04>」"
translation = "「코양, 자지님 커어……<emoji=heart04> 아아, 늠름하고 굵어서…… 킁킁<emoji=heart04> 굉장히 야한 수컷 냄새가 나요……<emoji=heart04> 후우우, 몸이 떨려버려어……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「私のところまで、おち○ぽ様のお汁の匂いが届いて……んっ、すぅぅ……<emoji=heart04>\u3000はぁぁ……んんっ、はぁぁぁぁぁ<emoji=heart04><emoji=heart04>\u3000くらくらしますぅ<emoji=heart04>」"
translation = "「제 코까지 자지님의 즙 냄새가 닿아서…… 응, 스으으……<emoji=heart04> 하아아…… 응응, 하아아아아아<emoji=heart04><emoji=heart04> 어질어질해요<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「すうぅ……はあぁ……<emoji=heart04>\u3000おち○ぽ様の匂いだけで私……<emoji=heart04>\u3000頭おかしくなっちゃいそう……<emoji=heart04>\u3000くんくんっ……んんっ、はああぁぁぁっ<emoji=heart04>」"
translation = "「스으으…… 하아아……<emoji=heart04> 자지님 냄새만으로 저……<emoji=heart04> 머리가 이상해질 것 같아……<emoji=heart04> 킁킁…… 응응, 하아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「これから匂い嗅がれちゃうのに……すぅぅっ、こんなエッチな匂い嗅いじゃったら、私、私ぃ……<emoji=heart04>」"
translation = "「이제부터 냄새를 맡아버릴 텐데…… 스으으, 이런 야한 냄새를 맡아버리면, 나, 나는……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「んあっ、はあぁっ、あっ、ああっ<emoji=heart04>\u3000おち○ぽ様、入っちゃ……ふああぁぁぁっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응앗, 하아앗, 앗, 아앗<emoji=heart04> 자지님, 들어와…… 후아아아앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「おち○ぽ様、きたぁぁぁっ<emoji=heart04>！\u3000んあっ、ふあぁんっ……すっごくおっきいぃ<emoji=heart04>\u3000こやぁんっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「자지님, 왔다아아앗<emoji=heart04>! 응앗, 후아앙…… 정말 커요오<emoji=heart04> 코야앙<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「あっ、あっ、気持ち良いっ、そこっ<emoji=heart04>\u3000おま○この入り口、おち○ぽ様でぞりぞりって、されるとぉ……っ、んふぁっ、はあっ、気持ち良いですぅっ……ふあぁぁんっ<emoji=heart04>」"
translation = "「앗, 앗, 기분 좋아, 거기<emoji=heart04> 보지 입구를 자지님으로 질척질척하게 비벼지면…… 윽, 응하앗, 하앗, 기분 좋아요…… 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「だ、ダメぇ<emoji=heart04>\u3000おち○ぽ様好きですぅ<emoji=heart04>\u3000はぁぁっ、やっぱり好きぃっ<emoji=heart04>\u3000ふあぁっ、気持ち良くしてくれて、大好きですぅ<emoji=heart04>\u3000んあっ、はああっ、んあぁぁっ<emoji=heart04>」"
translation = "「아, 안 돼에<emoji=heart04> 자지님 좋아요오<emoji=heart04> 하아아앗, 역시 좋아앗<emoji=heart04> 후아앗, 기분 좋게 해줘서 정말 좋아요오<emoji=heart04> 응앗, 하아앗, 응아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ヨミが快楽に流されている隙に、俺は腋に顔を近付ける。"
translation = "요미가 쾌락에 휩쓸린 틈을 타, 나는 겨드랑이에 얼굴을 가까이한다."

[[dialogue]]
speaker = "ヨミ"
original = "「やあぁんっ<emoji=heart04>\u3000やっぱり腋、嗅いじゃダメですぅ<emoji=heart04>\u3000は、恥ずかしいぃぃ<emoji=heart04>\u3000ふあぁっ！\u3000あっ、あっ、おち○ぽ様ピストンで、誤魔化すのダメぇっ<emoji=heart04>\u3000はうぅぅんっ<emoji=heart04>」"
translation = "「야아앙<emoji=heart04> 역시 겨드랑이 맡으면 안 돼요오<emoji=heart04> 부, 부끄러워어어<emoji=heart04> 후아앗! 앗, 앗, 자지님 피스톤으로 얼버무리는 거 안 돼에<emoji=heart04> 하우우웅<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「こやぁぁっ、嗅がれてるっ<emoji=heart04>\u3000会長にくんくんされちゃってますぅ<emoji=heart04>\u3000恥ずかしい、恥ずかしいよぉぉ<emoji=heart04>\u3000絶対に汗で匂うのにぃ……はあぁぁっ<emoji=heart04>」"
translation = "「코야아앗, 맡아지고 있어어<emoji=heart04> 회장님이 킁킁대고 있어요오<emoji=heart04> 부끄러워, 부끄러워요오오<emoji=heart04> 분명 땀 냄새가 날 텐데…… 하아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「はあんっ<emoji=heart04>\u3000恥ずかしいのに<emoji=heart04>\u3000恥ずかしいだけの、はずなのにぃ……<emoji=heart04>\u3000ふわぁぁん<emoji=heart04>\u3000どうしてっ、あぁぁぁっ、いつもよりおま○こ、熱くなってきちゃってるよぉっ<emoji=heart04>」"
translation = "「하앙<emoji=heart04> 부끄러운데<emoji=heart04> 부끄러울 뿐이어야 하는데……<emoji=heart04> 후와아앙<emoji=heart04> 어째서, 아아아앗, 평소보다 보지가 뜨거워지고 있어어<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「これがヨミの匂いか……確かに、少し汗臭いね……くんくん」"
translation = "「이게 요미의 냄새인가…… 확실히 조금 땀 냄새가 나네…… 킁킁」"

[[dialogue]]
speaker = "ヨミ"
original = "「嫌ぁ……<emoji=heart04>\u3000はぁんっ、会長、そんな顔突っ込んで嗅いじゃダメぇ<emoji=heart04>\u3000ふああぁんっ、良い匂いじゃないなら、離れて下さいぃ……！\u3000はぁっ、んあぁっ、恥ずかしいですぅ<emoji=heart04>」"
translation = "「싫어어……<emoji=heart04> 하앙, 회장님, 그렇게 얼굴을 처박고 맡으면 안 돼에<emoji=heart04> 후아아앙, 좋은 냄새가 아니라면 떨어져 주세요……! 하앗, 응아앗, 부끄러워요오<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「恥ずかしいっ<emoji=heart04>\u3000恥ずかしいっ<emoji=heart04>\u3000恥ずかしいのぉぉっ<emoji=heart04>\u3000こやぁぁぁん<emoji=heart04>\u3000んはぁぁぁっ……なのにどうしてぇ<emoji=heart04>\u3000くんくんされるとぉ、おま○こ気持ちよくなっちゃぅぅぅ<emoji=heart04>」"
translation = "「부끄러워앗<emoji=heart04> 부끄러워앗<emoji=heart04> 부끄러워어어엇<emoji=heart04> 코야아아앙<emoji=heart04> 응하아아앗…… 그런데 어째서어<emoji=heart04> 킁킁대면 보지가 기분 좋아져버려어어어<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「恥ずかしいのに身体がゾクゾクしちゃってますぅ<emoji=heart04>\u3000んあぁっ、おま○こから愛液溢れちゃってるぅ<emoji=heart04>\u3000あんんっ、会長に嗅がれて興奮しちゃってるのぉ？\u3000はあぁぁぁっ<emoji=heart04><emoji=heart04>」"
translation = "「부끄러운데 몸이 오싹오싹해요오<emoji=heart04> 응아앗, 보지에서 애액이 넘쳐흘러어<emoji=heart04> 앙응, 회장님이 맡아서 흥분해버린 거야? 하아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「味はどうかな……？」"
translation = "「맛은 어떨까……?」"

[[dialogue]]
speaker = "ヨミ"
original = "「こやっ！？\u3000会長、脇を舐めたりしちゃ……ふあぁぁぁんっ<emoji=heart04>！？\u3000あっ、ダメッ、んあぁぁぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ペロペロしちゃダメですぅ……はあぁぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「코얏!? 회장님, 겨드랑이를 핥거나 하면…… 후아아아앙!? 앗, 안 돼, 응아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 낼름낼름하면 안 돼요오…… 하아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000気持ち良いっ<emoji=heart04>\u3000脇舐め恥ずかしいのにっ<emoji=heart04>\u3000おま○こ勝手に反応して、気持ち良くなっちゃいますっ<emoji=heart04>\u3000あっ、やぁっ、んぅ、ふあぁぁぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 기분 좋아앗<emoji=heart04> 겨드랑이 핥는 거 부끄러운데도<emoji=heart04> 보지가 멋대로 반응해서 기분 좋아져버려요앗<emoji=heart04> 앗, 야앗, 응으, 후아아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「ふあぁっ、あぁんっ<emoji=heart04>\u3000くすぐったいのに気持ちよくてっ……んはあぁぁっ<emoji=heart04>\u3000おち○ぽ様、もっと欲しくなっちゃう<emoji=heart04>\u3000腰、勝手に動いちゃいますぅ……はあぁっん<emoji=heart04>！」"
translation = "「후아앗, 아앙<emoji=heart04> 간지러운데 기분 좋아서…… 응하아아앗<emoji=heart04> 자지님 더 갖고 싶어져어<emoji=heart04> 허리가 멋대로 움직여요오…… 하아앗응<emoji=heart04>!」"

[[dialogue]]
speaker = "ヨミ"
original = "「ああぁっ、ふあぁぁぁっ！\u3000おち○ぽ様、奥まで来てるっ。あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000奥当たるっ、おま○この１番奥、ちゅっちゅされてるぅ……<emoji=heart04><emoji=heart04>」"
translation = "「아아앗, 후아아아앗! 자지님, 깊숙이까지 왔어어. 앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 안쪽 닿아앗, 보지 제일 깊은 곳을 츄츄당하고 있어어……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「はあぁぁっ、気持ち良いっ<emoji=heart04>\u3000おち○ぽ様気持ち良いのっ<emoji=heart04>\u3000あんっ、はぅんっ<emoji=heart04>\u3000突かれるたび、感じちゃいますっ……ああっ、凄いっ、おち○ぽ様素敵ぃ……<emoji=heart04><emoji=heart04>！」"
translation = "「하아아앗, 기분 좋아앗<emoji=heart04> 자지님 기분 좋아아<emoji=heart04> 앙앗, 하웅<emoji=heart04> 찔릴 때마다 느껴버려요…… 아앗, 대단해, 자지님 멋져어……<emoji=heart04><emoji=heart04>!」"

[[dialogue]]
speaker = "ヨミ"
original = "「ふああぁぁっ、好きっ、おち○ぽ様好きぃっ<emoji=heart04>\u3000はっ、はぁっ、ああっ！\u3000気持ち良くて、おち○ぽ様のペットになっちゃうっ……んふぁっ、はぁぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「후아아앗, 좋아, 자지님 좋아아앗<emoji=heart04> 하앗, 하앗, 아앗! 기분 좋아서 자지님의 펫이 되어버려어…… 응하앗, 하아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「んああっ、おま○この奥、何度もキスされて<emoji=heart04>\u3000ただのメス狐に、なっちゃいますぅっ……<emoji=heart04>\u3000ふあぁぁぁんっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응아앗, 보지 깊은 곳을 몇 번이나 키스당해서<emoji=heart04> 그냥 암여우가 되어버려요오……<emoji=heart04> 후아아아앙<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ヨミの脇汗も、匂いが濃くなってきた……っ。凄く興奮するっ」"
translation = "「요미의 겨드랑이 땀도 냄새가 짙어졌어……. 굉장히 흥분돼」"

[[dialogue]]
speaker = "ヨミ"
original = "「こやっ！？\u3000か、会長、いきなりそんなこと……あぁんっ<emoji=heart04><emoji=heart04>！\u3000う、嘘ですっ……ふぅぅっ……<emoji=heart04><emoji=heart04>！」"
translation = "「코얏!? 회, 회장님, 갑자기 그런 소릴…… 아앙<emoji=heart04><emoji=heart04>! 거, 거짓말이에요…… 후우우……<emoji=heart04><emoji=heart04>!」"

[[dialogue]]
speaker = "クロト"
original = "「オスを誘惑するっ、いけないメスの香りがしてっ、孕ませたくなるっ……！\u3000俺の凄く好きな……女の子の匂いだっ」"
translation = "「수컷을 유혹하는, 못된 암컷의 향기가 나서 임신시키고 싶어져……! 내가 정말 좋아하는…… 여자아이의 냄새야」"

[[dialogue]]
speaker = "ヨミ"
original = "「ああっ、あああっ<emoji=heart04><emoji=heart04>\u3000ふっ、ふぅぅっ！\u3000じ、じゃあ本当に……<emoji=heart04>\u3000んあぁっ、両想い……？\u3000はあぁぁぁっ、匂いも両想いってことですかぁ……<emoji=heart04>？」"
translation = "「아앗, 아아앗<emoji=heart04><emoji=heart04> 훗, 후우우! 그, 그럼 정말로……<emoji=heart04> 응아앗, 서로 마음이 통한 거……? 하아아아앗, 냄새도 서로 통했다는 건가요오……<emoji=heart04>?」"

[[dialogue]]
speaker = "ヨミ"
original = "「ふあぁぁっ<emoji=heart04>！\u3000そんな、そんなのっ……んふぅぅっ<emoji=heart04>！\u3000嬉しくなっちゃいますっ……あぁんっ<emoji=heart04>\u3000嬉しくて、頭バカになっちゃいますっ……はぁっ、はぁっ、んふああっ<emoji=heart04>」"
translation = "「후아아앗<emoji=heart04>! 그런, 그런 건…… 응후우우<emoji=heart04>! 기뻐져버려요…… 아앙<emoji=heart04> 기뻐서 머리가 바보가 되어버려요…… 하앗, 하앗, 응후아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「私の尻尾も、おち○ぽ様を欲しがって、はぁぁんっ<emoji=heart04>\u3000会長に絡み付いちゃいますぅっ<emoji=heart04><emoji=heart04><emoji=heart04>！」"
translation = "「제 꼬리도 자지님을 원해서, 하아아앙<emoji=heart04> 회장님에게 휘감겨버려요오오앗<emoji=heart04><emoji=heart04><emoji=heart04>!」"

[[dialogue]]
speaker = "クロト"
original = "「っ……ヨミ！」"
translation = "「윽…… 요미!」"

[[dialogue]]
speaker = "ヨミ"
original = "「んああぁぁぁっ<emoji=heart04><emoji=heart04>！\u3000はあぁぁんっ、激しいっ、あっ、ああっ！\u3000おち○ぽ様、まだ大きくなるぅぅぅ<emoji=heart04><emoji=heart04>！\u3000ふあぁっ、あぁんっ、おく、おく、気持ちいいですっ<emoji=heart04><emoji=heart04>！」"
translation = "「응아아아앗<emoji=heart04><emoji=heart04>! 하아아앙, 격해앗, 앗, 아앗! 자지님, 더 커져어어어<emoji=heart04><emoji=heart04>! 후아앗, 아앙, 안쪽, 안쪽 기분 좋아요오앗<emoji=heart04><emoji=heart04>!」"

[[dialogue]]
speaker = "ヨミ"
original = "「ふあぁぁぁっ、気持ち良いっ！\u3000んはあぁぁっ<emoji=heart04><emoji=heart04>\u3000おち○ぽ様のおま○こキス、気持ち良いですぅっ！\u3000もっと、もっとぉ！\u3000あっ、あっ、んあぁぁぁっ<emoji=heart04><emoji=heart04>！」"
translation = "「후아아아앗, 기분 좋아! 응하아아앗<emoji=heart04><emoji=heart04> 자지님의 보지 키스, 기분 좋아요오앗! 더, 더어! 앗, 앗, 응아아아앗<emoji=heart04><emoji=heart04>!」"

[[dialogue]]
speaker = "ヨミ"
original = "「会長の逞しいおち○ぽ様で、もっとヨミのこと可愛がって下さいぃぃぃっ<emoji=heart04><emoji=heart04>！\u3000ふあぁぁぁんっ<emoji=heart04><emoji=heart04>\u3000好きっ、会長の匂いも<emoji=heart04>\u3000おち○ぽ様も大好きぃっ<emoji=heart04><emoji=heart04>！」"
translation = "「회장님의 늠름한 자지님으로 요미를 더 예뻐해 주세요오오앗<emoji=heart04><emoji=heart04>! 후아아아앙<emoji=heart04><emoji=heart04> 좋아, 회장님 냄새도<emoji=heart04> 자지님도 정말 좋아아앗<emoji=heart04><emoji=heart04>!」"

[[dialogue]]
speaker = "ヨミ"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ヨミはペットですぅ<emoji=heart04>\u3000会長のおち○ぽ様にご奉仕するペットなのぉっ<emoji=heart04>\u3000んあぁぁぁっ<emoji=heart04>\u3000だからいっぱい、愛してくださいっ<emoji=heart04>\u3000ふあぁぁぁんっ！」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 요미는 펫이에요오<emoji=heart04> 회장님의 자지님께 봉사하는 펫인걸요오앗<emoji=heart04> 응아아아앗<emoji=heart04> 그러니까 잔뜩 사랑해 주세요앗<emoji=heart04> 후아아아앙!」"

[[dialogue]]
speaker = "ヨミ"
original = "「あっ<emoji=heart04>\u3000し、尻尾の付け根気持ち良いっ<emoji=heart04>\u3000はあぁぁんっ<emoji=heart04>\u3000そこ撫でられるのしゅきっ<emoji=heart04>\u3000はあぁぁぁんっ<emoji=heart04>\u3000おま○こと一緒に、気持ち良くされるのっ、しゅごいですっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 꼬, 꼬리 뿌리 기분 좋아앗<emoji=heart04> 하아아앙<emoji=heart04> 거기 쓰다듬어지는 거 죠아앗<emoji=heart04> 하아아아앙<emoji=heart04> 보지랑 같이 기분 좋아지는 거, 됴아요오앗<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「ふあぁぁんっ、おかしくなっちゃうっ<emoji=heart04>\u3000はあっ<emoji=heart04>\u3000はああっ<emoji=heart04>\u3000気持ち良いっ、愛されるって気持ち良いのぉっ<emoji=heart04>\u3000ふあぁぁぁっ、しゅき<emoji=heart04>\u3000しゅきっ<emoji=heart04>\u3000しゅきぃぃ<emoji=heart04>」"
translation = "「후아아앙, 이상해져버려어앗<emoji=heart04> 하앗<emoji=heart04> 하아앗<emoji=heart04> 기분 좋아, 사랑받는 건 기분 좋아아앗<emoji=heart04> 후아아아앗, 죠아<emoji=heart04> 죠앗<emoji=heart04> 죠아아아<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000脇の匂い嗅がれながら、爆裂ピストンっ<emoji=heart04>\u3000ふああぁぁぁっ<emoji=heart04>\u3000おち○ぽ様まだ大きくなって……んはあっ、はああっ、はあああぁぁっ<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 겨드랑이 냄새 맡아지면서 폭렬 피스톤<emoji=heart04> 후아아아아앗<emoji=heart04> 자지님 더 커져서…… 응하앗, 하아앗, 하아아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「あああぁぁぁっ<emoji=heart04>\u3000登って来ちゃうっ<emoji=heart04>\u3000ふあぁっ、爆裂ピストンで、気持ち良いの登って来ちゃいますぅっ<emoji=heart04>\u3000くる、くる、くるぅぅっ……はあぁぁぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「아아아아앗<emoji=heart04> 올라와버려어앗<emoji=heart04> 후아앗, 폭렬 피스톤으로 기분 좋은 게 올라와버려요오앗<emoji=heart04> 온다, 온다, 온다아아앗…… 하아아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「会長もっ、おち○ぽ様もぉ<emoji=heart04>\u3000一緒にイってぇ<emoji=heart04><emoji=heart04>\u3000ふあぁぁぁっ<emoji=heart04>\u3000私の膣内に、いっぱい精液出してぇ<emoji=heart04><emoji=heart04>！」"
translation = "「회장님도, 자지님도오<emoji=heart04> 같이 가아아<emoji=heart04><emoji=heart04> 후아아아앗<emoji=heart04> 제 질 안에 정액 잔뜩 내보내 줘어어<emoji=heart04><emoji=heart04>!」"

[[dialogue]]
speaker = "ヨミ"
original = "「ふあぁぁぁんっ<emoji=heart04><emoji=heart04>\u3000大好きな会長の匂い、マーキングして欲しいっ<emoji=heart04>\u3000来て、来て来て来てぇ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아앙<emoji=heart04><emoji=heart04> 정말 좋아하는 회장님 냄새, 마킹해 줬으면 좋겠어어앗<emoji=heart04> 와줘, 와줘 와줘 와줘어어<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「あああああっ、もうイキますっ<emoji=heart04>\u3000イク、いくいくいくいくぅぅぅ──<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아아아앗, 이제 가요앗<emoji=heart04> 가, 가가가가가아아아──<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「っ……ふあああああぁぁぁぁぁぁっ<emoji=heart04><emoji=heart04>\u3000マーキング射精で、イックぅぅぅ──ッ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「윽…… 후아아아아아아아아앗<emoji=heart04><emoji=heart04> 마킹 사정으로 가버려어어어──!!<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「あっ、ふあぁぁぁ<emoji=heart04>\u3000お腹の中に、精液いっぱい注がれて、ますぅ<emoji=heart04><emoji=heart04>\u3000んはぁっ、はぁぁ<emoji=heart04><emoji=heart04>\u3000精液熱くて、気持ちいい……<emoji=heart04>\u3000はふぅぅぅ<emoji=heart04>」"
translation = "「앗, 후아아아아<emoji=heart04> 배 속에 정액이 잔뜩 부어지고 있어요오<emoji=heart04><emoji=heart04> 응하앗, 하아아<emoji=heart04><emoji=heart04> 정액 뜨거워서 기분 좋아……<emoji=heart04> 하후우우우<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「はあぁ<emoji=heart04>\u3000精液のマーキングぅ……<emoji=heart04><emoji=heart04>\u3000んくっ、はぁ……<emoji=heart04>\u3000会長のものになれた感じがしてぇ、好きぃ……<emoji=heart04>」"
translation = "「하아아<emoji=heart04> 정액 마킹……<emoji=heart04><emoji=heart04> 응윽, 하아……<emoji=heart04> 회장님 것이 된 것 같아서 좋아아……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「んんっ、はあぁっ……<emoji=heart04><emoji=heart04>\u3000あぁっ……おち○ぽ様抜けちゃうっ……<emoji=heart04>」"
translation = "「응응, 하아앗……<emoji=heart04><emoji=heart04> 아앗…… 자지님 빠져버려어……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「こやぁ……やっぱりセックス、凄いですぅ<emoji=heart04>\u3000たくさんイってしまいましたぁ……<emoji=heart04>」"
translation = "「코야아…… 역시 섹스, 대단해요오<emoji=heart04> 잔뜩 가버렸습니다아……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「会長に匂い嗅がれるのは……その、恥ずかしかったですけど<emoji=heart04>\u3000好きな匂いと言って貰えたのは、嬉しかった、です……<emoji=heart04>」"
translation = "「회장님이 냄새 맡는 건…… 그, 부끄러웠지만<emoji=heart04> 좋아하는 냄새라고 해주셔서 기뻤어요……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「ふぇ……？<emoji=heart04>\u3000恥ずかしくなること自体に、快感を覚えてたみたい、ですか？\u3000そっ、そそそ、そんなに変態じゃないですぅっ」"
translation = "「후에……?<emoji=heart04> 부끄러워지는 것 자체에 쾌감을 느끼고 있었던 것 같다니요? 그, 그그그, 그렇게 변태 아니에요오앗」"

[[dialogue]]
speaker = "ヨミ"
original = "「こやんっ<emoji=heart04>\u3000あっ、会長ぉ……<emoji=heart04>\u3000耳はむはむダメですぅ<emoji=heart04>\u3000そこは性感帯で、またエッチしたくなっちゃいます、からぁ……<emoji=heart04>」"
translation = "「코양<emoji=heart04> 앗, 회장님……<emoji=heart04> 귀를 오물오물하면 안 돼요오<emoji=heart04> 거기는 성감대라 또 하고 싶어져버리니까아……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「このままシャワーを浴びずに帰って、ヨミヨミの匂いをもっと感じながらエッチしたいかも……」"
translation = "「이대로 샤워 안 하고 돌아가서, 요미요미 냄새를 더 느끼면서 하고 싶을지도……」"

[[dialogue]]
speaker = "ヨミ"
original = "「んっ……だ、ダメですよぉ<emoji=heart04>\u3000そんなの、布団にエッチな匂いが染み付いて……普段も、寝られなくなっちゃいます……<emoji=heart04>」"
translation = "「응…… 아, 안 돼요오<emoji=heart04> 그러면 이불에 야한 냄새가 배어서…… 평소에도 잠을 못 자게 되어버려요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言うヨミの尻尾は、俺の足にしゅるしゅると巻き付いていて──"
translation = "그렇게 말하는 요미의 꼬리는 내 다리에 스르르 휘감겨 있었고──"

[[dialogue]]
speaker = "unk"
original = "その後、俺はヨミの部屋に行き、たっぷりと彼女の匂いを堪能するのだった。"
translation = "그 후, 나는 요미의 방으로 가서 듬뿍 그녀의 냄새를 만끽하는 것이었다."

