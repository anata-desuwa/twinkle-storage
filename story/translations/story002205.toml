[[dialogue]]
speaker = "ダッチ"
original = "「フフ。勝負の前に喉が渇きましたね。可愛い子ウサギのセナリィ様、ワインを一杯いただけますか？」"
translation = "「후후. 승부 전에 목이 마르군요. 귀여운 아기 토끼 세나리 님, 와인 한 잔 주시겠습니까?」"

[[dialogue]]
speaker = "セナリィ"
original = "「ぐ、ぐぅっ……！\u3000このバンデット・セナリィを給仕として使うだなんて……この屈辱、後で必ずや……！」"
translation = "「구, 구우……! 이 밴디트 세나리를 서빙으로 부리다니…… 이 굴욕, 나중에 반드시……!」"

[[dialogue]]
speaker = "ダッチ"
original = "「嗚呼、いけません。いけませんねぇ」"
translation = "「아아, 안 됩니다. 안 되겠네요.」"

[[dialogue]]
speaker = "ダッチ"
original = "「まだ全員が敗北されていないため意思までは奪っておりませんが……それでももう貴女は私の子ウサギなのですよ？」"
translation = "「아직 전원이 패배하지 않았기에 의지까지 뺏지는 않았습니다만…… 그래도 이미 당신은 제 아기 토끼란 말입니다?」"

[[dialogue]]
speaker = "ダッチ"
original = "「先ほど、きちんとお伝えしたはず。語尾には何をつけろと言いましたか？」"
translation = "「아까 똑똑히 말씀드렸을 텐데요. 어미에는 무엇을 붙이라고 했지요?」"

[[dialogue]]
speaker = "セナリィ"
original = "「ぐぬぬぬっ……！」"
translation = "「구느느느……!」"

[[dialogue]]
speaker = "セナリィ"
original = "「お、お待たせいたしましたわ……ぴょん♪\u3000ダッチ様にドリンクサービスっ<emoji=heart04>\u3000子ウサギの愛情たっぷり赤ワインです、ぴょーんっ♪」"
translation = "「오, 오래 기다리셨어요…… 뿅♪ 더치 님께 드링크 서비스 <emoji=heart04> 아기 토끼의 애정 듬뿍 레드 와인이라뿅~♪」"

[[dialogue]]
speaker = "ダッチ"
original = "「フォォオオォ！！\u3000これだ！\u3000これでこそウサギだ！\u3000魔界はラパン地方の方言を取り入れたこの口調こそが正義！\u3000フォォオ～……！」"
translation = "「포오오오오!! 이거다! 이래야 토끼지! 마계 라판 지방의 방언을 도입한 이 말투야말로 정의! 포오오오~……!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ぜ、絶対に負けられません……死よりも恐ろしい罰ゲームですわ……」"
translation = "「절, 절대로 질 수 없어요…… 죽음보다 무서운 벌칙 게임이에요…」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「これは相当に業の深い欲望だね。ロストアイテムってみんなあんな感じなの、会長？」"
translation = "「이건 상당히 업이 깊은 욕망이네. 로스트 아이템은 다들 저런 느낌이야, 회장?」"

[[dialogue]]
speaker = "unk"
original = "あいつだけだと思う……"
translation = "저 녀석뿐이라고 생각해……"

[[dialogue]]
speaker = "ダッチ"
original = "「さぁセナリィ様。次は肩揉みです。その可憐な手のひらで、私の肩を優しく揉みほぐしていただけますかな？」"
translation = "「자 세나리 님. 다음은 어깨 안마입니다. 그 가련한 손바닥으로 제 어깨를 부드럽게 주물러 주시겠습니까?」"

[[dialogue]]
speaker = "セナリィ"
original = "「ぐぎぎぎっ……！\u3000お、お揉み致しますぴょん、ダッチ様……モミモミ、モ～ミっ……だぴょんっ♪」"
translation = "「구기기기……! 주, 주물러 드리겠다뿅, 더치 님…… 조물조물, 조~물…… 이다뿅~♪」"

[[dialogue]]
speaker = "ダッチ"
original = "「オゥフ……！\u3000やる気がムンムン湧いてまいりましたよ！\u3000では──２回戦と参りましょうか！」"
translation = "「오우후……! 의욕이 불끈불끈 샘솟는군요! 그럼── 2회전으로 가볼까요!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「次戦は、ゲームが苦手な私が参ります。緋宮会長、ネーゼマイン様。後はよろしくお願いいたしますわ！」"
translation = "「다음 판은 게임이 서툰 제가 나가겠어요. 히노미야 회장, 네제마인 님. 나머지는 잘 부탁드리겠어요!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「……先ほどのゲーム、どこか不自然な空気は私も感じておりますわ。ならば遊戯に慣れているあなたたちの思考時間を増やすべきだと考えておりますの」"
translation = "「……방금 게임에서 어딘가 부자연스러운 공기는 저도 느끼고 있어요. 그렇다면 유희에 익숙한 당신들의 사고 시간을 늘려야 한다고 생각하고 있어요.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「千園寺先輩……」"
translation = "「치온지 선배……」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「おーっほっほっほ！\u3000だからと言って端っから負けるつもりもありません！\u3000千園寺の底力、見せて差し上げますわ！」"
translation = "「오~홋홋홋! 그렇다고 해서 애초부터 질 생각도 없어요! 치온지의 저력을 보여드리겠어요!」"

[[dialogue]]
speaker = "ダッチ"
original = "「ヒルディオーネ様ですか……フフ！\u3000手に汗握る名勝負をいたしましょう！」"
translation = "「힐디오네 님이신가요…… 후후! 손에 땀을 쥐는 명승부를 해봅시다!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「御託はよろしくてよ。さぁ、カードを！」"
translation = "「장광설은 됐어요. 자, 카드를!」"

[[dialogue]]
speaker = "モンスター"
original = "「イ～っ！」"
translation = "「이~잇!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "（大見得を切りましたが、トランプなんて本当に数えるほどしか触ったことがありませんわ……）"
translation = "(큰소리는 쳤지만 트럼프 같은 건 정말 손에 꼽을 정도로밖에 만져본 적이 없어요……)"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "（クラブの４、ダイヤの４、ハートの６、ハートの７、ダイヤのＱ……）"
translation = "(클로버 4, 다이아 4, 하트 6, 하트 7, 다이아 Q……)"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "（これ……どうするのが正解ですの？\u3000流石に緋宮会長たちに相談するのはルール違反ですし……）"
translation = "(이거…… 어떻게 하는 게 정답이에요? 아무리 그래도 히노미야 회장 일행에게 상담하는 건 규칙 위반이고……)"

[[dialogue]]
speaker = "ネーゼマイン"
original = "（セナリィの時ほどじゃないけど、いいハンドだね。ワンペアでも役があるのは大きい）"
translation = "(세나리 때 정도는 아니지만 괜찮은 핸드네. 원 페어라도 족보가 있는 건 커.)"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "（強いハンドを作らなければ勝負には勝てない、ですわよね？\u3000ワンペアって一番弱い役だったはずですし……）"
translation = "(강한 핸드를 만들지 않으면 승부에서 이길 수 없다, 는 거예요? 원 페어면 가장 약한 족보였던 것 같고……)"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "（もっと強い役……そういえば同じ色で階段状になれば、ストレートフラッシュという役があったはずですわ！）"
translation = "(더 강한 족보…… 그러고 보니 같은 색으로 계단 모양이 되면 스트레이트 플래시라는 족보가 있었을 터예요!)"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "（よし！\u3000ハートの６と７以外、全部捨てますわ！\u3000女は度胸でしてよ！）"
translation = "(좋아! 하트 6이랑 7 이외에는 전부 버리겠어요! 여자는 배짱이에요!)"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「おーっほっほっほ！\u3000３枚チェンジですわ！！」"
translation = "「오~홋홋홋! 3장 체인지에요!!」"

[[dialogue]]
speaker = "unk"
original = "（うわあああ！？）"
translation = "(으아아아!?)"

[[dialogue]]
speaker = "ネーゼマイン"
original = "（完成してるワンペアを捨てたー！？\u3000ここからストレートを狙おうとしてるの！？\u3000そんなのできるわけないよ先輩！？）"
translation = "(완성되어 있는 원 페어를 버렸어──!? 여기서 스트레이트를 노리려고 하는 거야? 그런 게 될 리가 없잖아 선배!?)"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "（ストレートフラッシュを作るのですわ……！\u3000来てくださいまし！\u3000ハートの６、７まわりの３枚……！）"
translation = "(스트레이트 플래시를 만드는 거예요……! 오너라! 하트 6, 7 근처의 3장……!)"

[[dialogue]]
speaker = "モンスター"
original = "「イ～っ……！」"
translation = "「이~잇……!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「あ──！」"
translation = "「아──!」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "（嘘ぉ！？\u3000ハートの８、９、１０が来た！？\u3000ストフラの完成っ……これが財閥令嬢の運ってこと！？）"
translation = "(말도 안 돼!? 하트 8, 9, 10이 왔어!? 스플 완성…… 이것이 재벌 영애의 운이란 거야!?)"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "（な、何か思った通りの役ができましたわ！？\u3000でもこれなら……あの変態紳士に一泡吹かせられるはず！）"
translation = "(무, 무언가 생각한 대로 족보가 만들어졌어요!? 하지만 이거라면…… 저 변태 신사에게 한 방 먹여줄 수 있을 터!)"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「レイズです！\u3000さぁ、かかってきなさいダッチ！」"
translation = "「레이즈사와요! 자, 덤비시사와요 더치!」"

[[dialogue]]
speaker = "ダッチ"
original = "「フフフ……星騎士の女性は気の強い方が多いのでしょうか？\u3000まさかセナリィ様と同じく、一気に２０枚積みとは……！」"
translation = "「후후후…… 성기사 여성분들은 기가 센 분들이 많은 걸까요? 설마 세나리 님과 마찬가지로 단번에 20개 올인이라니……!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "（うぅう……！\u3000オリられるわけがないじゃありませんの！\u3000ストレートフラッシュが出来てしまったら……！）"
translation = "(으으으……! 폴드 할 수 있을 리가 없지 않나요! 스트레이트 플래시가 만들어져 버렸는데……!)"

[[dialogue]]
speaker = "セナリィ"
original = "「そこまで積み上げるということは！\u3000先ほどの私レベルに強いハンドということですわよね！？\u3000信じてますわよ！？」"
translation = "「그렇게까지 쌓아 올린다는 건! 방금 전의 저 수준으로 강한 핸드라는 거에요!? 믿고 있어요!?」"

[[dialogue]]
speaker = "セナリィ"
original = "「というかダッチ！\u3000千園寺様は腹芸のできないお人！\u3000きっと最強クラスのハンドが完成してるはずですわ！」"
translation = "「그보다 더치! 치온지 님은 겉과 속이 다르지 못한 분! 분명 최강 클래스의 핸드가 완성됐을 거에요!」"

[[dialogue]]
speaker = "セナリィ"
original = "「オリた方が賢明ではなくて！？\u3000そのまま積んである１５枚のチップを回収されてしまいなさい！」"
translation = "「폴드 하는 게 현명하지 않나요!? 그대로 쌓여있는 15개의 칩을 회수당해 버리겠어요!」"

[[dialogue]]
speaker = "ダッチ"
original = "「いけませんよセナリィ様。ぴょんを付けてくださらないと」"
translation = "「안 되지요 세나리 님. 뿅을 붙여주셔야죠.」"

[[dialogue]]
speaker = "セナリィ"
original = "「どうしてコイツ、こんなに余裕ですの！？\u3000……ぴょん！」"
translation = "「어째서 이 녀석 이렇게 여유로운 건가요!? ……뿅!」"

[[dialogue]]
speaker = "ダッチ"
original = "「フフフ。子ウサギに応援されて勇気も１００倍です。お受けしましょう──２０枚でコールです！」"
translation = "「후후후. 아기 토끼에게 응원받으니 용기도 100배입니다. 받아주지요── 20개로 콜입니다!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ショウダウンですわね！\u3000刮目しなさい、これが千園寺の底力！\u3000ストレートフラッシュですわ！！」"
translation = "「쇼다운이에요! 똑똑히 보세요, 이것이 치온지의 저력! 스트레이트 플래시에요!!」"

[[dialogue]]
speaker = "セナリィ"
original = "「役満クラスの化け物ハンド！！\u3000来ましたわ～！！」"
translation = "「역만 클래스의 괴물 핸드!! 왔어요~!!」"

[[dialogue]]
speaker = "ダッチ"
original = "「──失敬。またまた私の勝ちです」"
translation = "「──실례. 또다시 제가 이겼군요.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「──ですわっ！？」"
translation = "「──랍니다데스왓!?」"

[[dialogue]]
speaker = "unk"
original = "またロイヤルストレートフラッシュ！？"
translation = "또 로열 스트레이트 플래시!?"

[[dialogue]]
speaker = "ダッチ"
original = "「嗚呼、僅差の勝負でございましたね！」"
translation = "「아아, 근소한 차이의 승부였군요!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「こ、こんなのイカサマですわ！\u3000ロイヤルストレートフラッシュが２連続だなんて、確率的にありえません！！」"
translation = "「이, 이런 건 사기에요! 로열 스트레이트 플래시가 2연속이라니 확률적으로 있을 수 없어요!!」"

[[dialogue]]
speaker = "ダッチ"
original = "「そう仰られても……ヒルディオーネ様だって、同じくらいに強いハンドを作られているではないですか？」"
translation = "「그렇게 말씀하셔도…… 힐디오네 님도 그만큼이나 강한 핸드를 만드셨지 않습니까?」"

[[dialogue]]
speaker = "ダッチ"
original = "「もしもイカサマだと断じるなら、証拠を出して頂かないと？」"
translation = "「만약 사기라고 단정하신다면 증거를 대주셔야겠는데요?」"

[[dialogue]]
speaker = "セナリィ"
original = "「このっ……言わせておけば……！」"
translation = "「이게…… 가만히 들어줬더니……!」"

[[dialogue]]
speaker = "セナリィ"
original = "（でも妙ですわ……。私の眼で監視していましたが、ダッチの動きに怪しいそぶりは一切ない……！）"
translation = "(하지만 묘하네요…… 제 눈으로 감시하고 있었습니다만, 더치의 움직임에 수상한 기색은 전혀 없었어요……!)"

[[dialogue]]
speaker = "セナリィ"
original = "（トランプモンスターのカード配りも、デッキトップからただ配るだけ……セカンドディールなどのイカサマも無し）"
translation = "(트럼프 몬스터의 카드 배분도 덱 맨 위에서 그냥 나눠줄 뿐…… 세컨드 딜 같은 사기도 없어요.)"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「千園寺の娘である私が……悪党の後塵を拝するだなんて……！」"
translation = "「치온지의 딸인 내가…… 악당의 뒷무늬나 쫓게 되다니……!」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「……まずいね会長。このポーカー、普通じゃないよ」"
translation = "「……위험하네 회장. 이 포커, 보통이 아니야.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ダッチは絶対に何かをしてる。手口はまだわからないけど……たぶんセナリィも同じ。星眼ですらイカサマが見つけられないんだと思う」"
translation = "「더치는 절대로 뭔가를 하고 있어. 수법은 아직 모르겠지만…… 아마 세나리도 마찬가지야. 성안으로도 사기를 찾아낼 수 없는 거라고 생각해.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「だけど絶対に何かはしてる。その裏をかかないと……私たち全員、何もできずに負けちゃう……！」"
translation = "「하지만 절대로 뭔가는 하고 있어. 그 허를 찌르지 않으면…… 우리 전원 아무것도 못 하고 져버릴 거야……!」"

