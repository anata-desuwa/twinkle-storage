[[dialogue]]
speaker = "unk"
original = "第３話,流星ディザスター,B"
translation = "제3화, 유성 디재스터, B"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「──はああああっっ！！」"
translation = "「──하아아아앗!!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「フン──少しはやるようだな」"
translation = "「흥── 조금은 할 줄 아는 모양이군」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「フィオナちゃん……いつも以上にパワーが……！」"
translation = "「피오나짱…… 평소보다 더 파워가……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あと少しだ──フィオナ、アポロに呼びかけてやってくれ！」"
translation = "「앞으로 조금이다── 피오나, 아폴로에게 말을 걸어 줘!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ええ……！\u3000姉さん、こっちです──２人でごっこ遊びをしていた、あの頃を思い出してください！」"
translation = "「네……! 언니, 이쪽이에요── 둘이서 소꿉놀이를 하던, 그때를 떠올려 주세요!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「っ……黙れ。あたしはおまえなど知らないと──言ってるだろう！」"
translation = "「윽…… 닥쳐. 나는 너 따위 모른다고── 말하고 있잖아!」"

[[dialogue]]
speaker = "unk"
original = "フィオナとアポロにしか通じえない過去の絆。それは２人が本物の姉妹である証。"
translation = "피오나와 아폴로에게만 통할 수 있는 과거의 인연. 그것은 두 사람이 진짜 자매라는 증거."

[[dialogue]]
speaker = "unk"
original = "そんなフィオナの言葉は確実に、アポロの──アポロの外殻に覆われた少女の精神を揺さぶっていた。"
translation = "그런 피오나의 말은 확실히, 아폴로의── 아폴로의 외피에 덮인 소녀의 정신을 뒤흔들고 있었다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「あたしは……だって……流星ライダー、アポロ、なんだか……ら…………！」"
translation = "「나는…… 하지만…… 유성 라이더, 아폴로, 인 거……라…………!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「──！\u3000仮面にヒビが入ったわ──！」"
translation = "「──! 가면이 금이 갔어──!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「チャンスだ──一気に攻め込むぞ！」"
translation = "「찬스다── 단숨에 공격한다!」"

[[dialogue]]
speaker = "unk"
original = "取り巻きのモンスターたちを掃討し、いよいよアポロ本体に迫らんというところ。"
translation = "주변의 몬스터들을 소탕하고, 드디어 아폴로 본체에 다가가려는 순간."

[[dialogue]]
speaker = "unk"
original = "しかし──"
translation = "하지만──"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「！？」"
translation = "「!?」"

[[dialogue]]
speaker = "unk"
original = "不意に──横から差し挟まれた闇の閃撃によって、俺たちは再び距離を開けられてしまう。"
translation = "불시에── 옆에서 끼어든 어둠의 섬광에 의해, 우리는 다시 거리를 벌리게 된다."

[[dialogue]]
speaker = "unk"
original = "その原因は……"
translation = "그 원인은……"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「ふははは──！\u3000無駄無駄、無駄なことですよ皆様方！」"
translation = "「푸하하하──! 소용없습니다, 소용없어요 여러분!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「おまえは──ギエル──！」"
translation = "「너는── 기엘──!」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「ご無沙汰ですねえ、星徒会の諸君。はるばる遠くの地へ旅立ったと聞いておりましたが……存外お早いご帰還の様子」"
translation = "「오랜만입니다, 성도회의 제군들. 멀리 떨어진 곳으로 여행을 떠났다고 들었는데…… 의외로 일찍 귀환하셨군요.」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「ですが残念ながら……今のアポロ様に浅はかな説得など通じませんよ。リクリエの<ruby>本波<rt>ほんぱ</rt></ruby>が近づいている今、己が『使命』もまた強まっているはずですから」"
translation = "「하지만 유감스럽게도…… 지금의 아폴로 님에게 얄팍한 설득 따위는 통하지 않습니다. 리크리에의 본파가 다가오고 있는 지금, 자신의 『사명』 또한 강해지고 있을 테니까요.」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「何が使命だ──もしかして、あんたがアポロをたぶらかしたのか！？」"
translation = "「무슨 사명이야── 혹시, 네가 아폴로를 꾀어낸 건가!?」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「まさか。私はただ、この偉大なるアポロ様にお命を拾っていただいただけの、しがない人間。その過去に偽りはありません」"
translation = "「설마요. 저는 그저, 이 위대하신 아폴로 님에게 목숨을 건져 받은, 보잘것없는 인간. 그 과거에 거짓은 없습니다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ただの人間……ってのは、見たところ間違いないみたいだが」"
translation = "「단순한 인간……이라는 건, 겉보기엔 틀림없는 것 같지만」"

[[dialogue]]
speaker = "unk"
original = "ギエルの発する星力は、妖しさこそあれど通常の星騎士と変わらない範疇だ。単騎で俺たちと伍するアポロとは比べるべくもない。"
translation = "기엘이 발산하는 성력은, 요사스러움은 있을지언정 통상적인 성기사와 다르지 않은 범주다. 단신으로 우리와 맞서는 아폴로와는 비교할 바도 못 된다."

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「アポロ様はリクリエの使徒として、このフィナーレを飾るべく動いておられる。無粋はしないでいただきましょうか」"
translation = "「아폴로 님은 리크리에의 사도로서, 이 피날레를 장식하기 위해 움직이고 계십니다. 무례한 짓은 하지 말아 주시겠습니까.」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「ねえ……救世主様？」"
translation = "「저기…… 구세주 나리?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「……ああ。まったく、邪魔虫が多くていけないな」"
translation = "「……아아. 정말이지, 방해꾼이 많아서 안 되겠군.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ッ──そんな……！」"
translation = "「윽── 말도 안 돼……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「仮面が──修復されてる──！？」"
translation = "「가면이── 수복됐어──!?」"

[[dialogue]]
speaker = "unk"
original = "アポロの精神はいつの間にか元に戻っていた。"
translation = "아폴로의 정신은 어느새 원래대로 돌아와 있었다."

[[dialogue]]
speaker = "unk"
original = "そして、確かに仮面へつけたはずの傷も……始めっからなかったかのように治りきっていて。"
translation = "그리고, 분명 가면을 향해 냈을 터인 상처도…… 처음부터 없었던 것처럼 완전히 치유되어 있었다."

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「いかがでしょう？\u3000アポロ様──この、一度しかない終末劇を、あちらの特等席から観賞するというのは？」"
translation = "「어떠십니까? 아폴로 님── 이, 단 한 번뿐인 종말극을, 저쪽 특별석에서 관람하는 것은?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「……あれか」"
translation = "「……저건가.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「特等席って──」"
translation = "「특별석이라니──」"

[[dialogue]]
speaker = "unk"
original = "ギエルが指し示した先──"
translation = "기엘이 가리킨 곳──"

[[dialogue]]
speaker = "unk"
original = "それは、この超高空にたった一本だけそびえる、フィーニスの塔の頂上だった。"
translation = "그것은, 이 초고공에 단 한 줄기만 솟아 있는, 피니스의 탑의 정상이었다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「……悪くないな。何もかも滅んでいく様子が、よく見えそうだ」"
translation = "「……나쁘지 않군. 모든 것이 멸망해 가는 모습이, 잘 보일 것 같아.」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「ええ。共にあの頂へ向かいましょう。私もお供いたします」"
translation = "「예. 함께 저 정상을 향해 가시지요. 저도 모시겠습니다.」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「フィーニスの塔の、頂──そんなところ、行けるものなのですか……！？」"
translation = "「피니스의 탑의, 정상── 그런 곳에, 갈 수 있는 것인가요……!?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あそこに見えるのは……恐らく、人間界における最上層……！」"
translation = "「저기에 보이는 것은…… 아마도, 인간계에 있어서 최상층……!」"

[[dialogue]]
speaker = "unk"
original = "そしてアポロは、そこへいざなわれるようにゆらゆらと飛んでいく……。"
translation = "그리고 아폴로는, 그곳으로 이끌리듯이 흔들흔들 날아간다……."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「待て、アポロ──！」"
translation = "「기다려, 아폴로──!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「……ふぅ。めんどーだ」"
translation = "「……휴우. 귀찮ー다.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「邪魔を……するな……ひーろーの──あたしの──正義を！！」"
translation = "「방해를…… 하지 마…… 히어로의── 나의── 정의를!!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「なっ──！」"
translation = "「뭣──!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「これは──」"
translation = "「이건──」"

[[dialogue]]
speaker = "unk"
original = "空にまたたく無数の流れ星。その雨が──俺たち全員へ降り注ぐ！"
translation = "하늘에 반짝이는 무수한 유성. 그 비가── 우리 모두에게 쏟아진다!"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「指向性の流星群──！？」"
translation = "「지향성 유성군──!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「全員俺の後ろに下がれ──ひとつ残らず打ち砕く！」"
translation = "「전원 내 뒤로 물러서── 하나도 남김없이 부숴버린다!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「サポートするわ！\u3000ちょっと数も多すぎるけど──！」"
translation = "「지원할게! 수가 너무 많긴 하지만──!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「地上へ降らせるわけにもいきません──！」"
translation = "「지상으로 떨어지게 할 수는 없습니다──!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「集え、星の死骸たち！\u3000流星──ディザスター！！」"
translation = "「모여라, 별의 시체들이여! 유성── 디재스터!!」"

[[dialogue]]
speaker = "unk"
original = "俺たちへ吸い寄せられるように急襲する星の光！"
translation = "우리에게 빨려들 듯이 급습하는 별의 빛!"

[[dialogue]]
speaker = "unk"
original = "かつてのアポロと比べても、あまりにも桁違いの大出力！"
translation = "예전의 아폴로와 비교해도, 너무나도 차원이 다른 대출력!"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（いつかの流星ストームとも比べ物にならない──これは凄まじすぎる──！）"
translation = "（언젠가의 유성 스톰과도 비교할 수 없어── 이건 너무 엄청나──!）"

[[dialogue]]
speaker = "unk"
original = "もしここが地上だったなら、衝撃波だけで周囲が消し飛んでいただろう。"
translation = "만약 여기가 지상이었다면, 충격파만으로 주변이 날아갔을 것이다."

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「──ふはははは！\u3000素晴らしい！\u3000これが選ばれしリクリエの使徒、アポロ様の真価──よもや人類の抗える存在ではありますまい！」"
translation = "「──푸하하하하! 훌륭합니다! 이것이 선택받은 리크리에의 사도, 아폴로 님의 진가── 설마 인류가 저항할 수 있는 존재는 아니겠지요!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ぐっ……！\u3000なんつう数の……進化しすぎだろっての──！」"
translation = "「크윽……! 이 엄청난 수의…… 너무 진화했잖아──!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ですが──私たちだって──！」"
translation = "「하지만── 우리도──!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ──前までの俺たちとは違う！」"
translation = "「아아── 이전의 우리와는 다르다!」"

[[dialogue]]
speaker = "unk"
original = "矢のように降り注いだ流星群をやっとの思いでしのぎ切る。"
translation = "화살처럼 쏟아진 유성군을 간신히 막아낸다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「隙ができたわ──さあ、反撃開始よ──！」"
translation = "「틈이 생겼어── 자, 반격 개시야──!」"

[[dialogue]]
speaker = "unk"
original = "機は今しかない。全員が攻勢へ転じる。"
translation = "지금이 기회다. 전원이 공세로 전환한다."

[[dialogue]]
speaker = "unk"
original = "だけど、アポロは静かに左手を天へと掲げて……"
translation = "하지만, 아폴로는 조용히 왼손을 하늘로 치켜들고……"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「──天蓋」"
translation = "「──천개」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「やっぱりきたか──フィオナ！」"
translation = "「역시 오는군── 피오나!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ええ。姉さんの好きには──させません！」"
translation = "「네. 언니 마음대로는── 두지 않겠어요!」"

[[dialogue]]
speaker = "unk"
original = "以前の戦いから、アポロが『天蓋』を発動することはわかっていた。"
translation = "이전의 싸움에서, 아폴로가 『천개』를 발동할 것이라는 것을 알고 있었다."

[[dialogue]]
speaker = "unk"
original = "あの闇の障壁が展開されきってしまえば、俺たちは星の光を断たれてしまう。"
translation = "저 어둠의 장벽이 완전히 전개되어 버리면, 우리는 별의 빛을 단절당하게 된다."

[[dialogue]]
speaker = "unk"
original = "ならアポロの手から天蓋が広がりきる前に、集中砲火で打ち砕くのみ──"
translation = "그렇다면 아폴로의 손에서 천개가 완전히 펼쳐지기 전에, 집중 포화로 부숴버릴 뿐──"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「……なるほど。策は練ってきたようだ──が」"
translation = "「……과연. 계책을 세워 온 것 같군── 하지만」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「無駄だ」"
translation = "「소용없다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「！？」"
translation = "「!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「右手からも──！？」"
translation = "「오른손에서도──!?」"

[[dialogue]]
speaker = "unk"
original = "アポロは大剣を手放すと、そこから生じた闇によって２つ目の天蓋を展開させた。"
translation = "아폴로는 대검을 놓더니, 그곳에서 발생한 어둠으로 두 번째 천개를 전개시켰다."

[[dialogue]]
speaker = "unk"
original = "あまりの手早さに打つ手はなく、闇のカーテンが天空へと広がっていく──"
translation = "너무나도 재빨라서 손쓸 틈도 없이, 어둠의 커튼이 하늘로 퍼져나간다──"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「あっ……」"
translation = "「앗……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「うそ……」"
translation = "「거짓말……」"

[[dialogue]]
speaker = "unk"
original = "夜空を閉ざす闇の<ruby>帳<rt>とばり</rt></ruby>。"
translation = "밤하늘을 닫는 어둠의 장막."

[[dialogue]]
speaker = "unk"
original = "星との交信を絶たれたことで、星騎士たちは飛翔力さえ失ってしまう。"
translation = "별과의 교신이 끊긴 것으로, 성기사들은 비행력마저 잃어버린다."

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「ニャ──真っ逆さまだニャ──！」"
translation = "「냥── 거꾸로 떨어진다 냥──!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ッ──みんな──！」"
translation = "「윽── 모두──!」"

[[dialogue]]
speaker = "unk"
original = "だが唯一──地球とリンクする俺だけは、まだ飛ぶことも戦うことも許されていた。"
translation = "하지만 유일하게── 지구와 링크하는 나만이, 아직 나는 것도 싸우는 것도 허락되어 있었다."

[[dialogue]]
speaker = "unk"
original = "落下してゆくみんなを受け止めようと手を伸ばすが──"
translation = "낙하하는 모두를 받아내려고 손을 뻗지만──"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「おっと、つくづく余所見がお好きですね？」"
translation = "「이런, 정말이지 한눈팔기를 좋아하시는군요?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ぐあっ──！？」"
translation = "「크악──!?」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「さようなら、薄汚い星騎士の皆さま──せいぜい地に這いつくばって世の終わりでも眺めているがよろしい」"
translation = "「안녕히, 더러운 성기사 여러분── 실컷 땅바닥을 기어다니며 세상의 종말이나 구경하는 게 좋으실 겁니다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ッ──ギエル──！」"
translation = "「윽── 기엘──!」"

[[dialogue]]
speaker = "unk"
original = "──墜落する。"
translation = "── 추락한다."

[[dialogue]]
speaker = "unk"
original = "俺は必死に急降下し、この超高空で羽を失った星騎士たちを救助しに向かった……。"
translation = "나는 필사적으로 급강하하여, 이 초고공에서 날개를 잃은 성기사들을 구하러 향했다……."

