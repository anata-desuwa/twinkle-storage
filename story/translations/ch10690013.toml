[[dialogue]]
speaker = "unk"
original = "第３話,セシアのママ理論,P"
translation = "제3화, 세시아의 마마 이론, P"

[[dialogue]]
speaker = "unk"
original = "ある日の星徒会室。遊びにきたセシアに、サーシャさんがアプローチをしていた。"
translation = "어느 날의 성도회실. 놀러 온 세시아에게 사샤 씨가 어필을 하고 있었다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「セシアちゃ～ん、１度でいいから、私のこともママって呼んで欲しいわ～！」"
translation = "「세시아짜~앙, 한 번이라도 좋으니까 나도 마마라고 불러주면 좋겠어~!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ほら、お姉ちゃん、裁縫が得意だから、今日はセシアちゃんの好きな蝶を、レースで沢山作ってきたのよ～？」"
translation = "「봐봐, 언니는 바느질이 특기니까 오늘은 세시아가 좋아하는 나비를 레이스로 잔뜩 만들어 왔단다~?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「じ～っ……」"
translation = "「지긋……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「どうかしら？\u3000これでママ的にプラス１ポイントだったり――」"
translation = "「어떠니? 이걸로 마마 점수 플러스 1점이라든가──」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「蝶はとても素敵な出来だと思うけれど、サーシャはやはり、わたくしのママではないわ」"
translation = "「나비는 아주 멋진 완성도라고 생각하지만 사샤는 역시 내 마마가 아니야.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そんな～！」"
translation = "「그럴 수가~!」"

[[dialogue]]
speaker = "unk"
original = "サーシャさん、今日もダメだったか……"
translation = "사샤 씨, 오늘도 실패인가……"

[[dialogue]]
speaker = "unk"
original = "サーシャさんが星徒会の中でも１番母性的だと思うんだけど、と俺が口にすると――"
translation = "사샤 씨가 성도회 중에서도 제일 모성적이라고 생각하는데, 라고 내가 말하자──"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「会長、母性とは年齢も性別も関係ないものなのよ。クリスマスの時にも言ったけれど、大事なのは、そこにオギャれるバブみがあるかどうかよ」"
translation = "「회장, 모성이란 나이도 성별도 상관없는 거야. 크리스마스 때도 말했지만 중요한 건 거기에 응애 할 수 있는 바부미가 있느냐 없느냐야.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「確かにサーシャは、いずれとてつもない母性を開花させる、大きな将来性を秘めていると感じるわ」"
translation = "「분명 사샤는 언젠가 엄청난 모성을 개화시킬 커다란 잠재력을 비축하고 있다고 느껴.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「だけど、今はママじゃない。何故ならば――」"
translation = "「하지만 지금은 마마가 아니야. 왜냐하면──」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「あなたのやっていることは、ママではなく、お姉ちゃんだからよ」"
translation = "「당신이 하는 짓은 마마가 아니라 언니니까야.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「お姉ちゃん、ショック！」"
translation = "「언니, 쇼크!」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ほら、今だって、自分のことをお姉ちゃんだって言ってるじゃない。そこから変わろうとしないと、サーシャはママにはなれないわ」"
translation = "「봐, 지금도 스스로를 언니라고 하잖니. 거기서 변하려 하지 않으면 사샤는 마마가 될 수 없어.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「うぅ……でも私、みんなのお姉ちゃんじゃなくなったら、どう生きていけば……！？」"
translation = "「우으…… 하지만 나, 모두의 언니가 아니게 되면 어떻게 살아가야……!?」"

[[dialogue]]
speaker = "unk"
original = "そこまで悩むほど！？"
translation = "그렇게까지 고민할 일이야!?"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「つまりはそういうことよ、サーシャ。あなたはわたくしからママと呼ばれたいだけで、本当のママに心からなりたいと思っているわけじゃない」"
translation = "「결국은 그런 거야, 사샤. 당신은 나에게 마마라고 불리고 싶을 뿐이지 진짜 마마가 진심으로 되고 싶은 게 아니야.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「あなたは、本当はみんなのお姉ちゃんになりたいのよ」"
translation = "「당신은 사실 모두의 언니가 되고 싶은 거야.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「だけど、さっきも言った通り、あなたにはママとしての大きな将来性があるわ。それはおそらく――」"
translation = "「하지만 아까도 말했듯이 당신에겐 마마로서의 커다란 잠재력이 있어. 그건 아마도──」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「あなたが自分の子供を授かって、育てることになった時に、母性が花開くことになる。今はまだ、その時ではないわ」"
translation = "「당신이 자신의 아이를 가져서 기르게 되었을 때 모성이 꽃피게 될 거야. 지금은 아직 그때가 아니야.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「だから、あなたは焦らずに、まずは自分の中の愛を見つけて、それをじっくりと育みなさい」"
translation = "「그러니 당신은 서두르지 말고 우선 자신 안의 사랑을 찾아 그것을 차분히 키우렴.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「その蓄積が、いつか大きなバブみに変わるはずよ」"
translation = "「그 축적이 언젠가 커다란 바부미로 변할 거야.」"

[[dialogue]]
speaker = "unk"
original = "そう言ってセシアは、サーシャさんの頭を優しく撫でる。"
translation = "그렇게 말하며 세시아는 사샤 씨의 머리를 상냥하게 쓰다듬는다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「な、なんだかむしろ、セシアちゃんから母性を感じるわ……！」"
translation = "「나, 왠지 오히려 세시아한테서 모성이 느껴져……!」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ふふっ、体は小さいけど、わたくしは世界を愛する守護天使だもの。サーシャのことだって、自分の子供のように愛しているのよ」"
translation = "「후훗, 몸은 작지만 나는 세계를 사랑하는 수호천사인걸. 사샤도 내 아이처럼 사랑하고 있단다.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ただいま～。って、あれ？」"
translation = "「다녀왔어~. 어라?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「セシアちゃん、来てたんだ。こんにちは～。今日はどうしたの？」"
translation = "「세시아 왔었네. 안녕~. 오늘은 웬일이야?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「マトイママ～♪\u3000セシア、ママに会いたくて、遊びに来たの～♪」"
translation = "「마토이 마마~♪ 세시아, 마마 보고 싶어서 놀러 왔어~♪」"

[[dialogue]]
speaker = "unk"
original = "マトイママ！？"
translation = "마토이 마마!?"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「母性的なセシアちゃんから、一気に甘えモードに！\u3000あ～ん！\u3000マトイちゃん、ずるいわ～！」"
translation = "「모성적이던 세시아가 단숨에 어리광 모드로! 아앙! 마토이, 치사해~!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「いや、そんなこと言われても……というか、相変わらず私は、セシアちゃんのママ判定のストライクゾーンなんだね……」"
translation = "「아니, 그런 소릴 들어도…… 그나저나 여전히 나는 세시아의 마마 판정 스트라이크 존이구나……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「その、セシアちゃん。なんで私はママなの……？」"
translation = "「저기, 세시아. 왜 내가 마마니……?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ん～？\u3000ママでないことに理由は沢山あるけど、ママであることに理由は必要ないのよ」"
translation = "「음~? 마마가 아닌 것엔 이유가 많지만 마마인 것엔 이유가 필요 없어.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「バブみがあるから、ママなのではないわ――」"
translation = "「바부미가 있어서 마마인 게 아니야──」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「そこにママがいるから、バブみが生まれるのよ♪」"
translation = "「거기에 마마가 있으니까 바부미가 생겨나는 거야♪」"

[[dialogue]]
speaker = "unk"
original = "結局、謎判定では……？"
translation = "결국 수수께끼 판정 아닌가……?"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「マトイママのバブみがわからないなんて、見る目が甘いわね、会長」"
translation = "「마토이 마마의 바부미를 모르다니 보는 눈이 낮네, 회장.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「いや、私自身も普通にわからないんだけど……」"
translation = "「아니, 나 자신도 솔직히 모르겠는데……」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「その、普通にしてて醸し出されるバブみがいいのよ♪」"
translation = "「그냥 평범하게 있어도 배어 나오는 바부미가 좋은 거야♪」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「やっぱり羨ましいわ～！\u3000マトイちゃん、私にバブみの出し方を教えて～！」"
translation = "「역시 부러워~! 마토이, 나한테 바부미 내는 법 좀 알려줘~!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ちょっ、サーシャさん、そんなこと言われても、私にもわからないんですってば！」"
translation = "「잠깐, 사샤 씨, 그런 소릴 들어도 저도 모른다니까요!」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「じ～っ……」"
translation = "「지긋……」"

[[dialogue]]
speaker = "unk"
original = "ふと、セシアがじっと俺を見つめていることに気付く。どうしたのかと尋ねると――"
translation = "문득 세시아가 빤히 나를 쳐다보고 있다는 것을 깨달았다. 왜 그러냐고 묻자──"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「う～ん、会長はやっぱり、わたくしのママではないわね」"
translation = "「으음, 회장은 역시 내 마마는 아니네.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「なんでかしら……？」"
translation = "「어째서일까……?」"

[[dialogue]]
speaker = "unk"
original = "いや男だからでは！？"
translation = "아니 남자니까 그렇겠지!?"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「いいえ、ママに性別は関係ないのよ。あなただって、わたくしのママになる可能性があるわ」"
translation = "「아니, 마마에게 성별은 관계없어. 당신도 내 마마가 될 가능성이 있단다.」"

[[dialogue]]
speaker = "unk"
original = "セシアのママ判定の基準を理解するには、どうやらまだまだ時間がかかりそうだと思う俺なのであった――"
translation = "세시아의 마마 판정 기준을 이해하려면 아무래도 아직 갈 길이 멀다고 생각하는 나였다──"

