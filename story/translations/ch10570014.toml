[[dialogue]]
speaker = "unk"
original = "第４話,とても優しい占いを,P"
translation = "제4화, 아주 상냥한 점술을, P"

[[dialogue]]
speaker = "unk"
original = "トリシャさんの人間界訪問──今日は俺と同伴で繁華街の方へ繰り出すことになった。"
translation = "트리샤 씨의 인간계 방문── 오늘은 나와 동반하여 번화가 쪽으로 나가게 되었다."

[[dialogue]]
speaker = "unk"
original = "静謐な雰囲気のあるレゾフと違い、賑やかな人間の街はもしかすると肌に合わないかもと心配していたけれど……"
translation = "정적인 분위기인 레조프와 달리, 북적이는 인간의 거리는 어쩌면 적성에 맞지 않을까 걱정했지만……"

[[dialogue]]
speaker = "トリシャ"
original = "「フフ……これは何とも興味深い……華やぎのある街ですね……」"
translation = "「후후…… 이건 참으로 흥미롭네요…… 화사함이 있는 거리군요……」"

[[dialogue]]
speaker = "トリシャ"
original = "「魔界と違い、星と繋がった人たちがとても多い……あちらの人も、こちらの人も、みな……星に愛されているようです……」"
translation = "「마계와 달리, 별과 이어진 사람들이 아주 많아…… 저쪽 사람도, 이쪽 사람도, 모두…… 별의 사랑을 받고 있는 것 같습니다……」"

[[dialogue]]
speaker = "unk"
original = "全員、新星学園の生徒だね"
translation = "전부, 신성 학원의 학생이야"

[[dialogue]]
speaker = "トリシャ"
original = "「あなたの同窓生でしたか。道理でまっすぐな輝きを持つ人が多いはずです……」"
translation = "「당신의 동창생이었나요. 과연 곧은 광채를 가진 사람이 많을 법합니다……」"

[[dialogue]]
speaker = "トリシャ"
original = "「星とのリンクを持つ方々がみな『大禍』のために研鑽を積んでいる、と……」"
translation = "「별과의 링크를 가진 분들이 모두 『대화』를 위해 연마하고 있다고……」"

[[dialogue]]
speaker = "トリシャ"
original = "「我が師もこの場に居れば、感嘆の声を上げたことでしょう……強き方々の織りなす運命の結末を視ようと、ホロスコープを読み解いたはず……」"
translation = "「우리 스승님도 이곳에 계셨다면, 감탄의 목소리를 높였을 겁니다…… 강한 분들이 엮어내는 운명의 결말을 보려고, 호로스코프를 읽어냈겠죠……」"

[[dialogue]]
speaker = "トリシャ"
original = "「今ごろ、師匠はどこで何をしているのか……」"
translation = "「지금쯤, 스승님은 어디서 무엇을 하고 계실지……」"

[[dialogue]]
speaker = "unk"
original = "いつか会えるはずだよ"
translation = "언젠가 만날 수 있을 거야"

[[dialogue]]
speaker = "トリシャ"
original = "「そうですね。大禍……ここでは『リクリエ』でしたか。いずれ訪れる再生の理から逃げ出さなければ、きっと会える……」"
translation = "「그렇네요. 대화…… 여기서는 『리크리에』였나요. 언젠가 찾아올 재생의 섭리로부터 도망치지 않는다면, 분명 만날 수 있어……」"

[[dialogue]]
speaker = "トリシャ"
original = "「私にできることは、占星術師として常に高みを目指すのみで──」"
translation = "「내가 할 수 있는 일은, 점성술사로서 항상 높은 곳을 지향할 뿐이라──」"

[[dialogue]]
speaker = "迷子の子供"
original = "「うわぁあ～ん、おか～さ～ん……！」"
translation = "「우와아앙, 엄마아아……!」"

[[dialogue]]
speaker = "トリシャ"
original = "「む……？\u3000向こうにいるのは……親とはぐれた、子供でしょうか……」"
translation = "「음……? 저쪽에 있는 건…… 부모를 잃어버린, 아이일까요……」"

[[dialogue]]
speaker = "unk"
original = "行ってみよう！"
translation = "가보자!"

[[dialogue]]
speaker = "トリシャ"
original = "「ええ……これも天意。私の出番、でしょう……」"
translation = "「네…… 이것도 천의. 제 차례, 겠죠……」"

[[dialogue]]
speaker = "トリシャ"
original = "「フフフ……お困りのようですね……迷える仔羊さん……」"
translation = "「후후후…… 곤란해 보이네요…… 길 잃은 어린 양님……」"

[[dialogue]]
speaker = "迷子の子供"
original = "「ひっ……？」"
translation = "「히익……?」"

[[dialogue]]
speaker = "トリシャ"
original = "「悲しみに袖を濡らしていては、その先の命運も曇ってしまうもの……さあ、お母さんの情報を教えてください……フフフ……」"
translation = "「슬픔에 소매를 적셔서는, 그 앞의 명운도 흐려지는 법…… 자, 어머니의 정보를 가르쳐 주세요…… 후후후……」"

[[dialogue]]
speaker = "迷子の子供"
original = "「うわぁああ～んっ！\u3000こわいよぉ～っ……！」"
translation = "「우와아아앙! 무서워요오……!」"

[[dialogue]]
speaker = "トリシャ"
original = "「怖い……！？」"
translation = "「무서워……!?」"

[[dialogue]]
speaker = "トリシャ"
original = "「お、怯えることは、ない……私は占い師……お、お母さんの名前と、年齢と、誕生日……それがあれば居場所が分かる……よ……？」"
translation = "「거, 겁먹을 것, 없어…… 나는 점술사…… 어, 어머니의 이름과, 나이와, 생일…… 그것만 있으면 거처를 알 수 있어…… 요……?」"

[[dialogue]]
speaker = "迷子の子供"
original = "「おかーーーさーーーーん！！」"
translation = "「엄마아아아아아아!!」"

[[dialogue]]
speaker = "トリシャ"
original = "「お、落ち着いて……ほ、ほら……じゃ、じゃーん……見てください。この振り子を……」"
translation = "「지, 진정하고…… 보, 봐요…… 짜잔…… 보세요. 이 펜듈럼을……」"

[[dialogue]]
speaker = "迷子の子供"
original = "「ぁ……お星様の、ひかり……おねえちゃん、すたーないと、さん……？」"
translation = "「아…… 별님의, 빛…… 언니, 스타 나이트, 님……?」"

[[dialogue]]
speaker = "トリシャ"
original = "「え。私はただの占星術師で……」"
translation = "「에. 나는 그냥 점성술사고……」"

[[dialogue]]
speaker = "トリシャ"
original = "「…………いえ」"
translation = "「…………아니요」"

[[dialogue]]
speaker = "トリシャ"
original = "「そう……フフフ……我は星騎士のトリシャ。守護星の<ruby>おおぐま座８０番星<rt>アルコル</rt></ruby>とリンクせし、魔界レゾフの伝説の占い師……」"
translation = "「그래요…… 후후후…… 나는 성기사 트리샤. 수호성인 <ruby>큰곰자리 80번 별<rt>알코르</rt></ruby>과 링크한, 마계 레조프의 전설의 점술사……」"

[[dialogue]]
speaker = "迷子の子供"
original = "「すたーないとの、おねーちゃん……！」"
translation = "「스타 나이트, 언니……!」"

[[dialogue]]
speaker = "トリシャ"
original = "「はぐれたお母さんを見つけて、差し上げましょう……よどみなく流れる彗星と同じく、お母さんもあなたを探しているはず……」"
translation = "「헤어진 어머니를 찾아, 드리죠…… 거침없이 흐르는 혜성과 마찬가지로, 어머니도 당신을 찾고 있을 터……」"

[[dialogue]]
speaker = "トリシャ"
original = "「さあ。お名前と、年齢と、誕生日を……この振り子に聴かせてください……」"
translation = "「자. 이름과, 나이와, 생일을…… 이 펜듈럼에 들려주세요……」"

[[dialogue]]
speaker = "unk"
original = "大勢の通行人がトリシャさんを見守る中──"
translation = "수많은 통행인이 트리샤 씨를 지켜보는 가운데──"

[[dialogue]]
speaker = "トリシャ"
original = "「視えました。あなたのお母さんの運命が……」"
translation = "「보였습니다. 당신 어머니의 운명이……」"

[[dialogue]]
speaker = "unk"
original = "トリシャさんが導き出した、ここから数十メートル先にある商業施設の店先で、娘を探す女性は確かにいたのだった。"
translation = "트리샤 씨가 이끌어낸, 여기서 수십 미터 떨어진 상업 시설 매장 앞에서, 딸을 찾는 여성은 확실히 있었다."

[[dialogue]]
speaker = "トリシャ"
original = "「無事に再会できて、良かったです……」"
translation = "「무사히 재회해서, 다행이에요……」"

[[dialogue]]
speaker = "トリシャ"
original = "「しかし……少々、落ち込みました……やはり私は、その……誤解されやすい外見なのかも、しれません……」"
translation = "「하지만…… 조금, 낙담했습니다…… 역시 저는, 그…… 오해받기 쉬운 외모일지도, 모르겠네요……」"

[[dialogue]]
speaker = "トリシャ"
original = "「距離感の取り方もへたくそですし……まさかあんなに泣かれるとは」"
translation = "「거리감을 잡는 법도 서투르고…… 설마 그렇게 울 줄이야」"

[[dialogue]]
speaker = "トリシャ"
original = "「今さらですけれど、星騎士を偽って名乗ったこと、問題になったり、しませんよね……？」"
translation = "「이제 와서 하는 말이지만, 성기사를 사칭한 것, 문제가 되거나, 하진 않겠죠……?」"

[[dialogue]]
speaker = "unk"
original = "大丈夫だよ。お疲れ様"
translation = "괜찮아. 수고했어"

[[dialogue]]
speaker = "トリシャ"
original = "「なら、良いのですが……フフ。今日もまた、師匠に報告したいことが増えました……」"
translation = "「그렇다면, 다행이지만요…… 후후. 오늘도 또, 스승님께 보고하고 싶은 것이 늘었습니다……」"

[[dialogue]]
speaker = "トリシャ"
original = "「それにあなたにも、感謝しています……」"
translation = "「그리고 당신에게도, 감사하고 있어요……」"

[[dialogue]]
speaker = "トリシャ"
original = "「以前の私は、きっとあの子に声をかけることも……できなかったと思います。社交的な性格では、ないので……」"
translation = "「이전의 저라면, 분명 저 아이에게 말을 거는 것조차…… 못 했을 거라고 생각해요. 사교적인 성격이, 아니라서……」"

[[dialogue]]
speaker = "トリシャ"
original = "「だから……ありがとう、ございます……」"
translation = "「그러니까…… 고마워요……」"

[[dialogue]]
speaker = "unk"
original = "俺は何もしてないよ"
translation = "난 아무것도 한 게 없어"

[[dialogue]]
speaker = "トリシャ"
original = "「……フ、フ。きっとそう返してくれると、思っていました。振り子に聞かずとも、視えていました……」"
translation = "「……후, 후. 분명 그렇게 대답해 줄 거라고, 생각했습니다. 펜듈럼에 묻지 않아도, 보였거든요……」"

[[dialogue]]
speaker = "トリシャ"
original = "「そ、それじゃあ……観光の、続きを……気の合うあなたと一緒ならば、今日は一日、ずっと素敵な日になることでしょう……」"
translation = "「그, 그럼…… 관광의, 계속을…… 마음이 맞는 당신과 함께라면, 오늘은 하루 종일, 계속 멋진 날이 될 거예요……」"

[[dialogue]]
speaker = "トリシャ"
original = "「……に、へへ、へ……♪」"
translation = "「……헤, 헤헤, 헤……♪」"

[[dialogue]]
speaker = "unk"
original = "その日は、日が暮れるまでトリシャさんと街中をぶらついた。"
translation = "그날은, 해가 저물 때까지 트리샤 씨와 시내를 돌아다녔다."

[[dialogue]]
speaker = "unk"
original = "帰り道に自然な流れで、トリシャさんと手をつなぐことになったのだけど──優しい性格の彼女に似合う、とても暖かい手の平だなと思うのだった。"
translation = "귀갓길에 자연스러운 흐름으로, 트리샤 씨와 손을 잡게 되었는데── 상냥한 성격의 그녀에게 어울리는, 아주 따뜻한 손바닥이라고 생각했다."

