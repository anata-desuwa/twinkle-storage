[[dialogue]]
speaker = "unk"
original = "第１話,チキンが結ぶ縁,P"
translation = "제1화, 치킨이 맺은 인연, P"

[[dialogue]]
speaker = "unk"
original = "放課後。星徒会室。"
translation = "방과 후. 성도회실."

[[dialogue]]
speaker = "unk"
original = "書類仕事が立て込んでいたところ、突然ドアが開いた。"
translation = "서류 작업이 밀려있던 참에 갑자기 문이 열렸다."

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「やっほー！\u3000遊びに来たよ！」"
translation = "「얏호! 놀러 왔어!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「いらっしゃーい！\u3000ようこそ、シルヴィさん！」"
translation = "「어서 오세요! 환영해요, 실비 씨!」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「今日は星徒会長くん、ちゃんといる！\u3000よかった！」"
translation = "「오늘은 성도회장군, 제대로 있네! 다행이다!」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「あたし、シルヴィ・グリムランド！\u3000３年生！\u3000よろしくね！」"
translation = "「나, 실비 그림랜드! 3학년! 잘 부탁해!」"

[[dialogue]]
speaker = "unk"
original = "初めまして、緋宮クロトです"
translation = "처음 뵙겠습니다, 히노미야 쿠로토입니다."

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「おお、礼儀正しい！\u3000さすが現星徒会長！」"
translation = "「오오, 예의 바르네! 역시 현 성도회장!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「シルヴィは私が星徒会長だったときに副会長だったの～。故郷を守るために一時期、学園を離れていたけど最近、戻ってきたのよ～」"
translation = "「실비는 내가 성도회장이었을 때 부회장이었단다~ 고향을 지키기 위해 한동안 학원을 떠나 있었지만 최근에 돌아왔단다~」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「実は以前も星徒会室にいらっしゃったんですが、運悪く会長はお留守でした」"
translation = "「사실 이전에도 성도회실에 오셨습니다만, 운 나쁘게 회장님은 부재중이셨습니다.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「確か、その時は購買部に行って帰ってこなかったんだよね……」"
translation = "「내 기억으론 그때 매점에 가서 돌아오지 않았던 것 같은데……」"

[[dialogue]]
speaker = "unk"
original = "……あの時のことは忘れよう"
translation = "……그때 일은 잊자."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「会長の目から光が失われています。かわいそうに。よしよし」"
translation = "「회장의 눈에서 빛이 사라졌습니다. 가엽게도. 착하지 착해.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「で、今日は何か用かしら？\u3000特に約束とかはなかったわよね？」"
translation = "「그래서 오늘은 무슨 용무니? 딱히 약속 같은 건 없었지?」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「うん、ヒマだったから遊びに来た！」"
translation = "「응, 한가해서 놀러 왔어!」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「あだだだだっ！」"
translation = "「아다다다다!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「すごいわ！\u3000あのサーシャさんがシルヴィさんにアームロックしてるわ！」"
translation = "「대단해요! 그 사샤 씨가 실비 씨에게 암락을 걸고 있어요!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「確かにすごい状況だけど、なんで！？\u3000理解が追い付かないよー！」"
translation = "「확실히 대단한 상황이지만 왜!? 이해가 안 가요!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「シ～ル～ヴィ～。この机に積んである書類を見て、なんとも思わないの？\u3000明らかにヒマだからで来ていいタイミングじゃないでしょう？」"
translation = "「시~일~비~. 이 책상에 쌓여있는 서류를 보고 아무렇지도 않니? 명백하게 한가해서 와도 좋을 타이밍이 아니잖니?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そもそもあなた、自分から星徒会に入ったくせに、ぜんぜん書類仕事やらなかったじゃない」"
translation = "「애초에 너, 스스로 성도회에 들어왔으면서 전혀 서류 작업을 안 했었잖아.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「思い出し怒り！？\u3000サーシャさんでもそんなことあるんだ！？」"
translation = "「뒤늦게 화내시는 거야!? 사샤 씨라도 그럴 때가 있구나!?」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「いだだだだだ！\u3000ごめん、ごめんてば！」"
translation = "「이다다다다! 미안, 미안하다니까!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「サーシャ先輩、それ以上いけない。シルヴィ先輩も反省しています。多分おそらくメイビー」"
translation = "「사샤 선배, 거기까지 하세요. 실비 선배도 반성하고 있습니다. 아마도 어쩌면 메이비.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「えい♪」"
translation = "「에잇♪」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「ぎゃあああああああああああっ！」"
translation = "「갸아아아아아아아아아아앗!」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「ガクリ」"
translation = "「털썩」"

[[dialogue]]
speaker = "unk"
original = "なんで今トドメ差したんですか！？"
translation = "왜 지금 결정타를 날리신 건가요!?"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「だって、つい……魔が差して？」"
translation = "「그게, 나도 모르게…… 마가 끼어서?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「だってじゃないわよ！\u3000今ドン引きしてるわよ私も！」"
translation = "「나도 모르게 가 아니에요! 지금 저도 정떨어지고 있다고요!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「えぇ～。大丈夫よ、この子頑丈だから……３、２、１──」"
translation = "「에이~ 괜찮아, 이 아이 튼튼하니까…… 3, 2, 1──」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「ふっか～つ！」"
translation = "「부~활!」"

[[dialogue]]
speaker = "unk"
original = "本当に立ち上がった！"
translation = "정말 일어났다!"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「昔からタフだったのよ～。入学したばかりの頃からマムの鉄球を受けてもピンピンしてたわ～」"
translation = "「예전부터 타프했단다~ 입학한 지 얼마 안 됐을 무렵부터 마무의 철구를 맞아도 쌩쌩했었지~」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「イエ～イ！！」"
translation = "「예~이!!」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「あれ？\u3000君、なんだか見覚えが……じー……」"
translation = "「어라? 너, 왠지 본 기억이…… 빤히……」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「会長くん、もしかして、<ruby>ＧＦＣ<rt>ジーエフシー</rt></ruby>で働いてたことある？」"
translation = "「회장군, 혹시 GFC에서 일했던 적 있어?」"

[[dialogue]]
speaker = "unk"
original = "はい、新星に転入する前に"
translation = "네, 신성에 전입하기 전에."

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「だよねー！\u3000君の顔見たことあるもん！」"
translation = "「역시! 네 얼굴 본 적 있거든!」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「確か環ちゃんと一緒のお店だったよね？\u3000環ちゃん、ＧＦＣの制服似合ってたな～」"
translation = "「분명 타마키짱이랑 같은 가게였지? 타마키짱, GFC 제복 잘 어울렸지~」"

[[dialogue]]
speaker = "unk"
original = "ＧＦＣとは、<ruby>ＧＡＬＬＵＳ<rt>ガルス</rt></ruby>・<ruby>ＦＲＩＥＤ<rt>フライド</rt></ruby>・<ruby>ＣＨＩＣＫＥＮ<rt>チキン</rt></ruby>の略であり、世界的に有名なフライドチキンのチェーン店だ。"
translation = "GFC란, 가루스 프라이드 치킨의 약자로 세계적으로 유명한 프라이드치킨 체인점이다."

[[dialogue]]
speaker = "unk"
original = "当然、俺も働いたことがある。学生のアルバイト先としては、最も身近な選択肢のひとつだろう。"
translation = "당연히 나도 일해본 적이 있다. 학생의 아르바이트 자리로는 가장 친숙한 선택지 중 하나일 것이다."

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「そうなんだ、やっぱり！\u3000どーりで見たことあると思った！」"
translation = "「그렇구나, 역시! 어쩐지 본 적 있다고 생각했어!」"

[[dialogue]]
speaker = "unk"
original = "実はチキンを揚げる社内資格も持ってました"
translation = "사실 치킨을 튀기는 사내 자격증도 가지고 있었습니다."

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「すっご！\u3000あたし、感動してきた！！」"
translation = "「대박! 나 감동했어!!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そんなにすごいのかな？」"
translation = "「그렇게 대단한 걸까?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「さぁ……和菓子職人の凄さは分かるのですが」"
translation = "「글쎄요…… 화과자 장인의 대단함은 알겠습니다만.」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「初対面だと思ったら、すでに出会ってたなんて、運命感じちゃう！\u3000フライドチキンが結んだ縁だね！」"
translation = "「첫 대면인 줄 알았는데 이미 만났었다니, 운명을 느껴버려! 프라이드치킨이 맺어준 인연이네!」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「じゃ、改めてよろしく！\u3000これでもプリマステラだから何かあったら遠慮なく頼ってね！」"
translation = "「그럼 새삼스럽게 잘 부탁해! 이래 봬도 프리마스텔라니까 무슨 일 있으면 사양 말고 의지해줘!」"

[[dialogue]]
speaker = "unk"
original = "シルヴィ先輩は俺の手を取ると、ぶんぶん握手するのだった。"
translation = "실비 선배는 내 손을 잡고 붕붕 흔들며 악수하는 것이었다."

