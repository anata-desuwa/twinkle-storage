[[dialogue]]
speaker = "unk"
original = "第８話,オペレーション・ペンタグラム,B"
translation = "제8화, 오퍼레이션 펜타그램"

[[dialogue]]
speaker = "unk"
original = "セドナとウェンディが基地に戻ると、さっそく指令室にネビュラの主要メンバーが集められた。"
translation = "세드나와 웨디가 기지로 돌아오자, 즉시 사령실에 네뷸라의 주요 멤버들이 소집되었다."

[[dialogue]]
speaker = "unk"
original = "そしてセドナの口から、ヘレナとの会談結果、新星・流星学園との協調路線を取ることになったことが示される。"
translation = "그리고 세드나의 입을 통해, 헬레나와의 회담 결과, 신성·유성학원과 협조 노선을 취하게 되었음이 밝혀진다."

[[dialogue]]
speaker = "アイリーン"
original = "「守護天使の問題、人間側にもちゃんと気付いてるヒトがいたんだね」"
translation = "「수호천사 문제, 인간 측에도 제대로 눈치채고 있는 사람이 있었네」"

[[dialogue]]
speaker = "リーリア"
original = "「危険度でいったら、ふつーにリクリエ並みですからね……マジカルヤバいですよ」"
translation = "「위험도로 따지면, 그냥 리크리에급이니까요…… 매지컬하게 위험하다구요」"

[[dialogue]]
speaker = "セドナ"
original = "「その通りだ。我々魔女にとっても放置しておける問題ではない」"
translation = "「그 말대로다. 우리 마녀들에게 있어서도 방치할 수 없는 문제지」"

[[dialogue]]
speaker = "セドナ"
original = "「守護天使の本体が封じられている魔界の神殿は６つ。その内所在が明らかになっている神殿は５つだ」"
translation = "「수호천사의 본체가 봉인되어 있는 마계의 신전은 6곳. 그중 소재가 밝혀진 신전은 5곳이다」"

[[dialogue]]
speaker = "セドナ"
original = "「今回の作戦ではその全てに、同時に星騎士たちを送り込むことになる」"
translation = "「이번 작전에서는 그 모든 곳에, 동시에 성기사들을 보내게 된다」"

[[dialogue]]
speaker = "セドナ"
original = "「我々ネビュラ隊員はその各チームに随行し案内役を務めるのだ」"
translation = "「우리 네뷸라 대원들은 그 각 팀에 수행하여 안내역을 맡는 것이다」"

[[dialogue]]
speaker = "ウェンディ"
original = "「大規模な作戦になりそうですし、イニシュも叩き起こしてきた方がいいでしょうか？」"
translation = "「대규모 작전이 될 것 같은데, 이니슈도 깨워 오는 게 좋을까요?」"

[[dialogue]]
speaker = "セドナ"
original = "「今はいい、寝かせておけ。本戦には参加してもらうが」"
translation = "「지금은 됐다, 재워 둬라. 본전에는 참가시키겠지만」"

[[dialogue]]
speaker = "アイリーン"
original = "「それじゃ、マリオンさんには私から連絡しておきます」"
translation = "「그럼, 마리온 씨에게는 제가 연락해 둘게요」"

[[dialogue]]
speaker = "セドナ"
original = "「ああ、頼む」"
translation = "「아아, 부탁하마」"

[[dialogue]]
speaker = "リーリア"
original = "「ううう～っ、まさに共同作戦って感じでテンションあがる～！」"
translation = "「우우우~, 그야말로 공동 작전이라는 느낌이라 텐션 올라가~!」"

[[dialogue]]
speaker = "カヤ"
original = "「私は粛々と与えられた任務を遂行するのみ」"
translation = "「저는 엄숙히 주어진 임무를 수행할 뿐입니다」"

[[dialogue]]
speaker = "リーリア"
original = "「そんなこと言わずに仲良くしてみたら？\u3000ま、カヤらしいけど」"
translation = "「그러지 말고 사이좋게 지내 보는 건 어때? 뭐, 카야답긴 하지만」"

[[dialogue]]
speaker = "セドナ"
original = "「まだ話は終わっていないぞ。もうひとつ大事なことがある」"
translation = "「아직 이야기는 끝나지 않았다. 또 하나 중요한 게 있어」"

[[dialogue]]
speaker = "セドナ"
original = "「この作戦の話は我々の間だけに留めておくように。……決して姫様のお耳に入れてはならない」"
translation = "「이 작전 이야기는 우리끼리만 알고 있도록 해라. ……결코 공주님의 귀에 들어가게 해서는 안 된다」"

[[dialogue]]
speaker = "アイリーン"
original = "「あ～、クラウディア様が聞いたら、絶対自分も参加するって言い出すに決まってるからね」"
translation = "「아~, 클라우디아 님이 들으시면, 분명 자신도 참가하겠다고 나설 게 뻔하니까요」"

[[dialogue]]
speaker = "セドナ"
original = "「姫様には世界樹に魔力を注ぐ役目を担ってもらわなくてはならない」"
translation = "「공주님께는 세계수에 마력을 쏟는 역할을 맡아 주셔야만 한다」"

[[dialogue]]
speaker = "セドナ"
original = "「説明は当日、私が行う。それまでくれぐれも作戦が漏れぬよう注意せよ」"
translation = "「설명은 당일, 내가 하겠다. 그때까지 부디 작전이 새어 나가지 않도록 주의해라」"

[[dialogue]]
speaker = "セドナ"
original = "「作戦名は『オペレーション・ペンタグラム』、当日に向けて各々準備を怠らぬように！」"
translation = "「작전명은 『오퍼레이션 펜타그램』, 당일을 향해 각자 준비를 게을리하지 않도록!」"

[[dialogue]]
speaker = "全員"
original = "「イエス・マム！」"
translation = "「예스 맘!」"

[[dialogue]]
speaker = "unk"
original = "そうして数日が経過し──"
translation = "그렇게 며칠이 경과하고──"

[[dialogue]]
speaker = "unk"
original = "ネビュラと星騎士たちの初めての共同作戦、『オペレーション・ペンタグラム』の日を迎えた。"
translation = "네뷸라와 성기사들의 첫 공동 작전, 『오퍼레이션 펜타그램』의 날을 맞이했다."

[[dialogue]]
speaker = "セドナ"
original = "「──話が決まったところで作戦の説明を進めよう。天使の本体は現在、魔界の各地の<ruby>旧<rt>ふる</rt></ruby>い神殿に封印されている」"
translation = "「──이야기가 결정된 참이니 작전 설명을 진행하겠다. 천사의 본체는 현재, 마계 각지의 옛 신전에 봉인되어 있다」"

[[dialogue]]
speaker = "セドナ"
original = "「作戦はいたって単純だ。流星市国から魔界にある神殿に戦力を送り込み、堕天使となった守護天使を撃破する」"
translation = "「작전은 지극히 단순하다. 유성시국에서 마계에 있는 신전으로 전력을 보내, 타락천사가 된 수호천사를 격파한다」"

[[dialogue]]
speaker = "セドナ"
original = "「ただし世界樹で送れる戦力には限りがある。一ヵ所につき十数名が限界だろう」"
translation = "「단, 세계수로 보낼 수 있는 전력에는 한계가 있어. 한 곳당 십수 명이 한계겠지」"

[[dialogue]]
speaker = "セドナ"
original = "「そしておそらく、堕天使は今までに戦ったものより格段に強い。何せ女神に近い高等存在の本体。死闘になるのは必至だ」"
translation = "「그리고 아마도, 타락천사는 지금까지 싸웠던 것들보다 격이 다르게 강할 거다. 무엇보다 여신에 가까운 고등 존재의 본체니까. 사투가 될 것은 필연적이다」"

[[dialogue]]
speaker = "セドナ"
original = "「また、案内として各チームにはネビュラの魔女が同行する。世界樹の中で迷子になっては敵わないからな」"
translation = "「또한, 안내로서 각 팀에는 네뷸라의 마녀가 동행한다. 세계수 안에서 미아가 되어서는 곤란하니까 말이다」"

[[dialogue]]
speaker = "セドナ"
original = "「しかし魔界への道を開くのに膨大な魔力を消費する。世界樹にかかる負担も大きい。チャンスは一度きりだ」"
translation = "「하지만 마계로 가는 길을 여는 데 방대한 마력을 소비한다. 세계수에 가해지는 부담도 크지. 기회는 단 한 번뿐이다」"

[[dialogue]]
speaker = "ヘレナ"
original = "『つまり敗北は許されない。<ruby>乾坤一擲<rt>けんこんいってき</rt></ruby>の戦いだ。心してくれ』"
translation = "『즉 패배는 용납되지 않는다. 견곤일척의 싸움이다. 각오해라』"

[[dialogue]]
speaker = "ウェンディ"
original = "（……いよいよ始まります、か……）"
translation = "(……드디어 시작되는군요, 가……)"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「ねえねえ、ウェンディ」"
translation = "「저기 저기, 웨디」"

[[dialogue]]
speaker = "ウェンディ"
original = "「ツェツィーリエ！？\u3000どうしてここに……！」"
translation = "「체칠리에!? 어떻게 여기에……!」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「なーんかお祭り騒ぎみたいになってるからさ、様子を見にきたんだよん♪」"
translation = "「뭐어ーㄴ가 축제 분위기인 것 같아서 말이야, 구경하러 왔지롱♪」"

[[dialogue]]
speaker = "ウェンディ"
original = "「冷やかしですか、帰ってください」"
translation = "「비아냥거리는 건가요, 돌아가 주세요」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「塩対応だな～、戦いの前にエールを送ろうと思っただけなのに」"
translation = "「차갑네ー, 싸우기 전에 응원을 보내려던 것뿐인데」"

[[dialogue]]
speaker = "ウェンディ"
original = "「気持ちだけ受け取っておきます」"
translation = "「마음만 받아 두겠습니다」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「あとさ、今回のお話、ありがとうって言っときたくてね」"
translation = "「그리고 말이야, 이번 이야기, 고맙다고 말해두고 싶어서」"

[[dialogue]]
speaker = "ウェンディ"
original = "「ん、何の話ですか？」"
translation = "「응, 무슨 이야기인가요?」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「ほら、学園と同盟を組んで一緒にやってくって話になったでしょ？」"
translation = "「봐봐, 학원과 동맹을 맺고 함께 해나가기로 했잖아?」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「資金だけじゃなくて<ruby>技術<rt>こっち</rt></ruby>の方でも学園の人たちが協力してくれることになったんだよね」"
translation = "「자금뿐만 아니라 기술 면에서도 학원 사람들이 협력해 주기로 했다며」"

[[dialogue]]
speaker = "ウェンディ"
original = "「ああ、そうでしたね。お礼というのはその事ですか」"
translation = "「아아, 그랬었죠. 감사라는 건 그 일인가요」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「そうだよ。ひょっとしたら、こないだの発明が日の目を見る時もあるかも」"
translation = "「그래. 어쩌면 요전번 발명품이 빛을 볼 때가 올지도 몰라」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「その時はウェンディ、また試作品のテストを手伝って♪」"
translation = "「그때는 웨디, 또 시제품 테스트를 도와줘♪」"

[[dialogue]]
speaker = "ウェンディ"
original = "「あんな目に遭うのは二度とごめんです！」"
translation = "「그런 꼴을 당하는 건 두 번 다시 사양입니다!」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「たはは♪\u3000でもさ、これを機に人間界との交流が盛んになればいいね」"
translation = "「타하하♪ 하지만 말이야, 이걸 계기로 인간계와의 교류가 활발해지면 좋겠네」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「アタシの夢も、ウェンディの夢も、いよいよ現実味を帯びてくるんじゃない？」"
translation = "「내 꿈도, 웨디의 꿈도, 드디어 현실미를 띠게 되지 않겠어?」"

[[dialogue]]
speaker = "ウェンディ"
original = "「ええ……そうですね……」"
translation = "「예…… 그렇네요……」"

[[dialogue]]
speaker = "ウェンディ"
original = "（人間界との交流が盛んになり、魔女たちの間にも経済という概念が浸透していけば……）"
translation = "(인간계와의 교류가 활발해져서, 마녀들 사이에도 경제라는 개념이 침투해 간다면……)"

[[dialogue]]
speaker = "ウェンディ"
original = "（そうすればいよいよ実現するかもしれません……私の悲願、魔女の森に銀行を作るという夢も）"
translation = "(그렇게 되면 드디어 실현될지도 모릅니다…… 저의 비원, 마녀의 숲에 은행을 만든다는 꿈도)"

[[dialogue]]
speaker = "ウェンディ"
original = "（それにツェツィーリエの夢……）"
translation = "(그리고 체칠리에의 꿈……)"

[[dialogue]]
speaker = "ウェンディ"
original = "（人間界との交流が盛んになれば、その技術が魔女の森にも取り入れられていくことになるでしょう──）"
translation = "(인간계와의 교류가 활발해지면, 그 기술이 마녀의 숲에도 도입되게 되겠죠──)"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「あのさ、前からずっと思ってたんだけど、アタシたちってさ……」"
translation = "「저기 말이야, 전부터 계속 생각했던 건데, 우리 말이야……」"

[[dialogue]]
speaker = "ウェンディ"
original = "「あ～！\u3000それ以上言わないでください！\u3000ありえません！\u3000断固拒否します！」"
translation = "「아~! 거기까지! 더는 말하지 마세요! 있을 수 없습니다! 단호히 거부합니다!」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「え～、言わせろよ～！」"
translation = "「에ー, 말하게 해줘ー!」"

[[dialogue]]
speaker = "ウェンディ"
original = "（……ずっと、目を背けていたんですから）"
translation = "(……계속, 외면하고 있었으니까요)"

[[dialogue]]
speaker = "ウェンディ"
original = "（いがみ合ってはいるけれど……私とツェツィーリエ、似た者同士だってこと）"
translation = "(서로 으르렁거리고는 있지만…… 나와 체칠리에, 닮은꼴이라는 걸)"

[[dialogue]]
speaker = "セドナ"
original = "「ウェンディ、いつまで無駄話をしているつもりだ！」"
translation = "「웨디, 언제까지 잡담을 하고 있을 셈이냐!」"

[[dialogue]]
speaker = "ウェンディ"
original = "「も、申し訳ありません！」"
translation = "「조, 죄송합니다!」"

[[dialogue]]
speaker = "セドナ"
original = "「お前はイニシュを連れてマグダレナの神殿に向かってもらう、心してかかれ」"
translation = "「너는 이니슈를 데리고 막달레나의 신전으로 향하도록 해라, 명심하거라」"

[[dialogue]]
speaker = "ウェンディ"
original = "「了解しました！！！」"
translation = "「알겠습니다!!!」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「……ま、頑張ってね。無事に帰ってきなよ」"
translation = "「……뭐, 힘내. 무사히 돌아와」"

[[dialogue]]
speaker = "ウェンディ"
original = "「ええ、行ってきます！」"
translation = "「예, 다녀오겠습니다!」"

