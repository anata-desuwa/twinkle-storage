[[dialogue]]
speaker = "unk"
original = "第２話,独特グルメ,P"
translation = "제2화, 독특한 미식, P"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「今日もありがとうございました。忙しいのにいろいろ案内していただいて」"
translation = "「오늘도 감사합니다. 바쁜데도 여러모로 안내해 주셔서」"

[[dialogue]]
speaker = "unk"
original = "学園長就任の告知がされた後も、案内役としてシノさんを連れて学園のあちこちを回っていた。"
translation = "학원장 취임 공고가 난 후에도 안내역으로서 시노 씨를 데리고 학원 여기저기를 돌고 있었다."

[[dialogue]]
speaker = "unk"
original = "そして案内の最後にはカフェテリアへ、というのも恒例として定着しつつある。"
translation = "그리고 안내의 마지막에는 카페테리아로, 라는 것도 관례처럼 정착되어가고 있다."

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「思ったより長い時間、つき合わせてしまいましたね。会長さんもお疲れでしょう？\u3000せっかくですから少し休んでいきましょう」"
translation = "「생각보다 긴 시간 동안 함께하게 해버렸네요. 회장님도 피곤하시죠? 기왕 왔으니 조금 쉬었다 가요」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「カフェラテ、甘くて美味しい……糖分が全身を駆け巡っていくのを感じますね……」"
translation = "「카페라테, 달콤하고 맛있어…… 당분이 전신을 휘감는 게 느껴지네요……」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「ふふ、すみません、情けない姿をお見せしてしまって。デスクワークが多いもので、体力にはあまり自信がないんです」"
translation = "「후후, 죄송해요, 한심한 모습을 보여드려서. 데스크워크가 많다 보니 체력에는 별로 자신이 없거든요」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「もっと体力をつけないといけないんですけどね……なかなか時間が取れなくて」"
translation = "「체력을 더 길러야 하는데 말이죠…… 좀처럼 시간을 낼 수가 없어서」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「会長さんも何か注文して下さい。払いは私が持ちますので遠慮なく」"
translation = "「회장님도 뭔가 주문하세요. 계산은 제가 할 테니 사양 말고」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「お腹が空いていたら軽食を頼んでもいいですよ。私は……こちらをいただきますので」"
translation = "「배가 고프시면 가벼운 식사를 시키셔도 돼요. 저는…… 이걸 먹을 테니까요」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「これですか？\u3000これはですね、カロリーたっぷりの完全栄養食です。なんとこれ１本で１日分の栄養が補給できる優れものです」"
translation = "「이거 말인가요? 이건 말이죠, 칼로리가 듬뿍 담긴 완전 영양식입니다. 무려 이거 한 개로 하루치 영양을 보충할 수 있는 뛰어난 물건이죠」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「ぽそぽそしてるのが難点ですけど……飲み物で流し込んでしまえば……」"
translation = "「퍽퍽하다는 게 단점이지만…… 음료수로 넘겨버리면……」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「はむっ……もぐもぐもぐ……ずずずずず……ごくんっ」"
translation = "「함냠…… 우물우물우물…… 후루룩…… 꿀꺽」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「ふふ、ざっとこんな感じです」"
translation = "「후후, 대충 이런 느낌이에요」"

[[dialogue]]
speaker = "unk"
original = "おいしいんですか、それ？"
translation = "그거 맛있나요?"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「これがなかなかどうして美味しいんですよ。微妙な味わいが癖になるんです！」"
translation = "「이게 의외로 맛있단 말이죠. 미묘한 맛이 중독성 있어요!」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「短時間でしっかり満足できますし、ビジネスマンのつよ～い味方！\u3000会長さんも常備しておくと、いざという時に助かりますよ」"
translation = "「단시간에 확실히 만족할 수 있고, 비즈니스맨의 든~든한 아군! 회장님도 상비해두시면 만약의 경우에 도움이 될 거예요」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「そうだ、せっかくですから味見してみませんか？\u3000ねっ、ねっ？」"
translation = "「맞다, 기왕이니까 맛보지 않으실래요? 네? 네?」"

[[dialogue]]
speaker = "unk"
original = "目も爛々と輝いて、ちょっと恐いです"
translation = "눈을 번쩍이며 빛내니 조금 무섭습니다"

[[dialogue]]
speaker = "unk"
original = "あ、あの、急に押しが強く……"
translation = "저, 저기, 갑자기 밀어붙이기가 강해지셔서……"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「恐くありませんよ～、種類もたくさんありますからね～。会長さんには何をオススメするべきでしょうか……ふふ、迷ってしまいます」"
translation = "「무섭지 않아요~, 종류도 많이 있거든요~. 회장님에게는 무엇을 추천해 드려야 할지…… 후후, 고민되네요」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「決めました！\u3000出し惜しみしていても仕方ありませんから、いきなりとっておきの『超完全栄養食』でいってみましょう！」"
translation = "「결정했습니다! 아껴봤자 소용없으니, 바로 비장의 『초 완전 영양식』으로 가보죠!」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「はい、こちらは通常の完全栄養食に、更に栄養を追加したものになっています」"
translation = "「자, 이쪽은 통상적인 완전 영양식에 영양을 더 추가한 것입니다」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「これを食べればどんなに疲れが溜まっていても、たちどころに元気になってしまうんですね」"
translation = "「이걸 먹으면 아무리 피로가 쌓여 있어도 단번에 기운이 나버리거든요」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「私も週に一度は食べている、栄養マシマシな逸品です。さあさあ会長さん、ぜひ食べてみてください！」"
translation = "「저도 일주일에 한 번은 먹고 있는, 영양 듬뿍인 일품입니다. 자자 회장님, 꼭 드셔보세요!」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「ええ～、そんなに警戒しなくてもいいじゃありませんか～」"
translation = "「에이~, 그렇게 경계하지 않으셔도 되잖아요~」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「ちゃんと食品メーカーが製品として扱っているものですから、見た目はよくないかもしれませんが危険はありませんよ」"
translation = "「제대로 된 식품 회사에서 제품으로 취급하는 것이니, 겉모양은 별로일지 몰라도 위험하진 않아요」"

[[dialogue]]
speaker = "unk"
original = "頂きますっ、あむっ！"
translation = "잘 먹겠습니다, 냠!"

[[dialogue]]
speaker = "unk"
original = "そ、そうですよね。それじゃ……"
translation = "그, 그렇겠죠. 그럼……"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「ふふ、目をぱちくりさせて驚いていますね」"
translation = "「후후, 눈을 깜빡거리며 놀라고 계시네요」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「どうです、会長さん？\u3000意外と美味しくありませんか？\u3000それにお手軽に栄養補給が出来るから私も愛用しているんです」"
translation = "「어때요, 회장님? 의외로 맛있지 않나요? 게다가 간편하게 영양 보충을 할 수 있어서 저도 애용하고 있어요」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「忙しい時なんて特にこれが手放せません。超完全栄養食、気に入っていただけましたか？」"
translation = "「바쁠 때면 특히 이걸 뗄 수가 없답니다. 초 완전 영양식, 마음에 드셨나요?」"

[[dialogue]]
speaker = "unk"
original = "確かにこれはいいかもしれない"
translation = "확실히 이건 괜찮을지도 모르겠네요"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「ですよね！\u3000会長さんなら分かってくれると信じてましたよ♪」"
translation = "「그렇죠! 회장님이라면 알아주실 거라 믿었어요♪」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「それでは次はこちらのフルーツ味の方を──」"
translation = "「그럼 다음은 이쪽 과일 맛 쪽을──」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「あ、あの……せっかくカフェにいらしたのですから、出来れば料理を楽しんで欲しいのですが……」"
translation = "「저, 저기…… 기왕 카페에 오셨으니 가급적이면 요리를 즐겨주셨으면 합니다만……」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「あら、その格好は……もしかして、<ruby>東雲<rt>しののめ</rt></ruby><ruby>蛍火<rt>けいか</rt></ruby>さんですか？」"
translation = "「어머, 그 차림새는…… 혹시, 시노노메 케이카 씨인가요?」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「はい、このカフェテリアで料理人を務めさせて頂いております」"
translation = "「네, 이 카페테리아에서 요리사를 맡고 있습니다」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「あなたは先日、新星学園の学園長になられた十六夜シノさん……ですよね？」"
translation = "「당신은 요전 날 신성학원의 학원장이 되신 이자요이 시노 씨…… 맞으시죠?」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「はい、そうです」"
translation = "「네, 맞습니다」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「あっ……もしかしてこのカフェテリアは食べ物の持ち込みは禁止でしたか？」"
translation = "「앗…… 혹시 이 카페테리아는 외부 음식 반입 금지였나요?」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「いえ、それは問題ありませんし、栄養食について否定するつもりもないのですが……」"
translation = "「아니요, 그건 문제없고 영양식에 대해 부정할 생각도 없습니다만……」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「……蛍火さんの作る料理が美味しいという噂は、学園長に就任する前より耳にしていました」"
translation = "「……케이카 씨가 만드는 요리가 맛있다는 소문은 학원장에 취임하기 전부터 듣고 있었습니다」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「そんな方のいらっしゃるお店で、お料理を頼まず栄養食を広げるのは確かに失礼でした……ごめんなさい、気を悪くされましたよね？」"
translation = "「그런 분이 계시는 가게에서 요리를 시키지 않고 영양식을 펼치는 건 확실히 실례였습니다…… 죄송해요, 기분 상하셨죠?」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「あ、う……そんなことは無いのですが……その……」"
translation = "「아, 으…… 그런 건 아닙니다만…… 그게……」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「東雲先輩は学園長さんを、料理でおもてなししたいだけなんですよ～」"
translation = "「시노노메 선배는 학원장님을 요리로 대접하고 싶을 뿐이에요~」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「あなたは<ruby>天ヶ崎<rt>あまがさき</rt></ruby>ヨミさんですね？\u3000ふふ、こちらもまた噂通り、可愛らしい方です」"
translation = "「당신은 아마가사키 요미 씨군요? 후후, 이쪽도 소문대로 귀여운 분이시네요」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こやっ！？\u3000か、かわいいなんて……ちょっと恥ずかしいですけど」"
translation = "「코얏!? 기, 귀엽다니…… 조금 부끄럽긴 한데」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「コホン、クエスト受付嬢のヨミです。新しい学園長さん、初めまして。今後ともよろしくお願いします」"
translation = "「에헴, 퀘스트 접수원인 요미입니다. 새로운 학원장님, 처음 뵙겠습니다. 앞으로 잘 부탁드려요」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「はい、よろしくお願いします」"
translation = "「네, 잘 부탁드립니다」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「学園長、東雲先輩の作る料理も美味しくて栄養たっぷりですよ。だからぜひ、食べてあげてください」"
translation = "「학원장님, 시노노메 선배가 만드는 요리도 맛있고 영양 만점이에요. 그러니까 꼭 드셔보세요」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「ありがとうございます。では蛍火さん、シェフのオススメをお願いできますか？」"
translation = "「감사합니다. 그럼 케이카 씨, 셰프의 추천 메뉴로 부탁드려도 될까요?」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「はい、喜んで……！」"
translation = "「네, 기꺼이……!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「お邪魔しました～。お料理が出来るまで今しばらくお待ちくださーい♪」"
translation = "「방해했습니다~. 요리가 완성될 때까지 잠시만 기다려주세요~♪」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「歓迎してくれていますね、みんな……私のことを」"
translation = "「환영해 주고 있네요, 모두들…… 저를」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「私は学園生のみなさんとそれほど歳が変わりません。だからこの若さを不安視したり反発したりする声もあるだろうと覚悟していたのですが……」"
translation = "「저는 학원생 여러분과 나이 차이가 별로 나지 않아요. 그래서 이 젊음을 불안해하거나 반발하는 목소리도 있을 거라 각오하고 있었습니다만……」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「本当にどこに行っても歓迎してくださいます。嬉しいことですね……」"
translation = "「정말 어디를 가도 환영해 주시네요. 기쁜 일이군요……」"

[[dialogue]]
speaker = "unk"
original = "みんなと友達になってください"
translation = "모두와 친구가 되어주세요"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「友達……いいですね。ふふ、ありがとうございます」"
translation = "「친구…… 좋네요. 후후, 감사합니다」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「では会長さん。あなたともお友達、そういうことでいいでしょうか？」"
translation = "「그럼 회장님. 당신과도 친구, 그렇게 해도 괜찮을까요?」"

[[dialogue]]
speaker = "unk"
original = "ええ、もちろんです"
translation = "네, 물론이죠"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「ふふ、ありがとうございます」"
translation = "「후후, 감사합니다」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「蛍火さんとヨミさん、お２人ともお友達になりたいですね。いいえ、それだけでなく学園のみなさん、全員と」"
translation = "「케이카 씨와 요미 씨, 두 분과도 친구가 되고 싶네요. 아니요, 그뿐만 아니라 학원 여러분 모두와요」"

[[dialogue]]
speaker = "unk"
original = "そう言ってシノさんは、歳相応の楽しそうな笑顔を覗かせたのだった。"
