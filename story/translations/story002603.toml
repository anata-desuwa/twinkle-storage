[[dialogue]]
speaker = "unk"
original = "俺たちはパブリックビーチの方へ移動し、海で遊ぶことになり――"
translation = "우리들은 퍼블릭 비치 쪽으로 이동해 바다에서 놀게 되었고──"

[[dialogue]]
speaker = "リノ"
original = "「ねぇねぇ、ク・ロ・ト♪」"
translation = "「저기 저기, 쿠·로·토♪」"

[[dialogue]]
speaker = "リノ"
original = "「さっきは色々説明してたから聞けなかったけど～。お母さんの水着、どうかしら？\u3000似合ってる？」"
translation = "「아까는 여러 가지 설명하느라 못 물어봤는데~. 엄마 수영복 어떠니? 잘 어울려?」"

[[dialogue]]
speaker = "unk"
original = "ちょっと大胆な気もするけど……"
translation = "조금 대담한 기분도 들지만……"

[[dialogue]]
speaker = "unk"
original = "よく似合ってて、綺麗だよ"
translation = "아주 잘 어울리고 아름다워요"

[[dialogue]]
speaker = "リノ"
original = "「ふふふっ♪\u3000ありがと～♪\u3000でも、そんなに大胆かしら？」"
translation = "「후후후♪ 고마워~♪ 하지만 그렇게 대담하니?」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「ああ。リノは良くも悪くもセンスが大胆だからな」"
translation = "「그래. 리노는 좋든 싫든 센스가 대담하니까」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「まぁ、美人だしスタイルが良いから、結局何を着ても似合ってしまうわけだが……」"
translation = "「뭐, 미인이고 몸매가 좋으니 결국 뭘 입어도 잘 어울리는 법이지만……」"

[[dialogue]]
speaker = "unk"
original = "リコさんも水着、すごく似合ってます"
translation = "리코 씨도 수영복 정말 잘 어울려요"

[[dialogue]]
speaker = "リコリンフィア"
original = "「ん？\u3000ふふっ、やはり水着に見えるか」"
translation = "「음? 후훗, 역시 수영복으로 보이나」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「実は、これは私のデフォルトの戦闘服でな。昔から水着っぽいと言われていたから、それを今回、便利に使っているというわけだ」"
translation = "「실은 이건 나의 디폴트 전투복이라서 말이지. 옛날부터 수영복 같다는 말을 들었기에 이번에 편리하게 사용하고 있는 셈이다」"

[[dialogue]]
speaker = "リノ"
original = "「ちなみにお母さんのも、ただの水着じゃなくて『水着フォーム』なのよ♪」"
translation = "「참고로 엄마 것도 그냥 수영복이 아니라 『수영복 폼』이란다♪」"

[[dialogue]]
speaker = "リノ"
original = "「ほら、こんな感じでね♪\u3000ネビュラの方で、前に魔女の水着フォーム実装に成功していたでしょう？」"
translation = "「봐봐, 이런 느낌으로 말이지♪ 네뷸라 쪽에서 전에 마녀의 수영복 폼 구현에 성공했었지?」"

[[dialogue]]
speaker = "リノ"
original = "「その技術を参考に、私独自にアレンジして作ってみたの♪」"
translation = "「그 기술을 참고해서 내가 독자적으로 어레인지해서 만들어봤어♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「にひひ♪\u3000さらっと言ってますけど、多分その参考にしたっていうのは、技術を提供してもらったわけじゃなくて、目で見て分析したって感じですよね？」"
translation = "「니히히♪ 태연하게 말씀하시지만, 아마 그 참고했다는 건 기술을 제공받은 게 아니라 눈으로 보고 분석했다는 느낌이죠?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「だとしたら、リノさんも大概、ハンパない魔女ですよね～」"
translation = "「그렇다면 리노 씨도 대체로 장난 아닌 마녀라니까요~」"

[[dialogue]]
speaker = "リノ"
original = "「ふふっ、星術や魔法の研究は、私の専門分野だからね～」"
translation = "「후훗, 성술이나 마법 연구는 내 전문 분야니까 말이야~」"

[[dialogue]]
speaker = "リノ"
original = "「ただ、お母さん的には、今はマインちゃんに興味津々かな♪」"
translation = "「다만 엄마 개인적으로는 지금 마인 양에게 흥미진진하달까♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ありゃ？\u3000私ですか？」"
translation = "「어라? 저 말인가요?」"

[[dialogue]]
speaker = "リノ"
original = "「だってマインちゃん、思っていたよりずっと、クロトと仲良さそうなんだもの♪」"
translation = "「그야 마인 양, 생각했던 것보다 훨씬 쿠로토와 사이가 좋아 보였는걸♪」"

[[dialogue]]
speaker = "unk"
original = "ちょっと、母さん！？"
translation = "잠깐, 엄마!?"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「はてさて、会長は私のこと、どんな風に思っているんですかね～？\u3000にひひ♪」"
translation = "「자아 과연, 회장은 나에 대해 어떤 식으로 생각하고 있으려나~? 니히히♪」"

[[dialogue]]
speaker = "unk"
original = "ニヤニヤと悪戯な笑顔を浮かべながら、俺の脇腹をひと差し指でつついて来るマイン。"
translation = "싱글벙글 짓궂은 미소를 지으며 내 옆구리를 검지 손가락으로 쿡쿡 찌르는 마인."

[[dialogue]]
speaker = "unk"
original = "お手柔らかにお願いします……"
translation = "살살 좀 부탁드립니다……"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「え～？\u3000それって私に悪戯して欲しいっていうフリだったりする？」"
translation = "「에~? 그거 나한테 장난쳐달라는 신호 아냐?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「どうしよっかな～？\u3000にひひひっ<emoji=heart04>」"
translation = "「어쩔까나~? 니히히힛❤」"

[[dialogue]]
speaker = "unk"
original = "その後、俺たちはリコさんの提案で、海に入りながらビーチボールで遊ぶことになった。"
translation = "그 후 우리는 리코 씨의 제안으로 바다에 들어가 비치볼을 하며 놀기로 했다."

[[dialogue]]
speaker = "リコリンフィア"
original = "「そら、ゆくぞ少年。星徒会長の実力とやら、お姉さんに見せてみるがいい。――せいっ！」"
translation = "「자, 간다 소년. 성도회장의 실력이라는 거 언니에게 한번 보여주렴. ──얏!」"

[[dialogue]]
speaker = "unk"
original = "うおぉっ！？\u3000遊びなのに星力込み！？"
translation = "우오옷!? 놀이인데 성력까지 담아서!?"

[[dialogue]]
speaker = "unk"
original = "星力の込められたサーブは、空気で膨らませたビニールボールとは思えない程に、重い手応えがあった。"
translation = "성력이 담긴 서브는 공기로 부풀린 비닐 볼이라고는 생각되지 않을 정도로 묵직한 손맛이 있었다."

[[dialogue]]
speaker = "リコリンフィア"
original = "「ほう、しっかりと返してみせたか。いいレシーブだ」"
translation = "「호오, 제대로 받아냈나. 좋은 리시브군」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「きゃはははっ☆\u3000一応これ、<b>仕事</b>のはずなんですけど、リコさんってば、星騎士なのは隠す気ないんですね♪」"
translation = "「캬하하하☆ 일단 이거 <b>일</b>일 텐데, 리코 씨는 성기사인 거 숨길 생각이 전혀 없네요♪」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「星騎士が変に星力を隠している方が不自然に見えるというものだ」"
translation = "「성기사가 이상하게 성력을 숨기는 게 더 부자연스럽게 보이는 법이다」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「それに、海を『エンジョイする』と言っただろう？\u3000ならば、本当に楽しんでいるように見せなければ意味がない。――そらっ！」"
translation = "「게다가 바다를 『엔조이한다』고 말했지? 그렇다면 정말로 즐기고 있는 것처럼 보이지 않으면 의미가 없다. ──영차!」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「いや～、本物の附属生になり切ってるヒトが言うと、説得力ありますわ～。リノさん、トスで～す♪」"
translation = "「이야~ 진짜 부속생이 다 된 분이 말씀하시니까 설득력 있네요~. 리노 씨, 토스예요~♪」"

[[dialogue]]
speaker = "リノ"
original = "「は～い♪\u3000リコは真面目に見せかけて、結構無茶苦茶なことを平然とやるからね～。――スパイク、え～いっ！」"
translation = "「네~이♪ 리코는 성실한 척하면서 꽤 무지막지한 짓을 태연하게 해버리니까 말이야~. ──스파이크, 에잇!」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「ふっ、何を言っている、私はいつも真面目だとも。大事なことは――」"
translation = "「훗, 무슨 소리를. 나는 언제나 성실하다네. 중요한 것은──」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「大人として責任を持ち、結果でしっかりと<ruby>辻褄<rt>つじつま</rt></ruby>を合わせることだ。――はぁっ！」"
translation = "「어른으로서 책임을 지고 결과로 확실히 앞뒤를 맞추는 것이다. ──하앗!」"

[[dialogue]]
speaker = "unk"
original = "母さんのスパイクを、ダイレクトにスパイクで返すリコさん。"
translation = "엄마의 스파이크를 다이렉트 스파이크로 되받아치는 리코 씨."

[[dialogue]]
speaker = "unk"
original = "その一撃は鋭い角度で、コート隅へと飛んで行くが――"
translation = "그 일격은 예리한 각도로 코트 구석으로 날아가지만──"

[[dialogue]]
speaker = "unk"
original = "バッチコイ！\u3000おりゃあ！！"
translation = "받아라! 이랴아!!"

[[dialogue]]
speaker = "unk"
original = "俺は全力ダイブして、両腕に星力を込めレシーブを上げてみせる。"
translation = "나는 온몸을 던져 양팔에 성력을 실어 리시브를 올려 보였다."

[[dialogue]]
speaker = "リコリンフィア"
original = "「ふっ、そうこなくてはな、少年」"
translation = "「훗, 그래야지 소년」"

[[dialogue]]
speaker = "unk"
original = "リコさんは楽しそうな笑みを浮かべるのだった。"
translation = "리코 씨는 즐거운 듯한 미소를 지었다."

[[dialogue]]
speaker = "unk"
original = "海でのビーチバレーが終わった後、俺たちは一時休憩を取ることになった。"
translation = "바다에서의 비치발리볼이 끝난 뒤 우리는 잠시 휴식을 취하기로 했다."

[[dialogue]]
speaker = "unk"
original = "浜辺に置いてある飲み物を取りに行き、水分補給してから戻る途中――リコさんが、ちょっと怪しい雰囲気の男性に話しかけられている様子が目に入る。"
translation = "해변에 놓아둔 음료수를 가지러 가 수분을 보충하고 돌아오는 길── 리코 씨가 좀 수상한 분위기의 남성에게 말을 걸리고 있는 모습이 눈에 들어왔다."

[[dialogue]]
speaker = "怪しい男性"
original = "「お嬢ちゃん、水着が似合ってて、すごく可愛いね～」"
translation = "「꼬마 아가씨, 수영복이 잘 어울려서 정말 귀엽네~」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「え～？\u3000おじさん、リコリンのこと、褒めてくれるの？\u3000えへへっ、ありがと～♪」"
translation = "「에~? 아저씨, 리코린을 칭찬해 주는 거야? 에헤헤, 고마워~♪」"

[[dialogue]]
speaker = "怪しい男性"
original = "「可愛いから、よければおじさんが何か奢ってあげよう。一緒に食べに行かないかい？」"
translation = "「귀여우니까 괜찮다면 아저씨가 뭐 좀 사줄게. 같이 먹으러 가지 않을래?」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「本当？\u3000でも、ごめんなさ～い！\u3000リコリン、実は家族で遊びに来てて～」"
translation = "「정말? 하지만 미안해~ 요! 리코린 사실 가족들이랑 놀러 온 거라~」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「……あっ！\u3000ちょうどお兄ちゃんが戻って来た♪\u3000お兄ちゃ～ん！\u3000こっちこっち～！」"
translation = "「……앗! 마침 오빠가 돌아왔다♪ 오빠~! 여기야 여기~!」"

[[dialogue]]
speaker = "怪しい男性"
original = "「えっ！？\u3000お兄さん……！？」"
translation = "「엣!? 오빠……!?」"

[[dialogue]]
speaker = "unk"
original = "俺の妹に何か御用でしょうか？"
translation = "제 여동생에게 무슨 용무라도 있으신가요?"

[[dialogue]]
speaker = "怪しい男性"
original = "「い、いえ、別に！\u3000あははは！\u3000失礼しました～～～！！！」"
translation = "「아, 아니요, 딱히! 아하하하! 실례했습니다~~~!!!」"

[[dialogue]]
speaker = "unk"
original = "慌てて走り去って行く男性。"
translation = "허둥지둥 달려 나가는 남성."

[[dialogue]]
speaker = "リコリンフィア"
original = "「――やれやれ。あの男はさすがに今回の捜査とは無関係な気はするが……」"
translation = "「──이런 이런. 저 남자는 역시 이번 수사와는 무관한 것 같다만……」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「とはいえ、リゾート結界の治安的には全くもってよくないな。後で警戒リストに記載しておくとしよう」"
translation = "「그렇다 해도 리조트 결계의 치안상으로는 결코 좋지 않군. 나중에 경계 리스트에 기재해 두도록 하지」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「だが、いいタイミングで戻って来てくれたな、少年。おかげで楽に露払いすることができたよ。感謝する」"
translation = "「하지만 좋은 타이밍에 돌아와 줬군, 소년. 덕분에 편하게 쫓아낼 수 있었다. 고맙다」"

[[dialogue]]
speaker = "unk"
original = "妹がまた１人増える流れに……"
translation = "여동생이 또 한 명 늘어나는 흐름으로……"

[[dialogue]]
speaker = "リコリンフィア"
original = "「え～？\u3000お兄ちゃんはリコリンが妹になるの、嫌なの～？\u3000うるうる」"
translation = "「에~? 오빠는 리코린이 여동생 되는 거 싫어~? 울먹울먹」"

[[dialogue]]
speaker = "unk"
original = "再び附属生になり切って、目をあざとく潤ませてみせるリコさん――いや、リコリン。"
translation = "다시 부속생으로 돌아가 눈을 영악하게 적셔 보이는 리코 씨── 아니, 리코린."

[[dialogue]]
speaker = "unk"
original = "う……そんな目で見つめられると、困るんですが……"
translation = "으…… 그런 눈으로 쳐다보시면 곤란한데요……"

[[dialogue]]
speaker = "リコリンフィア"
original = "「――ふっ、別にいいじゃないか。少年にはそういう妹的な後輩が既に多くいるのだろう？\u3000情報収集しているから、よく知っているよ」"
translation = "「──훗, 뭐 어떠냐. 소년에게는 그런 여동생 같은 후배가 이미 많이 있지 않나? 정보 수집을 하고 있어서 잘 알고 있다고」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「今更１人増えたところで、どうという事はあるまい？\u3000……いや、年上のお姉さんが妹になるというのは初体験かな？\u3000ふふっ……♪」"
translation = "「이제 와서 한 명 늘어난다고 해서 대수겠나? ……아니, 연상인 누나가 여동생이 되는 건 처음인가? 후후……♪」"

[[dialogue]]
speaker = "unk"
original = "楽しんでやってません？"
translation = "즐기고 계신 거 아니에요?"

[[dialogue]]
speaker = "リコリンフィア"
original = "「何を言っている。リコリンはあくまで仕事に便利だから使っている<ruby>演技<rt>キャラ</rt></ruby>だ」"
translation = "「무슨 소리를. 리코린은 어디까지나 업무에 편리해서 사용하는 연기다」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「にひひ♪\u3000リコさんはそこだけは頑なに譲らないからね～」"
translation = "「니히히♪ 리코 씨는 그 부분만큼은 완고하게 양보하지 않으니까요~」"

[[dialogue]]
speaker = "リノ"
original = "「絶対に気に入って、やってるわよね～？」"
translation = "「절대 좋아서 하는 거 맞지~?」"

[[dialogue]]
speaker = "unk"
original = "そこにマインと母さんが戻って来る。"
translation = "거기에 마인과 엄마가 돌아온다."

[[dialogue]]
speaker = "リコリンフィア"
original = "「譲らないのではなく、事実だからだ」"
translation = "「양보하지 않는 것이 아니라, 사실이기 때문이다.」"

[[dialogue]]
speaker = "リノ"
original = "「でも、私たちで家族になり切るっていうのは面白そうね♪\u3000マインちゃん、私のことをお母さんって呼んでくれてもいいのよ～？」"
translation = "「하지만, 우리끼리 가족 놀이를 하는 것도 재밌을 것 같네♪ 마인짱, 나를 엄마라고 불러줘도 괜찮단다~?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「おっ、それ面白そうですね～♪\u3000だったら私も、会長より年下なわけだし、妹になり切っちゃおうかな～？」"
translation = "「오, 그거 재밌겠는데요~♪ 그렇다면 저도, 회장보다 연하니까 여동생 역할을 해버릴까나~?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ねぇねぇ、どう思う？\u3000――<ruby>兄<rt>あに</rt></ruby>くん♪」"
translation = "「있지 있지, 어떻게 생각해? ──오빠♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「なんてね☆\u3000にひひ♪」"
translation = "「농담이야☆ 니히히♪」"

[[dialogue]]
speaker = "unk"
original = "悪戯な笑みを浮かべて言うマインに、ちょっと悪くないかもと一瞬思ってしまう俺なのであった――"
translation = "장난스러운 미소를 지으며 말하는 마인에게, 조금 나쁘지 않을지도 모르겠다고 일순간 생각하고 마는 나였다──"

