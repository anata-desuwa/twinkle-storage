[[dialogue]]
speaker = "unk"
original = "第４話,ルリエルと海デート～深夜編～,P"
translation = "제4화, 루리엘과 바다 데이트 ~심야 편~, P"

[[dialogue]]
speaker = "unk"
original = "今日はルリエルと海デートした後、最後にバーベキューをしていた。"
translation = "오늘은 루리엘과 바다 데이트를 한 뒤, 마지막으로 바비큐를 하고 있었다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「会長さん、会長さん、お肉焼けましたよ～！\u3000ほーら、お口開けてくださーい。あーんしてあげますから」"
translation = "「회장님, 회장님, 고기 다 익었어요~! 자─, 입 벌려주세요. 아─ 해드릴 테니까요」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「えへへ、恥ずかしがらなくていいじゃないですかぁ。わたしたちの他にもう誰もいないんですし、イチャイチャしちゃいましょうよ～」"
translation = "「에헤헤, 부끄러워하지 않아도 되잖아요. 저희 말고 이제 아무도 없으니까, 꽁냥꽁냥해 버리자고요~」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ルリエルにも食べさせてくださいですぅ。ほーりゃ、あーん……」"
translation = "「루리엘에게도 먹여주세요. 자아, 아─……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「はむぅん、もぐもぐ。ふへへ、美味し～♪」"
translation = "「함냠, 우물우물. 후헤헤, 맛있어~♪」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「でもでも言ってみるものですね？\u3000本当に朝から晩まで海デートしてくださるなんて」"
translation = "「그치만 그치만 말해보고 볼 일이네요? 정말로 아침부터 밤까지 바다 데이트를 해주시다니」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ワガママ言いすぎかなって思いましたけど……えへへ、二つ返事で叶えてくれてとっても嬉しかったです。とっても贅沢な一日でした」"
translation = "「너무 억지 부리는 거 아닌가 생각했지만…… 에헤헤, 두말없이 들어주셔서 정말 기뻤어요. 정말 사치스러운 하루였어요」"

[[dialogue]]
speaker = "unk"
original = "俺もルリエルと一日中海デートしたかったから"
translation = "나도 루리엘과 하루 종일 바다 데이트를 하고 싶었으니까"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ふふ、会長さんってば、ルリエルの水着姿の虜ですもんね～？\u3000彼女冥利に尽きちゃいますぅ。ほら、お口開けてください。もう一度、あーんしてあげますから」"
translation = "「후후, 회장님도 참, 루리엘의 수영복 차림의 포로라니까요~? 여자친구로서 보람을 느껴버려요. 자, 입 벌려주세요. 다시 한번, 아─ 해드릴 테니까요」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「そのままですよー、そのままそのまま……んっ、ちゅっ<emoji=heart04>\u3000えへへっ、お肉を食べさせてあげるとはひと言も言ってないじゃないですかぁ<emoji=heart04>」"
translation = "「그대로예요─, 그대로 그대로…… 쪽, 음쫔 <emoji=heart04> 에헤헤, 고기를 먹여준다고는 한마디도 안 했잖아요 <emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「夜のビーチって不思議ですね？\u3000波の音を聞いてるだけでも、ちゅっ……んっ、甘えたくなってきちゃいます……<emoji=heart04>」"
translation = "「밤의 해변은 신기하네요? 파도 소리를 듣고 있는 것만으로도, 쪽…… 음…… 어리광 부리고 싶어져요…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「勝手に顔が、えへへぇ～、にやけてきちゃいますもん……<emoji=heart04>\u3000すーりすり……ぎゅ～<emoji=heart04>\u3000わたしのこの想い、どうしたら伝わるんでしょうか～」"
translation = "「멋대로 얼굴이, 에헤헤~, 싱글벙글하게 되어버리고요…… <emoji=heart04> 부비부비…… 꼬옥 <emoji=heart04> 저의 이 마음, 어떻게 하면 전해질까요~」"

[[dialogue]]
speaker = "unk"
original = "十分すぎるほど伝わってるよ"
translation = "충분할 정도로 전해지고 있어"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「まだまだ伝え足りませんよぉ～。時間はたーっぷりあるので、これからゆっくりゆっくり伝えていくつもりですけど♪」"
translation = "「아직 전하기에 부족해요~. 시간은 아아주 많으니까, 이제부터 천천히 천천히 전해갈 생각이지만요♪」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「おじいちゃんおばあちゃんになる頃には伝え切れてるといいんですが。えへへ、自信ありません。それくらい大好きなので」"
translation = "「할아버지 할머니가 될 때쯤에는 다 전해졌으면 좋겠는데. 에헤헤, 자신 없어요. 그만큼 좋아하니까」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「一緒にいるだけでどんどん好きが膨れあがっていきますもん。見てください、わたしの羽。こーんなにバタバタ羽ばたいちゃってますぅ」"
translation = "「같이 있는 것만으로도 점점 좋아하는 마음이 부풀어 오르는걸요. 보세요, 제 날개. 이이렇게 파닥파닥거리고 있어요~」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ルリエルは本当に幸せ者なのです。会長さんみたいな素敵な彼氏さんと恋人になれて。人間界に留学してきた甲斐がありました」"
translation = "「루리엘은 정말 행복한 사람인 거예요. 회장님 같은 멋진 남자친구님과 연인이 되어서. 인간계로 유학 온 보람이 있었어요」"

[[dialogue]]
speaker = "unk"
original = "オーバーだな"
translation = "과장이 심하네"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「本音ですよぉ？\u3000言ったじゃないですか、会長さんとはウソじゃなくて本音を言い合いたいって」"
translation = "「본심이라고요? 말했잖아요, 회장님과는 거짓말이 아니라 본심을 주고받고 싶다고」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「人間界に来てからたくさん楽しいことがありましたけど……会長さんの彼女さんになってからは、楽しいことしかなくなっちゃいましたもん」"
translation = "「인간계에 오고 나서 즐거운 일이 많았지만…… 회장님의 여자친구가 되고 나서는, 즐거운 일밖에 없어졌는걸요」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「好きな人と一緒だと、なんだって楽しくなっちゃうと言いますか……。こうしてくっついてるだけでも幸せな気持ちになっちゃうんです」"
translation = "「좋아하는 사람과 함께라면, 뭐든 즐거워진달까…… 이렇게 달라붙어 있는 것만으로도 행복한 기분이 되어버려요」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「愛って素晴らしいですね？\u3000何気ない日常が天にも昇る幸せな時間に変わっちゃうんですから」"
translation = "「사랑이란 건 멋지네요? 아무렇지 않은 일상이 하늘로 날아오를 듯한 행복한 시간으로 바뀌어버리니까요」"

[[dialogue]]
speaker = "unk"
original = "さてはまだ何かおねだりする気だな"
translation = "보아하니 아직 뭔가 부탁할 셈이구나"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「そんなつもりで言ってませんよ～。おねだりしようとしてたのは、えへへ、当たってますけど♪」"
translation = "「그런 생각으로 말한 거 아니에요~. 부탁하려고 했던 건, 에헤헤, 맞지만요♪」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「じゃーんっ。実は花火を買っておいたんです～！\u3000一緒にやりませんかっ？\u3000恋人って夏の深夜に砂浜で花火をするものなんですよねっ？」"
translation = "「짜잔. 사실 불꽃놀이를 사두었답니다~! 같이 하지 않을래요? 연인이란 여름 심야에 모래사장에서 불꽃놀이를 하는 법이잖아요?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あ、テンション上がっちゃいました？\u3000ふふん、ルリエルのワガママもたまにはいいものでしょう？\u3000ではでは早速、火を点けて──」"
translation = "「아, 텐션 올라갔나요? 후훈, 루리엘의 억지도 가끔은 좋은 법이죠? 그럼 그럼 바로, 불을 붙여서──」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ふぇっ！？\u3000つ、点きませんっ！？\u3000ワクワクしすぎて袋から出しちゃってたのがいけなかったみたいですぅ。潮風でぜーんぶ湿気っちゃって……」"
translation = "「훼!? 부, 불이 안 붙어요!? 너무 설레서 봉지에서 꺼내두었던 게 잘못이었나 봐요. 바닷바람에 저언부 눅눅해져서……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「うう、せっかく会長さんと花火するの楽しみにしてたのに……。初めての花火は会長さんとって思って今朝から心待ちにしてたのにぃ……」"
translation = "「으으, 어렵게 회장님과 불꽃놀이 하는 거 기대하고 있었는데…… 첫 불꽃놀이는 회장님과 함께라고 생각하며 오늘 아침부터 고대하고 있었는데에……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ほえ……？\u3000どうしたんですか、会長さん。急に鞄の中をゴソゴソして……」"
translation = "「호에……? 왜 그러세요, 회장님. 갑자기 가방 안을 뒤적뒤적하고……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あっ、それ花火じゃないですかぁ！\u3000もしかして会長さんもわたしと花火するために買っておいてくれてっ……？」"
translation = "「앗, 그거 불꽃놀이 아닌가요! 혹시 회장님도 저와 불꽃놀이 하려고 사두신 거……?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「えへ、えへへへぇ～。どれだけわたしを惚れさせれば気が済むんですかぁ～。好感度爆上がりですよぉ～！」"
translation = "「에헤, 에헤헤헤헤~. 얼마나 저를 반하게 해야 직성이 풀리시는 건가요~. 호감도 폭발이에요~!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「じゃあじゃあ、どれからやりましょうか。いっぱいありすぎて迷っちゃいますね～？」"
translation = "「그럼 그럼, 어떤 것부터 할까요. 너무 많아서 고민되네요~?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「きゃあああああっっ～～！！？\u3000なんですか、この花火っ！！\u3000ねずみみたいに足下で這い回ってっ！？\u3000こんなもの投げてこないでくださいよぉ～！！？」"
translation = "「꺄아아아아악~~!!? 뭐예요, 이 불꽃!! 쥐처럼 발밑에서 기어 다니고!? 이런 거 던지지 말아 주세요오~!!?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「大切な彼女にそんなことするなら──えいっ！\u3000花火二刀流っ！」"
translation = "「소중한 여자친구에게 그런 짓을 한다면── 에잇! 불꽃 이도류!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あははっ、逃げないでくださいよぉっ！\u3000花火は人に向けちゃダメ？\u3000先に変なの投げ込んできたのは会長さんの方じゃないですかぁ～！\u3000そーら待て待て待て～！」"
translation = "「아하핫, 도망치지 마세요오! 불꽃은 사람에게 겨누면 안 된다고요? 먼저 이상한 거 던진 건 회장님 쪽이잖아요~! 자아 게 섯거라아~!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「──はぶっ！？\u3000転んじゃいましたぁ～……。両手が塞がってたせーで砂浜に顔面ダイブ、顔中砂だらけですよぉ～……！」"
translation = "「──하붑!? 넘어져 버렸어요~……. 양손이 막혀 있었던 탓에 모래사장에 안면 다이브, 얼굴이 온통 모래투성이에요오~……!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「えへへ……でもでもやっぱり、なんだって楽しいですね？\u3000顔から砂浜にダイブしちゃっても会長さんと一緒だとついつい笑顔になっちゃいます」"
translation = "「에헤헤…… 하지만 하지만 역시, 뭐든 즐겁네요? 얼굴부터 모래사장에 다이브해버려도 회장님과 함께라면 그만 웃음이 나버려요」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「よーし、最後は線香花火で締めましょう！\u3000これなら会長さんとくっつきながらできちゃいますし♪」"
translation = "「좋아~, 마지막은 선향불꽃으로 마무리해요! 이거라면 회장님과 딱 붙어서 할 수 있으니까요♪」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あ、さっきみたいに人の花火に息をふーってかけて、火種を落とすのはなしですよぉ～？\u3000これが最後の二本なんですから」"
translation = "「아, 아까처럼 남의 불꽃에 입으로 후~ 하고 불어서, 불씨를 떨어뜨리는 건 없기에요~? 이게 마지막 두 개니까요」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ほーら、ん。もっと近くに寄ってください。えへへ、それじゃ一緒に火を点けますよ？\u3000せーの」"
translation = "「자아, 응. 좀 더 가까이 와주세요. 에헤헤, 그럼 같이 불을 붙일게요? 하나 둘」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「わぁー……。何度見ても綺麗ですね～。ルリエル、線香花火が一番好きかもですぅ」"
translation = "「와아……. 몇 번을 봐도 예쁘네요~. 루리엘, 선향불꽃이 제일 좋을지도 몰라요오」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「でも……これで最後だと思うとちょっぴり寂しいですね？\u3000明日も明後日もこんな毎日が続くとはわかっているのですが……」"
translation = "「하지만…… 이걸로 마지막이라고 생각하니 조금 쓸쓸하네요? 내일도 모레도 이런 매일이 계속될 거라는 건 알고 있지만……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「少しだけ……ふと不安になっちゃう時があるんです。楽しいからこそ、幸せだからこそ、この幸せが失われちゃったらどうしようって……」"
translation = "「조금만…… 문득 불안해질 때가 있어요. 즐겁기에, 행복하기에, 이 행복을 잃어버리면 어쩌나 하고……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「って、あっ。花火が……。あはは、変なこと話しちゃったからですかね……？\u3000今のが最後でしたのに……」"
translation = "「앗. 불꽃이……. 아하하, 이상한 소리를 해서 그럴까요……? 방금 게 마지막이었는데……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「うう～、笑わないでくださいよぉ。それだけ会長さんのことが好きってことじゃないですかぁ」"
translation = "「으으~, 웃지 말아 주세요오. 그만큼 회장님을 좋아한다는 뜻이잖아요오」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「わたしも似合わないこと考えてるってわかってます。でもでも恋って人を成長させちゃうものなんですね。考えなくていいことまで考えちゃって……」"
translation = "「저도 안 어울리는 생각 하는 거 알고 있어요. 하지만 하지만 사랑이란 사람을 성장시키는 거네요. 생각 안 해도 될 것까지 생각하게 되고……」"

[[dialogue]]
speaker = "unk"
original = "絶対に失わせないから安心してよ"
translation = "절대로 잃게 하지 않을 테니까 안심해"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ほえ……？\u3000なんですか、また鞄の中をゴソゴソして……。あっ、もう一袋花火買っておいてくれたんですかっ？」"
translation = "「호에……? 뭐예요, 또 가방 안을 뒤적뒤적하고……. 앗, 한 봉지 더 불꽃을 사두신 건가요?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「えへへっ、確かにつまらないこと考えちゃってましたね！\u3000会長さんと一緒にいる限り、この幸せがなくなっちゃうことなんて有り得ないですもんっ！」"
translation = "「에헤헤, 확실히 쓸데없는 생각을 하고 있었네요! 회장님과 함께 있는 한, 이 행복이 없어질 리가 없는걸요!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「大好きですよ、会長さん。これからも２人で毎日、幸せいーっぱいに過ごしましょうねっ？」"
translation = "「정말 좋아해요, 회장님. 앞으로도 둘이서 매일, 행복 가아득하게 지내요?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「来年の夏も、再来年の夏も、えへへ、また一緒に海へ花火をしに来ましょうっ！」"
translation = "「내년 여름도, 내후년 여름도, 에헤헤, 또 같이 바다에 불꽃놀이 하러 와요!」"

