[[dialogue]]
speaker = "unk"
original = "負けてしまったリーリアの後を引き継ぎ、ダッチの前に立つサーシャさん。"
translation = "져버린 리리아의 뒤를 이어 닷지 앞에 서는 사샤 씨."

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「フフフ。これは予想外！\u3000サーシャ様、まさかここで貴女が出てくるとは思いませんでした！」"
translation = "「후후후. 이건 예상 밖! 사샤 님, 설마 여기서 당신이 나올 줄은 몰랐습니다!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「今までならそうだったかもしれないわね。でも――」"
translation = "「지금까지라면 그랬을지도 모르겠네. 하지만――」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「私も今年は先輩として、頼れる『みんなのお姉ちゃん』になりたいって思っているの。だからこそ、あなたと戦って勝ってみせるわ」"
translation = "「나도 올해는 선배로서 의지할 수 있는 『모두의 언니』가 되고 싶다고 생각하고 있어. 그렇기에 당신과 싸워 이겨 보이겠어.」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「ほぅ、良い欲望ですねぇ。ではその欲望、私の欲望とどちらが強いか……いざ、勝負です！」"
translation = "「호오, 좋은 욕망이군요. 그럼 그 욕망, 제 욕망과 어느 쪽이 강할지…… 자, 승부입니다!」"

[[dialogue]]
speaker = "unk"
original = "そうして、サーシャさんとダッチの羽根突き勝負が始まった。"
translation = "그렇게 사샤 씨와 닷지의 하네츠키 승부가 시작되었다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「サーシャさん、すごい……！」"
translation = "「사샤 씨, 대단해……!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「七彩流羽根突き術・伍ノ型『青』！」"
translation = "「칠채류 하네츠키술 제5형 『청색』!」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「リーリア先輩と並ぶくらい、羽根突きが上手くなってる！」"
translation = "「리리아 선배와 어깨를 나란히 할 정도로 하네츠키 실력이 좋아졌어!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「しかも、七彩流羽根突き術の技まで、しっかりと会得しています」"
translation = "「게다가 칠채류 하네츠키술의 기술까지 확실히 터득하고 있어요.」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「フハハハハ！\u3000面白い！\u3000だったら、七彩の虹はどうですか？\u3000<ruby>陸<rt>ろく</rt></ruby>ノ型『藍色』！」"
translation = "「후하하하하! 재밌군! 그렇다면 칠채의 무지개는 어떻습니까? 제6형 『남색』!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「<ruby>漆<rt>しち</rt></ruby>ノ型『紫』！！」"
translation = "「제7형 『자색』!!」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「７番目の技で返した！」"
translation = "「7번째 기술로 받아쳤어!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ですが、またあのカウンター技が来ます……！」"
translation = "「하지만 또 그 카운터 기술이 옵니다……!」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「素晴らしい！\u3000ならば、私も本気で返しましょう！\u3000<ruby>捌<rt>はち</rt></ruby>ノ型――『白兎』ィィィ！！」"
translation = "「훌륭합니다! 그렇다면 저도 본때를 보여드리죠! 제8형―― 『백토』오오오!!」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「さあ、ここからどうやって技を返す気なのか！\u3000貴女が新年に臨む『欲望』、見せて下さい！！！」"
translation = "「자, 여기서 어떻게 기술을 받아칠 셈인지! 당신이 신년에 임하는 『욕망』, 보여주십시오!!!!」"

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "（……サーシャよ、お前は初詣の日から、毎日吾輩の元へ来て晴れ着の力の使い方を学び、そしてリーリアからは七彩流羽根突き術を教わって、切磋琢磨を続けていた……）"
translation = "（……사샤여, 너는 하츠모데 날부터 매일 이 몸에게 와서 설빔의 힘을 사용하는 법을 배우고, 리리아에게는 칠채류 하네츠키술을 배워 절차탁마를 계속하고 있었지……）"

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「見せてやれ、サーシャ。お前だけの、晴れ着を超えた『スーパー晴れ着フォーム』の力を！」"
translation = "「보여줘라, 사샤. 너만의 설빔을 초월한 『슈퍼 설빔 폼』의 힘을!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「サーシャさん、マジカルフルパワーでぶちかましちゃって下さい！」"
translation = "「사샤 씨, 매지컬 풀파워로 날려버려 주세요!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ええ。私の渾身の想いを込めて、全力で行くわよ～！」"
translation = "「응. 내 혼신의 마음을 담아 전력으로 갈게~!」"

[[dialogue]]
speaker = "unk"
original = "サーシャは武器である<ruby>杵<rt>きね</rt></ruby>を大きく振りかぶり、そこに晴れ着の力を収束させて――"
translation = "사샤는 무기인 절구공이를 크게 휘둘러 거기에 설빔의 힘을 수렴시키고――"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「<ruby>奏<rt>かなで</rt></ruby>流餅つき術・壱ノ型『もちもちインパクト』！！！」"
translation = "「카나데류 떡메치기술 제1형 『모치모치 임팩트』!!!!」"

[[dialogue]]
speaker = "unk"
original = "思いっきりフルスイングで羽根を打ち返した。"
translation = "있는 힘껏 풀스윙으로 깃털을 받아쳤다."

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「もちもちィ！！？」"
translation = "「모치모치이!!?」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「羽根突きじゃなくて、餅つき術！？」"
translation = "「하네츠키가 아니라 떡메치기술!?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「って、あぁっ！？\u3000ちょっと力を入れ過ぎちゃったわ～！\u3000狙いが～！」"
translation = "「앗, 아앗!? 좀 너무 힘을 줬나 봐~! 조준이~!」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「ンンン！？\u3000羽根が私に向かって、真っ直ぐに！？\u3000――フオオオオオオオオオオオオオオッ！？」"
translation = "「응응!? 깃털이 나를 향해 똑바로!? ――후오오오오오오오오오오오오오오옷!?」"

[[dialogue]]
speaker = "unk"
original = "羽根は全く地面に落ちず、むしろ天に向けて打ち上がるような軌道を描きながら、ダッチの土手っ腹に直撃した。"
translation = "깃털은 전혀 지면에 떨어지지 않고 오히려 하늘을 향해 솟구치는 궤도를 그리며 닷지의 명치에 직격했다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「おぉう。クリーンヒット」"
translation = "「오우. 클린 히트.」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「ウオオオオオオオオオオーーーッ！？\u3000この受け止め切れない程に重い一撃……！\u3000これが、サーシャ様の晴れ着の力！？」"
translation = "「우오오오오오오오오오오ーーー앗!? 이 받아낼 수 없을 정도로 무거운 일격……! 이것이 사샤 님의 설빔의 힘!?」"

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「お前と同じだ、愚弟！\u3000サーシャは七彩流羽根突き術を踏まえた上で、己の新たな型を生み出した。それがサーシャだけの『奏流餅つき術』！」"
translation = "「너와 마찬가지다, 못난 아우야! 사샤는 칠채류 하네츠키술을 토대로 자신만의 새로운 형을 만들어냈다. 그것이 사샤만의 『카나데류 떡메치기술』!」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「なるほど……素晴らしい！\u3000この欲望のロストアイテム、ダッチが認めましょう！\u3000貴女のその晴れ着は、バニーを付け足さずとも、とても素晴らしい物であると！」"
translation = "「과연…… 훌륭합니다! 이 욕망의 로스트 아이템 닷지가 인정하지요! 당신의 그 설빔은 바니를 덧붙이지 않아도 매우 훌륭한 것이라고!」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「だからこそ燃える！\u3000いつの日か、その晴れ着フォームを凌駕する、貴女に似合う究極のバニーフォームを私が用意してみせましょう！」"
translation = "「그렇기에 불타오르는군요! 언젠가 그 설빔 폼을 능가하는 당신에게 어울리는 궁극의 바니 폼을 제가 준비해 보이겠습니다!」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「ああ……本当はリーリア様や他の皆様とも、もっと戯れたかったところですが、どうやら今回はこれにてショウダウンのようです！」"
translation = "「아아…… 사실은 리리아 님이나 다른 분들과도 더 즐기고 싶었습니다만 아무래도 이번엔 이만 쇼다운인 모양이군요!」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「それではまたお会いしましょう！\u3000シーユー・ネクストゲームです！\u3000フオオオオオオオオオオオオオオオオオーーーーーーッ！！？」"
translation = "「그럼 또 만납시다! 씨 유 넥스트 게임입니다! 후오오오오오오오오오오오오오오오오오오오오오오오옷!!?」"

[[dialogue]]
speaker = "unk"
original = "そうしてダッチは強烈な羽根の一撃で、空の彼方まで吹き飛ばされ――小さく『キラン☆』と輝き、見事な星になったのであった。"
translation = "그렇게 닷지는 강렬한 깃털 일격에 하늘 저편까지 날아갔고―― 작게 『키랑☆』 하고 빛나며 멋진 별이 되었다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「やった！\u3000すごいっ！\u3000サーシャさんが勝ったぁ～っ！！」"
translation = "「해냈다! 대단해! 사샤 씨가 이겼어~~!!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ビームみたいにスカッとぶっ飛ばしてやったわね！」"
translation = "「빔처럼 시원하게 날려버렸네!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あら～。でも、私のせいで逃がしちゃったわ～」"
translation = "「어머~ 하지만 내 실수로 놓쳐버렸네~」"

[[dialogue]]
speaker = "unk"
original = "事故みたいなものだったので……"
translation = "사고 같은 거였으니까……"

[[dialogue]]
speaker = "unk"
original = "まあ、今回は遭遇自体が"
translation = "뭐, 이번엔 조우 자체가 "

[[dialogue]]
speaker = "unk"
original = "ダッチを本気で捕らえるつもりなら、ゲームの勝利報酬として『ダッチを捕らえること』を条件に掲げなければならないだろう。"
translation = "닷지를 진심으로 잡을 생각이라면 게임 승리 보상으로 『닷지를 잡는 것』을 조건으로 내걸어야 할 것이다."

[[dialogue]]
speaker = "unk"
original = "しかし、その賭けを成立させ、ダッチとの勝負に勝つのは、相当難しい。"
translation = "하지만 그 내기를 성립시키고 닷지와의 승부에서 이기는 것은 상당히 어렵다."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「そうそう！\u3000とりあえず勝ったんですから、喜びましょうよ！\u3000さすがサーシャさんです♪」"
translation = "「맞아 맞아! 일단 이겼으니까 기뻐하자고요! 역시 사샤 씨예요♪」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふっ、ありがと～。リーリアちゃんが先にダッチさんの切り札を出させてくれていたからこそ、落ち着いて対応できたわ」"
translation = "「후훗, 고마워~ 리리아짱이 먼저 닷지 씨의 비장의 카드를 끌어내 준 덕분에 차분하게 대응할 수 있었어.」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「いえいえ。というか正直、負けた時は内心ヤバいかもって焦りまくりでした！」"
translation = "「아니에요. 그보다 솔직히 졌을 때는 내심 큰일 났다 싶어서 엄청 당황했거든요!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「サーシャさんが堂々とバトンを受けとってくれて、こちらこそ助かりました。マジカル感謝です☆」"
translation = "「사샤 씨가 당당하게 바톤을 이어받아 주셔서 저야말로 살았어요. 매지컬 감사해요☆」"

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「ふん……サーシャ、よくぞ晴れ着の名誉を守ってくれたな。吾輩がお前を認めてやろう」"
translation = "「흥…… 사샤, 설빔의 명예를 잘 지켜주었구나. 이 몸이 너를 인정해주마.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ありがとう～、獅子舞さん。私、このスーパー晴れ着フォームをもっと鍛えて、可愛い後輩たちを守ってみせるわ」"
translation = "「고마워요~ 사자탈 씨. 나, 이 슈퍼 설빔 폼을 더 단련해서 귀여운 후배들을 지켜 보일게.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「おみそれしました。私もサーシャ先輩を見習って、訓練に取り組まないとですね」"
translation = "「정말 대단하셨어요. 저도 사샤 선배를 본받아 훈련에 매진해야겠네요.」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「私も！\u3000サーシャさん、今度一緒に訓練してもいい？」"
translation = "「나도! 사샤 씨, 다음에 같이 훈련해도 돼?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ええ、もちろんいいわよ～♪\u3000でも、まずは――」"
translation = "「응, 물론이지~♪ 하지만 우선은――」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「みんなで初詣を再開しましょうか。シズハちゃんとリーリアちゃんも、よければこの後、一緒にどう？」"
translation = "「다 같이 하츠모데를 재개할까. 시즈하짱이랑 리리아짱도 괜찮다면 이 뒤에 같이 갈래?」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「はい！\u3000私ももっと星騎士として強くなれるように、改めて新年のお願いをしていきます！」"
translation = "「네! 저도 더 성기사로서 강해질 수 있도록 다시 신년 소원을 빌고 올게요!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「私も、センパイに晴れ着を見せてなかったので、タイミング的にはちょうどよかったです☆」"
translation = "「저도 선배한테 설빔을 못 보여드렸으니까 타이밍상 딱 좋았어요☆」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「と、い・う・わ・け・で～♪\u3000可愛い後輩の新衣装ですよ～☆\u3000た～くさん、褒めてくださいね、センパイ♪」"
translation = "「그·래·서~♪ 귀여운 후배의 새 의상이라구요~☆ 마~니 칭찬해 주세요, 선배♪」"

[[dialogue]]
speaker = "unk"
original = "こうして俺たちは、仲間と共に賑やかに願いを捧げて、新たな年を歩み始めるのだった。"
translation = "이렇게 우리는 동료와 함께 떠들썩하게 소원을 빌며 새로운 한 해를 걸어가기 시작하는 것이었다."

