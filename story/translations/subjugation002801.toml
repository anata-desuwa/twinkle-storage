[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ついにこの時がやってきたゆ！\u3000余の時代の到来だゆ！」"
translation = "「드디어 이 때가 왔다유! 여의 시대가 도래했다유!」"

[[dialogue]]
speaker = "unk"
original = "カフェテリアにやってくると、テンションの上がっているジャクリーヌの声が耳に飛び込んできた。"
translation = "카페테리아에 오자 텐션이 오른 자클린의 목소리가 귀에 들어왔다."

[[dialogue]]
speaker = "unk"
original = "同じテーブルにはソフィアとウズメの仲良しコンビの姿も見える。"
translation = "같은 테이블에는 소피아와 우즈메의 단짝 콤비 모습도 보였다."

[[dialogue]]
speaker = "ウズメイア"
original = "「あはは♪\u3000ゆゆ姫ちゃん、メッチャテンション上がってるじゃん。ま、明日はハロウィンだからしゃーなしか♪」"
translation = "「아하하♪ 유유히메짱, 텐션 엄청 올라가 있잖아. 뭐, 내일은 할로윈이니까 어쩔 수 없나♪」"

[[dialogue]]
speaker = "unk"
original = "ゆゆ姫ちゃんって？"
translation = "유유히메짱이라니?"

[[dialogue]]
speaker = "ソフィア"
original = "「ウズメがジャクリーヌさんにつけたあだ名です、例によって」"
translation = "「우즈메가 자클린 씨에게 붙인 별명이에요, 언제나 그렇듯.」"

[[dialogue]]
speaker = "ソフィア"
original = "「ですがジャクリーヌさん、自重してくださいね。前回のハロウィンでは、はしゃぎすぎて大変なことになったという話じゃないですか」"
translation = "「하지만 자클린 씨, 자제해 주세요. 지난 할로윈 때는 너무 들떠서 큰일이 났었다는 이야기잖아요.」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ゆ～……忘れて欲しいの。あれは若気の至りというやつなの」"
translation = "「유~…… 잊어줬으면 하는유. 그건 젊은 날의 과오라는 것이유.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「えー？\u3000あたし知らないんだけど、そんな事件あったの？」"
translation = "「에~? 난 모르는데, 그런 사건이 있었어?」"

[[dialogue]]
speaker = "ソフィア"
original = "「ジャクリーヌさんの能力で、ハロウィンが何回も繰り返されてしまったらしいです」"
translation = "「자클린 씨의 능력으로 할로윈이 몇 번이나 반복되어 버렸다고 하더라고요.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「え～っ、ちょー面白そうなこと起こってるんですけど！？\u3000全然知らなかったし！」"
translation = "「에~ 진짜 재밌을 것 같은 일이 일어났었잖아!? 전혀 몰랐단 말이야!」"

[[dialogue]]
speaker = "ソフィア"
original = "「当日にジャクリーヌさんと接触を持った人以外は感知できない異変だったそうです」"
translation = "「당일에 자클린 씨와 접촉했던 사람 말고는 감지할 수 없는 이변이었다고 해요.」"

[[dialogue]]
speaker = "ソフィア"
original = "「かく言う私も、後で会長さんに教えてもらったから知っているわけで……」"
translation = "「나도 나중에 회장님께 들어서 알고 있는 거니까……」"

[[dialogue]]
speaker = "unk"
original = "あれは大変な事件だった"
translation = "그건 정말 큰 사건이었지."

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「も、もうその話はいいゆ！」"
translation = "「이, 이제 그 이야기는 됐다유!」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「それよりハロウィンパーティーでは、どんなお菓子が食べられるか今から楽しみゆ～♪」"
translation = "「그것보다 할로윈 파티에서는 어떤 과자를 먹을 수 있을지 벌써부터 기대된다유~♪」"

[[dialogue]]
speaker = "ウズメイア"
original = "「もうハロウィン当日のことで頭がいっぱいって感じだし♪」"
translation = "「이미 할로윈 당일 생각으로 머릿속이 꽉 찬 느낌이구♪」"

[[dialogue]]
speaker = "ソフィア"
original = "「また変な事件を起こしてしまわないか心配なんですが……」"
translation = "「또 이상한 사건을 일으키지는 않을지 걱정입니다만……」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「決めたゆ！\u3000ハロウィンは２人と遊ぶゆ！」"
translation = "「결정했다유! 할로윈은 두 사람과 놀 거다유!」"

[[dialogue]]
speaker = "ソフィア"
original = "「この流れでそのお誘いは恐すぎます！\u3000絶対に何かに巻き込まれるフラグじゃないですか！」"
translation = "「이 흐름에서 그런 제안은 너무 무서워요! 분명 뭔가에 휘말릴 플래그잖아요!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「それはそれで面白そーじゃん！\u3000そーしよーよ！」"
translation = "「그건 그거대로 재밌을 것 같잖아! 그렇게 하자!」"

[[dialogue]]
speaker = "ソフィア"
original = "「ん……舞亜もフィギュアスケートの大会で居ませんし、２人では少し寂しいかもと思っていましたし……」"
translation = "「음…… 마이아도 피겨 스케이팅 대회 때문에 없고, 둘이서는 조금 외로울지도 모른다고 생각했으니까……」"

[[dialogue]]
speaker = "ソフィア"
original = "「そうですね、ジャクリーヌさんも一緒に３人で遊んだ方が賑やかで楽しいかもしれません」"
translation = "「그렇네요, 자클린 씨도 함께 셋이서 노는 게 떠들썩하고 즐거울지도 모르겠어요.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ぜーったいそうだよ！\u3000ゆゆ姫ちゃん、一緒に思いっきり楽しもっ♪」"
translation = "「당연히 그렇지! 유유히메짱, 같이 마음껏 즐기자구♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ゆ～♪」"
translation = "「유~♪」"

[[dialogue]]
speaker = "ソフィア"
original = "「っ！？\u3000これは……！」"
translation = "「윽!? 이건……!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「どーゆーこと？\u3000勝手に変身しちゃったし！」"
translation = "「무슨 일이야? 멋대로 변신해버렸잖아!」"

[[dialogue]]
speaker = "unk"
original = "めっ！"
translation = "안 돼!"

[[dialogue]]
speaker = "unk"
original = "ジャクリーヌ！？"
translation = "자클린!?"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ち、違うゆ！\u3000余は何もしてないゆ！」"
translation = "「아, 아니유! 여는 아무것도 안 했다유!」"

[[dialogue]]
speaker = "ソフィア"
original = "「ですが衣装的に間違いなくハロウィンっぽい感じですし……」"
translation = "「하지만 의상적으로 틀림없이 할로윈 같은 느낌이고……」"

[[dialogue]]
speaker = "ウズメイア"
original = "「あたしのは狼ちゃんだ。あははっ、カワイイ～♪」"
translation = "「내 건 늑대네. 아하하, 귀여워~♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「２人ともよく似合ってるゆ♪」"
translation = "「둘 다 아주 잘 어울린다유♪」"

[[dialogue]]
speaker = "ソフィア"
original = "「似合ってるゆ♪\u3000じゃありません！\u3000本当に何もしてないんですか？」"
translation = "「잘 어울린다유♪가 아니에요! 정말 아무것도 안 하셨어요?」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「本当だゆ！」"
translation = "「정말이다유!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ねえねえ……なんかこの戦闘服、解除できないみたいなんだけど？」"
translation = "「저기 저기…… 왠지 이 전투복, 해제가 안 되는 것 같은데?」"

[[dialogue]]
speaker = "ソフィア"
original = "「そうじゃないかと思っていましたが、やっぱりですか……」"
translation = "「그럴지도 모른다고 생각했습니다만, 역시나인가요……」"

[[dialogue]]
speaker = "unk"
original = "とりあえず原因を調べてみよう"
translation = "일단 원인을 조사해 보자."

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「そうするゆ！\u3000何でもかんでも余のせいにするのはよくないゆ！」"
translation = "「그렇게 하는유! 뭐든 다 여의 탓으로 돌리는 건 좋지 않다유!」"

[[dialogue]]
speaker = "ソフィア"
original = "「そうですね。ではとりあえずハロウィンの異変について詳しそうな人に聞いてみましょうか」"
translation = "「그렇네요. 그럼 일단 할로윈 이변에 대해 잘 알 것 같은 사람에게 물어볼까요.」"

[[dialogue]]
speaker = "ヒトリ"
original = "「ジャクリーヌちゃんが原因です……」"
translation = "「자클린 짱이 원인이에요……」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ゆーーーー！！\u3000なんでーーーーー！！！！」"
translation = "「유~~~~!! 어째서어~~~~!!!!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「前の時と同じように、わたしの棺桶がカボチャ色になってしまっています。これはまさしくハロウィンパワーが溜まっているという証拠で……」"
translation = "「지난번처럼 제 관이 호박색이 되어버렸어요. 이건 분명 할로윈 파워가 모여 있다는 증거이고……」"

[[dialogue]]
speaker = "ヒトリ"
original = "「ソフィアさんとウズメイアさんの変身が解けなくなってしまったのは、ジャクリーヌちゃんの力が影響していると考えて間違いないかと」"
translation = "「소피아 씨와 우즈메이야 씨의 변신이 풀리지 않게 된 것은 자클린 짱의 힘이 영향을 주고 있다고 생각해도 틀림없을 거예요.」"

[[dialogue]]
speaker = "ヒトリ"
original = "「でもジャクリーヌちゃんは前回のハロウィンの時にいろいろ反省しましたから、わざとやっているとは思えないですし……」"
translation = "「하지만 자클린 짱은 지난 할로윈 때 여러모로 반성했으니까 일부러 그러는 건 아닐 테고……」"

[[dialogue]]
speaker = "ヒトリ"
original = "「も、もしかするとハロウィンが近づくにつれて、ジャクリーヌちゃんのテンションが上がってしまったことが原因かもしれません」"
translation = "「아, 아마도 할로윈이 다가옴에 따라 자클린 짱의 텐션이 올라간 것이 원인일지도 몰라요.」"

[[dialogue]]
speaker = "ソフィア"
original = "「なるほど、無意識に周囲に影響を及ぼしてしまった、ということですね……」"
translation = "「과연, 무의식중에 주위에 영향을 끼쳐버렸다는 거군요……」"

[[dialogue]]
speaker = "ウズメイア"
original = "「とりまゆゆ姫ちゃんが原因ってことは間違いないわけだ。だったらサクッと元に戻してもらえば万事解決じゃない？」"
translation = "「어쨌든 유유히메짱이 원인이라는 건 확실하네. 그럼 가볍게 원래대로 돌려주면 만사 해결 아냐?」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ゆっ！？\u3000そんなこと言われても困るゆ！\u3000どうすれば元に戻るかなんてわからないゆ！」"
translation = "「유!? 그런 말을 들어도 곤란하다유! 어떻게 하면 원래대로 돌아가는지 같은 건 모른다유!」"

[[dialogue]]
speaker = "ソフィア"
original = "「無意識に作用してしまったということだとしたら、そう簡単にはいかないでしょう」"
translation = "「무의식중에 작용한 것이라면 그렇게 간단히 되지는 않겠죠.」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ゆ～、余はどうすればいいゆ？」"
translation = "「유~, 여는 어쩌면 좋다유?」"

[[dialogue]]
speaker = "unk"
original = "ハロウィンパワーを発散すればいい？"
translation = "할로윈 파워를 발산하면 되나?"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ゆーっ！！！」"
translation = "「유~!!!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「それで何とかなればよいのですが……」"
translation = "「그걸로 어떻게든 되면 좋겠습니다만……」"

[[dialogue]]
speaker = "ウズメイア"
original = "「前回もそれで解決したんだからいけるっしょ？\u3000同じ感じで何とかなるって♪」"
translation = "「지난번에도 그걸로 해결됐으니까 가능하겠지? 비슷한 느낌으로 어떻게든 될 거라구♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「間違いないゆ！\u3000それでいくゆ！\u3000で、結局、余は何をすればいいゆ？」"
translation = "「틀림없다유! 그걸로 가는유! 그래서 결국 여는 뭘 하면 된다유?」"

[[dialogue]]
speaker = "unk"
original = "ハロウィンを思い切り楽しめば？"
translation = "할로윈을 마음껏 즐기면 어때?"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ゆ？\u3000楽しめばいいゆ？」"
translation = "「유? 즐기면 된다유?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ま、そゆことっ。んで、あたしらはゆゆ姫ちゃんのこと思いっきり楽しくさせてあげればいいし♪」"
translation = "「뭐, 그런 거지. 그래서 우리는 유유히메짱을 엄청 즐겁게 해주면 되고♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ホントかゆ？\u3000助けてくれるゆ？」"
translation = "「정말이냐유? 도와주는 거냐유?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「っていうか助けるとかないし、元々そーいう話だったじゃん」"
translation = "「도와준다기보다, 원래 그러기로 했던 이야기잖아.」"

[[dialogue]]
speaker = "ソフィア"
original = "「そうですね。では早速いろいろと計画を立てるとしましょう」"
translation = "「그렇네요. 그럼 서둘러 여러 가지 계획을 세우기로 하죠.」"

[[dialogue]]
speaker = "ヒトリ"
original = "「わたしとゆーちゃんも協力します……っ！」"
translation = "「저랑 유짱도 협력할게요……!」"

[[dialogue]]
speaker = "ゆーちゃん"
original = "「ゆー♪」"
translation = "「유~♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ゆっゆっゆ～♪\u3000ますます明日が楽しみになったゆ♪」"
translation = "「유유유~♪ 점점 더 내일이 기대된다유♪」"

[[dialogue]]
speaker = "unk"
original = "こうして俺たちはハロウィンに向けて、ジャクリーヌを思いっきり楽しませるための計画を練ることになったのだった。"
translation = "그렇게 우리는 할로윈을 향해 자클린을 마음껏 즐겁게 하기 위한 계획을 짜게 되었다."

