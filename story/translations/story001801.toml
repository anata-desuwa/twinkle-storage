[[dialogue]]
speaker = "unk"
original = "それは、クリスマスを今月に控えたある日のこと――"
translation = "그것은 크리스마스를 이번 달로 앞둔 어느 날의 일──"

[[dialogue]]
speaker = "セシア"
original = "「紅明ママ～♪\u3000セシア、呼ばれて来たわ～♪」"
translation = "「코우메이 마마~♪ 세시아, 부름을 받고 왔어~♪」"

[[dialogue]]
speaker = "紅明"
original = "「おっす、セッシー☆\u3000よくぞ来た！」"
translation = "「오옷, 세시☆ 잘 왔어!」"

[[dialogue]]
speaker = "セシア"
original = "「あら？\u3000紅明ママ、今日はサンタの格好をしたりしてどうしたの？\u3000クリスマスはまだ少し先よ？」"
translation = "「어라? 코우메이 마마, 오늘은 왜 산타 복장을 하고 있어? 크리스마스는 아직 좀 더 남았잖아?」"

[[dialogue]]
speaker = "紅明"
original = "「うん、実はそのことなんだけど、今日呼び出したのは、今年のクリスマスについて、セッシーにお願いごとがあるからなんだ」"
translation = "「응, 사실 그 문제인데, 오늘 불러낸 건 올해 크리스마스에 대해서 세시에게 부탁할 게 있어서야.」"

[[dialogue]]
speaker = "セシア"
original = "「お願いごと？」"
translation = "「부탁할 거?」"

[[dialogue]]
speaker = "紅明"
original = "「ああ、ズバリ――」"
translation = "「아아, 바로──」"

[[dialogue]]
speaker = "紅明"
original = "「初代サンタのアタシが、セッシーを２代目サンタに任命するぜ！！！」"
translation = "「초대 산타인 이 몸이, 세시를 2대 산타로 임명한다!!!」"

[[dialogue]]
speaker = "セシア"
original = "「セシアが、次のサンタに？」"
translation = "「세시아가 다음 산타가 되는 거야?」"

[[dialogue]]
speaker = "unk"
original = "「――そんなわけで」"
translation = "「──그렇게 된 거야.」"

[[dialogue]]
speaker = "セシア"
original = "「わたくしが、今年のサンタ役に決まったというわけなの♪」"
translation = "「제가 올해의 산타 역할을 맡게 되었다는 말씀이에요♪」"

[[dialogue]]
speaker = "unk"
original = "サンタ衣装、かわいい！"
translation = "산타 의상, 귀엽다!"

[[dialogue]]
speaker = "セシア"
original = "「ふふっ、会長、ありがとう♪\u3000前回はわたくしだけ衣装がなかったから、ついに着ることができて、とても嬉しいわ♪」"
translation = "「후훗, 회장, 고마워요♪ 저번에는 저만 의상이 없어서 드디어 입을 수 있게 되어 무척 기뻐요♪」"

[[dialogue]]
speaker = "unk"
original = "クリスマスを２週間後に控えた今日。"
translation = "크리스마스를 2주 앞둔 오늘."

[[dialogue]]
speaker = "unk"
original = "今年も学園の生徒たちにクリスマスプレゼントを配るサンタ企画が決定し、その為の衣装をお披露目するために、セシアは星徒会室までやってきたのだった。"
translation = "올해도 학원 학생들에게 크리스마스 선물을 나누어 주는 산타 기획이 결정되어, 그 의상을 선보이기 위해 세시아는 성도회실까지 찾아온 것이었다."

[[dialogue]]
speaker = "unk"
original = "衣装の用意は、ヘレナちゃんが？"
translation = "의상 준비는 헬레나짱이 한 거야?"

[[dialogue]]
speaker = "セシア"
original = "「ええ。紅明ママがヘレナちゃんに頼んでくれていたの」"
translation = "「네. 코우메이 마마가 헬레나짱에게 부탁해 줬어요.」"

[[dialogue]]
speaker = "セシア"
original = "「ネビュラとの技術共有で、魔女も水着フォームに変身できるようになったでしょう？」"
translation = "「네뷸라와의 기술 공유로 마녀도 수영복 폼으로 변신할 수 있게 되었잖아요?」"

[[dialogue]]
speaker = "セシア"
original = "「その応用で、アニマとアナが『霊力』対応型の人工戦闘服として、わたくしのクリスマスフォームを完成させてくれたのよ」"
translation = "「그 응용으로 아니마와 아나가 『영력』 대응형 인공 전투복으로서 저의 크리스마스 폼을 완성해 주었답니다.」"

[[dialogue]]
speaker = "unk"
original = "彼女は流星学園附属校に通う１年生の『セシア』。"
translation = "그녀는 유성학원 부속교에 다니는 1학년 『세시아』."

[[dialogue]]
speaker = "unk"
original = "その正体は、世界の摂理を管理する６柱の『守護天使』が１柱、『《万成》のアウクセシア』――その転生体である。"
translation = "그 정체는 세계의 섭리를 관리하는 6주의 『수호천사』 중 하나, 『《만성》의 아우크세시아』── 그 전생체이다."

[[dialogue]]
speaker = "unk"
original = "前回のクリスマスの時、転生直後で記憶喪失だった彼女をヴィーナスが拾って来て、俺や紅明たちと一緒にクリスマスプレゼントを配ることになったという経緯がある。"
translation = "지난 크리스마스 때, 전생 직후라 기억상실 상태였던 그녀를 비너스가 데려와 나와 코우메이 일행과 함께 크리스마스 선물을 나누어 주게 되었다는 경위가 있다."

[[dialogue]]
speaker = "セシア"
original = "「ちなみに今回、サンタになりきる為のアイテムも用意しているわ」"
translation = "「참고로 이번에는 산타로 완벽히 변신하기 위한 아이템도 준비했어요.」"

[[dialogue]]
speaker = "unk"
original = "アイテム……？"
translation = "아이템……?"

[[dialogue]]
speaker = "unk"
original = "俺が首を傾げていると、セシアは楽しそうにサンタの袋からあるものを取り出して――"
translation = "내가 고개를 갸웃거리자, 세시아는 즐거운 듯 산타 자루에서 무언가를 꺼내──"

[[dialogue]]
speaker = "セシア"
original = "「ふふっ……装着♪」"
translation = "「후훗…… 장착♪」"

[[dialogue]]
speaker = "セシア"
original = "「フォッフォッフォ♪\u3000どうじゃ、会長？\u3000似合っているかしら？」"
translation = "「허허허♪ 어떠냐, 회장? 잘 어울리는 것 같으냐?」"

[[dialogue]]
speaker = "unk"
original = "白ヒゲ！"
translation = "흰 수염!"

[[dialogue]]
speaker = "セシア"
original = "「気に入ってくれたようで何よりだわ♪\u3000さてと――」"
translation = "「마음에 들어 하는 것 같아 다행이에요♪ 자, 그럼──」"

[[dialogue]]
speaker = "セシア"
original = "「それでね、本当は前回みたいに、紅明ママやヨミヨミも一緒にプレゼント配りが出来たらよかったんだけど……」"
translation = "「그래서 말인데요, 사실 지난번처럼 코우메이 마마나 요미요미도 같이 선물을 나누어 줄 수 있으면 좋았겠지만……」"

[[dialogue]]
speaker = "セシア"
original = "「今回は２人共、別の用事が重なっちゃったみたいなの。紅明ママはタレント業の方で、クリスマスバラエティの生放送に出演しないといけないらしくて――」"
translation = "「이번에는 둘 다 다른 용무가 겹쳐버린 것 같아요. 코우메이 마마는 탤런트 활동 쪽으로 크리스마스 버라이어티 생방송에 출연해야 한다고 하고──」"

[[dialogue]]
speaker = "セシア"
original = "「ヨミヨミは、大聖堂カフェテリアでやるクリスマスパーティーの司会進行役を頼まれたみたい。その準備をしなくちゃならないんですって」"
translation = "「요미요미는 대성당 카페테리아에서 열리는 크리스마스 파티의 사회 진행을 부탁받았대요. 그 준비를 해야 한다더라고요.」"

[[dialogue]]
speaker = "unk"
original = "だから紅明は、セシアにサンタを頼んだのか"
translation = "그래서 코우메이가 세시아에게 산타를 부탁한 거구나."

[[dialogue]]
speaker = "セシア"
original = "「ええ。紅明ママに頼まれたんだもの。わたくし、張り切って頑張るわ♪」"
translation = "「네. 코우메이 마마가 부탁했는걸요. 저, 의욕 충만해서 열심히 할 거예요♪」"

[[dialogue]]
speaker = "unk"
original = "と、その時だった。"
translation = "그때였다."

[[dialogue]]
speaker = "unk"
original = "星徒会の扉がノックされる。"
translation = "성도회실 문이 노크된다."

[[dialogue]]
speaker = "セシア"
original = "「どうやら２人共、準備ができたみたいね」"
translation = "「아무래도 두 사람 다 준비가 끝난 모양이네요.」"

[[dialogue]]
speaker = "unk"
original = "２人……？"
translation = "두 사람……?"

[[dialogue]]
speaker = "セシア"
original = "「ふふっ、紅明ママとヨミヨミの代わりに、今年の助っ人をお願いしたのよ」"
translation = "「후훗, 코우메이 마마와 요미요미 대신 올해의 도우미를 부탁했거든요.」"

[[dialogue]]
speaker = "２人"
original = "「失礼しま～す！」"
translation = "「실례하겠습니다~!」"

[[dialogue]]
speaker = "ルルカ"
original = "「じゃじゃ～ん♪\u3000お兄ちゃん！」"
translation = "「짜잔~♪ 오빠!」"

[[dialogue]]
speaker = "フェニエル"
original = "「メリークリスマスです♪\u3000ちょっと早いですけど……えへへ♪」"
translation = "「메리 크리스마스예요♪ 좀 이르지만…… 에헤헤♪」"

[[dialogue]]
speaker = "unk"
original = "なんと現れたのは、同じくクリスマスの衣装を纏ったルルカとフニ。"
translation = "놀랍게도 나타난 것은 똑같이 크리스마스 의상을 입은 루루카와 후니."

[[dialogue]]
speaker = "unk"
original = "こうして、今年の新たなクリスマスイベントが幕を開けるのだった――"
translation = "이렇게 올해의 새로운 크리스마스 이벤트가 막을 여는 것이었다──"

