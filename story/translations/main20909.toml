[[dialogue]]
speaker = "unk"
original = "第９話,聖庭園,B"
translation = "제9화, 성정원, B"

[[dialogue]]
speaker = "unk"
original = "俺とヴィーナス、メルエル、選挙管理委員会の梨緒、ベアトリス、ナターシャ、アポロ……計７人が世界樹を通って天界に到着した。"
translation = "나와 비너스, 메르엘, 선거관리위원회의 리오, 베아트리스, 나타샤, 아포로…… 총 7명이 세계수를 통해 천계에 도착했다."

[[dialogue]]
speaker = "メルエル"
original = "「着いたよみんな！\u3000あそこの扉をくぐれば聖庭園だよ！」"
translation = "「도착했어 얘들아! 저기 문을 지나면 성정원이야!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「これが天界なのね！\u3000まさにって感じだわ！」"
translation = "「이게 천계구나! 정말 딱 그런 느낌이야!」"

[[dialogue]]
speaker = "アポロ"
original = "「おお～っ！\u3000本当に空の上なんだな！\u3000めちゃくちゃ空気が澄んでるぞ！」"
translation = "「오오~! 정말 하늘 위구나! 공기가 엄청나게 맑아!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「うわぁ、高い……落ちたらどうなるか、想像したくないよ……」"
translation = "「우와아, 높다…… 떨어지면 어떻게 될지 상상하고 싶지 않아……」"

[[dialogue]]
speaker = "ナターシャ"
original = "「一応言っとくけど、物理的に繋がってるわけじゃないから、落ちていっても人間界には行けないよ」"
translation = "「일단 말해두겠는데, 물리적으로 연결된 게 아니라서 떨어져도 인간계로는 못 가」"

[[dialogue]]
speaker = "ベアトリス"
original = "「へぇ、そうなんだ～」"
translation = "「헤에, 그렇구나~」"

[[dialogue]]
speaker = "unk"
original = "透き通るような青い空が広がり、白い雲がそよ風に乗って<ruby>揺蕩<rt>たゆた</rt></ruby>う。"
translation = "투명한 푸른 하늘이 펼쳐지고, 하얀 구름이 산들바람을 타고 하늘거린다."

[[dialogue]]
speaker = "unk"
original = "扉の前には、大理石のような素材で作られた純白の像が鎮座し、扉を守るように槍を掲げている。"
translation = "문 앞에는 대리석 같은 소재로 만들어진 순백의 상이 자리 잡고, 문을 지키듯 창을 치켜들고 있다."

[[dialogue]]
speaker = "unk"
original = "だが人間界と最も大きく異なるのは、頭上だけでなく、足元にも雲が広がっていることだ。"
translation = "하지만 인간계와 가장 크게 다른 점은 머리 위뿐만 아니라 발밑에도 구름이 펼쳐져 있다는 것이다."

[[dialogue]]
speaker = "ナターシャ"
original = "「天界は空中島になってるんだ。天使が天界から人間界に来ると、足元に雲がないことに驚く子もいるね」"
translation = "「천계는 공중 섬으로 되어 있어. 천사가 천계에서 인간계로 오면 발밑에 구름이 없는 것에 놀라는 아이도 있지」"

[[dialogue]]
speaker = "梨緒"
original = "「絶景ではあるが、残念ながら景観を楽しむ時間はないな。早く女神の神殿に向かわなければ」"
translation = "「절경이긴 하지만 아쉽게도 경관을 즐길 시간은 없군. 빨리 여신의 신전으로 향해야 해」"

[[dialogue]]
speaker = "メルエル"
original = "「みんな、こっちだよ！」"
translation = "「얘들아, 이쪽이야!」"

[[dialogue]]
speaker = "unk"
original = "メルエルに案内されるまま、扉をくぐり、その先の階段を降りていく。"
translation = "메르엘의 안내를 받으며 문을 지나 그 앞의 계단을 내려간다."

[[dialogue]]
speaker = "unk"
original = "すると──"
translation = "그러자──"

[[dialogue]]
speaker = "クロト"
original = "「ここが聖庭園……」"
translation = "「여기가 성정원……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「わぁっ、綺麗な場所……！」"
translation = "「와아, 아름다운 곳……!」"

[[dialogue]]
speaker = "unk"
original = "聖庭園は天界の政治的な中心であり、意思決定がなされる場であるという。"
translation = "성정원은 천계의 정치적 중심이며 의사결정이 이루어지는 장소라고 한다."

[[dialogue]]
speaker = "unk"
original = "向こうに見える荘厳な建物は、どうやら聖庭園議会の議事堂のようだ。"
translation = "저 멀리 보이는 장엄한 건물은 아무래도 성정원 의회의 의사당인 듯하다."

[[dialogue]]
speaker = "クロト"
original = "（つまり俺の監視……場合によっては暗殺をナターシャに命令した機関か）"
translation = "(즉 나를 감시…… 경우에 따라서는 암살하라고 나타샤에게 명령한 기관인가)"

[[dialogue]]
speaker = "unk"
original = "俺が魔王であるからこそ、その力を警戒するのは理解できる。"
translation = "내가 마왕이기에 그 힘을 경계하는 것은 이해할 수 있다."

[[dialogue]]
speaker = "unk"
original = "しかし暗殺まで考慮に入れるのは過激にも感じるが、それだけ魔王の脅威を重く見ているということなのだろうか。"
translation = "하지만 암살까지 고려하는 것은 과격하게 느껴지기도 하지만, 그만큼 마왕의 위협을 무겁게 보고 있다는 뜻일까."

[[dialogue]]
speaker = "ケイティ"
original = "「ようこそいらっしゃいました、新星学園の星騎士の皆様。私は聖庭園の衛兵隊長、ケイティと申します」"
translation = "「어서 오십시오, 신성학원의 성기사 여러분. 저는 성정원의 위병대장, 케이티라고 합니다」"

[[dialogue]]
speaker = "クロト"
original = "「初めまして。新星学園星徒会長の緋宮クロトです」"
translation = "「처음 뵙겠습니다. 신성학원 성도회장 히노미야 쿠로토입니다」"

[[dialogue]]
speaker = "ケイティ"
original = "「あなたが今代の魔王様ですね。リノ様からお話は伺っております」"
translation = "「당신이 이번 대의 마왕님이시군요. 리노 님께 말씀은 들었습니다」"

[[dialogue]]
speaker = "unk"
original = "見たところ俺よりも少し年齢は上だろうか。衛兵隊長という肩書が意外に思える、穏やかそうな女性だ。"
translation = "보아하니 나보다 조금 연상일까. 위병대장이라는 직함이 의외로 느껴지는, 온화해 보이는 여성이다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「私は新星星徒会のスーパフィクサー、九浄ヴィーナスよ！\u3000よろしくね！」"
translation = "「나는 신성성도회의 슈퍼 픽서, 쿠죠 비너스야! 잘 부탁해!」"

[[dialogue]]
speaker = "ケイティ"
original = "「フィク……サー……？」"
translation = "「픽……서……?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「やっぱり姉さんもいたんだ」"
translation = "「역시 언니도 있었네」"

[[dialogue]]
speaker = "ケイティ"
original = "「あらナターシャ、久しぶりですね。メルエルも元気そうで何よりです」"
translation = "「어머 나타샤, 오랜만이네요. 메르엘도 건강해 보여서 다행이에요」"

[[dialogue]]
speaker = "メルエル"
original = "「ケイティお姉ちゃんも変わらないね！」"
translation = "「케이티 언니도 그대로네!」"

[[dialogue]]
speaker = "アポロ"
original = "「姉さん？\u3000お姉ちゃん？\u3000ナターシャとメルエルは姉妹だったのか！？」"
translation = "「언니? 나타샤와 메르엘은 자매였던 거야!?」"

[[dialogue]]
speaker = "メルエル"
original = "「ううん、そうじゃないよ。ケイティお姉ちゃんは近所に住むお姉さんで、小さい頃は私やナターシャちゃんとよく遊んでくれてたんだ」"
translation = "「아니, 그렇지 않아. 케이티 언니는 근처에 사는 언니인데, 어릴 때는 나랑 나타샤짱이랑 자주 놀아줬거든」"

[[dialogue]]
speaker = "ケイティ"
original = "「２人の幼なじみ……と言ってもいいかもしれませんね」"
translation = "「세 사람의 소꿉친구……라고 해도 좋을지도 모르겠네요」"

[[dialogue]]
speaker = "ナターシャ"
original = "「幼なじみの幼なじみが増えたね」"
translation = "「소꿉친구의 소꿉친구가 늘었네」"

[[dialogue]]
speaker = "アポロ"
original = "「なるほど、そういうことか！\u3000３人は仲良しなんだな！」"
translation = "「과연, 그런 건가! 세 사람은 사이가 좋구나!」"

[[dialogue]]
speaker = "ナターシャ"
original = "「あ、そうそう、ケイティ姉さんは『制圧天使』って呼ばれてるから、怒らせない方がいいよ」"
translation = "「아, 맞다. 케이티 언니는 『제압 천사』라고 불리니까 화나게 하지 않는 게 좋아」"

[[dialogue]]
speaker = "ケイティ"
original = "「もう、その呼び名はやめてくださいと言っているのに……」"
translation = "「정말, 그 이름으로 부르지 말아 달라고 했는데……」"

[[dialogue]]
speaker = "クロト"
original = "（制圧天使……？）"
translation = "(제압 천사……?)"

[[dialogue]]
speaker = "unk"
original = "聖庭園の衛兵隊長には相応しい二つ名だろうが、目の前の彼女がそう呼ばれているとは思えなかった。"
translation = "성정원의 위병대장에게 어울리는 이명이겠지만, 눈앞의 그녀가 그렇게 불리고 있다고는 생각되지 않았다."

[[dialogue]]
speaker = "ベアトリス"
original = "「そういえばナターシャちゃんもメルエルさんも、ご家族には会わなくてもいいの？\u3000聖庭園の出身なんでしょ？」"
translation = "「그러고 보니 나타샤짱도 메르엘 씨도 가족분들은 안 만나도 돼? 성정원 출신이잖아?」"

[[dialogue]]
speaker = "メルエル"
original = "「うん。うちの家族は流星市国にいるから。仕事の関係で家族ごと引っ越したんだ」"
translation = "「응. 우리 가족은 유성시국에 있으니까. 일 때문에 가족 전체가 이사했어」"

[[dialogue]]
speaker = "ナターシャ"
original = "「うちもどうせ出払ってるだろうしね。気にしなくていいよ」"
translation = "「우리 집도 어차피 다 나가고 없을 테고. 신경 안 써도 돼」"

[[dialogue]]
speaker = "クロト"
original = "「聖庭園には『シエルの<ruby>筐<rt>はこ</rt></ruby>』を託してくれたリガルタ翁もおられたはず。ゆっくり話す余裕はないけど、一言お礼だけでも──」"
translation = "「성정원에는 『시엘의 궤』를 맡겨주신 리갈타 옹도 계셨을 터. 천천히 이야기할 여유는 없지만 감사 인사라도 한마디──」"

[[dialogue]]
speaker = "ケイティ"
original = "「リガルタ様は現在ご不在です。申し訳ありません」"
translation = "「리갈타 님은 현재 부재중이십니다. 죄송합니다」"

[[dialogue]]
speaker = "クロト"
original = "（……？\u3000今ケイティさんの表情が少し曇ったような……）"
translation = "(……? 방금 케이티 씨의 표정이 조금 어두워진 것 같은데……)"

[[dialogue]]
speaker = "unk"
original = "その時、議会の方からこちらに男性が駆けてきた。"
translation = "그때 의회 쪽에서 이쪽으로 한 남성이 달려왔다."

[[dialogue]]
speaker = "聖庭園議員"
original = "「姫！\u3000お戻りになられたのですね──！」"
translation = "「공주님! 돌아오셨군요──!」"

[[dialogue]]
speaker = "unk"
original = "『姫』とは誰のことだろうと首を傾げたが、彼はメルエルの前に来て……"
translation = "『공주』란 누구를 말하는 걸까 고개를 갸웃거렸지만, 그는 메르엘 앞으로 와서……"

[[dialogue]]
speaker = "聖庭園議員"
original = "「お帰りをお待ちしていました、姫！」"
translation = "「돌아오시기를 기다리고 있었습니다, 공주님!」"

[[dialogue]]
speaker = "メルエル"
original = "「えっ！？\u3000姫って私のこと！？」"
translation = "「엣!? 공주라니 나 말이야!?」"

[[dialogue]]
speaker = "unk"
original = "男性は明らかにメルエルに呼びかけていた。"
translation = "남성은 분명히 메르엘을 부르고 있었다."

[[dialogue]]
speaker = "unk"
original = "そこにナターシャが割って入る。"
translation = "거기에 나타샤가 끼어든다."

[[dialogue]]
speaker = "ナターシャ"
original = "「あーはいはい。今それどころじゃないからお帰り願いまーす」"
translation = "「아─ 네네. 지금 그럴 때 아니니까 돌아가 주시죠」"

[[dialogue]]
speaker = "ナターシャ"
original = "「それとも力ずくでわからせてあげようか？」"
translation = "「아니면 힘으로 깨닫게 해줄까?」"

[[dialogue]]
speaker = "聖庭園議員"
original = "「ぐ……」"
translation = "「윽……」"

[[dialogue]]
speaker = "unk"
original = "ナターシャがにらみを利かせると、男性は踵を返して、すごすごと議事堂の方に戻っていった。"
translation = "나타샤가 눈을 부라리자 남성은 발길을 돌려 쭐레쭐레 의사당 쪽으로 돌아갔다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「今の、何だったのかしら……？」"
translation = "「방금 그건 뭐였을까……?」"

[[dialogue]]
speaker = "メルエル"
original = "「姫って……お姫様ってこと……？\u3000私、人間界で使ってる苗字は姫咲だけど、そういう感じじゃなかったよね……？」"
translation = "「공주라니…… 공주님이라는 뜻……? 나, 인간계에서 쓰는 성은 히메사키지만, 그런 느낌은 아니었지……?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「さぁ？\u3000誰かと勘違いしたんじゃない？」"
translation = "「글쎄? 누군가랑 착각한 거 아니야?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「それより姉さん、状況を教えてもらっていい？\u3000聖庭園なら各地の戦況も把握してるでしょ」"
translation = "「그보다 언니, 상황을 좀 알려줄래? 성정원이라면 각지의 전황도 파악하고 있잖아」"

[[dialogue]]
speaker = "ケイティ"
original = "「もちろんです。ですがその前に、みなさんに天界の構造を軽く説明いたしましょう」"
translation = "「물론입니다. 하지만 그전에 여러분께 천계의 구조를 가볍게 설명해 드리죠」"

[[dialogue]]
speaker = "ケイティ"
original = "「天界は人間界や魔界と違い、天界全体で１つの国家のようになっています。そのため機能に特化した都市を作ることができました」"
translation = "「천계는 인간계나 마계와 달리 천계 전체가 하나의 국가처럼 되어 있습니다. 그 때문에 기능에 특화된 도시를 만들 수 있었죠」"

[[dialogue]]
speaker = "ケイティ"
original = "「学術都市ウル、武闘都市ウリル、医療都市ラファル、芸術都市イオルなどがあります」"
translation = "「학술도시 울, 무투도시 우릴, 의료도시 라팔, 예술도시 이올 등이 있습니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ウルは確かアナの故郷だったわね。学術都市なんて、なんだかアナらしいわ」"
translation = "「울은 분명 아나의 고향이었지. 학술도시라니, 왠지 아나답네」"

[[dialogue]]
speaker = "ケイティ"
original = "「現在襲撃を受けているのは、各都市の付近にある守護天使様の神殿です」"
translation = "「현재 습격을 받고 있는 곳은 각 도시 부근에 있는 수호천사님의 신전입니다」"

[[dialogue]]
speaker = "ケイティ"
original = "「守護天使様の神殿は本山があり、分社も天界各地に分散しておりますが、分社は今のところ攻撃を受けていないようです」"
translation = "「수호천사님의 신전은 본산이 있고, 분사도 천계 각지에 분산되어 있습니다만, 분사는 현재까지 공격을 받지 않은 듯합니다」"

[[dialogue]]
speaker = "unk"
original = "確かミルフィーは守護天使マグダレナを、イクシーは守護天使アルモタヘルを祀る一族だったはず。"
translation = "분명 밀피는 수호천사 막달레나를, 이쿠시는 수호천사 아르모타헬을 모시는 일족이었을 터."

[[dialogue]]
speaker = "unk"
original = "彼女たちもきっと今、神殿を守るために戦っているところだろう。"
translation = "그녀들도 분명 지금, 신전을 지키기 위해 싸우고 있는 중이겠지."

[[dialogue]]
speaker = "ケイティ"
original = "「流星・新星・ネビュラの方々が救援に来られておりますが、世界樹による人員輸送には限りがあり、どこも余裕がありません」"
translation = "「유성·신성·네뷸라 분들이 구원을 오셨습니다만, 세계수를 통한 인원 수송에는 한계가 있어 어디도 여유가 없습니다」"

[[dialogue]]
speaker = "ケイティ"
original = "「いずれの戦場も激戦になっていることでしょう。我々も助けに向かいたいところですが……」"
translation = "「어느 전장이나 격전이 벌어지고 있겠지요. 저희도 도우러 가고 싶은 심정입니다만……」"

[[dialogue]]
speaker = "ナターシャ"
original = "「こっちはこっちで女神の神殿を守らないとね」"
translation = "「이쪽은 이쪽대로 여신의 신전을 지켜야 하니까」"

[[dialogue]]
speaker = "ケイティ"
original = "「はい。それにここ聖庭園は天界の中枢、情報が集まる場所です。<ruby>撹乱<rt>かくらん</rt></ruby>のためにこちらを狙ってくるかもしれません」"
translation = "「네. 게다가 이곳 성정원은 천계의 중추, 정보가 모이는 장소입니다. 교란을 위해 이곳을 노려올지도 모릅니다」"

[[dialogue]]
speaker = "スレイプニル"
original = "「ブルルル……！」"
translation = "「부르르르……!」"

[[dialogue]]
speaker = "ケイティ"
original = "「！\u3000やはり現れましたね」"
translation = "「! 역시 나타났군요」"

[[dialogue]]
speaker = "ケイティ"
original = "「平和を乱すものは許しません」"
translation = "「평화를 어지럽히는 자는 용서하지 않습니다」"

[[dialogue]]
speaker = "ナターシャ"
original = "「聖庭園にケンカを売るからには、覚悟してもらわないとね」"
translation = "「성정원에 싸움을 걸어온 이상, 각오해야 할 거야」"

[[dialogue]]
speaker = "メルエル"
original = "「うん。天界の平和は私たちが守るんだから！」"
translation = "「응. 천계의 평화는 우리가 지킬 거니까!」"

