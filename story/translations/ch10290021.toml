[[dialogue]]
speaker = "unk"
original = "第１話,メスガキチョコレート,P"
translation = "제1화, 메스가키 초콜릿, P"

[[dialogue]]
speaker = "unk"
original = "流星学園のバレンタインイベントが終わった。大聖堂でのチョコ配布は盛況そのもので、シャルレーヌの新衣装も可愛いらしかった──だが！"
translation = "유성학원의 밸런타인 이벤트가 끝났다. 대성당에서의 초코 배포는 성황 그 자체였고 샤를렌의 새 의상도 귀여웠다── 하지만!"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「それでは、そろそろ失礼いたします。会長さんもここ数日、大変お世話になりました♪」"
translation = "「그럼 슬슬 실례하겠습니다. 회장군도 요 며칠 정말 고생 많았어요♪」"

[[dialogue]]
speaker = "unk"
original = "（シャルレーヌからは貰えてない……！）"
translation = "（샤를렌한테는 못 받았어……!）"

[[dialogue]]
speaker = "unk"
original = "（他の子からはチョコを貰えたけど……）"
translation = "（다른 애들한테는 초코를 받았지만……）"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「くふふっ<emoji=heart04>\u3000会長さん、どうかしました～？\u3000何だか物欲しそうなお顔ですけれど～♪」"
translation = "「쿠후후<emoji=heart04> 회장군, 무슨 일인가요~? 왠지 뭔가 바라는 듯한 얼굴인데요~♪」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「──何でもない？\u3000そうですかぁ<emoji=heart04>\u3000私の勘違いだったみたいです。ではでは、ごきげんよう～<emoji=heart04>」"
translation = "「──아무것도 아니라고요? 그렇군요<emoji=heart04> 제 착각이었나 봐요. 그럼 그럼, 안녕히~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "シャルレーヌは星騎士の中でも一番仲が良い女の子……正直、最もチョコレートを期待していた存在だった。"
translation = "샤를렌은 성기사 중에서도 가장 사이가 좋은 여자아이…… 솔직히 가장 초콜릿을 기대했던 존재였다."

[[dialogue]]
speaker = "unk"
original = "本命とは言わずとも、義理チョコくらい貰えると思ってたんだけど……がっかりだ……"
translation = "본격적인 건 아니더라도 의리 초코 정도는 받을 줄 알았는데…… 실망이다……"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「くふふ～っ<emoji=heart04>\u3000会長さんってば可愛い～っ<emoji=heart04>\u3000チョコが欲しい、の一言が言えないとかぁ……もうちょっとだけ焦らしちゃおっと♪」"
translation = "「쿠후후~<emoji=heart04> 회장군도 참 귀여워~<emoji=heart04> 초코가 갖고 싶다는 그 한마디를 못 하다니…… 조금만 더 애태워야지♪」"

[[dialogue]]
speaker = "unk"
original = "シャルレーヌは猫かぶりな女の子――つまり周りの目を気にするタイプだ。大聖堂では人の目があったから、俺に渡せなかった可能性がある……！"
translation = "샤를렌은 내숭 떠는 여자아이―― 즉 주변의 시선을 신경 쓰는 타입이다. 대성당에서는 남들의 시선이 있어서 나에게 주지 못했을 가능성이 있다……!"

[[dialogue]]
speaker = "unk"
original = "星徒会室で仕事をしていよう。きっと渡しに来てくれるはずだ……！"
translation = "성도회실에서 일을 하고 있자. 분명 주러 와 줄 거야……!"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「失礼しま～す♪\u3000あれ、いらっしゃるのは会長さんだけですか？」"
translation = "「실례합니다~♪ 어라, 계신 건 회장군뿐인가요?」"

[[dialogue]]
speaker = "unk"
original = "うん、俺だけ！\u3000俺１人！"
translation = "응, 나뿐이야! 나 혼자!"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「くふふっ<emoji=heart04>\u3000そんなに１人であることを強調しなくっても～。でもご在席でよかったです。お渡ししたいものがあったので……」"
translation = "「쿠후후<emoji=heart04> 그렇게 혼자라는 걸 강조하지 않아도~. 그래도 계셔서 다행이에요. 드리고 싶은 게 있어서……」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「はい、こちら♪\u3000ディアーブル家がバレンタインセールで売り出す、チョコレート付きの香水セット……４人分です♪」"
translation = "「자, 여기요♪ 디아블 가문이 밸런타인 세일로 출시하는 초콜릿 포함 향수 세트…… 4인분이에요♪」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「うちの香水が、若い女性にどのような反響があるのか確かめたいので。役員の方々にお渡しいただけますか～♪」"
translation = "「저희 향수가 젊은 여성들에게 어떤 반향이 있는지 확인하고 싶어서요. 임원분들께 전달해 주시겠어요~♪」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「……あれあれ～？\u3000なんだか曇ったお顔……もしかして私、気づかないうちに何か失礼をしてしまいましたか？」"
translation = "「……어라어라~? 왠지 어두운 얼굴…… 혹시 제가 모르는 사이에 뭔가 실례를 범했나요?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「まっっったく見当がつかないのですが……何か思うところがあるなら、お声に出してご指摘いただけます？」"
translation = "「저어어언혀 짐작 가는 게 없는데…… 뭔가 생각하는 게 있다면 입 밖으로 내서 지적해 주실래요?」"

[[dialogue]]
speaker = "unk"
original = "（チョコをねだってたまるか……！）"
translation = "（초코를 구걸할까 보냐……!）"

[[dialogue]]
speaker = "unk"
original = "（お、俺にだってプライドがある……！）"
translation = "（나, 나에게도 자존심이 있어……!）"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「何もないんですか？\u3000……また勘違いだったみたいです♪\u3000では、私の用件はすみましたので。失礼しますね♪」"
translation = "「아무것도 없나요? ……또 착각이었나 보네요♪ 그럼 제 용건은 끝났으니 실례할게요♪」"

[[dialogue]]
speaker = "unk"
original = "……帰ってしまった。ここはもうプライドを捨てて『チョコをください』と言うべきだろうか？"
translation = "……가버렸다. 여기서 이제 자존심을 버리고 『초코를 주세요』라고 말해야 할까?"

[[dialogue]]
speaker = "unk"
original = "いや──違う。そうじゃない！\u3000シャルレーヌのことだ。きっと俺が情けなくチョコをくれと言う姿が見たいから、焦らしているんだ……！"
translation = "아니── 틀려. 그게 아니야! 샤를렌 성격에 분명 내가 한심하게 초코를 달라고 하는 모습이 보고 싶어서 애태우는 거다……!"

[[dialogue]]
speaker = "unk"
original = "わからせられてたまるか……！"
translation = "굴복할까 보냐……! "

[[dialogue]]
speaker = "unk"
original = "デスクワークを片付けていると、ＤＩＳＣにメッセージが届いた──シャルレーヌからだ。"
translation = "데스크 업무를 처리하고 있자 DISC로 메시지가 도착했다── 샤를렌이다."

[[dialogue]]
speaker = "unk"
original = "『今度、春に売り出す香水カタログのリンクをお送りました。星徒会役員の方々にご周知いただけると嬉しいです♪』"
translation = "『이번 봄에 출시할 향수 카탈로그 링크를 보냈습니다. 성도회 임원분들께 공지해 주시면 감사하겠습니다♪』"

[[dialogue]]
speaker = "unk"
original = "く、くそっ……負けないぞ……！"
translation = "크, 윽…… 지지 않을 거야……!"

[[dialogue]]
speaker = "unk"
original = "数時間後──今度は電話がかかってきた。"
translation = "몇 시간 후── 이번에는 전화가 걸려 왔다."

[[dialogue]]
speaker = "unk"
original = "は、はいっ！\u3000もしもし！！"
translation = "네, 네! 여보세요!!"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「キャハ<emoji=heart04>\u3000すみませ～ん。かけ間違えちゃいました～<emoji=heart04>」"
translation = "「캬하<emoji=heart04> 죄송해용~ 잘못 걸었네요~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "完全に遊ばれてる……もしかしなくても、これは勝ち目がないのでは……？"
translation = "완전히 놀아나고 있어…… 혹시나 가 아니라 이건 승산이 없는 거 아닐까……?"

[[dialogue]]
speaker = "unk"
original = "あと５分で２月１５日になってしまう……もうプライドを気にしてる場合じゃない……"
translation = "5분만 있으면 2월 15일이 되어버려…… 이제 자존심 따질 때가 아니야……"

[[dialogue]]
speaker = "unk"
original = "恥をかいてもいいから、好きな女の子から１４日のうちにチョコを貰いたい……俺は観念して、シャルレーヌに電話をかけた。"
translation = "창피를 당해도 좋으니 좋아하는 여자아이에게 14일이 지나기 전에 초코를 받고 싶어…… 나는 체념하고 샤를렌에게 전화를 걸었다."

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「はぁい、もしも～しぃ<emoji=heart04>\u3000こんな夜遅くにどうしました～？」"
translation = "「네에, 여보세~요<emoji=heart04> 이 늦은 밤에 무슨 일이세요~?」"

[[dialogue]]
speaker = "unk"
original = "……チョコをください"
translation = "……초코를 주세요"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「くふふふっ<emoji=heart04>\u3000いきなりどうしたんですー？\u3000会長さん、そんなに甘いもの好きでしたっけー？」"
translation = "「쿠후후후<emoji=heart04> 갑자기 왜 그러세요~? 회장군, 그렇게 단 걸 좋아했었나요~?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「義理チョコは大聖堂でたくさん貰ってたじゃないですか？\u3000それを食べればいいのでは～？」"
translation = "「의리 초코는 대성당에서 잔뜩 받았잖아요? 그걸 먹으면 될 텐데~?」"

[[dialogue]]
speaker = "unk"
original = "シャルレーヌからのチョコが欲しい……"
translation = "샤를렌이 주는 초코가 갖고 싶어……"

[[dialogue]]
speaker = "unk"
original = "他の子じゃダメなんです……"
translation = "다른 애 거는 안 된단 말이야……"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000今の鳴き声、さいっこーでしたぁ♪\u3000キャハハハハッ<emoji=heart04>」"
translation = "「~~~윽<emoji=heart04><emoji=heart04><emoji=heart04> 방금 그 신음 소리, 최고였어요♪ 캬하하하핫<emoji=heart04>」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「そこまで言われたら仕方ないですねえ～……それではぁ～……<emoji=heart04>」"
translation = "「그렇게까지 말한다면 어쩔 수 없네요~…… 그럼~……<emoji=heart04>」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「ハッピーバレンタインで～す、会長さん<emoji=heart04>」"
translation = "「해피 밸런타인이에요, 회장군<emoji=heart04>」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「わざわざ直接電話までしておねだりした、シャルレーヌの義理チョコですよ～<emoji=heart04>」"
translation = "「일부러 직접 전화까지 해서 조른 샤를렌의 의리 초코예요~<emoji=heart04>」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「キャハハっ<emoji=heart04>\u3000嬉しそ～な顔しちゃってぇ。大切に食べてくださいね～<emoji=heart04>」"
translation = "「캬하핫<emoji=heart04> 기뻐하는 얼굴 좀 봐. 소중히 드세요~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "相変わらず俺をいじめるのが好きなシャルレーヌに焦らされたけれど、何とか好きな女の子からのチョコレートにありつくことができたのだった――"
translation = "여전히 나를 괴롭히는 걸 좋아하는 샤를렌에게 애가 탔지만 어떻게든 좋아하는 여자아이에게 초콜릿을 얻어낼 수 있었다――"

