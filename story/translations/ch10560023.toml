[[dialogue]]
speaker = "unk"
original = "第３話,変なあだ名は終わらない,P"
translation = "제3화, 이상한 별명은 끝나지 않는다, P"

[[dialogue]]
speaker = "unk"
original = "『流星附属最強の盾』と称されるアムには、同じく『最強の槍』と称されるライバル・桜十路エルデリーゼがいる。"
translation = "『유성 부속 최강의 방패』라고 불리는 아무에게는, 똑같이 『최강의 창』이라 불리는 라이벌 사쿠라코지 엘데리제가 있다."

[[dialogue]]
speaker = "unk"
original = "２人の模擬戦闘はトレーニング施設でちょくちょく見られる名物試合となっていて──"
translation = "두 사람의 모의 전투는 트레이닝 시설에서 자주 볼 수 있는 명물 경기가 되어 있어서──"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「ふう……今日のところは私の負けですわね、アム。手に入れたばかりの水着フォームだというのに、見事な戦いぶりでした」"
translation = "「후우…… 오늘은 저의 패배네요, 아무. 방금 손에 넣은 수영복 폼인데도, 훌륭한 싸움 방식이었습니다.」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「ふっふーん♪\u3000まだエルゼは、あたしの新フォームに対応しきれてないみたいだね！\u3000これで３戦、勝ち越しかな～？」"
translation = "「후후─ㄴ♪ 아직 엘제는 내 새로운 폼에 대응하지 못한 모양이네! 이걸로 3전, 승리인가~?」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「武器は変わらず盾ではありますが、戦い方が変化するのは厄介ですわね……重力の影響を、私の槍は強く受けてしまいますし……」"
translation = "「무기는 변함없이 방패입니다만, 싸우는 방식이 변화하는 건 까다롭네요…… 중력의 영향을 제 창은 강하게 받아버리니까요……」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「今は後塵を拝しておりますが、すぐに対策をしてみせますから！」"
translation = "「지금은 뒤처져 있습니다만, 곧 대책을 세워 보일 테니까요!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あたしだって勝ち越してるからって油断はしないよ？\u3000エルゼの対応力は凄いからね！」"
translation = "「나도 이기고 있다고 방심하진 않을 거야! 엘제의 대응력은 대단하니까!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「お２人とも、素晴らしい戦いぶりでした。偶然通りがかったのですが、ついつい見入ってしまいました」"
translation = "「두 분 다, 훌륭한 싸움 방식이었습니다. 우연히 지나가던 길이었습니다만, 저도 모르게 넋을 잃고 봤습니다.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「お褒めいただきありがとうございます、アナ先輩。それに、会長様も」"
translation = "「칭찬해주셔서 감사합니다, 아나 선배. 그리고, 회장님도.」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「えへへっ、あたしの戦いぶり、カッコよかったでしょ、会長！」"
translation = "「에헤헤, 내 싸우는 모습, 멋졌지, 회장!」"

[[dialogue]]
speaker = "unk"
original = "ああ、もちろん"
translation = "아아, 물론이지."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「ふっふっふ～♪\u3000会長も気を付けた方がいいよ？\u3000最近のあたしの成長速度はすごいからね！\u3000本気で鍛錬してないと、あっという間に追い抜かれちゃうかも！」"
translation = "「후후후~♪ 회장도 조심하는 게 좋아? 요즘 내 성장 속도는 엄청나니까! 본심으로 단련하지 않으면, 순식간에 추월당해버릴지도!」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「またアムはすぐ調子に乗って……」"
translation = "「또 아무는 금방 우쭐해져서……」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「いや～、でも実際、調子がいいのは確かじゃん？\u3000エルゼに３戦も勝ち越せたのっていつぶりかな～って感じだし！」"
translation = "「아니~ 하지만 실제로 컨디션이 좋은 건 확실하잖아? 엘제한테 3번이나 이긴 게 얼마 만인가 싶은 느낌이고!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「最近は水着フォームでの出動も増えて来てるし……うししっ♪\u3000この調子で活躍すれば、あたしの変なあだ名もそのうち消えるはず……！」"
translation = "「요즘은 수영복 폼으로 출동하는 일도 늘어나고 있고…… 우시시♪ 이 기세로 활약하면 내 이상한 별명도 조만간 사라질 거야……!」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「そ、そうですわね……ええ、きっといつの日か消えると思いますよ、はい……」"
translation = "「그, 그렇네요…… 네, 분명 언젠가 사라질 거라 생각해요, 네……」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「え、何その煮え切らない返事……」"
translation = "「어, 뭐야 그 애매한 대답은……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「残念。あだ名はなくなるどころか、さらに増えています」"
translation = "「유감입니다. 별명은 없어지기는커녕, 더 늘어나고 있습니다.」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「嘘ぉ──っ！？」"
translation = "「거짓말──!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「白楯さんが嫌っていた『流星最硬のタンク』というあだ名が変化し、現在は『流星最硬の水着タンク』という名称が広まってる。先日、新星学園内で確認しました」"
translation = "「시로타테 씨가 싫어하던 『유성 최강의 탱크』라는 별명이 변화하여, 현재는 『유성 최강의 수영복 탱크』라는 명칭이 퍼지고 있습니다. 얼마 전, 신성 학원 내에서 확인했습니다.」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「うえぇ～～っ！\u3000何それ、聞いてない！！」"
translation = "「우에에~~! 뭐야 그게, 처음 들어!!」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「私もその呼称は初耳です……」"
translation = "「저도 그 호칭은 처음 듣네요……」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「──え、ちょっと待って。他にもあるの！？」"
translation = "「──어, 잠깐 기다려봐. 더 있는 거야!?」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「え、ええ……聞きたいなら教えますが、怒ってビームを撃たないと約束できますか？」"
translation = "「네, 에에…… 듣고 싶다면 알려드리겠지만, 화나서 빔을 쏘지 않겠다고 약속할 수 있나요?」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「約束できない！\u3000でも聞く！！」"
translation = "「약속 못 해! 그래도 들을래!!」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「めちゃくちゃですわ、アム……！」"
translation = "「막무가내군요, 아무……!」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「え、ええっと……その……『頑強ホバークラフト』とか『不死身シールド・夏』とか……」"
translation = "「에, 에또…… 그…… 『강건 호버크래프트』라든가 『불사신 실드·여름』이라든가……」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「ダッッッサ！！\u3000何それ、おかしいって！\u3000あたし、こんなに活躍してるのに！！」"
translation = "「구우우우려!! 뭐야 그게, 이상하다고! 나, 이렇게나 활약하고 있는데!!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「白楯さんは知名度があります。アステラ対処時の出撃回数はかなりのもの。危ないところを救われた経験のある星騎士も数多いはず」"
translation = "「시로타테 씨는 지명도가 있습니다. 아스텔라 대처 시의 출격 횟수는 상당한 수준. 위험한 순간에 구조받은 경험이 있는 성기사도 수없이 많을 터.」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「ですよね！？\u3000いろんな人のピンチ、救ってますよねあたし！！」"
translation = "「그쵸!? 여러 사람의 위기를 구해주고 있잖아요, 저!!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そんな頼りになるシールダーが、小さな背丈に巨大な盾というギャップ持ち。以前にも伝えましたが、マスコットみがあるキャラクターなのでいじられるのも宿命かと」"
translation = "「그런 의지가 되는 실더가, 작은 키에 거대한 방패라는 갭을 소유. 이전에도 전해드렸습니다만, 마스코트 같은 면이 있는 캐릭터라 놀림당하는 것도 숙명일까 하고.」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あたしも以前に言いましたけど！\u3000それ、アナ先輩に言われるのはやっぱり納得いかないんですけどっ！？」"
translation = "「나도 이전에 말했지만! 그거, 아나 선배한테 듣는 건 역시 납득이 안 가는데요!?」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「……ね、ねえ。あのさー……もしかして会長も、あたしの新しいあだ名を聞いてたり……？」"
translation = "「……있지. 저기…… 혹시 회장도 내 새로운 별명을 들었어……?」"

[[dialogue]]
speaker = "unk"
original = "……聞いてもビーム撃ったりしない？"
translation = "……들어도 빔 쏘거나 안 할 거야?"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「なんでみんな最初に釘を刺すの！？\u3000撃たないから！\u3000たぶん！！」"
translation = "「왜 다들 처음에 못을 박는 거야!? 안 쏠 거니까! 아마도!!」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「アム、そこは絶対と言わないとダメだと思いますわ……！」"
translation = "「아무, 거기선 절대라고 말해야 한다고 생각해요……!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あたしは嘘はつきたくないの！\u3000ほら会長、言って！」"
translation = "「나는 거짓말은 하고 싶지 않아! 자 회장, 말해봐!」"

[[dialogue]]
speaker = "unk"
original = "『歩く水着要塞』とか……"
translation = "『걷는 수영복 요새』라든가……"

[[dialogue]]
speaker = "unk"
original = "『しんがり夏乙女』とか……"
translation = "『후방 지원 여름 소녀』라든가……"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「どーーしてーー！？\u3000こんなはずじゃなかった……新フォームを手に入れて注目度も上がって、今度こそカッコいい名前が広まると思ってたのに……」"
translation = "「어째서어어──!? 이럴 리가 없었는데…… 새 폼을 손에 넣어서 주목도도 올라가고, 이번에야말로 멋진 이름이 퍼질 거라 생각했는데……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「だったらいっそのこと、自分であだ名を広めればいいのでは？」"
translation = "「그렇다면 차라리, 스스로 별명을 퍼뜨리면 어떨까요?」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あたしが、自分で……？」"
translation = "「내가, 스스로……?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はい。うちの前会長も、新星星徒会のフィクサーを自称しています。あれを考えたのも、広めたのも、前会長本人ですから」"
translation = "「네. 저희 전 회장님도 신성 성도회의 픽서를 자처하고 있습니다. 그걸 생각한 것도, 퍼뜨린 것도 전 회장님 본인이니까요.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「なるほど……！\u3000ヴィーナス先輩のフィクサーの二つ名は、流星附属にも知れ渡っていますものね。同じ事をアムもすれば……！」"
translation = "「과연……! 비너스 선배의 픽서라는 이명은 유성 부속에도 널리 알려져 있으니까요. 같은 일을 아무도 한다면……!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「そっか！\u3000よーしっ、考えるぞ！\u3000ダサイあだ名を一掃できるスーパーネームを……！！」"
translation = "「그렇구나! 좋아, 생각하는 거야! 촌스러운 별명을 일소할 수 있는 슈퍼 네임을……!!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「エルゼとアナ先輩、それと会長も力を貸して！」"
translation = "「엘제랑 아나 선배, 그리고 회장도 힘을 보태줘!」"

[[dialogue]]
speaker = "unk"
original = "そうして４人で、あーでもない、こーでもないと意見を交わして──"
translation = "그렇게 4명이서, 이렇다 저렇다 의견을 나누고──"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「決まりました──『サマーアイギス』。これが白楯さんの新しいあだ名です」"
translation = "「결정되었습니다── 『서머 아이기스』. 이것이 시로타테 씨의 새로운 별명입니다.」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「え……やっば！？\u3000なんかめちゃくちゃかっこいい名前ができちゃった！！」"
translation = "「어…… 대박!? 왠지 엄청나게 멋진 이름이 생겨버렸어!!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「これなら文句ないよ！\u3000あたしが出撃して活躍するたび、この名前で呼ばれるならバッチリだよー！！」"
translation = "「이거라면 불만 없어! 내가 출격해서 활약할 때마다 이 이름으로 불린다면 완벽하다고!!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「みんなありがとう！\u3000さっそく友達にも伝えてくる！！」"
translation = "「다들 고마워! 바로 친구들한테도 전해주고 올게!!」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「あ……行ってしまいました。相変わらずアムは、思い立ったらすぐ行動なのですから……」"
translation = "「아…… 가버렸네요. 여전히 아무는 마음먹으면 바로 행동하니까요……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そこが彼女の長所。さて、あとは目論見どおり広まればいいのですが……」"
translation = "「그게 그녀의 장점. 자, 나머지는 의도대로 퍼지면 좋겠습니다만……」"

[[dialogue]]
speaker = "unk"
original = "後日。クラスメイトたちとの集団模擬戦を終えたアムにかけられた言葉は──"
translation = "며칠 후. 클래스메이트들과의 집단 모의전을 마친 아무에게 들려온 말은──"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「むっか～～～！\u3000誰だぁ今、夏の絶壁って言ったやつーー！！\u3000出てこ～～いっ！！」"
translation = "「짜증나아아아~! 누구야 방금, 여름의 절벽이라고 말한 녀석──!! 나와라─!!」"

[[dialogue]]
speaker = "unk"
original = "広めようとした『サマーアイギス』よりも、他のダサいあだ名の方が市民権を得ており、ひっくり返すことは叶わなかったらしく。"
translation = "퍼뜨리려 했던 『서머 아이기스』보다 다른 촌스러운 별명들이 더 시민권을 얻고 있어 뒤집는 것은 불가능했던 모양이다."

[[dialogue]]
speaker = "unk"
original = "ぷっつんしてしまったアムはビームを撃ちまくり、いつもの反省文を書くことになるのだった……"
translation = "폭발해버린 아무는 빔을 마구 쏘아대고, 평소처럼 반성문을 쓰게 되는 것이었다……"

