[[dialogue]]
speaker = "unk"
original = "第１話,ジグの企み,B"
translation = "제1화, 지그의 음모, B"

[[dialogue]]
speaker = "梨緒"
original = "「女神の神殿を、聖庭園に衝突させる……だと！？」"
translation = "「여신의 신전을 성정원에 충돌시킨다고……!?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「そんなことできるの？\u3000聖庭園でも神殿の機能を全部把握してるわけじゃないけど……」"
translation = "「그런 게 가능해? 성정원에서도 신전의 기능을 전부 파악하고 있는 건 아닐 텐데……」"

[[dialogue]]
speaker = "ジグ"
original = "「この神殿の奥はコントロールルームになっていてね、魔王たちと極星星徒会が戦っている間に掌握させてもらったんだ」"
translation = "「이 신전 안쪽은 컨트롤 룸으로 되어 있어서 말이지, 마왕들과 극성성도회가 싸우는 동안 장악해 뒀어.」"

[[dialogue]]
speaker = "ジグ"
original = "「神殿は普段、天界の空を周回しているけど、聖庭園にぶつかるように軌道を変えた」"
translation = "「신전은 평소 천계의 하늘을 주회하고 있지만, 성정원에 부딪히도록 궤도를 바꿨어.」"

[[dialogue]]
speaker = "ジグ"
original = "「このまま神殿が聖庭園に激突すれば、神殿は破壊され、聖庭園ともども天使と天界は消え失せる」"
translation = "「이대로 신전이 성정원에 격돌하면 신전은 파괴되고, 성정원과 함께 천사와 천계는 사라지게 되지.」"

[[dialogue]]
speaker = "ジグ"
original = "「どうだい？\u3000普通に神殿を壊すより愉快だろう？」"
translation = "「어때? 평범하게 신전을 부수는 것보다 유쾌하지 않아?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ぜんっぜん愉快じゃないわよ！」"
translation = "「전~혀 유쾌하지 않거든!」"

[[dialogue]]
speaker = "unk"
original = "グレイスを倒した俺たちの前に、突如現れたリクリエの使徒・ジグ。"
translation = "그레이스를 쓰러뜨린 우리 앞에 돌연 나타난 리크리에의 사도 지그."

[[dialogue]]
speaker = "unk"
original = "彼女はその内容とは裏腹な軽い口調で、危機はまだ続いているのだと宣告する。"
translation = "그녀는 그 내용과는 정반대인 가벼운 말투로, 위기가 아직 계속되고 있음을 선고한다."

[[dialogue]]
speaker = "グレイス"
original = "「彼女は何者ですか！？」"
translation = "「그녀는 누구입니까!?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ベガから来たリクリエの使徒だよ。まぁ、あれはアルタイルにとってもデネブにとっても敵なんじゃないかな」"
translation = "「베가에서 온 리크리에의 사도야. 뭐, 저건 알타이르에게도 데네브에게도 적이 아닐까 싶네.」"

[[dialogue]]
speaker = "グレイス"
original = "「リクリエの使徒──！？」"
translation = "「리크리에의 사도──!?」"

[[dialogue]]
speaker = "unk"
original = "ジグと初めて遭遇したグレイスだが、ナターシャの言葉を聞いて顔色を変える。"
translation = "지그와 처음 조우한 그레이스였지만, 나타샤의 말을 듣고 안색을 바꾼다."

[[dialogue]]
speaker = "ジグ"
original = "「今もこの神殿は聖庭園に向かっている。私が嘘を言っていないことは、自分の体で理解できるだろう？」"
translation = "「지금도 이 신전은 성정원을 향하고 있어. 내가 거짓말을 하지 않는다는 건 자신의 몸으로 이해할 수 있겠지?」"

[[dialogue]]
speaker = "梨緒"
original = "「くっ……！」"
translation = "「큭……!」"

[[dialogue]]
speaker = "unk"
original = "さっきから地響きが止まらない。"
translation = "아까부터 땅울림이 멈추지 않는다."

[[dialogue]]
speaker = "unk"
original = "ジグの言う通り、これは神殿が本来の軌道を離れて聖庭園に向かっている証拠なのだろう。"
translation = "지그의 말대로, 이것은 신전이 본래의 궤도를 벗어나 성정원을 향하고 있다는 증거일 것이다."

[[dialogue]]
speaker = "ジグ"
original = "「止めたければ、神殿の奥に行くといい。もちろん私が相手になるけどね」"
translation = "「멈추고 싶다면 신전 안쪽으로 오도록 해. 물론 내가 상대해 주겠지만 말이야.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ええ、ここであんたをぶっ飛ばして、神殿も止めさせてもらうわ！」"
translation = "「그래, 여기서 당신을 날려버리고 신전도 멈추게 하겠어!」"

[[dialogue]]
speaker = "ジグ"
original = "「威勢がいいね。だけど本当にできるのかい？」"
translation = "「기세가 좋네. 하지만 정말로 할 수 있겠어?」"

[[dialogue]]
speaker = "アポロ"
original = "「ぐぐ……力が出ない……」"
translation = "「그으…… 힘이 안 나……」"

[[dialogue]]
speaker = "メルエル"
original = "「ごめん、私もダメ……何が起こってるの……？」"
translation = "「미안, 나도 안 돼…… 무슨 일이 일어나는 거야……?」"

[[dialogue]]
speaker = "ジグ"
original = "「この神殿の機能で、魔王の力を封じたんだよ。君たちの星力は、魔王因子を通して強制的に放出される」"
translation = "「이 신전의 기능으로 마왕의 힘을 봉인했거든. 너희의 성력은 마왕 인자를 통해 강제적으로 방출돼.」"

[[dialogue]]
speaker = "クロト"
original = "「すまない、俺も力が……」"
translation = "「미안하다, 나도 힘이……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それなら……！\u3000あんなやつ、私１人でギッタンギッタンにしてやるんだから！」"
translation = "「그렇다면……! 저런 녀석, 나 혼자서 아주 박살을 내줄 거니까!」"

[[dialogue]]
speaker = "ジグ"
original = "「ふぅん、どうやら君は魔王の因子が弱いようだね。怪我の功名、というやつかな」"
translation = "「흐음, 아무래도 너는 마왕의 인자가 약한 모양이네. 불행 중 다행이라고 해야 하나.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「チクチクうるさいわね！\u3000先手必勝よ！\u3000チェンジ、ノヴァフォーム──！！」"
translation = "「조잘조잘 시끄럽네! 선제필승이야! 체인지, 노바 폼──!!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「って、あれ！？\u3000ノヴァフォームになれない！？」"
translation = "「어, 어라!? 노바 폼이 안 돼!?」"

[[dialogue]]
speaker = "クロト"
original = "「下がれ、ヴィーナス！\u3000影響は少なくても、封印は効いているみたいだ！」"
translation = "「물러나, 비너스! 영향은 적어도 봉인은 듣고 있는 모양이야!」"

[[dialogue]]
speaker = "メルエル"
original = "（やっぱり魔王の力が原因……じゃあ同じように戦えなくなっている私も魔王なの……？）"
translation = "（역시 마왕의 힘이 원인…… 그럼 똑같이 싸울 수 없게 된 나도 마왕인 거야……?）"

[[dialogue]]
speaker = "グレイス"
original = "「私がデネブで女神の神殿を探索した時はそんな機能ありませんでしたよ！\u3000というかそんなのあったら私が勝ったんですが！」"
translation = "「제가 데네브에서 여신의 신전을 탐색했을 때는 그런 기능 없었다고요! 아니, 그런 게 있었다면 제가 이겼을 텐데요!」"

[[dialogue]]
speaker = "ジグ"
original = "「この神殿は２０００年前、悪しき魔王に狙われた。その教訓から、魔王の血族への対策がいくつか施されている」"
translation = "「이 신전은 2000년 전, 사악한 마왕에게 노려졌지. 그 교훈으로 마왕의 혈족에 대한 대책이 몇 가지 마련되어 있어.」"

[[dialogue]]
speaker = "ジグ"
original = "「しかし未完成の部分もあってね。私がシステムをいじってさっき完成させたんだ」"
translation = "「하지만 미완성인 부분도 있어서 말이야. 내가 시스템을 만져서 방금 완성시켰지.」"

[[dialogue]]
speaker = "ジグ"
original = "「このシステムは、魔王の血族が持つ魔王因子を通じて、星力や魔力を強制的に放出させるものだよ」"
translation = "「이 시스템은 마왕의 혈족이 가진 마왕 인자를 통해 성력이나 마력을 강제적으로 방출시키는 거야.」"

[[dialogue]]
speaker = "グレイス"
original = "「な……！？\u3000リクリエの使徒はそんなことまでできるんですか！？」"
translation = "「뭐……!? 리크리에의 사도는 그런 것까지 가능한 겁니까!?」"

[[dialogue]]
speaker = "ジグ"
original = "「“真なる神”の力であれば、女神の神殿ごときを改造するなんて容易いことさ。まぁ、私自身の力も少し使わせてもらったけどね」"
translation = "「“진정한 신”의 힘이라면 여신의 신전 따위를 개조하는 건 쉬운 일이지. 뭐, 내 자신의 힘도 조금 사용했지만 말이야.」"

[[dialogue]]
speaker = "ジグ"
original = "「さて、どうするんだい、魔王？\u3000私を倒さなければ、天使も天界も消滅してしまうよ」"
translation = "「자, 어떻게 할 거지, 마왕? 나를 쓰러뜨리지 않으면 천사도 천계도 소멸하고 말아.」"

[[dialogue]]
speaker = "クロト"
original = "（そうだ。こうしている間にも、天界の破滅は刻一刻と近づいている）"
translation = "（그래. 이러고 있는 동안에도 천계의 파멸은 시시각각 다가오고 있어.）"

[[dialogue]]
speaker = "unk"
original = "しかし俺は星力すらまともに使うことができず、ジグに戦って勝つのは絶望的。"
translation = "하지만 나는 성력조차 제대로 사용할 수 없어, 지그와 싸워 이기는 것은 절망적."

[[dialogue]]
speaker = "unk"
original = "唯一使えるのは、俺の体に封印されたリクリエの力だが……"
translation = "유일하게 사용할 수 있는 것은 내 몸에 봉인된 리크리에의 힘이지만……"

[[dialogue]]
speaker = "ジグ"
original = "「君が考えていることを当ててあげるよ、魔王」"
translation = "「네가 생각하고 있는 걸 맞춰볼까, 마왕.」"

[[dialogue]]
speaker = "ジグ"
original = "「星力すら使えない状態ではジグに勝てない。リクリエの力を使ったとしても、自分が先に倒れてしまう」"
translation = "「성력조차 쓸 수 없는 상태로는 지그에게 이길 수 없어. 리크리에의 힘을 쓴다 해도 자신이 먼저 쓰러지고 말겠지.」"

[[dialogue]]
speaker = "ジグ"
original = "「ならどうすればいいか……そんなの簡単じゃないか」"
translation = "「그럼 어떻게 하면 좋을까…… 그런 건 간단하잖아.」"

[[dialogue]]
speaker = "ジグ"
original = "「ラクシスの力を使えばいい」"
translation = "「락시스의 힘을 쓰면 돼.」"

[[dialogue]]
speaker = "クロト"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker = "ジグ"
original = "「あれは魔王因子とは異なる、緋宮クロトだけに備わった力だ。神殿のシステムには阻害されないはずだよ」"
translation = "「그건 마왕 인자와는 다른, 히노미야 쿠로토에게만 갖춰진 힘이야. 신전의 시스템에는 저해되지 않을 텐데.」"

[[dialogue]]
speaker = "クロト"
original = "（ラクシスの力は、世界を超える力。平行世界の可能性を呼び寄せることもできる）"
translation = "（락시스의 힘은 세계를 넘는 힘. 평행세계의 가능성을 불러들일 수도 있어.）"

[[dialogue]]
speaker = "クロト"
original = "（だが俺が逆に平行世界の可能性に浸食されることもありうる）"
translation = "（하지만 내가 반대로 평행세계의 가능성에 침식될 수도 있지.）"

[[dialogue]]
speaker = "クロト"
original = "（実際、俺はベガやデネブで敗北した緋宮クロトに引きずられ、暴走しそうになった）"
translation = "（실제로 나는 베가나 데네브에서 패배한 히노미야 쿠로토에게 이끌려 폭주할 뻔했어.）"

[[dialogue]]
speaker = "unk"
original = "今ヴィーナスが俺の中のラクシスの力を解放すれば、可能性に引っ張られて、俺までディザスターハンドに堕ちかねない。"
translation = "지금 비너스가 내 안의 락시스의 힘을 해방하면, 가능성에 끌려가 나까지 디재스터 핸드로 타락할지도 모른다."

[[dialogue]]
speaker = "クロト"
original = "「神殿の奥に到達したのなら、そのまま神殿を破壊して天使を消滅させればよかったはずだ」"
translation = "「신전 안쪽에 도달했다면 그대로 신전을 파괴해서 천사를 소멸시키면 됐을 텐데.」"

[[dialogue]]
speaker = "クロト"
original = "「だけどそうしなかったということは、ジグの真の目的は──」"
translation = "「하지만 그렇게 하지 않았다는 건 지그의 진정한 목적은──」"

[[dialogue]]
speaker = "ジグ"
original = "「ああ、私もディザスターハンドが欲しくてね。君もベガの緋宮クロトのように、ディザスターハンドになってくれない？」"
translation = "「아아, 나도 디재스터 핸드가 갖고 싶어서 말이야. 너도 베가의 히노미야 쿠로토처럼 디재스터 핸드가 되어주지 않을래?」"

[[dialogue]]
speaker = "梨緒"
original = "「──！！」"
translation = "「──!!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ラクシスの力の封印は解かないわよ！\u3000クロトをディザスターハンドになんて、絶対させないんだから！」"
translation = "「락시스 힘의 봉인은 풀지 않을 거야! 쿠로토를 디재스터 핸드 따위로 절대 만들지 않을 거니까!」"

[[dialogue]]
speaker = "unk"
original = "ジグは天界の危機に乗じて、俺をディザスターハンドにしようとしている。"
translation = "지그는 천계의 위기를 틈타 나를 디재스터 핸드로 만들려 하고 있다."

[[dialogue]]
speaker = "unk"
original = "思えば、以前俺にリクリエの力を注ぎ込み、暴走させようとしたのも、それが目的だったんだろう。"
translation = "생각해 보면 이전에 내게 리크리에의 힘을 주입해 폭주시히려 했던 것도 그것이 목적이었을 것이다."

[[dialogue]]
speaker = "ジグ"
original = "「うかうかしていると、神殿が聖庭園にぶつかってしまうよ？\u3000それでもいいのかい？」"
translation = "「방심하고 있으면 신전이 성정원에 부딪히고 말걸? 그래도 괜찮겠어?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「いいわけないでしょ。でもこの状況はかなりまずいなぁ……」"
translation = "「괜찮을 리가 없잖아. 하지만 이 상황은 꽤 좋지 않네……」"

[[dialogue]]
speaker = "アポロ"
original = "「あたしが戦えたら……ぐ……すまん……」"
translation = "「내가 싸울 수만 있다면…… 윽…… 미안하다……」"

[[dialogue]]
speaker = "unk"
original = "俺やヴィーナス、アポロやメルエルはまともに戦うことができず、今の戦力ではジグに勝つどころか、時間を稼げるかすら怪しい。"
translation = "나나 비너스, 아폴로나 메르엘은 제대로 싸울 수 없어, 지금 전력으로는 지그에게 이기기는커녕 시간을 벌 수 있을지도 의문이다."

[[dialogue]]
speaker = "ジグ"
original = "「私としてはこのまま神殿がぶつかるのを待ってもいいんだけど……」"
translation = "「나로서는 이대로 신전이 부딪히기를 기다려도 상관없지만……」"

[[dialogue]]
speaker = "ジグ"
original = "「タイムリミットの前に、君たちを狩ってしまってもいいよね？」"
translation = "「타임 리미트 전에 너희를 사냥해 버려도 괜찮겠지?」"

[[dialogue]]
speaker = "クロト"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "unk"
original = "ジグが大剣を携えて、ゆっくりと俺に近づいてくる。"
translation = "지그가 대검을 들고 천천히 내게 다가온다."

[[dialogue]]
speaker = "unk"
original = "だが今の俺に抵抗する力はなくて──"
translation = "하지만 지금의 내게 저항할 힘은 없어서──"

[[dialogue]]
speaker = "スレイプニル"
original = "「ブルルルッ！！」"
translation = "「푸르르르!!」"

[[dialogue]]
speaker = "グレイス"
original = "「極星従騎！？\u3000しかし私の手持ちは全て倒されたはずです……！」"
translation = "「극성종기!? 하지만 제가 가진 것들은 전부 쓰러졌을 텐데요……!」"

[[dialogue]]
speaker = "unk"
original = "俺たちとジグの間に割って入るように、馬型の極星従騎──スレイプニルが現れた。"
translation = "우리와 지그 사이를 가로막듯이 말 형태의 극성종기──슬레이프니르가 나타났다."

[[dialogue]]
speaker = "クロト"
original = "（ジグの配下か……！？\u3000いや、ジグが従えていたのは機械型モンスターのはず……）"
translation = "（지그의 부하인가……!? 아니, 지그가 부리던 건 기계형 몬스터였을 텐데……）"

[[dialogue]]
speaker = "チナ"
original = "「何やってるか知らねえが、リクリエの使徒の好きにはさせないぞ！」"
translation = "「뭘 하고 있는지는 모르겠지만, 리크리에의 사도 마음대로 하게 두진 않겠다!」"

[[dialogue]]
speaker = "グレイス"
original = "「チナ！？」"
translation = "「치나!?」"

