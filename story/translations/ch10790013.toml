[[dialogue]]
speaker = "unk"
original = "第３話,ひとつの命,P"
translation = "제3화, 하나의 생명"

[[dialogue]]
speaker = "unk"
original = "とある休日の昼下がり。遊びに来たパテルと一緒に流行のドラマを見ていると──"
translation = "어느 휴일의 오후. 놀러 온 파텔과 함께 유행하는 드라마를 보고 있자니──"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「あ、死んだ。この人、いつか死ぬ気がしてたけど、ここで事故死かぁ～」"
translation = "「아, 죽었다. 이 사람, 언젠가 죽을 것 같았는데, 여기서 사고사라니~」"

[[dialogue]]
speaker = "unk"
original = "理不尽な死がつらい……"
translation = "불합리한 죽음은 괴로워……"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ハハッ。見事に作り手の術中にはまってるね。でも死が理不尽だの不条理だの言われるの、そろそろ飽き飽きだな～……」"
translation = "「하하. 멋지게 제작자의 술수에 빠졌네. 하지만 죽음이 불합리하다느니 부조리하다느니 하는 소리, 슬슬 지긋지긋하단 말이지~……」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「人は刺されたら死ぬ。たとえ法律で殺人が禁止されても、人が死ななくなるわけじゃない」"
translation = "「사람은 찔리면 죽어. 설령 법으로 살인이 금지되어도, 사람이 죽지 않게 되는 건 아니야」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「病だってそう。医療の発展で死ににくくはなったけど、病が悪化すれば死ぬ」"
translation = "「병도 그래. 의료의 발전으로 잘 안 죽게는 됐지만, 병이 악화되면 죽어」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「事故死や突然死なんて、ただ運が悪いだけで死ぬ。そこに正しく生きてるかどうかなんて関係ない。人の言う条理なんてものの方が後付けなんだよ」"
translation = "「사고사나 돌연사 같은 건, 그냥 운이 나빠서 죽는 거야. 거기에 바르게 살고 있는지 같은 건 관계없어. 인간들이 말하는 조리라는 것 따위가 나중에 갖다 붙인 거라니까」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「それとも、わかってるのに気付かないふりしてるのかな──なんて、死神トークはこのくらいにしとこっか。かわいくないしね」"
translation = "「아니면, 알고 있으면서도 모르는 척하는 걸까── 랄까, 사신 토크는 이쯤 해둘까. 귀엽지 않으니까 말이야」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「んじゃドラマも見終わったところだし、遊びに行こっか！\u3000せっかくのお休みなんだし、時間を無駄にするのはナンセンスだよ！」"
translation = "「그럼 드라마도 다 봤으니, 놀러 가자! 어렵게 얻은 휴일인데, 시간을 낭비하는 건 넌센스야!」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「じゃーん！\u3000ゆ～えんち～！\u3000この前は誰かさんのせいでちゃんと遊べなかったからね！\u3000その誰かさんはあたしだけど！」"
translation = "「짜잔! 유~원~지~! 저번에는 누구 씨 때문에 제대로 못 놀았으니까 말이야! 그 누구 씨가 나긴 하지만!」"

[[dialogue]]
speaker = "unk"
original = "今さらだけど、どうして附属の制服を？"
translation = "이제 와서 묻는 거지만, 왜 부속 교복을?"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ちょうどいいから予備をこっそり借りた！\u3000あたし、えら～い守護天使様だからこれくらいいいよね！」"
translation = "「마침 적당하길래 예비용을 몰래 빌렸어! 나, 높으~신 수호천사님이니까 이 정도는 괜찮지!」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「死ぬまで借りてるだけだよ、借りてるだけ。死んだら返すよ、多分」"
translation = "「죽을 때까지 빌리는 것뿐이야, 빌리는 것뿐. 죽으면 돌려줄게, 아마도」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「さぁ、デートだよ、デート！\u3000思いっきりあたしを甘やかしてね<emoji=heart04>」"
translation = "「자, 데이트야, 데이트! 마음껏 나를 응석받이로 만들어 줘<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「何驚いてるの？\u3000男と女が一緒に遊びに行くってことはデートでしょ？\u3000まさかあたしのこと女の子として意識してなかった？」"
translation = "「왜 놀라? 남자랑 여자가 같이 놀러 간다는 건 데이트잖아? 설마 나를 여자애로 의식하지 않았던 거야?」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「じゃあこうしたら、ちょっとは意識してくれるかな……？」"
translation = "「그럼 이렇게 하면, 조금은 의식해 주려나……?」"

[[dialogue]]
speaker = "unk"
original = "（パテルが腕に抱きついて……）"
translation = "（파텔이 팔에 매달리며……）"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「あたしだって女の子なんだし、その、少しくらいドキドキしてくれてもいいんじゃないかな……」"
translation = "「나도 여자애니까, 그, 조금 정도는 두근거려 줘도 괜찮지 않을까……」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「な～んてね♪\u3000ドキッとしちゃった？」"
translation = "「~라는 건 농담♪ 두근거렸어?」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「アハハッ、からかってごめんってば～。じゃあお詫びに、このまま遊園地回ろうよ。デートなんだしさ♪」"
translation = "「아하핫, 놀려서 미안하다니까~. 그럼 사과의 의미로, 이대로 유원지를 돌자. 데이트니까 말이야♪」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ほら行こっ！\u3000お化け屋敷に～、ゴーカートに～、あとジェットコースターもまた乗りたいんだ♪」"
translation = "「자 가자! 귀신의 집이랑~, 고카트랑~, 그리고 롤러코스터도 또 타고 싶어♪」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「おお、上がってる上がってる……」"
translation = "「오오, 올라간다 올라간다……」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「キャ～～～～～～ッ！！\u3000死ぬ～～～～～～っ！！」"
translation = "「꺄아아아아아아악!! 죽는다아아아아아아!!」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「やっぱり遊園地といえばジェットコースターだよね～♪\u3000死神なのにドキドキして、クセになっちゃうかも♪」"
translation = "「역시 유원지 하면 롤러코스터지~♪ 사신인데도 두근거려서, 중독될지도 몰라♪」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ゴーカートも楽しかった！\u3000次はもっとうまくなって、あたしの運転で魔王を追い抜いてあげるね！」"
translation = "「고카트도 재밌었어! 다음엔 더 잘하게 돼서, 내 운전으로 마왕을 추월해 줄게!」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「でもお化け屋敷は期待はずれだったなぁ～。あたしの方がもっと上手に驚かせるよ。阿鼻叫喚にしてあげる♪」"
translation = "「하지만 귀신의 집은 기대 이하였어~. 내가 훨씬 더 잘 놀라게 할 수 있어. 아비규환으로 만들어 줄게♪」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「あ……くんくん、くんくん……お肉の匂い……遊園地の売店からだね」"
translation = "「아…… 킁킁, 킁킁…… 고기 냄새…… 유원지 매점에서 나는 거네」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「前よりは物を食べるようになったけど、お肉はやっぱりまだ抵抗あるかな。いい匂いだし、食べればおいしいんだと思うけど……」"
translation = "「전보다는 음식을 먹게 됐지만, 고기는 역시 아직 저항감이 있네. 좋은 냄새가 나고, 먹으면 맛있을 거라 생각은 하지만……」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「別に食べなくたって、生きてるだけでリソースを消費している。わかってはいるんだけど、やっぱりお肉はね……」"
translation = "「딱히 먹지 않아도, 살아있는 것만으로 리소스를 소비하고 있어. 알고는 있지만, 역시 고기는 좀……」"

[[dialogue]]
speaker = "unk"
original = "今のパテルもひとつの命だよ"
translation = "지금의 파텔도 하나의 생명이야"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ほえ？」"
translation = "「호에?」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「こんにちは。お久しぶりですね、プルちゃん」"
translation = "「안녕하세요. 오랜만이네요, 푸루짱」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「オレもいるぞ。よぉチビ。いかにも最後の別れみたいな雰囲気出してたくせに、しっかり姿現してんじゃねえか」"
translation = "「나도 있다. 여어 꼬맹이. 아주 마지막 작별인 양 분위기 잡더니만, 뻔뻔하게 모습 드러내고 있잖냐」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「むっか～。相変わらずフランは生意気だね。その首刈り取ってあげようか」"
translation = "「울컥~. 여전히 프랑은 건방지네. 그 목을 확 베어버려 줄까」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「やれるもんならやってみな。死神との勝負なら喜んで受けて立つぜ」"
translation = "「할 수 있으면 해보시지. 사신과의 승부라면 기꺼이 받아주마」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「会長さんが、プルちゃんがここにいるって教えてくれたんです。プルちゃんが元気そうでよかった」"
translation = "「회장님이, 푸루짱이 여기 있다고 알려주셨어요. 푸루짱이 건강해 보여서 다행이에요」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ありがとう。グロリアは優しいね。もう、魔王ってば。言わなくていいって言ったのに」"
translation = "「고마워. 글로리아는 착하네. 정말, 마왕도 참. 말하지 말라고 했는데」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「死神がどうとか、変な気ぃ使ってんじゃねえ。ほら食えよ。オレオススメのカツドッグだ」"
translation = "「사신이 어쩌구 하면서 이상한 신경 쓰지 마. 자 먹어라. 내 추천 메뉴인 카츠도그다」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「コッペパンにトンカツを挟んでるの？\u3000おいしそうではあるけど……」"
translation = "「코페빵에 돈가스를 끼운 거야? 맛있어 보이긴 하지만……」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「別にお前が食わなきゃオレが食う。でも今のお前は、オレたちと同じように体があって、食わなきゃ腹減って死ぬんだろ」"
translation = "「네가 안 먹으면 내가 먹을 거야. 하지만 지금의 너는 우리랑 마찬가지로 몸이 있고, 안 먹으면 배고파서 죽는 거잖아」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「本体は守護天使でも、今のプルちゃんはプルちゃんです。だから普通の生き物と同じように生きていいんじゃないでしょうか」"
translation = "「본체는 수호천사라도, 지금의 푸루짱은 푸루짱이에요. 그러니까 평범한 생물처럼 살아도 괜찮지 않을까요」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「あたしも……普通の生き物……」"
translation = "「나도…… 평범한 생물……」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「普通の生き物なら……糧になるものは食べるのが自然か。それじゃ……あ～ん」"
translation = "「평범한 생물이라면…… 양식이 되는 걸 먹는 게 자연스러운 건가. 그럼…… 아~앙」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ん～っ！\u3000カツドックおいし～っ♪\u3000サクサクでジューシーで……はむはむはむはむ……ごくんっ」"
translation = "「음~! 카츠도그 맛있어~!♪ 바삭바삭하고 쥬시해서…… 함냠함냠함냠…… 꿀꺽」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「これが命の味か……罪深くて、甘美な味だなぁ。でも生きるって、こういうことだもんね」"
translation = "「이게 생명의 맛인가…… 죄 깊고도 달콤한 맛이네. 하지만 살아간다는 건 이런 거니까」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「……うん、そうだね。こうして体があって、この世にいるなら、あたしもひとつの命か」"
translation = "「……응, 그렇네. 이렇게 몸이 있고, 이 세상에 있다면 나도 하나의 생명인가」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「だいたい、あたしがこうなっちゃったのはリクリエのせいなんだから、あたしがやらかしても全部リクリエが悪いんだ！」"
translation = "「애초에 내가 이렇게 돼버린 건 리크리에 탓이니까, 내가 사고를 쳐도 전부 리크리에가 잘못한 거야!」"

[[dialogue]]
speaker = "unk"
original = "開き直った！？"
translation = "배 째라는 거야!?"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「というわけで、もっとあたしの好きにすることにしたよ。好きなことして、好きなもの食べるんだ！」"
translation = "「그런 고로, 좀 더 내 마음대로 하기로 했어. 하고 싶은 거 하고, 먹고 싶은 거 먹을 거야!」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「よぉし、今度こそ勝負だチビ！\u3000絶叫マシーン勝負の決着付けるぞ！」"
translation = "「좋아, 이번에야말로 승부다 꼬맹이! 절규 머신 승부의 결판을 내자고!」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「スタンプラリーでもらった遊園地の割引券が残っていますから、みんなでまた一緒に来ましょう」"
translation = "「스탬프 랠리로 받은 유원지 할인권이 남아있으니까, 다 같이 또 와요」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「うん！」"
translation = "「응!」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「今日はありがとう、魔王。おかげで吹っ切れたよ」"
translation = "「오늘은 고마워, 마왕. 덕분에 고민이 싹 가셨어」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「だからその、あなたのこと、割と気に入ってるっていうか……けっこう好きかも。エヘヘ……♪」"
translation = "「그러니까 그, 당신을 꽤 마음에 들어 한달까…… 꽤 좋아할지도. 에헤헤……♪」"

