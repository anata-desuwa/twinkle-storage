[[dialogue]]
speaker = "unk"
original = "──アニマは、昔から何だって１人でできタ。"
translation = "──아니마는 예전부터 뭐든 혼자서 할 수 있었다타."

[[dialogue]]
speaker = "unk"
original = "魔界の片田舎に生まれテ、若くして錬金術師の才能を見出され──その地で一番の天才術師の元に弟子入りをしタ。"
translation = "마계의 시골 마을에서 태어나타, 어린 나이에 연금술사의 재능을 발견하고── 그 땅에서 제일가는 천재 술사 밑으로 제자로 들어갔다타."

[[dialogue]]
speaker = "unk"
original = "けれどその師匠の元でも、６年程度で習うことがなくなっタ。行く先々で『天才だ』と持て囃されたものダ。"
translation = "하지만 그 스승 밑에서도 6년 정도면 배울 것이 없어졌다타. 가는 곳마다 『천재다』라며 칭송받곤 했다타."

[[dialogue]]
speaker = "unk"
original = "他者の評価に興味はなイ。大切なのは、自分で自分を肯定できるコト。自分自身の在り方に納得し、生きて行けるかどうカ。"
translation = "타인의 평가에는 흥미 없다타. 중요한 건 스스로 자신을 긍정할 수 있는 것. 자기 자신의 존재 방식에 납득하며 살아갈 수 있느냐다타."

[[dialogue]]
speaker = "unk"
original = "だがそんなアニマも、師匠が別れ際に贈ってくれた言葉は覚えていル──"
translation = "하지만 그런 아니마도 스승이 작별할 때 해준 말은 기억하고 있다타──"

[[dialogue]]
speaker_original = "アニマの師"
speaker_translation = "아니마의 스승"
original = "「──お前は天才だ。だから、そのままでいい。他人を理解などしなくてもいい。好きなようにやれ」"
translation = "「──너는 천재다. 그러니 그대로도 좋아. 타인을 이해할 필요 따윈 없다. 마음대로 해라.」"

[[dialogue]]
speaker_original = "アニマの師"
speaker_translation = "아니마의 스승"
original = "「だが、お前と同じ種類の……好奇心の狂人を見つけたなら、そいつとの繋がりは大事にしろ」"
translation = "「하지만 너와 같은 종류의…… 호기심에 미친 자를 발견한다면, 그 녀석과의 인연은 소중히 해라.」"

[[dialogue]]
speaker_original = "アニマの師"
speaker_translation = "아니마의 스승"
original = "「いいか。錬金術師は『ロマン』が全てだ。狂気の炎で身を焦がせ。自分とは違う、けれど同じ炎を持つ者がいたなら、そいつは傍に置くんだ」"
translation = "「알겠냐. 연금술사는 『로망』이 전부다. 광기의 불꽃으로 몸을 태워라. 자신과는 다르지만 같은 불꽃을 가진 자가 있다면 그 녀석을 곁에 두는 거다.」"

[[dialogue]]
speaker_original = "アニマの師"
speaker_translation = "아니마의 스승"
original = "「他人の心の炎に影響を受けろ。そいつの炎は、お前にとっての薪となる」"
translation = "「타인의 마음의 불꽃에 영향을 받아라. 그 녀석의 불꽃은 네게 장작이 될 것이다.」"

[[dialogue]]
speaker_original = "アニマの師"
speaker_translation = "아니마의 스승"
original = "「いかに天才と言えど、１人でたどり着ける頂きなどたかが知れている──お前がどんな奇人として歴史に名を遺すか、今から楽しみだよアニマ」"
translation = "「아무리 천재라 해도 혼자서 도달할 수 있는 정점은 뻔한 법── 네가 어떤 괴짜로서 역사에 이름을 남길지 지금부터 기대되는구나, 아니마.」"

[[dialogue]]
speaker = "unk"
original = "師匠ヨ、今こそアニマは、あなたの言葉を心の底から理解するだろウ──"
translation = "스승님이여, 이제야 아니마는 당신의 말을 마음 깊이 이해할 것 같다타──"

[[dialogue]]
speaker = "unk"
original = "──力を寄越せ。"
translation = "──힘을 내놔라."

[[dialogue]]
speaker = "unk"
original = "アニマ先輩らしからぬ力強い求めを聞いた俺は、痛む体に鞭打って彼女の元へ近づいた。"
translation = "아니마 선배답지 않은 힘찬 요구를 들은 나는, 아픈 몸을 이끌고 그녀의 곁으로 다가갔다."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「会長。説明している暇が惜しイ──お前の魔王の力で、アニマの魂を覗いてみてくレ」"
translation = "「회장. 설명할 시간이 아깝다타── 너의 마왕의 힘으로 아니마의 영혼을 들여다봐 줘라다타.」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「今なら……行ける気がするんダ！」"
translation = "「지금이라면…… 갈 수 있을 것 같다타!」"

[[dialogue]]
speaker = "unk"
original = "言われて気づく──見える。"
translation = "듣고 나서야 깨닫는다── 보인다."

[[dialogue]]
speaker = "unk"
original = "アニマ先輩という存在の中に煌めく、覚醒の光を……！"
translation = "아니마 선배라는 존재 안에서 반짝이는 각성의 빛을……!"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「──フヒ♪\u3000さぁ、ギガンドムが突っ込んできてるゾ！\u3000アニマの準備は万全ダ！\u3000魔王……頼ム！！」"
translation = "「──후히♪ 자, 기간돔이 달려들고 있다타! 아니마의 준비는 만전이다타! 마왕…… 부탁한다타!!」"

[[dialogue]]
speaker = "unk"
original = "アルケインノヴァ──エクストリーム！！"
translation = "아케인 노바── 익스트림!!"

[[dialogue]]
speaker = "unk"
original = "３０００年前の魔王ラクシスから受け継がれる、魔王と絆を結んだ仲間の潜在能力を開放するコード。"
translation = "3000년 전의 마왕 라크시스로부터 이어져 내려오는, 마왕과 유대를 맺은 동료의 잠재 능력을 개방하는 코드."

[[dialogue]]
speaker = "unk"
original = "俺ははっきりと、アニマ先輩の中に眠る覚醒のスイッチをプッシュした──！"
translation = "나는 확실하게 아니마 선배 안에 잠든 각성의 스위치를 눌렀다──!"

[[dialogue]]
speaker_original = "アニマ（覚醒）"
speaker_translation = "아니마(각성)"
original = "「フヒッ──フヒヒヒヒッ！\u3000これが魔王……お前だけが引き出せる星騎士の第二形態カ……！！」"
translation = "「후히── 후히히히히! 이것이 마왕…… 너만이 끌어낼 수 있는 성기사의 제2형태인가다타……!!」"

[[dialogue]]
speaker_original = "アニマ（覚醒）"
speaker_translation = "아니마(각성)"
original = "「おいおい、一張羅が変わっただけじゃなイ。傷まで治ってしまっているゾ……ありえなイ！\u3000フヒヒヒ！！\u3000楽しいナァ、魔王！！」"
translation = "「어이어이, 옷만 바뀐 게 아니다타. 상처까지 나아버렸다타…… 말도 안 된다타! 후히히히!! 즐겁구나다타, 마왕!!」"

[[dialogue]]
speaker_original = "ギガンドム"
speaker_translation = "기간돔"
original = "「ゴォォオォ────！！」"
translation = "「고오오오────!!」"

[[dialogue]]
speaker_original = "アニマ（覚醒）"
speaker_translation = "아니마(각성)"
original = "「目覚めてゼロ秒で実験させてくれるとハ！\u3000実にありがたイ──来いッ！\u3000ラディカルメディスン！！」"
translation = "「눈뜬 지 0초 만에 실험하게 해주다니타! 참으로 고맙다타── 와라! 래디컬 메디신!!」"

[[dialogue]]
speaker_original = "アニマ（覚醒）"
speaker_translation = "아니마(각성)"
original = "「フヒッ♪\u3000後ろのビルまですっ飛んでいったゾ♪\u3000試運転は、まぁまぁだナ！」"
translation = "「후히♪ 뒤에 있는 빌딩까지 날아가 버렸다타♪ 시운전은 그럭저럭이다타!」"

[[dialogue]]
speaker = "unk"
original = "普段のアニマ先輩からは想像もつかない、規格外の星力量。そして攻撃を食らったギガンドムは、全身を苦しそうに震わせている──！"
translation = "평소의 아니마 선배로서는 상상도 할 수 없는 규격 외의 성력량. 그리고 공격을 맞은 기간돔은 전신을 괴로운 듯이 떨고 있다──!"

[[dialogue]]
speaker_original = "アニマ（覚醒）"
speaker_translation = "아니마(각성)"
original = "「ぶっつけ本番だが、自分の力ダ。ノヴァフォームのアニマが何をできるのか、一瞬で理解したヨ」"
translation = "「실전에서 바로 써보는 거지만 내 힘이다타. 노바 폼의 아니마가 무엇을 할 수 있는지 순식간에 이해했다타.」"

[[dialogue]]
speaker_original = "アニマ（覚醒）"
speaker_translation = "아니마(각성)"
original = "「攻撃ついでに、<b>さっき失った弱体化薬を再生成して</b>、一緒にぶつけてやったんダ」"
translation = "「공격하는 김에 <b>방금</b> <b>잃어버린</b> <b>약화약을</b> <b>재생성해서</b> 같이 박아넣어 줬다타.」"

[[dialogue]]
speaker_original = "アニマ（覚醒）"
speaker_translation = "아니마(각성)"
original = "「物理的な材料を全て、アニマの星力を触媒に生成できル。簡単に言えば、作った事のある錬金薬なら何でもすぐに取り出せるってことかナ？」"
translation = "「물리적인 재료를 모두 아니마의 성력을 촉매로 생성할 수 있다타. 간단히 말하면 만들어 본 적 있는 연금약이라면 뭐든 즉시 꺼낼 수 있다는 거다타?」"

[[dialogue]]
speaker = "unk"
original = "……何でもありじゃないですか"
translation = "……뭐든 다 되는 거 아닙니까."

[[dialogue]]
speaker_original = "アニマ（覚醒）"
speaker_translation = "아니마(각성)"
original = "「フヒヒ、ギガンドムとやら！\u3000さっきのお礼がてら、仕返しをさせてもらうヨ！」"
translation = "「후히히, 기간돔인가 뭔가 하는 놈! 방금 전의 답례로 복수를 해주겠다타!」"

[[dialogue]]
speaker_original = "アニマ（覚醒）"
speaker_translation = "아니마(각성)"
original = "「会長は今すぐアステラに行ケ！\u3000ここはアニマ１人で何とかすル！」"
translation = "「회장은 지금 당장 아스텔라로 가라다타! 여기는 아니마 혼자서 어떻게든 하겠다타!」"

[[dialogue]]
speaker = "unk"
original = "アナたちは任せてください！"
translation = "아나 일행은 맡겨주세요!"

[[dialogue]]
speaker = "unk"
original = "わかりました！"
translation = "알겠습니다!"

[[dialogue]]
speaker_original = "アニマ（覚醒）"
speaker_translation = "아니마(각성)"
original = "「フヒヒ！\u3000また会おう、会長！\u3000……さぁ、実験開始ダ──！！」"
translation = "「후히히! 또 보자다타, 회장! ……자, 실험 개시다타──!!」"

