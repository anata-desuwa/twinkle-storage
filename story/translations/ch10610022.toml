[[dialogue]]
speaker = "unk"
original = "第２話,思わぬところで意気投合,P"
translation = "제2화, 뜻밖의 곳에서 의기투합"

[[dialogue]]
speaker = "unk"
original = "一方、ネビュラ基地では──"
translation = "한편, 네뷸라 기지에서는──"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「こんにちは、キサナさん」"
translation = "「안녕하세요, 키사나 씨」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「チッ……またおまえかよ」"
translation = "「칫…… 또 너냐」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「コラプサーの皆さんがネビュラの指揮下に入りましたので、是非とも親睦を深めたいと思いまして」"
translation = "「콜랩서 여러분이 네뷸라의 지휘 하에 들어왔으니, 꼭 친목을 다지고 싶어서요」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「敵ならばコラプサーは脅威ですが、味方であれば頼もしい戦力になりますから。個人的にもキサナさんに興味がありまして……」"
translation = "「적이라면 콜랩서는 위협적이지만, 아군이라면 든든한 전력이 되니까요. 개인적으로도 키사나 씨에게 흥미가 있기도 하고요……」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「そういうのはいらねえよ。いつの間にかオマエらに協力する流れになってるが、慣れ合うつもりはねぇ」"
translation = "「그런 건 필요 없어. 어느새 너희에게 협력하는 흐름이 됐지만, 친하게 지낼 생각은 없다고」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「うふ、ふふふ……魔女や星騎士には見られないそのワイルドさ、魅力的ですね……<emoji=heart04>\u3000耳としっぽもとってもセクシーです<emoji=heart04>」"
translation = "「우후, 후후후…… 마녀나 성기사에게서는 볼 수 없는 그 와일드함, 매력적이네요……<emoji=heart04> 귀와 꼬리도 정말 섹시해요<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "（はぁ？\u3000ミリョクテキ？\u3000セクシー？\u3000こいつ何言ってやがる？）"
translation = "（하아? 매력적? 섹시? 이 자식 뭐라는 거야?）"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「第一、んなことしなくても裏切らねーよ。アタシは飯が食えればそれでいいんだ」"
translation = "「애초에 그런 거 안 해도 배신 안 해. 난 밥만 먹을 수 있으면 그걸로 충분해」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「でしたら今度、一緒にお食事でもいかがでしょう？\u3000腕によりをかけて料理をお作りしますよ」"
translation = "「그러시다면 이번에 같이 식사라도 어떠신가요? 솜씨를 발휘해서 요리를 만들어 드릴게요」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「もちろんレストランでも構いません。とっても美味しいお店を知っているんです」"
translation = "「물론 레스토랑이어도 상관없어요. 아주 맛있는 가게를 알고 있거든요」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「お、おお？\u3000でも足りなかったり、クソ不味かったら承知しねえからな」"
translation = "「오, 오오? 하지만 양이 부족하거나 더럽게 맛없으면 가만 안 둔다」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「ええ、ええ、ご心配なく。キサナさんを絶対にご満足させてみせますから」"
translation = "「네, 네, 걱정 마세요. 키사나 씨를 반드시 만족시켜 드릴 테니까요」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「マジか、大した自信じゃねえか。それなら肉がいい。血が滴るみてえなステーキだ」"
translation = "「진짜냐, 자신만만하구만. 그렇다면 고기가 좋아. 피가 뚝뚝 떨어지는 것 같은 스테이크다」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「かしこまりました。極上のステーキですね。お任せください」"
translation = "「알겠습니다. 극상의 스테이크군요. 맡겨주세요」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「お礼と言ってはなんですが……美味しいディナーにご招待した後、私はキサナ様を美味しくいただかせていただこうかと<emoji=heart04>」"
translation = "「답례라고 하긴 그렇지만…… 맛있는 저녁 식사에 초대한 뒤에, 제가 키사나 님을 맛있게 먹어치워 드릴까 해서요<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「あ？\u3000アタシなんざ食ってもうまかねえぞ？」"
translation = "「아? 나 같은 건 먹어도 맛없다고?」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「うふふ、キサナさんから滴る蜜は、どれほどの甘露でしょう……」"
translation = "「우후후, 키사나 씨에게서 떨어지는 꿀은 얼마나 달콤할까요……」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「無知な方に未知の快感を仕込む……想像するだけでゾクゾクしてしまいます……はぁん<emoji=heart04>」"
translation = "「무지한 분에게 미지의 쾌감을 주입한다…… 상상하는 것만으로도 소름이 돋아버리네요…… 하앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "（……なんだ、こいつ。ヤベェヤツか？）"
translation = "（……뭐야, 이 자식. 위험한 놈인가?）"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "（どんなに条件が良くても、こいつの話を鵜呑みにするのはヤベェって、アタシの直感がビンビンに反応してやがる……！）"
translation = "（아무리 조건이 좋아도 이 자식 말을 곧이곧대로 믿는 건 위험하다고 내 직감이 팍팍 반응하고 있어……!）"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「ふふふ、マリオンさん、なかなかいいところに目を付けましたね」"
translation = "「후후후, 마리온 씨, 꽤 좋은 곳에 눈독을 들이셨네요」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「あら、ヴァレリーさん。あなたもネビュラにご助力願えるのですよね？」"
translation = "「어머, 발레리 씨. 당신도 네뷸라에 힘을 보태주시는 거죠?」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「そうですね。欲を貪る快楽の宴──そこに私も加わらせていただけるのでしたら」"
translation = "「그렇죠. 욕망을 탐하는 쾌락의 연회── 그곳에 저도 끼워주신다면 말이죠」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「食以外の快楽に目覚めたキサナさんが、果たしてどのような可愛らしい鳴き声をあげるのか……非常に興味があります、ふふ<emoji=heart04>」"
translation = "「식욕 이외의 쾌락에 눈뜬 키사나 씨가 과연 어떤 귀여운 울음소리를 낼지…… 무척 흥미롭네요, 후후<emoji=heart04>」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「まあまあ、ヴァレリーさん、話が合いますね。ふふふ<emoji=heart04>」"
translation = "「어머어머, 발레리 씨, 말이 잘 통하네요. 후후후<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「お、おい、テメエら、アタシそっちのけでなに意気投合してやがんだ。ろくでもねえ話ってことだけはわかるけどよ」"
translation = "「어, 어이, 네놈들, 나만 따돌리고 뭘 의기투합하고 자빠졌냐. 거지 같은 이야기라는 것만은 알겠다만」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「では、少しだけつまみ食いなど<emoji=heart04>」"
translation = "「그럼, 조금만 맛보기라도<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「それも一興ですね。少々お行儀が悪いですが、だからこそ背徳の味が──」"
translation = "「그것도 흥미롭겠군요. 조금 예의가 없긴 하지만, 그렇기에 배덕의 맛이──」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ちょ、待て！\u3000アタシに何するつもり──」"
translation = "「잠, 잠깐! 나한테 무슨 짓을 하려는──」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「だめーっ！」"
translation = "「안 돼!」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「うおっ！？」"
translation = "「우옷!?」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「きゃんっ！」"
translation = "「꺄앙!」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「おおっと。危ないじゃないですか、レイラ。こんな狭いところでブラックホールを出さないでください」"
translation = "「오 이런. 위험하잖아요, 레이라. 이런 좁은 곳에서 블랙홀을 꺼내지 마세요」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「危うく私までマリオンさん諸共、存在を抹消されるところでしたよ」"
translation = "「하마터면 저까지 마리온 씨와 함께 존재가 말소될 뻔했잖아요」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「だって、ヴァレリーも魔女さんも、キサナに……その、エ、エッチなことをするつもりだったでしょう！？」"
translation = "「그치만 발레리도 마녀님도 키사나한테…… 그, 에, 에로틱한 짓을 하려 했잖아!」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「んなっ！？\u3000テメエら、こんなとこで何考えてやがんだっ！？」"
translation = "「뭐랏!? 너희들 이런 데서 무슨 생각을 하는 거야!?」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「まあまあ、エッチだなんて心外です。私はただキサナさんを美味しいお食事にご招待していただけですよ。肉汁溢れる美味しいステーキ、食べに行きましょうね<emoji=heart04>」"
translation = "「어머어머, 야하다니 섭섭해요. 전 그저 키사나 씨를 맛있는 식사에 초대했을 뿐이랍니다. 육즙 가득한 맛있는 스테이크, 먹으러 가자고요<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「お、おう……」"
translation = "「어, 어어……」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「ヴァレリーさんと気が合いそうなのは幸運でした。今度また改めて、お食事に誘わせていただきますね」"
translation = "「발레리 씨와 마음이 맞을 것 같아 다행이네요. 다음에 다시 정식으로 식사에 초대할게요」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「私がマリオンさんに美味しくいただかれてしまいそうですね。ですが、それもまたやぶさかではありません、ふふふ<emoji=heart04>」"
translation = "「제가 마리온 씨에게 맛있게 먹혀버릴지도 모르겠네요. 하지만 그것 또한 나쁘지 않죠, 후후후<emoji=heart04>」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「もう！\u3000そういうのはダメです～っ！」"
translation = "「정말! 그런 건 안 된다니까요~!」"

[[dialogue]]
speaker = "unk"
original = "マリオンは本人と見分けがつかない人形を各所に配置しており、本体がどこにいるかはマリオン自身にしか分からない。"
translation = "마리온은 본인과 구분이 가지 않는 인형을 곳곳에 배치해두어, 본체가 어디에 있는지는 마리온 자신밖에 모른다."

[[dialogue]]
speaker = "unk"
original = "しかし本体だろうと人形だろうと、どこにいようとも、その奔放さは変わらないのだった。"
translation = "하지만 본체든 인형이든, 어디에 있든 그 자유분방함은 변하지 않는 것이었다."

