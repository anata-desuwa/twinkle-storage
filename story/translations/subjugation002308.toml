[[dialogue]]
speaker = "unk"
original = "――牛魔王の力を模したモンスターの強さは伊達ではなく、戦いは他の星騎士たちが救援に駆けつけてもなお、長引く程に壮絶なものとなった。"
translation = "──우마왕의 힘을 본뜬 몬스터의 강함은 허풍이 아니었고, 싸움은 다른 성기사들이 구원을 달려왔음에도 불구하고 길어질 정도로 처절한 것이 되었다."

[[dialogue]]
speaker = "unk"
original = "そうしてようやく……牛魔王は地に膝を着き、動きが止まる。"
translation = "그렇게 겨우…… 우마왕은 지면에 무릎을 꿇고 움직임이 멈춘다."

[[dialogue]]
speaker_original = "牛魔王"
speaker_translation = "우마왕"
original = "「グウゥ……！」"
translation = "「구우우……!」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「牛魔王……終わりだ」"
translation = "「우마왕…… 끝이다」"

[[dialogue]]
speaker = "unk"
original = "紅明が牛魔王の前へと歩み寄る。"
translation = "코우메이가 우마왕 앞으로 다가간다."

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「今回倒したとしても、アンタはこれからもまた、リクリエのモンスターとして何度も現れるのかもしれない」"
translation = "「이번에 쓰러뜨린다고 해도 당신은 앞으로도 리크리에의 몬스터로서 몇 번이고 나타날지도 몰라」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「だけど――その時はアタシが何度でも倒してみせる。現代に生まれ変わった、牛魔王の娘として」"
translation = "「하지만── 그때마다 내가 몇 번이고 쓰러뜨려 주겠어. 현대에 다시 태어난 우마왕의 딸로서」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「それに……アンタは偽物の魔王だ。だから」"
translation = "「게다가…… 당신은 가짜 마왕이야. 그러니까」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「現代に生まれ変わった本物の魔王には、絶対に勝てないよ」"
translation = "「현대에 다시 태어난 진짜 마왕에게는 절대 이길 수 없다구」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「――吹き荒れろ！\u3000芭蕉扇、羅刹のごとく！」"
translation = "「──몰아쳐라! 파초선, 나찰과 같이!」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「元気大爆風！！！」"
translation = "「활력 대폭풍!!!」"

[[dialogue]]
speaker = "unk"
original = "紅明が芭蕉扇を勢いよく振り下ろす。"
translation = "코우메이가 파초선을 힘차게 휘두른다."

[[dialogue]]
speaker = "unk"
original = "その瞬間、牛魔王に向けて凄まじい突風が吹き荒れる。"
translation = "그 순간 우마왕을 향해 어마어마한 돌풍이 몰아친다."

[[dialogue]]
speaker = "unk"
original = "芭蕉扇はただ強い風を起こすというだけの武器ではない。"
translation = "파초선은 단순히 강한 바람을 일으키기만 하는 무기가 아니다."

[[dialogue]]
speaker = "unk"
original = "その能力は、火焔山の業火を消してみせたという西遊記の伝説にもある通り、『あらゆる力を吹き飛ばす』というもの。"
translation = "그 능력은 화염산의 업화를 꺼뜨렸다는 서유기의 전설에도 있듯이 『모든 힘을 날려버린다』는 것."

[[dialogue]]
speaker = "unk"
original = "そして、それはもちろん――リクリエの力であっても例外ではない。"
translation = "그리고 그것은 물론── 리크리에의 힘이라 해도 예외는 아니다."

[[dialogue]]
speaker_original = "牛魔王"
speaker_translation = "우마왕"
original = "「グオオオォォォ―――ッ！！？」"
translation = "「구오오오오오──!!?」"

[[dialogue]]
speaker = "unk"
original = "小さくなった蝋燭の火が吹き消されるように、リクリエの力で構成された牛魔王の体が揺らめいて、消滅していく。"
translation = "작아진 촛불이 불어 꺼지듯이 리크리에의 힘으로 구성된 우마왕의 몸이 일렁이며 소멸해 간다."

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「あばよ、親父殿……」"
translation = "「잘 가라, 아버지……」"

[[dialogue]]
speaker = "unk"
original = "果たして、後にＳＳランク指定される大型モンスター『牛魔王』は、現代に生まれ変わった娘の手によって討たれたのであった。"
translation = "마침내 훗날 SS랭크로 지정되는 대형 몬스터 『우마왕』은 현대에 다시 태어난 딸의 손에 의해 토벌되었다."

[[dialogue]]
speaker = "unk"
original = "俺は彼女のところへ歩み寄ると、頭に手を置いて――労わるように撫でる。"
translation = "나는 그녀에게 다가가 머리에 손을 얹고── 위로하듯 쓰다듬는다."

[[dialogue]]
speaker = "unk"
original = "お疲れ様。紅明"
translation = "수고했어. 코우메이"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「……うん。ダーリンもね♪」"
translation = "「…… 응. 달링도 말야♪」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「ねーねー、終わったね」"
translation = "「언니, 끝났네」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「うん。クーちんもありがと♪」"
translation = "「응. 쿠셴도 고마워♪」"

[[dialogue]]
speaker = "unk"
original = "それから、紅明は誰よりも元気な笑顔を浮かべて見せると──"
translation = "그러고 나서 코우메이는 누구보다 활기찬 미소를 지어 보이고는──"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「……さあ！\u3000みんなで学園に帰って、祝杯をあげよっか☆\u3000ウェ～イ♪」"
translation = "「…… 자! 다 같이 학원으로 돌아가서 축배를 들까☆ 웨이~♪」"

[[dialogue]]
speaker = "unk"
original = "救援に来てくれた星騎士たち１人１人のところへお礼に行き、ハイタッチを交わす。"
translation = "구원하러 와준 성기사들 한 명 한 명에게 가서 감사를 표하며 하이파이브를 나눈다."

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「ねぇ、にーにー」"
translation = "「저기, 오빠」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「――ねーねーはやっぱり、強いヒトだね」"
translation = "「──언니는 역시 강한 사람이네」"

[[dialogue]]
speaker = "unk"
original = "ああ、『大人』だな"
translation = "아아, 『어른』이구나"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「ま、今回はボクのおかげでもあるけどね～！\u3000ウキキ♪」"
translation = "「뭐, 이번엔 내 덕분이기도 하지만 말야! 우키키♪」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「あっ♪\u3000もうっ。くすぐったいってば、にーにーっ♪\u3000ボクもう、頭ナデナデされて喜ぶほど小さい子供じゃないんだから、やめてよね～！\u3000えへへへぇ♪」"
translation = "「앗♪ 정말. 간지럽다니까, 오빠♪ 나 이제 머리 쓰담쓰담 받고 좋아할 만큼 작은 아이 아니니까 그만하라니까~! 에헤헤헤♪」"

[[dialogue]]
speaker = "unk"
original = "感謝を込めてクーシェンの頭も撫でてあげると、彼女は憎まれ口を叩きながらも、口元は嬉しそうにほころばせるのだった。"
translation = "감사를 담아 쿠셴의 머리도 쓰다듬어 주자, 그녀는 싫은 소리를 하면서도 입가에는 기쁜 듯 미소를 띠었다."

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「みんな、飲み物は持ったかな～？」"
translation = "「모두 음료수는 챙겼나~?」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「は～い♪」"
translation = "「네~♪」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「よ～し、それじゃあ――」"
translation = "「좋아, 그럼──」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「カンパ～イ！」"
translation = "「건배!」"

[[dialogue]]
speaker_original = "生徒たち"
speaker_translation = "학생들"
original = "「カンパ～イ！！！」"
translation = "「건배!!!」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「カンパ～イ！」"
translation = "「건배!」"

[[dialogue]]
speaker = "unk"
original = "学園に帰還した俺たちは紅明の『祝杯』の宣言通り、牛魔王討伐のお疲れ様会を開催することになった。"
translation = "학원에 귀환한 우리들은 코우메이의 『축배』 선언대로 우마왕 토벌 수고했어 파티를 개최하게 되었다."

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「あのさ、ダーリン」"
translation = "「있잖아, 달링」"

[[dialogue]]
speaker = "unk"
original = "何気ない話をしている途中、紅明がふと、いつもより少しだけ真剣な顔つきになった。"
translation = "이런저런 이야기를 하던 도중 코우메이가 문득 평소보다 조금 더 진지한 표정이 되었다."

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「アステラが出現する前にさ、悟空の記憶が戻らなくて寂しくないか、って聞いてくれたじゃん？」"
translation = "「아스텔라가 나타나기 전에 말야, 오공의 기억이 돌아오지 않아서 외롭지 않냐고 물어봐 줬잖아?」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「あの話の続きなんだけど……」"
translation = "「그 이야기의 뒷부분인데……」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「『寂しくない』って言ったらさ……やっぱり嘘になっちゃうんだよね」"
translation = "「『외롭지 않다』고 하면…… 역시 거짓말이 돼버린단 말이지」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「長い旅を共にした仲間だったからね。現代に生まれ変わってから、もしかしたら悟空たちにまた会えるのかもって……ずっと、期待してた」"
translation = "「긴 여행을 함께한 동료였으니까. 현대에 다시 태어나고 나서 어쩌면 오공 일행을 다시 만날 수 있을지도 모른다고…… 계속 기대했었어」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「でも、前世の最後にさ……アタシ、悟空とはちゃんとお別れしてるんだよね。今までずっとありがとうって」"
translation = "「하지만 전생의 마지막에 말야…… 나, 오공이랑은 제대로 작별 인사를 했거든. 지금까지 고마웠다고」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「だから……悔いはないんだ。悟空とは元気に笑顔でお別れをしたんだよ」"
translation = "「그러니까…… 후회는 없어. 오공과는 건강하게 웃으면서 작별을 했으니까」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「それに、記憶がなくたって――今こうして、クーちんと出会って、また仲良くなれた」"
translation = "「게다가 기억이 없어도── 지금 이렇게 쿠셴과 만나서 다시 사이좋아졌잖아」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「しかも、今度は可愛い年下の後輩になって！\u3000それってさ、むしろアドじゃん？」"
translation = "「심지어 이번엔 귀여운 연하 후배가 됐고! 그거 완전 이득 아냐?」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「それに今のアタシはもう、紅孩児じゃなくて、牛紅明だから」"
translation = "「게다가 지금의 나는 이제 홍해아가 아니라 규우 코우메이니까」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「今を楽しんで生きるよ」"
translation = "「지금 이 순간을 즐겁게 살아갈 거야」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「今、隣にいる――ダーリンと一緒にね☆」"
translation = "「지금 곁에 있는── 달링이랑 같이 말야☆」"

[[dialogue]]
speaker = "unk"
original = "自分に言い聞かせるように、口角をあげて、うんうんと頷いて見せる紅明。"
translation = "스스로에게 타이르듯이 입꼬리를 올리며 응응 하고 고개를 끄덕여 보이는 코우메이."

[[dialogue]]
speaker = "unk"
original = "そんな彼女の頭を、俺はもう１度、優しく撫でる。"
translation = "그런 그녀의 머리를 나는 다시 한번 상냥하게 쓰다듬는다."

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「にーにー！\u3000ねーねー！\u3000２人ともなんの話してるの～？」"
translation = "「오빠! 언니! 둘이서 무슨 이야기 하는 거야~?」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ん？\u3000クーちんとこうして出会えて、最高にハッピーだって話さ☆」"
translation = "「응? 쿠셴이랑 이렇게 만날 수 있어서, 최고로 해피하다는 이야기였어☆」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「んふふ～♪\u3000そうでしょ～？\u3000ボクってば、カッコ可愛いし、強いしね～☆\u3000えへへへぇ♪」"
translation = "「으후후~♪ 그쵸~? 나란 녀석은, 멋지고 귀여운 데다 강하니까 말야~☆ 에헤헤헤♪」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「うんうん！\u3000今日は星騎士の初仕事ですごく頑張ったから、ねーねーいっぱい頭撫でて褒めちゃうぞ～☆」"
translation = "「응응! 오늘은 성기사의 첫 임무라서 엄청 열심히 했으니까, 언니가 머리 잔뜩 쓰다듬으면서 칭찬해 줄게~☆」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ほれほれ～♪\u3000うしし☆」"
translation = "「자자~♪ 우시시☆」"

[[dialogue]]
speaker = "unk"
original = "そうして、いつもよりちょっぴり大人な笑顔で、クーシェンとじゃれ合う紅明なのであった――"
translation = "그렇게, 평소보다 조금 더 어른스러운 미소로 쿠셴과 장난을 치는 코우메이였다──"

