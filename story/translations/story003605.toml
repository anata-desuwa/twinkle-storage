[[dialogue]]
speaker = "unk"
original = "シズハが『覚醒フォームになりたい』と宣言してから、１週間が経った。"
translation = "시즈하가 『각성 폼이 되고 싶다』고 선언한 지 1주일이 지났다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「会長……もう１度、手合わせをお願い！」"
translation = "「회장…… 한 번 더, 대련 부탁해!」"

[[dialogue]]
speaker = "unk"
original = "わかった――行くぞ！"
translation = "알았다―― 간다!"

[[dialogue]]
speaker = "unk"
original = "仮想結界システムで再現された『フィーニスの塔』の頂上――俺とシズハはそこで、戦闘訓練を行っていた。"
translation = "가상 결계 시스템으로 재현된 『피니스의 탑』 정상―― 나와 시즈하는 그곳에서 전투 훈련을 하고 있었다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「よしっ……ディーちゃん、タイミングを合わせて、一緒に行くよ！」"
translation = "「좋아…… 디짱, 타이밍 맞춰서 같이 가는 거야!」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「また？\u3000はぁ……やれやれ」"
translation = "「또? 하아…… 이런이런」"

[[dialogue]]
speaker = "unk"
original = "シズハと共に、ディーラックが連携して攻め込んでくる。"
translation = "시즈하와 함께, 디럭쿠가 연계하여 공격해온다."

[[dialogue]]
speaker = "unk"
original = "１週間前――シズハが俺たちに相談してきた日。"
translation = "1주일 전―― 시즈하가 우리에게 상담해온 날."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「トレジアンナさん。次にエントロフィーちゃんが『反転のロストアイテム』を使ってきた時の為に……私、考えたことがあるの」"
translation = "「트레지안나 씨. 다음에 엔트로피짱이 『반전의 로스트 아이템』을 써올 때를 위해서…… 나, 생각해둔 게 있어」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「私の中の聖杯ちゃんが持っている魔力と、ディーちゃんの扱えるマイナスエネルギー」"
translation = "「내 안의 성배짱이 가진 마력과, 디짱이 다룰 수 있는 마이너스 에너지」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「この２つの力を、サチちゃんの『フォルトゥーナフォーム』みたいに、『融合』して使えないかな？」"
translation = "「이 두 힘을, 사치짱의 『포르투나 폼』처럼 『융합』해서 쓸 수 없을까?」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「は！？\u3000いきなり何言い出してんのサ、シズハちゃん！」"
translation = "「하!? 갑자기 무슨 소릴 하는 거야, 시즈하짱!」"

[[dialogue]]
speaker = "unk"
original = "姿を透明化させて横で聞いていたらしいディーラックが、驚いて出てくる。"
translation = "모습을 투명화시켜 옆에서 듣고 있었던 듯한 디럭쿠가 놀라며 튀어나온다."

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ふむ……魔力とマイナスエネルギーで融合反応が成立すれば、確かに『反転のロストアイテム』の効果を防ぐことができるかもしれません」"
translation = "「흠…… 마력과 마이너스 에너지로 융합 반응이 성립된다면, 확실히 『반전의 로스트 아이템』 효과를 막을 수 있을지도 모릅니다」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「実際にこの前、ディーラックさんはマイナスエネルギーのフィールドで、エントロフィーさんの接触を防いでいましたから」"
translation = "「실제로 얼마 전, 디럭쿠 씨는 마이너스 에너지 필드로 엔트로피 씨의 접촉을 막았으니까요」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ですが……それが本当に可能かどうかは、マイナスエネルギーを使うことのできるディーラックさんにしかわかりません」"
translation = "「하지만…… 그것이 정말 가능할지는, 마이너스 에너지를 쓸 수 있는 디럭쿠 씨만이 알 수 있습니다」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「……不可能ではないだろうね。マイナスエネルギーは計測されないエネルギーだ。魔力と干渉せず、両立はできる」"
translation = "「……불가능하진 않겠지. 마이너스 에너지는 계측되지 않는 에너지다. 마력과 간섭하지 않고 양립할 수 있어」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「じゃあ、行けるかもしれないってことだよね！」"
translation = "「그럼, 될지도 모른다는 거네!」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「……問題はそこじゃない」"
translation = "「……문제는 그게 아냐」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「魔力とマイナスエネルギーをかけ合わせるってことは、ボクとシズハちゃんが二人三脚するようなものサ。息が合わなきゃ、当然成立しない」"
translation = "「마력과 마이너스 에너지를 결합한다는 건, 나랑 시즈하짱이 2인 3각을 하는 것과 같아. 호흡이 맞지 않으면 당연히 성립되지 않아」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「ボクには……それができるとは思えないよ」"
translation = "「나한테는…… 그게 가능하리라 생각되지 않아」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「え？\u3000どうして？\u3000私とディーちゃんなら、できるよ！」"
translation = "「에? 어째서? 나랑 디짱이라면 할 수 있어!」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「だって――私とディーちゃんは友達だもん♪」"
translation = "「그야―― 나랑 디짱은 친구인걸♪」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "そうして、ディーラックと精神をリンクさせる機能を組み込んだ、シズハのアップデート戦闘服が完成した。"
translation = "그렇게 해서, 디럭쿠와 정신을 링크시키는 기능을 접목한 시즈하의 업데이트 전투복이 완성되었다."

[[dialogue]]
speaker = "unk"
original = "見た目こそ変化はないが、これでディーラックと連携しての戦闘が可能になった――はずなのだが。"
translation = "겉모습은 변화가 없지만, 이것으로 디럭쿠와 연계한 전투가 가능해졌다――졌을 터인데."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「はぁ……はぁ……！」"
translation = "「하아…… 하아……!」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「……また失敗だね」"
translation = "「……또 실패네」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「あのさ、シズハちゃん……やっぱり無理なんじゃない？\u3000マイナスエネルギーの気配は、人間には感じ取れない」"
translation = "「있지, 시즈하짱…… 역시 무리 아냐? 마이너스 에너지의 기척은 인간은 감지할 수 없어」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「確かに、マイナスエネルギーの感覚は全然掴めないけど……ディーちゃんと心が繋がっているのはわかるから」"
translation = "「확실히 마이너스 에너지의 감각은 전혀 모르겠지만…… 디짱이랑 마음이 이어져 있는 건 아니까」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「会長、どう？\u3000『アルケインコード』の輝きは、見える？」"
translation = "「회장, 어때? 『아케인 코드』의 빛은 보여?」"

[[dialogue]]
speaker = "unk"
original = "いや……まだだ"
translation = "아니…… 아직이다"

[[dialogue]]
speaker = "unk"
original = "トレジアンナさんによってシズハの戦闘服に組み込まれた、覚醒フォームに変身時の動力源となる『融合反応炉心』。"
translation = "트레지안나 씨에 의해 시즈하의 전투복에 내장된, 각성 폼 변신 시의 동력원이 될 『융합 반응 노심』."

[[dialogue]]
speaker = "unk"
original = "それはサチのフォルトゥーナフォームの時と同じく、俺が使う魔王の力――アルケインコードの使用が、最後の起動条件となっていた。"
translation = "그것은 사치의 포르투나 폼 때와 마찬가지로, 내가 사용하는 마왕의 힘―― 아케인 코드의 사용이 마지막 기동 조건이었다."

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「……ボクとの連携も、会長との絆も、上手くいく保証なんてどこにもないのに……」"
translation = "「……나와의 연계도, 회장과의 유대도, 잘될 거란 보장 같은 건 어디에도 없는데……」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「シズハちゃんさ……本当にできると思ってんの？」"
translation = "「시즈하짱…… 정말 할 수 있다고 생각해?」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「ボクたちの間にもまるで『絆』があるみたいに言うけどサ、ボクはこの前まで、キミたちと敵対していたんだよ？」"
translation = "「우리 사이에도 마치 『유대』가 있는 것처럼 말하지만 말야, 난 얼마 전까지만 해도 너희와 적대하고 있었다고?」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「でも……それは私の中の聖杯を直す為で、ディーちゃんは私の命を助けてくれたでしょ？」"
translation = "「하지만…… 그건 내 안의 성배를 고치기 위해서였고, 디짱은 내 목숨을 구해줬잖아?」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「今だって、寮の部屋で一緒に暮らしてるわけだし……」"
translation = "「지금도 기숙사 방에서 같이 살고 있기도 하고……」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「だから、私はディーちゃんのことを信じるよ」"
translation = "「그러니까, 나는 디짱을 믿어」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「あのサ、前も言ったけど……あれは牛とか、豚とか、そういう利用価値のある『家畜』が病気になったから、治そうと思ったって理屈」"
translation = "「있지, 전에도 말했지만…… 그건 소나 돼지 같은 이용 가치가 있는 『가축』이 병에 걸렸으니까 고치려고 했다는 논리야」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「わかってる？\u3000ボクがシズハちゃんを見る目と、キミがボクを見る目とは、決して同じじゃないって言ってるんだよ？」"
translation = "「알겠어? 내가 시즈하짱을 보는 눈과, 네가 나를 보는 눈은 결코 같지 않다고 말하는 거야」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「ボクには……キミたちが言うような『愛』だとか、『友情』だとか、『絆』なんてものは、よくわからない」"
translation = "「나한테는…… 너희가 말하는 『사랑』이라든가 『우정』이라든가 『유대』 같은 건 잘 모르겠어」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「だってボクは――キミたちとは体だけじゃなく、<b>精神構造</b>が異なるエネルギー生命体なんだから」"
translation = "「그야 나는―― 너희와는 몸뿐만 아니라 <b>정신</b> <b>구조</b>가 다른 에너지 생명체니까」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「ディーちゃん……」"
translation = "「디짱……」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「ふん……」"
translation = "「흥……」"

[[dialogue]]
speaker = "unk"
original = "そう言って、ディーラックはフイッとシズハから視線を逸らすのだった。"
translation = "그렇게 말하며, 디럭쿠는 휙 하고 시즈하로부터 시선을 돌렸다."

[[dialogue]]
speaker = "unk"
original = "一方、その頃。"
translation = "한편, 그 무렵."

[[dialogue]]
speaker = "unk"
original = "仮想空間の『遊園地』フィールドでは、サチとプリムラが訓練中だった。"
translation = "가상 공간의 『유원지』 필드에서는 사치와 프리뮬라가 훈련 중이었다."

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ふぅ……プリムラ、今のはどうだった？」"
translation = "「후우…… 프리뮬라, 방금 건 어땠어?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ふん、まだまだじゃな！\u3000しかし――」"
translation = "「흥, 멀었도다! 하지만――」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「お２人共、１５分経過しましたよ～！」"
translation = "「두 분 모두, 15분 경과했어요~!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「あっ、はい！\u3000暴走しないように、一旦クールダウンに入ります」"
translation = "「앗, 네! 폭주하지 않도록 일단 쿨다운 들어갈게요」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「なんじゃ、もう経過したのか？\u3000仕方あるまい」"
translation = "「뭐냐, 벌써 지났느냐? 어쩔 수 없지」"

[[dialogue]]
speaker_original = "エントロフィー"
speaker_translation = "엔트로피"
original = "「いやはや、さすがアネさんたちっすね～♪\u3000力が反転させられた状態でも、変身して戦えるようになるなんて～！」"
translation = "「이야~ 역시 누님들임다~♪ 힘이 반전된 상태에서도 변신해서 싸울 수 있게 되다니~!」"

[[dialogue]]
speaker_original = "エントロフィー"
speaker_translation = "엔트로피"
original = "「あっ、差し入れでスポーツドリンク持ってきました～♪\u3000はい、トレジアンナのアネさんもどうぞ♪」"
translation = "「앗, 보급품으로 스포츠음료 가져왔슴다~♪ 자, 트레지안나 누님도 드십쇼♪」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「おっ、私もいいんですか？\u3000ありがとうございます～♪」"
translation = "「오, 저도 괜찮나요? 감사합니다~♪」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「って、トレジアンナさん、ストップスト～ップ！\u3000タッチしちゃダメです～っ！！」"
translation = "「잠깐, 트레지안나 씨, 스톱 스토~옵! 터치하면 안 돼요!!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「そいつは敵じゃ！！」"
translation = "「그놈은 적이니라!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「――ハッ！？\u3000危うく、私も力を反転させられるところでした！」"
translation = "「――핫!? 하마터면 저도 힘을 반전당할 뻔했네요!」"

[[dialogue]]
speaker_original = "エントロフィー"
speaker_translation = "엔트로피"
original = "「ありゃりゃ、しれっとタッチしたかったんすけど、作戦失敗っす～☆」"
translation = "「이런이런, 슬쩍 터치하고 싶었슴다만 작전 실패임다~☆」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「貴様、何しに来たのじゃ！？」"
translation = "「네 이놈, 무엇 하러 왔느냐!?」"

[[dialogue]]
speaker_original = "エントロフィー"
speaker_translation = "엔트로피"
original = "「ふふっ♪\u3000そりゃもちろん、お２人があれからどうなったか、様子を拝見させてもらいに来たんすよ～♪」"
translation = "「후훗♪ 그어야 물론, 두 분이 그 뒤로 어떻게 됐나 구경하러 왔슴다~♪」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「エントロフィーさん！\u3000私たちにかけた『反転のロストアイテム』の能力を解除して下さい！」"
translation = "「엔트로피 씨! 우리에게 건 『반전의 로스트 아이템』 능력을 해제해 주세요!」"

[[dialogue]]
speaker_original = "エントロフィー"
speaker_translation = "엔트로피"
original = "「いや～、それは残念ながら、まだできないっすね～」"
translation = "「이야~ 그건 아쉽게도 아직 안 되겠슴다~」"

[[dialogue]]
speaker_original = "エントロフィー"
speaker_translation = "엔트로피"
original = "「だって、このまま大人しく解除とか――そんなの全然面白くないでしょ？」"
translation = "「그야 이대로 얌전히 해제라니―― 그런 건 전혀 재미없지 않슴까?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ふざけおって……なら、やはり力づくで、ロストアイテムを回収するしかないようじゃな！」"
translation = "「까불기는…… 그렇다면 역시 힘으로 로스트 아이템을 회수하는 수밖에 없겠구나!」"

[[dialogue]]
speaker_original = "エントロフィーL"
speaker_translation = "엔트로피L"
original = "「きゃはははっ☆\u3000当然、そういう展開になるっすよね～♪\u3000では――」"
translation = "「캬하하핫☆ 당연히 그런 전개가 돼야 함다~♪ 그럼――」"

[[dialogue]]
speaker_original = "エントロフィーL"
speaker_translation = "엔트로피L"
original = "「反転したアネさんたちの力、見せてもらいましょうかね！」"
translation = "「반전된 누님들의 힘, 구경 좀 하겠슴다!」"

[[dialogue]]
speaker = "unk"
original = "体から目に見える程のマイナスエネルギーのオーラを立ち昇らせるエントロフィー。"
translation = "몸에서 눈에 보일 정도의 마이너스 에너지 오라를 뿜어내는 엔트로피."

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「お２人共、気を付けて下さい！\u3000マイナスビーストであるエントロフィーさんのエネルギー総量は、ディーラックさんと同じく、桁違いですよ！」"
translation = "「두 분 모두 조심하세요! 마이너스 비스트인 엔트로피 씨의 에너지 총량은 디럭쿠 씨와 마찬가지로 격이 달라요!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「はい！\u3000行きます！」"
translation = "「네! 갑니다!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「我らの訓練の成果、見せてやるのじゃ！」"
translation = "「우리 훈련의 성과를 보여주마!」"

[[dialogue]]
speaker = "unk"
original = "サチとプリムラは構えて、エントロフィーと戦闘を開始するのだった。"
translation = "사치와 프리뮬라는 자세를 잡고 엔트로피와 전투를 개시했다."

