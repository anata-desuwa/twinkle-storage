[[dialogue]]
speaker = "unk"
original = "第１４話,第一階層・終点,B"
translation = "제14화, 제1계층・종점, B"

[[dialogue]]
speaker = "unk"
original = "今から９年前の夏──それは、俺が覚えている限り最古に近い記憶だ。"
translation = "지금으로부터 9년 전 여름── 그것은 내가 기억하는 한 가장 오래된 기억에 가깝다."

[[dialogue]]
speaker = "unk"
original = "緋宮クロトにそれより過去の思い出は一切ない。だからこそ、あの少女との出会いは印象的だった……。"
translation = "히노미야 쿠로토에게는 그보다 과거의 추억은 일절 없다. 그렇기에, 그 소녀와의 만남은 인상적이었다……."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ちなみにその時もうドラ猫はいたの？」"
translation = "「참고로 그때 벌써 드라네코는 있었어?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「その時はまだいなかったな」"
translation = "「그때는 아직 없었지」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「ドラ猫とは何ニャン！\u3000ワガハイはフィオナ嬢第一の家臣にして神聖なる猫の化身……」"
translation = "「드라네코는 뭐냥! 나 님은 피오나 양 제일의 가신이자 신성한 고양이의 화신……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「よーし、この調子でてっぺんまで突き進むわよ！」"
translation = "「좋ー아, 이 기세로 꼭대기까지 돌진하는 거야!」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「人の話を聞くニャン～！」"
translation = "「남의 말을 들으라냥~!」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「（人……？）」"
translation = "「(사람……?)」"

[[dialogue]]
speaker = "unk"
original = "それからしばらく。"
translation = "그리고 나서 잠시."

[[dialogue]]
speaker = "unk"
original = "俺たちは、順調にフィーニスの塔を昇り続けた。"
translation = "우리는 순조롭게 피니스의 탑을 계속 올라갔다."

[[dialogue]]
speaker = "unk"
original = "が……ある異常も訪れ始めていた。"
translation = "하지만…… 어떤 이상도 찾아오기 시작했다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「──っ」"
translation = "「──읏」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ヴィーナス！？」"
translation = "「비너스!?」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスがふらっと倒れそうになる。"
translation = "비너스가 비틀거리며 쓰러지려 한다."

[[dialogue]]
speaker = "unk"
original = "戦闘状態でもないのに、先ほどからこんな調子が続いているのだ。"
translation = "전투 상태도 아닌데, 아까부터 이런 상태가 계속되고 있는 것이다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ううん、平気……ありがと。クロト」"
translation = "「으응, 괜찮아…… 고마워. 쿠로토」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ただ……っ……ちょっと、頭痛がだんだん……強くなってて……」"
translation = "「다만……읏…… 조금, 두통이 점점…… 심해지고 있어서……」"

[[dialogue]]
speaker = "unk"
original = "額を抱え、苦悶の表情を浮かべるヴィーナス。"
translation = "이마를 감싸 쥐고, 고통스러운 표정을 짓는 비너스."

[[dialogue]]
speaker = "unk"
original = "ここに至るまで戦闘のダメージは大したことなかった。"
translation = "여기까지 오기까지 전투 피해는 별것 아니었다."

[[dialogue]]
speaker = "unk"
original = "俺より遥かに地力で優るヴィーナスが消耗しているとも思えない。"
translation = "나보다 훨씬 지력으로 뛰어난 비너스가 소모하고 있다고도 생각되지 않는다."

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「だ、大丈夫かニャ？\u3000あまり無理しないほうがいいニャ」"
translation = "「드, 괜찮은 거냥? 너무 무리하지 않는 게 좋겠냥」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……酸欠とかか？\u3000外が見えないからわからないが、結構な高所まで来てるはずだ」"
translation = "「……산소 부족 같은 건가? 밖이 안 보여서 모르겠지만, 꽤 높은 곳까지 왔을 것이다」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「フィーニスの塔は目算されているだけでも４０００階以上の層構造──果ては成層圏まで続いていると聞きます」"
translation = "「피니스의 탑은 어림잡아도 4000층 이상의 층 구조── 끝은 성층권까지 이어져 있다고 들었습니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「さすがにそこまで歩くのは骨が折れそうですが……」"
translation = "「과연 그곳까지 걷는 것은 뼈가 부러질 것 같습니다만……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ううん……違うの。そういうのじゃなくて……」"
translation = "「으응…… 아니야. 그런 게 아니라서……」"

[[dialogue]]
speaker = "unk"
original = "と──ヴィーナスが言葉を選ぼうとする最中だった。"
translation = "라고── 비너스가 말을 고르려 하는 중이었다."

[[dialogue]]
speaker = "unk"
original = "おいで……ヴィーナス……こちらへ……ふふ……いい子ね……その調子よ……"
translation = "오렴…… 비너스…… 이쪽으로…… 후후…… 착한 아이구나…… 그 기세대로……"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「────」"
translation = "「────」"

[[dialogue]]
speaker = "unk"
original = "彼女はふと、弾かれたように顔を上げた。"
translation = "그녀는 문득, 튕겨 나가듯이 얼굴을 들었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「どうした……？」"
translation = "「왜 그래……?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「い、今の──聞こえなかった！？\u3000私を呼んでる──女の人の声！」"
translation = "「이, 방금── 못 들었어!? 나를 부르는── 여자의 목소리!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「い、いえ……」"
translation = "「아, 아니요……」"

[[dialogue]]
speaker = "unk"
original = "はっと見開いてそう主張するヴィーナスだったが、俺たち３人と１匹にはまったく心当たりがなく。"
translation = "깜짝 놀라 눈을 크게 뜨고 그렇게 주장하는 비너스였지만, 우리 셋과 한 마리에게는 전혀 짐작 가는 바가 없었다."

[[dialogue]]
speaker = "unk"
original = "体調の悪さが災いした幻聴なのではと思うところだったが……"
translation = "몸 상태가 나쁜 것이 화를 부른 환청이 아닐까 생각했지만……"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「──このまま進むわ。やっぱり間違ってなかったのよ！\u3000さあ早く行きましょう！」"
translation = "「──이대로 나아갈 거야. 역시 틀리지 않았어! 자, 빨리 가자!」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「きゅ、急に元気になったニャ！？」"
translation = "「카, 갑자기 기운이 솟아났냥!?」"

[[dialogue]]
speaker = "unk"
original = "日誌を胸に抱き、彼女はそのままぐいぐい進んでいった。"
translation = "일지를 가슴에 안고, 그녀는 그대로 힘차게 나아갔다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「本当に大丈夫なのか──ヴィーナス？」"
translation = "「정말 괜찮은 건가── 비너스?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ええ」"
translation = "「응」"

[[dialogue]]
speaker = "unk"
original = "彼女は、自信満々にそう答えて……"
translation = "그녀는, 자신만만하게 그렇게 대답하고……"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「この先──塔の高みで──何かが私を、待ってる気がするの」"
translation = "「이 앞── 탑의 높은 곳에서── 무언가가 나를, 기다리고 있는 기분이 들어」"

[[dialogue]]
speaker = "unk"
original = "彼女の瞳に宿る──確たる意志。"
translation = "그녀의 눈동자에 깃든── 확고한 의지."

[[dialogue]]
speaker = "unk"
original = "こうなったらいざ止めようとしても聞かないだろう。"
translation = "이렇게 되었으니 막으려고 해도 듣지 않을 것이다."

[[dialogue]]
speaker = "unk"
original = "俺たちは、彼女へついていくように塔の攻略を進めた。"
translation = "우리는, 그녀를 따라가듯이 탑 공략을 진행했다."

[[dialogue]]
speaker = "unk"
original = "あの後。"
translation = "그 후."

[[dialogue]]
speaker = "unk"
original = "例の“声”とやらを認識したのち、実際に彼女の調子はめっきり良くなったらしく──"
translation = "그 “목소리”라는 것을 인식한 후, 실제로 그녀의 상태는 몰라보게 좋아진 듯하여──"

[[dialogue]]
speaker = "unk"
original = "数多ものガーディアンを退け、俺たちはゆうに２０以上のフロアを踏破していた。"
translation = "수많은 가디언을 물리치고, 우리는 20개 이상의 층을 거뜬히 돌파했다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「よーし♪\u3000この調子でまだまだ昇るわよー！」"
translation = "「좋ー아♪ 이 기세로 계속 올라가는 거야ー!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「！\u3000待ってください」"
translation = "「! 기다려 주십시오」"

[[dialogue]]
speaker = "unk"
original = "フィオナが足を止める。"
translation = "피오나가 발을 멈춘다."

[[dialogue]]
speaker = "unk"
original = "俺たちにもすぐ、その異変の正体は察せた。"
translation = "우리도 곧, 그 이변의 정체를 알아차릴 수 있었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「階段が────ない」"
translation = "「계단이──── 없어」"

[[dialogue]]
speaker = "unk"
original = "そう。"
translation = "그렇다."

[[dialogue]]
speaker = "unk"
original = "これまでフロアの終点に必ず位置していた、<b>次</b>へ繋がる階段がなかった。"
translation = "지금까지 층의 종점에 반드시 위치했던, <b>다음</b>으로 이어지는 계단이 없었다."

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「ニャニャ？\u3000ここが終点なのかニャ？」"
translation = "「냐냐? 여기가 종점인 거냥?」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「さすがにまだ、成層圏へ達したとは思えませんが……」"
translation = "「과연 아직, 성층권에 도달했다고는 생각되지 않습니다만……」"

[[dialogue]]
speaker = "unk"
original = "一体どういうことなのか──揃って周囲を見渡したその時。"
translation = "대체 무슨 일인지── 다 함께 주위를 둘러본 그때."

[[dialogue]]
speaker_original = "ガーディアン・オルサ"
speaker_translation = "가디언 오르사"
original = "「ギ……ギギ……ガガ、ゴゴ……侵入者・発見。目標・補足。脅威度・Ａト推定スル」"
translation = "「기…… 기기…… 가가, 고고…… 침입자・발견. 목표・포착. 위협도・A로 추정한다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「こいつは……！」"
translation = "「이 녀석은……!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「へえ……面白そうなのがいるじゃない」"
translation = "「헤에…… 재미있을 것 같은 게 있잖아」"

[[dialogue]]
speaker = "unk"
original = "その大きさも、発する殺気も……"
translation = "그 크기도, 내뿜는 살기도……"

[[dialogue]]
speaker = "unk"
original = "明らかにこれまでのガーディアンとは違う。"
translation = "분명히 지금까지의 가디언과는 다르다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「この階層の主──のようですね」"
translation = "「이 계층의 주인──인 것 같군요」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「暴走状態には違いないニャン。全員気をつけるニャン！」"
translation = "「폭주 상태임에는 틀림없냥. 전원 조심하는 거냥!」"

[[dialogue]]
speaker_original = "ガーディアン・オルサ"
speaker_translation = "가디언 오르사"
original = "「撃退モード展開。バトルフォーメーション・Ｃ。対象ノ生死問ワズ」"
translation = "「격퇴 모드 전개. 배틀 포메이션・C. 대상의 생사 불문」"

[[dialogue]]
speaker = "unk"
original = "けたたましい警報音が鳴るや、これまで倒してきた小型ガーディアンたちが援軍として招集される。"
translation = "요란한 경보음이 울리자, 지금까지 쓰러뜨렸던 소형 가디언들이 원군으로 소집된다."

[[dialogue]]
speaker = "unk"
original = "こちらを睥睨するレーダーが、殺気に満ちた眼を思わせた。"
translation = "이쪽을 쏘아보는 레이더가, 살기로 가득 찬 눈을 연상시켰다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「全員で迎え撃つぞ──！」"
translation = "「전원 맞서 싸운다──!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「任せなさい──！」"
translation = "「맡기렴──!」"

