[[dialogue]]
speaker = "unk"
original = "第４話,舞亜の星,P"
translation = "제4화, 마이아의 별"

[[dialogue]]
speaker = "舞亜"
original = "「あ、会長さん、こんにちは。実は相談したいことがあってね。ソフィが……」"
translation = "「아, 회장님, 안녕. 사실 상담하고 싶은 게 있어서 말이야. 소피가……」"

[[dialogue]]
speaker = "舞亜"
original = "『ねぇソフィ、ちょっと数学の課題でわからないところがあって……』"
translation = "『저기 소피, 잠깐 수학 과제에서 모르는 부분이 있어서……』"

[[dialogue]]
speaker = "ソフィア"
original = "『つーん』"
translation = "『쌩-』"

[[dialogue]]
speaker = "舞亜"
original = "『……ソフィ、なんか最近私に冷たくない？』"
translation = "『……소피, 왠지 요즘 나한테 차갑지 않아?』"

[[dialogue]]
speaker = "ソフィア"
original = "『舞亜さんは姉さんに会いたかったんですよね？\u3000じゃあ姉さんと仲良くすればいいじゃないですか』"
translation = "『마이아 씨는 언니를 만나고 싶었던 거죠? 그럼 언니랑 사이좋게 지내면 되잖아요』"

[[dialogue]]
speaker = "舞亜"
original = "「……って感じで、最近ソフィがご機嫌ナナメなんだよね。ソフィと仲良くなったのはお姉さんに近づくため、みたいに思われたみたいで」"
translation = "「……라는 느낌으로, 요즘 소피가 기분이 안 좋단 말이지. 소피랑 친해진 게 언니한테 접근하기 위해서였던 것처럼 생각하는 모양이라」"

[[dialogue]]
speaker = "舞亜"
original = "「確かにきっかけはお姉さんだったけど、ソフィは大事な友達なのに」"
translation = "「물론 계기는 언니였지만, 소피는 소중한 친구인데」"

[[dialogue]]
speaker = "unk"
original = "その気持ちを直接伝えればいい"
translation = "그 마음을 직접 전하면 돼"

[[dialogue]]
speaker = "舞亜"
original = "「そう……かな？」"
translation = "「그럴……까?」"

[[dialogue]]
speaker = "舞亜"
original = "「……うん、そうだよね。思ってることはちゃんと言わないと伝わらないよね。だから協力してくれる、会長さん？」"
translation = "「……응, 그렇네. 생각하는 건 제대로 말하지 않으면 전해지지 않지. 그러니까 협력해 줄래, 회장님?」"

[[dialogue]]
speaker = "ソフィア"
original = "「なんですか、会長さんから私に話って。珍しいですね」"
translation = "「뭔가요, 회장님이 저에게 할 말이 있다니. 드문 일이네요」"

[[dialogue]]
speaker = "舞亜"
original = "「ごめん、本当は話があるのは私なんだ」"
translation = "「미안, 사실 할 말이 있는 건 나야」"

[[dialogue]]
speaker = "ソフィア"
original = "「舞亜さんっ？\u3000これはどういう……」"
translation = "「마이아 씨!? 이건 어떻게 된……」"

[[dialogue]]
speaker = "舞亜"
original = "「最近あんまり話してくれなかったからさ、これくらいしないとダメかなって。……ちゃんと話を聞いてほしい。私、真剣だから」"
translation = "「최근에 별로 이야기를 안 해줬으니까, 이 정도는 안 하면 안 될 것 같아서. ……제대로 이야기를 들어줬으면 좋겠어. 나, 진지하니까」"

[[dialogue]]
speaker = "unk"
original = "俺からも頼む"
translation = "나도 부탁할게"

[[dialogue]]
speaker = "ソフィア"
original = "「……わかりました。そこまで言うなら、ちゃんとお聞きします」"
translation = "「……알겠습니다. 거기까지 말씀하신다면, 제대로 듣겠습니다」"

[[dialogue]]
speaker = "舞亜"
original = "「ありがとう、ソフィ」"
translation = "「고마워, 소피」"

[[dialogue]]
speaker = "舞亜"
original = "「どこから話していいかわからないんだけど……実は私、流星に入ったらフィギュアスケートやめようと思ってたんだ」"
translation = "「어디서부터 말해야 할지 모르겠지만…… 사실 나, 유성에 들어오면 피겨 스케이팅 그만두려고 했었어」"

[[dialogue]]
speaker = "ソフィア"
original = "「えっ」"
translation = "「엣」"

[[dialogue]]
speaker = "舞亜"
original = "「そもそも私、最初はフィギュアスケート好きじゃなかったしね」"
translation = "「애초에 나, 처음엔 피겨 스케이팅을 좋아하지 않았거든」"

[[dialogue]]
speaker = "ソフィア"
original = "「えええっ！？」"
translation = "「에에엣!?」"

[[dialogue]]
speaker = "舞亜"
original = "「誤解しないでほしいんだけど、フィギュアスケートが嫌いだったんじゃないよ。でも……前はそんなに好きじゃなかった」"
translation = "「오해하지 않았으면 좋겠는데, 피겨 스케이팅이 싫었던 건 아냐. 하지만…… 전엔 그렇게 좋아하지 않았어」"

[[dialogue]]
speaker = "舞亜"
original = "「母さんが元選手で、父さんもスポーツ関係の仕事だから、物心ついた時にはリンクで滑ってた」"
translation = "「엄마가 전직 선수였고, 아빠도 스포츠 관련 일을 하셔서, 정신을 차려보니 링크에서 미끄러지고 있었어」"

[[dialogue]]
speaker = "舞亜"
original = "「練習は大変だし、おやつは自由に食べられないし、友達とも遊べないけど、私は嫌だとかやめたいとか言わなかった」"
translation = "「연습은 힘들고, 간식은 마음대로 못 먹고, 친구랑도 못 놀지만, 나는 싫다거나 그만두고 싶다는 말을 안 했어」"

[[dialogue]]
speaker = "舞亜"
original = "「だって私にはフィギュアスケートが一番向いてるってなんとなくわかってたから」"
translation = "「왜냐면 나에겐 피겨 스케이팅이 가장 잘 맞는다는 걸 어렴풋이 알고 있었으니까」"

[[dialogue]]
speaker = "舞亜"
original = "「だけどつらい気持ちがちょっとずつ溜まっていって、ひとりになるといつも泣きそうだった」"
translation = "「하지만 괴로운 마음이 조금씩 쌓여가서, 혼자가 되면 항상 울 것 같았어」"

[[dialogue]]
speaker = "舞亜"
original = "「でもね、見たんだ。夜空に輝く星を」"
translation = "「그런데 말이야, 봤어. 밤하늘에 빛나는 별을」"

[[dialogue]]
speaker = "舞亜"
original = "「海外遠征中、道に迷った時に見つけたひとつの星」"
translation = "「해외 원정 중, 길을 잃었을 때 발견한 하나의 별」"

[[dialogue]]
speaker = "舞亜"
original = "「星なんていつもは何気なく視界に入るだけの存在だった。だけど気付けば見惚れていた」"
translation = "「별 같은 건 평소엔 무심코 시야에 들어올 뿐인 존재였어. 하지만 정신을 차려보니 넋을 잃고 보고 있었지」"

[[dialogue]]
speaker = "舞亜"
original = "「真っ暗闇に光が差し込んだ気がした。綺麗だった。胸が熱くなった」"
translation = "「칠흑 같은 어둠 속에 빛이 비쳐든 기분이었어. 아름다웠어. 가슴이 뜨거워졌어」"

[[dialogue]]
speaker = "舞亜"
original = "「私はたったそれだけで救われた」"
translation = "「나는 단지 그것만으로 구원받았어」"

[[dialogue]]
speaker = "舞亜"
original = "「だからその星に近づきたいと思った」"
translation = "「그래서 그 별에 다가가고 싶다고 생각했어」"

[[dialogue]]
speaker = "舞亜"
original = "「誰かを照らせる存在に、誰かの道しるべになれる存在に……あの夜見た星になりたいと思った」"
translation = "「누군가를 비출 수 있는 존재로, 누군가의 이정표가 될 수 있는 존재로…… 그날 밤 본 별이 되고 싶다고 생각했어」"

[[dialogue]]
speaker = "舞亜"
original = "「リンクという氷の空で輝く星になるために、いっぱい練習して、世界大会でも優勝するようになった」"
translation = "「링크라는 얼음 하늘에서 빛나는 별이 되기 위해, 잔뜩 연습해서 세계 대회에서도 우승하게 됐어」"

[[dialogue]]
speaker = "舞亜"
original = "「そして星騎士という新たな星を見つけて今に至る──って感じかな。流星に入ったら、星騎士に専念するつもりだったけど」"
translation = "「그리고 성기사라는 새로운 별을 발견해서 지금에 이르렀다──는 느낌일까. 유성에 들어오면, 성기사에 전념할 생각이었지만」"

[[dialogue]]
speaker = "ソフィア"
original = "「じゃあどうして今もフィギュアを続けているんですか？」"
translation = "「그럼 어째서 지금도 피겨를 계속하고 있는 건가요?」"

[[dialogue]]
speaker = "舞亜"
original = "「そう、そこからが大事な話。私たちが初めて会ったときのこと覚えてる？」"
translation = "「그래, 거기서부터가 중요한 이야기. 우리 처음 만났을 때 기억나?」"

[[dialogue]]
speaker = "ソフィア"
original = "「ええ、まぁ……あの時はすごく興奮しました。舞亜さんがこんな奔放な人だとは思いませんでしたけど」"
translation = "「네, 뭐…… 그때는 정말 흥분했었죠. 마이아 씨가 이렇게 분방한 사람일 줄은 몰랐지만요」"

[[dialogue]]
speaker = "舞亜"
original = "「ふふ、褒められると照れちゃうな」"
translation = "「후후, 칭찬받으니 쑥스럽네」"

[[dialogue]]
speaker = "ソフィア"
original = "「だから褒めてませんっ」"
translation = "「그러니까 칭찬 아니에요!」"

[[dialogue]]
speaker = "舞亜"
original = "「ソフィと出会って、あのキラキラした目を見て気付いたんだ」"
translation = "「소피와 만나서, 그 반짝이는 눈을 보고 깨달았어」"

[[dialogue]]
speaker = "舞亜"
original = "「私はソフィの星になれてたんだって」"
translation = "「나는 소피의 별이 되어 있었구나, 하고」"

[[dialogue]]
speaker = "舞亜"
original = "「だから私はこれからもソフィを照らす星でいたい。私という星をソフィにもっと見てもらいたい」"
translation = "「그래서 나는 앞으로도 소피를 비추는 별로 남고 싶어. 나라는 별을 소피가 좀 더 봐주었으면 좋겠어」"

[[dialogue]]
speaker = "舞亜"
original = "「私がフィギュアスケートを続けてるのはソフィが見てくれてるおかげなんだよ」"
translation = "「내가 피겨 스케이팅을 계속하고 있는 건 소피가 봐주고 있는 덕분이야」"

[[dialogue]]
speaker = "ソフィア"
original = "「舞亜さん……」"
translation = "「마이아 씨……」"

[[dialogue]]
speaker = "ソフィア"
original = "「その……すみません、こんなことでムキになってしまって。私だって舞亜さんがそんなつもりじゃないことくらいわかっていたはずなのに」"
translation = "「그…… 죄송해요, 이런 일로 욱해버려서. 저도 마이아 씨가 그럴 의도가 아니었다는 것 정도는 알고 있었을 텐데 말이죠」"

[[dialogue]]
speaker = "舞亜"
original = "「ううん、こっちこそ私の気持ち、全然伝えられてなかったから。いい機会だったと思う」"
translation = "「아냐, 나야말로 내 마음을 전혀 전하지 못했으니까. 좋은 기회였다고 생각해」"

[[dialogue]]
speaker = "舞亜"
original = "「また一緒にパンケーキ食べに行こうよ。１人だとカロリー高すぎるもんね」"
translation = "「다시 같이 팬케이크 먹으러 가자. 혼자서는 칼로리가 너무 높으니까 말이야」"

[[dialogue]]
speaker = "ソフィア"
original = "「はい、必ず。約束です」"
translation = "「네, 반드시요. 약속이에요」"

[[dialogue]]
speaker = "舞亜"
original = "「ありがとう、会長さん。おかげで友達に誤解されたままにならずに済んだよ」"
translation = "「고마워, 회장님. 덕분에 친구에게 오해받은 채로 끝나지 않게 됐어」"

[[dialogue]]
speaker = "unk"
original = "どういたしまして"
translation = "천만에"

[[dialogue]]
speaker = "舞亜"
original = "「また今度お礼させてね。そうだ、お休みの日にデートしよっか？」"
translation = "「다음에 꼭 보답하게 해줘. 맞아, 쉬는 날에 데이트할까?」"

[[dialogue]]
speaker = "unk"
original = "！？"
translation = "!?"

[[dialogue]]
speaker = "舞亜"
original = "「あ、まんざらでもない感じかな。会長さんもかわいいところあるね♪」"
translation = "「아, 싫지 않은 눈치네. 회장님도 귀여운 구석이 있네♪」"

[[dialogue]]
speaker = "ソフィア"
original = "「ですがその前に数学の課題です。明日提出ですから今すぐ終わらせましょうっ」"
translation = "「하지만 그전에 수학 과제입니다. 내일 제출이니까 지금 당장 끝내죠!」"

[[dialogue]]
speaker = "舞亜"
original = "「えええっ、今その流れ！？\u3000せっかくスッキリしたところだったにぃ～～～っ！！」"
translation = "「에에엣, 지금 이 흐름에서!? 겨우 개운해진 참이었는데에에~~!」"

