[[dialogue]]
speaker = "unk"
original = "第４話,夢に向かって全速力！,P"
translation = "제4화, 꿈을 향해 전속력!, P"

[[dialogue]]
speaker = "unk"
original = "最近、アムの姿を地下訓練施設で見かけない。"
translation = "최근, 아무의 모습을 지하 훈련 시설에서 볼 수 없다."

[[dialogue]]
speaker = "unk"
original = "その原因には心当たりがある。だから俺はアムを探すことにした。"
translation = "그 원인에는 짐작 가는 구석이 있다. 그래서 나는 아무를 찾아보기로 했다."

[[dialogue]]
speaker = "unk"
original = "教室やカフェテリアをしらみつぶしに駆けまわって、日が暮れた頃にアムをようやく見つけた。"
translation = "교실이나 카페테리아를 샅샅이 뒤지고 다니다가, 해가 저물 무렵에야 아무를 겨우 찾아냈다."

[[dialogue]]
speaker = "アム"
original = "「あ……会長。どうしたの、そんなに息を切らして。もしかしてあたしを探してた……？」"
translation = "「아…… 회장님. 무슨 일이야, 그렇게 숨을 헐떡이면서. 설마 나를 찾고 있었어……?」"

[[dialogue]]
speaker = "アム"
original = "「……ほんとに？\u3000そっか、そうなんだ……」"
translation = "「……정말? 그렇구나, 그랬구나……」"

[[dialogue]]
speaker = "アム"
original = "「ちなみにあたしのこと、心配してくれてたりー……とか？」"
translation = "「참고로 나를, 걱정해 줬다거나—…… 그런 거야?」"

[[dialogue]]
speaker = "unk"
original = "当たり前だ"
translation = "당연하지"

[[dialogue]]
speaker = "アム"
original = "「……そっか。あれだよね。最近あたしが訓練していないから、でしょ？」"
translation = "「……그렇구나. 그거지. 최근에 내가 훈련을 안 하니까, 그렇지?」"

[[dialogue]]
speaker = "アム"
original = "「うん……スランプ、なのかな。会長も知ってるんでしょ。ここのところエルゼにずっと負けっぱなしなんだー」"
translation = "「응…… 슬럼프, 인 걸까. 회장님도 알고 있잖아. 요즘 엘제한테 계속 지기만 했단 말이야—」"

[[dialogue]]
speaker = "アム"
original = "「流星附属に入学して、知り合って。お互いライバル視するようになってから、ず～っと五分の関係だったのに」"
translation = "「유성 부속에 입학해서, 알게 되고. 서로 라이벌로 의식하게 된 뒤로, 계—속 막상막하인 관계였는데.」"

[[dialogue]]
speaker = "アム"
original = "「６連敗だよ？\u3000こんなの初めて。サボってるつもりもないし、戦い方も工夫してるのに全然勝てなくなっちゃった」"
translation = "「6연패라고? 이런 적 처음이야. 땡땡이칠 생각도 없고, 싸우는 법도 연구하고 있는데 전혀 이길 수 없게 됐어.」"

[[dialogue]]
speaker = "アム"
original = "「エルゼは流星学園のフィオナ会長に憧れてて……あたしはヴィーナス前会長が目標だったから、お互い、目指すところが似てるじゃない？」"
translation = "「엘제는 유성 학원의 피오나 회장님을 동경하고 있고…… 나는 비너스 전 회장님이 목표였으니까, 서로 지향하는 점이 비슷하잖아?」"

[[dialogue]]
speaker = "アム"
original = "「模擬戦をやってもこれ以上の相手はいなくて。競い合うの、楽しかったんだけど……あはは」"
translation = "「모의전을 해도 이 이상의 상대는 없어서. 경쟁하는 거, 즐거웠는데…… 아하하.」"

[[dialogue]]
speaker = "アム"
original = "「最近は自信も無くしちゃったっていうか……訓練してても楽しくないんだ～……」"
translation = "「최근에는 자신감도 잃어버렸다고 해야 하나…… 훈련하고 있어도 즐겁지 않아~……」"

[[dialogue]]
speaker = "アム"
original = "「あたし、つまずいちゃう前は、どんな気持ちで戦ってたんだっけ……」"
translation = "「나, 좌절하기 전에는 어떤 기분으로 싸웠었더라……」"

[[dialogue]]
speaker = "アム"
original = "「ねぇ、会長はいつも何を思って戦ってるの？」"
translation = "「있지, 회장님은 평소에 무슨 생각을 하며 싸워?」"

[[dialogue]]
speaker = "unk"
original = "昔、モンスターにさらわれたんだ"
translation = "옛날에 몬스터에게 납치된 적이 있어"

[[dialogue]]
speaker = "アム"
original = "「ええ！？\u3000何それ、こわ……」"
translation = "「에엣!? 뭐야 그거, 무서워……」"

[[dialogue]]
speaker = "アム"
original = "「……うん……うん。会長を助けてくれた人がいたんだね」"
translation = "「……응…… 응. 회장님을 구해준 사람이 있었구나.」"

[[dialogue]]
speaker = "アム"
original = "「会長はその人に憧れて……そして他の人を自分みたいに怖い目にあわせたくなくて……それで星騎士になったんだね」"
translation = "「회장님은 그 사람을 동경해서…… 그리고 다른 사람을 자신처럼 무서운 일을 겪게 하고 싶지 않아서…… 그래서 성기사가 된 거구나.」"

[[dialogue]]
speaker = "アム"
original = "「わかる、その気持ち。あたしだって……あれ？\u3000あたし──」"
translation = "「알 것 같아, 그 기분. 나도…… 어라? 나──」"

[[dialogue]]
speaker = "若い女性"
original = "「きゃあああーっ！\u3000誰かー！」"
translation = "「꺄아아악—! 누구 없어요—!」"

[[dialogue]]
speaker = "アム"
original = "「──悲鳴！？」"
translation = "「──비명!?」"

[[dialogue]]
speaker = "アム"
original = "「あっ、向こうにモンスターが！\u3000大変だよ会長！\u3000急いで助けに行かなきゃ！」"
translation = "「앗, 저쪽에 몬스터가! 큰일이야 회장님! 빨리 구하러 가야 해!」"

[[dialogue]]
speaker = "アム"
original = "「すっかり遅くなっちゃったね、会長。でもケガ人も出なかったし、本当に良かった！」"
translation = "「완전히 늦어버렸네, 회장님. 그래도 부상자도 안 나왔고, 정말 다행이야!」"

[[dialogue]]
speaker = "unk"
original = "本当にスランプ？\u3000いい動きだった"
translation = "정말 슬럼프 맞아? 움직임이 좋던데"

[[dialogue]]
speaker = "アム"
original = "「あ……言われてみれば。あの人を助けるのに夢中だったから自分がスランプなこと、すっかり忘れてたかも」"
translation = "「아…… 듣고 보니. 그 사람을 구하느라 정신없어서 내가 슬럼프라는 거, 완전히 잊고 있었을지도.」"

[[dialogue]]
speaker = "アム"
original = "「……そっか。あたし、ここのところ勝ち負けばっかり気にして、大事なことをおろそかにしてたのかも……」"
translation = "「……그렇구나. 나, 요새 승패에만 집착해서, 중요한 걸 소홀히 하고 있었을지도 몰라……」"

[[dialogue]]
speaker = "アム"
original = "「昔。今よりずーっと弱かった頃、あたしのピンチを助けてくれたのがヴィーナス前会長で……」"
translation = "「옛날에. 지금보다 훨씬 더 약했을 때, 내 위기를 구해준 게 비너스 전 회장님이었고……」"

[[dialogue]]
speaker = "アム"
original = "「もう大丈夫よ──そう言って、颯爽と現れて庇ってくれたあの時に……ああ、こんな風になりたいって思ったんだっけ」"
translation = "「이제 괜찮아── 그렇게 말하며 늠름하게 나타나 감싸주었던 그때…… 아아, 저런 사람이 되고 싶다고 생각했었지.」"

[[dialogue]]
speaker = "アム"
original = "「どんなに強敵が相手でも、誰かを守るために最前線で踏ん張る。１人も死なせない、その覚悟を持ったカッコイイ星騎士」"
translation = "「아무리 강적이 상대라도, 누군가를 지키기 위해 최전선에서 버틴다. 단 한 명도 죽게 하지 않겠다는 각오를 가진 멋진 성기사.」"

[[dialogue]]
speaker = "アム"
original = "「そうだよ、模擬戦に負け続けたことよりも、この気持ちを忘れてた方が問題じゃん……！」"
translation = "「맞아, 모의전에서 계속 진 것보다, 이 기분을 잊고 있었던 게 더 문제잖아……!」"

[[dialogue]]
speaker = "アム"
original = "「…………よし！\u3000連敗がなんだ！\u3000次こそ勝つ！\u3000勝てなかったらその次こそ勝つ！\u3000やるぞーっ！！」"
translation = "「…………좋아! 연패가 뭐 어때서! 다음에야말로 이긴다! 못 이기면 그다음번에 꼭 이긴다! 하는 거야—!!」"

[[dialogue]]
speaker = "unk"
original = "俺もヴィーナスにボコボコにされた"
translation = "나도 비너스에게 호되게 당했었지"

[[dialogue]]
speaker = "アム"
original = "「そういえばそうだったね。会長だって諦めなかったんだから、あたしも諦めてられない！」"
translation = "「그러고 보니 그랬었지. 회장님도 포기하지 않았으니까, 나도 포기할 수 없지!」"

[[dialogue]]
speaker = "アム"
original = "「にひひ。あたしたち、似た者同士だったのかもね。ありがと、会長。おかげで色々吹っ切れた感じ」"
translation = "「니히히. 우리들, 닮은꼴이었을지도 모르겠네. 고마워, 회장님. 덕분에 여러 가지로 홀가분해진 기분이야.」"

[[dialogue]]
speaker = "unk"
original = "俺は何もしてないよ"
translation = "난 아무것도 한 게 없어"

[[dialogue]]
speaker = "アム"
original = "「え～、そんなことないよ！\u3000あたしのこと、走り回って探してくれたじゃん！」"
translation = "「에—, 그렇지 않아! 나 때문에, 여기저기 뛰어다니며 찾아줬잖아!」"

[[dialogue]]
speaker = "アム"
original = "「……その、嬉しかった。ありがとね会長」"
translation = "「……그게, 기뻤어. 고마워 회장님.」"

[[dialogue]]
speaker = "アム"
original = "「見てて。もうふてくされたりしない。あたし、これからどんどん強くなってみせる」"
translation = "「지켜봐 줘. 이제 더는 삐치거나 하지 않아. 나, 앞으로 점점 더 강해져 보일 테니까.」"

[[dialogue]]
speaker = "アム"
original = "「ヴィーナス前会長と同じくらい、会長にも認めて欲しいもん」"
translation = "「비너스 전 회장님만큼이나, 회장님한테도 인정받고 싶단 말이야.」"

[[dialogue]]
speaker = "アム"
original = "「これ以上ないってくらい強くなったらー……にひ。会長の座、貰いに行くから！」"
translation = "「이보다 더 강해질 수 없을 만큼 강해지면—…… 니히. 회장 자리, 뺏으러 갈 거니까!」"

[[dialogue]]
speaker = "アム"
original = "「新星学園で待ってて！\u3000その時まで負けちゃダメなんだからね！」"
translation = "「신성 학원에서 기다려! 그때까지 지면 안 되니까 말이야!」"

