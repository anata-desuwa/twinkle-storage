[[dialogue]]
speaker = "サーシャ"
original = "「ん～～♪\u3000まさか本当に、会長くんと２人でリゾート結界を貸し切りにしてもらえるとは思わなかったわ～♪」"
translation = "「음~~♪ 설마 정말로, 회장군이랑 둘이서 리조트 결계를 독차지하게 될 줄은 몰랐어~♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「凄いわよね、リップルちゃんの能力♪\u3000結界を作れるだけじゃなくて、結界のコピーまでできるだなんて」"
translation = "「대단하네, 리플짱의 능력♪ 결계를 만들 수 있을 뿐만 아니라, 결계 복제까지 가능하다니」"

[[dialogue]]
speaker = "サーシャ"
original = "「今もリップルちゃんのビーチにはたくさんのお客さんがいて、海の家も営業中……だけどこっちには、私たち以外入ってこれない完璧なプライベートビーチってわけね♪」"
translation = "「지금도 리플짱의 해변에는 많은 손님이 있고, 바다의 집도 영업 중…… 하지만 이쪽은, 우리 말고는 들어올 수 없는 완벽한 프라이빗 비치라는 거네♪」"

[[dialogue]]
speaker = "unk"
original = "リップルの結界に閉じ込められてしまったあの事件から１週間ほど経った。"
translation = "리플의 결계에 갇혀버렸던 그 사건으로부터 일주일 정도 지났다."

[[dialogue]]
speaker = "unk"
original = "リップルは事件を解決してくれたお礼にと、恋人同士であるサーシャさんと俺を、このリゾート結界に招待してくれたのだった。"
translation = "리플은 사건을 해결해 준 답례라며, 연인 사이인 사샤 씨와 나를 이 리조트 결계에 초대해 준 것이었다."

[[dialogue]]
speaker = "サーシャ"
original = "「事件の時はいろいろ忙しかったからって、こんな粋なことしてくれるなんて……後で、リップルちゃんにはちゃんとお礼をしなくちゃね♪」"
translation = "「사건 때는 여러모로 바빴다면서, 이런 멋진 일을 해주다니…… 나중에 리플짱에게는 제대로 보답해야겠네♪」"

[[dialogue]]
speaker = "クロト"
original = "「本当に。でもこれで、ようやく２人きりだ」"
translation = "「정말로. 하지만 이걸로, 드디어 둘뿐이다.」"

[[dialogue]]
speaker = "サーシャ"
original = "「んふふ～♪\u3000デートくらいはできてたけど、人目を気にしなくていい２人きりの時間は久しぶりだものね～」"
translation = "「응후후~♪ 데이트 정도는 했었지만, 남의 눈을 신경 쓰지 않아도 되는 둘만의 시간은 오랜만인걸~」"

[[dialogue]]
speaker = "サーシャ"
original = "「ここなら人の目もないから、建前がなくてもくっつき放題ね～。それに……あらあら♪\u3000会長くん……お姉ちゃんに隠し事はダメよ？」"
translation = "「여기라면 보는 눈도 없으니까, 겉치레 없이 마음껏 붙어 있을 수 있겠네~. 게다가…… 어라어라♪ 회장군…… 누나한테 숨기는 건 안 돼?」"

[[dialogue]]
speaker = "クロト"
original = "「２人きりなんだし、今日のサーシャさんは恋人なんじゃ……？」"
translation = "「둘뿐이고, 오늘의 사샤 씨는 연인이니까……?」"

[[dialogue]]
speaker = "サーシャ"
original = "「うふふっ、それならなおのこと。おち○ちん……すっごく大きくなってる。これって、私の体で興奮してくれたってことよね～♪」"
translation = "「우후훗, 그렇다면 더더욱. 자지…… 엄청 커졌어. 이건, 내 몸을 보고 흥분해 줬다는 거네~♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「いいの、いいの♪\u3000恥ずかしがらないで。男の子だもの、しょうがないわ」"
translation = "「괜찮아, 괜찮아♪ 부끄러워하지 마. 남자애인걸, 어쩔 수 없지」"

[[dialogue]]
speaker = "サーシャ"
original = "「それに……私も会長くんにエッチしたいって思われるの、嬉しいから。こ～んなに見晴らしのいい綺麗な浜辺で、恋人と野外セックス<emoji=heart04>\u3000チャレンジしちゃう？<emoji=heart04>」"
translation = "「게다가…… 나도 회장군이 섹스하고 싶다고 생각해주니 기뻐. 이~렇게 전망 좋고 예쁜 해변에서, 연인과 야외 섹스<emoji=heart04> 도전해 볼래?<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「うふっ<emoji=heart04>\u3000会長くんのおち○ちん……すっごく大きくなってる……<emoji=heart04>\u3000あん<emoji=heart04>\u3000私のおま○こに、擦りつけられてる……<emoji=heart04>」"
translation = "「우훗<emoji=heart04> 회장군 자지…… 엄청 커졌어……<emoji=heart04> 앙<emoji=heart04> 내 보지에, 문질러지고 있어……<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「私がぐい～って、脚を広げるから<emoji=heart04>\u3000こうやっておま○こ広げておけば、会長くんもおち○ちん、入れやすいでしょ……？」"
translation = "「내가 쭈욱~ 하고 다리를 벌릴 테니까<emoji=heart04> 이렇게 보지를 벌려두면, 회장군도 자지, 넣기 쉽지……?」"

[[dialogue]]
speaker = "サーシャ"
original = "「うふふっ<emoji=heart04>\u3000ちょっと大胆すぎちゃったかしら？\u3000でも会長くん……こういうエッチなポーズも、好きでしょ……？<emoji=heart04>」"
translation = "「우후훗<emoji=heart04> 좀 너무 대담했나? 하지만 회장군…… 이런 야한 포즈도, 좋아하지……?<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「我慢しなくていいのよ。リップルちゃんも言ってたでしょ～？\u3000ここには、私たち２人しか入ってこれないって」"
translation = "「참지 않아도 돼. 리플짱도 말했잖아~? 여기엔, 우리 둘밖에 못 들어온다고」"

[[dialogue]]
speaker = "サーシャ"
original = "「だから、おち○ちん挿れたいよ～って気持ち、我慢なんかしなくていいんだから<emoji=heart04>」"
translation = "「그러니까, 자지 삽입하고 싶어~ 라는 마음, 참거나 하지 않아도 되니까<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「ほら、おま○こだって、こんなに濡れ濡れで準備も万端……♪\u3000会長くんが気にすることなんてな～んにもないの♪」"
translation = "「봐, 보지도 이렇게 젖어서 준비 만반……♪ 회장군이 신경 쓸 건 아~무것도 없어♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「深く考える必要なんてないのよ～♪\u3000２人きりのお部屋でする時みたいに、お姉ちゃんにおち○ちんのお世話、させてほしいな<emoji=heart04>」"
translation = "「깊게 생각할 필요 없어~♪ 둘만의 방에서 할 때처럼, 누나에게 자지 보살핌, 받게 해줬으면 좋겠어<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「ん……っ<emoji=heart04>\u3000そう、何も考えず、やりたいように……あっ<emoji=heart04>\u3000大きくなっちゃったおち○ちん、私のおま○こにしまっちゃうように……っ<emoji=heart04>」"
translation = "「응……읏<emoji=heart04> 그래, 아무 생각 말고, 하고 싶은 대로…… 앗<emoji=heart04> 커져 버린 자지, 내 보지 속에 갈무리하듯이……읏<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「はぁっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000２人きりなんだから、恥ずかしがらなくていいの<emoji=heart04>\u3000ぎゅ～ってしたいなら、してもいいの<emoji=heart04>\u3000会長くんがしたいことなら、なんだってしてあげるから<emoji=heart04>」"
translation = "「하앗<emoji=heart04> 응<emoji=heart04> 둘뿐이니까, 부끄러워하지 않아도 돼<emoji=heart04> 꼬옥 하고 싶다면, 해도 돼<emoji=heart04> 회장군이 하고 싶은 거라면, 뭐든지 해줄 테니까<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「おま○この中、もっときつくしてほしかったらしてあげるし……っ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ん……っ<emoji=heart04>\u3000おっぱい触りたいなら、いつでも触らせてあげる<emoji=heart04>」"
translation = "「보지 안쪽, 좀 더 조여줬으면 좋겠다면 해줄 거고……읏<emoji=heart04> 앙<emoji=heart04> 응……읏<emoji=heart04> 가슴 만지고 싶다면, 언제든 만지게 해줄게<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「んふふ～<emoji=heart04>\u3000当然でしょ<emoji=heart04>\u3000だって私、会長くんの恋人なんだから～<emoji=heart04>\u3000……あんっ<emoji=heart04>」"
translation = "「응후후~<emoji=heart04> 당연하잖아<emoji=heart04> 그치만 나, 회장군의 연인인걸~<emoji=heart04> ……앙<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「会長くんのしたいこと全部、かなえてあげたいの。エッチなお願い事だって……なんでもっ<emoji=heart04>」"
translation = "「회장군이 하고 싶은 거 전부, 이뤄주고 싶어. 야한 부탁이라도…… 뭐든지<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「お話しながら、愛し合いながら……んっ<emoji=heart04>\u3000こうやって……ぇ<emoji=heart04>\u3000会長くんと、ゆっくりセックスができるの……すっごく嬉しいんだから<emoji=heart04>」"
translation = "「이야기하면서, 서로 사랑하면서…… 응<emoji=heart04> 이렇게……에<emoji=heart04> 회장군이랑, 천천히 섹스할 수 있는 거…… 정말 기쁘니까<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「あ……っ<emoji=heart04>\u3000あらあら、会長くん……もしかして、今の言葉で興奮しちゃった？」"
translation = "「아……읏<emoji=heart04> 어라어라, 회장군…… 혹시, 방금 말에 흥분했어?」"

[[dialogue]]
speaker = "サーシャ"
original = "「んふふっ<emoji=heart04>\u3000会長くんのおち○ちん、ビクンって、おま○この中で跳ねたの分かるわ<emoji=heart04>\u3000……会長くんも嬉しいのね♪」"
translation = "「응후후<emoji=heart04> 회장군 자지, 움찔하고 보지 안에서 튀어 오른 거 알겠어<emoji=heart04> ……회장군도 기쁘구나♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「そうよね～<emoji=heart04>\u3000だって、こんなこと……んんっ<emoji=heart04>\u3000普通できないもの<emoji=heart04>\u3000……あんっ<emoji=heart04>」"
translation = "「그렇지~<emoji=heart04> 그치만, 이런 거…… 응응<emoji=heart04> 보통은 못 하는걸<emoji=heart04> ……앙<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「砂浜で寝転びながら、イチャイチャの延長で……はぅん<emoji=heart04>\u3000こんな風にエッチするなんて……恋人同士でも中々できるものじゃないわ<emoji=heart04>」"
translation = "「모래사장에 누워서, 꽁냥거리는 연장선으로…… 하웅<emoji=heart04> 이런 식으로 섹스하다니…… 연인 사이라도 좀처럼 할 수 있는 게 아니야<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「ほら……ザザーンザザーンって、波の音と一緒に……あん<emoji=heart04>\u3000ヌチャヌチャって、おま○こから聞こえてくる、でしょ？<emoji=heart04>」"
translation = "「봐…… 쏴아아 쏴아아 하고, 파도 소리랑 같이…… 앙<emoji=heart04> 질척질척하고 보지에서 들려오지?<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「時間を気にしないで、ゆったりしたエッチ……こういう時しかできないもの<emoji=heart04>」"
translation = "「시간 신경 쓰지 않고, 느긋한 섹스…… 이럴 때밖에 못 하니까<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「あんっ<emoji=heart04>\u3000あ……っ<emoji=heart04>\u3000会長くん、腰がもじもじしてる……っ<emoji=heart04>\u3000本当はもっと激しく、動きたいんじゃない……？<emoji=heart04>」"
translation = "「앙<emoji=heart04> 아……읏<emoji=heart04> 회장군, 허리가 움찔거리고 있어……읏<emoji=heart04> 사실은 좀 더 격렬하게, 움직이고 싶은 거 아니니……?<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「あ……っ、んっ<emoji=heart04>\u3000私のことは気にしないで、いいから<emoji=heart04>\u3000……会長くんのしたいように、してくれていいんだからね<emoji=heart04>\u3000……はぁぁ<emoji=heart04>」"
translation = "「아……읏, 응<emoji=heart04> 내 걱정은 하지 않아도 되니까<emoji=heart04> ……회장군이 하고 싶은 대로, 해줘도 되니까 말이야<emoji=heart04> ……하아아<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「あんっ<emoji=heart04>\u3000そう……っ<emoji=heart04>\u3000会長くんが動いて、くれるだけでっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000私は嬉しいんだから……っ<emoji=heart04>」"
translation = "「앙<emoji=heart04> 그래……읏<emoji=heart04> 회장군이 움직여주는 것만으로도읏<emoji=heart04> 앙<emoji=heart04> 나는 기쁘니까……읏<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「……でも、会長くん……このゆったりエッチも好きだけど……っ<emoji=heart04>\u3000これじゃ、射精……できないんじゃない？」"
translation = "「……하지만, 회장군…… 이 느긋한 섹스도 좋지만……읏<emoji=heart04> 이래선, 사정…… 못 하는 거 아니야?」"

[[dialogue]]
speaker = "サーシャ"
original = "「もっと激しく動いて……っ<emoji=heart04>\u3000んんっ……音なんて気にせず、射精のことだけ考えて、エッチしていいのよ……っ<emoji=heart04>\u3000はぁぁっ<emoji=heart04>」"
translation = "「좀 더 격렬하게 움직여서……읏<emoji=heart04> 응응…… 소리 같은 건 신경 쓰지 말고, 사정하는 것만 생각하고 섹스해도 돼……읏<emoji=heart04> 하아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「おち○ちんが、どうすればもっと気持ちよく、なるのか……っ<emoji=heart04>\u3000はぅぅ……<emoji=heart04>\u3000それだけを考えて……っ<emoji=heart04>\u3000動いてみて？\u3000あんっ<emoji=heart04>」"
translation = "「자지가, 어떻게 하면 좀 더 기분 좋아질지……읏<emoji=heart04> 하우우……<emoji=heart04> 그것만 생각하면서……읏<emoji=heart04> 움직여 볼래? 앙<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ん……っ<emoji=heart04>\u3000ちょっと激しく<emoji=heart04>\u3000なったぁ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000そう……っ<emoji=heart04>\u3000もっと激しくっ<emoji=heart04>\u3000動いてもいいんだからねっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앙<emoji=heart04> 응……읏<emoji=heart04> 조금 격렬해졌어어<emoji=heart04> 앙<emoji=heart04> 그래……읏<emoji=heart04> 좀 더 격렬하게읏<emoji=heart04> 움직여도 되니까 말이야앗<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「あんっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000ん……っ<emoji=heart04>\u3000んふふ<emoji=heart04>\u3000会長くん、もっともっと、私のことを求めて……っ<emoji=heart04>」"
translation = "「앙<emoji=heart04> 앗<emoji=heart04> 하앗<emoji=heart04> 응……읏<emoji=heart04> 응후후<emoji=heart04> 회장군, 좀 더 좀 더, 나를 원해줘……읏<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「あんっ<emoji=heart04>\u3000私の心も体もっ<emoji=heart04>\u3000会長くんのために、あるんだから……あっ<emoji=heart04>\u3000ん……っ<emoji=heart04>\u3000おま○こも、おっぱいも、会長くんのもの<emoji=heart04>\u3000だからいっぱい、味わってっ<emoji=heart04>」"
translation = "「앙<emoji=heart04> 내 마음도 몸도읏<emoji=heart04> 회장군을 위해 있는 거니까…… 앗<emoji=heart04> 응……읏<emoji=heart04> 보지도, 가슴도, 회장군 거<emoji=heart04> 그러니까 잔뜩, 맛봐줘읏<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「だからもっと……っ<emoji=heart04>\u3000もっと、動いて、会長くんの好きって気持ち……っ<emoji=heart04>\u3000私に教えてっ<emoji=heart04>」"
translation = "「그러니까 좀 더……읏<emoji=heart04> 좀 더, 움직여서, 회장군의 좋아한다는 마음……읏<emoji=heart04> 나한테 알려줘읏<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「っ……もしかして、なんですけど。サーシャさん、今日は激しく犯されたい日……だったりしますか？」"
translation = "「읏…… 혹시 말인데요. 사샤 씨, 오늘은 격렬하게 범해지고 싶은 날……인가요?」"

[[dialogue]]
speaker = "サーシャ"
original = "「えっ……<emoji=heart04>」"
translation = "「엣……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「間違ってたら、ごめん……っ。なんとなく、今日はいつも以上に積極的だったから……」"
translation = "「틀렸다면 미안해……읏. 왠지, 오늘은 평소보다 더 적극적이라서……」"

[[dialogue]]
speaker = "サーシャ"
original = "「はぅぅぅぅ……<emoji=heart04>\u3000い、言われてみたら<emoji=heart04>\u3000そ、そうかもぉ……<emoji=heart04>\u3000自覚がなかったけど、もしかして……私の方が会長くんに、おねだり……しちゃってた？<emoji=heart04>」"
translation = "「하우우우우……<emoji=heart04> 드, 듣고 보니<emoji=heart04> 그, 그럴지도오……<emoji=heart04> 자각은 못 했지만, 혹시…… 내가 회장군한테, 조르고…… 있었나?<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「は、恥ずかしい……っ。ご、ごめんね、はしたないお姉ちゃんで……ううん、はしたない恋人で……うぅぅぅっ」"
translation = "「부, 부끄러워……읏. 미, 미안해, 천박한 누나라서…… 아니, 천박한 연인이라서…… 으으으읏」"

[[dialogue]]
speaker = "クロト"
original = "「そうじゃなない……！\u3000そうじゃなくって、サーシャさんも俺のことを求めてくれてたなら、嬉しいっ」"
translation = "「그런 게 아니야……! 그런 게 아니라, 사샤 씨도 나를 원해주고 있었다면, 기뻐」"

[[dialogue]]
speaker = "クロト"
original = "「お礼って言ったら変だけど、たまにはサーシャさんがしてほしいエッチがしたいっ。どういう風にしてほしいか、教えてほしいんだ」"
translation = "「답례라고 하면 이상하지만, 가끔은 사샤 씨가 하고 싶은 섹스를 하고 싶어. 어떤 식으로 해줬으면 좋겠는지, 알려줬으면 좋겠어」"

[[dialogue]]
speaker = "サーシャ"
original = "「はぅぅ……<emoji=heart04>\u3000会長くんが、また男らしいこと言ってるぅ<emoji=heart04>\u3000こんなの……惚れ直しちゃわぁ<emoji=heart04>」"
translation = "「하우우……<emoji=heart04> 회장군이, 또 남자다운 말을 하고 있어어<emoji=heart04> 이런 거…… 다시 반해버리잖아아<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「うん<emoji=heart04>\u3000うん……っ<emoji=heart04>\u3000そう……っ、なの<emoji=heart04>\u3000実は……激しくしてほしいの<emoji=heart04>」"
translation = "「응<emoji=heart04> 응……읏<emoji=heart04> 그래……읏, 맞아<emoji=heart04> 사실은…… 격렬하게 해줬으면 좋겠어<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「あんっ<emoji=heart04>\u3000会長くんが、私を求めるのと同じくらい……私も会長くんに、求められたいっ<emoji=heart04>」"
translation = "「앙<emoji=heart04> 회장군이 나를 원하는 것만큼…… 나도 회장군에게, 원해지고 싶어읏<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「あぁ……っ<emoji=heart04>\u3000ゆっくりなエッチも好きだけど……今日は男らしい会長くんに、激しく愛してもらいたかったのっ<emoji=heart04>」"
translation = "「아아……읏<emoji=heart04> 천천히 하는 섹스도 좋지만…… 오늘은 남자다운 회장군에게, 격렬하게 사랑받고 싶었어읏<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「あっ、あっ、あっ<emoji=heart04>\u3000嬉しいっ<emoji=heart04>\u3000会長くんのおち○ちん<emoji=heart04>\u3000バキバキになってるっ……男らしいおち○ちんが、おま○この中、ゾリゾリって入ってきちゃう……っ<emoji=heart04>」"
translation = "「앗, 앗, 앗<emoji=heart04> 기뻐읏<emoji=heart04> 회장군 자지<emoji=heart04> 빳빳해졌어읏…… 남자다운 자지가, 보지 안을 슥슥 하고 들어와버려……읏<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「はぅぅ……<emoji=heart04>\u3000ありがとう、会長くん……っ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000私のために、男らしいところも見せて、くれるのね……<emoji=heart04>」"
translation = "「하우우……<emoji=heart04> 고마워, 회장군……읏<emoji=heart04> 앙<emoji=heart04> 나를 위해서, 남자다운 모습도 보여, 주는구나……<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「はぁぁぁん<emoji=heart04>\u3000今日は私……<emoji=heart04>\u3000年上の恋人じゃなくって<emoji=heart04>\u3000女の子になっちゃっていいんだぁ……<emoji=heart04>\u3000はふぅぅぅん<emoji=heart04>」"
translation = "「하아아앙<emoji=heart04> 오늘은 나……<emoji=heart04> 연상인 연인이 아니라<emoji=heart04> 여자애가 되어버려도 되는구나아……<emoji=heart04> 하후우우웅<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「それなら最初から……あんっ<emoji=heart04>\u3000ストレートにエッチしたいって、誘えば良かった……っ<emoji=heart04>」"
translation = "「그럴 거면 처음부터…… 앙<emoji=heart04> 스트레이트로 섹스하고 싶다고, 유혹할걸 그랬어……읏<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「ほんとはねっ<emoji=heart04>\u3000今日、このリゾート結界<emoji=heart04>\u3000来たときから、思ってたのっ<emoji=heart04>\u3000あんっ<emoji=heart04>」"
translation = "「사실은 말이야읏<emoji=heart04> 오늘, 이 리조트 결계<emoji=heart04> 왔을 때부터, 생각했어읏<emoji=heart04> 앙<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「砂浜で会長くんと、イチャイチャしたいって……っ<emoji=heart04>\u3000エッチしたいなって、思ってたのっ<emoji=heart04>」"
translation = "「모래사장에서 회장군이랑, 꽁냥거리고 싶다고……읏<emoji=heart04> 섹스하고 싶다고, 생각했어읏<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁああぁぁあ<emoji=heart04>\u3000激しいの、きたぁ<emoji=heart04>\u3000男らしいおち○ちん<emoji=heart04>\u3000女の子を孕ませちゃう、乱暴エッチ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 하아아아아아<emoji=heart04> 격렬한 거, 왔다아<emoji=heart04> 남자다운 자지<emoji=heart04> 여자애를 임신시켜버리는, 난폭한 섹스<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「はぁ……っ、あんっ<emoji=heart04>\u3000あっ<emoji=heart04>こんなエッチな恰好でっ<emoji=heart04>\u3000後ろから、会長くんに求められて……っ<emoji=heart04>\u3000これ、してほしいって思ってたの<emoji=heart04>」"
translation = "「하아……읏, 앙<emoji=heart04> 앗<emoji=heart04> 이런 야한 차림으로읏<emoji=heart04> 뒤에서, 회장군에게 원해져서……읏<emoji=heart04> 이거, 해줬으면 좋겠다고 생각했어」"

[[dialogue]]
speaker = "サーシャ"
original = "「あぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000それ、好きっ<emoji=heart04>\u3000後ろからぎゅってされて、いっぱい突かれるの好きっ<emoji=heart04>」"
translation = "「아아읏<emoji=heart04> 앗<emoji=heart04> 그거, 좋아읏<emoji=heart04> 뒤에서 꼬옥 안겨서, 잔뜩 찔리는 거 좋아읏<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「あっ<emoji=heart04>\u3000お腹キュンキュンするっ<emoji=heart04>\u3000会長くんの熱、感じるのっ<emoji=heart04>\u3000ん……っ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000もっと<emoji=heart04>\u3000もっとぎゅってして<emoji=heart04>」"
translation = "「앗<emoji=heart04> 배가 큥큥거려읏<emoji=heart04> 회장군의 열기, 느껴져읏<emoji=heart04> 응……읏<emoji=heart04> 앙<emoji=heart04> 좀 더<emoji=heart04> 좀 더 꼬옥 안아줘」"

[[dialogue]]
speaker = "サーシャ"
original = "「あんっ<emoji=heart04>\u3000激しいと嬉しいっ<emoji=heart04>\u3000会長くんのことっ<emoji=heart04>\u3000もっと感じたい……っ<emoji=heart04>\u3000だからお願いっ<emoji=heart04>\u3000もっときてっ<emoji=heart04>\u3000犯してほしいの<emoji=heart04>」"
translation = "「앙<emoji=heart04> 격렬하니까 기뻐읏<emoji=heart04> 회장군을읏<emoji=heart04> 좀 더 느끼고 싶어……읏<emoji=heart04> 그러니까 부탁이야읏<emoji=heart04> 좀 더 와줘읏<emoji=heart04> 범해줬으면 좋겠어<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「あぁぁああぁ<emoji=heart04>\u3000会長くんの全部、感じたいっ<emoji=heart04>\u3000好きだからぁ……っ、あぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000は……っ<emoji=heart04>\u3000いっぱい好きって、言ってっ<emoji=heart04>\u3000教えてっ<emoji=heart04>」"
translation = "「아아아아아<emoji=heart04> 회장군 전부, 느끼고 싶어읏<emoji=heart04> 좋아하니까아……읏, 아아읏<emoji=heart04> 앗<emoji=heart04> 하……읏<emoji=heart04> 잔뜩 좋아한다고, 말해줘읏<emoji=heart04> 알려줘읏<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「あぁんっ<emoji=heart04>\u3000会長くんっ<emoji=heart04>\u3000好きなのっ<emoji=heart04>\u3000全部あげたいっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふぁぁぁん<emoji=heart04>」"
translation = "「아앙읏<emoji=heart04> 회장군읏<emoji=heart04> 좋아해읏<emoji=heart04> 전부 주고 싶어읏<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 화아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「ずっと一緒にいたいっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000いつでもくっついていたいの<emoji=heart04>\u3000ほんとはずっとエッチしてたいっ<emoji=heart04>」"
translation = "「계속 같이 있고 싶어읏<emoji=heart04> 앙<emoji=heart04> 언제든 붙어 있고 싶어. 사실은 계속 섹스하고 싶어읏<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「会長くんも同じ、なんだっ<emoji=heart04>\u3000うん<emoji=heart04>\u3000うんっ<emoji=heart04>\u3000はぁぁ……<emoji=heart04>\u3000おち○ちんもそう言ってるっ<emoji=heart04>\u3000好きだよって<emoji=heart04>\u3000私のこと、愛してるって……っ<emoji=heart04>\u3000はぁぁぁん<emoji=heart04>」"
translation = "「회장군도 똑같구나읏<emoji=heart04> 응<emoji=heart04> 응읏<emoji=heart04> 하아아……<emoji=heart04> 자지도 그렇게 말하고 있어읏<emoji=heart04> 좋아한다고<emoji=heart04> 나를, 사랑한다고……읏<emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「あんっ<emoji=heart04>\u3000はぁぁん<emoji=heart04>\u3000あっ<emoji=heart04>\u3000伝わってるかしら<emoji=heart04>\u3000私のおま○こも、会長くんのこと、好きって言ってるの、伝わってるかなっ<emoji=heart04>」"
translation = "「앙<emoji=heart04> 하아아앙<emoji=heart04> 앗<emoji=heart04> 전해지고 있을까<emoji=heart04> 내 보지도, 회장군을 좋아한다고 말하고 있는 거, 전해지고 있을까앗<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「あっ<emoji=heart04>\u3000はぁ……っ、あっ<emoji=heart04>\u3000そうっ<emoji=heart04>\u3000だから、もっと強く……っ<emoji=heart04>\u3000もっと伝わるように……ぃっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 하아……읏, 앗<emoji=heart04> 그래읏<emoji=heart04> 그러니까, 좀 더 강하게……읏<emoji=heart04> 좀 더 전해지도록……이잇<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「あん<emoji=heart04>\u3000はんっ<emoji=heart04>\u3000ふぅぅぅん<emoji=heart04>\u3000気持ちいい<emoji=heart04>\u3000頭バカになっちゃうくらい、気持ちいいよ<emoji=heart04>\u3000……あぁぁあっ<emoji=heart04>」"
translation = "「앙<emoji=heart04> 한읏<emoji=heart04> 후우우웅<emoji=heart04> 기분 좋아<emoji=heart04> 머리가 바보가 되어버릴 정도로, 기분 좋아<emoji=heart04> ……아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「うぅんっ<emoji=heart04>\u3000いいのっ、壊れちゃってもいいっ<emoji=heart04>\u3000会長くんにならっ<emoji=heart04>\u3000壊してほしい、からぁっ<emoji=heart04>\u3000だからぁ……っ<emoji=heart04>」"
translation = "「으응읏<emoji=heart04> 괜찮아읏, 망가져도 좋아읏<emoji=heart04> 회장군에게라면읏<emoji=heart04> 망가뜨려 줬으면 좋겠으니까아읏<emoji=heart04> 그러니까아……읏<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「あんっ<emoji=heart04>\u3000あぁぁん<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000会長くんのおち○ちんっ<emoji=heart04>\u3000もっと深くっ<emoji=heart04>\u3000子宮いっぱいつぶしてぇっ<emoji=heart04>！」"
translation = "「앙<emoji=heart04> 아아앙<emoji=heart04> 하앙읏<emoji=heart04> 회장군 자지읏<emoji=heart04> 좀 더 깊게읏<emoji=heart04> 자궁 잔뜩 뭉개줘어읏!」"

[[dialogue]]
speaker = "サーシャ"
original = "「会長くん<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000好きっ<emoji=heart04>\u3000好きなのっ<emoji=heart04>\u3000大好きっ<emoji=heart04>」"
translation = "「회장군<emoji=heart04> 앙<emoji=heart04> 좋아읏<emoji=heart04> 좋아해읏<emoji=heart04> 정말 좋아해읏<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「だから一緒っ<emoji=heart04>\u3000一緒にいこっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000私そろそろ……っ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000会長くんもっ<emoji=heart04>\u3000そうよねっ<emoji=heart04>」"
translation = "「그러니까 같이읏<emoji=heart04> 같이 가자읏<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 나 이제 곧……읏<emoji=heart04> 앗<emoji=heart04> 회장군도읏<emoji=heart04> 그렇구나읏<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「はぁぁぁぁん<emoji=heart04>\u3000会長くんと一緒にいきたいっ<emoji=heart04>\u3000だからぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000もう限界だからぁっ<emoji=heart04>\u3000会長くん、最後に……っ<emoji=heart04>」"
translation = "「하아아아앙<emoji=heart04> 회장군이랑 같이 가고 싶어읏<emoji=heart04> 그러니까아읏<emoji=heart04> 앙<emoji=heart04> 이제 한계니까아읏<emoji=heart04> 회장군, 마지막으로……읏<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「抱きしめてっ<emoji=heart04>\u3000ぎゅーってっ<emoji=heart04>\u3000それで、中……っ<emoji=heart04>\u3000中にたくさん……っ<emoji=heart04>\u3000会長くんのせーしっ<emoji=heart04>\u3000いっぱい出してっ<emoji=heart04>！！」"
translation = "「안아줘읏<emoji=heart04> 꼬옥 하고읏<emoji=heart04> 그래서, 안에……읏<emoji=heart04> 안에 잔뜩……읏<emoji=heart04> 회장군 정액읏<emoji=heart04> 잔뜩 내보내줘읏!!」"

[[dialogue]]
speaker = "サーシャ"
original = "「はぁぁぁぁ……<emoji=heart04>\u3000イクイクイクぅぅぅっ<emoji=heart04>\u3000子宮突かれて、イッちゃぅぅぅ──────っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하아아아아……<emoji=heart04> 간다간다간다아아앗<emoji=heart04> 자궁 찔려서, 가버려어어──────읏<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「ぁ――っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イッックぅぅぅぅ……っ<emoji=heart04>！！\u3000ふわあぁぁあぁぁぁぁぁあぁあぁぁぁぁぁぁっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아――읏<emoji=heart04><emoji=heart04><emoji=heart04> 가안다아아아아……읏<emoji=heart04>!! 후와아아아아아아아아아아아아아아아아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「あ、はぁぁぁぁ……<emoji=heart04>\u3000会長くんの濃いせーしっ<emoji=heart04>\u3000子宮にかかってるっ<emoji=heart04>\u3000はぅぅぅ……<emoji=heart04>\u3000溢れちゃうくらいっ<emoji=heart04>\u3000たくさんかかってる……っ<emoji=heart04>」"
translation = "「아, 하아아아아……<emoji=heart04> 회장군의 진한 정액읏<emoji=heart04> 자궁에 뿌려지고 있어읏<emoji=heart04> 하우우우……<emoji=heart04> 넘쳐흐를 정도로읏<emoji=heart04> 잔뜩 뿌려졌어……읏<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「あぁ……っ<emoji=heart04>\u3000あ……はぁ……っ<emoji=heart04>\u3000あ……っ<emoji=heart04>\u3000お腹の中、すっごく熱い……っ<emoji=heart04>\u3000こんなの覚えちゃったら……っ<emoji=heart04>\u3000会長くんのこと、もっともっと好きになっちゃう<emoji=heart04>」"
translation = "「아아……읏<emoji=heart04> 아…… 하아……읏<emoji=heart04> 아……읏<emoji=heart04> 배 속이, 정말 뜨거워……읏<emoji=heart04> 이런 거 배워버리면……읏<emoji=heart04> 회장군을, 좀 더 좀 더 좋아하게 돼버려<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「でも……いいのよね<emoji=heart04>\u3000会長くんのこと、もっと好きになっても……っ<emoji=heart04>\u3000だって……こんなに全身で……好きって言ってくれたんだもん<emoji=heart04>」"
translation = "「하지만…… 괜찮은 거지<emoji=heart04> 회장군을, 좀 더 좋아하게 되어도……읏<emoji=heart04> 그치만…… 이렇게 전신으로…… 좋아한다고 말해줬는걸<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「お互いに……好きなら、別に問題ないわよね<emoji=heart04>\u3000あ……はぁっ<emoji=heart04>\u3000はぁ……ふぅ……っ、ん……っ<emoji=heart04>」"
translation = "「서로…… 좋아한다면, 딱히 문제없겠지<emoji=heart04> 아…… 하앗<emoji=heart04> 하아…… 후우……읏, 응……읏<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「会長くん……好きよ<emoji=heart04>\u3000これまでも……これからも、ね……<emoji=heart04>」"
translation = "「회장군…… 좋아해<emoji=heart04> 지금까지도…… 앞으로도, 말이야……<emoji=heart04>」"

