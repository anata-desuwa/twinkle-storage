[[dialogue]]
speaker = "unk"
original = "第１話,天才スケーター,P"
translation = "제1화, 천재 스케이터"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「おはよう、昨日の試合見た？\u3000……え、ウソ！？\u3000フィギュアスケート見てなかったの！？\u3000柊舞亜ちゃんが金メダル取ってたじゃない！」"
translation = "「안녕, 어제 경기 봤어? ……에, 거짓말!? 피겨 스케이팅 안 본 거야!? 히이라기 마이아짱이 금메달 땄잖아!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「は～、さすが舞亜ちゃん。隙のないショートプログラムもすごかったけど、優雅なのに静かな情熱を感じさせるフリーも……あぁっ、表現する言葉が足りないっ」"
translation = "「하~, 역시 마이아짱. 빈틈없는 쇼트 프로그램도 대단했지만, 우아하면서도 정적인 열정이 느껴지는 프리도…… 아앗, 표현할 말이 부족해!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ほら動画見て。すごいでしょ？\u3000この前の世界選手権も優勝してたし、あの氷のようなクールさと透明感……まさに銀盤の妖精、リンクの星だよ！」"
translation = "「자, 영상 봐봐. 대단하지? 요전번 세계 선수권에서도 우승했고, 그 얼음 같은 쿨함과 투명감…… 그야말로 은반의 요정, 링크의 별이야!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あっ、ごめん、熱くなりすぎちゃった……。今日流星に行くんだったよね。よろしく～」"
translation = "「앗, 미안, 너무 흥분해 버렸네……. 오늘 유성에 간다고 했었지. 잘 부탁해~」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「会長さん、こんにちは。今日もよろしくお願いします。――あ」"
translation = "「회장님, 안녕하세요. 오늘도 잘 부탁드립니다. ――아」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ただいま」"
translation = "「다녀왔어」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「お疲れ様です。昨日の試合お見事でした、舞亜さん」"
translation = "「수고하셨습니다. 어제 경기는 정말 훌륭했어요, 마이아 씨」"

[[dialogue]]
speaker = "unk"
original = "どこかで見たことあるような……"
translation = "어디선가 본 적이 있는 것 같은……"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「は～、さすが舞亜ちゃん。隙のないショートプログラムもすごかったけど、優雅なのに静かな情熱を感じさせるフリーも……あぁっ、表現する言葉が足りないっ」"
translation = "「하~, 역시 마이아짱. 빈틈없는 쇼트 프로그램도 대단했지만, 우아하면서도 정적인 열정이 느껴지는 프리도…… 아앗, 표현할 말이 부족해!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ほら動画見て。すごいでしょ？\u3000この前の世界選手権も優勝してたし、あの氷のようなクールさと透明感……まさに銀盤の妖精、リンクの星だよ！」"
translation = "「자, 영상 봐봐. 대단하지? 요전번 세계 선수권에서도 우승했고, 그 얼음 같은 쿨함과 투명감…… 그야말로 은반의 요정, 링크의 별이야!」"

[[dialogue]]
speaker = "unk"
original = "！？"
translation = "!?"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ソフィ、この人は？」"
translation = "「소피, 이 사람은?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「新星学園の会長さんです。最近リクリエの兆候がありますし、さまざまな事件も起きていますから、足を運んでいただいて対策を検討しているんです」"
translation = "「신성학원의 회장님이에요. 최근 리크리에의 징후가 있고, 다양한 사건도 일어나고 있어서, 직접 오셔서 대책을 검토하고 있는 중이에요」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「そうなんだ。流星学園一年、柊舞亜です。よろしくお願いします」"
translation = "「그렇구나. 유성학원 1학년, 히이라기 마이아입니다. 잘 부탁해」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「……あれ、会長さん驚いてる。どうかした？\u3000私の顔に見覚えでも？」"
translation = "「……어라, 회장님 놀라고 있어. 왜 그래? 내 얼굴 본 적이라도 있어?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「昨日金メダル取ったんですから当然でしょう」"
translation = "「어제 금메달을 땄으니까 당연하겠죠」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「会長さんが驚かれるのも無理はありませんが、彼女は正真正銘本物の、フィギュアスケーター柊舞亜です」"
translation = "「회장님이 놀라시는 것도 무리는 아니지만, 그녀는 정진정명 진짜인, 피겨 스케이터 히이라기 마이아예요」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「私、流星のフィギュアスケート部なんだけど、あんまり学園来れてないからできるだけ顔出しておこうと思って」"
translation = "「나, 유성의 피겨 스케이팅부인데, 학원에 별로 못 오니까 가능한 한 얼굴을 비춰두려고 생각해서」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「帰国したばかりでお疲れでしょうし、ゆっくりしていて良かったんですよ。テレビ出演とかはいいんですか？」"
translation = "「귀국한 지 얼마 안 돼서 피곤하실 테니, 천천히 쉬셔도 괜찮았는데 말이죠. TV 출연 같은 건 괜찮나요?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ふふっ、ソフィに会いたかったんだよ。ちなみにテレビ取材は明日」"
translation = "「후훗, 소피가 보고 싶었거든. 참고로 TV 취재는 내일이야」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「本当はソフィも試合の見学に連れて行きたかったんだけど、星徒会で忙しくしてたしね。ソフィのこと話したら、ミランダもアシュリーも会いたがってたけど」"
translation = "「사실 소피도 경기 구경에 데려가고 싶었지만, 성도회로 바쁘게 지내고 있었으니까. 소피 이야기를 했더니, 미란다도 애슐리도 만나고 싶어 했어」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「そもそも場違いにもほどがあるのですが……。そのミランダさんもアシュリーさんも表彰台常連のトップクラスの選手じゃないですか」"
translation = "「애초에 격이 너무 다른데요……. 그 미란다 씨나 애슐리 씨는 시상대 단골인 톱 클래스 선수들이잖아요」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ま、大会とかでけっこう会うからね。ライバルだけど友達なんだ」"
translation = "「뭐, 대회 같은 데서 꽤 자주 만나니까. 라이벌이지만 친구야」"

[[dialogue]]
speaker = "unk"
original = "遠い世界の会話だ……"
translation = "먼 세상의 대화다……"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「あれ？\u3000でも新星の会長さんって女の人じゃなかったっけ？\u3000すごくエネルギーのある人だったような」"
translation = "「어라? 근데 신성의 회장님은 여자분 아니었나? 굉장히 에너지가 넘치는 사람이었던 것 같은데」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「御前試合でヴィーナス前会長に勝利して新会長になったんです。あのヴィーナスさんを破ったのは少し信じがたいことではありますが」"
translation = "「어전 시합에서 비너스 전 회장님에게 승리해서 신 회장이 되었어요. 그 비너스 씨를 꺾은 건 조금 믿기 힘든 일이긴 하지만요」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ごぜん……じあい……？」"
translation = "「어전…… 시합……?」"

[[dialogue]]
speaker = "unk"
original = "よくそういう顔される"
translation = "자주 그런 표정을 보게 된다"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ああ、ごめんなさい。あまりに聞きなれない言葉だったから」"
translation = "「아아, 미안해. 너무 생소한 말이라서」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「でも私たちスケーターは観客の前で演技するから、いつも御前試合しているようなもの……でもないか。はは」"
translation = "「하지만 우리 스케이터들은 관객 앞에서 연기하니까, 언제나 어전 시합을 하는 거나 마찬가지……는 아닌가. 하하」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「制度としては残っていましたが、近年では行われたことがない幻の行事でしたからね」"
translation = "「제도로서는 남아 있었지만, 최근에는 치러진 적이 없는 환상의 행사였으니까요」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「会長さん、そんなに強いんだ。すごいね」"
translation = "「회장님, 그렇게 강하구나. 대단하네」"

[[dialogue]]
speaker = "unk"
original = "君だってすごい"
translation = "너도 대단해"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「そう？\u3000私はちょっと有名なだけだってば」"
translation = "「그래? 난 좀 유명할 뿐이라니까」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「よし、最近ご無沙汰だったしソフィの練習見てあげる。課題はちゃんとできるようになった？」"
translation = "「좋아, 최근에 뜸했으니 소피 연습 봐줄게. 과제는 제대로 할 수 있게 됐어?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「もちろんです。星徒会の仕事があるとはいえ、練習を欠かすことはありません」"
translation = "「물론입니다. 성도회 일이 있다고는 해도, 연습을 거르는 일은 없어요」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「さすがソフィ、そうこなくちゃ。それとお土産」"
translation = "「역시 소피, 그래야지. 그리고 이거 선물」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「あ、どうも――ってこれ昨日の金メダル！？」"
translation = "「아, 감사합니―― 어라, 이거 어제 받은 금메달!?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「え？\u3000ああ、ごめん、出し間違えた」"
translation = "「에? 아아, 미안, 잘못 꺼냈어」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「カロリー低めで美味しそうなお菓子があったから買ってきたんだけど……ユニちゃんに入れたはず……あれ、ない。ポケットにも……ない」"
translation = "「칼로리 낮고 맛있어 보이는 과자가 있어서 사 왔는데…… 유니짱에 넣었을 텐데…… 어라, 없네. 주머니에도…… 없어」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「うーん……ええっと……あ、そうだ」"
translation = "「으음…… 에또…… 아, 맞다」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ごめん、さっき自分で食べたの忘れてた。どうりでお腹空いてないわけだ。はは」"
translation = "「미안, 아까 내가 먹은 거 깜빡했어. 어쩐지 배가 안 고프더라. 하하」"

[[dialogue]]
speaker = "unk"
original = "…………"
translation = "…………"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ぽかんとしないでください、会長さん。舞亜さんはこういう人なんです」"
translation = "「멍하니 있지 마세요, 회장님. 마이아 씨는 이런 사람이에요」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「今度は空港に忘れないようにしようと思ったんだけどなぁ……。次こそはちゃんと買ってくるから。ね？」"
translation = "「이번에는 공항에 잊어버리지 않도록 하려고 했는데 말이야……. 다음엔 꼭 제대로 사 올게. 응?」"

