[[dialogue]]
speaker = "unk"
original = "第４話,プリムラと初デート,P"
translation = "제4화, 프리뮬러와 첫 데이트, P"

[[dialogue]]
speaker = "unk"
original = "プリムラと交際を始めた俺は、さっそく彼女を初デートに誘うことにした。"
translation = "프리뮬러와 교제를 시작한 나는 곧바로 그녀를 첫 데이트에 초대하기로 했다."

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「今度の休日に、遊園地デートじゃと？\u3000ほほう、主をもてなそうというわけか♪」"
translation = "「이번 휴일에 유원지 데이트라고? 호호우, 주인을 대접하겠다는 것이냐♪」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「よかろう、付き合ってやるのじゃ！\u3000遅刻するでないぞ！」"
translation = "「좋다, 어울려 주마! 늦지 말거라!」"

[[dialogue]]
speaker = "unk"
original = "プリムラに快諾してもらえたことが嬉しかったのか、俺は待ち合わせの１時間前に到着してしまった。"
translation = "프리뮬러가 흔쾌히 수락해 준 것이 기뻤는지, 나는 약속 시간 1시간 전에 도착해 버렸다."

[[dialogue]]
speaker = "unk"
original = "流石にこんなに早い時間じゃあ、プリムラもいないだろうな……"
translation = "설마 이렇게 이른 시간에 프리뮬러도 있지는 않겠지……"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「そわそわ……そわそわ……」"
translation = "「안절부절…… 안절부절……」"

[[dialogue]]
speaker = "unk"
original = "（１時間前なのに、いたー！？）"
translation = "(1시간 전인데 있어!?)"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「きき、緊張してきたのじゃ……それにどうやって時間を潰す？\u3000こんなに早いと、流石に眷族もまだ来んじゃろうし……」"
translation = "「기, 긴장되기 시작했느니라…… 게다가 어떻게 시간을 때우지? 이렇게 이르면 설마 권속도 아직 안 올 테고……」"

[[dialogue]]
speaker = "unk"
original = "──おはよう！"
translation = "──안녕!"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「なぁっ──！？\u3000もう来たのじゃ！？\u3000えっ、我、時間を勘違いしておったか……！？」"
translation = "「나앗──!? 벌써 온 것이냐!? 엣, 짐이 시간을 착각한 것이냐……!?」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「何っ……貴様も楽しみで早く到着してしまった、じゃと。そ、そうじゃったか！\u3000実は我も──」"
translation = "「뭐랏…… 네놈도 기대돼서 일찍 도착해 버렸다니. 그, 그랬던 것이냐! 사실 짐도──」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「──って！？\u3000わわ、我は別に楽しみで早起きしたわけではないのじゃ！」"
translation = "「──는!? 와, 짐은 딱히 기대돼서 일찍 일어난 게 아니니라!」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「これは──そうっ！\u3000貴様がどのくらい早く到着するかを観察し、我への忠誠心の深さを測ろうと思ってじゃな……！」"
translation = "「이것은── 그래! 네놈이 얼마나 일찍 도착하는지 관찰하여 짐을 향한 충성심의 깊이를 재려고 생각해서 말이다……!」"

[[dialogue]]
speaker = "unk"
original = "ありがとう、すごく嬉しい！"
translation = "고마워, 정말 기뻐!"

[[dialogue]]
speaker = "unk"
original = "楽しみにしてくれてたんだね"
translation = "기대하고 있었구나."

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「むにゅにゅぅ……！\u3000ほっぺをもちもちするでな～い！\u3000不遜じゃぞっ……！」"
translation = "「무뉴뉴우……! 볼을 조물조물하지 마라! 불손하느니라……!」"

[[dialogue]]
speaker = "unk"
original = "（と言いつつ、嬉しそうだ）"
translation = "(라고 말하면서도 기뻐 보인다)"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「むにゅにゅぅ～……フヘへへっ<emoji=heart04>」"
translation = "「무뉴뉴우～…… 후헤헤헤<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "照れ隠しをするプリムラが可愛くて、ついついほっぺをもちもち触ってしまった。"
translation = "부끄러움을 감추는 프리뮬러가 귀여워서 나도 모르게 볼을 조물조물 만져 버렸다."

[[dialogue]]
speaker = "unk"
original = "こんな感じで、俺たちの初デートは始まった──"
translation = "이런 느낌으로 우리의 첫 데이트는 시작되었다──"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「ほほ～、これが遊園地か……！\u3000実に活気があるではないか！」"
translation = "「호호～, 이것이 유원지인가……! 참으로 활기가 넘치지 않느냐!」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「じゃが惜しむらくは、ゲートで守りをしておった女の態度じゃ。我、１０万と１０歳じゃのに、子供料金でチケットを切りおった……！」"
translation = "「하지만 아쉬운 점은 게이트에서 지키고 있던 여자의 태도니라. 짐, 10만 10살인데 어린이 요금으로 티켓을 끊다니……!」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「おまけに『お兄さんとはぐれちゃダメよ』などと！\u3000おのれぇ～っ……！」"
translation = "「게다가 『오빠랑 떨어지면 안 돼』라니! 이놈이이～……!」"

[[dialogue]]
speaker = "unk"
original = "でも恋人だって言い返してくれたよね"
translation = "하지만 연인이라고 맞받아쳐 줬잖아."

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「当然じゃ！\u3000我と眷族はツガイなのじゃから。誤解されたままでは居心地が悪いじゃろうが」"
translation = "「당연하지! 짐과 권속은 반려이니라. 오해받은 채로는 기분이 좋지 않지 않겠느냐.」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「よ～し、下がった気分を吹き飛ばすのじゃ！\u3000あの猛り狂う乗り物に乗るのじゃっ！」"
translation = "「좋아, 가라앉은 기분을 날려버리겠노라! 저 사납게 날뛰는 놀이기구에 타는 것이니라!」"

[[dialogue]]
speaker = "unk"
original = "そうしてプリムラと遊園地を練り歩くことになったのだけれど──"
translation = "그렇게 프리뮬러와 유원지를 돌아다니게 되었지만──"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「──なぬ！？\u3000身長が１５０センチないと乗れないじゃと！？」"
translation = "「──뭐랏!? 키가 150센티미터가 안 되면 탈 수 없다고!?」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「だ、大丈夫じゃ……背伸びをすれば、ほ、ほれ！\u3000１５０のラインを越えたのじゃ！」"
translation = "「괘, 괜찮느니라…… 발꿈치를 들면, 보, 보거라! 150 라인을 넘었느니라!」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「ずるはダメ？\u3000ひどいのじゃ！\u3000……乗せてくれ、頼む～っ！」"
translation = "「반칙은 안 돼? 너무하느니라! ……태워다오, 부탁하마～!」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「フフフ、幽霊屋敷とな。果たして終末兵器の我を、恐れさせることができるかのう？」"
translation = "「후후후, 유령의 집이라니. 과연 종말병기인 짐을 두렵게 할 수 있을까?」"

[[dialogue]]
speaker_original = "女性スタッフ"
speaker_translation = "여성 스태프"
original = "「中は暗いから、お兄さんとはぐれないようにね♪」"
translation = "「안은 어두우니까 오빠랑 떨어지지 않게 조심해♪」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「ちち、違うのじゃ～！\u3000こやつは我の配下であり、恋人なのじゃ～っ！」"
translation = "「트, 틀리느니라～! 이 녀석은 짐의 부하이자 연인이니라～!」"

[[dialogue]]
speaker = "unk"
original = "小さな背丈のプリムラと、行く先々で色々なトラブルはあったけれど……なんだかんだで楽しい１日になったのだった。"
translation = "작은 체구의 프리뮬러와 가는 곳마다 여러 트러블은 있었지만…… 이러니저러니 해도 즐거운 하루가 되었다."

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「すっかり日が暮れるまで遊んでしまったのじゃ。眷族よ、我は大満足じゃ！\u3000今日は誘ってくれて感謝するぞ！」"
translation = "「완전히 해가 질 때까지 놀아버렸구나. 권속이여, 짐은 대만족이니라! 오늘은 초대해 주어 감사하마!」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「しかし、我の姿……おチビのままでは楽しみきれなかったのも事実じゃ」"
translation = "「하지만 짐의 모습…… 꼬맹이인 채로는 다 즐기지 못한 것도 사실이니라.」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「我が真の姿を取り戻した時、また来ようではないか！\u3000……ん？\u3000そうじゃ、何度も言っておるじゃろう。本当の我はダイナマイトボディーなんじゃからな！」"
translation = "「짐이 진정한 모습을 되찾았을 때 다시 오지 않겠느냐! ……음? 그래, 몇 번이나 말하지 않았느냐. 진짜 짐은 다이너마이트 보디이니 말이다!」"

[[dialogue]]
speaker = "unk"
original = "でもそのためには……"
translation = "하지만 그러기 위해서는……"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「うむ。封印がすべて解かれなければならん。我の兵器としての力がすべて解放されるわけじゃから、いつのことになるか……」"
translation = "「음. 봉인이 모두 풀려야만 하느니라. 짐의 병기로서의 힘이 모두 해방되는 셈이니 언제쯤이 될지……」"

[[dialogue]]
speaker = "unk"
original = "……もしかして世界の危機？"
translation = "……혹시 세계의 위기?"

[[dialogue]]
speaker = "unk"
original = "それに封印が解かれるってことは"
translation = "게다가 봉인이 풀린다는 건."

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「フフフ、当然じゃな。我に施された封印がすべて解かれれば、それすなわち世界の終焉を意味するじゃろう！」"
translation = "「후후후, 당연하지. 짐에게 걸린 봉인이 모두 풀리면 그것은 곧 세계의 종언을 의미할 것이니라!」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「……なんての。壊しはせんよ、もうな」"
translation = "「……라니. 부수지는 않으마, 이제는.」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「想いを伝えあった貴様が、守ろうとしておる世界じゃし……我を作ったやつの思惑に、そのまま乗っかるのも癪なのじゃ」"
translation = "「마음을 나눈 네놈이 지키려 하는 세계이기도 하고…… 짐을 만든 녀석의 의도에 그대로 놀아나는 것도 불쾌하니라.」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「──ま、それでも世界征服することは、諦めておらんがの！」"
translation = "「──뭐, 그래도 세계 정복을 하는 것은 포기하지 않았지만 말이다!」"

[[dialogue]]
speaker = "unk"
original = "それってどう違うの……？"
translation = "그건 어떻게 다른 거야……?"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「全然違うのじゃ！\u3000壊さずとも、我の強さは世界中に広めなければならんじゃろう！？」"
translation = "「전혀 다르니라! 부수지 않더라도 짐의 강함은 전 세계에 알려야 하지 않겠느냐!?」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「我は悪の終末兵器！\u3000この世界で一番強いことを知らしめるのは生き甲斐なのじゃ！\u3000誰よりも目立って、すごい存在にならなければならん！」"
translation = "「짐은 악의 종말병기! 이 세계에서 가장 강하다는 것을 알리는 것은 삶의 보람이니라! 누구보다 눈에 띄고 대단한 존재가 되어야 하느니라!」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「よいか、眷族よ。貴様はずっと我の傍におるのじゃぞ！」"
translation = "「알겠느냐 권속이여. 네놈은 계속 짐의 곁에 있어야 하느니라!」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「……うむ、約束じゃ<emoji=heart04>」"
translation = "「……음, 약속이니라<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "人為的にリクリエを引き起こす……そのために製造された終末兵器『メルクリウス』。その暴力性を危険視する人は確かに多いけれど。"
translation = "인위적으로 리크리에를 일으키기 위해 제조된 종말병기 『메르쿠리우스』. 그 폭력성을 위험시하는 사람은 분명 많지만."

[[dialogue]]
speaker = "unk"
original = "俺は今、目の前にいる彼女──『プリムラ』の優しさを信じたいと思っている。"
translation = "나는 지금 눈앞에 있는 그녀── 『프리뮬러』의 상냥함을 믿고 싶다고 생각한다."

[[dialogue]]
speaker = "unk"
original = "兵器を管理する立場の魔王として。"
translation = "병기를 관리하는 입장인 마왕으로서."

[[dialogue]]
speaker = "unk"
original = "そして、彼女のことを好きだと思う、１人の男として──"
translation = "그리고 그녀를 좋아한다고 생각하는 한 남자의 한 사람으로서──"

