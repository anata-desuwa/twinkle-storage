[[dialogue]]
speaker = "クロト"
original = "「ふぅ、今日の仕事もこれで終わり……」"
translation = "「후우, 오늘의 업무도 이걸로 끝……」"

[[dialogue]]
speaker = "クロト"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker = "unk"
original = "１人で書類を片付けている最中、背後に殺気を感じて振り返る。"
translation = "혼자서 서류를 정리하던 도중, 등 뒤에서 살기를 느끼고 뒤를 돌아본다."

[[dialogue]]
speaker = "unk"
original = "するとそこには戦闘服をまとったナターシャがいて、俺の首元に刃を突き付けていた。"
translation = "그러자 그곳에는 전투복을 입은 나타샤가 있었고, 내 목에 칼날을 들이대고 있었다."

[[dialogue]]
speaker = "ナターシャ"
original = "「や、会長さん。こんにちは」"
translation = "「여어, 회장님. 안녕」"

[[dialogue]]
speaker = "クロト"
original = "「俺が暴走しなければ手を出さないんじゃなったのか？」"
translation = "「내가 폭주하지 않으면 손대지 않기로 하지 않았나?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「もちろんそうだよ。けど今の魔王が用心してるか試してみたくなってさ」"
translation = "「물론 그렇지. 하지만 지금의 마왕이 조심하고 있는지 시험해보고 싶어져서 말이야」"

[[dialogue]]
speaker = "ナターシャ"
original = "「正直、隙だらけだったよ。そんな調子じゃさっくりやられちゃうんじゃない？」"
translation = "「솔직히, 빈틈투성이였어. 그런 식이면 슥삭 당해버리지 않겠어?」"

[[dialogue]]
speaker = "unk"
original = "挑発的な笑みを浮かべるナターシャ。"
translation = "도발적인 미소를 짓는 나타샤."

[[dialogue]]
speaker = "unk"
original = "だが武器を下ろすと──俺の手を掴んで自分の豊満な胸に押し付けた。"
translation = "하지만 무기를 내리더니── 내 손을 잡아 자신의 풍만한 가슴에 밀어붙였다."

[[dialogue]]
speaker = "クロト"
original = "「！？\u3000何を……！？」"
translation = "「!? 뭘……!?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ふふ、ウブな反応だね。女の子のおっぱいを触るのは初めてだった？」"
translation = "「후후, 순진한 반응이네. 여자애 가슴을 만지는 건 처음이었어?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「私のおっぱい触ってどんな感じ？\u3000気持ちいい？\u3000大きさにはけっこう自信あるんだけど」"
translation = "「내 가슴 만져보니까 어때? 기분 좋아? 크기에는 꽤 자신 있는데」"

[[dialogue]]
speaker = "unk"
original = "ナターシャは俺の手を使って胸を揉むように、ぐりぐりと押し付けてきて、その柔らかさに下半身が熱を持つ。"
translation = "나타샤는 내 손을 사용해 가슴을 주무르듯이 꾹꾹 밀어붙여 왔고, 그 부드러움에 하반신이 열기를 띠었다."

[[dialogue]]
speaker = "クロト"
original = "「いきなり何のつもりなんだ？\u3000どうしてこんなこと……？」"
translation = "「갑자기 무슨 생각이지? 왜 이런 짓을……?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「わからない？\u3000会長さんで遊んでるんだよ」"
translation = "「모르겠어? 회장님을 가지고 노는 거야」"

[[dialogue]]
speaker = "ナターシャ"
original = "「舐められっぱなしで悔しくないの？\u3000魔王なんだったら、暗殺者の１人くらい男らしく黙らせてみたら？」"
translation = "「계속 얕보여서 분하지도 않아? 마왕이라면, 암살자 한 명 정도는 남자답게 입을 다물게 해보는 게 어때?」"

[[dialogue]]
speaker = "クロト"
original = "「……！\u3000そこまで言うなら──」"
translation = "「……! 그렇게까지 말한다면──」"

[[dialogue]]
speaker = "ナターシャ"
original = "「きゃっ」"
translation = "「꺄앗」"

[[dialogue]]
speaker = "ナターシャ"
original = "「へぇ……会長さんはこういうのが好みなんだ。いい趣味してるね」"
translation = "「헤에…… 회장님은 이런 게 취향이구나. 좋은 취미네」"

[[dialogue]]
speaker = "unk"
original = "ナターシャの挑発に乗り、腕を掴んで背後をとった。"
translation = "나타샤의 도발에 넘어가, 팔을 붙잡고 배후를 점했다."

[[dialogue]]
speaker = "unk"
original = "こうしているとナターシャを襲っているみたい……いや、実際に襲っているところか。"
translation = "이러고 있으니 나타샤를 덮치고 있는 것 같은…… 아니, 실제로 덮치고 있는 중인가."

[[dialogue]]
speaker = "クロト"
original = "「本当に抵抗しないんだな」"
translation = "「정말로 저항하지 않는군」"

[[dialogue]]
speaker = "ナターシャ"
original = "「こういう仕事してるくせに、恥ずかしながら処女だからさ。そろそろ捨てておこうと思って」"
translation = "「이런 일을 하고 있는 주제에, 부끄럽게도 처녀라서 말이야. 슬슬 버려둘까 싶어서」"

[[dialogue]]
speaker = "ナターシャ"
original = "「そのうち任務で誰かと寝ることもあるかと思ったけど、なんだかんだでそういう機会もなくてね」"
translation = "「조만간 임무 때문에 누군가와 자는 일도 있을 거라 생각했는데, 어쩌다 보니 그런 기회도 없어서 말이야」"

[[dialogue]]
speaker = "ナターシャ"
original = "「自分で言うのもなんだけど、いい体だと思うんだけどな～……ね？」"
translation = "「내가 말하긴 좀 그렇지만, 좋은 몸이라고 생각하는데 말이야~…… 그치?」"

[[dialogue]]
speaker = "unk"
original = "見せつけるようにお尻を揺らし、俺を誘うナターシャ。"
translation = "보여주듯이 엉덩이를 흔들며 나를 유혹하는 나타샤."

[[dialogue]]
speaker = "unk"
original = "大きな胸は身じろぎするだけでたぷんと揺れて、その重さと柔らかさを主張する。"
translation = "커다란 가슴은 몸을 살짝 움직이는 것만으로도 출렁이며 흔들려, 그 무게와 부드러움을 주장한다."

[[dialogue]]
speaker = "unk"
original = "腰からヒップへの括れたラインは、肉感的なお尻を強調し、否応なしに男の本能を刺激した。"
translation = "허리에서 힙으로 이어지는 잘록한 라인은 육감적인 엉덩이를 강조하며, 어쩔 수 없이 남자의 본능을 자극했다."

[[dialogue]]
speaker = "ナターシャ"
original = "「ふふ、見てる見てる。おっぱいとあそこ……会長さんのいやらしい視線を感じるよ」"
translation = "「후후, 보고 있네 보고 있어. 가슴이랑 거기…… 회장님의 음란한 시선이 느껴져」"

[[dialogue]]
speaker = "unk"
original = "暗殺者の彼女のことだから、罠かもしれない──そんな考えが頭をよぎる。"
translation = "암살자인 그녀인 만큼 함정일지도 모른다── 그런 생각이 머릿속을 스친다."

[[dialogue]]
speaker = "unk"
original = "しかし罠だと疑えば疑うほど、この誘いが魅力的に見えてくるような、甘く蠱惑的な匂いを感じてしまう。"
translation = "하지만 함정이라고 의심하면 의심할수록, 이 유혹이 매력적으로 보이는 듯한 달콤하고 고혹적인 향기가 느껴진다."

[[dialogue]]
speaker = "ナターシャ"
original = "「この期に及んで、まだ怖気づいてるの？\u3000魔王のくせにかっこわるいなぁ」"
translation = "「이 지경이 되어서도 아직 겁먹고 있는 거야? 마왕 주제에 꼴사납네」"

[[dialogue]]
speaker = "クロト"
original = "「……どうなっても知らないからな？」"
translation = "「……어떻게 돼도 난 모른다?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「どうぞ。恋人ができた時の練習だと思って、好きにやっちゃって」"
translation = "「마음대로 해. 애인이 생겼을 때의 연습이라고 생각하고, 좋을 대로 해버려」"

[[dialogue]]
speaker = "unk"
original = "ナターシャの肢体に怒張したペニスを、露わになった秘裂にあてがって──"
translation = "나타샤의 지체에 노장한 자지를, 드러난 비열에 갖다 대고──"

[[dialogue]]
speaker = "ナターシャ"
original = "「んんくぅぅ……っ！」"
translation = "「으응쿠우우……!」"

[[dialogue]]
speaker = "unk"
original = "まだ固い膣口に亀頭を押し込み、力ずくでこじ開ける。"
translation = "아직 굳게 닫힌 질구에 귀두를 밀어 넣어, 힘으로 억지로 비집고 연다."

[[dialogue]]
speaker = "unk"
original = "同時に処女膜が切れる感触がして、破瓜の証がつうっと流れた。"
translation = "동시에 처녀막이 찢어지는 감촉이 들었고, 파과의 증표가 주르륵 흘러내렸다."

[[dialogue]]
speaker = "ナターシャ"
original = "「はぁ、はっ……あはっ、ほんとにやっちゃった」"
translation = "「하아, 하윽…… 아하, 정말로 해버렸네」"

[[dialogue]]
speaker = "クロト"
original = "「ナターシャ、大丈夫？」"
translation = "「나타샤, 괜찮아?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「暗殺者だし、痛みに耐える訓練もしてるから全然平気。今まで感じたことない痛みではあるけどね」"
translation = "「암살자니까, 고통을 참는 훈련도 하고 있어서 전혀 괜찮아. 지금까지 느껴본 적 없는 통증이긴 하지만 말이야」"

[[dialogue]]
speaker = "ナターシャ"
original = "「会長さんこそ、人のこと気遣ってる余裕あるのかな？\u3000女の子のおま○こにおち○ちん入れるの初めてで、今にも射精しそうなんじゃない？」"
translation = "「회장님이야말로, 남 걱정할 여유가 있을까? 여자애 보지에 자지 넣는 거 처음이라서, 당장이라도 사정할 것 같은 거 아니야?」"

[[dialogue]]
speaker = "unk"
original = "ナターシャは処女を失いながらも、挑発的な態度を崩さない。"
translation = "나타샤는 처녀를 잃으면서도 도발적인 태도를 굽히지 않는다."

[[dialogue]]
speaker = "unk"
original = "だがナターシャの言う通り、ペニスは肉の柔らかさと熱さに包まれ、初めての快感に急激に射精欲が高まっていた。"
translation = "하지만 나타샤의 말대로, 자지는 살의 부드러움과 뜨거움에 감싸여, 첫 쾌감에 급격히 사정 욕구가 치솟고 있었다."

[[dialogue]]
speaker = "ナターシャ"
original = "「おやおや図星？\u3000魔王っていっても、やっぱり男の子なんだね。くすっ、かわいいなぁ<emoji=heart04>」"
translation = "「어라어라 정곡인가 보네? 마왕이라고 해도 역시 남자애구나. 쿠스, 귀여워라<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「出したくなったらすぐ出していいよ。そしたら『魔王は挿入しただけで射精しちゃう早漏でした』って聖庭園で言いふらしちゃうけど」"
translation = "「싸고 싶어지면 바로 싸도 돼. 그러면 『마왕은 삽입한 것만으로 사정해버리는 조루였습니다』라고 성정원에 소문내버릴 테니까」"

[[dialogue]]
speaker = "ナターシャ"
original = "「あ、怒っちゃった？\u3000ふふ、気に入らないなら力ずくで黙らせてみてよ？」"
translation = "「아, 화났어? 후후, 마음에 안 들면 힘으로 입을 다물게 해보든가?」"

[[dialogue]]
speaker = "unk"
original = "さすがにここまで言われて、気に障らないといえば嘘になる。"
translation = "과연 여기까지 듣고 기분이 상하지 않는다면 거짓말이다."

[[dialogue]]
speaker = "unk"
original = "ナターシャに煽られた苛立ちをぶつけるように、腰を動かし始めた。"
translation = "나타샤에게 자극받은 짜증을 쏟아붓듯이, 허리를 움직이기 시작했다."

[[dialogue]]
speaker = "ナターシャ"
original = "「んんぅっ……！\u3000はあぁっ……あっ……はっ……んんっ……」"
translation = "「으응으읏……! 하아앗…… 앗…… 하윽…… 으응……」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ふぅ、はぁ……はっ……会長さんのが、私の中で、動いてる……はぁ、あっ……んんぅ……」"
translation = "「후우, 하아…… 하윽…… 회장님 거가, 내 안에서, 움직이고 있어…… 하아, 앗…… 으응으으……」"

[[dialogue]]
speaker = "unk"
original = "まだ慣れていない膣の中を押し広げ、強引にペニスを前後させる。"
translation = "아직 익숙해지지 않은 질 안을 밀어 넓히며, 강제로 자지를 전후시킨다."

[[dialogue]]
speaker = "unk"
original = "初めてだからかナターシャの中はとても狭く、痛いぐらいに締め付けてきた。"
translation = "처음이라 그런지 나타샤의 안은 매우 좁았고, 아플 정도로 조여왔다."

[[dialogue]]
speaker = "ナターシャ"
original = "「んっ……はっ……これが、セックス……はあぁ……男の人のが、私の中に、入ってる……っ」"
translation = "「응…… 하윽…… 이게, 섹스…… 하아아…… 남자의 물건이, 내 안에, 들어와 있어……」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ふっ……はぁ、はぁ……会長さんの、大きくて……あっ、んっ……私の中、会長さんの形に、されちゃう……」"
translation = "「훗…… 하아, 하아…… 회장님 거, 커서…… 앗, 응…… 내 안, 회장님의 형태로, 되어버려……」"

[[dialogue]]
speaker = "unk"
original = "まだ淡い濡れ具合だが、ペニスでナターシャを征服するように、大きく前後させる。"
translation = "아직 애액이 적었지만, 자지로 나타샤를 정복하듯이 크게 왕복시킨다."

[[dialogue]]
speaker = "ナターシャ"
original = "「んんっ……！\u3000熱いのが、出たり入ったりして……ふっ……ぁっ……会長さん、乱暴だね……」"
translation = "「으응……! 뜨거운 게, 들어왔다 나갔다 해서…… 훗…… 아…… 회장님, 난폭하네……」"

[[dialogue]]
speaker = "ナターシャ"
original = "「どう？\u3000女の子を道具として使う気分は？\u3000気持ちいい？」"
translation = "「어때? 여자애를 도구로 사용하는 기분은? 기분 좋아?」"

[[dialogue]]
speaker = "unk"
original = "吐息を漏らしながらも、なおも煽りをやめないナターシャ。"
translation = "거친 숨을 내뱉으면서도 여전히 도발을 멈추지 않는 나타샤."

[[dialogue]]
speaker = "unk"
original = "返事の代わりに、ナターシャの奥めがけてペニスを突き入れた。"
translation = "대답 대신 나타샤의 안쪽 깊숙한 곳을 향해 자지를 찔러 넣었다."

[[dialogue]]
speaker = "ナターシャ"
original = "「ひぁああああっ！」"
translation = "「히야아아아앗!」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ふふ、そういうことしちゃうんだ……はぁっ……でもいいよ……会長さんの好きにして……ん、はっ……ふぁああっ……！」"
translation = "「후후, 그런 짓을 해버리다니…… 하앗…… 하지만 좋아…… 회장님 마음대로 해…… 응, 하윽…… 화아아앗……!」"

[[dialogue]]
speaker = "unk"
original = "ナターシャのことは考えず、自分が快楽を得るために、しゃにむに腰を振る。"
translation = "나타샤의 사정은 생각하지 않고, 자신이 쾌락을 얻기 위해 무턱대고 허리를 흔든다."

[[dialogue]]
speaker = "ナターシャ"
original = "「あっ、んんっ……ズン、ズン、って熱いの、打ち込まれて……はっ、あんっ……おっきなおち○ちんで、私の中、ぐちゃぐちゃにされてる……」"
translation = "「앗, 으응…… 즈음, 즈음, 하고 뜨거운 게, 박혀서…… 하윽, 아앙…… 커다란 자지로, 내 안, 엉망진창으로 만들어지고 있어……」"

[[dialogue]]
speaker = "ナターシャ"
original = "「んっ、はぁ、あっ……会長さんの、おち○ちんが……中で動いて……ふぁっ……はぁっ……私の体、会長さんのものにしようとしてるんだ……」"
translation = "「응, 하아, 앗…… 회장님의, 자지가…… 안에서 움직여서…… 화앗…… 하앗…… 내 몸, 회장님 것으로 만들려고 하고 있어……」"

[[dialogue]]
speaker = "ナターシャ"
original = "「私の中に、誰かが入ってるって、こんな感じ……ふっ、はっ……あんっ……私、会長さんに犯されてる……っ」"
translation = "「내 안에, 누군가가 들어와 있다는 건, 이런 느낌…… 훗, 하윽…… 아앙…… 나, 회장님한테 범해지고 있어……」"

[[dialogue]]
speaker = "unk"
original = "されるがままのナターシャだが、膣内からにじむ蜜は量を増し、潤った粘膜との摩擦が強い快感を生む。"
translation = "당하는 대로 있는 나타샤였지만, 질 내에서 배어 나오는 애액은 양이 늘어났고, 젖은 점막과의 마찰이 강한 쾌감을 낳는다."

[[dialogue]]
speaker = "ナターシャ"
original = "「んんっ……！？\u3000会長さんのおち○ちん、私の中で大きくなった……あっ……私の体、気に入ってくれたんだ……」"
translation = "「으응……!? 회장님 자지, 내 안에서 커졌어…… 앗…… 내 몸, 마음에 들어 해준 거구나……」"

[[dialogue]]
speaker = "ナターシャ"
original = "「はっ、あっ……会長さんのおち○ちんで、私の<ruby>膣内<rt>なか</rt></ruby>いっぱいになって……はぁ、あっ……会長さんのものにされてる……っ」"
translation = "「하윽, 앗…… 회장님 자지로, 내 질 안이 가득 차서…… 하아, 앗…… 회장님의 것으로 만들어지고 있어……」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ふぅ、はぁっ……あっ……んああぁっ……！\u3000会長さんが、深いところまで入ってきてるの、感じる……はぁはっ……あっ……ひやぁああっ！」"
translation = "「후우, 하앗…… 앗…… 응아아앗……! 회장님이, 깊은 곳까지 들어오는 거, 느껴져…… 하아하윽…… 앗…… 히야아앗!」"

[[dialogue]]
speaker = "unk"
original = "突かれる度に揺れる大きなおっぱいに手を伸ばし、鷲掴みにする。"
translation = "찔러 넣을 때마다 흔들리는 커다란 가슴에 손을 뻗어, 꽉 움켜쥔다."

[[dialogue]]
speaker = "ナターシャ"
original = "「んんん～～～っ！\u3000おっぱい、ぎゅって、されて……はぁ、あっ……おっぱい揉まれてる……ふっ……はぁんっ……」"
translation = "「으으으으으~~읏! 가슴, 꽉, 눌려서…… 하아, 앗…… 가슴 주물러지고 있어…… 훗…… 하앙……」"

[[dialogue]]
speaker = "ナターシャ"
original = "「力、強い……んっ、はぁ……私のおっぱい、そんなに気に入っちゃったの……？」"
translation = "「힘, 세네…… 응, 하아…… 내 가슴, 그렇게 마음에 들어버린 거야……?」"

[[dialogue]]
speaker = "unk"
original = "ナターシャには答えず、乳首を潰すようにきゅっと摘まむ。"
translation = "나타샤에게 대답하지 않고, 유두를 으깨듯이 꾹 꼬집는다."

[[dialogue]]
speaker = "ナターシャ"
original = "「んんっ……！？\u3000だから強いってばぁ……はぁ、ふぅ……ん……私のおっぱい、おもちゃにされてるみたい……」"
translation = "「으응……!? 그러니까 세다니까아…… 하아, 후우…… 응…… 내 가슴, 장난감이 된 것 같아……」"

[[dialogue]]
speaker = "unk"
original = "手を広げて乳房を揉みしだき、指先で乳首をこね回し、ナターシャのおっぱいを堪能する。"
translation = "손을 펼쳐 유방을 주물러대고, 손가락 끝으로 유두를 비벼 돌리며 나타샤의 가슴을 만끽한다."

[[dialogue]]
speaker = "ナターシャ"
original = "「ふぁあっ……そんなにおっぱい揉んだら、あなたの手の跡が付いちゃいそう……んんっ……それとも、マーキングしてるの？」"
translation = "「화앗…… 그렇게 가슴 주무르면, 당신 손자국이 남을 것 같아…… 으응…… 아니면, 마킹하고 있는 거야?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ひぁああっ……！\u3000また強くなった……ふっ、んん……会長さんってば、正直なんだから……」"
translation = "「히야아앗……! 또 강해졌어…… 훗, 으응…… 회장님도 참, 솔직하다니까……」"

[[dialogue]]
speaker = "ナターシャ"
original = "「はぁ、ふっ、んっ……んんっ……おっぱいとあそこ、一緒にされて……あぁっ……！\u3000会長さんに、手籠めにされちゃってるぅ……ふっ……はあぁんっ……！」"
translation = "「하아, 훗, 응…… 으응…… 가슴이랑 거기, 같이 당해서…… 아앗……! 회장님한테, 농락당해버리고 있어…… 훗…… 하아앙……!」"

[[dialogue]]
speaker = "unk"
original = "ナターシャの腕を掴んで自由を奪いながら、好き勝手に腰を振る自分本位なセックス。"
translation = "나타샤의 팔을 붙잡아 자유를 빼앗으면서, 좋을 대로 허리를 흔드는 이기적인 섹스."

[[dialogue]]
speaker = "unk"
original = "だけど止められない。ナターシャの体をもっと味わいたくて、支配したくて、強く腰を突き出した。"
translation = "하지만 멈출 수 없다. 나타샤의 몸을 더 맛보고 싶어서, 지배하고 싶어서, 강하게 허리를 찔러 넣었다."

[[dialogue]]
speaker = "ナターシャ"
original = "「ひやぁああああっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んぁっ<emoji=heart04>\u3000激し、いっ<emoji=heart04>\u3000ズンズンって、突かれてるっ<emoji=heart04>\u3000ふぁああっ<emoji=heart04>\u3000ああっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>」"
translation = "「히야아아아앗<emoji=heart04> 앗<emoji=heart04> 응아앗<emoji=heart04> 격렬, 해<emoji=heart04> 즈음즈음 하고, 찔리고 있어<emoji=heart04> 화아아앗<emoji=heart04> 아앗<emoji=heart04> 아앙<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ひぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000おち○ちん、深いところまで、来てるっ<emoji=heart04>\u3000おま○こ壊れるっ<emoji=heart04>\u3000ふぁ、あっ<emoji=heart04>\u3000んん～～っ<emoji=heart04>」"
translation = "「히앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 자지, 깊은 곳까지, 오고 있어<emoji=heart04> 보지 망가져버려<emoji=heart04> 화, 앗<emoji=heart04> 으응~~읏<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「太いおち○ちん、感じちゃうっ<emoji=heart04>\u3000はっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000おち○ちん、私の中で、暴れてるぅっ<emoji=heart04>」"
translation = "「굵은 자지, 느껴버려<emoji=heart04> 하윽<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 자지, 내 안에서, 날뛰고 있어어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "荒々しくペニスを打ち込み、膣内の粘膜と激しく摩擦させる。"
translation = "거칠게 자지를 박아 넣으며, 질 내 점막과 격렬하게 마찰시킨다."

[[dialogue]]
speaker = "unk"
original = "ナターシャを犯し、自分の欲望のためだけに使うのがたまらない。"
translation = "나타샤를 범하고, 자신의 욕망만을 위해 사용하는 것이 참을 수 없다."

[[dialogue]]
speaker = "ナターシャ"
original = "「ひやっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000会長さんの、すごいっ<emoji=heart04>\u3000おっきいので、私の中、いっぱいになってるっ<emoji=heart04>」"
translation = "「히얏<emoji=heart04> 앗<emoji=heart04> 하앗<emoji=heart04> 아앙<emoji=heart04> 회장님 거, 굉장해<emoji=heart04> 커다란 걸로, 내 안, 가득 차 있어<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「おま○こ、熱いのっ<emoji=heart04>\u3000ひぁっ<emoji=heart04>\u3000ああぁっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000犯されてるのに、お腹の奥、切ないっ……<emoji=heart04>」"
translation = "「보지, 뜨거워<emoji=heart04> 히앗<emoji=heart04> 아아앗<emoji=heart04> 응<emoji=heart04> 범해지고 있는데, 배 안쪽이, 애틋해……<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「はぁはっ、あっ、あぁっ<emoji=heart04>\u3000こんなの、初めて<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000犯されてっ<emoji=heart04>\u3000変になるっ<emoji=heart04>\u3000ふぁっ<emoji=heart04>\u3000はああぁっ<emoji=heart04>」"
translation = "「하아하윽, 앗, 아앗<emoji=heart04> 이런 거, 처음이야<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 범해져서<emoji=heart04> 이상해져버려<emoji=heart04> 화앗<emoji=heart04> 하아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "しかし突く度に艶めかしい喘ぎが上がり、膣内はたっぷりの愛液で溢れていた。"
translation = "하지만 찌를 때마다 요염한 신음이 터져 나왔고, 질 안은 듬뿍 고인 애액으로 넘쳐흐르고 있었다."

[[dialogue]]
speaker = "unk"
original = "普段のミステリアスなナターシャからは想像できない姿に、興奮がさらに膨れ上がり、力任せに下半身を叩きつける。"
translation = "평소의 미스테리어스한 나타샤에게서는 상상할 수 없는 모습에 흥분이 더욱 부풀어 올랐고, 힘껏 하반신을 부딪친다."

[[dialogue]]
speaker = "ナターシャ"
original = "「ふぁあっ<emoji=heart04>\u3000はっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000パンパンって、お尻、叩かれてるみたいっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000突くの、激しいっ<emoji=heart04>」"
translation = "「화앗<emoji=heart04> 하윽<emoji=heart04> 아앙<emoji=heart04> 팡팡 하고, 엉덩이, 얻어맞는 것 같아<emoji=heart04> 응<emoji=heart04> 으응<emoji=heart04> 찌르는 거, 격렬해<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ひぁっ、あっ、あぁっ<emoji=heart04>\u3000セックスって、こういうのなんだ<emoji=heart04>\u3000知らなかった<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁっ<emoji=heart04>」"
translation = "「히앗, 앗, 아앗<emoji=heart04> 섹스란 건, 이런 거구나<emoji=heart04> 몰랐어<emoji=heart04> 앗<emoji=heart04> 하앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "射精欲が上り詰め、限界が近づくのを感じてさらに加速する。"
translation = "사정 욕구가 정점에 달해, 한계가 다가오는 것을 느끼며 더욱 가속한다."

[[dialogue]]
speaker = "ナターシャ"
original = "「んんっ～～っ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000おち○ちん、コツコツって<emoji=heart04>\u3000奥ばっかり、当たってるっ<emoji=heart04>」"
translation = "「으응~~읏<emoji=heart04> 응<emoji=heart04> 응<emoji=heart04> 응<emoji=heart04> 자지가, 툭툭 하고<emoji=heart04> 안쪽만, 닿고 있어<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「はっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000これ、出す動きなんだ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000私のおま○こに、射精するつもりなんだ<emoji=heart04>」"
translation = "「하윽<emoji=heart04> 앗<emoji=heart04> 으응<emoji=heart04> 이거, 싸려는 움직임이구나<emoji=heart04> 아앙<emoji=heart04> 앗<emoji=heart04> 내 보지에, 사정할 생각인 거지<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ふぁああっっ<emoji=heart04><emoji=heart04>\u3000私の奥に<emoji=heart04>\u3000子宮に<emoji=heart04>\u3000ぐりぐり当たって<emoji=heart04>\u3000おち○ちんが、ここに出すぞって言ってるっ<emoji=heart04>」"
translation = "「화아아아아앗<emoji=heart04><emoji=heart04> 내 안쪽에<emoji=heart04> 자궁에<emoji=heart04> 그리그리 닿아서<emoji=heart04> 자지가, 여기다 싼다고 말하고 있어<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「これ、ドキドキするっ<emoji=heart04>\u3000子宮が、期待しちゃってるっ<emoji=heart04>\u3000会長さんの精液、受け止める準備してるのっ<emoji=heart04>」"
translation = "「이거, 두근거려<emoji=heart04> 자궁이, 기대해버리고 있어<emoji=heart04> 회장님의 정액, 받아낼 준비를 하고 있어어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ナターシャの中に出したい。ナターシャを染めたい。ナターシャを俺のものにしたい。"
translation = "나타샤의 안에 싸고 싶다. 나타샤를 물들이고 싶다. 나타샤를 내 것으로 만들고 싶다."

[[dialogue]]
speaker = "unk"
original = "欲望に衝き動かされるまま、何度も何度も子宮を責め続ける。"
translation = "욕망에 내몰리는 대로, 몇 번이고 몇 번이고 자궁을 계속 괴롭힌다."

[[dialogue]]
speaker = "ナターシャ"
original = "「ひぃっ<emoji=heart04>\u3000あっ──あっ──ひやぁあああっ<emoji=heart04>\u3000頭、おかしくなるっ<emoji=heart04>\u3000知らないの、来ちゃうっ<emoji=heart04>」"
translation = "「히잇<emoji=heart04> 앗──앗──히야아아앗<emoji=heart04> 머리, 이상해져버려<emoji=heart04> 모르는 게, 와버려어<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「んんっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000おち○ちんで、奥、叩かれて<emoji=heart04>\u3000頭、チカチカするっ<emoji=heart04>\u3000変になっちゃうっ<emoji=heart04>」"
translation = "「으응<emoji=heart04> 응<emoji=heart04> 응<emoji=heart04> 자지로, 안쪽, 얻어맞아서<emoji=heart04> 머리, 번쩍번쩍해<emoji=heart04> 이상하게 돼버려어<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「はぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ああぁんっ<emoji=heart04>\u3000ダメっ<emoji=heart04>\u3000ダメダメっ<emoji=heart04>\u3000ダメなのっ<emoji=heart04>\u3000んっ──んんっ──んんぅ～～～っ<emoji=heart04>」"
translation = "「하앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 아아앙<emoji=heart04> 안 돼<emoji=heart04> 안 돼안 돼<emoji=heart04> 안 된단 말이야<emoji=heart04> 응──으응──으응으으으~~읏<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「んぁ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000なんか、来ちゃうっ<emoji=heart04>\u3000んぁああっ──あ──あ──ひぁああっ<emoji=heart04>」"
translation = "「응아<emoji=heart04> 앗<emoji=heart04> 뭔가, 와버려어<emoji=heart04> 응아아앗──아──아──히야아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ふぁああっ<emoji=heart04>\u3000くるっ<emoji=heart04>\u3000くる、くる──くるくるくるぅっ<emoji=heart04>\u3000はっ──あっ──あっ──あっ──ひぁっ──」"
translation = "「화아아앗<emoji=heart04> 온다<emoji=heart04> 온다, 와──온다온다온다아앗<emoji=heart04> 하윽──앗──앗──앗──히앗──」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ひぃぁああぁああ～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「히이이이이이이이이이이이이이이이이이이익<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "亀頭で子宮口に押し付け、ナターシャの奥に容赦なく精を吐き出す。"
translation = "귀두로 자궁구에 밀어붙이며, 나타샤의 안쪽 깊숙이 가차 없이 정을 쏟아낸다."

[[dialogue]]
speaker = "ナターシャ"
original = "「んんんっ……<emoji=heart04>\u3000ビュクビュクって、私の中に、出てるぅ……<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000んぅ……<emoji=heart04>」"
translation = "「으으응……<emoji=heart04> 울컥울컥하고, 내 안에, 나오고 있어……<emoji=heart04> 응<emoji=heart04> 으응<emoji=heart04> 응으……<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「はあぁ……おま○この中で射精してる……<emoji=heart04>\u3000ほんとに、出されちゃった……ふぁ、はっ……はあぁ……<emoji=heart04>」"
translation = "「하아아…… 보지 안에서 사정하고 있어……<emoji=heart04> 정말로, 싸버렸어…… 하아, 하윽…… 하아아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスが脈打ち、精を注ぐ度、ナターシャの体もビクビクと痙攣する。"
translation = "페니스가 맥동하며 정을 쏟을 때마다, 나타샤의 몸도 파르르 경련한다."

[[dialogue]]
speaker = "unk"
original = "膣全体でペニスをきつく絞られながら、最後の一滴まで子宮に送り込む。"
translation = "질 전체로 페니스를 꽉 조이면서, 마지막 한 방울까지 자궁으로 밀어 넣는다."

[[dialogue]]
speaker = "ナターシャ"
original = "「あっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000お腹、いっぱいになりそ……んはぁ……あん……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 으응<emoji=heart04> 배, 가득 차버릴 것 같아…… 응하아…… 아앙……<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「はぁ、はぁ……最後まで……しちゃったぁ……」"
translation = "「하아, 하아…… 끝까지…… 해버렸네……」"

[[dialogue]]
speaker = "unk"
original = "ナターシャの体からがくりと力が抜ける。俺が腕を捕まえていなければその場に崩れ落ちていただろう。"
translation = "나타샤의 몸에서 툭 하고 힘이 빠진다. 내가 팔을 붙잡고 있지 않았다면 그 자리에 쓰러졌을 것이다."

[[dialogue]]
speaker = "ナターシャ"
original = "「ん……会長さんのが、こぼれてる……火遊びのつもりだったのに、中に出しちゃったね」"
translation = "「응…… 회장님 거가, 새어 나오고 있어…… 불장난일 생각이었는데, 안에 싸버렸네」"

[[dialogue]]
speaker = "ナターシャ"
original = "「でも背徳感があって、そこが気持ちいいのかな。想像以上っていうか……けっこう感じちゃった。大人しく負けを認めるよ」"
translation = "「하지만 배덕감이 있어서, 그게 기분 좋은 걸까. 상상 이상이랄까…… 꽤 느껴버렸어. 얌전하게 패배를 인정할게」"

[[dialogue]]
speaker = "ナターシャ"
original = "「だけどあんなに乱暴にしちゃって、恋人にやったら嫌われちゃうよ？」"
translation = "「그렇지만 그렇게 난폭하게 해버리면, 연인한테 했다간 미움받는다고?」"

[[dialogue]]
speaker = "クロト"
original = "「本当に俺で良かったのか？」"
translation = "「정말로 나라도 괜찮았던 거야?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「うん、後悔はしてない。処女を捨ててもいいくらいには、あなたのこと悪くないって思ってるから」"
translation = "「응, 후회는 안 해. 처녀를 버려도 좋을 정도로, 당신에 대해 나쁘지 않다고 생각하니까」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ま、あなたがどう思ってるかは知らないけど。今日のことは野良犬にでも噛まれたと思ってよ」"
translation = "「뭐, 당신이 어떻게 생각하는지는 모르겠지만. 오늘의 일은 들개한테 물린 셈 쳐」"

[[dialogue]]
speaker = "ナターシャ"
original = "「……おや、なんか名残惜しそうな顔してるね。忘れたの？\u3000対象に気を持たせるのも、暗殺者のテクニックだって」"
translation = "「……어라, 왠지 아쉬워하는 표정이네. 잊었어? 대상이 마음을 두게 만드는 것도, 암살자의 테크닉이라는 거」"

[[dialogue]]
speaker = "ナターシャ"
original = "「暗殺者に溺れるなんて……長生きしないよ？」"
translation = "「암살자에게 빠지다니…… 오래 못 살걸?」"

[[dialogue]]
speaker = "unk"
original = "俺の心境を見透かすように、ナターシャはくすりと笑うのだった。"
translation = "내 심경을 꿰뚫어 보듯, 나타샤는 싱긋 웃는 것이었다."

