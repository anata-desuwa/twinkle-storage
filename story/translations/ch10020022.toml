[[dialogue]]
speaker = "unk"
original = "第２話,お姉ちゃんと母,P"
translation = "제2화, 누나와 어머니, P"

[[dialogue]]
speaker = "unk"
original = "昨晩、星徒会の書類仕事を持ち帰ってリビングで作業していたら、徹夜になってしまい、うたた寝していたのだが――"
translation = "어젯밤, 성도회의 서류 업무를 가져와 거실에서 작업하다가 밤을 새워버려 꾸벅꾸벅 졸고 있었는데――"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「……朝ですよ～♪」"
translation = "「……아침이에요~♪」"

[[dialogue]]
speaker = "unk"
original = "ん～……母さん……？"
translation = "음~…… 엄마……?"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あらあら、うふふ♪\u3000は～い♪\u3000お母さんですよ～」"
translation = "「어머어머, 우후후♪ 네~에♪ 엄마예요~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「会長くんってば、無防備で、可愛い寝顔……<emoji=heart04>\u3000思わず、目覚めのキスをしたくなっちゃう――」"
translation = "「회장군은 무방비해서 귀여운 자는 얼굴……<emoji=heart04> 나도 모르게 깨우는 키스를 하고 싶어져――」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「頬っぺたに……ちゅっ<emoji=heart04>」"
translation = "「볼에…… 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ファッ！？\u3000母さんじゃない！？"
translation = "헉!? 엄마가 아니야!?"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あら、目が覚めた？\u3000正解～♪\u3000本当は、お姉ちゃんでした～♪」"
translation = "「어머, 잠이 깼어? 정답~♪ 사실은 누나였습니다~♪」"

[[dialogue]]
speaker = "unk"
original = "お姉ちゃんでもないけど！？"
translation = "누나도 아니지만!?"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「改めて、おはよう、会長くん♪\u3000朝ご飯はもう出来てるわよ～」"
translation = "「새삼스럽지만 좋은 아침, 회장군♪ 아침밥은 벌써 다 됐어~」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「しくしく……お母さん、悲しいわ……まさか、サーシャちゃんの方がお母さんだったなんて……私はもう用済みなのね……」"
translation = "「흑흑…… 엄마는 슬프구나…… 설마 사샤짱 쪽이 엄마였다니…… 난 이제 쓸모없는 거네……」"

[[dialogue]]
speaker = "unk"
original = "いや何でそうなるのさ！？"
translation = "아니 왜 그렇게 되는 건데!?"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「冗談よ。ふふっ……でも、私と間違えちゃうくらい、サーシャちゃんが母性的ってことかしら？」"
translation = "「농담이야. 후훗…… 하지만 나랑 착각할 정도로 사샤짱이 모성적이라는 걸까?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あらあら、うふふ♪\u3000リノさんと同じくらいっていうのは、褒め言葉ですね～」"
translation = "「어머어머, 우후후♪ 리노 씨랑 비슷하다는 건 칭찬이네요~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「私としても、こんなお母さん素敵だな～って、常日頃思っていましたから♪」"
translation = "「저로서도 이런 어머니라면 멋지겠다~ 하고 평소에도 생각했으니까요♪」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「本当？\u3000私も、サーシャちゃんみたいな美人で母性的な子が息子の彼女になってくれて良かったな～って、ずっと思ってたのよ♪」"
translation = "「정말? 나도 사샤짱 같은 미인에 모성적인 아이가 아들의 여자친구가 되어줘서 다행이다~ 라고 계속 생각했단다♪」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「きゃ～♪\u3000なんだか私、お姉ちゃんが出来たみたいで嬉しいです～♪」"
translation = "「꺄~♪ 왠지 저, 언니가 생긴 것 같아서 기뻐요~♪」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「そうしたら、ダブルお姉ちゃんね♪\u3000あ、それならクロト、今日は私のことも、お姉ちゃんって呼んでみる？」"
translation = "「그렇게 되면 더블 누나네♪ 아, 그럼 쿠로토, 오늘은 나도 누나라고 불러볼래?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「それならリノさん、今日だけ私と、お姉ちゃんとお母さんを交換しちゃいますか？」"
translation = "「그럼 리노 씨, 오늘만 저랑 누나랑 엄마 역할을 바꿔볼까요?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「それは面白そうかも～♪\u3000ふふふっ」"
translation = "「그거 재밌을지도~♪ 후후후」"

[[dialogue]]
speaker = "unk"
original = "なんか話が変な方向に行ってる！？"
translation = "왠지 이야기가 이상한 방향으로 가고 있어!?"

[[dialogue]]
speaker = "unk"
original = "それから俺は着替えて来て、３人で朝の食卓を囲んだ――"
translation = "그러고 나서 나는 옷을 갈아입고 와서 셋이서 아침 식탁에 둘러앉았다――"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「サーシャちゃん、朝食まで作ってくれてありがとうね。どれも凄く美味しいわ」"
translation = "「사샤짱, 아침 식사까지 만들어 줘서 고마워. 전부 정말 맛있네」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「いえいえ。こちらこそ度々、遊びに来た時に食事をご一緒させて頂いてますから」"
translation = "「아니에요. 저야말로 자주 놀러 왔을 때 식사를 함께하고 있으니까요」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「これならすぐにでもお嫁に来れちゃいそうね。というより、既にもう家族みたいな感じだけど♪」"
translation = "「이 정도면 당장이라도 시집올 수 있겠어. 그보다 이미 벌써 가족 같은 느낌이지만♪」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そう言って頂けて、嬉しいです～♪」"
translation = "「그렇게 말씀해 주시니 기뻐요~♪」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「毎朝起こしに来てくれる彼女だなんて、幸せ者ね～」"
translation = "「매일 아침 깨우러 와주는 여자친구라니, 행복한 녀석이네~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「それは～、毎朝会長くん成分を補給しないと、元気が出ないといいますか……<emoji=heart04>」"
translation = "「그건~ 매일 아침 회장군 성분을 보충하지 않으면 기운이 나지 않는다고나 할까……<emoji=heart04>」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ふふっ、ゾッコンなのね～。お熱いですこと♪」"
translation = "「후훗, 푹 빠졌구나~. 뜨겁기도 해라♪」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「――じゃあ、美味しい朝食も頂いたし、お母さん……じゃなかった、リノお姉ちゃんは出掛けて来るから」"
translation = "「――자, 맛있는 아침 식사도 먹었으니 엄마……가 아니라, 리노 누나는 다녀올게」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「サーシャママ、お留守番よろしくね♪」"
translation = "「사샤 엄마, 집 잘 보고 있어줘♪」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「は～い、いってらっしゃい～♪」"
translation = "「네~에, 다녀오세요~♪」"

[[dialogue]]
speaker = "unk"
original = "本当に役を交換してる！？"
translation = "진짜로 역할을 바꿨어!?"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「――というわけで、２人きりになっちゃったわけだけど……会長くん、どうする？」"
translation = "「――그런 고로, 둘만 남게 되어버렸는데…… 회장군, 어떻게 할래?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「せっかくだし、今日１日、サーシャママに甘えちゃう？」"
translation = "「기왕 이렇게 된 거, 오늘 하루 사샤 엄마한테 응석 부려볼래?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「――興味が無いわけじゃないけど、恥ずかしい？\u3000ふふっ、男の子だものね～♪」"
translation = "「――관심이 없는 건 아니지만 부끄러워? 후훗, 남자애인걸~♪」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「私は好奇心で凄くワクワクしちゃうわ……<emoji=heart04>\u3000ある意味、お姉ちゃんよりも甘えさせられちゃうものね？」"
translation = "「나는 호기심에 무척 두근거려……<emoji=heart04> 어떤 의미에선 누나보다 더 응석 부리게 할 수 있는걸?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「お姉ちゃんがしたいって言ったら……お願い、聞いてくれる？」"
translation = "「누나가 하고 싶다고 하면…… 부탁, 들어줄래?」"

[[dialogue]]
speaker = "unk"
original = "そ、その言い方はずるい……"
translation = "그, 그 말투는 반칙이야……"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あらあら、うふふ♪\u3000じゃあ、決まりね♪」"
translation = "「어머어머, 우후후♪ 그럼 결정이네♪」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「それじゃあ～、まずは呼び方よね～」"
translation = "「그럼~ 우선은 호칭이지~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「私のこと――ママって呼んでみて？」"
translation = "「나를―― 엄마라고 불러볼래?」"

[[dialogue]]
speaker = "unk"
original = "恥ずかしくて、無理です！"
translation = "부끄러워서 무리예요!"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「え～？\u3000２人きりなんだから、気にすることないのに～」"
translation = "「에~? 둘뿐이니까 신경 쓸 것 없는데~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「でも……ふふっ♪\u3000今日はまだ始まったばかりで、時間はたっぷりあるしね♪」"
translation = "「하지만…… 후훗♪ 오늘은 이제 막 시작됐고 시간은 듬뿍 있으니까♪」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「いっぱいイチャイチャ甘えさせて、ママって呼ばせちゃうんだから……<emoji=heart04>」"
translation = "「잔뜩 꽁냥꽁냥 응석 부리게 해서 엄마라고 부르게 만들 거니까……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "甘い誘惑に少しずつ理性が溶かされてゆくのを感じつつ、ドキドキして顔が熱くなってしまう俺なのだった――"
translation = "달콤한 유혹에 조금씩 이성이 녹아내리는 것을 느끼며, 두근거려서 얼굴이 뜨거워지는 나였다――"

