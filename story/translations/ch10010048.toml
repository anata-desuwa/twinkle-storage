[[dialogue]]
speaker = "unk"
original = "俺とフィオナは、遅めの初詣のために浅草を訪れていた。"
translation = "나와 피오나는, 늦은 첫 참배를 위해 아사쿠사를 방문했다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「フィオナは何をお祈りしたんだ？」"
translation = "「피오나는 뭘 기도했어?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「今年も世界とみんなが無事でありますように……と。誰もが願うようなことです」"
translation = "「올해도 세상과 모두가 무사하기를…… 하고요. 누구나 바라는 일이에요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「そして、あなたと今年も一緒にいられますように……って」"
translation = "「그리고, 당신과 올해도 함께 있을 수 있기를…… 하고요」"

[[dialogue]]
speaker = "unk"
original = "俺の手にそっと右手を添えて、照れくさそうにはにかむフィオナ。"
translation = "나의 손에 살며시 오른손을 포개고, 쑥스러운 듯 수줍어하는 피오나."

[[dialogue]]
speaker = "unk"
original = "一緒に横を歩きながら、その手を握る。"
translation = "함께 옆을 걸으며, 그 손을 잡는다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「なら同じだな。俺もフィオナと一緒にいたい。今年だけじゃなくて、来年も、再来年も、その先もずっと」"
translation = "「그럼 같네. 나도 피오나와 함께 있고 싶어. 올해뿐만이 아니라, 내년도, 내후년도, 그 이후로도 계속」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「それは嬉しいですけど、初詣で来年の話をするのは早くないですか？」"
translation = "「그건 기쁘지만, 첫 참배에서 내년 이야기를 하는 건 빠르지 않나요?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だってフィオナが好きだから」"
translation = "「왜냐면 피오나가 좋으니까」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「もう……ストレートに言うんですから」"
translation = "「정말…… 너무 직설적으로 말하시네요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「それなら私も同じです。好きですよ、あなた」"
translation = "「그렇다면 저도 마찬가지예요. 좋아해요, 당신」"

[[dialogue]]
speaker = "unk"
original = "初詣も終わったところで、俺たちは帰路に──"
translation = "첫 참배도 끝난 참에, 우리는 귀로에──"

[[dialogue]]
speaker = "unk"
original = "就くことなく、近くの旅館へ。"
translation = "들지 않고, 근처의 여관으로."

[[dialogue]]
speaker = "unk"
original = "「星徒会長では旅行などできませんし、たまには普段と違う場所で過ごされては」とキリカさんに勧められ、一晩泊まることになったのだった。"
translation = "「성도 회장님께서는 여행 같은 건 할 수 없으시니, 가끔은 평소와 다른 장소에서 지내시는 건 어떠신가요」라고 키리카 씨에게 권유받아, 하룻밤 묵게 된 것이었다."

[[dialogue]]
speaker = "unk"
original = "しかし２人きりになると当然──"
translation = "하지만 둘만 있게 되자 당연히──"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はあぁ……緋宮会長……<emoji=heart04>」"
translation = "「하아아…… 히노미야 회장군……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "若い盛りの男女が同じ部屋に泊まれば、やることは決まっている。"
translation = "젊은 한창때의 남녀가 같은 방에 묵으면, 할 일은 정해져 있다."

[[dialogue]]
speaker = "unk"
original = "今年初めてのフィオナとのエッチ……いわゆる姫初めだ。"
translation = "올해 처음으로 피오나와의 에치…… 이른바 히메하지메다."

[[dialogue]]
speaker = "unk"
original = "露わになった白い胸に手を伸ばし、その柔らかさを味わいながら、ピンク色の乳首に舌先で触れる。"
translation = "드러난 하얀 가슴에 손을 뻗어, 그 부드러움을 맛보면서, 분홍색 유두에 혀끝으로 접촉한다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ひぁっ……<emoji=heart04>\u3000乳首、チロチロ舐められて……あ……ん……<emoji=heart04>」"
translation = "「히얏……<emoji=heart04> 유두, 낼름낼름 핥아져서…… 아…… 응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「おっぱいも、ぐにぐにって、いっぱい触られて……ぁん……はあぁ……<emoji=heart04>\u3000もう、ちょっとがっつきすぎですよ」"
translation = "「가슴도, 주물주물하고, 잔뜩 만져져서…… 아앙…… 하아아……<emoji=heart04> 정말, 좀 너무 덤비시는 거 아니에요」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だって久しぶりだから」"
translation = "「왜냐면 오랜만이니까」"

[[dialogue]]
speaker = "unk"
original = "年末年始は魔界に行ったりモンスターが現れたりで忙しく、なかなかフィオナとエッチできなかった。"
translation = "연말연시는 마계에 가거나 몬스터가 나타나거나 해서 바빴고, 좀처럼 피오나와 에치할 수 없었다."

[[dialogue]]
speaker = "unk"
original = "寂しさともどかしさを埋めるように、フィオナの胸に顔をうずめ、彼女の温もりを存分に堪能する。"
translation = "쓸쓸함과 답답함을 채우듯이, 피오나의 가슴에 얼굴을 파묻고, 그녀의 온기를 마음껏 만끽한다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「んん……<emoji=heart04>\u3000相変わらずおっぱい好きなんですから」"
translation = "「응응……<emoji=heart04> 변함없이 가슴을 좋아하시네요」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そう言うフィオナだって、もう濡れてるよ」"
translation = "「그렇게 말하는 피오나도, 벌써 젖었잖아」"

[[dialogue]]
speaker = "unk"
original = "膣口からは蜜が溢れ、ひくひくと震えて待ちわびている。"
translation = "질구에서는 꿀이 넘쳐흐르고, 히끅히끅 떨며 기다리고 있다."

[[dialogue]]
speaker = "unk"
original = "いつもは清楚なフィオナが俺のペニスを求めていると思うと、いやらしくて興奮する。"
translation = "평소에는 청초한 피오나가 나의 페니스를 원하고 있다고 생각하니, 야릇해서 흥분한다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「だって、久しぶりですから……わかってるなら早く……」"
translation = "「왜냐면, 오랜만이니까요…… 알고 계신다면 빨리……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「早く？」"
translation = "「빨리?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「わざととぼけちゃって、緋宮会長はイジワルです……」"
translation = "「일부러 시치미 떼시고, 히노미야 회장군은 심술쟁이예요……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あなたのおち○ちん、ずっと欲しかったんです……<emoji=heart04>\u3000私のおま○こに、あなたのおち○ちん入れて……姫初めしてください<emoji=heart04>」"
translation = "「당신의 자지, 계속 갖고 싶었어요……<emoji=heart04> 저의 보지에, 당신의 자지 넣어…… 히메하지메 해주세요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "物欲しそうにねだるフィオナに応え、怒張したペニスを押し込んでいく。"
translation = "무언가를 원하는 듯 조르는 피오나에게 응해, 노장한 페니스를 밀어 넣는다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふぁああああっ！？」"
translation = "「화아아아앗!?」"

[[dialogue]]
speaker = "unk"
original = "ペニスが粘膜と擦れると、フィオナが体を弓なりに反らせ、甲高い嬌声を上げた。"
translation = "페니스가 점막과 스치자, 피오나가 몸을 활처럼 젖히며, 새된 교성을 질렀다."

[[dialogue]]
speaker = "unk"
original = "同時に膣壁がビクビクと震え、ぎゅっと強くしがみついてくる。"
translation = "동시에 질벽이 벌벌 떨며, 꽉 강하게 달라붙어 온다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「今ので軽くイッちゃった？」"
translation = "「방금 걸로 살짝 가버렸어?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はい……最近エッチしてなかったから、敏感になってるみたいで……今日はゆっくりお願いしてもいいですか？」"
translation = "「네…… 최근 에치 안 했으니까, 민감해진 것 같아서…… 오늘은 천천히 부탁드려도 될까요?」"

[[dialogue]]
speaker = "unk"
original = "すでに快感に顔を歪ませ、許しを請うような表情にゾクッと来る。"
translation = "이미 쾌감에 얼굴을 일그러뜨리고, 용서를 비는 듯한 표정에 오싹해진다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あ、あの……緋宮会長？\u3000ちょっと表情が怖いですよ……？」"
translation = "「아, 저기…… 히노미야 회장군? 표정이 조금 무서워요……?」"

[[dialogue]]
speaker = "unk"
original = "フィオナを鳴かせたい。喘がせたい。そんな嗜虐心が湧いてきて──"
translation = "피오나를 울리고 싶다. 신음하게 하고 싶다. 그런 가학심이 솟아올라──"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ひぁああああっ！？\u3000あぁっ……あっ……あんっ……<emoji=heart04>\u3000いきなり動いちゃ──んん～～～っ<emoji=heart04>」"
translation = "「히야아아앗!? 아앗…… 앗…… 아앙읏……<emoji=heart04> 갑자기 움직이면── 응응~~~읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はあぁ、はっ、あぁっ<emoji=heart04>\u3000中で、おち○ちん、擦れてっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000おち○ちん大きいっ<emoji=heart04>」"
translation = "「하아아, 핫, 아앗<emoji=heart04> 안에서, 자지, 스쳐서읏<emoji=heart04> 앗<emoji=heart04> 응읏<emoji=heart04> 자지 커읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ひやぁっ、はあぁっ、んぁああっ<emoji=heart04>\u3000おち○ちん、硬くて、太いぃっ<emoji=heart04>\u3000お腹の中、広げられて、るっ<emoji=heart04>\u3000ふぁっ、ああぁっ<emoji=heart04>」"
translation = "「히야앗, 하아앗, 응아아앗<emoji=heart04> 자지, 단단하고, 굵어읏<emoji=heart04> 배 속, 넓혀지고, 있어읏<emoji=heart04> 홧, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "腰を大きくグラインドさせ、愛液でたっぷりと濡れた粘膜と摩擦させる。"
translation = "허리를 크게 그라인드시키며, 애액으로 흥건히 젖은 점막과 마찰시킨다."

[[dialogue]]
speaker = "unk"
original = "膣内には複雑に肉ひだが並んでいて、突き入れる度にペニスに絡みついてくるのがたまらない。"
translation = "질 내부에는 복잡하게 살 주름이 늘어서 있어, 쑤셔 넣을 때마다 페니스에 휘감겨 오는 것이 참을 수 없다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ま、待ってくださ……あっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000ゆっくりって、言ったのにぃ……ふああっ<emoji=heart04>\u3000ひぁああっ<emoji=heart04>」"
translation = "「마, 기다려 주세…… 앗<emoji=heart04> 응응읏<emoji=heart04> 천천히 해달라고, 말했는데에…… 후아앗<emoji=heart04> 히야아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「おち○ちんが、私の中、出たり、入ったりぃ……んああぁっ……はあぁんっ<emoji=heart04>\u3000んんはぁ……ひやああっ<emoji=heart04>」"
translation = "「자지가, 내 안, 들락날락해애…… 응아아앗…… 하아앙읏<emoji=heart04> 응응하아…… 히야아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "柔らかなお尻を掴みながら腰を前後させると、その度にフィオナがビクビクと体を小さく跳ねさせる。"
translation = "부드러운 엉덩이를 붙잡으며 허리를 앞뒤로 움직이자, 그때마다 피오나가 벌벌 떨며 몸을 작게 튀게 한다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「んひぁ……はぁっ……ん～っ<emoji=heart04>\u3000姫初めですから、もっと優しく、してください……はっ……あっ……<emoji=heart04>」"
translation = "「응히야…… 하앗…… 응~읏<emoji=heart04> 히메하지메니까, 좀 더 상냥하게, 해주세요…… 핫…… 앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ごめん、フィオナがエッチだから無理」"
translation = "「미안, 피오나가 에치해서 무리」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「そんな──ふぁあああっ<emoji=heart04>\u3000おち○ちん、いつもより大きいですぅっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000ああっ<emoji=heart04>\u3000んんっ<emoji=heart04>」"
translation = "「그런── 화아아앗<emoji=heart04> 자지, 평소보다 커요읏<emoji=heart04> 하앗<emoji=heart04> 아앗<emoji=heart04> 응응읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あなたので、お腹の中、かき混ぜられて……んはぁ、はぁ<emoji=heart04>\u3000あなたが中にいるの、感じるっ……ひぁああぁっ<emoji=heart04>」"
translation = "「당신의 것으로, 배 속, 휘저어져서…… 응하아, 하아<emoji=heart04> 당신이 안에 있는 거, 느껴읏…… 히야아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ぐちゅぐちゅと響く卑猥な音を聞きながら、熱く蕩けた膣内の感触を楽しむ。"
translation = "구츄구츄 울리는 외설스러운 소리를 들으면서, 뜨겁게 녹은 질 내부의 감촉을 즐긴다."

[[dialogue]]
speaker = "unk"
original = "ペニスを突き出す度におっぱいが揺れて、誘われるように乳首に口付けした。"
translation = "페니스를 들이밀 때마다 가슴이 흔들려, 유혹받듯이 유두에 입맞춤했다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ひぃぃんっ！？\u3000おっぱい、吸われて……んん～～っ<emoji=heart04>\u3000ちゅうちゅうって……はぁ……それ、だめぇ……<emoji=heart04>」"
translation = "「히이잉읏!? 가슴, 빨려서…… 응응~~읏<emoji=heart04> 쭈웁쭈웁하고…… 하아…… 그거, 안 돼애……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "柔らかな胸に顔を押し付けながら、硬くなった乳首を舐め転がす。"
translation = "부드러운 가슴에 얼굴을 밀어 붙이면서, 단단해진 유두를 핥아 굴린다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ひやんっ<emoji=heart04>\u3000おっぱい、ペロペロされてるぅ……んんっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000ダメ、乳首、弱いのに……ふぁっ<emoji=heart04>\u3000ひあぁっ<emoji=heart04>」"
translation = "「히양읏<emoji=heart04> 가슴, 낼름낼름 당하고 있어어…… 응응읏<emoji=heart04> 하앗<emoji=heart04> 안 돼, 유두, 약한데…… 홧<emoji=heart04> 히아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「おっぱいとおま○こ、一緒にぃ……はぁはっ、はっ、あっ、ふああぁっ<emoji=heart04>\u3000おっぱいも、おま○こも、気持ちいいっ<emoji=heart04>」"
translation = "「가슴이랑 보지, 같이이…… 하아핫, 핫, 앗, 후아아앗<emoji=heart04> 가슴도, 보지도, 기분 좋아읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "膣口を入ったところの手前側──いわゆるＧスポットを責める。"
translation = "질구가 들어간 곳의 앞쪽── 이른바 G 스팟을 공략한다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ひぁああ～～～～っ！！？」"
translation = "「히야아~~~~~~앗!!?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あっ<emoji=heart04>\u3000そこダメっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ひあっ<emoji=heart04>\u3000おち○ちんの出っ張ってるところで、ぐりぐりって……ひやああぁっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 거기 안 돼읏<emoji=heart04> 응읏<emoji=heart04> 히앗<emoji=heart04> 자지의 튀어나온 부분으로, 부비부비하고…… 히야아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ダメっ<emoji=heart04>\u3000ダメですっ<emoji=heart04>\u3000気持ち良すぎますっ<emoji=heart04>\u3000ひぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000私の弱いところ、ばかり……ひあっ、んんぁああっ<emoji=heart04>」"
translation = "「안 돼읏<emoji=heart04> 안 돼요읏<emoji=heart04> 너무 기분 좋아요읏<emoji=heart04> 히얏<emoji=heart04> 앗<emoji=heart04> 후아앗<emoji=heart04> 저의 약한 부분, 만…… 히앗, 응응아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふぁああっ<emoji=heart04>\u3000ああっ<emoji=heart04>\u3000ダメっ、ダメダメっ<emoji=heart04>\u3000そんなにされたらっ<emoji=heart04>\u3000イッちゃいますぅっ<emoji=heart04>」"
translation = "「화아앗<emoji=heart04> 아앗<emoji=heart04> 안 돼읏, 안 돼 안 돼읏<emoji=heart04> 그렇게 당하면읏<emoji=heart04> 가버려요읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "膣壁がぶるぶると震え、きゅっと収縮してペニスを絞った。"
translation = "질벽이 부들부들 떨며, 꽉 수축하여 페니스를 조였다."

[[dialogue]]
speaker = "unk"
original = "フィオナの絶頂が近づいているのを下半身でも感じながら、同じところを刺激し続ける。"
translation = "피오나의 절정이 다가오고 있는 것을 하반신으로도 느끼면서, 같은 곳을 계속 자극한다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ひぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000そこダメっ<emoji=heart04>\u3000ダメですってばっ<emoji=heart04>\u3000んぁ──あ──あ──ふぁああっ<emoji=heart04>」"
translation = "「히얏<emoji=heart04> 앗<emoji=heart04> 거기 안 돼읏<emoji=heart04> 안 된다니까읏<emoji=heart04> 응아── 아── 아── 화아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000おま○こイクっ<emoji=heart04>\u3000イクイクっ<emoji=heart04>\u3000イッちゃいますぅ～～っ──」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 보지 가읏<emoji=heart04> 가 가읏<emoji=heart04> 가버려요~~읏──」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ひぁ～～～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「히야~~~~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "シーツをぎゅっと握り締めながら達するフィオナ。"
translation = "시트를 꽉 움켜쥐면서 절정에 이르는 피오나."

[[dialogue]]
speaker = "unk"
original = "それと同時、膣壁がぎゅっと痛いぐらい締め付けてきて、快感の強さを物語る。"
translation = "그와 동시에, 질벽이 꽉 아플 정도로 조여와, 쾌감의 강도를 이야기한다."

[[dialogue]]
speaker = "unk"
original = "だけどまだ止まらない。もっとフィオナを乱したい。"
translation = "하지만 아직 멈추지 않는다. 좀 더 피오나를 흐트러뜨리고 싶다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「んんんっ！？\u3000またおち○ちん動いて──」"
translation = "「응응응읏!? 또 자지 움직여서──」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふやあぁああっ<emoji=heart04><emoji=heart04>\u3000あっ──あっ──あっ──ふぁあああっ<emoji=heart04>\u3000おま○こイッてるのにっ<emoji=heart04>\u3000おち○ちん、ズンズンされてるっ<emoji=heart04>」"
translation = "「후야아아앗<emoji=heart04><emoji=heart04> 앗── 앗── 앗── 화아아앗<emoji=heart04> 보지 가고 있는데읏<emoji=heart04> 자지, 쿵쿵 당하고 있어읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ひぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふあぁんっ<emoji=heart04>\u3000まま、待ってっ<emoji=heart04>\u3000イッてますっ、おま○こイッてますからぁっ<emoji=heart04>」"
translation = "「히얏<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 후아앙읏<emoji=heart04> 마마, 기다려읏<emoji=heart04> 가고 있어요읏, 보지 가고 있으니까아읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ダメっ<emoji=heart04>\u3000ダメダメダメぇっ<emoji=heart04>\u3000んぁっ<emoji=heart04>\u3000ふぁああっ<emoji=heart04>\u3000少しでも、いいから、待ってくださ──ひやぁああ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「안 돼읏<emoji=heart04> 안 돼 안 돼 안 돼애읏<emoji=heart04> 응앗<emoji=heart04> 화아앗<emoji=heart04> 조금이라도, 좋으니까, 기다려 주세── 히야아아~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "『ダメ』も『待って』も逆効果だ。"
translation = "『안 돼』도 『기다려』도 역효과다."

[[dialogue]]
speaker = "unk"
original = "フィオナが切羽詰まった表情で喘ぐほど、もっともっと鳴かせたくなってしまう。"
translation = "피오나가 다급한 표정으로 신음할수록, 더욱더 울리고 싶어진다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「激しっ、激しいですっ<emoji=heart04>\u3000大きいの、奥まで、来てっ<emoji=heart04>\u3000んあっ<emoji=heart04>\u3000あっ──あっ──あっ──ひぃぁああ～～っ<emoji=heart04>」"
translation = "「격렬해읏, 격렬해요읏<emoji=heart04> 큰 거, 안쪽까지, 와읏<emoji=heart04> 응앗<emoji=heart04> 앗── 앗── 앗── 히야아아~~앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あ<emoji=heart04>\u3000あ<emoji=heart04>\u3000あ<emoji=heart04>\u3000ダメっ<emoji=heart04>\u3000ダメなのにっ<emoji=heart04>\u3000ひぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000また来るっ<emoji=heart04>\u3000来ちゃうぅっ<emoji=heart04>」"
translation = "「아<emoji=heart04> 아<emoji=heart04> 아<emoji=heart04> 안 돼읏<emoji=heart04> 안 되는데읏<emoji=heart04> 히얏<emoji=heart04> 앗<emoji=heart04> 또 와읏<emoji=heart04> 와버려어읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ダメダメダメっ<emoji=heart04>\u3000おま○こイッちゃぅっ<emoji=heart04>\u3000イクイク<emoji=heart04>\u3000ひぁ──あ──あ──」"
translation = "「안 돼 안 돼 안 돼읏<emoji=heart04> 보지 가버려읏<emoji=heart04> 가 가<emoji=heart04> 히야── 아── 아──」"

[[dialogue]]
speaker = "unk"
original = "ズン、と一気に奥まで突くと──"
translation = "쿵, 하고 단숨에 안쪽까지 쑤셔 박자──"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「んんん～～～～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「응응응~~~~~~읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "全身をぐっと強張らせながら、フィオナがまた絶頂した。"
translation = "전신을 꾹 경직시키면서, 피오나가 또 절정했다."

[[dialogue]]
speaker = "unk"
original = "精をねだるように膣全体が収縮し、射精欲が高まるのを感じながら、さらに激しくしていく。"
translation = "정액을 조르듯이 질 전체가 수축하고, 사정욕이 높아지는 것을 느끼면서, 더욱 격렬하게 해 나간다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ひやっ<emoji=heart04>\u3000ああぁっ<emoji=heart04>\u3000おち○ちんダメぇっ<emoji=heart04>\u3000イッてるのにっ<emoji=heart04>\u3000んぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ダメっ<emoji=heart04>\u3000まだイッてるからぁっ<emoji=heart04>」"
translation = "「히얏<emoji=heart04> 아아앗<emoji=heart04> 자지 안 돼애읏<emoji=heart04> 가고 있는데읏<emoji=heart04> 응앗<emoji=heart04> 앗<emoji=heart04> 안 돼읏<emoji=heart04> 아직 가고 있으니까아읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「気持ち良すぎてっ<emoji=heart04>\u3000おかしくなっ──ふぁああっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ダメっ<emoji=heart04>\u3000頭溶けちゃうのぉっ<emoji=heart04>」"
translation = "「너무 기분 좋아서읏<emoji=heart04> 이상해져읏── 화아앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 안 돼읏<emoji=heart04> 머리 녹아버려어읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ひぁあぁっ<emoji=heart04>\u3000ふぁあっ<emoji=heart04>\u3000ああぁんっ<emoji=heart04>\u3000ほんとにダメっ<emoji=heart04>\u3000ダメなのぉっ<emoji=heart04>\u3000ダメダメダメっ<emoji=heart04>\u3000おち○ちんダメぇっ<emoji=heart04>」"
translation = "「히야아앗<emoji=heart04> 화앗<emoji=heart04> 아아앙읏<emoji=heart04> 정말 안 돼읏<emoji=heart04> 안 되는 거어읏<emoji=heart04> 안 돼 안 돼 안 돼읏<emoji=heart04> 자지 안 돼애읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "すっかり敬語が崩れ、許しを請うように声を上げるフィオナ。"
translation = "완전히 존댓말이 무너지고, 용서를 비는 듯이 목소리를 높이는 피오나."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「んはぁっ、はっ、はっ──あああんっ<emoji=heart04>\u3000ダメっ<emoji=heart04>\u3000ダメっ<emoji=heart04>\u3000おち○ちんダメなのにぃっ<emoji=heart04>\u3000ひはぁっ──あっ──あっ──ふぁああっ<emoji=heart04>」"
translation = "「응하앗, 핫, 핫── 아아앙읏<emoji=heart04> 안 돼읏<emoji=heart04> 안 돼읏<emoji=heart04> 자지 안 되는데에읏<emoji=heart04> 히하앗── 앗── 앗── 화아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はぁ、あっ<emoji=heart04>\u3000おち○ちんズンズンしちゃ、ダメっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000おま○こおかしくなるっ<emoji=heart04>\u3000気持ち良くて、あたま変になるのぉっ<emoji=heart04>」"
translation = "「하아, 앗<emoji=heart04> 자지 쿵쿵하면, 안 돼읏<emoji=heart04> 앗<emoji=heart04> 보지 이상해져읏<emoji=heart04> 기분 좋아서, 머리 이상해지는 거어읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "かわいい声で喘ぐフィオナが愛おしくて、もっとめちゃくちゃにしたくて、奥めがけて打ち込む。"
translation = "귀여운 목소리로 신음하는 피오나가 사랑스러워서, 좀 더 엉망진창으로 만들고 싶어, 안쪽을 향해 박아 넣는다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ひぁあああ～～っ<emoji=heart04><emoji=heart04>\u3000あ<emoji=heart04>\u3000あ<emoji=heart04>\u3000おち○ちん、奥に、来てるっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000子宮に、当たってるぅっ<emoji=heart04>」"
translation = "「히야아아~~앗<emoji=heart04><emoji=heart04> 아<emoji=heart04> 아<emoji=heart04> 자지, 안쪽에, 오고 있어읏<emoji=heart04> 응응읏<emoji=heart04> 자궁에, 닿고 있어어읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「んぁっ<emoji=heart04>\u3000ああっ<emoji=heart04>\u3000コツ、コツ、って、奥、突かれてぇっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000子宮、キュンキュンしちゃうっ<emoji=heart04>\u3000切なくて、疼いちゃうのぉっ<emoji=heart04>」"
translation = "「응앗<emoji=heart04> 아앗<emoji=heart04> 콕, 콕, 하고, 안쪽, 찔려서어읏<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 자궁, 큥큥해버려읏<emoji=heart04> 애틋해서, 욱신거리는 거어읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ひやっ──あ──あ──んん～～っ<emoji=heart04>\u3000奥に、おち○ちんぐりぐりされてぇ<emoji=heart04>\u3000イク<emoji=heart04>\u3000イクイク<emoji=heart04>\u3000ひはぁっ──はっ──あっ──」"
translation = "「히얏── 아── 아── 응응~~읏<emoji=heart04> 안쪽에서, 자지 부비부비 당해애<emoji=heart04> 가<emoji=heart04> 가 가<emoji=heart04> 히하앗── 핫── 앗──」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふぁああああああっ<emoji=heart04><emoji=heart04>」"
translation = "「화아아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "何度目かの絶頂。俺も限界が近づいて来たのを感じ、ラストスパートをかける。"
translation = "몇 번째인지 모를 절정. 나도 한계가 다가온 것을 느끼고, 라스트 스퍼트를 건다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ひっ！？\u3000ひんっ<emoji=heart04>\u3000ひぅっ<emoji=heart04>\u3000らめっ<emoji=heart04>\u3000らめらめらめぇっ<emoji=heart04>\u3000おま○こズコズコされてっ<emoji=heart04>\u3000こわれるっ<emoji=heart04>\u3000こわれひゃうぅっ<emoji=heart04>」"
translation = "「힛!? 히잉읏<emoji=heart04> 히윳<emoji=heart04> 안 돼읏<emoji=heart04> 안 돼 안 돼 안 돼애읏<emoji=heart04> 보지 쑤컹쑤컹 당해서읏<emoji=heart04> 망가져읏<emoji=heart04> 망가져버려어읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「んんんっ<emoji=heart04>\u3000おっきなおち○ちん、ビクビクしてるっ<emoji=heart04>\u3000んぁっ<emoji=heart04>\u3000中に、しゃせー、されひゃうっ<emoji=heart04>」"
translation = "「응응응읏<emoji=heart04> 커다란 자지, 벌벌 떨고 있어읏<emoji=heart04> 응앗<emoji=heart04> 안에, 사정, 당해버려읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「出されたら、またイッひゃうっ<emoji=heart04>\u3000ふぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000おま○こが、子宮が、せーしほしいって、言ってるのっ<emoji=heart04>\u3000キュンキュンしてるのぉっ<emoji=heart04>」"
translation = "「싸지르면, 또 가버려읏<emoji=heart04> 홧<emoji=heart04> 앗<emoji=heart04> 보지가, 자궁이, 정액 원한다고, 말하고 있어읏<emoji=heart04> 큥큥하고 있는 거어읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「んひっ<emoji=heart04>\u3000ひぃっ<emoji=heart04>\u3000またイクっ<emoji=heart04>\u3000イッちゃうぅっ<emoji=heart04>\u3000らめ、らめっ<emoji=heart04>\u3000しんじゃう<emoji=heart04>\u3000しんじゃう<emoji=heart04>\u3000気持ち良すぎてしんじゃうぅっ<emoji=heart04>」"
translation = "「응힛<emoji=heart04> 히잇<emoji=heart04> 또 가읏<emoji=heart04> 가버려어읏<emoji=heart04> 안 돼, 안 돼읏<emoji=heart04> 죽어버려<emoji=heart04> 죽어버려<emoji=heart04> 너무 기분 좋아서 죽어버려어읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あ──あ──あ──あぁんっ<emoji=heart04>\u3000イクっ<emoji=heart04>\u3000イクイクイクっ<emoji=heart04>\u3000ひぁあっ──あっ──あぁっ──イッきゅうぅ～～っ──」"
translation = "「아── 아── 아── 아앙읏<emoji=heart04> 가읏<emoji=heart04> 가 가 가읏<emoji=heart04> 히야앗── 앗── 아앗── 가버려어~~읏──」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ひやぁあああ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「히야아아아~~~~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あ──あ──きてるっ<emoji=heart04>\u3000せーえき、びゅーびゅーって<emoji=heart04>\u3000わたしの中に、出されてるっ<emoji=heart04>\u3000ひぁ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふぁああ～～っ<emoji=heart04>」"
translation = "「아── 아── 오고 있어읏<emoji=heart04> 정액, 뷰-뷰-하고<emoji=heart04> 내 안에, 싸지고 있어읏<emoji=heart04> 히야<emoji=heart04> 앗<emoji=heart04> 화아아~~앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「熱いっ<emoji=heart04>\u3000熱いぃぃっ<emoji=heart04>\u3000ふぁっ……あっ……ああぁっ<emoji=heart04>\u3000熱いせーえきで、子宮、焼けちゃうぅ～～っ<emoji=heart04>」"
translation = "「뜨거워읏<emoji=heart04> 뜨거워어읏<emoji=heart04> 홧…… 앗…… 아아앗<emoji=heart04> 뜨거운 정액으로, 자궁, 타버려어~~읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "悲鳴にも似た嬌声を上げ、正気を失うような絶頂に全身を震わせるフィオナ。"
translation = "비명과도 비슷한 교성을 지르며, 정신을 잃을 듯한 절정에 전신을 떨게 하는 피오나."

[[dialogue]]
speaker = "unk"
original = "痙攣して締め付けてくる膣壁に包まれながら、亀頭を子宮口に密着させて射精を続ける。"
translation = "경련하며 조여오는 질벽에 감싸이면서, 귀두를 자궁 입구에 밀착시켜 사정을 계속한다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ひぁあんっ<emoji=heart04>\u3000まだ、出てる……<emoji=heart04>\u3000お腹の中で、おち○ちんビクビクして……っ<emoji=heart04>\u3000はぁはっ……んっ……はあぁっ<emoji=heart04><emoji=heart04>」"
translation = "「히야앙읏<emoji=heart04> 아직, 나오고 있어……<emoji=heart04> 배 속에서, 자지 벌벌 떨고 있어……읏<emoji=heart04> 하아핫…… 응읏…… 하아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あっ……あっ……<emoji=heart04>\u3000あついせーえきで、子宮、いっぱいにされてるぅ……んんっ……ん～～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「앗…… 앗……<emoji=heart04> 뜨거운 정액으로, 자궁, 가득 채워지고 있어어…… 응응읏…… 응~~~~읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はーっ……はーっ……はーっ……」"
translation = "「하ー앗…… 하ー앗…… 하ー앗……」"

[[dialogue]]
speaker = "unk"
original = "息も絶え絶えに、四肢をだらんと垂らし、脱力するフィオナ。"
translation = "숨도 헐떡이며, 사지를 축 늘어뜨리고, 탈력하는 피오나."

[[dialogue]]
speaker = "unk"
original = "その目は少し虚ろで、ここではないどこかをぼんやり見つめているかのようだ。"
translation = "그 눈은 조금 텅 비어, 이곳이 아닌 어딘가를 멍하니 바라보고 있는 듯하다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「フィオナ……？」"
translation = "「피오나……?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はぁ……はあぁ……はぁ、はぁ……」"
translation = "「하아…… 하아아…… 하아, 하아……」"

[[dialogue]]
speaker = "unk"
original = "名前を呼んでも反応がない。余韻に浸ったまま戻ってこないみたいだ。"
translation = "이름을 불러도 반응이 없다. 여운에 잠긴 채 돌아오지 않는 듯하다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ひのみやかいちょうの……いじわるぅ……<emoji=heart04>」"
translation = "「히노미야 회장군의…… 심술쟁이이……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "まだ動けないフィオナが搾り出した、俺へのかわいらしい抗議。"
translation = "아직 움직일 수 없는 피오나가 쥐어짜낸, 나에게 향한 귀여운 항의."

[[dialogue]]
speaker = "unk"
original = "この後拗ねたフィオナに機嫌を直してもらうのに、たくさん流星ライダーグッズを買ってあげたのだった。"
translation = "이후 토라진 피오나의 기분을 풀어주기 위해, 잔뜩 유성 라이더 굿즈를 사준 것이었다."

