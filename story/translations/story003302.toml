[[dialogue]]
speaker = "パテル"
original = "「ひゃっほ～い！」"
translation = "「히야호~이!」"

[[dialogue]]
speaker = "unk"
original = "パテルがバルーンでできた滑り台を滑り、水しぶきを上げて海に突っ込んだ。"
translation = "파텔이 풍선으로 된 미끄럼틀을 타고 물보라를 일으키며 바다로 뛰어들었다."

[[dialogue]]
speaker = "パテル"
original = "「アハハハッ、海って気持ちいいね！」"
translation = "「아하하하, 바다는 정말 기분 좋네!」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「次はアルモたんが滑るのだ！\u3000とうっ！」"
translation = "「다음은 알모땅이 타는 것이다! 토우!」"

[[dialogue]]
speaker = "unk"
original = "幅広い層が楽しめるようにとリップルが新たに設置した海上アスレチックを、早速有効活用していた。"
translation = "폭넓은 층이 즐길 수 있도록 리플이 새로 설치한 해상 애슬레틱을 곧바로 유용하게 활용하고 있었다."

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「滑り台楽しいのだ♪\u3000リップルに感謝なのだ♪」"
translation = "「미끄럼틀 재밌는 것이다♪ 리플에게 감사하는 것이다♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「あ、登ってみると、思ったより高いですね……ちょっとドキドキします……」"
translation = "「아, 올라와 보니 생각보다 높네요…… 조금 두근거려요……」"

[[dialogue]]
speaker = "unk"
original = "大丈夫、怖くないよ"
translation = "괜찮아, 무섭지 않아."

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「会長がそう言うなら私も……え～いっ」"
translation = "「회장님이 그렇게 말씀하신다면 저도…… 에잇」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「きゃ～っ」"
translation = "「꺄아~」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「ふふっ、会長の言う通り、滑ってみたら怖くなくて、楽しかったです。ありがとうございます～」"
translation = "「후훗, 회장님 말씀대로 타보니까 무섭지 않고 즐거웠어요. 감사해요~」"

[[dialogue]]
speaker = "パテル"
original = "「おっ、水の中でパテルストーン発見！」"
translation = "「오, 물속에서 파텔 스톤 발견!」"

[[dialogue]]
speaker = "パテル"
original = "「たくさん見つけて、あたしが一番になるんだ～♪\u3000──って、あたしが一番になってもご褒美ないじゃん！」"
translation = "「잔뜩 찾아서 내가 1등 할 거야~♪ ── 어라, 내가 1등 해도 보상이 없잖아!」"

[[dialogue]]
speaker = "パテル"
original = "「ん？\u3000どしたの？\u3000せっかくの海なのに、あたしのこと見て神妙な顔しちゃってさ」"
translation = "「응? 왜 그래? 기껏 바다에 왔는데 나를 보고 진지한 얼굴이나 하고 말이야」"

[[dialogue]]
speaker = "unk"
original = "パテルは今まで何をしていたんだ？"
translation = "파텔은 지금까지 뭘 하고 있었어?"

[[dialogue]]
speaker = "unk"
original = "堕天使パテルを倒した後、パテルは一度俺たちの前から姿を消した。"
translation = "타락천사 파텔을 쓰러뜨린 후, 파텔은 한 번 우리 앞에서 모습을 감췄다."

[[dialogue]]
speaker = "unk"
original = "その後肉体を得て、オペレーション・ペンタグラムで共闘したことはあったが、俺たちの前に現れることはあまりなく、詳しい動向は不明だった。"
translation = "그 후 육체를 얻어 오퍼레이션 펜타그램에서 공투한 적은 있었지만, 우리 앞에 나타나는 일은 거의 없었고 자세한 동향은 불분명했다."

[[dialogue]]
speaker = "パテル"
original = "「ああ～……ま、疑問に思うのも無理ないよね」"
translation = "「아아~…… 뭐, 의문을 갖는 것도 무리는 아니네」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「そうなのだ。パテルはどこで何をしていたのだ？\u3000アルモたんたちも聞いていなかったぞ」"
translation = "「그런 것이다. 파텔은 어디서 뭘 하고 있었던 것이다? 알모땅들도 듣지 못했다구」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「あんまり顔を見せてくれないから、ちょっと心配してたんですよ」"
translation = "「얼굴을 잘 안 비춰주셔서 조금 걱정하고 있었거든요」"

[[dialogue]]
speaker = "パテル"
original = "「そりゃあ、基本は不干渉主義なのがあたしだし」"
translation = "「그야 기본적으로 불간섭주의인 게 나니까」"

[[dialogue]]
speaker = "パテル"
original = "「でもそれだけじゃなくて、あたしなりにちょっとやることがあってさ」"
translation = "「하지만 그것뿐만 아니라 나 나름대로 좀 할 일이 있어서 말이야」"

[[dialogue]]
speaker = "パテル"
original = "「あたしはラクシャの力で肉体を得たから、代わりにラクシャに協力してたんだ。アルタイルじゃなくてデネブのラクシャ──あなたたちが知る市倉環にね」"
translation = "「나는 락샤의 힘으로 육체를 얻었으니까 대신 락샤에게 협력하고 있었어. 알타이르가 아니라 데네브의 락샤 ── 너희가 아는 이치쿠라 타마키에게 말이지」"

[[dialogue]]
speaker = "パテル"
original = "「あの時のラクシャは女神テルルの力を預かっていたから、敵に見つかるわけにはいかなかった。そのためにはあたしの姿を隠す力がうってつけだったんだ」"
translation = "「그때의 락샤는 여신 테루루의 힘을 맡고 있었으니까 적에게 들키면 안 됐어. 그러기 위해선 내 모습을 감추는 힘이 안성맞춤이었거든」"

[[dialogue]]
speaker = "パテル"
original = "「今はラクシャとは別行動だから、こうして姿を現した──というわけ」"
translation = "「지금은 락샤와 별개로 행동하니까 이렇게 모습을 드러낸 ── 거지」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「なるほど……ちゃんとした理由があったのだ」"
translation = "「과연…… 제대로 된 이유가 있었던 것이다」"

[[dialogue]]
speaker = "パテル"
original = "「あたしにはあたしの仕事もあるから、あんまり引っ込んでばかりいられないしね」"
translation = "「나에게도 내 일이 있으니까 너무 처박혀 있을 수만은 없기도 하고」"

[[dialogue]]
speaker = "unk"
original = "あたしの仕事……？"
translation = "내 일……?"

[[dialogue]]
speaker = "パテル"
original = "「おっと、また死神トークしちゃうところだった。せっかくのレジャーだし、今のは聞いてなかったことにして」"
translation = "「오 이런, 또 사신 토크를 할 뻔했네. 기껏 온 레저니까 지금 건 못 들은 걸로 해줘」"

[[dialogue]]
speaker = "パテル"
original = "「それよりこれ見てこれ。サメだよサメ」"
translation = "「그보다 이거 봐 이거. 상어야 상어」"

[[dialogue]]
speaker = "パテル"
original = "「そして海の死神といえば──シャチ！」"
translation = "「그리고 바다의 사신이라고 하면 ── 범고래!」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「そこはサメじゃないんですか！？\u3000映画では海の死神ですよ！？」"
translation = "「거긴 상어 아닌가요!? 영화에선 바다의 사신이라구요!?」"

[[dialogue]]
speaker = "パテル"
original = "「いや～、人間界においては、サメよりシャチの方が強いのが自然の摂理だからね」"
translation = "「이야~ 인간계에 있어서는 상어보다 범고래가 강한 게 자연의 섭리니까 말이야」"

[[dialogue]]
speaker = "パテル"
original = "「大きなクジラを狩ることもあるし、海の死神と表現するならやっぱりシャチじゃないかな」"
translation = "「커다란 고래를 사냥하기도 하고, 바다의 사신이라고 표현한다면 역시 범고래 아닐까」"

[[dialogue]]
speaker = "パテル"
original = "「ちなみにこのサメの名前はフカヒレくん。水着の間は、死神の大鎌じゃなくてこの子が相棒だよ」"
translation = "「참고로 이 상어의 이름은 샥스 군. 수영복 차림일 때는 사신의 대낫 대신 이 아이가 파트너야」"

[[dialogue]]
speaker = "unk"
original = "サメ好きなの？"
translation = "상어 좋아해?"

[[dialogue]]
speaker = "パテル"
original = "「いや別に。死神的に、特定の生き物に好き嫌いの感情を持つことはないかな。ただの気分だよ」"
translation = "「아니 딱히. 사신으로서 특정 생물에게 호불호 감정을 갖는 일은 없으려나. 그냥 기분 탓이야」"

[[dialogue]]
speaker = "パテル"
original = "「ねぇねぇ、魔王、一緒に滑り台滑ろうよ？」"
translation = "「저기 저기, 마왕, 같이 미끄럼틀 타자」"

[[dialogue]]
speaker = "パテル"
original = "「あ、それとも<b>おにーさん</b>って呼んだ方がいい？\u3000あなたも<b>プルちゃん</b>って呼んでいいよ」"
translation = "「아, 아니면 오빠라고 부르는 게 좋아? 당신도 푸루 짱이라고 불러도 돼」"

[[dialogue]]
speaker = "パテル"
original = "「ほら、こっちこっち。おにーさんは後ろね」"
translation = "「자, 여기 여기. 오빠는 뒤에 앉아」"

[[dialogue]]
speaker = "パテル"
original = "「いくよ──わ～～っ！」"
translation = "「간다── 와아~~!」"

[[dialogue]]
speaker = "unk"
original = "勢いよく海にダイブし、白い水しぶきが上がった。"
translation = "세차게 바다로 다이브하며 하얀 물보라가 일었다."

[[dialogue]]
speaker = "unk"
original = "すぐに水面に浮かび上がるが──パテルの姿が見えない。"
translation = "곧바로 수면으로 떠올랐지만 ── 파텔의 모습이 보이지 않는다."

[[dialogue]]
speaker = "パテル"
original = "「デーデンデーデンデーデン……」"
translation = "「빰밤빰밤빰밤……」"

[[dialogue]]
speaker = "パテル"
original = "「シャーッ！！」"
translation = "「샤아앗!!」"

[[dialogue]]
speaker = "２人"
original = "「わーーっ！？」"
translation = "「와아앗!?」"

[[dialogue]]
speaker = "パテル"
original = "「アハハ、驚いてる驚いてる♪」"
translation = "「아하하, 놀란다 놀라♪」"

[[dialogue]]
speaker = "unk"
original = "パテル、後ろ後ろ！"
translation = "파텔, 뒤에 뒤에!"

[[dialogue]]
speaker = "パテル"
original = "「後ろ？\u3000後ろに何か──」"
translation = "「뒤? 뒤에 뭐가 ──」"

[[dialogue]]
speaker = "サメ"
original = "「シャーーーッ！！」"
translation = "「샤아아아앗!!」"

[[dialogue]]
speaker = "パテル"
original = "「サメだーっ！！？」"
translation = "「상어다!!?」"

[[dialogue]]
speaker = "２人"
original = "「きゃーーっ！！？」"
translation = "「꺄아아악!!?」"

[[dialogue]]
speaker = "パテル"
original = "「サメ対決ならフカヒレくんが受けて立つぞー！\u3000フシャーッ！」"
translation = "「상어 대결이라면 샥스 군이 상대해 주마! 프샤아앗!」"

[[dialogue]]
speaker = "サメ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "パテル"
original = "「あれ、行っちゃった。何だったんだろ、あれ？」"
translation = "「어라, 가버렸네. 뭐였을까, 저건?」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「リップルが用意したアトラクションなのか？\u3000でもあのサメは……」"
translation = "「리플이 준비한 어트랙션인 건가? 하지만 저 상어는……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「サメは映画とテーマパークでは人気ですからね～」"
translation = "「상어는 영화나 테마파크에서 인기니까요~」"

[[dialogue]]
speaker = "パテル"
original = "「あ、パテルストーン発見。あのサメが落としていったのかな？」"
translation = "「아, 파텔 스톤 발견. 저 상어가 떨어뜨리고 간 걸까?」"

[[dialogue]]
speaker = "unk"
original = "腑に落ちないところがありながらも、パテルストーンの回収は順調に進んだのだった。"
translation = "석연치 않은 구석이 있으면서도, 파텔 스톤 회수는 순조롭게 진행되었다."

