[[dialogue]]
speaker = "unk"
original = "第１話,附属校の生徒会長,P"
translation = "제1화, 부속교의 학생회장, P"

[[dialogue]]
speaker = "unk"
original = "御前試合に勝ち、星徒会長に就任してから間もない、ある日のこと――"
translation = "어전 시합에서 이겨 성도회장에 취임한 지 얼마 되지 않은 어느 날――"

[[dialogue]]
speaker = "？？？"
original = "「失礼致します。会長さん、只今お時間はありますでしょうか？」"
translation = "「실례하겠습니다. 회장님, 지금 시간 좀 괜찮으신가요?」"

[[dialogue]]
speaker = "unk"
original = "はい、大丈夫ですが、キミは……？"
translation = "네, 괜찮습니다만, 당신은……?"

[[dialogue]]
speaker = "？？？"
original = "「ありがとうございます。私は流星学園<b>附属校</b>の生徒で――」"
translation = "「감사합니다. 저는 유성학원 <b>부속교</b> 학생으로――」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「<b>生徒会長</b>を務めております、３年生の<ruby>白詰<rt>しろつめ</rt></ruby>サチと申します。本日は新しく就任された新星学園の会長さんにご挨拶をと思い、やってきた次第です」"
translation = "「<b>학생회장</b>을 맡고 있는 3학년 시로츠메 사치라고 합니다. 오늘은 새로 취임하신 신성학원 회장님께 인사를 드리고자 찾아왔습니다.」"

[[dialogue]]
speaker = "unk"
original = "附属校の会長……！\u3000これはご丁寧にどうも"
translation = "부속교 회장……! 이거 정중하시군요."

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「私はプリマステラでもありますので、今後は協力してモンスターと戦うことも多いかと思います。その時はよろしくお願いしますね」"
translation = "「저는 프리마스텔라이기도 하므로, 앞으로 협력해서 몬스터와 싸울 일도 많을 거라 생각합니다. 그때는 잘 부탁드려요.」"

[[dialogue]]
speaker = "？？？"
original = "「サチさんはすごいんですよ～。附属生でありながら、本校の星徒会メンバーに匹敵すると言われる程の実力を持つと言われていて」"
translation = "「사치 씨는 대단하다고요~. 부속생이면서 본교 성도회 멤버에 필적한다고 일컬어질 정도의 실력을 갖췄다고들 하죠.」"

[[dialogue]]
speaker = "？？？"
original = "「１年前にリクリエの原因になるかもしれない災厄を防いだことで、特別にプリマステラの資格が与えられた、附属校最強の生徒会長なんです！」"
translation = "「1년 전에 리크리에의 원인이 될지도 모를 재앙을 막아낸 일로 특별히 프리마스텔라 자격이 주어진, 부속교 최강의 학생회장이랍니다!」"

[[dialogue]]
speaker = "unk"
original = "四つ葉の髪飾りが点滅して、声が……！？"
translation = "네잎클로버 머리장식이 깜빡이며 목소리가……!?"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「トレジアンナさん！\u3000いきなり喋り出さないで下さい！\u3000会長さんがびっくりしているじゃないですかっ」"
translation = "「トレジアンナ 씨! 갑자기 말을 꺼내지 마세요! 회장님이 깜짝 놀라셨잖아요!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「おっと、これは失礼しました。私も自己紹介しないとですね！」"
translation = "「오호, 이거 실례했습니다. 저도 자기소개를 해야겠군요!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「変・身！」"
translation = "「변·신!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「えっ、ちょっ――」"
translation = "「엣, 잠까――」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「魔法少女トレジャー☆サチ！\u3000今日は特に平和を守る為じゃないけど、可愛く参上♪」"
translation = "「마법소녀 트레저☆사치! 오늘은 딱히 평화를 지키기 위해서가 아니지만, 귀엽게 등장♪」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「勝手に名乗らないで貰えます！？\u3000あと変身も！\u3000初対面の人に恥ずかしいじゃないですかっ」"
translation = "「멋대로 이름 붙이지 말아 줄래요!? 그리고 변신도요! 처음 만난 사람한테 부끄럽잖아요!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「改めまして、サチさんの武器『ルーレットロット』に憑依しております、トレジアンナと申します♪\u3000まあ、とりあえず魔法少女の相棒的な存在だと思って頂ければ」"
translation = "「다시 인사드리죠, 사치 씨의 무기 『룰렛 롯드』에 빙의해 있는 トレジアンナ라고 합니다♪ 뭐, 일단 마법소녀의 파트너 같은 존재라고 생각하시면 돼요.」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「あっ、ちなみに変身してない時は、サチさんの付けてる四つ葉のクローバーの髪飾りに憑依してます♪」"
translation = "「앗, 참고로 변신하지 않았을 때는 사치 씨가 하고 있는 네잎클로버 머리장식에 빙의해 있답니다♪」"

[[dialogue]]
speaker = "unk"
original = "えっと……魔法少女というのは？"
translation = "저기…… 마법소녀라는 건?"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「そ、それは、トレジアンナさんが勝手に言っているだけで……」"
translation = "「그, 그건 トレジアンナ 씨가 멋대로 말하는 것뿐이라서……」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「実は私とサチさんは、この世界に散らばっている危険なアーティファクト、『ロストアイテム』というものを収集しているのです」"
translation = "「사실 저와 사치 씨는 이 세계에 흩어져 있는 위험한 아티팩트, 『로스트 아이템』이라는 것을 수집하고 있어요.」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「私もロストアイテムの１つなんですけど、２年前にサチさんと出会ってから、魔法少女として収集を手伝って貰ってる形ですね」"
translation = "「저도 로스트 아이템 중 하나입니다만, 2년 전에 사치 씨와 만난 이후로 마법소녀로서 수집을 도와달라고 하고 있는 형태죠.」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ちょっ……何ベラベラ喋ってるんですか！？\u3000いつもロストアイテムは危険だから、クラスの皆には秘密ですよとか言ってるじゃないですか！」"
translation = "「잠깐…… 뭘 그렇게 술술 말하는 거예요!? 항상 로스트 아이템은 위험하니까 반 친구들한테는 비밀이라고 했잖아요!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ん～、何か新星の会長さんは、ロストアイテム収集で重要になって来そうな予感がするんですよね～。なので、先に正体を明かしちゃいました♪\u3000てへぺろ☆」"
translation = "「음~ 왠지 신성의 회장님은 로스트 아이템 수집에서 중요해질 것 같은 예감이 든단 말이죠~. 그래서 먼저 정체를 밝혀버렸습니다♪ 데헷☆」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「いつもながら適当過ぎません！？\u3000しかも説明が雑だから、会長さん半信半疑の顔してますけど！？」"
translation = "「항상 너무 적당히 하는 거 아니에요!? 게다가 설명이 부실해서 회장님 표정이 반신반의하고 있잖아요!?」"

[[dialogue]]
speaker = "unk"
original = "いやでも、心当たりはあるから理解できるよ"
translation = "아니, 짚이는 구석이 있어서 이해할 수 있어."

[[dialogue]]
speaker = "unk"
original = "ヴィーナスの『未来の日記』……あれも、もしかするとロストアイテムなのかもしれない。"
translation = "비너스의 『미래의 일기』…… 그것도 어쩌면 로스트 아이템일지도 모른다."

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「え！？\u3000そうなんですか？\u3000まさかトレジアンナさんはそれを知っていて……」"
translation = "「에!? 그런가요? 설마 トレジアンナ 씨는 그걸 알고서……」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「勘が当たりましたね！」"
translation = "「예감이 적중했네요!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ダメだ、この杖……！」"
translation = "「안 되겠다, 이 지팡이……!」"

[[dialogue]]
speaker = "unk"
original = "とりあえず、何かあれば力を貸せると思う"
translation = "일단 무슨 일이 생기면 힘을 보탤 수 있을 것 같아."

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ありがとうございます、会長さん♪\u3000よかったですね、サチさん。これも<b>幸運体質</b>によるラッキーですよ、きっと！」"
translation = "「감사합니다, 회장님♪ 잘됐네요, 사치 씨. 이것도 <b>행운</b> <b>체질</b>에 의한 럭키예요, 분명!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「あのですね。私はあくまで人事を尽くして天命を待つ主義なのであって、幸運頼りの行き当たりばったりは好きじゃないと、何度も……」"
translation = "「저기 말이죠. 저는 어디까지나 진인사대천명 주의라서, 행운에 기댄 복불복은 좋아하지 않는다고 몇 번이나……」"

[[dialogue]]
speaker = "unk"
original = "幸運体質って？"
translation = "행운 체질이라니?"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ああ、えっと、私が生まれつき持ってる固有の星術で、『幸運の流れを引き寄せる』ことが出来るんですよ」"
translation = "「아, 그게, 제가 태어날 때부터 가진 고유 성술로, 『행운의 흐름을 끌어당기는』 것이 가능하거든요.」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「認定された術式名は『<ruby>幸運流星<rt>ラッキースター</rt></ruby>』。自動発動型、というか正確には私自身も制御は出来ないんですけど、簡単に言うと幸運体質ってことですね」"
translation = "「인정된 술식명은 『<ruby>행운유성<rt>럭키 스타</rt></ruby>』. 자동 발동형, 이라기보다 정확히는 저 자신도 제어는 불가능하지만, 간단히 말하면 행운 체질이라는 거죠.」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「嘘みたいですけど、本当にサチさんは超が付くレベルのラッキーガールなんですよ～？\u3000だからこそ私は、サチさんを自身のマスターとして、魔法少女に選んだんですから♪」"
translation = "「거짓말 같지만 정말로 사치 씨는 초월적인 레벨의 럭키 걸이라니까요~? 그렇기에 저는 사치 씨를 자신의 마스터로서 마법소녀로 선택한 거니까요♪」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「そのうち戦闘で、お見せできるかもしれません。ひとまず、私もこの後、生徒会の仕事がありますので、今日はこの辺りでお暇しようと思います」"
translation = "「조만간 전투에서 보여드릴 수 있을지도 모르겠네요. 일단 저도 이 후에 학생회 업무가 있으니 오늘은 이쯤에서 실례하겠습니다.」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「それではまた……って、わわっ！？\u3000急に足元が滑って！？」"
translation = "「그럼 다음에…… 어, 와왓!? 갑자기 발이 미끄러져서!?」"

[[dialogue]]
speaker = "unk"
original = "危ない！"
translation = "위험해!"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「痛たた……足元には何も無かったはずなのに、いきなり滑るなんてどうして……って、えっ！？」"
translation = "「아야야…… 발밑엔 아무것도 없었을 텐데 갑자기 미끄러지다니 어째서…… 어, 엣!?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「かかか会長さん！？\u3000顔が近い近い近い！\u3000っていうか、どこ触って！？」"
translation = "「회회회회장님!? 얼굴이 너무 가까워요 가까워 가까워! 그보다 어딜 만지는 거예요!?」"

[[dialogue]]
speaker = "unk"
original = "受け止めたつもりだったんだけど、その……"
translation = "받쳐주려던 것뿐이었는데, 그게……"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「え？\u3000両手がなにかに引っ掛かって抜けない？\u3000って、それは私の、パ、パパパ……！」"
translation = "「에? 양손이 무언가에 걸려서 안 빠진다고요? 그, 그건 제 패, 패패패……!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「パンツですね！」"
translation = "「팬티네요!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「え――」"
translation = "「에――」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「エッチなことは禁止ですぅぅぅ～～～～～～～～～っ！！！」"
translation = "「야한 짓은 금지예요오오오오오오오오오오옷!!!」"

[[dialogue]]
speaker = "unk"
original = "うわぁっ！？\u3000ごめん！"
translation = "우와앗!? 미안!"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「う～ん、これはラッキーですね！」"
translation = "「음~ 이건 럭키네요!」"

[[dialogue]]
speaker = "unk"
original = "叫ぶサチを横目に、１人納得したように言うトレジアンナさんなのだった。"
translation = "비명을 지르는 사치를 곁눈질하며 혼자 납득한 듯 말하는 トレジアンナ 씨였다."

