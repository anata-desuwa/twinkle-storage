[[dialogue]]
speaker = "？？？"
original = "「ヘンタイ……嗚呼、タイヘンよい響きです……！」"
translation = "「변태…… 아아, 아주 좋은 울림이군요……!」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「ご挨拶が遅れました。私、当カジノ『ラビットガーデン』の総支配人──ダッチと申します」"
translation = "「인사가 늦었습니다. 저, 본 카지노 『래빗 가든』의 총지배인── 더치라고 합니다.」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「歓迎いたしますよ。新星学園の星徒会長、緋宮クロト様」"
translation = "「환영합니다. 신성학원의 성도회장, 히노미야 쿠로토 님.」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「貴女は公安委員会所属のネゴシエーター。コードネーム『チャッティー』……立朽ネーゼマイン様ですね」"
translation = "「당신은 공안위원회 소속의 네고시에이터. 코드네임 『채티』…… 타치쿠치 네제마인 님이시군요.」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「……どうしてその名前まで」"
translation = "「……어떻게 그 이름까지.」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「そちらの淑女は流星市国の五名門、<ruby>千園寺<rt>せんおんじ</rt></ruby>財閥の次女、ヒルディオーネ様。嗚呼、『<ruby>白昼の極星<rt>エトワール・イルソーレ</rt></ruby>』の名にふさわしい美貌です！」"
translation = "「그쪽의 숙녀분은 유성시국 오명문, 치온지 재벌의 차녀, 힐디오네 님. 아아, 『백주의 극성』이라는 이름에 걸맞은 미모입니다!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「貴方、なぜ私たちの情報を……！？」"
translation = "「당신, 어째서 우리의 정보를……!?」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「そして……おや？\u3000貴女は存じ上げませんね。お名前をお伺いしても？」"
translation = "「그리고…… 어라? 당신은 잘 모르겠군요. 성함을 여쭤봐도?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「あんまりでしょう！？\u3000秘密結社ゴールデングース総帥！\u3000泣く子も黙るバンデット・セナリィとは私のこと！」"
translation = "「너무하시네요!? 비밀 결사 골든 구스 총수! 우는 아이도 그친다는 밴디트 세나리가 바로 저예요!」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「申し訳ございません。私、ゆえあって九浄家カジノ内で交わされた言葉でなければ見聞きができないのです」"
translation = "「죄송합니다. 저는 사정이 있어 쿠죠 가문 카지노 내에서 오간 말이 아니면 보고 들을 수가 없거든요.」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「しかし秘密結社……？\u3000秘密すぎて名前が広まっていないのでは？\u3000会社の運営は大丈夫なのでしょうか」"
translation = "「하지만 비밀 결사……? 너무 비밀이라 이름이 퍼지지 않은 것 아닙니까? 회사 운영은 괜찮은 건가요.」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ムキー！？\u3000ぶっ飛ばされてぇんですの！？」"
translation = "「무키!? 날려버리고 싶으신 거예요!?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「まぁセナリィの会社の認知度は置いておくとして……」"
translation = "「뭐 세나리 회사의 인지도는 제쳐두고……」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「置いておいちゃ駄目ですわ！？」"
translation = "「제쳐두면 안 되요!?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ダッチ、だっけ。単刀直入に聞くけど、九浄家のカジノに出てくるトランプモンスターは……」"
translation = "「더치였나. 단도직입적으로 묻겠는데, 쿠죠 가문 카지노에 나타나는 트럼프 몬스터는……」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「はい。すべてこの空間に住む者たちです。私の手下でございますね」"
translation = "「네. 전부 이 공간에 사는 자들입니다. 제 부하들이지요.」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「神隠し事件の犯人も……？」"
translation = "「행방불명 사건의 범인도……?」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「ええ、ええ！\u3000私でございます！」"
translation = "「네, 네! 바로 저입니다!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「随分とあっさり認めましたわね。このカジノに飛ばされてから、公安委員会の調査のことなど、多少の説明は受けましたが……」"
translation = "「상당히 순순히 인정하시네요. 이 카지노로 날려 온 뒤로 공안위원회의 조사 같은 거에 대해 약간의 설명은 들었습니다만……」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「この空間は一体何なんですの！？\u3000それに、あなたは何者でいらっしゃいますの！？」"
translation = "「이 공간은 도대체 무엇인가요!? 게다가 당신은 누구신가요!?」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「当カジノ『ラビットガーデン』は、九浄家カジノの裏側に貼りつくようにして存在を隠す、異世界カジノ……」"
translation = "「본 카지노 『래빗 가든』은 쿠죠 가문 카지노의 이면에 달라붙어 존재를 숨기는 이세계 카지노……」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「元の空間は皆様もよくご存じでしょう──アステラですよ。そこに少々、私の力で手を加えております」"
translation = "「원래 공간은 여러분도 잘 아시겠죠── 아스텔라입니다. 거기에 제 힘으로 약간 손을 좀 댔지요.」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「アステラを自分の力で改造……？\u3000そんなこと、モンスターにできるわけありませんわ……」"
translation = "「아스텔라를 자기 힘으로 개조……? 그런 거, 몬스터가 할 수 있을 리 없어요……」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「一介の、人語も解さぬモンスターには無理でしょう。しかし私は違う。なぜなら、私はモンスターではないからです」"
translation = "「일개의, 인어도 알아듣지 못하는 몬스터에겐 무리겠지요. 하지만 저는 다릅니다. 왜냐하면 저는 몬스터가 아니기 때문입니다.」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「私は自我を持った『ロストアイテム』。博識な星徒会長様ならば、この意味がお分かりでしょう？」"
translation = "「저는 자아를 가진 『로스트 아이템』. 박식한 성도회장님이라면 이 의미를 알고 계시겠죠?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ロストアイテム……？\u3000聞いたことがない単語だね」"
translation = "「로스트 아이템……? 들어본 적 없는 단어네.」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「何ですの会長様、その『ロストアイテム』って。売ったら高値で売れそうですが」"
translation = "「뭐예요 회장님, 그 『로스트 아이템』이란 거. 팔면 비싸게 팔릴 것 같아요.」"

[[dialogue]]
speaker = "unk"
original = "『ロストアイテム』とは──はるか昔……リクリエで世界が再構築されるよりも以前、すでに消え去った歴史の中で製造された、特殊な力を持つオーパーツだ。"
translation = "『로스트 아이템』이란── 아주 먼 옛날…… 리크리에로 세계가 재구축되기보다 이전, 이미 사라진 역사 속에서 제조된 특수한 힘을 가진 오파츠다."

[[dialogue]]
speaker = "unk"
original = "その多くは休眠状態だったが、リクリエ到来の影響でオーパーツたちが目覚めてしまっているらしい。今まで俺は、いくつかのロストアイテムの騒動に巻き込まれていた。"
translation = "그 대부분은 휴면 상태였으나, 리크리에 도래의 영향으로 오파츠들이 깨어나 버린 모양이다. 지금까지 나는 몇 가지 로스트 아이템 소동에 휘말렸었다."

[[dialogue]]
speaker = "unk"
original = "ロストアイテムは魔法少女たちが秘密裏に回収する役目を担っている。混乱を避けるためにあまりこの話は広めないと、トレジアンナさんとは約束を交わしている──"
translation = "로스트 아이템은 마법소녀들이 비밀리에 회수하는 역할을 맡고 있다. 혼란을 피하기 위해 이 이야기는 별로 퍼뜨리지 않겠다고 트레지안나 씨와는 약속을 나눴다──"

[[dialogue]]
speaker = "unk"
original = "俺は魔法少女たちの存在は隠しつつ、リクリエとはまた別個の『世界にバグを引き起こす可能性のある危険なアイテムである』ことをセナリィたちに伝えた。"
translation = "나는 마법소녀들의 존재는 숨기면서, 리크리에와는 또 별개의 『세계에 버그를 일으킬 가능성이 있는 위험한 아이템이다』라는 것을 세나리 일행에게 전했다."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「そんなものが……リクリエとは出自の違う、異能を持った特殊なアイテム、ですか」"
translation = "「그런 것이…… 리크리에와는 출처가 다른, 이능을 가진 특수한 아이템, 인가요.」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ロストアイテムはそれぞれ、司っている二つ名に応じた権能を持つ……ふーん。なるほどね」"
translation = "「로스트 아이템은 각각 담당하는 이명에 따른 권능을 가진다…… 흐음. 과연 그렇군.」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「しかしアステラもモンスターも、リクリエを由来とする異常のはずですわ。それを操り、改造するだなんて……」"
translation = "「하지만 아스텔라도 몬스터도 리크리에를 유래로 하는 이상일 텐데 말이예요. 그것을 조종하고 개조하다니……」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「フフフ。そう褒めないでくださいませ、セナリィ様」"
translation = "「후후후. 그렇게 칭찬하지 마십시오, 세나리 님.」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「褒めてませんわ！\u3000貴方が私だけ知らなかったこと、まだ根に持っておりますからね！？」"
translation = "「칭찬 안 했어요! 당신이 저만 몰랐던 거, 아직 뒤끝 남아 있으니까요!?」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「いやはや申し訳ない限りです……では無礼のお詫びにお伝えしましょう。私が司る権能は……『欲望』です」"
translation = "「이런 이런, 정말 죄송할 따름입니다…… 그럼 무례의 사과로 전해드리지요. 제가 담당하는 권능은…… 『욕망』입니다.」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「私は『欲望』のロストアイテムのダッチ。名前のとおり、己の欲望を具現化する力を備えております」"
translation = "「저는 『욕망』의 로스트 아이템 더치. 이름 그대로 자신의 욕망을 구현화하는 힘을 갖추고 있습니다.」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「アステラを改造できたのも、リクリエモンスターを手なずけられているのも、今ここに貴女がたをご招待できたのも──」"
translation = "「아스텔라를 개조할 수 있었던 것도, 리크리에 몬스터를 길들인 것도, 지금 이곳에 당신들을 초대할 수 있었던 것도──」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「すべて！\u3000<b>私が望んだからそうなった</b>のですよ！」"
translation = "「전부! <b>내가</b> <b>바랐기</b> <b>때문에</b> <b>그렇게</b> <b>된</b> 것입니다!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ふざけた雰囲気だけど……会長、こいつヤバいよ。今まで見てきたアステラモンスターの比じゃない……」"
translation = "「실없는 분위기지만…… 회장, 이 녀석 위험해. 지금까지 봐왔던 아스텔라 몬스터와는 비교도 안 돼……」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「それで？\u3000拉致した上に頭のおかしな衣装を着させた目的、そろそろ喋って欲しいですわね！」"
translation = "「그래서? 납치한 데다 머리 이상한 의상을 입힌 목적, 슬슬 말해주길 바라요!」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「承知いたしました。子ウサギの皆様……私とゲームをしていただけませんか？」"
translation = "「알겠습니다. 아기 토끼 여러분…… 저와 게임을 해주지 않겠습니까?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ゲーム……？」"
translation = "「게임……?」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「ええ。命と尊厳を賭けたゲームです！」"
translation = "「네. 목숨과 존엄을 건 게임입니다!」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「私、現実世界で誘拐した方々とゲームをするのが生き甲斐なのですよ」"
translation = "「전 현실 세계에서 유괴한 분들과 게임을 하는 게 삶의 낙이거든요.」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「勝てば現実への帰還を許し……しかし負ければ私のモノになっていただく。そういう類のデスゲームです」"
translation = "「이기면 현실로의 귀환을 허락하고…… 하지만 지면 제 것이 되어 주셔야 하는. 그런 종류의 데스 게임입니다.」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「誘拐した直後に意識を奪い去り、傀儡にしても良いのですが……それではあまりにも趣がなさすぎますゆえ」"
translation = "「유괴한 직후에 의식을 뺏어 꼭두각시로 만들어도 좋지만…… 그건 너무 운치가 없으니까요.」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「ゲームを通して相手の性格を知る。嗜好を知る。心を知る……そうして理解を深めたのち──私のモノにする」"
translation = "「게임을 통해 상대의 성격을 안다. 기호를 안다. 마음을 안다…… 그렇게 이해를 넓힌 뒤── 제 것으로 만든다.」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「それでこそ私の子ウサギコレクションは価値が増す──そう考えているのです、私」"
translation = "「그래야만 제 아기 토끼 컬렉션은 가치가 더해진다── 저는 그렇게 생각하고 있습니다.」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「子ウサギコレクションって……」"
translation = "「아기 토끼 컬렉션이라니……」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ま──まさか！\u3000あちらでトランプモンスターと戯れているバニーガールの方々は……！？」"
translation = "「서── 설마! 저기서 트럼프 몬스터와 놀고 있는 바니걸 분들은……!?」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「そのとおり。私が<ruby>拐<rt>かどわ</rt></ruby>かした、九浄家のカジノで失踪を遂げた方々です」"
translation = "「그렇습니다. 제가 납치한, 쿠죠 가문 카지노에서 실종된 분들입니다.」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「美しい女性はそのままバニーガールに。男性のお客は若い女性へと変身させて、後は同じ……」"
translation = "「아름다운 여성은 그대로 바니걸로. 남성 손님은 젊은 여성으로 변신시키고 그 뒤론 똑같죠……」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「このカジノのゲームで負ければ一生、私に逆らえない仕組み……ずうっとここの住人でいていただくということです……フフフ！」"
translation = "「이 카지노 게임에서 지면 평생 저에게 거스를 수 없는 구조…… 영원히 이곳의 주민으로 계시게 된다는 겁니다…… 후후후!」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「私に勝てばこのアステラカジノから現実世界へお返ししましょう……よろしいですか、淑女の皆様？」"
translation = "「저에게 이기면 이 아스텔라 카지노에서 현실 세계로 돌려보내 드리지요…… 괜찮으시겠습니까, 숙녀 여러분?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ハっ。何を勝手な理由をツラツラと──あなたの目の前にいるのは星騎士ですわよ！？」"
translation = "「하. 뭘 제멋대로인 이유를 주절주절── 당신 눈앞에 있는 건 성기사라고요!?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「女帝フォーム、起動しますわ！\u3000けちょんけちょんにしてやりますわよ！！」"
translation = "「여제 폼, 기동하겠어요! 아주 박살을 내주겠어요!!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「あ──あれ？\u3000あれれっ！？\u3000変身できませんわ……！？」"
translation = "「어── 어라? 어라라!? 변신할 수 없어요……!?」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「ご説明が遅くなりました。当カジノは『暴力行為を一切禁止』しております」"
translation = "「설명이 늦었군요. 본 카지노는 『폭력 행위를 일절 금지』하고 있습니다.」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「私の『欲望』の力によって、そのようなルールをこの世界に強制しています。相手に危害を加える星力行使は一切不可能」"
translation = "「제 『욕망』의 힘에 의해 그런 규칙을 이 세계에 강제하고 있지요. 상대에게 위해를 가하는 성력 행사는 일절 불가능.」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「そんなのアリですの！？」"
translation = "「그런 게 어디 있나요!?」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「フフフ！\u3000だってこうしなくては、星騎士の皆様と遊べないではありませんか！」"
translation = "「후후후! 그야 이렇게 하지 않으면 성기사 여러분과 놀 수 없지 않겠습니까!」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「さぁ、ゲームだ！\u3000ゲームをしましょう、皆様！」"
translation = "「자, 게임이다! 게임을 합시다, 여러분!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「……度し難い趣味をしておりますわね」"
translation = "「……정말이지 구제 불능인 취미를 가지고 계시네요.」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「まったくヘレナ様……これは報酬、弾んでもらわなくちゃなりませんわよ！」"
translation = "「정말이지 헬레나 님…… 이건 보수, 두둑이 받아내야겠어요!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「もしも勝ったら……私たちだけじゃない。ここに誘拐された人たちも全員、外に出すことはできるのかな？」"
translation = "「만약 이기면…… 우리뿐만이 아니야. 여기 유괴된 사람들도 전부 밖으로 내보내 줄 수 있는 거야?」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「ええ。貴女たちの『欲望』がそう望むのであれば！\u3000叶えましょうとも！」"
translation = "「네. 당신들의 『욕망』이 그렇게 바란다면! 들어드리도록 하죠!」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「さぁ……状況は飲み込めましたか？\u3000それでは楽しいゲームのスタートです！！」"
translation = "「자…… 상황 파악은 되셨나요? 그럼 즐거운 게임의 스타트입니다!!」"

