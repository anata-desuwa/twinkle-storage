[[dialogue]]
speaker = "unk"
original = "第３話,恋愛の副作用,P"
translation = "제3화, 연애의 부작용, P"

[[dialogue]]
speaker = "unk"
original = "ある日、俺が他の星徒会メンバーと共に書類仕事をしていると、アニマ先輩が訪ねて来て――"
translation = "어느 날, 내가 다른 성도회 멤버들과 함께 서류 작업을 하고 있자 아니마 선배가 찾아와서――"

[[dialogue]]
speaker = "アニマ（覚醒）"
original = "「仕事中のところ、失礼するヨ」"
translation = "「일하는 중에 실례하마」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あら、アニマ先輩、こんにちは！\u3000ひょっとしてまた、新しい薬が完成したの？」"
translation = "「어머, 아니마 선배, 안녕하세요! 혹시 또 새로운 약이 완성된 건가요?」"

[[dialogue]]
speaker = "アニマ（覚醒）"
original = "「ああ。ヴィーナス、その通りダ♪」"
translation = "「아아. 비너스, 네 말이 맞단다♪」"

[[dialogue]]
speaker = "マトイ"
original = "「えっ、この間完成したって言ってたけど、また！？\u3000アニマ先輩、このところ発明頻度がすごくないですか！？」"
translation = "「엣, 얼마 전에 완성됐다고 하셨는데 또요!? 아니마 선배, 요즘 발명 빈도가 엄청나지 않나요!?」"

[[dialogue]]
speaker = "アニマ（覚醒）"
original = "「ノヴァフォームに覚醒したおかげで、新たな能力『思考加速』を手に入れたからネ。研究スピードが上がって大助かりだヨ♪」"
translation = "「노바 폼으로 각성한 덕분에 새로운 능력 『사고 가속』을 손에 넣었으니까 말이야. 연구 스피드가 올라가서 큰 도움이 된단다♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「アニマちゃん、最近ノヴァフォームをよく着ているわよね～。通常フォームよりも星力の消耗が激しいはずなのに、すごいわ～」"
translation = "「아니마 짱, 요즘 노바 폼을 자주 입고 있네~. 통상 폼보다 성력 소모가 격렬할 텐데 대단해~」"

[[dialogue]]
speaker = "アニマ（覚醒）"
original = "「フヒ♪\u3000これは会長との絆――愛の証だからナ♪\u3000色々と試しているんダ」"
translation = "「후히♪ 이것은 회장과의 유대―― 사랑의 증표니까 말이야♪ 이것저것 시험해보고 있단다」"

[[dialogue]]
speaker = "アナ"
original = "「アニマ先輩が自ら率先してノヴァフォームを長時間維持する実験を行っているおかげで、わかったことも多い」"
translation = "「아니마 선배가 스스로 앞장서서 노바 폼을 장시간 유지하는 실험을 해준 덕분에 알게 된 점도 많아요」"

[[dialogue]]
speaker = "アナ"
original = "「どうやら戦闘用の星術さえ使わなければ、それなりにノヴァフォームの状態を維持することはできるようです」"
translation = "「아무래도 전투용 성술만 사용하지 않는다면 어느 정도 노바 폼 상태를 유지하는 것은 가능한 모양입니다」"

[[dialogue]]
speaker = "アナ"
original = "「また、使い込んでいけばいずれ、通常戦闘服の出力がノヴァフォーム時のものへ近づいて行くみたいです。まあ、これは本当に長期的な話になりそうですが」"
translation = "「또한 계속 사용해 나가면 언젠가 통상 전투복의 출력이 노바 폼 때의 것에 가까워지는 모양이에요. 뭐, 이건 정말 장기적인 이야기가 되겠지만요」"

[[dialogue]]
speaker = "アニマ（覚醒）"
original = "「メイプル曰く、絆のアルケインコードは潜在能力を覚醒させる力、らしいからネ」"
translation = "「메이플 말로는 유대의 아르케인 코드는 잠재 능력을 각성시키는 힘, 인 모양이니까」"

[[dialogue]]
speaker = "アニマ（覚醒）"
original = "「フヒ、アニマは星騎士としては天才ではないという自覚があったガ、まさかまだ先の可能性があったとは――」"
translation = "「후히, 아니마는 성기사로서 천재는 아니라는 자각이 있었다만, 설마 아직 앞선 가능성이 있었을 줄이야――」"

[[dialogue]]
speaker = "アニマ（覚醒）"
original = "「これもまた、実験してみなければ結果はわからナイ、という例だナ。気づけたのは会長のおかげダ。感謝するヨ♪」"
translation = "「이것도 또한 실험해보지 않으면 결과를 알 수 없다, 는 예로구나. 깨달을 수 있었던 건 회장 덕분이야. 감사하마♪」"

[[dialogue]]
speaker = "unk"
original = "いえいえ、俺はアニマ先輩の彼氏ですから"
translation = "아니에요, 저는 아니마 선배의 남자친구니까요"

[[dialogue]]
speaker = "サーシャ"
original = "「あら～♪」"
translation = "「어머나~♪」"

[[dialogue]]
speaker = "アナ"
original = "「お熱いですね」"
translation = "「뜨겁네요」"

[[dialogue]]
speaker = "アニマ（覚醒）"
original = "「おっと……コホン。さて、ノヴァフォームの話題になったところで、新薬の効果を発表しよう。名付けて――」"
translation = "「이런…… 큼큼. 자, 노바 폼 화제가 나온 김에 신약의 효과를 발표하마. 이름하여――」"

[[dialogue]]
speaker = "アニマ（覚醒）"
original = "「『ノヴァシンクロン』！\u3000研究の結果、アニマ達がノヴァフォームに変身した際、会長の中にある魔王の力と共鳴して、より強力な力を発揮できているコトが判明してイルが――」"
translation = "「『노바 싱크론』! 연구 결과, 아니마들이 노바 폼으로 변신했을 때 회장 안에 있는 마왕의 힘과 공명하여 더욱 강력한 힘을 발휘하고 있다는 사실이 판명되어 있지만――」"

[[dialogue]]
speaker = "アニマ（覚醒）"
original = "「ならば逆に、会長もノヴァフォームと共鳴するコトで、アニマ達の能力や技を使うことが可能なんじゃないか？\u3000とアニマは閃いてネ」"
translation = "「그렇다면 반대로 회장도 노바 폼과 공명함으로써 아니마들의 능력이나 기술을 사용하는 것이 가능하지 않을까? 하고 아니마는 생각했단다」"

[[dialogue]]
speaker = "アニマ（覚醒）"
original = "「つまり、今この薬を会長が飲めば、アニマのノヴァフォームと同等の力を発揮できるはず、というわけダ♪」"
translation = "「즉, 지금 이 약을 회장이 마시면 아니마의 노바 폼과 동등한 힘을 발휘할 수 있을 터, 라는 것이지♪」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「なにそれ面白そう～！」"
translation = "「뭐야 그거 재밌겠다~!」"

[[dialogue]]
speaker = "マトイ"
original = "「相変わらずのトンデモ強力効果で、にわかには信じがたいけど――」"
translation = "「여전히 말도 안 되는 강력한 효과라 선뜻 믿기 힘들지만――」"

[[dialogue]]
speaker = "unk"
original = "もちろん試しますよ"
translation = "물론 시험해볼게요"

[[dialogue]]
speaker = "unk"
original = "俺はアニマ先輩に向けて、グッと親指を立ててみせる。"
translation = "나는 아니마 선배를 향해 엄지를 척 들어 보인다."

[[dialogue]]
speaker = "アナ"
original = "「おお～」"
translation = "「오오~」"

[[dialogue]]
speaker = "マトイ"
original = "「判断が早い！」"
translation = "「판단이 빨라!」"

[[dialogue]]
speaker = "サーシャ"
original = "「愛の力ね～♪」"
translation = "「사랑의 힘이네~♪」"

[[dialogue]]
speaker = "アニマ（覚醒）"
original = "「フヒ♪\u3000なら、お願いするヨ、会長」"
translation = "「후히♪ 그럼 부탁할게, 회장」"

[[dialogue]]
speaker = "unk"
original = "今更迷うこともなく、アニマ先輩を信じている俺は薬を一気飲みする。相変わらず、飲みやすさまで考えてくれていて、色の割に意外と美味しい。"
translation = "이제 와서 망설일 것도 없이, 아니마 선배를 믿고 있는 나는 약을 단숨에 들이킨다. 여전하네, 마시기 편하게 배려해준 덕분인지 색깔에 비해서 의외로 맛있다."

[[dialogue]]
speaker = "unk"
original = "そして、飲み終わるや否や、効果はすぐに表れて――"
translation = "그리고 다 마시기 무섭게 효과는 바로 나타나서――"

[[dialogue]]
speaker = "マトイ"
original = "「か、会長が、アニマ先輩とまったく同じ形状のノヴァフォーム衣装に変身した！？」"
translation = "「회, 회장이 아니마 선배랑 완전히 똑같은 형태의 노바 폼 의상으로 변신했어!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「しかもいつもの副作用で、女の子の体に変身してるから似合っているわ！\u3000可愛いじゃない♪」"
translation = "「게다가 평소의 부작용으로 여자아이 몸으로 변신한 상태라 잘 어울려! 귀엽잖아♪」"

[[dialogue]]
speaker = "アニマ（覚醒）"
original = "「おお～！\u3000なるほど、アニマと共鳴した結果、戦闘服もアニマとペアルックに変化したというわけカ。面白イ♪」"
translation = "「오오~! 과연, 아니마와 공명한 결과 전투복도 아니마와 커플룩으로 변화했다는 건가. 재미있네♪」"

[[dialogue]]
speaker = "アニマ（覚醒）"
original = "「能力の方はどうカナ？」"
translation = "「능력 쪽은 어떠려나?」"

[[dialogue]]
speaker = "unk"
original = "俺は会長席に戻って、途中だった書類仕事を始めると――"
translation = "나는 회장석으로 돌아가서 도중이었던 서류 업무를 시작하자――"

[[dialogue]]
speaker = "unk"
original = "はっ！！！"
translation = "핫!!!"

[[dialogue]]
speaker = "unk"
original = "思考加速を発動して、高速で書類を処理して行く。"
translation = "사고 가속을 발동해 고속으로 서류를 처리해 나간다."

[[dialogue]]
speaker = "unk"
original = "そして、数分もかからない内に――"
translation = "그리고 몇 분도 채 걸리지 않아――"

[[dialogue]]
speaker = "マトイ"
original = "「早っ！？\u3000まだ結構な量があったはずなのに、もう終わったの！？」"
translation = "「빨라!? 아직 꽤 양이 남았을 텐데 벌써 끝난 거야!?」"

[[dialogue]]
speaker = "サーシャ"
original = "「どれどれ～？\u3000あら！\u3000すごいわ～♪\u3000字も綺麗だし、内容も完璧よ～♪」"
translation = "「어디 어디~? 어머! 대단해~♪ 글씨도 예쁘고 내용도 완벽해~♪」"

[[dialogue]]
speaker = "アナ"
original = "「思考の高速化は、やはり汎用性が高くて、すごい能力です」"
translation = "「사고의 고속화는 역시 범용성이 높아서 대단한 능력이네요」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「頭脳チートね！」"
translation = "「두뇌 치트네!」"

[[dialogue]]
speaker = "アニマ（覚醒）"
original = "「フヒ♪\u3000どうやら実験は成功のようだナ♪」"
translation = "「후히♪ 아무래도 실험은 성공인 모양이네♪」"

[[dialogue]]
speaker = "unk"
original = "ハッ！？\u3000アニマ先輩、気づいたんですけど"
translation = "핫!? 아니마 선배, 방금 깨달은 건데요"

[[dialogue]]
speaker = "アニマ（覚醒）"
original = "「ん？\u3000どうしたんダ、会長？」"
translation = "「응? 왜 그래, 회장?」"

[[dialogue]]
speaker = "unk"
original = "――先輩のノヴァフォームの胸ベルトって、ぴったりくっ付いて、ズレないようになってるんですね！"
translation = "――선배의 노바 폼 가슴 벨트 말이에요, 딱 달라붙어서 어긋나지 않게 되어 있네요!"

[[dialogue]]
speaker = "アナ"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker = "アニマ（覚醒）"
original = "「ああ、なるほど。会長は男だから、その辺りの仕組みを知らナイのか」"
translation = "「아아, 과연. 회장은 남자니까 그쪽 구조는 모르는 건가」"

[[dialogue]]
speaker = "サーシャ"
original = "「私たちも戦闘服の時は、ズレないようになってるのよ～」"
translation = "「우리도 전투복일 때는 어긋나지 않게 되어 있단다~」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「なんかよく分からないけど、不思議な力が働いてるのよ！\u3000便利よね！」"
translation = "「뭔지 잘 모르겠지만 신기한 힘이 작용하고 있어! 편리하지!」"

[[dialogue]]
speaker = "マトイ"
original = "「戦闘ですっかり着慣れちゃってるけど、水着フォームとか、際どい戦闘服もあるしね」"
translation = "「전투 때문에 완전히 익숙해지긴 했지만, 수영복 폼이라든가 아슬아슬한 전투복도 있으니까」"

[[dialogue]]
speaker = "アナ"
original = "「そうですね」"
translation = "「그렇네요」"

[[dialogue]]
speaker = "unk"
original = "知らなかった！"
translation = "몰랐어!"

[[dialogue]]
speaker = "アナ"
original = "（水着フォームを持ってるのに、知らなかった……）"
translation = "（수영복 폼을 가지고 있는데도 몰랐다니……）"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ねぇ、思ったんだけど！」"
translation = "「있지, 생각난 건데!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「他のノヴァフォームとシンクロした場合、やっぱりクロトの戦闘服ってそれと同じ衣装に変わるのよね？\u3000だったらせっかくだし、見てみたいわ！」"
translation = "「다른 노바 폼이랑 싱크로했을 경우, 역시 쿠로토의 전투복도 그거랑 똑같은 의상으로 변하는 거지? 그렇다면 이왕 이렇게 된 거 보고 싶어!」"

[[dialogue]]
speaker = "マトイ"
original = "「言われてみれば、確かに……！」"
translation = "「듣고 보니 확실히……!」"

[[dialogue]]
speaker = "サーシャ"
original = "「なら、それぞれ変身して、試してみましょうか♪」"
translation = "「그럼 각자 변신해서 시험해 볼까요♪」"

[[dialogue]]
speaker = "アニマ（覚醒）"
original = "「……むぅ」"
translation = "「……무으」"

[[dialogue]]
speaker = "unk"
original = "あれ、アニマ先輩……？"
translation = "어라, 아니마 선배……?"

[[dialogue]]
speaker = "unk"
original = "ふと先輩を見ると、なにやら頬をぷく～っと膨らませていた。"
translation = "문득 선배를 보니 왠지 볼을 푸우 하고 부풀리고 있었다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「アニマ先輩、どうしたの、その顔？\u3000なんかすごく可愛いわよ？」"
translation = "「아니마 선배, 왜 그래 그 표정? 왠지 엄청 귀여운데?」"

[[dialogue]]
speaker = "アニマ（覚醒）"
original = "「ウム、理由はよくわからないのだガ……なんだか、会長が他の子とペアルックに変身するのを想像したら、思考がモヤモヤしてだナ？」"
translation = "「음, 이유는 잘 모르겠다만…… 왠지 회장이 다른 애랑 커플룩으로 변신하는 걸 상상했더니 생각이 뒤숭숭해서 말이지?」"

[[dialogue]]
speaker = "マトイ"
original = "「えっ！？\u3000それってもしかして……！？」"
translation = "「엣!? 그거 설마……!?」"

[[dialogue]]
speaker = "サーシャ"
original = "「あら～<emoji=heart04>\u3000アニマちゃんが可愛くて、お姉ちゃん同級生なのに、キュンキュンしてきちゃったわ～<emoji=heart04>」"
translation = "「어머~<emoji=heart04> 아니마짱이 너무 귀여워서, 언니는 동급생인데도 가슴이 콩닥콩닥해버렸어~<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「アニマ先輩、なんだか最近、すごく女の子らしくなりましたね」"
translation = "「아니마 선배, 왠지 요즘 부쩍 여자아이 같아지셨네요」"

[[dialogue]]
speaker = "アナ"
original = "「まさか会長と付き合い始めて、そんなデレデレの姿を見せるとは……」"
translation = "「설마 회장과 사귀기 시작해서 그런 데레데레한 모습을 보여줄 줄이야……」"

[[dialogue]]
speaker = "unk"
original = "俺はアニマ先輩の手を取ると、正面から目を見て言う。"
translation = "나는 아니마 선배의 손을 잡고 정면에서 눈을 보며 말한다."

[[dialogue]]
speaker = "unk"
original = "俺の心はいつも、アニマ先輩と一緒ですから"
translation = "내 마음은 언제나 아니마 선배와 함께니까요"

[[dialogue]]
speaker = "unk"
original = "大丈夫です。どれだけ衣装が変わっても"
translation = "괜찮아요. 아무리 의상이 바뀌어도"

[[dialogue]]
speaker = "アニマ（覚醒）"
original = "「か、会長……<emoji=heart04>」"
translation = "「회, 회장……<emoji=heart04>」"

[[dialogue]]
speaker = "アニマ（覚醒）"
original = "「ありがとう……アニマは嬉しイ♪\u3000フヒ<emoji=heart04>」"
translation = "「고마워…… 아니마는 기뻐♪ 후히<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「これは……バカップルですね」"
translation = "「이건…… 닭살 커플이네요」"

[[dialogue]]
speaker = "サーシャ"
original = "「恋愛の副作用といったところかしら♪\u3000ふふっ♪」"
translation = "「연애의 부작용이라고나 할까♪ 후훗♪」"

[[dialogue]]
speaker = "unk"
original = "周りからそんな風に言われてしまうが、アニマ先輩を笑顔にする為なら、これくらいのことは恥ずかしくないと思える俺なのだった。"
translation = "주변에서 그런 소리를 듣게 되지만, 아니마 선배를 웃게 할 수 있다면 이 정도 일은 부끄럽지 않다고 생각하는 나였다."

