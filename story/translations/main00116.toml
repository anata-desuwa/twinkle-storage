[[dialogue]]
speaker = "unk"
original = "第２０話,御前試合Ⅱ,B"
translation = "제20화, 어전 시합 II, B"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──ぐっ！」"
translation = "「──크윽!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「どうしたの──この程度なの？\u3000緋宮クロト」"
translation = "「왜 그래── 이 정도야? 히노미야 쿠로토」"

[[dialogue]]
speaker = "unk"
original = "強烈に地面へ打ちつけられる。"
translation = "강렬하게 지면에 처박힌다."

[[dialogue]]
speaker = "unk"
original = "這いつくばる俺を、ヴィーナスはまだまだ余力を残した様子で見下ろしてきた。"
translation = "엎드려 기는 나를, 비너스는 아직 여유가 남은 듯 내려다보았다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「やっぱり、私が来て正解だったみたいね」"
translation = "「역시, 내가 오길 잘한 것 같네」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「！\u3000君が……来て……？」"
translation = "「! 네가…… 와……?」"

[[dialogue]]
speaker = "unk"
original = "逆だろう。転入してきたのは俺だ。"
translation = "반대일 것이다. 전학 온 건 나다."

[[dialogue]]
speaker = "unk"
original = "だが、今はそんな言葉尻を拾っている場合じゃない。"
translation = "하지만, 지금은 그런 말꼬리를 잡고 있을 때가 아니다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「確かに、先週見たときよりは強くなったみたいだけど……」"
translation = "「확실히, 지난주에 봤을 때보다는 강해진 것 같지만……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「まだまだ、魔王には程遠いわよっ！」"
translation = "「아직은, 마왕과는 거리가 멀어!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「づっ──これくらいっ！」"
translation = "「크읏── 이 정도는!」"

[[dialogue]]
speaker = "unk"
original = "私が来たという意味。"
translation = "내가 왔다는 의미."

[[dialogue]]
speaker = "unk"
original = "魔王という言葉の真意。"
translation = "마왕이라는 말의 진의."

[[dialogue]]
speaker = "unk"
original = "彼女の態度も言動も、まだまだ理解できないことは多いけれど──"
translation = "그녀의 태도도 언행도, 아직 이해할 수 없는 것이 많지만──"

[[dialogue]]
speaker = "unk"
original = "本人に何かを欺く素振りは見えない。"
translation = "본인에게 무언가를 속이는 듯한 기색은 보이지 않는다."

[[dialogue]]
speaker = "unk"
original = "ならば俺も、全力で彼女にぶつかるだけだ。"
translation = "그렇다면 나도, 전력으로 그녀에게 부딪칠 뿐이다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──づっ、あっ！」"
translation = "「──크읏, 앗!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「星力が足りない──こんなものじゃないはずよ！\u3000もっともっと、本気を振り絞りなさい！」"
translation = "「성력이 부족해── 이 정도가 아닐 텐데! 좀 더 좀 더, 진심을 쥐어짜 내 봐!」"

[[dialogue]]
speaker = "unk"
original = "何回も、何合も。"
translation = "몇 번이고, 몇 합이고."

[[dialogue]]
speaker = "unk"
original = "俺の攻撃は空を切り、彼女の攻撃ばかりが俺を打ちのめす。"
translation = "나의 공격은 허공을 가르고, 그녀의 공격만이 나를 때려눕힌다."

[[dialogue]]
speaker = "unk"
original = "挑んでは何度も地に伏して、やがて……"
translation = "도전했다가 몇 번이고 땅에 엎드리고, 이윽고……"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──ぐはァッ」"
translation = "「──크하앗」"

[[dialogue]]
speaker = "unk"
original = "ついに、受け流せなかった一撃が俺の真芯を捉える。"
translation = "마침내, 받아넘기지 못한 일격이 나의 정중앙을 포착한다."

[[dialogue]]
speaker = "unk"
original = "代わり映えのしない展開に、アリーナ席がどよめくのを感じた。"
translation = "별반 다르지 않은 전개에, 아레나 좌석이 술렁이는 것을 느꼈다."

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「やっぱり会長には勝てっこないよ……」"
translation = "「역시 회장에게는 이길 수 없네……」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「勝負はついてるのに……」"
translation = "「승부는 이미 났는데……」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「もうやめて……」"
translation = "「이제 그만해……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「（……情けないな）」"
translation = "「(……한심하군)」"

[[dialogue]]
speaker = "unk"
original = "派手な試合を期待していた生徒たちの声が、同情に変わっていくのがわかる。"
translation = "화려한 시합을 기대했던 학생들의 목소리가, 동정으로 바뀌어 가는 것을 알 수 있다."

[[dialogue]]
speaker = "unk"
original = "でも、どうしてだろう。"
translation = "하지만, 왜일까."

[[dialogue]]
speaker = "unk"
original = "この多数の観衆の目よりも──ヴィーナス本人に今のザマを晒すことが、何より情けないと感じるのは。"
translation = "이 다수의 관중의 눈보다도── 비너스 본인에게 지금의 꼴을 드러내는 것이, 무엇보다 한심하게 느껴지는 것은."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ッ……まだ……まだッ」"
translation = "「읏…… 아직…… 아직」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──ぐっ！？」"
translation = "「──크윽!?」"

[[dialogue]]
speaker = "unk"
original = "再び立ち上がろうとする──しかしその時、度を越えた激痛と疲弊が一斉にのしかかってきた。"
translation = "다시 일어서려고 한다── 그러나 그때, 도를 넘은 격통과 피로가 일제히 덮쳐왔다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「……戦闘不能か。ならば、勝者──」"
translation = "「……전투 불능인가. 그렇다면, 승자──」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「──待って！」"
translation = "「──기다려!」"

[[dialogue]]
speaker = "unk"
original = "つきかけた──否、ついたはずの決着。"
translation = "나려던── 아니, 났어야 할 결착."

[[dialogue]]
speaker = "unk"
original = "それを食い止めたのは、他ならぬ対戦相手のヴィーナスだった。"
translation = "그것을 막아선 것은, 다름 아닌 대전 상대인 비너스였다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……どうして」"
translation = "「……어째서」"

[[dialogue]]
speaker = "unk"
original = "彼女は、自分を責めるような、悲痛の面持ちで。"
translation = "그녀는, 자신을 탓하는 듯한, 비통한 표정으로."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……どうして、勝ってくれないの？」"
translation = "「……어째서, 이겨주지 않는 거야?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……ッ」"
translation = "「……읏」"

[[dialogue]]
speaker = "unk"
original = "あの眼だ。"
translation = "저 눈이다."

[[dialogue]]
speaker = "unk"
original = "星徒会室で初めて会った時と同じ──"
translation = "성도회실에서 처음 만났을 때와 같은──"

[[dialogue]]
speaker = "unk"
original = "乱暴な態度に覆い隠された、彼女の本心とも言える嘆願が、その瞳に浮かんでいる。"
translation = "난폭한 태도에 덮여 감춰진, 그녀의 본심이라고도 할 수 있는 탄원이, 그 눈동자에 떠오른다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「どうして……どうしてなのよ……」"
translation = "「어째서…… 어째서인 거야……」"

[[dialogue]]
speaker = "unk"
original = "どうして──は、こっちのセリフだ。"
translation = "어째서──는, 이쪽이 할 말이다."

[[dialogue]]
speaker = "unk"
original = "どうして、君が泣く。"
translation = "어째서, 네가 우는가."

[[dialogue]]
speaker = "unk"
original = "どうして、そんな目で俺を見る。"
translation = "어째서, 그런 눈으로 나를 보는가."

[[dialogue]]
speaker = "unk"
original = "一方的にやられているのは、こちらのはずなのに。"
translation = "일방적으로 당하고 있는 것은, 이쪽일 텐데."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……立ってよ」"
translation = "「……일어나」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……助けてよ」"
translation = "「……도와줘」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ずっと、待ってたのに」"
translation = "「계속, 기다렸는데」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──」"
translation = "「──」"

[[dialogue]]
speaker = "unk"
original = "彼我の実力差は何より明白。"
translation = "피차의 실력 차이는 무엇보다 명백하다."

[[dialogue]]
speaker = "unk"
original = "圧倒的な優位にある彼女が、悲しみ嘆く理由が俺にはわからない。"
translation = "압도적인 우위에 있는 그녀가, 슬퍼하고 탄식하는 이유를 나는 알 수 없다."

[[dialogue]]
speaker = "unk"
original = "でも……俺の魂は吠えていた。"
translation = "하지만…… 나의 영혼은 울부짖고 있었다."

[[dialogue]]
speaker = "unk"
original = "彼女にだけは、あんな涙を流させてはいけないと。"
translation = "그녀에게만은, 저런 눈물을 흘리게 해서는 안 된다고."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「魔王なんでしょ……英雄なんでしょ？」"
translation = "「마왕이잖아…… 영웅이잖아?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「だったら……私１人くらい、軽くひねってみせてよ──！」"
translation = "「그렇다면…… 나 한 명 정도는, 가볍게 비틀어 보여줘──!」"

[[dialogue]]
speaker = "unk"
original = "ああ、そうか。"
translation = "아아, 그랬구나."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「（そういうこと、だったんだな……）」"
translation = "「(그런 거였구나……)」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "『次期会長はどうしてそこまで──律儀に勝負を受けようとするのですか？』"
translation = "『차기 회장님은 어째서 그렇게까지── 융통성 있게 승부를 받아들이려고 하시는 건가요?』"

[[dialogue]]
speaker = "unk"
original = "あの時は答えられなかったアナの質問。今になってその真意に気づく。"
translation = "그때는 대답할 수 없었던 아나의 질문. 이제야 그 진의를 깨닫는다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "『大丈夫よ２人とも。だってこれは──私から彼へのお願いだもの』"
translation = "『괜찮아, 둘 다. 왜냐하면 이건── 내가 그에게 하는 부탁이니까』"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "『彼はそれを裏切るような人じゃないわ。そうよね、緋宮クロト？』"
translation = "『그는 그것을 배신할 만한 사람이 아니야. 그렇지, 히노미야 쿠로토?』"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスはあの時、確かにそう言った。"
translation = "비너스는 그때, 분명 그렇게 말했다."

[[dialogue]]
speaker = "unk"
original = "星騎士になったばかりのひよっこの俺に、あれだけ強大な力を持つ彼女が、助けを求めていたんだ。"
translation = "성기사가 된 지 얼마 안 된 햇병아리인 나에게, 그토록 강대한 힘을 가진 그녀가, 도움을 요청하고 있었던 것이다."

[[dialogue]]
speaker = "unk"
original = "──それが、どこまで意図してのことだったのか、俺にはわからない。"
translation = "──그것이, 어디까지 의도한 것이었는지, 나는 알 수 없다."

[[dialogue]]
speaker = "unk"
original = "だけどヴィーナスは、彼女ほどの力を持ってしても、己を無力だと感じるような何かに立ち向かおうとしている……気がする。"
translation = "하지만 비너스는, 그녀 정도의 힘을 가지고도, 자신을 무력하다고 느낄 만한 무언가에 맞서려고 하는…… 것 같다."

[[dialogue]]
speaker = "unk"
original = "そんな彼女が、俺に助けを求めた。"
translation = "그런 그녀가, 나에게 도움을 요청했다."

[[dialogue]]
speaker = "unk"
original = "緋宮クロトは、昔の自分のような戦う力が足りなくて泣いている人を、今度は自分が助けたくて星騎士を目指した。"
translation = "히노미야 쿠로토는, 옛날의 자신처럼 싸울 힘이 부족해서 울고 있는 사람을, 이번에는 자신이 돕고 싶어서 성기사를 목표로 했다."

[[dialogue]]
speaker = "unk"
original = "そんな俺に、１番最初に助けを求めたのが、ヴィーナスだったわけだ。"
translation = "그런 나에게, 가장 먼저 도움을 요청한 것이, 비너스였던 것이다."

[[dialogue]]
speaker = "unk"
original = "そんな人を見捨てて逃げてしまったら、俺はもう本当の星騎士にはなれない。"
translation = "그런 사람을 버리고 도망쳐 버린다면, 나는 더 이상 진정한 성기사가 될 수 없다."

[[dialogue]]
speaker = "unk"
original = "──ヴィーナスの一見無茶苦茶に思える勝負から逃げたくなかったのは、そんな理由。"
translation = "──비너스의 언뜻 무모해 보이는 승부에서 도망치고 싶지 않았던 것은, 그런 이유."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「（だけど、これは凄く、大事なことでもあった）」"
translation = "「(하지만, 이것은 굉장히, 중요한 것이기도 했다)」"

[[dialogue]]
speaker = "unk"
original = "気付いているのと、いないのとでは、全然話が違う。"
translation = "깨닫고 있는 것과, 그렇지 않은 것은, 전혀 이야기가 다르다."

[[dialogue]]
speaker = "unk"
original = "己がなんのために戦っているのか。誰のために戦っているのか。"
translation = "자신이 무엇을 위해 싸우고 있는가. 누구를 위해 싸우고 있는가."

[[dialogue]]
speaker = "unk"
original = "──答えは、ひとつだ。"
translation = "──답은, 하나다."

[[dialogue]]
speaker = "unk"
original = "他の誰でもない、緋宮クロトを頼ってくれた九浄ヴィーナスを、俺は助けたかった。"
translation = "다른 누구도 아닌, 히노미야 쿠로토를 믿고 의지해 준 쿠죠 비너스를, 나는 돕고 싶었다."

[[dialogue]]
speaker = "unk"
original = "これはただ、それだけの話だったんだ。"
translation = "이것은 단지, 그것만의 이야기였던 것이다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──ヴィーナス」"
translation = "「──비너스」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロ、ト……？」"
translation = "「쿠로, 토……?」"

[[dialogue]]
speaker = "unk"
original = "そう──俺は地を這っていた。"
translation = "그래── 나는 땅을 기고 있었다."

[[dialogue]]
speaker = "unk"
original = "何度も倒され、くたばって、ぼろぼろになりながらも足場を踏みしめて立とうとする。"
translation = "몇 번이고 쓰러지고, 뻗어버리고, 너덜너덜해지면서도 발판을 밟고 일어서려고 한다."

[[dialogue]]
speaker = "unk"
original = "だからきっと、これは大地のくれた加護なのだろう。"
translation = "그러니 분명, 이것은 대지가 준 가호일 것이다."

[[dialogue]]
speaker = "unk"
original = "俺の守護星は彼女らとは違う──天じゃなく地に宿る星なのだから。"
translation = "나의 수호성은 그녀들과는 다르다── 하늘이 아닌 땅에 깃든 별이니까."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ヴィーナス」"
translation = "「비너스」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「っっ……！」"
translation = "「윽……!」"

[[dialogue]]
speaker = "unk"
original = "瞬間、ありとあらゆる力が流れ込んでくるのを感じた。"
translation = "순간, 온갖 힘이 흘러들어 오는 것을 느꼈다."

[[dialogue]]
speaker = "unk"
original = "守護星の加護──否、そんな次元すら越えて。"
translation = "수호성의 가호── 아니, 그런 차원조차 넘어서."

[[dialogue]]
speaker_original = "クラスの女子Ａ"
speaker_translation = "반 여학생 A"
original = "「な──何あれっ。超変身してるんだけどっ」"
translation = "「나── 뭐야 저거. 초 변신하고 있잖아」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「緋宮くん……っ！？」"
translation = "「히노미야 군……!?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あらあら……？」"
translation = "「어머어머……?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「（あれが……もしかして昨日の？）」"
translation = "「(저것이…… 혹시 어제의?)」"

[[dialogue]]
speaker = "unk"
original = "昨夜、一瞬だが掴みかけたその煌めきを宿す。"
translation = "어젯밤, 한순간이지만 붙잡으려 했던 그 반짝임을 품는다."

[[dialogue]]
speaker = "unk"
original = "激しいが、暴れるでもない、優しささえ覚える深淵なる力が湧き上がってきた。"
translation = "격렬하지만, 날뛰지도 않는, 상냥함마저 느껴지는 심오한 힘이 솟아올랐다."

[[dialogue]]
speaker = "unk"
original = "なんだろうか、この力は──俺はどこかで──この温もりを知っているような。"
translation = "무엇일까, 이 힘은── 나는 어딘가에서── 이 온기를 알고 있는 듯한."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ごめんな。情けない姿を見せた」"
translation = "「미안하다. 한심한 모습을 보였다」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ク……ロト……」"
translation = "「쿠……로토……」"

[[dialogue]]
speaker = "unk"
original = "彼女の瞳に浮かんだ涙は、もはや先ほどまでのそれではない。"
translation = "그녀의 눈동자에 떠오른 눈물은, 더 이상 아까까지의 그것이 아니다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「始めよう──まだ戦いは終わってない」"
translation = "「시작하자── 아직 싸움은 끝나지 않았다」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「っ……うんっ！」"
translation = "「읏…… 응!」"

[[dialogue]]
speaker = "unk"
original = "今こそ俺が、彼女からその座を貰い受ける時だ。"
translation = "지금이야말로 내가, 그녀에게서 그 자리를 물려받을 때다."

