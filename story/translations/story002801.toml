[[dialogue]]
speaker = "ウィステリア"
original = "「フォビドゥンリアクター！」"
translation = "「포비든 리액터!」"

[[dialogue]]
speaker = "unk"
original = "ウィステリアが放った闇が、地下図書館の防衛システムが生み出した幻影を消滅させていく。"
translation = "위스테리아가 뿜어낸 어둠이 지하 도서관의 방어 시스템이 만들어낸 환영을 소멸시켜 간다."

[[dialogue]]
speaker = "モネ"
original = "「すごい破壊力……いつ見てもウィステリアさんの星術は凄まじいですね……」"
translation = "「굉장한 파괴력…… 언제 봐도 위스테리아 씨의 성술은 엄청나네요……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「大袈裟よ～。私のは魔力も使ってるから、星術としては邪道だしね」"
translation = "「과장이 심해~. 내 건 마력도 섞어 쓰고 있으니까 성술로서는 사도인걸」"

[[dialogue]]
speaker = "ウィステリア"
original = "「しっかし、入るたびに防衛システムを蹴散らすのもうんざりね……。私のコピーなんて出してきたところでどうせ敵わないんだから、大人しく入れてくれればいいのに」"
translation = "「그나저나 들어올 때마다 방어 시스템을 때려부수는 것도 지겹네……. 내 복제품 따위를 내보내 봤자 어차피 상대도 안 되는데 얌전히 들여보내 주면 좋을 텐데」"

[[dialogue]]
speaker = "モネ"
original = "「あはは……普通の星騎士だと、コピーのウィステリアさんでも全く勝てないんですけどね……」"
translation = "「아하하…… 평범한 성기사라면 복제 위스테리아 씨한테도 전혀 못 이기지만요……」"

[[dialogue]]
speaker = "モネ"
original = "（ここは新星学園の地下３０００メートルにある『地下図書館』。またの名を『深淵書庫』）"
translation = "(이곳은 신성학원 지하 3000미터에 있는 『지하 도서관』. 또 다른 이름은 『심연서고』)"

[[dialogue]]
speaker = "モネ"
original = "（ある専門家によれば、リクリエ以前に生み出された遺物──ロストアイテムのひとつで、すでに何度かリクリエを乗り越えているとか）"
translation = "(어느 전문가에 따르면 리크리에 이전에 만들어진 유물── 로스트 아이템 중 하나로, 이미 몇 번이나 리크리에를 넘겨왔다고 한다)"

[[dialogue]]
speaker = "モネ"
original = "（逆に言えば、それ以外の全ては謎に包まれている。その謎を調査するのが、ウィステリアさんの司書としての仕事。私は無理を言ってお手伝いをさせてもらっている）"
translation = "(거꾸로 말하면 그 외의 모든 것은 수수께끼에 싸여 있다. 그 수수께끼를 조사하는 것이 사서로서의 위스테리아 씨의 업무. 나는 억지를 부려 돕게 하고 있다)"

[[dialogue]]
speaker = "ウィステリア"
original = "「私からはぐれないでね、紙屋敷さん。あなたがここに入る許可を得られたのは、私が護衛につくって条件付きなんだから」"
translation = "「나한테서 떨어지지 마, 카미야시키 양. 네가 여기 들어올 허가를 받은 건 내가 호위를 맡는다는 조건부니까」"

[[dialogue]]
speaker = "ウィステリア"
original = "「尋常じゃない量の魔力が渦巻いているし、防衛システムの攻撃もあるから、ここはとても危険よ」"
translation = "「심상치 않은 양의 마력이 소용돌이치고 있고 방어 시스템의 공격도 있으니 여기는 아주 위험해」"

[[dialogue]]
speaker = "モネ"
original = "「はい、わかっています。私ひとりじゃいくつ命があっても足りません」"
translation = "「네, 알고 있습니다. 저 혼자였다면 목숨이 몇 개라도 모자랐을 거예요」"

[[dialogue]]
speaker = "モネ"
original = "「では行きましょう！\u3000まだ見ぬ本が私たちを待っています！」"
translation = "「그럼 가요! 아직 보지 못한 책들이 저희를 기다리고 있어요!」"

[[dialogue]]
speaker = "ウィステリア"
original = "「あっ、ちょっと、だから離れないでってば！\u3000命がいくつあっても足りないって言ったのあなたでしょ！」"
translation = "「앗, 잠깐, 그러니까 떨어지지 말라니까! 목숨이 몇 개라도 모자랄 거라고 말한 건 너잖아!」"

[[dialogue]]
speaker = "ウィステリア"
original = "「もう、今日もテンション高いわね、紙屋敷さん……」"
translation = "「정말, 오늘도 텐션이 높네요, 카미야시키 양……」"

[[dialogue]]
speaker = "モネ"
original = "「未知の本たちと出合える絶好の機会ですからね！」"
translation = "「미지의 책들과 만날 수 있는 절호의 기회니까요!」"

[[dialogue]]
speaker = "ウィステリア"
original = "「危ないって何度も言ってるのに……本当に本に目がないのね」"
translation = "「위험하다고 몇 번이나 말했는데…… 정말 책이라면 사족을 못 쓰는구나」"

[[dialogue]]
speaker = "モネ"
original = "「あ……ふわぁ～……」"
translation = "「아…… 후아암～……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「あら、眠そうね。もしかして探索が楽しみで眠れなかったの？」"
translation = "「어라, 졸려 보이네. 혹시 탐색이 기대돼서 잠을 설친 거야?」"

[[dialogue]]
speaker = "モネ"
original = "「それもあるんですが……実は夕べ遅くまで小説を書いていまして……」"
translation = "「그런 것도 있지만…… 사실 어젯밤 늦게까지 소설을 쓰고 있어서……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「小説を自分で？\u3000すごいじゃない！」"
translation = "「소설을 직접? 대단하잖아!」"

[[dialogue]]
speaker = "モネ"
original = "「いえいえ、すごくなんかないですよ。原稿用紙とペンがあれば誰でも書けますから」"
translation = "「아니요 아니요, 대단할 거 없어요. 원고지와 펜만 있으면 누구든 쓸 수 있으니까요」"

[[dialogue]]
speaker = "ウィステリア"
original = "「……それはできる人が言うことよ、紙屋敷さん。ちなみに、どんなのを書いてるの？」"
translation = "「……그건 할 줄 아는 사람이 하는 소리야, 카미야시키 양. 그건 그렇고 어떤 걸 쓰고 있어?」"

[[dialogue]]
speaker = "モネ"
original = "「不思議な力を持った少年を主人公にした冒険小説です。もうすぐ完成しそうで、つい熱が入ってしまって、最近は寝不足気味なんです」"
translation = "「불가사의한 힘을 가진 소년을 주인공으로 한 모험 소설이에요. 이제 곧 완성될 것 같아서 그만 열중해버리는 바람에, 요즘은 수면 부족 기운이 좀 있어요」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ふふ、完成したらぜひ読ませてね。根っからの本好きの紙屋敷さんが書くんだから面白いに決まってるわ」"
translation = "「후후, 완성되면 꼭 읽게 해줘. 뼛속까지 책을 좋아하는 카미야시키 양이 쓰는 거니까 분명히 재미있을 거야」"

[[dialogue]]
speaker = "モネ"
original = "「面白いかは約束できませんが、ウィステリアさんに読んでいただけるなら私も嬉しいです」"
translation = "「재미있을지는 약속 못 드리지만, 위스테리아 씨께서 읽어주신다면 저도 기쁠 거예요」"

[[dialogue]]
speaker = "モネ"
original = "「それに、面白いって言ってもらえたら賞にも応募してみようかな……とか思ってたり……」"
translation = "「게다가, 재미있다는 말을 들으면 공모전에도 응모해볼까…… 하는 생각도 하고 있어서……」"

[[dialogue]]
speaker = "モネ"
original = "「今回の小説は自分でもよく書けたと思ってるんです。でもけっこう攻めた設定と表現で……人によっては不愉快な気がして、自信が持てなくて……」"
translation = "「이번 소설은 저 스스로도 잘 썼다고 생각하거든요. 하지만 꽤 파격적인 설정과 표현이라…… 사람에 따라서는 불쾌할 수도 있을 것 같아서 자신을 못 갖겠어요……」"

[[dialogue]]
speaker = "モネ"
original = "「私的には、当然面白いし、これがベストだと思っているんですけど……」"
translation = "「제 개인적으로는 당연히 재미있고, 이게 최선이라고 생각하고 있지만요……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「う～ん……書いた人が面白いと思うのなら、それでいいんじゃない？\u3000創作ってそういうものでしょ」"
translation = "「으음…… 쓴 사람이 재미있다고 생각한다면 그걸로 된 거 아냐? 창작이란 게 그런 거잖아」"

[[dialogue]]
speaker = "ウィステリア"
original = "「偉そうなことは言えないけど、迷うなら応募した方がいいと思うわ。私だけじゃなくて、たくさんの人に読んでもらうべきよ」"
translation = "「잘난 척할 입장은 아니지만, 망설여진다면 응모하는 게 좋다고 봐. 나뿐만 아니라 많은 사람이 읽게 해야 해」"

[[dialogue]]
speaker = "ウィステリア"
original = "「だって、そのために書いたんでしょう？」"
translation = "「왜냐면, 그러려고 쓴 거잖아?」"

[[dialogue]]
speaker = "モネ"
original = "「それは……そうなんですけど～」"
translation = "「그건…… 그렇긴 하지만요～」"

[[dialogue]]
speaker = "ウィステリア"
original = "「大丈夫大丈夫。紙屋敷さんが頑張って書いたんでしょ。なら悪いようにはならないわ」"
translation = "「괜찮아 괜찮아. 카미야시키 양이 열심히 쓴 거잖아. 그럼 나쁜 결과는 나오지 않을 거야」"

[[dialogue]]
speaker = "ウィステリア"
original = "「それに思うようにいかなくたって、次に活かせばいい。紙屋敷さんならそれができるはずよ」"
translation = "「게다가 생각대로 되지 않더라도 다음에 활용하면 돼. 카미야시키 양이라면 그럴 수 있을 거야」"

[[dialogue]]
speaker = "ウィステリア"
original = "「私には作家になりたいとか、そういうしっかりした夢はないし、ちょっと尊敬しちゃうかも」"
translation = "「나한테는 작가가 되고 싶다거나 하는 그런 확실한 꿈은 없어서, 조금 존경스러울지도」"

[[dialogue]]
speaker = "モネ"
original = "「ウィステリアさんが、私を……？」"
translation = "「위스테리아 씨께서, 저를……?」"

[[dialogue]]
speaker = "モネ"
original = "「ウィステリアさん、強くて、キレイで、何でもできる人だと思っていました。私なんかを尊敬するなんて、信じられません」"
translation = "「위스테리아 씨는 강하고, 아름답고, 뭐든지 잘하는 분이라고 생각했어요. 저 같은 사람을 존경하신다니 믿기지 않아요」"

[[dialogue]]
speaker = "ウィステリア"
original = "「もう、おだてても何も出ないわよ。そりゃ多少は戦えるけど、それだけ。ただの普通の魔族よ」"
translation = "「정말, 비행기 태워도 아무것도 안 나온다니까. 그야 어느 정도는 싸울 수 있지만 그뿐이야. 그저 평범한 마족일 뿐이지」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ま、学生からしたら大人って、そう見えるものなんでしょうね。私も学生の頃は、大人ってもっと自由なものだと思ってたし」"
translation = "「뭐, 학생 입장에서 보면 어른이란 건 그렇게 보이는 법이겠지. 나도 학생 때는 어른이 되면 훨씬 자유로울 줄 알았으니까」"

[[dialogue]]
speaker = "モネ"
original = "「？\u3000今は違うんですか？」"
translation = "「? 지금은 다른가요?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「……卒業した後の就職先は一ヶ月で潰れちゃうし、お目当てのスイーツはいつも売り切れ、自由どころか思い通りにならないことばっかり……」"
translation = "「……졸업하고 들어간 첫 직장은 한 달 만에 망해버리고, 점찍어둔 디저트는 항상 품절, 자유는커녕 뜻대로 안 되는 일투성이라서……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「……いいえ、なんでもないわ。紙屋敷さんはそのままの紙屋敷さんでいてね」"
translation = "「……아니, 아무것도 아냐. 카미야시키 양은 지금 그대로의 카미야시키 양으로 있어줘」"

[[dialogue]]
speaker = "モネ"
original = "「はぁ……あっ！\u3000見たことのない扉です」"
translation = "「하아…… 앗! 본 적 없는 문이에요」"

[[dialogue]]
speaker = "unk"
original = "話しながら進むうちに、見覚えのない扉を見付けた。前回の探索までは、ここに扉はなかったはずだ。"
translation = "이야기를 나누며 나아가는 도중, 본 적 없는 문을 발견했다. 지난 탐색 때까지는 이곳에 문이 없었을 터였다."

[[dialogue]]
speaker = "ウィステリア"
original = "「なるほど、新しい領域ってわけね」"
translation = "「과연, 새로운 영역이라는 거네」"

[[dialogue]]
speaker = "モネ"
original = "「早く、早く開けましょう！\u3000この先で、まだ見ぬ本たちが待ってます！」"
translation = "「빨리, 빨리 열어봐요! 이 너머에서 아직 보지 못한 책들이 기다리고 있어요!」"

[[dialogue]]
speaker = "ウィステリア"
original = "「紙屋敷さん、落ち着いてー！」"
translation = "「카미야시키 양, 진정해ー!」"

