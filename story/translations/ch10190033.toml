[[dialogue]]
speaker = "unk"
original = "第３話,シズル来訪,P"
translation = "제3화, 시즈루 내방"

[[dialogue]]
speaker = "unk"
original = "俺たちが紫桜の里を訪れてから、しばらくが経ったある日のこと――"
translation = "우리들이 자앵의 마을을 방문하고 나서, 한동안 시간이 흐른 어느 날의 일――"

[[dialogue]]
speaker = "シズル"
original = "「転送成功です！\u3000ついにやってきました～！\u3000ようこそ流星市国！」"
translation = "「전송 성공입니다! 드디어 도착했어요~! 어서 오세요 유성시국!」"

[[dialogue]]
speaker = "シズル"
original = "「さあさあ、都会をめいっぱい満喫しますよ～っ！！」"
translation = "「자자, 도시를 마음껏 만끽할 거예요~!!」"

[[dialogue]]
speaker = "せつな"
original = "「師匠、はしゃぎすぎでござる……」"
translation = "「스승님, 너무 들뜨셨소……」"

[[dialogue]]
speaker = "シズル"
original = "「だって都会ですよ、大都会！\u3000ああ、夢にまで見た、愛憎渦巻く欲望の都！」"
translation = "「그치만 도시잖아요, 대도시! 아아, 꿈에 그리던, 애증이 소용돌이치는 욕망의 도시!」"

[[dialogue]]
speaker = "unk"
original = "欲望の都？"
translation = "욕망의 도시?"

[[dialogue]]
speaker = "unk"
original = "愛憎渦巻く？"
translation = "애증이 소용돌이치는?"

[[dialogue]]
speaker = "せつな"
original = "「流星市国はそこまで物騒じゃないでござるよ」"
translation = "「유성시국은 그렇게까지 험악하지 않소.」"

[[dialogue]]
speaker = "シズル"
original = "「冗談ですよ、冗談。つい気持ちがたかぶって、誇張表現しちゃっただけじゃないですか」"
translation = "「농담이에요, 농담. 그만 기분이 고조돼서, 과장 표현을 해버린 것뿐이잖아요.」"

[[dialogue]]
speaker = "シズル"
original = "「でも、紫桜の里じゃ考えられないくらい男性と女性がひしめき合って暮らしていて……」"
translation = "「하지만, 자앵의 마을에선 생각지도 못할 만큼 남성과 여성이 북적거리며 살고 있어서……」"

[[dialogue]]
speaker = "シズル"
original = "「これはもう、何か起こってしまう予感しかしません！\u3000そう思いませんか、せつな？」"
translation = "「이건 이제, 무슨 일이 벌어질 것만 같은 예감밖에 안 들어요! 그렇게 생각하지 않나요, 세츠나?」"

[[dialogue]]
speaker = "せつな"
original = "「エッチなハプニングを期待しているでござるか？」"
translation = "「엣치한 해프닝을 기대하고 있는 것이오?」"

[[dialogue]]
speaker = "unk"
original = "シズルさんに限ってそんな……"
translation = "시즈루 씨라면 설마 그럴 리가……"

[[dialogue]]
speaker = "unk"
original = "せつなじゃないんだし"
translation = "세츠나도 아닌데"

[[dialogue]]
speaker = "せつな"
original = "「主様、騙されてはいけないでござる。師匠は房中術の達人でござるよ」"
translation = "「주군, 속아서는 안 되오. 스승님은 방중술의 달인이오.」"

[[dialogue]]
speaker = "せつな"
original = "「せつなたち里のくノ一は皆、師匠の座学を受けているでござる」"
translation = "「세츠나를 포함한 마을의 쿠노이치들은 모두, 스승님의 좌학을 받고 있소.」"

[[dialogue]]
speaker = "せつな"
original = "「その房中術にかかれば、どんな男性でもきっとヘロヘロの骨抜きになってしまうでござるよ」"
translation = "「그 방중술에 걸리면, 어떤 남성이라도 분명 헤롱헤롱하게 골자 빠진 상태가 되어버릴 것이오.」"

[[dialogue]]
speaker = "unk"
original = "ごくり……"
translation = "꿀꺽……"

[[dialogue]]
speaker = "unk"
original = "そんなすごいの？"
translation = "그렇게 대단해?"

[[dialogue]]
speaker = "せつな"
original = "「な、なんでござるか主様、その反応は……」"
translation = "「무, 무엇이오 주군, 그 반응은……」"

[[dialogue]]
speaker = "シズル"
original = "「おや、もしかしてご興味がおありですか？\u3000それなら──」"
translation = "「어라, 혹시 흥미가 있으신가요? 그렇다면──」"

[[dialogue]]
speaker = "せつな"
original = "「ダメでござるよ！\u3000師匠の房中術は本当にすごいのでござる！\u3000いかな主様といえど、あれを受けたら……」"
translation = "「안 되오! 스승님의 방중술은 정말로 대단하단 말이오! 아무리 주군이라 해도, 그걸 받으면……」"

[[dialogue]]
speaker = "せつな"
original = "「……主様を、取られちゃうでござる……」"
translation = "「……주군을, 빼앗겨버릴 것이오……」"

[[dialogue]]
speaker = "シズル"
original = "「あらまあ、可愛い♪」"
translation = "「어머나, 귀여워라♪」"

[[dialogue]]
speaker = "せつな"
original = "「とにかく！\u3000主様に手を出すのは師匠といえど絶対に許さないのでござる！」"
translation = "「어쨌든! 주군에게 손을 대는 건 스승님이라 해도 절대 용서 못 하오!」"

[[dialogue]]
speaker = "シズル"
original = "「大丈夫ですよ。興味があるのはせつなの房中術のようですし♪」"
translation = "「괜찮아요. 흥미가 있는 건 세츠나의 방중술인 것 같으니까요♪」"

[[dialogue]]
speaker = "せつな"
original = "「にゃっ！？\u3000そ、そうなのでござるか……？」"
translation = "「냐앗!? 그, 그런 것이오……?」"

[[dialogue]]
speaker = "unk"
original = "ぜひ今度お願いします"
translation = "부디 다음에 부탁합니다"

[[dialogue]]
speaker = "せつな"
original = "「わ、分かったでござる……せつなの房中術はまだまだ稚拙ですが……精一杯頑張るでござる……」"
translation = "「아, 알겠소…… 세츠나의 방중술은 아직 미숙하지만…… 온 힘을 다해 노력하겠소……」"

[[dialogue]]
speaker = "シズル"
original = "「いいですね～、若いって♪」"
translation = "「좋네요~, 젊다는 건♪」"

[[dialogue]]
speaker = "せつな"
original = "「師匠っ！」"
translation = "「스승님!」"

[[dialogue]]
speaker = "シズル"
original = "「それよりも時間は有限ですよ、せつな！\u3000せっかくの都会訪問なんですから、早く街へ繰り出しましょう！」"
translation = "「그보다 시간은 유한하다구요, 세츠나! 어렵게 도시를 방문했으니까, 얼른 거리로 나가봐요!」"

[[dialogue]]
speaker = "シズル"
original = "「あいたっ！\u3000いたたたたっ、こ、腰がっ……」"
translation = "「아얏! 아타타타, 허, 허리가……」"

[[dialogue]]
speaker = "せつな"
original = "「興奮しすぎでござるよ。秘薬を塗るから腰を見せるでござる」"
translation = "「너무 흥분했소. 비약을 바를 테니 허리를 보여주는 것이오.」"

[[dialogue]]
speaker = "シズル"
original = "「面目ない……よろしく頼みますよ、せつな」"
translation = "「체면이 안 서네요…… 잘 부탁해요, 세츠나.」"

[[dialogue]]
speaker = "せつな"
original = "「無理せずのんびり参りましょう。師匠の腰も有限でござるから」"
translation = "「무리하지 말고 느긋하게 가도록 하오. 스승님의 허리도 유한하니 말이오.」"

[[dialogue]]
speaker = "シズル"
original = "「世話をかけてすみませんね……とほほ……」"
translation = "「폐를 끼쳐서 미안해요…… 토호호……」"

[[dialogue]]
speaker = "シズル"
original = "「おお～～、すごいです！\u3000まさに絵に描いたような大都会！\u3000ワクワクしますね～」"
translation = "「오오~~, 굉장해요! 그야말로 그림으로 그린 듯한 대도시! 두근두근하네요~」"

[[dialogue]]
speaker = "シズル"
original = "「あっ、見て下さい！\u3000行き交う女子の破廉恥な服装を！\u3000あんなの裸も同然じゃありませんか！」"
translation = "「앗, 보세요! 지나가는 여자애들의 파렴치한 복장을! 저런 건 알몸이나 다름없지 않나요!」"

[[dialogue]]
speaker = "せつな"
original = "「あのくらい普通でござるよ、師匠」"
translation = "「저 정도는 보통이오, 스승님.」"

[[dialogue]]
speaker = "シズル"
original = "「ああ、あなたも都会の風に染まってしまったんですね……。いいですよ、えっち指数急上昇です♪」"
translation = "「아아, 당신도 도시의 바람에 물들어버렸군요……. 좋아요, 엣치 지수 급상승이에요♪」"

[[dialogue]]
speaker = "せつな"
original = "「都会のえっちはこんなものじゃないでござるよ。見えないところでは、あちらもこちらも破廉恥三昧でござる」"
translation = "「도시의 엣치는 이 정도가 아니오. 보이지 않는 곳에서는, 여기저기 파렴치 삼매경이라오.」"

[[dialogue]]
speaker = "シズル"
original = "「本当ですか！？\u3000文にはそんなことちっとも書いてなかったじゃないですか！」"
translation = "「정말인가요!? 편지에는 그런 거 조금도 안 써 있었잖아요!」"

[[dialogue]]
speaker = "シズル"
original = "「大事なことですからね……今後は漏らさずしっかり報告するように。いいですね？」"
translation = "「중요한 일이니까요…… 앞으로는 빠짐없이 확실히 보고하도록 하세요. 알겠죠?」"

[[dialogue]]
speaker = "せつな"
original = "「わかったでござる！」"
translation = "「알겠소!」"

[[dialogue]]
speaker = "シズル"
original = "「さあ、行きますよ！\u3000私を案内して下さいっ！」"
translation = "「자, 가요! 저를 안내해 주세요!」"

[[dialogue]]
speaker = "unk"
original = "こうしてシズルさんの都会観光に、付き合うことになった。"
translation = "이렇게 해서 시즈루 씨의 도시 관광에 동행하게 되었다."

[[dialogue]]
speaker = "unk"
original = "久しぶりの大都会にシズルさんは大はしゃぎで、俺とせつなは１日中振り回されることになったのだった。"
translation = "오랜만의 대도시에 시즈루 씨는 매우 들떠서, 나와 세츠나는 하루 종일 휘둘리게 된 것이었다."

