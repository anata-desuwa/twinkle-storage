[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「えへへ……誰にも見つからなかったね」"
translation = "「에헤헤…… 아무한테도 안 들켰네」"

[[dialogue]]
speaker = "unk"
original = "すっかり日が沈み、本来なら生徒はいないはずの時間。"
translation = "완전히 해가 저물어, 원래라면 학생이 없어야 할 시간."

[[dialogue]]
speaker = "unk"
original = "だが俺と環はこっそりと星徒会室に侵入していた。"
translation = "하지만 나와 타마키는 몰래 성도회실에 침입해 있었다."

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「これからここでエッチしちゃうんだ……ドキドキするなぁ……」"
translation = "「이제 여기서 섹스해버리는구나…… 두근두근하네……」"

[[dialogue]]
speaker = "unk"
original = "男女としてあまり意識していなかった俺たちだが、一度距離が縮まると早いもので、いつの間にか爛れた関係になっていた。"
translation = "남녀로서 별로 의식하지 않았던 우리들이었지만, 한번 거리가 좁혀지자 진전은 빨랐고, 어느샌가 문란한 관계가 되어 있었다."

[[dialogue]]
speaker = "unk"
original = "俺と環が付き合っていることも、学園内のいろんな場所でエッチしているのも、みんなには秘密だ。"
translation = "나와 타마키가 사귀고 있는 것도, 학원 내의 여러 장소에서 섹스하고 있는 것도, 모두에게는 비밀이다."

[[dialogue]]
speaker = "unk"
original = "そして──"
translation = "그리고──"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「んっしょ……と」"
translation = "「응차…… 하고」"

[[dialogue]]
speaker = "unk"
original = "環が会長用の机の上に四つん這いになり、胸をはだけて俺にお尻を突き出す。"
translation = "타마키가 회장용 책상 위에 엎드려 기는 자세가 되어, 가슴을 헤치고 나에게 엉덩이를 내민다."

[[dialogue]]
speaker = "unk"
original = "スパッツ越しに形のいいお尻が強調されて、セックスするためだけの体勢になっていた。"
translation = "스패츠 너머로 모양 좋은 엉덩이가 강조되어, 섹스하기만을 위한 체위가 되어 있었다."

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「うわ……我ながらすごいかっこしてる」"
translation = "「우와…… 나 스스로도 엄청난 꼴을 하고 있네」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「エッチな眺めだ」"
translation = "「야한 광경이야」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「言わないでよ。めちゃくちゃ恥ずかしいんだけど」"
translation = "「말하지 마. 엄청 부끄러우니까」"

[[dialogue]]
speaker = "unk"
original = "そう言いつつも、環の表情には笑みが浮かんでいた。"
translation = "그렇게 말하면서도, 타마키의 표정에는 미소가 떠올라 있었다."

[[dialogue]]
speaker = "unk"
original = "星徒会室でエッチすることに不安や羞恥もあるようだが、期待の方が勝っているようだ。"
translation = "성도회실에서 섹스하는 것에 불안이나 수치심도 있는 듯하지만, 기대감이 더 앞서는 모양이다."

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「知ってる？\u3000スパッツって本当は下着らしいよ。だから今はノーパン。下は生のお尻だよ」"
translation = "「알고 있어? 스패츠는 사실 속옷이래. 그러니까 지금은 노팬티. 아래는 생엉덩이야」"

[[dialogue]]
speaker = "unk"
original = "そう言われると興奮が止まらなくて、スパッツ越しにお尻を揉みしだく。"
translation = "그 말을 듣자 흥분이 멈추지 않아서, 스패츠 너머로 엉덩이를 주물러 터뜨린다."

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「ふわっ……あ……んっ<emoji=heart04>\u3000んもう、触り方がいやらしいんだから<emoji=heart04>」"
translation = "「후앗…… 아…… 응<emoji=heart04> 정말이지, 만지는 법이 야하다니까<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "運動部に助っ人に出ている環らしく、お尻に張りと弾力があって、俺の指を押し返してくる。"
translation = "운동부에서 도우미로 활동하는 타마키답게, 엉덩이에 탄력과 탄성이 있어 내 손가락을 밀어낸다."

[[dialogue]]
speaker = "unk"
original = "それでいてむっちりとした肉感もあり、いつまでも触っていたいくらいだ。"
translation = "그러면서도 포동포동한 육감도 있어, 언제까지나 만지고 싶을 정도다."

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「ん、んん……はぁ、ぁん……<emoji=heart04>\u3000お尻ばっかり触ってないで早くおち○ちんちょうだいよぉ……<emoji=heart04>」"
translation = "「응, 으응…… 하아, 아앙……<emoji=heart04> 엉덩이만 만지지 말고 빨리 자지 줘어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "待ちきれないとばかりに、誘うように小さくお尻を揺らす環。"
translation = "기다릴 수 없다는 듯이, 유혹하듯 작게 엉덩이를 흔드는 타마키."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「もっとおねだりしてほしいな」"
translation = "「좀 더 졸라줬으면 좋겠는데」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「しょうがないなぁ……エッチな会長さんなんだから」"
translation = "「어쩔 수 없네…… 야한 회장님이라니까」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「おま○こ熱くて、おち○ちん欲しくてたまらないんだ……<emoji=heart04>」"
translation = "「보지 뜨거워서, 자지 갖고 싶어서 참을 수 없어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「硬くて大きい会長のおち○ちん、ボクのおま○こに入れてぇ……<emoji=heart04>\u3000会長のおち○ちんで、ボクのエッチなおま○こズボズボして、気持ち良くしてぇ<emoji=heart04>」"
translation = "「딱딱하고 커다란 회장의 자지, 내 보지에 넣어줘어……<emoji=heart04> 회장의 자지로, 내 야한 보지 퍽퍽 해줘서, 기분 좋게 해줘어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "いつもは男子のように元気な環が、はしたなくお尻を振り、媚びた声でねだる。"
translation = "평소에는 남자아이처럼 활기찬 타마키가, 천박하게 엉덩이를 흔들며 아양 떠는 목소리로 조른다."

[[dialogue]]
speaker = "unk"
original = "メスになった環を見ただけでペニスが射精しそうなほどいきり立ち、スパッツを破って突き入れた。"
translation = "암컷이 된 타마키를 본 것만으로 페니스가 사정할 정도로 꼿꼿이 서서, 스패츠를 찢고 찔러 넣었다."

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「ひぁああ～～～っ<emoji=heart04>\u3000入って、きた……ふぁああっ……あっ……はぁんっ<emoji=heart04>\u3000おち○ちん、おっきいっ……はぁ、はぁ……あぁっ<emoji=heart04>」"
translation = "「히아아아～～～앗<emoji=heart04> 들어, 왔어…… 화아앗…… 앗…… 하앙<emoji=heart04> 자지, 커어…… 하아, 하아…… 아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "スパッツ越しのお尻も艶めかしかったが、膣口の周りだけ破けているのもいやらしくていい。"
translation = "스패츠 너머의 엉덩이도 요염했지만, 질 입구 주변만 찢어져 있는 것도 상스러워서 좋다."

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「はぁ、はっ……ほんとにおち○ちん入れちゃった……♪\u3000神聖な星徒会室でエッチするなんて、会長失格だね……っ♪\u3000あっ……あっ……あぁんっ<emoji=heart04>」"
translation = "「하아, 하앗…… 정말로 자지 넣어버렸어……♪ 신성한 성도회실에서 섹스하다니, 회장 실격이네……♪ 앗…… 앗…… 아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「環だって期待してたんだろ？」"
translation = "「타마키도 기대하고 있었잖아?」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「だって仕方ないじゃん、キミと早くエッチしたかったんだから……ひあぁっ……ふぁあっ……はぁんっ<emoji=heart04>」"
translation = "「그치만 어쩔 수 없잖아, 너랑 빨리 섹스하고 싶었으니까…… 히아앗…… 화앗…… 하앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「こんな気持ちいいこと知っちゃったら……あっ、んんっ……好きになっちゃうに決まってるじゃんっ……ふぁ……はぁ……んああ～っ<emoji=heart04>」"
translation = "「이런 기분 좋은 거 알아버리면…… 앗, 응으윽…… 좋아하게 될 게 뻔하잖아…… 화…… 하아…… 응아아～앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "環の中はやけどしそうなほど熱くて、大量の愛液で蕩けそうだ。"
translation = "타마키의 안은 데일 정도로 뜨겁고, 대량의 애액으로 녹아내릴 것 같다."

[[dialogue]]
speaker = "unk"
original = "蜜で潤った柔らかな肉壁に包まれ、極上の快感を味わう。"
translation = "꿀로 젖은 부드러운 육벽에 감싸여, 극상의 쾌감을 맛본다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「環のおま○こ、トロトロですごく気持ちいいよ」"
translation = "「타마키의 보지, 걸쭉해서 정말 기분 좋아」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「それじゃボクがエッチな女の子みたいじゃん……はぁっ、はっ、んんっ……<emoji=heart04>\u3000あっ……んっ……でも嬉しい<emoji=heart04>」"
translation = "「그러면 내가 야한 여자아이 같잖아…… 하앗, 핫, 응으윽……<emoji=heart04> 앗…… 응…… 그래도 기뻐<emoji=heart04>」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「ひぁああっ……はぁっ……あぁっ<emoji=heart04>\u3000おち○ちん、中で動いて……ボクも気持ちいい……っ<emoji=heart04>\u3000んぁ……はぁっ、あっ、あんっ<emoji=heart04>」"
translation = "「히아아앗……하앗……아앗<emoji=heart04> 자지, 안에서 움직여서……나도 기분 좋아……윽<emoji=heart04> 응아……하앗, 앗, 안앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスを突き出す度に大きな胸が揺れて、男の本能を刺激する。"
translation = "페니스를 찔러넣을 때마다 커다란 가슴이 흔들리며, 남자의 본능을 자극한다."

[[dialogue]]
speaker = "unk"
original = "環の胸はボーイッシュな雰囲気からは意外なほど女らしく膨らんでいて、余計に情欲をかき立てる。"
translation = "타마키의 가슴은 보이시한 분위기와는 의외일 정도로 여자답게 부풀어 있어, 더욱 정욕을 불러일으킨다."

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「ふやぁっ、はぁっ……あっ、ぁんっ……<emoji=heart04>\u3000ねぇ、星徒会っていつもどんなことしてるの？」"
translation = "「후야앗, 하앗……앗, 아안……<emoji=heart04> 저기, 성도회는 평소에 어떤 일을 해?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そうだな……」"
translation = "「글쎄……」"

[[dialogue]]
speaker = "unk"
original = "書類に判を押したり、学園行事を計画したり、リクリエ対策を話し合ったり。"
translation = "서류에 도장을 찍거나, 학원 행사를 계획하거나, 리크리에 대책을 논의하거나."

[[dialogue]]
speaker = "unk"
original = "いつも賑やかで、ふざけたりすることもあるが、ちゃんと学園のために星徒会活動をしているはずだ。"
translation = "항상 시끌벅적하고 장난을 치기도 하지만, 분명 학원을 위해 성도회 활동을 하고 있을 터다."

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「へぇ、そういうことする場所で、今、エッチしてるんだ……はぁ、あ、んっ……あっ、はっ、あんっ……<emoji=heart04>」"
translation = "「헤에, 그런 일을 하는 장소에서, 지금, 섹스하고 있구나……하아, 아, 응……앗, 하앗, 안앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「ヴィーナスやマトイが仕事してるところで……おち○ちんでおま○こズボズボされて……エッチしてる……はぁ、あっ、んっ……ひやぁああっ<emoji=heart04>」"
translation = "「비너스나 마토이가 일하는 곳에서……자지로 보지 즈보즈보 당하면서……섹스하고 있어……하아, 앗, 응……히야아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "環の言う通り、こんなところでエッチしている俺は星徒会長失格かもしれない。"
translation = "타마키의 말대로, 이런 곳에서 섹스를 하고 있는 나는 성도회장 실격일지도 모른다."

[[dialogue]]
speaker = "unk"
original = "そう思っていても体は止まらず、環のお尻めがけて下半身を動かし続ける。"
translation = "그렇게 생각하면서도 몸은 멈추지 않고, 타마키의 엉덩이를 향해 하반신을 계속 움직인다."

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「ふっ、はっ、んっ──ん～っ<emoji=heart04>\u3000屋上でした時は、下から見えるんじゃないかってドキドキしたよね……<emoji=heart04>」"
translation = "「훗, 하앗, 응──으음~<emoji=heart04> 옥상에서 했을 때는, 밑에서 보이지 않을까 두근두근했었지……<emoji=heart04>」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「はぁっ……あん……体育館裏の時は、足音が聞こえて……人が来そうになったし……あぁっ、はっ……んっ<emoji=heart04>」"
translation = "「하앗……안……체육관 뒤편에서 했을 때는, 발소리가 들려서……사람이 올 뻔했고……아앗, 하앗……응<emoji=heart04>」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「休み時間に、トイレの個室でしたのも、ヤバかった……あっ、あっ、んっ……声、聞かれて、見つかりかけて……はぁっ、はっ……ひやああぁっ<emoji=heart04>」"
translation = "「쉬는 시간에, 화장실 칸에서 한 것도, 위험했어……앗, 앗, 응……목소리 들려서, 들킬 뻔하고……하앗, 하앗……히야아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「それに、キミ専用のトイレになってるみたいで……ぁん……なんか、変なのに目覚めそうだったし……ふあぁ……はっ、は──はぁああんっ<emoji=heart04>」"
translation = "「게다가, 너 전용 화장실이 된 것 같아서……아안……왠지, 이상한 거에 눈뜰 것 같았고……후아아……하앗, 하──하아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "以前のセックスを思い出し、膣がきゅうっと収縮した。"
translation = "이전의 섹스를 떠올리자, 질이 꽉 하고 수축했다."

[[dialogue]]
speaker = "unk"
original = "ペニスに肉ひだが押し付けられて、柔らかさと圧迫感を同時に味わう。"
translation = "페니스에 살주름이 밀착되어, 부드러움과 압박감을 동시에 맛본다."

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「星徒会室でするのも、ゾクゾクする……はぁ、はぁ、はんっ……あ……はっ、はっ、はぁ、はぁっ……ひぁあああっ<emoji=heart04>」"
translation = "「성도회실에서 하는 것도, 오싹오싹해……하아, 하아, 하안……아……하앗, 하앗, 하아, 하앗……히아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "星徒会室でエッチしていると神聖な場所を穢しているようで、背徳感が快感に変わる。"
translation = "성도회실에서 섹스를 하고 있으니 신성한 장소를 더럽히는 것 같아, 배덕감이 쾌감으로 변한다."

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「んんっ……<emoji=heart04>\u3000キミのおち○ちん、ビクッとしたぁ……星徒会室で興奮してるんだ……<emoji=heart04>\u3000あっ、ふぁ……会長の、ヘンタイ……<emoji=heart04>」"
translation = "「으응……<emoji=heart04> 너의 자지, 움찔거렸어……성도회실이라 흥분하고 있구나……<emoji=heart04> 앗, 후아……회장님, 변태……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それを言うなら環もだろ」"
translation = "「그걸 따지자면 타마키도 마찬가지잖아」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「ふあぁっ、はぁっ……うん、ボクもキミも、ヘンタイだね……んはぁっ、はぁっ、あんっ……<emoji=heart04>\u3000ふああっ……はぁっ、はぁっ……あ──ひああんっ<emoji=heart04>」"
translation = "「후아아, 하아…… 응, 나도 너도, 변태네…… 응하아, 하아, 앙……<emoji=heart04> 후아앗…… 하아, 하아…… 아── 히아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "環と一緒にいると歯止めが利かなくて、溺れるように肉欲に染まっていく。"
translation = "타마키와 함께 있으면 제어 장치가 듣지 않아서, 익사하듯 육욕에 물들어 간다."

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「ひやぁああ～～っ<emoji=heart04>\u3000はぁっ……はっ、はっ、はぁんっ<emoji=heart04>\u3000おま○こ気持ちいい……っ<emoji=heart04>\u3000気持ちいいよぉっ<emoji=heart04>」"
translation = "「히야아아아~~<emoji=heart04> 하아…… 하앗, 하앗, 하앙<emoji=heart04> 보지 기분 좋아……<emoji=heart04> 기분 좋아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「おち○ちん熱くてっ……ふわぁっ、はっ、はっ、あぁんっ……お腹の中、かき回されるの、好きぃ……っ<emoji=heart04>\u3000んはぁ、はぁ……あ──ひぁああっ<emoji=heart04>」"
translation = "「자지 뜨거워서…… 후와아, 하앗, 하앗, 아앙…… 배 속, 휘저어지는 거, 좋아……<emoji=heart04> 응하아, 하아…… 아── 히아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺の動きに合わせるように、環もお尻を振って快楽を貪る。"
translation = "내 움직임에 맞추는 것처럼, 타마키도 엉덩이를 흔들며 쾌락을 탐한다."

[[dialogue]]
speaker = "unk"
original = "いつもの快活な環とは別人のように甘い声で喘ぐのがいやらしい。"
translation = "평소의 활기찬 타마키와는 딴판인 달콤한 목소리로 신음하는 게 음란하다."

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「はぁっ、はっ……あ──んんっ<emoji=heart04>\u3000大きなおち○ちんで、ボクの中、広げられてるっ……んっ……ふあぁっ、あっ──ああぁん<emoji=heart04>」"
translation = "「하아, 하앗…… 아── 응<emoji=heart04> 커다란 자지로, 내 안, 넓혀지고 있어…… 응…… 후아아, 앗── 아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「ふぁああっ、あっ、はんっ──<emoji=heart04>\u3000あっ、あんっ……ボクのおま○こ、キミのおち○ちんの形になっちゃうっ……キミ専用にされてるよぉっ<emoji=heart04>」"
translation = "「후아아아, 앗, 항──<emoji=heart04> 앗, 앙…… 내 보지, 네 자지 모양이 되어버려…… 너 전용이 되고 있어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「んはぁっ、あっ……はっ、はっ……はっ──ふぁああっ<emoji=heart04>\u3000ズボズボされるの、気持ちいいっ……ふあぁっ、はっ、ああぁっ……んん～～っ<emoji=heart04>」"
translation = "「응하아, 앗…… 하앗, 하앗…… 하앗── 후아아아<emoji=heart04> 즈보즈보 당하는 거, 기분 좋아…… 후아아, 하앗, 아아아…… 응응~~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "腰をグラインドさせる度、ぐちゅぐちゅ、ぐちゅぐちゅと卑猥な音が星徒会室に広がる。"
translation = "허리를 그라인드할 때마다, 구츄구츄, 구츄구츄 하고 비속한 소리가 성도회실에 퍼진다."

[[dialogue]]
speaker = "unk"
original = "肉付きのいいお尻が目の前で揺れて、否応なしに興奮が加速していく。"
translation = "살집 좋은 엉덩이가 눈앞에서 흔들려, 어쩔 수 없이 흥분이 가속되어 간다."

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「ひゃあああっ！？\u3000はぁ、はぁっ……おち○ちん、奥まで届いてるっ……<emoji=heart04>\u3000はぁ、はぁっ……あっ、あっ、あ、ああぁんっ<emoji=heart04>」"
translation = "「히야아아앗!? 하아, 하아…… 자지, 안쪽까지 닿고 있어……<emoji=heart04> 하아, 하아…… 앗, 앗, 아, 아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「あっ、あんっ……ふやあぁっ<emoji=heart04>\u3000ズン、ズンって、すごいぃ……っ<emoji=heart04>\u3000はあぁ……はっ、はっ……んんっ……ふぁ──はっ──ひぁああっ<emoji=heart04>」"
translation = "「앗, 앙…… 후야아아<emoji=heart04> 즌, 즌 하고, 굉장해…… 하아…… 하앗, 하앗…… 응응…… 후아── 하앗── 히아아아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスを思い切り突き出すと、根元までうずまり、全体が粘膜に包まれる。"
translation = "페니스를 힘껏 찔러넣자, 뿌리까지 파묻히며 전체가 점막에 감싸인다."

[[dialogue]]
speaker = "unk"
original = "竿の部分がとろとろに濡れた膣壁と激しく摩擦し、膨らんだ亀頭が最奥にぶつかった。"
translation = "기둥 부분이 걸쭉하게 젖은 질벽과 격렬하게 마찰하고, 부풀어 오른 귀두가 가장 안쪽에 부딪혔다."

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「んっ──んんっ──ん～～っ<emoji=heart04>\u3000おち○ちんで、奥、トントンってされてぇ……んぁっ、はぁんっ<emoji=heart04>\u3000あっ、あっ、んんーーっ<emoji=heart04>」"
translation = "「응── 응응── 응~~<emoji=heart04> 자지로, 안쪽, 톡톡 해줘서…… 응아, 하앙<emoji=heart04> 앗, 앗, 응응──<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスの先端が環の奥──子宮を叩く度、丸いお尻が震える。"
translation = "페니스의 끝이 타마키의 안쪽── 자궁을 때릴 때마다, 둥근 엉덩이가 떨린다."

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「ひやっ、はっ、ああ～っ<emoji=heart04>\u3000そんなに奥ばっかり、されると……はぁっ、はぁ、はんっ……キミのおち○ちんのことしか考えられなくなっちゃうよぉっ<emoji=heart04>」"
translation = "「히얏, 하앗, 아아~<emoji=heart04> 그렇게 안쪽만, 당하면…… 하아, 하아, 항…… 네 자지 생각밖에 할 수 없게 되어버려어<emoji=heart04>」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「ふわっ、ああっ……あっ、あぁんっ<emoji=heart04>\u3000奥、すごいっ……子宮にっ……赤ちゃんのお部屋に当たってる……っ<emoji=heart04>」"
translation = "「후왓, 아아…… 앗, 아아앙<emoji=heart04> 안쪽, 굉장해…… 자궁에…… 아기 방에 닿고 있어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「あっ……またおち○ちんビクビクしてるぅ……っ<emoji=heart04>\u3000あっ、はぁんっ……ビクビクしてるおち○ちんで、ズボズボされるの気持ちいいっ<emoji=heart04>」"
translation = "「앗…… 또 자지가 움찔움찔거려……읏<emoji=heart04> 앗, 하앙…… 움찔거리는 자지로, 퍽퍽 박히는 거 기분 좋아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "隠れて何度もエッチしたおかげで、環はすっかり奥で感じるようになっていた。"
translation = "몰래 몇 번이나 섹스한 덕분에, 타마키는 완전히 안쪽에서 느낄 수 있게 되어 있었다."

[[dialogue]]
speaker = "unk"
original = "環の中に出したいと、ねだるように子宮口を繰り返しノックする。"
translation = "타마키의 안에 내보내고 싶어서, 조르듯이 자궁구를 반복해서 노크한다."

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「んああぁっ、はっ、あっ、あんっ<emoji=heart04>\u3000うん、出してっ……キミのせーえきっ……ボクの中にぃ……っ<emoji=heart04>」"
translation = "「응아아읏, 핫, 앗, 앙<emoji=heart04> 응, 내보내 줘…… 너의 정액…… 내 안에……읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「ふはぁっ、はぁっ……ああぁっ……<emoji=heart04>\u3000はぁ、はっ……あっ、んんっ……ボクの子宮……キミのせーえきでいっぱいにしてぇっ<emoji=heart04>」"
translation = "「후하앗, 하앗…… 아아읏……<emoji=heart04> 하아, 핫…… 앗, 응응…… 내 자궁…… 너의 정액으로 가득 채워줘<emoji=heart04>」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「ひやぁあ～～～っ<emoji=heart04>\u3000あ、ああぁっ、あんっ<emoji=heart04>\u3000はあぁっ、あっ、はっ、はっ──んんぁああ～～っ<emoji=heart04>」"
translation = "「히야아아～～읏<emoji=heart04> 아, 아아읏, 앙<emoji=heart04> 하아읏, 앗, 핫, 핫──응응아아아～～읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「いいよっ……おち○ちん、いいっ……はぁっ、はぁっ、はっ──ふぁああっ<emoji=heart04>\u3000ひやああっ、あんっ……あっ、あっ──んっ、んんーーっ<emoji=heart04>」"
translation = "「좋아…… 자지, 좋아…… 하앗, 하앗, 핫──화아앗<emoji=heart04> 히야아앗, 앙…… 앗, 앗──응, 응응ーー읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「そう、もっと、もっとめちゃくちゃに……はぁ、はっ、あぁんっ<emoji=heart04>\u3000ふああぁっ……あっ、はっ、はっ……ひぁああ～～っ<emoji=heart04>」"
translation = "「그래, 좀 더, 좀 더 엉망진창으로…… 하아, 핫, 아앙<emoji=heart04> 후아아읏…… 앗, 핫, 핫…… 히아아아～～읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "甘い嬌声を上げながらはしたなくお尻を振る環。"
translation = "달콤한 교성을 지르며 상스럽게 엉덩이를 흔드는 타마키."

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「はっ、あっ、あっ、あっ──んん～～っ<emoji=heart04>\u3000あっ、んっ……ボクの中で、おち○ちん、大きくなってる……んっ──ああぁっ<emoji=heart04>」"
translation = "「핫, 앗, 앗, 앗──응응～～읏<emoji=heart04> 앗, 응…… 내 안에서, 자지, 커지고 있어…… 응──아아읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "腰を動かす度に下半身が環のお尻にぶつかり、パンパンと肌がぶつかる音が響いた。"
translation = "허리를 움직일 때마다 하반신이 타마키의 엉덩이에 부딪히며, 팡팡 하고 살이 맞닿는 소리가 울려 퍼졌다."

[[dialogue]]
speaker = "unk"
original = "下腹に当たる柔らかいお尻の感触に、ますます欲望が過熱する。"
translation = "아랫배에 닿는 부드러운 엉덩이의 감촉에, 점점 욕망이 과열된다."

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「ふやあぁっ、はぁっ、ああんっ<emoji=heart04>\u3000すごいっ……気持ちいいっ<emoji=heart04>\u3000あっ、はっ、あっ、あんっ……星徒会室でエッチするの気持ちいいよぉっ<emoji=heart04>」"
translation = "「후야아읏, 하앗, 아앙<emoji=heart04> 대단해…… 기분 좋아<emoji=heart04> 앗, 핫, 앗, 앙…… 성도회실에서 섹스하는 거 기분 좋아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「はっ、あぁ……んぁ、あぁんっ<emoji=heart04>\u3000硬くて太いおち○ちんで、ズボズボされて、おま○こ溶けちゃいそう……ふぁっ、あっ──んん～～っ<emoji=heart04>」"
translation = "「핫, 아아…… 응아, 아앙<emoji=heart04> 딱딱하고 굵은 자지로, 퍽퍽 박혀서, 보지 녹아버릴 것 같아…… 화앗, 앗──응응～～읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「キミのおち○ちん好きぃっ<emoji=heart04>\u3000エッチするの好きぃっ<emoji=heart04>\u3000ふあぁっ、あっ、ああっ……んんああぁっ<emoji=heart04>」"
translation = "「너의 자지 좋아<emoji=heart04> 섹스하는 거 좋아<emoji=heart04> 후아앗, 앗, 아앗…… 응응아아읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "環が甘えたような声でよがり、たまらなく情欲をそそる。"
translation = "타마키가 어리광 부리는 듯한 목소리로 신음하며, 참을 수 없을 정도로 정욕을 자극한다."

[[dialogue]]
speaker = "unk"
original = "捕まえるようにお尻をぎゅっと掴み、肉を揉みしだきながら力強く奥を突く。"
translation = "붙잡듯이 엉덩이를 꽉 움켜쥐고, 살을 주물러대며 힘차게 안쪽을 찌른다."

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「ふぁああっ<emoji=heart04>\u3000ああっ、ひぁあああんっ<emoji=heart04>\u3000出してっ、出してぇっ<emoji=heart04>\u3000キミのせーし、ボクの中にたくさん出してぇっ<emoji=heart04>」"
translation = "「화아앗<emoji=heart04> 아앗, 히아아아앙<emoji=heart04> 내보내 줘, 내보내 줘어<emoji=heart04> 너의 정자, 내 안에 잔뜩 내보내 줘어<emoji=heart04>」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「はっ、はっ、はっ、んんぅ～～っ<emoji=heart04>\u3000おち○ちんで、奥グリグリされてっ……んはぁっ……おま○こイッちゃうぅっ<emoji=heart04>」"
translation = "「핫, 핫, 핫, 응응으～～읏<emoji=heart04> 자지로, 안쪽을 휘저어져서…… 응하앗…… 보지 가버려어<emoji=heart04>」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「んんんっ<emoji=heart04>\u3000子宮に、当たってるっ<emoji=heart04>\u3000んっはぁっ、あっ、あっ──あ、あ、あ、あ──ああ～～っ<emoji=heart04>」"
translation = "「응응응<emoji=heart04> 자궁에, 닿고 있어<emoji=heart04> 응하앗, 앗, 앗──아, 아, 아, 아──아아～～읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「ああっ──ふぁああああ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あっ、ああんっ……熱いの、出てるっ……<emoji=heart04>\u3000お腹の、奥に……ん──ひぁああっ<emoji=heart04>」"
translation = "「아앗──화아아아아～～～～～～읏<emoji=heart04><emoji=heart04><emoji=heart04> 앗, 아앙…… 뜨거운 거, 나오고 있어……<emoji=heart04> 배의, 안쪽에…… 응──히아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「はあぁ、はっ……んんっ<emoji=heart04>\u3000はぁはっ……あっ、あっ……ん～っ<emoji=heart04>\u3000ビューッって、あっついせーえき、入ってくるの、気持ちいい……っ<emoji=heart04>」"
translation = "「하아아, 핫…… 응응<emoji=heart04> 하아핫…… 앗, 앗…… 응～읏<emoji=heart04> 뷰웃 하고, 뜨거운 정액, 들어오는 거, 기분 좋아……읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "熱くて柔らかな膣壁が収縮し、しがみつくようにペニスをぎゅっと締め付ける。"
translation = "뜨겁고 부드러운 질벽이 수축하며, 매달리듯이 페니스를 꽉 조여온다."

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「あ──は──んっ<emoji=heart04>\u3000おち○ちん、ボクの中でドクドクして……っ<emoji=heart04>\u3000んぁっ、すごいっ……はぁ、はぁ……あっ、んぅ……っ<emoji=heart04>」"
translation = "「아──하──응<emoji=heart04> 자지, 내 안에서 울컥울컥 거려서……읏<emoji=heart04> 응앗, 대단해…… 하아, 하아…… 앗, 응으……읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「まだ出てっ……んっ……ああぁっ<emoji=heart04>\u3000あ……あ──赤ちゃんのお部屋、いっぱいに、なるぅ～っ……ふぁああ……んん～～～っ<emoji=heart04>」"
translation = "「아직 더 내보내 줘…… 응…… 아아읏<emoji=heart04> 아…… 아──아기방, 가득 차버려어～읏…… 화아아…… 응응～～～읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「んっ……抜けちゃった。はぁ……はあぁ……最後までエッチしちゃったね<emoji=heart04>」"
translation = "「응…… 빠져버렸다. 하아…… 하아아…… 끝까지 섹스해버렸네<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスを引き抜くと、射精された精液が中から溢れてきた。"
translation = "페니스를 뽑아내자, 사정된 정액이 안에서 넘쳐흘러 나왔다."

[[dialogue]]
speaker = "unk"
original = "射精の快感が強烈すぎて下半身が痺れてしまいそうなくらいだ。"
translation = "사정의 쾌감이 너무나 강렬해서 하반신이 저려버릴 것 같을 정도다."

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「ボクの中にこんなにたくさん出してくれたんだ。でもキミのがこぼれちゃうのもったいないな」"
translation = "「내 안에 이렇게나 잔뜩 내보내 줬어. 하지만 네 정액이 흘러넘치는 건 아깝네」"

[[dialogue]]
speaker = "unk"
original = "環が名残惜しそうにそう言ってくれるのが嬉しい。"
translation = "타마키가 아쉬운 듯이 그렇게 말해주는 것이 기쁘다."

[[dialogue]]
speaker = "unk"
original = "互いを求めて、どちらからともなく唇が近づく。"
translation = "서로를 원하며, 어느 쪽이라 할 것 없이 입술이 가까워진다."

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「ちゅっ……んっ……ちゅるるっ<emoji=heart04>\u3000ちゅくっ、ちゅぱっ、れろ……んぅ……れろれろ……はぁ……ん、ふぅ……<emoji=heart04>」"
translation = "「츄웁…… 응…… 츄르릅<emoji=heart04> 츄욱, 츄파, 레로…… 응으…… 레로레로…… 하아…… 응, 후우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「はむっ、ちゅくるちゅる、んちゅぅっ<emoji=heart04>\u3000はぁ……くちゅっ、ちゅぱっ、れろれろ──ぷはぁ……っ<emoji=heart04>」"
translation = "「하무, 츄쿠루츄루, 응츄우<emoji=heart04> 하아…… 쿠츄, 츄파, 레로레로──푸하앗……읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「キミとキスするの好きだよ。ヘヘ」"
translation = "「너랑 키스하는 거 좋아해. 헤헤」"

[[dialogue]]
speaker = "unk"
original = "星徒会室でセックスしたというのに、こうして見つめ合うと、背徳感より愛しい気持ちが大きくなる。"
translation = "성도회실에서 섹스를 했는데도, 이렇게 마주 보고 있으면 배덕감보다 사랑스러운 마음이 커진다."

[[dialogue]]
speaker = "unk"
original = "環の唇から唾液が糸になって落ちる。"
translation = "타마키의 입술에서 타액이 실이 되어 떨어진다."

[[dialogue]]
speaker = "unk"
original = "性器からは白くてどろりとした精液がまだ垂れていて、淫猥な光景にまたペニスが勃起してしまいそうだ。"
translation = "성기에서는 하얗고 걸쭉한 정액이 아직 흘러내리고 있어, 음란한 광경에 다시 페니스가 발기해버릴 것 같다."

[[dialogue]]
speaker = "unk"
original = "環の中から俺の精液が溢れているのが本当にいやらしくて──"
translation = "타마키의 안에서 내 정액이 넘쳐흐르는 것이 정말 야해서──"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「あれ……？\u3000もしかしてボク、このまま帰らないとダメ？\u3000中出しされたあそこ丸出しで帰るの？\u3000何のプレイだよ。そんなの痴女じゃん」"
translation = "「어라……? 설마 나, 이대로 돌아가지 않으면 안 돼? 질내사정 당한 거기 다 드러내고 돌아가는 거야? 무슨 플레이야. 그런 건 치녀잖아」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「も～っ、キミがスパッツ破っちゃうからじゃんっ！\u3000会長のバカ～～～っ！」"
translation = "「정말～, 네가 스패츠를 찢어버려서 그렇잖아! 회장 바보～～～앗!」"

