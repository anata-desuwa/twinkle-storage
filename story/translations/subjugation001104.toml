[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「トワ。今日この後、一緒に飲みに行きましょう」"
translation = "「토와. 오늘 이따가 같이 마시러 가요」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker = "unk"
original = "トワが声をかけられたのは、メイプルと面談をした翌日。勤務を終えて、家に帰ろうとした時のことだった。"
translation = "토와가 제안을 받은 것은 메이플과 면담을 한 다음 날. 근무를 마치고 집에 돌아가려 할 때였다."

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「マリオン、こんなところで待ってたりして、どうしたの？」"
translation = "「마리온, 이런 곳에서 기다리고 있다니 무슨 일이야?」"

[[dialogue]]
speaker = "unk"
original = "彼女は星見家メイド隊の１人、マリオン・ネイマール。"
translation = "그녀는 호시미 가문 메이드대 중 한 명인 마리온 네이마르."

[[dialogue]]
speaker = "unk"
original = "トワの友人で、かつて流星学園に通っていた際の元同級生である。"
translation = "토와의 친구이자 과거 유성학원에 다닐 당시의 전 동급생이다."

[[dialogue]]
speaker = "unk"
original = "そして当時、トワと共に流星星徒会に所属し、『ドールズマスター』と二つ名で最強無敗を誇った、元星徒会長の肩書きを持つ人物でもある。"
translation = "그리고 당시 토와와 함께 유성 성도회에 소속되어 『돌즈 마스터』라는 이명으로 최강 무패를 자랑했던 전 성도회장의 직함을 가진 인물이기도 하다."

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「聞きました。居候のメイプル様との間でトラブルがあったのでしょう？」"
translation = "「들었습니다. 얹혀살고 있는 메이플 님과의 사이에 트러블이 있었다면서요?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「どこでそれを……」"
translation = "「어디서 그걸……」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「会長様が、トワのことを心配して、私に相談して下さったんですよ」"
translation = "「회장님이 토와를 걱정해서 저에게 상담해 주셨거든요」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「会長くんが……」"
translation = "「회장군이……」"

[[dialogue]]
speaker = "unk"
original = "それからトワは、マリオンに連れられて、よく行く近所の飲み屋に入る。座敷で向かい合って、しばらく事情を話すと――"
translation = "그 후 토와는 마리온의 손에 끌려 자주 가는 근처 선술집으로 들어간다. 좌식 테이블에 마주 앉아 잠시 사정을 이야기하자──"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「――なるほど。それは確かに失言でしたね」"
translation = "「──그렇군요. 그건 확실히 실언이었네요」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「……うん。私は、メイプルちゃんの家庭事情を詳しく知っているわけじゃない。それに、メイプルちゃんの気持ちを軽々しく考えてしまった……」"
translation = "「……응. 나는 메이플짱의 가정 사정을 자세히 아는 게 아냐. 게다가 메이플짱의 마음을 너무 가볍게 생각했어……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「そりゃあ、私の注意を聞いてくれるわけないよね。上辺だけの言葉なんだもん」"
translation = "「그러니 내 주의를 들어줄 리가 없지. 겉치레뿐인 말이었는걸」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「トワは、彼女の夢に対しては、どう思っているんですか？\u3000応援したくないのか、応援してあげたいのか」"
translation = "「토와는 그녀의 꿈에 대해 어떻게 생각하나요? 응원하고 싶지 않은 건가요, 응원해 주고 싶은 건가요」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「夢……メイプルちゃんが、魔王になりたいっていう話……？」"
translation = "「꿈…… 메이플짱이 마왕이 되고 싶다는 이야기……?」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「ええ、『夢』でしょう？\u3000メイプル様にとっては、自身の追い求める理想――憧れの英雄なのですから」"
translation = "「네, 『꿈』이잖아요? 메이플 님에게는 자신이 추구하는 이상── 동경하는 영웅인 거니까요」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「……正直、魔王を目指すって夢は荒唐無稽だと思ってる」"
translation = "「……솔직히 마왕을 목표로 한다는 꿈은 터무니없다고 생각해」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「でも、それを本気で叶える為に、メイプルちゃんがここに来たんだってことはよくわかった」"
translation = "「하지만 그걸 진심으로 이루기 위해 메이플짱이 여기 왔다는 건 잘 알았어」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「その諦めないで夢を追う気持ちを、私は応援してあげたい」"
translation = "「그 포기하지 않고 꿈을 쫓는 마음을 나는 응원해 주고 싶어」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「だけど先生として……彼女の背中を押すことが本当に正しいのか、わからない」"
translation = "「하지만 선생님으로서…… 그녀의 등을 밀어주는 게 정말 옳은 건지 모르겠어」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「だって、今のメイプルちゃんは……昔の――あの時の私と被るんだもん」"
translation = "「왜냐면 지금의 메이플짱은…… 옛날의── 그때의 나랑 겹쳐 보인단 말이야」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「なるほど。だから、学園に入学させることを躊躇っていたんですね」"
translation = "「그렇군요. 그래서 학원에 입학시키는 것을 주저하고 있었던 거군요」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「潜在能力は、すごいよ。クルセイダースの子孫だって言われて、納得しちゃった。現状でも、すぐプリマステラになれるだけの力がある」"
translation = "「잠재능력은 대단해. 크루세이더스의 후예라는 말을 듣고 납득해 버렸어. 현 상태로도 당장 프리마스테라가 될 수 있을 정도의 힘이 있어」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「だけど、心持ちが……危う過ぎる。メイプルちゃんを見ていて、よくわかったよ。あの時の自分が、マリオンたちからどう見えていたのか」"
translation = "「하지만 마음가짐이…… 너무 위태로워. 메이플짱을 보고 있으니 잘 알겠어. 그때의 내가 마리온 일행에게 어떻게 보였을지」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「……マリオンだったら、きっと実力で言うことを聞かせるんだろうね。あの時みたいに」"
translation = "「……마리온이라면 분명 실력으로 말을 듣게 했겠지. 그때처럼」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「自分に勝てたら好きにすればいい。でも自分が勝ったら、言うことをちゃんと聞くこと――ってさ」"
translation = "「자신을 이기면 마음대로 하라고. 하지만 자신이 이기면 말을 잘 들으라고── 라멘서 말이야」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「そうでしたね。ただ――」"
translation = "「그랬었죠. 다만──」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「仮に、トワが私と同じ力を持っていたとしても、そうはしないでしょう？」"
translation = "「만약 토와가 나와 같은 힘을 가졌다고 해도 그렇게 하지 않았겠죠?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「トワ、あなたは賢い。そして、心優しい」"
translation = "「토와, 당신은 현명해요. 그리고 마음이 따뜻하죠」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「当時、人形のように無機質な性格だった私に、他人と関わる楽しさを、誰かを思いやる心を教えくれたのは、あなたです」"
translation = "「당시 인형처럼 무기질적인 성격이었던 나에게 타인과 관계 맺는 즐거움을, 누군가를 배려하는 마음을 가르쳐준 건 당신입니다」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「言うことを聞かせられるだけの力を本当は持っている。今はあの時よりも、更に強くなっていることでしょう」"
translation = "「말을 듣게 할 수 있을 만한 힘을 사실은 가지고 있죠. 지금은 그때보다 더욱 강해졌을 테고요」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「それでも力を使わないのは、私や周りを悲しませない為でしょう？」"
translation = "「그런데도 힘을 쓰지 않는 건 나나 주변 사람들을 슬프게 하지 않기 위해서죠?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「……マリオン、もしかして気づいてたの？」"
translation = "「……마리온, 혹시 눈치채고 있었어?」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「気づきますよ。親友ですから。隠れながらも、いつかの為に星力制御の鍛練を欠かさず続けてきたのでしょう？」"
translation = "「눈치채죠. 친우니까요. 숨기면서도 언젠가를 위해 성력 제어 단련을 거르지 않고 계속해 왔잖아요?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「……ごめん、約束を破って」"
translation = "「……미안, 약속을 어겨서」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「いいえ。私にも隠しごとはありますから。トワだって、気づいているでしょう？」"
translation = "「아니요. 저에게도 숨기는 것은 있으니까요. 토와도 눈치채고 있잖아요?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「だから、おあいこです」"
translation = "「그러니 쌤쌤이에요」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「……結局、私自身が半端なんだよね」"
translation = "「……결국 내 자신이 어정쩡한 거지」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「だから、メイプルちゃんにちゃんとした言葉を言えないんだ」"
translation = "「그래서 메이플짱에게 제대로 된 말을 해줄 수 없는 거야」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「私が、大人になりきれていないから」"
translation = "「내가 어른이 다 되지 못했으니까」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「みんな、そういうものですよ。矛盾を抱えながらも、大人になろうと、大人のフリをして。そうやって取捨選択しながら、大人になっていくんです」"
translation = "「다들 그런 법이에요. 모순을 안고서도 어른이 되려고 어른인 척하며. 그렇게 취사선택하면서 어른이 되어가는 겁니다」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「だから、トワが今、なりたいと思う先生になればいいと、私は思います」"
translation = "「그러니 토와가 지금 되고 싶다고 생각하는 선생님이 되면 좋겠다고 저는 생각해요」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「私がなりたいと思う先生……？」"
translation = "「내가 되고 싶다고 생각하는 선생님……?」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「私は、トワに出会えたから、今の自分があるのだと思っています」"
translation = "「저는 토와를 만났기에 지금의 제가 있다고 생각합니다」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「だから、自信を持って下さい。昔、星徒会のみんなとよく冗談で言ってましたけど――」"
translation = "「그러니 자신감을 가지세요. 옛날에 성도회 모두와 자주 농담으로 말하곤 했지만──」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「トワならいい先生になれるって、今は心から信じていますよ」"
translation = "「토와라면 좋은 선생님이 될 수 있다고 지금은 진심으로 믿고 있어요」"

[[dialogue]]
speaker = "unk"
original = "そう言って、親友は昔よりも柔らかな笑顔を浮かべるのだった。"
translation = "그렇게 말하며 친우는 옛날보다 부드러운 미소를 짓는 것이었다."

