[[dialogue]]
speaker = "unk"
original = "第１話,天使の来訪,P"
translation = "제1화, 천사의 내방, P"

[[dialogue]]
speaker = "unk"
original = "時は過ぎ、再び大交流の時期がやってきた。"
translation = "시간은 흘러, 다시 대교류의 시기가 찾아왔다."

[[dialogue]]
speaker = "unk"
original = "今回は天界より人間界へ、大々的な使節団がやってくる。"
translation = "이번에는 천계에서 인간계로 대대적인 사절단이 찾아온다."

[[dialogue]]
speaker = "unk"
original = "その使節団が学園の視察も行うとのことで、先んじて警備隊長であるケイティさんが流星星徒会室を訪れていた。"
translation = "그 사절단이 학원 시찰도 행한다기에, 앞서서 경비대장인 케이티 씨가 유성성도회실을 방문해 있었다."

[[dialogue]]
speaker = "ケイティ"
original = "「本日はお時間をいただき、ありがとうございました」"
translation = "「오늘은 시간을 내주셔서 감사합니다」"

[[dialogue]]
speaker = "ケイティ"
original = "「視察の際、皆様にはまた色々とご協力いただくことになると思います。その際にはよろしくお願いしますね」"
translation = "「시찰 때 여러분께 다시 여러모로 협력을 구하게 될 것 같습니다. 그때 잘 부탁드릴게요」"

[[dialogue]]
speaker = "フィオナ"
original = "「お任せください、ケイティさん。この度は、わざわざご足労いただいてありがとうございました」"
translation = "「맡겨주세요, 케이티 씨. 이번엔 일부러 발걸음 해주셔서 감사합니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それにしても久しぶりね。天界で会って以来だけど、あの時は本当に助かったわ」"
translation = "「그건 그렇고 오랜만이네. 천계에서 만난 이후인데, 그때는 정말 도움 많이 받았어」"

[[dialogue]]
speaker = "ケイティ"
original = "「こちらこそです～。皆様のおかげで天界の平和は保たれました。感謝してもしきれません」"
translation = "「저야말로요~. 여러분 덕분에 천계의 평화는 지켜졌답니다. 감사하다는 말로는 다 부족하네요.」"

[[dialogue]]
speaker = "unk"
original = "あれから天界の様子はどうですか？"
translation = "그 후로 천계의 모습은 어떤가요?"

[[dialogue]]
speaker = "ケイティ"
original = "「極星従騎……でしたか？\u3000あれに荒らされてしまった聖庭園もすっかり元通りになりました」"
translation = "「극성종기……였나요? 그것에 황폐해졌던 성정원도 완전히 원래대로 돌아왔답니다.」"

[[dialogue]]
speaker = "ケイティ"
original = "「平和を脅かしていた諸悪の根源も、皆様の手によって退治されたようですし～……平和が取り戻されて何よりです」"
translation = "「평화를 위협하던 제악의 근원도 여러분의 손에 퇴치된 것 같고~…… 평화를 되찾아서 무엇보다 다행이에요.」"

[[dialogue]]
speaker = "ルリエル"
original = "「ふわ～……すっごく優しそうなお姉さんなのです。あんまり警備隊長って感じじゃありませんね～」"
translation = "「후아~…… 굉장히 상냥해 보이는 언니예요. 별로 경비대장이라는 느낌이 안 드네요~」"

[[dialogue]]
speaker = "ソフィア"
original = "「確かに話に聞いていた印象とは違います。ちっとも怖い方には見えません」"
translation = "「확실히 이야기로 들었던 인상과는 다르군요. 전혀 무서운 분으로는 보이지 않아요.」"

[[dialogue]]
speaker = "ソフィア"
original = "「ですが、会長さんたちが言うには凄腕の剣士だというお話ですし……」"
translation = "「하지만, 회장님들이 말씀하시기로는 대단한 실력의 검사라고 하셨고……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「疑うのも無理はないわね！\u3000でも本っ当にすごいんだから！\u3000こーんなでっかい剣をブンブン振り回して！」"
translation = "「의심하는 것도 무리는 아니지! 하지만 진~짜로 대단하다니까! 이~렇게나 커다란 검을 붕붕 휘두르면서!」"

[[dialogue]]
speaker = "ケイティ"
original = "「あの……そんなに言わないでください。お恥ずかしいです……」"
translation = "「저기…… 그렇게 말씀하지 말아 주세요. 부끄럽답니다……」"

[[dialogue]]
speaker = "unk"
original = "獅子奮迅という感じで"
translation = "사자분신이라는 느낌으로"

[[dialogue]]
speaker = "unk"
original = "でも、本当にすごかったです"
translation = "하지만, 정말 대단했어요"

[[dialogue]]
speaker = "ケイティ"
original = "「本当はみんなが争うことなく、平和的に物事を解決できれば一番良いのですけど……」"
translation = "「사실은 모두가 싸우는 일 없이, 평화적으로 일을 해결할 수 있다면 가장 좋겠지만요……」"

[[dialogue]]
speaker = "ケイティ"
original = "「ですが誰もが平和を愛する心を持っているわけではありませんからね～」"
translation = "「하지만 누구나 평화를 사랑하는 마음을 갖고 있는 것은 아니니까요~」"

[[dialogue]]
speaker = "ケイティ"
original = "「平和のためにはどうしても、力に訴えなければならないこともあります……とても辛いことですが」"
translation = "「평화를 위해서는 어쩔 수 없이 힘에 호소해야만 하는 일도 있답니다…… 무척 괴로운 일이지만요.」"

[[dialogue]]
speaker = "セーラ"
original = "「ま、どーしようもないことって世の中ままあるもんね～」"
translation = "「뭐, 어쩔 수 없는 일이란 게 세상엔 가끔 있는 법이니까~」"

[[dialogue]]
speaker = "ユウリ"
original = "「でも、まずは出来るだけ平和的に解決しようってのはすごくいいと思うぜ！」"
translation = "「하지만, 일단은 가능한 한 평화적으로 해결하려는 건 굉장히 좋다고 생각해!」"

[[dialogue]]
speaker = "ケイティ"
original = "「まあ……なんて素晴らしいのでしょう～。こんなにもたくさんの方が平和の大切さに共感してくださるなんて……」"
translation = "「어머나…… 이 얼마나 멋진 일일까요~. 이렇게나 많은 분이 평화의 소중함에 공감해 주시다니……」"

[[dialogue]]
speaker = "ケイティ"
original = "「この喜びを得たことだけでも、人間界にやってきた意味がありました～♪」"
translation = "「이 기쁨을 얻은 것만으로도, 인간계에 온 의미가 있었네요~♪」"

[[dialogue]]
speaker = "ケイティ"
original = "「滞在期間は限られていますが、その間に少しでも皆さんとも友好を深め、平和の尊さについて分かち合いたいと思っています～」"
translation = "「체재 기간은 한정되어 있지만, 그동안 조금이라도 여러분과 우호를 다지고 평화의 존엄함에 대해 나누고 싶어요~」"

[[dialogue]]
speaker = "フィオナ"
original = "「はい、任務以外でも気軽に遊びに来てください」"
translation = "「네, 임무 외에도 편하게 놀러 와 주세요.」"

[[dialogue]]
speaker = "unk"
original = "次は新星星徒会にも来てください"
translation = "다음은 신성학생회에도 와 주세요"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そうよ、私たちだって流星星徒会に負けないくらい大歓迎するわ！」"
translation = "「그래, 우리도 유성성도회에 지지 않을 정도로 대환영할 거야!」"

[[dialogue]]
speaker = "ケイティ"
original = "「ありがとうございます……魔王さんとも平和について、もっともっとお話ししたいと思っていましたから、とっても嬉しいです～」"
translation = "「감사합니다…… 마왕님과도 평화에 대해서 좀 더 많이 이야기하고 싶다고 생각했으니까, 무척 기뻐요~」"

[[dialogue]]
speaker = "ケイティ"
original = "「ぜひ、新星学園にも遊びに行かせてくださいね♪」"
translation = "「부디 신성학원에도 놀러 가게 해주세요♪」"

[[dialogue]]
speaker = "ルリエル"
original = "「はぁぅ……なんという慈愛に満ちた微笑み……まさに天使……」"
translation = "「하아우…… 이 무슨 자애로 가득 찬 미소…… 그야말로 천사……」"

[[dialogue]]
speaker = "セーラ"
original = "「あはは、そういうルリちーだって天使でしょ」"
translation = "「아하하, 그런 루리치야말로 천사잖아.」"

[[dialogue]]
speaker = "ユウリ"
original = "「ま、同じ天使でもオーラが違うけどな。ルリはケイティさんを見習って、もっと気品ってやつを身に着けたらどうだ？」"
translation = "「뭐, 같은 천사라도 오오라가 다르지만 말이야. 루리는 케이티 씨를 본받아서 좀 더 기품이라는 걸 몸에 익히는 게 어때?」"

[[dialogue]]
speaker = "ルリエル"
original = "「むうう～、酷い言われようですが何も言い返せません」"
translation = "「무우우~, 너무한 말씀이시지만 아무 대꾸도 할 수 없네요.」"

[[dialogue]]
speaker = "ルリエル"
original = "「分かりました！\u3000ルリエルはケイティさんを目標に、天使の中の天使になることをここに誓いますっ！」"
translation = "「알겠습니다! 루리엘은 케이티 씨를 목표로, 천사 중의 천사가 될 것을 여기서 맹세합니다!」"

[[dialogue]]
speaker = "ケイティ"
original = "「そんな……そこまで持ち上げられると、お恥ずかしいです……」"
translation = "「그런…… 그렇게까지 비행기를 태우시면 부끄러워요……」"

[[dialogue]]
speaker = "unk"
original = "ルリエルの宣言に、ほんのりと頬を染めながら上品な恥じらいを見せるケイティさん。"
translation = "루리엘의 선언에 살짝 뺨을 붉히며 우아하게 수줍어하는 케이티 씨."

[[dialogue]]
speaker = "unk"
original = "その様子はルリエルの言う通り、まさに天使の中の天使という言葉がふさわしい……誰もがそう思うだろう。"
translation = "그 모습은 루리엘의 말대로 그야말로 천사 중의 천사라는 말이 어울린다…… 누구라도 그렇게 생각할 것이다."

[[dialogue]]
speaker = "unk"
original = "けれどこの人は、敵対する者を完全に制圧してしまうことから『制圧天使』という異名を持っている。"
translation = "하지만 이 사람은 적대하는 자를 완전히 제압해 버리는 탓에 『제압천사』라는 이명을 갖고 있다."

[[dialogue]]
speaker = "unk"
original = "この人の戦いぶりを目の当たりにした時、みんなの印象は１８０度変わってしまうんだろうな、と心の中で思うのだった。"
translation = "이 사람의 싸우는 모습을 목격했을 때, 모두의 인상은 180도 바뀌어 버리겠지, 라고 마음속으로 생각하는 것이었다."

