[[dialogue]]
speaker = "unk"
original = "そして、ついにクリスマスパーティーの日がやってきた。"
translation = "그리고 마침내 크리스마스 파티 날이 밝았다."

[[dialogue]]
speaker = "unk"
original = "実行委員のメンバーは会場である流星寮に先行し、スタンバイしている。"
translation = "실행위원 멤버들은 회장인 유성 기숙사에 선행하여 대기하고 있다."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「おーっほっほっほ！\u3000最高のパーティー日和ですわね！」"
translation = "「오-홋홋홋! 최고의 파티 날씨군요!」"

[[dialogue]]
speaker = "unk"
original = "会場までエスコートします"
translation = "회장까지 에스코트하겠습니다."

[[dialogue]]
speaker = "unk"
original = "夜ですけどね"
translation = "밤이긴 하지만요."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「あら会長、紳士ですわね。ありがとうございます、ではお願いしますわ」"
translation = "「어머 회장님, 신사적이시군요. 감사합니다, 그럼 부탁드릴게요.」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「皆さんの用意したパーティー、この目でしっかりと見届けさせていただきますわよ！」"
translation = "「여러분이 준비한 파티, 이 눈으로 똑똑히 지켜보겠어요!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「喰らえ！\u3000流星ライダーキィーーーーーックっ！！！」"
translation = "「받아라! 유성 라이더 키이이이이익!!!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「にょわぁぁぁ～～～～っ、危ない！\u3000入っていきなりキックとは物騒ですわね！」"
translation = "「뇨와아아아~~~~앗, 위험해! 들어오자마자 킥이라니 살벌하군요!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「今のを回避するとは、さすが寮長殿だ！\u3000では、私からは祝砲を！」"
translation = "「방금 그걸 피하다니, 역시 기숙사장님이시다! 그럼 나로부턴 축포를!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「メリークリスマーーースッッ！！」"
translation = "「메리 크리스마아아아스으으!!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ぎゃあああ～～～～っ！！」"
translation = "「갸아아아아~~~~앗!!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「大丈夫だ、安心安全の非殺傷タイプだからな！」"
translation = "「괜찮다, 안심 안전한 비살상 타입이니까!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「……安心安全？\u3000どこがですの！\u3000至近距離からバズーカぶっ放すなんて、正気の沙汰とは思えませんわ！」"
translation = "「……안심 안전? 어디가 말인가요! 근거리에서 바주카를 쏴대다니, 제정신이라고는 생각되지 않아요!」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ごめんなさい、寮長さん。もう、事前に伝えてから発射してって言ったじゃない」"
translation = "「미안해요, 기숙사장님. 정말, 미리 말하고 발사하라고 했잖아.」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「おっと、そうだったな。すまない、寮長殿の姿を見てつい気が急いてしまった」"
translation = "「오호, 그랬었지. 미안하다, 기숙사장님의 모습을 보고 그만 마음이 급해졌군.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「クラッカーのゴミ、回収しますね。少しじっとしてて下さい」"
translation = "「폭죽 쓰레기, 치워드릴게요. 조금만 가만히 계세요.」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「え、ええ……よろしく、頼みますわ……」"
translation = "「어, 에에…… 잘, 부탁해요……」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「くるくるくる～～っと、はい完了。次はきちんと警告してから撃たせますので」"
translation = "「뱅글뱅글뱅글~~ 하고, 네 완료. 다음엔 제대로 경고하고 쏘게 할 테니까요.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「それじゃ、失礼しますね～っ」"
translation = "「그럼 실례할게요~」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ごきげんよう……」"
translation = "「평안하시길……」"

[[dialogue]]
speaker = "unk"
original = "ついてきてます？"
translation = "따라오고 계세요?"

[[dialogue]]
speaker = "unk"
original = "大丈夫ですか？"
translation = "괜찮으세요?"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「もう、訳がわかりませんわ！\u3000誰でもいいから説明してくださいますこと？」"
translation = "「정말이지, 영문을 모르겠군요! 누구라도 좋으니 설명 좀 해주시겠어요?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「今のはクリスマスフォームですわよね？\u3000そちらは報告を受けていますので、驚きはしましたけどまあ良しとしますわ」"
translation = "「방금 그건 크리스마스 폼이죠? 그쪽은 보고를 받았으니 놀라긴 했어도 뭐, 넘어가겠어요.」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「そ・れ・よ・り！\u3000私のオーダーは『流星寮の品格に相応しいクリスマスパーティー』だったはずですわよね？」"
translation = "「그·것·보·다! 제 오더는 『유성 기숙사의 품격에 어울리는 크리스마스 파티』였을 텐데요?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「それが初っ端からこの騒ぎ、これのどこに流星寮の品格があるといいますの！」"
translation = "「그런데 시작부터 이 소동이라니, 여기에 대체 어디에 유성 기숙사의 품격이 있다는 건가요!」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「そうですか？\u3000ほら、あっちを見て下さい」"
translation = "「그런가요? 자, 저쪽을 보세요.」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「いったい何ですの？\u3000あれは……聖歌隊ですわね。きちんとした出し物もありますのね」"
translation = "「도대체 뭔가요? 저건…… 성가대군요. 제대로 된 볼거리도 있긴 하네요.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「しっとり上品なコーナーです。伝統的なクリスマスを希望する人は、あっちで楽しんでもらう感じですね」"
translation = "「차분하고 품격 있는 코너예요. 전통적인 크리스마스를 원하는 사람은 저쪽에서 즐기는 느낌이죠.」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「……なるほど、そういうことですのね……私の要望もきちんと取り入れられている、と」"
translation = "「……과연, 그런 거였군요…… 제 요망도 제대로 반영되어 있다는 건가요.」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「しかしっ、全体的にあまりにカオスですわ！\u3000これはいったい誰の仕業ですの！」"
translation = "「하지만 전체적으로 너무나 카오스예요! 이건 도대체 누구 소행인가요!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「すまない、寮長殿。これは私が言い出したことだ」"
translation = "「미안하다, 기숙사장님. 이건 내가 제안한 일이다.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「アニュラス１人じゃないでしょ。というか言い出しっぺは私なんだから、１人で背負おうとしないでよ」"
translation = "「아뉴라스 혼자만이 아니야. 애초에 말을 꺼낸 건 나니까 혼자 짊어지려고 하지 마.」"

[[dialogue]]
speaker = "unk"
original = "もちろん俺も協力者だから"
translation = "당연히 나도 협력자니까."

[[dialogue]]
speaker = "unk"
original = "ごめんね"
translation = "미안해."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「揃いも揃って勝手なことを……どうしてですか？\u3000理由を簡潔に説明なさい！」"
translation = "「너나 할 것 없이 멋대로들…… 어째서인가요? 이유를 간결하게 설명하세요!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「簡潔に……そうだな、これが我々が求めたクリスマスパーティーだからだ」"
translation = "「간결하게…… 그렇군, 이것이 우리가 원한 크리스마스 파티이기 때문이다.」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「皆で騒ぎ立てるばかりの、この混沌としたサバトのような宴が？」"
translation = "「다 함께 떠들기만 하는, 이 혼돈스러운 사바트 같은 연회가 말인가요?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「そこだけ見れば、寮長殿のオーダーからは逸脱していると言ってもいい」"
translation = "「그 부분만 보면 기숙사장님의 오더에선 벗어났다고 해도 좋겠지.」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「しかし、私は流星の騎士を志す者として誓ったんだ。パーティーに参加する皆が楽しめるようにする、とな」"
translation = "「하지만 나는 유성의 기사를 지망하는 자로서 맹세했다. 파티에 참가하는 모두가 즐길 수 있도록 하겠다고 말이다.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「見てください、騒がしくてカオスなのは事実だけど、みんなクリスマスを楽しんでますから」"
translation = "「보세요, 시끄럽고 카오스인 건 사실이지만 다들 크리스마스를 즐기고 있으니까요.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「わははははっ、とおーーっ！！」"
translation = "「와하하하하, 토오오앗!!」"

[[dialogue]]
speaker_original = "流星寮の寮生"
speaker_translation = "유성 기숙사생"
original = "「すごい角度のキックです～！」"
translation = "「엄청난 각도의 킥이에요~!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「流星ライダーここに参上！\u3000さあ、怪人！\u3000かかってこい！」"
translation = "「유성 라이더 여기에 등장! 자, 괴인! 덤벼라!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「……ほんと、めちゃくちゃですわね」"
translation = "「……정말, 엉망진창이군요.」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「跳び蹴りをする者がいると思えば、満面の笑顔でチキンにかぶりつく者、周囲のことなど気にせず熱唱する者まで」"
translation = "「날아차기를 하는 자가 있는가 하면, 함박웃음을 지으며 치킨을 뜯는 자, 주변은 아랑곳하지 않고 열창하는 자까지.」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「めいめいがしたいことを好き勝手に行っている。そのはずですのに、不思議と交流が生まれ、会話が弾んでいる……」"
translation = "「제각각 하고 싶은 일을 마음대로 하고 있어요. 그럴 텐데도 신기하게 교류가 생기고 대화가 꽃피고 있군요……」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「バズーカもあるぞ。もう１発撃とうか？」"
translation = "「바주카도 있다. 한 발 더 쏠까?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「もう結構ですわよ。他の子が撃たれたそうにしているから行ってさしあげて」"
translation = "「이제 됐어요. 다른 아이들이 맞고 싶어 하는 것 같으니 가서 해주시죠.」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「了解だ！\u3000おおーいっ、私のバズーカを受けたい者は名乗りを上げるがいい！」"
translation = "「알았다! 오오오이, 내 바주카를 받고 싶은 자는 이름을 밝혀라!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ほんともう、何なんですの……」"
translation = "「정말이지 이제, 대체 뭐란 말인지……」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ごめんなさい。寮長さんの希望と違うことは分かってました。それでも私たちはみんなで楽しめるパーティーにしたかったんです」"
translation = "「죄송해요. 기숙사장님의 희망과는 다르다는 건 알고 있었어요. 그래도 저희는 다 함께 즐길 수 있는 파티를 만들고 싶었어요.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「みんな何かに追われるように日々を送っています。私もそうですし、きっと他の子たちも多かれ少なかれ、そういうところはあると思います」"
translation = "「다들 무언가에 쫓기듯 하루하루를 보내고 있어요. 저도 그렇고, 분명 다른 아이들도 정도의 차이는 있겠지만 그런 면이 있다고 생각해요.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「でも、せめてパーティーのときくらい、全てから解放されて思いっきりはしゃいで欲しい。笑顔になって欲しい」"
translation = "「하지만 적어도 파티 때만큼은 모든 것에서 해방되어 마음껏 들떴으면 좋겠어요. 미소 지었으면 좋겠고요.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「年齢も立場も関係なく、みんなが楽しめる。そんな空間が作りたかったんです」"
translation = "「나이도 입장도 상관없이 모두가 즐길 수 있는, 그런 공간을 만들고 싶었어요.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「あははははっ、なんかもうめちゃくちゃ楽しいぞ！」"
translation = "「아하하하하, 왠지 이제 엄청나게 즐겁다!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「クリスマスがこんなに楽しいなんて知らなかった！\u3000こんなに楽しいなら、毎日ずっとクリスマスでもいいぞ！」"
translation = "「크리스마스가 이렇게 즐거운 줄 몰랐다! 이렇게 즐겁다면 매일 계속 크리스마스여도 좋겠어!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「メリークリスマス！\u3000みんなっ、メリークリスマス！\u3000メリークリスマスだぁっ！！」"
translation = "「메리 크리스마스! 모두, 메리 크리스마스! 메리 크리스마스다아아!!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「……………………」"
translation = "「……………………」"

[[dialogue]]
speaker = "unk"
original = "でも、楽しいってことは伝わってくる"
translation = "그래도 즐겁다는 건 전해져 와."

[[dialogue]]
speaker = "unk"
original = "あんなにはしゃいだら疲れそう"
translation = "저렇게 들떠 있으면 지칠 것 같아."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「そうですわね……あの調子では、すぐに力尽きてしまいそうですわ」"
translation = "「그렇군요…… 저 기세라면 금방 기운이 다해버릴 것 같아요.」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「でも……本当に素敵な笑顔ですわ。あの笑顔を見ていると、これで良かったのだと認めざるを得ないのかもしれませんわね」"
translation = "「하지만…… 정말 멋진 미소예요. 저 미소를 보고 있으면 이걸로 좋았던 것이라고 인정하지 않을 수 없겠군요.」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「私は本質を忘れておりましたわ」"
translation = "「제가 본질을 잊고 있었어요.」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「学び舎は、心と体を育む場であると。それは寮も同じですわ」"
translation = "「배움터는 심신을 가꾸는 장소라고들 하지요. 그것은 기숙사도 마찬가지랍니다.」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「正しかったのはあなた方なのでしょう。あなた方はパーティーの主役である寮生の皆さんを思い、楽しませようとしたのですから」"
translation = "「옳았던 것은 당신들이었겠지요. 당신들은 파티의 주역인 기숙사생 여러분을 생각하며, 즐겁게 해 주려 노력했으니까요.」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ありがとうございます、こんな素晴らしいクリスマスパーティーを企画してくださって」"
translation = "「감사합니다, 이런 멋진 크리스마스 파티를 기획해 주셔서.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「……いや、それはさすがに持ち上げすぎでは？」"
translation = "「……아니, 그건 아무래도 너무 띄워주시는 거 아닌가요?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「人が折角いいことを言っているのに、ひっくり返さないでくださいまし」"
translation = "「사람이 모처럼 좋은 말을 하고 있는데, 뒤집지 말아 주시겠어요?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「あはははっ、神妙な顔してるより、笑った方がいいですよ。アニュラスもそう望んでるはずです」"
translation = "「아하하, 엄숙한 표정을 짓고 있는 것보다 웃는 게 더 좋아요. 아뉴라스도 그렇게 바라고 있을 거예요.」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「そうですわね……」"
translation = "「그렇군요……」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「もうどうなっても構いませんわ！\u3000今日はとことん無礼講で盛り上がりますわよ～～っ！！」"
translation = "「이제 어떻게 되든 상관없어요! 오늘은 끝까지 격식 없이 분위기를 띄워보자고요~~!!」"

