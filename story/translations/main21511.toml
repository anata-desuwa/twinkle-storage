[[dialogue]]
speaker = "unk"
original = "第１１話,ジャスティス・ウィザード,B"
translation = "제11화, 저스티스 위저드, B"

[[dialogue]]
speaker_original = "デネブ市民"
speaker_translation = "데네브 시민"
original = "「どうしてこの裏切り者と……ルヴィネ様が！？」"
translation = "「어째서 이 배신자와…… 루비네 님이 함께!?」"

[[dialogue]]
speaker_original = "デネブ市民"
speaker_translation = "데네브 시민"
original = "「間違いない、緋宮クロトだ！！\u3000何をしに来た──この裏切り者め！！」"
translation = "「틀림없어, 히노미야 쿠로토다!! 뭘 하러 온 거냐── 이 배신자 녀석!!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ど、どうしようルヴィ……！？」"
translation = "「어, 어쩌지 루비……!?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……私のせいだわ。誤解を解いている暇はない、せめて魔王を他の場所に──」"
translation = "「……내 탓이야. 오해를 풀고 있을 시간은 없어, 적어도 마왕을 다른 곳으로──」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「デネブのみんな──落ち着いて！」"
translation = "「데네브의 여러분── 진정하세요!」"

[[dialogue]]
speaker = "unk"
original = "混乱が広がりかけていた市民に向けて声を張り上げたのは──<b>あの</b>レティシアだった。"
translation = "혼란이 번지려던 시민들을 향해 목소리를 높인 것은── 다름 아닌 레티시아였다."

[[dialogue]]
speaker_original = "デネブ市民"
speaker_translation = "데네브 시민"
original = "「レ、レティシアさんっ！？\u3000でも……！」"
translation = "「레, 레티시아 씨!? 하지만……!」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「気持ちは理解できる。でも、どうか私の話を聞いてちょうだい！」"
translation = "「마음은 이해해요. 하지만 부디 제 이야기를 들어주세요!」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「時間がないから端的に伝えるわ。この人は確かに緋宮クロト。だけど私たちの味方よ。敵ではないわ！」"
translation = "「시간이 없으니 단도직입적으로 말씀드릴게요. 이 사람은 확실히 히노미야 쿠로토예요. 하지만 우리 편이에요. 적이 아니에요!」"

[[dialogue]]
speaker_original = "デネブ市民"
speaker_translation = "데네브 시민"
original = "「な──！？」"
translation = "「이──!?」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「みんなも感じているでしょう。今の流星市国は、１０年前ととても似ている！\u3000世界の終末が迫っていると！」"
translation = "「여러분도 느끼고 계시겠죠. 지금의 유성시국은 10년 전과 무척 닮아 있어요! 세계의 종말이 다가오고 있다는 것을!」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「そのことを憂いて、デネブを助けに来てくれた……彼は、アルタイルの緋宮クロト！」"
translation = "「그 사실을 염려해서 데네브를 도우러 와 준…… 그는 알타이르의 히노미야 쿠로토예요!」"

[[dialogue]]
speaker_original = "デネブ市民"
speaker_translation = "데네브 시민"
original = "「どっ、どういうことですか？\u3000アルタイルの彼は、すでにデネブの彼の手で殺され、成り代わっていると！」"
translation = "「대, 대체 무슨 소리입니까? 알타이르의 그는 이미 데네브의 그에게 죽임당하고 바꿔치기당해 있다고!」"

[[dialogue]]
speaker_original = "デネブ市民"
speaker_translation = "데네브 시민"
original = "「私たちを見捨ててアルタイルに逃げ出した……緋宮クロトは裏切ったと、女神様が仰っていたのでは……！？」"
translation = "「우리를 저버리고 알타이르로 도망쳤다…… 히노미야 쿠로토는 배신했다고 여신님께서 말씀하시지 않았습니까……!?」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「……急に信じろと言う方が難しいかもしれない。私たちもずいぶん時間がかかったから……でも、真実はそうではなかったの」"
translation = "「……갑자기 믿으라고 하는 게 더 어려울지도 몰라요. 우리도 꽤 오랜 시간이 걸렸으니까요…… 하지만 진실은 그렇지 않았어요」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「あなたたちもルヴィが、テルル様の御声を聞くことができるのは知っているわよね？」"
translation = "「여러분도 루비가 테루루 님의 목소리를 들을 수 있다는 건 알고 계시죠?」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「でも……女神様の声を騙る、別の悪神がいたのよ」"
translation = "「하지만…… 여신님의 목소리를 사칭하는 또 다른 악신이 있었어요」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「そいつが……本当は名誉の戦死をしたはずのデネブの緋宮クロトを『裏切り者だ』と偽り、まだ幼かったルヴィに伝えた！」"
translation = "「그 녀석이…… 원래는 명예로운 전사를 했을 데네브의 히노미야 쿠로토를 『배신자』라고 속여, 아직 어렸던 루비에게 전한 거예요!」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「すべては私たちデネブと、アルタイルの世界を仲たがいさせるための策略よ……！」"
translation = "「모든 것은 우리 데네브와 알타이르의 세계를 이간질하기 위한 책략이에요……!」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「今のように世界の破滅が近づいた時、２つの世界を協力させないために……！」"
translation = "「지금처럼 세계의 파멸이 다가왔을 때 두 세계가 협력하지 못하게 하려고……!」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「私たち極星星徒会は、平行世界アルタイルでその真実を知り、持ち帰って来たの！」"
translation = "「우리 극성성도회는 평행세계 알타이르에서 그 진실을 깨닫고 가지고 돌아온 거예요!」"

[[dialogue]]
speaker = "unk"
original = "デネブ市民に動揺が広がり、お互いの顔を見合わせて会話がなされていく。"
translation = "데네브 시민들 사이에 동요가 퍼지며 서로의 얼굴을 바라보며 대화를 나누기 시작했다."

[[dialogue]]
speaker_original = "デネブ市民"
speaker_translation = "데네브 시민"
original = "「そんな……まさか……」"
translation = "「그런…… 설마……」"

[[dialogue]]
speaker_original = "デネブ市民"
speaker_translation = "데네브 시민"
original = "「テルル様の御声を騙り、ルヴィネ様を騙した真の敵がいる……！？」"
translation = "「테루루 님의 목소리를 사칭해 루비네 님을 속인 진짜 적이 있다……!?」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「みんなも見ているはずよ。ルヴィにそっくりの敵が暴れまわる姿を！\u3000あれも全て、その敵が創り出している──私たちの心を折るために！」"
translation = "「여러분도 보고 계시잖아요. 루비와 똑같이 생긴 적들이 날뛰는 모습을! 그것도 전부 그 적이 만들어낸 거예요── 우리 마음을 꺾기 위해서!」"

[[dialogue]]
speaker_original = "デネブ市民"
speaker_translation = "데네브 시민"
original = "「そ、そいつはいったい──何者なんです！？」"
translation = "「그, 그 녀석은 대체── 누구입니까!?」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「リクリエを起こそうとしている悪神。私たちは──『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』と呼んでいるわ」"
translation = "「리크리에를 일으키려 하는 악신. 우리는── 『<ruby>XELOS<rt>제로스</rt></ruby>』라고 부르고 있어요」"

[[dialogue]]
speaker_original = "デネブ市民"
speaker_translation = "데네브 시민"
original = "「……ぜろ、す？」"
translation = "「……제로, 스?」"

[[dialogue]]
speaker_original = "デネブ市民"
speaker_translation = "데네브 시민"
original = "「わ、わけがわからない……そんな……」"
translation = "「도, 도무지 영문을 모르겠어…… 그런……」"

[[dialogue]]
speaker_original = "デネブ市民"
speaker_translation = "데네브 시민"
original = "「で、でも！\u3000ルヴィネ様が……！」"
translation = "「하, 하지만! 루비네 님께서……!」"

[[dialogue]]
speaker_original = "デネブ市民"
speaker_translation = "데네브 시민"
original = "「ああ！\u3000あの偽物とは違う、私たちのことをいつも一番に考えてくださる、ルヴィネ様が……正しいと仰るのなら！！」"
translation = "「그래! 저 가짜들과는 달리 우리를 언제나 가장 먼저 생각해주시는 루비네 님께서…… 올바르다고 말씀하신다면!!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……っ！」"
translation = "「……윽!」"

[[dialogue]]
speaker_original = "デネブ市民"
speaker_translation = "데네브 시민"
original = "「この１０年間、ずっと私たちを救ってくださった……貴女が仰るのなら、どんなことでも信じます！」"
translation = "「지난 10년 동안 줄곧 우리를 구해주셨던…… 당신이 말씀하신다면 무엇이든 믿겠습니다!」"

[[dialogue]]
speaker_original = "デネブ市民"
speaker_translation = "데네브 시민"
original = "「ルヴィネ様……そうなのですか！？」"
translation = "「루비네 님…… 정말 그런가요!?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……ええ。緋宮クロトは裏切り者ではなかった。私たちの、味方よ……」"
translation = "「……응. 히노미야 쿠로토는 배신자가 아니었어. 우리의 동료야……」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「今まで、誤った情報で混乱させてしまって──ごめんなさい」"
translation = "「지금까지 잘못된 정보로 혼란스럽게 만들어서── 정말 미안해」"

[[dialogue]]
speaker_original = "デネブ市民"
speaker_translation = "데네브 시민"
original = "「……！\u3000では、その『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』という輩が──」"
translation = "「……! 그렇다면 그 『<ruby>XELOS<rt>제로스</rt></ruby>』라는 자가──」"

[[dialogue]]
speaker_original = "デネブ市民"
speaker_translation = "데네브 시민"
original = "「ルヴィネ様に嘘を教えて、アルタイルの罪もない人々を殺させようとしていたと！？」"
translation = "「루비네 님에게 거짓을 가르쳐 알타이르의 무고한 사람들을 죽이게 하려 했다는 건가요!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──まさかレティシアが、ここまで言ってくれるとは思わなかった。ありがとう」"
translation = "「──설마 레티시아가 이렇게까지 말해줄 줄은 몰랐어. 고마워」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「ええ。流石はデネブで大人気のルヴィネ様ね。みんな、どんどん信じてくれている」"
translation = "「응. 과연 데네브에서 대인기인 루비네 님이네. 다들 점점 믿어주고 있어」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……嘘が多いわ。それに、私にとって都合がよすぎる……」"
translation = "「……거짓이 많아. 게다가 나한테 너무나도 편리하게 상황이 풀리고 있어……」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「いいじゃない。この方が合理的よ？\u3000本当の真実を知るのは、私たちだけで十分」"
translation = "「괜찮잖아. 이 편이 합리적이라구? 진짜 진실을 아는 건 우리만으로 충분해」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「…………ごめんなさい。ありがとう」"
translation = "「…………미안해. 그리고 고마워」"

[[dialogue]]
speaker_original = "デネブ市民"
speaker_translation = "데네브 시민"
original = "「い、今すぐにこの事実を市国中に伝えなければ……！」"
translation = "「지, 지금 당장 이 사실을 시국 전체에 알려야 해……!」"

[[dialogue]]
speaker_original = "デネブ市民"
speaker_translation = "데네브 시민"
original = "「ルヴィネ様と極星星徒会が帰ってきた。そして私たちの世界は、見捨てられてなんていなかった！」"
translation = "「루비네 님과 극성성도회가 돌아왔다. 그리고 우리의 세계는 버림받은 게 아니었어!」"

[[dialogue]]
speaker = "unk"
original = "デネブの流星市国内は、混乱と絶望が広がっていた──しかし、ルヴィネの帰還や、かつての俺への誤解が払拭できれば、持ち直すこともできるかもしれない。"
translation = "데네브의 유성시국 내부는 혼란과 절망이 가득 차 있었다── 하지만 루비네의 귀환과 예전의 나에 대한 오해를 불식할 수 있다면 다시 일어설 수 있을지도 모른다."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「でも手段と時間がどちらも足りないわ……伝える情報も多すぎる……」"
translation = "「하지만 수단과 시간 둘 다 부족해…… 전해야 할 정보도 너무 많고……」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ならちょうどいい。奥の手を使うか──リノ！」"
translation = "「그렇다면 마침 잘됐네. 비장의 카드를 써볼까── 리노!」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ええ──音声データは彼女にも共有済みよ。やるのね？」"
translation = "「응── 음성 데이터는 그녀에게도 공유해 두었어. 할 거지?」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ああ。プラン・ジャスティスウィザード──お披露目の時だ！！」"
translation = "「아아. 플랜 저스티스 위저드── 선보일 때다!!」"

[[dialogue]]
speaker = "unk"
original = "ジャスティスウィザード──その二つ名は、まさか。"
translation = "저스티스 위저드── 그 이명은 설마."

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「あいつと繋いでくれ。魔王に代わる」"
translation = "「그 녀석이랑 연결해 줘. 마왕한테 바꿔줄 테니까」"

[[dialogue]]
speaker = "unk"
original = "アポロに投げられたＤＩＳＣをキャッチし、通話口に耳を当てると──"
translation = "아폴로가 던진 디스크를 받아 전화 수화기를 귀에 대자──"

[[dialogue]]
speaker = "？？？"
original = "『──もしもし。会長さん、ですか？』"
translation = "『──여보세요. 회장님, 맞나요?』"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「…………コハルコさん」"
translation = "「…………코하루코 씨」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "『はい。朝比奈コハルコです。１０年ぶりですね……ああ。いけません。懐かしすぎて……泣いてしまいそうです』"
translation = "『네. 아사히나 코하루코예요. 10년 만이네요…… 아아. 이러면 안 되는데. 너무 그리워서…… 눈물이 나올 것만 같아요』"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "『でも──非常事態ですものね。アポロさんの言っていたプランは、我々レジスタンスが水面下で進めていた、大規模なハッキング計画です』"
translation = "『하지만── 비상사태니까요. 아폴로 씨가 말씀하신 플랜은 저희 레지스탕스가 수면 아래에서 진행해 오던 대규모 해킹 계획이에요』"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "『実行すれば……流星市国内にあるディスプレイ、住民の個人端末に至るまで、全てを同時に長時間、乗っとることが可能です』"
translation = "『실행하면…… 유성시국 내에 있는 디스플레이, 주민들의 개인 단말기에 이르기까지 전부 동시에 장시간 장악하는 것이 가능해요』"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それは……なんていうか、規格外の凄さですね？」"
translation = "「그것은…… 뭐라고 해야 할지 규격 외의 능력이군요?」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "『こんなの正義のハッカーがやる行いじゃないですけど……いずれルヴィネの正体と、貴方の汚名を晴らすために、用意をしていました』"
translation = "『이런 건 정의의 해커가 할 짓이 아니지만…… 언젠가 루비네의 정체와 당신의 오명을 벗겨주기 위해 준비해 왔어요』"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……お願いします。プラン・ジャスティスウィザード──実行してください！」"
translation = "「……부탁드립니다. 플랜 저스티스 위저드── 실행해 주세요!」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "『……その名称だけは、ほんっとーに不服なんですよね！\u3000センスを疑います！！』"
translation = "『……그 명칭만큼은 정~말로 마음에 안 들지만요! 센스를 의심하게 된다니까요!!』"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「……なんでだ？\u3000かっこいいのに」"
translation = "「……어째서지? 멋있기만 한데」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "『はぁ──了解しました、お任せください会長さん。全てが終わったら、今度こそ約束を果たしに来てください』"
translation = "『하아── 알겠습니다, 맡겨주세요 회장님. 모든 것이 끝나면 이번에야말로 약속을 지키러 와 주세요』"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "『戦いが終わったらまた会おうって……私、もう１０年も待ってるんですから！』"
translation = "『싸움이 끝나면 다시 만나자고 하시고…… 저 벌써 10년이나 기다렸단 말이에요!』"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「はい……必ず！」"
translation = "「네…… 반드시!」"

[[dialogue]]
speaker = "unk"
original = "コハルコさんとの通話を終えた後──デネブの流星市国全域に、現在の状況が伝えられた。"
translation = "코하루코 씨와의 통화를 마친 후── 데네브의 유성시국 전역에 현재의 상황이 전해졌다."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「これが最後の戦い──デネブのみんな！\u3000死力を尽くして！\u3000私たちが決着をつけるまで……お願い！\u3000生き抜いて頂戴！！」"
translation = "「이것이 마지막 싸움── 데네브의 모두들! 죽을힘을 다해줘! 우리가 결판을 낼 때까지…… 부탁이야! 살아남아 줘!!」"

[[dialogue]]
speaker = "unk"
original = "そしてルヴィネの激励の声が発信された瞬間──街中が震えるような大歓声に包まれたのだった。"
translation = "그리고 루비네의 격려의 목소리가 방송된 순간── 온 거리가 진동할 듯한 엄청난 환호성에 휩싸였다."

