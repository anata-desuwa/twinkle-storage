[[dialogue]]
speaker = "unk"
original = "第４話,マトイの初体験,P"
translation = "제4화, 마토이의 첫 경험, P"

[[dialogue]]
speaker = "unk"
original = "マトイと恋人になってからしばらくが経ち、俺たちはまたリゾート結界へデートしに来ていた――"
translation = "마토이와 연인이 된 지 시간이 꽤 흐르고, 우리는 다시 리조트 결계로 데이트를 하러 와 있었다──"

[[dialogue]]
speaker = "ギャル風の女"
original = "「え～<emoji=heart04>\u3000こんなところで恥ずかしいよ～。んっ……<emoji=heart04>」"
translation = "「에~<emoji=heart04> 이런 데서 부끄러워. 응……<emoji=heart04>」"

[[dialogue]]
speaker = "チャラい男"
original = "「大丈夫だって。周りもカップル多いから、これくらい気にしねぇよ……」"
translation = "「괜찮다니까. 주변에 커플도 많으니까 이 정도는 신경 안 써……」"

[[dialogue]]
speaker = "マトイ"
original = "（う、うわぁ～！\u3000あそこのカップル、こんな人が多いところでキスしちゃってる……！\u3000いくら何でも大胆過ぎない！？）"
translation = "(우, 우와아~! 저기 커플, 이렇게 사람 많은 데서 키스하고 있어……! 아무리 그래도 너무 대담한 거 아냐!?)"

[[dialogue]]
speaker = "マトイ"
original = "（そ、そういえば、会長と付き合い始めてしばらく経つけど、キスはまだしたことがないなぁ……）"
translation = "(그, 그러고 보니 회장님과 사귀기 시작한 지 꽤 됐지만 키스는 아직 해본 적이 없네……)"

[[dialogue]]
speaker = "マトイ"
original = "（キスって、どれくらい経ってからするのが普通なんだろう……？\u3000は、半年とか……？）"
translation = "(키스는 보통 어느 정도 지나서 하는 걸까……? 바, 반년이라든가……?)"

[[dialogue]]
speaker = "unk"
original = "マトイ、お待たせ～"
translation = "마토이, 오래 기다렸지~"

[[dialogue]]
speaker = "マトイ"
original = "「あっ、か、会長……！\u3000私の分も飲み物買って来てくれてありがとね」"
translation = "「앗, 회, 회장님……! 내 몫까지 음료수 사다 줘서 고마워」"

[[dialogue]]
speaker = "マトイ"
original = "「う、ううん、何でもないよ！\u3000あっちのビーチに戻ろっかっ。あははは……」"
translation = "「아, 아니, 아무것도 아냐! 저쪽 비치로 돌아갈까. 아하하하……」"

[[dialogue]]
speaker = "マトイ"
original = "「じ～っ……」"
translation = "「지~익……」"

[[dialogue]]
speaker = "unk"
original = "（なんか、ずっと顔を見られてる気が……）"
translation = "(왠지 계속 얼굴을 쳐다보는 기분이……)"

[[dialogue]]
speaker = "マトイ"
original = "「う、うん？\u3000なに、会長？」"
translation = "「으, 응? 뭐야, 회장님?」"

[[dialogue]]
speaker = "マトイ"
original = "「――え！？\u3000い、いや、顔には何も付いてないよ！\u3000ちょっと、ぼーっとしちゃってただけで……」"
translation = "「──에!? 아, 아니, 얼굴에는 아무것도 안 묻었어! 그냥 잠깐 멍하니 있었을 뿐이라……」"

[[dialogue]]
speaker = "マトイ"
original = "「って、ひゃっ！？\u3000会長の手がおでこに……！」"
translation = "「랄까, 히얏!? 회장님 손이 이마에……!」"

[[dialogue]]
speaker = "マトイ"
original = "「――顔が赤くなってる？\u3000ね、熱とかがあるわけじゃないから、大丈夫だよ！」"
translation = "「──얼굴이 빨개졌어? 여, 열이 있는 건 아니니까 괜찮아!」"

[[dialogue]]
speaker = "マトイ"
original = "（い、今そんなに顔を近くから覗かれたりしたら、ますます意識しちゃうよ～！）"
translation = "(지, 지금 그렇게 얼굴을 가까이서 들여다보면 점점 더 의식하게 되잖아~!)"

[[dialogue]]
speaker = "マトイ"
original = "「そ、そろそろ休憩終わりにして、また海に入ろっか！」"
translation = "「이, 이제 슬슬 휴식 끝내고 다시 바다에 들어갈까!」"

[[dialogue]]
speaker = "マトイ"
original = "「いや～、それにしても、夏はもう過ぎたのに、リゾート結界は人気だね～……チラッ」"
translation = "「이야~ 그나저나 여름은 벌써 지났는데 리조트 결계는 인기네~…… 힐끗」"

[[dialogue]]
speaker = "マトイ"
original = "「やっぱり近場で、常夏の海が時期問わず楽しめるっていうのは強いよね～……チラッ」"
translation = "「역시 가까운 곳에서 상하의 바다를 시기 불문하고 즐길 수 있다는 건 강점이네~…… 힐끗」"

[[dialogue]]
speaker = "unk"
original = "（やっぱり挙動不審だな……）"
translation = "(역시 거동이 수상하네……)"

[[dialogue]]
speaker = "マトイ"
original = "「会長、海で何して遊ぶ？\u3000――え？\u3000少し離れた場所に行きたい？」"
translation = "「회장님, 바다에서 뭐 하고 놀까? ――에? 조금 떨어진 곳으로 가고 싶다고?」"

[[dialogue]]
speaker = "マトイ"
original = "「し、静かな場所だね～……浅瀬で波も穏やかだし……」"
translation = "「조, 조용한 곳이네~…… 물도 얕고 파도도 잔잔하고……」"

[[dialogue]]
speaker = "マトイ"
original = "（会長の後に付いて、人気のないところまで来たけど……こ、これってもしかして……）"
translation = "(회장님 뒤를 따라 사람 없는 곳까지 오긴 했는데…… 이, 이거 설마……)"

[[dialogue]]
speaker = "マトイ"
original = "（こ、恋人同士の、そういうことをしちゃう流れだったり……！？）"
translation = "(여, 연인끼리 그런 걸 해버리는 흐름이라든가……!? )"

[[dialogue]]
speaker = "unk"
original = "マトイ"
translation = "마토이"

[[dialogue]]
speaker = "マトイ"
original = "「ひ、ひゃいっ！」"
translation = "「히, 히야잇!」"

[[dialogue]]
speaker = "マトイ"
original = "（あああ、噛んだ！\u3000いざとなると心の準備が……！\u3000心臓がドキドキしちゃうよぉ～……！）"
translation = "(아아아, 혀 깨물었다! 막상 닥치니 마음의 준비가……! 심장이 두근두근거려어~……!)"

[[dialogue]]
speaker = "マトイ"
original = "（あっ<emoji=heart04>\u3000会長の両手が肩に置かれて……！\u3000や、やっぱりこれって……）"
translation = "(앗<emoji=heart04> 회장님 양손이 어깨에 올려져서……! 역시 이거……)"

[[dialogue]]
speaker = "マトイ"
original = "（そ、そうだよね……私達、カップルなんだし……キスくらい普通――）"
translation = "(그, 그렇겠지…… 우리, 커플이니까…… 키스 정도는 보통――)"

[[dialogue]]
speaker = "unk"
original = "どういうことか分からないから、教えて欲しい"
translation = "무슨 뜻인지 모르겠으니 가르쳐줬으면 좋겠어"

[[dialogue]]
speaker = "マトイ"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker = "マトイ"
original = "「――わ、私が何か言いたげだったから、静かに話を出来る場所に誘った？」"
translation = "「――내, 내가 뭔가 말하고 싶은 눈치라 조용히 이야기할 수 있는 곳으로 불렀다고?」"

[[dialogue]]
speaker = "マトイ"
original = "「つ、つまり私の、勘違い……？\u3000は――」"
translation = "「그, 그러니까 내 착각……? 하――」"

[[dialogue]]
speaker = "マトイ"
original = "「恥ずかしいぃぃぃ～～～っ！！！\u3000ス、スケベでごめんなさいぃぃぃ～～～っ！」"
translation = "「부끄러워어어어어~~~!!! 저, 저질이라 죄송해요오오오~~~!」"

[[dialogue]]
speaker = "unk"
original = "いきなりどうした！？"
translation = "갑자기 왜 그래!?"

[[dialogue]]
speaker = "マトイ"
original = "「わ、私……実は――」"
translation = "「저, 저기…… 사실은――」"

[[dialogue]]
speaker = "unk"
original = "カップルがキスしているのを見て、強く意識してしまっていたと、マトイから打ち明けられた――"
translation = "커플이 키스하는 걸 보고 강하게 의식해버렸다고 마토이가 털어놓았다――"

[[dialogue]]
speaker = "マトイ"
original = "「会長に気を遣わせて、私１人で舞い上がっちゃって……うぅ……凄く恥ずかしい……。穴があったら入りたい……」"
translation = "「회장님을 신경 쓰게 하고 나 혼자 들떠서…… 으으…… 너무 부끄러워. 쥐구멍이라도 있으면 들어가고 싶어……」"

[[dialogue]]
speaker = "unk"
original = "そうだったのか……なら――"
translation = "그랬던 건가…… 그렇다면――"

[[dialogue]]
speaker = "マトイ"
original = "「え？\u3000会長……？」"
translation = "「에? 회장님……?」"

[[dialogue]]
speaker = "マトイ"
original = "「あ……唇、触れちゃ――」"
translation = "「아…… 입술, 닿았――」"

[[dialogue]]
speaker = "マトイ"
original = "「ん……<emoji=heart04>」"
translation = "「응……<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「んん……<emoji=heart04>\u3000ぷはっ……はあぁ……<emoji=heart04>」"
translation = "「으응……<emoji=heart04> 푸핫…… 하아아……<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「会長と……本当にキス、しちゃった……<emoji=heart04>\u3000初めてのキス<emoji=heart04>」"
translation = "「회장님이랑…… 진짜로 키스, 해버렸다……<emoji=heart04> 첫 키스<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「唇を触れ合わせただけなのに……こんなに気持ちいいんだね……キスって……」"
translation = "「입술을 맞대기만 했는데…… 이렇게 기분 좋구나…… 키스라는 건……」"

[[dialogue]]
speaker = "マトイ"
original = "「ね、ねぇ……会長……もう１回、しちゃダメ……？」"
translation = "「저, 저기…… 회장님…… 한 번 더, 하면 안 돼……?」"

[[dialogue]]
speaker = "unk"
original = "好きだ、マトイ"
translation = "좋아해, 마토이"

[[dialogue]]
speaker = "マトイ"
original = "「ん……<emoji=heart04>\u3000会長……<emoji=heart04>\u3000私も……ちゅっ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 회장님……<emoji=heart04> 나도…… 쪽……<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「ちゅっ<emoji=heart04>\u3000ちゅっ……はぁぁ……会長、好き……<emoji=heart04>\u3000ちゅっ……大好きだよ……<emoji=heart04>」"
translation = "「쪽<emoji=heart04> 쪽…… 하아아…… 회장님, 좋아해……<emoji=heart04> 쪽…… 정말 좋아해……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "初めてのキスはとろけるように甘くて、その後も何度も、数え切れないくらい続けてしまうのだった――"
translation = "첫 키스는 녹아내릴 듯이 달콤했고, 그 후로도 몇 번이고 셀 수 없을 만큼 계속되었다――"

