[[dialogue]]
speaker = "unk"
original = "多少の不自由があるとは言え、特製の義体を手に入れたトリュファイナさん。ものを食べたり、触れたりできるようになった彼女が次に求めたもの。"
translation = "다소의 부자유가 있다고는 해도 특제 의체를 손에 넣은 트리파이나 씨. 물건을 먹거나 만질 수 있게 된 그녀가 다음에 원한 것."

[[dialogue]]
speaker = "unk"
original = "それは──"
translation = "그것은──"

[[dialogue]]
speaker = "トリュファイナ"
original = "「私からあなた様に願ったのは確かなのですが……いざという状況になると、とても恥ずかしいものですね……」"
translation = "「제가 당신께 청한 것은 확실하지만…… 막상 이런 상황이 되니 무척 부끄럽네요……」"

[[dialogue]]
speaker = "unk"
original = "あのトリュファイナさんが、俺のベッドで仰向けになっている。"
translation = "그 트리파이나 씨가 내 침대 위에서 천장을 보고 누워 있다."

[[dialogue]]
speaker = "unk"
original = "慎ましさの塊のような彼女が服をはだけ、抱いてもらうために胸や女性器を露出している状況──"
translation = "정숙함의 덩어리 같은 그녀가 옷을 헤치고, 안기기 위해 가슴과 성기를 노출하고 있는 상황──"

[[dialogue]]
speaker = "トリュファイナ"
original = "「な、何か喋っていただきたいのですが……あの。私の身体はどこかおかしいでしょうか……？」"
translation = "「머, 뭐라도 말씀해 주셨으면 좋겠는데요…… 저기. 제 몸이 어딘가 이상한가요……?」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「アニマ様にしっかりと測定していただいて、霊体の時と寸分と違わない見た目になっているとは思うのですが……」"
translation = "「아니마 님께서 확실히 측정해 주셔서, 영체일 때와 털끝만큼도 다르지 않은 모습이 되었을 거라 생각합니다만……」"

[[dialogue]]
speaker = "unk"
original = "あまりに綺麗で見惚れていました──そんな陳腐すぎる言葉が口を突いて出てしまった。"
translation = "너무나 아름다워서 넋을 잃고 보고 있었습니다── 그런 너무나 진부한 말이 입 밖으로 튀어나와 버렸다."

[[dialogue]]
speaker = "unk"
original = "けれどトリュファイナさんは、頬を染めて微笑んでくれた。"
translation = "하지만 트리파이나 씨는 뺨을 붉히며 미소 지어 주었다."

[[dialogue]]
speaker = "トリュファイナ"
original = "「ああ、よかったです……私、殿方を悦ばせる方法など何も知らないので……不作法があったのかと思いました」"
translation = "「아아, 다행이에요…… 저, 남성분을 기쁘게 하는 방법 같은 건 전혀 모르기에…… 무례함이 있었나 싶었습니다.」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「そもそも……お恥ずかしながら、このようなことを経験するのは、生まれて初めてのことですので……」"
translation = "「애초에…… 부끄럽게도 이런 일을 경험하는 것은 태어나서 처음이라서요……」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「あっ……あなた様の、あそこ……お、おち○ちん、でよいのですよね。今、ぴくぴくっとしました……？」"
translation = "「앗…… 당신의 그곳…… 고, 고추라고 하면 되는 거죠. 지금 움찔움찔했나요……?」"

[[dialogue]]
speaker = "クロト"
original = "「トリュファイナさん、今、初めてって……」"
translation = "「트리파이나 씨, 방금 처음이라고……」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「は、はい。かつての時代、特定の愛しい殿方はおりませんでした。私は魔女の森でほとんどの時間を過ごしてきましたから……」"
translation = "「네, 네. 과거 시절 특별히 사랑하는 남성분은 없었습니다. 저는 마녀의 숲에서 대부분의 시간을 보냈으니까요……」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「数百年の時を生きていながら、未経験、なのです……」"
translation = "「수백 년의 시간을 살아오면서 미경험, 이랍니다……」"

[[dialogue]]
speaker = "unk"
original = "ぞく、ぞく、ぞくっ──震えるような興奮が背筋に走っていく。"
translation = "오싹, 오싹, 오싹── 떨리는 듯한 흥분이 등줄기를 타고 흐른다."

[[dialogue]]
speaker = "トリュファイナ"
original = "「ぁ──そういえば男性は、女性の初めてをとても喜ぶそうですね……？」"
translation = "「아── 그러고 보니 남성분은 여성의 처음을 무척 기뻐하신다고 하던데……?」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「ふふ……あなた様からお借りしたＤＩＳＣで見知ったのです。殿方に恥をかかせない方法を調べていただけなのですが」"
translation = "「후후…… 당신께 빌린 DISC에서 보았습니다. 남성분께 수치를 주지 않는 방법을 알아보고 있었을 뿐입니다만.」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「あ、あなた様……私の『初めて』、喜んでいただけますか？」"
translation = "「저, 저기…… 저의 『처음』, 기뻐해 주시겠나요?」"

[[dialogue]]
speaker = "unk"
original = "夢中で俺は頷く──ドキドキと高鳴る鼓動がやかましく、口の中が乾いて声が一瞬出せないほどに昂っていた。"
translation = "정신없이 나는 고개를 끄덕인다── 두근두근 고동치는 심장 소리가 시끄럽고, 입안이 말라 목소리가 순간 나오지 않을 정도로 고양되어 있었다."

[[dialogue]]
speaker = "トリュファイナ"
original = "「……嬉しいです<emoji=heart04>\u3000では、ご遠慮なくどうぞ……<emoji=heart04>\u3000トリュファイナの、心の準備はもうできておりますので」"
translation = "「……기뻐요<emoji=heart04> 그럼 사양 말고 어서……<emoji=heart04> 트리파이나의 마음의 준비는 이미 다 되어 있으니까요.」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「あなた様……魔王様のおち○ちんを、ここへ、うずめてください……<emoji=heart04>」"
translation = "「당신…… 마왕님의 자지를, 여기에, 묻어주세요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "むき出しになった綺麗な縦割れはとろりと濡れていた。"
translation = "드러난 고운 세로로 된 틈새는 걸쭉하게 젖어 있었다."

[[dialogue]]
speaker = "unk"
original = "俺は痛いほどに張りつめた勃起を掴み、トリュファイナさんの女性器へとあてがって──"
translation = "나는 아플 정도로 팽팽하게 발기한 페니스를 잡고, 트리파이나 씨의 성기로 가져가서──"

[[dialogue]]
speaker = "トリュファイナ"
original = "「ふぅうっ──あ、はぁあ、あ、あぁぁあーっ……<emoji=heart04>」"
translation = "「후우웃──아, 하아아, 아, 아아아아─앗……<emoji=heart04>」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「ふぅ、んんぅー……<emoji=heart04>\u3000繋がれ、ましたっ……あぁ、あなた様のものが、私の中へ、しっかりと……<emoji=heart04>」"
translation = "「후우, 응으으……<emoji=heart04> 연결, 됐어요…… 아아, 당신의 것이, 제 안으로, 확실하게……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ただ挿入をしただけ。狭い膣穴を穿っただけでピストンをしてもいないのに、トリュファイナさんの女性器はきゅうきゅうと絡みついてくる。"
translation = "그저 삽입했을 뿐. 좁은 질 구멍을 뚫었을 뿐 피스톤질도 하지 않았는데, 트리파이나 씨의 성기는 꽉꽉 조이며 휘감아온다."

[[dialogue]]
speaker = "トリュファイナ"
original = "「んんぅっ、ふぅうっ……はぁあーっ……<emoji=heart04>\u3000圧迫感はありますが、痛みはありません……これも義体のおかげ、でしょうか？」"
translation = "「응으읏, 후우읏…… 하아아─앗……<emoji=heart04> 압박감은 있습니다만, 아픔은 없어요…… 이것도 의체 덕분, 일까요?」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「あぁ……でもこれが……<emoji=heart04>\u3000これが、番うという感覚なのですね……<emoji=heart04>」"
translation = "「아아…… 하지만 이것이……<emoji=heart04> 이것이, 짝을 맺는다는 감각이군요……<emoji=heart04>」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「手と手が触れ合う時よりも、唇と唇が触れ合う時よりも、ずっとドキドキして、体中が鋭敏になるような……<emoji=heart04>」"
translation = "「손과 손이 맞닿을 때보다, 입술과 입술이 맞닿을 때보다, 훨씬 두근거리고, 온몸이 예민해지는 것 같은……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "所在なさげに揺れる彼女の手を取り、指を絡めると──"
translation = "어쩔 줄 몰라 흔들리는 그녀의 손을 잡고, 손가락을 얽자──"

[[dialogue]]
speaker = "トリュファイナ"
original = "「ふぅぁ<emoji=heart04>\u3000くふ、ぅっ……んんっ……<emoji=heart04>」"
translation = "「후우아<emoji=heart04> 쿠후, 윽…… 응읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ぴくぴくっ、と可愛らしく身体をふるわせてくれるトリュファイナさん。"
translation = "움찔움찔, 하고 귀엽게 몸을 떨어주는 트리파이나 씨."

[[dialogue]]
speaker = "トリュファイナ"
original = "「私、身体がとても敏感になっているようです……この義体には、私の霊体を満たしておりますので……あ、んんっ<emoji=heart04>」"
translation = "「저, 몸이 무척 민감해진 것 같아요…… 이 의체에는 제 영체를 가득 채우고 있기에…… 아, 응읏<emoji=heart04>」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「番った性器だけではなく、あなたと繋ぐ手も、んぅっ<emoji=heart04>\u3000撫でていただける太もももっ……は、ぁ、ぅっ……<emoji=heart04>」"
translation = "「연결된 성기뿐만 아니라, 당신과 맞잡은 손도, 응읏<emoji=heart04> 쓰다듬어 주시는 허벅지도…… 하, 아, 윽……<emoji=heart04>」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「全てがっ……ん<emoji=heart04>\u3000全てが心地よく感じてしまっております……<emoji=heart04>」"
translation = "「모든 것이…… 응<emoji=heart04> 모든 것이 기분 좋게 느껴져 버리고 있어요……<emoji=heart04>」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「さ──ご心配には及びません。お優しいあなた様。痛みなど少しもございませんから……」"
translation = "「자── 걱정하실 필요 없습니다. 다정하신 당신. 아픔 같은 건 조금도 없으니까요……」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「あなた様のおち○ちんで、強く、私を穿ってくださいませ……<emoji=heart04>」"
translation = "「당신의 자지로, 강하게, 저를 뚫어주시옵소서……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「──トリュファイナさんっ！」"
translation = "「──트리파이나 씨!」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「んんんんっ<emoji=heart04>\u3000は、あぁあ、あぁああ～っ<emoji=heart04>\u3000んん、んぅ～っ<emoji=heart04>」"
translation = "「응응응읏<emoji=heart04> 하, 아아아, 아아아아~앗<emoji=heart04> 응응, 응우~읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "柔らかな彼女の太ももを抑え、股をぐっと広げて、張りつめたペニスを何度も往復させる。"
translation = "그녀의 부드러운 허벅지를 누르고, 가랑이를 꽉 벌려, 팽팽해진 페니스를 몇 번이고 왕복시킨다."

[[dialogue]]
speaker = "トリュファイナ"
original = "「あ、ぁ、あっ……は、あぁああっ<emoji=heart04>\u3000すごい、んんっ……すごい、感覚、ですっ……ん、うぅっ……<emoji=heart04>」"
translation = "「아, 아, 앗…… 하, 아아아앗<emoji=heart04> 굉장해, 응읏…… 굉장한, 감각, 이에요…… 응, 우윽……<emoji=heart04>」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「身体の内側から、愛しい御方に、こすり上げ、られてっ……んん、はぁ、あ、あぁっ<emoji=heart04>」"
translation = "「몸 안쪽에서, 사랑하는 분에게, 비벼 올려져서…… 응응, 하아, 아, 아앗<emoji=heart04>」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「ああ、これは、とても素敵……は、はぁあっ……温かくて、心地よくてっ……ぅん、んんぅっ……ぁあっ<emoji=heart04>」"
translation = "「아아, 이건 정말 멋져…… 하, 하아앗…… 따뜻하고, 기분 좋아서…… 응, 응응으읏…… 아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "突き入れる時は柔らかい肉がきゅっと閉じて、引き抜く時は『出て行かないで』とばかりに吸い付いてくる。"
translation = "밀어 넣을 때는 부드러운 살결이 꽉 조여들고, 빼낼 때는 『나가지 말아줘』라고 말하듯 달라붙어 온다."

[[dialogue]]
speaker = "unk"
original = "腰が抜けそうなほどの快感に、たぷたぷと目の前で揺れるトリュファイナさんのおっぱいが俺の劣情をさらに煽る。"
translation = "허리가 빠질 듯한 쾌감에, 출렁출렁 눈앞에서 흔들리는 트리파이나 씨의 가슴이 나의 열정을 더욱 부채질한다."

[[dialogue]]
speaker = "トリュファイナ"
original = "「んぅっ、はっ、あ、あぁあっ<emoji=heart04>\u3000素敵っ……素敵です、あなた様っ……ふぅ、んん、んぁっ……<emoji=heart04>」"
translation = "「응읏, 하앗, 아, 아아앗<emoji=heart04> 멋져…… 멋져요, 당신…… 후우, 응응, 응아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「おち○ちん、でっ……私の奥を、は、あぁあっ<emoji=heart04>\u3000もっと、もっと突いてください、ませ──ん、んんぅーっ……<emoji=heart04>」"
translation = "「자지로…… 제 안쪽을, 하, 아아앗<emoji=heart04> 좀 더, 좀 더 찔러주세요── 응, 응응으─앗……<emoji=heart04>」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「はぁあ、ふぅうっ……んんぅ、ぁっ<emoji=heart04>\u3000私、はしたなく、ないでしょうか？\u3000粗相は、ないでしょうかっ……？<emoji=heart04>」"
translation = "「하아아, 후우읏…… 응응으, 앗<emoji=heart04> 저, 천박하지는 않나요? 실례를 범하고 있지는 않나요……?<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そんなものあるわけない。何の不安も抱かず、ただただ快楽を楽しんでほしい──俺は夢中で告げてペニスで突き込む。"
translation = "그런 게 있을 리 없다. 아무런 불안도 갖지 말고, 그저 쾌락을 즐겨주길 바라며── 나는 정신없이 고하며 페니스를 찔러 넣는다."

[[dialogue]]
speaker = "トリュファイナ"
original = "「んんっ、は、ぁっ<emoji=heart04>\u3000わ、わかり、ましたっ──ん、ぁ、あっ<emoji=heart04>\u3000温かい……温かいです、あなた様っ……<emoji=heart04>」"
translation = "「응읏, 하, 앗<emoji=heart04> 아, 알겠, 어요── 응, 아, 앗<emoji=heart04> 따뜻해…… 따뜻해요, 당신……<emoji=heart04>」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「ふぅ、んんっ……やけど<emoji=heart04>\u3000しそうなほどに、おち○ちんの熱が、じわりと、広がってっ……ぁ、あ、ぁ、ぁ、あっ？<emoji=heart04>」"
translation = "「후우, 응읏…… 데일<emoji=heart04> 것 같을 정도로, 자지의 열기가, 서서히, 퍼져나가서…… 아, 아, 아, 아, 앗?<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "濡れそぼった女性器がキュッキュッと締まり始める。感度がいいとは思っていたけれど、まさかもうイキかけてる……？"
translation = "흠뻑 젖은 성기가 꽉꽉 조여지기 시작한다. 감도가 좋다고는 생각했지만, 설마 벌써 가버리려는 건가……?"

[[dialogue]]
speaker = "トリュファイナ"
original = "「あ、あなた様っ。何だか熱い感覚が、こみ上がってきて──ま、すっ……ふぅっ、ぁっ、はっ<emoji=heart04>\u3000あっあっあっ<emoji=heart04>」"
translation = "「당, 당신. 왠지 뜨거운 감각이, 치밀어 올라와── 요…… 후웃, 앗, 핫<emoji=heart04> 앗앗앗<emoji=heart04>」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「う、受け入れれば、よいのですか？\u3000あ、でも何だか、少し怖いっ……ぅ、んん、ん、ぁああぁっ……<emoji=heart04>」"
translation = "「바, 받아들이면, 되는 건가요? 아, 하지만 왠지, 조금 무서워…… 우, 응응, 응, 아아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ぎゅっと手を握ると、トリュファイナさんは安堵した様子で握り返してきた。"
translation = "손을 꽉 잡자, 트리파이나 씨는 안도한 듯이 마주 잡아 왔다."

[[dialogue]]
speaker = "トリュファイナ"
original = "「ふ、ぅっ<emoji=heart04>\u3000あ、ありがとう、ございます、手を、ぎゅっと握っていただければ、私っ──ふ、ぅ、んん、んぅうっ<emoji=heart04>」"
translation = "「후, 윽<emoji=heart04> 고, 고맙습니다, 손을, 꽉 잡아 주시면, 저── 후, 우, 응응, 응으읏<emoji=heart04>」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「ぁ、あぁぁあぁああ～～～っ……！<emoji=heart04>」"
translation = "「아, 아아아아아아아~~~앗……!<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "びくびくびくっ、とトリュファイナさんの全身が震える。軽く絶頂をしたのは間違いなかった。"
translation = "파르르르, 하고 트리파이나 씨의 온몸이 떨린다. 가볍게 절정에 달한 것이 틀림없었다."

[[dialogue]]
speaker = "トリュファイナ"
original = "「はあ、っふぅ、ぅっ……<emoji=heart04>\u3000これが、絶頂……なのですね？\u3000んんぅ、ふぁ、ぁ、ああーっ……<emoji=heart04>」"
translation = "「하아, 훗후, 윽……<emoji=heart04> 이것이, 절정…… 인 거군요? 응응으, 후아, 아, 아아─앗……<emoji=heart04>」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「弓をつがえて、射たあとのような、開放感が……ふぅ、はぁ、んんっ<emoji=heart04>」"
translation = "「화살을 메워서, 쏜 뒤와 같은, 해방감이…… 후우, 하아, 응읏<emoji=heart04>」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「あなた様の、お優しい、おち○ちんの動きが、んんっ<emoji=heart04>\u3000さっきよりも、はぁ、ぅうっ<emoji=heart04>\u3000心地よく、感じますっ……<emoji=heart04>」"
translation = "「당신의, 다정한, 자지의 움직임이, 응읏<emoji=heart04> 아까보다, 하아, 우윽<emoji=heart04> 기분 좋게, 느껴져요……<emoji=heart04>」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「ふふ……<emoji=heart04>\u3000初めての、絶頂も、あなた様に教えられてしまいましたね……<emoji=heart04>」"
translation = "「후후……<emoji=heart04> 첫 절정도, 당신에게 배워버렸네요……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「──っ！」"
translation = "「──윽!」"

[[dialogue]]
speaker = "unk"
original = "男心を無意識にくすぐってくるトリュファイナさんが愛おしくて、俺はさらに深くまで彼女を求めてしまう。"
translation = "남성미를 무심코 자극해 오는 트리파이나 씨가 사랑스러워, 나는 더욱 깊게 그녀를 갈구하게 된다."

[[dialogue]]
speaker = "トリュファイナ"
original = "「はぁああっ！？<emoji=heart04>\u3000ふうぅ、ぁ、あ、ぁ、あっ！<emoji=heart04>\u3000あなた様、急にそんな激しくっ……んん、んんぅうっ<emoji=heart04>」"
translation = "「하아아앗!?<emoji=heart04> 후우우, 아, 아, 아, 앗!<emoji=heart04> 당신, 갑자기 그렇게 격렬하게…… 응응, 응응으윽<emoji=heart04>」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「わ、私の、言動でっ……？\u3000興奮を、誘ってしまったの、ですか……？\u3000あ、そんな、んぅ、んんっ、んっんっ、ぁ、ぁああ<emoji=heart04>」"
translation = "「제, 말과 행동 때문에……? 흥분을, 유도해 버린, 건가요……? 아, 그런, 응으, 응응, 응응, 아, 아아아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "はだけられた服からこぼれたおっぱいも、たぷたぷ、ゆさゆさと悩ましく揺れる。"
translation = "흐트러진 옷 사이로 쏟아진 가슴도, 출렁출렁, 흔들흔들 요염하게 흔들린다."

[[dialogue]]
speaker = "トリュファイナ"
original = "「あ、ぁあぁっ<emoji=heart04>\u3000そんな、そんなじろじろと、見ないでくださいませ……や、ぁっ……恥ずかしい、ですっ……ん、んんっ<emoji=heart04>」"
translation = "「아, 아아앗<emoji=heart04> 그렇게, 그렇게 빤히, 보지 말아 주세요…… 야앗…… 부끄러워요…… 응, 응응읏<emoji=heart04>」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「ぁ、あぁ<emoji=heart04>\u3000隠しては、ダメなのですか……？<emoji=heart04>\u3000は、はいっ……隠しませんっ……ん、んぅ、ふぅ、ぁ、あ、ぁ、あ、ぁっ<emoji=heart04>」"
translation = "「아, 아아<emoji=heart04> 가리면, 안 되는 건가요……?<emoji=heart04> 네, 네…… 가리지 않겠어요…… 응, 응으, 후우, 아, 아, 아, 아, 앗<emoji=heart04>」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「もっと、見てください<emoji=heart04>\u3000あなた様っ<emoji=heart04>\u3000私の、い、いやらしいところ、たくさん、見て、くださっ──んんぅ、ぅっ<emoji=heart04>」"
translation = "「더, 봐주세요<emoji=heart04> 당신<emoji=heart04> 제, 히, 음란한 곳, 많이, 봐, 주세요── 응응으, 윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "形のいい真っ白なおっぱいが目の前で揺れる。汗で濡れたトリュファイナさんはとても綺麗で、いやらしくて腰が止まらない。"
translation = "모양 좋은 새하얀 가슴이 눈앞에서 흔들린다. 땀에 젖은 트리파이나 씨는 너무나 아름답고, 음란해서 허리짓이 멈추지 않는다."

[[dialogue]]
speaker = "トリュファイナ"
original = "「もっと、もっと近くに、あなた様っ……もっと近くに来てくださいっ……<emoji=heart04>」"
translation = "「더, 더 가까이, 당신…… 더 가까이 와주세요……<emoji=heart04>」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「少しの、隙間もなく、あなた様と繋がりたいのです、私っ……ふう、ぁ、ふぁあ、ぁあっ<emoji=heart04>」"
translation = "「조금의, 틈도 없이, 당신과 연결되고 싶어요, 저는…… 후우, 아, 후아아, 아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "手を繋ぎ、性器でも繋がっているのに、もっと近くへ来て欲しいと言ってくるトリュファイナさん。"
translation = "손을 잡고, 성기로도 연결되어 있는데, 더 가까이 와달라고 말하는 트리파이나 씨."

[[dialogue]]
speaker = "unk"
original = "まだ触れていないところがあったと思い──唇を奪った。"
translation = "아직 닿지 않은 곳이 있다고 생각하여── 입술을 빼앗았다."

[[dialogue]]
speaker = "トリュファイナ"
original = "「ふぅむむっ<emoji=heart04>\u3000んぅちゅっ、ちゅ、ちゅぱっ、んちゅぅ、ちゅっ……んぅちゅる、れぇ、れろっ<emoji=heart04>」"
translation = "「후우음음<emoji=heart04> 응으츄, 츄, 츄파, 응츄우, 츄…… 응으츄르, 레에, 레로<emoji=heart04>」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「嬉しぃっ……あなた様と、口付け……んちゅる<emoji=heart04>\u3000ちゅぅ、んちゅる、れぇ、れろっ、んぅちゅる、ちゅぱっ<emoji=heart04>」"
translation = "「기뻐요…… 당신과, 입맞춤…… 응츄르<emoji=heart04> 츄우, 응츄르, 레에, 레로, 응으츄르, 츄파<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "キスは初めてじゃない。デートの帰りに優しくついばむようなものはしたことがあった。"
translation = "키스는 처음이 아니다. 데이트가 끝날 때 다정하게 부리만 맞대는 듯한 것은 한 적이 있었다."

[[dialogue]]
speaker = "unk"
original = "けれど舌を深く差し入れるディープキスは初めて。"
translation = "하지만 혀를 깊게 밀어 넣는 딥 키스는 처음."

[[dialogue]]
speaker = "unk"
original = "不慣れな激しいキスにも、トリュファイナさんはしっかりと応えてくれた。"
translation = "서툴고 격렬한 키스에도, 트리파이나 씨는 확실하게 응해주었다."

[[dialogue]]
speaker = "トリュファイナ"
original = "「んぅちゅるぅっ<emoji=heart04>\u3000んちゅ、んちゅぅ、れぇ、れろ、れろ<emoji=heart04>」"
translation = "「응으츄르으<emoji=heart04> 응츄, 응츄우, 레에, 레로, 레로<emoji=heart04>」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「あ、ぁ、あっ──私、これ、とても好みですっ……あなた様のお顔が近くにっ……んちゅ、ちゅぅ<emoji=heart04>\u3000幸せですっ……ちゅぅ<emoji=heart04>」"
translation = "「아, 아, 앗── 저, 이거, 무척 취향이에요…… 당신의 얼굴이 가까이…… 응츄, 츄우<emoji=heart04> 행복해요…… 츄우<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "夢中で舌を絡めながら手を握り合う。トリュファイナさんの膣内を深く穿ちながら求め合う。"
translation = "정신없이 혀를 얽으며 손을 마주 잡는다. 트리파이나 씨의 질 안을 깊게 뚫으며 서로를 갈구한다."

[[dialogue]]
speaker = "トリュファイナ"
original = "「れぇ、んれちゅる<emoji=heart04>\u3000あなた様<emoji=heart04>\u3000んぅちゅ<emoji=heart04>\u3000んちゅれる、んちゅるれる、ちゅぅ、ちゅぱ、れぇ、れろれろっ<emoji=heart04>」"
translation = "「레에, 응레츄르<emoji=heart04> 당신<emoji=heart04> 응으츄<emoji=heart04> 응츄렐, 응츄르렐, 츄우, 츄파, 레에, 레로레로<emoji=heart04>」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「お慕い、んちゅ、しております、んぅっ<emoji=heart04>\u3000ちゅるぅ、んんっ、ちゅぅ──ん、んんっ？」"
translation = "「사모, 응츄, 하고 있어요, 응으읏<emoji=heart04> 츄르으, 응응, 츄우── 응, 응응읏?」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「ぷはぁっ……<emoji=heart04>\u3000あ、ぁ、あっ……お、おち○ちんが、先ほどよりも、太く……？\u3000あ、あの、これはっ……？<emoji=heart04>」"
translation = "「푸하아……<emoji=heart04> 아, 아, 앗…… 자, 자지가, 아까보다, 굵게……? 저, 저기, 이건……?<emoji=heart04>」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「まさ、か──っ<emoji=heart04>\u3000あなた様も、達して、しまわれ、そう？\u3000なのですかっ……ん、んんぅっ<emoji=heart04>」"
translation = "「설, 마──윽<emoji=heart04> 당신도, 도달해, 버릴 것, 같으신? 건가요…… 응, 응응으읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "愛しいこの人とずっと繋がっていたい。けれどそれも難しいくらいに、ペニスは張りつめてきている。"
translation = "사랑하는 이 사람과 계속 연결되어 있고 싶다. 하지만 그것도 어려울 정도로 페니스는 팽팽하게 부풀어 오르고 있다."

[[dialogue]]
speaker = "トリュファイナ"
original = "「はい、そのまま……<emoji=heart04>\u3000最後まで、んんっ……お願い、いたします<emoji=heart04>」"
translation = "「네, 그대로……<emoji=heart04> 끝까지, 응응…… 부탁, 드립니다<emoji=heart04>」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「あなた様を受け止めさせてくださいっ……ん、んんぅうっ！<emoji=heart04>」"
translation = "「당신을 받아내게 해주세요…… 응, 응응으웃!<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "こみ上げてくる射精欲を抑えない。トリュファイナさんに注ぐために、俺はさらにピストンに力を込めた。"
translation = "치밀어 오르는 사정 욕구를 억누르지 않는다. 트리파이나 씨에게 쏟아붓기 위해, 나는 더욱 피스톤질에 힘을 실었다."

[[dialogue]]
speaker = "トリュファイナ"
original = "「ふぅう、ぁ、あ、あ、あぁぁっ<emoji=heart04>\u3000すごい、すごいで──すっ<emoji=heart04>\u3000ぁ、あ、ぁ、あ、あっ<emoji=heart04>\u3000はぁ、はぁああっ<emoji=heart04>」"
translation = "「후우우, 아, 아, 아, 아아아앗<emoji=heart04> 굉장해, 굉장해──요! <emoji=heart04> 아, 아, 아, 아, 앗<emoji=heart04> 하아, 하아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「逞しい、あなた様っ<emoji=heart04>\u3000お優しい、あなた様っ<emoji=heart04>\u3000もっと求めて、私を、あなた様のものにっ……んんぅっ<emoji=heart04>」"
translation = "「늠름하신, 당신<emoji=heart04> 다정하신, 당신<emoji=heart04> 더 원해서, 저를, 당신의 것으로…… 응응으읏<emoji=heart04>」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「あ、ぁ、あ、あ、ぁっ<emoji=heart04>\u3000はぁああ、ふぅう、んんっ<emoji=heart04>\u3000ぁ、ぁ、あ──！？<emoji=heart04>\u3000先ほどよりも、激しい、感覚、がっ……！<emoji=heart04>」"
translation = "「아, 아, 아, 아, 앗<emoji=heart04> 하아아아, 후우우, 응응읏<emoji=heart04> 아, 아, 아──!? <emoji=heart04> 아까보다, 격렬한, 감각, 이……! <emoji=heart04>」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「は、はいっ……私、またっ……果てそう、ですっ……あなた様<emoji=heart04>\u3000好きです、愛しております、あなた様っ……！<emoji=heart04>」"
translation = "「네, 네…… 저, 또…… 가버릴 것, 같아요…… 당신<emoji=heart04> 좋아해요, 사랑해요, 당신……! <emoji=heart04>」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「きて、きてください、全て注いでくださいっ<emoji=heart04>\u3000あ、ぁ、あ、ぁ、あっ──<emoji=heart04>」"
translation = "「와줘요, 와주세요, 전부 쏟아주세요<emoji=heart04> 아, 아, 아, 아, 앗──<emoji=heart04>」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「来ます、私も、来てしまいますっ、あ、あ、ぁ<emoji=heart04>\u3000ん、んんぅ、んんぅうう～っ……！<emoji=heart04>」"
translation = "「가요, 저도, 가버려요, 아, 아, 아<emoji=heart04> 응, 응응으, 응응으으으~읏……! <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ぎゅぎゅぎゅっ──と絞りの強くなる膣内に摩擦され、俺も我慢の限界を迎えた。"
translation = "규규규── 하며 조임이 강해지는 질 안에 마찰되어, 나도 인내의 한계를 맞이했다."

[[dialogue]]
speaker = "unk"
original = "強く彼女の手を握り、握り返してくれる彼女の温かさを感じながら──放った。"
translation = "강하게 그녀의 손을 잡고, 마주 잡아주는 그녀의 온기를 느끼며── 뿜어냈다."

[[dialogue]]
speaker = "トリュファイナ"
original = "「あぁっ、ああぁあぁぁああぁあああ～～～～～っ……！！！！<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아앗, 아아아아아아아아아아아아아아~~~~~앗……!!!! <emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「あ、ぁ、あぁあーっ<emoji=heart04>\u3000熱、いぃっ……ん、んぅっ……はぁ、ふうぅ～っ……！<emoji=heart04>」"
translation = "「아, 아, 아아아─앗<emoji=heart04> 뜨거, 워요…… 응, 응으읏…… 하아, 후우우~읏……! <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "びゅくん、びゅくびゅくん、びゅくっ──何度も何度もペニスが震えて、自分でも引くくらいの量がトリュファイナさんの中に注ぎ込まれていく。"
translation = "뷰큿, 뷰크뷰큿, 뷰큿── 몇 번이고 페니스가 떨리며, 스스로도 놀랄 정도의 양이 트리파이나 씨의 안에 쏟아져 들어간다."

[[dialogue]]
speaker = "トリュファイナ"
original = "「ぁ、あぁあ、まだ出て、ますっ……<emoji=heart04>\u3000は、ぅ、ぅうう、んんんう～っ……<emoji=heart04>」"
translation = "「아, 아아아, 아직 나오고, 있어요……<emoji=heart04> 하, 우, 우우우, 응응응우~읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "精魂まで尽き果てるような長い、長い射精が終わり──俺はペニスを引き抜いた。"
translation = "정혼까지 다 타버릴 듯한 긴, 긴 사정이 끝나고── 나는 페니스를 뽑아냈다."

[[dialogue]]
speaker = "トリュファイナ"
original = "「はぁああっ……ふぅううっ……はぁあぁーっ……ふぅううーっ……<emoji=heart04>」"
translation = "「하아아앗…… 후우우웃…… 하아아아─앗…… 후우우우─앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ひくひくと震えるトリュファイナさんの女性器から、白濁がこぼれ出る。"
translation = "벌름벌름 떨리는 트리파이나 씨의 성기에서 백탁액이 흘러나온다."

[[dialogue]]
speaker = "トリュファイナ"
original = "「これが……殿方の……あなた様の、子種……<emoji=heart04>\u3000んぅ、ふぅっ……はぁっ……<emoji=heart04>」"
translation = "「이것이…… 남성분의…… 당신의, 씨앗……<emoji=heart04> 응으, 후우…… 하아……<emoji=heart04>」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「こんなに出して、いただける、だなんて……ん、んぅ……ふぅうっ……ま、まだ、こぼれて、きております……<emoji=heart04>」"
translation = "「이렇게나 내어, 주시다니…… 응, 응으…… 후우읏…… 아, 아직, 흘러넘치고, 있어요……<emoji=heart04>」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「何だか……ふぅう……お、おもらしを、しているみたいで……恥ずかしい、です……あ、また、とろとろとっ……<emoji=heart04>」"
translation = "「왠지…… 후우우…… 오, 오줌을 싸고 있는 것 같아서…… 부끄러워요…… 아, 또, 주르르륵……<emoji=heart04>」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「はぁ……ふぅっ……満足、していただけましたか。あなた様……<emoji=heart04>」"
translation = "「하아…… 후우…… 만족, 하셨나요. 당신……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ここまで出して満足していないわけもなく。むしろトリュファイナさんはどうだったのだろうか。"
translation = "여기까지 내뿜고 만족하지 않았을 리 없다. 오히려 트리파이나 씨는 어땠을까."

[[dialogue]]
speaker = "トリュファイナ"
original = "「私も、この上なく幸せですよ……<emoji=heart04>\u3000こんなにも出していただけたことも……あなた様と共に、果てられたことも……<emoji=heart04>」"
translation = "「저도, 더할 나위 없이 행복해요……<emoji=heart04> 이렇게나 많이 내어주신 것도…… 당신과 함께, 갈 수 있었던 것도……<emoji=heart04>」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「肉体を得た時、せめて一度は経験しておきたいと、申しましたが……ふふ……<emoji=heart04>」"
translation = "「육체를 얻었을 때, 적어도 한 번은 경험해보고 싶다고 말씀드렸습니다만…… 후후……<emoji=heart04>」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「こんなに素敵なこと……一度だけでは、少し寂しく感じます……<emoji=heart04>」"
translation = "「이렇게 멋진 일…… 한 번뿐이라면, 조금 외롭게 느껴져요……<emoji=heart04>」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「はしたないお願いですが、また私のこと……抱いていただけますか？」"
translation = "「천박한 부탁입니다만, 다시 저를…… 안아 주시겠어요?」"

[[dialogue]]
speaker = "unk"
original = "握った手に力を込めながら、しっかりと頷く。"
translation = "맞잡은 손에 힘을 주며, 확실하게 고개를 끄덕인다."

[[dialogue]]
speaker = "トリュファイナ"
original = "「……ふふふっ<emoji=heart04>\u3000嬉しいです、あなた様……これまでよりも、先ほどよりももっと……お慕いいたしておりますよ……<emoji=heart04>」"
translation = "「……후후훗<emoji=heart04> 기뻐요, 당신…… 지금까지보다, 아까보다 훨씬 더…… 사모하고 있어요……<emoji=heart04>」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「物を知らぬ魔女で恐縮ですが……もっと私に色々なことを教えてください」"
translation = "「아무것도 모르는 마녀라 송구스럽지만…… 제게 더 많은 것을 가르쳐 주세요」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「私、あなた様の好みの女性になれるよう、精いっぱい励みますので……<emoji=heart04>」"
translation = "「저, 당신의 취향인 여성이 될 수 있도록, 온 힘을 다해 정진할 테니까요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "快感の熱でとろけながらも、可愛らしい微笑みを向けてくれるトリュファイナさんに、俺は──"
translation = "쾌감의 열기로 녹아내리면서도, 귀여운 미소를 지어주는 트리파이나 씨에게, 나는──"

[[dialogue]]
speaker = "トリュファイナ"
original = "「んっ……ちゅっ<emoji=heart04>」"
translation = "「응…… 츄<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ずっと彼女と一緒にいることを誓う口付けをするのだった。"
translation = "계속 그녀와 함께할 것을 맹세하는 입맞춤을 하는 것이었다."

