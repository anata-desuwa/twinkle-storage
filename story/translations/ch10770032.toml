[[dialogue]]
speaker = "unk"
original = "第２話,うれしはずかし撮影会,P"
translation = "제2화, 기쁘고 부끄러운 촬영회, P"

[[dialogue]]
speaker = "unk"
original = "蘭美に呼ばれて九浄家のお屋敷にやってきた。"
translation = "라비에게 불려 쿠죠 가문의 저택에 왔다."

[[dialogue]]
speaker = "unk"
original = "そのはずなんだけど、蘭美はなかなか姿を見せなかった。"
translation = "그럴 터인데, 라비는 좀처럼 모습을 보이지 않았다."

[[dialogue]]
speaker = "ヨミ"
original = "「すみません、メイド長はもうすぐ来ると思いますから」"
translation = "「죄송합니다, 메이드장은 곧 올 거라고 생각합니다」"

[[dialogue]]
speaker = "ヨミ"
original = "「そうそう、会長の方も準備してもらっていいですか？\u3000大丈夫です、ええ、お手間は取らせません」"
translation = "「맞다 맞다, 회장님 쪽도 준비해 주시겠어요? 괜찮습니다, 네, 수고를 끼치지 않겠습니다」"

[[dialogue]]
speaker = "ヨミ"
original = "「あ、少しじっとしてて下さいね～。大丈夫、悪いようにはしませんから」"
translation = "「아, 잠시 가만히 계세요~. 괜찮습니다, 나쁘게 하지는 않을 테니까요」"

[[dialogue]]
speaker = "ヨミ"
original = "「さぁ、メイド隊の皆さん、やっちゃって下さい♪」"
translation = "「자, 메이드대 여러분, 해 주세요♪」"

[[dialogue]]
speaker = "unk"
original = "あ～～れ～～！"
translation = "아~~니이~~!"

[[dialogue]]
speaker = "蘭美"
original = "「会って早々、ひどい顔をしているわね！」"
translation = "「만나자마자, 심한 표정을 짓고 있네!」"

[[dialogue]]
speaker = "蘭美"
original = "「着付けがそんなに大変だったのかしら？\u3000うちのメイドに任せていれば、すぐ終わると思ったけど」"
translation = "「기모노 입히는 게 그렇게 힘들었을까? 우리 메이드에게 맡겼으면, 금방 끝날 거라고 생각했는데」"

[[dialogue]]
speaker = "unk"
original = "なんで俺が着物を着てるの？"
translation = "왜 내가 기모노를 입고 있는 거야?"

[[dialogue]]
speaker = "unk"
original = "えっと、この格好は？"
translation = "에또, 이 복장은?"

[[dialogue]]
speaker = "蘭美"
original = "「スピーディかつ順を追って説明するわ！」"
translation = "「스피디하게 순서대로 설명할게!」"

[[dialogue]]
speaker = "蘭美"
original = "「実は魔界にいる両親に、貴方のことを報告させてもらったの。婚約者を見つけました、ってね」"
translation = "「실은 마계에 있는 부모님께, 당신에 대해 보고했어. 약혼자를 찾았습니다, 라고 말이야」"

[[dialogue]]
speaker = "蘭美"
original = "「そうしたら、どんな相手か教えなさいって言われて。貴方の写真を送るよう求められたのよ」"
translation = "「그러자, 어떤 상대인지 알려 달라고 해서. 당신의 사진을 보내라고 요구받았어」"

[[dialogue]]
speaker = "蘭美"
original = "「せっかくならいい印象を持ってもらいたいでしょう？\u3000だから、きちんとした写真を撮って送ろうと思ったのよ！」"
translation = "「이왕이면 좋은 인상을 심어주고 싶잖아? 그래서, 제대로 된 사진을 찍어 보내려고 생각한 거야!」"

[[dialogue]]
speaker = "ヨミ"
original = "「カメラマンは私が担当しますね。ばっちり撮りますので、期待して下さいっ」"
translation = "「카메라맨은 제가 담당하겠습니다. 완벽하게 찍을 테니, 기대해 주세요」"

[[dialogue]]
speaker = "蘭美"
original = "「頼んだわよ、ヨミヨミ。私と会長の運命を左右する重要な１枚になるから、責任重大よ」"
translation = "「부탁할게, 요미요미. 나와 회장의 운명을 좌우할 중요한 한 장이 될 테니, 책임이 막중해」"

[[dialogue]]
speaker = "ヨミ"
original = "「こやぁっ！？\u3000そんなプレッシャーかけないで下さ～いっ」"
translation = "「꼬야앗!? 그런 부담 주지 말아 주세~요」"

[[dialogue]]
speaker = "蘭美"
original = "「貴方なら絶対に大丈夫よ！\u3000いつも通りにやれば問題ないわ」"
translation = "「당신이라면 절대 괜찮아! 평소대로 하면 문제없어」"

[[dialogue]]
speaker = "ヨミ"
original = "「わ、わかりました！\u3000それでは私、天ヶ崎ヨミがお２人の写真を担当しますね」"
translation = "「네, 알겠습니다! 그럼 저, 아마가사키 요미가 두 분의 사진을 담당하겠습니다」"

[[dialogue]]
speaker = "ヨミ"
original = "「では、軽く数枚撮ってみましょうか。はい、並んで並んで～、そうです、もっと笑顔でお願いしますっ」"
translation = "「그럼, 가볍게 몇 장 찍어 볼까요. 네, 나란히 나란히~, 맞아요, 더 웃는 얼굴로 부탁드립니다」"

[[dialogue]]
speaker = "蘭美"
original = "「わかったわ、こうかしら？」"
translation = "「알았어, 이럴까?」"

[[dialogue]]
speaker = "unk"
original = "もっと近づいた方がいいんじゃない？"
translation = "더 가까이 다가가는 게 좋지 않아?"

[[dialogue]]
speaker = "蘭美"
original = "「それもそうね！\u3000婚約した２人の仲睦まじい姿を収めるのが目的なわけだし」"
translation = "「그것도 그렇네! 약혼한 두 사람의 다정한 모습을 담는 게 목적이니까」"

[[dialogue]]
speaker = "蘭美"
original = "「なら……ぎゅっ、と……抱き着いていた方がいいかしら？」"
translation = "「그렇다면……꽉, 하고……끌어안고 있는 게 좋을까?」"

[[dialogue]]
speaker = "蘭美"
original = "「ヨミヨミ？\u3000こんな感じでどうかしら！」"
translation = "「요미요미? 이런 느낌으로 어때!」"

[[dialogue]]
speaker = "ヨミ"
original = "「ばっちりです！\u3000じゃあ、撮っていきまーす！」"
translation = "「완벽합니다! 그럼, 찍겠습니다!」"

[[dialogue]]
speaker = "ヨミ"
original = "「いいですよ～、いちゃいちゃ感が伝わってきます！」"
translation = "「좋아요~, 알콩달콩한 느낌이 전해져 옵니다!」"

[[dialogue]]
speaker = "蘭美"
original = "「いちゃいちゃ……ということなら、こういうのもありかしら？」"
translation = "「알콩달콩……이라는 거라면, 이런 것도 괜찮을까?」"

[[dialogue]]
speaker = "ヨミ"
original = "「あっ、とってもいいです！\u3000このバージョンも頂いちゃいますね♪」"
translation = "「앗, 정말 좋습니다! 이 버전도 받겠습니다♪」"

[[dialogue]]
speaker = "ヨミ"
original = "「メイド長の可愛さが伝わってきます！\u3000はい、次はもっと微笑んで～……にこっ♪」"
translation = "「메이드장님의 귀여움이 전해져 옵니다! 네, 다음은 더 미소 지어 주세요~……방긋♪」"

[[dialogue]]
speaker = "蘭美"
original = "「にこっ<emoji=heart04>」"
translation = "「방긋<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺のお嫁さん、可愛すぎでは……？"
translation = "내 신부, 너무 귀여운 거 아닌가……?"

[[dialogue]]
speaker = "蘭美"
original = "「あら、私が可愛いのは当然でしょう？\u3000しかも、隣に貴方がいるんだもの、可愛さも倍増よ！」"
translation = "「어머, 내가 귀여운 건 당연하잖아? 게다가, 옆에 당신이 있는걸, 귀여움도 배가 돼!」"

[[dialogue]]
speaker = "ヨミ"
original = "「はい、会長もメイド長にあわせて笑顔を下さ～い」"
translation = "「네, 회장님도 메이드장님에 맞춰 웃는 얼굴을 보여 주세~요」"

[[dialogue]]
speaker = "蘭美"
original = "「ほら、カメラマンのリクエストよ。貴方もアピールしなさい」"
translation = "「자, 카메라맨의 요청이야. 당신도 어필해」"

[[dialogue]]
speaker = "蘭美"
original = "「戸惑っているの？\u3000別に可愛さを求めてはいないのよ。私の婚約者として、いつものように格好よくしていなさい！」"
translation = "「망설이고 있는 거야? 딱히 귀여움을 바라는 건 아니야. 나의 약혼자로서, 평소처럼 멋있게 있어!」"

[[dialogue]]
speaker = "unk"
original = "蘭美は俺が守る！"
translation = "라비는 내가 지킨다!"

[[dialogue]]
speaker = "蘭美"
original = "「ぴゃあっ！？\u3000なんでいきなり抱き締めてるのっ！」"
translation = "「뺘앗!? 왜 갑자기 끌어안고 있는 거야!」"

[[dialogue]]
speaker = "ヨミ"
original = "「そういうのもいいですね！\u3000婚約者同士、ラブラブなところを見せつけちゃって下さ～い！」"
translation = "「그런 것도 좋네요! 약혼자끼리, 깨가 쏟아지는 모습을 보여 주세~요!」"

[[dialogue]]
speaker = "蘭美"
original = "「待ちなさい、ヨミヨミっ、これは撮らなくていいわっ」"
translation = "「기다려, 요미요미, 이건 찍지 않아도 돼」"

[[dialogue]]
speaker = "ヨミ"
original = "「ご実家に送るかどうかは後で考えるとして、これは撮るべきだと思います！\u3000なので撮りますっ！」"
translation = "「본가에 보낼지 어떨지는 나중에 생각한다고 치고, 이건 찍어야 한다고 생각합니다! 그러니 찍겠습니다!」"

[[dialogue]]
speaker = "ヨミ"
original = "「はい、バッチリ頂きました～♪」"
translation = "「네, 완벽하게 받았습니다~♪」"

[[dialogue]]
speaker = "蘭美"
original = "「はぁ……はぁ……もう、ヨミヨミも会長も調子に乗りすぎよ」"
translation = "「하아……하아……정말, 요미요미도 회장도 너무 신났어」"

[[dialogue]]
speaker = "蘭美"
original = "「撮影の目的を忘れたのかしら！？\u3000両親に貴方を紹介するための写真なんだから」"
translation = "「촬영 목적을 잊은 거야!? 부모님께 당신을 소개하기 위한 사진이니까」"

[[dialogue]]
speaker = "蘭美"
original = "「その……私が選んだ婚約者が、破廉恥だと思われたら困るでしょ」"
translation = "「그……내가 고른 약혼자가, 파렴치하다고 여겨지면 곤란하잖아」"

[[dialogue]]
speaker = "unk"
original = "もっとアピールした方がいいと思って"
translation = "더 어필하는 게 좋다고 생각해서"

[[dialogue]]
speaker = "unk"
original = "好きあってることを"
translation = "서로 좋아한다는 것을"

[[dialogue]]
speaker = "蘭美"
original = "「今までの写真で、十分伝わるんじゃないかしら……」"
translation = "「지금까지의 사진으로, 충분히 전해지지 않을까……」"

[[dialogue]]
speaker = "蘭美"
original = "「自分では、かなり仲睦まじいところを見せたつもりだったのだけど」"
translation = "「나로서는, 상당히 다정한 모습을 보여줬다고 생각했는데」"

[[dialogue]]
speaker = "ヨミ"
original = "「では、もう一歩踏み込んだ、恋人らしい一面を見せちゃうのはどうでしょう？」"
translation = "「그럼, 한 걸음 더 나아간, 연인다운 일면을 보여주는 건 어떨까요?」"

[[dialogue]]
speaker = "ヨミ"
original = "「具体的には……キスしてるところ、とか？」"
translation = "「구체적으로는……키스하는 모습, 같은 거요?」"

[[dialogue]]
speaker = "蘭美"
original = "「っっ！？\u3000無理に決まってるぴょんっ！！」"
translation = "「!!? 무리인 게 당연하잖아뿅!!」"

[[dialogue]]
speaker = "ヨミ"
original = "「えへへ、ですよね～」"
translation = "「에헤헤, 그렇죠~」"

[[dialogue]]
speaker = "蘭美"
original = "「人前でするのもどうかと思うのに、両親に見せるだなんて、できるわけないでしょう……」"
translation = "「사람들 앞에서 하는 것도 좀 그런데, 부모님께 보여 드린다니, 될 리가 없잖아……」"

[[dialogue]]
speaker = "蘭美"
original = "「まったく！\u3000ヨミヨミにも困ったものね……」"
translation = "「정말! 요미요미도 곤란하네……」"

[[dialogue]]
speaker = "蘭美"
original = "「え……ちょっと、会長？\u3000なにこっちをじぃーっと見つめて……も、もしかして唇を見ているの？」"
translation = "「에……잠깐, 회장? 왜 이쪽을 지이ー익 쳐다보고……호, 혹시 입술을 보고 있는 거야?」"

[[dialogue]]
speaker = "蘭美"
original = "「まさか本気でキスの写真を……あ、こら、ちょっと、近づかないで。そんな、強引に……抱き締めないのっ！」"
translation = "「설마 진심으로 키스 사진을……아, 이봐, 잠깐, 다가오지 마. 그렇게, 억지로……끌어안지 마!」"

[[dialogue]]
speaker = "ヨミ"
original = "「こ、これはシャッターチャンスですか！？」"
translation = "「이, 이건 셔터 찬스인가요!?」"

[[dialogue]]
speaker = "蘭美"
original = "「んちゅ<emoji=heart04>\u3000ちゅ<emoji=heart04>\u3000こらぁ、何度もキスしないで……んふっ、ちゅ<emoji=heart04>」"
translation = "「음 쪽<emoji=heart04> 쪽<emoji=heart04> 이봐, 몇 번이나 키스하지 마……응훗, 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "蘭美"
original = "「あぁ……いっぱいキスしてるとこ、撮られちゃってるぴょん……<emoji=heart04>」"
translation = "「아아……잔뜩 키스하는 모습, 찍혀 버렸어뿅……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "こうして蘭美とのうれしはずかしい写真が大量に撮影されたのだった。"
translation = "이렇게 라비와의 기쁘고 부끄러운 사진이 대량으로 촬영된 것이었다."

