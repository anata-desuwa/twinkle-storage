[[dialogue]]
speaker = "カティア"
original = "「魔王様～♪\u3000遊んでくださいワン♪\u3000ワンワン♪」"
translation = "「마왕님~♪ 놀아주세요 멍♪ 멍멍♪」"

[[dialogue]]
speaker = "クロト"
original = "「カティアが勉強を見てくださいって言ってきたんだろ。テストは大丈夫なのか？」"
translation = "「카티아가 공부를 봐달라고 했잖아. 시험은 괜찮은 거야?」"

[[dialogue]]
speaker = "カティア"
original = "「え～、ちょっとぐらいいいじゃないですか～。それに成績が良くない方がワルとして箔が付くってもんですよ」"
translation = "「에이~, 조금 정도는 괜찮잖아요~. 게다가 성적이 좋지 않은 편이 악당으로서의 품격이 붙는 법이라고요.」"

[[dialogue]]
speaker = "unk"
original = "抱きついてきたり、頭を撫でてとねだったりと、カティアは最近俺に甘えっぱなしだ。"
translation = "달라붙거나, 머리를 쓰다듬어 달라고 조르거나, 카티아는 요즘 나에게 응석만 부리고 있다."

[[dialogue]]
speaker = "unk"
original = "俺を慕ってくれるのは嬉しいが、人前では控えるよう言っても聞かないので少し困っている。"
translation = "나를 따르는 것은 기쁘지만, 사람들 앞에서는 자제하라고 말해도 듣지 않으니 조금 곤란하다."

[[dialogue]]
speaker = "カティア"
original = "「魔王様こそもっと悪の貫禄を出しましょう！\u3000魔王らしいところを世に見せつけてやろうじゃないですか！」"
translation = "「마왕님이야말로 좀 더 악의 관록을 보여주세요! 마왕다운 모습을 세상에 보여주자고요!」"

[[dialogue]]
speaker = "unk"
original = "そんなに悪い魔王様がお望みなら、本当に魔王らしくしてみるとしよう。"
translation = "그렇게 나쁜 마왕님을 원한다면, 정말 마왕답게 행동해 보기로 하자."

[[dialogue]]
speaker = "unk"
original = "より魔王らしく、より悪者らしくするには……"
translation = "더 마왕답게, 더 악당답게 하려면……"

[[dialogue]]
speaker = "unk"
original = "深夜、寝静まった住宅街。"
translation = "심야, 잠든 주택가."

[[dialogue]]
speaker = "unk"
original = "街灯に照らされているのは、俺とカティアの２人──いや、１人と１匹だけ。"
translation = "가로등에 비춰지고 있는 것은 나와 카티아 두 사람──아니, 한 명과 한 마리뿐."

[[dialogue]]
speaker = "カティア"
original = "「あの……魔王様？\u3000さすがに魔王様でもこれはやりすぎじゃ……」"
translation = "「저…… 마왕님? 아무리 마왕님이라도 이건 너무 심한 거 아닌가요……」"

[[dialogue]]
speaker = "クロト"
original = "「最近、カティアは俺の言うことを聞かなかったからな。魔王として、命令に従わない部下はお仕置きしないと」"
translation = "「최근, 카티아가 내 말을 듣지 않았으니까. 마왕으로서, 명령에 따르지 않는 부하는 벌을 줘야지.」"

[[dialogue]]
speaker = "カティア"
original = "「そんなぁ……」"
translation = "「너무해요……」"

[[dialogue]]
speaker = "クロト"
original = "「ほら、散歩に行くぞ」"
translation = "「자, 산책 가자.」"

[[dialogue]]
speaker = "カティア"
original = "「うぅ～……こんなの恥ずかしいです……」"
translation = "「으으~…… 이런 거 부끄러워요……」"

[[dialogue]]
speaker = "unk"
original = "一糸纏わぬ姿──正確には首輪とグローブだけを付けさせられたカティア。"
translation = "실오라기 하나 걸치지 않은 모습──정확히는 목줄과 장갑만을 착용하게 된 카티아."

[[dialogue]]
speaker = "unk"
original = "犬のように四つん這いにさせられ、首輪にはリードが繋がっていた。"
translation = "개처럼 네 발로 기게 했고, 목줄에는 리드가 연결되어 있었다."

[[dialogue]]
speaker = "カティア"
original = "「おっぱいも、あそこも丸出しで……せ、せめて何か着させてください……。こんなの犬みたいです……」"
translation = "「가슴도, 거기도 다 드러나고…… 제, 제발 뭐라도 입혀주세요……. 이런 건 개 같잖아요……」"

[[dialogue]]
speaker = "クロト"
original = "「俺の犬になりますって言ったのはカティアだろ。俺は悪の魔王だから部下にも容赦しないぞ」"
translation = "「내 개가 되겠다고 말한 건 카티아잖아. 나는 악의 마왕이니까 부하에게도 용서하지 않아.」"

[[dialogue]]
speaker = "カティア"
original = "「確かに言いましたけど、こういうのじゃ……うぅ……」"
translation = "「확실히 말했지만, 이런 건…… 으으……」"

[[dialogue]]
speaker = "unk"
original = "本当に犬のように扱われ、カティアの愛らしい顔が屈辱に歪む。"
translation = "정말로 개처럼 취급당하자, 카티아의 사랑스러운 얼굴이 굴욕으로 일그러진다."

[[dialogue]]
speaker = "unk"
original = "しかし抗議しても無駄と悟ったようで、お尻を振って歩き始めた。"
translation = "하지만 항의해도 소용없음을 깨달은 듯, 엉덩이를 흔들며 걷기 시작했다."

[[dialogue]]
speaker = "カティア"
original = "「うぅ、あそこすーすーする……こんなの他の人に見られたら死んじゃう……」"
translation = "「으으, 거기가 뻥 뚫려 있어…… 이런 거 다른 사람에게 보이면 죽을 거야……」"

[[dialogue]]
speaker = "unk"
original = "かわいらしいお尻に、綺麗な秘裂、そして小さな体に見合わない大きな胸……どれも男の本能を刺激する。"
translation = "귀여운 엉덩이에, 아름다운 은밀한 틈, 그리고 작은 몸에 어울리지 않는 커다란 가슴…… 모두 남자의 본능을 자극한다."

[[dialogue]]
speaker = "カティア"
original = "「ドキドキするの止まらない……お願い、誰も来ないで……」"
translation = "「두근거림이 멈추지 않아…… 제발, 아무도 오지 마……」"

[[dialogue]]
speaker = "unk"
original = "カティアの顔は羞恥で赤く染まっていて、不安そうに周囲を見回しながら、ためらいがちに一歩ずつ進む。"
translation = "카티아의 얼굴은 수치심으로 붉게 물들어 있었고, 불안한 듯 주위를 둘러보며, 망설이는 듯 한 걸음씩 나아간다."

[[dialogue]]
speaker = "カティア"
original = "「ふぅ……はぁ……はぁ……」"
translation = "「후우…… 하아…… 하아……」"

[[dialogue]]
speaker = "クロト"
original = "「遅いぞ」"
translation = "「늦잖아.」"

[[dialogue]]
speaker = "unk"
original = "歩みを促すように、首輪につながったリードを引く。"
translation = "걸음을 재촉하듯이, 목줄에 연결된 리드를 당긴다."

[[dialogue]]
speaker = "カティア"
original = "「んんっ……引っ張らないで……」"
translation = "「응응…… 당기지 마……」"

[[dialogue]]
speaker = "unk"
original = "こうしてリードを握っているとカティアを支配している気がして、得も言われぬ快感がこみ上げてくる。"
translation = "이렇게 리드를 쥐고 있으니 카티아를 지배하고 있다는 기분이 들어, 형언할 수 없는 쾌감이 솟아오른다."

[[dialogue]]
speaker = "クロト"
original = "「犬なんだから犬らしく鳴かないとな」"
translation = "「개니까 개답게 짖어야지.」"

[[dialogue]]
speaker = "カティア"
original = "「わ……ワン。ワンワン」"
translation = "「와…… 멍. 멍멍.」"

[[dialogue]]
speaker = "クロト"
original = "「そうだ。ちゃんと言うこと聞けて偉いぞ」"
translation = "「그래. 제대로 말 잘 들어서 착하네.」"

[[dialogue]]
speaker = "カティア"
original = "「くぅ～ん……」"
translation = "「낑~……」"

[[dialogue]]
speaker = "unk"
original = "いつもは楽しそうに鳴きマネをしていたが、今は声に恥辱が表れていた。"
translation = "평소에는 즐거운 듯 짖는 흉내를 냈지만, 지금은 목소리에 굴욕이 담겨 있었다."

[[dialogue]]
speaker = "カティア"
original = "「あの……このお散歩、いつまでやるんですか……？」"
translation = "「저…… 이 산책, 언제까지 하는 건가요……?」"

[[dialogue]]
speaker = "クロト"
original = "「新星学園に着くまでだ。ぐずぐずしてると夜が明けるぞ」"
translation = "「신성 학원에 도착할 때까지다. 꾸물거리다간 밤이 새겠어.」"

[[dialogue]]
speaker = "カティア"
original = "「ええっ、そ、そんなの無理ですよ！？\u3000誰かに見つかっちゃいますっ！？」"
translation = "「에엣, 그, 그건 무리예요!? 누구에게 들키면 어떡해요!?」"

[[dialogue]]
speaker = "クロト"
original = "「言うことを聞けないなら、違うお仕置きをすることになるな」"
translation = "「말을 듣지 않으면, 다른 벌을 주게 될 거야.」"

[[dialogue]]
speaker = "unk"
original = "メス犬の痴態で勃起したペニスを、カティアの眼前に突きつける。"
translation = "암캐의 추태로 발기한 페니스를, 카티아의 눈앞에 들이민다."

[[dialogue]]
speaker = "カティア"
original = "「あ──」"
translation = "「아──」"

[[dialogue]]
speaker = "unk"
original = "凶器を前にしたように、一瞬言葉を失って固まるカティア。"
translation = "흉기를 앞에 둔 것처럼, 순간 말을 잃고 굳어버리는 카티아."

[[dialogue]]
speaker = "カティア"
original = "「や、やっぱりちゃんとお散歩しますからっ！\u3000今おち○ちん入れたら……ダメっ、ダメですぅっ！」"
translation = "「여, 역시 제대로 산책할게요! 지금 거시기를 넣으면…… 안 돼, 안 돼요!」"

[[dialogue]]
speaker = "unk"
original = "震えるカティアを無視して、剥き出しの秘裂をペニスで一気に貫いた。"
translation = "떨고 있는 카티아를 무시하고, 드러난 은밀한 틈을 페니스로 단숨에 꿰뚫었다."

[[dialogue]]
speaker = "カティア"
original = "「うぁあああ～～～～～～～～っ<emoji=heart04>」"
translation = "「우아아아아아아아아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「ん……はぁ……魔王様のおち○ちん、おっきいよぉ……」"
translation = "「응…… 하아…… 마왕님의 거시기, 커요오……」"

[[dialogue]]
speaker = "unk"
original = "羞恥のせいか、カティアの中はやけどしそうに熱い。"
translation = "수치심 때문인지, 카티아의 안은 데일 듯이 뜨겁다."

[[dialogue]]
speaker = "unk"
original = "蜜で潤った膣壁をこじ開けてペニスを深く沈めていく。"
translation = "꿀로 젖은 질벽을 비집고 페니스를 깊숙이 가라앉힌다."

[[dialogue]]
speaker = "カティア"
original = "「あぁ……おち○ちん、ズブズブ入ってきてるぅ……」"
translation = "「아아…… 거시기, 쑤욱쑤욱 들어오고 있어……」"

[[dialogue]]
speaker = "クロト"
original = "「散歩して濡れるなんて、カティアは変態だな」"
translation = "「산책하다가 젖다니, 카티아는 변태네.」"

[[dialogue]]
speaker = "カティア"
original = "「ちがっ……私、変態じゃないもん……くっ……はぁ……」"
translation = "「아니…… 나, 변태 아니야…… 큭…… 하아……」"

[[dialogue]]
speaker = "unk"
original = "口答えするカティアを躾けるように、リードを軽く引きながらペニスを動かす。"
translation = "말대꾸하는 카티아를 길들이듯이, 리드를 가볍게 당기면서 페니스를 움직인다."

[[dialogue]]
speaker = "カティア"
original = "「んん……っ<emoji=heart04>\u3000はぁ……は……あ……ぁん……<emoji=heart04>」"
translation = "「응응……윽<emoji=heart04> 하아…… 하…… 아……앙……<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「おち○ちん抜いて……あっ<emoji=heart04>\u3000やめて、ください……ふっ……はぁ<emoji=heart04>」"
translation = "「거시기 빼줘…… 앗<emoji=heart04> 그만, 둬, 주세요…… 흣…… 하아<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「あ……おち○ちん熱くて、お腹温かい……はあぁ……はぁ……んっ<emoji=heart04>」"
translation = "「아…… 거시기 뜨거워서, 배가 따뜻해…… 하아아…… 하아…… 응!<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "言葉とは裏腹に、カティアの声や表情に快楽がにじむ。"
translation = "말과는 달리, 카티아의 목소리나 표정에 쾌락이 배어 나온다."

[[dialogue]]
speaker = "unk"
original = "小柄なカティアの膣は狭くて、ペニスがきつく圧迫されるのが快感だ。"
translation = "몸집이 작은 카티아의 질은 좁아서, 페니스가 세게 압박되는 것이 쾌감이다."

[[dialogue]]
speaker = "カティア"
original = "「はぁ、はぁ……魔王様のおち○ちん、いつもは好きなのに……っ……<emoji=heart04>」"
translation = "「하아, 하아…… 마왕님의 거시기, 평소에는 좋은데……윽……<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「あ……あ……んっ<emoji=heart04>\u3000こんな……お外でエッチなんてイヤですぅ……はぁ、ぁんっ<emoji=heart04>」"
translation = "「아…… 아…… 응!<emoji=heart04> 이런…… 밖에서 섹스라니 싫어요…… 하아, 앙!<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「エッチじゃなくて交尾だ。カティアは犬だからな」"
translation = "「섹스가 아니라 교미다. 카티아는 개니까.」"

[[dialogue]]
speaker = "カティア"
original = "「うぅっ……そんな……あ、あぁっ<emoji=heart04>\u3000交尾イヤぁっ<emoji=heart04>\u3000はぁはぁ……あっ……んっ……<emoji=heart04>」"
translation = "「우윽…… 그런…… 아, 아앗!<emoji=heart04> 교미 싫어앗!<emoji=heart04> 하아하아…… 앗…… 응……<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「んんっ<emoji=heart04>\u3000おち○ちん、中で擦れてるっ<emoji=heart04>\u3000はぁ……あぁっ……ぁん<emoji=heart04>」"
translation = "「응응!<emoji=heart04> 거시기, 안에서 비벼지고 있어!<emoji=heart04> 하아…… 아앗…… 앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "嫌がっていても快楽には抗えず、愛液は溢れ、膣は嬉しそうにペニスを締め付けてくる。"
translation = "싫어하고 있어도 쾌락에는 저항하지 못하고, 애액은 넘쳐흐르며, 질은 기쁜 듯 페니스를 조여온다."

[[dialogue]]
speaker = "カティア"
original = "「はぁ……はぁ……んっ<emoji=heart04>\u3000ダメ、声、出ちゃうぅ……っ<emoji=heart04>」"
translation = "「하아…… 하아…… 응!<emoji=heart04> 안 돼, 소리, 나와버려……윽<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「あっ、あんっ<emoji=heart04>\u3000おち○ちん太くて……おま○こ広がっちゃう<emoji=heart04>\u3000んっ……はぁ……うあぁっ<emoji=heart04>」"
translation = "「앗, 앙!<emoji=heart04> 거시기 굵어서…… 보지 넓어지잖아<emoji=heart04> 응…… 하아…… 우아앗!<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "小さな体に不釣り合いな、大きなおっぱいを揺らしながら喘ぐカティア。"
translation = "작은 몸에 어울리지 않는, 커다란 가슴을 흔들면서 신음하는 카티아."

[[dialogue]]
speaker = "unk"
original = "膣壁の肉ひだもペニスに絡みついてきて、顔も性格も幼いのに、ちゃんと女の体をしていた。"
translation = "질벽의 주름도 페니스에 휘감겨 오고, 얼굴도 성격도 어리지만, 제대로 여자의 몸을 하고 있었다."

[[dialogue]]
speaker = "カティア"
original = "「はぁ、あ……おま○こ熱いぃ<emoji=heart04>\u3000あっ……はっ……あぁんっ<emoji=heart04>」"
translation = "「하아, 아…… 보지 뜨거워<emoji=heart04> 앗…… 핫…… 아앙!<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「交尾は気持ちいいか？」"
translation = "「교미는 기분 좋아?」"

[[dialogue]]
speaker = "カティア"
original = "「んっ……あはぁ……はぁ<emoji=heart04>\u3000交尾じゃないもん……エッチだもん……」"
translation = "「응!<emoji=heart04> 아하아…… 하아<emoji=heart04> 교미 아니야…… 섹스야……」"

[[dialogue]]
speaker = "unk"
original = "反論するカティアを戒めるためにリードを引く。"
translation = "반론하는 카티아를 훈계하기 위해 리드를 당긴다."

[[dialogue]]
speaker = "カティア"
original = "「んっぐぅ……っ」"
translation = "「응윽……윽」"

[[dialogue]]
speaker = "カティア"
original = "「はぁ、ふぅ……く、苦しいです……首輪、引っ張らないでください……」"
translation = "「하아, 후우…… 흐, 괴로워요…… 목줄, 당기지 말아주세요……」"

[[dialogue]]
speaker = "クロト"
original = "「カティアが口答えしたからお仕置きだ」"
translation = "「카티아가 말대꾸했으니까 벌이다.」"

[[dialogue]]
speaker = "カティア"
original = "「そんな……んくっ……はあぁ……」"
translation = "「그런…… 응긋…… 하아아……」"

[[dialogue]]
speaker = "unk"
original = "リードを引かれているのに、まるで喜んでいるみたいに膣がきゅっと締まった。"
translation = "리드를 당기고 있는데도, 마치 기뻐하는 것처럼 질이 꽉 조여졌다."

[[dialogue]]
speaker = "unk"
original = "さらに、くい、くいっと軽く引きながら突いてやる。"
translation = "게다가, 쿡, 쿡 하고 가볍게 당기면서 찔러준다."

[[dialogue]]
speaker = "カティア"
original = "「んーっ<emoji=heart04>\u3000はっ、んーーっ<emoji=heart04>」"
translation = "「응ー윽<emoji=heart04> 핫, 응ーー윽<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「カティアはメス犬だ。わかったな？」"
translation = "「카티아는 암캐다. 알겠나?」"

[[dialogue]]
speaker = "カティア"
original = "「メス、犬……んぁ……はぁ……<emoji=heart04>\u3000私、メス犬……あぁ、あんっ<emoji=heart04>」"
translation = "「암, 캐…… 응아…… 하아……<emoji=heart04> 나, 암캐…… 아아, 앙!<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスで突かれながら、悔しさと快感が入り混じった顔で喘ぐカティア。"
translation = "페니스로 찔리면서, 분함과 쾌감이 뒤섞인 얼굴로 신음하는 카티아."

[[dialogue]]
speaker = "unk"
original = "お前はメス犬だと体に刻み込むように、カティアの中で繰り返しペニスを前後させる。"
translation = "너는 암캐라고 몸에 새기듯이, 카티아 안에서 반복해서 페니스를 앞뒤로 움직인다."

[[dialogue]]
speaker = "カティア"
original = "「ふああぁっ<emoji=heart04>\u3000ん、あっ……はぁっ、はぁっ、あんっ<emoji=heart04>」"
translation = "「후아아앗<emoji=heart04> 응, 앗…… 하앗, 하앗, 앙!<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「あっ、あっ、あっ……はぁ──うあぁっ<emoji=heart04>\u3000魔王様のおち○ちんで、気持ち良くなっちゃう<emoji=heart04>」"
translation = "「앗, 앗, 앗…… 하아── 우아앗!<emoji=heart04> 마왕님의 거시기로, 기분 좋아져버려<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「気持ち良くなっちゃ、ダメなのに……はぁっ、あっ、あぁあっ<emoji=heart04>\u3000ほんとに、メス犬になっちゃうぅっ<emoji=heart04>」"
translation = "「기분 좋아지면, 안 되는데…… 하앗, 앗, 아아앗!<emoji=heart04> 정말로, 암캐가 되어버려엇!<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「ふぁああっ、はぁっ、はんっ<emoji=heart04>\u3000ダメ、体、動いちゃうっ<emoji=heart04>\u3000はっ……あっ、あっ──んぁああ～っ<emoji=heart04>」"
translation = "「후아아앗, 하앗, 항!<emoji=heart04> 안 돼, 몸이, 움직여버려!<emoji=heart04> 핫…… 앗, 앗── 응아아아~앗!<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "盛りのついた獣のように、カティアは自分から腰を振って快楽を貪る。"
translation = "발정 난 짐승처럼, 카티아는 스스로 허리를 흔들며 쾌락을 탐한다."

[[dialogue]]
speaker = "カティア"
original = "「あっ<emoji=heart04>\u3000お腹の中で、おち○ちんビクビクしてる<emoji=heart04>\u3000硬いおち○ちんで、ズボズボされて、おま○こ熱いっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 배 속에서, 거시기 움찔움찔거려<emoji=heart04> 단단한 거시기로, 쑤컹쑤컹 당해서, 보지 뜨거워!<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「あっ、あっ、あんっ<emoji=heart04>\u3000はぁはっ……おち○ちん、深いぃ<emoji=heart04>\u3000んっ、あっ、はあぁっ<emoji=heart04>」"
translation = "「앗, 앗, 앙!<emoji=heart04> 하아핫…… 거시기, 깊숙해<emoji=heart04> 응, 앗, 하아앗!<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "小さな体でお尻を振るかわいくていやらしい姿に、ますます情欲が燃え上がる。"
translation = "작은 몸으로 엉덩이를 흔드는 귀엽고 야릇한 모습에, 더욱 정욕이 불타오른다."

[[dialogue]]
speaker = "unk"
original = "ペニスを突き出すとカティアのお尻が当たり、下半身に柔らかい肉の感触を感じた。"
translation = "페니스를 내밀자 카티아의 엉덩이가 닿았고, 하반신에 부드러운 살의 감촉을 느꼈다."

[[dialogue]]
speaker = "カティア"
original = "「んっ、はぁ……交尾なのに……交尾で気持ち良くなっちゃうっ<emoji=heart04>\u3000はぁっ、はぁっ……あっ、ああぁっ<emoji=heart04>」"
translation = "「응, 하아…… 교미인데…… 교미로 기분 좋아져버려!<emoji=heart04> 하앗, 하앗…… 앗, 아아앗!<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「あ、あ、あ、あっ──ん～っ<emoji=heart04>\u3000犬みたいな交尾で、おま○こ気持ち良くなってるぅっ<emoji=heart04>」"
translation = "「아, 아, 아, 앗── 응~윽<emoji=heart04> 개 같은 교미로, 보지 기분 좋아지고 있어!<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「やっぱりカティアはメス犬だな。メス犬はどう鳴くんだ？」"
translation = "「역시 카티아는 암캐네. 암캐는 어떻게 짖지?」"

[[dialogue]]
speaker = "カティア"
original = "「わ……わ……」"
translation = "「와…… 와……」"

[[dialogue]]
speaker = "カティア"
original = "「ワン<emoji=heart04>\u3000ワンワン<emoji=heart04>」"
translation = "「멍<emoji=heart04> 멍멍<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "逡巡は快楽に溶かされ、子犬の鳴き声が深夜の住宅街に響く。"
translation = "주저함은 쾌락에 녹아내리고, 강아지의 울음소리가 심야의 주택가에 울려 퍼진다."

[[dialogue]]
speaker = "カティア"
original = "「ワン<emoji=heart04>\u3000ワン<emoji=heart04>\u3000ワン<emoji=heart04>\u3000ハッ、ハッ……わふっ……くぅ～～んっ<emoji=heart04>」"
translation = "「멍<emoji=heart04> 멍<emoji=heart04> 멍<emoji=heart04> 핫, 핫…… 와훗…… 낑~~~윽<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「ハッ、ハッ、ハッ<emoji=heart04>\u3000きゃんっ<emoji=heart04>\u3000きゃんきゃんっ<emoji=heart04>\u3000きゃぅ～んっ<emoji=heart04>」"
translation = "「핫, 핫, 핫<emoji=heart04> 캭!<emoji=heart04> 캭캭!<emoji=heart04> 캬웅~윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "メス犬になったカティアを犯し、女を支配する快感が俺を高ぶらせる。"
translation = "암캐가 된 카티아를 범하고, 여자를 지배하는 쾌감이 나를 고조시킨다."

[[dialogue]]
speaker = "unk"
original = "まるで本当に悪の魔王になったかのように、カティアを征服することがたまらなく楽しくなっていた。"
translation = "마치 정말로 악의 마왕이 된 것처럼, 카티아를 정복하는 것이 참을 수 없을 정도로 즐거워지고 있었다."

[[dialogue]]
speaker = "カティア"
original = "「ワン<emoji=heart04>\u3000ワン<emoji=heart04>\u3000あっ、あっ、あ──わぅっ、わぉお～～～ん<emoji=heart04>」"
translation = "「멍<emoji=heart04> 멍<emoji=heart04> 앗, 앗, 아── 왈, 와오오오옹~~~<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「よくできたな。ご褒美だ」"
translation = "「잘했어. 포상이다」"

[[dialogue]]
speaker = "unk"
original = "後ろから手を回し、大きなおっぱいをぎゅっと握る。"
translation = "뒤에서 팔을 감아, 커다란 가슴을 꽉 움켜쥔다."

[[dialogue]]
speaker = "カティア"
original = "「くぅ～～～～～～んっ<emoji=heart04>」"
translation = "「낑～～～～～～잉<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「ワン<emoji=heart04>\u3000ワンワン<emoji=heart04>\u3000んっ、あっ……おっぱいが……ぁっ……はぁっ、あぁんっ<emoji=heart04>」"
translation = "「멍<emoji=heart04> 멍멍<emoji=heart04> 응, 앗…… 가슴이…… 앗…… 하아, 아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ボリュームを楽しむように、手のひらでおっぱいを包んで揉みしだく。"
translation = "볼륨을 즐기듯이, 손바닥으로 가슴을 감싸 쥐고 주무른다."

[[dialogue]]
speaker = "カティア"
original = "「ふあぁ、はっ……あ、あぁっ<emoji=heart04>\u3000おっぱいぐにぐにされながら、おま○こ突かれて、気持ちいいっ<emoji=heart04>\u3000ふっ、はぁ──んぁああっ<emoji=heart04>」"
translation = "「후아아, 핫…… 아, 아앗<emoji=heart04> 가슴 주물럭거리면서, 보지에 박히니, 기분 좋아<emoji=heart04> 훗, 하아──앙아앗<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「ふ、ん──んんっ<emoji=heart04>\u3000あ、乳首まで……んああっ<emoji=heart04>\u3000あ、あ──ひああぁっ<emoji=heart04>」"
translation = "「흐, 응── 응응<emoji=heart04> 아, 젖꼭지까지…… 응아앗<emoji=heart04> 아, 아── 히아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "おっぱいの柔らかさを感じながら、ペニスが熱く柔らかな膣壁に包まれ、至福の快楽を味わう。"
translation = "가슴의 부드러움을 느끼면서, 페니스가 뜨겁고 부드러운 질벽에 감싸여 지복의 쾌락을 맛본다."

[[dialogue]]
speaker = "カティア"
original = "「はっ、はぁはっ、あぁっ<emoji=heart04>\u3000きゃんきゃんっ<emoji=heart04>\u3000きゃぃんっ<emoji=heart04>」"
translation = "「핫, 하아핫, 아앗<emoji=heart04> 깽깽<emoji=heart04> 깽잉<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「ウゥ～ッ、ワン<emoji=heart04>\u3000ワンワン<emoji=heart04>\u3000後ろから、犬みたいにズンズンされるの気持ちいいっ<emoji=heart04>\u3000メス犬交尾、気持ちいいよぉっ<emoji=heart04>」"
translation = "「우으~, 멍<emoji=heart04> 멍멍<emoji=heart04> 뒤에서, 개처럼 쿵쿵 박히는 거 기분 좋아<emoji=heart04> 암캐 교미, 기분 좋다구욧<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "メス犬の喘ぎに興奮が加熱し、カティアを躾けることにさらに没頭していく。"
translation = "암캐의 신음에 흥분이 가열되고, 카티아를 길들이는 것에 더욱 몰두해 간다."

[[dialogue]]
speaker = "カティア"
original = "「あ、あ、あ、あ──ああぁっ<emoji=heart04>\u3000おち○ちん激しいっ<emoji=heart04>\u3000あ、あ、おち○ちんおっきくて、お腹いっぱいになってるぅっ<emoji=heart04>」"
translation = "「아, 아, 아, 아── 아아앗<emoji=heart04> 자지 격렬해<emoji=heart04> 아, 아, 자지 커서, 배가 가득 차고 있어욧<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000おち○ちん、奥に、当たってるっ<emoji=heart04>\u3000んっ、子宮、届いて……はあぁあんっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 자지, 안쪽에, 닿고 있어<emoji=heart04> 응, 자궁에, 닿아…… 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "カティアの中は大量の愛液でとろとろで、膣壁が痙攣しながら締め付けてくる。"
translation = "카티아의 안은 대량의 애액으로 질척거리고, 질벽이 경련하며 조여온다."

[[dialogue]]
speaker = "カティア"
original = "「ふはっ、はぁっ、んんっ<emoji=heart04>\u3000あ<emoji=heart04>\u3000あ<emoji=heart04>\u3000あ<emoji=heart04>\u3000おち○ちんのさきっぽで、コツコツってされて<emoji=heart04>\u3000ふぁっ、はっ、あぁっ<emoji=heart04>」"
translation = "「푸핫, 하앗, 응응<emoji=heart04> 아<emoji=heart04> 아<emoji=heart04> 아<emoji=heart04> 자지 끝으로, 톡톡 건드려져서<emoji=heart04> 파앗, 핫, 아앗<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「あっ<emoji=heart04>\u3000はっ<emoji=heart04>\u3000はんっ<emoji=heart04>\u3000奥、当たると、頭真っ白になるぅっ<emoji=heart04>\u3000ん、ふ――うああぁっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 핫<emoji=heart04> 항<emoji=heart04> 안쪽, 닿으면, 머리가 새하얘져욧<emoji=heart04> 응, 후―― 우아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "お腹の奥の奥──子宮口を突かれる度にビクビクと体を震わせるカティア。"
translation = "배의 깊숙한 곳── 자궁구를 찔릴 때마다 움찔움찔 몸을 떨게 되는 카티아."

[[dialogue]]
speaker = "unk"
original = "それならばと、リードを引くと同時に奥に当ててやる。"
translation = "그렇다면 하고, 리드를 당김과 동시에 안쪽에 대고 박아준다."

[[dialogue]]
speaker = "カティア"
original = "「んん～～～～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「응응～～～～～～잉<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「かはっ……今の、しゅごいっ<emoji=heart04>\u3000んぁっ……ぁくっ……<emoji=heart04>」"
translation = "「카핫…… 방금 거, 굉장해<emoji=heart04> 응앗…… 아윽……<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「っ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000首輪引っ張りながら、奥ぐりぐりするのダメっ<emoji=heart04>\u3000気持ち良すぎっ<emoji=heart04>」"
translation = "「윽<emoji=heart04> 앗<emoji=heart04> 목줄 당기면서, 안쪽을 부비부비하는 거 안 돼요<emoji=heart04> 너무 기분 좋아<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「あ、がっ……<emoji=heart04>\u3000なんでっ<emoji=heart04>\u3000苦しいのに、気持ちいいっ<emoji=heart04>」"
translation = "「아, 가윽……<emoji=heart04> 왜<emoji=heart04> 괴로운데, 기분 좋은 거야<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「は……あ、く……<emoji=heart04>\u3000んくぅ……ぅぁ……んんーーっ<emoji=heart04>」"
translation = "「하…… 아, 윽……<emoji=heart04> 응윽…… 으아…… 응응~~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "カティアの体が弓なりに反り、ピンと張ったリードが首輪を締める。"
translation = "카티아의 몸이 활처럼 휘고, 팽팽하게 당겨진 리드가 목줄을 조인다."

[[dialogue]]
speaker = "unk"
original = "だが膣は痛いほどペニスをきつく絡みつき、カティアの快感も強くなっているようだった。"
translation = "하지만 질은 아플 정도로 페니스를 강하게 휘감았고, 카티아의 쾌감도 강해지고 있는 듯했다."

[[dialogue]]
speaker = "カティア"
original = "「あ──かはぁっ……！\u3000はぁはぁはぁ……あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>」"
translation = "「아── 카하앗……! 하아하아하아…… 앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リードを緩めると、足りない酸素を求めて荒い息を吐く。"
translation = "리드를 늦추자, 부족한 산소를 찾아 거친 숨을 내쉰다."

[[dialogue]]
speaker = "unk"
original = "しかしカティアの表情は快楽で蕩け、もはやメス犬そのものだった。"
translation = "하지만 카티아의 표정은 쾌락으로 녹아내려, 이미 암캐 그 자체였다."

[[dialogue]]
speaker = "カティア"
original = "「はぁっ<emoji=heart04>\u3000あぁっ<emoji=heart04>\u3000おち○ちん好きっ<emoji=heart04>\u3000メス犬交尾気持ちいいっ<emoji=heart04>」"
translation = "「하앗<emoji=heart04> 아앗<emoji=heart04> 자지 좋아<emoji=heart04> 암캐 교미 기분 좋아<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「ん～～～っ<emoji=heart04>\u3000おく、奥ぅっ<emoji=heart04>\u3000子宮が、赤ちゃんのお部屋が、ズンズンされてるぅっ<emoji=heart04>」"
translation = "「응~~~<emoji=heart04> 안쪽, 안쪽이욧<emoji=heart04> 자궁이, 아기 방이, 쿵쿵 박히고 있어욧<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「ふああぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000おち○ちんすごいっ<emoji=heart04>\u3000おっきなおち○ちんで、おま○こ壊れちゃうぅっ<emoji=heart04>」"
translation = "「푸아아앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 자지 굉장해<emoji=heart04> 커다란 자지로, 보지가 망가져 버려욧<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「くっ……メス犬に種付けするぞ」"
translation = "「크윽…… 암캐에게 씨를 뿌릴 거다」"

[[dialogue]]
speaker = "カティア"
original = "「あ──種付け……種付けっ<emoji=heart04>\u3000ビューッて<emoji=heart04>\u3000子宮に、精液出されて、種付けされちゃいますぅっ<emoji=heart04>」"
translation = "「아── 씨 뿌리기…… 씨 뿌리기<emoji=heart04> 뷰욱 하고<emoji=heart04> 자궁에, 정액을 내보내, 씨 뿌려져 버려욧<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「ワン<emoji=heart04>\u3000ワンワン、ワン<emoji=heart04>\u3000メス犬ま○こに、種付けされるっ<emoji=heart04>\u3000きゃんきゃんっ<emoji=heart04>\u3000きゃいぃんっ<emoji=heart04>」"
translation = "「멍<emoji=heart04> 멍멍, 멍<emoji=heart04> 암캐 보지에, 씨 뿌려진다<emoji=heart04> 깽깽<emoji=heart04> 깽잉<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「ワンワン<emoji=heart04>\u3000出してっ<emoji=heart04>\u3000出してぇっ<emoji=heart04>\u3000メス犬カティアの子宮を、魔王様のせーえきでいっぱいにしてくださいっ<emoji=heart04>」"
translation = "「멍멍<emoji=heart04> 싸줘<emoji=heart04> 싸줘욧<emoji=heart04> 암캐 카티아의 자궁을, 마왕님의 정액으로 가득 채워주세요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "オスに媚びた鳴き声を上げて交尾に夢中になるカティア。"
translation = "수컷에게 아양 떠는 울음소리를 내며 교미에 몰두하는 카티아."

[[dialogue]]
speaker = "unk"
original = "もう種付けしてもらうことしか頭になくて、あさましく腰を振りまくる。"
translation = "이제 씨를 받는 것 외에는 머릿속에 아무것도 없어서, 천박하게 허리를 마구 흔들어댄다."

[[dialogue]]
speaker = "カティア"
original = "「はぁっ、あっ──んくぅっ<emoji=heart04>\u3000また、リード、引っ張られてっ<emoji=heart04>\u3000くっ、ぅ……ん～っ<emoji=heart04>」"
translation = "「하앗, 앗── 응윽<emoji=heart04> 또, 리드가, 당겨져서<emoji=heart04> 큭, 으…… 응~<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「首輪、引っ張られてっ<emoji=heart04>\u3000苦しいはずなのに、おま○こキュンって、気持ち良くなりますっ<emoji=heart04>」"
translation = "「목줄이, 당겨져서<emoji=heart04> 괴로워야 하는데, 보지가 큥하고, 기분 좋아집니다<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「ワンワン<emoji=heart04>\u3000種付け<emoji=heart04>\u3000種付けっ<emoji=heart04>\u3000魔王様のおち○ちんでっ<emoji=heart04>\u3000カティアのメス犬ま○こにっ<emoji=heart04>\u3000種付けしてくださいっ<emoji=heart04>」"
translation = "「멍멍<emoji=heart04> 씨 뿌리기<emoji=heart04> 씨 뿌리기<emoji=heart04> 마왕님의 자지로<emoji=heart04> 카티아의 암캐 보지에<emoji=heart04> 씨 뿌려주세요<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「ワン<emoji=heart04>\u3000ワン<emoji=heart04>\u3000ワン<emoji=heart04>\u3000メス犬ま○こイッちゃうぅっ<emoji=heart04>\u3000ワンワン<emoji=heart04>\u3000わうぅっ──<emoji=heart04>」"
translation = "「멍<emoji=heart04> 멍<emoji=heart04> 멍<emoji=heart04> 암캐 보지 가버려욧<emoji=heart04> 멍멍<emoji=heart04> 와우윽──<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そしてもう一度リードを強く引きながら、カティアの奥に欲望をぶちまけた。"
translation = "그리고 다시 한번 리드를 강하게 당기면서, 카티아의 안쪽에 욕망을 쏟아부었다."

[[dialogue]]
speaker = "カティア"
original = "「わぉおお～～～～～～～～～んっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「와오오오오오오오오옹~~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「ワン<emoji=heart04>\u3000ワン<emoji=heart04>\u3000わうぅっ<emoji=heart04>\u3000お腹熱いぃっ<emoji=heart04>\u3000おち○ちんドクドクして、せーえき、出てるっ<emoji=heart04>\u3000種付け、されちゃってるっ<emoji=heart04>」"
translation = "「멍<emoji=heart04> 멍<emoji=heart04> 와우윽<emoji=heart04> 배 뜨거워<emoji=heart04> 자지 두근두근하고, 정액, 나오고 있어<emoji=heart04> 씨 뿌리기, 당하고 있어욧<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「ふっ……んんんっ<emoji=heart04>\u3000首輪締められながら、せーえき出されてっ<emoji=heart04>\u3000メス犬ま○こイッてるぅっ<emoji=heart04>」"
translation = "「훗…… 응응응<emoji=heart04> 목줄 조여지면서, 정액 맞고<emoji=heart04> 암캐 보지 가고 있어욧<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ぎゅっと収縮して悦ぶカティアの膣に締め付けられながら、最後の一滴まで注ぎ込む。"
translation = "꽉 수축하며 기뻐하는 카티아의 질에 조여지면서, 마지막 한 방울까지 쏟아붓는다."

[[dialogue]]
speaker = "カティア"
original = "「はぁ、あぁ……くぅん<emoji=heart04>\u3000メス犬交尾好きぃ<emoji=heart04>\u3000魔王様のせーし、たくさん入ってきてる……<emoji=heart04>」"
translation = "「하아, 아아…… 낑<emoji=heart04> 암캐 교미 좋아<emoji=heart04> 마왕님의 정액, 잔뜩 들어오고 있어……<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「ワン<emoji=heart04>\u3000ワンワン<emoji=heart04>\u3000わうぅ<emoji=heart04>\u3000あ、あ、あ──くぅ～～んっ<emoji=heart04>」"
translation = "「멍<emoji=heart04> 멍멍<emoji=heart04> 와우<emoji=heart04> 아, 아, 아── 낑~~~<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「わふぅ……<emoji=heart04>\u3000あ……おま○こから、せーえきこぼれちゃう……<emoji=heart04>」"
translation = "「와후……<emoji=heart04> 아…… 보지에서, 정액 흘러넘쳐……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "もったいないと言わんばかりに、膣を締めて精液をお腹に留めようとする。"
translation = "아깝다는 듯이, 질을 조여 정액을 배 안에 머물게 하려 한다."

[[dialogue]]
speaker = "unk"
original = "だけど溢れ出るのは止められなくて、どろりとした精液がいやらしく垂れ落ちていく。"
translation = "하지만 흘러넘치는 것은 막을 수 없어서, 걸쭉한 정액이 야하게 흘러내려간다."

[[dialogue]]
speaker = "カティア"
original = "「はぁ、はぁ……はあぁ……<emoji=heart04>\u3000魔王様の精液で、お腹いっぱい……<emoji=heart04>」"
translation = "「하아, 하아…… 하아아……<emoji=heart04> 마왕님의 정액으로, 배가 가득 찼어……<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「ふあぁ……ぁ……メス犬交尾で……種付け……されちゃった<emoji=heart04>」"
translation = "「푸아아…… 아…… 암캐 교미로…… 씨 뿌리기…… 당해버렸어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "荒い息を繰り返し、ぼんやりとした目で放心するカティア。"
translation = "거친 숨을 반복하며, 멍한 눈으로 넋을 잃은 카티아."

[[dialogue]]
speaker = "unk"
original = "犬のしっぽは嬉しそうに揺れていて、その表情は快楽に染まり切ったメスの顔だった。"
translation = "개의 꼬리는 기쁜 듯 흔들리고 있었고, 그 표정은 쾌락에 완전히 물든 암컷의 얼굴이었다."

[[dialogue]]
speaker = "クロト"
original = "「また言うこと聞かなかったら片足上げておしっこさせるぞ。それとも……」"
translation = "「또 말 안 들으면 한쪽 다리 들고 오줌 싸게 할 거다. 아니면……」"

[[dialogue]]
speaker = "クロト"
original = "「いい子にしてたらまた散歩に連れてきてやる──の方がいいか？」"
translation = "「착하게 있으면 또 산책 데리고 와 줄게── 이쪽이 좋으려나?」"

[[dialogue]]
speaker = "カティア"
original = "「くぅ～ん<emoji=heart04>」"
translation = "「낑~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "お仕置きとご褒美が逆転してしまったカティアにそう告げると、服従を示すように、甘い声で鳴いたのだった。"
translation = "벌과 포상이 역전되어 버린 카티아에게 그렇게 말하자, 복종을 나타내듯이, 달콤한 목소리로 울었던 것이다."

