[[dialogue]]
speaker = "unk"
original = "第２話,遊園地ノスタルジー,P"
translation = "제2화, 유원지 노스탤지어, P"

[[dialogue]]
speaker = "unk"
original = "とある週末。"
translation = "어느 주말."

[[dialogue]]
speaker = "unk"
original = "俺はサチと遊園地へデートにやって来ていた――"
translation = "나는 사치와 유원지로 데이트를 하러 왔다――"

[[dialogue]]
speaker = "サチ"
original = "「わぁ～♪\u3000懐かしい。この遊園地へ来るの、すごく久しぶりです♪」"
translation = "「와아~♪ 그립다. 이 유원지에 오는 거 정말 오랜만이에요♪」"

[[dialogue]]
speaker = "サチ"
original = "「それじゃあ、お兄さん。早速、決めておいた通りに行きましょうか♪」"
translation = "「그러면 오빠. 얼른 미리 정해둔 대로 갈까요♪」"

[[dialogue]]
speaker = "unk"
original = "そう言って、サチはちょっと照れ臭そうに、俺の手を握ってくる。"
translation = "그렇게 말하며 사치는 조금 쑥스러운 듯 내 손을 잡아 온다."

[[dialogue]]
speaker = "サチ"
original = "「んっ♪\u3000えへへ<emoji=heart04>」"
translation = "「응♪ 에헤헤<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "先週のある日。"
translation = "지난주의 어느 날."

[[dialogue]]
speaker = "サチ"
original = "「お兄さん、次のデートに当たって、今まで<b>ふわっと</b>していたところを、決めておきたいと思います！」"
translation = "「오빠, 다음 데이트를 맞이해서 지금까지 <b>흐릿하게</b> 넘어갔던 부분을 정해두고 싶어요!」"

[[dialogue]]
speaker = "サチ"
original = "「それは――デート中に手を握って良いのか、悪いのかということです！」"
translation = "「그건―― 데이트 중에 손을 잡아도 되는지 안 되는지예요!」"

[[dialogue]]
speaker = "unk"
original = "普通に握っても大丈夫だよ？"
translation = "그냥 잡아도 괜찮은데?"

[[dialogue]]
speaker = "サチ"
original = "「そ、それは恋人ですから、わかってますけど……いざ握ろうかなと思うと、ちょっとエッチかも……とか思っちゃうものなんです！」"
translation = "「그, 그건 연인이니까 알고 있지만…… 막상 잡으려고 하면 조금 야할지도…… 하고 생각하게 된단 말이에요!」"

[[dialogue]]
speaker = "unk"
original = "エッチ？？？"
translation = "야해???"

[[dialogue]]
speaker = "サチ"
original = "「だ、だって……一応その、肌を合わせる行為ですし……とにかく！\u3000次のデートは――最初から手を繋いでも大丈夫でしょうか！？」"
translation = "「그, 그게…… 일단 그, 살을 맞대는 행위니까요…… 아무튼! 다음 데이트는―― 처음부터 손을 잡아도 괜찮을까요!?」"

[[dialogue]]
speaker = "unk"
original = "と、そんなサチらしい面白いやり取りがあって、今日は彼女の方から手を繋いでくれている。"
translation = "그런 사치다운 재미있는 대화가 있었고, 오늘은 그녀 쪽에서 손을 잡아주고 있다."

[[dialogue]]
speaker = "unk"
original = "それだけでも、十分に嬉しいのだが――"
translation = "그것만으로도 충분히 기쁘지만――"

[[dialogue]]
speaker = "サチ"
original = "「って、どうしました、お兄さん？\u3000……えっ？\u3000恋人繋ぎはしても良いのか悪いのか、決めてなかった？」"
translation = "「어라, 왜 그래요, 오빠? ……엣? 연인 잡기(깍지 끼기)는 해도 되는지 안 되는지 안 정했다고요?」"

[[dialogue]]
speaker = "サチ"
original = "「そ、それは、さすがに……エッチだから禁止です！」"
translation = "「그, 그건 역시…… 야하니까 금지예요!」"

[[dialogue]]
speaker = "サチ"
original = "「だって、指を絡めるとか……人前だと、恥ずかし過ぎるじゃないですか……」"
translation = "「그게, 손가락을 얽는 건…… 사람들 앞이면 너무 부끄럽잖아요……」"

[[dialogue]]
speaker = "unk"
original = "２人だけの時はいいんだ？"
translation = "둘만 있을 때는 괜찮고?"

[[dialogue]]
speaker = "サチ"
original = "「う……も、もう、お兄さんってば！\u3000そういうことを言わせようとするなんて、エッチですよ……！」"
translation = "「으…… 정, 정말이지, 오빠도 참! 그런 말을 하게 만들다니 야해요……!」"

[[dialogue]]
speaker = "unk"
original = "恥ずかしそうに顔を赤くするサチが可愛くて、俺はつい顔が綻んでしまうのだった。"
translation = "부끄러운 듯 얼굴을 붉히는 사치가 귀여워서 나도 모르게 입가에 미소가 번졌다."

[[dialogue]]
speaker = "unk"
original = "それから、俺たちはまずジェットコースターに乗ることになり――"
translation = "그러고 나서 우리는 먼저 롤러코스터를 타게 되었고――"

[[dialogue]]
speaker = "サチ"
original = "「わぁ～っ！\u3000すごいです、お兄さん！\u3000星力なしでこんなにスピードが出て！」"
translation = "「와아~앗! 굉장해요, 오빠! 성력 없이 이렇게 스피드가 나다니!」"

[[dialogue]]
speaker = "サチ"
original = "「子供の時は乗れなかったけど、ジェットコースターってこんな面白いんですね！」"
translation = "「어릴 때는 못 탔지만, 롤러코스터가 이렇게 재미있는 거였군요!」"

[[dialogue]]
speaker = "サチ"
original = "「高い所の景色は見慣れたものですけど……余裕がある分、スピードを全力で楽しめるっていうか～！\u3000きゃ～っ♪」"
translation = "「높은 곳의 경치는 익숙하지만…… 여유가 있는 만큼 스피드를 온전히 즐길 수 있달까~! 꺄아~♪」"

[[dialogue]]
speaker = "サチ"
original = "「急カーブすご～い！\u3000あはははっ♪\u3000あはははっ♪」"
translation = "「급커브 대단해~! 아하하핫♪ 아하하핫♪」"

[[dialogue]]
speaker = "unk"
original = "（子供みたいにはしゃいで可愛いな……）"
translation = "(아이처럼 들떠서 귀엽네……)"

[[dialogue]]
speaker = "サチ"
original = "「あっ！\u3000お兄さん、すごいアップダウンが来ますよ！\u3000――きゃあ～っ♪\u3000あはははははっ♪」"
translation = "「앗! 오빠, 엄청난 업다운이 와요! ――꺄아아~♪ 아하하하하핫♪」"

[[dialogue]]
speaker = "unk"
original = "そうして、いくつもの絶叫マシーンに乗って楽しんだ後……"
translation = "그렇게 여러 절규 머신을 타며 즐긴 뒤……"

[[dialogue]]
speaker = "unk"
original = "俺たちは休憩も兼ねて、観覧車に乗ることにした。"
translation = "우리는 휴식도 겸해서 관람차를 타기로 했다."

[[dialogue]]
speaker = "unk"
original = "手を繋ぎながら、横に並んで席に座っていると――"
translation = "손을 잡은 채 나란히 앉아 있으니――"

[[dialogue]]
speaker = "サチ"
original = "「……なんだかこうして観覧車に乗っていると、昔、両親と一緒にここへ来た時のことを思い出します」"
translation = "「……왠지 이렇게 관람차를 타고 있으니, 옛날에 부모님과 함께 여기 왔을 때가 생각나요」"

[[dialogue]]
speaker = "unk"
original = "ふと、サチが外の景色を眺めながら言った。"
translation = "문득 사치가 밖의 풍경을 바라보며 말했다."

[[dialogue]]
speaker = "unk"
original = "両親はずっと流星市国に住んでるんだっけ？"
translation = "부모님은 계속 유성시국에 살고 계신댔나?"

[[dialogue]]
speaker = "サチ"
original = "「はい。お父さんは流星市国出身の人間で、お母さんは魔族で……元星騎士なんです」"
translation = "「네. 아빠는 유성시국 출신 인간이고, 엄마는 마족이고…… 전직 성기사예요」"

[[dialogue]]
speaker = "サチ"
original = "「……昔は、両親と休日によくお出かけしたりもしたんですけど、私が附属校に入学してから、色々忙しくなって――」"
translation = "「……옛날에는 부모님과 휴일에 자주 외출하기도 했지만, 제가 부속 학교에 입학하고 나서 여러모로 바빠져서――」"

[[dialogue]]
speaker = "サチ"
original = "「星騎士としての訓練に、生徒会や魔法少女の活動……やるべきことが増えて、私、家族と過ごす時間が少なくなっちゃってました」"
translation = "「별의 기사로서의 훈련에, 성도회나 마법소녀 활동…… 해야 할 일이 늘어나서, 저, 가족과 보내는 시간이 적어져 버렸어요」"

[[dialogue]]
speaker = "サチ"
original = "「今日、遊園地に来たおかげで、そのことを思い出せました。今度一緒にどこか出かけようって誘ってみるのも、いいかもしれませんね」"
translation = "「오늘 유원지에 온 덕분에 그 사실을 떠올릴 수 있었어요. 다음에 같이 어딘가 나가자고 권해보는 것도 좋을지도 모르겠네요」"

[[dialogue]]
speaker = "サチ"
original = "「え？\u3000――せっかくだから、遊園地に誘ってみるのはどうか……ですか？\u3000でも……」"
translation = "「에? ――기왕이면 유원지에 초대해 보는 건 어떠냐…… 고요? 하지만……」"

[[dialogue]]
speaker = "サチ"
original = "「一緒に遊園地に行きたいなんて……小さい子みたいで、お父さんお母さん、変に思わないでしょうか？」"
translation = "「같이 유원지에 가고 싶다니…… 어린아이 같아서, 아빠 엄마가 이상하게 생각하시지 않을까요?」"

[[dialogue]]
speaker = "unk"
original = "その時は俺も協力するよ"
translation = "그때는 나도 협력할게"

[[dialogue]]
speaker = "サチ"
original = "「お兄さん……。ありがとうございます」"
translation = "「오빠……. 감사합니다」"

[[dialogue]]
speaker = "サチ"
original = "「でも、１つ問題があって……」"
translation = "「하지만, 한 가지 문제가 있어서……」"

[[dialogue]]
speaker = "サチ"
original = "「実は……お父さんお母さんには、お兄さんと付き合っていること、まだ話してないんです」"
translation = "「실은…… 아빠 엄마께는 오빠랑 사귀고 있다는 거, 아직 말씀드리지 않았거든요」"

[[dialogue]]
speaker = "unk"
original = "う……そっか。まずはそこからか……"
translation = "으…… 그렇구나. 우선 거기서부터인가……"

[[dialogue]]
speaker = "サチ"
original = "「なので……よかったら今度、うちに挨拶とか――来てくれたりしますか？」"
translation = "「그러니까…… 괜찮으시다면 다음에 저희 집에 인사라든가―― 와 주실 수 있나요?」"

[[dialogue]]
speaker = "unk"
original = "可愛い彼女から期待のこもった上目遣いでそんな風に言われれば、男として頑張りますと答えざるを得ない。"
translation = "귀여운 여자친구가 기대가 담긴 위를 치켜뜬 눈으로 그런 식으로 말하면, 남자로서 힘내겠다고 대답할 수밖에 없다."

[[dialogue]]
speaker = "サチ"
original = "「ふふっ♪\u3000その顔。リクリエを退けちゃうお兄さんも、こういうことは苦手なんですね♪」"
translation = "「후훗♪ 그 표정. 리크리에를 물리치는 오빠도 이런 일은 서투르시네요♪」"

[[dialogue]]
speaker = "サチ"
original = "「大丈夫ですよ。私も協力します」"
translation = "「괜찮아요. 저도 협력할게요」"

[[dialogue]]
speaker = "サチ"
original = "「私は――お兄さんの彼女ですから♪」"
translation = "「저는―― 오빠의 여자친구니까요♪」"

[[dialogue]]
speaker = "unk"
original = "そう言って、サチは繋いだ手を１度放して――それから指を絡めて、恋人繋ぎにし直す。"
translation = "그렇게 말하며, 사치는 잡았던 손을 한 번 놓았다가―― 이어서 손가락을 얽어 깍지 손으로 다시 고쳐 잡는다."

[[dialogue]]
speaker = "サチ"
original = "「今は２人きりなので……ちょっとだけ解禁です♪」"
translation = "「지금은 둘뿐이니까…… 조금만 해금이에요♪」"

[[dialogue]]
speaker = "サチ"
original = "「えへへ<emoji=heart04>」"
translation = "「에헤헤<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "耳元で囁きながら、照れながらも笑うサチなのだった――"
translation = "귓가에 속삭이며 수줍어하면서도 웃는 사치였다――"

