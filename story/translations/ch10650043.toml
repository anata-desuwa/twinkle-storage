[[dialogue]]
speaker = "unk"
original = "第３話,パスタは折るな！,P"
translation = "제3화, 파스타는 꺾지 마!, P"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あくまで仮定の話。もしもの話なんだけど……」"
translation = "「어디까지나 가정하는 이야기. 만약의 이야기인데……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「もしあたしとあんたがけ、けけけけ、け……」"
translation = "「만약 나랑 네가 겨, 겨겨겨겨, 겨……」"

[[dialogue]]
speaker = "unk"
original = "結婚"
translation = "결혼"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「さらっと言うなぁ～～～っ！！」"
translation = "「너무 툭 내뱉지 마아아아악!!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ま、まぁ、恥ずかしがってても仕方ないわね……」"
translation = "「뭐, 뭐어, 부끄러워해 봤자 별수 없지……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「も、もしあたしとあんたが本当に結婚して、一緒に暮らすなら、約束してほしいことがいくつかあるの。特に食事に関してね」"
translation = "「만, 만약 나랑 네가 정말로 결혼해서 같이 산다면 약속해 줬으면 하는 게 몇 가지 있어. 특히 식사에 관해서 말이야」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「まず──」"
translation = "「먼저──」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「パスタは折るな！！」"
translation = "「파스타는 꺾지 마!!」"

[[dialogue]]
speaker = "unk"
original = "イタリア人のこだわり！"
translation = "이탈리아인의 고집!"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「当然よ。あんただって、フライにされた寿司が出てきたら思うところあるでしょ」"
translation = "「당연하지. 너도 튀김이 된 초밥이 나오면 할 말이 생길 거 아냐」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「この国の食事のレベルは高いと思うし、美味しいイタリア料理だってあるわ。それでも気になることはあるのよ」"
translation = "「이 나라의 식사 수준은 높다고 생각하고 맛있는 이탈리아 요리도 있어. 그래도 신경 쓰이는 건 있다구」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「さっきも言った通り、パスタは折らない！」"
translation = "「아까도 말했듯이 파스타는 꺾지 않기!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「というかパスタじゃなくてスパゲッティでしょ。フェットチーネとかリガトーニとかいろいろなパスタの種類があるのに、スパゲッティのことをパスタって呼ぶのどうかと思うわ」"
translation = "「그보다 파스타가 아니라 스파게티잖아. 페투치네나 리가토니같이 여러 종류의 파스타가 있는데 스파게티를 파스타라고 부르는 건 좀 아니라고 봐」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「カルボナーラにはベーコンじゃなくてグアンチャーレ！\u3000グアンチャーレってのは、豚の頬肉の塩漬けのことよ」"
translation = "「카르보나라에는 베이컨이 아니라 관찰레! 관찰레라는 건 돼지 뺨 살을 소금에 절인 걸 말해」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「それに生クリームも使わない！\u3000チーズと卵！\u3000そして本物はペコリーノロマーノを使うの。羊の乳で作ったチーズね」"
translation = "「거기에 생크림도 안 써! 치즈와 달걀! 그리고 진짜는 페코리노 로마노를 써. 양젖으로 만든 치즈지」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あとピザとピッツァは別物！」"
translation = "「그리고 피자와 피초는 다른 거야!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「そしてケチャップは邪道！\u3000ナポリタンは邪教！」"
translation = "「그리고 케첩은 사도! 나폴리탄은 이교!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あたしはあれをスパゲッティとは認めない！！\u3000たとえ美味しくても別物！！\u3000いいわね？」"
translation = "「난 그걸 스파게티라고 인정 안 해!! 설령 맛있어도 다른 거라구!! 알겠어?」"

[[dialogue]]
speaker = "unk"
original = "わかった"
translation = "알았어"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「わかればいいのよ」"
translation = "「알면 됐어」"

[[dialogue]]
speaker = "unk"
original = "じゃあ本場のイタリア料理を教えて"
translation = "그럼 본토의 이탈리아 요리를 가르쳐줘"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「え──？」"
translation = "「에──?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ええっと……それは無理かも……」"
translation = "「에 그러니까…… 그건 무리일지도……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「偉そうに言っちゃったけど、特別料理が得意なわけじゃないし、自分で作れるわけじゃないのよね……あと手に入りにくい材料もあるし」"
translation = "「거창하게 말은 했지만 특별히 요리를 잘하는 건 아니고 직접 만들 줄 아는 건 아니거든……. 구하기 힘든 재료도 있고」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「え？\u3000一緒に作ってみる……？\u3000それならできるかもしれないわね……」"
translation = "「어? 같이 만들어 보자구……? 그거라면 가능할지도 모르겠네……」"

[[dialogue]]
speaker = "unk"
original = "それから数日後。"
translation = "그러고 며칠 뒤."

[[dialogue]]
speaker = "unk"
original = "サランにも協力してもらって本場イタリアの食材を揃え、２人で料理を作ることになった。"
translation = "사란의 협조도 얻어 본토 이탈리아의 식재료를 갖추고 둘이서 요리를 만들게 되었다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「さすがにピッツァは釜がないと作れないし、カルボナーラにしましょ」"
translation = "「역시 피초는 화덕이 없으면 못 만드니까 카르보나라로 하자」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「なんでウェディングフォームで料理するのかって？\u3000別にいいじゃない、減るものじゃなし」"
translation = "「왜 웨딩 폼으로 요리하냐구? 별 상관없잖아, 닳는 것도 아니고」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「それに……ちょっとは気分を味わいたいのよ。それくらい察しなさいっ」"
translation = "「게다가…… 조금은 분위기를 맛보고 싶단 말이야. 그 정도는 눈치 좀 채라구!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あ～もうこの話終わり！\u3000さっさと始めるわよ！」"
translation = "「아~ 정말 이 이야기는 끝! 얼른 시작하자!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「材料はグアンチャーレ、卵、ペコリーノロマーノ、ブラックペッパー……以上！\u3000余計なものは入れないわよ」"
translation = "「재료는 관찰레, 달걀, 페코리노 로마노, 블랙 페퍼…… 끝! 불필요한 건 안 넣을 거야」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「カルボナーラはショートパスタで作る時もあるけど、今日はスパゲッティにするわ」"
translation = "「카르보나라는 숏 파스타로 만들 때도 있지만 오늘은 스파게티로 할게」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「まずはスパゲッティを茹でましょう。もちろん折らずに茹でられる鍋を使ってね」"
translation = "「우선 스파게티를 삶자. 물론 꺾지 않고 삶을 수 있는 냄비를 써서 말이야」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「その間にグアンチャーレをフライパンで焼いてカリカリにして……あ、ソースはあんたがお願い。ペコリーノと卵黄を混ぜるの」"
translation = "「그사이에 관찰레를 프라이팬에 구워서 바삭하게 만들고…… 아, 소스는 네가 부탁해. 페코리노랑 노른자를 섞는 거야」"

[[dialogue]]
speaker = "unk"
original = "スパゲッティが茹で上がってきたら、少量の茹で汁をフライパンに入れて、グアンチャーレから出てきた脂と乳化させる。"
translation = "스파게티가 다 삶아지면 적은 양의 면수를 프라이팬에 넣고 관찰레에서 나온 기름과 유화시킨다."

[[dialogue]]
speaker = "unk"
original = "そしてスパゲッティを入れて、最後にソースを投入する。"
translation = "그리고 스파게티를 넣고 마지막에 소스를 투입한다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ここで加熱しすぎると卵が固まっちゃうのよね……スパゲッティ全体に絡むように手早く混ぜて……」"
translation = "「여기서 너무 가열하면 달걀이 굳어버리거든……. 스파게티 전체에 엉기도록 재빨리 섞어서……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「盛り付けて、ブラックペッパーをかけたら完成ね！」"
translation = "「그릇에 담고 블랙 페퍼를 뿌리면 완성이야!」"

[[dialogue]]
speaker = "unk"
original = "すごく美味しそうだ"
translation = "정말 맛있어 보여"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「そうね……見た目はイタリアで食べたカルボナーラと同じだわ」"
translation = "「그렇네…… 겉보기에는 이탈리아에서 먹었던 카르보나라랑 똑같아」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「それじゃ……あ、あ～ん」"
translation = "「그럼…… 자, 아~앙」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「……何驚いてんのよ。恋人なんだからこれくらいするでしょ。せっかくこんなかっこしてるんだし」"
translation = "「……뭘 놀라고 그래. 연인이니까 이 정도는 하잖아. 모처럼 이런 차림을 하고 있고」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「それより味の方はどうなの？\u3000食べて聞かせてよ。……はい、あ～ん」"
translation = "「그보다 맛은 어때? 먹고 들려달라구. ……자, 아~앙」"

[[dialogue]]
speaker = "unk"
original = "すごく濃厚で美味しい！"
translation = "정말 진하고 맛있어!"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ふふ、それなら良かった。わざわざイタリアの食材を揃えた甲斐があったわね」"
translation = "「후후, 그렇다면 다행이네. 일부러 이탈리아 식재료를 공수한 보람이 있었어」"

[[dialogue]]
speaker = "unk"
original = "それじゃ俺からも……あ～ん"
translation = "그럼 나도…… 아~앙"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あ、あ～ん」"
translation = "「아, 아~앙」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ん～っ♪\u3000これよこれ！\u3000これぞ本場のカルボナーラよ！」"
translation = "「음~♪ 이거야 이거! 이것이야말로 본토의 카르보나라라구!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「それじゃもう一度……あ～ん。あたしが食べさせてあげてるんだから、味わって食べなさい」"
translation = "「그럼 다시 한번…… 아~앙. 내가 먹여주는 거니까 맛을 음미하며 먹으라구」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あたし１人でちゃんと作れるようになったら、また作ってあげる」"
translation = "「나 혼자서도 잘 만들 수 있게 되면 또 만들어 줄게」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「パスタも、ピッツァも、ドルチェも、あたしの故郷の味をたくさん教えてあげるんだから♪」"
translation = "「파스타도, 피초도, 돌체도, 내 고향의 맛을 잔뜩 가르쳐줄 테니까♪」"

