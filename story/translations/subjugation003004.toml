[[dialogue]]
speaker = "unk"
original = "翌日の放課後。アムとナミエルとスノーマンは流星学園の中庭に集まっていた。"
translation = "다음 날 방과 후. 아무와 나미엘, 스노맨은 유성 학원의 중정에 모여 있었다."

[[dialogue]]
speaker = "ナミエル"
original = "「それでアム先輩、スノーマンの体を作るということですが……」"
translation = "「그래서 아무 선배님, 스노맨의 몸을 만든다는 건……」"

[[dialogue]]
speaker = "アム"
original = "「うん！\u3000昨日言った通り、本物の雪を使って『雪だるま』を作ってあげるんだよ♪」"
translation = "「응! 어제 말한 대로, 진짜 눈을 사용해서 『눈사람』을 만들어주는 거야♪」"

[[dialogue]]
speaker = "ナミエル"
original = "「で、それを触媒として、霊を降ろすみたいにスノーマンが憑依すると……そんなこと可能なんですか？」"
translation = "「그걸 매개체로 해서, 영혼을 불러내듯 스노맨이 빙의한다…… 그런 게 가능한가요?」"

[[dialogue]]
speaker = "アム"
original = "「正直どうなるかはわからないけど、スノーマンと一緒に記念写真も撮りたいし、動かずに悩むよりは、とりあえず試してみようよ！」"
translation = "「솔직히 어떻게 될지는 모르겠지만, 스노맨이랑 같이 기념사진도 찍고 싶고, 가만히 고민하기보다는 일단 시도해 보자!」"

[[dialogue]]
speaker = "アム"
original = "「それに会長も言っていたけど、スノーマンの望みが叶うことで、もしかしたら記憶が戻るかもしれないじゃん？\u3000それなら一石二鳥だしね♪」"
translation = "「게다가 회장도 말했듯이, 스노맨의 소원이 이루어지면 어쩌면 기억이 돌아올지도 모르잖아? 그럼 일석이조고 말이야♪」"

[[dialogue]]
speaker = "スノーマン"
original = "「ボク、体を作ってもらえるなら、嬉しい！\u3000どんな体になるのかな？\u3000ワクワク♪」"
translation = "「나, 몸을 만들어준다면 기뻐! 어떤 몸이 될까? 두근두근♪」"

[[dialogue]]
speaker = "ナミエル"
original = "（ワクワクしているスノーマン、可愛い……）"
translation = "‘두근거려 하는 스노맨, 귀여워……’"

[[dialogue]]
speaker = "ナミエル"
original = "「――こほん。とりあえず、アム先輩の言っていることも、確かに一理ありますので、やってみましょう」"
translation = "「――크흠. 일단 아무 선배님이 하시는 말씀도 확실히 일리가 있으니, 해보도록 하죠.」"

[[dialogue]]
speaker = "ナミエル"
original = "「ですが、肝心の雪はどうするつもりですか？\u3000見ての通り、雪は全く降っていませんが……」"
translation = "「하지만 정작 중요한 눈은 어떻게 할 생각인가요? 보시다시피 눈은 전혀 내리지 않고 있습니다만……」"

[[dialogue]]
speaker = "アム"
original = "「それなら大丈夫！\u3000ＤＩＳＣで雪が積もっている場所はちゃんとリサーチしておいたから♪」"
translation = "「그거라면 괜찮아! DISC로 눈이 쌓여있는 장소는 이미 리서치해 뒀으니까♪」"

[[dialogue]]
speaker = "ナミエル"
original = "「は？\u3000積もっている場所って……」"
translation = "「하? 쌓여있는 장소라니……」"

[[dialogue]]
speaker = "アム"
original = "「――よいしょっと♪\u3000さあさあ、ナミエル、スノーマン！\u3000ソリに乗った乗った～♪\u3000行っくよ～？」"
translation = "「――영차♪ 자자, 나미엘, 스노맨! 썰매에 타라 타~♪ 간다~?」"

[[dialogue]]
speaker = "ナミエル"
original = "「えっ、足元にソリが召喚されて……？\u3000先輩、ちょっと待っ――」"
translation = "「엣, 발밑에 썰매가 소환되어……? 선배님, 잠깐 기다――」"

[[dialogue]]
speaker = "アム"
original = "「トナカイアム、出発進行～～っ♪」"
translation = "「루돌프 아무, 출발 진행~~♪」"

[[dialogue]]
speaker = "ナミエル"
original = "「きゃあぁっ！？」"
translation = "「꺄아악!?」"

[[dialogue]]
speaker = "スノーマンL"
original = "「わ～♪\u3000アム、北風よりも速い速～い♪」"
translation = "「와~♪ 아무, 북풍보다 빨라 빨라~♪」"

[[dialogue]]
speaker = "アム"
original = "「ふっふっふ～♪\u3000これがあたしのクリスマスフォームの能力だよ！\u3000ヒトや物をソリに乗せて、それがたとえどんなに重くても、無重力にして引っ張ることができるんだ～♪」"
translation = "「훗훗후~♪ 이게 내(あたし) 크리스마스 폼의 능력이야! 사람이나 물건을 썰매에 태우면, 그게 설령 아무리 무겁더라도 무중력으로 만들어서 끌 수 있다구~♪」"

[[dialogue]]
speaker = "ナミエル"
original = "「――先輩！\u3000アム先輩ってば！」"
translation = "「――선배님! 아무 선배님이라니까요!」"

[[dialogue]]
speaker = "アム"
original = "「ん？\u3000ナミエル、どうかした？」"
translation = "「응? 나미엘, 왜 그래?」"

[[dialogue]]
speaker = "ナミエル"
original = "「まさか、雪の積もっている地方まで向かう気なんですか！？」"
translation = "「설마 눈이 쌓여있는 지방까지 갈 생각인가요!?」"

[[dialogue]]
speaker = "アム"
original = "「うん！\u3000そうだけど～？」"
translation = "「응! 그런데~?」"

[[dialogue]]
speaker = "ナミエル"
original = "「別にそこまでしなくても、氷星術が得意な星騎士にお願いしてみるとかあるんじゃ！？\u3000たとえば、新星星徒会のサーシャ先輩にとか！」"
translation = "「굳이 그렇게까지 안 해도, 빙성술이 특기인 성기사(星騎士)에게 부탁해 본다거나 하는 방법이 있잖아요!? 예를 들어, 신성 성도회의 사샤 선배님이라든가!」"

[[dialogue]]
speaker = "アム"
original = "「はっ！\u3000その手があったか！」"
translation = "「핫! 그런 방법이 있었나!」"

[[dialogue]]
speaker = "unk"
original = "空中で急停止するアム。"
translation = "공중에서 급정거하는 아무."

[[dialogue]]
speaker = "ナミエル"
original = "「アム先輩って多分、頭よりも先に体が動くタイプですよね……」"
translation = "「아무 선배님은 아마 머리보다 몸이 먼저 움직이는 타입이시군요……」"

[[dialogue]]
speaker = "アム"
original = "「いや～、それほどでも～♪\u3000反射神経には自信があるからね！」"
translation = "「에이~ 그 정도까지는~♪ 반사 신경에는 자신 있으니까 말이야!」"

[[dialogue]]
speaker = "ナミエル"
original = "「いや、褒めるつもりで言ったわけではないんですけど……」"
translation = "「아니, 칭찬하려고 한 말이 아닙니다만……」"

[[dialogue]]
speaker = "unk"
original = "それからすぐに学園へ引き返した２人は、サーシャに頼みに行き、雪だるま作成に必要な分の雪を出してもらえることになった。"
translation = "그 후 바로 학원으로 되돌아온 두 사람은 사샤에게 부탁하러 갔고, 눈사람 제작에 필요한 만큼의 눈을 제공받게 되었다."

[[dialogue]]
speaker = "サーシャ"
original = "「あら～♪\u3000お姉ちゃん、もちろん協力するわ～♪」"
translation = "「어머나~♪ 언니가 당연히 협력해야지~♪」"

[[dialogue]]
speaker = "アム"
original = "「というわけで、雪を確保して、雪だるまを作り始めたのはいいんだけど……」"
translation = "「그렇게 해서 눈을 확보하고 눈사람을 만들기 시작한 것까지는 좋은데……」"

[[dialogue]]
speaker = "ナミエル"
original = "「ふむ……」"
translation = "「흠……」"

[[dialogue]]
speaker = "unk"
original = "ナミエルが顎を擦りながら、見た目も大きさもスノーマンそっくりに作り上げた雪だるまを、真剣な眼差しで見つめている。"
translation = "나미엘이 턱을 문지르며, 겉모습도 크기도 스노맨과 똑같이 만들어진 눈사람을 진지한 눈빛으로 바라보고 있다."

[[dialogue]]
speaker = "アム"
original = "「ね、ねぇ、スノーマン？\u3000めっちゃいい出来だと思うよね？」"
translation = "「저, 저기, 스노맨? 엄청 잘 만들어진 것 같지?」"

[[dialogue]]
speaker = "スノーマン"
original = "「うん、ボクにそっくりさんだと思う！」"
translation = "「응, 나랑 똑 닮은 것 같아!」"

[[dialogue]]
speaker = "アム"
original = "「だってさ、ナミエル！\u3000だから――」"
translation = "「그렇대, 나미엘! 그러니까――」"

[[dialogue]]
speaker = "ナミエル"
original = "「いえ、これではダメです。――えいっ」"
translation = "「아니요, 이걸로는 안 됩니다. ――에잇」"

[[dialogue]]
speaker = "unk"
original = "――グシャアァッ！！"
translation = "――콰직!!"

[[dialogue]]
speaker = "アム"
original = "「うわあああぁぁぁっ！？\u3000またぺしゃんこにされたぁっ！？」"
translation = "「으와아아아악!? 또 뭉개버렸어어억!?」"

[[dialogue]]
speaker = "unk"
original = "ナミエルはスコップを勢いよく振り下ろして、雪だるまを完全粉砕してしまった。"
translation = "나미엘은 삽을 힘껏 내리쳐서 눈사람을 완전히 분쇄해 버렸다."

[[dialogue]]
speaker = "スノーマン"
original = "「ぼ、ボクのそっくりさん……また死んだ……！」"
translation = "「나, 나랑 닮은 애가…… 또 죽었어……!」"

[[dialogue]]
speaker = "アム"
original = "「もう完成でもいいくらい、いい出来だったのに……！」"
translation = "「거의 완성이라고 해도 될 정도로 잘 만들어졌었는데……!」"

[[dialogue]]
speaker = "ナミエル"
original = "「いいえ、残念ながらダメです。左右の目のバランスが本物のスノーマンに比べ、数ミリずれていました。あれではスノーマンの可愛さを再現できていません」"
translation = "「아니요, 아쉽지만 안 됩니다. 좌우 눈의 밸런스가 진짜 스노맨에 비해 수 밀리미터 어긋나 있었어요. 저래서는 스노맨의 귀여움을 재현할 수 없습니다.」"

[[dialogue]]
speaker = "アム"
original = "「それだったら、ちょっと修正すればよくない！？\u3000全部壊してやり直す必要ある！？」"
translation = "「그럴 거면 살짝 수정하면 되잖아!? 전부 부수고 다시 할 필요가 있어!?」"

[[dialogue]]
speaker = "ナミエル"
original = "「アム先輩、甘いです。目が数ミリずれたまま最後の段階まで気づかなかったということは、全体のバランスのどこかに小さな歪みがあったということ」"
translation = "「아무 선배님, 무릅니다. 눈이 수 밀리미터 어긋난 채로 마지막 단계까지 눈치채지 못했다는 것은, 전체적인 밸런스 어딘가에 작은 왜곡이 있었다는 뜻.」"

[[dialogue]]
speaker = "ナミエル"
original = "「もし完璧な可愛さの黄金比に辿り着けているならば、細かい調整など必要なく、パズルのピースがぴったりハマるように、最後のズレが自然となくなるはずなんです」"
translation = "「만약 완벽한 귀여움의 황금비에 도달했다면, 세밀한 조정 따위 필요 없이 퍼즐 조각이 딱 들어맞듯 마지막 어긋남이 자연스럽게 사라졌을 겁니다.」"

[[dialogue]]
speaker = "アム"
original = "「い、言ってることが高度過ぎて、全然わからない……！」"
translation = "「하, 하는 말이 너무 고차원적이라 전혀 모르겠어……!」"

[[dialogue]]
speaker = "unk"
original = "それから、ナミエルは数多の創造と破壊を繰り返し、ついに雪だるまを完成させる。"
translation = "그 후, 나미엘은 수많은 창조와 파괴를 반복한 끝에 마침내 눈사람을 완성시킨다."

[[dialogue]]
speaker = "ナミエル"
original = "「できました……！\u3000これで寸分の狂いもなく、完璧にそっくりです！」"
translation = "「되었습니다……! 이제 한 치의 오차도 없이 완벽하게 똑같습니다!」"

[[dialogue]]
speaker = "アム"
original = "「お、おぉう。素晴らしい出来なんじゃないかな、うん……！」"
translation = "「오, 오오. 훌륭한 결과물이네, 응……!」"

[[dialogue]]
speaker = "ナミエル"
original = "「我ながら傑作……！\u3000可愛いの神髄がちょっと垣間見れた気がします……！」"
translation = "「내 스스로도 걸작……! 귀여움의 진수를 살짝 엿본 것 같은 기분이 듭니다……!」"

[[dialogue]]
speaker = "アム"
original = "「ソダネ、スゴイネ～、アハハハ……」"
translation = "「그으래, 대단하네에~, 아하하하……」"

[[dialogue]]
speaker = "アム"
original = "（途中からあたしにはもう、何がどう変わったのか、全然わからなかったけども……！）"
translation = "‘중간부터 나(あたし)한테는 이제 뭐가 어떻게 변한 건지 전혀 몰랐었지만 말이야……!’"

[[dialogue]]
speaker = "アム"
original = "「と、とりあえず完成したし、あとはスノーマンがこの雪だるまと融合できれば、目標達成ってことだよね？」"
translation = "「어, 어쨌든 완성됐으니까, 이제 스노맨이 이 눈사람이랑 융합할 수 있으면 목표 달성이네?」"

[[dialogue]]
speaker = "スノーマン"
original = "「うんっ、ボク、試してみる……！」"
translation = "「응, 나, 시도해 볼게……!」"

[[dialogue]]
speaker = "unk"
original = "スノーマンは頷くと、幽霊が憑依するみたいに、すっと雪だるまに吸い込まれていき――"
translation = "스노맨은 고개를 끄덕이더니, 유령이 빙의하듯 슥 하고 눈사람 속으로 빨려 들어갔고――"

[[dialogue]]
speaker = "スノーマンL"
original = "「――できた……！\u3000これでボク、本物の雪だるまの体になった♪」"
translation = "「――됐다……! 이제 나, 진짜 눈사람 몸이 됐어♪」"

[[dialogue]]
speaker = "アム"
original = "「どれどれ～、ＤＩＳＣのカメラを起動して……本当だ！\u3000スノーマン、カメラに映るようになってるよ！」"
translation = "「어디 보자~, DISC 카메라를 켜서…… 정말이다! 스노맨, 카메라에 찍히게 됐어!」"

[[dialogue]]
speaker = "ナミエル"
original = "「やりましたね……！\u3000完璧な可愛さを追求した甲斐があります」"
translation = "「해냈군요……! 완벽한 귀여움을 추구한 보람이 있습니다.」"

[[dialogue]]
speaker = "アム"
original = "「それじゃあ、ナミエル、スノーマン！\u3000このまま３人で記念撮影をしちゃおう♪」"
translation = "「그럼 나미엘, 스노맨! 이대로 셋이서 기념 촬영하자♪」"

[[dialogue]]
speaker = "unk"
original = "アムはそれから、２人を近くに抱き寄せて、カメラの画角内に収まるようにする。"
translation = "아무는 그러고 나서 두 사람을 가까이 끌어당겨 카메라 앵글 안에 들어오게 한다."

[[dialogue]]
speaker = "ナミエル"
original = "「ちょっ……アム先輩！\u3000くっ付き過ぎです！」"
translation = "「잠깐…… 아무 선배님! 너무 붙으셨어요!」"

[[dialogue]]
speaker = "アム"
original = "「物理的に離れられないんだから、仕方ないじゃん♪\u3000ほら、スノーマンも、もうちょっと寄って寄って～♪」"
translation = "「물리적으로 떨어질 수 없으니까 어쩔 수 없잖아♪ 자, 스노맨도 좀 더 붙어 붙어~♪」"

[[dialogue]]
speaker = "スノーマンL"
original = "「うんっ♪」"
translation = "「응♪」"

[[dialogue]]
speaker = "アム"
original = "「あっ、冷たっ！？\u3000スノーマン、本物の雪になったから、めっちゃ冷た～い！」"
translation = "「앗, 차가워!? 스노맨, 진짜 눈이 됐으니까 엄청 차가워~!」"

[[dialogue]]
speaker = "アム"
original = "「って、あっ！？\u3000間違ってタップしちゃった！\u3000今の絶対、カッコよくない変な顔で写ってるからやり直しで～！」"
translation = "「어, 앗!? 실수로 탭해버렸다! 지금 분명 멋있지 않은 이상한 얼굴로 찍혔을 테니까 다시 찍자~!」"

[[dialogue]]
speaker = "ナミエル"
original = "「えっ、そうですか？\u3000私は別にそこまで気にしなくてもと思いますが……」"
translation = "「엣, 그런가요? 저는 딱히 그렇게까지 신경 쓰지 않아도 된다고 생각합니다만……」"

[[dialogue]]
speaker = "アム"
original = "「いや、絶対変顔してるし！\u3000――ほらぁ！」"
translation = "「아니, 분명 이상한 표정 짓고 있을 거야! ――거 봐!」"

[[dialogue]]
speaker = "unk"
original = "ＤＩＳＣの写真を見せて喚くアム。"
translation = "DISC 사진을 보여주며 소란을 피우는 아무."

[[dialogue]]
speaker = "ナミエル"
original = "「……ぷっ、ふふっ……！\u3000――いえ、これで行きましょう」"
translation = "「……풉, 후훗……! ――아니요, 이걸로 가죠.」"

[[dialogue]]
speaker = "アム"
original = "「いや、いま笑ったよね！？」"
translation = "「아니, 방금 웃었지!?」"

[[dialogue]]
speaker = "スノーマン"
original = "「ふふっ、写真に写ってるアムの顔、面白い……！」"
translation = "「후훗, 사진에 찍힌 아무 얼굴, 재밌어……!」"

[[dialogue]]
speaker = "アム"
original = "「スノーマンも笑ってるし！\u3000やっぱり、やり直し～～っ！！」"
translation = "「스노맨까지 웃고 있어! 역시 다시 찍어어어!!」"

[[dialogue]]
speaker = "unk"
original = "そんな風にドタバタしつつも――その後、ちゃんと無事に記念写真を撮ることができた３人なのだった。"
translation = "그렇게 소동을 피우면서도―― 그 후 무사히 기념사진을 찍을 수 있었던 세 사람이었다."

