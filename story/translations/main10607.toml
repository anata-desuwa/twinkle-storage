[[dialogue]]
speaker = "unk"
original = "第７話,第７話『そろそろ周知の事実』,B"
translation = "제7화, 제7화 『슬슬 주지의 사실』, B"

[[dialogue]]
speaker = "マトイ"
original = "「──って、そんなことがあって……」"
translation = "「──라면서, 그런 일이 있어서……」"

[[dialogue]]
speaker = "セーラ"
original = "「あはは、うける。それですりこぎ棒もらったんだ？」"
translation = "「아하하, 웃겨. 그래서 절구공이를 받은 거야?」"

[[dialogue]]
speaker = "ルリエル"
original = "「でもでも、面白いです！\u3000クラウディアさんらしいですね！」"
translation = "「그래도 그래도, 재미있어요! 클라우디아 씨답네요!」"

[[dialogue]]
speaker = "ユウリ"
original = "「実際、知らなかったしな。あの姫さんの誕生日がクリスマスなんて……」"
translation = "「실제로 몰랐으니까 말이야. 그 공주님 생일이 크리스마스라니……」"

[[dialogue]]
speaker = "セーラ"
original = "「おめでたい日が被っちゃうと、逆に困ることもあるんだね～」"
translation = "「경사스러운 날이 겹치면 반대로 곤란한 일도 생기는구나~」"

[[dialogue]]
speaker = "マトイ"
original = "「そうみたい。けど、ちょっとだけ気持ちわかるかも」"
translation = "「그런가 봐. 하지만 조금은 기분을 알 것 같기도 해」"

[[dialogue]]
speaker = "ルリエル"
original = "「いいなー。わたしもクラウディアサンタに会ったら、何かもらえちゃうでしょうか！」"
translation = "「좋겠다~. 저도 클라우디아 산타를 만나면 뭔가를 받을 수 있을까요!」"

[[dialogue]]
speaker = "マトイ"
original = "「それじゃ、私はそろそろ戻るね──」"
translation = "「그럼 난 슬슬 돌아갈게──」"

[[dialogue]]
speaker = "クラウディア"
original = "「──頼もう！」"
translation = "「──이리 오너라!」"

[[dialogue]]
speaker = "ユウリ"
original = "「うお、噂をすりゃあ」"
translation = "「우와, 호랑이도 제 말 하면 온다더니」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「お邪魔しま～す」"
translation = "「실례합니당~」"

[[dialogue]]
speaker = "ユウリ"
original = "「一応突っ込んどくと、ここは外部のやつが勝手に入っていい場所じゃないからな……？」"
translation = "「일단 지적해두자면, 여기는 외부인이 마음대로 들어와도 되는 곳이 아니거든……?」"

[[dialogue]]
speaker = "クラウディア"
original = "「まあまあ。細かいことは気にするでない」"
translation = "「허허. 세세한 건 신경 쓰지 마라」"

[[dialogue]]
speaker = "クラウディア"
original = "「１２月２５日は余の記念すべき誕生日！\u3000よって、お主たちにサンタより早くプレゼントを届けてやろう！」"
translation = "「12월 25일은 짐의 기념비적인 생일! 따라서 네놈들에게 산타보다 빠르게 선물을 전해주러 왔노라!」"

[[dialogue]]
speaker = "ルリエル"
original = "「おお、待ってました！」"
translation = "「오오, 기다리고 있었어요!」"

[[dialogue]]
speaker = "クラウディア"
original = "「ほう、待ちわびていたとな？」"
translation = "「호오, 고대하고 있었다고?」"

[[dialogue]]
speaker = "ルリエル"
original = "「はい！\u3000それはもちろん！」"
translation = "「네! 그럼요 당연하죠!」"

[[dialogue]]
speaker = "クラウディア"
original = "「ちぇちゅーりえよ。いよいよ余の誕生日も、人間界に浸透してきたようであるぞ」"
translation = "「체츄리에여. 드디어 짐의 생일도 인간계에 침투한 모양이로다」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「世界に広がる日も遠くないね♪」"
translation = "「세계로 퍼질 날도 멀지 않았네♪」"

[[dialogue]]
speaker = "クラウディア"
original = "「知っていたなら話は早い。お主たち、希望はなんだ？」"
translation = "「알고 있다면 이야기가 빠르지. 네놈들, 희망하는 게 무엇이냐?」"

[[dialogue]]
speaker = "ルリエル"
original = "「はいはい！\u3000わたし、ここでみんなと遊ぶための新作ボードゲームが欲しいです！」"
translation = "「네네! 저, 여기서 모두와 놀기 위한 신작 보드게임을 갖고 싶어요!」"

[[dialogue]]
speaker = "ユウリ"
original = "「あたしは──そうだ、駅前で売ってたクリスマス限定マカロン！」"
translation = "「나는── 맞다, 역 앞에서 팔던 크리스마스 한정 마카롱!」"

[[dialogue]]
speaker = "セーラ"
original = "「うちはね、美顔スチーマー♪」"
translation = "「나는 말이야, 미안 스티머♪」"

[[dialogue]]
speaker = "クラウディア"
original = "「すちーまー？\u3000ってなんだ？\u3000何に使うのだ？」"
translation = "「스티머? 라는 게 무엇이냐? 어디에 쓰는 것이냐?」"

[[dialogue]]
speaker = "セーラ"
original = "「お肌に蒸気をあてる機械のことだよ」"
translation = "「피부에 증기를 쬐는 기계야」"

[[dialogue]]
speaker = "クラウディア"
original = "「肌なんか蒸してどうするのだ」"
translation = "「피부 따위를 쪄서 어쩌려는 것이냐」"

[[dialogue]]
speaker = "セーラ"
original = "「ミストがお肌にいい～♪\u3000みたいな」"
translation = "「미스트가 피부에 좋다~♪ 같은 느낌?」"

[[dialogue]]
speaker = "クラウディア"
original = "「湿気が欲しいなら、風呂にでも浸かればよいではないか」"
translation = "「습기를 원한다면 목욕물에라도 몸을 담그면 되지 않느냐」"

[[dialogue]]
speaker = "セーラ"
original = "「うーん……でも、リラックス効果もあったりとか」"
translation = "「으음…… 하지만 리프레시 효과도 있고 해서」"

[[dialogue]]
speaker = "クラウディア"
original = "「余にはまったく理解できぬぞ！\u3000そもそも肌など放っておいてもすべすべのままではないか──」"
translation = "「짐에게는 도무지 이해가 안 되는구나! 애초에 피부 따위 내버려 둬도 매끈매끈한 채이지 않느냐──」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「クラウディア様、話が脱線してます」"
translation = "「클라우디아 님, 이야기가 샜어」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「それに、後半の発言は年頃の女子たちから反感を買いそうな予感」"
translation = "「게다가 후반 발언은 또래 여자애들한테 반감을 살 것 같은 예감이 들어」"

[[dialogue]]
speaker = "クラウディア"
original = "「おっと、しまった。プレゼントを『けんえつ』するなどサンタのすることではないな」"
translation = "「앗, 실수했도다. 선물을 『검열』하는 건 산타가 할 짓이 아니지」"

[[dialogue]]
speaker = "クラウディア"
original = "「ボードゲームに、マカロンに、すちーまーだな。任せよ。お主らの希望を叶えてやる」"
translation = "「보드게임에 마카롱에 스티머로구나. 맡겨라. 네놈들의 희망을 이루어 주마」"

[[dialogue]]
speaker = "ルリエル"
original = "「おお、超期待です！」"
translation = "「오오, 완전 기대돼요!」"

[[dialogue]]
speaker = "クラウディア"
original = "「そーれ……メリークラウディアバースデ～！！」"
translation = "「자아…… 메리 클라우디아 버스데이~!!」"

[[dialogue]]
speaker = "ルリエル"
original = "「これは……えっと、すごろく？」"
translation = "「이건…… 저기, 주사위 놀이?」"

[[dialogue]]
speaker = "ユウリ"
original = "「あたしはマカロニだ」"
translation = "「나는 마카로니네」"

[[dialogue]]
speaker = "セーラ"
original = "「せいろ……確かに蒸すものだけど」"
translation = "「찜통…… 확실히 찌는 물건이긴 한데」"

[[dialogue]]
speaker = "クラウディア"
original = "「ちぇちゅーりえよ。このプレゼントのグレード、もうちょっと上げられんのか？」"
translation = "「체츄리에여. 이 선물의 등급, 좀 더 올릴 수는 없는 것이냐?」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「今の技術では難しいねえ。そもそもほら、相手の願いを聞き入れるだけですごい発明なんだよ？」"
translation = "「지금 기술로는 어렵네용. 애초에 봐용, 상대의 소원을 들어주는 것만으로도 대단한 발명이라구?」"

[[dialogue]]
speaker = "クラウディア"
original = "「それはそうかもしれぬが……」"
translation = "「그건 그럴지도 모르겠다만……」"

[[dialogue]]
speaker = "ルリエル"
original = "「ま、まあ……これもお正月にみんなで遊べますから！」"
translation = "「뭐, 뭐어…… 이것도 설날에 다 같이 놀 수 있으니까요!」"

[[dialogue]]
speaker = "ユウリ"
original = "「あ、ああ。くれるってんなら感謝するしかないぜ」"
translation = "「아, 아아. 준다면 감사할 수밖에 없지」"

[[dialogue]]
speaker = "セーラ"
original = "「そうそう。うちもこれで中華まん作ってみようかな……って思うし」"
translation = "「그래그래. 나도 이걸로 찐빵이라도 만들어 볼까…… 싶고」"

[[dialogue]]
speaker = "ユウリ"
original = "「マカロンとマカロニは、語感が似てるだけって気もするけど──ありがとな。クラウディア」"
translation = "「마카롱이랑 마카로니는 어감이 비슷할 뿐인 기분도 들지만── 고마워, 클라우디아」"

[[dialogue]]
speaker = "クラウディア"
original = "「うーん……あまり心からの感謝とは思えぬ」"
translation = "「으음…… 별로 진심 어린 감사로는 생각되지 않는구나」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「まあまあ、ホーリー・ベルが出したんだからきっと正解だよ。本人たちは気づいてなくても」"
translation = "「에이, 홀리 벨이 내놓은 거니까 분명 정답일 거야. 본인들은 깨닫지 못했어도」"

[[dialogue]]
speaker = "ツェツィーリエ"
original = "「顧客が本当に欲しかったものは、ドリルじゃなくて穴だったんだ──ってね」"
translation = "「고객이 정말로 원했던 건 드릴이 아니라 구멍이었다── 는 거지」"

[[dialogue]]
speaker = "ルリエル"
original = "「おお、なるほど！」"
translation = "「오오, 과연!」"

[[dialogue]]
speaker = "ユウリ"
original = "「どういうことなんだよ……」"
translation = "「무슨 소리야 그게……」"

[[dialogue]]
speaker = "クラウディア"
original = "「まあよい。これでお主たちも覚えたであろう」"
translation = "「뭐 됐다. 이걸로 네놈들도 외웠겠지」"

[[dialogue]]
speaker = "クラウディア"
original = "「１２月２５日といえば余の誕生日！\u3000お主ら星徒会も、流星学園中にこの事実を広めるのだぞ～！」"
translation = "「12월 25일이라 하면 짐의 생일! 네놈들 성도회도 유성학원 전체에 이 사실을 퍼뜨리도록 하라~!」"

