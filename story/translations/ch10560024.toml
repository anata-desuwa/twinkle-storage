[[dialogue]]
speaker = "unk"
original = "第４話,ブルーハワイのかき氷,P"
translation = "제4화, 블루 하와이 빙수, P"

[[dialogue]]
speaker = "unk"
original = "今日はいつもと違って、プライベートビーチでアムとデートをすることにした。というのも──"
translation = "오늘은 평소와 달리, 프라이빗 비치에서 아무와 데이트를 하기로 했다. 그 이유는──"

[[dialogue]]
speaker = "アム"
original = "「ん、ちゅっ……ちゅぅ、ちゅっ……<emoji=heart04>」"
translation = "「음, 쪽…… 쪼옥, 쪽……<emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「えへへ<emoji=heart04>\u3000誰もいないってわかってはいるけど、普段賑わってる浜辺でキスするのってドキドキするね……♪」"
translation = "「에헤헤<emoji=heart04> 아무도 없다는 건 알고 있지만, 평소 북적이는 해변에서 키스하는 건 두근거리네……♪」"

[[dialogue]]
speaker = "アム"
original = "「でも驚いちゃった。会長が、リップル先輩にプライベートビーチをお願いした～って聞いた時から、ちょっぴり予想はしてたけど……」"
translation = "「하지만 놀랐어. 회장이 리플 선배한테 프라이빗 비치를 부탁했다~라고 들었을 때부터 조금은 예상했지만……」"

[[dialogue]]
speaker = "アム"
original = "「まさかビーチに来て、いきなりキスされると思ってなかったよ」"
translation = "「설마 비치에 오자마자 갑자기 키스당할 줄은 몰랐어.」"

[[dialogue]]
speaker = "unk"
original = "あんまりいちゃいちゃしてくれないから"
translation = "별로 꽁냥거려주지 않으니까."

[[dialogue]]
speaker = "unk"
original = "アムは周りに人がいると"
translation = "아무는 주변에 사람이 있으면."

[[dialogue]]
speaker = "アム"
original = "「そ、そりゃそうでしょ？\u3000人前で腕を組んでべたべたしたり、キスとかしてたらバカップルじゃん……そういうのってカッコよくないもん」"
translation = "「그, 그건 당연하잖아? 사람들 앞에서 팔짱 끼고 달라붙거나, 키스 같은 거 하면 바보 커플이잖아…… 그런 건 멋없단 말이야.」"

[[dialogue]]
speaker = "アム"
original = "「でもわざわざビーチを貸し切ってまで、あたしといちゃいちゃしたいって思ってくれたのは素直に嬉しいし……」"
translation = "「하지만 일부러 비치를 빌리면서까지 나랑 꽁냥거리고 싶다고 생각해준 건 솔직히 기쁘고……」"

[[dialogue]]
speaker = "アム"
original = "「うん、今日この場所では、会長のリクエストは断らないよ？」"
translation = "「응, 오늘 이곳에서는 회장의 리퀘스트는 거절하지 않을게?」"

[[dialogue]]
speaker = "アム"
original = "「ん、ちゅぅー……ちゅ、ちゅぅ、んちゅっ……へへ～っ<emoji=heart04>」"
translation = "「음, 쪼오옥…… 쪽, 쪼옥, 음쪽…… 헤헤~<emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「リゾート結界の外でデートする時は、けっこーガマンしてるからかなぁ……反動来ちゃってるかも……あ、会長も？」"
translation = "「리조트 결계 밖에서 데이트할 때는 꽤 참고 있으니까 그런가…… 반동이 와버린 걸지도…… 아, 회장도?」"

[[dialogue]]
speaker = "アム"
original = "「気が合うね、会長♪\u3000じゃあもっとしよー……ん、ちゅー<emoji=heart04>」"
translation = "「마음이 잘 맞네, 회장♪ 그럼 더 하자…… 음, 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「にひひ<emoji=heart04>\u3000今日はいっぱいキスして、いっぱい遊ぼうね<emoji=heart04>」"
translation = "「니히히<emoji=heart04> 오늘은 잔뜩 키스하고, 잔뜩 놀자<emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「プライベートビーチって人の目がないのはいいけど、海の家でご飯を買えないのが難点だよね～」"
translation = "「프라이빗 비치는 남의 눈이 없는 건 좋은데, 바다의 집에서 밥을 살 수 없는 게 난점이네~」"

[[dialogue]]
speaker = "アム"
original = "「でも会長に、飲食店のアルバイト経験があって助かったかも。あたし、家庭科はあんまりだからさー」"
translation = "「그래도 회장한테 음식점 아르바이트 경험이 있어서 다행이었을지도. 난 가사 과목은 별로니까 말이야-」"

[[dialogue]]
speaker = "アム"
original = "「んー、ソースの美味しそうな匂い！\u3000リップル先輩とどっちが焼きそば作るのが上手か、あたしが判定してあげる！」"
translation = "「음- 소스의 맛있는 냄새! 리플 선배랑 어느 쪽이 야키소바를 더 잘 만드는지 내가 판정해줄게!」"

[[dialogue]]
speaker = "unk"
original = "アムもやってみる？"
translation = "아무도 해볼래?"

[[dialogue]]
speaker = "アム"
original = "「んー……ちょっと興味はあるんだけど、やめとく。持ってきてる食材で失敗したら悲惨だし……」"
translation = "「음-…… 조금 흥미는 있지만, 그만둘래. 가져온 식재료로 실패하면 비참하고……」"

[[dialogue]]
speaker = "アム"
original = "「その代わり、あたしはデザート作るよ！\u3000氷と、かき氷機は持ってきたから！\u3000ふっふーん、これなら失敗しないもんね！」"
translation = "「그 대신에 난 디저트 만들게! 얼음이랑 빙수기는 가져왔으니까! 후후─ㄴ, 이거라면 실패 안 한다고!」"

[[dialogue]]
speaker = "アム"
original = "「会長は何味にする？\u3000ブルーハワイ……うん、定番だね。あたしはイチゴにしよっと！」"
translation = "「회장은 무슨 맛으로 할래? 블루 하와이…… 응, 단골이네. 난 딸기로 해야지!」"

[[dialogue]]
speaker = "アム"
original = "「ご飯食べ終わったらどうしよっかなあ。泳ぐのもいいし、パラソルの下でまったりするのもいいけど……」"
translation = "「밥 다 먹으면 뭐 할까나. 수영하는 것도 좋고, 파라솔 아래서 느긋하게 있는 것도 좋지만……」"

[[dialogue]]
speaker = "unk"
original = "アムとまたいちゃいちゃしたいな"
translation = "아무랑 또 꽁냥거리고 싶네."

[[dialogue]]
speaker = "アム"
original = "「も、も～……<emoji=heart04>\u3000朝からそればっかりじゃん、会長……」"
translation = "「정, 정말~……<emoji=heart04> 아침부터 그것뿐이잖아, 회장……」"

[[dialogue]]
speaker = "アム"
original = "「でも、あたしも賛成！\u3000せっかくビーチを貸し切ってくれたんだもんね……」"
translation = "「하지만 나도 찬성! 어렵게 비치를 빌려줬는걸……」"

[[dialogue]]
speaker = "アム"
original = "「うん、好きだよ、会長っ<emoji=heart04>」"
translation = "「응, 좋아해, 회장<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そうして俺とアムは、日が暮れるまで海水浴デートを楽しんだ──"
translation = "그렇게 나와 아무는 해가 저물 때까지 해수욕 데이트를 즐겼다──"

[[dialogue]]
speaker = "アム"
original = "「じゃーね、会長！\u3000また明日～っ！」"
translation = "「그럼 안녕, 회장! 내일 봐~!」"

[[dialogue]]
speaker = "アム"
original = "「あー、今日は楽しかったな～♪\u3000……ん、あそこにいるのは……エルゼ？」"
translation = "「아- 오늘은 즐거웠네~♪ ……응, 저기 있는 건…… 엘제?」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「もぐもぐ……もぐもぐ……♪」"
translation = "「우물우물…… 우물우물……♪」"

[[dialogue]]
speaker = "アム"
original = "「寮を抜け出して買い食いする不良生徒、はっけ～ん♪」"
translation = "「기숙사를 빠져나와 군것질하는 불량 학생, 바아-ㄹ견♪」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「──アムっ！？\u3000まま、まさかこんなところで会うだなんて……！」"
translation = "「──아무!? 서서, 설마 이런 곳에서 만날 줄이야……!」"

[[dialogue]]
speaker = "アム"
original = "「相変わらずだねー。あんまり門限破ってたら、寮長にバレちゃうんじゃないの？」"
translation = "「여전하네- 너무 통금 시간 어기고 있으면 사감 선생님한테 들키는 거 아냐?」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「え、ええっ……それはわかっているのですが。あの、アム。このことは……」"
translation = "「에, 에엣…… 그건 알고 있습니다만. 저기, 아무. 이 일은……」"

[[dialogue]]
speaker = "アム"
original = "「わかってるよー、内緒にするって。ふふ、両手で抱えてるたい焼き、１つくれればね♪」"
translation = "「알고 있어-, 비밀로 해줄게. 후후, 양손에 들고 있는 붕어빵, 하나 주면 말이야♪」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ちゃっかりしてますわね、アムは……出来立てのアツアツですから気を付けてくださいませ？」"
translation = "「빈틈없군요, 아무는…… 갓 구워낸 뜨끈뜨끈한 거니까 조심하세요?」"

[[dialogue]]
speaker = "アム"
original = "「やったー♪\u3000交渉、成立～っ」"
translation = "「만세♪ 협상, 성립~!」"

[[dialogue]]
speaker = "アム"
original = "「んー、おいし～っ♪」"
translation = "「음- 맛있다~!♪」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ところでアムの方こそ、こんな時間まで何をしていたのですか？」"
translation = "「그런데 아무야말로, 이 시간까지 무엇을 하고 있었나요?」"

[[dialogue]]
speaker = "アム"
original = "「んー？\u3000会長と海でデートしてたんだ。リップル先輩のリゾート結界でね」"
translation = "「음-? 회장이랑 바다에서 데이트했어. 리플 선배의 리조트 결계에서 말이야.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「まぁ！\u3000それは素敵なお休みだったのですね。どんなことをしたのです？\u3000サーフィン？\u3000それともビーチバレーとか？」"
translation = "「어머! 그건 멋진 휴일이었겠네요. 어떤 걸 했나요? 서핑? 아니면 비치발리볼 같은 거?」"

[[dialogue]]
speaker = "アム"
original = "「あー、うん。まあそんなところ……かな？\u3000遊んでお腹が空いたら、かき氷作ったりしてさ──」"
translation = "「아- 응. 뭐 대충 그런 거…… 일까? 놀다가 배고파지면 빙수 만들어 먹고──」"

[[dialogue]]
speaker = "アム"
original = "（本当はあんまり遊んでなくて、ずっとチューしたりくっついたりしてたんだけど……）"
translation = "(사실은 별로 안 놀고, 계속 키스하거나 딱 붙어있었지만……)"

[[dialogue]]
speaker = "アム"
original = "（な、なんか今になって恥ずかしくなってきたかも……いや、言わなきゃバレないんだけど……！）"
translation = "(왠지 이제 와서 부끄러워진 걸지도…… 아니, 말 안 하면 안 들키겠지만……!)"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「アム、急に黙ってどうしたのです？\u3000かき氷を作って、それで……？」"
translation = "「아무, 갑자기 입 다물고 왜 그래요? 빙수를 만들고, 그래서……?」"

[[dialogue]]
speaker = "アム"
original = "「あ、ああ、うん！\u3000あたしがイチゴで、会長がブルーハワイだったんだけど。エルゼ、知ってた？\u3000かき氷の味って、実はどれもおんなじだって会長が──」"
translation = "「아, 아아, 응! 내가 딸기고 회장이 블루 하와이였는데. 엘제, 알고 있었어? 빙수 맛은 사실 전부 똑같다고 회장이──」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「イチゴ？\u3000アムが召し上がったのは、ブルーハワイの方では？」"
translation = "「딸기요? 아무가 드신 건 블루 하와이 쪽 아닌가요?」"

[[dialogue]]
speaker = "アム"
original = "「えー、違うよ。あたしはイチゴを食べたよ？\u3000やっぱりかき氷の王道はイチゴだよ！」"
translation = "「에- 아냐. 난 딸기 먹었어? 역시 빙수의 왕도는 딸기라고!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「変ですね……？\u3000だってアム、舌がとっても青いですわよ？\u3000いえ、どちらかと言うと、紫……？」"
translation = "「이상하네요……? 그치만 아무, 혀가 아주 파란데요? 아니, 어느 쪽인가 하면 보라색……?」"

[[dialogue]]
speaker = "アム"
original = "「うぇっ──！？」"
translation = "「우엣──!?」"

[[dialogue]]
speaker = "アム"
original = "（も、もしかして……会長とたくさんキスしてるうちに……色が移っちゃった……！？）"
translation = "(서, 설마…… 회장이랑 키스 잔뜩 하는 동안에…… 색이 옮겨가 버린 거야……!?)"

[[dialogue]]
speaker = "アム"
original = "（き、キスマーク見られてるみたいで恥ずかしいんだけど～っ！？）"
translation = "(키, 키스 마크 들킨 것 같아서 부끄러운데~!?)"

[[dialogue]]
speaker = "アム"
original = "（ていうか、これ絶対にバレるやつ！\u3000かき氷食べた後、いっぱいキスしてたのバレちゃうやつだ……！！）"
translation = "(그보다 이건 무조건 들키는 거잖아! 빙수 먹은 다음에 키스 잔뜩 한 거 들켜버리는 거야……!!)"

[[dialogue]]
speaker = "アム"
original = "「あ、あーっ……ごめん！\u3000あたし、急用を思い出しちゃった！\u3000そ、それじゃあね、エルゼーっ！」"
translation = "「아, 아아-…… 미안! 나 급한 일이 생각났어! 그, 그럼 안녕, 엘제!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「……？\u3000行ってしまいました……アムってば、どうしたのでしょうか。あんなに真っ赤になって、恥ずかしがって……」"
translation = "「……? 가버렸네요…… 아무도 참, 무슨 일일까요. 저렇게나 새빨개져서 부끄러워하고……」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「──あ、もしかして！？」"
translation = "「──아, 혹시!?」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ふふ♪\u3000かき氷をお代わりして、食いしん坊だと思われるのが嫌だったのですね。お可愛いところもあるではないですか、アムも」"
translation = "「후후♪ 빙수를 더 먹어서 먹보라고 생각되는 게 싫었던 거군요. 귀여운 구석도 있지 않나요, 아무도.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「もぐもぐ……たい焼き、おいしいですわね♪」"
translation = "「우물우물…… 붕어빵, 맛있네요♪」"

