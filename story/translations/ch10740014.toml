[[dialogue]]
speaker = "unk"
original = "第４話,通い妻パルミエ！,P"
translation = "제4화, 헌신적인 아내 파르미에!, P"

[[dialogue]]
speaker = "unk"
original = "とある日の夜。不意に響いたチャイムを聞いて玄関を開けると──"
translation = "어느 날 밤. 갑자기 울린 초인종 소리를 듣고 현관문을 열자──"

[[dialogue]]
speaker = "パルミエ"
original = "「はぁ～い、ダーリン♪\u3000可愛い私が通い妻に来てあげたわよ～♪」"
translation = "「하~이, 달링♪ 귀여운 내가 헌신적인 아내로 와줬다구~♪」"

[[dialogue]]
speaker = "パルミエ"
original = "「今夜はお義理さまがいないんでしょ？\u3000ふふふ、遠慮なく夫婦の絆を深められるわね♪\u3000勝負下着も着けてきちゃった♪」"
translation = "「오늘 밤은 어머님 안 계시는 거지? 후후후, 사양 말고 부부의 유대를 깊게 다질 수 있겠네♪ 승부 속옷도 입고 왔다구♪」"

[[dialogue]]
speaker = "パルミエ"
original = "『って、どうして追い出すのよ～！？\u3000入れてってばぁ～！！』"
translation = "『잠깐, 왜 쫓아내는 거야~! 들여보내 달라니까!!』"

[[dialogue]]
speaker = "パルミエ"
original = "『可愛い妻を締め出すなんて旦那失格よ～！？\u3000入れてくれないなら朝までここで騒いでやる～！』"
translation = "『귀여운 아내를 문전박대하다니 남편 실격이야~! 안 들여보내 주면 아침까지 여기서 소란 피울 거야~!』"

[[dialogue]]
speaker = "パルミエ"
original = "「んもう、冗談が通じないんだから。せっかく１人で寂しい夜を過ごしてるかと思って訪ねてきてあげたのに」"
translation = "「정말이지, 농담이 안 통한다니까. 모처럼 혼자서 외로운 밤을 보내고 있을까 봐 찾아와준 건데.」"

[[dialogue]]
speaker = "パルミエ"
original = "「にしても……ふむふむ。本当に１人で過ごしてたのね？\u3000てっきり誰かしら他の女の子を連れ込んでるのかと思ってたけど」"
translation = "「그나저나…… 흠흠. 정말 혼자 지내고 있었네? 분명 누구든 다른 여자를 끌어들였을 거라 생각했는데.」"

[[dialogue]]
speaker = "パルミエ"
original = "「あ、別に連れ込んでたとしても怒らないから安心して♪\u3000私、浮気には寛容だから♪\u3000──って、また追い出そうとしないの！」"
translation = "「아, 딱히 끌어들였다 해도 화내지 않으니까 안심해♪ 나, 바람기에는 관대하니까♪ ──랄까, 또 내쫓으려 하지 마!」"

[[dialogue]]
speaker = "パルミエ"
original = "「それよりお台所借りるわよ？\u3000晩ご飯まだなんでしょ？」"
translation = "「그보다 부엌 좀 빌릴게? 저녁 아직 안 먹었지?」"

[[dialogue]]
speaker = "パルミエ"
original = "「ふふん、通い妻に来たって言ったじゃない。今夜はこのために来たんだから」"
translation = "「후훙, 아내 노릇 하러 왔다고 했잖아. 오늘 밤은 이걸 위해서 온 거니까.」"

[[dialogue]]
speaker = "パルミエ"
original = "「まぁ見てなさい？\u3000私の作る料理は絶品よ？\u3000私の良妻っぷりをダーリンに教えてあげるわ」"
translation = "「뭐 지켜보라구? 내가 만드는 요리는 일품이니까? 나의 현모양처다운 모습을 달링에게 가르쳐줄게.」"

[[dialogue]]
speaker = "パルミエ"
original = "「できあがり～！\u3000どうぞどうぞ、冷めないうちに食べちゃって？」"
translation = "「완성~! 자 자, 식기 전에 어서 먹어봐?」"

[[dialogue]]
speaker = "パルミエ"
original = "「ふふ、美味しいでしょ？\u3000私、普段やらないだけでお料理は得意な部類なんだから♪」"
translation = "「후후, 맛있지? 나, 평소에 안 할 뿐이지 요리는 잘하는 축에 속한다구♪」"

[[dialogue]]
speaker = "パルミエ"
original = "「愛情もたっぷりたーっぷり込めておいたから。味わって食べてね？」"
translation = "「애정도 듬뿍 듬~뿍 담아뒀으니까. 음미하면서 먹어줘?」"

[[dialogue]]
speaker = "unk"
original = "またそうやって冗談を……"
translation = "또 그렇게 농담을……"

[[dialogue]]
speaker = "パルミエ"
original = "「むむ、失礼ね。愛情を込めてるのは本当よ？」"
translation = "「무무, 실례네. 애정을 담은 건 진짜라구?」"

[[dialogue]]
speaker = "パルミエ"
original = "「考えてもみて？\u3000面倒臭がり屋の私が、好きでもない人のためにわざわざ料理を作りに来ると思う？」"
translation = "「생각해 봐? 귀찮은 거 질색인 내가, 좋아하지도 않는 사람을 위해 일부러 요리를 하러 오겠어?」"

[[dialogue]]
speaker = "パルミエ"
original = "「確かに最初は、初心で面白くて親に紹介する結婚相手に丁度いいなぁって思ってダーリンに結婚を迫っていたけど……」"
translation = "「확실히 처음엔, 순진해서 재밌고 부모님께 소개할 결혼 상대로 딱 좋겠다고 생각해서 달링한테 결혼하자고 졸랐지만……」"

[[dialogue]]
speaker = "パルミエ"
original = "「でも……最近は割と本気なのよ？\u3000本気でダーリンのこと、好きになっちゃってるんだからね……？」"
translation = "「하지만…… 요즘은 꽤 진심이라구? 진심으로 달링을 좋아하게 돼버렸으니까……?」"

[[dialogue]]
speaker = "パルミエ"
original = "「これでも勇気を出して部屋に来たんだから……。そろそろダーリンから真剣に答えを聞かせてもらおうと思って……」"
translation = "「이래 봬도 용기를 내서 방에 온 거니까……. 슬슬 달링한테서 진지한 대답을 듣고 싶어서……」"

[[dialogue]]
speaker = "パルミエ"
original = "「ね……。ダーリン？\u3000最初に会った時に尋ねたこと……今日ここでもう一度聞いてもいいかしら？」"
translation = "「저기…… 달링? 처음에 만났을 때 물어봤던 거…… 오늘 여기서 다시 한번 물어봐도 될까?」"

[[dialogue]]
speaker = "unk"
original = "突然すぎて心の準備が──"
translation = "너무 갑작스러워서 마음의 준비가──"

[[dialogue]]
speaker = "パルミエ"
original = "「ま、待たないわっ。私だって自分を奮い立たせてここへ来たんだものっ」"
translation = "「기, 기다리지 않아. 나도 나 자신을 채찍질하며 여기까지 온 거란 말이야.」"

[[dialogue]]
speaker = "パルミエ"
original = "「改めて聞くわよ、ダーリン。ダーリンさえ良ければ、その……！\u3000その、ね──……？」"
translation = "「새삼스럽게 다시 물을게, 달링. 달링만 괜찮다면, 그……! 그, 저기──……?」"

[[dialogue]]
speaker = "パルミエ"
original = "「星徒会をやめて、おなか部に入ってくれないっ？」"
translation = "「성도회를 그만두고, 오나카부에 들어와 주지 않을래?」"

[[dialogue]]
speaker = "unk"
original = "……は？"
translation = "……하?"

[[dialogue]]
speaker = "パルミエ"
original = "「だからおなか部よ、おなか部♪\u3000最初に会った時もチラっと勧誘したじゃな～い♪」"
translation = "「그러니까 오나카부라니까, 오나카부♪ 처음 만났을 때도 살짝 권유했었잖~아♪」"

[[dialogue]]
speaker = "パルミエ"
original = "「シフォンもモナカもダーリンのこと気に入ってるみたいだし♪\u3000ダーリンが入部してくれれば、もっと楽しくなると思うのよね～♪」"
translation = "「시퐁도 모나카도 달링을 마음에 들어 하는 것 같구♪ 달링이 입부해 주면 훨씬 더 즐거워질 거라고 생각하거든~♪」"

[[dialogue]]
speaker = "パルミエ"
original = "「って、あら？\u3000あらあら？\u3000どうしたの、ダーリン？\u3000お顔真っ赤よ～？」"
translation = "「어라? 어라어라? 왜 그래, 달링? 얼굴이 새빨개~?」"

[[dialogue]]
speaker = "パルミエ"
original = "「ふふ、まさか私との結婚話の方だと思った？\u3000やーねー、そっちの方はダーリンの意志とは無関係に進めさせてもらってるわよ～♪」"
translation = "「후후, 설마 나랑 결혼하는 쪽 얘기인 줄 알았어? 아유 증말, 그쪽은 달링의 의사와는 상관없이 진행시키고 있다구~♪」"

[[dialogue]]
speaker = "unk"
original = "それはそれで困るんだけど！？"
translation = "그건 그것대로 곤란한데!?"

[[dialogue]]
speaker = "パルミエ"
original = "「あはは、本当に面白いわね～。照れたり呆れたり怒ったり、それでこそからかい甲斐があるってものよ～」"
translation = "「아하하, 정말 재밌네~. 부끄러워하거나 어이없어하거나 화내거나, 이래야 놀리는 보람이 있지~」"

[[dialogue]]
speaker = "パルミエ"
original = "「でも、ダーリンがおなか部に入ってくれたらいいのにって思ってるのは本当よ？\u3000ダーリンが好きっていうのも本当だし」"
translation = "「하지만, 달링이 오나카부에 들어왔으면 좋겠다고 생각하는 건 진심이라구? 달링을 좋아한다는 것도 진짜고.」"

[[dialogue]]
speaker = "パルミエ"
original = "「まぁそれがＬＩＫＥかＬＯＶＥかはダーリンの想像に任せるけど♪」"
translation = "「뭐 그게 LIKE인지 LOVE인지는 달링의 상상에 맡기겠지만 말이야♪」"

[[dialogue]]
speaker = "unk"
original = "そろそろ何の用事で来たか教えてくれ……"
translation = "슬슬 무슨 용건으로 왔는지 말해줘……"

[[dialogue]]
speaker = "パルミエ"
original = "「うん？\u3000それは最初に言ったじゃない。１人で寂しい夜を過ごしてるかもしれないから訪ねてきてあげたのよ」"
translation = "「응? 그건 처음에 말했잖아. 혼자서 외로운 밤을 보내고 있을지도 모르니까 찾아와준 거라고.」"

[[dialogue]]
speaker = "パルミエ"
original = "「晩ご飯を１人で黙って食べるのって楽しくないじゃない？\u3000広い家で１人で過ごすのって悲しいじゃない？」"
translation = "「저녁을 혼자서 말없이 먹는 건 즐겁지 않잖아? 넓은 집에서 혼자 지내는 건 슬프잖아?」"

[[dialogue]]
speaker = "パルミエ"
original = "「私はシフォンやモナカと出会うまで、そういうのがすごく寂しかったから」"
translation = "「나는 시퐁이나 모나카를 만나기 전까지 그런 게 무척 외로웠으니까.」"

[[dialogue]]
speaker = "パルミエ"
original = "「うちの親、すごくドライなのよね～。ご飯中も私語禁止だったし。そもそも大抵屋敷にいないし。そのくせ私は屋敷から出してくれないし」"
translation = "「우리 부모님, 무척 드라이하시거든~. 밥 먹을 때도 사담 금지였고. 애초에 거의 저택에 안 계시고. 그러면서 나는 저택 밖으로 안 내보내 주시고.」"

[[dialogue]]
speaker = "パルミエ"
original = "「だからかしらね？\u3000今夜、ダーリンのお義母さんが留守にしてるって小耳に挟んで、つい飛んで来ちゃったの」"
translation = "「그래서일까? 오늘 밤, 달링네 어머님이 집을 비우신다는 얘기를 얼핏 듣고는 나도 모르게 달려와 버렸어.」"

[[dialogue]]
speaker = "パルミエ"
original = "「ほら私、好きな人には笑顔でいてもらいたいってタイプだから。ダーリンが１人寂しくもそもそご飯を食べてるかと思うと気になっちゃって」"
translation = "「나 말이야, 좋아하는 사람은 웃는 얼굴로 있었으면 하는 타입이니까. 달링이 혼자 외롭게 우물우물 밥을 먹고 있을 거라 생각하니 신경 쓰여서 말이야.」"

[[dialogue]]
speaker = "パルミエ"
original = "「ま、自分でもちょっと意外だったんだけどね？\u3000シフォンやモナカのためならともかく、他の誰かのためにこんな面倒なことしちゃうなんて」"
translation = "「뭐, 나 스스로도 좀 의외였지만 말이야? 시퐁이나 모나카를 위해서라면 몰라도, 다른 누군가를 위해 이런 귀찮은 짓을 하다니.」"

[[dialogue]]
speaker = "パルミエ"
original = "「いつの間にか、それくらいダーリンのことが気に入っちゃってるみたい。なんだか放っておけないし、からかい甲斐もあって楽しいし」"
translation = "「어느새 그만큼 달링이 마음에 들어버린 것 같아. 왠지 내버려 둘 수 없기도 하고, 놀리는 보람도 있어서 즐겁고.」"

[[dialogue]]
speaker = "パルミエ"
original = "「私、ホント言うと男性になんて一切興味の欠片もなかったけど。もしかしたら私、意外と本当に──……」"
translation = "「나, 사실 남자한테는 눈곱만큼도 관심 없었는데. 어쩌면 나, 의외로 정말로──……」"

[[dialogue]]
speaker = "パルミエ"
original = "「ふふ、ううん、やっぱりなんでもないわ。さ、食べ終わったのならゲームでもして遊びましょ♪」"
translation = "「후후, 아냐, 역시 아무것도 아냐. 자, 다 먹었으면 게임이라도 하며 놀자♪」"

[[dialogue]]
speaker = "パルミエ"
original = "「今夜は寝かせないわよ～？\u3000あ、それともダーリンの方が寝かせてくれないのかしら……<emoji=heart04>」"
translation = "「오늘 밤은 안 재울 거라구~? 아, 아니면 달링 쪽이 안 재워주려나……<emoji=heart04>」"

[[dialogue]]
speaker = "パルミエ"
original = "「あはは、冗談よ冗談。ま、冗談にしなくても構わないけど♪」"
translation = "「아하하, 농담이야 농담. 뭐, 농담으로 안 쳐도 상관없지만 말이야♪」"

[[dialogue]]
speaker = "パルミエ"
original = "「ね……ダーリン？\u3000またご飯作りに来てもいいかしら？\u3000ダーリンと過ごしてると、自分の知らなかった一面が見えてくる気がするの」"
translation = "「저기…… 달링? 또 밥 만들러 와도 될까? 달링이랑 지내다 보면, 내가 몰랐던 내 모습을 보게 되는 기분이 들어.」"

[[dialogue]]
speaker = "パルミエ"
original = "「ふふ。なら、たまに作りに来させてもらうわね♪\u3000ダーリンのために通い妻になってあげる♪」"
translation = "「후후. 그럼, 가끔 만들러 오게 해줘♪ 달링을 위해 헌신적인 아내가 되어줄게♪」"

[[dialogue]]
speaker = "パルミエ"
original = "「まぁ……とっても面倒臭いけど♪」"
translation = "「뭐…… 엄청 귀찮겠지만 말이야♪」"

