[[dialogue]]
speaker = "unk"
original = "そうして、水着コンテスト当日が迫るなか……"
translation = "그렇게 수영복 콘테스트 당일이 다가오는 가운데……"

[[dialogue]]
speaker = "ヴィーナス"
original = "「──やっぱり怪しいわ」"
translation = "「──역시 수상해.」"

[[dialogue]]
speaker = "unk"
original = "やっぱり？"
translation = "역시?"

[[dialogue]]
speaker = "unk"
original = "何が？"
translation = "뭐가?"

[[dialogue]]
speaker = "ヴィーナス"
original = "「水着コンテストよ。リゾートを盛り上げるために──なんて言ってたけど、そんな殊勝な気持ちであのヘレナちゃんが企画するかしら？」"
translation = "「수영복 콘테스트 말이야. 리조트를 활성화하기 위해서──라고는 했지만, 그 헬레나 짱이 그런 기특한 마음으로 기획을 하겠어?」"

[[dialogue]]
speaker = "アナ"
original = "「まあ、むやみに疑うのもよくありませんが……」"
translation = "「뭐, 무턱대고 의심하는 것도 좋지 않습니다만……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「なーんか企んでる気がするのよねぇ……」"
translation = "「뭔~가 꾸미고 있는 기분이 든단 말이지……」"

[[dialogue]]
speaker = "サーシャ"
original = "「それでね、会計の役割はこうして……」"
translation = "「그래서 말이야, 회계 역할은 이렇게 해서……」"

[[dialogue]]
speaker = "トリシャ"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "トリシャ"
original = "「なるほど……これが星徒会の業務ですか……せ、青春という感じですね……」"
translation = "「과연…… 이것이 성도회의 업무인가요…… 처, 청춘이라는 느낌이네요…….」"

[[dialogue]]
speaker = "unk"
original = "星徒会の活動を見学しに来たトリシャさんは、興味深そうに皆の仕事を眺めている。"
translation = "성도회 활동을 견학하러 온 트리샤 씨는 흥미진진하게 모두의 일을 바라보고 있다."

[[dialogue]]
speaker = "マトイ"
original = "「トリシャさんは何か聞いてないの？\u3000どうして水着コンテストが行われるのか──とか」"
translation = "「트리샤 씨는 뭐 들은 거 없어? 왜 수영복 콘테스트를 여는지── 같은 거.」"

[[dialogue]]
speaker = "トリシャ"
original = "「わ、わかりません……ただ呼ばれただけなので……」"
translation = "「모, 모르겠습니다…… 그저 불려왔을 뿐이라……」"

[[dialogue]]
speaker = "トリシャ"
original = "「あ……占ってみましょうか？」"
translation = "「아…… 점쳐볼까요?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「──いいえ。それには及ばないわ」"
translation = "「──아니. 그럴 필요는 없어.」"

[[dialogue]]
speaker = "unk"
original = "どうする気だ？"
translation = "어쩌려고?"

[[dialogue]]
speaker = "ヴィーナス"
original = "「決まってるじゃない──ヘレナちゃんの動向を探るのよ。さあ、いくわよ！」"
translation = "「뻔하잖아── 헬레나 짱의 동태를 살피는 거야. 자, 가자!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「──センちゃんからの情報によれば、ヘレナちゃんは今日このへんで商談があるはずよ」"
translation = "「──센 짱의 정보에 따르면 헬레나 짱은 오늘 이 근처에서 비즈니스 미팅이 있을 거야.」"

[[dialogue]]
speaker = "アナ"
original = "「そんなにうまく見つかるでしょうか……？」"
translation = "「그렇게 쉽게 찾을 수 있을까요……?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "（──いたわ！\u3000隠れましょ！）"
translation = "(──있어! 숨자!)"

[[dialogue]]
speaker = "アナ"
original = "（完全に尾行ですね）"
translation = "(완벽한 미행이군요.)"

[[dialogue]]
speaker = "トリシャ"
original = "（なるほど……これも星徒会の任務……）"
translation = "(과연…… 이것도 성도회의 임무……)"

[[dialogue]]
speaker = "unk"
original = "今日はたまたま"
translation = "오늘은 우연히 한 거야."

[[dialogue]]
speaker = "unk"
original = "そういうわけじゃない"
translation = "그런 건 아니야."

[[dialogue]]
speaker = "ヘレナ"
original = "「さて、今日は……」"
translation = "「자, 오늘은……」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ひとつずつ片付けていかねばな……」"
translation = "「하나씩 처리해 나가야겠군……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "（何かしら、ヘレナちゃんが入ったところは──）"
translation = "(뭐지, 헬레나 짱이 들어간 곳은──)"

[[dialogue]]
speaker = "アナ"
original = "（アトリエですね。どうやら中で商談をしているようです）"
translation = "(아틀리에군요. 아무래도 안에서 상담을 하고 있는 모양입니다.)"

[[dialogue]]
speaker = "トリシャ"
original = "（何を話してるのか……気になります……）"
translation = "(무슨 이야기를 하는 건지…… 신경 쓰이네요……)"

[[dialogue]]
speaker = "unk"
original = "しばらくして……"
translation = "잠시 후……"

[[dialogue]]
speaker = "ヴィーナス"
original = "（──出てきたわ。追うわよ！）"
translation = "(──나왔어. 쫓자!)"

[[dialogue]]
speaker = "ヘレナ"
original = "「フフ……それでな……」"
translation = "「후후…… 그래서 말이지……」"

[[dialogue]]
speaker = "アナ"
original = "（今度は和菓子屋ですか）"
translation = "(이번엔 화과자점인가요.)"

[[dialogue]]
speaker = "トリシャ"
original = "（水着コンテストには、和菓子が出るのですか……？）"
translation = "(수영복 콘테스트에는 화과자가 나오는 건가요……?)"

[[dialogue]]
speaker = "アナ"
original = "（いえ、無関係の案件かと）"
translation = "(아뇨, 무관한 안건이겠죠.)"

[[dialogue]]
speaker = "アナ"
original = "（ヘレナさんは九浄家の当主にして実業家……手広く事業を経営していることで知られていますから）"
translation = "(헬레나 씨는 쿠죠 가문의 당주이자 실업가…… 폭넓게 사업을 경영하고 있는 것으로 알려져 있으니까요.)"

[[dialogue]]
speaker = "ヴィーナス"
original = "（手広すぎて、私でさえ何をやってるのか把握しきれてないわ）"
translation = "(너무 폭넓어서 나조차 뭘 하고 있는지 다 파악하지 못할 정도야.)"

[[dialogue]]
speaker = "ヘレナ"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「今度はお寺？\u3000もう、何を考えてるのかしら」"
translation = "「이번엔 절? 정말 무슨 생각인 거야.」"

[[dialogue]]
speaker = "アナ"
original = "「商談……あ、いえ。ただのお参りのようですね」"
translation = "「비즈니스 미팅…… 아, 아뇨. 그냥 불공을 드리는 것 같네요.」"

[[dialogue]]
speaker = "トリシャ"
original = "「水着コンテストとは……関係なさそう……です」"
translation = "「수영복 콘테스트와는…… 상관없어 보여……요.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「なかなかシッポを出さないわね……」"
translation = "「좀처럼 꼬리를 밟히지 않네……」"

[[dialogue]]
speaker = "unk"
original = "それからも、ヘレナちゃんはあちこちを巡って……"
translation = "그 뒤로도 헬레나 짱은 여기저기를 돌고 돌아서……"

[[dialogue]]
speaker = "アナ"
original = "「また移動するみたいです──」"
translation = "「다시 이동하려는 모양입니다──」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「でも、こっちのほうって……」"
translation = "「하지만 이쪽 방향은……」"

[[dialogue]]
speaker = "unk"
original = "九浄家じゃないか"
translation = "쿠죠 가문 아니야?"

[[dialogue]]
speaker = "unk"
original = "やっぱり"
translation = "역시."

[[dialogue]]
speaker = "アナ"
original = "（引き返しますか？）"
translation = "(돌아갈까요?)"

[[dialogue]]
speaker = "ヴィーナス"
original = "（もちろん、最後まで行くだけよ！）"
translation = "(물론 끝까지 가볼 뿐이야!)"

[[dialogue]]
speaker = "せつな"
original = "「おかえりなさいでござる、当主様！」"
translation = "「어서 오시오, 당주님!」"

[[dialogue]]
speaker = "閃"
original = "「おかえりなさいませ」"
translation = "「어서 오십시오.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「うむ。留守番、ご苦労であった」"
translation = "「음. 집 보느라 수고했다.」"

[[dialogue]]
speaker = "閃"
original = "「時に当主様。本日のお出かけは、例の新ブランドの件でしたか？」"
translation = "「그런데 당주님. 오늘 외출은 예의 그 신규 브랜드 건 때문이었습니까?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「いや。あれについてはもう話がついた」"
translation = "「아니. 그것에 대해서는 이미 이야기가 끝났다.」"

[[dialogue]]
speaker = "せつな"
original = "「それはアパレル産業から新たに水着ブランドにも参入する──というお話でござるか？」"
translation = "「그것이 어패럴 산업에서 새로이 수영복 브랜드에도 진출한다──는 이야기이오?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ああ。先日のプール開設に際して、桜十路家にも水着を売り込んできたのだが……」"
translation = "「그래. 요전 날 풀장 개설에 즈음하여 사쿠라코지 가문에도 수영복을 팔고 왔지만……」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ふふふ。他にもちょうどよいプロモーションの機会を得られてな」"
translation = "「후후후. 그 밖에도 딱 좋은 프로모션 기회를 얻었지.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「貴殿らをリゾートのリサーチに向かわせたのも、その下見だったのだ」"
translation = "「귀공들을 리조트 리서치에 보낸 것도 그 사전 답사였던 것이다.」"

[[dialogue]]
speaker = "せつな"
original = "「あれはそのための調査だったでござるか！」"
translation = "「그것이 그를 위한 조사였소!」"

[[dialogue]]
speaker = "ヘレナ"
original = "「いかにも。リップルはリゾートへのさらなる集客を望んでいた。そこで私は水着コンテストを提案したわけだ」"
translation = "「그렇다. 리플은 리조트로의 더 많은 고객 유치를 원하고 있었지. 그래서 내가 수영복 콘테스트를 제안한 거다.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「大規模な来客が見込めるイベント──この機を活用せぬわけにはいくまい」"
translation = "「대규모 방문객이 예상되는 이벤트── 이 기회를 활용하지 않을 수 없지.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ちょうど、ぴったりのモデルもいることだからな」"
translation = "「마침 딱 맞는 모델도 있으니까 말이야.」"

[[dialogue]]
speaker = "閃"
original = "「ぴったりのモデル？」"
translation = "「딱 맞는 모델?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「トリシャだ。私は晴れ着の時の件を思い出し……彼女なら、水着もさぞ似合うだろうと思っていた」"
translation = "「트리샤다. 나는 나들이옷 때의 건을 떠올리고…… 그녀라면 수영복도 분명 잘 어울릴 거라 생각했지.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「トリシャには我がブランド『ヘレナ』の水着を着て、コンテストに優勝してもらう」"
translation = "「트리샤에게는 우리 브랜드 『헬레나』의 수영복을 입혀 콘테스트에서 우승하게 할 것이다.」"

[[dialogue]]
speaker = "せつな"
original = "「確かにあのスタイルなら、優勝も狙えるでござる……！」"
translation = "「확실히 그 스타일이라면 우승도 노릴 수 있겠소……!」"

[[dialogue]]
speaker = "ヘレナ"
original = "「新作水着を着用しての、コンテストの大々的な優勝──それは我がアパレルブランドのまたとない宣伝になるはずだ。それを思えば、出資した賞金程度安いものよ！」"
translation = "「신작 수영복을 착용한 콘테스트의 대대적인 우승── 그것은 우리 어패럴 브랜드의 다시없을 홍보가 될 터. 그걸 생각하면 투자한 상금 정도야 싼 편이지!」"

[[dialogue]]
speaker = "せつな"
original = "「な、なるほどでござる……！」"
translation = "「과, 과연 그렇구료……!」"

[[dialogue]]
speaker = "閃"
original = "「さすがの商才です、当主様……」"
translation = "「역시나 장사 수완이 대단하십니다, 당주님……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「──そういうことだったのね！」"
translation = "「──그런 거였구나!」"

[[dialogue]]
speaker = "ヘレナ"
original = "「むっ……？」"
translation = "「음……?」"

