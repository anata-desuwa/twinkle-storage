[[dialogue]]
speaker = "unk"
original = "第３話,公認の仲,P"
translation = "제3화, 공인된 사이, P"

[[dialogue]]
speaker = "unk"
original = "ある日、クラウディアから呼び出された──"
translation = "어느 날, 클라우디아로부터 호출을 받았다──"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「──とまあ、そんなことがあってな」"
translation = "「──뭐, 그런 일이 있어서 말이다」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「せっかく余がこの『ホーリー・ベル』の機能をふんだんに使って、１２月２５日を盛り上げようとしていたのに。結局セドナ達に止められてしまった」"
translation = "「기껏 여가 이 『홀리 벨』의 기능을 마음껏 사용해서 12월 25일을 달구려 했거늘. 결국 세드나 일행에게 제지당하고 말았느니라」"

[[dialogue]]
speaker = "unk"
original = "クラウディアは、その衣装にまつわる事の顛末を教えてくれた。"
translation = "클라우디아는 그 의상에 얽힌 일의 전말을 가르쳐 주었다."

[[dialogue]]
speaker = "unk"
original = "どうやらクラウディアは、また基地を飛び出しててんやわんやを仕出かしていたらしい。"
translation = "아무래도 클라우디아는 또 기지를 뛰쳐나가 한바탕 소동을 피웠던 모양이다."

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「もう。本当に大変だったんですからね」"
translation = "「정말이지. 정말 큰일이었다니까요」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「文句ならちぇちゅーりえに言うがよい。あやつが余のために開発した特別品なのだからな」"
translation = "「불만이라면 체칠리에에게 말하도록 하여라. 그자가 여를 위해 개발한 특별품이니까 말이다」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「文句は<ruby>糠<rt>ぬか</rt></ruby>に釘なので後回しとして、請求書はしっかり送りつけておきました」"
translation = "「불만은 소귀에 경 읽기니 나중으로 미루고, 청구서는 확실히 보내두었습니다」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「まあ大目に見てやってくれ。余もすっかりこの服が気に入ってしまったからのう」"
translation = "「뭐, 너그럽게 봐주거라. 여도 이 옷이 아주 마음에 들어버렸으니 말이다」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「せっかく新開発された戦闘服だ。姫様にも実験に協力してもらって、なるべくデータを取ることとしよう」"
translation = "「기껏 새로 개발된 전투복이다. 공주님께서도 실험에 협력해 주셔서 가급적 데이터를 수집하도록 하지」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「それより、魔王よ。学園に戻る際、このレポートをついでに届けてきてくれないか」"
translation = "「그보다 마왕이여. 학원으로 돌아갈 때 이 보고서를 가는 길에 전해주지 않겠나」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「あ、こら。セドナ。余の魔王を勝手に小間使いにするでない」"
translation = "「아, 이봐. 세드나. 여의 마왕을 마음대로 심부름꾼으로 부리지 말거라」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「姫様だけのものではないでしょう……」"
translation = "「공주님만의 전유물은 아니지 않습니까……」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「いーや、余だけのものだ！\u3000余の最愛のぱーとなーなのだ！」"
translation = "「아니, 여만의 것이니라! 여의 최애 파트너란 말이다!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「お熱いのは結構ですが、ほら。彼も引き受けてくださるようですよ」"
translation = "「뜨거운 건 좋습니다만, 자요. 그도 수락해 주시는 것 같군요」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「む……さすがは魔王だ。懐が深い。それでこそ余の認めた伴侶だな！」"
translation = "「음…… 과연 마왕이로다. 도량이 넓구나. 그래야 여가 인정한 반려라 할 수 있지!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「だが──魔王よ。さっきからずっと疑問げな顔をしていないか？」"
translation = "「하지만── 마왕이여. 아까부터 계속 의문스러운 얼굴을 하고 있지 않느냐?」"

[[dialogue]]
speaker = "unk"
original = "ここにいていいの？"
translation = "여기에 있어도 돼?"

[[dialogue]]
speaker = "unk"
original = "今さらだけど……"
translation = "새삼스럽지만……"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「どういう意味だ？\u3000なに──ネビュラの部外者なのに基地にいてよいのか、と？」"
translation = "「무슨 의미냐? 뭐── 네뷸라의 외부인인데 기지에 있어도 되느냐고?」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「無論だ！\u3000余が認めた相手なのだから、どこへなりとも自由に行くがよい！」"
translation = "「물론이니라! 여가 인정한 상대이니 어디든 자유롭게 다니도록 하여라!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「姫様の理屈は通りません。が、魔王の出入りに関しては我々も認可している。気負う必要はない」"
translation = "「공주님의 논리는 통하지 않습니다. 하지만 마왕의 출입에 관해서는 저희도 인가하고 있지. 부담 가질 필요는 없다」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「魔王がいない時も、姫様はお前の話ばかりするのだ。一緒に<ruby>昼餉<rt>ひるげ</rt></ruby>を摂っただの遊んだだの、再三聞かされるこっちの身にもなってくれ」"
translation = "「마왕이 없을 때도 공주님은 네 이야기만 한단 말이다. 같이 점심을 먹었다느니 놀았다느니, 재삼 듣게 되는 이쪽 입장도 좀 되어보라고」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ああっ！\u3000セ、セドナ！\u3000魔王がいない時の話などするでない！」"
translation = "「아앗! 세, 세드나! 마왕이 없을 때의 이야기 따위 하지 말거라!」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「ふふっ、クラウディア様でも恥ずかしがることあるんですね～」"
translation = "「후훗, 클라우디아 님이라도 부끄러워할 때가 있네요~」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「むぅ……！」"
translation = "「으으……!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ま、公認の仲ということだ。今後も自由に我が基地を訪れてくれていい。むしろ姫様の相手をしてくれた方が我々も助かるというもの」"
translation = "「뭐, 공인된 사이라는 거다. 앞으로도 자유롭게 우리 기지를 방문해도 좋다. 오히려 공주님의 상대가 되어주는 편이 우리로서도 도움이 되니까 말이지」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「それに、今は学園とネビュラも歩調を合わせるときだ。魔王と親しく交流することは、お互いにとっても悪いことじゃないだろう」"
translation = "「게다가 지금은 학원과 네뷸라도 발을 맞출 때다. 마왕과 친밀하게 교류하는 것은 서로에게도 나쁜 일은 아니겠지」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「うむ。ま、そういうことだ」"
translation = "「음. 뭐, 그런 것이니라」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「魔王を自由に行き来させていれば、そのうち姫様を通じて機密情報が掴めるかもしれないしな……」"
translation = "「마왕을 자유롭게 드나들게 하면, 머지않아 공주님을 통해 기밀 정보를 파악할 수 있을지도 모르고 말이야……」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「あくどい部分が出てますよ、セドナ長官」"
translation = "「악랄한 부분이 나오고 있어요, 세드나 장관님」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ふふっ、冗談だ。いずれにせよ──魔王が姫様と一緒にいてくれれば、私としても手間が省けてありがたい」"
translation = "「후훗, 농담이다. 어찌 됐든── 마왕이 공주님과 함께 있어준다면 나로서도 수고를 덜 수 있어 고맙군」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「これからも姫様が無茶しないように頼むぞ、魔王」"
translation = "「앞으로도 공주님이 무리하지 않도록 부탁하네, 마왕」"

[[dialogue]]
speaker = "unk"
original = "それからも──"
translation = "그 후로도──"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「──あ、クラウディア様。それに魔王ちゃん。今日も２人でお家デート？\u3000アツアツだね～」"
translation = "「──아, 클라우디아 님. 그리고 마왕짱. 오늘도 둘이서 집 데이트? 뜨겁네~」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「おお、ちぇちゅーりえ！\u3000お主にもらったこのフォームは今も大活躍だぞ！」"
translation = "「오오, 체칠리에! 네놈에게 받은 이 폼은 지금도 대활약 중이니라!」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「気に入ってくれてるみたいで何より。お２人さん、いつまでも仲睦まじくね～」"
translation = "「마음에 들어 하는 것 같아 다행이네. 두 사람, 언제까지나 사이좋게 지내~」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「──やれやれ、ここの者どもときたら。余と魔王を見かけたらすぐ寄ってきおる」"
translation = "「──이런 이런, 이곳 녀석들이란. 여와 마왕을 발견하면 금방 다가오는구나」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「こういうのは、なんだ……野次馬、というのか？\u3000余と魔王のらぶらぶっぷりが羨ましいのだろうな、はっはっは！」"
translation = "「이런 걸 뭐라고 하더라…… 구경꾼, 이라고 하느냐? 여와 마왕의 러브러브함이 부러운 것이겠지, 핫핫하!」"

[[dialogue]]
speaker = "unk"
original = "大切な仲間なんだな"
translation = "소중한 동료구나"

[[dialogue]]
speaker = "unk"
original = "クラウディアにとって……"
translation = "클라우디아에게 있어서……"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「？\u3000何を今さら」"
translation = "「? 새삼스럽게 무엇을」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「とはいえ、まー……そうだな。最近は、余にとってネビュラがより大切になったのを感じる」"
translation = "「그렇긴 해도, 뭐── 그렇구나. 최근에는 여에게 있어 네뷸라가 더 소중해진 것을 느끼느니라」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「なにせ森にいた頃は、魔女しかいない環境というものが普通だった。外敵もいないのだから、仲間意識など芽生えるはずもない」"
translation = "「그도 그럴 것이 숲에 있던 시절에는 마녀밖에 없는 환경이라는 것이 당연했느니라. 외적도 없으니 동료 의식 따위가 싹틀 리도 없지」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「魔女であることは普通で、ただ光の魔女である余だけが特別──なものだと思っていた」"
translation = "「마녀인 것은 당연하고, 그저 빛의 마녀인 여만이 특별──한 것이라 생각했느니라」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「だが……こうしてネビュラが人間界に開かれてからというもの、魔女という種族そのものが仲間なのだと、自然と思えるようになった」"
translation = "「하지만…… 이렇게 네뷸라가 인간계에 개방된 이후로 마녀라는 종족 그 자체가 동료라고 자연스럽게 생각할 수 있게 되었느니라」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「口うるさいセドナも、ちゃらんぽらんなちぇちゅーりえも……みな、魔女のために動いてくれておる」"
translation = "「잔소리 심한 세드나도, 덜렁거리는 체칠리에도…… 모두 마녀를 위해 움직여주고 있느니라」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「余もその頭として──ふさわしい振る舞いをしなくてはならん。正直、今の余はまだまだなのだろう」"
translation = "「여도 그 우두머리로서── 걸맞은 행동을 하지 않으면 안 되겠지. 솔직히 지금의 여는 아직 멀었겠지만 말이다」"

[[dialogue]]
speaker = "unk"
original = "いつの間にか大人びた意見を持っていた彼女に、そこはかとない感動を覚える。"
translation = "어느새 어른스러운 의견을 갖게 된 그녀에게 묘한 감동을 느낀다."

[[dialogue]]
speaker = "unk"
original = "いい子いい子"
translation = "착하다 착해"

[[dialogue]]
speaker = "unk"
original = "成長してるんだな"
translation = "성장하고 있구나"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「……む？\u3000なんだ？\u3000急に余の頭を撫でて──子ども扱いするでない！\u3000余は泣く子も恐れる光の魔女だぞ！」"
translation = "「……음? 무엇이냐? 갑자기 여의 머리를 쓰다듬고── 아이 취급 하지 말거라! 여는 우는 아이도 겁내는 빛의 마녀이니라!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「魔王！\u3000お主も余の伴侶として、魔女を導くふさわしい振る舞いを身につけるのだ～！」"
translation = "「마왕! 네놈도 여의 반려로서 마녀를 이끌기에 걸맞은 소양을 익히도록 하여라~!」"

