[[dialogue]]
speaker = "unk"
original = "第１話,嬉し恥ずかし,P"
translation = "제1화, 기쁘고 부끄러운, P"

[[dialogue]]
speaker = "unk"
original = "ヨミと恋人として付き合い始めてから、しばらく経ったある日のこと。俺が彼女に会いに大聖堂カフェテリアへやってくると――"
translation = "요미와 연인으로 사귀기 시작한 지 시간이 좀 흐른 어느 날. 내가 그녀를 만나러 대성당 카페테리아로 찾아오자──"

[[dialogue]]
speaker = "せつな"
original = "「主様――いきなり御免でござりまする！」"
translation = "「주군── 갑자기 실례하겠소!」"

[[dialogue]]
speaker = "unk"
original = "えっ、ちょっ、せつな！？\u3000うおわぁ～っ！？"
translation = "엣, 잠깐, 세츠나!? 우와아아~!? "

[[dialogue]]
speaker = "unk"
original = "なんと俺は、どこからか現れた縄に縛られ、一瞬で天井高く吊るされてしまった！\u3000しかも口も縄で塞がれて、声が出せない。"
translation = "무려 나는 어디선가 나타난 밧줄에 묶여 순식간에 천장 높이 매달려버렸다! 게다가 입도 밧줄로 막혀 목소리가 나오지 않는다."

[[dialogue]]
speaker = "ヨミ"
original = "「あれ？\u3000なんか今、会長の声が聞こえたような……？」"
translation = "「어라? 왠지 지금 회장님 목소리가 들린 것 같은데……?」"

[[dialogue]]
speaker = "ヨミ"
original = "「あっ、せつなさん！\u3000会長を見たりしませんでしたか？」"
translation = "「앗, 세츠나 씨! 회장님 못 보셨나요?」"

[[dialogue]]
speaker = "ヨミ"
original = "「お昼時で料理の匂いが多いので自信はないんですけど、なんだか会長の匂いもするような気がして……くんくん」"
translation = "「점심시간이라 요리 냄새가 많아서 자신은 없지만, 왠지 회장님 냄새도 나는 것 같은 기분이 들어서…… 킁킁」"

[[dialogue]]
speaker = "せつな"
original = "「せつなは見ておりませぬが、なんだかヨミ殿は、そわそわしている様子でござるな？」"
translation = "「세츠나는 보지 못하였으나, 왠지 요미 공은 안절부절못하는 모습이구려?」"

[[dialogue]]
speaker = "ヨミ"
original = "「こやっ！？\u3000そ、そうでしょうか？」"
translation = "「코얏!? 그, 그런가요?」"

[[dialogue]]
speaker = "せつな"
original = "「もうすぐクリスマスでござるが、その日は主様と一緒に過ごしたりしないのでござるか？」"
translation = "「곧 크리스마스이오나, 그날은 주군과 함께 보내지 않는 것이오?」"

[[dialogue]]
speaker = "ヨミ"
original = "「それがまだ、言えてなくて……って、せつなさん、なんでわかるんですか！？」"
translation = "「그게 아직 말을 못 해서…… 어라, 세츠나 씨, 어떻게 아시는 거예요!?」"

[[dialogue]]
speaker = "せつな"
original = "「え？\u3000だって、ヨミ殿と主様は男女のお付き合いをされているのでは？」"
translation = "「예? 그야 요미 공과 주군은 남녀 사이로 사귀고 계신 것 아니오?」"

[[dialogue]]
speaker = "ヨミ"
original = "「ど、どうしてそれを！？\u3000周りには秘密にしてたはずなのに……」"
translation = "「어, 어떻게 그걸!? 주변에는 비밀로 했을 텐데……」"

[[dialogue]]
speaker = "せつな"
original = "「そうだったのでござるか？\u3000最近のヨミ殿は主様といる時、好意が駄々洩れでござったが……ヴィーナスお嬢様や、閃殿も、わかっているご様子でしたし」"
translation = "「그러하였소? 최근의 요미 공은 주군과 있을 때 호감이 뚝뚝 묻어났소만…… 비너스 아가씨나 센 공도 알고 있는 눈치였소.」"

[[dialogue]]
speaker = "ヨミ"
original = "「こっ、こやあぁぁぁーーーっ！？」"
translation = "「코, 코야아아아──!?」"

[[dialogue]]
speaker = "ヨミ"
original = "「ま、待って下さいっ。私ってそんなわかりやすかったですか！？\u3000確かに会長のことは好きですし、付き合い始めてから、もっと好きになってる自覚はありますけど……！」"
translation = "「자, 잠시만요. 제가 그렇게 알기 쉬웠나요!? 확실히 회장님을 좋아하고, 사귀기 시작한 뒤로 더 좋아하게 된 자각은 있지만……!」"

[[dialogue]]
speaker = "せつな"
original = "「それはもう、ヨミ殿が主様と話されている時は、尻尾が嬉しそうにぶんぶんしているでござるから♪」"
translation = "「그건 요미 공이 주군과 이야기할 때 꼬리가 기쁜 듯이 붕붕거리고 있었기 때문이오♪」"

[[dialogue]]
speaker = "ヨミ"
original = "「む、無意識だったぁぁぁーーーっ！\u3000ば……爆裂恥ずかしくて、死にそうです……！」"
translation = "「무, 무의식이었다아아아──! 버…… 폭렬 부끄러워서 죽을 것 같아요……!」"

[[dialogue]]
speaker = "せつな"
original = "「あまりにも露骨な恋愛オーラに、最初はなんと破廉恥なのかと、見ていて顔が熱くなってしまう程でござったが――」"
translation = "「너무나도 노골적인 연애 오라에 처음에는 어찌나 파렴치한지, 보고 있자니 얼굴이 화끈거릴 정도였소만──」"

[[dialogue]]
speaker = "ヨミ"
original = "「破廉恥！？」"
translation = "「파렴치!?」"

[[dialogue]]
speaker = "せつな"
original = "「しかし今では、公衆の面前でも堂々と好意アピールをしてみせるヨミ殿を、せつなは素直に尊敬しているでござる！」"
translation = "「하지만 지금은 대중 앞에서도 당당하게 호감을 어필해 보이는 요미 공을, 세츠나는 솔직하게 존경하고 있소!」"

[[dialogue]]
speaker = "ヨミ"
original = "「いや隠してるつもりだったんですけど！？」"
translation = "「아니, 숨기려고 했던 건데요!?」"

[[dialogue]]
speaker = "せつな"
original = "「これがいわゆる、バカップルというやつなのかと、日々勉強させてもらっているでござる！」"
translation = "「이것이 이른바 바보 커플이라는 것인가 하며 나날이 공부하고 있소!」"

[[dialogue]]
speaker = "ヨミ"
original = "「バカップル認定されてるーーーっ！？\u3000こやあぁぁぁーーーんっ！」"
translation = "「바보 커플 인증받았다아아──! 코야아아아앙!」"

[[dialogue]]
speaker = "せつな"
original = "「ちなみに、前から気になっていたのでござるが、お２人はどのようにして付き合い始めたのでござるか？」"
translation = "「그나저나 전부터 궁금하였소만, 두 분은 어떻게 사귀기 시작한 것이오?」"

[[dialogue]]
speaker = "ヨミ"
original = "「そ、それは……２人で街へ遊びに出かけた時に、会長の方から告白してくれて……」"
translation = "「그, 그건…… 둘이서 시내에 놀러 나갔을 때 회장님이 먼저 고백해 줘서……」"

[[dialogue]]
speaker = "せつな"
original = "「ほう！\u3000さすがは主様でござる！」"
translation = "「호오! 역시 주군이시구려!」"

[[dialogue]]
speaker = "ヨミ"
original = "「一緒にいると安心するから、これからも側にいてくれないかって言ってくれて……私も同じことを思ってたから、嬉しくて……<emoji=heart04>」"
translation = "「함께 있으면 안심되니까 앞으로도 곁에 있어 주지 않겠냐고 말해 줘서…… 저도 같은 생각을 하고 있었기에 기뻐서……<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
original = "「なるほど、お２人はお互いに安心を感じられる関係なのでござるな。それならば――」"
translation = "「과연, 두 분은 서로 안심을 느낄 수 있는 관계이구려. 그렇다면──」"

[[dialogue]]
speaker = "せつな"
original = "「今度のクリスマス、主様もきっと、ヨミ殿と一緒にいたいと思っているはず。素直にヨミ殿の気持ちを伝えてみればいいのでは？」"
translation = "「이번 크리스마스에 주군도 분명 요미 공과 함께 있고 싶어 할 것이오. 솔직하게 요미 공의 마음을 전해 보는 것이 어떻소?」"

[[dialogue]]
speaker = "ヨミ"
original = "「そ、そうなんですけど……いざ言おうと思うと、なんだか恥ずかしくて……」"
translation = "「그, 그렇긴 한데…… 막상 말하려고 하면 왠지 부끄러워서……」"

[[dialogue]]
speaker = "せつな"
original = "「ふむ、恋愛とはやはり心の弱い部分をさらけ出すこと。想いが通じ合った相手も、恥ずかしさを感じてしまうものなのでござるな。実に興味深い――」"
translation = "「흠, 연애란 역시 마음의 약한 부분을 드러내는 것. 마음이 통한 상대에게도 부끄러움을 느껴버리는 것이구려. 실로 흥미롭소──」"

[[dialogue]]
speaker = "せつな"
original = "「というわけで主様、ヨミ殿の気持ちは以上にござりまする！\u3000いま縄を解きますので、少々お待ち下さいませ」"
translation = "「그런 고로 주군, 요미 공의 마음은 이상이오! 지금 밧줄을 풀 터이니 잠시만 기다려 주시구려.」"

[[dialogue]]
speaker = "ヨミ"
original = "「えっ、会長！？\u3000い、一体いつからそこに！？」"
translation = "「엣, 회장님!? 도, 대체 언제부터 거기에!?」"

[[dialogue]]
speaker = "unk"
original = "せつなが天井から降ろしてくれて、俺は自由の身になる。ヨミがせつなと話し始める直前からいたことを告げると――"
translation = "세츠나가 천장에서 내려줘서 나는 자유의 몸이 된다. 요미가 세츠나와 이야기하기 직전부터 있었다고 말하자──"

[[dialogue]]
speaker = "ヨミ"
original = "「と、ということは、さっきの話は全部聞かれて……！？」"
translation = "「그, 그렇다는 건 방금 이야기는 전부 들으셨고……!?」"

[[dialogue]]
speaker = "ヨミ"
original = "「ば、爆裂恥ずかし過ぎますぅ……！」"
translation = "「폭, 폭렬 너무 부끄러워요……!」"

[[dialogue]]
speaker = "せつな"
original = "「すまぬでござる、ヨミ殿。クリスマスをどうするかと主様に聞いたりしないのに、日頃そわそわとタイミングを伺っている様子だったので、つい……♪」"
translation = "「미안하오, 요미 공. 크리스마스를 어찌할지 주군께 묻지도 못하고 매일 안절부절못하며 타이밍을 엿보는 모습이기에 그만……♪」"

[[dialogue]]
speaker = "ヨミ"
original = "「気持ちはありがたいですけどぉ……！\u3000か、会長にはなるべく恋人として良いところを見せたかったっていうか……！」"
translation = "「마음은 감사하지만요……! 회, 회장님께는 가급적 연인으로서 멋진 모습을 보여주고 싶었다고 할까……!」"

[[dialogue]]
speaker = "ヨミ"
original = "「クリスマスが忙しかったりするかもしれないですし、一緒に過ごしたいとか、実は重いかもって考えたりもして、会長の予定がもし空いてたらくらいに自重しようと……！」"
translation = "「크리스마스가 바쁠지도 모르고, 함께 보내고 싶다는 게 사실은 무거울지도 모른다고 생각해서, 회장님 일정이 혹시 비어있다면 정도로 자제하려고……!」"

[[dialogue]]
speaker = "unk"
original = "実は俺も、言い出せないでいた"
translation = "사실 나도 말을 꺼내지 못하고 있었어."

[[dialogue]]
speaker = "ヨミ"
original = "「え？\u3000会長も、ですか……？」"
translation = "「에? 회장님도요……?」"

[[dialogue]]
speaker = "ヨミ"
original = "「――そ、そっか……私たち、お互いに同じことを考えてたんですね……」"
translation = "「──그, 그렇구나…… 우리 서로 같은 생각을 하고 있었네요……」"

[[dialogue]]
speaker = "unk"
original = "俺は正直に「クリスマスの日、ヨミと一緒に過ごしたい」と気持ちを伝える。"
translation = "나는 솔직하게 「크리스마스 날, 요미와 함께 보내고 싶어」라고 마음을 전한다."

[[dialogue]]
speaker = "ヨミ"
original = "「あ……！」"
translation = "「아……!」"

[[dialogue]]
speaker = "ヨミ"
original = "「はい……♪\u3000私も、会長とクリスマスを過ごしたいです……<emoji=heart04>」"
translation = "「네……♪ 저도 회장님과 크리스마스를 보내고 싶어요……<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
original = "「ヨミ殿、よかったでござるな♪」"
translation = "「요미 공, 잘되었구려♪」"

[[dialogue]]
speaker = "ヨミ"
original = "「えへへ……♪\u3000はい……♪」"
translation = "「에헤헤……♪ 네……♪」"

[[dialogue]]
speaker = "ヨミ"
original = "「その……会長。クリスマス、楽しみにしてますね……♪」"
translation = "「그…… 회장님. 크리스마스 기대하고 있을게요……♪」"

[[dialogue]]
speaker = "unk"
original = "照れながらも、嬉しそうに尻尾を振るヨミなのだった――"
translation = "수줍어하면서도 기쁜 듯 꼬리를 흔드는 요미였다──"

