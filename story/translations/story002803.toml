[[dialogue]]
speaker = "？？？"
original = "「私は、この深淵書庫の管理システム」"
translation = "「나는 이 심연서고의 관리 시스템」"

[[dialogue]]
speaker = "ウィステリア"
original = "「管理システム……？\u3000ここにそんなのいたのね。ところで、見覚えのある角と翼だけど、関係あるのかしら？」"
translation = "「관리 시스템……? 여기에 그런 게 있었구나. 그런데 낯익은 뿔과 날개인데, 관계가 있는 걸까?」"

[[dialogue]]
speaker = "管理システム"
original = "「意外と目敏いのね。あなたの想像の通りよ。煌竜ヴィライアの因子から私は生まれた」"
translation = "「의외로 눈썰미가 좋구나. 네 짐작대로야. 황룡 빌라이아의 인자로부터 내가 태어났다」"

[[dialogue]]
speaker = "管理システム"
original = "「ヴィライアはかつてのリクリエにおいて、文明を滅ぼした厄災の化身。世界を焼き尽くし、ヴィライアは眠りに就いた」"
translation = "「빌라이아는 과거의 리크리에 당시 문명을 멸망시킨 재앙의 화신. 세계를 불태우고 빌라이아는 잠에 들었다」"

[[dialogue]]
speaker = "管理システム"
original = "「ヴィライアは眠ったまま、リクリエで滅びた世界とともにフィーニスの塔に格納され、永い時間が流れた。そして、世界に文明が満ちたことで覚醒した」"
translation = "「빌라이아는 잠든 채 리크리에로 멸망한 세계와 함께 피니스의 탑에 격납되어 긴 시간이 흘렀다. 그리고 세계에 문명이 가득 차면서 각성했다」"

[[dialogue]]
speaker = "管理システム"
original = "「<ruby>書庫<rt>私</rt></ruby>はそれを察知し、ヴィライアを倒すべく、あなたをフィーニスの塔に送り込んだ」"
translation = "「서고는 그것을 감지하고 빌라이아를 쓰러뜨리기 위해 너를 피니스의 탑에 보냈다」"

[[dialogue]]
speaker = "ウィステリア"
original = "「えぇっ！？\u3000あれ、フィーニスの塔の中だったの！？」"
translation = "「에엣!? 거기가 피니스의 탑 안이었어!?」"

[[dialogue]]
speaker = "管理システム"
original = "「ヴィライアを倒すことができなかったあなたは、ヴィライアを呪いの鎖で縛り、封印した」"
translation = "「빌라이아를 쓰러뜨리지 못한 너는 빌라이아를 저주의 사슬로 묶어 봉인했다」"

[[dialogue]]
speaker = "管理システム"
original = "「あれがなければ、魔王の覚醒を待たず世界は滅んでいたでしょう。自覚がないようだけれど、あなたはすでに世界を救った『英雄』よ」"
translation = "「그게 없었다면 마왕의 각성을 기다리지 못하고 세계는 멸망했을 터. 자각이 없는 모양이다만 너는 이미 세계를 구한 『영웅』이다」"

[[dialogue]]
speaker = "ウィステリア"
original = "「はぁ！？\u3000英雄なんて願い下げよ！」"
translation = "「하아!? 영웅 따위 사양이야!」"

[[dialogue]]
speaker = "ウィステリア"
original = "「『千年に一度の英雄』だの、『ミレニアム・ワン』だの、そういうのは余所でやって。私はただ普通の幸せが欲しいだけなの」"
translation = "「『천년에 한 번 나올 영웅』인지 『밀레니아움 원』인지 뭔지는 다른 데 가서 해. 나는 그냥 평범한 행복을 원할 뿐이라고」"

[[dialogue]]
speaker = "管理システム"
original = "「封印されたヴィライアは、魔王一派によって倒された」"
translation = "「봉인된 빌라이아는 마왕 일파에 의해 쓰러졌다」"

[[dialogue]]
speaker = "管理システム"
original = "「ヴィライアの因子と魔力は鎖を通してこの書庫に『収蔵』され、そして管理システムとして私が実体化した」"
translation = "「빌라이아의 인자와 마력은 사슬을 통해 이 서고에 『수장』되었고, 그리고 관리 시스템으로서 내가 실체화했다」"

[[dialogue]]
speaker = "ウィステリア"
original = "「……待って。私の鎖に吸収された魔力が、どうしてこの書庫に送られるの？」"
translation = "「……잠깐. 내 사슬에 흡수된 마력이 어째서 이 서고로 보내지는 거야?」"

[[dialogue]]
speaker = "管理システム"
original = "「簡単なことよ。あなたの持つ魔導書は、この書庫の『鍵』なのだから」"
translation = "「간단한 일이야. 네가 가진 마도서는 이 서고의 『열쇠』니까」"

[[dialogue]]
speaker = "ウィステリア"
original = "「どういうこと？\u3000私の魔導書は、魔界の実家にあったもの。だけどこの書庫は新星学園の地下にある……私の魔導書と何の関係が？」"
translation = "「무슨 소리야? 내 마도서는 마계의 본가에 있던 거야. 하지만 이 서고는 신성학원 지하에 있고…… 내 마도서랑 무슨 상관인데?」"

[[dialogue]]
speaker = "管理システム"
original = "「あなたの再就職先にこの書庫があったのは偶然ではないわ。あなたがここに辿り着くように、呪いが因果を手繰り寄せたの」"
translation = "「네 재취업 자리에 이 서고가 있었던 건 우연이 아니야. 네가 이곳에 도달하도록 저주가 인과를 끌어당긴 거지」"

[[dialogue]]
speaker = "ウィステリア"
original = "「じゃあ、最初の就職先が潰れたのも呪いのせいってわけ？\u3000私が就職する前から経営状態は悪かったはずだけど」"
translation = "「그럼 첫 번째 직장이 망한 것도 저주 때문이라는 거야? 내가 취직하기 전부터 경영 상태는 나빴던 걸로 아는데」"

[[dialogue]]
speaker = "管理システム"
original = "「それも呪いによって歪められた因果。すべての呪いはあなたをここに導くためにあった。それ以外の不運はその余波に過ぎない」"
translation = "「그것 또한 저주에 의해 왜곡된 인과. 모든 저주는 너를 이곳으로 인도하기 위해 존재했다. 그 외의 불운은 그 여파에 불과해」"

[[dialogue]]
speaker = "ウィステリア"
original = "「はぁ！？\u3000とんだとばっちりじゃない！！\u3000そのせいで私の人生踏んだり蹴ったりなのに！\u3000あと前の会社の人ごめんなさい！」"
translation = "「하아!? 순 억지 아냐!! 그 때문에 내 인생이 엉망진창인데! 그리고 전 직장 사람들 미안해요!」"

[[dialogue]]
speaker = "ウィステリア"
original = "「で、この書庫は一体なんなの？\u3000管理システムなんだから、当然知っているんでしょう？\u3000答えてくれないなら、力ずくで聞くことになるけど」"
translation = "「그래서 이 서고는 도대체 뭔데? 관리 시스템이니까 당연히 알고 있겠지? 대답 안 해주면 힘으로라도 듣게 되겠지만」"

[[dialogue]]
speaker = "管理システム"
original = "「欲するなら答えましょう」"
translation = "「원한다면 대답해주마」"

[[dialogue]]
speaker = "管理システム"
original = "「この書庫は、リクリエで滅びた魔族の成れの果て。怨嗟と嘆きを収蔵する書庫よ」"
translation = "「이 서고는 리크리에로 멸망한 마족의 말로. 원사와 한탄을 수장하는 서고다」"

[[dialogue]]
speaker = "ウィステリア"
original = "「魔族の、成れの果て？」"
translation = "「마족의 말로?」"

[[dialogue]]
speaker = "管理システム"
original = "「森羅暦より過去の世界……玄武暦……朱雀暦……さらにそれより以前から、<ruby>厄災<rt>リクリエ</rt></ruby>は悠久の時を超えて繰り返されてきた」"
translation = "「삼라력보다 과거의 세계…… 현무력…… 주작력…… 그보다 더 이전부터 재앙은 유구한 시간을 넘어 반복되어 왔다」"

[[dialogue]]
speaker = "管理システム"
original = "「リクリエで魔族が滅ぼされる度、本は増えていく。魔族たちの無念を綴じて、呪いを秘めた魔本たちが」"
translation = "「리크리에로 마족이 멸망할 때마다 책은 늘어간다. 마족들의 원념을 엮어 저주를 감춘 마본들이」"

[[dialogue]]
speaker = "管理システム"
original = "「ここは、リクリエに滅ぼされた幾万幾億の魔族の魔力と魔法、そして怨嗟を本にして収蔵する、呪いの書庫よ」"
translation = "「이곳은 리크리에에 멸망한 수만 수억 마족의 마력과 마법, 그리고 원사를 책으로 만들어 수장하는 저주의 서고다」"

[[dialogue]]
speaker = "ウィステリア"
original = "「この本の全てが、呪いの本だっていうの！？」"
translation = "「이 책 전부가 저주의 책이라는 거야!?」"

[[dialogue]]
speaker = "管理システム"
original = "「ええ、そう。今は眠っているから魔力は封じられているけど、目覚めれば嫌でも解るわ」"
translation = "「그래. 지금은 잠들어 있어서 마력이 봉인되어 있지만, 깨어나면 싫어도 알게 될 거다」"

[[dialogue]]
speaker = "管理システム"
original = "「私たちの悲願はリクリエの打倒。私たちを滅ぼし続けたものを、滅ぼす」"
translation = "「우리의 비원은 리크리에의 타도. 우리를 계속 멸망시켜 온 것을 멸망시킨다」"

[[dialogue]]
speaker = "管理システム"
original = "「そのために、呪いを受け入れる『器』が必要だった」"
translation = "「그를 위해 저주를 받아들일 『그릇』이 필요했다」"

[[dialogue]]
speaker = "ウィステリア"
original = "「……で、この魔導書の出番ってわけね」"
translation = "「……그래서 이 마도서가 나설 차례라는 거네」"

[[dialogue]]
speaker = "管理システム"
original = "「その通りよ。その魔導書は深淵書庫の一部でありながら、書庫の外で器を探す外典。その魔導書を使いこなす者こそ、私たちの器」"
translation = "「그렇다. 그 마도서는 심연서고의 일부이면서 서고 밖에서 그릇을 찾는 외전. 그 마도서를 자유자재로 다루는 자야말로 우리의 그릇」"

[[dialogue]]
speaker = "管理システム"
original = "「あなたはヴィライアと戦い、『千年に一度の英雄』と呼ばれる存在になった」"
translation = "「너는 빌라이아와 싸워 『천년에 한 번 나올 영웅』이라 불리는 존재가 되었지」"

[[dialogue]]
speaker = "管理システム"
original = "「だけど『千年に一度』程度では足りない。あなたは永遠に語り継がれる、無二の英雄になる必要がある」"
translation = "「하지만 『천년에 한 번』 정도로는 부족하다. 너는 영원히 회자될 유일무이한 영웅이 될 필요가 있어」"

[[dialogue]]
speaker = "管理システム"
original = "「私たちを受け入れなさい、ウィステリア。そうすれば、あなたはもっと強くなれる。そしてリクリエを滅ぼす『英雄』になるの」"
translation = "「우리를 받아들여라, 위스테리아. 그러면 너는 더 강해질 수 있다. 그리고 리크리에를 멸망시킬 『영웅』이 되는 거다」"

[[dialogue]]
speaker = "ウィステリア"
original = "「強さなんて求めてないって何度も言ってるでしょ！\u3000永遠に語り継がれるとか死んでもごめんだわ！」"
translation = "「강함 같은 건 원하지 않는다고 몇 번이나 말했잖아! 영원히 회자된다니 죽어도 사양이야!」"

[[dialogue]]
speaker = "ウィステリア"
original = "「というか、この魔導書一冊だけでも何度も死にかけたのに、こんなもの１人で受け入れたら廃人まっしぐらじゃない！\u3000イヤよ、絶対！」"
translation = "「애초에 이 마도서 한 권만으로도 몇 번이나 죽을 뻔했는데, 이런 걸 혼자서 받아들였다간 폐인 확정이잖아! 싫어, 절대!」"

[[dialogue]]
speaker = "管理システム"
original = "「そうね。呪いを受け入れれば、あなたはリクリエと戦うだけの存在になる。だけどあなた１人の犠牲で済むなら安いものでしょう？」"
translation = "「그렇지. 저주를 받아들이면 너는 리크리에와 싸우기 위한 존재가 된다. 하지만 너 한 명의 희생으로 끝난다면 싼 것 아니겠나?」"

[[dialogue]]
speaker = "管理システム"
original = "「私たちを拒絶しようとしても無駄。力ずくでも受け入れてもらうわ」"
translation = "「우리를 거부하려 해도 소용없다. 힘으로라도 받아들이게 하겠다」"

[[dialogue]]
speaker = "ヴィライア"
original = "『あなたが挑むのは、世界を滅ぼした厄災そのもの。果たして、どこまで抗えるかしら？』"
translation = "『네가 맞서는 것은 세계를 멸망시킨 재앙 그 자체. 과연 어디까지 저항할 수 있을까?』"

[[dialogue]]
speaker = "ウィステリア"
original = "「！\u3000煌竜ヴィライア……まったく、私ってば本当に運が悪いわ」"
translation = "「! 황룡 빌라이아…… 정말이지 난 운도 지지리도 없네」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ああもう、どうせやるしかないんでしょ！\u3000こうなったらやってやるわ！」"
translation = "「아 정말, 어차피 해야 할 수밖에 없는 거지! 이렇게 된 이상 해주겠어!」"

