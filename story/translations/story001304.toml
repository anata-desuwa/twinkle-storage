[[dialogue]]
speaker = "unk"
original = "一方、マトイと同じくビーチバレー特訓を受けているアムはというと――"
translation = "한편 마토이와 마찬가지로 비치발리볼 특훈을 받고 있는 아무는──"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「とりゃあぁぁぁーーーっ！」"
translation = "「이랴아아아아────!」"

[[dialogue]]
speaker = "unk"
original = "気合いのかけ声と共に、マムの放つビーチボール千本ノックを弾いて行く。"
translation = "기합 소리와 함께 마무가 날리는 비치볼 수천 발을 튕겨내고 있었다."

[[dialogue]]
speaker = "unk"
original = "途中、盾だけでは手数が足りなくなったところで――"
translation = "도중에 방패만으로는 손이 부족해진 지점에서──"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「重力バリアー、全面展開！」"
translation = "「중력 배리어, 전면 전개!」"

[[dialogue]]
speaker = "unk"
original = "アムの周囲に球形のバリアーが張られ、複数のビーチボールを防ぎ切ってみせた。"
translation = "아무의 주변에 구 형태의 배리어가 쳐져 여러 개의 비치볼을 다 막아내 보였다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「えへへっ、よし！\u3000今回はノーミスで防衛成功！\u3000どうですか、マム！」"
translation = "「에헤헤, 좋아! 이번에는 노 미스로 방어 성공! 어때요, 마무!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「悪くないわね。あなたの反射神経は強い武器よ。ただ、それに任せて雑な行動選択も少なくない」"
translation = "「나쁘지 않네. 네 반사 신경은 강력한 무기야. 다만 그것에만 의지해서 소홀한 행동 선택도 적지 않아.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「その結果、最後に危なくなったら重力操作に頼るというパターンが多くなっているわ」"
translation = "「그 결과 마지막에 위험해지면 중력 조작에 의지하는 패턴이 많아지고 있어.」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「ふむふむ……」"
translation = "「흐음흐음……」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「だから、反射神経はそのままに、頭もちゃんと使うようにしなさい。がむしゃらに動くだけでなく、どう防ぐのが最適か考えるの」"
translation = "「그러니 반사 신경은 그대로 두되 머리도 제대로 쓰도록 해. 무작정 움직이는 것뿐만 아니라 어떻게 막는 것이 최적인지 생각하는 거야.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「重力バリアーの全面展開は、星力の消耗が大きいはず。そして、発動後に一点突破の強力な攻撃が来たら、力が分散しているから防ぎ切れず突破される」"
translation = "「중력 배리어의 전면 전개는 성력 소모가 클 터. 그리고 발동 후에 일점 돌파의 강력한 공격이 오면 힘이 분산되어 있기에 다 막아내지 못하고 돌파당해.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「それはすなわち、あなたの防御に隙ができているということよ。あなたのライバルだっていう、エルデリーゼの『最強の矛』をそれで防ぎ切れるかしら？」"
translation = "「그것은 즉 네 방어에 틈이 생겼다는 소리야. 네 라이벌이라는 엘데리제의 『최강의 창』을 그걸로 다 막아낼 수 있겠니?」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「……！\u3000いや、エルゼの<ruby>矛<rt>グレイブ</rt></ruby>なら貫いてきます！\u3000絶対に！」"
translation = "「……! 아뇨, <ruby>엘제의 창<rt>그레이브</rt></ruby>이라면 꿰뚫어 올 거예요! 절대로!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「なら、重力操作の全面展開は、可能な限り使わないように心がけなさい」"
translation = "「그렇다면 중력 조작의 전면 전개는 가능한 한 쓰지 않도록 마음가렴.」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「イエス・マム！」"
translation = "「예스 마무!」"

[[dialogue]]
speaker = "unk"
original = "そうして、アドバイスを受け、再度ビーチボールの千本ノックに挑んだアムは――"
translation = "그렇게 조언을 받고 다시 비치볼 수천 발 노크에 도전한 아무는──"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「よし、頭をちゃんと使って――とりゃあぁぁぁっ！」"
translation = "「좋아, 머리를 제대로 써서── 이랴아아앗!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「ヘディングブロック！！！」"
translation = "「헤딩 블로킹!!!」"

[[dialogue]]
speaker = "unk"
original = "頭を使うってそういうこと！？"
translation = "머리를 쓴다는 게 그런 뜻이었어!?"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「アム、そうじゃないわ。もう１度説明するから聞きなさい」"
translation = "「아무, 그게 아니야. 다시 한번 설명할 테니 잘 들으렴.」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「イエス、マム！」"
translation = "「예스, 마무!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「返事はいいのよね、この子……」"
translation = "「대답은 참 잘한다니까, 이 아이……」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「えへへ♪\u3000それ程でも～♪」"
translation = "「에헤헤♪ 그 정도까지는~♪」"

[[dialogue]]
speaker = "unk"
original = "それからしばらく訓練を続け、アムはマトイと交代して休憩となった。"
translation = "그러고 나서 한동안 훈련을 계속한 뒤, 아무는 마토이와 교대하여 휴식을 취하게 되었다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「ふんふんふふ～ん♪\u3000ご飯～、ご飯～♪」"
translation = "「흥흥흐흥~♪ 밥이다~ 밥~♪」"

[[dialogue]]
speaker = "unk"
original = "アム、お疲れ様"
translation = "아무, 수고했어."

[[dialogue]]
speaker = "unk"
original = "海の家の中で休んでいる彼女に、俺は声をかける。"
translation = "바다의 집 안에서 쉬고 있는 그녀에게 내가 말을 건다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あっ、会長～！\u3000会長もお昼ご飯食べに来たの？」"
translation = "「앗, 회장님~! 회장님도 점심 먹으러 온 거야?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ヘイ、オマチドウでーす！\u3000アムの注文した、ハンバーグカレーですよ～♪」"
translation = "「헤이, 오래 기다리셨습니돠! 아무가 주문한 햄버그 카레입니돠요~♪」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「わ～い♪\u3000リップル先輩、ありがとうございます！\u3000美味しそ～って、ハッ……！？」"
translation = "「와아~♪ 리플 선배, 감사합니다! 맛있겠── 헉……!?」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「か、会長！\u3000言っとくけど、これはたまたまだから！」"
translation = "「회, 회장님! 말해두겠는데 이건 어쩌다 보니까 그런 거니까!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「――何がって……その、ハンバーグカレー！\u3000今日はたまたまそういう気分だっただけで、いつも頼んでるというわけじゃないから！」"
translation = "「──뭐가냐니…… 그, 햄버그 카레! 오늘은 마침 그런 기분이었을 뿐이지 늘 시킨다는 건 아니니까!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「って会長、何その全部わかってますよって顔は！？\u3000子供っぽいとか思ってるでしょ、絶対！？」"
translation = "「아니 회장님, 왜 다 알고 있다는 표정인 거야!? 어린애 같다고 생각하고 있지, 분명히!?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「アムはいつも、ＢＩＧ美味しそうに食べてくれるから、ワタシ嬉しいで～す♪」"
translation = "「아무는 항상 BIG 맛있게 먹어줘서 저는 기쁩니돠~♪」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「ちょっ、リップル先輩、言わないで！」"
translation = "「잠깐, 리플 선배, 말하지 마세요!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ふふっ、テヘペロで～す♪」"
translation = "「후훗, 데헤페로입니돠~♪」"

[[dialogue]]
speaker = "unk"
original = "せっかくだし、俺も同じのを頼もうかな"
translation = "모처럼이니, 나도 같은 걸 주문해 볼까."

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ヘイ、会長、ご注文アザマース！\u3000ただいま作ってキマスね～♪」"
translation = "「헤이, 회장님, 주문 아자마스(감사함다)! 지금 바로 만들어 올게용~♪」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「も、もう！\u3000――ところで会長、聞いたよ！\u3000あたしが休憩してて見てなかった時に、マムと水着フォームで戦ったらしいじゃん？」"
translation = "「정, 정말! ──그건 그렇고 회장님, 들었어! 내가 휴게 중이라 못 봤을 때, 마무랑 수영복 폼으로 싸웠다며?」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あたしもまだ勝負してなかったのに、ずるい！\u3000会長の水着フォーム！」"
translation = "「나도 아직 승부 안 했는데 치사해! 회장님의 수영복 폼!」"

[[dialogue]]
speaker = "unk"
original = "そう、俺にも同じように、以前手に入れた『水着フォーム』が存在する。"
translation = "그렇다, 나에게도 마찬가지로 이전에 손에 넣은 『수영복 폼』이 존재한다."

[[dialogue]]
speaker = "unk"
original = "俺の海パンのことが……！"
translation = "내 수영복 바지 상태가……!"

[[dialogue]]
speaker = "unk"
original = "ふっ、そんなに気になるのか"
translation = "훗, 그렇게 신경 쓰이는 건가."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「いや、気になるのは能力の方だからね！？\u3000海パン自体じゃないから！」"
translation = "「아니, 신경 쓰이는 건 능력 쪽이니까!? 수영복 바지 자체가 아니라고!」"

[[dialogue]]
speaker = "unk"
original = "俺の海パン――水着フォームの能力は、守護星である地球上の概念『夏』を力に変換することだと、アムに説明する。"
translation = "내 수영복 바지── 수영복 폼의 능력은, 수호성인 지구상의 개념 『여름』을 힘으로 변환하는 것이라고 아무에게 설명한다."

[[dialogue]]
speaker = "unk"
original = "リップルの言葉を借りるなら、『夏パワー』と言うべき力。それを星力にプラスして使うことができる。"
translation = "리플의 말을 빌리자면, 『여름 파워』라고 불러야 할 힘. 그것을 성력에 더해서 사용할 수 있다."

[[dialogue]]
speaker = "unk"
original = "簡単に言うなら、通常戦闘服の２倍の出力で戦えるのだ。"
translation = "간단히 말하자면, 통상 전투복의 2배 출력으로 싸울 수 있는 것이다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「えっ、２倍って単純だけど、めっちゃ強くない！？\u3000――他にも、夏パワーを使ったサマースキルを発動できる？\u3000なにそれ見たい！」"
translation = "「엣, 2배라니 단순하지만 엄청 강하지 않아!? ──그 외에도, 여름 파워를 사용한 서머 스킬을 발동할 수 있어? 뭐야 그거 보고 싶어!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「――ただし、夏の期間しか力を発揮できない？\u3000なるほど、季節限定だからこその強さってことか……」"
translation = "「──다만, 여름 기간에만 힘을 발휘할 수 있다구? 과연, 계절 한정이기에 가능한 강력함이라는 건가……」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「そう聞くと、ますます勝負したくなってきたかも！\u3000会長はあたしのライバルでもあるわけだし、マムとだけ戦うなんてずるいもん！」"
translation = "「그렇게 들으니까 점점 더 승부하고 싶어졌을지도! 회장님은 내 라이벌이기도 한 셈이고, 마무랑만 싸우는 건 치사하니까!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あと……マトイ先輩が見たって言ってたけど、なんかマムの水着姿もベタ褒めしてたらしいじゃん！？\u3000あたしのはまだ褒めてもらってないのに！」"
translation = "「그리고…… 마토이 선배가 봤다고 하던데, 왠지 마무의 수영복 차림도 엄청 칭찬했다며!? 내 건 아직 칭찬 못 받았는데!」"

[[dialogue]]
speaker = "unk"
original = "あれ？\u3000似合ってるって言わなかったっけ？"
translation = "어라? 잘 어울린다고 말하지 않았나?"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「確かに言われたけど、それだけだし！\u3000学園指定のスク水がカッコいいのは当然だけど、もっとこう……他にもあるでしょ！\u3000あたしだって、レディなんだし……」"
translation = "「확실히 듣긴 했지만, 그게 다였잖아! 학원 지정 학교 수영복이 멋진 건 당연하지만, 좀 더 이렇게…… 다른 것도 있잖아! 나도 숙녀라구……」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「って、なんで笑ってるのさ！？\u3000もしかしてまた、子供っぽいとか思ってる！？\u3000あたしは別に、拗ねてるわけじゃないからね！？」"
translation = "「근데 왜 웃는 거야!? 설마 또 어린애 같다고 생각하는 거지!? 난 딱히 삐진 게 아니니까 말이야!?」"

[[dialogue]]
speaker = "unk"
original = "ごめん。でも――"
translation = "미안. 하지만──"

[[dialogue]]
speaker = "unk"
original = "アムらしい水着で、ちゃんと可愛いなって思ってるよ――俺はそう伝える。"
translation = "아무다운 수영복이라서 정말 귀엽다고 생각하고 있어── 나는 그렇게 전한다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「っ……！」"
translation = "「윽……!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「ま、まあ、それ程でもあるけどねっ……えへへ」"
translation = "「뭐, 뭐어, 그 정도까진 아니지만 말이야…… 에헤헤」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「――い、いや、照れてないよ！？」"
translation = "「──아, 아니, 부끄러워하는 거 아니거든!?」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「とにかく！\u3000お昼ご飯食べ終わったら、あたしと勝負だからね、会長っ。――いただきます！」"
translation = "「어쨌든! 점심 다 먹으면 나랑 승부하는 거야, 회장님. ──잘 먹겠습니다!」"

[[dialogue]]
speaker = "unk"
original = "照れてるのを誤魔化すようにカレーを頬張るアムを見て、やっぱり可愛いと思ってしまう俺なのだった。"
translation = "부끄러워하는 걸 얼버무리듯 카레를 입안 가득 넣는 아무를 보며, 역시 귀엽다고 생각하고 마는 나였다."

