[[dialogue]]
speaker = "unk"
original = "第３話,聖女の艶姿？,P"
translation = "제3화, 성녀의 요염한 자태?, P"

[[dialogue]]
speaker = "フワッチ"
original = "「イ～～～～ッ！」"
translation = "「이이이익!」"

[[dialogue]]
speaker = "イレーナ"
original = "「皆さん、下がってください。ここは私たちがお守りします」"
translation = "「여러분, 물러나세요. 여기는 저희가 지키겠습니다.」"

[[dialogue]]
speaker = "イレーナ"
original = "「聖なる闇よ──プリガーレ・アンドロメダ！」"
translation = "「성스러운 어둠이여── 프리가레 안드로메다!」"

[[dialogue]]
speaker = "シャロン"
original = "「おお、さすがイレーナさま、十字架の剣で結界を！\u3000モンスターを寄せ付けません！」"
translation = "「오오, 역시 이레나 님, 십자가 검으로 결계를! 몬스터를 접근시키지 않아요!」"

[[dialogue]]
speaker = "シャロン"
original = "「私も負けていられませんね！\u3000クロススプラッシュ！」"
translation = "「저도 지고 있을 순 없죠! 크로스 스플래시!」"

[[dialogue]]
speaker = "フワッチ"
original = "「イ～～……」"
translation = "「이이잉……」"

[[dialogue]]
speaker = "unk"
original = "聖女とシスターのコンビが頼もしい。"
translation = "성녀와 시스터 콤비가 든든하다."

[[dialogue]]
speaker = "unk"
original = "だけど──"
translation = "하지만──"

[[dialogue]]
speaker = "イレーナ"
original = "「会長さん、どうされました？\u3000先ほどから集中できていないようですが、気になることがあるなら仰ってください」"
translation = "「회장님, 무슨 일이신가요? 아까부터 집중하지 못하시는 것 같은데, 신경 쓰이는 게 있다면 말씀해 주세요.」"

[[dialogue]]
speaker = "unk"
original = "前から思ってんだけど……"
translation = "전부터 생각했는데……"

[[dialogue]]
speaker = "イレーナ"
original = "「はい？」"
translation = "「네?」"

[[dialogue]]
speaker = "unk"
original = "聖女とシスターなのに露出度高くない？"
translation = "성녀랑 시스터치고는 노출도가 너무 높지 않아?"

[[dialogue]]
speaker = "イレーナ"
original = "「はぁっ──！？」"
translation = "「하앗──!?」"

[[dialogue]]
speaker = "イレーナ"
original = "「あんた何言って──な、何をおっしゃるのですか。これは星騎士としての正装。世界を守るという責務を果たすために──」"
translation = "「당신 무슨 소리를── 무, 무슨 말씀을 하시는 건가요. 이것은 성기사로서의 정장. 세계를 지킨다는 책무를 다하기 위해──」"

[[dialogue]]
speaker = "シャロン"
original = "「よくぞ聞いてくれました！！」"
translation = "「잘 물어봐 주셨습니다!!」"

[[dialogue]]
speaker = "イレーナ"
original = "「ひゃあっ！？」"
translation = "「히얏!?」"

[[dialogue]]
speaker = "シャロン"
original = "「子どもは風の子といいます。ほら、冬なのに短パンで風邪をひかない子っているじゃないですか」"
translation = "「아이들은 바람의 아이라는 말이 있죠. 보세요, 겨울인데도 반바지 차림으로 감기에 걸리지 않는 아이들이 있잖아요.」"

[[dialogue]]
speaker = "シャロン"
original = "「ですから私も露出を多くして体を強くしようと思ったのです！」"
translation = "「그래서 저도 노출을 많이 해서 몸을 튼튼하게 하려고 생각한 것입니다!」"

[[dialogue]]
speaker = "イレーナ"
original = "「そ、そうなのですか、それは初耳でしたね……。ですが子どもは元気だから薄着なのであって、薄着だから元気なのではない気が……」"
translation = "「그, 그런 건가요, 그건 처음 듣는 이야기네요……. 하지만 아이들은 건강하니까 얇게 입는 거지, 얇게 입어서 건강한 건 아닌 것 같은 기분이……」"

[[dialogue]]
speaker = "ビュンタ"
original = "「イーーーッ！」"
translation = "「이이익!」"

[[dialogue]]
speaker = "イレーナ"
original = "「邪魔しないでください」"
translation = "「방해하지 마세요.」"

[[dialogue]]
speaker = "ビュンタ"
original = "「イ～～……」"
translation = "「이이잉……」"

[[dialogue]]
speaker = "イレーナ"
original = "（ヘンタイ！\u3000スケベ！\u3000バカ！\u3000こんな時に何言ってんの！）"
translation = "(변태! 변태! 바보! 이럴 때 무슨 소릴 하는 거야!)"

[[dialogue]]
speaker = "unk"
original = "そのおっぱいで聖女とシスターは無理が……"
translation = "그 가슴으로 성녀랑 시스터는 무리가 좀……"

[[dialogue]]
speaker = "イレーナ"
original = "（はぁっ！？\u3000どこ見てんのよ、このセクハラ星徒会長！）"
translation = "(하앗!? 어딜 보고 있는 거야, 이 성희롱 성도회장!)"

[[dialogue]]
speaker = "シャロン"
original = "「はは、時々言われます！\u3000ちなみにスリーサイズは上から──」"
translation = "「하하, 가끔 듣는 소리입니다! 참고로 쓰리 사이즈는 위에서부터──」"

[[dialogue]]
speaker = "イレーナ"
original = "「言わなくていいんですよ、シスターシャロン」"
translation = "「안 말해도 돼요, 시스터 샤론.」"

[[dialogue]]
speaker = "シャロン"
original = "「そういえば、イレーナさまは肩こりなどありますか？\u3000調べてみたら胸の重さが原因だそうでして、イレーナさまももしかしてお悩みではないかと」"
translation = "「그러고 보니, 이레나 님은 어깨 결림 같은 거 없으신가요? 조사해 보니 가슴 무게가 원인이라고 하던데, 이레나 님도 혹시 고민하고 계신 게 아닐까 해서요.」"

[[dialogue]]
speaker = "イレーナ"
original = "「あの？\u3000シスターシャロン？\u3000胸の話はまた後でお願いできますか」"
translation = "「저기요? 시스터 샤론? 가슴 이야기는 나중에 부탁해도 될까요?」"

[[dialogue]]
speaker = "イレーナ"
original = "（こっち見てるのわかってるわよ、エロ魔王！\u3000あんたはモンスターの相手してなさい！）"
translation = "(이쪽 보고 있는 거 다 안다고, 에로 마왕! 당신은 몬스터나 상대하고 있어!)"

[[dialogue]]
speaker = "ダークキングフワッチ"
original = "「～～～～～～ッ！」"
translation = "「~~~~~~~~익!」"

[[dialogue]]
speaker = "イレーナ"
original = "「――ッ！？\u3000またモンスターが出てきて……もう何が何だか……」"
translation = "「──윽!? 또 몬스터가 나타나서…… 이제 뭐가 뭔지……」"

[[dialogue]]
speaker = "シャロン"
original = "「これは強敵。力を合わせて戦わないといけませんね」"
translation = "「이건 강적이네요. 힘을 합쳐 싸워야겠어요.」"

[[dialogue]]
speaker = "シャロン"
original = "「ところで私はブラジャーはＦカップなのですが、最近入らなくなってきて、上のサイズが必要かと考えております」"
translation = "「그나저나 저는 브래지어가 F컵인데, 최근에 작아지기 시작해서 더 큰 사이즈가 필요할까 생각 중입니다.」"

[[dialogue]]
speaker = "イレーナ"
original = "「シスターシャロン。戦闘に集中しましょう」"
translation = "「시스터 샤론. 전투에 집중합시다.」"

[[dialogue]]
speaker = "シャロン"
original = "「イレーナさまもブラジャーはＦでしたっけ？」"
translation = "「이레나 님도 브래지어는 F였던가요?」"

[[dialogue]]
speaker = "イレーナ"
original = "「シャ・ロ・ン・さ・ん？」"
translation = "「샤·론·씨?」"

[[dialogue]]
speaker = "ダークキングフワッチ"
original = "「～～～～～ッ！！」"
translation = "「~~~~~~~~익!!」"

[[dialogue]]
speaker = "イレーナ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "イレーナ"
original = "「破滅の化身よ、安らかに眠りなさい。ミゼルコルディア・ヴィオーラ！」"
translation = "「파멸의 화신이여, 편히 잠드소서. 미제리코르디아 비올라!」"

[[dialogue]]
speaker = "ダークキングフワッチ"
original = "「ーーーーッ」"
translation = "「──윽」"

[[dialogue]]
speaker = "イレーナ"
original = "「ふぅ……ようやく終わりましたね。厳しい戦いでした」"
translation = "「후우…… 겨우 끝났네요. 힘든 싸움이었어요.」"

[[dialogue]]
speaker = "イレーナ"
original = "「どうしました、会長さん？\u3000まだ何か言いたいことがあるのですか？\u3000この際ですから何でもお聞きしますよ」"
translation = "「왜 그러시죠, 회장님? 아직 더 하고 싶은 말이 있나요? 이왕 이렇게 된 거 뭐든 들어드릴게요.」"

[[dialogue]]
speaker = "unk"
original = "礼拝に来た子が見たら性癖が歪みそう……"
translation = "예배하러 온 아이가 보면 성적 취향이 뒤틀릴 것 같아……"

[[dialogue]]
speaker = "イレーナ"
original = "「はあぁああっ！？」"
translation = "「하아아아앗!?」"

[[dialogue]]
speaker = "イレーナ"
original = "「コホン。失礼しました。喉の調子が悪くて」"
translation = "「코흠. 실례했습니다. 목 상태가 안 좋아서.」"

[[dialogue]]
speaker = "イレーナ"
original = "「シスターシャロン、会長さんを押さえておいてください。色欲の罪に溺れた会長さんに裁きを下します」"
translation = "「시스터 샤론, 회장님을 붙잡아 주세요. 색욕의 죄에 빠진 회장님께 심판을 내리겠습니다.」"

[[dialogue]]
speaker = "シャロン"
original = "「かしこまりました！\u3000じっとしていてください会長さま！」"
translation = "「알겠습니다! 가만히 계세요, 회장님!」"

[[dialogue]]
speaker = "unk"
original = "ちょ、待っ──ぎゃあああっ！？"
translation = "잠깐, 기다── 갸아아악!?"

[[dialogue]]
speaker = "unk"
original = "その後、イレーナに癒されては切られ、切られては癒され、無間地獄を味わったのだった……"
translation = "그 후, 이레나에게 치유받고는 베이고, 베이고는 치유받으며, 무간지옥을 맛보았다……"

