[[dialogue]]
speaker = "unk"
original = "第３話,誰にも譲りません,P"
translation = "제3화, 누구에게도 양보 못 합니다, P"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「会長、こちらも書類終わりです。ダブルチェックお願いします」"
translation = "「회장님, 이쪽도 서류 끝났습니다. 더블 체크 부탁드립니다」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「凄いわ！\u3000アナ、もう全部終わったの！？」"
translation = "「대단해! 아나, 벌써 다 끝낸 거야!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「イエス。我ながら、絶好調です。チェックの結果は、いかがでしょう？」"
translation = "「예스. 제가 봐도 절호조입니다. 체크 결과는 어떠신가요?」"

[[dialogue]]
speaker = "unk"
original = "１つもミス無しだ。さすがアナだな"
translation = "실수 하나 없어. 역시 아나구나"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「あ……<emoji=heart04>\u3000ふ……ふふ……頭撫でて貰うの、イイ感じです……<emoji=heart04>」"
translation = "「아……<emoji=heart04> 후…… 후후…… 머리 쓰다듬어 주시는 거, 기분 좋아요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「アナってば、クロトと付き合い始めてから、凄く女の子らしい表情をするようになったわね」"
translation = "「아나는 쿠로토랑 사귀기 시작하고 나서 정말 여자아이 같은 표정을 짓게 됐네」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ん……会長に頭ナデナデしてもらって、活力を補充することで、次なる仕事のやる気に繋がる。そのやる気でバリバリと仕事をこなして、また会長に褒めてもらう――」"
translation = "「음…… 회장님께 머리 쓰담쓰담을 받아서 활력을 보충함으로써, 다음 업무에 대한 의욕으로 이어집니다. 그 의욕으로 팍팍 일을 해내고, 다시 회장님께 칭찬받는──」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「これぞ、恋人という立場を利用した合理的サイクルです」"
translation = "「이것이야말로 연인이라는 입장을 이용한 합리적 사이클입니다」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「なるほどね！\u3000でも、そんなに効果あるなら、私も１度試してみたいわ！」"
translation = "「과연! 하지만 그렇게 효과가 있다면 나도 한번 시도해보고 싶어!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ダメです。これはあくまで、会長の恋人である私の特権」"
translation = "「안 됩니다. 이것은 어디까지나 회장님의 연인인 저의 특권」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「え～、ずるいわ！\u3000……って、あら？\u3000なんか外、急に暗くなってゴロゴロ言ってない？」"
translation = "「에~ 치사해! ……어라? 왠지 밖이 갑자기 어두워지더니 우르릉거리지 않아?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「こ、これは……まさか――」"
translation = "「이, 이것은…… 설마──」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ひゃあっ！？」"
translation = "「히얏!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「停電だわ！\u3000アナ、凄い声がしたけど大丈夫！？」"
translation = "「정전이야! 아나, 엄청난 소리가 났는데 괜찮아!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「あわわわわわ……」"
translation = "「아와와와와와……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「電気が復旧したわね……って、アナがクロトに抱き着いて、めちゃくちゃ震えてるわ！？」"
translation = "「전기가 복구됐네…… 어라, 아나가 쿠로토에게 매달려서 엄청나게 떨고 있어!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「がくがくぶるぶる……」"
translation = "「덜덜덜덜……」"

[[dialogue]]
speaker = "unk"
original = "もしかして雷が苦手なのか……？"
translation = "설마 천둥을 무서워하는 건가……?"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「エマージェンシーです……！\u3000落雷は良くない……良くないです……！」"
translation = "「이머전시입니다……! 낙뢰는 좋지 않아…… 좋지 않습니다……!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「天界の一部では、落雷は不吉の予兆であると言われています。根拠となるデータは存在しませんが、一方で火のないところに煙は立たないともいう……」"
translation = "「천계의 일부에서는 낙뢰는 불길한 징조라고 전해집니다. 근거가 되는 데이터는 존재하지 않지만, 한편으로 아니 땐 굴뚝에 연기 나랴라고도 하죠……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「アナ、迷信に妙に過敏なところがあるわよね……ここまで怖がるのは初めて見たわ」"
translation = "「아나는 미신에 묘하게 과민한 구석이 있네…… 이렇게까지 무서워하는 건 처음 봐」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「――俺がついているから大丈夫？\u3000会長……でも……」"
translation = "「――내가 곁에 있으니까 괜찮다? 회장님…… 하지만……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ふわぁっ！？」"
translation = "「후와앗!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「また落雷があったみたい。連続なんて珍しいわね」"
translation = "「또 낙뢰가 있었나 봐. 연속이라니 드문 일이네」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そ、そんな……２回目……！\u3000３回目がもし起こったら……！」"
translation = "「그, 그럴 수가…… 두 번째……! 세 번째가 만약 일어난다면……!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ちょっとアナ、顔が真っ青よ！？\u3000これ以上まだ何か迷信があるの？」"
translation = "「잠깐 아나, 얼굴이 창백해!? 이거 말고 또 무슨 미신이 있는 거야?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「３回目の落雷は……恋愛の破局の予兆とされています。そ、そんなの……」"
translation = "「세 번째 낙뢰는…… 연애의 파국의 징조라고 여겨집니다. 그, 그런 거……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そんなの嫌です……！\u3000私、会長と別れたくありません……！」"
translation = "「그런 거 싫어요……! 저, 회장님과 헤어지고 싶지 않아요……!」"

[[dialogue]]
speaker = "unk"
original = "……ヴィーナス、アナのこと頼めるか"
translation = "……비너스, 아나를 부탁해도 될까"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ん？\u3000……クロト、もしかして今、私と同じこと考えてる？」"
translation = "「응? ……쿠로토, 혹시 지금 나랑 같은 생각 하고 있어?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「なら、ここはアナの恋人であるクロトに譲るべきよね。手伝いとかはしなくても平気？」"
translation = "「그렇다면 여기는 아나의 연인인 쿠로토에게 양보해야겠네. 도와주거나 하지 않아도 괜찮겠어?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「会長……あの、一体何を……？\u3000どこに行くんですか、会長……！？」"
translation = "「회장님…… 저기, 대체 무엇을……? 어디 가시는 건가요, 회장님……!?」"

[[dialogue]]
speaker = "unk"
original = "俺はアナに１度微笑んでみせると、星徒会室を飛び出した――"
translation = "나는 아나에게 한번 미소 지어 보이고는 성도회실을 뛰쳐나갔다──"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「――アナ、そんな心配そうな顔をしなくても大丈夫よ。クロトはアナの為に、雷を止めに行ったんだもの」"
translation = "「――아나, 그렇게 걱정스러운 얼굴 하지 않아도 괜찮아. 쿠로토는 아나를 위해 천둥을 멈추러 간 거니까」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「え？\u3000それはどういう……」"
translation = "「에? 그건 무슨……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「簡単よ！\u3000雷雲に星術でも何でも撃って、雲を散らしちゃえばいいんだもの」"
translation = "「간단해! 뇌운에 성술이든 뭐든 쏴서 구름을 흩어버리면 되니까!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はっ！？\u3000そんな無茶苦茶な……！\u3000そんな威力の星術を使えるのは、規格外の星力を持つ前会長くらいなもので――」"
translation = "「하앗!? 그런 무모한……! 그런 위력의 성술을 쓸 수 있는 건 규격 외의 성력을 가진 전 회장님 정도인데──」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「出来るわよ、クロトなら」"
translation = "「할 수 있어, 쿠로토라면」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「な、なんでそんな自信を持って言えるんですか……」"
translation = "「왜, 왜 그렇게 자신 있게 말씀하시는 건가요……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「だってクロトは――私を倒した魔王だもの！」"
translation = "「그야 쿠로토는── 나를 쓰러뜨린 마왕인걸!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「きゃっ……！？\u3000落雷とは違う音……！？」"
translation = "「꺄앗……!? 낙뢰와는 다른 소리……!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「あ……窓の外が晴れて……ま、まさか本当に……！？」"
translation = "「아…… 창밖이 개어서…… 서, 설마 정말로……!?」"

[[dialogue]]
speaker = "unk"
original = "空に向かって星術ぶっ放してきた"
translation = "하늘을 향해 성술을 갈기고 왔어"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ほらね！\u3000私の言った通りでしょう？」"
translation = "「거봐! 내가 말한 대로지?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「む、むむむ……！」"
translation = "「으, 으으으……!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「雷雲を吹き飛ばして３回目の落雷も防げたし、めでたしめでたしね！\u3000……って、なんでアナは不機嫌そうなのよ？」"
translation = "「뇌운을 날려버려서 세 번째 낙뢰도 막았고, 메데타시 메데타시네! ……근데 왜 아나는 기분이 안 좋아 보여?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「やっぱり落雷は不吉の象徴です……言っておきますが、会長は私の彼氏で、誰にも譲りませんからね……！」"
translation = "「역시 낙뢰는 불길한 상징입니다…… 말해두겠는데, 회장님은 제 남자친구고, 누구에게도 양보 안 할 거니까요……!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そんなに抱き着いてアピールしなくても、知ってるけど？」"
translation = "「그렇게 매달려서 어필 안 해도 알고 있거든?」"

[[dialogue]]
speaker = "unk"
original = "（なんかアナ、嫉妬してる……？）"
translation = "(왠지 아나, 질투하고 있어……?)"

[[dialogue]]
speaker = "unk"
original = "俺のいない間に何があったか分からないが、恋人の可愛い嫉妬姿に愛を感じて、こっそり嬉しくなってしまうのだった。"
translation = "내가 없는 사이에 무슨 일이 있었는지는 모르겠지만, 연인의 귀여운 질투 모습에 사랑을 느껴 남몰래 기뻐지는 것이었다."

