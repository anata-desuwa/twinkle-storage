[[dialogue]]
speaker = "unk"
original = "第１話,異国の聖女,P"
translation = "제1화, 이국의 성녀, P"

[[dialogue]]
speaker = "unk"
original = "日曜日、モンスターを倒して報告のために学園に来ると、大聖堂の方に人だかりができていた。"
translation = "일요일, 몬스터를 쓰러뜨리고 보고를 위해 학원에 오니, 대성당 쪽에 사람들이 몰려 있었다."

[[dialogue]]
speaker = "シャロン"
original = "「会長さまも日曜礼拝でしょうか？\u3000でしたらこちらにどうぞ」"
translation = "「회장님도 일요 예배인가요? 그렇다면 이쪽으로 오세요」"

[[dialogue]]
speaker = "unk"
original = "今日は人が多いみたいだけど"
translation = "오늘은 사람이 많은 것 같네"

[[dialogue]]
speaker = "シャロン"
original = "「はい。イタリアから聖女様が来られたので」"
translation = "「네. 이탈리아에서 성녀님이 오셨거든요」"

[[dialogue]]
speaker = "unk"
original = "聖女？"
translation = "성녀?"

[[dialogue]]
speaker = "シャロン"
original = "「あ、そろそろ説法が始まります。椅子にお座りください」"
translation = "「아, 슬슬 설법이 시작됩니다. 의자에 앉아주세요」"

[[dialogue]]
speaker = "イレーナ"
original = "「お初にお目にかかります。イレーナ・ロレンツェッティと申します」"
translation = "「처음 뵙겠습니다. 이레나 로렌체티라고 합니다」"

[[dialogue]]
speaker = "イレーナ"
original = "「どうやら今日お集まりいただいた方は、私の噂をご存じのようですね。嬉しいやら恥ずかしいやら」"
translation = "「아무래도 오늘 모여주신 분들은 제 소문을 알고 계신 모양이네요. 기쁘기도 하고 부끄럽기도 하고」"

[[dialogue]]
speaker = "イレーナ"
original = "「畏れ多いことに、私は故郷では聖女と呼ばれておりました。この流星市国の地でも、聖女と認められるにふさわしいよう努力する所存です」"
translation = "「황송하게도 저는 고향에서는 성녀라 불리고 있었습니다. 이 유성시국의 땅에서도 성녀로 인정받기에 합당하도록 노력할 생각입니다」"

[[dialogue]]
speaker = "イレーナ"
original = "「おっと、私の身の上話ばかりしていてはいけませんね。女神様に叱られてしまいます」"
translation = "「오 이런, 제 신세 한탄만 하고 있으면 안 되겠네요. 여신님께 혼나버리겠어요」"

[[dialogue]]
speaker = "イレーナ"
original = "「今日のお話は……そうですね。ここは世界の信仰の中心、ファリア大聖堂。そしてかの有名な太陽の壁画が掲げられています」"
translation = "「오늘 이야기는…… 그렇죠. 이곳은 세계 신앙의 중심, 파리아 대성당. 그리고 그 유명한 태양의 벽화가 걸려 있습니다」"

[[dialogue]]
speaker = "イレーナ"
original = "「それにちなんで、人間・魔族・天使が手を取り合い、魔王を討ち果たした時の話をいたしましょう」"
translation = "「그것에 연관 지어, 인간·마족·천사가 손을 맞잡고 마왕을 토벌했을 때의 이야기를 하도록 하죠」"

[[dialogue]]
speaker = "イレーナ"
original = "「──魔王が世界を荒らし始めた時、天使ははじめ傍観しました。いたずらに地上や魔界に介入すべきではないと」"
translation = "「──마왕이 세계를 황폐화하기 시작했을 때, 천사는 처음에 방관했습니다. 부질없이 지상이나 마계에 개입해서는 안 된다고」"

[[dialogue]]
speaker = "イレーナ"
original = "「魔族は他の種族を拒みました。魔界を守るのは我ら魔族だと」"
translation = "「마족은 다른 종족을 거부했습니다. 마계를 지키는 것은 우리 마족이라고」"

[[dialogue]]
speaker = "イレーナ"
original = "「そして人間は無力を嘆き、ただ逃げ惑うばかりでした」"
translation = "「그리고 인간은 무력을 한탄하며, 그저 도망치기 바빴습니다」"

[[dialogue]]
speaker = "イレーナ"
original = "「ですが天使も魔族も人間も、魔王に抗うために協力しなければいけないのは本当はわかっていました。しかし怖かったのです」"
translation = "「하지만 천사도 마족도 인간도, 마왕에게 대항하기 위해 협력해야 한다는 것은 사실 알고 있었습니다. 하지만 무서웠던 것입니다」"

[[dialogue]]
speaker = "イレーナ"
original = "「世界を破壊せんとする魔王への恐怖だけではありません」"
translation = "「세계를 파괴하려는 마왕에 대한 공포뿐만이 아닙니다」"

[[dialogue]]
speaker = "イレーナ"
original = "「自分と異なる種。異界の住人。今の皆さんは天使も魔族も当たり前のように知っていますが、当時はその実在さえ不確かに思われていた時代」"
translation = "「자신과 다른 종. 이계의 주민. 지금의 여러분은 천사도 마족도 당연하게 알고 있습니다만, 당시에는 그 실재조차 불확실하게 여겨지던 시대」"

[[dialogue]]
speaker = "イレーナ"
original = "「魔族や天使の存在は、非力な人間にとって恐ろしい存在に映ったのです」"
translation = "「마족이나 천사의 존재는 비력한 인간에게 두려운 존재로 비쳤던 것입니다」"

[[dialogue]]
speaker = "イレーナ"
original = "「しかしある人間が言いました。このまま世界が滅ぶくらいなら──」"
translation = "「하지만 어떤 인간이 말했습니다. 이대로 세계가 멸망할 바에야──」"

[[dialogue]]
speaker = "イレーナ"
original = "「──と、こうして三界の住人は手を取り合い、魔王に打ち克つことができました」"
translation = "「──라며, 이렇게 삼계의 주민은 손을 맞잡고 마왕을 이겨낼 수 있었습니다」"

[[dialogue]]
speaker = "イレーナ"
original = "「信じることがいかに勇気のいることか。歩み寄ることがいかに難しいか。おわかりいただけたかと思います」"
translation = "「믿는다는 것이 얼마나 용기가 필요한 일인지. 다가가는 것이 얼마나 어려운 일인지. 이해하셨으리라 생각합니다」"

[[dialogue]]
speaker = "イレーナ"
original = "「ですが、だからこそ、最初の一歩は偉大なものとなるのです」"
translation = "「하지만 그렇기에 첫걸음은 위대한 것이 되는 것입니다」"

[[dialogue]]
speaker = "イレーナ"
original = "「今日の説法はこれまでといたしょう。皆さんに女神様の祝福がありますように」"
translation = "「오늘의 설법은 여기까지 하도록 하죠. 여러분에게 여신님의 축복이 있기를」"

[[dialogue]]
speaker = "unk"
original = "（いつの間にか聞き入っていた……）"
translation = "(어느샌가 빠져들어 듣고 있었다……)"

[[dialogue]]
speaker = "イレーナ"
original = "「おや、その腕章……もしかしてあなたが新星学園の星徒会長さんですか？」"
translation = "「어라, 그 완장…… 혹시 당신이 신성 학원의 성도회장님인가요?」"

[[dialogue]]
speaker = "イレーナ"
original = "「改めまして、私はイレーナ。流星学園の生徒ですが、先ほどご覧の通り神官でもあります」"
translation = "「다시 인사드리죠, 저는 이레나. 유성 학원의 학생입니다만, 방금 보신 대로 신관이기도 합니다」"

[[dialogue]]
speaker = "イレーナ"
original = "「数日前に流星学園に転入して、この大聖堂の所属になったばかりなんです」"
translation = "「며칠 전에 유성 학원에 전입해서, 이 대성당 소속이 된 지 얼마 안 됐어요」"

[[dialogue]]
speaker = "イレーナ"
original = "「会長さんも最近新星学園に転入されたと聞きました。学年も同じですし奇遇ですね」"
translation = "「회장님도 최근 신성 학원에 전입하셨다고 들었습니다. 학년도 같고 기연이네요」"

[[dialogue]]
speaker = "イレーナ"
original = "「会長さんの方が少し先輩ですが、転入生同士、仲良くしていただけると嬉しいです」"
translation = "「회장님이 조금 선배지만, 전입생끼리 사이좋게 지내주시면 기쁘겠어요」"

[[dialogue]]
speaker = "イレーナ"
original = "「それと──先ほどは失礼しました。あなたが礼拝にいらっしゃっていたとは知らなくて」"
translation = "「그리고── 아까는 실례했습니다. 당신이 예배에 오셨을 줄은 몰라서」"

[[dialogue]]
speaker = "イレーナ"
original = "「あなたが魔王だという噂は存じております。気分を害されたのなら謝罪します」"
translation = "「당신이 마왕이라는 소문은 알고 있습니다. 기분이 상하셨다면 사과드릴게요」"

[[dialogue]]
speaker = "unk"
original = "気にしてないので大丈夫です"
translation = "신경 안 쓰니까 괜찮아요"

[[dialogue]]
speaker = "イレーナ"
original = "「それなら安心しました」"
translation = "「그렇다면 안심이에요」"

[[dialogue]]
speaker = "イレーナ"
original = "「あ……会長さん、お手を失礼します」"
translation = "「아…… 회장님, 손 좀 실례할게요」"

[[dialogue]]
speaker = "イレーナ"
original = "「モンスターと戦っておられたのですよね。少し傷が残っていましたので治療しました。もう痛くないはずですよ」"
translation = "「몬스터와 싸우고 계셨던 거죠. 상처가 조금 남아 있어서 치료했어요. 이제 아프지 않을 거예요」"

[[dialogue]]
speaker = "イレーナ"
original = "「私には幼い頃から癒しの力がありまして。こうして人々を助けていたら、いつの間にか聖女なんて呼ばれるようになっていたんです」"
translation = "「제게는 어릴 적부터 치유의 힘이 있어서요. 이렇게 사람들을 돕다 보니 어느샌가 성녀라고 불리게 되었답니다」"

[[dialogue]]
speaker = "イレーナ"
original = "「しかし聖女の祈りよりも、血の献身の方が尊いもの。いつも懸命に戦っておられる会長さんには頭が下がります」"
translation = "「하지만 성녀의 기도보다 피의 헌신이 더 고귀한 법. 언제나 열심히 싸우시는 회장님께는 고개가 숙여지네요」"

[[dialogue]]
speaker = "イレーナ"
original = "「それではまたお会いしましょう。この大聖堂でお待ちしています」"
translation = "「그럼 다음에 또 봬요. 이 대성당에서 기다리고 있을게요」"

[[dialogue]]
speaker = "unk"
original = "礼拝の後、学園に報告をして、ついでに星徒会の書類仕事を片付けて、そこで大聖堂にＤＩＳＣを忘れたことに気付いた。"
translation = "예배 후, 학원에 보고를 하고, 덤으로 성도회의 서류 업무를 처리하다가, 그곳 대성당에 DISC를 두고 온 것을 깨달았다."

[[dialogue]]
speaker = "unk"
original = "誰か残っていてくれるといいんだが……"
translation = "누군가 남아 있어 주면 좋으련만……"

[[dialogue]]
speaker = "？？？"
original = "「揃いも揃って上っ面に騙されちゃって、流星市国の人たちもチョロいもんね」"
translation = "「하나같이 겉모습에 속아 넘어가서는, 유성 시국 사람들도 참 단순하다니까.」"

[[dialogue]]
speaker = "イレーナ"
original = "「あんなに集まっちゃってさ、聖女様がそんなに見たいわけ？\u3000あたしは動物園のライオンかっての」"
translation = "「저렇게나 모여서는, 성녀님이 그렇게 보고 싶은 거야? 내가 무슨 동물원의 사자냐고.」"

[[dialogue]]
speaker = "イレーナ"
original = "「それにしても新星の会長、御前試合とやらで勝ったらしいけど本当なの？\u3000そんな強そうには見えなかったけど──」"
translation = "「그나저나 신성의 회장, 어전 시합인가 뭔가에서 이겼다던데 정말일까? 그렇게 강해 보이지는 않았는데──」"

[[dialogue]]
speaker = "unk"
original = "イレーナ？"
translation = "이레나?"

[[dialogue]]
speaker = "イレーナ"
original = "「はぁっ！？\u3000なんであんたがここにいるのよ！？」"
translation = "「하앗!? 왜 당신이 여기에 있는 거야!?」"

