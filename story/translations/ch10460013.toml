[[dialogue]]
speaker = "unk"
original = "第３話,お嬢様ＬＯＶＥ,P"
translation = "제3화, 아가씨 LOVE, P"

[[dialogue]]
speaker = "unk"
original = "ある日の昼休み、カフェテリアで席を探していると――"
translation = "어느 날 점심시간, 카페테리아에서 자리를 찾고 있자니――"

[[dialogue]]
speaker = "ヨミ"
original = "「こや？\u3000……会長！\u3000お昼ご飯食べに来たんですか？」"
translation = "「코야? ……회장! 점심 먹으러 온 건가요?」"

[[dialogue]]
speaker = "閃"
original = "「席を探しているなら、こちらでご一緒しませんか？」"
translation = "「자리를 찾고 계신다면, 여기서 합석하지 않겠어요?」"

[[dialogue]]
speaker = "閃"
original = "「私もたまたまヨミと会って、せっかくだから一緒に食べようと話していたところなんです」"
translation = "「저도 마침 요미와 만나서, 이왕 이렇게 된 거 같이 먹자고 이야기하던 참이었어요」"

[[dialogue]]
speaker = "unk"
original = "そういえば、２人は同僚になるんだっけ"
translation = "그러고 보니, 두 사람은 동료가 된다고 했었지"

[[dialogue]]
speaker = "ヨミ"
original = "「そうです！\u3000閃先輩とは同じ九浄家メイド隊で、九浄家のお屋敷に住み込みで働かせてもらっている同士なんですよ」"
translation = "「맞아요! 센 선배와는 같은 쿠죠 가 메이드 부대이고, 쿠죠 가의 저택에서 입주해서 일하고 있는 동료거든요」"

[[dialogue]]
speaker = "閃"
original = "「こうして年も近いですから、良い友人関係を築かせてもらっています」"
translation = "「이렇게 나이도 가까우니까, 좋은 친구 관계를 쌓고 있답니다」"

[[dialogue]]
speaker = "ヨミ"
original = "「なんか改まって、閃先輩に友達って言って貰えると、照れちゃいますね。えへへ……♪」"
translation = "「왠지 새삼스럽게, 센 선배한테 친구라는 말을 들으니까 부끄럽네요. 에헤헤……♪」"

[[dialogue]]
speaker = "unk"
original = "そうなると、ヴィーナスとも同じ家になるのか"
translation = "그렇게 되면, 비너스와도 같은 집이 되는 건가"

[[dialogue]]
speaker = "ヨミ"
original = "「はい、会長も知っての通り、お嬢様は爆裂フレンドリーな方なので、私たちメイド隊にも家族のように接してくれています」"
translation = "「네, 회장도 알다시피, 아가씨는 폭렬 프렌들리한 분이라서, 저희 메이드 부대에게도 가족처럼 대해주고 계세요」"

[[dialogue]]
speaker = "閃"
original = "「朝食や夕食の時は、お嬢様とメイド隊で同じ食卓を囲む日もあるくらいです」"
translation = "「아침이나 저녁 식사 때는, 아가씨와 메이드 부대가 같은 식탁에 둘러앉는 날도 있을 정도예요」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスらしいな"
translation = "비너스답네"

[[dialogue]]
speaker = "閃"
original = "「ええ、本当にお嬢様らしい。まるで女神のようにお優しい方なんです……！」"
translation = "「네, 정말 아가씨다워요. 마치 여신처럼 상냥한 분이시거든요……!」"

[[dialogue]]
speaker = "ヨミ"
original = "「学園では有名な話ですが、ヴィーナスお嬢様は養子で、九浄家の血筋ではありません」"
translation = "「학원에서는 유명한 이야기지만, 비너스 아가씨는 양녀라서, 쿠죠 가의 혈통은 아니에요」"

[[dialogue]]
speaker = "ヨミ"
original = "「ですがそんなこと関係なく、当主様はお嬢様のことを本当の子供のように大切にしていますし、我々使用人も皆、お嬢様のことを慕っています」"
translation = "「하지만 그런 건 상관없이, 당주님은 아가씨를 친자식처럼 소중히 여기고 계시고, 저희 사용인들도 모두 아가씨를 따르고 있어요」"

[[dialogue]]
speaker = "閃"
original = "「九浄家のお嬢様だからではなく、九浄ヴィーナスという１人の女性として、尊敬できる方だと私は思っています」"
translation = "「쿠죠 가의 아가씨라서가 아니라, 쿠죠 비너스라는 한 명의 여성으로서 존경할 수 있는 분이라고 저는 생각해요」"

[[dialogue]]
speaker = "ヨミ"
original = "「閃先輩はご実家に関係なく、お嬢様にお仕えしているってよく言ってますもんね」"
translation = "「센 선배는 본가와 상관없이 아가씨를 모시고 있다고 자주 말하곤 하니까요」"

[[dialogue]]
speaker = "unk"
original = "閃の実家って？"
translation = "센의 본가라는 건?"

[[dialogue]]
speaker = "閃"
original = "「私の実家――藤岡家は、代々九浄家にお仕えしている家なんです」"
translation = "「제 본가――후지오카 가는, 대대로 쿠죠 가를 모셔온 집안이에요」"

[[dialogue]]
speaker = "閃"
original = "「私は居合術で戦いますが、実家にはその剣術の道場があります。そこで磨いた剣技をもって、代々九浄家の護衛を務めてきました」"
translation = "「저는 거합술로 싸우지만, 본가에는 그 검술 도장이 있어요. 거기서 연마한 검기로 대대로 쿠죠 가의 호위를 맡아왔죠」"

[[dialogue]]
speaker = "閃"
original = "「私とお嬢様の出会いは５年ほど前になります。お嬢様が九浄家の養子に迎え入れられた時、年が近いだろうという理由で護衛に任命されたんですが──」"
translation = "「저와 아가씨의 만남은 5년 전쯤이에요. 아가씨가 쿠죠 가의 양녀로 받아들여졌을 때, 나이가 비슷하다는 이유로 호위로 임명되었습니다만──」"

[[dialogue]]
speaker = "閃"
original = "「今では実家の家業としてだけではない……自分の意志でお嬢様にお仕えしたい、護衛としてお守りしたいと思っているんです」"
translation = "「지금은 가업으로서만이 아니라…… 제 의지로 아가씨를 모시고 싶고, 호위로서 지켜드리고 싶다고 생각하고 있어요」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスが好きだから……？"
translation = "비너스를 좋아하니까……?"

[[dialogue]]
speaker = "閃"
original = "「か、会長さん、からかわないでください……。ヨミにも変な誤解をされるじゃないですか」"
translation = "「회, 회장님, 놀리지 마세요……. 요미에게도 이상한 오해를 받잖아요」"

[[dialogue]]
speaker = "ヨミ"
original = "「閃先輩がお嬢様を好き過ぎるのは、皆知っているので大丈夫ですよ？」"
translation = "「센 선배가 아가씨를 너무 좋아하는 건 모두가 알고 있으니까 괜찮아요?」"

[[dialogue]]
speaker = "閃"
original = "「バ、バレてる！？\u3000というか今、皆って言ってたような気が……？」"
translation = "「드, 들켰어!? 그보다 방금, 모두라고 했던 것 같은 기분이……?」"

[[dialogue]]
speaker = "ヨミ"
original = "「メイド隊の中では周知の事実というか……」"
translation = "「메이드 부대 안에서는 주지의 사실이랄까……」"

[[dialogue]]
speaker = "閃"
original = "「そ、そんなぁ……！？」"
translation = "「그, 그럴 수가……!?」"

[[dialogue]]
speaker = "unk"
original = "閃の護衛といえば、なんだけど――"
translation = "센의 호위라고 하면, 말인데――"

[[dialogue]]
speaker = "閃"
original = "「え？\u3000何故いつもギリギリのタイミングで助けに来るのか、ですか？」"
translation = "「에? 어째서 항상 아슬아슬한 타이밍에 구하러 오느냐고요?」"

[[dialogue]]
speaker = "ヨミ"
original = "「閃先輩あるあるですね。ピンチの時にだけ、間一髪で助けてくれるっていう」"
translation = "「센 선배의 단골 패턴이죠. 위기의 순간에만 간발의 차로 구해준다는 거」"

[[dialogue]]
speaker = "閃"
original = "「あるあるにしないでください……」"
translation = "「단골 패턴으로 만들지 마세요……」"

[[dialogue]]
speaker = "unk"
original = "って、ヴィーナスは言ってたな"
translation = "라고, 비너스가 말했었지"

[[dialogue]]
speaker = "unk"
original = "「きっとセンちゃんも色々と忙しいのよ！」"
translation = "「분명 센 짱도 이것저것 바쁜 걸 거야!」"

[[dialogue]]
speaker = "閃"
original = "「お嬢様にもギリギリだと思われてるーーー！？」"
translation = "「아가씨에게도 아슬아슬하다고 생각되고 있어――!?」"

[[dialogue]]
speaker = "閃"
original = "「いや、違うんです！\u3000私にはベストなタイミングが<b>見えている</b>ので、助けに入るのを焦らしているとかそういうわけじゃないんです！」"
translation = "「아니, 아니에요! 저에게는 베스트 타이밍이 <b>보이고</b> 있기 때문에, 구하러 들어가는 걸 뜸 들이고 있다거나 그런 게 아니에요!」"

[[dialogue]]
speaker = "unk"
original = "見えている？"
translation = "보이고 있다고?"

[[dialogue]]
speaker = "閃"
original = "「はい。私は生まれつき、『予測の<ruby>星眼<rt>せいがん</rt></ruby>』という異能の眼を持っているんです。予測とは言いますが、戦闘では予知に等しい能力です」"
translation = "「네. 저는 태어날 때부터, 『예측의 성안』이라는 이능의 눈을 가지고 있어요. 예측이라고는 하지만, 전투에서는 예지에 가까운 능력이에요」"

[[dialogue]]
speaker = "ヨミ"
original = "「星眼というのは、特殊な星術を宿した眼のことです。星騎士の中ですら、とても珍しい爆裂レアアビリティなんですよ！」"
translation = "「성안이라는 건 특수한 성술을 깃들인 눈을 말해요. 성기사들 중에서도 아주 희귀한 폭렬 레어 어빌리티거든요!」"

[[dialogue]]
speaker = "閃"
original = "「私は『眼が捉える周囲の情報から、未来に起こることを視認できる』んです。出力を最大にすれば、３分程度先まで実質的な予知が可能になります」"
translation = "「저는 『눈이 포착하는 주위의 정보로부터 미래에 일어날 일을 시인할 수』 있어요. 출력을 최대화하면 3분 정도 앞까지 실질적인 예지가 가능해져요」"

[[dialogue]]
speaker = "閃"
original = "「この眼によって、助けるべき瞬間がハッキリと分かるので、一見するとギリギリで助けに入っているように見えてしまう、というわけなんですっ」"
translation = "「이 눈을 통해 구해야 할 순간을 확실히 알 수 있기 때문에, 겉보기에는 아슬아슬하게 구하러 들어가는 것처럼 보여버리는 거예요」"

[[dialogue]]
speaker = "unk"
original = "閃が普段、目を細めているのって……"
translation = "센이 평소에 눈을 가늘게 뜨고 있는 건……"

[[dialogue]]
speaker = "閃"
original = "「日常的に星眼を使用しているからですね。緊急時以外は視界に入って来る情報量を絞って、星眼の出力を制御するようにしています」"
translation = "「일상적으로 성안을 사용하고 있기 때문이죠. 긴급할 때 이외에는 시야에 들어오는 정보량을 줄여서 성안의 출력을 제어하도록 하고 있어요」"

[[dialogue]]
speaker = "ヨミ"
original = "「閃先輩はいつでも美人ですけど、目を開くともっと美人なんですよ！\u3000瞳も神秘的な色をしていて、とても綺麗ですし」"
translation = "「센 선배는 언제나 미인이지만, 눈을 뜨면 훨씬 더 미인이라고요! 눈동자도 신비로운 색을 띠고 있어서 아주 예쁘고」"

[[dialogue]]
speaker = "unk"
original = "それは見てみたいな"
translation = "그건 보고 싶은걸"

[[dialogue]]
speaker = "閃"
original = "「そ、そこまで大したものではありませんし、会長さんの期待に応えて……と言いたいところですが」"
translation = "「그, 그렇게 대단한 건 아니기도 하고, 회장님의 기대에 부응해서……라고 말하고 싶지만」"

[[dialogue]]
speaker = "閃"
original = "「先程、お嬢様のことで私をからかったお返しです。会長さんには、まだ見せてあげません」"
translation = "「아까 아가씨 일로 저를 놀린 것에 대한 보답이에요. 회장님께는 아직 보여드리지 않을 거예요」"

[[dialogue]]
speaker = "unk"
original = "そんな～"
translation = "너무해~"

[[dialogue]]
speaker = "閃"
original = "「ふふっ、甘えた顔をしてもダメです。反省してくださいね」"
translation = "「후훗, 어리광 부리는 표정을 지어도 안 돼요. 반성하세요」"

[[dialogue]]
speaker = "unk"
original = "いつか見せて貰えるくらい、彼女と仲良くなれたらいいなと思うのだった。"
translation = "언젠가 보여줄 수 있을 정도로 그녀와 친해지면 좋겠다고 생각하는 것이었다."

