[[dialogue]]
speaker = "unk"
original = "第１話,アルモたんは海で遊びたい,P"
translation = "제1화, 알모땅은 바다에서 놀고 싶어, P"

[[dialogue]]
speaker = "unk"
original = "その日は休日で、俺たちはリゾート結界へ遊びに来ていた。"
translation = "그날은 휴일이라, 우리들은 리조트 결계로 놀러 와 있었다."

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「会長～！\u3000おはようなのだ～♪」"
translation = "「회장~! 안녕인거다~♪」"

[[dialogue]]
speaker = "unk"
original = "最近手に入れた水着フォームの姿で、恋人のアルモが元気よく駆け寄ってくる。"
translation = "최근에 손에 넣은 수영복 폼의 모습으로, 연인인 알모가 활기차게 달려온다."

[[dialogue]]
speaker = "unk"
original = "今日も水着、似合ってて可愛いぞ"
translation = "오늘도 수영복, 잘 어울리고 귀엽네"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「えへへ<emoji=heart04>\u3000ありがとなのだ～♪」"
translation = "「에헤헤<emoji=heart04> 고마운거다~♪」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「会長の女の子姿の水着も、すっごく可愛いのだ♪\u3000アルモたんは大好きだぞ♪」"
translation = "「회장의 여자아이 모습 수영복도, 정말 귀여운のだ♪ 알모땅은 정말 좋아한다고♪」"

[[dialogue]]
speaker = "unk"
original = "そう――今日は俺も久しぶりに、アニマ先輩が作った『附属生女子』の義体を使って遊びに来ていた。"
translation = "그렇다―― 오늘은 나도 오랜만에, 아니마 선배가 만든 『부속생 여자』 의체를 사용해서 놀러 와 있었다."

[[dialogue]]
speaker = "unk"
original = "俺は褒めてくれた恋人の頭を、優しく撫でる。"
translation = "나는 칭찬해 준 연인의 머리를, 상냥하게 쓰다듬는다."

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「あっ♪\u3000会長、そんな優しく撫でられると、くすぐったいのだ～♪\u3000えへへへぇ～<emoji=heart04>」"
translation = "「앗♪ 회장, 그렇게 상냥하게 쓰다듬어지면, 간지러운거다~♪ 에헤헤헤~<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「会長～、アルモタヘル～♪\u3000おはようございます～♪」"
translation = "「회장~, 아르모타헬~♪ 안녕하세요~♪」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「……おはようございます。じ～っ……」"
translation = "「……안녕하세요. 지~익……」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "（附属生の女の子になった会長の水着姿……可愛い……）"
translation = "(부속생 여자아이가 된 회장의 수영복 차림…… 귀여워……)"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「２人共、おはようなのだ～！\u3000今日はいっぱい海で楽しく遊ぶのだ♪」"
translation = "「둘 다, 안녕인のだ~! 오늘은 잔뜩 바다에서 즐겁게 노는거다♪」"

[[dialogue]]
speaker = "unk"
original = "今日は附属校１年Ｃ組の仲良しメンバーで海遊びをする約束をしていて、俺も『附属生女子』の姿で参加したというわけだった。"
translation = "오늘은 부속교 1학년 C반의 친한 멤버끼리 바다 놀이를 하기로 약속해서, 나도 『부속생 여자』의 모습으로 참가했다는 것이었다."

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「ナミエルも、せっかくですから可愛い水着を着てくればよかったのに～。見たかったです～」"
translation = "「나미엘도, 이왕이면 귀여운 수영복을 입고 왔으면 좋았을 텐데~. 보고 싶었어요~」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「い、今はまだ夏ではありませんし、それに男性の目も近くにありますから……！」"
translation = "「지, 지금은 아직 여름이 아니기도 하고, 게다가 남성의 눈도 가까이에 있으니까요……!」"

[[dialogue]]
speaker = "unk"
original = "ちらりと俺を見るナミエル。その反応につい苦笑してしまう。"
translation = "슬쩍 나를 보는 나미엘. 그 반응에 그만 쓴웃음을 짓고 만다."

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「今日は会長も女の子なのに、ナミエルは恥ずかしがり屋なのだ～」"
translation = "「오늘은 회장도 여자아이인데, 나미엘은 부끄럼쟁이인거다~」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「いや、見た目は女の子でも、中身は男性ですからね！？」"
translation = "「아니, 겉모습은 여자아이라도, 알맹이는 남성이니까요!?」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「え～？\u3000でもアルモたん的には、会長の水着は可愛くて似合ってると思うぞ？」"
translation = "「에~? 하지만 알모땅적으로는, 회장의 수영복은 귀엽고 잘 어울린다고 생각한다고?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「そ、それはまぁ……否定できませんが……」"
translation = "「그, 그것은 뭐…… 부정할 수 없습니다만……」"

[[dialogue]]
speaker = "unk"
original = "そう言われると、ちょっと照れる……"
translation = "그렇게 들으니, 조금 부끄럽네……"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「っ……！\u3000会長、そんな風に恥じらうのはずるいですよ！？」"
translation = "「윽……! 회장, 그런 식으로 수줍어하는 건 반칙이에요!?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "（なんで会長は男性なのに、女の子姿だとこんなに可愛いんですか……！？）"
translation = "(왜 회장은 남성인데, 여자아이 모습이면 이렇게 귀여운 건가요……!?)"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「女の子の会長は本当に可愛いのだ～<emoji=heart04>\u3000アルモたんもマグダレナみたいに、抱き締めて撫でたくなっちゃうのだ<emoji=heart04>」"
translation = "「여자아이인 회장은 정말 귀여운のだ~<emoji=heart04> 알모땅도 막달레나처럼, 껴안고 쓰다듬고 싶어져 버리는거다<emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「ぎゅ～っ<emoji=heart04>\u3000よしよし、なのだ～<emoji=heart04>」"
translation = "「꼬옥~<emoji=heart04> 착하다 착해, 인거다~<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ちょっ、アルモたん！？\u3000何をしてるんですか……！」"
translation = "「잠깐, 알모땅!? 뭘 하고 있는 건가요……!」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「ん～？\u3000アルモたんと会長は恋人同士だし、これくらい普通じゃないか？\u3000それに今は女の子同士なのだ♪」"
translation = "「응~? 알모땅이랑 회장님은 연인 사이고, 이 정도는 보통이잖아? 게다가 지금은 여자아이끼리인 것이다♪」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「あっ、もしかしてナミエルも甘えたかったですか～？\u3000それならママダレナが代わりに、愛を込めて抱き締めちゃいますよ～♪\u3000ぎゅ～っ<emoji=heart04>」"
translation = "「앗, 혹시 나미엘도 어리광 부리고 싶었나요~? 그렇다면 마마다레나가 대신해서, 사랑을 담아 꼬옥 안아줄게요~♪ 꼬옥~<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ひゃっ！？\u3000そ、そういう意味じゃありませんから！\u3000公共の場でくっ付き合うのは破廉恥で……！」"
translation = "「히약!? 그, 그런 의미가 아니니까요! 공공장소에서 달라붙는 건 파렴치해서……!」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「マグダレナとナミエルも、アルモたんと会長みたいに仲良しなのだ～♪」"
translation = "「막달레나랑 나미엘도, 알모땅이랑 회장님처럼 사이가 좋은 것이다~♪」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ああもう、恥ずかしいですからやめてください～！」"
translation = "「아아 정말, 부끄러우니까 그만두세요~!」"

[[dialogue]]
speaker = "unk"
original = "それから俺たちは海に入って、水遊びを始めた。"
translation = "그러고 나서 우리들은 바다에 들어가 물놀이를 시작했다."

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「ナミエル、くらえなのだ～♪」"
translation = "「나미엘, 받아라 인 것이다~♪」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「わぷっ！？\u3000虫捕り網の中から大量の水が飛び出して……！\u3000その水着フォームの武器、どうなってるんですか……！？」"
translation = "「와푸!? 잠자리채 안에서 대량의 물이 튀어나와서……! 그 수영복 폼의 무기, 어떻게 된 건가요……!?」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「アルモたんの虫捕り網は、異空間の『<ruby>煉獄<rt>れんごく</rt></ruby>』に繋がってるのだ♪\u3000なんでも沢山入れて、好きな時に取り出せるのだ♪」"
translation = "「알모땅의 잠자리채는, 이공간의 『연옥』에 연결되어 있는 것이다♪ 뭐든 잔뜩 넣고, 원할 때 꺼낼 수 있는 것이다♪」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「ふふっ、それじゃあ私も――それ～っ♪」"
translation = "「후훗, 그렇다면 저도―― 에잇~♪」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「海水を四角いブロックみたいにして投げてる……！？\u3000なんですかその能力！」"
translation = "「바닷물을 네모난 블록처럼 만들어서 던지고 있어……!? 뭡니까 그 능력!」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「こうなったら私も――」"
translation = "「이렇게 된 이상 저도――」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「クリスマスフォームのスコップで対抗します！\u3000えいっ！」"
translation = "「크리스마스 폼의 삽으로 대항하겠습니다! 에잇!」"

[[dialogue]]
speaker = "unk"
original = "雪かきでもするようにして、バシャバシャと大きな水飛沫を上げてみせるナミエル。"
translation = "눈을 치우기라도 하듯이, 어푸어푸하며 커다란 물보라를 일으켜 보이는 나미엘."

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「わぁ～っ♪\u3000ナミエルの武器もすごいのだ～！\u3000あははははっ♪」"
translation = "「와아~♪ 나미엘의 무기도 대단한 것이다~! 아하하하핫♪」"

[[dialogue]]
speaker = "unk"
original = "そうして夢中で遊んでいるうちに、あっという間に夕方になった。"
translation = "그렇게 정신없이 노는 사이에, 어느덧 순식간에 저녁이 되었다."

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「それじゃあ、お肉も焼けたし……いただきますなのだ～♪」"
translation = "「그러면, 고기도 다 구워졌고…… 잘 먹겠습니다 인 것이다~♪」"

[[dialogue]]
speaker = "unk"
original = "ビーチでバーベキューをすることになり、アルモは手を合わせてから俺に向き直る。"
translation = "해변에서 바비큐를 하게 되어, 알모는 손을 모은 뒤 나를 향해 돌아본다."

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「会長～<emoji=heart04>\u3000恋人のアルモたんに、あ～んして欲しいのだ♪」"
translation = "「회장님~<emoji=heart04> 연인인 알모땅에게, 아~앙 해줬으면 하는 것이다♪」"

[[dialogue]]
speaker = "unk"
original = "わかった。それじゃあ……ふー、ふー"
translation = "알았어. 그럼…… 후~, 후~"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「えへへ～<emoji=heart04>\u3000ちゃんとふーふーして食べさせてくれる会長、優しくて大好きなのだ～<emoji=heart04>」"
translation = "「에헤헤~<emoji=heart04> 제대로 후후 불어서 먹여주는 회장님, 다정해서 정말 좋은 것이다~<emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「――あ～ん<emoji=heart04>\u3000もぐもぐ……ん～<emoji=heart04>\u3000会長に食べさせてもらうお肉が、やっぱり一番美味なのだ♪」"
translation = "「――아~앙<emoji=heart04> 우물우물…… 음~<emoji=heart04> 회장님이 먹여주는 고기가, 역시 제일 맛있는 것이다♪」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「ふふっ、アルモタヘルと会長は、すっかりラブラブですね～」"
translation = "「후훗, 아르모타헬과 회장님은 완전히 러브러브하네요~」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「うん♪\u3000恋人になってから、アルモたんは会長のことをどんどん好きになっていってるからな<emoji=heart04>」"
translation = "「응♪ 연인이 되고 나서, 알모땅은 회장님을 점점 더 좋아하게 되고 있으니까 말이야<emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「ナミエルも、お肉を美味しく食べられてるか？」"
translation = "「나미엘도, 고기 맛있게 먹고 있어?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「んっ……もぐもぐ……はい、バーベキューするのは久しぶりですが、美味しいです……♪」"
translation = "「음…… 우물우물…… 네, 바비큐 하는 건 오랜만이지만, 맛있어요……♪」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「ならよかったのだ♪\u3000ナミエル、今日はアルモたんと一緒に遊んでくれて、ありがとうなのだ♪」"
translation = "「다행인 것이다♪ 나미엘, 오늘은 알모땅이랑 같이 놀아줘서 고마운 것이다♪」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「え、急にどうしたんですか……？」"
translation = "「에, 갑자기 왜 그러세요……?」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「お肉に夢中になると、言いそびれちゃいそうだからな。先に言っておきたかったのだ」"
translation = "「고기에 집중하다 보면, 말할 기회를 놓칠 것 같아서 말이야. 먼저 말해두고 싶었던 것이다」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「ナミエルは、アルモたんが誘うといつも遊びに付き合ってくれて、すごく感謝しているぞ♪」"
translation = "「나미엘은 알모땅이 권하면 언제나 놀아줘서, 정말 감사하고 있다구♪」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ま、まあ……その……友達ですから……」"
translation = "「뭐, 뭐어…… 그…… 친구니까요……」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「うんっ♪\u3000アルモたんにとっても、ナミエルは大事な友達なのだ！\u3000えへへっ♪」"
translation = "「응♪ 알모땅에게 있어서도, 나미엘은 소중한 친구인 것이다! 에헤헤♪」"

[[dialogue]]
speaker = "unk"
original = "そうしてアルモは、照れくさそうなナミエルとお互いに笑顔を浮かべ合うのだった。"
translation = "그렇게 알모는, 쑥스러워하는 나미엘과 서로 미소를 지어 보였다."

