[[dialogue]]
speaker = "unk"
original = "第１話,海の家でアルバイト（前編）,P"
translation = "제1화, 바다의 집에서 아르바이트 (전편), P"

[[dialogue]]
speaker = "unk"
original = "星騎士と魔女による初めての合同作戦『オペレーション・ペンタグラム』──あの戦いをきっかけに、新星・流星両学園とネビュラは正式に同盟を結ぶこととなった。"
translation = "성기사와 마녀에 의한 첫 합동 작전 『오퍼레이션 펜타그램』── 그 싸움을 계기로, 신성·유성 양 학원과 네뷸라는 정식으로 동맹을 맺게 되었다."

[[dialogue]]
speaker = "unk"
original = "以前から俺とセドナさんは個人的に交流をしていた間柄だったが、最近は特に腹を割った話し合いができるようになった気がする。"
translation = "이전부터 나와 세드나 씨는 개인적으로 교류하던 사이였지만, 최근에는 특히 속을 터놓고 대화할 수 있게 된 기분이 든다."

[[dialogue]]
speaker = "unk"
original = "これはセドナさんが水着フォームを披露してくれたあの親睦会から、しばらくの月日が経った頃の話──"
translation = "이것은 세드나 씨가 수영복 폼을 선보여 주었던 그 친목회로부터, 어느 정도의 세월이 흘렀을 무렵의 이야기──"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「魔王、わざわざ時間を取ってもらって感謝する。今日は折り入って、貴様に相談したいことがあってな」"
translation = "「마왕, 일부러 시간을 내주어 감사한다. 오늘은 긴히, 네놈에게 상담하고 싶은 것이 있어서 말이다」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「いや、<ruby>組織<rt>ネビュラ</rt></ruby>からの要請ではない。今日は私……セドナ個人の悩みだ」"
translation = "「아니, <ruby>조직<rt>네뷸라</rt></ruby>의 요청은 아니다. 오늘은 나…… 세드나 개인의 고민이다」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「単刀直入に言おう。お前のような、部下に好かれる人物になる方法を教えて欲しい」"
translation = "「단도직입적으로 말하지. 너처럼 부하에게 사랑받는 인물이 되는 방법을 가르쳐줬으면 한다」"

[[dialogue]]
speaker = "unk"
original = "理由をお聞きしても？"
translation = "이유를 물어봐도 되겠나?"

[[dialogue]]
speaker = "unk"
original = "なんだか漠然としたお願いですね"
translation = "왠지 막연한 부탁이네요."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ああ。もちろんだ」"
translation = "「아아. 물론이다.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「最近、我々魔女と星騎士は同盟を結んだ。私も基地だけでなく、こうして星騎士たちの総本山で過ごすことが増えた」"
translation = "「최근, 우리 마녀와 성기사는 동맹을 맺었다. 나도 기지뿐만 아니라, 이렇게 성기사들의 총본산에서 지내는 일이 많아졌지.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「そうすれば必然的に、貴様と生徒たちの日常を目にする機会も増えるわけだが……」"
translation = "「그렇게 되면 필연적으로, 네놈과 학생들의 일상을 목격할 기회도 늘어나는 법이다만……」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「軍隊式のネビュラと違い、この学園の雰囲気はとても穏やかだ。常に笑顔と笑いが絶えず、いつ訪れてもモチベーションの高さを感じる」"
translation = "「군대식인 네뷸라와 달리, 이 학원의 분위기는 무척 평온하군. 항상 미소와 웃음이 끊이지 않고, 언제 방문해도 의욕이 넘치는 게 느껴진다.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「以前は貴様らのそういう部分を『甘い』と断じ、切り捨てていた私だが……」"
translation = "「이전에는 네놈들의 그런 부분을 『무르다』고 단정하며 치워버렸던 나다만……」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「フィヴォス流星群の際も、オペレーション・ペンタグラムの際も……星騎士たちの活躍は目を見張るものがあった」"
translation = "「피보스 유성우 때도, 오퍼레이션 펜타그램 때도…… 성기사들의 활약은 눈부신 것이 있었다.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「その力の源は、この穏やかでのびのびとした雰囲気にあるのではないか、と思ったのだ」"
translation = "「그 힘의 원천은, 이 평온하고 자유로운 분위기에 있는 것이 아닐까 생각했지.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「集団の雰囲気というものは、それを率いる者の人柄によって決定されると私は考えている」"
translation = "「집단의 분위기라는 것은, 그것을 이끄는 자의 인품에 따라 결정된다고 나는 생각한다.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「で──だ。私はこの通りの武骨な見た目だろう？」"
translation = "「그래서── 말이다. 나는 이 보시다시피 무뚝뚝한 외견이지 않나?」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「どうしても、部下に威圧感を与えてしまうようでな。だから、お前に指南を仰ぎたいと思った次第だ」"
translation = "「아무래도 부하들에게 위압감을 주는 모양이더군. 그래서 네게 가르침을 구하고 싶다고 생각한 참이다.」"

[[dialogue]]
speaker = "unk"
original = "海での合宿の時、セドナさんは……"
translation = "바다에서 합숙할 때, 세드나 씨는……"

[[dialogue]]
speaker = "unk"
original = "そうでしょうか？"
translation = "그럴까요?"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「確かにリーリアからは、以前よりも肩の力を抜いて接してもらえるようになったと感じている」"
translation = "「확실히 리리아로부터는, 이전보다 어깨의 힘을 빼고 대해주는 것 같다고 느끼고 있다.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「だが、他の者とはまだ、な。ネビュラは対リクリエのためにトップダウンの構造を徹底してきた組織だ」"
translation = "「하지만, 다른 자들과는 아직, 이다. 네뷸라는 대 리크리에를 위해 하향식 구조를 철저히 해온 조직이지.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「統制管理官という肩書きを持つ私の前で、まだ萎縮している者は多い」"
translation = "「통제관리관이라는 직함을 가진 내 앞에서, 아직 위축되어 있는 자가 많다.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「もちろん緩めればいいというものではないが、過度の緊張感はマイナスに働くことがあるのも事実」"
translation = "「물론 완화하면 된다는 것은 아니지만, 과도한 긴장감은 마이너스로 작용할 때가 있는 것도 사실.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「かつてウェンディがミスを隠そうとしたのも、私の叱責を恐れたことが原因だ」"
translation = "「과거에 웬디가 실수를 숨기려 했던 것도, 나의 질책을 두려워한 것이 원인이다.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「それについ先日も、書類の小さな数字のミスを、この世の終わりのような顔で報告しにきた部下がいてな……」"
translation = "「게다가 바로 요전에도, 서류의 작은 숫자 실수를 이 세상의 종말이라도 온 듯한 얼굴로 보고하러 온 부하가 있어서 말이지……」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「私は、部下にとって良い上官でありたいと思う。だからこそ、お前から学べることは何でも吸収したい」"
translation = "「나는 부하에게 좋은 상관이고 싶다고 생각한다. 그렇기에 네게서 배울 수 있는 것은 무엇이든 흡수하고 싶군.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「だから手ほどきをして欲しい。どうすれば、部下を威圧しない上司になれるだろうか？」"
translation = "「그러니 지도를 해주었으면 한다. 어떻게 하면 부하를 위압하지 않는 상사가 될 수 있을까?」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「──ふむ？\u3000お前はアルバイトの経験が豊富……ああ、そういえば部下からの調査資料にそんなことが書いてあったな」"
translation = "「──흠? 너는 아르바이트 경험이 풍부하다고…… 아아, 그러고 보니 부하의 조사 자료에 그런 것이 적혀 있었지.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「なるほど。様々な職場のコミュニティに関わるうちに、自然と人好きする笑顔を見に付けられた、と……」"
translation = "「과연. 다양한 직장의 커뮤니티에 관여하는 동안, 자연스럽게 사람들에게 호감을 사는 미소를 익히게 되었다는 건가……」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「一理あるな。しかし、私は魔女だ。ネビュラ以外の場所で職に就くのは難しいな……」"
translation = "「일리가 있군. 하지만 나는 마녀다. 네뷸라 이외의 장소에서 직업을 갖는 것은 어렵겠지……」"

[[dialogue]]
speaker = "unk"
original = "なら俺がアルバイトを紹介しましょうか"
translation = "그럼 제가 아르바이트를 소개해 드릴까요?"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ほう？\u3000やはり話してみるものだな。頼めるか」"
translation = "「호오? 역시 말해보길 잘했군. 부탁해도 되겠나.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「次の日曜日……？\u3000わかった、予定を空けておこう。よろしく頼む」"
translation = "「다음 일요일……? 알았다, 예정을 비워두지. 잘 부탁한다.」"

[[dialogue]]
speaker = "unk"
original = "そして後日──俺はセドナさんを誘って、リゾート結界にやってきていた。アルバイトの内容は、海の家のお手伝いだ。"
translation = "그리고 며칠 후── 나는 세드나 씨를 권유해서 리조트 결계에 와 있었다. 아르바이트 내용은 바다의 집 일을 돕는 것이다."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「なるほど……プライベートビーチでなく、一般開放されているリゾート結界もあるのだな。とは言っても、まだ誰もいないようだが？」"
translation = "「과연…… 프라이빗 비치가 아니라, 일반 개방되어 있는 리조트 결계도 있군. 그렇다고는 해도, 아직 아무도 없는 것 같다만?」"

[[dialogue]]
speaker = "unk"
original = "段取りを決めておかないとですからね"
translation = "순서를 정해둬야 하니까요."

[[dialogue]]
speaker = "unk"
original = "お客が入って来る前に"
translation = "손님이 들어오기 전에."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「研修の時間というわけか。助かる」"
translation = "「연수 시간이라는 건가. 도움이 되는군.」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ワオ！\u3000こんにちはデス、魔女のお姉さん！」"
translation = "「와오! 안녕하심쇼, 마녀 누님!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「今日はカイチョーと一緒に海の家のお手伝い、頑張ってくれるって聞きマシタ！\u3000ＢＩＧ助かりま～す♪」"
translation = "「오늘은 회장님이랑 같이 바다의 집 돕기, 힘내주신다고 들었슴다! BIG 도움되네여~♪」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ああ。よろしく頼む。して、私は何をすればいい？」"
translation = "「아아. 잘 부탁한다. 그래서, 나는 무엇을 하면 되지?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ハイ！\u3000もうすぐお客さん、イッパイ来ます！\u3000ワタシは料理を作るので、フロアの方をお願いしま～す♪」"
translation = "「하이! 곧 손님들 잔뜩 오심쇼! 와타시는 요리를 만들 테니까, 홀 쪽을 부탁드림다~♪」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「給仕か。初めての試みだが、心得た」"
translation = "「서빙인가. 처음 해보는 시도지만, 숙지했다.」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「では、ワタシは仕込みがあるので失礼しま～す！\u3000詳しいことはカイチョーに聞いてクダサイ！」"
translation = "「그럼 와타시는 준비할 게 있어서 실례하심쇼! 자세한 건 회장님께 물어봐 주심쇼!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「で、フロアの業務は……なるほどな。やってきた客の注文を伝票に書き、リップルに伝えればいいのか。承知した」"
translation = "「그래서, 홀 업무는…… 과연. 찾아온 손님의 주문을 전표에 적어 리플에게 전달하면 되는 건가. 승낙했다.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ではメニュー表を見せろ。ふむ──この内容ならば３分ですべて記憶できる」"
translation = "「그럼 메뉴판을 보여다오. 흠── 이 내용이라면 3분이면 전부 기억할 수 있다.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ああそうだ、お前。ここの目玉の商品はなんだ。男と女で頼むメニューに偏りはあるか？」"
translation = "「아아 그렇지, 너. 이곳의 주력 상품은 무엇이지? 남성과 여성이 주문하는 메뉴에 편중이 있나?」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「客からオススメを問われた際は何と答えればいい？\u3000あとは、そうだな。店員にノルマなどあれば聞いておきたい」"
translation = "「손님으로부터 추천을 요청받았을 때는 뭐라고 답하면 되지? 그리고, 그래. 점원에게 할당량 같은 것이 있다면 들어두고 싶군.」"

[[dialogue]]
speaker = "unk"
original = "店員が最も気を付けることは……"
translation = "점원이 가장 조심해야 할 것은……"

[[dialogue]]
speaker = "unk"
original = "それも大切ですけれど"
translation = "그것도 중요하지만요."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「……接客スマイル？\u3000ああ、わかった。笑顔だな。了解した」"
translation = "「……접객 스마일? 아아, 알았다. 미소군. 양해했다.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「何？\u3000試しに笑ってみろ、だと？\u3000まあ、構わんが──」"
translation = "「뭐지? 시험 삼아 웃어보라고? 뭐, 상관없다만──」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「──フッ」"
translation = "「──훗.」"

[[dialogue]]
speaker = "unk"
original = "もうちょっとニッコリお願いします"
translation = "조금만 더 생긋 부탁드려요."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「なんだと……？\u3000これ以上、どう笑えというんだ？\u3000もう十分に笑顔を作っているだろう」"
translation = "「뭐라고……? 이 이상 어떻게 웃으라는 거지? 이미 충분히 미소를 짓고 있지 않나.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「表情が硬い？\u3000馬鹿な……今でもかなり笑っているつもりなんだが……」"
translation = "「표정이 딱딱하다고? 바보 같은…… 지금도 꽤 웃고 있다고 생각한다만……」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「開店までまだ間がある……？\u3000そ、そうだな。できる限り練習してみよう……」"
translation = "「개점까지 아직 시간이 있다고……? 그, 그렇군. 가능한 한 연습해 보지……」"

[[dialogue]]
speaker = "unk"
original = "こうしてセドナさんの、海の家でのアルバイト体験が始まった。"
translation = "이렇게 세드나 씨의 바다의 집 아르바이트 체험이 시작되었다."

[[dialogue]]
speaker = "unk"
original = "しかし、笑顔の表情を何回作ってみても、どこかぎこちない、硬い表情になってしまうのだった……"
translation = "하지만 미소 띤 표정을 몇 번이나 지어봐도, 어딘가 어색하고 딱딱한 표정이 되어버리는 것이었다……"

