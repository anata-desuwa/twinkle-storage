[[dialogue]]
speaker = "unk"
original = "バレンタインの時期が近づいてきた、ある日の放課後。"
translation = "발렌타인 시기가 다가온 어느 날 방과 후."

[[dialogue]]
speaker = "イクシリオン"
original = "（これでバレンタインのチョコ作りに必要な材料は、ひと通り揃いましたね）"
translation = "(이걸로 발렌타인 초콜릿 만들기에 필요한 재료는 대충 다 모였네요.)"

[[dialogue]]
speaker = "unk"
original = "新星学園１年生の『イクシリオン・グレゴール』は、街へ買い物に来ていた。"
translation = "신성학원 1학년인 '익실리온 그레고르'는 거리로 쇼핑을 하러 나와 있었다."

[[dialogue]]
speaker = "unk"
original = "彼女は学園でも清楚で真面目、文武両道の優等生として知られる少女。１年生の中でも屈指の実力を誇るプリマステラである。"
translation = "그녀는 학원에서도 청초하고 성실하며 문무를 겸비한 우등생으로 알려진 소녀. 1학년 중에서도 굴지의 실력을 자랑하는 프리마스텔라다."

[[dialogue]]
speaker = "イクシリオン"
original = "（会長、私がバレンタインチョコを贈ったら、喜んで下さるでしょうか……？）"
translation = "(회장님, 제가 발렌타인 초콜릿을 드리면 기뻐해 주실까요……?)"

[[dialogue]]
speaker = "unk"
original = "そんなことを考えているうちに、いつものようにイクシリオンの頭の中では、<b>妄想</b>が広がり始めてしまう。"
translation = "그런 생각을 하는 사이에 평소처럼 익실리온의 머릿속에서는 **망상**이 펼쳐지기 시작한다."

[[dialogue]]
speaker = "クロト"
original = "「――あれ？\u3000イクシー、こんなところで会うなんて奇遇だね」"
translation = "「――어라? 이쿠시, 이런 데서 만나다니 기우네.」"

[[dialogue]]
speaker = "イクシリオン"
original = "「あっ、か、会長……！\u3000ごきげんよう。実はちょっと、買い物に来ていたところでして……」"
translation = "「앗, 회, 회장님……! 평안하신가요. 사실은 잠깐 쇼핑하러 왔던 참이라서……」"

[[dialogue]]
speaker = "クロト"
original = "「そうなんだ。袋からちょっと見えているのは……チョコかな？」"
translation = "「그렇구나. 봉투에서 살짝 보이는 건…… 초콜릿인가?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「は、はい。実はその……いつもお世話になっている会長に、バレンタインチョコを作ってお渡ししようと思っていまして。今日はその材料を――」"
translation = "「네, 네. 사실은 그…… 항상 신세 지고 있는 회장님께 발렌타인 초콜릿을 만들어 드리려고 생각해서요. 오늘은 그 재료를――」"

[[dialogue]]
speaker = "クロト"
original = "「そうだったんだ。照れるけど……楽しみにしてるよ」"
translation = "「그랬구나. 쑥스럽지만…… 기대하고 있을게.」"

[[dialogue]]
speaker = "イクシリオン"
original = "「はうっ！？\u3000～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「하우앗!? ～～～っ<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "（はぁぁっ……<emoji=heart04>\u3000そのはにかみスマイルは反則です……！\u3000胸がドキッとして、息が止まりそうになってしまいます……<emoji=heart04>）"
translation = "(하아아앗……<emoji=heart04> 그 수줍은 미소는 반칙이에요……! 가슴이 두근거려서 숨이 멎을 것 같아요……<emoji=heart04>)"

[[dialogue]]
speaker = "イクシリオン"
original = "「は、はい……<emoji=heart04>\u3000頑張って作ります……<emoji=heart04>」"
translation = "「네, 네……<emoji=heart04> 열심히 만들게요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "イクシリオンは頬を赤らめ、もじもじと視線を逸らしてしまって――"
translation = "익실리온은 뺨을 붉히며 머뭇머뭇 시선을 돌려버리고――"

[[dialogue]]
speaker = "イクシリオン"
original = "（ハッ……！？\u3000気づけば、もう寮の前に……！）"
translation = "(핫……!? 정신 차려보니 벌써 기숙사 앞……!)"

[[dialogue]]
speaker = "unk"
original = "気がつくと、そこは彼女が暮らす新星寮の前だった。"
translation = "정신을 차리고 보니 그곳은 그녀가 지내는 신성료 앞이었다."

[[dialogue]]
speaker = "イクシリオン"
original = "（ああっ<emoji=heart04>\u3000いけません！\u3000私ったら、まるで会長に本命チョコを渡すかのような妄想を……<emoji=heart04>）"
translation = "(아앗<emoji=heart04> 안 돼요! 나도 참, 마치 회장님께 본명 초콜릿을 주는 듯한 망상을……<emoji=heart04>)"

[[dialogue]]
speaker = "unk"
original = "――そう。イクシリオンには、つい暴走してしまう『妄想癖』があるのだ。"
translation = "――그렇다. 익실리온에게는 그만 폭주해버리는 '망상벽'이 있는 것이다."

[[dialogue]]
speaker = "イクシリオン"
original = "（会長に渡すのはあくまで義理チョコです。いつもお世話になっているお礼として……それだけなのに……<emoji=heart04>）"
translation = "(회장님께 드리는 건 어디까지나 의리 초콜릿이에요. 항상 신세 지고 있는 보답으로…… 그뿐인데……<emoji=heart04>)"

[[dialogue]]
speaker = "イクシリオン"
original = "（でも最近、会長のことを妄想しても、エッチな方向には全然ならないんですよね……）"
translation = "(하지만 요즘 회장님을 망상해도 야한 방향으로는 전혀 안 된단 말이죠……)"

[[dialogue]]
speaker = "イクシリオン"
original = "（いえ、そもそもお世話になっている会長を、そんな妄想のネタにするなんて失礼なこと……。そう思うと、むしろ良いことなのかもしれませんが……）"
translation = "(아니, 애초에 신세 지고 있는 회장님을 그런 망상의 소재로 삼다니 무례한 일……. 그렇게 생각하면 오히려 다행인 걸지도 모르겠지만……)"

[[dialogue]]
speaker = "イクシリオン"
original = "（けれど、どうにも物足りないというか……心の潤いが足りない気がして……！\u3000そう、妄想は私の心の癒し……！）"
translation = "(하지만 아무래도 허전하다고 할까…… 마음의 윤기가 부족한 느낌이라서……! 그래요, 망상은 제 마음의 치유……!)"

[[dialogue]]
speaker = "イクシリオン"
original = "（もしやこれが……『スランプ』というものなのでしょうか……！？）"
translation = "(설마 이것이…… '슬럼프'라는 것일까요……!?)"

[[dialogue]]
speaker = "unk"
original = "翌日の放課後。"
translation = "다음 날 방과 후."

[[dialogue]]
speaker = "女生徒"
original = "「トワちゃん先生、アドバイスありがとうございます！\u3000それじゃあ訓練行ってきますね♪」"
translation = "「토와 선생님, 조언 감사합니다! 그럼 훈련 다녀올게요♪」"

[[dialogue]]
speaker = "トワ先生"
original = "「うん、頑張って！\u3000困ったことがあったら、いつでも相談してね～♪」"
translation = "「응, 힘내! 곤란한 일이 있으면 언제든 상담하러 오렴～♪」"

[[dialogue]]
speaker = "unk"
original = "新星学園の教師『有明トワ』は、生徒の相談に乗った後、笑顔で手を振って見送った。"
translation = "신성학원의 교사 '아리아케 토와'는 학생의 상담을 마친 뒤 웃으며 손을 흔들어 배웅했다."

[[dialogue]]
speaker = "unk"
original = "トワはノヴァフォームに覚醒して以降、現役の星騎士としても最前線で活躍しており、今では生徒たちから一層頼られる存在となっている。"
translation = "토와는 노바 폼으로 각성한 이후 현역 성기사로서도 최전선에서 활약하고 있으며, 지금은 학생들로부터 한층 더 신뢰받는 존재가 되었다."

[[dialogue]]
speaker = "イクシリオン"
original = "「……あの、トワ先生。少しお時間、よろしいでしょうか？」"
translation = "「……저기, 토와 선생님. 잠시 시간 괜찮으실까요?」"

[[dialogue]]
speaker = "トワ先生"
original = "「あれ？\u3000イクシリオンちゃん。こんにちは♪\u3000どうしたの？」"
translation = "「어라? 익실리온 양. 안녕♪ 무슨 일이니?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「実は……先生にご相談したいことがありまして」"
translation = "「사실은…… 선생님께 상담드리고 싶은 것이 있어서요.」"

[[dialogue]]
speaker = "トワ先生"
original = "「もちろん大丈夫だよ！\u3000トワ先生にまっかせなさい♪」"
translation = "「물론 괜찮지! 토와 선생님에게 맡겨주렴♪」"

[[dialogue]]
speaker = "unk"
original = "トワはイクシリオンとゆっくり話せるように、新星学園の会議室へと場所を移した。"
translation = "토와는 익실리온과 천천히 이야기할 수 있도록 신성학원의 회의실로 자리를 옮겼다."

[[dialogue]]
speaker = "トワ先生"
original = "「――それで、イクシリオンちゃんの相談っていうのは……？」"
translation = "「――그래서, 익실리온 양의 상담이라는 건……?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「はい。実は……昨日の夜――」"
translation = "「네. 사실은…… 어제 밤에――」"

[[dialogue]]
speaker = "イクシリオン"
original = "「突然、戦闘服がこのような姿に変わってしまいまして……<emoji=heart04>」"
translation = "「갑자기 전투복이 이런 모습으로 변해버려서요……<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
original = "「えっ！？\u3000それって、まさか……『バレンタインフォーム』！？」"
translation = "「엣!? 그거 설마…… 『발렌타인 폼』!?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「はい。お恥ずかしながら、おそらく……<emoji=heart04>」"
translation = "「네. 부끄럽지만 아마도……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "イクシリオンの新たな姿を前に、トワは思わず目を丸くしてしまうのだった。"
translation = "익실리온의 새로운 모습을 보고 토와는 그만 눈이 휘둥그레지고 말았다."

