[[dialogue]]
speaker = "unk"
original = "第１話,ママダレナと甘やかしバカンス,P"
translation = "제1화, 마마달레나와 응석받이 바캉스, P"

[[dialogue]]
speaker = "unk"
original = "とある休日。俺は恋人のマグダレナと、リゾート結界のプライベートビーチへ遊びに来ていた。"
translation = "어느 휴일. 나는 연인인 막달레나와 리조트 결계의 프라이빗 비치에 놀러 왔다."

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「会長、おはようございます～♪」"
translation = "「회장님, 안녕하세요~♪」"

[[dialogue]]
speaker = "unk"
original = "マグダレナが附属生の小さな体で着ているのは、最近手に入れた水着フォームだった。"
translation = "막달레나가 부속생의 작은 몸으로 입고 있는 것은 최근에 얻은 수영복 폼이었다."

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「え？\u3000――今日も水着が似合ってて可愛い、ですか？」"
translation = "「에? ――오늘도 수영복이 잘 어울려서 귀엽다, 고요?」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「えへへ<emoji=heart04>\u3000ありがとうございます～<emoji=heart04>\u3000会長に褒められると、ママダレナ、愛が溢れてキュンキュンしちゃいます～<emoji=heart04>」"
translation = "「에헤헤<emoji=heart04> 감사합니다~<emoji=heart04> 회장님께 칭찬받으면 마마달레나, 사랑이 넘쳐서 큥큥거려요~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "改めて、ちゃんと褒めたかったんだ"
translation = "새삼스럽게 제대로 칭찬해주고 싶었어."

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「――今日は恋人同士、２人きりのデートだから？\u3000ふふっ♪\u3000なら今日は、ママダレナとゆっくりバカンスを楽しんじゃいましょうね♪」"
translation = "「――오늘은 연인끼리 둘만의 데이트니까? 후훗♪ 그럼 오늘은 마마달레나와 느긋하게 바캉스를 즐겨봐요♪」"

[[dialogue]]
speaker = "unk"
original = "それから海で軽く遊んだあとは、砂浜のパラソルの下に敷いたビーチマットで、まったりくつろぐことにした。"
translation = "그러고 나서 바다에서 가볍게 논 뒤에는 백사장의 파라솔 아래 깔아둔 비치 매트에서 느긋하게 쉬기로 했다."

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「会長、こちらへどうぞ～♪\u3000ママダレナが、た～っぷり甘やかして差し上げますね<emoji=heart04>」"
translation = "「회장님, 이쪽으로 오세요~♪ 마마달레나가 듬~뿍 응석 받아 드릴게요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "誘われるまま、俺はマグダレナの太ももに頭を預け、膝枕をしてもらう。"
translation = "권유받는 대로 나는 막달레나의 허벅지에 머리를 맡기고 무릎베개를 받았다."

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「ふふっ……ママダレナのお膝、気持ちいいですか～？」"
translation = "「후훗…… 마마달레나의 무릎, 기분 좋으신가요~?」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「――気持ち良くて眠くなっちゃいそう……？\u3000よかったです～♪\u3000会長、いつもお仕事を頑張ってますもんね♪」"
translation = "「――기분 좋아서 잠이 올 것 같다……? 다행이에요~♪ 회장님, 항상 일 열심히 하고 계시니까요♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「眠くなったら、そのまま寝ちゃって大丈夫ですよ～。ママダレナがずっと撫でててあげますからね<emoji=heart04>」"
translation = "「잠이 오면 그대로 자버려도 괜찮아요~. 마마달레나가 계속 쓰다듬어 줄 테니까요<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「ほら……会長、いつも頑張ってえらいえらい♪\u3000よしよし……なでなで♪」"
translation = "「자…… 회장님, 항상 노력해서 장해요 장해♪ 착하다 착해…… 쓰담쓰담♪」"

[[dialogue]]
speaker = "unk"
original = "俺がしばらく膝枕に身をゆだねていると、マグダレナがクーラーボックスから小さく切ったメロンを取り出した。"
translation = "내가 한동안 무릎베개에 몸을 맡기고 있자, 막달레나가 아이스박스에서 작게 썬 멜론을 꺼냈다."

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「はい、会長♪\u3000ママダレナのメロンをどうぞ……あ～ん<emoji=heart04>」"
translation = "「자, 회장님♪ 마마달레나의 멜론 드세요…… 아~앙<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「えへへ～<emoji=heart04>\u3000ちゃんと食べてくれましたね<emoji=heart04>\u3000会長をお世話できると……ママダレナ、とっても幸せな気持ちになります～<emoji=heart04>」"
translation = "「에헤헤~<emoji=heart04> 제대로 먹어줬네요<emoji=heart04> 회장님을 돌봐줄 수 있으면…… 마마달레나, 너무 행복한 기분이 돼요~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "じゃあ、次は俺からもしてあげたい"
translation = "그럼 다음은 나도 해주고 싶어."

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「いいんですか？\u3000ふふっ、じゃあ恋人として、ママダレナもちょっと甘えちゃいますね<emoji=heart04>」"
translation = "「괜찮나요? 후훗, 그럼 연인으로서 마마달레나도 조금 응석 부릴게요<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「――あ～ん<emoji=heart04>\u3000あむっ……もぐもぐ♪」"
translation = "「――아~앙<emoji=heart04> 아암…… 우물우물♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「ん～♪\u3000えへへ、おいしいです～<emoji=heart04>\u3000会長に食べさせてもらうと、愛でもっと甘く感じちゃいます<emoji=heart04>」"
translation = "「음~♪ 에헤헤, 맛있어요~<emoji=heart04> 회장님이 먹여주니까 사랑 때문에 더 달콤하게 느껴져요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "フルーツの甘さを分け合ったあと、マグダレナが俺の顔を覗き込んでくる。"
translation = "과일의 달콤함을 나눈 뒤, 막달레나가 내 얼굴을 들여다본다."

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「会長……このまま膝枕でもいいんですが、もう１つ甘えてもいいですか？」"
translation = "「회장님…… 이대로 무릎베개도 좋지만, 하나 더 응석 부려도 될까요?」"

[[dialogue]]
speaker = "unk"
original = "俺が頷くと、マグダレナは嬉しそうに微笑んだ。"
translation = "내가 고개를 끄덕이자 막달레나는 기쁜 듯이 미소 지었다."

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「じゃあ、横に失礼しますね♪\u3000……よいしょっ<emoji=heart04>」"
translation = "「그럼 옆에 실례할게요♪ ……영차<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マグダレナは寄り添うように俺のすぐ隣に寝転ぶ。"
translation = "막달레나는 곁에 달라붙듯이 내 바로 옆에 눕는다."

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「えへへ<emoji=heart04>\u3000ママダレナ、添い寝しちゃいます<emoji=heart04>\u3000このままハグ……しますね♪」"
translation = "「에헤헤<emoji=heart04> 마마달레나, 곁잠 잘게요<emoji=heart04> 이대로 허그…… 할게요♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「はい、ぎゅ～……です<emoji=heart04>」"
translation = "「자, 꼬옥……이에요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は優しく頭を抱き込まれ、ゆっくりと撫でられる。"
translation = "나는 다정하게 머리를 안겨 천천히 쓰다듬어진다."

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「ふふっ……どうですか？\u3000会長、安心して眠れそうですか？」"
translation = "「후훗…… 어때요? 회장님, 안심하고 잠들 수 있을 것 같나요?」"

[[dialogue]]
speaker = "unk"
original = "安心できるが……一方でこの抱き方だと、どうしてもマグダレナの大きな胸が顔に触れてしまうわけで。"
translation = "안심은 되지만…… 한편으로 이런 안는 방식이면 아무래도 막달레나의 커다란 가슴이 얼굴에 닿게 되는데."

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「え？\u3000――眠るよりも、イチャイチャしたい気分になってきちゃった……？」"
translation = "「에? ――잠들기보다 꽁냥거리고 싶은 기분이 되어버렸다……?」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「ふふっ……ママダレナのおっぱいが顔に当たっちゃったせい、ですか？\u3000会長、かわいいです～<emoji=heart04>\u3000甘えん坊の恋人さんですね♪\u3000よしよし<emoji=heart04>」"
translation = "「후훗…… 마마달레나의 가슴이 얼굴에 닿아버린 탓인가요? 회장님, 귀여워요~<emoji=heart04> 어리광쟁이 연인이네요♪ 착하다 착해<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「もちろんいいですよ～。ママダレナが、いっぱい甘やかして差し上げますね<emoji=heart04>」"
translation = "「물론 좋지요~. 마마달레나가 잔뜩 응석 받아 드릴게요<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「ん～<emoji=heart04>\u3000ちゅっ<emoji=heart04>」"
translation = "「음~<emoji=heart04> 츄<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "おでこに軽く触れる、柔らかなキス。"
translation = "이마에 가볍게 닿는 부드러운 키스."

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「……えへへっ<emoji=heart04>\u3000会長、ドキッとしましたか～？」"
translation = "「……에헤헤<emoji=heart04> 회장님, 두근거렸나요~?」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「じゃあ……次は、もっと甘い気分にしちゃいますね♪\u3000ん～っ<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「그럼…… 다음은 좀 더 달콤한 기분으로 만들어 드릴게요♪ 음~<emoji=heart04> 츄……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "今度は正面から、そっと唇が触れ合う。"
translation = "이번에는 정면에서 살며시 입술이 맞닿는다."

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「ふふっ……会長の甘えてる時の顔、すごく好きです……<emoji=heart04>」"
translation = "「후훗…… 회장님이 응석 부릴 때의 얼굴, 정말 좋아해요……<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「今度は、会長の方から……甘えてほしいです<emoji=heart04>」"
translation = "「이번에는 회장님 쪽에서…… 응석 부려줬으면 좋겠어요<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「ん～っ……<emoji=heart04>\u3000ちゅっ……ちゅっ……<emoji=heart04>」"
translation = "「음~……<emoji=heart04> 츄……츄……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その後もしばらく、お互いに甘えたり甘やかされたりして、フルーツよりも甘いバカンスを満喫するのだった。"
translation = "그 후로도 한동안, 서로 응석을 부리거나 받아주기도 하며, 과일보다도 달콤한 바캉스를 만끽하는 것이었다."

