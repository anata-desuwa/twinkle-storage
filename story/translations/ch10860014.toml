[[dialogue]]
speaker = "unk"
original = "第４話,百合カップル（偽）,P"
translation = "제4화, 백합 커플 (가짜), P"

[[dialogue]]
speaker = "unk"
original = "アニマ先輩の作った分裂薬により、並行して附属校にも通えることになり、俺は久しぶりに附属生女子のアバターで登校していた――"
translation = "아니마 선배가 만든 분열약에 의해, 병행해서 부속 학교에도 다닐 수 있게 되어, 나는 오랜만에 부속생 여자의 아바타로 등교하고 있었다――"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「会長とまたこうして昼食を一緒にできて、アルモたんは嬉しいのだ♪\u3000もぐもぐ♪」"
translation = "「회장님과 다시 이렇게 점심을 같이할 수 있어서, 알모땅은 기쁜 것이다♪ 우물우물♪」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「ふふっ、何を言ってるんですか、アルモタヘルったら。恋人として、よく会長と一緒にいるじゃないですか」"
translation = "「후훗, 무슨 말씀을 하시는 건가요, 아르모타헬도 참. 연인으로서, 자주 회장님과 함께 있잖아요」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「附属校女子になった会長と会うのは久しぶりなのだ！\u3000アルモたん的には、男の会長と、女の子の会長は別腹なのだ！」"
translation = "「부속 학교 여자가 된 회장님과 만나는 건 오랜만인 것이다! 알모땅적으로는, 남자인 회장님과, 여자아이인 회장님은 별개인 것이다!」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「なるほど、一理あるかもしれません。女の子になった会長、本当に可愛いらしいですもんね。それはもう、ママダレナの娘になって欲しいくらいです♪」"
translation = "「과연, 일리가 있을지도 모르겠네요. 여자아이가 된 회장님, 정말 사랑스러우시니까요. 그건 이제, 마마다레나의 딸이 되었으면 할 정도예요♪」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「ダメなのだ！\u3000会長はアルモたんのものなのだ！\u3000たとえ今は同性であっても、くっ付いていいのは恋人のアルモたんだけなのだ！」"
translation = "「안 되는 것이다! 회장님은 알모땅의 것인 것이다! 설령 지금은 동성이라 해도, 달라붙어도 되는 건 연인인 알모땅뿐인 것이다!」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「あらあら、残念です。お熱いですね、うふふ♪」"
translation = "「어머어머, 아쉽네요. 뜨거우시네요, 우후후♪」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「じ～っ……」"
translation = "「지~익……」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「ん……？\u3000なんだか視線を感じるような……？」"
translation = "「응……? 왠지 시선이 느껴지는 듯한……?」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「まあ、きっと、会長の姿が可愛いからだな♪\u3000とりあえず会長、いつもみたいにアルモたんにアレをやって欲しいのだ♪」"
translation = "「뭐, 분명, 회장님의 모습이 귀여우니까겠지♪ 일단 회장님, 평소처럼 알모땅에게 그걸 해 줬으면 하는 것이다♪」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「――周りに見られるから、恥ずかしい？\u3000え～、やだやだ、お願いなのだ～」"
translation = "「――주변에서 보니까, 부끄럽다고? 에~, 싫어 싫어, 부탁인 것이다~」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「えへへ～、してくれるのだ？\u3000ありがとうなのだ♪\u3000――あ～んなのだ♪」"
translation = "「에헤헤~, 해 주는 것이다? 고마운 것이다♪ ――아~앙인 것이다♪」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「あむっ♪\u3000もぐもぐ♪\u3000……ん～♪\u3000幸せスパイスで、お肉がとっても美味なのだ……♪」"
translation = "「아암♪ 우물우물♪ ……음~♪ 행복 스파이스로, 고기가 정말 맛있는 것이다……♪」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「はあぁ……てぇてぇ……<emoji=heart04>」"
translation = "「하아아…… 테에테에……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「むっ……！\u3000やっぱり熱い視線を感じるのだ！\u3000そこだな！」"
translation = "「뭇……! 역시 뜨거운 시선이 느껴지는 것이다! 거기구나!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ひゃっ！？\u3000ご、ごめんなさい！」"
translation = "「히약!? 죄, 죄송합니다!」"

[[dialogue]]
speaker = "unk"
original = "ヒトリ、こんにちは"
translation = "히토리, 안녕"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「会長、この子と知り合いなのか？」"
translation = "「회장님, 이 아이와 아는 사이인가?」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「なるほど、幽霊を連れている星騎士が新星学園にいると聞いていたが、それがお前のことだったのだな」"
translation = "「과연, 유령을 데리고 있는 성기사가 신성 학원에 있다고 들었다만, 그게 너였던 것이로구나」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「は、はい、不知火ヒトリと言います。それで……こちらが幽霊友達の、ゆーちゃんです」"
translation = "「네, 네, 시라누이 히토리라고 합니다. 그리고…… 이쪽이 유령 친구인, 유짱이에요」"

[[dialogue]]
speaker_original = "ゆーちゃん"
speaker_translation = "유짱"
original = "「ゆー♪」"
translation = "「유~♪」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「よろしくなのだ！\u3000それで、ヒトリはアルモたん達に熱い視線を送っていたようだが、何か気になることでもあったのか？」"
translation = "「잘 부탁하는 것이다! 그래서, 히토리는 알모땅 일행에게 뜨거운 시선을 보내고 있었던 모양이다만, 뭔가 신경 쓰이는 일이라도 있었던 것이냐?」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「え！？\u3000そ、それはその……私、現実に女の子同士の……『百合カップル』を見るのが初めてだったので、興奮を抑えられなくて……！」"
translation = "「에!? 그, 그건 그게…… 저, 현실에서 여자아이끼리의…… 『백합 커플』을 보는 게 처음이라서, 흥분을 억제할 수 없어서……!」"

[[dialogue]]
speaker = "unk"
original = "いや、中身の俺は男だけど！？"
translation = "아니, 알맹이인 나는 남자인데!?"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「わ、わかってます！\u3000で、でも、何というか……」"
translation = "「아, 알고 있어요! 하, 하지만, 뭐랄까……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「私的には、今の会長さんは可愛いのでアリというか……」"
translation = "「제 입장에서는, 지금의 회장님은 귀여우니까 가능하달까……」"

[[dialogue]]
speaker = "unk"
original = "どういうこと！？"
translation = "무슨 소리야!?"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「ノリのいいクラスの男の子たちも、会長さんに話しかけられると異性と意識して、照れたりしてますしね～♪」"
translation = "「분위기 잘 타는 반 남자애들도, 회장님이 말을 걸면 이성으로 의식해서, 수줍어하거나 하니까요~♪」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「会長は性別問わず、人たらしなのだ。でも、ユリ……？\u3000というのは一体、なんなのだ？」"
translation = "「회장님은 성별 불문하고, 사람을 홀리는 것이다. 하지만, 유리……? 라는 건 대체, 무엇인 것이냐?」"

[[dialogue]]
speaker = "unk"
original = "俺は、ヒトリが実は女の子同士の絡みを見るのが好きな『百合好き』であるということを説明する。"
translation = "나는, 히토리가 사실은 여자아이끼리의 얽힘을 보는 것을 좋아하는 『백합 마니아』라는 것을 설명한다."

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「――ふむ。確かに周りでは、女の子同士のカップルは見かけたことがなかったのだ！」"
translation = "「――흐음. 확실히 주변에서는, 여자아이끼리의 커플은 본 적이 없었던 것이다!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「そ、それで……あの、実は１つ聞きたいことがあって……！」"
translation = "「그, 그래서…… 저기, 사실은 하나 묻고 싶은 게 있어서……!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「その……アルモタヘルさんは、女の子の会長さんに対してもドキドキしたりとか、好きって思ったりとか、するんでしょうか……？」"
translation = "「그게…… 아르모타헬 씨는, 여자아이인 회장님에 대해서도 두근거리거나, 좋아한다고 생각하거나, 하는 걸까요……?」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「重要なのは、『女の子の会長』への気持ち？\u3000……そこまで深く考えたことはなかったのだ。でも……」"
translation = "「중요한 건, 『여자아이인 회장님』에 대한 마음? ……거기까지 깊게 생각해 본 적은 없었던 것이다. 하지만……」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「たとえ会長の本来の性別が女だったとしても、きっと同じように好きになっていた気がするのだ」"
translation = "「설령 회장님의 본래 성별이 여자였다고 해도, 분명 똑같이 좋아하게 되었을 기분이 드는 것이다」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「会長が小さい姿になったアルモたんに対しても、変わらず好きと言ってくれたように……守護天使の我が、人間に恋をしたようにな♪」"
translation = "「회장님이 어린 모습이 된 알모땅에 대해서도, 변함없이 좋다고 말해 주었듯이…… 수호천사인 내가, 인간에게 사랑을 한 것처럼 말이다♪」"

[[dialogue]]
speaker = "unk"
original = "アルモから真っ直ぐに見つめられて、思わずドキッとしてしまう。"
translation = "알모가 똑바로 바라봐서, 나도 모르게 두근거리고 만다."

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「て……てぇてぇ……！」"
translation = "「테…… 테에테에……!」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「でも、せっかくだし、試してみるのもいいかもしれないな……というわけで会長、ちょっとだけ拝借するのだ♪」"
translation = "「하지만, 기왕이면, 시험해 보는 것도 좋을지도 모르겠군…… 그런 고로 회장님, 잠깐만 빌리는 것이다♪」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「――ん？\u3000どこって……唇なのだ♪」"
translation = "「――응? 어디냐니…… 입술인 것이다♪」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「！？」"
translation = "「!?」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「ん～っ……ちゅっ<emoji=heart04>\u3000――えへへ<emoji=heart04>\u3000試してみたけど、やっぱり女の子の姿でも、ドキドキしちゃうのだ<emoji=heart04>」"
translation = "「응~…… 쪽<emoji=heart04> ――에헤헤<emoji=heart04> 시험해 봤지만, 역시 여자아이 모습이라도, 두근거려 버리는 것이다<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「てっ゛！（気絶）」"
translation = "「테띿! (기절)」"

[[dialogue]]
speaker_original = "ゆーちゃん"
speaker_translation = "유짱"
original = "「ゆっ゛！（昇天）」"
translation = "「유띿! (승천)」"

[[dialogue]]
speaker = "unk"
original = "カムバーック！！！"
translation = "컴백!!!"

[[dialogue]]
speaker = "unk"
original = "ちょっ、ゆーちゃんが成仏しかけてる！"
translation = "잠깐, 유짱이 성불하려 하고 있어!"

[[dialogue]]
speaker = "unk"
original = "慌てて２人を起こそうとする俺。"
translation = "당황해서 두 사람을 깨우려 하는 나."

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「あははっ♪\u3000ヒトリ、なかなか面白いやつなのだ♪」"
translation = "「아하핫♪ 히토리, 꽤 재미있는 녀석인 것이다♪」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「アルモタヘル、さては面白そうだと思って、わざと見せつけましたね？」"
translation = "「아르모타헬, 설마 재미있을 것 같다고 생각해서, 일부러 보여준 거죠?」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「てへぺろなのだ♪」"
translation = "「테헤페로인 것이다♪」"

[[dialogue]]
speaker = "unk"
original = "小さく舌を出して、可愛い悪戯スマイルをしてみせるアルモなのだった――"
translation = "살짝 혀를 내밀고, 귀여운 장난꾸러기 미소를 지어 보이는 알모였다――"

