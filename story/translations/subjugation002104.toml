[[dialogue]]
speaker = "unk"
original = "エンジュとメテオラ──人のコラプサーと遭遇した後、コハルコさんにさっきのことを報告しつつ、得られたデータを確認していた。"
translation = "엔쥬와 메테오라── 두 사람의 콜랩서와 조우한 뒤, 코하루코 씨에게 방금 있었던 일을 보고하며 얻은 데이터를 확인하고 있었다."

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「あれだけの数のモンスターを一瞬で殲滅するなんて……エンジュとメテオラ、新たなコラプサーもこれまでの５人に匹敵する脅威みたいだね」"
translation = "「그 정도 숫자의 몬스터를 순식간에 섬멸하다니…… 엔쥬와 메테오라, 새로운 콜랩서도 지금까지의 5명에 필적하는 위협인 것 같네.」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「そしてメテオラは流星市国に来たばかりと言っていた……コラプサーが戦力を集めているのは、何かを起こそうとしている前兆かも」"
translation = "「그리고 메테오라는 유성시국에 막 왔다고 했어…… 콜랩서가 전력을 모으고 있는 건, 무언가를 일으키려 하는 전조일지도 몰라.」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「私もいつも以上に警戒するけど……会長さんも注意してね」"
translation = "「나도 평소보다 더 경계하겠지만…… 회장님도 주의해 줘.」"

[[dialogue]]
speaker = "unk"
original = "そしてその数時間後──"
translation = "그리고 그로부터 몇 시간 뒤──"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "『緊急です！\u3000都内各所に無数のアステラが出現しました！\u3000出撃可能な星騎士は順次対処をお願いします！』"
translation = "『긴급 상황입니다! 도내 각지에 무수한 아스텔라가 출현했습니다! 출격 가능한 성기사들은 순차적으로 대처를 부탁드립니다!』"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「各所に無数って、ざっくりしすぎじゃないですか！？\u3000私はどこに行けばいいんですか！？」"
translation = "「각지에 무수히 많다니, 너무 대충 말하는 거 아니에요!? 저는 어디로 가야 하는 건가요!?」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "『情報を統合していますので、少々お待ちを──ミアさんは繁華街に発生したアステラを撃破してください』"
translation = "『정보를 통합 중이니 잠시만 기다려 주세요── 미아 씨는 번화가에 발생한 아스텔라를 격파해 주세요.』"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「わかりました！\u3000百合崎ミア、モンスター鎮圧に向かうわ！\u3000あたしだってちょっとは強くなったんだから！」"
translation = "「알겠어요! 백합자키 미아, 몬스터 진압하러 가겠어! 나도 조금은 강해졌으니까!」"

[[dialogue]]
speaker = "unk"
original = "不自然に同時多発した無数のアステラ。そして、大量のモンスター。"
translation = "부자연스럽게 동시다발적으로 발생한 무수한 아스텔라. 그리고 대량의 몬스터."

[[dialogue]]
speaker = "unk"
original = "コハルコさんのオペレーションの元、新星・流星両校の星騎士たちは一斉に出撃した。"
translation = "코하루코 씨의 오퍼레이션 아래, 신성·유성 양교의 성기사들은 일제히 출격했다."

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「ふーっ……数は多かったけど、手応えのないモンスターばかりだったわね！\u3000それとも、私が強くなったのかしら、ふふん♪」"
translation = "「후우…… 숫자는 많았지만, 손맛도 없는 몬스터뿐이었네! 아니면 내가 강해진 걸까, 흐흥♪」"

[[dialogue]]
speaker_original = "風紀委員Ａ"
speaker_translation = "풍기위원 A"
original = "「確かにそこまで強いモンスターではなかったですね。でも、モンスターを倒したのに、どうしてアステラが消えないんでしょうか……？」"
translation = "「확실히 그렇게 강한 몬스터는 아니었네요. 하지만 몬스터를 쓰러뜨렸는데 왜 아스텔라가 사라지지 않는 걸까요……?」"

[[dialogue]]
speaker_original = "風紀委員Ｂ"
speaker_translation = "풍기위원 B"
original = "「どこかにまだモンスターが隠れてるのかも？\u3000風紀委員各員、警戒を解かずに──」"
translation = "「어딘가에 아직 몬스터가 숨어있는 걸지도? 풍기위원 각원, 경계를 풀지 말고──」"

[[dialogue]]
speaker_original = "風紀委員Ｂ"
speaker_translation = "풍기위원 B"
original = "「ぐふっ！？」"
translation = "「구헉!?」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「！？\u3000大丈夫！？」"
translation = "「!? 괜찮아!?」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「アタシは逃げも隠れもしねえよ。真っ向から正々堂々、潰し合おうじゃねえか」"
translation = "「나(아타시)는 도망치지도 숨지도 않는다고. 정면에서 정정당당하게 서로 뭉개보자고.」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「キサナ……！？\u3000コラプサーがどうしてここに……！」"
translation = "「키사나……!? 콜랩서가 어째서 여기에……!」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ああ……あの時のチビか。因縁の対決ってヤツか？\u3000あれからちったぁ強くなったのかよ？」"
translation = "「아아…… 그때 그 꼬맹이인가. 인연의 대결이라는 녀석인가? 그때보다 조금은 강해졌냐?」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「……おかげさまで。一皮剥けさせてもらったわ」"
translation = "「……덕분에요. 한 꺼풀 벗겨지게 되었거든요.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ハハァ！\u3000声が震えちゃいるが、いい返事だ。泣き出さなかったのだけは褒めてやるよ」"
translation = "「하하아! 목소리가 떨리고는 있지만 좋은 대답이다. 울음을 터뜨리지 않은 것만은 칭찬해 주지.」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「コハルコ先輩、こちら、ミア。コラプサーのキサナと対峙……！\u3000新星学園の風紀委員だけじゃちょっとつらいかも……救援は期待できませんか……！？」"
translation = "「코하루코 선배, 여기는 미아. 콜랩서 키사나와 대치……! 신성학원 풍기위원들만으로는 조금 힘들지도…… 지원은 기대할 수 없을까요……!?」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "『ごめんなさい……！\u3000各所のアステラにコラプサーたちも同時に現れていて──！』"
translation = "『죄송해요……! 각지의 아스텔라에 콜랩서들도 동시에 나타나서──!』"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "『蛍火さんのところにはヴァレリーが』"
translation = "『케이카 씨 쪽에는 발레리가,』"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "『フランさんのところにイングリット』"
translation = "『프랑 씨 쪽에는 잉그리드가,』"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "『シャルレーヌさんのところにジュリエッテ』"
translation = "『샤를레느 씨 쪽에는 줄리에트가 나타났어요.』"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "『セナリィさんとネーゼマインさんは、リーナに対峙しています』"
translation = "『세나리 씨와 네제마인 씨는 리나와 대치하고 있습니다.』"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「コラプサーが勢揃いで……！？\u3000つまりアステラは星騎士をおびき寄せるための罠だったってこと……！？」"
translation = "「콜랩서가 총출동해서……!? 즉, 아스텔라는 성기사를 유인하기 위한 함정이었다는 거야……!?」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「救援に期待できないなら、私たちでやるしかないわ……！\u3000各員に通達！\u3000距離を保ちつつキサナを迎撃！\u3000絶対に正面から攻撃を受けちゃダメよ！」"
translation = "「지원을 기대할 수 없다면 우리끼리 할 수밖에 없어……! 각원에게 통달! 거리를 유지하며 키사나를 요격해! 절대로 정면에서 공격을 받으면 안 돼!」"

[[dialogue]]
speaker_original = "風紀委員Ａ"
speaker_translation = "풍기위원 A"
original = "「はい！」"
translation = "「넷!」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「へえ……肝が据わってんじゃねえか。いっぱしの顔になったみてえだな。さぁ！\u3000楽しくやり合おうぜ！」"
translation = "「헤에…… 배짱 좋은데. 제법 그럴싸한 얼굴이 됐잖아. 자! 즐겁게 한번 붙어보자고!」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「あはははは！\u3000誰もいないなー！\u3000けーかくどーり！」"
translation = "「아하하하하! 아무도 없다구ー! 계획대ー루!」"

[[dialogue]]
speaker_original = "エンジュ"
speaker_translation = "엔쥬"
original = "『陽動は成功したようだな。星騎士どもは泡食って慌てふためいている頃か』"
translation = "『유동은 성공한 모양이군. 성기사 놈들은 겁먹고 허둥지둥하고 있을 즈음인가.』"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「あはははは、星騎士たちはバカだなー！」"
translation = "「아하하하하, 성기사들은 바보라구ー!」"

[[dialogue]]
speaker_original = "エンジュ"
speaker_translation = "엔쥬"
original = "『頃合いだ。メテオラ。やりたい放題、景気よくぶっ放せ』"
translation = "『때가 됐다. 메테오라. 하고 싶은 대로 시원하게 갈겨버려.』"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「おー！\u3000どっかんどっかんするぞー！\u3000ミーサーイールーどっかーーーーん！」"
translation = "「오ー! 쾅쾅쾅 할 거라구ー! 미ー사ー이ー일ー 콰아앙!」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「あれれ？\u3000誰かいるぞ！？\u3000なにものだー！？」"
translation = "「어레레? 누군가 있다구!? 정체가 뭐냐ー!?」"

[[dialogue]]
speaker = "unk"
original = "新星学園の星徒会長だ！"
translation = "신성학원의 성도회장이다!"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「げぇ！\u3000魔王！\u3000なんでここにいるんだ！？\u3000エンジュ、話が違うぞー！？」"
translation = "「게엑! 마왕! 왜 여기 있는 거냐구!? 엔쥬, 말이 다르다구ー!?」"

[[dialogue]]
speaker_original = "エンジュ"
speaker_translation = "엔쥬"
original = "『アステラには釣られなかったってことか。だがどうして、ここに残った』"
translation = "『아스텔라에는 낚이지 않았다는 건가. 하지만 어째서 여기에 남았지?』"

[[dialogue]]
speaker = "unk"
original = "コハルコさんが気をつけろって言ってくれたから"
translation = "코하루코 씨가 조심하라고 말해 줬으니까."

[[dialogue]]
speaker = "unk"
original = "もしアステラが陽動であれば、本来星騎士に守られている場所を狙うためだと考えた。"
translation = "만약 아스텔라가 유동이라면, 본래 성기사가 지키고 있어야 할 장소를 노리기 위한 것이라고 생각했다."

[[dialogue]]
speaker = "unk"
original = "結果はこの通り。推測は的中したらしい。"
translation = "결과는 이대로다. 추측은 적중한 모양이다."

[[dialogue]]
speaker_original = "エンジュ"
speaker_translation = "엔쥬"
original = "『チッ……魔王は一筋縄では行かないか。まぁいい。あんまり簡単すぎても面白みに欠ける』"
translation = "『칫…… 마왕은 호락호락하지 않은 건가. 뭐 좋아. 너무 쉬워도 재미가 없지.』"

[[dialogue]]
speaker_original = "エンジュ"
speaker_translation = "엔쥬"
original = "『計画に支障はない。やれ、メテオラ！』"
translation = "『계획에 지장은 없다. 해라, 메테오라!』"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「おーっ！\u3000一番悪いやつ、ボッコボコにやっつけてやるぞー！\u3000覚悟しろ、魔王！」"
translation = "「오ー! 제일 나쁜 녀석, 너덜너덜하게 해치워 줄 거라구ー! 각오하라구, 마왕!」"

