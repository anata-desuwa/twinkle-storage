[[dialogue]]
speaker = "unk"
original = "第１０話,梨緒の素顔？,B"
translation = "제10화, 리오의 본모습?, B"

[[dialogue]]
speaker = "ヴィーナス"
original = "「クロトー！\u3000結局、御前試合の返事したのー？」"
translation = "「쿠로토~! 결국 어전시합 대답은 했어~?」"

[[dialogue]]
speaker = "クロト"
original = "「いや、まだだ。本人からもせっつかれたんだけど」"
translation = "「아니, 아직이야. 본인한테도 재촉받긴 했지만.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「もう、何迷ってるの？\u3000そんなのキッパリ断っちゃえばいいのよ。『星徒会長はこの俺だ！』ってね」"
translation = "「정말, 뭘 망설이는 거야? 그런 건 딱 잘라 거절해버리면 되잖아. 『성도회장은 바로 나다!』라고 말이야.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「なんなら梨緒を退学させることだってできるんだから。星徒会長ってそれだけ偉いのよ」"
translation = "「마음만 먹으면 리오를 퇴학시키는 것까지 할 수 있으니까. 성도회장은 그만큼 위대하다고.」"

[[dialogue]]
speaker = "クロト"
original = "「さすがに退学は強権すぎるだろ……」"
translation = "「아무리 그래도 퇴학은 너무 권력 남용이잖아……」"

[[dialogue]]
speaker = "unk"
original = "逆らう者は皆追放では独裁者にもほどがある。"
translation = "거스르는 자는 모두 추방이라니, 독재자도 정도가 있다."

[[dialogue]]
speaker = "unk"
original = "いや、実際退学を迫られたことはあるけども。"
translation = "아니, 실제로 퇴학 압박을 받은 적은 있지만 말이야."

[[dialogue]]
speaker = "クロト"
original = "「俺は御前試合で星徒会長になった身だからな。断っていいのか……」"
translation = "「나는 어전시합으로 성도회장이 된 몸이니까. 거절해도 되는 건지……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「じゃあ受ければいいじゃない。クロトなら勝てるでしょ」"
translation = "「그럼 받으면 되잖아. 쿠로토라면 이길 수 있을 거 아냐.」"

[[dialogue]]
speaker = "マトイ"
original = "「それはそれで問題あるんじゃない？\u3000自信ある人がこぞって御前試合を挑むようになっても大変だし」"
translation = "「그건 그것대로 문제 있지 않아? 자신 있는 사람들이 너도나도 어전시합을 걸게 되어도 골치 아프고.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そんなのクロトがまとめてぶっ飛ばせばいいのよ！」"
translation = "「그런 건 쿠로토가 한꺼번에 날려버리면 되는 거야!」"

[[dialogue]]
speaker = "マトイ"
original = "「え～～っ！？」"
translation = "「에에~~!?」"

[[dialogue]]
speaker = "サーシャ"
original = "「戦国時代の幕開けね～」"
translation = "「전국시대의 개막이네~」"

[[dialogue]]
speaker = "アナ"
original = "「群雄割拠の始まり」"
translation = "「군웅할거의 시작.」"

[[dialogue]]
speaker = "クロト"
original = "「戦乱の世にはならないでほしいんだけど……」"
translation = "「전란의 시대가 되지는 않았으면 좋겠는데……」"

[[dialogue]]
speaker = "unk"
original = "マトイの言った通り、軽々しく受けると『新星学園の星徒会長は御前試合を受けるもの』という風潮ができかねない。"
translation = "마토이가 말한 대로, 가볍게 받아들이면 『신성학원의 성도회장은 어전시합을 받는 존재』라는 풍조가 생길지도 모른다."

[[dialogue]]
speaker = "unk"
original = "だけど、迷っている理由が別にあることは、自分でも薄々理解していた。"
translation = "하지만, 망설이는 이유가 따로 있다는 것은 스스로도 어렴풋이 이해하고 있었다."

[[dialogue]]
speaker = "アナ"
original = "「確かに、御前試合を受ける理由も、受けない理由も両方あります」"
translation = "「확실히, 어전시합을 받을 이유도, 받지 않을 이유도 양쪽 다 있습니다.」"

[[dialogue]]
speaker = "アナ"
original = "「とはいえ、気にする必要はないと思います。今の会長にはリクリエを退けた実績がありますから、断っても逃げたと言われることはないでしょう」"
translation = "「그렇다 하더라도, 신경 쓸 필요는 없다고 생각해요. 지금의 회장님께는 리크리에를 물리친 실적이 있으니까, 거절해도 도망쳤다는 소리를 듣지는 않겠죠.」"

[[dialogue]]
speaker = "アナ"
original = "「もし挑戦者が続出しても、その時断ればいいだけのことですし」"
translation = "「만약 도전자가 속출하더라도, 그때 거절하면 그만인 일이고요.」"

[[dialogue]]
speaker = "マトイ"
original = "「ただ試合を見たいだけの人たちもいるみたいだけどね……」"
translation = "「그저 시합을 보고 싶어 하는 사람들도 있는 모양이지만……」"

[[dialogue]]
speaker = "サーシャ"
original = "「会長くんとヴィーナスちゃんの御前試合、盛り上がったものね～」"
translation = "「회장 군과 비너스 짱의 어전시합, 정말 흥미진진했는걸요~」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「結局、クロトの好きにすればいいってことよ。どっちでもいいからちゃっちゃと決めなさい！」"
translation = "「결국 쿠로토 마음대로 하라는 소리야. 어느 쪽이든 좋으니까 얼른얼른 정해!」"

[[dialogue]]
speaker = "クロト"
original = "「……ああ、明日には返事をするよ」"
translation = "「……아아, 내일은 대답할게.」"

[[dialogue]]
speaker = "マトイ"
original = "「でも大丈夫？\u3000最近授業中とかもぼんやりしてるみたいだけど……」"
translation = "「근데 괜찮아? 요즘 수업 중에도 멍하니 있는 것 같던데……」"

[[dialogue]]
speaker = "クロト"
original = "「そうか？\u3000……そうかも。疲れが遅れてやってきたのかもしれない」"
translation = "「그래? ……그럴지도. 피로가 뒤늦게 찾아온 걸지도 몰라.」"

[[dialogue]]
speaker = "クロト"
original = "「今日は、星徒会が終わったら寄り道せずに帰るよ」"
translation = "「오늘은 성도회 끝나면 딴 데 안 들르고 바로 갈게.」"

[[dialogue]]
speaker = "アナ"
original = "「ふむ……」"
translation = "「흠……」"

[[dialogue]]
speaker = "サーシャ"
original = "「うーん……」"
translation = "「으음……」"

[[dialogue]]
speaker = "unk"
original = "星徒会の後、結局真っ直ぐ帰らずに大聖堂へと足を運んだ。"
translation = "성도회가 끝난 후, 결국 곧장 귀가하지 않고 대성당으로 발걸음을 옮겼다."

[[dialogue]]
speaker = "unk"
original = "祈りたかったわけではない。懺悔に来たわけでもない。ただ静かな場所が欲しかったのかもしれない。"
translation = "기도하고 싶었던 건 아니다. 참회하러 온 것도 아니다. 그저 조용한 장소가 필요했던 걸지도 모른다."

[[dialogue]]
speaker = "unk"
original = "御前試合を迷っているのは……今の俺が星徒会長にふさわしいか疑問だったからだ。"
translation = "어전시합을 망설이는 건…… 지금의 내가 성도회장에 어울리는지 의문이었기 때문이다."

[[dialogue]]
speaker = "unk"
original = "俺は魔王の力を見込まれて、新星学園の星徒会長になった。"
translation = "나는 마왕의 힘을 인정받아 신성학원의 성도회장이 되었다."

[[dialogue]]
speaker = "unk"
original = "だが魔王の力を引き出せない俺が、星徒会長の座にいていいのか？"
translation = "하지만 마왕의 힘을 끌어낼 수 없는 내가, 성도회장 자리에 있어도 되는 걸까?"

[[dialogue]]
speaker = "unk"
original = "みんなを傷つけるかもしれない……世界を滅ぼすかもしれない俺が、みんなの側にいてもいいのか？"
translation = "모두를 상처 입힐지도 모르는…… 세계를 멸망시킬지도 모르는 내가, 모두의 곁에 있어도 되는 걸까?"

[[dialogue]]
speaker = "？？？"
original = "「うぅ……ぐす……」"
translation = "「으으…… 흑……」"

[[dialogue]]
speaker = "クロト"
original = "「……？」"
translation = "「……?」"

[[dialogue]]
speaker = "unk"
original = "聞こえた声の方に視線を向けると──"
translation = "들려온 목소리 쪽으로 시선을 돌리자──"

[[dialogue]]
speaker = "梨緒"
original = "「御前試合……本当に勝てるのか？\u3000相手は星徒会長だぞ？\u3000最強なんだぞ？」"
translation = "「어전시합…… 정말 이길 수 있을까? 상대는 성도회장이라고? 최강이란 말이야.」"

[[dialogue]]
speaker = "unk"
original = "大聖堂の片隅、小さくうずくまりながら呟く梨緒。"
translation = "대성당 한구석, 작게 웅크린 채 중얼거리는 리오."

[[dialogue]]
speaker = "unk"
original = "声は弱々しく震え、先日相対した時の凛々しさが嘘のようだ。"
translation = "목소리는 힘없이 떨리고 있어, 요전번에 마주했을 때의 늠름함이 거짓말 같다."

[[dialogue]]
speaker = "梨緒"
original = "「私は何をやっても、よくて二番手止まりで……ジグにも勝てなくて……今まで何もできなかった……」"
translation = "「나는 뭘 해도 잘해봐야 2인자에서 멈추고…… 지그에게도 이기지 못하고…… 지금까지 아무것도 못 했어……」"

[[dialogue]]
speaker = "梨緒"
original = "「私にできるのか……？\u3000仲間も、親友も、学園も、全て失っておきながら、おめおめと生き残った私に……」"
translation = "「내가 할 수 있을까……? 동료도, 친우도, 학원도 전부 잃어버리고서 뻔뻔하게 살아남은 내가……」"

[[dialogue]]
speaker = "梨緒"
original = "「いや弱気になるな。今度こそ世界を救うんだろう」"
translation = "「아니, 약해지지 마. 이번에야말로 세계를 구해야 하잖아.」"

[[dialogue]]
speaker = "梨緒"
original = "「誰も私を知らない。私の味方なんていない。私がやらなくて誰がやるんだ」"
translation = "「아무도 나를 몰라. 내 편 같은 건 없어. 내가 하지 않으면 누가 하겠어.」"

[[dialogue]]
speaker = "梨緒"
original = "「私は強い……私はすごい……私ならできる……」"
translation = "「나는 강하다…… 나는 대단하다…… 나라면 할 수 있다……」"

[[dialogue]]
speaker = "梨緒"
original = "「私は──」"
translation = "「나는──」"

[[dialogue]]
speaker = "梨緒"
original = "「勝つ！！」"
translation = "「이긴다!!」"

[[dialogue]]
speaker = "クロト"
original = "「──」"
translation = "「──」"

[[dialogue]]
speaker = "梨緒"
original = "「──」"
translation = "「──」"

[[dialogue]]
speaker = "unk"
original = "梨緒が勢いよく立ち上がると、視線がぶつかった。"
translation = "리오가 기세 좋게 일어서자, 시선이 부딪혔다."

[[dialogue]]
speaker = "unk"
original = "割と最悪のタイミングだった。"
translation = "꽤 최악인 타이밍이었다."

[[dialogue]]
speaker = "梨緒"
original = "「き、聞いていたのか！？」"
translation = "「드, 듣고 있었나!?」"

[[dialogue]]
speaker = "クロト"
original = "「あー、いや、何のことやら……」"
translation = "「아─, 아니, 무슨 소린지……」"

[[dialogue]]
speaker = "梨緒"
original = "「聞いていた反応だろうそれは！」"
translation = "「방금 그건 듣고 있었다는 반응이잖아!」"

[[dialogue]]
speaker = "クロト"
original = "「ごめん、本当は泣きそうになったところから聞いてた」"
translation = "「미안, 사실은 울 것 같아졌을 때부터 듣고 있었어.」"

[[dialogue]]
speaker = "梨緒"
original = "「それはわざわざ言わなくていい！！」"
translation = "「그건 굳이 말 안 해도 돼!!」"

[[dialogue]]
speaker = "梨緒"
original = "「少し心細くなっていただけだ。忘れてくれ」"
translation = "「조금 마음이 약해졌을 뿐이다. 잊어줘.」"

[[dialogue]]
speaker = "unk"
original = "梨緒が立ち去ろうとすると、向こうから神官のイレーナとシスターのシャロンが困った顔で歩いきて……"
translation = "리오가 떠나려 하자, 맞은편에서 신관인 이레나와 시스터 샤론이 곤란한 표정으로 걸어오고……"

[[dialogue]]
speaker = "イレーナ"
original = "「弱りましたね……」"
translation = "「난처하네요……」"

[[dialogue]]
speaker = "梨緒"
original = "「弱い！？」"
translation = "「약해!?」"

[[dialogue]]
speaker = "シャロン"
original = "「あれは使えないんでしょうか？」"
translation = "「그건 쓸 수 없는 걸까요?」"

[[dialogue]]
speaker = "梨緒"
original = "「使えない！？」"
translation = "「쓸모없어!?」"

[[dialogue]]
speaker = "梨緒"
original = "「どうせ私は弱くて使えない、役立たずな星騎士なんだ……」"
translation = "「어차피 나는 약하고 쓸모없는, 무능한 성기사야……」"

[[dialogue]]
speaker = "クロト"
original = "「誰も君のことだとは言ってないと思うよ……」"
translation = "「아무도 너라고는 말 안 했다고 보는데……」"

[[dialogue]]
speaker = "unk"
original = "俺に御前試合を挑んだ時の凛々しい表情はどこへ行ったのか、目に涙を浮かべて項垂れる梨緒。"
translation = "나에게 어전시합을 걸었을 때의 늠름한 표정은 어디로 갔는지, 눈에 눈물을 머금고 고개를 숙이는 리오."

[[dialogue]]
speaker = "unk"
original = "もしかするとこちらが彼女の素顔なんだろうか……？"
translation = "어쩌면 이쪽이 그녀의 본모습인 걸까……?"

[[dialogue]]
speaker = "イレーナ"
original = "「おや？\u3000会長さんとそちらは……」"
translation = "「어라? 회장님과 그쪽은……」"

[[dialogue]]
speaker = "シャロン"
original = "「転入生の梨緒さまですね。私はシスターのシャロンです。よろしくお願いいたします」"
translation = "「전학생 리오 님이시군요. 저는 시스터 샤론입니다. 잘 부탁드립니다.」"

[[dialogue]]
speaker = "梨緒"
original = "「ああ、うん、よろしく、シスターシャロン……」"
translation = "「아아, 응, 잘 부탁해, 시스터 샤론……」"

[[dialogue]]
speaker = "イレーナ"
original = "「ご気分が優れないようですが、お加減はいかがでしょうか？」"
translation = "「기분이 안 좋아 보이시는데, 몸 상태는 좀 어떠신가요?」"

[[dialogue]]
speaker = "梨緒"
original = "「自分の身の程を改めて思い知らされただけだ……気にしないでくれ、イレーナ神官」"
translation = "「자신의 분수를 다시금 뼈저리게 깨달았을 뿐이다…… 신경 쓰지 말아줘, 이레나 신관.」"

[[dialogue]]
speaker = "イレーナ"
original = "「は、はぁ……」"
translation = "「하, 하아……」"

[[dialogue]]
speaker = "unk"
original = "イレーナがちらりと俺を見やるが、残念ながら梨緒のことは俺にもわからない。"
translation = "이레나가 슬쩍 나를 쳐다보지만, 안타깝게도 리오에 대해서는 나도 잘 모른다."

[[dialogue]]
speaker = "クロト"
original = "「イレーナこそ、さっきは何の話をしていたんだ？」"
translation = "「이레나야말로, 아까는 무슨 이야기를 하고 있었어?」"

[[dialogue]]
speaker = "イレーナ"
original = "「教皇庁所有の建造物が、先の戦いで少なからず損害を受けてしまいまして……。修繕したくとも予算が足りないのです」"
translation = "「교황청 소유의 건조물이 지난 전투에서 적잖은 피해를 입어서요……. 수선하고 싶어도 예산이 부족하답니다.」"

[[dialogue]]
speaker = "シャロン"
original = "「修道院で積み立てているお金を使ってはと申し上げたのですが……」"
translation = "「수도원에서 적립해둔 돈을 쓰면 어떠냐고 말씀드렸습니다만……」"

[[dialogue]]
speaker = "イレーナ"
original = "「それは修道院のお金ですから使えませんよ。お気持ちだけ受け取っておきます」"
translation = "「그건 수도원 돈이니까 쓸 수 없어요. 마음만 받아두겠습니다.」"

[[dialogue]]
speaker = "クロト"
original = "「……だそうだ。梨緒のことじゃなかったぞ」"
translation = "「……라네. 리오 이야기가 아니었어.」"

[[dialogue]]
speaker = "梨緒"
original = "「うぅ……やっぱり私なんかが生き残るべきじゃなかったんだ……」"
translation = "「으으…… 역시 나 같은 게 살아남아서는 안 됐던 거야……」"

[[dialogue]]
speaker = "クロト"
original = "「聞いてない……」"
translation = "「안 듣고 있어……」"

[[dialogue]]
speaker = "unk"
original = "しかも言葉が地味に重い……"
translation = "게다가 말이 미묘하게 무겁다……"

[[dialogue]]
speaker = "梨緒"
original = "「いや！\u3000私は今度こそ世界を守る！\u3000そのために私はここにいるんだ！」"
translation = "「아니! 나는 이번에야말로 세계를 지키겠어! 그러기 위해 나는 여기에 있는 거다!」"

[[dialogue]]
speaker = "梨緒"
original = "「緋宮クロト。御前試合を受けるのか、受けないのか。今度こそ答えを聞かせてもらおうか」"
translation = "「히노미야 쿠로토. 어전시합을 받을 건가, 말 건가. 이번에야말로 대답을 들려주실까.」"

[[dialogue]]
speaker = "クロト"
original = "「……ああ、俺もそのつもりだった」"
translation = "「……아아, 나도 그럴 생각이었어.」"

[[dialogue]]
speaker = "unk"
original = "俺は梨緒のことを知らない。きっと誰も彼女を知らない。"
translation = "나는 리오를 모른다. 분명 아무도 그녀를 모를 것이다."

[[dialogue]]
speaker = "unk"
original = "それでも俺を映す瞳には、世界を守るという揺るぎない意志が宿っている。"
translation = "그럼에도 나를 비추는 눈동자에는 세계를 지키겠다는 흔들림 없는 의지가 깃들어 있다."

[[dialogue]]
speaker = "unk"
original = "なのに固く握った拳は小さく震えていて──"
translation = "그런데도 꽉 쥔 주먹은 가늘게 떨리고 있어서──"

[[dialogue]]
speaker = "クロト"
original = "「受けるよ」"
translation = "「받을게.」"

[[dialogue]]
speaker = "梨緒"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker = "クロト"
original = "「御前試合、受けて立つ。星徒会長の座を懸けて勝負だ」"
translation = "「어전시합, 받아들이겠어. 성도회장 자리를 걸고 승부다.」"

[[dialogue]]
speaker = "unk"
original = "御前試合を受けることが、彼女の想いに応える一番の方法だと思った。"
translation = "어전시합을 받는 것이 그녀의 마음에 보답하는 가장 좋은 방법이라고 생각했다."

