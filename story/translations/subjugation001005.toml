[[dialogue]]
speaker = "unk"
original = "ナミエル曰く、クラスメイトの子たちは俺たちと交流を深める為に、もともと歓迎会のようなものをしたいと考えてくれていたらしい。"
translation = "나미엘의 말에 따르면, 클래스메이트 아이들은 우리와 교류를 넓히기 위해 원래부터 환영회 같은 걸 하고 싶어 했다고 한다."

[[dialogue]]
speaker = "unk"
original = "そんな時に、俺がアルモたん達と一緒に鬼ごっこをしないかと声をかけたことで、みんな快く参加してくれる流れになったというわけだった。"
translation = "그럴 때 내가 알모땅 일행과 함께 술래잡기하지 않겠냐고 말을 꺼낸 덕분에 다들 흔쾌히 참여해 주는 흐름이 되었다는 것이었다."

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「クラスの皆さま、とてもいい子たちですね♪」"
translation = "「클래스메이트분들, 참 착한 아이들이네요♪」"

[[dialogue]]
speaker = "unk"
original = "じゃんけんの結果、鬼になったアルモたんやセシアから逃げていると、マグダレナさんが楽しげに言う。"
translation = "가위바위보 결과 술래가 된 알모땅이나 세시아로부터 도망치고 있자 마그달레나 씨가 즐겁게 말한다."

[[dialogue]]
speaker = "ナミエル"
original = "「まぁ、半分は面白がっているだけだと思いますが……確かに、いい人たちだらけです」"
translation = "「뭐, 절반은 재미있어할 뿐이라고 생각합니다만…… 확실히 좋은 사람들뿐이에요.」"

[[dialogue]]
speaker = "ナミエル"
original = "「人付き合いが決して得意とは言えない私とも、皆さま、仲よくしてくれていますから」"
translation = "「인간관계가 결코 특기라고는 할 수 없는 저와도 다들 사이좋게 지내주니까요.」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「ふふっ、ナミエルさまが笑ったの、初めてみました」"
translation = "「후훗, 나미엘 님이 웃는 거 처음 봤어요.」"

[[dialogue]]
speaker = "ナミエル"
original = "「えっ、私いま、笑ってましたか？」"
translation = "「엣, 저 지금 웃고 있었나요?」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「はい。ナミエルさまは良き学園生活を送られているようですね」"
translation = "「네. 나미엘 님은 좋은 학원 생활을 보내고 계신 모양이네요.」"

[[dialogue]]
speaker = "ナミエル"
original = "「……！\u3000そうですね。メイド隊の同僚や、クラスメイトと一緒に過ごす日々は、悪くないです」"
translation = "「……! 그렇네요. 메이드대의 동료나 클래스메이트와 함께 지내는 나날은 나쁘지 않아요.」"

[[dialogue]]
speaker = "ナミエル"
original = "「あとはまぁ……最近は、よくちょっかいをかけてくる男の先輩もいらっしゃるので。じ～っ……」"
translation = "「나머지는 뭐…… 최근에는 자주 참견을 해오는 남자 선배님도 계시니까요. 지긋──……」"

[[dialogue]]
speaker = "unk"
original = "そ、それって……"
translation = "그, 그거 설마……."

[[dialogue]]
speaker = "ナミエル"
original = "「ある意味、退屈しない日々です」"
translation = "「어떤 의미에서는 지루하지 않은 나날입니다.」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「ふふっ、お２人とも仲がよさそうですね♪」"
translation = "「후훗, 두 분 참 사이가 좋아 보이네요♪」"

[[dialogue]]
speaker = "ナミエル"
original = "「あっ……い、いや、今のはそういう意味では……！」"
translation = "「앗…… 아, 아니, 방금 건 그런 의미가 아니라……!」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「私もこれから、ナミエルさまと良き友人関係を築けていけたら嬉しいです。手始めに――」"
translation = "「저도 앞으로 나미엘 님과 좋은 친구 관계를 쌓아갈 수 있다면 기쁘겠어요. 시작으로──」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「お互い、名前を呼ぶ時に敬称を付けるのを止めるところからですね♪」"
translation = "「서로 이름을 부를 때 경칭을 붙이는 걸 그만두는 것부터네요♪」"

[[dialogue]]
speaker = "ナミエル"
original = "「え？」"
translation = "「네?」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「私、アルモタヘルを見ていて、気づいたのです。誰かに親しく呼んで欲しいのなら、まずは自分が相手を親しく呼ぶようにしなければと」"
translation = "「저는 아르모타헬을 보면서 깨달았어요. 누군가에게 친근하게 불리고 싶다면 우선 자신이 상대를 친근하게 부르도록 해야 한다고.」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「なので――<b>ナミエル</b>。あなたのことは、これからそう呼んでもいいでしょうか？」"
translation = "「그러니── 나미엘. 당신의 이름은 이제부터 그렇게 불러도 될까요?」"

[[dialogue]]
speaker = "ナミエル"
original = "「……！\u3000は、はい」"
translation = "「……! 네, 네.」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「あとは、会長も」"
translation = "「그리고 회장도.」"

[[dialogue]]
speaker = "unk"
original = "もちろん大丈夫だよ"
translation = "물론 괜찮아."

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「ありがとうございます♪\u3000なので私のことも、『ママダレナ』と呼んでいただけると嬉しいです♪」"
translation = "「감사합니다♪ 그러니 저의 이름도 『마마달레나』라고 불러주시면 기쁘겠습니다♪」"

[[dialogue]]
speaker = "ナミエル"
original = "「えっと、それは……」"
translation = "「그건, 그러니까……」"

[[dialogue]]
speaker = "unk"
original = "アニマ先輩の呼び方借りて、マグたんかなぁ"
translation = "아니마 선배의 호칭을 빌려서, 마그땅일까나."

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「えぇ～～～っ！？\u3000なんでですか～っ！？」"
translation = "「에에~~~!? 왜인가요~!?」"

[[dialogue]]
speaker = "ナミエル"
original = "「ママと呼ぶのは、少し抵抗があるといいますか……」"
translation = "「마마라고 부르는 건 조금 저항감이 있다고나 할까……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「そんなぁ～！？\u3000ち、ちょっとだけ！\u3000１回だけでいいから、言ってみてくれませんか！？」"
translation = "「너무해~! 지, 지금 딱 한 번! 한 번이라도 좋으니까, 말해봐 주지 않으실래요!?」"

[[dialogue]]
speaker = "ナミエル"
original = "「そ、そんな顔を近づけて言われると、困ります……」"
translation = "「그, 그렇게 얼굴을 가까이 대고 말씀하시면 곤란해요……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「そこをなんとか！\u3000うるうる……」"
translation = "「거기서 어떻게 좀! 울먹울먹……」"

[[dialogue]]
speaker = "ナミエル"
original = "（う……瞳をうるうるさせて、かわいい……）"
translation = "(으…… 눈동자를 글썽글썽거려서, 귀여워……)"

[[dialogue]]
speaker = "ナミエル"
original = "「わ……わかりました。では、その……マ――」"
translation = "「아…… 알겠어요. 그럼, 그…… 마──」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「ならばナミエル、我のこともアルモたんと呼んでくれなければな！」"
translation = "「그렇다면 나미엘, 이 몸의 것도 알모땅이라고 불러줘야 하는 것이다!」"

[[dialogue]]
speaker = "ナミエル"
original = "「あ……」"
translation = "「아……」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「というわけで、油断しているマグダレナの背中にタッチなのだ♪」"
translation = "「그런 고로, 방심하고 있는 마그달레나의 등에 터치인 것이다♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「なっ！？」"
translation = "「나앗!?」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「あ、アルモタヘル……今、いいところだったのにぃぃぃ～～～っ！！！」"
translation = "「아, 아르모타헬…… 지금 좋은 타이밍이었는데에에에~~~!!!」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「おおっ！？\u3000マグダレナが怒っているところ、久しぶりに見た気がするのだ！」"
translation = "「오오!? 마그달레나가 화내는 모습, 오랜만에 보는 기분인 것이다!」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「鬼のマグダレナから、逃げるのだ～～～っ！\u3000あはははははっ♪」"
translation = "「오니 마그달레나로부터 도망치는 것이다~~~! 아하하하하하♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「こらぁぁぁ～～～っ！！！\u3000待ちなさ～～～いっ！！！」"
translation = "「게게요~~~!!! 기다려~~~!!!」"

[[dialogue]]
speaker = "ナミエル"
original = "「ぷっ……」"
translation = "「풉……」"

[[dialogue]]
speaker = "ナミエル"
original = "「あはっ♪\u3000あははははっ♪」"
translation = "「아핫♪ 아하하하핫♪」"

[[dialogue]]
speaker = "unk"
original = "守護天使の２人の追いかけっこが面白かったのか、本気で噴き出して笑ってしまうナミエルなのだった。"
translation = "수호천사 두 사람의 추격전이 재밌었는지, 진심으로 뿜으며 웃어버리는 나미엘이었다."

[[dialogue]]
speaker = "unk"
original = "マグダレナから逃げ続けるアルモタヘルは、新星学園の敷地内までやって来ていた。"
translation = "마그달레나에게 계속 도망치던 아르모타헬은, 신성학원의 부지 내까지 오게 되었다."

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「ふ～っ、ここまで逃げれば、さすがに……」"
translation = "「후우, 여기까지 도망치면 설마……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「アルモタヘル～！\u3000そう簡単に許しませんよ～！」"
translation = "「아르모타헬~! 그렇게 쉽게 용서하지 않아요~!」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「げっ！？\u3000そんな大きい胸をしている癖に、足が速いのだ！？」"
translation = "「게엣!? 그런 큰 가슴을 하고 있으면서 발이 빠른 것이다!?」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「胸関係あります！？\u3000とにかく、観念して――」"
translation = "「가슴이랑 상관있나요!? 아무튼, 단념하고──」"

[[dialogue]]
speaker = "マグダレナ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「えっ！？\u3000私たちの本体アバター……！？」"
translation = "「엣!? 우리들의 본체 아바타……!?」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「なぜ動いているのだ……！？」"
translation = "「어째서 움직이고 있는 것인가……!?」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「！\u3000本体の霊力出力が上昇してます！\u3000アルモタヘル！」"
translation = "「! 본체의 영력 출력이 상승하고 있어요! 아르모타헬!」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「くっ……！？」"
translation = "「큭……!?」"

[[dialogue]]
speaker = "unk"
original = "屋外に突然の爆発音が響き渡るのだった――"
translation = "야외에 갑작스러운 폭발음이 울려 퍼지는 것이었다──"

