[[dialogue]]
speaker = "unk"
original = "第２話,挑戦と新たな誓い,P"
translation = "제2화, 도전과 새로운 맹세"

[[dialogue]]
speaker = "unk"
original = "お正月を迎え、俺はサーシャさんと２人で初詣に訪れていた。"
translation = "정월을 맞이하여 나는 사샤 씨와 둘이서 새해 첫 참배를 왔다."

[[dialogue]]
speaker = "サーシャ"
original = "「――うん？\u3000『スーパー晴れ着フォーム』の調子？\u3000ええ、あれからも獅子舞さんやリーリアちゃんに力の使い方を教わりながら、訓練も続けていて順調よ♪」"
translation = "「──응? 『슈퍼 후리소데 폼』의 상태? 응, 그때부터 사자춤 씨나 리리아 짱에게 힘을 사용하는 법을 배우면서 훈련도 계속하고 있어서 순조로워♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「私、晴れ着フォームとの相性がいいらしくて、どうやらノヴァフォームと同じくらい高出力の星力が引き出せるみたいなの」"
translation = "「나, 후리소데 폼이랑 상성이 좋은 모양이라 아무래도 노바 폼이랑 비슷할 정도의 고출력 성력을 끌어낼 수 있는 것 같아」"

[[dialogue]]
speaker = "サーシャ"
original = "「でもその分、力のコントロールは難しくて、この前みたいにうっかり狙いを外しちゃったりとか、まだまだ粗は多いのよ～」"
translation = "「하지만 그만큼 힘의 컨트롤은 어려워서, 저번처럼 무심코 조준을 빗나가게 하거나 하는 등 아직 허술한 점이 많아~」"

[[dialogue]]
speaker = "unk"
original = "参拝を終えた後、このまま浅草でデートをしようという流れになり、並んで歩きながら話をしていると――俺はふと、以前の話を思い出した。"
translation = "참배를 마친 후 이대로 아사쿠사에서 데이트를 하자는 흐름이 되어, 나란히 걸으며 이야기를 나누다── 나는 문득 이전의 이야기를 떠올렸다."

[[dialogue]]
speaker = "unk"
original = "そういえば、小説の方はどうですか？"
translation = "그러고 보니 소설 쪽은 어때요?"

[[dialogue]]
speaker = "サーシャ"
original = "「それね～。そっちは想像以上に難しいわ～」"
translation = "「그거 말이지~. 그쪽은 상상 이상으로 어려워~」"

[[dialogue]]
speaker = "サーシャ"
original = "「いざ小説を書こうとしてみて、改めてわかったわ。私はこれまで、あまり自分の気持ちに向き合ってこなかった」"
translation = "「막상 소설을 써보려고 하니 다시금 알게 됐어. 나는 지금까지 그다지 내 감정을 마주해오지 않았어」"

[[dialogue]]
speaker = "サーシャ"
original = "「ううん、自分の気持ちだけじゃないわ。私はなまじ感覚だけである程度のことはできてしまうから、どんなことでも『なんとなく』で済ませちゃう、悪い癖があるみたい」"
translation = "「아니, 내 감정뿐만이 아니야. 나는 어설프게 감각만으로 어느 정도의 일은 해낼 수 있으니까, 어떤 일이든 『대충』 넘겨버리는 나쁜 버릇이 있는 것 같아」"

[[dialogue]]
speaker = "サーシャ"
original = "「よく言えば『要領がいい』ってことなのかしら。勉強とか、星術とか、思い返すとあんまり苦労した覚えがないの」"
translation = "「좋게 말하면 『요령이 좋다』는 걸까. 공부라든가 성술이라든가 되돌아보면 그다지 고생한 기억이 없거든」"

[[dialogue]]
speaker = "サーシャ"
original = "「でもね、同時に極めたと言えるほど深く知っていることは何もない。全部『なんとなく』のまま」"
translation = "「하지만 동시에 마스터했다고 할 수 있을 정도로 깊게 알고 있는 건 아무것도 없어. 전부 『대충』인 채로」"

[[dialogue]]
speaker = "サーシャ"
original = "「わりとまんべんなくこなせるせいで、苦手と向き合う機会がなかったから──」"
translation = "「비교적 골고루 해낼 수 있는 탓에 서툰 것과 마주할 기회가 없었으니까──」"

[[dialogue]]
speaker = "サーシャ"
original = "「そのせいで、自分の苦手なことを見て見ぬフリというか、スルーしちゃう逃げ癖が付いちゃってたみたい」"
translation = "「그 때문에 내가 못 하는 것을 못 본 척한다고 할까, 그냥 넘겨버리는 도망 버릇이 생겨버린 것 같아」"

[[dialogue]]
speaker = "unk"
original = "そう言って、サーシャさんは少し照れ臭そうに微笑んだ。"
translation = "그렇게 말하며 사샤 씨는 조금 쑥스러운 듯 미소 지었다."

[[dialogue]]
speaker = "サーシャ"
original = "「そういう自分がいることにも、小説を書き始めて気づけたの」"
translation = "「그런 내가 있다는 것도 소설을 쓰기 시작하면서 깨달았어」"

[[dialogue]]
speaker = "サーシャ"
original = "「『あっ、私、小説を書くのがすごく苦手なんだ』って壁にぶつかって、ようやく自分の一部分に意識が行くようになったわ」"
translation = "「『앗, 나 소설 쓰는 거 정말 못하는구나』 하고 벽에 부딪히고 나서야 겨우 내 일부분에 의식이 가게 되었어」"

[[dialogue]]
speaker = "サーシャ"
original = "「でもね、不思議なんだけど……その『全然上手く行かない』って感覚が、今とっても『楽しく』感じるのよ」"
translation = "「그런데 신기하게도…… 그 『전혀 잘 되지 않는다』는 감각이 지금 무척 『즐겁게』 느껴져」"

[[dialogue]]
speaker = "サーシャ"
original = "「きっと、小説を読むのも、書くのも、私には生まれ持った才能がまったくなくて、無意識に避けてきた分野なんだと思うわ」"
translation = "「분명 소설을 읽는 것도 쓰는 것도 나에게는 타고난 재능이 전혀 없어서 무의식적으로 피해왔던 분야라고 생각해」"

[[dialogue]]
speaker = "サーシャ"
original = "「だから私は、生まれて初めて、なんとなくでは『思い通りにならないもの』にチャレンジしてる」"
translation = "「그래서 나는 태어나서 처음으로 대충 해서는 『마음대로 되지 않는 것』에 도전하고 있어」"

[[dialogue]]
speaker = "サーシャ"
original = "「その試行錯誤が今、とっても新鮮で、楽しく感じるのよ」"
translation = "「그 시행착오가 지금 무척 신선하고 즐겁게 느껴져」"

[[dialogue]]
speaker = "unk"
original = "新しいことに挑戦して、それを楽しめるなんて、すごいと思う。俺は学園に転入する前のバイト時代、仕事を楽しめていただろうかと、今更ながら思い返す。"
translation = "새로운 것에 도전하고 그것을 즐길 수 있다니 대단하다고 생각한다. 나는 학원에 전입하기 전 알바 시절에 일을 즐기고 있었을까 하고 이제 와서 되새겨본다."

[[dialogue]]
speaker = "unk"
original = "俺も何か新しい事に挑戦してみようかな……"
translation = "나도 뭔가 새로운 것에 도전해볼까……"

[[dialogue]]
speaker = "サーシャ"
original = "「ふふふっ。いいと思うわ～」"
translation = "「후후후. 좋다고 생각해~」"

[[dialogue]]
speaker = "サーシャ"
original = "「『できないこと』が少しずつ『できるようになる』のって、凄く楽しいわよね♪」"
translation = "「『할 수 없는 것』이 조금씩 『할 수 있게 되는 것』은 정말 즐거운 일이지♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「……昔の私だったら、好きな人のお世話はなんでもしてあげたいって思ってたわ。ううん、実を言うと、今も思ってる」"
translation = "「……예전의 나라면 좋아하는 사람의 뒷바라지는 뭐든지 해주고 싶다고 생각했을 거야. 아니, 사실을 말하자면 지금도 생각하고 있어」"

[[dialogue]]
speaker = "サーシャ"
original = "「でも、この『楽しさ』を好きな人から安易に奪うのは良くないんじゃないかって、そういうことは少しわかるようになってきたの」"
translation = "「하지만 이 『즐거움』을 좋아하는 사람에게서 안이하게 빼앗는 건 좋지 않을까 하고 그런 점은 조금 알게 되었어」"

[[dialogue]]
speaker = "サーシャ"
original = "「全部私１人でやってしまうよりも、好きな人と一緒に、上手く行ったり、失敗したりしながら、一緒に楽しんでいく方が、きっと幸せなのよね」"
translation = "「전부 나 혼자서 해버리는 것보다 좋아하는 사람과 함께 잘 되기도 하고 실패하기도 하면서 같이 즐겨 나가는 것이 분명 더 행복할 거야」"

[[dialogue]]
speaker = "unk"
original = "ふと俺は、サーシャさんがいつか、魔界や天界を旅したいと言ってたことを思い出して、改めて聞いてみる。"
translation = "문득 나는 사샤 씨가 언젠가 마계나 천계를 여행하고 싶다고 했던 것을 떠올려 다시 물어본다."

[[dialogue]]
speaker = "サーシャ"
original = "「――ええ。できれば前人未踏の、誰も行ったことのない場所に行ってみたいって思うわ」"
translation = "「──응. 가능하다면 전인미답의, 아무도 가본 적 없는 곳에 가보고 싶어」"

[[dialogue]]
speaker = "unk"
original = "その時に役立つスキルを勉強してみようかな"
translation = "그때 도움이 될 스킬을 공부해볼까"

[[dialogue]]
speaker = "unk"
original = "バイトで経験できた範囲のサバイバル術は心得があるが、毒キノコの見分け方とか、魔界の原生生物の狩猟法や調理法とか、そういう『冒険家スキル』があればもっと便利だろう。"
translation = "알바에서 경험한 범위의 서바이벌 기술은 소양이 있지만, 독버섯을 구별하는 법이라든가 마계 원생 생물의 수렵법이나 조리법이라든가 그런 『모험가 스킬』이 있으면 더 편리할 것이다."

[[dialogue]]
speaker = "サーシャ"
original = "「それって……そういうスキルがあれば、前に私と約束した、将来の旅の計画が立てやすくなるからってこと？」"
translation = "「그건…… 그런 스킬이 있으면 예전에 나랑 약속했던 장래의 여행 계획을 세우기 쉬워질 테니까 그런 거야?」"

[[dialogue]]
speaker = "unk"
original = "俺が頷くと、サーシャさんは感激したように顔を輝かせ、そのまま勢いよく抱きついてきた。"
translation = "내가 고개를 끄덕이자 사샤 씨는 감격한 듯 얼굴을 빛내며 그대로 기세 좋게 매달려 왔다."

[[dialogue]]
speaker = "サーシャ"
original = "「会長くんっ♪\u3000ぎゅ～っ<emoji=heart04>」"
translation = "「회장군♪ 꼬옥~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "わぷっ、サーシャさん、おっぱいが……！？"
translation = "와퓩, 사샤 씨, 가슴이……!?"

[[dialogue]]
speaker = "unk"
original = "晴れ着でもこぼれんばかりの胸が俺の顔に押し付けられ、柔らか天国と息のできない地獄にむにゅっと挟まれる。"
translation = "후리소데 차림인데도 넘칠 듯한 가슴이 내 얼굴에 밀착되어, 부드러운 천국과 숨을 쉴 수 없는 지옥 사이에 뭉클하게 끼인다."

[[dialogue]]
speaker = "サーシャ"
original = "「すっごく嬉しいわ、会長くん……！」"
translation = "「정말 기뻐, 회장군……!」"

[[dialogue]]
speaker = "サーシャ"
original = "「今まで他の人には、秘境を旅したいという夢を語っても、そこまで真面目に受け止めてもらえたことってなかったの」"
translation = "「지금까지 다른 사람들에게는 비경을 여행하고 싶다는 꿈을 이야기해도 그렇게까지 진지하게 받아들여 준 적이 없었어」"

[[dialogue]]
speaker = "サーシャ"
original = "「前人未踏の地を旅するだなんて、私自身もどんな風になるのかまだ想像が付いていないんだから、仕方のないことだけれど……」"
translation = "「전인미답의 땅을 여행한다니 나 자신도 어떤 식이 될지 아직 상상조차 못 하고 있으니까 어쩔 수 없는 일이지만……」"

[[dialogue]]
speaker = "サーシャ"
original = "「でも、会長くんだけが、そこを一緒に旅をすることを想像して、ちゃんと考えてくれた……！」"
translation = "「하지만 회장군만이 그곳을 함께 여행하는 것을 상상하고 제대로 생각해 줬어……!」"

[[dialogue]]
speaker = "サーシャ"
original = "「『心が繋がる』って、こういうことを言うのかしら？\u3000だとしたら、本当に素晴らしいことね」"
translation = "「『마음이 통한다』는 건 이런 걸 말하는 걸까? 그렇다면 정말 멋진 일이네」"

[[dialogue]]
speaker = "サーシャ"
original = "「なんだかお姉ちゃん、おかげですっごくやる気が出てきちゃったわ～♪」"
translation = "「왠지 누나, 덕분에 무척 의욕이 생겨버렸어~♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「会長くん、リクリエなんてさっさとやっつけて、絶対に平和な世界を作りましょう。そして、私と一緒に旅をして欲しいわ」"
translation = "「회장군, 리크리에 같은 건 얼른 해치우고 반드시 평화로운 세상을 만들자. 그리고 나랑 같이 여행해 줬으면 좋겠어」"

[[dialogue]]
speaker = "サーシャ"
original = "「その為に、私も一緒にサバイバル術の勉強をするし、会長くんを守れるくらい星騎士としても強くなってみせるから♪」"
translation = "「그걸 위해서 나도 같이 서바이벌 기술 공부를 할 거고, 회장군을 지킬 수 있을 정도로 성기사로서도 강해져 보일 테니까♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「この世界にはまだまだ、見たこともない『楽しいこと』が眠っているんだもの。勝手に最初からやり直しにだなんて、させないわ」"
translation = "「이 세상에는 아직 보지도 못한 『즐거운 것』들이 잠들어 있는걸. 마음대로 처음부터 다시 시작하게 놔두지 않을 거야」"

[[dialogue]]
speaker = "サーシャ"
original = "「うふふっ♪」"
translation = "「우후훗♪」"

[[dialogue]]
speaker = "unk"
original = "そうしてサーシャさんは俺に、頼もしい笑顔を浮かべてみせるのだった。"
translation = "그렇게 사샤 씨는 나에게 듬직한 미소를 지어 보이는 것이었다."

