[[dialogue]]
speaker = "unk"
original = "とある日の深夜。どうも寝付けなくて公園に散歩へ出ていると──"
translation = "어느 날 심야. 도저히 잠이 오지 않아 공원으로 산책을 나갔더니──"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「は～ぁ。さっぱりするぜ。こーしていつでも水浴びできんのはこの街のいいとこだな」"
translation = "「하~아. 개운하네. 이렇게 언제든 씻을 수 있는 건 이 거리의 좋은 점이지」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「公園の噴水で何して……！？」"
translation = "「공원 분수에서 뭐 하는……!?」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ん？\u3000魔王じゃねえか。見りゃわかんだろ。水浴びだ、水浴び」"
translation = "「응? 마왕이잖아. 보면 모르냐. 씻는 거야, 씻는 거」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「別にいいだろ？\u3000昼間は街のガキどもだって水浴びして遊んでるじゃねえか。それともなんだ？\u3000悪人は水浴びしちゃいけませんってか？」"
translation = "「상관없잖아? 낮에는 거리 꼬맹이들도 씻으며 놀고 있잖아. 아니면 뭐야? 악인은 씻으면 안 된다는 거냐?」"

[[dialogue]]
speaker = "unk"
original = "一糸まとわぬキサナの姿につい目が釘付けになってしまう。"
translation = "실 하나 걸치지 않은 키사나의 모습에 그만 눈이 고정되어 버린다."

[[dialogue]]
speaker = "unk"
original = "荒々しい言動をそのまま表したかのような、グラマラスで暴力的な肉体。"
translation = "거친 언행을 그대로 나타낸 듯한 글래머러스하고 폭력적인 육체."

[[dialogue]]
speaker = "unk"
original = "公園の灯りを反射する、艶めかしく濡れた柔肌。"
translation = "공원의 불빛을 반사하는 요염하게 젖은 고운 살결."

[[dialogue]]
speaker = "unk"
original = "目を逸らそうとしても視線が吸い込まれてしまって──"
translation = "눈을 돌리려 해도 시선이 빨려 들어가 버려서──"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「なんだ……オマエ、アタシの裸に欲情してんのか？」"
translation = "「뭐야…… 네놈, 내 알몸 보고 욕정하는 거냐?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──！？\u3000いや……」"
translation = "「──!? 아니……」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「人の体ガン見しといて誤魔化せると思ってんのかよ。魔王っつってもオスだな。性欲には勝てませんってかぁ？」"
translation = "「남의 몸 빤히 쳐다봐 놓고 시치미 뗄 수 있을 것 같냐? 마왕이라 해도 수컷이군. 성욕에는 이길 수 없다 이건가아?」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「まぁ落ち着けよ童貞野郎。オマエに見つかっちまった以上、悠長に水浴びしてたら捕まっちまうだろ？\u3000けどアタシもまだ水浴びしてえんだ」"
translation = "「자 진정해라 동정 녀석아. 네놈한테 들킨 이상 느긋하게 씻고 있다간 잡혀버리겠지? 하지만 나도 아직 씻고 싶단 말이다」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「だからギブアンドテイクといこうぜ？\u3000アタシの体、好きに触らせてやるよ。その代わり、今夜はアタシんこと見逃せ……な？」"
translation = "「그러니 기브 앤 테이크로 가자고. 내 몸, 마음대로 만지게 해 주지. 그 대신 오늘 밤은 나를 못 본 척해 줘…… 응?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「うわっ！？」"
translation = "「우와악!?」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ハッ、やっぱここがパンパンになってるじゃねえか。敵の裸にここまで興奮してたのか？\u3000正義の味方さまよぉ」"
translation = "「핫, 역시 여기가 빵빵해졌잖아. 적의 알몸에 이렇게까지 흥분한 거냐? 정의의 사자 나으리」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「離れ──んぷっ！？」"
translation = "「떨어── 읍!?」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「うるせぇな。乳でも吸ってろ。アタシのおっぱい吸いたかったんだろ？\u3000お望み通り吸わせてやるぜ」"
translation = "「시끄러워. 젖이나 빨아. 내 가슴 빨고 싶었잖아? 소원대로 빨게 해 주지」"

[[dialogue]]
speaker = "unk"
original = "馬乗りになったキサナが、その豊満な乳房を俺の顔にぎゅっと押しつけてくる。"
translation = "올라탄 키사나가 그 풍만한 유방을 내 얼굴에 꽉 밀어붙인다."

[[dialogue]]
speaker = "unk"
original = "ぷっくりとした硬い乳首が口の中に入ってきて、その官能的な感触につい──"
translation = "도톰하고 딱딱한 유두가 입안으로 들어오고, 그 관능적인 감촉에 그만──"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「んっはぁ……<emoji=heart04>\u3000なんだよ、おい。吸い付いてきてんじゃねえか。魔王っつってもオスの本能には勝てねえみてえだな？」"
translation = "「응, 하아……<emoji=heart04> 뭐야, 어이. 엄청나게 빨아대고 있잖아. 마왕이라 해도 수컷의 본능에는 이길 수 없는 모양이네?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「～～っ！！\u3000ち、違っ……！！」"
translation = "「~~윽!! 아, 아니……!!」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ふふ、照れんな照れんな。ギブアンドテイクっつったろ？\u3000好きに揉んだり吸ったりしていいんだぜ？」"
translation = "「후후, 부끄러워하지 마, 부끄러워하지 마. 기브 앤 테이크라고 했잖아? 마음껏 주무르거나 빨아도 된다고?」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「アタシもダリい逃亡生活のせーでムカムカしてたトコだったしなぁ。オマエも欲求不満みたいだしちょうどいいだろ」"
translation = "「나도 지긋지긋한 도망 생활 때문에 짜증 나던 참이었고 말이야. 네놈도 욕구불만인 것 같으니 딱 좋잖아」"

[[dialogue]]
speaker = "unk"
original = "キサナが腰を揺らして割れ目を押しつけてくる。"
translation = "키사나가 허리를 흔들며 비라를 밀어붙인다."

[[dialogue]]
speaker = "unk"
original = "水を浴びて冷えた体とは反対に、その場所だけは煮えたぎるように熱くて、否応なしに体が反応してしまう。"
translation = "물을 뒤집어써서 식은 몸과는 반대로, 그곳만은 끓어오르듯 뜨거워서, 어쩔 수 없이 몸이 반응하고 만다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「それじゃ──食わせてもらうぜ」"
translation = "「그럼── 잘 먹어주지」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「んん～～～っ！」"
translation = "「음음~~~윽!」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「はぁ、はぁ……やべぇ……<emoji=heart04>\u3000挿れた瞬間、チ○ポがビクビク暴れやがった……<emoji=heart04>」"
translation = "「하아, 하아…… 위험해……<emoji=heart04> 삽입한 순간, 자지가 움찔움찔 날뛰었어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「んっ……はっ……<emoji=heart04>\u3000熱くて、硬くて……チ○ポってこんな感触なのかよ……んぁっ、はぁぁっ、腰動かすのも一苦労じゃねーか」"
translation = "「응…… 하앗……<emoji=heart04> 뜨겁고, 딱딱해서…… 자지란 건 이런 감촉인 거냐…… 응아, 하아아, 허리 움직이는 것도 예삿일이 아니구만」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「チ○ポギンギンにしやがって……ハハッ、敵に犯されてどんだけ興奮してんだよっ……<emoji=heart04>\u3000魔王さまは特殊性癖の持ち主ってかぁ……お仲間が見たら幻滅しちまうぜっ……<emoji=heart04>」"
translation = "「자지를 꼿꼿하게 세워가지고…… 하핫, 적에게 범해지면서 얼마나 흥분한 거냐고……<emoji=heart04> 마왕님은 특수성벽 소유자라는 건가아…… 동료들이 보면 환멸하겠어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "煽られているのにゾクゾクと走る快感のせいで何も言い返せない。"
translation = "조롱당하고 있는데도 오싹오싹하게 달리는 쾌감 때문에 아무 대꾸도 할 수 없다."

[[dialogue]]
speaker = "unk"
original = "反応するまいとしているのに、キサナの熱く柔らかい肉の中でペニスが勝手に跳ねる。"
translation = "반응하지 않으려 애쓰는데도, 키사나의 뜨겁고 부드러운 살덩이 속에서 페니스가 멋대로 요동친다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「はっ、あっ……こりゃ契約成立ってことでいいよなぁ……<emoji=heart04>\u3000軽く腰を振ってるだけで、チ○ポがどんどん滾ってきてやがるぜ<emoji=heart04>」"
translation = "「하, 아…… 이걸로 계약 성립된 걸로 봐도 좋겠지……<emoji=heart04> 가볍게 허리를 흔드는 것만으로 자지가 점점 달아오르고 있다고<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「アタシも、んっ、はぁっ、興奮してきたっ……<emoji=heart04>\u3000んだよ、セックスってめちゃくちゃ気持ちいいじゃねえかっ……<emoji=heart04>」"
translation = "「나도, 응, 하앗, 흥분되기 시작했어……<emoji=heart04> 뭐야, 섹스라는 거 엄청나게 기분 좋잖아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「娼婦みてえに犯されんのは嫌だがよっ<emoji=heart04>\u3000こーして男を犯してやる分には、あぁんっ、はぁあんっ、悪く、ねえ……<emoji=heart04>」"
translation = "「창녀처럼 범해지는 건 싫지만 말이야<emoji=heart04> 이렇게 남자를 범해주는 거라면, 아앙, 하아앙, 나쁘지, 않아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "荒々しく腰を振り、肉棒をこれでもかと刺激してくるキサナ。"
translation = "거칠게 허리를 흔들며 육봉을 이래도 되나 싶을 정도로 자극해 오는 키사나."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「おらっ、んっ、はぁっ<emoji=heart04>\u3000オマエも腰振れよっ……<emoji=heart04>\u3000つかもっとおっぱい吸えっ……<emoji=heart04>」"
translation = "「어이, 응, 하앗<emoji=heart04> 네놈도 허리 흔들어……<emoji=heart04> 그보다 젖이나 더 빨아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「どーせもう挿れちまってんだっ……<emoji=heart04>\u3000一緒に楽しんじまおうぜっ<emoji=heart04>\u3000オマエもアタシのま○こ、んはぁぁ、もっと味わいてえんだろっ？」"
translation = "「어차피 이미 넣어버렸잖아……<emoji=heart04> 같이 즐기자고<emoji=heart04> 네놈도 내 보지, 응하아아, 더 맛보고 싶은 거잖아?」"

[[dialogue]]
speaker = "unk"
original = "窒息してしまいそうなほど胸を顔に押しつけられ、否応なしに乳首を吸わされる。"
translation = "질식할 정도로 가슴이 얼굴에 눌려, 반강제로 유두를 빨게 된다."

[[dialogue]]
speaker = "unk"
original = "火照ったおっぱいの感触が顔いっぱいに密着して頭がクラクラしてきた。"
translation = "달아오른 가슴의 감촉이 얼굴 가득 밀착되어 머리가 어질어질해졌다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「んんっ……<emoji=heart04>\u3000そうだぁ……<emoji=heart04>\u3000ママのおっぱいみたいに、ちゅうちゅう吸っていいぞ……<emoji=heart04>\u3000んぁっ、あっ、はぁぁっ……<emoji=heart04>\u3000気持ち、いいじゃねえかっ……<emoji=heart04>」"
translation = "「으음……<emoji=heart04> 그래……<emoji=heart04> 엄마 젖처럼 쯉쯉 빨아도 돼……<emoji=heart04> 응아, 아, 하아아……<emoji=heart04> 기분, 좋잖아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「よほど女の乳に飢えてたのか？\u3000チ○ポがさらにバッキバキになってきてるぜっ……<emoji=heart04>\u3000それともセックスもずっとお預けにされてたってか？」"
translation = "「어지간히 여자 젖에 굶주렸던 거냐? 자지가 한층 더 빳빳해지고 있다고……<emoji=heart04> 아니면 섹스도 계속 못 하고 참기만 했던 거야?」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「あんだけ女がいんのに、んっ、はぁっ、オマエも可哀想なヤツだなっ……<emoji=heart04>\u3000アタシの裸くれえでこんなに発情しちまうってのによぉ……<emoji=heart04>」"
translation = "「그렇게 여자가 많은데도, 응, 하앗, 네놈도 불쌍한 녀석이구나……<emoji=heart04> 내 알몸 정도로 이렇게 발정해버리다니 말이야……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「おらっ、もっと気持ち良くしてやんよっ……<emoji=heart04>\u3000どーやら先っぽをグリグリギュウギュウされんのが好きらしいしなぁ……<emoji=heart04>」"
translation = "「어이, 더 기분 좋게 해 줄게……<emoji=heart04> 아무래도 끝부분을 꾸역꾸역 압박당하는 걸 좋아하는 모양이니까 말이지……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "敏感な先端を肉厚な膣で挟み込まれて、甘く痺れるような快楽が駆け上る。"
translation = "민감한 끝부분을 두툼한 질로 조여와서, 달콤하고 저릿한 쾌락이 치솟는다."

[[dialogue]]
speaker = "unk"
original = "乳首もさっきより硬くなっていて、そのコリコリとした舌触りが情欲をくすぐって──"
translation = "유두도 아까보다 단단해져 있어서, 그 오독오독한 혀끝의 촉감이 정욕을 부추겨──"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「あっ、あっ、あっ……<emoji=heart04>\u3000調子出てきたじゃねえかっ……<emoji=heart04>\u3000気付いてるかぁ、オマエ、自分で腰揺らしてるぜっ……<emoji=heart04>」"
translation = "「아, 아, 아……<emoji=heart04> 리듬 타기 시작했잖아……<emoji=heart04> 알고 있냐, 너, 스스로 허리를 흔들고 있다고……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「悪く、ねえっ……<emoji=heart04>\u3000セックスって気持ちいいなぁ、魔王っ……<emoji=heart04>\u3000ま○こがトロトロになってきやがるっ……<emoji=heart04>」"
translation = "「나쁘지, 않아……<emoji=heart04> 섹스란 건 기분 좋네, 마왕……<emoji=heart04> 보지가 질척질척해지고 있어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「なぁ魔王……<emoji=heart04>\u3000ギブアンドテイクと行こうぜ……<emoji=heart04>\u3000たまにこうしてヤらしてやるからよ<emoji=heart04>\u3000これからもアタシを見逃せよ<emoji=heart04>」"
translation = "「이봐 마왕……<emoji=heart04> 기브 앤 테이크로 가자고……<emoji=heart04> 가끔 이렇게 하게 해 줄 테니까 말이야<emoji=heart04> 앞으로도 나를 못 본 척해 줘<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "誘惑するようにキサナが肉棒を丸ごと咥え込み、柔らかくて大きなおっぱいをむぎゅっと胸板に押し付けてくる。"
translation = "유혹하듯 키사나가 육봉을 통째로 머금고, 부드럽고 커다란 가슴을 뭉클하게 가슴팍에 밀착시킨다."

[[dialogue]]
speaker = "unk"
original = "ともすれば性欲と快楽に溺れてしまいそうになって──"
translation = "자칫하면 성욕과 쾌락에 빠져버릴 것만 같아서──"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「我慢すんなよっ……<emoji=heart04>\u3000こっそり会って、ヤって、別れるだけじゃねえかっ……<emoji=heart04>」"
translation = "「참지 마……<emoji=heart04> 몰래 만나서, 하고, 헤어지는 것뿐이잖아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「お仲間はヤらしてくんねえんだろっ<emoji=heart04>\u3000けどアタシなら、いくらでもヤらしてやるぜっ……<emoji=heart04>」"
translation = "「동료들은 안 하게 해 주지? 하지만 나라면 얼마든지 하게 해 줄게……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「こーしてアツアツま○こでチ○ポ扱いてやったりよぉ……<emoji=heart04>\u3000オマエの大好きなおっぱい吸わせてやったりさぁ……<emoji=heart04>」"
translation = "「이렇게 뜨끈뜨끈한 보지로 자지를 비벼주기도 하고 말이야……<emoji=heart04> 네놈이 환장하는 젖도 빨게 해 줄 테니까……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "敵の誘いに乗るわけにはいかない──そう思っているはずなのに、キサナの声が蠱惑的に響く。"
translation = "적의 유혹에 넘어갈 수는 없다── 그렇게 생각하고 있을 텐데도, 키사나의 목소리가 고혹적으로 울린다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「まぁオマエが乗るか乗らねえかはどーでもいいがっ……<emoji=heart04>\u3000アタシは、オマエのチ○ポ、たっぷり楽しませてもらうぜっ……<emoji=heart04>」"
translation = "「뭐 네놈이 응할지 말지는 아무래도 좋지만……<emoji=heart04> 나는 네놈의 자지, 듬뿍 즐겨주겠어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「あぁああんっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000あっ、あっ、あっ、ああぁあああんんっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아아앙<emoji=heart04> 아<emoji=heart04> 하앗<emoji=heart04> 아, 아, 아, 아아아아앙<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「やっぱ、あっ、あっ<emoji=heart04>\u3000いっぱい腰振ったほうが、気持ちいいなっ<emoji=heart04>」"
translation = "「역시, 아, 아<emoji=heart04> 허리를 많이 흔드는 게 더 기분 좋네<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「チ○ポ、めちゃくちゃ擦れるっ<emoji=heart04>\u3000先っぽ大きくて、硬くて、ゾクゾクするっ……<emoji=heart04>\u3000腰とまんねぇっ……<emoji=heart04>」"
translation = "「자지, 엄청나게 쓸려<emoji=heart04> 끝부분이 크고 딱딱해서 오싹오싹해……<emoji=heart04> 허리가 안 멈춰……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "まるで発情期の獣のようにキサナが腰を振ってくる。"
translation = "마치 발정기의 짐승처럼 키사나가 허리를 흔들어 온다."

[[dialogue]]
speaker = "unk"
original = "キサナの腰が動く度に理性が削られていくようで……"
translation = "키사나의 허리가 움직일 때마다 이성이 깎여 나가는 것 같아서……"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「はぁっ、あっ<emoji=heart04>\u3000オマエも気持ち良さそうじゃねえか、魔王っ……<emoji=heart04>\u3000実はアタシら、あっ、あっ、体の相性いいんじゃねえかっ……<emoji=heart04>」"
translation = "「하앗, 아<emoji=heart04> 네놈도 기분 좋아 보이잖아, 마왕……<emoji=heart04> 사실 우리, 아, 아, 속궁합이 잘 맞는 거 아니냐……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「そっちからもガンガン突き上げてきていいんだぜっ<emoji=heart04>\u3000ふぁっ、あっ、はぁんっ<emoji=heart04>\u3000難しいコト考えずに溺れちまえよっ<emoji=heart04>」"
translation = "「그쪽에서도 팍팍 찔러 올려도 된다고<emoji=heart04> 하아, 아, 하앙<emoji=heart04> 복잡한 거 생각하지 말고 빠져버려<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「アタシのま○こ、気持ちいいんだろっ<emoji=heart04>\u3000おっぱい揉みくちゃにして、舐め回してえんだろっ<emoji=heart04>」"
translation = "「내 보지, 기분 좋지<emoji=heart04> 가슴 주물러 터뜨리고 핥아대고 싶은 거잖아<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「欲望に素直になっちまえっ<emoji=heart04>\u3000おらっ、ゴシゴシしてやんよっ<emoji=heart04>\u3000んっ、んっ、んっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「욕망에 솔직해져 버려<emoji=heart04> 어이, 문질문질해 줄게<emoji=heart04> 응, 응, 응<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「はぁっ、はっ……<emoji=heart04>\u3000まだ素直にならねえか……強情だな……それじゃ──んちゅるっ<emoji=heart04>」"
translation = "「하앗, 하……<emoji=heart04> 아직 솔직해지지 않는 건가…… 고집불통이네…… 그럼── 응츄릅<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──！？」"
translation = "「──!?」"

[[dialogue]]
speaker = "unk"
original = "キサナが俺の唇を奪い、そのまま力ずくで舌を差し入れてくる。"
translation = "키사나가 내 입술을 빼앗고, 그대로 힘으로 혀를 밀어 넣는다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「んんっ……んちゅるっ、ちゅるちゅる……れぇる、へるへるっ、へろんっ<emoji=heart04>」"
translation = "「으음…… 응츄릅, 츄릅츄릅…… 레로, 헤루헤루, 헤롱<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "キサナの柔らかくて熱い舌が俺の口内を蹂躙し、めちゃくちゃに舐め回す。"
translation = "키사나의 부드럽고 뜨거운 혀가 내 입안을 유린하고 엉망진창으로 핥아댄다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「んんちゅ、ちゅるっ、ちゅぱっ……じゅるっ……じゅるじゅる<emoji=heart04>\u3000れぇろ、へろへろ……んちゅるるっ<emoji=heart04>」"
translation = "「음음츄, 츄릅, 츄파…… 쥬릅…… 쥬릅쥬릅<emoji=heart04> 레로, 헤로헤로…… 응츄르릅<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "舌を、歯を、頬の裏までを舐められ、思考がドロドロに溶けていく。"
translation = "혀를, 치아를, 뺨 안쪽까지 핥아져서 사고가 걸쭉하게 녹아내린다."

[[dialogue]]
speaker = "unk"
original = "もう快楽に抗うことはできなくて、半ば無意識にキスに応える。"
translation = "이제 쾌락에 저항할 수 없게 되어, 반쯤 무의식적으로 키스에 응한다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「んんっ……！？\u3000そうだ、オマエも舐め返してこい……んちゅっ、ちゅるっ<emoji=heart04>\u3000ちゅるれろ、へぇろ、れろ<emoji=heart04>」"
translation = "「으음……!? 그래, 네놈도 받아쳐 봐…… 응츄, 츄릅<emoji=heart04> 츄르레로, 헤로, 레로<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ちゅるっ、ちゅりゅれろ、じゅるるるっ<emoji=heart04>\u3000んふっ、はぁ……れろちゅぱっ、ちゅぅっ、じゅる、じゅるるんっ<emoji=heart04>」"
translation = "「츄릅, 츄류레로, 쥬르르륵<emoji=heart04> 응후, 하아…… 레로츄파, 츄우, 쥬르, 쥬르릉<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "互いに舌を絡め合い、唾液が混ざり合う、さながら恋人同士のような激しいキス。"
translation = "서로 혀를 얽으며 타액이 섞이는, 마치 연인 사이 같은 격렬한 키스."

[[dialogue]]
speaker = "unk"
original = "理性の崩壊になおも歯止めはかからず、力任せに突き上げた。"
translation = "이성의 붕괴에 더는 제동이 걸리지 않고, 힘껏 찔러 올렸다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ふやあああぁっ<emoji=heart04><emoji=heart04>\u3000くぁっ、あっ、はぁっ、あぁっ<emoji=heart04>\u3000そーだぁっ<emoji=heart04>\u3000もっと振れぇっ<emoji=heart04>\u3000本能のまま腰振りゃあいいんだっ<emoji=heart04>」"
translation = "「후야아아앗<emoji=heart04><emoji=heart04> 쿠앗, 아, 하앗, 아앗<emoji=heart04> 그래<emoji=heart04> 더 흔들어<emoji=heart04> 본능대로 허리 흔들면 되는 거야<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「アタシもその方が、あぁんっ、気持ちいいっ<emoji=heart04>\u3000オマエがガンガン、突いてくる方がっ、あっ、あっ、濡れてくるっ<emoji=heart04>」"
translation = "「나도 그게, 아앙, 더 기분 좋아<emoji=heart04> 네놈이 팍팍 찔러대는 쪽이, 아, 아, 더 젖어온다고<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「どーせ誰も見てねえんだっ<emoji=heart04>\u3000楽しんじまおうぜっ<emoji=heart04>\u3000アタシと、ふぁっ、あっ、はぁっ、一緒によぉっ<emoji=heart04>」"
translation = "「어차피 아무도 안 보잖아<emoji=heart04> 즐겨보자고<emoji=heart04> 나라랑, 하아, 아, 하앗, 같이 말이야<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "敵味方も場所も忘れて、男と女の行為に没頭する。"
translation = "피아 구분도 장소도 잊고, 남자와 여자의 행위에 몰두한다."

[[dialogue]]
speaker = "unk"
original = "もう止まらない。キサナの肉感的なお尻を掴みながら、しゃにむに欲望を打ち付けた。"
translation = "이제 멈추지 않는다. 키사나의 육감적인 엉덩이를 움켜쥐며 무작정 욕망을 내리쳤다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「んはぁっ、あぁあんっ、あっ、はぁっ、ふぁあああんっっ<emoji=heart04>」"
translation = "「응하앗, 아아앙, 아, 하앗, 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「奥までズンズン来てぇっ……<emoji=heart04>\u3000もうケダモノじゃねえかっ<emoji=heart04>\u3000だけど気持ち、いいっ<emoji=heart04>\u3000\u3000あっ、あっ、あっ、あぁあんっ<emoji=heart04>\u3000最高に気持ちいいぜっ<emoji=heart04>」"
translation = "「안쪽까지 깊숙이 들어와줘……<emoji=heart04> 이제 짐승이나 다름없잖아<emoji=heart04> 하지만 기분 좋아<emoji=heart04> 아, 아, 아, 아아앙<emoji=heart04> 최고로 기분 좋다고<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「チ○ポ、ビクビクって、激しくなってきやがったっ<emoji=heart04>\u3000腹ん中、アチいっ<emoji=heart04>\u3000んぁっ、はぁあんっ<emoji=heart04>\u3000ドクンドクン脈打ってやがるっ<emoji=heart04>」"
translation = "「자지, 움찔움찔하면서 격렬해지고 있어<emoji=heart04> 배 속이 뜨거워<emoji=heart04> 응아, 하아앙<emoji=heart04> 두근두근 맥박 치고 있다고<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「おらっ、我慢せずに出しちまえよっ<emoji=heart04>\u3000しゃせーしてえんだろっ<emoji=heart04>\u3000アタシの体で気持ち良くイっちまえっ<emoji=heart04>」"
translation = "「어이, 참지 말고 싸버려<emoji=heart04> 사정하고 싶은 거잖아<emoji=heart04> 내 몸으로 기분 좋게 가버려<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「アタシもイクっ、はぁはぁっ、イっちまっ、あぁああんっっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000やべぇっ、ああっ、あぁあああっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「나도 가, 하아하아, 가버렷, 아아아앙<emoji=heart04><emoji=heart04><emoji=heart04> 위험해, 아아, 아아아앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "今にも絶頂しそうなほど大声で喘ぐキサナ。"
translation = "금방이라도 절정할 것 같이 큰 소리로 신음하는 키사나."

[[dialogue]]
speaker = "unk"
original = "その蕩けた顔がとてつもなく女の子っぽくて、そのかわいさにペニスが滾ってしまう。"
translation = "그 황홀해진 얼굴이 너무나도 소녀 같아서, 그 귀여움에 페니스가 끓어오른다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「くあぁっ、あんっ<emoji=heart04>\u3000なんだ、その顔っ……ちょっ、見んなっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000今アタシの顔見んなぁっ<emoji=heart04>」"
translation = "「쿠아앗, 앙<emoji=heart04> 뭐야, 그 얼굴…… 잠까, 보지 마<emoji=heart04> 아앙<emoji=heart04> 지금 내 얼굴 보지 마아<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「見るならオマエも見せろっ<emoji=heart04>\u3000アタシのま○こで感じてる情けねえ顔っ、しっかり見せろっ<emoji=heart04>」"
translation = "「볼 거면 네놈도 보여줘<emoji=heart04> 내 보지에 느끼고 있는 한심한 얼굴, 똑바로 보여주라고<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "互いに顔を見つたまま、吐息が交わるような距離で腰を振り、２人してセックスの快感に溺れ続ける。"
translation = "서로의 얼굴을 마주한 채, 숨결이 섞이는 거리에서 허리를 흔들며 둘이서 섹스의 쾌감에 계속 빠져든다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「んはぁぁっ<emoji=heart04>\u3000熱いっ<emoji=heart04>\u3000オマエのチ○ポも、吐息もっ、顔もっ、アタシのま○こもっ<emoji=heart04>」"
translation = "「응하아아<emoji=heart04> 뜨거워<emoji=heart04> 네놈의 자지도, 숨결도, 얼굴도, 내 보지도<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「なんだこれっ、ああああっ<emoji=heart04>\u3000イっちまうっ、くぁぁっ、イクっ、イクイクイクっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「뭐야 이거, 아아아앗<emoji=heart04> 가버려, 쿠아아, 가, 가가각<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ぎゅうぅっとキサナの膣が一気に締まり、発情しきった顔で俺のペニスを貪る。"
translation = "꽉 하고 키사나의 질이 단숨에 조여지며, 발정할 대로 발정난 얼굴로 내 페니스를 탐한다."

[[dialogue]]
speaker = "unk"
original = "凶暴は彼女の、今まで見たことないエッチな顔を見て俺は──"
translation = "흉폭한 그녀의, 지금까지 본 적 없는 야한 얼굴을 보고 나는──"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「頭ん中、ぐちゃぐちゃになってっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000チ○ポ、ビクビクしてっ……ふあっ──あっ──あっ<emoji=heart04>」"
translation = "「머릿속이 엉망진창이 돼서<emoji=heart04> 하아아<emoji=heart04> 아<emoji=heart04> 자지가 움찔움찔하고…… 후아── 아── 아<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ま○こが、ぁっ、ぁっ<emoji=heart04>\u3000お腹の奥、キュンキュンしてっ<emoji=heart04>\u3000イクっ、イクっ、イクっ──イッくぅ～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「보지가, 아, 아<emoji=heart04> 배 안쪽이 큥큥거려<emoji=heart04> 가, 가, 가── 간드아아아~~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「んあっ、あっ──ふあぁぁあああああああんんんんんっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응앗, 아── 후아아아아아아아아아아앙~~~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "何も考えられなくなって、キサナの膣内にたまらず精をぶちまけた。"
translation = "아무것도 생각할 수 없게 되어, 키사나의 질 내에 참지 못하고 정을 쏟아부었다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「んぁぁあっ、熱っ<emoji=heart04>\u3000イクっ<emoji=heart04>\u3000んあああっっ<emoji=heart04>\u3000腹ん中、あついぃぃっ<emoji=heart04>」"
translation = "「응아아앗, 뜨거워<emoji=heart04> 가버려<emoji=heart04> 응아아앗<emoji=heart04> 배 속이 뜨거워어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「めちゃくちゃ、あぁあんっ、気持ちいいっ<emoji=heart04>\u3000やべぇっ、んんんんっ<emoji=heart04>\u3000めちゃくちゃ、ま○こ締まっちまうっ……<emoji=heart04>」"
translation = "「엄청나게, 아아앙, 기분 좋아<emoji=heart04> 위험해, 음음음<emoji=heart04> 엄청나게 보지가 조여져버려……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「出せっ<emoji=heart04>\u3000もっと出せっっ<emoji=heart04><emoji=heart04>\u3000オマエのせーしっ、あぁああんっ、もっとアタシにくれよっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「싸라<emoji=heart04> 더 싸라고<emoji=heart04><emoji=heart04> 네놈의 정액, 아아아앙, 더 나한테 달란 말이야<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "キサナが射精中の亀頭に子宮口を密着させ、敏感になっている先端を貪欲に吸ってくる。"
translation = "키사나가 사정 중인 귀두에 자궁구를 밀착시켜, 민감해진 끝부분을 탐욕스럽게 빨아들인다."

[[dialogue]]
speaker = "unk"
original = "その蕩けるような快楽に、また──"
translation = "그 녹아내릴 듯한 쾌락에, 다시──"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「うああぁ～～～っ<emoji=heart04><emoji=heart04>\u3000またビューッて、奥にっ……んんっ──ん～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「으아아아~~~<emoji=heart04><emoji=heart04> 또 뷰읏하고 안쪽에…… 으음── 음~~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「んぁぁぁ……<emoji=heart04>\u3000はぁーっ、はぁーっ、んはぁぁーっ……<emoji=heart04>」"
translation = "「응아아아……<emoji=heart04> 하아─, 하아─, 응하아아─……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「こりゃあ水浴びし直しだな……<emoji=heart04>\u3000ま○こから溢れちまうほど出しやがって……<emoji=heart04>」"
translation = "「이거 다시 씻어야겠네……<emoji=heart04> 보지에서 흘러넘칠 정도로 싸대고 말이야……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「でも、はぁはぁ、セックスも悪くねえじゃねえか……<emoji=heart04>\u3000マジで秘密の関係っての続けてみっかぁ……？」"
translation = "「그래도, 하아하아, 섹스도 나쁘지 않잖아……<emoji=heart04> 진짜로 비밀스러운 관계라는 거 계속해볼까아……?」"

[[dialogue]]
speaker = "unk"
original = "先程のかわいらしいキサナの姿を思い出して一瞬考えてしまう。"
translation = "방금 전의 귀여운 키사나의 모습을 떠올리며 잠시 생각에 잠긴다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「って、冗談に決まってんだろ。真に受けんなよ、敵同士だぞアタシらは。……なんだその顔。本気で残念そうにすんなよ」"
translation = "「랄까, 농담인 게 당연하잖아. 곧이곧대로 듣지 마라, 적대 관계라고 우리는. ……뭐야 그 표정. 진심으로 아쉬운 듯한 얼굴 하지 말라고」"

[[dialogue]]
speaker = "unk"
original = "呆れたような、照れたような顔が俺の胸をさらに疼かせる。"
translation = "어이없다는 듯하면서도 수줍어하는 얼굴이 내 가슴을 더욱 술렁이게 한다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「アタシ、コラプサーの前はマフィアにいた……ってのは言ったっけか」"
translation = "「나, 콜랩서에 오기 전에는 마피아에 있었다……는 말 했었나」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「アタシは抗争ばっかりだったが、場合によっちゃ娼婦か愛人にでもさせられてたんだろうなぁ……」"
translation = "「나는 항쟁만 일삼았지만, 경우에 따라서는 창녀나 애인 같은 거나 되었겠지……」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「セックスなんかバカかケダモノのやることだと思ってたけどよ、オマエとヤったのは……まぁ後悔はしてねえよ」"
translation = "「섹스 같은 건 바보나 짐승들이나 하는 거라고 생각했는데 말이야, 네놈이랑 한 건…… 뭐 후회는 안 해」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「次いつ出くわすかわかんねえし、このままもう１回ヤろうぜ。オマエもまだまだ溜まってんだろ？」"
translation = "「다음엔 언제 마주칠지 모르니까, 이대로 한 번 더 하자고. 네놈도 아직 한참 쌓여있지?」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「とっととおっ勃てろよ。まさか一度で枯れ果てたとか言わねえよな？」"
translation = "「빨리 꼿꼿하게 세우라고. 설마 한 번으로 다 말라버렸다고 하진 않겠지?」"

[[dialogue]]
speaker = "unk"
original = "そうして俺とキサナは獣になって、夜更けまで交わり続けたのだった──"
translation = "그렇게 나와 키사나는 짐승이 되어 밤이 깊을 때까지 계속 섞여들었다──"

