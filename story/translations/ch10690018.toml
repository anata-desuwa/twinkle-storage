[[dialogue]]
speaker = "unk"
original = "セシアと恋人体験をするようになってしばらく経ったある日。俺は新星寮にある彼女の部屋へと、遊びにきていた。"
translation = "세시아와 연인 체험을 하게 된 지도 꽤 지난 어느 날. 나는 신성료에 있는 그녀의 방에 놀러 와 있었다."

[[dialogue]]
speaker = "unk"
original = "彼女を膝の上に乗せながら、一緒に本を読んだりして、まったり過ごしていたのだが――"
translation = "그녀를 무릎 위에 앉힌 채 함께 책을 읽거나 하며 한가롭게 보내고 있었는데──"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「これが、会長のおち○ちんなのね。思っていたよりずっと、大きくて迫力があって、すごいわ……」"
translation = "「이게 회장의 자지구나. 생각했던 것보다 훨씬 크고 박력 있어서 대단해……」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「あら、どうしたの？\u3000――わたくしは体が小さいから、こういうのはまだ早いって？」"
translation = "「어머, 왜 그러니? ──나는 몸이 작으니까 이런 건 아직 이르다고?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「でも会長は、わたくしの体で興奮したから、大きくなっているんじゃないの？」"
translation = "「하지만 회장은 내 몸을 보고 흥분해서 커진 거 아니었니?」"

[[dialogue]]
speaker = "unk"
original = "俺は図星でなにも言えなくなってしまう。"
translation = "나는 정곡을 찔려 아무 말도 할 수 없게 되었다."

[[dialogue]]
speaker = "unk"
original = "セシアが読んでいた本が『エッチのやり方』に関するものであり、彼女とすることを想像してしまい、ついムラムラして、勃起してしまったのだ。"
translation = "세시아가 읽고 있던 책이 『섹스하는 법』에 관한 것이었고, 그녀와 하는 것을 상상해버려 그만 욕정이 생겨 발기해버린 것이다."

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「小さいからと、できないわけじゃないわ。それにわたくしは守護天使よ」"
translation = "「작다고 해서 못 하는 건 아니야. 게다가 나는 수호천사인걸.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「恋人として付き合っている以上、いつかは体験することになるのだから、いい機会じゃないかしら？」"
translation = "「연인으로서 사귀고 있는 이상 언젠가는 체험하게 될 일이니까 좋은 기회 아니겠니?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「――それでもよろしくない？\u3000むー、会長ったら、なかなか強情ね」"
translation = "「──그래도 좋지 않다고? 흐응, 회장도 참 고집이 세네.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「いいわ。実際におち○ちんは、わたくしとしたくて、こんなに大きくなっているわけだし……」"
translation = "「좋아. 실제로 자지는 나랑 하고 싶어서 이렇게 커진 거기도 하고……」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「こうなったら、会長がおま○こに入れたくなるように、気持ちよくしちゃうんだから<emoji=heart04>」"
translation = "「이렇게 되면 회장이 보지에 넣고 싶어지도록 기분 좋게 해줄 테니까<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言うと、セシアは興味深そうに、俺のペニスを触りはじめた――"
translation = "그렇게 말하며 세시아는 흥미로운 듯 내 자지를 만지기 시작했다──"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「んっ……<emoji=heart04>\u3000会長のおち○ちん、熱くて、固いわ。勃起すると、こんな感じなのね……ふぅ……」"
translation = "「응……<emoji=heart04> 회장 자지, 뜨겁고 단단해. 발기하면 이런 느낌이구나…… 후우……」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「あっ……先っぽに触れたら、ビクって震えたわ。わたくしの手で感じてくれているのは、なんだか嬉しくなるわね……ふふっ<emoji=heart04>」"
translation = "「앗…… 끝부분을 만졌더니 움찔하고 떨렸어. 내 손으로 느껴주고 있는 건 왠지 기뻐지네…… 후훗<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「こんなに大きいのに、とっても敏感なのね。なんだか可愛く思えてきたわ。んっ……<emoji=heart04>」"
translation = "「이렇게 큰데 아주 민감하구나. 왠지 귀엽게 느껴지기 시작했어. 응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「はあぁ……<emoji=heart04>\u3000弄っていたら、わたくしも、だんだんムラムラしてきたかも……<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 만지고 있으니까 나도 점점 욕정이 생기는 것 같아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「そうだわ、スマタというのだったかしら？\u3000こうやって……太ももで挟んで、おま○こを擦りつけて……あっ！？\u3000あんっ……！」"
translation = "「그렇지, 스마타라고 했던가? 이렇게…… 허벅지로 끼워서 보지를 문질러서…… 앗!? 앙……!」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ふあぁっ……<emoji=heart04>\u3000あ、頭の中が今、バチッと痺れるような感じがしたわ。こ、これが性的快感というものなのね……んっ！\u3000あっ！\u3000はあぁっ……！」"
translation = "「후아아……<emoji=heart04> 머릿속이 지금 찌릿하고 저리는 듯한 느낌이 들었어. 이, 이게 성적 쾌감이라는 거구나…… 응! 앗! 하아아……!」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ふうぅ……！\u3000す、すごいわ。エッチって、こんな風に気持ちよくなるのね……あっ<emoji=heart04>\u3000んあぁっ……<emoji=heart04>」"
translation = "「후우우……! 대, 대단해. 섹스란 건 이런 식으로 기분 좋아지는 거구나…… 앗<emoji=heart04> 응아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ふぅ……<emoji=heart04>\u3000はぁ……<emoji=heart04>\u3000おま○こがムズムズして、濡れてきたわ……んっ<emoji=heart04>\u3000あっ……はぁ……<emoji=heart04>」"
translation = "「후우……<emoji=heart04> 하아……<emoji=heart04> 보지가 근질거려서 젖어왔어…… 응<emoji=heart04> 앗…… 하아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「あっ<emoji=heart04>\u3000んっ……ふふっ<emoji=heart04>\u3000会長も、おち○ちんの先っぽが濡れてきているわよ？」"
translation = "「앗<emoji=heart04> 응…… 후훗<emoji=heart04> 회장도 자지 끝부분이 젖어오고 있어.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「お互いのものがヌルヌルになって……あんっ<emoji=heart04>\u3000境目がわからなくなりそう……んふぅ……<emoji=heart04>」"
translation = "「서로의 것이 미끌미끌해져서…… 앙<emoji=heart04> 경계선을 모르게 될 것 같아…… 응후우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「これなら、ヌルっとおま○こに入っちゃいそうじゃない？\u3000――それでもダメだって？」"
translation = "「이러면 미끄러지듯 보지에 들어가 버릴 것 같지 않니? ──그래도 안 된다고?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「んっ<emoji=heart04>\u3000もう……気持ちよさそうな顔してるのに、我慢して首をイヤイヤって横に振ったりして……」"
translation = "「응<emoji=heart04> 정말…… 기분 좋은 표정을 하고 있으면서 참으려고 고개를 도리도리 젓기나 하고……」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「わたくしは恋人として、会長にも気持ちよくなって欲しいわ。だから、おま○こに入れるのがダメだって言うなら、その代わりに……えいっ<emoji=heart04>」"
translation = "「나는 연인으로서 회장도 기분 좋아졌으면 좋겠어. 그러니까 보지에 넣는 게 안 된다고 한다면 그 대신에…… 에잇<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「今日は、こうして両手でおち○ちんを握って、シコシコする形で、『疑似エッチ体験』しましょう？」"
translation = "「오늘은 이렇게 양손으로 자지를 쥐고 대딸해주는 형태로 『의사 섹스 체험』 하자?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「せめて、それくらいは許して欲しいわ。恋人なのに、ここで断られてしまったら、わたくし、悲しくなってしまうもの……」"
translation = "「적어도 그 정도는 허락해줬으면 좋겠어. 연인인데 여기서 거절당해버리면 나 슬퍼질 거야……」"

[[dialogue]]
speaker = "unk"
original = "好きな子にそんな言い方をされたら、断り切ることなどできず――"
translation = "좋아하는 아이가 그런 식으로 말하면 거절할 수 있을 리 없어──"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「――いいの？\u3000ふふっ……ありがとう♪\u3000それじゃあ、一緒に気持ちよくなりましょう<emoji=heart04>」"
translation = "「──괜찮아? 후훗…… 고마워♪ 그럼 함께 기분 좋아지자<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「両手を愛液とカウパーでヌチャヌチャにして……いくわね<emoji=heart04>\u3000んっ……<emoji=heart04>」"
translation = "「양손을 애액이랑 쿠퍼액으로 질척질척하게 해서…… 간다<emoji=heart04> 응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「シッコシッコ<emoji=heart04>\u3000すりすり<emoji=heart04>\u3000……シゴき方、これで合っているかしら？\u3000ぬっちゅぬっちゅ<emoji=heart04>\u3000しゅっしゅ<emoji=heart04>」"
translation = "「딸꾹딸꾹<emoji=heart04> 비비적비비적<emoji=heart04> ……흔드는 법, 이걸로 맞니? 끈적끈적<emoji=heart04> 슥슥<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「あっ<emoji=heart04>\u3000ふぅ……<emoji=heart04>\u3000シコシコしてると、おま○こにも擦れて感じちゃうわ……<emoji=heart04>\u3000はあぁ……<emoji=heart04>\u3000んっ<emoji=heart04>\u3000あんっ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 후우……<emoji=heart04> 흔들고 있으니까 보지에도 문질러져서 느껴버려……<emoji=heart04> 하아아……<emoji=heart04> 응<emoji=heart04> 앙……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「すりすり<emoji=heart04>\u3000しゅっしゅ<emoji=heart04>\u3000ぬっちゅぬっちゅ<emoji=heart04>\u3000シッコシッコ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふぅ……<emoji=heart04>\u3000シッコシッコ<emoji=heart04>\u3000すりすり<emoji=heart04>\u3000ぬっちゅぬっちゅ<emoji=heart04>\u3000しゅっしゅ<emoji=heart04>」"
translation = "「비비적<emoji=heart04> 슥슥<emoji=heart04> 끈적끈적<emoji=heart04> 딸꾹딸꾹<emoji=heart04> 응<emoji=heart04> 후우……<emoji=heart04> 딸꾹딸꾹<emoji=heart04> 비비적<emoji=heart04> 끈적끈적<emoji=heart04> 슥슥<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「……どう？\u3000会長は気持ちいい？\u3000んふっ<emoji=heart04>\u3000こくこく頷いちゃって……なんだか、赤ちゃんみたいで可愛いわ<emoji=heart04>」"
translation = "「……어때? 회장은 기분 좋아? 응훗<emoji=heart04> 고개를 끄덕끄덕거리고…… 왠지 아기 같아서 귀여워<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「我慢せずに、もっと気持ちよくなっていいのよ？\u3000ほら、おち○ちん、すりすり<emoji=heart04>\u3000いいこいいこ<emoji=heart04>」"
translation = "「참지 말고 더 기분 좋아져도 된단다? 자, 자지, 비비적비비적<emoji=heart04> 착하다 착해<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「いつも会長の仕事、頑張って、えらいえらい<emoji=heart04>\u3000今日はいっぱい、甘えていいのよ<emoji=heart04>\u3000シッコシッコ<emoji=heart04>\u3000ぬっちゅぬっちゅ<emoji=heart04>」"
translation = "「항상 회장 업무 열심히 하고 장하다 장해<emoji=heart04> 오늘은 잔뜩 어리광부려도 된단다<emoji=heart04> 딸꾹딸꾹<emoji=heart04> 끈적끈적<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「んっ……<emoji=heart04>\u3000すごいわ。おち○ちん、更に大きく、固くなって……<emoji=heart04>\u3000会長、わたくしにママを感じてしまったのね<emoji=heart04>」"
translation = "「응……<emoji=heart04> 대단해. 자지가 더 커지고 단단해져서……<emoji=heart04> 회장, 나한테서 마마를 느껴버렸구나<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「そういうことなら、わたくしが責任を持って、おち○ちんのお世話をしないといけないわね<emoji=heart04>\u3000ぬっちゅぬっちゅ<emoji=heart04>\u3000しゅっしゅ<emoji=heart04>」"
translation = "「그렇다면 내가 책임지고 자지를 보살펴줘야겠네<emoji=heart04> 끈적끈적<emoji=heart04> 슥슥<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ママのお手々と、おま○こズリ、気持ちいいかしら？\u3000ふふっ……<emoji=heart04>\u3000よちよち<emoji=heart04>\u3000いいこいいこね<emoji=heart04>」"
translation = "「마마의 손길이랑 보지 문지르기, 기분 좋니? 후훗……<emoji=heart04> 오구오구<emoji=heart04> 착하지 착해<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「すりすり<emoji=heart04>\u3000シッコシッコ<emoji=heart04>\u3000ぬっちゅぬっちゅ<emoji=heart04>\u3000にゅっぷにゅっぷ<emoji=heart04>」"
translation = "「비비적비비적<emoji=heart04> 딸꾹딸꾹<emoji=heart04> 끈적끈적<emoji=heart04> 쭈욱쭈욱<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「はぁ……<emoji=heart04>\u3000先っぽからいっぱいカウパーが溢れて、男の子の濃い匂いがして、興奮しちゃうわ……<emoji=heart04>\u3000とっても立派ね<emoji=heart04>\u3000えらいえらい<emoji=heart04>」"
translation = "「하아……<emoji=heart04> 끝에서 쿠퍼액이 잔뜩 넘쳐서 남자아이의 진한 냄새가 나니까 흥분돼……<emoji=heart04> 아주 훌륭하네<emoji=heart04> 장하다 장해<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「先っぽも気持ちよくしてあげるわね<emoji=heart04>\u3000なでなで<emoji=heart04>\u3000すりすり<emoji=heart04>\u3000ぬっちゅぬっちゅ<emoji=heart04>\u3000しゅっしゅ<emoji=heart04>」"
translation = "「끝부분도 기분 좋게 해줄게<emoji=heart04> 쓰담쓰담<emoji=heart04> 비비적비비적<emoji=heart04> 끈적끈적<emoji=heart04> 슥슥<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「んふっ<emoji=heart04>\u3000このカリ首の部分が気持ちいいのね？\u3000いいこいいこ<emoji=heart04>\u3000ぬっちゅぬっちゅ<emoji=heart04>\u3000シッコシッコ<emoji=heart04>\u3000ちゅっぽちゅっぽ<emoji=heart04>\u3000しゅりしゅり<emoji=heart04>」"
translation = "「응훗<emoji=heart04> 이 귀두 부분이 기분 좋은 거니? 착하다 착해<emoji=heart04> 끈적끈적<emoji=heart04> 딸꾹딸꾹<emoji=heart04> 쪽쪽<emoji=heart04> 문질문질<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「んっ<emoji=heart04>\u3000おち○ちんビクビクしてる<emoji=heart04>\u3000喘ぎ声、我慢しなくていいのよ？\u3000ママに甘えると思って、ね？\u3000気持ちいいのに身を任せて……ほら<emoji=heart04>」"
translation = "「응<emoji=heart04> 자지가 움찔움찔해<emoji=heart04> 신음 소리 참지 않아도 된단다? 마마한테 어리광부린다고 생각하고, 응? 기분 좋음에 몸을 맡겨…… 자<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「シッコシッコ<emoji=heart04>\u3000ぬっちゅぬっちゅ<emoji=heart04>\u3000ちゅっぷちゅっぷ<emoji=heart04>\u3000しゅっしゅ<emoji=heart04>」"
translation = "「딸꾹딸꾹<emoji=heart04> 끈적끈적<emoji=heart04> 쪽쪽<emoji=heart04> 슥슥<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「って、あんっ<emoji=heart04>\u3000どうしたの？\u3000おっぱいが恋しくなっちゃったの？\u3000んっ<emoji=heart04>\u3000ふぅっ……<emoji=heart04>」"
translation = "「어라, 앙<emoji=heart04> 왜 그러니? 가슴이 그리워졌니? 응<emoji=heart04> 후우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「あっ<emoji=heart04>\u3000そこは……乳首は、興奮で敏感になっちゃってるから、触られると……はぁんっ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 거기는…… 젖꼭지는 흥분해서 민감해져 있으니까 만져지면…… 하앙……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「おっぱいでも、感じちゃうわ……んっ<emoji=heart04>\u3000ふあぁっ……<emoji=heart04>\u3000はぅんっ……<emoji=heart04>」"
translation = "「가슴으로도 느껴버려…… 응<emoji=heart04> 후아아……<emoji=heart04> 하웅……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「あっ<emoji=heart04>\u3000おち○ちんも動かしたりしたら……あんっ<emoji=heart04>\u3000勃起したクリトリスに擦れて……ふああぁっ<emoji=heart04>\u3000頭の中、気持ちいいのでいっぱいになっちゃう<emoji=heart04>」"
translation = "「앗<emoji=heart04> 자지도 움직이거나 하면…… 앙<emoji=heart04> 발기한 클리토리스에 문질러져서…… 후아아아<emoji=heart04> 머릿속이 기분 좋은 걸로 가득 차버려<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "興奮で我慢できず、高まる射精欲に腰が勝手に動いてしまう。"
translation = "흥분으로 참지 못하고 높아지는 사정 욕구에 허리가 제멋대로 움직인다."

[[dialogue]]
speaker = "unk"
original = "俺はそのことをセシアに謝り、つい甘えて、おねだりを口にしてしまった――"
translation = "나는 그 사실을 세시아에게 사과하며 그만 어리광을 피우듯 부탁의 말을 입에 담고 말았다──"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「んっ<emoji=heart04>\u3000――もっと激しく、気持ちよくして欲しいのね？\u3000ふふっ……<emoji=heart04>\u3000もちろんいいわよ<emoji=heart04>」"
translation = "「응<emoji=heart04> ──더 격하게 기분 좋게 해줬으면 좋겠니? 후훗……<emoji=heart04> 물론 좋단다<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「今はわたくしがママなんだから、いっぱい甘えて、気持ちよくなって<emoji=heart04>」"
translation = "「지금은 내가 마마니까 잔뜩 어리광부리고 기분 좋아지렴<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「それじゃあ、いくわね？\u3000――んっ<emoji=heart04><emoji=heart04>」"
translation = "「그럼 간다? ──응<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ぬちゅぬちゅしゅっしゅ<emoji=heart04>\u3000じゅぷじゅぷシコシコ<emoji=heart04>\u3000じゅぽじゅぽしゅっしゅ<emoji=heart04>\u3000にゅぷにゅぷシコシコ<emoji=heart04>」"
translation = "「질척질척 슥슥<emoji=heart04> 쥬뿝쥬뿝 딸꾹딸꾹<emoji=heart04> 쥬뽓쥬뽓 슥슥<emoji=heart04> 늅늅 딸꾹딸꾹<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「はあぁっ……<emoji=heart04>\u3000ふうぅっ……<emoji=heart04>\u3000んっ<emoji=heart04>\u3000先っぽも責めちゃう<emoji=heart04>\u3000すりすりぬちゅぬちゅ<emoji=heart04>\u3000にゅぽにゅぽしゅっしゅ<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 후우우……<emoji=heart04> 응<emoji=heart04> 끝부분도 괴롭혀줄게<emoji=heart04> 비비적비비적 질척질척<emoji=heart04> 늅뽓늅뽓 슥슥<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「これくらい激しくして大丈夫？\u3000痛くない？\u3000ぬちゅぬちゅしゅっしゅ<emoji=heart04>\u3000じゅぷじゅぷシコシコ<emoji=heart04>」"
translation = "「이 정도로 격하게 해도 괜찮아? 아프지 않아? 질척질척 슥슥<emoji=heart04> 쥬뿝쥬뿝 딸꾹딸꾹<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「んっ<emoji=heart04>\u3000――気持ちいいのね<emoji=heart04>\u3000よかったわ。なら、このままいっぱいしちゃうわね<emoji=heart04>\u3000じゅぷじゅぷにゅこにゅこ<emoji=heart04>\u3000ちゅぷちゅぷシコシコ<emoji=heart04>」"
translation = "「응<emoji=heart04> ──기분 좋구나<emoji=heart04> 다행이야. 그럼, 이대로 잔뜩 해줄게<emoji=heart04> 쥬뿝쥬뿝 늅늅<emoji=heart04> 츄뿝츄뿝 딸꾹딸꾹<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「はあぁっ……<emoji=heart04>\u3000会長の喘ぎ声、可愛いわ。おま○こがキュンってして、愛液がお漏らしみたいに溢れてきちゃう<emoji=heart04>\u3000ぬちゅぬちゅにゅぷにゅぷ<emoji=heart04>\u3000じゅぷじゅぷずりずり<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 회장의 신음 소리, 귀여워. 보지가 큥 하고 울려서, 애액이 실례하는 것처럼 넘쳐버려<emoji=heart04> 질척질척 늅늅<emoji=heart04> 쥬뿝쥬뿝 비비적비비적<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000わたくしも、クリトリスに擦れて気持ちいいわ。んあぁっ<emoji=heart04>\u3000ふうぅっ……<emoji=heart04>\u3000くりゅくりゅちゅぷちゅぷ<emoji=heart04>\u3000ぬちゅぬちゅじゅぽじゅぽ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앙<emoji=heart04> 저도, 클리토리스에 문질러져서 기분 좋아요. 응아아<emoji=heart04> 후우우……<emoji=heart04> 꾸물꾸물 츄뿝츄뿝<emoji=heart04> 질척질척 쥬뽓쥬뽓<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「んっ<emoji=heart04>\u3000お手々とスマタの同時ズリが気持ちいいのね？\u3000いいわよ<emoji=heart04>\u3000ほら<emoji=heart04>」"
translation = "「응<emoji=heart04> 손이랑 스마타 동시 비비기가 기분 좋은 거구나? 좋아요<emoji=heart04> 자아<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ぬちゅぬちゅシコシコ<emoji=heart04>\u3000にゅぷにゅぷじゅぽじゅぽ<emoji=heart04>\u3000ずりずりじゅぷじゅぷ<emoji=heart04>\u3000くちゅくちゅしゅっしゅ<emoji=heart04>」"
translation = "「질척질척 딸꾹딸꾹<emoji=heart04> 늅늅 쥬뽓쥬뽓<emoji=heart04> 비비적비비적 쥬뿝쥬뿝<emoji=heart04> 쿠츄쿠츄 슥슥<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「あっ<emoji=heart04>\u3000すごい<emoji=heart04>\u3000会長のおち○ちん、まだ大きくなって……<emoji=heart04>\u3000んっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 대단해<emoji=heart04> 회장의 자지, 아직 더 커져서……<emoji=heart04> 응<emoji=heart04> 하아아<emoji=heart04> 앙<emoji=heart04> 후아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「――もう出そう？\u3000おち○ちん、射精しそうなのね<emoji=heart04>\u3000んっ<emoji=heart04>\u3000わたくしも、気持ちいいのがどんどん蓄積されてきてるから、一緒にっ<emoji=heart04>」"
translation = "「──이제 나올 것 같아? 자지, 사정할 것 같구나<emoji=heart04> 응<emoji=heart04> 저도 기분 좋은 게 점점 축적되고 있으니까, 같이!<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「はあぁっ<emoji=heart04>\u3000ぬちゅぬちゅちゅこちゅこ<emoji=heart04>\u3000にゅぽにゅぽしゅっしゅ<emoji=heart04>\u3000じゅぷじゅぷズリズリ<emoji=heart04>\u3000シコシコにゅぷにゅぷ<emoji=heart04>」"
translation = "「하아아<emoji=heart04> 질척질척 츄룹츄룹<emoji=heart04> 늅뽓늅뽓 슥슥<emoji=heart04> 쥬뿝쥬뿝 비비적비비적<emoji=heart04> 딸꾹딸꾹 늅늅<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「んっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000会長、好き<emoji=heart04>\u3000好きよ<emoji=heart04>\u3000わたくしの体で、気持ちよくなって<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 후우우<emoji=heart04> 회장, 좋아해<emoji=heart04> 좋아해요<emoji=heart04> 제 몸으로 기분 좋아지세요<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 후아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「あっ<emoji=heart04>\u3000くる<emoji=heart04>\u3000すごい気持ちいいのが登ってくるわ<emoji=heart04>\u3000これが絶頂……あんっ<emoji=heart04>\u3000イクってことなのね？\u3000んっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000んああぁっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 온다<emoji=heart04> 굉장한 쾌감이 올라와요<emoji=heart04> 이게 절정…… 앙<emoji=heart04> 간다는 거군요? 응<emoji=heart04> 후아아<emoji=heart04> 응아아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「イクなら、会長も<emoji=heart04>\u3000あなたと一緒にイキたいわ<emoji=heart04>\u3000出して<emoji=heart04>\u3000いっぱい射精して<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「간다면, 회장도<emoji=heart04> 당신과 함께 가고 싶어요<emoji=heart04> 내보내 줘<emoji=heart04> 잔뜩 사정해줘<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04><emoji=heart04> 앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「イク<emoji=heart04>\u3000イクわ<emoji=heart04><emoji=heart04>\u3000イク、イクイクイク――<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가<emoji=heart04> 가요<emoji=heart04><emoji=heart04> 가, 가가각──<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ふあああぁぁぁーーーーーーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イックぅぅぅーーーーーーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아아아──────────!<emoji=heart04><emoji=heart04><emoji=heart04> 가버려어어어어──────────!<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「んあああぁぁぁっ……<emoji=heart04><emoji=heart04>\u3000わたくしもおま○こから、いっぱい出ちゃう……<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふああぁっ……<emoji=heart04>」"
translation = "「응아아아아앗……<emoji=heart04><emoji=heart04> 저도 보지에서 잔뜩 나와버려요……<emoji=heart04> 하아아<emoji=heart04> 후아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「あぁ……<emoji=heart04>\u3000おしっこじゃなくて……これが、お潮を吹くってことなのかしら……？\u3000んふぅ……<emoji=heart04>」"
translation = "「아아……<emoji=heart04> 오줌이 아니라…… 이게 여조를 뿜는다는 걸까요……? 응후……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「あんっ……<emoji=heart04>\u3000あなたの射精、すごいわ……<emoji=heart04>\u3000まだ止まらなくて……こんなにいっぱい<emoji=heart04>\u3000熱くて、エッチな匂いがするわ……<emoji=heart04>\u3000すうぅ……はあぁ……<emoji=heart04>」"
translation = "「앙……<emoji=heart04> 당신의 사정, 대단해……<emoji=heart04> 아직 멈추지 않아서…… 이렇게 잔뜩<emoji=heart04> 뜨겁고 야한 냄새가 나요……<emoji=heart04> 스으…… 하아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「んっ……<emoji=heart04>\u3000射精、終わったみたいね……<emoji=heart04>\u3000ふうぅ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 사정, 끝난 모양이네요……<emoji=heart04> 후우우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「はぁ……<emoji=heart04>\u3000ん……<emoji=heart04>\u3000疑似エッチ体験……とっても気持ちよかったわ……<emoji=heart04>\u3000性の快楽って、こんなにすごいものなのね……<emoji=heart04>」"
translation = "「하아……<emoji=heart04> 응……<emoji=heart04> 유사 섹스 체험…… 정말 기분 좋았어요……<emoji=heart04> 성적 쾌락이란 건 이렇게나 대단한 거군요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「あっ……♪\u3000――頭を撫でて、褒めてくれるの？\u3000初めてだったけど、あなたがわたくしで気持ちよくなってくれて、嬉しいわ……<emoji=heart04>」"
translation = "「앗……♪ ──머리를 쓰다듬으며 칭찬해주는 건가요? 처음이었지만, 당신이 저로 인해 기분 좋아해 줘서 기뻐요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「あぁ……だけど、こんなにも気持ちいいことだって知ってしまうと、世の中の男女が夢中になってしまうのもわかるわ……」"
translation = "「아아…… 하지만 이렇게나 기분 좋은 일이라는 걸 알아버리면, 세상의 남녀가 빠져드는 것도 이해가 가요……」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「うふふ<emoji=heart04>\u3000わたくしたちはもう恋人どうしなんだもの……これからはいくらだって気持ちいいことができるのよね？」"
translation = "「우후후<emoji=heart04> 우리들은 이제 연인 사이인걸요…… 앞으론 얼마든지 기분 좋은 일을 할 수 있는 거죠?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「はぁぁ……会長？\u3000なんだかわたくし、とってもキスをしてもらいたいわ」"
translation = "「하아아…… 회장? 왠지 저, 정말로 키스를 받고 싶어요」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「あっ<emoji=heart04>\u3000ちゅっ……ちゅぅ<emoji=heart04>\u3000はぷちゅっ<emoji=heart04>\u3000くちゅる……ちゅぅ、はぁぁ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 쪽…… 쭈욱<emoji=heart04> 하웁쪽<emoji=heart04> 츄르릅…… 쭈욱, 하아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「本当に……凄い<emoji=heart04>\u3000体だけじゃなくて、心まで気持ち良くなってくるの」"
translation = "「정말로…… 굉장해<emoji=heart04> 몸뿐만 아니라 마음까지 기분 좋아져요」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ねぇ、会長？\u3000もしよかったら、このまま肌と肌を合わせたまま、しばらく抱っこしててもらえないかしら……？」"
translation = "「있잖아요, 회장? 괜찮다면 이대로 살과 살을 맞댄 채로, 잠시만 안아주지 않을래요……?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「あっ……<emoji=heart04>\u3000うふふ<emoji=heart04>\u3000ありがとう、会長。あなたの体、とても温かいわ」"
translation = "「앗……<emoji=heart04> 우후후<emoji=heart04> 고마워요, 회장. 당신의 몸, 정말 따뜻해요」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ヒトとヒトとの営みというのは、こんなに温かくて気持ちのいいものだったのね。ふふっ<emoji=heart04>\u3000わたくしの中に、新しく蓄積させてもらったわ」"
translation = "「사람과 사람 사이의 영위라는 건, 이렇게 따뜻하고 기분 좋은 것이었군요. 후훗<emoji=heart04> 제 안에 새로이 축적했어요」"

[[dialogue]]
speaker = "unk"
original = "そんなことを言うセシアを抱きしめながら、俺たちはいつまでも離れずにベッドの上でイチャイチャし続けるのだった。"
translation = "그런 말을 하는 세시아를 껴안으며, 우리들은 언제까지나 떨어지지 않고 침대 위에서 꽁냥거림을 이어갔다."

