[[dialogue]]
speaker = "unk"
original = "第４話,偽りの聖女,P"
translation = "제4화, 거짓된 성녀, P"

[[dialogue]]
speaker = "unk"
original = "日曜の夜、大聖堂に行くと、イレーナがいつになくくたびれていた。"
translation = "일요일 밤, 대성당에 가니 이레나가 평소보다 몹시 지쳐 있었다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「はぁ～、疲れたーー……」"
translation = "「하아~, 피곤해──……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「説法して、懺悔を聞いて、怪我とか病気を治して……聖女ポイントを稼ぐのも大変だわ」"
translation = "「설법하고, 참회 들어주고, 상처나 병 고쳐주고…… 성녀 포인트 쌓는 것도 일이네.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「人の気も知らないで聖女様聖女様って崇めちゃって。どいつもこいつもあたしに騙されてるくせに、ほんとおめでたいわね」"
translation = "「사람 속도 모르고 성녀님 성녀님 하며 숭배해대고. 다들 나한테 속고 있으면서, 참 속도 좋지.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「朝から今までずーっとお澄まし顔で、表情筋マヒするかと思ったわよ。あ～、ピッツァ食べたい」"
translation = "「아침부터 지금까지 계~속 점잔 빼느라 표정 근육 마비되는 줄 알았어. 아~, 피자 먹고 싶다.」"

[[dialogue]]
speaker = "unk"
original = "もっと素を出せばいいのに"
translation = "좀 더 본모습을 드러내면 좋을 텐데"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ダメよ。せっかく苦労して今の地位を築いたんだから」"
translation = "「안 돼. 겨우 고생해서 지금 지위를 쌓아 올렸는데.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「この歳で教皇庁の神官って特例中の特例なの。それも聖女としての活動が認められたから」"
translation = "「이 나이에 교황청 신관이 된 건 특례 중의 특례라고. 그것도 성녀로서의 활동을 인정받았기 때문이야.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「まぁ、だからって特別高い給料がもらえるわけでもないけど。聖職者だし」"
translation = "「뭐, 그렇다고 특별히 월급을 많이 받는 것도 아니지만. 성직자니까.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「だいたいこんな聖女サマは嫌でしょ。気が短くて、口が悪くて、わがままで……女神様だって真面目に信仰してないし」"
translation = "「애초에 이런 성녀님은 싫잖아. 성질 급하고, 입 거칠고, 제멋대로에…… 여신님도 제대로 신앙하지 않고.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「だってそうでしょ？\u3000世界が滅ぶってことは、女神様がこの世界を見限ったってことじゃないの？\u3000そう思っちゃうのはいけないこと？」"
translation = "「그야 그렇잖아? 세계가 멸망한다는 건, 여신님이 이 세계를 저버렸다는 거 아냐? 그렇게 생각하는 게 나쁜 거야?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「どう考えても聖女には程遠いわ。こんなのに祈られたら、治る病気も治らないわよ」"
translation = "「아무리 생각해도 성녀와는 거리가 멀어. 이런 애가 기도해 봤자 나을 병도 안 낫는다고.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「みんな本当のあたしを知らない。でも知ったら幻滅する。だから知らなくていい」"
translation = "「다들 진짜 나를 몰라. 하지만 알면 환멸하겠지. 그러니까 몰라도 돼.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「だけど……あんたは聖女の私にも、聖女じゃないあたしにも変わらないわね」"
translation = "「하지만…… 당신은 성녀인 나에게도, 성녀가 아닌 나에게도 변함이 없네.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あんたは<b>あたし</b>のこと嫌いじゃないの？」"
translation = "「당신은 <b>나</b>라는 사람이 싫지 않아?」"

[[dialogue]]
speaker = "unk"
original = "俺はむしろ好きだけど"
translation = "난 오히려 좋은데"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「はぁ！？」"
translation = "「하아!?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「な、なんでそうなるのよ！？\u3000あたしの話聞いてたの！？」"
translation = "「왜, 왜 그렇게 되는 거야!? 내 말 듣고 있었어!?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ったく……人のことからかってんじゃないわよ、バカ」"
translation = "「정말…… 사람 놀리지 말라고, 바보.」"

[[dialogue]]
speaker = "unk"
original = "聖女になったこと、後悔してる？"
translation = "성녀가 된 거, 후회해?"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「……後悔、ね」"
translation = "「……후회, 라.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「そりゃ何度も後悔したわよ。あの時、行き倒れてた人を助けなきゃよかったって」"
translation = "「그야 몇 번이고 후회했지. 그때 쓰러져 있던 사람을 돕지 말았어야 했다고.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「そしたらあたしは普通の女の子だった。ファッションを気にして、ネイルもして、人目も気にせずオリーブオイルを好きなだけかけて」"
translation = "「그랬으면 난 평범한 여자애였을 거야. 패션에 신경 쓰고, 네일도 하고, 남의 눈치 안 보고 올리브오일을 마음껏 뿌려 먹고.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「コンビニ行く時も変装しなくていいし、甘いものだって食べたい時に食べれる」"
translation = "「편의점 갈 때도 변장 안 해도 되고, 단것도 먹고 싶을 때 먹을 수 있고.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「でもきっと。ううん、必ず──」"
translation = "「하지만 분명. 아니, 반드시──」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あの時に戻ったとしても、あたしは同じ選択をする」"
translation = "「그때로 돌아간다 해도, 나는 똑같은 선택을 할 거야.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「だって、助けなかったらもっと後悔するから」"
translation = "「그야, 돕지 않으면 더 후회할 테니까.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あたしが助けてきたのは、みんなそんな人たちだった」"
translation = "「내가 도와온 건, 다들 그런 사람들이었어.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「救いを求めていた。希望を探していた。奇跡を願っていた」"
translation = "「구원을 바라고 있었어. 희망을 찾고 있었어. 기적을 원하고 있었어.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「この世に聖女がいると信じている人がいる。あたしが聖女だと信じている人がいる。聖女が偽物でもそれは本当」"
translation = "「이 세상에 성녀가 있다고 믿는 사람이 있어. 내가 성녀라고 믿는 사람이 있어. 성녀가 가짜라도 그건 진짜야.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「言っとくけど……たとえ成り行きでも、自分でつき始めた嘘を取り消す気はないの」"
translation = "「말해두겠는데…… 설령 어쩌다 시작된 거라도, 스스로 한 거짓말을 취소할 생각은 없어.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あたしは性悪なエセ聖女なんだから」"
translation = "「나는 성격 나쁜 가짜 성녀니까.」"

[[dialogue]]
speaker_original = "老婦人"
speaker_translation = "노부인"
original = "「まさかこの目がまた見えるようになるなんて……これで孫の顔が見られます！\u3000本当に、本当にありがとうございました！」"
translation = "「설마 이 눈이 다시 보이게 될 줄이야…… 이걸로 손주 얼굴을 볼 수 있겠어요! 정말로, 정말로 감사합니다!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「感謝は女神様に祈りでお伝えください。ではお帰りお気を付けて」"
translation = "「감사는 여신님께 기도로 전해 주세요. 그럼 조심히 돌아가세요.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「……っ」"
translation = "「……윽.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「目を治すのはさすがに無茶したわね。星力使いすぎてキツいわ……」"
translation = "「눈을 고치는 건 역시 무리했나 봐. 성력을 너무 써서 힘드네……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ちょっとあんた、肩貸しなさい。こうなったら迷惑かけまくってやるわ」"
translation = "「저기 당신, 어깨 좀 빌려줘. 이렇게 된 거 민폐 잔뜩 끼쳐줄 테니까.」"

[[dialogue]]
speaker = "unk"
original = "イレーナはやっぱり聖女だよ"
translation = "이레나는 역시 성녀야"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「はぁ？\u3000あんた人の話聞いてないわね。このバカ」"
translation = "「하아? 당신 내 말 안 들었지. 이 바보.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「別に聖女になりたくてなったわけじゃない。でも今さらやめる気もない」"
translation = "「딱히 성녀가 되고 싶어서 된 게 아냐. 하지만 이제 와서 그만둘 생각도 없어.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「みんな聖女様聖女様って言って、あたしのことを全然知らないのは癪だけど……」"
translation = "「다들 성녀님 성녀님 하면서, 나에 대해선 전혀 모르는 게 배 아프긴 하지만……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ま、あんたが本当のあたしを知ってればいいわ」"
translation = "「뭐, 당신이 진짜 나를 알고 있으면 됐어.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「うぬぼれないでよ？\u3000あんたで妥協してあげるって言ってるの。いい？」"
translation = "「착각하지 마? 당신으로 타협해 주겠다고 하는 거니까. 알았어?」"

[[dialogue]]
speaker = "unk"
original = "わかってる"
translation = "알고 있어"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「妙にいい顔してるわね……」"
translation = "「묘하게 좋은 표정을 짓고 있네……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「なんかムカつくから、あたしのために美味しいピッツァを探してきなさい！\u3000ちゃんと本格的なやつじゃないと満足しないんだからね！」"
translation = "「왠지 짜증 나니까, 나를 위해서 맛있는 피자나 찾아와! 제대로 된 본격적인 게 아니면 만족 안 할 거니까!」"

