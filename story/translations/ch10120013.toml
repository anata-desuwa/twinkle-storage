[[dialogue]]
speaker = "unk"
original = "第3話,因縁の相手？,P"
translation = "제3화, 인연의 상대?"

[[dialogue]]
speaker = "キリカ"
original = "「当然、お屋敷に必要なものを購入するのもメイドの仕事です。余計なものを買わないように、買い忘れもないように気を付けてください」"
translation = "「당연히 저택에 필요한 물건을 구입하는 것도 메이드의 업무입니다. 불필요한 것을 사지 않도록, 빠뜨리는 물건도 없도록 주의해 주십시오」"

[[dialogue]]
speaker = "キリカ"
original = "「後で清算するのに必要ですので、お店で領収書をもらうのを忘れないでください。良いですね？」"
translation = "「나중에 정산하는 데 필요하니, 가게에서 영수증을 받는 것을 잊지 마십시오. 아시겠지요?」"

[[dialogue]]
speaker = "unk"
original = "わかりました、師匠！"
translation = "알겠습니다, 스승님!"

[[dialogue]]
speaker = "キリカ"
original = "「いつも返事に元気がありますね。良いことです」"
translation = "「항상 대답에 활기가 있군요. 좋은 일입니다」"

[[dialogue]]
speaker = "キリカ"
original = "「ですが本当は、今日はお休みを出されているのです」"
translation = "「하지만 사실은, 오늘은 휴가를 받았습니다」"

[[dialogue]]
speaker = "キリカ"
original = "「しかし仕事がないとやることがありません。休日は不要だとお嬢様にも申し上げたのですが……」"
translation = "「하나 일이 없으면 할 일이 없습니다. 휴일은 필요 없다고 아가씨께도 말씀드렸습니다만……」"

[[dialogue]]
speaker = "フィオナ"
original = "『メイド長がそんな姿勢だと他のメイドも休みを取りにくくなります。キリカの教育のおかげで、メイド長がいなくても屋敷は回せるから今日は休みなさい』"
translation = "『메이드장이 그런 자세면 다른 메이드들도 휴가를 내기 어려워져요. 키리카의 교육 덕분에 메이드장이 없어도 저택은 돌아가니까 오늘은 쉬세요』"

[[dialogue]]
speaker = "キリカ"
original = "「――と言われてしまいました。これが働き方改革……」"
translation = "「──라고 말씀하시더군요. 이것이 워라밸……」"

[[dialogue]]
speaker = "キリカ"
original = "「ですので、本日はお屋敷で使う品物を買い集めようと考えた次第です」"
translation = "「그러므로 오늘은 저택에서 사용할 물품을 사 모으려고 생각한 참입니다」"

[[dialogue]]
speaker = "unk"
original = "（それって結局働いているような……）"
translation = "(그건 결국 일하고 있는 거 아닌가……)"

[[dialogue]]
speaker = "キリカ"
original = "「食品はたくさん持てませんし、次はメイド服を修繕するための布を……」"
translation = "「식품은 많이 들 수 없으니, 다음은 메이드복을 수선하기 위한 천을……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「──あ」"
translation = "「──아」"

[[dialogue]]
speaker = "キリカ"
original = "「──」"
translation = "「──」"

[[dialogue]]
speaker = "unk"
original = "２人はお知り合いですか？"
translation = "두 분은 아는 사이인가요?"

[[dialogue]]
speaker = "キリカ"
original = "「知り合いというか……そうですね、いわゆる腐れ縁です」"
translation = "「아는 사이라기보다…… 그렇군요, 이른바 악연입니다」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ま、そういう言い方しかないわよね。仲良くした覚えはないんだし」"
translation = "「뭐, 그렇게 말할 수밖에 없겠지. 사이좋게 지낸 기억은 없으니까」"

[[dialogue]]
speaker = "ウィステリア"
original = "「あ、そんなにビビらなくても大丈夫。今すぐケンカになったりはしないから」"
translation = "「아, 그렇게 겁먹지 않아도 괜찮아. 지금 당장 싸움이 나거나 하진 않을 테니까」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ねぇ会長くん知ってる？\u3000って学園違うし知るわけないか。フィオナちゃんも私たちと入れ替わりだったし」"
translation = "「있지 회장군 알아? 아 학원이 다르니 알 리가 없나. 피오나짱도 우리랑 교대였고」"

[[dialogue]]
speaker = "ウィステリア"
original = "「キリカってば、学生時代はクールビューティーとか言われてすごい人気だったんだから。星徒会には入ってなかったけど、戦闘力はトップクラスだったしね」"
translation = "「키리카는 말이야, 학생 시절에는 쿨 뷰티라고 불리며 엄청 인기였다니까. 성도회에는 들어가지 않았지만, 전투력은 톱 클래스였고 말이야」"

[[dialogue]]
speaker = "キリカ"
original = "「それ以上話すとあなたの過去も知れますよ」"
translation = "「그 이상 이야기하면 당신의 과거도 알려질 텐데요」"

[[dialogue]]
speaker = "ウィステリア"
original = "「あっ、しまった！？」"
translation = "「앗, 아차!?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「……まったく、相変わらずね。今もメイドの仕事中？」"
translation = "「……정말이지, 여전하네. 지금도 메이드 업무 중?」"

[[dialogue]]
speaker = "キリカ"
original = "「あなたこそ、本当に新星学園の司書になったのですね。路頭に迷うようならまた雇って差し上げようかと思いましたが、良い再就職先があって安心しました」"
translation = "「당신이야말로 정말로 신성학원의 사서가 되었군요. 길거리에 나앉게 된다면 다시 고용해 드릴까 생각했습니다만, 좋은 재취업처가 있어서 안심했습니다」"

[[dialogue]]
speaker = "ウィステリア"
original = "「なんですって～？\u3000ていうかさっきの師匠って何？」"
translation = "「뭐라고~? 그보다 아까 스승님이라는 건 뭐야?」"

[[dialogue]]
speaker = "キリカ"
original = "「そう呼びたいと仰ったのです。師と呼ばれたからには、ふさわしいよう指導しているまでです」"
translation = "「그렇게 부르고 싶다고 말씀하셨습니다. 스승이라 불린 이상, 그에 걸맞게 지도하고 있을 뿐입니다」"

[[dialogue]]
speaker = "ウィステリア"
original = "「大丈夫？\u3000このメイド長、小姑みたいに細かいし、相当いびられてるんじゃない？」"
translation = "「괜찮아? 이 메이드장, 시누이처럼 깐깐하고 엄청 들볶이고 있는 거 아냐?」"

[[dialogue]]
speaker = "キリカ"
original = "「図書館を利用する際にご不便されていませんか？\u3000ウィステリアは仕事が大雑把なので」"
translation = "「도서관을 이용하실 때 불편함은 없으신가요? 위스테리아는 업무가 덤벙거려서」"

[[dialogue]]
speaker = "ウィステリア"
original = "「むむむむ……」"
translation = "「으으으으……」"

[[dialogue]]
speaker = "キリカ"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "キリカ"
original = "「またモンスターですか。良い機会です。実戦で指導いたしましょう」"
translation = "「또 몬스터입니까. 좋은 기회군요. 실전에서 지도해 드리겠습니다」"

[[dialogue]]
speaker = "ウィステリア"
original = "「あ、クモ──っぽいモンスター」"
translation = "「아, 거미── 같은 몬스터」"

[[dialogue]]
speaker = "キリカ"
original = "「……訓練は中止です。速やかに撃滅します」"
translation = "「……훈련은 중지입니다. 신속하게 격멸하겠습니다」"

[[dialogue]]
speaker = "キリカ"
original = "「殲滅完了。お疲れ様でした」"
translation = "「섬멸 완료. 수고하셨습니다」"

[[dialogue]]
speaker = "ウィステリア"
original = "「とか言って、ほとんどあなたが倒したじゃない。私たちが手を出す暇なかったわよ」"
translation = "「말은 그렇게 해도 거의 네가 다 쓰러뜨렸잖아. 우리가 손댈 틈도 없었다고」"

[[dialogue]]
speaker = "ウィステリア"
original = "「（よく見たらそんなにクモに似てなかったけど、キリカはちょっとでもクモっぽいと見境なくなるのよね……）」"
translation = "「(잘 보니까 그렇게 거미랑 닮지도 않았는데, 키리카는 조금이라도 거미 같으면 물불 안 가리게 된다니까……)」"

[[dialogue]]
speaker = "unk"
original = "（キリカさんってクモが苦手なのか……）"
translation = "(키리카 씨는 거미를 무서워하는 건가……)"

[[dialogue]]
speaker = "キリカ"
original = "「なんですか、その顔は。私に苦手なものなどありません。星見家に仕える精鋭メイドたる私に弱点などあるはずがありません」"
translation = "「무슨 얼굴인가요, 그건. 제게 서툰 것 따위 없습니다. 호시미 가문을 섬기는 정예 메이드인 제게 약점 따위 있을 리가 없습니다」"

[[dialogue]]
speaker = "キリカ"
original = "「……まだ納得されていない表情ですね。良いでしょう、後で稽古をつけて差し上げます」"
translation = "「……아직 납득하지 못한 표정이시군요. 좋습니다, 나중에 대련을 해 드리겠습니다」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ふふっ、ヤブヘビヤブヘビ。頑張ってね」"
translation = "「후훗, 긁어 부스럼이네. 힘내」"

[[dialogue]]
speaker = "キリカ"
original = "「ウィステリア。１人暮らしだからといって、生活が乱れていませんか？」"
translation = "「위스테리아. 혼자 산다고 해서 생활이 흐트러져 있지는 않나요?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「はいはい、学生の頃バイトでさんざん注意されたから心配しなくても大丈夫。あなたこそワーカーホリック気味なのなんとかしなさい」"
translation = "「네네, 학생 때 알바하면서 지겹도록 주의 받았으니까 걱정 안 해도 괜찮아. 너야말로 워커홀릭 기미 보이는 거 어떻게 좀 해봐」"

[[dialogue]]
speaker = "ウィステリア"
original = "「私はこれで──あ、そうそう。ちょっとだけ教えてあげる」"
translation = "「난 이만── 아, 맞다. 조금만 가르쳐 줄게」"

[[dialogue]]
speaker = "ウィステリア"
original = "「キリカってね、ショートケーキのイチゴは必ず最後に食べるの。好きなものはとっておくタイプなんだけど、カワイイところもあるわよね」"
translation = "「키리카는 말이야, 쇼트케이크의 딸기는 반드시 마지막에 먹어. 좋아하는 건 아껴두는 타입인데, 귀여운 구석도 있지?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「じゃ、また図書館でね～」"
translation = "「그럼, 나중에 도서관에서 봐~」"

[[dialogue]]
speaker = "unk"
original = "今の本当ですか？"
translation = "방금 거 진짜인가요?"

[[dialogue]]
speaker = "キリカ"
original = "「それはイチゴが特別好きなわけではなく、イチゴの酸味で口をすっきりさせたいからであって……」"
translation = "「그건 딸기를 특별히 좋아해서가 아니라, 딸기의 산미로 입안을 깔끔하게 하고 싶어서이지……」"

[[dialogue]]
speaker = "キリカ"
original = "「私の作ったケーキを美味しいと言って食べていたのに……まったく……」"
translation = "「제가 만든 케이크를 맛있다고 하며 먹었으면서…… 정말이지……」"

[[dialogue]]
speaker = "キリカ"
original = "「いえ、何でもありません。どうやら今日は特別厳しく指導されたいようですので……覚悟してください」"
translation = "「아니요, 아무것도 아닙니다. 아무래도 오늘은 특별히 엄하게 지도받고 싶으신 모양이니…… 각오하십시오」"

