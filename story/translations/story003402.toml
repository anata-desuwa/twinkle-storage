[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「どうやらきみとぼくは、同じ状況に置かれているようだね」"
translation = "「아무래도 너와 나는 같은 상황에 놓인 모양이구나」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「えっ？\u3000あ……あなたも、ですか……？」"
translation = "「엣? 아…… 당신도, 인가요……?」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「おそらくね。作品のイメージを巡らせていたら、突然目の前が真っ暗になったんだ。気が付いたらこの状況だったよ」"
translation = "「아마도 그렇겠지. 작품의 이미지를 구상하고 있었더니 갑자기 눈앞이 캄캄해졌어. 정신을 차려보니 이 상황이었지」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「何が起きたのかについては、そこにいる人たちに聞いてみようか。どうやらぼくたちよりも事情に通じているようだしね」"
translation = "「무슨 일이 일어난 건지에 대해서는 저기 있는 사람들에게 물어볼까. 아무래도 우리보다 사정에 정통한 것 같으니까 말이야」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「か、会長さん。この人たちって……」"
translation = "「회, 회장님. 이 사람들은……」"

[[dialogue]]
speaker = "unk"
original = "また新しく異世界から来た人たちみたいだ"
translation = "또 새로 이세계에서 온 사람들 같아"

[[dialogue]]
speaker = "unk"
original = "ああ……"
translation = "아아……"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「よかったくま！\u3000２人ともちゃんと召喚出来てるくま！」"
translation = "「다행이다곰! 둘 다 제대로 소환됐다곰!」"

[[dialogue]]
speaker = "unk"
original = "２人に声をかけようとした瞬間、またしても空中にあの黒い穴が出現し、そこから黒ベア子が姿を現す。"
translation = "두 사람에게 말을 걸려던 순간, 또다시 공중에 그 검은 구멍이 출현하고 그곳에서 흑베아코가 모습을 드러낸다."

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「こっちの世界はお久しぶりくま♪\u3000元気してたくまか？」"
translation = "「이쪽 세계는 오랜만이다곰♪ 잘 지냈냐곰?」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「って、呑気に話してる時間はないんだったくま！\u3000わたしは今、とっても忙しいくま！」"
translation = "「아니, 한가하게 이야기할 시간은 없다곰! 나는 지금 무지 바쁘다곰!」"

[[dialogue]]
speaker = "unk"
original = "父親捜しは終わったのか？"
translation = "아버지 찾기는 끝난 거야?"

[[dialogue]]
speaker = "unk"
original = "フィオナはどうしたんだ？"
translation = "피오나는 어떻게 됐어?"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「パパ捜しは全然終わってないくま、ただいま捜索中くま！\u3000一緒に付いてきたフィオナも、絶賛協力してもらってる最中くま！」"
translation = "「아빠 찾기는 전혀 안 끝났다곰, 지금 수색 중이다곰! 같이 따라온 피오나도 절찬리에 협력받는 중이다곰!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「そうですかぁ……。それじゃあもうしばらくは、帰ってこれないということなのですね」"
translation = "「그렇군요……. 그럼 당분간은 돌아올 수 없다는 거네요」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「そういうことくま！\u3000そんでもって、この子のことも頼んだくま♪」"
translation = "「그렇게 됐다곰! 그런 고로 이 아이도 부탁한다곰♪」"

[[dialogue]]
speaker = "unk"
original = "頼むってどういうこと？"
translation = "부탁한다니 무슨 소리야?"

[[dialogue]]
speaker = "unk"
original = "赤ちゃんクマロボ！？"
translation = "아기 곰 로봇!?"

[[dialogue]]
speaker_original = "赤ちゃんクマロボ"
speaker_translation = "아기 곰 로봇"
original = "「ばぶー<emoji=heart04>」"
translation = "「바부ー<emoji=heart04>」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「しばらくこの子のことを預かっていて欲しいくま。ちょっとの間だけくま♪」"
translation = "「당분간 이 아이를 맡아줬으면 좋겠다곰. 아주 잠깐 동안만이다곰♪」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「でも、いきなりそんなこと言われてもきっと困るくま。だからちゃんと応援を呼んでおいたくま♪」"
translation = "「하지만 갑자기 그런 말을 들으면 분명 곤란할 거다곰. 그래서 제대로 응원을 불러뒀다곰♪」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「その応援っていうのが、ぼくたちの事かな？」"
translation = "「그 응원이라는 게 우리를 말하는 걸까?」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「察しが良くて助かるくま♪\u3000みんなで協力して、赤ちゃんクマロボの面倒を見るくま！」"
translation = "「눈치가 빨라서 다행이다곰♪ 다 같이 협력해서 아기 곰 로봇을 돌보는 거다곰!」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「こ、困りますよ～！\u3000あっ……！」"
translation = "「고, 곤란해요~! 앗……!」"

[[dialogue]]
speaker = "unk"
original = "こちらの反論に耳を傾ける様子もなく、赤ちゃんクマロボを女の子の１人に押し付けて、黒ベア子は黒い穴の中に消え去ってしまった。"
translation = "이쪽의 반론에 귀를 기울일 기색도 없이 아기 곰 로봇을 여자아이 중 한 명에게 떠넘기고 흑베아코는 검은 구멍 속으로 사라져 버렸다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「赤ちゃんクマロボさんの面倒を強引に押し付けられちゃった気がするんですけど……どうしましょう、会長さん！？」"
translation = "「아기 곰 로봇 씨를 돌보는 일을 강제로 떠맡겨진 기분이 듭니다만…… 어쩌죠, 회장님!?」"

[[dialogue]]
speaker = "unk"
original = "ルリエル……その格好は？"
translation = "루리엘…… 그 차림은?"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「って……ふぇええっ！？\u3000なんかルリエル、いつの間にか変身しちゃってます！！？」"
translation = "「어라…… 후에에엣!? 왠지 루리엘, 어느샌가 변신해 버렸어요!!?」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「ボクと、そっくりな格好……」"
translation = "「나랑 똑 닮은 차림……」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「あれ？\u3000でも、ボクもいつもの格好と少し違うような？」"
translation = "「어라? 하지만 나도 평소 차림이랑 조금 다른 것 같은데?」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「ぼくの服も元々着ていたものから変化しているようだね。ふむ、この格好もなかなかいいじゃないか！\u3000気に入ったよ♪」"
translation = "「내 옷도 원래 입고 있던 것에서 변화한 모양이네. 흠, 이 차림도 꽤 괜찮지 않아? 맘에 들었어♪」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「ともあれ、これらの現象は先ほどの子が引き起こした、ということでいいのかい？\u3000よかったら詳しい話を聞かせてくれないかな？」"
translation = "「어쨌든 이 현상들은 아까 그 아이가 일으킨 것이라고 보면 될까? 괜찮다면 자세한 이야기를 들려주지 않겠니?」"

[[dialogue]]
speaker = "unk"
original = "俺は新しくやってきた２人に、黒ベア子のこと、彼女が俺たちに預けて行った赤ちゃんクマロボのことを説明した。"
translation = "나는 새로 찾아온 두 사람에게 흑베아코에 대한 것, 그녀가 우리에게 맡기고 간 아기 곰 로봇에 대해 설명했다."

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「──なるほど、つまりはきみたちも厄介事を押し付けられた側で、事態の詳細は把握できてはいないということだね」"
translation = "「──과연, 즉 너희도 귀찮은 일을 떠맡은 쪽이고 사태의 상세한 내용은 파악하지 못하고 있다는 거구나」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「とにかく黒ベア子が戻ってくるまで、赤ちゃんクマロボの面倒をぼくたちで見なければならない、といったところだろうか」"
translation = "「어쨌든 흑베아코가 돌아올 때까지 아기 곰 로봇을 우리가 돌봐야 한다는 거겠지」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「そ、そんな……どうしてボクたちなんですか？」"
translation = "「그, 그럴 수가…… 어째서 저희인가요?」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「それはぼくにもわからないな。別段、赤ちゃんのお世話に長けているというわけでもないんだけどね」"
translation = "「그건 나도 모르겠네. 딱히 아기를 돌보는 데 능숙한 것도 아닌데 말이야」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「ボクもです……」"
translation = "「저도요……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「まあまあ、こうなっちゃった以上は仕方ありません！\u3000みんなで力を合わせて頑張りましょう～！」"
translation = "「자자, 이렇게 된 이상 어쩔 수 없죠! 다 같이 힘을 합쳐서 열심히 해봐요~!」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「えっと……それはそれとして、みなさんどちら様なんでしょう……？」"
translation = "「저기…… 그건 그렇고, 여러분은 누구신가요……?」"

[[dialogue]]
speaker = "unk"
original = "ここ新星学園の星徒会長だ"
translation = "여기 신성학원의 성도회장이다"

[[dialogue]]
speaker = "unk"
original = "俺は緋宮クロト"
translation = "나는 히노미야 쿠로토"

[[dialogue]]
speaker = "unk"
original = "俺は簡単な自己紹介と共に、ここが新しく来た２人にとって異世界である可能性が高いこと、そして過去に似たような事件が起きたことがあるのをかいつまんで説明した。"
translation = "나는 간단한 자기소개와 함께 이곳이 새로 온 두 사람에게 이세계일 가능성이 높다는 것, 그리고 과거에 비슷한 사건이 일어난 적이 있음을 요약해서 설명했다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「そしてわたしがルリエルなのです！\u3000お隣流星学園の星徒会会計なのです♪」"
translation = "「그리고 제가 루리엘이에요! 이웃 유성학원의 성도회 회계랍니다♪」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「ぼくは『芸術都市アテネス』からやってきた天才藝術家、ラファエロ。よろしくね」"
translation = "「나는 『예술 도시 아테네스』에서 온 천재 예술가, 라파엘로. 잘 부탁해」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「え、えっと……スプリングガーデンから来ました、ステラです……」"
translation = "「에, 저기…… 스프링 가든에서 왔습니다, 스텔라예요……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「そうです！\u3000お２人はしばらく流星市国にいることになるんですよね？\u3000ルリエルが住むところを用意しましょうか？」"
translation = "「맞아요! 두 분은 당분간 유성시국에 머물게 되는 거죠? 루리엘이 지낼 곳을 마련해 드릴까요?」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「異世界に飛ばされて最初にすることが住居の手配なんですか……！？\u3000いえ、助かりますけれども！！」"
translation = "「이세계로 날려 와서 가장 먼저 하는 게 주거지 수배인가요……!? 아니, 도움은 됩니다만!!」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「ふむ。以前にも似たようなことがあったと言うだけあって、なかなか手慣れているね」"
translation = "「흠. 이전에도 비슷한 일이 있었다고 하더니 과연 꽤나 능숙하구나」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ヒルディオーネ先輩に事情を説明して、流星寮の部屋が空いていないか聞いてみます！\u3000いいですよね、会長さん？」"
translation = "「힐디오네 선배님께 사정을 설명하고 유성 기숙사에 빈방이 없는지 물어볼게요! 괜찮죠, 회장님?」"

[[dialogue]]
speaker = "unk"
original = "よろしく頼むよ"
translation = "잘 부탁해"

[[dialogue]]
speaker = "unk"
original = "あ、ああ"
translation = "아, 아아"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「赤ちゃんクマロボさん、あなたのお世話はルリエルたちがちゃーんとしてあげますからね～♪」"
translation = "「아기 곰 로봇 씨, 당신의 뒷바라지는 루리엘 일행이 대~대로 해줄 테니까요~♪」"

[[dialogue]]
speaker_original = "赤ちゃんクマロボ"
speaker_translation = "아기 곰 로봇"
original = "「ばぶー<emoji=heart04>」"
translation = "「바부ー<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「やれやれ、大変なことに巻き込まれてしまったようだね。だけどこの天才ラファエロなら、異世界だろうとなんとかしてみせるよ」"
translation = "「이런 이런, 대단한 일에 휘말려 버린 모양이네. 하지만 이 천재 라파엘로라면 이세계라 할지라도 어떻게든 해내 보이겠어」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「うぅぅ～、赤ちゃんのお世話ですか……。何が何だかわかりませんが、安全な宿を貸してもらえる以上、協力はさせてもらいます……」"
translation = "「으으~, 아기 돌보기인가요……. 뭐가 뭔지 모르겠지만 안전한 숙소를 빌려주시는 이상 협력은 하겠습니다……」"

[[dialogue]]
speaker = "unk"
original = "こうして俺たちは、赤ちゃんクマロボの世話をしながら、黒ベア子からの続報を待つことになったのだった。"
translation = "이렇게 해서 우리들은 아기 곰 로봇을 돌보며 흑베아코의 속보를 기다리게 되었다."

