[[dialogue]]
speaker = "unk"
original = "――これは、『オムニス』ではなく『<ruby>量<rt>はかり</rt></ruby>とびお』が流星市国へやって来た結果、悪魔に寄生された<ruby>陽彩<rt>あきさ</rt></ruby>に勝つことができなかった『可能性』の世界。"
translation = "――이것은, 『옴니스』가 아니라 『하카리 토비오』가 유성 시국으로 온 결과, 악마에게 기생당한 아키사에게 이길 수 없었던 『가능성』의 세계."

[[dialogue]]
speaker = "unk"
original = "俺――<ruby>量<rt>はかり</rt></ruby>とびおは、気づけば元の世界へと戻って来ていた。"
translation = "나――하카리 토비오는 정신을 차려보니 원래 세계로 돌아와 있었다."

[[dialogue]]
speaker = "unk"
original = "だが、陽彩に敗北した後の記憶が定かではなく、先程まで一緒にいたはずのいろはの姿もない。"
translation = "하지만 히요리에게 패배한 후의 기억이 확실치 않고, 방금까지 함께 있었을 이로하의 모습도 없다."

[[dialogue]]
speaker = "unk"
original = "そうして、『<b>恋人である</b>』いろはの安否を確かめる為に彼女の姿を探していると……突然後ろから誰かに抱き着かれた。"
translation = "그렇게, 『<b>연인인</b>』 이로하의 안부를 확인하기 위해 그녀의 모습을 찾고 있자…… 갑자기 뒤에서 누군가 껴안아 왔다."

[[dialogue]]
speaker = "いろは"
original = "「とびお、見～つけた<emoji=heart04>」"
translation = "「토비오, 찾~았다<emoji=heart04>」"

[[dialogue]]
speaker = "とびお"
original = "「いろは、無事だったのか！\u3000って……うわっ！？」"
translation = "「이로하, 무사했구나! 아니…… 우와악!?」"

[[dialogue]]
speaker = "いろは"
original = "「あはっ<emoji=heart04>\u3000おち○ぽ、ご開帳～♪\u3000はぁあ<emoji=heart04>\u3000はぁ<emoji=heart04>\u3000あぁぁ<emoji=heart04>」"
translation = "「아핫<emoji=heart04> 자지, 개장~♪ 하아아<emoji=heart04> 하아<emoji=heart04> 아아아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "いろはにいきなり路上で押し倒されたかと思うと、強引にペニスを露出させられてしまう。"
translation = "이로하에게 갑자기 길거리에서 밀쳐졌는가 싶더니, 강제로 페니스를 노출당하고 만다."

[[dialogue]]
speaker = "とびお"
original = "「お、おいっ！？\u3000こんなところで何してるんだ！？」"
translation = "「어, 어이!? 이런 곳에서 뭐 하는 거야!?」"

[[dialogue]]
speaker = "いろは"
original = "「あはぁあっ<emoji=heart04>\u3000よく分からないけど～<emoji=heart04>\u3000はぁあ<emoji=heart04>\u3000あたし、今すっごく、とびおとエッチしたい気分なんだぁ～<emoji=heart04>」"
translation = "「아하아앗<emoji=heart04> 잘 모르겠지만~<emoji=heart04> 하아아<emoji=heart04> 나, 지금 너무 토비오랑 에치하고 싶은 기분이야~<emoji=heart04>」"

[[dialogue]]
speaker = "とびお"
original = "「なっ！？\u3000しょ、正気になれ、いろは！\u3000こんな人が沢山いるところで……！」"
translation = "「뭐!? 제, 제정신 차려, 이로하! 이런 사람이 많은 곳에서……!」"

[[dialogue]]
speaker = "unk"
original = "俺たちがいるのは、多くの人が行き交う街中の路上。"
translation = "우리가 있는 곳은 많은 사람이 오가는 시내 길거리."

[[dialogue]]
speaker = "unk"
original = "そんなところで突然、男女が局部を晒し合っていれば、否応なく周りの視線が集まるわけで。"
translation = "그런 곳에서 갑자기 남녀가 국부를 서로 드러내고 있으면 아무래도 주변의 시선이 모이기 마련이다."

[[dialogue]]
speaker = "いろは"
original = "「でもぉ……<emoji=heart04>\u3000あぁぁ<emoji=heart04>\u3000エッチなことしたいって思ったら、はぁあ<emoji=heart04>\u3000我慢なんてできないじゃん？\u3000それに――」"
translation = "「하지만……<emoji=heart04> 아아아<emoji=heart04> 에치한 짓 하고 싶다고 생각하면, 하아아<emoji=heart04> 참을 수 없잖아? 게다가――」"

[[dialogue]]
speaker = "unk"
original = "通りすがる人たちがざわめく中、いろはは見せつけるように自分の胸を揉み、楽しそうに笑う。"
translation = "지나가는 사람들이 웅성거리는 가운데, 이로하는 보란 듯이 자신의 가슴을 주무르며 즐거운 듯이 웃는다."

[[dialogue]]
speaker = "いろは"
original = "「あぁあんぅ<emoji=heart04>\u3000こんなにたくさん人がいる中で、ラブラブエッチしたらぁ<emoji=heart04>\u3000あぁあっ<emoji=heart04>\u3000すっごく気持ち良さそう<emoji=heart04>」"
translation = "「아아앙으<emoji=heart04> 이렇게 많은 사람 속에서 러브러브 에치하면<emoji=heart04> 아아앗<emoji=heart04> 정말 기분 좋을 것 같아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そんなことを言い放ついろはの瞳の奥が怪しく光ったかと思うと、体がかなしばりにあったように自由に動けなくなる。"
translation = "그런 말을 내뱉는 이로하의 눈동자 깊은 곳이 수상하게 빛났는가 싶더니, 몸이 가위눌린 것처럼 자유롭게 움직이지 않게 된다."

[[dialogue]]
speaker = "とびお"
original = "（いろはの様子が何かおかしい……！\u3000まさか、陽彩に負けたせいで何か影響が！？）"
translation = "(이로하의 상태가 뭔가 이상해……! 설마 히요리에게 진 탓에 뭔가 영향이!?)"

[[dialogue]]
speaker = "いろは"
original = "「はあぁあっ<emoji=heart04>\u3000もう我慢できないから、おち○ぽ準備しちゃうね<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んふうぅっ……<emoji=heart04>\u3000あはぁあっ<emoji=heart04>」"
translation = "「하아아앗<emoji=heart04> 이제 못 참겠으니까 자지 준비할게<emoji=heart04> 앗<emoji=heart04> 응후우읏……<emoji=heart04> 아하아앗<emoji=heart04>」"

[[dialogue]]
speaker = "とびお"
original = "「やめてくれ、いろは！\u3000正気じゃないのはわかってる、だけどせめて家まで我慢を……っ」"
translation = "「그만둬, 이로하! 제정신이 아니라는 건 알아, 하지만 적어도 집까지 참아줘……!」"

[[dialogue]]
speaker = "いろは"
original = "「え～？\u3000こんなに勃起してるのに？\u3000あはぁあんっ<emoji=heart04>\u3000見て見てぇ<emoji=heart04>\u3000元気で立派な巨根おち○ぽ<emoji=heart04>」"
translation = "「에이? 이렇게 발기해 있는데? 아하아앙<emoji=heart04> 봐봐<emoji=heart04> 기운차고 훌륭한 거근 자지<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "羞恥心に反して、体の奥から興奮が湧き上がってきて、ペニスをガチガチに固くしてしまう。"
translation = "수치심과는 반대로 몸속에서 흥분이 솟구쳐 올라, 페니스를 빳빳하게 굳혀버린다."

[[dialogue]]
speaker = "unk"
original = "そこにいろはが、すでにドロドロに濡れた秘部を擦り付け始める。"
translation = "거기에 이로하가 이미 질척하게 젖은 비부를 문지르기 시작한다."

[[dialogue]]
speaker = "いろは"
original = "「あっ<emoji=heart04>\u3000んふうぅっ<emoji=heart04>\u3000あはぁあっ<emoji=heart04>\u3000固くて熱いのが擦れて、おま○こ汁、どんどんあふれちゃう<emoji=heart04>\u3000ふあぁっ……あっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 응후우읏<emoji=heart04> 아하아앗<emoji=heart04> 딱딱하고 뜨거운 게 스쳐서 보지물, 계속 넘쳐흘러버려<emoji=heart04> 후아앗…… 앗<emoji=heart04> 하앙<emoji=heart04>」"

[[dialogue]]
speaker = "いろは"
original = "「んふぅっ<emoji=heart04>\u3000ほらぁ<emoji=heart04>\u3000おち○ぽもエッチしたいって、お汁がトロトロ～って垂れてきてるよぉ<emoji=heart04>\u3000はふぅぅ<emoji=heart04>」"
translation = "「응후읏<emoji=heart04> 봐봐<emoji=heart04> 자지도 에치하고 싶다고 즙이 걸쭉~하게 떨어지고 있어<emoji=heart04> 하후우우<emoji=heart04>」"

[[dialogue]]
speaker = "いろは"
original = "「あたしも早く欲しくて、あぁあぁああっ<emoji=heart04>\u3000おま○こキュンキュンしちゃってるからぁ<emoji=heart04>\u3000――挿れちゃうね？」"
translation = "「나도 빨리 갖고 싶어서, 아아아아앗<emoji=heart04> 보지 큥큥하고 있으니까<emoji=heart04> ――넣어버릴게?」"

[[dialogue]]
speaker = "いろは"
original = "「あんっ<emoji=heart04>\u3000おち○ぽの先、おま○ことキスしちゃってるぅ<emoji=heart04>\u3000ちゅ、ちゅって<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000はあぁあっ<emoji=heart04>\u3000んんんっ<emoji=heart04>」"
translation = "「앙<emoji=heart04> 자지 끝이 보지랑 키스하고 있어<emoji=heart04> 츄, 츄우 하고<emoji=heart04> 응응<emoji=heart04> 하아아앗<emoji=heart04> 응응응<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "いろはは俺の制止の声には耳を貸さず、好き放題おま○こでペニスを愛撫すると、やがて腰を下ろして――"
translation = "이로하는 내 제지 목소리에는 귀를 기울이지 않고 마음껏 보지로 페니스를 애무하더니, 이윽고 허리를 내리고――"

[[dialogue]]
speaker = "いろは"
original = "「あっ――<emoji=heart04><emoji=heart04>」"
translation = "「앗――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "いろは"
original = "「んあああぁぁ～～っ<emoji=heart04><emoji=heart04>\u3000おち○ぽ、中に入ったぁ～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「응아아아아~~앗<emoji=heart04><emoji=heart04> 자지, 안에 들어왔어~~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "いろは"
original = "「あはぁあぁっ<emoji=heart04>\u3000みんなに見られながら、おま○こ満たされてるぅ～～<emoji=heart04>\u3000あぁあぁ、脳みそ幸せぇ<emoji=heart04>\u3000しゅわしゅわ～ってくるぅぅ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「아하아아앗<emoji=heart04> 다들 보는 와중에 보지 채워지고 있어~~<emoji=heart04> 아아아아, 뇌세포 행복해<emoji=heart04> 슈와슈와~ 하고 와아아<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "いろはは歓喜の声を大きくあげながら、大胆に腰を上下へ振りたくる。"
translation = "이로하는 환희의 함성을 크게 지르며 대담하게 허리를 위아래로 흔들어댄다."

[[dialogue]]
speaker = "いろは"
original = "「あぁあ～っ<emoji=heart04>\u3000んっ……ふうぅっ、あはぁあっ<emoji=heart04>\u3000おま○こ気持ちいいっ<emoji=heart04>\u3000これぇっ<emoji=heart04>\u3000これが早く欲しかったのぉ<emoji=heart04>\u3000あぁあっ、あんっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000はあぁんっ<emoji=heart04>」"
translation = "「아아아~앗<emoji=heart04> 응…… 후우읏, 아하아앗<emoji=heart04> 보지 기분 좋아<emoji=heart04> 이거<emoji=heart04> 이게 빨리 갖고 싶었어<emoji=heart04> 아아앗, 앙<emoji=heart04> 응우읏<emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "いろは"
original = "「あぁあっ<emoji=heart04>\u3000ふぅっ、はあぁっ<emoji=heart04>\u3000キくぅ<emoji=heart04>\u3000おち○ぽカリでおま○こズリズリ、気持ちいい～っ<emoji=heart04>\u3000あっ、はぁんっ<emoji=heart04>\u3000んんぅっ、んああぁんっ<emoji=heart04>」"
translation = "「아아앗<emoji=heart04> 후우, 하아앗<emoji=heart04> 찌릿해<emoji=heart04> 자지 귀두로 보지 즈리즈리, 기분 좋아~앗<emoji=heart04> 앗, 하앙<emoji=heart04> 응응읏, 응아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "遠慮なく喘ぎ声を上げ、あられもなく腰を振るいろは。"
translation = "사양 말고 신음 소리를 내며 정신없이 허리를 흔드는 이로하."

[[dialogue]]
speaker = "unk"
original = "そんな彼女を前に、通りかかった男たちが足を止めてざわつく。"
translation = "그런 그녀를 앞에 두고 지나가던 남자들이 발길을 멈추고 웅성거린다."

[[dialogue]]
speaker = "男性Ａ"
original = "「うわっ、マジかよ……！」"
translation = "「우와, 진짜냐……!」"

[[dialogue]]
speaker = "男性Ｂ"
original = "「こんなところでヤリ始めるとか、ヤバ過ぎ。本物の痴女じゃん」"
translation = "「이런 곳에서 하기 시작하다니 장난 아니네. 진짜 치녀잖아」"

[[dialogue]]
speaker = "男性Ｃ"
original = "「顔と喘ぎ声、えっろ……」"
translation = "「얼굴이랑 신음 소리, 에로해……」"

[[dialogue]]
speaker = "いろは"
original = "「ああぁあぁ～っ<emoji=heart04>\u3000ラブラブエッチしてるところ、みんなに見られちゃってる～～っ<emoji=heart04>」"
translation = "「아아아아아~앗<emoji=heart04> 러브러브 에치 하는 거 다들 봐버리고 있어~~앗<emoji=heart04>」"

[[dialogue]]
speaker = "いろは"
original = "「あぁぁ、はあぁっ<emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000おっぱい揉みながら、おち○ぽジュプジュプ食べちゃってるところぉ<emoji=heart04>\u3000たくさん見てぇ<emoji=heart04><emoji=heart04>\u3000あはぁあん<emoji=heart04>」"
translation = "「아아아, 하아앗<emoji=heart04> 응응읏<emoji=heart04> 가슴 주무르면서 자지 쥬퓨쥬퓨 먹어버리고 있는 거<emoji=heart04> 잔뜩 봐줘<emoji=heart04><emoji=heart04> 아하아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そんな宣言をしながら、いろははさっきよりもさらに大胆に胸を揉み、股を大きく開いていく。"
translation = "그런 선언을 하며 이로하는 아까보다 더 대담하게 가슴을 주무르고 가랑이를 크게 벌려 나간다."

[[dialogue]]
speaker = "いろは"
original = "「あはぁあぁっ<emoji=heart04>\u3000おっぱいとおま○こに、視線集まってるぅ<emoji=heart04>\u3000んっ、んうぅっ……あはぁあっ<emoji=heart04>\u3000背筋ゾクゾクして、頭しあわせになっちゃうのぉ～<emoji=heart04>」"
translation = "「아하아아앗<emoji=heart04> 가슴이랑 보지에 시선 모이고 있어<emoji=heart04> 응, 응우읏…… 아하아앗<emoji=heart04> 등줄기 조쿠조쿠해서 머리 행복해져버려~<emoji=heart04>」"

[[dialogue]]
speaker = "いろは"
original = "「あっ、あんっ<emoji=heart04>\u3000んふぅんっ<emoji=heart04>\u3000乳首敏感っ<emoji=heart04>\u3000おっぱい揉むの止められないよぉ<emoji=heart04>\u3000おっぱい気持ちいいっ<emoji=heart04>\u3000おっぱい大好きぃ<emoji=heart04>\u3000はあぁぁ<emoji=heart04>」"
translation = "「앗, 앙<emoji=heart04> 응후응<emoji=heart04> 유두 민감해<emoji=heart04> 가슴 주무르는 거 못 멈추겠어<emoji=heart04> 가슴 기분 좋아<emoji=heart04> 가슴 너무 좋아<emoji=heart04> 하아아아<emoji=heart04>」"

[[dialogue]]
speaker = "いろは"
original = "「おま○こもどんどん敏感になってぇ、あぁあっ<emoji=heart04>\u3000もっと気持ち良くなっちゃうっ<emoji=heart04>\u3000気持ちいいからぁ、おま○こ大好きぃ<emoji=heart04>\u3000はぁんっ、んあぁっ……ふああぁんっ<emoji=heart04>」"
translation = "「보지도 점점 민감해져서, 아아앗<emoji=heart04> 더 기분 좋아져버려<emoji=heart04> 기분 좋으니까 보지 너무 좋아<emoji=heart04> 하앙, 응아앗…… 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "いろは"
original = "「あんっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000おち○ぽも大好きだよぉ<emoji=heart04>\u3000気持ちよくしてくれるからぁ、おち○ぽ大好きぃ<emoji=heart04>\u3000ふああぁっ、見られながらのセックスも大好きぃ<emoji=heart04><emoji=heart04>」"
translation = "「앙<emoji=heart04> 아앙<emoji=heart04> 자지도 너무 좋아해<emoji=heart04> 기분 좋게 해주니까 자지 너무 좋아<emoji=heart04> 후아아앗, 보여지면서 하는 섹스도 너무 좋아<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "男性Ａ"
original = "「うわ～、この女ヤバッ。てか何？\u3000ＡＶの撮影？」"
translation = "「우와~ 이 여자 대박. 근데 뭐야? AV 촬영?」"

[[dialogue]]
speaker = "unk"
original = "周りの男たちが面白そうに笑いながら、こちらにスマホを向けて、カメラのシャッター音を響かせる。"
translation = "주변 남자들이 흥미로운 듯 웃으며 이쪽으로 스마트폰을 향해 카메라 셔터 소리를 울린다."

[[dialogue]]
speaker = "男性Ｂ"
original = "「自分から見せつけるようにしちゃってるし」"
translation = "「자기가 직접 보여주는 식이고」"

[[dialogue]]
speaker = "男性Ｃ"
original = "「赤の他人に見られて興奮してるとか、マジで変態過ぎだろ～」"
translation = "「쌩판 남한테 보여지면서 흥분한다니 진짜 변태네~」"

[[dialogue]]
speaker = "いろは"
original = "「あぁあんっ<emoji=heart04>\u3000カメラでいっぱい撮られちゃってるぅ<emoji=heart04>\u3000あぁぁ<emoji=heart04>\u3000あたしたちがセックスしてるところぉ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んぅっ、はあぁあっ<emoji=heart04>\u3000ふあぁんっ<emoji=heart04>」"
translation = "「아아아앙<emoji=heart04> 카메라로 잔뜩 찍히고 있어<emoji=heart04> 아아아<emoji=heart04> 우리가 섹스하는 거<emoji=heart04> 앙<emoji=heart04> 응읏, 하아아앗<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "いろは"
original = "「写真だけじゃなくて、あはぁあ<emoji=heart04>\u3000動画もネットで広まっちゃうかもぉ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04>」"
translation = "「사진뿐만 아니라 아하아아<emoji=heart04> 동영상도 인터넷에 퍼져버릴지도<emoji=heart04> 하아앗<emoji=heart04> 응우읏<emoji=heart04> 응아앗<emoji=heart04> 하아아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "いろは"
original = "「ふああぁ～っ<emoji=heart04>\u3000想像したらすっごく、おま○こジュクジュクしてきたぁぁ<emoji=heart04>\u3000あぁぁ、頭しあわせになっちゃうぅ<emoji=heart04>\u3000脳イキ？\u3000これ脳イキしちゃってるぅ～<emoji=heart04>」"
translation = "「후아아아~앗<emoji=heart04> 상상하니까 정말 보지 쥬쿠쥬쿠해져 왔어어어<emoji=heart04> 아아아, 머리 행복해져버려어<emoji=heart04> 뇌오르가즘? 이거 뇌오르가즘 느끼고 있어~<emoji=heart04>」"

[[dialogue]]
speaker = "いろは"
original = "「はああぁっ<emoji=heart04>\u3000おち○ぽ気持ちいいっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000んああぁっ<emoji=heart04>」"
translation = "「하아아앗<emoji=heart04> 자지 기분 좋아<emoji=heart04> 앗<emoji=heart04> 하앙<emoji=heart04> 응우읏<emoji=heart04> 응아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "いろは"
original = "「あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04><emoji=heart04>\u3000ダメダメっ<emoji=heart04>\u3000脳みそ幸せになりすぎて、おま○こイっちゃう<emoji=heart04>」"
translation = "「앙<emoji=heart04> 앙<emoji=heart04> 후아아앗<emoji=heart04><emoji=heart04> 안 돼 안 돼<emoji=heart04> 뇌세포 너무 행복해져서 보지 가버려<emoji=heart04>」"

[[dialogue]]
speaker = "いろは"
original = "「あっ、あっ、あぁあぁああっ<emoji=heart04>\u3000気持ちいいの来るっ<emoji=heart04>\u3000はあぁっ、ふあぁあっ<emoji=heart04>\u3000イク<emoji=heart04>\u3000イクイク、イっクうぅ～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「앗, 앗, 아아아아아앗<emoji=heart04> 기분 좋은 거 와<emoji=heart04> 하아앗, 후아아앗<emoji=heart04> 가<emoji=heart04> 가버려 가버려, 가버려어어어~~~엇<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "いろは"
original = "「あーーーっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000はあぁあっ<emoji=heart04><emoji=heart04>\u3000ふあああぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아아아~~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 하아아앗<emoji=heart04><emoji=heart04> 후아아아아~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "いろはの膣が締まり、彼女は背筋を反らして、ビクビクと体を震わせる。どうやらイってしまったようだ――しかし。"
translation = "이로하의 질이 조여지며 그녀는 등줄기를 젖히고 파르르 몸을 떤다. 아무래도 가버린 모양이다―― 하지만."

[[dialogue]]
speaker = "いろは"
original = "「あっ！？\u3000んんんっ<emoji=heart04><emoji=heart04>\u3000んあぁあっ<emoji=heart04>\u3000なにコレぇ！？\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「앗!? 응응응<emoji=heart04><emoji=heart04> 응아아앗<emoji=heart04> 뭐야 이거어!? 앙<emoji=heart04> 앙<emoji=heart04> 하앙<emoji=heart04> 후아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "いろは"
original = "「イったのに、気持ちいいの止まらないっ<emoji=heart04>\u3000感度が上がって、おま○こもっと気持ちいい～っ<emoji=heart04><emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000んあああぁ～っ<emoji=heart04><emoji=heart04>」"
translation = "「갔는데도 기분 좋은 게 안 멈춰<emoji=heart04> 감도가 올라서 보지 더 기분 좋아~앗<emoji=heart04><emoji=heart04> 하아앗<emoji=heart04> 후아앗<emoji=heart04> 응아아아~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "いろは"
original = "「ああああっ<emoji=heart04>\u3000脳みそが言ってる<emoji=heart04>\u3000もっと気持ちよくなれって<emoji=heart04>\u3000ああっ、気持ちよくなれるって<emoji=heart04>\u3000ああああっ、幸せで一杯になれるってぇ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아아앗<emoji=heart04> 뇌가 말하고 있어<emoji=heart04> 더 기분 좋아지라고<emoji=heart04> 아앗, 기분 좋아질 수 있다고<emoji=heart04> 아아아앗, 행복으로 가득 찰 수 있다고오<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "とびお"
original = "「くっ……待て、いろは！\u3000１回止まれ！\u3000落ち着けっ！」"
translation = "「큭…… 기다려, 이로하! 일단 멈춰! 진정해!」"

[[dialogue]]
speaker = "いろは"
original = "「あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あぁあんっ<emoji=heart04>\u3000無理だよぉ<emoji=heart04>\u3000だって今、人生で１番解放されてて、１番幸せなんだもぉ～んっ<emoji=heart04>\u3000ふあぁぁっ<emoji=heart04>」"
translation = "「앙<emoji=heart04> 앙<emoji=heart04> 아아앙<emoji=heart04> 무리야아<emoji=heart04> 왜냐면 지금 인생에서 제일 해방되어 있고, 제일 행복한걸~요오앗<emoji=heart04> 후아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "いろは"
original = "「気持ちいいっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>\u3000おち○ぽで幸せ、止まらないのぉ～っ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04>」"
translation = "「기분 좋아<emoji=heart04> 후아아앗<emoji=heart04> 자지로 행복, 멈추지 않아~앗<emoji=heart04><emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 하아아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "いろは"
original = "「ねぇ、とびおも動いてぇ<emoji=heart04>\u3000あたしと一緒に幸せになろぉ？\u3000２人で堕ちたらもっと幸せだよ、いっしょに堕ちよぉ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んふぅ～っ<emoji=heart04>」"
translation = "「있지, 토비오도 움직여줘<emoji=heart04> 나랑 같이 행복해지자? 둘이서 타락하면 더 행복해, 같이 타락하자<emoji=heart04> 하아앗<emoji=heart04> 응후우~앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "いろはの言葉に反応するように、俺の体は更に興奮して、ペニスの快感が上がっていく。"
translation = "이로하의 말에 반응하듯 내 몸은 더욱 흥분하여 페니스의 쾌감이 올라간다."

[[dialogue]]
speaker = "unk"
original = "いろはの熱いおま○こがペニスに絡みついてきて、理性が溶けてしまいそうな程に堪らなく気持ちいい。"
translation = "이로하의 뜨거운 보지가 페니스를 휘감아 와서 이성이 녹아버릴 정도로 참을 수 없이 기분 좋다."

[[dialogue]]
speaker = "とびお"
original = "（っ……これもいろはの力なのか！？\u3000ダメだとわかってるのに、腰を振りたい衝動が抑えられない！）"
translation = "(윽…… 이것도 이로하의 힘인가!? 안 된다는 걸 알면서도 허리를 흔들고 싶은 충동을 억제할 수 없어!)"

[[dialogue]]
speaker = "unk"
original = "周りのことなんてどうでもいいから、今この瞬間に最高の快楽を味わいたい――欲望が際限なく湧き上がってきて、腰が勝手に動き出してしまう。"
translation = "주변 따윈 아무래도 좋으니까 지금 이 순간 최고의 쾌락을 맛보고 싶다―― 욕망이 끝없이 솟구쳐 올라 허리가 제멋대로 움직이기 시작한다."

[[dialogue]]
speaker = "いろは"
original = "「あああっ――<emoji=heart04><emoji=heart04>」"
translation = "「아아앗――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "いろは"
original = "「はあぁぁあっ、んあぁあああぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000おち○ぽ突き上げ来たぁっ<emoji=heart04>\u3000そう、これこれぇ<emoji=heart04>\u3000奥までどちゅどちゅ当たって気持ちいいのぉっ<emoji=heart04><emoji=heart04>」"
translation = "「하아아아앗, 응아아아아아아~앗<emoji=heart04><emoji=heart04><emoji=heart04> 자지 쳐올리기 왔다앗<emoji=heart04> 그래, 이거 이거어<emoji=heart04> 깊숙이 도츄도츄 닿아서 기분 좋아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "いろは"
original = "「あん、あん、あんっ<emoji=heart04>\u3000はあぁっ、ふああぁんっ<emoji=heart04><emoji=heart04>\u3000あっ、あっ、あっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「앙, 앙, 앙<emoji=heart04> 하아앗, 후아아앙<emoji=heart04><emoji=heart04> 앗, 앗, 앗<emoji=heart04> 응<emoji=heart04> 후아앗<emoji=heart04> 응아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "男性Ｄ"
original = "「ヤバッ、どっちも盛り過ぎでしょ！\u3000イッても腰止まらないとか、痴女過ぎるわ！」"
translation = "「대박, 둘 다 너무 달아오른 거 아냐! 가버려도 허리가 안 멈추다니 너무 치녀잖아!」"

[[dialogue]]
speaker = "男性Ｅ"
original = "「わざわざ足を止めてやってるんだから、もっとエロいところ見せろよな～？」"
translation = "「일부러 발길 멈추고 봐주고 있으니까 더 에로한 거 보여달라고~?」"

[[dialogue]]
speaker = "いろは"
original = "「ラブラブセックス見られるの幸せぇっ<emoji=heart04>\u3000あ、あああっ<emoji=heart04>\u3000人増えてもっとおま○こキュンキュンしてきたっ<emoji=heart04>\u3000あっ、あ、ああっ<emoji=heart04>\u3000んうぅっ――<emoji=heart04><emoji=heart04>」"
translation = "「러브러브 섹스 보여지는 거 행복해앗<emoji=heart04> 아, 아아앗<emoji=heart04> 사람 늘어서 더 보지 큥큥해왔어앗<emoji=heart04> 앗, 아, 아앗<emoji=heart04> 응우읏――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "いろは"
original = "「んああぁっ、おま○こセックス気持ちいい～～っ<emoji=heart04>\u3000見せちゃダメなとこ見られるの、頭バカになるくらい恥ずかしいっ<emoji=heart04>\u3000あっ、あっ、ふああぁんっ<emoji=heart04>」"
translation = "「응아아앗, 보지 섹스 기분 좋아~~앗<emoji=heart04> 보여주면 안 되는 곳 보여지는 거 머리 바보 될 정도로 부끄러워앗<emoji=heart04> 앗, 앗, 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "いろは"
original = "「恥ずかしいこと興奮するのぉ<emoji=heart04>\u3000ああぁあぁっ<emoji=heart04>\u3000恥ずかしいっ、恥ずかしい、恥ずかしいよぉ<emoji=heart04>\u3000恥ずかしくて気持ちいいのぉおっ<emoji=heart04>」"
translation = "「부끄러운 거 흥분돼요오<emoji=heart04> 아아아아앗<emoji=heart04> 부끄러워, 부끄러워, 부끄러워어<emoji=heart04> 부끄러워서 기분 좋아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "いろは"
original = "「あっあっあっあっあっ<emoji=heart04>\u3000恥ずかしさ、おま○こにキュンキュン来て、すごく気持ちいいっ<emoji=heart04>\u3000脳みそどんどん熱くなっちゃうぅ<emoji=heart04>\u3000んああぁんっ<emoji=heart04>」"
translation = "「앗앗앗앗앗<emoji=heart04> 부끄러움, 보지에 큥큥 와서 정말 기분 좋아앗<emoji=heart04> 뇌세포 점점 뜨거워져버려어<emoji=heart04> 응아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "いろは"
original = "「おち○ぽ<emoji=heart04>\u3000おち○ぽでおま○こゴシゴシするの、最高なのぉ<emoji=heart04>\u3000あ、あ、あ、あ<emoji=heart04>\u3000好きっ<emoji=heart04>\u3000おち○ぽ大好きぃっ<emoji=heart04><emoji=heart04>\u3000んあぁっ、ふああぁっ<emoji=heart04><emoji=heart04>」"
translation = "「자지<emoji=heart04> 자지로 보지 고시고시 하는 거 최고야아<emoji=heart04> 아, 아, 아, 아<emoji=heart04> 좋아<emoji=heart04> 자지 너무 좋아앗<emoji=heart04><emoji=heart04> 응아앗, 후아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "いろは"
original = "「とびおっ<emoji=heart04>\u3000奥っ、奥のところ<emoji=heart04>\u3000そこ、気持ちいいよっ<emoji=heart04>\u3000あんっ、いっぱい強くしてぇっ<emoji=heart04>\u3000あっ、あんっ、はああぁんっ<emoji=heart04>」"
translation = "「토비오앗<emoji=heart04> 안쪽, 안쪽 부분<emoji=heart04> 거기 기분 좋아앗<emoji=heart04> 앙, 잔뜩 강하게 해줘앗<emoji=heart04> 앗, 앙, 하아아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺ももう気持ち良くなることしか考えられず、いろはに言われるままに腰を激しく突き上げ続ける。"
translation = "나도 이제 기분 좋아지는 것밖에는 생각할 수 없게 되어 이로하가 시키는 대로 허리를 격렬하게 계속 쳐올린다."

[[dialogue]]
speaker = "いろは"
original = "「あっ――ふぁああぁあっ<emoji=heart04><emoji=heart04>\u3000すごいぃっ<emoji=heart04>\u3000おち○ぽ激しいっ、奥当たって気持ちいいっ<emoji=heart04><emoji=heart04>\u3000ダメダメッ<emoji=heart04>\u3000あたし、またイッちゃうっ<emoji=heart04><emoji=heart04>」"
translation = "「앗――화아아아앗<emoji=heart04><emoji=heart04> 굉장해앗<emoji=heart04> 자지 격렬해, 안쪽 닿아서 기분 좋아앗<emoji=heart04><emoji=heart04> 안 돼 안 돼앗<emoji=heart04> 나, 또 가버려앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "いろは"
original = "「はぁ、あぁぁ、あああっ<emoji=heart04>\u3000イカせてっ<emoji=heart04>\u3000イキたいっ、イキたいっ、イキたいのぉぉ<emoji=heart04>\u3000おち○ぽで奥、ぐちゃぐちゃにしてぇぇ<emoji=heart04>」"
translation = "「하아, 아아아, 아아앗<emoji=heart04> 가게 해줘앗<emoji=heart04> 가고 싶어, 가고 싶어, 가고 싶어어어<emoji=heart04> 자지로 안쪽 엉망진창으로 만들어줘어어<emoji=heart04>」"

[[dialogue]]
speaker = "いろは"
original = "「あぁああぁあぁぁっ<emoji=heart04>\u3000幸せクルっ、幸せキちゃう、脳イキきまっちゃうぅぅ～～<emoji=heart04>\u3000あ、あ、あ、あ、あ、あっ<emoji=heart04>\u3000ふわぁああああっ<emoji=heart04>」"
translation = "「아아아아아아아아앗<emoji=heart04> 행복 와, 행복 온다, 뇌오르가즘 결정되어버려어어~~ <emoji=heart04> 아, 아, 아, 아, 아, 앗<emoji=heart04> 후와아아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "いろはの膣内はまるで１秒ごとに絶頂しているように、キュウキュウと激しい痙攣でペニスを締め上げる。"
translation = "이로하의 질 내부는 마치 1초마다 절정하고 있는 것처럼 큥큥거리며 격렬한 경련으로 페니스를 조여 온다."

[[dialogue]]
speaker = "unk"
original = "いろはのおま○こに誘われるまま、俺は彼女のポルチオをノックし続け、命が燃えるような熱さを感じつつ、腰を振り続けた。"
translation = "이로하의 보지에 유혹당하는 대로 나는 그녀의 포르치오를 계속 노크하며 생명이 불타는 듯한 뜨거움을 느끼며 허리를 계속 흔들었다."

[[dialogue]]
speaker = "いろは"
original = "「あんっあんっあんっあんっ<emoji=heart04>\u3000はぁぁあ<emoji=heart04>\u3000見て見て見てぇ<emoji=heart04>\u3000いろはのおま○こイキまぁぁすっ<emoji=heart04>\u3000いろはが１番気持ちよくなるところ、みんな見ててぇ<emoji=heart04><emoji=heart04>」"
translation = "「앙앙앙앙<emoji=heart04> 하아아아<emoji=heart04> 봐줘 봐줘 봐줘어<emoji=heart04> 이로하 보지 가아아아욧<emoji=heart04> 이로하가 제일 기분 좋아지는 곳, 다들 지켜봐 줘앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "いろは"
original = "「んぅうう、あぁあ、あぁあぁあっ<emoji=heart04>\u3000あっ、ああ、あ、あああっ<emoji=heart04>\u3000もうイクぅっ<emoji=heart04>\u3000あ、あ、あ、あ、あ、あっ<emoji=heart04>\u3000あぁああっ<emoji=heart04>\u3000あああっ<emoji=heart04>」"
translation = "「응으으으, 아아아, 아아아아앗<emoji=heart04> 앗, 아아, 아, 아아앗<emoji=heart04> 이제 가아앗<emoji=heart04> 아, 아, 아, 아, 아, 앗<emoji=heart04> 아아아앗<emoji=heart04> 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "いろは"
original = "「あっあっあっあっあっ<emoji=heart04>\u3000イクイクイク<emoji=heart04>\u3000ああ、あぁ、ああ、あぁ、あぁあっ<emoji=heart04>\u3000イクイク、イっクぅぅうううっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗앗앗앗앗<emoji=heart04> 가버려 가버려 가버려<emoji=heart04> 아아, 아아, 아아, 아아, 아아앗<emoji=heart04> 가버려 가버려, 가버려어어어으으읏<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "いろは"
original = "「んあああああああああぁっ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>\u3000イックぅ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응아아아아아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04> 가버려어어어~~~~~~~~~~~~~~~~엇<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "いろはは『どちゅんっ』と音がするほど深く腰を落とすと、子宮口でペニスを迎え入れ、歓喜の声を上げた。"
translation = "이로하는 『도츈』 하고 소리가 날 정도로 깊게 허리를 내리더니 자궁구로 페니스를 받아들이며 환희의 비명을 질렀다."

[[dialogue]]
speaker = "いろは"
original = "「ふあああぁぁ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000精液、いっぱい入って来るぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふわぁああああっ<emoji=heart04><emoji=heart04>」"
translation = "「후아아아아아~~~~~~~~~~~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 정액, 잔뜩 들어와아아~~~~~~~~~~~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 후와아아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺の中にも我慢するなどという気持ちは完全になくなっていて、欲望のまま快楽の証を彼女の子宮いっぱいに注ぎ込んでいく。"
translation = "내 안에도 참는다는 마음 같은 건 완전히 사라져 있어서 욕망이 시키는 대로 쾌락의 증표를 그녀의 자궁 가득 쏟아부어 나간다."

[[dialogue]]
speaker = "いろは"
original = "「あっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000んああぁっ<emoji=heart04><emoji=heart04>\u3000子宮熱くて、おま○こ感じるぅ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 하앙<emoji=heart04> 응아아앗<emoji=heart04><emoji=heart04> 자궁 뜨거워서 보지 느껴져어어~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "いろは"
original = "「はああぁっ<emoji=heart04>\u3000中出しどぴゅどぴゅ気持ちいいよぉ～～っ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000んああぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「하아아앗<emoji=heart04> 질내사정 도퓨도퓨 기분 좋아아~~앗<emoji=heart04><emoji=heart04> 앗<emoji=heart04> 후아앗<emoji=heart04> 응아아아~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "いろは"
original = "「――はあぁっ<emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000はぁぁぁ、ふうぅっ……<emoji=heart04>」"
translation = "「――하아앗<emoji=heart04> 응응읏<emoji=heart04> 하아아아, 후우읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そうして、精液を摂取したことで、いろははようやく止まって――"
translation = "그렇게 정액을 섭취함으로써 이로하는 마침내 멈추고――"

[[dialogue]]
speaker = "いろは"
original = "「あんっ<emoji=heart04>\u3000おち○ぽ抜けちゃった……<emoji=heart04>\u3000あぁはあぁっ<emoji=heart04>」"
translation = "「앙<emoji=heart04> 자지 빠져버렸어……<emoji=heart04> 아아하아앗<emoji=heart04>」"

[[dialogue]]
speaker = "いろは"
original = "「はふぅぅうんっ……<emoji=heart04>\u3000たくさんの人に見られながらのセックス、すっごく気持ちよくイケちゃったぁ<emoji=heart04>\u3000ぁああっ<emoji=heart04>」"
translation = "「하후우우우운……<emoji=heart04> 많은 사람에게 보여지면서 하는 섹스, 정말 기분 좋게 가버렸어어<emoji=heart04> 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "いろは"
original = "「こんなに気持ちいいの、初めてだねぇ<emoji=heart04>\u3000あぁぁ<emoji=heart04>\u3000本当に、全てから解放された気分だよぉ<emoji=heart04>\u3000あはぁあ<emoji=heart04>」"
translation = "「이렇게 기분 좋은 거 처음이네에<emoji=heart04> 아아아<emoji=heart04> 정말 모든 것으로부터 해방된 기분이야아<emoji=heart04> 아하아아<emoji=heart04>」"

[[dialogue]]
speaker = "いろは"
original = "「んふふふぅ<emoji=heart04>\u3000……そんな顔しないでぇ、全部大丈夫だから<emoji=heart04>\u3000はぁぁ<emoji=heart04>」"
translation = "「응후후후우<emoji=heart04> ……그런 표정 짓지 마아, 전부 괜찮으니까아<emoji=heart04> 하아아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "いろはが俺の顔を覗き込みながら、微笑みを浮かべる。すると――"
translation = "이로하가 내 얼굴을 들여다보며 미소를 짓는다. 그러자――"

[[dialogue]]
speaker = "男性Ａ"
original = "「あれ……？\u3000俺、今まで何してたんだっけ……？」"
translation = "「어라……? 나, 지금까지 뭐 하고 있었지……?」"

[[dialogue]]
speaker = "男性Ｂ"
original = "「そうだ……用事があるんだった。急がないと……」"
translation = "「맞다…… 볼일이 있었지. 서둘러야 해……」"

[[dialogue]]
speaker = "男性Ｃ"
original = "「こんなところでみんな、どうして立ち止まってるんだ……？」"
translation = "「이런 곳에서 다들 왜 서 있는 거야……?」"

[[dialogue]]
speaker = "unk"
original = "急に、周りの野次馬たちが俺たちへの興味を無くしたかのように、一斉にスマホを操作してその場を立ち去り始める。"
translation = "갑자기 주변의 구경꾼들이 우리에 대한 흥미를 잃은 듯 일제히 스마트폰을 조작하며 그 자리를 떠나기 시작한다."

[[dialogue]]
speaker = "とびお"
original = "「こ、これは……？」"
translation = "「이, 이것은……?」"

[[dialogue]]
speaker = "いろは"
original = "「はぁあぁっ<emoji=heart04>\u3000あたしはただ、キミと思いっきり気持ちいいエッチがしたかっただけ<emoji=heart04>\u3000んんぅ<emoji=heart04>\u3000周りの人たちの記憶と証拠は、残らないようにちゃんと消しておいたよ<emoji=heart04>」"
translation = "「하아아아앗<emoji=heart04> 나는 그저 너랑 마음껏 기분 좋은 에치하고 싶었을 뿐<emoji=heart04> 응응우<emoji=heart04> 주변 사람들 기억이랑 증거는 남지 않게 잘 지워뒀어<emoji=heart04>」"

[[dialogue]]
speaker = "いろは"
original = "「あぁ、はぁあぁっ<emoji=heart04>\u3000これで、変な心配は要らないよね？\u3000だから――」"
translation = "「아아, 하아아아앗<emoji=heart04> 이걸로 이상한 걱정은 필요 없지? 그러니까――」"

[[dialogue]]
speaker = "いろは"
original = "「次はぁ<emoji=heart04>\u3000もっともっと、たくさんの人に見られながら、エッチしよ？<emoji=heart04>\u3000あはぁあっ<emoji=heart04>」"
translation = "「다음은<emoji=heart04> 더더욱 많은 사람에게 보여지면서 에치하자? <emoji=heart04> 아하아앗<emoji=heart04>」"

[[dialogue]]
speaker = "いろは"
original = "「――うふふふっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「――우후후훗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "彼女の微笑みが、怪しい色香を纏っていることに気づいて、俺は思わず息を飲む。"
translation = "그녀의 미소가 묘한 색기를 두르고 있다는 것을 깨닫고 나는 나도 모르게 숨을 삼킨다."

[[dialogue]]
speaker = "unk"
original = "しかし、再び湧き上がって来る衝動に抗えず、俺はいろはの誘いに頷いてしまうのだった――"
translation = "하지만 다시 솟구쳐 오르는 충동에 저항하지 못하고 나는 이로하의 유혹에 고개를 끄덕이고 마는 것이었다――"

