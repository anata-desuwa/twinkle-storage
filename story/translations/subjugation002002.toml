[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「何だかめっちゃ久しぶりな感じ！？\u3000ちょうどよかった～、後で新星学園に会いに行こうと思ってたんだ～♪」"
translation = "「왠지 엄청 오랜만인 느낌!? 마침 잘 됐다~ 나중에 신성학원에 만나러 가려고 했었거든~♪」"

[[dialogue]]
speaker = "unk"
original = "彼女は<ruby>雨野<rt>あめの</rt></ruby>ウズメイア。天界からはるばるやってきた留学生であり、卓越した薙刀術の腕前を誇る星騎士である。"
translation = "그녀는 우메노 우즈메이야. 천계에서 멀리 떨어진 곳에서 온 유학생이며, 탁월한 치도술 실력을 자랑하는 성기사다."

[[dialogue]]
speaker = "unk"
original = "そんなウズメは、普段はギャルファッションに身を包んでいる女の子だ（留学した当初は清楚な見た目だったらしい）。"
translation = "그런 우즈메는 평소에 갸루 패션을 즐기는 여자아이다 (유학 초기에는 청초한 모습이었다고 한다)."

[[dialogue]]
speaker = "unk"
original = "武術や時代劇といった和の文化にとどまらず、アニメやオタク文化にも<ruby>造詣<rt>ぞうけい</rt></ruby>が深い、ジャパニーズ文化ラブなオタクのギャル天使である。"
translation = "무술이나 시대극 같은 일본 문화뿐만 아니라, 애니메이션이나 오타쿠 문화에도 조예가 깊은, 재패니즈 문화 러브인 오타쿠 갸루 천사다."

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ねぇねぇ、この衣装どうかな～♪\u3000大正ロマンって感じで、めっちゃ可愛くない！？」"
translation = "「있지 있지, 이 의상 어때~♪ 다이쇼 로망 같은 느낌이라 완전 귀엽지 않아!?」"

[[dialogue]]
speaker = "unk"
original = "コスプレ？\u3000よく似合ってるね"
translation = "코스프레? 잘 어울리네"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「そうそう！\u3000コスプレも立派な日本の文化だし──って、違う違う！」"
translation = "「맞아 맞아! 코스프레도 훌륭한 일본 문화고──가 아니라, 그게 아냐!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「これはヘレナちゃんに作ってもらった、２着目の人工戦闘服だよ。その名もバレンタインフォームだし！」"
translation = "「이건 헬레나짱이 만들어 준 두 번째 인공 전투복이라구. 이름하여 발렌타인 폼이라구!」"

[[dialogue]]
speaker = "unk"
original = "バレンタインフォーム！？"
translation = "발렌타인 폼!?"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ふふ～ん♪\u3000実は昨日渡されたばっかりの衣装なんだ～。晴れ着フォームに続いて、また和風な衣装だからすっごく嬉しいし！」"
translation = "「후후~ㄴ♪ 사실 어제 막 받은 의상이라구~. 설빔 폼에 이어서 또 일본풍 의상이라 정말 기쁘다구!」"

[[dialogue]]
speaker = "unk"
original = "清楚な感じのウズメも新鮮で素敵だね"
translation = "청초한 느낌의 우즈메도 신선하고 멋지네"

[[dialogue]]
speaker = "unk"
original = "ギャルファッションも可愛いけど"
translation = "갸루 패션도 귀엽지만"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「え──えへへっ<emoji=heart04>\u3000そお？\u3000ギャップってやつ、見せつけちゃった感じ？」"
translation = "「에── 에헤헤<emoji=heart04> 그래? 갭 모에라는 거, 제대로 보여준 느낌?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「会長くんにそう言ってもらえて嬉しいな～♪\u3000採寸もなしでいきなり渡された衣装だったから、似合ってるか不安だったんだ～」"
translation = "「회장군에게 그런 소릴 들으니 기쁘다구~♪ 치수도 안 재고 갑자기 받은 의상이라 잘 어울릴지 불안했거든~」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あ……その顔。あたしがヘレナちゃんにおねだりして作ってもらったと思ってる感じ？\u3000違うんだな～、これが」"
translation = "「아…… 그 표정. 내가 헬레나짱한테 조르고 졸라서 만들어 달라고 했다고 생각하는 거지? 그게 아니라구, 이게」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あたしはついでに作ってもらっただけなの。流星学園のエンジェルチョコレート制度って言って……あ、わかる感じ？」"
translation = "「난 덤으로 만들어 준 것뿐이야. 유성학원의 엔젤 초콜릿 제도라고 해서…… 아, 뭔지 아는 느낌?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あたしのペアの附属の子がね、ヘレナちゃんにバレンタインフォームの製作を発注してたみたいでね～」"
translation = "「내 페어인 부속생 아이가 말이야, 헬레나짱에게 발렌타인 폼 제작을 발주했던 모양이라구~」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「せっかくのペアだからついでに作ってやったぞ、なんて言われて！\u3000ヘレナちゃん、マジ神だし！」"
translation = "「기왕 페어니까 덤으로 만들어 줬다, 라고 하더라고! 헬레나짱, 진짜 신이라구!」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「ふふっ、盛り上がってるみたいですね。ウズメイア先輩に、新星の会長さん♪」"
translation = "「후훗, 분위기가 좋아 보이네요. 우즈메이야 선배님에, 신성의 회장님♪」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あ、シャルレーヌちゃん♪\u3000会長くん、この子があたしのペアの附属生ちゃんだよ！\u3000えっと～……２人は知り合い？」"
translation = "「아, 샤를레느짱♪ 회장군, 이 아이가 내 페어인 부속생이야! 에또~…… 둘이 아는 사이?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「はい♪\u3000会長さんにはいつも、と～ってもお世話になってます。本日もお会いできてすごく嬉しいです♪」"
translation = "「네♪ 회장님께는 항상 정~말 신세를 많이 지고 있어요. 오늘도 뵙게 되어 무척 기쁘답니다♪」"

[[dialogue]]
speaker = "unk"
original = "彼女の名はシャルレーヌ・ディアーブル──魔界にあるシャリオン地方の十貴族が一柱であり、文字通りの貴族令嬢だ。"
translation = "그녀의 이름은 샤를레느 디아블── 마계에 있는 샤리온 지방의 십귀족 중 한 명이며, 문자 그대로 귀족 영애다."

[[dialogue]]
speaker = "unk"
original = "魔界において『魔王の血縁』を自称して家名の箔付けを行っている、ちょっぴりしたたかな貴族なのだが……それが嘘であることを知る者は少ない。"
translation = "마계에서 『마왕의 혈연』을 자칭하며 가문의 위신을 세우는 조금 영악한 귀족이지만…… 그것이 거짓임을 아는 자는 적다."

[[dialogue]]
speaker = "unk"
original = "しかしその実態は──"
translation = "하지만 그 실체는──"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「──あっ、会長さん。ネクタイがちょっぴり曲がってますよ？\u3000直してさしあげますね」"
translation = "「──앗, 회장님. 넥타이가 조금 비뚤어졌네요? 고쳐 드릴게요」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「身だしなみは人となりを映す鏡。星徒会長であり、魔王でもあるのですから、きちんとしていただかないと♪」"
translation = "「몸가짐은 그 사람을 비추는 거울. 성도회장이자 마왕이시기도 하니, 단정히 하셔야죠♪」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「お～。手際がいい……流石はシャリオンのお嬢様だし！」"
translation = "「오~. 솜씨 좋은데…… 역시 샤리온의 아가씨라구!」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「くふふ<emoji=heart04>\u3000会長さぁん、さっきから視線がいやらしくないですかぁ？」"
translation = "「쿠후후<emoji=heart04> 회장니임, 아까부터 시선이 음란하지 않나요~?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「挨拶をした時から私の胸元をチラチラと見てきて～……バレバレですよ？」"
translation = "「인사할 때부터 제 가슴팍을 힐끔힐끔 쳐다보고~…… 다 들켰다구요?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「まぁ見るなとは言いませんよ？\u3000会長さんが性欲に勝てない、弱～いワンちゃんなことは、百も承知ですからね～<emoji=heart04>」"
translation = "「뭐, 보지 말라고는 안 할게요? 회장님이 성욕을 이기지 못하는 약~해 빠진 강아지라는 건 이미 잘 알고 있으니까요~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "──その実態は、こんな風に裏表のあるお嬢様である。ドＳであり、小生意気であり、何かにつけて俺をからかってくる、所謂『メスガキ』……！"
translation = "──그 실체는 이렇게 겉과 속이 다른 아가씨다. 도S에 건방지고, 틈만 나면 나를 놀려 먹는 소위 『메스가키』……!"

[[dialogue]]
speaker = "unk"
original = "いずれは俺を支配下に置き、ディア―ブル家に正式に魔王の血を取り込んでやろうと画策する、油断のならない女の子だったりする……"
translation = "언젠가는 나를 지배하에 두고 디아블 가문에 정식으로 마왕의 혈통을 끌어들이려 획책하는, 방심할 수 없는 여자아이이기도 하다……"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「あ。言うまでもないと思いますけど、ウズメイア先輩に私の『素』は隠してますから。バレンタインが終わるまで、他言無用でお願いしますね？」"
translation = "「아. 말 안 해도 아시겠지만, 우즈메이야 선배님께 제 『본모습』은 숨기고 있으니까요. 발렌타인이 끝날 때까지 비밀로 지켜주셔야 해요?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「ところで、私のバレンタインフォームはいかがです？」"
translation = "「그나저나, 제 발렌타인 폼은 어떤가요?」"

[[dialogue]]
speaker = "unk"
original = "よ……よく似合ってるよ"
translation = "자…… 잘 어울려"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「まあ♪\u3000ありがとうございます。会長さんにお褒めいただけるか、とっても不安だったので嬉しいです♪」"
translation = "「어머♪ 감사합니다. 회장님께 칭찬받을 수 있을지 무척 불안했는데 기쁘네요♪」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ぜんっぜん心配することないよ～。あたしも最初に見た時、キュートすぎてビビったし！」"
translation = "「저언혀 걱정할 필요 없다구~. 나도 처음에 봤을 때 너무 큐트해서 깜짝 놀랐다구!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「知ってる会長くん？\u3000シャルレーヌちゃんのお家って代々、香水で有名なんだって！」"
translation = "「알고 있어 회장군? 샤를레느짱네 집안은 대대로 향수로 유명하대!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「このバレンタインフォームも、販売戦略？\u3000の一環で、ヘレナちゃんに直々に制作を依頼したらしいよ！」"
translation = "「이 발렌타인 폼도 판매 전략? 의 일환으로 헬레나짱에게 직접 제작을 의뢰한 거래!」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「はい。せっかく人間界へ来たのですから、家業の香水をたくさんの方に届けたいと思いまして」"
translation = "「네. 기껏 인간계에 왔으니 가업인 향수를 많은 분께 전해드리고 싶어서요」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「冬の新作の香水に、私の星力を込めたチョコレートをオマケでつけてみるのも面白いかなって」"
translation = "「겨울 신작 향수에 제 성력을 담은 초콜릿을 덤으로 붙여보는 것도 재밌을 것 같았거든요」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「こんなに可愛いシャルレーヌちゃんの手作りチョコが付いてくるとか、爆売れ確定だし！」"
translation = "「이렇게 귀여운 샤를레느짱의 수제 초코가 따라온다니, 완판 확정이라구!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「じゃあ早速だけどチョコ作り、やっちゃおっか？」"
translation = "「그럼 당장 초코 만들기, 시작해 볼까?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「はい。よろしくお願いします、ウズメイア先輩。会長さんもぜひ、味見していってくださいね」"
translation = "「네. 잘 부탁드려요, 우즈메이야 선배님. 회장님도 꼭 맛보고 가세요」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「というわけで、試作したブラウニーの完成だしっ♪\u3000会長くん、早速食べてみて！」"
translation = "「그런 고로, 시제품 브라우니 완성이라구♪ 회장군, 얼른 먹어봐!」"

[[dialogue]]
speaker = "unk"
original = "すごくおいしい！"
translation = "정말 맛있어!"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ほんと！？\u3000よかったぁ♪\u3000チョコレートのお菓子作りって初めてだったけど、上手くいっちゃった感じ？」"
translation = "「진짜!? 다행이다아♪ 초콜릿 과자 만들기는 처음이었는데, 성공한 느낌?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「ウズメイア先輩ってお料理が得意なんですね。初めてのレシピだったのに、とても手際が良くって驚きました」"
translation = "「우즈메이야 선배님은 요리 실력이 좋으시네요. 처음 해보는 레시피였는데도 솜씨가 너무 좋으셔서 놀랐어요」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「えへへ、まあ自炊とかそれなりにやるしね～♪\u3000それじゃあ今度は、シャルレーヌちゃんの番だね！」"
translation = "「에헤헤, 뭐 자취 같은 거 나름대로 하니까~♪ 그럼 이번엔 샤를레느짱 차례네!」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「はい。どうぞ会長さん。私の方はトリュフチョコレートにしてみました」"
translation = "「네. 여기요 회장님. 저는 트러플 초콜릿으로 만들어 봤어요」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「丸めたガナッシュを、溶かしたチョコでコーティングして、ココアパウダーをまぶしたものです」"
translation = "「둥글게 만든 가나슈를 녹인 초코로 코팅하고 코코아 가루를 뿌린 거예요」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「隠し味にお酒を使っているので、香りが良く出ていたらいいんですけれど……♪」"
translation = "「숨겨진 맛으로 술을 넣었으니 향이 잘 나면 좋을 텐데……♪」"

[[dialogue]]
speaker = "unk"
original = "（ものすごく──辛い！？！？）"
translation = "(엄청나게── 매워!?!?)"

[[dialogue]]
speaker = "unk"
original = "もぐっ……んんん！？"
translation = "우걱…… 으으으윽!?"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「わっ、会長くん、お顔真っ赤……！\u3000のどに詰まらせちゃった！？\u3000お水取って来るし！」"
translation = "「왓, 회장군 얼굴이 새빨개……! 목에 걸린 거야!? 물 떠 올게!」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「も～、会長さん？\u3000いくらご主人様の手作りチョコだからって、喉に引っかけちゃうくらいの勢いで食べなくても～♪」"
translation = "「정말~ 회장님? 아무리 주인님의 수제 초코라지만, 목에 걸릴 정도로 급하게 드시지 않아도~♪」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「チョコも満足にゴックンできないだなんて、困ったワンちゃんですね。ほ～ら、シャルレーヌが背中トントンしてあげます♪」"
translation = "「초코조차 제대로 꿀꺽 못 하다니, 곤란한 강아지네요. 자~ 샤를레느가 등을 토닥토닥해 드릴게요♪」"

[[dialogue]]
speaker = "unk"
original = "うう……辛い……"
translation = "으으…… 매워……"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「……え？\u3000辛い？」"
translation = "「……에? 매워요?」"

[[dialogue]]
speaker = "unk"
original = "あんまりなイタズラだよ、シャルレーヌ……"
translation = "너무한 장난이야, 샤를레느……"

[[dialogue]]
speaker = "unk"
original = "激辛チョコを騙して食べさせるだなんて"
translation = "매운 초코를 속여서 먹이다니"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「そんな。いくら私でも、口に運ぶものにイタズラはしませんよ。そんな品が良くないこと……」"
translation = "「설마요. 아무리 저라도 입에 들어가는 걸로 장난은 안 쳐요. 그런 품위 없는 짓은……」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「それに、私のトリュフチョコが辛いですって？\u3000もぐもぐ……んんっ！？」"
translation = "「그보다 제 트러플 초코가 맵다니요? 우물우물…… 윽!?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「な、なんなの、この辛さっ……！？」"
translation = "「뭐, 뭐야, 이 매운맛은……!?」"

