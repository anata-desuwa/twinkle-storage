[[dialogue]]
speaker = "unk"
original = "第４話,夏は終わっても,P"
translation = "제4화, 여름은 끝나도, P"

[[dialogue]]
speaker = "unk"
original = "リップルとの付き合いも長くなってきたある日。一緒に遊びたいと誘われて、俺達は街にやってきていた――"
translation = "리플과의 교제도 길어진 어느 날. 함께 놀고 싶다는 권유를 받아 우리는 거리로 나왔다──"

[[dialogue]]
speaker = "リップル"
original = "「ワオ！\u3000人がイッパイで賑やかで～す♪」"
translation = "「와오! 사람이 많아서 북적북적함다~♪」"

[[dialogue]]
speaker = "unk"
original = "リップルとお出かけは初めてだな"
translation = "리플과 외출하는 건 처음이네"

[[dialogue]]
speaker = "リップル"
original = "「ハイ♪\u3000いつもリゾート結界で、星徒会の皆で遊ぶコトが多かったデスから、新鮮です！」"
translation = "「네♪ 언제나 리조트 결계에서 성도회 여러분과 노는 일이 많았으니까 신선함다!」"

[[dialogue]]
speaker = "リップル"
original = "「ワタシ、あまり都会の街を歩いたことがないので、今日は色々教えて欲しいで～す♪」"
translation = "「저, 도시 거리를 걸어본 적이 별로 없어서 오늘은 여러 가지 알려주셨으면 좋겠슴다~♪」"

[[dialogue]]
speaker = "リップル"
original = "「あ、そうだ！\u3000カイチョー、せっかく一緒に歩くのデスから――」"
translation = "「아, 맞다! 회장님, 기껏 함께 걷는 거니까──」"

[[dialogue]]
speaker = "unk"
original = "（り、リップルから手を繋いできて……！？）"
translation = "(리, 리플이 먼저 손을 잡아오다니……!?)"

[[dialogue]]
speaker = "リップル"
original = "「エヘヘ♪\u3000男女で出掛ける時はこうして手を繋ぐんだって、シショーが言ってマシた！\u3000さあ、行きましょー♪」"
translation = "「에헤헤♪ 남녀가 외출할 때는 이렇게 손을 잡는 거라고 스승님이 말씀하셨슴다! 자, 가요~♪」"

[[dialogue]]
speaker = "リップル"
original = "「ゲームセンター、カイチョーと１度来てみたかったんです！\u3000ワタシ、ダンスするやつ得意なんデスよ？\u3000対戦しましょう、対戦！」"
translation = "「게임 센터, 회장님과 한번 와보고 싶었슴다! 저, 댄스 게임 자신 있다고요? 대결해요, 대결!」"

[[dialogue]]
speaker = "リップル"
original = "「……あ！\u3000見て下さいカイチョー、これ！\u3000クレーンゲームの景品で、イルカのぬいぐるみがアリま～す！\u3000可愛いで～す♪」"
translation = "「……아! 보세요 회장님, 이거! 크레인 게임 경품으로 돌고래 인형이 있슴다! 귀염슴다~♪」"

[[dialogue]]
speaker = "リップル"
original = "「――ハイ！\u3000ワタシ、イルカが好きなんです♪\u3000可愛くて、グッズもよく集めたりシテて……」"
translation = "「──네! 저 돌고래를 좋아함다♪ 귀여워서 굿즈도 자주 모으고 있고……」"

[[dialogue]]
speaker = "リップル"
original = "「……え？\u3000取ってくれるんデスか？\u3000ゲームセンターのバイトをしてたことがあって、コツを知ってる？」"
translation = "「……에? 뽑아주시는 검까? 게임 센터 알바를 했던 적이 있어서 요령을 안다구요?」"

[[dialogue]]
speaker = "unk"
original = "それから、クレーンゲームに挑戦して、３回でイルカのぬいぐるみを取ることが出来た――"
translation = "그 후, 크레인 게임에 도전해서 세 번 만에 돌고래 인형을 뽑을 수 있었다──"

[[dialogue]]
speaker = "リップル"
original = "「わあぁ♪\u3000カイチョー、アリガトございます！\u3000あっという間に取れて、凄いです♪」"
translation = "「와아♪ 회장님, 감사함다! 순식간에 뽑히다니 대단함다♪」"

[[dialogue]]
speaker = "リップル"
original = "「……エヘヘ♪\u3000カイチョーからの初めてプレゼントですね。ワタシ、ＢＩＧ大切にします♪」"
translation = "「……에헤헤♪ 회장님께 받은 첫 선물이네요. 저, BIG 소중히 하겠슴다♪」"

[[dialogue]]
speaker = "unk"
original = "そう言われると、なんか照れるな……"
translation = "그렇게 말하니까 왠지 쑥스럽네……"

[[dialogue]]
speaker = "リップル"
original = "「――美味しいタイ焼きのお店が近くにある？\u3000それは楽しみで～す！」"
translation = "「──맛있는 붕어빵 가게가 근처에 있다구요? 그거 기대됨다!」"

[[dialogue]]
speaker = "リップル"
original = "「おっ、見えてきました。あそこのお店デスかね？」"
translation = "「오, 보임다. 저 가게임까?」"

[[dialogue]]
speaker = "リップル"
original = "「――カイチョーが買って来てくれるんデスか？\u3000ワカリました。そうしたらワタシ、ここで待ってます！」"
translation = "「──회장님이 사다 주시는 검까? 알겠슴다. 그럼 전 여기서 기다리고 있겠슴다!」"

[[dialogue]]
speaker = "unk"
original = "俺は一旦、その場を離れてたい焼きの屋台へ向かい、２人分買って戻って来ると――"
translation = "나는 일단 그 자리를 떠나 붕어빵 노점으로 향해 2인분을 사서 돌아오니──"

[[dialogue]]
speaker = "チャラい男"
original = "「それにしてもやっぱ、笑顔が凄くカワイイね～♪\u3000一緒にいると、こっちも楽しい気分になって来る感じで」"
translation = "「그나저나 역시 미소가 너무 귀엽네~♪ 같이 있으면 나까지 즐거운 기분이 되는 느낌이랄까」"

[[dialogue]]
speaker = "リップル"
original = "「アリガトございます。お兄さんは今日はお一人なんデスか？」"
translation = "「감사함다. 오빠는 오늘 혼자 오신 검까?」"

[[dialogue]]
speaker = "unk"
original = "（無邪気な笑顔……！）"
translation = "(천진난만한 미소……!)"

[[dialogue]]
speaker = "チャラい男"
original = "「そうなんだよ～。キミもさ、一緒に来たのは別に、彼氏とかじゃないんでしょ？\u3000だったらオレと遊ばない？\u3000オレの方がもっと楽しい場所を案内できるよ？」"
translation = "「그렇다니까~. 너도 말이야, 같이 온 사람은 딱히 남자친구 같은 거 아니지? 그럼 나랑 놀래? 내가 훨씬 더 즐거운 곳 안내해 줄 수 있는데?」"

[[dialogue]]
speaker = "リップル"
original = "「楽しい場所、というのは興味がアリマスが、今日はカイチョーと一緒に遊ぶ為に来てイルので……」"
translation = "「즐거운 곳이라는 건 흥미가 있슴다만, 오늘은 회장님과 함께 놀기 위해 온 거라서……」"

[[dialogue]]
speaker = "リップル"
original = "「――あっ！\u3000カイチョー♪\u3000戻って来たんデスね……って、ワオ！？」"
translation = "「──앗! 회장님♪ 돌아오신 검까…… 어라, 와오!?」"

[[dialogue]]
speaker = "リップル"
original = "「カイチョーにお姫様抱っこされちゃいました！？\u3000ど、どうしたんですか、カイチョー？」"
translation = "「회장님한테 공주님 안기를 당해버렸슴다!? 어, 어떻게 된 검까, 회장님?」"

[[dialogue]]
speaker = "チャラい男"
original = "「ちょっ！？\u3000おい！\u3000オレがまだその子と話している途中――」"
translation = "「잠깐!? 야! 내가 아직 이 애랑 얘기하는 도중──」"

[[dialogue]]
speaker = "unk"
original = "楽しい場所には、俺が連れて行くんで！"
translation = "즐거운 곳에는 내가 데려갈 거니까!"

[[dialogue]]
speaker = "リップル"
original = "「それじゃあ、降りますね。よいしょっと……カイチョー、お姫様抱っこアリガトございました！\u3000あのお兄さん、もう追っては来てないみたいですね」"
translation = "「그럼 내릴게요. 영차…… 회장님, 공주님 안기 감사했슴다! 저 오빠, 이제 쫓아오지는 않는 것 같네요」"

[[dialogue]]
speaker = "リップル"
original = "「それにしても、お姫様抱っこで連れ去られるの、凄くテンション上がっちゃいました♪\u3000そんなことされたのは、生まれて初めてで……」"
translation = "「그나저나 공주님 안기로 끌려가는 거, 정말 텐션 올라버렸슴다♪ 그런 일을 당한 건 태어나서 처음이라……」"

[[dialogue]]
speaker = "リップル"
original = "「って、カイチョー？\u3000何だか怒ってマスか？」"
translation = "「근데 회장님? 왠지 화나셨슴까?」"

[[dialogue]]
speaker = "リップル"
original = "「怒ってないケド、いい気はしない？\u3000……ワタシが原因ナラ、謝ります。フキゲンな理由、教えてホシイです！」"
translation = "「화난 건 아니지만 기분은 좋지 않다구요? ……저 때문이라면 사과하겠슴다. 기분이 안 좋은 이유, 알려주셨으면 좋겠슴다!」"

[[dialogue]]
speaker = "リップル"
original = "「――え？\u3000ワタシがさっきのお兄さんに、無邪気な笑顔を向けていたから……デスか？」"
translation = "「──에? 제가 아까 그 오빠한테 천진난만한 미소를 지어줬기 때문…… 인검까?」"

[[dialogue]]
speaker = "unk"
original = "それで正直……嫉妬しちゃって"
translation = "그래서 솔직히…… 질투했어"

[[dialogue]]
speaker = "リップル"
original = "「っ……カイチョー！」"
translation = "「윽…… 회장님!」"

[[dialogue]]
speaker = "リップル"
original = "「カイチョーが、ワタシと同じ気持ちでウレシイです！\u3000ハグしちゃいます♪」"
translation = "「회장님이 저와 같은 마음이라서 기쁨다! 허그하겠슴다♪」"

[[dialogue]]
speaker = "リップル"
original = "「――ハイ！\u3000ワタシも他の子に、嫉妬しちゃってマシた……！」"
translation = "「──네! 저도 다른 애들한테 질투하고 있었슴다……!」"

[[dialogue]]
speaker = "リップル"
original = "「カイチョーは皆に優しくて、他の女の子達からも人気がありマスから、よく話してイマスよね？\u3000ワタシ、最近はそれを見ると心がモヤモヤして……」"
translation = "「회장님은 모두에게 상냥하고 다른 여자애들한테도 인기가 많으니까 자주 대화하시잖아요? 저, 요즘은 그걸 보면 마음이 답답해서……」"

[[dialogue]]
speaker = "リップル"
original = "「星徒会の皆に相談したら……それは嫉妬ダッテ言われたんです。だから――」"
translation = "「성도회 여러분에게 상담했더니…… 그게 질투라고 하더군요. 그래서──」"

[[dialogue]]
speaker = "リップル"
original = "「今日は２人きりで遊んで……１日ダケでもカイチョーを独占したかったんです」"
translation = "「오늘은 둘이서만 놀아서…… 하루만이라도 회장님을 독점하고 싶었슴다」"

[[dialogue]]
speaker = "unk"
original = "そっか、だったら――"
translation = "그렇구나, 그렇다면──"

[[dialogue]]
speaker = "リップル"
original = "「改めて、デートのお誘い……デスか？」"
translation = "「다시 한번, 데이트 신청…… 인검까?」"

[[dialogue]]
speaker = "リップル"
original = "「ハイ♪\u3000もちろんＯＫです！\u3000カイチョーとデート、ＢＩＧ嬉しいです♪」"
translation = "「네♪ 물론 OK임다! 회장님과 데이트, BIG 기쁨다♪」"

[[dialogue]]
speaker = "リップル"
original = "「また手を繋いでも、イイですか？\u3000エヘヘ♪\u3000デートだと思うと、何だか急にドキドキしちゃいます……♪」"
translation = "「다시 손을 잡아도 되겠슴까? 에헤헤♪ 데이트라고 생각하니까 왠지 갑자기 두근두근함다……♪」"

[[dialogue]]
speaker = "リップル"
original = "「カイチョー……ちゅっ<emoji=heart04>」"
translation = "「회장님…… 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "あっ、頬っぺたにキス……！"
translation = "앗, 볼에 키스……!"

[[dialogue]]
speaker = "リップル"
original = "「ハイ♪\u3000最大の親愛を示すアイサツです」"
translation = "「네♪ 최대의 친애를 나타내는 인사임다」"

[[dialogue]]
speaker = "リップル"
original = "「今日はドキドキでいっぱいの、ハッピーな初デートにしましょう♪」"
translation = "「오늘은 두근거림으로 가득한, 행복한 첫 데이트로 만들어요♪」"

[[dialogue]]
speaker = "unk"
original = "そう言ってリップルは、満開の笑顔を咲かせるのだった――"
translation = "그렇게 말하며 리플은 활짝 핀 미소를 지어 보이는 것이었다──"

