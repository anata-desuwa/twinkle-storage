[[dialogue]]
speaker = "unk"
original = "時刻がちょうど正午を回った頃、事件は起きた。"
translation = "시각이 정오를 딱 넘겼을 무렵, 사건이 일어났다."

[[dialogue]]
speaker = "unk"
original = "リゾート結界に来ていた女の子たちが、悲鳴を上げる。"
translation = "리조트 결계에 와 있던 여자애들이 비명을 지른다."

[[dialogue]]
speaker_original = "ヤハト"
speaker_translation = "야하트"
original = "「全員動くな！\u3000動けば殺す！！」"
translation = "「전원 움직이지 마! 움직이면 죽인다!!」"

[[dialogue]]
speaker = "unk"
original = "突如としてビーチに出現したのは、無数の怪人たちであった。"
translation = "갑작스럽게 비치에 출현한 것은 무수한 괴인들이었다."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「これがミュータント……！」"
translation = "「이게 뮤턴트……!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「これまた、すごい団体さんのお出ましだね～……」"
translation = "「이거 또 엄청난 단체 손님이 행차하셨네~……」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「ついに現れたか。ユゴス」"
translation = "「드디어 나타났나. 유고스.」"

[[dialogue]]
speaker_original = "ヤハト"
speaker_translation = "야하트"
original = "「ククッ……久しいな、リコリンフィア。俺が誰だか分かるか？」"
translation = "「크크…… 오랜만이군, 리코린피아. 내가 누구인지 알아보겠나?」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「ああ。その声、忘れもしない。私が１４年前に捕まえ損ねたユゴス幹部……国際指名手配犯、異東ヤハトだな」"
translation = "「아아. 그 목소리, 잊지도 않았다. 내가 14년 전에 놓쳤던 유고스 간부…… 국제 수배범, 이토 야하토로군.」"

[[dialogue]]
speaker_original = "ヤハト"
speaker_translation = "야하트"
original = "「俺も１度たりとも、忘れたことはない――」"
translation = "「나 또한 단 한 번도 잊은 적이 없다──」"

[[dialogue]]
speaker_original = "ヤハト"
speaker_translation = "야하트"
original = "「貴様に日本支部を１度壊滅させられ、屈辱を味わう羽目になった、あの日からなぁ！！」"
translation = "「네놈에게 일본 지부를 한 번 괴멸당하고 굴욕을 맛보게 된 그날부터 말이다!!」"

[[dialogue]]
speaker_original = "ヤハト"
speaker_translation = "야하트"
original = "「お前ならどうせ、こちらの目的は見抜いているんだろう？」"
translation = "「너라면 어차피 이쪽의 목적은 간파하고 있겠지?」"

[[dialogue]]
speaker_original = "ヤハト"
speaker_translation = "야하트"
original = "「大人しく――緋宮クロトの身柄を引き渡せ」"
translation = "「순순히── 히노미야 쿠로토의 신변을 넘겨라.」"

[[dialogue]]
speaker = "unk"
original = "――俺は初日の夜、リコさんに呼び出された時のことを思い出していた。"
translation = "──나는 첫날 밤, 리코 씨에게 불려 갔을 때의 일을 떠올리고 있었다."

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「来たな、少年」"
translation = "「왔나, 소년.」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「言っていた通り、事前に敵が何者なのか、その目的について話しておこう」"
translation = "「말했던 대로 사전에 적이 누구인지, 그 목적에 대해 이야기해두지.」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「敵は、遥か昔より存在し、裏から世界を操ろうと蠢き続ける、星術犯罪組織『ユゴス』」"
translation = "「적은 아주 먼 옛날부터 존재하며, 뒤에서 세계를 조종하고자 꿈틀거림을 멈추지 않는 성술 범죄 조직 『유고스』.」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「連中の狙いは……少年。魔王であるキミを拉致することだ」"
translation = "「녀석들의 노림수는…… 소년. 마왕인 너를 납치하는 것이다.」"

[[dialogue]]
speaker = "unk"
original = "俺が目的……！？"
translation = "내가 목적……!?"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「ユゴスは昔から、世界を操れる『力』を求め続けてきた。金、権力、星力……」"
translation = "「유고스는 옛날부터 세계를 조종할 수 있는 『힘』을 갈구해 왔다. 돈, 권력, 성력……」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「故に、連中は少年に目を付けた。リクリエを１度退けてみせた魔王の力、更にはその体の中に封じ込められたリクリエの力に」"
translation = "「고로 녀석들은 소년을 눈여겨봤다. 리크리에를 한 번 물리쳐 보인 마왕의 힘, 더 나아가 그 몸 안에 봉인된 리크리에의 힘에 말이지.」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「ユゴスは今回、キミを拉致し、新たな力を手に入れる為の実験体にしようとしている」"
translation = "「유고스는 이번에 너를 납치하여 새로운 힘을 얻기 위한 실험체로 삼으려 하고 있다.」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「少年は現在、魔王の力が引き出せない不完全な状態だと聞いている。故に拉致するなら今が好機と判断したのだろう」"
translation = "「소년은 현재 마왕의 힘을 끌어낼 수 없는 불완전한 상태라고 들었다. 고로 납치하려면 지금이 호기라고 판단했겠지.」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「連中はキミがこれまでも公安委員会に密かに協力してきて、事件捜査に加わっていたことを知っている」"
translation = "「녀석들은 네가 지금까지도 공안위원회에 남몰래 협력해오며 사건 수사에 가담했다는 것을 알고 있다.」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「つまり、リゾート結界でヴェノマイザーの受け渡しが行われているという噂は、少年をおびき出す為の<b>ブラフ</b>だったというわけだ」"
translation = "「즉, 리조트 결계에서 베노마이저의 인계가 이루어지고 있다는 소문은 소년을 꾀어내기 위한 <b>블러프</b>였다는 소리다.」"

[[dialogue]]
speaker = "unk"
original = "俺の身柄を要求する怪人に対し、リコさんは強い視線を向ける。"
translation = "나의 신변을 요구하는 괴인을 향해 리코 씨는 강한 시선을 보낸다."

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「悪いが、少年の存在は学園――いや、三界における対リクリエの生命線だ。渡すわけにはいかない」"
translation = "「미안하지만, 소년의 존재는 학원── 아니, 삼계에 있어서 대 리크리에의 생명선이다. 넘겨줄 수는 없다.」"

[[dialogue]]
speaker_original = "ヤハト"
speaker_translation = "야하트"
original = "「そうだろうな。しかし、それが分かっていながら備えが甘かったな、リコリンフィア」"
translation = "「그렇겠지. 하지만 그걸 알면서도 대비가 허술했구나, 리코린피아.」"

[[dialogue]]
speaker_original = "ヤハト"
speaker_translation = "야하트"
original = "「今の俺は、１４年前とは比べ物にならない力を手に入れている！\u3000こうしてミュータントに変身することで、『空間操作』という新しい能力を得ているんだよ！！」"
translation = "「지금의 나는 14년 전과는 비교도 안 될 힘을 손에 넣었다! 이렇게 뮤턴트로 변신함으로써 『공간 조작』이라는 새로운 능력을 얻었단 말이다!!」"

[[dialogue]]
speaker_original = "ヤハト"
speaker_translation = "야하트"
original = "「その能力を使って空間転移を行えば、こうして１００体以上の軍勢を敵地に一瞬で送り込むことができるというわけだ！」"
translation = "「그 능력을 사용해 공간 전이를 행하면 이렇게 100체 이상의 군세를 적지에 순식간에 보낼 수 있다는 소리지!」"

[[dialogue]]
speaker_original = "ヤハト"
speaker_translation = "야하트"
original = "「つまり、貴様ら公安委員会が、少数でこそこそボディーガードしていたところで無意味！\u3000多勢に無勢というやつだ！！」"
translation = "「즉, 네놈들 공안위원회가 소수로 소곤소곤 보디가드 해봤자 무의미! 다과에는 장사 없다는 소리다!!」"

[[dialogue]]
speaker_original = "ヤハト"
speaker_translation = "야하트"
original = "「――ああ、ちなみに言っておくが、緋宮リノ。貴様が『空間魔法』を操る魔女であるということは、ちゃんと調査済みだぞ？」"
translation = "「──아아, 참고로 말해두지 히노미야 리노. 네놈이 『공간 마법』을 부리는 마녀라는 것은 이미 충분히 조사해 뒀다고?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker_original = "ヤハト"
speaker_translation = "야하트"
original = "「ククッ……馬鹿め。同じ空間に干渉できる能力持ちを警戒しないとでも思ったか？」"
translation = "「크크…… 바보 녀석. 같은 공간에 간섭할 수 있는 능력자를 경계하지 않았을 거라 생각했나?」"

[[dialogue]]
speaker_original = "ヤハト"
speaker_translation = "야하트"
original = "「ここへ侵入すると同時に、内側から転移魔法で逃げられないように、空間の境界を歪めてある」"
translation = "「여기로 침입하는 것과 동시에 안쪽에서 전이 마법으로 도망치지 못하도록 공간의 경계를 뒤틀어 놨다.」"

[[dialogue]]
speaker_original = "ヤハト"
speaker_translation = "야하트"
original = "「つまりは今、貴様たちは俺の作った『鳥籠の中の鳥』というわけだ！\u3000ハハハハハハッ！！！」"
translation = "「즉 지금 네놈들은 내가 만든 『새장 속의 새』라는 소리다! 하하하하하하!!」"

[[dialogue]]
speaker_original = "ヤハト"
speaker_translation = "야하트"
original = "「それと、わかっていると思うが、ここにいる一般人も大勢含めてな！\u3000こいつらは人質だ！\u3000貴様らが抵抗するなら、容赦なく殺す！！」"
translation = "「그리고 알고 있겠지만 여기 있는 일반인들도 잔뜩 포함해서다! 이놈들은 인질이다! 네놈들이 저항한다면 가차 없이 죽이겠다!!」"

[[dialogue]]
speaker_original = "ヤハト"
speaker_translation = "야하트"
original = "「まぁ、抵抗しようとしまいと、リコリンフィア！\u3000貴様ら目障りな公安委員会の連中はここで始末させて貰うがな！！\u3000ハハハハハッ！！！」"
translation = "「뭐, 저항하든 말든 리코린피아! 네놈들 눈에 가시 같은 공안위원회 녀석들은 여기서 처리해 주겠지만 말이야!! 하하하하핫!!」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「……異東。やはりお前は、厄介な奴だ。目的の為なら、どんな手段も厭わない。そうして、１４年前も逃げ切ってみせた」"
translation = "「……이토. 역시 너는 성가신 놈이군. 목적을 위해서라면 어떤 수단도 가리지 않아. 그렇게 14년 전에도 도망쳐 보였지.」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「だが、それも今日までだ」"
translation = "「하지만 그것도 오늘까지다.」"

[[dialogue]]
speaker_original = "ヤハト"
speaker_translation = "야하트"
original = "「何……？」"
translation = "「뭐……?」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「お前が気づかなかったことが２つある」"
translation = "「네가 눈치채지 못한 것이 두 가지 있다.」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「１つは、リゾート結界が２種類存在しているということだ」"
translation = "「하나는 리조트 결계가 두 종류 존재한다는 것이다.」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「一般人が出入りするパブリックビーチ。それに、学園の星徒会メンバーを含む、一部の生徒しか存在を知らないプライベートビーチ」"
translation = "「일반인이 출입하는 퍼블릭 비치. 그리고 학원의 성도회 멤버를 포함한 일부 학생밖에 존재를 모르는 프라이빗 비치.」"

[[dialogue]]
speaker_original = "ヤハト"
speaker_translation = "야하트"
original = "「ふん、俺がそれを知らないとでも思ったか？」"
translation = "「흥, 내가 그걸 모를 줄 알았나?」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「いや、知っているだろうと思っていたさ。だが、情報は調べていても、中がどんなところなのかまでは確認していなかった。違うか？」"
translation = "「아니, 알고 있을 거라 생각했다. 하지만 정보는 조사했어도 안이 어떤 곳인지는 확인하지 않았지. 아니냐?」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「それはおそらく、お前の空間転移は１度行ったことのある場所でないとできないからだ。その証拠に――」"
translation = "「그건 아마 네 공간 전이는 한 번 가본 적이 있는 장소가 아니면 불가능하기 때문이겠지. 그 증거로──」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「ここが<b>プライベート</b>ビーチの方であることに、今も気づいていない」"
translation = "「여기가 <b>프라이빗</b> 비치 쪽이라는 사실을 지금도 눈치채지 못하고 있다.」"

[[dialogue]]
speaker_original = "ヤハト"
speaker_translation = "야하트"
original = "「は……？\u3000何を言っている？\u3000一般人がこんなにも大勢いるのに……」"
translation = "「하……? 무슨 소리를 하는 거냐? 일반인이 이렇게나 잔뜩 있는데……」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「本当に一般人か、ちゃんと確かめたのか？」"
translation = "「진짜 일반인인지 제대로 확인은 해봤나?」"

[[dialogue]]
speaker_original = "部下の怪人"
speaker_translation = "부하 괴인"
original = "「がっ……！？」"
translation = "「커헉……!?」"

[[dialogue]]
speaker = "unk"
original = "突然、怪人の１体が倒れる。"
translation = "갑자기 괴인 중 한 마리가 쓰러진다."

[[dialogue]]
speaker = "unk"
original = "その背後に立っていたのは――"
translation = "그 배후에 서 있던 것은──"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「にんにん♪\u3000切り捨て御免でござる！」"
translation = "「닌닌♪ 베어 넘기기 용서를 구하오!」"

[[dialogue]]
speaker_original = "ヤハト"
speaker_translation = "야하트"
original = "「なっ……！？」"
translation = "「나니……!?」"

[[dialogue]]
speaker_original = "部下の怪人"
speaker_translation = "부하 괴인"
original = "「ぎゃっ！？」"
translation = "「갸악!?」"

[[dialogue]]
speaker_original = "部下の怪人"
speaker_translation = "부하 괴인"
original = "「ぐあぁっ！」"
translation = "「구아악!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「悪・即・善。２体頂きですわ♪」"
translation = "「악·즉·선. 두 마리 챙겼어요♪」"

[[dialogue]]
speaker_original = "部下の怪人"
speaker_translation = "부하 괴인"
original = "「かはっ……！？」"
translation = "「커헉……!?」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「よぉ、異東。海外では世話になったな。借りを返しに来たぜ」"
translation = "「요오, 이토. 해외에서는 신세 졌었지. 빚을 갚으러 왔다구.」"

[[dialogue]]
speaker_original = "ヤハト"
speaker_translation = "야하트"
original = "「貴様、<ruby>猟犬<rt>ハウンドドッグ</rt></ruby>……！」"
translation = "「네놈, 사냥개……!」"

[[dialogue]]
speaker_original = "ヤハト"
speaker_translation = "야하트"
original = "「まさか、ここにいる連中は全員……！？」"
translation = "「설마 여기 있는 녀석들 전원이……!?」"

[[dialogue]]
speaker = "unk"
original = "そう。このビーチにいる水着の人たちは全員、一般人などではなく――"
translation = "그렇다. 이 비치에 있는 수영복 차림의 사람들은 전원 일반인 같은 게 아니라──"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「そう――」"
translation = "「그래──」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「公安委員会のエージェント、総員集結だ」"
translation = "「공안위원회의 에이전트, 총원 집결이다.」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「にひひ♪\u3000そういうこと☆」"
translation = "「니히히♪ 그렇게 된 거지☆」"

[[dialogue]]
speaker = "unk"
original = "一般人に偽装していた公安委員会のエージェント達。"
translation = "일반인으로 위장하고 있던 공안위원회의 에이전트들."

[[dialogue]]
speaker = "unk"
original = "俺の知らないメンバーも含め、その全員が戦闘フォームに変身し、一斉にミュータントたちへと武器を構えるのだった――"
translation = "내가 모르는 멤버들을 포함해 그 전원이 전투 폼으로 변신하여 일제히 뮤턴트들을 향해 무기를 겨누는 것이었다──"

