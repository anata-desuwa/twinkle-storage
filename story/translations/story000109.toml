[[dialogue]]
speaker = "unk"
original = "果たして、寮長の最強タッグチームにより、アステライト内部のコア破壊に成功。"
translation = "과연 기숙사장의 최강 태그 팀에 의해 아스텔라이트 내부의 코어 파괴에 성공."

[[dialogue]]
speaker = "unk"
original = "アステラは他の星徒会メンバーが駆け付ける前に、消滅が確認された。"
translation = "아스텔라는 다른 성도회 멤버들이 달려오기 전에 소멸이 확인되었다."

[[dialogue]]
speaker = "unk"
original = "その翌日。俺たちはバトルウィークの結果発表のために、カフェテリアへと集合していた――"
translation = "그 다음 날. 우리들은 배틀 위크의 결과 발표를 위해 카페테리아로 모여 있었다──"

[[dialogue]]
speaker = "フェニエル"
original = "「――では、以上になりまして、ポイント差は変わらず、Ｓクラスモンスター１体分のスコア差で、<ruby>流星寮<rt>イルソーレ</rt></ruby>……ひいては流星学園の勝利、となります」"
translation = "「──그럼 이상으로, 포인트 차이는 변함없이 S클래스 몬스터 1마리 분의 스코어 차이로, <ruby>유성 기숙사<rt>일 소레</rt></ruby>…… 나아가 유성학원의 승리가 되겠습니다.」"

[[dialogue]]
speaker = "マハムート"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "フェニエル"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "マハムート"
original = "「会長？\u3000そういうわけだから、明日から<ruby>新星寮<rt>ラルーナ</rt></ruby>にあなたの部屋はないわ」"
translation = "「회장? 그렇게 됐으니까 내일부터 <ruby>신성료<rt>라루나</rt></ruby>에 당신 방은 없어.」"

[[dialogue]]
speaker = "unk"
original = "俺もともと実家住みなんですけど！？"
translation = "나 원래 본가 사는데요!?"

[[dialogue]]
speaker = "マハムート"
original = "「少し寂しいけど、流星学園生になっても、あなたのことは忘れないわ……」"
translation = "「조금 쓸쓸하지만, 유성학원생이 되어도 당신을 잊지 않을게……」"

[[dialogue]]
speaker = "unk"
original = "いや寂しがる前に、焦ったり交渉したり、もっとすることあるんじゃないですかね！？"
translation = "아니, 쓸쓸해하기 전에 당황하거나 협상하거나 더 할 일이 있지 않나요!?"

[[dialogue]]
speaker = "フェニエル"
original = "「や、やりましたか……！？\u3000もしかして会長さん、イルソーレにいただける感じでしょうか……っ」"
translation = "「해, 해냈나요……!? 혹시 회장님, 일 소레에 주시는 느낌일까요……!」"

[[dialogue]]
speaker = "unk"
original = "ほら、フニが本気にしちゃってる！"
translation = "봐, 후니가 진심으로 받아들이고 있잖아!"

[[dialogue]]
speaker = "マハムート"
original = "「確かに、フニが相手だと、私の存在しないはずの良心が痛むわね。ここは竜の頭も下げ時かしら？」"
translation = "「확실히 후니가 상대라면 내 존재하지도 않을 양심이 찔리네. 여기선 용의 머리라도 숙여야 할 때일까?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「…………ませんわ」"
translation = "「…………못 하겠어요.」"

[[dialogue]]
speaker = "マハムート"
original = "「ん？\u3000何か言った？\u3000ヒルディオーネ」"
translation = "「응? 뭐라 그랬어? 힐디오네.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「納得できません、と言ったのですわ……！」"
translation = "「납득할 수 없다고 말한 거예요……!」"

[[dialogue]]
speaker = "フェニエル"
original = "「ひぅ！？\u3000……お、お姉様？」"
translation = "「히익!? ……어, 언니분?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「そもそも最終日前日とスコアが一緒なのは、昨日のアステラ攻略が流星と新星で、まったくの同ポイントが入っているからですのよ！？」"
translation = "「애초에 최종일 전날과 스코어가 같은 건 어제 아스텔라 공략이 유성과 신성에서 완전히 똑같은 포인트가 들어왔기 때문이라고요!」"

[[dialogue]]
speaker = "マハムート"
original = "「それはそうよ。そういうルールだもの」"
translation = "「그건 그렇지. 그런 규칙이니까.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「それが納得いかないと言っていますの！」"
translation = "「그게 납득이 안 간다고 말하는 겁니다!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「認めたくはありませんが、昨日のアステラ攻略で目立った戦果をあげていたのは、緋宮会長とマムですわっ！」"
translation = "「인정하고 싶지는 않지만, 어제 아스텔라 공략에서 눈에 띄는 전과를 올린 건 히노미야 회장과 마무입니다!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「緋宮会長のアステラ内部のルートマッピングは見事な手腕でしたし、全体を見回しての指示は実にエレガントなものでしたわ！」"
translation = "「히노미야 회장의 아스텔라 내부 루트 매핑은 훌륭한 수완이었고, 전체를 둘러보며 내린 지시는 실로 엘레강트했습니다!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「それにマム！\u3000ボス戦において、敵を怯ませ大技を叩き込む隙を作ったのも、ラストアタックして仕留めたのも、あなたですのよ！？」"
translation = "「거기에 마무! 보스전에서 적을 움찔하게 만들어 큰 기술을 꽂아 넣을 틈을 만든 것도, 라스트 어택으로 숨통을 끊은 것도 당신이잖아요!?」"

[[dialogue]]
speaker = "マハムート"
original = "「その通りだけれど、そこはスコアに影響しないってルールでしょう？\u3000私たちは学園対抗杯のルールに則って勝負をしていたのだし」"
translation = "「그 말이 맞긴 하지만, 그건 스코어에 영향이 없다는 규칙이잖아? 우리는 학원 대항배의 규칙에 의거해서 승부를 하고 있었던 거고.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「正論ですわ。正論ですけれど……それでも！」"
translation = "「정론입니다. 정론입니다만…… 그래도!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「マハムート！\u3000あなたは少し、泥臭さが足りないのではなくって！？」"
translation = "「마하무트! 당신은 조금 끈질김이 부족한 것 아니겠어요!?」"

[[dialogue]]
speaker = "マハムート"
original = "「む……どういう意味よ」"
translation = "「음…… 무슨 의미야?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「勝負の世界は確かに結果が全てですわ……ですが！」"
translation = "「승부의 세계는 확실히 결과가 전부입니다…… 하지만!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「私たち星騎士にとって本当の勝利とは、リクリエに打ち勝つことのはずですわ！」"
translation = "「우리 성기사에게 있어 진정한 승리란 리크리에를 이겨내는 것이어야 합니다!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「学園対抗杯は確かに重要な指標ではありますが、手段と目的を履き違えてはいけませんの」"
translation = "「학원 대항배는 확실히 중요한 지표이긴 합니다만, 수단과 목적을 착각해서는 안 됩니다.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「リクリエへの勝利に繋がる戦果をあげたのなら、きちんと主張なさいな！」"
translation = "「리크리에에 대한 승리로 이어지는 전과를 올렸다면 제대로 주장하세요!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「私は事前のルールブックになかったからと言って、その功績を無視するほど、器は小さくありませんことよ！」"
translation = "「저는 사전 룰북에 없었다고 해서 그 공적을 무시할 정도로 속이 좁지 않답니다!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「私達は共に競い、戦うライバルでしょう！？」"
translation = "「우리는 함께 경쟁하고 싸우는 라이벌이잖아요!?」"

[[dialogue]]
speaker = "マハムート"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "マハムート"
original = "「……コホン。まあ、そうね。あなたの言うことも一理あるわ」"
translation = "「……큼큼. 뭐, 그래. 당신 말도 일리가 있어.」"

[[dialogue]]
speaker = "マハムート"
original = "「ただ、細やかな功績なんて主張し合っていたら、キリがないでしょう？」"
translation = "「다만 사소한 공적 같은 걸 서로 주장하기 시작하면 끝이 없잖아?」"

[[dialogue]]
speaker = "マハムート"
original = "「成績の数値化は重要な指標だし、そのためには捨象される要素はどうしたって生まれるものだわ」"
translation = "「성적의 수치화는 중요한 지표고, 그러기 위해 사장되는 요소는 어떻게든 생겨나기 마련이야.」"

[[dialogue]]
speaker = "マハムート"
original = "「というわけで、今回は私の負け１よ。会長を取られてしまうのはさすがに困るから、それ以外の何かで補填させてもらえないかしら？」"
translation = "「그런 고로 이번에는 나의 1패야. 회장을 뺏기는 건 역시 곤란하니까 그 이외의 무언가로 보전하게 해줄 수 없을까?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「いーえ、そんなの許しませんわ！\u3000妃竜院マハムートは、そんな簡単に他人に負けを認めたりしないんですの！」"
translation = "「아뇨, 그런 건 허락 못 해요! 키류인 마하무트는 그렇게 쉽게 타인에게 패배를 인정하거나 하지 않는답니다!」"

[[dialogue]]
speaker = "unk"
original = "なんか面倒臭いこと言い出した！？"
translation = "뭔가 귀찮은 소리를 하기 시작했어!?"

[[dialogue]]
speaker = "マハムート"
original = "「私がせっかく負けでいいって言ってるんだから、ごちゃごちゃ言ってないで有難く受け取りなさい！」"
translation = "「내가 모처럼 져도 좋다고 하는데 투덜대지 말고 감사히 받아!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「い・や・で・す・わ～～～っ！」"
translation = "「싫·습·니·다·와~~~!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「私は正々堂々あなたと勝負して、完膚なきまでに勝利したいのですわ！」"
translation = "「저는 정정당당하게 당신과 승부해서 완벽하게 승리하고 싶단 말이에요!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「こんなお情けでもらったみたいな、試合で勝って勝負に負けた～、みたいなおこぼれの勝利など、要りませんの！」"
translation = "「이런 동정으로 받은 것 같은, 시합에서 이기고 승부에서 졌다~ 같은 부스러기 승리 따위 필요 없답니다!」"

[[dialogue]]
speaker = "マハムート"
original = "「ああもう、面倒臭い女ね！\u3000私に勝っておいて、素直に喜ばないなんて生意気よ！\u3000この捻じれドリル！」"
translation = "「아아 정말, 귀찮은 여자네! 나한테 이겨놓고 솔직하게 기뻐하지 않다니 건방져! 이 꼬인 드릴!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「あなたにだけは言われたくありませんわ！\u3000捻くれドラゴン！」"
translation = "「당신한테만은 듣고 싶지 않아요! 꼬인 드래곤!」"

[[dialogue]]
speaker = "unk"
original = "そこから、マムと千園寺先輩はグダグダな揚げ足取りとマウント合戦に移行していった――"
translation = "거기서부터 마무와 센온지 선배는 지루한 말꼬리 잡기와 기싸움으로 이행해 갔다──"

[[dialogue]]
speaker = "フェニエル"
original = "「……なんだか私、少しだけわかった気がします」"
translation = "「……왠지 저, 조금은 알 것 같은 기분이 들어요.」"

[[dialogue]]
speaker = "unk"
original = "フニ、わかったって……何を？"
translation = "후니, 알 것 같다니…… 뭘?"

[[dialogue]]
speaker = "フェニエル"
original = "「会長さんが、最初に言っていたこと……お姉様とマムにとって、喧嘩は挨拶みたいなもの、っていうお話のことです」"
translation = "「회장님이 처음에 말씀하셨던 것…… 언니분과 마무에게 있어 싸움은 인사 같은 것이라는 이야기 말이에요.」"

[[dialogue]]
speaker = "フェニエル"
original = "「私には今まで、年の近い友達や、何かを競い合えるライバルなんて、いませんでした……」"
translation = "「저에게는 지금까지 또래 친구나 무언가를 겨룰 수 있는 라이벌 같은 건 없었어요……」"

[[dialogue]]
speaker = "フェニエル"
original = "「だから私にとって……喧嘩っていうのは、嫌いな人とするお別れのことなんだって、思っていました」"
translation = "「그래서 저에게 있어…… 싸움이라는 건 싫어하는 사람과 하는 작별이라고 생각했어요.」"

[[dialogue]]
speaker = "フェニエル"
original = "「でも、人と人との関係には色々あって……仲良く喧嘩するっていう、素敵な関係があることを知ったんです」"
translation = "「하지만 사람과 사람의 관계에는 여러 가지가 있고…… 사이좋게 싸운다는 멋진 관계가 있다는 걸 알게 됐어요.」"

[[dialogue]]
speaker = "フェニエル"
original = "「会長さん……私にもいつか、仲良く喧嘩してくれるようなライバルが、できるでしょうか？」"
translation = "「회장님…… 저에게도 언젠가 사이좋게 싸워줄 수 있는 라이벌이 생길까요?」"

[[dialogue]]
speaker = "unk"
original = "俺達だって、もう競い合ったライバルだろ？"
translation = "우리들도 이미 서로 경쟁한 라이벌이잖아?"

[[dialogue]]
speaker = "フェニエル"
original = "「あ……！」"
translation = "「아……!」"

[[dialogue]]
speaker = "フェニエル"
original = "「はいっ、会長さん♪」"
translation = "「네, 회장님♪」"

[[dialogue]]
speaker = "フェニエル"
original = "「あの……私、もっと強くなりますっ」"
translation = "「저기…… 저, 더 강해질게요.」"

[[dialogue]]
speaker = "フェニエル"
original = "「そしていつか……お姉様やマムにも、喧嘩してもらうんです！」"
translation = "「그리고 언젠가…… 언니분이나 마무와도 싸울 거예요!」"

[[dialogue]]
speaker = "フェニエル"
original = "「そのときはきっと、会長さんも一緒に、ですよ？」"
translation = "「그때는 분명 회장님도 함께예요?」"

[[dialogue]]
speaker = "unk"
original = "フニはそう言って、嬉しそうに微笑むのだった――"
translation = "후니는 그렇게 말하며 기쁜 듯이 미소 짓는 것이었다──"

