[[dialogue]]
speaker = "unk"
original = "第３話,お泊り明けの朝,P"
translation = "제3화, 외박 후의 아침, P"

[[dialogue]]
speaker = "unk"
original = "ジュエリーが俺の家に遊びに来ていた翌日。"
translation = "쥬얼리가 나의 집에 놀러 와 있었던 다음 날."

[[dialogue]]
speaker = "ジュエリー"
original = "「ふわぁ～……眠い……」"
translation = "「후아아~…… 졸려……」"

[[dialogue]]
speaker = "unk"
original = "ジュエリー、大丈夫？"
translation = "쥬얼리, 괜찮아?"

[[dialogue]]
speaker = "ジュエリー"
original = "「ああ。しかし、星騎士はこういう時、着替えがなくてもいいから便利だね。戦闘服に変身すれば済む」"
translation = "「아아. 하지만, 성기사는 이럴 때, 갈아입을 옷이 없어도 되니까 편리하군. 전투복으로 변신하면 그만이다」"

[[dialogue]]
speaker = "ジュエリー"
original = "「おっと、ぼーっと歩いている間に学園の前まで着いてしまった。助手、それではまたお昼休みにカフェテリアで」"
translation = "「이런, 멍하니 걷는 사이에 학원 앞까지 도착해 버렸군. 조수, 그럼 또 점심시간에 카페테리아에서」"

[[dialogue]]
speaker = "unk"
original = "俺は手を振ってジュエリーと別れ、新星学園の校舎へと向かった。"
translation = "나는 손을 흔들어 쥬얼리와 헤어져, 신성학원의 교사로 향했다."

[[dialogue]]
speaker = "ミネコ"
original = "「あっ、ジュエリー、おはよ～♪」"
translation = "「앗, 쥬얼리, 안녕~♪」"

[[dialogue]]
speaker = "ミネコ"
original = "「――って、あれ？\u3000ジュエリー、どうして寮と反対方向から？\u3000それに、さっき一緒に歩いてたのって会長だよね？」"
translation = "「――어라? 쥬얼리, 어째서 기숙사와 반대 방향에서? 게다가, 방금 같이 걷던 거 회장님이지?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ん？\u3000ああ……ここだけの話で秘密にして欲しいのだが、昨日は助手の家に泊まりだったんだ」"
translation = "「응? 아아…… 우리끼리만 아는 비밀로 해 줬으면 좋겠는데, 어제는 조수의 집에서 자고 왔어」"

[[dialogue]]
speaker = "ミネコ"
original = "「えっ！？\u3000そ、それって……」"
translation = "「엣!? 그, 그거란 건……」"

[[dialogue]]
speaker = "ジュエリー"
original = "「大体想像がつくだろう？\u3000つまりは……そういうことだ」"
translation = "「대충 짐작이 가겠지? 즉…… 그런 거다」"

[[dialogue]]
speaker = "ミネコ"
original = "「なっ……！？」"
translation = "「나닛……!?」"

[[dialogue]]
speaker = "ミネコ"
original = "「そ、その……随分と眠そうだけど……そんなに夜遅くまでしてたの？」"
translation = "「그, 그…… 굉장히 졸려 보이는데…… 그렇게 밤늦게까지 한 거야?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「いや……つい徹夜で、朝までしてしまったよ」"
translation = "「아니…… 그만 철야로, 아침까지 해 버렸어」"

[[dialogue]]
speaker = "ミネコ"
original = "「朝まで！？」"
translation = "「아침까지!?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ふふっ、つい盛り上がってしまってね……」"
translation = "「후훗, 그만 분위기가 고조되어 버려서 말이야……」"

[[dialogue]]
speaker = "ミネコ"
original = "「そ、そんなにすごかったの……？」"
translation = "「그, 그렇게 대단했던 거야……?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ああ。今回は特にすごかった……。ミネコもやってみれば、すぐにわかるさ」"
translation = "「아아. 이번에는 특히 대단했어……. 미네코도 해 보면, 금방 알 거야」"

[[dialogue]]
speaker = "ミネコ"
original = "「や、やってみればって……」"
translation = "「해, 해 보면이라니……」"

[[dialogue]]
speaker = "ジュエリー"
original = "「キミも興味があるだろう？\u3000私たちと一緒にしてみればいい」"
translation = "「키미도 흥미가 있지 않나? 우리와 함께 해 보면 돼」"

[[dialogue]]
speaker = "ミネコ"
original = "「３人で！？」"
translation = "「셋이서!?」"

[[dialogue]]
speaker = "ミネコ"
original = "「ちょ、ちょっと待って！\u3000ジュエリーはそれでいいの！？」"
translation = "「잠, 잠깐 기다려! 쥬얼리는 그걸로 괜찮은 거야!?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ん？\u3000まあ、助手と２人きりでする時間は、もちろん譲りたくはないが……」"
translation = "「응? 뭐, 조수와 단둘이서 하는 시간은, 물론 양보하고 싶지 않지만……」"

[[dialogue]]
speaker = "ジュエリー"
original = "「３人でするなら、別に構わないよ。助手も歓迎するだろうしね」"
translation = "「셋이서 한다면, 별로 상관없어. 조수도 환영할 테고 말이야」"

[[dialogue]]
speaker = "ミネコ"
original = "「歓迎しちゃうの！？」"
translation = "「환영해 버리는 거야!?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「それでどうする？\u3000キミがよければ、今日の夜でも構わないが」"
translation = "「그래서 어떻게 할래? 키미가 괜찮다면, 오늘 밤이라도 상관없는데」"

[[dialogue]]
speaker = "ミネコ"
original = "「徹夜でしてたのに！？」"
translation = "「철야로 했다면서!?」"

[[dialogue]]
speaker = "ミネコ"
original = "「……ちょっ――」"
translation = "「……잠깐――」"

[[dialogue]]
speaker = "ミネコ"
original = "「ちょっと……考えさせて欲しい……かな……」"
translation = "「잠깐…… 생각하게 해 줬으면…… 좋겠어……」"

[[dialogue]]
speaker = "unk"
original = "昼休み、俺はいつも通りジュエリーと昼食をとろうと、カフェテリアで待っていると――"
translation = "점심시간, 나는 평소대로 쥬얼리와 점심을 먹으려고, 카페테리아에서 기다리고 있자니――"

[[dialogue]]
speaker = "ジュエリー"
original = "「やあ、助手」"
translation = "「여어, 조수」"

[[dialogue]]
speaker = "unk"
original = "ジュエリー、元気な顔になったね"
translation = "쥬얼리, 활기찬 얼굴이 되었네"

[[dialogue]]
speaker = "ジュエリー"
original = "「ああ。恥ずかしながら、授業中にいつの間にか意識が飛んで、気づけば小一時間ほど居眠りしてしまっていてね……」"
translation = "「아아. 부끄럽게도, 수업 중에 어느새 의식이 끊겨서, 깨닫고 보니 한 시간 정도 낮잠을 자 버려서 말이지……」"

[[dialogue]]
speaker = "ジュエリー"
original = "「しかし、そのおかげで随分と頭の中がスッキリして、思考が回るようになったよ」"
translation = "「하지만, 덕분에 상당히 머릿속이 상쾌해져서, 사고가 돌아가게 되었어」"

[[dialogue]]
speaker = "ミネコ"
original = "「あっ……！\u3000か、会長とジュエリー……！」"
translation = "「앗……! 회, 회장님이랑 쥬얼리……!」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ああ、ミネコ。キミも一緒に昼食にするかい？」"
translation = "「아아, 미네코. 키미도 같이 점심 먹겠나?」"

[[dialogue]]
speaker = "ミネコ"
original = "「え、えっと……その……」"
translation = "「어, 에또…… 그……」"

[[dialogue]]
speaker = "ミネコ"
original = "「ま、まだ私は心の準備ができてないから、２人でごゆっくり～～～っ！」"
translation = "「아, 아직 나는 마음의 준비가 안 됐으니까, 둘이서 오붓하게 즐기라고~~~!」"

[[dialogue]]
speaker = "unk"
original = "あれ？\u3000ミネコ、一体どうしたんだ……？"
translation = "어라? 미네코, 도대체 왜 저러지……?"

[[dialogue]]
speaker = "ジュエリー"
original = "「ふむ……そういえば……」"
translation = "「흠…… 그러고 보니……」"

[[dialogue]]
speaker = "unk"
original = "ジュエリーはしばし考え込むような顔をした後……"
translation = "쥬얼리는 잠시 고민하는 듯한 표정을 지은 뒤……"

[[dialogue]]
speaker = "ジュエリー"
original = "「――もしかしたら、ミネコには変な勘違いをされているかもしれないな」"
translation = "「――어쩌면, 미네코가 이상한 오해를 하고 있을지도 모르겠군」"

[[dialogue]]
speaker = "ジュエリー"
original = "「実は、今朝――」"
translation = "「실은, 오늘 아침에――」"

[[dialogue]]
speaker = "unk"
original = "それから俺は、今朝ミネコとした会話の内容を聞かされた。"
translation = "그리고 나는, 오늘 아침 미네코와 나누었다는 대화 내용을 들었다."

[[dialogue]]
speaker = "ジュエリー"
original = "「――その時は眠気で考えが回らなかったが、もしかするとミネコは、昨日発売された新作ゲームとは別の意味に捉えたのかもしれない」"
translation = "「――그때는 잠결이라 생각이 미처 돌아가지 않았지만, 혹시 미네코는 어제 발매된 신작 게임과는 다른 의미로 받아들였을지도 몰라」"

[[dialogue]]
speaker = "unk"
original = "そう、昨日はまたジュエリーが俺の家に遊びに来て、その日発売されたばかりの新作ゲームを２人で遊んでいたのだ。"
translation = "그래, 어제는 또 쥬얼리가 우리 집에 놀러 와서, 그날 막 발매된 신작 게임을 둘이서 플레이했었다."

[[dialogue]]
speaker = "unk"
original = "巨大な敵を最大４人で狩る人気アクションゲームの最新作で、これが歴代で１番と言っていい程に出来がよく、２人して徹夜で熱中してしまったのだった。"
translation = "거대한 적을 최대 4명이서 사냥하는 인기 액션 게임의 최신작으로, 역대 최고라고 해도 좋을 만큼 완성도가 높아 둘이서 밤을 새워 열중해 버린 것이었다."

[[dialogue]]
speaker = "unk"
original = "それは後で誤解を解かないと恥ずかしいな……"
translation = "그건 나중에 오해를 풀지 않으면 부끄럽겠는걸……"

[[dialogue]]
speaker = "ジュエリー"
original = "「助手の家にお泊りしてしまったのは事実だがね」"
translation = "「조수의 집에서 자고 간 것은 사실이지만 말이야」"

[[dialogue]]
speaker = "ジュエリー"
original = "「――私が寮に帰るのを面倒臭いと言い出すから？」"
translation = "「――내가 기숙사에 돌아가는 게 귀찮다고 말을 꺼내서?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ふふっ……昨日は本当に楽しかったのだから、仕方ないだろう？」"
translation = "「후훗…… 어제는 정말 즐거웠으니까, 어쩔 수 없잖아?」"

[[dialogue]]
speaker = "unk"
original = "彼女はそう言うと、そっと顔を寄せて、耳元で囁く。"
translation = "그녀는 그렇게 말하며 슬그머니 얼굴을 가까이 대고, 귓가에 속삭인다."

[[dialogue]]
speaker = "ジュエリー"
original = "「キミとスキンシップするのもいいが……昨日はゲームを通してイチャイチャさせてもらったわけだ」"
translation = "「너와 스킨십을 하는 것도 좋지만…… 어제는 게임을 통해서 꽁냥거린 셈이지」"

[[dialogue]]
speaker = "ジュエリー"
original = "「あれほどゲームをするのが楽しいと感じたのは久しぶりだよ。キミも同じだったら嬉しいのだが……どうだったかな？」"
translation = "「그렇게나 게임을 하는 게 즐겁다고 느낀 건 오랜만이야. 너도 똑같았다면 기쁘겠는데…… 어땠을까?」"

[[dialogue]]
speaker = "unk"
original = "俺もすごく楽しかった"
translation = "나도 정말 즐거웠어"

[[dialogue]]
speaker = "ジュエリー"
original = "「そうか。ふふっ♪」"
translation = "「그래. 후훗♪」"

[[dialogue]]
speaker = "ジュエリー"
original = "「なら、あながちミネコに言ったことも、間違いではないかもしれないな♪\u3000それに――」"
translation = "「그렇다면, 딱히 미네코에게 한 말도 틀린 건 아닐지도 모르겠네♪ 게다가――」"

[[dialogue]]
speaker = "ジュエリー"
original = "「今の内に慣れておけば……後で本当になった時に、言い訳が楽かもしれないよ？\u3000……なんてね。ふふふっ<emoji=heart04>」"
translation = "「지금부터 익숙해져 두면…… 나중에 진짜가 되었을 때, 변명하기 편할지도 몰라? ……농담이야. 후후훗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "言葉の意味を考えて、それがわかると、思わずドキドキしてしまう俺なのであった――"
translation = "말의 의미를 생각하고, 그것을 깨닫자 나도 모르게 두근거리고 마는 나였다――"

