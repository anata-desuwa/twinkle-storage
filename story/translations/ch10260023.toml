[[dialogue]]
speaker = "unk"
original = "第３話,後輩彼女はじゃれ合いたい,P"
translation = "제3화, 후배 여자친구는 장난치고 싶어, P"

[[dialogue]]
speaker = "unk"
original = "とある休日。リーリアが俺の家に遊びに来ていたのだが――"
translation = "어느 휴일. 리리아가 우리 집에 놀러 왔는데――"

[[dialogue]]
speaker = "リーリア"
original = "「センパイはもっと、私のこと雑に扱って下さい！」"
translation = "「선배는 좀 더 저를 막 대해 주세요!」"

[[dialogue]]
speaker = "unk"
original = "いきなりどういうこと！？"
translation = "갑자기 무슨 소리야!?"

[[dialogue]]
speaker = "リーリア"
original = "「私、気づいたんです。最近のセンパイ……私のことを全然イジってくれないじゃないですか！」"
translation = "「저 깨달았어요. 요즘 선배…… 저를 전혀 안 놀려 주잖아요!」"

[[dialogue]]
speaker = "リーリア"
original = "「２度目の告白する前はもっと、私が構ってアピールしたら、適当にあしらったり、可愛いアピールしたら容赦ない毒舌ツッコミを入れるのが定番だったのに！」"
translation = "「두 번째 고백하기 전에는 제가 놀아달라고 어필하면 적당히 흘려보내거나, 귀여운 척하면 가차 없는 독설 태클을 거는 게 정석이었는데!」"

[[dialogue]]
speaker = "unk"
original = "今は前よりも距離感が近くなったし"
translation = "지금은 전보다 거리감이 가까워졌고."

[[dialogue]]
speaker = "unk"
original = "いや、それは……"
translation = "아니, 그건……"

[[dialogue]]
speaker = "リーリア"
original = "「そう、それです！\u3000確かに私は、センパイに好きって思ったら、素直に口にするようになりました！」"
translation = "「맞아요, 그거예요! 확실히 저는 선배에게 좋아한다고 생각하면 솔직하게 입 밖으로 내게 됐어요!」"

[[dialogue]]
speaker = "リーリア"
original = "「ですが！\u3000私としては、前のイジりイジられる関係も楽しかったっていうか……」"
translation = "「하지만! 저로서는 예전의 장난치고 장난 받아주는 관계도 즐거웠달까……」"

[[dialogue]]
speaker = "リーリア"
original = "「それに、距離感が近くなったはずなのに、センパイ、２度目の告白以降、私に全然キスしてくれないじゃないですか！」"
translation = "「게다가 거리감이 가까워졌을 텐데 선배, 두 번째 고백 이후로 저한테 전혀 키스 안 해주잖아요!」"

[[dialogue]]
speaker = "unk"
original = "う……それは……"
translation = "으…… 그건……"

[[dialogue]]
speaker = "リーリア"
original = "「私がセンパイに秘密を作らないようにしてるんですから、センパイも秘密にしないで、ちゃんと言って下さい！」"
translation = "「제가 선배에게 비밀을 만들지 않으려고 하고 있으니까 선배도 비밀로 하지 말고 제대로 말해 주세요!」"

[[dialogue]]
speaker = "unk"
original = "観念した俺は、リーリアに事情を話すことにした。"
translation = "체념한 나는 리리아에게 사정을 이야기하기로 했다."

[[dialogue]]
speaker = "リーリア"
original = "「――なるほど。キスできなかったのは、センパイが私のことをもっと大切にしたいと思っているからだと……つまり――」"
translation = "「――과연. 키스하지 못했던 건 선배가 저를 좀 더 소중히 여기고 싶다고 생각했기 때문이라고…… 즉――」"

[[dialogue]]
speaker = "リーリア"
original = "「私が可愛すぎる故に、センパイが惚れ直しちゃったってことですね♪」"
translation = "「제가 너무 귀여운 나머지 선배가 다시 반해버렸다는 거네요♪」"

[[dialogue]]
speaker = "unk"
original = "仰る通りです"
translation = "말씀하신 대로입니다."

[[dialogue]]
speaker = "リーリア"
original = "「いや、そこは前みたいな、『はいはい、そうだね、可愛いねー』って雑なツッコミをして欲しかったんですけど！」"
translation = "「아니, 거기서는 예전처럼 『네네, 그래요, 귀엽네요─』라고 대충 태클을 걸어주길 바랐는데요!」"

[[dialogue]]
speaker = "リーリア"
original = "「……そんなに素直に頷かれてしまうと、むしろリアクションに困るというか……寂しいというか……」"
translation = "「……그렇게 솔직하게 고개를 끄덕여 버리시면 오히려 리액션하기 곤란하달까…… 서운하달까……」"

[[dialogue]]
speaker = "リーリア"
original = "「う～ん……やっぱりここは１つ、テコ入れをすべきですね」"
translation = "「으음…… 역시 여기서는 한 번 손을 좀 써야겠네요.」」"

[[dialogue]]
speaker = "unk"
original = "彼女はしばし考えるような顔をして――"
translation = "그녀는 잠시 생각하는 듯한 얼굴을 하더니――"

[[dialogue]]
speaker = "リーリア"
original = "「よし！\u3000じゃあ、こうしましょう。え～いっ☆」"
translation = "「좋아! 그럼 이렇게 하죠. 에잇☆」"

[[dialogue]]
speaker = "unk"
original = "うわっ！？\u3000リーリア、一体何を……！？"
translation = "우와앗!? 리리아, 대체 뭘……!?"

[[dialogue]]
speaker = "unk"
original = "俺は彼女と並んでソファーに座っていたのだが、彼女から押し倒されてしまう。"
translation = "나는 그녀와 나란히 소파에 앉아 있었는데 그녀에게 밀려 넘어가고 만다."

[[dialogue]]
speaker = "リーリア"
original = "「センパイ、私……今からセンパイを襲っちゃいます<emoji=heart04>」"
translation = "「선배, 저…… 지금부터 선배를 덮쳐버릴 거예요<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「なので、嫌な時は嫌だって、ちゃんと言って下さいね？\u3000そうしたら、すぐに止めますから」"
translation = "「그러니까 싫을 때는 싫다고 제대로 말씀해 주세요? 그러면 바로 멈출 테니까요.」"

[[dialogue]]
speaker = "リーリア"
original = "「セ～ンパイ<emoji=heart04>\u3000大好きです……ちゅっ……ちゅっ……<emoji=heart04>」"
translation = "「선～배<emoji=heart04> 정말 좋아해요…… 츄…… 츄……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リーリアは頬っぺたにキスをしてくる。"
translation = "리리아는 뺨에 키스를 해온다."

[[dialogue]]
speaker = "リーリア"
original = "「次は首筋に行っちゃいますよ～……ん～……ちゅっ<emoji=heart04>」"
translation = "「다음은 목덜미로 갈 거예요～…… 음～…… 츄<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「好き……ちゅっ……<emoji=heart04>」"
translation = "「좋아해…… 츄……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そんな風に繰り返され続けて、俺は我慢できず――"
translation = "그런 식으로 계속 반복되자 나는 참지 못하고――"

[[dialogue]]
speaker = "unk"
original = "っ……リーリア！"
translation = "윽…… 리리아!"

[[dialogue]]
speaker = "リーリア"
original = "「きゃっ！\u3000あっ……センパイ<emoji=heart04>\u3000んっ……<emoji=heart04>」"
translation = "「꺄앗! 앗…… 선배<emoji=heart04> 응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は起き上がると、今度は彼女を押し倒して、唇を奪う。"
translation = "나는 일어나서 이번에는 그녀를 밀어 넘어뜨리고 입술을 빼앗는다."

[[dialogue]]
speaker = "リーリア"
original = "「んむっ……ちゅっ……<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「음뭇…… 츄……<emoji=heart04> 츄……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「んっ……ぷはぁ……！\u3000ふぅ……はあぁ……<emoji=heart04>\u3000やっと、キスしてくれましたね……センパイ……<emoji=heart04>」"
translation = "「응…… 푸하아……! 후우…… 하아아……<emoji=heart04> 드디어 키스해 주셨네요…… 선배……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ごめん……俺……"
translation = "미안…… 나……"

[[dialogue]]
speaker = "リーリア"
original = "「謝らなくて大丈夫ですよ。私……センパイが思っているよりもずっと、センパイのこと、大好きですから」"
translation = "「사과하지 않아도 괜찮아요. 저…… 선배가 생각하는 것보다 훨씬 선배를 정말 좋아하니까요.」"

[[dialogue]]
speaker = "リーリア"
original = "「センパイが紳士的に、私を大切にしようとしてくれるのは嬉しいですけど……私はもっと、センパイとじゃれ合いたいです」"
translation = "「선배가 신사적으로 저를 소중히 여기려 해주는 건 기쁘지만…… 저는 좀 더 선배랑 장난치고 싶어요.」"

[[dialogue]]
speaker = "unk"
original = "じゃれ合う……？"
translation = "장난친다……?"

[[dialogue]]
speaker = "リーリア"
original = "「そうです。今みたいにキスして欲しいから、わざと唇以外にキスして挑発してみたり……そういうじゃれ合いです」"
translation = "「맞아요. 지금처럼 키스해 주길 바라니까 일부러 입술 말고 다른 곳에 키스해서 도발해 본다든가…… 그런 장난이에요.」"

[[dialogue]]
speaker = "リーリア"
original = "「時には、じゃれ合いの加減に失敗して、喧嘩してしまうこともあるかもしれません。でも、その時はまた、話し合えばいいんです」"
translation = "「때로는 장난의 정도 조절에 실패해서 싸우게 될지도 몰라요. 하지만 그때는 다시 대화하면 돼요.」"

[[dialogue]]
speaker = "リーリア"
original = "「もう少しこうして欲しいって、素直に気持ちを伝えれば、きっと仲直りできます。だって――私たち、お互い好き同士なんですから♪」"
translation = "「조금 더 이렇게 해달라고 솔직하게 마음을 전하면 분명 화해할 수 있어요. 왜냐하면―― 우리 서로 좋아하는 사이니까요♪」"

[[dialogue]]
speaker = "リーリア"
original = "「あと……今みたいに強引に押し倒されちゃう感じも、正直に言うと、嫌じゃないっていうか……むしろ、ドキドキしちゃいますし……<emoji=heart04>」"
translation = "「그리고…… 지금처럼 강제로 밀려 넘어가는 느낌도 솔직히 말하면 싫지 않달까…… 오히려 두근거려 버리고요……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「だから、もっと……センパイの『好き』を、私に教えて欲しいです<emoji=heart04>」"
translation = "「그러니까 좀 더…… 선배의 『좋아해』를 저에게 가르쳐 주세요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言って、包み込むように優しく笑うリーリア。俺はそんな彼女が、すごく愛おしくなって――"
translation = "그렇게 말하며 감싸 안듯 다정하게 웃는 리리아. 나는 그런 그녀가 너무나 사랑스러워져서――"

[[dialogue]]
speaker = "リーリア"
original = "「あ……<emoji=heart04>\u3000センパイ……力強く抱き締めるの、ドキドキしちゃいます……<emoji=heart04>」"
translation = "「아……<emoji=heart04> 선배…… 힘차게 껴안는 거, 두근거려 버려요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リーリア、愛してる"
translation = "리리아, 사랑해."

[[dialogue]]
speaker = "リーリア"
original = "「ん……<emoji=heart04>\u3000私も愛してます……<emoji=heart04>\u3000センパイ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 저도 사랑해요……<emoji=heart04> 선배……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「ちゅっ……<emoji=heart04>」"
translation = "「츄……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その日、俺は数え切れないくらい、彼女への好きを伝えるのだった――"
translation = "그날 나는 셀 수 없을 정도로 그녀에게 좋아한다는 마음을 전하는 것이었다――"

