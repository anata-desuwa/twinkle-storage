[[dialogue]]
speaker = "unk"
original = "第２話,星徒会って？,B"
translation = "제2화, 성도회란?, B"

[[dialogue]]
speaker = "unk"
original = "夢を見た。"
translation = "꿈을 꾸었다."

[[dialogue]]
speaker = "unk"
original = "そこにいるのは５年ほど前の俺……"
translation = "그곳에 있는 것은 5년 정도 전의 나……"

[[dialogue]]
speaker = "unk"
original = "もう何度も見ている夢で、それは俺の心の奥深くに刻まれた記憶でもある。"
translation = "이미 몇 번이고 꾸었던 꿈으로, 그것은 내 마음속 깊이 새겨진 기억이기도 하다."

[[dialogue]]
speaker = "飢えたモンスターＡ"
original = "「グッグッグッ……ガッガッガッガッ」"
translation = "「크르르르…… 칵칵칵칵칵」"

[[dialogue]]
speaker = "飢えたモンスターＢ"
original = "「グルル……ゲヘェ」"
translation = "「크르르…… 켁헤」"

[[dialogue]]
speaker = "クロト"
original = "「う……ぁ……や、めろ……やめてくれ……っ……！」"
translation = "「으…… 아…… 그, 그만둬…… 그만둬 줘……!」"

[[dialogue]]
speaker = "unk"
original = "ぼろぼろの俺。餓狼のように群がるモンスター。"
translation = "너덜너덜해진 나. 굶주린 늑대처럼 무리 짓는 몬스터."

[[dialogue]]
speaker = "unk"
original = "気力も体力も使い果たし、もう拳の一発も繰り出せない。"
translation = "기력도 체력도 모두 소진하여, 이제 주먹 한 방도 날릴 수 없다."

[[dialogue]]
speaker = "unk"
original = "そして連れ去られる先は──彼らの巣だった。"
translation = "그리고 끌려가는 곳은── 그들의 둥지였다."

[[dialogue]]
speaker = "unk"
original = "その最奥に連れ去られた俺は、死を覚悟した。"
translation = "그 가장 깊은 곳으로 끌려간 나는, 죽음을 각오했다."

[[dialogue]]
speaker = "unk"
original = "だが次の瞬間、俺を苦しめていたモンスターたちは一刀のもとに斬り伏せられた。"
translation = "하지만 다음 순간, 나를 괴롭히던 몬스터들은 일도양단으로 베어 눕혀졌다."

[[dialogue]]
speaker = "？？？"
original = "「──怪我はないか、少年」"
translation = "「──다친 곳은 없나, 소년」"

[[dialogue]]
speaker = "？？？"
original = "「強くあれ。世界を取り込まんとする力に、決して飲まれることなきように」"
translation = "「강해져라. 세계를 집어삼키려는 힘에, 결코 휩쓸리지 않도록」"

[[dialogue]]
speaker = "？？？"
original = "「君の両手には……他者を救う温かさが宿っている」"
translation = "「그대의 양손에는…… 타인을 구원하는 따스함이 깃들어 있다」"

[[dialogue]]
speaker = "unk"
original = "それが……俺の初めて見た星の輝き。"
translation = "그것이…… 내가 처음 본 별의 반짝임."

[[dialogue]]
speaker = "unk"
original = "彼は、訊ねても、名乗ってくれることはなかったけど。"
translation = "그는, 물어봐도, 이름을 밝혀주지는 않았지만."

[[dialogue]]
speaker = "unk"
original = "<ruby>星騎士<rt>スターナイト</rt></ruby>──そんな存在が自分の街にはいるんだと、心に深く刻み込まれた瞬間だった。"
translation = "성기사── 그런 존재가 자신의 마을에는 있다는 것을, 마음에 깊이 새겨 넣은 순간이었다."

[[dialogue]]
speaker = "unk"
original = "そして翌日。"
translation = "그리고 다음 날."

[[dialogue]]
speaker = "unk"
original = "２つの学園に別れた岐路を右へ曲がって、俺は新星学園への登校２日目を迎える。"
translation = "두 학원으로 나뉜 갈림길에서 오른쪽으로 꺾어, 나는 신성 학원으로의 등교 2일째를 맞이한다."

[[dialogue]]
speaker = "クラスの女子Ａ"
original = "「あ！\u3000転入生くんだ──ねえねえ、もう新星には慣れた？」"
translation = "「아! 전학생 군이다── 야야, 벌써 신성에는 익숙해졌어?」"

[[dialogue]]
speaker = "クラスの女子Ｂ"
original = "「そんな呼び方じゃ失礼でしょー。ね、クロトくん」"
translation = "「그런 호칭은 실례잖아. 그치, 쿠로토 군」"

[[dialogue]]
speaker = "クロト"
original = "「大丈夫、気にしないよ。学園は……これから慣れてくところかな」"
translation = "「괜찮아, 신경 쓰지 마. 학원은…… 이제부터 익숙해져야 할 곳이겠지.」"

[[dialogue]]
speaker = "unk"
original = "教室で今日の時間割を確認していると、クラスメイトの女の子から話しかけられた。"
translation = "교실에서 오늘의 시간표를 확인하고 있는데, 반 친구인 여자아이에게 말을 걸어졌다."

[[dialogue]]
speaker = "マトイ"
original = "「おはよう、緋宮くん。今日は襲われなかった？」"
translation = "「안녕, 히노미야 군. 오늘은 습격당하지 않았어?」"

[[dialogue]]
speaker = "クロト"
original = "「おはよう──マトイ」"
translation = "「안녕── 마토이」"

[[dialogue]]
speaker = "unk"
original = "そして隣の席からは、一足早く登校していたマトイが微笑みかけてきた。"
translation = "그리고 옆자리에서는, 한발 먼저 등교해 있던 마토이가 미소 지어 왔다."

[[dialogue]]
speaker = "クラスの女子Ａ"
original = "「襲われたなかった、ってどゆこと？\u3000マトイっち」"
translation = "「습격당하지 않았다니, 무슨 말이야? 마토이치」"

[[dialogue]]
speaker = "マトイ"
original = "「昨日、緋宮くんってば初登校なのに通学路でモンスターに襲われてたの」"
translation = "「어제, 히노미야 군은 첫 등교인데 통학로에서 몬스터에게 습격당했었어.」"

[[dialogue]]
speaker = "クラスの女子Ｂ"
original = "「あはは、めっちゃ不運じゃん。さすがに２日も続けてそんな……」"
translation = "「아하하, 완전 불운이네. 설마 이틀 연속으로 그런……」"

[[dialogue]]
speaker = "クロト"
original = "「襲われたよ」"
translation = "「습격당했어.」"

[[dialogue]]
speaker = "クラスの女子Ａ"
original = "「ってええぇ……！？」"
translation = "「라니이이……!?」"

[[dialogue]]
speaker = "クロト"
original = "「けど、あれも『リクリエ』が近づいてる前兆だと思うと、気を抜いてられないよな」"
translation = "「하지만, 그것도 『리크리에』가 다가오고 있는 전조라고 생각하면, 긴장을 늦출 수 없지.」"

[[dialogue]]
speaker = "unk"
original = "リクリエ──世界の破滅──の接近に伴って、今地上では多くの混乱が起きている。"
translation = "리크리에── 세계의 파멸──의 접근에 따라, 지금 지상에서는 많은 혼란이 일어나고 있다."

[[dialogue]]
speaker = "unk"
original = "俺もこの学園の生徒である以上、立ち向かわなくてはいけないだろう。"
translation = "나도 이 학원의 학생인 이상, 맞서 싸워야 할 것이다."

[[dialogue]]
speaker = "クロト"
original = "「（まあ……俺はそもそも普段からモンスターによく遭遇するから、今に始まった話でもないけど……）」"
translation = "「(뭐…… 나는 원래 평소부터 몬스터를 자주 만나니까, 이제 와서 시작된 이야기도 아니지만……)」"

[[dialogue]]
speaker = "クラスの女子Ｂ"
original = "「モンスターに襲われたって……え、それはどうしたの？\u3000助けてもらったの？」"
translation = "「몬스터에게 습격당했다니…… 에, 그건 어떻게 됐어? 도움을 받았어?」"

[[dialogue]]
speaker = "クロト"
original = "「……いや？\u3000一人で倒したけど」"
translation = "「……아니? 혼자서 쓰러뜨렸는데.」"

[[dialogue]]
speaker = "クラスの女子Ａ"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "俺がそう言うと、女子３人は引きつった顔を浮かべた。"
translation = "내가 그렇게 말하자, 여자 셋은 경직된 표정을 지었다."

[[dialogue]]
speaker = "クロト"
original = "「だって星騎士はモンスターを倒して平和を守るものだろ？\u3000みんなもそうしてるんじゃないのか」"
translation = "「왜냐면 성기사는 몬스터를 쓰러뜨리고 평화를 지키는 거잖아? 모두도 그렇게 하고 있는 거 아니야?」"

[[dialogue]]
speaker = "クラスの女子Ａ"
original = "「そ、そりゃ～そうだけど！\u3000許可もなしに勝手に出動しちゃダメでしょ！」"
translation = "「그, 그야 그렇긴 하지만! 허가도 없이 멋대로 출동하면 안 되잖아!」"

[[dialogue]]
speaker = "クラスの女子Ｂ"
original = "「いやでも、クロトくんは自分が襲われたんだから出動ってワケじゃ……」"
translation = "「아니 그래도, 쿠로토 군은 자기가 습격당한 거니까 출동이라는 건……」"

[[dialogue]]
speaker = "unk"
original = "どうもあまり良くない話だったらしい。陽気だった２人が慌てている。"
translation = "아무래도 그다지 좋지 않은 이야기였던 모양이다. 쾌활했던 두 사람이 당황하고 있다."

[[dialogue]]
speaker = "クロト"
original = "「２人も、街で何かあったら戦うんじゃないのか……？」"
translation = "「너희 둘도, 마을에서 무슨 일이 생기면 싸우는 거 아니야……?」"

[[dialogue]]
speaker = "クラスの女子Ｂ"
original = "「戦うかもしんないけど……まずは応援を待つかな」"
translation = "「싸울지도 모르겠지만…… 일단은 지원을 기다릴까.」"

[[dialogue]]
speaker = "マトイ"
original = "「その……緋宮くん。実はこの学園の星騎士たちもね、誰でも自由に出動できるわけじゃないの」"
translation = "「저기…… 히노미야 군. 실은 이 학원의 성기사들도 말이야, 누구나 자유롭게 출동할 수 있는 건 아니야.」"

[[dialogue]]
speaker = "クロト"
original = "「そうだったのか……！？」"
translation = "「그랬던 건가……!?」"

[[dialogue]]
speaker = "クラスの女子Ａ"
original = "「そーそー、出撃するにはプリマステラに選ばれなきゃダメなんだから！」"
translation = "「맞아 맞아, 출격하려면 프리마 스텔라로 선택받아야만 하니까!」"

[[dialogue]]
speaker = "unk"
original = "──プリマステラ。"
translation = "── 프리마 스텔라."

[[dialogue]]
speaker = "unk"
original = "耳慣れない単語に疑問符を浮かべていると、補足が飛んでくる。"
translation = "귀에 익지 않은 단어에 물음표를 띄우고 있자, 보충 설명이 날아온다."

[[dialogue]]
speaker = "クラスの女子Ｂ"
original = "「一番星って意味でね。新星学園の中でも特に優秀な生徒に与えられる称号なんだ」"
translation = "「가장 빛나는 별이라는 의미야. 신성 학원 중에서도 특히 우수한 학생에게 주어지는 칭호지.」"

[[dialogue]]
speaker = "クラスの女子Ｂ"
original = "「星騎士としての実力はもちろん、成績とか判断力に優れてないとプリマステラにはなれないんだよ」"
translation = "「성기사로서의 실력은 물론, 성적이나 판단력이 뛰어나지 않으면 프리마 스텔라가 될 수 없어.」"

[[dialogue]]
speaker = "マトイ"
original = "「みんな星力をうまく制御できるわけじゃないから。学園に認められた生徒だけが、星騎士として繰り出せる権利があるの」"
translation = "「모두가 성력을 능숙하게 제어할 수 있는 건 아니니까. 학원에 인정받은 학생만이, 성기사로서 나설 수 있는 권리가 있어.」"

[[dialogue]]
speaker = "クロト"
original = "「知らなかった。エリートの特権だったんだな」"
translation = "「몰랐어. 엘리트의 특권이었구나.」"

[[dialogue]]
speaker = "unk"
original = "特待生徒──みたいなものだろうか。"
translation = "특대생── 같은 것일까."

[[dialogue]]
speaker = "unk"
original = "じゃあ、昨日俺を助けに来てくれたマトイや──"
translation = "그럼, 어제 나를 도우러 와 준 마토이나──"

[[dialogue]]
speaker = "unk"
original = "一緒に馳せ参じてくれた２人は、星騎士としても特別な存在だったんだな。"
translation = "함께 달려와 준 두 사람은, 성기사로서도 특별한 존재였구나."

[[dialogue]]
speaker = "クロト"
original = "「（しかし、そう考えると……民間で勝手にモンスターの相手をしていた俺は……ダメだったのか？）」"
translation = "「(하지만, 그렇게 생각하니…… 민간에서 멋대로 몬스터를 상대했던 나는…… 안 됐던 건가?)」"

[[dialogue]]
speaker = "unk"
original = "狩猟を許可されていないのにクマを撃っちゃったみたいな──そんな感じだろうか。"
translation = "수렵이 허가되지 않았는데 곰을 쏴버린 것 같은── 그런 느낌일까."

[[dialogue]]
speaker = "unk"
original = "いつも襲われて戦っていたことは内緒にしておこう……。"
translation = "항상 습격당해서 싸웠던 일은 비밀로 해 두자……."

[[dialogue]]
speaker = "マトイ"
original = "「何事もなかったならいいけど……これからは無理しないで、星騎士の救助を待ってね。すぐに駆けつけられるようになってるから」"
translation = "「아무 일 없었다면 다행이지만…… 이제부터는 무리하지 말고, 성기사의 구조를 기다려 줘. 바로 달려올 수 있게 되어 있으니까.」"

[[dialogue]]
speaker = "クロト"
original = "「ああ……わかった。そうするよ」"
translation = "「아아…… 알았어. 그렇게 할게.」"

[[dialogue]]
speaker = "クロト"
original = "「あれ？\u3000そうなると、マトイもプリマステラってやつなのか」"
translation = "「어라? 그렇게 되면, 마토이도 프리마 스텔라라는 거야?」"

[[dialogue]]
speaker = "クラスの女子Ａ"
original = "「違うよ！\u3000マトイっちは星徒会役員だもん、プリマステラよりさらに上の役職だよ！」"
translation = "「아니야! 마토이치는 성도회 임원인걸, 프리마 스텔라보다 훨씬 더 높은 직책이야!」"

[[dialogue]]
speaker = "unk"
original = "なるほど。"
translation = "과연."

[[dialogue]]
speaker = "unk"
original = "どうやらこの学園では星徒会＞プリマステラ＞一般生徒の順に、星騎士としての優秀さが定められているようだ。"
translation = "아무래도 이 학원에서는 성도회 > 프리마 스텔라 > 일반 학생 순으로, 성기사로서의 우수함이 정해져 있는 듯하다."

[[dialogue]]
speaker = "クロト"
original = "「へえ……ならやっぱりマトイはすごいんだな。この学園のトップみたいな存在なんだろ」"
translation = "「헤에…… 그럼 역시 마토이는 대단하네. 이 학원의 톱 같은 존재인 거지.」"

[[dialogue]]
speaker = "クラスの女子Ｂ"
original = "「そう、そう！\u3000あたしら一般生徒からしたら、手の届かないお人だから！」"
translation = "「맞아, 맞아! 우리 같은 일반 학생들한테는, 감히 손댈 수 없는 분이니까!」"

[[dialogue]]
speaker = "クロト"
original = "「昨日、助けに来てくれたマトイの変身姿は確かに格好よかったな」"
translation = "「어제, 도우러 와 준 마토이의 변신 모습은 확실히 멋있었지.」"

[[dialogue]]
speaker = "マトイ"
original = "「い、いやあ……私なんてたまたま拾ってもらえただけっていうか。星徒会にはもっとすごい人たちもいるから」"
translation = "「아, 아니이…… 나 같은 건 그저 우연히 뽑힌 것뿐이랄까. 성도회에는 더 대단한 사람들도 있으니까.」"

[[dialogue]]
speaker = "マトイ"
original = "「アナなんか……一年生とは思えないくらい仕事もできるし。サーシャ先輩もナイスバディだし。私のキャラなんて……」"
translation = "「아나 같은 경우는…… 1학년이라고는 생각되지 않을 정도로 일도 잘하고. 사샤 선배도 멋진 몸매고. 내 캐릭터는……」"

[[dialogue]]
speaker = "クラスの女子Ａ"
original = "「マトイっちって、無駄にネガティブだよね」"
translation = "「마토이치는, 쓸데없이 부정적이네.」"

[[dialogue]]
speaker = "unk"
original = "心からの賛辞だったのに、照れて縮こまってしまうマトイだった。"
translation = "진심 어린 찬사였는데도, 부끄러워하며 움츠러드는 마토이였다."

[[dialogue]]
speaker = "クロト"
original = "「でも、マトイだっていつかは星徒会長になるんじゃないのか？」"
translation = "「하지만, 마토이도 언젠가는 성도 회장이 되는 거 아니야?」"

[[dialogue]]
speaker = "マトイ"
original = "「まさか。会長はもうヴィーナスがいるし、私はこうして星徒会の一員になれただけでも幸運なんだから……おこがましいよ」"
translation = "「설마. 회장은 이미 비너스가 있고, 나는 이렇게 성도회의 일원이 된 것만으로도 행운이니까…… 주제넘은 일이야.」"

[[dialogue]]
speaker = "unk"
original = "やんわりと否定するマトイ。"
translation = "부드럽게 부정하는 마토이."

[[dialogue]]
speaker = "unk"
original = "だが、その左腕に巻かれた腕章には、新参の俺には想像もつかないような苦労があるのだろう。"
translation = "하지만, 그 왼팔에 둘러진 완장에는, 신참인 나로서는 상상도 할 수 없는 고충이 있을 것이다."

[[dialogue]]
speaker = "unk"
original = "にしても……"
translation = "그렇다 해도……"

[[dialogue]]
speaker = "クロト"
original = "「ヴィーナス？」"
translation = "「비너스?」"

[[dialogue]]
speaker = "クラスの女子Ａ"
original = "「今の星徒会長だよ！\u3000Ｄ組の九浄ヴィーナスさん──緋宮くんもそのうち会うことあるんじゃないかな！」"
translation = "「지금 성도 회장이야! D반의 쿠죠 비너스 씨── 히노미야 군도 조만간 만날 일 있지 않을까!」"

[[dialogue]]
speaker = "クラスの女子Ｂ"
original = "「ま、あたしらみたいなひよっ子からしたら雲の上の存在だけどね～。あたしも早くプリマステラにならないとなっ」"
translation = "「뭐, 우리 같은 애송이들한테는 구름 위의 존재지만. 나도 빨리 프리마 스텔라가 되어야지.」"

[[dialogue]]
speaker = "unk"
original = "クラスメイトの彼女たちは星騎士として、早く一人前になるよう奮起していた。"
translation = "반 친구인 그녀들은 성기사로서, 빨리 한 사람 몫을 해내도록 분발하고 있었다."

[[dialogue]]
speaker = "unk"
original = "<ruby>一番星<rt>プリマステラ</rt></ruby>──リクリエの危機から実際に人々を守る、出撃を許されたエリート星騎士。"
translation = "가장 빛나는 별── 리크리에의 위기에서 실제로 사람들을 지키는, 출격이 허락된 엘리트 성기사."

[[dialogue]]
speaker = "unk"
original = "俺もこの学園で努力して、認められるよう頑張ろう。"
translation = "나도 이 학원에서 노력해서, 인정받도록 힘내자."

[[dialogue]]
speaker = "unk"
original = "マトイのように星徒会へ入る──っていうのは、転入生だから厳しいかもしれないけど……"
translation = "마토이처럼 성도회에 들어가는 것──은, 전학생이라 힘들지도 모르겠지만……"

[[dialogue]]
speaker = "unk"
original = "人々の役に立てるなら、そこを目指すべきだと思った。"
translation = "사람들에게 도움이 될 수 있다면, 그곳을 목표로 삼아야 한다고 생각했다."

