[[dialogue]]
speaker = "unk"
original = "第４話,神殿のガーディアン,B"
translation = "제4화, 신전의 가디언"

[[dialogue]]
speaker = "レティシア"
original = "「アルタイルの星騎士の相手をする必要はないわ。このまま神殿内部に突入しましょう」"
translation = "「알타이르의 성기사를 상대할 필요는 없어. 이대로 신전 내부로 돌입하자」"

[[dialogue]]
speaker = "グレイス"
original = "「はい！」"
translation = "「네!」"

[[dialogue]]
speaker = "unk"
original = "極星従騎を壁にして、神殿に侵入しようとするグレイスとレティシア。"
translation = "극성종기를 벽으로 삼아 신전에 침입하려는 그레이스와 레티시아."

[[dialogue]]
speaker = "アリコーン"
original = "「ヒヒィン！」"
translation = "「히히잉!」"

[[dialogue]]
speaker = "グレイス"
original = "「──！？\u3000まだ防衛のガーディアンがいたんですか！」"
translation = "「──!? 아직 방어 가디언이 있었나요!」"

[[dialogue]]
speaker = "unk"
original = "しかしその前に、神獣のガーディアンが立ちふさがる。"
translation = "하지만 그 앞을 신수 가디언이 가로막는다."

[[dialogue]]
speaker = "ナターシャ"
original = "「危なかった。先に中に入られるとまずいからね」"
translation = "「위험했어. 먼저 안으로 들어가면 곤란하니까」"

[[dialogue]]
speaker = "ナターシャ"
original = "「きっと極星の２人は、デネブの神殿を攻略して内部構造を把握してる。侵入を許すと、そのまま奥に行っちゃうよ」"
translation = "「분명 극성의 두 사람은 데네브의 신전을 공략해서 내부 구조를 파악하고 있을 거야. 침입을 허용하면 그대로 안으로 가버릴걸」"

[[dialogue]]
speaker = "梨緒"
original = "「ああ、わかった！\u3000極星従騎を蹴散らすぞ！」"
translation = "「아아, 알았어! 극성종기를 걷어차 주자!」"

[[dialogue]]
speaker = "スレイプニル"
original = "「ブルルル！」"
translation = "「부르르르!」"

[[dialogue]]
speaker = "梨緒"
original = "「吹き飛ばせ──ライトニングテンペスト！」"
translation = "「날려버려── 라이트닝 템페스트!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「悪いけど、グレイスちゃんとレティシアちゃんのところに行かせてもらうよ！」"
translation = "「미안하지만, 그레이스짱이랑 레티시아짱이 있는 곳으로 가게 해줄게!」"

[[dialogue]]
speaker = "スレイプニル"
original = "「ヒィン……」"
translation = "「히잉……」"

[[dialogue]]
speaker = "ナターシャ"
original = "（ん……？）"
translation = "（응……?）"

[[dialogue]]
speaker = "ガーディアン・オルサレクス"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "ナターシャ"
original = "（あのガーディアン、何……？）"
translation = "（저 가디언, 뭐야……?）"

[[dialogue]]
speaker = "unk"
original = "神殿を守るように飛行するガーディアンたちのその奥。"
translation = "신전을 지키듯 비행하는 가디언들의 그 안쪽."

[[dialogue]]
speaker = "unk"
original = "まるで周囲を見渡すように鎮座する、機械のガーディアンがいた。"
translation = "마치 주위를 둘러보듯 자리 잡은 기계 가디언이 있었다."

[[dialogue]]
speaker = "ナターシャ"
original = "（極星星徒会もこっちも攻撃してこないけど、何してるの？）"
translation = "（극성성도회도 이쪽도 공격해 오지 않는데, 뭘 하고 있는 거지?）"

[[dialogue]]
speaker = "ホルン"
original = "「クルル！」"
translation = "「쿠루루!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ちょこまか動くんじゃないわよ！」"
translation = "「알짱거리지 말란 말이야!」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスが鎖を放ち、無数の鳥型ガーディアンを一網打尽にする。"
translation = "비너스가 사슬을 내뿜어, 무수한 조류형 가디언을 일망타진한다."

[[dialogue]]
speaker = "メルエル"
original = "「会長くん！」"
translation = "「회장님!」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、合わせる！」"
translation = "「아아, 맞추겠어!」"

[[dialogue]]
speaker = "メルエル"
original = "「眩き調べよ響け──ディヴォーテッド・コンチェルト！」"
translation = "「눈부신 선율이여 울려 퍼져라── 디보티드 콘체르토!」"

[[dialogue]]
speaker = "unk"
original = "そして俺とメルエルの力を収束させ、光の旋律が極星従騎を一網打尽にした。"
translation = "그리고 나와 메르엘의 힘을 수렴시켜, 빛의 선율이 극성종기를 일망타진했다."

[[dialogue]]
speaker = "ガーディアン・オルサレクス"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "ガーディアン・オルサレクス"
original = "「──」"
translation = "「──」"

[[dialogue]]
speaker = "ナターシャ"
original = "（あのガーディアン、今光ったような……）"
translation = "（저 가디언, 방금 빛난 것 같은데……）"

[[dialogue]]
speaker = "ナターシャ"
original = "（嫌な胸騒ぎがする……）"
translation = "（불길한 예감이 들어……）"

[[dialogue]]
speaker = "スレイプニル"
original = "「ヒヒィン！」"
translation = "「히히잉!」"

[[dialogue]]
speaker = "アポロ"
original = "「邪魔するなーっ！」"
translation = "「방해하지 마──앗!」"

[[dialogue]]
speaker = "スレイプニル"
original = "「ヒィン……！」"
translation = "「히잉……!」"

[[dialogue]]
speaker = "unk"
original = "魔王の力を宿した大剣を一閃し、流星の瞬きが極星従騎を両断する。"
translation = "마왕의 힘을 깃들인 대검을 일섬하자, 유성의 반짝임이 극성종기를 양단한다."

[[dialogue]]
speaker = "ガーディアン・オルサレクス"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "ガーディアン・オルサレクス"
original = "「────」"
translation = "「────」"

[[dialogue]]
speaker = "ナターシャ"
original = "（あのガーディアン、やっぱり何かに反応してる？\u3000しかもあいつにエネルギーが集中しているような……）"
translation = "（저 가디언, 역시 무언가에 반응하고 있어? 게다가 저 녀석에게 에너지가 집중되고 있는 듯한……）"

[[dialogue]]
speaker = "ナターシャ"
original = "（ここは２０００年前の魔王に狙われた、女神の神殿。ならもしかして──）"
translation = "（이곳은 2000년 전 마왕이 노렸던 여신의 신전. 그렇다면 설마──）"

[[dialogue]]
speaker = "グレイス"
original = "「はぁっ──！」"
translation = "「하앗──!」"

[[dialogue]]
speaker = "unk"
original = "極星星徒会の攻撃で、ガーディアンが１体、また１体と駆逐されていく。"
translation = "극성성도회의 공격으로 가디언이 한 마리, 또 한 마리 구축되어 간다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「このままだと極星星徒会が先に神殿に入っちゃうわ！\u3000ノヴァフォームで一気にケリをつけるわよ！」"
translation = "「이대로라면 극성성도회가 먼저 신전에 들어가 버리겠어! 노바 폼으로 단숨에 끝장을 내자고!」"

[[dialogue]]
speaker = "クロト"
original = "「ガーディアンがこっちに……！？」"
translation = "「가디언이 이쪽으로……!?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「みんなあのガーディアンから離れて！\u3000ヴィーナス、ストッ──」"
translation = "「모두 저 가디언에게서 떨어져! 비너스, 스토──」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「チェンジ・ノヴァフォ──」"
translation = "「체인지 노바 폼──」"

[[dialogue]]
speaker = "ガーディアン・オルサレクス"
original = "「──」"
translation = "「──」"

[[dialogue]]
speaker = "unk"
original = "ナターシャが止めるのも間に合わず、ヴィーナスがノヴァフォームに変身しようとした瞬間、ガーディアンから光が放たれ、視界が閃光に染まる。"
translation = "나타샤가 말릴 틈도 없이 비너스가 노바 폼으로 변신하려던 순간, 가디언에게서 빛이 뿜어져 나오며 시야가 섬광으로 물든다."

[[dialogue]]
speaker = "クロト"
original = "「ガーディアンが自爆した……！？」"
translation = "「가디언이 자폭했어……!?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「くっ……魔王の力に反応したんだ……！」"
translation = "「큭…… 마왕의 힘에 반응한 거야……!」"

[[dialogue]]
speaker = "unk"
original = "閃光に呑まれた俺たちは、真っ逆さまに墜落していった。"
translation = "섬광에 휩쓸린 우리들은 곤두박질치며 추락해 갔다."

