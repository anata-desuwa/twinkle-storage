[[dialogue]]
speaker = "unk"
original = "第４話,探偵の恋愛事情,P"
translation = "제4화, 탐정의 연애 사정, P"

[[dialogue]]
speaker = "unk"
original = "ジュエリーの助手として、付き合いも長くなって来た頃――"
translation = "쥬얼리의 조수로서 지낸 지도 꽤 시간이 흘렀을 무렵――"

[[dialogue]]
speaker_original = "依頼人の女生徒"
speaker_translation = "의뢰인 여학생"
original = "「先日の事件、ありがとうございました。犯人が捕まって、これで安心して元の生活に戻れます」"
translation = "「요전번 사건, 감사했습니다. 범인이 잡혀서 이제 안심하고 원래 생활로 돌아갈 수 있겠어요.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「なに、私は探偵としての使命を果たしたまでさ。困った時はまた気軽に相談してくれたまえ」"
translation = "「별말을. 나는 탐정으로서의 사명을 다했을 뿐이야. 곤란한 일이 있으면 또 부담 없이 상담해 주게나.」"

[[dialogue]]
speaker_original = "依頼人の女生徒"
speaker_translation = "의뢰인 여학생"
original = "「はい。本当にありがとうございます、日傘探偵さん！\u3000それではまた！」"
translation = "「네. 정말 감사합니다, 양산 탐정님! 그럼 또 봬요!」"

[[dialogue]]
speaker = "unk"
original = "無事に事件解決して、良かったね"
translation = "무사히 사건이 해결돼서 다행이야."

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「ああ。キミが助手としてサポートしてくれたおかげさ。ありがとう」"
translation = "「아아. 네가 조수로서 서포트해 준 덕분이야. 고마워.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「愛しているよ、我が助手」"
translation = "「사랑해, 나의 조수.」"

[[dialogue]]
speaker = "unk"
original = "（親愛か恋愛か、正直わからないよな……）"
translation = "(친애인지 연애인지 솔직히 모르겠단 말이지……)"

[[dialogue]]
speaker = "unk"
original = "（ジュエリーはいつもそう言うけど……）"
translation = "(쥬얼리는 항상 그렇게 말하지만……)"

[[dialogue]]
speaker = "unk"
original = "俺は意を決して、ジュエリーに提案をした。"
translation = "나는 마음을 굳게 먹고 쥬얼리에게 제안을 했다."

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「……ん？\u3000明日の休日？\u3000ああ、予定は特に無いが……え？」"
translation = "「……응? 내일 휴일? 아아, 예정은 딱히 없다만…… 에?」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「ふふっ、まさかキミからデートに誘われるとはね。一体、どういう風の吹き回しだい？」"
translation = "「후훗, 설마 너에게 데이트 신청을 받을 줄이야. 대체 어쩐 일이지?」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「何かそういう気分だった？\u3000ふむ、日頃私がキミに愛をささやき続けたことが、功を奏したといったところか♪」"
translation = "「뭔가 그런 기분이었어? 흠, 평소 내가 너에게 계속 사랑을 속삭인 것이 결실을 보았다고나 할까♪」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「デートくらいは男がリードするもの？\u3000ほう、つまり今日はキミが、私を楽しませてくれるということだね」"
translation = "「데이트 정도는 남자가 리드하는 법이라고? 호오, 즉 오늘은 네가 나를 즐겁게 해주겠다는 거군.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「そう思うと、何だか好奇心でワクワクして来てしまうじゃないか。キミに限らず、男性とのデートは生まれて初めてなのでね」"
translation = "「그렇게 생각하니 왠지 호기심에 가슴이 설레는걸. 너뿐만 아니라 남성과의 데이트는 태어나서 처음이라서 말이야.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「それにしても、誰かから遊びに誘われるなんて、一体いつ以来だろうか？」"
translation = "「그나저나 누군가로부터 놀러 가자는 권유를 받은 게 대체 얼마 만일까?」"

[[dialogue]]
speaker = "unk"
original = "（やっぱり、親しい友達のノリなんだよな）"
translation = "(역시 친한 친구 사이의 분위기란 말이지)"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「おや？\u3000どうしたんだい？\u3000おもむろに近付いて来て……デートだから手を繋ぐ？」"
translation = "「어라? 왜 그러니? 난데없이 다가와서…… 데이트니까 손을 잡는다고?」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「そういえば、あまり考えたことがなかったが、私たちは手を繋ぐのも初めてだったね。いいだろう、試してみようじゃないか」"
translation = "「그러고 보니 별로 생각해 본 적이 없었지만, 우리가 손을 잡는 것도 처음이었군. 좋아, 시도해 보지 않겠니.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「おっ、おぉぉっ……！？\u3000これが異性の手を繋ぐ感覚、というものか……」"
translation = "「오, 오오오……!? 이것이 이성의 손을 잡는 감각이라는 것인가……」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「手の感触も、意識すると情報量が多いな。肌と肌を触れ合わせるというのは、意外と心地良いものなのだな」"
translation = "「손의 감촉도 의식하니 정보량이 많군. 피부와 피부를 맞닿게 한다는 건 의외로 기분 좋은 것이었구나.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「ふふっ、これまで自分からしようとは思わなかったが、やってみると面白い。……なに、手の繋ぎ方を変える？」"
translation = "「후훗, 지금까지 스스로 하려고 생각한 적은 없었지만, 해보니 재미있어. ……뭐, 손을 잡는 방식을 바꾼다고?」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「ほう、恋人繋ぎ？\u3000指と指を絡めるやつか。どれ、試してみようじゃないか――」"
translation = "「호오, 연인 잡기? 손가락과 손가락을 얽는 그거군. 어디, 시도해 보지 않겠나――」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「んっ……！\u3000これはまた、触れ合う面積が広がって、強く繋がっている感じがするな。見た目も明らかに、友人ではなく恋人だと分かる感じが……はっ！」"
translation = "「응……! 이건 또, 맞닿는 면적이 넓어져서 강하게 연결되어 있는 느낌이 드는군. 겉보기에도 명백히, 친구가 아니라 연인이라는 걸 알 수 있는 느낌이……핫!」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「なるほど、そういうことか！\u3000キミの考えが分かったぞ、助手！」"
translation = "「과연, 그런 건가! 너의 생각을 알았다네, 조수!」"

[[dialogue]]
speaker = "unk"
original = "（俺の好意が、ちゃんと伝わった……！？）"
translation = "(내 호의가, 제대로 전해졌다……!?)"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「明解に換言するならば……ズバリ、これは恋人になった時の練習ということだな！」"
translation = "「명쾌하게 환언하자면…… 바로, 이건 연인이 되었을 때를 대비한 연습이라는 것이군!」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「私たちは運命の相手であるが故、いずれ恋人になるのは必然。すなわち今日のデートは、その為の予行練習！\u3000そうだろう、助手？」"
translation = "「우리는 운명의 상대인 고로, 언젠가 연인이 되는 것은 필연. 즉 오늘의 데이트는, 그를 위한 예행연습! 그렇지 않나, 조수?」"

[[dialogue]]
speaker = "unk"
original = "（そうじゃない……！）"
translation = "(그게 아니야……!)"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「いやはや、キミのそういうさり気ない心遣いは嬉しいね。時間は短くなるが、昼間ではなく夜にデートすることにしたのも、私の体質を気遣ってのことだろう？」"
translation = "「이런이런, 너의 그런 세심한 배려는 기쁘군. 시간은 짧아지겠지만, 낮이 아니라 밤에 데이트하기로 한 것도, 나의 체질을 배려해서겠지?」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「そういう優しいところが好みだ。心から愛しているよ、我が助手」"
translation = "「그런 다정한 면이 내 취향이라네. 진심으로 사랑하고 있어, 나의 조수여」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「って、どうしたんだい？\u3000何か考え込んでいるような様子だが……」"
translation = "「앗, 왜 그러나? 뭔가 고민하고 있는 모양인데……」"

[[dialogue]]
speaker = "unk"
original = "（もう直接、好きと言うしかないのでは？）"
translation = "(이제 직접, 좋아한다고 말할 수밖에 없는 건가?)"

[[dialogue]]
speaker = "unk"
original = "そうして口に出して伝えるタイミングを見計らいながら、しばらくデートを続け――"
translation = "그렇게 입 밖으로 전할 타이밍을 가늠하며, 한동안 데이트를 계속했고――"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「良い中古ゲームショップを見つけてしまったな！\u3000まさか念願のレア物をあんなにも安く手に入れられてしまうとは♪」"
translation = "「좋은 중고 게임 숍을 발견해 버렸군! 설마 염원하던 레어 아이템을 그렇게 싸게 손에 넣을 수 있을 줄이야♪」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「ふふっ、はしゃぎもするさ。これは世にも珍しい、２人共同プレイが可能なシミュレーションＲＰＧなんだ」"
translation = "「후훗, 들뜨기도 하지. 이건 세상에서도 보기 드문, 2인 공동 플레이가 가능한 시뮬레이션 RPG라네」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「手に入れたら友人と一緒にやってみたいと、前から思っていたんだよ。今度、私の家で攻略しようじゃないか」"
translation = "「손에 넣으면 친구와 함께 해보고 싶다고 전부터 생각했었지. 이번에, 나의 집에서 공략해 보지 않겠나」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「部屋がまた散らかっているんじゃないかって？\u3000だが、いつもみたいに助手が手伝ってくれるだろう？」"
translation = "「방이 또 어질러져 있는 게 아니냐고? 하지만, 언제나처럼 조수가 도와줄 거지?」"

[[dialogue]]
speaker = "unk"
original = "だって俺は、ジュエリーのことが好きだから"
translation = "그야 나는, 쥬얼리를 좋아하니까"

[[dialogue]]
speaker = "unk"
original = "いつだって手伝うよ"
translation = "언제든 도와줄게"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「ははっ、そうだろう。何せ助手は私のことが……ん？」"
translation = "「하핫, 그렇겠지. 아무렴 조수는 나를…… 응?」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「待ちたまえ、助手。今、キミは私のことが<b>好き</b>と言ったのかい？」"
translation = "「잠깐 기다리게나, 조수. 지금, 너는 나를 <b>좋아한다</b>고 말한 건가?」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「……気付いたんだが、キミに好きと言われるのは、これが初めてではないか？」"
translation = "「……깨닫고 보니, 너에게 좋아한다는 말을 듣는 것은 이번이 처음 아닌가?」"

[[dialogue]]
speaker = "unk"
original = "どうして言ったと思う？"
translation = "왜 말했을 것 같아?"

[[dialogue]]
speaker = "unk"
original = "うん、合ってる"
translation = "응, 맞아"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「む？\u3000それは当然……キミも私のことが、好きだからじゃないか？」"
translation = "「무? 그야 당연히…… 너도 나를 좋아하기 때문이 아닌가?」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「なに、問題……？」"
translation = "「뭐지, 문제라도……?」"

[[dialogue]]
speaker = "unk"
original = "今初めて、好きと言ったのは何故でしょう？"
translation = "지금 처음으로, 좋아한다고 말한 이유는 무엇일까요?"

[[dialogue]]
speaker = "unk"
original = "前からずっと仲良くしてるのに……"
translation = "전부터 계속 친하게 지냈는데……"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「え……？\u3000ええと……それはおそらく、今日デートに誘われたことに意味が――あっ……！」"
translation = "「에……? 에토…… 그건 아마도, 오늘 데이트 신청을 받은 것에 의미가――앗……!」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「ま、待つんだ助手。そういうことなのか……！？\u3000いやしかし、私の想像が合っているとは限らないし……！」"
translation = "「기, 기다리게 조수. 그런 것인가……!? 아니 하지만, 나의 상상이 맞다고 단정할 수는 없고……!」"

[[dialogue]]
speaker = "unk"
original = "名探偵なのに？"
translation = "명탐정인데도?"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「わ、私にだって、分からないことはあるんだっ！」"
translation = "「나, 나에게도 모르는 것은 있단 말이다!」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「って、何を嬉しそうにニヤニヤしているんだ助手っ。それも想像しろって？\u3000い、意地悪だぞっ」"
translation = "「그나저나 뭘 그렇게 기쁜 듯이 싱글벙글하고 있는 건가 조수. 그것도 상상해 보라고? 치, 치사하다네」"

[[dialogue]]
speaker = "unk"
original = "ジュエリーはそう言って、日傘で赤くなった顔を隠そうとする。俺はちゃんと彼女が自分を意識してくれたことに、嬉しくなってしまうのだった――"
translation = "쥬얼리는 그렇게 말하며, 양산으로 붉어진 얼굴을 숨기려 한다. 나는 그녀가 제대로 자신을 의식해 준 것이 기뻐지고 말았다――"

