[[dialogue]]
speaker = "unk"
original = "それから数日後、募集を見て名乗りを上げたメンバーが集められた。"
translation = "그로부터 며칠 후, 모집을 보고 나선 멤버들이 모였다."

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「おーっほっほっほ！\u3000皆さん、よくぞ集まってくださいましたわ！\u3000私が流星寮の寮長、千園寺ヒルディオーネですの！」"
translation = "「오호호호호! 여러분, 잘 모여주셨습니다! 제가 유성 기숙사의 기숙사장, 치온지 힐디오네입니다!」"

[[dialogue]]
speaker = "アニュラス"
original = "「流星学園１年、アニュラス・セイファートだ。よろしく頼む」"
translation = "「유성 학원 1학년, 아뉴라스 세이퍼트다. 잘 부탁한다」"

[[dialogue]]
speaker = "舞亜"
original = "「同じく流星学園１年の柊舞亜です。素敵なパーティーになるよう頑張りますねっ」"
translation = "「마찬가지로 유성 학원 1학년의 히이라기 마이아입니다. 멋진 파티가 되도록 노력하겠습니다」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「アニュラスさんは前学園長の息女にして優秀な星騎士。舞亜さんはフィギュアスケート選手として語るまでもないほどの世界的有名人……」"
translation = "「아뉴라스 씨는 전 학원장님의 따님이자 우수한 성기사. 마이아 씨는 피겨 스케이트 선수로서 말할 필요도 없을 정도의 세계적인 유명인……」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「申し分ない人材ですわ！\u3000きっと素晴らしいクリスマスパーティーになることでしょう！\u3000ところで──」"
translation = "「더할 나위 없는 인재입니다! 분명 멋진 크리스마스 파티가 될 것입니다! 그런데──」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「あなたも実行委員に参加希望ですの？\u3000あなたは確か星見家に住んでいて……つまり流星寮の生徒ではありませんわよね？」"
translation = "「당신도 실행위원에 참가 희망이신가요? 당신은 분명 호시미 가에 살고 있고…… 즉 유성 기숙사 학생은 아니시지요?」"

[[dialogue]]
speaker = "アポロ"
original = "「おう、それがどうかしたのか？」"
translation = "「오우, 그게 뭐 어쨌다는 거냐?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「流星寮のクリスマスパーティーですのよ？\u3000なぜ寮生でもないあなたが応募してくるんですの？」"
translation = "「유성 기숙사의 크리스마스 파티입니다! 왜 기숙사생도 아닌 당신이 응모하는 것입니까?」"

[[dialogue]]
speaker = "アポロ"
original = "「ポスターを見て楽しそうだったからだ！\u3000それに募集の条件に『流星寮で生活している寮生であること』なんて書いてなかったぞ？」"
translation = "「포스터를 보고 즐거울 것 같아서다! 게다가 모집 조건에 『유성 기숙사에서 생활하는 기숙사생일 것』 같은 건 쓰여 있지 않았잖아?」"

[[dialogue]]
speaker = "舞亜"
original = "「確かに書いてないね」"
translation = "「확실히 안 쓰여 있네」"

[[dialogue]]
speaker = "アニュラス"
original = "「ああ、書いていなかったな」"
translation = "「아아, 쓰여 있지 않았다」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「うぐぐ……フニ、これはどういうことですの？」"
translation = "「우득득…… 후니, 이건 무슨 일입니까?」"

[[dialogue]]
speaker = "フェニエル"
original = "「すみません……ちょっとした手違いで流星寮だけではなく、学園の掲示板にも募集のポスターが貼られてしまったみたいで……」"
translation = "「죄송합니다…… 사소한 실수로 유성 기숙사뿐만 아니라, 학원 게시판에도 모집 포스터가 붙어 버린 것 같아서……」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「し、仕方ありませんわ。あなたは附属生ですわよね？\u3000流星学園の生徒であればギリギリセーフですの──」"
translation = "「어, 어쩔 수 없습니다. 당신은 부속생이시지요? 유성 학원의 학생이라면 간신히 세이프입니다──」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「で、あなたはどうしてここにいますの？」"
translation = "「그래서, 당신은 왜 여기에 있습니까?」"

[[dialogue]]
speaker = "unk"
original = "すみません……"
translation = "죄송합니다……"

[[dialogue]]
speaker = "アポロ"
original = "「あたしが連れてきたんだ。ダメだったか？」"
translation = "「내가 데려왔다. 안 됐나?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ダメに決まっていますわ！\u3000この人は新星学園の、しかも会長ではありませんのっ！」"
translation = "「안 될 게 당연합니다! 이 사람은 신성 학원의, 게다가 회장이 아닙니까!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「それがどうして流星寮のクリスマスパーティーの実行委員になるなんてことになりますのっ！」"
translation = "「그게 어째서 유성 기숙사의 크리스마스 파티 실행위원이 된다는 것입니까!」"

[[dialogue]]
speaker = "アポロ"
original = "「でも募集の条件には『新星学園の生徒はダメ』なんて書いてなかったぞ！」"
translation = "「하지만 모집 조건에는 『신성 학원 학생은 안 됨』 같은 건 쓰여 있지 않았잖아!」"

[[dialogue]]
speaker = "舞亜"
original = "「うんうん、書いてなかったね」"
translation = "「응응, 안 쓰여 있었네」"

[[dialogue]]
speaker = "アニュラス"
original = "「ああ、書いていなかったな」"
translation = "「아아, 쓰여 있지 않았다」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ああもうっ、いいですわっ！\u3000許可しますっ！」"
translation = "「아아 정말, 됐습니다! 허가하겠습니다!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「あなたなら真面目に力を貸してくれそうですし、人手は多いに越したことはないでしょうから！」"
translation = "「당신이라면 성실하게 힘을 빌려줄 것 같고, 일손은 많을수록 좋을 테니까요!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ただし、これ以上はダメですわ！\u3000あくまでこれは流星寮のパーティーなんですから！」"
translation = "「다만, 이 이상은 안 됩니다! 어디까지나 이것은 유성 기숙사의 파티니까요!」"

[[dialogue]]
speaker = "unk"
original = "よろしく頼むな"
translation = "잘 부탁한다"

[[dialogue]]
speaker = "unk"
original = "アニュラス、舞亜、アポロ"
translation = "아뉴라스, 마이아, 아폴로"

[[dialogue]]
speaker = "アポロ"
original = "「おう！\u3000みんなもよろしくっ！」"
translation = "「오우! 모두 잘 부탁한다!」"

[[dialogue]]
speaker = "アニュラス"
original = "「よろしく頼む」"
translation = "「잘 부탁한다」"

[[dialogue]]
speaker = "舞亜"
original = "「よろしくね～♪」"
translation = "「잘 부탁해～♪」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "（想定外の人材が紛れ込みましたけれど……まあ、アニュラスさんと舞亜さんがいれば大丈夫でしょう）"
translation = "（예상 밖의 인재가 끼어들었습니다만…… 뭐, 아뉴라스 씨와 마이아 씨가 있다면 괜찮겠지요）"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "（アポロさんがいれば附属生の意見も取り入れることができますし、会長にまとめ役になってもらえば……案外悪くない布陣かもしれません）"
translation = "（아폴로 씨가 있다면 부속생의 의견도 수렴할 수 있고, 회장에게 정리 역할을 맡긴다면…… 의외로 나쁘지 않은 포진일지도 모른다）"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「では、流星寮クリスマスパーティー実行委員の設立をここに宣言しますわ」"
translation = "「그럼, 유성 기숙사 크리스마스 파티 실행위원의 설립을 여기에 선언합니다」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「実行委員の皆さん、素晴らしきパーティーになるよう、よろしくお願いしますわね！」"
translation = "「실행위원 여러분, 훌륭한 파티가 되도록, 잘 부탁드립니다!」"

[[dialogue]]
speaker = "全員"
original = "「おーっ！」"
translation = "「오옷!」"

