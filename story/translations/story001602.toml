[[dialogue]]
speaker = "ヒマワリ"
original = "「あたし、<ruby>鈴野<rt>すずの</rt></ruby>ヒマワリです！\u3000附属校２年です！」"
translation = "「전 스즈노 히마와리예요! 부속교 2학년이에요!」"

[[dialogue]]
speaker = "ミウ"
original = "「同じく、附属校２年、<ruby>深沢<rt>ふかざわ</rt></ruby>ミウです。ヒマワリちゃんとは大の仲良しの親友なんです」"
translation = "「마찬가지로 부속교 2학년, 후카자와 미우입니다. 히마와리짱과는 둘도 없는 절친이에요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「わざわざ訪れてくれた客人を、ただ追い返すような無粋な真似は致しません。話くらいはお聞きしますわ」"
translation = "「일부러 찾아와 준 손님을 그냥 쫓아버리는 무지몽매한 짓은 하지 않아요. 이야기 정도는 들어드리죠.」"

[[dialogue]]
speaker = "セナリィ"
original = "「ですが──聞き間違いでなければ、おふたりはゴールデングースに入りたいと？」"
translation = "「하지만── 제가 잘못 들은 게 아니라면 두 분은 골든 구스에 들어오고 싶다고요?」"

[[dialogue]]
speaker = "ミウ"
original = "「は、はい！\u3000間違いないです」"
translation = "「네, 네! 틀림없어요.」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「あたしたち、セナリィ様が戦っているところを見たんです！」"
translation = "「저희, 세나리 님이 싸우시는 걸 봤거든요!」"

[[dialogue]]
speaker = "ミウ"
original = "「およそ１週間前──２人で一緒にお出かけして、少し帰りが遅くなった週末の夜です」"
translation = "「약 1주일 전── 둘이서 같이 놀러 나갔다가 귀가가 조금 늦어진 주말 밤이에요.」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「近道を通ろうとして裏路地に迷い込んじゃったんですけど、そしたらドンパチが聞こえてきて」"
translation = "「지름길로 가려다가 뒷골목으로 잘못 들어갔는데, 거기서 총소리가 들려와서요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「そこにいたのが私だった？」"
translation = "「거기에 있던 게 저였나요?」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「はい！\u3000悪そうな奴らを、たった１人でやっつけてて！」"
translation = "「네! 나빠 보이는 녀석들을 단 혼자서 해치우고 계셔서!」"

[[dialogue]]
speaker = "セナリィ"
original = "「甘いですわね！\u3000あなたの力、利用させていただきます！\u3000《<ruby>強奪<rt>バンデット</rt></ruby>》！」"
translation = "「무르군요! 당신의 힘, 이용해 드리겠어요! 《<ruby>강탈<rt>밴디트</rt></ruby>》!」"

[[dialogue]]
speaker = "セナリィ"
original = "「──《<ruby>解放<rt>リリース</rt></ruby>》！\u3000自分の力でやられる屈辱、その身で味わうがいいですわ！」"
translation = "「──《<ruby>해방<rt>릴리스</rt></ruby>》! 자신의 힘에 당하는 굴욕, 그 몸으로 맛보는 게 좋아요!」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「そんなわけで、２人して『これだーっ！』って思ったんです！」"
translation = "「그런 이유로 둘이서 『이거다!』라고 생각했어요!」"

[[dialogue]]
speaker = "ミウ"
original = "「セナリィ様の華麗に踊るようなガンアクションに感激しちゃいました。一目惚れってあるんですね……！」"
translation = "「세나리 님의 화려하게 춤추는 듯한 건 액션에 감격해버렸어요. 첫눈에 반한다는 게 정말 있더라고요……!」"

[[dialogue]]
speaker = "セナリィ"
original = "「そ、そう？\u3000そんなに素敵だったかしら」"
translation = "「그, 그래요? 그렇게 멋졌으려나.」"

[[dialogue]]
speaker = "ミウ"
original = "「はい！\u3000それはもう！\u3000この世に『女帝』がいらっしゃるならば、それはセナリィ様に他ならないと思いました」"
translation = "「네! 정말로요! 이 세상에 『여제』가 계신다면 그건 세나리 님 이외에 아무도 없다고 생각했어요.」"

[[dialogue]]
speaker = "ミウ"
original = "「その後、あの時の美しい女性は誰だったのかから始まり、いろいろと調べていたら、最終的に『秘密結社ゴールデングース』に行き着きまして」"
translation = "「그 뒤로 그때의 아름다운 여성분이 누구였는지부터 시작해서 이것저것 조사하다 보니 최종적으로 『비밀 결사 골든 구스』에 도달하게 됐어요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「へえ……大した調査力ですわね」"
translation = "「헤에…… 제법 대단한 조사력이군요.」"

[[dialogue]]
speaker = "ミウ"
original = "「はい、私、そういうのがちょっと得意なので」"
translation = "「네, 제가 그런 걸 좀 잘해서요.」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「これは絶対、強くて麗しいセナリィ様の元で働くしかないと！\u3000あたしたちは決めたんです！」"
translation = "「이건 절대 강하고 아름다우신 세나리 님 밑에서 일할 수밖에 없다고! 저희는 결심했어요!」"

[[dialogue]]
speaker = "セナリィ"
original = "「……今、なんておっしゃいました？」"
translation = "「……지금 뭐라고 하셨죠?」"

[[dialogue]]
speaker = "ミウ"
original = "「私たち、強くて麗しいセナリィ様の元で働きたいんです！」"
translation = "「저희, 강하고 아름다우신 세나리 님 밑에서 일하고 싶어요!」"

[[dialogue]]
speaker = "セナリィ"
original = "「そ、そう……そんなにも……んん、まぁ……そうですわねぇ……強くて麗しいですか……ふふっ、ふふふ♪」"
translation = "「그, 그래요…… 그렇게까지…… 흠, 뭐…… 그렇군요…… 강하고 아름답다라…… 후훗, 후후후♪」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「セナリィ様？」"
translation = "「세나리 님?」"

[[dialogue]]
speaker = "セナリィ"
original = "「ああ、いえ……こほん。ここは笑う子は泣き、泣く子は黙る、秘密結社ゴールデングースですわよ」"
translation = "「아아, 아뇨…… 흠흠. 여기는 우는 아이도 웃고, 웃는 아이도 울음을 그친다는 비밀 결사 골든 구스랍니다.」"

[[dialogue]]
speaker = "ミウ"
original = "「最終的にみんな黙っちゃうんですね」"
translation = "「결국 다들 조용해지는 거네요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「附属２年とおっしゃいましたわね？\u3000あなたたちのようなお子様に、私の真の美学が理解できるはずがありません」"
translation = "「부속 2학년이라고 하셨죠? 당신들 같은 꼬맹이가 제 진정한 미학을 이해할 수 있을 리 없어요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「私の元に来る依頼は、危険や死と隣り合わせ。デッド・オア・アライブ……」"
translation = "「제 밑으로 들어오는 의뢰는 위험과 죽음이 종이 한 장 차이. 데드 오어 얼라이브……」"

[[dialogue]]
speaker = "セナリィ"
original = "「足手まといのお子様を引き連れてやれるほど、生ぬるい仕事ではありませんのよ」"
translation = "「짐만 될 꼬맹이들을 데리고 다닐 만큼 호락호락한 일이 아니랍니다.」"

[[dialogue]]
speaker = "セナリィ"
original = "「私の戦いを見たことも、ここを訪れたことも全てお忘れなさい。とっととお家に返って、ワンちゃんをモフる動画でも観ていた方が幸せな毎日を過ごせますわよ」"
translation = "「제 전투를 본 것도, 여기를 찾아온 것도 전부 잊으세요. 얼른 집으로 돌아가서 강아지를 쓰다듬는 영상이나 보고 있는 게 행복한 매일을 보낼 수 있을 거예요.」"

[[dialogue]]
speaker = "セナリィ"
original = "（はーっ……キマった……！\u3000キマりすぎましたわー……！）"
translation = "(하아── 멋졌다……! 너무 완벽하게 멋져버렸어요──!)"

[[dialogue]]
speaker = "セナリィ"
original = "（未来あるお子様を、危険な任務に晒すわけにはいかないものね。親御さんも心配されるはずよ）"
translation = "(미래가 창창한 아이들을 위험한 임무에 노출할 수는 없는걸. 부모님도 걱정하실 테고.)"

[[dialogue]]
speaker = "ヒマワリ"
original = "「危険は承知の上です！\u3000あたしたち、成績は優秀なんです！\u3000有望株ですよ！」"
translation = "「위험은 각오하고 있어요! 저희 성적도 우수하다고요! 유망주예요!」"

[[dialogue]]
speaker = "ミウ"
original = "「ヒマワリちゃんと私が加わることで、今まで以上に困難な任務も受けられるようになる……そうは思いませんか？」"
translation = "「히마와리짱과 제가 합류함으로써 지금까지보다 더 곤란한 임무도 수행할 수 있게 된다…… 그렇게 생각하지 않으세요?」"

[[dialogue]]
speaker = "セナリィ"
original = "「ふうん……？\u3000どうやら腕に覚えがあるようですわね？」"
translation = "「흐응……? 아무래도 실력에 자신이 있는 모양이군요?」"

[[dialogue]]
speaker = "ミウ"
original = "「未経験ですけど、やる気は人一倍あります」"
translation = "「미경험자이긴 하지만 의욕만큼은 남들보다 갑절은 더 있어요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「未経験者を歓迎してませんし、アットホームな職場でもなければ、福利厚生もしっかりしてませんわよ」"
translation = "「미경험자를 환영하지도 않고, 화목한 직장도 아니며 복리후생도 제대로 되어 있지 않답니다.」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「それでも、です！」"
translation = "「그래도, 부탁드려요!」"

[[dialogue]]
speaker = "セナリィ"
original = "（やれやれ……この子たちの目、本気ね。そう簡単には引き下がってくれそうにないわ）"
translation = "(이런 이런…… 이 아이들의 눈, 진심이네. 그렇게 쉽게 물러날 것 같지 않아.)"

[[dialogue]]
speaker = "セナリィ"
original = "（一時的な熱病のようなものでしょう。ま、まあ、強くて麗しい私に見惚れて？\u3000憧れられるのは悪い気はしませんけども？）"
translation = "(일시적인 열병 같은 거겠죠. 뭐, 뭐어, 강하고 아름다운 저에게 반해서? 동경하는 건 나쁜 기분은 아니긴 합니다만?)"

[[dialogue]]
speaker = "セナリィ"
original = "（シッシッと仔犬のように追い払ったところで、この分だと毎日のように詰めかけてきそうね）"
translation = "(훠이훠이 강아지 쫓아내듯 쫓아낸다 해도 이 기세라면 매일같이 몰려올 것 같네.)"

[[dialogue]]
speaker = "セナリィ"
original = "（このセナリィ、情に絆されるような甘っちょろい女ではないわ）"
translation = "(이 세나리, 정에 휘둘리는 무른 여자가 아니거든요.)"

[[dialogue]]
speaker = "セナリィ"
original = "（２人を確実に諦めさせる体のいい言い訳が必要そうね。ええと、どうしましょう……）"
translation = "(두 사람을 확실히 포기하게 할 그럴듯한 핑계가 필요하겠어. 에또, 어쩌면 좋담……)"

[[dialogue]]
speaker = "セナリィ"
original = "「では、あなたたちに受けてもらうとしましょう。毎年、多くの脱落者が出て、採用確率０．０１％と実しやかに囁かれる秘密結社ゴールデングース、地獄の入社試験を！」"
translation = "「그럼, 당신들을 받아주도록 하죠. 매년 수많은 탈락자가 발생하며 채용 확률 0.01%라고 암암리에 소문난 비밀 결사 골든 구스, 지옥의 입사 시험을!」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「じ、地獄の入社試験ーーーーッッッ！！？」"
translation = "「지, 지옥의 입사 시험ーーーー!!?」"

[[dialogue]]
speaker = "ミウ"
original = "「いったいどんな内容が待ち構えているんでしょうか……どきどきわくわく」"
translation = "「도대체 어떤 내용이 기다리고 있을까요…… 두근두근 설레요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「引き下がるなら今の内ですわよ。始まってから後悔しても遅いですわ」"
translation = "「물러날 거라면 지금뿐이랍니다. 시작하고 나서 후회해도 늦어요.」"

[[dialogue]]
speaker = "ミウ"
original = "「いえ、もちろんやります！\u3000やらせてください！」"
translation = "「아니요, 물론 하겠습니다! 하게 해주세요!」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「そんな面白そうなこと、やらいでかです！」"
translation = "「그렇게 재밌어 보이는 일을 안 할 리가 없잖아요!」"

[[dialogue]]
speaker = "セナリィ"
original = "「あ、あら、そう？\u3000そうなの？」"
translation = "「어, 어라, 그래? 그런 거니?」"

[[dialogue]]
speaker = "セナリィ"
original = "（ぬぬぅ、困ったわね……入社試験なんて初めてだし、今更、何も考えてないなんて言えないし……！）"
translation = "(느누우, 곤란하게 됐네…… 입사 시험 같은 건 처음이고, 이제 와서 아무 생각도 안 했다고 말할 수도 없고……!)"

[[dialogue]]
speaker = "セナリィ"
original = "「し、試験は１週間後！\u3000それまでに考え──じゃなくて、入念な準備を整えておきますわ！」"
translation = "「시, 시험은 일주일 뒤! 그때까지 생각──이 아니라, 입심 있게 준비를 갖춰두겠어요!」"

[[dialogue]]
speaker = "ミウ"
original = "「わかりました！\u3000１週間後ですね。それまでにこちらもプランを立てておきます」"
translation = "「알겠습니다! 일주일 뒤군요. 그때까지 저희도 플랜을 세워둘게요.」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「毎晩いっぱい寝て、体調を万全にしておきます！」"
translation = "「매일 밤 푹 자서 컨디션을 만전으로 해둘게요!」"

[[dialogue]]
speaker = "セナリィ"
original = "「……それはとても感心ですわね」"
translation = "「……그거 아주 기특하군요.」"

[[dialogue]]
speaker = "セナリィ"
original = "（２人を傷つけないよう、穏便に諦めさせる方法は……ま、１週間あればいいアイデアのひとつも思いつくことでしょう）"
translation = "(두 사람을 상처 입히지 않고 온건하게 포기하게 할 방법은…… 뭐, 일주일이나 있으면 좋은 아이디어 하나쯤은 떠오르겠죠.)"

