[[dialogue]]
speaker = "unk"
original = "第３話,親友じゃない？,P"
translation = "제3화, 절친 아니야?"

[[dialogue]]
speaker = "unk"
original = "ウズメと知り合ってからしばらく経ったある日のこと。俺は彼女と街へ遊びに出かけていた――"
translation = "우즈메와 알게 된 지 꽤 지난 어느 날. 나는 그녀와 거리로 놀러 나가 있었다──"

[[dialogue]]
speaker = "ウズメイア"
original = "「さて、到着～♪\u3000今日はどこから見てまわろっか？」"
translation = "「자, 도착~♪ 오늘은 어디부터 둘러볼까?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ん？\u3000――最近、よく一緒に遊ぶよねって？\u3000確かに～」"
translation = "「응? ──최근 자주 같이 노는 것 같다고? 확실히 그렇네~」"

[[dialogue]]
speaker = "ウズメイア"
original = "「お正月から１ヶ月くらいしか経ってないのにね～。なんか昔から仲良い男友達って感じがするし♪」"
translation = "「정월부터 한 달 정도밖에 안 지났는데 말이야~. 왠지 예전부터 친했던 남사친 같은 느낌이 들고♪」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ていうか、これもう親友じゃない？\u3000――なんて♪\u3000えへへへ♪」"
translation = "「그보다 이거 이미 절친 아니야? ──장난이야♪ 에헤헤헤♪」"

[[dialogue]]
speaker = "unk"
original = "と、周囲に異変が起こったのは、その時だった。"
translation = "주변에 이변이 일어난 것은 그때였다."

[[dialogue]]
speaker = "ウズメイア"
original = "「えっ、この感じ……まさか！？」"
translation = "「엣, 이 느낌…… 설마!?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「周囲が『バグ化』してる！\u3000あっ！\u3000会長くん見て、正面のビル！」"
translation = "「주변이 『버그화』하고 있어! 앗! 회장군 봐, 정면 빌딩!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「あれ、アステライトがビルを飲み込んでる！\u3000今日は休日だし、中に沢山人がいるんじゃないの！？」"
translation = "「저거 아스텔라이트가 빌딩을 집어삼키고 있어! 오늘은 휴일인데 안에 사람이 잔뜩 있는 거 아냐!?」"

[[dialogue]]
speaker = "unk"
original = "……俺が突入して、救助する！"
translation = "……내가 돌입해서 구조하겠어!"

[[dialogue]]
speaker = "ウズメイア"
original = "「――私はほかの星徒会メンバーがくるまで、ここで待機？\u3000会長くんはそれまで１人で戦う気なの？\u3000ダメだよ！」"
translation = "「──나는 다른 성도회 멤버가 올 때까지 여기서 대기? 회장군은 그때까지 혼자 싸울 생각이야? 안 돼!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「あたしだってプリマステラなんだから、戦うなら２人でっしょ！\u3000――少数での突入は危険？\u3000でも、会長くんは中の人たちを放っておけないんでしょ？」"
translation = "「나도 프리마스텔라니까 싸운다면 둘이서 해야지! ──소수 돌입은 위험하다고? 하지만 회장군은 안의 사람들을 내버려 둘 수 없는 거지?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「だったら、あたしだって一緒に戦うし！\u3000危険な時こそ、お互いの背中を守るのが友達じゃん！」"
translation = "「그렇다면 나도 같이 싸울 거야! 위험할 때야말로 서로의 등 뒤를 지켜주는 게 친구잖아!」"

[[dialogue]]
speaker = "unk"
original = "わかった……ウズメ、頼む！"
translation = "알았어…… 우즈메, 부탁해!"

[[dialogue]]
speaker = "ウズメイア"
original = "「うんっ！\u3000勇猛果敢に薙ぎ払っちゃうし！」"
translation = "「응! 용맹과감하게 쓸어버릴 테니까!」"

[[dialogue]]
speaker = "unk"
original = "俺たちは変身して、ビルを飲み込んでしまったアステライト内に突入。外へ避難しようとする人達を守りながら、戦闘を開始した――"
translation = "우리들은 변신해서 빌딩을 삼켜버린 아스텔라이트 내부로 돌입. 밖으로 피난하려는 사람들을 지키며 전투를 개시했다──"

[[dialogue]]
speaker = "ウズメイア"
original = "「はぁ……はぁ……！\u3000やっぱ、めっちゃモンスター多いんだけど……！」"
translation = "「하아…… 하아……! 역시 몬스터가 엄청 많은데……!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「っ……避難してる人たちのところへは、１匹も通さないっ！\u3000はあぁぁぁっ！」"
translation = "「윽…… 피난하는 사람들이 있는 곳으로는 한 마리도 못 지나가게 하겠어! 하아아앗!」"

[[dialogue]]
speaker = "ウズメイア"
original = "（本当はこの階ごと得意の横一閃で吹き飛ばしちゃいたいけど、避難が完了するまではビルが崩れちゃうかもだから、それはできない……！）"
translation = "(사실 이 층 전체를 특기인 가로 일섬으로 날려버리고 싶지만, 피난이 끝날 때까지는 빌딩이 무너질지도 모르니까 그럴 수 없어……!)"

[[dialogue]]
speaker = "ウズメイア"
original = "（でも、本気を出さないでこの数を相手にするのは厳しいかも……！）"
translation = "(하지만 진심을 내지 않고 이 숫자를 상대하는 건 힘들지도……!)"

[[dialogue]]
speaker = "ウズメイア"
original = "「だとしても、逃げるわけにはいかないしっ！\u3000てえぇぇぇいっ！」"
translation = "「그렇다고 도망칠 수는 없으니까! 테야앗!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「っ……！\u3000他のモンスターを盾にして、１匹かわされた！？」"
translation = "「윽……! 다른 몬스터를 방패 삼아서 한 마리가 피했어!?」"

[[dialogue]]
speaker = "ウズメイア"
original = "（こっちに向けて攻撃してくる！\u3000ダメ、かわせない……！）"
translation = "(이쪽을 향해 공격해와! 안 돼, 못 피해……!)"

[[dialogue]]
speaker = "unk"
original = "ウズメ！\u3000させるかっ！！"
translation = "우즈메! 하게 둘까 보냐!!"

[[dialogue]]
speaker = "unk"
original = "俺は戦っていた周りのモンスターをすぐさま殴り飛ばして、ウズメの前に飛び込んだ。"
translation = "나는 싸우고 있던 주변 몬스터를 곧장 때려눕히고 우즈메의 앞으로 뛰어들었다."

[[dialogue]]
speaker = "ウズメイア"
original = "「会長くん！？\u3000あたしを庇って、攻撃をくらって……！」"
translation = "「회장군!? 나를 감싸고 공격을 맞아서……!」"

[[dialogue]]
speaker = "フワッチ"
original = "「――――！？」"
translation = "「─────!?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「会長くん！\u3000大丈夫！？\u3000怪我は……！？」"
translation = "「회장군! 괜찮아!? 상처는……!?」"

[[dialogue]]
speaker = "unk"
original = "大丈夫だ。１番前は俺に任せろ"
translation = "괜찮아. 맨 앞은 나한테 맡겨."

[[dialogue]]
speaker = "ウズメイア"
original = "「う、うんっ……！」"
translation = "「으, 응……!」"

[[dialogue]]
speaker = "ウズメイア"
original = "（攻撃をくらったのに全然怯まない……！\u3000会長くん、すごい気迫だし……！）"
translation = "(공격을 맞았는데도 전혀 주춤하지 않아……! 회장군, 엄청난 기백이고……!)"

[[dialogue]]
speaker = "unk"
original = "その時、ビルの壁をぶち破り、聞き慣れた声が響いた。"
translation = "그때 빌딩 벽을 부수고 익숙한 목소리가 울려 퍼졌다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「クロト！\u3000ウズメ！\u3000２人共、無事？」"
translation = "「쿠로토! 우즈메! 둘 다 무사해?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ヴィーナス先輩！\u3000それに、星徒会のみんなも！」"
translation = "「비너스 선배! 그리고 성도회 모두들!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私たちが来るまでよく頑張ったわね。でも、もう大丈夫よ！」"
translation = "「우리들이 올 때까지 잘 버텼구나. 하지만 이제 괜찮아!」"

[[dialogue]]
speaker = "unk"
original = "ああ、皆、このままアステラを攻略するぞ！"
translation = "아아, 모두들 이대로 아스텔라를 공략하자!"

[[dialogue]]
speaker = "ウズメイア"
original = "（そこからはすごかった。会長くんは１番先頭で戦いながら、あたしや星徒会メンバーに的確な指示を飛ばして、みるみるモンスターの大軍を押し返し――）"
translation = "(거기서부터는 대단했어. 회장군은 맨 앞에서 싸우면서 나랑 성도회 멤버들에게 정확한 지시를 내리고, 눈 깜짝할 사이에 몬스터 대군을 밀어내고──)"

[[dialogue]]
speaker = "ウズメイア"
original = "（気づけば、アステライトのコアがあるフロアへ到着。モンスターの猛攻を潜り抜け、その拳でコアを破壊してみせた――）"
translation = "(어느샌가 아스텔라이트 코어가 있는 플로어에 도착. 몬스터의 맹공을 뚫고 그 주먹으로 코어를 파괴해 보였어──)"

[[dialogue]]
speaker = "ウズメイア"
original = "「って、緊張が解けたら、いつの間にか星力すっからかんだし……しばらく動けないかも……」"
translation = "「그치만 긴장이 풀리니까 어느새 성력이 텅텅 비었네…… 한동안 못 움직일지도……」"

[[dialogue]]
speaker = "unk"
original = "ウズメっ！？"
translation = "우즈메!?"

[[dialogue]]
speaker = "ウズメイア"
original = "「あっ、会長くん。大丈夫、大丈夫。攻撃受けたわけじゃなくて、ちょっと疲れただけだから、少し休めば――」"
translation = "「앗, 회장군. 괜찮아, 괜찮아. 공격받은 게 아니라 좀 지쳤을 뿐이니까 조금 쉬면──」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ひゃあっ！？\u3000か、会長くん！？\u3000なにしてんの！？\u3000いきなりお姫様抱っこって……！？」"
translation = "「히얏!? 회, 회장군!? 뭐 하는 거야!? 갑자기 공주님 안기라니……!?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「――もうすぐアステライトの異空間が崩壊するから危ないかも？\u3000外まで運んでくれるの？\u3000で、でも……！」"
translation = "「──곧 아스텔라이트 이공간이 붕괴하니까 위험할지도 모른다고? 밖까지 운반해 주겠다고? 하, 하지만……!」"

[[dialogue]]
speaker = "unk"
original = "背中を守ってくれたお礼ってことで"
translation = "등을 지켜준 보답이야."

[[dialogue]]
speaker = "ウズメイア"
original = "「っ……！」"
translation = "「윽……!」"

[[dialogue]]
speaker = "ウズメイア"
original = "（か、会長くんの笑顔、なんかドキッとするし！？\u3000な、なにこれ……なんで急に、こんな……！？）"
translation = "(회, 회장군의 미소, 왠지 두근거린다구!? 뭐, 뭐야 이거…… 왜 갑자기 이렇게……!?)"

[[dialogue]]
speaker = "ウズメイア"
original = "（あたし、もしかして今、会長くんのことを男の子として意識しちゃってんの……！？）"
translation = "(나 설마 지금 회장군을 이성으로 의식해버리고 있는 거야……!?)"

[[dialogue]]
speaker = "ウズメイア"
original = "（た、確かにあたしのこと、攻撃から庇ってくれたし、勇敢でカッコよかったけど……！）"
translation = "(하, 하긴 나를 공격에서 감싸줬고 용감하고 멋있었지만……!)"

[[dialogue]]
speaker = "ウズメイア"
original = "（って、さっきの会長くん、男らしくて、めっちゃあたしの好みなんだけど！？）"
translation = "(그치만 방금 전의 회장군, 남자답고 완전 내 취향인데!?)"

[[dialogue]]
speaker = "ウズメイア"
original = "（うぅ～～～っ！\u3000ついさっきまで、気の合う男友達で、親友とか自分で言ってたのにぃ～……！）"
translation = "(으으~~~윽! 방금 전까지 마음 맞는 남사친이고 절친이라고 직접 말했었는데에~……!)"

[[dialogue]]
speaker = "unk"
original = "お姫様抱っこがそんなに恥ずかしかったのか、顔を赤くして両手で覆ってしまうウズメ。背中におんぶする方がよかっただろうか……？\u3000と反省する俺なのだった――"
translation = "공주님 안기가 그렇게 부끄러웠는지 얼굴을 붉히며 양손으로 가려버리는 우즈메. 등에 업어주는 게 나았을까……? 하며 반성하는 나였다──"

