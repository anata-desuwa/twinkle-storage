[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「こっちからいくわよ！\u3000フォビドゥン──」"
translation = "「이쪽에서 간다! 포비든──」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「！？\u3000いつもの手ごたえがない！？」"
translation = "「!? 평소 같은 반응이 없어!?」"

[[dialogue]]
speaker_original = "ヴィライア"
speaker_translation = "빌라이아"
original = "『魔力が使えなくて驚いたかしら』"
translation = "『마력을 사용할 수 없어서 놀랐나』"

[[dialogue]]
speaker_original = "ヴィライア"
speaker_translation = "빌라이아"
original = "『その魔導書も深淵書庫の一部と言ったはず。私の管理権限で機能を止めてあるわ』"
translation = "『그 마도서도 심연서고의 일부라고 했을 텐데. 나의 관리 권한으로 기능을 정지시켰다』"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「やり方がみみっちいわよ！」"
translation = "「하는 짓이 좀스럽네!」"

[[dialogue]]
speaker_original = "ヴィライア"
speaker_translation = "빌라이아"
original = "『なんとでも言いなさい』"
translation = "『마음대로 지껄여라』"

[[dialogue]]
speaker_original = "ヴィライア"
speaker_translation = "빌라이아"
original = "『今のあなたは呪いも魔力も使えない、ただの星騎士よ。魔王でもない身で、破滅の化身に勝てると思っているの？』"
translation = "『지금의 너는 저주도 마력도 쓸 수 없는 그저 평범한 성기사일 뿐. 마왕도 아닌 몸으로 파멸의 화신을 이길 수 있다고 생각하나?』"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「破滅の化身？\u3000ならそれこそ、星騎士の出番じゃない」"
translation = "「파멸의 화신? 그렇다면야말로 성기사가 나설 차례잖아」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「ちょっと魔導書が使えないくらいで絶望してたらキリカに笑われちゃうわ」"
translation = "「고작 마도서를 못 쓰는 정도에 절망했다간 키리카한테 비웃음당할 거야」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「星力だけで闘うのは初めてだけど……っ！」"
translation = "「성력만으로 싸우는 건 처음이지만……!」"

[[dialogue]]
speaker_original = "ヴィライア"
speaker_translation = "빌라이아"
original = "『あら、思ったよりはやるようね』"
translation = "『어라, 생각보다는 하는 모양이네』"

[[dialogue]]
speaker_original = "ヴィライア"
speaker_translation = "빌라이아"
original = "『だけど効かないわ。普通のモンスター程度ならともかく、煌竜の前には児戯に等しい』"
translation = "『하지만 통하지 않아. 평범한 몬스터 정도라면 몰라도 황룡 앞에서는 어린애 장난이나 다름없다』"

[[dialogue]]
speaker_original = "ヴィライア"
speaker_translation = "빌라이아"
original = "『己の無力を思い知りなさい──ダークブレイズブレス』"
translation = "『자신의 무력함을 깨닫도록 해라── 다크 블레이즈 브레스』"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「きゃあああああっ！！」"
translation = "「꺄아아아아아악!!」"

[[dialogue]]
speaker_original = "ヴィライア"
speaker_translation = "빌라이아"
original = "『魔王によって、二度もリクリエは退けられた。にも関わらず、滅びの予兆は消えることはない。むしろその気配は濃くなっている』"
translation = "『마왕에 의해 두 번이나 리크리에가 저지당했지. 그럼에도 멸망의 전조는 사라지지 않는다. 오히려 그 기척은 짙어지고 있어』"

[[dialogue]]
speaker_original = "ヴィライア"
speaker_translation = "빌라이아"
original = "『あなたにも分かるでしょう？\u3000魔王だけでは世界を救うには足りないのよ』"
translation = "『너도 알겠지? 마왕만으로는 세계를 구하기엔 부족하다는 것을』"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「なに、今の衝撃は！？\u3000……書庫の本から魔力が溢れ出してる！？」"
translation = "「뭐야, 방금 이 충격은!? ……서고의 책에서 마력이 넘쳐흐르고 있어!?」"

[[dialogue]]
speaker_original = "ヴィライア"
speaker_translation = "빌라이아"
original = "『リクリエの気配に反応して、魔本たちも目覚めようとしているわ。感じるでしょう。呪いをふりまく魔力の波動を』"
translation = "『리크리에의 기척에 반응해 마본들도 깨어나려 하고 있다. 느껴지겠지. 저주를 흩뿌리는 마력의 파동을』"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「！\u3000もし、この本の呪いが解き放たれたら──」"
translation = "「! 만약 이 책들의 저주가 풀려난다면──」"

[[dialogue]]
speaker_original = "ヴィライア"
speaker_translation = "빌라이아"
original = "『真上にある流星市国は地獄と化すでしょう。人々は発狂し、動植物は魔獣と化す』"
translation = "『바로 위에 있는 유성시국은 지옥으로 변하겠지. 사람들은 발광하고 동식물은 마수로 변한다』"

[[dialogue]]
speaker_original = "ヴィライア"
speaker_translation = "빌라이아"
original = "『それがイヤなら、あなたが呪いの“器”になることね』"
translation = "『그게 싫다면 네가 저주의 “그릇”이 되는 거다』"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「だからそんなことしたら、廃人になるでしょうが！」"
translation = "「그러니까 그렇게 하면 폐인이 된다니까!」"

[[dialogue]]
speaker_original = "ヴィライア"
speaker_translation = "빌라이아"
original = "『ウィステリア。もう一度、言うわ。私たちを受け入れなさい』"
translation = "『위스테리아. 다시 한번 말하마. 우리를 받아들여라』"

[[dialogue]]
speaker_original = "ヴィライア"
speaker_translation = "빌라이아"
original = "『一度は引き分けた相手だもの、全ての魔導書を受け入れれば、ヴィライアも容易く倒せるでしょう』"
translation = "『한때는 비겼던 상대이지 않나. 모든 마도서를 받아들인다면 빌라이아도 손쉽게 쓰러뜨릴 수 있겠지』"

[[dialogue]]
speaker_original = "ヴィライア"
speaker_translation = "빌라이아"
original = "『あなたなら、全ての呪いを背負い、魔王と並ぶ──いえ、魔王すら超える“英雄”になれるわ』"
translation = "『너라면 모든 저주를 짊어지고 마왕과 어깨를 나란히 하는── 아니, 마왕조차 뛰어넘는 “영웅”이 될 수 있어』"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「はぁ、はぁ……だから英雄はお断りって言ってるでしょ！」"
translation = "「하아, 하아…… 그러니까 영웅은 사양이라고 했잖아!」"

[[dialogue]]
speaker_original = "ヴィライア"
speaker_translation = "빌라이아"
original = "『ブレスを受けて、まだ抵抗する余力があるのね。やはりあなたは“英雄”に相応しいわ』"
translation = "『브레스를 맞고도 아직 저항할 여력이 있다니. 역시 너는 “영웅”에 걸맞아』"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「人の気も知らないで、勝手なこと言わないで！\u3000私は普通の幸せが欲しいのよ！」"
translation = "「남의 속도 모르고 제멋대로 말하지 마! 나는 평범한 행복을 원한다고!」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「子どもの時からそう。普通の子が親や友達と遊ぶ頃、私は呪いや魔導書の扱いを叩き込まれていた」"
translation = "「어릴 때부터 그랬어. 보통 아이들이 부모나 친구들과 놀 때 나는 저주나 마도서 다루는 법을 주입당했어」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「小鳥を初めて呪い殺した時、嫌悪と後悔で何度も吐いたわ」"
translation = "「작은 새를 처음 저주로 죽였을 때 혐오감과 후회 때문에 몇 번이나 토했어」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「この魔導書を手にした時も、気が狂いそうになって、呪いの痛みで眠ることもできなくて、また狂いそうになって、三日三晩苦しんで、なんとか生還できた」"
translation = "「이 마도서를 손에 넣었을 때도 미칠 것 같았고 저주의 통증 때문에 잠도 못 자고 또 미칠 것 같아서 3박 4일을 고통받으며 겨우 살아남았어」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「そんな魔窟みたいな実家を抜け出して、ようやく<ruby>人間界<rt>ここ</rt></ruby>まで来たの」"
translation = "「그런 복마전 같은 본가를 빠져나와서 겨우 인간계까지 온 거야」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「私が欲しいのは、世界を救う力なんかじゃない」"
translation = "「내가 원하는 건 세계를 구하는 힘 같은 게 아냐」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「普通の恋と、美味しいスイーツ。それだけよ」"
translation = "「평범한 사랑이랑 맛있는 디저트. 그것뿐이야」"

[[dialogue]]
speaker_original = "ヴィライア"
speaker_translation = "빌라이아"
original = "『そう、残念だわ。最後まで抗うというなら、ねじ伏せるまで』"
translation = "『그래, 안타깝구나. 끝까지 저항하겠다면 찍어 누를 수밖에』"

[[dialogue]]
speaker_original = "ヴィライア"
speaker_translation = "빌라이아"
original = "『ダークブレイズブレス』"
translation = "『다크 블레이즈 브레스』"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「くっ、うう……」"
translation = "「큭, 으으……」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "（啖呵を切ったのはいいけど、万事休す、ね……）"
translation = "(큰소리는 쳤지만 이제 끝장이네……)"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "（でも諦めちゃダメ……！\u3000考えるのよ、この状況を打開する方法を……！）"
translation = "(하지만 포기하면 안 돼……! 생각하는 거야, 이 상황을 타개할 방법을……!)"

