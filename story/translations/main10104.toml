[[dialogue]]
speaker = "unk"
original = "第４話,新入生歓迎会,B"
translation = "제4화 신입생 환영회 B"

[[dialogue]]
speaker = "unk"
original = "新入生歓迎会は、ヴィーナス会長の堂々とした挨拶から始まった。"
translation = "신입생 환영회는 비너스 회장의 당당한 인사로 시작되었다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「ようこそ新入生の皆さん、新星学園へ！\u3000私たちと一緒に、この素晴らしい世界を守りましょう！」"
translation = "「신입생 여러분, 신성학원에 오신 것을 환영해요! 우리와 함께 이 아름다운 세계를 지킵시다!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「──以上ッ！\u3000新星学園星徒会長、九浄ヴィーナス！\u3000みんな、期待してるわ！」"
translation = "「──이상! 신성학원 성도회장, 쿠죠 비너스! 모두 기대하고 있을게!」"

[[dialogue]]
speaker = "マトイ"
original = "「続きましては、新星学園における日々の生活を、新入生の皆さんにムービーにてご紹介します」"
translation = "「이어서 신성학원에서의 일상생활을 신입생 여러분께 영상으로 소개해 드리겠습니다.」"

[[dialogue]]
speaker = "マトイ"
original = "「放送委員会のコハルコさん、お願いします」"
translation = "「방송위원회의 코하루코 씨, 부탁드립니다.」"

[[dialogue]]
speaker = "コハルコ"
original = "「新入生の皆さん、ご入学おめでとうございます。ご紹介いただきました、放送委員会委員長のコハルコです。それではスクリーンをご覧ください」"
translation = "「신입생 여러분, 입학을 축하드립니다. 소개받은 방송위원회 위원장 코하루코입니다. 그럼 스크린을 봐 주세요.」"

[[dialogue]]
speaker = "アナ"
original = "「おお……」"
translation = "「오오……」"

[[dialogue]]
speaker = "マトイ"
original = "（みんなキラキラ目を輝かせながらムービーを見てる……去年の私も、あんな感じだったのかな？）"
translation = "(다들 반짝이는 눈으로 영상을 보고 있어…… 작년의 나도 저런 느낌이었을까?)"

[[dialogue]]
speaker = "マトイ"
original = "「ありがとうございました。続きましては、年間予定の説明をさせていただきます」"
translation = "「감사합니다. 이어서 연간 예정 설명을 드리겠습니다.」"

[[dialogue]]
speaker = "マトイ"
original = "「星徒会副会長、サーシャさん、お願いします」"
translation = "「성도회 부회장 사샤 씨, 부탁드립니다.」"

[[dialogue]]
speaker = "サーシャ"
original = "「は～い。新入生のみんな～、ご入学おめでとうございま～す」"
translation = "「안녕~. 신입생 여러분~, 입학을 축하해요~」"

[[dialogue]]
speaker = "サーシャ"
original = "「毎日のお勉強や訓練はすっごく大変だけど、校外学習、体育祭や文化祭、楽しいイベントも目白押しで～す。一緒に素敵な学園生活を過ごしましょうね」"
translation = "「매일 공부나 훈련은 무척 힘들지만, 야외 학습, 체육대회나 문화제 등 즐거운 이벤트도 가득하답니다~. 함께 멋진 학원 생활을 보내봐요.」"

[[dialogue]]
speaker = "サーシャ"
original = "「次は、みんなの学園生活をより豊かにする部活動の紹介で～す。まずは乗馬部から～」"
translation = "「다음은 여러분의 학원 생활을 더욱 풍요롭게 해 줄 동아리 소개예요~. 먼저 승마부부터~」"

[[dialogue]]
speaker = "ユーリス"
original = "「はぁっ！\u3000ようこそ、新入生諸君！」"
translation = "「하앗! 환영한다, 신입생 제군!」"

[[dialogue]]
speaker = "ユーリス"
original = "「我が乗馬部は、君たちの来訪を心待ちにしているよ！」"
translation = "「우리 승마부는 그대들의 방문을 간절히 기다리고 있다!」"

[[dialogue]]
speaker = "unk"
original = "馬に乗って現れた乗馬部を皮切りに――"
translation = "말을 타고 나타난 승마부를 시작으로──"

[[dialogue]]
speaker = "unk"
original = "美術部は迫力あるライブペイントで、軽音部は流行りのポップソングで会場を沸かせる。"
translation = "미술부는 박력 있는 라이브 페인팅으로, 경음악부는 유행하는 팝송으로 행사장을 달구었다."

[[dialogue]]
speaker = "unk"
original = "１人でも多くの新入部員を欲しがる各部活は各々に派手なパフォーマンスを見せてアピールしていった。"
translation = "신입 부원을 한 명이라도 더 원하는 각 동아리는 저마다 화려한 퍼포먼스를 선보이며 어필해 나갔다."

[[dialogue]]
speaker = "unk"
original = "そして――"
translation = "그리고──"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふふん、私も負けてられないわね！\u3000いっくわよー！」"
translation = "「후훗, 나도 질 수 없지! 간다아!」"

[[dialogue]]
speaker = "unk"
original = "上空めがけて放った、光の星術。"
translation = "상공을 향해 쏘아 올린 빛의 성술."

[[dialogue]]
speaker = "unk"
original = "皆の注目の視線を集めた光弾は、遥か遥か高みへと昇り──"
translation = "모두의 시선을 집중시킨 광탄은 아득히 높은 곳까지 올라가──"

[[dialogue]]
speaker = "ヴィーナス"
original = "「木っ端ミジンコになりなさい！\u3000はい、ドーーーン！！！」"
translation = "「가루가 되어버리렴! 자, 콰앙!!!」"

[[dialogue]]
speaker = "unk"
original = "大きく弾けて、空に大輪の花を咲かせた。"
translation = "크게 터지며 하늘에 커다란 꽃을 피웠다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「続けて行っくわよーー！\u3000はいっ、はいっ、はーいっ！」"
translation = "「계속해서 간다아──! 자, 자, 자아!」"

[[dialogue]]
speaker = "新入生Ａ"
original = "「すごい……！」"
translation = "「대단해……!」"

[[dialogue]]
speaker = "新入生Ｂ"
original = "「あれが……ヴィーナス会長なんだ……！」"
translation = "「저분이…… 비너스 회장이구나……!」"

[[dialogue]]
speaker = "サーシャ"
original = "「有言実行ね～。ヴィーナスちゃんの花火大会だわ～」"
translation = "「유언실행이네~. 비너스짱의 불꽃놀이 대회야~」"

[[dialogue]]
speaker = "マトイ"
original = "「予算ゼロの花火大会ですか……ウチの会長は、やることなすこと無茶苦茶ですよ」"
translation = "「예산 제로의 불꽃놀이 대회라니…… 우리 회장님은 하는 일마다 정말 막무가내라니까요.」"

[[dialogue]]
speaker = "サーシャ"
original = "「うふふ、会計としては大助かり～」"
translation = "「우후후, 회계로서는 아주 큰 도움이 되지~」"

[[dialogue]]
speaker = "マトイ"
original = "「花火大会も大盛り上がりで、新入生歓迎会は締めくくられました。めでたしめでたし」"
translation = "「불꽃놀이 대회도 성황리에 끝나며 신입생 환영회는 마무리되었습니다. 경사로세 경사로세.」"

[[dialogue]]
speaker = "マトイ"
original = "「──ってわけにはいかないんですよね……？」"
translation = "「──라고 끝날 리가 없겠죠……?」"

[[dialogue]]
speaker = "サーシャ"
original = "「ヴィーナスちゃんは納得しないわね～」"
translation = "「비너스짱은 납득하지 않겠지~」"

[[dialogue]]
speaker = "マトイ"
original = "「現会長の力を見せつけ、拍手喝采の中、新入生歓迎会は締められたのでした──って、議事録は終わらせたいんですけど」"
translation = "「현 회장의 힘을 과시하고 박수갈채 속에 신입생 환영회는 막을 내렸다──라고 의사록은 끝내고 싶습니다만.」"

[[dialogue]]
speaker = "マトイ"
original = "「やっぱりやるしかないんですね……アレ……」"
translation = "「역시 할 수밖에 없는 거군요…… 그거……」"

[[dialogue]]
speaker = "サーシャ"
original = "「マトイちゃんはここからが本番よ。怪我しないよう気をつけてね～」"
translation = "「마토이짱은 이제부터가 본방이란다. 다치지 않게 조심하렴~」"

[[dialogue]]
speaker = "マトイ"
original = "「はぁぁ……行ってきます、サーシャさん。万が一の時は骨を拾ってください」"
translation = "「하아아…… 다녀오겠습니다, 사샤 씨. 만약의 사태에는 뼈라도 추려 주세요.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「さ、みんな、歓迎の花火は楽しんでもらえたかしら！」"
translation = "「자, 여러분, 환영의 불꽃놀이는 즐거우셨나요!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「でも、宴はまだまだ続くの！\u3000ここからが本日のメインイベントよ！」"
translation = "「하지만 잔치는 아직 끝나지 않았어! 여기서부터가 오늘의 메인 이벤트야!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「星徒会役員同士によるバトルデモンストレーション！」"
translation = "「성도회 임원들끼리의 배틀 데몬스트레이션!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ヴィーナスＶＳマトイの模擬戦を始めるわ！」"
translation = "「비너스 VS 마토이의 모의전을 시작하겠어!」"

[[dialogue]]
speaker = "マトイ"
original = "（まったく、ウチの会長ときたらーーーっ！）"
translation = "(정말이지, 우리 회장님은 정말──!)"

