[[dialogue]]
speaker = "unk"
original = "第２話,どこでもお昼寝,P"
translation = "제2화, 어디서나 낮잠, P"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「お疲れ様、会長。運動部系の部室の割り当て、うまい感じにまとまって良かったね」"
translation = "「수고했어, 회장. 운동부 계열의 부실 배정, 좋게 마무리돼서 다행이야」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「薙刀部が星徒会室に乗り込んできた時はどうなるかと思ったけど……堂々とした対応で、すごかったよ。私なんか、薙刀を突き付けられた時は縮こまっちゃったもん」"
translation = "「치도부가 성도회실에 들이닥쳤을 때는 어떻게 되나 싶었지만…… 당당한 대응이 정말 대단했어. 나 같은 건 치도가 겨누어졌을 때 움츠러들었는걸」"

[[dialogue]]
speaker = "unk"
original = "あれはさすがに俺も肝が冷えたけどな……"
translation = "그건 확실히 나도 간담이 서늘했지만 말이야……"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ただいま戻りました。薙刀部の件は会長がうまく解決してくれて……」"
translation = "「다녀왔습니다. 치도부 건은 회장이 잘 해결해 줘서……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「マトイちゃん。し～♪」"
translation = "「마토이 짱. 쉿~♪」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あ……」"
translation = "「아……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……すぅ、すぅ…んんっ、……すぅ……」"
translation = "「……스으, 스으… 응…… ……스으……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「仮眠を取るから１０分くらい経ったら起こしてって、アナちゃんに頼まれたの」"
translation = "「낮잠 잘 거니까 10분 정도 지나면 깨워달라고 아나 짱이 부탁했어」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「私の膝の上に移動させても全然起きないのよ？\u3000かわいい～♪」"
translation = "「내 무릎 위로 옮겨도 전혀 깨지 않는 거 있지? 귀여워~♪」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「えっ……さ、サーシャさんがアナを移動させたんですか？\u3000アナが甘えてきた、とかじゃなくて……？」"
translation = "「엣…… 사, 사샤 씨가 아나를 옮긴 건가요? 아나가 어리광 부리며 온 게 아니라……?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そうよ？\u3000こうやって、よいしょって膝の上に乗せたの♪\u3000抱きしめるとちょうどすっぽり収まるから、抱き心地がいいのよね、アナちゃんって」"
translation = "「그렇단다? 이렇게 영차 하고 무릎 위에 올렸어♪ 안으면 딱 알맞게 품에 들어와서 안는 보람이 있거든, 아나 짱은」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「はあぁ～……♪\u3000今なら、なでなでし放題だわ♪」"
translation = "「하아아～……♪ 지금이라면, 쓰담쓰담 마음껏 할 수 있겠어♪」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「んっ、んん……っ、……すぅ、すぅ、んふぅ……」"
translation = "「응, 으응……윽, ……후우, 후우, 응후우……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「今ならいたずらし放題よ？\u3000どう、マトイちゃん……？\u3000今ならこの柔らかそうなほっぺた、ぷにぷにし放題♪」"
translation = "「지금이라면 장난도 마음껏 칠 수 있다구? 어때, 마토이짱……? 지금이라면 이 말랑말랑해 보이는 볼, 푸니푸니 마음껏 할 수 있어♪」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「だ、ダメですよ！\u3000アナだって疲れてるんですから、ゆっくり寝かせてあげたほうがいいと思います……！」"
translation = "「아, 안 돼요! 아나도 지쳐 있으니까, 푹 자게 두는 편이 좋다고 생각해요……!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「会長くんはどうかしら……？」"
translation = "「회장군은 어떠려나……?」"

[[dialogue]]
speaker = "unk"
original = "……ごくり"
translation = "……꿀꺽"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ごくり、じゃないよ！？\u3000意外とムッツリだよね、会長！？」"
translation = "「꿀꺽, 이 아니잖아!? 의외로 음란하네, 회장!?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「膝の上に乗せるくらい別に……って、そう考えてる時点で下心あるよ。私だってちょっと乗せてみたいなって思ってたけど、我慢したんだから……」"
translation = "「무릎 위에 앉히는 것 정도야 별로……랄까, 그렇게 생각하는 시점에서 엉큼한 속셈이 있는 거야. 나도 조금 앉혀보고 싶다고 생각했지만, 참았으니까……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「大丈夫よ、マトイちゃん。アナちゃんには了承を得てるわ」"
translation = "「괜찮아, 마토이짱. 아나짱에게는 승낙을 받았거든」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そう……なんですか？\u3000じ、じゃあ、私も……」"
translation = "「그……런가요? 저, 저기, 그럼 저도……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「寝ている間に、寝心地のいいところに移動させておいてあげるって、言っておいたから♪」"
translation = "「자는 동안에, 잠자리가 편한 곳으로 이동시켜 주겠다고 말해 뒀으니까♪」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「拡大解釈では！？\u3000や、やっぱり私は止めておきます……」"
translation = "「확대해석 아니에요!? 여, 역시 저는 그만둘래요……」"

[[dialogue]]
speaker = "unk"
original = "俺はちょっと失礼して……"
translation = "나는 실례 좀 해서……"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あっ、会長！？\u3000ずるい！」"
translation = "「앗, 회장!? 치사해!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「うふふ……いいわよ～♪」"
translation = "「우후후…… 괜찮아～♪」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「こっちにいらっしゃい。代わってあげる♪」"
translation = "「이쪽으로 오렴. 교대해 줄게♪」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ん、んうぅ……」"
translation = "「음, 음으으……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「おはよう、アナちゃん。きっちり１０分寝てたわね～」"
translation = "「안녕, 아나짱. 딱 10분 잤네～」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「その技術、私も欲しいわ～。仮眠を取ろうとすると、つい熟睡しちゃうのよね～」"
translation = "「그 기술, 나도 갖고 싶어～. 낮잠을 자려고 하면, 그만 숙면해 버린단 말이지～」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「わ、私……どうなっても知らないから」"
translation = "「나, 난…… 어떻게 돼도 모를 거니까」"

[[dialogue]]
speaker = "unk"
original = "おはよう、アナ"
translation = "안녕, 아나"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「…………は？」"
translation = "「…………하?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「…………～～～～～～っっっ！？！？」"
translation = "「…………～～～～～～윽윽윽!?!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「なな、なにをしているんですか、会長！？」"
translation = "「머, 머머, 뭘 하고 있는 건가요, 회장!?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「きゃ～♪\u3000アナちゃんのそんな慌てる顔、初めてみたかも♪」"
translation = "「꺄～♪ 아나짱의 그렇게 당황하는 얼굴, 처음 봤을지도♪」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「さ、サーシャ先輩っ、これはどういうことですかっ！？」"
translation = "「서, 사샤 선배님, 이건 어떻게 된 일인가요!?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「アナちゃんが仮眠を取る前に、寝心地のいいところに移動させるって言ったじゃない。そういうことよ～♪」"
translation = "「아나짱이 낮잠 자기 전에, 잠자리가 편한 곳으로 이동시킨다고 말했잖니. 그런 뜻이야～♪」"

[[dialogue]]
speaker = "unk"
original = "寝心地はどうだった？"
translation = "잠자리는 어땠어?"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ね、寝心地と言われても……」"
translation = "「자, 잠자리라고 하셔도……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……いえ、冷静になると、これはこれで悪くないかもしれません」"
translation = "「……아니요, 냉정해지니 이건 이것대로 나쁘지 않을지도 모릅니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「会長。グッドチェアー賞、受賞。というわけで、このままの体勢で仕事に戻りましょう」"
translation = "「회장. 굿 체어상, 수상. 그런 고로, 이대로의 자세로 업무로 복귀하죠」"

[[dialogue]]
speaker = "unk"
original = "え……俺が仕事できないんだけど……"
translation = "에…… 내가 일을 못 하는데……"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ノープロブレム。私の仕事の能率は１００％アップですから」"
translation = "「노 프로블럼. 제 업무 능률이 100% 업이니까요」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「会長からやりだしたことなんですから、最後まで責任を持って役目を果たして下さい♪」"
translation = "「회장님이 먼저 시작한 일이니까, 끝까지 책임지고 역할을 다해 주세요♪」"

[[dialogue]]
speaker = "unk"
original = "は、はい……"
translation = "네, 네……"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「～～～♪」"
translation = "「～～～♪」"

[[dialogue]]
speaker = "unk"
original = "アナは先程までと打って変わって機嫌よさそうに、バリバリと仕事をこなし始めるのだった。"
translation = "아나는 조금 전까지와는 딴판으로 기분이 좋아 보이며, 척척 업무를 해내기 시작하는 것이었다."

