[[dialogue]]
speaker = "unk"
original = "第１話,ありのままのキミが好き,P"
translation = "제1화, 있는 그대로의 네가 좋아, P"

[[dialogue]]
speaker = "unk"
original = "季節は夏。マトイと行動することが多くなっていた俺は、彼女を異性として意識するようになっていた。"
translation = "계절은 여름. 마토이와 행동하는 일이 많아졌던 나는, 그녀를 이성으로 의식하게 되었다."

[[dialogue]]
speaker = "unk"
original = "そして今日。俺はマトイに、恋人として付き合って欲しいと、告白することを決めていた――"
translation = "그리고 오늘. 나는 마토이에게, 연인으로서 사귀어 달라고 고백하기로 마음먹고 있었다──"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「会長……き、今日はその、遊びに誘ってくれてありがとう」"
translation = "「회장님…… 오, 오늘은 그, 놀러 가자고 권해줘서 고마워요」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「でも……星徒会の他の皆とかも呼ばなくて、本当に良かったの？」"
translation = "「하지만…… 성도회의 다른 사람들도 부르지 않아도, 정말 괜찮았던 거야?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「――う、ううん、私は会長と２人でも嫌じゃないよ！\u3000私も会長と、海で遊びたいって思ってたし……」"
translation = "「──으, 으응, 나는 회장님이랑 둘이라도 싫지 않아! 나도 회장님이랑, 바다에서 놀고 싶다고 생각했었고……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「えへへ……♪\u3000それじゃあ、何して遊ぼっか？」"
translation = "「에헤헤……♪ 그러면, 뭐 하고 놀까?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「――海で水遊び？\u3000うん、やっぱりそこからだよね！」"
translation = "「──바다에서 물놀이? 응, 역시 거기서부터지!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「会長、見ててね！\u3000それ～♪」"
translation = "「회장님, 잘 봐! 에잇~♪」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ふふふ、どう？\u3000密かに水着フォームの訓練続けて、前より大きな波を起こせるようになったんだ～」"
translation = "「후후후, 어때? 몰래 수영복 폼 훈련을 계속해서, 전보다 큰 파도를 일으킬 수 있게 됐어~」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「――凄い？\u3000えへへ♪\u3000じゃあ、今度は会長の番だね！\u3000私が得意な防御を突破できるかな～？」"
translation = "「──대단해? 에헤헤♪ 그럼, 이번엔 회장님 차례네! 내가 자신 있는 방어를 돌파할 수 있을까~?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「きゃっ、冷た～い♪\u3000……なんちゃって！\u3000全部防いじゃいました～♪\u3000そう簡単には行かないよ～！」"
translation = "「꺄악, 차가워~♪ ……농담이야! 전부 막아버렸습니다~♪ 그렇게 쉽게 되지는 않을걸요~!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ふぅ……砂浜で少し休憩～」"
translation = "「후우…… 백사장에서 잠시 휴식~」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あはは、２人で水の掛け合いっこしてるだけだったのに、子供みたいに凄く楽しんじゃった♪」"
translation = "「아하하, 둘이서 물 뿌리기 놀이를 했을 뿐인데, 어린애처럼 정말 즐거웠어♪」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「その……会長はどうだった？\u3000――楽しめた？\u3000なら良かった。会長も一緒の気持ちで……えへへ♪」"
translation = "「그…… 회장님은 어땠어? ──즐거웠어? 그렇다면 다행이다. 회장님도 같은 마음이라서…… 에헤헤♪」"

[[dialogue]]
speaker = "unk"
original = "（良い雰囲気……これなら！）"
translation = "(좋은 분위기…… 이대로라면!)"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「うん？\u3000どうしたの、会長？\u3000……あっ、もしかして――」"
translation = "「응? 왜 그래, 회장님? ……앗, 혹시──」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「お腹が減ったとか！\u3000いつの間にか、お昼の時間になってるし、海の家に何か買いに行く？」"
translation = "「배가 고프다거나! 어느새 점심시간이 됐고, 바다의 집에 뭐라도 사러 갈까?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「私もお腹空いて来たし……あれ？\u3000ごめん、違った？」"
translation = "「나도 배가 고파지기 시작했고…… 어라? 미안, 아니었어?」"

[[dialogue]]
speaker = "unk"
original = "（お腹空いてるなら、後にした方がいいよな）"
translation = "(배가 고프다면, 나중에 하는 게 낫겠지)"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「合ってる？\u3000良かった♪\u3000じゃあ、行こっか」"
translation = "「맞아? 다행이다♪ 그럼, 가자」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ん～♪\u3000やっぱりリップルの作った焼きそばは最高～♪」"
translation = "「음~♪ 역시 리플이 만든 야키소바는 최고야~♪」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あっ、会長、頬っぺたに海苔がくっ付いてる。少しじっとしてて。ん……はい、取れた♪」"
translation = "「앗, 회장님, 뺨에 김이 붙어 있어. 잠시 가만히 있어 봐. 응…… 자, 뗐다♪」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「って、周りから見られちゃってる……！？\u3000ご、ごめん……会長と２人で居るんだもんね……」"
translation = "「앗, 주변 사람들이 보고 있어……!? 미, 미안…… 회장님이랑 둘이 있으니까……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「こんなことしたら注目されちゃうよ……は、恥ずかしい……。その……気付いたら、手が伸びちゃってて……」"
translation = "「이런 짓 하면 주목받아버려…… 부, 부끄러워……. 그…… 정신 차려보니 손이 먼저 나가버려서……」"

[[dialogue]]
speaker = "unk"
original = "（良い雰囲気だけど、場所が……！）"
translation = "(좋은 분위기지만, 장소가……!)"

[[dialogue]]
speaker = "unk"
original = "そうしてズルズルと告白できないまま、日が落ちてしまった――"
translation = "그렇게 우물쭈물 고백하지 못한 채, 해가 저물어버렸다──"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「もう夜か～。あっという間に時間過ぎちゃったね～」"
translation = "「벌써 밤이네~. 순식간에 시간이 지나버렸어~」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「さすがにもう、暗くて水遊びも出来ないし、今日のところはこれでお開きかな……」"
translation = "「역시 이제 어두워서 물놀이도 못 하고, 오늘은 이쯤에서 끝내야 할까……」"

[[dialogue]]
speaker = "unk"
original = "そうだな……また今度遊びに――"
translation = "그렇네…… 다음에 또 놀러──"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あっ、また一緒に遊びに連れていってくれるの？\u3000そっかぁ――」"
translation = "「앗, 또 같이 놀러 데려가 주는 거야? 그렇구나──」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「何かちょっと嬉しい……えへへ♪」"
translation = "「왠지 좀 기뻐…… 에헤헤♪」"

[[dialogue]]
speaker = "unk"
original = "っ……マトイ！"
translation = "윽…… 마토이!"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ひゃっ！？\u3000かかか会長、手をいきなり握ったりして、どうしたの！？」"
translation = "「히얏!? 회회회장님, 손을 갑자기 잡고, 왜 그래요!?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「――話したいことがある？\u3000な、何でしょう……？」"
translation = "「──하고 싶은 말이 있어? 무, 무엇인가요……?」"

[[dialogue]]
speaker = "unk"
original = "……好きだ。俺と付き合って欲しい"
translation = "……좋아해. 나랑 사귀어 줬으면 좋겠어"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「は、はい……って、え？\u3000……ええぇぇぇっ！？」"
translation = "「네, 네…… 어, 에? ……에에에에엑!?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「な、何これ……ドッキリ！？\u3000実はヴィーナスとかアナとかサーシャさんが、どこかに隠れて見てたりする！？」"
translation = "「머, 뭐야 이거…… 몰래카메라!? 사실 비너스나 아나나 사샤 씨가 어딘가에 숨어서 보고 있는 거 아냐!?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「――違う？\u3000本気で？\u3000真面目に？\u3000そ、そっか……。ごめんね。会長はそんなこと、しないもんね……」"
translation = "「──아냐? 진심으로? 진지하게? 그, 그렇구나……. 미안해. 회장님은 그런 장난, 안 치는데 말이지……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「――わ、私がしてくれる色んなことが嬉しくて、気が付いたら好きになっていた……？」"
translation = "「──내가 해주는 여러 가지 일들이 기뻐서, 정신 차려보니 좋아하게 되었다고……?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「い、いやでも……私、周りに比べたら、地味で普通だし……！」"
translation = "「아, 아니 하지만…… 나, 주변에 비하면 수수하고 평범한데……!」"

[[dialogue]]
speaker = "unk"
original = "普通じゃない。マトイは俺にとっての特別だ"
translation = "평범하지 않아. 마토이는 나에게 있어서 특별해"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「……！\u3000あぅ……！」"
translation = "「……! 아우……!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「私が……会長の、特別……！」"
translation = "「내가…… 회장님의, 특별……!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「その……私も会長のこと……好き、です……」"
translation = "「그…… 저도 회장님…… 좋아, 해요……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「私でよければ……お付き合い、よろしくお願いします……」"
translation = "「저라도 괜찮다면…… 사귀는 거, 잘 부탁드려요……」"

[[dialogue]]
speaker = "unk"
original = "やっと告白できた……"
translation = "겨우 고백했다……"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「えへへ……実は私も……本当はずっと、好きって思ってたから……」"
translation = "「에헤헤…… 사실 나도…… 정말은 계속, 좋아한다고 생각했으니까……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「気持ちが一緒で、凄く嬉しい……♪」"
translation = "「마음이 같아서, 정말 기뻐……♪」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「これから、改めてよろしくね……♪」"
translation = "「앞으로, 다시 한번 잘 부탁해……♪」"

[[dialogue]]
speaker = "unk"
original = "そう言って、マトイは照れ臭そうに、俺の手をそっと握り返すのだった――"
translation = "그렇게 말하며 마토이는 쑥스러운 듯, 내 손을 살며시 맞잡는 것이었다──"

