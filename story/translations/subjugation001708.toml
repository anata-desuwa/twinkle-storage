[[dialogue]]
speaker = "ロクサーナ"
original = "「さて、我々の文化祭は終了したわけだが」"
translation = "「자, 우리의 문화제는 종료되었는데.」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「満員御礼の観客の声援と拍手を聞いたか？\u3000あれが我々の劇に対する評価の全てだ」"
translation = "「만원 사례인 관객들의 성원과 박수 소리를 들었느냐? 저것이 우리 연극에 대한 평가의 전부다.」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「つまり、今回の公演は成功だった、ということだ。まあ及第点、悪くない出来だったな。私からも褒めてやる」"
translation = "「즉, 이번 공연은 성공이었다는 뜻이지. 뭐, 낙제점은 면했군, 나쁘지 않은 완성도였다. 나도 칭찬해 주마.」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「やはり今回のＭＶＰはロミオ役とジュリエット役の２人だな」"
translation = "「역시 이번 MVP는 로미오 역과 줄리엣 역인 두 사람이다.」"

[[dialogue]]
speaker = "メイプル"
original = "「異議な～し！\u3000お兄ちゃんのロミオ、めちゃめちゃ格好良かったし、藍のジュリエットもすっっっごく綺麗だったよ！」"
translation = "「이의 없~음! 오빠의 로미오, 정말정말 멋있었고 아이의 줄리엣도 엄~~~청 예뻤어!」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「使い古された脚本、分かり切った結末だというのに、観客の涙を誘い、万雷の拍手をもらえたのは、演者の力だ。演じきったことを誇り、胸を張れ」"
translation = "「진부한 각본, 뻔한 결말인데도 관객의 눈물을 유도하고 만뢰와 같은 박수를 받은 건 배우의 힘이다. 다 연기해낸 것을 자랑스러워하며 가슴을 펴라.」"

[[dialogue]]
speaker = "藍"
original = "「あ、ありがとうございます」"
translation = "「고, 고맙습니다.」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「２人の演技は、なかなか真に迫っていたぞ。まるで目の前に本物の恋人でもいるかのようにな」"
translation = "「두 사람의 연기는 제법 진지함이 묻어났어. 마치 눈앞에 진짜 연인이 있는 것처럼 말이다.」"

[[dialogue]]
speaker = "メイプル"
original = "「ホント、ドッキドキだったよ～！\u3000特に最後のアレは驚いちゃった！」"
translation = "「정말 두근두근했다구~! 특히 마지막에 그건 놀랐어!」"

[[dialogue]]
speaker = "藍"
original = "「な、何がですか？」"
translation = "「무, 무엇이요?」"

[[dialogue]]
speaker = "メイプル"
original = "「ロミオが毒で死んじゃって、ジュリエットも後を追おうとする前だよ」"
translation = "「로미오가 독으로 죽고 줄리엣도 뒤를 쫓으려 하기 전 말이야.」"

[[dialogue]]
speaker = "メイプル"
original = "「ジュリエット、死んだロミオにキスしたでしょ？\u3000あの演技、稽古の時にはなかったよね？」"
translation = "「줄리엣, 죽은 로미오한테 키스했지? 그 연기, 연습 때는 없었잖아?」"

[[dialogue]]
speaker = "藍"
original = "「キ、キスはしてないですよ！\u3000顔を近づけて、したフリだけで……！」"
translation = "「키, 키스는 안 했어요! 얼굴을 가까이해서 하는 척만……!」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「あれは良いアドリブだった。あの瞬間、会場中からすすり泣く声が聞こえたぞ」"
translation = "「그건 좋은 애드리브였다. 그 순간 공연장 곳곳에서 흐느끼는 소리가 들렸지.」"

[[dialogue]]
speaker = "藍"
original = "「ジュリエットなら、そうすると思ったんです。最期の瞬間まで愛する人と触れ合いたかったんじゃないかなって……」"
translation = "「줄리엣이라면 그렇게 할 거라고 생각했어요. 마지막 순간까지 사랑하는 사람과 닿고 싶지 않았을까 싶어서……」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「今回の脚本には書かなかったがな。ロミオが服毒死したことを察したジュリエットは、ロミオの唇に残っている毒を接吻で舐め取ろうとする描写がある」"
translation = "「이번 각본에는 쓰지 않았다만 말이다. 로미오가 독을 마시고 죽은 것을 깨달은 줄리엣이 로미오의 입술에 남은 독을 입맞춤으로 핥아내려 한다는 묘사가 있다.」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「それを無意識にやったならば……憑依型女優として一皮剥けたな、藍」"
translation = "「그걸 무의식중에 했다면…… 빙의형 배우로서 한 껍질 벗었구나, 아이.」"

[[dialogue]]
speaker = "藍"
original = "「あっ──ありがとうございます！\u3000私、もっともっと演技を磨いて、部長を満足させられる俳優になります！」"
translation = "「앗── 고맙습니다! 저 더욱더 연기를 갈고닦아서 부장님을 만족시킬 수 있는 배우가 되겠어요!」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「はっ、デカい口を叩くようになったじゃ──お、おおおっ……！？\u3000キた、キたぞっ！！」"
translation = "「하, 큰소리를 칠 수 있게 됐군── 오, 오오오……!? 왔다, 왔어!!」"

[[dialogue]]
speaker = "メイプル"
original = "「部長！？\u3000どうしたの！？」"
translation = "「부장님!? 왜 그래!?」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「急に脚本のアイデアが下りてきた！\u3000打ち上げなんてやってる場合ではないな！\u3000この閃きが消える前に、書き留めなくては……！」"
translation = "「갑자기 각본 아이디어가 내려왔다! 뒤풀이나 하고 있을 때가 아니군! 이 영감이 사라지기 전에 기록해야 해……!」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「か、会長、また有事の際には頼む。我が部の大女優のポテンシャルを最大限に引き出せるのはお前しかいないのだからな！」"
translation = "「회, 회장, 또 유사시에는 부탁하마. 우리 부의 대여배우의 잠재력을 최대한 끌어낼 수 있는 건 너뿐이니까!」"

[[dialogue]]
speaker = "メイプル"
original = "「部長、行っちゃった……。天才って変わり者が多いっていうけど、ホントだよね」"
translation = "「부장님 가버렸네……. 천재는 괴짜가 많다더니 정말이네.」"

[[dialogue]]
speaker = "藍"
original = "「会長さん、今回のロミオ役、本当にありがとうございました。私が演者として、一皮剥けられたのは全部会長さんのおかげです」"
translation = "「회장님, 이번 로미오 역 정말 고마웠어요. 제가 배우로서 한 단계 성장할 수 있었던 건 전부 회장님 덕분이에요.」"

[[dialogue]]
speaker = "藍"
original = "「お忙しいでしょうけど、またいつでも演劇部にいらしてくださいね。良かったら、また稽古に付き合ってください」"
translation = "「바쁘시겠지만 또 언제든 연극부에 들러주세요. 괜찮으시다면 또 연습을 도와주세요.」"

[[dialogue]]
speaker = "メイプル"
original = "「藍ばっかりズル～い！\u3000お兄ちゃん、次はあたしと共演しようね！\u3000Ｗ魔王なんて話題性抜群だよ！」"
translation = "「아이만 치사해~! 오빠, 다음엔 나랑 공연하자! 더블 마왕이라니 화제성 만점이라구!」"

[[dialogue]]
speaker = "unk"
original = "こうして、辛くも楽しい演劇部への出張の日々は、終わりを告げたのだった。"
translation = "이렇게 힘들고도 즐거웠던 연극부로의 출장 나날은 끝을 고했다."

[[dialogue]]
speaker = "アナ"
original = "「文化祭でのロミオの熱演、拝見させていただきました。不動不変のラブストーリー……会長、グッジョブでした」"
translation = "「문화제에서의 로미오 열연, 잘 보았습니다. 부동불변의 러브 스토리…… 회장, 굿잡이었습니다.」"

[[dialogue]]
speaker = "アナ"
original = "「今後も演劇部には出入りされるんですか？」"
translation = "「앞으로도 연극부에는 출입하실 건가요?」"

[[dialogue]]
speaker = "unk"
original = "いやいや、もう今回限りで──"
translation = "아니아니, 이제 이번 한 번으로──"

[[dialogue]]
speaker = "ロクサーナ"
original = "「演劇部部長ロクサーナ・ハイドランジアだ！\u3000失礼する！」"
translation = "「연극부 부장 록사나 하이드랜저다! 실례하지!」"

[[dialogue]]
speaker = "unk"
original = "また出たー！？"
translation = "또 나왔다─!?"

[[dialogue]]
speaker = "アナ"
original = "「ロクサーナ部長、どうしました」"
translation = "「록사나 부장님, 무슨 일이시죠?」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「これを見てくれ！」"
translation = "「이걸 봐라!」"

[[dialogue]]
speaker = "アナ"
original = "「すごい量の紙束ですが……これは脚本、ですか？」"
translation = "「엄청난 양의 종이 뭉치입니다만…… 이건 각본, 인가요?」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「ああ、文化祭後に書き上げた！」"
translation = "「그래, 문화제 후에 다 썼다!」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「あれ以降、インスピレーションが止まらなくなってしまってな！\u3000ここまで創作の神が降臨した経験は今までにない！」"
translation = "「그 이후로 영감이 멈추질 않아서 말이다! 이토록 창작의 신이 강림한 경험은 지금까지 없었다!」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「四大悲劇の『マクベス』『オセロ』『リア王』『ハムレット』！\u3000『ジュリアス・シーザー』も完成間近だ！\u3000さぁ、会長、どの劇のどの役がいい！？」"
translation = "「4대 비극인 『맥베스』 『오셀로』 『리어왕』 『햄릿』! 『줄리어스 시저』도 완성 직전이다! 자, 회장, 어느 극의 어느 배역이 좋으냐!?」"

[[dialogue]]
speaker = "unk"
original = "俺が演るの確定！？"
translation = "내가 연기하는 거 확정!?"

[[dialogue]]
speaker = "アナ"
original = "「おお……会長が演じるブルータスは興味深いですね」"
translation = "「오오…… 회장님이 연기하는 브루투스는 흥미롭군요.」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「話が分かるな！\u3000この機に副会長も舞台デビューを飾ってみてはどうだ？\u3000最適な役どころを用意する。悪いようにはせん！」"
translation = "「말이 통하는군! 이 기회에 부회장도 무대 데뷔를 장식해 보는 게 어떠냐? 최적의 배역을 준비하마. 나쁘게는 안 하마!」"

[[dialogue]]
speaker = "アナ"
original = "「ふむふむ、興味深いですね。前向きに検討します」"
translation = "「흠흠, 흥미롭군요. 긍정적으로 검토하겠습니다.」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「これからも新春公演、オープンキャンパスとお披露目の機会は目白押しだ！」"
translation = "「앞으로도 신춘 공연, 오픈 캠퍼스 등 선보일 기회는 아주 널려 있다!」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「藍も会長がいなくては稽古に身が入らないようでな！\u3000さあ、観念して演劇部の軍門に下るがいい！」"
translation = "「아이도 회장이 없으면 연습에 집중하지 못하는 것 같더군! 자, 단념하고 연극부의 군문으로 들어오너라!」"

[[dialogue]]
speaker = "unk"
original = "もう勘弁してー！"
translation = "제발 좀 봐줘─!"

[[dialogue]]
speaker = "unk"
original = "これからもロクサーナ率いる演劇部は幾度も星徒会を巻き込み、公演の度に振り回されることになるのであった。"
translation = "앞으로도 록사나가 이끄는 연극부는 몇 번이고 성도회를 끌어들여, 공연 때마다 휘둘리게 되는 것이었다."

