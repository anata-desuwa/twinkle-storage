[[dialogue]]
speaker = "unk"
original = "第４話,『初めて』を大切に,P"
translation = "제4화, 『처음』을 소중히, P"

[[dialogue]]
speaker = "unk"
original = "ミヤハルと出会ってからしばらく経ち、仲良くなってきたある日のこと。"
translation = "미야하루와 만난 지도 꽤 시간이 흘러 친해진 어느 날의 일."

[[dialogue]]
speaker = "unk"
original = "俺はミヤハルに誘われて、一緒に街へ出かけることになった――"
translation = "나는 미야하루의 권유로 함께 시내로 나가게 되었다――"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「会長はん、今日は来てくれて嬉しいわぁ<emoji=heart04>」"
translation = "「회장님, 오늘 와줘서 기뻐<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「えいっ<emoji=heart04>\u3000ふふふっ<emoji=heart04>」"
translation = "「에잇<emoji=heart04> 후후훗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「これまで繰り返して来た甲斐あって、会長はん、腕に抱き着いても受け入れてくれるようになったなぁ<emoji=heart04>」"
translation = "「그동안 반복해 온 보람이 있네, 회장님, 팔에 매달려도 받아주게 됐구나<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "人前だと恥ずかしいけどね"
translation = "사람들 앞이라 부끄럽긴 하지만"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「せっかくやし今日は、手も繋ぎまひょ<emoji=heart04>」"
translation = "「모처럼이니까 오늘은 손도 잡자<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「なんでかって？\u3000ふふっ。だって、男女２人でこうして出かけたら、それは<b>デート</b>やろ？」"
translation = "「왜냐고? 후훗. 그야 남녀 둘이서 이렇게 외출하면 그건 <b>데이트</b>잖아?」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「せやから、こうして～<emoji=heart04>」"
translation = "「그러니까 이렇게~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "触れ合った手の指の間に、彼女の指が絡んで来て、俺はドキッとしてしまう。"
translation = "맞닿은 손가락 사이로 그녀의 손가락이 얽혀 들어와, 나는 가슴이 두근거리고 만다."

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「ほら、指を絡めた恋人繋ぎ<emoji=heart04>\u3000どうやろ？\u3000ふふふっ<emoji=heart04>」"
translation = "「봐봐, 손가락을 얽은 연인 잡기<emoji=heart04> 어때? 후후훗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「会長はん、ちょっと熱っぽくなったりしてへん？」"
translation = "「회장님, 조금 열이 나는 거 아니야?」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「もしあれなら――プランを変更して、うちの神社に行って、休んでくれてもええんよ？」"
translation = "「만약 그러면―― 플랜을 변경해서 내 신사에 가서 쉬어도 괜찮아?」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「熱が収まるまで、うちがちゃあんと責任持って、介抱したるから<emoji=heart04>」"
translation = "「열이 내릴 때까지 내가 제대로 책임지고 간호해 줄 테니까<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「家でお休みデートプラン、うち的には悪くないんと思うんやけど、どうどす？」"
translation = "「집에서 쉬는 데이트 플랜, 나로서는 나쁘지 않다고 생각하는데 어때?」"

[[dialogue]]
speaker = "unk"
original = "耳元に唇を寄せて、囁いて来るミヤハル。"
translation = "귓가에 입술을 바짝 대고 속삭이는 미야하루."

[[dialogue]]
speaker = "unk"
original = "俺は深呼吸をして、覚悟を決めて口を開く。"
translation = "나는 심호흡을 하고 각오를 다지며 입을 연다."

[[dialogue]]
speaker = "unk"
original = "キミが本気なら、正直――俺はできる"
translation = "네가 진심이라면, 솔직히―― 난 할 수 있어"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「えっ？」"
translation = "「엣?」"

[[dialogue]]
speaker = "unk"
original = "俺はミヤハルと仲良くなって、今では魅力的に思っている。だから、そういうことは男として正直<b>したい</b>。だけど――"
translation = "나는 미야하루와 친해졌고, 지금은 매력적이라고 생각한다. 그래서 그런 일은 남자로서 솔직히 <b>하고</b> <b>싶다</b>. 하지만――"

[[dialogue]]
speaker = "unk"
original = "ミヤハルは『初めて』なんでしょ？"
translation = "미야하루는 『처음』이잖아?"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「――処女のうちが、このままあっさり経験しちゃうのは、もったいないんじゃないか、って……？」"
translation = "「――처녀인 내가 이대로 허무하게 경험해 버리는 건 아깝지 않냐고……?」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「せっかくなら、もっとデートして、恋人同士になって、ロマンチックな初キスなんかしたり……？」"
translation = "「기왕이면 좀 더 데이트하고 연인 사이가 되어서, 로맨틱한 첫 키스 같은 걸 하거나……?」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「全部の段階を踏んでから、初めてを経験する方が、もっとドキドキするし、気持ちいいはず……？」"
translation = "「모든 단계를 다 밟은 뒤에 처음을 경험하는 게 더 두근거리고 기분 좋을 거다……?」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「そないなこと……」"
translation = "「그런 건……」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「うちはそういう、まどろっこしい流れとか、あんまり興味ないはずやのに……」"
translation = "「나는 그런 번거로운 흐름 같은 거 별로 관심 없을 텐데……」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「なんか……今、変な気分になってるわ。うち――」"
translation = "「왠지…… 지금, 묘한 기분이 됐어. 내――」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「えっちなことしようって言われてるわけやないのに、胸がドキドキして……<emoji=heart04>」"
translation = "「야한 짓을 하자는 말을 들은 것도 아닌데, 가슴이 두근거려서……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "今日は初デートをしよう、ミヤハル"
translation = "오늘은 첫 데이트를 하자, 미야하루"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「んっ<emoji=heart04>\u3000会長はんが、そこまで言うなら……<emoji=heart04>」"
translation = "「응읏<emoji=heart04> 회장님이 그렇게까지 말씀하신다면……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ミヤハルは頬を染めながら、こくりと頷いてくれるのだった――"
translation = "미야하루는 뺨을 붉히며, 끄덕하고 고개를 끄덕여 주는 것이었다――"

[[dialogue]]
speaker = "unk"
original = "デートを開始した俺たちは、ゲームセンターに入っていた。"
translation = "데이트를 시작한 우리들은, 게임 센터에 들어가 있었다."

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「ガンシューティングゲーム？\u3000うち、こういうゲーム自体、あんまりやったことないんやけど……」"
translation = "「건 슈팅 게임? 내, 이런 게임 자체를 별로 해본 적이 없는디……」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「――後ろに付いてレクチャーしてくれるん？\u3000えっと……ゾンビを撃てばええんやよね？」"
translation = "「――뒤에서 붙어서 가르쳐 주는 기가? 에또…… 좀비를 쏘면 되는 거지?」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「こ、こう？\u3000えいっ！」"
translation = "「이, 이렇게? 에잇!」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「アカン、弾切れや……！\u3000銃のリロードってどうやったらええの？」"
translation = "「안 되겠다, 총알이 다 떨어졌어……! 총 리로드는 어떻게 하면 되는 기고?」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「あっ……倒した！\u3000――ふふっ<emoji=heart04>\u3000会長はんと一緒にくっ付いてゲームするの、結構ええかもしれへんね<emoji=heart04>」"
translation = "「앗…… 쓰러뜨렸다! ――후훗<emoji=heart04> 회장님이랑 같이 딱 붙어서 게임 하는 거, 제법 괜찮을지도 모르겠네<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それから、スイーツのお店へ行き、一緒にケーキを食べることになって。"
translation = "그 뒤로, 디저트 가게에 가서, 같이 케이크를 먹게 되었고."

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「会長はん、あ～ん<emoji=heart04>」"
translation = "「회장님, 아~앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "うん――美味しい"
translation = "응―― 맛있어"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「ふふっ<emoji=heart04>\u3000そんな満面の笑みで食べなはって……」"
translation = "「후훗<emoji=heart04> 그런 만면의 미소로 드시다니……」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「――えっ？\u3000今度はうちの番？」"
translation = "「――엣? 이번엔 내 차례?」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「あ、あ～ん<emoji=heart04>\u3000あむっ……」"
translation = "「아, 아~앙<emoji=heart04> 아암……」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「こ、これされるの……なんか違う目で周りから見られて、恥ずかしいんやけど……」"
translation = "「이, 이거 당하는 거…… 왠지 다른 눈으로 주변에서 쳐다봐서 부끄러운디……」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「でも……案外悪くあらへんかも……<emoji=heart04>」"
translation = "「근디…… 의외로 나쁘지 않을지도 몰러……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「もうこないな時間なんやね」"
translation = "「벌써 시간이 이래 됐구마」"

[[dialogue]]
speaker = "unk"
original = "気付けばもう夕方になり、帰る時間になっていた。"
translation = "정신을 차려보니 벌써 저녁이 되어, 돌아갈 시간이 되어 있었다."

[[dialogue]]
speaker = "unk"
original = "今日は楽しかった？"
translation = "오늘은 즐거웠어?"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「ん<emoji=heart04>\u3000……正直、こないにも楽しめるとは思ってへんかったわ」"
translation = "「응<emoji=heart04> ……솔직히, 요로코롬 즐길 수 있을 거라곤 생각 못 했어」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「それで……会長はん」"
translation = "「그라고…… 회장님」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「今日はまだ、告白はしてくれへんの……？」"
translation = "「오늘은 아직, 고백은 안 해주는 거여……?」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「ほら、デートが始まる前に、いろいろ言うてくれはりましたやろ？」"
translation = "「봐봐요, 데이트 시작하기 전에 이런저런 말 해줬잖어?」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「……うちのこと、そういう目で見てくれてはるって、思うてもええんよね？」"
translation = "「……내를 그런 눈으로 봐주고 있다고 생각해도 되는 거지?」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「――何回かデートして、お互いの相性を確かめてから……？」"
translation = "「――몇 번 데이트하고, 서로의 궁합을 확인한 다음에……?」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「会長はん、いけずやわぁ<emoji=heart04>\u3000そないな焦らしプレイをして来るなんて――」"
translation = "「회장님, 심술궂구마<emoji=heart04> 고로코롬 애를 태우는 플레이를 하다니――」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「悪いお人なんやから<emoji=heart04>\u3000もう……<emoji=heart04>」"
translation = "「못된 사람이구마<emoji=heart04> 정말……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "再び腕に抱き着いてきて、嬉しそうにそんなことを言うミヤハルなのだった――"
translation = "다시 팔에 매달려 오며, 기쁜 듯이 그런 말을 하는 미야하루였다――"

