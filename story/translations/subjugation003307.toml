[[dialogue]]
speaker = "デネブ・カイトス"
original = "「グオオオオオオォォーー！！！」"
translation = "「구오오오오오오오오──!!!」"

[[dialogue]]
speaker = "アポロ"
original = "「なんだコイツっ！？\u3000さっきのがボスモンスターじゃなかったのかっ！？」"
translation = "「뭐야 이 녀석!? 아까 그게 보스 몬스터가 아니었던 거냐!?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「どうやらこっちが真のボスモンスターらしいね……」"
translation = "「아무래도 이쪽이 진짜 보스 몬스터인가 보네……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「そ、そんな……もうみんな、ヘトヘトなのに……！」"
translation = "「그, 그럴 수가…… 이미 다들 녹초인데……!」"

[[dialogue]]
speaker = "ナターシャ"
original = "「しかもコイツ、さっきのより一回りは強いよ。やっぱり難易度調整バグってるって……」"
translation = "「게다가 이 녀석, 아까 것보다 한 단계는 더 강해. 역시 난이도 조절 버그 났다니까……」"

[[dialogue]]
speaker = "梨緒"
original = "「くっ……！」"
translation = "「큭……!」"

[[dialogue]]
speaker = "梨緒"
original = "（どうする？\u3000戦うか？\u3000退くか？）"
translation = "（어떡하지? 싸울 것인가? 물러날 것인가?）"

[[dialogue]]
speaker = "梨緒"
original = "（みんな先程の戦闘で疲弊しきってる。今戦っても勝ち目は……）"
translation = "（다들 방금 전투로 기진맥진해 있다. 지금 싸워도 승산은……）"

[[dialogue]]
speaker = "梨緒"
original = "（しかし退いたところで明日になれば強化が入る。そうなれば、どちらにしても……）"
translation = "（하지만 물러나 봤자 내일이면 강화가 들어간다. 그렇게 되면 어느 쪽이든……）"

[[dialogue]]
speaker = "デネブ・カイトス"
original = "「グオオッ、オオオオォォーー！！！」"
translation = "「구오오, 오오오오오──!!!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「きゃあっ！？」"
translation = "「꺄악!?」"

[[dialogue]]
speaker = "梨緒"
original = "「ベアトっ！？」"
translation = "「베아트!?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「だ、大丈夫っ。なんとか避けられたから」"
translation = "「괘, 괜찮아요. 어떻게든 피했으니까」"

[[dialogue]]
speaker = "アポロ"
original = "「あっぶねえ。一撃でも貰ったらヤバそうだな……！」"
translation = "「위험했어. 한 대라도 맞으면 끝장이겠는데……!」"

[[dialogue]]
speaker = "梨緒"
original = "（迷ってる暇はない。戦うか、退くか。早く決めなければ、勝機はない……！）"
translation = "（망설일 틈이 없다. 싸울지, 물러날지. 빨리 결정하지 않으면 승기는 없느니라……!）"

[[dialogue]]
speaker = "梨緒"
original = "（いや、それとも──……）"
translation = "（아니, 아니면──……）"

[[dialogue]]
speaker = "ナターシャ"
original = "「ここまでやれたんだし……別に負けても良くない？」"
translation = "「여기까지 했으면…… 딱히 져도 상관없지 않아?」"

[[dialogue]]
speaker = "アポロ"
original = "「はぁ！？\u3000なに気の抜けたこと言ってんだっ、ナターシャ！」"
translation = "「하아!? 무슨 맥 빠지는 소릴 하는 거야, 나타샤!」"

[[dialogue]]
speaker = "ナターシャ"
original = "「や、だってこれは向こうの調整ミスでしょ。クリアできるように作られてないよ、これ」"
translation = "「아니, 그치만 이건 저쪽의 조절 미스잖아. 클리어할 수 있게 만들어진 게 아니라고, 이건」"

[[dialogue]]
speaker = "ナターシャ"
original = "「私たちはそういう確認をするためのテスターなわけじゃない？\u3000無理に粘って痛い思いする必要はなくない？」"
translation = "「우리는 그런 걸 확인하기 위한 테스터잖아? 억지로 버티면서 아픈 꼴 당할 필요는 없지 않아?」"

[[dialogue]]
speaker = "アポロ"
original = "「そ、それは……！」"
translation = "「그, 그건……!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「確かにナターシャちゃんの言う通りかも……。もう十分満足なくらい、みんなと楽しい時間も過ごせたし……」"
translation = "「확실히 나타샤 짱 말이 맞을지도 몰라요……. 이미 충분히 만족스러울 만큼 다 같이 즐거운 시간도 보냈고……」"

[[dialogue]]
speaker = "アポロ"
original = "「ベアトまでっ！？」"
translation = "「베아트까지!?」"

[[dialogue]]
speaker = "アポロ"
original = "「どうするんだ、梨緒っ。まさかオマエまで負けていいとか言わねえだろうなっ？」"
translation = "「어떡할 거냐, 리오! 설마 너까지 져도 상관없다느니 말하진 않겠지?」"

[[dialogue]]
speaker = "梨緒"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "アポロ"
original = "「おい、聞いてんのか、梨緒っ！」"
translation = "「어이, 듣고 있냐, 리오!」"

[[dialogue]]
speaker = "梨緒"
original = "「……ナターシャとベアトの言うことももっともだ。私たちはあくまでテスターだ。無理に粘って勝利を目指す必要はないだろう」"
translation = "「……나타샤와 베아트의 말도 일리가 있느니라. 우리는 어디까지나 테스터다. 억지로 버티며 승리를 목표로 할 필요는 없겠지」"

[[dialogue]]
speaker = "梨緒"
original = "「リップルに素直な報告をすればいいだけだ。『流石にこの仕様は難易度が高すぎる。誰もクリアできない』と」"
translation = "「리플에게 솔직하게 보고하면 그만이다. 『역시 이 사양은 난이도가 너무 높다. 아무도 클리어할 수 없다』라고」"

[[dialogue]]
speaker = "梨緒"
original = "「だけど……でも──」"
translation = "「하지만…… 그래도──」"

[[dialogue]]
speaker = "梨緒"
original = "「私は最後の最後まで諦めたくない！\u3000たとえ負け戦だろうと、最後まで足掻きたいっ！」"
translation = "「나는 마지막의 마지막까지 포기하고 싶지 않느니라! 비록 패배할 싸움일지라도, 끝까지 발버둥 치고 싶어!」"

[[dialogue]]
speaker = "梨緒"
original = "「いいや、勝ちたいんだっ。テストだとか、星徒会がクリアできなかったからとか関係なく、ただ、選管の仲間で力を合わせて……！」"
translation = "「아니, 이기고 싶느니라. 테스트라든가, 성도회가 클리어하지 못했으니까 같은 건 상관없이, 그저 선관 동료들과 힘을 합쳐서……!」"

[[dialogue]]
speaker = "アポロ"
original = "「梨緒……」"
translation = "「리오……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「梨緒ちゃん……」"
translation = "「리오 짱……」"

[[dialogue]]
speaker = "ナターシャ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "梨緒"
original = "「勝とう、みんな！」"
translation = "「이기자, 다들!」"

[[dialogue]]
speaker = "梨緒"
original = "「私は信じているっ！\u3000たとえ圧倒的な戦力差があろうと、選管のみんなで力を合わせればそれを覆せると！」"
translation = "「나는 믿고 있느니라! 비록 압도적인 전력 차가 있을지라도, 선관 모두가 힘을 합치면 그것을 뒤집을 수 있다고!」"

[[dialogue]]
speaker = "ナターシャ"
original = "「まったく……うちの委員長は熱血なんだから」"
translation = "「정말이지…… 우리 위원장님은 열혈이라니까」"

[[dialogue]]
speaker = "ナターシャ"
original = "「仕方ないね。私だって何も進んで負けたいわけじゃないし」"
translation = "「어쩔 수 없네. 나라고 딱히 지고 싶은 건 아니니까」"

[[dialogue]]
speaker = "ベアトリス"
original = "「勝って終わらせた方がいい思い出にもなるもんねっ」"
translation = "「이기고 끝내는 게 더 좋은 추억이 될 테니까요!」"

[[dialogue]]
speaker = "アポロ"
original = "「絶望的な状況を引っ繰り返してこそ、ヒーローってもんだ！」"
translation = "「절망적인 상황을 뒤집어야 비로소 히어로라는 거지!」"

[[dialogue]]
speaker = "梨緒"
original = "「みんな……」"
translation = "「다들……」"

[[dialogue]]
speaker = "ナターシャ"
original = "「指示をお願い、梨緒。勝つための指示を」"
translation = "「지시를 부탁해, 리오. 이기기 위한 지시를」"

[[dialogue]]
speaker = "ベアトリス"
original = "「私だって信じてるからっ。みんなで戦えば、どんなことだって乗り越えられるってっ」"
translation = "「저도 믿고 있으니까요. 다 같이 싸우면 어떤 일이든 극복할 수 있다고요」"

[[dialogue]]
speaker = "アポロ"
original = "「１人で気張り過ぎんなよ、梨緒っ。あたしたちがついてんだからなっ」"
translation = "「혼자서 너무 기쓰지 마라, 리오. 우리가 곁에 있으니까!」"

[[dialogue]]
speaker = "梨緒"
original = "「っ……！！」"
translation = "「윽……!!」"

[[dialogue]]
speaker = "梨緒"
original = "「よし、みんなで勝つぞ！\u3000選挙管理委員の仲間でだっ！！」"
translation = "「좋아, 다 같이 이기자! 선거관리위원 동료로서다!!」"

[[dialogue]]
speaker = "４人"
original = "「絶対勝つっ！！」"
translation = "「반드시 이긴다!!」"

[[dialogue]]
speaker = "デネブ・カイトス"
original = "「グオオオオオオォォーーーーッッ！！！」"
translation = "「구오오오오오오오오────!!!!」"

