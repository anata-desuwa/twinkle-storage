[[dialogue]]
speaker = "unk"
original = "メイプルと出会ってから、１週間程経ったある日のこと。"
translation = "메이플과 만난 지 일주일 정도 지난 어느 날의 일."

[[dialogue]]
speaker = "unk"
original = "俺はトワ先生に訓練をみてもらっていた。"
translation = "나는 토와 선생님에게 훈련을 지도받고 있었다."

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「――うん、いい感じ！\u3000会長くん、星力の制御、上手くなったね」"
translation = "「──응, 좋은 느낌! 회장군, 성력 제어가 능숙해졌네」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「リクリエが迫る中、実戦を繰り返し経てきたからかな。入学当初とは段違いに良くなってるよ」"
translation = "「리크리에가 다가오는 와중에 실전을 거듭해 와서 그럴까. 입학 초와는 비교도 안 될 정도로 좋아졌어」"

[[dialogue]]
speaker = "unk"
original = "先生にはまだまだ及ばないです"
translation = "선생님에 비하면 아직 멀었어요"

[[dialogue]]
speaker = "unk"
original = "トワ先生は星力の制御に関して、俺がこれまで見てきた中でトップクラスに優れた人物だった。"
translation = "토와 선생님은 성력 제어에 관해서 내가 지금까지 봐온 사람 중 최고 수준으로 뛰어난 인물이었다."

[[dialogue]]
speaker = "unk"
original = "だから、こうしてたまに、個人指導をお願いしていたのだった。"
translation = "그래서 이렇게 가끔 개인 지도를 부탁하고는 했다."

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「えっへん♪\u3000先生の専門は、星力と人体の影響を調べる『星体力学』だからね～」"
translation = "「에헴♪ 선생님의 전문은 성력과 인체의 영향을 조사하는 『성체역학』이니까~」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「それに先生は、星騎士としての年季が全然違うしね！\u3000会長くんとは１０年以上――」"
translation = "「거기에 선생님은 성기사로서의 경력이 완전히 다르기도 하고! 회장군과는 10년 이상──」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「って、違う！\u3000先生はそこまで年取ってないから！！\u3000永遠のプリティーガールだから！！！」"
translation = "「앗, 아냐! 선생님은 그렇게 나이 먹지 않았으니까!! 영원한 프리티 걸이니까!!!」"

[[dialogue]]
speaker = "unk"
original = "何も言ってませんけど！？"
translation = "아무 말도 안 했습니다만!?"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「――コホン。さっきの発言は、可愛いトワちゃん先生の冗談として……」"
translation = "「──코흠. 방금 발언은 귀여운 토와짱 선생님의 농담으로 치고……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「実際は、星騎士として戦う為に、星力制御を上手くならざるを得なかったって感じかな」"
translation = "「실제로는 성기사로서 싸우기 위해 성력 제어를 잘할 수밖에 없었다는 느낌일까」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「私の星力は、『特異体質』の影響か、極端に回復寄りの性質でね。人一倍上手く制御して反転させないと、そもそも攻撃星術すら使えないんだよ」"
translation = "「내 성력은 『특이체질』의 영향인지 극단적으로 회복에 치우친 성질이라서 말이야. 남들보다 배로 잘 제어해서 반전시키지 않으면 애당초 공격 성술조차 쓸 수 없거든」"

[[dialogue]]
speaker = "unk"
original = "トワ先生の特異体質――固有の能力とでも言うべき『<ruby>自動回復<rt>オートヒール</rt></ruby>』。"
translation = "토와 선생님의 특이체질── 고유 능력이라 불러야 할 『자동 회복』."

[[dialogue]]
speaker = "unk"
original = "それは先生の意思とは関係なく常時発動していて、体を元の状態に直すというものらしい。"
translation = "그것은 선생님의 의사와 상관없이 상시 발동되어 몸을 원래 상태로 되돌리는 것이라고 한다."

[[dialogue]]
speaker = "unk"
original = "そして、先生の体は、その影響で<b>成人した今も成長しきっていない</b>と聞いている。"
translation = "그리고 선생님의 몸은 그 영향으로 <b>성인이</b> <b>된</b> <b>지금도</b> <b>다</b> <b>자라지</b> <b>않았다</b>고 들었다."

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「でも、どれだけ星力制御が上手くなったところで、強力な攻撃星術を持つ人達には劣る。例えば、Ｓランクモンスターにトドメを刺せちゃうメイプルちゃんとかね」"
translation = "「하지만 아무리 성력 제어를 잘하게 되어도 강력한 공격 성술을 가진 사람들에겐 뒤떨어져. 예를 들어 S랭크 몬스터에게 일격을 가할 수 있는 메이플짱 같은 아이라든가」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「私がそれくらい、強い星騎士だったらよかったんだろうけど……」"
translation = "「내가 그 정도로 강한 성기사였다면 좋았을 텐데……」"

[[dialogue]]
speaker = "unk"
original = "浮かない顔をするトワ先生。俺はその理由を知っていた。"
translation = "어두운 표정을 짓는 토와 선생님. 나는 그 이유를 알고 있었다."

[[dialogue]]
speaker = "unk"
original = "その日の放課後。俺が空き教室で待っていると――"
translation = "그날 방과 후. 내가 빈 교실에서 기다리고 있자──"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「召喚に応じ、魔王メイプル、参上！」"
translation = "「소환에 응해 마왕 메이플, 등장!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「にへへ♪\u3000お兄ちゃん、来たよ～♪\u3000あたしに話したいことって？」"
translation = "「니헤헤♪ 오빠, 왔어~♪ 나한테 할 말이 뭐야?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「来たね、メイプルちゃん。話したいことがあるのは、私なんだ」"
translation = "「왔구나, 메이플짱. 할 말이 있는 건 나야」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「えっ、トワちゃん……？」"
translation = "「엣, 토와짱……?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「会長くんにも同席して欲しかったから、こういう形を取らせてもらったの」"
translation = "「회장군도 동석해 줬으면 해서 이런 형식을 취했어」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「単刀直入に聞くけど、メイプルちゃん、この１週間で何回か無断出撃してるよね？」"
translation = "「단도직입적으로 묻겠는데, 메이플짱. 이번 일주일 동안 몇 번인가 무단 출격했지?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「うっ……！」"
translation = "「윽……!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「現場に駆け付けたプリマステラの子たちから、メイプルちゃんがモンスターと単独で戦ってるのを目撃したって報告が、複数上がってる」"
translation = "「현장으로 달려간 프리마스테라 아이들로부터 메이플짱이 몬스터와 단독으로 싸우는 걸 목격했다는 보고가 여러 건 올라왔어」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「この前も危険だからダメだって注意をしたはず。でも、聞き入れてもらえない」"
translation = "「얼마 전에도 위험하니까 안 된다고 주의를 줬을 텐데. 하지만 들어주질 않네」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「だから私だけじゃなくて、会長くんからも注意してもらおうと思ったの」"
translation = "「그래서 나뿐만 아니라 회장군에게도 주의를 좀 해달라고 부탁하려고 생각했어」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「……ねぇ、メイプルちゃん。なんでそんな無茶をするの？\u3000先生、何度も説明したよね。単独での戦闘がどれだけ危険かって」"
translation = "「……저기, 메이플짱. 왜 그런 무모한 짓을 하는 거야? 선생님이 몇 번이나 설명했잖아. 단독 전투가 얼마나 위험한지」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「学園所属のプリマステラは、自己判断でモンスターと戦闘する許可が与えられている。でも、他のプリマステラと協力して、複数人で事に当たるのが基本なんだよ」"
translation = "「학원 소속 프리마스테라는 자기 판단으로 몬스터와 전투할 허가가 주어져 있어. 하지만 다른 프리마스테라와 협력해서 여러 명이 대응하는 게 기본이야」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「その為に、学園から与えられる変身アイテムの『セレスティア』には、ＧＰＳ発信機能が付いていて――」"
translation = "「그걸 위해 학원에서 지급되는 변신 아이템인 『셀레스티아』에는 GPS 발신 기능이 달려 있고──」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「モンスターとの戦闘に突入した際、自動で周囲のプリマステラに協力要請シグナルが出されるようになっている」"
translation = "「몬스터와 전투에 돌입했을 때 자동으로 주변 프리마스테라에게 협력 요청 시그널이 보내지게 되어 있어」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「だからもし、周囲に人が少ない場所で、メイプルちゃんが想定外の強さのモンスターに遭遇した場合」"
translation = "「그러니까 만약 주변에 사람이 적은 장소에서 메이플짱이 예상외로 강력한 몬스터와 조우했을 경우」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「そのまま誰にも気づいてもらえず、１つのミスで死んでしまう可能性だってあるんだよ？」"
translation = "「그대로 아무도 눈치채지 못한 채 실수 한 번으로 죽을 수도 있다구?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「……それは、注意されたから、慎重にモンスターの力を計るようにしてる」"
translation = "「……그건 주의를 받았으니까 신중하게 몬스터의 힘을 가늠하려고 노력하고 있어」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「そういうことじゃなくて、そもそも――」"
translation = "「그런 문제가 아니라 애당초──」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「わかってる。モンスターが……リクリエが危険なものだってことは。だってあたしは……本気でリクリエと戦う為に、家出までして来たんだから」"
translation = "「알고 있어. 몬스터가…… 리크리에가 위험하다는 건. 왜냐하면 나는…… 진심으로 리크리에와 싸우기 위해 가출까지 해서 왔으니까」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「あたしはリクリエを倒して、新しい魔王になると、覚悟を持ってここに来たの」"
translation = "「나는 리크리에를 쓰러뜨리고 새로운 마왕이 되겠다는 각오를 가지고 여기 온 거야」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「それだけ本気なら、メイプルちゃんはまだ若いんだし、１度魔界に帰って親御さんを説得してきなさい。先生からも、推薦状は書いてあげるから」"
translation = "「그 정도로 진심이라면 메이플짱은 아직 어리니까 일단 마계로 돌아가서 부모님을 설득하고 오렴. 선생님이 추천서도 써 줄 테니까」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「その上で改めて、正式に学園に入学すれば――」"
translation = "「그러고 나서 다시 정식으로 학원에 입학하면──」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「馬鹿にしないで」"
translation = "「바보 취급 하지 마」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「あたしはモノクラウン家の次期当主として、魔界に現れたモンスターとの実戦経験がある」"
translation = "「나는 모노크라운 가문의 차기 당주로서 마계에 나타난 몬스터와의 실전 경험이 있어」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「その上で流星市国の現状と比べれば、いかにリクリエの波が迫ってきているのかくらいわかる」"
translation = "「그 경험에 유성시국의 현 상황을 비교하면 얼마나 리크리에의 파도가 다가오고 있는지 정도는 안다구」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「この先２回の大交流を挟んで、戻ってくるのが約半年後？\u3000それでリクリエに間に合うって、トワちゃんは本気で言ってるの？」"
translation = "「앞으로 두 번의 대교류를 거쳐 돌아오는 게 약 반년 뒤? 그걸로 리크리에를 제때 맞출 수 있다고 토와짱은 진심으로 말하는 거야?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「それは……」"
translation = "「그건……」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「結局トワちゃんも、パパやママと同じ。あたしの言うことなんか、話半分にしか聞いちゃいないんだよ」"
translation = "「결국 토와짱도 아빠나 엄마랑 똑같아. 내가 하는 말 같은 건 건성으로밖에 안 듣고 있잖아」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「トワちゃんには、行き倒れてたところを助けてもらった恩がある。でも、あたしにだって譲れないことがある」"
translation = "「토와짱에겐 쓰러져 있던 걸 구해준 은혜가 있어. 하지만 나에게도 양보할 수 없는 게 있어」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「あたしは魔界に帰らない。大人がなんと言おうと、あたしは魔王になる」"
translation = "「나는 마계로 돌아가지 않아. 어른들이 뭐라 하든 나는 마왕이 될 거야」"

[[dialogue]]
speaker = "unk"
original = "メイプルはどうして、魔王になりたいんだ？"
translation = "메이플은 어째서 마왕이 되고 싶은 거야?"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「あたしにとって、魔王は憧れの英雄だから」"
translation = "「나에게 있어 마왕은 동경하는 영웅이니까」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「モノクラウン家の先祖は３０００年前、魔王の片腕として、隣で彼を支え続けた。だからモノクラウン家には、魔王の活躍を記した日記が残ってるの」"
translation = "「모노크라운 가문의 선조는 3000년 전, 마왕의 오른팔로서 곁에서 그를 계속 보좌했어. 그래서 모노크라운 가문에는 마왕의 활약을 기록한 일기가 남아 있어」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「あたしは両親から、魔王の英雄譚を聞かされて育った。だからこそ、許せない」"
translation = "「나는 부모님으로부터 마왕의 영웅담을 들으며 자랐어. 그렇기에 용서할 수 없어」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「世界の危機が迫っているのに、自国に引きこもっている煌嶺も、それを見て見ぬフリして正そうとしないパパやママたちも！」"
translation = "「세계의 위기가 다가오고 있는데 자기 나라에 틀어박혀 있는 코우레이도, 그걸 보고도 못 본 척 바로잡으려 하지 않는 아빠나 엄마들도!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「そんなヒトたちを説得してから出直して来いって？\u3000何十、何百回と訴えてきたよ！\u3000それがダメだったから、家出してきたの！」"
translation = "「그런 사람들을 설득하고 나서 다시 오라구? 수십, 수백 번이나 호소해 왔어! 그게 안 됐으니까 가출한 거라구!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「……ごめん」"
translation = "「……미안해」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「……謝るくらいなら、あたしに星騎士の資格を頂戴」"
translation = "「……사과할 거라면 나에게 성기사 자격을 줘」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「……ちょっと熱くなっちゃったから、外で頭を冷やしてくる」"
translation = "「……좀 흥분해 버렸으니까 밖에서 머리 좀 식히고 올게」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「私、先生失格だね……」"
translation = "「나, 선생님 자격 미달이네……」"

[[dialogue]]
speaker = "unk"
original = "そんなことないと咄嗟に否定しても、それ以上の言葉が思いつかず。"
translation = "그렇지 않다고 급히 부정해도 그 이상의 말이 떠오르지 않아."

[[dialogue]]
speaker = "unk"
original = "２人で黙り込んでしまうのだった――"
translation = "둘은 침묵에 빠지고 말았다──"

