[[dialogue]]
speaker = "unk"
original = "第９話,私たちのプレゼントだぴょん！,B"
translation = "제9화, 우리들의 선물이다뿅!, B"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "『ねえ、先程から貴方は何を作っているの？』"
translation = "『저기, 아까부터 당신은 무엇을 만들고 있나요?』"

[[dialogue]]
speaker_original = "メイド"
speaker_translation = "메이드"
original = "『クリスマスリースですよ、お嬢様』"
translation = "『크리스마스 리스예요, 아가씨.』"

[[dialogue]]
speaker_original = "メイド"
speaker_translation = "메이드"
original = "『これを作って扉などに飾っておくと、魔除けになったり幸運のお守りになったりするんです』"
translation = "『이걸 만들어서 문 등에 장식해 두면, 액막이가 되거나 행운의 부적이 되기도 한답니다.』"

[[dialogue]]
speaker_original = "メイド"
speaker_translation = "메이드"
original = "『輪の形になっているところから永遠のシンボルでもあり、そこから<b>永遠の愛</b>という意味も持っているんですよ』"
translation = "『고리 모양으로 되어 있는 점에서 영원의 상징이기도 하며, 거기서 <b>영원한</b> <b>사랑</b>이라는 의미도 가지고 있어요.』"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "『そうなんだぁ、面白そう。私もやってみたいわ』"
translation = "『그렇구나, 재밌어 보여. 나도 해보고 싶어.』"

[[dialogue]]
speaker_original = "メイド"
speaker_translation = "메이드"
original = "『ふふ、ではこちらにいらしてください。一緒に作りましょう』"
translation = "『후후, 그럼 이쪽으로 오세요. 함께 만들어요.』"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "『うんっ♪』"
translation = "『응!♪』"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「はぁーーーっ、第二次サンタ大作戦は大成功で終了ね！」"
translation = "「하아──, 제2차 산타 대작전은 대성공으로 종료네!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「そうね。みんなにプレゼントも配れたし、クリスマスフォームも起動することが出来たわ」"
translation = "「그렇네. 모두에게 선물도 나눠줬고, 크리스마스 폼도 기동할 수 있었어.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「お嬢様、いろいろ協力してくれてありがとう」"
translation = "「아가씨, 여러모로 협력해 줘서 고마워.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「何よ、あらたまって。いいわよ、私もめちゃくちゃ楽しかったから♪」"
translation = "「뭐야, 새삼스럽게. 됐어, 나도 엄청 즐거웠으니까♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「実は去年のことが心残りだったのよね～。第一次サンタ大作戦に私は参加できなかったじゃない？」"
translation = "「사실 작년 일이 마음에 걸렸거든~. 제1차 산타 대작전에 나는 참가하지 못했잖아?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「だから去年の雪辱を果たせたし、みんなの素敵な思い出話も聞くことが出来たし、何より蘭美と遊べて楽しかったわ！」"
translation = "「그래서 작년의 설욕을 씻을 수 있었고, 모두의 멋진 추억담도 들을 수 있었고, 무엇보다 라비랑 놀아서 즐거웠어!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ふふふ……私もよ、お嬢様」"
translation = "「후후후…… 나도야, 아가씨.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それにしてもすごかったわね、土壇場でクリスマスフォームを覚醒させちゃうなんて」"
translation = "「그건 그렇고 대단했어, 막판에 크리스마스 폼을 각성시키다니.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「私の想定では、ヘレナちゃんにプレゼントを渡して感動的に覚醒するってストーリーだったのに、見事に壊されちゃったって感じだわ」"
translation = "「내 예상으로는, 헬레나짱에게 선물을 건네고 감동적으로 각성한다는 스토리였는데, 보기 좋게 깨져버린 느낌이야.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「私のスピードがお嬢様の想定を上回った、ということね」"
translation = "「내 스피드가 아가씨의 예상을 상회했다는 거네.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「でもお嬢様のピンチに真の力が覚醒するっていう展開も感動的だったでしょう？」"
translation = "「하지만 아가씨의 위기에 진정한 힘이 각성한다는 전개도 감동적이었지?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そうね、あれはカッコ良かったな～」"
translation = "「그렇네, 그건 멋있었어~」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あ～、でも本当、楽しい時間ってあっという間……もうちょっと楽しみたかったわ」"
translation = "「아~ 하지만 정말, 즐거운 시간은 순식간이네…… 좀 더 즐기고 싶었어.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「そんなお嬢様のために……なんとまだ隠しイベントが残されているのよ」"
translation = "「그런 아가씨를 위해서…… 무려 아직 숨겨진 이벤트가 남아있단다.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「えっ、そんなのがあるの！？」"
translation = "「엣, 그런 게 있어!?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「実はね、お嬢様にお渡ししたいものがあって……」"
translation = "「사실은 말이야, 아가씨에게 전해주고 싶은 게 있어서……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「っ！！\u3000ちょっと待ったぁ！」"
translation = "「윽!! 잠깐 기다려!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ぴょっ、なにごとっ！？」"
translation = "「뾰옷, 무슨 일이야!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「もしかして、もしかすると……蘭美ってば私と同じこと考えてた？」"
translation = "「혹시, 설마…… 라비 너 나랑 같은 생각 하고 있었어?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「私も蘭美に渡したいものがあるんだけど」"
translation = "「나도 라비에게 주고 싶은 게 있는데.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ふふふ♪\u3000それじゃ、２人同時に渡しましょう」"
translation = "「후후후♪ 그럼, 둘이 동시에 건네주자.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「いいわよ。……せーの！」"
translation = "「좋아. ……하나 둘!」"

[[dialogue]]
speaker_original = "蘭美＆ヴィーナス"
speaker_translation = "라미 & 비너스"
original = "「メリークリスマス♪」"
translation = "「메리 크리스마스♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「プレゼント、私のも用意してくれてたんだ。さすがは蘭美、行き届いてるわね」"
translation = "「선물, 내 것도 준비해 줬구나. 역시 라비, 빈틈없네.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「九浄家メイド隊の隊長だもの、行き届いていて当然よ。お嬢様こそ流石だわ」"
translation = "「쿠죠 가 메이드 부대의 대장인걸, 빈틈없는 건 당연하지. 아가씨야말로 역시야.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふふふ、蘭美からのプレゼントか～……何なんだろう？」"
translation = "「후후후, 라비가 주는 선물인가~…… 뭘까?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「それは自分の目で見てのお楽しみよ」"
translation = "「그건 직접 보고 확인하는 즐거움으로 남겨둬.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そうね、じゃ早速楽しんじゃおうかしら」"
translation = "「그렇네, 그럼 당장 즐겨볼까나.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あ……これ……ネックレス、ハートがモチーフの……可愛いわね」"
translation = "「아…… 이거…… 목걸이, 하트가 모티브인…… 귀엽네.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「私のお嬢様のイメージはやはり、ハートとチェーンだったので」"
translation = "「내 아가씨의 이미지는 역시, 하트와 체인이었으니까.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ありがとう、大切にするわ♪」"
translation = "「고마워, 소중히 할게♪」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「今度は私のターンね。お嬢様は私に何をプレゼントしてくれたのかしら……」"
translation = "「이번엔 내 차례네. 아가씨는 나에게 무엇을 선물해 줬을까……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「うっ……なんかハードル上げてきたんですけど……」"
translation = "「으…… 왠지 허들이 높아진 것 같은데……」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ど、どうかしら？」"
translation = "「어, 어때?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「クリスマスリース……」"
translation = "「크리스마스 리스……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クリスマスっぽいってだけで選んじゃったんだけど、ちょっと安直だった？\u3000でも小さくて可愛いと思うわ」"
translation = "「크리스마스 느낌이 난다는 것만으로 골랐는데, 좀 단순했나? 하지만 작고 귀엽다고 생각해.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ええ、そうね。もちろん小さくて可愛いのはクリスマスリースであって私ではないけど」"
translation = "「응, 그렇네. 물론 작고 귀여운 건 크리스마스 리스지 내가 아니지만.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「誰もそんなこと言ってないじゃない、もう」"
translation = "「아무도 그런 말 안 했잖아, 정말.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ふふふ……でも、何となく、でこれを選ぶあたり……やっぱりお嬢様は只者じゃないわね」"
translation = "「후후후…… 하지만, 왠지 모르게 이걸 고르다니…… 역시 아가씨는 보통이 아니네.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ん、何？\u3000もしかしてクリスマスリース、好きなの？」"
translation = "「응, 왜? 혹시 크리스마스 리스, 좋아해?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「好きというか……思い入れがあるというか……」"
translation = "「좋아한다기보다…… 추억이 있다고나 할까……」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「昔、私の家に仕えていたメイドが、毎年クリスマスの時期にリースを作って部屋に飾ってくれていたの」"
translation = "「옛날에 우리 집에 머물던 메이드가, 매년 크리스마스 때마다 리스를 만들어서 방에 장식해 줬어.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そっか……蘭美って実は魔界有数の貴族出身だったりするのよね」"
translation = "「그렇구나…… 라비는 사실 마계 유수의 귀족 출신이었지.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「そんな私がメイドを目指したのも、彼女がきっかけだったわ」"
translation = "「그런 내가 메이드를 지망하게 된 것도 그녀가 계기였어.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「優雅で上品で聡明で、そして優しくて……彼女はまさにメイドを極めたような女性だった」"
translation = "「우아하고 품위 있고 총명하며, 그리고 다정하고…… 그녀는 그야말로 메이드를 통달한 것 같은 여성이었지.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「彼女に憧れた私は、両親の反対を押し切って彼女に弟子入りし──こうして今日の私がここに在る」"
translation = "「그녀를 동경한 나는 부모님의 반대를 무릅쓰고 그녀의 제자로 들어가── 이렇게 오늘의 내가 여기에 있어.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「私の夢は師である彼女を超えるような、世界一のメイドになること」"
translation = "「내 꿈은 스승인 그녀를 뛰어넘는, 세계 제일의 메이드가 되는 것.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「お嬢様……ありがとうございます。お嬢様のプレゼントのおかげで、色んな暖かい思い出がよみがえってきました」"
translation = "「아가씨…… 감사합니다. 아가씨의 선물 덕분에, 여러 따뜻한 추억이 되살아났어요.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あはは、ぜーんぶ偶然なんだけどね。喜んでもらえてよかった」"
translation = "「아하하, 전부 우연이지만 말이야. 기뻐해 주니 다행이야.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「意図せず、私もクリスマスの思い出を語ってしまったわ」"
translation = "「의도치 않게 나도 크리스마스의 추억을 이야기해 버렸네.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あはは、そうね。えっ……？」"
translation = "「아하하, 그렇네. 엣……?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「な……！？」"
translation = "「뭐……!?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「クリスマスリースのベルが光って……お嬢様、どういうこと……？」"
translation = "「크리스마스 리스의 종이 빛나서…… 아가씨, 어떻게 된 거야……?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「し、知らないけど」"
translation = "「모, 모르겠는데.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「お嬢様の仕掛けじゃない？\u3000だとしたら……」"
translation = "「아가씨가 장치한 거 아니야? 그렇다면……」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「っ！？\u3000クリスマスフォームにさっき戦ってた時以上の力が宿ってる……これって──」"
translation = "「윽!? 크리스마스 폼에 아까 싸울 때 이상의 힘이 깃들고 있어…… 이건──」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「私のあげたリースが、蘭美のハンマーの先のリースと一体になった……！？」"
translation = "「내가 준 리스가, 라비의 해머 끝에 있는 리스와 일체화됐어……!?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「……みたいね」"
translation = "「……그런 모양이네.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ふっ、ふふ……なるほど、そういうことだったのね」"
translation = "「훗, 후후…… 과연, 그런 거였구나.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「お嬢様に貰ったリースが融合したことで、このクリスマスフォームは真の力を解放したわ。つまり──」"
translation = "「아가씨에게 받은 리스가 융합하면서, 이 크리스마스 폼은 진정한 힘을 해방했어. 즉──」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「最後の鍵は私のプレゼントだったってこと！？」"
translation = "「마지막 열쇠는 내 선물이었다는 거야!?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「そういうことみたいね」"
translation = "「그런 모양이네.」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「素晴らしいでござる！\u3000感動的でござるっ！！」"
translation = "「훌륭하오! 감동적이오!!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「せつな！\u3000どうしてここに！？」"
translation = "「세츠나! 왜 여기에 있어!?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「……さては、ずっと隠れて見ていたわね、<b>貴方たち</b>？」"
translation = "「……아무래도, 계속 숨어서 보고 있었구나, <b>당신들</b>?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こやっ！？\u3000私たちのこともバレちゃいました！」"
translation = "「코얏!? 우리도 들켜버렸어요!」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「仕方ないよ。これ以上せつなを忍ばせておくのは無理だし、うちら頑張ったよ、うん」"
translation = "「어쩔 수 없어. 더 이상 세츠나를 숨겨두는 건 무리고, 우리 나름대로 열심히 했어, 응.」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「も、申し訳ありません！\u3000邪魔をするつもりはなかったのですが……」"
translation = "「죄, 죄송합니다! 방해할 생각은 없었습니다만……」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「２人がどんな話をしているのか、気になってしまったでござる」"
translation = "「둘이 무슨 이야기를 하는지, 궁금해졌소.」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「しゃきっ★\u3000さっそく頂いたばかりの望遠鏡が大活躍だったでござる♪」"
translation = "「샤킨★ 방금 받은 망원경이 대활약이었소♪」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「私も手袋とマフラー、持ってきてますよ♪」"
translation = "「저도 장갑이랑 목도리, 가져왔어요♪」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「まさかプレゼントが自分の覗きに有効活用されるとは思わなかったわ」"
translation = "「설마 선물이 자신의 엿보기에 유용하게 활용될 줄은 몰랐네.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「まあまあ、いいじゃない。みんなが居てこそのクリスマスフォームの覚醒だったんだし」"
translation = "「뭐뭐, 괜찮잖아. 모두가 있었기에 크리스마스 폼이 각성한 거기도 하고.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「せっかくだし、このままもう少しみんなでおしゃべりしながら、クリスマスの夜を過ごさない？」"
translation = "「기왕 이렇게 된 거, 이대로 조금 더 다 같이 수다 떨면서 크리스마스 밤을 보내지 않을래?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「わっ、わっ！\u3000みんなでですか！\u3000それ、とっても素敵ですっ！」"
translation = "「왓, 왓! 다 같이 말인가요! 그거, 정말 멋져요!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「趣深い提案にござるな、せつなも大賛成でござるよ」"
translation = "「정취 있는 제안이오, 세츠나도 대찬성이오.」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「お嬢様とみんなとで過ごすクリスマスの夜……最高じゃないですか……」"
translation = "「아가씨와 모두와 함께 보내는 크리스마스 밤…… 최고이지 않습니까……」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「ま、今夜ばかりはうちも付き合うしかないね。メイド長にちゃんとオメデトってしたいし」"
translation = "「뭐, 오늘 밤만큼은 나도 어울려 줄 수밖에 없겠네. 메이드장에게 제대로 축하한다고 해주고 싶고.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「よーし、決まりっ。それじゃみんなも座って座って～」"
translation = "「조아──, 결정. 그럼 다들 앉아 앉아~」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「……まったく」"
translation = "「……정말이지.」"

[[dialogue]]
speaker = "unk"
original = "真冬の冷たい空気の中だというのに、気にもしないではしゃいでいるメイド隊のみんな。"
translation = "한겨울의 차가운 공기 속인데도, 아랑곳하지 않고 들떠 있는 메이드 부대원들."

[[dialogue]]
speaker = "unk"
original = "そんな光景を見ていると、蘭美も寒さを忘れるほど暖かい気持ちがこみ上げてくるのを感じた。"
translation = "그런 광경을 보고 있자니, 라비도 추위를 잊을 정도로 따뜻한 마음이 벅차오르는 것을 느꼈다."

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「……本当に、最高のクリスマスになったわ」"
translation = "「……정말로, 최고의 크리스마스가 되었어.」"

[[dialogue]]
speaker = "unk"
original = "みんなのおかげでね──蘭美の誰の耳にも届かないような小さな呟きは、見上げる１２月の夜空に溶けていった。"
translation = "모두 덕분에── 라비의 그 누구의 귀에도 닿지 않을 작은 중얼거림은, 올려다본 12월의 밤하늘에 녹아들었다."

