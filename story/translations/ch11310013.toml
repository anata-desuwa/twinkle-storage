[[dialogue]]
speaker = "unk"
original = "第３話,シズルさんと対戦,P"
translation = "제3화, 시즈루 씨와 대전, P"

[[dialogue]]
speaker = "シズル"
original = "「はい、どうぞ召し上がってください♪」"
translation = "「네, 여기 드셔보세요♪」"

[[dialogue]]
speaker = "リノ"
original = "「わぁ……なんだか珍しい料理がいっぱいね」"
translation = "「와아…… 왠지 희귀한 요리가 가득하네」"

[[dialogue]]
speaker = "unk"
original = "シズルさんの料理は絶品だよ"
translation = "시즈루 씨의 요리는 절품이야"

[[dialogue]]
speaker = "リノ"
original = "「うちでは洋風の食事が多いから、こういう『和』って感じの料理は嬉しいかも。さっそくいただきま～す♪」"
translation = "「우리 집은 양식 식사가 많아서, 이런 『화』 느낌의 요리는 반가울지도. 바로 잘 먹겠습니다~♪」"

[[dialogue]]
speaker = "リノ"
original = "「んっ……美味しい～っ！」"
translation = "「음…… 맛있어~!」"

[[dialogue]]
speaker = "シズル"
original = "「お口にあったようで……安心しました」"
translation = "「입에 맞으신 것 같아…… 안심했어요」"

[[dialogue]]
speaker = "シズル"
original = "「緋宮家では、主に洋風の食事が多いのですね？\u3000魔王さんは料理が得意と聞きましたが、料理の担当は……」"
translation = "「히미야 가문에서는 주로 양식 식사가 많은 거군요? 마왕님은 요리가 특기라고 들었습니다만, 요리 담당은……」"

[[dialogue]]
speaker = "unk"
original = "家事全般、俺です"
translation = "가사 전반, 접니다"

[[dialogue]]
speaker = "リノ"
original = "「もー、なんだか私が家事全般ダメ、みたいに思われちゃうじゃない！\u3000ま、事実任せっぱなしではあるけどね」"
translation = "「정말-, 왠지 내가 가사 전반 꽝인 것처럼 생각되잖아! 뭐, 사실 다 맡기고 있긴 하지만 말이야」"

[[dialogue]]
speaker = "シズル"
original = "「今度は魔王さんのお料理も食べてみたいです」"
translation = "「이번에는 마왕님의 요리도 먹어보고 싶어요」"

[[dialogue]]
speaker = "リノ"
original = "「いいじゃない、次はそうしましょう。うちの息子の料理も、引けを取らないくらい絶品なんだから～」"
translation = "「좋잖아, 다음에는 그렇게 하자. 우리 아들 요리도 만만치 않게 절품이니까~」"

[[dialogue]]
speaker = "シズル"
original = "「それは楽しみですね。ぜひお願いします♪」"
translation = "「그거 기대되네요. 꼭 부탁드려요♪」"

[[dialogue]]
speaker = "unk"
original = "気合いを入れて作るよ！"
translation = "기합 넣어서 만들게!"

[[dialogue]]
speaker = "リノ"
original = "「あっ、もうこんな時間！\u3000バタバタしちゃってごめんなさい。私は出かけちゃうけど、ゆっくりしていってね～」"
translation = "「앗, 벌써 시간이 이렇게! 허둥지둥해서 미안해. 나는 나가봐야 하는데, 천천히 쉬다 가렴~」"

[[dialogue]]
speaker = "シズル"
original = "「ありがとうございます。行ってらっしゃいませ～」"
translation = "「감사합니다. 다녀오세요~」"

[[dialogue]]
speaker = "シズル"
original = "「いいお母様ですね。深い愛情を感じました」"
translation = "「좋은 어머님이시네요. 깊은 애정이 느껴졌어요」"

[[dialogue]]
speaker = "シズル"
original = "「それはそうとして……ねえ、魔王さん♪\u3000やっぱりそういう感じなんですか？」"
translation = "「그건 그렇고…… 저기, 마왕님♪ 역시 그런 느낌인가요?」"

[[dialogue]]
speaker = "unk"
original = "どういうこと？"
translation = "무슨 소리야?"

[[dialogue]]
speaker = "unk"
original = "そういう感じって？"
translation = "그런 느낌이라니?"

[[dialogue]]
speaker = "シズル"
original = "「かわいい女の子がいたら、すぐに手を出しちゃう人ってことです」"
translation = "「귀여운 여자가 있으면 바로 손을 대버리는 사람이라는 뜻이에요」"

[[dialogue]]
speaker = "シズル"
original = "「せつなからの報告によると周囲には可愛い女性ばかり。実際にそうですし彼女たちからの評判はかなり高い様子……」"
translation = "「세츠나의 보고에 따르면 주변에는 귀여운 여성들뿐. 실제로도 그렇고 그녀들의 평판은 상당히 높은 모양인데……」"

[[dialogue]]
speaker = "シズル"
original = "「もしかして、意中の女性がいるんですか？\u3000そういうお相手がいるから、せつなに手を出さない、と」"
translation = "「혹시 마음에 둔 여성이 있나요? 그런 상대가 있으니까 세츠나에게 손을 대지 않는 거라고」"

[[dialogue]]
speaker = "unk"
original = "そういうのは関係ないです"
translation = "그런 건 관계없습니다"

[[dialogue]]
speaker = "unk"
original = "違います！"
translation = "아닙니다!"

[[dialogue]]
speaker = "シズル"
original = "「なるほど……他のお相手はなし、と。では、どうしてせつなに手を出さないんですか？\u3000魔王さんも男の子ですから、決して嫌いなわけではないのでしょう？」"
translation = "「과연…… 다른 상대는 없다, 고. 그럼 어째서 세츠나에게 손을 대지 않는 건가요? 마왕님도 남자애니까 결코 싫어하는 건 아닐 텐데 말이죠?」"

[[dialogue]]
speaker = "シズル"
original = "「うちのせつなは贔屓目なしにかわいいと思うんですよね～。しかも私が教えた房中術で、夜の方もかなり具合は良いはずですよ？\u3000まさに今が食べ頃です♪」"
translation = "「우리 세츠나는 제 눈 안경 없이도 귀엽다고 생각하거든요~. 게다가 제가 가르친 방중술로 밤일 쪽도 꽤 솜씨가 좋을 텐데 말이에요? 그야말로 지금이 먹기 딱 좋은 때랍니다♪」"

[[dialogue]]
speaker = "シズル"
original = "「ちょっとでいいですから、試してみませんか？\u3000つまみ食いですよ。何も責任を取れなんて言いません、後腐れない関係を楽しんじゃいましょう♪」"
translation = "「조금이라도 좋으니까 시험해보지 않을래요? 맛보기예요. 아무런 책임도 지라고 하지 않을게요, 뒷탈 없는 관계를 즐겨버리자고요♪」"

[[dialogue]]
speaker = "シズル"
original = "「まだ未経験だから勇気が出ないとか？\u3000そういうのもかわいくて好きですけど、思い切って経験してしまうのもありだと思いますよ？」"
translation = "「아직 미경험이라 용기가 안 난다든가? 그런 것도 귀여워서 좋지만, 과감히 경험해버리는 것도 괜찮다고 생각하는데요?」"

[[dialogue]]
speaker = "unk"
original = "体がおかしい"
translation = "몸이 이상해"

[[dialogue]]
speaker = "unk"
original = "あ、あれ？"
translation = "어, 어라?"

[[dialogue]]
speaker = "シズル"
original = "「ふふっ、油断大敵ですよ。これでもせつなの師匠ですから、房中術の達人なんです」"
translation = "「후훗, 방심은 금물이에요. 이래 봬도 세츠나의 스승이니까, 방중술의 달인이거든요」"

[[dialogue]]
speaker = "シズル"
original = "「つまり、どういうことかというとですね……魔王さんに一服盛っちゃいました♪」"
translation = "「즉, 무슨 소린가 하면요…… 마왕님에게 약 한 사발 먹여버렸답니다♪」"

[[dialogue]]
speaker = "シズル"
original = "「安心して下さい、お母様の料理には入れてませんから。秘薬マシマシなのは、魔王さんと私が食べた分だけです」"
translation = "「안심하세요, 어머님 요리에는 넣지 않았으니까요. 비약이 듬뿍 들어간 건, 마왕님과 제가 먹은 분량뿐이에요」"

[[dialogue]]
speaker = "シズル"
original = "「私が作った秘薬ですから、効果ばっちりですよ。私の方も……むらむらしてきました♪」"
translation = "「제가 만든 비약이니까, 효과는 확실해요. 저도 벌써…… 몸이 달아오르기 시작했거든요♪」"

[[dialogue]]
speaker = "シズル"
original = "「ふぅーーーっ。かわいいお耳が真っ赤ですよ。と～ってもいい気持ちになってきたんじゃありませんか……？」"
translation = "「후우우우—. 귀여운 귀가 새빨개졌네요. 아~주 기분 좋은 상태가 된 거 아니신가요……?」"

[[dialogue]]
speaker = "シズル"
original = "「ふふふ、我慢すると余計にむらむらしちゃいますよ。ここは素直に、快楽に身を委ねましょう♪」"
translation = "「후후후, 참으면 더 몸이 달아오를걸요. 여기서는 솔직하게, 쾌락에 몸을 맡기죠♪」"

[[dialogue]]
speaker = "シズル"
original = "「魔王さんの顔、とろ～んとしてきましたね～<emoji=heart04>」"
translation = "「마왕님 얼굴, 헤벌레해졌네요~<emoji=heart04>」"

[[dialogue]]
speaker = "シズル"
original = "「そろそろ体の方も我慢できなくなってきましたか？\u3000いいんですよ、本能に従っても」"
translation = "「슬슬 몸도 한계인가요? 괜찮아요, 본능에 따르셔도」"

[[dialogue]]
speaker = "シズル"
original = "「さて、そろそろこちらも……わぁ、おっきい<emoji=heart04>」"
translation = "「자, 그럼 슬슬 이쪽도…… 와아, 엄청 커<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "秘薬のせいだから！"
translation = "비약 때문이야!"

[[dialogue]]
speaker = "unk"
original = "これは不可抗力で！"
translation = "이건 불가항력으로!"

[[dialogue]]
speaker = "シズル"
original = "「いいんですよ、どんどんおっきくなって下さい。ああっ、魔王さんの魔王さんが、今にも暴れ出しちゃいそうです<emoji=heart04>」"
translation = "「괜찮아요, 점점 더 키워주세요. 아앗, 마왕님의 마왕님이 지금이라도 날뛸 것만 같아요<emoji=heart04>」"

[[dialogue]]
speaker = "シズル"
original = "「こちらの反応は良好ですし……うまくいかないのは、せつなの方に問題があるのかも」"
translation = "「이쪽 반응은 양호한데…… 잘 안 되는 건 세츠나 쪽에 문제가 있는 걸지도」"

[[dialogue]]
speaker = "シズル"
original = "「ここは師匠として、しっかり確認しなきゃいけませんね♪」"
translation = "「여기는 스승으로서, 제대로 확인해 봐야겠네요♪」"

[[dialogue]]
speaker = "シズル"
original = "「ということで……ごめんね、せつな。あなたの主様のこと、ちょ～～っとだけ味見しちゃいます」"
translation = "「그런 고로…… 미안해, 세츠나. 네 주인님 말이야, 아~~주 조금만 맛볼게」"

[[dialogue]]
speaker = "シズル"
original = "「それでは魔王さん、お相手よろしくお願いしますね<emoji=heart04>」"
translation = "「그럼 마왕님, 상대 잘 부탁드려요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ああああ～～～～～～っ！！！"
translation = "아아아아~~~~~~앗!!!"

[[dialogue]]
speaker = "unk"
original = "こうして俺は、シズルさんの房中術を味わう羽目になってしまったのだった。"
translation = "이렇게 나는, 시즈루 씨의 방중술을 맛보게 되어버린 것이었다."

