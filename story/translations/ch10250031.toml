[[dialogue]]
speaker = "unk"
original = "第１話,インラインスケートの練習,P"
translation = "제1화, 인라인스케이트 연습, P"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「――というわけで、貰ったばかりの戦闘服を使いこなせるようにみんな特訓中だよ。特にアニュラスが張り切ってて」"
translation = "「──그런 이유로, 방금 받은 전투복을 능숙하게 다룰 수 있도록 다들 특훈 중이야. 특히 아뉴라스가 의욕이 넘쳐서.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「アポロちゃんは星見家のメイドさん達から逃げ回ってる最中かも。可哀想だな～って思うけど、可愛がりたくなる気持ちはわかるから、何とも言えないね」"
translation = "「아폴로짱은 호시미 가문의 메이드 언니들에게서 도망 다니는 중일지도. 불쌍하다~ 싶지만, 귀여워하고 싶은 마음은 이해하니까 뭐라 말할 수가 없네.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「私？\u3000うーん、特訓ってほどじゃないけど、ちょっと慣れが必要かなって。ほら、今回のクリスマスフォームはこうなってるから」"
translation = "「나? 으음, 특훈까지는 아니지만, 조금 익숙해질 필요가 있을 것 같아서. 봐, 이번 크리스마스 폼은 이렇게 되어 있거든.」"

[[dialogue]]
speaker = "unk"
original = "インラインスケート！"
translation = "인라인스케이트!"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「そう、フィギュアスケートの靴じゃないから、いつもとちょっと勝手が違うんだよね」"
translation = "「응, 피겨 스케이팅 신발이 아니라서 평소랑은 조금 감각이 다르단 말이지.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「というわけで、大丈夫な時には極力クリスマスフォームになってるよ。集中してなくても普通に滑れるようになりたいんだよね」"
translation = "「그래서 괜찮을 때는 가급적 크리스마스 폼 상태로 있어. 집중하지 않아도 평범하게 탈 수 있게 되고 싶거든.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「クリスマスフォームを普段使いにしてみたら、って提案はソフィがしてくれたんだけど、これが結構気付くことがあって」"
translation = "「크리스마스 폼을 평상복처럼 써보면 어떠냐는 제안은 소피가 해줬는데, 이게 꽤 깨닫는 게 많더라고.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「人と人との間を縫って滑るのって、かなりランダム性があるから、パーティー会場で滑る時の練習になりそうなんだよね」"
translation = "「사람들 사이를 비집고 타는 건 꽤 무작위성이 강하니까, 파티장에서 탈 때 연습이 될 것 같아.」"

[[dialogue]]
speaker = "unk"
original = "可愛い舞亜が見れて嬉しい"
translation = "귀여운 마이아를 볼 수 있어서 기뻐."

[[dialogue]]
speaker = "unk"
original = "普段使いしてくれると"
translation = "평상복으로 입어준다면야."

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ふふ、ありがと♪」"
translation = "「후후, 고마워♪」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「でもこの衣装、本当にカワイイよね。さすがヘレナさんって感じ」"
translation = "「근데 이 의상, 정말 귀엽지. 역시 헬레나 씨라는 느낌이야.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「フィギュアスケートの衣装もカワイイのが多いけど、このフォームも同じくらい可愛いと思わない？」"
translation = "「피겨 스케이팅 의상도 귀여운 게 많지만, 이 폼도 그만큼 귀엽다고 생각하지 않아?」"

[[dialogue]]
speaker = "unk"
original = "でも中身の方も可愛い"
translation = "하지만 알맹이 쪽도 귀여워."

[[dialogue]]
speaker = "unk"
original = "確かに可愛い"
translation = "확실히 귀엽네."

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「わ、私のことは、今はいいでしょ。今は衣装の話をしてるのっ」"
translation = "「와, 나에 대한 건 지금은 됐어. 지금은 의상 얘기를 하고 있잖아.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「でも、そうだね。クリスマスフォームでいると注目を集めやすいから、いい意味で気が抜けないっていうか、プレッシャーを感じるんだよね」"
translation = "「하지만 그렇네. 크리스마스 폼으로 있으면 주목받기 쉬우니까, 좋은 의미로 긴장을 늦출 수 없달까, 프레셔를 느껴.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「それはいい刺激になるかも。見られることを常に意識するのは、すごく大事だから」"
translation = "「그건 좋은 자극이 될지도 몰라. 남에게 보여지는 걸 항상 의식하는 건 아주 중요하니까.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ちょっと見てて。滑ってくるから」"
translation = "「잠깐 보고 있어 봐. 타고 올게.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「行きますっ！」"
translation = "「갑니다!」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ふふふっ、すいすいすいーーーっと」"
translation = "「후후훗, 씽씽씽──」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ぶつからないようにターン！」"
translation = "「부딪히지 않게 턴!」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「驚かせてごめんね～！\u3000はいっ、お詫びのスピン！」"
translation = "「놀라게 해서 미안해~! 자, 사과의 스핀!」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ありがと～！\u3000応援よろしくね～」"
translation = "「고마워~! 응원 부탁해~」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ふぅ……ただいま。どうだった？」"
translation = "「후우…… 다녀왔어. 어땠어?」"

[[dialogue]]
speaker = "unk"
original = "惚れ直した"
translation = "다시 반했어."

[[dialogue]]
speaker = "unk"
original = "こんなの好きになっちゃう"
translation = "이런 건 좋아하게 될 수밖에 없잖아."

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ちょっ、褒めすぎ褒めすぎっ。もう、油断するとすぐ恋人モードに入るんだから……」"
translation = "「잠깐, 너무 칭찬하잖아. 정말, 방심하면 금방 연인 모드로 들어간다니까……」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「必死になって隠すつもりはもう無いけど、あんまり見せつけるのはね？\u3000見られてない時だったら、その……していいから<emoji=heart04>」"
translation = "「필사적으로 숨길 생각은 이제 없지만, 너무 대놓고 보여주는 건 좀 그렇지? 남들이 안 볼 때라면, 그…… 해도 되니까<emoji=heart04>」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「あっ、していいってキスのことだからね？\u3000会長さん、今もっとエッチなこと想像したでしょ？\u3000もぉー」"
translation = "「앗, 해도 된다는 건 키스 말이야! 회장님, 지금 더 야한 거 상상했지? 정말─」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「あんまりエッチなのはよくないんだから。……今はこれで我慢してっ」"
translation = "「너무 야한 건 안 된다니까. ……지금은 이걸로 참아줘.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ちゅ<emoji=heart04>」"
translation = "「쪽<emoji=heart04>」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「えへへ～、キスしちゃった。ほっぺだし、一瞬だったからセーフだよね？」"
translation = "「에헤헤~, 키스해버렸다. 볼이고, 순식간이었으니까 세이프지?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「一瞬じゃ物足りないって……それはまあ、そうなんだけどっ。こんな人が大勢いるところでがっつりキスはダメだってば<emoji=heart04>」"
translation = "「순식간으론 부족하다니…… 그건 뭐, 그렇긴 하지만! 이렇게 사람 많은 데서 진하게 키스하는 건 안 된다니까<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "もっと練習しないと"
translation = "좀 더 연습해야겠네."

[[dialogue]]
speaker = "unk"
original = "がっつりじゃなきゃいいよね？"
translation = "진하게만 아니면 괜찮지?"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ううっ、練習って自分で言ったばっかりだしなぁ……もー、わかったよ」"
translation = "「으으, 연습이라고 방금 내가 말하긴 했지만…… 정말, 알았어.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「でも……せっかくキスするなら、せめて雰囲気を盛り上げて欲しいな<emoji=heart04>」"
translation = "「하지만…… 이왕 키스할 거라면, 적어도 분위기라도 좀 띄워줬으면 좋겠어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "大好きだ"
translation = "사랑해."

[[dialogue]]
speaker = "unk"
original = "可愛いよ、舞亜"
translation = "귀여워, 마이아."

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「っっ～～～～！！？\u3000もっ、もぉ！\u3000もぉ！\u3000もぉ！\u3000ドキッとすること言って……」"
translation = "「윽~~~~!!? 정, 정말! 정말! 정말! 두근거리는 소리나 하고……」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ううう～、めちゃくちゃ恥ずかしい。私赤くなってない？\u3000ほっぺだけじゃなく、耳とか首まで真っ赤になってそうな気がする」"
translation = "「으으으~, 엄청 부끄러워. 나 얼굴 빨개지지 않았어? 볼뿐만 아니라 귀랑 목까지 새빨개졌을 것 같아.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「でも……うん、ありがと。ちゃんと言葉にしてくれて、嬉しかった。だから、私もちゃんとお礼するねっ」"
translation = "「하지만…… 응, 고마워. 제대로 말로 표현해줘서 기뻤어. 그러니까, 나도 제대로 보답할게.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「………………ちゅっ<emoji=heart04>」"
translation = "「………………쪽<emoji=heart04>」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「えへへへ……今度はほっぺじゃなくて唇だぞ<emoji=heart04>」"
translation = "「에헤헤헤…… 이번엔 볼이 아니라 입술이라구<emoji=heart04>」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「唇にキスしちゃうくらい、好きなんだからね<emoji=heart04>\u3000大事なことだから会長さんも覚えておくよーに」"
translation = "「입술에 키스해버릴 정도로 좋아하니까 말이야<emoji=heart04> 중요한 거니까 회장님도 기억해 두도록─」"

