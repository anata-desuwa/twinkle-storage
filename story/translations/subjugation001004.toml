[[dialogue]]
speaker = "unk"
original = "ドタバタしつつも翌日。附属校生活２日目迎えた俺たちは、大聖堂カフェテリアで一緒に昼食をすることになった。"
translation = "소란스러우면서도 다음 날. 부속교 생활 2일째를 맞이한 우리는 대성당 카페테리아에서 함께 점심을 먹기로 했다."

[[dialogue]]
speaker = "セシア"
original = "「クロトママ～♪\u3000セシアにまた、あ～んってご飯を食べさせて欲しいの♪」"
translation = "「쿠로토 마마~♪ 세시아한테 또 아~ 하고 밥 먹여주면 좋겠어♪」"

[[dialogue]]
speaker = "unk"
original = "仕方ないな～。はい、あ～ん"
translation = "어쩔 수 없네~. 자, 아~."

[[dialogue]]
speaker = "セシア"
original = "「あむっ♪\u3000んふふ～♪」"
translation = "「냠♪ 음후후~♪」"

[[dialogue]]
speaker = "セシア"
original = "「――え？\u3000頬っぺたにご飯が付いてるって？\u3000んっ♪\u3000えへへ、取ってくれてありがと～♪」"
translation = "「──어? 뺨에 밥풀 묻었다고? 응♪ 에헤헤, 떼어줘서 고마워~♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「ぐぬぬ……」"
translation = "「구누누……」"

[[dialogue]]
speaker = "ナミエル"
original = "（緋宮会長、満更でもない顔をしてますね……セシア様がちょっと羨まし――）"
translation = "(<u>히노미야</u> 회장님, 싫지 않은 표정을 짓고 있네요…… 세시아 님이 조금 부러──)"

[[dialogue]]
speaker = "ナミエル"
original = "（い、いやいや！\u3000何を考えているんですか、私！\u3000見た目がかわいい女の子でも、中身は男！\u3000緋宮会長は男ですから！）"
translation = "(아, 아니아니! 무슨 생각을 하는 거예요, 나! 겉모습이 귀여운 여자아이라도 알맹이는 남자! <u>히노미야</u> 회장님은 남자니까요!)"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「はぁ……まさか、セシアからもママダレナと呼ばれなくなってしまうだなんて……」"
translation = "「하아…… 설마 세시아에게까지 마마달레나라고 불리지 못하게 되다니……」"

[[dialogue]]
speaker = "ナミエル"
original = "「あ、その……マグダレナ様、元気を出して下さい」"
translation = "「아, 저기…… 마그달레나 님, 기운 내세요.」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「ナミエルさま、ありがとうございます……」"
translation = "「나미엘 님, 감사합니다……」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「マグダレナ、落ち込んでいる時は、お肉を食べるのだ、お肉！\u3000お腹がいっぱいになれば、嫌なことも忘れてしまうぞ！\u3000もぐもぐ♪」"
translation = "「마그달레나, 우울할 때는 고기를 먹는 것이다, 고기! 배가 부르면 싫은 일도 잊어버리게 된다구! 우걱우걱♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「いやそれは、やけ食いというものでは？」"
translation = "「아니 그건 폭식이라는 게 아닌가요?」"

[[dialogue]]
speaker = "unk"
original = "というか、前の体より食欲増してない！？"
translation = "그보다 이전 몸보다 식욕이 더 늘지 않았어!?"

[[dialogue]]
speaker = "ナミエル"
original = "「お、おかわりした食器の枚数が、すごいことになっていますね……」"
translation = "「더, 리필한 그릇 개수가 엄청나네요……」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「うむ！\u3000体が小さくなったせいか、お腹がよく空くのだ！」"
translation = "「음! 몸이 작아진 탓인지 배가 자주 고픈 것이다!」"

[[dialogue]]
speaker = "ナミエル"
original = "「普通は逆のような……」"
translation = "「보통은 반대인 것 같은데……」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「そうなのか？」"
translation = "「그런 것인가?」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「でも、美味しいお肉を前より沢山食べられるようになったのは、お得だな♪\u3000もぐもぐ♪」"
translation = "「하지만 맛있는 고기를 전보다 많이 먹을 수 있게 된 건 이득이군♪ 우걱우걱♪」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「あ、そうだ！\u3000みんな、今日の放課後は時間あるか？」"
translation = "「아, 맞다! 다들 오늘 방과 후에 시간 있나?」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「アルモたんは学生らしく、みんなでできる遊びがしてみたいのだ！」"
translation = "「알모땅은 학생답게 다 같이 할 수 있는 놀이를 해보고 싶은 것이다!」"

[[dialogue]]
speaker = "ナミエル"
original = "「遊び、ですか……？」"
translation = "「놀이, 말씀이신가요……?」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「そう――鬼ごっことか！」"
translation = "「그래── 술래잡기라든가!」"

[[dialogue]]
speaker = "ナミエル"
original = "「お、鬼ごっこ？」"
translation = "「수, 술래잡기요?」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「ん？\u3000ナミエル、会長、なんでそんな意外そうな顔をしているのだ？」"
translation = "「응? 나미엘, 회장, 왜 그렇게 의외라는 표정을 짓는 것이다?」"

[[dialogue]]
speaker = "unk"
original = "附属生でも鬼ごっこはあまりしないかな……"
translation = "부속생이라도 술래잡기는 잘 안 할지도……."

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「えっ、そうなのか！？」"
translation = "「에엣, 그런 것인가!?」"

[[dialogue]]
speaker = "ナミエル"
original = "「は、はい。特に今時だとは……かなり小さな子がする遊びかと……」"
translation = "「하, 네. 특히 요즘 시대에는…… 꽤 어린아이가 하는 놀이라고 할까……」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「むむ……そうなのか。学生になったら体験できるかもと思っていたのだが、残念なのだ……」"
translation = "「무무…… 그런 것인가. 학생이 되면 체험할 수 있을지도 모른다고 생각했는데 아쉬운 것이다……」"

[[dialogue]]
speaker = "unk"
original = "しゅんとした顔をするアルモたん。俺はそれを見て――"
translation = "시무룩한 표정을 짓는 알모땅. 나는 그것을 보고──"

[[dialogue]]
speaker = "unk"
original = "やろっか、鬼ごっこ"
translation = "하자, 술래잡기."

[[dialogue]]
speaker = "ナミエル"
original = "「えっ？」"
translation = "「엣?」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「会長……？」"
translation = "「회장……?」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「――アルモたんと遊んでくれるのか？\u3000えへへ♪」"
translation = "「──알모땅이랑 놀아주는 것인가? 에헤헤♪」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「ありがとうなのだ、会長♪\u3000ぎゅ～っ♪」"
translation = "「고마운 것이다, 회장♪ 꽉~♪」"

[[dialogue]]
speaker = "セシア"
original = "「あ～！\u3000アルモタヘル、割り込みはダメよ。クロトママはセシアを構ってくれてたんだから」"
translation = "「아~! 아르모타헬, 끼어들면 안 돼. 쿠로토 마마는 세시아랑 놀아주고 있었단 말이야.」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「ふふ～ん♪\u3000独り占めはよくないぞ、セシア。アルモたんもたまには、会長に甘えたい時があるのだ♪」"
translation = "「후후~ㄴ♪ 독점은 좋지 않다구, 세시아. 알모땅도 가끔은 회장에게 어리광 부리고 싶을 때가 있는 것이다♪」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「あっ……えへへ♪\u3000頭撫でるのくすぐったいぞ、人の子よ♪」"
translation = "「앗…… 에헤헤♪ 머리 쓰다듬는 거 간지럽다구, 인간의 아이여♪」"

[[dialogue]]
speaker = "unk"
original = "そんなわけで、放課後――"
translation = "그런 이유로 방과 후──"

[[dialogue]]
speaker = "ナミエル"
original = "「まさか、本当に鬼ごっこをすることになるなんて……」"
translation = "「설마 정말로 술래잡기를 하게 될 줄이야……」"

[[dialogue]]
speaker = "ナミエル"
original = "「しかも――」"
translation = "「게다가──」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「よ～し、それじゃあみんなで、鬼ごっこをするのだ～！」"
translation = "「좋아, 그럼 다 같이 술래잡기를 하는 것이다~!」"

[[dialogue]]
speaker = "クラスメイト達"
original = "「お～！！！」"
translation = "「오───!!」"

[[dialogue]]
speaker = "ナミエル"
original = "「クラスの皆さまがこんなに沢山、参加したいと言い出すなんて……」"
translation = "「반 친구들이 이렇게나 많이 참여하고 싶어 할 줄이야……」"

[[dialogue]]
speaker = "セシア"
original = "「セシアもクロトママと一緒に参加するわ♪」"
translation = "「세시아도 쿠로토 마마랑 같이 참가할래♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「ふふっ、これは楽しくなりそうですね♪」"
translation = "「후훗, 이건 즐거워질 것 같네요♪」"

[[dialogue]]
speaker = "unk"
original = "こうして、賑やかな鬼ごっこが開催されることになったのだった――"
translation = "이렇게 시끌벅적한 술래잡기가 개최되게 된 것이었다──"

