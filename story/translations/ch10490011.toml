[[dialogue]]
speaker = "unk"
original = "第１話,紅い元気印,P"
translation = "제1화, 붉은 활력의 상징"

[[dialogue]]
speaker = "unk"
original = "彼女が現れたのは、星徒会長になって間もない、とある放課後のことだった──"
translation = "그녀가 나타난 것은 성도회장이 된 지 얼마 되지 않은 어느 방과 후의 일이었다──"

[[dialogue]]
speaker = "紅明"
original = "「失礼しまーす！！！\u3000星徒会に元気のお届けものでーす！！！」"
translation = "「실례함다!!! 성도회에 활력을 배달하러 왔슴다!!!」"

[[dialogue]]
speaker = "unk"
original = "うわっ！？\u3000声デッカ！？"
translation = "우왓!? 목소리 엄청 커!?"

[[dialogue]]
speaker = "紅明"
original = "「ありゃりゃ？\u3000やっちまったぜ☆\u3000アタシ、声デカいってよく注意されるんだよね～。メンゴメンゴ」"
translation = "「어라라? 사고 쳤구만☆ 나, 목소리 크다고 자주 주의받거든~. 먄먄」"

[[dialogue]]
speaker = "アナ"
original = "「いきなり誰かと思えば、<ruby>紅明<rt>こうめい</rt></ruby>さんじゃないですか。何か星徒会にご用ですか？」"
translation = "「갑자기 누군가 했더니 코우메이 씨군요. 성도회에 무슨 용건이신가요?」"

[[dialogue]]
speaker = "紅明"
original = "「おっす♪\u3000アナっち元気～！？\u3000いや～、今日も小さく可愛い～ね☆\u3000ゲへへ、オジサンに撫でさせてくれまいか」"
translation = "「오쓰♪ 아나치 잘 지내~!? 이야~ 오늘도 작고 귀엽네☆ 게헤헤, 아저씨가 좀 쓰다듬게 해주지 않으련?」"

[[dialogue]]
speaker = "アナ"
original = "「笑い方が下品なんでノーセンキュー。お引き取り下さい」"
translation = "「웃음소리가 저질이라 노 땡큐입니다. 돌아가 주세요.」"

[[dialogue]]
speaker = "紅明"
original = "「アハハ、冗談だって～☆\u3000今日はあれよ、噂の星徒会長に営業しに来たわけよ！」"
translation = "「아하하, 농담이라구~☆ 오늘은 그거야, 소문의 성도회장한테 영업하러 온 거라구!」"

[[dialogue]]
speaker = "unk"
original = "あれ？\u3000キミの顔、どこかで見たことあるような……"
translation = "어라? 너 얼굴 어디선가 본 적 있는 것 같은데……"

[[dialogue]]
speaker = "アナ"
original = "「おそらくテレビですね。紅明さんは有名なタレントなんですよ」"
translation = "「아마 TV일 거예요. 코우메이 씨는 유명한 탤런트거든요.」"

[[dialogue]]
speaker = "紅明"
original = "「はじめまして、会長さん。アタシの名は、<ruby>牛<rt>ぎゅう</rt></ruby>紅明！\u3000新星学園２年の元気印だぜ☆」"
translation = "「처음 뵙겠슴다, 회장님. 내 이름은 규우 코우메이! 신성학원 2학년의 활력 상징이라구☆」"

[[dialogue]]
speaker = "unk"
original = "あっ、エナジードリンクのＣМでよく観る！"
translation = "앗, 에너지 드링크 CM에서 자주 봤어!"

[[dialogue]]
speaker = "紅明"
original = "「そうそう、それよ！\u3000エナジー牛乳『ホルスタミン』のＣМな！」"
translation = "「맞아 맞아, 그거야! 에너지 우유 『홀스타민』 CM 말이지!」"

[[dialogue]]
speaker = "紅明"
original = "「なに、この間のバラエティー番組も観た？\u3000お～、面白かったなら良かったぜ！」"
translation = "「뭐야, 요전번 예능 프로그램도 봤어? 오~ 재밌었다니 다행이라구!」"

[[dialogue]]
speaker = "紅明"
original = "「アタシがタレントやってるのは、世の為人の為、皆に元気届けたいからなんでね♪」"
translation = "「내가 탤런트 하는 건 세상을 위해 사람을 위해, 모두에게 활력을 전하고 싶어서니까 말야♪」"

[[dialogue]]
speaker = "紅明"
original = "「アタシ、元々はグラビアアイドルとしてスカウトされて、ノリで仕事やってたんよ。でも、ある時テレビ出演したら、ありがたいことに人気が出てさ～」"
translation = "「나, 원래는 그라비아 아이돌로 스카우트돼서 얼떨결에 일을 시작했거든. 근데 어느 날 TV 출연했더니 고맙게도 인기가 터져서 말야~」"

[[dialogue]]
speaker = "アナ"
original = "「紅明さんは、さっき会長が言っていた、『ホルスタミン』のイメージキャラクターも務めています」"
translation = "「코우메이 씨는 아까 회장이 말했던 『홀스타민』의 이미지 캐릭터도 맡고 있습니다.」"

[[dialogue]]
speaker = "アナ"
original = "「そのテレビＣМに出演したことで、ＳＮＳで話題となり、ブレイクしたというわけですね」"
translation = "「그 TV CM에 출연한 것으로 SNS에서 화제가 되어 브레이크했다는 것이군요.」"

[[dialogue]]
speaker = "紅明"
original = "「そこからタレントとして仕事が増えて行って、今に至るって感じかな」"
translation = "「거기서부터 탤런트로서 일이 늘어나서 지금에 이르렀다는 느낌일까나.」"

[[dialogue]]
speaker = "紅明"
original = "「ちなみに牛家は見ての通りの魔族だが、アタシの実家は人間界にあってな？\u3000乳製品を取り扱う『善哉乳業』って会社を経営してんのさ！」"
translation = "「참고로 우시 가문은 보다시피 마족이지만, 내 본가는 인간계에 있거든? 유제품을 취급하는 『젠자이 유업』이라는 회사를 경영하고 있다구!」"

[[dialogue]]
speaker = "紅明"
original = "「実はホルスタミンってのも、そこで作ってるエナジードリンクなんだよね！」"
translation = "「사실 홀스타민이라는 것도 거기서 만드는 에너지 드링크거든!」"

[[dialogue]]
speaker = "unk"
original = "善哉乳業って乳製品の最大手メーカーじゃないか！"
translation = "젠자이 유업이라면 유제품 최대 기업 아니야!"

[[dialogue]]
speaker = "紅明"
original = "「そうなのよ。だから、善哉乳業がタレント活動のネームバリューにもなってるし、タレント活動が実家の宣伝にもなってるんで、超ラッキーって感じ☆」"
translation = "「그렇다구. 그래서 젠자이 유업이 탤런트 활동의 네임밸류가 되기도 하고, 탤런트 활동이 본가 홍보도 되니까 완전 럭키라는 느낌☆」"

[[dialogue]]
speaker = "紅明"
original = "「そんなわけで、先程から話題に上がっていたエナジー牛乳、ホルスタミンがこちらです！\u3000はい、ドーン！！！」"
translation = "「그런 고로 아까부터 화제에 올랐던 에너지 우유, 홀스타민이 여기 있슴다! 자, 똬당!!」"

[[dialogue]]
speaker = "unk"
original = "うわっ！？\u3000まさかの１ケース！？"
translation = "우왓!? 설마 한 박스!?"

[[dialogue]]
speaker = "紅明"
original = "「体力回復に効果抜群、しかも健康に害は無く、なんと医療でも使われる、善哉乳業最大のロングセラー商品、２４個入りだぜ☆」"
translation = "「체력 회복에 효과 만점, 게다가 건강에 해는 없고 무려 의료용으로도 쓰이는 젠자이 유업 최대의 스테디셀러 상품, 24개입이라구☆」"

[[dialogue]]
speaker = "紅明"
original = "「今日はアタシとこのホルスタミンを星徒会に売り込む為に来たんで、これは仕事の合間にでも飲んで下さいな！」"
translation = "「오늘은 나랑 이 홀스타민을 성도회에 홍보하러 온 거니까, 이건 일하는 틈틈이 마셔 달라구!」"

[[dialogue]]
speaker = "アナ"
original = "「おー、ホルスタミンは私も愛用している逸品。せっかくですし、１本いただきます。ごくっ……ごくごく……」"
translation = "「오ー, 홀스타민은 저도 애용하는 일품. 기왕 주신 거니 한 병 마시겠습니다. 꿀꺽…… 꿀꺽꿀꺽……」"

[[dialogue]]
speaker = "unk"
original = "ありがとう。これからよろしくな、紅明"
translation = "고마워. 앞으로 잘 부탁해, 코우메이."

[[dialogue]]
speaker = "紅明"
original = "「いやいや！\u3000こちらこそ末永くよろしくだぜ、<b>ダーリン</b>♪」"
translation = "「아니 아니! 이쪽이야말로 오래오래 잘 부탁한다구, <b>달링</b>♪」"

[[dialogue]]
speaker = "アナ"
original = "「ブフォッ！？」"
translation = "「푸훕!?」"

[[dialogue]]
speaker = "unk"
original = "だ、ダーリン！？"
translation = "다, 달링!?"

[[dialogue]]
speaker = "アナ"
original = "「ごほっ……ごほごほっ……！\u3000む、むせました……！」"
translation = "「커헉…… 쿨럭쿨럭……! 사, 사레들렸어요……!」"

[[dialogue]]
speaker = "紅明"
original = "「いや～、御前試合を観てた時からそんな気がしてたんだけど、実際に会ったら確信したよね！」"
translation = "「이랴~, 어전 시합을 봤을 때부터 그런 느낌이 들었는데, 실제로 만나니까 확신이 서네!」"

[[dialogue]]
speaker = "紅明"
original = "「やっべ！\u3000会長さんマジ、ダーリンじゃんって！！！」"
translation = "「대박! 회장님 진심, 달링이잖아!!!」"

[[dialogue]]
speaker = "unk"
original = "いや、どういうこと！？"
translation = "아니, 그게 무슨 소리야!?"

[[dialogue]]
speaker = "紅明"
original = "「おっとアカン、もうこんな時間か。実は今日この後、バラエティー番組の収録あんだよね！\u3000ダッシュで行かないと！」"
translation = "「앗차 이런, 벌써 시간이 이렇게 됐나. 사실 오늘 이 다음에 버라이어티 프로그램 수록이 있거든! 후다닥 가야 해!」"

[[dialogue]]
speaker = "紅明"
original = "「じゃあダーリン、また会いに来るから♪\u3000アデュー☆」"
translation = "「그럼 달링, 또 만나러 올게♪ 아듀☆」"

[[dialogue]]
speaker = "アナ"
original = "「これは……前会長に報告ですね（ジト目）」"
translation = "「이건…… 전 회장님께 보고해야겠네요 (곁눈질)」"

[[dialogue]]
speaker = "unk"
original = "俺にもよくわかんないんだって！"
translation = "나도 잘 모르는 일이라니까!"

[[dialogue]]
speaker = "unk"
original = "待って、違う！"
translation = "잠깐만, 아니야!"

[[dialogue]]
speaker = "unk"
original = "嵐のように彼女が去った後、俺はアナに釈明する羽目になるのだった。"
translation = "폭풍처럼 그녀가 떠난 뒤, 나는 아나에게 해명해야 하는 처지가 되었다."

