[[dialogue]]
speaker = "unk"
original = "その日は休日で、俺は小さい姿に変身したヴィーナスと一緒に、デートに出かけていた。"
translation = "그날은 휴일이라 나는 어린 모습으로 변신한 비너스와 함께 데이트를 나갔다."

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「ふぅ～♪\u3000いっぱいパパと遊べて楽しかった～！」"
translation = "「후우~♪ 아빠랑 잔뜩 놀아서 즐거웠어~!」"

[[dialogue]]
speaker = "unk"
original = "今日は恋人よりも、娘として甘えたい日だったらしい。なので、俺も彼女の頭を撫でてやりながら言う。"
translation = "오늘은 연인보다는 딸로서 어리광 부리고 싶은 날이었던 모양이다. 그래서 나도 그녀의 머리를 쓰다듬어 주며 말한다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「暗くなってきたし、そろそろ帰ろうか」"
translation = "「어두워졌으니 슬슬 돌아갈까」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「え？\u3000ダメよ、パパ。せっかくのデートなんだから――」"
translation = "「에? 안 돼, 아빠. 어렵사리 온 데이트니까――」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは俺の顔を抱き寄せると、耳元でささやく。"
translation = "비너스는 내 얼굴을 끌어당기더니 귓가에 속삭인다."

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「親子デートが終わった後は、ラブホテルで恋人ラブラブデートをしなくっちゃ<emoji=heart04>」"
translation = "「부녀 데이트가 끝난 뒤에는 러브호텔에서 연인끼리 꽁냥꽁냥 데이트를 해야지<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そうして、俺たちは街のラブホテルへ移動することになり──"
translation = "그렇게 해서 우리들은 거리의 러브호텔로 이동하게 되었고──"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「ねぇ、パパ？\u3000私、今日は試してみたいことがあるの♪」"
translation = "「있지, 아빠? 나 오늘은 시험해 보고 싶은 게 있어♪」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「レミカが言っていたんだけど、エッチの時に『催眠』？\u3000を使うと、とっても気持ちいいらしくて――」"
translation = "「레미카가 말했는데, 섹스할 때 『최면』? 을 사용하면 엄청 기분 좋대서――」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「だから、リトルフォームの『ビーム銃』を使って、<b>パパが私に</b>催眠をかけて欲しいの！」"
translation = "「그러니까 리틀 폼의 『빔 건』을 사용해서, <b>아빠가</b> <b>나한테</b> 최면을 걸어 줬으면 좋겠어!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「えっ、ヴィーナスが俺にかけるんじゃなくて……！？」"
translation = "「엣, 비너스가 나한테 거는 게 아니라……!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「んんぅ……ふうぅう<emoji=heart04>\u3000はあぁぁっ<emoji=heart04>」"
translation = "「으으음…… 후우우우<emoji=heart04> 하아아아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "こうして俺は、催眠ビーム銃を使って、ヴィーナスとエッチをすることになった。"
translation = "이렇게 해서 나는, 최면 빔 건을 사용하여 비너스와 섹스를 하게 되었다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あっ……ふああぁあっ<emoji=heart04>\u3000パパ、これすごいわ<emoji=heart04>\u3000頭を撫でてもらうと、すっごく気持ちいいっ<emoji=heart04>\u3000んふうぅうっ<emoji=heart04><emoji=heart04>」"
translation = "「앗…… 후아아아앗<emoji=heart04> 아빠, 이거 굉장해<emoji=heart04> 머리를 쓰다듬어 주니까, 너무 기분 좋아<emoji=heart04> 응후우우읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "かけたのは――『ヴィーナスの頭と女性器の感覚が繋がってしまう』催眠。"
translation = "걸어버린 것은―― 『비너스의 머리와 성기의 감각이 이어져 버리는』 최면."

[[dialogue]]
speaker = "unk"
original = "後頭部を撫でると、おま○この外側を撫でられてる気分になり。つむじはクリトリス。髪の毛の分け目をなぞると、おま○この入り口をくちゅくちゅされている感覚になる。"
translation = "후두부를 쓰다듬으면 보지의 겉부분을 애무받는 기분이 되고, 정수리는 클리토리스. 가르마를 따라 훑으면 보지 입구를 구축구축 당하는 감각이 된다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（感覚転移……だっけ？\u3000動画で見た催眠術師がやってたのって、こういうことだよな？）"
translation = "（감각 전이……였나? 동영상에서 본 최면술사가 하던 게 이런 거였지?）"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あ、はあぁあぁっ……<emoji=heart04><emoji=heart04>\u3000パパぁ<emoji=heart04>\u3000つむじのところ、すごいぃ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んふぅうぅうっ<emoji=heart04>」"
translation = "「아, 하아아아아……<emoji=heart04><emoji=heart04> 아빠아<emoji=heart04> 정수리 부분, 굉장해에<emoji=heart04> 앙<emoji=heart04> 응후우우우읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は大陰唇の外側を愛撫するように、フェザータッチでヴィーナスの頭を撫でながら、指先でくりくりとつむじを刺激していく。"
translation = "나는 대음순 겉부분을 애무하듯이, 페더 터치로 비너스의 머리를 쓰다듬으면서 손가락 끝으로 굴리며 정수리를 자극해 나간다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あんっ<emoji=heart04>\u3000つむじ撫でられると、クリが感じちゃうぅ<emoji=heart04>\u3000クリトリス、ビンビンに勃起しちゃうのぉ<emoji=heart04>\u3000はぁあんっ<emoji=heart04>\u3000んんぅ<emoji=heart04>\u3000ふぅうんっ……<emoji=heart04>」"
translation = "「앙<emoji=heart04> 정수리를 쓰다듬어지니까 클리가 느껴져어<emoji=heart04> 클리토리스, 빈빈하게 발기해버려어<emoji=heart04> 하아앙<emoji=heart04> 으으음<emoji=heart04> 후우웅……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "催眠ビームの効果は絶大で、本当に頭を撫でているだけで、まだ触りもしていないヴィーナスのおま○こは、早くも大洪水だった。"
translation = "최면 빔의 효과는 절대적이라, 정말로 머리를 쓰다듬고 있을 뿐인데 아직 만지지도 않은 비너스의 보지는 벌써 대홍수였다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ちょっ、これ、催眠効きすぎてないか？\u3000１回解いた方が……」"
translation = "「잠깐, 이거 최면이 너무 잘 듣는 거 아냐? 한 번 푸는 게……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「やぁっ<emoji=heart04>\u3000このきもちぃの解いちゃヤなのぉ～<emoji=heart04>\u3000あぁあんっ<emoji=heart04>\u3000このままでいいから、パパ、もっと気持ちよくしてぇ～<emoji=heart04>」"
translation = "「싫어어<emoji=heart04> 이 기분 좋은 거 푸는 거 싫어어~<emoji=heart04> 아아앙<emoji=heart04> 이대로도 좋으니까 아빠, 더 기분 좋게 해줘어~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは自ら腰を振って、愛液でぬるぬるになったおま○こをペニスに擦り付けてくる。"
translation = "비너스는 스스로 허리를 흔들며, 애액으로 미끌미끌해진 보지를 페니스에 비벼온다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ねぇパパぁ、お願いぃ～<emoji=heart04><emoji=heart04>\u3000大丈夫だから、おち○ちん……ううん、おち○ぽっ<emoji=heart04><emoji=heart04>\u3000パパのおち○ぽ、早く挿れてぇ～<emoji=heart04><emoji=heart04>\u3000んっ<emoji=heart04>\u3000はあぁあっ<emoji=heart04>\u3000あぁあんっ<emoji=heart04>」"
translation = "「있지 아빠아, 부탁이야아~<emoji=heart04><emoji=heart04> 괜찮으니까 꼬추…… 아니, 자지이<emoji=heart04><emoji=heart04> 아빠 자지, 빨리 넣어줘어~<emoji=heart04><emoji=heart04> 응<emoji=heart04> 하아아앗<emoji=heart04> 아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「はぁあぁぁっ<emoji=heart04>\u3000ヴィーナス、もう我慢できないのぉ<emoji=heart04><emoji=heart04>\u3000おま○この奥、すごく熱くてっ<emoji=heart04>\u3000パパのおち○ぽで鎮めてもらえないと、おかしくなっちゃうよぉ<emoji=heart04><emoji=heart04>」"
translation = "「하아아아앗<emoji=heart04> 비너스, 이제 못 참겠어어<emoji=heart04><emoji=heart04> 보지 안쪽이 너무 뜨거워서어<emoji=heart04> 아빠 자지로 진정시켜 주지 않으면 이상해져 버려어<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "腰をいやらしく振りながら、淫らにおねだりしてくるヴィーナスの姿に、俺も興奮を覚えてしまう。"
translation = "허리를 야릇하게 흔들며, 음란하게 조르는 비너스의 모습에 나도 흥분을 느끼고 만다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あっ――<emoji=heart04><emoji=heart04>」"
translation = "「앗――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスがもっと気持ちよくなりたいのなら、俺としても拒否する理由はない──その、いつもより小さな膣穴に亀頭の先を当てがい、ゆっくりと腰を押し進めていく。"
translation = "비너스가 좀 더 기분 좋아지고 싶다면, 나로서도 거절할 이유는 없다── 그, 평소보다 좁은 질 구멍에 귀두 끝을 맞대고, 천천히 허리를 밀어 넣는다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふあああぁぁぁ～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000パパのおち○ぽ、入ってきたああぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아아~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 아빠 자지, 들어왔어어어어어~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「はぁああぁ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁあんっ<emoji=heart04>\u3000んあぁあっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「하아아아<emoji=heart04> 안<emoji=heart04> 앗<emoji=heart04> 하아안<emoji=heart04> 응아아앗<emoji=heart04> 후아아안<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "激しい興奮で熱い吐息を漏らすヴィーナス。腰を振りながら、そのすぐ目の前にある顔の奥、ヴィーナスの頭に手を伸ばす。"
translation = "격렬한 흥분으로 뜨거운 숨결을 내뱉는 비너스. 허리를 흔들며, 바로 눈앞에 있는 얼굴의 안쪽, 비너스의 머리로 손을 뻗는다."

[[dialogue]]
speaker = "unk"
original = "ヴィーナスの感覚は今、頭とおま○こが繋がっている。"
translation = "비너스의 감각은 지금, 머리와 보지가 연결되어 있다."

[[dialogue]]
speaker = "unk"
original = "挿入された状態で、その頭を撫でられたら、一体どんなヨガり方をするのか──"
translation = "삽입된 상태에서 그 머리를 쓰다듬어준다면, 대체 어떤 식으로 가버릴 것인가──"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「んひぃいいぃ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000頭、それ、おま○こぉっ<emoji=heart04>\u3000ふにゅぅうぅううっ<emoji=heart04>」"
translation = "「응히이이이<emoji=heart04><emoji=heart04><emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 아아앗<emoji=heart04> 머리, 그거, 보지이잇<emoji=heart04> 후뉴우우우우웃<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「はぁあんっ<emoji=heart04>\u3000すごいのぉ、パパぁ<emoji=heart04><emoji=heart04>\u3000あぁあっ<emoji=heart04>\u3000おま○こにおち○ぽ入ってる、のにぃ<emoji=heart04>\u3000そのおま○こ、パパのお手てで、くちゅくちゅされちゃってるぅぅ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하아안<emoji=heart04> 굉장해애, 아빠아<emoji=heart04><emoji=heart04> 아아앗<emoji=heart04> 보지에 자지 들어있는데에<emoji=heart04> 그 보지, 아빠 손으로 꾸물꾸물 당하고 있어어어<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「挿れてたりゃ触れないはじゅの、気持ぢぃところぉ<emoji=heart04>\u3000おち○ぽでジュリジュリされながりゃ、お手てでグチュグチュぅ<emoji=heart04><emoji=heart04>\u3000はぁあんっ<emoji=heart04>」"
translation = "「박고 이쓰면 못 만지는 고곳, 기분 조은 고옷<emoji=heart04> 자지로 쥬리쥬리 당하면서어, 손으로 구츄구츄우<emoji=heart04><emoji=heart04> 하아안<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000『頭おま○こ』、優しくスリスリするのダメぇ<emoji=heart04><emoji=heart04>\u3000あんっ<emoji=heart04>\u3000それもっと感じちゃうっ<emoji=heart04>\u3000おま○こヘコヘコしちゃうのぉ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 『머리 보지』, 살살 문지르는 거 안 돼애<emoji=heart04><emoji=heart04> 안<emoji=heart04> 그거 더 느껴버려어<emoji=heart04> 보지 헐떡거려버려어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あっ────ダメダメダメぇ、もうイクっ<emoji=heart04>\u3000イクイク、イッちゃう～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗────안 돼 안 돼 안 돼애, 이제 가아<emoji=heart04> 가 가, 가버려어어어~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あぁあんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000だめぇ<emoji=heart04>\u3000気持ちよすぎて、おま○こ止まんなくなっちゃう～～<emoji=heart04><emoji=heart04>\u3000あぁ、はぁあんっ<emoji=heart04>」"
translation = "「아아안<emoji=heart04> 안<emoji=heart04> 안 돼애<emoji=heart04> 너무 기분 좋아서, 보지 안 멈춰어어~~<emoji=heart04><emoji=heart04> 아아, 하아안<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……ちっちゃいヴィーナスがヨガってる姿、めちゃくちゃ興奮するっ」"
translation = "「윽…… 조그만 비너스가 가버리는 모습, 미친 듯이 흥분돼」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ほんとぉっ？<emoji=heart04>\u3000はぁあんっ<emoji=heart04>\u3000あぁあぁっ、じゃあもっと見てっ<emoji=heart04>\u3000もっと気持ちよくしてぇっ<emoji=heart04>\u3000んふぅうんっ<emoji=heart04>」"
translation = "「정마알?<emoji=heart04> 하아안<emoji=heart04> 아아아아앗, 그럼 더 봐줘어<emoji=heart04> 더 기분 좋게 해줘어어<emoji=heart04> 응후우우운<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「パパのサイミンで、ヴィーナスがおかしくなってるところ、たくさん見てぇ<emoji=heart04><emoji=heart04>\u3000あはぁあんっ<emoji=heart04>」"
translation = "「아빠 최면으로, 비너스가 이상해지는 거, 많이 봐줘어<emoji=heart04><emoji=heart04> 아하아안<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "淫らな顔でおねだりされて、俺ももっとエッチなヴィーナスを見たいという欲望が沸々と湧いてきてしまう。"
translation = "음란한 얼굴로 조르는 모습에, 나도 좀 더 야한 비너스를 보고 싶다는 욕망이 울컥울컥 솟아오르고 만다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「じゃあ……頭だけじゃなくて『口の中』も、おま○こにしちゃうぞ」"
translation = "「그럼…… 머리뿐만 아니라 『입안』도, 보지로 만들어버릴게」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あんっ<emoji=heart04>\u3000口の中が、おま○こに……？\u3000はぁあんっ<emoji=heart04>」"
translation = "「안<emoji=heart04> 입안이, 보지로……? 하아안<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そんなことしたらぁ、あんっ<emoji=heart04>\u3000キスしただけで、もっと気持ち、よくなっちゃう……<emoji=heart04>\u3000んあぁあんっ<emoji=heart04>」"
translation = "「그런 짓 하면어, 안<emoji=heart04> 키스한 것만으로도, 더 기분, 좋아져버려……<emoji=heart04> 응아아안<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「おま○この中に挿入されながら、今度は『口おま○こ』の気持ちいいところ、舌でぐちゅぐちゅにされちゃうな？」"
translation = "「보지 안에 삽입된 채로, 이번엔 『입 보지』의 기분 좋은 곳을, 혀로 질척질척하게 휘저어버릴까?」"

[[dialogue]]
speaker = "unk"
original = "そう言って、ベッド上に投げ出されていたビーム銃をヴィーナスに向け、俺は新たな催眠のトリガーを引いた。"
translation = "그렇게 말하며 침대 위에 던져져 있던 빔 건을 비너스에게 겨누고, 나는 새로운 최면의 트리거를 당겼다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「――あっ！？\u3000ふああぁあっ<emoji=heart04><emoji=heart04>\u3000あぁあんっ<emoji=heart04>\u3000頭の中ビビビ～～って、きてるぅぅ～～～<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふわぁあぁんっ<emoji=heart04>」"
translation = "「――앗!? 후아아아앗<emoji=heart04><emoji=heart04> 아아안<emoji=heart04> 머릿속이 찌릿찌릿~~하게, 오고 있어어어어~~~<emoji=heart04><emoji=heart04><emoji=heart04> 후와아아안<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あんっ<emoji=heart04><emoji=heart04>\u3000キスしゅるのぉ？\u3000うんっ<emoji=heart04>\u3000わかったぁ<emoji=heart04>\u3000んんぅ……はちゅっ――<emoji=heart04>」"
translation = "「안<emoji=heart04><emoji=heart04> 키슈 할 거야아? 응<emoji=heart04> 알게써어<emoji=heart04> 응응…… 하츄――<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ピストンを続けながら、今度はキスをし始めると、ヴィーナスはすぐに痙攣するようにカクカクっと腰を震わせて。"
translation = "피스톤을 계속하며 이번에는 키스를 하기 시작하자, 비너스는 곧바로 경련하듯 잘게 허리를 떨었다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「んむっ！？\u3000んんぅ～～っ<emoji=heart04><emoji=heart04>\u3000んちゅるるっ<emoji=heart04>\u3000はぁあんっ<emoji=heart04>」"
translation = "「음뭇!? 응응~~앗<emoji=heart04><emoji=heart04> 응츄루룻<emoji=heart04> 하아안<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ちゅぱっ<emoji=heart04>\u3000はあぁぁ、あぁんっ<emoji=heart04>\u3000かんじりゅ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000お口のにゃか、おま○こになってりゅぅ<emoji=heart04><emoji=heart04>」"
translation = "「츄팟<emoji=heart04> 하아아아, 아안<emoji=heart04> 느껴져어<emoji=heart04> 안<emoji=heart04> 입아니, 보지가 되어이써어어<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「はぁあぁあぁっ<emoji=heart04>\u3000パパにおま○こ舐められてりゅっ<emoji=heart04>\u3000あんっ、んちゅうぅっ<emoji=heart04>\u3000２つのおま○こ同時攻め、気持ちいいっ<emoji=heart04>」"
translation = "「하아아아아앗<emoji=heart04> 아빠한테 보지 핥아지고 이써어앗<emoji=heart04> 안, 응츄우웃<emoji=heart04> 두 개의 보지 동시 공격, 기분 좋아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「パパぁ<emoji=heart04>\u3000もっといっぱい、キスしてぇ～<emoji=heart04>\u3000んむぅっ<emoji=heart04>\u3000れるっ<emoji=heart04>\u3000んちゅるっ<emoji=heart04>\u3000ちゅうぅっ<emoji=heart04>」"
translation = "「아빠아<emoji=heart04> 더 많이, 키스해줘어~<emoji=heart04> 응무웃<emoji=heart04> 레룻<emoji=heart04> 응츄룻<emoji=heart04> 츄우웃<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「んちゅっ<emoji=heart04>\u3000れるれるっ<emoji=heart04>\u3000んちゅんっ<emoji=heart04>\u3000はぁあんっ<emoji=heart04>\u3000れろちゅっ<emoji=heart04>\u3000んむちゅっ<emoji=heart04>\u3000れるれるっ<emoji=heart04>\u3000ちゅるるるっ<emoji=heart04>\u3000はぁあん<emoji=heart04>」"
translation = "「응츄<emoji=heart04> 레루레룻<emoji=heart04> 응츄운<emoji=heart04> 하아안<emoji=heart04> 레로츄<emoji=heart04> 응무츄<emoji=heart04> 레루레룻<emoji=heart04> 츄루루룻<emoji=heart04> 하아안<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスの口内を舌で愛撫する度、繋がったままのおま○こがキュンっと反応する。"
translation = "비너스의 입안을 혀로 애무할 때마다, 연결된 채인 보지가 큥 하고 반응한다."

[[dialogue]]
speaker = "unk"
original = "舌と舌を絡め合わせれば、ただそれだけでピシャピシャっと潮が吹き出て、ヘコヘコと淫らに腰が揺れる。"
translation = "혀와 혀를 얽히게 하면, 단지 그것만으로도 찌릿찌릿하게 애액이 뿜어져 나오고, 헐떡이며 음란하게 허리가 흔들린다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ちゅぱぁっ……！<emoji=heart04>\u3000んはあぁっ<emoji=heart04>\u3000キス気持ちぃっ<emoji=heart04>\u3000キスでイッちゃってるぅぅ<emoji=heart04>\u3000はぷちゅぅっ<emoji=heart04>\u3000れりゅれりゅれりゅぅ<emoji=heart04>」"
translation = "「츄파앗……!<emoji=heart04> 응하아앗<emoji=heart04> 키스 기분 조아앗<emoji=heart04> 키스로 가버리고 이써어어어<emoji=heart04> 하푸츄우웃<emoji=heart04> 레류레류레류우우<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「くちゅるるっ<emoji=heart04>\u3000れろちゅるぅ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000れるれるれるぅ……ちゅぱっ、はあぁんっ<emoji=heart04>\u3000お口の中だけじゃにゃくて、頭の中までおま○こになっちゃうぅぅ<emoji=heart04><emoji=heart04>」"
translation = "「구츄루룻<emoji=heart04> 레로츄루우<emoji=heart04> 하아안<emoji=heart04> 레루레루레루우……츄팟, 하아아안<emoji=heart04> 입안뿐만이 아니라아, 머릿속까지 보지가 되어버려어어어<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「んあぁんっ、おま○こっ<emoji=heart04>\u3000頭おま○こにしてぇ<emoji=heart04><emoji=heart04>\u3000んちゅうぅっ<emoji=heart04>\u3000ちゅるちゅる<emoji=heart04>\u3000んはぁんっ<emoji=heart04>\u3000はぷちゅるっ<emoji=heart04>\u3000れろれろれろぉ<emoji=heart04>」"
translation = "「응아아안, 보지잇<emoji=heart04> 머리 보지로 해줘어어<emoji=heart04><emoji=heart04> 응츄우웃<emoji=heart04> 츄루츄루<emoji=heart04> 응하아안<emoji=heart04> 하푸츄루<emoji=heart04> 레로레로레로오<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ぷはぁあっ──<emoji=heart04>\u3000あぁぁっ、あんっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000またイクっ<emoji=heart04>\u3000イクイクっ<emoji=heart04>」"
translation = "「푸하아앗──<emoji=heart04> 아아아앗, 안<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 또 가아<emoji=heart04> 가 가앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「──ふわぁあああぁああ～～～っ<emoji=heart04><emoji=heart04>\u3000あっ、あっ、あっ、あぁああっ<emoji=heart04>」"
translation = "「──후와아아아아아아아아~~앗<emoji=heart04><emoji=heart04> 앗, 앗, 앗, 아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスが体全体をビクビクと震わせながら、また絶頂を迎える。"
translation = "비너스가 몸 전체를 파르르 떨며 다시 절정에 달한다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「はぁああぁんっ<emoji=heart04><emoji=heart04>\u3000あぁあっ、パパっ<emoji=heart04>\u3000パパぁっ<emoji=heart04><emoji=heart04>\u3000はあぁあんっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「하아아아아안<emoji=heart04><emoji=heart04> 아아앗, 아빠아<emoji=heart04> 아빠아앗<emoji=heart04><emoji=heart04> 하아아아안<emoji=heart04> 후아아안<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "しかし、ヴィーナスは腰を止めずに、そのまま振り続ける。"
translation = "하지만 비너스는 허리를 멈추지 않고 그대로 계속 흔든다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あんっ<emoji=heart04>\u3000全身おま○こににゃってて、気持ちぃのぉ～<emoji=heart04><emoji=heart04>\u3000あぁ、はぁあんっ<emoji=heart04>\u3000気持ちぃくて幸せぇ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「안<emoji=heart04> 전신이 보지가 되어버려서어, 기분 조아아~<emoji=heart04><emoji=heart04> 아아, 하아안<emoji=heart04> 기분 조아서 행복해에~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……どのおま○こが、いちばん気持ちいいんだっ？」"
translation = "「윽…… 어느 보지가 가장 기분 좋은 거야?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふわぁあぁっ、撫で撫でもキスも気持ちぃけどぉ<emoji=heart04>\u3000ああんっ<emoji=heart04>\u3000本物のおま○こジュボジュボが、一番きもちいぃ～～っ<emoji=heart04><emoji=heart04>\u3000ふわぁあんっ<emoji=heart04>\u3000はあぁあっ<emoji=heart04>」"
translation = "「후와아아앗, 쓰담쓰담도 키스도 기분 조치만어어<emoji=heart04> 아안<emoji=heart04> 진짜 보지 쥬보쥬보가, 제일 기분 조아아아~~앗<emoji=heart04><emoji=heart04> 후와아안<emoji=heart04> 하아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「だってだってぇ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000パパのおち○ぽ、挿れてもらってりゅからぁ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふああぁあっ<emoji=heart04>」"
translation = "「그치만 그치만어어<emoji=heart04> 하아안<emoji=heart04> 아빠 자지, 박아주고 이쓰니까아<emoji=heart04> 안<emoji=heart04> 후아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あんっ<emoji=heart04>\u3000ヴィーナスを孕ましぇてくれりゅ、パパのおち○ぽがっ<emoji=heart04>\u3000あぁあんっ<emoji=heart04>\u3000宇宙一気持ちいいのぉ<emoji=heart04><emoji=heart04>」"
translation = "「안<emoji=heart04> 비너스를 임신시켜 쥬는, 아빠 자지가앗<emoji=heart04> 아아안<emoji=heart04> 우주에서 제일 기분 조아아<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「だからパパっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000今日もヴィーナスのおま○こに――」"
translation = "「그러니까 아빠아<emoji=heart04> 하아안<emoji=heart04> 오늘도 비너스 보지에――」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「パパの精液、いっぱい出してぇ<emoji=heart04><emoji=heart04>」"
translation = "「아빠 정액, 잔뜩 내보내줘어어<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そんなおねだりに、俺も男として興奮を抑えきれず――"
translation = "그런 조름에 나도 남자로서 흥분을 억제하지 못하고──"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あぁああっ――<emoji=heart04><emoji=heart04>」"
translation = "「아아아아앗――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふああぁああああぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000孕ませおち○ぽ、きたぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아아아아아~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 임신시키는 자지, 왔다아아아~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「パパ、パパぁっ<emoji=heart04>\u3000頭撫でながらキスもっ<emoji=heart04>\u3000はぁあんっ<emoji=heart04>\u3000『頭おま○こ』撫でながら、『お口ま○こ』キスで気持ちよくしてぇ～っ<emoji=heart04><emoji=heart04>」"
translation = "「아빠, 아빠아앗<emoji=heart04> 머리 쓰다듬으면서 키스도오<emoji=heart04> 하아안<emoji=heart04> 『머리 보지』 쓰다듬으면서, 『입 보지』 키스로 기분 좋게 해줘어어~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "もはや優しく撫でる余裕もなく、俺はヴィーナスの頭を乱暴に抱きかかえながら、激しく舌を絡み合わせた。"
translation = "이제는 부드럽게 쓰다듬을 여유도 없이, 나는 비너스의 머리를 거칠게 끌어안으며 격렬하게 혀를 섞었다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「んちゅぶ！？\u3000んんぅんんぅう～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000ちゅばっ、じゅるるっ<emoji=heart04>\u3000ちゅぶぶっ、じゅるるるっ<emoji=heart04>\u3000んあぁんっ<emoji=heart04>」"
translation = "「응츄부!? 응응응응으으으~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 하아안<emoji=heart04> 츄밧, 쥬루룻<emoji=heart04> 츄부부웃, 쥬루루룻<emoji=heart04> 응아아안<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「――ぷはあぁっ<emoji=heart04>\u3000んっ、あっ、はああぁっ<emoji=heart04>\u3000頭もお口も気持ぢい゛ぃいっ<emoji=heart04><emoji=heart04>\u3000あぁあっ<emoji=heart04>\u3000気持ちぃくて、全身おま○こになっちゃうぅ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「――푸하아앗<emoji=heart04> 응, 앗, 하아아앗<emoji=heart04> 머리랑 입도 기분 조오오오앗<emoji=heart04><emoji=heart04> 아아앗<emoji=heart04> 기분 조아서, 전신이 보지가 되어버려어어~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「んちゅるるっ<emoji=heart04>\u3000はぷちゅ<emoji=heart04>\u3000はあんっ<emoji=heart04>\u3000３つのおま○こっ<emoji=heart04>\u3000頭とお口とおま○こっ<emoji=heart04><emoji=heart04>\u3000ぜんぶグチュグチュでドロドロになっちゃってりゅぅ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응츄루룻<emoji=heart04> 하푸츄<emoji=heart04> 하아안<emoji=heart04> 세 개의 보지잇<emoji=heart04> 머리랑 입이랑 보지잇<emoji=heart04><emoji=heart04> 전부 구츄구츄하고 질척질척하게 되어버려써어어<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「おま○こ気持ちいぃっ、おま○こしあわせぇっ<emoji=heart04><emoji=heart04>\u3000あああっ<emoji=heart04>\u3000全身おま○こっ<emoji=heart04>\u3000おま○こになっちゃうぅぅ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「보지 기분 조아앗, 보지 행복해애앗<emoji=heart04><emoji=heart04> 아아앗<emoji=heart04> 전신 보지잇<emoji=heart04> 보지가 되어버려어어어<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「んちゅうっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000んむっ、ちゅむっ、ちゅぶぶぶっ<emoji=heart04>\u3000んふぅんっ<emoji=heart04>\u3000じゅるるるっ、ちゅばっ、れるれるっ<emoji=heart04>\u3000はあんっ<emoji=heart04>」"
translation = "「응츄우웃<emoji=heart04> 하아안<emoji=heart04> 응뭇, 츄뭇, 츄부부부붓<emoji=heart04> 응후우운<emoji=heart04> 쥬루루룻, 츄밧, 레루레룻<emoji=heart04> 하아안<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふぅう、ちゅぷぷっ<emoji=heart04>\u3000しゅきっ<emoji=heart04>\u3000はあんっ<emoji=heart04>\u3000パパしゅきぃ<emoji=heart04><emoji=heart04>\u3000んちゅるる、れりゅれりゅれりゅぅ<emoji=heart04>\u3000くちゅるる<emoji=heart04>\u3000はふぅんっ<emoji=heart04>」"
translation = "「후우우, 츄푸풋<emoji=heart04> 조아아<emoji=heart04> 하아안<emoji=heart04> 아빠 조아아아<emoji=heart04><emoji=heart04> 응츄루루, 레류레류레류우우<emoji=heart04> 구츄루루<emoji=heart04> 하후우운<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「――ちゅばぁっ<emoji=heart04>\u3000はぁあぁ、あぁあんっ<emoji=heart04>\u3000パパぁっ、きてりゅぅ<emoji=heart04>\u3000おっきなのがっ、あんっ<emoji=heart04>\u3000ゾワゾワっておま○こから登ってくるのぉっ<emoji=heart04><emoji=heart04>」"
translation = "「――츄바앗<emoji=heart04> 하아아아, 아아안<emoji=heart04> 아빠아앗, 오고 이써어어<emoji=heart04> 커다란 게에, 안<emoji=heart04> 소름 돋으면서 보지에서 타고 올라와아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺ももうっ、イキそうだ……っ！」"
translation = "「나도 이제, 쌀 것 같아……!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「きてっ<emoji=heart04>\u3000きてきてぇっ<emoji=heart04>\u3000あぁんっ、はあんっ<emoji=heart04>\u3000パパの精液っ<emoji=heart04><emoji=heart04>\u3000中出しでイクの、大好きだからぁっ<emoji=heart04><emoji=heart04>」"
translation = "「내보내줘어<emoji=heart04> 내보내줘어어앗<emoji=heart04> 아아안, 하아안<emoji=heart04> 아빠 정액잇<emoji=heart04><emoji=heart04> 질내사정으로 가는 거, 제일 조아하니까아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふわぁああああっ<emoji=heart04>\u3000大好きなパパの精液で、ヴィーナスのこと孕ませてぇ～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あっあっあっあっ、んあああぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「후와아아아아아앗<emoji=heart04> 제일 조아하는 아빠 정액으로, 비너스 임신시켜줘어어어~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 앗앗앗앗, 응아아아아~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は昂る射精欲のまま、ヴィーナスの腰を掴んで、全力でピストンする。"
translation = "나는 치솟는 사정 욕구 그대로 비너스의 허리를 붙잡고 전력으로 피스톤질을 한다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あんっあんっあんっあんっ、はぁああぁっ<emoji=heart04><emoji=heart04>\u3000あぁっ、あっあっあっ、ふあああぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「안안안안, 하아아아앗<emoji=heart04><emoji=heart04> 아앗, 앗앗앗, 후아아아아~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「パパっ、くるっ<emoji=heart04>\u3000あっあっあっあっ、んあああぁ～～っ<emoji=heart04><emoji=heart04>\u3000気持ちいぃのくるうぅぅぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아빠아, 온다아<emoji=heart04> 앗앗앗앗, 응아아아아~~앗<emoji=heart04><emoji=heart04> 기분 조은 거 온다아아아아아~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ああ、あぁ、ああ、あぁ、あぁあっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04><emoji=heart04>\u3000ああっイクっ<emoji=heart04><emoji=heart04>\u3000イクイクイクイクぅっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아, 아아, 아아, 아아, 아아앗<emoji=heart04> 후아아안<emoji=heart04><emoji=heart04> 아앗 가아<emoji=heart04><emoji=heart04> 가 가 가 가앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くっ……出すぞ！\u3000ヴィーナスっ！！！」"
translation = "「큭…… 싼다! 비너스!!!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「きてきてきてぇっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あああっ――――<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「내보내줘 내보내줘 내보내줘어어앗<emoji=heart04><emoji=heart04><emoji=heart04> 아아앗――――<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふあぁああぁあぁ～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イックうううぅぅううぅーーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아아아아아~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 가아아아아아아아아아아아아아아아아아아앗―――――<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスの体を強く抱き寄せながら、俺は彼女のいちばん奥で、限界まで溜め込んだ射精欲をぶちまけた。"
translation = "비너스의 몸을 강하게 끌어당기며, 나는 그녀의 가장 깊은 곳에 한계까지 모아둔 사정 욕구를 쏟아부었다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「はあぁああぁんっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000パパの精液、中にどぴゅどぴゅ出てるぅうう～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하아아아아아안<emoji=heart04><emoji=heart04><emoji=heart04> 아빠 정액, 안에 도퓨도퓨 나오고 이써어어어어~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「んはぁあぁ～～っ<emoji=heart04><emoji=heart04>\u3000中出しされるの、気持ちいい～～っ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁあんっ<emoji=heart04>\u3000ふうぅ～んっ<emoji=heart04>」"
translation = "「응하아아아~~앗<emoji=heart04><emoji=heart04> 질내사정 당하는 거, 기분 조아아아~~앗<emoji=heart04><emoji=heart04> 앗<emoji=heart04> 하아아아안<emoji=heart04> 후우우~운<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あぁぁあんっ……<emoji=heart04>\u3000まだいっぱい出てる<emoji=heart04>\u3000はあぁあっ……<emoji=heart04>\u3000おま○こ温かくて、しあわせぇ<emoji=heart04>」"
translation = "「아아아아안……<emoji=heart04> 아직 잔뜩 나오고 이써어<emoji=heart04> 하아아앗……<emoji=heart04> 보지 따뜻해서, 행복해에<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そうして、長く続いた射精が終わり、俺はゆっくりと膣からペニスを引き抜く。"
translation = "그렇게 길게 이어진 사정이 끝나고, 나는 천천히 질에서 페니스를 뽑아낸다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あんっ……<emoji=heart04>\u3000はあぁ、ふうぅ……<emoji=heart04>」"
translation = "「안……<emoji=heart04> 하아아, 후우우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「催眠エッチ、すっごく気持ちよかったぁ……<emoji=heart04>」"
translation = "「최면 섹스, 정말 기분 좋았어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「えへへへへへぇ<emoji=heart04>\u3000これからはもっと、色々な催眠を試してみたくなっちゃうわね……<emoji=heart04>」"
translation = "「에헤헤헤헤헤헤<emoji=heart04> 이제부터는 좀 더, 여러 가지 최면을 시험해보고 싶어지네……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺も、すごく気持ちよかった……」"
translation = "「나도, 정말 기분 좋았어……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「よかったぁ<emoji=heart04>\u3000そうしたら――次は私が、パパに催眠ビームをかけてあげる番ね<emoji=heart04>」"
translation = "「다행이다아<emoji=heart04> 그렇다면―― 다음은 내가, 아빠한테 최면 빔을 걸어줄 차례네<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「え？」"
translation = "「어?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「はぁぁあ……<emoji=heart04>\u3000本当に、すっごく気持ちよかったから、パパも絶対試した方がいいわ<emoji=heart04>」"
translation = "「하아아아……<emoji=heart04> 정말로, 너무 기분 좋았으니까, 아빠도 꼭 해보는 게 좋아<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「いっぱい気持ちよくしてもらったから、んんぅ<emoji=heart04>\u3000今度は私が……」"
translation = "「잔뜩 기분 좋게 해줬으니까, 응응<emoji=heart04> 이번에는 내가……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「パパの頭がおかしくなっちゃうくらい、気持ち良くしてあげるわね<emoji=heart04>」"
translation = "「아빠 머리가 이상해져 버릴 정도로, 기분 좋게 해줄게<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「え、えぇっと……ヴィーナス？」"
translation = "「어, 에 그러니까…… 비너스?」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスはウキウキと無邪気な笑顔で、ビーム銃を手に取って。"
translation = "비너스는 신이 나서 천진난만한 미소로 빔 건을 손에 들고."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ちょっと待っ――」"
translation = "「잠깐 기다――」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「えいっ<emoji=heart04>\u3000催眠ゴッデスビーム♪」"
translation = "「에잇<emoji=heart04> 최면 고디스 빔♪」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ウワァーーーーッ！？<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「우와아아아아아앗!?<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そのあと俺は催眠ビームの絶大な効果を、自分の身を持って体験することになるのであった……"
translation = "그 후 나는 최면 빔의 절대적인 효과를 자신의 몸으로 직접 체험하게 되는 것이었다……"

