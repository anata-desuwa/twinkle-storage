[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「私たち『アーネスト』！\u3000求める声が聞こえれば、世界の果てであっても駆け付ける！」"
translation = "「우리는 『어니스트』! 원하는 목소리가 들린다면 세계의 끝이라도 달려간다!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ハートをガッチリ掴むと言えば、もちろん、アイドルだよね！」"
translation = "「하트를 꽉 잡는 거라고 하면, 역시 아이돌이지!」"

[[dialogue]]
speaker = "unk"
original = "２人がどうしてここに！？"
translation = "「둘이 어떻게 여기에!?」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「会長くんの困ってる声が聞こえたの！\u3000なーんてね」"
translation = "「회장군의 곤란해하는 목소리가 들렸거든! 농담이야.」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「トリシャさんとヘレナさんにお願いされたんだ。世界のピンチだったら１日限りのユニットも限定復活！\u3000さ、楽しませればいいのは、どこの誰？」"
translation = "「트리샤 씨와 헬레나 씨가 부탁했어. 세계의 위기라면 하루 한정 유닛도 한정 부활! 자, 즐겁게 해주면 되는 게 누구지?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「なんて心強い。守護天使オオヒメ様は、あの神殿の中にいます！」"
translation = "「정말 든든하네요. 수호천사 오오히메 님은 저 신전 안에 계십니다!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「りょーかいっ！\u3000行こっか、レミカちゃん！」"
translation = "「라져! 가볼까, 레미카 짱!」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「ちゃんとついてきてね、メルエル！」"
translation = "「잘 따라와야 해, 메르엘!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「『アイドルスターナイト・フィーバー！』私たちの歌を、聴っけーーーーーっ！！」"
translation = "「『아이돌 스타 나이트 피버!』 우리의 노래를, 들어라아아아아아!!」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「合いの手よろしく！\u3000みんなも盛り上げて！」"
translation = "「추임새 부탁해! 다들 분위기 띄워줘!」"

[[dialogue]]
speaker = "unk"
original = "イェーーーーーーッ！！！"
translation = "「예이이이이이이이이!!!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「最っ高！\u3000め～っちゃアッガる～っ！」"
translation = "「최고! 기분 너~무 업 되는데~!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「これがアイドルの力……！\u3000おふたりを見てるだけで、胸の奥からドキドキとワクワクが込み上げてきます……！」"
translation = "「이것이 아이돌의 힘……! 두 분을 보는 것만으로 가슴 깊은 곳에서 두근거림과 설렘이 솟구쳐 올라와요……!」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「すごいね、なんだか体が疼いてきちゃう……今なら私も──」"
translation = "「대단해, 왠지 몸이 달아오르기 시작했어…… 지금이라면 나도──♥」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ぐっ……！\u3000ヴィーナスさん、私たちもこのままでは終われませんね」"
translation = "「윽……! 비너스 씨, 우리도 이대로 끝낼 수는 없겠네요.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「当たり前じゃない。傘回しよりもっとすごい技で、オオヒメだけじゃなくて、みんなギャフンと言わせてやるんだから！」"
translation = "「당연하지. 우산 돌리기보다 훨씬 대단한 기술로 오오히메뿐만 아니라 다들 코를 납작하게 해줄 테니까!」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「ひゃー！\u3000これまで披露された芸とはレベルが違うねー！」"
translation = "「히야~! 지금까지 보여준 장기들과는 레벨이 다르네~!」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「神殿に引きこもっているオオヒメも大いに興味を示しているようです。もう少しで表に出てくるかもしれません」"
translation = "「신전에 틀어박혀 있는 오오히메도 크게 흥미를 보이는 모양입니다. 조금만 더 하면 밖으로 나올지도 모르겠군요.」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「みんなーっ！\u3000あーりがとーっ！」"
translation = "「모두들~! 고마워~!」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「会場のボルテージは高まったかな？\u3000じゃ、私たちに続いては──ワールドスケーター舞亜の登場だよ！」"
translation = "「회장의 열기는 좀 달아올랐으려나? 자, 우리 다음으로는── 월드 스케이터 마아의 등장이야!」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ありがとう、アイドルさんたち。せっかくあったまった空気だけど、氷で冷やしちゃうね」"
translation = "「고마워, 아이돌 언니들. 어렵게 데워진 분위기지만, 얼음으로 차갑게 식혀줄게♥」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「出てきたのは、金メダルのフィギュアスケート選手、柊舞亜さんー！\u3000これは勝ち確かなー！？」"
translation = "「나타난 사람은 금메달 피겨 스케이트 선수, 히이라기 마아 씨~! 이건 승리 확정 아니려나~!?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「行くよ……ふぅーっ……」"
translation = "「간다…… 후우……♥」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「舞亜さんが息を吹きかけたら、空中にスケートリンクが……！？\u3000氷の星術にはこんな使い方もあるんですね」"
translation = "「마아 씨가 숨을 내뱉으니 공중에 스케이트 링크가……!? 얼음 성술에는 이런 사용법도 있군요.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「まだ準備しただけ。私の演技はここからだよ。みんな、見てて……」"
translation = "「아직 준비만 한 거야. 내 연기는 지금부터야. 다들, 지켜봐 줘……♥」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「すごーい！\u3000……あれ？\u3000レミカちゃん、あのフリって私たちのダンスにちょっと似てない？\u3000ほら、今のとこも……」"
translation = "「대단해! ……어라? 레미카 짱, 저 동작 우리 댄스랑 좀 닮지 않았어? 봐봐, 지금 저 부분도……」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「もしかして、ちょっと見ただけの私たちのダンスを、自分の演技に取り入れてる……！？\u3000なんて記憶力と順応性……」"
translation = "「설마, 잠깐 본 것뿐인 우리 안무를 자기 연기에 도입하고 있어……!? 말도 안 되는 기억력과 순응성이네……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「伸び悩んでるなんて、ウソみたい……やっぱり舞亜のスケートは世界一です……！」"
translation = "「슬럼프라는 게 거짓말 같아요…… 역시 마아의 스케이트는 세계 제일이에요……!」"

[[dialogue]]
speaker = "unk"
original = "みんなが息を呑み、世界の命運がかかっているということすら忘れて、空を滑り、回り、飛び跳ねる舞亜の姿に見惚れていた。"
translation = "모두가 숨을 삼키고, 세계의 운명이 걸려 있다는 사실조차 잊은 채, 하늘을 미끄러지고, 회전하고, 도약하는 마아의 모습에 넋을 잃고 있었다."

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ふぅ……ありがとうございました」"
translation = "「후우…… 감사합니다♥」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「はっ……うっとりしてたら終わっちゃった……！\u3000素晴らしい演技でしたー！\u3000舞亜さんに大きな拍手ーっ！」"
translation = "「핫…… 넋 놓고 보다가 끝나버렸어……! 훌륭한 연기였습니다~! 마아 씨에게 큰 박수를~!」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「人の為しうる最高レベルの演技、そして、表現だったのではないでしょうか。まさに完璧、１０点満点です」"
translation = "「인간이 할 수 있는 최고 수준의 연기, 그리고 표현이 아니었나 싶습니다. 그야말로 완벽, 10점 만점이에요.」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「出ました、マグダレナさんも納得の１０点満点！\u3000さぁ、神殿の扉は開かれるのかー！\u3000開いてくださーい！」"
translation = "「나왔습니다, 마그달레나 씨도 납득한 10점 만점! 자, 신전의 문은 열릴 것인가~! 열려주세요~!」"

[[dialogue]]
speaker = "unk"
original = "…………あれ？"
translation = "…………어라?"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あれれ～？\u3000反応なさげ～！？」"
translation = "「어라라~? 반응이 없네~!?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ど、どうしてですか！？\u3000あれを見ても心を揺さぶられないなんて……本当に神殿の奥にオオヒメさんはいるんですか！？」"
translation = "「어, 어째서인가요!? 저걸 보고도 마음이 움직이지 않다니…… 정말 신전 깊숙한 곳에 오오히메 님이 계신 건가요!?」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「いるのは間違いありません。あれほどの演技を見ても満足しないとは、オオヒメの目がよほど肥えているのか、ただ意固地なのか……」"
translation = "「계신 건 틀림없습니다. 저 정도의 연기를 보고도 만족하지 못하다니, 오오히메의 눈이 상당히 높거나, 아니면 그저 고집을 피우고 있는 건지……」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「最高のアイドルソングに、金メダルのフィギュアスケートだよ？\u3000隠しレベルをめっちゃ超えた芸術でも満足しないんじゃ、他に打つ手なんてなくない……？」"
translation = "「최고의 아이돌 송에 금메달 피겨 스케이트라고? 장기 수준을 훨씬 초월한 예술로도 만족 못 하면, 다른 방법이 없지 않아……?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「待ちなさい！\u3000まだクロトの一発芸が残ってるわ！」"
translation = "「기다려! 아직 쿠로토의 장기가 남아있어!」"

[[dialogue]]
speaker = "unk"
original = "無理だから！\nここは一旦、退こう"
translation = "「무리니까! 일단 여기서 물러나자.」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「このままだと世界がマズいけど、あれ以上の芸をやれる人なんていないもんね……」"
translation = "「이대로라면 세계가 위험하겠지만, 저 이상의 장기를 할 수 있는 사람은 없을 테니까……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「少なくとも何の準備もなしには不可能ですね。一度引くのに賛成します」"
translation = "「적어도 아무런 준비 없이는 불가능하겠네요. 일단 물러나는 것에 찬성합니다.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「またすぐに戻ってきます、オオヒメ。その時は、もう少し素直になってくれると助かるのですが」"
translation = "「곧 다시 돌아오겠습니다, 오오히메. 그때는 조금 더 솔직해져 주시면 좋겠습니다만.」"

[[dialogue]]
speaker = "unk"
original = "マグダレナの言葉は、果たして神殿の最奥にいるオオヒメに届いたのかどうか、果たして──"
translation = "마그달레나의 말이 과연 신전 깊은 곳에 있는 오오히메에게 닿았을지 어떨지, 과연──"

