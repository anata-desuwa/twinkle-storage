[[dialogue]]
speaker = "unk"
original = "第４話,恋は先手必勝,P"
translation = "제4화, 사랑은 선제필승, P"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "（私が会長さんに抱くこの気持ちは……）"
translation = "（내가 회장님에게 품는 이 감정은……）"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "（いえ、そういうのではないんです。そういうのでは……あら？\u3000あそこの子たち……）"
translation = "（아니, 그런 게 아니에요. 그런 게…… 어라? 저기 저 아이들……）"

[[dialogue]]
speaker_original = "女学生Ａ"
speaker_translation = "여학생 A"
original = "「危なかったところに会長さんが颯爽と駆けつけてくれてさー、格好良かったー！\u3000それからすっかりファンになっちゃってー！」"
translation = "「위험했을 때 회장님이 늠름하게 달려와 줘서 말이야─, 멋있었어! 그때부터 완전히 팬이 되어버렸다니까─!」"

[[dialogue]]
speaker_original = "女学生Ｂ"
speaker_translation = "여학생 B"
original = "「わたしバレンタインチョコもあげちゃった！\u3000いっぱい抱えてたから迷惑になるかもだったけど、やっぱ我慢できなくって！」"
translation = "「나 발렌타인 초코도 줘버렸어! 잔뜩 들고 있어서 폐가 될지도 몰랐지만, 역시 참을 수가 없어서!」"

[[dialogue]]
speaker_original = "女学生Ｃ"
speaker_translation = "여학생 C"
original = "「パッと見は優しそうなのに、いざという時は凛々しくて男らしくて……やっぱり星徒会長様推せる～っ！」"
translation = "「언뜻 보기엔 상냥해 보이는데, 유사시에는 늠름하고 남자다워서…… 역시 성도회장님은 밀어줄 수밖에 없어~!」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "（会長さんの話を……やはり学園の多くの女子が会長さんに憧れの感情を抱いているみたいですね）"
translation = "（회장님 이야기를…… 역시 학원의 많은 여학생이 회장님에게 동경의 감정을 품고 있는 모양이네요）"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "（ここまでの一極集中は正直、不自然ですらあります。何故、会長さんの周りにはここまで愛が集まっているのか）"
translation = "（이 정도의 일극 집중은 솔직히, 부자연스럽기까지 합니다. 어째서, 회장님 주변에는 이토록 사랑이 모여 있는 것인가）"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "（バレンタインは過ぎ、シーズンオフではありますけど、愛の伝道師としてしっかり調査するべきですよね）"
translation = "（발렌타인은 지났고, 시즌 오프이긴 합니다만, 사랑의 전도사로서 확실히 조사해야겠지요）"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "（会長さんがこれほどまでにおモテになる根源がどこにあるのか……見極めなくては！）"
translation = "（회장님이 이 정도로 인기 있는 근원이 어디에 있는지…… 지켜봐야겠어요!）"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「じーーーーーっ……！」"
translation = "「지────────익……!」"

[[dialogue]]
speaker = "unk"
original = "最近、よく物陰から視線を感じる。"
translation = "최근, 자주 어딘가에서 시선을 느낀다."

[[dialogue]]
speaker = "unk"
original = "まるで矢のように鋭い、しかし甘さも感じさせる不思議な眼差し……"
translation = "마치 화살처럼 날카로운, 하지만 달콤함도 느껴지는 불가사의한 눈길……"

[[dialogue]]
speaker = "unk"
original = "（この視線はウルスラだな……）"
translation = "(이 시선은 우르술라구나……)"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "（確かに会長さんは可愛らしくも凛々しい顔立ちをされていますが……男性アイドルのように図抜けているわけではありません）"
translation = "(확실히 회장님은 귀여우면서도 늠름한 이목구비를 하고 계시지만…… 남자 아이돌처럼 특출난 건 아니에요)"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "（運動も人並み以上、成績も優秀みたいですね）"
translation = "(운동도 보통 이상, 성적도 우수한 모양이네요)"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "（手先も器用なんですね。これまでにいくつもバイトをされて、苦労もされている……）"
translation = "(손재주도 좋으시네요. 지금까지 여러 아르바이트를 해오며, 고생도 하셨고……)"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "（星徒会役員の皆さんや、シャロンさんやイレーナさんたちとも仲は良いみたいですが）"
translation = "(성도회 임원분들이나, 샤론 씨나 이레나 씨 일행과도 사이가 좋은 모양이지만)"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "（特定の異性──いわゆる、恋人はいらっしゃらないようですね……ホッ）"
translation = "(특정한 이성──이른바, 연인은 없으신 모양이네요…… 휴우)"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "（『ホッ』……？）"
translation = "(『휴우』……?)"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「私、会長さんに恋人がいないことに安心してしまっている……！？」"
translation = "「나, 회장님에게 연인이 없다는 사실에 안심해버리고 있어……!?」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「じーーーっ……メモメモ」"
translation = "「지이이이…… 메모메모」"

[[dialogue]]
speaker = "unk"
original = "（何かメモしてる……）"
translation = "(무언가 메모하고 있어……)"

[[dialogue]]
speaker = "unk"
original = "ウルスラの視線を感じつつ、自分も彼女が気になってしまう。"
translation = "우르술라의 시선을 느끼면서, 자신도 그녀가 신경 쓰여 버린다."

[[dialogue]]
speaker = "unk"
original = "俺が戦っている時も……"
translation = "내가 싸우고 있을 때도……"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「さすが会長さん、一般の方を庇いながら戦っていますね……」"
translation = "「역시 회장님, 일반인을 감싸며 싸우고 계시네요……」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「しかもただ守るだけでなく、優しく言葉をかけて……危機に立たされた時に『大丈夫だよ』と言われたら、ときめいてしまいます……」"
translation = "「게다가 그저 지킬 뿐만 아니라, 다정하게 말을 걸어주시고…… 위기에 처했을 때 『괜찮아』라는 말을 들으면, 설레버려요……」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「あ、私も見ているばかりではなく攻撃しなくては……」"
translation = "「아, 저도 보고만 있을 게 아니라 공격해야겠어요……」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「イーッ！」"
translation = "「이잇!」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「イ～～～ッ！？」"
translation = "「이~~~잇!?」"

[[dialogue]]
speaker = "unk"
original = "ウルスラの矢が正確にモンスターを射貫く。"
translation = "우르술라의 화살이 정확하게 몬스터를 꿰뚫는다."

[[dialogue]]
speaker = "unk"
original = "俺は気付かないふりをしつつ、周囲のモンスターを全滅させた。"
translation = "나는 눈치채지 못한 척하며, 주위의 몬스터를 전멸시켰다."

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「ああ、いつの間にか会長さんのことばかり見ています……」"
translation = "「아아, 어느샌가 회장님 생각만 하고 있어요……」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「でも、それがちっとも嫌ではなくて……むしろ、会長さんのことを想い浮かべるだけで切なさと多幸感で満たされて……」"
translation = "「하지만, 그게 조금도 싫지 않아서…… 오히려, 회장님을 떠올리는 것만으로 애절함과 다행감으로 가득 차서……」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「私、会長さんを、本当に好きになってしまったのでしょうか……！？\u3000そんなの……サランさんやヒルディオーネさんが言っていた通りではないですか……！」"
translation = "「저, 회장님을, 정말로 좋아하게 되어버린 걸까요……!? 그런 건…… 사란 씨나 힐디오네 씨가 말했던 대로지 않나요……!」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「これが人を好きになるということ……！？」"
translation = "「이게 사람을 좋아하게 된다는 것……!?」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「一週間ほど会長さんを見てきましたが、特定の恋人はいらっしゃらないようですし……これはもしかして、チャンス、なのでは……！？」"
translation = "「일주일 정도 회장님을 지켜봐 왔지만, 딱히 연인은 없으신 것 같고…… 이건 어쩌면, 기회, 인 게……!?」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「ウルスラ……ウルスラ・バレンタイン……あなたのポリシーは何ですか？」"
translation = "「우르술라…… 우르술라 발렌타인…… 당신의 신조는 무엇인가요?」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「そう、『命短し恋せよ乙女』！\u3000私だって１人の等身大の乙女なのですから！」"
translation = "「그래, 『인생은 짧으니 사랑을 하라 소녀여』! 저도 한 명의 평범한 소녀이니까요!」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「もしこの恋に破れて、会長さんがダメだったとしても、次の恋に──」"
translation = "「만약 이 사랑에 패해서, 회장님이 안 된다고 해도, 다음 사랑에──」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「──そんなのイヤっ！\u3000絶対にイヤです……っ！」"
translation = "「──그런 건 싫어! 절대로 싫어요……!」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「会長さんしか、会長さんじゃなきゃダメなんです……ああ、そうですよね……！\u3000それは私の決定的な過ちでした……！」"
translation = "「회장님뿐, 회장님이 아니면 안 돼요…… 아아, 그렇죠……! 그건 저의 결정적인 잘못이었어요……!」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「恋は七転び八起きではありませんよね」"
translation = "「사랑은 칠전팔기가 아니죠」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「この人しかいないと思うくらいでなくては、次なんて考えているようでは……その人を心から愛しているだなんて言えるはずないではないですか……！」"
translation = "「이 사람밖에 없다고 생각할 정도가 아니면, 다음 따위를 생각하고 있어서는…… 그 사람을 진심으로 사랑하고 있다고 말할 수 있을 리 없지 않나요……!」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「本当の愛も知らないのに、伝道師だの恋愛相談だの、なんて<ruby>烏滸<rt>おこ</rt></ruby>がましい……でも！」"
translation = "「진정한 사랑도 모르면서, 전도사니 연애 상담이니, 얼마나 가소로운지…… 하지만!」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「皆さんを出し抜くのは心苦しいですけど、溢れ出る想いは止められません」"
translation = "「여러분들을 앞지르는 건 마음이 아프지만, 넘쳐흐르는 마음은 멈출 수 없어요」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「恋は戦い。先手必勝なのですから」"
translation = "「사랑은 전쟁. 선수필승이니까요」"

[[dialogue]]
speaker = "unk"
original = "ある日の放課後。ウルスラが星徒会室にやってきて──"
translation = "어느 날 방과 후. 우르술라가 성도회실에 찾아와서──"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「会長さん、あなたが好きです！」"
translation = "「회장님, 당신이 좋아요!」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「私と──付き合ってください！」"
translation = "「저와── 사귀어 주세요!」"

[[dialogue]]
speaker = "unk"
original = "俺も君のことが気になっていた"
translation = "나도 네가 신경 쓰이고 있었어"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「──っ！！」"
translation = "「──윽!!」"

[[dialogue]]
speaker = "unk"
original = "恋に悩むウルスラが可愛かった"
translation = "사랑에 고민하는 우르술라가 귀여웠다."

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「そんなところを見られていたのですか！？\u3000お恥ずかしい……」"
translation = "「그런 모습을 보이고 있었던 건가요!? 부끄러워라……」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「でもあなたを射止められたのなら結果オーライ、怪我の功名です」"
translation = "「하지만 당신을 사로잡을 수 있었다면 결과 오라이, 불행 중 다행이에요」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「恥じらっている暇などありません。『命短し恋せよ乙女』──なのですから」"
translation = "「부끄러워하고 있을 틈 따위 없어요. 『인생은 짧으니 사랑을 하라 소녀여』──니까요」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「さぁ、存分に愛し合いましょう！」"
translation = "「자, 마음껏 서로 사랑해요!」"

[[dialogue]]
speaker = "unk"
original = "そして新たなカップル誕生の知らせは、新星・流星の両校に稲妻のように轟くのだった。"
translation = "그리고 새로운 커플 탄생의 소식은, 신성·유성 두 학교에 번개처럼 울려 퍼지는 것이었다."

