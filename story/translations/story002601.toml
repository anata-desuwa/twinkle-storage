[[dialogue]]
speaker = "unk"
original = "夏の時期に入ったある日のこと。"
translation = "여름 시기에 접어든 어느 날의 일."

[[dialogue]]
speaker = "unk"
original = "俺は公安委員会の案件で相談したいことがあると、リゾート結界で待ち合わせることになった。"
translation = "나는 공안위원회의 건으로 상의할 것이 있다는 연락을 받고 리조트 결계에서 만나기로 했다."

[[dialogue]]
speaker = "ネーゼマイン"
original = "「会長、お待たせ～」"
translation = "「회장, 기다렸지~」"

[[dialogue]]
speaker = "unk"
original = "背後から声を掛けられて、振り返ると――"
translation = "뒤에서 들려오는 목소리에 뒤를 돌아보니──"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「じゃじゃ～ん☆\u3000水着姿の爆弾サプラ～イズ♪」"
translation = "「쨔잔~☆ 수영복 차림의 폭탄 서프라이즈♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「にひひ♪\u3000会長、どう？」"
translation = "「니히히♪ 회장, 어때?」"

[[dialogue]]
speaker = "unk"
original = "可愛くて、すごく似合ってる"
translation = "귀엽고, 정말 잘 어울려"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ありがと～♪\u3000実はこれ、ただの水着じゃなくて戦闘服なんだよね～」"
translation = "「고마워~♪ 실은 이거, 그냥 수영복이 아니라 전투복이거든~」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「密かにリゾート結界の疑似守護星とリンクして、『水着フォーム』に覚醒したんだ☆」"
translation = "「남몰래 리조트 결계의 의사 수호성과 링크해서, 『수영복 폼』으로 각성한 거야☆」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「プライベートビーチで２人きりだし、もっとじっくり見せてあげよっか？」"
translation = "「프라이빗 비치에 둘뿐인데, 좀 더 자세히 보여줄까?」"

[[dialogue]]
speaker = "unk"
original = "公安委員会は表向きには存在していない学園組織だ。その為、今回は誰もいないプライベートビーチの方へやって来ていた。"
translation = "공안위원회는 겉으로는 존재하지 않는 학원 조직이다. 그 때문에 이번에는 아무도 없는 프라이빗 비치 쪽으로 오게 되었다."

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ほら、透け透けのミニスカートの下、見てみる？\u3000ぴらっ<emoji=heart04>」"
translation = "「봐봐, 비치는 미니스커트 아래, 한번 볼래? 펄렁❤」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「にひひ♪\u3000会長、顔が赤くなってるよ？\u3000そんな反応されると、もっと悪戯したくてムラムラしてきちゃうな～<emoji=heart04>」"
translation = "「니히히♪ 회장, 얼굴 빨개졌다? 그런 반응을 보이면, 좀 더 장난치고 싶어서 근질근질해지잖아~❤」"

[[dialogue]]
speaker = "？？？"
original = "「マインお姉ちゃん、楽しそうにしてるけど、私のこと忘れないでよ～」"
translation = "「마인 언니, 즐거워 보이지만 내 존재도 잊지 마~」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「おっと、そうだった♪」"
translation = "「오호, 그랬지♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「会長、実はこの子、公安委員会所属なんだけど、会長に会いたいって言っててさ～」"
translation = "「회장, 실은 이 아이, 공안위원회 소속인데 회장을 만나고 싶다고 해서 말이야~」"

[[dialogue]]
speaker = "リコリン"
original = "「リコリンリン♪\u3000こんにちは、会長のお兄ちゃん！\u3000流星学園附属校２年生、リコリンだよ～☆」"
translation = "「리코린린♪ 안녕하세요, 회장 오빠! 유성학원 부속교 2학년, 리코린이야~☆」"

[[dialogue]]
speaker = "unk"
original = "初めまして。よろしくね"
translation = "처음 뵙겠습니다. 잘 부탁해"

[[dialogue]]
speaker = "リコリン"
original = "「うんっ！\u3000リコリンね、マインお姉ちゃんたちからお兄ちゃんのこと聞いてて、ずっと会ってみたかったの～♪」"
translation = "「응! 리코린 말야, 마인 언니들한테 오빠 이야기 들어서 줄곧 만나보고 싶었어~♪」"

[[dialogue]]
speaker = "リコリン"
original = "「今回はリコリンも協力するから、よろしくね♪\u3000てへっ☆」"
translation = "「이번에는 리코린도 협력할 테니까 잘 부탁해♪ 테헷☆」"

[[dialogue]]
speaker = "リコリン"
original = "「と、冗談はさておき――」"
translation = "「자, 농담은 여기까지 하고──」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「初めましてだ、少年。私の名はリコリンフィアという。キミのことはマインからよく聞かされている」"
translation = "「처음 뵙겠군, 소년. 내 이름은 리코린피아라고 한다. 자네에 대해서는 마인에게 자주 들었지」"

[[dialogue]]
speaker = "unk"
original = "え！？"
translation = "에!?"

[[dialogue]]
speaker = "リコリンフィア"
original = "「驚いたか？\u3000私はこう見えて、年齢的には大人でな」"
translation = "「놀랐나? 나는 이래 봬도 연령상으로는 성인이라서 말이지」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「組織での役職は『公安委員会本部長』――簡潔に言えば、公安委員会のエージェント達のリーダーを務めている」"
translation = "「조직에서의 역직은 『공안위원회 본부장』── 간결하게 말하면, 공안위원회의 에이전트들을 이끄는 리더를 맡고 있다」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「マイン達がいつも世話になっているな。ここまで公安委員会の秘密を守りながら何度も協力してくれて、感謝している」"
translation = "「마인 일행이 언제나 신세를 지고 있군. 지금까지 공안위원회의 비밀을 지키며 몇 번이나 협력해준 점, 감사하고 있다」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「今回、キミに会いたかったのは、１度挨拶をしておきたかったこともあるが――」"
translation = "「이번에 자네를 만나고 싶었던 것은, 한번 인사를 해두고 싶었던 점도 있지만──」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「公安委員会として、キミに協力を依頼したくてな」"
translation = "「공안위원회로서, 자네에게 협력을 의뢰하고 싶어서다」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「間もなく、もう１人の協力者がここに来る。揃ったら説明を……と、ちょうどいいタイミングで着いたようだ」"
translation = "「곧 또 한 명의 협력자가 이곳에 올 거다. 모이면 설명을…… 오, 마침 좋은 타이밍에 도착한 모양이군」"

[[dialogue]]
speaker = "リノ"
original = "「ク～ロ～ト♪」"
translation = "「쿠~로~토♪」"

[[dialogue]]
speaker = "unk"
original = "母さん！？"
translation = "엄마!?"

[[dialogue]]
speaker = "リノ"
original = "「ふふっ、驚いた？\u3000お母さんも今回、一緒に頑張っちゃうわよ～♪」"
translation = "「후훗, 놀랐니? 엄마도 이번에 같이 힘내볼 거야~♪」"

[[dialogue]]
speaker = "unk"
original = "俺の母さん――緋宮リノは、水着姿で元気な笑顔を浮かべて見せるのだった。"
translation = "내 어머니── 히노미야 리노는, 수영복 차림으로 활기찬 미소를 지어 보였다."

