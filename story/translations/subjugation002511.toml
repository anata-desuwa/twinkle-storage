[[dialogue]]
speaker = "unk"
original = "その仮想空間は、以前のオペレーション・ペンタグラムで訪れたことのある、魔界の神殿であった――"
translation = "그 가상 공간은 이전 오퍼레이션 펜타그램에서 방문한 적이 있는 마계의 신전이었다――"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あっ！\u3000会長く～ん、こっちこっち～！\u3000一緒の場所なんて合縁奇縁だし♪」"
translation = "「앗! 회장군~, 여기 여기~! 같은 장소라니 합연기연이네♪」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「こんにちは、会長さん。私も輝く星に挑戦しに来たよ」"
translation = "「안녕하세요, 회장님. 저도 빛나는 별에 도전하러 왔어요」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「お疲れ様です。フィオナ会長のところへ挑みに来たんですね」"
translation = "「수고하십니다. 피오나 회장님이 계신 곳에 도전하러 오셨군요」"

[[dialogue]]
speaker = "unk"
original = "ああ。同じ会長として１度戦ってみたくて"
translation = "「아아. 같은 회장으로서 한번 싸워보고 싶어서」"

[[dialogue]]
speaker = "unk"
original = "そう、俺がやって来たのは流星学園最強の星徒会長、フィオナのシャドウと戦う為の仮想空間だった。"
translation = "그래, 내가 찾아온 곳은 유성학원 최강의 성도회장, 피오나의 섀도와 싸우기 위한 가상 공간이었다."

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「くふふっ、会長さん、全力が出せないって聞きましたけど、大丈夫なんですか～？」"
translation = "「크후훗, 회장군, 전력을 다할 수 없다고 들었는데 괜찮은 건가요~?」"

[[dialogue]]
speaker = "unk"
original = "と、ウズメの後ろからひょっこりと現れたのは、以前バレンタインの時にウズメと仲良くなった附属生のシャルレーヌ。"
translation = "하고 우즈메의 뒤에서 슥 나타난 것은 예전 발렌타인 때 우즈메와 친해진 부속생 샤를레느."

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「コテンパンにやられちゃうかもしれないのに、わざわざ戦いに来るなんて、本当にマゾなんですから～<emoji=heart04>」"
translation = "「처참하게 깨져버릴지도 모르는데 일부러 싸우러 오다니, 정말 마조라니까요~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "あれ？\u3000シャルレーヌ、素の性格が出て……"
translation = "어라? 샤를레느, 본래 성격이 나오고 있는데……"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「実は、それにはちょっと事情があって～」"
translation = "「사실 거기엔 좀 사정이 있어서~」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「バレンタインの後、ウズメイア先輩と話していたら、ソフィア先輩と舞亜先輩にその現場を見られちゃったんですよ」"
translation = "「발렌타인 이후에 우즈메이야 선배랑 이야기하고 있었더니 소피아 선배랑 마이아 선배한테 그 현장을 들켜버렸거든요」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「周りに気付かないくらい、シャルレーヌちゃんと夢中で話し込んじゃってたんだよね～」"
translation = "「주변을 눈치채지 못할 정도로 샤를레느 짱이랑 정신없이 대화하고 있었거든~」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「それで……ソフィア先輩も舞亜先輩も、ウズメイア先輩みたいに全然動じなくて」"
translation = "「그래서…… 소피아 선배도 마이아 선배도 우즈메이야 선배처럼 전혀 동요하지 않으셔서」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「なので、知られちゃった以上は隠していても仕方ないし、もう開き直って素の方でやらせてもらってる感じです」"
translation = "「그러니까 들킨 이상 숨겨도 소용없고, 그냥 자포자기하고 본모습으로 하게 된 느낌이에요」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「私はこっちのシャルちゃんの方が可愛いと思うよ？\u3000ほら、綺麗な薔薇にはトゲがあるっていうし」"
translation = "「난 이쪽의 샤를 짱이 더 귀엽다고 생각해? 봐, 아름다운 장미에는 가시가 있다고 하잖아」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「それ、褒めてます……？」"
translation = "「그거 칭찬인가요……?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「私は舞亜にウズメ、姉さんと周りがマイペースなヒトだらけなんで、シャルさんはむしろ気遣いのできる、いい後輩だと思ってますよ」"
translation = "「저는 마이아에 우즈메, 언니까지 주변이 마이페이스인 사람들뿐이라 샤를 씨는 오히려 배려심 있는 좋은 후배라고 생각하고 있어요」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「ソフィア先輩、ありがとうございます～♪\u3000優しくて大好き～<emoji=heart04>」"
translation = "「소피아 선배, 감사합니다~♪ 상냥해서 정말 좋아~<emoji=heart04>」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ふふふ、私は後輩にホットな先輩なので」"
translation = "「후후후, 저는 후배에게 핫한 선배니까요.」"

[[dialogue]]
speaker = "unk"
original = "なんか懐柔されてない……？"
translation = "왠지 회유당하고 있는 거 아냐……?"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「親しい後輩ができて、ソフィー、張り切っているみたい。まぁ、シャルちゃんは悪い子ではなさそうだから、大丈夫じゃないかな？」"
translation = "「친한 후배가 생겨서 소피, 아주 신이 난 모양이야. 뭐, 샤를 짱은 나쁜 아이 같지는 않으니까 괜찮지 않을까?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あ、それと、トリシャさんたちも来てるんだよ！\u3000ほら、あそこ！」"
translation = "「아, 그리고 트리샤 씨 일행도 와 있어! 봐, 저기!」"

[[dialogue]]
speaker = "unk"
original = "ウズメが視線をやった方を見やると、そこにはトリシャさんがヒトリに声をかけているところだった。"
translation = "우즈메가 시선을 준 쪽을 바라보니, 그곳에는 트리샤 씨가 히토리에게 말을 걸고 있는 참이었다."

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「あの……不知火ヒトリさん、ですよね？\u3000これ……お近づきの印にお菓子をどうぞ」"
translation = "「저기…… 시라누이 히토리 씨, 맞으시죠? 이거…… 친해지고 싶다는 의미로 과자를 드릴게요.」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ひゃうっ」"
translation = "「히얏.」"

[[dialogue]]
speaker = "unk"
original = "ヒトリは人見知りを発動して、背後の棺桶の中に隠れてしまう。"
translation = "히토리는 낯가림이 발동해 배후의 관 속에 숨어버린다."

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ごっ、ごめんなさい……！\u3000脅かすつもりは、なかったのですが……」"
translation = "「죄, 죄송해요……! 놀라게 할 생각은 없었습니다만……」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ゆ～ん……」"
translation = "「유~운……」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ヒトリは相変わらず生きてる<b>ヒト</b>を怖がってて、よくわかんない奴なの。おばけは全然怖がらないのに」"
translation = "「히토리는 여전히 살아있는 <b>사람</b>을 무서워해서, 정말 알 수 없는 녀석이라유. 유령은 전혀 무서워하지 않으면서.」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「仕方ないから、そのお菓子は<ruby>余<rt>ゆ</rt></ruby>が食べてあげゆ！」"
translation = "「어쩔 수 없으니 그 과자는 유가 먹어줄게유!」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「え？\u3000はい、どうぞ……この日の為に、お菓子は沢山用意してきてあるので」"
translation = "「엣? 네, 여기요…… 이 날을 위해 과자를 잔뜩 준비해 왔으니까요.」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「そうなの？\u3000なんだかハロウィンみたいだゆ♪」"
translation = "「정말유? 왠지 할로윈 같다유♪」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「はい。お友達を増やすのに、いい機会だと思いまして……」"
translation = "「네. 친구를 사귀기에 좋은 기회라고 생각해서……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「お菓子をきっかけにして……友達になることができたらと」"
translation = "「과자를 계기로…… 친구가 될 수 있다면 좋겠다고.」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「お前、なかなかよくわかってるの。お菓子をくれるなら、余が友達になってあげてもいいゆ♪」"
translation = "「너, 제법 말이 통하는구나유. 과자를 준다면 유가 친구가 되어줘도 좋다유♪」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「本当ですか？\u3000なら、ジャクリーヌさん、是非どうぞ……！」"
translation = "「정말인가요? 그럼 자클린 씨, 부디 드세요……!」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ふ、ふへへ、やった……♪\u3000また友達が増えました……」"
translation = "「후, 후헤헤, 해냈다……♪ 또 친구가 늘었어요……」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「お菓子、いただきますなの！\u3000あ～ん♪\u3000ぱくっ――もぐもぐ♪\u3000……んぐっ！？」"
translation = "「과자, 잘 먹겠다유! 아~앙♪ 냠―― 우물우물♪ ……읍!?」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ゆおおおぉーーーっ！？」"
translation = "「유오오오오ーーー앗!?」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「このお菓子、すごく美味しいゆ！！！\u3000これを食べないとか、むしろお菓子に失礼なの！\u3000トリシャ、余にもっと寄越すゆ！」"
translation = "「이 과자, 엄청 맛있다유!!! 이걸 안 먹다니, 오히려 과자한테 실례라유! 트리샤, 유에게 더 내놓으라유!」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「は、はい。沢山ありますので、どうぞ……」"
translation = "「네, 네. 많이 있으니까 드세요……」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ほら、ヒトリもずっと棺桶に引きこもってないで、さっさと出て来るの！」"
translation = "「봐, 히토리도 계속 관 속에 틀어박혀 있지 말고 어서 나오라유!」"

[[dialogue]]
speaker = "unk"
original = "ジャクリーヌは棺桶に体をすり抜けさせて、中からヒトリも同じくすり抜けさせながら、力技で引っ張り出す。"
translation = "자클린은 관 속으로 몸을 투과시켜서, 안에서 히토리도 마찬가지로 투과시키며 힘으로 끌어낸다."

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「じゃ、ジャクリーヌさん、そのすり抜け能力は反則です……！」"
translation = "「자, 자클린 씨, 그 투과 능력은 반칙이에요……!」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「いいから、このお菓子を早く食べてみるの！\u3000ほら、口開けゆ！」"
translation = "「됐으니까 이 과자 얼른 먹어보라유! 자, 입 벌려유!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「わ、わかりました。あ～ん……」"
translation = "「아, 알겠어요. 아~앙……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「あむっ……もぐもぐ……んっ！？\u3000お、美味しいです、すごく……！」"
translation = "「아암…… 우물우물…… 응!? 마, 맛있어요, 엄청……!」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「本当ですか？\u3000良かった……」"
translation = "「정말인가요? 다행이다……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「あ、あの……」"
translation = "「저, 저기……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「トリシャさん、さっきは隠れてしまってごめんなさい……。私、ヒトと話す時、すごく緊張してしまって……」"
translation = "「트리샤 씨, 아까는 숨어버려서 죄송해요……. 저, 사람이랑 말할 때 너무 긴장해 버려서……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「いえ、気持ちはわかりますので……ですが、よろしければ、ヒトリさんと、それに……<b>ゆーさん</b>とも友達になれたらと」"
translation = "「아뇨, 기분은 이해하니까요…… 하지만 괜찮으시다면 히토리 씨랑, 그리고…… <b>유짱</b>이랑도 친구가 될 수 있다면 좋겠어요.」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「えっ、ゆーちゃんのことが見えるんですか！？」"
translation = "「엣, 유짱이 보이는 건가요!?」"

[[dialogue]]
speaker_original = "ゆーちゃん"
speaker_translation = "유짱"
original = "「ゆー！」"
translation = "「유-!」"

[[dialogue]]
speaker = "unk"
original = "ヒトリといつも一緒にいる幽霊のゆーちゃんが驚いたように声を上げる。"
translation = "히토리와 언제나 함께 있는 유령인 유짱이 놀란 듯 소리를 높인다."

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「はい。私は守護星との繋がりを見ることができるので……へびつかい座β星のケバルライ。ゆーさんもヒトリさんと同じ守護星に繋がっているのですね」"
translation = "「네. 저는 수호성과의 연결을 볼 수 있어서…… 뱀주인자리 β성 케발라이. 유짱도 히토리 씨와 같은 수호성에 연결되어 있군요.」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「すごい……！\u3000そのことに気づいたのは、トリシャさんが初めてです」"
translation = "「대단해……! 그걸 알아차린 건 트리샤 씨가 처음이에요.」"

[[dialogue]]
speaker = "unk"
original = "と、２人の会話が弾みそうになったところで――"
translation = "그렇게 두 사람의 대화가 무르익으려던 찰나――"

[[dialogue]]
speaker_original = "シャドウフィオナ"
speaker_translation = "섀도우 피오나"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あっ！\u3000シャドウが現れたし！」"
translation = "「앗! 섀도우가 나타났다구!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「フィオナ会長の魔王フォーム、いざ相手として対峙すると、凄まじい力を感じて、圧倒されますね……」"
translation = "「피오나 회장님의 마왕 폼, 막상 상대로 마주하니 엄청난 힘이 느껴져서 압도당하네요……」"

[[dialogue]]
speaker = "unk"
original = "みんなの力を貸して欲しい"
translation = "모두의 힘을 빌려줬으면 해."

[[dialogue]]
speaker = "unk"
original = "だけど、挑戦するなら勝ちたい"
translation = "하지만 도전한다면 이기고 싶어."

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「は、はい。私ももっと強くなりたいとここへ来たので……微力ながらお手伝いしますっ」"
translation = "「네, 네. 저도 더 강해지고 싶어서 여기 온 거라…… 미력하나마 돕겠습니다.」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「仕方ないですね～。その代わり、後でたっぷりお礼を期待してますからね、会長さん？\u3000くふふっ♪」"
translation = "「어쩔 수 없네요~. 그 대신 나중에 듬뿍 보답을 기대할 테니까요, 회장님? 크후훗♪」"

[[dialogue]]
speaker = "unk"
original = "そうして、俺はみんなと一緒に、フィオナのシャドウへ挑戦を開始するのだった――"
translation = "그렇게 나는 모두와 함께 피오나의 섀도우에게 도전을 시작했다――"

