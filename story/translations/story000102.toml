[[dialogue]]
speaker = "ヒルディオーネ"
original = "「フニ、そろそろ気分は落ち着きまして？」"
translation = "「후니, 이제 기분은 좀 진정되셨나요?」"

[[dialogue]]
speaker = "フェニエル"
original = "「は、はい……。申し訳ありません、お姉様。『イルソーレ』の新人として、恥ずかしい姿をさらしてしまいました……」"
translation = "「네, 네……. 죄송합니다, 언니분. 『일 소레』의 신입으로서 부끄러운 모습을 보이고 말았습니다……」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ええ、ええ、そうですとも。フェニエル、あなたは誇り高き『イルソーレ』の一員。相手が寮長だからと言って、『ラルーナ』の者にヘコヘコする必要などありませんわ！」"
translation = "「네, 네, 그렇고말고요. 페니엘, 당신은 긍지 높은 『일 소레』의 일원. 상대가 기숙사장이라고 해서 『라 루나』 사람에게 굽실거릴 필요 따윈 없답니다!」"

[[dialogue]]
speaker = "フェニエル"
original = "「わ、わかりましたっ。……ただ、『イルソーレ』と『ラルーナ』は競い合うライバルだと聞いています。寮長であるマハムート先輩には、ちゃんと敬意を表したい、です」"
translation = "「아, 알겠습니다. ……다만 『일 소레』와 『라 루나』는 서로 경쟁하는 라이벌이라고 들었습니다. 기숙사장인 마하무트 선배님께는 제대로 경의를 표하고 싶어요.」"

[[dialogue]]
speaker = "マハムート"
original = "「ふっ、マムでいいわ。みんな私のことは、畏怖を持ってそう呼ぶから。……あなたのことは、フニでいいのかしら、不死鳥の天使さん？」"
translation = "「훗, 마무라고 불러도 좋아. 다들 나를 경외를 담아 그렇게 부르니까. ……네 이름은 후니라고 하면 될까, 불사조 천사 양?」"

[[dialogue]]
speaker = "フェニエル"
original = "「イ、イエス、マムっ」"
translation = "「이, 이예스, 마무!」"

[[dialogue]]
speaker = "マハムート"
original = "「ふふっ。素直で可愛い転入生ね。あなたにはもったいないくらいだわ、隣のドリルロールさん？」"
translation = "「후훗. 솔직하고 귀여운 전입생이네. 너한테는 아까울 정도의 인재야, 옆에 있는 드릴 롤 씨?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「それを言ったら、同じ転入生である緋宮会長も、あなたの手に余る逸材でしてよ、リトルマム」"
translation = "「그걸 따지자면 똑같이 전입생인 히노미야 회장도 당신에겐 과분한 일품이라구요, 리틀 마무.」"

[[dialogue]]
speaker = "フェニエル"
original = "「はわわわっ……お姉様とマムが、私のせいで喧嘩を……！？」"
translation = "「하와와와…… 언니분과 마무가 저 때문에 싸움을……!?」"

[[dialogue]]
speaker = "unk"
original = "大丈夫、２人の喧嘩は挨拶みたいなものだから"
translation = "괜찮아, 두 사람의 싸움은 인사 같은 거니까"

[[dialogue]]
speaker = "フェニエル"
original = "「ぴぃ！？\u3000それってどんな関係なんですかぁ。ぜ、全然わかんないですぅ……っ」"
translation = "「피익!? 그게 도대체 어떤 관계인가요. 처, 전혀 모르겠어요오……」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ふっ、どうやら『学園対抗杯』の月次報告書をまとめていたようですけれど、その成果を見ればどちらがより優れた寮長であるかは一目瞭然……」"
translation = "「훗, 보아하니 『학원 대항배』의 월간 보고서를 정리하고 있었던 모양입니다만, 그 성과를 보면 누가 더 뛰어난 기숙사장인지는 일목요연……」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「今月も月間成績では流星学園の圧勝……！\u3000ライバル校として新設された新星学園とはいえ、伝統ある流星には手も足も出ないってことじゃなくて？」"
translation = "「이번 달도 월간 성적에서는 유성학원의 압승……! 라이벌 학교로 신설된 신성학원이라곤 해도 전통 있는 유성에는 속수무책이라는 소리 아닌가요?」"

[[dialogue]]
speaker = "マハムート"
original = "「嘘おっしゃい。確かに今月は新星側のスコアが負けているけれど、大げさに言うほどの差じゃないでしょう」"
translation = "「거짓말 마. 확실히 이번 달은 신성 쪽 스코어가 낮긴 하지만, 호들갑 떨 정도의 차이는 아니잖아.」"

[[dialogue]]
speaker = "マハムート"
original = "「そもそも、こっちは御前試合があって、新星側の星徒会長が交代してるのよ。新体制も整いきっていないのにもうこのスコアなんだから、来月が楽しみね？」"
translation = "「애초에 이쪽은 어전 시합이 있어서 신성 쪽 성도회장이 교체됐어. 신체제도 다 갖춰지지 않았는데 벌써 이 정도 스코어니까 다음 달이 기대되는걸?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ふ、ふふふ……。全く、ああ言えばこう言う……事実負けている癖に、口の減らない寮長ですわ！」"
translation = "「후, 후후후……. 정말이지, 말 한마디를 안 지는군요…… 사실 지고 있는 주제에 입만 산 기숙사장이에요!」"

[[dialogue]]
speaker = "マハムート"
original = "「ふふん。長たるもの、常に余裕は必要よ。……でもそうね、白黒付けるのに学年末が待ちきれないのなら、１週間後の月間報告の数字で優劣を競ってもいいわ」"
translation = "「흥. 우두머리라면 언제나 여유가 필요한 법이야. ……하지만 그래, 흑백을 가리는 데 학년말까지 기다릴 수 없다면 일주일 뒤의 월간 보고 수치로 우열을 겨뤄도 좋아.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「……なんですって？」"
translation = "「……뭐라구요?」"

[[dialogue]]
speaker = "マハムート"
original = "「負けた方は勝った方の寮に、なにか大切なものを差し出す、っていうのはどうかしら？」"
translation = "「지는 쪽은 이긴 쪽 기숙사에 무언가 소중한 것을 내놓는다는 건 어때?」"

[[dialogue]]
speaker = "unk"
original = "マム、学園対抗杯は寮対抗じゃないですよ"
translation = "「마무, 학원 대항배는 기숙사 대항이 아니에요」"

[[dialogue]]
speaker = "マハムート"
original = "「なによ、いいじゃない。……学園対抗杯の勝利にこだわっているのは、新星学園生全員ではないんだもの」"
translation = "「뭐 어때, 상관없잖아. ……학원 대항배의 승리에 집착하고 있는 건, 신성학원생 전원이 아닌걸」"

[[dialogue]]
speaker = "マハムート"
original = "「特に影響が大きいのは、次年度の寮予算に影響がある寮生。私はもう卒業だけれど、私が寮長であるうちに、『ラルーナ』に勝利をもたらして見せるわ」"
translation = "「특히 영향이 큰 건, 다음 연도 기숙사 예산에 영향이 있는 기숙사생들. 나는 이제 졸업이지만, 내가 기숙사장으로 있는 동안에, 『라 루나』에 승리를 가져다주겠어」"

[[dialogue]]
speaker = "unk"
original = "マムに教えてもらった戦績によると、ここ３年ほど、新星学園は学園対抗杯に敗れているらしい。それは、マムと千園寺先輩が寮長になった去年も含めて、だ。"
translation = "마무에게 들은 전적에 따르면, 최근 3년 정도 신성학원은 학원 대항배에서 패배하고 있는 모양이다. 그것은 마무와 센온지 선배가 기숙사장이 된 작년을 포함해서, 말이다."

[[dialogue]]
speaker = "フェニエル"
original = "「そ、そ、そ……それって！」"
translation = "「그, 그, 그…… 그건!」"

[[dialogue]]
speaker = "フェニエル"
original = "「私と会長さんで、『花いちもんめ』……ってことでしょうか！？」"
translation = "「저와 회장님이, 『꽃찾기 놀이』……를 한다는 건가요!?」"

[[dialogue]]
speaker = "マハムート"
original = "「ん……？」"
translation = "「응……?」"

[[dialogue]]
speaker = "フェニエル"
original = "「勝負に負けたら、私は新星寮に……でもでも、勝負に勝ったら、会長さんを流星寮にいただける……ってことですね！？」"
translation = "「승부에서 지면 저는 신성 기숙사로…… 하지만 하지만, 승부에서 이기면 회장님을 유성 기숙사로 데려올 수 있다……는 거네요!?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「なっ……！？\u3000なんて恐ろしい勝負を考えるんですの、妃竜院マハムート……！！」"
translation = "「뭣……!? 대체 얼마나 무서운 승부를 생각하시는 건가요, 키류인 마하무트……!!」"

[[dialogue]]
speaker = "マハムート"
original = "「んん……？」"
translation = "「음……?」"

[[dialogue]]
speaker = "フェニエル"
original = "「でも、お姉様……！\u3000会長さんは、未来の流星寮にとっても、きっと必要な方だと思うんですっ」"
translation = "「하지만 언니분……! 회장님은 미래의 유성 기숙사에게 있어서도 분명 필요한 분이라고 생각해요」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「フニっ！\u3000イルソーレに来たばかりだというのに、あなたはそこまで……っ！」"
translation = "「후니! 일 소레에 온 지 얼마 되지도 않았는데 당신은 그렇게까지……!」"

[[dialogue]]
speaker = "フェニエル"
original = "「だから私、『花いちもんめ』されるかもしれないですけど、やります……！」"
translation = "「그러니까 저, 『꽃찾기 놀이』의 대상이 될지도 모르지만, 하겠어요……!」"

[[dialogue]]
speaker = "マハムート"
original = "「何か勝手に盛り上がってるわね……あら？\u3000何かしら、会長？」"
translation = "「뭔가 제멋대로 달아오르고 있네…… 어라? 왜 그러니, 회장?」"

[[dialogue]]
speaker = "マハムート"
original = "「――生徒交換が可能なのかどうか？\u3000まあ、星徒会長のあなたが権限を行使すれば……そういうこともあるでしょ」"
translation = "「――학생 교환이 가능한지 어떤지? 뭐, 성도회장인 당신이 권한을 행사한다면…… 그런 일도 있겠지」"

[[dialogue]]
speaker = "unk"
original = "えぇぇ……本当に？？？"
translation = "에에에…… 진짜로???"

[[dialogue]]
speaker = "マハムート"
original = "「まあでも、なんだか面白いことにはなってきたから、そのまま勝負は始めましょうか」"
translation = "「뭐 하지만, 왠지 재미있는 상황이 됐으니까, 그대로 승부를 시작해 볼까」"

[[dialogue]]
speaker = "マハムート"
original = "「ふふっ、細かいことを気にする必要はないわ。要するに、勝てばいいのよ。勝てば」"
translation = "「후훗, 세세한 걸 신경 쓸 필요는 없어. 요컨대 이기면 되는 거야. 이기면」"

[[dialogue]]
speaker = "マハムート"
original = "「題して、『寮生争奪チキチキ花いちもんめバトルウィーク』、開催よ！！」"
translation = "「이름하여, 『기숙사생 쟁탈 치키치키 꽃찾기 배틀 위크』, 개최야!!」"

