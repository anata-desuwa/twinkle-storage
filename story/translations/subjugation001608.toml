[[dialogue]]
speaker = "unk"
original = "そんなこんなで、正式に転入することになったジャクリーヌ。"
translation = "이러쿵저러쿵해서 정식으로 전입하게 된 자클린."

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「余は、ジャクリーヌ・オー・ランタン♪\u3000ジャック・オー・ランタンの娘なの♪」"
translation = "「짐은 자클린 오 랜턴♪ 잭 오 랜턴의 딸인 유♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「好きなものはお菓子とオシャレなの♪\u3000覚えておくゆ♪」"
translation = "「좋아하는 건 과자와 멋 부리는 유♪ 기억해 두는 유♪」"

[[dialogue]]
speaker = "unk"
original = "１年生の教室で、元気に自己紹介していたのが印象的だった。"
translation = "1학년 교실에서 씩씩하게 자기소개하던 것이 인상적이었다."

[[dialogue]]
speaker = "unk"
original = "そんなジャクリーヌに、「それにしてもあっさり決めてしまったが、親御さんに相談とかしなくて良かったのか？」と聞いてみる。"
translation = "그런 자클린에게 「그나저나 꽤 쉽게 결정해 버렸는데, 부모님과 상의 같은 건 안 해도 괜찮았던 거야?」라고 물어보았다."

[[dialogue]]
speaker = "ヒトリ"
original = "「わ、わたしも気になってました……お父さんのジャックさんに言わなくても大丈夫なのかなって……」"
translation = "「저, 저도 신경 쓰였어요…… 아빠인 잭 씨에게 말하지 않아도 괜찮은 걸까 하고……」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「それは全然大丈夫なの！」"
translation = "「그건 전혀 괜찮은 유!」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「そもそもハロウィンゲートは１年に１回、ハロウィンの日にしか繋がらないことになってるゆ」"
translation = "「애초에 할로윈 게이트는 1년에 한 번, 할로윈 날에만 연결되게 되어 있는 유」"

[[dialogue]]
speaker = "ヒトリ"
original = "「ええ！？」"
translation = "「에에!?」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「余の家は幽霊たちがいっぱい住んでる特殊な場所にあるから、人間界どころか魔界を飛んでっても、普通の方法じゃ辿り着けないゆ」"
translation = "「짐의 집은 유령들이 잔뜩 살고 있는 특수한 장소에 있어서, 인간계는커녕 마계를 날아가도 평범한 방법으론 도달할 수 없는 유」"

[[dialogue]]
speaker = "ヒトリ"
original = "「それじゃあ、つまり……」"
translation = "「그럼 즉……」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ヒトリが思ってる通りゆ！」"
translation = "「히토리가 생각하는 대로인 유!」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ハロウィンの日はとっくに過ぎてるし、それを逃した時点で最低でも１年は家には帰れないの」"
translation = "「할로윈 날은 이미 지났고, 그걸 놓친 시점에서 최소 1년은 집에 돌아갈 수 없는 유」"

[[dialogue]]
speaker = "ヒトリ"
original = "「さ、寂しくないの？\u3000ジャックさんとか心配しない？」"
translation = "「외, 외롭지 않아? 잭 씨라든가 걱정 안 하실까?」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「可愛い子には旅をさせろって言うゆ！」"
translation = "「귀여운 자식일수록 여행을 보내라고 하는 유!」"

[[dialogue]]
speaker = "unk"
original = "答えになってないような……"
translation = "답이 안 되는 것 같은데……"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ゲートが閉まると帰れないことは、こっちに来るときにパパからも言われて知ってたから、全然気にしてないのー！」"
translation = "「게이트가 닫히면 못 돌아가는 건 이쪽에 올 때 아빠한테 들어서 알고 있었으니까 전혀 신경 안 쓰는 유-!」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「そんなことよりも、人間界にはクリスマス？\u3000とかバレンタイン？\u3000とかがあるって聞いたゆ！」"
translation = "「그런 것보다 인간계에는 크리스마스? 라든가 화이트데이? 라든가 하는 게 있다고 들은 유!」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ハロウィンの他にも美味しいお菓子のイベントがいーっぱいあるって聞いたから、今はそっちに興味津々なの～♪\u3000むしろ帰りたくない気分だゆ！」"
translation = "「할로윈 말고도 맛있는 과자 이벤트가 아주 많다고 들었으니까, 지금은 그쪽에 흥미진진한 유~! 오히려 돌아가고 싶지 않은 기분인 유!」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ヘレナがリクリエ？\u3000とか言ってたけど、それが何なのかはよく知らないし興味ないけど、お菓子さえくれるなら一緒に戦ってやるの！」"
translation = "「헬레나가 리크리에? 라고 했지만, 그게 뭔지는 잘 모르고 관심 없지만, 과자만 준다면 같이 싸워주는 유!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「ジャクリーヌさんがそれでいいなら……会長さんはどう思います？」"
translation = "「자클린 씨가 그걸로 괜찮다면…… 회장님은 어떻게 생각하세요?」"

[[dialogue]]
speaker = "unk"
original = "ジャクリーヌがいいならいいんじゃないか？"
translation = "자클린이 괜찮다면 괜찮지 않을까?"

[[dialogue]]
speaker = "ゆーちゃん"
original = "「ゆー！」"
translation = "「유-!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「ゆーちゃんもそう言うなら……」"
translation = "「유짱도 그렇게 말한다면……」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「そうだ！\u3000大事なこと思い出したゆ！」"
translation = "「맞다! 중요한 걸 잊고 있었유!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「どうしたんですか？」"
translation = "「무슨 일이에요?」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ここに来る前に、サランから友達の名前に『さん』は付けないって聞いたゆ！」"
translation = "「여기 오기 전에 사란한테서 친구 이름에 '씨'는 안 붙인다고 들었유!」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「だからヒトリも、余のことは呼び捨てにするの！」"
translation = "「그러니까 히토리도 짐을 부를 땐 이름을 그냥 부르는 유!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「え、ええ！？\u3000そ、そそそ、そんな急に言われても、心の準備が……！」"
translation = "「에, 에에!? 그, 그그그, 그렇게 갑자기 말씀하셔도 마음의 준비가……!」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「パパも会長も、『ジャクリーヌ』って呼ぶの！\u3000ヒトリも同じにするゆ！」"
translation = "「아빠도 회장도 『자클린』이라고 부르는 유! 히토리도 똑같이 하는 유!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「い、いいい、いくら友達になったからといって……いきなり呼び捨てはちょっとハードルが……！」"
translation = "「아, 아무리 친구가 됐다고 해도…… 갑자기 이름만 부르는 건 좀 장벽이……!」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「じゃあ、ヒトリの呼びやすいのでいいゆ！」"
translation = "「그럼 히토리가 부르기 편한 걸로 하는 유!」"

[[dialogue]]
speaker = "unk"
original = "しばしヒトリは考え込んだ後――"
translation = "잠시 히토리는 생각에 잠긴 후──"

[[dialogue]]
speaker = "ヒトリ"
original = "「じ、じゃあ……『ジャクリーヌちゃん』でどうでしょうか……？」"
translation = "「저, 저기…… 『자클린 짱』은 어떨까요……?」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「いいゆ♪\u3000ゆーっゆっゆっゆ♪\u3000これで本当の友達になれた気がして、余もうれしいの～♪」"
translation = "「좋은 유♪ 유~유유유유♪ 이걸로 진짜 친구가 된 기분이라 짐도 기쁜 유~♪」"

[[dialogue]]
speaker = "ヒトリ"
original = "「よ、良かったです……改めてよろしくお願いします、ジャクリーヌちゃん♪」"
translation = "「다, 다행이에요…… 다시 한번 잘 부탁해요, 자클린 짱♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「こちらこそ、ヒトリ♪」"
translation = "「나야말로, 히토리♪」"

[[dialogue]]
speaker = "ヒトリ"
original = "「あははっ、ジャクリーヌちゃん、苦しいです……っ♪」"
translation = "「아하하, 자클린 짱, 괴로워요……♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ぎゅ～～～～なの♪」"
translation = "「꼬옥~~~~ 인유♪」"

[[dialogue]]
speaker = "unk"
original = "そうして、ハロウィンの化身である幽霊の女の子・ジャクリーヌが俺たちの新しい仲間に加わったのだった。"
translation = "그렇게 할로윈의 화신인 유령 소녀 자클린이 우리의 새로운 동료로 합류한 것이었다."

