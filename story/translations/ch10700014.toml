[[dialogue]]
speaker = "unk"
original = "第４話,友達以上,P"
translation = "제4화, 친구 이상"

[[dialogue]]
speaker = "unk"
original = "ビルのアステラの件からしばらく経ったある日、ウズメが俺の家へ遊びにくることになった――"
translation = "빌딩 아스텔라 사건으로부터 얼마 뒤, 우즈메가 내 집으로 놀러 오게 되었다──"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「お、お邪魔しま～す……」"
translation = "「시, 실례하겠습니당……」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「（うわあぁぁ、会長くんの家に初めて来ちゃったんだけど……！\u3000今日１日、室内で２人きりで過ごすとか、ドキドキしちゃうし……！）」"
translation = "「(우와아아, 회장군 집에 처음 와버렸는데……! 오늘 하루 실내에서 둘이서만 보낸다니 두근거린다구……!)」"

[[dialogue]]
speaker = "unk"
original = "俺は時代劇の映画のブルーレイを持ってきて、ウズメに見せる。"
translation = "나는 사극 영화 블루레이를 가져와 우즈메에게 보여준다."

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「へ、へぇ～、それが前に面白いって言ってた作品なんだ。楽しみ～！」"
translation = "「헤, 헤에~ 그게 전에 재밌다고 했던 작품이구나. 기대돼!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「（初めて家へあがるってことに頭一杯で、すっかり忘れてたし！\u3000というか今更なんだけど、会長くんが時代劇好きとか、趣味合うの、これもはや運命じゃない！？）」"
translation = "「(처음 집에 들어온다는 생각에 머릿속이 꽉 차서 완전히 잊고 있었어! 그보다 이제 와서지만 회장군이 사극을 좋아한다니 취향이 맞는 거 이거 벌써 운명 아니야!?)」"

[[dialogue]]
speaker = "unk"
original = "続いて俺は、気に入っている煎茶と和菓子――苺大福を持ってくる。ソファーに案内して、前のテーブルに置いた。"
translation = "이어서 나는 마음에 들어 하는 전차와 화과자── 딸기 찹쌀떡을 가져온다. 소파로 안내하고 앞 테이블에 놓았다."

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「これが会長くんの好きな味なんだ。いただきます――」"
translation = "「이게 회장군이 좋아하는 맛이구나. 잘 먹겠습니──」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ん～～～っ♪\u3000ヤバッ、めっちゃ美味しいんだけど！\u3000あたしもこれ、好きな味だし！」"
translation = "「으음~~~♪ 대박, 진짜 맛있는데! 나도 이거 좋아하는 맛이야!」"

[[dialogue]]
speaker = "unk"
original = "そっか、好みが合ってよかった"
translation = "그렇구나, 입맛에 맞아서 다행이야."

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「っ……！」"
translation = "「윽……!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「（はああぁぁっ、そこで嬉しそうに微笑むのは反則じゃん！？\u3000なんなの、あたしをキュン死させる気なの！？）」"
translation = "「(하아아아앗, 거기서 기쁘다는 듯이 미소 짓는 건 반칙이잖아!? 뭐야, 나를 심쿵사 시킬 셈이야!?)」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「（そんなのもう無理なんだけど！？\u3000好きピになっちゃうんだけど！？）」"
translation = "「(그런 거 이제 무리인데!? 완전 좋아하게 되어버린다구!?)」"

[[dialogue]]
speaker = "unk"
original = "それから俺は、映画のブルーレイを流す準備をして、ウズメの横に腰かける。"
translation = "그러고 나서 나는 영화 블루레이를 틀 준비를 하고 우즈메 옆에 걸터앉는다."

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「か、かかか、会長くん、あたしの隣に座るの！？」"
translation = "「회, 회회회, 회장군, 내 옆에 앉는 거야!?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「――いやいやいや！\u3000全然嫌じゃないし、おかしくはないんだけど！\u3000確かに今までもお昼食べる時とか、よく隣に座ってたし……」"
translation = "「──아니아니아니! 전혀 싫은 건 아니구 이상한 것도 아니지만! 하긴 지금까지도 점심 먹을 때 자주 옆에 앉았었구……」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「でも今は、前とちょっと違うというか、うぅ～～～！」"
translation = "「하지만 지금은 전이랑 좀 다르달까, 으으으~~~!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「（友達じゃなくて男の子として意識するようになっちゃったからとか、言えるわけないし！）」"
translation = "「(친구가 아니라 남자애로 의식하게 되어버렸다고 말할 수 있을 리 없잖아!)」"

[[dialogue]]
speaker = "unk"
original = "ウズメ、最近やっぱり変じゃないか？"
translation = "우즈메, 요즘 역시 좀 이상하지 않아?"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「え！？\u3000へ、変って何が！？」"
translation = "「에!? 이, 이상하다니 뭐가!?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「――ここ最近、お正月前のソフィとサーシャ先輩が同じだったように、距離を置かれているような気がする？\u3000そ、それは……！」"
translation = "「──요즘 정월 전의 소피랑 사샤 선배가 그랬던 것처럼 거리를 두고 있는 기분이 든다고? 그, 그건……!」"

[[dialogue]]
speaker = "unk"
original = "心配なんだ。何かあるなら教えて欲しい"
translation = "걱정돼서 그래. 무슨 일 있으면 알려줬으면 좋겠어."

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「うっ……！\u3000そ、そんな真面目な顔で見つめられたら……！\u3000あたし――」"
translation = "「윽……! 그, 그렇게 진지한 얼굴로 쳐다보면……! 나──」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ますます友達じゃいられなくなっちゃうし……！」"
translation = "「더 이상 친구로 있을 수 없게 되어버린다구……!」"

[[dialogue]]
speaker = "unk"
original = "友達でいられないの！？"
translation = "친구로 있을 수 없다고!?"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あっ！？\u3000いや、違うし！\u3000悪い意味じゃなくて！\u3000その逆！\u3000逆だから！\u3000その、ええと！」"
translation = "「앗!? 아니, 아니야! 나쁜 뜻이 아니라! 그 반대! 반대니까! 그, 어라!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「友達以上に意識しちゃうってことであって、会長くんを嫌いになったとかそういうことじゃないから！」"
translation = "「친구 이상으로 의식하게 된다는 뜻이지 회장군을 싫어하게 됐다거나 그런 게 아니니까!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「って、あ、あれ……？\u3000あたし、なに言って……！\u3000いや、えっと、今のはその……！」"
translation = "「어, 어라……? 나 무슨 말을……! 아니, 그게 그러니까 방금 건……!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「（て、テンパって口が滑ったんだけどぉぉぉっ！？\u3000いや、もうこれ半分告白しちゃってるようなもんじゃん！？\u3000なにやってんのあたし！？）」"
translation = "「(드, 당황해서 입이 미끄러졌는데에에엑!? 아니 이미 이거 절반은 고백한 거나 마찬가지잖아!? 나 뭐 하는 거야!?)」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「（誤魔化す言葉が出てこないし……！\u3000こうなったら、もう……！）」"
translation = "「(얼버무릴 말이 안 나와……! 이렇게 된 이상 이제……!)」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「――も、もし……あたしが、会長くんと友達以上の……そういう関係に、なったら……」"
translation = "「──마, 만약…… 내가 회장군이랑 친구 이상의…… 그런 관계가 된다면……」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「寮暮らししてるから、こう見えてお弁当作ったりとかできるし……！\u3000和食も得意だしっ。ほ、ほかには――」"
translation = "「기숙사 생활하고 있으니까 이래 보여도 도시락 싸주거나 할 수 있구……! 일식도 잘한다구. 또, 또 다른 건──」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「す、スキンシップするのは！\u3000結構好きな方だと思うんで……イチャイチャ大歓迎～……！」"
translation = "「스, 스킨십하는 거! 꽤 좋아하는 편이라고 생각하니까 꽁냥거리는 거 대환영~……!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「とか、言ってみたりして……あはは……」"
translation = "「라든가, 말해본다거나 해서…… 아하하……」"

[[dialogue]]
speaker = "unk"
original = "ウズメ、俺は――"
translation = "우즈메, 나는──"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「う、うん……」"
translation = "「으, 응……」"

[[dialogue]]
speaker = "unk"
original = "不安そうな顔をするウズメ。そんな彼女に俺は――"
translation = "불안한 표정을 짓는 우즈메. 그런 그녀에게 나는──"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「えっ！？\u3000――本当は会長くんも、あたしのこと、女の子として、意識してくれてたの……？」"
translation = "「에!? ──사실은 회장군도 나를 여자애로서 의식해주고 있었어……?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「そ、そなんだ……じゃ、じゃあさ」"
translation = "「그, 그렇구나…… 그, 그럼 말이야.」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あたしたち、つ、付き合、っちゃう……？\u3000とか、言ってみたりして……」"
translation = "「우리, 사, 사귀어, 볼까……? 라든가, 말해본다거나 해서……」"

[[dialogue]]
speaker = "unk"
original = "よろしくお願いします"
translation = "잘 부탁합니다."

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あ……！\u3000うんっ♪」"
translation = "「아……! 응♪」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「彼氏彼女として、これからはよろしくね♪\u3000えへへへへぇ♪」"
translation = "「남자친구 여자친구로서 앞으로 잘 부탁해♪ 에헤헤헤헤헤♪」"

[[dialogue]]
speaker = "unk"
original = "嬉しさと照れが入り混じった笑顔を浮かべるウズメ。そんな彼女に、男としてちゃんと言っておかなければと向き直る。"
translation = "기쁨과 부끄러움이 섞인 미소를 짓는 우즈메. 그런 그녀에게 남자로서 제대로 말해둬야겠다고 마주 본다."

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「――え？\u3000会長くん、言っておきたいことって……？」"
translation = "「──에? 회장군, 해두고 싶은 말이라니……?」"

[[dialogue]]
speaker = "unk"
original = "ウズメ、好きだ"
translation = "우즈메, 좋아해."

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「～～～っ！」"
translation = "「~~~~~윽!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「う、うん……私も……」"
translation = "「으, 응…… 나도……」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「会長くんのことが、好き……<emoji=heart04>\u3000えへへっ<emoji=heart04>」"
translation = "「회장군이 좋아……<emoji=heart04> 에헤헷<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そうして俺とウズメは、どちらともなく触れた手を絡めると、そっと握り合うのだった――"
translation = "그렇게 나와 우즈메는 누가 먼저랄 것도 없이 닿은 손을 얽으며 살며시 마주 잡았다──"

