[[dialogue]]
speaker = "unk"
original = "第２話,図書委員の仕事,P"
translation = "제2화, 도서위원의 일, P"

[[dialogue]]
speaker = "サーシャ"
original = "「おつかれさま。今日のモンスターは大して強くなかったわね～」"
translation = "「수고했어. 오늘 몬스터는 별로 강하지 않았네~」"

[[dialogue]]
speaker = "モネ"
original = "「失礼します」"
translation = "「실례합니다」"

[[dialogue]]
speaker = "サーシャ"
original = "「いらっしゃ～い。来ると思ってたわ～」"
translation = "「어서 와~. 올 줄 알았어~」"

[[dialogue]]
speaker = "サーシャ"
original = "「ふふ、どうしてって顔してるわね～。星徒会もそうだけど、新星や流星の委員会は普通の学園にはない仕事があるの～」"
translation = "「후후, 왜냐는 표정이네~. 성도회도 그렇지만, 신성이나 유성의 위원회는 보통 학원에는 없는 일이 있거든~」"

[[dialogue]]
speaker = "モネ"
original = "「図書委員は星騎士がモンスターやアステラに対応した際、どんな状況だったか、どんな対応を取ったか、レポートにまとめているんです」"
translation = "「도서위원은 성기사가 몬스터나 아스테라에 대응했을 때, 어떤 상황이었는지, 어떤 대응을 취했는지 리포트로 정리하고 있어요」"

[[dialogue]]
speaker = "モネ"
original = "「会長が以前閲覧していた記録も、今までの図書委員が記録して製本したものなんです」"
translation = "「회장님이 이전에 열람하시던 기록도, 지금까지의 도서위원들이 기록해서 제본한 거예요」"

[[dialogue]]
speaker = "サーシャ"
original = "「モンスターやアステラからリクリエのことがわかるかもしれないから。倒して終わりじゃもったいないもの」"
translation = "「몬스터나 아스테라를 통해 리크리에에 대해 알 수 있을지도 모르니까. 쓰러뜨리고 끝내기엔 아깝잖아」"

[[dialogue]]
speaker = "サーシャ"
original = "「モネちゃんはきちんとレポートにまとめてくれるから、星徒会としては助かってるわ～」"
translation = "「모네짱은 꼼꼼하게 리포트로 정리해 주니까, 성도회 입장에서는 큰 도움이 돼~」"

[[dialogue]]
speaker = "モネ"
original = "「いえ、そんな……恐縮です。では今日の戦闘に関して聞かせていただきますね」"
translation = "「아뇨, 그런…… 과분한 말씀이세요. 그럼 오늘의 전투에 관해 들려주세요」"

[[dialogue]]
speaker = "モネ"
original = "「……ふむふむ、はい、なるほど。大型のモンスターが３体……獣型をした小型モンスターが十数体、正確な数は不明、と」"
translation = "「……흠흠, 네, 그렇군요. 대형 몬스터가 3마리…… 짐승 형태를 한 소형 몬스터가 십여 마리, 정확한 숫자는 불명, 이라고」"

[[dialogue]]
speaker = "モネ"
original = "「民間人の被害を出すことなく、滞りなく撃破。さすが星徒会役員のみなさんです」"
translation = "「민간인 피해 없이, 지체 없이 격파. 역시 성도회 임원 여러분이세요」"

[[dialogue]]
speaker = "モネ"
original = "「会長はこの前新星学園に入ったばかりなのに、こんなに活躍していて……うぅ、自分が恥ずかしいです……」"
translation = "「회장님은 요전에 신성 학원에 갓 들어오셨는데도 이렇게 활약하시고…… 으으, 제 자신이 부끄러워요……」"

[[dialogue]]
speaker = "モネ"
original = "「私なんてこうして話を聞いているだけでプルプル震えそうですよぉ……」"
translation = "「저 같은 건 이렇게 이야기를 듣는 것만으로도 부들부들 떨릴 것 같아요……」"

[[dialogue]]
speaker = "サーシャ"
original = "「ううん、レポートを作るのも立派な仕事よ～」"
translation = "「아니야, 리포트를 만드는 것도 훌륭한 일이야~」"

[[dialogue]]
speaker = "モネ"
original = "「そう言ってもらえるとありがたいです……」"
translation = "「그렇게 말씀해 주시니 감사해요……」"

[[dialogue]]
speaker = "unk"
original = "そういえば初日のは……"
translation = "그러고 보니 첫날 건……"

[[dialogue]]
speaker = "モネ"
original = "「会長が登校初日に戦った日のことですよね。それならアナさんからレポートが出ていますよ」"
translation = "「회장님이 등교 첫날에 싸웠던 날 말씀이시죠. 그건 아나 씨가 리포트를 냈어요」"

[[dialogue]]
speaker = "サーシャ"
original = "「今は図書委員の仕事になっているけど、元々は戦った星騎士がそれぞれレポートを出すものだったらしいわ。だから自分で出してる子もいるのよ～」"
translation = "「지금은 도서위원의 일이 되었지만, 원래는 싸운 성기사가 각자 리포트를 내는 것이었다나 봐. 그래서 직접 내는 아이도 있어~」"

[[dialogue]]
speaker = "モネ"
original = "「アナさんはいつもご自分でレポートを出されてます。ご自分で研究もされているだけあって、データが正確です」"
translation = "「아나 씨는 언제나 직접 리포트를 내세요. 직접 연구도 하시는 만큼 데이터가 정확해요」"

[[dialogue]]
speaker = "モネ"
original = "「さて……と。レポート書けました。確認お願いできますか？」"
translation = "「자…… 그럼. 리포트 다 썼어요. 확인 부탁드려도 될까요?」"

[[dialogue]]
speaker = "サーシャ"
original = "「どれどれ……緋宮クロトと奏サーシャ、駆け付けた２人が見たのは破滅の使者――跋扈するモンスターたちだった」"
translation = "「어디 어디…… 히노미야 쿠로토와 카나데 사샤, 달려온 두 사람이 본 것은 파멸의 사자―― 발호하는 몬스터들이었다」"

[[dialogue]]
speaker = "サーシャ"
original = "「今まさに<ruby>無辜<rt>むこ</rt></ruby>の人々に牙を突き立てようとするモンスター。しかしクロトは電光石火のごとく肉薄し、漆黒の星力を宿した拳で獣の顎を叩き割る――！」"
translation = "「지금 바로 무고한 사람들에게 송곳니를 들이대려는 몬스터. 그러나 쿠로토는 전광석화처럼 육박하여, 칠흑의 성력을 품은 주먹으로 짐승의 턱을 박살 낸다――!」"

[[dialogue]]
speaker = "サーシャ"
original = "「そしてサーシャの絶対零度の刃が背後から忍び寄り、死神のごとく巨躯のモンスターの首を刈り取った──」"
translation = "「그리고 사샤의 절대영도의 칼날이 배후에서 소리 없이 다가와, 사신처럼 거구의 몬스터의 목을 베어 넘겼다──」"

[[dialogue]]
speaker = "unk"
original = "小説みたいだ"
translation = "소설 같네"

[[dialogue]]
speaker = "モネ"
original = "「ああっ、すみませ～んっ！\u3000つい手癖というか、勢いというか、すぐ書き直しますっ」"
translation = "「아앗, 죄송해요~! 저도 모르게 버릇이라고 할까, 기세라고 할까, 금방 다시 쓸게요!」"

[[dialogue]]
speaker = "モネ"
original = "「はぁ……はぁ……こ、これでどうですか……？」"
translation = "「하아…… 하아…… 이, 이걸로 어떠세요……?」"

[[dialogue]]
speaker = "サーシャ"
original = "「うん、問題ないわね。でもさっきのも素敵だったと思うわよ～」"
translation = "「응, 문제없네. 하지만 아까 것도 멋졌다고 생각해~」"

[[dialogue]]
speaker = "モネ"
original = "「いえいえそんな、恥ずかしいですぅ～っ」"
translation = "「아뇨아뇨 천만에요, 부끄러워요~!」"

[[dialogue]]
speaker = "モネ"
original = "「レポートは私から提出しておきますね。それでは失礼しま――」"
translation = "「리포트는 제가 제출해 둘게요. 그럼 실례하겠습――」"

[[dialogue]]
speaker = "unk"
original = "この前借りた本、読んだよ"
translation = "요전에 빌린 책, 읽었어"

[[dialogue]]
speaker = "モネ"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker = "モネ"
original = "「ど、どうでしたか……」"
translation = "「어, 어떠셨나요……」"

[[dialogue]]
speaker = "unk"
original = "すごく泣けた"
translation = "정말 슬펐어"

[[dialogue]]
speaker = "モネ"
original = "「ですよね～！」"
translation = "「그쵸~!」"

[[dialogue]]
speaker = "モネ"
original = "「まさか主人公だけではなくヒロインにもあんな秘密があるなんて……真実が明かされた時は頭が真っ白になるほどの衝撃でした」"
translation = "「설마 주인공뿐만 아니라 히로인에게도 그런 비밀이 있을 줄이야…… 진실이 밝혀졌을 때는 머릿속이 하얘질 정도의 충격이었어요」"

[[dialogue]]
speaker = "モネ"
original = "「それでもつらいとか悲しいとか全然表に出さないんですよ。むしろ苦しい時こそいつもどおりで、そこが余計に切ないんですよ～」"
translation = "「그런데도 괴롭다거나 슬프다는 걸 전혀 겉으로 드러내지 않거든요. 오히려 괴로울 때일수록 평소처럼 행동해서, 그게 더 애절하다니까요~」"

[[dialogue]]
speaker = "サーシャ"
original = "「すっごい勢いで頷いてるわ～。え～と、なんて言うんだっけ……そう、ヘッドバンギングみたいね～」"
translation = "「엄청난 기세로 고개를 끄덕이고 있네~. 에~ 그러니까, 뭐라고 하더라…… 그래, 헤드뱅잉 같네~」"

[[dialogue]]
speaker = "モネ"
original = "「会長のお気に入りの描写とか……あ、２回目のデートのシーン！\u3000いいですよね～、あの初々しさとじれったさがもうたまりません……！」"
translation = "「회장님이 마음에 드는 묘사라든가…… 아, 두 번째 데이트 장면! 좋죠~, 그 풋풋함과 감질맛이 정말 참을 수 없어요……!」"

[[dialogue]]
speaker = "モネ"
original = "「誕生日プレゼントを選ぶところも……うんうん、好きって感情がどんどん強くなってるのがあそこでよくわかるんですよね」"
translation = "「생일 선물을 고르는 장면도…… 음음, 좋아한다는 감정이 점점 강해지는 게 거기서 잘 나타나거든요」"

[[dialogue]]
speaker = "モネ"
original = "「はぁ～、語っているだけで目がうるうるしちゃいます……」"
translation = "「하아~, 이야기하는 것만으로도 눈시울이 붉어지네요……」"

[[dialogue]]
speaker = "サーシャ"
original = "「ふふふ、２人とも楽しそうね～。私もその本借りてみようかしら～？」"
translation = "「후후후, 둘 다 즐거워 보이네~. 나도 그 책 빌려볼까~?」"

[[dialogue]]
speaker = "モネ"
original = "「ぜひぜひ！\u3000まだ借りられていないのがあると思うので、今ならすぐに借りられますよ」"
translation = "「꼭 보세요! 아직 대출되지 않은 게 있을 테니, 지금이라면 바로 빌릴 수 있어요」"

[[dialogue]]
speaker = "モネ"
original = "「会長に読んでほしい本は他にも……いえ、まだまだたくさんあるんです。良かったら星徒会の後図書館に……」"
translation = "「회장님께 읽어드리고 싶은 책은 그 외에도…… 아니, 아직 잔뜩 있어요. 괜찮으시면 성도회 끝나고 도서관에……」"

[[dialogue]]
speaker = "unk"
original = "ぜひ"
translation = "기꺼이"

[[dialogue]]
speaker = "モネ"
original = "「いいんですか！？\u3000ではとびっきりのおすすめを用意してお待ちしていますね！」"
translation = "「정말인가요!? 그럼 최고의 추천작을 준비해서 기다리고 있을게요!」"

