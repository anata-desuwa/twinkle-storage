[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「寄せては返す穏やかなさざ波……照りつける眩しい太陽……和やかなカモメさんたちの声……」"
translation = "「밀려왔다 밀려가는 잔잔한 파도…… 내리쬐는 눈부신 태양…… 화목한 갈매기 씨들의 소리……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「はぁ～……。気持ちいいですね～……。やっぱり夏のビーチって居心地抜群ですぅ……」"
translation = "「하아~…… 기분 좋네요~……. 역시 여름 해변은 기분 최고예요오……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「何より──……」"
translation = "「무엇보다──……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「んっ……はぁ……んはぁん……<emoji=heart04>\u3000穴場のスポットを見つけたら、えへへぇ……<emoji=heart04>\u3000好きなだけエッチもできますもん……<emoji=heart04>」"
translation = "「응…… 하아…… 응하앙……<emoji=heart04> 남의 눈에 띄지 않는 곳을 찾으면, 에헤헤에……<emoji=heart04> 마음껏 섹스도 할 수 있으니까요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "小さなお尻でペニスをズリズリ刺激しながら、ルリエルが赤みがかった顔で微笑みかけてくる。"
translation = "작은 엉덩이로 자지를 비비적비비적 자극하며, 루리엘이 붉어진 얼굴로 미소 지어 온다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「えへへぇ……<emoji=heart04>\u3000ホントにいい無人島を見つけちゃいましたね……？\u3000んふぁ……何度来ても、毎回誰もいませんもん……<emoji=heart04>」"
translation = "「에헤헤에……<emoji=heart04> 정말 좋은 무인도를 찾아냈네요……? 응화…… 몇 번을 와도, 매번 아무도 없으니까요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ビクビクしながらこっそり岩陰でエッチしてた頃が懐かしいくらいですぅ……<emoji=heart04>\u3000あれはあれで……ん、ふ……興奮しちゃいましたけど……<emoji=heart04>」"
translation = "「조마조마해하며 몰래 바위 그늘에서 섹스하던 시절이 그리울 정도예요오……<emoji=heart04> 그건 그거대로…… 응, 후…… 흥분해버렸지만요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "もう何度目になるだろう。この無人島を見つけて以来、ここでエッチするのがお決まりになってしまっていた。"
translation = "벌써 몇 번째일까. 이 무인도를 발견한 이래로, 여기서 섹스하는 것이 일과가 되어버렸다."

[[dialogue]]
speaker = "unk"
original = "最初はこそこそ乳繰り合っていたものの、数日経つ頃には夏の熱気とビーチの開放感に当てられて所構わずイチャついてしまってる。"
translation = "처음에는 몰래 애무를 나누는 정도였지만, 며칠이 지날 즈음에는 여름의 열기와 해변의 개방감에 취해 장소 불문하고 꽁냥거리고 만다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「やっぱりイチャイチャするなら我慢せずに堂々とですよね……<emoji=heart04>\u3000こんなに開放的な場所でエッチするのもドキドキしちゃいますし……<emoji=heart04>」"
translation = "「역시 꽁냥거릴 때는 참지 말고 당당하게죠……<emoji=heart04> 이렇게 개방적인 장소에서 섹스하는 것도 두근거려버리고요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「今日も……ふぁ、はぁん……<emoji=heart04>\u3000太陽が水平線に沈むまでエッチしましょうね……<emoji=heart04>\u3000たっぷりたっぷりイチャイチャして過ごしたいですぅ……<emoji=heart04>」"
translation = "「오늘도…… 화, 하앙……<emoji=heart04> 태양이 수평선 너머로 질 때까지 섹스해요……<emoji=heart04> 듬뿍듬뿍 꽁냥거리며 지내고 싶어요오……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「昨日気持ち良くしてくれた分、今日は一日ルリエルがご奉仕してあげちゃいますから……<emoji=heart04>\u3000会長さんはそのままじーっとしててください<emoji=heart04>」"
translation = "「어제 기분 좋게 해준 만큼, 오늘은 하루 종일 루리엘이 봉사해줄 테니까요……<emoji=heart04> 회장님은 그대로 가마아니 계세요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そうしてルリエルは磯の匂いの混じったお尻を持ち上げて──"
translation = "그러고는 루리엘은 바다 냄새가 섞인 엉덩이를 들어 올려──"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あぁああんっ……<emoji=heart04>\u3000ふぁ、あふっ、はぁぁあんっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아아앙……<emoji=heart04> 화, 아후, 하아아앙……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "一気に根元まで挿入して、甘い声をビーチに響かせながら腰を上下させる。"
translation = "단숨에 뿌리까지 삽입하고, 달콤한 목소리를 해변에 울리며 허리를 상하로 움직인다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「相変わらず、ふぁあああんっ、大きいですぅ……<emoji=heart04>\u3000えへへぇ、やっぱり水着姿がいいんですかぁ……？」"
translation = "「여전히, 화아아아앙, 커요오……<emoji=heart04> 에헤헤에, 역시 수영복 차림이 좋은 건가요오……?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「それとも、んっ、はぁ……<emoji=heart04>\u3000こんな砂浜でエッチしちゃってることに興奮しちゃってるとか……<emoji=heart04>\u3000ルリエルは、んぁん、どちらもですけど……<emoji=heart04>」"
translation = "「아니면, 응, 하아……<emoji=heart04> 이런 모래사장에서 섹스하고 있다는 사실에 흥분해버린 거라든가……<emoji=heart04> 루리엘은, 응앙, 둘 다지만요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「えへへぇ……<emoji=heart04>\u3000水着姿に発情してくれてると思うと、あっ、はぁあん、おま○こグチュ濡れになっちゃいますぅ……<emoji=heart04>」"
translation = "「에헤헤에……<emoji=heart04> 수영복 차림에 발정해준다고 생각하니, 앗, 하아앙, 보지 구축구축 젖어버려요오……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ひろーい砂浜や海が目に入ると……ふぁっ、あぁあんっ……おま○こキュンキュンしちゃってぇ……<emoji=heart04>」"
translation = "「너어른 모래사장이나 바다가 눈에 들어오면…… 화앗, 아아앙…… 보지 큥큥거려서어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "夏の熱気に負けないくらい上気しているルリエルが色っぽい。"
translation = "여름의 열기에 지지 않을 정도로 상기되어 있는 루리엘이 요염하다."

[[dialogue]]
speaker = "unk"
original = "潮の匂いに混じって香ってくる、艶やかで淫靡な愛液の香りが俺の興奮を掻き立ててくる。"
translation = "바다 냄새에 섞여 풍겨오는, 매끄럽고 음란한 애액의 향기가 나의 흥분을 돋운다."

[[dialogue]]
speaker = "unk"
original = "でも、それ以上に──"
translation = "하지만, 그 이상으로──"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あっ、はぁっ、あっ、あぁあんっ……<emoji=heart04>\u3000おち○ちん、気持ちいい……<emoji=heart04>\u3000のぼせちゃいそうですぅ……<emoji=heart04>」"
translation = "「앗, 하앗, 앗, 아아앙……<emoji=heart04> 자지, 기분 좋아……<emoji=heart04> 정신이 몽롱해질 것 같아요오……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「一泳ぎして、あっ、はぁ、体がほぐれてるからですかね……<emoji=heart04>\u3000いつも以上に、ふぁああんっ、おち○ちんの感触が伝わってきて……<emoji=heart04>」"
translation = "「한바탕 수영해서, 앗, 하아, 몸이 풀려 있어서 그럴까요……<emoji=heart04> 평소보다 더, 화아아앙, 자지의 감촉이 전해져 와서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「イっちゃ……はぁああああんっっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ルリエルの水着おま○こ、ふぁぁぁっ、あはぁぁ、敏感も敏感になっちゃってますよぉ……<emoji=heart04>」"
translation = "「가버려어…… 하아아아앙<emoji=heart04><emoji=heart04><emoji=heart04> 루리엘의 수영복 보지, 화아아아, 아하아아, 민감하고도 민감해져 버렸어요오……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "場違いなほど大声で喘ぎながら、じっくりとセックスの快感に酔いしれるルリエルがたまらなくいやらしい。"
translation = "장소에 어울리지 않을 만큼 큰 소리로 신음하며, 듬뿍 섹스의 쾌감에 도취된 루리엘이 견딜 수 없이 야하다."

[[dialogue]]
speaker = "unk"
original = "堪らず、その小さくて狭い膣を突き上げたくなってしまう。"
translation = "참지 못하고, 그 작고 좁은 질을 밀어 올리고 싶어진다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「くはぁあんっ、ダメ、ダメですよぉ……<emoji=heart04>\u3000今日は、ルリエルがご奉仕するって言ったじゃないですかぁ……<emoji=heart04>」"
translation = "「쿠하아앙, 안 돼요, 안 된다고요오……<emoji=heart04> 오늘은 루리엘이 봉사한다고 했잖아요오……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「わかってますからぁ……<emoji=heart04>\u3000ルリエルの赤ちゃんの部屋、んふぁ……<emoji=heart04>\u3000おち○ちんでぐいぐい持ち上げたいんですよね……<emoji=heart04>\u3000それ、好きですもんねっ……<emoji=heart04>」"
translation = "「알고 있으니까요오……<emoji=heart04> 루리엘의 아기방, 응화……<emoji=heart04> 자지로 꾹꾹 밀어 올리고 싶은 거죠……<emoji=heart04> 그거, 좋아하시잖아요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「それも、あふっ、んぁぁぁぁああんっ……<emoji=heart04><emoji=heart04><emoji=heart04>\u3000きょーは、ルリエルがやりますからっ……<emoji=heart04>」"
translation = "「그것도, 아후, 응아아아아아앙……<emoji=heart04><emoji=heart04><emoji=heart04> 오느으른, 루리엘이 할 테니까요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「わたしも、あっ、あっ、すっごく発情しちゃっててぇっ……<emoji=heart04>\u3000いっぱいいっぱい赤ちゃんの部屋、ズンズンしちゃいたいんですぅ……<emoji=heart04>」"
translation = "「저도, 앗, 앗, 어엄청 발정해버려서어……<emoji=heart04> 가득가득 아기방, 즈응즈응하고 싶단 말이에요오……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「イキながらになっちゃいますけどぉ、ふぁっ、あふっ、あぁぁぁっ……<emoji=heart04>\u3000ちゃんと、あふぁっ、ごほーし、しますからぁっ……<emoji=heart04>」"
translation = "「가버리면서 하게 되겠지만요오, 화앗, 아후, 아아아앗……<emoji=heart04> 제대로, 아화앗, 보응사, 할 테니까요오……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そしてルリエルが手を突き直して、より激しく動き出そうとする──その時だった。"
translation = "그리고 루리엘이 손을 다시 짚고, 더욱 격렬하게 움직이려 하던── 그때였다."

[[dialogue]]
speaker_original = "女子"
speaker_translation = "여자"
original = "「ま、待ってよ……。まだ誰もいないか確認してないってば……」"
translation = "「자, 잠깐만……. 아직 아무도 없는지 확인 안 했다니까……」"

[[dialogue]]
speaker_original = "男子"
speaker_translation = "남자"
original = "「どうせ誰もいないって……。それよりほら……」"
translation = "「어차피 아무도 없다니까……. 그것보다 자……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「っっ……！\u3000ひ、人の声が……」"
translation = "「윽……! 사, 사람 목소리가……」"

[[dialogue]]
speaker = "unk"
original = "俺たちと同じくイチャイチャ目的でやってきたんだろう。どこからか男女の声が聞こえてくる。"
translation = "우리와 마찬가지로 꽁냥거릴 목적으로 찾아온 것이리라. 어디선가 남녀의 목소리가 들려온다."

[[dialogue]]
speaker = "unk"
original = "流石にこのままし続けるのはマズ──"
translation = "과연 이대로 계속하는 건 위험──"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ぬ、抜かないでくださいっ……」"
translation = "「빼, 빼지 말아 주세요……」"

[[dialogue]]
speaker = "unk"
original = "しかし起き上がろうとした瞬間、ルリエルに両足を押さえつけられた。"
translation = "하지만 일어나려던 순간, 루리엘에게 양다리를 억눌렸다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「無理ですよぉ……<emoji=heart04>\u3000どれだけ発情しちゃってると思ってるんですかぁ……<emoji=heart04>\u3000今更、あっ、あっ、あぁ、やめられませんっ……<emoji=heart04>」"
translation = "「무리예요오……<emoji=heart04> 얼마나 발정해버렸다고 생각하시는 건가요오……<emoji=heart04> 이제 와서, 앗, 앗, 아아, 그만둘 수 없어요오……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「声ならわたしが我慢しますからっ……<emoji=heart04>\u3000このまま続けましょう……<emoji=heart04>\u3000大丈夫、ふぁ、あぁ、きっと大丈夫ですからぁ……<emoji=heart04>」"
translation = "「목소리라면 제가 참을 테니까요……<emoji=heart04> 이대로 계속해요……<emoji=heart04> 괜찮아요, 화아, 아아, 분명 괜찮을 테니까요오……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "するとルリエルは、焦る俺をその場に縫い付けるようにお尻を打ち付けてきて──"
translation = "그러자 루리엘은, 당황하는 나를 그 자리에 꿰매듯 엉덩이를 부딪쳐 오며──"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ん゛ふぅんっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ん゛ぁっ、あはぁあんっ<emoji=heart04>\u3000ん゛っ、あっ、はぁっ、あぁぁあんっっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응으응으윽<emoji=heart04><emoji=heart04><emoji=heart04> 응아앗, 아하아앙<emoji=heart04> 응윽, 앗, 하앗, 아아아앙……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ら、らめっ、あふぅ、やっぱり声がぁ……<emoji=heart04>\u3000安心しきってたせーで、ん゛ぁぁっ、上手く口ぃ、閉じられなくてぇ……<emoji=heart04>」"
translation = "「아, 안 돼에, 아후우, 역시 목소리가아……<emoji=heart04> 안심하고 있었던 타앗에, 응아아앗, 제대로 입으을, 다물 수가 없어서어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「でも、ん゛はぁっ、あはぁんっ、あっ、あぁっ……<emoji=heart04>\u3000腰とめられませんっ……<emoji=heart04>\u3000ん゛ふぅんんっっ、おち○ちん気持ちいいれふぅ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하지만, 응하앗, 아하아앙, 앗, 아아앗……<emoji=heart04> 허리 멈출 수 없어요오……<emoji=heart04> 응으응으으윽, 자지 기분 좋아레후우……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "懸命に口を閉じようとしながら、小柄な体を大きく弾ませて快楽を貪るルリエルの姿がたまらない。"
translation = "필사적으로 입을 다물려 하면서도, 작은 몸을 크게 튀기며 쾌락을 탐하는 루리엘의 모습이 참을 수 없다."

[[dialogue]]
speaker = "unk"
original = "緊張感からか膣の締まりも格段に強くなっていて、快感と背徳感にビクつくおま○こが気持ちいい。"
translation = "긴장감 때문인지 질의 조임도 각별히 강해져 있어, 쾌감과 배덕감에 움찔거리는 보지가 기분 좋다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あひぃんっっ<emoji=heart04>\u3000あ゛はぁぁっ<emoji=heart04>\u3000ら、らめれふっ、動いちゃらめぇっ……<emoji=heart04>」"
translation = "「아히잉<emoji=heart04> 아하아아앗<emoji=heart04> 아, 안 돼레후우, 움직이면 안 돼에……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「声、出ちゃいましゅってばぁっ<emoji=heart04>\u3000イクっ、イっちゃっ<emoji=heart04>\u3000イ゛っっ──ん゛んン゛ンンン゛ンっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「목소리, 나와버린다고요오<emoji=heart04> 가버려, 가버려어<emoji=heart04> 가아앗── 응으으으으으윽~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "我慢できずにルリエルの子宮を突き上げてしまう。"
translation = "참지 못하고 루리엘의 자궁을 밀어 올려버린다."

[[dialogue]]
speaker = "unk"
original = "声なき声を上げてイキ悶えるルリエルが可愛い。全身諸共おま○こまで痙攣させていて、そのブルブルがペニスをやらしく扱いてくる。"
translation = "소리 없는 비명을 지르며 절정에 몸부림치는 루리엘이 귀엽다. 전신은 물론 보지까지 경련시키고 있어, 그 파르르 떨림이 자지를 야하게 훑어 내린다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「んん～～～っ<emoji=heart04>\u3000バレっ、あ゛ふぅっ、見られちゃいましゅよぉっ……<emoji=heart04>」"
translation = "「응으으~~~윽<emoji=heart04> 들켜어, 아후우, 들켜버려요오……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「エッチしてりゅとこりょっ、ん゛はぁぁっ、見られちゃひましゅってばぁ……<emoji=heart04>」"
translation = "「섹스하고 이이능 거어, 응하아아앗, 들켜버린다고요오……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ダメダメと首を振る一方で、明らかにルリエルの腰振りのスピードも増していた。"
translation = "안 된다며 고개를 젓는 한편으로, 분명히 루리엘의 허리 돌림 속도도 빨라지고 있었다."

[[dialogue]]
speaker = "unk"
original = "俺が突き上げるよりもよっぽど激しくおま○こを杭打ちしてくる。"
translation = "내가 밀어 올리는 것보다 훨씬 격렬하게 보지를 말뚝질해 온다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あ゛っ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000あ゛っ<emoji=heart04>\u3000ん゛はぁああんっっ<emoji=heart04>」"
translation = "「아앗<emoji=heart04> 하앗<emoji=heart04> 아앗<emoji=heart04> 응하아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「くぁっ、イクぅっ<emoji=heart04>\u3000イクイクイクぅぅっっ<emoji=heart04>\u3000あ゛ふぁぁぁぁっっ<emoji=heart04>\u3000会長さんのおち○ちんっ、さっきより元気いっぱいでぇっ……<emoji=heart04><emoji=heart04>」"
translation = "「쿠앗, 가버려어<emoji=heart04> 가버려가버려가버려어어<emoji=heart04> 아후아아아아앗<emoji=heart04> 회장님의 자지, 아까보다 기운 가득해서어……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「すっごい音っ、ふぁあああんっ、響いちゃってましゅぅっ<emoji=heart04>\u3000繋がった場所からエッチな水音っ、ぢゅぷんぢゅぷん鳴っちゃってぇっ……<emoji=heart04>」"
translation = "「엄청난 소리, 화아아아앙, 울려버리고 있어요오<emoji=heart04> 이어진 곳에서 야한 물소리, 쥬픈쥬픈 나버려서어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "むしろわざと水音を鳴らすように動いてるみたいだ。喘ぎ声も我慢するふりしてどんどん大きくなってる気がして──"
translation = "오히려 일부러 물소리를 내듯이 움직이는 것 같다. 신음 소리도 참는 척하면서 점점 커지는 기분이 들어서──"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「だってぇっ……<emoji=heart04>\u3000おかしっ、おかしいじゃないですかぁっ……<emoji=heart04>\u3000どーしてわたしたちが我慢しなくちゃいけないんですかぁっ……<emoji=heart04>」"
translation = "「그치마안……<emoji=heart04> 이상하, 이상하잖아요오……<emoji=heart04> 왜 우리가 참아야 하는 건가요오……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「先にここを見つけてイチャついてたのは、わたしたちの方ですのにぃっ……<emoji=heart04>\u3000後から来た人のために、なんでコソコソしなくちゃいけないんですかぁ……<emoji=heart04>」"
translation = "「먼저 여기를 찾아서 꽁냥거리고 있었던 건, 우리 쪽인데에……<emoji=heart04> 나중에 온 사람 때문에, 왜 몰래몰래 해야 하는 건가요오……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「いっそ追っ払ってっ、やりましょうっ……<emoji=heart04>\u3000わたしたちのイチャイチャエッチっ、イチャイチャセックス見せつけてぇっ、あはぁんっ<emoji=heart04>\u3000出てってもらいましょうっ……<emoji=heart04>」"
translation = "「차라리 쫓아버리고, 해요오……<emoji=heart04> 우리의 꽁냥꽁냥 섹스, 꽁냥꽁냥 섹스 보여줘서어, 아하아앙<emoji=heart04> 나가게 만들어요오……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「今日はまだまだたくさんエッチするつもりなんですからぁっ……<emoji=heart04>\u3000この場所はぁ、あっ、あっ、あっ、あぁあっっ、絶対に譲りたくないんですぅっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「오늘은 아직 잔뜩 섹스할 생각이니까요오……<emoji=heart04> 이 장소느은, 앗, 앗, 앗, 아아앗, 절대로 양보하고 싶지 않아요오……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "声なら我慢すると言っていた姿はどこへやら。盛りの付いたワンコのようにルリエルが汗と愛液と嬌声を撒き散らして上下に体を揺らす。"
translation = "목소리라면 참겠다고 하던 모습은 어디 갔는지. 발정 난 강아지처럼 루리엘이 땀과 애액과 교성을 흩뿌리며 위아래로 몸을 흔든다."

[[dialogue]]
speaker = "unk"
original = "だけど、その気持ちが嬉しかった。たとえ恥ずかしい姿を人に見られようとも、それ以上に俺と愛し合いたいと思ってくれて──"
translation = "하지만, 그 마음이 기뻤다. 설령 부끄러운 모습을 남에게 보일지라도, 그 이상으로 나와 사랑을 나누고 싶어 해줘서──"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あひぃんっ、あはぁあんっ<emoji=heart04>\u3000赤ちゃんの部屋突き上げられてっ<emoji=heart04>」"
translation = "「아히잉, 아하아앙<emoji=heart04> 아기방 밀어 올려져서어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ふぁあぁああっ、イクっ、イっひゃいますぅっ<emoji=heart04>\u3000れも、えへへぇっ、ズンズンしてくれるの嬉ひっ……<emoji=heart04>」"
translation = "「화아아아아앗, 가버려, 가버려어어어어<emoji=heart04> 그래도, 에헤헤에, 즈응즈응 해주는 거 기뻐어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「わたしも、あふぁぁっ、負けませんよぉっ……<emoji=heart04>\u3000もっとおま○こ杭打ちピストンしてぇっ、会長さんのおち○ちん気持ち良くしましゅぅっ<emoji=heart04>」"
translation = "「저도, 아화아아앗, 지지 않아요오……<emoji=heart04> 더 보지 말뚝질 피스톤 해서어, 회장님의 자지 기분 좋게 해줄게요오……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "気がつけば、一心不乱に２人して腰を振りまくっていた。"
translation = "정신을 차려보니, 일심불란하게 둘이서 허리를 흔들어대고 있었다."

[[dialogue]]
speaker = "unk"
original = "離さないとばかりにギュウギュウ締め付けてくるルリエルのおま○こが気持ちいい。"
translation = "놓지 않겠다는 듯이 꽉꽉 조여오는 루리엘의 보지가 기분 좋다."

[[dialogue]]
speaker = "unk"
original = "陰唇までヒクつかせて悶えるルリエルの姿が最高にやらしくて、無我夢中で突きまくってしまう。"
translation = "음순까지 움찔거리며 괴로워하는 루리엘의 모습이 최고로 야해서, 무아몽경으로 찔러대고 만다."

[[dialogue]]
speaker_original = "女子"
speaker_translation = "여자"
original = "「っっ。ほらやっぱり先客いるっ……」"
translation = "「윽. 봐, 역시 먼저 온 사람 있잖아……」"

[[dialogue]]
speaker_original = "男子"
speaker_translation = "남자"
original = "「た、確かに声が聞こえるような……」"
translation = "「그, 그러게 목소리가 들리는 것 같기도……」"

[[dialogue]]
speaker_original = "女子"
speaker_translation = "여자"
original = "「ちょっ、あんたは見ちゃダメっ。聞いちゃダメっ。……うわ、すご、あんなに激しく……」"
translation = "「잠깐, 당신은 보면 안 돼. 들으면 안 돼. ……우와, 대박, 저렇게 격렬하게……」"

[[dialogue]]
speaker = "unk"
original = "どこからか照れたように呟く女の子の声が聞こえてくる。きっと近くの茂みにでもいるんだろう。熱い視線が注がれているのがわかって──"
translation = "어디선가 수줍게 중얼거리는 여자아이의 목소리가 들려온다. 분명 근처 수풀에라도 있는 것이리라. 뜨거운 시선이 쏟아지고 있다는 것을 알게 되어──"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「っっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000見られっ……ん゛ん゛っ……見られちゃってますぅ……<emoji=heart04>」"
translation = "「윽<emoji=heart04><emoji=heart04><emoji=heart04> 보여져어…… 응으윽…… 보여지고 있어요오……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「エッチしてるところっ、セックスしてるところっ、ん゛ふぁっ、ん゛んんっっ、知らないカップルさんに見られっ……<emoji=heart04>」"
translation = "「섹스하고 있는 거어, 섹스하고 있는 거어, 응화앗, 응으으윽, 모르는 커플 씨에게 보여져서어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「恥ずかしいけど……んんっ……<emoji=heart04>\u3000視線釘付けになっちゃってるの、あふぁぁっ、すごくわかってぇっ……<emoji=heart04>」"
translation = "「부끄럽지만…… 응으윽……<emoji=heart04> 시선 고정되어버린 거어, 아화아아앗, 너무 잘 느껴져서어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「わたしたちっ、他のカップルさんが見惚れちゃうほど激しく愛し合ってるんですねっ……<emoji=heart04>\u3000それだけ、あっ、はぁっ、ラブラブなんですねっ<emoji=heart04>」"
translation = "「우리이, 다른 커플 씨가 넋을 잃고 볼 정도로 격렬하게 사랑을 나누고 있네요오……<emoji=heart04> 그만큼, 앗, 하앗, 러브러브한 거네요오<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "羞恥心におま○こを収縮させながら、愛し合う姿をより見せつけるようにルリエルが大胆に腰を振る。"
translation = "수치심에 보지를 수축시키면서, 사랑을 나누는 모습을 더욱 보여주려는 듯 루리엘이 대담하게 허리를 흔든다."

[[dialogue]]
speaker = "unk"
original = "俺も腰を跳ね上げるのを止められない。ルリエルとのラブラブっぷりを自慢するように、見せつけるように、猛烈にピストンしてしまう。"
translation = "나도 허리를 튀어 올리는 것을 멈출 수 없다. 루리엘과의 러브러브함을 자랑하듯, 보여주듯, 맹렬하게 피스톤을 해버린다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ん゛ふぅんんんんんっっ<emoji=heart04>\u3000ん゛ぁっ、あっ、はぁっ、あぁあああんっっ<emoji=heart04>」"
translation = "「응으으으으으으윽<emoji=heart04> 응아앗, 앗, 하앗, 아아아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「こーふんしすぎですよぉっ<emoji=heart04>\u3000どれだけっ、あっ、はぁっ、見せつけたいんですかぁっ<emoji=heart04>」"
translation = "「너무 흥분했어요오<emoji=heart04> 얼마나아, 앗, 하앗, 보여주고 싶은 건가요오<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「でも嬉しいっ、嬉しいですっ<emoji=heart04>\u3000見せつけようとしてくれるのっ、あふぁっ、すっごく嬉しいっ……<emoji=heart04>」"
translation = "「하지만 기뻐요, 기뻐요오<emoji=heart04> 보여주려고 해주는 거어, 아화앗, 너무 기뻐어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「わたしとのセックスは、あっ、はぁっ、恥ずかしいことじゃないって言ってくれてるみたいでっ<emoji=heart04>\u3000それだけ好きだって言ってもらえてるみたいでっ<emoji=heart04>」"
translation = "「나와의 섹스는, 앗, 하앗, 부끄러운 게 아니라고 말해주는 것 같아서어<emoji=heart04> 그만큼 좋아한다고 말해주는 것 같아서어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「好きっ、好き好きぃっ、大好きですよぉっ、好きぃっ<emoji=heart04>」"
translation = "「좋아, 좋아 좋아아, 정말 좋아해요오, 좋아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ルリエルも全然恥ずかしくありませんっ<emoji=heart04>\u3000だって好きなんですもんっ、好きな人とセックスするくらい、あふぁっ、当たり前ですもんっ<emoji=heart04>」"
translation = "「루리엘도 전혀 부끄럽지 않아요오<emoji=heart04> 그치만 좋은걸요오, 좋아하는 사람과 섹스하는 것 정도오, 아화앗, 당연한걸요오<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ルリエルの体温が一気に上昇してくる。ただでさえグツグツの膣内がさらに火照って、ペニスにギュウギュウ抱きついてきてくれる。"
translation = "루리엘의 체온이 단숨에 상승해 온다. 가뜩이나 부글부글한 질 내부가 더욱 달아올라, 자지에 꽉꽉 매달려 온다."

[[dialogue]]
speaker = "unk"
original = "そのこれ以上ない愛情の発露が俺の性器を熱く猛らせる。この大好きな彼女に俺の愛をぶちまけたい。"
translation = "그 더할 나위 없는 애정의 발로가 나의 성기를 뜨겁게 날뛰게 한다. 이 사랑스러운 그녀에게 나의 사랑을 쏟아붓고 싶다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あふあぁあっ<emoji=heart04>\u3000おち○ちん熱いっ<emoji=heart04>\u3000きてっ、きてますっ<emoji=heart04>\u3000えへへぇっ、赤ちゃんの種、あっ、あっ、きてますぅっっ<emoji=heart04>」"
translation = "「아후아아앗<emoji=heart04> 자지 뜨거워어<emoji=heart04> 와요, 오고 있어요오<emoji=heart04> 에헤헤에, 아기 씨앗, 앗, 앗, 오고 있어요오오<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「嬉しいっ<emoji=heart04>\u3000幸せっ<emoji=heart04>\u3000この瞬間が何よりも、んぁっ、はぁっ、幸せですぅっっ<emoji=heart04>」"
translation = "「기뻐요오<emoji=heart04> 행복해에<emoji=heart04> 이 순간이 무엇보다도, 응아앗, 하앗, 행복해요오오<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「出してっ、ふぁっ、あっ、ラブラブ精子っ、ルリエルの膣内に出してくださいっっ<emoji=heart04>」"
translation = "「내보내 줘요, 화앗, 앗, 러브러브 정액, 루리엘의 질 내부에 내보내 주세요오오<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「他のカップルさんたちがヤキモチ妬いちゃうくらいっ、あふぁああっっ<emoji=heart04>\u3000わたしたちのアツアツっぷりっ、思いっきりっ、思いっきりぃっ<emoji=heart04>」"
translation = "「다른 커플 씨들이 질투해버릴 정도로오, 아화아아아앗<emoji=heart04> 우리의 뜨끈뜨끈함으을, 마음껏, 마음껏어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「見せつけてっ──あげましょ──ぅぅぅぅっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「보여줘어── 버려어──요오오오오오오윽~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あっ、あっ、あっ──あふあぁあああああああああっっ～～<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗, 앗, 앗── 아후아아아아아아아아아아앗~~<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "根元の根元まで繋がったまま、愛を溢れさせるように潮と精を噴き出し合う。"
translation = "뿌리 끝까지 이어진 채로, 사랑을 넘쳐나게 하듯 애액과 정액을 서로 뿜어낸다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ふぁぁあああっ、イクっ<emoji=heart04>\u3000イクイクイクぅぅっっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あふぁぁっ、気持ちいいっ、いつもよりいっぱい出てっ、あふぁっ、ビュービューきてぇっ<emoji=heart04>」"
translation = "「화아아아아앗, 가버려어<emoji=heart04> 가버려가버려가버려어어<emoji=heart04><emoji=heart04><emoji=heart04> 아화아앗, 기분 좋아아, 평소보다 잔뜩 나와서어, 아화앗, 뷰뷰 오고오……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「イクのとまりませっ、あああああっっ<emoji=heart04>\u3000赤ちゃんの部屋っ、あったかいっ<emoji=heart04>\u3000ラブラブ精子でっ、ふぁぁぁっ、たっぷたぷですぅっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가버리는 거 안 멈춰어, 아아아아앗<emoji=heart04> 아기방, 따뜻해에<emoji=heart04> 러브러브 정액으로오, 화아아아, 가아득해요오오<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "唾液まで零して絶頂してくれるルリエルの姿が愛しくてたまらない。"
translation = "타액까지 흘리며 절정하는 루리엘의 모습이 사랑스러워 견딜 수 없다."

[[dialogue]]
speaker = "unk"
original = "全身が痙攣するほど感じているのに、ペニスをギュウギュウ締め付けて、最後の一滴まで搾り取ろうとしてくれて……！"
translation = "전신이 경련할 정도로 느끼고 있는데도, 자지를 꽉꽉 조이며 마지막 한 방울까지 짜내려 해주고 있어……!"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あふぁぁあっ、しあわっ、幸せぇっっ……<emoji=heart04>\u3000まだ出てっ、あぁっ、ドピュドピュしてくれてますぅっ……<emoji=heart04>」"
translation = "「아화아아앗, 행복해, 행복해요오……<emoji=heart04> 아직 나와서어, 아아앗, 도퓨도퓨 해주고 있어요오……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そして、どれくらい射精し続けていただろうか──"
translation = "그리고, 얼마나 계속 사정하고 있었을까──"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あふぁっ……あはぁぁ……<emoji=heart04>\u3000こんなに、はぁはぁ、いっぱい出してくれて……<emoji=heart04>」"
translation = "「아화앗…… 아하아아……<emoji=heart04> 이렇게나, 하아하아, 잔뜩 내보내 줘서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「えへへ……<emoji=heart04>\u3000めいっぱいおま○こ閉じてるのに、んぁぁ、ボタボタ溢れ出してきちゃいますぅ……<emoji=heart04>」"
translation = "「에헤헤……<emoji=heart04> 힘껏 보지 닫고 있는데도, 응아아, 보타보타 흘러넘쳐 버려요오……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "覗き見カップルに見せつけようとしているのか、射精が終わったところでルリエルがわざわざペニスを抜いてお尻を高く持ち上げる。"
translation = "엿보는 커플에게 보여주려는 것인지, 사정이 끝난 시점에서 루리엘이 일부러 자지를 빼고 엉덩이를 높이 치켜든다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「流石に恥ずかしいって」"
translation = "「역시 부끄럽다니까」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「いいじゃないですかぁ……<emoji=heart04>\u3000自慢したいんですよぉ……<emoji=heart04>\u3000わたしの彼氏さんは、こーんなに愛を注いでくれるんですーって……<emoji=heart04>」"
translation = "「좋잖아요오……<emoji=heart04> 자랑하고 싶단 말이에요오……<emoji=heart04> 내 남자친구는, 이이~만큼 사랑을 부어준다고요오── 하고……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「そもそも、もう別の無人島を探しに行っちゃってると思いますし……<emoji=heart04>\u3000あの２人だって２人きりでイチャイチャしたいはずですもん……<emoji=heart04>」"
translation = "「애초에, 벌써 다른 무인도를 찾으러 가버렸을 거라 생각하고요……<emoji=heart04> 저 두 사람도 둘이서만 꽁냥거리고 싶을 테니까요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "確かにヒソヒソ話も聞こえない。２人で燃え上がっている間に立ち去ってしまったようだ。"
translation = "과연 속삭이는 소리도 들리지 않는다. 둘이서 불타오르는 사이에 떠나버린 모양이다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「わたしたちのアツアツっぷりの勝利ですね……<emoji=heart04>\u3000これでもう誰にも邪魔されずに一日中イチャイチャできちゃいます……<emoji=heart04>」"
translation = "「우리의 뜨끈뜨끈함의 승리네요……<emoji=heart04> 이걸로 이제 누구에게도 방해받지 않고 하루 종일 꽁냥거릴 수 있어요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「もしまた誰かがやってきても……えへへ<emoji=heart04>\u3000さっきみたいにラブラブなところ見せつけて、追っ払っちゃえばいいですし……<emoji=heart04>」"
translation = "「만약 또 누군가가 찾아와도…… 에헤헤<emoji=heart04> 아까처럼 러브러브한 모습 보여줘서, 쫓아버리면 되고요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "まだまだイチャイチャし足りないのか、ルリエルがペニスにお尻をスリスリと擦り付けてくる。"
translation = "아직도 꽁냥거림이 부족한지, 루리엘이 자지에 엉덩이를 비비적비비적 문질러 온다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「この無人島を、わたしたちだけの楽園にしちゃいましょう……<emoji=heart04>」"
translation = "「이 무인도를, 우리만의 낙원으로 만들어버려요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ルリエルと会長さんだけの、えへへ、イチャイチャアイランドですぅ<emoji=heart04>」"
translation = "「루리엘과 회장님만의, 에헤헤, 꽁냥꽁냥 아일랜드예요오<emoji=heart04>」"

