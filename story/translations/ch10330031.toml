[[dialogue]]
speaker = "unk"
original = "第１話,不健全騎士アニュラス,P"
translation = "제1화, 불건전 기사 아뉴라스, P"

[[dialogue]]
speaker = "unk"
original = "アニュラスのクリスマスフォームは意外にも附属生からの評判がいい。"
translation = "아뉴라스의 크리스마스 폼은 의외로 부속생들로부터 평판이 좋다."

[[dialogue]]
speaker = "unk"
original = "堅物のように思われがちなアニュラスは、年下の相手をすることに苦手意識があった。"
translation = "고지식하게 생각되기 쉬운 아뉴라스는, 연하의 상대를 대하는 것에 서투른 의식이 있었다."

[[dialogue]]
speaker = "unk"
original = "だが、そう思っているのは本人だけで、最近は同じ目線で一緒に遊んでくれる楽しいお姉さんと思われているらしい。"
translation = "하지만, 그렇게 생각하는 것은 본인뿐이고, 최근에는 같은 눈높이에서 함께 놀아주는 즐거운 언니로 여겨지고 있는 듯하다."

[[dialogue]]
speaker = "アニュラス"
original = "「うむ、私のクリスマスフォームについて、迷いが生じてしまってな」"
translation = "「음, 나의 크리스마스 폼에 대해, 망설임이 생겨 버려서 말이지」"

[[dialogue]]
speaker = "アニュラス"
original = "「あ、いや！\u3000別に不満はないんだ。最初こそ、実戦では使えないパーティーグッズかと落胆したが、その有用性に気付いた今、何の不満もない」"
translation = "「아, 아니! 별로 불만은 없다. 처음에는, 실전에서는 사용할 수 없는 파티 용품인가 하고 낙담했지만, 그 유용성을 깨달은 지금, 아무런 불만도 없다」"

[[dialogue]]
speaker = "アニュラス"
original = "「私のバズーカクラッカーは安心安全な上、非常に派手なのが好評でな。皆から撃って欲しいとせがまれるんだ。それについては嬉しく思っている」"
translation = "「나의 바주카 크래커는 안심 안전한 데다, 매우 화려한 것이 호평이라서 말이지. 모두에게 쏴 달라고 조름을 받는다. 그것에 대해서는 기쁘게 생각하고 있다」"

[[dialogue]]
speaker = "アニュラス"
original = "「が……武装の優秀さにかまけて、それ以外に目を向けることを忘れてしまっていた」"
translation = "「하지만…… 무장의 우수함에만 신경 쓰고, 그 외에 눈을 돌리는 것을 잊어 버리고 있었다」"

[[dialogue]]
speaker = "unk"
original = "どういうこと？"
translation = "무슨 말이야?"

[[dialogue]]
speaker = "unk"
original = "それ以外のこと？"
translation = "그 외의 것?"

[[dialogue]]
speaker = "アニュラス"
original = "「バズーカクラッカーの試射をしていたら、予想外のクレームが来てしまってな」"
translation = "「바주카 크래커의 시험 사격을 하고 있었더니, 예상치 못한 클레임이 들어와 버려서 말이지」"

[[dialogue]]
speaker = "アニュラス"
original = "「音がうるさいとか、近所迷惑とか、ビックリしたとか、そういう文句は私も覚悟していたんだ」"
translation = "「소음이 심하다거나, 이웃에게 민폐라거나, 깜짝 놀랐다거나, 그런 불평은 나도 각오하고 있었군」"

[[dialogue]]
speaker = "アニュラス"
original = "「だがしかし……そのー、なんだ？\u3000私も簡単なことでは揺らがないつもりだったが、今回ばかりは正直参ったよ」"
translation = "「하지만 그러나…… 그게, 뭐냐? 나도 웬만한 일에는 흔들리지 않을 생각이었다만, 이번만큼은 솔직히 손을 들었군」"

[[dialogue]]
speaker = "アニュラス"
original = "「クレームによると……どうやら私は不健全らしい」"
translation = "「클레임에 따르면…… 아무래도 나는 불건전한 모양이다」"

[[dialogue]]
speaker = "アニュラス"
original = "「附属生には教育上よろしくないと言われたんだ！\u3000そんなことあるか！？\u3000非常に納得がいかない誹謗中傷だ！」"
translation = "「부속생들에게는 교육상 좋지 않다는 말을 들었군! 그런 일이 있을 수 있나!? 매우 납득이 가지 않는 비방중상이다!」"

[[dialogue]]
speaker = "unk"
original = "誹謗中傷は許せない！"
translation = "비방중상은 용서할 수 없어!"

[[dialogue]]
speaker = "unk"
original = "アニュラスは健全だ！"
translation = "아뉴라스는 건전해!"

[[dialogue]]
speaker = "アニュラス"
original = "「ふふっ、同情してくれて感謝する。私も言われたときはカッとなって、そのように思ったんだ」"
translation = "「후훗, 동정해 주니 감사하군. 나도 그 말을 들었을 때는 욱해서 그렇게 생각했다네」"

[[dialogue]]
speaker = "アニュラス"
original = "「しかし、事の詳細を聞いて納得した。確かに私は騎士の風上にも置けぬ、不健全極まりない女だったようだ」"
translation = "「하지만, 사건의 상세한 내용을 듣고 납득했지. 확실히 나는 기사의 풍상에도 두지 못할, 불건전하기 짝이 없는 여자였던 모양이다」"

[[dialogue]]
speaker = "アニュラス"
original = "「問題はクリスマスフォームの形状だ。……破廉恥すぎると烙印を押されてしまって」"
translation = "「문제는 크리스마스 폼의 형상이다. ……너무 파렴치하다고 낙인이 찍혀버려서」"

[[dialogue]]
speaker = "unk"
original = "他のみんなと同じくらいだと思うけど"
translation = "다른 애들이랑 비슷한 정도라고 생각하는데"

[[dialogue]]
speaker = "unk"
original = "破廉恥って言うほど露出度高くない"
translation = "파렴치라고 할 정도로 노출도가 높지는 않아"

[[dialogue]]
speaker = "アニュラス"
original = "「そうなんだ。だから最初は誹謗中傷だと感じた。可愛い衣装は私には似合わないと思っていたが、破廉恥と誹りを受けるほどではないとな」"
translation = "「그렇군. 그래서 처음에는 비방중상이라고 느꼈다. 귀여운 의상은 나에게 어울리지 않는다고 생각했지만, 파렴치하다고 비난을 받을 정도는 아니라고 말이지」"

[[dialogue]]
speaker = "アニュラス"
original = "「まあ、まずは見てくれ。変身っ」"
translation = "「뭐, 우선은 봐 주게. 변신!」"

[[dialogue]]
speaker = "アニュラス"
original = "「……こんな感じだ。今の私を見てどう感じた？\u3000率直な意見を聞かせて欲しい」"
translation = "「……이런 느낌이다. 지금의 나를 보고 어떻게 느꼈나? 솔직한 의견을 들려주었으면 하군」"

[[dialogue]]
speaker = "unk"
original = "ギュッてしたい"
translation = "꽉 안아주고 싶어"

[[dialogue]]
speaker = "unk"
original = "かわいい"
translation = "귀여워"

[[dialogue]]
speaker = "アニュラス"
original = "「お、お前っ！\u3000いい、いきなり何を言い出すんだ！」"
translation = "「너, 너! 가, 갑자기 무슨 소리를 하는 건가!」"

[[dialogue]]
speaker = "アニュラス"
original = "「そういうのは時と場所をわきまえろ。ここは大勢が集うカフェテリアだぞ。いくらその……こ、恋人であっても、抱き合ったりキスしたりは、なしだっ！」"
translation = "「그런 건 때와 장소를 가리게. 여기는 많은 사람이 모이는 카페테리아라고. 아무리 그…… 거, 연인이라 해도, 서로 껴안거나 키스하거나 하는 건, 안 되네!」"

[[dialogue]]
speaker = "アニュラス"
original = "「私を好いてくれているのは嬉しいが、誰もいないときにしてくれ。放課後ならば、その、お前のしたいようにして構わないから<emoji=heart04>」"
translation = "「나를 좋아해 주는 건 기쁘지만, 아무도 없을 때 해 주게. 방과 후라면, 그, 네가 하고 싶은 대로 해도 상관없으니까<emoji=heart04>」"

[[dialogue]]
speaker = "アニュラス"
original = "「って、本題からズレてるぞ！\u3000話を元に戻す」"
translation = "「아니, 본론에서 벗어났군! 이야기를 원래대로 되돌리겠다」"

[[dialogue]]
speaker = "アニュラス"
original = "「確かにこのクリスマスフォームは可愛い。私には勿体ないくらい華やかで可憐な装いだ。露出度も破廉恥と言われるほどではないはず」"
translation = "「확실히 이 크리스마스 폼은 귀엽군. 나에게는 과분할 정도로 화려하고 가련한 복장이다. 노출도도 파렴치하다는 말을 들을 정도는 아닐 터」"

[[dialogue]]
speaker = "アニュラス"
original = "「そう思っていたのだが……大きな落とし穴があったんだ」"
translation = "「그렇게 생각했다만…… 커다란 함정이 있었군」"

[[dialogue]]
speaker = "アニュラス"
original = "「通常時は問題ない。だから私も気付かなかった。問題はバズーカを発射したときだ。どういうことかと言うとだな……」"
translation = "「평상시에는 문제없다. 그래서 나도 눈치채지 못했지. 문제는 바주카를 발사했을 때다. 어떻게 된 거냐 하면 말이지……」"

[[dialogue]]
speaker = "アニュラス"
original = "「バズーカを撃つと、パンツが見えてしまうんだ！」"
translation = "「바주카를 쏘면, 팬티가 보여버린단 말이다!」"

[[dialogue]]
speaker = "unk"
original = "パンチラするのか！？"
translation = "판치라를 하는 건가!?"

[[dialogue]]
speaker = "unk"
original = "……は！？"
translation = "……하!?"

[[dialogue]]
speaker = "アニュラス"
original = "「た、たまにだぞ、たまに。ただ、発射時の衝撃はなかなか凄いんだ。スカートの前面が短いから、油断するとピラッとめくれてしまうらしい」"
translation = "「가, 가끔이라네, 가끔. 다만, 발사 시의 충격이 꽤 대단하거든. 스커트 앞면이 짧아서, 방심하면 펄럭하고 들려버리는 모양이다」"

[[dialogue]]
speaker = "アニュラス"
original = "「おい待て、なんだその目は？\u3000頼まれたってこんなところで実演しないぞ。不健全騎士という評価を受けたくないからな！」"
translation = "「이봐 잠깐, 뭐야 그 눈은? 부탁받아도 이런 곳에서 실연하진 않을 거다. 불건전 기사라는 평가를 받고 싶지 않으니까 말이야!」"

[[dialogue]]
speaker = "アニュラス"
original = "「おねだりしても駄目だぞ。先程も言ったがそういうのは後だ。どうしても見たいというなら……考えてやらんこともないから、とにかく放課後まで我慢するんだ！」"
translation = "「조른다고 해도 안 된다네. 아까도 말했지만 그런 건 나중이다. 정 보고 싶다면…… 생각해보지 못할 것도 없으니, 어쨌든 방과 후까지 참게!」"

[[dialogue]]
speaker = "アニュラス"
original = "「ふふっ、いい子だ。お前の恋人であることは忘れていないから安心してくれ。ただ、今は騎士の時間だ。分けて考えて欲しい」"
translation = "「후훗, 착한 아이로군. 네 연인이라는 것은 잊지 않았으니 안심하게나. 다만, 지금은 기사의 시간이다. 나누어서 생각해 주었으면 하군」"

[[dialogue]]
speaker = "アニュラス"
original = "「やかましいと文句を言われても反論出来るが……バズーカを撃つと下着が見えると言われては、もう何も言い返せなくて」"
translation = "「시끄럽다고 불평을 들어도 반론할 수 있지만…… 바주카를 쏘면 속옷이 보인다는 말을 들어서는, 이제 아무 대꾸도 할 수 없어서 말이지」"

[[dialogue]]
speaker = "アニュラス"
original = "「だから、パーティー当日までクリスマスフォームを封印しようと考えているんだ」"
translation = "「그래서, 파티 당일까지 크리스마스 폼을 봉인하려고 생각 중이다」"

[[dialogue]]
speaker = "アニュラス"
original = "「私のような女がパンツを見せてしまうのは、附属生の教育にもよくないだろう。いたずらに刺激するような真似は決して許されざる行為だからな」"
translation = "「나 같은 여자가 팬티를 보여버리는 것은, 부속생들의 교육에도 좋지 않겠지. 공연히 자극하는 듯한 짓은 결코 허용되지 않는 행위니까 말이다」"

[[dialogue]]
speaker = "アニュラス"
original = "「皆の期待に応えられないのは、本当に残念でならないんだが……」"
translation = "「모두의 기대에 부응하지 못하는 것은, 정말 유감스럽기 그지없다만……」"

[[dialogue]]
speaker = "unk"
original = "その程度で諦めてしまうのか？"
translation = "그 정도로 포기해버리는 거야?"

[[dialogue]]
speaker = "unk"
original = "皆の期待に応えてこそ騎士だ！"
translation = "모두의 기대에 부응해야말로 기사다!"

[[dialogue]]
speaker = "アニュラス"
original = "「……そうだな、お前の言う通りだ。こんなところで諦めては騎士の名折れ。パンチラを阻止することに全力を注げばいいだけだ！」"
translation = "「……그렇군, 네 말이 맞다. 이런 곳에서 포기해서는 기사의 수치. 판치라를 저지하는 것에 전력을 다하면 될 뿐이다!」"

[[dialogue]]
speaker = "アニュラス"
original = "「バズーカの衝撃が来るとわかっているなら受け流せ！\u3000騎士ならばそのくらい出来て当然だ！」"
translation = "「바주카의 충격이 올 것을 알고 있다면 받아넘겨라! 기사라면 그 정도는 할 수 있는 게 당연하다!」"

[[dialogue]]
speaker = "アニュラス"
original = "「感謝するぞ、会長！\u3000１人で悩んでいても解決出来なかったが、お前に相談に乗ってもらって道が開けたぞ」"
translation = "「감사하네, 회장! 혼자서 고민해도 해결할 수 없었지만, 너에게 상담을 받아서 길이 열렸군」"

[[dialogue]]
speaker = "アニュラス"
original = "「よーし、今から特訓だ！\u3000バズーカを撃っても絶対にパンチラしない完全防御を身につけるぞ！」"
translation = "「좋아, 지금부터 특훈이다! 바주카를 쏴도 절대로 판치라하지 않는 완전방어를 몸에 익히겠다!」"

[[dialogue]]
speaker = "unk"
original = "こうして、アニュラスはパンチラしない特訓をすることになった。"
translation = "이렇게 해서, 아뉴라스는 판치라하지 않는 특훈을 하게 되었다."

[[dialogue]]
speaker = "unk"
original = "完全防御を会得するまで、さほど時間はかからなかったが、何度も可愛いパンチラを見せてもらうのだった。"
translation = "완전방어를 터득할 때까지 그리 오랜 시간은 걸리지 않았지만, 몇 번이고 귀여운 판치라를 보여주게 되었다."

