[[dialogue]]
speaker = "unk"
original = "週末──アナとシュティレは２人きりで街を散策していた。"
translation = "주말── 아나와 슈틸레는 둘이서 거리를 산책하고 있었다."

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「まさかアナお姉ちゃんから、遊びに誘っていただけるとは。ぶいぶい」"
translation = "「설마 아나 언니가 놀러 가자고 권해 주실 줄이야. 브이브이.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「おお、いきなりダブルピース」"
translation = "「오, 갑자기 더블 피스.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「イエス。私は顔つきで感情表現するのが苦手なので、身振り手振りでテンションぶち上げなことをアピールです」"
translation = "「예스. 저는 얼굴로 감정 표현하는 게 서툴러서 몸짓 발짓으로 텐션이 엄청 올라갔다는 걸 어필하는 중입니다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「喜んでもらえて何よりです。ここのところ、兵器開発と出撃が続いていたので、今日は英気を養いましょう」"
translation = "「기뻐해 주니 다행이네요. 최근 병기 개발과 출격이 이어졌으니 오늘은 영기를 기릅시다.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「承知しました。優れた戦士となるために、休養もまた戦いです」"
translation = "「알겠습니다. 뛰어난 전사가 되기 위해 휴식 또한 전투입니다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……ギガンドムの１８話。名言ですね」"
translation = "「……기간돔 18화. 명언이네요.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「おぉ、アナお姉ちゃん。もうそこまで視聴していただけたのですね。感激です」"
translation = "「오오, 아나 언니. 벌써 거기까지 시청해 주신 건가요. 감격입니다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「人に勧められたものは必ず見るようにしています。私のポリシーみたいなものですね」"
translation = "「남에게 추천받은 건 반드시 보도록 하고 있어요. 제 소신 같은 거죠.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「さて、それじゃあ街をぶらつきましょうか。シュティレさんと一緒に楽しめる場所、色々と考えてきていますので」"
translation = "「자, 그럼 거리를 좀 돌아다녀 볼까요? 슈틸레 씨와 함께 즐길 수 있는 장소, 여러모로 생각해 왔거든요.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「クレーンゲーム限定プライズ、ギガンドムキーホルダー……恐ろしい相手です。すでに数百テルス、飲まれてしまいました。形勢不利」"
translation = "「인형 뽑기 한정 경품, 기간돔 키홀더…… 무서운 상대입니다. 이미 수백 텔루스 삼켜졌습니다. 형세 불리.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ですが布石は打ちました。キャッチャーのアームを、傾いた体の下へ差し込んで……！」"
translation = "「하지만 포석은 깔았습니다. 집게의 팔을 기운 몸체 아래로 찔러넣어서……!」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「釣り上がりました。この状態ならば、勝利を確信しても良いかと愚考します。つまり──」"
translation = "「낚아 올렸습니다. 이 상태라면 승리를 확신해도 좋다고 우고합니다. 즉──」"

[[dialogue]]
speaker = "unk"
original = "ギガンドムのキーホルダーが受け取りボックスへ落下するのを見た後、ハイタッチ。"
translation = "기간돔 키홀더가 배출구로 떨어지는 것을 본 뒤 하이파이브."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「取ったど～」"
translation = "「뽑았드아~」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「やったど～」"
translation = "「해냈드아~」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「なるほど、これが抹茶ソフトクリーム。洋菓子をベースに、和菓子のフレーバーを追加装備している。とても美味です」"
translation = "「과연, 이것이 말차 소프트아이스크림. 서양 과자를 베이스로 일본 과자의 풍미를 추가 장비하고 있다. 매우 맛있습니다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「一仕事を終えた後のスイーツは格別。このアイスの露店、休日しか姿を見せないレア店舗なので注意です」"
translation = "「한바탕 일을 마친 뒤의 디저트는 각별하죠. 이 아이스크림 노점은 휴일에만 나타나는 레어 점포니까 주의하세요.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「心得ました。しかしアナお姉ちゃんは本当に多才ですね。星徒会の副会長というから、もっと勉学と鍛錬に一筋の御方かと思っていました」"
translation = "「숙지했습니다. 그런데 아나 언니는 정말 다재다능하시네요. 성도회 부회장이라기에 좀 더 학업과 단련에만 매진하는 분인 줄 알았습니다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「うちの先輩方、顔が広くて色々な人とのコミュニティがあるんです。それに星徒会はトラブルシューターなところもありまして」"
translation = "「우리 선배님들이 발이 넓어서 다양한 사람들과 커뮤니티가 있거든요. 게다가 성도회는 트러블 슈터 같은 면도 있고요.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ゲームセンターで遊ぶのを覚えたのも、その流れというか……」"
translation = "「게임 센터에서 노는 법을 배운 것도 그런 흐름이랄까……」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「理解。やはり所属するコミュニティは大事ということですね……はむ」"
translation = "「이해. 역시 소속된 커뮤니티는 중요하다는 거군요…… 함.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「だったら私はやっぱり、マスターに何とか弟子入りを認めてもらわねばなりません。はむ、はむ」"
translation = "「그렇다면 저는 역시 마스터에게 어떻게든 제자 입문을 인정받아야만 합니다. 함, 함.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "（……表情からは読み取れませんが、気落ちしているようですね。だったら──）"
translation = "(……표정으로는 읽을 수 없지만 기가 죽어 있는 것 같네요. 그렇다면──)"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「シュティレさん、どうでしょう。今から例の駅前広場の方に行ってみませんか」"
translation = "「슈틸레 씨, 어떨까요. 지금부터 아까 그 역 앞 광장 쪽으로 가보지 않을래요?」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「駅前広場……ギガンドムの立像ですか？」"
translation = "「역 앞 광장…… 기간돔 입상 말인가요?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ええ。以前と違って今の私は、アニメをある程度視聴しています。前回とは違った気分で鑑賞できるのではと思いまして」"
translation = "「네. 이전과 달리 지금의 저는 애니메이션을 어느 정도 시청했거든요. 지난번과는 다른 기분으로 감상할 수 있지 않을까 해서요.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「ギガンドムに会えるのならば、２４時間いつでもＯＫです。参りましょう」"
translation = "「기간돔을 만날 수 있다면 24시간 언제든 OK입니다. 가시죠.」"

[[dialogue]]
speaker = "unk"
original = "ギガンドムの展示されている広場は、休日ということもあり大賑わいだった。"
translation = "기간돔이 전시된 광장은 휴일이기도 해서 대성황이었다."

[[dialogue]]
speaker = "unk"
original = "ぷしゅーっと蒸気を模したスモークを吐いており、そのたびに歓声がそこかしこで上がっている──"
translation = "푸슉 하며 증기를 모방한 연기를 뿜고 있었고, 그때마다 여기저기서 함성이 터져 나왔다──"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「相変わらず凄い大きさですね。アニメを見た後だと、さらに迫力があるように感じます」"
translation = "「여전히 엄청난 크기네요. 애니메이션을 본 뒤라 그런지 더 박력이 느껴져요.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「はい。ギガンドムの雄姿、今日もばっちりＤＩＳＣに保存できました。ぶい」"
translation = "「네. 기간돔의 웅시, 오늘도 확실히 DISC에 저장했습니다. 브이.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ところでシュティレさん、このギガンドム、私が視聴中のものとは色合いが違うのですが……」"
translation = "「그런데 슈틸레 씨, 이 기간돔, 제가 시청 중인 것과는 색감이 다른데요……」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「アナお姉ちゃんの見ている１８話あたりで、主人公は改良型ギガンドム・マーク２に乗り換えます」"
translation = "「아나 언니가 보고 계시는 18화 즈음에 주인공은 개량형 기간돔 마크 2로 갈아탑니다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ええ。初代ギガンドムでは強くなる敵に対して、エネルギー出力が足りないため、後継機を製造していました」"
translation = "「네. 초대 기간돔으로는 강해지는 적에 비해 에너지 출력이 부족해서 후계기를 제조했었죠.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「ですがこの後、さらなる強敵が現れて、マーク２も破壊されてしまうのです」"
translation = "「하지만 이 이후에 더 강력한 적이 나타나서 마크 2도 파괴되어 버립니다.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「強大な敵を倒すため、主人公は残された旧型ギガンドム──目の前にあるこの機体で最終決戦に挑むのです」"
translation = "「강대한 적을 쓰러뜨리기 위해 주인공은 남겨진 구형 기간돔── 눈앞에 있는 이 기체로 최종 결전에 도전하는 것입니다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「それは、勝てるのですか……？」"
translation = "「그건, 이길 수 있나요……?」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「スペック的には圧倒的に敗北しています。けれど主人公にはそこまで培ってきた経験と、諦めない心が宿っていて──はっ！？」"
translation = "「스펙상으로는 압도적으로 패배합니다. 하지만 주인공에게는 그때까지 쌓아온 경험과 포기하지 않는 마음이 깃들어 있어서── 앗!?」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「す、すみません。うっかりネタバレをしてしまいました……アニメを追っている方に、とんでもない失態を……！」"
translation = "「죄, 죄송합니다. 그만 스포일러를 해버렸습니다…… 애니메이션을 정주행 중인 분께 엄청난 실수를……!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「問題ありません。優れたカルチャーは、ネタバレされてなお、味わいのあるものですから」"
translation = "「문제없어요. 뛰어난 문화는 스포일러를 당해도 여전히 맛이 있는 법이니까요.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「しかし冷静なシュティレさんがそこまで熱くなるとは……やっぱりギガンドム、大好きなんですね」"
translation = "「그나저나 냉정한 슈틸레 씨가 그렇게까지 뜨거워지다니…… 역시 기간돔을 정말 좋아하시는군요.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「はい。ロボットは私の憧れであり、ロマンの塊ですから」"
translation = "「네. 로봇은 저의 동경이자 로망의 결정체니까요.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……シュティレさん。今ギガンドムについて語ったのと同じような、熱い想いをアニマ先輩にぶつけてみればいいのではないでしょうか？」"
translation = "「……슈틸레 씨. 방금 기간돔에 대해 이야기한 것과 같은 뜨거운 마음을 아니마 선배님께 부딪쳐 보는 건 어떨까요?」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「以前に『ロマンが足りない』という理由をもって、弟子入りを断られていましたよね」"
translation = "「이전에 『로망이 부족하다』는 이유로 제자 입문을 거절당하셨죠.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「色々と考えてみたのですが……やっぱりシュティレさんが抱えている、錬金術を学びたいという気持ちを熱く表明するのが一番かと思うんです」"
translation = "「여러모로 생각해 봤는데…… 역시 슈틸레 씨가 품고 있는 연금술을 배우고 싶다는 마음을 뜨겁게 표명하는 게 제일이라고 생각해요.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「機械技術の活用に才能を持つシュティレさんが、アニマ先輩の元で錬金術を学びたい理由……」"
translation = "「기계 기술 활용에 재능을 가진 슈틸레 씨가 아니마 선배님 밑에서 연금술을 배우고 싶은 이유……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「それを熱く語ることができれば、きっと弟子入りだってできます。よろしければ、私を相手に練習してみるのはどうでしょうか？」"
translation = "「그걸 뜨겁게 말할 수 있다면 분명 제자 입문도 할 수 있을 거예요. 괜찮다면 저를 상대로 연습해 보는 건 어떨까요?」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「私が、アナお姉ちゃんを相手に……？」"
translation = "「제가 아나 언니를 상대로……?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はい。アニマ先輩の琴線に触れるトークを判断できるかはわかりませんが、熱い想い──ロマンはきっと三界で共通の感情のはず」"
translation = "「네. 아니마 선배님의 심금을 울릴 화술인지 판단할 수 있을지는 모르겠지만, 뜨거운 마음── 로망은 분명 삼계 공통의 감정일 테니까요.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「せっかく仲良くなれたのですから、力になりたい。私はそう思っています」"
translation = "「모처럼 친해졌으니 힘이 되고 싶어요. 저는 그렇게 생각합니다.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「……驚きました。私に対して、そこまで言ってくれるような方は今まで、いらっしゃいませんでした」"
translation = "「……놀랐습니다. 저에 대해 그렇게까지 말씀해 주시는 분은 지금까지 없었습니다.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「流石は新星学園の誇る天才。アナお姉ちゃんは、お気遣いもできる素敵な方なのですね」"
translation = "「과연 신성학원이 자랑하는 천재. 아나 언니는 배려심도 깊은 멋진 분이시군요.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……そうじゃないです。私は、お世話になっている先輩方の真似をしている、だけなんですよ」"
translation = "「……그렇지 않아요. 저는 신세를 지고 있는 선배님들을 흉내 내고 있을 뿐이에요.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「新星星徒会の……？」"
translation = "「신성학생회의……?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そうです。うちの会長も、ヴィーナス前会長も、サーシャ先輩もマトイ先輩も……いつも誰かの悩みやトラブルと向き合っています」"
translation = "「맞아요. 우리 회장님도, 비너스 전 회장님도, 사샤 선배님도 마토이 선배님도…… 언제나 누군가의 고민이나 트러블과 마주하고 계시거든요.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「困っている人を放っておけない人達で……私も、いつも助けてもらってばかり」"
translation = "「곤란해하는 사람을 그냥 두지 못하는 분들이라…… 저도 언제나 도움만 받고 있고요.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "（日々の雑務に置いては、私が助けることの方が多い……。でも、本質はそうじゃない）"
translation = "(일상적인 잡무에 있어서는 내가 돕는 일이 더 많아……. 하지만 본질은 그게 아니야.)"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "（勝てないという絶望、きっと死んでしまうのだろうという恐怖、そういった本当の脅威──リクリエと向かい合った時、私はただ、会長たちに付いていくことしかできなかった）"
translation = "(이길 수 없다는 절망, 분명 죽게 될 거라는 공포, 그런 진짜 위협── 리크리에와 마주했을 때 나는 그저 회장님들을 따라가는 것밖에 할 수 없었어.)"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "（普段の私が自分の力を十分発揮できるのも、結局先輩たちがお膳立てしてくれているからだということも……わかっています）"
translation = "(평소의 내가 내 힘을 충분히 발휘할 수 있는 것도 결국 선배들이 판을 깔아주고 있기 때문이라는 걸…… 알고 있어요.)"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「だからでしょうか。憧れている人達と早く並びたい、そのためにまずは心構えから、あの人達と同じでありたいと思っているのかも……」"
translation = "「그래서일까요. 동경하는 사람들과 빨리 어깨를 나란히 하고 싶어서, 그러기 위해 우선 마음가짐부터 그분들과 같아지고 싶어 하는 걸지도……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「すみません。急にペラペラと。最近、私も伸び悩んでいるので、シュティレさんの葛藤が他人事に思えなくて」"
translation = "「죄송해요. 갑자기 주저리주저리. 최근 저도 정체기라 슈틸레 씨의 갈등이 남 일 같지 않아서요.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「アナお姉ちゃんが、伸び悩み……？\u3000意外です。何でもサクサクとこなせる才女だと評判なのですが」"
translation = "「아나 언니가 정체기……? 의외입니다. 무엇이든 척척 해내는 재녀라고 평판이 자자한데.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「守護天使の義体制作。人工戦闘服の開発にも携わる。おまけに新入生でありながら、星徒会にも抜擢された天才……」"
translation = "「수호천사의 의체 제작. 인공 전투복 개발에도 관여. 게다가 신입생이면서 학생회에도 발탁된 천재……」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「皆さん、アナお姉ちゃんをそのように言っています。そんなアナお姉ちゃんが躓いているだなんて、驚きです」"
translation = "「다들 아나 언니를 그렇게 말합니다. 그런 아나 언니가 막혀 있다니 놀라워요.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ええ。私は今、新星星徒会で一番のお荷物です。機械型モンスターに対して有利に立ち回れる、ノヴァフォームの覚醒に至っていませんから」"
translation = "「네. 저는 지금 신성학생회에서 제일가는 짐덩어리예요. 기계형 몬스터를 상대로 유리하게 싸울 수 있는 노바 폼 각성에 이르지 못했으니까요.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「うちの先輩……会長も含め、全員が慌てなくてよいと言ってくれますが、焦らないわけにはいかなくて」"
translation = "「우리 선배…… 회장님을 포함해서 전원이 서두르지 않아도 된다고 말씀하시지만, 초조해하지 않을 수가 없어서.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「弱体化薬の制作を依頼したのだって、弱い自分が少しでも役に立てることを模索した結果なんです」"
translation = "「약화약 제작을 의뢰한 것도 약한 내가 조금이라도 도움이 될 수 있는 길을 모색한 결과예요.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「……アナお姉ちゃん。そんなに悩んでいるのに、シュティレのことまで……」"
translation = "「……아나 언니. 그렇게 고민하고 계시면서 슈틸레 일까지……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「うちの会長の真似です。あの人はどんなに自分が辛い時でも、他人の為に頑張れる人なので……」"
translation = "「우리 회장님 흉내예요. 그 사람은 아무리 자신이 힘들 때라도 타인을 위해 노력하는 사람이라서……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「私にとって、憧れなんですよ。あの人は」"
translation = "「저에게 있어 동경이거든요, 그 사람은.」"

[[dialogue]]
speaker = "unk"
original = "──アナはここまで自分の胸中を他人に喋ったことはなかった。"
translation = "──아나는 지금까지 자신의 속마음을 남에게 이토록 털어놓은 적이 없었다."

[[dialogue]]
speaker = "unk"
original = "──そしてシュティレもまた、ここまで胸中を吐露してくれた相手に報いたいと思った。"
translation = "──그리고 슈틸레 또한, 여기까지 속마음을 토로해 준 상대에게 보답하고 싶다고 생각했다."

[[dialogue]]
speaker = "unk"
original = "──師匠と呼ぶアニマにすら語れなかった自分の夢。そこにロマンがあるか否かを判断してもらいたいと思った。"
translation = "──스승이라 부르는 아니마에게조차 말하지 못했던 자신의 꿈. 그곳에 로망이 있는지 없는지를 판단 받고 싶다고 생각했다."

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「……アナお姉ちゃんは、巨大ロボットってどう思いますか？」"
translation = "「……아나 언니는 거대 로봇에 대해 어떻게 생각하시나요?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……？\u3000どう、とは」"
translation = "「……? 어떻게라니.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「すみません。もっと正確に言います……」"
translation = "「죄송합니다. 좀 더 정확하게 말할게요……」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「巨大ロボットを作りたいと言う人を見て、どう思いますか？」"
translation = "「거대 로봇을 만들고 싶다는 사람을 보면 어떻게 생각하시나요?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「あの、ギガンドムみたいな？」"
translation = "「저기, 기간돔 같은 거?」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「そうです。あのサイズの、人が乗り込むことのできる巨大ロボット。それを現実に作りたいだなんて言う女の子を、先輩はどう思いますか？」"
translation = "「맞습니다. 저 사이즈의 사람이 올라탈 수 있는 거대 로봇. 그걸 현실에 만들고 싶다고 말하는 여자아이를 선배는 어떻게 생각하시나요?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そう、ですね……私は──」"
translation = "「그으, 쎄…… 나는──」"

[[dialogue]]
speaker = "unk"
original = "ずずん──地面が大きく揺れる。"
translation = "즈즌── 지면이 크게 흔들린다."

[[dialogue]]
speaker = "unk"
original = "１回では収まらず、２度。"
translation = "한 번으로 끝나지 않고 두 번."

[[dialogue]]
speaker = "unk"
original = "３度──アナとシュティレは、振動する方向へ目を向ける。"
translation = "세 번── 아나와 슈틸레는 진동하는 방향으로 눈을 돌린다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「…………嘘、でしょう？」"
translation = "「…………거짓말, 이죠?」"

[[dialogue]]
speaker = "unk"
original = "立像のギガンドムは、あくまで身じろぎをする程度。歩行なんてするはずがない。"
translation = "입상인 기간돔은 어디까지나 몸을 움찔거리는 정도. 보행 같은 걸 할 리가 없다."

[[dialogue]]
speaker = "unk"
original = "それなのに、ずずん、ずずん──ギガンドムの立像は、一歩一歩、大地を踏みしめるように移動していた。"
translation = "그런데도 즈즌, 즈즌── 기간돔 입상은 한 걸음 한 걸음 대지를 짓밟으며 이동하고 있었다."

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「アナお姉ちゃん、これは……！？」"
translation = "「아나 언니, 이건……!?」"

[[dialogue]]
speaker = "unk"
original = "リクリエの瘴気に、展示されていたギガンドムが侵されている──"
translation = "리크리에의 장기에 전시되어 있던 기간돔이 침식당해 있다──"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「シュティレさん、変身を！\u3000民間人の避難誘導をお願いします！」"
translation = "「슈틸레 씨, 변신을! 민간인 피난 유도를 부탁합니다!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ギガンドムがモンスター化……新型の機械型モンスターと断定！\u3000戦闘に移ります！！」"
translation = "「기간돔이 몬스터화…… 신형 기계형 몬스터로 단정! 전투에 돌입합니다!!」"

