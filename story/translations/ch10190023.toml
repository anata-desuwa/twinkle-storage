[[dialogue]]
speaker = "unk"
original = "第３話,恩返しチョコ,P"
translation = "제3화, 보답 초코, P"

[[dialogue]]
speaker = "unk"
original = "俺とせつなが恋人になってから迎えた、初めてのバレンタイン。"
translation = "나와 세츠나가 연인이 되고 나서 맞이한 첫 발렌타인."

[[dialogue]]
speaker = "unk"
original = "色々あったが、『主様チョコ』兼『本命チョコ』を無事受け取ることができた。その翌日──"
translation = "여러 일이 있었지만 『주군 초코』 겸 『진심 초코』를 무사히 받을 수 있었다. 그 다음 날──"

[[dialogue]]
speaker = "せつな"
original = "「それではさっそく、紫桜の里やメイド隊の仲間に配るチョコレートを作っていくでござる！」"
translation = "「그러면 당장 시오의 마을이나 메이드대 동료들에게 나눠줄 초콜릿을 만들겠소!」"

[[dialogue]]
speaker = "せつな"
original = "「えへへぇ～♪\u3000主様と厨房に並んでいると、ちょっと新婚さん気分でござる」"
translation = "「에헤헤~♪ 주군과 주방에 나란히 서 있으니 좀 신혼부부 기분이오.」"

[[dialogue]]
speaker = "せつな"
original = "「へ？\u3000せつなも恋愛の話がちょっとはできるようになってきた、でござるか……？」"
translation = "「헤? 세츠나도 연애 이야기를 조금은 할 수 있게 되었다고요……?」"

[[dialogue]]
speaker = "せつな"
original = "「た、確かに……！\u3000公共の場で新婚さんごっこなんて、せつなはすっかり露出狂の変態さんになってしまったでござる！？」"
translation = "「확, 확실히……! 공공장소에서 신혼부부 놀이라니, 세츠나는 완전히 노출광 변태가 되어버린 것이오!?」"

[[dialogue]]
speaker = "unk"
original = "恋愛は恥ずかしいことじゃないんだって！"
translation = "연애는 부끄러운 게 아니라고!"

[[dialogue]]
speaker = "せつな"
original = "「いえいえ……！\u3000もうわかってるでござりまする！\u3000これはあくまで、せつなの個人的な価値感の話……」"
translation = "「아니 아니……! 이제 알고 있소이다! 이것은 어디까지나 세츠나의 개인적인 가치관 이야기……」"

[[dialogue]]
speaker = "せつな"
original = "「とはいえ、せつなの中では、エッチな話をするよりも、恋愛の話をする方が恥ずかしいというのは、変えられない事実でござる」"
translation = "「그렇다 해도 세츠나 안에서는 야한 이야기를 하는 것보다 연애 이야기를 하는 것이 더 부끄럽다는 건 바꿀 수 없는 사실이오.」"

[[dialogue]]
speaker = "せつな"
original = "「はい♪\u3000せつなの個性をありのまま受け入れてくださる主様が、せつなは大好きでござる<emoji=heart04>」"
translation = "「네♪ 세츠나의 개성을 있는 그대로 받아들여 주시는 주군을 세츠나는 정말 좋아하오<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
original = "「はっ！？\u3000ま、またでござる……。主様のことが大好きだったのは、最初からあまり変わっていないでござるが、それを口にするハードルが最近下がりまくってるでござる」"
translation = "「핫!? 또, 또이오……. 주군을 정말 좋아했던 건 처음부터 별로 변하지 않았으나 그것을 입 밖으로 내는 허들이 최근 마구 낮아지고 있소.」"

[[dialogue]]
speaker = "せつな"
original = "「もちろん、嫌ではないでござる……！」"
translation = "「물론 싫지 않소……!」"

[[dialogue]]
speaker = "せつな"
original = "「むしろ、せつなの体どころか、心まで主様に調教されてしまったようで、ちょっと興奮するでござる<emoji=heart04>」"
translation = "「오히려 세츠나의 몸은커녕 마음까지 주군에게 조교되어 버린 것 같아 조금 흥분되오<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "これそもそも何の話だったんだ！？"
translation = "이거 애초에 무슨 이야기였지!?"

[[dialogue]]
speaker = "unk"
original = "人聞きが悪すぎる上に、"
translation = "오해 사기 딱 좋은 말인 데다."

[[dialogue]]
speaker = "せつな"
original = "「そうでござる！\u3000公共の場でイチャイチャばかりしていたら、せっかくこの場を貸してくださった<ruby>蛍火<rt>けいか</rt></ruby>殿にも面目が立たないでござる」"
translation = "「그렇소! 공공장소에서 꽁냥거리기만 하면 모처럼 이 자리를 빌려주신 호타루비 공에게도 면목이 없소이다.」"

[[dialogue]]
speaker = "せつな"
original = "「さあ、主様！\u3000さっそくチョコレートを作っていくでござる！\u3000蘭美殿に仕込まれたせつなのチョコレートさばき、披露するでござりまする」"
translation = "「자, 주군! 당장 초콜릿을 만들어 가겠소! 라비 공에게 전수받은 세츠나의 초콜릿 솜씨를 선보이겠소이다.」"

[[dialogue]]
speaker = "せつな"
original = "「できたでござる～♪」"
translation = "「다 됐소~♪」"

[[dialogue]]
speaker = "unk"
original = "特訓しただけあって、流石の腕前だった"
translation = "특훈한 보람이 있어서인지, 역시나 대단한 솜씨였다."

[[dialogue]]
speaker = "せつな"
original = "「いえいえ、主様のサポートあってのものでござる」"
translation = "「아니에요, 주님께서 서포트해 주신 덕분이오.」"

[[dialogue]]
speaker = "せつな"
original = "「せつなも集中して１つのチョコレートだけ作るなら、流石にもうミスはしないでござるが……」"
translation = "「세츠나도 집중해서 초콜릿을 딱 하나만 만든다면, 역시 더 이상 실수는 하지 않소만……」"

[[dialogue]]
speaker = "せつな"
original = "「数十個レベルのチョコレートを手際よく作るのは、まだ難しいでござる」"
translation = "「수십 개 단위의 초콜릿을 능숙하게 만드는 건, 아직 어렵소.」"

[[dialogue]]
speaker = "せつな"
original = "「材料を入れ忘れたり、手順を間違えそうになったり、調理器具を落としそうになったり……」"
translation = "「재료 넣는 걸 잊거나, 순서를 틀릴 뻔하거나, 조리 기구를 떨어뜨릴 뻔하거나……」"

[[dialogue]]
speaker = "せつな"
original = "「そういうミスをせつながしそうになるたびに、さりげなく手助けしてくれた、主様のお陰でござりまする！」"
translation = "「그런 실수를 세츠나가 저지르려 할 때마다, 자연스럽게 도와주신 주님 덕분이오!」"

[[dialogue]]
speaker = "unk"
original = "チョコ星術も発動しそうになってたしね……"
translation = "초코 성술도 발동할 뻔했으니까 말이야……"

[[dialogue]]
speaker = "せつな"
original = "「面目次第もないでござる……」"
translation = "「면목 없소……」"

[[dialogue]]
speaker = "せつな"
original = "「暴発しないように制御することはできるようになったでござるが、別のことに意識を取られていると、やっぱり勝手に発動してチョコがゴーレムになってしまうみたいでござる」"
translation = "「폭발하지 않도록 제어할 수는 있게 되었소만, 다른 쪽에 정신을 팔고 있으면 역시 멋대로 발동해서 초코가 골렘이 되어버리는 모양이오.」"

[[dialogue]]
speaker = "unk"
original = "あれ、このミニゴーレムは？"
translation = "어라, 이 미니 골렘은?"

[[dialogue]]
speaker = "unk"
original = "相変わらず原理不明の星術だ……"
translation = "여전히 원리 불명의 성술이다……"

[[dialogue]]
speaker = "せつな"
original = "「これは星術ではなく、せつなが自分で作ったチョコでござる！」"
translation = "「이건 성술이 아니라, 세츠나가 직접 만든 초코요!」"

[[dialogue]]
speaker = "せつな"
original = "「紫桜の里にいる師匠には、このゴーレムチョコを贈るでござりまする！」"
translation = "「시소우 마을에 계신 스승님께는 이 골렘 초코를 보내드릴 것이오!」"

[[dialogue]]
speaker = "せつな"
original = "「はい♪\u3000九浄家メイド隊で学んだこと、新星学園で学んだこと、そして主様から学んだことを手紙に書いて、チョコと一緒に送るのでござりまする」"
translation = "「네♪ 쿠죠가 메이드대에서 배운 것, 신성 학원에서 배운 것, 그리고 주님께 배운 것을 편지에 써서 초코와 함께 보낼 것이오.」"

[[dialogue]]
speaker = "せつな"
original = "「痕跡が残る故、忍者はあまり手紙という手段を用いないでござる。連絡手段として使う時も、読んだら燃やすのが鉄則でござる」"
translation = "「흔적이 남기 때문에 닌자는 편지라는 수단을 잘 쓰지 않소. 연락 수단으로 쓸 때도 읽으면 바로 태우는 것이 철칙이오.」"

[[dialogue]]
speaker = "せつな"
original = "「しかし、今はヒトとヒトが争う時代ではござりませぬ！\u3000であればこそ、忍者であっても手紙を避ける理由はないのでござる」"
translation = "「하지만 지금은 사람과 사람이 다투는 시대가 아니오! 그렇기에 닌자라 해도 편지를 피할 이유는 없는 것이오.」"

[[dialogue]]
speaker = "せつな"
original = "「なにより、せつなは主様からいただいた恋文が、本当に本当に、嬉しかったのでござる！」"
translation = "「무엇보다 세츠나는 주님께 받은 연애편지가 정말, 정말로 기뻤소!」"

[[dialogue]]
speaker = "せつな"
original = "「大切な想いを<ruby>文<rt>ふみ</rt></ruby>にして送ると、もらったヒトはそれをいつでも読み返すことができまする。そんな当たり前で大切なことを、せつなは主様から教えていただいたでござる」"
translation = "「소중한 마음을 글로 써서 보내면, 받은 사람은 그것을 언제든 다시 읽어볼 수 있소. 그런 당연하고도 소중한 것을 세츠나는 주님께 배웠소.」"

[[dialogue]]
speaker = "せつな"
original = "「だから今度は、せつなが師匠に教える番でござる！」"
translation = "「그러니 이번엔 세츠나가 스승님께 가르쳐 드릴 차례요!」"

[[dialogue]]
speaker = "unk"
original = "きっと喜んでもらえると思う"
translation = "분명 기뻐하실 거라고 생각해."

[[dialogue]]
speaker = "せつな"
original = "「はいでござる♪」"
translation = "「알겠소♪」"

[[dialogue]]
speaker = "せつな"
original = "「……とは言ったものの、せつなは文章を書くのが苦手でござる」"
translation = "「……라고는 했지만, 세츠나는 글 쓰는 게 서투르오.」"

[[dialogue]]
speaker = "せつな"
original = "「主様、今度２人で、師匠に送る手紙の文章を考えて欲しいでござる……」"
translation = "「주님, 나중에 둘이서 스승님께 보낼 편지 내용을 같이 생각해 주었으면 하오……」"

[[dialogue]]
speaker = "unk"
original = "上目遣いで可愛いおねだりをしてくる恋人の頭を、「もちろん」という言葉と共に撫でた。"
translation = "치켜뜬 눈으로 귀엽게 부탁해오는 연인의 머리를, 「물론이지」라는 말과 함께 쓰다듬었다."

[[dialogue]]
speaker = "せつな"
original = "「えへへぇ～♪\u3000主様、大好きでござる<emoji=heart04>」"
translation = "「에헤헤~♪ 주님, 정말 좋소<emoji=heart04>」"

