[[dialogue]]
speaker = "unk"
original = "第１話,奏姉妹とお出かけ,P"
translation = "제1화, 카나데 자매와 외출"

[[dialogue]]
speaker = "unk"
original = "それは、サーシャさんが新たなお正月を迎え、『スーパー晴れ着フォーム』を手に入れるよりも数ヶ月ほど前の出来事。"
translation = "그것은 사샤 씨가 새로운 정월을 맞이하여, 『슈퍼 후리소데 폼』을 손에 넣기보다 수개월 전의 일."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「あっ、兄さん。こっちです」"
translation = "「앗, 오빠. 이쪽이에요」"

[[dialogue]]
speaker = "unk"
original = "サーシャさんの妹であるソフィアからの『兄さん』呼びにも慣れてきた俺は、彼女に軽く手を振りながら合流する。"
translation = "사샤 씨의 여동생인 소피아로부터의 『오빠』라는 호칭에도 익숙해진 나는, 그녀에게 가볍게 손을 흔들며 합류한다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「それで兄さん。今日のこと、姉さんには……？」"
translation = "「그래서 오빠. 오늘 일, 언니에게는……?」"

[[dialogue]]
speaker = "unk"
original = "大丈夫。ちゃんと秘密にしてきた"
translation = "괜찮아. 제대로 비밀로 하고 왔어"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「では、このまま気づかれないように、こっそりとクールに学園の外へ出ましょう」"
translation = "「그럼 이대로 들키지 않게, 살짝 쿨하게 학원 밖으로 나가죠」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あ～ん、お姉ちゃん抜きで、内緒話なんて寂しいわ～」"
translation = "「아~앙, 누나 빼놓고 비밀 이야기라니 서운해~」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「って、姉さん！？\u3000ああ、もう！\u3000なんで姉さんは、こういう気づいて欲しくない時ばっかり、すぐに気づくんですか……！」"
translation = "「앗, 언니!? 아아, 정말! 왜 언니는 이런 눈치채지 않았으면 할 때만 바로 눈치채는 건가요……!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「いくらソフィが妹でも、会長くんと内緒でイチャイチャするのはダメよ～。やるならちゃんと、お姉ちゃんの前でしてくれなくちゃ～」"
translation = "「아무리 소피가 여동생이라도, 회장군이랑 몰래 꽁냥거리는 건 안 돼~. 할 거면 제대로 누나 앞에서 해 줘야지~」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「誰が兄さんとイチャイチャしたんですかっ。品のない冗談はやめてください！」"
translation = "「누가 오빠랑 꽁냥거렸다는 거예요. 품위 없는 농담은 그만두세요!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「会長くんも、ソフィがいくら可愛いからって、こっそりはダメよ～」"
translation = "「회장군도, 소피가 아무리 귀엽다고 해도 몰래 하는 건 안 돼~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ソフィと遊ぶなら、お姉ちゃんも一緒に構ってくれなくっちゃ。私にだって会長くんの恋人だっていうプライドはあるんだから～」"
translation = "「소피랑 놀 거면 누나도 같이 끼워 줘야지. 나에게도 회장군의 연인이라는 프라이드가 있으니까~」"

[[dialogue]]
speaker = "unk"
original = "そう言って、頬をぷく～っと膨らませながら、腕に抱き着いてくるサーシャさん。"
translation = "그렇게 말하며 볼을 푸우~ 하고 부풀리면서 팔에 매달려 오는 사샤 씨."

[[dialogue]]
speaker = "unk"
original = "その仕草が猛烈に可愛いと思ってしまいつつも、俺は釈明する。"
translation = "그 몸짓이 맹렬하게 귀엽다고 생각하면서도 나는 해명한다."

[[dialogue]]
speaker = "unk"
original = "すみません。でもこれには事情があって……"
translation = "죄송해요. 하지만 여기엔 사정이 있어서……"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「はぁ……仕方ありません。私と兄さんは、姉さんの<b>誕生日プレゼント</b>を買いに行こうと計画してたんですよ」"
translation = "「하아…… 어쩔 수 없네요. 저랑 오빠는 언니의 <b>생일</b> <b>선물</b>을 사러 가려고 계획하고 있었거든요」"

[[dialogue]]
speaker = "unk"
original = "その日はサーシャさんの誕生日を目前に控えた休日だった。しかし、サプライズが本人にバレてしまった俺たちは、３人で渋谷へ買い物に出かけることとなった。"
translation = "그날은 사샤 씨의 생일을 목전에 둔 휴일이었다. 하지만 서프라이즈가 본인에게 들켜버린 우리들은 세 명이서 시부야로 쇼핑을 나가게 되었다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「バレてしまった以上は計画を変更して、姉さん本人に１番欲しい物を選んでもらおうと思います――って、姉さん？\u3000聞いてます？」"
translation = "「들켜버린 이상은 계획을 변경해서, 언니 본인이 가장 갖고 싶은 걸 고르게 하려고 해요── 어라, 언니? 듣고 있어요?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「わぁ～、すごいわ～♪\u3000こんなにキャンプ用品の品揃えがすごいお店、初めて～♪」"
translation = "「와아~, 대단해~♪ 이렇게 캠핑 용품 종류가 많은 가게는 처음이야~♪」"

[[dialogue]]
speaker = "unk"
original = "デパートの中にある有名なアウトドアショップに入って、珍しく興奮気味に瞳を輝かせているサーシャさん。"
translation = "백화점 안에 있는 유명한 아웃도어 샵에 들어가서, 드물게 흥분한 기색으로 눈을 빛내고 있는 사샤 씨."

[[dialogue]]
speaker = "unk"
original = "――うん、我が彼女ながら可愛い。"
translation = "──응, 내 여자친구지만 귀엽다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「姉さんは『旅好き』なので、誕生日プレゼントを探すならここかなと、事前に兄さんと調べていたんです」"
translation = "「언니는 『여행』을 좋아하니까, 생일 선물을 찾는다면 여기일까 하고 미리 오빠랑 조사해 뒀거든요」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「すごいわ～。テントセットに焚き火台、キャリーケースも種類が沢山。お姉ちゃん、目移りしちゃう♪」"
translation = "「대단해~. 텐트 세트에 화로, 캐리 케이스도 종류가 잔뜩. 누나, 눈이 돌아가 버려♪」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ねぇねぇ、会長くん、見て見て～♪\u3000お姉ちゃんと一緒にキャンプに行くなら、どのテントがいいかしら～？」"
translation = "「있지 있지, 회장군, 봐봐~♪ 누나랑 같이 캠핑을 간다면 어떤 텐트가 좋을까~?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「やっぱり広い方が、中でイチャイチャできていいわよね～？\u3000うふふっ<emoji=heart04>」"
translation = "「역시 넓은 편이 안에서 꽁냥거릴 수 있어서 좋겠지~? 우후훗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "サーシャさんとテントでイチャイチャ！？"
translation = "사샤 씨랑 텐트에서 꽁냥거린다고!?"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そうよ～<emoji=heart04>\u3000後で一緒にお泊りキャンプ、してみたくない？」"
translation = "「그래~<emoji=heart04> 나중에 같이 숙박 캠핑, 해보고 싶지 않아?」"

[[dialogue]]
speaker = "unk"
original = "俺はぶんぶんと全力で首を縦に振りながら、真剣にテント選びを開始する。"
translation = "나는 세차게 고개를 끄덕이며 진지하게 텐트 고르기를 시작한다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「あ～、これはしばらく、ホットなイチャイチャを見せつけられることになりそうですね……」"
translation = "「아~, 이건 한동안 핫한 꽁냥거림을 강제로 보게 될 것 같네요……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ソフィもキャンプ参加する？\u3000お姉ちゃんも一緒だったら、会長くんとイチャイチャしてもいいわよ～？」"
translation = "「소피도 캠핑 참가할래? 누나도 함께라면 회장군이랑 꽁냥거려도 괜찮아~?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「行きませんよ！？\u3000というか、３人だったらいいんですか！？」"
translation = "「안 가거든요!? 그보다, 세 명이면 괜찮은 건가요!?」"

[[dialogue]]
speaker = "unk"
original = "それから、俺たちは半日かけてデパートの中を色々見て回った。"
translation = "그 후로 우리들은 반나절 동안 백화점 안을 여기저기 둘러보았다."

[[dialogue]]
speaker = "unk"
original = "その結果、最後にサーシャさんが選んだ物は『ちょっと高めの高級ボールペン』と『装丁がしっかりとした高級ノート』だった。"
translation = "그 결과, 마지막에 사샤 씨가 고른 것은 『약간 비싼 고급 볼펜』과 『장정이 튼튼한 고급 노트』였다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「確かにお洒落で良い物だと思いますが……アウトドアグッズはよかったんですか？」"
translation = "「확실히 세련되고 좋은 물건이라고 생각합니다만…… 아웃도어 굿즈는 괜찮았던 건가요?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ええ。それは今度、自分で買いにくるわ。それにこれなら、ソフィとの交換日記にも使えるでしょう？」"
translation = "「응. 그건 다음에 직접 사러 올게. 그리고 이거라면 소피와의 교환 일기에도 쓸 수 있잖아?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「……！\u3000ま、まあ、そうですね……」"
translation = "「……! 뭐, 뭐어, 그렇네요……」"

[[dialogue]]
speaker = "unk"
original = "ちょっと照れて赤くなった顔を隠すように、マフラーを指で摘まんで上げるソフィア。"
translation = "조금 부끄러워져서 붉어진 얼굴을 숨기듯 머플러를 손가락으로 집어 올리는 소피아."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「それにね、最近私、小説を書いてみようかなって思っているの」"
translation = "「그리고 말이야, 최근 나, 소설을 써볼까 생각하고 있어」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「えっ、小説ですか……？」"
translation = "「엣, 소설인가요……?」"

[[dialogue]]
speaker = "unk"
original = "サーシャさんは読書家ではあるものの、小説はあまり好まない。そのことを知っているソフィアが、意外そうな声をあげる。"
translation = "사샤 씨는 독서가이긴 하지만 소설은 그다지 좋아하지 않는다. 그 사실을 알고 있는 소피아가 의외라는 듯 목소리를 높인다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ノヴァフォームに覚醒して、私は『自分の大切なものは自分で決める』ことができるようになったわ」"
translation = "「노바 폼으로 각성하고, 나는 『자신의 소중한 것은 스스로 결정한다』는 것을 할 수 있게 되었어」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「それでもやっぱり、私は人と比べると、他人への興味や関心が薄いと思うの」"
translation = "「그래도 역시 나는 남들과 비교하면 타인에 대한 흥미나 관심이 옅다고 생각해」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「『それは一体どうしてなのか』『私は本当は何を考えているのか』。文字を書くとそういうことを深く考えられるようになるって、最近気づいたの」"
translation = "「『그건 대체 왜일까』 『나는 정말로 무엇을 생각하고 있는 걸까』. 글을 쓰면 그런 것들을 깊게 생각할 수 있게 된다는 걸 최근에 깨달았어」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「これに気づけたのは、ソフィとの交換日記で、自分の考えを文字にする習慣ができたおかげよ」"
translation = "「이걸 깨달은 건 소피와의 교환 일기로 내 생각을 글로 쓰는 습관이 생긴 덕분이야」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「だから、自分のことをもっと知るために、小説を書いてみようかなって思ったの」"
translation = "「그래서 나 자신을 더 알기 위해 소설을 써볼까 생각했어」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「それ……すごくいいと思います！」"
translation = "「그거…… 정말 좋다고 생각해요!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「完成したら絶対！\u3000絶対私にも読ませてくださいねっ。姉さんが書く小説、読んでみたいです！」"
translation = "「완성되면 꼭! 꼭 저에게도 읽게 해주세요. 언니가 쓰는 소설, 읽어보고 싶어요!」"

[[dialogue]]
speaker = "unk"
original = "俺も読んでみたいです"
translation = "저도 읽어보고 싶어요"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「本当？\u3000じゃあ、お姉ちゃん、頑張って書いてみるわね♪」"
translation = "「정말? 그럼 누나, 열심히 써볼게♪」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「はいっ！\u3000楽しみにしてますっ」"
translation = "「네! 기대하고 있을게요」"

[[dialogue]]
speaker = "unk"
original = "サーシャさんの中で芽生えた、小さくも大きな変化。俺はそのことに驚きと喜びを噛みしめながら、そっと姉妹２人を見守るのだった。"
translation = "사샤 씨 안에서 싹튼 작지만 큰 변화. 나는 그 사실에 놀라움과 기쁨을 되새기며 살며시 자매 두 사람을 지켜보는 것이었다."

