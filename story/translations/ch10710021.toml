[[dialogue]]
speaker = "unk"
original = "第１話,なんとなく,P"
translation = "제1화, 왠지 모르게"

[[dialogue]]
speaker = "unk"
original = "極星学園による流星市国襲撃。白昼の攻撃は市民を震撼させた。"
translation = "극성학원에 의한 유성시국 습격. 대낮의 공격은 시민들을 전율케 했다."

[[dialogue]]
speaker = "unk"
original = "コラプサーたちも迎撃のために出撃し──"
translation = "콜랩서들도 요격을 위해 출격하고──"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「いい加減くたばれ！\u3000カラミティパイル！」"
translation = "「적당히 좀 뒈져라! 캘러미티 파일!」"

[[dialogue]]
speaker_original = "極星従騎"
speaker_translation = "극성종기"
original = "「ブルルッ」"
translation = "「푸르르!」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「チッ、まだ動きやがるか」"
translation = "「칫, 아직도 움직이는 거냐.」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「大丈夫、私が仕留める！\u3000ブラックホール・ディバウアー！」"
translation = "「괜찮아, 내가 끝장낼게! 블랙홀 디바우어!」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「クソ、どんだけいやがるんだよっ！\u3000正義の味方さまは何やってんだ！」"
translation = "「젠장, 대체 얼마나 있는 거야! 정의의 사자님들은 대체 뭘 하고 있는 건데!」"

[[dialogue]]
speaker = "unk"
original = "新星・流星両学園の星騎士が総力を挙げて対応しているが、後手に回っている。数が多いうえに、極星従騎は星徒会のメンバーでも手を焼く強敵だ。"
translation = "신성·유성 양 학원의 성기사가 총동원되어 대응하고 있지만, 한발 늦고 있다. 수가 많은 데다, 극성종기는 성도회 멤버들도 애를 먹는 강적이다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「はぁ、はぁ……エルゴフォースブラスター！」"
translation = "「하아, 하아…… 에르고 포스 블래스터!」"

[[dialogue]]
speaker = "unk"
original = "弱体化した今のコラプサーでは、致命傷を与えられるのはレイラだけ。"
translation = "약체화된 지금의 콜랩서로서는 치명상을 입힐 수 있는 건 레이라뿐."

[[dialogue]]
speaker = "unk"
original = "そのレイラは操るブラックホールが強力すぎて、市街地では全力を出せない。"
translation = "그 레이라는 다루는 블랙홀이 너무 강력해서, 시가지에서는 전력을 다할 수 없다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「あ、通信……はい、レイラです。え、北西にも敵ですか？\u3000でも戦力を分散させるわけには……」"
translation = "「아, 통신…… 네, 레이라입니다. 에, 북서쪽에도 적이요? 하지만 전력을 분산시킬 수는……」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "（んだと？\u3000そっちの方角にはガキどもが……）"
translation = "「(뭐라고? 그쪽 방향에는 꼬맹이들이……)」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「悪いレイラ、ここは任せる！」"
translation = "「미안 레이라, 여기는 맡길게!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「待って、キサナ！\u3000単独行動は危険だって！」"
translation = "「기다려, 키사나! 단독 행동은 위험하다니까!」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「うるせえ！」"
translation = "「시끄러워!」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "（アタシは何やってんだ？\u3000他人のために命を懸けるなんざ、バカのやることだろ）"
translation = "「(나 지금 뭐 하는 거지? 남을 위해 목숨을 거는 건 바보들이나 하는 짓이잖아.)」"

[[dialogue]]
speaker = "unk"
original = "キサナが向かったのは、以前面倒を見た少女が預けられている保護施設。"
translation = "키사나가 향한 곳은 이전에 돌봐주었던 소녀가 맡겨진 보호 시설."

[[dialogue]]
speaker_original = "極星従騎"
speaker_translation = "극성종기"
original = "「ヒヒィンッ！」"
translation = "「히히잉!」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ざけんじゃねえ！！\u3000ヘヴィアウトレイジ！」"
translation = "「웃기지 마라!! 헤비 아웃레이지!」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「くたばったか？\u3000手負いだったみてぇだな」"
translation = "「뒈졌나? 부상을 입었던 모양이네.」"

[[dialogue]]
speaker = "unk"
original = "崩れた壁から中に入る。物が散乱しているが、血の臭いはしない。"
translation = "무너진 벽을 통해 안으로 들어간다. 물건들이 흩어져 있지만, 피 냄새는 나지 않는다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「おい、無事か！？\u3000返事しろ！」"
translation = "「어이, 무사하냐!? 대답해!」"

[[dialogue]]
speaker_original = "女の子"
speaker_translation = "여자아이"
original = "「……キサナお姉ちゃん？」"
translation = "「……키사나 언니?」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「いんならさっさと返事しろ」"
translation = "「있으면 빨리 대답해.」"

[[dialogue]]
speaker = "unk"
original = "奥から現れたのは、キサナが保護した少女だった。親から育児放棄され、ここで暮らしている。"
translation = "안쪽에서 나타난 것은 키사나가 보호했던 소녀였다. 부모에게 방치되어 이곳에서 살고 있다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「他の連中はどうした？」"
translation = "「다른 녀석들은 어떻게 됐어?」"

[[dialogue]]
speaker_original = "女の子"
speaker_translation = "여자아이"
original = "「地下にお部屋があるから、みんな、先生と一緒に隠れてるの。お姉ちゃんの声が聞こえたから出てきちゃった」"
translation = "「지하에 방이 있어서, 다들 선생님이랑 같이 숨어 있어. 언니 목소리가 들려서 나와 버렸어.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「……はぁ、そうかよ。急いで損したぜ」"
translation = "「……하아, 그러냐. 서두른 보람도 없네.」"

[[dialogue]]
speaker_original = "女の子"
speaker_translation = "여자아이"
original = "「キサナお姉ちゃん、助けに来てくれたんだ」"
translation = "「키사나 언니, 구하러 와 줬구나.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「はぁ？\u3000アタシがんなだりぃことするわけねえだろ。ついでだついで」"
translation = "「하아? 내가 그런 귀찮은 짓을 할 리가 없잖아. 가는 길에 들른 거야, 가는 길에.」"

[[dialogue]]
speaker_original = "女の子"
speaker_translation = "여자아이"
original = "「ふふっ、変わらないね。キサナお姉ちゃん」"
translation = "「후훗, 여전하네. 키사나 언니.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ああ？\u3000そういうオマエはずいぶん変わったな。べらべら喋るようになりやがって」"
translation = "「아앙? 그러는 너야말로 꽤 변했잖아. 나불나불 잘도 떠들어대고.」"

[[dialogue]]
speaker_original = "女の子"
speaker_translation = "여자아이"
original = "「そうかな？\u3000自分では分からないや」"
translation = "「그럴까? 난 잘 모르겠어.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「んにゃっ！？\u3000いきなりしっぽ掴むなっつってんだろ。前言撤回だ。やっぱり変わってねえな、オマエ」"
translation = "「냐앗!? 갑자기 꼬리 잡지 말라고 했잖아. 전언 철회다. 역시 변하지 않았네, 너.」"

[[dialogue]]
speaker_original = "女の子"
speaker_translation = "여자아이"
original = "「ごめんなさい。でも怖くて……」"
translation = "「미안해. 하지만 무서워서……」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「いいからオマエは地下に隠れてろ。外のクソ馬はアタシがぶっ潰す」"
translation = "「됐으니까 너는 지하에 숨어 있어. 밖에 있는 빌어먹을 말은 내가 박살 낼 테니까.」"

[[dialogue]]
speaker_original = "女の子"
speaker_translation = "여자아이"
original = "「うん！\u3000星騎士が助けに来てくれたってみんなに伝えるね！」"
translation = "「응! 성기사가 구하러 와 줬다고 모두에게 전할게!」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ちがっ、アタシは星騎士なんかじゃ……行っちまいやがった」"
translation = "「아냐, 난 성기사 같은 게…… 가 버렸네.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「クソ、これじゃ本当に正義の味方みてえじゃねえか。気持ちわりぃ」"
translation = "「젠장, 이래선 진짜 정의의 사자 같잖아. 기분 나쁘게.」"

[[dialogue]]
speaker_original = "極星従騎"
speaker_translation = "극성종기"
original = "「ブルルル……」"
translation = "「푸르르르……」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「おいクソ馬！\u3000キサナ様が相手してやる。地べたに頭こすりつけて感謝しろ！」"
translation = "「어이 빌어먹을 말! 키사나 님이 상대해 주마. 바닥에 머리를 처박고 감사해라!」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「オラ喰らえ！\u3000カラミティパイル！」"
translation = "「오라, 먹어라! 캘러미티 파일!」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「チッ、クソ硬えな。こっちの手がしびれやがる」"
translation = "「칫, 더럽게 단단하네. 이쪽 손이 저릴 정도야.」"

[[dialogue]]
speaker_original = "極星従騎"
speaker_translation = "극성종기"
original = "「ブルルッ！」"
translation = "「푸르르!」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ぐぅっ！」"
translation = "「구윽!」"

[[dialogue]]
speaker = "unk"
original = "極星従騎の突撃。キサナの体がビルに叩きつけられる。"
translation = "극성종기의 돌격. 키사나의 몸이 건물에 처박힌다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "（アタシは何やってんだろうな）"
translation = "「(나 지금 뭐 하는 걸까.)」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "（ガキの頃、生き方を教えてくれたヤツがいた。ナイフの使い方、銃の撃ち方、カードの遊び方、あとなんかいろいろ）"
translation = "「(어릴 적에, 사는 법을 가르쳐 준 녀석이 있었지. 나이프 사용법, 총 쏘는 법, 카드 놀이법, 그리고 그 외 여러 가지.)」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "（ソイツは言った。誰も信用するな、自分の事だけ考えろって）"
translation = "「(그 녀석은 말했어. 아무도 믿지 마라, 자기 자신만 생각하라고.)」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "（でも、ソイツはアタシを敵の銃弾から庇って死んだ。そんなのは弱いやつの、バカがすることだって言ってたのに）"
translation = "「(하지만, 그 녀석은 나를 적의 총탄으로부터 감싸고 죽었어. 그런 건 약한 녀석들이나 하는 바보 같은 짓이라고 말했으면서.)」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「本当に笑えるぜ。テメエの命が大事ならさっさと逃げりゃいいのにな」"
translation = "「진짜 웃기지도 않는군. 네놈 목숨이 소중하면 얼른 도망치면 될 텐데 말이야.」"

[[dialogue]]
speaker = "unk"
original = "施設も女の子も見捨て、流星市国から逃げればいい。それが賢い選択だと分かっている。生き残るための正しい選択。でもそうはしなかった。"
translation = "시설도 소녀도 내버려 두고, 유성시국에서 도망치면 된다. 그것이 현명한 선택이라는 것을 알고 있다. 살아남기 위한 올바른 선택. 하지만 그러지 않았다."

[[dialogue]]
speaker = "unk"
original = "キサナを動かすのは使命感でも正義感でもない。"
translation = "키사나를 움직이는 것은 사명감도 정의감도 아니다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「……アネゴ、最期に言ってたよな。『なんとなく』って。イカレちまったんだと思ってた」"
translation = "「……아네고, 마지막에 말했었지. 『왠지 모르게』라고. 미쳐버린 거라고 생각했었는데.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「今ならアタシにも分かるぜ。本当に『なんとなく』なんだな。あ～あ、アタシもイカレちまったみたいだ」"
translation = "「지금이라면 나도 알 것 같아. 정말로 『왠지 모르게』인 거구나. 아~아, 나도 미쳐버린 모양이네.」"

[[dialogue]]
speaker_original = "極星従騎"
speaker_translation = "극성종기"
original = "「ヒヒィンッ！」"
translation = "「히히잉!」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「来い！\u3000風穴開けてやるよ！！」"
translation = "「와라! 구멍을 뚫어주마!!」"

[[dialogue]]
speaker = "unk"
original = "再び、極星従騎の突撃。キサナは逃げない。真正面から受け止め、杭打機の引き金を弾く。"
translation = "다시금, 극성종기의 돌격. 키사나는 도망치지 않는다. 정면에서 받아내며, 파일 벙커의 방아쇠를 당긴다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「うおおおおおっ！\u3000リベリオンハウリングッ！！」"
translation = "「우오오오오옷! 리벨리온 하울링!!」"

[[dialogue]]
speaker = "unk"
original = "爆音とともに極星従騎の頭を打ち抜く。風穴どころか、極星従騎がバラバラに砕けた。"
translation = "폭음과 함께 극성종기의 머리를 꿰뚫는다. 구멍 정도가 아니라, 극성종기가 산산조각이 났다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ハァ、ハァ……アタシにケンカを売ったことを後悔しやがれ」"
translation = "「하아, 하아…… 나한테 싸움을 건 걸 후회해라.」"

[[dialogue]]
speaker_original = "極星従騎"
speaker_translation = "극성종기"
original = "「ブルルル……」"
translation = "「푸르르르……」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「チッ、おかわりかよ。まあいい、テメエも後悔させてやる！」"
translation = "「칫, 추가냐. 뭐 됐다, 네놈도 후회하게 해주지!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「遅くなってごめん、キサナ！」"
translation = "「늦어서 미안해, 키사나!」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「マジで遅え。全部喰っちまうとこだったぜ」"
translation = "「진짜 늦어. 전부 해치워버릴 뻔했잖아.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「アタシに続け、バカども！\u3000行くぜ！」"
translation = "「나를 따라라, 바보들아! 가자!」"

[[dialogue]]
speaker = "unk"
original = "コラプサーと合流し、キサナは施設と子どもたちを守り抜いた。"
translation = "콜랩서와 합류하여, 키사나는 시설과 아이들을 지켜냈다."

