[[dialogue]]
speaker = "unk"
original = "第２話,ピーマン克服法,P"
translation = "제2화, 피망 극복법, P"

[[dialogue]]
speaker = "サチ"
original = "「ちょっとプリムラ！\u3000またピーマン残そうとしてるじゃない。ちゃんと食べなきゃダメだよ！」"
translation = "「잠깐 프리무라! 또 피망 남기려고 하고 있잖아. 제대로 먹어야지!」"

[[dialogue]]
speaker = "プリムラ"
original = "「ピーマンは我の舌の好みに合わぬから残してもよいのじゃ」"
translation = "「피망은 내 혀의 취향에 맞지 않으니 남겨도 되는 것이니라」"

[[dialogue]]
speaker = "サチ"
original = "「よくないでしょ、ちゃんと食べなさい！」"
translation = "「안 된다니까, 제대로 먹으렴!」"

[[dialogue]]
speaker = "プリムラ"
original = "「い～や～じゃ！\u3000なぜ我がそのようなことを強いられねばならん。何を食らい、何を食らわずとも我の勝手じゃ！」"
translation = "「시~르~니~라! 왜 내가 그런 것을 강요당해야 한단 말이냐. 무엇을 먹든, 무엇을 먹지 않든 내 마음이니라!」"

[[dialogue]]
speaker = "ここあ"
original = "「んにゃ？\u3000サチサチにプリちん、こんちゃーっす♪」"
translation = "「응냐? 사치사치에 프리칭, 안뇽~♪」"

[[dialogue]]
speaker = "プリムラ"
original = "「おお、我が眷属ではないか。貴様も食事か？\u3000ならば我の隣に座るのじゃ」"
translation = "「오오, 나의 권속이 아닌가. 네놈도 식사냐? 그렇다면 내 옆에 앉거라」"

[[dialogue]]
speaker = "ここあ"
original = "「いいの？\u3000にゃはは、あざまーす♪」"
translation = "「괜찮아? 냐하하, ㄳㄳ♪」"

[[dialogue]]
speaker = "プリムラ"
original = "「よしよし、座ったな？\u3000では少しの間だけ目を瞑るのじゃ」"
translation = "「좋아 좋아, 앉았느냐? 그럼 잠깐만 눈을 감아보거라」"

[[dialogue]]
speaker = "ここあ"
original = "「こんな感じでいーの？\u3000なになに？\u3000何か面白い事でも始まるのかにゃ？」"
translation = "「이런 느낌으로 괜찮아? 뭐야 뭐야? 뭔가 재밌는 거라도 시작되는 거야?」"

[[dialogue]]
speaker = "プリムラ"
original = "「しばらくそのままじゃぞ？\u3000さささっ！」"
translation = "「잠시 그대로 있거라? 슥슥슥!」"

[[dialogue]]
speaker = "サチ"
original = "「あっ、プリムラ！\u3000今、ピーマンをここあさんのお皿に──！」"
translation = "「앗, 프리무라! 지금 피망을 코코아 씨의 접시에──!」"

[[dialogue]]
speaker = "プリムラ"
original = "「わ～わ～わ～、サチが何を騒いでいるのか、我にはトンと分からないのじゃ～」"
translation = "「와~와~와~, 사치가 무슨 소란을 피우는지 나는 도통 모르겠느니라~」"

[[dialogue]]
speaker = "ここあ"
original = "「んにゃにゃ？\u3000なんか目を閉じてる間に、ここあのおかずが少し増えたような気がするにゃ～」"
translation = "「응냐냐? 왠지 눈을 감고 있는 사이에 코코아의 반찬이 조금 늘어난 것 같은 기분이 드네~」"

[[dialogue]]
speaker = "プリムラ"
original = "「ぴゅ～ぴゅ～♪\u3000それは全くの気のせいじゃろ～♪」"
translation = "「휘익~휘익~♪ 그건 순전히 기분 탓일 것이니라~♪」"

[[dialogue]]
speaker = "ここあ"
original = "「ふふ～ん、甘いにゃあ、プリちん……」"
translation = "「후후~ㄴ, 무르네, 프리칭……」"

[[dialogue]]
speaker = "プリムラ"
original = "「な、何じゃと！？\u3000いつの間にやらここあの皿に移したはずのピーマンが戻ってきておる！？」"
translation = "「무, 무엇이라!? 어느 틈에 코코아의 접시로 옮겼을 피망이 돌아와 있는 것이냐!?」"

[[dialogue]]
speaker = "ここあ"
original = "「弟たちの常とう手段だったからね～。ここあにその技は通じないよ～」"
translation = "「동생들의 상투적인 수단이었으니까~. 코코아에게 그 기술은 안 통해~」"

[[dialogue]]
speaker = "プリムラ"
original = "「くっ……小癪なっ！\u3000これでどうじゃ！\u3000そりゃそりゃそりゃっ！！」"
translation = "「큭…… 가소롭구나! 이건 어떠냐! 에잇 에잇 에잇!!」"

[[dialogue]]
speaker = "ここあ"
original = "「ふふ～ん♪」"
translation = "「후후~ㄴ♪」"

[[dialogue]]
speaker = "プリムラ"
original = "「何故じゃ！？\u3000移しても移してもピーマンが減らんじゃと！」"
translation = "「어째서냐!? 옮겨도 옮겨도 피망이 줄어들지 않다니!」"

[[dialogue]]
speaker = "ここあ"
original = "「甘い甘い。そんなぬるい攻撃じゃここあのガードは破れないよん♪」"
translation = "「물러 물러. 그런 미지근한 공격으론 코코아의 가드는 뚫을 수 없다구♪」"

[[dialogue]]
speaker = "サチ"
original = "「すごい……まさに鉄壁です……」"
translation = "「대단해…… 그야말로 철벽이에요……」"

[[dialogue]]
speaker = "ここあ"
original = "「うちの弟たちは双子で同時に攻撃を仕掛けてきてたからね。それと比べたらプリちんはベリーイージーでしょ～♪」"
translation = "「우리 동생들은 쌍둥이라 동시에 공격을 해왔었으니까. 그거에 비하면 프리칭은 베리 이지라구~♪」"

[[dialogue]]
speaker = "プリムラ"
original = "「ぐぬぬぬぬ！！！」"
translation = "「구누누누누!!!」"

[[dialogue]]
speaker = "ここあ"
original = "「そういう事だから諦めなさい♪\u3000騙されたと思って食べてみたら、案外美味しかったりするかもよ～」"
translation = "「그렇게 된 거니까 포기해♪ 속는 셈 치고 먹어보면 의외로 맛있을지도 모른다구~」"

[[dialogue]]
speaker = "ここあ"
original = "「１人で食べられないなら、ここあが食べさせてあげよっか？\u3000お膝の上に抱っこして、あ～んって♪」"
translation = "「혼자서 못 먹겠다면, 코코아가 먹여 줄까? 무릎 위에 앉혀서, 아~앙 하고♪」"

[[dialogue]]
speaker = "プリムラ"
original = "「そんな子供のような真似、出来ぬに決まっているのじゃ！」"
translation = "「그런 어린아이 같은 짓, 할 수 있을 리가 없지 않느냐!」"

[[dialogue]]
speaker = "ここあ"
original = "「ふーん、でも嫌いなお野菜を残す方が、子供っぽいと思うけどな～」"
translation = "「흐음, 하지만 싫어하는 채소를 남기는 게 더 어린아이 같다고 생각하는데~」"

[[dialogue]]
speaker = "ここあ"
original = "「ひと口だけでもいいからさ、食べてみようよ♪\u3000ね、お願いっ☆」"
translation = "「한 입이라도 좋으니까 말이야, 먹어 보자♪ 응, 부탁이야☆」"

[[dialogue]]
speaker = "プリムラ"
original = "「むむむ、眷属にそこまでお願いされると弱いのじゃ……。仕方ないのぉ、ひと口だけじゃぞ……」"
translation = "「으으으, 권속에게 그렇게까지 부탁받으면 약하단 말이지……. 어쩔 수 없구먼, 딱 한 입뿐이다……」"

[[dialogue]]
speaker = "プリムラ"
original = "「んんん～……あむっ！」"
translation = "「으으음~…… 냠!」"

[[dialogue]]
speaker = "プリムラ"
original = "「ん……なんじゃ、これ？\u3000苦みが全然ないぞ？\u3000どういうことじゃ？」"
translation = "「음…… 뭐냐, 이거? 쓴맛이 전혀 없지 않느냐? 어찌 된 일이냐?」"

[[dialogue]]
speaker = "ここあ"
original = "「ほら、食べてみると案外いけるでしょ？」"
translation = "「봐, 먹어 보니까 의외로 괜찮지?」"

[[dialogue]]
speaker = "プリムラ"
original = "「そうじゃな。ふふふ、見たか、サチよ！\u3000我の大人っぷりを」"
translation = "「그렇구나. 후후후, 보았느냐, 사치여! 나의 어른스러움을」"

[[dialogue]]
speaker = "サチ"
original = "「そんな事で胸を張られても困るんだけど……」"
translation = "「그런 일로 가슴을 펴도 곤란한데……」"

[[dialogue]]
speaker = "サチ"
original = "「でも……ここあさん、もしかして何かやったんですか……？」"
translation = "「그치만…… 코코아 씨, 혹시 뭔가 하신 건가요……?」"

[[dialogue]]
speaker = "ここあ"
original = "「にゃはは、サチサチは鋭いにゃ～♪」"
translation = "「냐하하, 사치사치는 날카롭네~♪」"

[[dialogue]]
speaker = "ここあ"
original = "「実は厨房の人にお願いして、ピーマンが苦手なコも食べられるような味付けにしてもらったんだよ」"
translation = "「실은 주방 사람에게 부탁해서, 피망을 싫어하는 애도 먹을 수 있게끔 간을 해달라고 했거든」"

[[dialogue]]
speaker = "ここあ"
original = "「それでプリちんにお皿に戻したピーマンは、ぜーんぶここあのピーマンとすり替え済み」"
translation = "「그래서 프리칭이 접시에 되돌려놓은 피망은, 전부 코코아의 피망이랑 바꿔치기 완료」"

[[dialogue]]
speaker = "ここあ"
original = "「弟たちの好き嫌いを直すのにいっぱい研究したからね～。プリちんもあれなら美味しく食べられるはずだから♪」"
translation = "「남동생들의 편식을 고쳐주려고 잔뜩 연구했으니까 말이야~. 프리칭도 저거라면 맛있게 먹을 수 있을 테니까♪」"

[[dialogue]]
speaker = "サチ"
original = "「さ、流石ここあさんです……」"
translation = "「과, 역시 코코아 씨예요……」"

[[dialogue]]
speaker = "プリムラ"
original = "「フハハハハ！\u3000ピーマンを克服した我に敵はないのじゃ！\u3000あむっ、もぐもぐ……」"
translation = "「후하하하하! 피망을 극복한 나에게 적은 없는 것이니라! 냠, 우물우물……」"

[[dialogue]]
speaker = "unk"
original = "美味しそうにピーマンを頬張るプリムラに楽しそうな視線を向けるここあ。"
translation = "맛있게 피망을 입안 가득 넣는 프리무라에게 즐거운 시선을 보내는 코코아."

[[dialogue]]
speaker = "unk"
original = "後日──"
translation = "며칠 뒤──"

[[dialogue]]
speaker = "unk"
original = "ここあ秘伝の味付けを施されていないピーマンを、無防備に頬張ったプリムラが悲鳴を上げたのは言うまでもない。"
translation = "코코아 비전의 간이 되어 있지 않은 피망을 무방비하게 베어 문 프리무라가 비명을 지른 것은 말할 필요도 없다."

[[dialogue]]
speaker = "プリムラ"
original = "「何故じゃーーーっ！\u3000今日のピーマン、何でこんなに苦いのじゃーーーっ！！！」"
translation = "「어째서냐ーーー! 오늘 피망은 왜 이렇게 쓴 것이냐ーーー!!!」"

