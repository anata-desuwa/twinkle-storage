[[dialogue]]
speaker = "unk"
original = "第４話,愛の芽生え,P"
translation = "제4화, 사랑의 싹틈, P"

[[dialogue]]
speaker = "unk"
original = "ショーウインドーに下着だけを身に着けたマネキンが立ち並ぶお店に到着。"
translation = "쇼윈도에 속옷만 입은 마네킹들이 늘어선 가게에 도착."

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「まあ、ここが下着屋さん……！\u3000マネキンさんの下着はとてもカラフルで、私が持っているのと全然違いますね」"
translation = "「어머, 여기가 속옷 가게……! 마네킹들의 속옷은 무척 알록달록해서 제가 가진 거랑 전혀 다르네요」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「フリフリがついていたり、ベルトがついていたり……まるでドレスのようですね。とても可愛らしいです」"
translation = "「레이스가 달려 있기도 하고, 벨트가 있기도 하고…… 마치 드레스 같네요. 정말 사랑스러워요」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「あのＶの字のようになっている細いヒモは？\u3000えっ、あれも下着なのですか？」"
translation = "「저 V자 모양으로 된 얇은 끈은요? 엣, 저것도 속옷인가요?」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「アレで隠せるくらい、お胸が小さな方もいらっしゃるのでしょうか……私だとはみ出てしまいます」"
translation = "「저걸로 가려질 만큼 가슴이 작은 분도 계시는 걸까요…… 저는 삐져나와 버릴 거예요」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「まあ、あの下着は、乳首とお股の部分に穴が開いているんですね」"
translation = "「어머나, 저 속옷은 유두랑 가랑이 부분에 구멍이 뚫려 있네요」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「あれなら母乳をあげたり、おトイレの際に脱がなくてもいいですね。とても機能的です」"
translation = "「저거라면 모유를 주거나 화장실에 갈 때 벗지 않아도 되겠어요. 정말 기능적이네요」"

[[dialogue]]
speaker = "unk"
original = "（これはそういう用途じゃないと思う……）"
translation = "（이건 그런 용도가 아니라고 생각하는데……）"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「ふふふ、普段こういったお店に来ることがないものですから、見ているだけでも少し楽しくなります」"
translation = "「후후후, 평소에 이런 가게에 올 일이 없다 보니 보고 있는 것만으로도 조금 즐거워지네요」"

[[dialogue]]
speaker = "unk"
original = "気に入ったのはあります？"
translation = "마음에 드는 거 있어요?"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「どれも素敵で迷ってしまいますね……」"
translation = "「전부 멋져서 고민되네요……」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「会長さんはどういった下着がお好きなんですか？」"
translation = "「회장님은 어떤 속옷을 좋아하시나요?」"

[[dialogue]]
speaker = "unk"
original = "あ、あれとか……？"
translation = "저, 저거라든가……?"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「まあ……これ、ですか？\u3000フリルがたくさんついていて、ひらひらしていますね。生地が薄くて少し透けているようですが……」"
translation = "「어머…… 이거 말인가요? 프릴이 잔뜩 달려 있어서 하늘하늘하네요. 원단이 얇아서 조금 비치는 것 같지만……」"

[[dialogue]]
speaker = "unk"
original = "苦し紛れに指差してしまったのは、ボディに自身がないと絶対に着れない、レオタードのようなセクシーランジェリーだった。"
translation = "고육지책으로 가리킨 것은 몸매에 자신이 없으면 절대로 입을 수 없는 레오타드 같은 섹시 란제리였다."

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「とても美しいです……まるで女神様のようですけど、私に似合うでしょうか……」"
translation = "「정말 아름다워요…… 마치 여신님 같지만, 제게 어울릴까요……」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「いえ、今日は会長さんに選んでもらうと決めたのですから、会長さんを信じないといけませんね。着こなせるか自信がないですが、ちょっと試着してみます」"
translation = "「아니에요, 오늘은 회장님이 골라주시기로 했으니 회장님을 믿어야겠죠. 잘 소화할 자신은 없지만 잠깐 시착해볼게요」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「わぁ、すごく可愛いです。なんだか私ではないみたい……！」"
translation = "「와아, 정말 귀여워요. 왠지 제가 아닌 것 같아요……!」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「でも、どうしてでしょう、会長さんにお見せするのが、とても恥ずかしい……！」"
translation = "「하지만 왜일까요, 회장님께 보여드리는 게 너무 부끄러워요……!」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「ご、ごめんなさい、会長さん。その、とても可愛いのですけど……！」"
translation = "「죄, 죄송해요, 회장님. 그게, 무척 귀엽긴 한데……!」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「せっかく買ったのに、お見せできませんでした……」"
translation = "「일부러 샀는데 보여드리지 못했네요……」"

[[dialogue]]
speaker = "unk"
original = "あまりに人に見せるものじゃないからね……"
translation = "원래 남에게 쉽게 보여줄 만한 게 아니니까……"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「そうなのですか……？\u3000いざという時に彼氏に見せる勝負下着だと店員さんがおっしゃっていたのですけど」"
translation = "「그런가요……? 결정적인 순간에 남자친구에게 보여주는 승부 속옷이라고 점원분이 그러셨는데」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「いざという時……？\u3000勝負下着とはなんなのでしょう……？」"
translation = "「결정적인 순간……? 승부 속옷이란 게 뭘까요……?」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「ハッ──きっとフランさんのカツ丼のように願掛けとして着用するのですね！\u3000おそらくフランさんも、応援団の時はこのような下着を着けているのでしょう」"
translation = "「앗── 분명 프랑 씨의 돈가스 덮밥처럼 기원하는 마음으로 입는 거군요! 아마 프랑 씨도 응원단 활동 때는 이런 속옷을 입고 있을 거예요」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「フランさんがどのような勝負下着を身に着けているか、お聞きしてみたいと思います！」"
translation = "「프랑 씨가 어떤 승부 속옷을 입고 있는지 물어보고 싶네요!」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「フランさんはどんな勝負下着を着けているんですか？」"
translation = "「프랑 씨는 어떤 승부 속옷을 입나요?」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「ぶーーーーーーーーっ！！？！？」"
translation = "「푸하아아아아아악!!?!?」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「げほっ！\u3000げほっ！\u3000いきなり何言い出すんだ！\u3000コーラ吹き出しちまったじゃねえか！」"
translation = "「게흑! 게흑! 갑자기 무슨 소릴 하는 거야! 콜라 뿜어버렸잖아!」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「そんなこと聞いてくるってことは……会長との間に進展でもあったか？」"
translation = "「그런 걸 물어본다는 건…… 회장이랑 사이에 진전이라도 있었냐?」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「ええと、本当はフランさんにも秘密と言われたのですけど、この前……」"
translation = "「그게, 사실 프랑 씨에게도 비밀이라고 하셨는데, 요전에……」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「ふんふん……なるほど。会長との買い物デートは大成功だったってわけだ」"
translation = "「음음…… 그렇구만. 회장이랑 쇼핑 데이트는 대성공이었다는 거네」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「デ、デートだなんて、そんな……ただのお買い物ですよ」"
translation = "「데, 데이트라니 그런…… 그냥 쇼핑이었어요」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「普通は男女で下着を買いに行ったりしねえよ。さすがのオレでも、会長と一緒に下着を買いに行く度胸はねえ」"
translation = "「보통 남녀가 속옷을 사러 가거나 하지는 않는다고. 나라도 회장이랑 속옷 사러 갈 용기는 없어」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「そ、そういうものなのですね……さすがの私でも、下着姿を会長さんに見せる度胸はありませんでしたけど……」"
translation = "「그, 그런 거였군요…… 저도 속옷 차림을 회장님께 보여드릴 용기는 없었지만요……」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「天然なグロリアが？\u3000てっきり、その勝負下着とやらを見せちまったのかと思ったぜ」"
translation = "「천연인 글로리아가? 난 당연히 그 승부 속옷인가 뭔가를 보여준 줄 알았네」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「最初はそのつもりだったのですけど、着替えている最中に無性に恥ずかしくなってしまって……見せられませんでした……」"
translation = "「처음에는 그럴 생각이었는데, 갈아입는 도중에 너무 부끄러워져서…… 보여드리지 못했어요……」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「はーん？\u3000ふーん？\u3000なるほどなー？」"
translation = "「흐음~? 그래~? 그렇구만~?」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「な、なんですか？」"
translation = "「왜, 왜 그러시나요?」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「いやあ、オレも色恋沙汰には鈍い方だけど、それでもわかるぜ。そりゃ会長を男として意識してるってことだ」"
translation = "「나도 연애 쪽엔 둔한 편이지만 그래도 알겠어. 그건 회장을 남자로 의식하고 있다는 소리야」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「グロリア、会長にマジで惚れたんじゃねえの？」"
translation = "「글로리아, 회장한테 진짜로 반한 거 아냐?」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「惚れ……？\u3000ええ、元から会長さんのことは一緒に死んでもいいくらいに好き……あら？\u3000あらら？」"
translation = "「반하다니……? 네, 원래부터 회장님은 함께 죽어도 좋을 정도로 좋아했…… 어라? 어라라?」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「どうした？」"
translation = "「왜 그래?」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「いえ、その……私、会長さんと一緒に死にたいのは確かなのですが、別の気持ちもあるような気がして……」"
translation = "「아니요, 그게…… 제가 회장님과 함께 죽고 싶은 건 확실한데, 다른 감정도 있는 것 같아서……」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「できることなら、もっと一緒の時間を過ごしたいと思っているような……」"
translation = "「가능하다면 좀 더 함께 시간을 보내고 싶다고 생각하는 것 같은……」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「はは、それなら決まりじゃねえか。会長とずっと一緒にいたい。一生、添い遂げたいってことだろ」"
translation = "「하하, 그럼 정해진 거 아냐. 회장이랑 계속 같이 있고 싶다. 평생 함께하고 싶다는 거잖아」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「添い遂げ――あっ、ああ……！？」"
translation = "「함께하고 싶다── 앗, 아아……!?」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「もしかして、これが愛と呼ぶ感情……！？\u3000なのでしょうか……！？」"
translation = "「혹시 이게 사랑이라고 부르는 감정……!? 인가요……!?」"

[[dialogue]]
speaker = "unk"
original = "おーい、グロリアさん、フラン"
translation = "여보세요, 글로리아 씨, 프랑"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「か、会長さんっ……！」"
translation = "「회, 회장님……!」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「おっと、オレはお邪魔虫になりそうだな。んじゃ、グロリア、上手くやれよ」"
translation = "「오 이런, 난 방해꾼이 될 것 같네. 그럼 글로리아, 잘 해보라고」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「ま、待ってください、フランさん！\u3000私、何を話していいか……！」"
translation = "「기, 기다려주세요, 프랑 씨! 저, 무슨 말을 해야 할지……!」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「この感情に気づいてしまったら、会長さんの顔をまっすぐ見られないじゃないですかぁーっ！」"
translation = "「이 감정을 깨달아버리니까 회장님 얼굴을 똑바로 못 보겠잖아요오-!」"

