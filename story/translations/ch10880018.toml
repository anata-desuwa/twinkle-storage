[[dialogue]]
speaker = "リーナ"
original = "「お兄ちゃ～ん<emoji=heart04>」"
translation = "「오빠아~<emoji=heart04>」"

[[dialogue]]
speaker = "リーナ"
original = "「ぎゅ～っ<emoji=heart04>\u3000お兄ちゃん大好き<emoji=heart04>」"
translation = "「꼬옥~<emoji=heart04> 오빠 너무 좋아<emoji=heart04>」"

[[dialogue]]
speaker = "リーナ"
original = "「今日はおうちデートだよっ♪\u3000さっ、おてて繋いでいこっ♪」"
translation = "「오늘은 집 데이트야♪ 자, 손잡고 가자♪」"

[[dialogue]]
speaker = "unk"
original = "リーナがその小さな手で、俺の手をぎゅっと握る。"
translation = "리나가 그 작은 손으로 내 손을 꽉 쥔다."

[[dialogue]]
speaker = "リーナ"
original = "「お兄ちゃん……」"
translation = "「오빠……」"

[[dialogue]]
speaker = "クロト"
original = "「リーナ？」"
translation = "「리나?」"

[[dialogue]]
speaker = "リーナ"
original = "「ううん、なんでもないっ。早くお兄ちゃんのおうちに帰ろっ」"
translation = "「으응, 아무것도 아냐. 얼른 오빠네 집으로 돌아가자」"

[[dialogue]]
speaker = "unk"
original = "何かをごまかすように、俺の手を強く引くリーナ。"
translation = "무언가를 얼버무리듯 내 손을 강하게 끄는 리나."

[[dialogue]]
speaker = "unk"
original = "不思議に思いながらも、無邪気な妹に振り回されるように一緒に帰ったのだった。"
translation = "이상하게 생각하면서도, 천진난만한 여동생에게 휘둘리듯 함께 귀가했다."

[[dialogue]]
speaker = "unk"
original = "それからゲームをしたり、料理を教えたりしてリーナと過ごしていたのだが……"
translation = "그 후 게임을 하거나 요리를 가르쳐 주며 리나와 시간을 보냈는데……"

[[dialogue]]
speaker = "リーナ"
original = "「お兄ちゃん、なんだか眠そうだけど大丈夫？」"
translation = "「오빠, 왠지 졸려 보이는데 괜찮아?」"

[[dialogue]]
speaker = "クロト"
original = "「最近忙しくて、あんまり眠れてなくて。でも大丈夫だよ」"
translation = "「요즘 바빠서 잠을 잘 못 잤거든. 그래도 괜찮아」"

[[dialogue]]
speaker = "リーナ"
original = "「なのにリーナの相手してくれたんだ。ありがとう、お兄ちゃん。リーナ１人でゲームしてるから、ちょっと寝てても大丈夫だよ」"
translation = "「그런데도 리나랑 놀아준 거구나. 고마워, 오빠. 리나 혼자 게임 하고 있을 테니까, 조금 자도 괜찮아」"

[[dialogue]]
speaker = "クロト"
original = "「じゃあ、お言葉に甘えて……」"
translation = "「그럼, 호의를 받아들여서……」"

[[dialogue]]
speaker = "unk"
original = "１時間ほど休もうと、自分の部屋のベッドに横になって──"
translation = "한 시간 정도 쉴 생각으로 자기 방 침대에 누워──"

[[dialogue]]
speaker = "リーナ"
original = "「お兄ちゃん……<emoji=heart04>」"
translation = "「오빠……<emoji=heart04>」"

[[dialogue]]
speaker = "リーナ"
original = "「リーナ、お兄ちゃんといると、とてもドキドキしちゃうの……<emoji=heart04>\u3000だからね……<emoji=heart04>」"
translation = "「리나, 오빠랑 있으면 너무 두근거려버려……<emoji=heart04> 그러니까 말이야……<emoji=heart04>」"

[[dialogue]]
speaker = "リーナ"
original = "「あ、お兄ちゃん、起きたんだ。おはよう♪」"
translation = "「아, 오빠 일어났구나. 안녕♪」"

[[dialogue]]
speaker = "クロト"
original = "「あ、ああ……」"
translation = "「아, 어어……」"

[[dialogue]]
speaker = "unk"
original = "意識が覚醒してくるにつれ、異変に気付く。"
translation = "의식이 깨어남에 따라 이변을 깨닫는다."

[[dialogue]]
speaker = "unk"
original = "リーナが俺に乗っている──のはまだいい。じゃれつかれることは今までもよくあった。"
translation = "리나가 내 위에 올라타 있다──는 것까진 괜찮다. 장난치며 달라붙는 일은 전에도 자주 있었다."

[[dialogue]]
speaker = "unk"
original = "だけどリーナは服をはだけて、小さなおっぱいが露わになっていて……"
translation = "하지만 리나는 옷을 풀어 헤쳐 작은 가슴이 드러나 있었고……"

[[dialogue]]
speaker = "unk"
original = "そして俺はほとんど裸にされ、熱く柔らかい感触がペニスを包み込んでいた。"
translation = "그리고 나는 거의 발가벗겨져, 뜨겁고 부드러운 감촉이 자지를 감싸고 있었다."

[[dialogue]]
speaker = "クロト"
original = "「リ、リーナ……？」"
translation = "「리, 리나……?」"

[[dialogue]]
speaker = "リーナ"
original = "「な～に？」"
translation = "「왜~에?」"

[[dialogue]]
speaker = "unk"
original = "リーナがとぼけるようにイタズラっぽい笑みを浮かべ、その小悪魔的な表情にゾクリと背筋が震える。"
translation = "리나가 시치미를 떼듯 장난스러운 미소를 지었고, 그 소악마 같은 표정에 소름이 돋으며 등골이 떨린다."

[[dialogue]]
speaker = "unk"
original = "だけどペニスを呑み込む熱さは幻ではなくて、きゅうっと締め付けてくる圧迫感に、自分の意思とは関係なしに下半身が硬くなっていく。"
translation = "하지만 자지를 집어삼킨 뜨거움은 환상이 아니었고, 꽉 조여오는 압박감에 내 의사와는 상관없이 하반신이 딱딱해져 간다."

[[dialogue]]
speaker = "クロト"
original = "「リーナ……スカートを上げてくれないか……？」"
translation = "「리나…… 스커트를 올려주지 않을래……?」"

[[dialogue]]
speaker = "リーナ"
original = "「も～、お兄ちゃんのエッチ♪」"
translation = "「정말~ 오빠 변태♪」"

[[dialogue]]
speaker = "リーナ"
original = "「でもお兄ちゃんならいいよ♪\u3000リーナのスカートの中、見せてあげるね♪」"
translation = "「하지만 오빠라면 괜찮아♪ 리나의 치마 속, 보여줄게♪」"

[[dialogue]]
speaker = "unk"
original = "恐る恐るお願いすると、リーナは楽しそうにスカートの裾を持ち上げて──"
translation = "조심스레 부탁하자 리나는 즐거운 듯 치마 자락을 들어 올리고──"

[[dialogue]]
speaker = "リーナ"
original = "「ぴらっ<emoji=heart04>」"
translation = "「풀러덩<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「──！！？」"
translation = "「──!!?」"

[[dialogue]]
speaker = "unk"
original = "スカートの中が露わになった瞬間、ペニスを飲み込んだ秘部が目に飛び込んできた。"
translation = "치마 속이 드러난 순간, 페니스를 삼킨 비부가 눈에 들어왔다."

[[dialogue]]
speaker = "リーナ"
original = "「んんっ……<emoji=heart04>\u3000お兄ちゃん、リーナの中で大きくなったぁ……<emoji=heart04>」"
translation = "「으음……<emoji=heart04> 오빠, 리나 안에서 커졌어어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リーナの小さなそこは、俺のペニスをしっかり咥え込んでいて、ぷにぷにとした肉の弾力を感じる。"
translation = "리나의 작은 그곳은, 내 페니스를 꽉 물고 있어서, 몰랑몰랑한 살의 탄력이 느껴진다."

[[dialogue]]
speaker = "unk"
original = "信じられない光景に唖然とするが、押し寄せる快感のせいで下半身に血流が集まっていく。"
translation = "믿을 수 없는 광경에 아연실색하지만, 밀려오는 쾌감 때문에 하반신으로 혈류가 모여든다."

[[dialogue]]
speaker = "クロト"
original = "「どう、して……？」"
translation = "「어, 째서……?」"

[[dialogue]]
speaker = "リーナ"
original = "「リーナね、お兄ちゃんがすごくすごく好きで、大好きなの<emoji=heart04>」"
translation = "「리나 말이야, 오빠를 정말정말 좋아하고, 사랑하거든<emoji=heart04>」"

[[dialogue]]
speaker = "リーナ"
original = "「でもお兄ちゃんの周りってたくさんの女の人がいるでしょ？\u3000だからどうしたらリーナだけのお兄ちゃんにできるのって、ヴァレリーお姉ちゃんに相談したんだ」"
translation = "「하지만 오빠 주변에는 여자들이 잔뜩 있잖아? 그래서 어떻게 하면 리나만의 오빠로 만들 수 있을까 하고, 발레리 언니한테 상담했어」"

[[dialogue]]
speaker = "リーナ"
original = "「そうしたら、リーナのお股でお兄ちゃんのおち○ちんを食べてあげたらいいって教えてもらったの<emoji=heart04>」"
translation = "「그랬더니, 리나의 가랑이로 오빠의 자지를 먹어주면 된다고 가르쳐줬어<emoji=heart04>」"

[[dialogue]]
speaker = "リーナ"
original = "「お兄ちゃんのおち○ちん、最初はふにふにだったけど、リーナの中で硬くなってる<emoji=heart04>\u3000これってお兄ちゃんが喜んでるんだよね？」"
translation = "「오빠 자지, 처음에는 말랑말랑했는데, 리나 안에서 딱딱해지고 있어<emoji=heart04> 이건 오빠가 기뻐하고 있다는 거지?」"

[[dialogue]]
speaker = "リーナ"
original = "「おち○ちん、ほんとにリーナのお股に入っちゃうんだね……<emoji=heart04>\u3000お股に入れた時は痛かったし、今もちょっと苦しいけど、嫌いじゃないかも……<emoji=heart04>」"
translation = "「자지, 정말로 리나 가랑이에 들어가 버리는구나……<emoji=heart04> 가랑이에 넣었을 때는 아팠고, 지금도 조금 괴롭지만, 싫지 않을지도……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "自分が意識のない間に、妹と行為に及んでいたことに愕然とする。"
translation = "자신이 의식이 없는 사이에, 여동생과 행위에 이르고 있었다는 사실에 경악한다."

[[dialogue]]
speaker = "unk"
original = "だけど肉壁が隙間なくペニスに密着して、否定しようのない快感が上ってくる。"
translation = "하지만 육벽이 빈틈없이 페니스에 밀착해서, 부정할 수 없는 쾌감이 올라온다."

[[dialogue]]
speaker = "クロト"
original = "「兄妹でこんなこと……」"
translation = "「남매끼리 이런 짓을……」"

[[dialogue]]
speaker = "リーナ"
original = "「お兄ちゃん<emoji=heart04>」"
translation = "「오빠<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「くぁ──っ」"
translation = "「크아──악」"

[[dialogue]]
speaker = "unk"
original = "身を起そうとするが、リーナの瞳に宿った底なしの闇に力が吸い込まれる。"
translation = "몸을 일으키려 하지만, 리나의 눈동자에 깃든 바닥 없는 어둠에 힘이 빨려 들어간다."

[[dialogue]]
speaker = "クロト"
original = "（コラプサーの力か……！？）"
translation = " (콜랩서의 힘인가……!?)"

[[dialogue]]
speaker = "unk"
original = "体に力が入らない。動けない。何もできない。"
translation = "몸에 힘이 들어가지 않는다. 움직일 수 없다. 아무것도 할 수 없다."

[[dialogue]]
speaker = "unk"
original = "なのにペニスは勃起したまま、下半身だけ感覚があるようで……"
translation = "그런데도 페니스는 발기한 채로, 하반신만 감각이 있는 것 같아서……"

[[dialogue]]
speaker = "リーナ"
original = "「はあぁ……お股ムズムズするぅ……はぁ、はぁ……」"
translation = "「하아아…… 가랑이가 근질근질해…… 하아, 하아……」"

[[dialogue]]
speaker = "unk"
original = "荒い息を吐きながら、リーナが体を持ち上げて──"
translation = "거친 숨을 내뱉으며, 리나가 몸을 들어 올리고──"

[[dialogue]]
speaker = "リーナ"
original = "「ふああぁっ<emoji=heart04>\u3000体、勝手に動いちゃうぅ……<emoji=heart04>\u3000はぁ、はんっ……んんっ……<emoji=heart04>」"
translation = "「후아아앗<emoji=heart04> 몸이, 멋대로 움직여버려……<emoji=heart04> 하아, 한…… 으응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "セックスのやり方を知ってか知らずか、リーナが小さな体を上下に揺らす。"
translation = "섹스 방법을 아는지 모르는지, 리나가 작은 몸을 상하로 흔든다."

[[dialogue]]
speaker = "リーナ"
original = "「はぁ、はぁ……はっ……ぁん……<emoji=heart04>\u3000お兄ちゃんのおち○ちん、熱い……<emoji=heart04>\u3000お股の中で、おち○ちん擦れてるぅ……<emoji=heart04>」"
translation = "「하아, 하아…… 하앗…… 아앙……<emoji=heart04> 오빠의 자지, 뜨거워……<emoji=heart04> 가랑이 안에서, 자지가 스치고 있어……<emoji=heart04>」"

[[dialogue]]
speaker = "リーナ"
original = "「んはぁ、はぁ……すごい……<emoji=heart04>\u3000おち○ちん擦れると、お股、ジンジンして、熱くなるのぉ……<emoji=heart04>」"
translation = "「으응하아, 하아…… 대단해……<emoji=heart04> 자지가 스치면, 가랑이가, 징징 울리면서, 뜨거워져……<emoji=heart04>」"

[[dialogue]]
speaker = "リーナ"
original = "「お股、気持ち、いい……はぁ、んっ……体、動くの、止まらない……<emoji=heart04>\u3000んんっ……はあぁっ……あぁんっ……<emoji=heart04>」"
translation = "「가랑이, 기분, 좋아…… 하아, 응…… 몸이, 움직이는 거, 안 멈춰……<emoji=heart04> 으응…… 하아아…… 아앙……<emoji=heart04>」"

[[dialogue]]
speaker = "リーナ"
original = "「リーナの中で、お兄ちゃんを感じるの……<emoji=heart04>\u3000あっ、あっ……いい……<emoji=heart04>\u3000んぁ、はっ……これ、好きぃっ<emoji=heart04>」"
translation = "「리나의 안에서, 오빠를 느껴……<emoji=heart04> 앗, 앗…… 좋아……<emoji=heart04> 응아, 하앗…… 이거, 좋아아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リーナが腰を落とす度、いきり立ったペニスが小さな膣を広げて突き刺さる。"
translation = "리나가 허리를 내릴 때마다, 바짝 선 페니스가 작은 질을 넓히며 박힌다."

[[dialogue]]
speaker = "unk"
original = "すると窮屈なくらい狭い膣壁に絞られ、否応なしに快楽が駆け上った。"
translation = "그러자 거북할 정도로 좁은 질벽에 조여져, 유무를 불문하고 쾌락이 치밀어 올랐다."

[[dialogue]]
speaker = "リーナ"
original = "「ふああぁっ<emoji=heart04>\u3000お兄ちゃんのおち○ちん、おっきいよぉっ……<emoji=heart04>\u3000ふあっ、ああっ……はぁ……はんっ<emoji=heart04>」"
translation = "「후아아앗<emoji=heart04> 오빠의 자지, 커어……<emoji=heart04> 후아, 아앗…… 하아…… 하안<emoji=heart04>」"

[[dialogue]]
speaker = "リーナ"
original = "「お兄ちゃんが、リーナの中に入ってきてるっ<emoji=heart04>\u3000リーナのお腹、お兄ちゃんのおち○ちんで、いっぱいになっちゃうっ<emoji=heart04>」"
translation = "「오빠가, 리나 안으로 들어오고 있어<emoji=heart04> 리나의 배, 오빠의 자지로 가득 차버려<emoji=heart04>」"

[[dialogue]]
speaker = "リーナ"
original = "「お兄ちゃんと繋がるの好き<emoji=heart04>\u3000あっ、あっ……ふわふわして、ドキドキして、お兄ちゃんがもっと大好きになるのっ<emoji=heart04>」"
translation = "「오빠랑 이어지는 거 좋아<emoji=heart04> 앗, 아…… 폭신폭신하고, 두근거려서, 오빠가 더 좋아하게 돼버려<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リーナの中から蜜がにじみ出し、ぐちゅぐちゅと卑猥な音を鳴らす。"
translation = "리나의 안에서 애액이 배어 나와, 구츄구츄하고 비외한 소리를 울린다."

[[dialogue]]
speaker = "unk"
original = "ペニスに絡みつく愛液と粘膜の感触が思考を痺れさせていく。"
translation = "페니스에 휘감기는 애액과 점막의 감촉이 사고를 마비시켜 간다."

[[dialogue]]
speaker = "クロト"
original = "「くっ……リーナ、これはエッチなことなんだ……兄妹でエッチなことするのはダメだから……」"
translation = "「큭…… 리나, 이건 야한 짓이야…… 남매끼리 야한 짓을 하는 건 안 되니까……」"

[[dialogue]]
speaker = "unk"
original = "それでも力を振り絞ってリーナを制止しようとするが、次の瞬間、ただで狭い膣がさらにぎゅっと収縮した。"
translation = "그럼에도 힘을 쥐어짜 리나를 제지하려 하지만, 다음 순간, 가뜩이나 좁은 질이 더욱 꽉 수축했다."

[[dialogue]]
speaker = "リーナ"
original = "「んんっ──<emoji=heart04>」"
translation = "「응으으윽──<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「うぁああっ──！？」"
translation = "「우아아앗──!?」"

[[dialogue]]
speaker = "unk"
original = "きつく締められ、思わず射精してしまいそうなところをギリギリで押しとどめる。"
translation = "세게 조여오는 바람에, 나도 모르게 사정해버릴 것 같은 것을 간신히 억눌렀다."

[[dialogue]]
speaker = "リーナ"
original = "「アハハッ♪\u3000リーナ、コツ掴んじゃったかも♪」"
translation = "「아하핫♪ 리나, 요령을 터득해버렸을지도♪」"

[[dialogue]]
speaker = "リーナ"
original = "「ふふ……ふふふ<emoji=heart04>\u3000これがエッチなんだ<emoji=heart04>\u3000リーナ、お兄ちゃんとエッチしちゃってるんだぁっ……<emoji=heart04>」"
translation = "「후후…… 후후후<emoji=heart04> 이게 야한 거구나<emoji=heart04> 리나, 오빠랑 야한 짓 하고 있어……<emoji=heart04>」"

[[dialogue]]
speaker = "リーナ"
original = "「はぁ、あっ……どうしてお兄ちゃんとエッチしちゃダメなの？\u3000リーナ、お兄ちゃん大好きだよ？\u3000お兄ちゃんのこと世界で一番愛してるよ？」"
translation = "「하아, 앗…… 어째서 오빠랑 야한 짓 하면 안 되는 거야? 리나는 오빠를 정말 좋아해. 오빠를 세상에서 제일 사랑해?」"

[[dialogue]]
speaker = "リーナ"
original = "「だからお兄ちゃんとエッチしてもいいよねっ<emoji=heart04>\u3000好きだからいいよねっ<emoji=heart04>\u3000はっ、あっ、あんっ<emoji=heart04>\u3000お兄ちゃんとエッチするの、気持ちいいっ<emoji=heart04>」"
translation = "「그러니까 오빠랑 에치해도 괜찮지<emoji=heart04> 좋아하니까 괜찮지<emoji=heart04> 하윽, 앗, 응으윽<emoji=heart04> 오빠랑 에치하는 거, 기분 좋아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リーナの甘い声が、兄であろうとする俺の理性を溶かそうとする。"
translation = "리나의 달콤한 목소리가, 오빠로 남으려는 나의 이성을 녹이려 한다."

[[dialogue]]
speaker = "クロト"
original = "「でも俺は、お兄ちゃんだから……」"
translation = "「하지만 난, 오빠니까……」"

[[dialogue]]
speaker = "リーナ"
original = "「だけどお兄ちゃん、喜んでるよ？\u3000おち○ちん、ビクビク、ビクビクってしてるよ？」"
translation = "「그치만 오빠, 기뻐하고 있어? 자지, 파르르, 파르르 떨고 있다구?」"

[[dialogue]]
speaker = "リーナ"
original = "「これって気持ちいいんでしょ？\u3000お兄ちゃん、リーナのお股で気持ち良くなってくれてるんだよね？\u3000ねぇっ？」"
translation = "「이거 기분 좋은 거지? 오빠, 리나의 가랑이 사이에서 기분 좋아지고 있는 거지? 그치?」"

[[dialogue]]
speaker = "unk"
original = "否定したい。でもできない。"
translation = "부정하고 싶다. 하지만 할 수 없다."

[[dialogue]]
speaker = "unk"
original = "狭い膣に絞られて、拒絶しがたい快感が上ってくる。"
translation = "좁은 질에 조여져서, 거절하기 힘든 쾌감이 올라온다."

[[dialogue]]
speaker = "リーナ"
original = "「ふああっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ああんっ<emoji=heart04>\u3000お兄ちゃんのおち○ちん気持ちいいよぉっ<emoji=heart04>\u3000お股気持ちいいっ<emoji=heart04>」"
translation = "「후아앗<emoji=heart04> 앗<emoji=heart04> 아앙<emoji=heart04> 오빠 자지 기분 좋아아<emoji=heart04> 가랑이 기분 좋아<emoji=heart04>」"

[[dialogue]]
speaker = "リーナ"
original = "「ダメって言われても知らないっ<emoji=heart04>\u3000リーナが好きだからいいのっ<emoji=heart04>\u3000お兄ちゃんのこと好きだから、妹でもいいよね<emoji=heart04>」"
translation = "「안 된다고 말해도 몰라<emoji=heart04> 리나가 좋아하니까 괜찮은 거야<emoji=heart04> 오빠를 좋아하니까, 여동생이어도 괜찮지<emoji=heart04>」"

[[dialogue]]
speaker = "リーナ"
original = "「お股気持ちいいっ<emoji=heart04>\u3000エッチするの好きっ<emoji=heart04>\u3000あっ、あんっ<emoji=heart04>\u3000お兄ちゃんとエッチするの好きなのっ<emoji=heart04>」"
translation = "「가랑이 기분 좋아<emoji=heart04> 에치하는 거 좋아<emoji=heart04> 앗, 응으윽<emoji=heart04> 오빠랑 에치하는 거 좋아해<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺を本当の兄と慕うリーナが、俺の上で、俺のペニスで淫らに腰を振る。"
translation = "나를 친오빠처럼 따르는 리나가, 내 위에서, 내 페니스로 음란하게 허리를 흔든다."

[[dialogue]]
speaker = "リーナ"
original = "「アハッ♪\u3000お兄ちゃんのおち○ちん、また大きくなったぁっ<emoji=heart04>\u3000ふぁっ、はっ、はんっ<emoji=heart04>\u3000お兄ちゃん、好き、好きぃっ<emoji=heart04>」"
translation = "「아핫♪ 오빠 자지, 또 커졌어어<emoji=heart04> 후앗, 하앗, 하앙<emoji=heart04> 오빠, 좋아해, 좋아해애<emoji=heart04>」"

[[dialogue]]
speaker = "リーナ"
original = "「お兄ちゃん好きっ<emoji=heart04>\u3000大好きなのっ<emoji=heart04>\u3000お兄ちゃん<emoji=heart04>\u3000お兄ちゃんっ<emoji=heart04>\u3000お兄ちゃん──っ<emoji=heart04>」"
translation = "「오빠 좋아해<emoji=heart04> 너무 좋아해<emoji=heart04> 오빠<emoji=heart04> 오빠아<emoji=heart04> 오빠──앗<emoji=heart04>」"

[[dialogue]]
speaker = "リーナ"
original = "「はああぁんっ<emoji=heart04>\u3000もっと<emoji=heart04>\u3000もっとぉ<emoji=heart04>\u3000お兄ちゃん<emoji=heart04>\u3000お兄ちゃんっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000はっ<emoji=heart04>\u3000はっ──んん～～っ<emoji=heart04>」"
translation = "「하아아앙<emoji=heart04> 좀 더<emoji=heart04> 좀 더어<emoji=heart04> 오빠<emoji=heart04> 오빠아<emoji=heart04> 하앗<emoji=heart04> 하앗<emoji=heart04> 하앗──응으으으음<emoji=heart04>」"

[[dialogue]]
speaker = "リーナ"
original = "「お兄ちゃん好きっ<emoji=heart04>\u3000好き好き好きっ<emoji=heart04>\u3000お兄ちゃんお兄ちゃんっ<emoji=heart04>\u3000お兄ちゃあんっ<emoji=heart04>」"
translation = "「오빠 좋아해<emoji=heart04> 좋아좋아좋아해<emoji=heart04> 오빠 오빠아<emoji=heart04> 오빠아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リーナが勢いよく腰を沈め、ペニスがより深く飲み込まれた。"
translation = "리나가 기세 좋게 허리를 가라앉히자, 페니스가 더욱 깊게 집어삼켜졌다."

[[dialogue]]
speaker = "unk"
original = "トロトロの粘膜がペニス全体と擦れ合い、強すぎる快感が押し寄せる。"
translation = "눅진눅진한 점막이 페니스 전체와 서로 비벼지며, 너무나 강렬한 쾌감이 몰려온다."

[[dialogue]]
speaker = "リーナ"
original = "「ひあああぁっ<emoji=heart04><emoji=heart04>\u3000リーナの中、お兄ちゃんで、いっぱいになってるっ<emoji=heart04>\u3000お兄ちゃんのおち○ちん、太くて、おっきいっ<emoji=heart04>\u3000硬いおち○ちん、気持ちいいっ<emoji=heart04>」"
translation = "「히아아아앗<emoji=heart04><emoji=heart04> 리나 안, 오빠로 가득 차 있어<emoji=heart04> 오빠 자지, 굵고, 커어<emoji=heart04> 딱딱한 자지, 기분 좋아<emoji=heart04>」"

[[dialogue]]
speaker = "リーナ"
original = "「はぁっ──はぁっ──はっ──んんっ<emoji=heart04>\u3000お兄ちゃんっ<emoji=heart04>\u3000お兄ちゃんっ<emoji=heart04>\u3000お兄ちゃんとエッチするの気持ちいいっ<emoji=heart04>」"
translation = "「하앗──하앗──하앗──응윽<emoji=heart04> 오빠아<emoji=heart04> 오빠아<emoji=heart04> 오빠랑 에치하는 거 기분 좋아<emoji=heart04>」"

[[dialogue]]
speaker = "リーナ"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000そうだ、リーナは知らなかったけど、女の人のお股のこと、おま○こっていうんだよね？\u3000お兄ちゃんはリーナのおま○こ、気持ちいい？」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 응으윽<emoji=heart04> 맞다, 리나는 몰랐었는데, 여자의 가랑이 사이, 보지라고 하는 거지? 오빠는 리나 보지, 기분 좋아?」"

[[dialogue]]
speaker = "unk"
original = "リーナが腰を振りながら無邪気に尋ねてくるけど、素直に頷くことができない。"
translation = "리나가 허리를 흔들며 천진난만하게 물어오지만, 솔직하게 고개를 끄덕일 수가 없다."

[[dialogue]]
speaker = "リーナ"
original = "「き・も・ち・い・い？」"
translation = "「기·분·좋·아?」"

[[dialogue]]
speaker = "unk"
original = "だがリーナがまた下腹に力を込め、痛いぐらいにペニスを締め付ける。"
translation = "하지만 리나가 다시 하복부에 힘을 주어, 아플 정도로 페니스를 죄어온다."

[[dialogue]]
speaker = "クロト"
original = "「くうぅ──っ！？」"
translation = "「크으윽──!?」"

[[dialogue]]
speaker = "リーナ"
original = "「気持ちいい？\u3000気持ちいいんだよね？\u3000気持ちいいんだったらお兄ちゃんの口で言ってほしいな？」"
translation = "「기분 좋아? 기분 좋은 거지? 기분 좋으면 오빠 입으로 말해주면 좋겠는데?」"

[[dialogue]]
speaker = "リーナ"
original = "「リーナのおま○こ気持ちいい──よね？」"
translation = "「리나 보지 기분 좋아── 그치?」"

[[dialogue]]
speaker = "クロト"
original = "「あ、ああ……リーナのおま○こ気持ちいいよ」"
translation = "「아, 아아…… 리나 보지 기분 좋아」"

[[dialogue]]
speaker = "リーナ"
original = "「やった、嬉しい♪\u3000リーナとエッチするの気持ちいいんだね<emoji=heart04>\u3000だったら、リーナのおま○こで、もっと気持ち良くなってぇ<emoji=heart04>」"
translation = "「앗싸, 기뻐♪ 리나랑 에치하는 거 기분 좋구나<emoji=heart04> 그렇다면, 리나의 보지로, 더 기분 좋아져 줘어<emoji=heart04>」"

[[dialogue]]
speaker = "リーナ"
original = "「はあぁっ<emoji=heart04>\u3000はっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000一緒に気持ち良くなろっ<emoji=heart04>\u3000お兄ちゃん<emoji=heart04>\u3000お兄ちゃあんっ<emoji=heart04>」"
translation = "「하아앗<emoji=heart04> 핫<emoji=heart04> 하앙<emoji=heart04> 같이 기분 좋아지자<emoji=heart04> 오빠<emoji=heart04> 오빠아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "小さな蜜穴が、柔らかな肉壁が、はち切れそうに膨らんだペニスを圧迫しながら摩擦する。"
translation = "작은 꿀구멍이, 부드러운 육벽이, 터질 듯이 부풀어 오른 페니스를 압박하며 마찰한다."

[[dialogue]]
speaker = "unk"
original = "幼い容姿。甘い声。そんなリーナの愛らしさが罪の意識をかき立てた。"
translation = "어린 외모. 달콤한 목소리. 그런 리나의 사랑스러움이 죄책감을 부추겼다."

[[dialogue]]
speaker = "リーナ"
original = "「あっ──あっ──あっ──はあぁんっ<emoji=heart04>」"
translation = "「앗──앗──앗──하아앙<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「く……このままじゃ、出る……っ」"
translation = "「큭…… 이대로라면, 나와버려……!」"

[[dialogue]]
speaker = "リーナ"
original = "「出る……？\u3000おしっこ……？」"
translation = "「나와……? 쉬야……?」"

[[dialogue]]
speaker = "クロト"
original = "「おしっこじゃなくて、精液が出て……ぐっ……リーナの中に精液を出したら、赤ちゃんができるかもしれないんだ……」"
translation = "「쉬야가 아니라, 정액이 나와서…… 윽…… 리나의 안에 정액을 내보내면, 아기가 생길지도 몰라……」"

[[dialogue]]
speaker = "リーナ"
original = "「赤ちゃん……リーナが……お兄ちゃんの……」"
translation = "「아기…… 리나가…… 오빠의……」"

[[dialogue]]
speaker = "リーナ"
original = "「お兄ちゃんの赤ちゃん……<emoji=heart04>」"
translation = "「오빠의 아기……<emoji=heart04>」"

[[dialogue]]
speaker = "リーナ"
original = "「アハハッ、アハハハッ♪\u3000作ろっ<emoji=heart04>\u3000赤ちゃんっ<emoji=heart04>\u3000お兄ちゃんとリーナで、赤ちゃん作ろうっ<emoji=heart04>」"
translation = "「아하핫, 아하하하핫♪ 만들자<emoji=heart04> 아기<emoji=heart04> 오빠랑 리나랑, 아기 만들자<emoji=heart04>」"

[[dialogue]]
speaker = "リーナ"
original = "「お兄ちゃんはお兄ちゃんで、リーナは妹なんだから<emoji=heart04>\u3000お兄ちゃんと家族なんだから、赤ちゃんできてもいいでしょっ<emoji=heart04>」"
translation = "「오빠는 오빠고, 리나는 여동생이니까<emoji=heart04> 오빠랑 가족이니까, 아기가 생겨도 괜찮잖아<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「え……あ……？」"
translation = "「어…… 아……?」"

[[dialogue]]
speaker = "unk"
original = "リーナの支離滅裂な理屈に頭がぐちゃぐちゃになる。"
translation = "리나의 지리멸렬한 논리에 머릿속이 엉망진창이 된다."

[[dialogue]]
speaker = "unk"
original = "そんなわけない。ダメに決まっている。"
translation = "그럴 리 없다. 안 되는 게 당연하다."

[[dialogue]]
speaker = "unk"
original = "そのはずなのに、リーナの幼い声が侵食してきて……"
translation = "그럴 터인데, 리나의 어린 목소리가 침식해 들어와서……"

[[dialogue]]
speaker = "リーナ"
original = "「お兄ちゃんの赤ちゃんできるって聞いたら、リーナのお腹の奥、キュンってなったのっ<emoji=heart04>\u3000これってお兄ちゃんの赤ちゃん欲しいってことだよねっ？」"
translation = "「오빠 아기 생긴다는 말 들으니까, 리나의 뱃속 깊은 곳이 큥 하고 울렸어. 이거 오빠 아기를 갖고 싶다는 뜻이지?」"

[[dialogue]]
speaker = "リーナ"
original = "「欲しいっ<emoji=heart04>\u3000欲しいのっ<emoji=heart04>\u3000お兄ちゃんの赤ちゃんっ<emoji=heart04>\u3000お兄ちゃんと家族を作るのっ<emoji=heart04>\u3000お兄ちゃんと家族になるのっ<emoji=heart04>」"
translation = "「갖고 싶어<emoji=heart04> 갖고 싶단 말이야<emoji=heart04> 오빠 아기<emoji=heart04> 오빠랑 가족을 만들 거야<emoji=heart04> 오빠랑 가족이 되는 거야<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "精液を搾り取ろうと動きが加速し、小さな膣が奥までペニスを飲み込み、亀頭が何度も子宮にぶつかる。"
translation = "정액을 짜내려는 듯 움직임이 가속되고, 작은 질이 안쪽까지 페니스를 집어삼키며 귀두가 몇 번이고 자궁에 부딪힌다."

[[dialogue]]
speaker = "リーナ"
original = "「んん～～～っ<emoji=heart04><emoji=heart04>\u3000んっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000これすごいぃっ<emoji=heart04>\u3000お兄ちゃんのおち○ちん、リーナの奥まで来て、気持ちいいっ<emoji=heart04>\u3000おま○こ熱いのぉっ<emoji=heart04>」"
translation = "「응으으으윽<emoji=heart04><emoji=heart04> 응<emoji=heart04> 으응<emoji=heart04> 이거 굉장해애<emoji=heart04> 오빠 자지, 리나의 안쪽까지 와서 기분 좋아<emoji=heart04> 보지 뜨거워어<emoji=heart04>」"

[[dialogue]]
speaker = "リーナ"
original = "「はぁっ<emoji=heart04>\u3000はっ<emoji=heart04>\u3000はっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000お兄ちゃん、お兄ちゃん<emoji=heart04>\u3000お兄ちゃんお兄ちゃんお兄ちゃんっ<emoji=heart04>」"
translation = "「하아<emoji=heart04> 하앗<emoji=heart04> 하앗<emoji=heart04> 하앙<emoji=heart04> 오빠, 오빠<emoji=heart04> 오빠 오빠 오빠아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "もう止められない。止まらない。"
translation = "이제 멈출 수 없다. 멈추지 않는다."

[[dialogue]]
speaker = "unk"
original = "理性はぐずぐずに溶け、リーナの中に精を注げと本能が叫ぶ。"
translation = "이성은 흐물흐물하게 녹아내리고, 리나의 안에 정을 쏟으라고 본능이 절규한다."

[[dialogue]]
speaker = "リーナ"
original = "「ふぁあっ、あっ、ああぁんっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000おま○こキュンキュンして、何かくるっ<emoji=heart04>\u3000来ちゃうぅっ<emoji=heart04>」"
translation = "「화아, 앗, 아아앙<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 보지가 큥큥거려서, 뭔가 와<emoji=heart04> 와버려어<emoji=heart04>」"

[[dialogue]]
speaker = "リーナ"
original = "「あ──あ──あ──ふぁあああ～～っ<emoji=heart04>\u3000おち○ちんビクビクしてるっ<emoji=heart04>\u3000せーえきもう出るっ<emoji=heart04>\u3000出るんだっ<emoji=heart04>」"
translation = "「아──아──아──화아아아아아~~<emoji=heart04> 자지가 비쿠비쿠거려<emoji=heart04> 정자 이제 나와<emoji=heart04> 나온단 말이야<emoji=heart04>」"

[[dialogue]]
speaker = "リーナ"
original = "「ひぁ──あ──あ──んん～～っ<emoji=heart04><emoji=heart04>\u3000出して、出してっ<emoji=heart04>\u3000リーナの中にっ<emoji=heart04>\u3000お兄ちゃんの、赤ちゃんの素、ちょうだい～っ<emoji=heart04><emoji=heart04>」"
translation = "「히아──아──아──응으으~~<emoji=heart04><emoji=heart04> 내보내 줘, 내보내 줘<emoji=heart04> 리나의 안에<emoji=heart04> 오빠의, 아기 씨앗, 주세요오<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リーナが腰を沈め、亀頭が奥に届いた瞬間、頭が真っ白になって──"
translation = "리나가 허리를 가라앉히고 귀두가 안쪽에 닿은 순간, 머릿속이 하얗게 점멸하며──"

[[dialogue]]
speaker = "リーナ"
original = "「ひぁああああああ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「히아아아아아아아아아아아~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "リーナ"
original = "「あぁんっ<emoji=heart04>\u3000ふああっ<emoji=heart04>\u3000リーナの中に、ビューッて<emoji=heart04>\u3000お兄ちゃんの赤ちゃんの素、出てるっ<emoji=heart04>\u3000お腹の、奥にっ……んっ……熱いぃっ<emoji=heart04>」"
translation = "「아앙<emoji=heart04> 화아아<emoji=heart04> 리나의 안에, 뷰릇 하고<emoji=heart04> 오빠의 아기 씨앗, 나오고 있어<emoji=heart04> 배 안쪽이…… 응…… 뜨거워어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスが壊れんばかりに脈打ち、リーナの奥に勢いよく精を叩きつける。"
translation = "페니스가 터져 나갈 듯 고동치며 리나의 안쪽에 기세 좋게 정을 쏟아붓는다."

[[dialogue]]
speaker = "リーナ"
original = "「はあぁっ……はっ……んんっ<emoji=heart04>\u3000おま○この中で、おち○ちんビクビクしてるぅ……んっ……ふぁああっ<emoji=heart04>」"
translation = "「하아아…… 하앗…… 응으윽<emoji=heart04> 보지 안에서 자지가 비쿠비쿠거려…… 응…… 화아아아<emoji=heart04>」"

[[dialogue]]
speaker = "リーナ"
original = "「はぁはっ、あっ……すごいぃっ<emoji=heart04>\u3000お兄ちゃんので、リーナのお腹、熱いぃ……<emoji=heart04>\u3000気持ち、いいよぉ……<emoji=heart04>」"
translation = "「하아 하아, 앗…… 굉장해에<emoji=heart04> 오빠 거 때문에 리나 배가 뜨거워……<emoji=heart04> 기분, 좋아아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "自分から亀頭に子宮口を押し付け、小さな子宮で精液を飲むリーナ。"
translation = "스스로 귀두에 자궁구를 밀어붙이며, 작은 자궁으로 정액을 받아 마시는 리나."

[[dialogue]]
speaker = "unk"
original = "妹だと思っていた女の子に欲望を注ぐ罪悪感──なのに射精が止まらない。"
translation = "여동생이라 생각했던 소녀에게 욕망을 쏟아붓는 죄책감── 그런데도 사정이 멈추지 않는다."

[[dialogue]]
speaker = "unk"
original = "神経が焼き切れそうなほどの快感で意識が飛びかける。"
translation = "신경이 타버릴 듯한 쾌감에 의식이 날아갈 것만 같다."

[[dialogue]]
speaker = "リーナ"
original = "「ふはぁ、はぁ……全部出して、お兄ちゃん……んんっ<emoji=heart04>」"
translation = "「후하아, 하아…… 전부 내보내 줘, 오빠…… 응으윽<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「くっ……あっ……」"
translation = "「큭…… 앗……」"

[[dialogue]]
speaker = "リーナ"
original = "「あ<emoji=heart04>\u3000また出たぁ……<emoji=heart04>\u3000ん……んん……リーナの中、いっぱいにしてぇ……<emoji=heart04>」"
translation = "「아<emoji=heart04> 또 나왔다……<emoji=heart04> 응…… 으응…… 리나의 안, 가득 채워줘……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そして柔らかな膣にきつく締め付けられ、最後の一滴まで搾り取られた。"
translation = "그리고 부드러운 질에 꽉 조여지며 마지막 한 방울까지 짜내졌다."

[[dialogue]]
speaker = "リーナ"
original = "「はあぁ……お腹熱いよ……<emoji=heart04>\u3000お兄ちゃんの赤ちゃんの素で、リーナのお腹いっぱいになってるんだね……<emoji=heart04>」"
translation = "「하아아…… 배 뜨거워……<emoji=heart04> 오빠의 아기 씨앗으로 리나의 배가 가득 찼네……<emoji=heart04>」"

[[dialogue]]
speaker = "リーナ"
original = "「ふふ……<emoji=heart04>\u3000これでできるかもしれないんだよね……お兄ちゃんとリーナの赤ちゃん<emoji=heart04>\u3000楽しみだなぁ<emoji=heart04>」"
translation = "「후후……<emoji=heart04> 이걸로 생길지도 모르겠네…… 오빠랑 리나의 아기<emoji=heart04> 기대된다아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "結合部から溢れた精液が、リーナの中に注がれた量を物語る。"
translation = "결합부에서 흘러넘친 정액이 리나의 안에 쏟아진 양을 말해준다."

[[dialogue]]
speaker = "unk"
original = "リーナの中に出した。出してしまった。"
translation = "리나의 안에 내보냈다. 내보내고 말았다."

[[dialogue]]
speaker = "unk"
original = "大事なものを自分で穢してしまった喪失感が襲ってくる。"
translation = "소중한 것을 스스로 더럽혀버렸다는 상실감이 엄습한다."

[[dialogue]]
speaker = "リーナ"
original = "「幸せな家族、作りたいなぁ……<emoji=heart04>\u3000お兄ちゃんと、リーナで……ふふふ<emoji=heart04>」"
translation = "「행복한 가족, 만들고 싶다아……<emoji=heart04> 오빠랑 리나랑…… 후후후<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "心底幸せそうな笑みを浮かべて俺を見下ろすリーナ。"
translation = "진심으로 행복한 미소를 지으며 나를 내려다보는 리나."

[[dialogue]]
speaker = "unk"
original = "だけど俺は魂を抜かれたみたいに体に力が入らず、指一本動かすことができなかった。"
translation = "하지만 나는 넋이 나간 것처럼 몸에 힘이 들어가지 않아 손가락 하나 움직일 수 없었다."

[[dialogue]]
speaker = "リーナ"
original = "「お兄ちゃんはリーナだけのお兄ちゃんだから……<emoji=heart04>」"
translation = "「오빠는 리나만의 오빠니까……<emoji=heart04>」"

[[dialogue]]
speaker = "リーナ"
original = "「誰にも渡さないからね、お兄ちゃん<emoji=heart04>」"
translation = "「누구에게도 주지 않을 거야, 오빠<emoji=heart04>」"

