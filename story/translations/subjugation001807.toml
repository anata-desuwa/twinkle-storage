[[dialogue]]
speaker = "unk"
original = "リゾート結界でたくさん読書を楽しんだモネとリップル。"
translation = "리조트 결계에서 실컷 독서를 즐긴 모네와 리플."

[[dialogue]]
speaker = "unk"
original = "そして寮に帰ってきたモネは、結界のお礼にリップルに膝枕をすることになり──"
translation = "그리고 기숙사로 돌아온 모네는 결계에 대한 보답으로 리플에게 무릎베개를 해주게 되고──"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ふふふ、モネのオヒザとっても気持ちいいで～す♪」"
translation = "「후후후, 모네의 무릎 정말 기분 좋마시타~♪」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「これでお礼になってるかわからないですけど、いっぱい堪能してください」"
translation = "「이걸로 보답이 될지 모르겠지만, 마음껏 만끽하세요.」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ハイ♪\u3000今日はここがワタシのトクトウセキです♪」"
translation = "「하이♪ 오늘은 여기가 와타시의 특등석나리입니다♪」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ふふっ、リップルさんかわいいですね……なんだか、母性本能がくすぐられるかも……」"
translation = "「후훗, 리플 씨 귀엽네요…… 왠지 모성 본능이 자극될지도……」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「モネがお母さんデスか？\u3000それはとっても似合うと思いマ～ス！」"
translation = "「모네가 엄마나리입니까? 그건 정말 잘 어울릴 거라 생각마시타~!」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「えと、老けて見えるとかそういう話じゃないですよね……？」"
translation = "「그게, 나이 들어 보인다는 그런 뜻은 아니죠……?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「違いま～す。モネはホーヨーリョクがいっぱいってコトです！」"
translation = "「아니마시타. 모네는 포용력이 가득하다는 뜻나리입니다!」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「そういう意味なら、嬉しいかも……えへへ」"
translation = "「그런 의미라면 기쁠지도…… 에헤헤.」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「それにきっとモネはいいお母さんになれマス。モネの優しさに包まれる子どもはキット幸せだとオモイます」"
translation = "「그리고 분명 모네는 좋은 엄마가 될 것이마시타. 모네의 상냥함에 감싸이는 아이는 분명 행복할 거라 생각마시타.」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「私がお母さん……全然想像がつかないや……」"
translation = "「내가 엄마라니…… 전혀 상상이 안 가네……」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「まずはカレシを見つけるトコロからですね♪」"
translation = "「우선 남자친구를 찾는 것부터마시타네♪」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「かか彼氏……！？\u3000そんなっ、私になんて恐れ多い……！」"
translation = "「나나 남자친구……!? 그런, 저에게는 가당치도 않은……!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ワタシが男の子だったら、きっとモネにメロメロになりマスよ？\u3000それくらいモネはミリョク的で～す！」"
translation = "「와타시가 남자아이였다면 분명 모네에게 헤롱헤롱해졌을 것이마시타요? 그 정도로 모네는 매력적나리입니다~!」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「そ、そんな……照れちゃいますよ……」"
translation = "「그, 그런…… 부끄럽다구요……」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「照れてるモネもカワイイです♪\u3000ますますメロメロになりま～す♪」"
translation = "「부끄러워하는 모네도 귀엽마시타♪ 점점 더 헤롱헤롱해지마시타~♪」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「そういうリップルさんも、かわいい女の子なんですからねっ」"
translation = "「그렇게 말하는 리플 씨도 귀여운 여자아이니까요.」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「アリガトございます！\u3000モネに褒められてと～ってもウレシイです♪」"
translation = "「고맙마시타! 모네에게 칭찬받아서 정~말로 기쁘마시타♪」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「全然照れない……さすが陽の存在……。褒められた時の反応が１００点満点すぎるよ……」"
translation = "「전혀 부끄러워하지 않아…… 역시 양의 존재……. 칭찬받았을 때의 반응이 100점 만점이네……」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「そんなコトより、モネにまた本を読んでモライたいです」"
translation = "「그것보다 모네가 다시 책을 읽어줬으면 좋겠마시타.」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「リゾート結界であんなに本を読んだのにですか？\u3000もしかして本の楽しさに目覚めてくれたんです？」"
translation = "「리조트 결계에서 그렇게 책을 읽었는데도요? 혹시 책의 즐거움에 눈을 뜬 건가요?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ハイ♪\u3000モネと読んだ本はどれもＢＩＧハッピーでした♪\u3000本のこともモネと同じくらいダイスキです♪」"
translation = "「하이♪ 모네와 읽은 책은 전부 BIG 해피마시타♪ 책도 모네만큼 좋아해마시타♪」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「本好きに目覚めてくれるなんて……嬉しいですリップルさん！」"
translation = "「책의 즐거움을 알게 되다니…… 기뻐요 리플 씨!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「でもまだ１人で読むのはムツカシイです。だからモネに読んでホシイです」"
translation = "「하지만 아직 혼자 읽는 건 어렵마시타. 그러니까 모네가 읽어줬으면 좋겠나리입니다.」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「うん、それじゃあ……私の一番好きな絵本を読んであげますね」"
translation = "「응, 그럼…… 제가 제일 좋아하는 그림책을 읽어줄게요.」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「モネのナンバーワンですか？\u3000それはタノシミです！」"
translation = "「모네의 넘버원나리입니까? 그거 기대되마시타!」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「うん、私の一番の……クリスマスの思い出が詰まった絵本を……」"
translation = "「응, 내 최고의…… 크리스마스 추억이 담긴 그림책을……」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "（私がリップルさんに読んであげたのは、おじいちゃんにもらったあの絵本）"
translation = "（내가 리플 씨에게 읽어준 건 할아버지에게 받은 그 그림책.）"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "（まるで母が子にするように、優しく頭を撫でてあげながら）"
translation = "（마치 어머니가 아이에게 하듯이, 상냥하게 머리를 쓰다듬어 주면서.）"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "（あのクリスマスの日に、おじいちゃんがしてくれたように、ゆっくり読み聞かせました）"
translation = "（그 크리스마스 날에 할아버지가 해주셨던 것처럼, 천천히 읽어주었습니다.）"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「……とってもステキな絵本でした。クリスマスがテーマの本はハッピーな気持ちにナレます」"
translation = "「……정말로 멋진 그림책이었마시타. 크리스마스가 테마인 책은 해피한 기분이 되어마시타.」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「はい。子どもの頃から大好きで何度も何度も読み返してるんです」"
translation = "「네. 어릴 때부터 정말 좋아해서 몇 번이고 다시 읽고 있거든요.」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ワタシ、クリスマスのコト知れてよかったです」"
translation = "「와타시, 크리스마스에 대해 알게 되어 다행마시타.」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「私もリップルさんのおかげでクリスマスのことがもっと好きになれました」"
translation = "「저도 리플 씨 덕분에 크리스마스가 더 좋아졌어요.」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「誰かをヨロコバせたい。大好きな誰かと一緒にタノシミたい……クリスマスはそんなハッピーが集まった、特別な日ナンですね」"
translation = "「누군가를 기쁘게 하고 싶다. 좋아하는 누군가와 함께 즐기고 싶다…… 크리스마스는 그런 해피함이 모인 특별한 날인 것이마시타네.」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「んん～～～！\u3000今からクリスマスの日が楽しみにナッテきました！」"
translation = "「으으음~! 벌써 크리스마스 날이 기대되기 시작해마시타!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「モネ、一緒にステキなクリスマスを過ごしまショウね！」"
translation = "「모네, 함께 멋진 크리스마스를 보내마쇼!」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「はい！\u3000リゾート結界でいっぱい楽しみましょう！」"
translation = "「네! 리조트 결계에서 마음껏 즐겨요!」"

