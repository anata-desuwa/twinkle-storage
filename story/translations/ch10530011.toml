[[dialogue]]
speaker = "unk"
original = "第１話,あの日のお返し,P"
translation = "제1화, 그날의 보답, P"

[[dialogue]]
speaker = "unk"
original = "先日、ネビュラのモンスターが逃げた一件。"
translation = "며칠 전, 네뷸라의 몬스터가 도망친 건."

[[dialogue]]
speaker = "unk"
original = "あの騒動で星徒会のお使いを果たせなかった俺は、また買い物に来ていた。"
translation = "그 소동으로 성도회의 심부름을 완수하지 못했던 나는, 다시 쇼핑을 하러 와 있었다."

[[dialogue]]
speaker = "ウェンディ"
original = "「こんにちは、会長さん」"
translation = "「안녕하세요, 회장님.」"

[[dialogue]]
speaker = "unk"
original = "ウェンディ！？"
translation = "웬디!?"

[[dialogue]]
speaker = "ウェンディ"
original = "「そんなに驚かないでください。今日は厄介ごとを持ち込みにきたわけじゃないんですから」"
translation = "「그렇게 놀라지 마세요. 오늘은 귀찮은 일을 가지고 온 게 아니니까요.」"

[[dialogue]]
speaker = "unk"
original = "忙しいんじゃないのか？"
translation = "바쁜 거 아니었어?"

[[dialogue]]
speaker = "ウェンディ"
original = "「ええ……さすがに２０％の活動費増ですからね……」"
translation = "「네…… 과연 20%나 활동비가 증액됐으니까요……」"

[[dialogue]]
speaker = "ウェンディ"
original = "「その代わり、セドナ長官は資金関係以外の仕事が来ないよう配慮してくれました。……単に信用がなくて仕事を任せられないだけかもしれませんが」"
translation = "「그 대신, 세드나 장관님은 자금 관계 이외의 업무가 오지 않도록 배려해 주셨어요. ……단순히 신용이 없어서 일을 맡기지 못하는 것뿐일지도 모르지만요.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「まぁ、なんとかやってみせます。長官の信頼を取り戻さないといけませんからね」"
translation = "「뭐, 어떻게든 해 보이겠어요. 장관님의 신뢰를 되찾아야 하니까요.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「会長さんは何のご用事で？\u3000……星徒会の買い物？\u3000ああ、先日は私が邪魔したから買い物ができなかったんですね。すみません……」"
translation = "「회장님은 무슨 용무로? ……성도회의 쇼핑? 아아, 저번에는 제가 방해해서 쇼핑을 못 하셨었죠. 죄송합니다……」"

[[dialogue]]
speaker = "ウェンディ"
original = "「ですが、それなら星徒会の方々と来ればよかったのでは？」"
translation = "「하지만, 그렇다면 성도회 분들과 오면 좋았을 텐데요?」"

[[dialogue]]
speaker = "アナ"
original = "「先日のアステラ同時発生の一件、会長も現場にいたのですね」"
translation = "「지난번 아스텔라 동시 발생 건, 회장도 현장에 있었군요.」"

[[dialogue]]
speaker = "サーシャ"
original = "「モンスターがたくさん出て大変だったけど、魔女の人たちがモンスターを蹴散らしたって聞いたわ～。やっぱりセドナさんって強いのね～」"
translation = "「몬스터가 많이 나와서 힘들었지만, 마녀 사람들이 몬스터를 쫓아버렸다고 들었단다~. 역시 세드나 씨는 강하네~」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「もう、そこは星徒会長がバシッと決めないと！\u3000手柄を魔女に取られちゃダメなんだから！」"
translation = "「정말, 그럴 때는 성도회장이 딱 결정지어야지! 공을 마녀에게 뺏기면 안 된다니까!」"

[[dialogue]]
speaker = "マトイ"
original = "「まぁまぁ、本当なら私たちも一緒に行ってたわけだしね。むしろ会長には申し訳ないというか」"
translation = "「자자, 사실 우리도 같이 갔어야 했던 거니까. 오히려 회장에게는 미안하달까.」"

[[dialogue]]
speaker = "マトイ"
original = "「そうだ、今度こそ星徒会のみんなで行こうよ。リベンジじゃないけどさ」"
translation = "「그렇다, 이번에야말로 성도회 다 같이 가자. 리벤지는 아니지만 말이야.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「でもまた他の人は用事が入ってしまったと。私が言うのもなんですけど……会長さん、呪われてるんですか？」"
translation = "「하지만 또 다른 사람들은 용무가 생겨버렸다고요. 제가 말하기 좀 그렇지만…… 회장님, 저주받으신 건가요?」"

[[dialogue]]
speaker = "ウェンディ"
original = "「ですがそれならちょうどよかったです。私も似たような用事でしたので」"
translation = "「하지만 그렇다면 마침 잘됐네요. 저도 비슷한 용무였으니까요.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「星徒会の買い物って文房具やお茶菓子なんかでしょう？\u3000私も仕事に使っているのがありますから、おすすめを紹介しますよ」"
translation = "「성도회의 쇼핑이라면 문구류나 다과 같은 거겠죠? 저도 업무에 쓰고 있는 게 있으니, 추천하는 걸 소개해 드릴게요.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「言ったでしょう、私個人でできることならしますよって。それくらいで先日の埋め合わせになるとは思ってませんけど」"
translation = "「말했잖아요, 제 개인적으로 할 수 있는 일이라면 하겠다고요. 그 정도로 지난번의 보답이 된다고는 생각하지 않지만요.」"

[[dialogue]]
speaker = "unk"
original = "じゃあお願いするよ"
translation = "그럼 부탁할게"

[[dialogue]]
speaker = "ウェンディ"
original = "「ええ、ではさっそく行きましょうか」"
translation = "「네, 그럼 바로 가볼까요.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「ペンなら……これがおすすめです。若干値段が高く感じられますが、書き心地がなめらかで、インクも長持ちします。価格以上の品質があります」"
translation = "「펜이라면…… 이걸 추천해요. 약간 가격이 비싸게 느껴지지만, 필기감이 부드럽고 잉크도 오래가요. 가격 이상의 품질이 있답니다.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「値段につられて安物買いの銭失いになっていけませんよ」"
translation = "「가격에 혹해서 싼 게 비지떡이 되어서는 안 돼요.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「あ、領収書はちゃんともらいましたか？\u3000レシートでも構わないですが、購入した品物、場所、日時、金額がわかるものが必要です」"
translation = "「아, 영수증은 제대로 받으셨나요? 영수증이라도 상관없지만, 구입한 물품, 장소, 일시, 금액을 알 수 있는 것이 필요해요.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「会長さんのような善良な人にはピンと来ないかもしれませんが、証拠がないと簡単に不正ができてしまうんです」"
translation = "「회장님 같은 선량한 분에게는 와닿지 않을지도 모르지만, 증거가 없으면 간단하게 부정을 저지를 수 있거든요.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「たとえば１００テルスのお菓子を買ったのに、１００テルスのペンを買ったと申告したりですね」"
translation = "「예를 들어 100텔스의 과자를 샀는데, 100텔스의 펜을 샀다고 신고한다거나 말이죠.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「ちなみにくしゃくしゃになったレシートを後でまとめて出すのはＮＧです。万死に値します」"
translation = "「참고로 구겨진 영수증을 나중에 한꺼번에 내는 건 NG예요. 만 번 죽어 마땅합니다.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「あと、書類をまとめるファイルならこれがおすすめです。今は書類もデータが多いですが、紙もまだ使われているでしょう」"
translation = "「그리고 서류를 정리하는 파일이라면 이걸 추천해요. 지금은 서류도 데이터가 많지만, 종이도 아직 쓰이고 있으니까요.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「オフィスならチェアーもマストですが、星徒会ではそこまで必要ないでしょう。星徒会の予算で買えるものでもありませんしね」"
translation = "「사무실이라면 의자도 필수지만, 성도회에서는 그 정도까지 필요 없겠죠. 성도회의 예산으로 살 수 있는 것도 아니고요.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「お茶菓子は──あ」"
translation = "「다과는── 아.」"

[[dialogue]]
speaker = "unk"
original = "どうかした？"
translation = "왜 그래?"

[[dialogue]]
speaker = "ウェンディ"
original = "「ほらあそこ、プリンで有名なお店なんです。期間限定クリームチーズプリン……うぅ、気になります……」"
translation = "「보세요 저기, 푸딩으로 유명한 가게예요. 기간 한정 크림치즈 푸딩…… 우으, 신경 쓰여요……」"

[[dialogue]]
speaker = "ウェンディ"
original = "「買えばいいのに……ってそんなに簡単に言わないでください。油断したらすぐに肉が付くって言ったじゃないですか」"
translation = "「사면 되는데…… 라니 그렇게 쉽게 말하지 마세요. 방심하면 금방 살이 붙는다고 말했잖아요.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「気にしなくていいとか、我慢は体に悪いとか、他人事だからそんなことが言えるんです」"
translation = "「신경 쓰지 않아도 된다느니, 참는 건 몸에 나쁘다느니, 남 일이니까 그런 말을 할 수 있는 거예요.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「タイツでごまかしてますが、今のスカートだってちょっときつくて……以前だってスカートを破きかけたことが……」"
translation = "「타이츠로 속이고 있지만, 지금 스커트도 좀 끼어서…… 전에도 스커트를 터뜨릴 뻔한 적이……」"

[[dialogue]]
speaker = "ウェンディ"
original = "「あ」"
translation = "「아.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「コホン。男性の前ではしたない話をしてしまいました。申し訳ありません」"
translation = "「큼큼. 남성 앞에서 상스러운 이야기를 해버렸네요. 죄송합니다.」"

[[dialogue]]
speaker = "unk"
original = "いいものを食べていい仕事をすればいい"
translation = "좋은 걸 먹고 좋은 일을 하면 돼"

[[dialogue]]
speaker = "ウェンディ"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker = "ウェンディ"
original = "「そう、今は激務……脳を動かすのに糖分が必要……つまりネビュラとセドナ長官のため……」"
translation = "「그래요, 지금은 격무…… 뇌를 움직이는 데 당분이 필요해…… 즉 네뷸라와 세드나 장관님을 위해……」"

[[dialogue]]
speaker = "ウェンディ"
original = "「そうですね、今は私が太る太らないなんて些末なこと。パフォーマンス向上のために必要なら仕方ないですね！」"
translation = "「그렇네요, 지금 제가 살이 찌고 안 찌고는 사소한 일. 퍼포먼스 향상을 위해 필요하다면 어쩔 수 없죠!」"

[[dialogue]]
speaker = "unk"
original = "俺も星徒会のみんなにプリンを買って帰ると、とても好評だった。"
translation = "나도 성도회 모두에게 푸딩을 사 갔더니, 매우 호평이었다."

[[dialogue]]
speaker = "unk"
original = "しかしウェンディの体重は順調に増加し、彼女の悩みはさらに重みを増すのであった──"
translation = "하지만 웬디의 체중은 순조롭게 증가했고, 그녀의 고민은 더욱 무게를 더해가는 것이었다──"

