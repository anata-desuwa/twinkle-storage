[[dialogue]]
speaker = "unk"
original = "第２話,ルルカのバレンタイン・後編,P"
translation = "제2화, 루루카의 발렌타인·후편, P"

[[dialogue]]
speaker = "unk"
original = "バレンタインの翌朝。"
translation = "발렌타인 다음 날 아침."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ルルカちゃん、バレンタイン配信、大成功おめでと～！！」"
translation = "「루루카짱, 발렌타인 방송 대성공 축하해~!!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「配信後にアップした新曲ＭＶも、わずか一晩で５０万再生を突破。話題になっていますね。ルカルカのチャンネル登録者数も一気に伸びそうで、グッジョブです」"
translation = "「방송 후에 업로드한 신곡 MV도, 단 하룻밤 만에 50만 재생을 돌파. 화제가 되고 있네요. 루카루카의 채널 구독자 수도 단숨에 늘어날 것 같아서, 굿 잡입니다」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「それは嬉しいんだけど……例の激辛チョコを食べたシーンの切り抜きが、倍の１００万再生いってるのはちょっと不本意なんだけど！？」"
translation = "「그건 기쁘지만…… 그 매운 초코를 먹은 장면의 편집본이, 두 배인 100만 재생을 찍고 있는 건 좀 본의가 아닌데!?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「でもその衣装、『バレンタインフォーム』っていうの？\u3000マジカル可愛い～！\u3000ＤＩＳＣで写真撮るから、こっちに目線お願いしま～す☆」"
translation = "「하지만 그 의상, 『발렌타인 폼』이라고 해? 매지컬 귀여워~! DISC로 사진 찍을 거니까, 이쪽 좀 봐줘~☆」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「イェ～イ☆\u3000キューッとウィンク～<emoji=heart04>」"
translation = "「예~이☆ 뀨 하고 윙크~<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「――って、ルカルカになってる時の癖でつい反応しちゃった！」"
translation = "「――앗, 루카루카가 됐을 때의 버릇으로 그만 반응해버렸어!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「バレンタインフォームに覚醒したからサプライズで変身してみせたけど……撮影していいとは言ってないよ！？」"
translation = "「발렌타인 폼으로 각성해서 서프라이즈로 변신해 보였지만…… 촬영해도 된다고는 안 했거든!?」"

[[dialogue]]
speaker = "unk"
original = "ルルカ、その衣装すごく可愛いぞ！"
translation = "루루카, 그 의상 정말 귀엽다고!"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「えっ！？\u3000そ、そうかなぁ～？\u3000えへへへぇ～<emoji=heart04>」"
translation = "「엣!? 그, 그럴까나~? 에헤헤헤~<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「お兄ちゃんがそう言うなら、もっと撮ってもいいよ～<emoji=heart04>\u3000えへっ☆」"
translation = "「오빠가 그렇게 말한다면, 더 찍어도 좋아~<emoji=heart04> 에헷☆」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「私とセンパイへの反応の差が激しすぎるんですけど！？」"
translation = "「나랑 선배에 대한 반응 차이가 너무 심한 거 아냐!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ルルカさん、会長にはちょろドルフィンですね」"
translation = "「루루카 씨, 회장님께는 쵸로 돌핀이네요」"

[[dialogue]]
speaker = "unk"
original = "その日の放課後。俺はルルカとの約束で、リゾート結界のプライベートビーチに来ていた。"
translation = "그날 방과 후. 나는 루루카와의 약속으로, 리조트 결계의 프라이빗 비치에 와 있었다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「お兄ちゃん、それじゃあ今日は――恋人として付き合い出して、初めてのバレンタインということで～」"
translation = "「오빠, 그럼 오늘은―― 연인으로서 사귀기 시작하고, 첫 발렌타인이라는 의미로~」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「はいっ♪\u3000妹じゃなく、彼女としての愛を込めた、大本命のバレンタインチョコだよ<emoji=heart04>」"
translation = "「자♪ 여동생이 아니라, 여자친구로서의 사랑을 담은, 진짜 진심 발렌타인 초코야<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ありがとう。すごく嬉しい！"
translation = "고마워. 정말 기뻐!"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「えへへ<emoji=heart04>\u3000配信準備でバタバタだったけど、手作りチョコもちゃんと間に合ってよかった～」"
translation = "「에헤헤<emoji=heart04> 방송 준비로 정신없었지만, 수제 초코도 제때 맞춰서 다행이야~」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ん？\u3000どうしたの、お兄ちゃん？\u3000――朝に聞きそびれたことがあるって？」"
translation = "「응? 왜 그래, 오빠? ――아침에 미처 못 물어본 게 있다고?」"

[[dialogue]]
speaker = "unk"
original = "俺は頷いた。ルルカがいつの間にバレンタインフォームに覚醒したのか、気になっていた。"
translation = "나는 고개를 끄덕였다. 루루카가 언제 발렌타인 폼으로 각성했는지 궁금했다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「実はバレンタイン前に、イクシーちゃんやトワちゃん先生とちょっと面白い事件があってね～。そこで覚醒したんだ♪」"
translation = "「사실 발렌타인 전에, 익실이짱이랑 토와짱 선생님이랑 좀 재밌는 사건이 있었거든~. 거기서 각성했어♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「見た目がこうなってるのは、その時点でルカルカのバレンタイン衣装のデザインがもう決まってたから、水着フォームの時みたいにイメージが反映されたんだと思う♪」"
translation = "「겉모습이 이렇게 된 건, 그때 이미 루카루카의 발렌타인 의상 디자인이 정해져 있었으니까, 수영복 폼 때처럼 이미지가 반영된 것 같아♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「フォーム覚醒の話はちょっと長くなるから、あとでゆっくり話すとして～」"
translation = "「폼 각성 이야기는 좀 길어지니까, 나중에 천천히 하기로 하고~」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「実はね、あたし、チョコ以外にも、お兄ちゃんにもう１つサプライズプレゼントを用意してるんだ♪」"
translation = "「사실 말이야, 나, 초코 말고도 오빠한테 또 하나의 서프라이즈 선물을 준비했어♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「何かっていうと――『歌』のプレゼント！\u3000お兄ちゃん、聴いてくれる？」"
translation = "「그게 뭐냐면―― 『노래』 선물! 오빠, 들어줄래?」"

[[dialogue]]
speaker = "unk"
original = "ルルカは静かに息を整え、俺の前で歌い始めた。そして、俺は驚く。"
translation = "루루카는 조용히 숨을 가다듬고, 내 앞에서 노래하기 시작했다. 그리고, 나는 놀란다."

[[dialogue]]
speaker = "unk"
original = "てっきり、昨日配信したバレンタインソングを生で披露してくれるのだと思っていた。しかし、彼女が歌ったのは、俺の知らないまったく別の曲だった。"
translation = "분명, 어제 방송한 발렌타인 송을 라이브로 들려주는 것이라고 생각했다. 하지만, 그녀가 부른 것은 내가 모르는 완전히 다른 곡이었다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「……ふぅ。――どうだった、お兄ちゃん？」"
translation = "「……후우. ――어땠어, 오빠?」"

[[dialogue]]
speaker = "unk"
original = "ルルカ、今の歌は……！？"
translation = "루루카, 방금 그 노래는……!?"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「歌のタイトルはね――『海での約束をもう１度』。覚えてるかな？」"
translation = "「노래 제목은 말이야―― 『바다에서의 약속을 다시 한번』. 기억하고 있을까?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あたしが前に言った、『海をモチーフにした恋の歌』のシリーズ第２弾だよ♪」"
translation = "「내가 전에 말했던, 『바다를 모티브로 한 사랑 노래』 시리즈 제2탄이야♪」"

[[dialogue]]
speaker = "unk"
original = "俺は頷いた。もちろん覚えている。前にも約束して、ルルカが作詞作曲して作り上げた初のオリジナル曲を聴かせてくれたことがあった。"
translation = "나는 고개를 끄덕였다. 물론 기억하고 있다. 전에도 약속해서, 루루카가 작사 작곡해서 만들어낸 첫 오리지널 곡을 들려준 적이 있었다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「配信用にバレンタインソングを作ってる時に、お兄ちゃんにもサプライズしたいなって思いついて、作ったんだ♪」"
translation = "「방송용으로 발렌타인 송을 만들고 있을 때, 오빠한테도 서프라이즈하고 싶다는 생각이 들어서 만들었어♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「バレンタインソングは、応援してくれるみんなへの『愛』を込めた曲。でも、それって恋人へのラブソングとはちょっと違うでしょ？」"
translation = "「발렌타인 송은, 응원해주는 모두에 대한 『사랑』을 담은 곡. 하지만, 그건 연인에 대한 러브송과는 조금 다르잖아?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「だから同時進行で作るのは大変だったけど……お兄ちゃんへの『好き』を一番伝えられるのは、やっぱり『歌』だって思ったから、頑張って２曲目を作ってみたの♪」"
translation = "「그래서 동시에 만드는 건 힘들었지만…… 오빠에 대한 『좋아함』을 가장 잘 전할 수 있는 건 역시 『노래』라고 생각해서, 힘내서 두 번째 곡을 만들어 봤어♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「お兄ちゃんへの<b>最新</b>のラブソング――ちゃんと届いたかな？」"
translation = "「오빠를 향한 <b>최신</b> 러브송―― 제대로 전달됐을까?」"

[[dialogue]]
speaker = "unk"
original = "ああ……もちろんだ！"
translation = "아아…… 물론이지!"

[[dialogue]]
speaker = "unk"
original = "感動で胸が熱くなり、俺は思わずルルカを抱きしめた。"
translation = "감동으로 가슴이 뜨거워져, 나는 나도 모르게 루루카를 껴안았다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あっ……！\u3000えへへ……<emoji=heart04>\u3000それなら、よかった♪」"
translation = "「앗……! 에헤헤……<emoji=heart04> 그렇다면 다행이야♪」"

[[dialogue]]
speaker = "unk"
original = "ルルカ、好きだ。大好きだ……！"
translation = "루루카, 좋아해. 정말 좋아해……!"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「お兄ちゃん、もしかしてちょっと泣いてる？\u3000ふふっ♪」"
translation = "「오빠, 혹시 조금 울고 있어? 후훗♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あたしも――お兄ちゃんのこと、大好きだよ<emoji=heart04>\u3000これからもよろしくね」"
translation = "「나도―― 오빠를 정말 좋아해<emoji=heart04> 앞으로도 잘 부탁해」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ん～っ<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「으음~<emoji=heart04> 쪽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そして俺たちはキスを交わし、海辺で甘く静かな時間をゆっくりと過ごすのだった。"
translation = "그리고 우리들은 키스를 나누고, 해변에서 달콤하고 조용한 시간을 느긋하게 보내는 것이었다."

