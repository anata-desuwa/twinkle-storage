[[dialogue]]
speaker = "unk"
original = "第４話,ベアトリスとナターシャの見解,B"
translation = "제4화, 베아트리스와 나타샤의 견해, B"

[[dialogue]]
speaker = "unk"
original = "レジスタンスとともにルヴィネの追跡を続け、５日が経過した。"
translation = "레지스탕스와 함께 루비네의 추적을 계속한 지 5일이 지났다."

[[dialogue]]
speaker = "unk"
original = "その間大きな事件はなかったものの、アルバイトしている以外にも、ルヴィネの生活パターンがわかった。"
translation = "그동안 큰 사건은 없었지만, 아르바이트를 하는 것 외에도 루비네의 생활 패턴을 알 수 있었다."

[[dialogue]]
speaker = "unk"
original = "ある程度の成果が得られたので、ひとまず今日で尾行は終了だ。"
translation = "어느 정도 성과를 얻었기에, 일단 오늘로 미행은 종료다."

[[dialogue]]
speaker = "ベアトリス"
original = "「ナターシャちゃん、お疲れ様。一日の半分くらい尾行してたけど大丈夫？」"
translation = "「나타샤 짱, 수고했어. 하루의 절반 정도를 미행했는데 괜찮아?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「全然平気。サバイバルする訓練もしてるし、休憩挟みながらだから、このくらい大したことないよ」"
translation = "「전혀 아무렇지 않아. 서바이벌 훈련도 받고 있고, 휴식도 틈틈이 취했으니까 이 정도는 별거 아냐.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「すごーい！\u3000さすが本物の暗殺者！」"
translation = "「대단해~! 역시 진짜 암살자!」"

[[dialogue]]
speaker = "unk"
original = "当然と言うべきか、ルヴィネの追跡においては、やはり本職のナターシャが一番活躍してくれた。"
translation = "당연하다고 해야 할지, 루비네의 추적에 있어서는 역시 본업인 나타샤가 가장 활약해 주었다."

[[dialogue]]
speaker = "クロト"
original = "「ありがとう、ナターシャ。君のおかげで尾行作戦が実現できたよ」"
translation = "「고마워, 나타샤. 너 덕분에 미행 작전이 실현될 수 있었어.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「監視対象にそう言われるのも妙な気分だけど、上手くいったならまぁいいかな。でも──」"
translation = "「감시 대상에게 그런 말을 듣는 것도 묘한 기분이지만, 잘 풀렸다면 뭐 됐어. 하지만──」"

[[dialogue]]
speaker = "unk"
original = "ちらりと後ろを振り返るナターシャ。"
translation = "슬쩍 뒤를 돌아보는 나타샤."

[[dialogue]]
speaker = "unk"
original = "その視線の先には、険しい顔で俯く梨緒がいた。"
translation = "그 시선 끝에는 험악한 표정으로 고개를 숙인 리오가 있었다."

[[dialogue]]
speaker = "梨緒"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "ベアトリス"
original = "「梨緒ちゃん、大丈夫？\u3000最近ずっと暗い顔してる気がするけど……」"
translation = "「리오 짱, 괜찮아? 요즘 계속 어두운 표정인 것 같은데……」"

[[dialogue]]
speaker = "梨緒"
original = "「ああ、大丈夫だ。体が不調なわけじゃない」"
translation = "「아아, 괜찮다. 몸 상태가 안 좋은 건 아니야.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「だけどずっと悩んでるよね。もしかして私が言ったこと気にしてる？」"
translation = "「하지만 계속 고민하고 있지. 설마 내가 한 말 신경 쓰고 있어?」"

[[dialogue]]
speaker = "梨緒"
original = "「……ああ。ナターシャに言われて考えたんだ。どうして私がジグに勝ちたいと思うのか」"
translation = "「……아아. 나타샤가 한 말을 듣고 생각해 봤다. 어째서 내가 지그에게 이기고 싶어 하는지.」"

[[dialogue]]
speaker = "梨緒"
original = "「だけどこれは個人的なことで、君たちに関係は……」"
translation = "「하지만 이건 개인적인 일이라, 너희와는 상관이……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「関係ないことないよ！\u3000私たち仲間なんだから、そんな寂しいこと言わないで。梨緒ちゃんの話ならいくらでも聞くから」"
translation = "「상관없지 않아! 우린 동료니까, 그런 서운한 소리 하지 마. 리오 짱 이야기라면 얼마든지 들어줄 테니까.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「尾行も一旦終わったところだし、まぁいいタイミングじゃない？\u3000１人でウジウジしてるよりはマシでしょ」"
translation = "「미행도 일단 끝난 참이고, 뭐 좋은 타이밍 아니야? 혼자 끙끙 앓고 있는 것보다는 낫겠지.」"

[[dialogue]]
speaker = "クロト"
original = "「聞かれるのが嫌じゃなければ、俺も聞くよ。梨緒には何度か助けてもらったしな」"
translation = "「듣는 게 싫지 않다면 나도 들을게. 리오에게는 몇 번이나 도움을 받았으니까.」"

[[dialogue]]
speaker = "梨緒"
original = "「……ありがとう。それなら甘えさせてもらおう」"
translation = "「……고맙다. 그렇다면 응석을 좀 부려보도록 하지.」"

[[dialogue]]
speaker = "unk"
original = "梨緒は思考を整理するように目を閉じると、呼吸を整えてから話し始めた。"
translation = "리오는 생각을 정리하듯 눈을 감고, 호흡을 가다듬은 뒤 말을 시작했다."

[[dialogue]]
speaker = "梨緒"
original = "「私はどうしてもジグに勝ちたい……いや、勝たなければいけないと思っている」"
translation = "「나는 어떻게 해서든 지그에게 이기고 싶다…… 아니, 이겨야만 한다고 생각하고 있어.」"

[[dialogue]]
speaker = "梨緒"
original = "「そうでなければ、私が私でなくなってしまう気がするから」"
translation = "「그러지 않으면, 내가 내가 아니게 되어버릴 것 같은 기분이 들거든.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「梨緒ちゃんが梨緒ちゃんじゃなくなる……？」"
translation = "「리오 짱이 리오 짱이 아니게 된다고……?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ふぅん、随分な考えだね。そう思うからには何か理由があるんだよね？」"
translation = "「흐응, 꽤 거창한 생각이네. 그렇게 생각하는 데는 뭔가 이유가 있는 거지?」"

[[dialogue]]
speaker = "梨緒"
original = "「ああ。それはきっと……」"
translation = "「아아. 그건 분명……」"

[[dialogue]]
speaker = "梨緒"
original = "「私は勝つために星騎士になったからだ」"
translation = "「나는 이기기 위해 성기사가 되었기 때문이다.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「んん？\u3000勝つため……？\u3000誰に……？\u3000でも梨緒ちゃん、世界を守りたいって言ってたよね？」"
translation = "「응? 이기기 위해……? 누구에게……? 하지만 리오 짱, 세계를 지키고 싶다고 했었지?」"

[[dialogue]]
speaker = "梨緒"
original = "「それが嘘だったんだ」"
translation = "「그게 거짓말이었던 거다.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ええっ！？\u3000そんなはずないよ！？」"
translation = "「에엣!? 그럴 리 없어!?」"

[[dialogue]]
speaker = "梨緒"
original = "「幼い頃、私は何もできない人間だった」"
translation = "「어릴 적, 나는 아무것도 할 수 없는 인간이었다.」"

[[dialogue]]
speaker = "梨緒"
original = "「勉強も運動も苦手で、弱くて、情けなくて……いつも泣いていた」"
translation = "「공부도 운동도 서툴고, 약하고, 한심해서…… 언제나 울고 있었지.」"

[[dialogue]]
speaker = "梨緒"
original = "「だから私は勝てる人間になりたかった。誰にも負けない自分になりたかった」"
translation = "「그래서 나는 이길 수 있는 인간이 되고 싶었다. 누구에게도 지지 않는 자신이 되고 싶었어.」"

[[dialogue]]
speaker = "梨緒"
original = "「そんな願いを守護星が聞き届けてくれたのか、私は星力に目覚めた」"
translation = "「그런 소원을 수호성이 들어준 건지, 나는 성력에 눈을 떴다.」"

[[dialogue]]
speaker = "梨緒"
original = "「詳しく調べると、私は同年代と比べて非常に高い星力を持っていることがわかった」"
translation = "「자세히 조사해 보니, 나는 또래에 비해 매우 높은 성력을 가지고 있다는 걸 알게 됐지.」"

[[dialogue]]
speaker = "梨緒"
original = "「だから星騎士になれば、誰にも負けない存在になれると思った」"
translation = "「그래서 성기사가 되면, 누구에게도 지지 않는 존재가 될 수 있을 거라 생각했다.」"

[[dialogue]]
speaker = "梨緒"
original = "「私は本当に嬉しかった。弱い自分と別れられると思ったから」"
translation = "「나는 정말 기뻤어. 약한 자신과 작별할 수 있다고 생각했으니까.」"

[[dialogue]]
speaker = "梨緒"
original = "「それが『梨緒・Ａ・クリステレス』という星騎士の始まりだったんだ……」"
translation = "「그것이 『리오·A·크리스테레스』라는 성기사의 시작이었던 거다……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「梨緒ちゃん……」"
translation = "「리오 짱……」"

[[dialogue]]
speaker = "ナターシャ"
original = "「なるほど。梨緒にとっては、星騎士になること＝勝つことだったんだ」"
translation = "「과연. 리오에게는 성기사가 되는 것 = 이기는 것이었구나.」"

[[dialogue]]
speaker = "梨緒"
original = "「ああ、私は勝つために星騎士になった。それがリクリエと戦っているうちに、世界を救う使命感にいつの間にかすり替わっていた」"
translation = "「아아, 나는 이기기 위해 성기사가 되었다. 그것이 리크리에와 싸우는 동안, 세계를 구한다는 사명감으로 어느샌가 뒤바뀌어 있었지.」"

[[dialogue]]
speaker = "梨緒"
original = "「だから私はジグが許せなかった」"
translation = "「그래서 나는 지그를 용서할 수 없었다.」"

[[dialogue]]
speaker = "梨緒"
original = "「ジグに負ける度に無力さを思い知らされて、捨てたはずの弱い自分を突き付けられるから」"
translation = "「지그에게 질 때마다 무력함을 뼈저리게 느끼고, 버렸을 터인 약한 자신을 직면하게 되니까.」"

[[dialogue]]
speaker = "梨緒"
original = "「私がもっと強かったら、負けを受け止めて、前に進むことができていたのかもしれない」"
translation = "「내가 좀 더 강했다면, 패배를 받아들이고 앞으로 나아갈 수 있었을지도 몰라.」"

[[dialogue]]
speaker = "梨緒"
original = "「だけど私は負けを認めたくなくて、何度も何度も挑み続けた」"
translation = "「하지만 나는 패배를 인정하고 싶지 않아서, 몇 번이고 몇 번이고 계속 도전했다.」"

[[dialogue]]
speaker = "梨緒"
original = "「そのせいで、ずっと同じところで足踏みして、変わることができなかった……」"
translation = "「그 탓에 계속 같은 곳에서 제자리걸음만 하며 변하지 못했지……」"

[[dialogue]]
speaker = "梨緒"
original = "「結局……私は弱い人間なんだな」"
translation = "「결국…… 나는 약한 인간인 거다.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ううん、梨緒ちゃんは強いよ。諦めないって、強くないとできないことなんだから」"
translation = "「아니야, 리오 짱은 강해. 포기하지 않는다는 건 강하지 않으면 할 수 없는 일이니까.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「そこは弱みだと思うけど。諦めることができるってのも、１つの強さなんじゃない？」"
translation = "「그건 약점이라고 생각하는데. 포기할 수 있다는 것도 하나의 강함 아닐까?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「梨緒ちゃんは強いよ！」"
translation = "「리오 짱은 강해!」"

[[dialogue]]
speaker = "ナターシャ"
original = "「そうかなぁ？」"
translation = "「과연 그럴까?」"

[[dialogue]]
speaker = "梨緒"
original = "「いや、そこで争わなくても……」"
translation = "「아니, 거기서 다투지 않아도……」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「じゃあ、両方ってことでいいんじゃないか」"
translation = "「그럼, 양쪽 다인 걸로 하면 되잖아.」"

[[dialogue]]
speaker = "梨緒"
original = "「アポロ……！？\u3000帰っていたのか？」"
translation = "「아폴로……!? 돌아와 있었나?」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「ああ、今さっき秘密基地に戻ったところだ。それで話が聞こえてきたんでな」"
translation = "「아아, 방금 막 비밀기지에 돌아온 참이다. 그래서 이야기가 들려왔거든.」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「強いところもあれば、弱いところもある。強さでもあれば、弱さでもある」"
translation = "「강한 면이 있으면 약한 면도 있는 법이야. 강함이기도 하면서 약함이기도 하지.」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「臆病さが身を守る慎重さになることもあれば、人を労わる優しさゆえに自分を犠牲にしてしまうこともある」"
translation = "「겁이 많은 게 몸을 지키는 신중함이 될 때도 있고, 사람을 아끼는 다정함 때문에 자신을 희생하게 될 때도 있어.」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「そんなふうに複雑で、めんどくさくて、面白いのが人ってやつだ」"
translation = "「그렇게 복잡하고, 번거롭고, 재미있는 게 인간이라는 존재다.」"

[[dialogue]]
speaker = "梨緒"
original = "「面白い……？」"
translation = "「재미있다……?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「そうだね、面白いよ」"
translation = "「그렇네, 재미있어.」"

[[dialogue]]
speaker = "梨緒"
original = "「は……？\u3000君は私が弱いと言っていなかったか？」"
translation = "「하……? 너는 내가 약하다고 하지 않았나?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「うん、負けを認められないのは梨緒の弱いところだと思ってるけど、かわいげがあるじゃん」"
translation = "「응, 패배를 인정하지 못하는 건 리오의 약한 부분이라고 생각하지만, 귀여운 구석이 있잖아.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「何でもかんでもその調子じゃ困るけど、負けて悔しがってる梨緒を見るのは嫌いじゃないからね」"
translation = "「뭐든 다 그런 식이면 곤란하겠지만, 져서 분해하는 리오를 보는 건 싫지 않으니까 말이야.」"

[[dialogue]]
speaker = "梨緒"
original = "「……褒めているのか、それは？」"
translation = "「……칭찬하는 건가, 그건?」"

[[dialogue]]
speaker = "クロト"
original = "「俺だって梨緒と似たようなものかもしれないな」"
translation = "「나도 리오와 비슷할지도 모르겠네.」"

[[dialogue]]
speaker = "梨緒"
original = "「君も……？\u3000どういうことだ？」"
translation = "「너도……? 무슨 소리지?」"

[[dialogue]]
speaker = "クロト"
original = "「ちゃんと星騎士になってから、モンスターと対峙しながらこう思ったことがあるんだ」"
translation = "「제대로 성기사가 되고 나서, 몬스터와 대치하면서 이런 생각을 한 적이 있어.」"

[[dialogue]]
speaker = "クロト"
original = "「『なんだ、星騎士になっても結局怖いのか』って。落胆に近い気持ちだったよ」"
translation = "「『뭐야, 성기사가 되어도 결국 무서운 건가』 하고. 낙담에 가까운 기분이었지.」"

[[dialogue]]
speaker = "梨緒"
original = "「君でも怖いと思うのか？」"
translation = "「너조차 무섭다고 생각하나?」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、怖いよ。人間より小さな小型のモンスターでも簡単に人の命を奪うことができるんだ。怖くないはずがない」"
translation = "「아아, 무서워. 인간보다 작은 소형 몬스터라도 간단히 사람의 목숨을 앗아갈 수 있어. 무섭지 않을 리가 없지.」"

[[dialogue]]
speaker = "クロト"
original = "「星騎士になるための訓練をしながら、きっと心のどこかでこう思っていたんだ。強くなれば、モンスターも怖くなくなるって」"
translation = "「성기사가 되기 위한 훈련을 하면서, 분명 마음 한구석에서 이렇게 생각했을 거야. 강해지면 몬스터도 무섭지 않게 될 거라고.」"

[[dialogue]]
speaker = "クロト"
original = "「俺が星騎士になったのは、俺自身がモンスターを恐れなくていいようになりたかったから……自分のためでもあったのかもしれない」"
translation = "「내가 성기사가 된 건, 나 자신이 몬스터를 두려워하지 않아도 되게 되고 싶었기 때문…… 나 자신을 위해서였을지도 몰라.」"

[[dialogue]]
speaker = "クロト"
original = "「だから星騎士になる理由、戦う理由は人それぞれでいいんじゃないか」"
translation = "「그러니까 성기사가 되는 이유, 싸우는 이유는 사람마다 제각각이어도 괜찮지 않을까.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「そうそう。誰だってしょうもない、でも譲れない理由がある。そういうものだよ」"
translation = "「그래그래. 누구든 별거 아니지만, 양보할 수 없는 이유가 있는 법이야. 그런 거지.」"

[[dialogue]]
speaker = "梨緒"
original = "「そういうもの……」"
translation = "「그런 것……」"

[[dialogue]]
speaker = "梨緒"
original = "「私は弱くて、ちっぽけで、つまらない理由で……自分のために星騎士になった」"
translation = "「나는 약하고, 보잘것없고, 하찮은 이유로…… 나 자신을 위해 성기사가 됐어.」"

[[dialogue]]
speaker = "梨緒"
original = "「だけど……<b>そういうもの</b>、か」"
translation = "「하지만…… <b>그런</b> <b>것</b>, 인가.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「でも忘れないで。梨緒ちゃんは強い。誰がなんて言っても、私はそう思うよ」"
translation = "「하지만 잊지 마. 리오짱은 강해. 누가 뭐라 해도, 나는 그렇게 생각해.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「それに最初は勝つためでも、梨緒ちゃんはみんなのために、世界のために戦っていた」"
translation = "「게다가 처음에는 이기기 위해서였어도, 리오짱은 모두를 위해, 세계를 위해 싸우고 있었어.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「だから今まで戦ってきた自分を信じてあげて」"
translation = "「그러니까 지금까지 싸워온 자신을 믿어줘.」"

[[dialogue]]
speaker = "梨緒"
original = "「ありがとう、ベアト。君がそう言ってくれるなら、自分を信じられる気がする」"
translation = "「고마워, 베아토. 네가 그렇게 말해준다면, 자신을 믿을 수 있을 것 같은 기분이 들어.」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「さて、それじゃ夕飯にするかな！\u3000今日はハンバーグだ！」"
translation = "「자, 그럼 저녁밥이나 먹을까! 오늘은 함바그다!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「やったー！」"
translation = "「야호!」"

[[dialogue]]
speaker = "unk"
original = "尾行作戦でアポロがいないことが多かったせいで、アポロが作った夕食は久しぶりだ。"
translation = "미행 작전 때문에 아폴로가 없는 적이 많았던 탓에, 아폴로가 만든 저녁 식사는 오랜만이다."

[[dialogue]]
speaker = "unk"
original = "アポロの料理は上手だから、これは期待がかかる。"
translation = "아폴로의 요리는 솜씨가 좋으니까, 이건 기대가 된다."

[[dialogue]]
speaker = "ベアトリス"
original = "「あ～んっ。……ん～♪\u3000やわらかくてジューシーでおいしー！」"
translation = "「아~앙. ……음~♪ 부드럽고 육즙이 가득해서 맛있어~!」"

[[dialogue]]
speaker = "梨緒"
original = "「！\u3000これは……店を出せる味だな」"
translation = "「! 이건…… 가게를 차려도 될 맛이군.」"

[[dialogue]]
speaker = "unk"
original = "アポロのハンバーグは本当に美味しくて、みんな驚きや笑顔を見せるのだった。"
translation = "아폴로의 함바그는 정말 맛있어서, 모두 놀라움과 미소를 띠는 것이었다."

