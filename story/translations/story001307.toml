[[dialogue]]
speaker = "unk"
original = "週が明けて、マムの訓練指導が再開した。アムと交代しての休憩時間、俺がマトイを探していると――"
translation = "주가 바뀌고 마무의 훈련 지도가 재개되었다. 아무와 교대하고 휴식 시간, 내가 마토이를 찾고 있자──"

[[dialogue]]
speaker = "マトイ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "マトイは何かを考えるように、海を眺めていた。今日はよく同じような表情を浮かべている。"
translation = "마토이는 무언가를 생각하듯 바다를 바라보고 있었다. 오늘은 자주 이런 표정을 짓고 있다."

[[dialogue]]
speaker = "unk"
original = "マトイ、何か考えごとか？"
translation = "마토이, 무슨 고민이라도 있어?"

[[dialogue]]
speaker = "マトイ"
original = "「ああ、会長。ちょっとね……」"
translation = "「아아, 회장님. 조금 말이야……」"

[[dialogue]]
speaker = "unk"
original = "何かあるなら、相談に乗ると告げる。"
translation = "무슨 일이 있다면 상담해 주겠다고 말한다."

[[dialogue]]
speaker = "unk"
original = "マトイはまた少し考えるように海を見つめてから――"
translation = "마토이는 다시 조금 생각하듯 바다를 응시하다가──"

[[dialogue]]
speaker = "マトイ"
original = "「私の星騎士としての信念って何なんだろう、って考えてたんだ」"
translation = "「나의 성기사로서의 신념이란 건 뭘까, 하고 생각하고 있었어.」"

[[dialogue]]
speaker = "マトイ"
original = "「私さ、いつも自分で自分のことを普通の人間だって思ってきたから、強い信念とか、そんなことあまり考えたことがなかったんだよね」"
translation = "「나 말이야, 항상 스스로를 평범한 사람이라고 생각해 와서 강한 신념 같은 건 별로 생각해 본 적이 없었거든.」"

[[dialogue]]
speaker = "マトイ"
original = "「私はそんな大層な理由で星騎士になったわけじゃない。ただ、人よりもちょっと強い星力を持っていたってだけ」"
translation = "「나는 그렇게 거창한 이유로 성기사가 된 게 아니야. 그냥 남보다 조금 더 강한 성력을 가졌을 뿐이지.」"

[[dialogue]]
speaker = "マトイ"
original = "「星力に目覚めた時は、すごく嬉しかった。特別な人間になれた気がして、だったら星騎士にならなきゃって使命感に燃えたりもした」"
translation = "「성력에 눈을 떴을 때는 정말 기뻤어. 특별한 사람이 된 것 같아서, 그렇다면 성기사가 되어야겠다는 사명감에 불타기도 했어.」"

[[dialogue]]
speaker = "マトイ"
original = "「正直に言えば、『普通じゃないこと』への憧れがあった。自分はこれからすごい星騎士になれるかもしれないって、ちょっとワクワクしたりもした」"
translation = "「솔직히 말하면 『평범하지 않은 것』에 대한 동경이 있었어. 나는 이제부터 대단한 성기사가 될 수 있을지도 모른다고 조금 설레기도 했고.」"

[[dialogue]]
speaker = "マトイ"
original = "「まあ、そんな幻想は入学して早々、規格外のヴィーナスを見て打ち砕かれる羽目になったんだけど……あはは」"
translation = "「뭐, 그런 환상은 입학하자마자 규격 외인 비너스를 보고 박살 나 버렸지만…… 아하하.」"

[[dialogue]]
speaker = "マトイ"
original = "「……アムちゃんはきっと、本校に進学したら星徒会入りを果たすと思う。いや、ヴィーナスに憧れているから、もしかしたら進学先は新星学園かもしれないね」"
translation = "「……아무짱은 분명 본교에 진학하면 성도회에 들어갈 거야. 아니, 비너스를 동경하니까 어쩌면 진학처는 신성학원일지도 모르겠네.」"

[[dialogue]]
speaker = "マトイ"
original = "「私は未だに、ヴィーナスから星徒会に誘われなければ、星徒会に入ることはなかったと思ってる。たまたま、そういう縁があっただけ」"
translation = "「나는 아직도 비너스가 성도회로 권유하지 않았더라면 성도회에 들어올 일은 없었을 거라고 생각해. 우연히 그런 인연이 있었을 뿐이지.」"

[[dialogue]]
speaker = "マトイ"
original = "「だから……自分が本当に星徒会メンバーに相応しいのかって言われたら、正直自信がないんだ」"
translation = "「그러니까…… 내가 정말 성도회 멤버에 어울리는 사람인가 묻는다면 솔직히 자신 없어.」"

[[dialogue]]
speaker = "マトイ"
original = "「私は……他のみんなみたいに特別な才能なんてない……普通の人間だから」"
translation = "「나는…… 다른 애들처럼 특별한 재능 같은 건 없는…… 평범한 인간이니까.」"

[[dialogue]]
speaker = "unk"
original = "ふと、そこで俺は思い返す。数日前、マムに言われたことを――"
translation = "문득 거기서 나는 다시 생각한다. 며칠 전 마무에게 들었던 말을──"

[[dialogue]]
speaker = "マハムート"
original = "「会長、マトイのことで相談があるわ」"
translation = "「회장, 마토이 때문에 상담할 게 있어.」"

[[dialogue]]
speaker = "マハムート"
original = "「――マトイの才能についてよ」"
translation = "「──마토이의 재능에 대해서야.」"

[[dialogue]]
speaker = "マハムート"
original = "「これまで、誰も真剣に指摘をしてこなかった。というより、誰もちゃんと見極められなかったのね……私も含めて」"
translation = "「지금까지 아무도 진지하게 지적해 오지 않았어. 이라기보다 아무도 제대로 파악하지 못했던 거겠지…… 나를 포함해서.」"

[[dialogue]]
speaker = "マハムート"
original = "「今回、あの子と向き合ってみて、ようやくわかった」"
translation = "「이번에 그 아이와 마주해 보고 드디어 알았어.」"

[[dialogue]]
speaker = "マハムート"
original = "「あの子は確かに、天才ではないわ」"
translation = "「그 아이는 확실히 천재는 아니야.」"

[[dialogue]]
speaker = "マハムート"
original = "「だけど、あの子が自分で思っているような、『普通』でも決してない」"
translation = "「하지만 그 아이가 스스로 생각하는 것 같은 『평범』함도 결코 아니야.」"

[[dialogue]]
speaker = "マハムート"
original = "「物覚えだったら……会長、あなたの方が早いわ。それと、アムのように能力が防御に特化しているわけでもない」"
translation = "「습득력이라면…… 회장, 당신이 더 빨라. 게다가 아무처럼 능력이 방어에 특화된 것도 아니지.」"

[[dialogue]]
speaker = "マハムート"
original = "「そういう意味では普通ね。ただ……会長、知ってる？」"
translation = "「그런 의미에서는 평범해. 하지만…… 회장, 알고 있어?」"

[[dialogue]]
speaker = "マハムート"
original = "「あの子、固有の特殊な星術を持ってないという以外、何でも普通レベルにこなせるのよ。攻撃、防御、回復、味方の補助、それだけじゃない」"
translation = "「그 아이, 고유의 특수한 성술을 갖지 않았다는 것 말고는 무엇이든 평범한 레벨로 해낸다구. 공격, 방어, 회복, 아군 보조, 그것뿐만이 아니야.」"

[[dialogue]]
speaker = "マハムート"
original = "「炎、水、氷、雷、風、光、闇、その他諸々の星術。教えれば、全部普通に覚えることができる。使える星術の種類を聞いて、驚いたわ」"
translation = "「화염, 물, 얼음, 번개, 바람, 빛, 어둠, 그 외 자잘한 성술들. 가르치면 전부 평범하게 익힐 수 있어. 사용할 수 있는 성술의 종류를 듣고 깜짝 놀랐다니까.」"

[[dialogue]]
speaker = "マハムート"
original = "「誰しも何か尖った部分があるものよ。でも、あの子はその真逆を行く」"
translation = "「누구나 무언가 특출난 부분이 있기 마련이지. 하지만 그 아이는 그 정반대의 길을 가고 있어.」"

[[dialogue]]
speaker = "マハムート"
original = "「あの子は全ての分野に適性を持っている。つまりは『全適正』」"
translation = "「그 아이는 모든 분야에 적성을 가지고 있어. 즉 『전 적성』.」"

[[dialogue]]
speaker = "マハムート"
original = "「どの分野も１００点満点には到達しないけど、一方であらゆる分野で平均点を決して下回ることがない」"
translation = "「어느 분야도 100점 만점에 도달하진 않지만, 반면에 어느 분야에서도 평균점 아래로 떨어지는 법이 결코 없어.」"

[[dialogue]]
speaker = "マハムート"
original = "「そして、できない分野が存在しないから、例えば『防御』のように１つの分野を鍛え続ければ、成長速度は普通でも、着実に強くなっていく」"
translation = "「그리고 못 하는 분야가 존재하지 않으니까, 예를 들어 『방어』처럼 한 분야를 계속 단련하면 성장 속도는 평범해도 착실하게 강해져 가지.」"

[[dialogue]]
speaker = "マハムート"
original = "「その証拠に、あの子は新星学園星徒会のディフェンス役として、リクリエとの決戦を生き抜いてみせた。常人が才能なしにできることではないわ」"
translation = "「그 증거로 그 아이는 신성학원 성도회의 디펜스 역할로서 리크리에와의 결전을 살아남아 보였어. 범인이 재능 없이 해낼 수 있는 일이 아니야.」"

[[dialogue]]
speaker = "マハムート"
original = "「つまり、あの子は鍛えれば鍛える程、普通に強くなっていく『大器晩成』型」"
translation = "「즉, 그 아이는 단련하면 할수록 평범하게 강해지는 『대기만성』형.」"

[[dialogue]]
speaker = "マハムート"
original = "「最終的に何でも普通にこなせるようになる、真の『オールラウンダー』よ」"
translation = "「최종적으로는 무엇이든 평범하게 해낼 수 있게 되는 진정한 『올라운더』야.」"

[[dialogue]]
speaker = "unk"
original = "それが……マトイの才能"
translation = "그것이…… 마토이의 재능."

[[dialogue]]
speaker = "マハムート"
original = "「ただ……私がそのこと言っても、多分伝わらない」"
translation = "「다만…… 내가 그 말을 해도 아마 전달되지 않겠지.」"

[[dialogue]]
speaker = "マハムート"
original = "「私は今回指導するまで、マトイとそこまで深く関わってこなかったしね。だから――」"
translation = "「나는 이번에 지도하기 전까지 마토이와 그렇게 깊게 관계하지 않았으니까. 그러니까──」"

[[dialogue]]
speaker = "マハムート"
original = "「このことをちゃんと伝えられるのは、会長。今日まで一緒に星徒会をやってきた貴方よ」"
translation = "「이걸 제대로 전해줄 수 있는 건 회장, 오늘까지 함께 성도회를 해온 당신이야.」"

[[dialogue]]
speaker = "unk"
original = "俺がマムに言われたことをマトイに伝えると――"
translation = "내가 마무에게 들은 것을 마토이에게 전하자──"

[[dialogue]]
speaker = "マトイ"
original = "「マムがそんなことを……」"
translation = "「마무가 그런 말을……」"

[[dialogue]]
speaker = "unk"
original = "でも俺は、本当は――"
translation = "하지만 나는 사실──"

[[dialogue]]
speaker = "unk"
original = "才能があるとか無いとか、そんなのはどうでもいいんだ。"
translation = "재능이 있고 없고 그런 건 아무래도 좋아."

[[dialogue]]
speaker = "マトイ"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker = "unk"
original = "今日まで、俺たち星徒会を盾で守り続けてきたのは、他の誰でもない。マトイだ。"
translation = "오늘까지 우리 성도회를 방패로 지켜온 건 다른 누구도 아닌 마토이야."

[[dialogue]]
speaker = "unk"
original = "それは揺るぎない事実。"
translation = "그건 흔들리지 않는 사실."

[[dialogue]]
speaker = "unk"
original = "マトイがどんな敵を前にしても、いつも変わらず、勇敢に盾を構え続けてきたことを、俺は知っている。"
translation = "마토이가 어떤 적 앞에서도 항상 변함없이 용감하게 방패를 계속 세워 왔다는 걸 나는 알고 있어."

[[dialogue]]
speaker = "unk"
original = "だから――"
translation = "그러니까──"

[[dialogue]]
speaker = "unk"
original = "その『普通』を、マトイはもっと誇っていい"
translation = "그 『평범함』을 마토이는 좀 더 자랑스러워해도 돼."

[[dialogue]]
speaker = "マトイ"
original = "「会長……」"
translation = "「회장님……」"

[[dialogue]]
speaker = "unk"
original = "と、その時だった。"
translation = "그때였다."

[[dialogue]]
speaker = "マトイ"
original = "「モンスター出現アラート……！」"
translation = "「몬스터 출현 알람……!」"

[[dialogue]]
speaker = "unk"
original = "モンスターが出現したのは、学園のすぐ近くだった。俺はリゾート結界にいたマトイ、マム、アムの３人で臨時チームを組み、対処へ向かったが――"
translation = "몬스터가 출현한 곳은 학원 바로 근처였다. 나는 리조트 결계에 있던 마토이, 마무, 아무 세 명과 임시 팀을 짜서 대처하러 향했지만──"

[[dialogue]]
speaker = "マハムート"
original = "「とんでもないことになったわね……」"
translation = "「엄청난 일이 벌어졌네……」"

[[dialogue]]
speaker = "アム"
original = "「マム！\u3000言われた通り、セレスティアで救援要請シグナルは出しました！\u3000でも……」"
translation = "「마무! 말한 대로 셀레스티아로 구원 요청 시그널 보냈습니다! 하지만……」"

[[dialogue]]
speaker = "マトイ"
original = "「これは……数が普通じゃない……！」"
translation = "「이건…… 숫자가 장난이 아니야……!」"

[[dialogue]]
speaker = "モンスター"
original = "「ギギギ……！」"
translation = "「기기기……!」"

[[dialogue]]
speaker = "マハムート"
original = "「これが噂の新種モンスターね。確かに、これまでのとは異質の雰囲気だわ」"
translation = "「이게 소문으로 듣던 신종 몬스터구나. 확실히 지금까지와는 이질적인 분위기야.」"

[[dialogue]]
speaker = "アム"
original = "「どうしよう……！\u3000周りには、逃げ遅れた人達が沢山いるのに……！」"
translation = "「어떡하지……! 주변에는 대피하지 못한 사람들이 잔뜩 있는데……!」"

[[dialogue]]
speaker = "マトイ"
original = "「モンスターが群れを為して、周囲に包囲網を作ってる……！\u3000これじゃ他の星騎士たちが来ても、簡単に入って来れない……！」"
translation = "「몬스터가 떼를 지어서 주위에 포위망을 만들고 있어……! 이러면 다른 성기사들이 와도 쉽게 들어오지 못해……!」"

[[dialogue]]
speaker = "unk"
original = "そう、新種のモンスターは目の前にも沢山いるが、それ以外の群れが俺たちのいるエリアを取り囲むように、円状の包囲網を形成していた。"
translation = "그렇다, 신종 몬스터는 눈앞에도 가득했지만 그 외의 무리가 우리가 있는 구역을 에워싸듯 원형 포위망을 형성하고 있었다."

[[dialogue]]
speaker = "unk"
original = "まるで、エリア内の獲物を逃がさんとばかりに。"
translation = "마치 구역 내의 사냥감을 놓치지 않겠다는 듯이."

[[dialogue]]
speaker = "マハムート"
original = "「落ち着きなさい、２人共。この新種モンスターを想定して、一対多数の防御訓練をしてきたんでしょう」"
translation = "「진정하렴, 둘 다. 이 신종 몬스터를 상정해서 일대다수의 방어 훈련을 해온 거잖니.」"

[[dialogue]]
speaker = "アム"
original = "「……！\u3000イエス、マム！」"
translation = "「……! 예스, 마무!」"

[[dialogue]]
speaker = "マハムート"
original = "「会長、貴方に指示は任せるわ。民間人を救助しつつ、エリアを取り囲んでいるモンスター群の壁を突破するわよ」"
translation = "「회장, 당신에게 지시를 맡길게. 민간인을 구조하면서 구역을 에워싸고 있는 몬스터 무리의 벽을 돌파하자.」"

[[dialogue]]
speaker = "unk"
original = "よし、行くぞ！"
translation = "좋아, 가자!"

[[dialogue]]
speaker = "マトイ"
original = "「うん！\u3000落ち着いて……いつも通りに！」"
translation = "「응! 침착하게…… 평소대로!」"

[[dialogue]]
speaker = "unk"
original = "俺たちは新種モンスターとの交戦を開始するのだった――"
translation = "우리는 신종 몬스터와의 교전을 개시했다──"

