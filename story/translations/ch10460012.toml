[[dialogue]]
speaker = "unk"
original = "第２話,護衛はお嬢様に恋してる,P"
translation = "제2화, 호위는 아가씨를 사랑하고 있어"

[[dialogue]]
speaker = "unk"
original = "ある日、ヴィーナスと共にモンスターと戦闘していた時のこと――"
translation = "어느 날, 비너스와 함께 몬스터와 전투하고 있었을 때의 일──"

[[dialogue]]
speaker = "モンスター"
original = "「イイイイイ！」"
translation = "「이이이이이!」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナス、後ろだ！"
translation = "비너스, 뒤야!"

[[dialogue]]
speaker = "ヴィーナス"
original = "「むっ……！」"
translation = "「무윽……!」"

[[dialogue]]
speaker = "閃"
original = "「お嬢様、危ない……！」"
translation = "「아가씨, 위험해요……!」"

[[dialogue]]
speaker = "閃"
original = "「間一髪……でしたね」"
translation = "「간발의 차……였군요.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「センちゃん！\u3000助けに来てくれたのね！」"
translation = "「센짱! 도와주러 왔구나!」"

[[dialogue]]
speaker = "閃"
original = "「もちろんです。私はお嬢様の護衛ですから」"
translation = "「당연하죠. 저는 아가씨의 호위니까요.」"

[[dialogue]]
speaker = "unk"
original = "その後、閃の加勢もあって、戦闘は無事に終了した。"
translation = "그 후 센의 가세도 있어 전투는 무사히 종료되었다."

[[dialogue]]
speaker = "unk"
original = "ありがとう。閃のおかげで助かったよ"
translation = "고마워. 센 덕분에 살았어."

[[dialogue]]
speaker = "閃"
original = "「いえいえ、会長さんもご無事で何よりです」"
translation = "「아뇨 아뇨, 회장님도 무사하셔서 다행입니다.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「センちゃんはいつも私がピンチの時に助けてくれるのよね！」"
translation = "「센짱은 항상 내가 위기일 때 도와주네!」"

[[dialogue]]
speaker = "閃"
original = "「もちろんです！\u3000お嬢様の為ならば火の中水の中、どこへでも助太刀に参りますっ……！」"
translation = "「당연하죠! 아가씨를 위해서라면 불 속이든 물 속이든 어디든 도우러 가겠습니다……!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ありがとう、さすがセンちゃんね！\u3000これからも頼りにしているわ！」"
translation = "「고마워, 역시 센짱이야! 앞으로도 의지할게!」"

[[dialogue]]
speaker = "閃"
original = "「ああ、なんて勿体ない褒め言葉っ。私の脳内メモリに永久保存です……！」"
translation = "「아아, 이 얼마나 과분한 칭찬인가. 제 뇌내 메모리에 영구 보존입니다……!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふふっ、大げさなんだから。センちゃんのお世辞はいつも面白いわね！」"
translation = "「후후, 과장이라니까. 센짱의 아부는 언제나 재밌네!」"

[[dialogue]]
speaker = "閃"
original = "「お嬢様に喜んでもらえたなら何よりですっ。……って、会長さん！？」"
translation = "「아가씨가 기뻐해 주셨다면 무엇보다 다행입니다. ……어라, 회장님!?」"

[[dialogue]]
speaker = "閃"
original = "「どうかしたか、ではありません。よく見たら、腕を怪我してるじゃないですか！」"
translation = "「무슨 일이냐는 표정 짓지 마세요. 잘 보니 팔을 다치셨잖아요!」"

[[dialogue]]
speaker = "unk"
original = "大丈夫、かすり傷だよ"
translation = "괜찮아, 스친 상처야."

[[dialogue]]
speaker = "ヴィーナス"
original = "「なっ……怪我なら早く言わなきゃダメよ！\u3000とにかく、保健室に急ぐわよ！」"
translation = "「뭐…… 부상이라면 빨리 말해야지! 아무튼 보건실로 서둘러 가자!」"

[[dialogue]]
speaker = "unk"
original = "それから学園に戻り、傷跡を治療して貰って、保健室を後にした。"
translation = "그 후 학원으로 돌아와 상처를 치료받고 보건실을 나섰다."

[[dialogue]]
speaker = "閃"
original = "「本当に軽傷だったみたいで、安心しました」"
translation = "「정말 경상이었던 것 같아 안심했습니다.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「クロト。たとえ自分で平気だと思っていても、怪我をした時はちゃんと申告しないとダメよ！」"
translation = "「쿠로토. 설령 스스로 괜찮다고 생각해도 다쳤을 때는 제대로 보고해야 해!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「まだ、付き合いが長いとは言えないけれど――」"
translation = "「아직 사귄 지 오래됐다고는 할 수 없지만──」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私たちは『仲間』でしょう？」"
translation = "「우리는 『동료』잖아?」"

[[dialogue]]
speaker = "unk"
original = "ごめん……次からはちゃんと言うよ"
translation = "미안…… 다음부턴 제대로 말할게."

[[dialogue]]
speaker = "ヴィーナス"
original = "「分かればいいのよ！」"
translation = "「알았으면 됐어!」"

[[dialogue]]
speaker = "閃"
original = "「じーっ……」"
translation = "「지이익……」"

[[dialogue]]
speaker = "unk"
original = "手を握るのはその辺で……"
translation = "손 잡는 건 그쯤 해 둬……"

[[dialogue]]
speaker = "unk"
original = "閃が後ろで嫉妬してるから"
translation = "센이 뒤에서 질투하고 있으니까."

[[dialogue]]
speaker = "ヴィーナス"
original = "「え？\u3000どういうこと？」"
translation = "「에? 무슨 소리야?」"

[[dialogue]]
speaker = "閃"
original = "「ななっ……何を言っているのですか会長さん！？\u3000わ、私は別に、嫉妬なんて……！」"
translation = "「나나앗…… 무슨 말씀을 하시는 겁니까 회장님!? 저, 저는 딱히 질투 같은 건……!」"

[[dialogue]]
speaker = "unk"
original = "閃はヴィーナスのこと大好きらしいぞ"
translation = "센은 비너스를 정말 좋아한대."

[[dialogue]]
speaker = "ヴィーナス"
original = "「そうだったの？\u3000いつもお嬢様の為にって言ってくれてたのは、大げさじゃなく本当だったのね！」"
translation = "「그랬던 거야? 항상 아가씨를 위해서라고 말해준 건 과장이 아니라 진심이었구나!」"

[[dialogue]]
speaker = "閃"
original = "「い、いえ、私はあくまでお嬢様のことを深く尊敬しているのであって、好きとかそういう俗な感情では……！」"
translation = "「아, 아니요, 저는 어디까지나 아가씨를 깊이 존경하고 있는 것이지, 좋아한다거나 그런 세속적인 감정으로는……!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「違うってこと……？\u3000そう、残念ね」"
translation = "「아니라는 거야……? 그렇구나, 아쉽네.」"

[[dialogue]]
speaker = "閃"
original = "「ああっ！？\u3000そんな悲しい顔をしないでください……！」"
translation = "「아앗!? 그런 슬픈 표정 짓지 마세요……!」"

[[dialogue]]
speaker = "閃"
original = "「何も違いません！\u3000わ、私はお嬢様のことを……心からお慕いしています！」"
translation = "「아무것도 다르지 않습니다! 저, 저는 아가씨를…… 진심으로 사모하고 있습니다!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そうなの！？\u3000センちゃん、嬉しいわ！」"
translation = "「정말!? 센짱, 기뻐!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私もセンちゃんのこと、大好きよ！」"
translation = "「나도 센짱 정말 좋아해!」"

[[dialogue]]
speaker = "閃"
original = "「きゃ～～っ！？」"
translation = "「꺄아아악!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ちょっ！？\u3000センちゃんどうしたの！？\u3000大丈夫！？」"
translation = "「어라!? 센짱 왜 그래!? 괜찮아!?」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスの天然ビームが直撃した……"
translation = "비너스의 천연 빔이 직격했어……"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私、そんな技知らないんだけど！？」"
translation = "「나, 그런 기술 모르는데!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「センちゃん、しっかり！\u3000保健室行く！？」"
translation = "「센짱, 정신 차려! 보건실 갈까!?」"

[[dialogue]]
speaker = "閃"
original = "「いえ、問題ありません。むしろとても元気です！！」"
translation = "「아니요, 문제없습니다. 오히려 매우 활기차요!!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「鼻血たれてるし、クロトの怪我より重症に見えるんだけど！？」"
translation = "「코피가 흐르고 있고, 쿠로토의 부상보다 중증으로 보이는데!?」"

[[dialogue]]
speaker = "unk"
original = "その後、ヴィーナスに保健室で鼻血の世話をされながらも、終始幸せそうな表情を浮かべる閃なのだった。"
translation = "그 후, 비너스에게 보건실에서 코피 수발을 받으면서도, 내내 행복한 표정을 짓는 센이었다."

