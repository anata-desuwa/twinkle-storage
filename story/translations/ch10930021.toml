[[dialogue]]
speaker = "unk"
original = "第１話,応援タッグバトル（前編）,P"
translation = "제1화, 응원 태그 배틀 (전편), P"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「２人とも頑張れーっ！」"
translation = "「두 사람 다 힘내ー!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「たぁああぁぁぁぁぁっ！」"
translation = "「타아아아아아아앗!」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「うぉおおりゃあぁああっ！」"
translation = "「우오오오오랴아아앗!」"

[[dialogue]]
speaker = "unk"
original = "ミルフィーの声援を受けながら、カティアとヒヨは抜きつ抜かれつトラックを疾走する。"
translation = "밀피의 성원을 받으며, 카티아와 히요는 엎치락뒤치락 트랙을 질주한다."

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「くぅぅ、追いつけねえかっ！」"
translation = "「크으으, 따라잡을 수 없나!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「ゴールっ！\u3000勝った勝ったー！\u3000魔王様、見ててくれましたかー！」"
translation = "「골인! 이겼다 이겼어ー! 마왕님, 보고 계셨나요ー!」"

[[dialogue]]
speaker = "unk"
original = "ナイスラン！"
translation = "나이스 런!"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「かー、負けちまったい！\u3000姐さんの前で記念の勝利を飾れると思ったのによぉ！」"
translation = "「카ー, 져버렸네! 누님 앞에서 기념할 만한 승리를 장식할 수 있을 거라고 생각했는데!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「ふふーん、魔王様の前でいいカッコさせるわけにはいかないワン！」"
translation = "「후후웅, 마왕님 앞에서 멋진 꼴 보이게 할 수는 없지 멍!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「記念の勝利？」"
translation = "「기념할 만한 승리?」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「今、私が勝って、ヒヨとの戦歴が１９８戦９９勝になったんです！」"
translation = "「지금 제가 이겨서, 히요와의 전적이 198전 99승이 되었답니다!」"

[[dialogue]]
speaker = "unk"
original = "９９勝！？"
translation = "99승이라고!?"

[[dialogue]]
speaker = "unk"
original = "１９８戦！？"
translation = "198전이라고!?"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「今の勝負に、あたしの１００勝目がかかってたってわけさあ」"
translation = "「이번 승부에, 내 100승이 걸려 있었다는 거지」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「それだけの回数競い合ってるってことにも、五分五分の引き分けっていうのも驚きだよ……」"
translation = "「그렇게 많은 횟수를 경쟁했다는 것도, 오십 대 오십의 무승부라는 것도 놀라워……」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「ワン公とはレース以外でも大なり小なり競い合ってっからなあ……簡易戦闘服で速く走れるようになってから、更に手強くなったぜえ」"
translation = "「멍멍이랑은 레이스 외에도 크고 작게 경쟁하고 있으니까아…… 간이 전투복으로 빨리 달릴 수 있게 된 후로, 더욱 만만치 않게 되었지」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「次の勝負は、どっちかが１００勝目になるメモリアルレースですガオ！」"
translation = "「다음 승부는, 둘 중 한 명이 100승을 차지하게 될 기념비적인 레이스입니다갸오!」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「絶対にワン公に負けたくねえ！\u3000姐さん、あたしのために一肌脱いじゃくれねえか！」"
translation = "「절대로 멍멍이에게 지고 싶지 않아! 누님, 나를 위해 한몫 거들어 주지 않겠어!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ええっ！？\u3000一肌脱ぐって──」"
translation = "「에엣!? 한몫 거든다니──」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「魔王様！\u3000第一のしもべとして、絶対にヒヨより先に１００回勝ちたいですガオ！」"
translation = "「마왕님! 제1의 종복으로서, 절대로 히요보다 먼저 100번 이기고 싶습니다갸오!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「だから、星霊祭の時みたいな本気の応援をお願いします！」"
translation = "「그러니, 성령제 때처럼 진심으로 응원해 주시기를 부탁드립니다!」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「姐さんにも頼みます！」"
translation = "「누님에게도 부탁합니다!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「あ、一肌脱ぐってそういうこと？」"
translation = "「아, 한몫 거든다는 게 그런 뜻이야?」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「わふ？\u3000なんだと思ったんです？」"
translation = "「와프? 뭐라고 생각하셨나요?」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「な、なんとも思ってないよ？」"
translation = "「아, 아무것도 생각 안 했어?」"

[[dialogue]]
speaker = "unk"
original = "本気の応援、任された！"
translation = "진심으로 응원하는 것, 맡겨졌다!"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「会長くんがやるなら、私もやらないわけにはいかないね。任せて、ヒヨちゃん」"
translation = "「회장군이 할 거라면, 나도 안 할 수는 없지. 맡겨줘, 히요짱」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「つまり、これはあたしと姐さんタッグＶＳ──」"
translation = "「즉, 이건 나와 누님 태그 VS──」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「私と魔王様チームのタッグバトルってことだワン！」"
translation = "「저와 마왕님 팀의 태그 배틀이라는 거다 멍!」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「せっかくの記念レースなんだ。ただ勝った負けただけじゃ面白くねえなあ？」"
translation = "「모처럼의 기념 레이스인데. 그냥 이기고 지는 것만으로는 재미없지 않나?」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「ふっふっふ、私もそう思ってたところだワン」"
translation = "「훗훗훗, 저도 그렇게 생각하고 있던 참이다 멍」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「負けた方は、勝った方の命令をひとつ、聞かなきゃいけないってのはどうですガオ？」"
translation = "「진 쪽은, 이긴 쪽의 명령을 하나, 들어줘야 한다는 건 어떻습니까갸오?」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「望むところだよ！」"
translation = "「바라는 바야!」"

[[dialogue]]
speaker = "unk"
original = "望んじゃった……"
translation = "바라 버렸네……"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「勝負は明日の放課後、このグラウンドで！」"
translation = "「승부는 내일 방과 후, 이 운동장에서!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「しっかりシャンプーして待っていろガオ！」"
translation = "「제대로 샴푸하고 기다리고 있어라 갸오!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「……首を洗って待っていろ、って言いたかったのかな？」"
translation = "「……목을 씻고 기다리고 있어라, 라고 말하고 싶었던 걸까?」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「本気で競い合えるライバルがいるのって良いよね」"
translation = "「진심으로 경쟁할 수 있는 라이벌이 있다는 건 좋은 일이지」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「だけど１００勝目がかかってるんだよね……ヒヨちゃんに勝たせてあげたいなぁ」"
translation = "「하지만 100승이 걸려 있는 거잖아…… 히요짱을 이기게 해주고 싶네」"

[[dialogue]]
speaker = "unk"
original = "俺もカティアを勝たせたい"
translation = "나도 카티아를 이기게 해주고 싶다"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ヒヨちゃんとカティアちゃんの実力がほぼ互角ってことは──勝敗は私たちの応援にかかっているといっても過言じゃないね」"
translation = "「히요짱과 카티아짱의 실력이 거의 호각이라는 건── 승패는 우리의 응원에 달려 있다고 해도 과언이 아니네」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「私と会長くんも明日は競い合うライバル同士だ、ふふ」"
translation = "「나와 회장군도 내일은 경쟁하는 라이벌끼리다, 후후」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「あー、そういえば……負けた方は勝った方の命令を聞かなきゃいけないのって、やっぱり私たちも……かな？」"
translation = "「아ー, 그러고 보니…… 진 쪽은 이긴 쪽의 명령을 들어줘야 한다는 거, 역시 우리도……일까?」"

[[dialogue]]
speaker = "unk"
original = "連帯責任で"
translation = "연대 책임으로"

[[dialogue]]
speaker = "unk"
original = "タッグだからね"
translation = "태그니까 말이야"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「そ、そうだよね。タッグだもんね！」"
translation = "「그, 그렇지. 태그니까!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "（つまりヒヨちゃんが勝ったら、会長くんに命令できちゃうってこと……！？）"
translation = "（즉 히요짱이 이기면, 회장군에게 명령할 수 있다는 거……!?）"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "（えっ、えっ、どうしよ……！\u3000どんなお願いしようかな……）"
translation = "（엣, 엣, 어떡하지……! 어떤 부탁을 할까……）"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "（あんなこととかこんなことでもいいのかな……えへ、えへへ……<emoji=heart04>）"
translation = "（이런 일이나 저런 일도 괜찮을까…… 에헤, 에헤헤……<emoji=heart04>）"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「明日の応援、絶対に負けないからねっ！\u3000帰ったら、少し練習しておこうっと！」"
translation = "「내일 응원, 절대로 지지 않을 테니까! 돌아가면, 조금 연습해 둬야지!」"

[[dialogue]]
speaker = "unk"
original = "カティアやヒヨ以上に、ミルフィーは闘志を燃やしているようにも見えた。"
translation = "카티아나 히요 이상으로, 밀피는 투지를 불태우고 있는 것처럼 보였다."

[[dialogue]]
speaker = "unk"
original = "明日の応援勝負、負けられない！"
translation = "내일의 응원 승부, 질 수 없다!"

