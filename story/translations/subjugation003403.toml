[[dialogue]]
speaker = "ノルトハウゼン"
original = "「……………………」"
translation = "「……………………」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「ここは、一体どこでしょう？」"
translation = "「여기는 대체 어디일까요?」"

[[dialogue]]
speaker = "unk"
original = "ノルトハウゼンは気が付くと、見知らぬ学園の中にいた。直前までの記憶が曖昧で、どうやってここまで来たのかも分からない。"
translation = "노르트하우젠은 정신을 차려보니 낯선 학원 안에 있었다. 직전까지의 기억이 애매해서 어떻게 여기까지 왔는지도 알 수 없다."

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「特鉄隊に入隊してからというもの、任務で様々な場所へ赴きましたが、このような場所は初めてですわ」"
translation = "「특철대에 입대하고 나서 임무로 다양한 장소에 가보았습니다만, 이런 곳은 처음이에요.」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「……じっとしていても仕方ありませんわね。現在地がわからない時は誰かに訊ねてみればよいのです」"
translation = "「……가만히 있어도 별수 없겠네요. 현재 위치를 모를 때는 누군가에게 물어보면 되는 거랍니다.」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「ごめんなさい。少しお尋ねしたいのですが……ここは一体どこでしょうか？」"
translation = "「실례합니다. 잠시 여쭙고 싶은 것이 있습니다만…… 여기는 대체 어디일까요?」"

[[dialogue]]
speaker = "流星学園の生徒Ａ"
original = "「えっ？\u3000わたし？」"
translation = "「엣? 저요?」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「はい。突然、こちらに連れて来られて、右も左もわかりませんの」"
translation = "「네. 갑자기 이쪽으로 오게 되어 갈피를 잡지 못하고 있답니다.」"

[[dialogue]]
speaker = "流星学園の生徒Ａ"
original = "「流星学園っていう星騎士の集まる学園の校舎内、だけど……お姉さんは誰ですか？」"
translation = "「유성 학원이라는 성기사가 모이는 학원 교사 안인데…… 언니는 누구세요?」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「わたくしはノルトハウゼンと申します。ハルツの魔法使いですわ」"
translation = "「저는 노르트하우젠이라고 합니다. 하르츠의 마법사에요.」"

[[dialogue]]
speaker = "流星学園の生徒Ａ"
original = "「魔法使い？\u3000星術のことを魔法って言ってるとか……？」"
translation = "「마법사? 성술을 마법이라고 말하는 건가……?」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「魔法は魔法です。わたくしたちハルツが使う魔法は、人に夢や希望を与える魔法。わたくしたちはドリームマジックと呼んでいます」"
translation = "「마법은 마법이랍니다. 저희 하르츠가 사용하는 마법은 사람들에게 꿈과 희망을 주는 마법. 저희는 드림 매직이라고 부르고 있어요.」"

[[dialogue]]
speaker = "流星学園の生徒Ａ"
original = "「ふーん、そうなんだ……魔法ってどんなことができるの？」"
translation = "「흐음, 그렇구나…… 마법으로는 어떤 걸 할 수 있어?」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「人々を笑顔にするためのことなら、大抵のことはできますわ」"
translation = "「사람들을 미소 짓게 하기 위한 일이라면 대부분의 일은 할 수 있답니다.」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「空に虹をかけたり、星を降らせたり、花火を打ち上げたり、とにかく人を楽しませるのがハルツの魔法です」"
translation = "「하늘에 무지개를 띄우거나, 별을 내리게 하거나, 불꽃을 쏘아 올리거나, 어쨌든 사람을 즐겁게 하는 것이 하르츠의 마법이에요.」"

[[dialogue]]
speaker = "流星学園の生徒Ａ"
original = "「面白そうだね、ちょっと見てみたいかも！」"
translation = "「재밌겠다, 조금 보고 싶을지도!」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「わかりましたわ……上手くできるかどうかわかりませんが、精一杯頑張らせていただきます」"
translation = "「알겠습니다…… 잘 될지는 모르겠지만 온 힘을 다해 노력해 볼게요.」"

[[dialogue]]
speaker = "流星学園の生徒Ａ"
original = "「見せてくれるの！？」"
translation = "「보여주는 거야!?」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「ハルツの魔法は人々を楽しませる魔法ですわ。望まれたなら、期待に応えないわけには参りません」"
translation = "「하르츠의 마법은 사람들을 즐겁게 하는 마법이랍니다. 원하신다면 기대에 부응하지 않을 수 없지요.」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「それではご覧ください……えいっ！」"
translation = "「그럼 지켜봐 주세요…… 에잇!」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "流星学園の生徒Ａ"
original = "「すごいすごい、ホントに花火だ！\u3000しかも特大のやつ！」"
translation = "「대단해 대단해, 진짜 불꽃놀이야! 게다가 엄청 큰 거!」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「あらあら、わたくしにしては随分と大きな花火があがりましたね。予想外の大成功ですわ」"
translation = "「어머나, 저치고는 꽤 커다란 불꽃이 올라갔네요. 예상 밖의 대성공이에요.」"

[[dialogue]]
speaker = "流星学園の生徒Ａ"
original = "「予想外のって……？」"
translation = "「예상 밖이라니……?」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「実はわたくし魔法使いとしてはまだまだ未熟者で、わたくしが作り出せる花火は頑張っても両手を広げた程度の小さなものなんですの」"
translation = "「사실 저는 마법사로서 아직 미숙해서, 제가 만들 수 있는 불꽃은 노력해도 양팔을 벌린 정도의 작은 것뿐이거든요.」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「でもはじめから小さな魔法を使うのはハルツらしからぬ行いです。せっかくドリームマジックを体験して頂くのですから、喜んで頂けるよう全力を出させてもらいました」"
translation = "「하지만 처음부터 작은 마법을 쓰는 건 하르츠답지 않은 행동이죠. 귀하게 드림 매직을 체험해 보시는 거니까, 기뻐하실 수 있도록 전력을 다했답니다.」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「でもまさか、こんなに大きな魔法が生まれるなんて……」"
translation = "「하지만 설마 이렇게 큰 마법이 태어날 줄이야……」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「……ふふっ、夢のようです。こんなトップスタァにしか生み出せないような、大きな花火をお見せすることができて♪」"
translation = "「……후훗, 꿈만 같아요. 이런 톱스타만이 만들어낼 수 있는 커다란 불꽃을 보여드릴 수 있어서♪」"

[[dialogue]]
speaker = "流星学園の生徒Ａ"
original = "「がんばってくれたんだ、ありがとね！\u3000あ、でも……校舎の前でこんなに派手に花火を打ち上げちゃったのはちょっとマズいかも」"
translation = "「열심히 해줬구나, 고마워! 아, 근데…… 교사 앞에서 이렇게 화려하게 불꽃놀이를 한 건 좀 곤란할지도 몰라」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「あら、そうなのですか？」"
translation = "「어머, 그런가요?」"

[[dialogue]]
speaker = "流星学園の生徒Ａ"
original = "「私は逃げるから、お姉さんも逃げたほうがいいよ！\u3000じゃーねっ！」"
translation = "「난 도망칠 테니까 언니도 도망치는 게 좋아! 그럼 안녕!」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「行ってしまいましたわ……」"
translation = "「가버렸네요……」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「流星学園、星騎士……聞き覚えの無い言葉でしたわ。もう少しお話を聞きたかったのですが……」"
translation = "「유성 학원, 성기사…… 들어본 적 없는 단어들이었어요. 조금 더 이야기를 듣고 싶었습니다만……」"

[[dialogue]]
speaker = "unk"
original = "現場にたどり着いた時にはもう、花火を打ち上げているという謎の人物はいなくなっていた。"
translation = "현장에 도착했을 때는 이미 불꽃놀이를 하고 있었다는 수수께끼의 인물은 사라진 뒤였다."

[[dialogue]]
speaker = "unk"
original = "その騒ぎを見ていた者がいないか、俺たちは周囲に聞き込みをして回った。"
translation = "그 소동을 본 사람이 없는지 우리는 주위에 수소문을 하고 다녔다."

[[dialogue]]
speaker = "流星学園の生徒Ｂ"
original = "「え、ええと……大人っぽい感じの人で、ちょっと変わった服装をしていました」"
translation = "「어, 에또…… 어른스러운 느낌의 사람으로 조금 특이한 복장을 하고 있었어요」"

[[dialogue]]
speaker = "流星学園の生徒Ｂ"
original = "「魔法使いっぽい格好って言えばいいんでしょうか？\u3000あまり星騎士っぽくはなくて……あ、そうだ。『ハルツの魔法』がなんとかって言ってたと思います」"
translation = "「마법사 같은 차림이라고 해야 할까요? 별로 성기사 같지는 않아서…… 아, 맞다. 『하르츠의 마법』이 어쩌구저쩌구 했던 것 같아요」"

[[dialogue]]
speaker = "unk"
original = "どう思う？"
translation = "어떻게 생각해?"

[[dialogue]]
speaker = "マハムート"
original = "「黒ベア子から聞いた特徴と一致はしているわね、一応」"
translation = "「흑베아코에게 들은 특징과 일치하긴 하네, 일단은」"

[[dialogue]]
speaker = "ルルゥ"
original = "「絶対じゃない……けど、多分その人の可能性が高そう、なの」"
translation = "「절대는 아니지만…… 아마 그 사람일 가능성이 높은 거야」"

[[dialogue]]
speaker = "フィオナ"
original = "「どちらに向かったか分かりますか？」"
translation = "「어느 쪽으로 갔는지 아시나요?」"

[[dialogue]]
speaker = "流星学園の生徒Ｂ"
original = "「校門から外に……」"
translation = "「교문 밖으로……」"

[[dialogue]]
speaker = "マハムート"
original = "「一緒に連れてくると黒い方が問題を起こしそうだから２人は星徒会室に置いてきたけど、それが幸いしたわね。このまま追いかけるわよ」"
translation = "「함께 데려오면 검은 쪽이 문제를 일으킬 것 같아서 둘은 성도회실에 두고 왔는데, 그게 다행이었네. 이대로 쫓아가자」"

[[dialogue]]
speaker = "フィオナ"
original = "「引き続き目撃情報も募り続けます。範囲を学園外まで広げて！」"
translation = "「계속해서 목격 정보도 수집할게요. 범위를 학원 밖까지 넓혀서!」"

[[dialogue]]
speaker = "アイリーン"
original = "「～～♪」"
translation = "「~~♪」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「すみません。少々お話を伺ってもよろしいでしょうか？」"
translation = "「실례합니다. 잠시 여쭙고 싶은 것이 있습니다만?」"

[[dialogue]]
speaker = "アイリーン"
original = "「え？\u3000うん、いいですよ～」"
translation = "「에? 응, 괜찮아요~」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「ここは一体どこなのでしょう？\u3000もしかして、イリスクラウドではないのでしょうか？」"
translation = "「여기는 대체 어디일까요? 혹시 이리스 클라우드가 아닌가요?」"

[[dialogue]]
speaker = "アイリーン"
original = "「えーっ、不思議な質問だね～。ここは流星市国だよ。イリスクラウドっていう場所は知らないかな～」"
translation = "「에~ 신기한 질문이네~. 여기는 유성시국이야. 이리스 클라우드라는 곳은 모르겠는걸~」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「そうですか……困りましたわね」"
translation = "「그렇군요…… 곤란하게 됐네요.」"

[[dialogue]]
speaker = "アイリーン"
original = "「どうしたの？\u3000何か困ってるならお話聞くけど？」"
translation = "「왜 그래? 뭔가 곤란한 일이 있다면 들어줄 수 있는데?」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「本当ですか？\u3000ありがとうございます、ぜひお願いしますわ」"
translation = "「정말인가요? 감사합니다, 꼭 부탁드릴게요.」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「申し遅れました。わたくしはハルツの魔法使い、ノルトハウゼンですわ」"
translation = "「인사가 늦었습니다. 저는 하르츠의 마법사, 노르트하우젠이에요.」"

[[dialogue]]
speaker = "アイリーン"
original = "「魔法使いっ！？」"
translation = "「마법사!?」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「……？\u3000どうかしましたの？」"
translation = "「……? 무슨 일이라도 있나요?」"

[[dialogue]]
speaker = "アイリーン"
original = "「あ……えーっと、魔法使い？\u3000魔女ではなくて？」"
translation = "「아…… 에 그러니까, 마법사? 마녀가 아니라?」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「はい、人々に夢と希望を届ける魔法使いですわ」"
translation = "「네, 사람들에게 꿈과 희망을 전하는 마법사랍니다.」"

[[dialogue]]
speaker = "アイリーン"
original = "（……『魔法使い』、ってなんだろ？\u3000魔女じゃないって思っていいのかな？）"
translation = "(……『마법사』라는 게 뭐지? 마녀가 아니라고 생각해도 되려나?)"

[[dialogue]]
speaker = "アイリーン"
original = "（とりあえず長官に報告しておいた方がいいよね──）"
translation = "(일단 장관님께 보고해 두는 게 좋겠지──)"

[[dialogue]]
speaker = "unk"
original = "目撃情報はあれど空振りばかりで、無駄に時間が過ぎてしまっていた。"
translation = "목격 정보는 있어도 허탕만 쳐서 헛되이 시간이 지나가고 있었다."

[[dialogue]]
speaker = "unk"
original = "そんな時、意外な相手からの連絡がＤＩＳＣに通知される。"
translation = "그때 의외의 상대로부터 연락이 DISC에 통지된다."

[[dialogue]]
speaker = "unk"
original = "もしもし、リーリアか？"
translation = "여보세요, 리리아니?"

[[dialogue]]
speaker = "リーリア"
original = "『せーんぱい♪\u3000掲示板の書き込み、見ましたよ～』"
translation = "『선~배♪ 게시판 글 봤어요~』"

[[dialogue]]
speaker = "リーリア"
original = "『実はですね～、異世界から来たと思われる魔法使い？\u3000をネビュラで保護してるんですよ！』"
translation = "『실은 말이죠~ 이세계에서 온 것으로 추정되는 마법사? 를 네뷸라에서 보호하고 있거든요!』"

[[dialogue]]
speaker = "リーリア"
original = "『これって多分、センパイたちが掲示板で捜してる人じゃないかなーって思って連絡をしてみたわけです♪\u3000どうです、助かっちゃいますか？』"
translation = "『이거 아마 선배들이 게시판에서 찾고 있는 사람이 아닐까 싶어서 연락해 본 거예요♪ 어때요, 도움이 좀 되나요?』"

[[dialogue]]
speaker = "unk"
original = "ネビュラ基地に行けばいいのか？"
translation = "네뷸라 기지로 가면 돼?"

[[dialogue]]
speaker = "unk"
original = "ありがとう"
translation = "고마워"

[[dialogue]]
speaker = "リーリア"
original = "『あれあれ？\u3000ちょーっと感謝の気持ちが足りないんじゃないですか？\u3000シゴデキなコーハイちゃんのこと、いっぱい褒めてくれてもいいんですよ～？』"
translation = "『어라라? 감사의 마음이 좀 부족한 거 아니에요? 일 잘하는 후배님 칭찬 듬뿍 해줘도 된다고요~?』"

[[dialogue]]
speaker = "リーリア"
original = "『ま、いいです。それじゃ待ってますからね、せーんぱい<emoji=heart04>』"
translation = "『뭐, 됐어요. 그럼 기다리고 있을 테니까요, 선~배<emoji=heart04>』"

[[dialogue]]
speaker = "マハムート"
original = "「……誰からの連絡かしら？」"
translation = "「……누구한테 온 연락이니?」"

[[dialogue]]
speaker = "unk"
original = "それらしき人がネビュラにいるって"
translation = "그럴듯한 사람이 네뷸라에 있대"

[[dialogue]]
speaker = "unk"
original = "リーリアから"
translation = "리리아한테서"

[[dialogue]]
speaker = "マハムート"
original = "「ネビュラ？\u3000何故そんなところに迷い込んでいるのかしら……」"
translation = "「네뷸라? 어째서 그런 곳에 흘러 들어간 거지……」"

[[dialogue]]
speaker = "フィオナ"
original = "「ですが、連絡は助かりましたね。ネビュラに居たのでは、このまま街中を捜し回っていても延々と出会えないところでした」"
translation = "「하지만 연락해 줘서 다행이네요. 네뷸라에 있었다면 이대로 시내를 계속 뒤지고 다녀도 영영 못 만날 뻔했어요」"

[[dialogue]]
speaker = "マハムート"
original = "「急いで向かうわよ、ネビュラの基地に案内しなさい！\u3000……返事はイエス・マムよ！」"
translation = "「서둘러 가자, 네뷸라 기지로 안내해! ……대답은 예스 맘이야!」"

[[dialogue]]
speaker = "フィオナ"
original = "「イエス・マム！」"
translation = "「예스 맘!」"

[[dialogue]]
speaker = "ルルゥ"
original = "「イエス・マム……さん、なの！」"
translation = "「예스 맘…… 씨, 인 거야!」"

[[dialogue]]
speaker = "セドナ"
original = "「来たか、魔王」"
translation = "「왔나, 마왕」"

[[dialogue]]
speaker = "unk"
original = "魔女たちの機関であるネビュラの基地に到着すると、そこで待っていたのは長官のセドナさんだった。"
translation = "마녀들의 기관인 네뷸라 기지에 도착하자 그곳에서 기다리고 있던 것은 장관인 세드나 씨였다."

[[dialogue]]
speaker = "unk"
original = "その後ろには先ほど連絡をくれたリーリアが、セドナさんに見られないように小さく手を振っている。"
translation = "그 뒤에는 방금 연락을 준 리리아가 세드나 씨에게 보이지 않게 작게 손을 흔들고 있다."

[[dialogue]]
speaker = "フィオナ"
original = "「この度は私たちの捜し人を保護していただいたようで、ありがとうございます」"
translation = "「이번에 저희가 찾던 사람을 보호해 주셔서 감사합니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「早速で申し訳ありませんが、その方はどちらに……？」"
translation = "「단도직입적으로 말씀드려 죄송합니다만, 그분은 어디에……?」"

[[dialogue]]
speaker = "セドナ"
original = "「ああ、別室にて待機させている。すぐに呼んでこさせよう」"
translation = "「아아, 별실에서 대기시키고 있다. 금방 불러오도록 하지」"

[[dialogue]]
speaker = "リーリア"
original = "「はいは～い♪\u3000じゃ、呼びに行ってきまーす」"
translation = "「네네~♪ 그럼 제가 불러올게요」"

[[dialogue]]
speaker = "セドナ"
original = "「……アイリーンから突然、『魔法使いを名乗る女性を発見した』と連絡が入ってな」"
translation = "「……아이린에게서 갑자기 『마법사를 자처하는 여성을 발견했다』고 연락이 와서 말이지」"

[[dialogue]]
speaker = "セドナ"
original = "「『<ruby>はぐれ魔女<rt>ヤーガ</rt></ruby>』という可能性もあるので、基地まで同行してもらったが……まさか『異世界から来た魔法使い』とは」"
translation = "「『<ruby>떠돌이 마녀<rt>야가</rt></ruby>』일 가능성도 있어서 기지까지 동행하게 했다만…… 설마 『이세계에서 온 마법사』일 줄이야」"

[[dialogue]]
speaker = "セドナ"
original = "「……さて、彼女が来るまでの間に、一体何が起こっているのか我々にも事情を説明してもらうぞ」"
translation = "「……자, 그녀가 오기 전까지 대체 무슨 일이 벌어지고 있는지 우리에게도 사정을 설명해 줘야겠다」"

[[dialogue]]
speaker = "unk"
original = "説明を求められた俺は、ここまでの経緯を簡単にかいつまんで話す。……とはいえ、俺たちも状況はよく分かっていないのだが。"
translation = "설명을 요구받은 나는 지금까지의 경위를 간단히 요약해서 이야기한다. ……라고는 해도 우리도 상황을 잘 모르지만."

[[dialogue]]
speaker = "unk"
original = "『よく分からない奴に絡まれて、よく分からないことが起こっている』ことだけは伝わったようだった。"
translation = "『잘 모르는 녀석에게 얽혀서 잘 모르는 일이 벌어지고 있다』는 것만은 전달된 모양이었다."

[[dialogue]]
speaker = "unk"
original = "そこに見知らぬ女性を連れた、リーリアとアイリーンさんが指令室に入ってくる。"
translation = "그곳에 낯선 여성을 데리고 리리아와 아이린 씨가 사령실로 들어온다."

[[dialogue]]
speaker = "セドナ"
original = "「こちらが<ruby>件<rt>くだん</rt></ruby>の女性、ノルトハウゼン殿だ」"
translation = "「이쪽이 그의 여성, 노르트하우젠 공이다」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「初めまして。ハルツの魔法使い、ノルトハウゼンですわ」"
translation = "「처음 뵙겠습니다. 하르츠의 마법사, 노르트하우젠이에요.」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「わたくしのことを捜して頂いたと伺っています。この度はいろいろとご迷惑をおかけしました」"
translation = "「저를 찾아주셨다고 들었습니다. 이번에는 여러모로 폐를 끼쳤네요.」"

[[dialogue]]
speaker = "フィオナ"
original = "「ご迷惑をおかけしたのはこちらです。ノルトハウゼンさんは別世界から来た魔法使い、と伺ったのですが」"
translation = "「폐를 끼친 건 저희 쪽이죠. 노르트하우젠 씨는 다른 세계에서 온 마법사라고 들었는데요」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「はい。わたくしはイリスクラウドという大陸の北方に位置する国、アイゼングラートから参りました」"
translation = "「네. 저는 이리스 클라우드라는 대륙의 북방에 위치한 나라, 아이젠그라트에서 왔답니다.」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「こちらに来てからどうにも魔法の調子が良くて、違和感を感じていたのですが……」"
translation = "「이곳에 오고 나서 왠지 마법의 컨디션이 너무 좋아서 위화감을 느끼고 있었습니다만……」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「みなさんからイリスクラウドという大陸やアイゼングラートという国は存在しないと教えていただいて、ようやくこれが噂に聞く異世界転生ではないかと思い至りましたの」"
translation = "「여러분께 이리스 클라우드라는 대륙이나 아이젠그라트라는 나라는 존재하지 않는다는 말을 듣고, 드디어 이것이 소문으로만 듣던 이세계 전생이 아닐까 생각하게 되었어요.」"

[[dialogue]]
speaker = "リーリア"
original = "「……『転生』ではないのでは？」"
translation = "「……『전생』은 아니지 않나요?」"

[[dialogue]]
speaker = "フィオナ"
original = "「緋宮会長、イリスクラウドと言えば……」"
translation = "「히노미야 회장님, 이리스 클라우드라고 하면……」"

[[dialogue]]
speaker = "unk"
original = "そうだね。プトラの世界だ"
translation = "그렇네. 푸트라의 세계야"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「プトラさんをご存知なのですか？」"
translation = "「푸트라 씨를 알고 계시나요?」"

[[dialogue]]
speaker = "フィオナ"
original = "「はい、彼女も以前、こちらの世界に呼び出されてしまったことがあります」"
translation = "「네, 그녀도 이전에 이 세계에 소환된 적이 있어요」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「まあ、そうでしたの。ふふ、彼女は元気にしていますわよ。ヴィヴィアンさんと一緒にいるところを、よくお見かけしますわ」"
translation = "「어머, 그랬군요. 후후, 그녀는 잘 지내고 있답니다. 비비안 씨와 함께 있는 모습을 자주 뵙곤 해요.」"

[[dialogue]]
speaker = "フィオナ"
original = "「そうですか！\u3000お元気ならよかったです。プトラさん、なんだかもう懐かしいですね」"
translation = "「그렇군요! 잘 지내신다니 다행이에요. 푸트라 씨, 왠지 벌써 그립네요」"

[[dialogue]]
speaker = "マハムート"
original = "「ふむ、どうやら彼女が黒ベア子の召喚した女性ということで間違いないようね？」"
translation = "「흠, 아무래도 그녀가 흑베아코가 소환한 여성이 맞나 보네?」"

[[dialogue]]
speaker = "フィオナ"
original = "「はい、間違いないと思います」"
translation = "「네, 틀림없는 것 같아요」"

[[dialogue]]
speaker = "マハムート"
original = "「では戻るわよ。星徒会室に残してきた２人が気がかりだわ」"
translation = "「그럼 돌아가자. 성도회실에 남겨둔 두 사람이 걱정되는군」"

[[dialogue]]
speaker = "unk"
original = "セドナさん、ありがとうございました"
translation = "세드나 씨, 감사합니다"

[[dialogue]]
speaker = "セドナ"
original = "「ああ、貴様も色々大変そうだが……まあ、頑張れ」"
translation = "「아아, 네놈도 여러모로 고생이 많겠다만…… 뭐, 힘내라」"

[[dialogue]]
speaker = "unk"
original = "こうして俺たちはノルトハウゼンさんを連れて、ネビュラの基地を後にしたのだった。"
translation = "이렇게 우리는 노르트하우젠 씨를 데리고 네뷸라 기지를 뒤로했다."

