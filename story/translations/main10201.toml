[[dialogue]]
speaker = "unk"
original = "第１話,九浄家メイドのお仕事,B"
translation = "제1화, 쿠죠 가 메이드의 업무"

[[dialogue]]
speaker = "unk"
original = "新星、流星両学園の星徒会メンバーによるフィーニスの塔攻略。"
translation = "신성, 유성 양 학원의 성도회 멤버에 의한 피니스의 탑 공략."

[[dialogue]]
speaker = "unk"
original = "『煌竜ヴィライア』との激戦に勝利した喜びも束の間、突如現れた謎の黒騎士の襲撃を受けた。"
translation = "『황룡 비라이아』와의 격전에서 승리한 기쁨도 잠시, 갑자기 나타난 정체불명의 흑기사에게 습격을 받았다."

[[dialogue]]
speaker = "unk"
original = "星騎士たちの奮戦も空しく、黒騎士は九浄ヴィーナスを何処かへと連れ去ってしまう。"
translation = "성기사들의 분전도 허사로, 흑기사는 쿠죠 비너스를 어딘가로 납치해 가버린다."

[[dialogue]]
speaker = "unk"
original = "その報を受けた九浄家では――"
translation = "그 소식을 접한 쿠죠 가에서는──"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「はぁ～～～……」"
translation = "「하아~~~~……」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「ハッ……！\u3000ため息はいけませんね。幸せが逃げてしまいます……」"
translation = "「핫……! 한숨은 안 되죠. 행복이 달아나 버려요……」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「私はメイド、九浄家のメイド。掃除、洗濯、お料理に雑念は不要です。集中、集中……」"
translation = "「나는 메이드, 쿠죠 가의 메이드. 청소, 빨래, 요리에 잡념은 불필요합니다. 집중, 집중……」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「はぁ～～～……」"
translation = "「하아~~~~……」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「嗚呼、お嬢様は今、<ruby>何処<rt>いずこ</rt></ruby>……果たしてご無事なのでしょうか……お腹を空かせてはいないでしょうか……」"
translation = "「아아, 아가씨는 지금 어디에…… 과연 무사하신 걸까요…… 배를 곯고 계시지는 않을까요……」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「きゃっ……！？」"
translation = "「꺄악……!?」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「きゃあぁあぁぁああぁぁっ！！？」"
translation = "「꺄아아아아아아아아아악!!?」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「すっごい悲鳴。なにごと？」"
translation = "「굉장한 비명. 무슨 일이야?」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「あいたたた……私としたことが……」"
translation = "「아야야야…… 나답지 않게……」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「閃？\u3000だいじょぶ？\u3000だいじょばない？」"
translation = "「센? 괜찮아? 안 괜찮아?」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「美鶴さん！？\u3000も、問題ありません。どこも怪我はしていませんし、痛みもありません。お気遣い感謝します」"
translation = "「미츠루 씨!? 무, 문제없습니다. 어디도 다치지 않았고 통증도 없습니다. 염려해 주셔서 감사합니다」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「そ？\u3000無事なら良いけど、気ぃつけなよー。お嬢様がさらわれちゃって、心配なのも分かるけどさ」"
translation = "「그래? 무사하다면 다행이지만 조심해─. 아가씨가 납치당해서 걱정되는 건 알겠지만 말야」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「いえ、新星・流星両校の星徒会の方々がお嬢様の捜索にあたっているのですから、心配するまでもありません」"
translation = "「아니요, 신성·유성 양교의 성도회 분들이 아가씨를 수색하고 계시니 걱정할 필요도 없습니다」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「各学園のエリートが揃いぶみ。お嬢様の行方を突き止めるなど、お茶の子さいさいです」"
translation = "「각 학원의 엘리트들이 총출동. 아가씨의 행방을 알아내는 것쯤은 식은 죽 먹기입니다」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「きっと明日にでも発見の報が届くことでしょう。ええ、間違いありません、間違いありませんとも！」"
translation = "「분명 내일이라도 발견 소식이 도착할 것입니다. 네, 틀림없습니다, 틀림없고말고요!」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「早いとこ見つけてほしいよね。今頃、お嬢様はどんな目にあってんのかも分からないしね」"
translation = "「빨리 좀 찾았으면 좋겠네. 지금쯤 아가씨가 어떤 꼴을 당하고 있을지도 모르니까」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「どんな目……とは？」"
translation = "「어떤 꼴……이라니요?」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「そりゃー……花も恥じらう乙女の口から言うのは恥ずかしいような目？」"
translation = "「그거야─…… 꽃도 부끄러워할 처녀의 입으로 말하기는 부끄러운 그런 꼴?」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「恥ずかしい目──ハッ……！？」"
translation = "「부끄러운 꼴── 핫……!?」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「お嬢様を亡き者にしたいんならさ。わざわざさらわなくても良かったワケじゃん」"
translation = "「아가씨를 없애고 싶은 거였다면 말야. 굳이 납치할 필요까진 없었을 거 아냐」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「でも、わざわざさらったってゆーならさ、なんてゆーか……その、ほら、アレ、お愉しんだりしちゃうんじゃん？」"
translation = "「근데 굳이 납치했다는 건 말야, 뭐랄까…… 그, 있잖아, 그거, 즐기거나 해버리는 거 아냐?」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「美鶴さんの言、一理あります……そう、ですよね……」"
translation = "「미츠루 씨의 말씀, 일리가 있습니다…… 그렇, 군요……」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「お嬢様のような絶世の美少女を目の前にし、醜悪な劣情を抑えられるオスなどいるはずもありません……！」"
translation = "「아가씨 같은 절세의 미소녀를 눈앞에 두고, 추악한 열정을 억누를 수 있는 수컷 따위 있을 리가 없습니다……!」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「嗚呼、なんと……なんという羨ま──いえ、この藤岡閃、お嬢様の護衛としてあるまじき失態……！」"
translation = "「아아, 이 얼마나…… 이 얼마나 부러─ 아니요, 이 후지오카 센, 아가씨의 호위로서 있을 수 없는 실책……!」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「ちょっと欲望漏れなかった？」"
translation = "「방금 욕망이 좀 새어 나오지 않았어?」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「多少強引にでもお嬢様に同行し、ぴったりと付き添い、寝食も共にするべきでした……！」"
translation = "「다소 강압적으로라도 아가씨와 동행하여, 딱 붙어서 시중들며 침식도 함께했어야 했습니다……!」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "（閃にお嬢様直属の護衛任せといて、だいじょぶ？\u3000むしろ、お嬢様の貞操がマズくない？）"
translation = "(센한테 아가씨 직속 호위를 맡겨둬도 괜찮은 거야? 오히려 아가씨의 정조가 위험하지 않아?)"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「向かう場所がフィーニスの塔でさえなければ……！\u3000私の予測の星眼がお嬢様の危機を見逃しはしなかったのに……！」"
translation = "「향하는 장소가 피니스의 탑만 아니었어도……! 제 예측의 성안이 아가씨의 위기를 놓치지 않았을 텐데……!」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「ヨソクノセーガン……あー、アレね」"
translation = "「예측의 성안…… 아─ 그거네」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「はい。私の異能の力──目視した情報を統合し、事前に訪れる危機を察知できるといったものです」"
translation = "「네. 제 이능의 힘── 목시한 정보를 통합하여 사전에 닥칠 위기를 감지할 수 있는 것입니다」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「未来が見えるなんて、めちゃチートじゃん」"
translation = "「미래가 보인다니 완전 치트잖아」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「誤解されがちなのですが、予知や予言とは異なります。思われているほど万能ではありませんよ」"
translation = "「오해받기 쉽습니다만, 예지나 예언과는 다릅니다. 생각하시는 것만큼 만능은 아니에요」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「それでも、つよつよ能力なのは間違いないじゃん？」"
translation = "「그래도 엄청 강한 능력인 건 확실하잖아?」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「お嬢様の傍でそれを発揮できてたら……あー、でもお嬢様をさらえちゃうようなヤバ強なヤツなら、予測されても何とかしちゃうんかな」"
translation = "「아가씨 곁에서 그걸 발휘할 수 있었다면…… 아─ 근데 아가씨를 납치할 정도로 엄청 강한 녀석이라면 예측당해도 어떻게든 해버리려나」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「くうう……許すまじ！\u3000許すまじ！\u3000許すまじ……！\u3000犯人を見つけたらどうしてくれましょう……フフフ」"
translation = "「크으으…… 용서 못 해! 용서 못 해! 용서 못 해……! 범인을 찾으면 어떻게 해줄까요…… 후후후」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「お嬢様がキズモノにでもなっていようものなら……私は自分を抑えられる自信がありませんよ。刺し違えてでも息の根を──ンフ、フフフ」"
translation = "「아가씨가 흠집이라도 나기라도 한다면…… 저는 저를 억제할 자신이 없어요. 동귀어진해서라도 숨통을── 음후, 후후후」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「閃、お嬢様好きすぎ……もはやラブだね」"
translation = "「센, 아가씨를 너무 좋아하네…… 이제는 러브네」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「ラ、ラ、ラブではありません！\u3000私とお嬢様はあくまで主従関係であり、四六時中お傍に仕えているが故、お嬢様の素晴らしさを目の当たりにし過ぎた結果であって」"
translation = "「러, 러, 러브가 아닙니다! 저와 아가씨는 어디까지나 주종관계이며, 24시간 곁에서 모시고 있기에 아가씨의 훌륭함을 너무 많이 목격한 결과일 뿐이지」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「尊敬を超越し、親愛にも似た感情を抱くのは至極当然なのです！\u3000事実、お嬢様のファンはメイド隊の中にも多く、私だけに限った話ではなくてですね！」"
translation = "「존경을 초월하여 친애와도 비슷한 감정을 품는 것은 지극히 당연한 것입니다! 사실 아가씨의 팬은 메이드대 안에도 많아서 저만의 이야기가 아니거든요!」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「ストップストップ。早口早口」"
translation = "「스톱 스톱. 말이 너무 빨라」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「ハッ！？\u3000いえ、その、こほん、この上なく尊敬し、お慕い申し上げてます、よ？」"
translation = "「핫!? 아니요, 그, 코흠, 더할 나위 없이 존경하고 연모하고 있습니다, 요?」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「あー、ね。そゆことよね、はいなはいな」"
translation = "「아─, 그래. 그런 거겠지, 그래그래」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「そ、そういう美鶴さんは随分と落ち着いているようですが、お嬢様が心配ではないのですか？」"
translation = "「그, 그렇게 말하는 미츠루 씨는 상당히 차분해 보입니다만, 아가씨가 걱정되지 않으신가요?」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「もちろん、心配してるよ。お嬢様がさらわれたのはヤバいと思ってるし、犯人は憎たらしいよ」"
translation = "「물론 걱정하고 있어. 아가씨가 납치된 건 큰일이라고 생각하고, 범인은 얄미워」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「でも、うち、あんまり感情を表に出せないみたいでさ。薄情モンっぽく見えてたら、ごめん」"
translation = "「근데 나, 감정을 겉으로 잘 못 내는 것 같아서 말야. 박정한 녀석처럼 보였다면 미안」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「いえ、謝る必要はありません。むしろ、冷静でいられるのは羨ましいくらいです」"
translation = "「아니요, 사과하실 필요 없습니다. 오히려 냉정함을 유지할 수 있는 건 부러울 정도예요」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「私なんて犯人を想像するだけで、<ruby>腸<rt>はらわた</rt></ruby>が煮えくり返りそうになるというのに……ヒッ、ヒヒヒ……！」"
translation = "「저 같은 건 범인을 상상하는 것만으로도 창자가 뒤틀릴 것 같은데…… 히, 히히히……!」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「おーい、閃。メイド姿の女の子がしちゃいけない顔になってるよー」"
translation = "「어─이, 센. 메이드 모습의 여자애가 지으면 안 되는 표정이 되어있어─」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「閃、落ち着きなさい。美鶴もあまり閃を刺激しないように」"
translation = "「센, 진정하거라. 미츠루도 너무 센을 자극하지 않도록 해라」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「あ、メイド長。お疲れさまです」"
translation = "「아, 메이드장님. 수고하십니다」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「お、お疲れさまです、メイド長。あの、今回の件──」"
translation = "「수, 수고하십니다, 메이드장님. 저기, 이번 건──」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「閃、お嬢様誘拐の件、あなたに一切の責はないわ。誰がお嬢様の護衛を務めていたとしても起きえた事態です」"
translation = "「센, 아가씨 유괴 건에 대해 네게는 일절 책임이 없다. 누가 아가씨의 호위를 맡았더라도 일어날 수 있었던 사태이다」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「ですが、お嬢様の安否が……！」"
translation = "「하지만 아가씨의 안위가……!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「私たちが仕える九浄家のお嬢様よ？\u3000無事の帰還を信じてなさい」"
translation = "「우리가 모시는 쿠죠 가의 아가씨이다. 무사 귀환을 믿고 있거라」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「は、はいっ！」"
translation = "「네, 넷!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「それと閃。さっき転んだのは大丈夫？」"
translation = "「그리고 센. 아까 넘어진 건 괜찮으냐?」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「ご存じでしたか。お恥ずかしい限りです」"
translation = "「알고 계셨습니까. 부끄러울 따름입니다」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「あれだけ派手な音と声を立てれば、屋敷中のメイドが気づいてるわ」"
translation = "「그렇게 요란한 소리와 비명을 질렀으니 저택 안의 메이드들이 다 알고 있다」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「今は痛くなくても、後でぶり返す場合もあるわ。念のため診てもらうように。勤労も結構だけど、自愛なさい」"
translation = "「지금은 아프지 않더라도 나중에 도질 수도 있다. 만약을 위해 진찰을 받도록 하거라. 근로도 좋지만 스스로를 아끼거라」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「……はい、ありがとうございます」"
translation = "「……네, 감사합니다」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「それと美鶴、ご当主様がお呼びよ。ついてきなさい」"
translation = "「그리고 미츠루, 당주님께서 부르신다. 따라오너라」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「えー」"
translation = "「에─」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「露骨に嫌そうな顔するんじゃないの。ご当主様が直々にあなたを指名したのだから、もっと胸を張りなさい」"
translation = "「노골적으로 싫은 표정 짓지 말거라. 당주님께서 직접 너를 지명하셨으니 좀 더 어깨를 펴거라」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「は～い……」"
translation = "「네에─……」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "（当主様の話ってなんだろ。特別ボーナスが出るとか、休みをくれるって話なら大歓迎なんだけど）"
translation = "(당주님 이야기가 뭘까. 특별 보너스가 나온다거나 휴가를 준다는 이야기라면 대환영인데)"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "（ピリついてるメイド長を見る限り、そういう話じゃなさそだね）"
translation = "(날이 서 있는 메이드장을 보아하니 그런 이야기는 아닐 것 같네)"

