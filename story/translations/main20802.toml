[[dialogue]]
speaker = "unk"
original = "第２話,追跡開始,B"
translation = "제2화, 추적 개시, B"

[[dialogue]]
speaker = "幼い梨緒"
original = "『うぅ……ぐす……ひくっ……』"
translation = "『우으…… 흑…… 히끅……』"

[[dialogue]]
speaker = "幼い梨緒"
original = "『どうして……？\u3000どうして私、何もできないの？\u3000算数も運動もできなくて……絵もぐちゃぐちゃだし、歌もダメで……』"
translation = "『어째서……? 어째서 난, 아무것도 못 하는 거야? 산수도 운동도 못 하고…… 그림도 엉망진창이고, 노래도 안 되고……』"

[[dialogue]]
speaker = "梨緒"
original = "（私は弱くて、何もできない人間だった）"
translation = "(나는 약하고, 아무것도 할 수 없는 인간이었다)"

[[dialogue]]
speaker = "梨緒"
original = "（勉強も運動も得意じゃなくて、誰にも勝てなくて、そんな自分が嫌で……いつも泣きながら、死に物狂いで努力していた）"
translation = "(공부도 운동도 잘하지 못하고, 누구에게도 이길 수 없어서, 그런 자신이 싫어서…… 언제나 울면서, 필사적으로 노력했어)"

[[dialogue]]
speaker = "幼い梨緒"
original = "『私が星騎士になれる……！？\u3000こんな私でも……？』"
translation = "『내가 성기사가 될 수 있다고……!? 이런 나라도……?』"

[[dialogue]]
speaker = "幼い梨緒"
original = "『星騎士になれば、私は──』"
translation = "『성기사가 되면, 나는──』"

[[dialogue]]
speaker = "梨緒"
original = "（そうだ。星騎士になれば、誰かの役に立てると思った）"
translation = "(그래. 성기사가 되면, 누군가에게 도움이 될 수 있을 거라 생각했어)"

[[dialogue]]
speaker = "梨緒"
original = "（私には何の取柄もないと思っていたけど、強い星力があることがわかった。だから、こんな私でも誰かを守れるのが嬉しくて──）"
translation = "(나에겐 아무런 장점도 없다고 생각했지만, 강한 성력이 있다는 걸 알게 됐어. 그래서, 이런 나라도 누군가를 지킬 수 있다는 게 기뻐서──)"

[[dialogue]]
speaker = "幼い梨緒"
original = "『負けない』"
translation = "『지지 않아』"

[[dialogue]]
speaker = "梨緒"
original = "（──！？）"
translation = "(──!?)"

[[dialogue]]
speaker = "幼い梨緒"
original = "『星騎士になれば、私は負けない。もうあんな惨めな思いをしなくていいんだ』"
translation = "『성기사가 되면, 나는 지지 않아. 이제 그런 비참한 기분은 느끼지 않아도 돼』"

[[dialogue]]
speaker = "幼い梨緒"
original = "『私はもう負けない。一番になるんだ……！』"
translation = "『나는 이제 지지 않아. 최고가 될 거야……!』"

[[dialogue]]
speaker = "梨緒"
original = "「夢……か」"
translation = "「꿈……인가」"

[[dialogue]]
speaker = "梨緒"
original = "「ベアトの昔の話を聞いたからか？\u3000随分前の夢を見たような……」"
translation = "「베아토의 옛날이야기를 들어서 그런가? 꽤 예전 꿈을 꾼 것 같군……」"

[[dialogue]]
speaker = "梨緒"
original = "「私は罪のない人々を守り、世界を救うために星騎士になった。そのはずだ。だが──」"
translation = "「나는 죄 없는 사람들을 지키고, 세계를 구하기 위해 성기사가 되었다. 분명 그랬을 터다. 하지만──」"

[[dialogue]]
speaker = "梨緒"
original = "「……いや、今はするべきことをしよう」"
translation = "「……아니, 지금은 해야 할 일을 하자」"

[[dialogue]]
speaker = "unk"
original = "梨緒は手早く身支度を整え、部屋を出た。"
translation = "리오는 재빨리 몸단장을 마치고 방을 나섰다."

[[dialogue]]
speaker = "unk"
original = "一番手としてルヴィネの尾行を始めた梨緒とナターシャ。"
translation = "첫 번째 주자로 루비네의 미행을 시작한 리오와 나타샤."

[[dialogue]]
speaker = "unk"
original = "リノに透明化と隠蔽の魔法をかけてもらい、視力強化の星術を使って、空からルヴィネを追跡する。"
translation = "리노에게 투명화와 은폐 마법을 부탁하고, 시력 강화 성술을 사용해 하늘에서 루비네를 추적한다."

[[dialogue]]
speaker = "ナターシャ"
original = "「あ、いたいた。ベアトに聞いてた通りの登校時間だ」"
translation = "「아, 찾았다. 베아토에게 들은 대로인 등교 시간이네.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「校舎に入っていったね。さぁて、ルヴィネが出てくるまでは退屈な時間かな」"
translation = "「교사로 들어갔어. 자아, 루비네가 나올 때까지는 지루한 시간이 되려나.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「監視は私がやるから、梨緒はもしもの時のために周囲に警戒を──」"
translation = "「감시는 내가 할 테니까, 리오는 만일의 사태를 대비해 주위를 경계해──」"

[[dialogue]]
speaker = "梨緒"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "ナターシャ"
original = "「おや、顔が暗いね。ベアトが戻ってきて安心したんじゃなかったの？」"
translation = "「어라, 표정이 어둡네. 베아토가 돌아와서 안심한 거 아니었어?」"

[[dialogue]]
speaker = "梨緒"
original = "「もちろん、ベアトが戻ってきたことは嬉しい。ベアトは私たちの仲間だ」"
translation = "「물론, 베아토가 돌아온 건 기쁘다. 베아토는 우리의 동료니까.」"

[[dialogue]]
speaker = "梨緒"
original = "「だが……」"
translation = "「하지만……」"

[[dialogue]]
speaker = "ナターシャ"
original = "「だが？」"
translation = "「하지만?」"

[[dialogue]]
speaker = "梨緒"
original = "「……ナターシャ、君は何のために戦っている？」"
translation = "「……나타샤, 너는 무엇을 위해 싸우지?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「おや、突然聞いてくるね」"
translation = "「어라, 갑자기 물어보네.」"

[[dialogue]]
speaker = "梨緒"
original = "「ベアトはデネブとアルタイル、両方の世界を救いたいと言っていた。ナターシャもそういった理由があるのか？」"
translation = "「베아토는 데네브와 알타이르, 양쪽 세계를 모두 구하고 싶다고 했다. 나타샤도 그런 이유가 있는 건가?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「あんまり考えたことないなぁ、そういうの。私は聖庭園のエージェントとして与えられた任務をこなすだけだし」"
translation = "「별로 생각해 본 적 없는데, 그런 거. 난 성정원의 에이전트로서 주어진 임무를 수행할 뿐이니까.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「つまりは聖庭園のため？\u3000でも聖庭園が三界を守るために動いているなら、世界のためってことになるのかな？」"
translation = "「즉 성정원을 위해서? 하지만 성정원이 삼계를 지키기 위해 움직이고 있다면, 세계를 위해서라는 게 되려나?」"

[[dialogue]]
speaker = "梨緒"
original = "「ならばもし、聖庭園が世界の覇権を握ろうとして、人間界や魔界に侵攻を企てたとしたらどうする？\u3000君は従うのか？」"
translation = "「그렇다면 만약, 성정원이 세계의 패권을 쥐려 하고, 인간계나 마계에 침공을 꾀한다면 어떻게 하겠나? 너는 따를 건가?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「どうだろうね？\u3000その可能性は考えてなかったから、すぐには答えられないや」"
translation = "「글쎄? 그 가능성은 생각 안 해봤으니까, 바로 대답은 못 하겠네.」"

[[dialogue]]
speaker = "unk"
original = "ナターシャは極星学園の校舎を遠くに眺めながら、いつもの薄笑いを浮かべながら返す。"
translation = "나타샤는 극성학원의 교사를 멀리 바라보며, 평소처럼 엷은 미소를 띠며 대답한다."

[[dialogue]]
speaker = "ナターシャ"
original = "「まぁ、今は普通に聖庭園の任務が優先だよ。このままじゃ本来の任務を遂行できないし、早くアルタイルに戻らないと」"
translation = "「뭐, 지금은 평범하게 성정원의 임무가 우선이야. 이대로는 원래 임무를 수행할 수 없으니까, 빨리 알타이르로 돌아가야지.」"

[[dialogue]]
speaker = "梨緒"
original = "「本来の任務？\u3000魔王の監視が君の任務じゃなかったのか？」"
translation = "「원래 임무? 마왕의 감시가 네 임무가 아니었나?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「そうだよ。だからこのままは困るんだよね」"
translation = "「맞아. 그러니까 이대로는 곤란하거든.」"

[[dialogue]]
speaker = "梨緒"
original = "「……？」"
translation = "「……?」"

[[dialogue]]
speaker = "unk"
original = "梨緒はナターシャの横顔を覗くが、相変わらず彼女の考えは読み取れない。"
translation = "리오는 나타샤의 옆얼굴을 살피지만, 여전히 그녀의 생각은 읽어낼 수 없다."

[[dialogue]]
speaker = "unk"
original = "ナターシャとは短くない付き合いになるが、未だに分からない部分も多い。"
translation = "나타샤와는 짧지 않은 사이지만, 아직도 알 수 없는 부분이 많다."

[[dialogue]]
speaker = "ナターシャ"
original = "「おや？」"
translation = "「어라?」"

[[dialogue]]
speaker = "unk"
original = "ナターシャの視線の先。そろそろ午前の授業が始まるというのに、校舎からルヴィネが出てきた。"
translation = "나타샤의 시선 끝. 슬슬 오전 수업이 시작될 시간인데도, 교사에서 루비네가 나왔다."

[[dialogue]]
speaker = "unk"
original = "ルヴィネはそのまま校門をくぐり、極星学園の敷地を出ていった。"
translation = "루비네는 그대로 교문을 지나 극성학원 부지를 나갔다."

[[dialogue]]
speaker = "unk"
original = "梨緒とナターシャが空から追いかけると──"
translation = "리와 나타샤가 하늘에서 뒤쫓자──"

[[dialogue]]
speaker = "ルヴィネ"
original = "「新作コスメ、いかがですか？\u3000新色も取り揃えております」"
translation = "「신상 코스메틱, 어떠신가요? 신색상도 갖추고 있습니다.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ベアトから聞いてはいたけど、ほんとに授業出ずにバイトしてるんだ。授業受けなくていいくらい賢いらしいけど……星徒会長としてアリなのかな？」"
translation = "「베아토에게 듣긴 했지만, 정말 수업 안 듣고 알바하고 있네. 수업 안 들어도 될 정도로 똑똑하다곤 하지만…… 성도회장으로서 괜찮은 걸까?」"

[[dialogue]]
speaker = "梨緒"
original = "「選挙管理委員会としては問い質したいところだな……」"
translation = "「선거관리위원회로서는 따져 묻고 싶은 부분이군……」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「お客様にはこちらの色が合うかと思います」"
translation = "「손님께는 이 색상이 어울릴 것 같습니다.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「試しにどうでしょう？\u3000……どうぞ、鏡をご覧ください」"
translation = "「시험 삼아 어떠신가요? ……자, 거울을 봐주세요.」"

[[dialogue]]
speaker = "梨緒"
original = "「的確だな。……接客にしてはいささか愛想が足りない気がするが」"
translation = "「정확하군. ……접객치고는 다소 싹싹함이 부족한 기분이 들지만.」"

[[dialogue]]
speaker = "梨緒"
original = "「しかし何のためだ？\u3000まさか彼女の立場で金銭のためとは思えないが……親しみやすさをアピールして人心掌握するためか？」"
translation = "「하지만 무엇을 위해서지? 설마 그녀의 입장에서 돈 때문이라고는 생각되지 않는데…… 친근함을 어필해서 인심을 장악하기 위해서인가?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「単なる趣味かもよ？」"
translation = "「단순한 취미일지도 몰라.」"

[[dialogue]]
speaker = "梨緒"
original = "「だとすれば問題だろう。星徒会長が授業に出席せずに趣味に興じているんだから」"
translation = "「그렇다면 문제겠지. 성도회장이 수업에 출석하지 않고 취미에 빠져 있는 거니까.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ま、当分はルヴィネがバイトしてるところを眺めることになるね。ちょっと暇になりそうだ」"
translation = "「뭐, 당분간은 루비네가 알바하는 걸 구경하게 되겠네. 좀 심심해지겠어.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「さっき何のために戦うって聞いてきたけどさ、そう言う梨緒はどうなの？\u3000せっかくだから聞かせてよ」"
translation = "「아까 무엇을 위해 싸우냐고 물어봤잖아, 그렇게 말하는 리오는 어때? 이왕 이렇게 된 거 들려줘 봐.」"

[[dialogue]]
speaker = "梨緒"
original = "「……意外だな。君がそんなことを言うなんて」"
translation = "「……의외군. 네가 그런 말을 하다니.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「選挙管理委員会に入ってそれなりに経ったのに、梨緒とじっくり話す機会がなかったからね」"
translation = "「선거관리위원회에 들어오고 꽤 지났는데, 리오랑 진득하게 이야기할 기회가 없었으니까.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「それにルヴィネのバイトまだ終わりそうにないし、暇潰しがてらにいいかなって。空中だから誰かに聞かれる心配もないし」"
translation = "「게다가 루비네 알바도 아직 안 끝날 것 같고, 심심풀이 삼아 괜찮잖아. 공중이라 누가 들을 걱정도 없고.」"

[[dialogue]]
speaker = "梨緒"
original = "「私の話は暇潰しか……」"
translation = "「내 이야기가 심심풀이인가……」"

[[dialogue]]
speaker = "梨緒"
original = "「だが確かに、話をするには丁度いいか」"
translation = "「하지만 확실히, 이야기를 나누기엔 적당한가.」"

