[[dialogue]]
speaker = "unk"
original = "第２話,キサナの住む世界,P"
translation = "제2화, 키사나가 사는 세계, P"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「わっかんねえ……いったいどれ買ったらいいんだよ……」"
translation = "「모르겠네…… 대체 어느 걸 사야 하는 거야……」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「おいガキ、どれが欲しい──ってダメか……。喋れる状態じゃねえわな……」"
translation = "「야 꼬맹이, 어느 게 갖고 싶── 어 안 되나…… 말할 수 있는 상태가 아니지……」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「あーもう面倒くせえ。適当にパクっていきゃどれか当たりがあんだろ。そうと決まりゃあ、この辺りのもんごっそりと──」"
translation = "「아- 이제 귀찮아. 적당히 훔쳐 가면 하나는 맞겠지. 그렇게 정했으면 이 근처 거 몽땅──」"

[[dialogue]]
speaker = "unk"
original = "何してるんだ！？"
translation = "뭐 하는 거야!?"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ヤベっ、また魔王かよっ。よせよせ騒ぎを大きくすんなっ。盗めるもんも盗めなくなっちまうだろうがっ」"
translation = "「시발, 또 마왕이냐. 야야 소란 피우지 마. 훔칠 수 있는 것도 못 훔치게 되잖아」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「こっちにも事情があんだよ。このガキが昨日熱出してぶっ倒れちまって……」"
translation = "「이쪽도 사정이 있다고. 이 꼬맹이가 어제 열이 나서 쓰러져 버려서……」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「だけどあの家にゃ薬もひとつもねえからよ。仕方なく探しに来てやったんだ」"
translation = "「근데 그 집엔 약도 하나도 없거든. 어쩔 수 없이 찾으러 와 준 거라고」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「けどアタシ、字ぃ読めねえし。どれを飲ませりゃいいかわかんねえし。つかそもそも金もねえし」"
translation = "「근데 나, 글씨 못 읽거든. 뭘 먹여야 할지 모르겠고. 그보다 애초에 돈도 없고」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ガキに聞こうにもこのザマだ。ま、フラフラんとこ無理やり連れ出して来ちまったからな……」"
translation = "「꼬맹이한테 물어보려 해도 이 모양이지. 뭐, 비틀거리는 놈 억지로 끌고 오긴 했지만……」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「つーわけでいいだろ薬の１つや２つパクったって。こんなにたくさん並んでんだからケチケチしてんじゃねえよ」"
translation = "「그러니 약 한두 개쯤 훔쳐도 되잖아. 이렇게나 많이 늘어서 있는데 째째하게 굴지 마」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「それともなんだ？\u3000金も身よりもねえヤツは死ねってか？\u3000ハッ、まぁそれが世の摂理ってもん──」"
translation = "「아니면 뭐야? 돈도 연고도 없는 놈은 죽으라 이건가? 핫, 뭐 그게 세상의 섭리──」"

[[dialogue]]
speaker = "unk"
original = "事情はわかった。ついてきてくれ"
translation = "사정은 알았어. 따라와 줘."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「は？\u3000誰が敵についていくと思っ──あ、おいっ。ガキから手ぇ離せっ。待て、どこに連れてくつもりだ、テメエ……！」"
translation = "「하? 누가 적을 따라갈 것 같── 아, 야. 꼬맹이한테서 손 떼. 기다려, 어디로 데려갈 셈이냐, 네놈……!」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「んだ、ここ……オマエん家か？\u3000おいおい、いいのかよ。アタシは敵だぜ？\u3000家に案内するかふつー」"
translation = "「뭐야 여긴…… 네 집이냐? 어이 어이, 괜찮은 거냐고. 난 적이라고? 집에 안내하는 게 보통이냐」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「あっ、おい。話聞けよ。ちょっ、ガキに何飲ませてやがる……！」"
translation = "「앗, 야. 말 좀 들어. 잠깐, 꼬맹이한테 뭘 먹이는 거야……!」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「このタオルを濡らして絞れ……？\u3000ああ、くそ。わーったよ。やりゃいいんだろ、やりゃあ」"
translation = "「이 수건을 적셔서 짜라고……? 아아, 젠장. 알았다고. 하면 되잖아, 하면」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ふぅ……あんガキ。また人の尻尾握り締めやがって……。おかげで自慢の毛並みが台無しだっての」"
translation = "「후우…… 저 꼬맹이. 또 남의 꼬리 꽉 쥐고 자빠졌네……. 덕분에 자랑스러운 털결이 엉망진창이라고」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「あ？\u3000ガキならオマエん部屋でぐっすりだよ。オマエの飲ませた薬が効いて、熱もまぁ……下がったみてえだな」"
translation = "「아? 꼬맹이라면 네 방에서 푹 자고 있어. 네가 먹인 약이 들어서 열도 뭐…… 내린 모양이군」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「恩に着せようってか？\u3000魂胆が丸見えだぜ」"
translation = "「생색이라도 내겠다는 거냐? 꿍꿍이가 뻔히 보인다고」"

[[dialogue]]
speaker = "unk"
original = "そんなつもりはないよ"
translation = "그럴 생각은 없어."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「善人ぶんなっつってんだろ。ま……今回のことは一応感謝しておいてやるけどよ」"
translation = "「착한 척하지 말라고 했잖아. 뭐…… 이번 일은 일단 감사해 주지」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「だけど借りにはしねえ。おい、カード持って来いよ。ポーカーしようぜ。さっきの薬代を賭けて勝負だ」"
translation = "「하지만 빚으로 두진 않겠다. 야, 카드 가져와. 포커 하자고. 아까 그 약값을 걸고 승부다」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「アタシが負けたら……そうだな。大人しく捕まってやるよ。おら、わかったらとっとと持って来やがれ」"
translation = "「내가 지면…… 그래. 얌전히 잡혀 주지. 자, 알았으면 후딱 가져오라고」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「スリーカード。アタシの勝ちだな。これで貸し借りはなしだ」"
translation = "「트리플. 내 승리네. 이걸로 빚은 없는 거다」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「よっしゃ、このままステーキも賭けてもう一勝負しようぜ。いいだろ、な？\u3000オマエも病人に肉食わせてえだろ？」"
translation = "「좋았어, 이대로 스테이크도 걸고 한 판 더 하자고. 괜찮지, 응? 너도 환자한테 고기 먹이고 싶잖아?」"

[[dialogue]]
speaker = "unk"
original = "君はどうしてあの子の世話を？"
translation = "너는 어째서 그 아이를 돌보는 거야?"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「あぁ？\u3000前に言ったろ。宿代の代わりだよ。オマエみてえに善人ぶりてえわけじゃねえ」"
translation = "「아아? 전에 말했잖아. 숙박비 대신이라고. 너처럼 착한 척하고 싶은 게 아냐」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「魔界のセントリア地方の西部──アタシの住んでたところじゃ親のいないガキなんてわんさかいたからな」"
translation = "「마계의 센트리아 지방 서부── 내가 살던 곳에선 부모 없는 꼬맹이 같은 건 널리고 널렸으니까」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「アタシの場合はどっかのチンピラと娼婦がガキ作って……捨てたのか、死んだのか。親の顔も見た覚えがねえ。ま、見たくもねえがな」"
translation = "「내 경우에는 어디 양아치랑 창녀가 애를 만들어서…… 버린 건지, 죽은 건지. 부모 얼굴도 본 기억이 없어. 뭐, 보고 싶지도 않지만」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「あのガキも普段から、邪魔だとか、消えろだとか親に言われてたらしいな。実際、家出してもケーサツにすら届けやしねえ」"
translation = "「저 꼬맹이도 평소에 방해된다느니, 꺼지라느니 부모한테 들었던 모양이더군. 실제로 가출해도 경찰에 신고조차 안 하니 말이야」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「優しい世界で生きてる正義の味方にゃわかんねえだろうけどな。世界には確かにあるんだよ。そんな暗闇が」"
translation = "「다정한 세계에서 살고 있는 정의의 사자는 모르겠지만 말이야. 세계에는 분명히 존재한다고. 그런 어둠이」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「だから、ちょっと昔を思い出して懐かしくなっただけだ」"
translation = "「그래서 그냥 옛날 생각이 나서 그리워졌을 뿐이야」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ああいうガキに最低限テメエで生きる術を教えてやんのがアタシらんとこの暗黙のなんちゃらって感じだったしよ。宿借りの恩もあるからな」"
translation = "「그런 꼬맹이한테 최소한 스스로 살아가는 법을 가르쳐 주는 게 우리 쪽의 암묵적인 어쩌구 같은 느낌이었고 말이야. 숙박의 은혜도 있으니까」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「この街にゃ飲める水も、栄養のある食いもんも、雨風しのげる場所も探せばどこにでもある。泥水を啜る必要も腐った飯を漁る必要もねえ」"
translation = "「이 거리엔 마실 물도, 영양가 있는 음식도, 비바람 피할 장소도 찾으면 어디에나 있어. 흙탕물을 마실 필요도 썩은 밥을 뒤질 필요도 없지」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「生きようと思えばいくらでもテメエ１人で生きられる。いいや、生きなきゃなんねえ。自分以外のヤツは信用できねえからな」"
translation = "「살려고 마음먹으면 얼마든지 너 혼자 살 수 있어. 아니, 살아야만 해. 자신 이외의 놈은 신용할 수 없으니까 말이야」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ま、こんな小綺麗なとこに住んでる魔王には関係ねえ話だ。それよりさっさとカード配れよ。こっちは腹ぺこなんだ」"
translation = "「뭐, 이런 깔끔한 곳에 사는 마왕이랑은 관계없는 이야기군. 그것보다 어서 카드나 돌려. 이쪽은 배고프다고」"

[[dialogue]]
speaker = "unk"
original = "なら俺が勝ったら──"
translation = "그럼 내가 이기면──"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「あぁ？\u3000アイツを施設に？\u3000チッ、またそれかよ。アタシの話聞いてなかったのか？」"
translation = "「아아? 그 녀석을 시설에? 칫, 또 그거냐. 내 이야기 안 듣고 있었냐?」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「んな胡散臭え施設になんざ連れてくつもりはねえ。どうせ保護するとか言って面倒見ねえんだろ」"
translation = "「그런 수상쩍은 시설 같은 곳에 데려갈 생각은 없어. 어차피 보호한다 어쩐다 하면서 안 돌봐 줄 거잖아」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「アタシらみたいなのはな、どこまで行ってもテメエで身を守るしかねえんだ」"
translation = "「우리 같은 건 말이지, 어디까지 가든 스스로 몸을 지킬 수밖에 없다고」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ま……どうしても連れて行きたいってんならアタシに勝ってみろよ。それでこそ勝負ってもんだ」"
translation = "「뭐…… 꼭 데려가고 싶다면 나를 이겨 보라고. 그래야 승부라는 거지」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ただアタシに勝てると思うなよ？\u3000こちとらカードで命張ったこともあるんだ。簡単には負けねえぜ？」"
translation = "「다만 나를 이길 수 있을 거라 생각하지 마라? 이 몸은 카드로 목숨을 건 적도 있다고. 쉽게 지진 않을 거다」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「フルハウス。またアタシの勝ちだな」"
translation = "「풀하우스. 또 내 승리네」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「……あ？\u3000もう一回？\u3000次は何賭けんだよ、つか何回やんだよ。確かに一回勝負とは言わなかったけどよ！」"
translation = "「……아? 한 번 더? 다음엔 뭘 걸 건데, 그보다 몇 번이나 할 거야. 분명히 단판 승부라고는 안 했지만 말이야!」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「素っ裸同然にされてんのにまだやんのか？\u3000おい、やめろ。パンツは賭けんな。それは要らねえから剥いでねえんだよ！」"
translation = "「홀딱 벗겨지기 직전인데 아직도 하겠다고? 야, 하지 마. 팬티는 걸지 마. 그건 필요 없으니까 안 벗긴 거라고!」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「はぁ……意味わからねえ。どうしてそこまであのガキを保護したいんだか……。テメエにとっちゃ赤の他人だろうがよ」"
translation = "「하아…… 의미를 모르겠군. 어째서 그렇게까지 저 꼬맹이를 보호하고 싶은 건지…… 네놈한테는 생판 남이잖아」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「そりゃ確かに施設ってのがオマエの言う通りの場所だったとしたらどれだけ──……」"
translation = "「그야 확실히 시설이라는 게 네가 말한 대로의 장소였다면 얼마나──……」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「なんでもねえよ。それより賭けは終わりだ。さっさと負けた分のステーキ払いやがれ」"
translation = "「아무것도 아냐. 그보다 내기는 끝이다. 어서 진 만큼의 스테이크나 내놔」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「いいから早く買って来やがれ。肉食うまで帰るに帰れねえじゃねえか！」"
translation = "「됐으니까 빨리 사 오라고. 고기 먹기 전까지는 돌아가고 싶어도 못 돌아가잖아!」"

