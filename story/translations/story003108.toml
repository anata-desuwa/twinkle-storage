[[dialogue]]
speaker = "unk"
original = "その後、リーリア以外のメンバーも散々苦労はしたが、リーリアから七彩流羽根突き術の攻略法を教わり、なんとか獅子舞から１勝ずつもぎ取ることに成功した。"
translation = "그 후 리리아 이외의 멤버들도 꽤 고생은 했지만, 리리아에게 칠채류 하네츠키술 공략법을 배워서 어떻게든 사자탈에게 1승씩 따내는 데 성공했다."

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「――なんとか全員勝てたぁ～！」"
translation = "「――어떻게든 전원 이겼다~!」"

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「ふん……とりあえずお前たち全員が、吾輩の試練を乗り越えたことを褒めてやろう」"
translation = "「흥…… 일단 너희 전원이 이 몸의 시련을 극복한 것을 칭찬해주마.」"

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「ただ言っておくが、散々戦った上で１勝を落としただけであって、九分九厘勝っていたのは吾輩だということを忘れるな！」"
translation = "「다만 말해두겠는데, 실컷 싸운 끝에 1승을 내준 것뿐이지 9할 9푼 이기고 있었던 건 이 몸이라는 사실을 잊지 마라!」"

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「吾輩は断じて負けていない！\u3000そこは認めん！」"
translation = "「이 몸은 결코 지지 않았다! 그 점은 인정 못 해!」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「あ～、はいはい。負け惜しみ乙～」"
translation = "「아~ 예예. 패배자의 변명 수고~」"

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「お前にも１勝落としただけだ！\u3000調子に乗るなよ！？」"
translation = "「너한테도 1승 내줬을 뿐이다! 우쭐대지 마라!?」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「というか、ボクはそもそも勝つ必要あったのかな！？\u3000すっげ～、めんどくさかったんだけど！？」"
translation = "「그보다 난 애초에 이길 필요가 있었나!? 더럽게 귀찮았는데!?」"

[[dialogue]]
speaker = "unk"
original = "ふと、そんな中でアナが気づく。"
translation = "문득 그런 와중에 아나가 알아차린다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「おや？\u3000獅子舞さん、晴れ着フォームに何かしましたか？\u3000羽根突きをする前よりも、星力が強くなっているような……」"
translation = "「어라? 사자탈 씨, 설빔 폼에 무슨 짓을 했나요? 하네츠키를 하기 전보다 성력이 강해진 것 같은데……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「確かに。言われてみれば、私の晴れ着フォームもパワーアップしている感じがします」"
translation = "「확실히. 듣고 보니 제 설빔 폼도 파워업한 느낌이 들어요.」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あたしのもだし！」"
translation = "「내 것도라구!!」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「私のも。これってもしかして、必死に羽根突きの練習をしたから……？」"
translation = "「내 것도. 이거 혹시 필사적으로 하네츠키 연습을 해서……?」"

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「やっと気づいたか。晴れ着フォームに宿っているのは『お正月の力』。故に、お正月の羽根突きは、その力を洗練させる効率の良い修業となる」"
translation = "「이제야 눈치챘나. 설빔 폼에 깃들어 있는 것은 『정월의 힘』. 고로 정월의 하네츠키는 그 힘을 세련되게 만드는 효율 좋은 수행이 된다.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あら～、つまり獅子舞さんは、最初から私たちの晴れ着フォームを強くする為に、姿を現してくれてたってことね～♪」"
translation = "「어머~ 즉 사자탈 씨는 처음부터 우리 설빔 폼을 강하게 만들기 위해 모습을 나타내줬다는 거네~♪」"

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「ふん、勘違いするな。せっかく吾輩が戦う力を与えてやっているというのに、それを上手く使いこなせないのでは、崇高な晴れ着に失礼であるからな」"
translation = "「흥, 착각하지 마라. 기껏 이 몸이 싸울 힘을 주고 있는데 그걸 제대로 다루지 못해서야 숭고한 설빔에 실례니까 말이다.」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「ボクは晴れ着関係ないのに、勝つまでやらされたんだけど……？」"
translation = "「난 설빔이랑 상관도 없는데 이길 때까지 시켰으면서……?」"

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「だが、少しは鬱屈としていたストレスの解消になったのではないか？\u3000檻の中にばかり居ては、縁起が良くならないからな」"
translation = "「하지만 조금은 억눌려 있던 스트레스 해소가 되지 않았느냐? 우리 안에만 있어서는 운수가 좋아지지 않으니 말이다.」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「はんっ！\u3000余計なお世話……って、おや？」"
translation = "「한! 쓸데없는 참견은…… 어라?」"

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「ふっ……お前も気づいたようだな。晴れ着の力の代わりに、お前にもちゃんと褒美を用意してやったぞ」"
translation = "「훗…… 너도 눈치챈 모양이군. 설빔의 힘 대신 너에게도 제대로 포상을 준비해줬다.」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「おいこれ……まさかお前、ボクを本当に、シズハちゃんの使い魔みたいにしたのか！？」"
translation = "「어이 이거…… 설마 너, 나를 정말로 시즈하짱의 사역마처럼 만든 거냐!?」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「え？\u3000それってどういうこと……？」"
translation = "「에? 그게 무슨 소리야……?」"

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「ディーラックを檻に封じ込めていた魔法を変化させて、シズハの意に背くことはできない枷の術式にしたのだ」"
translation = "「디럭쿠를 우리에 가두고 있던 마법을 변화시켜 시즈하의 뜻을 거스를 수 없는 굴레의 술식으로 만들었다.」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「つまり……ディーちゃんは悪さすることはできないけど、檻の外で自由に行動できるようになったってこと！？\u3000すごい！\u3000やったね、ディーちゃん♪」"
translation = "「그 말은…… 디짱은 나쁜 짓은 못 하지만 우리 밖에서 자유롭게 행동할 수 있게 됐다는 거야!? 대단해! 잘됐다, 디짱♪」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「全然嬉しくないんだけど！？」"
translation = "「전혀 안 기쁘거든!?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あら～、よかったわね～♪\u3000これでまた、前みたいにシズハちゃんと一緒に過ごせるわね～」"
translation = "「어머~ 잘됐네~♪ 이걸로 다시 예전처럼 시즈하짱이랑 같이 지낼 수 있겠어~」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「全然よくない！\u3000その親戚の子供を見るみたいな、生温かい目線をヤメロ！！」"
translation = "「전혀 안 좋아! 그 친척 꼬맹이 보는 듯한 미지근한 눈빛 치워!!」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「ディーちゃん、今日は部屋に帰ったら、久しぶりに一緒にお風呂入ったり、寝たりしようね♪」"
translation = "「디짱, 오늘 방에 돌아가면 오랜만에 같이 목욕도 하고 잠도 자자♪」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「ちょっ、シズハちゃん！？\u3000なにほざいちゃってんのサ！？」"
translation = "「잠깐, 시즈하짱!? 무슨 소릴 지껄이는 거얏!?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あらあら、うふふっ♪\u3000前はそんなに仲良く過ごしてたのね～」"
translation = "「어머어머, 우후훗♪ 전에는 그렇게 사이좋게 지냈었구나~」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「ちちち違うっ！\u3000正体明かすまでは、シズハちゃんを信用させる為、仕方なく付き合っていただけサ！」"
translation = "「다, 다, 다르다구! 정체를 밝히기 전까지는 시즈하짱을 안심시키려고 어쩔 수 없이 맞춰준 것뿐이얏!」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「わっ、すごい♪\u3000ディーちゃんがそんな風に照れて動揺してるの、初めて見た！」"
translation = "「와, 대단해♪ 디짱이 그렇게 부끄러워하며 당황하는 거 처음 봐!」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「照れてないのサ！\u3000あ～もう、なんだこれは！\u3000ボクだけが貧乏くじを引かされるのは違うんじゃないかな！！」"
translation = "「부끄러워하는 거 아냐! 아~ 정말, 뭐야 이게! 나만 꽝을 뽑는 건 좀 아니지 않나!!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ふふっ♪\u3000晴れ着の起動も上手く行ったし、みんなの絆も深まったみたいで、ウィンウィンですね☆」"
translation = "「후훗♪ 설빔 기동도 잘 됐고 모두의 유대도 깊어진 것 같아서 윈윈이네요☆」"

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「……渋谷リーリア」"
translation = "「……시부야 리리아.」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「あっ、獅子舞さん、どうかしましたか？」"
translation = "「앗, 사자탈 씨, 왜 그러세요?」"

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「今回、晴れ着の力を与えることは認めたが、吾輩はまだ、お前のことを全て認めたわけではない！」"
translation = "「이번에 설빔의 힘을 주는 것은 인정했지만, 이 몸은 아직 너를 전부 인정한 것은 아니다!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「はいぃ！？\u3000まだダメなんですかぁ！？」"
translation = "「하아!? 아직 안 되는 건가요!?」"

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「当たり前だ。七彩流羽根突き術の<ruby>漆<rt>しち</rt></ruby>ノ型を使ってみせたからと言って、調子に乗るな。吾輩はたかだか１回、隙を突かれただけだ。故に――」"
translation = "「당연하다. 칠채류 하네츠키술 제7형을 써 보였다고 해서 우쭐대지 마라. 이 몸은 고작 한 번 빈틈을 찔렸을 뿐이다. 고로――」"

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「晴れ着の力をもっと磨き、いつか吾輩に敗北を認めさせてみせるがいい！\u3000リクリエから人間界を守れるくらい、強くなるのであろう？」"
translation = "「설빔의 힘을 더 연마해서 언젠가 이 몸에게 패배를 인정하게 해 보아라! 리크리에로부터 인간계를 지킬 수 있을 정도로 강해질 것 아니냐?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「……！\u3000はい。この可愛い晴れ着の力、もっと綺麗な色に磨いて、見せに来ます！」"
translation = "「……! 네. 이 귀여운 설빔의 힘, 더 예쁜 색으로 닦아서 보여주러 올게요!」"

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「ふん、お前の色がこれからどう変わるか、せいぜい見守ってやるとしよう」"
translation = "「흥, 네 색이 앞으로 어떻게 변할지 기껏 지켜봐 주도록 하지.」"

[[dialogue]]
speaker = "unk"
original = "その場でカチンと獅子舞が歯を鳴らすと、結界は消え、周りには参拝客の姿と喧騒が戻ってくる。"
translation = "그 자리에서 사자탈이 딱 하고 이빨을 울리자 결계가 사라지고 주변에는 참배객들의 모습과 소란함이 돌아온다."

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「では、縁起良き年を。晴れ着の星騎士たちよ」"
translation = "「그럼, 운수 좋은 한 해를. 설빔의 성기사들이여.」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「獅子舞さん、ありがとうございました！」"
translation = "「사자탈 씨, 감사합니다!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ご指導、感謝します」"
translation = "「지도해주셔서 감사합니다.」"

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「……ふん」"
translation = "「……흥.」"

[[dialogue]]
speaker = "unk"
original = "どこか優しく鼻を鳴らして、１度頷くように頭を振ると、背中を向けて去って行く獅子舞。"
translation = "어딘가 다정하게 콧소리를 내고 한 번 고개를 끄덕이듯 흔들더니 등을 돌려 떠나가는 사자탈."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「思わぬサプライズだったけど、これからどうしましょうか？」"
translation = "「생각지도 못한 서프라이즈였는데 이제 어떡할까?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「そりゃあ、初詣に来たんですから、本堂までお参りして行かないと！\u3000今年のお願いもちゃんと祈願したいですし♪」"
translation = "「그야 하츠모데를 왔으니까 본당까지 가서 참배해야죠! 올해의 소원도 제대로 빌고 싶고요♪」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「そうですね。改めて、みんなで向かいましょうか」"
translation = "「그렇네요. 다시 한번 다 같이 향할까요.」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「羽根突きで仲良くなったから、前よりマジカル楽しくなりそう☆」"
translation = "「하네츠키로 친해졌으니까 전보다 매지컬하게 즐거워질 것 같아☆」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「舞亜さん、初詣が終わったら、練習中に言っていた浅草にある和菓子のお店を教えてもらっても？」"
translation = "「마이아 씨, 하츠모데가 끝나면 연습 중에 말씀하셨던 아사쿠사에 있는 화과자 가게를 알려주실 수 있나요?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「うん、いいよ。アナさん、一緒に行こっか」"
translation = "「응, 좋아. 아나 씨, 같이 가자.」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あっ、それ、あたしも行きた～い♪\u3000リーリアも行こう！\u3000まだまだ話したいこと沢山あってウズウズしてるし！」"
translation = "「앗, 그거 나도 가고 싶어~♪ 리리아도 가자! 아직 하고 싶은 말이 잔뜩 있어서 근질근질하다구!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「行く行く～♪\u3000ソフィアちゃんともまだ、あんまり話せてなかったしね☆」"
translation = "「갈래 갈래~♪ 소피아짱이랑도 아직 별로 얘기 못 했었으니까☆」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「そうでしたね。シズハもいかがですか？」"
translation = "「그랬었죠. 시즈하도 어때요?」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「はいっ♪\u3000私もよければ、是非！\u3000ディーちゃんも一緒に行こう！」"
translation = "「네♪ 저도 괜찮다면 꼭! 디짱도 같이 가자!」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「え～？\u3000ボクもう、家に帰って休みたいんだけど～」"
translation = "「에~? 난 이제 집에 가서 쉬고 싶은데~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「うふふっ♪\u3000私も混ぜてもらっていいかしら～？」"
translation = "「우후훗♪ 나도 끼워줘도 될까~?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「もちろんです！\u3000今日はみんなで楽しく行っちゃいましょ～♪」"
translation = "「물론이죠! 오늘은 다 같이 즐겁게 가버리자고요~♪」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「そうと決まったらまずは初詣に、いけいけゴーゴー♪」"
translation = "「그렇게 정해졌으면 우선 하츠모데로, 고고 씽~♪」"

[[dialogue]]
speaker = "unk"
original = "こうして新たなお正月を迎え、星騎士たちは晴れ着の力と共に、新たな縁も結んでゆくのだった。"
translation = "이렇게 새로운 정월을 맞이하여 성기사들은 설빔의 힘과 함께 새로운 인연도 맺어가는 것이었다."

