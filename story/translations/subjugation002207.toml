[[dialogue]]
speaker = "unk"
original = "新フォームに変身したジュエリーと、幻影へと変装したミネコの戦い。その勝敗の行方は――"
translation = "새로운 폼으로 변신한 주얼리와 환영으로 변장한 미네코의 싸움. 그 승패의 행방은──"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「――チェックメイトだ。大怪盗フランボウ」"
translation = "「──체크메이트다. 대괴도 플랑보.」"

[[dialogue]]
speaker = "ミネコ"
original = "「かはっ！？\u3000くっ……！」"
translation = "「커헉!? 윽……!」"

[[dialogue]]
speaker = "unk"
original = "ジュエリーの武器である宝石の弾丸に撃ち抜かれ、怪盗の幻影が消失する。"
translation = "주얼리의 무기인 보석 탄환에 꿰뚫려 괴도의 환영이 소멸한다."

[[dialogue]]
speaker = "unk"
original = "そこには、認識阻害の効果が剥がれたミネコの姿があった。"
translation = "그곳에는 인식 저해 효과가 벗겨진 미네코의 모습이 있었다."

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「それが、キミの本当の怪盗姿か。ミネコ・フランボワーズ」"
translation = "「그게 네 진짜 괴도 모습인가. 미네코 플랑보와즈.」"

[[dialogue]]
speaker = "ミネコ"
original = "「どうなってるの……！？\u3000私の攻撃が全部、無効化されるなんて……！」"
translation = "「어떻게 된 거야……!? 내 공격이 전부 무효화되다니……!」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「簡単なことだよ。キミの動きを事前に予測して――」"
translation = "「간단한 일이야. 네 움직임을 사전에 예측해서──」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「技が発動する前に、全て封じただけさ」"
translation = "「기술이 발동하기 전에 전부 봉쇄했을 뿐이지.」"

[[dialogue]]
speaker = "ミネコ"
original = "「そんなことが……！？」"
translation = "「그런 일이……!?」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「今までの私だったら無理だった。私は元々、戦闘があまり得意じゃない。戦いながらでは、思考速度が追いついて来なかったんだ」"
translation = "「지금까지의 나라면 불가능했어. 나는 원래 전투가 별로 특기가 아니니까. 싸우면서는 사고 속도가 따라오지 못했거든.」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「しかし、このエクリプスフォームは、歴代の選星者『名探偵』が持っていた能力を引き出すことができる。ブラウン神父が持っていた『思考力』にも、な」"
translation = "「하지만 이 에클립스 폼은 역대 선성자 『명탐정』이 가지고 있던 능력을 끌어낼 수 있어. 브라운 신부가 가지고 있던 『사고력』까지도 말이야.」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「明解に換言するならば、私の『思考力』が以前とは比べ物にならない程に上がったんだよ。それによって、戦いながらでも冷静に思考できるようになった」"
translation = "「명쾌하게 환언하자면 나의 『사고력』이 이전과는 비교도 안 될 정도로 올라간 거야. 그에 따라 싸우면서도 냉정하게 사고할 수 있게 되었지.」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「言うなれば、『思考加速』。だから――」"
translation = "「말하자면 『사고 가속』. 그러니까──」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「私が目の前にいる限り、キミはもう、何１つ星術を使うことはできないよ。私が全て、発動前に封殺するからね」"
translation = "「내가 눈앞에 있는 한 너는 이제 단 하나의 성술도 사용할 수 없어. 내가 전부 발동 전에 봉쇄할 테니까.」"

[[dialogue]]
speaker = "ミネコ"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「さっきも言ったが……チェックメイトだ、フランボウ。大人しく捕まりたまえ」"
translation = "「아까도 말했지만…… 체크메이트다, 플랑보. 얌전히 잡히도록 해.」"

[[dialogue]]
speaker = "ミネコ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "ミネコ"
original = "「ふふっ……ふふふっ！」"
translation = "「후훗…… 후후훗!」"

[[dialogue]]
speaker = "ミネコ"
original = "「まだだ。まだ終わってないよ、名探偵！\u3000今のキミは確かに私の力を上回っている！\u3000だけど、それは星術での話！」"
translation = "「아직이야. 아직 끝나지 않았어, 명탐정! 지금의 네가 확실히 나의 힘을 웃돌고 있어! 하지만 그건 성술에서의 이야기!」"

[[dialogue]]
speaker = "ミネコ"
original = "「星力を上乗せした身体能力でなら――私はキミよりも速い！」"
translation = "「성력을 덧씌운 신체 능력이라면── 내가 너보다 빨라!」"

[[dialogue]]
speaker = "unk"
original = "次の瞬間、ミネコが全速力でジュエリーに向かって駆け出す。"
translation = "다음 순간, 미네코가 전속력으로 주얼리를 향해 달려 나간다."

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「……！\u3000まさか！」"
translation = "「……! 설마!」"

[[dialogue]]
speaker = "unk"
original = "ミネコはそのままジュエリーを攻撃することなく、すれ違うように横を通り抜ける。"
translation = "미네코는 그대로 주얼리를 공격하지 않고, 스쳐 지나가듯 옆을 통과한다."

[[dialogue]]
speaker = "unk"
original = "彼女が向かう先は、大聖堂の方向。"
translation = "그녀가 향하는 곳은 대성당 방향."

[[dialogue]]
speaker = "ミネコ"
original = "「キミの前で星術が使えないというなら、逃げてから使えばいい！」"
translation = "「네 앞에서 성술을 쓸 수 없다면, 도망쳐서 쓰면 돼!」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「待て、ミネコ！」"
translation = "「기다려, 미네코!」"

[[dialogue]]
speaker = "unk"
original = "ジュエリーもすかさず彼女を追って、大聖堂へと向かうのだった――"
translation = "주얼리도 곧장 그녀를 쫓아 대성당으로 향하는 것이었다──"

[[dialogue]]
speaker = "unk"
original = "<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>まで飛ばされた俺は、飛行のみに全星力を注ぎ、ようやく学園まであと少しというところまで帰って来ていた。"
translation = "경계의 호수<rt>라르고 시엘로</rt></ruby>까지 날아갔던 나는 비행에만 모든 성력을 쏟아부어, 겨우 학원까지 조금 남은 곳까지 돌아와 있었다."

[[dialogue]]
speaker = "unk"
original = "そんな時、ＤＩＳＣにジュエリーから着信が入る。"
translation = "그때 DISC로 주얼리에게서 착신이 들어온다."

[[dialogue]]
speaker = "unk"
original = "ジュエリー、大丈夫か！？"
translation = "주얼리, 괜찮아!?"

[[dialogue]]
speaker = "unk"
original = "「ああ、私は大丈夫だ。だが、すまない、ミネコに大聖堂へ入られた。急いで来てくれ、助手……！」"
translation = "「아아, 나는 괜찮다. 하지만 미안해, 미네코가 대성당으로 들어갔어. 서둘러 와 줘, 조수……!」"

[[dialogue]]
speaker = "unk"
original = "それから、俺は急いで大聖堂へと向かった。"
translation = "그 후, 나는 서둘러 대성당으로 향했다."

[[dialogue]]
speaker = "unk"
original = "しかし、中へ入るとそこには太陽の壁画を守っているはずの、ヴィーナスや警察官の姿はなく――"
translation = "하지만 안으로 들어가니 그곳에는 태양의 벽화를 지키고 있어야 할 비너스나 경찰관들의 모습은 없고──"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「ああ、よかった。戻って来たか、助手」"
translation = "「아아, 다행이다. 돌아왔나, 조수.」"

[[dialogue]]
speaker = "unk"
original = "１人待っていたジュエリーが、俺の方へ振り返る。"
translation = "혼자 기다리고 있던 주얼리가 내 쪽을 돌아본다."

[[dialogue]]
speaker = "unk"
original = "……！\u3000ヴィーナスたちは？"
translation = "……! 비너스 일행은?"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「ああ、実は――ミネコの仕掛けで、この大聖堂自体に幻術がかけられているようだ。ヴィーナスさん達が見当たらないのはそのせいだろう」"
translation = "「아아, 사실은── 미네코의 장치로 이 대성당 자체에 환술이 걸려 있는 모양이야. 비너스 씨 일행이 보이지 않는 건 그 때문이겠지.」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「しかし、キミが来るまでの間に幻術の仕組みは確かめておいたから、すぐにでも解くことはできる。しかし、大聖堂のどこかにミネコが潜伏しているはずだ」"
translation = "「하지만 네가 오기 전까지 환술의 구조는 확인해 두었으니 금방이라도 풀 수는 있어. 하지만 대성당 어딘가에 미네코가 잠복해 있을 거야.」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「本当の大聖堂に戻ったら、太陽の壁画の状態を確認しよう」"
translation = "「진짜 대성당으로 돌아가면 태양의 벽화 상태를 확인하자.」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「準備はいいかい？\u3000助手」"
translation = "「준비는 됐나? 조수.」"

[[dialogue]]
speaker = "unk"
original = "俺はそんな彼女に対し――首を横に振った。"
translation = "나는 그런 그녀를 향해── 고개를 가로저었다."

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「？\u3000どうしたんだい、助手？」"
translation = "「? 왜 그러지, 조수?」"

[[dialogue]]
speaker = "unk"
original = "キミはジュエリーじゃない"
translation = "너는 주얼리가 아니야"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「…………正直、驚いたよ。会長」"
translation = "「…………솔직히 놀랐어. 회장.」"

[[dialogue]]
speaker = "ミネコ"
original = "「なんで私が変装してるってわかったのか……聞いてもいい？」"
translation = "「어떻게 내가 변장하고 있다는 걸 알았는지…… 물어봐도 될까?」"

[[dialogue]]
speaker = "unk"
original = "ジュエリーは日傘のさし方に、癖があるんだ"
translation = "주얼리는 양산을 쓰는 법에 버릇이 있어"

[[dialogue]]
speaker = "unk"
original = "普段から常に、屋内外関係なく日傘を差し続けているジュエリー。"
translation = "평소에도 항상 실내외를 불문하고 양산을 계속 쓰고 있는 주얼리."

[[dialogue]]
speaker = "unk"
original = "太陽光を嫌う彼女はたとえ室内の電灯であっても、光の向きに抗うように傘の角度を調整してしまうのだ。恐らく、無意識のうちに。"
translation = "햇빛을 싫어하는 그녀는 설령 실내 전등이라 해도 빛의 방향에 저항하듯 우산 각도를 조정하고 만다. 아마 무의식중에."

[[dialogue]]
speaker = "unk"
original = "そして、ミネコが変装したジュエリーには、その仕草が見られなかった。"
translation = "그리고 미네코가 변장한 주얼리에게서는 그 몸짓이 보이지 않았다."

[[dialogue]]
speaker = "ミネコ"
original = "「そうか……つまりは、ジュエリーが体の一部のように日傘をさし過ぎるが故に、染みついてしまった癖……」"
translation = "「그렇구나…… 즉 주얼리가 몸의 일부처럼 양산을 너무 많이 쓴 나머지 몸에 배어버린 습관…….」"

[[dialogue]]
speaker = "ミネコ"
original = "「会長は普段からジュエリーのことを見ていて、その癖に気づいていたんだね……」"
translation = "「회장은 평소부터 주얼리를 지켜보고 있어서 그 습관을 눈치채고 있었던 거네…….」"

[[dialogue]]
speaker = "ミネコ"
original = "「ふっ……。また、私の負けだ」"
translation = "「훗……. 또 나의 패배야.」"

[[dialogue]]
speaker = "unk"
original = "また……？"
translation = "또……?"

[[dialogue]]
speaker = "ミネコ"
original = "「うん。キミは知らなかったかもしれないけど、私はこのところ、他の事件でジュエリーと対決する度に、ずっと負けてたんだよ」"
translation = "「응. 너는 몰랐을지도 모르지만, 나는 요즘 다른 사건에서 주얼리와 대결할 때마다 계속 졌었거든.」"

[[dialogue]]
speaker = "unk"
original = "俺はジュエリーの助手として協力を要請されることも多いが、それは決して全ての事件に対してではない。"
translation = "나는 주얼리의 조수로서 협력을 요청받는 일도 많지만, 그것이 결코 모든 사건에 대해서는 아니다."

[[dialogue]]
speaker = "unk"
original = "ジュエリーは選星者『名探偵』の能力によって、『事件が起きる場所を直感的に察して、現場に居合わせる』特性を持つからだ。"
translation = "주얼리는 선성자 『명탐정』의 능력에 의해 『사건이 일어날 장소를 직감적으로 감지해 현장에 입회하는』 특성을 가졌기 때문이다."

[[dialogue]]
speaker = "unk"
original = "俺が星徒会やリクリエ絡みの騒動で忙しい時は、彼女単独でその事件を解決してしまっている。むしろ、そういった事件の方が圧倒的に多い。"
translation = "내가 성도회나 리크리에 관련 소동으로 바쁠 때는 그녀 단독으로 사건을 해결해 버린다. 오히려 그런 사건이 압도적으로 많다."

[[dialogue]]
speaker = "ミネコ"
original = "「――ある時を境に、ジュエリーの何かが変わった。彼女の調子が明らかに良くなったんだよ」"
translation = "「──어느 시점을 경계로 주얼리의 무언가가 변했어. 그녀의 컨디션이 명백히 좋아졌거든.」"

[[dialogue]]
speaker = "ミネコ"
original = "「それで、私はその理由を知りたくて……調べてる内に、ジュエリーがキミと出会ったということを知ったんだ」"
translation = "「그래서 나는 그 이유를 알고 싶어서…… 조사하는 중에 주얼리가 너와 만났다는 걸 알게 됐지.」"

[[dialogue]]
speaker = "ミネコ"
original = "「だから、私は学園に潜入して、キミとジュエリーと仲良くなろうと思ったんだよ」"
translation = "「그래서 나는 학원에 잠입해서 너와 주얼리와 친해지려고 생각한 거야.」"

[[dialogue]]
speaker = "ミネコ"
original = "「ジュエリーが何故あそこまで強くなったのか、わかると思ったから」"
translation = "「주얼리가 왜 저렇게까지 강해졌는지 알 수 있을 거라 생각했으니까.」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「――簡単なことだ」"
translation = "「──간단한 일이야.」"

[[dialogue]]
speaker = "unk"
original = "と、そこへ現れたのは、本物のジュエリーだった。"
translation = "그때 그곳에 나타난 것은 진짜 주얼리였다."

[[dialogue]]
speaker = "unk"
original = "日傘の角度を変える仕草で、すぐに本人だとわかった。"
translation = "양산 각도를 바꾸는 몸짓으로 금방 본인임을 알 수 있었다."

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「私が強くなったというなら……ミネコ。それはただ、助手に褒めてもらいたかったというだけだ」"
translation = "「내가 강해졌다고 한다면…… 미네코. 그건 단지 조수에게 칭찬받고 싶었을 뿐이야.」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「愛する助手に、私１人でも事件を解決してみせたと報告して、褒めてもらえるのを想像したら……つい張り切ってしまうというものだろう？」"
translation = "「사랑하는 조수에게 나 혼자서도 사건을 해결해냈다고 보고하고 칭찬받는 걸 상상했더니…… 그만 힘이 나 버렸다고나 할까?」"

[[dialogue]]
speaker = "ミネコ"
original = "「もう幻術を見破って出てくるなんて……さすがだね、名探偵」"
translation = "「벌써 환술을 간파하고 나오다니…… 역시네, 명탐정.」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「これが助手との『愛』によって目覚めた力だよ、大怪盗」"
translation = "「이것이 조수와의 『사랑』에 의해 깨어난 힘이야, 대괴도.」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「私は助手と出会って、愛を知ったことで強くなったんだ」"
translation = "「나는 조수와 만나 사랑을 알게 됨으로써 강해졌어.」"

[[dialogue]]
speaker = "ミネコ"
original = "「愛、ね……。まさか本当に、そんなものに負けるとは……」"
translation = "「사랑, 이라……. 설마 정말로 그런 것에 지다니…….」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「ふふっ、しかし、これでわかっただろう？」"
translation = "「후훗, 하지만 이제 알았겠지?」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「愛ってのは、理屈じゃ測れないんだ」"
translation = "「사랑이라는 건 논리로 잴 수 없는 법이야.」"

[[dialogue]]
speaker = "ミネコ"
original = "「やれやれ、参ったな……」"
translation = "「이런 이런, 당했는걸…….」"

[[dialogue]]
speaker = "unk"
original = "そこで、パチンと指を鳴らすミネコ。"
translation = "거기서 손가락을 딱 튕기는 미네코."

[[dialogue]]
speaker = "ヴィーナス"
original = "「あれ？\u3000クロトと、ジュエリー？\u3000大聖堂の中が急に光ったと思ったら、どうして２人がここに？」"
translation = "「어라? 쿠로토랑 주얼리? 대성당 안이 갑자기 빛나나 싶었더니, 어째서 둘이 여기에?」"

[[dialogue]]
speaker = "unk"
original = "光が収まると、そこに先程まで居なかったヴィーナスや警官の人たちの姿があった。"
translation = "빛이 가라앉자 그곳에는 방금 전까지 없었던 비너스와 경찰들의 모습이 있었다."

[[dialogue]]
speaker = "unk"
original = "そして――"
translation = "그리고──"

[[dialogue]]
speaker = "ミネコ"
original = "「やあやあ、九浄ヴィーナスに、警察の諸君！」"
translation = "「야아 야아, 쿠죠 비너스에 경찰 제군들!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「って、あなた誰！？\u3000まさか、大怪盗フランボウ！？」"
translation = "「어라, 당신 누구야!? 설마 대괴도 플랑보!?」"

[[dialogue]]
speaker = "unk"
original = "気づけば大聖堂の天井近くに、長身の紳士のような人影が浮遊していた。"
translation = "어느샌가 대성당 천장 근처에 장신의 신사 같은 인영이 부유하고 있었다."

[[dialogue]]
speaker = "ミネコ"
original = "「ははは♪\u3000その通り！\u3000しかし会えて早々だが、そこの名探偵と助手の活躍により、今回は私の完敗だ」"
translation = "「하하하♪ 바로 맞았어! 하지만 만나자마자 유감이지만, 저기 있는 명탐정과 조수의 활약 덕분에 이번엔 나의 완패야.」"

[[dialogue]]
speaker = "ミネコ"
original = "「悔しいが、退かせてもらうとするよ――また会おう、諸君！」"
translation = "「분하지만 물러나기로 하지── 또 보자고, 제군들!」"

[[dialogue]]
speaker = "unk"
original = "次の瞬間、ポイッとこちらに向けて何かボールのようなものを投げるミネコ。"
translation = "다음 순간, 툭 하고 이쪽을 향해 무언가 공 같은 것을 던지는 미네코."

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「！\u3000星術じゃない！\u3000みんな、目を閉じろ！\u3000閃光弾だ！」"
translation = "「! 성술이 아니야! 모두 눈을 감아! 섬광탄이다!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「っ……！\u3000あっ！？\u3000フランボウがいなくなってる！？」"
translation = "「윽……! 앗!? 플랑보가 없어졌어!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「外よ！\u3000外に逃げたんだわ！\u3000待ちなさーい！」"
translation = "「밖이야! 밖으로 도망친 거야! 기다려어!」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスと警官の人たちが大聖堂の外へと追い駆けて行く。"
translation = "비너스와 경찰들이 대성당 밖으로 쫓아 나간다."

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「エクリプスフォームの『思考加速』による星術封殺を、物理的な光で視界をくらますことで防いで来たか……」"
translation = "「에클립스 폼의 『사고 가속』에 의한 성술 봉쇄를 물리적인 빛으로 시야를 가림으로써 방어해냈나…….」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「やはり、そう簡単には行かないね。大怪盗フランボウ」"
translation = "「역시 그렇게 쉽지는 않네. 대괴도 플랑보.」"

[[dialogue]]
speaker = "unk"
original = "そうして、ミネコは星騎士たちの包囲網を潜り抜け、逃げ切ってみせるのだった――"
translation = "그렇게 미네코는 성기사들의 포위망을 뚫고 도망쳐 보이는 것이었다──"

