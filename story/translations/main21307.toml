[[dialogue]]
speaker = "unk"
original = "第７話,レティシアの外出,B"
translation = "제7화, 레티시아의 외출, B"

[[dialogue]]
speaker = "unk"
original = "グレイスへ真実を伝えた翌日。俺は購買部へ顔を出していた。"
translation = "그레이스에게 진실을 전한 다음 날. 나는 매점에 얼굴을 내밀고 있었다."

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「──なるほど。そんなことが……」"
translation = "「──그렇군요. 그런 일이……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「トリュファイナさん、可能でしょうか？」"
translation = "「트류파이나 씨, 가능할까요?」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「──難しいですね。状況を見ない事には、何とも……」"
translation = "「──어렵겠네요. 상황을 보지 않고서는 뭐라……」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「けれど、死力を尽くします。それだけはお約束しましょう」"
translation = "「하지만 사력을 다하겠습니다. 그것만은 약속드리지요」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「すみません。かなり危険なことになると思いますが……あなた以外に頼めないことでした」"
translation = "「죄송합니다. 꽤 위험한 일이 될 거라 생각합니다만…… 당신 말고는 부탁할 사람이 없었습니다」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「お気になさらないでください。世界の危機とあっては、私も命を懸けなくては！」"
translation = "「개의치 마십시오. 세계의 위기라면 저도 목숨을 걸어야지요!」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「──それにしても魔王様。ここのところ、休む間もなく駆け回っているとか……お疲れでしょう？」"
translation = "「──그나저나 마왕님. 요 근래 쉴 틈 없이 뛰어다니신다던데…… 피곤하시죠?」"

[[dialogue]]
speaker = "unk"
original = "トリュファイナさんが魔力を用いて、俺の疲労感を取り去ってくれた。"
translation = "트류파이나 씨가 마력을 이용해 나의 피로감을 씻어주었다."

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「ある程度の疲れならば、このようにすぐにお癒やしできます。またおいでください」"
translation = "「어느 정도의 피로라면 이렇게 금방 치유해 드릴 수 있습니다. 또 들러주세요」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ありがとうございます。体が軽くなりました」"
translation = "「감사합니다. 몸이 가벼워졌어요」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「こんにちは！\u3000フライドチキンください！！」"
translation = "「안녕하세요! 프라이드치킨 주세요!!」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「あっ。グレイス様。いらっしゃいませ！」"
translation = "「앗. 그레이스 님. 어서 오세요!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ぜえ、ぜえっ……会長、お疲れ様～……」"
translation = "「헉, 헉…… 회장, 수고했어~……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「マトイもご苦労様。今日もグレイスは……その、元気いっぱいみたいだな」"
translation = "「마토이도 고생 많았어. 오늘도 그레이스는…… 그, 기운이 넘치는 모양이네」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「トリュファイナさんの揚げるチキンが絶品だって……毎日リピートしててね……」"
translation = "「트류파이나 씨가 튀기는 치킨이 일품이라면서…… 매일 리피트하고 있거든……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「これを食べたら次は図書館でしょ。その後は渋谷に行って、秋葉原に行って、浅草もめぐるんだって～……」"
translation = "「이걸 먹으면 다음은 도서관이래. 그 후에는 시부야에 가고, 아키하바라에 가고, 아사쿠사도 돌 거래~……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「本当にお疲れ様、マトイ……」"
translation = "「정말 고생 많아, 마토이……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あはは。グレイスちゃんはわかりやすく喜んでくれるし、お礼もちゃんと言ってくれるから、面倒の見甲斐はあるけどね」"
translation = "「아하하. 그레이스짱은 알기 쉽게 기뻐해 주고 고맙다는 인사도 제대로 해주니까 돌보는 보람은 있지만 말이야」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そういえば会長。今日はレティシアさんから連絡があったってホント？\u3000初めての外出申請だよね？」"
translation = "「그러고 보니 회장. 오늘은 레티시아 씨한테 연락이 왔다면서 진짜야? 첫 외출 신청이지?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。この後、サーシャさんが担当することになってる。俺も同席するつもりだ」"
translation = "「아아. 이따가 사샤 씨가 담당하기로 했어. 나도 동석할 생각이야」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「なんて言ったらいいのかわからないけど……気を付けてね。悪い人とまでは言わないけど……」"
translation = "「뭐라고 해야 할지 모르겠지만…… 조심해. 나쁜 사람까지는 아니라고 보지만……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「レティシアは、一番アルタイルに対して心を開いていない感じがするよな。心配してくれてありがとう」"
translation = "「레티시아는 가장 알타이르에 대해 마음을 열지 않은 느낌이 들긴 하지. 걱정해줘서 고마워」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「うん！\u3000また何か進展があったら教えてね！」"
translation = "「응! 또 뭔가 진전이 있으면 알려줘!」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「マトイさん、魔王さんも！\u3000トリュファイナさんにサービスしてもらいました！\u3000チキン、お１つどうぞ！」"
translation = "「마토이 씨, 마왕님도! 트류파이나 씨가 서비스해주셨어요! 치킨 하나 드세요!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「う、うんっ、ありがとう……わ、ほんとにおいしい！！」"
translation = "「으, 응, 고마워…… 와, 진짜 맛있다!!」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「ふふふ♪\u3000またのご来店、お待ちしておりますね♪」"
translation = "「후후후♪ 또 방문해주시길 기다리고 있을게요♪」"

[[dialogue]]
speaker = "unk"
original = "それからしばらく後。レティシアが申請した外出先に、俺は出向いた──"
translation = "그러고 나서 잠시 후. 레티시아가 신청한 외출 장소로 나는 향했다──"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あらあら。やっぱりレティシアちゃん、とっても強いわね～♪」"
translation = "「어머어머. 역시 레티시아짱, 무척 강하네~♪」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「お喋りしてると舌を噛むわよ？」"
translation = "「수다 떨다간 혀 깨물걸?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ご忠告どうも～♪」"
translation = "「충고 고마워~♪」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「ふっ──！！」"
translation = "「훗──!!」"

[[dialogue]]
speaker = "unk"
original = "レティシアが申請したのは模擬戦闘──本人曰く、体がなまらないようにしたいとのこと。"
translation = "레티시아가 신청한 것은 모의 전투── 본인 말로는 몸이 굳지 않게 하고 싶다는 것이었다."

[[dialogue]]
speaker = "unk"
original = "一応、極星学園生は捕虜なので、渡しているセレスティアには細工がある。"
translation = "일단 극성학원생은 포로이기에 건네준 셀레스티아에는 장치가 되어 있다."

[[dialogue]]
speaker = "unk"
original = "トワ先生が改造を施した、一定以下の星力までしか行使できない訓練用セレスティアを貸し出しているのだが──"
translation = "토와 선생님이 개조를 가한, 일정 이하의 성력까지만 행사할 수 있는 훈련용 셀레스티아를 빌려주고 있었는데──"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「す、すごいね～、レティシアちゃん。動きに全然無駄がないよ」"
translation = "「우, 와~ 대단하네, 레티시아짱. 움직임에 전혀 낭비가 없어」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「実際に戦ったアポロから、相当の実力者と聞いてます」"
translation = "「실제로 싸웠던 아폴로에게 상당한 실력자라고 들었습니다」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「うん。星力総量も戦闘経験も段違い……出力制限されてあの動きは普通じゃないね」"
translation = "「응. 성력 총량도 전투 경험도 차원이 달라…… 출력 제한된 상태에서 저 움직임은 보통이 아니네」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「プリマステラの子も、ほとんどが歯も立たないんじゃないかな……」"
translation = "「프리마스텔라 아이들도 대부분 상대가 안 되지 않을까……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「でも、あの動きについていけるサーシャさんも流石です」"
translation = "「하지만 저 움직임을 따라가는 사샤 씨도 역시 대단해요」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「彼女も新星の元星徒会長だからね！\u3000あ、ひと段落ついたかな？」"
translation = "「그녀도 신성의 전 성도회장이니까 말이야! 아, 한 단락 마무리됐나?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふぅ──このあたりにしておきましょうか～？」"
translation = "「후우── 이쯤 해둘까요~?」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「残念だわ。ノヴァフォームを見せて欲しかったのだけれど……やっぱり機能制限されているセレスティアで追い込むのは無理ね」"
translation = "「아쉽네. 노바 폼을 보고 싶었는데…… 역시 기능 제한된 셀레스티아로 몰아붙이는 건 무리인가 보네」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「うふふ。それはまた今度ね♪\u3000それじゃあレティシアちゃん、先に変身を解除して？」"
translation = "「우후후. 그건 다음에♪ 자, 그럼 레티시아짱, 먼저 변신을 해제해 줄래?」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「……ええ」"
translation = "「……그래.」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「はい。セレスティア、お返しするわ」"
translation = "「자. 셀레스티아, 돌려줄게.」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「はーい、お疲れ様～」"
translation = "「네~ 수고했어~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「それじゃあレティシアちゃん。次は何をしましょうか？」"
translation = "「그럼 레티시아짱. 다음엔 뭘 할까?」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「部屋に戻るわ。体がなまらないように運動したかっただけだもの」"
translation = "「방으로 돌아갈래. 몸이 굳지 않게 운동하고 싶었을 뿐이니까.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「グレイスちゃんみたいに、もっと自由に歩き回っていいのよ？\u3000アルタイルの流星市国、気にならない？」"
translation = "「그레이스짱처럼 좀 더 자유롭게 돌아다녀도 된다구? 알타이르의 유성시국, 궁금하지 않아?」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「いいえ。まったく興味がないわ。どうせ滅ぼす世界だもの」"
translation = "「아니. 전혀 흥미 없어. 어차피 멸망시킬 세계인걸.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「困ったわね～……担当の私は楽でいいけど、グレイスちゃんに引っ張りまわされているマトイちゃんに悪い気がするわ～」"
translation = "「곤란하네~…… 담당인 나는 편해서 좋지만, 그레이스짱에게 끌려다니는 마토이짱에게 미안한 마음이 드네~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「できないことも多いけど、できる限りリクエストには応えるから～。なんならもう１回、模擬戦する？」"
translation = "「안 되는 것도 많지만, 가능한 한 리퀘스트에는 응해줄 테니까~. 정 그러면 한 번 더 모의전 할래?」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「それなら、流星星徒会の人達を呼んでくれる？\u3000いずれ敵として戦う時の参考にしたいから」"
translation = "「그렇다면 유성성도회 사람들을 불러줄래? 언젠가 적군으로 싸울 때 참고하고 싶으니까.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あらあら……血の気が多いのね～」"
translation = "「어머어머…… 혈기가 넘치는구나~」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「フィオナが許可するなら問題ない。連絡を取るよ」"
translation = "「피오나가 허가한다면 문제없어. 연락해 두지.」"

[[dialogue]]
speaker = "unk"
original = "──それからレティシアは、流星星徒会の面々とも模擬戦闘を行った。"
translation = "──그 후 레티시아는 유성성도회의 면면과도 모의 전투를 치렀다."

[[dialogue]]
speaker = "unk"
original = "そしてその後、フィオナから意外な申し出があり……"
translation = "그리고 그 뒤, 피오나로부터 의외의 제안이 있어……"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「ふうん。これが教皇庁、星見家の<ruby>邸宅<rt>ていたく</rt></ruby>……」"
translation = "「흐음. 여기가 교황청, 호시미 가문의 저택……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はい。ごゆっくりなさってください」"
translation = "「네. 편히 쉬다 가세요.」"

[[dialogue]]
speaker = "unk"
original = "レティシアがなかなか心を開いてくれないことを知ったフィオナが、語らいの場を設けようと自宅まで招待してくれたのだった。"
translation = "레티시아가 좀처럼 마음을 열어주지 않는다는 것을 안 피오나가, 대화의 장을 마련하고자 자택까지 초대해 준 것이었다."

[[dialogue]]
speaker = "unk"
original = "けれど──"
translation = "하지만──"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「どの部屋も通路も広い。刀を振るうスペースは十分ね」"
translation = "「어느 방이나 통로도 넓네. 도를 휘두를 공간은 충분해.」"

[[dialogue]]
speaker = "unk"
original = "レティシアはくつろぐどころか、敵情視察しかしていない気がする──"
translation = "레티시아는 휴식은커녕, 적정 시찰만 하고 있는 기분이 든다──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……本当に大丈夫かな？\u3000自宅まで招いちゃって」"
translation = "「……정말 괜찮을까? 자택까지 초대해 버려서.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「<ruby>胸襟<rt>きょうきん</rt></ruby>も開かない相手を信頼しろという方が無理でしょう。問題ありませんよ」"
translation = "「흉금조차 터놓지 않는 상대를 신뢰하라는 쪽이 무리겠죠. 문제없답니다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「できる限りのことをする──緋宮会長と同じことをしているだけですから」"
translation = "「할 수 있는 한의 일을 할 뿐── 히노미야 회장님과 같은 일을 하고 있을 뿐이니까요.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……ありがとう、フィオナ」"
translation = "「……고마워, 피오나.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「失礼します。お茶のおかわりをお持ちしました」"
translation = "「실례하겠습니다. 차를 더 가져왔습니다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ナミエル、ご苦労様。レティシアさんから先にお願いね」"
translation = "「나미엘, 수고했어. 레티시아 씨부터 먼저 부탁해.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「……かしこまりました」"
translation = "「……알겠습니다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あ、ちょっと……平行世界からのお客様なんだから。そんなに睨んじゃ──」"
translation = "「아, 잠시만…… 평행세계에서 온 손님이니까. 그렇게 노려보지──」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「構わないわ。むしろ落ち着くくらい。ようやく頭の中がお花畑じゃない子がいたわね？」"
translation = "「상관없어. 오히려 진정될 정도야. 드디어 머릿속이 꽃밭이 아닌 애가 있네?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「……アルタイルとデネブの状況は理解していますが、お嬢様に害をなすようであれば容赦はしません」"
translation = "「……알타이르와 데네브의 상황은 이해하고 있습니다만, 아가씨께 해를 끼친다면 용서하지 않겠습니다.」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「ええ。そのくらいの距離感でいて？\u3000その方が、いざという時に斬りやすいもの」"
translation = "「그래. 그 정도의 거리감으로 있어 줘. 그편이 만일의 경우에 베기 편하니까.」"

[[dialogue]]
speaker = "unk"
original = "一触即発の空気だ……レティシアは本当に難攻不落な気がする。"
translation = "일촉즉발의 공기다…… 레티시아는 정말 난공불락이라는 느낌이 든다."

[[dialogue]]
speaker = "unk"
original = "ナミエルがレティシアの近くまで歩み寄る──紅茶のポットを置き、カップの中身を注ぎ足す。"
translation = "나미엘이 레티시아 근처까지 다가간다── 홍차 포트를 내려놓고 찻잔을 채운다."

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "その何でもない所作を、レティシアはジッと注視している。"
translation = "그 평범한 몸짓을 레티시아는 뚫어지게 주시하고 있다."

[[dialogue]]
speaker = "unk"
original = "そして──"
translation = "그리고──"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「──あなた。その身のこなし、どこで身に着けたの？」"
translation = "「──당신. 그 몸놀림, 어디서 익힌 거야?」"

[[dialogue]]
speaker = "unk"
original = "とても珍しい、レティシアからの能動的な声かけに、俺は耳を疑った。"
translation = "매우 드문 레티시아의 능동적인 말걸기에 나는 귀를 의심했다."

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「足音を極端に殺して歩く……腕を動かす時、衣擦れが起きないように……それ、無意識でしょう。どこで習ったの？」"
translation = "「발소리를 극도로 죽여서 걷고…… 팔을 움직일 때 옷깃 스치는 소리가 나지 않게…… 그거 무의식이지. 어디서 배웠어?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「…………昔、とある組織で。それが何か？」"
translation = "「…………옛날에 어떤 조직에서요. 그게 무슨 문제라도?」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「……いいえ。何でもないわ。忘れて頂戴」"
translation = "「……아니. 아무것도 아니야. 잊어줘.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「そうですか。ではおくつろぎください。失礼します」"
translation = "「그렇습니까. 그럼 편히 쉬십시오. 실례하겠습니다.」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「……………………」"
translation = "「……………………」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「サーシャさん。レティシアのこと、どう思いますか？」"
translation = "「사샤 씨. 레티시아에 대해 어떻게 생각하세요?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「取り付く島もないって、このことかしら。ルヴィネちゃんに相当心酔してるみたい」"
translation = "「붙여볼 구석도 없다는 게 이럴 때 쓰는 말일까. 루비네짱에게 상당히 심취해 있는 것 같아.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あの子の担当は私で正解ね。ちょっとでも隙を見せたら、人質を取られて、セレスティアも奪われちゃいそう」"
translation = "「그 아이 담당이 나라서 다행이네. 조금이라도 빈틈을 보였다간 인질을 잡고 셀레스티아도 빼앗아 버릴 것 같아.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……ですよね」"
translation = "「……그렇죠.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「説得できるか怪しいわね～。今日あの子と模擬戦闘をしたけれど……本当に機械を相手にしてるみたいだったわ」"
translation = "「설득할 수 있을지 의심스럽네~. 오늘 그 아이와 모의 전투를 했지만…… 정말 기계를 상대하는 것 같았어.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「会長くんは武器を使わないけれど、なんとなくわからない？\u3000太刀筋には感情が乗るでしょう？」"
translation = "「회장 군은 무기를 쓰지 않지만, 왠지 알 것 같지 않아? 칼끝에는 감정이 실리기 마련이잖아?」"

[[dialogue]]
speaker = "unk"
original = "サーシャさんの言うことはよくわかる。その人間の身に着けた武芸というものは、時として言葉よりも雄弁なことがある。"
translation = "사샤 씨의 말은 잘 이해가 간다. 그 인간이 익힌 무예라는 것은 때로 말보다 웅변적일 때가 있다."

[[dialogue]]
speaker = "unk"
original = "俺が、黒騎士となったセイファート学園長の正体に気づけたキッカケも、彼の放つ太刀筋に覚えがあったからだ。"
translation = "내가 흑기사가 된 세이파트 학원장의 정체를 눈치챌 수 있었던 계기도 그가 내지르는 칼끝에 짐작 가는 바가 있었기 때문이다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「レティシアちゃんの攻撃には、何もないの。恨みも憎しみも、焦りもいら立ちも。喜びも悲しみもない」"
translation = "「레티시아짱의 공격에는 아무것도 없어. 원망도 증오도, 초조함도 짜증도. 기쁨도 슬픔도 없어.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「打ち合えば打ち合うほど……言葉を選ばずに言うと、ぞっとするの」"
translation = "「합을 맞추면 맞출수록…… 직설적으로 말하자면 소름이 돋아.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「この子は『空っぽ』なんじゃないかって」"
translation = "「이 아이는 『텅 비어 있는』 게 아닐까 하고.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……彼女の生い立ちが関係しているんでしょうか？」"
translation = "「……그녀의 성장 배경과 관계가 있는 걸까요?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そうかもしれないわね。ベアトリスちゃん達から聞いたわ。バジュラ教団のような新興宗教で育ったって」"
translation = "「그럴지도 모르겠네. 베아트리스짱 일행에게 들었어. 바주라 교단 같은 신흥 종교에서 자랐다고.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「アナも出生記録がないと言っていましたね。俺たちには想像もできない、辛い過去があったのかも……」"
translation = "「아나도 출생 기록이 없다고 했었죠. 우리로서는 상상도 할 수 없는 괴로운 과거가 있었을지도……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そこから救い出してくれたのが、ルヴィネちゃんだったとしたら……依存も感じるけれど、相当の恩義もありそうね～」"
translation = "「거기서 구해준 게 루비네짱이었다면…… 의존하는 면도 느껴지지만 상당한 은의도 있겠네~」"

[[dialogue]]
speaker = "unk"
original = "だとすると、レティシアにとってルヴィネは、ナミエルにおけるフィオナのようなもの……？"
translation = "그렇다면 레티시아에게 루비네는 나미엘에게 있어 피오나 같은 존재인 걸까……?"

[[dialogue]]
speaker = "unk"
original = "いつレティシアに真実を伝えるか。伝えたところで信じてもらえるのか──まったく成功する気がしない。"
translation = "언제 레티시아에게 진실을 전할지. 전한다고 해도 믿어줄지── 전혀 성공할 기미가 보이지 않는다."

[[dialogue]]
speaker = "unk"
original = "結局その後、妙案が見つかることはなく……"
translation = "결국 그 후 묘안을 찾지 못한 채……"

[[dialogue]]
speaker = "unk"
original = "これからもレティシアとは折に触れて接していこうと決めて、サーシャさんとは解散するのだった。"
translation = "앞으로도 레티시아와는 기회가 닿는 대로 접촉하기로 결심하고 사샤 씨와는 해산했다."

[[dialogue]]
speaker = "unk"
original = "しかし事態は突然、動いた。"
translation = "그러나 사태는 갑자기 움직였다."

[[dialogue]]
speaker = "unk"
original = "その日の真夜中──俺のＤＩＳＣに緊急連絡が入った。"
translation = "그날 한밤중── 내 DISC에 긴급 연락이 들어왔다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "『会長くん。緊急事態よ──すぐに来て！』"
translation = "『회장 군. 긴급 사태야── 빨리 와줘!』"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "『レティシアちゃんが学園からいなくなったわ。セレスティアも１つ足りないの……！』"
translation = "『레티시아짱이 학원에서 사라졌어. 셀레스티아도 하나 비어 있어……!』"

