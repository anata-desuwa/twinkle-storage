[[dialogue]]
speaker = "unk"
original = "第１１話,星読事変,B"
translation = "제11화, 성독 사변, B"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「どうだアポロ──これでも満足できないかっ！？」"
translation = "「어떠냐 아폴로──이래도 만족 못 하겠어!?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「へえ……中々やるな！」"
translation = "「헤에…… 제법 하는군!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あんたもね！\u3000ほんとに見た目通りにいかないっていうか……！」"
translation = "「너도 마찬가지야! 정말 겉모습대로 안 된다고 할까……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「『月』の守護星──」"
translation = "「『달』의 수호성──」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ええ──けど、普通じゃないわ。あんなに暗い力なんて……！」"
translation = "「응──하지만, 평범하지 않아. 저렇게 어두운 힘이라니……!」"

[[dialogue]]
speaker = "unk"
original = "闇の月──彼女はその加護を受け、得体の知れない力を大いに振るってきた。"
translation = "어둠의 달──그녀는 그 가호를 받아, 정체 모를 힘을 크게 휘둘러왔다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「でも、これで私たちが優勢……！」"
translation = "「하지만, 이걸로 우리가 우세……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。おとなしく武器を捨てるんだ」"
translation = "「아아. 얌전히 무기를 버려」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「捨てたって許さないわ。とりあえずその仮面ひっ剥いであげる」"
translation = "「버려도 용서 안 할 거야. 일단 그 가면부터 벗겨줄게」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ふっふっふ。そううまく行くかな？」"
translation = "「훗훗훗. 그렇게 잘 될까?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「──何かやろうとしてる。止めましょう」"
translation = "「──무언가 하려고 합니다. 막아야 합니다」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ええ、一緒に──」"
translation = "「응, 같이──」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「──させませんよ、お嬢様方」"
translation = "「──그렇게 두지 않습니다, 아가씨들」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「っ、あなた……！」"
translation = "「크, 당신……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「マトイ──！」"
translation = "「마토이──!」"

[[dialogue]]
speaker = "unk"
original = "横入りするギエルに対し、俺が応戦して撃退する。"
translation = "가로막는 기엘에게, 내가 응전하여 격퇴한다."

[[dialogue]]
speaker = "unk"
original = "繰り出した拳撃は彼の横っ腹を捉えたが、すぐに体勢を立て直される。"
translation = "내지른 권격은 그의 옆구리를 맞혔지만, 곧바로 자세를 바로잡는다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「もう一発──」"
translation = "「한 방 더──」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「ふ──さすがは魔王の血族。中々やるようですが、所詮はただの空拳……」"
translation = "「흐──과연 마왕의 혈족. 제법 하는 듯합니다만, 결국은 그저 맨주먹……」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「っ！？」"
translation = "「!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（！？）"
translation = "（⁉）"

[[dialogue]]
speaker = "unk"
original = "距離を取る。"
translation = "거리를 둔다."

[[dialogue]]
speaker = "unk"
original = "執事──ギエルの眼は、瞠目に見開かれていた。"
translation = "집사──기엘의 눈은, 휘둥그레지게 크게 뜨여 있었다."

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「……。今、何を……」"
translation = "「……. 지금, 무엇을……」"

[[dialogue]]
speaker = "unk"
original = "今。俺の拳は間違いなく防がれた。"
translation = "방금. 내 주먹은 틀림없이 막혔다."

[[dialogue]]
speaker = "unk"
original = "だが……防がれた後で、もう一撃が命中した。"
translation = "하지만…… 막힌 뒤에, 또 한 방이 명중했다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（……なんだ……？\u3000今の感覚は……？）"
translation = "（……뭐지……? 방금의 감각은……?）"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「クロトくん！\u3000危ないわ！」"
translation = "「쿠로토 군! 위험해!」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「ウイイイ──！！」"
translation = "「우이이이──!!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──ッ」"
translation = "「──」"

[[dialogue]]
speaker = "unk"
original = "一瞬の隙を晒した俺へ、アポロが遠隔でモンスターをけしかけてきた。"
translation = "한순간의 틈을 보인 나에게, 아폴로가 원격으로 몬스터를 부추겨왔다."

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「イイイイっっ……！」"
translation = "「이이이이잇……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あ……ありがとうございます。サーシャ先輩」"
translation = "「아…… 감사합니다. 사샤 선배」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ええ──何か思うところがあったみたいだけど。今はあの子に集中しないと」"
translation = "「응──뭔가 생각하는 게 있는 것 같지만. 지금은 저 아이에게 집중해야지」"

[[dialogue]]
speaker = "unk"
original = "そうだ。"
translation = "그렇다."

[[dialogue]]
speaker = "unk"
original = "今、注意すべきは目の前の相手で……"
translation = "지금, 주의해야 할 것은 눈앞의 상대이며……"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──いい加減にするんだアポロ。さもないと……もっと痛い目に遭わせることになるぞ」"
translation = "「──작작 좀 해라 아폴로. 그렇지 않으면…… 더 아픈 꼴을 당하게 될 거다」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ふふ……ふふふふ。痛い目か。ヒーローに対してそーゆーのは、<b>しぼうふらぐ</b>って言うんだぜ！」"
translation = "「후후…… 후후후후. 아픈 꼴이라. 히어로에게 그런 건, <ruby>사망 플래그<rt>・・ ・・・</rt></ruby>라고 하는 거라고!」"

[[dialogue]]
speaker = "unk"
original = "あまりにも話が通じない。"
translation = "너무나도 말이 통하지 않는다."

[[dialogue]]
speaker = "unk"
original = "さらに<b>ノリノリ</b>になったアポロは、濃密なオーラを自らに集約させていく。"
translation = "게다가 <ruby>신이 난<rt>・・ ・</rt></ruby> 아폴로는, 농밀한 오라를 자신에게 집약시켜 나간다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あれって──」"
translation = "「저건──」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「再構築の瘴気──塔のガーディアンを汚染していたのと同じものです！」"
translation = "「재구축의 장기──탑의 가디언을 오염시키고 있던 것과 똑같은 것입니다!」"

[[dialogue]]
speaker = "unk"
original = "なぜ彼女があれを操っているのか。問いかけている余裕は無論なく。"
translation = "왜 그녀가 저것을 조종하고 있는가. 물어볼 여유는 물론 없다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「通してもらう！」"
translation = "「지나간다!」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「──させません」"
translation = "「──그렇게 두지 않습니다」"

[[dialogue]]
speaker = "unk"
original = "先ほどの一撃も、あいにく二度は発動せず──"
translation = "아까 전의 일격도, 공교롭게도 두 번은 발동하지 않고──"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「遅いぜ」"
translation = "「늦었어」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「──喰らえ！\u3000流星ストーーーーム！！」"
translation = "「──받아라! 유성 스톰!!」"

[[dialogue]]
speaker = "unk"
original = "天高く大剣を掲げるアポロ──すると事象はすぐに起こった。"
translation = "하늘 높이 대검을 치켜드는 아폴로──그러자 현상은 곧바로 일어났다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「これは……」"
translation = "「이건……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「流星……！？」"
translation = "「유성……!?」"

[[dialogue]]
speaker = "unk"
original = "降り注ぐ星々の光。"
translation = "쏟아져 내리는 별들의 빛."

[[dialogue]]
speaker = "unk"
original = "幻想的でさえある光景は、しかし破滅的な勢力を伴って地上を蹂躙していた。"
translation = "환상적이기까지 한 광경은, 그러나 파멸적인 세력을 동반하여 지상을 유린하고 있었다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ふはははは！\u3000吹き荒れろ、流れ星たち！\u3000星々の光を灯すのだー！」"
translation = "「푸하하하하! 휘몰아쳐라, 유성들아! 별들의 빛을 밝히는 거다!」"

[[dialogue]]
speaker = "unk"
original = "再構築の瘴気と流星の煌めきが混沌と融合し、乱気流のごとく陰陽のうねりが逆巻いている。"
translation = "재구축의 장기와 유성의 반짝임이 혼돈과 융합하여, 난기류처럼 음양의 물결이 소용돌이치고 있다."

[[dialogue]]
speaker = "unk"
original = "これは──一秒でも放っておくとまずい！"
translation = "이것은──일 초라도 내버려 두면 위험하다!"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──全員！\u3000市民に被害が出ないよう防護壁を展開──星徒会以外のメンバーにも避難誘導を指示してくれ！」"
translation = "「──전원! 시민에게 피해가 가지 않도록 방호벽을 전개──성도회 이외의 멤버에게도 피난 유도를 지시해 줘!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「<ruby>了解<rt>ラジャー</rt></ruby>です──バーミリオンイータ」"
translation = "「알겠습니다──버밀리온 이타」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「防護<ruby>領域<rt>テリトリー</rt></ruby>展開──もう、あんまり柄じゃないのに」"
translation = "「방호영역 전개──이제, 별로 내 스타일도 아닌데」"

[[dialogue]]
speaker = "unk"
original = "星徒会、さらにはプリマステラの生徒たちが全力をもって嵐を食い止める。"
translation = "성도회, 나아가 프리마 스텔라의 학생들이 전력을 다해 폭풍을 막아낸다."

[[dialogue]]
speaker = "unk"
original = "そんなアポロ本人は嵐の中心で愉快げに佇んでいた。"
translation = "그런 아폴로 본인은 폭풍의 중심에서 유쾌하게 서 있었다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「わーっはっはっは！\u3000心地よい風なのだ！」"
translation = "「와핫핫핫하! 기분 좋은 바람인 것이다!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「この星の正体を教えてやる！\u3000流れ星とゆーのはな、寿命が尽きて大気圏で燃え尽きた天体のことを指すのだ！」"
translation = "「이 별의 정체를 알려주마! 유성이라는 건 말이지, 수명이 다해 대기권에서 불타버린 천체를 가리키는 것이다!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「だったらなんだってのよ！」"
translation = "「그래서 뭐 어쨌다는 거야!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「流星にとって、光るのは最期の瞬間だ。だからこれは命のきらめき！\u3000終焉の機を待ち焦がれる流星のともしびなのだ！」"
translation = "「유성에게 있어, 빛나는 건 최후의 순간이다. 그러니 이건 생명의 반짝임! 종언의 때를 애타게 기다리는 유성의 불빛인 것이다!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「人間や《魔王》なんてちっぽけな存在が、リクリエを邪魔するなんて許されないんだぜ！」"
translation = "「인간이나 《마왕》 따위의 보잘것없는 존재가, 리크리에를 방해하는 건 용납될 수 없는 거다!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……！？」"
translation = "「크윽……!?」"

[[dialogue]]
speaker = "unk"
original = "死んだ星の力を使っている──だって？"
translation = "죽은 별의 힘을 사용하고 있다고──라고?"

[[dialogue]]
speaker = "unk"
original = "また、軽々しいテンションでさらに重大な事実を公言したアポロ。"
translation = "또다시, 경솔한 태도로 더욱 중대한 사실을 공언한 아폴로."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……彼女はさしずめ、リクリエの使徒と言ったところでしょうか」"
translation = "「……그녀는 이를테면, 리크리에의 사도라고 할 수 있을까요.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そんな存在が──いや、けどあのオーラ……」"
translation = "「그런 존재가──아니, 하지만 저 오라……」"

[[dialogue]]
speaker = "unk"
original = "実際に、アポロは再構築の瘴気をまとったまま平然としている。"
translation = "실제로, 아폴로는 재구축의 장기를 두른 채 태연하다."

[[dialogue]]
speaker = "unk"
original = "この少女そのものがそういう存在であるとしか思えないのも確かだった。"
translation = "이 소녀 자체가 그런 존재라고밖에 생각할 수 없는 것도 분명했다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「──残念だけど！\u3000あんたの思う通りにはならないわ」"
translation = "「──유감이지만! 네가 생각하는 대로 되지는 않을 거야」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「こっちにクロトがいる限り──平和な未来はしっかり約束されてるんだから！」"
translation = "「이쪽에 쿠로토가 있는 한──평화로운 미래는 확실히 약속되어 있으니까!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ふふーん。それはどうかな」"
translation = "「후후. 그건 어떨까나」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは今も《魔王》である俺を信頼している。"
translation = "비너스는 지금도 《마왕》인 나를 신뢰하고 있다."

[[dialogue]]
speaker = "unk"
original = "そんな彼女を見て、アポロは不敵に笑った。"
translation = "그런 그녀를 보고, 아폴로는 무서우리만치 웃었다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「っ……！？\u3000これって──」"
translation = "「크윽……!? 이거──」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスの持っていた日誌が、いつかと同じように共鳴を始めた。"
translation = "비너스가 가지고 있던 일지가, 언젠가와 마찬가지로 공명을 시작했다."

[[dialogue]]
speaker = "unk"
original = "しかし──"
translation = "하지만──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「もしかして、新しいページが──！？」"
translation = "「혹시, 새로운 페이지가──!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ううん、違う──これ……書き換えられてる……！」"
translation = "「아니, 달라──이거…… 고쳐 쓰고 있어……!」"

[[dialogue]]
speaker = "unk"
original = "どす黒いオーラに包まれて、未来の日誌は自動でページをめくられていく。"
translation = "시커먼 오라에 휩싸여, 미래의 일지는 자동으로 페이지가 넘어간다."

[[dialogue]]
speaker = "unk"
original = "しかも、その内容は……"
translation = "게다가, 그 내용은……"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「『荒鷹ノ──月──十四──日。い──偉大なる真の<b>ひーろー</b>、アポロ様が出現し、人間界は恐れおののく』」"
translation = "「『황응의──달──십사──일. 위──위대한 진정한 <b>히어로</b>, 아폴로 님이 출현하여, 인간계는 두려워 떤다』」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「『終焉の時は近い。救世主の誕生を祝うのだ。アポロ様ばんざい、アポロ様さいこう』──って、何……これ……！？」"
translation = "「『종언의 때는 가깝다. 구세주의 탄생을 축하하는 것이다. 아폴로 님 만세, 아폴로 님 최고』──라니, 뭐…… 뭐야……!?」"

[[dialogue]]
speaker = "unk"
original = "未来の日誌。その書き換え。この事実が示す現象は……"
translation = "미래의 일지. 그 고쳐 쓰기. 이 사실이 나타내는 현상은……"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「未来の──改竄──っ……？」"
translation = "「미래의──개찬──……?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ふっふっふっふ！\u3000<b>どこ</b>から持ってきたのか知らないけど、そんなアイテムこのアポロ様の前では無力！」"
translation = "「훗훗훗훗! <b>어디</b>서 가져왔는지는 모르겠지만, 그런 아이템은 이 아폴로 님 앞에서는 무력하다!」"

[[dialogue]]
speaker = "unk"
original = "その時、ひときわ強い流星の嵐が彼女を中心に巻き起こった。"
translation = "그때, 유난히 강한 유성의 폭풍이 그녀를 중심으로 휘몰아쳤다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「なぜなら正義のヒーローとは！\u3000どんな悲惨な運命でもひっくり返すからヒーローなのだ！」"
translation = "「왜냐하면 정의의 히어로란! 어떤 비참한 운명이라도 뒤집어엎기 때문에 히어로인 것이다!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「っつ──！」"
translation = "「크으──!」"

[[dialogue]]
speaker = "unk"
original = "前が見えないほど強まっていく混沌の旋風。"
translation = "앞이 보이지 않을 정도로 강해지는 혼돈의 선풍."

[[dialogue]]
speaker = "unk"
original = "この間も、体中に星力の加護をかけ続けなければ持っていかれてしまう。"
translation = "이 와중에도, 온몸에 성력의 가호를 계속 걸지 않으면 휩쓸려가 버린다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「確かに中々の歯ごたえだったぞ緋宮クロト──だがあたしの求める真のおまえには程遠い！」"
translation = "「확실히 꽤나 씹는 맛이 있었도다 히노미야 쿠로토──하지만 내가 원하는 진정한 너에게는 한참 멀었다!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「どうやら覚醒にはまだ条件が必要なようだ。そしてホントの魔王を倒さない限り、あたしは真のヒーローになれん！」"
translation = "「아무래도 각성에는 아직 조건이 필요한 듯하다. 그리고 진짜 마왕을 쓰러뜨리지 않는 한, 나는 진정한 히어로가 될 수 없다!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「せいぜい次回までにその牙、しっかり研いでおくのだな！」"
translation = "「다음번까지 그 어금니, 열심히 갈아두도록 해라!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ──なんだって？！」"
translation = "「크윽──뭐라고?!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「いくぞギエル、今宵はここまでだ！」"
translation = "「간다 기엘, 오늘 밤은 여기까지다!」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「は──仰せのままに」"
translation = "「하──분부대로」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「待てアポロ──話は終わってないぞ！\u3000君はどこから──」"
translation = "「기다려 아폴로──이야기는 안 끝났어! 너는 어디서──」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「わっはっは！\u3000また会おうぞ魔王、我が宿敵よ！」"
translation = "「와핫핫하! 또 만나자 마왕, 나의 숙적이여!」"

[[dialogue]]
speaker = "unk"
original = "俺の呼び声はむなしく嵐にかき消され──"
translation = "나의 외침은 허무하게 폭풍에 휩쓸려 사라지고──"

[[dialogue]]
speaker = "unk"
original = "当の彼女もまた、発散する風よろしく姿をくらましてしまった。"
translation = "정작 그녀 또한, 발산하는 바람처럼 모습을 감춰버렸다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「うそ……戻っちゃった」"
translation = "「거짓말…… 돌아가 버렸어」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「何だったのかしら、本当……？」"
translation = "「뭐였던 걸까, 정말……?」"

[[dialogue]]
speaker = "unk"
original = "アポロが去ったと同時に、再び晴れていく夜の帳。"
translation = "아폴로가 사라짐과 동시에, 다시 맑아지는 밤의 장막."

[[dialogue]]
speaker = "unk"
original = "また彼女に従っていたギエルや、統率されていたモンスター達まで露と消えてしまっていた。"
translation = "또한 그녀에게 복종하던 기엘이나, 통솔되던 몬스터들까지 이슬처럼 사라져 버렸다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ただの少女ではないかと」"
translation = "「그냥 소녀는 아닐 겁니다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ……」"
translation = "「아아……」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「愚問だ。緋宮クロト──おまえこそが魔王であり、そして、魔王を倒すのはヒーローの宿命だと、太古の昔から決まっているからだ！」"
translation = "「어리석은 질문이다. 히노미야 쿠로토──너야말로 마왕이며, 그리고 마왕을 쓰러뜨리는 것은 히어로의 숙명이라고, 태고적부터 정해져 있기 때문이다!」"

[[dialogue]]
speaker = "unk"
original = "数々の意味深な発言を残していったアポロ。少なくとも、俺たちと縁深い存在であるのは確かだろう。"
translation = "수많은 의미심장한 발언을 남기고 간 아폴로. 적어도 우리와 인연이 깊은 존재인 것은 확실할 것이다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ヴィーナス……」"
translation = "「비너스……」"

[[dialogue]]
speaker = "unk"
original = "彼女が全幅の信頼を置いていた“未来の日誌”──"
translation = "그녀가 전폭적인 신뢰를 두고 있던 “미래의 일지”──"

[[dialogue]]
speaker = "unk"
original = "それさえも書き換えられる彼女は、一体何者だというのだろうか。"
translation = "그것마저도 고쳐 쓸 수 있는 그녀는, 대체 누구라는 말인가."

