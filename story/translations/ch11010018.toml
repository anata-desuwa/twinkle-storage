[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「やっほ～、お疲れさま～♪\u3000元気してるー？\u3000……って、あれ？」"
translation = "「얏호~ 수고했어~♪ 잘 지내? ……어라?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「今は俺１人ですよ」"
translation = "「지금은 저 혼자예요.」"

[[dialogue]]
speaker = "unk"
original = "お菓子の買い出しだったり、家の用事だったりで、星徒会室で仕事しているのはたまたま俺だけだ。"
translation = "과자 사러 가거나 집안일 등으로 성도회실에서 일하고 있는 건 마침 나뿐이다."

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「そっかそっか、それは残念──」"
translation = "「그렇구나 그렇구나, 그건 아쉽──」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「でもないんだな、これが♪」"
translation = "「지도 않지롱, 이게♪」"

[[dialogue]]
speaker = "unk"
original = "２人きりと見るや否や、シルヴィ先輩がぐっと顔を近づけてきて、唇が重なる。"
translation = "둘뿐이라는 걸 알자마자 실비 선배가 훅 얼굴을 가까이 대고 입술이 겹친다."

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「んちゅっ……ちゅ、ちゅ……ちゅる、ちゅぱ……れるれろ……れぇろん……んふ……じゅる、じゅるる……<emoji=heart04>」"
translation = "「응츄…… 츄, 츄…… 츄르, 츄파…… 레루레로…… 레에론…… 응후…… 쥬르, 쥬르르……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "<ruby>啄<rt>ついば</rt></ruby>むようなキスから始まり、舌を絡め合う濃密に変わっていく。"
translation = "쪼는 듯한 키스에서 시작해 혀를 섞는 농밀한 키스로 변해간다."

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「くちゅ、ちゅるる……ちゅぷ、ちゅぱ……ふぅ……ちゅくるれろ、れる、るれるる……じゅぷぷ……<emoji=heart04>」"
translation = "「쿠츄, 츄르르…… 츄푸, 츄파…… 후우…… 츄쿠루레로, 레루, 루레루루…… 쥬푸푸……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "最初はあんなに初々しいキスだったのに、今や俺もシルヴィ先輩も大人のキスに夢中だ。"
translation = "처음엔 그렇게 풋풋한 키스였는데 이제는 나도 실비 선배도 어른스러운 키스에 몰두하고 있다."

[[dialogue]]
speaker = "unk"
original = "そしてシルヴィ先輩の大きな胸が密着し、ふにゅっと柔らかな感触とともに押し潰される。"
translation = "그리고 실비 선배의 커다란 가슴이 밀착되어 말랑하고 부드러운 감촉과 함께 짓눌린다."

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「んん……ぷぁ──っ<emoji=heart04>\u3000おや？\u3000おやおや？\u3000君のここ、おっきくなってないかな～？」"
translation = "「응응…… 푸아──아<emoji=heart04> 어라? 어라라? 너 여기 커진 거 아냐~?」"

[[dialogue]]
speaker = "unk"
original = "ズボンの上から股間をさわさわと撫でられる。"
translation = "바지 위에서 가랑이를 살살 쓰다듬는다."

[[dialogue]]
speaker = "unk"
original = "強い刺激ではないのに、たまらなく心地良くて、下半身にさらに血流が集まってくる。"
translation = "강한 자극이 아닌데도 참을 수 없이 기분 좋아서 하반신에 더욱 혈류가 모여든다."

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「ま、あたしおっぱい大きいから仕方ないよね。会長くんも男の子だもん。じゃあ──」"
translation = "「뭐, 나 가슴 크니까 어쩔 수 없지. 회장군도 남자애인걸. 그럼──」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「へ～んしん<emoji=heart04>」"
translation = "「벼~언신<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「どうして今変身したんですか！？」"
translation = "「왜 지금 변신하신 건가요!?」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「だってこっちでしたことないでしょ？\u3000場所や格好が変わると新鮮な気持ちでできるっていうじゃん。だから──」"
translation = "「그야 이 모습으로 해본 적 없잖아? 장소나 복장이 바뀌면 신선한 기분으로 할 수 있다고 하잖아. 그러니까──」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「いっぱいしちゃお……？」"
translation = "「잔뜩 해버리자……?」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「じゃーん<emoji=heart04>」"
translation = "「짜잔<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "机に体を預け、大胆に足を開くシルヴィ先輩。"
translation = "책상에 몸을 맡기고 대담하게 다리를 벌리는 실비 선배."

[[dialogue]]
speaker = "unk"
original = "大きなおっぱいも露わになっていて、豊かな胸が蠱惑的に揺れる。"
translation = "커다란 가슴도 드러나 있어 풍만한 가슴이 매혹적으로 흔들린다."

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「会長くん、おっぱいすごく見てる♪\u3000えっちなんだから♪」"
translation = "「회장군, 가슴 엄청 보고 있네♪ 에치하다니까♪」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「サーシャも蛍火ちゃんもおっきいから、陰じゃおっぱい星徒会とか言われてたんだよねー」"
translation = "「사샤도 호타루비짱도 크니까 몰래 가슴 성도회라고 불렸었거든~」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「こういう時に他の女の人の名前は出しちゃダメですよ」"
translation = "「이럴 때 다른 여자분 이름은 내면 안 돼요.」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「あはは、それ普通こっちのセリフ♪」"
translation = "「아하하, 그거 보통 이쪽 대사♪」"

[[dialogue]]
speaker = "unk"
original = "こんな時でもシルヴィ先輩は変わらなくて、けらけらと明るく笑う。"
translation = "이런 때에도 실비 선배는 변함없이 낄낄거리며 밝게 웃는다."

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「おち○ぽも元気だ<emoji=heart04>\u3000このおち○ぽでズボズボしてもらったら、おま○ことっても気持ちいいんだろうな～<emoji=heart04>」"
translation = "「자지도 팔팔해<emoji=heart04> 이 자지로 박아대면 보지 엄청 기분 좋겠지~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "シルヴィ先輩が期待を込めた目で俺の股間に視線を送る。"
translation = "실비 선배가 기대를 담은 눈으로 내 가랑이에 시선을 보낸다."

[[dialogue]]
speaker = "unk"
original = "屹立したペニスはビクビクと脈打ち、シルヴィ先輩のスリットからは蜜がにじんでいた。"
translation = "우뚝 선 페니스는 움찔거리며 맥동하고 실비 선배의 가랑이 사이에서는 꿀이 배어 나오고 있었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「はい。いっぱい気持ち良くしてあげますから」"
translation = "「네. 잔뜩 기분 좋게 해드릴 테니까요.」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「うん、楽しみ<emoji=heart04>\u3000会長くんもたくさん気持ち良くしてあげるから♪」"
translation = "「응, 기대돼<emoji=heart04> 회장군도 잔뜩 기분 좋게 해줄 테니까♪」"

[[dialogue]]
speaker = "unk"
original = "恋人関係になった俺とシルヴィ先輩は、一度体を重ねてからというもの、ことある度にエッチしていた。"
translation = "연인 관계가 된 나와 실비 선배는 한 번 몸을 섞고 난 뒤로 틈만 나면 섹스를 하고 있었다."

[[dialogue]]
speaker = "unk"
original = "慎むべきだと思っていても衝動は抑えられず、シルヴィ先輩の肉感的な体を前にすれば尚更だ。"
translation = "삼가야 한다고 생각하면서도 충동은 억제되지 않았고 실비 선배의 육감적인 몸을 앞두면 더욱 그랬다."

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「じゃ……あたしのおま○こに、君のおち○ぽ入れて……<emoji=heart04>」"
translation = "「그럼…… 내 보지에 네 자지 넣어줘……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "シルヴィ先輩のエッチなおねだりに誘われるまま、ペニスを中へ押し込んだ。"
translation = "실비 선배의 야한 조름에 이끌리는 대로 페니스를 안으로 밀어 넣었다."

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「んん～～～っ<emoji=heart04>\u3000おっきなおち○ぽ、入ってきたぁ……<emoji=heart04>\u3000はぁ……はっ……んん<emoji=heart04>」"
translation = "「응으으으으읏<emoji=heart04> 커다란 자지 들어왔다아……<emoji=heart04> 하아…… 하앗…… 응응<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "シルヴィ先輩の中はもう蜜で潤っていて、トロトロの感触がたまらない。"
translation = "실비 선배의 안은 이미 꿀로 젖어 있어 걸쭉한 감촉이 참을 수 없다."

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「んっ……はっ……あっ……あんっ<emoji=heart04>\u3000あたしの中で、動いてる……<emoji=heart04>\u3000これ、好きぃ……<emoji=heart04>」"
translation = "「응읏…… 하앗…… 앗…… 앙읏<emoji=heart04> 내 안에서 움직이고 있어……<emoji=heart04> 이거 좋아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「おっきくて、かたくて……あたしの中、君でいっぱいになってるぅ……んんっ<emoji=heart04>\u3000ふっ、はぁ、はぁ<emoji=heart04>」"
translation = "「크고 딱딱해서…… 내 안, 너로 가득 찼어어…… 응응읏<emoji=heart04> 훗, 하아, 하아<emoji=heart04>」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「はぁ、あっ……前はこんなの、知らなかったのに……はあぁ……今は君のがないと、生きていけないかも……<emoji=heart04>」"
translation = "「하아, 앗…… 전에는 이런 거 몰랐는데…… 하아아…… 지금은 네 게 없으면 못 살지도 몰라……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "シルヴィ先輩の中は柔らかいのに締まりが良くて、ゾクゾクと快感が走る。"
translation = "실비 선배의 안은 부드러우면서도 조임이 좋아 오싹오싹 쾌감이 달린다."

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「んはぁ、はぁ……<emoji=heart04>\u3000どう？\u3000あたしのおま○こ気持ちいい？」"
translation = "「응하아, 하아……<emoji=heart04> 어때? 내 보지 기분 좋아?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「はい、すごく気持ちいいです……っ」"
translation = "「네, 정말 기분 좋아요……읏」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「あはっ♪\u3000嬉しい<emoji=heart04>\u3000じゃあおま○こ締めてあげる……んんっ<emoji=heart04>」"
translation = "「아핫♪ 기뻐<emoji=heart04> 그럼 보지 조여줄게…… 응응읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "シルヴィ先輩が下半身をぎゅっと締め、強く絞られて、それだけで射精しそうになった。"
translation = "실비 선배가 하반신을 꽉 조였고, 강하게 조여지는 것만으로도 사정할 것 같았다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くっ……俺のち○ぽ、気持ちいいですか？」"
translation = "「윽…… 제 자지, 기분 좋은가요?」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「うんっ、もちろん<emoji=heart04>\u3000とっても気持ちいいよ<emoji=heart04>」"
translation = "「응, 물론<emoji=heart04> 정말 기분 좋아<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「じゃあ、どう気持ちいいか教えてください」"
translation = "「그럼 어떻게 기분 좋은지 가르쳐주세요.」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「えっ、それ言わせるの？\u3000んっ、はぁ……いいけど、説明するの、苦手、なんだよね……んんっ<emoji=heart04>\u3000はぁ、はぁんっ<emoji=heart04>」"
translation = "「엣, 그걸 말하게 하려는 거야? 응, 하아…… 상관없지만, 설명하는 건, 서투르, 단 말이지…… 응응<emoji=heart04> 하아, 하앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "シルヴィが答えようとしている間も、動きを緩めることなく膣を突く。"
translation = "실비가 대답하려 하는 동안에도, 움직임을 늦추지 않고 질을 찌른다."

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「んはぁ、あぁ、あんっ<emoji=heart04>\u3000えっと、会長くんのおち○ぽ、熱くて……入ってるだけで、気持ち良くなっちゃうぅ<emoji=heart04>」"
translation = "「은하아, 아아, 안<emoji=heart04> 에또, 회장군의 자지, 뜨거워서…… 들어와 있는 것만으로도, 기분 좋아져 버려어<emoji=heart04>」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「それにかたくて、あたしの中、押し広げられて……はぁ……おっきくて、たくさん擦れてぇ……んはぁ、はぁ……<emoji=heart04>」"
translation = "「게다가 딱딱해서, 내 안, 비집고 들어와서…… 하아…… 커다랗고, 잔뜩 스쳐서어…… 은하아, 하아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「はぁはっ、はぁっ……おち○ぽの出っ張ったところが、気持ちいいとこに当たるのも、好きぃっ<emoji=heart04>」"
translation = "「하아하아, 하앗…… 자지의 툭 튀어나온 부분이, 기분 좋은 곳에 닿는 것도, 좋아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「んんんっ<emoji=heart04>\u3000あたしの中で、おち○ぽビクビクして、おっきくなって……あたしにエッチなこと言わせるの、そんなに興奮したんだぁ……<emoji=heart04>」"
translation = "「응응응<emoji=heart04> 내 안에서, 자지가 움찔움찔하면서, 커져서…… 나한테 야한 말을 하게 만드는 게, 그렇게 흥분됐구나아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「でもそんなエッチなところも好き<emoji=heart04>\u3000はっ、あっ……いつもは真面目なのに、あたしにはエッチになってくれるの<emoji=heart04>」"
translation = "「하지만 그런 야한 부분도 좋아<emoji=heart04> 핫, 앗…… 평소에는 성실하면서, 나한테는 야하게 변해주는구나<emoji=heart04>」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「そんな会長くんが好きっ<emoji=heart04>\u3000はぁっ、あっ……あたしの会長くん<emoji=heart04>\u3000会長くん、好きぃっ<emoji=heart04>」"
translation = "「그런 회장군이 좋아<emoji=heart04> 하앗, 앗…… 나의 회장군<emoji=heart04> 회장군, 좋아아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺を好きと言ってくれるシルヴィ先輩がひたすらに愛おしい。"
translation = "나를 좋아한다고 말해주는 실비 선배가 한없이 사랑스럽다."

[[dialogue]]
speaker = "unk"
original = "広い星徒会室にふたりきり。"
translation = "넓은 성도회실에 단둘이."

[[dialogue]]
speaker = "unk"
original = "淫らな水音と、嬌声が部屋だけが部屋に響く。"
translation = "음란한 물소리와, 교성만이 방에 울려 퍼진다."

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000星徒会室で、エッチしちゃってるっ<emoji=heart04>\u3000みんなで仕事する場所、なのにっ……<emoji=heart04>\u3000あたしも使ってた、星徒会室なのにっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 성도회실에서, 섹스해버리고 있어<emoji=heart04> 다 같이 일하는 장소, 인데도……<emoji=heart04> 나도 사용하던, 성도회실인데엣……<emoji=heart04>」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「はぁっ、あっ、あんっ<emoji=heart04>\u3000でも気持ちいいよっ<emoji=heart04>\u3000いけないことしてるのに……んっ、はっ、あっ……<emoji=heart04>」"
translation = "「하앗, 앗, 안<emoji=heart04> 하지만 기분 좋아아<emoji=heart04> 안 될 짓을 하고 있는데…… 응, 핫, 앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「ううん、いけないことしてるから、気持ちいいんだよね……んはぁ、はぁ、はぁ……<emoji=heart04>\u3000ゾクゾクして、いつもより、気持ちいいっ<emoji=heart04>」"
translation = "「으응, 안 될 짓을 하고 있으니까, 기분 좋은 거네…… 은하아, 하아, 하아……<emoji=heart04> 소름 돋아서, 평소보다, 기분 좋아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "神聖な星徒会で行為に及ぶ背徳感がスパイスとなり、快感を引き上げていた。"
translation = "신성한 성도회에서 행위에 미치는 배덕감이 향신료가 되어, 쾌감을 끌어올리고 있었다."

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「はは……サーシャにバレたら、ズタズタにされちゃうかも……」"
translation = "「하하…… 사샤에게 들키면, 갈기갈기 찢겨버릴지도……」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「でも本当にバレたら、あたしが誘惑したって言っていいからねっ……はぁ、あっ……んんっ<emoji=heart04>\u3000あたしのせいにしていいから……はあぁ、あんっ……<emoji=heart04>」"
translation = "「하지만 정말로 들키면, 내가 유혹했다고 말해도 되니까 말야…… 하아, 앗…… 응응<emoji=heart04> 내 탓으로 돌려도 되니까…… 하아아, 안……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そんなこと言いませんよ……くっ……怒られる時は一緒です」"
translation = "「그런 소리 안 해요…… 큭…… 혼날 때는 함께입니다.」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「えへへ<emoji=heart04>\u3000そう言ってくれるところも好きぃ<emoji=heart04>\u3000ふぁ、はっ、はぁ……うん、怒られる時は、一緒にこってり絞られようね……<emoji=heart04>」"
translation = "「에헤헤<emoji=heart04> 그렇게 말해주는 부분도 좋아아<emoji=heart04> 화, 핫, 하아…… 응, 혼날 때는, 같이 듬뿍 혼나자……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "喘ぎながら嬉しそうに笑うシルヴィ先輩がかわいくて、また唇を重ねる。"
translation = "신음하며 기쁜 듯이 웃는 실비 선배가 귀여워서, 다시 입술을 겹친다."

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「んむ……んちゅる、ちゅるちゅる……ふぅ……ちゅぷ、ちゅるるっ<emoji=heart04>\u3000れるれろ<emoji=heart04>\u3000んんむ、るれろ、れろ<emoji=heart04>」"
translation = "「음무…… 응츄루, 츄루츄루…… 후우…… 츄푸, 츄루루<emoji=heart04> 레루레로<emoji=heart04> 음음무, 루레로, 레로<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "より深く、より奥へ舌を伸ばして絡め合う。"
translation = "보다 깊게, 보다 안쪽으로 혀를 뻗어 서로 얽는다."

[[dialogue]]
speaker = "unk"
original = "腰を揺らしてペニスを突き入れながら、シルヴィ先輩を味わう。"
translation = "허리를 흔들며 페니스를 찔러 넣으면서, 실비 선배를 맛본다."

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「んふっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000んちゅ、ちゅるちゅる……チューするの、しゅきぃ……ちゅく、ちゅくるんっ<emoji=heart04>」"
translation = "「음후<emoji=heart04> 응응<emoji=heart04> 응츄, 츄루츄루…… 키스하는 거, 죠아아…… 츄쿠, 츄쿠룬<emoji=heart04>」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「んちゅっ……ちゅるるるっ……じゅるるんっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふっ、んんっ<emoji=heart04>\u3000じゅるちゅぱっ、ちゅるっ……ちゅるるっ……じゅく、じゅるるるっ<emoji=heart04>」"
translation = "「응츄…… 츄루루루…… 쥬루룬<emoji=heart04> 응<emoji=heart04> 훗, 응응<emoji=heart04> 쥬루츄파, 츄루…… 츄루루…… 쥬쿠, 쥬루루루<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "シルヴィ先輩が愛おしくて、彼女を求める情動が激しくなっていく。"
translation = "실비 선배가 사랑스러워서, 그녀를 원하는 충동이 격렬해져 간다."

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「ふあぁあ～～～っ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ああっ<emoji=heart04>\u3000ああぁんっ<emoji=heart04>\u3000すごいっ<emoji=heart04>\u3000おち○ぽ激しいよぉっ<emoji=heart04>」"
translation = "「후아아아～～앗<emoji=heart04> 앗<emoji=heart04> 아앗<emoji=heart04> 아아앙<emoji=heart04> 대단해<emoji=heart04> 자지 격렬해엣<emoji=heart04>」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「会長くんの、奥に、届くぅ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000お腹の奥に、響いて、キュンって、なるぅっ<emoji=heart04>\u3000んはぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んん～～～っ<emoji=heart04>」"
translation = "「회장군의, 안쪽까지, 닿아아<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 배 속 깊은 곳까지, 울려서, 큥하고, 되어버려어<emoji=heart04> 은하앗<emoji=heart04> 앗<emoji=heart04> 응응응～～앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ズンズン、乱暴に突かれてっ<emoji=heart04>\u3000んぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000おま○こ、壊れちゃうぅっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 즈음즈음, 난폭하게 찔려서어<emoji=heart04> 응아앗<emoji=heart04> 앗<emoji=heart04> 보지, 망가져버려어<emoji=heart04>」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「でもいいよっ<emoji=heart04>\u3000あたし頑丈だから、壊れるぐらい突いてっ<emoji=heart04>\u3000思いっきり突いてっ<emoji=heart04>」"
translation = "「하지만 괜찮아아<emoji=heart04> 나 튼튼하니까, 망가질 정도로 찔러줘어<emoji=heart04> 마음껏 찔러줘어<emoji=heart04>」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「あたしのこと、むちゃくちゃにしてぇっ<emoji=heart04>\u3000君の全部、受け止めるからぁっ<emoji=heart04>\u3000んあっ<emoji=heart04>\u3000あぁ～～っ<emoji=heart04>」"
translation = "「나를, 엉망진창으로 만들어줘어<emoji=heart04> 너의 전부, 받아낼 테니까아<emoji=heart04> 응앗<emoji=heart04> 아아～～앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そこまで言われて欲望を抑えられるはずはなく、奥めがけて全力で突き入れる。"
translation = "그렇게까지 말을 듣고 욕망을 억누를 수 있을 리는 없었고, 안쪽을 향해 전력으로 찔러 넣는다."

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「ひやぁああ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「히야아아아～～～～～～앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「子宮にっ<emoji=heart04>\u3000ズンッて<emoji=heart04>\u3000来てっ<emoji=heart04>\u3000ヤバいっ<emoji=heart04>\u3000ひぁっ<emoji=heart04>\u3000あぁっ<emoji=heart04>\u3000頭、まっしろに、なっちゃうぅっ<emoji=heart04>」"
translation = "「자궁에에<emoji=heart04> 즈음하고<emoji=heart04> 와서어<emoji=heart04> 위험해에<emoji=heart04> 히아앗<emoji=heart04> 아아앗<emoji=heart04> 머릿속이, 하얗게, 되어버려어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "亀頭が子宮口を叩いた瞬間、膣壁が震えながらぎゅっとしがみついてくる。"
translation = "귀두가 자궁구를 때린 순간, 질벽이 떨리며 꽉 매달려 온다."

[[dialogue]]
speaker = "unk"
original = "シルヴィ先輩の中はたっぷりの蜜で洪水のようになっていて、濡れた肉ひだが絡みついてきた。"
translation = "실비 선배의 안은 듬뿍 담긴 애액으로 홍수가 난 것 같았고, 젖은 살주름이 얽혀왔다."

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「んはぁっ、はっ、はんっ<emoji=heart04>\u3000かたいおち○ぽで<emoji=heart04>\u3000子宮、突かれてっ<emoji=heart04>\u3000おま○こ気持ちいいっ<emoji=heart04>」"
translation = "「은하앗, 하앗, 하앙<emoji=heart04> 딱딱한 자지로<emoji=heart04> 자궁, 찔려서어<emoji=heart04> 보지 기분 좋아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「はぁっ<emoji=heart04>\u3000はっ<emoji=heart04>\u3000ああぁっ<emoji=heart04>\u3000会長くんの、いっぱい、奥当たってるっ<emoji=heart04>\u3000奥に当たるの、ヤバいぃっ<emoji=heart04>」"
translation = "「하앗<emoji=heart04> 하앗<emoji=heart04> 아아아앗<emoji=heart04> 회장군의, 잔뜩, 안쪽에 닿고 있어어<emoji=heart04> 안쪽에 닿는 거, 위험해에<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "抜けかけるまでペニスを引くと、すぐさま奥に突き出し、荒々しく何度も叩きつける。"
translation = "빠지기 직전까지 페니스를 뺐다가, 곧바로 안쪽으로 찔러넣으며 거칠게 몇 번이고 때려 박는다."

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「んぁっ、あっ、ふぁああっ<emoji=heart04>\u3000おち○ぽ出たり入ったりして<emoji=heart04>\u3000ふぁっ<emoji=heart04>\u3000<emoji=heart04>\u3000すごいっ<emoji=heart04>\u3000奥まで<emoji=heart04>\u3000ズンッてくるぅっ<emoji=heart04>」"
translation = "「응아앗, 앗, 화아아앗<emoji=heart04> 자지 들락날락거려서어<emoji=heart04> 화앗<emoji=heart04> <emoji=heart04> 대단해에<emoji=heart04> 안쪽까지<emoji=heart04> 즈음하고 와아<emoji=heart04>」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「会長くん<emoji=heart04>\u3000会長くん<emoji=heart04>\u3000はっ──あっ──あっ──んぁああっ<emoji=heart04>\u3000はっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ひぁあああっ<emoji=heart04>」"
translation = "「회장군<emoji=heart04> 회장군<emoji=heart04> 하앗──앗──앗──응아아앗<emoji=heart04> 하앗<emoji=heart04> 앗<emoji=heart04> 히아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "シルヴィ先輩も腰を揺らし、夢中になって快楽に酔う。"
translation = "실비 선배도 허리를 흔들며, 정신없이 쾌락에 취한다."

[[dialogue]]
speaker = "unk"
original = "暴れるようにおっぱいが揺れて、衝動的に手を伸ばした。"
translation = "날뛰듯이 가슴이 흔들려, 충동적으로 손을 뻗었다."

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「んん～～～っ<emoji=heart04>\u3000おっぱい、ぐにぐに、されてるぅっ<emoji=heart04>\u3000君に触られると、おっぱい、熱いぃっ<emoji=heart04>」"
translation = "「응응응～～앗<emoji=heart04> 가슴, 주물주물, 당하고 있어어<emoji=heart04> 네가 만지면, 가슴, 뜨거워어<emoji=heart04>」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「あたし頑丈だから、乱暴でもいいよっ<emoji=heart04>\u3000ううん、乱暴にしてっ<emoji=heart04>\u3000めちゃくちゃにしてぇっ<emoji=heart04>」"
translation = "「나 튼튼하니까, 난폭해도 괜찮아아<emoji=heart04> 으응, 난폭하게 해줘어<emoji=heart04> 엉망진창으로 만들어줘어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "シルヴィ先輩の言葉で欲望のタガが外れ、おっぱいを力任せに揉みしだく。"
translation = "실비 선배의 말에 욕망의 고삐가 풀려, 가슴을 힘껏 주물러댄다."

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「んんんっ<emoji=heart04>\u3000ぐにぐに、ぐにぐにって、おっぱい、おもちゃにされてるみたい<emoji=heart04>\u3000はぁ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>」"
translation = "「응응응<emoji=heart04> 주물주물, 주물주물하고, 가슴, 장난감 취급당하는 것 같아아<emoji=heart04> 하아<emoji=heart04> 앗<emoji=heart04> 후아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ぎゅっと握ると乳の肉が指からこぼれ、その柔らかさを貪るように味わう。"
translation = "꽉 움켜쥐자 가슴살이 손가락 사이로 넘쳐흘렀고, 그 부드러움을 탐하듯 맛본다."

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「ひやぁああああっ<emoji=heart04>\u3000あたしのおっぱい、会長くんに、揉みくちゃにされてるぅ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000ふあぁあっ<emoji=heart04>\u3000はあぁんっ<emoji=heart04>」"
translation = "「히야아아아아앗<emoji=heart04> 내 가슴, 회장군한테, 엉망진창으로 주물러지고 있어어<emoji=heart04> 응응<emoji=heart04> 후아아앗<emoji=heart04> 하아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「シルヴィ先輩……！」"
translation = "「실비 선배……!」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「うん、もう出そうなんだよね……あたしの中で、おち○ぽビクビク、ビクビクって、震えてるもんっ<emoji=heart04>」"
translation = "「응, 이제 나올 것 같네에…… 내 안에서, 자지 움찔움찔, 움찔움찔하고, 떨리고 있는걸<emoji=heart04>」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「あたしもイキそうなのっ<emoji=heart04>\u3000おま○こキュンキュンして、お腹の奥、切なくてイキそうなのっ<emoji=heart04>」"
translation = "「나도 갈 것 같아아<emoji=heart04> 보지 큥큥거리고, 배 속 깊은 곳이, 애달파서 갈 것 같아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「だから一緒にイこ？\u3000中に、びゅーって、出して<emoji=heart04>\u3000一緒にイッて、君のせーえき、いっぱい出してぇっ<emoji=heart04>」"
translation = "「그러니까 같이 가자? 안에다, 뷰우우하고, 내보내 줘어<emoji=heart04> 같이 가면서, 너의 정액, 잔뜩 내보내 줘어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ここまで言われたら男としてたまらない。絶頂に向かってしゃにむに腰を振る。"
translation = "이런 말까지 들으니 남자로서 견딜 수가 없다. 절정을 향해 미친 듯이 허리를 흔든다."

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「んぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あぁあんっ<emoji=heart04>\u3000奥まで、ズンズン、突かれてるっ<emoji=heart04>\u3000はぁはっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんぅっ<emoji=heart04>」"
translation = "「응아앗<emoji=heart04> 앗<emoji=heart04> 아아앙<emoji=heart04> 안쪽까지, 즈음즈음, 찔리고 있어어<emoji=heart04> 하아하앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 응응으앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「君のおち○ぽで、おま○こイッちゃうぅっ<emoji=heart04>\u3000おち○ぽすごいっ<emoji=heart04>\u3000んぁっ<emoji=heart04>\u3000イクっ<emoji=heart04>\u3000イクぅっ<emoji=heart04>」"
translation = "「너의 자지로, 보지 가버려어어<emoji=heart04> 자지 대단해에<emoji=heart04> 응아앗<emoji=heart04> 이쿠, 이쿠우우<emoji=heart04>」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「あ──あ──あ──んぁああっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000お腹の奥、キュンってして<emoji=heart04>\u3000イクイクイクっ<emoji=heart04>\u3000おま○こイッちゃうぅ～～～っ<emoji=heart04>」"
translation = "「아──아──아──응아아앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 배 속 깊은 곳이, 큥하고 거려서어<emoji=heart04> 이쿠이쿠이쿠우<emoji=heart04> 보지 가버려어어어～～앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「ふぁああ～～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아～～～～～～～～～～앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「んん～～～っ<emoji=heart04><emoji=heart04>\u3000熱いぃっ<emoji=heart04>\u3000奥にびゅびゅびゅーって、出てるっ<emoji=heart04>\u3000勢い、すごいぃっ<emoji=heart04>\u3000ふっ……あっ……あぁ～～っ<emoji=heart04>」"
translation = "「응응응～～앗<emoji=heart04><emoji=heart04> 뜨거워어어<emoji=heart04> 안쪽에 뷰뷰뷰우우하고, 나오고 있어어<emoji=heart04> 기세, 대단해에에<emoji=heart04> 훗…… 앗…… 아아～～앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000おち○ぽ、ぐりぐりしながら、射精されてっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000これ、ヤバいっ<emoji=heart04>\u3000んぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ん～～っ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 자지, 부비부비하면서, 사정당해서어<emoji=heart04> 응응<emoji=heart04> 이거, 위험해에<emoji=heart04> 응아앗<emoji=heart04> 앗<emoji=heart04> 응～～앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "シルヴィ先輩も同時に絶頂し、ぎゅうっと締め付けられながら、奥へと精を注ぎ込む。"
translation = "실비 선배도 동시에 절정에 달해, 꽉 조여지면서 안쪽으로 정을 쏟아붓는다."

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「はぁ……はっ……君のせーえきで、子宮、いっぱいになるぅ……はあぁ……お腹、熱いぃ……<emoji=heart04>」"
translation = "「하아…… 핫…… 너의 정액으로, 자궁, 가득 차버려어…… 하아아…… 배, 뜨거워어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「せーえき、熱くて、気持ち、いい……<emoji=heart04>\u3000ん……ふっ……はぁ……はあぁ<emoji=heart04>」"
translation = "「정액, 뜨거워서, 기분, 좋아……<emoji=heart04> 응…… 훗…… 하아…… 하아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「はぁ、はぁ……えへへ……一緒にイケたね♪」"
translation = "「하아, 하아…… 에헤헤…… 같이 갔네♪」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「あ……<emoji=heart04>\u3000会長くんが出してくれたの、ドロ～って溢れちゃってる……<emoji=heart04>\u3000こんなに出してくれたんだ……いっぱい気持ち良くなれた？」"
translation = "「아……<emoji=heart04> 회장군이 내보내 준 거, 걸쭉～하게 넘쳐흐르고 있어……<emoji=heart04> 이렇게나 많이 내보내 줬구나…… 잔뜩 기분 좋아졌어?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「はい、自分でも驚くほど出しちゃいました。シルヴィ先輩はどうでしたか？」"
translation = "「네, 제 자신도 놀랄 정도로 내보내 버렸습니다. 실비 선배는 어떠셨나요?」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「あたしも気持ち良かった♪\u3000イク時、ほんとにブッ壊れちゃうかと思ったもん」"
translation = "「나도 기분 좋았어♪ 갈 때, 정말로 부서져 버리는 줄 알았다구」"

[[dialogue]]
speaker = "unk"
original = "余韻と疲労に浸りながら微笑み合う。"
translation = "여운과 피로에 젖은 채 서로 미소 짓는다."

[[dialogue]]
speaker = "unk"
original = "汗が渇いて体がすぅっと冷えていくのが心地いい。"
translation = "땀이 마르며 몸이 시원하게 식어가는 것이 기분 좋다."

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「会長くんの部屋でした時より、いっぱい出たんじゃない？\u3000星徒会室で興奮するなんて、会長くんのヘンタイ」"
translation = "「회장군 방에서 했을 때보다, 훨씬 많이 나온 거 아냐? 성도회실에서 흥분하다니, 회장군은 변태」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それはシルヴィ先輩もですよ」"
translation = "「그건 실비 선배도 마찬가지잖아요」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「えへへ、ごもっともです♪」"
translation = "「에헤헤, 지당하신 말씀입니다♪」"

[[dialogue]]
speaker = "unk"
original = "爽やかな笑顔が眩しい。さっきまでエッチしていたは思えないほどだ。"
translation = "상쾌한 미소가 눈부시다. 조금 전까지 섹스를 하고 있었다고는 생각되지 않을 정도다."

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「でもみんなまだ帰ってこないんじゃない？\u3000このまま二回戦しちゃ──」"
translation = "「하지만 다들 아직 안 돌아오는 거 아냐? 이대로 2회전 해버ㄹ──」"

[[dialogue]]
speaker = "unk"
original = "ここでディスクにメッセージ。サーシャさんからだ。"
translation = "이때 디스크에 메시지. 사샤 씨로부터다."

[[dialogue]]
speaker = "unk"
original = "『もうすぐ帰りまーす。お菓子かってきたから、お茶淹れておいてくれると嬉しいわ～』"
translation = "『이제 곧 돌아가요~. 과자 사 왔으니까, 차 내려놔 주면 좋겠어~』"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「ってことは時間ないじゃん！？\u3000ヤバッ！？」"
translation = "「그 말은 시간 없다는 거잖아!? 위험해!?」"

[[dialogue]]
speaker = "unk"
original = "慌てて２人で片づけをして、ギリギリ事なきを得たのだった。"
translation = "황급히 둘이서 정리를 하고, 아슬아슬하게 화를 면했던 것이었다."

