[[dialogue]]
speaker = "unk"
original = "第３話,梨緒とチーム戦,P"
translation = "제3화, 리오와 팀전"

[[dialogue]]
speaker = "unk"
original = "リップルがリゾート結界に実装して、現在試験中のサバイバルモード。"
translation = "리플이 리조트 결계에 구현하여, 현재 시험 중인 서바이벌 모드."

[[dialogue]]
speaker = "unk"
original = "新星星徒会は以前攻略に失敗したものの、そのリベンジに訪れていた。"
translation = "신성학생회는 이전에 공략에 실패했었지만, 이번에 설욕하기 위해 방문했다."

[[dialogue]]
speaker = "梨緒"
original = "「私は当然、魔王の監視だ」"
translation = "「나는 당연히, 마왕의 감시다.」"

[[dialogue]]
speaker = "梨緒"
original = "「もちろん新星星徒会に協力する気はない。私たち選挙管理委員会は、すでにサバイバルモードをクリアしているからな」"
translation = "「물론 신성학생회에 협력할 생각은 없어. 우리 선거관리위원회는 이미 서바이벌 모드를 클리어했으니까 말이야.」"

[[dialogue]]
speaker = "マトイ"
original = "「梨緒さんの水着姿、クールでいいなぁ。金髪も綺麗で羨ましい……」"
translation = "「리오 씨의 수영복 차림, 쿨해서 멋지네. 금발도 예뻐서 부러워……」"

[[dialogue]]
speaker = "アナ"
original = "「均整の取れたスタイルです」"
translation = "「균형 잡힌 스타일이에요.」"

[[dialogue]]
speaker = "サーシャ"
original = "「お肌もすべすべね～」"
translation = "「피부도 매끈매끈하네~」"

[[dialogue]]
speaker = "梨緒"
original = "「えっ！？\u3000いや、あの……私なんか浜辺に転がる名前もわからない貝のような存在で……そんなに見ないでくれ……」"
translation = "「엣!? 아니, 그…… 나 같은 건 해변에 굴러다니는 이름도 모를 조개 같은 존재라서…… 그렇게 보지 말아 줘……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「つい触りたくなるお腹ね。つんつん」"
translation = "「그만 만지고 싶어지는 배네. 쿡쿡.」"

[[dialogue]]
speaker = "梨緒"
original = "「ひゃぁっ！？\u3000ちょっ、やめ……お腹をつつくなぁっ！」"
translation = "「히얏!? 잠깐, 그만…… 배를 찌르지 마!」"

[[dialogue]]
speaker = "unk"
original = "つんつん"
translation = "쿡쿡"

[[dialogue]]
speaker = "梨緒"
original = "「ひんっ！？\u3000魔王までお腹を……ひぁあっ！？\u3000あっ……魔王の指がつつ～っと、お腹をなぞって……ひゃああっ！？」"
translation = "「힝!? 마왕까지 배를…… 히아앗!? 앗…… 마왕의 손가락이 스으윽 하고, 배를 훑어서…… 햐아앗!?」"

[[dialogue]]
speaker = "梨緒"
original = "「こらーっ！！\u3000お腹を触るな～～っ！！」"
translation = "「이봐!! 배 만지지 마~~!!」"

[[dialogue]]
speaker = "梨緒"
original = "「君たちはリゾート結界のサバイバルモードの攻略に来たんだろう。本題から逸れているぞ」"
translation = "「너희는 리조트 결계의 서바이벌 모드 공략을 위해 온 거잖아. 본론에서 벗어나고 있다고.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ハッ──そうだったわ！」"
translation = "「핫── 그랬었지!」"

[[dialogue]]
speaker = "リップル"
original = "「チョットまってくださーい！\u3000さっきサバイバルモードの新しい遊び方を思いつきマシた！」"
translation = "「잠깐 기다려 주세용! 방금 서바이벌 모드의 새로운 놀이 방법을 생각해 냈습니당!」"

[[dialogue]]
speaker = "梨緒"
original = "「リップル？\u3000新しい遊び方とは……？」"
translation = "「리플? 새로운 놀이 방법이라니……?」"

[[dialogue]]
speaker = "リップル"
original = "「チーム対抗で競うチーム戦です！\u3000きっとオモシロいでーす！」"
translation = "「팀 대항으로 겨루는 팀전입니당! 분명 재밌을 거예용!」"

[[dialogue]]
speaker = "梨緒"
original = "「なるほど、どのチームがボスを倒せるか競うわけだな」"
translation = "「과연, 어느 팀이 보스를 쓰러뜨리는지 겨루는 거군.」"

[[dialogue]]
speaker = "unk"
original = "この場にいるのはリップルを覗いて６人。２人のチームが３つ作ることになり、砂浜に線を引いてあみだくじでチームを決める。"
translation = "이 자리에 있는 것은 리플을 제외하고 6명. 2인 1조 팀을 3개 만들게 되어, 백사장에 선을 긋고 사다리타기로 팀을 정한다."

[[dialogue]]
speaker = "unk"
original = "マトイとヴィーナス、アナとサーシャさんのチームに分かれ、そして──"
translation = "마토이와 비너스, 아나와 사샤 씨 팀으로 나뉘고, 그리고──"

[[dialogue]]
speaker = "梨緒"
original = "「私と組むのは──魔王だな」"
translation = "「나와 팀을 짜는 건── 마왕이군.」"

[[dialogue]]
speaker = "unk"
original = "よろしく、梨緒"
translation = "잘 부탁해, 리오"

[[dialogue]]
speaker = "梨緒"
original = "「魔王とは何度も勝負をしたし、モンスター相手に共に戦ったことはあるが……勝負事で魔王と組んだことはなかったか」"
translation = "「마왕과는 몇 번이나 승부를 겨뤘고, 몬스터를 상대로 함께 싸운 적은 있지만…… 승부사로서 마왕과 팀을 짠 적은 없었나.」"

[[dialogue]]
speaker = "梨緒"
original = "「選挙管理委員会として、魔王の監視をするにはちょうどいいかもしれないな。君の一挙手一投足を見ているから、そのつもりでいてくれ」"
translation = "「선거관리위원회로서, 마왕을 감시하기에는 딱 좋을지도 모르겠군. 네 일거수일투족을 지켜보고 있을 테니, 그럴 줄 알아라.」"

[[dialogue]]
speaker = "梨緒"
original = "「ではこの勝負……勝つぞ！」"
translation = "「그럼 이 승부…… 이기자!」"

[[dialogue]]
speaker = "モンスター"
original = "「イーーーッ！」"
translation = "「이이익!」"

[[dialogue]]
speaker = "unk"
original = "結界内の疑似モンスターを倒しながら、食料や寝床を確保する。"
translation = "결계 내의 의사 몬스터를 쓰러뜨리며, 식량과 잠자리를 확보한다."

[[dialogue]]
speaker = "unk"
original = "そうしている間にあっという間に日が落ちていって……"
translation = "그러는 사이에 순식간에 해가 저물어 가고……"

[[dialogue]]
speaker = "梨緒"
original = "「ふぅ……なんとか食料や薪を集めることができたな。これだけあれば一晩は持つだろう」"
translation = "「후우…… 어떻게든 식량과 땔감을 모을 수 있었군. 이만큼 있으면 하룻밤은 버티겠지.」"

[[dialogue]]
speaker = "梨緒"
original = "「魚が焼けたぞ。ほら、一緒に食べよう」"
translation = "「생선이 다 구워졌어. 자, 같이 먹자.」"

[[dialogue]]
speaker = "unk"
original = "美味しい！"
translation = "맛있어!"

[[dialogue]]
speaker = "梨緒"
original = "「……うん、悪くないな。サバイバルでこれなら上出来だろう」"
translation = "「……음, 나쁘지 않군. 서바이벌에서 이 정도면 훌륭해.」"

[[dialogue]]
speaker = "梨緒"
original = "「魚を獲る勝負では魔王に負けてしまったが……くっ……」"
translation = "「물고기를 잡는 승부에서는 마왕에게 지고 말았지만…… 큭……」"

[[dialogue]]
speaker = "unk"
original = "選挙管理委員会のみんなとはどう？"
translation = "선거관리위원회 애들이랑은 어때?"

[[dialogue]]
speaker = "梨緒"
original = "「なんだかんだうまくやれている……と思う」"
translation = "「이래저래 잘 지내고 있다고…… 생각해.」"

[[dialogue]]
speaker = "梨緒"
original = "「ベアトが極星星徒会だと知った時は驚いたし、彼女を信じられなくなったこともあった。でもベアトの優しさはずっと変わらなかった」"
translation = "「베아토가 극성학생회라는 걸 알았을 때는 놀랐고, 그녀를 믿을 수 없게 된 적도 있었어. 하지만 베아토의 상냥함은 계속 변하지 않았지.」"

[[dialogue]]
speaker = "梨緒"
original = "「ナターシャは何を考えているかわからないし、暗殺者という役割から非情なところはあるが、意外と仲間想いなところもある」"
translation = "「나타샤는 무슨 생각을 하는지 알 수 없고, 암살자라는 역할 때문에 비정한 면도 있지만, 의외로 동료를 아끼는 면도 있어.」"

[[dialogue]]
speaker = "梨緒"
original = "「アポロとは……ベガやデネブの彼女を知っているせいで、混乱することもあったが……年下とは思えないほど頼りになる。助けられてばかりだ」"
translation = "「아폴로와는…… 베가나 데네브인 그녀를 알고 있는 탓에 혼란스럽기도 했지만…… 연하라고는 생각되지 않을 정도로 의지가 돼. 도움만 받고 있어.」"

[[dialogue]]
speaker = "梨緒"
original = "「彼女たちのことを思うと、自分が選挙管理委員会の委員長として相応しい存在なのか、不安になることもある」"
translation = "「그녀들을 생각하면, 내가 선거관리위원회의 위원장으로서 적합한 존재인지 불안해질 때도 있어.」"

[[dialogue]]
speaker = "梨緒"
original = "「だが……それでもいい。私は弱い人間だが、それだけじゃなかった。私は私なりに戦い続けてきた」"
translation = "「하지만…… 그래도 괜찮아. 나는 약한 인간이지만, 그것뿐만이 아니었어. 나는 나 나름대로 계속 싸워왔으니까.」"

[[dialogue]]
speaker = "梨緒"
original = "「私を信じるみんなと、ずっと戦ってきた自分を信じることにしたよ」"
translation = "「나를 믿어주는 모두와, 계속 싸워온 자신을 믿기로 했어.」"

[[dialogue]]
speaker = "unk"
original = "俺は梨緒に助けてもらったよ"
translation = "난 리오 덕분에 도움받았어"

[[dialogue]]
speaker = "梨緒"
original = "「……ああ、そういうこともあったな。あの時は魔王の暴走を防ぐという、選管の本分を全うすることができた」"
translation = "「……아아, 그런 일도 있었지. 그때는 마왕의 폭주를 막는다는 선관위의 본분을 다할 수 있었어.」"

[[dialogue]]
speaker = "unk"
original = "ちなみにジグは？"
translation = "참고로 지그는?"

[[dialogue]]
speaker = "梨緒"
original = "「……あいつのことはいいだろう。選挙管理委員会としては新参だし、特に言うことはない」"
translation = "「……그 녀석 이야기는 됐어. 선거관리위원회로서는 신참이고, 딱히 할 말은 없다.」"

[[dialogue]]
speaker = "梨緒"
original = "「さて、食事は取ったし、明日に備えてそろそろ眠ろうか」"
translation = "「자, 식사도 마쳤으니 내일을 대비해 슬슬 자도록 할까.」"

[[dialogue]]
speaker = "梨緒"
original = "「初めて出会った時は、こうして並んで寝るなんて想像できなかったな」"
translation = "「처음 만났을 때는 이렇게 나란히 누워 자게 될 줄은 상상도 못 했네.」"

[[dialogue]]
speaker = "梨緒"
original = "「しかし、２人きりで寝るのはその、落ち着かないというか、ドキドキするというか……」"
translation = "「하지만, 둘이서만 자는 건 그, 진정이 안 된달까, 두근거린달까……」"

[[dialogue]]
speaker = "梨緒"
original = "「あ、いや、不愉快なわけじゃないんだぞ！\u3000むしろ逆というか──って何を言ってるんだ私は！？」"
translation = "「아, 아니, 불쾌하다는 게 아니라고! 오히려 반대랄까── 대체 무슨 소릴 하는 거야, 나는!?」"

[[dialogue]]
speaker = "梨緒"
original = "「とにかく、私は君と２人で寝るのも悪くないと感じている。君もそう思ってくれていたら嬉しい」"
translation = "「어쨌든, 나는 너와 둘이서 자는 것도 나쁘지 않다고 느끼고 있어. 너도 그렇게 생각해주면 기쁘겠군.」"

[[dialogue]]
speaker = "梨緒"
original = "「……お休み。明日は必ず勝とう」"
translation = "「……잘 자. 내일은 반드시 이기자.」"

