[[dialogue]]
speaker = "unk"
original = "第１話,お財布が大ピンチ！,B"
translation = "제1화, 지갑이 대위기!"

[[dialogue]]
speaker = "unk"
original = "３０００年の時を経て、その日はついに訪れた。"
translation = "3000년의 시간을 거쳐, 그날은 마침내 찾아왔다."

[[dialogue]]
speaker = "unk"
original = "リクリエ──世界が新たに構築される滅びと新生の刻。"
translation = "리크리에──세계가 새롭게 구축되는 멸망과 신생의 시간."

[[dialogue]]
speaker = "unk"
original = "人類が、魔族が、天使が、そして魔女たちが。"
translation = "인류가, 마족이, 천사가, 그리고 마녀들이."

[[dialogue]]
speaker = "unk"
original = "この未曽有の危機の到来に慄きつつも、この日のために全てを賭けて立ち向かい──"
translation = "이 미증유의 위기의 도래에 전율하면서도, 이날을 위해 모든 것을 걸고 맞서──"

[[dialogue]]
speaker = "unk"
original = "そして新星学園星徒会長にして魔王である緋宮クロトを中心とした星騎士たちによって、その大波は退けられた。"
translation = "그리고 신성학원 성도회장이자 마왕인 히노미야 쿠로토를 중심으로 한 성기사들에 의해, 그 거센 파도는 물러갔다."

[[dialogue]]
speaker = "unk"
original = "世界に喜びの声が響いてより数日。"
translation = "세계에 기쁨의 목소리가 울려 퍼진 지 수일."

[[dialogue]]
speaker = "unk"
original = "それは、本懐を遂げたあとも活動を続けていた魔女の組織『ネビュラ』から始まった。"
translation = "그것은, 숙원을 이룬 뒤에도 활동을 계속하던 마녀들의 조직 『네뷸라』에서 시작되었다."

[[dialogue]]
speaker = "ウェンディ"
original = "「──以上のことから、大変申し上げにくいのですが……」"
translation = "「──이상의 이유로, 매우 말씀드리기 어렵습니다만……」"

[[dialogue]]
speaker = "ウェンディ"
original = "「このまま元老会の支援が打ち切られた状態が続くなら、そう遠くない未来、組織の運営資金は底を突いてしまうと思います」"
translation = "「이대로 원로회의 지원이 중단된 상태가 계속된다면, 머지않은 미래에 조직의 운영 자금은 바닥을 드러낼 것으로 보입니다.」"

[[dialogue]]
speaker = "セドナ"
original = "「遠くない未来、か……具体的にはどのくらいだ？」"
translation = "「머지않은 미래, 라…… 구체적으로 어느 정도지?」"

[[dialogue]]
speaker = "ウェンディ"
original = "「……ふた月ほど、かと」"
translation = "「……두 달 정도, 일까 합니다.」"

[[dialogue]]
speaker = "セドナ"
original = "「……………………」"
translation = "「……………………」"

[[dialogue]]
speaker = "ウェンディ"
original = "「ちょ、長官……」"
translation = "「자, 장관님……」"

[[dialogue]]
speaker = "セドナ"
original = "「分かってはいたが、厳しい状況だな……」"
translation = "「알고는 있었지만, 엄혹한 상황이군……」"

[[dialogue]]
speaker = "ウェンディ"
original = "「あぅうううううっ！！\u3000申し訳ありません、セドナ長官！\u3000私が不甲斐ないばかりに！！」"
translation = "「아으으으으으으!! 죄송합니다, 세드나 장관님! 제가 무능한 탓에!!」"

[[dialogue]]
speaker = "ウェンディ"
original = "「ネビュラの財政を預かる身として、申し開きの言葉もありませんっ！！」"
translation = "「네뷸라의 재정을 맡은 몸으로서, 드릴 말씀이 없습니다!!」"

[[dialogue]]
speaker = "セドナ"
original = "「いや、今回ばかりは仕方ないだろう、お前の手腕をもってしても」"
translation = "「아니, 이번만큼은 어쩔 수 없겠지, 네 수완을 가지고서도.」"

[[dialogue]]
speaker = "セドナ"
original = "「グレートウォール計画が成功し、想定通りの形でリクリエを乗り越えていたならば、今日のような状況にはなっていなかったのだから」"
translation = "「그레이트 월 계획이 성공하여, 상정했던 대로 리크리에를 극복했더라면 오늘 같은 상황은 되지 않았을 테니까.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「ですがですがっ！\u3000私が余計なことをしなければっ！\u3000人間界での事業を手放したりしていなければ、継続的な資金源として財政を維持できていたのに！」"
translation = "「하지만 하지만요! 제가 쓸데없는 짓을 하지만 않았어도! 인간계에서의 사업을 정리하지 않았더라면, 지속적인 자금원으로서 재정을 유지할 수 있었을 텐데!」"

[[dialogue]]
speaker = "セドナ"
original = "「それも仕方あるまい。人間界はリクリエによって滅んでしまう想定だった……それを前提にお前には動いてもらっていた」"
translation = "「그것도 어쩔 수 없는 일이다. 인간계는 리크리에에 의해 멸망할 상정이었지…… 그것을 전제로 네가 움직이게 했던 것이다.」"

[[dialogue]]
speaker = "セドナ"
original = "「そう──リクリエにより人間界が滅び、そして新たな世界が構築された時……」"
translation = "「그래──리크리에로 인해 인간계가 멸망하고, 그리고 새로운 세계가 구축되었을 때……」"

[[dialogue]]
speaker = "セドナ"
original = "「どのような再構築が行われるかは分からないが、復興のためにはやはり資金が必要だったのだ」"
translation = "「어떠한 재구축이 이루어질지는 알 수 없으나, 부흥을 위해서는 역시 자금이 필요했다.」"

[[dialogue]]
speaker = "セドナ"
original = "「その為の資金を確保するために、人間界に構えていた会社を売却した……そういうことだろう？」"
translation = "「그 자금을 확보하기 위해 인간계에 세워두었던 회사를 매각했다…… 그런 것이겠지?」"

[[dialogue]]
speaker = "ウェンディ"
original = "「はい……ですが完全に裏目に出てしまいました」"
translation = "「네…… 하지만 완전히 역효과가 나고 말았습니다.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「人間界は滅びず、かといってリクリエの脅威も完全に去ったとは言い切れない状態」"
translation = "「인간계는 멸망하지 않았고, 그렇다고 리크리에의 위협이 완전히 사라졌다고 단정할 수도 없는 상태.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「組織は引き続き維持する必要があるというのに、その財源を全て失ってしまって……」"
translation = "「조직은 계속해서 유지할 필요가 있는데도, 그 재원을 모두 잃어버려서……」"

[[dialogue]]
speaker = "セドナ"
original = "「もう言うな。裏を返せばその資金のおかげで、リクリエ後の急場をしのげたとも言えるのだ」"
translation = "「이제 그만해라. 뒤집어 생각하면 그 자금 덕분에 리크리에 이후의 급한 불을 끌 수 있었다고도 할 수 있으니까.」"

[[dialogue]]
speaker = "セドナ"
original = "「そもそも人間界で事業を起こし、そこからネビュラの運営資金を補助する、という離れ業はお前の手腕あってのこと」"
translation = "「애초에 인간계에서 사업을 일으켜, 거기서 네뷸라의 운영 자금을 보조한다는 묘기는 네 수완이 있었기에 가능했던 일.」"

[[dialogue]]
speaker = "セドナ"
original = "「お前がいなければ、グレートウォール計画の実現も危うかっただろうし、ネビュラという組織を維持することも難しかっただろう」"
translation = "「네가 없었다면 그레이트 월 계획의 실현도 위태로웠을 테고, 네뷸라라는 조직을 유지하는 것도 어려웠을 거다.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「ううう、勿体ないお言葉です……長官……」"
translation = "「으으으, 과분한 말씀입니다…… 장관님……」"

[[dialogue]]
speaker = "セドナ"
original = "「それよりも、責められるべきは現状を楽観的にしか捉えられない元老会の連中だ」"
translation = "「그보다, 비난받아야 할 쪽은 현 상황을 낙관적으로만 파악하는 원로회 녀석들이다.」"

[[dialogue]]
speaker = "セドナ"
original = "「リクリエが去ったと決めつけて、運営資金を打ち切り、執拗に組織の解体を迫ってくる」"
translation = "「리크리에가 끝났다고 단정 짓고, 운영 자금을 끊고 집요하게 조직의 해체를 압박해 오고 있지.」"

[[dialogue]]
speaker = "セドナ"
original = "「奴らの戯言の相手をするだけで労力を強いられ、山積みになっている問題に集中させてもらえない」"
translation = "「놈들의 헛소리를 상대하는 것만으로도 기력을 소진해, 산더미처럼 쌓인 문제에 집중할 수가 없어.」"

[[dialogue]]
speaker = "セドナ"
original = "「財政に関してはウェンディ、お前を頼りきりにしてしまっているな」"
translation = "「재정에 관해서는 웨디, 너에게만 너무 의지하고 있군.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「とんでもありません！\u3000本当に元老会の奴らときたら、セドナ長官のお手を煩わせることばかりして……」"
translation = "「천만의 말씀입니다! 정말 원로회 녀석들만 아니었어도 세드나 장관님을 번거롭게 할 일은 없었을 텐데……」"

[[dialogue]]
speaker = "ウェンディ"
original = "「世界で起きている事件に少しでも目を向ければ、楽観など出来るはずがない。どうしてそんなことも分からないのか！」"
translation = "「세계에서 일어나고 있는 사건에 조금이라도 눈을 돌린다면, 낙관 따위 할 수 없을 텐데. 어째서 그런 것도 모르는 걸까요!」"

[[dialogue]]
speaker = "セドナ"
original = "「ともかく、貯金が底を突く前に老人どもを説得しなければ」"
translation = "「어쨌든, 저축이 바닥나기 전에 노인네들을 설득해야겠군.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「私も急ぎ、新たな財源確保に努めます」"
translation = "「저도 서둘러 새로운 재원 확보에 힘쓰겠습니다.」"

[[dialogue]]
speaker = "セドナ"
original = "「頼んだぞ」"
translation = "「부탁하마.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「はいっ！」"
translation = "「네!」"

[[dialogue]]
speaker = "ウェンディ"
original = "「ひあっ！？\u3000ば、爆発？\u3000襲撃ですか！！？」"
translation = "「히앗!? 바, 폭발? 습격인가요!!?」"

[[dialogue]]
speaker = "セドナ"
original = "「……またか」"
translation = "「……또인가.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「え？\u3000またか、ということはこれって……」"
translation = "「에? 또라니, 그 말은 설마……」"

[[dialogue]]
speaker = "セドナ"
original = "「おそらく姫様の仕業だ」"
translation = "「아마 공주님의 소행이겠지.」"

[[dialogue]]
speaker = "カヤ"
original = "『ご報告致します。クラウディア様が謹慎部屋の壁を破って抗議活動を開始致しました』"
translation = "『보고드립니다. 클라우디아 님께서 근신실 벽을 부수고 항의 활동을 개시하셨습니다.』"

[[dialogue]]
speaker = "カヤ"
original = "『基地本部に向かって侵攻中。足止めを行っていますが、程なく突破されます。至急、援護をお願いします』"
translation = "『기지 본부를 향해 침공 중. 저지하고 있으나 곧 돌파당할 것으로 보입니다. 즉시 지원을 부탁드립니다.』"

[[dialogue]]
speaker = "セドナ"
original = "「ご苦労、すぐに向かおう。それまで持ちこたえてくれ」"
translation = "「수고했다, 바로 가마. 그때까지 버텨다오.」"

[[dialogue]]
speaker = "カヤ"
original = "『イエス・マム』"
translation = "『예스, 맘.』"

[[dialogue]]
speaker = "セドナ"
original = "「はぁ……姫様にも困ったものだ」"
translation = "「하아…… 공주님도 참 곤란하군.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「せめて私たちで抑えることが出来ればよいのですが、相手がクラウディア様では……」"
translation = "「적어도 저희 선에서 억제할 수 있다면 좋으련만, 상대가 클라우디아 님이라면……」"

[[dialogue]]
speaker = "セドナ"
original = "「私以外には止められないだろう」"
translation = "「나 말고는 막을 수 없겠지.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「これで何度目になるでしょう。こうたびたび騒ぎを起こされてしまっては、ますます長官の身動きが取れなくなってしまいます」"
translation = "「이게 벌써 몇 번째일까요. 이렇게 자주 소동을 일으키시면 점점 장관님의 운신이 폭이 좁아지게 됩니다.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「クラウディア様は例の要求を通すまで、暴れ続けるおつもりでしょうか？」"
translation = "「클라우디아 님은 그 요구를 들어줄 때까지 계속 날뛰실 생각일까요?」"

[[dialogue]]
speaker = "セドナ"
original = "「だろうな、頭の痛いことだ」"
translation = "「그렇겠지, 머리가 아픈 일이군.」"

[[dialogue]]
speaker = "セドナ"
original = "「今は姫様の要求に応えることはできない。まずはネビュラという組織の存続を確定しなければ」"
translation = "「지금은 공주님의 요구에 응할 수 없다. 우선은 네뷸라라는 조직의 존속을 확정 지어야 해.」"

[[dialogue]]
speaker = "セドナ"
original = "「そして姫様が暴れていることは元老会にも悟られてはならない。姫様と元老会が対立する、などということになればそれこそ魔女の森全てを巻き込む大問題だ」"
translation = "「그리고 공주님이 날뛰고 있다는 사실을 원로회에 들켜서도 안 된다. 공주님과 원로회가 대립하게 된다면 그야말로 마녀의 숲 전체를 휘말리게 할 대문제니까.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「クラウディア様を我々だけで抑えつつ、その間に元老会を説得するしかない、と」"
translation = "「클라우디아 님을 우리끼리 억누르면서, 그사이에 원로회를 설득할 수밖에 없다는 거군요.」"

[[dialogue]]
speaker = "セドナ"
original = "「ああ。では、行くぞ」"
translation = "「그래. 그럼, 가자.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「了解ですっ！」"
translation = "「알겠습니다!」"

