[[dialogue]]
speaker = "unk"
original = "第１１話,静かなる激情,B"
translation = "제11화, 고요한 격정, B"

[[dialogue]]
speaker = "ヴィーナス"
original = "「はあああっ────！」"
translation = "「하아아앗────!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「浄化してあげる……！」"
translation = "「정화해 줄게……!」"

[[dialogue]]
speaker = "アポロ"
original = "「ふん──中々やるな！\u3000でも──！」"
translation = "「흥── 제법 하는군! 하지만──!」"

[[dialogue]]
speaker = "unk"
original = "アポロが大剣を掲げる──"
translation = "아폴로가 대검을 치켜든다──"

[[dialogue]]
speaker = "クロト"
original = "「させないっ──！」"
translation = "「못 하게 해──!」"

[[dialogue]]
speaker = "アポロ"
original = "「！？」"
translation = "「!?」"

[[dialogue]]
speaker = "クロト"
original = "「はぁぁぁぁ……！」"
translation = "「하아아아아……!」"

[[dialogue]]
speaker = "unk"
original = "空中に一本道の足場を作り出し、刹那の踏み込みでアポロへ迫る。"
translation = "공중에 외길 발판을 만들어내고, 찰나의 박차고 나감으로 아폴로에게 육박한다."

[[dialogue]]
speaker = "unk"
original = "大剣をこちらのガードに使わせることで、すんでのところで発動を阻止した。"
translation = "대검을 이쪽의 가드에 사용하게 함으로써, 간발의 차로 발동을 저지했다."

[[dialogue]]
speaker = "unk"
original = "前回はここから流星のストームを巻き起こされて一気に形勢を逆転された。同じ轍は踏まない。"
translation = "지난번에는 여기서 유성의 폭풍을 일으켜 단숨에 형세가 역전되었다. 같은 바퀴 자국은 밟지 않는다."

[[dialogue]]
speaker = "unk"
original = "俺は、拳闘でもってアポロへ肉迫しつつ問いかける。"
translation = "나는, 권투로 아폴로에게 육박하면서 질문한다."

[[dialogue]]
speaker = "クロト"
original = "「君は……君は世界をどうしたいんだ」"
translation = "「너는…… 너는 세상을 어떻게 하고 싶은 거야」"

[[dialogue]]
speaker = "アポロ"
original = "「どうしたい？\u3000知らないね！\u3000ヒーローの仕事は戦ってやっつける、それだけだー！」"
translation = "「어떻게 하고 싶냐고? 모르겠네! 히어로의 일은 싸워서 해치우는 것, 그것뿐이다ー!」"

[[dialogue]]
speaker = "unk"
original = "大剣を振り払われ、俺は夜空の果てまで吹き飛ばされそうになる。"
translation = "대검을 휘둘러 쳐내져, 나는 밤하늘 끝까지 날려 보내질 뻔한다."

[[dialogue]]
speaker = "unk"
original = "しかし今度は、俺と入れ替わるようにしてサーシャ先輩が追撃を重ねた。"
translation = "하지만 이번에는, 나와 교대하듯이 사샤 선배가 추격을 거듭했다."

[[dialogue]]
speaker = "サーシャ"
original = "「クイーンオブアイス……！」"
translation = "「퀸 오브 아이스……!」"

[[dialogue]]
speaker = "サーシャ"
original = "「っ……無責任なヒーローもあったものね──正義の味方なら、もっとまともなビジョンが欲しいんじゃない？」"
translation = "「윽…… 무책임한 히어로도 다 있네── 정의의 편이라면, 좀 더 제대로 된 비전이 필요하지 않아?」"

[[dialogue]]
speaker = "アポロ"
original = "「だってそういうモノだろ！\u3000どんなに悪いやつとっちめたって、来週には次の敵をしばくのが主役ってもんだ！」"
translation = "「당연히 그런 거잖아! 아무리 나쁜 놈을 때려잡아도, 다음 주에는 다음 적을 때려잡는 게 주인공이라는 거라고!」"

[[dialogue]]
speaker = "ソフィア"
original = "「そんなの──ただ好きに暴れてるだけじゃないですか！」"
translation = "「그런 건── 그저 멋대로 날뛰는 것뿐이잖아요!」"

[[dialogue]]
speaker = "ソフィア"
original = "「アイシクルフリップ……！」"
translation = "「아이시클 플립……!」"

[[dialogue]]
speaker = "unk"
original = "氷の双攻撃がアポロの動きを封じていく。"
translation = "얼음의 쌍 공격이 아폴로의 움직임을 봉쇄해 나간다."

[[dialogue]]
speaker = "unk"
original = "２人のコンビネーションは今日が初めてとは思えぬ精度で、後退する逃げ道にさえも氷柱の雨が置かれている。"
translation = "두 사람의 콤비네이션은 오늘이 처음이라고는 생각되지 않을 정도로 정교하며, 후퇴하는 도주로에조차도 고드름의 비가 놓여 있다."

[[dialogue]]
speaker = "アポロ"
original = "「寒いったらないぜ──おいギエル！\u3000この氷とチビをなんとかしろ！」"
translation = "「춥기 짝이 없군── 이봐 기엘! 이 얼음과 꼬맹이를 어떻게든 해라!」"

[[dialogue]]
speaker = "ギエル"
original = "「は──仰せのままに！」"
translation = "「하── 분부대로!」"

[[dialogue]]
speaker = "ソフィア"
original = "「っ……！\u3000あなたの方がチビでしょうが──！」"
translation = "「윽……! 당신 쪽이 꼬맹이잖아요──!」"

[[dialogue]]
speaker = "サーシャ"
original = "「ソフィ──」"
translation = "「소피──」"

[[dialogue]]
speaker = "unk"
original = "執事がステッキから仕込みのレイピアを抜いてソフィアを釘付けにする。"
translation = "집사가 스테이크에서 장치된 레이피어를 뽑아 소피아를 꼼짝 못 하게 한다."

[[dialogue]]
speaker = "unk"
original = "幸い彼のほうはアポロほどの脅威ではないが……"
translation = "다행히 그의 쪽은 아폴로만큼의 위협은 아니지만……"

[[dialogue]]
speaker = "unk"
original = "サーシャ先輩がそのフォローに回ると、アポロへのマークが再びフリーになった。"
translation = "사샤 선배가 그를 지원하러 돌아서자, 아폴로에 대한 마크가 다시 풀렸다."

[[dialogue]]
speaker = "アポロ"
original = "「ヒーローは敵を倒すもんだ！\u3000でもって、<ruby>魔王<rt>ボス</rt></ruby>を倒したら最終回だ！\u3000先のことなんか考える必要なし！」"
translation = "「히어로는 적을 쓰러뜨리는 거다! 그리고, 마왕를 쓰러뜨리면 최종회다! 앞일 같은 건 생각할 필요 없어!」"

[[dialogue]]
speaker = "クロト"
original = "「それが勝手だと言ってるんだ──君の信念はどこにある！？」"
translation = "「그게 제멋대로라는 거야── 네 신념은 어디에 있어!?」"

[[dialogue]]
speaker = "アポロ"
original = "「考えたこともないね！」"
translation = "「생각해 본 적도 없네!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「っつ──！」"
translation = "「읏츠──!」"

[[dialogue]]
speaker = "クロト"
original = "「ヴィーナス、こっちだ──」"
translation = "「비너스, 이쪽이다──」"

[[dialogue]]
speaker = "unk"
original = "アポロが操るは流星。すなわち死した星々の残光。"
translation = "아폴로가 조종하는 것은 유성. 즉 죽은 별들의 잔광."

[[dialogue]]
speaker = "unk"
original = "守護星という枠を越えた星屑の暴力が、再び全盛の勢いを取り戻して俺たちを見舞う。"
translation = "수호성이라는 틀을 넘어선 별 부스러기의 폭력이, 다시 전성기의 기세를 되찾아 우리를 덮친다."

[[dialogue]]
speaker = "unk"
original = "深手を負ったヴィーナスを引き寄せると、俺は治癒の星術で回復させた。"
translation = "깊은 상처를 입은 비너스를 끌어당기자, 나는 치유의 성술로 회복시켰다."

[[dialogue]]
speaker = "アポロ"
original = "「ん～、向こうの勢いが落ちてきたな。追加で巣を造ってこよう──ここは任せたぞ、ギエル」"
translation = "「음~, 저쪽 기세가 꺾였군. 추가로 둥지를 만들고 오지── 여기는 맡긴다, 기엘」"

[[dialogue]]
speaker = "ギエル"
original = "「は。御意に」"
translation = "「하. 분부대로」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ん──！？\u3000待ちなさい、チビッコ──！」"
translation = "「음──!? 기다려, 꼬마──!」"

[[dialogue]]
speaker = "アポロ"
original = "「わっはっはー！\u3000追いつけるものなら追いついてみるがいい～！」"
translation = "「와핫핫하ー! 따라잡을 수 있다면 따라잡아 보시지～!」"

[[dialogue]]
speaker = "unk"
original = "一旦のけりをつけると、アポロはさらに北上して行ってしまった。"
translation = "일단락 짓자, 아폴로는 더욱 북상하여 가버렸다."

[[dialogue]]
speaker = "unk"
original = "彼女を放置していれば、際限なく被害が増え続けてしまうが──"
translation = "그녀를 방치해 두면, 끝없이 피해가 계속 늘어나겠지만──"

[[dialogue]]
speaker = "モンスター"
original = "「ガオオオオオッッッ！！」"
translation = "「가오오오오오옷읏읏!!」"

[[dialogue]]
speaker = "モンスター"
original = "「グルルルルルルッ！！！」"
translation = "「그르르르르르륵!!!」"

[[dialogue]]
speaker = "クロト"
original = "「っく──一体どこからっ！」"
translation = "「윽── 대체 어디서!」"

[[dialogue]]
speaker = "unk"
original = "置き土産として産み落とされた二頭のモンスターが俺たちを足止めする。"
translation = "남겨진 선물로 태어난 두 마리의 몬스터가 우리를 발목 잡는다."

[[dialogue]]
speaker = "unk"
original = "サーシャ先輩とソフィアが戦線に加わっても、４対３だ。"
translation = "사샤 선배와 소피아짱이 전선에 가담해도, 4대 3이다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「ホント勝手よね……見た目のまんまっていうか。何考えてんのかわかんないっていうか……」"
translation = "「정말 제멋대로네…… 겉모습 그대로랄까. 무슨 생각을 하는 건지 모르겠다고 할까……」"

[[dialogue]]
speaker = "クロト"
original = "「……元々、考えなんてものはないのかもな」"
translation = "「……원래, 생각 같은 건 없는 건지도 모르겠네」"

[[dialogue]]
speaker = "unk"
original = "モンスターや堕天使と違い、アポロには意思がある……と感じたのは、あくまで俺の感想でしかない。"
translation = "몬스터나 타락천사와 달리, 아폴로에게는 의지가 있다……고 느낀 것은, 어디까지나 나의 감상일 뿐이다."

[[dialogue]]
speaker = "unk"
original = "アポロもリクリエのモンスターと同じ、世界を再構築するためのシステムの一部にすぎないのかもしれない。"
translation = "아폴로도 리크리에의 몬스터와 마찬가지로, 세계를 재구축하기 위한 시스템의 일부에 지나지 않을지도 모른다."

[[dialogue]]
speaker = "ギエル"
original = "「どだい人の子の抵抗など無意味ということですよ──魔王どの」"
translation = "「애초에 인간의 저항 따위는 무의미하다는 것입니다── 마왕 나리」"

[[dialogue]]
speaker = "クロト"
original = "「……！！」"
translation = "「……!!」"

[[dialogue]]
speaker = "unk"
original = "思考にふけった一瞬の隙を刈り取るように、仕込みレイピアが俺の喉元に迫っていた。"
translation = "사고에 잠긴 한순간의 틈을 베어내듯이, 장치된 레이피어가 나의 목덜미에 다가와 있었다."

[[dialogue]]
speaker = "クロト"
original = "「ギエル……だったか。あんたは人間じゃないのか」"
translation = "「기엘……이었나. 너는 인간이 아닌 건가」"

[[dialogue]]
speaker = "ギエル"
original = "「いいえ人間ですよ。善良なるアポロ様の<ruby>下僕<rt>しもべ</rt></ruby>というだけ」"
translation = "「아니요 인간입니다. 선량하신 아폴로님의 하인일 뿐」"

[[dialogue]]
speaker = "unk"
original = "鉄拳で撃ち返し、<ruby>鍔<rt>つば</rt></ruby>迫り合うような距離で言葉を交わす。"
translation = "철권으로 되받아치고, 칼날이 맞닿을 듯한 거리에서 말을 주고받는다."

[[dialogue]]
speaker = "unk"
original = "アポロについて回る部下としか認識していなかったが、ただの人間があれに従っているというのは返ってとんでもなく異質だ。"
translation = "아폴로를 따라다니는 부하로만 인식하고 있었지만, 평범한 인간이 저것을 따르고 있다는 것은 오히려 터무니없이 이질적이다."

[[dialogue]]
speaker = "unk"
original = "リクリエはどんな生き物にとっても抗うべきもの。"
translation = "리크리에는 어떤 생물에게 있어서도 맞서 싸워야 할 것."

[[dialogue]]
speaker = "unk"
original = "その大前提を、<ruby>この男<rt>ギエル</rt></ruby>は人間にもかかわらず翻している。"
translation = "그 대전제를, 이 남자는 인간임에도 불구하고 뒤집고 있다."

[[dialogue]]
speaker = "クロト"
original = "「アポロのしていることを判ってるのか。彼女は最終的に、俺たちの住む人間界ごと滅ぼす気なんだぞ」"
translation = "「아폴로가 하는 일을 알고 있는 건가. 그녀는 최종적으로, 우리가 사는 인간계째 멸망시킬 생각이라고」"

[[dialogue]]
speaker = "ギエル"
original = "「ハハハ……わかっていますよ。百も千も承知ですとも」"
translation = "「하하하…… 알고 있습니다. 백 번이고 천 번이고 알고 말고요」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナス、ソフィアちゃん、サーシャ先輩はモンスターを相手しており──"
translation = "비너스, 소피아짱, 사샤 선배는 몬스터를 상대하고 있으며──"

[[dialogue]]
speaker = "unk"
original = "俺と彼は、さらなる上空で一対一の殴り合いと語り合いを行っていた。"
translation = "나와 그는, 더욱 상공에서 일대일로 주먹다짐과 대화를 나누고 있었다."

[[dialogue]]
speaker = "ギエル"
original = "「世界の再創生。大変結構なことではありませんか！」"
translation = "「세계의 재창생. 매우 훌륭한 일이 아닙니까!」"

[[dialogue]]
speaker = "ギエル"
original = "「この醜い世をより良き形へ創り変えようというのですから……一度まっさらになるくらいなんでもない！」"
translation = "「이 추악한 세상을 더 나은 형태로 창조해 바꾸려 하는 것이니…… 한 번 깨끗하게 되는 것쯤이야 아무것도 아닙니다!」"

[[dialogue]]
speaker = "unk"
original = "切り結ぶ剣戟と拳撃。"
translation = "서로 맞부딪치는 검격과 권격."

[[dialogue]]
speaker = "unk"
original = "その間隙に、男の狂気が垣間見えた気がした。"
translation = "그 틈새에서, 남자의 광기가 엿보이는 듯했다."

[[dialogue]]
speaker = "クロト"
original = "「あんたは……間違ってる」"
translation = "「너는…… 틀렸어」"

[[dialogue]]
speaker = "ギエル"
original = "「あなた程ではありませんよ──魔王どの」"
translation = "「당신만큼은 아닙니다── 마왕 나리」"

[[dialogue]]
speaker = "unk"
original = "彼も俺を魔王と呼ぶ。"
translation = "그도 나를 마왕이라고 부른다."

[[dialogue]]
speaker = "unk"
original = "アポロが、ヴィーナスが、俺のことをそう称するように。"
translation = "아폴로가, 비너스가, 나를 그렇게 칭하듯이."

[[dialogue]]
speaker = "unk"
original = "でも、魔王は……本当の魔王は……"
translation = "하지만, 마왕은…… 진짜 마왕은……"

[[dialogue]]
speaker = "unk"
original = "最もアステラの密集する東京駅──"
translation = "가장 아스테라가 밀집한 도쿄역──"

[[dialogue]]
speaker = "unk"
original = "混乱の<ruby>坩堝<rt>るつぼ</rt></ruby>と化したこの地だったが、その根は目に見えて数を減らしつつあった。"
translation = "혼란의 도가니로 변한 이 땅이었지만, 그 뿌리는 눈에 띄게 수를 줄여가고 있었다."

[[dialogue]]
speaker = "unk"
original = "それというのも……"
translation = "그것은 다름 아닌……"

[[dialogue]]
speaker = "ルリエル"
original = "「やーりましたぁ！\u3000これでデカいのは大抵潰せましたよ！」"
translation = "「해냈어요! 이걸로 큰 녀석들은 대체로 박살 냈어요!」"

[[dialogue]]
speaker = "ユウリ"
original = "「オッケー！\u3000やっぱフィオナは頼りになるぜ──流星はこうでないとな！」"
translation = "「오케이! 역시 피오나는 믿음직스럽구만── 유성은 이래야지!」"

[[dialogue]]
speaker = "フィオナ"
original = "「いえ──二人のサポートのおかげです」"
translation = "「아뇨── 두 분의 서포트 덕분입니다」"

[[dialogue]]
speaker = "unk"
original = "この地に降りた援軍のおかげだった。"
translation = "이 땅에 내려온 원군 덕분이었다."

[[dialogue]]
speaker = "unk"
original = "流星学園で培った絆が、個々の力以上のコンビネーションを発揮している。"
translation = "유성 학원에서 쌓은 유대가, 개개인의 힘 이상의 콤비네이션을 발휘하고 있다."

[[dialogue]]
speaker = "ニャリオン"
original = "「ニャッニャッニャッ！\u3000フィオナ嬢さえいれば、おニャーらのような小童でもこの通りニャン！」"
translation = "「냥냥냥! 피오나 아가씨만 있다면, 너희들 같은 애송이라도 이 정도는 냥!」"

[[dialogue]]
speaker = "ユウリ"
original = "「アステラに投げ入れるぞテメー。それより、減らしたっつってもまだまだだ」"
translation = "「아스테라에 던져버린다 너. 그보다, 줄였다고 해도 아직 멀었어」"

[[dialogue]]
speaker = "ルリエル"
original = "「全滅させないとキリがありませんからね……！\u3000ですがですが、このペースならなんとかなる気がします！」"
translation = "「전멸시키지 않으면 끝이 없으니까요……! 하지만 하지만, 이 페이스라면 어떻게든 될 것 같은 기분이 듭니다!」"

[[dialogue]]
speaker = "unk"
original = "事実、フィオナを加えてからの殲滅速度は凄まじかった。"
translation = "사실, 피오나를 더하고 나서의 섬멸 속도는 엄청났다."

[[dialogue]]
speaker = "unk"
original = "彼女らはこのまま一時間も同様の作戦を続ければ、一帯のアステラを駆除しきることができるだろう。"
translation = "그녀들은 이대로 한 시간만 더 동일한 작전을 계속한다면, 일대의 아스테라를 구제할 수 있을 것이다."

[[dialogue]]
speaker = "unk"
original = "が──"
translation = "하지만──"

[[dialogue]]
speaker = "ユウリ"
original = "「よし次だ──休んでる暇ねえぞ、ルリ！」"
translation = "「좋아 다음이다── 쉴 틈 없어, 루리!」"

[[dialogue]]
speaker = "ルリエル"
original = "「ひええ……が、頑張っちゃいますよお！\u3000レッツ、次の目的地に向かいましょー！」"
translation = "「히익…… 하, 힘내볼게요옷! 렛츠, 다음 목적지로 향해요ー!」"

[[dialogue]]
speaker = "ニャリオン"
original = "「ぶっちぎるニャアン！」"
translation = "「제쳐버리는 냥!」"

[[dialogue]]
speaker = "フィオナ"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "当のフィオナだけがその場に留まっていた。"
translation = "정작 피오나만이 그 자리에 머물러 있었다."

[[dialogue]]
speaker = "unk"
original = "彼女らの声も周囲の喧騒からも切り離されたかのように。"
translation = "그녀들의 목소리도 주변의 떠들썩함에서도 단절된 것처럼."

[[dialogue]]
speaker = "ルリエル"
original = "「って、あれ……フィオナ会長？」"
translation = "「어, 저기…… 피오나 회장?」"

[[dialogue]]
speaker = "フィオナ"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "フィオナは夜空を仰いでいた。"
translation = "피오나는 밤하늘을 올려다보고 있었다."

[[dialogue]]
speaker = "unk"
original = "正確には、上空のわずか一点を見つめていた。"
translation = "정확히는, 상공의 아주 작은 한 지점을 응시하고 있었다."

[[dialogue]]
speaker = "unk"
original = "その視線の先にはクロト、ヴィーナス、サーシャ、ソフィア……"
translation = "그 시선 끝에는 쿠로토, 비너스, 사샤, 소피아……"

[[dialogue]]
speaker = "unk"
original = "彼らが仮面の少女──アポロと矛を交えている。"
translation = "그들이 가면의 소녀── 아폴로와 창을 맞대고 있다."

[[dialogue]]
speaker = "フィオナ"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "フィオナ"
original = "「……どう、して」"
translation = "「……어, 떻게」"

[[dialogue]]
speaker = "フィオナ"
original = "「いいえ……ありえない……あれは……『誰』？」"
translation = "「아뇨…… 있을 수 없어…… 저건…… 『누구』?」"

[[dialogue]]
speaker = "ニャリオン"
original = "「あ……あれは……ニャン……」"
translation = "「아…… 저건…… 냥……」"

[[dialogue]]
speaker = "unk"
original = "その様子に遅れて気づいたのはニャリオンだった。"
translation = "그 모습을 뒤늦게 알아차린 것은 냐리온이었다."

[[dialogue]]
speaker = "unk"
original = "そして同時に、主であるフィオナが固まっている理由も知れる。"
translation = "그리고 동시에, 주인인 피오나가 굳어 있는 이유도 알게 된다."

[[dialogue]]
speaker = "ユウリ"
original = "「ありゃ元凶だっつーチビッコだな。まああそこは経験のあるあいつらに任せて、うちらは地上の掃除を……」"
translation = "「저건 원흉이라는 꼬마로군. 뭐 저곳은 경험 있는 저 녀석들에게 맡기고, 우리는 지상 청소를……」"

[[dialogue]]
speaker = "ルリエル"
original = "「ですです！\u3000そうだ、新星のサーシャ先輩って実はソフィアのお姉さんで──」"
translation = "「맞아요 맞아요! 그러고 보니, 신성인 사샤 선배는 사실 소피아의 언니이고──」"

[[dialogue]]
speaker = "フィオナ"
original = "「……ごめんなさい、ユウリ。あなたに任せる」"
translation = "「……미안해요, 유우리. 당신에게 맡길게요」"

[[dialogue]]
speaker = "ユウリ"
original = "「え……？\u3000どういうこと──お、おいっ！？」"
translation = "「에……? 무슨 소리야── 어, 어이!」"

[[dialogue]]
speaker = "unk"
original = "<b>らしくない</b>行動と称するのが正しいだろう。"
translation = "<ruby>답지 않은<rt>・・ ・・</rt></ruby> 행동이라고 칭하는 것이 옳을 것이다."

[[dialogue]]
speaker = "unk"
original = "フィオナは返事も聞かずユウリらを跳ね除け、そのままかつてない速度で飛び立っていった。"
translation = "피오나는 대답도 듣지 않고 유우리 등을 뿌리치고, 그대로 전에 없던 속도로 날아올랐다."

[[dialogue]]
speaker = "フィオナ"
original = "「──」"
translation = "「──」"

[[dialogue]]
speaker = "ニャリオン"
original = "「ニャ──ニャニャ！？\u3000き、気持ちはわかるニャンが──無茶ニャン！」"
translation = "「냥── 냐냐!? 기, 기분은 알겠지만── 무리냥!」"

[[dialogue]]
speaker = "unk"
original = "振り落とされんばかりの勢いでしがみつくニャリオン。"
translation = "떨어져 나갈 듯한 기세로 매달리는 냐리온."

[[dialogue]]
speaker = "unk"
original = "そのスピード調節もできないほど、今のフィオナは激情に駆られていた。"
translation = "그 스피드 조절도 할 수 없을 만큼, 지금의 피오나는 격정에 휩싸여 있었다."

