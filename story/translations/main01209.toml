[[dialogue]]
speaker = "unk"
original = "第１０話,魔女の躍動,B"
translation = "제10화, 마녀의 약동, B"

[[dialogue]]
speaker = "unk"
original = "同刻・ネビュラ基地──"
translation = "동시각・네뷸라 기지──"

[[dialogue]]
speaker = "unk"
original = "<ruby>魔女<rt>エージェント</rt></ruby>たちは首を揃えて、上官の指令を待っていた。すなわち──"
translation = "마녀들은 목을 가지런히 하고, 상관의 지령을 기다리고 있었다. 즉──"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「──時は来た」"
translation = "「──때가 왔다」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「フィヴォス流星群──これは、我々がかねてより予測していた前触れの到来に他ならない。事は計画通りに進んでいる」"
translation = "「필보스 유성군── 이것은, 우리가 전부터 예측하고 있던 전조의 도래임에 틀림없다. 일은 계획대로 진행되고 있다」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「星騎士たちは主要戦力の大部分を欠いています。とりわけ二名の魔王候補の欠落は重大」"
translation = "「성기사들은 주요 전력의 대부분을 결하고 있습니다. 특히 두 명의 마왕 후보의 결락은 중대합니다」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「また、世界樹のうろは封鎖済み……緋宮クロトたちが魔界から帰還する術は、ありません」"
translation = "「또한, 세계수의 빈 구멍은 봉쇄 완료…… 히노미야 쿠로토들이 마계에서 귀환할 방도는, 없습니다」"

[[dialogue]]
speaker_original = "カヤ"
speaker_translation = "카야"
original = "「人間界は壊滅……このままいけば」"
translation = "「인간계는 괴멸…… 이대로라면」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「然りだ。それ自体は無論、嘆かわしきこと──魔女と人間の<ruby>宥和<rt>ゆうわ</rt></ruby>を願った<ruby>先達<rt>せんだつ</rt></ruby>たちにも背くこととなろう」"
translation = "「그렇다. 그것 자체는 물론, 한탄스러운 일── 마녀와 인간의 유화를 바랐던 선달들에게도 등지는 것이 될 것이다」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「しかし！\u3000今の我々に残された手立ては少ない。祖の宿願を叶え、過去最大のリクリエから、三界を守り抜くためにはただひとつ──」"
translation = "「하지만! 지금 우리에게 남겨진 수단은 적다. 조상의 숙원을 이루고, 과거 최대의 리크리에로부터, 삼계를 지켜내기 위해서는 단 하나──」"

[[dialogue]]
speaker = "unk"
original = "セドナは拳を振り上げ、高らかにその場で言い放った。"
translation = "세드나는 주먹을 쳐들고, 우렁차게 그 자리에서 외쳤다."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ただいまよりここに──『グレート・ウォール計画』の始動を宣言する──！」"
translation = "「지금부터 여기에── 『그레이트 월 계획』의 시동을 선언한다──!」"

[[dialogue]]
speaker = "unk"
original = "それは彼女たち魔女、そしてネビュラという機関が、長年にわたって練り上げてきた最終プランの発動だった。"
translation = "그것은 그녀들 마녀, 그리고 네뷸라라는 기관이, 오랜 세월에 걸쳐 다듬어 온 최종 플랜의 발동이었다."

[[dialogue]]
speaker = "unk"
original = "だが……"
translation = "하지만……"

[[dialogue]]
speaker = "unk"
original = "「<b>人間界を犠牲に</b>他の二界を救う──なんて。そんなギャンビットは、あまり褒められた手ではないわね」"
translation = "「<ruby>인간계를 희생하여<rt>・・・・ ・・・・</rt></ruby> 다른 두 세계를 구한다──라니. 그런 갬빗은, 별로 칭찬받을 만한 수는 아니네」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「私の息子──どこへやったのかしら？\u3000セドナ」"
translation = "「내 아들── 어디로 보냈니? 세드나」"

[[dialogue]]
speaker = "unk"
original = "いつかの制服に身を包んだ緋宮リノが、数年ぶりに古巣へと足を踏み入れていた。"
translation = "언젠가의 제복을 입은 히노미야 리노가, 수년 만에 옛 보금자리로 발을 들여놓고 있었다."

