[[dialogue]]
speaker = "unk"
original = "第２話,トワ先生と大人の飲み会,P"
translation = "제2화, 토와 선생님과 어른들의 술자리"

[[dialogue]]
speaker = "unk"
original = "その日、トワは学園ＯＧの友人２人――リコリンフィアとマリオンに呼ばれ、リゾート結界のプライベートビーチへとやって来ていた。"
translation = "그날, 토와는 학원 OG인 친구 두 명――리코린피아와 마리온에게 불려, 리조트 결계의 프라이빗 비치로 찾아와 있었다."

[[dialogue]]
speaker = "トワ先生"
original = "「はあぁ～、やっと今日の仕事、終わったぁ～」"
translation = "「하아~, 드디어 오늘 일 끝났다~」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「やっと来たか。もう飲み始めてるぞ」"
translation = "「드디어 왔나. 벌써 마시기 시작했다고.」"

[[dialogue]]
speaker = "マリオン"
original = "「お疲れ様です、トワ。まずはいつも通り、ビールの大ジョッキでよろしいですか？」"
translation = "「수고하셨어요, 토와. 우선 평소처럼 맥주 대잔으로 드릴까요?」"

[[dialogue]]
speaker = "unk"
original = "マリオンは能力で人形を出しており、１人はリコリンフィアの隣でワインを傾け、もう１人はメイド姿で調理と給仕を担当していた。"
translation = "마리온은 능력으로 인형을 꺼내 두었으며, 한 명은 리코린피아의 옆에서 와인을 마시고, 다른 한 명은 메이드 차림으로 조리와 서빙을 담당하고 있었다."

[[dialogue]]
speaker = "トワ先生"
original = "「うん、お願い～。マリオンの手料理、久しぶりだから今日は楽しみにしてたんだよね～」"
translation = "「응, 부탁해~. 마리온의 손요리, 오랜만이라 오늘은 기대하고 있었거든~」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「マリオン、こっちも大ジョッキを追加で頼む」"
translation = "「마리온, 이쪽도 대잔 추가로 부탁한다.」"

[[dialogue]]
speaker = "マリオン"
original = "「は～い♪\u3000すぐにお持ちしますね」"
translation = "「네~♪ 금방 가져다드릴게요.」"

[[dialogue]]
speaker = "unk"
original = "そうして、大人３人の飲み会がゆるやかに始まった。"
translation = "그렇게 어른 세 명의 술자리가 완만하게 시작되었다."

[[dialogue]]
speaker = "トワ先生"
original = "「ぷはぁ～っ！\u3000やっぱり仕事終わりのビールは最高～<emoji=heart04>\u3000疲れた体に染み渡るぅ～！」"
translation = "「푸하~! 역시 퇴근 후의 맥주는 최고~<emoji=heart04> 지친 몸에 스며든다~!」"

[[dialogue]]
speaker = "トワ先生"
original = "「それに、マリオン特製の『たこわさ』も相変わらず絶品！\u3000やっぱり星見家の元メイド長は違うよね～♪」"
translation = "「게다가 마리온 특제 『타코와사』도 여전히 일품! 역시 호시미 가문의 전 메이드장은 다르네~♪」"

[[dialogue]]
speaker = "unk"
original = "たこわさ――たこをわさびと塩麹、調味料などで和えた塩辛の一種である。トワはこれが大好物で、家でもよく自分で作るほどだった。"
translation = "타코와사――문어를 와사비와 소금누룩, 조미료 등으로 버무린 젓갈의 일종이다. 토와는 이것을 무척 좋아해서, 집에서도 자주 직접 만들 정도였다."

[[dialogue]]
speaker = "マリオン"
original = "「ふふっ、おかわりしたい時はすぐに作りますから、言って下さいね」"
translation = "「후훗, 더 드시고 싶을 때는 바로 만들 테니까 말씀해 주세요.」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「……トワ、言動がちょっと親父くさいぞ？\u3000実年齢より精神年齢の方が上に見える」"
translation = "「……토와, 언행이 좀 아저씨 같다고? 실연령보다 정신 연령이 더 위로 보여.」"

[[dialogue]]
speaker = "トワ先生"
original = "「うっ！？\u3000べ、別に、リコとマリオンの前くらいでしか、こういうことは言わないからっ！」"
translation = "「윽!? 벼, 별로 리코랑 마리온 앞 정도에서밖에 이런 말 안 하거든!」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「本当か～？\u3000会長の前や、メイプルの前で気が緩んで、ついポロッと出てたりしないのか？」"
translation = "「정말이냐~? 회장 앞이나 메이플 앞에서 긴장이 풀려서 나도 모르게 툭 튀어나오거나 하지는 않고?」"

[[dialogue]]
speaker = "トワ先生"
original = "「か、会長くんの前では絶対に言ってないからっ！」"
translation = "「회, 회장 군 앞에서는 절대로 안 하니까!」"

[[dialogue]]
speaker = "マリオン"
original = "「まあまあ、うふふっ♪\u3000メイプル様の前ではつい気が緩んじゃってるんですね～。まるで姉妹みたいに仲のよろしいことで♪」"
translation = "「자자, 우후훗♪ 메이플 님 앞에서는 그만 긴장이 풀려 버리시는군요~. 마치 자매처럼 사이가 좋으시네요♪」"

[[dialogue]]
speaker = "トワ先生"
original = "「はうっ……！\u3000だ、だって疲れた時にビール飲んだら、つい言いたくなっちゃうというか……！\u3000ほら、お風呂に入って『あぁ～』って声出るのと一緒、みたいな！？」"
translation = "「하웃……! 그, 그치만 지쳤을 때 맥주 마시면 나도 모르게 말하고 싶어진달까……! 봐봐, 목욕탕 들어가서 『아아~』 소리 나오는 거랑 똑같은 거 아냐!?」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「ははっ。相変わらず正直者だな、お前は」"
translation = "「하하. 여전히 솔직하군, 너는.」"

[[dialogue]]
speaker = "unk"
original = "リコリンフィアは軽くグラスを揺らしながら、少し真面目な声色になる。"
translation = "리코린피아는 가볍게 잔을 흔들며 조금 진지한 목소리가 된다."

[[dialogue]]
speaker = "リコリンフィア"
original = "「まあ、アルコールは大人にとっての『必要毒』だ。普段なら言えないことも、酒のせいにして言いやすくなる……」"
translation = "「뭐, 알코올은 어른에게 있어서 『필요악』이다. 평소라면 못 할 말도 술기운을 빌려 말하기 쉬워지지……」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「――というわけで、今日の本題だ。トワ、ぶっちゃけお前……ここ最近、オーバーワーク気味じゃないか？」"
translation = "「――그런 고로, 오늘의 본론이다. 토와, 솔직히 너…… 요 근래 오버워크 기미 아니냐?」"

[[dialogue]]
speaker = "トワ先生"
original = "「えっ！？\u3000な、なんでそう思うの？」"
translation = "「에엣!? 어, 어째서 그렇게 생각해?」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「先月の残業、１０２時間。労働基準的にギリギリアウトだ」"
translation = "「지난달 잔업, 102시간. 노동 기준상 아슬아슬하게 아웃이다.」"

[[dialogue]]
speaker = "トワ先生"
original = "「リ、リコ、それ調べたの……？」"
translation = "「리, 리코, 그거 조사한 거야……?」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「ああ。こう見えて、私は公安委員会の本部長なんでな」"
translation = "「그래. 이래 봬도 나는 공안위원회의 본부장이라서 말이지.」"

[[dialogue]]
speaker = "トワ先生"
original = "「ま、まあ、でも私、能力で『自動回復』あるし、大丈夫だよ！\u3000今月は気を付けるし……」"
translation = "「뭐, 뭐어, 하지만 나 능력으로 『자동 회복』도 있고 괜찮아! 이번 달은 조심할 거고……」"

[[dialogue]]
speaker = "マリオン"
original = "「ですが、さっきも『疲れた』って言ってましたよね？」"
translation = "「하지만 방금도 『지쳤다』고 말씀하셨잖아요?」"

[[dialogue]]
speaker = "マリオン"
original = "「体が勝手に自動回復する特殊体質であっても、精神的な疲労、ストレスなどの心の疲れは癒やせませんよ」"
translation = "「몸이 알아서 자동 회복되는 특수 체질이라 해도, 정신적인 피로, 스트레스 같은 마음의 지침은 치유할 수 없어요.」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「それと――トワ。お前、最近新しく『バレンタインフォーム』に覚醒したんだろう？\u3000今ここで見せてくれないか？」"
translation = "「그리고――토와. 너, 최근에 새로 『발렌타인 폼』으로 각성했다며? 지금 여기서 보여주지 않겠나?」"

[[dialogue]]
speaker = "トワ先生"
original = "「こ、こんな感じだけど……」"
translation = "「이, 이런 느낌인데……」"

[[dialogue]]
speaker = "マリオン"
original = "「はああぁっ<emoji=heart04>\u3000実にお似合いです！\u3000とてもお可愛いですよ、トワ<emoji=heart04>\u3000思わずお持ち帰りしたくなってしまうくらい……！」"
translation = "「하아아아<emoji=heart04> 정말 잘 어울려요! 너무 귀여워요, 토와<emoji=heart04> 나도 모르게 보쌈해 가고 싶어질 정도로……!」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「ほう、やるじゃないか。私が『リコリン』を生み出す際にモデルにしただけはある。見事な可愛さだと褒めてやろう」"
translation = "「호오, 제법이군. 내가 『리코린』을 만들 때 모델로 삼은 보람이 있어. 훌륭한 귀여움이라고 칭찬해 주지.」"

[[dialogue]]
speaker = "トワ先生"
original = "「いや、私はあんなにあざとくないからね！？」"
translation = "「아니, 나는 그렇게 요망하지 않거든!?」"

[[dialogue]]
speaker = "マリオン"
original = "「私はリコリン様も、大変にお可愛いくて大好きですけどね<emoji=heart04>\u3000ふふっ♪」"
translation = "「저는 리코린 님도 무척 귀여우셔서 정말 좋아하지만요<emoji=heart04> 후훗♪」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「えへへ～♪\u3000マリオンお姉ちゃん、ありがと～☆\u3000リコリン、嬉しい<emoji=heart04>」"
translation = "「에헤헤~♪ 마리온 언니, 고마워~☆ 리코린, 기뻐<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「あらあらっ！\u3000うふふふっ<emoji=heart04>\u3000そんなお可愛いらしいことを言うと、今夜はお持ち帰りしちゃいますよ～？」"
translation = "「어머어머! 우후후훗<emoji=heart04> 그런 귀여운 소리를 하면 오늘 밤은 보쌈해 버릴 거예요~?」"

[[dialogue]]
speaker = "トワ先生"
original = "「えっと……２人共、もう酔ってる？」"
translation = "「저기…… 둘 다 벌써 취했어?」"

[[dialogue]]
speaker = "マリオン"
original = "「いえ、いつも通りです<emoji=heart04>」"
translation = "「아뇨, 평소대로입니다<emoji=heart04>」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「リコリンも、いつも通りの可愛さだよ～☆\u3000てへっ♪」"
translation = "「리코린도 평소대로의 귀여움이야~☆ 데헷♪」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「――と、冗談はさておき……これでトワの戦闘服は、通常、ノヴァ、ウェディングフォームに続き、４フォーム目となる」"
translation = "「――라고, 농담은 제쳐두고…… 이걸로 토와의 전투복은 통상, 노바, 웨딩 폼에 이어 4번째 폼이 된다.」"

[[dialogue]]
speaker = "マリオン"
original = "「しかも最近になってから覚醒ラッシュが続いています。ここに来てトワは、星騎士として目覚ましい成長を遂げていると言っていいでしょう」"
translation = "「게다가 최근 들어 각성 러시가 이어지고 있어요. 이 시점에서 토와는 성기사로서 눈부신 성장을 이루고 있다고 해도 과언이 아니겠죠.」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「今や、お前はリクリエ最前線で戦う現星徒会メンバーにも匹敵する実力者だ。真面目な話、流星市国の中でもトップクラスの星騎士と言っていい」"
translation = "「이제 너는 리크리에 최전선에서 싸우는 현 성도회 멤버에게도 필적하는 실력자다. 진지하게 말해서 유성시국 안에서도 톱클래스 성기사라고 해도 좋아.」"

[[dialogue]]
speaker = "トワ先生"
original = "「そんな、私はまだまだ……」"
translation = "「그런, 나는 아직 멀었어……」"

[[dialogue]]
speaker = "マリオン"
original = "「でも実際、前線でよく活躍していると伺いましたよ。会長様たちと一緒に」"
translation = "「하지만 실제로 전선에서 자주 활약하고 있다고 들었어요. 회장님들과 함께.」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「だが一方で、星騎士としての活動が増えたからこそ、教師の仕事との両立が大変になり、残業時間が増えている……違うか？」"
translation = "「하지만 한편으로는 성기사로서의 활동이 늘어났기에 교사 일과의 양립이 힘들어져 잔업 시간이 늘어나고 있다…… 아니냐?」"

[[dialogue]]
speaker = "トワ先生"
original = "「……うん。リコの言う通りだよ。最近は戦うことが増えて、仕事も山積みで、残業や休日出勤ばっかり」"
translation = "「……응. 리코 말이 맞아. 요즘은 싸우는 일이 늘어서 일도 산더미고, 잔업이나 휴일 출근뿐이야.」"

[[dialogue]]
speaker = "トワ先生"
original = "「でもね……私、星騎士として、会長くんたちと一緒に肩を並べて戦える今が、すごく嬉しいんだ」"
translation = "「하지만 말이야…… 나, 성기사로서 회장 군 일행이랑 어깨를 나란히 하고 싸울 수 있는 지금이 너무 기뻐.」"

[[dialogue]]
speaker = "トワ先生"
original = "「学生の頃からずっと、リコやマリオンみたいに強くなって、みんなと一緒に戦いたいって思ってたから」"
translation = "「학생 때부터 줄곧 리코나 마리온처럼 강해져서 모두와 함께 싸우고 싶다고 생각했으니까.」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「だったら――現役の星騎士である私たちのことも、もっと頼れ」"
translation = "「그렇다면――현역 성기사인 우리도 좀 더 의지해라.」"

[[dialogue]]
speaker = "トワ先生"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「お前は昔から、なんでも自分で抱え込もうとする癖がある。自動回復があるからって、他人を頼らなくても勝手に自己解決できるだろうと思い込んでいる」"
translation = "「너는 예전부터 뭐든 혼자 껴안으려는 버릇이 있어. 자동 회복이 있다고 해서 타인을 의지하지 않아도 알아서 자기 해결할 수 있을 거라 믿어버리지.」"

[[dialogue]]
speaker = "マリオン"
original = "「つまり、トワは自分で思っているよりずっと、『甘え下手』ってことですね♪」"
translation = "「즉, 토와는 스스로 생각하는 것보다 훨씬 『어리광 부리는 데 서투르다』는 거네요♪」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「変に理由をつけて、自分を抑え込もうとする。それはお前の長所でもあり、弱点でもある」"
translation = "「이상하게 이유를 대며 자신을 억누르려 해. 그건 너의 장점이자 약점이기도 하다.」"

[[dialogue]]
speaker = "トワ先生"
original = "「だって私、もう大人で……今は先生だし……」"
translation = "「그치만 나, 이제 어른이고…… 지금은 선생님이니까……」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「私も大人だが？」"
translation = "「나도 어른인데?」"

[[dialogue]]
speaker = "マリオン"
original = "「あと、私たちにとってトワは『先生』ではなく、『同級生』ですよ♪」"
translation = "「그리고 저희에게 토와는 『선생님』이 아니라 『동급생』이에요♪」"

[[dialogue]]
speaker = "unk"
original = "俺も恋人なので、もっと頼って下さい"
translation = "「저도 연인이니까, 좀 더 의지해 주세요.」"

[[dialogue]]
speaker = "トワ先生"
original = "「へっ！？\u3000か、会長くん！？\u3000どうしてここに！？」"
translation = "「헤!? 회, 회장 군!? 어째서 여기에!?」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「私が呼んでおいた。トワにはちょうどいい毒になると思ってな」"
translation = "「내가 불러뒀다. 토와에게는 딱 좋은 독이 될 것 같아서 말이지.」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「肩書きが邪魔なら、それがいらない相手に甘えればいい。そういうことだ」"
translation = "「직함이 방해된다면 그게 필요 없는 상대에게 어리광 부리면 된다. 그런 소리다.」"

[[dialogue]]
speaker = "トワ先生"
original = "「……ほんと、昔からリコには敵わないなぁ」"
translation = "「……정말, 예전부터 리코한테는 못 당하겠네.」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「ふっ……私は毒のスペシャリストなんでな」"
translation = "「훗…… 나는 독의 스페셜리스트니까.」"

[[dialogue]]
speaker = "マリオン"
original = "「うふふっ♪\u3000それでは、会長様もいらっしゃいましたし――改めて、楽しい食事会にいたしましょうか♪」"
translation = "「우후훗♪ 그럼 회장님도 오셨으니―― 다시금 즐거운 식사 모임을 가져볼까요♪」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「お兄ちゃ～ん♪\u3000リコリンの隣、空いてるよ～☆\u3000こっちこっち～♪」"
translation = "「오빠~♪ 리코린 옆자리 비어 있어~☆ 여기 여기~♪」"

[[dialogue]]
speaker = "トワ先生"
original = "「いやいや、そこは私の隣でしょ！？\u3000会長くんは私の恋人なんだからっ！」"
translation = "「아니 아니, 거긴 내 옆자리지!? 회장 군은 내 연인이니까!」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「甘いな、トワ。そんな誘い方じゃ、リコリンの可愛さには敵わないぞ？\u3000モデルとなったトワの『附属生なりきりモード』を見せてみろ」"
translation = "「무르군, 토와. 그런 유혹 방식으로는 리코린의 귀여움을 이길 수 없다고? 모델이 된 토와의 『부속생 흉내 모드』를 보여줘 봐라.」"

[[dialogue]]
speaker = "unk"
original = "それ、前から気になってたんですよね"
translation = "「그거, 전부터 궁금했었거든요.」"

[[dialogue]]
speaker = "マリオン"
original = "「それはもう、とってもお可愛いらしかったんですよ<emoji=heart04>\u3000あれはそう、学園時代、附属生の子から頼まれて――」"
translation = "「그건 정말이지 너무나도 귀여우셨다구요<emoji=heart04> 그건 그러니까 학원 시절 부속생 아이한테 부탁받아서――」"

[[dialogue]]
speaker = "トワ先生"
original = "「ちょっ！？\u3000黒歴史を彼氏に暴露するのはやめてえぇぇ～～～っ！！？」"
translation = "「잠깐!? 흑역사를 남자친구한테 폭로하는 건 그만둬어어어~~!!?」"

[[dialogue]]
speaker = "unk"
original = "その後、クロトもＯＧ組の輪に加わり、大人たちの賑やかで楽しい夜が笑い声とともに更けていくのだった。"
translation = "그 후, 쿠로토도 OG 팀의 고리에 합류하여 어른들의 시끌벅적하고 즐거운 밤이 웃음소리와 함께 깊어가는 것이었다."

