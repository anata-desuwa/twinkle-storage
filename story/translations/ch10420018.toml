[[dialogue]]
speaker = "unk"
original = "フェニエルと恋人になってから、彼女は２人きりになると、自らメイドになりきって俺をご主人様と呼び甘えることが多くなっていた。"
translation = "페니엘과 연인이 된 후로, 그녀는 둘만 있게 되면 스스로 메이드가 된 것처럼 나를 주인님이라 부르며 어리광을 부리는 일이 많아졌다."

[[dialogue]]
speaker = "unk"
original = "今日は休日。俺は流星寮の彼女の部屋へ遊びにきていたのだが……まあ、好きな女の子とくっ付いてイチャイチャしていれば、そういう気分にもなってしまうわけで――"
translation = "오늘은 휴일. 나는 유성 기숙사의 그녀의 방으로 놀러 왔는데…… 뭐, 좋아하는 여자애와 붙어서 꽁냥거리고 있으면 그런 기분이 되어버리는 법이라──"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「はあぁ……<emoji=heart04>\u3000ご主人様のおち○ちん、相変わらず大きくて、たくましくてすごいです……<emoji=heart04>」"
translation = "「하아……<emoji=heart04> 주인님의 자지, 여전히 크고 늠름해서 대단해요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「……え？\u3000ご主人様、どうして謝るんですか？」"
translation = "「……에? 주인님, 왜 사과하시는 건가요?」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「いつもムラムラして、勃起しちゃうから？\u3000えへへ、でもそれって、私のこと女の子として魅力的に思ってくれているって、ことですよね……<emoji=heart04>」"
translation = "「항상 욕정해서 발기해버리니까? 에헤헤, 하지만 그건 저를 여자로서 매력적으로 생각해주고 있다는 뜻이잖아요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「私はすごく嬉しいですし、それに……ご主人様とのエッチは好きですから、大丈夫ですよ<emoji=heart04>」"
translation = "「저는 무척 기쁘고, 그리고…… 주인님과의 섹스는 좋아하니까 괜찮아요<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「好きな人と触れ合うの、気持ちいいので……えへへ♪」"
translation = "「좋아하는 사람과 닿는 거, 기분 좋으니까…… 에헤헤♪」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「だからご主人様も、遠慮せずに気持ちよくなって下さい<emoji=heart04>」"
translation = "「그러니까 주인님도 사양 말고 기분 좋아지세요<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「まずは……舌でご奉仕させて頂きますね……<emoji=heart04>\u3000ん……ちゅっ<emoji=heart04>」"
translation = "「우선은…… 혀로 봉사해 드릴게요……<emoji=heart04> 응…… 츄릅<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「まずはおち○ちんの竿の方から、失礼します……れろっ……ちゅっ<emoji=heart04>\u3000ん……ぺろっ<emoji=heart04>」"
translation = "「우선은 자지의 기둥 쪽부터 실례할게요…… 레로…… 츄릅<emoji=heart04> 응…… 할짝<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「はあぁ……れろちゅっ<emoji=heart04>\u3000れろっ……んむっ<emoji=heart04>\u3000ぺろっ……れろれろっ……ちゅむっ<emoji=heart04>\u3000ふうぅ……<emoji=heart04>」"
translation = "「하아…… 레로츄릅<emoji=heart04> 레로…… 음뭇<emoji=heart04> 할짝…… 레로레로…… 츄뭇<emoji=heart04> 후우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「んっ……次はタマタマの方も……<emoji=heart04>\u3000ちゅっ……れるっ<emoji=heart04>\u3000れろっ……ぴちゃっ……ぺろっ<emoji=heart04>」"
translation = "「응…… 다음은 불알 쪽도……<emoji=heart04> 츄릅…… 레룰<emoji=heart04> 레로…… 퍄앗…… 할짝<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ちゅっちゅっ……れろちゅっ<emoji=heart04>\u3000ご主人様、気持ちいいですか……？\u3000んむっ……ちゅれるっ<emoji=heart04>」"
translation = "「쪽쪽…… 레로츄릅<emoji=heart04> 주인님, 기분 좋으신가요……? 음뭇…… 츄레룰<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「おち○ちんの先っぽ、舐めますね……<emoji=heart04>\u3000れろれろっ……ちゅるっ<emoji=heart04>\u3000ちゅっ……ぺろっ<emoji=heart04>\u3000れろちゅっ……ちゅるっ<emoji=heart04>」"
translation = "「자지 끝부분, 핥을게요……<emoji=heart04> 레로레로…… 츄르릅<emoji=heart04> 츄릅…… 할짝<emoji=heart04> 레로츄릅…… 츄르릅<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「んはぁ……<emoji=heart04>\u3000カリが太くて、しゅごいです……んふぅ<emoji=heart04>\u3000れろっ……ちゅっちゅっ……<emoji=heart04>」"
translation = "「은하아……<emoji=heart04> 귀두가 굵어서 대단해요…… 응후우<emoji=heart04> 레로…… 쪽쪽……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「はあぁ……<emoji=heart04>\u3000ちゅっ……ぺろっ……れるっ<emoji=heart04>\u3000おち○ちん、ご主人様の匂いがします……<emoji=heart04>」"
translation = "「하아……<emoji=heart04> 츄릅…… 할짝…… 레룰<emoji=heart04> 자지에서 주인님 냄새가 나요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ぺろっ……れろちゅっ<emoji=heart04>\u3000すうぅ……好きな男の人の匂い……んっ<emoji=heart04>\u3000ちゅるっ……ちゅっちゅっ……<emoji=heart04>」"
translation = "「할짝…… 레로츄릅<emoji=heart04> 스으읍…… 좋아하는 남자의 냄새…… 응<emoji=heart04> 츄르릅…… 쪽쪽……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「安心するのに、嗅いでるとドキドキ、しちゃいます……<emoji=heart04>\u3000んちゅっ……ちゅるっ……れろちゅっ<emoji=heart04>」"
translation = "「안심되는데, 맡고 있으면 두근두근해버려요……<emoji=heart04> 응츄릅…… 츄르릅…… 레로츄릅<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「すごくエッチな匂いで、おま○こも、濡れちゃいます……ふうぅ……<emoji=heart04>\u3000ちゅっ……れろっ<emoji=heart04>」"
translation = "「무척 야한 냄새라 보지도 젖어버려요…… 후우……<emoji=heart04> 츄릅…… 레로<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「好き……<emoji=heart04>\u3000ご主人様の匂い、好きです……<emoji=heart04>\u3000れろれろっ……ちゅるるっ<emoji=heart04>」"
translation = "「좋아해……<emoji=heart04> 주인님 냄새, 좋아해요……<emoji=heart04> 레로레로…… 츄르르릅<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「私だけのご主人様……ちゅるっ、ぺろっ<emoji=heart04>\u3000んむっ……ちゅっ、ちゅるっ……ちゅれるっ<emoji=heart04>」"
translation = "「저만의 주인님…… 츄르릅, 할짝<emoji=heart04> 음뭇…… 츄릅, 츄르릅…… 츄레룰<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「んむっ……れろっ<emoji=heart04>\u3000おち○ちん、すごく固くなってます……れろちゅっ<emoji=heart04>」"
translation = "「음뭇…… 레로<emoji=heart04> 자지, 무척 딱딱해졌어요…… 레로츄릅<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「私がエッチだから、興奮しちゃったんですか？\u3000んふっ……嬉しいです……ちゅっちゅっ<emoji=heart04>」"
translation = "「제가 야해서 흥분해버린 건가요? 응훗…… 기뻐요…… 쪽쪽<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「舐め方がやらしい？\u3000んむっ……れろちゅっ<emoji=heart04>」"
translation = "「핥는 게 야하다고요? 음뭇…… 레로츄릅<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ごめんなしゃい……たくましいおち○ちん舐めてると、好きって気持ちが、溢れてきちゃうんです……<emoji=heart04>\u3000れろっ……ちゅれるっ<emoji=heart04>」"
translation = "「죄송해여…… 늠름한 자지를 핥고 있으면 좋아한다는 마음이 넘쳐흘러 버려요……<emoji=heart04> 레로…… 츄레룰<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「はい、お口でするの、好きれす……ぺろっ、ちゅっ<emoji=heart04>」"
translation = "「네, 입으로 하는 거 좋아해여…… 할짝, 츄릅<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「好きな人にご奉仕してるって感じがして……ちゅれるっ<emoji=heart04>\u3000ぴちゃっ……れろちゅっ<emoji=heart04>\u3000んあっ……ふうぅ……<emoji=heart04>」"
translation = "「좋아하는 사람에게 봉사하고 있다는 느낌이 들어서…… 츄레룰<emoji=heart04> 퍄앗…… 레로츄릅<emoji=heart04> 응앗…… 후우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「んっ……<emoji=heart04>\u3000ご主人様、そろそろ咥えさせてもらっても、いいですか……？」"
translation = "「응……<emoji=heart04> 주인님, 슬슬 물게 해주셔도 될까요……?」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「――はい、ありがとうございます<emoji=heart04>\u3000誠心誠意、ご奉仕フェラ致しますね<emoji=heart04>」"
translation = "「──네, 감사합니다<emoji=heart04> 성심성의껏 봉사 펠라 해드릴게요<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「それでは……ちゅっ……あむっ――<emoji=heart04>」"
translation = "「그럼…… 츄릅…… 아믓──<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ちゅぷぷっ<emoji=heart04>\u3000んんっ……<emoji=heart04>\u3000れろちゅっ……れるれるっ<emoji=heart04>\u3000ちゅるるっ……ちゅぱっ<emoji=heart04>」"
translation = "「츄푸푸<emoji=heart04> 응응……<emoji=heart04> 레로츄릅…… 레룰레룰<emoji=heart04> 츄르르릅…… 츄팟<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「はあぁ……<emoji=heart04>\u3000ちゅぷっ……ちゅぽっ……ちゅるるっ、ぴちゃっ……ちゅぱっ<emoji=heart04>」"
translation = "「하아……<emoji=heart04> 츄풋…… 츄폿…… 츄르르릅, 퍄앗…… 츄팟<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「おち○ちん、大きくて、熱いれす……<emoji=heart04>\u3000ちゅぽっ……ぴちゃっ……れるっ<emoji=heart04>」"
translation = "「자지, 크고 뜨거워여……<emoji=heart04> 츄폿…… 퍄앗…… 레룰<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「れろちゅっ……んふぅ……ちゅぱっ<emoji=heart04>\u3000しゅごい……<emoji=heart04>\u3000ちゅるるっ……ちゅぽっ、ちゅうぅっ<emoji=heart04>」"
translation = "「레로츄릅…… 응후우…… 츄팟<emoji=heart04> 대단해……<emoji=heart04> 츄르르릅…… 츄폿, 츄우우우<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「んむっ<emoji=heart04>\u3000れろれろっ……んくっ<emoji=heart04>\u3000おち○ちんの先っぽから、我慢汁いっぱい、出てきてます<emoji=heart04>」"
translation = "「음뭇<emoji=heart04> 레로레로…… 응긋<emoji=heart04> 자지 끝에서 쿠퍼액이 잔뜩 나오고 있어요<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ちゅるるっ……はあぁ<emoji=heart04>\u3000れろっ、ぴちゃっ……んくっ<emoji=heart04>\u3000れろちゅっ<emoji=heart04>」"
translation = "「츄르르릅…… 하아아<emoji=heart04> 레로, 퍄앗…… 응긋<emoji=heart04> 레로츄릅<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ご主人様の味……んあっ<emoji=heart04>\u3000れろちゅっ……ちゅぷぷっ<emoji=heart04>\u3000美味しいれす……<emoji=heart04>」"
translation = "「주인님의 맛…… 응앗<emoji=heart04> 레로츄릅…… 츄푸푸<emoji=heart04> 맛있어여……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ちゅぱっ……ちゅるるっ<emoji=heart04>\u3000んくっ……れるれるっ<emoji=heart04>\u3000んんっ……ちゅぷっ、ちゅぷぷっ<emoji=heart04>」"
translation = "「츄팟…… 츄르르릅<emoji=heart04> 응긋…… 레룰레룰<emoji=heart04> 응응…… 츄풋, 츄푸푸<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「エッチな味で……ちゅぽっ……ちゅれるっ<emoji=heart04>\u3000体、熱くなっちゃいます……<emoji=heart04>」"
translation = "「야한 맛이라…… 츄폿…… 츄레룰<emoji=heart04> 몸이 뜨거워져 버려요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ちゅぱっ……ちゅるるっ<emoji=heart04>\u3000頭もふわふわして……れろちゅっ……んふぅ……<emoji=heart04>」"
translation = "「츄팟…… 츄르르릅<emoji=heart04> 머리도 붕 뜨고…… 레로츄릅…… 응후우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「はあぁ<emoji=heart04>\u3000おち○ちん、好き<emoji=heart04>\u3000しゅきです……ちゅっ<emoji=heart04>\u3000ちゅるるっ……ちゅぱっ<emoji=heart04>」"
translation = "「하아아<emoji=heart04> 자지, 좋아<emoji=heart04> 좋아해요…… 츄릅<emoji=heart04> 츄르르릅…… 츄팟<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「男らしくて立派なおち○ちん……ちゅぽっ、ちゅうぅ……<emoji=heart04>\u3000しゅき……れろちゅっ<emoji=heart04>」"
translation = "「남자답고 훌륭한 자지…… 츄폿, 츄우우……<emoji=heart04> 좋아…… 레로츄릅<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「タマタマ揉みますね……気持ちよくなって、精液沢山作って下しゃい<emoji=heart04>\u3000もみもみ……んちゅっ<emoji=heart04>」"
translation = "「불알 주무를게요…… 기분 좋아져서 정액 잔뜩 만들어주세여<emoji=heart04> 조물조물…… 응츄릅<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ちゅれろっ……ちゅるるっ<emoji=heart04>\u3000ちゅぱっ<emoji=heart04>\u3000ちゅっぽ……ちゅっぽ<emoji=heart04>\u3000ご主人様、気持ちいいですか……？\u3000んむっ……ちゅうぅっ……ちゅっぷ、ちゅっぷっ<emoji=heart04>」"
translation = "「츄레로…… 츄르르릅<emoji=heart04> 츄팟<emoji=heart04> 츄포 츄포<emoji=heart04> 주인님, 기분 좋으신가요……? 음뭇…… 츄우우…… 츄릅 츄릅<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「我慢しないで、お汁いっぱい出して下しゃいね……あむっ<emoji=heart04>\u3000ちゅぱっ……ちゅぷぷっ<emoji=heart04>」"
translation = "「참지 말고 즙 잔뜩 내주세여…… 아믓<emoji=heart04> 츄팟…… 츄푸푸<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ご主人様の精液、全部飲みましゅから……んくっ、んむっ<emoji=heart04>\u3000れろれろっ……ちゅるるっ<emoji=heart04>」"
translation = "「주인님의 정액, 전부 마실게여…… 응긋, 음뭇<emoji=heart04> 레로레로…… 츄르르릅<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「んはぁ……好き<emoji=heart04>\u3000もっともっと、お口ご奉仕<emoji=heart04>\u3000したくなっちゃいます……<emoji=heart04>\u3000ぷちゅちゅ……っ」"
translation = "「은하아…… 좋아<emoji=heart04> 더 많이 입으로 봉사<emoji=heart04> 하고 싶어져요……<emoji=heart04> 푸츄츄……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ちゅぷぷっ……もっと奥まで……ちゅっぽ<emoji=heart04>\u3000ちゅっぽ<emoji=heart04>\u3000んうぅ……ちゅぷぷっ……じゅるるっ<emoji=heart04>」"
translation = "「츄푸푸…… 더 깊숙이…… 츄포<emoji=heart04> 츄포<emoji=heart04> 응우우…… 츄푸푸…… 쥬르르릅<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「じゅっぽ<emoji=heart04>\u3000じゅっぽ……じゅぷぷっ<emoji=heart04>\u3000んぶっ……じゅるるっ<emoji=heart04>\u3000れろれろっ……ちゅぱっ<emoji=heart04>」"
translation = "「쥬포<emoji=heart04> 쥬포…… 쥬푸푸<emoji=heart04> 응붓…… 쥬르르릅<emoji=heart04> 레로레로…… 츄팟<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ご主人様のおち○ちんで、口いっぱいれしゅ……ちゅぷぷっ<emoji=heart04>\u3000じゅっぽ……じゅぷぷっ<emoji=heart04>」"
translation = "「주인님의 자지로 입안이 가득해여…… 츄푸푸<emoji=heart04> 쥬포…… 쥬푸푸<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ちゅぱっ<emoji=heart04>\u3000ご主人様<emoji=heart04>\u3000お口ま○こ、気持ちよく、れきてますか……？\u3000んぶぶっ<emoji=heart04>」"
translation = "「츄팟<emoji=heart04> 주인님<emoji=heart04> 입보지, 기분 좋게 해드리고 있나요……? 응부부<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「じゅっぽ……じゅっぽ<emoji=heart04>\u3000れろれろっ……じゅるるっ<emoji=heart04>\u3000じゅっぷ、じゅっぷ<emoji=heart04>\u3000じゅるっぽ<emoji=heart04>」"
translation = "「쥬포…… 쥬포<emoji=heart04> 레로레로…… 쥬르르릅<emoji=heart04> 쥬릅 쥬릅<emoji=heart04> 쥬르포<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「んぷぁ<emoji=heart04>\u3000えへへ♪\u3000頭撫でられるの、嬉しいれしゅ<emoji=heart04>」"
translation = "「응푸아<emoji=heart04> 에헤헤♪ 머리 쓰다듬어지는 거 기뻐여<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「じゅぷぷっ……じゅっぽ<emoji=heart04>\u3000じゅるる……れろちゅっ<emoji=heart04>\u3000んぶぶっ<emoji=heart04>\u3000じゅっぽ……じゅるるっ<emoji=heart04>\u3000んぶぅ……<emoji=heart04>」"
translation = "「쥬푸푸…… 쥬포<emoji=heart04> 쥬르르…… 레로츄릅<emoji=heart04> 응부부<emoji=heart04> 쥬포…… 쥬르르릅<emoji=heart04> 응부우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「じゅぷぷっ……ぷはぁ<emoji=heart04>\u3000ふえ？\u3000喉奥まで咥えて、苦しくないのか、ですか？」"
translation = "「쥬푸푸…… 푸하아<emoji=heart04> 후에? 목구멍 깊숙이 물어서 괴롭지 않냐고요?」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「れろちゅっ……じゅっぷ<emoji=heart04>\u3000ちょっと苦しい、ですけど、ちゅちゅる……<emoji=heart04>\u3000最近、慣れてきましたし……じゅっぽ<emoji=heart04>\u3000それに……んむっ<emoji=heart04>」"
translation = "「레로츄릅…… 쥬릅<emoji=heart04> 조금 괴롭지만, 츄츄르……<emoji=heart04> 최근에는 익숙해졌고…… 쥬포<emoji=heart04> 게다가…… 음뭇<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「好きな人から、与えられているんだと思うと……じゅっぽ<emoji=heart04>\u3000興奮して……ふうぅ……んぷっ<emoji=heart04>」"
translation = "「좋아하는 사람에게 부여받고 있다고 생각하면…… 쥬포<emoji=heart04> 흥분해서…… 후우…… 응풋<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「苦しいのも、気持ちよく、なっちゃうんです……<emoji=heart04>\u3000じゅるるっ……じゅるっぽ<emoji=heart04>」"
translation = "「괴로운 것도 기분 좋게 되어버려요……<emoji=heart04> 쥬르르릅…… 쥬르포<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「だからもっと――私を使って、いっぱい気持ちよくなって下さい<emoji=heart04>」"
translation = "「그러니까 더── 저를 사용해서 잔뜩 기분 좋아지세요<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「じゅぷぷっ……ご主人様<emoji=heart04>\u3000じゅっぽ、じゅっぽ……れろれろっ……じゅるるるっ<emoji=heart04>」"
translation = "「쥬푸푸…… 주인님<emoji=heart04> 쥬포, 쥬포…… 레로레로…… 쥬르르르릅<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「んぶっ<emoji=heart04>\u3000ご主人様、興奮しちゃったんれしゅか？\u3000んぽっ……じゅるるっ<emoji=heart04>」"
translation = "「응붓<emoji=heart04> 주인님, 흥분해버리셨나여? 응폿…… 쥬르르릅<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「――はい……大丈夫れす<emoji=heart04>\u3000だから、ご主人様も好きに、動いて下さい……じゅっぽ、じゅっぽ<emoji=heart04>」"
translation = "「──네…… 괜찮아여<emoji=heart04> 그러니까 주인님도 마음껏 움직여주세요…… 쥬포, 쥬포<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「どうぞ、気持ちいいのに身を任せて……ちゅばっ、ちゅぶぶっ<emoji=heart04>」"
translation = "「자, 기분 좋은 것에 몸을 맡기고…… 츄밧, 츄부부<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「私が全部、受け止めましゅから……んぶっ<emoji=heart04>\u3000じゅるるっ……じゅっぽ、じゅっぽ<emoji=heart04>\u3000来てくらしゃい<emoji=heart04>」"
translation = "「제가 전부 받아낼게여…… 응붓<emoji=heart04> 쥬르르릅…… 쥬포, 쥬포<emoji=heart04> 와주세여<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「んちゅっ<emoji=heart04>\u3000じゅぽぽっ、じゅぶぶぶっ<emoji=heart04>\u3000れろちゅっ……じゅるるるっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응츄릅<emoji=heart04> 쥬포포, 쥬부부부<emoji=heart04> 레로츄릅…… 쥬르르르릅<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……フニ……うぁ……！」"
translation = "「윽…… 후니…… 으아……!」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「――お口ま○こで、もっとご奉仕、しましゅ<emoji=heart04>\u3000んぶぶっ<emoji=heart04>」"
translation = "「──입보지로 더 봉사할게여<emoji=heart04> 응부부<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「じゅっぽじゅっぽじゅっぽ<emoji=heart04>\u3000んぶっ、じゅるるっ<emoji=heart04>\u3000じゅっぽれるれるじゅぷぷっ<emoji=heart04>\u3000じゅっぽじゅっぽじゅっぽ<emoji=heart04>\u3000んぶぅ<emoji=heart04>\u3000れるちゅっ<emoji=heart04>」"
translation = "「쥬포 쥬포 쥬포<emoji=heart04> 응붓, 쥬르르릅<emoji=heart04> 쥬포 레룰레룰 쥬푸푸<emoji=heart04> 쥬포 쥬포 쥬포<emoji=heart04> 응부우<emoji=heart04> 레룰츄릅<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ちゅぼちゅぼちゅぼっ<emoji=heart04>\u3000……激しいのっ、興奮しちゃいましゅぅ<emoji=heart04>」"
translation = "「츄보 츄보 츄보<emoji=heart04> ……격렬한 거 흥분돼여어<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「じゅるるっ、ちゅばっ、ちゅばばっ<emoji=heart04>\u3000んぶぶっ、じゅぽじゅぽじゅぽ<emoji=heart04>\u3000ちゅばっ、じゅれるっ、んぷぁっ<emoji=heart04>」"
translation = "「쥬르르릅, 츄밧, 츄바밧<emoji=heart04> 응부부, 쥬포 쥬포 쥬포<emoji=heart04> 츄밧, 쥬레룰, 응푸앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ご主人様、気持ちいいれふか？\u3000じゅぽっじゅぽっじゅぽっ<emoji=heart04>」"
translation = "「주인님, 기분 좋으세여? 쥬포 쥬포 쥬포<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「んむぅっ、ちゅっちゅっちゅぱぁ<emoji=heart04>\u3000私も喉奥突かれて、感じちゃいましゅ<emoji=heart04>\u3000んぶっ……ちゅぶちゅぶちゅばぁっ<emoji=heart04>」"
translation = "「음무우, 츄츄츄팟<emoji=heart04> 저도 목구멍 찔려서 느껴버려여<emoji=heart04> 응붓…… 츄부 츄부 츄바앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「んむっ<emoji=heart04>\u3000んぶぶっ<emoji=heart04>\u3000じゅぽじゅぽじゅぽっ<emoji=heart04>\u3000ちゅばっ、じゅるるっ、れるちゅっ<emoji=heart04>\u3000ちゅぶちゅぶちゅぶっ<emoji=heart04>\u3000ちゅぼぼっ、ちゅぼっちゅぼっちゅぼっ、ちゅばぁっ<emoji=heart04>」"
translation = "「음뭇<emoji=heart04> 응부부<emoji=heart04> 쥬포 쥬포 쥬포<emoji=heart04> 츄밧, 쥬르르릅, 레룰츄릅<emoji=heart04> 츄부 츄부 츄부<emoji=heart04> 츄보보, 츄보 츄보 츄보, 츄바앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「んぶっ<emoji=heart04>\u3000ご主人様、好き<emoji=heart04>\u3000ちゅっちゅぽっちゅぶぶっ<emoji=heart04>\u3000愛してましゅ<emoji=heart04>\u3000ちゅぼちゅぼちゅぼっ<emoji=heart04>\u3000んむっ、しゅきぃ<emoji=heart04>\u3000じゅっぽじゅっぽじゅっぽっ<emoji=heart04>\u3000じゅるるっ<emoji=heart04>」"
translation = "「응붓<emoji=heart04> 주인님, 좋아해<emoji=heart04> 츄츄포 츄부부<emoji=heart04> 사랑해여<emoji=heart04> 츄보 츄보 츄보<emoji=heart04> 음뭇, 좋아아<emoji=heart04> 쥬포 쥬포 쥬포<emoji=heart04> 쥬르르릅<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……俺も好きだ、フニ……！」"
translation = "「윽…… 나도 좋아해, 후니……!」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「んぶぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000嬉しいれしゅ……ちゅぶぶっ、ちゅぱっ、じゅれるっ<emoji=heart04>」"
translation = "「응부우우우──<emoji=heart04><emoji=heart04><emoji=heart04> 기뻐여…… 츄부부, 츄팟, 쥬레룰<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「好きっ、じゅっぽじゅっぽじゅっぽ<emoji=heart04>\u3000しゅきしゅき<emoji=heart04>\u3000ちゅぼっちゅぼっちゅぶぶぶっ<emoji=heart04>」"
translation = "「좋아, 쥬포 쥬포 쥬포<emoji=heart04> 좋아 좋아<emoji=heart04> 츄보 츄보 츄부부부<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「れろちゅっ、ちゅぱっ、はあぁ<emoji=heart04>\u3000もっとぉ<emoji=heart04>\u3000ちゅっちゅっちゅぱっ<emoji=heart04>」"
translation = "「레로츄릅, 츄팟, 하아아<emoji=heart04> 더어<emoji=heart04> 츄츄츄팟<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「おち○ちん、もっと気持ちよくなって下しゃい<emoji=heart04>\u3000……ちゅぶちゅぶちゅぶっ<emoji=heart04>\u3000ご主人様ぁ<emoji=heart04>\u3000んぶっ、じゅるるるっ<emoji=heart04>」"
translation = "「자지, 더 기분 좋아지세여<emoji=heart04> ……츄부 츄부 츄부<emoji=heart04> 주인님아아<emoji=heart04> 응붓, 쥬르르르릅<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「んくっ<emoji=heart04>\u3000ちゅばぁ<emoji=heart04>\u3000おち○ちん、更に大きくなってましゅ<emoji=heart04>」"
translation = "「응긋<emoji=heart04> 츄바앗<emoji=heart04> 자지, 훨씬 더 커졌어여<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「イキそう、なんれしゅか？\u3000じゅっぽじゅっぽじゅっぽ<emoji=heart04>\u3000じゅるるっ、ちゅぶぶっ、ちゅばぁ<emoji=heart04>」"
translation = "「쌀 것 같으신가여? 쥬포 쥬포 쥬포<emoji=heart04> 쥬르르릅, 츄부부, 츄바앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「来てくらしゃい<emoji=heart04>\u3000いっぱいご主人様の精液、私の口に……じゅるるるっ<emoji=heart04>\u3000ちゅぼちゅぼちゅぼっ<emoji=heart04>\u3000恵んでくらしゃあぃ<emoji=heart04>」"
translation = "「와주세여<emoji=heart04> 잔뜩 주인님의 정액, 제 입에…… 쥬르르르릅<emoji=heart04> 츄보 츄보 츄보<emoji=heart04> 베풀어주세여어<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「じゅぽじゅぽじゅぽっ、ちゅっちゅっちゅぶぶぶっ<emoji=heart04>\u3000ちゅばっちゅばっ、精液、欲しいれすぅ<emoji=heart04>\u3000じゅるるるっ、ちゅぼっちゅぼっちゅぼっ<emoji=heart04>」"
translation = "「쥬포 쥬포 쥬포, 츄츄츄부부부<emoji=heart04> 츄밧 츄밧, 정액 갖고 싶어여어<emoji=heart04> 쥬르르르릅, 츄보 츄보 츄보<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「んぶぅっ<emoji=heart04>\u3000喉奥突かれて、感じましゅ<emoji=heart04>\u3000んぶっんぶっんぶぶっ<emoji=heart04>」"
translation = "「응부웃<emoji=heart04> 목구멍 찔려서 느껴여<emoji=heart04> 응붓 응붓 응부부<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「激しいのしゅきぃ<emoji=heart04>\u3000じゅぽっじゅぽっじゅぽっ、じゅるるるっ<emoji=heart04>\u3000ちゅぶちゅぶちゅぶっ、ちゅぶぶぶっ<emoji=heart04>」"
translation = "「격렬한 거 좋아아<emoji=heart04> 쥬포 쥬포 쥬포, 쥬르르르릅<emoji=heart04> 츄부 츄부 츄부, 츄부부부<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「出して、出してくらしゃい<emoji=heart04>\u3000ご主人様の精液、お口にいっぱい<emoji=heart04>」"
translation = "「내줘요, 내주세여<emoji=heart04> 주인님의 정액, 입안 가득히<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ちゅぼちゅぼちゅぼっ<emoji=heart04>\u3000来て、きてきて、きてぇ<emoji=heart04>\u3000じゅっぽじゅっぽじゅっぽじゅっぽじゅっぽ<emoji=heart04>」"
translation = "「츄보 츄보 츄보<emoji=heart04> 와요, 와줘 와줘, 와줘어<emoji=heart04> 쥬포 쥬포 쥬포 쥬포 쥬포<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……フニ、出すぞ！」"
translation = "「윽…… 후니, 싼다!」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「はい<emoji=heart04>\u3000私のお口に、いっぱい出してぇ<emoji=heart04><emoji=heart04>\u3000んんんっ<emoji=heart04>\u3000おち○ちん膨らんでっ<emoji=heart04>\u3000……はぷちゅっ<emoji=heart04>」"
translation = "「네<emoji=heart04> 제 입에 잔뜩 내줘요오<emoji=heart04><emoji=heart04> 응응응<emoji=heart04> 자지 부풀어서어<emoji=heart04> ……하푸츄<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「じゅぽじゅぽじゅぽっ、ちゅっちゅっちゅぶぶぶっ<emoji=heart04>\u3000じゅっぷっじゅっぷっじゅっぷっじゅっぷっじゅっぷっちゅちゅちゅちゅ────<emoji=heart04>」"
translation = "「쥬포 쥬포 쥬포, 츄츄츄부부부<emoji=heart04> 쥬릅 쥬릅 쥬릅 쥬릅 쥬릅 츄츄츄츄────<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「っ……んぶっ<emoji=heart04><emoji=heart04>\u3000んん～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「윽…… 응붓<emoji=heart04><emoji=heart04> 응으으으으으으으으으으<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「んくっ……んくっ……ぷあっ<emoji=heart04>\u3000んきゅっ……んむぅっ<emoji=heart04>」"
translation = "「응긋…… 응긋…… 푸핫<emoji=heart04> 응큐…… 음무웃<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「すごい量でしゅ……んぶっ……ぷあぁっ……<emoji=heart04>\u3000飲み切れなくて、こぼれちゃいまひゅ……はぁんっ<emoji=heart04>」"
translation = "「엄청난 양이에여…… 응붓…… 푸아아……<emoji=heart04> 다 못 마셔서 흘러넘쳐여…… 하앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「んむっ……んくっ……ごっくん<emoji=heart04>\u3000はあぁ……<emoji=heart04>」"
translation = "「음뭇…… 응긋…… 꿀꺽<emoji=heart04> 하아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「はぁぁ……<emoji=heart04>\u3000ごめんなひゃい、ご主人様……せっかく出してもらった精液、全部飲み切れなくて……<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 죄송해여, 주인님…… 어렵게 내주신 정액, 전부 다 못 마셔서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「んっ<emoji=heart04>\u3000……頭撫でて、褒めてくれるんですか？」"
translation = "「응<emoji=heart04> ……머리 쓰다듬으며 칭찬해주시는 건가요?」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「――すごく気持ちよかった？\u3000えへへ、嬉しいです……<emoji=heart04>\u3000ご主人様、優しくて好き<emoji=heart04>」"
translation = "「──무척 기분 좋았다고요? 에헤헤, 기뻐요……<emoji=heart04> 주인님, 상냥해서 좋아<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「いつもみたいに、お掃除もしますね<emoji=heart04>\u3000失礼します<emoji=heart04>\u3000あむっ<emoji=heart04>」"
translation = "「평소처럼 청소도 할게요<emoji=heart04> 실례하겠습니다<emoji=heart04> 아믓<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ぺろちゅっ……ちゅぱっ<emoji=heart04>\u3000れろれろっ……んむっ<emoji=heart04>\u3000ちゅるるっ……れろちゅっ<emoji=heart04>\u3000ちゅっぽちゅっぽ……ちゅぱっ<emoji=heart04>」"
translation = "「레로츄릅…… 츄팟<emoji=heart04> 레로레로…… 음뭇<emoji=heart04> 츄르르릅…… 레로츄릅<emoji=heart04> 츄포 츄포…… 츄팟<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ふ、フニ……そんなに熱心に舐め回したら、また……」"
translation = "「후, 후니…… 그렇게 열심히 핥아대면 또……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「んっ<emoji=heart04>\u3000はあぁ……ご主人様のおち○ちん、また大きくなっちゃいましたぁ<emoji=heart04>\u3000ごめんなさい……続けて失敗をしてしまって……<emoji=heart04>」"
translation = "「응<emoji=heart04> 하아아…… 주인님의 자지, 다시 커져 버렸네여<emoji=heart04> 죄송해요…… 계속해서 실수를 해버려서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「だから、ご主人様……どうか私に、お仕置きして下さい……<emoji=heart04>」"
translation = "「그러니까 주인님…… 부디 저에게 벌을 주세요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「おま○この準備は、もう出来てますから……<emoji=heart04>」"
translation = "「보지 준비는 이미 다 됐으니까요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ふあぁっ<emoji=heart04>\u3000ご主人様ぁ……<emoji=heart04>\u3000あんっ……<emoji=heart04>」"
translation = "「후아아<emoji=heart04> 주인님아아……<emoji=heart04> 앙……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はいけないメイドさんをベッドに押し倒すと、たくさん愛のお仕置きをしてあげるのだった――"
translation = "나는 못된 메이드 양을 침대에 눌러 눕히고는, 듬뿍 사랑의 매를 주는 것이었다──"

