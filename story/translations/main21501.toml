[[dialogue]]
speaker = "unk"
original = "第１話,ホロウ,B"
translation = "제1화, 호로우"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「はぁっ、はぁっ……！\u3000くっ……！！」"
translation = "「하앗, 하앗……! 큭……!!」"

[[dialogue]]
speaker_original = "ルヴィネ？"
speaker_translation = "루비네?"
original = "「しぶといわね。梨緒・<ruby>Ａ<rt>アガサ</rt></ruby>・クリステレス──そして流星星徒会」"
translation = "「끈질기네. 리오·<ruby>A<rt>아가사</rt></ruby>·크리스테레스── 그리고 유성 성도회」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「何なの……こいつっ！？」"
translation = "「뭐야…… 이 녀석은!?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「とんだ刺客の登場だな……こいつがルヴィネか！？」"
translation = "「뚱딴지같은 자객의 등장이라니…… 이 녀석이 루비네인가!?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「──わからない。少なくとも、私の知っている彼女とは全く違う……！」"
translation = "「──모르겠어. 적어도 내가 아는 그녀와는 완전히 달라……!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「間違いなく、塔の頂上で何かが起こった。一刻も早く、魔王たちと合流しなくては……！」"
translation = "「틀림없이 탑 정상에서 무슨 일이 일어났어. 한시라도 빨리 마왕 일행과 합류해야 해……!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「了解です。打倒しましょう！」"
translation = "「라져입니다. 타도합시다!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「負けられませんっ、全力でいっちゃいます！！」"
translation = "「지칠 수 없어요, 전력으로 가겠어요!!」"

[[dialogue]]
speaker_original = "ルヴィネ？"
speaker_translation = "루비네?"
original = "「女神にかなう道理はない──全員の魂を回収させてもらうわ」"
translation = "「여신을 당해낼 도리는 없어── 전원의 영혼을 회수하겠어」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「誰一人として死なせるものか──ディメンション・エクスウェーブッ！！」"
translation = "「단 한 사람도 죽게 내버려 둘까 보냐── 디멘션 엑스 웨이브!!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「これからは私──新しいルヴィネが、リクリエを引き継ぐわ」"
translation = "「이제부터는 나── 새로운 루비네가 리크리에를 인계받겠어」"

[[dialogue]]
speaker = "unk"
original = "リクリエを引き継ぐ『新しいルヴィネ』──頭の中が整理できない。いったい何が起こっているんだ！？"
translation = "리크리에를 인계받는 『새로운 루비네』── 머릿속이 정리되지 않는다. 대체 무슨 일이 일어나고 있는 거지!?"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「──まずは回収からね」"
translation = "「──일단 회수부터 해야겠네」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「最後の次元転送装置──これさえあれば、デネブからの増援は思うがままね」"
translation = "「마지막 차원 전송 장치── 이것만 있으면 데네브로부터의 증원은 뜻대로 가능하니까」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ルヴィ！\u3000しっかりしてっ……ルヴィ！！」"
translation = "「루비! 정신 차려…… 루비!!」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「そんな、どうしてっ！？」"
translation = "「말도 안 돼, 어째서!?」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「ルヴィ、ルヴィっ……あぁあぁっ……！？」"
translation = "「루비, 루비…… 아아, 아아……!?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「だめだっ！\u3000血が──血が止まらない！」"
translation = "「안 돼! 피가── 피가 멈추지 않아!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「無駄よ。<ruby>下賜<rt>かし</rt></ruby>されていた霊力はすべて取り上げた」"
translation = "「소용없어. 하사받았던 영력은 전부 회수했다」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「<b>それ</b>は今、ただの無力なヒト。どこにでもいる、何の力も持たない天使でしかない」"
translation = "「<b>그것</b>은 지금, 그저 무력한 인간. 어디에나 있는, 아무런 힘도 없는 천사에 불과해」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「────ぁ────ぅ──」"
translation = "「────아────우──」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「息を吸えば吸うほどに、自らの血で溺れて苦しむことになる。お父様の期待を裏切った出来損ないには、お似合いの最期だわ」"
translation = "「숨을 쉬면 쉴수록, 스스로의 피에 질식해 고통받게 될 거야. 아버님의 기대를 저버린 낙오자에게는 어울리는 최후지」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……マトイ！\u3000ルヴィネに治癒の星術をかけるんだ！\u3000アナとサーシャさんもフォローを！」"
translation = "「……마토이! 루비네에게 치유의 성술을 걸어줘! 아나랑 사샤 씨도 서포트해 줘!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「う、うんっ……やれるだけやってみる！」"
translation = "「으, 응…… 할 수 있는 데까지 해볼게!」"

[[dialogue]]
speaker = "unk"
original = "ノヴァフォームを維持できないメンバーに、瀕死のルヴィネを守らせる。"
translation = "노바 폼을 유지하지 못하는 멤버들에게 빈사의 루비네를 지키게 한다."

[[dialogue]]
speaker = "unk"
original = "そして戦うことしかできない俺の役目は……時間を稼ぐこと！"
translation = "그리고 싸우는 것밖에 할 수 없는 나의 역할은…… 시간을 버는 것!"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「お前は──いったい何者なんだ！？」"
translation = "「너는── 대체 정체가 뭐냐!?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「言ったでしょう、私はルヴィネよ。不出来な<ruby>姉<rt>ルヴィネ</rt></ruby>に代わって製造された、新しい女神の幼体──その２体目」"
translation = "「말했잖아, 나는 루비네야. 모자란 <ruby>언니<rt>루비네</rt></ruby>를 대신해 제조된 새로운 여신의 유체── 그 두 번째」"

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「何を言ってるの！？\u3000ルヴィネはママを悪く言うから、あんまり好きじゃなかったけど！」"
translation = "「무슨 소릴 하는 거야!? 루비네는 마마를 나쁘게 말해서 별로 좋아하지 않았지만!」"

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「だからって──あんな酷い目に遭っていいわけがないわ！」"
translation = "「그렇다고 해서── 저런 끔찍한 꼴을 당해도 된다는 법은 없잖아!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「与えられた役目も果たせない愚物は、生かす値打ちもない。それだけのことよ」"
translation = "「부여된 역할조차 완수하지 못하는 우물통은 살려둘 가치도 없어. 그것뿐인 이야기야」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「──ど、しっ……て。ぉ、と……さ──っ……」"
translation = "「──어, 째……서. 아, 버……지──……」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「役立たず。お前は何度も、お父様に訊ねられたことがあったでしょう。『新世界を創るにあたって、必要なものはあるか？』とね」"
translation = "「쓸모없는 것. 너는 몇 번이고 아버님께 질문을 받은 적이 있었지? 『신세계를 창조하는 데 있어서 필요한 것이 있는가?』라고 말이야」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「あの質問はすべて、女神の幼体にバグが生まれていないかをチェックするためのもの」"
translation = "「그 질문은 전부 여신의 유체에 버그가 발생하지 않았는지를 체크하기 위한 것」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「裏切ったテルルの二の舞とならないよう、折に触れてお父様は、新しい女神が世界の摂理に忠実であるかを試されていたわ」"
translation = "「배신한 테루루의 전철을 밟지 않도록, 아버님은 기회 있을 때마다 새로운 여신이 세계의 섭리에 충실한지를 시험하셨지」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「お父様はいつだって正しい。お前に、テルルのような強靭な神の器を持たせず、ヒトと同じ肉体と寿命を与えたことも、とても正しい」"
translation = "「아버님은 언제나 옳으셔. 네게 테루루 같은 강인한 신의 그릇을 갖게 하지 않고, 인간과 같은 육체와 수명을 주신 것도 아주 탁월한 선택이지」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「もしも裏切った際に……処分はたやすい方がいいものね？」"
translation = "「만약 배신했을 때…… 처분은 쉬운 편이 좋으니까 말이야?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……ぅ……ぁっ…………！！」"
translation = "「……우……앗…………!!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「裏切っただって！？\u3000ルヴィネはただ『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』と話し合いがしたいという、俺たちの提案に乗ってくれただけで……！」"
translation = "「배신이라니!? 루비네는 그저 『<ruby>XELOS<rt>제로스</rt></ruby>』와 대화를 나누고 싶다는 우리의 제안에 응해줬을 뿐인데……!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「それが裏切りでなくて何だというの？\u3000女神の器に自我など要らない。不良品は捨てるのが手っ取り早いわ」"
translation = "「그게 배신이 아니면 뭐란 말이지? 여신의 그릇에 자아 따위는 필요 없어. 불량품은 버리는 게 가장 빠른 해결책이야」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「……なんて、ひどい」"
translation = "「……참으로 끔찍하군」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「どこまで冷たいヤツなんだ、お前たちは……！？」"
translation = "「어디까지 냉혹한 녀석들인 거냐, 네놈들은……!?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「価値観の相違ね。ヒトはとても短い尺度で物事を測る──女神に必要なのは、大局を見据える視点よ」"
translation = "「가치관의 차이겠지. 인간은 아주 짧은 척도로 사물을 판단해── 여신에게 필요한 것은 대국을 내다보는 안목이야」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「感情なんていうものに左右されてリクリエの本質から目を背けた、故障した駄作。それを正常なものにすげ替えるのは当然のこと」"
translation = "「감정이라는 것에 좌우되어 리크리에의 본질로부터 눈을 돌린 고장 난 폐기물. 그것을 정상적인 것으로 갈아끼우는 건 당연한 일이지」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「あなたたちもＤＩＳＣが故障したら、新しいものに取り換えるでしょう？\u3000それと何も変わらない」"
translation = "「당신들도 DISC가 고장 나면 새로운 것으로 바꿀 거잖아? 그것과 다를 바 없어」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──ふざけるなッ！！」"
translation = "「──까불지 마라!!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺は直接、ルヴィネのことをよく知らない──だけど！」"
translation = "「나는 직접 루비네를 잘 알지는 못해── 하지만!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺が伝え聞いたルヴィネは、自らが降り立ったデネブと、そこに住む人々のことを、大切に想っていた……！」"
translation = "「내가 전해 들은 루비네는, 자신이 강림했던 데네브와 그곳에 사는 사람들을 소중히 생각하고 있었어……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いずれ再構築され、記録にも残らず消えゆく世界であったとしても！\u3000ルヴィネは知ろうとしていた……愛そうとしていた！」"
translation = "「언젠가 재구축되어 기록조차 남지 않고 사라져 갈 세계라 할지라도! 루비네는 알려고 노력했어…… 사랑하려고 노력했어!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「今を学び、次を善くしようとしていた！\u3000だから彼女は、不完全であってもこの世界の女神だった！」"
translation = "「지금을 배우고, 다음을 더 좋게 만들려고 했어! 그러니까 그녀는 불완전할지언정 이 세계의 여신이었어!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺はお前を認めない！\u3000お前のような……ひとかけらの愛情もない『<ruby>空っぽな存在<rt>ホロウ</rt></ruby>』に！\u3000俺たちの世界を管理する資格はない！！」"
translation = "「나는 너를 인정하지 않아! 너처럼…… 한 조각의 애정도 없는 『<ruby>공허한 존재<rt>호로우</rt></ruby>』에게! 우리 세계를 관리할 자격은 없어!!」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ホロウ──言い得て妙だね。ルヴィネの偽物につけるには、ちょうど良い呼称だ」"
translation = "「호로우── 참 잘 지은 이름이네. 루비네의 가짜에게 붙이기에는 딱 알맞은 호칭이야」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「フン。呼び名なぞどうでもよいわ。どうせすぐにこの世から消える──妾の手によってな！」"
translation = "「흥. 이름 따위 어찌 되든 상관없느니라. 어차피 곧 이 세상에서 사라질 테니── 소첩의 손에 의해서 말이다!」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「大人しく魂を差し出せば、苦しませるつもりはなかったけれど……仕方ないわね」"
translation = "「순순히 영혼을 바친다면 고통스럽게 할 생각은 없었지만…… 어쩔 수 없겠네」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネL"
speaker_translation = "할로우 루비네 L"
original = "「──処断しましょう」"
translation = "「──처단하도록 하죠」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「──み、……っ、な。…………逃げ──がふっ！」"
translation = "「──모, ……두. …………도망── 쿨럭!」"

[[dialogue]]
speaker = "unk"
original = "ルヴィネが大量の血を吐き出す──時間がない。"
translation = "루비네가 다량의 피를 토해낸다── 시간이 없다."

[[dialogue]]
speaker = "unk"
original = "まだか、まだなのか──！"
translation = "아직인가, 아직인 건가──!"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「会長さんっ！\u3000どうしたらっ……ルヴィが！\u3000ルヴィが死んじゃうっ……！！」"
translation = "「회장님! 어떡해요…… 루비가! 루비가 죽어가요……!!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ベアトリス！\u3000まだ終わっていない！\u3000気持ちを切らずに、声を届けるんだ！」"
translation = "「베아트리스! 아직 끝나지 않았어! 마음을 다잡고 목소리를 전하는 거야!」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「もうよいだろう、捨ておけ。あれではとても助からん」"
translation = "「이제 되었느니라, 내버려 두거라. 저 상태로는 도저히 가망이 없도다」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ふっ──ふざけんな！！\u3000ルヴィはまだ死んでない！！」"
translation = "「웃── 웃기지 마!! 루비는 아직 죽지 않았어!!」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「マトイさんっ！\u3000何とかなりませんかっ！？」"
translation = "「마토이 씨! 어떻게 좀 안 되겠습니까!?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「く、ぅっ……！\u3000私の、付け焼刃の治癒じゃ……お願い、早く……！！」"
translation = "「큭, 으윽……! 내 급조한 치유술로는…… 제발, 빨리……!!」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「あの死にぞこないに、ここまでかまけてくれるだなんて嬉しい誤算ね」"
translation = "「저 송장에게 이 정도로 마음을 써주다니 기분 좋은 오산이네」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「けれど魔王の対応にはがっかりだわ。潔く切り捨てるでもなく、私に攻撃を仕掛けるでもなく……足を止めて語らうばかり」"
translation = "「하지만 마왕의 대처에는 실망했어. 미련 없이 잘라내는 것도 아니고, 내게 공격을 가하는 것도 아니고…… 발을 멈추고 지껄이고만 있다니」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネL"
speaker_translation = "할로우 루비네 L"
original = "「突然の事態に頭が真っ白になった？\u3000もう少し骨がある相手だと思っていたのに」"
translation = "「갑작스러운 사태에 머릿속이 하얘진 거야? 조금은 더 끈질긴 상대일 줄 알았는데」"

[[dialogue]]
speaker = "？？？"
original = "『──魔王様、お待たせしました！\u3000いけます！！』"
translation = "『──마왕님, 오래 기다리셨습니다! 준비되었습니다!!』"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネL"
speaker_translation = "할로우 루비네 L"
original = "「……っ！？\u3000今の声は──？」"
translation = "「……!? 방금 그 목소리는──?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「予想外の事態ではあったさ。でも、何もしてなかったわけじゃない」"
translation = "「예상치 못한 사태이긴 했지. 하지만 아무것도 안 하고 있었던 건 아니야」"

[[dialogue]]
speaker = "unk"
original = "刻は稼いだ。フィーニスの塔攻略の時から、ずっと傍にいた彼女を、あえていないものとしてふるまい続けた──それももう終わりだ！"
translation = "시간은 벌었다. 피니스의 탑 공략 때부터 줄곧 곁에 있었던 그녀를 일부러 없는 사람처럼 취급해 왔다── 그것도 이제 끝이다!"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「新星星徒会──防御陣形を取れ！\u3000プランＢを実行に移す！！」"
translation = "「신성 성도회── 방어 진형을 갖춰라! 플랜 B를 실행에 옮긴다!!」"

[[dialogue]]
speaker = "unk"
original = "そして俺は、霊体である彼女の名を叫ぶ──"
translation = "그리고 나는 영체인 그녀의 이름을 외친다──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──トリュファイナさん、お願いします！！！」"
translation = "「──트류파이나 씨, 부탁드립니다!!!」"

