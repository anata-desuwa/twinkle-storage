[[dialogue]]
speaker = "unk"
original = "光が消え、イザベラだった赤ん坊をマリオンが受け止める。"
translation = "빛이 사라지고 이자벨라였던 아기를 마리온이 받아 든다."

[[dialogue]]
speaker_original = "マリオン（覚醒）"
speaker_translation = "마리온(각성)"
original = "（ああ、なんて小さいのでしょう……でも、こんなにも重い）"
translation = "(아아, 어찌나 작은지…… 하지만 이렇게나 무겁군요)"

[[dialogue]]
speaker = "unk"
original = "イザベラの罪も穢れもこの世にはもうない。無垢な、生まれたての命だけがここにある。"
translation = "이자벨라의 죄도 더러움도 이 세상에는 이제 없다. 무구한, 갓 태어난 생명만이 이곳에 있다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「うっ……」"
translation = "「으윽……」"

[[dialogue]]
speaker = "unk"
original = "胸を押さえて倒れそうになるレイラを支える。"
translation = "가슴을 부여잡고 쓰러지려는 레이라를 부축한다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「はぁ、はぁ、はぁ……無理をしすぎたよう、ですね……私は、もう、長く、ありません……」"
translation = "「하아, 하아, 하아…… 무리를 너무 한 모양, 이네요…… 저는 이제 오래가지 못합니다……」"

[[dialogue]]
speaker = "unk"
original = "レイラの体から急速に体温が失われていく。まるで海にでも入っていたかのように冷たい。"
translation = "레이라의 몸에서 급격히 체온이 사라져 간다. 마치 바다에라도 들어가 있었던 것처럼 차갑다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「さっきの結界の影響で、私たちコラプサーとブラックホールのリンクは、途切れかけています……このままでは……」"
translation = "「아까 결계의 영향으로 우리 콜랩서와 블랙홀의 링크는 끊어지려 하고 있습니다…… 이대로라면……」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「朝比奈さん、どうか、コラプサーのみんなを助けて、くださ、い。……みんなは、あなたを犠牲にすることは、知らないんです」"
translation = "「아사히나 씨, 제발 콜랩서 모두를 도와주세요. ……모두는 당신을 희생시키려 했다는 걸 모릅니다」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「悪いのは、私です。私はどうなってもいい、だから、みんなを、助け……」"
translation = "「나쁜 건 저예요. 저는 어떻게 돼도 좋아요, 그러니까 모두를 도와……」"

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「え、ヤダ」"
translation = "「어, 싫어」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「っ…………そうですよね。自分を犠牲にしようとした相手を、助けるはずないですよね……」"
translation = "「윽………… 그렇겠지요. 자신을 희생시키려 한 상대를 도와줄 리가 없겠지요……」"

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「レイラだけ見捨てたりしないよ。ちゃんとみんな助けるから安心して」"
translation = "「레이라만 내버려 두지 않아. 제대로 모두 도와줄 거니까 안심해」"

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「まずは、はい」"
translation = "「우선은, 자」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「え？\u3000あ、だいぶ楽になりました」"
translation = "「에? 아, 훨씬 편해졌어요」"

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「応急処置だけど、上手くいったみたい。会長さんとマリオンさんも」"
translation = "「응급처치지만 잘 된 것 같네. 회장님이랑 마리온 씨도」"

[[dialogue]]
speaker_original = "マリオン（覚醒）"
speaker_translation = "마리온(각성)"
original = "「ありがとうございます」"
translation = "「고맙습니다」"

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「今からネビュラ基地に行くのは……ちょっと時間がもったいないかも」"
translation = "「지금부터 네뷸라 기지에 가는 건…… 좀 시간이 아까울지도」"

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「よし、システム乗っ取っちゃお。レイラの作ったバックドア使わせてもらうね」"
translation = "「좋아, 시스템 점거하자. 레이라가 만든 백도어 좀 쓸게」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「……え？」"
translation = "「……네?」"

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「あれ？\u3000基地にハッキングしてたのレイラじゃないの？」"
translation = "「어라? 기지 해킹하고 있었던 거 레이라 아니었어?」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「いやまあ、そうなんですけど……気付かれていたとは」"
translation = "「아니 뭐 그렇긴 합니다만…… 눈치채고 계셨을 줄이야」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「でも、一体何をするつもりなんです……？」"
translation = "「하지만 대체 뭘 하실 생각인가요……?」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "『だ、だ、誰ですか！？\u3000ネビュラの基地にハッキングをしかけているのは！？』"
translation = "『누, 누, 누구세요!? 네뷸라 기지에 해킹을 시도하고 있는 건!?』"

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「すみません、私です！」"
translation = "「죄송해요, 접니다!」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "『あ、あなたはジャスティスウィザード──じゃなくて朝比奈コハルコさん！？』"
translation = "『아, 당신은 저스티스 위저드──가 아니라 아사히나 코하루코 씨!?』"

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「時間がなかったのでシステムを掌握させてもらいました。用件が済んだらすぐ返すので、ちょっと協力お願いします」"
translation = "「시간이 없어서 시스템을 장악했습니다. 용건이 끝나면 바로 돌려줄 테니까 협력 좀 해주세요」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "『協力って言ったって、完全にコントロールを奪われちゃってるじゃないですか！\u3000もうさっさとやっちゃってくださいっ！』"
translation = "『협력이라고 해도 완전히 컨트롤을 뺏겨 버렸잖아요! 이제 마음대로 하세요!』"

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「ありがとうございます。これで一応許可も得たね」"
translation = "「고맙습니다. 이걸로 일단 허가도 받았네」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「ネビュラの基地を乗っ取って、いったい何をするんですかっ！？」"
translation = "「네뷸라 기지를 점거해서 도대체 뭘 하려는 건가요!?」"

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「ネビュラ基地を施設ごと使って、巨大な治療装置にするの。基地にも世界樹の末端が通ってるから、私の魔法を送れるはず」"
translation = "「네뷸라 기지를 시설째로 사용해서 거대한 치료 장치로 만들 거야. 기지에도 세계수의 말단이 통하고 있으니까 내 마법을 보낼 수 있을 거야」"

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「コラプサー各員、バイタル確認。危険域だね。早く助けないと」"
translation = "「콜랩서 각원, 바이탈 확인. 위험 지역이네. 빨리 도와야겠어」"

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「実際に使ってみて分かったけど、<ruby>封理再誕<rt>レナトゥス</rt></ruby>は、雑に言ってしまうと若返り。赤ん坊への巻き戻し」"
translation = "「실제로 써보고 알게 됐는데, 봉리재탄은 거칠게 말하자면 젊어지기. 아기로 되돌리기야」"

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「トワちゃん先生の回復も同じだけど、先生の回復を受けて記憶や精神が逆行したなんて話、聞いたことない。なら……」"
translation = "「토와 짱 선생님의 회복도 마찬가지지만, 선생님의 회복을 받고 기억이나 정신이 역행했다는 얘기는 들어본 적 없어. 그렇다면……」"

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「解析開始……致命箇所、特定！」"
translation = "「해석 개시…… 치명 개소, 특정!」"

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「<ruby>封理再誕<rt>レナトゥス</rt></ruby>・<ruby>肉体限定<rt>ハードウェア</rt></ruby>！」"
translation = "「봉리재탄 육체한정!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「！\u3000バイタルデータが……みんなが回復していく……！\u3000本当に、本当に、よかった……」"
translation = "「! 바이탈 데이터가…… 모두가 회복되고 있어……! 정말, 정말 다행이다……」"

[[dialogue]]
speaker = "unk"
original = "コラプサーたちの命の危機はあっという間に回避された。"
translation = "콜랩서들의 생명 위기는 눈 깜짝할 새에 회피되었다."

[[dialogue]]
speaker = "unk"
original = "さすがなんでもできるコハルコさんだ。"
translation = "역시 뭐든 할 수 있는 코하루코 씨다."

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「じゃあ私行くね」"
translation = "「그럼 나 갈게」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「え？」"
translation = "「네?」"

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「妹たちの晩ごはん用意しないと……あ、今日はお母さんが作ってくれるんだっけ」"
translation = "「동생들 저녁밥 준비해야 해서…… 아, 오늘은 엄마가 만들어 준다고 했나」"

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「晩ごはんの時間だから、私、帰るね」"
translation = "「저녁 시간이니까 나 돌아갈게」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「コハルコ先輩、お帰りなさ～い！」"
translation = "「코하루코 선배, 어서 오세요~!」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「本当にごめんなさい、リーリアさん。私……」"
translation = "「정말 미안해요, 리리아 씨. 나……」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「いいんですよ、そんなこと！\u3000それより、ご家族も待ってますよ！\u3000早く！」"
translation = "「괜찮아요, 그런 거! 그보다 가족분들도 기다리고 계세요! 빨리요!」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「うん、ありがとう」"
translation = "「응, 고마워」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「へへ。じゃあ、私はこれで失礼しますね」"
translation = "「헤헤. 그럼 저는 이만 실례할게요」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "（秋葉原の片隅にあるパーツショップ。ここが私の家。私たち家族の家だ）"
translation = "(아키하바라 한구석에 있는 부품 샵. 여기가 나의 집. 우리 가족의 집이야)"

[[dialogue]]
speaker_original = "コハルコ父"
speaker_translation = "쿠하루코 아빠"
original = "「おかえり、コハルコ」"
translation = "「왔니, 코하루코」"

[[dialogue]]
speaker_original = "コハルコ母"
speaker_translation = "쿠하루코 엄마"
original = "「おかえり。すぐご飯にする？\u3000シチューできてるわよ」"
translation = "「왔어? 바로 밥 먹을래? 스튜 다 됐단다」"

[[dialogue]]
speaker_original = "ナツコ"
speaker_translation = "나츠코"
original = "「おかえり、おねえちゃん！」"
translation = "「왔다, 언니!」"

[[dialogue]]
speaker_original = "トウコ"
speaker_translation = "토우코"
original = "「おかえりなさい、お姉ちゃん」"
translation = "「어서 와, 언니」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "（ここには、パーツショップを営む夫婦がいて、２人の可愛い妹と）"
translation = "(여기에는 부품 샵을 운영하는 부부가 있고, 두 명의 귀여운 여동생과)"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "（そして、私がいる）"
translation = "(그리고 내가 있어)"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「ただいま！」"
translation = "「다녀왔습니다!」"

