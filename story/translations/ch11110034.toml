[[dialogue]]
speaker = "unk"
original = "第４話,ベアトのリゾート計画,P"
translation = "제4화, 베아트의 리조트 계획"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「──といったカンジですね～」"
translation = "「──라는 느낌이네요~」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「なるほどなるほど……」"
translation = "「과연 과연……」"

[[dialogue]]
speaker = "unk"
original = "何かあったの？"
translation = "무슨 일 있었어?"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「あ、会長さん。なんでもないです、世間話ですよ、世間話」"
translation = "「아, 회장님. 아무것도 아니에요, 잡담이에요, 잡담.」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「隠さなくてもイイじゃないですか！\u3000とてもイイアイディアだと思いまーす！\u3000故郷の洞窟を使ってリゾートを──」"
translation = "「숨기지 않아도 괜찮잖아요! 정말 좋은 아이디어라고 생각함다! 고향의 동굴을 사용해서 리조트를──」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ああ、リップルさんっ。恥ずかしいですから。実現できるかもわからないのに」"
translation = "「아아, 리플 씨. 부끄러우니까요. 실현될 수 있을지도 모르는데.」"

[[dialogue]]
speaker = "unk"
original = "故郷の洞窟にリゾートを？"
translation = "고향의 동굴에 리조트를?"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「は、はい。もちろん戦いが終わってからですけど、造れたらいいなぁ……と」"
translation = "「네, 네. 물론 싸움이 끝나고 나서지만, 만들 수 있다면 좋겠다…… 싶어서요.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「デネブはリクリエの時に大きな破壊を経験しました。魔界にも、天界にも、人間界にも、１０年経ってもまだ心に傷を負っている人はいる……」"
translation = "「데네브는 리크리에 때 커다란 파괴를 경험했습니다. 마계에도, 천계에도, 인간계에도, 10년이 지났어도 아직 마음에 상처를 입은 사람은 있어요……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「だからここのような素敵なリゾートがあれば、みんなの心も少しは癒やせるんじゃないかって」"
translation = "「그러니까 이곳처럼 멋진 리조트가 있다면, 모두의 마음도 조금은 치유할 수 있지 않을까 해서요.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ここを訪れるお客さんたちのように、明るい笑顔を浮かべられるようになるんじゃないかって……そう思って」"
translation = "「이곳을 찾는 손님들처럼, 밝은 미소를 지을 수 있게 되지 않을까…… 그렇게 생각해서요.」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「うう、ＢＩＧステキな考えデス！\u3000ワタシで良ければ、いくらでも相談にノリます！\u3000イイエ、是非乗らせてクダさい！」"
translation = "「우우, BIG 멋진 생각 임다! 저라도 괜찮다면 얼마든지 상담해 드리겠슴다! 아니, 부디 끼워 주십쇼!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「わわ、泣かないでください。ふとした思いつきで相談したのが、申し訳なくなっちゃいますっ」"
translation = "「와와, 울지 마세요. 문득 떠오른 생각으로 상담한 게 미안해지잖아요.」"

[[dialogue]]
speaker = "unk"
original = "でも、やる気はあるんでしょ？"
translation = "하지만, 할 마음은 있는 거지?"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「それは……──はい、もちろんです。みんなを笑顔にできるようなリゾートを造りたいです」"
translation = "「그건……──네, 물론이에요. 모두를 미소 짓게 할 수 있는 리조트를 만들고 싶어요.」"

[[dialogue]]
speaker = "unk"
original = "なら胸を張って頑張らないとね"
translation = "그럼 가슴 펴고 열심히 해야겠네."

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「はいっ！\u3000リップルさん、お話の続きなんですけど。もっと色々とリゾート造りについて伺ってもいいですかっ？」"
translation = "「네! 리플 씨, 이야기의 다음 말인데요. 좀 더 이것저것 리조트 만들기에 대해 여쭤봐도 될까요?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「モチロンです！\u3000ベアトリスの故郷のことも、もっと教えてクダさい！\u3000ロケーションを活かしたリゾート造りをみんなで考えてミマしょう！」"
translation = "「물론임다! 베아트리스의 고향에 대해서도 좀 더 알려 주십쇼! 로케이션을 살린 리조트 만들기를 다 함께 생각해 보겠슴다!」"

[[dialogue]]
speaker = "unk"
original = "そうして、あれやこれやとみんなで意見を出し合って──"
translation = "그렇게, 이러쿵저러쿵 다 함께 의견을 나누며──"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「遅くまで付き合ってもらって、ありがとうございました。おかげで造れそうな気がします。みんなを笑顔にできる素敵なリゾートを」"
translation = "「늦게까지 함께해 주셔서 감사합니다. 덕분에 만들 수 있을 것 같은 기분이 들어요. 모두를 미소 짓게 할 수 있는 멋진 리조트를요.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「まずは洞窟の改築からですね♪\u3000故郷にある大きな地底湖をここのビーチのように大改造しちゃおうと思います♪」"
translation = "「우선은 동굴 개축부터네요♪ 고향에 있는 커다란 지저 호수를 여기 비치처럼 대개조해 버리려고 생각 중이에요♪」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「まぁ具体的にどう実現していくかはまだまだ全然決まってないんですけど」"
translation = "「뭐, 구체적으로 어떻게 실현해 나갈지는 아직 전혀 정해지지 않았지만요.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「でも、１つだけ必ずやりたいことがあるんです。故郷の洞窟に空を作りたくて」"
translation = "「하지만, 한 가지만은 반드시 하고 싶은 게 있어요. 고향의 동굴에 하늘을 만들고 싶어서요.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「夕陽、綺麗ですよね。昼間の太陽も溌剌としていて好きですけど、私、同じくらいこのオレンジ色の空も大好きです」"
translation = "「석양, 아름답네요. 낮의 태양도 활기차서 좋아하지만, 저, 그만큼이나 이 오렌지색 하늘도 정말 좋아해요.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「とても穏やかで、平和で、心が落ち着いて……。まるで太陽に優しく抱きしめてもらってる心地がして……」"
translation = "「무척 평온하고, 평화롭고, 마음이 진정되어서……. 마치 태양에게 상냥하게 안겨 있는 듯한 기분이 들어서……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「私、この景色を吸血鬼のみんなにも見せてあげたいんです。私の一族は太陽を見ずに一生を終える人が大半ですから」"
translation = "「저, 이 풍경을 흡혈귀 모두에게도 보여주고 싶어요. 저희 일족은 태양을 보지 못한 채 일생을 마치는 사람이 대부분이니까요.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「故郷ではいろいろありましたけど、それでも一族のことを大事に思っていますから」"
translation = "「고향에서는 여러 일이 있었지만, 그래도 일족을 소중하게 생각하고 있으니까요.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「地底湖の天井に大きなスクリーンを張って、あの明るい青空を、この穏やかな夕陽を、再現できたらなぁって」"
translation = "「지저 호수의 천장에 커다란 스크린을 쳐서, 그 밝은 푸른 하늘을, 이 평온한 석양을 재현할 수 있다면 좋겠다고……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「仮初めの太陽ですけど、それでも、みんなに元気と希望を与えられる気がするんです。いいえ、与えられるような空を作りたい」"
translation = "「가짜 태양이지만, 그래도 모두에게 활기와 희망을 줄 수 있을 것 같은 기분이 들어요. 아니요, 줄 수 있는 그런 하늘을 만들고 싶어요.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「もちろん一族のみんなにだけじゃなくて、デネブの人も、アルタイルの人も、青い空の下でたくさん遊んでもらって、茜色の空の下で和気藹々と談笑してもらって」"
translation = "「물론 일족 모두에게뿐만 아니라, 데네브 사람도, 알타이르 사람도, 푸른 하늘 아래에서 잔뜩 놀고, 꼭두서니색 하늘 아래에서 화기애애하게 담소하며 지냈으면 해서.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「私がここで作った楽しい思い出を、みんなが作れるように。笑顔になれるように。常夏のリゾートを作りたい」"
translation = "「제가 여기서 만든 즐거운 추억을 모두가 만들 수 있도록. 미소 지을 수 있도록. 상하의 리조트를 만들고 싶어요.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「デネブもアルタイルも平和になって、私がリゾートを造った暁には、会長さんも遊びに来てくれますか？」"
translation = "「데네브도 알타이르도 평화로워지고, 제가 리조트를 만든 새벽에는 회장님도 놀러 와 주실 건가요?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「……いいえ、必ず遊びに来て欲しいです。会長さんだけじゃなく、選管のみんなにも。そして、極星星徒会のみんなにも……」"
translation = "「……아니요, 반드시 놀러 와 주셨으면 해요. 회장님뿐만 아니라 선관 모두에게도. 그리고 극성학생회 모두에게도……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「私の大切な仲間たちに、私の大切な仲間たちを紹介したいですから」"
translation = "「제 소중한 동료들에게, 제 소중한 동료들을 소개하고 싶으니까요.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「そして選管のみんなも、極星星徒会のみんなも、みんな揃って、ビーチで大はしゃぎしたいです。もちろん、会長さんも一緒に」"
translation = "「그리고 선관 모두도, 극성학생회 모두도, 다 함께 모여서 비치에서 떠들썩하게 놀고 싶어요. 물론 회장님도 같이요.」"

[[dialogue]]
speaker = "unk"
original = "地底湖が揺れるほど騒ぎたいね"
translation = "지저 호수가 흔들릴 정도로 떠들고 싶네"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ふふ、地底湖の天井に穴が空かないようにだけ気を付けてくださいね？\u3000本物の太陽が顔を出したら、吸血鬼は大変なことになっちゃいますから」"
translation = "「후후, 지저 호수의 천장에 구멍이 뚫리지 않게만 조심해 주세요? 진짜 태양이 얼굴을 내밀면 흡혈귀는 큰일 나버리니까요.」"

[[dialogue]]
speaker = "unk"
original = "美味しいトマトジュースをお土産に持っていこう"
translation = "맛있는 토마토 주스를 선물로 가져가자"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「それじゃあリップルさんに頼んで、ビーチの一角を貸してもらいましょう。２人で一からトマトを育てるんです♪」"
translation = "「그럼 리플 씨에게 부탁해서 비치의 한 구석을 빌리기로 하죠. 둘이서 처음부터 토마토를 기르는 거예요♪」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「太陽の光をたっぷり浴びて、うんと甘いトマトになりますよ。きっと美味しいトマトジュースが作れると思います♪」"
translation = "「태양 빛을 듬뿍 받아서, 아주 달콤한 토마토가 될 거예요. 분명 맛있는 토마토 주스를 만들 수 있을 거라 생각해요♪」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ふふ、戦う理由がまた１つ増えちゃいました。私、頑張ります。デネブもアルタイルも必ず救ってみせます」"
translation = "「후후, 싸워야 할 이유가 또 하나 늘어버렸네요. 저, 힘낼게요. 데네브도 알타이르도 반드시 구해보이겠어요」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「明るい未来を切り拓くために。大切な人とずっと平和に楽しく過ごしていくために」"
translation = "「밝은 미래를 개척하기 위해서. 소중한 사람과 계속 평화롭고 즐겁게 지내기 위해서」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「まだまだ思い出を作り足りませんから。これからも私と一緒に、色々な思い出を作っていってくださいね？」"
translation = "「아직 추억을 만들기엔 부족하니까요. 앞으로도 저와 함께, 여러 가지 추억을 만들어 가 주세요?」"

