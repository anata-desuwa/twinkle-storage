[[dialogue]]
speaker = "unk"
original = "第２話,恋人はサンタクロース,P"
translation = "제2화, 연인은 산타클로스, P"

[[dialogue]]
speaker = "unk"
original = "ある日の戦闘で、紅明はクリスマスフォームに変身して戦っていた。"
translation = "어느 날 전투에서 코우메이는 크리스마스 폼으로 변신해서 싸우고 있었다."

[[dialogue]]
speaker = "unk"
original = "紅明、今だ！"
translation = "코우메이, 지금이야!"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「よっしゃ、サンタの力、見せてやるぜ！」"
translation = "「좋아, 산타의 힘을 보여주마!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「必殺！\u3000メリクリボンバーッ！」"
translation = "「필살! 메리 크리 봄버!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「善哉善哉♪\u3000ダーリンとのラブラブユニゾンで、今日も大勝利っしょ☆」"
translation = "「선재선재♪ 달링과의 러브러브 유니존으로 오늘도 대승리라구☆」"

[[dialogue]]
speaker = "unk"
original = "そういえば、紅明のサンタ衣装って、最初から戦闘服だったよな。気になって、いつから変身できるようになったのか、聞いてみることにした。"
translation = "그러고 보니 코우메이의 산타 의상은 처음부터 전투복이었지. 궁금해서 언제부터 변신할 수 있게 된 건지 물어보기로 했다."

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ん？\u3000ああ、そこら辺詳しく話してなかったよね」"
translation = "「응? 아아, 그 부분은 자세히 이야기 안 했었지」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ダーリンにはさ、前にアタシの前世について話したじゃん？」"
translation = "「달링한테는 전에 내 전생에 대해 이야기했었잖아?」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「そう、アタシが西遊記で有名な牛魔王の子孫で、転生した紅孩児だって話。それを踏まえた上でになるんだけど……」"
translation = "「그래, 내가 서유기로 유명한 우마왕의 후손이고 전생한 홍해아라는 이야기. 그걸 전제로 하는 이야기인데……」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「アタシさ、前世でサンタクロースやってたんだよね」"
translation = "「나 말이야, 전생에 산타클로스 했었거든」"

[[dialogue]]
speaker = "unk"
original = "は……？\u3000どういうこと？"
translation = "하……? 그게 무슨 소리야?"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「アタシの通常の戦闘服って、２０００年前と同一のものなんだよね。それと同じように、このサンタ衣装も２０００年前から変身できたんだ」"
translation = "「나의 통상 전투복은 2000년 전이랑 동일한 거야. 그것처럼 이 산타 의상도 2000년 전부터 변신할 수 있었어」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「それはアタシが当時からサンタを知ってたからってわけじゃなくてさ。サンタって概念は、そもそもその時は存在してなかったんだ。つまり――」"
translation = "「그건 내가 당시부터 산타를 알고 있어서 그런 게 아니라 말이야. 산타라는 개념은 애초에 그때 존재하지 않았거든. 즉──」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「多分なんだけど、アタシが<b>元祖サンタ</b>ってことなんだと思う」"
translation = "「아마도 내가 <b>원조</b> <b>산타</b>라는 거라고 생각해」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「だから、現代のサンタコスチュームは紅色だし、アタシのこの戦闘服にそっくりなんだ」"
translation = "「그래서 현대의 산타 코스튬은 붉은색이고 내 이 전투복이랑 판박이인 거야」"

[[dialogue]]
speaker = "unk"
original = "え……えええぇぇぇ～～～っ！？！？"
translation = "에…… 에에에에에에엑!?!?"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「いやまぁ、驚くよね。アタシも現代に転生して、サンタの存在を初めて知った時はマジかよ、って思ったし」"
translation = "「이랴 뭐, 놀라겠지. 나도 현대에 전생해서 산타의 존재를 처음 알았을 때는 진짜냐고 생각했으니까」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「元々はさ、アタシが村の子供たちに、１年頑張ったご褒美として贈り物をあげたいって思ったのがきっかけなんだよね」"
translation = "「원래는 말이야, 내가 마을 아이들에게 1년 동안 고생한 보상으로 선물을 주고 싶다고 생각한 게 계기였어」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ただ、アタシも特別裕福ってわけじゃなかったから、プレゼントを配るにもお金がない。なら、星術でプレゼントを作れないかってことで、頑張って修行をしたんだ」"
translation = "「다만 나도 특별히 부유한 건 아니었으니까 선물을 나눠주려 해도 돈이 없었지. 그럼 성술로 선물을 만들 수 없을까 해서 열심히 수행을 했어」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「そうして獲得したのが、この戦衣弐式――クリスマスフォームだったってわけ」"
translation = "「그렇게 획득한 것이 이 전의 2식── 크리스마스 폼이었다는 말씀」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「で、子供たちにサプライズしたかったから、付け髭で変装して、名前を<ruby>三太九郎<rt>さんたくろう</rt></ruby>って名乗ることに――」"
translation = "「그래서 아이들에게 서프라이즈를 해주고 싶어서 가짜 수염으로 변장하고 이름을 삼태구랑이라고 대기로──」"

[[dialogue]]
speaker = "unk"
original = "待って待って、トナカイとソリは！？"
translation = "잠깐 잠깐, 루돌프랑 썰매는!?"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「多分なんだけど、ソリは悟空の筋斗雲じゃないかなって思うんだよね。三太九郎の噂が広がって、他の村にもプレゼント配ることになってさ」"
translation = "「아마도 썰매는 오공의 근두운이 아닐까 싶어. 삼태구랑의 소문이 퍼져서 다른 마을에도 선물을 돌리게 됐거든」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「１人じゃ配り切れないから、悟空にもよく手伝って貰ってたんよ。で、プレゼントを筋斗雲に乗せて運んでたわけ」"
translation = "「혼자서는 다 못 돌리니까 오공한테도 자주 도움을 받았어. 그래서 선물을 근두운에 싣고 날랐던 거지」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「トナカイは多分、アタシだと思う。ほら、角がそれっぽく変身してるっしょ？」"
translation = "「루돌프는 아마 나일 거야. 봐봐, 뿔이 그럴싸하게 변신해 있잖아?」"

[[dialogue]]
speaker = "unk"
original = "マジか……！\u3000サンタ、実在したんだ……！"
translation = "진짜냐……! 산타, 실존했었구나……!"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「２０００年も語り継がれるとは、夢にも思わなかったけどね～。だから、アタシはクリスマスって凄く思い入れがあるんよ」"
translation = "「2000년이나 전해 내려올 줄은 꿈에도 몰랐지만 말이야~. 그래서 나는 크리스마스에 대해 굉장히 애착이 있어」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「でも、ダーリンはちゃんと信じてくれるんだね。自分でも正直、妄想乙って言われそうなことを語ってると思うんだけど……」"
translation = "「하지만 달링은 제대로 믿어주는구나. 나 스스로도 솔직히 망상 오지네 소리 들을 만한 이야기를 하고 있다고 생각하는데……」"

[[dialogue]]
speaker = "unk"
original = "好きな子のことだから、見てればわかるよ"
translation = "좋아하는 애의 일이니까, 보고 있으면 알아"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「――よくふざけるけど、真剣な時は違う顔をするから、それでわかる？」"
translation = "「──자주 장난치긴 하지만, 진지할 때는 다른 표정을 지으니까, 그걸로 알 수 있어?」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ダーリン……♪」"
translation = "「달링……♪」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「本当に……大っ好きだぞ<emoji=heart04>」"
translation = "「정말로…… 너무 좋아해<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ん……<emoji=heart04>\u3000ちゅっ<emoji=heart04>」"
translation = "「응……<emoji=heart04> 츄<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「えへへ……今度はダーリンと一緒に２０００年くらい語り継がれちゃうような伝説、作っちゃおっか<emoji=heart04>」"
translation = "「에헤헤…… 이번에는 달링이랑 같이 2000년 정도 전해 내려올 법한 전설, 만들어 볼까<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "もちろん！"
translation = "물론이지!"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ダーリン、嬉しいっ<emoji=heart04>\u3000じゃあもう一仕事、いっちゃいますか～<emoji=heart04>」"
translation = "「달링, 기뻐<emoji=heart04> 그럼 한바탕 더, 해볼까요~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そんなこんなで俺と紅明は、イチャイチャしながらモンスターをなぎ倒していくのであった――"
translation = "이러쿵저러쿵하며 나와 코우메이는 꽁냥거리면서 몬스터를 쓰러뜨려 나갔다──"

