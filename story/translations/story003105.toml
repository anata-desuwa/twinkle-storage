[[dialogue]]
speaker = "unk"
original = "しばらく羽根突きの練習を続けて、組み合わせを再びシャッフルすることになった。"
translation = "한동안 하네츠키 연습을 계속하고 조합을 다시 셔플하게 되었다."

[[dialogue]]
speaker = "ソフィア"
original = "「シズハさん、よろしくお願いしますね」"
translation = "「시즈하 씨, 잘 부탁드려요」"

[[dialogue]]
speaker = "シズハ"
original = "「は、はい。こちらこそよろしくお願いしますっ、ソフィア先輩……！」"
translation = "「네, 네. 저야말로 잘 부탁드립니다, 소피아 선배……!」"

[[dialogue]]
speaker = "unk"
original = "そうして、シズハと組むことになった相手がソフィアになった回。"
translation = "그리하여 시즈하와 조를 짜게 된 상대가 소피아가 된 차례."

[[dialogue]]
speaker = "ソフィア"
original = "「せっかく一緒になったので、改めて挨拶の続きからにしましょうか」"
translation = "「기왕 같이하게 되었으니 다시 인사부터 이어서 할까요」"

[[dialogue]]
speaker = "ソフィア"
original = "「――シズハさんのことは、姉さんに聞かされて、前から知っていました」"
translation = "「――시즈하 씨에 대해서는 언니에게 들어서 전부터 알고 있었어요」"

[[dialogue]]
speaker = "ソフィア"
original = "「なんでも、周囲の認識が歪んでしまう不可解な事件が起きて、その時に出会ったとか」"
translation = "「뭐라더라, 주변의 인식이 왜곡되어 버리는 불가해한 사건이 일어나서 그때 만났다고」"

[[dialogue]]
speaker = "シズハ"
original = "「は、はい。それで、サーシャさんや会長たちに助けてもらって、一緒に事件を解決したんです」"
translation = "「네, 네. 그래서 사샤 씨나 회장님들께 도움을 받아서 같이 사건을 해결했어요」"

[[dialogue]]
speaker = "unk"
original = "実際には、魔法少女としてロストアイテムを回収していた折に出会ったのだが──"
translation = "실제로는 마법소녀로서 로스트 아이템을 회수하던 중에 만난 것이었지만──"

[[dialogue]]
speaker = "unk"
original = "サーシャとシズハは口裏を合わせ、ロストアイテムのことは一旦隠してソフィアに話をしていた。"
translation = "사샤와 시즈하는 입을 맞춰 로스트 아이템에 대해서는 일단 숨기고 소피아에게 이야기하고 있었다."

[[dialogue]]
speaker = "シズハ"
original = "（私が使っているのも本当は星力じゃなくて、体内のロストアイテム『聖杯』ちゃんが与えてくれている魔力だし……）"
translation = "（내가 쓰고 있는 것도 사실은 성력이 아니라 체내의 로스트 아이템 『성배』짱이 주고 있는 마력이고……）"

[[dialogue]]
speaker = "ソフィア"
original = "「シズハさん、そんなに緊張しなくても大丈夫ですよ」"
translation = "「시즈하 씨, 그렇게 긴장하지 않아도 괜찮아요」"

[[dialogue]]
speaker = "シズハ"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker = "ソフィア"
original = "「姉さんが言いづらそうに、ですが真剣に言葉を選びながら、私に伝えようとしていました。何が言いたいのか、噛み砕いて理解するのは大変でしたが……」"
translation = "「언니가 말하기 곤란한 듯, 하지만 진지하게 단어를 골라가며 저에게 전하려고 했어요. 무슨 말을 하고 싶은 건지 곱씹어 이해하는 건 힘들었지만……」"

[[dialogue]]
speaker = "ソフィア"
original = "「要するにシズハさんは、私が姉さんの妹だから、話すのに緊張しているんですよね？」"
translation = "「요컨대 시즈하 씨는 제가 언니의 동생이니까 말하기 긴장되는 거죠?」"

[[dialogue]]
speaker = "シズハ"
original = "「はい……なんというか、サーシャさんに、その……昔亡くなった自分のお姉ちゃんを重ねてしまって。それで……」"
translation = "「네…… 뭐랄까, 사샤 씨에게 그…… 옛날에 죽은 제 언니를 겹쳐 보게 돼서. 그래서……」"

[[dialogue]]
speaker = "ソフィア"
original = "「その話を聞いて、正直、シズハさんに複雑な気持ちを抱いたのは事実です。でも……」"
translation = "「그 이야기를 듣고 솔직히 시즈하 씨에게 복잡한 마음을 품었던 건 사실이에요. 하지만……」"

[[dialogue]]
speaker = "ソフィア"
original = "「同時に、姉さんが大切にしたいと思った相手なら、私も仲良くなってみたいって思いました」"
translation = "「동시에 언니가 소중히 여기고 싶다고 생각한 상대라면 저도 친해져 보고 싶다고 생각했어요」"

[[dialogue]]
speaker = "ソフィア"
original = "「シズハさんも多分、そう思ってくれているからこそ、緊張しているんですよね？」"
translation = "「시즈하 씨도 아마 그렇게 생각해주고 계시니까 긴장하고 있는 거겠죠?」"

[[dialogue]]
speaker = "シズハ"
original = "「はい……私は、ソフィア先輩とも仲良くなりたいって思ってます」"
translation = "「네…… 저는 소피아 선배와도 친해지고 싶다고 생각해요」"

[[dialogue]]
speaker = "シズハ"
original = "「今までは後ろめたさみたいなものがあって、会うのを避けちゃってましたけど……」"
translation = "「지금까지는 죄책감 같은 게 있어서 만나는 걸 피해버렸지만……」"

[[dialogue]]
speaker = "シズハ"
original = "「今年は、勇気を出して向き合いたいって思ったんです！\u3000だって――」"
translation = "「올해는 용기를 내서 마주하고 싶다고 생각했어요! 왜냐면――」"

[[dialogue]]
speaker = "シズハ"
original = "「ソフィア先輩は、大好きな先輩であるサーシャさんの妹さんですから！\u3000仲良くなれたら、きっと素敵で、楽しいだろうなって思って！」"
translation = "「소피아 선배는 제가 정말 좋아하는 선배인 사샤 씨의 동생분이니까요! 친해질 수 있다면 분명 멋지고 즐거울 거라 생각해서!」"

[[dialogue]]
speaker = "ソフィア"
original = "「私もです。やっぱり会う前から思っていた通り――」"
translation = "「저도 마찬가지예요. 역시 만나기 전부터 생각했던 대로――」"

[[dialogue]]
speaker = "ソフィア"
original = "「私たち、気が合いそうですね、シズハさん」"
translation = "「우리, 마음이 잘 맞을 것 같네요, 시즈하 씨」"

[[dialogue]]
speaker = "シズハ"
original = "「はい。私もこうして話していると、ソフィア先輩はサーシャさんと似ている雰囲気があって……すごく温かい気持ちになって、落ち着きます♪」"
translation = "「네. 저도 이렇게 이야기하고 있으니 소피아 선배는 사샤 씨와 닮은 분위기가 있어서…… 정말 따뜻한 기분이 들어서 안심돼요♪」"

[[dialogue]]
speaker = "ソフィア"
original = "「ふふっ、私はホットな先輩ですから。だから、これからは『さん付け』ではなく、シズハって呼んでもいいですか？」"
translation = "「후훗, 저는 핫한 선배니까요. 그러니까 이제부터는 『씨』를 붙이지 말고 시즈하라고 불러도 될까요?」"

[[dialogue]]
speaker = "シズハ"
original = "「はい！\u3000でしたら私も、ソフィアさんって呼んでもいいでしょうか？」"
translation = "「네! 그렇다면 저도 소피아 씨라고 불러도 될까요?」"

[[dialogue]]
speaker = "ソフィア"
original = "「もちろんです。改めて――今年から、どうぞよろしくお願いしますね、シズハ」"
translation = "「물론이죠. 다시 한번―― 올해부터 잘 부탁해요, 시즈하」"

[[dialogue]]
speaker = "シズハ"
original = "「はいっ、ソフィアさん♪\u3000えへへっ♪」"
translation = "「네, 소피아 씨♪ 에헤헷♪」"

[[dialogue]]
speaker = "ソフィア"
original = "「ふふっ、可愛い後輩が増えて、私もホットな気持ちです♪」"
translation = "「후훗, 귀여운 후배가 늘어서 저도 핫한 기분이에요♪」"

[[dialogue]]
speaker = "unk"
original = "そんな２人の様子をうかがいながら、少し離れた場所で羽根突きを行っているのは、サーシャとディーラックだった。"
translation = "그런 두 사람의 모습을 살피며 조금 떨어진 곳에서 하네츠키를 하고 있는 것은 사샤와 디럭쿠가었다."

[[dialogue]]
speaker = "サーシャ"
original = "「あらあら、うふふっ♪\u3000シズハちゃんが困っていたら、助けなきゃって思っていたのだけれど、余計な心配だったみたいね」"
translation = "「어머 어머, 우후훗♪ 시즈하짱이 곤란해하고 있으면 도와줘야겠다고 생각했는데 쓸데없는 걱정이었나 보네」"

[[dialogue]]
speaker = "サーシャ"
original = "「ソフィも、シズハちゃんも、前よりずっと心が強くなっているみたいだわ」"
translation = "「소피도 시즈하짱도 전보다 훨씬 마음이 강해진 것 같아」"

[[dialogue]]
speaker = "サーシャ"
original = "「だから私も、今年は２人を見習って、もっと先輩らしくなれるように頑張らなくちゃいけないわね～♪」"
translation = "「그러니까 나도 올해는 두 사람을 본받아서 좀 더 선배다워질 수 있도록 노력해야겠네~♪」"

[[dialogue]]
speaker = "ディーラック"
original = "「先輩らしく、ねぇ。具体的には、どうする気なのサ？」"
translation = "「선배답게라니. 구체적으로는 어떻게 할 생각이야?」"

[[dialogue]]
speaker = "サーシャ"
original = "「う～ん、すぐにはパッと思いつかないけれど、でも――」"
translation = "「으~음, 바로 딱 떠오르지는 않지만, 그래도――」"

[[dialogue]]
speaker = "サーシャ"
original = "「シズハちゃんが言ったように、自分が今までなんとなく避けてきたことに、向き合ってみようと思うわ」"
translation = "「시즈하짱이 말한 것처럼 내가 지금까지 왠지 모르게 피해왔던 것들을 마주해 보려고 해」"

[[dialogue]]
speaker = "ディーラック"
original = "「ふぅん。今まで自分が避けてきたこと、ねぇ……」"
translation = "「흐응. 지금까지 자기가 피해왔던 것들이라니……」"

[[dialogue]]
speaker = "サーシャ"
original = "「そういえばディーラックちゃん、檻から出られてよかったわね～」"
translation = "「그러고 보니 디럭쿠짱, 우리에서 나와서 다행이네~」"

[[dialogue]]
speaker = "ディーラック"
original = "「全然良くないのサ！\u3000練習をサボったら罰ゲームだとか、あの獅子舞に言われるし……」"
translation = "「전혀 안 다행이라구! 연습 땡땡이치면 벌칙 게임이라느니 저 사자탈이 떠들어대고……」"

[[dialogue]]
speaker = "ディーラック"
original = "「あいつもロストアイテムだから、そんなのの罰ゲームなんて、どんな目に遭うのかわかったもんじゃないのサ！」"
translation = "「저 녀석도 로스트 아이템이니까 저런 놈의 벌칙 게임이라니 무슨 꼴을 당할지 알 게 뭐야!」"

[[dialogue]]
speaker = "サーシャ"
original = "「ふふふっ。でもさっき、シズハちゃんと羽根突きしていた時は、結構楽しそうだったわよ～？」"
translation = "「후후후. 하지만 아까 시즈하짱이랑 하네츠키 할 때는 꽤 즐거워 보였는걸~?」"

[[dialogue]]
speaker = "ディーラック"
original = "「はぁ！？\u3000何を勘違いしてるのサ！\u3000というか、サーシャちゃん、どこから見てたの！？」"
translation = "「하아!? 뭘 착각하는 거야! 그보다 사샤짱 어디서 보고 있었어!?」"

[[dialogue]]
speaker = "unk"
original = "一方、羽根突きの練習を始めていた、シズハとソフィアの２人は──"
translation = "한편, 하네츠키 연습을 시작했던 시즈하와 소피아 두 사람은──"

[[dialogue]]
speaker = "シズハ"
original = "「あ、そうだ！\u3000ソフィアさん――」"
translation = "「아, 맞다! 소피아 씨――」"

[[dialogue]]
speaker = "unk"
original = "シズハは思い出したというように、何気ない様子でソフィアに尋ねる。"
translation = "시즈하는 생각났다는 듯 아무렇지 않은 모습으로 소피아에게 묻는다."

[[dialogue]]
speaker = "シズハ"
original = "「お近づきの印に、ソフィアさんのお尻も触っていいですか！？」"
translation = "「친해진 기념으로 소피아 씨의 엉덩이도 만져도 될까요!?」"

[[dialogue]]
speaker = "ソフィア"
original = "「はっ、お尻！？\u3000どういうこと！？」"
translation = "「하, 엉덩이!? 무슨 소리야!?」"

[[dialogue]]
speaker = "unk"
original = "思わず羽根を落としてしまうソフィア。"
translation = "당황해서 깃털을 떨어뜨리고 마는 소피아."

[[dialogue]]
speaker = "シズハ"
original = "「ソフィアさんともっと仲良くなる為に、触っておきたいと思って♪」"
translation = "「소피아 씨와 좀 더 친해지기 위해서 만져두고 싶어서요♪」"

[[dialogue]]
speaker = "ソフィア"
original = "「えっと、なんでお尻の必要が……？」"
translation = "「저기, 왜 엉덩이가 필요한 건지……?」"

[[dialogue]]
speaker = "シズハ"
original = "「ほら、ラテンアメリカでは挨拶をする時、心を込めたハグの後、頬に１回キスをするじゃないですか。あれと同じです！」"
translation = "「봐요, 라틴 아메리카에서는 인사를 할 때 마음을 담은 허그 후에 뺨에 한 번 키스를 하잖아요. 그거랑 똑같아요!」"

[[dialogue]]
speaker = "ソフィア"
original = "「え？\u3000お尻を触る挨拶って、人間界の文化であったりするんですか……？」"
translation = "「에? 엉덩이를 만지는 인사가 인간계 문화에 있기도 한 건가요……?」"

[[dialogue]]
speaker = "シズハ"
original = "「私発祥でこれから広まります！\u3000必ず！！」"
translation = "「제가 발상한 거라 이제부터 퍼질 거예요! 반드시!!」"

[[dialogue]]
speaker = "ソフィア"
original = "（なんでそんなに自信満々なのかが全然わからない……！）"
translation = "（왜 그렇게 자신만만한 건지 전혀 모르겠어……!）"

[[dialogue]]
speaker = "ソフィア"
original = "「え、えっと……シズハ。ちょっとクールになって、１度考えさせてもらいたいというか……」"
translation = "「저, 저기…… 시즈하. 좀 쿨해져서 한 번 생각하게 해줬으면 한다고나 할까……」"

[[dialogue]]
speaker = "サーシャ"
original = "「シズハちゃ～ん♪\u3000それなら、私のお尻を触ってもいいわよ～？」"
translation = "「시즈하짱~♪ 그렇다면 내 엉덩이를 만져도 괜찮아~?」"

[[dialogue]]
speaker = "ソフィア"
original = "「って、姉さん！？」"
translation = "「아니, 언니!?」"

[[dialogue]]
speaker = "シズハ"
original = "「サーシャさん、いつもありがとう！！\u3000えいっ♪」"
translation = "「사샤 씨, 언제나 고마워요!! 에잇♪」"

[[dialogue]]
speaker = "unk"
original = "シズハがサーシャの後ろに回り込んで、お尻を触る。"
translation = "시즈하가 사샤의 뒤로 돌아가 엉덩이를 만진다."

[[dialogue]]
speaker = "サーシャ"
original = "「あんっ<emoji=heart04>」"
translation = "「앙~<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "「ふふっ、サーシャさんのお尻、いつ触っても極上の柔らかさと弾力で、手が幸せ～♪」"
translation = "「후훗, 사샤 씨 엉덩이는 언제 만져도 극상의 부드러움과 탄력이라 손이 행복해~♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「あらあら、うふふっ♪\u3000シズハちゃんったら、くすぐったいわ～♪」"
translation = "「어머 어머, 우후훗♪ 시즈하짱도 참, 간지러워~♪」"

[[dialogue]]
speaker = "ソフィア"
original = "「ちょっ、２人共！？」"
translation = "「잠깐, 두 사람 다!?」"

[[dialogue]]
speaker = "ソフィア"
original = "（な、なんか、２人だけですごく楽しそうにして……むうぅ）"
translation = "（왠지 둘이서만 되게 즐거워 보이고…… 무우）"

[[dialogue]]
speaker = "ソフィア"
original = "「し、シズハ！\u3000私のも……やっぱり触っていいです！」"
translation = "「시, 시즈하! 제 것도…… 역시 만져도 좋아요!」"

[[dialogue]]
speaker = "シズハ"
original = "「いいんですか！？\u3000じゃあ、失礼して……えいっ♪」"
translation = "「정말인가요!? 그럼 실례해서…… 에잇♪」"

[[dialogue]]
speaker = "ソフィア"
original = "「ひゃあぁっ！？」"
translation = "「히야아앗!?」"

[[dialogue]]
speaker = "unk"
original = "シズハがソフィアのお尻を両手で触りながら、ぱあぁっと瞳を輝かせる。"
translation = "시즈하가 소피아의 엉덩이를 양손으로 만지며 눈동자를 반짝인다."

[[dialogue]]
speaker = "シズハ"
original = "「ふわぁ～♪\u3000ソフィアさんのお尻、小ぶりだけど濃密なむちむち感があってすごく素敵……！」"
translation = "「후와아~♪ 소피아 씨 엉덩이, 아담하지만 농밀한 쫄깃함이 있어서 정말 멋져요……!」"

[[dialogue]]
speaker = "ソフィア"
original = "「ち、ちょっとシズハ、あんまり揉まないで下さい……！\u3000は、恥ずかしいですからっ」"
translation = "「조, 조금 시즈하, 너무 주무르지 말아 주세요……! 부, 부끄러우니까요」"

[[dialogue]]
speaker = "シズハ"
original = "「あっ、この後はソフィアさんも、私のお尻を触って下さいね♪」"
translation = "「앗, 이다음엔 소피아 씨도 제 엉덩이를 만져주세요♪」"

[[dialogue]]
speaker = "ソフィア"
original = "「えぇっ！？\u3000私もですかぁ！？」"
translation = "「에엣!? 저도요!?」"

[[dialogue]]
speaker = "シズハ"
original = "「はいっ♪\u3000これは仲良くなる為のコミュニケーションなので♪」"
translation = "「네♪ 이건 친해지기 위한 커뮤니케이션이니까요♪」"

[[dialogue]]
speaker = "unk"
original = "心から嬉しそうな笑顔でソフィアと触れ合うシズハ。そんな彼女を見て、サーシャも笑顔を浮かべる。"
translation = "진심으로 기쁜 듯한 미소로 소피아와 교감하는 시즈하. 그런 그녀를 보며 사샤도 미소를 짓는다."

[[dialogue]]
speaker = "サーシャ"
original = "「うふふっ。先輩の先輩らしく、フォロー成功ね～」"
translation = "「우후훗. 선배의 선배답게 팔로우 성공이네~」"

[[dialogue]]
speaker = "ディーラック"
original = "「いや、なんかちょっとズレてない……？」"
translation = "「아니, 뭔가 좀 어긋나지 않았어……?」"

[[dialogue]]
speaker = "unk"
original = "呆れ顔でシズハたちを眺めながら、サーシャへツッコミを入れるディーラックなのだった。"
translation = "어이없다는 얼굴로 시즈하 일행을 바라보며 사샤에게 딴지를 거는 디럭쿠가었다."

