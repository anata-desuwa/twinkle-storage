[[dialogue]]
speaker = "unk"
original = "第１話,九浄家当主、現る,P"
translation = "제1화, 쿠죠 가문 당주, 나타나다, P"

[[dialogue]]
speaker = "unk"
original = "ある日、ヴィーナスと一緒に星徒会室で仕事をしていると――"
translation = "어느 날, 비너스와 함께 성도회실에서 업무를 보고 있자니──"

[[dialogue]]
speaker = "？？？"
original = "「失礼するぞ、星徒会諸君」"
translation = "「실례하마, 성도회 제군.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ヘレナちゃんじゃない！\u3000珍しいわね、学園に顔を出すなんて」"
translation = "「헬레나 짱이잖아! 드문 일이네, 학원에 얼굴을 내비치다니.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ふふっ、そろそろ顔見せの時だと、我が魂が囁くのでな」"
translation = "「후훗, 슬슬 얼굴을 비출 때라고, 나의 영혼이 속삭여서 말이다.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「さて、初めましてになるな、未来の日誌に記されし魔王よ」"
translation = "「자, 처음 뵙겠군, 미래의 일지에 기록된 마왕이여.」"

[[dialogue]]
speaker = "unk"
original = "あなたは……？"
translation = "당신은……?"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「それでは、名乗らせてもらうとしよう――」"
translation = "「그럼, 이름을 밝히도록 하지──」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「立てばプリティ、座ればゴージャス」"
translation = "「서면 프리티, 앉으면 고저스.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「我が名は、泣く子も黙る九浄家二十六代目当主・九浄ヘレナ」"
translation = "「나의 이름은, 우는 아이도 그치게 하는 쿠죠 가문 26대 당주, 쿠죠 헬레나.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「友人として、ヘレナちゃんと呼んでもよいぞ？」"
translation = "「친구로서, 헬레나 짱이라 불러도 좋다?」"

[[dialogue]]
speaker = "unk"
original = "九浄家のご当主様！？"
translation = "쿠죠 가문의 당주님!?"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ふふっ、いかにも。ひょっとしたらこれまでも、我が存在をどこかで聞かされたりしていたかもしれぬな」"
translation = "「후훗, 그렇다. 어쩌면 지금까지도, 나의 존재를 어딘가에서 전해 들었을지도 모르겠군.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「５年前、<b>記憶喪失</b>だった私を九浄家に迎え入れてくれた人よ。私にとっては義理のお母さんに当たるわね！」"
translation = "「5년 전, <b>기억상실</b>이었던 나를 쿠죠 가문에 받아들여 준 사람이야. 나한테는 의붓어머니가 되는 셈이지!」"

[[dialogue]]
speaker = "unk"
original = "義理の……？"
translation = "의붓……?"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「そこはまぁ、ひとまず置いておくがよい。別の機会で話すこともあろう」"
translation = "「그 점은 뭐, 일단 제쳐두도록 하렴. 다른 기회에 이야기할 수도 있을 테니까.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「それよりも今日はこの、九浄ヘレナちゃんの出番が、満を持してやってきたのだ――」"
translation = "「그보다 오늘은 이 쿠죠 헬레나 짱의 차례가, 만반의 준비를 마치고 찾아온 것이다──」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「さあ、諸君。思う存分、私のスクショを撮るがよい」"
translation = "「자, 제군. 마음껏, 나의 스크린샷을 찍도록 해라.」"

[[dialogue]]
speaker = "unk"
original = "す、スクショ……？？"
translation = "스, 스크린샷……??"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ヘレナちゃんは、時々こういう不思議なことを言い出すけど、気にしなくていいわよ」"
translation = "「헬레나 짱은, 가끔 이런 신기한 소리를 하곤 하지만, 신경 쓰지 않아도 돼.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「いわゆる、思春期特有の<ruby>病<rt>やまい</rt></ruby>にかかってる、みたいな感じだから」"
translation = "「이른바, 사춘기 특유의 병에 걸린 것 같은 느낌이니까.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ふっ……なにを言っているのだ、ヴィーナス。そんなわけあるまい」"
translation = "「훗…… 무슨 소리를 하는 게냐, 비너스. 그럴 리가 없지 않느냐.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「これは我が内なる九浄ヘレナの魂が、時折、私の心に囁きかけてくるが故にだ」"
translation = "「이것은 내면의 쿠죠 헬레나의 영혼이, 때때로, 나의 마음에 속삭여 오기 때문이다.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「おっと、忘れるところだった。せっかくのスクショタイムなのだから、こちらの姿も披露しておかねばな」"
translation = "「앗, 잊을 뻔했군. 기껏 마련된 스크린샷 타임이니, 이 모습도 피로해 두어야겠지.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「<ruby>雅<rt>みやび</rt></ruby>やかに――変身」"
translation = "「우아하게── 변신.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「さあ、プリティでゴージャスなこの姿、とくとスクリーンショットに焼き付けるがよい」"
translation = "「자, 프리티하고 고저스한 이 모습, 똑똑히 스크린샷에 새겨두도록 하라.」"

[[dialogue]]
speaker = "unk"
original = "ヘレナさん、星騎士だったのか！"
translation = "헬레나 씨, 성기사였던 건가!"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ふふっ、そう肩肘張らず、ヘレナちゃんでよい」"
translation = "「후훗, 그렇게 어깨에 힘주지 말고, 헬레나 짱이면 된다.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「こう見えて、守護星の加護は健在。まだまだ現役の身だ」"
translation = "「이래 봬도, 수호성의 가호는 건재. 아직은 현역이다.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ちなみに、ヘレナちゃんはめっちゃ強いのよ！\u3000私に戦い方を教えてくれたのは、ヘレナちゃんなんだから」"
translation = "「참고로, 헬레나 짱은 엄청 강하다구! 나한테 싸우는 법을 가르쳐 준 게, 헬레나 짱이니까.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「これまではあいにく、絡まる因果に阻まれて表舞台に出てくることができなかったが――」"
translation = "「지금까지는 안타깝게도, 얽힌 인과에 가로막혀 무대 위로 나올 수 없었다만──」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「どうやら時は満ちたようなのでな。これからは、貴殿らに助けが必要とあらば力を貸そう」"
translation = "「아무래도 때가 무르익은 모양이군. 앞으로는, 귀공들에게 도움이 필요하다면 힘을 보태주마.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「というわけで、これからよろしく頼むぞ、新たなる魔王よ」"
translation = "「그런 고로, 앞으로 잘 부탁한다, 새로운 마왕이여.」"

[[dialogue]]
speaker = "unk"
original = "こちらこそ、ヘレナちゃん"
translation = "저야말로 잘 부탁해요, 헬레나 짱."

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「……！\u3000ふふっ、ヘレナちゃんと呼んでくれたな。実に嬉しいぞ」"
translation = "「……! 후훗, 헬레나 짱이라 불러 주었군. 실로 기쁘구나.」"

[[dialogue]]
speaker = "unk"
original = "ヘレナちゃんと握手を交わす――と、それから彼女はもう片方の手で、俺の頬にそっと触れた。"
translation = "헬레나 짱과 악수를 나눈다── 그러자 그녀는 다른 한쪽 손으로, 나의 뺨을 살며시 어루만졌다."

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「貴殿は私好みの、なかなかにラブリーな顔立ちをしているしな」"
translation = "「귀공은 내 취향인, 꽤나 러블리한 생김새를 하고 있기도 하고.」"

[[dialogue]]
speaker = "unk"
original = "え？"
translation = "에?"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ヘレナちゃん、もしかしてクロトみたいな男の子がタイプだったの！？」"
translation = "「헬레나 짱, 혹시 쿠로토 같은 남자애가 타입이었어!?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ふふっ、私が可愛いもの好きであることは知っていよう？\u3000ヴィーナスよ」"
translation = "「후훗, 내가 귀여운 것을 좋아한다는 건 알고 있지 않느냐? 비너스여.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そりゃあ、趣味で星見家に対抗して、九浄家メイド隊を作っちゃうくらいだし……」"
translation = "「그야, 취미로 호시미 가문에 대항해서, 쿠죠 가문 메이드 부대를 만들 정도니까……」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「その可愛いの対象は、男に対しても及ぶということだ。私も女なのでな」"
translation = "「그 귀여움의 대상은, 남자에 대해서도 미친다는 뜻이다. 나도 여자니까 말이지.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ちなみにこれは、我が魂とは鏡映し。私個人の性癖というやつだ」"
translation = "「참고로 이것은, 나의 영혼과는 거울상. 나 개인의 성벽이라는 것이다.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「故に、親しくしてくれると嬉しいぞ、魔王よ」"
translation = "「고로, 친하게 지내주면 기쁘겠구나, 마왕이여.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ふふっ……♪」"
translation = "「후훗……♪」"

[[dialogue]]
speaker = "unk"
original = "ヘレナちゃんはそう言って、悪戯っぽく微笑むのだった――"
translation = "헬레나 짱은 그렇게 말하며, 장난스럽게 미소 짓는 것이었다──"

