[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ゲームの前に、まずは作戦タイムだね」"
translation = "「게임 전에 우선 작전 타임이네.」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「このカジノにあるものならば、どの種目でもよいとダッチは言っておりますが……」"
translation = "「이 카지노에 있는 거라면 어느 종목이든 좋다고 더치는 말하고 있습니다만……」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「スロットにルーレット。トランプならポーカーにバカラ、ブラックジャック──両手じゃ利かないくらいの選択肢がありますわよ？」"
translation = "「슬롯에 룰렛. 트럼프라면 포커에 바카라, 블랙잭── 양손으론 모자랄 정도의 선택지가 있어요?」"

[[dialogue]]
speaker = "unk"
original = "みんなの得意なゲームを聞かせてくれ"
translation = "다들 잘하는 게임을 알려줘"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「私はとりあえず、運だけじゃなく駆け引きの要素もあるゲームが嬉しいかな」"
translation = "「나는 일단 운뿐만 아니라 심리전 요소도 있는 게임이 좋으려나.」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「スロットならば大得意ですわ！\u3000動体視力には自信があるんですの。目押しも余裕ですわ！！」"
translation = "「슬롯이라면 자신 있어요! 동체 시력에는 자신 있거든요. 눈 맞추기도 식은 죽 먹기예요!!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「私は……その、申し訳ございません。賭け事自体、したことがありませんわ」"
translation = "「저는…… 그, 죄송합니다. 도박 자체를 해본 적이 없어요.」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「かろうじてポーカーくらいですわね。それだって役とルールを知っている程度で……」"
translation = "「간신히 포커 정도일까요. 그것도 족보랑 규칙을 아는 정도라……」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あちゃ……まぁそうだよね。お嬢様だし、千園寺先輩って鍛錬ばっかしてるイメージだし」"
translation = "「아차…… 뭐 그렇겠지. 아가씨고, 치온지 선배는 단련만 하고 있을 이미지니까.」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「まったく。こういう時の為に、少しは娯楽も嗜んでおいて欲しかったですわね」"
translation = "「정말이지. 이럴 때를 위해서 조금은 오락도 즐겨두길 바랐어요.」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「こんなの予想できるわけがありませんわ！？\u3000モンスターから命を賭けたゲームを挑まれるだなんて……！」"
translation = "「이런 걸 예상할 수 있을 리 없어요!? 몬스터로부터 목숨을 건 게임을 도전받게 될 줄이야……!」"

[[dialogue]]
speaker = "unk"
original = "なら全員、ポーカーで行こう"
translation = "그럼 전원, 포커로 가자"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「そうだね。ここは敵の巣だし、何かしらイカサマを仕掛けてくると考えるのが妥当だよ」"
translation = "「그렇네. 여기는 적의 소굴이고, 분명 뭔가 사기를 칠 거라고 생각하는 게 타당해.」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「だったら４人全員、同じゲームの方がいいということですわね。千園寺様がわかるポーカーがベストでしょう」"
translation = "「그렇다면 4명 전원 같은 게임인 편이 좋다는 거예요. 치온지 님이 아는 포커가 베스트겠죠.」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「皆様、ご配慮感謝いたしますわ。では──参りましょう！」"
translation = "「여러분, 배려에 감사드리겠어요. 그럼── 가시죠!」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「では、一対一のポーカーをいたしましょう。貴女がた全員のチップを私が奪い取れば……」"
translation = "「그럼 1대 1 포커를 하도록 하죠. 당신들 전원의 칩을 제가 뺏으면……」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「その時は全員がバニーガールとして<ruby>虜囚<rt>りょしゅう</rt></ruby>になると言うのでしょう？\u3000いいからさっさとチップを寄越しなさいですわ！」"
translation = "「그때는 전원이 바니걸로서 포로가 된다는 말이겠죠? 됐으니까 어서 칩이나 내놓으세요!」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「フフフ！\u3000そう焦らずとも……では全員に２０枚ずつ、チップをお渡しします」"
translation = "「후후후! 그렇게 서두르지 않으셔도…… 그럼 전원에게 20개씩 칩을 나눠드리겠습니다.」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「それでは──『欲望』のポーカーを始めましょう」"
translation = "「그럼── 『욕망』의 포커를 시작하죠.」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「勝ちへの強い執念。望むカードを引き込むよう念じることが、このゲームの肝であるとお伝えしておきます」"
translation = "「승리에 대한 강한 집념. 원하는 카드를 끌어당기도록 염원하는 것이 이 게임의 핵심이라는 점을 미리 말씀드립니다.」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「調子に乗っていられるのもそこまでですわ！\u3000私が初戦で吠え面かかせてやりますとも！」"
translation = "「우쭐해 있을 수 있는 것도 거기까지예요! 제가 첫 판에서 울상을 짓게 해주겠어요!」"

[[dialogue]]
speaker = "unk"
original = "セナリィ、頑張れ！"
translation = "세나리, 힘내!"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ふふん。会長様の手を煩わせることもないですわ。私、命を賭けた戦いなんて掃いて捨てるほど経験済みでしてよ！」"
translation = "「후훙. 회장님 손을 빌릴 것도 없어요. 저, 목숨을 건 싸움 같은 건 쌔고 쌜 정도로 경험해봤어요!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「たかが札遊びでヘンタイに遅れなど取りません。祝杯の準備をお願いいたしますわ！」"
translation = "「고작 카드놀이로 변태에게 뒤처지지 않아요. 축배 준비나 부탁드리겠어요!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「セナリィ、さっきから死亡フラグ立てまくってるけど大丈夫？」"
translation = "「세나리, 아까부터 사망 플래그 엄청나게 세우고 있는데 괜찮아?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「勝負前に縁起でもないこと言うんじゃねーですわ！？」"
translation = "「승부 전에 재수 없는 소리 하지 마시지요!?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「さぁダッチ！\u3000参加料のチップ、１枚ですわ！\u3000カードを配りなさい！」"
translation = "「자 더치! 참가비 칩 1개예요! 카드를 돌리세요!」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「かしこまりました。では──トランプモンスター！」"
translation = "「알겠습니다. 그럼── 트럼프 몬스터!」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「イ～っ！」"
translation = "「이~잇!」"

[[dialogue]]
speaker = "unk"
original = "知能のないはずのモンスターがデッキをシャッフルし、セナリィとダッチにカードを配っていく。"
translation = "지능이 없을 터인 몬스터가 덱을 셔플하고 세나리와 더치에게 카드를 배분한다."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「手足のようにモンスターを使役するだなんて。ロストアイテムの力、本当に侮れませんわね……」"
translation = "「손발처럼 몬스터를 사역하다니. 로스트 아이템의 힘, 정말 얕볼 수 없어요……」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "（さぁ気になる最初の５枚は──まぁ！？）"
translation = "(자, 궁금한 첫 5장은── 아니!?)"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "（いきなりツーペアが完成してますわ～！\u3000ああ、これが持って生まれた私の強運！）"
translation = "(갑자기 투 페어가 완성되어 있어요~! 아아, 이것이 타고난 나의 강운!)"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "（このままフルハウスまで育てて、一撃で粉砕してやりますわよ！）"
translation = "(이대로 풀하우스까지 키워서 일격에 분쇄해 주겠어요!)"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「１枚チェンジですわ！」"
translation = "「1장 체인지예요!」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「だいぶまとまっているご様子ですね？\u3000私は３枚チェンジです」"
translation = "「꽤 잘 정리된 모양이군요? 저는 3장 체인지입니다.」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "（３枚チェンジ……フフン。あってもワンペアどまりですわね。『欲望』の名が聞いて呆れますわよ！）"
translation = "(3장 체인지…… 후훙. 있어 봤자 원 페어 정도겠어요. 『욕망』이란 이름이 아까워요!)"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "（さぁ来なさい！\u3000Ｋ、Ｋ、Ｋ──カモンですわ！！）"
translation = "(자, 오너라! K, K, K── 카몬이에요!!)"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「イ～……！」"
translation = "「이~……!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "（ファーッ！？\u3000ディスティニードローですわ！！\u3000ハートのＫ、引きましてよ！！）"
translation = "(파앗!? 데스티니 드로우예요!! 하트 K, 뽑았어요!!)"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "（Ｋがスリーカードのフルハウス。ポーカーにおいてほぼ最強のハンドですわ～～！？）"
translation = "(K가 트리플인 풀하우스. 포커에서 거의 최강인 핸드예요~~!?)"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "（あ～あ……ポーカーフェイスしなきゃダメだよセナリィ。そんなウキウキ顔してたらオリられるに決まってる）"
translation = "(아~아…… 포커페이스를 해야지 세나리. 그렇게 들뜬 표정을 지으면 분명히 폴드해버릴걸.)"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「フフフ……セナリィ様は愉快な方ですね。相当強いハンドができたと全身で告白しておりますよ？」"
translation = "「후후후…… 세나리 님은 유쾌한 분이시군요. 상당히 강한 핸드가 만들어졌다고 온몸으로 자백하고 계시네요?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「──ファっ！？」"
translation = "「──팟!?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "（ほら、やっぱり……）"
translation = "(봐, 역시나……)"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「ですが私も引けない手となりました。レイズといきましょう！」"
translation = "「하지만 저도 물러설 수 없는 패가 되었습니다. 레이즈로 가죠!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "（えぇ～っ！？）"
translation = "(에에~!?)"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "（た、助かりましたわ……すぐオリられては大損！\u3000ちびちびチップを釣り上げてやりますわ～！）"
translation = "(사, 살았어요…… 바로 폴드 해버리면 큰 손해! 야금야금 칩을 올려주겠어요~!)"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「さらに１枚レイズ！\u3000ダッチはどうしますの？\u3000積みまして？\u3000それともドロップいたしますか！？」"
translation = "「추가로 1개 레이즈! 더치는 어쩔 거예요? 쌓겠어요? 아니면 드롭하시겠어요!?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「れれれれ、レイズっ……マックスの２０枚ですわ……！」"
translation = "「레레레레, 레이즈…… 맥스인 20개예요……!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "（やべぇですわ！？\u3000オリられないと張り合っているうちに……チップ全部、テーブルに乗っけちゃいましたわ～！？）"
translation = "(위험해요!? 물러나지 않겠다고 버티는 사이에…… 칩 전부를 테이블에 올려버렸어요~!?)"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「フフフ、いきなり大勝負になってしまいましたね……まさか２０枚全賭けとは。恐れ入ります」"
translation = "「후후후, 갑자기 큰 승부가 되어버렸군요…… 설마 20개 올인이라니. 경의를 표합니다.」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ふ、ふふん。怖いなら今からでもオリたらどうですの？」"
translation = "「후, 후훙. 무서우면 지금이라도 폴드 하는 건 어떠신가요?」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「いえ──コールしましょう。私も２０枚だ」"
translation = "「아니요── 콜 하죠. 저도 20개입니다.」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「敵の手の内がわかる前にいきなり全財産ぶっこんじゃうとか……セナリィ、ゴールデングースの運営、本当に大丈夫？」"
translation = "「적의 패를 알기도 전에 갑자기 전 재산을 쏟아붓다니…… 세나리, 골든 구스 운영 정말 괜찮은 거야?」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「私も敵ながら心配になってしまいますね」"
translation = "「저도 적이지만 걱정이 되는군요.」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「お黙りなさい！\u3000勝てば官軍ですわ──ショウダウンです！\u3000食らいなさい、私のゴージャスハンド！\u3000Ｋハイ・フルハウスを！！」"
translation = "「조용히 하세요! 이기면 장땡이에요── 쇼다운이예요! 먹어라, 나의 고저스 핸드! K하이 풀하우스를!!」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「素晴らしい！\u3000１枚チェンジでそんな役ができていたとは」"
translation = "「훌륭합니다! 1장 체인지로 그런 족보가 만들어지다니.」"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「ですが残念です。私のハンドはスペードの──」"
translation = "「하지만 유감입니다. 제 핸드는 스페이드의──」"

[[dialogue]]
speaker = "unk"
original = "ロイヤルストレートフラッシュ！？"
translation = "로열 스트레이트 플래시!?"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「なななっ、何でこうなりますの～！？」"
translation = "「나나낫, 왜 이렇게 되는 거예요~!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「なんてこと……！\u3000あんなに強い役で負けるなんて……アンラッキーにも程がありますわ！」"
translation = "「세상에…… 그렇게 강한 족보로 지다니…… 운이 없어도 정도가 있어요!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "（ロイヤルストレートフラッシュ……出現確率は確か、０．０００１５％。６５万回に１回、だっけ……？）"
translation = "(로열 스트레이트 플래시…… 출현 확률이 아마 0.00015%. 65만 번에 1번이었나……?)"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "（ありがちなフルハウスとかじゃなくて、こんな希少役……イカサマにしては目立ちすぎだよね）"
translation = "(흔한 풀하우스 같은 게 아니라 이런 희귀한 족보…… 사기치고는 너무 눈에 띄는데.)"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "（見破ってみろっていう宣言なのかな。面白いじゃん。絶対に暴いてやるから）"
translation = "(간파해 보라는 선언인 걸까. 재밌네. 절대로 폭로해 줄 테니까.)"

[[dialogue]]
speaker_original = "ダッチ"
speaker_translation = "더치"
original = "「さぁ……次はどの子ウサギがお相手ですか？」"
translation = "「자…… 다음은 어느 아기 토끼가 상대입니까?」"

