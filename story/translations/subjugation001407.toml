[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「落ち着いてくださ～いっ！」"
translation = "「진정하세욧~!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「慌てずこちらへ避難をっ」"
translation = "「당황하지 말고 이쪽으로 피난을으」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「大規模なアステラが発生しちゃってるわね。これじゃバカンスどころの騒ぎじゃないわ」"
translation = "「대규모 아스텔라가 발생해 버렸네. 이러면 바캉스 즐길 때가 아니야」"

[[dialogue]]
speaker = "unk"
original = "ビーチのみんなはっ？"
translation = "비치의 사람들은?"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「無事に安全な場所へ誘導しました。すみません、おひとりでモンスターを食い止めていただいて」"
translation = "「무사히 안전한 장소로 유도했습니다아. 죄송해요어, 혼자서 몬스터를 막아주시게 해서어」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「許せませんっ……！\u3000せっかく皆さん、海で楽しく過ごしてましたのに……！\u3000焼きたてのたこ焼きだって作ってもらってる最中だったんですよぉ……！」"
translation = "「용서 못 해욧……! 어렵게 다들 바다에서 즐겁게 지내고 있었는데욧……! 갓 구운 타코야끼도 만들고 있던 도중이었단 말이에욧……!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「救援を呼んでいる暇はありませんね。あのアステラは私たちで片付けるしかなさそうです」"
translation = "「지원군을 부를 틈은 없겠네요어. 저 아스텔라는 저희가 해결할 수밖에 없을 것 같아요어」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「で、でも、わたしたちにやれるでしょうか……。まだ星力の制御に不安が……」"
translation = "「하, 하지만 저희가 할 수 있을까요어……. 아직 성력 제어에 불안이……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「うっ。それは確かに……」"
translation = "「윽. 그건 확실히……」"

[[dialogue]]
speaker = "unk"
original = "２人なら大丈夫だよ"
translation = "두 사람이라면 괜찮아."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「会長さん……？」"
translation = "「회장님……?」"

[[dialogue]]
speaker = "unk"
original = "自信を持って！"
translation = "자신을 가져!"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「会長……」"
translation = "「회장……」"

[[dialogue]]
speaker_original = "子ども"
speaker_translation = "아이"
original = "「ふぇ～ん、お母さんどこ～っ」"
translation = "「후에엥, 엄마 어디 있어~」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「！\u3000いけませんっ、逃げ遅れた子が──！」"
translation = "「! 안 돼욧, 대피 못한 아이가──!」"

[[dialogue]]
speaker_original = "水着フワッチ"
speaker_translation = "수영복 후왓치"
original = "「イ～～～～～ッ」"
translation = "「이~~~~~잇」"

[[dialogue]]
speaker_original = "子ども"
speaker_translation = "아이"
original = "「きゃああああああっっ～～！！？」"
translation = "「꺄아아아아아악~~!!?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あ……あれ？\u3000ちゃんと使えちゃいました……」"
translation = "「어…… 어라? 제대로 써졌어욧……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「わ、私もです。あれこれ考えずとっさに放った星術でしたのに……」"
translation = "「저, 저도요어. 이것저것 생각지 않고 순간적으로 날린 성술이었는데욧……」"

[[dialogue]]
speaker_original = "子ども"
speaker_translation = "아이"
original = "「ぐす、ありがとう、星騎士のお姉さんたち……」"
translation = "「으앙, 고마워요, 성기사 누나들……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あっ、いえいえ、もー安全ですよぉ～！」"
translation = "「앗, 아니아니욧, 이이제 안전해욧~!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「お怪我はありませんか？\u3000怖かったですよね」"
translation = "「다친 곳은 없나요어? 무서웠죠어」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「さ、早くこっちへ。お母さんも待ってるわ」"
translation = "「자, 어서 이쪽으로. 엄마도 기다리고 있어」"

[[dialogue]]
speaker_original = "子ども"
speaker_translation = "아이"
original = "「うん、ありがとうっ」"
translation = "「응, 고마워요」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「力が湧いてきて……今なら負ける気がしません！」"
translation = "「힘이 솟아나서…… 지금이라면 질 것 같지 않아욧!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「戦闘服が体に馴染みます。まるで生まれた時から着ていたような……裸になったみたいですっ」"
translation = "「전투복이 몸에 착 감겨요어. 마치 태어날 때부터 입고 있었던 것처럼…… 벌거벗은 기분이에요어!」"

[[dialogue]]
speaker = "unk"
original = "みんな揃って空回りしちゃってたのかもな"
translation = "다들 한꺼번에 헛돌고 있었던 걸지도 모르겠네."

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「空回り、ですか。ふふ、確かにそうかもしれませんね。水着を着て、海へ来て、変に意気込みすぎていたのかもしれません」"
translation = "「헛돌기, 인가요어. 후후, 확실히 그럴지도 모르겠네요어. 수영복을 입고, 바다에 오고, 이상하게 너무 의욕이 앞서 있었던 걸지도요어」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「わたしも初めての海と水着に浮ついちゃってましたぁ。そっかぁー、最初から普段通りの心構えで気楽に過ごしていれば良かったんですねぇ」"
translation = "「저도 처음 온 바다와 수영복에 들떠 있었어욧. 그렇구나아─, 처음부터 평소 같은 마음가짐으로 느긋하게 지냈으면 됐던 거네욧」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「ありがとうございます、会長。会長が励ましてくださったおかげで、いつもの自分を取り戻せました」"
translation = "「감사합니다, 회장. 회장이 격려해 주신 덕분에 평소의 자신을 되찾았어요어」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「えへへっ、わたし、根が単純ですからねっ。会長さんに『大丈夫』ってひと言言ってもらえるだけで自信モリモリ、ハイパー天使ですよぉ～！」"
translation = "「에헤헤, 제가 성격이 단순하니까요어. 회장님이 『괜찮아』라는 한마디만 해주셔도 자신감 뿜뿜, 하이퍼 천사라구욧~!」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「ふふ。どうやら私のアドバイスなんて不要だったみたいね。やっぱり先輩風なんて吹かせるものじゃないわ」"
translation = "「후후. 아무래도 내 조언 같은 건 필요 없었나 보네. 역시 선배 노릇 같은 건 하는 게 아니야」"

[[dialogue]]
speaker_original = "水着フワッチ"
speaker_translation = "수영복 후왓치"
original = "「イーーーッ！」"
translation = "「이잇!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「っと！\u3000こーしちゃいられません！\u3000ちゃっちゃとアステラを攻略して、モンスターの発生を止めましょう！」"
translation = "「앗! 이러고 있을 때가 아니에욧! 얼른 아스텔라를 공략해서 몬스터 발생을 멈추자구욧!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「そうですね。この際、水着の食い込みは気にしないことにします。モンスターに見られても何も感じませんから」"
translation = "「그렇네요어. 이번 기회에 수영복이 파고드는 건 신경 쓰지 않기로 하겠어요어. 몬스터가 봐도 아무것도 안 느껴지니까요어」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「私も手伝わせてもらうわ。私の不運であのモンスターを呼び寄せちゃったのかもしれないし。他人を巻き込むわけにはいかないもの」"
translation = "「나도 도울게. 내 불운 때문에 저 몬스터를 불러들였을지도 모르니까. 남을 휘말리게 할 수는 없지」"

[[dialogue]]
speaker = "unk"
original = "よし、俺たちでビーチの平和を守るぞ！"
translation = "좋아, 우리끼리 비치의 평화를 지키자!"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「はいなのです！\u3000これでも流星学園の星徒会役員ですから！」"
translation = "「네, 그런 것이에욧! 이래 봬도 유성학원의 성도회 위원이니까욧!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「はい！\u3000保健委員イクシリオン・グレゴール、参ります！」"
translation = "「네! 보건위원 익실리온 그레고르, 가겠습니다아!」"

