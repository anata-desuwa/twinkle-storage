[[dialogue]]
speaker = "unk"
original = "第１３話,命脈のアルモタヘル,B"
translation = "제13화, 명맥의 아르모타헬, B"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「ッヅヅ……ヅアアァァ……！」"
translation = "「끄즈즈……즈아아아아……!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふぅ……なんとかなったかしら？」"
translation = "「휴우…… 어떻게든 된 걸까?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ア、アナちゃんさんとの連携を試していなかったら危なかったです……！」"
translation = "「아, 아나짱 씨와의 연계를 시도하지 않았더라면 위험했습니다……!」"

[[dialogue]]
speaker = "unk"
original = "最後の一撃を受けて崩折れる堕天使。"
translation = "마지막 일격을 받고 무너져 내리는 타락천사."

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「！\u3000これは──確か、前にも……」"
translation = "「! 이건── 분명, 전에도……」"

[[dialogue]]
speaker = "unk"
original = "光の拡散が落ち着く。"
translation = "빛의 확산이 잦아든다."

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "そこには、瘴気から解き放たれた天使の姿があった。"
translation = "그곳에는, 장기에서 해방된 천사의 모습이 있었다."

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「──苦労をかけた。星騎士の子らよ」"
translation = "「──고생을 시켰다. 성기사의 아이들아.」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「！\u3000正気に戻られたのですね……！」"
translation = "「! 제정신으로 돌아오신 것이군요……!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ほっ……第二形態とかあったらどうしようかと思った……」"
translation = "「휴우…… 제2 형태 같은 게 있었으면 어쩌나 했네……」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「うちら、前もあなたと同じような境遇の天使さんを見たことあるんだけど……？」"
translation = "「우리, 전에도 당신과 비슷한 처지의 천사 씨를 본 적 있는데……?」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「<ruby>然<rt>しか</rt></ruby>り。察しの通り、我はフィーニスの塔を護りし守護天使が一柱──《命脈》のアルモタヘル」"
translation = "「그렇다. 짐작대로, 나는 피니스의 탑을 지키는 수호 천사 중 한 기둥── 《명맥》의 아르모타헬.」"

[[dialogue]]
speaker = "unk"
original = "両翼を広げた守護天使アルモタヘルは、神々しいまでの存在感を放って君臨する。"
translation = "양 날개를 펼친 수호 천사 아르모타헬는, 신성하기까지 한 존재감을 내뿜으며 군림한다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「守護天使様って、普段はフィーニスの塔にいるんでしょうか……？」"
translation = "「수호 천사님은, 평소에는 피니스의 탑에 있는 걸까……?」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「然り。だが守護天使はただの門番ではない。摂理の統治者だ」"
translation = "「그렇다. 하지만 수호 천사는 단순한 문지기가 아니다. 섭리의 통치자다.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「摂理の、統治者……？」"
translation = "「섭리의, 통치자……?」"

[[dialogue]]
speaker = "unk"
original = "聞き慣れない単語に戸惑う面々。"
translation = "익숙하지 않은 단어에 당황하는 일행."

[[dialogue]]
speaker = "unk"
original = "アルモタヘルはその困惑を斟酌することなく話を続けた。"
translation = "아르모타헬는 그 곤혹을 헤아리지 않고 이야기를 계속했다."

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「我らは女神の下に仕える全６柱の守護天使。我々はそれぞれ異なる摂理の管轄権を与えられ、塔を守ることによりその秩序を維持している」"
translation = "「우리는 여신 아래에 봉사하는 총 여섯 기둥의 수호 천사. 우리는 각각 다른 섭리의 관할권을 부여받아, 탑을 지킴으로써 그 질서를 유지하고 있다.」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「瘴気に呑まれたことにより、不覚にも醜態を晒すこととなったが……本来であれば人の子の前に姿を見せることさえ禁じられている」"
translation = "「장기에 삼켜짐으로써, 부덕하게도 추태를 드러내게 되었으나…… 본래라면 인간의 아이들 앞에 모습을 보이는 것조차 금지되어 있다.」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "（前回のマグダレナさんに比べると、ずいぶん厳格そうなお方でありますね）"
translation = "（지난번 막달레나 씨에 비하면, 상당히 엄격해 보이시는 분이시네요.）"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "（クールですね）"
translation = "（쿨하시네요.）"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「マグダレナか。奴も堕天していたとは……ふむ。やはり事態は<ruby>逼迫<rt>ひっぱく</rt></ruby>していると言わざるをえない」"
translation = "「막달레나인가. 그자도 타락천사가 되어 있었다니…… 흠. 역시 사태는 급박하다고 말할 수밖에 없군.」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ひええ、聞こえておりました！？」"
translation = "「히이익, 들리고 있었습니까!?」"

[[dialogue]]
speaker = "unk"
original = "ルリエルの小声も拾い、アルモタヘルは顔色ひとつ変えず続ける。"
translation = "루리엘의 작은 목소리도 듣고, 아르모타헬는 안색 하나 바꾸지 않고 계속한다."

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「マグダレナは“領域”を司る守護天使」"
translation = "「막달레나는 “영역”을 관장하는 수호 천사.」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「そして我──守護天使アルモタヘルは“種族”を司る一柱だ」"
translation = "「그리고 나── 수호 천사 아르모타헬는 “종족”을 관장하는 한 기둥이다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「それが……摂理の統括、ということですね」"
translation = "「그것이…… 섭리의 통괄, 이라는 것이군요.」"

[[dialogue]]
speaker = "unk"
original = "アルモタヘルは無言で首肯する。"
translation = "아르모타헬는 말없이 고개를 끄덕인다."

[[dialogue]]
speaker = "unk"
original = "６柱の守護天使が司る摂理とは、三界すべてにまたがる共通の理であると語った。"
translation = "여섯 기둥의 수호 천사가 관장하는 섭리란, 삼계 전체에 걸쳐 있는 공통의 이치라고 말했다."

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「それってつまり……アルモタヘルさんのおかげで三種族のバランスは保たれてる、みたいな？」"
translation = "「그건 그러니까…… 아르모타헬 씨 덕분에 삼종족의 균형이 유지되고 있다는, 그런 느낌?」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「然り。だが、リクリエは三界、三種族、その全ての均衡を崩して更地にする。その現象を前に我らは完全なる障害だ」"
translation = "「그렇다. 하지만, 리크리에는 삼계, 삼종족, 그 모든 균형을 무너뜨려 폐허로 만든다. 그 현상 앞에서 우리는 완전한 장애물이다.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「だ、だからって堕天させられちゃうなんて……」"
translation = "「다, 다고 해서 타락천사가 되어 버리다니……」"

[[dialogue]]
speaker = "unk"
original = "守護天使らが集うフィーニスの塔はいわば摂理の大黒柱。"
translation = "수호 천사들이 모이는 피니스의 탑은 말하자면 섭리의 대들보."

[[dialogue]]
speaker = "unk"
original = "その本丸を崩さんと迫り、また事実、危機に瀕させている此度のリクリエはやはりただ事ではないと語る。"
translation = "그 본거지를 무너뜨리려 다가오고, 또한 실제로 위기에 처하게 만드는 이번 리크리에는 역시 예사롭지 않다고 말한다."

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「解放してもらえたのは僥倖だが──今の我も、あくまで実体なき幻影にすぎない。本体は魔界の奥底に囚われている」"
translation = "「해방된 것은 요행이지만── 지금의 나도, 어디까지나 실체 없는 환영에 불과하다. 본체는 마계의 깊은 곳에 갇혀 있다.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「魔界……そうなのね」"
translation = "「마계…… 그런 거였네.」"

[[dialogue]]
speaker = "unk"
original = "かつての守護天使マグダレナも同様の事態にあった。"
translation = "예전의 수호 천사 막달레나도 비슷한 사태를 겪었다."

[[dialogue]]
speaker = "unk"
original = "流星の面々はその意味を飲み込めたが……"
translation = "유성 일행은 그 의미를 이해했지만……"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「そして……ッ。どうやら、あちらでも干渉を受けているようだ」"
translation = "「그리고…… 아무래도, 저쪽에서도 간섭을 받고 있는 듯하다.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「それって──攻撃されてるってこと……？」"
translation = "「그건── 공격당하고 있다는 말……?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「守護天使さんを守るには、魔界の本体を救出しなくてはならないということですか？\u3000それならそこはどこですか？」"
translation = "「수호 천사 씨를 지키려면, 마계에 있는 본체를 구출해야 한다는 말씀이신가요? 그렇다면 그곳은 어디입니까?」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「前者はその通りだが、後者については我にもわからぬ」"
translation = "「전자는 그 말대로지만, 후자에 대해서는 나도 알 수 없다.」"

[[dialogue]]
speaker = "unk"
original = "冷静に受け答えるアルモタヘル──"
translation = "냉정하게 대답하는 아르모타헬──"

[[dialogue]]
speaker = "unk"
original = "しかし彼女の存在感は次第に希薄となってゆき……"
translation = "하지만 그녀의 존재감은 점차 희박해져 가고……"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「礼を言おう諸君。諸君らが務めを果たせし後、きっと我らも真の姿で見えることができるだろう」"
translation = "「감사를 표하겠다, 제군. 제군들이 임무를 완수한 후, 분명 우리도 진정한 모습으로 보일 수 있을 것이다.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「あー、消えるのはちょっと待ってくれるかな天使さん。うちらのフィオナ会長とクロトくん、ヴィーナスちゃんは結局どうしてるわけ？」"
translation = "「아ー, 사라지는 건 잠깐 기다려 줄래, 천사 씨. 우리 피오나 회장이랑 쿠로토 군, 비너스짱은 결국 어떻게 된 거야?」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「御子らのことか。彼らは今、“塔”の中で……」"
translation = "「미코들에 대한 말인가. 그들은 지금, “탑” 안에서……」"

[[dialogue]]
speaker = "unk"
original = "守護天使アルモタヘルが言葉を紡ごうとする──その時だった。"
translation = "수호 천사 아르모타헬가 말을 이으려 하는── 그 순간이었다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「……？」"
translation = "「……?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「なんでしょうか、この揺れは……」"
translation = "「무슨 일일까요, 이 흔들림은……」"

[[dialogue]]
speaker = "unk"
original = "わずかな震動が不気味に大地を揺らし続ける。"
translation = "미세한 진동이 섬뜩하게 대지를 계속 흔든다."

[[dialogue]]
speaker = "unk"
original = "その後、誰の目にも明らかな異変が巻き起こった。"
translation = "그 후, 누구의 눈에도 명백한 이변이 일어났다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「！？\u3000夜に──」"
translation = "「!? 밤에──」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「これって──！」"
translation = "「이건──!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「へえ……もしかしてコレが、星読のなんちゃらってやつかな？」"
translation = "「헤에…… 혹시 이게, 별 읽기의 뭐시기라는 걸까?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「正解。私たちがあの子の家来をこらしめちゃったから……怒っちゃったのかしら？」"
translation = "「정답. 우리가 그 아이의 하인을 혼내 줬으니까…… 화가 난 걸까?」"

[[dialogue]]
speaker = "unk"
original = "新星の三人には覚えのある、流星の四人には初めてとなる異常事態に不気味さはいっそう加速する。"
translation = "신성의 세 명에게는 익숙하고, 유성의 네 명에게는 처음인 이상 사태에 섬뜩함은 더욱 가속된다."

[[dialogue]]
speaker = "unk"
original = "そして──"
translation = "그리고──"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「これは……！」"
translation = "「이것은……!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「異常な数のアステラ──ふふ、壮観ね。私が学園に入ってからもこんなのは初めて見るわ」"
translation = "「비정상적인 수의 아스테라── 후후, 장관이네. 내가 학원에 들어온 이후로 이런 건 처음 봐.」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「とんでもねー異常事態、ってか……」"
translation = "「터무니없는 이상 사태, 라는 건가……」"

[[dialogue]]
speaker = "unk"
original = "戦いはまだ終わっていない。"
translation = "싸움은 아직 끝나지 않았다."

[[dialogue]]
speaker = "unk"
original = "弛緩しかけた気を引き締め、彼女たちは再び得物を手に取った。"
translation = "이완되려던 마음을 다잡고, 그녀들은 다시 무기를 손에 들었다."

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「──この体は限界のようだ。御子らはじきにこちらへ戻る、そう信じろ」"
translation = "「──이 몸은 한계인 듯하다. 미코들은 곧 이쪽으로 돌아올 것이다, 그렇게 믿어라.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「はーい。ま、フィオナちゃん達なら大丈夫って信じてるけどね」"
translation = "「하ー이. 뭐, 피오나짱 일행이라면 괜찮다고 믿고 있지만.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「緋宮くん……」"
translation = "「히노미야 군……」"

[[dialogue]]
speaker = "unk"
original = "全てを告げられぬまま、アルモタヘルの残影が消えていく。"
translation = "모든 것을 다 말하지 못한 채, 아르모타헬의 잔영이 사라져 간다."

[[dialogue]]
speaker = "unk"
original = "終わりの始まりがその<ruby>喇叭<rt>らっぱ</rt></ruby>を鳴らそうとしていた。"
translation = "끝의 시작이 그 나팔을 불려고 하고 있었다."

