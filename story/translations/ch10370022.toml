[[dialogue]]
speaker = "unk"
original = "第２話,ふわふわハロウィンデート,P"
translation = "제2화, 폭신폭신 할로윈 데이트, P"

[[dialogue]]
speaker = "unk"
original = "毎年、学園でのハロウィンパーティーは、流星市国で行われるハロウィンとは被らないよう、前日の開催日となっている。"
translation = "매년, 학원에서의 할로윈 파티는, 유성시국에서 열리는 할로윈과 겹치지 않도록, 전날 개최되고 있다."

[[dialogue]]
speaker = "unk"
original = "そんなわけでハロウィン当日、サランと一緒にデートしようと街の方までやってきていた。"
translation = "그런 까닭에 할로윈 당일, 사란과 함께 데이트하려고 거리 쪽까지 나와 있었다."

[[dialogue]]
speaker = "サラン"
original = "「わ～♪\u3000街のハロウィン、昼間から賑やかだね～！\u3000仮装してる人たちが沢山いるよ～♪\u3000お祭りの屋台が色んなところに出てる～♪」"
translation = "「와~♪ 거리의 할로윈, 낮부터 북적거리네~! 가장한 사람들이 잔뜩 있어~♪ 축제 노점이 여기저기 나와 있어~♪」"

[[dialogue]]
speaker = "サラン"
original = "「ぽよ？\u3000会長ちゃん、サランの衣装をじっと見たりして、どうしたの？」"
translation = "「뽀요? 회장짱, 사란의 의상을 빤히 보거나 하고, 왜 그래?」"

[[dialogue]]
speaker = "サラン"
original = "「――すごく可愛い？\u3000えへへ～、ありがと～<emoji=heart04>\u3000会長ちゃんに褒めてもらえて、ふわふわ～<emoji=heart04>」"
translation = "「――정말 귀여워? 에헤헤~, 고마워~<emoji=heart04> 회장짱한테 칭찬받아서, 폭신폭신~<emoji=heart04>」"

[[dialogue]]
speaker = "サラン"
original = "「――気を付けないと、ナンパされちゃうかもって？\u3000え～？\u3000それは心配しすぎだよ～」"
translation = "「――조심하지 않으면, 헌팅당할지도 모른다고? 에~? 그건 걱정이 너무 심해~」"

[[dialogue]]
speaker = "サラン"
original = "「でも……それなら、今日はずっとサランと手を繋いで歩こっか♪」"
translation = "「하지만…… 그렇다면, 오늘은 계속 사란이랑 손을 잡고 걷자♪」"

[[dialogue]]
speaker = "サラン"
original = "「そうすれば、会長ちゃんとずっと一緒だから、ナンパされないし～。人ごみでもはぐれないし～♪\u3000ね？」"
translation = "「그러면, 회장짱이랑 계속 같이 있으니까, 헌팅당하지도 않고~. 인파 속에서도 길을 잃지 않으니까~♪ 그치?」"

[[dialogue]]
speaker = "サラン"
original = "「えへへ♪\u3000手を繋いだから、これで安心だね<emoji=heart04>\u3000それじゃあ、ふわふわハロウィンデートにしゅっぱ～つ♪」"
translation = "「에헤헤♪ 손을 잡았으니까, 이걸로 안심이네<emoji=heart04> 그럼, 폭신폭신 할로윈 데이트로 출바~알♪」"

[[dialogue]]
speaker = "サラン"
original = "「ん～♪\u3000このパンプキンケーキ美味しい～♪\u3000甘くて食べやすいのに、ちゃんとカボチャの上品な風味もして、ふわふわ～♪」"
translation = "「음~♪ 이 펌킨 케이크 맛있어~♪ 달콤해서 먹기 편한데도, 제대로 호박의 품격 있는 풍미도 나서, 폭신폭신~♪」"

[[dialogue]]
speaker = "サラン"
original = "「さっきのケーキ屋台の店長さん、今度この辺りで新しいケーキ屋さんを開くんだって。本当にすっごく美味しいから、きっと人気が出ると思うんだ～♪」"
translation = "「방금 케이크 노점 점장님, 다음에 이 근처에서 새로운 케이크 가게를 연대. 정말로 엄청 맛있으니까, 분명 인기가 많을 거라고 생각해~♪」"

[[dialogue]]
speaker = "サラン"
original = "「――うんっ♪\u3000ケーキ屋さんオープンしたら、２人でまた食べに行こうね～♪」"
translation = "「――응♪ 케이크 가게 오픈하면, 둘이서 또 먹으러 오자~♪」"

[[dialogue]]
speaker = "サラン"
original = "「あっ、見て見て会長ちゃん！\u3000そこのゲームセンターの外にある、クレーンゲームの中！\u3000ジャックちゃんの大きなぬいぐるみがある～♪」"
translation = "「앗, 봐봐 봐봐 회장짱! 저기 게임 센터 밖에 있는, 크레인 게임 안! 잭짱의 커다란 인형이 있어~♪」"

[[dialogue]]
speaker = "サラン"
original = "「そう、カボチャ頭の幽霊、ジャック・オー・ランタン♪\u3000サラン、大好きなんだ～♪\u3000ハロウィンの時期には、いつもグッズ集めてるの～♪」"
translation = "「응, 호박 머리 유령, 잭 오 랜턴♪ 사란, 정말 좋아하거든~♪ 할로윈 시기에는, 언제나 굿즈를 모으고 있어~♪」"

[[dialogue]]
speaker = "サラン"
original = "「あ～、でも今取っちゃうと、荷物になっちゃうよね。欲しいけど……うん！\u3000デート終わりに挑戦しようかな～」"
translation = "「아~, 하지만 지금 뽑으면, 짐이 되어버리겠지. 갖고 싶지만…… 응! 데이트 끝날 때 도전해볼까나~」"

[[dialogue]]
speaker = "サラン"
original = "「あそこ見て、会長ちゃん！\u3000すっごく大きいジャックちゃんのぬいぐるみが飾ってあるよ～♪\u3000わ～♪\u3000両手で抱えないと持てないジャンボサイズ～♪」"
translation = "「저기 봐봐, 회장짱! 엄청나게 큰 잭짱 인형이 장식되어 있어~♪ 와~♪ 양손으로 안지 않으면 들 수 없는 점보 사이즈~♪」"

[[dialogue]]
speaker = "サラン"
original = "「なんか近くで宣伝してるね～。えっ、クレープの大食い大会だって～♪\u3000あのジャックちゃん、それの優勝景品みたい～」"
translation = "「왠지 근처에서 선전하고 있네~. 엣, 크레이프 대식가 대회래~♪ 저 잭짱, 그거 우승 경품인가 봐~」"

[[dialogue]]
speaker = "サラン"
original = "「クレープがお腹いっぱい食べられて、ジャックちゃんのぬいぐるみも手に入る……じゅるり♪\u3000ハッ……い、いや、ダメだよね！」"
translation = "「크레이프를 배불리 먹을 수 있고, 잭짱 인형도 손에 넣을 수 있다니…… 쥬르륵♪ 핫…… 아, 아니, 안 되겠지!」"

[[dialogue]]
speaker = "サラン"
original = "「今日はせっかく会長ちゃんとハロウィンデートに来てるんだもん。まだサラン、会長ちゃんと食べ歩きしたいし……大会が終わるまで待たせちゃうし……」"
translation = "「오늘은 모처럼 회장짱이랑 할로윈 데이트를 하러 왔는걸. 아직 사란, 회장짱이랑 길거리 음식을 먹으러 다니고 싶고…… 대회가 끝날 때까지 기다리게 해버리니까……」"

[[dialogue]]
speaker = "サラン"
original = "「――え？\u3000参加してもいいって？\u3000で、でも……」"
translation = "「――에? 참가해도 괜찮다고요? 하, 하지만……」"

[[dialogue]]
speaker = "unk"
original = "サランのカッコいいところ、見せて欲しいな"
translation = "사란의 멋진 모습, 보고 싶은걸"

[[dialogue]]
speaker = "サラン"
original = "「……！\u3000わかった！\u3000見てて、会長ちゃん！」"
translation = "「……! 알았어! 지켜봐 줘, 회장짱!」"

[[dialogue]]
speaker = "サラン"
original = "「それじゃあ、いただきま～す♪\u3000あ～ん♪\u3000ん～<emoji=heart04>\u3000これもパンプキン味のクレープだ～♪\u3000美味しい～<emoji=heart04>」"
translation = "「그럼, 잘 먹겠습니다~♪ 아~앙♪ 음~<emoji=heart04> 이것도 펌킨 맛 크레이프다~♪ 맛있어~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "大食いでもマイペースだ……！"
translation = "대식가인데도 마이페이스다……!"

[[dialogue]]
speaker = "unk"
original = "確かにスピード勝負ではないのだが、大会がスタートすると、周りの司会者や参加者が困惑するくらいに、サランはクレープを味わいながら食べ始めた。"
translation = "확실히 스피드 승부는 아니었지만, 대회가 시작되자 주변의 사회자나 참가자들이 당혹스러워할 정도로 사란은 크레이프를 음미하며 먹기 시작했다."

[[dialogue]]
speaker = "大男"
original = "（隣の子はどうやら、クレープが食べたくて参加しただけのようだな。この大会、勝たせてもらうぞ……！）"
translation = "（옆에 있는 애는 아무래도 크레이프가 먹고 싶어서 참가했을 뿐인 모양이군. 이 대회, 내가 이기겠어……!）"

[[dialogue]]
speaker = "サラン"
original = "「あ……いけないけない。美味しくてつい、いつもと同じように食べちゃってた。今日は会長ちゃんに、サランのカッコいいところ見せなきゃだもんね……よ～し！」"
translation = "「아…… 안 돼, 안 돼. 맛있어서 그만 평소랑 똑같이 먹어버렸어. 오늘은 회장짱에게 사란의 멋진 모습을 보여줘야 하니까…… 좋~아!」"

[[dialogue]]
speaker = "サラン"
original = "「ぱくっ、もぐっ、はむっ♪\u3000ん～<emoji=heart04>\u3000ふわふわ～♪」"
translation = "「한 입, 우물우물, 냠냠♪ 음~<emoji=heart04> 폭신폭신해~♪」"

[[dialogue]]
speaker = "大男"
original = "（って、いきなりペースが爆上がりした！？\u3000１口で１個ずつクレープが消えていく！？\u3000どうなってるんだ！？\u3000あんな小さな体なのに、一体どこに入るんだその量！？）"
translation = "（아니, 갑자기 페이스가 폭등했어!? 한 입에 한 개씩 크레이프가 사라지고 있다고!? 어떻게 된 거야!? 저렇게 작은 몸인데 도대체 그 양이 어디로 들어가는 거지!?）"

[[dialogue]]
speaker = "大男"
original = "（俺も大食いが得意で、こういう大会で何度も優勝してきた経験があるからこそ分かる。この子は格が違い過ぎる……！\u3000くっ……ダメだ。俺じゃ勝てない……！）"
translation = "（나도 대식가에는 자신 있고, 이런 대회에서 몇 번이나 우승해 본 경험이 있기에 알 수 있다. 이 아이는 격이 너무 달라……! 큭…… 안 돼. 나로선 이길 수 없어……!）"

[[dialogue]]
speaker = "サラン"
original = "「会長ちゃん、サラン優勝したよ～♪\u3000見て～、ジャックちゃんの巨大ぬいぐるみ～♪」"
translation = "「회장짱, 사란 우승했어~♪ 봐봐~, 잭짱의 거대 인형이야~♪」"

[[dialogue]]
speaker = "unk"
original = "見てたよ。すごくカッコよかった"
translation = "보고 있었어. 정말 멋졌어"

[[dialogue]]
speaker = "サラン"
original = "「えへへ～♪\u3000……あれ？\u3000あそこにいるの、さっき大会に参加してた男の人だ～」"
translation = "「에헤헤~♪ ……어라? 저기 있는 사람, 아까 대회에 참가했던 남자분이다~」"

[[dialogue]]
speaker = "大男"
original = "「ごめんな。ぬいぐるみを取ってくるなんてカッコつけてた癖に負けちゃって……」"
translation = "「미안하다. 인형을 따다 주겠다고 큰소리쳐놓고 져버려서……」"

[[dialogue]]
speaker = "女の子"
original = "「ううん、パパ、カッコよかったよ！\u3000あのおねえさん、すごかったけど、パパだって２ばんだったもん！」"
translation = "「아니야, 아빠 멋있었어! 저 언니가 대단하긴 했지만, 아빠도 2등이었는걸!」"

[[dialogue]]
speaker = "サラン"
original = "「……あの～、ちょっといいですか？」"
translation = "「……저기~, 잠시 실례해도 될까요?」"

[[dialogue]]
speaker = "大男"
original = "「あ……キミはさっきの……」"
translation = "「아…… 너는 아까 그……」"

[[dialogue]]
speaker = "サラン"
original = "「娘ちゃん、はいこれ♪\u3000ジャックちゃんの巨大ぬいぐるみ、よかったらどうぞ～♪」"
translation = "「꼬마 아가씨, 자 여기♪ 잭짱의 거대 인형, 괜찮다면 가져가~♪」"

[[dialogue]]
speaker = "女の子"
original = "「え？\u3000おねえさん、いいの……？\u3000これ、１ばんのとくべつなものなのに……」"
translation = "「에? 언니, 괜찮아……? 이거 1등만 받는 특별한 거잖아……」"

[[dialogue]]
speaker = "サラン"
original = "「うん♪\u3000お姉ちゃんは、クレープがいっぱい食べられただけでふわふわだから、この子は娘ちゃんにあげる～♪\u3000お姉ちゃんの代わりに、可愛がってあげてくれるかな？」"
translation = "「응♪ 언니는 크레이프를 잔뜩 먹은 것만으로도 마음이 폭신폭신하니까, 이 아이는 아가씨에게 줄게~♪ 언니 대신에 예뻐해 줄 수 있을까?」"

[[dialogue]]
speaker = "女の子"
original = "「うんっ！\u3000私、大切にするね！\u3000ありがとう、おねえさん♪」"
translation = "「응! 나, 소중히 간직할게! 고마워, 언니♪」"

[[dialogue]]
speaker = "unk"
original = "サランは、同じくお礼を言うパパさんに巨大なぬいぐるみを手渡し、女の子と「ばいば～い♪」と別れの挨拶を交わしてから、戻ってくる。"
translation = "사란은 마찬가지로 감사를 표하는 아빠에게 거대한 인형을 건네주고, 소녀와 「바이바이~♪」라며 작별 인사를 나눈 뒤 돌아온다."

[[dialogue]]
speaker = "サラン"
original = "「ただいま～♪\u3000――ぽよ？\u3000ぬいぐるみ、よかったのかって？\u3000うん♪\u3000サランはあの子の笑顔が見られた方がふわふわだもん♪」"
translation = "「다녀왔어~♪ ――포요? 인형, 정말 괜찮냐고? 응♪ 사란은 저 아이의 웃는 얼굴을 보는 게 더 마음이 폭신폭신해지는걸♪」"

[[dialogue]]
speaker = "サラン"
original = "「それじゃあ、待たせちゃったけど、ハロウィンデート再開しよ～♪\u3000――行きたい場所がある？\u3000もちろんいいよ～♪\u3000どこどこ～？」"
translation = "「그럼 기다리게 했지만, 할로윈 데이트 재개하자~♪ ――가고 싶은 곳이 있어? 물론 좋지~♪ 어디 어디~?」"

[[dialogue]]
speaker = "サラン"
original = "「ここって……さっき通ったゲームセンター？\u3000――会長ちゃん、クレーンゲームをやるの？」"
translation = "「여기는…… 아까 지나쳤던 게임 센터? ――회장짱, 인형 뽑기를 하려고?」"

[[dialogue]]
speaker = "サラン"
original = "「って、え～！？\u3000数回しかやってないのに、ジャックちゃんのぬいぐるみに付いてる紐にアームを引っ掛けて……わ～、すご～い！」"
translation = "「아니, 에~!? 몇 번 하지도 않았는데 잭짱 인형에 달린 끈에 집게를 걸어서…… 와~, 대단해~!」"

[[dialogue]]
speaker = "サラン"
original = "「簡単に取れちゃった～！\u3000――ゲームセンターでバイトをしてたことがある？\u3000……えっ、ジャックちゃんのぬいぐるみ、サランにくれるの？」"
translation = "「간단하게 뽑아버렸어~! ――게임 센터에서 아르바이트를 한 적이 있다고? ……엣, 잭짱 인형, 사란에게 주는 거야?」"

[[dialogue]]
speaker = "サラン"
original = "「――大会で勝ったご褒美？\u3000わぁ～♪\u3000ありがと～、会長ちゃんっ♪」"
translation = "「――대회에서 이긴 포상? 와아~♪ 고마워~, 회장짱♪」"

[[dialogue]]
speaker = "サラン"
original = "「えへへ～♪\u3000サラン、こっちの方が嬉しい♪」"
translation = "「에헤헤~♪ 사란, 이게 더 기뻐♪」"

[[dialogue]]
speaker = "unk"
original = "そう言って、愛おしそうにぬいぐるみを抱き締めるサランなのだった。"
translation = "그렇게 말하며 사랑스럽다는 듯 인형을 껴안는 사란이었다."

