[[dialogue]]
speaker = "unk"
original = "第７話,招かれざる来訪者,B"
translation = "제7화 불청객 B"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「カオス──テンペスト！！！」"
translation = "「카오스── 템페스트!!!」"

[[dialogue]]
speaker = "unk"
original = "大群のホロウ・ルヴィネたちを、天界・魔界の増援たちに捌いてもらい、俺は『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』への攻撃に集中する。"
translation = "대군을 이룬 홀로우 루비네들을 천계와 마계의 증원군들이 상대하게 하고, 나는 『<ruby>XELOS<rt>젤로스</rt></ruby>』를 향한 공격에 집중한다."

[[dialogue]]
speaker_original = "ＸＥＬＯＳ"
speaker_translation = "제로스"
original = "「────ッ！！」"
translation = "「────윽!!」"

[[dialogue]]
speaker = "unk"
original = "真の姿を現した『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』の攻撃は、先ほどの比ではない。直撃すれば絶命は免れないことには変わりないが──"
translation = "진정한 모습을 드러낸 『<ruby>XELOS<rt>젤로스</rt></ruby>』의 공격은 아까와 비할 바가 아니다. 직격하면 목숨을 잃는 것은 변함없지만──"

[[dialogue]]
speaker_original = "メルエル（覚醒）"
speaker_translation = "메르엘 (각성)"
original = "「立朽さん！\u3000援護をお願い！！」"
translation = "「타치쿠치 씨! 원호를 부탁해!!」"

[[dialogue]]
speaker_original = "ネーゼマイン（覚醒）"
speaker_translation = "네제마인 (각성)"
original = "「お任せ！\u3000爆弾ちゃんバズーカ、ゴー♪」"
translation = "「맡겨 줘! 폭탄짱 바주카, 고─♪」"

[[dialogue]]
speaker = "unk"
original = "俺たちの心は決して折れない──！！"
translation = "우리들의 마음은 결코 꺾이지 않아──!!"

[[dialogue]]
speaker_original = "ＸＥＬＯＳ"
speaker_translation = "제로스"
original = "「────────ッ！！！！」"
translation = "「────────윽!!!!」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "（……お父様。今しばらくお待ちください。もうすぐ、最後の手駒が到着いたします……！）"
translation = "(……아버님. 조금만 더 기다려 주십시오. 곧 마지막 패가 도착할 것입니다……!)"

[[dialogue]]
speaker = "unk"
original = "一方その頃、アルタイルでは──"
translation = "한편 그 무렵, 알타이르에서는──"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「に、逃げなきゃっ……こっちだ、みんな……！！」"
translation = "「도, 도망쳐야 해…… 이쪽이야, 모두들……!!」"

[[dialogue]]
speaker = "unk"
original = "ホロウ・ルヴィネによる市街地への攻撃は苛烈を極め、同一存在がデネブに移動したことにより、アルタイルのチナたちは同時に目覚めていた。"
translation = "홀로우 루비네에 의한 시가지 공격은 가혹하기 이를 데 없었고, 동일 존재가 데네브로 이동함에 따라 알타이르의 치나 일행은 동시에 깨어났다."

[[dialogue]]
speaker = "unk"
original = "襲撃された病院から抜け出し、全員で避難をしていたのだ。"
translation = "습격당한 병원에서 빠져나와 다 함께 피난하고 있었던 것이다."

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「え、エステルちゃんでしたかっ？\u3000大丈夫です、怖くないですよ……！」"
translation = "「에, 에스텔 양이었나요? 괜찮아요, 무섭지 않아요……!」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「は、はいっ……あ、あれ？\u3000あの髪の長い子は……！？」"
translation = "「네, 넷…… 어, 어라? 저 머리 긴 아이는……!?」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「ぁ──ぅ────」"
translation = "「아── 으────」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「転んでたのかっ──アタシが行く！\u3000２人とも先に逃げろ！！」"
translation = "「넘어진 건가── 내가 갈게! 둘 다 먼저 도망쳐!!」"

[[dialogue]]
speaker = "unk"
original = "直前まで面識がなかった４人は、同じ病室で同時に目覚めてから共に行動をしていた。"
translation = "직전까지 면식이 없던 네 사람은 같은 병실에서 동시에 깨어난 뒤로 함께 행동하고 있었다."

[[dialogue]]
speaker = "unk"
original = "モンスターを従えて暴れる謎の天使から逃げ回る短い間に、幼い彼女たちには絆が芽生え始めていた。"
translation = "몬스터를 거느리고 날뛰는 의문의 천사로부터 도망치는 짧은 시간 동안 어린 그녀들에게는 유대가 싹트기 시작했다."

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「……そのヘイロー。レティシアね。そう。こちらのあなたは、まだ星力に目覚めていないようね」"
translation = "「……그 헤일로. 레티시아구나. 그래. 이곳의 당신은 아직 성력에 눈을 뜨지 않은 모양이네」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「あ、ぁ……！？」"
translation = "「아, 아……!?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「レティシア！\u3000行くぞ、立てるか！？」"
translation = "「레티시아! 가자, 일어설 수 있겠어!?」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「魂を回収してあげましょう。大丈夫、じっとしていれば一瞬で終わるから」"
translation = "「영혼을 회수해 드리지요. 괜찮아요, 가만히 있으면 순식간에 끝날 테니까」"

[[dialogue]]
speaker_original = "？？？"
speaker_translation = "？？？"
original = "「──トルネードランスッ！！」"
translation = "「── 토네이도 랜스!!」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネL"
speaker_translation = "할로우 루비네 L"
original = "「ッ──！？\u3000お前は……なんだ、<b>あがり</b>も間近。脅威ですらない、出涸らしの星騎士ね」"
translation = "「윽──!? 너는…… 뭐야, <b>은퇴</b>를 앞둔. 위협조차 되지 못하는 찌꺼기 성기사군」"

[[dialogue]]
speaker_original = "チナの父"
speaker_translation = "치나의 아버지"
original = "「チナ！\u3000友達を連れて、逃げるんだ！」"
translation = "「치나! 친구들을 데리고 도망치렴!」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「おとうさん！？\u3000で、でも──！」"
translation = "「아빠!? 하, 하지만──!」"

[[dialogue]]
speaker_original = "チナの父"
speaker_translation = "치나의 아버지"
original = "「守りながら戦える相手じゃない──早く行きなさい！！」"
translation = "「지키면서 싸울 수 있는 상대가 아니다── 어서 가거라!!」"

[[dialogue]]
speaker_original = "チナの父"
speaker_translation = "치나의 아버지"
original = "（負けるわけにはいかない……チナを何としても守らなくては──！！）"
translation = "(질 수는 없다…… 치나를 어떻게 해서든 지켜내야만 해──!!)"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "（不思議ね、この男。戦闘経験の豊富な星騎士に見える……私に勝てないことくらい承知しているはずなのに……）"
translation = "(이상하네, 이 남자. 전투 경험이 풍부한 성기사로 보여…… 나를 이길 수 없다는 것쯤은 알고 있을 텐데……)"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "（愛しい娘を守るために、捨て身で我が子を守ろうとしている……？）"
translation = "(사랑하는 딸을 지키기 위해, 목숨을 내걸고 제 자식을 지키려 하고 있어……?)"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネL"
speaker_translation = "할로우 루비네 L"
original = "（なるほど────<b>使えそうね</b>）"
translation = "(과연── <b>써먹을 수 있겠는걸</b>)"

[[dialogue]]
speaker_original = "チナの父"
speaker_translation = "치나의 아버지"
original = "「──カラミティ・バスターッ！！」"
translation = "「── 칼라미티 버스터!!」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「……弱すぎる。無駄な抵抗、ご苦労様」"
translation = "「……너무 약해. 헛된 저항, 수고하셨어요」"

[[dialogue]]
speaker_original = "チナの父"
speaker_translation = "치나의 아버지"
original = "「無敵か……こいつは──！？」"
translation = "「무적인가…… 이 녀석은──!?」"

[[dialogue]]
speaker_original = "チナの父"
speaker_translation = "치나의 아버지"
original = "「──ぐぁあぁああッ！？」"
translation = "「── 구아아아악!?」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「戦闘服の維持もできなくなったようね。それでも、まだ我が子を庇うために立ち上がるだなんて……ふふ」"
translation = "「전투복 유지조차 불가능해진 모양이네. 그런데도 아직 제 자식을 감싸기 위해 일어서다니…… 후후」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「お、おとうさんっ！」"
translation = "「아, 아빠!」"

[[dialogue]]
speaker_original = "チナの父"
speaker_translation = "치나의 아버지"
original = "「まだ、いたのか……！？\u3000早く離れなさい！！」"
translation = "「아직 있었느냐……!? 어서 떨어지거라!!」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「いやだ！\u3000おとうさんが死んじゃう……！\u3000いやだっ！！」"
translation = "「싫어! 아빠가 죽어버려……! 싫단 말이야!!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「どっりゃああぁああっ──！」"
translation = "「이얏──!」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネL"
speaker_translation = "할로우 루비네 L"
original = "「チッ──学園に釘付けにしていたはずなのに。向こうの私は何をしているの！？」"
translation = "「쳇── 학원에 묶어두었을 텐데. 저쪽의 나는 뭘 하고 있는 거야!?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「とっくに片付けてやったよ！\u3000今のあたしを止めたきゃ、あの倍は連れてこい！！」"
translation = "「진작에 정리해 줬다구! 지금의 나를 막고 싶으면 저것의 배는 더 데려와!!」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「香堂様、よくぞ耐えてくれました。ここは私共にお任せください」"
translation = "「코도 님, 잘 버텨주셨습니다. 여기는 저희에게 맡겨 주십시오」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「アポロ様の持久力は、私が補います！\u3000癒しの力を！」"
translation = "「아폴로 님의 지구력은 제가 보충하겠습니다! 치유의 힘을!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「恩に着るぞ、トリュファイナ！\u3000いっくぜー！」"
translation = "「신세 좀 질게, 트리파이나! 간다─!」"

[[dialogue]]
speaker = "unk"
original = "頼もしい増援はアポロたちだけではない。チナが顔を上げると、新星学園の星騎士たち──"
translation = "든든한 증원군은 아폴로 일행뿐만이 아니었다. 치나가 고개를 들자 신성학원의 성기사들──"

[[dialogue]]
speaker = "unk"
original = "そして流星学園の星騎士たち。"
translation = "그리고 유성학원의 성기사들."

[[dialogue]]
speaker = "unk"
original = "その中には、フィオナが平行世界を渡る前に、黄金の魔導書を用いて覚醒させていた、神霊猫ニャメニア・ワールフリオンの姿もあった。"
translation = "그중에는 피오나가 평행세계를 건너기 전, 황금의 마도서를 이용해 각성시켰던 신령묘 냐메니아 와르프리온의 모습도 있었다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「わぁああ……！」"
translation = "「와아아아……!」"

[[dialogue]]
speaker = "unk"
original = "そして幼いチナの視線は、父親の危機を救ってくれた星騎士に釘付けになる。"
translation = "그리고 어린 치나의 시선은 아버지의 위기를 구해준 성기사에게 못 박힌다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「……あのお姉さんは？」"
translation = "「……저 언니는요?」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「あの御方は……そうですね。正義のヒーロー──流星ライダー、アポロ様です」"
translation = "「저 분은…… 그렇군요. 정의의 히어로── 유성 라이더, 아폴로 님입니다」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「流星ライダー……ヒーロー！？」"
translation = "「유성 라이더…… 히어로!?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「行くぞ複製体っ──手加減なしだ！\u3000パーフェクト・ワールドッ！！」"
translation = "「간다 복제체── 봐주지 않겠다! 퍼펙트 월드!!」"

[[dialogue]]
speaker = "unk"
original = "アルタイルでも、多くの星騎士たちが刻を稼ぎ続けていた──"
translation = "알타이르에서도 많은 성기사가 시간을 계속 벌고 있었다──"

[[dialogue]]
speaker = "unk"
original = "一方、デネブ──"
translation = "한편, 데네브──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（善戦しているのは間違いない……けれどっ！）"
translation = "(선전하고 있는 것은 틀림없어…… 하지만!)"

[[dialogue]]
speaker_original = "神族の星騎士"
speaker_translation = "신족 성기사"
original = "「きゃああぁぁあっ！？」"
translation = "「꺄아아악!?」"

[[dialogue]]
speaker = "unk"
original = "拮抗していたのは、つい先ほどまで。とうとう押し返され始めた……！"
translation = "팽팽했던 것은 방금 전까지. 드디어 밀리기 시작했다……!"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネL"
speaker_translation = "할로우 루비네 L"
original = "「お父様は一度対応された攻撃は決して繰り返さない。その粘り、いつまでも持つかしら？」"
translation = "「아버님은 한 번 대응한 공격은 결코 반복하지 않아. 그 끈기, 언제까지 버틸 수 있을까?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「くそ……『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』の底は、限界はどこにある！？\u3000このままでは……！！」"
translation = "「젠장…… 『<ruby>XELOS<rt>젤로스</rt></ruby>』의 끝은, 한계는 어디에 있는 거지!? 이대로라면……!!」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「無敵、無限、無尽蔵……そんなものを認めたくはないが──くっ！？」"
translation = "「무적, 무한, 무궁무진…… 그런 것을 인정하고 싶지는 않지만── 큭!?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「魔王。どこかで勝負に出る必要があるわ……時が経てば経つほど、こちらは不利になっていく……！」"
translation = "「마왕. 어디선가 승부수를 던질 필요가 있어…… 시간이 흐르면 흐를수록 이쪽이 불리해져……!」"

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「応援に来てくれたみんなが、ホロウを抑えてくれてるけど……！！」"
translation = "「응원하러 와 준 모두가 홀로우를 억제해 주고 있지만……!!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ、わかってる……どうにかして隙を──」"
translation = "「아아, 알고 있어…… 어떻게든 틈을──」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「──ふふふふふっ」"
translation = "「── 후후후후후」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……！？」"
translation = "「……!?」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「──待ち侘びたわ、この時を。ようやく解放させることができた……」"
translation = "「── 애타게 기다렸어, 이 순간을. 드디어 해방시킬 수 있게 되었네……」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「──まさか！？」"
translation = "「── 설마!?」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネL"
speaker_translation = "할로우 루비네 L"
original = "「お帰りなさい──厄災の右腕」"
translation = "「어서 와── 액운의 오른팔」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「……やはり戻ってきたか、厄災！\u3000妾のものにできぬならば、滅しきるまでよ！！」"
translation = "「……역시 돌아왔는가, 액운! 첩의 것으로 만들 수 없다면 멸할 때까지다!!」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「やってみるといいわ……可能ならばね？」"
translation = "「해 볼 수 있으면 해 보렴…… 가능하다면 말이야?」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネL"
speaker_translation = "할로우 루비네 L"
original = "「さぁ緋宮クロト……お前はこの盤面を、どうひっくり返してくれるのかしら？」"
translation = "「자 히노미야 쿠로토…… 너는 이 국면을 어떻게 뒤집어 줄까?」"

