[[dialogue]]
speaker = "unk"
original = "第４話,ラファエロの素顔？,P"
translation = "제4화, 라파엘로의 본모습?"

[[dialogue]]
speaker = "unk"
original = "ＳＮＳアカウントは抹消したものの、そこにいるだけで圧倒的な存在感を放つラファエロは、相変わらずの人気者ぶりだった。"
translation = "SNS 계정은 말소했지만 그곳에 있는 것만으로도 압도적인 존재감을 뿜어내는 라파엘로는 여전히 인기 있는 모습이었다."

[[dialogue]]
speaker = "unk"
original = "しかし、彼女が元の世界へ戻る時は確実に近づいている。"
translation = "하지만 그녀가 원래 세계로 돌아갈 때는 확실히 다가오고 있다."

[[dialogue]]
speaker = "ラファエロ"
original = "「ふむ。さすがはぼく、ＳＮＳをやめても人気は相変わらずだ」"
translation = "「흠. 역시 나답게 SNS를 그만둬도 인기는 여전하군」"

[[dialogue]]
speaker = "ラファエロ"
original = "「街を歩けば声をかけられ、握手やサインを求められる。向こうと変わらない人気者の証明だね」"
translation = "「거리를 걸으면 말을 걸어오고 악수나 사인을 요구받아. 저쪽과 다름없는 인기인의 증명이네」"

[[dialogue]]
speaker = "ラファエロ"
original = "「……うん、悪い気はしない」"
translation = "「……응, 나쁜 기분은 아니야」"

[[dialogue]]
speaker = "ラファエロ"
original = "「ぼくを慕ってくれる人がたくさんいるのは正直嬉しい。この地から離れるのが名残惜しくなってしまうくらいにね……」"
translation = "「나를 아껴주는 사람이 많다는 건 솔직히 기뻐. 이 땅을 떠나는 게 아쉬워질 정도로 말이야……」"

[[dialogue]]
speaker = "ラファエロ"
original = "「……彼らがぼくにＳＮＳをやめさせたのは、そういう理由もあったのかな？\u3000心遣いに感謝しないとね」"
translation = "「……그들이 내게 SNS를 그만두게 한 건 그런 이유도 있었던 걸까? 배려에 감사해야겠네」"

[[dialogue]]
speaker = "ラファエロ"
original = "「ぼくはもうすぐ元いた場所に帰るけれど……その前にひとつ、作品を残していこうかな」"
translation = "「나는 곧 원래 있던 곳으로 돌아가지만…… 그전에 작품을 하나 남기고 갈까 해」"

[[dialogue]]
speaker = "ラファエロ"
original = "「ぼくの存在がこの世界から失われたとしても──誰もがぼくを忘れられなくなるような、とびっきりの」"
translation = "「나의 존재가 이 세계에서 사라진다 해도── 누구나 나를 잊을 수 없게 될 만한 아주 특별한 것을」"

[[dialogue]]
speaker = "ラファエロ"
original = "「流星市国にぼくという天才、ラファエロ・サーラが存在していた証を！」"
translation = "「유성시국에 나라는 천재, 라파엘로 사라가 존재했다는 증거를!」"

[[dialogue]]
speaker = "unk"
original = "俺とルリエルが大聖堂を訪れると、ラファエロがいつになく真剣な眼差しで、一心不乱に手を動かしていた。"
translation = "나와 루리엘이 대성당을 방문하자 라파엘로가 여느 때와 달리 진지한 눈빛으로 일심불란하게 손을 움직이고 있었다."

[[dialogue]]
speaker = "ルリエル"
original = "「ラファエロさん、何してるん──わ、紙がいっぱいなのです！」"
translation = "「라파엘로 씨, 뭐 하고 있── 와, 종이가 가득해요!」"

[[dialogue]]
speaker = "ラファエロ"
original = "「おっと、きみたちか。ぼくに会いに来てくれたのかい？」"
translation = "「오호, 너희들이구나. 나를 만나러 와 준 거니?」"

[[dialogue]]
speaker = "unk"
original = "この大量の紙は……？"
translation = "이 대량의 종이는……?"

[[dialogue]]
speaker = "ラファエロ"
original = "「ああ、これか。サプライズにしようと思っていたんだけど、これだけ広げていたらサプライズにはならないか」"
translation = "「아아, 이거? 서프라이즈로 하려고 했는데 이렇게 펼쳐놓고 있으면 서프라이즈가 안 되겠네」"

[[dialogue]]
speaker = "ラファエロ"
original = "「この紙束は見ての通りのドローイング。線画だよ」"
translation = "「이 종이 뭉치는 보다시피 드로잉이야. 선화지」"

[[dialogue]]
speaker = "ルリエル"
original = "「ドローイング、ですかぁ。あ。この絵は美味しそうなサンドイッチ、こっちは学園の校舎ですね！」"
translation = "「드로잉이군요~. 아, 이 그림은 맛있어 보이는 샌드위치, 이쪽은 학원 교사네요!」"

[[dialogue]]
speaker = "ルリエル"
original = "「こっちは会長さんとルリエルなのです。あ、流星学園や新星学園のみんなもいます！\u3000みんなそっくりなのです！」"
translation = "「이쪽은 회장님과 루리엘이에요. 아, 유성학원이나 신성학원 친구들도 있어요! 다들 똑 닮았어요!」"

[[dialogue]]
speaker = "ラファエロ"
original = "「こちらの世界で見てきたもの、出会ったもの、楽しかったものを片っ端から描き留めていたのさ。ここぞという時の作品の着想を得るためにね」"
translation = "「이쪽 세계에서 봐온 것, 만난 것, 즐거웠던 것을 닥치는 대로 그려두고 있었어. 중요한 순간에 작품의 착상을 얻기 위해서 말이야」"

[[dialogue]]
speaker = "ルリエル"
original = "「はわ～……ちゃんと準備されるんですね～……」"
translation = "「하와~…… 제대로 준비하시는군요~……」"

[[dialogue]]
speaker = "ルリエル"
original = "「しかも、このドローイングだけでもとってもお上手なのです。ルリエルが一生かかっても真似できる気がしません……」"
translation = "「게다가 이 드로잉만으로도 정말 솜씨가 좋으세요. 루리엘이 평생을 가도 흉내 낼 수 있을 것 같지 않아요……」"

[[dialogue]]
speaker = "unk"
original = "藝術家ってすごい……！"
translation = "예술가란 대단해……!"

[[dialogue]]
speaker = "ラファエロ"
original = "「感心するのはまだ早いよ。ぼくの作品はこれから出来上がるんだからね」"
translation = "「감탄하기엔 아직 일러. 나의 작품은 이제부터 완성될 거니까」"

[[dialogue]]
speaker = "ルリエル"
original = "「ラファエロさん、このバラバラのドローイングからは何を作っているのか、まったく想像できないのですが……何を描くつもりなのですか？」"
translation = "「라파엘로 씨, 이 뿔뿔이 흩어진 드로잉으로는 무엇을 만들고 계신 건지 전혀 상상이 안 가는데요…… 무엇을 그릴 생각이신가요?」"

[[dialogue]]
speaker = "ラファエロ"
original = "「それはまだ秘密だよ。完成をお楽しみに」"
translation = "「그건 아직 비밀이야. 완성을 기대해 줘」"

[[dialogue]]
speaker = "ルリエル"
original = "「早く見てみたいのです！\u3000わくわく！」"
translation = "「빨리 보고 싶어요! 두근두근!」"

[[dialogue]]
speaker = "ラファエロ"
original = "「ありがとう。天才として、その期待には応えなければいけないね」"
translation = "「고마워. 천재로서 그 기대에는 부응해야겠지」"

[[dialogue]]
speaker = "unk"
original = "だけどラファエロはいずれ元の世界に……"
translation = "하지만 라파엘로는 머지않아 원래 세계로……"

[[dialogue]]
speaker = "ルリエル"
original = "「あ……」"
translation = "「아……」"

[[dialogue]]
speaker = "ラファエロ"
original = "「もともと、ぼくは異邦人さ。いるべきでない者が消えるだけ。気にすることはないよ」"
translation = "「원래 나는 이방인이야. 있어야 할 곳에 있지 않은 자가 사라질 뿐. 신경 쓸 것 없어」"

[[dialogue]]
speaker = "ラファエロ"
original = "「それでも、自分のいた世界に足跡を残したいと思ってしまう。ちょっとしたわがままに付き合ってほしいな」"
translation = "「그래도 자신이 있던 세계에 발자취를 남기고 싶다고 생각하게 돼. 조금 이기적인 부탁을 들어줬으면 좋겠어」"

[[dialogue]]
speaker = "unk"
original = "それはわがままじゃないと思う"
translation = "그건 이기적인 게 아니라고 생각해"

[[dialogue]]
speaker = "ラファエロ"
original = "「──そうか。そうだね。言い換えよう」"
translation = "「──그런가. 그렇네. 말을 바꾸지」"

[[dialogue]]
speaker = "ラファエロ"
original = "「この世界に作品を残したい──これは藝術家としてのサガなのさ」"
translation = "「이 세계에 작품을 남기고 싶다── 이것은 예술가로서의 사가야」"

[[dialogue]]
speaker = "ラファエロ"
original = "「ぼくがここで生きていた証を、きみたちに見届けてほしい」"
translation = "「내가 여기서 살아있었다는 증거를 너희가 지켜봐 줬으면 좋겠어」"

[[dialogue]]
speaker = "ルリエル"
original = "「もちろんです！」"
translation = "「물론이죠!」"

[[dialogue]]
speaker = "ラファエロ"
original = "「──とはいえ、天才たるぼくの大作だからね。一朝一夕にできあがるものではない」"
translation = "「──그렇다고는 해도 천재인 나의 대작이니까 말이야. 하루아침에 완성되는 게 아니야」"

[[dialogue]]
speaker = "ラファエロ"
original = "「もうしばらく、こちらにお邪魔させてもらうとするよ。最高の作品を作り上げると、きみたちの女神様にも誓おう」"
translation = "「조금만 더 이곳에 신세를 지도록 하지. 최고의 작품을 만들어내겠다고 너희의 여신님께도 맹세할게」"

[[dialogue]]
speaker = "ラファエロ"
original = "「期待は決して裏切らない──いや、軽く飛び越えてみせるとも！」"
translation = "「기대는 결코 저버리지 않아── 아니, 가볍게 뛰어넘어 보이겠어!」"

[[dialogue]]
speaker = "unk"
original = "あれからしばくして、ベア子たちから連絡がきた翌日の早朝──"
translation = "그로부터 얼마 후, 베아코 일행에게 연락이 온 다음 날 이른 아침──"

[[dialogue]]
speaker = "unk"
original = "どうやら徹夜をしていた様子のラファエロが、星徒会室を訪ねてきた。"
translation = "아무래도 밤을 새운 듯한 모습의 라파엘로가 성도회실을 찾아왔다."

[[dialogue]]
speaker = "ラファエロ"
original = "「ぼくが手掛けていた作品が完成したんだ。大聖堂に置かせてもらっているから、後で見に行ってくれるかい？」"
translation = "「내가 공들인 작품이 완성됐어. 대성당에 두었으니 나중에 보러 와 주겠니?」"

[[dialogue]]
speaker = "unk"
original = "ああ、絶対に見に行くよ"
translation = "응, 꼭 보러 갈게"

[[dialogue]]
speaker = "ラファエロ"
original = "「ベア子たちから連絡も来たし、作品も完成したし、そろそろお別れの時間かな」"
translation = "「베아코 일행에게 연락도 왔고 작품도 완성됐으니 슬슬 작별의 시간인가 보네」"

[[dialogue]]
speaker = "ラファエロ"
original = "「きみたちもぼくにとって大切な人となったけど、向こうにもかけがえのない人たちがいるからね」"
translation = "「너희도 내게 소중한 사람이 되었지만 저쪽에도 소중한 사람들이 있으니까」"

[[dialogue]]
speaker = "ラファエロ"
original = "「首を長くして、ぼくの帰りを待っているだろうし……これ以上長居していたら、こちらの世界が愛おしくなって、もっと離れ難くなってしまうからね」"
translation = "「목을 길게 빼고 나의 귀환을 기다리고 있을 테고…… 이 이상 오래 머물렀다가는 이 세계가 사랑스러워져서 더 떠나기 힘들어질 것 같으니까」"

[[dialogue]]
speaker = "ラファエロ"
original = "「短い間だったけど、きみたちと過ごした日々は忘れないよ」"
translation = "「짧은 시간이었지만 너희와 보낸 나날은 잊지 않을게」"

[[dialogue]]
speaker = "unk"
original = "ありがとう、ラファエロ"
translation = "고마워, 라파엘로"

[[dialogue]]
speaker = "ラファエロ"
original = "「さようならは言わないよ。また会おう。そして──」"
translation = "「안녕이라는 말은 하지 않을게. 또 만나자. 그리고──」"

[[dialogue]]
speaker = "ラファエロ"
original = "「──ありがとう、勇ましき星騎士たち！」"
translation = "「──고맙다, 용맹한 성기사들이여!」"

[[dialogue]]
speaker = "unk"
original = "そしてラファエロたち異世界からの来訪者は、元の世界へと帰っていった。"
translation = "그리고 라파엘로 일행 이세계에서의 방문자들은 원래 세계로 돌아갔다."

[[dialogue]]
speaker = "unk"
original = "大聖堂には１枚の絵画が掲げられている。"
translation = "대성당에는 한 폭의 회화가 걸려 있다."

[[dialogue]]
speaker = "unk"
original = "題は『悪しきを倒す星騎士』。"
translation = "제목은 『악을 물리치는 성기사』."

[[dialogue]]
speaker = "unk"
original = "アテネスからやってきた天才藝術家は、宣言通りに大きな足跡を残していったのだった。"
translation = "아테네스에서 온 천재 예술가는 선언대로 커다란 발자취를 남기고 떠난 것이었다."

