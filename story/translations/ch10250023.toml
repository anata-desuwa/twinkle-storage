[[dialogue]]
speaker = "unk"
original = "第３話,舞亜の特製手料理,P"
translation = "제3화, 마이아의 특제 손요리"

[[dialogue]]
speaker = "舞亜"
original = "「ふ～んふふ～んふふ～ん♪」"
translation = "「흠~흠흠~흠흠~♪」"

[[dialogue]]
speaker = "unk"
original = "鼻歌を歌いながら、俺のために料理を作ってくれる舞亜。"
translation = "콧노래를 부르며, 나를 위해 요리를 만들어 주는 마이아."

[[dialogue]]
speaker = "unk"
original = "いったいどんな料理を作ってくれるんだろう……？"
translation = "도대체 어떤 요리를 만들어 주는 걸까……?"

[[dialogue]]
speaker = "舞亜"
original = "「は～い、お待たせ。野菜たっぷりミネストローネと、卵たっぷりのオムライスだよ」"
translation = "「자, 오래 기다렸지. 채소 듬뿍 미네스트로네랑, 계란 듬뿍 오므라이스야」"

[[dialogue]]
speaker = "unk"
original = "（思ってたより普通だ……！）"
translation = "（생각보다 평범해……!）"

[[dialogue]]
speaker = "舞亜"
original = "「あ～、思ったより普通だって顔してる。会長さんってば失礼なんだから」"
translation = "「아~, 생각보다 평범하다는 얼굴 하고 있어. 회장님도 참 무례하다니까」"

[[dialogue]]
speaker = "舞亜"
original = "「はい、おまちどうさま。そうそう、オムライスにはケチャップでハートとメッセージ書かなきゃ。『Ｉ\u3000Ｌｏｖｅ\u3000Ｙｏｕ』……っと」"
translation = "「자, 여기요. 맞아 맞아, 오므라이스에는 케첩으로 하트랑 메시지를 써야지. 『I Love You』……라고」"

[[dialogue]]
speaker = "舞亜"
original = "「あ、失敗しちゃった。なんか血塗れみたいだけど、食べたら同じだしいいよね。さ、召し上がれ」"
translation = "「아, 실패했다. 왠지 피투성이 같지만, 먹으면 똑같으니까 괜찮지. 자, 드세요」"

[[dialogue]]
speaker = "舞亜"
original = "「……どう？\u3000美味しい？」"
translation = "「……어때? 맛있어?」"

[[dialogue]]
speaker = "舞亜"
original = "「……素材の味が活きてて美味しい？\u3000そっか、会長さんの口に合って良かった」"
translation = "「……소재의 맛이 살아있어서 맛있어? 그렇구나, 회장님 입맛에 맞아서 다행이다」"

[[dialogue]]
speaker = "舞亜"
original = "「料理できるって言った手前、微妙って言われたらどうしようって、内心緊張してたんだから。私の好みだと薄味になりがちだしね」"
translation = "「요리할 줄 안다고 말해둔 터라, 미묘하다는 소리 들으면 어쩌나 내심 긴장했거든. 내 취향대로라면 싱거워지기 십상이고 말이야」"

[[dialogue]]
speaker = "舞亜"
original = "「でもオムライスはご飯が少ない……？\u3000あ、バレたか。糖質抑えるために、ご飯が少ないんだよね」"
translation = "「하지만 오므라이스는 밥이 적어……? 아, 들켰나. 당질을 억제하기 위해서 밥이 적은 거야」"

[[dialogue]]
speaker = "舞亜"
original = "「卵たっぷりなんじゃなくて、ご飯２割、卵８割の詐欺オムライス。ま、でも味はいけるでしょ？\u3000オムライス失敗するとかっこ悪いから練習したもん」"
translation = "「계란 듬뿍인 게 아니라, 밥 2할, 계란 8할인 사기 오므라이스. 뭐, 그래도 맛은 괜찮지? 오므라이스 실패하면 꼴사나우니까 연습했단 말이야」"

[[dialogue]]
speaker = "unk"
original = "俺のためにありがとう、舞亜"
translation = "나를 위해 고마워, 마이아"

[[dialogue]]
speaker = "舞亜"
original = "「そうそう、そういう言葉が欲しかったの。トップスケーターとか世界一とか言われたって、私も女の子なんだから」"
translation = "「그래 그래, 그런 말이 듣고 싶었어. 톱 스케이터니 세계 제일이니 들어봤자, 나도 여자애니까」"

[[dialogue]]
speaker = "舞亜"
original = "「じゃ、あれやろうよ、あれ」"
translation = "「자, 그거 하자, 그거」"

[[dialogue]]
speaker = "舞亜"
original = "「何かわからないって顔してるね。恋人同士で、食事中にやることと言えば決まってるでしょ？\u3000あ～んだよ、あ～ん」"
translation = "「무슨 소린지 모르겠다는 얼굴이네. 연인끼리 식사 중에 하는 일이라고 하면 정해져 있잖아? 아~앙이야, 아~앙」"

[[dialogue]]
speaker = "舞亜"
original = "「あ～んするために会長さんのおうちに来たまであるからね。それじゃいくよ」"
translation = "「아~앙 해주려고 회장님 집에 온 거나 마찬가지니까 말이야. 그럼 간다」"

[[dialogue]]
speaker = "舞亜"
original = "「はい、あ～ん<emoji=heart04>」"
translation = "「자, 아~앙<emoji=heart04>」"

[[dialogue]]
speaker = "舞亜"
original = "「……美味しい？」"
translation = "「……맛있어?」"

[[dialogue]]
speaker = "unk"
original = "とっても美味しい"
translation = "정말 맛있어"

[[dialogue]]
speaker = "舞亜"
original = "「ありがと。彼氏さんがそう言ってくれると、作った甲斐があるね」"
translation = "「고마워. 남자친구님이 그렇게 말해주니, 만든 보람이 있네」"

[[dialogue]]
speaker = "舞亜"
original = "「じゃあ、会長さんからあーんってして？\u3000あ～～んっ……うん、美味しい。作ったの私だけど♪」"
translation = "「그럼, 회장님이 아앙 해줘? 아~~앙…… 응, 맛있어. 만든 건 나지만♪」"

[[dialogue]]
speaker = "舞亜"
original = "「それにしても……フィギュアの大会で優勝する自分は想像できても、好きな人のためにご飯を作ってあげる自分なんて、少し前じゃ想像できなかったなぁ……」"
translation = "「그나저나…… 피겨 대회에서 우승하는 자신은 상상할 수 있어도, 좋아하는 사람을 위해 밥을 차려주는 자신이라니, 조금 전까지만 해도 상상도 못 했었는데 말이야……」"

[[dialogue]]
speaker = "舞亜"
original = "「ちゃんと料理ができる子で良かった。ふふふ」"
translation = "「제대로 요리할 줄 아는 애라서 다행이다. 후후후」"

[[dialogue]]
speaker = "舞亜"
original = "「ところで会長さんにプレゼントがあるんだ。はい」"
translation = "「그런데 회장님에게 줄 선물이 있어. 자」"

[[dialogue]]
speaker = "unk"
original = "これは……『阿』と『吽』のＴシャツ……？"
translation = "이건…… 『아(阿)』와 『훔(吽)』이 적힌 T셔츠……?"

[[dialogue]]
speaker = "舞亜"
original = "「うん、白地のシャツに『<ruby>阿<rt>あ</rt></ruby>』と『<ruby>吽<rt>うん</rt></ruby>』の文字がどーんって書いてあって、かっこいいよね」"
translation = "「응, 흰색 셔츠에 『아』랑 『훔』 글자가 큼지막하게 써져 있어서 멋있지」"

[[dialogue]]
speaker = "舞亜"
original = "「会長さんが『阿』を着て、私が『吽』を着たら、これ以上ないペアルックだよ」"
translation = "「회장님이 『아』를 입고, 내가 『훔』을 입으면, 이보다 더 좋을 수 없는 커플룩이야」"

[[dialogue]]
speaker = "unk"
original = "（独特なセンスだ……！）"
translation = "（독특한 센스다……!）"

[[dialogue]]
speaker = "舞亜"
original = "「でも……ごめんね？\u3000恋人がいるって言っちゃったから、会長さんに迷惑かけちゃうかも」"
translation = "「하지만…… 미안해? 애인이 있다고 말해버려서, 회장님에게 폐를 끼칠지도 몰라.」"

[[dialogue]]
speaker = "舞亜"
original = "「私は慣れっこだけど、会長さんに取材やマスコミが来ちゃうかも。変なおっかけも付くかもしれない」"
translation = "「나는 익숙하지만, 회장님에게 취재진이나 매스컴이 몰려올지도 몰라. 이상한 스토커가 붙을지도 모르고.」"

[[dialogue]]
speaker = "舞亜"
original = "「もし会長さんの邪魔になるなら、その時は──」"
translation = "「만약 회장님에게 방해가 된다면, 그때는──」"

[[dialogue]]
speaker = "unk"
original = "それくらいどんと来いだよ"
translation = "그 정도는 얼마든지 와보라지."

[[dialogue]]
speaker = "舞亜"
original = "「……モンスターに比べれば大したことない？\u3000さすが会長さん、頼もしいね」"
translation = "「……몬스터에 비하면 별거 아니라고? 역시 회장님, 든든하네.」"

[[dialogue]]
speaker = "舞亜"
original = "「そうだね、星徒会長っていえば世界最強の星騎士なんだから、それくらいどうってことないよね」"
translation = "「그렇네, 성도회장이라고 하면 세계 최강의 성기사니까, 그 정도는 아무것도 아니겠지.」"

[[dialogue]]
speaker = "舞亜"
original = "「そう言えるのかっこいいな。もっと早く恋人がいるって言えばよかったかも」"
translation = "「그렇게 말해주니 멋있다. 좀 더 빨리 애인이 있다고 말할걸 그랬나 봐.」"

[[dialogue]]
speaker = "舞亜"
original = "「さっき言いかけたことは忘れて。会長さんには余計な話だったから」"
translation = "「방금 하려던 말은 잊어줘. 회장님에겐 쓸데없는 소리였으니까.」"

[[dialogue]]
speaker = "舞亜"
original = "「あ、そうだ。最後に食後のデザート、いる？」"
translation = "「아, 맞다. 마지막으로 식후 디저트, 먹을래?」"

[[dialogue]]
speaker = "unk"
original = "カロリーは控えてるんじゃ？"
translation = "칼로리는 조절하고 있는 거 아니었어?"

[[dialogue]]
speaker = "舞亜"
original = "「大丈夫、ゼロカロリーだから。いくら食べても太らない、とびっきり甘いデザートだよ」"
translation = "「괜찮아, 제로 칼로리니까. 아무리 먹어도 살찌지 않는, 아주아주 달콤한 디저트야.」"

[[dialogue]]
speaker = "舞亜"
original = "「そんな魔法みたいなデザートあるのかって？\u3000あるんだな、これが。じゃあいくよ──」"
translation = "「그런 마법 같은 디저트가 있냐고? 있단다, 이게. 자, 간다──」"

[[dialogue]]
speaker = "舞亜"
original = "「ちゅっ<emoji=heart04>」"
translation = "「쪽<emoji=heart04>」"

[[dialogue]]
speaker = "舞亜"
original = "「んちゅっ<emoji=heart04>\u3000ちゅ……ちゅ……ちゅ、ちゅっ<emoji=heart04>」"
translation = "「음쫍<emoji=heart04> 츄…… 츄…… 츄, 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "何度もキスを重ね、舞亜のふわふわの唇を味わう。"
translation = "몇 번이고 입을 맞추며, 마이아의 폭신폭신한 입술을 맛본다."

[[dialogue]]
speaker = "unk"
original = "食後のキスは、甘酸っぱいケチャップの味がした。"
translation = "식후의 키스는, 새콤달콤한 케첩 맛이 났다."

