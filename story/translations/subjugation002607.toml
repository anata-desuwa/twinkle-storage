[[dialogue]]
speaker = "ヴィーナス"
original = "「──話は聞かせてもらったわ！」"
translation = "「──이야기는 다 들었어!」"

[[dialogue]]
speaker = "ヘレナ"
original = "「む──ヴィーナス？」"
translation = "「음── 비너스?」"

[[dialogue]]
speaker = "閃"
original = "「お、お嬢様」"
translation = "「아, 아가씨.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「この時間はまだ学園にいると思っていたが……他の面々も合わせ、どうやら私のことを嗅ぎつけてきたようだな」"
translation = "「이 시간에는 아직 학원에 있을 거라 생각했다만…… 다른 면면들까지 합세해서 아무래도 내 뒤를 캐러 온 모양이군.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「インボーは全部聞いたわよ、ヘレナちゃん！\u3000あの水着コンテストは新ブランドのＰＲにするつもりだったのね！」"
translation = "「음모는 전부 들었어, 헬레나 짱! 그 수영복 콘테스트는 신규 브랜드의 PR로 삼을 생각이었지!」"

[[dialogue]]
speaker = "アナ"
original = "「だからトリシャさんはあんな大胆な水着を……！」"
translation = "「그래서 트리샤 씨에게 그런 대담한 수영복을……!」"

[[dialogue]]
speaker = "トリシャ"
original = "「ヘレナさんからあちらを着るよう頼まれました……可愛かったので、特に断る理由もなく……フフ、初水着にしては、大胆だったみたいです」"
translation = "「헬레나 씨에게 저걸 입어달라는 부탁을 받았습니다…… 귀여워서 딱히 거절할 이유도 없었고…… 후후, 첫 수영복치고는 대담했던 모양이네요.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「何。もとより夏シーズンには水着を手掛けようと思っていたものでな、ちょうどタイミングが噛み合ったまで」"
translation = "「뭐냐. 원래부터 여름 시즌에는 수영복을 다룰 생각이었는데 마침 타이밍이 맞아떨어졌을 뿐이다.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「私はあくまでリゾートに人を招きたいというリップルの気持ちに共感しただけだ」"
translation = "「나는 어디까지나 리조트에 사람을 초대하고 싶다는 리플의 마음에 공감했을 뿐이라고.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「それにイベントの運営資金はすべて私が出資している。何を後ろめたいことがある？」"
translation = "「게다가 이벤트 운영 자금은 전부 내가 출자했다. 켕길 게 무엇이 있지?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そうかもしれないけど──リップルに本当の狙いを隠して進めるのは違うでしょ！」"
translation = "「그럴지도 모르지만── 리플에게 진짜 목적을 숨기고 진행하는 건 아니지!」"

[[dialogue]]
speaker = "ヘレナ"
original = "「それもそうか。なら次に会った際、伝えるとしよう」"
translation = "「그것도 그렇군. 그럼 다음에 만날 때 전하도록 하마.」"

[[dialogue]]
speaker = "アナ"
original = "「物わかりがよいのか悪いのか……」"
translation = "「말귀를 알아듣는 건지 마는 건지……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それに、トリシャの優勝を仕組むのだってズルよ！\u3000そういうの、マッチポンプって言うんだから！」"
translation = "「게다가 트리샤의 우승을 짜고 치는 것도 비겁해! 그런 걸 자작극이라고 하는 거니까!」"

[[dialogue]]
speaker = "ヘレナ"
original = "「結果までズルを働く気はない。審査は当日の観客たちに任せることにしている」"
translation = "「결과까지 수작을 부릴 생각은 없다. 심사는 당일의 관객들에게 맡기기로 했으니까.」"

[[dialogue]]
speaker = "unk"
original = "そうなのか？"
translation = "정말이야?"

[[dialogue]]
speaker = "トリシャ"
original = "「はい……特にそのような話は、受けておりません。ただ、水着を着て、ステージに上がれば……友達の輪が広がるとお聞きしまして。にへへ」"
translation = "「네…… 딱히 그런 이야기는 들은 바 없습니다. 그저 수영복을 입고 스테이지에 올라가면…… 친구의 폭이 넓어질 거라고 들었을 뿐이에요. 니헤헤.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふーん。インチキする気はないってわけ」"
translation = "「흐음. 사기 칠 생각은 없다는 거네.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「じゃあ、もし私が出場して優勝したら、私が賞金ゲットってことね？」"
translation = "「그럼 만약 내가 출전해서 우승하면 내가 상금을 겟 한다는 거지?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ふふふ。果たしてヴィーナスがトリシャに敵うかな？」"
translation = "「후후후. 과연 비너스가 트리샤를 당해낼 수 있을까?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「むか！\u3000そこまで言うなら出てやろうじゃないの！」"
translation = "「욱해! 거기까지 말한다면 나가주겠어!」"

[[dialogue]]
speaker = "ヘレナ"
original = "「よし。エントリーナンバー４番だ」"
translation = "「좋다. 엔트리 넘버 4번이다.」"

[[dialogue]]
speaker = "せつな"
original = "「まんまと乗せられてるでござるよ、お嬢様」"
translation = "「발라당 넘어갔구료, 아가씨.」"

[[dialogue]]
speaker = "unk"
original = "他の子も出場するかも"
translation = "다른 아이들도 출전할지도 몰라."

[[dialogue]]
speaker = "unk"
original = "審査が公平なら"
translation = "심사가 공평하다면"

[[dialogue]]
speaker = "ヘレナ"
original = "「ふふふ……好きにするがよい」"
translation = "「후후후…… 마음대로 하려무나.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「私の思惑を阻止したくば──トリシャを超える逸材を連れてくるのだな！」"
translation = "「나의 책략을 저지하고 싶다면── 트리샤를 뛰어넘는 일재를 데려오는 것이겠지!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「やってやろうじゃないの──！」"
translation = "「해보겠다는 거 아냐──!」"

