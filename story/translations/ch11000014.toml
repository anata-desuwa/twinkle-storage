[[dialogue]]
speaker = "unk"
original = "第４話,恋はお菓子とともに,P"
translation = "제4화, 사랑은 과자와 함께"

[[dialogue]]
speaker = "unk"
original = "ジャクリーヌを探すことに夢中になりすぎて、気づけば夜になってしまっていた。"
translation = "자클린을 찾는 데 너무 열중한 나머지 정신을 차려보니 밤이 되어버렸다."

[[dialogue]]
speaker = "unk"
original = "もう見つけられないのかと思った矢先、ハロウィン騒動のことを思い出してカフェテリアへとやってきた。"
translation = "더 이상 찾을 수 없는 건가 싶던 찰나, 할로윈 소동 때가 생각나서 카페테리아로 찾아왔다."

[[dialogue]]
speaker = "unk"
original = "すると――"
translation = "그러자──"

[[dialogue]]
speaker = "unk"
original = "やっと見つけた"
translation = "겨우 찾았네."

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「余のことは放っておいてなの！」"
translation = "「짐은 그냥 내버려 두라유!」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「だって……会長は余のこと嫌いなんだゆ！？」"
translation = "「그치만…… 회장은 짐을 싫어하지 않냐유!?」"

[[dialogue]]
speaker = "unk"
original = "そんなわけない！"
translation = "그럴 리가 없잖아!"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ゆ……？」"
translation = "「유……?」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「余のこと、嫌いになったんじゃないゆ……？」"
translation = "「짐을 싫어하게 된 게 아니냐유……?」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「お菓子をあげても、会長は変な反応だったの……。いっぱいおめかしした姿を見せたときだって……」"
translation = "「과자를 줘도 회장은 이상한 반응이었고…… 잔뜩 꾸민 모습을 보여줬을 때도……」"

[[dialogue]]
speaker = "unk"
original = "それは……"
translation = "그건……"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「無理しないで、正直に言ってくれていいの」"
translation = "「무리하지 말고 솔직하게 말해줘도 된다유」"

[[dialogue]]
speaker = "unk"
original = "俺は勇気を振り絞って言った。"
translation = "나는 용기를 쥐어짜 내어 말했다."

[[dialogue]]
speaker = "unk"
original = "ジャクリーヌのことが好きだから！"
translation = "자클린을 좋아하니까!"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「………………」"
translation = "「………………」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「…………それ、本当なの？」"
translation = "「………… 그거, 정말이냐유?」"

[[dialogue]]
speaker = "unk"
original = "こくりと頷く。"
translation = "고개를 끄덕인다."

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「だ、だったらなんで……お菓子あげても……？」"
translation = "「그, 그러면 왜…… 과자를 줘도……?」"

[[dialogue]]
speaker = "unk"
original = "それはただ、恥ずかしかったから……"
translation = "그건 그냥 부끄러웠으니까……"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「あっ♪\u3000会長も余と同じ気持ちだったってことゆ？\u3000……それはなんだか、嬉しいの♪」"
translation = "「앗♪ 회장도 짐이랑 똑같은 마음이었다는 거냐유? ……그건 왠지 기쁘다유♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「余も、余もね……？\u3000会長のこと……大好きなの♪」"
translation = "「짐도, 짐도 말이지……? 회장을…… 정말 좋아한다유♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「だから……逃げ出す前、恥ずかしくて、カボチャ姿になって……踊っちゃったゆ……」"
translation = "「그러니까…… 도망치기 전에도 부끄러워서 호박 모습이 돼서…… 춤춰버렸다유……」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ゆ……ゆへへ。ぐすっ……嬉しすぎて、泣いちゃうの……」"
translation = "「유…… 유헤헤. 훌쩍…… 너무 기뻐서 눈물이 난다유……」"

[[dialogue]]
speaker = "unk"
original = "実は同じ気持ちでいてくれて、いつも明るくて元気なジャクリーヌが泣くほど喜んでくれるなんて、告白してよかった。"
translation = "사실은 같은 마음이었고, 항상 밝고 활기찬 자클린이 울 정도로 기뻐해 주다니 고백하길 잘했다."

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ゆーっゆっゆっゆ♪\u3000どっちも恥ずかしがって変になってたなんて……おかしいゆ<emoji=heart04>」"
translation = "「유ー유유유♪ 둘 다 부끄러워해서 이상해졌다니…… 웃기다유<emoji=heart04>」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「余たち、似た者同士なの！」"
translation = "「우리, 닮은꼴이다유!」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「でも、本当に余でいいの？\u3000……余は人間じゃなくて、パンプキンファントムなの」"
translation = "「하지만 정말 짐으로 괜찮냐유? ……짐은 인간이 아니라 펌킨 팬텀이다유」"

[[dialogue]]
speaker = "unk"
original = "そこも含めて好きになったんだから"
translation = "그 부분까지 포함해서 좋아하게 된 거니까."

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ゆへへ♪\u3000会長、また顔が赤くなってるの<emoji=heart04>」"
translation = "「유헤헤♪ 회장, 또 얼굴이 빨개졌다유<emoji=heart04>」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「余だって、きっと、すっごく赤くなってるの……でも、全然恥ずかしくない……むしろ嬉しいゆ<emoji=heart04>」"
translation = "「짐도 분명 엄청 빨개져 있을 거다유…… 하지만 전혀 부끄럽지 않아…… 오히려 기쁘다유<emoji=heart04>」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「これで余と会長は恋人同士なの？\u3000……どういうことをすれば、本当の恋人同士になるゆ？」"
translation = "「이걸로 짐이랑 회장은 연인 사이냐유? ……어떤 걸 해야 진짜 연인 사이가 되는 거냐유?」"

[[dialogue]]
speaker = "unk"
original = "ジャクリーヌのその問いに対して、俺はこれからも彼女をしっかりエスコートしようと決意した。"
translation = "자클린의 그 질문에 대해, 나는 앞으로 그녀를 제대로 에스코트하겠다고 결심했다."

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「あ、でも、１つだけ知ってることがあるの♪\u3000会長、少しかがんでほしいゆ」"
translation = "「아, 근데 하나 알고 있는 게 있다유♪ 회장, 잠깐만 숙여줬으면 한다유」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「うん、それでいいの……じゃあ、目をつぶってほしいゆ……」"
translation = "「응, 그걸로 됐다유…… 그럼 눈을 감아줬으면 한다유……」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ありがとなの。じゃあ、行くゆ！」"
translation = "「고맙다유. 그럼, 간다유!」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ちゅっ<emoji=heart04>」"
translation = "「쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "キスされていることに気づいたのは、驚いて目を開けた時だった。"
translation = "키스하고 있다는 걸 깨달은 것은 놀라서 눈을 떴을 때였다."

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ん……ちゅ<emoji=heart04>」"
translation = "「응…… 츄<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "時間にしたら短かったかもしれない。お互いゆっくりと重ねていた唇を離す。"
translation = "시간으로 따지면 짧았을지도 모른다. 서로 천천히 겹쳤던 입술을 뗀다."

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ゆへへ<emoji=heart04>\u3000キス、しちゃったの……<emoji=heart04>」"
translation = "「유헤헤<emoji=heart04> 키스해버렸다유……<emoji=heart04>」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「とっても恥ずかしかったの……でもなんだか、すっごく気分がいいの<emoji=heart04>」"
translation = "「정말 부끄러웠다유…… 근데 왠지 정말 기분이 좋다유<emoji=heart04>」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「これから、もっともっと教えてゆ……よろしくなの<emoji=heart04>」"
translation = "「앞으로 더 많이 알려달라유…… 잘 부탁한다유<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言って、顔を耳まで真っ赤にしながらニッコリと笑ったジャクリーヌは、ゆらゆらと揺れながら、恥ずかしそうに少しだけ距離をとるのだった。"
translation = "그렇게 말하며 얼굴을 귀까지 새빨갛게 물들이고 방긋 웃은 자클린은, 흔들흔들 흔들리며 부끄러운 듯 조금 거리를 두었다."

