[[dialogue]]
speaker = "unk"
original = "第３話,カミングアウトは突然に,P"
translation = "제3화, 커밍아웃은 갑작스럽게, P"

[[dialogue]]
speaker = "unk"
original = "とある長閑な休日──"
translation = "어느 한가한 휴일──"

[[dialogue]]
speaker = "ヴィーナス"
original = "「水着デートをするわよ、クロト！」"
translation = "「수영복 데이트를 하는 거야, 쿠로토!」"

[[dialogue]]
speaker = "unk"
original = "なぜかすでに水着に着替えたヴィーナスが、俺の前に立ちはだかった。"
translation = "왜인지 이미 수영복으로 갈아입은 비너스가, 내 앞을 가로막았다."

[[dialogue]]
speaker = "unk"
original = "早い早い早い！！"
translation = "빨라 빨라 빨라!!"

[[dialogue]]
speaker = "ヴィーナス"
original = "「突然どうしたって……そんなの、おニューの水着をもっと良く見てもらうために決まってるじゃない！」"
translation = "「갑자기 왜 그러냐니…… 그야, 새 수영복을 좀 더 잘 보여주기 위해서인 게 당연하잖아!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「クロトってば、この間の合宿ではリーリアとセドナばっかりで、あんまり私に構ってくれなかったじゃない？」"
translation = "「쿠로토는 말이야, 지난번 합숙에서는 리리아와 세드나만 챙기고, 나한테는 별로 신경 써주지 않았잖아?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そもそも、恋人の新しい水着に対して、感想が一言もないっていうのはどういうことなのよ！」"
translation = "「애초에, 연인의 새로운 수영복에 대해서 감상 한마디도 없다는 게 말이 돼!?」"

[[dialogue]]
speaker = "unk"
original = "うん、新しい水着も凄く可愛い"
translation = "응, 새 수영복도 정말 귀여워"

[[dialogue]]
speaker = "unk"
original = "それは本当にごめん……"
translation = "그건 정말 미안해……"

[[dialogue]]
speaker = "ヴィーナス"
original = "「えへへぇ♪\u3000そうでしょう？\u3000可愛くなるように、一杯頑張ったんだから！」"
translation = "「에헤헤♪ 그렇겠지? 귀여워 보이도록, 엄청 노력했으니까!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「でも、一言褒めるだけじゃダメ～♪\u3000もう穴が開くくらい、私の水着姿をジロジロ見つめてくれなくっちゃ、嫌なんだから！」"
translation = "「하지만, 한마디 칭찬하는 것만으론 안 돼~♪ 아주 뚫어지라, 내 수영복 차림을 빤히 쳐다봐주지 않으면, 싫단 말이야!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ん？\u3000肌色面積が多くて目の毒……？\u3000ダメで～す♪\u3000クロトはもっと、上から下まで、私の体を舐めるように見つめなさいっ」"
translation = "「응? 노출 면적이 넓어서 눈 둘 곳을 모르겠다고……? 안 됩니~다♪ 쿠로토는 좀 더, 위에서 아래까지, 내 몸을 핥듯이 쳐다보라고」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ほらほら～<emoji=heart04>\u3000胸の谷間も、しっかり見つめるのよ？\u3000大胆に見せちゃってる脇の下も～、きゅっとくびれた腰回りもね～♪」"
translation = "「자자~<emoji=heart04> 가슴 계곡도, 제대로 쳐다보는 거야? 대담하게 보여주고 있는 겨드랑이도~, 쏙 들어간 허리 라인도 말이야~♪」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「クロトがおっぱいをチラチラ見てることなんて、ちゃんと気付いてるんだから！\u3000隠れて見るくらいなら、しっかりガン見して褒めたたえなさい！」"
translation = "「쿠로토가 가슴을 힐끔힐끔 보고 있는 거, 다 알고 있으니까! 숨어서 볼 바에는, 제대로 뚫어지라 보면서 칭찬하란 말이야!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そんなにおっぱいが好きなら、手で持ち上げて、ゆさゆさってしちゃおうかしら～♪\u3000ねっ、パーパ<emoji=heart04>」"
translation = "「그렇게 가슴이 좋으면, 손으로 들어 올려서, 흔들흔들 해버릴까나~♪ 그치, 아~빠<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それは流石にはしたないからやめなさい……？\u3000あははっ。顔真っ赤にしちゃって、今のクロト、すっごく可愛いわよ♪」"
translation = "「그건 역시 천박하니까 그만두라고……? 아하하. 얼굴이 새빨개져서는, 지금의 쿠로토, 정말 귀엽다니까♪」"

[[dialogue]]
speaker = "unk"
original = "水着の件は反省してるから、許してくれ"
translation = "수영복 건은 반성하고 있으니까, 용서해줘"

[[dialogue]]
speaker = "unk"
original = "悪かった……"
translation = "잘못했어……"

[[dialogue]]
speaker = "ヴィーナス"
original = "「じゃあお詫びにこの後、リゾート結界でデートしてくれる？」"
translation = "「그럼 사과의 의미로 이따가, 리조트 결계에서 데이트해줄래?」"

[[dialogue]]
speaker = "unk"
original = "喜んで"
translation = "기꺼이"

[[dialogue]]
speaker = "ヴィーナス"
original = "「やったぁ♪\u3000じゃあ今日は１日、私と遊んでもらうわよ、クロト<emoji=heart04>\u3000……ん～、ちゅっ<emoji=heart04>」"
translation = "「야호♪ 그럼 오늘은 하루 종일, 나랑 놀아줘야 해, 쿠로토<emoji=heart04> ……음~, 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは水着姿で腕に抱き着きながら、大胆にキスをしてくれる。"
translation = "비너스는 수영복 차림으로 팔에 매달리며, 대담하게 키스를 해준다."

[[dialogue]]
speaker = "unk"
original = "その時だった──"
translation = "그때였다──"

[[dialogue]]
speaker = "リーリア"
original = "「えっ。セン、パイ……？」"
translation = "「엣. 선, 배……?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あら？\u3000リーリアじゃない。どうかしたの？」"
translation = "「어라? 리리아잖아. 무슨 일이야?」"

[[dialogue]]
speaker = "リーリア"
original = "「え？\u3000あの、そのぉ……お取込み中、でしたかねっ！\u3000す、すすす、すみませんっ」"
translation = "「에? 저기, 그게에…… 한창 바쁘신, 중이었나요! 죄, 죄죄죄, 죄송합니다앗」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「全然気にしなくていいのよ！\u3000というか、あなたそんなに慌てて、どうかしたのかしら？」"
translation = "「전혀 신경 쓰지 않아도 돼! 그나저나, 너 왜 그렇게 당황해서, 무슨 일이라도 있는 거야?」"

[[dialogue]]
speaker = "リーリア"
original = "「ええええっ！？\u3000どうして見られた側がそんなに平然としてるんです！？」"
translation = "「에에에엣!? 어째서 들킨 쪽이 그렇게 태연한 건가요!?」"

[[dialogue]]
speaker = "リーリア"
original = "「というかセンパイたち、親娘って話でしたよね……？\u3000いくら肉親とはいえ、ちょっと不健全な距離感じゃないですか！？」"
translation = "「그보다 선배님들, 부녀 사이라고 들었는데요……? 아무리 혈육이라지만, 좀 불건전한 거리감 아닌가요!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あれ？\u3000言ってなかったかしら？\u3000私、パパとは恋人同士よ？」"
translation = "「어라? 말 안 했던가? 나, 아빠랑은 연인 사이야?」"

[[dialogue]]
speaker = "リーリア"
original = "「は！？！？！！？？？！\u3000なっ！！！\u3000……ええっ！？！？！？」"
translation = "「하!?!?!?!!???! 뭣!!! ……에에엣!?!?!?」"

[[dialogue]]
speaker = "unk"
original = "突然のカミングアウトに、リーリアは完全に頭が真っ白、という顔になった。"
translation = "갑작스러운 커밍아웃에, 리리아는 완전히 머릿속이 하얘진 얼굴이 되었다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「そう言えば魔女って、世界樹から産まれるから、男がいないんだったっけ？」"
translation = "「그러고 보니 마녀는 세계수에서 태어나니까, 남자가 없다고 했던가?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「人間界では、パパとツガイになる娘もいるってことよ……！」"
translation = "「인간계에서는, 아빠와 짝이 되는 딸도 있다는 거야……!」"

[[dialogue]]
speaker = "セドナ"
original = "「無茶苦茶を教えるのはよしてもらおう、九浄ヴィーナス」"
translation = "「말도 안 되는 걸 가르치지 마라, 쿠죠 비너스」"

[[dialogue]]
speaker = "セドナ"
original = "「世界広しと言えど、実の父親に発情する娘は貴様くらいのものだ。部下に誤った知識を教え込まないように」"
translation = "「세계는 넓다지만, 친아버지에게 발정하는 딸은 네놈 정도뿐이다. 부하에게 잘못된 지식을 주입하지 않도록」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「パパの子供が産みたいって、そんなに不自然なことかしら？」"
translation = "「아빠의 아이를 낳고 싶다는 게, 그렇게 부자연스러운 일일까?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「一番近くにいる男子で、それがこれだけかっこいいんだから、自然な成り行きだと思うのだけれど」"
translation = "「가장 가까이 있는 남자이고, 그게 이렇게 멋있으니까, 자연스러운 흐름이라고 생각하는데」"

[[dialogue]]
speaker = "セドナ"
original = "「普通は遺伝的に忌避感を覚えるようだぞ。貴様の場合は、出自も親の血統も特殊だろうから、あまりそういう影響を受けなかったのかもしれないが」"
translation = "「보통은 유전적으로 기피감을 느끼는 모양이다. 네 경우에는 출생도 부모의 혈통도 특수할 테니, 그런 영향을 별로 받지 않았을지도 모르지만」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「う～～ん、よくわからないわ！\u3000ネビュラってお堅いのね」"
translation = "「으으음, 잘 모르겠네! 네뷸라는 너무 딱딱하다니까」"

[[dialogue]]
speaker = "unk"
original = "『そういう問題か？』とは思ったものの、俺は口をつぐむことを選択した。"
translation = "『그게 문제인가?』라는 생각은 들었지만, 나는 입을 다무는 쪽을 택했다."

[[dialogue]]
speaker = "unk"
original = "なにも地雷原で切腹を始める必要はない。"
translation = "굳이 지뢰밭에서 할복을 시작할 필요는 없다."

[[dialogue]]
speaker = "リーリア"
original = "「あ……あ、あぁぁ……？\u3000あの、えっと、ドッキリとかではなく？\u3000もしかしてこれが、脳を破壊されるって奴なんですかぁ！？」"
translation = "「아…… 아, 아아……? 저기, 그게, 몰래카메라 같은 게 아니고요? 혹시 이게, 뇌가 파괴된다는 건가요오!?」"

[[dialogue]]
speaker = "unk"
original = "へなへなとその場に崩れ落ちるリーリア。"
translation = "풀썩 그 자리에 주저앉는 리리아."

[[dialogue]]
speaker = "unk"
original = "無力な先輩ですまない……。"
translation = "무력한 선배라서 미안하다……."

[[dialogue]]
speaker = "アナ"
original = "「強く生きてください。あと、入れないので入り口でしゃがみ込まないように、リーリアさん」"
translation = "「강하게 살아가세요. 그리고, 못 들어가니까 입구에서 웅크리고 있지 마세요, 리리아 씨」"

[[dialogue]]
speaker = "リーリア"
original = "「うわあああああああん！！\u3000アナちゃんがいじめたぁぁぁぁぁ！！」"
translation = "「으아아아아아아앙!! 아나짱이 괴롭혔어어어어어!!」"

[[dialogue]]
speaker = "アナ"
original = "「はぁ～～～、やれやれ。いい加減、どうにかしてください会長。あと、なんで前会長は半裸姿なんですか」"
translation = "「하아~~~~, 참 나. 적당히 좀 하세요 회장님. 그리고, 왜 전 회장님은 반라 차림인가요」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「失礼ね！\u3000これは水着よ！」"
translation = "「실례네! 이건 수영복이야!」"

[[dialogue]]
speaker = "セドナ"
original = "（帰りたい……）"
translation = "（집에 가고 싶다……）"

[[dialogue]]
speaker = "unk"
original = "完全にカオスと化してしまった星徒会室を沈静化するのに、それから１時間もの時間を要するのだった。"
translation = "완전히 카오스가 되어버린 성도회실을 진정시키는 데, 그 후로 1시간이나 되는 시간이 걸리는 것이었다."

