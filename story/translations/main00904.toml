[[dialogue]]
speaker = "unk"
original = "第４話,異界への旅路,B"
translation = "제4화, 이계로의 여로, B"

[[dialogue]]
speaker = "unk"
original = "星徒会メンバーは揃ってトレーニングルームへと向かった。"
translation = "성도회 멤버는 모두 트레이닝 룸으로 향했다."

[[dialogue]]
speaker = "unk"
original = "なんでもアナいわく、そろそろ頼んでいたものが出来上がるとのことらしく……"
translation = "뭐든지 아나의 말에 따르면, 슬슬 부탁했던 것이 완성될 것 같다고 하는데……"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「フヒ。よく来たナ。ちょうど分析結果が出揃ったところダ──答え合わセといこウ」"
translation = "「후히. 잘 왔나. 마침 분석 결과가 모두 나왔다── 답 맞추기를 하러 가자」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「アニマ先輩……？」"
translation = "「아니마 선배……?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「前会長の行方捜索について──アニマ先輩にも協力してもらっていました。これでも天才肌のお人ですから」"
translation = "「전 회장님의 행방 수색에 대해── 아니마 선배에게도 협력을 받고 있었습니다. 이래 봬도 천재적인 분이시니까요」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「いかにモ。アニマは稀代の天才錬金術師──失せ人探しくらいお手の物ダ」"
translation = "「물론이다. 아니마는 희대의 천재 연금술사── 실종자 찾기 정도는 식은 죽 먹기다」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「それに……大切な後輩のピンチとあっては、助けないわけにはいかないからネ」"
translation = "「게다가…… 소중한 후배의 위기인데, 돕지 않을 수는 없으니까」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あらあら……」"
translation = "「어머나 어머나……」"

[[dialogue]]
speaker = "unk"
original = "アニマ先輩はカリキュレーター同士をいくつものコードで繋げていた。"
translation = "아니마 선배는 계산기들을 여러 개의 코드로 연결하고 있었다."

[[dialogue]]
speaker = "unk"
original = "どうやらここの施設中、今は一括してアニマ先輩の管理下にあるらしい。"
translation = "아무래도 이곳 시설 전체가, 지금은 일괄적으로 아니마 선배의 관리하에 있는 듯하다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「トレーニングシステムを連結させて……より高度な演算機能を使っていたんですか」"
translation = "「트레이닝 시스템을 연결해서…… 더 고도의 연산 기능을 사용하고 있었군요」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「そうダ！\u3000これに、アニマ特製の秘術を掛け合わせル」"
translation = "「그렇다! 여기에, 아니마 특제 비술을 더한다」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「な、なんか魔法陣みたいのが浮かんでる……！」"
translation = "「뭐, 뭔가 마법진 같은 게 떠오르고 있어……!」"

[[dialogue]]
speaker = "unk"
original = "巨大モニターに大小２つの真円が広がり、蛍火のような光がいくつも点滅していた。"
translation = "거대 모니터에 크고 작은 두 개의 진원이 펼쳐지고, 반딧불 같은 빛이 여러 개 깜빡이고 있었다."

[[dialogue]]
speaker = "unk"
original = "<ruby>大宇宙<rt>マクロコスモス</rt></ruby>と<ruby>小宇宙<rt>ミクロコスモス</rt></ruby>──そのマッピングだとアニマ先輩は解説する。"
translation = "대우주와 소우주── 그것의 매핑이라고 아니마 선배는 해설한다."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「コスモの照応を用いルことで──対象に関する有用なデータが得られタ。少々時間はかかってしまったがナ」"
translation = "「코스모의 조응을 사용하므로써── 대상에 관한 유용한 데이터를 얻었나. 시간이 조금 걸려버렸지만」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……どうでしたか？」"
translation = "「……어땠습니까?」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「……フム。良い知らせと、悪い知らせがあるヨ」"
translation = "「……흠. 좋은 소식과, 나쁜 소식이 있다」"

[[dialogue]]
speaker = "unk"
original = "アニマ先輩は神妙に言った。"
translation = "아니마 선배는 신중하게 말했다."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「良い知らせは──ヴィーナスはまだ生命活動を維持しているということダ。これは金星とのリンクが途切れていないことを確認した」"
translation = "「좋은 소식은── 비너스는 아직 생명 활동을 유지하고 있다는 것이다. 이는 금성과의 링크가 끊어지지 않았음을 확인했다」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「！\u3000よかった……」"
translation = "「! 다행이다……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「でも、安心するのはまだ早いわね。どこに囚えられているのかもわからないと」"
translation = "「하지만, 안심하기엔 아직 이르네. 어디에 사로잡혀 있는지도 모르는데」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「はい。それに──悪い知らせというのもあるんでしょう」"
translation = "「네. 게다가── 나쁜 소식이라는 것도 있겠지요」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「フヒッ。それについてなのだガ……」"
translation = "「후힛. 그것에 대해서 말이다만……」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「九浄ヴィーナスという個体は──<b>人間界のどこにもいなイ</b>」"
translation = "「쿠죠 비너스라는 개체는── <ruby>인간계의 어디에도 없나<rt>・・・・ ・・・・ ・・</rt></ruby>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「！？」"
translation = "「!?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「それって……フィーニスの塔が特殊な空間だから、ってこと？」"
translation = "「그건…… 피니스의 탑이 특수한 공간이라서, 라는 거야?」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「いいヤ。あの塔に関しては特に念入りに調査しタ」"
translation = "「아니다. 그 탑에 관해서는 특히나 면밀히 조사했나」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「学園長が自ら立ち入り、内部に変哲がなかったというのも確認していル」"
translation = "「학원장이 스스로 출입했고, 내부에는 별다른 이상이 없었다는 것도 확인하고 있다」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「よって、教師陣はお手上げ状態となっていたガ──アニマは違ウ」"
translation = "「따라서, 교사들은 손을 쓸 수 없는 상태였지만── 아니마는 다르다」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「あらかじめ採取していタ──もとい、たまたま落ちていたヴィーナスの髪の毛をサンプルに、彼女の居所を突き止めタ！」"
translation = "「미리 채취해 두었나── 아니, 우연히 떨어져 있던 비너스의 머리카락을 샘플로, 그녀의 거처를 찾아냈나!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「居場所がわかったのですかっ！？」"
translation = "「있을 곳을 알았다는 것입니까!?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「えぇっ……でもさっき、人間界にいなかったって……」"
translation = "「에엣…… 하지만 아까, 인간계에 없었다고……」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「そうダ。人間界のどこにもいなかったガ、人間界でないところに居タ」"
translation = "「그렇다. 인간계의 어디에도 없었지만, 인간계가 아닌 곳에 있었나」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「人間界よりも、下なのダ。ヴィーナスがいるのはナ」"
translation = "「인간계보다도, 아래인 것이다. 비너스가 있는 곳은」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──！！」"
translation = "「──!!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「人間界よりも下──って、もしかして……」"
translation = "「인간계보다도 아래── 라고, 혹시……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「もしかして……魔界ですかっ！？」"
translation = "「혹시…… 마계입니까!?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「……信じられないわね。色々な意味で──」"
translation = "「……믿을 수 없네. 여러 가지 의미로──」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「アニマはそう推測すル。無論、いくつもの常識的制限を無視しての話だガ」"
translation = "「아니마는 그렇게 추측한다. 물론, 여러 가지 상식적인 제한을 무시하고 하는 이야기지만」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「勝手に三界までまたぎやがるとか、とんでもねえ相手だな……」"
translation = "「멋대로 삼계까지 넘나들다니, 터무니없는 상대네……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（人間界のどこにも、いない──ヴィーナスが──）"
translation = "（인간계의 어디에도, 없다── 비너스가──）"

[[dialogue]]
speaker = "unk"
original = "──心臓がさらに早鐘を打つ。"
translation = "── 심장이 더욱 빠르게 고동친다."

[[dialogue]]
speaker = "unk"
original = "今すぐにここを飛び出して、彼女を追いかけたい衝動に駆られた。"
translation = "당장이라도 이곳을 뛰쳐나가, 그녀를 뒤쫓고 싶은 충동에 사로잡혔다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（けど──駄目だ。落ち着け。学園長の言葉を思い出せ。俺が前のめりになっていたら、誰もついてこれない）"
translation = "（하지만── 안 돼. 진정해. 학원장의 말을 떠올려. 내가 성급하게 굴면, 아무도 따라올 수 없어）"

[[dialogue]]
speaker = "unk"
original = "見れば、みんな──どうすればいいんだと言わんばかりの困惑を揃って浮かべていた。"
translation = "보면, 모두── 어떻게 해야 할지 모르겠다는 듯한 곤혹감을 똑같이 띄우고 있었다."

[[dialogue]]
speaker = "unk"
original = "こんな時こそ、俺は新星の星徒会長として──リーダーにふさわしい指揮を執らなきゃならない。我武者羅に、けれど冷静に。"
translation = "이럴 때일수록, 나는 신성의 성도 회장으로서── 리더에게 걸맞은 지휘를 해야만 한다. 무모하게, 하지만 냉정하게."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……感謝します、アニマ先輩。その計算──恐らく<ruby>綻<rt>ほころ</rt></ruby>びはなさそうです」"
translation = "「……감사합니다, 아니마 선배. 그 계산── 아마 허점은 없을 듯합니다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「居場所がわかった──これは紛れもない進歩だ」"
translation = "「있을 곳을 알았다── 이것은 틀림없는 진보다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「緋宮会長……」"
translation = "「히노미야 회장……」"

[[dialogue]]
speaker = "unk"
original = "努めて冷静に言い放つ。"
translation = "애써 냉정하게 말한다."

[[dialogue]]
speaker = "unk"
original = "しかし、無視できない弊害もそこにはあって……"
translation = "하지만, 무시할 수 없는 폐해도 그곳에는 있어서……"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だけど、それは……確かに<b>悪い知らせ</b>ですね」"
translation = "「하지만, 그것은…… 확실히 <ruby>나쁜 소식<rt>・・ ・・</rt></ruby>이군요」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「そうダ。なぜならもう──『大交流』の時期はとうに過ぎていル」"
translation = "「그렇다. 왜냐하면 이미── 『대교류』 시기는 훨씬 전에 지나갔다」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あっ……」"
translation = "「앗……」"

[[dialogue]]
speaker = "unk"
original = "大交流──"
translation = "대교류──"

[[dialogue]]
speaker = "unk"
original = "それは、人類が三界間を移動する唯一の機会。"
translation = "그것은, 인류가 삼계 사이를 이동하는 유일한 기회."

[[dialogue]]
speaker = "unk"
original = "その機に行き来できる人数は大きく限られており、また四半期に一度しか解放されないというのが常識中の常識だ。"
translation = "그 기회에 왕래할 수 있는 인원수는 크게 한정되어 있으며, 또한 분기에 한 번밖에 해방되지 않는다는 것이 상식 중의 상식이다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「なんとか……なんとかお願いすることってできないかな！？\u3000超緊急の事態だし──」"
translation = "「어떻게든…… 어떻게든 부탁할 수 없을까!? 초긴급 사태이고──」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「難しいだろうナ。まず──『大交流』を行うには三界の狭間である『<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>』へ行くことになル」"
translation = "「어렵겠지. 우선── 『대교류』를 하려면 삼계의 틈새인 『경계의 호수』로 가야 한다」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「そして、そこから行き来に必要な『穴』を開くには満ち足りた星力が要ル。今はまだそのエネルギーが溜まっていないだろウ」"
translation = "「그리고, 그곳에서 왕래에 필요한 『구멍』을 열려면 충분한 성력이 필요하다. 지금은 아직 그 에너지가 모이지 않았을 것이다」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そんな……！」"
translation = "「그런……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だから四半期に一回しか、って話か──」"
translation = "「그래서 분기에 한 번밖에 안 된다는 이야기인가──」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……はい。そもそも『大交流』の定員は一期につき数十名程度──極めて狭き門です」"
translation = "「……네. 애초에 『대교류』의 정원은 한 기수당 수십 명 정도── 지극히 좁은 문입니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そのため選ばれるのは各世界の要人ばかり。<ruby>留学生<rt>わたしたち</rt></ruby>でさえ、卒業時までは帰れません」"
translation = "「그렇기 때문에 선택되는 것은 각 세계의 요인들뿐. 유학생조차도, 졸업할 때까지는 돌아갈 수 없습니다」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「手続きに２週間くらいかかりましたし……そんなにもたもたしていられません！」"
translation = "「수속에 2주일 정도 걸렸고요…… 그렇게 꾸물거릴 수 없습니다!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「どうあがいてもキツイ、って話か……」"
translation = "「발버둥 쳐도 힘들다는 이야기인가……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "魔族でも留学生でもない俺は当然、三界を渡ったことなどない。ないが……"
translation = "마족도 유학생도 아닌 나는 당연히, 삼계를 건너본 적이 없다. 없지만……"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「何か……正規の手段以外で人間界を出る方法はないのか？」"
translation = "「뭔가…… 정규 수단 외에 인간계를 나갈 방법은 없는 건가?」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「そんな方法があるのなら──このアニマが知りたいくらいダ。世界中の研究者が躍起になって探しているヨ」"
translation = "「그런 방법이 있다면── 이 아니마가 알고 싶을 정도다. 전 세계의 연구자들이 혈안이 되어 찾고 있다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「今後の世界の発展における、最重要課題でもありますからね」"
translation = "「앞으로의 세계 발전에 있어서, 가장 중요한 과제이기도 하니까요」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「！\u3000そ、そういえば。駅前でいつか、天界エレベーターに乗せてやるって言われたことあります！」"
translation = "「! 그, 그러고 보니. 역 앞에서 언젠가, 천계 엘리베이터에 태워주겠다고 들은 적 있습니다!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「それ詐欺だよルリっち。天界に行かせてやるーって言って、お金騙し取るやつ」"
translation = "「그거 사기야 루리치. 천계에 가게 해줄게ー라고 말하고, 돈을 속여 빼앗는 녀석」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あ、あう……！？」"
translation = "「아, 아우……!?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「それほどまでに──夢物語ということですか」"
translation = "「그 정도로── 꿈같은 이야기라는 것입니까」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「けどあたしらは、それで諦めるわけにもいかねえ……！」"
translation = "「하지만 우리들은, 그걸로 포기할 수도 없지……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──」"
translation = "「──」"

[[dialogue]]
speaker = "unk"
original = "考えろ。考えろ。落ち込んでいる時間はない。"
translation = "생각해라. 생각해라. 침울해 있을 시간은 없다."

[[dialogue]]
speaker = "unk"
original = "魔族とも天使とも人間とも、俺はこの学園生活を通じてたくさん接してきたはずだ。ヒントがないとは思えない。"
translation = "마족이든 천사든 인간이든, 나는 이 학원 생활을 통해 많이 접해왔을 터다. 힌트가 없을 리가 없다."

[[dialogue]]
speaker = "unk"
original = "俺はいくつもの選択肢を頭の中で巡らせ、そして──"
translation = "나는 여러 가지 선택지를 머릿속에서 돌려보고, 그리고──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「魔族は……魔界。天使は……天界。人間は……人間界」"
translation = "「마족은…… 마계. 천사는…… 천계. 인간은…… 인간계」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「……緋宮くん？\u3000なに当たり前のこと言って──」"
translation = "「……히노미야 군? 왜 당연한 소리를 하고──」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「アナ。ひとつ確認したいんだが……」"
translation = "「아나. 하나 확인하고 싶은 게 있는데……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「？\u3000はい」"
translation = "「? 네」"

[[dialogue]]
speaker = "unk"
original = "俺が辿り着いたのはそれ。"
translation = "내가 도달한 것은 그것."

[[dialogue]]
speaker = "unk"
original = "今の俺たちが知る種族は──この３つで全てではない。"
translation = "지금 우리가 아는 종족은── 이 셋이 전부가 아니다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「<b>魔女</b>って種族。彼女たちがどこに棲んでるって言ってたか──覚えてるか？」"
translation = "「마녀라는 종족. 그녀들이 어디에 살고 있다고 말했는지── 기억하는가?」"

