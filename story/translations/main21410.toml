[[dialogue]]
speaker = "unk"
original = "第１０話,女神の本心,B"
translation = "제10화, 여신의 본심"

[[dialogue]]
speaker = "クロト"
original = "「……ルヴィネ。今の君の叫びが、本当の気持ちのはずだ」"
translation = "「……루비네. 지금 너의 외침이 진심일 거야.」"

[[dialogue]]
speaker = "クロト"
original = "「もう、女神としての仮面をつけるのはやめるんだ……」"
translation = "「이제 여신으로서의 가면을 쓰는 건 그만둬……」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「……仮面だなんて。そんなもの……私にはない……」"
translation = "「……가면이라니. 그런 건…… 내게는 없어……」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「私はリクリエを起こすために造られた。ただそれだけの存在……」"
translation = "「나는 리크리에를 일으키기 위해 만들어졌어. 그저 그뿐인 존재……」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「私は、世界を創り直すためだけに生み出された、モノにすぎないもの……」"
translation = "「나는 세계를 다시 만들기 위해서만 태어난 물건에 불과한걸……」"

[[dialogue]]
speaker = "チナ"
original = "「……ルヴィはモノなんかじゃない。女神である前に、１人の天使だ……アタシの、友達だっ！」"
translation = "「……루비는 물건 같은 게 아니야. 여신이기 전에 한 명의 천사야…… 나의 친구라고!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「チナ……それは違うわ。私はあなたたちとは違う……」"
translation = "「치나…… 그건 틀려요. 나는 당신들과는 달라요……」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「命のある生き物は、何かの目的のために生み出されたりしない……生物が命を紡ぐということに、意味なんてないのだから……」"
translation = "「생명이 있는 생물은 무언가의 목적을 위해 태어나거나 하지 않아…… 생물이 생명을 잇는다는 것에 의미 따위 없으니까……」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「私は、この見た目も、名前も、<ruby>霊力<rt>ちから</rt></ruby>も……全てリクリエのために製造された……」"
translation = "「나는 이 겉모습도, 이름도, 영력도…… 전부 리크리에를 위해 제조되었어……」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「目的もなく生み出される存在は、生物と呼ばれる……」"
translation = "「목적 없이 태어나는 존재는 생물이라 불려요……」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「でも、目的をもって生み出される存在は──モノという以外に、ないでしょう……？」"
translation = "「하지만 목적을 가지고 태어나는 존재는── 물건이라는 것 외에 없잖아요……?」"

[[dialogue]]
speaker = "チナ"
original = "「やめろって──言ってんだろがっ！！」"
translation = "「그만두라고── 말했잖아!!」"

[[dialogue]]
speaker = "チナ"
original = "「ルヴィは、アタシの命の恩人だ！\u3000父さんや母さんよりも長い時間──一緒にいたんだぞ！！」"
translation = "「루비는 내 생명의 은인이야! 아빠나 엄마보다 더 오랜 시간── 함께 있었다고!!」"

[[dialogue]]
speaker = "チナ"
original = "「騙してた……！？\u3000それがどうした！！\u3000仮面の女がいなくなって、絶望しかなかったデネブを助けてくれた事実は、変わらない！！」"
translation = "「속였다고……!? 그게 어쨌는데!! 가면의 여자가 사라지고 절망뿐이었던 데네브를 도와준 사실은 변하지 않아!!」"

[[dialogue]]
speaker = "チナ"
original = "「アタシの友達をモノ扱いだなんて……許さないぞ！\u3000『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』だろうがルヴィ本人だろうがっ、許さないっ！！」"
translation = "「내 친구를 물건 취급하다니…… 용서 못 해! 『<ruby>ＸＥＬＯＳ<rt>제로스</rt></ruby>』든 루비 본인이든 용서 안 해!!」"

[[dialogue]]
speaker = "チナ"
original = "「アタシの友達は……クソ真面目で、いつも難しい言葉ばかり使って！\u3000冷たそうな見た目の癖に根は優しくて！」"
translation = "「내 친구는…… 지독하게 성실하고 언제나 어려운 말만 쓰고! 차가워 보이는 겉모습과는 달리 속은 다정하고!」"

[[dialogue]]
speaker = "チナ"
original = "「担々麺が大好物で、いろんなところでバイトして貯めた金は、全部誰かのために使っちまう──そんなヤツなんだ！」"
translation = "「탄탄면을 제일 좋아하고 여기저기서 알바해서 모은 돈은 전부 누군가를 위해 써버리는── 그런 녀석이라고!」"

[[dialogue]]
speaker = "チナ"
original = "「出会い方が偽物だったら、その後も全部偽物かっ！？\u3000ふざっけんな！！」"
translation = "「만난 계기가 가짜였다면 그 후도 전부 가짜냐!? 웃기지 마!!」"

[[dialogue]]
speaker = "チナ"
original = "「嘘じゃない事も混ざってただろ……なあ、そうだろルヴィ……！？」"
translation = "「거짓말이 아닌 것도 섞여 있었잖아…… 응, 그렇잖아 루비……!?」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「…………っ」"
translation = "「………… 윽」"

[[dialogue]]
speaker = "グレイス"
original = "「ルヴィは、難しいことを考えすぎです！」"
translation = "「루비는 어려운 걸 너무 많이 생각해요!」"

[[dialogue]]
speaker = "グレイス"
original = "「私、嘘をつかれたことは怒ってます。でも、だからって……取引みたいにお詫びだなんて言われても、嬉しくないですよ……」"
translation = "「저, 거짓말을 들은 건 화나요. 하지만 그렇다고 해서…… 거래하듯이 사죄라니, 기쁘지 않다고요……」"

[[dialogue]]
speaker = "グレイス"
original = "「魔王さんが言ってましたよね？\u3000女神としてではなく、１人の天使として会話を……と」"
translation = "「마왕 씨가 말했었죠? 여신으로서가 아니라 한 명의 천사로서 대화를…… 하라고요.」"

[[dialogue]]
speaker = "グレイス"
original = "「私も同じ気持ちです。女神のルヴィネ様になんて、用事はないんです。私が話したいのは……天使の、友達の、ルヴィなんですよ？」"
translation = "「저도 같은 마음이에요. 여신 루비네 님에게는 용건 없어요. 제가 이야기하고 싶은 건…… 천사인, 친구인 루비라고요!」"

[[dialogue]]
speaker = "グレイス"
original = "「ルヴィがしたこと……今すぐ全部許します、とは言えません……。でも私……ルヴィのこと、いつか許したいって、思ってます……」"
translation = "「루비가 한 일…… 지금 당장 전부 용서한다고는 말 못 해요……. 하지만 저…… 루비에 대해 언젠가 용서하고 싶다고 생각하고 있어요……」"

[[dialogue]]
speaker = "グレイス"
original = "「お父さんやお母さんよりも長い時間、一緒にいた……大好きな友達なんですから……」"
translation = "「아빠나 엄마보다 더 오랜 시간 함께 있었던…… 정말 좋아하는 친구니까요……」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「でも私は、あなたたちを騙して……」"
translation = "「하지만 저는 당신들을 속이고……」"

[[dialogue]]
speaker = "グレイス"
original = "「はい。でもルヴィが１０年間、ず～っと心の中で……しめしめって舌を出していたようには……私、どうしても思えません……」"
translation = "「네. 하지만 루비가 10년 동안 내~내 마음속으로…… 됐어 됐어 하며 비웃고 있었다고는…… 저 도저히 생각되지 않아요……」"

[[dialogue]]
speaker = "グレイス"
original = "「それに『魔王さん』と約束しましたから！\u3000世界も、友達も、絶対に諦めないって！！」"
translation = "「게다가 『마왕 씨』와 약속했으니까요! 세계도 친구도 절대로 포기하지 않겠다고!!」"

[[dialogue]]
speaker = "グレイス"
original = "「ルヴィ、私たちとちゃんと向き合ってください！\u3000そこからですよ……！」"
translation = "「루비, 우리와 제대로 마주해 주세요! 거기서부터 시작이에요……!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「私に……そんなことをする資格……」"
translation = "「내게…… 그런 짓을 할 자격이……」"

[[dialogue]]
speaker = "レティシア"
original = "「私、ルヴィとこれから──色々なことがしたいわ」"
translation = "「나, 루비와 앞으로── 여러 가지를 하고 싶어.」"

[[dialogue]]
speaker = "レティシア"
original = "「みんなが私のこと……『空っぽ』じゃないって言うんだもの。だったら色々なこと、一緒に体験してみたい」"
translation = "「모두가 나를…… 『텅 비어 있지』 않다고 말하는걸. 그렇다면 여러 가지를 함께 체험해 보고 싶어.」"

[[dialogue]]
speaker = "レティシア"
original = "「永遠にルヴィと生きられるのも、素敵だとは思うけれど……私たちの居場所のデネブで、限りある人生を生きる方が、魅力的だわ……」"
translation = "「영원히 루비와 살 수 있는 것도 멋지다고 생각하지만…… 우리의 보금자리인 데네브에서 유한한 인생을 사는 편이 더 매력적이야……」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「……レティシア」"
translation = "「……레티시아」"

[[dialogue]]
speaker = "レティシア"
original = "「いいじゃない、命令なんて反故にしても。子は親を選べないのだし」"
translation = "「좋잖아, 명령 따위 어겨버려도. 자식은 부모를 선택할 수 없는 법이고.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「……笑えないわ、その冗談」"
translation = "「……웃기지 않네요, 그 농담.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ねぇルヴィ。私たち、聞きたいことは１つだけなの」"
translation = "「있지 루비. 우리는 듣고 싶은 게 딱 하나뿐이야.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』に与えられた使命を全うして、世界をやり直したいの……？」"
translation = "「『<ruby>ＸＥＬＯＳ<rt>제로스</rt></ruby>』에게 받은 사명을 완수해서 세계를 다시 만들고 싶어……?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「それとも……嘘や間違いだらけでも、この世界で私たちと生きていきたい？」"
translation = "「아니면…… 거짓말이나 실수투성이여도 이 세계에서 우리와 살아가고 싶어?」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「……申し訳ないけれど、私に選択肢はないのよ」"
translation = "「……미안하지만 내게 선택지는 없어요.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「私は命じられたままに動かなければ……そうでないと存在する意味だって……」"
translation = "「나는 명령받은 대로 움직여야만…… 그렇지 않으면 존재하는 의미조차……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ううん、そうじゃないんだよ？」"
translation = "「아니, 그게 아니야.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「『選択肢はない』だとか、『存在する意味』だとか、そういうことは関係なくって……」"
translation = "「『선택지는 없다』라거나 『존재하는 의미』라거나 그런 건 상관없어……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「私たちはただ、ルヴィが『どうしたいのか』。それを知りたいだけなの」"
translation = "「우리는 그저 루비가 『어떻게 하고 싶은지』. 그걸 알고 싶을 뿐이야.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「…………ベアト。あと数年もしたら……あなたは星力がなくなるのよ？\u3000太陽の下も歩けない……」"
translation = "「………… 베아토. 앞으로 몇 년만 지나면…… 당신은 성력이 없어져요. 태양 아래도 걷지 못하고……」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「私がリクリエを起こして、守護天使として連れていかなかったら。あなたはいずれ、暗い洞窟に……」"
translation = "「내가 리크리에를 일으켜서 수호천사로 데려가지 않으면 당신은 결국 어두운 동굴에……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「うん！\u3000だから時間ぎりぎりまで──ルヴィとみんなでいっぱい思い出を作りたい！」"
translation = "「응! 그러니까 시간 다 될 때까지── 루비랑 모두랑 잔뜩 추억을 만들고 싶어!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「……………………」"
translation = "「……………………」"

[[dialogue]]
speaker = "unk"
original = "ルヴィネはしばらくの沈黙の後、俺の方へ顔を向けた。"
translation = "루비네는 잠시 침묵한 뒤 내 쪽으로 고개를 돌렸다."

[[dialogue]]
speaker = "ルヴィネ"
original = "「緋宮クロト。あなたは、今回の騒動に、どんな決着をつけるつもりなの……？」"
translation = "「히노미야 쿠로토. 당신은 이번 소동에 어떤 결말을 낼 생각인가요……?」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「お父様は……テルルよりも高位の存在よ。私のような女神の幼体を生み出せる創造神……」"
translation = "「아버님은…… 테루루보다 더 높은 지위의 존재예요. 저 같은 여신의 유체를 만들어 낼 수 있는 창조신……」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「あなたたち、誰に逆らうと言ってるのか……本当にわかっているの？」"
translation = "「당신들, 누구에게 거역하려 하는 건지…… 정말 알고 있나요?」"

[[dialogue]]
speaker = "クロト"
original = "「いざとなれば戦うことになるかもしれない。でも……ルヴィネ。君がいれば話は変わってくる」"
translation = "「여차하면 싸우게 될지도 몰라. 하지만…… 루비네. 네가 있다면 이야기는 달라져.」"

[[dialogue]]
speaker = "クロト"
original = "「『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』と意思疎通ができるんだろう？\u3000だったら、話し合いで何とかなるかもしれない」"
translation = "「『<ruby>ＸＥＬＯＳ<rt>제로스</rt></ruby>』와 의사소통을 할 수 있잖아? 그렇다면 대화로 어떻게든 될지도 몰라.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「…………馬鹿なことを」"
translation = "「………… 바보 같은 소리를.」"

[[dialogue]]
speaker = "クロト"
original = "「『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』に善意や悪意があるわけではないことは……何となく理解しているつもりだ。神様っていうのはきっと、そういうものなんだろうって」"
translation = "「『<ruby>ＸＥＬＯＳ<rt>제로스</rt></ruby>』에게 선의나 악의가 있는 게 아니라는 건…… 어느 정도 이해하고 있어. 신이라는 건 분명 그런 거겠지.」"

[[dialogue]]
speaker = "クロト"
original = "「でも、だからこそ、何とか対話で解決したいんだ。リクリエなんて起こさなくても、俺たちは進化を続けていく」"
translation = "「하지만 그렇기에 어떻게든 대화로 해결하고 싶어. 리크리에 따위 일으키지 않아도 우리들은 진화를 계속해 나갈 거야.」"

[[dialogue]]
speaker = "クロト"
original = "「資源を消費する生物が生きていくには、成長し続けるしかない。だけど、その速度は生きている俺たちに選ばせてほしいんだ」"
translation = "「자원을 소비하는 생물이 살아가기 위해서는 계속 성장할 수밖에 없어. 하지만 그 속도는 살아있는 우리들이 선택하게 해 줘.」"

[[dialogue]]
speaker = "クロト"
original = "「協力してくれないか──『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』と対話できる、君の力があれば心強い」"
translation = "「협력해 주지 않겠어? 『<ruby>ＸＥＬＯＳ<rt>제로스</rt></ruby>』와 대화할 수 있는 너의 힘이 있다면 든든할 거야.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「…………本当に愚かね」"
translation = "「………… 정말 어리석네요.」"

[[dialogue]]
speaker = "unk"
original = "ルヴィネのその言葉は、俺たちに言っている──わけではなかった。"
translation = "루비네의 그 말은 우리에게 하는 말이── 아니었다."

[[dialogue]]
speaker = "ルヴィネ"
original = "「私はテルル以上に……出来損ないの女神だったみたい……」"
translation = "「나는 테루루 이상으로…… 낙제생 여신이었나 봐요……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ルヴィ……！」"
translation = "「루비……!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「みんな、今まで本当に……ごめんなさい」"
translation = "「모두들, 지금까지 정말로…… 미안해요.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「許されるのなら……これからも、みんなと一緒に生きていきたい……っ」"
translation = "「용서받을 수 있다면…… 앞으로도 모두와 함께 살아가고 싶어요……윽」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「リクリエなんて起こさずに、この世界で生きていきたいわ……！」"
translation = "「리크리에 따위 일으키지 않고 이 세계에서 살아가고 싶어요……!」"

