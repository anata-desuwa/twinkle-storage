[[dialogue]]
speaker = "unk"
original = "第０話,チナの決意,B"
translation = "제0화, 치나의 결의, B"

[[dialogue]]
speaker = "チナ"
original = "「アルタイルの破壊に失敗しました……申し訳ありません、ルヴィネ会長……」"
translation = "「알타이르의 파괴에 실패했습니다…… 죄송합니다, 루비네 회장님……」"

[[dialogue]]
speaker = "unk"
original = "チナが傷ついた体を引きずり、苦々しい表情を浮かべて星徒会室に入ってくる。"
translation = "치나가 상처 입은 몸을 이끌고 씁쓸한 표정을 지으며 성도회실로 들어온다."

[[dialogue]]
speaker = "ルヴィネ"
original = "「問題ないわ。今回の目的は威力偵察。アルタイルの様子を知ることができれば十分よ」"
translation = "「문제없어. 이번 목적은 위력 정찰. 알타이르의 상태를 알 수 있었다면 충분해.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「宣戦布告も、私の言った通りにしてくれてありがとう」"
translation = "「선전포고도 내가 말한 대로 해줘서 고마워.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「この戦いが平行世界同士の生存競争であることを知れば、覚悟のないアルタイルの星騎士たちは、ためらいを感じることでしょう」"
translation = "「이 싸움이 평행세계끼리의 생존 경쟁이라는 것을 알면, 각오가 없는 알타이르의 성기사들은 망설임을 느끼게 되겠지.」"

[[dialogue]]
speaker = "チナ"
original = "「でも、多数の極星従騎を失ってしまいました。会長が女神様から賜った貴重な戦力を……」"
translation = "「하지만 다수의 극성종기를 잃고 말았습니다. 회장님이 여신님께 하사받은 귀중한 전력을……」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「それも大丈夫。アルタイルへの本格侵攻のために、女神様に補充をお願いしてきたわ」"
translation = "「그것도 괜찮아. 알타이르로의 본격 침공을 위해 여신님께 보충을 부탁드리고 왔으니까.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「何よりチナが無事に帰ってきてくれて良かった。あなたは私の大事な星徒会役員なんだから」"
translation = "「무엇보다 치나가 무사히 돌아와 줘서 다행이야. 너는 나의 소중한 성도회 임원이니까.」"

[[dialogue]]
speaker = "チナ"
original = "「……！\u3000会長……！」"
translation = "「……! 회장님……!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「それに言ったでしょう。失敗したなら正せばいい。最初から完全である必要はないと」"
translation = "「게다가 말했지? 실패했다면 바로잡으면 돼. 처음부터 완벽할 필요는 없다고.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「人はそうやって技術を、理論を……世界を進化させてきた。だから今があるの」"
translation = "「인간은 그렇게 기술을, 이론을…… 세계를 진화시켜 왔어. 그래서 지금이 있는 거야.」"

[[dialogue]]
speaker = "unk"
original = "失敗はより良き未来への糧となる──極星の会長がよく口にする言葉だ。"
translation = "실패는 더 나은 미래를 위한 밑거름이 된다── 극성의 회장이 자주 입에 담는 말이다."

[[dialogue]]
speaker = "チナ"
original = "「ところで、副会長はいまどこに……？」"
translation = "「그런데 부회장님은 지금 어디에……?」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「……極秘任務の最中よ。彼女なら無事に戻ってくるわ」"
translation = "「……극비 임무 수행 중이야. 그녀라면 무사히 돌아올 거야.」"

[[dialogue]]
speaker = "チナ"
original = "「そ、そうですよね。あの人なら大丈夫ですよね……」"
translation = "「그, 그렇겠죠. 그분이라면 괜찮겠죠…….」"

[[dialogue]]
speaker = "チナ"
original = "「それで、その……会長」"
translation = "「그래서, 저기…… 회장님.」"

[[dialogue]]
speaker = "unk"
original = "爪が食い込むほど、小さな拳を強く握るチナ。"
translation = "손톱이 파고들 정도로 작은 주먹을 꽉 쥐는 치나."

[[dialogue]]
speaker = "unk"
original = "会長を見つめるその眼には、悲壮な覚悟が宿っている。"
translation = "회장을 바라보는 그 눈에는 비장한 각오가 서려 있다."

[[dialogue]]
speaker = "チナ"
original = "「アタシにもっと力を下さい。もっと、もっと……アルタイルのやつらに絶対負けないように」"
translation = "「나에게 더 힘을 주세요. 더, 더 많이…… 알타이르 녀석들에게 절대 지지 않도록.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「駄目よ。あなたの身が持たないわ」"
translation = "「안 돼. 네 몸이 버티지 못할 거야.」"

[[dialogue]]
speaker = "チナ"
original = "「デネブを守るためなら本望です……！」"
translation = "「데네브를 지키기 위해서라면 바라는 바입니다……!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "チナの真剣な眼差しに押されるように、極星の会長が押し黙る。"
translation = "치나의 진지한 눈빛에 밀리듯 극성의 회장이 입을 다문다."

[[dialogue]]
speaker = "unk"
original = "険しい顔でしばし逡巡するも、その沈黙を振り払うようにはっきりと告げる。"
translation = "험악한 얼굴로 잠시 주저하더니, 그 침묵을 떨쳐내듯 분명하게 고한다."

[[dialogue]]
speaker = "ルヴィネ"
original = "「わかったわ。あなたがそこまで言うなら止めはしない」"
translation = "「알았어. 네가 그렇게까지 말한다면 말리지 않을게.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「デネブのためにあなたの命を捧げて、チナ」"
translation = "「데네브를 위해 네 목숨을 바쳐줘, 치나.」"

[[dialogue]]
speaker = "チナ"
original = "「はい、任せてください！」"
translation = "「네, 맡겨주세요!」"

