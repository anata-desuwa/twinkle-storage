[[dialogue]]
speaker = "unk"
original = "第２話,可能性の模索,B"
translation = "제2화, 가능성의 모색, B"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「誰１人欠けることなくリクリエを止める。そんな未来を引き寄せることは……可能か？」"
translation = "「단 한 명도 빠짐없이 리크리에를 멈춘다. 그런 미래를 끌어당기는 것은…… 가능한가?」"

[[dialogue]]
speaker = "unk"
original = "俺の問いかけを業突く張りだと評すジグだったが──"
translation = "나의 질문을 욕심쟁이라 평하는 지그였지만──"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「方法はなくもない──かもしれないね？」"
translation = "「방법이 없지는 않다── 일지도 모르겠네?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「本当か……！？」"
translation = "「정말이야……!?」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「あくまでもゼロではない、というだけの話だよ。可能性は１％にも満たないだろう」"
translation = "「어디까지나 제로는 아니다, 라는 것뿐인 이야기야. 가능성은 1%에도 미치지 못하겠지」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「天機の星眼は、ものや人に秘められた可能性を視通す。かつて視えていたアルタイルの破滅の未来は、アガサの覚醒によって変化した」"
translation = "「천기의 성안은, 사물이나 사람에게 비겨진 가능성을 내다보지. 예전에 보이던 알타이르의 파멸의 미래는, 아가사의 각성에 의해 변화했어」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「けれど、世界の命運を左右するほどの劇的な変化というのは、当然、そうやすやすと起こるわけではない」"
translation = "「하지만, 세계의 운명을 좌우할 정도의 극적인 변화라는 건, 당연히, 그렇게 쉽사리 일어나는 게 아니야」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「可能性という言葉は一見、希望に満ちているように聞こえるけれど……何事にも限界はある」"
translation = "「가능성이라는 말은 얼핏 보기에, 희망에 가득 찬 것처럼 들리지만…… 모든 일에는 한계가 있어」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「人間は鳥のように空は飛べない。魚のように水中で呼吸はできない。私の星眼は、観測する対象が持つ潜在能力から、実現する可能性を先読みするだけだ」"
translation = "「인간은 새처럼 하늘을 날 수 없어. 물고기처럼 수중에서 호흡할 수 없지. 나의 성안은, 관측하는 대상이 가진 잠재능력으로부터, 실현될 가능성을 선독할 뿐이야」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「本当に起こせるのかい？\u3000アガサのような……実は守護天使様がその身に宿っていただなんて、チートみたいなちゃぶ台返しをもう一度」"
translation = "「정말로 일으킬 수 있겠어? 아가사처럼…… 사실은 수호천사님이 그 몸에 깃들어 있었다니 하는, 치트 같은 밥상 뒤집기를 다시 한번」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「奇跡っていうのは、二度も三度も起こらないから奇跡と呼ぶ。そういうものなんじゃないかな？」"
translation = "「기적이라는 건, 두 번 세 번 일어나지 않으니까 기적이라 불러. 그런 거 아니겠어?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「…………それでも」"
translation = "「…………그래도」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「──それでも足掻かない理由にはならない」"
translation = "「──그래도 발버둥 치지 않을 이유는 되지 않아」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「アガサ……いつからそこにいたのかな」"
translation = "「아가사…… 언제부터 거기에 있었을까나」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「これでも選管の委員長だからな。入ったばかりの新人がふらっとどこかに消えたら、探すのが私の役目だ」"
translation = "「이래 봬도 선관의 위원장이니까 말이야. 갓 들어온 신입이 훌쩍 어딘가로 사라지면, 찾는 것이 내 역할이다」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……魔王、話は聞いた。私も君と同じ気持ちだ」"
translation = "「……마왕, 이야기는 들었다. 나도 너와 같은 마음이다」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「気に入らない未来があるのであれば、それを変えるために足掻く……私たち星騎士は、いつだってそうやって戦ってきた」"
translation = "「마음에 들지 않는 미래가 있다면, 그것을 바꾸기 위해 발버둥 친다…… 우리 성기사는, 언제나 그렇게 싸워왔다」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「望ましい未来のために、二度目の奇跡を起こす必要があるのなら──そうするだけだ」"
translation = "「바람직한 미래를 위해, 두 번째 기적을 일으킬 필요가 있다면── 그렇게 할 뿐이다」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ジグが視ているのは、厳密には『未来そのもの』ではなく、潜在能力と可能性なんだろう？」"
translation = "「지그가 보고 있는 건, 엄밀히는 『미래 그 자체』가 아니라, 잠재능력과 가능성인 거지?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「であれば、我々のうちの誰かに宿る潜在能力に劇的な変化があるか、世界の命運を変えるほどの選択をすれば、未来は変わる」"
translation = "「그렇다면, 우리 중 누군가에게 깃든 잠재능력에 극적인 변화가 있거나, 세계의 운명을 바꿀 정도의 선택을 하면, 미래는 변해」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「簡単に言うねぇ。具体的なプランはあるのかい？」"
translation = "「쉽게 말하네~. 구체적인 플랜은 있는 거야?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……はっきりとはない。だから『足掻く』と言ったんだ」"
translation = "「……확실히는 없다. 그래서 『발버둥 친다』고 말한 거다」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「まだできるアプローチはある。そうだろう、魔王？」"
translation = "「아직 할 수 있는 어프로치는 있어. 그렇지, 마왕?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。さっきメルエルとナターシャに、天界への増援要請を送った。じきに魔界にも協力を仰ぐ」"
translation = "「아아. 방금 메르엘과 나타샤에게, 천계로의 증원 요청을 보냈어. 조만간 마계에도 협력을 구할 거야」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それだけじゃない。ネビュラの魔女。コラプサー。<ruby>在野<rt>ざいや</rt></ruby>にいる星術使い……俺が知りうる、三界すべての戦力を人間界に集める」"
translation = "「그뿐만이 아니야. 네뷸라의 마녀. 콜랩서. 재야에 있는 성술사…… 내가 아는 한, 삼계의 모든 전력을 인간계에 모으겠어」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「戦力の補強は必須だろうね。だがルヴィネとディザスターハンドを相手に、ただの星騎士がいくらいたところで烏合の衆だ」"
translation = "「전력 보강은 필수겠네. 하지만 루비네와 디재스터 핸드를 상대로, 평범한 성기사가 아무리 있어 봤자 오합지졸이야」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だけど人が集まれば、それだけ可能性は増える。望ましい未来を見つけられるかもしれない」"
translation = "「하지만 사람이 모이면, 그만큼 가능성은 늘어나. 바람직한 미래를 찾아낼 수 있을지도 몰라」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「女神ルヴィネを討つ……それでリクリエが止まる確証はないけれど、彼女を倒す可能性そのものは見えているんだ」"
translation = "「여신 루비네를 친다…… 그걸로 리크리에가 멈춘다는 확증은 없지만, 그녀를 쓰러뜨릴 가능성 그 자체는 보이고 있어」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「それによって、次の３０００年を買う、その猶予が手に入る可能性に賭けることはできないのかい？」"
translation = "「그것에 의해, 다음 3000년을 사는, 그 유예를 얻을 가능성에 걸 수는 없는 거야?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「すまないが、できない」"
translation = "「미안하지만, 안 돼」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「次の３０００年という猶予が手に入る確証もなければ、『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』に挑む機会が二度ある保証もない」"
translation = "「다음 3000년이라는 유예를 얻을 확증도 없거니와, 『<ruby>XELOS<rt>제로스</rt></ruby>』에게 도전할 기회가 두 번 있으리라는 보장도 없어」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺はここで、リクリエという仕組みそのものを完全に終わらせたい」"
translation = "「나는 여기서, 리크리에라는 구조 그 자체를 완전히 끝내고 싶어」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「それはつまり、ルヴィネではなく『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』を討ちたい、ということかな？」"
translation = "「그건 즉, 루비네가 아니라 『<ruby>XELOS<rt>제로스</rt></ruby>』를 치고 싶다, 라는 걸까?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「これは俺個人の考えなんだが……必ずしも『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』を倒す必要はないと思っているんだ」"
translation = "「이건 내 개인적인 생각인데…… 반드시 『<ruby>XELOS<rt>제로스</rt></ruby>』를 쓰러뜨릴 필요는 없다고 생각하고 있어」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「『何度も世界をやり直すことで、生命や文明の発展をより効率化させること』がリクリエの目的であることはわかっている」"
translation = "「『몇 번이고 세계를 다시 시작함으로써, 생명이나 문명의 발전을 보다 효율화시키는 것』이 리크리에의 목적이라는 건 알고 있어」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』がこの機構を生み出したのであれば、実は俺たちと『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』の間には交渉の余地があるかもしれない」"
translation = "「『<ruby>XELOS<rt>제로스</rt></ruby>』가 이 기구를 만들어냈다면, 사실 우리와 『<ruby>XELOS<rt>제로스</rt></ruby>』 사이에는 협상의 여지가 있을지도 몰라」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「相手は神であるが故に、俺たちとは恐らくものを考える尺度が違う」"
translation = "「상대는 신이기에, 우리와는 아마도 사물을 생각하는 척도가 다를 거야」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺たちが理不尽に感じていることを、『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』は特に理不尽とも思っていない可能性がある」"
translation = "「우리가 불합리하게 느끼고 있는 것을, 『<ruby>XELOS<rt>제로스</rt></ruby>』는 딱히 불합리하다고 생각하지 않을 가능성이 있어」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……そこでルヴィネの存在が必要になるんだ」"
translation = "「……거기서 루비네의 존재가 필요해지는 거야」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「どの程度会話の通じる相手かはわからない。だけど、ルヴィネであればその『声』は神に届く」"
translation = "「어느 정도 대화가 통하는 상대인지는 모르겠어. 하지만, 루비네라면 그 『목소리』는 신에게 닿아」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺たちヒトの論理を神に届けて、リクリエがなくとも世界が進歩しうることを訴える必要がある」"
translation = "「우리 인간의 논리를 신에게 전달해서, 리크리에가 없어도 세계가 진보할 수 있음을 호소할 필요가 있어」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』はそこまで会話の通じる相手ではないと思うよ。使徒の扱いを見ればわかるだろう？」"
translation = "「『<ruby>XELOS<rt>제로스</rt></ruby>』는 그렇게까지 대화가 통하는 상대는 아니라고 봐. 사도의 취급을 보면 알 수 있잖아?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「当然、その場合は戦い抜くだけだ」"
translation = "「당연히, 그 경우에는 끝까지 싸울 뿐이야」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ふむ。君の意志は固いようだね」"
translation = "「흠. 너의 의지는 확고한 모양이네」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「だけど本当に大丈夫かい？\u3000君が途中で心折れてしまったりしたら、アルタイルは終わりだよ？」"
translation = "「하지만 정말로 괜찮겠어? 네가 도중에 마음이 꺾여버리기라도 하면, 알타이르는 끝장이야?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺は折れない。支えてくれる仲間がいるかぎり。それに……」"
translation = "「나는 꺾이지 않아. 지탱해 주는 동료들이 있는 한. 게다가……」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「……私とは違う、と？」"
translation = "「……나와는 다르다, 이거야?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。俺はジグと違って、未来が直接視えるわけじゃない。持たざる者だからこそ抱ける蛮勇ってやつだ」"
translation = "「아아. 나는 지그와 달라서, 미래가 직접 보이는 게 아니야. 가진 게 없는 자이기에 품을 수 있는 만용이라는 거지」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「アルタイルには、ベガの生き残りも、デネブの人達もいる。３つの平行世界の住人たちで手を取り合えば、きっと奇跡を起こせる。そう信じている」"
translation = "「알타이르에는, 베가의 생존자도, 데네브의 사람들도 있어. 3개의 평행세계 주민들이 손을 맞잡으면, 분명 기적을 일으킬 수 있어. 그렇게 믿고 있어」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「うーん……強気というか、呑気というか……あるいは、一度世界を救ったからこその余裕なのかな」"
translation = "「으음…… 강기라고 해야 할지, 낙천적이라고 해야 할지…… 아니면, 한 번 세계를 구했기에 생기는 여유인 걸까」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ひとまず君の覚悟は理解した。じゃあもっと具体的な話をしようか」"
translation = "「일단 너의 각오는 이해했어. 그럼 좀 더 구체적인 이야기를 해볼까」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ルヴィネを仲間に引き入れるには、極星学園星徒会の協力が欠かせない。彼女たちをどう説得するつもりだい？」"
translation = "「루비네를 동료로 끌어들이려면, 극성학원 성도회의 협력이 필수적이야. 그녀들을 어떻게 설득할 생각이지?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……ルヴィネが亡くなってしまう未来を、そのまま伝えようと思う」"
translation = "「……루비네가 죽고 마는 미래를, 그대로 전하려고 해」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「難しいと思うけどね。特にあの天使の子は、ルヴィネに心酔しきっているようだし」"
translation = "「어려울 거라고 보는데 말이야. 특히 그 천사 아이는, 루비네에게 완전히 심취해 있는 모양이고」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……レティシアか。アポロから話は聞いている。相当、頭が硬いらしいな」"
translation = "「……레티시아인가. 아폴로에게 이야기는 들었다. 상당히, 머리가 딱딱한 모양이더군」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「敵である緋宮クロトから、ルヴィネ死亡の未来を聞いて……はいそうですかと、協力してくれるとはとても思えないね」"
translation = "「적인 히노미야 쿠로토로부터, 루비네 사망의 미래를 듣고…… 네 그렇습니까 하고, 협력해 줄 거라고는 도저히 생각되지 않네」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……難しいことは、わかっているさ」"
translation = "「……어렵다는 건, 알고 있어」"

[[dialogue]]
speaker = "unk"
original = "それでも俺は諦めない。諦めたくない。俺はデネブの彼女たちに示したいんだ。"
translation = "그래도 나는 포기하지 않아. 포기하고 싶지 않아. 나는 데네브의 그녀들에게 보여주고 싶어."

[[dialogue]]
speaker = "unk"
original = "『緋宮クロト』は、世界が変わっても君たちの味方なんだってことを。"
translation = "『히노미야 쿠로토』는, 세계가 바뀌어도 너희의 편이라는 것을."

[[dialogue]]
speaker = "unk"
original = "それからすぐ後、俺は星徒会のメンバーとベアトリスを呼び出した。"
translation = "그로부터 얼마 뒤, 나는 성도회 멤버들과 베아트리스를 불러냈다."

[[dialogue]]
speaker = "unk"
original = "そして、ジグの星眼によってルヴィネが死亡する未来を視たことを、告げた──"
translation = "그리고, 지그의 성안에 의해 루비네가 사망하는 미래를 보았음을, 고했다──"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「…………そんな。ル、ルヴィがっ……嘘……や、やだ……やだよ……」"
translation = "「…………그럴 수가. 루, 루비가…… 거짓말…… 시, 싫어…… 싫어……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ベアト、落ち着け……魔王の話はまだ終わりじゃない」"
translation = "「베아토, 진정해…… 마왕의 이야기는 아직 끝난 게 아니야」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「り、梨緒ちゃん……ごめん、そうだよね。ただちょっと、びっくりしちゃったっていうか……」"
translation = "「리, 리오짱…… 미안, 그렇네. 그냥 조금, 깜짝 놀라버렸다고나 할까……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いきなりですまない。でも、俺はこの未来を否定したい」"
translation = "「갑작스럽게 미안해. 하지만, 나는 이 미래를 부정하고 싶어」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺たち星騎士の使命は、リクリエを防ぐことだ」"
translation = "「우리 성기사의 사명은, 리크리에를 막는 것이다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「今現在、ルヴィネと対立はしているけれど……リクリエを起こそうとしているのは『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』だ」"
translation = "「지금 현재, 루비네와 대립하고는 있지만…… 리크리에를 일으키려 하는 것은 『<ruby>XELOS<rt>제로스</rt></ruby>』다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ルヴィネを倒すことは、勝利する条件でも目的でもない」"
translation = "「루비네를 쓰러뜨리는 것은, 승리하는 조건도 목적도 아니야」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ルヴィネは『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』に繋がる手がかりだ……『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』と戦うにせよ交渉するにせよ、ルヴィネには生きていてもらいたい」"
translation = "「루비네는 『<ruby>XELOS<rt>제로스</rt></ruby>』로 이어지는 단서다…… 『<ruby>XELOS<rt>제로스</rt></ruby>』와 싸우든 협상하든, 루비네는 살아 있어 주었으면 해」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「…………う、うん」"
translation = "「…………으, 응」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それにルヴィネは、極星学園みんなの親友だ。俺たちの仲間の、大切な親友を倒す未来は……明確に否定したい」"
translation = "「게다가 루비네는, 극성학원 모두의 친우다. 우리 동료의, 소중한 친우를 쓰러뜨리는 미래는…… 명확히 부정하고 싶어」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「会長さん……！」"
translation = "「회장님……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「どうだろう、星徒会のみんな。意見を聞かせてくれ」"
translation = "「어때, 성도회 모두들. 의견을 들려줘」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロトの意見に賛成よ！」"
translation = "「쿠로토의 의견에 찬성이야!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「いいんじゃないかしら～♪」"
translation = "「좋지 않을까나~♪」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「会長らしい決断だと思うよ。私も力になる！」"
translation = "「회장다운 결단이라고 생각해. 나도 힘이 될게!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ルヴィネさんを打倒しても、新しい女神が出てくる可能性は大いにあるでしょう。私も賛成です」"
translation = "「루비네 씨를 타도해도, 새로운 여신이 나올 가능성은 충분히 있겠죠. 저도 찬성입니다」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「みんな……あ、ありがとうっ！」"
translation = "「모두들…… 고, 고마워!」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「やっぱりこうなるんだ。魔王と話した時からそんな気はしていたけど」"
translation = "「역시 이렇게 되는구나. 마왕과 이야기했을 때부터 그런 기분이 들었지만」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「賛成多数で可決だな。ジグ、君にも励んでもらうぞ」"
translation = "「찬성 다수로 가결이군. 지그, 너도 힘써줘야겠어」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「まぁ了解。私なりに最善を尽くすよ」"
translation = "「뭐 양해했어. 나 나름대로 최선을 다할게」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「まったく、今代の魔王様は強欲だね……」"
translation = "「정말이지, 이번 대의 마왕님은 탐욕스럽네……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「いいじゃない！\u3000クロトは魔王なんだもの、世界一欲張りなくらいじゃないと！」"
translation = "「좋잖아! 쿠로토는 마왕인걸, 세계에서 제일 욕심쟁이 정도는 되어야지!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「しかし会長。方針は理解できましたが、実際どのように動きますか？」"
translation = "「하지만 회장님. 방침은 이해했습니다만, 실제로는 어떻게 움직이실 건가요?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「姫咲さんたちが天界から応援を連れてくるまで、少しの時間はあると思うけど……」"
translation = "「히메사키 씨 일행이 천계에서 응원을 데려올 때까지, 약간의 시간은 있을 거라고 생각합니다만……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。戦力が集まり次第、転送装置を使ってデネブに乗り込む予定だが……決行までの時間を大切に使おう」"
translation = "「아아. 전력이 모이는 대로, 전송 장치를 사용해 데네브로 쳐들어갈 예정이지만…… 결행까지의 시간을 소중히 쓰자」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「具体的な方法論としては……極星星徒会の全員に同じことを話して、信用してもらう」"
translation = "「구체적인 방법론으로서는…… 극성 성도회 전원에게 같은 이야기를 해서, 신용을 얻는다」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「できるかしら？\u3000みんながみんな、ベアトリスちゃんみたいに素直な子ってわけじゃないし……」"
translation = "「할 수 있을까? 모두가 모두, 베아트리스짱처럼 솔직한 아이라는 법은 없으니까……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「大丈夫よ。クロトが真剣に話したら、みんなきっと信じてくれるわ！」"
translation = "「괜찮아. 쿠로토가 진지하게 이야기하면, 모두 분명 믿어줄 거야!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「私は……難しいと思います」"
translation = "「저는…… 어렵다고 생각합니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ルヴィネさんが死ぬ未来を視ただなんて……アルタイル側に懐柔するための嘘だと断じられ、さらに溝が深まるかもしれません」"
translation = "「루비네 씨가 죽는 미래를 보았다니…… 알타이르 측으로 회유하기 위한 거짓말이라고 단정당해, 더욱 골이 깊어질지도 모릅니다」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そうだね。それにジグさんの星眼のビジョンは、証拠も根拠も出せないし……言葉だけで説得なんて、できるのかな？」"
translation = "「그렇네. 게다가 지그 씨의 성안 비전은, 증거도 근거도 낼 수 없고…… 말로만 설득하는 게, 가능할까?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「なんにせよ、チナさんたちにもっと心を開いてもらわなければいけません」"
translation = "「어찌 됐든, 치나 씨 일행이 좀 더 마음을 열게 해야 합니다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。それについてなんだけど、こんなアプローチはどうかな……？」"
translation = "「아아. 그것에 대해서인데, 이런 어프로치는 어떨까……?」"

