[[dialogue]]
speaker = "unk"
original = "翌日の星徒会室。会長の席についた俺を待っていたのは──"
translation = "다음 날 성도회실. 회장석에 앉은 나를 기다리고 있던 것은──"

[[dialogue]]
speaker = "アナ"
original = "「会長。こちら、各部活動からの企画資料です」"
translation = "「회장. 여기, 각 동아리의 기획 자료입니다」"

[[dialogue]]
speaker = "unk"
original = "ちょっとこの量はやばくない……！？"
translation = "잠깐, 이 양은 좀 위험하지 않아……!?"

[[dialogue]]
speaker = "unk"
original = "あの……アナさん？"
translation = "저기…… 아나 씨?"

[[dialogue]]
speaker = "マトイ"
original = "「ほんとにすごい量だね……書類の束、会長の頭より高いよ！？」"
translation = "「정말 엄청난 양이네…… 서류 뭉치가 회장 머리보다 높아!?」"

[[dialogue]]
speaker = "アナ"
original = "「仕方ありません。新星学園のオープンキャンパスまでもうすぐ。当日は流星市国の外からも見学者がたくさん」"
translation = "「어쩔 수 없습니다. 신성학원 오픈 캠퍼스까지 얼마 안 남았으니까요. 당일에는 유성시국 밖에서도 견학자가 많이 옵니다」"

[[dialogue]]
speaker = "アナ"
original = "「将来の入部希望者をゲットするための戦いは、もう始まっています。どの部活動も張り切って当たり前」"
translation = "「장래의 입부 희망자를 낚기 위한 전쟁은 이미 시작되었습니다. 어느 동아리든 기합이 들어가는 게 당연하죠」"

[[dialogue]]
speaker = "サーシャ"
original = "「この時期は毎年、お祭りみたいに賑わうのよね～。ふふ、去年も大変だったわ～♪」"
translation = "「이 시기는 매년 축제처럼 북적이지요~. 후후, 작년에도 힘들었어요~♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「にぎやかな雰囲気にまぎれて、危ない企画もたくさんあるから気を付けてね♪」"
translation = "「왁자지껄한 분위기에 휩쓸려 위험한 기획도 많으니 조심해♪」"

[[dialogue]]
speaker = "unk"
original = "なんですかそれ！？"
translation = "그게 무슨 소리에요!?"

[[dialogue]]
speaker = "サーシャ"
original = "「そうねえ、去年のケースだと……薙刀部が真剣を使った演武を見せようとしたり、超能力研究会が入試問題を透視しようとして大問題になったり～♪」"
translation = "「글쎄, 작년 사례를 들자면…… 치도부(나기나타)가 진검을 사용한 연무를 보여주려 하거나, 초능력 연구회가 입시 문제를 투시하려다 큰 문제가 되기도 했지~♪」"

[[dialogue]]
speaker = "マトイ"
original = "「ふ、普通じゃないことばっかりのオープンキャンパスってわけですね。負けられない……！」"
translation = "「평, 평범하지 않은 것투성이인 오픈 캠퍼스라는 거군요. 질 수 없지……!」"

[[dialogue]]
speaker = "アナ"
original = "「その対抗意識はぜひ、書類へ向けてください。全員で取り掛かり、テキパキさばいていきましょう」"
translation = "「그 대항 의식은 부디 서류를 향해 주십시오. 전원이 달라붙어 척척 처리해 나갑시다」"

[[dialogue]]
speaker = "マトイ"
original = "「うん！\u3000ていうか、こんなに忙しいのにヴィーナスはどこに……？」"
translation = "「응! 근데 이렇게 바쁜 와중에 비너스는 어디에……?」"

[[dialogue]]
speaker = "unk"
original = "用事があるって言ってどこかへ……"
translation = "용무가 있다면서 어디론가 가버렸는데……"

[[dialogue]]
speaker = "マトイ"
original = "「もぉ～。目を離すといっつもこれなんだから……！」"
translation = "「정말~. 눈만 떼면 맨날 이렇다니까……!」"

[[dialogue]]
speaker = "unk"
original = "カフェテリアまで来て、だって"
translation = "카페테리아까지 와달래"

[[dialogue]]
speaker = "unk"
original = "あ、ヴィーナスからメッセージだ"
translation = "아, 비너스한테 메시지 왔다"

[[dialogue]]
speaker = "アナ"
original = "「はあ……前会長にも困ったものです。会長、話を聞くついでに連れ戻してきてください」"
translation = "「하아…… 전 회장에게도 참 곤란한 노릇입니다. 회장, 이야기 듣는 김에 다시 데려오세요」"

[[dialogue]]
speaker = "サーシャ"
original = "「行ってらっしゃ～い♪」"
translation = "「다녀와~♪」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「来たわね、クロト！」"
translation = "「왔구나, 쿠로토!」"

[[dialogue]]
speaker = "レミカ"
original = "「会長、ごめんね。忙しいところ無理を言って……来てくれて嬉しいな」"
translation = "「회장, 미안해. 바쁜 와중에 억지 부려서…… 와줘서 기뻐」"

[[dialogue]]
speaker = "レミカ"
original = "「実は会長に協力して欲しいことがあるんだ。……私が前から、アイドルユニットを結成したがってることは知ってる？」"
translation = "「사실 회장이 도와줬으면 하는 일이 있어. ……내가 전부터 아이돌 유닛을 결성하고 싶어 했다는 거 알고 있지?」"

[[dialogue]]
speaker = "unk"
original = "カワイイのアイドルをやりたいって聞いた"
translation = "귀여운 노선의 아이돌을 하고 싶다고 들었어"

[[dialogue]]
speaker = "unk"
original = "クールなアイドルじゃなくて"
translation = "쿨한 아이돌이 아니라"

[[dialogue]]
speaker = "レミカ"
original = "「うん。今のクール路線は最初のプロデューサーと相談して決まった見せ方で、それ自体は大成功だったと思ってる」"
translation = "「응. 지금의 쿨 노선은 첫 프로듀서와 상담해서 결정된 컨셉이었고, 그 자체는 대성공이었다고 생각해」"

[[dialogue]]
speaker = "レミカ"
original = "「デビュー曲がたまたま凄い作曲家さんに作ってもらえてね。自分で言うのもなんだけど、凄い名曲なんだ」"
translation = "「데뷔곡을 우연히 대단한 작곡가분이 만들어 주셨거든. 내 입으로 말하기 좀 그렇지만 정말 명곡이야」"

[[dialogue]]
speaker = "レミカ"
original = "「ただ、雰囲気がアーティスティックって言えばいいのかな？\u3000クールで最高なんだけど、あんまりアイドルっぽくはないんだよね」"
translation = "「다만 분위기가 아티스틱하다고 해야 하나? 쿨하고 최고지만, 그렇게 아이돌스럽지는 않단 말이지」"

[[dialogue]]
speaker = "レミカ"
original = "「未だに私は、そのデビュー曲を越えられずにいる……。悔しいけど、私の実力不足ってやつ」"
translation = "「아직도 나는 그 데뷔곡을 뛰어넘지 못하고 있어……. 분하지만 내 실력이 부족하다는 소리지」"

[[dialogue]]
speaker = "レミカ"
original = "「小さい頃に私が憧れたのは……『可愛い』を詰め込んだ、太陽みたいなアイドルだったから。いつかそういうアイドルがやりたいってずっと思ってて……」"
translation = "「어릴 때 내가 동경한 건…… 『귀여움』을 가득 담은 태양 같은 아이돌이었으니까. 언젠가 그런 아이돌을 하고 싶다고 계속 생각했어……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「で、事務所の社長に相談してたんだって！\u3000『１回だけ、自由にライブを企画させて欲しい』って」"
translation = "「그래서 기획사 사장님께 상담했다나 봐! 『한 번만 자유롭게 라이브를 기획하게 해달라』고!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それでとうとう許可が下りて、レミカのやりたいライブができるようになったのよ！」"
translation = "「그래서 드디어 허락이 떨어져서 레미카가 하고 싶은 라이브를 할 수 있게 된 거야!」"

[[dialogue]]
speaker = "レミカ"
original = "「それで、その自由に企画できるライブでは、ユニットとしてデビューしたいって思ってる」"
translation = "「그래서 그 자유 기획 라이브에서는 유닛으로서 데뷔하고 싶어」"

[[dialogue]]
speaker = "レミカ"
original = "「デビューといっても、１日限定ユニットになるのかな？\u3000そこはメンバーと相談にはなるんだけど……」"
translation = "「데뷔라고는 해도 1일 한정 유닛이 되려나? 그건 멤버와 상의해 봐야겠지만……」"

[[dialogue]]
speaker = "レミカ"
original = "「正直、私は自分の実力に伸び悩みを感じてる……。みんなは私をトップアイドルって呼んでくれるけど、自分１人ではこれ以上可能性を広げきることができない」"
translation = "「솔직히 나는 내 실력에 한계를 느끼고 있어……. 다들 나를 톱 아이돌이라고 불러주지만, 나 혼자서는 이 이상의 가능성을 확장할 수가 없어」"

[[dialogue]]
speaker = "レミカ"
original = "「でも！\u3000才能のある仲間と本気のステージがやれれば、きっと掴めると思うんだ。太陽みたいに元気をくれる、『可愛い』アイドルの本質が」"
translation = "「하지만! 재능 있는 동료와 진심인 무대를 할 수 있다면 분명 잡을 수 있을 거라 생각해. 태양처럼 활력을 주는 『귀여운』 아이돌의 본질을 말이야」"

[[dialogue]]
speaker = "unk"
original = "ライブが終わったらクール路線に戻るの？"
translation = "라이브가 끝나면 다시 쿨 노선으로 돌아가는 거야?"

[[dialogue]]
speaker = "unk"
original = "１日限定ユニットってことは……"
translation = "1일 한정 유닛이라는 건……"

[[dialogue]]
speaker = "レミカ"
original = "「それは私じゃなくて、ファンのみんなが決めることかな」"
translation = "「그건 내가 아니라 팬 여러분이 결정할 일 아닐까」"

[[dialogue]]
speaker = "レミカ"
original = "「アイドルは別に１人１属性ってわけでもなくて、楽曲やユニットごとに見せ方が違うことも多いから」"
translation = "「아이돌은 딱히 한 사람이 한 가지 속성만 가지라는 법도 없고, 곡이나 유닛마다 보여주는 방식이 다른 경우도 많으니까」"

[[dialogue]]
speaker = "レミカ"
original = "「今回の目的は、レッスンとライブの中で、仲間の才能を学ぶこと。<b>あの子</b>と一緒にユニットを組めれば、私はまた新しい自分を見つけ出せるって確信してる」"
translation = "「이번 목적은 레슨과 라이브 속에서 동료의 재능을 배우는 거야. <b>그</b> <b>아이</b>와 함께 유닛을 짤 수 있다면 나는 다시 새로운 나를 발견할 수 있을 거라 확신해」"

[[dialogue]]
speaker = "レミカ"
original = "「そんな私の姿を見て、ファンが何かを感じてくれれば……おのずと未来も変わってくるんじゃないかな」"
translation = "「그런 내 모습을 보고 팬들이 무언가를 느껴준다면…… 자연스레 미래도 바뀌지 않을까」"

[[dialogue]]
speaker = "unk"
original = "なるほど。話はよくわかったよ"
translation = "그렇구나. 이야기는 잘 알겠어"

[[dialogue]]
speaker = "レミカ"
original = "「うん、それで……会長にはそのライブ当日まで、ユニットのプロデュースをお願いしたいんだけど。……どうかな？」"
translation = "「응, 그래서…… 회장에게 그 라이브 당일까지 유닛의 프로듀싱을 부탁하고 싶은데. ……어때?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ライブの日はオープンキャンパスより先なの。約１ヶ月後……ってとこかしら？」"
translation = "「라이브 날은 오픈 캠퍼스보다 앞이야. 약 1개월 후…… 즈음일까?」"

[[dialogue]]
speaker = "unk"
original = "力になれるなら、ぜひ"
translation = "힘이 될 수 있다면 기꺼이"

[[dialogue]]
speaker = "unk"
original = "それなら問題ないよ"
translation = "그거라면 문제없어"

[[dialogue]]
speaker = "レミカ"
original = "「よかった。会長なら芸能事務所でのバイト経験もあるし、安心できるから」"
translation = "「다행이다. 회장이라면 연예 기획사 아르바이트 경험도 있고 안심할 수 있으니까」"

[[dialogue]]
speaker = "レミカ"
original = "「……で。さっそく今からプロデューサーの初仕事なんだけど。実はまだ、メンバー勧誘が終わってないんだ」"
translation = "「……자. 그럼 바로 지금부터 프로듀서의 첫 업무인데. 사실 아직 멤버 권유가 안 끝났어」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「その子の説得をクロトに頼みたいの。たぶんあなたが一番の適任者だから！」"
translation = "「그 아이를 설득하는 걸 쿠로토에게 맡기고 싶어. 아마 네가 제일 적임자일 테니까!」"

[[dialogue]]
speaker = "メルエル"
original = "「ふぅっ……ボランティア部を抜けるのに時間かかっちゃった。でも迷子の子猫ちゃん、飼い主さんが見つかってよかったぁ……」"
translation = "「후우…… 봉사부를 빠져나오는 데 시간이 좀 걸렸네. 그래도 길 잃은 아기 고양이, 주인분을 찾아서 다행이다……」"

[[dialogue]]
speaker = "メルエル"
original = "「ヴィーナスちゃんとレミカちゃん、２人から呼び出しなんて珍しいなあ。どうしたんだろ？」"
translation = "「비너스짱이랑 레미카짱, 두 사람한테 불려 나오다니 흔치 않은 일이네. 무슨 일일까?」"

[[dialogue]]
speaker = "メルエル"
original = "「え～っと……カフェのどこかに……ぁ、いたいた！」"
translation = "「에또…… 카페 어딘가에…… 아, 있다 있다!」"

[[dialogue]]
speaker = "unk"
original = "SE_3215でもＯＫ"
translation = "SE_3215"

[[dialogue]]
speaker = "メルエル"
original = "「──って、会長くんもいるっ！？」"
translation = "「──헉, 회장군도 있잖아!?」"

[[dialogue]]
speaker = "メルエル"
original = "「え、えーっと、髪の毛跳ねたりしてないよねっ。さっきまで猫ちゃん抱っこしてたし、毛玉とか……んーと、えーっと……よし！\u3000大丈夫！」"
translation = "「에, 에또, 머리카락 삐쳐 나오진 않았겠지. 방금 전까지 고양이 안고 있었으니까 털 뭉치라든가…… 음, 음…… 좋아! 괜찮아!」"

[[dialogue]]
speaker = "メルエル"
original = "「か、会長くんっ、お待たせ！\u3000──じゃなくてっ、ヴィーナスちゃん、レミカちゃん、お待たせっ！」"
translation = "「회, 회장군, 오래 기다렸지! ──가 아니라, 비너스짱, 레미카짱, 오래 기다렸어!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「来たわね、最後の１ピースが！」"
translation = "「왔구나, 마지막 한 조각이!」"

[[dialogue]]
speaker = "メルエル"
original = "「遅れちゃってごめん──って、え？\u3000１ピース……？」"
translation = "「늦어서 미안── 근데, 에? 한 조각……?」"

[[dialogue]]
speaker = "unk"
original = "昨日の雑談、現実になったみたい……"
translation = "어제 했던 잡담이 현실이 된 것 같아……"

[[dialogue]]
speaker = "メルエル"
original = "「え──？」"
translation = "「에──?」"

[[dialogue]]
speaker = "レミカ"
original = "「──姫咲メルエルさん、改めてお願いするね。私と一緒に、アイドルユニットを組んでくれないかな？」"
translation = "「──히메사키 메르엘 씨, 다시 한번 부탁할게. 나랑 같이 아이돌 유닛을 짜주지 않을래?」"

[[dialogue]]
speaker = "メルエル"
original = "「ええ～～～っ！？」"
translation = "「에에~~~~~!?」"

