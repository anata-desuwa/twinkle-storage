[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「隙間が生まれたのは……ワタシ自身にゲンインがある……？\u3000ど、どういうコトです！？」"
translation = "「틈새가 생긴 게…… 저 자신에게 원인이……? 어, 어떻게 된 일이에-요!?」"

[[dialogue]]
speaker_original = "雪女"
speaker_translation = "설녀"
original = "「フフフ……聞いての通りデス。ワカラナイとはイワセませんよ」"
translation = "「후후후…… 들은 대로예-요. 모른다고는 하지 못할 걸-요.」"

[[dialogue]]
speaker_original = "雪女"
speaker_translation = "설녀"
original = "「……スノボ」"
translation = "「……스노보드.」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「う！？」"
translation = "「윽!?」"

[[dialogue]]
speaker_original = "雪女"
speaker_translation = "설녀"
original = "「……こたつ。みかん。雪だるま。イルミネーション」"
translation = "「……코타츠. 귤. 눈사람. 일루미네이션.」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「う、う……！？」"
translation = "「우, 우윽……!?」"

[[dialogue]]
speaker = "unk"
original = "リップル……？"
translation = "리플……?"

[[dialogue]]
speaker = "unk"
original = "心当たりが？"
translation = "짐작 가는 데가 있어?"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「リップルさん……？」"
translation = "「리플 씨……?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「エエト、ジツは……」"
translation = "「에-또, 사실-은……」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ワタシは以前──モネやコウメイからクリスマスのハッピーをマナビました」"
translation = "「저는 예전에── 모네나 코우메이에게서 크리스마스의 해피를 배웠습니-다.」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「誰かをヨロコバせたい。大好きな誰かと一緒にタノシミたい……そんなキモチがこもった特別な日ナンだと」"
translation = "「누군가를 기쁘게 하고 싶다. 소중한 누군가와 함께 즐기고 싶다…… 그런 마음이 담긴 특별한 날이라-고.」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ソシテ、学園にいる他のフレンズからも、タクサンの冬の楽しみを教えてもらいマシタ」"
translation = "「그-리고 학원에 있는 다른 프렌즈들에게서도 수많은 겨울의 즐거움을 배웠습니-다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ふむふむ……ですが、それがどうして？」"
translation = "「흠흠…… 그런데 그게 어째서죠?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ハイ。そしてワタシは、それら『冬の楽しみ』もまとめてエンドレスサマーに取り込もうとシマシタ。ですが……」"
translation = "「네. 그래서 저는 그런 『겨울의 즐거움』도 합쳐서 엔들리스 서머에 받아들이려고 했습니-다. 하지만……」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「常夏のスノボや雪だるまについて──ワタシはまだ十分にイメージできていないのデス……！」"
translation = "「상하의 스노보드나 눈사람에 대해서── 저는 아직 충분히 이미지하지 못했어-요……!」"

[[dialogue]]
speaker_original = "雪女"
speaker_translation = "설녀"
original = "「フフ……ソウ。アナタはまだ夏スノボや夏こたつの開発ができてイナイ！」"
translation = "「후후…… 그-래. 당신은 아직 여름 스노보드나 여름 코타츠를 개발하지 못했-지!」"

[[dialogue]]
speaker_original = "雪女"
speaker_translation = "설녀"
original = "「つまり、このリゾート結界は今、一時的にフカンゼンな状態になってイルのデース！」"
translation = "「즉, 이 리조트 결계는 지금 일시적으로 불완전한 상태가 되어 있는 것이-에요!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「確かに夏こたつなんて見かけなかったけど…………って夏こたつって何！？」"
translation = "「확실히 여름 코타츠 같은 건 못 봤지만………… 그나저나 여름 코타츠가 뭐야!?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ソレをコレから考案するのデス！\u3000ソレが──常夏を永遠のモノとスル、リップルの使命デース！」"
translation = "「그-것을 이제부터 고안하는 것이-에요! 그-것이 상하를 영원한 것으로 만드는 리플의 사명이-에요!」"

[[dialogue]]
speaker_original = "雪女"
speaker_translation = "설녀"
original = "「フフ。無駄なコトを」"
translation = "「후후. 헛수고를.」"

[[dialogue]]
speaker_original = "雪女"
speaker_translation = "설녀"
original = "「認めるのです。あれらは冬にしかない、冬だけの醍醐味なのデスよ……！」"
translation = "「인정하세-요. 그것들은 겨울에만 있는, 겨울만의 묘미인 것이-에요……!」"

[[dialogue]]
speaker = "unk"
original = "まとめると──"
translation = "정리하자면──"

[[dialogue]]
speaker = "unk"
original = "人間界の『冬』を教えてもらったリップルは、その楽しみや醍醐味をエンドレスサマーに取り込もうと考えた。"
translation = "인간계의 『겨울』을 배우게 된 리플은 그 즐거움이나 묘미를 엔들리스 서머에 도입하려고 생각했다."

[[dialogue]]
speaker = "unk"
original = "しかし、その開発が追いつかずにいるうち、結界に『隙間』が生まれてしまった。"
translation = "하지만 그 개발이 따라가지 못하는 사이에 결계에 『틈새』가 생겨버린 것이다."

[[dialogue]]
speaker = "unk"
original = "今までのように結界の中で過ごしていたリップルには──芽生えるはずのないエラーなのだった。"
translation = "지금까지처럼 결계 안에서만 지내던 리플에게는── 생겨날 리 없는 에러였다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「なるほど……急速なリゾートの開発によって、一部でひずみが生じてしまっていたのですね」"
translation = "「과연…… 급격한 리조트 개발에 의해 일부에서 왜곡이 생겨버린 것이군요.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「んで、その隙間からあのチビが入り込んできたってわけだ！」"
translation = "「그래서 그 틈새로 저 꼬맹이가 기어들어왔다는 거군!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「確かに──リゾート地の急激な開発は、環境破壊をもたらすと言われていますからね」"
translation = "「확실히── 리조트지의 급격한 개발은 환경 파괴를 초래한다고들 하니까요.」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "（んな常識的な理屈が関係あんのか……？）"
translation = "(그런 상식적인 논리가 상관있는 거냐……?)"

[[dialogue]]
speaker_original = "雪女"
speaker_translation = "설녀"
original = "「フフ……この調子で結界内に『フユ』をさらに広げるとしまショウ」"
translation = "「후후…… 이 기세로 결계 내에 『겨울』을 더욱 넓히도록 하겠어-요.」"

[[dialogue]]
speaker_original = "雪女"
speaker_translation = "설녀"
original = "「ソーレ──お雑煮パニックデース！」"
translation = "「자-아── 오조니 패닉이에-요!」"

[[dialogue]]
speaker = "unk"
original = "雪女が羽衣の袖を振りまくと──"
translation = "설녀가 날개옷 소매를 휘두르자──"

[[dialogue]]
speaker = "unk"
original = "海の家を侵食するように、どでかいお雑煮の化け物が飛び出した！"
translation = "바다의 집을 침식하듯이 거대한 오조니 괴물이 튀어나왔다!"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「オー！\u3000夏の風情が台無しデ～ス！」"
translation = "「오-! 여름의 정취가 엉망진창이에-요!」"

[[dialogue]]
speaker_original = "雪女"
speaker_translation = "설녀"
original = "「フッフッフッ……リゾート開発を中止するのデス、リップル。夏におこたやイルミネーションナンテ、到底ジツゲン不可能な夢モノガタリでーす！」"
translation = "「훗훗훗…… 리조트 개발을 중지하세-요, 리플. 여름에 코타츠나 일루미네이션이라니, 도저히 실현 불가능한 꿈같은 이야기이에-요!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「く……屈するわけにはイキマセン！\u3000きっと海の家に適したイルミネーションもあるハズなんデス！」"
translation = "「큭…… 굴복할 수는 없습니-다! 분명 바다의 집에도 어울리는 일루미네이션이 있을 거예-요!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ゲンカイってヤツは──他人に決められるモノじゃないんデスよ……！」"
translation = "「한-계라는 건── 남이 결정하는 게 아니란 말이-에요……!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「リップルさん……！」"
translation = "「리플 씨……!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "（まあ、別に冬をそのまま楽しめばいいだけなんですが……）"
translation = "(뭐, 그냥 겨울을 그대로 즐기면 그만인 것 같습니다만……)"

[[dialogue]]
speaker_original = "雪女"
speaker_translation = "설녀"
original = "「何を言ってもムダなコト。冬の楽しさにひれ伏すがよいでーす！」"
translation = "「무슨 말을 해도 소용없는 짓. 겨울의 즐거움에 굴복하는 게 좋을 거예-요!」"

