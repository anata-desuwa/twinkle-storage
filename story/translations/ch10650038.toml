[[dialogue]]
speaker = "unk"
original = "ある日、イレーナに大聖堂に呼び出された。"
translation = "어느 날, 이레나가 대성당으로 나를 불러냈다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ちょっとこれ見て」"
translation = "「잠깐 이것 좀 봐.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「流星市国のホテルのチケット……？\u3000高級ホテルだったと思うけど、これどうしたんだ？」"
translation = "「유성시국의 호텔 티켓……? 고급 호텔이었던 것 같은데, 이거 어떻게 된 거야?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「外国の<ruby>来賓<rt>らいひん</rt></ruby>が流星市国に来るはずだったんだけど、突然来られなくなったらしくて。それで、手配していた教皇庁から『好きにしていい』って言われて、チケットをもらったの」"
translation = "「외국의 내빈이 유성시국에 올 예정이었는데, 갑자기 못 오게 됐나 봐. 그래서 수배했던 교황청에서 『마음대로 써도 좋다』는 말을 듣고 티켓을 받았어.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「こないだのバレンタインイベントのご褒美のつもりかしら。清貧はどこ行ったのよ」"
translation = "「요전번 발렌타인 이벤트의 포상일까. 청빈은 어디 간 거야 정말.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「まぁ、流星市国に住んでるのにホテルのチケットなんてもらっても困るけど、せっかく高級ホテルに泊まれる機会だし、無駄にするのはもったいないじゃない？」"
translation = "「뭐, 유성시국에 살면서 호텔 티켓 같은 걸 받아도 곤란하지만, 모처럼 고급 호텔에 묵을 기회고, 낭비하는 건 아깝잖아?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「だから……一緒に泊まりましょ？」"
translation = "「그러니까…… 같이 묵자?」"

[[dialogue]]
speaker = "unk"
original = "おめかししてホテルにチェックインし、予約されていた部屋に入ると、窓の外には夜景が広がっていた。"
translation = "한껏 꾸미고 호텔에 체크인하여 예약된 방에 들어가자, 창밖에는 야경이 펼쳐져 있었다."

[[dialogue]]
speaker = "unk"
original = "だけど俺は夜景よりも一緒にいる恋人の方が気になっていて、イレーナもそれは同じようだった。"
translation = "하지만 나는 야경보다 함께 있는 연인이 더 신경 쓰였고, 이레나도 마찬가지인 듯했다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ねぇ、こっち来て」"
translation = "「저기, 이쪽으로 와봐.」"

[[dialogue]]
speaker = "unk"
original = "イレーナはグラスに入ったドリンクを口に含むと、そのまま俺に口付けする。"
translation = "이레나는 잔에 든 음료를 입에 머금더니, 그대로 나에게 입을 맞춘다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「んむっ……くちゅるっ……じゅるっ……<emoji=heart04>\u3000んふ……へろっ、ちゅぷるっ……ちゅるる……じゅるじゅるるぅ……<emoji=heart04>」"
translation = "「음무…… 구츄릅…… 쥬릅……<emoji=heart04> 응후…… 헤로, 츄푸릅…… 츄르르…… 쥬르쥬르르……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "コーヒーとクリーム、そしてチョコレートの味がイレーナの舌でかき混ぜられて、甘さと苦みが広がる。"
translation = "커피와 크림, 그리고 초콜릿 맛이 이레나의 혀로 뒤섞여, 단맛과 쓴맛이 퍼진다."

[[dialogue]]
speaker = "unk"
original = "同時にイレーナの舌の柔らかさや、温かい体温を感じ、体の奥が熱くなっていく。"
translation = "동시에 이레나의 혀의 부드러움과 따뜻한 체온을 느끼며, 몸속 깊은 곳이 뜨거워진다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「んちゅる、じゅるっ……んふぅ……ちゅぷるる……<emoji=heart04>\u3000んっ、ぁふ……ちゅるれろっ……じゅるる……ぷぁっ──<emoji=heart04>」"
translation = "「음츄르, 쥬릅…… 응후우…… 츄푸르르……<emoji=heart04> 응, 아후…… 츄르레로…… 쥬르르…… 푸핫──<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「それじゃ……ベッド行きましょ」"
translation = "「그럼…… 침대로 가자.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「今日のあたしは神官じゃなくて、１人の女の子なんだから。あんたもそう扱ってね？」"
translation = "「오늘의 나는 신관이 아니라, 한 명의 여자아이니까. 너도 그렇게 대해줘, 알았지?」"

[[dialogue]]
speaker = "unk"
original = "ドレスをはだけてベッドに横たわると、ただでさえこぼれそうだった乳房が露わになり、胸が上下するのに合わせて重そうに揺れる。"
translation = "드레스를 헤치고 침대에 누우니, 안 그래도 넘칠 것 같았던 유방이 드러나고, 가슴이 들썩이는 것에 맞춰 묵직하게 흔들린다."

[[dialogue]]
speaker = "unk"
original = "俺を見つめる表情には微笑が浮かぶ……だけど、その笑みは少し強張っている気がした。"
translation = "나를 바라보는 표정에는 미소가 떠오른다…… 하지만, 그 미소는 조금 굳어 있는 느낌이 들었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「イレーナ、緊張してる？」"
translation = "「이레나, 긴장했어?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「そんなわけ……ううん、ちょっと緊張してる。想像してたよりホテルの雰囲気が良くて、舞い上がっちゃってるのかも……」"
translation = "「그럴 리가…… 아니, 조금 긴장했어. 상상했던 것보다 호텔 분위기가 좋아서, 들떠버린 걸지도…….」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「でも、あんたも似たようなもんでしょ？」"
translation = "「하지만, 너도 비슷하잖아?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ、俺も緊張してる」"
translation = "「아아, 나도 긴장했어.」"

[[dialogue]]
speaker = "unk"
original = "初めて泊まる高級ホテルの雰囲気は新鮮で、イレーナの大人びたドレスと相まって、興奮を引き立たせる。"
translation = "처음 묵는 고급 호텔의 분위기는 신선했고, 이레나의 어른스러운 드레스와 어우러져 흥분을 돋운다."

[[dialogue]]
speaker = "unk"
original = "そんな心地良い緊張の中、唇を重ねる。"
translation = "그런 기분 좋은 긴장 속에서, 입술을 겹친다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「んっ……ふぅ……んん……んふぅ……<emoji=heart04>」"
translation = "「응…… 후우…… 음음…… 응후우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "唇の柔らかさとイレーナの艶めかしい吐息を感じながら、大きな胸に手を伸ばす。"
translation = "입술의 부드러움과 이레나의 요염한 숨결을 느끼며, 커다란 가슴에 손을 뻗는다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「んんっ……<emoji=heart04>\u3000キスしながら、おっぱい、触られて……んんっ、んっふぅ……<emoji=heart04>\u3000んちゅぶっ、ちゅるっ<emoji=heart04>\u3000ふぅ……<emoji=heart04>」"
translation = "「음음……<emoji=heart04> 키스하면서, 가슴, 만져지고…… 음음, 응후우……<emoji=heart04> 음츄부, 츄릅<emoji=heart04> 후우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「んっ……んちゅっ、ちゅぷっ……ぷはぁ……<emoji=heart04>\u3000ねぇ、入れて……あたし、待ち切れなくなっちゃった……<emoji=heart04>」"
translation = "「응…… 음츄, 츄푸…… 푸하아……<emoji=heart04> 저기, 넣어줘…… 나, 더는 못 기다리겠어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "微笑ながら腰を軽くくねらせ、秘部を見せつけるイレーナ。"
translation = "미소 지으며 허리를 가볍게 비틀어, 비부를 내보이는 이레나."

[[dialogue]]
speaker = "unk"
original = "そこはもう蜜で濡れていて、俺の興奮も膨れ上がり、いきり立ったペニスを添える。"
translation = "그곳은 이미 애액으로 젖어 있었고, 나의 흥분도 부풀어 올라, 발기한 자지를 갖다 댄다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「イレーナ、いくよ」"
translation = "「이레나, 갈게.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「うん、来て……」"
translation = "「응, 와줘…….」"

[[dialogue]]
speaker = "unk"
original = "そしてペニスをゆっくりと突き入れて──"
translation = "그리고 자지를 천천히 밀어 넣자──"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「んんぁっ──あっ──ふぁあ～～～～っ<emoji=heart04>」"
translation = "「음음아── 앗── 하아아~~~~앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「んはぁ、はぁ……あんたの……相変わらず、大きいわね……あたしの中、いっぱいになっちゃう……」"
translation = "「음하아, 하아…… 너의…… 여전히, 크네…… 내 안이, 가득 차버려…….」"

[[dialogue]]
speaker = "unk"
original = "イレーナの中はすでに十分潤っていた。"
translation = "이레나의 안은 이미 충분히 젖어 있었다."

[[dialogue]]
speaker = "unk"
original = "熱く柔らかな粘膜に包まれて、こうして繋がっているだけでも達してしまいそうだ。"
translation = "뜨겁고 부드러운 점막에 감싸여, 이렇게 연결되어 있는 것만으로도 가버릴 것 같다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「イレーナの中、いつもより熱い気がする」"
translation = "「이레나 안, 평소보다 뜨거운 기분이 들어」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「っ……そう、かも……なんか、あんたのがビクビクする度に、お腹の奥、きゅうってなっちゃう……<emoji=heart04>」"
translation = "「으…… 그럴, 지도…… 왠지, 네 게 파르르 떨릴 때마다, 배 속 깊은 곳이, 꽉 조여버려……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「はぁ、はっ……動い、て……<emoji=heart04>\u3000今日はもっとゆっくり、したかったけど……もう我慢できそうに、ないから……<emoji=heart04>」"
translation = "「하아, 하앗…… 움직여, 줘……<emoji=heart04> 오늘은 좀 더 천천히, 하고 싶었지만…… 이제 더는 못 참을 것 같으니까……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "イレーナも敏感になっているのか、まだ動いていないのに膣壁がきゅうきゅうと締め付けてくる。"
translation = "이레나도 민감해진 것인지, 아직 움직이지 않았는데도 질벽이 꽉꽉 조여온다."

[[dialogue]]
speaker = "unk"
original = "甘い刺激と言葉に俺もたまらなくなって、腰を動かし始めた。"
translation = "달콤한 자극과 말에 나도 견딜 수 없게 되어, 허리를 움직이기 시작했다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「はああぁっ……<emoji=heart04>\u3000あっ……はぁ……<emoji=heart04>\u3000はあぁ……あっ、んっ……んんぅっ……<emoji=heart04>」"
translation = "「하아아앗……<emoji=heart04> 앗…… 하아……<emoji=heart04> 하아아…… 앗, 응…… 으으윽……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あんたのおち○ぽ、あたしの中で、動いて……ふあぁっ<emoji=heart04>\u3000んんはぁっ……あっ……んっ……ひああぁっ……<emoji=heart04>」"
translation = "「네 자지, 내 안에서, 움직여서…… 후아앗<emoji=heart04> 응하앗…… 앗…… 응…… 히아아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あっ、はぁっ……<emoji=heart04>\u3000はあぁ……おま○こ熱いぃ……んん、ふぅ……はぁっ、はっ、ああぁんっ……<emoji=heart04>」"
translation = "「앗, 하앗……<emoji=heart04> 하아아…… 보지 뜨거워어…… 으응, 후우…… 하앗, 하앗, 아아앙……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ふぅはぁ、はっ、あんっ……<emoji=heart04>\u3000あんたの、おっきい……<emoji=heart04>\u3000あたしの中、あんたので、広げられてるっ……<emoji=heart04>」"
translation = "「후우하아, 하앗, 아앙……<emoji=heart04> 네 거, 커어……<emoji=heart04> 내 안이, 네 걸로, 벌려지고 있어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスが前後に動く度、蜜で潤った膣壁と摩擦して快感が走る。"
translation = "페니스가 전후로 움직일 때마다, 애액으로 젖은 질벽과 마찰하며 쾌감이 달린다."

[[dialogue]]
speaker = "unk"
original = "同時に膣内がひくひくと震え、イレーナも感じているのが伝わってきた。"
translation = "동시에 질 내부가 파르르 떨리며, 이레나도 느끼고 있다는 것이 전해져 왔다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「んんぅっ……<emoji=heart04>\u3000おち○ぽ、ビクビクして……あたしの中で、大きくなってる……<emoji=heart04>\u3000はぁ、んっ、はぁっ……<emoji=heart04>」"
translation = "「으으윽……<emoji=heart04> 자지, 파르르 떨려서…… 내 안에서, 커지고 있어……<emoji=heart04> 하아, 응, 하앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「硬くて、大きいので……お腹の中、ゴリゴリって……ふあぁっ<emoji=heart04>\u3000はあぁ……ああっ、はぁっ、んんっ……<emoji=heart04>」"
translation = "「딱딱하고, 커서…… 배 속이, 고드득거려…… 후아앗<emoji=heart04> 하아아…… 아앗, 하앗, 으응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ひやぁっ、あっ、はあぁっ……<emoji=heart04>\u3000おち○ぽの形、感じる……ふあぁ……あっ……<emoji=heart04>\u3000んっ、はぁっ、はあぁんっ……<emoji=heart04>」"
translation = "「히야앗, 앗, 하아앗……<emoji=heart04> 자지 모양, 느껴져…… 후아아…… 앗…… 응, 하앗, 하아앙……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "突かれる度に揺れる大きなおっぱいを優しく揉む。"
translation = "박힐 때마다 흔들리는 커다란 가슴을 부드럽게 주무른다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ひやぁっ……<emoji=heart04>\u3000おっぱい、やわやわって、揉まれてぇ……はあぁ……あっ……体、熱くなる……っ<emoji=heart04>」"
translation = "「히야앗……<emoji=heart04> 가슴, 말랑말랑하게, 주물러져서…… 하아아…… 앗…… 몸이, 뜨거워져……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あんた、おっぱい好きすぎぃ……はぁ……ぁっ……<emoji=heart04>\u3000好きにして、いいけどぉ……あっ、んんんっ<emoji=heart04>」"
translation = "「너, 가슴 너무 좋아해…… 하아…… 아……<emoji=heart04> 마음대로 해도, 좋지만…… 앗, 으으윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "大きなおっぱいは手のひらに収まりきらなくて、指の間から乳肉がこぼれる。"
translation = "커다란 가슴은 손바닥에 다 들어오지 않아서, 손가락 사이로 가슴살이 넘쳐흐른다."

[[dialogue]]
speaker = "unk"
original = "さらに、ツンと硬くなった乳首に指先で触れた。"
translation = "거기에, 꼿꼿하게 딱딱해진 유두를 손가락 끝으로 건드렸다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「んん～～～っ<emoji=heart04>\u3000乳首、弱いんだってばぁ……<emoji=heart04>\u3000あぁっ……はっ……ああぁんっ<emoji=heart04>」"
translation = "「으으으음~~~윽<emoji=heart04> 유두, 약하다고 했잖아……<emoji=heart04> 아앗…… 하앗…… 아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ふぁあっ<emoji=heart04>\u3000あっ──ひやぁああっ<emoji=heart04>\u3000そこ、弱いって言ってるのにぃっ<emoji=heart04>\u3000んんんっ<emoji=heart04>」"
translation = "「후아앗<emoji=heart04> 앗── 히야아아앗<emoji=heart04> 거기, 약하다고 말했는데에<emoji=heart04> 으으윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "乳首を弄る度、イレーナの体が震え、愛液の量が増す。"
translation = "유두를 괴롭힐 때마다, 이레나의 몸이 떨리며 애액의 양이 늘어난다."

[[dialogue]]
speaker = "unk"
original = "蕩けた肉壁に締め付けられ、熱い体温と心地良い圧迫感を感じながら、射精欲が高まっていく。"
translation = "녹아내린 육벽에 조여지며, 뜨거운 체온과 기분 좋은 압박감을 느끼는 가운데 사정 욕구가 높아져 간다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「はぁっ、あっ<emoji=heart04>\u3000おま○こと、おっぱい、一緒にされて……気持ちいいっ……<emoji=heart04>」"
translation = "「하앗, 앗<emoji=heart04> 보지랑, 가슴, 같이 당해서…… 기분 좋아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「乳首ジンジンして、すごく感じちゃうっ<emoji=heart04>\u3000ふぁあっ<emoji=heart04>\u3000はぁっ……あっ……あっ、あんっ<emoji=heart04>」"
translation = "「유두가 찌릿찌릿해서, 엄청 느껴버려<emoji=heart04> 후아앗<emoji=heart04> 하앗…… 앗…… 앗, 아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "かわいく喘ぐ声はチョコレートのような甘さで、高まる気持ちを込めてイレーナに呼びかける。"
translation = "귀엽게 내뱉는 신음 소리는 초콜릿 같은 달콤함으로, 고조되는 마음을 담아 이레나를 부른다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「好きだよ、イレーナ」"
translation = "「좋아해, 이레나」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「～～～っ<emoji=heart04>\u3000こんな時に言わないでよ、バカぁ……<emoji=heart04>」"
translation = "「~~~~윽<emoji=heart04> 이럴 때 말하지 마, 바보야……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "好きという言葉に反応するように、膣がきゅっと締まった。"
translation = "좋아한다는 말에 반응하듯, 질이 꽉 조여졌다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あたしも、好きなんだから……ひぁっ、あっ……ふあぁっ<emoji=heart04>\u3000あんたのこと、好き……<emoji=heart04>」"
translation = "「나도, 좋아하니까…… 히앗, 앗…… 후아앗<emoji=heart04> 너를, 좋아해……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「好きだから、あんたと繋がるの、いい<emoji=heart04>\u3000ふはぁ、あぁっ<emoji=heart04>\u3000熱くて、気持ち良く、なっちゃぅっ<emoji=heart04>」"
translation = "「좋아하니까, 너랑 이어지는 거, 좋아<emoji=heart04> 후하아, 아앗<emoji=heart04> 뜨겁고, 기분 좋게, 되어버려어<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ふやあぁっ……<emoji=heart04>\u3000おま○こ、溶けちゃいそう……はぁっ、はっ……<emoji=heart04>\u3000こんなにお腹、熱いの、初めて……<emoji=heart04>」"
translation = "「후야아앗……<emoji=heart04> 보지, 녹아버릴 것 같아…… 하앗, 하앗…… 이렇게 배 속이, 뜨거운 거, 처음이야……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「んんっ……はぁっ、はあぁっ……<emoji=heart04>\u3000お腹の奥、きゅうって、切ないの……はぁっ、はっ……あっ、んんっ<emoji=heart04>」"
translation = "「으응…… 하앗, 하아앗……<emoji=heart04> 배 속 깊은 곳이, 꽉 조여서, 애달파…… 하앗, 하앗…… 앗, 으응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「んはぁ、はっ、はぁっ<emoji=heart04>\u3000おま○こ熱くて、キュンキュンしてるのっ<emoji=heart04>\u3000おかしく、なりそうっ<emoji=heart04>」"
translation = "「으하아, 하앗, 하앗<emoji=heart04> 보지 뜨거워서, 큥큥거려어<emoji=heart04> 이상하게, 될 것 같아<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「もっと来て<emoji=heart04>\u3000もっと強く<emoji=heart04>\u3000はぁっ、あっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000あんたを、感じたい……<emoji=heart04>\u3000もっと、感じさせてっ……<emoji=heart04>」"
translation = "「더 와 줘<emoji=heart04> 더 강하게<emoji=heart04> 하앗, 앗<emoji=heart04> 으응…… 너를, 느끼고 싶어…… 더, 느끼게 해 줘……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ひやぁ～～っ<emoji=heart04><emoji=heart04>\u3000ふああぁっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000ああっ<emoji=heart04>\u3000ふぁっ<emoji=heart04>\u3000はっ<emoji=heart04>\u3000あっ、ああぁんっ<emoji=heart04>」"
translation = "「히야아~~앗<emoji=heart04><emoji=heart04> 후아아앗<emoji=heart04> 하아아앗<emoji=heart04> 앗<emoji=heart04> 으응<emoji=heart04> 아앗<emoji=heart04> 후앗<emoji=heart04> 하앗<emoji=heart04> 앗, 아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「激し、いっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000あっ──ああっ──ん～～っ<emoji=heart04>\u3000おち○ぽ、奥に届いて、あたしの中、ぐちゃぐちゃになっちゃうっ<emoji=heart04>」"
translation = "「격렬, 해<emoji=heart04> 하아아앗<emoji=heart04> 앗── 아앗── 으으응~윽<emoji=heart04> 자지, 안쪽까지 닿아서, 내 안, 엉망진창이 되어버려어<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「おち○ぽズンズンされてっ<emoji=heart04>\u3000おま○こ感じちゃうっ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000ふぁあっ<emoji=heart04>\u3000んぁっ<emoji=heart04>\u3000ひぃあああっ<emoji=heart04>」"
translation = "「자지가 푹푹 박혀서어<emoji=heart04> 보지 느껴버려어<emoji=heart04> 기분 좋아<emoji=heart04> 후아앗<emoji=heart04> 응아앗<emoji=heart04> 히이아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスを勢いよく突き入れられ、口の端からよだれを垂らしながら喘ぐイレーナ。"
translation = "페니스를 기세 좋게 찔러넣어지자, 입가에서 침을 흘리며 신음하는 이레나."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「はあぁっ<emoji=heart04>\u3000あっ、ふああぁっ<emoji=heart04>\u3000奥に、当たってっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000おち○ぽ、子宮に、コツコツ当たってぇっ<emoji=heart04>」"
translation = "「하아아앗<emoji=heart04> 앗, 후아아앗<emoji=heart04> 안쪽에, 닿아서어<emoji=heart04> 아아앙<emoji=heart04> 자지, 자궁에, 툭툭 닿아서어<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ひぃああっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000おち○ぽ、子宮に当たると、頭、真っ白になるっ<emoji=heart04>\u3000気持ち、よすぎるのっ<emoji=heart04>」"
translation = "「히이아앗<emoji=heart04> 앗<emoji=heart04> 으응<emoji=heart04> 자지, 자궁에 닿으면, 머릿속이, 하얘져어<emoji=heart04> 기분, 너무 좋아아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "イレーナも自分から腰を動かし、ペニスを迎えながら嬌声を上げる。"
translation = "이레나도 스스로 허리를 움직여, 페니스를 맞이하며 교성을 지른다."

[[dialogue]]
speaker = "unk"
original = "暴れるように揺れる胸に誘われ、おっぱいを鷲掴みにした。"
translation = "날뛰듯 흔들리는 가슴에 유혹되어, 가슴을 움켜쥐었다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ひやぁっ！？\u3000んんっ……<emoji=heart04>\u3000おっぱい、熱いっ<emoji=heart04>\u3000はあぁっ、はぁっ<emoji=heart04>\u3000ああぁんっ<emoji=heart04>」"
translation = "「히야앗!? 으으윽……<emoji=heart04> 가슴, 뜨거워어<emoji=heart04> 하아아앗, 하앗<emoji=heart04> 아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「いいわよっ<emoji=heart04>\u3000あたしのおっぱい、もっとめちゃくちゃにしてっ<emoji=heart04>\u3000あんたの好きにしてっ<emoji=heart04>」"
translation = "「좋아<emoji=heart04> 내 가슴, 좀 더 엉망진창으로 만들어줘<emoji=heart04> 네 마음대로 해줘<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ここまで言われて我慢できるはずなく、衝動のまま強く揉みしだく。"
translation = "여기까지 듣고 참을 수 있을 리 없어, 충동이 이끄는 대로 강하게 주물러 터뜨린다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「んん～～っ<emoji=heart04>\u3000おっぱい揉みくちゃにされて、あんたのこと、感じるっ<emoji=heart04>」"
translation = "「응응~~<emoji=heart04> 가슴이 마구 주물러져서, 네가 느껴져<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ふぁあっ<emoji=heart04>\u3000はっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000はぁはっ<emoji=heart04>\u3000あ──あ──んんぁ～～っ<emoji=heart04>」"
translation = "「후아앗<emoji=heart04> 하앗<emoji=heart04> 앗<emoji=heart04> 아앙<emoji=heart04> 하아하앗<emoji=heart04> 아──아──응응아~~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "だけどそれでも足りなくて、胸の先端に吸い付いた。"
translation = "하지만 그것만으론 부족해서, 가슴 끝부분을 빨아올렸다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ひぁああぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000んん──ふっ──ん～っ<emoji=heart04>\u3000ちゅうちゅうって吸われてる……んん～～っ<emoji=heart04>」"
translation = "「히아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 응응──후──응~<emoji=heart04> 쮸웁쮸웁 빨리고 있어…… 응응~~<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「乳首、弱いのに、吸われて……んふぅっ……<emoji=heart04>\u3000まだおっぱい出ないのにっ<emoji=heart04>\u3000あ、これ、ダメ……はああぁ<emoji=heart04>」"
translation = "「유두, 약한데, 빨려서…… 응후우……<emoji=heart04> 아직 젖 안 나오는데<emoji=heart04> 아, 이거, 안 돼…… 하아아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「おっぱい吸われて、お腹熱いぃっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000お腹の奥、切なくて、きゅぅってなるのっ<emoji=heart04>」"
translation = "「가슴 빨려서, 배 안쪽이 뜨거워어<emoji=heart04> 하아앗<emoji=heart04> 응응<emoji=heart04> 배 깊은 곳이, 애달파서, 큥 하고 울려<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "貪るようにイレーナの乳首をしゃぶりながら、奥めがけて突き続け、射精欲が限界まで高まっていく。"
translation = "탐하듯이 이레나의 유두를 빨면서, 안쪽을 향해 계속 찔러대자, 사정욕이 한계까지 고조되어 간다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「んんっ<emoji=heart04><emoji=heart04>\u3000おち○ぽドクドクって<emoji=heart04>\u3000あっ<emoji=heart04>\u3000おま○この中で、おち○ぽ、跳ねてるっ<emoji=heart04>」"
translation = "「응응<emoji=heart04><emoji=heart04> 자지 울컥울컥거려<emoji=heart04> 앗<emoji=heart04> 보지 안에서, 자지가, 펄떡이고 있어<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺、イレーナの中に出したい……！」"
translation = "「나, 이레나 안에 내보내고 싶어……!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「うん、来て……！\u3000あたしの中に、出してっ！\u3000あんたで、あたしの中、いっぱいにしてぇっ<emoji=heart04>」"
translation = "「응, 와줘……! 내 안에, 내보내줘! 너로, 내 안을, 가득 채워줘어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "限界まで勢いを加速させ、何度も最奥まで貫く。"
translation = "한계까지 기세를 가속시켜, 몇 번이고 가장 깊은 곳까지 꿰뚫는다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ひやぁあ～～っ<emoji=heart04><emoji=heart04>\u3000あぁあっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000あんたのこと、感じるっ<emoji=heart04>」"
translation = "「히야아아~~<emoji=heart04><emoji=heart04> 아아앗<emoji=heart04> 앗<emoji=heart04> 응응<emoji=heart04> 네가 느껴져<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あっ<emoji=heart04>\u3000おま○こ、切ないっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>\u3000お腹の奥っ、キュンって、あんたのせーし、欲しがってるっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 보지, 애달파<emoji=heart04> 후아아앗<emoji=heart04> 배 깊은 곳이, 큥 하고, 네 정자, 원하고 있어<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「イかせてっ<emoji=heart04>\u3000おま○こに、いっぱい出してっ<emoji=heart04>\u3000んあっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんたのせーえきで、イかせてっ<emoji=heart04>\u3000あたしの子宮、いっぱいに満たしてっ<emoji=heart04>」"
translation = "「가게 해줘<emoji=heart04> 보지에, 잔뜩 내보내줘<emoji=heart04> 응앗<emoji=heart04> 앗<emoji=heart04> 네 정액으로, 가게 해줘<emoji=heart04> 내 자궁, 가득 채워줘<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ひぁああ～～っ<emoji=heart04>\u3000あぁっ──あっ──んんっ<emoji=heart04>\u3000おち○ぽビクビクして、爆発しそうっ<emoji=heart04>\u3000んんはっ<emoji=heart04>\u3000ふあぁああっ<emoji=heart04>」"
translation = "「히아아아~~<emoji=heart04> 아앗──앗──응응<emoji=heart04> 자지 파르르 떨려서, 폭발할 것 같아<emoji=heart04> 응응핫<emoji=heart04> 후아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000おま○こイッちゃうっ<emoji=heart04>\u3000んぁ──あ──あ──ひぁああっ<emoji=heart04>\u3000ひぁっ<emoji=heart04>\u3000あぁああっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 보지 가버려어<emoji=heart04> 응아──아──아──히아아앗<emoji=heart04> 히앗<emoji=heart04> 아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「はぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんんっ<emoji=heart04>\u3000イクイクイクぅっ<emoji=heart04>\u3000せーえき出されて、イッちゃぅっ<emoji=heart04>\u3000あ、あ、あ、あっ──」"
translation = "「하앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 응응응<emoji=heart04> 가가 가버려어앗<emoji=heart04> 정액 나와서, 가버려어<emoji=heart04> 아, 아, 아, 앗──」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ひぁああぁっ<emoji=heart04>\u3000あっ──あぁあああぁああ～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「히아아아앗<emoji=heart04> 앗──아아아아아아아아~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「んんっ──んんん～～～っ<emoji=heart04>\u3000ドクドクってぇ……あついの、あたしの中に、出て……<emoji=heart04>\u3000はぁ……ああぁっ……あんっ……<emoji=heart04>」"
translation = "「응응──응응응~~~<emoji=heart04> 울컥울컥거려…… 뜨거운 거, 내 안에, 나와서……<emoji=heart04> 하아…… 아아앗…… 앙……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "イレーナが達すると同時に膣壁がぎゅっと締め付けてきて、強く絞られながら射精し続ける。"
translation = "이레나가 절정에 달함과 동시에 질벽이 꽉 조여왔고, 강하게 쥐어짜이며 사정을 계속한다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ふぁ……ああぁっ……<emoji=heart04>\u3000おち○ぽ、脈打って、せーえき出てるぅ……<emoji=heart04>\u3000はっ……んっ……<emoji=heart04>\u3000あんたのせーえき、子宮に、注がれてる……<emoji=heart04>」"
translation = "「후아…… 아아앗……<emoji=heart04> 자지, 맥동하면서, 정액 나오고 있어……<emoji=heart04> 하앗…… 응……<emoji=heart04> 네 정액, 자궁에, 부어지고 있어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「はぁっ……あっ……はあぁ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000奥に、射精されるの、気持ちいいっ<emoji=heart04>」"
translation = "「하앗…… 앗…… 하아아<emoji=heart04> 응응<emoji=heart04> 깊숙이, 사정되는 거, 기분 좋아<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「全部出して……あたしの、中に……あっ<emoji=heart04>\u3000はあぁ……あん……んん……<emoji=heart04>」"
translation = "「전부 내보내줘…… 내, 안에…… 앗<emoji=heart04> 하아아…… 앙…… 응응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「はあぁ、はぁ……お腹、熱い……<emoji=heart04>\u3000はぁ……ふぅ……<emoji=heart04>」"
translation = "「하아아, 하아…… 배, 뜨거워……<emoji=heart04> 하아…… 후우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスが抜け、膣口から精液をこぼしながら息を整えるイレーナ。"
translation = "페니스가 빠지고, 질구에서 정액을 흘리며 숨을 고르는 이레나."

[[dialogue]]
speaker = "unk"
original = "俺も満足感を覚えながら、心地良い疲労に身を委ねる。"
translation = "나도 만족감을 느끼며, 기분 좋은 피로에 몸을 맡긴다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「なんていうか……いつもより深く繋がれた気がするかも……」"
translation = "「뭐랄까…… 평소보다 깊게 이어진 기분이 들지도……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「たまたまもらったホテルのチケットだけど……まぁ、たまにはこんなのもいいわよね」"
translation = "「우연히 받은 호텔 티켓이지만…… 뭐, 가끔은 이런 것도 괜찮네」"

[[dialogue]]
speaker = "unk"
original = "快楽の余韻を残しながら、蕩けた微笑みを浮かべるイレーナ。"
translation = "쾌락의 여운을 남기며, 황홀한 미소를 짓는 이레나."

[[dialogue]]
speaker = "unk"
original = "そんなイレーナが愛おしくて、今日何度目かわからないキスを交わす。"
translation = "그런 이레나가 사랑스러워서, 오늘 몇 번째인지 모를 키스를 나눈다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ちゅっ……<emoji=heart04>\u3000もう、そんなにキスしたら唇ふやけちゃうわよ……<emoji=heart04>」"
translation = "「쪽……<emoji=heart04> 정말, 그렇게 키스하면 입술이 불어버린다구……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「まだ夜は長いし、シャワーで汗を流したら夜景でも眺めましょうか。せっかくホテルに来たんだから、そっちも楽しまないと損でしょ」"
translation = "「아직 밤은 기니까, 샤워로 땀을 씻어내면 야경이라도 구경할까. 어렵게 호텔에 왔으니까, 그쪽도 즐기지 않으면 손해잖아」"

[[dialogue]]
speaker = "unk"
original = "誰にも邪魔されない２人きりの夜を、心行くまで楽しんだ。"
translation = "누구에게도 방해받지 않는 둘만의 밤을 마음껏 즐겼다."

