[[dialogue]]
speaker = "unk"
original = "第２話,頂,B"
translation = "제2화, 정, B"

[[dialogue]]
speaker = "unk"
original = "そして俺たちは──続く階層も駆け抜けた。"
translation = "그리고 우리들은── 계속되는 계층도 달려 나갔다."

[[dialogue]]
speaker = "unk"
original = "かつて煌竜と戦った第三階層も、続く第四階層も……"
translation = "예전에 황룡과 싸웠던 제3계층도, 이어지는 제4계층도……"

[[dialogue]]
speaker = "unk"
original = "かつてセイファート学園長が踏破したという道のりをなぞるようにして。時おり強引に壁を突破して。"
translation = "예전에 세이퍼트 학원장이 답파했다는 길을 따라가듯이. 때때로 억지로 벽을 돌파하면서."

[[dialogue]]
speaker = "unk"
original = "フィーニスの塔を駆け上がっていった。"
translation = "피니스의 탑을 달려 올라갔다."

[[dialogue]]
speaker = "unk"
original = "そして……"
translation = "그리고……"

[[dialogue]]
speaker = "unk"
original = "一陣の夜風が吹き抜ける。"
translation = "한 줄기 밤바람이 불어 지나간다."

[[dialogue]]
speaker = "unk"
original = "昇りつめた先に待っていたのは、楕円に広がる空の庭園だった。"
translation = "올라선 끝에 기다리고 있던 것은, 타원형으로 펼쳐진 하늘의 정원이었다."

[[dialogue]]
speaker = "unk"
original = "<ruby>寂寞<rt>じゃくまく</rt></ruby>たる夜の<ruby>帳<rt>とばり</rt></ruby>の下で、俺たちの到達を祝うように聖なる光が灯っている。"
translation = "적막한 밤의 장막 아래에서, 우리들의 도달을 축하하듯이 성스러운 빛이 켜져 있다."

[[dialogue]]
speaker = "アナ"
original = "「ここが……」"
translation = "「여기가……」"

[[dialogue]]
speaker = "ソフィア"
original = "「フィーニスの塔の──頂上……」"
translation = "「피니스의 탑의── 정상……」"

[[dialogue]]
speaker = "unk"
original = "そして──少女はその地で待っていた。"
translation = "그리고── 소녀는 그곳에서 기다리고 있었다."

[[dialogue]]
speaker = "unk"
original = "表情は半分しか見えない。だが、俺たちを見ても眉ひとつ動いていないのはわかった。"
translation = "표정은 절반밖에 보이지 않는다. 하지만, 우리들을 보고도 눈썹 하나 움직이지 않는다는 것을 알 수 있었다."

[[dialogue]]
speaker = "フィオナ"
original = "「……姉さん。こちらを向いてください」"
translation = "「……언니. 이쪽을 봐주세요」"

[[dialogue]]
speaker = "アポロ"
original = "「……？\u3000おかしいな……小バエはさっき、地上へ落としたはずだが……」"
translation = "「……? 이상하군…… 잔챙이는 아까, 지상으로 떨어뜨렸을 텐데……」"

[[dialogue]]
speaker = "フィオナ"
original = "「泥臭く昇ってきました。伝えたいことは変わりません」"
translation = "「진흙투성이로 올라왔습니다. 전하고 싶은 것은 변함없습니다」"

[[dialogue]]
speaker = "アポロ"
original = "「諦めの悪いれんちゅうだ」"
translation = "「포기할 줄 모르는 녀석들이군」"

[[dialogue]]
speaker = "アポロ"
original = "「だが……どうしてこの状況で星術が使える？」"
translation = "「하지만…… 어째서 이 상황에서 성술을 쓸 수 있지?」"

[[dialogue]]
speaker = "クロト"
original = "「少々、ズルさせてもらってな」"
translation = "「좀, 반칙을 좀 했거든」"

[[dialogue]]
speaker = "リノ"
original = "「人の子には──人の子なりの知恵があるのよ。使徒さん」"
translation = "「인간에게는── 인간 나름의 지혜가 있는 법이야. 사도 씨」"

[[dialogue]]
speaker = "unk"
original = "辺り一帯へ展開させる魔具──星骸布。"
translation = "주변 일대에 전개시키는 마구── 성해포."

[[dialogue]]
speaker = "unk"
original = "魔界の星空をリンクさせることで、俺たちは一時的にでも星騎士として復活する。"
translation = "마계의 밤하늘을 링크시킴으로써, 우리들은 일시적으로나마 성기사로서 부활한다."

[[dialogue]]
speaker = "クロト"
original = "「これでもう、俺たちに天蓋は通じない。今度こそ真っ向から向き合ってもらう」"
translation = "「이걸로 더 이상, 우리에게 천개는 통하지 않아. 이번에야말로 정면으로 마주하게 할 거야」"

[[dialogue]]
speaker = "アポロ"
original = "「布……？\u3000ふん。悪党はいつも妙な武器ばかり使う」"
translation = "「천……? 흥. 악당은 언제나 이상한 무기만 쓰는군」"

[[dialogue]]
speaker = "unk"
original = "本来、星骸布は制限時間つきのアイテムだが──それを告げる必要はない。速やかに決着をつける。"
translation = "본래, 성해포는 제한 시간이 있는 아이템이지만── 그것을 고할 필요는 없다. 신속하게 결판을 짓는다."

[[dialogue]]
speaker = "クロト"
original = "「この流れ星の雨……君の仕業か？」"
translation = "「이 유성우…… 네 짓인가?」"

[[dialogue]]
speaker = "アポロ"
original = "「もちろんだ」"
translation = "「물론이다」"

[[dialogue]]
speaker = "アポロ"
original = "「今はしぶとく防がれてるが……問題ない。大昔のキョーリューだって、たった一発の隕石で滅んだんだからな」"
translation = "「지금은 끈질기게 막고 있지만…… 문제없다. 아주 옛날 공룡도, 단 한 발의 운석으로 멸망했으니까」"

[[dialogue]]
speaker = "アポロ"
original = "「この流星群で……オマエたち全員終わらせてやる……！」"
translation = "「이 유성군으로…… 너희들 전원 끝장내주마……!」"

[[dialogue]]
speaker = "フィオナ"
original = "「……なるほど。ですが、姉さん」"
translation = "「……과연. 하지만, 언니」"

[[dialogue]]
speaker = "フィオナ"
original = "「それは本当に──ヒーローの行いと言えるでしょうか？」"
translation = "「그것이 정말로── 히어로의 행동이라고 말할 수 있을까요?」"

[[dialogue]]
speaker = "アポロ"
original = "「何……？」"
translation = "「뭐……?」"

[[dialogue]]
speaker = "フィオナ"
original = "「たとえリクリエが、よりよき世界を目指して刷新するものだったとしても。今を生きている人類を滅ぼすなんて──ヒーローのすることでしょうか？」"
translation = "「설령 리크리에가, 더 좋은 세계를 목표로 쇄신하는 것이었다고 해도. 지금을 살고 있는 인류를 멸망시키다니── 히어로가 할 일일까요?」"

[[dialogue]]
speaker = "アポロ"
original = "「それ……は……」"
translation = "「그것……은……」"

[[dialogue]]
speaker = "unk"
original = "アポロが流星ライダー──ヒーローを自称する上で、避けては通れない矛盾だった。"
translation = "아폴로가 유성 라이더── 히어로를 자처하는 이상, 피해 갈 수 없는 모순이었다."

[[dialogue]]
speaker = "unk"
original = "リクリエの脅威が最大限に迫る今だからこそ、その現実はアポロに突き刺さる。"
translation = "리크리에의 위협이 최대한으로 다가오는 지금이기에, 그 현실은 아폴로에게 꽂힌다."

[[dialogue]]
speaker = "unk"
original = "しかし──"
translation = "하지만──"

[[dialogue]]
speaker = "アポロ"
original = "「──っっっ！！」"
translation = "「──읏읏읏!!」"

[[dialogue]]
speaker = "アポロ"
original = "「……違ウ。違ウ違ウ違ウッ！」"
translation = "「……아니야. 아니야 아니야 아니야!」"

[[dialogue]]
speaker = "アポロ"
original = "「あたしはヒーロー……オマエたちは悪党……だから……いくら倒したって、滅ぼしたって、いいんだ。それがあたしの使命なんだ！」"
translation = "「나는 히어로…… 너희들은 악당…… 그러니까…… 아무리 쓰러뜨려도, 멸망시켜도, 괜찮아. 그것이 나의 사명이야!」"

[[dialogue]]
speaker = "マトイ"
original = "「……！\u3000やっぱり説得できないの──」"
translation = "「……! 역시 설득할 수 없는 거네──」"

[[dialogue]]
speaker = "unk"
original = "それが使命なんだ──"
translation = "그것이 사명이다──"

[[dialogue]]
speaker = "unk"
original = "そう宣言した瞬間、仮面に宿る瘴気がより濃度を強めていた。"
translation = "그렇게 선언한 순간, 가면이 품은 장기가 더욱 농도를 강하게 했다."

[[dialogue]]
speaker = "unk"
original = "リクリエすべての力が集約されている──というのは過言じゃない。どんなアステライトよりも強く濃い瘴気がアポロの全身を包んでいた。"
translation = "리크리에 모든 힘이 집약되어 있다──는 것은 과언이 아니다. 어떤 아스테라이트보다도 강하고 짙은 장기가 아폴로의 전신을 감싸고 있었다."

[[dialogue]]
speaker = "unk"
original = "でも──"
translation = "하지만──"

[[dialogue]]
speaker = "クロト"
original = "「……安心したよ」"
translation = "「……안심했어」"

[[dialogue]]
speaker = "アポロ"
original = "「何……？」"
translation = "「뭐……?」"

[[dialogue]]
speaker = "クロト"
original = "「原因がはっきりした。アポロ──やっぱり君は意志も行動も何もかも、その仮面に支配されている」"
translation = "「원인이 명확해졌어. 아폴로── 역시 너는 의지도 행동도 모든 것이, 그 가면에게 지배당하고 있어」"

[[dialogue]]
speaker = "unk"
original = "今の一瞬、言動さえ上書きされてしまったのがその証拠だ。"
translation = "방금 그 순간, 언동마저 덮어씌워진 것이 그 증거다."

[[dialogue]]
speaker = "unk"
original = "それは、元来のアポロの人格が、確かに残っていることを意味する。"
translation = "그것은, 본래의 아폴로의 인격이, 확실히 남아 있다는 것을 의미한다."

[[dialogue]]
speaker = "アポロ"
original = "「違う……こんなもの、ただの飾りだ！\u3000あたしはあたしの意思で！\u3000リクリエを執行するって言ってるんだ！」"
translation = "「아니야…… 이런 건, 그저 장식일 뿐이야! 나는 나의 의지로! 리크리에를 집행하겠다고 말하고 있는 거야!」"

[[dialogue]]
speaker = "アポロ"
original = "「それに、仮面がどうだったとしても──魔王。あたし達が争う運命に変わりはないぞ！」"
translation = "「게다가, 가면이 어떻든 간에── 마왕. 우리들이 싸울 운명에는 변함없어!」"

[[dialogue]]
speaker = "リノ"
original = "「いいえ──そんなことないわ。そうさせないために私がきたの」"
translation = "「아니요── 그런 일 없어. 그렇게 되지 않게 하기 위해 내가 온 거야」"

[[dialogue]]
speaker = "アポロ"
original = "「何……？」"
translation = "「뭐……?」"

[[dialogue]]
speaker = "unk"
original = "大剣を構えるアポロに対し、母さんは堂々と前へ歩み出る。"
translation = "대검을 겨누는 아폴로를 향해, 엄마는 당당하게 앞으로 걸어 나간다."

[[dialogue]]
speaker = "リノ"
original = "「──私、他にも色々な魔具を集めているのよ。蒐集癖っていうのかしら。そこで相談なんだけど」"
translation = "「──나, 다른 것도 여러 가지 마구를 모으고 있거든. 수집벽이라고 해야 할까. 그래서 상담인데」"

[[dialogue]]
speaker = "リノ"
original = "「あなたの仮面──私にもらえないかしら？」"
translation = "「네 가면── 나한테 줄 수 없을까?」"

[[dialogue]]
speaker = "アポロ"
original = "「な……なんだと……？」"
translation = "「뭐…… 뭐라고……?」"

[[dialogue]]
speaker = "クロト"
original = "「俺たちは君を倒さない。君の仮面だけを──この<ruby>筐<rt>はこ</rt></ruby>の中へ封印する」"
translation = "「우리는 너를 쓰러뜨리지 않아. 너의 가면만을── 이 <ruby>궤<rt>상자</rt></ruby> 안에 봉인할 거야」"

[[dialogue]]
speaker = "アポロ"
original = "「──」"
translation = "「──」"

[[dialogue]]
speaker = "unk"
original = "母さんが取り出すは天界由来の秘宝──『シエルの筐』。"
translation = "엄마가 꺼내는 것은 천계 유래의 비보── 『시엘의 궤』."

[[dialogue]]
speaker = "unk"
original = "あの中に、アポロを使徒たらしめている元凶だけを閉じ込める。それが俺たちに残された唯一の希望。"
translation = "저 안에, 아폴로를 사도답게 만들고 있는 원흉만을 가두는 것. 그것이 우리들에게 남겨진 유일한 희망."

[[dialogue]]
speaker = "リノ"
original = "「ちょっとでいいわ。もし、本当にそれが<b>ただの</b>飾りだっていうのなら……貸してくれたっていいでしょう？」"
translation = "「잠깐이라도 괜찮아. 만약, 정말로 그것이 <b>그저</b> 장식이라고 한다면…… 빌려줘도 괜찮잖아?」"

[[dialogue]]
speaker = "アポロ"
original = "「っ……！」"
translation = "「읏……!」"

[[dialogue]]
speaker = "アポロ"
original = "「……ダメだ。この仮面は……流星ライダーとして、必要なものだ。オマエたちなんかに渡すわけないだろ」"
translation = "「……안 돼. 이 가면은…… 유성 라이더로서, 필요한 거야. 너희들한테 넘겨줄 리 없잖아」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「取れないんだ」"
translation = "「못 벗는 거야」"

[[dialogue]]
speaker = "ソフィア"
original = "「白状してるようなものですね……！」"
translation = "「자백하고 있는 거나 마찬가지네요……!」"

[[dialogue]]
speaker = "アポロ"
original = "「……ふぅ。うるさいうるさい」"
translation = "「……후우. 시끄러워 시끄러워」"

[[dialogue]]
speaker = "アポロ"
original = "「いい加減、オマエ達のツラも見飽きたぞ。もう一度叩き落としてやる──！」"
translation = "「이제 슬슬, 너희들 면상도 지겨워졌다. 다시 한번 때려눕혀주마──!」"

[[dialogue]]
speaker = "モンスター"
original = "「──クオオオオオオオオンッ！」"
translation = "「──크오오오오오오온!」"

[[dialogue]]
speaker = "モンスター"
original = "「──グウウウアアアアアアッッ…………！！」"
translation = "「──그으으으아아아아앗!!…………」"

[[dialogue]]
speaker = "ユウリ"
original = "「っ……！？\u3000なんだありゃ、見たことねえ……！」"
translation = "「읏……!? 뭐야 저건, 본 적 없는데……!」"

[[dialogue]]
speaker = "ニャリオン"
original = "「クライマックスともなると──モンスターも特別級ニャンか……！？」"
translation = "「클라이맥스쯤 되니── 몬스터도 특별급이냥……!?」"

[[dialogue]]
speaker = "unk"
original = "アポロが地に大剣を突きつけると配下のモンスターたちが召喚される。"
translation = "아폴로가 땅에 대검을 꽂아 넣자 예하 몬스터들이 소환된다."

[[dialogue]]
speaker = "unk"
original = "そして──凄まじい瘴気が彼女の背から立ち昇った！"
translation = "그리고── 엄청난 장기가 그녀의 등 뒤에서 피어올랐다!"

[[dialogue]]
speaker = "ヴィーナス"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker = "アポロ"
original = "「我はアポロ。アルタイルを再創造すべく、デネブより使わされたリクリエの使徒」"
translation = "「나는 아폴로. 알타이르를 재창조하기 위해, 데네브로부터 파견된 리크리에의 사도」"

[[dialogue]]
speaker = "セーラ"
original = "「……っ！？\u3000なんか、性格が変わってない──？」"
translation = "「……읏!? 뭔가, 성격이 바뀌지 않았어──?」"

[[dialogue]]
speaker = "アナ"
original = "「人格の侵食が強まっています──！\u3000このままでは……！」"
translation = "「인격의 침식이 강해지고 있습니다──! 이대로는……!」"

[[dialogue]]
speaker = "リノ"
original = "「抑えつけないといけないわね──」"
translation = "「억눌러야겠네──」"

[[dialogue]]
speaker = "ソフィア"
original = "「結局……戦うしかありませんか」"
translation = "「결국…… 싸울 수밖에 없습니까」"

[[dialogue]]
speaker = "ユウリ"
original = "「ちっ……けど──強引にでもその仮面引っ剥がして──正気に戻してやっからな。覚悟しろよ！」"
translation = "「칫…… 하지만── 억지로라도 그 가면 벗겨내서── 제정신으로 되돌려 줄 테니까. 각오해라!」"

[[dialogue]]
speaker = "クロト"
original = "「あの仮面は壊しても容易に再生する。本体からの分離を目標に戦うぞ！」"
translation = "「저 가면은 부숴도 쉽게 재생한다. 본체로부터의 분리를 목표로 싸우자!」"

[[dialogue]]
speaker = "フィオナ"
original = "「霊力、全開──」"
translation = "「영력, 전개──」"

[[dialogue]]
speaker = "フィオナ"
original = "「いきますよ、姉さん。今度こそ──あなたの素顔を見せてください」"
translation = "「가겠습니다, 언니. 이번에야말로── 당신의 본모습을 보여주세요」"

[[dialogue]]
speaker = "アポロ"
original = "「果てろ……人間風情が、宇宙の<ruby>理<rt>ことわり</rt></ruby>に勝てると思うな！」"
