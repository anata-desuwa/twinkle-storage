[[dialogue]]
speaker = "unk"
original = "第１話,希崎レイト,B"
translation = "제1화, 키자키 레이토, B"

[[dialogue]]
speaker = "unk"
original = "──ある男の話をしよう。"
translation = "──어떤 남자의 이야기를 해 보자."

[[dialogue]]
speaker = "unk"
original = "彼は流星市国のごく一般的な家庭に生まれた。"
translation = "그는 유성 시국의 아주 일반적인 가정에서 태어났다."

[[dialogue]]
speaker = "unk"
original = "彼の名は<ruby>希崎<rt>きざき</rt></ruby>レイト。"
translation = "그의 이름은 키자키 레이토."

[[dialogue]]
speaker = "unk"
original = "レイトは、これといった取り柄こそないものの、素朴な少年として育っていく。"
translation = "레이토는, 이렇다 할 장점은 없었지만, 소박한 소년으로 자라난다."

[[dialogue]]
speaker = "unk"
original = "問題があったとすれば彼の歪んだ人格だろうか。"
translation = "문제가 있었다면 그의 뒤틀린 인격일 것이다."

[[dialogue]]
speaker = "unk"
original = "希崎レイトは幼少の<ruby>砌<rt>みぎり</rt></ruby>より、著しく他者への共感性を欠いていた。"
translation = "키자키 레이토는 유년의 시절부터, 현저하게 타인에 대한 공감 능력이 부족했다."

[[dialogue]]
speaker = "unk"
original = "有り体に言って、人の気持ちがあまりわからない子だった。"
translation = "솔직히 말해, 남의 마음을 잘 모르는 아이였다."

[[dialogue]]
speaker = "unk"
original = "クラスメイトへの陰湿ないじめや、野生の小動物に対する虐待など、悪行が問題視されるようになった。教師はしばしば彼を叱った。"
translation = "반 친구들에 대한 음습한 괴롭힘이나, 야생의 작은 동물에 대한 학대 등, 악행이 문제시되기 시작했다. 교사는 종종 그를 꾸짖었다."

[[dialogue]]
speaker = "unk"
original = "彼が成長していくにつれ、その傾向は顕著になっていった。"
translation = "그가 성장해 갈수록, 그 경향은 현저해졌다."

[[dialogue]]
speaker = "unk"
original = "また、その頃には両親の不和も悪化し、彼は家庭という居場所も失った。"
translation = "또한, 그 무렵에는 부모의 불화도 악화되어, 그는 가정이라는 안식처도 잃었다."

[[dialogue]]
speaker = "unk"
original = "希崎レイトはますます荒んでいくようになった。"
translation = "키자키 레이토는 더욱더 거칠어지기 시작했다."

[[dialogue]]
speaker = "unk"
original = "それでも、彼は生来のサイコパスとは異なり、自身の性根が歪んでいることを自覚していた。"
translation = "그럼에도, 그는 선천적인 사이코패스와는 달리, 자신의 본성이 뒤틀려 있다는 것을 자각하고 있었다."

[[dialogue]]
speaker = "unk"
original = "ただ、人間なら誰しも多少は抱く嗜虐的な感情を、隠そうともしなかっただけなのだ。"
translation = "단지, 인간이라면 누구나 다소는 품는 가학적인 감정을, 숨기려 하지 않았을 뿐이다."

[[dialogue]]
speaker = "unk"
original = "そのことによる弊害もあった。"
translation = "그것으로 인한 폐해도 있었다."

[[dialogue]]
speaker = "unk"
original = "彼が我慢ならなかったのは、他の悪人たちがみな外面を取り繕っているせいで、自分だけが巨悪かのように非難されることだった。"
translation = "그가 참을 수 없었던 것은, 다른 악인들이 모두 겉모습을 꾸미고 있는 탓에, 자신만이 거악인 것처럼 비난받는 것이었다."

[[dialogue]]
speaker = "unk"
original = "自分と同じように性格のねじ曲がった人間たちが、その本性を隠して『うまくやっている』姿に多大な苛立ちを覚えるようになる。"
translation = "자신과 마찬가지로 성격이 비뚤어진 인간들이, 그 본성을 숨기고 『잘 지내고 있는』 모습에 막대한 짜증을 느끼게 된다."

[[dialogue]]
speaker = "unk"
original = "だが──彼には悪に染まりきるだけの『力』もなかった。"
translation = "하지만── 그에게는 악에 완전히 물들 만한 『힘』도 없었다."

[[dialogue]]
speaker = "unk"
original = "財力は言うに及ばず、知力も、腕力も、人並み以下の能力しか持ち合わせていなかった。"
translation = "재력은 말할 것도 없고, 지력도, 완력도, 보통 사람 이하의 능력밖에 가지고 있지 않았다."

[[dialogue]]
speaker = "unk"
original = "たとえば彼の住まう流星市国では、毎日のように星騎士たちが超常的な力をふるい、戦っていた。"
translation = "예를 들어 그가 사는 유성 시국에서는, 매일같이 성기사들이 초자연적인 힘을 휘두르며, 싸우고 있었다."

[[dialogue]]
speaker = "unk"
original = "その光景を何度も目にしていた希崎青年。"
translation = "그 광경을 몇 번이고 목격했던 키자키 청년."

[[dialogue]]
speaker = "unk"
original = "そんな彼に、ある日、突然星力が芽生える──なんてストーリーも当然なかった。"
translation = "그런 그에게, 어느 날, 갑자기 성력이 싹트는── 같은 스토리도 당연히 없었다."

[[dialogue]]
speaker = "unk"
original = "──自分には、何もない。"
translation = "──자신에게는, 아무것도 없다."

[[dialogue]]
speaker = "unk"
original = "何かを守る正義になることも、何かを壊す悪に染まることもできない、中途半端な己を嫌悪するようになっていった。"
translation = "무언가를 지키는 정의가 되는 것도, 무언가를 부수는 악에 물드는 것도 할 수 없는, 어중간한 자신을 혐오하게 되었다."

[[dialogue]]
speaker = "unk"
original = "男子として成熟した希崎レイトは、同時に<ruby>暗澹<rt>あんたん</rt></ruby>たる将来へ絶望することになる。"
translation = "남자로 성숙한 키자키 레이토는, 동시에 암담한 장래에 절망하게 된다."

[[dialogue]]
speaker = "unk"
original = "──自分の居場所は、どこにもない。"
translation = "──자신의 안식처는, 어디에도 없다."

[[dialogue]]
speaker = "unk"
original = "──ならもう、生きていても仕方ない。"
translation = "──그렇다면 이제, 살아 있어도 소용없다."

[[dialogue]]
speaker = "unk"
original = "生きていることにも意味を見いだせなくなった彼は、この世を去ろうと思い立つ。"
translation = "살아 있는 것에도 의미를 찾지 못하게 된 그는, 이 세상을 떠나기로 결심한다."

[[dialogue]]
speaker = "unk"
original = "そして生まれつきの嗜虐性が、最後にも彼を奮い立たせた。"
translation = "그리고 타고난 가학성이, 마지막에도 그를 분발시켰다."

[[dialogue]]
speaker = "unk"
original = "──どうせなら、他の人間も道連れにしてやろう。"
translation = "──이왕이면, 다른 인간들도 함께 데려가자."

[[dialogue]]
speaker = "unk"
original = "彼は通り魔的な犯行を画策した。"
translation = "그는 묻지마 범행을 계획했다."

[[dialogue]]
speaker = "unk"
original = "ひとしきり通行人をナイフで切りつけて、満足したところで、適当な高所から身をなげうって死のう……と。"
translation = "한바탕 통행인을 나이프로 베고, 만족했을 때, 적당한 높은 곳에서 몸을 던져 죽으려고…… 말이다."

[[dialogue]]
speaker = "unk"
original = "やがて最後の日がやってきた。"
translation = "이윽고 마지막 날이 다가왔다."

[[dialogue]]
speaker = "unk"
original = "希崎青年は柄にもなく緊張していた。"
translation = "키자키 청년은 평소답지 않게 긴장하고 있었다."

[[dialogue]]
speaker = "unk"
original = "死への恐怖と殺人への興奮が入り混じった、えもいえぬ高揚感に包まれていた。"
translation = "죽음에 대한 공포와 살인에 대한 흥분이 뒤섞인, 형언할 수 없는 고양감에 휩싸여 있었다."

[[dialogue]]
speaker = "unk"
original = "──２人か。３人か。うまくやれば１０人以上も。"
translation = "──두 명인가. 세 명인가. 잘하면 열 명 이상도."

[[dialogue]]
speaker = "unk"
original = "胸元にダガーナイフを仕込み、機をうかがう。"
translation = "가슴팍에 대거 나이프를 숨기고, 기회를 엿본다."

[[dialogue]]
speaker = "unk"
original = "せめて、この居たたまれない社会に、自分の生きた証を刻んでやろうと。"
translation = "적어도, 이 견딜 수 없는 사회에, 자신이 살았던 증거를 새겨주려고."

[[dialogue]]
speaker = "unk"
original = "だが……彼の犯行が行われることはなかった。"
translation = "하지만…… 그의 범행은 실행되지 않았다."

[[dialogue]]
speaker = "unk"
original = "『彼女』との出会いが、青年の運命を変えたのだ。"
translation = "『그녀』와의 만남이, 청년의 운명을 바꾼 것이다."

[[dialogue]]
speaker = "unk"
original = "『──よぉ。何してんだ、そんなところで』"
translation = "『──어이. 뭐 하냐, 그런 곳에서』"

[[dialogue]]
speaker = "unk"
original = "『──通り魔？\u3000ははっ。んなチンケなことしてないでよ、いっそドカーンと世界ごとぶち壊してやろうぜ！』"
translation = "『──묻지마 살인? 하하. 그런 시시한 짓 하지 말고, 차라리 콰앙 하고 세상째로 부숴버리자고!』"

[[dialogue]]
speaker = "unk"
original = "『──あたしと一緒にな』"
translation = "『──나랑 같이』"

[[dialogue]]
speaker = "unk"
original = "リクリエ──誰もが知る世界の終わり。"
translation = "리크리에── 누구나 아는 세계의 종말."

[[dialogue]]
speaker = "unk"
original = "その日、偶然にも出会った少女は、彼をそんな運命へと誘った。"
translation = "그날, 우연히 만난 소녀는, 그를 그런 운명으로 이끌었다."

[[dialogue]]
speaker = "unk"
original = "彼は今まで『リクリエに抗う者』しか見たことがなかった。"
translation = "그는 지금까지 『리크리에에 저항하는 자』밖에 본 적이 없었다."

[[dialogue]]
speaker = "unk"
original = "光り輝く正義のもとで戦う彼らを、疎ましく、そして羨ましく思っていた。"
translation = "빛나는 정의 아래에서 싸우는 그들을, 거슬리고, 그리고 부럽게 생각하고 있었다."

[[dialogue]]
speaker = "unk"
original = "だが目の前の少女は──堂々とその終焉を歓迎すると言い放った。"
translation = "하지만 눈앞의 소녀는── 당당하게 그 종언을 환영한다고 단언했다."

[[dialogue]]
speaker = "unk"
original = "そして、共に世界を終わらせようと手を差し伸べた。"
translation = "그리고, 함께 세계를 끝내자고 손을 내밀었다."

[[dialogue]]
speaker = "unk"
original = "それは青年にとって──自分を認めない世界へ亀裂を入れる、希望に満ちあふれた提案だったのだ。"
translation = "그것은 청년에게 있어서── 자신을 인정하지 않는 세계에 균열을 내는, 희망으로 가득 찬 제안이었다."

[[dialogue]]
speaker = "unk"
original = "『──名を』"
translation = "『──이름을』"

[[dialogue]]
speaker = "unk"
original = "『──名をください。我が主』"
translation = "『──이름을 주십시오. 나의 주군』"

