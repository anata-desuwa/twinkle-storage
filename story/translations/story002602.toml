[[dialogue]]
speaker = "unk"
original = "公安委員会――それは、新星・流星学園の星徒会では扱えないような星術絡みの犯罪者を、グレーな方法で秘密裏に処理する学園組織である。"
translation = "공안위원회── 그것은 신성·유성학원의 성도회에서는 다룰 수 없는 성술 관련 범죄자를, 회색의 방법으로 은밀히 처리하는 학원 조직이다."

[[dialogue]]
speaker = "unk"
original = "その為、表向きには組織として公表されていない。俺もマインと出会うまではその存在を知らなかった。"
translation = "그 때문에 겉으로는 조직으로서 공표되어 있지 않다. 나도 마인과 만나기 전까지는 그 존재를 몰랐다."

[[dialogue]]
speaker = "unk"
original = "そんな公安委員会の協力者として現れた母さんに、俺は驚きを隠せなかった。"
translation = "그런 공안위원회의 협력자로 나타난 엄마의 모습에, 나는 놀라움을 감출 수 없었다."

[[dialogue]]
speaker = "unk"
original = "どうして母さんが……？"
translation = "어째서 엄마가……?"

[[dialogue]]
speaker = "リノ"
original = "「クロトはお母さんがどこに務めているかは知っているわよね？」"
translation = "「쿠로토는 엄마가 어디서 일하는지는 알고 있지?」"

[[dialogue]]
speaker = "リノ"
original = "「流星市国教皇庁直属の研究機関『ヘキサグラム』。私はそこの研究主任として働かせてもらっているわけだけど……」"
translation = "「유성시국 교황청 직속 연구기관 『헥사그램』. 나는 거기 연구 주임으로 일하고 있는데……」"

[[dialogue]]
speaker = "リノ"
original = "「実はそのヘキサグラムは、公安委員会と組織的な繋がりがあるのよ」"
translation = "「사실 그 헥사그램은 공안위원회와 조직적인 연결고리가 있어」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「公安委員会の正式名称は『流星市国星騎士公安委員会』という。表向きには存在していないが、実はこちらも教皇庁直属でな」"
translation = "「공안위원회의 정식 명칭은 『유성시국 성기사 공안위원회』라고 한다. 겉으로는 존재하지 않지만, 사실 이쪽도 교황청 직속이지」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「私の上司――公安委員会のトップである委員長も、流星市国教皇庁の役人が務めているんだ」"
translation = "「내 상사── 공안위원회의 정점인 위원장도 유성시국 교황청의 관리가 맡고 있다」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「本部長の私は、公安委員会のリーダーとして組織を動かしてはいるが、組織図的にはナンバー２に当たる」"
translation = "「본부장인 나는 공안위원회의 리더로서 조직을 움직이고 있지만, 조직도상으로는 넘버 2에 해당하지」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「そして、リノには公安委員会からヘキサグラムに依頼して、星術の解析を担当する外部協力員になってもらっているというわけだ」"
translation = "「그리고 리노에게는 공안위원회에서 헥사그램에 의뢰해 성술 해석을 담당하는 외부 협력원이 되어달라고 부탁한 셈이다」"

[[dialogue]]
speaker = "リノ"
original = "「リコとはその関係で知り合って、友達になったのよね～」"
translation = "「리코와는 그 관계로 알게 되어서 친구가 된 거야~」"

[[dialogue]]
speaker = "リノ"
original = "「リコにはこれまでも影で随分と助けてもらったわ。前にフィーニスの塔で使った『シエルの<ruby>筐<rt>はこ</rt></ruby>』や『<ruby>星骸布<rt>せいがいふ</rt></ruby>』の情報は、リコが提供してくれたものなのよ」"
translation = "「리코에게는 지금까지도 뒤에서 상당히 도움을 받았단다. 전에 피니스의 탑에서 썼던 『시엘의 궤』나 『성해포』의 정보는 리코가 제공해 준 거야」"

[[dialogue]]
speaker = "unk"
original = "リコさん、ありがとうございます"
translation = "리코 씨, 감사합니다"

[[dialogue]]
speaker = "unk"
original = "そうだったんだ……！"
translation = "그랬던 거군요……!"

[[dialogue]]
speaker = "リコリンフィア"
original = "「礼には及ばない。裏から平和を守るのが公安委員会だ」"
translation = "「감사는 필요 없다. 뒤에서 평화를 지키는 것이 공안위원회다」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「その為ならば、使えるものは何でも使う。たとえそれが、合法的な手段ではなくてもな」"
translation = "「그걸 위해서라면 쓸 수 있는 것은 뭐든 쓴다. 설령 그것이 합법적인 수단이 아닐지라도」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「故に、私はリノが魔女であるなどとは知らないし、ただ友人であるから、協力した――」"
translation = "「고로, 나는 리노가 마녀라는 사실 따위는 모르고, 그저 친구이기 때문에 협력했다──」"

[[dialogue]]
speaker = "unk"
original = "リコリンフィアはそこまで言ってから、小さな笑みを浮かべて。"
translation = "리코린피아는 거기까지 말하고 나서 작은 미소를 지었다."

[[dialogue]]
speaker = "リコリンフィア"
original = "「そういうことで１つ、よろしく頼むぞ、少年」"
translation = "「그런 의미로 잘 부탁한다, 소년」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「あとは私が公安委員会の本部長、リーダーであることもな。外で話す時は――」"
translation = "「나머지는 내가 공안위원회의 본부장이자 리더라는 사실도 말이다. 밖에서 이야기할 때는──」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「附属生のリコリンとして仲良くしてね、お兄ちゃん☆\u3000てへっ♪」"
translation = "「부속생 리코린으로서 사이좋게 지내줘, 오빠☆ 테헷♪」"

[[dialogue]]
speaker = "unk"
original = "えっ……本当に附属生なんですか！？"
translation = "엣…… 정말로 부속생인 건가요!?"

[[dialogue]]
speaker = "unk"
original = "附属校の制服！？"
translation = "부속교 교복!?"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「にひひ♪\u3000実はそうなんだよね～」"
translation = "「니히히♪ 실은 그렇단 말이지~」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「――学生という肩書きは情報収集に何かと便利でな。特に附属生だと尚更だ」"
translation = "「──학생이라는 직함은 정보 수집에 여러모로 편리하거든. 특히 부속생이라면 더더욱 그렇다」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「私はこの大人になっても小さなままの体型を活かし、普段は附属生のリコリンとして諜報活動を行っているというわけだ」"
translation = "「나는 이 성인이 되어서도 작은 채로 있는 체형을 살려, 평소에는 부속생 리코린으로서 첩보 활동을 수행하고 있는 셈이다」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「そこまであざとくキャラ付けしなくてもいいのにね～」"
translation = "「그렇게까지 영악하게 캐릭터 설정을 안 해도 될 텐데 말이야~」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「何を言っている？\u3000リコリンはこれまで数多の大人を騙して来た完璧な附属生の姿だぞ」"
translation = "「무슨 소리를? 리코린은 지금까지 수많은 어른을 속여온 완벽한 부속생의 모습이라고」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「さて……自己紹介も済んだところで、本題に入るとしよう」"
translation = "「자…… 자기소개도 끝났으니 본론으로 들어가도록 하지」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「公安委員会では今、リゾート結界のとある噂を調査していてな」"
translation = "「공안위원회에서는 지금 리조트 결계의 어떤 소문을 조사하고 있다」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「最近、流星市国や東京周辺で、『ヴェノマイザー』と呼ばれる薬が出回るようになっているんだ」"
translation = "「최근 유성시국이나 도쿄 주변에서 『베노마이저』라 불리는 약이 나돌기 시작했어」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「それは二の腕に付ける腕輪型の装置で体内に注入するもので、その薬を使うと――」"
translation = "「그건 팔뚝에 차는 팔찌형 장치로 체내에 주입하는 것인데, 그 약을 사용하면──」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「<b>怪人</b>の姿へと変身することができるようになる」"
translation = "「<b>괴인</b>의 모습으로 변신할 수 있게 된다」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「そして、公安委員会で『ミュータント』と名づけたその怪人姿へ変身すると、魔力を操ることができるようになる」"
translation = "「그리고 공안위원회에서 『뮤턴트』라 이름 붙인 그 괴인 모습으로 변신하면 마력을 다룰 수 있게 되지」"

[[dialogue]]
speaker = "unk"
original = "魔力を！？\u3000その薬は一体……"
translation = "마력을!? 그 약은 대체……"

[[dialogue]]
speaker = "リコリンフィア"
original = "「今から１３年前、魔界である魔獣が復活し、討伐された」"
translation = "「지금으로부터 13년 전, 마계에서 어떤 마수가 부활해 토벌되었다」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「その魔獣の名は『マンティコア』。獅子の頭と、サソリの尾を持ち、強力な毒を持つ怪物だ」"
translation = "「그 마수의 이름은 『만티코어』. 사자의 머리와 전갈의 꼬리를 가졌으며 강력한 독을 지닌 괴물이지」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「その際にマンティコアの毒を生成する体内器官である『ポイズナイト』が何者かに盗まれ、行方不明になる事件があった」"
translation = "「그 당시에 만티코어의 독을 생성하는 체내 기관인 『포이즈나이트』를 누군가 훔쳐가 행방불명된 사건이 있었다」"

[[dialogue]]
speaker = "リノ"
original = "「ヴェノマイザーっていうのは、そのポイズナイトが生み出すマンティコアの毒を元に作り出した薬だと、成分を調べて判明したの」"
translation = "「베노마이저라는 건 그 포이즈나이트가 만들어내는 만티코어의 독을 바탕으로 만들어낸 약이라는 사실이 성분 조사로 판명됐어」"

[[dialogue]]
speaker = "リノ"
original = "「マンティコアは毒を相手に注入し、自らの眷族へと変貌させる能力があった。それを利用して、怪人へと変身する仕組みというわけね」"
translation = "「만티코어는 독을 상대에게 주입해 자신의 권속으로 변모시키는 능력이 있었지. 그걸 이용해 괴인으로 변신하는 구조라는 거야」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「それでね、最近、そのヴェノマイザーの受け渡しが、リゾート結界で行われているという噂が流れて来たんだよ」"
translation = "「그래서 말인데, 최근 그 베노마이저의 거래가 리조트 결계에서 이루어지고 있다는 소문이 들려왔어」"

[[dialogue]]
speaker = "unk"
original = "じゃあ、俺はその捜査に協力すれば？"
translation = "그럼 제가 그 수사에 협력하면 될까요?"

[[dialogue]]
speaker = "リコリンフィア"
original = "「ああ、内容は――」"
translation = "「그래, 내용은──」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「私たちと思いっきり海を<b>エンジョイ</b>することだ」"
translation = "「우리와 함께 마음껏 바다를 <b>엔조이</b>하는 거다」"

[[dialogue]]
speaker = "unk"
original = "え？"
translation = "에?"

[[dialogue]]
speaker = "リコリンフィア"
original = "「これは冗談ではなく真面目な話でな。作戦として、犯人に我々が油断しているように見せたい。協力お願いすることはできるか？」"
translation = "「이건 농담이 아니라 진지한 이야기다. 작전으로서 범인에게 우리가 방심하고 있는 것처럼 보이고 싶어. 협력을 부탁해도 되겠나?」"

[[dialogue]]
speaker = "unk"
original = "俺は頷いてみせる。"
translation = "나는 고개를 끄덕여 보였다."

[[dialogue]]
speaker = "リコリンフィア"
original = "「ふっ……即決か。いわゆる囮捜査は表向きには違法なのだが……なるほど、確かに肝が据わっているな」"
translation = "「훗…… 즉답인가. 이른바 함정 수사는 겉으로는 불법이지만…… 과연, 확실히 배짱이 두둑하군」"

[[dialogue]]
speaker = "unk"
original = "マインと母さんを信じてるので"
translation = "마인과 엄마를 믿고 있으니까요"

[[dialogue]]
speaker = "リコリンフィア"
original = "「リノはともかく、マインもか。そこまで信頼を獲得しているとは、大したものだな」"
translation = "「리노는 그렇다 치고 마인까지인가. 그만큼 신뢰를 얻고 있다니 대단하군」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「にひひ♪\u3000私は悪寄りだって、会長もわかっているはずなんですけどね～」"
translation = "「니히히♪ 저는 악당 쪽에 가깝다는 거 회장도 알고 있을 텐데 말이죠~」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「なんか信頼されちゃってるんですよ。会長は眩しいくらいのお人好しなんで♪」"
translation = "「왠지 신뢰받고 있단 말이에요. 회장은 눈부실 정도로 사람 좋은 성격이라서♪」"

[[dialogue]]
speaker = "リノ"
original = "「ふふっ、それにうちの息子は、私が心配して反対しても星騎士になっちゃった子だからね」"
translation = "「후훗, 게다가 우리 아들은 내가 걱정해서 반대해도 성기사가 되어버린 아이니까」"

[[dialogue]]
speaker = "リノ"
original = "「事件が起きるって話を聞いて、見て見ぬフリなんかできないのよ」"
translation = "「사건이 일어난다는 말을 듣고 못 본 척할 수 없는 거야」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「……そうか。ならば、その意思を裏切らないように、私も誠実に応えねばな。作戦の詳細については、後で話すが――」"
translation = "「……그런가. 그렇다면 그 의지를 배신하지 않도록 나도 성실히 응해야겠군. 작전의 상세한 내용은 나중에 이야기하겠지만──」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「どうか、公安委員会にキミの力を貸してくれ、少年」"
translation = "「부디 공안위원회에 자네의 힘을 빌려주게, 소년」"

[[dialogue]]
speaker = "unk"
original = "俺は彼女に再び、頷いてみせる。"
translation = "나는 그녀에게 다시 한번 고개를 끄덕였다."

[[dialogue]]
speaker = "unk"
original = "こうして、公安委員会の２人と母さんと共に、俺は夏の海を<b>楽しむ</b>ことになるのだった――"
translation = "이렇게 해서 공안위원회의 두 사람과 엄마와 함께 나는 여름 바다를 <b>즐기게</b> 되는 것이었다──"

