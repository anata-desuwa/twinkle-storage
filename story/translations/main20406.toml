[[dialogue]]
speaker = "unk"
original = "第６話,学園長候補？,B"
translation = "제6화, 학원장 후보?, B"

[[dialogue]]
speaker = "unk"
original = "俺はヘレナちゃんに呼ばれて九浄家に来ていた。ヴィーナスもこの場に同席している。"
translation = "나는 헬레나짱의 부름을 받고 쿠죠 가문에 와 있었다. 비너스도 이 자리에 동석하고 있다."

[[dialogue]]
speaker = "ヘレナ"
original = "「よく来てくれた魔王よ。切迫した状況なのに悪いな」"
translation = "「잘 와 주었구나, 마왕이여. 절박한 상황인데 미안하군.」"

[[dialogue]]
speaker = "クロト"
original = "「いえ、構いません。ヘレナちゃんはこういう時、無駄な話はしませんから」"
translation = "「아뇨, 상관없습니다. 헬레나짱은 이럴 때 쓸데없는 이야기는 하지 않으니까요.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「でもどうしたの、ヘレナちゃん？\u3000理事会で次の学園長を決めるんじゃなかったの？」"
translation = "「근데 무슨 일이야, 헬레나짱? 이사회에서 다음 학원장을 정하는 거 아니었어?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「それがだな……」"
translation = "「그게 말이다……」"

[[dialogue]]
speaker = "unk"
original = "俺たちは理事会で起こった一部始終を聞いた。"
translation = "우리들은 이사회에서 일어난 자초지종을 들었다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「コウレイが理事会にやってきて、学園長になるって言ってきた──！？」"
translation = "「코레이가 이사회에 나타나서, 학원장이 되겠다고 말했다고──!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「で、コウレイって誰だったっけ？」"
translation = "「근데, 코레이가 누구였더라?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「我が娘ながらそう言うと思ったぞ」"
translation = "「내 딸이라지만 그렇게 말할 줄 알았다.」"

[[dialogue]]
speaker = "unk"
original = "三界にはそれぞれ魔王ラクシスの血を色濃く受け継ぐ者がいるという。"
translation = "삼계에는 각각 마왕 락시스의 피를 짙게 이어받은 자가 있다고 한다."

[[dialogue]]
speaker = "unk"
original = "人間界の星見家。"
translation = "인간계의 호시미 가문."

[[dialogue]]
speaker = "unk"
original = "天界・聖庭園のリガルタ老。"
translation = "천계·성정원의 리갈타 노사."

[[dialogue]]
speaker = "unk"
original = "そして魔界の頽廃都市キュリオスを統べる煌嶺。"
translation = "그리고 마계의 퇴폐 도시 큐리오스를 통치하는 코레이."

[[dialogue]]
speaker = "unk"
original = "彼女の支配圏であるキュリオスに留まっていると聞いていたが、人間界に来ていたとは驚きだ。"
translation = "그녀의 지배권인 큐리오스에 머물고 있다고 들었는데, 인간계에 와 있었다니 놀랍다."

[[dialogue]]
speaker = "クロト"
original = "「ほら、母さんが星骸布をもらってきてくれただろ。フィーニスの塔でマグダレナさんも言ってた」"
translation = "「봐, 어머니가 성해포를 받아다 주셨잖아. 피니스의 탑에서 막달레나 씨도 말했고.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ああ～、どうりで聞いたことあると思ったわ！」"
translation = "「아아~, 어쩐지 들어본 적 있다 했어!」"

[[dialogue]]
speaker = "ヘレナ"
original = "「はっきり言ってまずい展開だ。理事はやつに<ruby>靡<rt>なび</rt></ruby>いている。このままでは新星学園は乗っ取られてしまうぞ」"
translation = "「솔직히 말해 좋지 않은 전개다. 이사들은 녀석에게 회유되고 있어. 이대로라면 신성학원은 탈취당하고 말 거다.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そんなのダメよ！\u3000私たちの学園を好き勝手にはさせないわ！」"
translation = "「그런 건 안 돼! 우리들의 학원을 마음대로 하게 두지 않을 거야!」"

[[dialogue]]
speaker = "クロト"
original = "「煌嶺という人はそんなに危険な人物なんですか？」"
translation = "「코레이라는 사람은 그렇게 위험한 인물인가요?」"

[[dialogue]]
speaker = "unk"
original = "魔王の血を引くとは言え、あのヘレナちゃんがそこまで警戒するほど人物なのだろうか。"
translation = "마왕의 피를 이었다고는 하나, 그 헬레나짱이 저렇게까지 경계할 정도의 인물인 것일까."

[[dialogue]]
speaker = "ヘレナ"
original = "「そうだな、魔界出身の者に話を聞けば、十中八九悪い評判が返ってくるだろう」"
translation = "「그렇구나, 마계 출신자에게 이야기를 들으면 십중팔구 나쁜 평판이 돌아올 게다.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「魔界では煌嶺の悪名は知られていてな。欲しいものを手に入れるためなら手段を選ばない」"
translation = "「마계에서 코레이의 악명은 자자해서 말이지. 원하는 것을 손에 넣기 위해서라면 수단을 가리지 않는다.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「伝え聞く話によれば、彼女はあるものを手に入れるために、隣国に戦争を仕掛けようとした。何を欲しがったと思う？」"
translation = "「전해 듣기로는, 그녀는 어떤 것을 손에 넣기 위해 인접 국가에 전쟁을 걸려고 했다더군. 무엇을 원했다고 생각하나?」"

[[dialogue]]
speaker = "クロト"
original = "「土地とか……あるいは星骸布のような宝物とか？」"
translation = "「영토라든가…… 아니면 성해포 같은 보물인가요?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「<ruby>玩具<rt>おもちゃ</rt></ruby>だ」"
translation = "「장난감다.」"

[[dialogue]]
speaker = "クロト"
original = "「は……？」"
translation = "「하……?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「物見遊山の途中で、子どもが持っていた絡繰り仕掛けの<ruby>玩具<rt>がんぐ</rt></ruby>をたまたま見かけたそうでな。それが欲しいと言い出したのだ」"
translation = "「유람하던 도중에 아이가 가지고 있던 태엽 장치 장난감를 우연히 보았다더군. 그것이 갖고 싶다고 말하기 시작한 게지.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「玩具は職人の手作りで、確かに物珍しいものではあったが、それそのものはただの遊び道具でしかない」"
translation = "「장난감은 장인의 수제품으로 확실히 신기한 것이긴 했으나, 그 자체는 그저 놀이 도구일 뿐이다.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「だが煌嶺はその玩具ひとつが欲しいというだけで、その国の工房と職人を丸々買い取るから値段を教えろと言い出した」"
translation = "「하지만 코레이는 그 장난감 하나를 갖고 싶다는 이유만으로, 그 나라의 공방과 장인을 통째로 사들일 테니 가격을 말하라고 했지.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「もし差し出せないのであれば、戦争で国ごといただこう、と悪びれもせず宣戦布告まで始めたのだ」"
translation = "「만약 내놓을 수 없다면 전쟁으로 나라째 가져가겠다고, 미안해하는 기색도 없이 선전포고까지 시작했다는구나.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「結局、隣国は圧力に負けて工房と職人……つまり、その玩具にまつわる『文化』と『製造』をキュリオスに差し出したそうだ」"
translation = "「결국 인접 국가는 압력에 굴복해 공방과 장인…… 즉, 그 장난감에 얽힌 『문화』와 『제조』를 큐리오스에 바쳤다고 한다.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「何それ！？\u3000そんなのが王様をやってるなんて、めちゃくちゃじゃない！」"
translation = "「뭐야 그게!? 그런 게 왕을 하고 있다니, 엉망진창이잖아!」"

[[dialogue]]
speaker = "ヘレナ"
original = "「それが煌嶺なのだ。倫理や常識など関係ない。彼女が“欲しい”と思うかどうかが全て」"
translation = "「그것이 코레이라는 존재다. 윤리나 상식 따위는 상관없지. 그녀가 “원하느냐” 아니냐가 전부다.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「路傍の石であろうが、国が買える秘宝であろうが、“欲しい”と思ったなら必ず手に入れる。それが煌嶺のルールだ」"
translation = "「길가의 돌멩이든, 나라를 살 수 있는 비보든, “원한다”고 생각했다면 반드시 손에 넣는다. 그것이 코레이의 규칙이지.」"

[[dialogue]]
speaker = "クロト"
original = "「想像していたよりも難儀な人物のようですね……」"
translation = "「상상했던 것보다 까다로운 인물인 것 같네요……」"

[[dialogue]]
speaker = "unk"
original = "母さんに星骸布を与えてくれたから、話せばわかる相手かと思っていたけど、俺の考えが甘かったようだ。"
translation = "어머니에게 성해포를 주었기에 말이 통하는 상대라고 생각했었지만, 내 생각이 안일했던 모양이다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「どうしてそんなの新星学園の理事にしちゃったのよ～！\u3000絶対トラブルになるに決まってるじゃない！」"
translation = "「어째서 그런 사람을 신성학원의 이사로 만든 거야~! 분명히 트러블이 생길 게 뻔하잖아!」"

[[dialogue]]
speaker = "ヘレナ"
original = "「背に腹は代えられんというやつだ。実際必要だっただろう、<ruby>星骸布<rt>アレ</rt></ruby>は」"
translation = "「급한 불부터 꺼야 했으니까 말이다. 실제로 필요하지 않았느냐, 성해포은.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「う……」"
translation = "「으……」"

[[dialogue]]
speaker = "unk"
original = "母さんが星骸布を持ってきてくれなければ、俺たちも、流星市国もどうなっていたか。"
translation = "어머니가 성해포를 가져다주지 않았다면, 우리들도, 유성시국도 어떻게 되었을지 모른다."

[[dialogue]]
speaker = "unk"
original = "星騎士たちは星術を使うことができず、きっと為す術なくモンスターに蹂躙されていただろう。"
translation = "성기사들은 성술을 사용할 수 없었을 것이고, 분명 속수무책으로 몬스터에게 유린당했겠지."

[[dialogue]]
speaker = "ヴィーナス"
original = "「で、ヘレナちゃんが連れてきた学園長候補ってのは──」"
translation = "「그래서, 헬레나짱이 데려온 학원장 후보라는 건──」"

[[dialogue]]
speaker = "？？？"
original = "「すみません、遅くなりましたっ」"
translation = "「죄송합니다, 늦었습니다!」"

[[dialogue]]
speaker = "ヘレナ"
original = "「本当に遅いぞ。だから迎えを寄越そうかと言ったのに」"
translation = "「정말 늦는구나. 그래서 마중을 보내겠다고 했거늘.」"

[[dialogue]]
speaker = "？？？"
original = "「申し訳ありません～っ」"
translation = "「죄송합니다~!」"

[[dialogue]]
speaker = "unk"
original = "そこにやってきたのは、俺たちと同じ年くらいの女性。"
translation = "그곳에 나타난 것은 우리와 비슷한 연령대의 여성."

[[dialogue]]
speaker = "unk"
original = "けれどまとっているのは制服ではなく、ビジネスで着るようなスーツだ。"
translation = "하지만 걸치고 있는 것은 교복이 아니라 비즈니스 현장에서 입을 법한 정장이다."

[[dialogue]]
speaker = "ヘレナ"
original = "「紹介しよう。彼女は<ruby>十六夜<rt>いざよい</rt></ruby>シノ。私が次の新星学園学園長として白羽の矢を立てた人物だ」"
translation = "「소개하마. 그녀는 이 자요이 시노. 내가 다음 신성학원 학원장으로 점찍은 인물이다.」"

[[dialogue]]
speaker = "シノ"
original = "「初めまして。星徒会長の緋宮クロトさんと、前会長の九浄ヴィーナスさんですね」"
translation = "「처음 뵙겠습니다. 성도회장인 히노미야 쿠로토 씨와 전 회장인 쿠죠 비너스 씨군요.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「えっ、この人が！？」"
translation = "「엣, 이 사람이!?」"

[[dialogue]]
speaker = "unk"
original = "内心、俺もヴィーナスと同じように驚いていた。"
translation = "내심 나도 비너스와 마찬가지로 놀라고 있었다."

[[dialogue]]
speaker = "unk"
original = "セイファート前学園長、ラティエ総合学園長の後だから、相当な手練れを探してくるかと思っていた。"
translation = "세이파트 전 학원장, 라티에 종합 학원장의 뒤를 잇는 자리라 상당한 실력자를 찾아올 거라 생각했기에."

[[dialogue]]
speaker = "unk"
original = "……いや、あの２人に匹敵する人物がそうそういるとは思えないけど。"
translation = "……아니, 그 두 사람에 필적하는 인물이 그렇게 쉽게 있을 거라곤 생각되지 않지만."

[[dialogue]]
speaker = "unk"
original = "なんなら三界を隈なく探しても見つかる気がしない。"
translation = "말하자면 삼계를 샅샅이 뒤져도 찾을 수 없을 것 같은 기분이 든다."

[[dialogue]]
speaker = "ヘレナ"
original = "「言っておくが、学園長の適性に戦闘能力は関係ないぞ」"
translation = "「말해두겠는데, 학원장의 적성에 전투 능력은 관계없다.」"

[[dialogue]]
speaker = "クロト"
original = "「ですよね……」"
translation = "「그렇죠……」"

[[dialogue]]
speaker = "unk"
original = "学園長の仕事は教育と組織運営。"
translation = "학원장의 업무는 교육과 조직 운영."

[[dialogue]]
speaker = "unk"
original = "カリスマという意味では、強さもあるに越したことはないのだろうけど。"
translation = "카리스마라는 의미에서는 강함도 있어서 나쁠 건 없겠지만."

[[dialogue]]
speaker = "シノ"
original = "「はは……私もヘレナさんに声をかけられた時は驚きました」"
translation = "「하하…… 저도 헬레나 씨가 말을 걸어주셨을 때는 놀랐답니다.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「見た目で判断してはいけない。彼女はこれでも敏腕経営者だ」"
translation = "「겉모습으로 판단해서는 안 된다. 그녀는 이래 봬도 수완 좋은 경영자니까.」"

[[dialogue]]
speaker = "クロト"
original = "「そう言われると、テレビか何かで見たことあるような……」"
translation = "「그렇게 말씀하시니 텔레비전인가 어딘가에서 본 적이 있는 것 같기도……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あ、そうよ！\u3000天才学生社長って言われてた人だわ！」"
translation = "「아, 맞다! 천재 학생 사장이라고 불렸던 사람이야!」"

[[dialogue]]
speaker = "シノ"
original = "「そんな紹介のされ方もしましたね。お恥ずかしい」"
translation = "「그렇게 소개되기도 했었죠. 부끄럽네요.」"

[[dialogue]]
speaker = "シノ"
original = "「では改めまして。この度、九浄ヘレナさんに呼ばれました十六夜シノです」"
translation = "「그럼 다시 정식으로 인사드리겠습니다. 이번에 쿠죠 헬레나 씨의 부름을 받은 이자요이 시노입니다.」"

[[dialogue]]
speaker = "シノ"
original = "「皆さんのご存じの通り、生徒の方々と同年代ではありますが、とある会社の社長をしていました」"
translation = "「여러분도 아시다시피 학생분들과 비슷한 또래이긴 합니다만, 모 회사의 사장을 맡고 있었습니다.」"

[[dialogue]]
speaker = "シノ"
original = "「私の父は小さな会社を営んでいたんですが、急に倒れてしまいまして……」"
translation = "「제 아버님께서 작은 회사를 경영하고 계셨는데, 갑자기 쓰러지시는 바람에……」"

[[dialogue]]
speaker = "シノ"
original = "「私は当時通っていた学園を飛び級で卒業し、急遽社長を引き継ぐことになったんです」"
translation = "「저는 당시 다니던 학원을 월반으로 졸업하고, 급히 사장직을 승계하게 되었습니다.」"

[[dialogue]]
speaker = "クロト"
original = "「飛び級で……！？\u3000そこから社長になるなんて、すごいですね……」"
translation = "「월반으로……!? 거기서 바로 사장이 되다니 대단하시네요……」"

[[dialogue]]
speaker = "シノ"
original = "「そう言っていただくことは多いのですが、あの時は本当に必死で……飛び級も最短で社長になるためでした」"
translation = "「그렇게 말씀해 주시는 분들이 많지만, 그때는 정말 필사적이라서…… 월반도 최단기간에 사장이 되기 위해서였습니다.」"

[[dialogue]]
speaker = "シノ"
original = "「そうして社長になった私は、死に物狂いで会社経営を学び、なんとか会社を維持できるところまではこぎつけました」"
translation = "「그렇게 사장이 된 저는 필사적으로 회사 경영을 배웠고, 어떻게든 회사를 유지할 수 있는 단계까지는 도달했습니다.」"

[[dialogue]]
speaker = "シノ"
original = "「その後は諸事情あり、従業員の雇用を継続したまま、大手の会社に事業を買収していただきました」"
translation = "「그 후에는 여러 사정이 있어 직원들의 고용을 승계하는 조건으로 대기업에 사업을 매각했습니다.」"

[[dialogue]]
speaker = "シノ"
original = "「私自身は会社を離れたんですけど、それがきっかけで、人に請われて他社の経営に携わるようになって……」"
translation = "「저 자신은 회사를 떠났지만, 그것이 계기가 되어 다른 분들의 요청으로 타사의 경영에 관여하게 되었고……」"

[[dialogue]]
speaker = "シノ"
original = "「いつの間にか、雇われ社長としていろんな会社に呼ばれるようになりました。人生分からないものですね。はは……」"
translation = "「어느샌가 전문 경영인으로서 여러 회사에 불려 다니게 되었습니다. 인생이란 참 알 수 없는 것이네요. 하하……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「へ～」"
translation = "「헤~」"

[[dialogue]]
speaker = "クロト"
original = "「ヴィーナス、意味わかってる？」"
translation = "「비너스, 무슨 뜻인지 알겠어?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ぜんぜん！」"
translation = "「전혀!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「雇われ社長って何？\u3000会社って社長のものなんじゃないの？」"
translation = "「전문 경영인이 뭐야? 회사는 사장 거 아니야?」"

[[dialogue]]
speaker = "シノ"
original = "「学生さんにはピンとこないですよね。私も実際に経営に携わるまでよくわかっていませんでした」"
translation = "「학생분들에게는 잘 와닿지 않겠네요. 저도 실제로 경영에 참여하기 전까지는 잘 몰랐으니까요.」"

[[dialogue]]
speaker = "シノ"
original = "「たとえば、株式会社は株主のものです。出資者たる株主が、経営者に会社の運営を任せるんです」"
translation = "「예를 들어 주식회사는 주주의 것입니다. 출자자인 주주가 경영자에게 회사의 운영을 맡기는 것이죠.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「？？？\u3000会社が自分のものなら、経営も自分でやればいいんじゃないの？」"
translation = "「??? 회사가 자기 거라면 경영도 직접 하면 되잖아?」"

[[dialogue]]
speaker = "シノ"
original = "「そう思いますよね。でも、経営ってなかなか大変なんですよ」"
translation = "「그렇게 생각하시죠. 하지만 경영이란 게 꽤 힘들거든요.」"

[[dialogue]]
speaker = "シノ"
original = "「会社を作るのは意外と簡単なんですけど、運営していくのは難しい。だから専門家に任せるんです」"
translation = "「회사를 만드는 건 의외로 간단하지만, 운영해 나가는 건 어렵습니다. 그래서 전문가에게 맡기는 거예요.」"

[[dialogue]]
speaker = "シノ"
original = "「いうなれば……車の運転手のようなものでしょうか。九浄家では運転は担当の者がいますよね？」"
translation = "「말하자면…… 자동차 운전사 같은 것이랄까요. 쿠죠 가문에도 운전 담당자가 있죠?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そうね。車で出かけるときは、メイド隊の決まった人が運転してるわ」"
translation = "「응. 차로 나갈 때는 메이드대의 정해진 사람이 운전해.」"

[[dialogue]]
speaker = "シノ"
original = "「それと似たようなものです。車は九浄家の所有物ですが、ヴィーナスさんが運転するより安心でしょう？」"
translation = "「그것과 비슷한 겁니다. 자동차는 쿠죠 가문의 소유물이지만, 비너스 씨가 직접 운전하는 것보다 안심되시죠?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「は～……なるほど！\u3000わかった気がするわ！\u3000シノは運転が得意なのね！」"
translation = "「하~…… 그렇구나! 알 것 같아! 시노는 운전을 잘하는 거네!」"

[[dialogue]]
speaker = "シノ"
original = "「あ、いえ、私自身は運転はしないんですけど……」"
translation = "「아, 아뇨, 저 자신이 운전을 하는 건 아닙니다만……」"

[[dialogue]]
speaker = "クロト"
original = "（誤解が起きている気がしないでもないけど……）"
translation = "(오해가 생기고 있는 기분이 들지 않는 것도 아니지만……)"

[[dialogue]]
speaker = "unk"
original = "だけど俺には、シノさんの説明は腑に落ちた。"
translation = "하지만 나에게는 시노 씨의 설명이 납득이 갔다."

[[dialogue]]
speaker = "unk"
original = "餅は餅屋。運転手という職業があるように、経営の分野にも専門家が存在するということだ。"
translation = "송곳은 송곳집에. 운전사라는 직업이 있듯이 경영 분야에도 전문가가 존재한다는 뜻이다."

[[dialogue]]
speaker = "ヘレナ"
original = "「彼女は組織立て直しのスペシャリストだ。前学園長の失踪によって起きた綻びを直すには適任だと思ってな」"
translation = "「그녀는 조직 재건의 스페셜리스트다. 전 학원장의 실종으로 인해 생긴 균열을 메우기에는 적임자라고 생각했지.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「何より、私の直感が告げている」"
translation = "「무엇보다 나의 직감이 말하고 있다.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「──新たな学園長にふさわしいのは彼女だとな！」"
translation = "「──새로운 학원장에 어울리는 사람은 바로 그녀라고 말이다!」"

[[dialogue]]
speaker = "シノ"
original = "「あの私、まだお引き受けするとは決めていなくて……今日は詳しいお話を伺うだけと聞いていたのですが」"
translation = "「저기, 저는 아직 맡겠다고 결정한 게 아니라서…… 오늘은 자세한 이야기를 들으러 온 것뿐이라고 들었습니다만.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「む……そうだったか？\u3000新学園長として理事たちにお披露目するつもりだったのだが」"
translation = "「음…… 그랬던가? 신임 학원장으로서 이사들에게 선보일 생각이었다만.」"

[[dialogue]]
speaker = "シノ"
original = "「聞いてないですよ！？」"
translation = "「들은 적 없다고요!?」"

[[dialogue]]
speaker = "クロト"
original = "「はは……」"
translation = "「하하……」"

[[dialogue]]
speaker = "unk"
original = "煌嶺は暴君だけど、この人もたいがい剛腕だと思う。"
translation = "코레이는 폭군이지만, 이 사람도 어지간히 막무가내라고 생각한다."

[[dialogue]]
speaker = "シノ"
original = "「ですが、現会長の緋宮さんと、前会長のヴィーナスさんにお会いできたのはいい機会です」"
translation = "「하지만 현 회장인 히노미야 씨와 전 회장인 비너스 씨를 뵐 수 있었던 건 좋은 기회네요.」"

[[dialogue]]
speaker = "シノ"
original = "「現役の星騎士として、現役と先代の星徒会長として、お話を聞かせていただけませんか？」"
translation = "「현역 성기사로서, 그리고 현역과 전대 성도회장으로서 이야기를 들려주시지 않겠습니까?」"

