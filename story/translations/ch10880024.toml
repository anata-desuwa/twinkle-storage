[[dialogue]]
speaker = "unk"
original = "第４話,リーナだけを見て,P"
translation = "제4화, 리나만 봐줘, P"

[[dialogue]]
speaker = "unk"
original = "リーナが話があるというので、サーシャさんたちと離れて席に着く。"
translation = "리나가 할 말이 있다고 해서 사샤 씨 일행과 떨어져 자리에 앉는다."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「あのね、あのね……リーナはお兄ちゃんが大好き」"
translation = "「저기 말야, 저기 말야…… 리나는 오빠를 정말 좋아해」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「でもね、それだけじゃないの……お兄ちゃんのこと考えてると苦しいの」"
translation = "「하지만 말야, 그것뿐만이 아니야…… 오빠 생각하면 괴로워」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「お兄ちゃんが知らない人と話してるとモヤモヤして、リーナのいないところで楽しそうにしてるの考えたら、すっごく胸が苦しくなる」"
translation = "「오빠가 모르는 사람이랑 이야기하면 답답하고, 리나가 없는 곳에서 즐겁게 지내는 걸 생각하면 가슴이 너무 아파」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「お兄ちゃん……リーナ、おかしくなっちゃったのかな……？」"
translation = "「오빠…… 리나, 이상해진 걸까……?」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「……お兄ちゃん？\u3000難しい顔してどうしたの？」"
translation = "「……오빠? 어려운 표정 짓고 왜 그래?」"

[[dialogue]]
speaker = "unk"
original = "……おかしくなんかない"
translation = "……이상하지 않아"

[[dialogue]]
speaker = "unk"
original = "絞り出した言葉は、当たり障りのないものだったけど、本心でもあった。"
translation = "쥐어짜듯 내뱉은 말은 무난한 것이었지만 진심이기도 했다."

[[dialogue]]
speaker = "unk"
original = "俺だって考えたことはある。もしリーナが大きくなって、俺と違う人と幸せになったら、祝福できるだろうか、と。"
translation = "나도 생각해본 적이 있다. 만약 리나가 자라서 내가 아닌 다른 사람과 행복해진다면 축복해줄 수 있을까, 하고."

[[dialogue]]
speaker = "unk"
original = "俺も同じ気持ちだよ"
translation = "나도 같은 마음이야"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「……そうなの？」"
translation = "「……정말이야?」"

[[dialogue]]
speaker = "unk"
original = "リーナには笑っていて欲しいし、リーナを守りたいと思っている。でもそこには俺も一緒にいないとイヤだ。"
translation = "리나가 웃었으면 좋겠고 리나를 지키고 싶다고 생각한다. 하지만 거기엔 나도 함께 있어야만 한다."

[[dialogue]]
speaker = "unk"
original = "それは、俺がお兄ちゃんだからじゃなくて──"
translation = "그건 내가 오빠라서가 아니라──"

[[dialogue]]
speaker = "unk"
original = "俺もリーナが大好きだから"
translation = "나도 리나를 정말 좋아하니까"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「ほんと？\u3000じゃあ、もうリーナの知らない人とお話したりしない？\u3000リーナのいないところで女の人に会ったりしない？」"
translation = "「정말? 그럼 이제 리나가 모르는 사람이랑 이야기하거나 안 할 거야? 리나가 없는 곳에서 여자분 만나거나 안 할 거야?」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「……それはムリ？\u3000なんでぇ……？」"
translation = "「……그건 무리야? 왜애……?」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「……リーナだってコラプサーのみんなと仲良くしちゃダメって言われたら困る？\u3000それは……う～～～ん」"
translation = "「……리나도 콜랩서 동료들이랑 사이좋게 지내지 말라고 하면 곤란해? 그건…… 으음」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「困るかな……困らないような……いや困るかも……？」"
translation = "「곤란할까나…… 안 곤란할 것 같기도…… 아니 곤란할지도……?」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「じゃあ、カヤちゃんやアイリーンちゃんだったら？\u3000それはヤダ！」"
translation = "「그럼 카야짱이나 아이린짱이라면? 그건 싫어!」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「リーナ、お兄ちゃんを困らせるようなこと言ってたんだね……ごめんね、お兄ちゃん。リーナ、悪い子になっちゃった……」"
translation = "「리나, 오빠를 곤란하게 할 만한 말을 했네…… 미안해, 오빠. 리나, 나쁜 아이가 됐어……」"

[[dialogue]]
speaker = "unk"
original = "リーナが俺を慕ってくれるのは嬉しいけど、だからといって束縛し合うのはよくない。"
translation = "리나가 나를 잘 따라주는 건 기쁘지만 그렇다고 해서 서로를 구속하는 건 좋지 않다."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「でも、リーナの苦しいのはどうすればいいの？\u3000どうすれば苦しくなくなるの？」"
translation = "「하지만 리나의 괴로운 건 어떻게 해야 해? 어떻게 해야 안 괴로워져?」"

[[dialogue]]
speaker = "unk"
original = "それは……"
translation = "그건……"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「それはお姉ちゃんが答えましょう～」"
translation = "「그건 언니가 대답해주도록 하죠~」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「姉さん、何やってるんですか！？」"
translation = "「언니, 뭐 하시는 거예요!?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふっ。ちょっと心配だったから、お話聞かせてもらったわ～」"
translation = "「후훗. 조금 걱정돼서 이야기 좀 엿들었어~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「リーナちゃん？\u3000リーナちゃんは大好きなお兄ちゃんが誰かにとられないか不安なのよね？」"
translation = "「리나짱? 리나짱은 소중한 오빠를 누군가에게 뺏기지 않을까 불안한 거지?」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「…………うん」"
translation = "「…………응」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そうね、すごく分かるわ。素敵なお兄ちゃんだものね」"
translation = "「그래, 아주 잘 알아. 멋진 오빠인걸」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そういうときはね、たくさんお話するの。お兄ちゃんがリーナちゃんのお兄ちゃんだって、安心できるまで」"
translation = "「그럴 때는 말야, 이야기를 많이 하는 거야. 오빠가 리나짱의 오빠라는 걸 안심할 수 있을 때까지」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「これは私が反省しなきゃなんだけど、私も言葉が足りなくて、ソフィを心配させてしまったから」"
translation = "「이건 내가 반성해야 할 점이지만, 나도 말이 부족해서 소피를 걱정시키곤 했으니까」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「でも、お兄ちゃんなら大丈夫。ちゃんとリーナちゃんと向き合ってくれるもの」"
translation = "「하지만 오빠라면 괜찮아. 제대로 리나짱과 마주 봐줄 테니까」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「だから、リーナちゃんはお兄ちゃんといっぱい遊んで、いっぱいお話しましょう。そうすれば、会えないときも寂しくないわ」"
translation = "「그러니까 리나짱은 오빠랑 많이 놀고 이야기를 많이 나누렴. 그러면 만나지 못할 때도 외롭지 않을 거야」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「ほんと？」"
translation = "「정말?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「本当よ。ね、お兄ちゃん？」"
translation = "「정말이야. 그치, 오빠?」"

[[dialogue]]
speaker = "unk"
original = "はい！"
translation = "네!"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「じゃあ、今日はいっぱい遊ぼうね、お兄ちゃん！」"
translation = "「그럼 오늘은 많이 놀자, 오빠!」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「あ、そうだ、パフェ！」"
translation = "「아, 맞다, 파르페!」"

[[dialogue]]
speaker = "unk"
original = "リーナと話していたら、パフェがテーブルの上に置いたままになっていたのをすっかり忘れていた。"
translation = "리나와 이야기하느라 파르페를 테이블 위에 둔 채로 까맣게 잊고 있었다."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「ん～～！\u3000おいしい！\u3000クリームたっぷりで幸せ～！」"
translation = "「으음~! 맛있다! 크림 듬뿍이라 행복해~!」"

[[dialogue]]
speaker = "unk"
original = "この暑さでもアイスが溶けないまま冷たさを保っていた。おかしいなと思っていると……"
translation = "이 더위에도 아이스크림이 녹지 않고 차가움을 유지하고 있었다. 이상하다고 생각하고 있자니……"

[[dialogue]]
speaker = "unk"
original = "サーシャさんが微笑みながら去っていくのが見えた。先輩の氷の星術のおかげだったようだ。"
translation = "사샤 씨가 미소 지으며 떠나가는 것이 보였다. 선배의 얼음 성술 덕분이었던 모양이다."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「お兄ちゃん、あ～～ん……ほら、お口あけて。リーナ言ったでしょ。ふたりで食べようって」"
translation = "「오빠, 아앙…… 자, 입 벌려봐. 리나가 말했잖아. 둘이서 같이 먹자고」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「はい、あ～～ん」"
translation = "「자, 아앙」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「ふふっ、おいしい？\u3000ならよかった。お兄ちゃんが嬉しいとリーナも嬉しいっ」"
translation = "「후훗, 맛있어? 그럼 다행이야. 오빠가 기쁘면 리나도 기뻐」"

[[dialogue]]
speaker = "unk"
original = "リーナもあーん"
translation = "리나도 아앙"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「え、リーナも！？\u3000あ～～ん……うん、おいしい……」"
translation = "「에, 리나도!? 아앙…… 응, 맛있어……」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「おいしいけど、恥ずかしいよぉ～！\u3000ドキドキするよぉ～！」"
translation = "「맛있긴 한데 부끄러워어! 두근거려어!」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「もう、次はリーナの番だからね！」"
translation = "「정말, 다음은 리나 차례니까!」"

[[dialogue]]
speaker = "unk"
original = "それから、２人で巨大なパフェをたっぷり食べさせあいっこしたのだった。"
translation = "그 후로 둘이서 거대한 파르페를 잔뜩 서로 먹여주었다."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「今日は楽しかったっ！」"
translation = "「오늘은 즐거웠어!」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「パフェもおいしかったし、プールも可愛かったね」"
translation = "「파르페도 맛있었고 수영장도 귀여웠어」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「お兄ちゃん、泳ぐの得意でびっくりしちゃった。リーナはあんまり泳ぐの得意じゃないから、今度教えてね」"
translation = "「오빠, 수영 잘해서 깜짝 놀랐어. 리나는 수영 별로 못하니까 다음에 가르쳐줘」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「……ねぇ、お兄ちゃん」"
translation = "「……있잖아, 오빠」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「またリーナがモヤモヤしたり、苦しくなったら、一緒に遊んでくれる？\u3000お話、聞いてくれる？」"
translation = "「또 리나가 답답해지거나 괴로워지면 같이 놀아줄 거야? 이야기 들어줄 거야?」"

[[dialogue]]
speaker = "unk"
original = "もちろん！"
translation = "물론이지!"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「ふふっ、ありがとう」"
translation = "「후훗, 고마워」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「お兄ちゃん、大好きっ！」"
translation = "「오빠, 정말 좋아!」"

[[dialogue]]
speaker = "unk"
original = "俺がお兄ちゃんであろうとそうでなくとも、ずっとリーナの傍にいたいと思うのだった。"
translation = "내가 오빠이든 아니든 계속 리나의 곁에 있고 싶다고 생각했다."

