[[dialogue]]
speaker = "スミカ"
original = "「クックック……こんなにち○ぽおっ立てやがって、相変わらず欲望には忠実だなぁ、会長サン？」"
translation = "「큭큭큭…… 이렇게 자지를 꼿꼿이 세우고는, 여전히 욕망에는 충실하구만, 회장님?」"

[[dialogue]]
speaker = "unk"
original = "スミカが俺を見下ろしながら嘲笑する。"
translation = "스미카가 나를 내려다보며 비웃는다."

[[dialogue]]
speaker = "unk"
original = "にもかかわらず、俺の下半身は待ちきれないとばかりに勃起していた。"
translation = "그럼에도 불구하고, 내 하반신은 기다릴 수 없다는 듯 발기해 있었다."

[[dialogue]]
speaker = "スミカ"
original = "「アタシはテメェの早漏を治療してやろうとしてるだけだってのに、気持ち悪いくれえギンギンじゃねえか。このヘンタイ星徒会長が」"
translation = "「나는 네놈의 조루를 치료해 주려고 하는 것뿐인데, 징그러울 정도로 팽팽하잖아. 이 변태 성도회장 놈이」"

[[dialogue]]
speaker = "unk"
original = "スミカがお尻を向けた扇情的な体勢のまま罵倒を飛ばす。"
translation = "스미카가 엉덩이를 향한 선정적인 자세 그대로 매도를 퍼붓는다."

[[dialogue]]
speaker = "unk"
original = "しかしこの罵倒も、今の俺には興奮をかき立てるスパイスにしかならない。"
translation = "하지만 이 매도조차, 지금의 나에게는 흥분을 돋우는 스파이스밖에 되지 않는다."

[[dialogue]]
speaker = "スミカ"
original = "「ったく、アタシに心の底から感謝しろよ？\u3000ほ～ら、会長サンのだ～い好きなお尻だ。好きなだけ見ていいぞ」"
translation = "「나 원 참, 나한테 마음속 깊이 감사하라고? 자~, 회장님이 너~무 좋아하는 엉덩이다. 마음껏 봐도 좋다고」"

[[dialogue]]
speaker = "unk"
original = "挑発的にお尻を揺らされると、男の本能のせいで目が離せなくなる。"
translation = "도발적으로 엉덩이를 흔들어대자, 남자의 본능 때문에 눈을 뗄 수 없게 된다."

[[dialogue]]
speaker = "スミカ"
original = "「そら♪」"
translation = "「자♪」"

[[dialogue]]
speaker = "unk"
original = "形のいいお尻がパンツ越しにペニスに触れた。"
translation = "모양 좋은 엉덩이가 팬티 너머로 페니스에 닿았다."

[[dialogue]]
speaker = "クロト"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker = "unk"
original = "むちっと柔らかいお尻の感触で下半身が震える。"
translation = "쫀득하고 부드러운 엉덩이의 감촉에 하반신이 떨린다."

[[dialogue]]
speaker = "unk"
original = "そしてスミカはお尻をペニスに押し付けながら体を揺らし始めた。"
translation = "그리고 스미카는 엉덩이를 페니스에 밀어붙이며 몸을 흔들기 시작했다."

[[dialogue]]
speaker = "スミカ"
original = "「ふ……ん……はぁ……嬉しそうにち○ぽビクビクさせやがって、もう射精しそうじゃねーか。早漏を治してやってんのに、堪え性のないち○ぽだぜ」"
translation = "「후…… 음…… 하아…… 기쁜 듯이 자지를 움찔거리기는, 벌써 사정할 것 같잖아. 조루를 고쳐주고 있는데, 참을성 없는 자지구만」"

[[dialogue]]
speaker = "unk"
original = "アタシがいいと言うまで我慢できればセックスしてやる──"
translation = "내가 좋다고 할 때까지 참을 수 있으면 섹스해 줄게──"

[[dialogue]]
speaker = "unk"
original = "そういう約束で、お尻だけじゃなくて手や口、それから足でもペニスをいじられた。"
translation = "그런 약속으로, 엉덩이뿐만 아니라 손이나 입, 그리고 발로도 페니스를 농락당했다."

[[dialogue]]
speaker = "unk"
original = "本当に俺が早漏なのかはわからないが、耐えられた試しはない。"
translation = "정말로 내가 조루인지는 모르겠지만, 버텨낸 적이 없다."

[[dialogue]]
speaker = "スミカ"
original = "「ん……は……こんなヘンタイが新星学園に転入を許されるとか、世も末だな。授業中もち○ぽおっ立ててんじゃねーの？」"
translation = "「음…… 하…… 이런 변태가 신성학원에 전입을 허가받다니, 말세로군. 수업 중에도 자지 세우고 있는 거 아냐?」"

[[dialogue]]
speaker = "スミカ"
original = "「星徒会でも役員どもを犯すキモイ妄想してんじゃねえだろうな。女の敵だな」"
translation = "「성도회에서도 임원 녀석들을 범하는 기분 나쁜 망상이나 하고 있는 건 아니겠지. 여자의 적이네」"

[[dialogue]]
speaker = "unk"
original = "そんなことはない──と反論しようとしたが、弾力のある尻肉で裏筋をなぞられ、快感でうまく言葉にできない。"
translation = "그런 적 없어──라고 반론하려 했지만, 탄력 있는 엉덩이 살로 요도 쪽을 훑어 내려가자, 쾌감 때문에 말을 잘 잇지 못하겠다."

[[dialogue]]
speaker = "スミカ"
original = "「ああ、でもテメェはフロレンシアの体に夢中だもんな。割とガキっぽいのが好みなのか？」"
translation = "「아아, 하지만 네놈은 플로렌시아의 몸에 푹 빠졌지. 의외로 애 같은 게 취향인가?」"

[[dialogue]]
speaker = "スミカ"
original = "「フロレンシアは何も知らねえってのによぉ、フロレンシアに申し訳ないと思わねえのか？\u3000ドヘンタイの……会長サンっ」"
translation = "「플로렌시아는 아무것도 모른다는데 말이야, 플로렌시아한테 미안하다고 생각 안 해? 이 개변태…… 회장님」"

[[dialogue]]
speaker = "unk"
original = "そう、今はスミカの人格だが、体はフロレンシアのものだ。"
translation = "그렇다, 지금은 스미카의 인격이지만, 몸은 플로렌시아의 것이다."

[[dialogue]]
speaker = "unk"
original = "お尻はむっちりと丸みがあって、いつも真面目で一生懸命なフロレンシアが、こんなに官能的な体をしていたと思うとたまらない。"
translation = "엉덩이는 포동포동하고 둥글어서, 언제나 성실하고 열심인 플로렌시아가 이렇게 관능적인 몸을 하고 있었다고 생각하니 견딜 수 없다."

[[dialogue]]
speaker = "unk"
original = "フロレンシアの体を欲望のはけ口にしている背徳感も加わり、お尻で撫でられる度にペニスが跳ねた。"
translation = "플로렌시아의 몸을 욕망의 배출구로 삼고 있다는 배덕감까지 더해져, 엉덩이로 애무당할 때마다 페니스가 튀어 올랐다."

[[dialogue]]
speaker = "スミカ"
original = "「テメェの好きなフロレンシアの尻だ、硬くなったち○ぽで存分に味わえよ。ほら、ほら……」"
translation = "「네놈이 좋아하는 플로렌시아의 엉덩이다, 딱딱해진 자지로 마음껏 맛보라고. 자, 자……」"

[[dialogue]]
speaker = "unk"
original = "にやにや笑いながら、さらに強くお尻を押し付けるスミカ。"
translation = "니글니글 웃으며 더욱 강하게 엉덩이를 밀어붙이는 스미카."

[[dialogue]]
speaker = "unk"
original = "ペニスがお尻の肉に沈み込むほど密着され、下着の滑らかな感触と相まって、さらに射精欲を刺激する。"
translation = "페니스가 엉덩이 살에 파묻힐 정도로 밀착되자, 속옷의 매끄러운 감촉과 어우러져 더욱 사정 욕구를 자극한다."

[[dialogue]]
speaker = "スミカ"
original = "「ふ……ん……へぇ、今日は耐えるじゃねえか。ちょっとはマシになったが、まだ終わりじゃねえぞ？」"
translation = "「후…… 음…… 헤에, 오늘은 좀 버티는데. 조금은 나아졌지만, 아직 끝이 아니라고?」"

[[dialogue]]
speaker = "unk"
original = "フロレンシアのお尻が上下に動いて、繰り返し裏筋を撫でる。"
translation = "플로렌시아의 엉덩이가 위아래로 움직이며 반복해서 요도 쪽을 문지른다."

[[dialogue]]
speaker = "unk"
original = "艶めかしい光景が視覚からも情欲を煽り、気を抜くと射精してしまいそうになるが、歯を食いしばって耐えた。"
translation = "요염한 광경이 시각적으로도 정욕을 부추겨, 방심하면 사정해 버릴 것 같았지만 이를 악물고 버텼다."

[[dialogue]]
speaker = "スミカ"
original = "「ハッ、必死な顔してんじゃねーか。星徒会長ともあろう人が、そんなにフロレンシアのま○こにち○ぽぶちこみてぇんだなぁ」"
translation = "「핫, 필사적인 얼굴 하고 있잖아. 성도회장이나 되는 사람이, 그렇게 플로렌시아 보지에 자지 처박고 싶은 거냐」"

[[dialogue]]
speaker = "スミカ"
original = "「男ってのは、女とヤるためなら何でもしやがる。ホントにかっこわるいよなぁ」"
translation = "「남자라는 건, 여자랑 하기 위해서라면 뭐든지 한단 말이지. 정말 꼴불견이야」"

[[dialogue]]
speaker = "unk"
original = "体を強張らせてこらえる俺をあざ笑うスミカ。"
translation = "몸을 굳히고 참는 나를 비웃는 스미카."

[[dialogue]]
speaker = "unk"
original = "しかしスミカの股間も濡れていて、時折くちゅっといやらしい音が響いた。"
translation = "하지만 스미카의 가랑이도 젖어 있어서, 이따금 질퍽하고 야한 소리가 울려 퍼졌다."

[[dialogue]]
speaker = "スミカ"
original = "「ふっ……はぁ……ククッ、まだ耐えるのか。ま、治療なんだから治ってもらわなきゃ困るんだがな」"
translation = "「훗…… 하아…… 큭큭, 아직도 참는 거냐. 뭐, 치료니까 나아줘야 곤란하지 않겠지만」"

[[dialogue]]
speaker = "スミカ"
original = "「ん……は……どうしよっかな～、そろそろ入れてやろっかな～、やめとこっかな～……んっ──」"
translation = "「음…… 하…… 어떡할까~, 슬슬 넣어줄까~, 말까~…… 응──」"

[[dialogue]]
speaker = "unk"
original = "だがスミカがお尻を上げた拍子に、濡れた股間が亀頭の高さを超える。"
translation = "하지만 스미카가 엉덩이를 들어 올린 찰나, 젖은 가랑이가 귀두 높이를 넘어섰다."

[[dialogue]]
speaker = "unk"
original = "そのまま腰を下ろすと──"
translation = "그대로 허리를 내리자──"

[[dialogue]]
speaker = "フロレンシア"
original = "「ひぁああああああああっ！？」"
translation = "「히아아아아아아아앗!?」"

[[dialogue]]
speaker = "unk"
original = "次の瞬間には悲鳴上がり、フロレンシアが驚きの表情を浮かべていた。"
translation = "다음 순간 비명이 터져 나오고, 플로렌시아가 놀란 표정을 짓고 있었다."

[[dialogue]]
speaker = "フロレンシア"
original = "「いったぁ……んんっ……お腹、熱い……」"
translation = "「아파아…… 으음…… 배 안이 뜨거워……」"

[[dialogue]]
speaker = "フロレンシア"
original = "「私、何して……会長さん！？\u3000しかもエッチしてる！？\u3000こんな恥ずかしいかっこうで！？\u3000え？\u3000なんで？\u3000どうして？」"
translation = "「나, 뭘 하고…… 회장님!? 게다가 섹스하고 있어!? 이런 부끄러운 모습으로!? 에? 왜? 어째서?」"

[[dialogue]]
speaker = "フロレンシア"
original = "「もしかして夢……？\u3000でもあそこ痛いし、苦しいし、夢じゃないよね……？」"
translation = "「혹시 꿈……? 하지만 거기 아프고, 괴롭고, 꿈이 아니지……?」"

[[dialogue]]
speaker = "unk"
original = "もちろん夢ではなくて現実なのだが、どこまで説明していいか。"
translation = "물론 꿈이 아니라 현실이지만, 어디까지 설명해야 좋을까."

[[dialogue]]
speaker = "unk"
original = "けれどフロレンシアの中は熱くて柔らかくて、さっきまでお尻でペニスを擦っていたせいか、膣内は蜜で潤っていた。"
translation = "하지만 플로렌시아의 안은 뜨겁고 부드러워서, 방금 전까지 엉덩이로 페니스를 문질렀던 탓인지 질 안은 애액으로 윤이 나고 있었다."

[[dialogue]]
speaker = "unk"
original = "しかも体が小さいからか、膣がペニス全体をきつく締め付けてきて、自分だけ快感を得ているのが申し訳なくなってしまう。"
translation = "게다가 몸이 작아서인지, 질이 페니스 전체를 꽉 조여와서 나만 쾌감을 얻는 것이 미안해질 정도였다."

[[dialogue]]
speaker = "フロレンシア"
original = "「んっ……はあぁ……会長さんのおち○ちん、熱くて、ビクビクしてる……」"
translation = "「응…… 하아…… 회장님의 자지, 뜨거워서 움찔거리고 있어……」"

[[dialogue]]
speaker = "フロレンシア"
original = "「私、本当に会長さんとつながってるんだよね……夢じゃないんだよね……」"
translation = "「나, 정말로 회장님과 이어져 있는 거네…… 꿈이 아니구나……」"

[[dialogue]]
speaker = "unk"
original = "フロレンシアからすれば何が何だかわからない状況だろうが、抜こうとするそぶりはなく……"
translation = "플로렌시아 입장에서는 영문을 모를 상황이겠지만, 빼려는 기색은 없고……"

[[dialogue]]
speaker = "フロレンシア"
original = "「ごめんなさい、会長さん……！」"
translation = "「죄송해요, 회장님……!」"

[[dialogue]]
speaker = "フロレンシア"
original = "「はぁっ、はっ、はんっ……<emoji=heart04>\u3000ほんとに、私の中に入ってるぅ……ふぁっ……あっ……んんっ<emoji=heart04>」"
translation = "「하아, 하아, 항……<emoji=heart04> 정말로, 내 안에 들어와 있어…… 하아…… 앗…… 으음<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それどころか、フロレンシアは自分から体を動かし始めた。"
translation = "그것은커녕, 플로렌시아는 스스로 몸을 움직이기 시작했다."

[[dialogue]]
speaker = "unk"
original = "ゆっくりではあるが粘膜とペニスが摩擦し、ゾクゾクと快感が押し寄せる。"
translation = "느릿하지만 점막과 페니스가 마찰하며 소름 끼치는 쾌감이 몰려온다."

[[dialogue]]
speaker = "フロレンシア"
original = "「私、前からこうしたかったんです……ふぁ、はぁ……ひぁああっ<emoji=heart04>\u3000ひぁっ……はぁ……あんっ……はぁ、はぁ……んん～っ……<emoji=heart04>」"
translation = "「나, 전부터 이렇게 하고 싶었어요…… 하아, 하아…… 히아아앗<emoji=heart04> 히앗…… 하아…… 앙…… 하아, 하아…… 으음~……<emoji=heart04>」"

[[dialogue]]
speaker = "フロレンシア"
original = "「会長さん、優しくて……悩みを聞いてくれて、思いっきり刺しても許してくれて……ふぁっ……はっ……あんっ……あぁっ<emoji=heart04>」"
translation = "「회장님, 상냥하고…… 고민도 들어주고, 마음껏 찔러도 용서해 주고…… 하아…… 하앗…… 앙…… 아앗<emoji=heart04>」"

[[dialogue]]
speaker = "フロレンシア"
original = "「ふ……ふっ……んんっ……<emoji=heart04>\u3000会長さんのこと、前から好きでした……！」"
translation = "「후…… 후…… 으음……<emoji=heart04> 회장님을, 전부터 좋아했어요……!」"

[[dialogue]]
speaker = "クロト"
original = "「ッ──！」"
translation = "「윽──!」"

[[dialogue]]
speaker = "unk"
original = "フロレンシアの突然の告白。"
translation = "플로렌시아의 갑작스러운 고백."

[[dialogue]]
speaker = "unk"
original = "今度は俺が驚いてしまったが、その間もフロレンシアは腰を上下に振り続ける。"
translation = "이번에는 내가 놀라 버렸지만, 그동안에도 플로렌시아는 허리를 위아래로 계속 흔든다."

[[dialogue]]
speaker = "フロレンシア"
original = "「実は、会長さんとエッチする想像しながら……オ、オナニーしてて……んっ……はっ……あっ、あんっ<emoji=heart04>」"
translation = "「사실은, 회장님과 섹스하는 상상을 하면서…… 자, 자위하고 있어서…… 응…… 하앗…… 앗, 앙<emoji=heart04>」"

[[dialogue]]
speaker = "フロレンシア"
original = "「あっ、ん……どうしてこうなってるのか、わからないですけど……はあぁ……あっ、はっ、んんっ……<emoji=heart04>」"
translation = "「앗, 응…… 어째서 이렇게 된 건지 모르겠지만…… 하아…… 앗, 하앗, 으음……<emoji=heart04>」"

[[dialogue]]
speaker = "フロレンシア"
original = "「会長さんと、エッチできて……嬉しいですっ……あぁっ、はぁっ、あっ……ふぁっ、はっ……ひぁああ～～っ<emoji=heart04>」"
translation = "「회장님과 섹스할 수 있어서…… 기뻐요…… 아앗, 하앗, 앗…… 하아, 하앗…… 히아아아~~앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ぐっ……無理してないか？」"
translation = "「윽…… 무리하고 있는 거 아냐?」"

[[dialogue]]
speaker = "フロレンシア"
original = "「無理なんか、してません……んっ、はぁ、はぁっ……あんっ<emoji=heart04>\u3000ひぁっ……あぁっ、あっ……んぁっ、はぁっ、はぁんっ……<emoji=heart04>」"
translation = "「무리 같은 거 안 해요…… 응, 하아, 하아…… 앙<emoji=heart04> 히앗…… 아앗, 앗…… 응앗, 하아, 하아앙……<emoji=heart04>」"

[[dialogue]]
speaker = "フロレンシア"
original = "「確かにちょっと苦しいですけど……初めてなのに、そんなに痛くなくて、気持ちいいんです……ふぁああっ<emoji=heart04>」"
translation = "「확실히 좀 괴롭긴 하지만…… 처음인데도 그렇게 아프지 않고, 기분 좋아요…… 하아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "フロレンシアの言葉が本当だと示すように、膣が嬉しそうにきゅっと収縮する。"
translation = "플로렌시아의 말이 사실임을 증명하듯, 질이 기쁜 듯이 꽉 수축한다."

[[dialogue]]
speaker = "unk"
original = "初めてだけあってフロレンシアの中は狭く、さらに圧迫されて強烈な快感になった。"
translation = "처음이라 그런지 플로렌시아의 안은 좁았고, 더욱 압박되어 강렬한 쾌감이 되었다."

[[dialogue]]
speaker = "フロレンシア"
original = "「会長さんのおち○ちんで、私の中、広がってますっ……あぁっ、はぁっ、はっ……あ、あんっ<emoji=heart04>」"
translation = "「회장님의 자지로, 내 안이 넓어지고 있어요…… 아앗, 하앗, 하앗…… 아, 앙<emoji=heart04>」"

[[dialogue]]
speaker = "フロレンシア"
original = "「エッチするの、気持ち、いい……ふぁ、はぁ、んん……会長さん、会長さんっ……ぁ……んん～～～っ<emoji=heart04>」"
translation = "「섹스하는 거, 기분 좋아…… 하아, 하아, 으음…… 회장님, 회장님…… 아…… 으음~~~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "フロレンシアが腰を動かす度にさらに愛液の量が増す。"
translation = "플로렌시아가 허리를 움직일 때마다 더욱 애액의 양이 늘어난다."

[[dialogue]]
speaker = "unk"
original = "膣がペニス全体が呑み込むと、じゅぷっと音を立てて膣口から蜜が溢れ出た。"
translation = "질이 페니스 전체를 집어삼키자, 쥬퓩 소리를 내며 질구에서 꿀이 넘쳐흘렀다."

[[dialogue]]
speaker = "フロレンシア"
original = "「ふあぁっ、あっ……あんっ……おち○ちん、想像してたのより大きくて、すごい……あっ、あっ……ふあぁんっ<emoji=heart04>」"
translation = "「하아앗, 앗…… 앙…… 자지, 상상했던 것보다 커서 굉장해…… 앗, 앗…… 하아앙<emoji=heart04>」"

[[dialogue]]
speaker = "フロレンシア"
original = "「あっ、はっ、はっ、んっ……あぁ<emoji=heart04>\u3000はぁ、あっ……体熱くて、止まらないです……はっ……あっ、あっ──ひぁああっ<emoji=heart04>」"
translation = "「앗, 하앗, 하앗, 응…… 아아<emoji=heart04> 하아, 앗…… 몸이 뜨거워서 멈추지 않아요…… 하앗…… 앗, 앗── 히아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "フロレンシア"
original = "「初めてなのに……はっ、あっ……エッチするの、好きになりそう……ふぁ、あ、あ──んん～～っ<emoji=heart04>」"
translation = "「처음인데도…… 하앗, 앗…… 섹스하는 거, 좋아하게 될 것 같아…… 하아, 아, 아── 으음~~<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「くっ、俺も……！」"
translation = "「큭, 나도……!」"

[[dialogue]]
speaker = "フロレンシア"
original = "「はい、来てくださいっ……！\u3000はぁ、あ、あんっ……会長さんのおち○ちんで、いっぱい突いてくださいっ……<emoji=heart04>」"
translation = "「네, 와주세요……! 하아, 아, 앙…… 회장님의 자지로 잔뜩 찔러주세요……<emoji=heart04>」"

[[dialogue]]
speaker = "フロレンシア"
original = "「んん～～～～～っ<emoji=heart04><emoji=heart04>\u3000あ、あ、あ……んんっ……おち○ちん、来てるぅっ……下から突き上げられてっ……あっ、んっ──んあぁ～～っ<emoji=heart04>」"
translation = "「으음~~~~~앗<emoji=heart04><emoji=heart04> 아, 아, 아…… 으음…… 자지, 오고 있어…… 밑에서 쳐올려져서…… 앗, 응── 응아아~~앗<emoji=heart04>」"

[[dialogue]]
speaker = "フロレンシア"
original = "「はっ、あっ、あっ、あっ──ひやぁああっ<emoji=heart04>\u3000おち○ちん、いっぱい擦れて、奥に当たって……んっ、はぁ──ふぁ──はあぁんっ<emoji=heart04>」"
translation = "「하앗, 앗, 앗, 앗── 히야아앗<emoji=heart04> 자지, 잔뜩 쓸려서, 안쪽에 닿아서…… 응, 하아── 하아── 하아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺が突き上げるのとフロレンシアが降りてくるのが重なり、粘膜とペニスが摩擦する。"
translation = "내가 쳐올리는 것과 플로렌시아가 내려오는 것이 겹쳐, 점막과 페니스가 마찰한다."

[[dialogue]]
speaker = "unk"
original = "蜜でとろとろになった、柔らかな膣壁と限界まで怒張したペニスが擦れ合うと、快感で脳が沸騰しそうだ。"
translation = "애액으로 걸쭉해진 부드러운 질벽과 한계까지 팽창한 페니스가 비벼지자, 쾌감으로 뇌가 끓어오를 것 같다."

[[dialogue]]
speaker = "フロレンシア"
original = "「はぁ、あんっ、んんっ<emoji=heart04>\u3000嬉しいっ……会長さんのおち○ちん、私のおま○こに、いっぱい来てるっ……たくさん、ズンズンされてます……っ<emoji=heart04>」"
translation = "「하아, 앙, 으음<emoji=heart04> 기뻐…… 회장님의 자지가 내 보지에 잔뜩 오고 있어…… 잔뜩 즈음즈음 당하고 있어요……<emoji=heart04>」"

[[dialogue]]
speaker = "フロレンシア"
original = "「会長さん、好き……好きぃっ……<emoji=heart04>\u3000もっと、会長さんとエッチしたいですっ……んぁ、あっ……もっと、もっとぉ<emoji=heart04>」"
translation = "「회장님, 좋아해…… 좋아해애……<emoji=heart04> 더, 회장님과 섹스하고 싶어요…… 응아, 앗…… 더, 더어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "フロレンシアの甘い声でますます思考がとろけ、突き上げる力が増す。"
translation = "플로렌시아의 달콤한 목소리에 점점 사고가 녹아내리고, 쳐올리는 힘이 더해진다."

[[dialogue]]
speaker = "フロレンシア"
original = "「あ──あ──あ──んんん～～～っ<emoji=heart04>\u3000おち○ちん気持ちいいっ<emoji=heart04>\u3000あ、あっ……気持ち良くて、くせになっちゃいますぅ～～っ<emoji=heart04>」"
translation = "「아── 아── 아── 으으으음~~~앗<emoji=heart04> 자지 기분 좋아<emoji=heart04> 아, 앗…… 기분 좋아서 버릇이 되어버릴 것 같아요~~앗<emoji=heart04>」"

[[dialogue]]
speaker = "フロレンシア"
original = "「あっ──ふっ──んっ──んっ──はっ、はあぁんっ<emoji=heart04>\u3000おち○ちん、熱くて、硬くて、好きっ……ふぁっ、はっ、あっ……んん～～っ<emoji=heart04>」"
translation = "「앗── 하아── 응── 응── 하아, 하아앙<emoji=heart04> 자지, 뜨겁고 딱딱해서 좋아…… 하앗, 하앗, 앗…… 으음~~앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "情欲に任せて互いの性器を擦り合わせ、快楽を貪る。"
translation = "정욕에 맡겨 서로의 성기를 비벼대며 쾌락을 탐한다."

[[dialogue]]
speaker = "unk"
original = "下半身に思い切り力を込めて突き出すと──"
translation = "하반신에 한껏 힘을 주어 밀어붙이자──"

[[dialogue]]
speaker = "フロレンシア"
original = "「んんん～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「으으으음~~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "フロレンシア"
original = "「あっ、あっ……すごいっ<emoji=heart04>\u3000おち○ちんの先っぽ、奥に届いて……んんっ──んっ──んっ……ダメ、頭真っ白に、なる……んっ──ひやああぁっ<emoji=heart04>」"
translation = "「앗, 앗…… 굉장해<emoji=heart04> 자지 끝부분이 안쪽 깊숙이 닿아서…… 으음── 응── 응…… 안 돼, 머릿속이 하얘져…… 응── 히야아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "フロレンシア"
original = "「はっ、はっ、んっ――はあぁんっ<emoji=heart04>\u3000これ、おかしくなるぅ……あっ、はっ、はっ……気持ち、よすぎっ──んああぁっ<emoji=heart04>」"
translation = "「하앗, 하앗, 응── 하아앙<emoji=heart04> 이거 이상해져버려…… 앗, 하앗, 하앗…… 기분 너무 좋아── 응아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "亀頭が子宮に届くとフロレンシアの華奢な体が震える。"
translation = "귀두가 자궁에 닿자 플로렌시아의 가냘픈 몸이 떨린다."

[[dialogue]]
speaker = "フロレンシア"
original = "「んぁ、あ──ひあぁんっ<emoji=heart04>\u3000また奥、当たって……子宮に、届いてますっ……んっ──んんっ──ん～～っ<emoji=heart04>」"
translation = "「응아, 아── 히아앙<emoji=heart04> 또 안쪽 닿아서…… 자궁에 닿고 있어요…… 응── 으음── 음~~앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "同時に膣がぎゅっと強く締まり、ただでさえ近づいていた限界がさらに迫ってくる。"
translation = "동시에 질이 꽉 강하게 조여오고, 가뜩이나 다가와 있던 한계가 더욱 압박해 온다."

[[dialogue]]
speaker = "フロレンシア"
original = "「んんっ……！？\u3000おち○ちんビクビクして……はぁはっ、あんっ……出そう、なんですね……ふぁっ……あっ、あっ、んんっ<emoji=heart04>」"
translation = "「으음……!? 자지가 움찔거려서…… 하아하앗, 앙…… 나올 것 같군요…… 하아…… 앗, 앗, 으음<emoji=heart04>」"

[[dialogue]]
speaker = "フロレンシア"
original = "「あ──あ──あ──ああぁんっ<emoji=heart04>\u3000ダメなのに、いけないのに……会長さんのせーし、欲しい……中に出してほしいって、思っちゃいます……っ<emoji=heart04>」"
translation = "「아── 아── 아── 아아앙앗<emoji=heart04> 안 되는데, 안 되는데…… 회장님의 정액 갖고 싶어…… 안에 내보내 줬으면 좋겠다고 생각하게 돼요……」"

[[dialogue]]
speaker = "unk"
original = "膣壁がぶるぶると波打ってペニスを刺激する。"
translation = "질벽이 부르르 물결치며 페니스를 자극한다."

[[dialogue]]
speaker = "unk"
original = "俺もフロレンシアをもっと喘がせたくて、奥めがけて亀頭を叩きつける。"
translation = "나도 플로렌시아를 더 교성 지르게 하고 싶어서, 안쪽을 향해 귀두를 때려 박는다."

[[dialogue]]
speaker = "フロレンシア"
original = "「んんぅ～～～っ<emoji=heart04>\u3000あっ、はっ、はぁ……お腹、熱いぃっ<emoji=heart04>\u3000んっ……んんっ……おち○ちん、子宮に当たって、すごすぎますぅっ<emoji=heart04>」"
translation = "「으으으음~~~앗<emoji=heart04> 앗, 하아, 하아…… 배 안이 뜨거워어<emoji=heart04> 응…… 으음…… 자지 자궁에 닿아서 너무 굉장해요오<emoji=heart04>」"

[[dialogue]]
speaker = "フロレンシア"
original = "「ひあっ、あっ、あっ──ひぁああっ<emoji=heart04>\u3000はっ、あっ、はぁんっ<emoji=heart04>\u3000赤ちゃんできちゃうかも、しれないのに、止まらないよぉ<emoji=heart04>」"
translation = "「히앗, 앗, 앗── 히아아앗<emoji=heart04> 하앗, 앗, 하아앙<emoji=heart04> 아기 생겨버릴지도 모르는데 멈추지 않아아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺もフロレンシアも正気なんてとうに失くしていて、ただ快楽の虜になっていた。"
translation = "나도 플로렌시아도 제정신 따위는 이미 잃어버린 채, 그저 쾌락의 포로가 되어 있었다."

[[dialogue]]
speaker = "unk"
original = "性器で互いのぬくもりを確かめ合いながら夢中で腰を振る。"
translation = "성기로 서로의 온기를 확인하며 꿈결같이 허리를 흔든다."

[[dialogue]]
speaker = "フロレンシア"
original = "「会長さん、会長さぁんっ<emoji=heart04>\u3000あっ、はっ、はっ──んんっ<emoji=heart04>\u3000会長さんの精液、私のおま○こに、くださいっ<emoji=heart04>」"
translation = "「회장님, 회장님아아<emoji=heart04> 앗, 하앗, 하앗── 으음<emoji=heart04> 회장님의 정액, 내 보지에 주세요오<emoji=heart04>」"

[[dialogue]]
speaker = "フロレンシア"
original = "「ふやぁっ……はぁ、あっ、あっ……ひああっ<emoji=heart04>\u3000おち○ちん、ドクドクして……ふぁっ、あっ──ん～っ<emoji=heart04>」"
translation = "「후야앗…… 하아, 앗, 앗…… 히아앗<emoji=heart04> 자지 덜컥거려서…… 하아, 앗── 음~앗<emoji=heart04>」"

[[dialogue]]
speaker = "フロレンシア"
original = "「出してっ、出してぇっ<emoji=heart04>\u3000ふはっ、はあぁんっ<emoji=heart04>\u3000お腹の、奥にっ……子宮に、会長さんのせーし、たくさん出してぇっ<emoji=heart04>」"
translation = "「내보내 줘, 내보내 줘어<emoji=heart04> 하아, 하아앙<emoji=heart04> 배 안쪽에…… 자궁에 회장님 정액 잔뜩 내보내 줘어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そして亀頭をフロレンシアの奥に届かせて──"
translation = "그리고 귀두를 플로렌시아의 가장 깊은 곳에 닿게 하고──"

[[dialogue]]
speaker = "フロレンシア"
original = "「ふぁあああ～～～～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하아아아아~~~~~~~~~~~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "フロレンシア"
original = "「あ……あ……あ……<emoji=heart04>\u3000出てるっ……ビュクビュクって、奥に……んっ……んっ……射精されながら、イッて──ふぁあああっ<emoji=heart04><emoji=heart04>」"
translation = "「아…… 아…… 아……<emoji=heart04> 나오고 있어…… 울컥울컥하고 안쪽에…… 응…… 응…… 사정당하면서 가버려어── 하아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "絶頂に震えながら、精液をねだるように自分からお尻を押し付けるフロレンシア。"
translation = "절정에 떨면서 정액을 보채듯 스스로 엉덩이를 밀어붙이는 플로렌시아."

[[dialogue]]
speaker = "unk"
original = "柔らかいお尻の感触でますます欲望がほとばしる。"
translation = "부드러운 엉덩이의 감촉에 더욱 욕망이 쏟아져 나온다."

[[dialogue]]
speaker = "フロレンシア"
original = "「ん──んん～～～～っ<emoji=heart04>\u3000熱いせーえきが、奥に……お腹に、入ってくるぅ……ん……あ……はあぁっ<emoji=heart04>」"
translation = "「음── 으으음~~~~앗<emoji=heart04> 뜨거운 정액이 안쪽에…… 배 안으로 들어와아…… 응…… 아…… 하아앗<emoji=heart04>」"

[[dialogue]]
speaker = "フロレンシア"
original = "「あ……あ……んっ……ふああぁっ<emoji=heart04>\u3000おち○ちん、またドクドクして……子宮、熱いぃ……はぁ……はぁ……んんっ<emoji=heart04>」"
translation = "「아…… 아…… 응…… 하아아앗<emoji=heart04> 자지 또 움찔거려서…… 자궁 뜨거워어…… 하아…… 하아…… 으음<emoji=heart04>」"

[[dialogue]]
speaker = "フロレンシア"
original = "「はぁ、はぁ……はあぁ……会長、さん……」"
translation = "「하아, 하아…… 하아아…… 회장님……」"

[[dialogue]]
speaker = "unk"
original = "たっぷりと子宮に精液を注がれ、ようやく大きく息を吐くフロレンシア。"
translation = "자궁에 듬뿍 정액을 주입받고 나서야 비로소 크게 숨을 몰아쉬는 플로렌시아."

[[dialogue]]
speaker = "unk"
original = "膣口からは中に出された精液がこぼれていて、その量と勢いを物語っていた。"
translation = "질구에서는 안에 사정된 정액이 흘러나오고 있었고, 그것은 그 양과 기세를 대변하고 있었다."

[[dialogue]]
speaker = "フロレンシア"
original = "「ありがとうございます、会長さん……」"
translation = "「감사합니다, 회장님……」"

[[dialogue]]
speaker = "フロレンシア"
original = "「でも私が気絶している間にまた何かあったんでしょうか……？」"
translation = "「하지만 제가 기절해 있는 동안 또 무슨 일이 있었던 걸까요……?」"

[[dialogue]]
speaker = "unk"
original = "スミカは最初からこうなるのを予想していたのだろうか。"
translation = "스미카는 처음부터 이렇게 될 것을 예상하고 있었던 걸까."

[[dialogue]]
speaker = "unk"
original = "だとしたら、ずっとフロレンシアのために……？"
translation = "그렇다면 계속 플로렌시아를 위해서……?"

[[dialogue]]
speaker = "フロレンシア"
original = "「だけど……今はいいです。もしかしたら夢かもしれないけど、会長さんとこうしてエッチできたんですから」"
translation = "「하지만…… 지금은 됐어요. 어쩌면 꿈일지도 모르지만, 회장님과 이렇게 섹스할 수 있었으니까요」"

[[dialogue]]
speaker = "フロレンシア"
original = "「めちゃくちゃになっちゃいましたけど、改めて言いますね。……好きです、会長さん」"
translation = "「엉망진창이 되어버렸지만, 다시 한번 말할게요. ……좋아해요, 회장님」"

[[dialogue]]
speaker = "unk"
original = "そしてフロレンシアが俺の方を向いて──"
translation = "그리고 플로렌시아가 나를 향해──"

[[dialogue]]
speaker = "フロレンシア"
original = "「……ちゅ<emoji=heart04>」"
translation = "「……쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そっと、唇にキスをしたのだった。"
translation = "살며시 입술에 키스를 한 것이었다."

