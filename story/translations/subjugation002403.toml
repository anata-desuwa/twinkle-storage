[[dialogue]]
speaker = "unk"
original = "トレジアンナさんが復活してから数日後、俺と魔法少女メンバーは、昼休みにカフェテリアへと集まっていた。"
translation = "트레지안나 씨가 부활하고 며칠 뒤, 나와 마법소녀 멤버들은 점심시간에 카페테리아로 모였다."

[[dialogue]]
speaker = "トレジアンナ"
original = "「そんなわけで、今日から私も附属校の生徒になっちゃいました～☆\u3000キラッ☆」"
translation = "「그런 고로 오늘부터 저도 부속교의 학생이 되었답니다~☆ 반짝☆」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「どうですか～、会長さん、似合います～？」"
translation = "「어떤가요~ 회장님, 잘 어울려요~?」"

[[dialogue]]
speaker = "unk"
original = "似合ってて可愛いです"
translation = "잘 어울리고 귀여워요"

[[dialogue]]
speaker = "トレジアンナ"
original = "「えへへ～<emoji=heart04>\u3000ありがとうございます～♪\u3000みなさんみたいに、私も会長さんから褒めて貰いたいな～って、ずっと思ってたんですよね～♪」"
translation = "「에헤헤~<emoji=heart04> 감사합니다~♪ 여러분처럼 저도 회장님한테 칭찬받고 싶다고 계속 생각했었거든요~♪」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「あっ、そうだ♪\u3000魔法少女が揃った記念に、みなさんで写真を撮りませんか？」"
translation = "「앗, 맞다♪ 마법소녀가 모인 기념으로 다 같이 사진 찍지 않을래요?」"

[[dialogue]]
speaker = "トマル"
original = "「写真、ですか？」"
translation = "「사진, 말인가요?」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「はい♪\u3000私も自分用のＤＩＳＣを買いましたし、コレクションしときたいんですよね～♪」"
translation = "「네♪ 저도 개인용 DISC를 샀고, 컬렉션 해두고 싶거든요~♪」"

[[dialogue]]
speaker = "プリムラ"
original = "「やれやれ、一体どんな写真をコレクションしとるのやら」"
translation = "「참 나, 대체 어떤 사진을 컬렉션 하고 있는 것인지」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「ふふふ、知りたいですか？」"
translation = "「후후후, 알고 싶나요?」"

[[dialogue]]
speaker = "サチ"
original = "「聞くのがちょっと怖いんですけど……」"
translation = "「듣는 게 좀 무섭긴 한데요……」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「名づけて――『サチさんの可愛い日常シーンコレクション』です！」"
translation = "「이름하여── 『사치 씨의 귀여운 일상 장면 컬렉션』이에요!」"

[[dialogue]]
speaker = "サチ"
original = "「はぁっ！？\u3000私、そんなの聞いてないんですけど！？\u3000というか、なんで私なんですか！？」"
translation = "「하앗!? 저 그런 거 못 들었는데요!? 그보다 왜 저인가요!?」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「シリーズ第１弾だからです！\u3000もちろん、２弾以降も予定してます！」"
translation = "「시리즈 제1탄이니까요! 물론 2탄 이후도 예정되어 있어요!」"

[[dialogue]]
speaker = "プリムラ"
original = "「おい待て！\u3000それ絶対、第２弾は我のパターンじゃろ！」"
translation = "「이봐 잠깐! 그거 분명 제2탄은 내 패턴이지 않느냐!」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「てへぺろ☆」"
translation = "「데헷☆」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「そしてこれが、コレクション中のフォトアルバムです♪」"
translation = "「그리고 이것이 컬렉션 중인 포토 앨범이에요♪」"

[[dialogue]]
speaker = "unk"
original = "さらっと『収納魔法』で空間に穴を開け、そこから写真の納まったファイル取り出して見せるトレジアンナさん。"
translation = "아무렇지 않게 『수납 마법』으로 공간에 구멍을 뚫어 그곳에서 사진이 담긴 파일을 꺼내 보여주는 트레지안나 씨."

[[dialogue]]
speaker = "トレジアンナ"
original = "「一昨日、サチさんの家にお泊りした時に撮った寝顔や、生徒会長の仕事をしている時の真面目な様子――」"
translation = "「그저께 사치 씨 집에서 자고 갈 때 찍은 자는 얼굴이나, 학생회장 일을 하고 있는 진지한 모습──」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「ご飯を食べてる時の美味しそうな顔など、これを見ただけでサチさんの可愛さが十二分に伝わるようなアルバムにする予定です！」"
translation = "「밥을 먹고 있을 때의 맛있어하는 얼굴 등, 이것만 봐도 사치 씨의 귀여움이 충분히 전해지는 앨범으로 만들 예정이에요!」"

[[dialogue]]
speaker = "シズハ"
original = "「はい、質問！\u3000サチちゃんのお尻を写したカットはありますか！？」"
translation = "「네, 질문! 사치짱의 엉덩이를 찍은 컷은 있나요!?」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「もちろんです！\u3000家の玄関から出る際、靴を履いている時の――」"
translation = "「물론이죠! 집 현관에서 나갈 때 신발을 신고 있을 때의──」"

[[dialogue]]
speaker = "サチ"
original = "「ちょっ、見せないで下さい！\u3000いつの間に撮ったんですか！？\u3000そのコレクションは禁止！\u3000没収です！」"
translation = "「잠깐, 보여주지 마세요! 언제 찍은 거예요!? 그 컬렉션은 금지! 몰수예요!」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「わわっ！？\u3000サチさん、ちょっとタンマ！\u3000気に入ってる物なんで、没収は勘弁して下さ～い！」"
translation = "「와왓!? 사치 씨, 잠깐 타임! 맘에 드는 거니까 몰수는 봐주세요~!」"

[[dialogue]]
speaker = "unk"
original = "サチが急いで席から立ち上がってアルバムを取ろうと手を伸ばし、トレジアンナさんは慌ててアルバムを引っ込めようとする。"
translation = "사치가 서둘러 자리에서 일어나 앨범을 뺏으려 손을 뻗고 트레지안나 씨는 당황하며 앨범을 뒤로 빼려 한다."

[[dialogue]]
speaker = "unk"
original = "が、その際に、トレジアンナさんの手からすっぽ抜けて、アルバムは宙を舞ってしまう。"
translation = "하지만 그때 트레지안나 씨의 손에서 쏙 빠져나가 앨범은 공중으로 날아올랐다."

[[dialogue]]
speaker = "unk"
original = "おっと！\u3000キャッチ！"
translation = "이런! 캐치!"

[[dialogue]]
speaker = "unk"
original = "咄嗟に両手でそれを受け止める俺だったが――"
translation = "엉겁결에 양손으로 그것을 받아내는 나였지만──"

[[dialogue]]
speaker = "サチ"
original = "「お兄さん、見ちゃダメですーーーっ！」"
translation = "「오빠, 보면 안 돼요───윽!」"

[[dialogue]]
speaker = "unk"
original = "慌てたサチがテーブルを回り込んで走って来る。"
translation = "당황한 사치가 테이블을 돌아 뛰어온다."

[[dialogue]]
speaker = "unk"
original = "が、次の瞬間、ツルッと滑ってバランスを崩す。"
translation = "하지만 다음 순간, 미끄덩하며 균형을 잃는다."

[[dialogue]]
speaker = "サチ"
original = "「きゃっ！？」"
translation = "「꺄악!?」"

[[dialogue]]
speaker = "unk"
original = "俺はサチの体を受け止めて、支えようとするが――"
translation = "나는 사치의 몸을 받아내어 지탱하려 하지만──"

[[dialogue]]
speaker = "サチ"
original = "「あいたっ……！」"
translation = "「아야……!」"

[[dialogue]]
speaker = "unk"
original = "サチは急にまた変な方向に滑って、その場で尻餅をついてしまった。"
translation = "사치는 갑자기 또 이상한 방향으로 미끄러져 그 자리에 엉덩방아를 찧고 말았다."

[[dialogue]]
speaker = "トレジアンナ"
original = "「会長さん、アルバムのキャッチ、ナイスです！\u3000サチさんには悪いですが、今の内にアルバムをしまっちゃいますよ～」"
translation = "「회장님, 앨범 캐치 나이스예요! 사치 씨에게는 미안하지만 이 틈에 앨범을 치워버리겠어요~」"

[[dialogue]]
speaker = "unk"
original = "しめしめといった様子でこちらへ駆け寄ってくるトレジアンナさん。"
translation = "됐다 싶은 기색으로 이쪽으로 달려오는 트레지안나 씨."

[[dialogue]]
speaker = "unk"
original = "が、突然、今度は彼女の方がツルッと足元を滑らせてバランスを崩す。"
translation = "하지만 갑자기 이번에는 그녀가 미끄덩 발을 헛디뎌 균형을 잃는다."

[[dialogue]]
speaker = "トレジアンナ"
original = "「ほえっ！？\u3000わわわっ！？」"
translation = "「호에!? 와와왓!?」"

[[dialogue]]
speaker = "unk"
original = "俺はトレジアンナさんの体を受け止めて、支えようとする。"
translation = "나는 트레지안나 씨의 몸을 받아내어 지탱하려 한다."

[[dialogue]]
speaker = "unk"
original = "しかし、勢いよく突っ込んできた彼女に押されて、俺も床に転がるように転倒してしまった。"
translation = "그러나 기세 좋게 돌진해 온 그녀에게 밀려 나도 바닥에 구르듯이 넘어지고 말았다."

[[dialogue]]
speaker = "トレジアンナ"
original = "「あんっ<emoji=heart04>」"
translation = "「앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "気づけば俺は――どうしてそうなったのか、トレジアンナさんのアンバランスにたわわな胸に顔を埋もれさせるような形で、彼女を押し倒してしまっていた。"
translation = "정신을 차려보니 나는── 어쩌다 그렇게 됐는지 트레지안나 씨의 불균형하게 풍만한 가슴에 얼굴을 묻는 형태로 그녀를 덮쳐 누르고 있었다."

[[dialogue]]
speaker = "unk"
original = "おわぁっ！？\u3000トレジアンナさん、ごめん！"
translation = "오와앗!? 트레지안나 씨, 미안해요!"

[[dialogue]]
speaker = "トレジアンナ"
original = "「あ、あれ……！？\u3000サチさんじゃなくて、私の方が会長さんとラッキースケベ状態に！？\u3000私的にはちょっと嬉しいですけど<emoji=heart04>」"
translation = "「어, 어라……!? 사치 씨가 아니라 제가 회장님이랑 럭키 스케베 상태가!? 저로서는 조금 기쁘지만요<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「なっ！？\u3000お、お兄さん、エッチなことは禁止ですーーーっ！！」"
translation = "「나앗!? 오, 오빠, 야한 건 금지예요───!!」"

[[dialogue]]
speaker = "unk"
original = "翌日――"
translation = "다음 날──"

[[dialogue]]
speaker = "unk"
original = "俺と魔法少女メンバーはサチから呼び出されて、星徒会室に集まっていた。"
translation = "나와 마법소녀 멤버들은 사치의 호출을 받고 성도회실에 모여 있었다."

[[dialogue]]
speaker = "プリムラ"
original = "「サチ、大事な話とは一体なんなのじゃ？」"
translation = "「사치, 중요한 이야기라는 게 대체 무엇이느냐?」"

[[dialogue]]
speaker = "サチ"
original = "「うん、実は――」"
translation = "「응, 사실──」"

[[dialogue]]
speaker = "サチ"
original = "「私、どうやら幸運体質がなくなっちゃったみたいで……」"
translation = "「나, 아무래도 행운 체질이 없어져 버린 것 같아서……」"

[[dialogue]]
speaker = "シズハ"
original = "「えぇっ！？」"
translation = "「에엣!?」"

[[dialogue]]
speaker = "トマル"
original = "「一体どうして……！？」"
translation = "「도대체 왜……!?」"

[[dialogue]]
speaker = "unk"
original = "俺たちは思わず、驚きの声を上げてしまうのだった――"
translation = "우리들은 무심코 놀라움의 목소리를 높이고 말았다──"

