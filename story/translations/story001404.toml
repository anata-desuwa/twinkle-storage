[[dialogue]]
speaker = "リーリア"
original = "「２人きりで抜け出しちゃいましたね、センパイ」"
translation = "「단둘이 빠져나와 버렸네요, 선배.」"

[[dialogue]]
speaker = "クロト"
original = "「ごめんね、急に誘ったりして」"
translation = "「미안해, 갑자기 불러내서.」"

[[dialogue]]
speaker = "リーリア"
original = "「何言ってるんですか。センパイから声をかけてくれて、マジカル嬉しかったですよ♪」"
translation = "「무슨 소리예요. 선배가 먼저 말을 걸어주셔서 매지컬하게 기뻤다고요♪」"

[[dialogue]]
speaker = "リーリア"
original = "「あの～、ひとつお願いがあるんですけど……いいですか？」"
translation = "「저기~ 하나 부탁이 있는데…… 괜찮을까요?」"

[[dialogue]]
speaker = "リーリア"
original = "「せっかく誰も見てないですから……腕、組んでみたいなって……」"
translation = "「기왕 아무도 안 보니까…… 팔짱, 껴보고 싶어서요……」"

[[dialogue]]
speaker = "クロト"
original = "「いいよ。はい、どうぞ」"
translation = "「좋아. 자, 여기.」"

[[dialogue]]
speaker = "リーリア"
original = "「いいんですか！？\u3000え～、どういう風の吹き回しです？\u3000なんだかいつもより優しい気がするんですけど！？」"
translation = "「괜찮나요!? 에~ 웬일이세요? 왠지 평소보다 상냥하신 기분이 드는데요!?」"

[[dialogue]]
speaker = "リーリア"
original = "「いや、もちろんしますけどね。遠慮なく、ぎゅ～～っと<emoji=heart04>」"
translation = "「아니, 물론 껴야죠. 사양 않고 꽈아아아악<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「…………えへへ、やった……嬉しいな」"
translation = "「…………에헤헤, 됐다…… 기쁘다.」"

[[dialogue]]
speaker = "リーリア"
original = "「……波の音、静かで……ロマンチック……なんだかドキドキしちゃいますね」"
translation = "「……파도 소리, 고요하고…… 로맨틱하고…… 왠지 두근거려 버리네요.」"

[[dialogue]]
speaker = "リーリア"
original = "「こうして歩いてると、本当に恋人同士になれた気分です……センパイはどうですか？」"
translation = "「이렇게 걷고 있으니 정말 연인 사이가 된 기분이에요…… 선배는 어떠신가요?」"

[[dialogue]]
speaker = "クロト"
original = "「うーん、どうかな？」"
translation = "「글쎄, 어떨까?」"

[[dialogue]]
speaker = "リーリア"
original = "「あ～あ、またそんな意地悪言っちゃうんだ～」"
translation = "「아아~ 또 그렇게 짓궂게 말씀하신다~」"

[[dialogue]]
speaker = "クロト"
original = "「一目惚れは嘘だったんだよね？\u3000リーリアの本心はどうなの？」"
translation = "「첫눈에 반했다는 건 거짓말이었지? 리리아의 본심은 뭐야?」"

[[dialogue]]
speaker = "リーリア"
original = "「一目惚れっていうのは、もちろん嘘です……嘘、でした」"
translation = "「첫눈에 반했다는 건 물론 거짓말이에요…… 거짓말, 이었어요.」"

[[dialogue]]
speaker = "リーリア"
original = "「でも、こうして話しているうちに、センパイのいい所にどんどん気付いていって……」"
translation = "「하지만 이렇게 이야기하는 동안 선배의 좋은 점을 점점 깨닫게 돼서……」"

[[dialogue]]
speaker = "リーリア"
original = "「一目惚れじゃなかったとしても……嘘から出た誠、そういうのも、あるかもしれませんね♪」"
translation = "「첫눈에 반한 게 아니었다고 해도…… 거짓이 진실이 된다는 거, 그런 것도 있을지 모르겠네요♪」"

[[dialogue]]
speaker = "クロト"
original = "「そうか……」"
translation = "「그렇구나……」"

[[dialogue]]
speaker = "リーリア"
original = "「ちょ、そ、そんなに考えこまれると！\u3000ガチのやつみたいで、私の方が恥ずかしくなっちゃいますよ――」"
translation = "「잠깐, 그, 그렇게 진지하게 고민하시면! 진짜 고백 같아서 저까지 부끄러워져 버리잖아요──」"

[[dialogue]]
speaker = "クロト"
original = "「リーリアの気持ちが知りたかった」"
translation = "「리리아의 마음을 알고 싶었어.」"

[[dialogue]]
speaker = "クロト"
original = "「リーリアが真剣なら、俺も真剣に考えなくちゃいけない」"
translation = "「리리아가 진지하다면 나도 진지하게 생각해야 하니까.」"

[[dialogue]]
speaker = "リーリア"
original = "「わ、私は……真剣、ですよ……？\u3000最初から、今だって……」"
translation = "「저, 저는…… 진지, 하다고요……? 처음부터 지금도……」"

[[dialogue]]
speaker = "クロト"
original = "「分かった。じゃあ、応えるよ……リーリア……俺の目を見て……」"
translation = "「알았어. 그럼 대답할게…… 리리아…… 내 눈을 봐……」"

[[dialogue]]
speaker = "リーリア"
original = "「は、はい……」"
translation = "「네, 네……」"

[[dialogue]]
speaker = "クロト"
original = "「俺は、リーリアのことが――」"
translation = "「나는 리리아를──」"

[[dialogue]]
speaker = "セドナ"
original = "「何をしている、リーリア。準備はいいのかと聞いているんだ」"
translation = "「뭘 하고 있나, 리리아. 준비는 됐는지 묻고 있다.」"

[[dialogue]]
speaker = "リーリア"
original = "「ふぇぇ……」"
translation = "「후에에……」"

[[dialogue]]
speaker = "セドナ"
original = "「訓練の最中に放心とは、気持ちが緩んでいる証拠だ」"
translation = "「훈련 도중에 멍하니 있다니 정신이 해이해졌다는 증거다.」"

[[dialogue]]
speaker = "リーリア"
original = "「ぅぅぅ……なんで～～～！！\u3000こんなはずじゃなかったのにぃ！！」"
translation = "「으으으…… 왜애애애애!! 이럴 리가 없었는데에에!!」"

[[dialogue]]
speaker = "unk"
original = "あれよあれよという間に、ネビュラの水着戦闘服の性能テストということで、２vs２の対抗模擬戦をするという話になっていた。"
translation = "어느덧 네뷸라의 수영복 전투복 성능 테스트라는 명목으로 2 대 2 대항 모의전을 한다는 이야기가 되어 있었다."

[[dialogue]]
speaker = "unk"
original = "こちらはヴィーナスとマトイ、ネビュラサイドは戦闘服を持っているセドナさんとリーリアが戦う。"
translation = "이쪽은 비너스와 마토이, 네뷸라 사이드는 전투복을 가진 세드나 씨와 리리아가 싸운다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「こちらは準備ＯＫ！\u3000いつでもかかってきていいわよっ！」"
translation = "「이쪽은 준비 OK! 언제든 덤벼도 좋아!」"

[[dialogue]]
speaker = "リーリア"
original = "「セドナ長官はともかく、どうしてヴィーナス先輩までそんなにノリノリなんですか……」"
translation = "「세드나 장관님은 그렇다 치고 어째서 비너스 선배까지 그렇게 신이 나신 거예요……」"

[[dialogue]]
speaker = "unk"
original = "軽度の戦闘狂なんだ"
translation = "경증의 전투광이라서 그래"

[[dialogue]]
speaker = "リーリア"
original = "「娘さんなんでしたっけ……？\u3000意味不明すぎて頭おかしくなりそうですけど、とりあえず教育方針間違えてますよ、ぜったい」"
translation = "「따님이라고 하셨던가요……? 너무 의미불명이라 머리가 이상해질 것 같지만 일단 교육 방침은 틀렸어요, 절대로.」"

[[dialogue]]
speaker = "unk"
original = "面目次第もない"
translation = "면목 없구나"

[[dialogue]]
speaker = "ヴィーナス"
original = "「何をコソコソ喋ってるのか知らないけれど、新しい水着フォームの性能テストをしたいのはネビュラだけじゃないってことよ！」"
translation = "「뭘 소곤소곤 떠드는지는 모르겠지만 새로운 수영복 폼의 성능 테스트를 하고 싶은 건 네뷸라만이 아니라는 거야!」"

[[dialogue]]
speaker = "セドナ"
original = "「そういえば先ほど、水着フォームがパワーアップした、などと話していたか？」"
translation = "「그러고 보니 아까 수영복 폼이 파워업했다느니 하는 이야기를 했었나?」"

[[dialogue]]
speaker = "アナ"
original = "「どうしてそんな事が起きたのか現在調査中ですが、おそらく前会長の有する膨大な星力によるものではないかと」"
translation = "「어째서 그런 일이 일어났는지 현재 조사 중입니다만 아마 전 회장님이 보유한 방대한 성력 때문이 아닐까 합니다.」"

[[dialogue]]
speaker = "サーシャ"
original = "「再現性があるのかないのか、今のところまったくわからないわね～♪」"
translation = "「재현성이 있는지 없는지는 지금으로선 전혀 모르겠네~♪」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「つまり気合いがあれば、何でも出来るってことね！\u3000マトイ、あなたもやってみなさい！」"
translation = "「즉 기합만 있으면 뭐든 할 수 있다는 거네! 마토이, 너도 해 보렴!」"

[[dialogue]]
speaker = "マトイ"
original = "「できるか！」"
translation = "「할 수 있겠냐!」"

[[dialogue]]
speaker = "マトイ"
original = "「そんなルール無用のめちゃくちゃがまかり通るのなんて、ヴィーナスだけなんだから！」"
translation = "「그런 규칙도 없는 엉망진창이 통하는 건 비너스뿐이라구!」"

[[dialogue]]
speaker = "セドナ"
original = "「なるほど、水着の進化フォームか……俄然面白くなってきた」"
translation = "「과연, 수영복의 진화 폼인가…… 갑자기 흥미로워지는군.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「元祖水着フォームの新星星徒会としては、そう簡単に負けるわけにはいかないのよ！」"
translation = "「원조 수영복 폼인 신성학생회로서는 그렇게 쉽게 질 수는 없다구!」"

[[dialogue]]
speaker = "セドナ"
original = "「その意気やよし……！」"
translation = "「그 기세 좋구나……!」"

[[dialogue]]
speaker = "リーリア"
original = "「あの２人、なんか意気投合しちゃってるんですけど」"
translation = "「저 두 사람, 왠지 의기투합하고 있는데요.」"

[[dialogue]]
speaker = "マトイ"
original = "「意外……でもないのか。よく考えたら」"
translation = "「의외……도 아닌가. 잘 생각해보면.」"

[[dialogue]]
speaker = "マトイ"
original = "「去年の水着合宿も、最初は『無人島でサバイバル合宿だ』とか言い出しちゃってて、危なかったんだから」"
translation = "「작년 수영복 합숙 때도, 처음엔 『무인도에서 서바이벌 합숙이다』라느니 말을 꺼내서 위험했으니까.」"

[[dialogue]]
speaker = "リーリア"
original = "「はぁ……そっちもそっちで苦労してるんですね」"
translation = "「하아…… 그쪽은 그쪽대로 고생하고 있네요.」"

[[dialogue]]
speaker = "マトイ"
original = "「そちらもね……」"
translation = "「그쪽도 말이지……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「マトイ！\u3000なーに対戦相手と和やか雑談してるの！」"
translation = "「마토이! 뭘 대전 상대랑 화기애애하게 잡담하고 있는 거야!」"

[[dialogue]]
speaker = "セドナ"
original = "「リーリア！\u3000準備が出来たのなら速やかに報告しろ！」"
translation = "「리리아! 준비가 됐다면 신속하게 보고해라!」"

[[dialogue]]
speaker = "リーリア"
original = "「はいはい！\u3000いつでも大丈夫ですよ！」"
translation = "「네이네이! 언제든 괜찮아요!」"

[[dialogue]]
speaker = "セドナ"
original = "「うむ……では始めようか。行くぞ！」"
translation = "「음…… 그럼 시작할까. 간다!」"

[[dialogue]]
speaker = "unk"
original = "次の瞬間、魔法と星術が激しい音でぶつかり合い、戦いの火蓋が切って落とされた。"
translation = "다음 순간, 마법과 성술이 격렬한 소리를 내며 부딪치고, 싸움의 서막이 올랐다."

