[[dialogue]]
speaker = "unk"
original = "断崖絶壁に立ち、レイラが海に向かって叫ぶ。"
translation = "단애절벽에 서서 레이라가 바다를 향해 외친다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「イングリット～！\u3000私を倒しにいらっしゃ～い！」"
translation = "「잉그리드~! 나를 쓰러뜨리러 오렴~!」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「レイラお姉ちゃん、何やってるの？」"
translation = "「레이라 언니, 뭐 하는 거야?」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「今言っとかないと一生言う機会ないと思って」"
translation = "「지금 말해두지 않으면 평생 말할 기회가 없을 것 같아서」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「なくていいだろ永遠に」"
translation = "「없어도 되잖아 영원히」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「さて、というわけで、今日はまずイングリットとの合流を目指します」"
translation = "「자, 그런 고로 오늘은 우선 잉그리드와의 합류를 목표로 하겠습니다」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「アイツならもうくたばってんじゃねえか。ってか、その方がいいだろ」"
translation = "「그 녀석이라면 이미 뒈졌을지도 모르지. 아니, 그편이 나을지도」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「こーら、そんなこと言わないの。それに、簡単にくたばらないのがコラプサーだよ」"
translation = "「이놈, 그런 소리 하면 안 돼. 게다가 쉽게 뒈지지 않는 게 콜랩서라고」"

[[dialogue]]
speaker = "unk"
original = "コラプサーたちは全員、それぞれの覚醒時、そして秋葉原での決戦で、２回も命を拾っている。"
translation = "콜랩서들은 전원 각자의 각성 시, 그리고 아키하바라에서의 결전에서 두 번이나 목숨을 건졌다."

[[dialogue]]
speaker = "unk"
original = "すでに三度目の生といっても過言ではない。"
translation = "이미 세 번째 삶이라 해도 과언이 아니다."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「今日はもっと奥まで行ってみようよ！\u3000見たことない果物ばっかりだったから、お土産にするんだ～！」"
translation = "「오늘은 더 깊은 곳까지 가보자! 본 적 없는 과일들뿐이었으니까 선물로 가져갈 거야~!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「うん。手掛かりもないし、行ってみようか。モンスターも見付けたら倒そうね。バーベキューセットの仇だし」"
translation = "「응. 단서도 없으니 가볼까. 몬스터도 발견하면 처치하자. 바비큐 세트의 원수니까」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「しっかしあちーな。さっさと終わらせてぇ」"
translation = "「그나저나 덥구먼. 빨리 끝내고 싶어」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「見て見て！\u3000見たことない貝だ～！\u3000持って帰ったらお兄ちゃん喜んでくれるかな？」"
translation = "「봐봐! 본 적 없는 조개다~! 가져가면 오빠가 기뻐해 줄까?」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "（２人はいつも通りだな～。コラプサーの日常風景って感じ）"
translation = "（두 사람은 평소와 다름없네~. 콜랩서의 일상 풍경이라는 느낌）"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「……コラプサーの日常、か」"
translation = "「……콜랩서의 일상, 인가」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「どうした？」"
translation = "「왜 그러냐?」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「キサナとリーナは……コラプサーが解散したらって考えたことある？」"
translation = "「키사나랑 리나는…… 콜랩서가 해산한다면 하고 생각해 본 적 있어?」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ああ？」"
translation = "「앙?」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「え？\u3000コラプサーなくなっちゃうの？」"
translation = "「에? 콜랩서 없어져 버리는 거야?」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「ううん。もしもの話だよ。……私たちコラプサーの目的は『救世』。でも、元凶を倒してリクリエもなくなったから、それも成し遂げちゃった」"
translation = "「아니. 만약의 이야기야. ……우리 콜랩서의 목적은 『구세』. 하지만 원흉을 쓰러뜨리고 리크리에도 없어졌으니까 그것도 성취해 버렸잖아」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「この世界に、私たちコラプサーの居場所はあるのかなって……そう思っただけ」"
translation = "「이 세계에 우리 콜랩서의 자리가 있을까 하고…… 그냥 그런 생각이 들었어」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「……リーナ、よく分かんない」"
translation = "「……리나, 잘 모르겠어」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「でもね、お兄ちゃんがいるところがリーナの居場所だから。ずっとずっと会えなかったんだもん。これからはず～っと一緒だよ！」"
translation = "「하지만 말이야, 오빠가 있는 곳이 리나의 보금자리니까. 계속 계속 못 만났는걸. 이제부터는 계~속 함께야!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「リーナはお兄ちゃんが一番大事だもんね」"
translation = "「리나는 오빠가 제일 중요하니까 말이지」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「うん！\u3000リーナ、お兄ちゃんがいてくれればそれだけで幸せなの！」"
translation = "「응! 리나, 오빠만 있어 주면 그것만으로도 행복해!」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「居場所なんざ、アタシにはどうでもいい。メシが食えればそれでいいんだよ」"
translation = "「보금자리 같은 건 나한텐 아무래도 좋아. 밥만 먹을 수 있으면 그걸로 된 거야」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「ふふっ。キサナはぶれないね」"
translation = "「후훗. 키사나는 흔들림이 없네」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「つうか、メシ食うより大事なことあんのかよ。アタシにはその方が分かんねえ」"
translation = "「그보다, 밥 먹는 것보다 중요한 게 있냐? 난 그쪽이 더 이해가 안 가」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "（うん。２人とも、なんて答えるか聞かなくても分かってた。一緒にいたいって、私が言って欲しかっただけ）"
translation = "(응. 둘 다 뭐라고 대답할지 안 봐도 비디오였어. 같이 있고 싶다는 말을 내가 듣고 싶었을 뿐이야)"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "（コラプサーのみんなは私の新しい家族……だけど、それは私の片思いなんだろうな）"
translation = "(콜랩서 모두는 나의 새로운 가족…… 하지만 그건 나 혼자만의 생각일지도 모르겠네)"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "（きっと、いつかコラプサーはバラバラになって、それぞれの道を歩むことになる。それは分かってたこと）"
translation = "(분명 언젠가 콜랩서는 뿔뿔이 흩어져서 각자의 길을 걷게 되겠지. 그건 알고 있던 사실이야)"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "（だって、家族はずっと一緒にはいられないんだから）"
translation = "(그야, 가족은 영원히 함께 있을 수는 없는 법이니까)"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「──！\u3000この音は……あのヤロウ、生きてやがったな」"
translation = "「──! 이 소리는…… 그 자식, 살아 있었나 보군」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「てやあぁっ！」"
translation = "「테야아아앗!」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「ギャアァアアアアッ！」"
translation = "「갸아아아아아악!」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「ふん、その程度の攻撃で私がやられるか！\u3000はぁっ！」"
translation = "「흥, 그 정도 공격으로 내가 당할 줄 알았나! 하앗!」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「イングリットのやつ、まさか昨日からずっと戦ってやがったのか？」"
translation = "「잉그리드 녀석, 설마 어제부터 계속 싸우고 있었던 건가?」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「イングリット、反対側の浜辺にいたんだ。……気付かなくてごめんね」"
translation = "「잉그리드, 반대편 해변에 있었구나. ……눈치채지 못해서 미안해」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「あ、あれ！」"
translation = "「어, 저거!」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「レイラお姉ちゃんのクーラーボックスがモンスターにひっかかってる！\u3000あんなところにあったんだ～！」"
translation = "「레이라 언니의 아이스박스가 몬스터한테 걸려 있어! 저런 곳에 있었구나~!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「お肉はダメでも調味料は無事なはず！\u3000あれがあれば美味しいバーべキューができる！\u3000コラプサー戦闘態勢！\u3000イングリットと合流してモンスターを倒して！」"
translation = "「고기는 못 써도 조미료는 무사할 거야! 저게 있으면 맛있는 바비큐를 할 수 있어! 콜랩서 전투 태세! 잉그리드와 합류해서 몬스터를 쓰러뜨려!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「バーべキューの時間だぁっ！！」"
translation = "「바비큐 시간이다아앗!!」"

