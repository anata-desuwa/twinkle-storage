[[dialogue]]
speaker = "unk"
original = "第１話,ウェディングドレスのイレーナ,P"
translation = "제1화, 웨딩드레스 차림의 이레이나, P"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「それじゃあいくわよ」"
translation = "「그럼 간다?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「はい、ウェディングフォームに変身してみたわ。とりあえず普通に着る分には問題なさそうね」"
translation = "「자, 웨딩 폼으로 변신해 봤어. 일단 평범하게 입는 데는 문제없어 보이네」"

[[dialogue]]
speaker = "unk"
original = "フィオナたちに引き続き、イレーナもウェディングフォームを獲得した。"
translation = "피오나 일행에 이어 이레이나도 웨딩 폼을 획득했다."

[[dialogue]]
speaker = "unk"
original = "俺とイレーナは、新たに得たウェディングドレスの戦闘服の力や性質について検証しているところだ。"
translation = "나와 이레이나는 새로 얻은 웨딩드레스 전투복의 힘과 성질에 대해 검증하고 있는 참이다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「どう？\u3000おかしなところとかない？」"
translation = "「어때? 이상한 데라든가 없어?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「……あたしがそわそわしてるって？」"
translation = "「……내가 안절부절못하고 있다고?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「そりゃあ、結婚式挙げるわけでもないのにウェディングドレス着てたら、そわそわもするわよ」"
translation = "「그야, 결혼식을 올리는 것도 아닌데 웨딩드레스를 입고 있으면 안절부절못할 만도 하지」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「別にウェディングドレス着られて嬉しいとか思ってないんだから。この前はウェディングフォームにしか変身できなくて大変だったし」"
translation = "「딱히 웨딩드레스를 입을 수 있어서 기쁘다거나 생각 안 하니까. 요 전번에는 웨딩 폼으로밖에 변신할 수 없어서 큰일이었고」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「で、どうなの？\u3000あたしのウェディングドレス姿は」"
translation = "「그래서, 어떠냐니까? 내 웨딩드레스 모습」"

[[dialogue]]
speaker = "unk"
original = "とても綺麗だ"
translation = "무척 아름다워"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「そ、そう……？\u3000まぁそう言われて悪い気はしないけど……」"
translation = "「그, 그래……? 뭐 그렇게 말하니 기분이 나쁘진 않지만……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「……輝いてる？\u3000奇跡？\u3000神々しい？\u3000いや、それはさすがに言い過ぎな気が……」"
translation = "「……빛나고 있어? 기적? 신성해? 아니, 그건 아무리 그래도 과장인 것 같은데……」"

[[dialogue]]
speaker = "unk"
original = "そしてイレーナなのに清楚だ！！"
translation = "그리고 이레이나인데 청초해!!"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あんたあたしのことなんだと思ってんのよ！！」"
translation = "「넌 나를 뭐라고 생각하는 거야!!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「どうせあんたはいつもの露出の多い方が好きだったんでしょうけど、残念だったわね。フンッ」"
translation = "「어차피 넌 평소처럼 노출 많은 쪽을 좋아했겠지만, 안됐네. 흥!」"

[[dialogue]]
speaker = "unk"
original = "どっちのイレーナも好きだよ"
translation = "어느 쪽의 이레이나도 좋아해"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「もう……恥ずかしいこと言ってくれちゃって……」"
translation = "「정말…… 부끄러운 소리를 아무렇지도 않게 하고……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ん？\u3000どっちもってことは、露出の多い方も好きってこと？\u3000やっぱりスケベ会長なんじゃ……」"
translation = "「응? 둘 다라는 건 노출 많은 쪽도 좋다는 거 아냐? 역시 변태 회장이잖아……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「え、髪型が違う？\u3000そうね、この姿に変身すると髪が伸びるみたい。他に例がないわけじゃないけど、体に変化が起こる戦闘服は珍しいから少し驚いたわ」"
translation = "「에, 헤어스타일이 다르다고? 그렇네, 이 모습으로 변신하면 머리가 길어지나 봐. 아예 사례가 없는 건 아니지만 몸에 변화가 일어나는 전투복은 드무니까 조금 놀랐어」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「でもそんなに違和感はないわね。昔は伸ばしてたし。正式に教皇庁所属になったら忙しくて、手入れする余裕がなくて切ったのよ」"
translation = "「하지만 그렇게 위화감은 없네. 옛날엔 길렀었거든. 정식으로 교황청 소속이 된 뒤로는 바빠서 관리할 여유가 없어 잘랐지만 말이야」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ま、変身してる時だけ伸びるなら、手間がなくてありがたいわ」"
translation = "「뭐, 변신할 때만 길어지는 거라면 수고가 덜해서 고맙긴 하네」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「だけど昔の髪型を見られてると思うと、なんか恥ずかしいわね……小さい頃の写真を見せてるみたい」"
translation = "「그래도 옛날 헤어스타일을 보여주고 있다고 생각하니 왠지 부끄럽네…… 어릴 때 사진을 보여주는 것 같아」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「……この髪型も似合ってる？\u3000じゃあ今からでも髪伸ばそうかな……」"
translation = "「……이 헤어스타일도 어울려? 그럼 지금부터라도 머리 기를까……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「──って、別にあんたを喜ばせたいとかじゃないからねっ！\u3000一般意見として参考にしただけだから！」"
translation = "「──라니, 딱히 너를 기쁘게 하고 싶어서 그런 게 아니니까! 일반적인 의견으로서 참고했을 뿐이야!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「そーれーよーり！\u3000性能の話！\u3000別にあんたにウェディングドレス見せたいわけじゃないんだから！」"
translation = "「그-것-보-다! 성능 이야기! 딱히 너한테 웨딩드레스를 보여주고 싶은 게 아니니까!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「クリスマスやバレンタインは自分で戦闘服を調整して変身したけど、このウェディングドレスはそうじゃないから、使い勝手が違うのよね」"
translation = "「크리스마스나 발렌타인 때는 직접 전투복을 조정해서 변신했지만, 이 웨딩드레스는 그렇지 않으니까 사용감이 다르단 말이지」"

[[dialogue]]
speaker = "unk"
original = "イレーナが得意とするのは回復や支援だ。"
translation = "이레이나가 특기로 하는 것은 회복이나 지원이다."

[[dialogue]]
speaker = "unk"
original = "だがウェディングフォームを手に入れたことで、今までと異なる戦い方ができるかもしれない。"
translation = "하지만 웨딩 폼을 손에 넣음으로써 지금까지와는 다른 싸움 방식을 구사할 수 있을지도 모른다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「この戦闘服、星術を少しだけ強くしようとしたら出力が全開になったり、回復しようとしたら攻撃の術が出たりで、扱いがピーキーなの」"
translation = "「이 전투복, 성술을 조금만 강하게 하려고 하면 출력이 전개돼 버리거나, 회복하려고 하면 공격 술법이 나가거나 해서 취급이 까다로워」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「スペック的には他の戦闘服に負けない……というか出力は一番強いと思うんだけど、見かけによらずじゃじゃ馬ね」"
translation = "「스펙상으로는 다른 전투복에 뒤지지 않는데…… 아니, 출력이 제일 강하다고 생각하지만 겉보기와 달리 야생마네」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「自前じゃない戦闘服の扱い方を学んでいかないといけないわ」"
translation = "「직접 만든 게 아닌 전투복을 다루는 법을 배워나가야겠어」"

[[dialogue]]
speaker = "unk"
original = "自前じゃないから露出が少なかったのか……"
translation = "직접 만든 게 아니라서 노출이 적었던 건가……"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「口を開けばそればっかり。本当にスケベなんだから」"
translation = "「입만 열면 그 소리네. 정말 변태라니까」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「でもおへそが出てない戦闘服は初めてね……自分で言うのもなんだけど」"
translation = "「하지만 배꼽이 안 나오는 전투복은 처음이네…… 내가 말하긴 좀 그렇지만」"

[[dialogue]]
speaker = "unk"
original = "露出がなくて慣れない？"
translation = "노출이 없어서 익숙하지 않아?"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「そうそう、やっぱりお腹と太ももは出てないと──」"
translation = "「그래그래, 역시 배랑 허벅지는 나와 있지 않으면──」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「って、んなわけあるかぁああっ！！！」"
translation = "「──라고, 그럴 리가 있겠냐아아악!!!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ったくもう、すぐに脱がせる方向に持っていこうとして、油断も隙もないんだから。スケベ魔王め」"
translation = "「정말이지, 틈만 나면 벗기는 방향으로 몰아가려 하고, 방심할 수가 없다니까. 변태 마왕 녀석」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ま、いいわ。ウェディングドレスに免じて、あんたのスケベも特別に許してあげる」"
translation = "「뭐, 됐어. 웨딩드레스를 봐서 네 변태성도 특별히 용서해 줄게」"

[[dialogue]]
speaker = "unk"
original = "やっぱり着られて嬉しいんだ"
translation = "역시 입을 수 있어서 기쁜 거네"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「う……そりゃあ、着てみたいと思ったことがないかと言えばウソになるし」"
translation = "「으…… 그야, 입어보고 싶다고 생각한 적이 없냐고 물으면 거짓말이고」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「結婚願望……というか結婚したいかどうか関係なく、女の子にとってウェディングドレスは憧れなのよ」"
translation = "「결혼 소망…… 이라기보다 결혼하고 싶은지 아닌지와 관계없이, 여자애한테 웨딩드레스는 동경의 대상이야」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「フィオナ会長たちのドレスを見て、あたしも着てみたいって思っちゃったの。教皇庁の神官なのに」"
translation = "「피오나 회장님의 드레스를 보고 나도 입어보고 싶다고 생각했단 말이야. 교황청의 신관인데도」"

[[dialogue]]
speaker = "unk"
original = "何度見ても綺麗だ"
translation = "몇 번을 봐도 아름다워"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「もう……そんなに褒めても何も出ないわよ」"
translation = "「정말…… 그렇게 칭찬해도 아무것도 안 나온다니까」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あんたが着てほしいなら、今後も着てあげなくもないけどねっ」"
translation = "「네가 입어주길 원한다면 앞으로도 못 입어줄 건 없지만 말이야!」"

[[dialogue]]
speaker = "unk"
original = "なんだかんだイレーナもまんざらでもなさそうで、またウェディングドレス姿を見せてもらおうと思うのだった。"
translation = "이래저래 이레이나도 싫지는 않은 기색이라, 다음에 또 웨딩드레스 모습을 보여달라고 생각하게 되었다."

