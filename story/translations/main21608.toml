[[dialogue]]
speaker = "unk"
original = "第８話,失星,B"
translation = "제8화 실성 B"

[[dialogue]]
speaker = "unk"
original = "アルタイルのフィーニスの塔で、一時的な対処をするしかなかったあの右腕が、再び俺たちの前に現れてしまった──"
translation = "알타이르의 피니스 탑에서 일시적인 대처밖에 할 수 없었던 그 오른팔이 다시 우리 앞에 나타나고 말았다──"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネL"
speaker_translation = "할로우 루비네 L"
original = "「すべてを壊しなさい。滅ぼしなさい！\u3000それこそがお前の悲願でしょう？\u3000ベガの魔王──緋宮クロト！」"
translation = "「모든 것을 부수렴. 멸하렴! 그것이야말로 너의 비원이지? 베가의 마왕── 히노미야 쿠로토!」"

[[dialogue]]
speaker = "unk"
original = "大地を割るような破滅の薙ぎ払いによって、紙屑のように味方の星騎士たちが吹き飛ばされていく……！"
translation = "대지를 가르는 듯한 파멸의 휘두르기에 종잇조각처럼 아군 성기사들이 날아간다……!"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「みんな下がれ！\u3000俺が相手を──」"
translation = "「모두 물러나! 내가 상대하──」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「く、そぉぉぉおっ──！？」"
translation = "「제, 젠장──!?」"

[[dialogue]]
speaker = "unk"
original = "『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』とディザスターハンドを同時に相手するだなんて──無理だ！\u3000戦線が崩壊する！！"
translation = "『<ruby>XELOS<rt>젤로스</rt></ruby>』와 디재스터 핸드를 동시에 상대하다니── 무리다! 전선이 붕괴한다!!"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「総員！\u3000教皇庁前から離れるんだ！\u3000退路を切り開け！！」"
translation = "「전원! 교황청 앞에서 떨어져! 퇴로를 열어라!!」"

[[dialogue]]
speaker_original = "メルエル（覚醒）"
speaker_translation = "메르엘 (각성)"
original = "「──たあぁああっ！！」"
translation = "「── 타앗!!」"

[[dialogue]]
speaker_original = "ネーゼマイン（覚醒）"
speaker_translation = "네제마인 (각성)"
original = "「何とかして複製体たちをどかさないと──！」"
translation = "「어떻게든 복제체들을 치우지 않으면──!」"

[[dialogue]]
speaker = "unk"
original = "メルエルたちがホロウの大群が築いた壁を突破しようと動いてくれているが……このままでは背中を討たれてしまう！"
translation = "멜엘 일행이 홀로우 대군이 쌓은 벽을 돌파하려 움직여 주고 있지만…… 이대로라면 등 뒤를 공격당하고 만다!"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺たちでディザスターハンドと『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』を止めるしかない……！\u3000行くぞ！！」"
translation = "「우리끼리 디재스터 핸드와 『<ruby>XELOS<rt>젤로스</rt></ruby>』를 막을 수밖에 없어……! 간다!!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「この、攻撃はっ──！？」"
translation = "「이 공격은──!?」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「先の戦いよりも、強力に──だめです、とても抑えきれません！」"
translation = "「이전 전투보다도 강력하게── 안 돼요, 도저히 억제할 수 없어요!」"

[[dialogue]]
speaker = "unk"
original = "大地がえぐれ──"
translation = "대지가 파여 나가고──"

[[dialogue]]
speaker = "unk"
original = "破壊の嵐が、デネブの教皇庁前をさらなる廃墟へと変えていく。"
translation = "파괴의 폭풍이 데네브의 교황청 앞을 더욱 참혹한 폐허로 바꾸어 놓는다."

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「どうして──どうしてこんなことをするの、<b>クロト</b>！？」"
translation = "「어째서── 어째서 이런 짓을 하는 거야, <b>쿠로토</b>!?」"

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「世界は違っても！\u3000あなたは世界を守る魔王だったはずよ！\u3000どうして！？」"
translation = "「세계는 달라도! 당신은 세계를 지키는 마왕이었을 텐데! 어째서!?」"

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「あなたはいつだって、誰かのために戦っていたじゃない！\u3000誰よりも真面目で、誰よりも優しい男の子だったじゃない！？」"
translation = "「당신은 언제나 누군가를 위해 싸우고 있었잖아! 누구보다 진지하고, 누구보다 상냥한 아이였잖아!?」"

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「目を覚まして！\u3000悪い奴はそこにいるのよ！\u3000お願い、クロト！！」"
translation = "「눈을 떠! 나쁜 녀석은 저기 있단 말이야! 부탁이야, 쿠로토!!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ヴィーナス、ダメだ！\u3000こいつは話が通用する相手じゃない！！」"
translation = "「비너스, 안 돼! 이 녀석은 말이 통하는 상대가 아니야!!」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「九浄ヴィーナス。お前は本当に邪魔ね……いい加減に消えてもらわないと」"
translation = "「쿠죠 비너스. 넌 정말 방해되는구나…… 슬슬 사라져 줘야겠어」"

[[dialogue]]
speaker = "unk"
original = "ホロウたちが大量にヴィーナスの元に押し寄せ、四方八方から攻撃を浴びせていく。"
translation = "홀로우들이 대량으로 비너스에게 몰려들어 사방팔방에서 공격을 퍼붓는다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ヴィーナス、援護する！」"
translation = "「비너스, 원호할게!」"

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「うんっ、パパ！！\u3000一緒にやっつけましょう！」"
translation = "「응, 아빠!! 같이 해치워 버리자!」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「──パパ。そう、魔王はこの女の父親……それをもっと早く意識するべきだったのよ」"
translation = "「── 아빠. 그래, 마왕은 이 여자의 아버지…… 그걸 좀 더 일찍 의식했어야 했어」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「さっきアルタイルで面白いものを見たわ。娘を想うが故の、父親の愚かな行動を」"
translation = "「방금 알타이르에서 재미있는 걸 봤거든. 딸을 생각한 나머지 저지르는 아버지의 어리석은 행동을 말이야」"

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「なっ──きゃああっ！？」"
translation = "「앗── 꺄악!?」"

[[dialogue]]
speaker = "unk"
original = "大量のホロウたちがヴィーナスに執拗にまとわりついていく──"
translation = "대량의 홀로우들이 비너스에게 집요하게 달라붙는다──"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネL"
speaker_translation = "할로우 루비네 L"
original = "「さぁ、ディザスターハンド。私ごと、この女神の搾りカスを消し飛ばしなさい」"
translation = "「자, 디재스터 핸드. 나까지 포함해서 이 여신의 찌꺼기를 날려버리렴」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「やめろぉおぉぉぉおッ────！！！！」"
translation = "「그만둬어어어어억────!!!!」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスを庇い、絶対防御の盾を展開する──絶対に受け止めてみせる！"
translation = "비너스를 감싸며 절대 방어의 방패를 전개한다── 반드시 막아내고 말겠어!"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「やはり、そうするわよね──父親なら」"
translation = "「역시 그렇게 나오는구나── 아버지라면」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「我が子の危機の前に身体が動いてしまう。後先も考えず、ただただ愛しい子供を守りたい。それだけで頭がいっぱいになる」"
translation = "「제 자식의 위기 앞에 몸이 먼저 움직이지. 앞뒤 생각도 못 하고 그저 사랑하는 아이를 지키고 싶다는 생각만으로 머릿속이 가득 차버려」"

[[dialogue]]
speaker = "unk"
original = "いつの間にか側面から──『ＸＥＬＯＳ』が、攻撃を──！？"
translation = "어느샌가 측면에서── 『XELOS』가 공격을──!?"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「それがお前の弱さなのよ、緋宮クロト──」"
translation = "「그게 너의 약점이야, 히노미야 쿠로토──」"

[[dialogue]]
speaker = "unk"
original = "──その瞬間。"
translation = "── 그 순간."

[[dialogue]]
speaker = "unk"
original = "灼けるような激痛が──凍えるような死の気配が、俺を貫いた。"
translation = "타는 듯한 격통이── 얼어붙는 듯한 죽음의 기척이 나를 꿰뚫었다."

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「ぱ……ぱ？」"
translation = "「아…… 빠?」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「──御見事です、お父様」"
translation = "「── 훌륭하십니다, 아버님」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「殺し損ねると魔王はさらに強くなって息を吹き返します。だから……即死させる以外に確実な勝利はありません」"
translation = "「죽이지 못하면 마왕은 더욱 강해져서 되살아납니다. 그러니까…… 즉사시키는 것 외에 확실한 승리는 없습니다」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「おやすみなさい、緋宮クロト──<ruby>良き旅を<rt>ボン・ボヤージュ</rt></ruby>」"
translation = "「잘 자렴, 히노미야 쿠로토── <ruby>즐거운 여행을<rt>본 보야지</rt></ruby>」"

