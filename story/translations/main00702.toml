[[dialogue]]
speaker = "unk"
original = "第２話,知られざる秘密,B"
translation = "제2화, 알려지지 않은 비밀, B"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「──緋宮会長、星見会長」"
translation = "「──히노미야 회장, 호시미 회장」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──はい」"
translation = "「──네」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「君たちが現地で得た情報の中で──まだ、共有できていないことはないか？」"
translation = "「너희들이 현지에서 얻은 정보 중에서── 아직, 공유하지 못한 것은 없는가?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "アポロ？"
speaker_translation = "아폴로?"
original = "「違う──違う違う違う！\u3000あたしは……あたしはアポロだ、フィオナなんかじゃない！」"
translation = "「아니야── 아니야 아니야 아니야! 나는…… 나는 아폴로다, 피오나 같은 게 아냐!」"

[[dialogue]]
speaker_original = "エリシア"
speaker_translation = "엘리시아"
original = "「いいえ姉さん。あなたはフィオナ。星見家の長女として生まれ、魔王となる宿命を背負った人間です」"
translation = "「아닙니다 언니. 당신은 피오나. 호시미 가문의 장녀로 태어나, 마왕이 될 숙명을 짊어진 인간입니다」"

[[dialogue]]
speaker_original = "エリシア"
speaker_translation = "엘리시아"
original = "「それとも──妹の顔も忘れてしまいましたか？\u3000私ばかりが成長してしまったから」"
translation = "「아니면── 여동생의 얼굴도 잊어버리셨습니까? 저만이 성장해 버렸기 때문에」"

[[dialogue]]
speaker_original = "アポロ？"
speaker_translation = "아폴로?"
original = "「っ……黙れ！\u3000オマエなんか知らない──勝手に妹ヅラするな！」"
translation = "「……닥쳐! 너 같은 건 몰라── 멋대로 여동생 행세하지 마!」"

[[dialogue]]
speaker_original = "アポロ？"
speaker_translation = "아폴로?"
original = "「あたしは──あたしの名前は、アポロなんだ──！！」"
translation = "「나는── 내 이름은, 아폴로란 말이다──!!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（……）"
translation = "（……）"

[[dialogue]]
speaker = "unk"
original = "共有できていないこと──無論ある。"
translation = "공유하지 못한 것── 물론 있다."

[[dialogue]]
speaker = "unk"
original = "そして俺たちのトップ、かつ俺にとって憧れの彼がより詳細な情報を求めている。"
translation = "그리고 우리의 최고 책임자이자, 내게 있어 동경의 대상인 그가 더 상세한 정보를 요구하고 있다."

[[dialogue]]
speaker = "unk"
original = "なら……"
translation = "그렇다면……"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……ありました」"
translation = "「……있습니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「ほう。聞かせてもらおう、緋宮会長」"
translation = "「호오. 들려주게, 히노미야 회장」"

[[dialogue]]
speaker = "unk"
original = "セイファート学園長は身を乗り出し、まっすぐに俺の目を捉えた。"
translation = "세이퍼트 학원장은 몸을 내밀어, 똑바로 내 눈을 응시했다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「はい。最後に『仮面の少女』を<ruby>拐<rt>さら</rt></ruby>っていった──謎の『手』のことです」"
translation = "「네. 마지막에 『가면의 소녀』를 채어갔던── 수수께끼의 『손』에 대한 것입니다」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「……ふむ。手、とな」"
translation = "「……흠. 손, 이라」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ええ。それと、最後に僕らの前に現れ、基地までも招待された『ネビュラ』について」"
translation = "「네. 그리고, 마지막에 저희 앞에 나타나, 기지까지도 초대했던 『네뷸라』에 대해서」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「！\u3000ネビュラ──なるほど。名前程度は聞き及んでおりましたが」"
translation = "「! 네뷸라── 과연. 이름 정도는 들어 알고 있었습니다만」"

[[dialogue]]
speaker = "unk"
original = "俺は最終的な事の顛末と、ここに来るまで『ネビュラ』の基地に寄っていて遅れたことを伝えた。"
translation = "나는 최종적인 일의 전말과, 여기에 오기까지 『네뷸라』의 기지에 들렀다가 늦었다는 것을 전했다."

[[dialogue]]
speaker = "unk"
original = "フィオナとアポロにまつわるやり取りについては巧妙に隠して……。"
translation = "피오나와 아폴로에 얽힌 대화에 대해서는 교묘하게 숨기고……."

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「！\u3000ひ、緋宮クロト！\u3000おまえは！」"
translation = "「! 히, 히노미야 쿠로토! 너는!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「会長ともあろう者が──臨時招集の呼び出しを無視して、そんなよそ者の組織にノコノコついていったというのか！」"
translation = "「회장씩이나 되는 사람이── 임시 소집 호출을 무시하고, 그런 외부 조직에 순순히 따라갔다는 말입니까!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それは……」"
translation = "「그것은……」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「アニュラス。彼の行動は咎めるべきものではない」"
translation = "「아뉴라스. 그의 행동은 탓할 만한 것이 아니다」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「我々以外の第三者組織。その懐に入って帰還してくれたのだから、勇敢かつ有益な行動と言えよう」"
translation = "「우리 이외의 제삼자 조직. 그 품속에 들어가 귀환해 주었으니, 용감하고 유익한 행동이라고 할 수 있다」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「はっ──はい……失礼しました、お父様」"
translation = "「──네…… 실례했습니다, 아버님」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（はは……）"
translation = "（하하……）"

[[dialogue]]
speaker = "unk"
original = "セイファート学園長の娘──アニュラスもこの場に同席していた。"
translation = "세이퍼트 학원장의 딸── 아뉴라스도 이 자리에 동석하고 있었다."

[[dialogue]]
speaker = "unk"
original = "どうやら書記として抜擢されているみたいだが……ノリは相変わらずのようだ。"
translation = "아무래도 서기로 발탁된 것 같지만…… 태도는 변함없는 듯하다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「それ以外で共有すべき事項は？」"
translation = "「그 외에 공유해야 할 사항은?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ありません。星徒会内でも、まだあまり事態が整理できておらず」"
translation = "「없습니다. 성도회 내에서도, 아직 사태가 잘 정리되지 않아서요」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「うむ。貴重な情報感謝する、緋宮会長」"
translation = "「음. 귀중한 정보 감사한다, 히노미야 회장」"

[[dialogue]]
speaker = "unk"
original = "俺はセイファート学園長に促されるや、軽く一礼してからゆっくりと席に座った。"
translation = "나는 세이퍼트 학원장에게 재촉받자마자, 가볍게 목례한 후 천천히 자리에 앉았다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "（緋宮会長……）"
translation = "（히노미야 회장……）"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（何か？）"
translation = "（무슨 일이지？）"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "（……いえ。ありがとうございます）"
translation = "（……아뇨. 감사합니다）"

[[dialogue]]
speaker = "unk"
original = "フィオナ──と俺たちが呼んでいる彼女──とアポロの関係についてはまだ不明瞭な点も多い。"
translation = "피오나──라고 우리가 부르고 있는 그녀──와 아폴로의 관계에 대해서는 아직 불명확한 점도 많다."

[[dialogue]]
speaker = "unk"
original = "彼女本人がフィオナを名乗り続ける限り……俺もそれに合わせようと思った。"
translation = "그녀 본인이 피오나라는 이름을 계속 쓰는 한…… 나도 거기에 맞춰줄 생각이었다."

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "（我らが星見会長ともあんな親しげに……！\u3000やはり要注意人物に変わりありませんね、緋宮クロト……！）"
translation = "（우리 호시미 회장님과도 저렇게 친근하게……! 역시 요주의 인물임에는 변함이 없군요, 히노 미야 쿠로토……!）"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "（……彼女と、何かあったのでしょうか？）"
translation = "（……그녀와, 무슨 일이라도 있었던 건가요？）"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（はは……まあ、少しね）"
translation = "（하하…… 뭐, 조금.）"

[[dialogue]]
speaker = "unk"
original = "ますます睨みを利かされてしまっていた。"
translation = "갈수록 더욱 따가운 눈총을 받게 되어버렸다."

[[dialogue]]
speaker = "unk"
original = "アニュラスは流星学園の一年生──フィオナには馴染みのある後輩なのかもしれない。"
translation = "아뉴라스는 유성 학원의 1학년──피오나에게는 낯익은 후배일지도 모른다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「今、世界は明らかな転換期を迎えている──これらの危機を乗り越えることこそ、我ら<ruby>星騎士<rt>スターナイト</rt></ruby>の真の役目と言えよう」"
translation = "「지금, 세계는 명백한 전환기를 맞이하고 있다──이러한 위기를 극복하는 것이야말로, 우리 성기사의 진정한 역할이라 할 수 있겠지」"

[[dialogue]]
speaker = "unk"
original = "その後、俺たちの持ち帰った情報を元に今後の方針などが話し合われ……"
translation = "그 후, 우리가 가져온 정보를 바탕으로 향후 방침 등이 논의되었고……"

[[dialogue]]
speaker = "unk"
original = "次に同じようなアクシデントが発生した時のため、様々な対策が練られることになった。"
translation = "다음에 비슷한 사고가 발생했을 때를 대비해, 여러 가지 대책을 마련하게 되었다."

