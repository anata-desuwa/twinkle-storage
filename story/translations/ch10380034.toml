[[dialogue]]
speaker = "unk"
original = "第４話,妄想天使と甘い触れ合い,P"
translation = "제4화, 망상 천사와 달콤한 접촉, P"

[[dialogue]]
speaker = "unk"
original = "ホワイトデーから少し経った週末。"
translation = "화이트데이로부터 조금 지난 주말."

[[dialogue]]
speaker = "unk"
original = "その日、久しぶりにイクシーが俺の家へ遊びに来ていた。"
translation = "그날, 오랜만에 익시가 우리 집에 놀러 와 있었다."

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「会長、それでは……お口に失礼致しますね。あ、あ～ん<emoji=heart04>」"
translation = "「회장님, 그러면…… 입에 실례할게요. 자, 아~앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "照れながらも、イクシーは手作りしたチョコレートを指先で摘まみ、そっと俺の口元へ運んでくれる。"
translation = "부끄러워하면서도, 익시는 직접 만든 초콜릿을 손끝으로 집어 살며시 내 입가로 가져다준다."

[[dialogue]]
speaker = "unk"
original = "うまい！\u3000甘いだけじゃなくて深みがあるな"
translation = "「맛있어! 달기만 한 게 아니라 깊은 맛이 나네.」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「ありがとうございます<emoji=heart04>\u3000会長の好みに合うように考えながら作ったので、そう言ってもらえると嬉しいです……えへへ<emoji=heart04>」"
translation = "「감사합니다<emoji=heart04> 회장님의 취향에 맞도록 고민하며 만들었기에, 그렇게 말씀해 주시니 기뻐요…… 에헤헤<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その笑顔や仕草があまりに可愛くて、俺は思わず彼女を抱き寄せてしまう。"
translation = "그 미소와 몸짓이 너무나도 사랑스러워서, 나는 나도 모르게 그녀를 끌어안고 만다."

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「あっ……か、会長……<emoji=heart04>\u3000そんな急にされたら、ドキドキしてしまいます……<emoji=heart04>」"
translation = "「앗…… 회, 회장님……<emoji=heart04> 그렇게 갑자기 하시면, 두근거려 버려요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「――バレンタインフォームが可愛い、ですか？\u3000あ、ありがとうございます……<emoji=heart04>\u3000戦闘で着るのは慣れてきましたが、改めて言われると、ちょっと照れてしまいますね……<emoji=heart04>」"
translation = "「――발렌타인 폼이 귀엽다, 고요? 가, 감사합니다……<emoji=heart04> 전투에서 입는 건 익숙해졌지만, 새삼스럽게 들으니 조금 부끄럽네요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その頬がほんのり桜色に染まるのを見て、俺は自然と手を伸ばし、彼女の頬にそっと触れた。"
translation = "그 뺨이 살짝 벚꽃색으로 물드는 것을 보고, 나는 자연스럽게 손을 뻗어 그녀의 뺨에 살며시 손을 댔다."

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「……っ、はぁ……<emoji=heart04>\u3000会長の手、温かいです……<emoji=heart04>」"
translation = "「……윽, 하아……<emoji=heart04> 회장님의 손, 따뜻해요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（ああっ……会長の手が、私の頬にちょっと触れるだけで、体が敏感に感じて、悦んで震えてしまいます……<emoji=heart04>）"
translation = "（아앗…… 회장님의 손이 내 뺨에 살짝 닿는 것만으로도, 몸이 민감하게 반응해서, 기쁨에 떨려버려요……<emoji=heart04>）"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（はぅ……<emoji=heart04>\u3000そんな正面から真っすぐに見つめちゃダメです<emoji=heart04>\u3000会長の綺麗な瞳に吸い込まれてしまうようで……<emoji=heart04>）"
translation = "（하으……<emoji=heart04> 그렇게 정면에서 똑바로 쳐다보시면 안 돼요<emoji=heart04> 회장님의 아름다운 눈동자에 빨려 들어갈 것만 같아서……<emoji=heart04>）"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（お、思わず私の方から、キスして欲しいって気持ちが溢れてきてしまいます……<emoji=heart04>）"
translation = "（나, 나도 모르게 제 쪽에서 키스해 달라는 마음이 넘쳐흘러 버려요……<emoji=heart04>）"

[[dialogue]]
speaker = "unk"
original = "言葉はいらない――これまでずっと見てきた好きな女の子の表情だ。互いの想いを確かめるように、俺はそっと唇を重ねた。"
translation = "말은 필요 없다―― 지금까지 계속 봐왔던 좋아하는 소녀의 표정이다. 서로의 마음을 확인하듯, 나는 살며시 입술을 겹쳤다."

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「……んっ……<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「……응……<emoji=heart04> 츄……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「んむっ……<emoji=heart04>\u3000ちゅっ……はあぁ……<emoji=heart04>」"
translation = "「음뭇……<emoji=heart04> 츄…… 하아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「キス……チョコの味がして……すごく甘いです……<emoji=heart04>」"
translation = "「키스…… 초코 맛이 나서…… 정말 달콤해요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "短くも優しいキスの後、イクシーは名残惜しそうに唇を離し、微笑む。その様子が可愛くて、俺はまた抱きしめたくなる。"
translation = "짧지만 다정한 키스 후, 익시는 아쉬운 듯 입술을 떼고 미소 짓는다. 그 모습이 귀여워서, 나는 다시 껴안고 싶어진다."

[[dialogue]]
speaker = "unk"
original = "そういえばイクシーは、チョコ好きだったよね"
translation = "「그러고 보니 익시는 초코를 좋아했었지.」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「はい。以前、アルモタヘル様と出かけた時に食べたチョコバナナがとても美味しくて……それ以来、すっかりハマってしまって……<emoji=heart04>」"
translation = "「네. 이전에 알무타헬 님과 외출했을 때 먹은 초코 바나나가 너무 맛있어서…… 그 이후로 완전히 빠져버려서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「人間界では昔、チョコは媚薬として扱われていたとも聞きますし……<emoji=heart04>\u3000食べていると、少しだけ想像が膨らんでしまうといいますか……<emoji=heart04>」"
translation = "「인간계에서는 옛날에 초코가 미약으로 취급되었다고도 들었고……<emoji=heart04> 먹고 있으면 조금 상상이 부풀어 오른달까……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「――ハッ！？\u3000い、いえっ！\u3000別にいやらしい妄想をしているわけではなくてですね……！」"
translation = "「――핫!? 아, 아니에요! 딱히 야한 망상을 하고 있는 건 아니고요……!」"

[[dialogue]]
speaker = "unk"
original = "チョコが媚薬か……じゃあ、これは知ってる？"
translation = "「초코가 미약이라…… 그럼 이건 알고 있어?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「え？\u3000――チョコを恋人同士で食べさせ合うと、キスよりも興奮する……！？」"
translation = "「에? ――초코를 연인끼리 서로 먹여주면, 키스보다 흥분한다……!?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「しかも、舌の上で溶ける瞬間は……普通のキスの４倍も感じる、って……！？\u3000そ、そんなことが本当に……？」"
translation = "「게다가 혀 위에서 녹는 순간은…… 보통 키스의 4배나 느낀다, 고요……!? 그, 그런 일이 정말로……?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（か、会長とキスするだけでもあんなに胸が高鳴ってしまうのに……！）"
translation = "（회, 회장님과 키스하는 것만으로도 그렇게 가슴이 고동치는데……!）"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（もしそれにチョコを重ねたら、一体どれほどの……！？）"
translation = "（만약 거기에 초코까지 겹치면 도대체 어느 정도나……!?）"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（ああっ……だめです……！\u3000そんな話を聞いたら、ドキドキして……<emoji=heart04>\u3000はしたないと分かっているのに、試したくなってしまいます……！）"
translation = "（아앗…… 안 돼요……! 그런 이야기를 들으면 두근거려서……<emoji=heart04> 상스럽다는 걸 알면서도 시험해 보고 싶어져 버려요……!）"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（で、でも……もし会長が望むのなら、私は……<emoji=heart04>）"
translation = "（하, 하지만…… 만약 회장님이 원하신다면 저는……<emoji=heart04>）"

[[dialogue]]
speaker = "unk"
original = "期待と戸惑いの混ざった瞳が、そっと俺を見上げてくる。"
translation = "기대와 당혹감이 섞인 눈동자가 살며시 나를 올려다본다."

[[dialogue]]
speaker = "unk"
original = "チョコを食べながらのキス、試してみる？"
translation = "「초코를 먹으면서 하는 키스, 시험해 볼래?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「～～～っ……<emoji=heart04>\u3000は、はい……<emoji=heart04>」"
translation = "「～～～윽……<emoji=heart04> 네, 네……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "頬を真っ赤に染め、小さく頷くイクシー。どうやら、彼女の想像は俺の思った通りだったようだ。"
translation = "뺨을 새빨갛게 물들이며 작게 고개를 끄덕이는 익시. 아무래도 그녀의 상상은 내 생각대로였던 모양이다."

[[dialogue]]
speaker = "unk"
original = "俺は彼女の作ったチョコをひとつ取り、言う。"
translation = "나는 그녀가 만든 초코를 하나 집어 들고 말한다."

[[dialogue]]
speaker = "unk"
original = "イクシー、口を開けて？"
translation = "「익시, 입 벌려봐.」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「ひゃ、ひゃい……<emoji=heart04>\u3000あ、あ～ん……あむっ……<emoji=heart04>\u3000もぐ……んっ……<emoji=heart04>」"
translation = "「햐, 햐이……<emoji=heart04> 아, 아~앙…… 아암…… 우물…… 응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺もチョコを口に含んで、舌の上でゆっくりと溶かしながら、そっと彼女に顔を近づけた。"
translation = "나도 초코를 입에 머금고, 혀 위에서 천천히 녹이면서 살며시 그녀에게 얼굴을 가까이했다."

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（あっ……もう、胸が高鳴って……息が詰まりそう……<emoji=heart04>）"
translation = "（앗…… 벌써 가슴이 고동쳐서…… 숨이 막힐 것 같아……<emoji=heart04>）"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「ふぁ……んっ……<emoji=heart04>\u3000んむ……<emoji=heart04>\u3000んんっ……<emoji=heart04>」"
translation = "「하아…… 응……<emoji=heart04> 음무……<emoji=heart04> 으응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「んちゅ……っ……れろ……<emoji=heart04>\u3000んむ……<emoji=heart04>\u3000はぁ……っ……<emoji=heart04>」"
translation = "「응츄……윽…… 레로……<emoji=heart04> 음무……<emoji=heart04> 하아……윽……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「ぷは……っ……<emoji=heart04>\u3000はぁ……っ……これ……だめです……<emoji=heart04>\u3000キス……甘すぎて……頭の中、とろけちゃいそうで……<emoji=heart04>」"
translation = "「푸하……윽……<emoji=heart04> 하아……윽…… 이거…… 안 돼요……<emoji=heart04> 키스…… 너무 달콤해서…… 머릿속이 녹아버릴 것 같아서……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "イクシー、好きだ"
translation = "「익시, 좋아해.」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「あっ……会長……<emoji=heart04>\u3000私も……好きです……<emoji=heart04>\u3000ん……ちゅっ……<emoji=heart04>」"
translation = "「앗…… 회장님……<emoji=heart04> 저도…… 좋아해요……<emoji=heart04> 응…… 츄……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "互いの想いを唇で確かめ合うように――俺たちは何度も、何度も、甘いキスを重ねていった。"
translation = "서로의 마음을 입술로 확인하듯―― 우리들은 몇 번이고, 몇 번이고 달콤한 키스를 거듭해 갔다."

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「す、すみません……部屋を散らかしたままにしてきてしまって……<emoji=heart04>」"
translation = "「죄, 죄송해요…… 방을 어지럽힌 채로 두고 와버려서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「それに、わざわざ送ってくださって……ありがとうございます……<emoji=heart04>」"
translation = "「게다가 일부러 데려다주셔서…… 감사합니다……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "２人で過ごした甘い時間に夢中になっていたせいで、気づけば夜になってしまっていた。"
translation = "둘이서 보낸 달콤한 시간에 열중했던 탓에, 어느덧 밤이 되어 있었다."

[[dialogue]]
speaker = "unk"
original = "俺はイクシーの手を握りながら、新星寮への道を歩く。"
translation = "나는 익시의 손을 잡으며 신성료로 향하는 길을 걷는다."

[[dialogue]]
speaker = "unk"
original = "気にしなくていいよ。俺が送りたいだけだから"
translation = "「신경 쓰지 마. 내가 데려다주고 싶을 뿐이니까.」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「……私が帰り道で、変な人に声をかけられないように、ですか？」"
translation = "「……제가 귀갓길에 이상한 사람한테 말을 걸리지 않도록, 인가요?」"

[[dialogue]]
speaker = "unk"
original = "俺は頷く。触れ合っていた余韻がまだ残っていて、頬を火照らせたままの彼女を、１人で帰らせるわけにはいかなかった。"
translation = "나는 고개를 끄덕인다. 맞닿아 있던 여운이 아직 남아 있어 뺨을 붉힌 채인 그녀를 혼자 보낼 수는 없었다."

[[dialogue]]
speaker = "unk"
original = "そんなのは嫌だから、俺が守る"
translation = "「그런 건 싫으니까, 내가 지킬게.」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「……会長……<emoji=heart04>\u3000えへへ……<emoji=heart04>」"
translation = "「……회장님……<emoji=heart04> 에헤헤……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「あの……今度遊びに来る時は、もっとたくさんチョコを作ってきますね……<emoji=heart04>」"
translation = "「저기…… 다음에 놀러 올 때는 초콜릿을 더 많이 만들어 올게요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "繋いでいない方の手でそっと唇をなぞりながら、柔らかく微笑むイクシー。"
translation = "잡지 않은 쪽 손으로 살며시 입술을 덧그리며 부드럽게 미소 짓는 익시."

[[dialogue]]
speaker = "unk"
original = "俺たちは今日の余韻を噛みしめるように、恋人繋ぎの手をゆっくり擦り合わせて歩いていくのだった。"
translation = "우리들은 오늘의 여운을 곱씹듯, 연인들의 손잡기 방식으로 손을 천천히 맞비비며 걸어갔다."

