[[dialogue]]
speaker = "unk"
original = "第３話,ショコラティエ・ティータイム,P"
translation = "제3화, 쇼콜라티에 티타임, P"

[[dialogue]]
speaker = "unk"
original = "ある日の午後。"
translation = "어느 날 오후."

[[dialogue]]
speaker = "unk"
original = "カフェテリアではサランに見守られつつ、ウルスラがチョコレート作りに勤しんでいた。"
translation = "카페테리아에서는 사란의 지켜봄 속에 우르술라가 초콜릿 만들기에 정진하고 있었다."

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「そうそう、人肌よりもちょっぴりあったかいくらいで……ウルスラちゃん、手際良くなった～」"
translation = "「그래그래, 체온보다 조금 더 따뜻한 정도로…… 우르술라짱, 솜씨 좋아졌네~」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「恐縮です。ちゃんと師匠に習った通りの作り方で、日々、腕を磨いてますので」"
translation = "「과찬이십니다. 제대로 스승님께 배운 그대로의 방식으로 매일 실력을 갈고닦고 있으니까요」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「年上なんだから、師匠じゃなくってサランでいいのに～。ウルスラちゃんって真面目～」"
translation = "「연상이니까 스승님이 아니라 사란이라고 불러도 되는데~. 우르술라짱은 성실하네~」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「こちらはどうでしょうか……？\u3000味見をお願いできますか？」"
translation = "「이건 어떨까요……? 맛을 봐 주시겠어요?」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「どれどれ～、ぺろっ……」"
translation = "「어디 어디~, 할짝……」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「う～ん……口の温度だけで、とろ～り溶ける滑らかさ……ふわふわ～って広がる気持ちいい香り……」"
translation = "「으음…… 입안의 온도만으로 사르르 녹는 부드러움…… 폭신폭신하게 퍼지는 기분 좋은 향기……」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「ドキドキ……！」"
translation = "「두근두근……!」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ん～～っ♪\u3000す～～っごく美味しい～！\u3000さすがウルスラちゃん、チョコレートはバッチリだ♪」"
translation = "「음~~♪ 너~~무 맛있어~! 역시 우르술라짱, 초콜릿은 완벽해♪」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「ホッ……師匠にそう言っていただけて、良かったです」"
translation = "「휴우…… 스승님께 그런 말을 듣게 되어 다행이에요」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「それじゃ、準備ができたところで～、そろそろ時間かな？」"
translation = "「그럼 준비가 된 참에~, 슬슬 시간인가?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「約束の場所は……こちらで合っていますわよね？」"
translation = "「약속 장소는…… 여기가 맞겠지요?」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「あ、お待ちしておりました。ヒルディオーネさん」"
translation = "「아, 기다리고 있었습니다. 힐디오네 씨」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「本日はお誘いありがとうございますわ、ウルスラさん。サランさんもごきげんよう」"
translation = "「오늘은 초대해 주셔서 감사해요, 우르술라 씨. 사란 씨도 평안하신지」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ヒルディちゃん、こんにちは～。２人はお友達なんだっけ？」"
translation = "「힐디짱, 안녕~. 둘은 친구였던가?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ええ、同じ学年で、流星学園に入学した頃からのお付き合いですわ」"
translation = "「네, 같은 학년으로 유성 학원에 입학했을 무렵부터 알고 지낸 사이예요」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「何分、人間界には不慣れでしたので……学園に入学した頃はヒルディオーネさんによくしていただきました」"
translation = "「아무래도 인간계에는 익숙지 않았기에…… 학원에 입학했을 무렵에는 힐디오네 씨가 잘 챙겨 주셨습니다」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ウルスラさんがチョコレートを作って待っているとのことでしたが……こちらがウルスラさんの作られたチョコレートですの？」"
translation = "「우르술라 씨가 초콜릿을 만들어 기다리고 계신다 들었습니다만…… 이것이 우르술라 씨가 만드신 초콜릿인가요?」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「はい、お口に合えばいいのですけど」"
translation = "「네, 입에 맞으시면 좋겠습니다만」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「表面の光沢は、まるで宝玉のように艶やか。いい仕事されてますわね」"
translation = "「표면의 광택은 마치 보옥처럼 매끄럽군요. 훌륭한 솜씨예요」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「口に入れずとも、まろやかな美味が想像できますわ……では、あんっ」"
translation = "「입에 넣지 않아도 부드러운 풍미가 상상되네요…… 그럼, 앙」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「んんっ……♪\u3000なんて滑らかな口溶け。口内を愛撫するような快感……消えていってしまうのが惜しいですわ」"
translation = "「음……♪ 어쩜 이리 매끄럽게 녹아내리는지. 입안을 애무하는 듯한 쾌감…… 사라져 버리는 것이 아까울 정도예요」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「そこに紅茶を一口含むと……んっ……はぁぁ……♪\u3000口の中に残ったフレーバーが際立って、華やかな余韻が訪れる……」"
translation = "「거기에 홍차를 한 모금 머금으면…… 응…… 하아아……♪ 입안에 남은 풍미가 돋보이며, 화사한 여운이 찾아와요……」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「またひとつ、もうひとつと欲しくなってしまう罪深いお味……これは私の知る限り、五指に入る最高品質のチョコレートですわね」"
translation = "「또 하나, 하나 더 원하게 되어버리는 죄 깊은 맛…… 이것은 제가 아는 한, 다섯 손가락 안에 드는 최고 품질의 초콜릿이네요.」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「ありがとうございます。最高の賛辞です」"
translation = "「감사합니다. 최고의 찬사예요.」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「もちろん、その一指にはサランさんのチョコレートも入っていますけれどね」"
translation = "「물론, 그 한 손가락에는 사란 씨의 초콜릿도 들어가 있지만 말이죠.」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「わ～、ありがと～♪」"
translation = "「와~, 고마워~♪」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「品評会はこのくらいにしまして、ティータイムを楽しみましょう」"
translation = "「품평회는 이쯤 해두고, 티타임을 즐기도록 하죠.」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「──そういえば、ここに来る途中、暴れているモンスターと遭遇しましたわ」"
translation = "「──그러고 보니, 여기 오는 도중 날뛰고 있는 몬스터와 조우했답니다.」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「まあ、大丈夫でしたか？」"
translation = "「어머, 괜찮으셨나요?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ええ、無傷での勝利──といいたいところですけど、ちょうどそこに会長が駆けつけまして。私の見せ場はありませんでしたの」"
translation = "「네, 무상처로 승리──라고 말하고 싶지만, 마침 그곳에 회장님이 달려오셔서요. 제 활약상은 없었답니다.」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「その場にいた子どもやご老人にも怪我ひとつなく、実に見事な救出劇でしたわ」"
translation = "「그 자리에 있던 아이나 노인분들도 부상 하나 없이, 실로 훌륭한 구출극이었어요.」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「もっとも、会長はご老人を庇って、手傷を負われたようでしたが」"
translation = "「무엇보다, 회장님은 노인분을 감싸다 손상을 입으신 듯했지만요.」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「会長ちゃんあるあるだよね～。人は助けるのに自分が怪我するのは気にしないの～」"
translation = "「회장짱에게 자주 있는 일이지~. 사람은 구하면서 자기가 다치는 건 신경 쓰지 않는다니까~.」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「あの方は……確かにそういう方ですね」"
translation = "「그분은…… 확실히 그런 분이시죠.」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "（あの時も、私の矢からイレーナさんを庇おうと身を挺して……あの献身さは尊く、素晴らしいものですけど──）"
translation = "（그때도, 제 화살로부터 이레나 씨를 감싸려고 몸을 던져서…… 그 헌신함은 고귀하고 훌륭한 것이지만──）"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「褒められるべき行為ではありますが、人の上に立つ身としては、危うい面もありますわね」"
translation = "「칭찬받아야 마땅한 행위이긴 합니다만, 사람 위에 서는 몸으로서는 위태로운 면도 있네요.」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「だからこそ、みんなは会長ちゃんを助けてあげたくなっちゃうのかな～？」"
translation = "「그렇기에 다들 회장짱을 도와주고 싶어지게 되는 걸까~?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「何かしでかさないか、一挙一動が気になり、つい目で追ってしまいます。会長は人を惹きつける魅力に長けてますわね」"
translation = "「무슨 일을 저지르지 않을지 일거수일투족이 신경 쓰여서, 그만 눈으로 쫓게 되어버려요. 회장은 사람을 끌어당기는 매력이 뛰어나군요.」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「会長ちゃんに憧れてる子もいっぱいいるよ～。バレンタインチョコあげるからって、チョコ作りを習いに来た子もたくさんいたし～」"
translation = "「회장짱을 동경하는 아이들도 잔뜩 있어~. 발렌타인 초콜릿 줄 거라면서, 초콜릿 만들기를 배우러 온 아이들도 많았고~.」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「そういえば、会長さんはチョコを袋いっぱいに抱えていました……」"
translation = "「그러고 보니, 회장님은 초콜릿을 봉투 가득 안고 계셨어요…….」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ふふ、ホワイトデーのお返しも大変そうですわね。でも、彼はそのひとつひとつにも妥協をなさらないのでしょう」"
translation = "「후후, 화이트데이 답례도 고생하시겠어요. 하지만, 그는 그 하나하나에도 타협을 하지 않으시겠죠.」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「うふふ、ウルスラちゃんも会長ちゃんのこと、気になる～？」"
translation = "「우후후, 우르술라짱도 회장짱에 대해 신경 쓰여~?」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「そう……ですね。私は会長さんと知り合ってまだ日が浅いのですが……少し、興味が出てきました」"
translation = "「그……러게요. 저는 회장님과 알게 된 지 얼마 되지 않았습니다만…… 조금, 흥미가 생겼어요」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「あら。では恋が芽吹くところを、お茶請けにさせていただこうかしら」"
translation = "「어머. 그럼 사랑이 싹트는 장면을, 찻과자로 삼아볼까나」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「──恋の……い、いえっ！？\u3000興味というのは、あくまで人間的な意味ですっ！\u3000会長さんの不思議さを解明したいだけで……！」"
translation = "「──사랑의…… 아, 아니요!? 흥미라는 건, 어디까지나 인간적인 의미입니다! 회장님의 신비로움을 해명하고 싶을 뿐이라……!」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ふ～ん、そうなんだ～♪」"
translation = "「흐~응, 그렇구나~♪」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ウルスラさんの恋路に幸多からんことを……ですわね、ふふ」"
translation = "「우르술라 씨의 앞날에 행복이 가득하기를…… 이네요, 후후」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「ですから、そういうのではないんですってばーっ！」"
translation = "「그러니까, 그런 게 아니라니까요──!」"

[[dialogue]]
speaker = "unk"
original = "ウルスラが顔を真っ赤にして、２人に反論する。"
translation = "우르술라가 얼굴을 새빨갛게 붉히며, 두 사람에게 반론한다."

[[dialogue]]
speaker = "unk"
original = "そんな彼女を、サランとヒルディオーネは微笑ましく見つめるのだった。"
translation = "그런 그녀를, 사란과 힐디요네는 흐뭇하게 바라보는 것이었다."

