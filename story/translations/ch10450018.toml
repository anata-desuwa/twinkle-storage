[[dialogue]]
speaker = "エスメラルダ"
original = "「うんうん♪\u3000会長さんってば飲み込みが早いわね。この調子で次の問題もいっちゃいましょ？」"
translation = "「응응♪ 회장님은 참 습득이 빠르네. 이 기세로 다음 문제도 풀어 볼까?」"

[[dialogue]]
speaker = "unk"
original = "エスメラルダ先生と恋人関係になってからというもの、以前にも増して一緒に過ごすことが増えた。"
translation = "에스메랄다 선생님과 연인 관계가 된 이후로 이전보다 함께 보내는 시간이 늘었다."

[[dialogue]]
speaker = "unk"
original = "デートをしたり、お互いの部屋に泊まったり……そうでなくとも今日みたいに、放課後の空き教室でマンツーマンの補習をしてもらうこともある。"
translation = "데이트를 하거나 서로의 방에서 자고 가기도 하고…… 그렇지 않더라도 오늘처럼 방과 후 빈 교실에서 일대일 보충 수업을 받기도 한다."

[[dialogue]]
speaker = "unk"
original = "星徒会は多忙なのでどうしても成績の維持が難しく、そんな俺を心配してくれる先生にはすごく感謝している。"
translation = "성도회는 바쁘기 때문에 아무래도 성적 유지가 어려워, 그런 나를 걱정해 주는 선생님에게는 무척 감사하고 있다."

[[dialogue]]
speaker = "unk"
original = "そう、ものすごく感謝しているはずなのに、俺ときたら──"
translation = "그래, 엄청나게 감사하고 있어야 하는데, 나란 놈은──"

[[dialogue]]
speaker = "エスメラルダ"
original = "「どうしたの～、会長さん。ぼーっとして」"
translation = "「왜 그래～, 회장님. 멍하니 있고.」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「──あ。もしかしてー……そーいうこと、したくなっちゃった、とか？」"
translation = "「──아. 혹시이…… 그런 거, 하고 싶어졌다거나?」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「もう……本当に仕方がない彼氏さんなんだから♪」"
translation = "「정말…… 정말 어쩔 수 없는 남자친구라니까♪」"

[[dialogue]]
speaker = "unk"
original = "エスメラルダ先生はいたずらっぽく笑った後、教室に鍵をかけた。"
translation = "에스메랄다 선생님은 장난스럽게 웃은 뒤 교실 문을 잠갔다."

[[dialogue]]
speaker = "unk"
original = "勉強は一時中断。ムラムラを解消してから再開しましょう、ということになり──"
translation = "공부는 일시 중단. 성욕을 해소하고 나서 재개하기로 하며──"

[[dialogue]]
speaker = "エスメラルダ"
original = "「わあ～……♪\u3000会長さんってば、すっごい勃起……」"
translation = "「와아～……♪ 회장님, 자지가 엄청 발기했네……」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「真面目にお勉強、頑張ってるな～って思ってたのに。ズボンの下でこんなに大きくしちゃってたのね？」"
translation = "「성실하게 공부 열심히 하고 있구나～라고 생각했는데. 바지 밑에서 이렇게나 크게 만들고 있었던 거야?」"

[[dialogue]]
speaker = "クロト"
original = "「……先生とふたりきりなんだって思ったら、つい」"
translation = "「……선생님이랑 둘뿐이라고 생각하니까 그만.」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「うーん。何だか昨日の夜、私のお部屋で聞いた台詞にそっくりかも？」"
translation = "「으음. 왠지 어젯밤 내 방에서 들었던 대사랑 똑같을지도?」"

[[dialogue]]
speaker = "unk"
original = "くすくす笑う先生に、俺は苦笑を返すしかなかった。確かにまったく同じ台詞を吐いた気がする。"
translation = "큭큭 웃는 선생님에게 나는 쓴웃음을 지을 수밖에 없었다. 확실히 완전히 똑같은 대사를 내뱉은 기분이 든다."

[[dialogue]]
speaker = "エスメラルダ"
original = "「日付けが変わるまでず～っとエッチしてたのに……ふふ♪\u3000今日もしたくなっちゃったの？」"
translation = "「날짜가 바뀔 때까지 계～속 섹스했는데…… 후후♪ 오늘도 하고 싶어졌어?」"

[[dialogue]]
speaker = "unk"
original = "したい。大好きな先生とだったら毎日でもしたいに決まっている。強くしっかりと頷く。"
translation = "하고 싶다. 사랑하는 선생님과라면 매일이라도 하고 싶은 게 당연하다. 강하고 확실하게 고개를 끄덕인다."

[[dialogue]]
speaker = "エスメラルダ"
original = "「はーい、了解しました。う～ん、年頃の男の子の性欲ってすごいのね～。データに録ってみたいわ」"
translation = "「네에, 알겠습니다. 으음, 혈기 왕성한 남자아이의 성욕은 대단하네～. 데이터로 기록해 보고 싶어.」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「それじゃあ先生がしっかりリードして、気持ち良～くしてあげるから。会長さんはジッとしててね♪」"
translation = "「그러면 선생님이 제대로 리드해서 기분 좋～게 해 줄 테니까. 회장님은 가만히 있어♪」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「元気いっぱいのおち○ちん……どんな風にイかせてあげようかしら？」"
translation = "「기운 넘치는 자지…… 어떤 식으로 가게 해 줄까?」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「おっぱいで挟んで、いっぱいこすって欲しい？\u3000それとも、おくちで優しく舐めて欲しい……？」"
translation = "「가슴으로 끼워서 잔뜩 비벼 줬으면 좋겠어? 아니면 입으로 부드럽게 핥아 줬으면 좋겠어……?」"

[[dialogue]]
speaker = "unk"
original = "柔らかい微笑みを浮かべながら、首をかしげるエスメラルダ先生。"
translation = "부드러운 미소를 띄우며 고개를 갸웃거리는 에스메랄다 선생님."

[[dialogue]]
speaker = "エスメラルダ"
original = "「キスしながら両手で優しくシコシコしてあげるのもいいかも……ね、私の体、服をはだけてるからよ～く見えるでしょ？」"
translation = "「키스하면서 양손으로 부드럽게 딸쳐 주는 것도 좋을지도…… 자, 내 몸, 옷을 풀어헤쳐서 아주 잘 보이지?」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「会長さんは、先生の体のどこを使って、どんな射精をしたい気分？\u3000先生に教えて<emoji=heart04>」"
translation = "「회장님은 선생님 몸의 어디를 써서 어떤 사정을 하고 싶은 기분이야? 선생님한테 알려줘<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "どんな射精をしたいって……そんなの、決まってる。愛液でトロトロに濡れた先生の──"
translation = "어떤 사정을 하고 싶냐니…… 그야 뻔하다. 애액으로 걸쭉하게 젖은 선생님의──"

[[dialogue]]
speaker = "エスメラルダ"
original = "「会長さんの目……私のおま○こばーっかり見てる<emoji=heart04>\u3000ここに入りたいのね……<emoji=heart04>」"
translation = "「회장님 눈…… 내 보지만 계~속 보고 있어<emoji=heart04> 여기 들어오고 싶은 거구나……<emoji=heart04>」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「いいわよ～……先生に任せて。ほら……おち○ちんの先っぽ、入口に、あてがって……んんんんっ<emoji=heart04>」"
translation = "「좋아～…… 선생님한테 맡겨. 자…… 자지 끝부분을 입구에 대고…… 으으으응<emoji=heart04>」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「んぁっ──ぁっ<emoji=heart04>\u3000は、ぁ、あぁあっ……やっぱり、すっごく大きい～……<emoji=heart04>」"
translation = "「응아──아<emoji=heart04> 하, 아, 아아아…… 역시 정말 크다……<emoji=heart04>」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「おへそのすぐ下まで入ってるわよね、これ……熱々でやけどしちゃいそう……<emoji=heart04>」"
translation = "「배꼽 바로 밑까지 들어와 있어, 이거…… 뜨거워서 데어 버릴 것 같아……<emoji=heart04>」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「放課後の教室で繋がるのは初めてだけど……すっごくドキドキするわね……<emoji=heart04>」"
translation = "「방과 후 교실에서 이어지는 건 처음이지만…… 정말 두근거리네……<emoji=heart04>」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「ね、会長さんはどう？\u3000お勉強を中断してまでおねだりした甲斐は……ん、んん……<emoji=heart04>\u3000あったかしら<emoji=heart04>」"
translation = "「저기, 회장님은 어때? 공부를 중단하면서까지 조른 보람은…… 음, 으음……<emoji=heart04> 있었을까<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ぷにぷにと柔らかいのに、みっちりと締めあげてくる先生の女性器。凄まじい心地よさだ。"
translation = "말랑말랑 부드러우면서도 꽉 조여오는 선생님의 성기. 엄청난 쾌감이다."

[[dialogue]]
speaker = "unk"
original = "何度も頷く俺に、先生も快感にとろけた眼差しを返してくれる。"
translation = "몇 번이고 고개를 끄덕이는 나에게 선생님도 쾌감에 녹아내린 눈빛을 돌려준다."

[[dialogue]]
speaker = "エスメラルダ"
original = "「はぁあ……そのお顔、好きよ？\u3000私のおま○こで、気持ち良～くなってくれてる、会長さんのお顔……<emoji=heart04>」"
translation = "「하아아…… 그 표정, 좋아해. 내 보지로 기분 좋～아진 회장님 표정……<emoji=heart04>」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「もっととろけさせてあげる。お尻、いっぱい上下しちゃうけど……」"
translation = "「더 황홀하게 해 줄게. 엉덩이, 잔뜩 위아래로 움직일 테니까……」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「大きな声を出したらばれちゃうから、気を付けましょう──ねっ<emoji=heart04>」"
translation = "「큰 소리를 내면 들키니까 조심하자── 알았지?<emoji=heart04>」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「はあぁ、んぅうっ<emoji=heart04>\u3000んんぁっ……ふぅっ……んんっ……んんっ……<emoji=heart04>」"
translation = "「하아, 으으윽<emoji=heart04> 응아…… 후우…… 음…… 음……<emoji=heart04>」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「すっごく長くて、太くて、んっ……ぁ<emoji=heart04>\u3000絶対いつもより大きい……えっち<emoji=heart04>\u3000ぁっ<emoji=heart04>\u3000はぁ、ぅっ<emoji=heart04>」"
translation = "「정말 길고 굵어서, 음…… 아<emoji=heart04> 분명 평소보다 커…… 야해<emoji=heart04> 아<emoji=heart04> 하아, 윽<emoji=heart04>」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「ふう、ぁっ……んん<emoji=heart04>\u3000やだ……<emoji=heart04>\u3000何だかいつもより、ぬるぬるが凄いかも……<emoji=heart04>」"
translation = "「후우, 아…… 음<emoji=heart04> 싫어……<emoji=heart04> 왠지 평소보다 미끌미끌한 게 심할지도……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "通い慣れた教室でするいかがわしいことが、こんなにも興奮のスパイスになるだなんて思わなかった。"
translation = "익숙한 교실에서 하는 파렴치한 짓이 이렇게나 흥분의 스파이스가 될 줄은 몰랐다."

[[dialogue]]
speaker = "unk"
original = "動きはスローでも感度が段違いというか……要はめちゃくちゃに気持ちが良い。"
translation = "움직임은 느려도 감도가 차원이 다르달까…… 요컨대 미친 듯이 기분이 좋다."

[[dialogue]]
speaker = "エスメラルダ"
original = "「やっぱりスリルとか、背徳感のおかげなのかしら～……<emoji=heart04>\u3000んん、はっ、ぁっ、んぅ、ふう、ぁ、んっ……<emoji=heart04>」"
translation = "「역시 스릴이나 배덕감 덕분인 걸까아～……<emoji=heart04> 음, 하, 아, 응, 후우, 아, 음……<emoji=heart04>」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「う～ん。気になってきたかも。今度、学校の別の場所でも……んっ、えっちしてっ……ぁ、んんっ、比較、してみる？」"
translation = "「으음. 궁금해졌을지도. 다음에 학교의 다른 장소에서도…… 음, 섹스해서…… 아, 음, 비교해 볼래?」"

[[dialogue]]
speaker = "unk"
original = "こんな時まで分析官の癖を出さなくても……とは思うのだが、そこがエスメラルダさんらしくもある。"
translation = "이런 때까지 분석관 버릇을 내지 않아도…… 싶지만, 그게 에스메랄다 씨답기도 하다."

[[dialogue]]
speaker = "エスメラルダ"
original = "「ぁっ……そこ、好きっ……おち○ちん、こすれて、気持ちぃっ……<emoji=heart04>」"
translation = "「아…… 거기 좋아…… 자지 쓸려서 기분 좋아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "先生が腰を動かすたび、そのあまりに大きなおっぱいがたぷたぷと揺れる。"
translation = "선생님이 허리를 움직일 때마다 그 커다란 가슴이 출렁출렁 흔들린다."

[[dialogue]]
speaker = "エスメラルダ"
original = "「はぁ、んん、んぅ……ふふ<emoji=heart04>\u3000先生のおっぱい、いっつも熱っぽく見て……そんなに好きなのね」"
translation = "「하아, 음, 으음…… 후후<emoji=heart04> 선생님 가슴, 언제나 뜨거운 시선으로 보고…… 그렇게 좋은 거니?」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「はぁ、んんっ<emoji=heart04>\u3000会長さんだけよ？\u3000こんな風に……たぷ<emoji=heart04>\u3000たぷ<emoji=heart04>\u3000って揺れるところまで見られるのは……♪」"
translation = "「하아, 음<emoji=heart04> 회장님뿐이야. 이렇게…… 출렁<emoji=heart04> 출렁<emoji=heart04> 하고 흔들리는 것까지 볼 수 있는 건……♪」"

[[dialogue]]
speaker = "クロト"
original = "「それは光栄なんですけど……男としては心配になるんですよ」"
translation = "「그건 영광입니다만…… 남자로서는 걱정이 된다고요.」"

[[dialogue]]
speaker = "unk"
original = "こんなに美人な先生の、形も感度も抜群のおっぱい。"
translation = "이렇게 미인인 선생님의, 모양도 감도도 발군인 가슴."

[[dialogue]]
speaker = "unk"
original = "嫌いなわけがないんだけど……そのぶん心配は尽きないのだ。"
translation = "싫어할 리가 없지만…… 그만큼 걱정은 끊이지 않는다."

[[dialogue]]
speaker = "エスメラルダ"
original = "「あれれ？\u3000もしかして嫉妬されちゃってるのかしら<emoji=heart04>」"
translation = "「어라라? 혹시 질투하고 있는 걸까<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「どっちかというと小言です……お願いですからブラは毎日忘れず着けてくださいね」"
translation = "「어느 쪽인가 하면 잔소리예요…… 부탁이니까 브래지어는 매일 잊지 말고 차 주세요.」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「あ……ハイ……」"
translation = "「아…… 하이……」"

[[dialogue]]
speaker = "unk"
original = "付き合っている男の目線からするとどうしても気になるのだ。先生は仕事にかまけると、すぐあり得ないドジを連発する。"
translation = "사귀는 남자의 시선에서 보면 아무래도 신경이 쓰인다. 선생님은 일에 몰두하면 금방 말도 안 되는 실수를 연발한다."

[[dialogue]]
speaker = "unk"
original = "ノーブラで通勤した回数も、１回や２回じゃないのだ。"
translation = "노브라로 출근한 횟수도 한두 번이 아니다."

[[dialogue]]
speaker = "エスメラルダ"
original = "「わ、私だって忘れたくて忘れてるわけじゃ、ないのよ？\u3000ん、ふぅっ、んんっ……<emoji=heart04>」"
translation = "「나, 나라고 잊고 싶어서 잊는 게 아니야? 음, 후우, 음……<emoji=heart04>」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「でも……うん<emoji=heart04>\u3000気を付けるわね？\u3000このおっぱいは、会長さんのもの、だもの……ん、ぁ、はぁ、ふうっ<emoji=heart04>」"
translation = "「하지만…… 응<emoji=heart04> 조심할게? 이 가슴은 회장님 거니까…… 음, 아, 하아, 후우<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "先生のおっぱいは俺のもの──改めて本人から直接聞かされると、男として喜ばないわけにはいかなくて。"
translation = "선생님의 가슴은 내 것── 새삼 본인에게 직접 들으니 남자로서는 기뻐하지 않을 수가 없어서."

[[dialogue]]
speaker = "エスメラルダ"
original = "「──ふふふっ<emoji=heart04>\u3000おち○ちん、ぴくぴくって反応しちゃってる……可愛いんだから<emoji=heart04>」"
translation = "「──후후후<emoji=heart04> 자지가 움찔움찔 반응하고 있어…… 귀엽다니까<emoji=heart04>」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「ね……キスしましょ？\u3000先生の方、向いて。べろ、れ～って出して？」"
translation = "「저기…… 키스하자. 선생님 쪽 봐 줘. 혀, 레～ 하고 내밀어 봐.」"

[[dialogue]]
speaker = "unk"
original = "とろけた眼差しに誘われて、俺は言われたとおりに舌を伸ばす。"
translation = "녹아내린 눈빛에 이끌려 나는 시키는 대로 혀를 내민다."

[[dialogue]]
speaker = "エスメラルダ"
original = "「はぅぅう<emoji=heart04>\u3000会長さん、本当に可愛い……んんぅ<emoji=heart04>」"
translation = "「하으으으<emoji=heart04> 회장님, 정말 귀여워…… 음으으<emoji=heart04>」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「んんちゅぅ、れぇえ、じゅる、んちゅるっ、ちゅる、はぷ、んちゅる、ちゅぱっ……れろ、んりゅる……<emoji=heart04>」"
translation = "「음츄, 레에, 쥬르, 음츄르, 츄르, 하프, 음츄르, 츄파…… 레로, 음류르……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "エスメラルダ先生は、生徒からも学園関係者からも評価されている高嶺の花だ。"
translation = "에스메랄다 선생님은 학생들로부터도 학원 관계자들로부터도 평가받는 그림의 떡이다."

[[dialogue]]
speaker = "unk"
original = "真面目で優しい先生の、こんないやらしい姿。誰も想像がつかないだろう──"
translation = "성실하고 상냥한 선생님의 이런 음란한 모습. 아무도 상상하지 못하겠지──"

[[dialogue]]
speaker = "エスメラルダ"
original = "「もっとおっぱい、乱暴に揉んで……<emoji=heart04>\u3000んちゅ、れぇ、じゅる、んちゅるる、ちゅぱ<emoji=heart04>」"
translation = "「더 가슴, 난폭하게 주물러 줘……<emoji=heart04> 음츄, 레에, 쥬르, 음츄르르, 츄파<emoji=heart04>」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「んちゅ、ちゅる、んじゅる、れぇえ、れちゅる、んちゅぅっ……お尻、お尻も<emoji=heart04>\u3000たくさん触ってほしいの……<emoji=heart04>」"
translation = "「음츄, 츄르, 음쥬르, 레에, 레츄르, 음츄우…… 엉덩이, 엉덩이도<emoji=heart04> 잔뜩 만져줬으면 좋겠어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "どこを触っても先生は嫌がらない。それどころか、俺が触りやすいように角度を調節さえしてくれる。"
translation = "어디를 만져도 선생님은 싫어하지 않는다. 오히려 내가 만지기 쉽도록 각도를 조절하기까지 한다."

[[dialogue]]
speaker = "エスメラルダ"
original = "「んんちゅぅ……ぷぁ<emoji=heart04>\u3000はぁああ<emoji=heart04>\u3000好き……好きよ<emoji=heart04>\u3000会長さんっ……大好きっ……<emoji=heart04>」"
translation = "「음음츄…… 푸하<emoji=heart04> 하아아아<emoji=heart04> 좋아…… 좋아해<emoji=heart04> 회장님…… 너무 좋아해……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "密着して舌をぐるぐる絡ませるうち──優しくリードを続けてくれていた先生の動きに変化が現れた。"
translation = "밀착해서 혀를 빙글빙글 섞는 사이── 상냥하게 리드를 계속해 주던 선생님의 움직임에 변화가 나타났다."

[[dialogue]]
speaker = "エスメラルダ"
original = "「はぁ、はぁあっ……んんぅ、こんなに感じてくれると、もっともっと気持ち良くしてあげたくなっちゃう……んんっ<emoji=heart04>」"
translation = "「하아, 하아아…… 음으으, 이렇게 느껴 주면 더더욱 기분 좋게 해 주고 싶어져…… 음음<emoji=heart04>」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「ん、んんっ<emoji=heart04>\u3000会長さんとえっち、すっごく、気持ち良くって……んんぁ、ぁっ、ぁっ、んんっ、ふぅっ<emoji=heart04>」"
translation = "「음, 음음<emoji=heart04> 회장님이랑 섹스, 정말 기분 좋아서…… 음음아, 아, 아, 음음, 후우<emoji=heart04>」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「静かにえっちしなきゃいけないって、わかってるのに、んんっ、あっ<emoji=heart04>\u3000ごめん、なさい、ぁっ<emoji=heart04>\u3000ふぅ、んんっ、はぁっ、ああぁっ<emoji=heart04>」"
translation = "「조용히 섹스해야 한다는 거 알고 있는데, 음음, 앗<emoji=heart04> 미안, 해요, 아<emoji=heart04> 후우, 음음, 하아, 아아아<emoji=heart04>」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「んっ、んっ、んんっ<emoji=heart04>\u3000やっぱり<emoji=heart04>\u3000速くした方がっ、んっ、おち○ちん、気持ち良さそうっ……ぁ、ぁっ、ぁっ<emoji=heart04>」"
translation = "「음, 음, 음음<emoji=heart04> 역시<emoji=heart04> 빨리 하는 게, 음, 자지, 기분 좋을 것 같아…… 아, 아, 아<emoji=heart04>」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「ぎゅう～って締めてるの、わかる？\u3000私もお勉強してるの、会長さんを気持ち良ーく、してあげるための、お勉強っ<emoji=heart04>」"
translation = "「꽉 조이고 있는 거 알아? 나도 공부하고 있어, 회장님을 기분 좋～게 해 주기 위한 공부<emoji=heart04>」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「こうやって、おち○ちん引き抜く時に、力を込めてっ……んんっ<emoji=heart04>\u3000搾るみたいに、ぎゅぅ～って……んんぁ、はぁっ<emoji=heart04>」"
translation = "「이렇게 자지 뽑아낼 때 힘을 줘서…… 음음<emoji=heart04> 짜내듯이 꽉…… 음음아, 하아<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「う、ぁ──あっ──！」"
translation = "「으, 아──앗──!」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「奥まで入れる時は、おち○ちんを根元まで飲み込んだ後に、こうっ……ぐりぐりって、ねじるみたいに押し付けたり──んんぅっ<emoji=heart04>」"
translation = "「안쪽까지 넣을 때는 자지를 뿌리까지 삼킨 다음에 이렇게…… 그리그리 비비듯이 누르거나── 음음으윽<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「勉強熱心……なん、です、ねっ……！」"
translation = "「공부 열심…… 이시네요!」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「そう、よっ……<emoji=heart04>\u3000先生だもの、んっ、ふっ、あっ<emoji=heart04>\u3000生徒よりも詳しくないと、いけないでしょ<emoji=heart04>\u3000んんっ、ふぅうっ<emoji=heart04>」"
translation = "「그럼, 요……<emoji=heart04> 선생님인걸, 음, 후, 앗<emoji=heart04> 학생보다 잘 알지 않으면 안 되잖아<emoji=heart04> 음음, 후우우<emoji=heart04>」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「それにー……えっちな話題の統計データを見るのも、今まで経験がなかったから。新鮮で、んっ<emoji=heart04>\u3000楽しいの……<emoji=heart04>」"
translation = "「게다가아── 야한 화제의 통계 데이터를 보는 것도 지금까지 경험이 없었으니까. 신선해서, 음<emoji=heart04> 즐거워……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "分析官であるエスメラルダ先生らしい発言だ──なんて考える余裕も、だんだん持てなくなってきた。"
translation = "분석관인 에스메랄다 선생님다운 발언이다── 라고 생각할 여유도 점점 없어져 갔다."

[[dialogue]]
speaker = "unk"
original = "射精欲がぞくぞくせり上がってきて、歯止めが利かなくなってきている。"
translation = "사정욕이 오싹오싹 치밀어 올라 제동이 걸리지 않게 되었다."

[[dialogue]]
speaker = "unk"
original = "ここは教室だ。プライベートな空間じゃないのに、乱暴なセックスをねだろうと思っているバカな自分がいる……我慢、しないと。"
translation = "여기는 교실이다. 프라이빗한 공간이 아닌데도 난폭한 섹스를 조르려 하는 바보 같은 자신이 있다…… 참아야 해."

[[dialogue]]
speaker = "エスメラルダ"
original = "「そろそろっ、んんっ<emoji=heart04>\u3000イキそうよね？\u3000先生、分かるのよ。会長さんのこと、よーく見てるから<emoji=heart04>」"
translation = "「슬슬, 음음<emoji=heart04> 갈 것 같지? 선생님, 다 알아. 회장님을 아주 잘 보고 있으니까<emoji=heart04>」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「男の子って、射精する直前は乱暴にしたいことも知ってるからー……<emoji=heart04>」"
translation = "「남자아이는 사정하기 직전에 난폭하게 하고 싶어 한다는 것도 알고 있으니까아──<emoji=heart04>」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「──思いっきり激しくしてあげるわね<emoji=heart04>」"
translation = "「──마음껏 격렬하게 해 줄게<emoji=heart04>」」"

[[dialogue]]
speaker = "unk"
original = "先生はくすりと笑って、お尻を思いきり俺の体に打ち付けてきた。"
translation = "선생님은 살짝 웃으며 엉덩이를 힘껏 내 몸에 부딪쳐 왔다."

[[dialogue]]
speaker = "エスメラルダ"
original = "「──ぁっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふぅっ<emoji=heart04>\u3000ぁっあっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000好き、好きぃ……会長さん、いっぱい、感じてっ<emoji=heart04>\u3000いっぱい、イってっ<emoji=heart04>」"
translation = "「──아<emoji=heart04> 음<emoji=heart04> 후우<emoji=heart04> 아아<emoji=heart04> 음음<emoji=heart04> 좋아, 좋아아…… 회장님, 잔뜩 느껴 줘…… 잔뜩 가 줘……<emoji=heart04>」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「おち○ちんっ、すっごく、反り返ってっ、んん、ぁっ、ぅっ<emoji=heart04>\u3000ふぅっ<emoji=heart04>\u3000あっあ<emoji=heart04>\u3000んんん～っ<emoji=heart04>」"
translation = "「자지가 정말 빳빳하게 서서, 음, 아, 윽<emoji=heart04> 후우<emoji=heart04> 아아<emoji=heart04> 음음음～<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「先生……くっ……激しっ……！」"
translation = "「선생님…… 큭…… 격렬해……!」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「だい、じょうぶっ……たぶん廊下に、誰も、いないからっ……今だけ<emoji=heart04>\u3000今だけっ、会長さんも可愛い声、先生に聞かせて<emoji=heart04>」"
translation = "「괜, 찮아…… 아마 복도에 아무도 없을 테니까…… 지금만<emoji=heart04> 지금만 회장님도 귀여운 목소리 선생님한테 들려줘<emoji=heart04>」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「んっ、んっ、んっ、んっ<emoji=heart04>\u3000おま○こ、いいっ、会長さんのおち○ちん、すっごく、いいっ、んぁ、ぁ、ふう、うぅ、んんっ<emoji=heart04>」"
translation = "「음, 음, 음, 음<emoji=heart04> 보지 좋아, 회장님 자지 정말 좋아, 음아, 아, 후우, 으으, 음음<emoji=heart04>」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「精液、たくさんっ……出せそう？\u3000先生のおま○こに、びゅーっ、びゅるびゅるーっ<emoji=heart04>\u3000って、できそう？」"
translation = "「정액, 잔뜩…… 낼 수 있겠어? 선생님 보지에 뷰우, 뷰루뷰루우<emoji=heart04> 하고 할 수 있겠어?」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「いっぱい、い～っぱい出してね<emoji=heart04>\u3000我慢しないで、全部っ<emoji=heart04>」"
translation = "「잔뜩, 자～안뜩 내줘<emoji=heart04> 참지 말고 전부<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "先生の喘ぎ声に当てられて、どんどん射精する準備が整っていく。俺は歯を食いしばって射精感を遅らせ続けていた。"
translation = "선생님의 신음 소리에 홀려 점점 사정할 준비가 갖춰진다. 나는 어금니를 깨물며 사정감을 계속 늦췄다."

[[dialogue]]
speaker = "unk"
original = "射精を１秒でも遅らせたかった。大好きなエスメラルダ先生の膣に、少しでも長くとどまりたいから。"
translation = "사정을 1초라도 늦추고 싶었다. 사랑하는 에스메랄다 선생님의 질 안에 조금이라도 오래 머물고 싶으니까."

[[dialogue]]
speaker = "unk"
original = "射精をしたくてたまらないのに、ずっと繋がっていたいから我慢したくて、でも昇り詰める精液を留めることもできなくなって──"
translation = "사정하고 싶어 죽겠는데 계속 이어져 있고 싶어서 참고 싶고, 하지만 치밀어 오르는 정액을 가둘 수도 없게 되어──"

[[dialogue]]
speaker = "エスメラルダ"
original = "「あっ<emoji=heart04>\u3000ビクビクして、出そうなのね<emoji=heart04>\u3000いいわよ、このまま<emoji=heart04>\u3000このまま射精して<emoji=heart04>\u3000先生の中に、中に出して<emoji=heart04>\u3000外じゃなくて、中に出してっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 움찔움찔하면서 나올 것 같구나<emoji=heart04> 좋아, 이대로<emoji=heart04> 이대로 사정해 줘<emoji=heart04> 선생님 안에, 안에 내줘<emoji=heart04> 밖이 아니라 안에 내줘<emoji=heart04>」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「んんあっ──ぁっ──ぁっぁっ──私も、イク、イク、あっあっ<emoji=heart04>\u3000んん、んぅっ、今っ、出されたら、絶対──<emoji=heart04>」"
translation = "「음음아──아──아아──나도 가, 가, 아아<emoji=heart04> 음, 음윽, 지금 싸 버리면 절대──<emoji=heart04>」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「ぁっあっあっあっあっ<emoji=heart04>\u3000イク、イク、イクイクイクイクッ──イク──ッ<emoji=heart04>」"
translation = "「아아아아아<emoji=heart04> 가, 가, 가가가가── 가버려──!<emoji=heart04>」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「んぁあぁあっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あぁあっ<emoji=heart04>\u3000出てる、ぅ──んん、んんうっ、ぁあああぁぁ～っ<emoji=heart04>」"
translation = "「음아아아아<emoji=heart04> 앗<emoji=heart04> 아아아<emoji=heart04> 나오고 있어, 으──음음, 음음윽, 아아아아아아～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "先生のお腹の、もっとも深いところで弾けるような射精が始まる。"
translation = "선생님 배의 가장 깊은 곳에서 터질 듯한 사정이 시작된다."

[[dialogue]]
speaker = "unk"
original = "安全日を正確に計算してくれている先生に感謝しながら、中出しの心地よさに全身を浸らせる。"
translation = "가임기를 정확히 계산해 준 선생님에게 감사하며 질내사정의 쾌감에 온몸을 담근다."

[[dialogue]]
speaker = "エスメラルダ"
original = "「んんぁっ<emoji=heart04>\u3000ぁっ<emoji=heart04>\u3000すごっ<emoji=heart04>\u3000勢い、すごいっ<emoji=heart04>\u3000ぁ、ぁ、ぁっああっ<emoji=heart04>\u3000あふれ、る、ぅ、うぅぅ～っ<emoji=heart04>」"
translation = "「음음아<emoji=heart04> 아<emoji=heart04> 대단해<emoji=heart04> 기세 대단해<emoji=heart04> 아, 아, 아아아<emoji=heart04> 넘쳐, 흘러, 으으으으～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "根元までしっかりと挿入して射精しているのに、精液が結合部からどぷどぷあふれ出てくる。"
translation = "뿌리까지 확실히 삽입해서 사정하고 있는데도 정액이 결합부에서 주르륵 흘러넘친다."

[[dialogue]]
speaker = "エスメラルダ"
original = "「ひっ<emoji=heart04>\u3000ぁっ、ふ<emoji=heart04>\u3000すごい、のねっ……まだ、ん、ぅ、ぁっ……精液、出てる、ぅっ……<emoji=heart04>」"
translation = "「히<emoji=heart04> 아, 후<emoji=heart04> 대단하네…… 아직, 음, 으, 아…… 정액 나오고 있어……<emoji=heart04>」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「ん……んんっ……<emoji=heart04>\u3000そう……全部出してね……ん、んんっ……<emoji=heart04>」"
translation = "「음…… 음음……<emoji=heart04> 그래…… 전부 내줘…… 음, 음음……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "精液を膣内に飛ばすたび、先生がびくんびくんと体を震わせてくれるのが、嬉しくってたまらない。"
translation = "정액을 질 내에 뿜을 때마다 선생님이 파르르 몸을 떨어 주는 것이 기뻐서 견딜 수 없다."

[[dialogue]]
speaker = "unk"
original = "射精の大きな波はすでに去った後も、俺は何度も何度もペニスに力を込め、１滴でも多くの子種を絞り出して──"
translation = "사정의 큰 파도가 이미 지나간 후에도 나는 몇 번이고 페니스에 힘을 주어 한 방울이라도 더 많은 씨앗을 짜내고──"

[[dialogue]]
speaker = "エスメラルダ"
original = "「はぁ、ぁ、あぁあっ……ん、んんぅ……<emoji=heart04>\u3000おち○ちん、ようやく止まった、わねー……<emoji=heart04>」"
translation = "「하아, 아, 아아아…… 음, 음음으……<emoji=heart04> 자지, 겨우 멈췄네……<emoji=heart04>」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「ビクビク震えて、どぴゅどぴゅどぴゅ～……って、長い射精……素敵だったわよ、会長さん……<emoji=heart04>」"
translation = "「움찔움찔 떨면서 뷰르르 뷰르르…… 하고 긴 사정…… 멋졌어, 회장님……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「俺の方こそ……先生、ありがとうございました……」"
translation = "「저야말로…… 선생님, 감사했습니다……」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「ふふ<emoji=heart04>\u3000満足してもらえたのなら、良かったわ……はぁ、ふぅっ……はぁああっ……ふぅぅっ……<emoji=heart04>」"
translation = "「후후<emoji=heart04> 만족했다면 다행이야…… 하아, 후우…… 하아아아…… 후우우……<emoji=heart04>」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「エッチが終わったら、お勉強の続きをする約束だったけれど……明日にしましょうか」"
translation = "「섹스가 끝나면 공부 계속하기로 약속했지만…… 내일로 미룰까?」"

[[dialogue]]
speaker = "unk"
original = "教室での秘密のエッチで気を張っていたからか、全身が虚脱感で包まれている。先生もきっとそうだろう。"
translation = "교실에서의 비밀 섹스로 긴장했던 탓인지 온몸이 허탈감에 휩싸여 있다. 선생님도 분명 그럴 것이다."

[[dialogue]]
speaker = "エスメラルダ"
original = "「呼吸が、整うまで……繋がっていましょうか……<emoji=heart04>」"
translation = "「호흡이 가라앉을 때까지…… 이어져 있을까……<emoji=heart04>」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「いっぱいキスして……まったり、しましょ……？」"
translation = "「잔뜩 키스하고…… 느긋하게 있자……?」"

[[dialogue]]
speaker = "unk"
original = "そうして俺たちは最終下校のチャイムが鳴る限界ぎりぎりまで、繋がったままピロートークを続けるのだった──"
translation = "그렇게 우리는 최종 하교 벨이 울리기 직전까지 이어진 채로 피로 토크를 계속했다──"

