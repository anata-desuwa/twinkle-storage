[[dialogue]]
speaker = "unk"
original = "第２話,意外と尽くすタイプなんだから♪,P"
translation = "제2화, 의외로 헌신적인 타입이라니까♪, P"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「いらっしゃいませ～。ただいま割り引きセール中よ～」"
translation = "「어서 오세요~. 지금 할인 세일 중이야~」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「もちろん私のスマイルは割引不可だけど♪\u3000ウインク１つ１００万テルスで請け負ってあげるわ～♪」"
translation = "「물론 내 스마일은 할인 불가지만♪ 윙크 한 번에 100만 텔루스로 맡아줄게~♪」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「じゃんじゃん買って、じゃんじゃん在庫放出させてね～。売り物がなくなっちゃえば購買部も閉められるから～」"
translation = "「팍팍 사고, 팍팍 재고 방출시켜 줘~. 팔 물건이 없어지면 매점도 닫을 수 있으니까~」"

[[dialogue]]
speaker = "unk"
original = "パルミエが働いてる！？"
translation = "팔미에가 일하고 있어!?"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「なによ、ダーリン。まるで天地がひっくり返ったような顔しちゃって。そこはお仕事を頑張ってる妻を労うところじゃない」"
translation = "「뭐야 달링. 마치 천지가 개벽한 것 같은 얼굴을 하고서는. 거기선 일을 열심히 하는 아내를 위로해 줘야 하는 거 아냐」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「でもわざわざ会いに来てくれるなんて嬉しいわ♪\u3000ダーリンったら本当に私のことが大好きなのね♪」"
translation = "「그래도 일부러 만나러 와주다니 기뻐♪ 달링은 정말 나를 너무 좋아하는구나♪」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「特別にただでウインクしてあげちゃう♪\u3000この間の特別試験でもお世話になっちゃったし♪」"
translation = "「특별히 공짜로 윙크해 줄게♪ 지난번 특별 시험 때 신세도 졌으니까♪」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「シフォンとモナカもあれから毎日張り切っちゃって。プリマステラになれたことが本当に嬉しかったみたいなの」"
translation = "「시퐁이랑 모나카도 그날 이후로 매일 기운이 넘쳐서. 프리마스텔라가 된 게 정말 기뻤나 봐」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「私までプリマステラにされちゃったのは予想外だったけど、ああして２人に喜んでもらえたのなら結果オーライかしら」"
translation = "「나까지 프리마스텔라가 된 건 예상 밖이었지만, 그렇게 둘이 기뻐해 줬다면 결과적으로는 좋은 걸까」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「自信がついたのか、２人とも前より明るくなってくれたし♪\u3000やっぱりあの子たちには笑顔が似合うわ♪」"
translation = "「자신감이 생겼는지 둘 다 전보다 밝아졌고♪ 역시 그 아이들에겐 미소가 어울려♪」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「あ、シフォンとモナカをモンスター退治に連れて行く時はくれぐれもお願いね？\u3000新米なんだからあんまり強いモンスターとは戦わせてあげないでよ？」"
translation = "「아, 시퐁이랑 모나카를 몬스터 퇴치에 데려갈 때는 꼭 부탁해? 신참이니까 너무 강한 몬스터랑은 싸우게 하지 말아줘?」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「っと、雑談はほどほどにしてお仕事しないと。レジが混んできちゃったわ」"
translation = "「그럼 잡담은 이 정도로 하고 일해야지. 계산대가 붐비기 시작했어」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「品出しの方は頼んだわよ、ダーリン。足りなさそうな品物、裏から適当に出しておいて～」"
translation = "「물건 진열 쪽은 부탁해, 달링. 부족해 보이는 물건 뒤에서 적당히 꺼내 놔줘~」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「あ、コラ。逃げないの。妻だけに働かせる旦那なんて世間様からダメ夫だと思われちゃうわよ～？」"
translation = "「아, 이봐. 도망가지 마. 아내에게만 일시키는 남편이라니 세상 사람들이 못난 남편이라고 생각할 거야~?」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ふぅ、ようやく客足も落ち着いてきたわね」"
translation = "「후우, 겨우 손님 발길이 잦아들었네」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「購買部がこんなにも忙しいなんて知らなかったわ。まぁ可愛い私が店番をしてるから人が集まってきちゃったのかもだけど♪」"
translation = "「매점이 이렇게 바쁠 줄은 몰랐어. 뭐, 귀여운 내가 가게를 보고 있으니까 사람들이 몰려든 걸지도 모르지만♪」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「でもでも、こうして２人で店番をしていると夫婦でお店を始めたような気分になっちゃうわね？\u3000バックヤードでキスでもしちゃう？」"
translation = "「하지만 하지만, 이렇게 둘이서 가게를 보고 있으니 부부가 가게를 시작한 기분이 드네? 뒷방에서 키스라도 할까?」"

[[dialogue]]
speaker = "unk"
original = "また何かやらかしたのか？"
translation = "또 뭔가 저지른 건가?"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「んもう相変わらずいけずなんだから。というか違うわよ。罰代わりに店番させられてるわけじゃないってば」"
translation = "「정말 여전히 야박하다니까. 그게 아니라니까. 벌 대신 가게를 보는 게 아니래도」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「単純におなか部へ相談が来たの。アニマちゃんから１日店番を代わって欲しいって話が」"
translation = "「단순히 오나카부에 상담이 들어왔어. 아니마 짱한테서 하루만 매점 좀 대신 봐달라는 이야기가」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「なんでも研究がすっごくすっごく忙しくて手が離せないらしいわ。だから私が代わってあげたってわけ」"
translation = "「뭐라더라, 연구가 엄~청나게 바빠서 손을 뗄 수가 없다나 봐. 그래서 내가 대신 해준 거지」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「あ、そうだ。シフォンとモナカにはこのこと黙っててね？\u3000２人はこの相談のこと知らないから」"
translation = "「아, 맞다. 시퐁이랑 모나카한텐 이 일 비밀로 해줘? 둘은 이 상담 건 모르는 일이니까」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「２人とも接客業はあんまり得意じゃないしね～。シフォンは羽根を見られるのが苦手だし、モナカは人見知りだもの」"
translation = "「둘 다 접객업은 별로 소질이 없거든~. 시퐁은 날개를 남에게 보여주는 걸 꺼리고, 모나카는 낯을 가리니까」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「克服しようと努力してるのは知ってるけど、それでもいきなり店に立つのはハードルが高いからね」"
translation = "「극복하려고 노력하는 건 알지만, 그래도 갑자기 가게에 서는 건 허들이 높으니까 말이야」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「それでも頑張って引き受けちゃうのがあの子たちだから。こういう仕事は人見知りしないお姉さんがやっつけちゃおうと思って」"
translation = "「그래도 꿋꿋이 맡아버리는 게 그 아이들이라서. 이런 일은 낯 안 가리는 언니가 해치워 버리려고 생각했지」"

[[dialogue]]
speaker = "unk"
original = "あの面倒くさがり屋のパルミエが？"
translation = "그 귀찮아하는 팔미에가?"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「あらあら。私にだって面倒くさいことと面倒くさくないことはあるわよ～」"
translation = "「어머어머. 나라고 귀찮은 일과 안 귀찮은 일이 있다니까~」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「私にとってモナカとシフォンは大切な大切な親友だもの。大好きな人たちのために何かすることを決して面倒だなんて思わないわ」"
translation = "「나한테 모나카와 시퐁은 소중하고 소중한 절친인걸. 좋아하는 사람들을 위해 무언가 하는 걸 결코 귀찮다고 생각하지 않아」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ま、もちろん二人が接客業もこなせるようになった時は任せちゃうけど♪\u3000そこまでいけば面倒くさがっちゃってもいいだろうし♪」"
translation = "「뭐, 물론 둘이 접객업도 해낼 수 있게 됐을 때는 맡겨버리겠지만♪ 그때쯤이면 귀찮아해도 괜찮을 테고♪」"

[[dialogue]]
speaker = "unk"
original = "仲間想いなんだな"
translation = "동료를 아끼는구나"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「別に普通よ～。ただあの２人にはずっと笑顔でいてもらいたいだーけ」"
translation = "「그냥 보통이야~. 다만 그 둘은 계속 웃고 있었으면 좋겠다~는 것뿐」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「家族以上に家族な２人だからね。あの２人の幸せが私の幸せなの。あの２人が幸せなら私は他に何も要らないわ♪」"
translation = "「가족 이상의 가족인 둘이니까. 그 둘의 행복이 나의 행복이야. 그 둘이 행복하다면 난 다른 건 아무것도 필요 없어♪」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ともかく、このことは私とダーリンの秘密ってことでお願いね？\u3000お姉ちゃんぶってるところを知られると恥ずかしいから」"
translation = "「어쨌든 이 일은 나와 달링만의 비밀로 해줘? 언니 노릇 하는 거 들키면 부끄러우니까」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「あ……でもダーリンはしっかり覚えておいてくれていいからね？\u3000こういうギャップに男の子って弱いものだと思うし」"
translation = "「아…… 하지만 달링은 확실히 기억해 줘도 되니까? 이런 갭 차이에 남자는 약한 법이라고 생각하거든」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「今の話を聞いてわかったでしょ？\u3000こう見えて私って尽くす女なの♪\u3000どうどう？\u3000結婚したくなってきたんじゃない？」"
translation = "「방금 이야기 듣고 알았지? 이래 보여도 난 헌신적인 여자야♪ 어때어때? 결혼하고 싶어졌지?」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「もし結婚してくれるなら、ダーリンにも尽くしてあげるわよ～？\u3000あ～んなことや、こ～んなことまでしてあげるから♪」"
translation = "「만약 결혼해 준다면 달링에게도 헌신해 줄게~? 저~런 일이나 이~런 일까지 해줄 테니까♪」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「……あら、大きなため息なんか吐いちゃって。ふざけてるわけじゃないわよ？\u3000本気よ、本気♪」"
translation = "「……어라, 커다란 한숨이나 내쉬고. 장난치는 거 아니라니까? 진심이야, 진심♪」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「誰だって好きな相手には手間なんか惜しまないものじゃない？\u3000言ってしまえば尽くすのなんて当たり前なのよ」"
translation = "「누구든 좋아하는 상대에겐 수고를 아끼지 않는 법이잖아? 말하자면 헌신하는 건 당연한 거야」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「だってそれが愛なんだから。もしその人のために何かをすることを面倒臭がるのなら、それは本気の愛じゃないの」"
translation = "「왜냐면 그게 사랑이니까. 만약 그 사람을 위해 무언가 하는 걸 귀찮아한다면, 그건 진심 어린 사랑이 아니야」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「私はね？\u3000シフォンとモナカのためならもちろん、ダーリンのためにだって、どんなことも面倒だとは思わないわ」"
translation = "「나는 말이야? 시퐁과 모나카를 위해서라면 물론이고, 달링을 위해서라면 어떤 일도 귀찮다고 생각하지 않아」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「そして、いつかダーリンも同じように思ってほしいって願ってる」"
translation = "「그리고 언젠가 달링도 똑같이 생각해주길 바라고 있어」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「って、勝手すぎる願いかしら？\u3000ダーリンはそこまで私のこと好きじゃないわよね？\u3000私のために何かするのはやっぱり面倒くさい……わよね？」"
translation = "「라니, 너무 제멋대로인 소원일까? 달링은 그 정도로 날 좋아하지 않지? 날 위해 무언가 하는 건 역시 귀찮……겠지?」"

[[dialogue]]
speaker = "unk"
original = "そんなことは……"
translation = "그렇지는……"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ない、の？\u3000ふふ、そうなのね。嬉しいわ、本当に嬉しい……」"
translation = "「않은, 거야? 후후, 그렇구나. 기뻐, 정말 기뻐……」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「なら──後のことは任せたわよダーリン♪\u3000私に代わって購買部のお手伝いをお願いねっ♪」"
translation = "「그럼── 뒷일은 맡길게 달링♪ 나 대신 매점 일 좀 도와줘♪」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「朝から働きづめで体力の限界だったのよ～。ようやくあがれるわ～。部室に戻ってゴロゴロしよ～っと！」"
translation = "「아침부터 계속 일하느라 체력이 한계였거든~. 이제야 퇴근하네~. 부실로 돌아가서 뒹굴거려야지~!」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「あ、くれぐれもシフォンとモナカには秘密にしておいてね♪\u3000誰かに仕事を押しつけたなんて知られたら叱られちゃうから♪」"
translation = "「아, 절대로 시퐁이랑 모나카한텐 비밀이다♪ 누구한테 일 떠넘겼다는 거 알면 혼나니까♪」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「それじゃダーリン、また今度ね～！」"
translation = "「그럼 달링, 다음에 봐~!」"

