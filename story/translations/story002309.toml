[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「はぁ……すっかり騙されちゃったな」"
translation = "「하아…… 완전히 속아 버렸네」"

[[dialogue]]
speaker = "unk"
original = "コハルコは結界に囚われながら、秋葉原を観ていた。その精神は結界と同化しつつあり、一方的に情報が流れ込んでくる。"
translation = "코하루코는 결계에 갇힌 채 아키하바라를 보고 있었다. 그 정신은 결계와 동화되어 가고 있었으며, 일방적으로 정보가 흘러 들어온다."

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「このままだと、秋葉原が秋葉原じゃなくなっちゃう。会長さんたちが頑張ってくれてるけど、私だって秋葉原を守らないと」"
translation = "「이대로라면 아키하바라가 아키하바라가 아니게 돼 버려. 회장님들이 노력해 주고 있지만, 나라도 아키하바라를 지켜야지」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「星力は結界に吸収されて使えない。でも魔力を暴走させるくらいはできるはず……！」"
translation = "「성력은 결계에 흡수되어 쓸 수 없어. 하지만 마력을 폭주시키는 정도는 할 수 있을 거야……!」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「加減なしでやったら体がどうなるかわからないけど、まぁその時はその時で」"
translation = "「조절하지 않고 하면 몸이 어떻게 될지 모르겠지만, 뭐 그때는 그때지」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「……お父さん、もう騙されないでね。次は助けてあげられないから……騙されやすいのはお父さん譲りなのかな？\u3000なんてね」"
translation = "「……아빠, 다신 속지 마. 다음엔 못 도와주니까…… 잘 속는 건 아빠를 닮은 걸까? 농담이야」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「お母さんはくれぐれも体を大切にして。お母さんのシチュー、大好きだったよ」"
translation = "「엄마는 부디 몸조리 잘해. 엄마가 만든 스튜, 정말 좋아했어」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「ナツコ、トウコ。バカなお姉ちゃんでごめん。ふたりとも仲良くね……」"
translation = "「나츠코, 토우코. 바보 같은 언니라서 미안해. 둘이 사이좋게 지내야 해……」"

[[dialogue]]
speaker = "？？？"
original = "（…………さい）"
translation = "(…………세요)"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「え、誰かの声？」"
translation = "「어, 누군가의 목소리?」"

[[dialogue]]
speaker = "？？？"
original = "「フライドチキンください。私は今、あなたの心に直接話しかけています」"
translation = "「프라이드 치킨 주세요. 저는 지금 당신의 마음속에 직접 말을 걸고 있습니다」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「この人、私の心に直接！？\u3000え、誰、誰なの！？」"
translation = "「이 사람, 내 마음속에 직접!? 에, 누구, 누구야!?」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「申し遅れました。私、第７代光の魔女トリュファイナと申します」"
translation = "「인사가 늦었군요. 저, 제7대 빛의 마녀 트류파이나라고 합니다」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「現代では通信魔法の際はこれが作法だと伺ったのですが、どうやら違っていたようですね。たいへん失礼いたしました」"
translation = "「현대에서는 통신 마법을 쓸 때 이것이 예절이라고 들었습니다만, 아무래도 틀렸던 모양이네요. 대단히 실례했습니다」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「悪いインターネッツに毒されてる！\u3000……え、今、光の魔女って……？」"
translation = "「나쁜 인터넷에 오염됐어! ……에, 지금 빛의 마녀라고……?」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「はいっ！\u3000私、光の魔女ですっ！\u3000……とはいえ、死後、世界樹に残された残留思念なのですが」"
translation = "「네! 저, 빛의 마녀예요! ……라고는 해도, 사후 세계수 안에 남겨진 잔류 사념입니다만」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「コハルコ様は以前、世界樹を通じて魔界と通信なさったことがありましたよね？\u3000あの時からあなた様を傍から見守っておりました」"
translation = "「코하루코 님은 이전에 세계수를 통해 마계와 통신하신 적이 있었지요? 그때부터 당신을 곁에서 지켜보고 있었습니다」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「トリュファイナ様……。光の魔女としては、あなたが私のオリジナル……なんですよね？」"
translation = "「트류파이나 님……. 빛의 마녀로서는 당신이 나의 오리지널……인 거죠?」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「ええ……確かに、そうかもしれません。ですが、そのような大層なものではありません。コハルコ様、あなたはあなたなのです。誰かの偽物ではないのです」"
translation = "「네…… 분명 그럴지도 모릅니다. 하지만 그렇게 대단한 것이 아니랍니다. 코하루코 님, 당신은 당신이에요. 누군가의 가짜가 아니랍니다」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「私たちは同じ力を持つ者同士。せっかくですから、もっと仲良くいたしましょう？」"
translation = "「우리는 같은 힘을 가진 동지. 기왕 이렇게 된 거 좀 더 사이좋게 지내볼까요?」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「私をお姉ちゃんだと思って、なんでも相談してください。あなたが妹様にそうしていたように、私もあなたを受け止めます」"
translation = "「저를 언니라고 생각하고 뭐든 상담해 주세요. 당신이 동생들에게 그랬던 것처럼, 저도 당신을 받아줄게요」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「トリュファイナ……さん」"
translation = "「트류파이나…… 씨」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「昔話をいたしましょう」"
translation = "「옛날이야기를 하도록 하죠」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「かつて、世界を救った英雄がおりました。彼は世界を救うため、仲間を率いて厄災と戦いました。戦いに勝利こそしましたが、厄災は彼の心身を蝕んでいました」"
translation = "「과거에 세계를 구한 영웅이 있었습니다. 그는 세계를 구하기 위해 동료들을 이끌고 재액과 싸웠지요. 승리는 거두었지만, 재액은 그의 심신을 갉아먹고 있었습니다」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「英雄には特別な力がありました。その力を残すため、彼は自らの生涯を閉じることを選んだのです」"
translation = "「영웅에게는 특별한 힘이 있었습니다. 그 힘을 남기기 위해 그는 스스로 생을 마감하는 길을 택했습니다」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「美しい自己犠牲だと、思われますか？」"
translation = "「아름다운 자기희생이라고 생각하시나요?」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「……私はそうは思いません」"
translation = "「……저는 그렇게 생각하지 않아요」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「もちろん、力が及ばないときもあるでしょう。他に手段がないときもあるでしょう。けれど、けれど……」"
translation = "「물론 힘이 닿지 않을 때도 있겠지요. 다른 수단이 없을 때도 있을 거예요. 하지만, 하지만……」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「自己犠牲が最後の手段なんて、寂しいではありませんか」"
translation = "「자기희생이 마지막 수단이라니, 너무 쓸쓸하지 않나요?」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「コハルコ様。私はよく知っております。あなたはたくさんの人を助けてきました。星騎士として、オペレーターとして、あるいはハッカーとして」"
translation = "「코하루코 님. 저는 잘 알고 있답니다. 당신은 많은 사람을 도와왔어요. 성기사로서, 오퍼레이터로서, 혹은 해커로서」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「でも、それと同じくらい、いえ、それ以上にあなたを助けたいと思っている人もいるのです」"
translation = "「하지만 그만큼, 아니, 그 이상으로 당신을 돕고 싶어 하는 사람도 있답니다」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「それは、苦しめられる人々を捨て置けない正義と、誰かを大切に思う愛をあなたが持っているから」"
translation = "「그건 고통받는 사람들을 그냥 지나치지 못하는 정의와 누군가를 소중히 여기는 사랑을 당신이 가지고 있기 때문이에요」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「困ったことや大変なことがあったら、泣いて喚いてでも、助けを求めてください。きっと誰かが助けてくれるはずです」"
translation = "「곤란한 일이나 힘든 일이 있다면 울고 불고 해서라도 도움을 요청하세요. 분명 누군가가 도와줄 거예요」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「どうか独りで絶望しないで──あなたの中の光を、そして傍にある光を信じてあげてください」"
translation = "「부디 혼자서 절망하지 마세요── 당신 안의 빛을, 그리고 곁에 있는 빛을 믿어 주세요」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「……じゃあ、望みを言っても、いいですか？」"
translation = "「……그럼, 소원을 말해도 될까요?」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「はい、もちろん」"
translation = "「네, 물론이죠」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「お父さんと一緒にパソコン組みたい、お母さんの作ったシチューが食べたい、ナツコとトウコに服もおもちゃも買ってあげたい……ずっとずっと、家族みんなで一緒にいたい！」"
translation = "「아빠랑 같이 컴퓨터 조립하고 싶고, 엄마가 만든 스튜를 먹고 싶고, 나츠코랑 토우코한테 옷이랑 장난감도 사주고 싶어…… 계속 계속, 가족 모두와 함께 있고 싶어!」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「よく考えたら買ったゲームも積んだままだし、死んでるヒマなんかない！」"
translation = "「생각해 보니까 산 게임도 쌓여 있고, 죽어 있을 틈 같은 거 없어!」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「私は、まだまだ、生きていたい！」"
translation = "「나는, 아직, 살고 싶어!」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「ふふっ、よく言えました。私から贈り物を……」"
translation = "「후훗, 잘 말했어요. 제가 선물을……」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「これは……？」"
translation = "「이건……?」"

[[dialogue]]
speaker = "unk"
original = "トリュファイナが袖から出した光の玉。ずっしりと重く、暖かいようで、どこか恐ろしい。"
translation = "트류파이나가 소매에서 꺼낸 빛의 구슬. 묵직하고 따뜻하면서도 어딘가 두렵다."

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「禁じられた光の魔法です。とても危険なものですが、あなたならきっと、正しく使うことができるでしょう」"
translation = "「금지된 빛의 마법입니다. 매우 위험한 것이지만 당신이라면 분명 바르게 사용할 수 있겠지요」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「お迎えがいらっしゃったようですね」"
translation = "「마중이 온 모양이네요」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「トリュファイナさん。また、会えますか？」"
translation = "「트류파이나 씨. 다시 만날 수 있을까요?」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「ええ、きっと。さぁ、新たな光の魔女の目覚めの時ですっ！」"
translation = "「네, 분명히요. 자, 새로운 빛의 마녀가 눈뜰 시간입니다!」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「はい、行ってきます！」"
translation = "「네, 다녀올게요!」"

[[dialogue]]
speaker_original = "イザベラ"
speaker_translation = "이자벨라"
original = "『結界が……破られた……？\u3000レイラの仕業……ね……』"
translation = "『결계가…… 깨졌어……? 레이라의 짓……이구나……』"

[[dialogue]]
speaker_original = "イザベラ"
speaker_translation = "이자벨라"
original = "『────っ！？\u3000この魔力はっ！』"
translation = "『────윽!? 이 마력은!』"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「この命は紛い物なのかもしれない。でも、この心は本物だから」"
translation = "「이 목숨은 가짜일지도 몰라. 하지만 이 마음은 진짜니까」"

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「私は朝比奈コハルコ。朝比奈家の長女で、ナツコとトウコのお姉ちゃん！\u3000すみませんが、家族が待ってるので、家に帰らせてもらいます！」"
translation = "「나는 아사히나 코하루코. 아사히나 가문의 장녀이자 나츠코와 토우코의 언니! 미안하지만 가족이 기다리고 있어서 집에 가야겠어!」"

