[[dialogue]]
speaker = "セーラ"
original = "「よし──お客さんや従業員さんたちの避難完了！\u3000これでお店の中にはうちらだけだね」"
translation = "「좋아── 손님들이랑 종업원분들 피난 완료! 이걸로 가게 안에는 우리뿐이네.」"

[[dialogue]]
speaker = "ユウリ"
original = "「店の周りは警備の人が固めてくれるってよ。例のモンスターが出てきたらすぐに知らせてくれるみてえだ」"
translation = "「가게 주변은 경비원들이 굳히고 있대. 그 몬스터가 나오면 바로 알려주기로 했어.」"

[[dialogue]]
speaker = "セーラ"
original = "「うちらは店内の調査に専念できるってわけだね。早速取りかかろっか」"
translation = "「우리는 점내 조사에 전념할 수 있겠네. 바로 시작해 볼까?」"

[[dialogue]]
speaker = "ユーリス"
original = "「あ、あの……」"
translation = "「저, 저기……」"

[[dialogue]]
speaker = "セーラ"
original = "「ん？\u3000どったの、王子？」"
translation = "「응? 왜 그래, 왕자님?」"

[[dialogue]]
speaker = "ユーリス"
original = "「何も尋ねないのですか……？\u3000私が、その、性別を偽っていたことについて……」"
translation = "「아무것도 묻지 않는 건가요……? 제가, 그, 성별을 속이고 있었던 것에 대해서……」"

[[dialogue]]
speaker = "ユウリ"
original = "「あぁ？\u3000聞いて欲しいのかよ？\u3000理由があるから隠してんだろうに、わざわざ掘り返すほどヤボじゃねえ」"
translation = "「아앙? 들어주길 바라는 거냐? 이유가 있으니까 숨겼을 텐데, 굳이 들춰낼 만큼 야박하지 않다고.」"

[[dialogue]]
speaker = "セーラ"
original = "「あはは、ごめんね、王子。うちの親方、昔かたぎの不器用なお人でして」"
translation = "「아하하, 미안해, 왕자님. 우리 대장님이 옛날 스타일이라 서툰 구석이 있어서.」"

[[dialogue]]
speaker = "ユウリ"
original = "「いやなんでねじり鉢巻き渡してくるんすか！？\u3000似合わねえでしょ、バニーガールに！」"
translation = "「아니, 왜 머리띠를 건네주는 거임!? 안 어울리잖아, 바니걸에!」"

[[dialogue]]
speaker = "ユーリス"
original = "「おふたりとも怒っていないんですか……？\u3000私はずっとおふたりのことを騙していたんですよ……？」"
translation = "「두 분 다 화나지 않으신 건가요……? 저는 계속 두 분을 속이고 있었던 건데……?」"

[[dialogue]]
speaker = "セーラ"
original = "「いや怒るようなことされてないじゃん？\u3000ぶっちゃけうち、もしかして女の子かなーって思ってたし。逆に納得いった的な？」"
translation = "「아니, 화낼 만한 짓을 한 건 아니잖아? 솔직히 나, 혹시 여자애일까나~ 하고 생각했었고. 오히려 납득이 갔달까?」"

[[dialogue]]
speaker = "ユーリス"
original = "「それはそれで問題なのですが。いったい私のどこに女性だと勘づかれるような要素が……」"
translation = "「그건 그것대로 문제입니다만. 도대체 제 어디에 여성이라고 눈치챌 만한 요소가……」"

[[dialogue]]
speaker = "ユウリ"
original = "「いや色々あんだろ、自覚ねえのかよ。振り返ってみろよ、あたしにエロ王子扱いされるハメになった行動の数々をよ」"
translation = "「아니, 여러 가지 있잖아, 자각 없는 거냐. 돌아보라구, 나한테 변태 왕자 취급받게 된 수많은 행동들을 말이야.」"

[[dialogue]]
speaker = "ユーリス"
original = "「うぐ……言われてみたら確かに……」"
translation = "「우으…… 듣고 보니 확실히……」"

[[dialogue]]
speaker = "セーラ"
original = "「ま、とにかくなんか深い事情的なサムシングがあるんしょ？\u3000誰にもゆわんから安心しとき～」"
translation = "「뭐, 아무튼 뭔가 깊은 사정 같은 썸싱이 있는 거지? 아무한테도 말 안 할 테니까 안심해~」"

[[dialogue]]
speaker = "ユウリ"
original = "「エロ王子、エロ王子連呼してた自分がアホみたいだぜ。最初から女だって知ってたら、こっそりトイレだろうが更衣室だろうが連れてってやったのによ」"
translation = "「변태 왕자, 변태 왕자라고 연발하던 내가 바보 같아지네. 처음부터 여자라는 걸 알았으면, 슬쩍 화장실이든 탈의실이든 데려가 줬을 텐데.」"

[[dialogue]]
speaker = "ユウリ"
original = "「あたしもエロ王子っつって悪かったよ。まさか女だとは思わなくてな」"
translation = "「나도 변태 왕자라고 해서 미안했다. 설마 여자일 줄은 몰라서 말이야.」"

[[dialogue]]
speaker = "ユーリス"
original = "「ユウリさん……」"
translation = "「유우리 씨……」"

[[dialogue]]
speaker = "unk"
original = "こういう人たちなんだよ"
translation = "이런 사람들이야"

[[dialogue]]
speaker = "ユーリス"
original = "「うん……よくわかったよ。この人たちに隠し事をしていた自分が恥ずかしい」"
translation = "「응…… 잘 알았어. 이분들에게 숨기고 있었던 자신이 부끄러워.」"

[[dialogue]]
speaker = "ユーリス"
original = "「セーラさん、ユウリさん、どうか私に事情を話させてもらえないかな。私が何故、性別を偽って生活しているのかを──」"
translation = "「세라 씨, 유우리 씨, 부디 나에게 사정을 이야기하게 해주지 않을래. 내가 왜 성별을 속이고 생활하고 있는지──」"

[[dialogue]]
speaker = "セーラ"
original = "「──なるほどなるほど。代々男性に継承されていたはずの聖剣が今回に限って女性のユーリスくん、もといユリアーナちゃんを選んじゃった、と」"
translation = "「──과연 과연. 대대로 남성에게 계승되던 성검이 이번에만 여성인 유리스 군, 아니 유리아나 짱을 선택해 버렸구나.」"

[[dialogue]]
speaker = "ユウリ"
original = "「んで国民の混乱を避けるために王女から王子に、か。なんか釈然としねえな。あんたはそれでいいのかよ？」"
translation = "「그래서 국민들의 혼란을 피하기 위해 공주에서 왕자로, 인가. 뭔가 석연치 않은데. 너는 그걸로 괜찮은 거냐?」"

[[dialogue]]
speaker = "ユーリス"
original = "「もちろんだよ。私は聖剣に選ばれたあの日、男として生きることを誓ったんだ」"
translation = "「물론이야. 나는 성검에게 선택받은 그날, 남자로 살기로 맹세했어.」"

[[dialogue]]
speaker = "ユーリス"
original = "「リクリエで傷ついた祖国を、祖国のみんなを少しでも救うために。私は、祖国と祖国のみんなが大好きだから」"
translation = "「리크리에로 상처 입은 조국을, 조국 모두를 조금이라도 구하기 위해서. 나는 조국과 조국 모두를 정말 좋아하니까.」"

[[dialogue]]
speaker = "ユウリ"
original = "「祖国のみんなが大好き、か。嫌々やらされてるわけじゃねえんだな。大したタマじゃねえか」"
translation = "「조국 모두를 정말 좋아한다, 인가. 억지로 하는 건 아니라는 거군. 제법 배짱 있잖아.」"

[[dialogue]]
speaker = "ユウリ"
original = "「中々できることじゃねえよ。見直したぜ」"
translation = "「어지간해서는 할 수 없는 일이야. 다시 봤다구.」"

[[dialogue]]
speaker = "セーラ"
original = "「ジルラント王国ってゆえば、リクリエで壊滅的な打撃を受けちゃったって話だもんね。……大丈夫？\u3000なんかうちらにできることない？」"
translation = "「질란트 왕국이라고 하면, 리크리에로 괴멸적인 타격을 입었다는 얘기였지. ……괜찮아? 뭔가 우리가 도울 일 없을까?」"

[[dialogue]]
speaker = "ユーリス"
original = "「ふふ、ありがとう２人とも。でも心配は要らないよ。お陰様で少しずつだけど復興は進んでるから」"
translation = "「후후, 고마워 둘 다. 하지만 걱정은 필요 없어. 덕분에 조금씩이지만 부흥은 진행되고 있으니까.」"

[[dialogue]]
speaker = "ユーリス"
original = "「でも秘密を話しておいてなんだけど……私のことはこれからも男扱いしてくれないかな？」"
translation = "「하지만 비밀을 말해놓고 이런 말 하긴 뭐하지만…… 나를 앞으로도 남자 취급해 주지 않겠어?」"

[[dialogue]]
speaker = "ユーリス"
original = "「万が一にでも祖国のみんなに女だとバレるわけにはいかないんだ。私自身、男として生活しているつもりだしね」"
translation = "「만약에라도 조국 모두에게 여자라는 게 들킬 수는 없거든. 나 자신도 남자로 생활할 생각이고 말이야.」"

[[dialogue]]
speaker = "ユーリス"
original = "「まぁ２人が秘密をバラすとは毛頭思っていないけど──」"
translation = "「뭐, 두 사람이 비밀을 누설할 거라곤 조금도 생각하지 않지만──」"

[[dialogue]]
speaker = "ユウリ"
original = "「無理だな」"
translation = "「무리겠네.」"

[[dialogue]]
speaker = "セーラ"
original = "「無理だね」"
translation = "「무리네.」"

[[dialogue]]
speaker = "ユーリス"
original = "「えっ！？\u3000ど、どうして！？\u3000事情を話す前はあんなに親身になってくれたのに……！」"
translation = "「엣!? 어, 어째서!? 사정을 말하기 전에는 그렇게 친절하게 대해줬으면서……!」"

[[dialogue]]
speaker = "セーラ"
original = "「事情聞いちゃったからじゃん。その様子だと、かーなり窮屈な生活しちゃってるんっしょ？」"
translation = "「사정을 들어버렸으니까 그렇지. 그 모습 보아하니 꽤나 갑갑한 생활을 하고 있는 거지?」"

[[dialogue]]
speaker = "ユウリ"
original = "「あたしらと一緒にいる時くらい女に戻りゃいいじゃねえか。少なくとも男だ、女だ、って気ぃ張る必要はねえよ」"
translation = "「우리랑 같이 있을 때 정도는 여자로 돌아오면 되잖아. 적어도 남자다, 여자다 하며 신경 곤두세울 필요는 없어.」"

[[dialogue]]
speaker = "セーラ"
original = "「そーそ。今もスッキリした顔してるじゃん。口調も会長さんと喋る時みたいに砕けてるし」"
translation = "「그래 그래. 지금도 한결 편해진 얼굴이잖아. 말투도 회장님이랑 얘기할 때처럼 편해졌고.」"

[[dialogue]]
speaker = "ユウリ"
original = "「あんたが男だろうが女だろうがどっちでも構わねえよ。ま、要するに肩の力抜けよって話だ」"
translation = "「네가 남자든 여자든 어느 쪽이든 상관없어. 뭐, 요점은 어깨에 힘 좀 빼라는 소리다.」"

[[dialogue]]
speaker = "ユーリス"
original = "「っっ……ありがとう。どうやら私は会長に続いてかけがえのない友人と巡り会えたみたいだ……」"
translation = "「……고마워. 아무래도 나는 회장에 이어 더할 나위 없는 친구들과 만난 모양이야……」"

[[dialogue]]
speaker = "ユーリス"
original = "「ユーリス・フォン・ジルラントとして。そして、ユリアーナ・フォン・ジルラントとして、君たちに変わらぬ信頼と友情をここに誓うよ」"
translation = "「유리스 폰 질란트로서. 그리고 유리아나 폰 질란트로서, 너희에게 변치 않는 신뢰와 우정을 여기서 맹세할게.」"

[[dialogue]]
speaker = "セーラ"
original = "「堅苦しいな～。そういう時はひと言、これからもヨロ～って言えばいいんだって、ユリアーナちゃん」"
translation = "「딱딱하긴~. 그럴 때는 한마디로, 앞으로도 잘 부탁해~라고 말하면 되는 거라구, 유리아나 짱.」"

[[dialogue]]
speaker = "ユウリ"
original = "「下着やら何やらいろいろ苦労してんだろ？\u3000あたしに言ってくれりゃ持ってってやるぜ、ユリアーナ」"
translation = "「속옷이라던가 여러 가지로 고생하고 있지? 나한테 말해주면 챙겨다 줄게, 유리아나.」"

[[dialogue]]
speaker = "ユーリス"
original = "「あ、あはは、なんだかこそばゆいね。会長以外にユリアーナと呼ばれるのは久しぶりだ」"
translation = "「아, 아하하, 왠지 간지럽네. 회장 이외에 유리아나라고 불리는 건 오랜만이야.」"

[[dialogue]]
speaker = "unk"
original = "良かったね、ユリアーナ"
translation = "잘됐네, 유리아나"

[[dialogue]]
speaker = "ユーリス"
original = "「か、会長は呼ばなくていいからっ。君に本名を呼ばれると、どうも胸がそわそわするというか……！」"
translation = "「회, 회장은 부르지 않아도 되니까! 네가 본명을 부르면 왠지 가슴이 울렁거린다고 할까……!」"

[[dialogue]]
speaker = "セーラ"
original = "「あはは、ユリアーナちゃん顔真っ赤♪」"
translation = "「아하하, 유리아나 짱 얼굴 빨개졌다♪」"

[[dialogue]]
speaker = "ユウリ"
original = "「……一番バレちゃいけないヤツに最初にバレちまったんじゃねえか？」"
translation = "「……가장 들키면 안 되는 녀석한테 제일 먼저 들켜버린 거 아냐?」"

[[dialogue]]
speaker = "unk"
original = "ともかくこれでモンスター探しに集中できそうだ"
translation = "어쨌든 이걸로 몬스터 찾기에 집중할 수 있겠어"

[[dialogue]]
speaker = "セーラ"
original = "「いんや、まだだよ。まだ大切なことが残ってる」"
translation = "「아니, 아직이야. 아직 소중한 일이 남아 있어.」"

[[dialogue]]
speaker = "ユウリ"
original = "「会長さんはあっち行ってろ。こっから先は女同士の通過儀礼みてえなもんだからな」"
translation = "「회장님은 저기 가 있어. 여기서부터는 여자들끼리의 통과의례 같은 거니까.」"

[[dialogue]]
speaker = "ユーリス"
original = "「ええと……？\u3000どうしたの２人とも……？\u3000そんなに手をわきわきさせて……」"
translation = "「저기……? 왜 그래 둘 다……? 그렇게 손을 꼼지락거리면서……」"

[[dialogue]]
speaker = "セーラ"
original = "「ふっふ～、もちろんおっぱいのサイズ確認をするためだよ！」"
translation = "「훗훗~, 물론 가슴 사이즈 확인을 하기 위해서지!」"

[[dialogue]]
speaker = "ユウリ"
original = "「さっき揉んだ感じじゃ男装してるクセにあたしより胸ありそうだったよな！？\u3000生意気すぎっぞ、クソ王子！！」"
translation = "「아까 만져본 느낌으론 남장하고 있는 주제에 나보다 가슴이 있는 것 같았거든!? 너무 건방지다구, 빌어먹을 왕자!!」"

[[dialogue]]
speaker = "ユーリス"
original = "「きゃっ！？\u3000やめっ──どこに手を入れてっ！？\u3000きゃああああああっっ～～！！？」"
translation = "「꺄악!? 그만── 어디에 손을 넣는 거야!? 꺄아아아아아악~~!!?」"

