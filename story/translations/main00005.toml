[[dialogue]]
speaker = "クロト"
original = "「はぁ……っ、はぁ……！\u3000今のは、どうだ……？」"
translation = "「하아……! 하아……! 방금 건, 어때……?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「凄いわ！\u3000とっても素敵ね！」"
translation = "「대단해요! 정말 멋지네요!」"

[[dialogue]]
speaker = "アナ"
original = "「ベリーグッド」"
translation = "「베리 굿.」"

[[dialogue]]
speaker = "サーシャ"
original = "「お姉ちゃん、感激～♪」"
translation = "「언니, 감격이야♪」"

[[dialogue]]
speaker = "マトイ"
original = "「緋宮くん、すごい成長速度！\u3000もう普通の生徒と比べても全然強いよ」"
translation = "「히노미야 군, 엄청난 성장 속도! 이제 보통 학생과 비교해도 훨씬 강해.」"

[[dialogue]]
speaker = "クロト"
original = "「そんなことないって。これもみんなのおかげさ」"
translation = "「그렇지 않아. 이것도 모두 덕분이야.」"

[[dialogue]]
speaker = "unk"
original = "守護天使であるマグダレナさんを相手にした強化トレーニング。"
translation = "수호 천사인 막달레나 씨를 상대로 한 강화 트레이닝."

[[dialogue]]
speaker = "unk"
original = "ようやく仲間とのユニゾンアタックが完成し、今日の目標も無事に達成することが出来た。"
translation = "마침내 동료와의 유니즌 어택이 완성되어, 오늘의 목표도 무사히 달성할 수 있었다."

[[dialogue]]
speaker = "フィオナ"
original = "「おめでとうございます。ふふっ」"
translation = "「축하드립니다. 후훗.」"

[[dialogue]]
speaker = "クロト"
original = "「ありがとう。でもこんなんじゃ、まだまだ修行が足りない……」"
translation = "「고마워. 하지만 이 정도로는, 아직 수련이 부족해……」"

[[dialogue]]
speaker = "クロト"
original = "「マグダレナさん、もう一度お願いします！」"
translation = "「막달레나 씨, 한 번 더 부탁드립니다!」"

[[dialogue]]
speaker = "マグダレナ"
original = "「承知いたしました」"
translation = "「알겠습니다.」"

[[dialogue]]
speaker = "unk"
original = "そういえば、どうしてこんなことになったんだっけ──"
translation = "그러고 보니, 어쩌다 이렇게 된 거였더라──"

[[dialogue]]
speaker = "unk"
original = "星騎士を目指し、新星学園の門を叩いた俺は……"
translation = "성기사를 목표로, 신성 학원의 문을 두드린 나는……"

[[dialogue]]
speaker = "unk"
original = "幾多の試練を乗り越え、仲間と共に世界を救う戦いに身をおいていた。"
translation = "수많은 시련을 극복하고, 동료와 함께 세계를 구하는 싸움에 몸을 던지고 있었다."

[[dialogue]]
speaker = "unk"
original = "星徒会の会長としてリクリエ問題の解決に奮闘する日々。"
translation = "성도회 회장으로서 리크리에 문제 해결에 분투하는 나날."

[[dialogue]]
speaker = "unk"
original = "でもそれはまた、俺の魔王としての運命を紡ぐ物語の始まりでもあった──"
translation = "하지만 그것은 또한, 나의 마왕으로서의 운명을 엮어 나가는 이야기의 시작이기도 했다──"

