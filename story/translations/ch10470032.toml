[[dialogue]]
speaker = "unk"
original = "第２話,魔王さまのしもべごっこ,P"
translation = "제2화, 마왕님의 종 놀이, P"

[[dialogue]]
speaker = "unk"
original = "今日は休日。週に１度の、家デートの日だ。"
translation = "오늘은 휴일. 일주일에 한 번 있는 집 데이트 날이다."

[[dialogue]]
speaker_original = "メルエル（覚醒）"
speaker_translation = "메르엘 (각성)"
original = "「えへへ<emoji=heart04>\u3000この格好になると、会長くんの『眷属』なんだってことが実感できて、ドキドキしてきちゃうよぉ<emoji=heart04>」"
translation = "「에헤헤<emoji=heart04> 이 차림이 되면 회장군의 『권속』이라는 게 실감 나서 두근거려버려어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "どうしてメルエルが俺の家でノヴァフォームになっているのかというと――"
translation = "어째서 멜엘이 우리 집에서 노바 폼을 하고 있느냐 하면――"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「この前、ナターシャちゃんから『会長くんが私の支配者』って言ってもらえたでしょ？」"
translation = "「저번에 나타샤짱이 『회장군이 나의 지배자』라고 말해줬잖아?」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あれ、すっごく嬉しかったんだぁ<emoji=heart04>\u3000他の人から見ても、私って正真正銘、会長くんの眷属──魔王さまのしもべなんだなぁって<emoji=heart04>」"
translation = "「그거 정말 기뻤거든~<emoji=heart04> 다른 사람이 보기에도 나는 명실상부한 회장군의 권속── 마왕님의 종이구나 싶어서<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「でも……会長くんって、私に命令とか、強引なところを見せてくれることって、あんまりないよね？」"
translation = "「하지만…… 회장군은 나한테 명령을 내리거나 강압적인 모습을 보여주는 일이 별로 없지?」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「私としては、会長くんにだったら……たくさん命令してもらったり、強引なところを見せてもらえたら、嬉しいんだけどなぁ<emoji=heart04>」"
translation = "「나로서는 회장군이라면…… 잔뜩 명령해 주거나 강압적인 모습을 보여준다면 기쁠 텐데 말이야아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "――と、数日前にそんな会話があって、今に至る。"
translation = "――라고 며칠 전에 그런 대화가 있어서 지금에 이르렀다."

[[dialogue]]
speaker_original = "メルエル（覚醒）"
speaker_translation = "메르엘 (각성)"
original = "「それじゃあ会長くん……ううん、魔王さまっ<emoji=heart04>\u3000今日はたくさん、メルエルに命令してください<emoji=heart04>」"
translation = "「그러니까 회장군…… 아니, 마왕님<emoji=heart04> 오늘은 잔뜩 멜엘에게 명령해 주세요<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル（覚醒）"
speaker_translation = "메르엘 (각성)"
original = "「──といっても、私にしてほしいことなんて、なかなか思いつかない？」"
translation = "「──라고 해도 나한테 바라는 것 같은 건 좀처럼 안 떠올라?」"

[[dialogue]]
speaker = "unk"
original = "もうだいたい全部やってもらってるんだよな"
translation = "이미 거의 다 해주고 있는걸"

[[dialogue]]
speaker = "unk"
original = "正確に言うと、メルエルにしてほしいこと"
translation = "정확히 말하자면, 멜엘에게 바라는 것"

[[dialogue]]
speaker = "unk"
original = "メルエルはなんと、毎日朝起こしに来てくれて、毎日お弁当の用意をしてくれて、休み時間も膝枕や耳かきをしてくれたりと、日常的に至れり尽くせりのパーフェクト彼女である。"
translation = "멜엘은 놀랍게도 매일 아침 깨우러 와주고, 매일 도시락을 챙겨주며, 쉬는 시간에도 무릎베개나 귀를 파주는 등 일상적으로 정성을 다하는 퍼펙트 여친이다."

[[dialogue]]
speaker = "unk"
original = "しかもこれらを、メルエルは「私がやりたくて、やらせてもらってるの」という立場を崩したことがなく、これ以上欲張りになって命令を出せ、というのは地味な難題だった。"
translation = "게다가 이것들을 멜엘은 「내가 하고 싶어서 하게 해주는 거야」라는 입장을 굽힌 적이 없어서, 이 이상 욕심을 부려 명령을 내리라는 것은 은근히 난제였다."

[[dialogue]]
speaker_original = "メルエル（覚醒）"
speaker_translation = "메르엘 (각성)"
original = "「何でもいいんだよ？\u3000魔王さまの命令だったら、絶対何でも嬉しいから……だから私に命令、してください<emoji=heart04>」"
translation = "「뭐든 괜찮다니까? 마왕님의 명령이라면 분명 뭐든 기쁠 테니까…… 그러니까 나한테 명령해 주세요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "『メルエルの方から、キスしろ』"
translation = "『멜엘 쪽에서 먼저 키스해』"

[[dialogue]]
speaker = "unk"
original = "あっ、１つ思いついた。"
translation = "「앗, 한 가지 떠올랐어.」"

[[dialogue]]
speaker_original = "メルエル（覚醒）"
speaker_translation = "메르엘 (각성)"
original = "「はうぅぅっ<emoji=heart04>\u3000そ、それはぁ……<emoji=heart04>」"
translation = "「하우으으읏<emoji=heart04> 그, 그건……<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル（覚醒）"
speaker_translation = "메르엘 (각성)"
original = "（ちっちゃい姿の私だったら、ぐいぐいって行けちゃうんだろうけど……確かに、この姿で私から会長くんにキスするの、ちょっと恥ずかしいよぉ<emoji=heart04>）"
translation = "(조그만 모습의 나였다면 당당하게 다가갈 수 있었겠지만…… 확실히 이 모습으로 나부터 회장 군에게 키스하는 건 좀 부끄러워<emoji=heart04>)"

[[dialogue]]
speaker_original = "メルエル（覚醒）"
speaker_translation = "메르엘 (각성)"
original = "（でもでも……！\u3000せっかく会長くんが考えてくれた命令、だもんねっ<emoji=heart04>\u3000これは命令<emoji=heart04>\u3000命令だから……<emoji=heart04>）"
translation = "(그래도 그래도……! 어렵게 회장 군이 생각해 준 명령인걸<emoji=heart04> 이건 명령<emoji=heart04> 명령이니까……<emoji=heart04>)"

[[dialogue]]
speaker_original = "メルエル（覚醒）"
speaker_translation = "메르엘 (각성)"
original = "「は、はいぃ、魔王さまぁ<emoji=heart04>\u3000今日は私の方から、キス、させていただきます<emoji=heart04>」"
translation = "「네, 네에, 마왕님<emoji=heart04> 오늘은 제가 먼저 키스, 하겠습니다<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル（覚醒）"
speaker_translation = "메르엘 (각성)"
original = "「んぅ……<emoji=heart04>\u3000ちゅっ<emoji=heart04>」"
translation = "「응으……<emoji=heart04> 츄<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル（覚醒）"
speaker_translation = "메르엘 (각성)"
original = "「はぁあっ<emoji=heart04>\u3000あぁあっ、恥ずかしいっ<emoji=heart04>\u3000恥ずかしいけど……えへへ<emoji=heart04>\u3000なんだか嬉しいなっ<emoji=heart04>」"
translation = "「하아앗<emoji=heart04> 아아앗, 부끄러워<emoji=heart04> 부끄럽지만…… 에헤헤<emoji=heart04> 왠지 기쁘네<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル（覚醒）"
speaker_translation = "메르엘 (각성)"
original = "「え？\u3000──次の命令、思いついた？\u3000う、うんっ<emoji=heart04>\u3000頑張るから、どんどん私に命令してねっ<emoji=heart04>」"
translation = "「에? ──다음 명령, 생각났어? 우, 응<emoji=heart04> 열심히 할 테니까 자꾸자꾸 나한테 명령해 줘<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それから１時間ほど、メルエルに全身を揉み解すマッサージをしてもらった。"
translation = "그 후로 1시간 정도, 메르엘에게 전신을 주물러서 풀어주는 마사지를 받았다."

[[dialogue]]
speaker = "unk"
original = "マッサージ自体もすごく上手で、気持ちよかったのだが……"
translation = "마사지 자체도 굉장히 능숙해서 기분 좋았지만……"

[[dialogue]]
speaker_original = "メルエル（覚醒）"
speaker_translation = "메르엘 (각성)"
original = "「よいしょっ……<emoji=heart04>\u3000はぁっ、んんぅ……<emoji=heart04>\u3000ぐぐぐぅ～……っとぉ<emoji=heart04>」"
translation = "「영차……<emoji=heart04> 하아, 응으……<emoji=heart04> 꾹꾹구우~……으랴아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マッサージの最中、メルエルの体がぴったりとくっついてしまい……彼女の大きな胸が俺の体に当たって、ふにゅふにゅと形を変えている感触が伝わってくる。"
translation = "마사지 도중 메르엘의 몸이 딱 밀착되는 바람에…… 그녀의 커다란 가슴이 내 몸에 닿아 말랑말랑하게 형태를 바꾸는 감촉이 전해져 온다."

[[dialogue]]
speaker = "unk"
original = "視線が合うと、メルエルは頬を真っ赤に染めながら「えへへ<emoji=heart04>」と微笑むので、どうやら彼女自身が考えたご奉仕のひとつのようだった。"
translation = "시선이 마주치자 메르엘은 뺨을 새빨갛게 물들이며 「에헤헤<emoji=heart04>」 하고 미소 지었기에, 아무래도 그녀 나름대로 생각한 봉사 중 하나인 듯했다."

[[dialogue]]
speaker_original = "メルエル（覚醒）"
speaker_translation = "메르엘 (각성)"
original = "「ど、どうでしょうか、魔王さまっ<emoji=heart04>\u3000私のマッサージ、上手くできていますか？」"
translation = "「어, 어떤가요, 마왕님<emoji=heart04> 제 마사지, 잘하고 있나요?」"

[[dialogue]]
speaker = "unk"
original = "あとその、胸が当たってて……"
translation = "「아니 그게, 가슴이 닿고 있어서……」"

[[dialogue]]
speaker = "unk"
original = "マッサージ、凄く気持ちいい。"
translation = "「마사지, 정말 기분 좋아.」"

[[dialogue]]
speaker_original = "メルエル（覚醒）"
speaker_translation = "메르엘 (각성)"
original = "「ちょ、ちょっと、はしたなかったかなっ。嫌だったら、ごめんねっ」"
translation = "「조, 조금 조신하지 못했나. 싫다면 미안해.」"

[[dialogue]]
speaker_original = "メルエル（覚醒）"
speaker_translation = "메르엘 (각성)"
original = "「──嫌なわけがない？\u3000興奮するし、メルエルの『喜んで欲しい』って気持ちが伝わってきて、すごく嬉しい……？」"
translation = "「──싫을 리가 없잖아? 흥분되기도 하고, 메르엘의 『기쁘게 해주고 싶다』는 마음이 전해져서 정말 기뻐……?」"

[[dialogue]]
speaker_original = "メルエル（覚醒）"
speaker_translation = "메르엘 (각성)"
original = "「そ、そっかぁ<emoji=heart04>\u3000えへへへぇ<emoji=heart04>\u3000……ちょっと恥ずかしかったけど、頑張ってみてよかったぁ<emoji=heart04>」"
translation = "「그, 그렇구나<emoji=heart04> 에헤헤헤에<emoji=heart04> ……조금 부끄러웠지만 힘내보길 잘했다아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "エッチなこと、ちょっと苦手じゃない？"
translation = "「야한 거, 좀 서툴지 않아?」"

[[dialogue]]
speaker = "unk"
original = "でも、メルエルは恥ずかしいこととか"
translation = "「하지만 메르엘은 부끄러운 일 같은 걸……」"

[[dialogue]]
speaker_original = "メルエル（覚醒）"
speaker_translation = "메르엘 (각성)"
original = "「えっと、正直に言っちゃうとね……」"
translation = "「저기, 솔직하게 말하자면요……」"

[[dialogue]]
speaker_original = "メルエル（覚醒）"
speaker_translation = "메르엘 (각성)"
original = "「魔王さまがしてくれることだったら……私、なんでもその瞬間に、大好きになっちゃうんです<emoji=heart04>」"
translation = "「마왕님이 해주시는 일이라면…… 저, 뭐든지 그 순간에 정말 좋아하게 되어버려요<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル（覚醒）"
speaker_translation = "메르엘 (각성)"
original = "「エッチなことも、恥ずかしいことも……もともと、すっごく苦手だったよ」"
translation = "「야한 일도, 부끄러운 일도…… 원래는 정말 서툴렀어요.」"

[[dialogue]]
speaker_original = "メルエル（覚醒）"
speaker_translation = "메르엘 (각성)"
original = "「でも、魔王さまにされるエッチなことは、全部嬉しくて、ドキドキして、気持ち良くって……すぐに、大好きになっちゃいました<emoji=heart04>」"
translation = "「하지만 마왕님에게 당하는 야한 일은 전부 기쁘고, 두근거리고, 기분 좋아서…… 바로 정말 좋아하게 되어버렸어요<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル（覚醒）"
speaker_translation = "메르엘 (각성)"
original = "「恥ずかしいって気持ちも、本当は凄く苦手なんだけど……恥ずかしがってる姿を、魔王さまはいつも『可愛い』って言ってくれるから……<emoji=heart04>」"
translation = "「부끄럽다는 기분도 사실은 정말 질색이지만…… 부끄러워하는 모습을 마왕님이 항상 『귀엽다』고 말해주시니까……<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル（覚醒）"
speaker_translation = "메르엘 (각성)"
original = "「魔王さまの前だけは、いくらでも恥ずかしくされてもいいって、思ってて……<emoji=heart04>」"
translation = "「마왕님 앞에서만큼은 얼마든지 부끄러운 꼴을 당해도 좋다고 생각하게 돼서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル（覚醒）"
speaker_translation = "메르엘 (각성)"
original = "「うぅうん──たくさん、『恥ずかしくされちゃいたい』って、そんなことを思う女の子に、なっちゃったんです<emoji=heart04>」"
translation = "「으으응── 잔뜩, 『부끄러운 일을 당하고 싶어』라고 생각하는 그런 여자애가 되어버렸어요<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル（覚醒）"
speaker_translation = "메르엘 (각성)"
original = "「だから、魔王さまが相手なら……エッチなことも、恥ずかしいことも、全部全部、大好きなのっ<emoji=heart04>」"
translation = "「그러니까 마왕님이 상대라면…… 야한 일도, 부끄러운 일도, 전부 전부 정말 좋아<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル（覚醒）"
speaker_translation = "메르엘 (각성)"
original = "「……って！\u3000なんかこれ、すっごく恥ずかしいことを告白しちゃった気がするよぉ<emoji=heart04>」"
translation = "「……앗! 왠지 이거, 엄청 부끄러운 고백을 해버린 것 같아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル（覚醒）"
speaker_translation = "메르엘 (각성)"
original = "「でも……私はもう、魔王さまのしもべだから<emoji=heart04>\u3000恥ずかしいけど、同時に嬉しいんです<emoji=heart04>」"
translation = "「하지만…… 저는 이제 마왕님의 종복이니까<emoji=heart04> 부끄럽지만 동시에 기뻐요<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル（覚醒）"
speaker_translation = "메르엘 (각성)"
original = "「全部受け止めてくれるって、わかってるから<emoji=heart04>\u3000魔王さまにだったら……私の全部をさらけ出せるの<emoji=heart04>」"
translation = "「전부 받아주실 거란 걸 알고 있으니까<emoji=heart04> 마왕님에게라면…… 저의 전부를 드러낼 수 있어요<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル（覚醒）"
speaker_translation = "메르엘 (각성)"
original = "「これは『しもべごっこ』だからとかじゃなくって……ずっとずっと、そう思ってたことだよ<emoji=heart04>」"
translation = "「이건 『종복 놀이』라서 그런 게 아니라…… 계속 계속 그렇게 생각했던 거예요<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル（覚醒）"
speaker_translation = "메르엘 (각성)"
original = "「とっても恥ずかしいけど……本当の気持ち、言葉にできて嬉しいなっ<emoji=heart04>」"
translation = "「무척 부끄럽지만…… 진심을 말로 할 수 있어서 기쁘네<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "恥ずかしくても伝えてくれる所は愛おしいよ"
translation = "「부끄러워도 전해주는 점이 사랑스러워.」"

[[dialogue]]
speaker = "unk"
original = "恥じらってるメルエルは可愛いし、"
translation = "「부끄러워하는 메르엘은 귀엽고,」"

[[dialogue]]
speaker_original = "メルエル（覚醒）"
speaker_translation = "메르엘 (각성)"
original = "「あぁあっ、魔王さまぁ<emoji=heart04>」"
translation = "「아아앗, 마왕님<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "全部全部大好きだ、メルエル"
translation = "「전부 전부 정말 좋아해, 메르엘.」"

[[dialogue]]
speaker = "unk"
original = "一途な所も、ちょっとエッチな所も"
translation = "「일편단심인 점도, 조금 야한 점도.」"

[[dialogue]]
speaker_original = "メルエル（覚醒）"
speaker_translation = "메르엘 (각성)"
original = "「はふぅぅう<emoji=heart04>\u3000嬉しすぎて、頭の中ぜんぶ、蕩けちゃってますぅ<emoji=heart04>」"
translation = "「하후우우우<emoji=heart04> 너무 기뻐서 머릿속이 전부 녹아내릴 것 같아요오<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル（覚醒）"
speaker_translation = "메르엘 (각성)"
original = "「こんなの……理想のご主人様すぎて、メルトしちゃうよぉ～<emoji=heart04>」"
translation = "「이런 건…… 너무 이상적인 주인님이라서 멜트 해버려요오~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "一緒に風呂に入って体を洗ってもらおうかな"
translation = "「같이 목욕하면서 몸을 씻겨달라고 할까.」"

[[dialogue]]
speaker = "unk"
original = "そうだ。恥ずかしいご奉仕と言えば……"
translation = "「그래. 부끄러운 봉사라고 하면……」"

[[dialogue]]
speaker_original = "メルエル（覚醒）"
speaker_translation = "메르엘 (각성)"
original = "「ふわぁああぁ～っ<emoji=heart04>\u3000わ、わかりました、魔王さまぁ<emoji=heart04>」"
translation = "「후와아아아~<emoji=heart04> 알, 알겠습니다, 마왕님<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル（覚醒）"
speaker_translation = "메르엘 (각성)"
original = "「魔王さまが気持ちよくなれるように……お風呂でも誠心誠意、ご奉仕させていただきますねっ<emoji=heart04>」"
translation = "「마왕님이 기분 좋아지실 수 있도록…… 욕실에서도 성심성의껏 봉사해 드릴게요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そうして俺たちは、お風呂場に舞台を移してからも『魔王さまのしもべごっこ』でイチャイチャし続けるのだった。"
translation = "그렇게 우리들은 욕실로 무대를 옮겨서도 『마왕님 종복 놀이』로 계속 꽁냥거렸다."

