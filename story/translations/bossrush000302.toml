[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「同じ星徒会長として、一応挨拶させてもらうわ。私はルヴィネ。極星学園の星徒会長よ」"
translation = "「같은 성도회장으로서, 일단 인사하도록 하지. 나는 루비네. 극성학원의 성도회장이야」"

[[dialogue]]
speaker = "unk"
original = "俺たちがルヴィネと初めて出会ったのは、事故でデネブに渡った時のことだった。"
translation = "우리들이 루비네와 처음 만난 것은, 사고로 데네브에 건너갔을 때의 일이었다."

[[dialogue]]
speaker = "unk"
original = "アルタイルかデネブか、どちらかが滅びる必要がある──ルヴィネはそう主張していた。"
translation = "알타이르냐 데네브냐, 어느 한쪽이 멸망할 필요가 있다── 루비네는 그렇게 주장하고 있었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「敵は同じリクリエのはずだ。ならアルタイルとデネブが力を合わせてリクリエと戦うこともできるんじゃないのか？」"
translation = "「적은 똑같은 리크리에일 터다. 그렇다면 알타이르와 데네브가 힘을 합쳐 리크리에와 싸울 수도 있지 않겠어?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺は新星学園の星徒会長として、アルタイルの星騎士として……アルタイルとデネブ、２つの世界で共にリクリエと戦うことを提案する！」"
translation = "「나는 신성학원의 성도회장으로서, 알타이르의 성기사로서…… 알타이르와 데네브, 두 세계에서 함께 리크리에와 싸울 것을 제안한다!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「子どものような理屈をこねないで。アルタイルとデネブが両方存在している限り、リクリエは永遠に終わらない」"
translation = "「아이 같은 논리 펼치지 마. 알타이르와 데네브가 양쪽 다 존재하고 있는 한, 리크리에는 영원히 끝나지 않아」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「私には女神様の声が聞こえるの。……と言っても、あなたたちには信じられないかもしれなけいけど」"
translation = "「나에게는 여신님의 목소리가 들려. ……라고 해도, 당신들에게는 믿기지 않을지도 모르겠지만 말야」"

[[dialogue]]
speaker = "unk"
original = "一度は破滅に瀕したデネブを救った英雄。"
translation = "한때 파멸에 직면했던 데네브를 구한 영웅."

[[dialogue]]
speaker = "unk"
original = "女神の力を与えられた神の遣い。"
translation = "여신의 힘을 부여받은 신의 사자."

[[dialogue]]
speaker = "unk"
original = "それが極星学園の星徒会長として君臨する彼女だった。"
translation = "그것이 극성학원의 성도회장으로서 군림하는 그녀였다."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「問答は終わりかしら？\u3000であれば……極星学園の星徒会長として、デネブの敵であるあなたたちを処断するわ」"
translation = "「문답은 끝일까? 그렇다면…… 극성학원의 성도회장으로서, 데네브의 적인 당신들을 처단하겠어」"

[[dialogue]]
speaker = "unk"
original = "ルヴィネは圧倒的な力を以て、俺たちの前に立ちはだかった。"
translation = "루비네는 압도적인 힘을 가지고, 우리들 앞을 가로막았다."

[[dialogue]]
speaker = "unk"
original = "ヴィーナスのノヴァフォームの覚醒と、ルヴィネに対抗するレジスタンスの助けがなければ、俺たちはあそこで倒れていただろう。"
translation = "비너스의 노바 폼 각성과, 루비네에 대항하는 레지스탕스의 도움이 없었다면, 우리들은 거기서 쓰러졌을 것이다."

[[dialogue]]
speaker = "unk"
original = "それから俺たちはレジスタンスに匿ってもらって──"
translation = "그리고 우리들은 레지스탕스의 은신처에 몸을 의탁하고──"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「担々麺はゴマが命！」"
translation = "「탄탄면은 깨가 생명!」"

[[dialogue]]
speaker = "unk"
original = "ルヴィネがいろんなアルバイトをしていることや、担々麺が大好きなこともわかったっけ……"
translation = "루비네가 여러 아르바이트를 하고 있다는 점이나, 탄탄면을 아주 좋아한다는 것도 알게 됐었지……"

[[dialogue]]
speaker = "unk"
original = "そして俺たちは、彼女を追いかけて潜入したフィーニスの塔で──"
translation = "그리고 우리들은, 그녀를 쫓아 잠입한 피니스의 탑에서──"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「そう、私は女神。新たな世界を創る新時代の女神よ」"
translation = "「그래, 나는 여신. 새로운 세계를 창조할 신시대의 여신이야」"

[[dialogue]]
speaker = "unk"
original = "その正体が、テルルに代わる新たな女神であることを知った。"
translation = "그 정체가, 테루루를 대신할 새로운 여신임을 알게 되었다."

