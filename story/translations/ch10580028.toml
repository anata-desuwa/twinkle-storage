[[dialogue]]
speaker = "unk"
original = "ある夏の日のこと──"
translation = "어느 여름날의 일──"

[[dialogue]]
speaker = "ヘレナ"
original = "「ふぅ……こうも気持ちのよい日差しだと、たまには焼いてみたくなるものだな」"
translation = "「후우…… 이렇게 기분 좋은 햇살이라면, 가끔은 태워 보고 싶어지는구나」"

[[dialogue]]
speaker = "unk"
original = "リゾート結界を訪れた俺たち。"
translation = "리조트 결계를 방문한 우리들."

[[dialogue]]
speaker = "unk"
original = "ヘレナちゃんはビーチパラソルの下で仰向けになり、波打ち際を眺めながらくつろいでいた。"
translation = "헬레나짱은 비치 파라솔 아래에서 하늘을 보고 누워, 파도치는 해변을 바라보며 쉬고 있었다."

[[dialogue]]
speaker = "クロト"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "しっかりとした胸の膨らみ。しなやかなボディライン。"
translation = "탄탄한 가슴의 부풀어 오름. 유연한 바디 라인."

[[dialogue]]
speaker = "unk"
original = "気づけば俺は、海よりもヘレナちゃんの体に目を奪われていて……。"
translation = "어느새 나는 바다보다 헬레나짱의 몸에 눈을 빼앗기고 있어서……."

[[dialogue]]
speaker = "ヘレナ"
original = "「……ん？\u3000なんだ──妙に熱っぽい視線を感じるな」"
translation = "「……응? 뭐야── 묘하게 뜨거운 시선이 느껴지는군」"

[[dialogue]]
speaker = "unk"
original = "バレた。"
translation = "들켰다."

[[dialogue]]
speaker = "クロト"
original = "「……ごめん。あまりに刺激的で」"
translation = "「……미안. 너무 자극적이라서」"

[[dialogue]]
speaker = "ヘレナ"
original = "「フフッ……構わんよ。それに、お望みなら……水着の下も、な？」"
translation = "「후훗…… 상관없단다. 게다가, 원한다면…… 수영복 아래도 말이지?」"

[[dialogue]]
speaker = "クロト"
original = "「……！？」"
translation = "「……!?」"

[[dialogue]]
speaker = "unk"
original = "ヘレナちゃんはするすると水着の紐をほどいて、それから再び横たわってこちらを見た。"
translation = "헬레나짱은 스르륵 수영복 끈을 풀고는, 다시 가로누워 이쪽을 보았다."

[[dialogue]]
speaker = "ヘレナ"
original = "「ほれ……乗ってみよ。貴殿のいきり立ったそれ──私が存分に奉仕してやるぞ？」"
translation = "「자…… 올라타 보거라. 귀하의 바짝 선 그것── 내가 마음껏 봉사해 주마?」"

[[dialogue]]
speaker = "クロト"
original = "「──っぁ……！」"
translation = "「──윽……!」"

[[dialogue]]
speaker = "unk"
original = "言われるがまま、ヘレナちゃんの上にまたがった俺は──"
translation = "말하는 대로 헬레나짱의 위에 올라탄 나는──"

[[dialogue]]
speaker = "unk"
original = "そのまま露出したペニスを、彼女の豊満な乳房に挟み込んでいた。"
translation = "그대로 노출된 자지를 그녀의 풍만한 유방 사이에 끼워 넣고 있었다."

[[dialogue]]
speaker = "ヘレナ"
original = "「ふふっ……よい反応だな。おち○ぽの先端まで、埋まってしまったぞ……<emoji=heart04>\u3000どうだ……？\u3000んっ……んっ……<emoji=heart04>」"
translation = "「후후…… 좋은 반응이로군. 자지의 끝까지 파묻혀 버렸단다……<emoji=heart04> 어떠냐……? 응…… 응……<emoji=heart04>」"

[[dialogue]]
speaker = "ヘレナ"
original = "「まったく、困ったものだ……<emoji=heart04>\u3000こんな凶暴なモノが暴れていては、水着に収まらないだろうに……<emoji=heart04>」"
translation = "「정말이지, 곤란한 일이구나……<emoji=heart04> 이런 흉포한 것이 날뛰고 있어서는 수영복에 담기지 않았을 터인데……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「っ……っ……！」"
translation = "「윽…… 윽……!」"

[[dialogue]]
speaker = "unk"
original = "未知の感覚が肉棒を優しく包みこんでいる。"
translation = "미지의 감각이 육봉을 부드럽게 감싸고 있다."

[[dialogue]]
speaker = "unk"
original = "なめらかで、ふくよかで、張りと弾力があって──手とはまるで異なる官能的な肉感だった。"
translation = "매끄럽고, 풍요롭고, 탄력과 탄성이 있어서── 손과는 전혀 다른 관능적인 육감이었다."

[[dialogue]]
speaker = "ヘレナ"
original = "「ふふっ──腰を動かしたくてたまらないといった様子ではないか。ここは膣ではなく、胸だぞ？\u3000わかっているのか……？」"
translation = "「후후── 허리를 움직이고 싶어 안달이 난 모양새이지 않느냐. 여기는 질이 아니라 가슴이란다? 알고 있는 것이냐……?」"

[[dialogue]]
speaker = "クロト"
original = "「だって──気持ちよすぎて……っ」"
translation = "「그치만── 너무 기분 좋아서……윽」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ふふふっ……そうかそうか。言わずとも、脈打つこちらが素直に物語っているがな……<emoji=heart04>\u3000ほれ、動いてみせよ……<emoji=heart04>」"
translation = "「후후후…… 그러냐 그러냐. 말하지 않아도 맥동하는 이쪽이 솔직하게 말해주고 있다만……<emoji=heart04> 자, 움직여 보거라……<emoji=heart04>」"

[[dialogue]]
speaker = "ヘレナ"
original = "「貴殿があれだけ凝視していた、私の胸だ──とくと味わえ……<emoji=heart04>\u3000んっ、んっ……ふぅっ……っ……ぁっ……<emoji=heart04>」"
translation = "「귀하가 그토록 응시하던 나의 가슴이다── 톡톡히 맛보거라……<emoji=heart04> 응, 응…… 후우…… 윽…… 아윽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "すべすべのバストに陰茎を何度も滑り込ませていく。"
translation = "매끈매끈한 가슴에 음경을 몇 번이고 미끄러뜨린다."

[[dialogue]]
speaker = "unk"
original = "膣とも異なるなめらかさがヘレナちゃんの柔肌をよりくっきり感じさせて、俺は一瞬でやみつきになってしまっていた。"
translation = "질과는 또 다른 매끄러움이 헬레나짱의 보드라운 살결을 더욱 뚜렷하게 느끼게 해서, 나는 순식간에 중독되어 버리고 있었다."

[[dialogue]]
speaker = "ヘレナ"
original = "「私からも──ぎゅっと挟んで……んっ……こう、動かしてやる……<emoji=heart04>\u3000ふふっ、さらにびくついたぞ……<emoji=heart04>\u3000そんなに気持ちよいのか……<emoji=heart04>」"
translation = "「나도── 꽉 끼우고…… 응…… 이렇게, 움직여 주마……<emoji=heart04> 후후, 더욱 움찔거리는구나……<emoji=heart04> 그렇게 기분 좋은 것이냐……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「っ……うん──もっとしてほしい……！」"
translation = "「윽…… 응── 더 해줬으면 좋겠어……!」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ふふふっ……正直でよろしい。ならば──んっ……いくらだって、動いてやろう……存分に私の体を堪能するといい……<emoji=heart04>」"
translation = "「후후후…… 솔직해서 좋구나. 그렇다면── 응…… 얼마든지 움직여 주마…… 마음껏 나의 몸을 만끽하도록 해라……<emoji=heart04>」"

[[dialogue]]
speaker = "ヘレナ"
original = "「特別だぞ……？\u3000私がこんな風に奉仕してやるのは──んっ……貴殿だけ、なのだからな……<emoji=heart04>\u3000ぁっ──んっ……ふふふっ……<emoji=heart04>」"
translation = "「특별하단다……? 내가 이런 식으로 봉사해 주는 것은── 응…… 귀하뿐, 이니까 말이다……<emoji=heart04> 아윽── 응…… 후후후……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ビーチで大勢の視線を釘付けにしてやまなかったヘレナちゃんの肢体が、今、俺のペニスのためだけに使われている。"
translation = "비치에서 수많은 시선을 사로잡아 마지않던 헬레나짱의 지체가, 지금 나의 자지만을 위해 쓰이고 있다."

[[dialogue]]
speaker = "unk"
original = "その支配的な感情も、さらなる興奮を煽るスパイスになっていた。"
translation = "그 지배적인 감정도 더욱 흥분을 부추기는 스파이스가 되고 있었다."

[[dialogue]]
speaker = "ヘレナ"
original = "「ほーら……たぷたぷに挟まれてしまっているぞ……<emoji=heart04>\u3000いつまで我慢できるか、見ものよの……ふふふ……<emoji=heart04>」"
translation = "「보아라…… 출렁출렁하게 끼워져 버렸단다……<emoji=heart04> 언제까지 참을 수 있을지 볼만하겠구나…… 후후후……<emoji=heart04>」"

[[dialogue]]
speaker = "ヘレナ"
original = "「こう暑いと──んっ……胸の谷間というやつは、汗ばんで仕方なくてな……<emoji=heart04>\u3000貴殿にとっては、少しばかり熱いかもしれぬが……」"
translation = "「이렇게 더우면── 응…… 가슴 골짜기라는 것은 땀이 배어 어쩔 수가 없어서 말이지……<emoji=heart04> 귀하에게는 조금 뜨거울지도 모르겠다만……」"

[[dialogue]]
speaker = "クロト"
original = "「ううん──むしろ、それがいい……」"
translation = "「으응── 오히려 그게 좋아……」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ふふふっ……そうかそうか<emoji=heart04>\u3000なら……このまま続けてやろう……<emoji=heart04>\u3000ほれ、ほれ──腰を引こうとするでない<emoji=heart04>\u3000私の胸からは、逃げられぬものと思え<emoji=heart04>」"
translation = "「후후후…… 그러냐 그러냐<emoji=heart04> 그럼…… 이대로 계속해 주마……<emoji=heart04> 자, 자── 허리를 빼려 하지 말거라<emoji=heart04> 나의 가슴에서는 도망칠 수 없는 것이라 생각하렴<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ヘレナちゃんの谷間で蒸された汗がちょうどよい潤滑油となって、スムーズにペニスが滑っていく。"
translation = "헬레나짱의 골짜기에서 쪄진 땀이 딱 좋은 윤활유가 되어, 매끄럽게 자지가 미끄러져 간다."

[[dialogue]]
speaker = "unk"
original = "逃げ場のない快感に、思わず腰を引いてしまうほどだった。"
translation = "도망칠 곳 없는 쾌감에 나도 모르게 허리를 뒤로 뺄 정도였다."

[[dialogue]]
speaker = "ヘレナ"
original = "「はぁ……はぁ……ふふっ……この熱さは……気温のせい、だけではないな……<emoji=heart04>\u3000貴殿の熱気が、むんむんと伝わってくるようだ……<emoji=heart04>」"
translation = "「하아…… 하아…… 후후…… 이 뜨거움은…… 기온 탓만은 아니구나……<emoji=heart04> 귀하의 열기가 훅 하고 전해져 오는 것 같구나……<emoji=heart04>」"

[[dialogue]]
speaker = "ヘレナ"
original = "「んっ──ぁっ……はぁっ……ふふ……おち○ぽの先から、露がどんどん垂れてきておるぞ……<emoji=heart04>\u3000こんなにぽたぽたと垂らして、しょうのない魔王だな……<emoji=heart04>」"
translation = "「응── 아윽…… 하아…… 후후…… 자지 끝에서 이슬이 계속해서 떨어지고 있구나……<emoji=heart04> 이렇게 뚝뚝 흘리다니, 어쩔 수 없는 마왕이로군……<emoji=heart04>」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ふぅ……っ……何度も脈打って──ぁっ……<emoji=heart04>\u3000すっかりふやけた表情をしておるではないか──今にもとろけてしまいそうだぞ、魔王……？」"
translation = "「후우…… 윽…… 몇 번이고 맥동하며── 아윽……<emoji=heart04> 완전히 풀린 표정을 하고 있지 않느냐── 당장이라도 녹아버릴 것 같구나, 마왕……?」"

[[dialogue]]
speaker = "クロト"
original = "「こんなに気持ちいいんじゃ……我慢、できないって……！」"
translation = "「이렇게 기분 좋으면…… 참을 수 없다고……!」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ふふ──切羽詰まった貴殿の顔も、可愛いものだな……<emoji=heart04>\u3000ぁっ……んっ、ふ──ぅっ……んっ……いくらでも、感じるがよい……<emoji=heart04>」"
translation = "「후후── 절박해진 귀하의 얼굴도 귀엽구나……<emoji=heart04> 아윽…… 응, 후──우…… 응…… 마음껏 느끼도록 해라……<emoji=heart04>」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ふぅ──ん……ふぅっ……んっ──ぁっ……<emoji=heart04>\u3000ふぅ……っ……<emoji=heart04>\u3000はぁ……はぁ……んっ……ふぅ──んっ…………はぁ、はぁ……っ……<emoji=heart04>」"
translation = "「후우── 응…… 후우…… 응── 아윽……<emoji=heart04> 후우…… 윽……<emoji=heart04> 하아…… 하아…… 응…… 후우── 응………… 하아, 하아…… 윽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "続けられていくパイズリ──"
translation = "계속되는 파이즈리──"

[[dialogue]]
speaker = "unk"
original = "その中で、次第にヘレナちゃんからも喘ぎが漏れるようになっていった。"
translation = "그 속에서 점차 헬레나짱에게서도 신음이 새어 나오기 시작했다."

[[dialogue]]
speaker = "ヘレナ"
original = "「はぁ……っ……はぁっ……<emoji=heart04>\u3000んっ──ふぅ……っ……んっ……<emoji=heart04>\u3000どうした、魔王……？\u3000私の顔を、じっと見て──」"
translation = "「하아…… 윽…… 하아……<emoji=heart04> 응── 후우…… 윽…… 응……<emoji=heart04> 왜 그러느냐, 마왕……? 나의 얼굴을 지그시 보고──」"

[[dialogue]]
speaker = "クロト"
original = "「ヘレナちゃんも……興奮してる？」"
translation = "「헬레나짱도…… 흥분했어?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「……っ！？」"
translation = "「……윽!?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「そ、そんなことは……ぁっ……<emoji=heart04>\u3000ないとは、いいきれない……が……んっ……<emoji=heart04>\u3000ふ──ぅっ……んっ……はぁ、はぁ……っ……<emoji=heart04>」"
translation = "「그, 그런 일은…… 아윽……<emoji=heart04> 없다고는 단언할 수 없다……만…… 응……<emoji=heart04> 후──우…… 응…… 하아, 하아…… 윽……<emoji=heart04>」"

[[dialogue]]
speaker = "ヘレナ"
original = "「このようなたくましい一物を、至近距離で見せつけられているのだぞ……？\u3000私も──んっ……女として……ぁっ、多少は、興奮するに……決まっていよう……<emoji=heart04>」"
translation = "「이런 늠름한 물건을 지근거리에서 보여지고 있는 것이란다……? 나도── 응…… 여자로서…… 아윽, 다소는 흥분하는 게…… 당연하지 않겠느냐……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ヘレナちゃんは胸をこすりつけながら、その指先で自らの乳頭もいじっていた。"
translation = "헬레나짱은 가슴을 문지르면서, 그 손가락 끝으로 자신의 유두도 만지고 있었다."

[[dialogue]]
speaker = "unk"
original = "艶っぽい熱の混じった吐息が、濡れそぼった肉棒の先端をさらに湿らせていく。"
translation = "농염한 열기가 섞인 숨결이 젖어버린 육봉의 끝을 더욱 습하게 만든다."

[[dialogue]]
speaker = "ヘレナ"
original = "「んっ──ぅっ……はぁっ……んっ……<emoji=heart04>\u3000まったく──んっ……間近で見ると──ぁっ……挿れられている時よりも、大きく感じるな……<emoji=heart04>」"
translation = "「응── 윽…… 하아…… 응……<emoji=heart04> 정말이지── 응…… 가까이서 보니── 아윽…… 삽입하고 있을 때보다 크게 느껴지는구나……<emoji=heart04>」"

[[dialogue]]
speaker = "ヘレナ"
original = "「参った──んっ……私も……ぁっ……この状況に、あてられてしまったらしい……<emoji=heart04>\u3000はぁ、はぁ……んっ──ふぅっ……っ……っ……<emoji=heart04>」"
translation = "「졌다── 응…… 나도…… 아윽…… 이 상황에 취해버린 모양이다……<emoji=heart04> 하아, 하아…… 응── 후우…… 윽…… 윽……<emoji=heart04>」"

[[dialogue]]
speaker = "ヘレナ"
original = "「この、濃い雄の匂いのせいで……んぁっ……<emoji=heart04>\u3000私のおま○こも、きゅんきゅんしてしまうではないか……っ<emoji=heart04>\u3000はぁ、はぁ……んっ……<emoji=heart04>」"
translation = "「이 진한 수컷 냄새 때문에…… 응아윽……<emoji=heart04> 나의 보지도 큥큥거려 버리지 않느냐……윽<emoji=heart04> 하아, 하아…… 응……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「はぁ……はぁ……っ……」"
translation = "「하아…… 하아…… 윽……」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ふふふ──すごい顔をしているぞ、魔王……<emoji=heart04>\u3000どんどん余裕がなくなってきているな──もう、おち○ぽを擦ることしか考えられないという顔だ……<emoji=heart04>」"
translation = "「후후후── 굉장한 얼굴을 하고 있구나, 마왕……<emoji=heart04> 점점 여유가 없어지고 있군── 이제 자지를 문지르는 것밖에 생각할 수 없다는 얼굴이다……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「だって……もう、溶けそうで……」"
translation = "「그치만…… 이제 녹아버릴 것 같아서……」"

[[dialogue]]
speaker = "unk"
original = "それは思考も、肉棒も。"
translation = "그것은 사고도, 육봉도."

[[dialogue]]
speaker = "unk"
original = "マシュマロのようなふっくらした温もりがペニス全体を包んでは、ピストンのたびに心地よい摩擦が一気に走り抜ける。"
translation = "마시멜로 같은 폭신한 온기가 자지 전체를 감싸고는, 피스톤질을 할 때마다 기분 좋은 마찰이 단숨에 휘몰아친다."

[[dialogue]]
speaker = "unk"
original = "乱暴にはできない──と思っていながら、腰が動くのを止められなかった。"
translation = "난폭하게 해서는 안 된다── 고 생각하면서도, 허리가 움직이는 것을 멈출 수 없었다."

[[dialogue]]
speaker = "ヘレナ"
original = "「んっ──私の水着姿を見た時から……ずっと悶々としていたのではないか？\u3000ぁっ、ふぅっ……<emoji=heart04>\u3000もう、我慢できないといった様子ではないか……<emoji=heart04>」"
translation = "「응── 나의 수영복 차림을 보았을 때부터…… 계속 번민하고 있었던 것이 아니냐? 아윽, 후우……<emoji=heart04> 이제 참을 수 없다는 모양새이지 않느냐……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ああ──だって、あんなセクシーな姿、見せられたら……！」"
translation = "「아아── 그치만, 그런 섹시한 모습 보여버리면……!」"

[[dialogue]]
speaker = "unk"
original = "ヘレナちゃんの妖艶なボディは、若い男子には刺激が強すぎる。"
translation = "헬레나짱의 요염한 바디는 젊은 남자에게는 자극이 너무 강하다."

[[dialogue]]
speaker = "unk"
original = "けど、その分──ぐつぐつと煮えたぎっていた性欲を、思うがままに吐き出せる幸福ったらない。"
translation = "하지만 그만큼── 부글부글 끓어오르던 성욕을 원하는 대로 쏟아낼 수 있는 행복이란 이루 말할 수 없다."

[[dialogue]]
speaker = "ヘレナ"
original = "「ふふふっ……よい、よい。貴殿らしからぬ、その下卑た欲望……この九浄ヘレナが、受け止めてやる……んっ……ぁっ、んんっ<emoji=heart04>\u3000はぁ、はぁ……っ<emoji=heart04>」"
translation = "「후후후…… 좋다, 좋아. 귀하답지 않은 그 비천한 욕망…… 이 쿠죠 헬레나가 받아주마…… 응…… 아윽, 응응윽<emoji=heart04> 하아, 하아……윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "なんでも受け止めてくれるヘレナちゃん──"
translation = "뭐든지 받아주는 헬레나짱──"

[[dialogue]]
speaker = "unk"
original = "俺は彼女の包容力に甘えるように、さらにピストンを激しくしていった。"
translation = "나는 그녀의 포용력에 어리광 부리듯 더욱 피스톤질을 격렬하게 해 갔다."

[[dialogue]]
speaker = "ヘレナ"
original = "「んんっ──ぁっ、はぁっ……！\u3000んっ、んんっ──また一段と、勢いが──んぁっ<emoji=heart04>\u3000お、落ち着け──んっ、んんっ……<emoji=heart04>\u3000ぁっ、ふぅっ──<emoji=heart04>」"
translation = "「응응윽── 아윽, 하아……! 응, 응응윽── 또 한층 더 기세가── 응아윽<emoji=heart04> 지, 진정하거라── 응, 응응윽……<emoji=heart04> 아윽, 후우──<emoji=heart04>」"

[[dialogue]]
speaker = "ヘレナ"
original = "「なんて──んっ……荒々しい、腰使いだ……<emoji=heart04>\u3000けしからん魔王だな……<emoji=heart04>\u3000私の胸を、孕ませるつもりか……？\u3000んっ、んんんんぅっ……<emoji=heart04>」"
translation = "「어쩜── 응…… 거친 허리 놀림이구나……<emoji=heart04> 괘씸한 마왕이로군……<emoji=heart04> 나의 가슴을 임신시킬 셈이냐……? 응, 응응응우윽……<emoji=heart04>」"

[[dialogue]]
speaker = "ヘレナ"
original = "「はぁ……はぁ、ふぅっ──んっ……そんなに射精、したいのか……っ……？」"
translation = "「하아…… 하아, 후우── 응…… 그렇게 사정하고 싶은 것이냐……윽……?」"

[[dialogue]]
speaker = "クロト"
original = "「ああ──っ……このまま……このまま出して、ヘレナちゃんにかけたい……！」"
translation = "「아아──윽…… 이대로…… 이대로 내서, 헬레나짱에게 뿌리고 싶어……!」"

[[dialogue]]
speaker = "unk"
original = "あまりの快感に理性が溶かされきっていた俺は、ありのままの欲望をさらけ出してしまう。"
translation = "너무나 큰 쾌감에 이성이 다 녹아버린 나는 있는 그대로의 욕망을 드러내 버린다."

[[dialogue]]
speaker = "ヘレナ"
original = "「はぁ──はぁっ……ふふ、正直な奴め──んっ……<emoji=heart04>\u3000人のバストを我がままに使い、射精したい──などとは……<emoji=heart04>」"
translation = "「하아── 하아…… 후후, 솔직한 녀석── 응……<emoji=heart04> 남의 가슴을 마음대로 쓰고 사정하고 싶다니……<emoji=heart04>」"

[[dialogue]]
speaker = "ヘレナ"
original = "「このままどぴゅどぴゅと出したら──ぁっ……私の顔に……かかってしまうな……？\u3000これは困ったな……<emoji=heart04>\u3000どうしたものか……<emoji=heart04>」"
translation = "「이대로 퓨퓨 하고 내면── 아윽…… 나의 얼굴에…… 묻어버리겠구나……? 이건 곤란하구나……<emoji=heart04> 어찌하면 좋을꼬……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「っ……！」"
translation = "「윽……!」"

[[dialogue]]
speaker = "unk"
original = "ガチガチに勃起した俺のペニス。さらけ出されたヘレナちゃんの巨乳。そして、そんな彼女の気品あふれる顔立ち。"
translation = "딱딱하게 발기한 나의 자지. 드러내진 헬레나짱의 거유. 그리고 그런 그녀의 기품 넘치는 이목구비."

[[dialogue]]
speaker = "unk"
original = "ここから、思いきり白濁液をぶちまけることができたら──どんなにか気持ちいいだろうと想像してしまった。"
translation = "여기서 마음껏 백탁액을 뿜어낼 수 있다면── 얼마나 기분 좋을지 상상해 버렸다."

[[dialogue]]
speaker = "ヘレナ"
original = "「んぁっ──<emoji=heart04>\u3000途端に──んっ、先っぽが膨らんできたぞ……<emoji=heart04>\u3000まったく、いやしい男だ……んぁっ<emoji=heart04>\u3000んっ──んんっ、んんっ……<emoji=heart04>」"
translation = "「응아윽──<emoji=heart04> 갑자기── 응, 끝부분이 부풀어 올랐구나……<emoji=heart04> 정말이지 야비한 남자다…… 응아윽<emoji=heart04> 응── 응응윽, 응응윽……<emoji=heart04>」"

[[dialogue]]
speaker = "ヘレナ"
original = "「貴殿は──ぁっ……射精をちらつかされたら──んっ、すぐ、その気になってしまうものなのだな……<emoji=heart04>\u3000ぁっ……んっ……んはぁっ……っ……！」"
translation = "「귀하는── 아윽…… 사정을 예고받으면── 응, 금방 그럴 마음이 되어버리는 것이로구나……<emoji=heart04> 아윽…… 응…… 응하아윽……윽……!」"

[[dialogue]]
speaker = "クロト"
original = "「ヘレナちゃんだって──感じてる、くせに……」"
translation = "「헬레나짱도── 느끼고 있으면서……」"

[[dialogue]]
speaker = "ヘレナ"
original = "「うるさい──んぁっ<emoji=heart04>\u3000このまま──んっ……搾り取ってやる……<emoji=heart04>\u3000おち○ぽからいやしく発射するところを、目の前で見ていてやるからな……っ<emoji=heart04>」"
translation = "「시끄럽다── 응아윽<emoji=heart04> 이대로── 응…… 짜내 주마……<emoji=heart04> 자지에서 비겁하게 발사하는 장면을 눈앞에서 지켜봐 줄 테니까 말이다……윽<emoji=heart04>」"

[[dialogue]]
speaker = "ヘレナ"
original = "「九浄家当主──この私の顔を、精液で汚そうなど……<emoji=heart04>\u3000とんだ不敬さだぞ……<emoji=heart04>\u3000貴殿にしか、許されぬ行いなのだから──な……ぁっ……<emoji=heart04>\u3000んっ、んんっ<emoji=heart04>」"
translation = "「쿠죠 가문 당주── 이 나의 얼굴을 정액으로 더럽히려 하다니……<emoji=heart04> 엄청난 불경이로군……<emoji=heart04> 귀하에게만 허락된 행위이니까── 말이다…… 아윽……<emoji=heart04> 응, 응응윽<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ッ──」"
translation = "「윽──」"

[[dialogue]]
speaker = "unk"
original = "ヘレナちゃんを俺の白色で染め上げる──"
translation = "헬레나짱을 나의 백색으로 물들인다──"

[[dialogue]]
speaker = "unk"
original = "そんな図を想像しただけで、俺の男根ははち切れそうなほど膨らんでいった。"
translation = "그런 광경을 상상한 것만으로 나의 남근은 터질 듯이 팽창해 갔다."

[[dialogue]]
speaker = "ヘレナ"
original = "「はぁ──はぁ──んっ、んんっ──！\u3000はぁっ……んっ……出せっ……<emoji=heart04>\u3000その情欲、私に全部、ぶちまけてしまえ……っ<emoji=heart04>\u3000んっ、んんんっ──っ……！」"
translation = "「하아── 하아── 응, 응응윽──! 하아…… 응…… 내보내거라……<emoji=heart04> 그 정욕, 나에게 전부 쏟아부어 버리렴……윽<emoji=heart04> 응, 응응응윽──윽……!」"

[[dialogue]]
speaker = "クロト"
original = "「ヘレナちゃん──っ……！\u3000もう、無理だ──出るっ……！」"
translation = "「헬레나짱──윽……! 이제 안 돼── 나온다……!」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ぁっ──んんんんんっっ──────<emoji=heart04>」"
translation = "「아윽── 응응응응응으으으윽────────<emoji=heart04>」"

[[dialogue]]
speaker = "ヘレナ"
original = "「んぁっ────<emoji=heart04>\u3000ぁっ──んっ──はぁ……んっ────<emoji=heart04>」"
translation = "「응아윽────<emoji=heart04> 아윽── 응── 하아…… 응────<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "溜まりに溜まった精液が、噴火するように爆ぜた。"
translation = "쌓이고 쌓인 정액이 화산 폭발하듯 터졌다."

[[dialogue]]
speaker = "クロト"
original = "「──っ……っ……！」"
translation = "「──윽…… 윽……!」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ん──んんっ──ふっ、んっ…………<emoji=heart04>\u3000すごいぞ──ぁっ……びゅくびゅくと──ふふっ、まだ出ておる……<emoji=heart04>\u3000ぁっ、んぁっ……んっ……<emoji=heart04>」"
translation = "「응── 응응윽── 훗, 응…………<emoji=heart04> 굉장하구나── 아윽…… 울컥울컥하고── 후후, 아직 나오고 있구나……<emoji=heart04> 아윽, 응아윽…… 응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "爆発的に飛び出した白濁液が、色っぽく微笑むヘレナちゃんの美貌を汚していく。"
translation = "폭발적으로 튀어나온 백탁액이 요염하게 미소 짓는 헬레나짱의 미모를 더럽혀 간다."

[[dialogue]]
speaker = "unk"
original = "その鮮烈な光景がさらに興奮を後押しし、ますます精液が止まらなくなった。"
translation = "그 선렬한 광경이 더욱 흥분을 부추겨 점점 정액이 멈추지 않게 되었다."

[[dialogue]]
speaker = "ヘレナ"
original = "「んぁっ──んっ──<emoji=heart04>\u3000ふふっ……おいおい……どれだけ出す気だ……ぁっ……<emoji=heart04>\u3000私の顔が──んぁっ、べとべとになってしまったではないか……っ……<emoji=heart04>」"
translation = "「응아윽── 응──<emoji=heart04> 후후…… 어이 어이…… 얼마나 내보낼 셈이냐…… 아윽……<emoji=heart04> 나의 얼굴이── 응아윽, 끈적끈적해져 버리지 않았느냐……윽……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「っ……ごめん、ヘレナちゃん……！」"
translation = "「윽…… 미안, 헬레나짱……!」"

[[dialogue]]
speaker = "unk"
original = "あまりの射精量に恥ずかしくなり、思わず謝ってしまう。"
translation = "엄청난 사정량에 부끄러워져 나도 모르게 사과하고 만다."

[[dialogue]]
speaker = "ヘレナ"
original = "「ふふふっ……<emoji=heart04>\u3000構わぬ。私でこうも興奮したというのなら、女冥利に尽きるというものよ……<emoji=heart04>\u3000んっ……ふぅっ……<emoji=heart04>」"
translation = "「후후후……<emoji=heart04> 상관없다. 나로 인해 이렇게나 흥분했다면 여자로서 보람을 느끼는 법이지……<emoji=heart04> 응…… 후우……<emoji=heart04>」"

[[dialogue]]
speaker = "ヘレナ"
original = "「この九浄ヘレナを精液まみれにしてしまうとは……豪気な男よ<emoji=heart04>\u3000こんな状態を誰かに見られたら、一大事だぞ……？」"
translation = "「이 쿠죠 헬레나를 정액투성이로 만들다니…… 호기로운 남자구나<emoji=heart04> 이런 상태를 누군가에게 들키기라도 하면 큰일이겠어……?」"

[[dialogue]]
speaker = "クロト"
original = "「あんまり想像したくない……」"
translation = "「별로 상상하고 싶지 않아……」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ふふっ……そんな事を言いながら、もう逞しくしているではないか……。本当に豪気な男よな、貴殿は……」"
translation = "「후후…… 그런 말을 하면서, 벌써 늠름해져 있지 않느냐……. 정말로 호기로운 남자구나, 귀공은……」"

[[dialogue]]
speaker = "ヘレナ"
original = "「いいだろう……。私の胸で存分に快楽を得るがいい……」"
translation = "「좋다……. 나의 가슴으로 마음껏 쾌락을 얻도록 하거라……」"

[[dialogue]]
speaker = "unk"
original = "ヘレナちゃんは、問答無用で俺のペニスを挟み込む。"
translation = "헬레나짱은 문답무용으로 내 페니스를 끼워 넣는다."

[[dialogue]]
speaker = "unk"
original = "その後、俺はヘレナちゃんの胸奉仕によって、枯れ果てるまで精を絞りつくされたのだった。"
translation = "그 후, 나는 헬레나짱의 가슴 봉사에 의해, 다 마를 때까지 정기를 짜여버리고 말았다."

