[[dialogue]]
speaker = "unk"
original = "第１話,カーバンクル娘のルルゥ,P"
translation = "제1화, 카벙클 소녀 루루, P"

[[dialogue]]
speaker = "unk"
original = "カーバンクル娘のルルゥ──彼女がやってきたゲシュペンス島という名前には聞き覚えがあった。"
translation = "카벙클 소녀 루루── 그녀가 왔다는 게슈펜스 섬이라는 이름에는 낯익은 구석이 있었다."

[[dialogue]]
speaker = "unk"
original = "以前、新星学園星徒会の副会長であるアナが、黒ベア子によって別世界に転移させられたことがあった。"
translation = "이전에 신성 학원 성도회의 부회장인 아나가 흑베아코에 의해 다른 세계로 전이된 적이 있었다."

[[dialogue]]
speaker = "unk"
original = "その時の島の名前がゲシュペンス島。"
translation = "그때의 섬 이름이 게슈펜스 섬."

[[dialogue]]
speaker = "unk"
original = "多種多様な種族の女の子がひとつの島に集まって生活している、実に興味深い場所だ、とアナは興奮気味に語っていた。"
translation = "다양한 종족의 여자아이들이 하나의 섬에 모여 생활하고 있는, 실로 흥미로운 곳이다, 라고 아나는 흥분 섞인 어조로 말했었다."

[[dialogue]]
speaker = "ルルゥ"
original = "「おまたせ、なの♪」"
translation = "「기다렸지, 인 거야♪」"

[[dialogue]]
speaker = "unk"
original = "流星学園附属校の制服に着替えたルルゥが姿を現す。"
translation = "유성 학원 부속교의 교복으로 갈아입은 루루가 모습을 드러낸다."

[[dialogue]]
speaker = "unk"
original = "これから学園内で一緒に行動する時、注目を浴びないようにと着替えてもらったのだが……"
translation = "앞으로 학원 내에서 함께 행동할 때 주목받지 않도록 갈아입힌 것이었지만……"

[[dialogue]]
speaker = "unk"
original = "（附属校の制服も似合ってるし……）"
translation = "(부속교 교복도 잘 어울리고……)"

[[dialogue]]
speaker = "unk"
original = "（かわいい子だな……）"
translation = "(귀여운 아이네……)"

[[dialogue]]
speaker = "ルルゥ"
original = "「っ……！」"
translation = "「윽……!」"

[[dialogue]]
speaker = "マハムート"
original = "「会長、レディをあまり無遠慮に見つめるものではないわ」"
translation = "「회장, 숙녀를 너무 무례하게 쳐다보는 게 아니야」"

[[dialogue]]
speaker = "unk"
original = "ルルゥの制服姿に見とれていると、マムこと<ruby>妃竜院<rt>きりゅういん</rt></ruby>マハムート先輩に注意されてしまう。"
translation = "루루의 교복 차림에 넋을 잃고 있자, 마무라 불리는 키류인 마하무트 선배에게 주의를 듣고 만다."

[[dialogue]]
speaker = "unk"
original = "ごめん、ルルゥ"
translation = "미안, 루루"

[[dialogue]]
speaker = "unk"
original = "あ……"
translation = "아……"

[[dialogue]]
speaker = "ルルゥ"
original = "「お、思わず隠れちゃったなの……ルルゥもごめんなさいなの……」"
translation = "「어, 나도 모르게 숨어버린 거야…… 루루도 미안한 거야……」"

[[dialogue]]
speaker = "ルルゥ"
original = "「会長さんは、いいニンゲンだから怖くないの！\u3000マムさんに教わったから大丈夫なの！」"
translation = "「회장님은 좋은 인간이니까 무섭지 않은 거야! 마무 씨에게 배웠으니까 괜찮은 거야!」"

[[dialogue]]
speaker = "unk"
original = "と言いながらもマムの後ろに姿を隠していて、チラチラとこちらを覗くように見ている。"
translation = "라고 말하면서도 마무의 뒤로 몸을 숨긴 채, 힐끔힐끔 이쪽을 엿보듯 보고 있다."

[[dialogue]]
speaker = "unk"
original = "まだ警戒心は解けていない様子だ。"
translation = "아직 경계심은 풀리지 않은 모양이다."

[[dialogue]]
speaker = "フィオナ"
original = "「ルルゥさんは密猟者に狙われ続けてきたそうですね。そのせいでこんな風に人間を恐れるようになってしまったなんて……」"
translation = "「루루 씨는 밀렵꾼들에게 계속 노려져 왔다고 하더군요. 그 탓에 이렇게 인간을 두려워하게 되어버리다니……」"

[[dialogue]]
speaker = "フィオナ"
original = "「学園には大勢の人がいます。黒ベア子さんの召喚した次の世界の案内人探しは私たちに任せて、ここで待っていてもらっても構わないんですよ？」"
translation = "「학원에는 많은 사람이 있습니다. 흑베아코 씨가 소환한 다음 세계의 안내인 찾기는 저희에게 맡기고, 여기서 기다려 주셔도 괜찮아요?」"

[[dialogue]]
speaker = "ルルゥ"
original = "「大勢……そんなにたくさんのニンゲンがいる、なの……？\u3000うぅぅ……」"
translation = "「많은…… 그렇게나 많은 인간이 있는 거야……? 으으으……」"

[[dialogue]]
speaker = "ルルゥ"
original = "「で、でもルルゥも行く、なの！\u3000どれだけニンゲンが居ても、マムさんの側なら平気なの！\u3000ルルゥ頑張る、なの！」"
translation = "「하, 하지만 루루도 갈 거야! 아무리 인간이 많아도, 마무 씨 곁이라면 괜찮은 거야! 루루 힘낼 거야!」"

[[dialogue]]
speaker = "マハムート"
original = "「なかなかいい意気込みね。あなたのことは私が守ってあげるから、しっかりついてくるのよ」"
translation = "「제법 좋은 기개네. 네 일은 내가 지켜줄 테니, 꽉 붙어 따라오렴」"

[[dialogue]]
speaker = "ルルゥ"
original = "「はいなの！」"
translation = "「알겠는 거야!」"

[[dialogue]]
speaker = "フィオナ"
original = "「それでは掲示板で報告のあった女性が、黒ベア子さんが召喚したという人なのか確かめに行きましょう」"
translation = "「그럼 게시판에서 보고된 여성이 흑베아코 씨가 소환했다는 사람인지 확인하러 가죠」"

[[dialogue]]
speaker = "ルルゥ"
original = "「はわわわ……ほんとにいっぱいいる、なの……」"
translation = "「하와와와…… 정말로 잔뜩 있는 거야……」"

[[dialogue]]
speaker = "unk"
original = "校内を往来する学園生の数に、ルルゥの意気込みは早くも挫けていた。"
translation = "교내를 오가는 학원생들의 수에 루루의 기개는 벌써 꺾여 있었다."

[[dialogue]]
speaker = "unk"
original = "マムの後ろにしっかり隠れながら周囲のあちこちに不安げな視線を向けている。"
translation = "마무의 뒤에 꼭 숨어서 주변 곳곳에 불안한 시선을 보내고 있다."

[[dialogue]]
speaker = "unk"
original = "ルルゥ、あれを見て"
translation = "루루, 저걸 봐"

[[dialogue]]
speaker = "ルルゥ"
original = "「……？」"
translation = "「……?」"

[[dialogue]]
speaker = "魔族の星騎士"
original = "「ねえねえ、これからみんなでどこか遊びに行かない？」"
translation = "「저기 저기, 이제 다 같이 어디 놀러 안 갈래?」"

[[dialogue]]
speaker = "人間の星騎士"
original = "「いいね～、たまには自主練もお休みにして思いっきり羽をのばした～い♪」"
translation = "「좋네~, 가끔은 자율 훈련도 쉬고 마음껏 기분 전환하고 싶어~♪」"

[[dialogue]]
speaker = "神族の星騎士"
original = "「何がたまには、よ。あなたの場合、いっつも羽を伸ばしてばっかりじゃない」"
translation = "「뭐가 가끔이야. 너 같은 경우엔 맨날 놀기만 하잖아」"

[[dialogue]]
speaker = "人間の星騎士"
original = "「も～、硬いこと言わないの！」"
translation = "「정말~, 딱딱하게 굴지 마!」"

[[dialogue]]
speaker = "ルルゥ"
original = "「……ニンゲンと……そうじゃないヒトとが、仲良くお話ししてます……」"
translation = "「……인간이랑…… 그렇지 않은 사람이랑, 사이좋게 이야기하고 있는 거야……」"

[[dialogue]]
speaker = "マハムート"
original = "「ルルゥにとっては見慣れない光景かもしれないわね。けれど、ここではそれが当たり前なのよ」"
translation = "「루루에게는 낯선 광경일지도 모르겠네. 하지만 여기서는 이게 당연한 거란다」"

[[dialogue]]
speaker = "ルルゥ"
original = "「不思議なの……」"
translation = "「신기한 거야……」"

[[dialogue]]
speaker = "フィオナ"
original = "「ルルゥさんの島ではどうして、人間とそれ以外の種族の方々が仲良くできていないのでしょうか？」"
translation = "「루루 씨의 섬에서는 어째서 인간과 그 외의 종족분들이 사이좋게 지내지 못하는 건가요?」"

[[dialogue]]
speaker = "ルルゥ"
original = "「島にやってくるニンゲンの大半が、ルルゥたちのことを狙っている密猟者なの。密猟者はルルゥたちを見かけたら襲ってくる、なの」"
translation = "「섬에 찾아오는 인간의 태반이 루루 일행을 노리는 밀렵꾼인 거야. 밀렵꾼은 루루 일행을 발견하면 습격해 오는 거야」"

[[dialogue]]
speaker = "ルルゥ"
original = "「だから、ニンゲンには警戒しなくちゃいけないの。襲われる前にこっちから襲うって子もいる、なの」"
translation = "「그래서 인간에게는 경계해야 하는 거야. 습격당하기 전에 이쪽에서 습격한다는 아이도 있는 거야」"

[[dialogue]]
speaker = "ルルゥ"
original = "「でも……こっちの世界には、悪いニンゲンはいないみたい、なの……とっても平和そうなの……」"
translation = "「하지만…… 이쪽 세계에는 나쁜 인간은 없는 것 같은 거야…… 무척 평화로워 보이는 거야……」"

[[dialogue]]
speaker = "マハムート"
original = "「本当にそうなら良かったのだけれど……残念ながらこちらの世界にも、平和を乱す不埒者はいるわ。無論、私の目の黒いうちは学園に近寄らせたりしないけれど」"
translation = "「정말 그렇다면 좋았겠지만…… 안타깝게도 이쪽 세계에도 평화를 어지럽히는 불한당은 있단다. 물론 내 눈 밖에 있는 한 학원에 접근하게 두지는 않겠지만」"

[[dialogue]]
speaker = "フィオナ"
original = "「この世界はこの世界で、外敵と呼べる存在が別にあります。それこそ世界の命運を揺るがすような脅威が」"
translation = "「이 세계는 이 세계대로 외적이라 부를 수 있는 존재가 따로 있습니다. 그야말로 세계의 운명을 뒤흔들 만한 위협이」"

[[dialogue]]
speaker = "unk"
original = "そう──リクリエの脅威は一旦乗り越えたが、まだまだ不可解な事件は続いていて、気を抜くことはできない。"
translation = "그렇다── 리크리에의 위협은 일단 넘어섰지만, 아직도 불가해한 사건은 계속되고 있어 방심할 수 없다."

[[dialogue]]
speaker = "unk"
original = "世界の脅威はまだ取り去られてはいないのだ。"
translation = "세계의 위협은 아직 제거되지 않은 것이다."

[[dialogue]]
speaker = "unk"
original = "それらに立ち向かうのが星騎士であり、ここは星騎士を育成する学園なのだと、簡単にルルゥに説明する。"
translation = "그것들에 맞서는 것이 성기사이며, 이곳은 성기사를 육성하는 학원이라고 간단히 루루에게 설명한다."

[[dialogue]]
speaker = "ルルゥ"
original = "「それは、とっても大変そうなの……」"
translation = "「그건 무척 힘들 것 같은 거야……」"

[[dialogue]]
speaker = "ルルゥ"
original = "「でもマムさんがいるの！\u3000マムさんはとっても強いから、マムさんがいれば大丈夫なの♪」"
translation = "「하지만 마무 씨가 있는 거야! 마무 씨는 무척 강하니까, 마무 씨가 있으면 괜찮은 거야♪」"

[[dialogue]]
speaker = "マハムート"
original = "「ふふっ。私が強いのは当然として、私以外にもこの学園に集まった者は精鋭ぞろいよ」"
translation = "「후훗. 내가 강한 건 당연하고, 나 말고도 이 학원에 모인 자들은 정예들뿐이란다」"

[[dialogue]]
speaker = "マハムート"
original = "「特にそこの２人、まだまだ未熟なところはあるけれど、会長とフィオナはかなりの実力者よ」"
translation = "「특히 저기 두 사람, 아직 미숙한 면은 있지만 회장과 피오나는 상당한 실력자야」"

[[dialogue]]
speaker = "フィオナ"
original = "「えっ？\u3000嬉しいです……マムにそんな風に言っていただけるなんて」"
translation = "「엣? 기뻐요…… 마무에게 그런 말을 듣다니」"

[[dialogue]]
speaker = "unk"
original = "光栄です"
translation = "영광입니다"

[[dialogue]]
speaker = "ルルゥ"
original = "「そうだった、なの！\u3000会長さんはマムさんにも認められた、この学園のリーダーなの。つまりここで１番偉い人……」"
translation = "「그랬던 거야! 회장님은 마무 씨에게도 인정받은 이 학원의 리더인 거야. 즉 여기서 제일 높은 사람……」"

[[dialogue]]
speaker = "ルルゥ"
original = "「ルルゥ、尊敬なの……！」"
translation = "「루루, 존경인 거야……!」"

[[dialogue]]
speaker = "unk"
original = "ちょっと恥ずかしいな……"
translation = "조금 부끄러운데……"

[[dialogue]]
speaker = "unk"
original = "そ、尊敬するとか言われると……"
translation = "그, 존경한다는 말을 들으니……"

[[dialogue]]
speaker = "マハムート"
original = "「何を鼻の下を伸ばしているのかしら、会長？」"
translation = "「뭘 헤벌레하고 있는 거니, 회장?」"

[[dialogue]]
speaker = "unk"
original = "っ……！！"
translation = "윽……!!"

[[dialogue]]
speaker = "ルルゥ"
original = "「あっ、ごめんなさい、なの！\u3000ルルゥの『魅了』の力が働いてしまったみたい、なのっ」"
translation = "「앗, 미안한 거야! 루루의 『매료』 힘이 작동해 버린 것 같은 거야!」"

[[dialogue]]
speaker = "フィオナ"
original = "「魅了ですか？」"
translation = "「매료인가요?」"

[[dialogue]]
speaker = "マハムート"
original = "「これは秘密にしておいてほしいのだけれど、ルルゥはその特性として、魅了の力を持っているわ」"
translation = "「이건 비밀로 해줬으면 좋겠는데, 루루는 그 특성으로서 매료의 힘을 가지고 있단다」"

[[dialogue]]
speaker = "フィオナ"
original = "「もしかしてルルゥさんが密猟者に特に狙われている理由はそれですか？」"
translation = "「혹시 루루 씨가 밀렵꾼들에게 특히 노려지는 이유가 그것 때문인가요?」"

[[dialogue]]
speaker = "ルルゥ"
original = "「……はい、なの」"
translation = "「……맞는 거야」"

[[dialogue]]
speaker = "マハムート"
original = "「ゲシュペンス島でもこの能力は希少なようね。手に入れて悪事を企む者はいくらでもいるでしょう」"
translation = "「게슈펜스 섬에서도 이 능력은 희귀한 모양이더구나. 손에 넣어 악행을 꾸미는 자는 얼마든지 있겠지」"

[[dialogue]]
speaker = "ルルゥ"
original = "「ルルゥはこの力を上手く制御できないの……だから、そのつもりがなくても、今みたいに魅了してしまうことがある、なの……」"
translation = "「루루는 이 힘을 잘 제어하지 못하는 거야…… 그래서 그럴 생각이 없어도 지금처럼 매료해 버릴 때가 있는 거야……」"

[[dialogue]]
speaker = "ルルゥ"
original = "「会長さん、本当にごめんなさい、なの」"
translation = "「회장님, 정말 미안한 거야」"

[[dialogue]]
speaker = "unk"
original = "今はもう大丈夫だから"
translation = "이제 괜찮으니까"

[[dialogue]]
speaker = "unk"
original = "不可抗力なら仕方ない"
translation = "불가항력이라면 어쩔 수 없지"

[[dialogue]]
speaker = "マハムート"
original = "「何も大丈夫ではないわ。こんなに簡単に魅了されてしまうなんて、まだまだ精神修行が足りないようね」"
translation = "「전혀 괜찮지 않아. 이렇게 쉽게 매료되어 버리다니, 아직 정신 수행이 부족한 모양이네」"

[[dialogue]]
speaker = "マハムート"
original = "「後で１から鍛え直してあげるから、覚悟しておきなさい」"
translation = "「나중에 처음부터 다시 단련해 줄 테니 각오하고 있으렴」"

[[dialogue]]
speaker = "unk"
original = "マムに鍛えてもらうと成長も出来るのだけど、苛烈過ぎるその修行はまさに命がけのものだ。"
translation = "마무에게 단련받으면 성장도 할 수 있지만, 너무나 가혹한 그 수행은 그야말로 목숨을 건 것이다."

[[dialogue]]
speaker = "unk"
original = "特に今回は厳しい修行になる……なぜかそんな予感がして、心が曇ってしまうのだった。"
translation = "특히 이번에는 엄격한 수행이 될 것 같다…… 왠지 그런 예감이 들어 마음이 어두워졌다."

