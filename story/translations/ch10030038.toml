[[dialogue]]
speaker = "unk"
original = "晴れ着姿でおめかしをしたヴィーナスとの、新年デートの帰り道──"
translation = "나들이옷 차림으로 한껏 멋을 낸 비너스와의 신년 데이트 귀갓길──"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「今夜は私の家に泊まっていきなさい！」"
translation = "「오늘 밤은 우리 집에서 자고 가!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「また急だな……！？\u3000でも俺、泊まりの準備なんてしてないぞ」"
translation = "「또 갑작스럽네……!? 하지만 나 자고 갈 준비 같은 거 안 했다고.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「大丈夫！\u3000九浄の家は客間もいっぱいあるし。ヘレナちゃんにも連絡はすんでるわ！」"
translation = "「괜찮아! 구죠 집안은 손님방도 많고. 헬레나짱한테도 연락 끝났어!」"

[[dialogue]]
speaker = "unk"
original = "そうしてヴィーナスに連れられ九浄家の門をくぐり、離れのふすまを開けると──"
translation = "그렇게 비너스에게 이끌려 구죠 가문의 대문을 지나 별채의 미닫이문을 열자──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「って、何だこれ……！？」"
translation = "「아니, 뭐야 이건……!?」"

[[dialogue]]
speaker = "unk"
original = "布団が２つ並べて敷いてあった。俺たちをからかうヘレナさんのイタズラだろうか。あの人にも困ったものだな、なんて思った矢先……"
translation = "이불 두 채가 나란히 깔려 있었다. 우리를 놀리려는 헬레나 씨의 장난일까. 그 사람도 참 곤란하군, 이라고 생각한 찰나……"

[[dialogue]]
speaker = "unk"
original = "部屋の隅で、何か妙なものが焚かれていることに気が付いた。"
translation = "방구석에서 뭔가 묘한 것이 피워지고 있다는 것을 깨달았다."

[[dialogue]]
speaker = "unk"
original = "甘ったるく、肌に貼りつくような感触のする……お香？"
translation = "달콤하고 피부에 달라붙는 듯한 감촉이 느껴지는…… 향?"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あ、あれ……この匂い、思ってたより凄すぎ……は、あぁぁっ<emoji=heart04>\u3000ムラムラ、して……ど、ドキドキ、してきちゃった……？<emoji=heart04>」"
translation = "「어, 어라…… 이 냄새, 생각했던 것보다 너무 굉장해…… 하, 아아앗<emoji=heart04> 몸이 달아오르고…… 가, 가슴이 두근거리기 시작했어……?<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "お香の匂いを吸い込むたびに、何だかソワソワと妙な気分になってきた俺たちは、お互い目が合った途端、抱き合って、服を無言で脱がせあって──"
translation = "향 냄새를 들이마실 때마다 왠지 안절부절못하며 묘한 기분이 된 우리는, 서로 눈이 마주치자마자 껴안고 아무 말 없이 옷을 벗기기 시작하며──"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「はぁあぁーっ……はぁぁあーっ……お、お願いぃっ……おち○ちん……おち○ちん欲しいのぉっ……<emoji=heart04>」"
translation = "「하아아―앗…… 하아아―앗…… 부, 부탁이야…… 자지…… 자지 갖고 싶어어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "とろとろに濡れそぼった女性器を見せつけながら、ヴィーナスがまるいお尻をフリフリと揺すっている。"
translation = "걸쭉하게 젖어버린 보지를 내보이면서 비너스가 둥근 엉덩이를 살랑살랑 흔들고 있다."

[[dialogue]]
speaker = "unk"
original = "あのお香のせいなのは間違いない──嗅いだだけで性欲を昂らせるだなんてとんでもない代物だ。"
translation = "그 향 때문인 것이 틀림없다── 맡는 것만으로 성욕을 고조시키다니 말도 안 되는 물건이다."

[[dialogue]]
speaker = "unk"
original = "でも──もうここまで興奮してしまったら、途中でやめるだなんて不可能だった。"
translation = "하지만── 이미 이만큼 흥분해버렸다면 도중에 멈추는 것 따위 불가능했다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふあぁあっ……おち○ちん、すごい。硬ぁい……ふぅう、ふぅうっ……お、お尻でスリスリするだけで、気持ち、いぃっ……<emoji=heart04>」"
translation = "「후아아앗…… 자지, 굉장해. 딱딱해…… 후우, 후우웃…… 어, 엉덩이로 비비는 것만으로도 기분, 좋아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ちょ、ちょっと……う、うぁッ──！？」"
translation = "「자, 잠깐…… 으, 으아앗──!?」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスのお尻が、俺のペニスの裏筋を撫でてくる──油断したらそれだけで射精してしまいそう。"
translation = "비너스의 엉덩이가 내 페니스의 요도 쪽을 훑어 내린다── 방심하면 그것만으로 사정해버릴 것 같다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「こ、これ、欲しいのっ……あなたのおち○ちん、ずぷぅぅってして……はぁぁ、いっぱいぱんぱん、して欲しいのぉ……<emoji=heart04>」"
translation = "「이, 이거 갖고 싶어…… 당신의 자지, 즈부우우우하고…… 하아아, 잔뜩 팡팡, 해줬으면 좋겠어어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "酔っぱらったような声でお尻を振って、ピストンをねだってくるヴィーナスを見て──火が点いた。"
translation = "취한 듯한 목소리로 엉덩이를 흔들며 피스톤질을 보채는 비너스를 보고── 불이 붙었다."

[[dialogue]]
speaker = "unk"
original = "まるで吸い寄せられるみたいに、今まで幾度となく愛してきた彼女の秘部へペニスを挿入する──"
translation = "마치 빨려 들어가듯이 지금까지 몇 번이고 사랑해온 그녀의 비부로 페니스를 삽입한다──"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふぅううッ──あ、あ、ぁ、あ、あぁあ～～～～っ！？<emoji=heart04>」"
translation = "「후우우웃── 아, 아, 아, 아, 아아아아~~~~앗!?<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「う、ぁあぁっ……な、なんだ、これっ……濡れ、すぎっ……！？」"
translation = "「으, 아아앗…… 뭐야, 이건…… 너무 젖었, 잖아……!?」"

[[dialogue]]
speaker = "unk"
original = "挿入しただけで絶頂してしまうヴィーナス。背中を弓なりに反らせてビクビクと震えて、その振動がペニスに走っただけで俺までイキそうになる。"
translation = "삽입한 것만으로 절정에 달해버리는 비너스. 등을 활처럼 젖히며 파르르 떨고, 그 진동이 페니스에 전해지는 것만으로 나까지 갈 것 같다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ぁあぁああっ……はぁあぁあ～っ……<emoji=heart04>\u3000な、何これ、何これぇっ……いつもより、おち○ちん、感じる、ぅっ<emoji=heart04>」"
translation = "「아아아아앗…… 하아아아아~앗……<emoji=heart04> 뭐, 뭐야 이거, 뭐야 이거어…… 평소보다 자지, 느껴져어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ヴィーナス、ちょっと……力、抜いてくれっ……！」"
translation = "「비너스, 잠깐…… 힘 좀 빼줘……!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「む、無理ぃっ……あ、ぁぁぁ、ぁっ<emoji=heart04>\u3000あなたのおち○ちん、好きだものぉっ……は、離したくない、からぁっ……！」"
translation = "「무, 무리야아…… 아, 아아아, 앗<emoji=heart04> 당신의 자지, 좋은걸요오…… 노, 놓치고 싶지 않으니까아……!」"

[[dialogue]]
speaker = "unk"
original = "また男心をくすぐるようなことを……！\u3000ヴィーナスを感じさせたい。俺の、可愛くて仕方のない、エッチな彼女を愛したい。"
translation = "또 남심을 자극하는 소리를……! 비너스를 느끼게 하고 싶다. 나의, 사랑스러워 어쩔 줄 모르는 야한 여자친구를 사랑하고 싶다."

[[dialogue]]
speaker = "unk"
original = "強い気持ちに背中を押されて──動く。"
translation = "강렬한 감정에 등을 떠밀려── 움직인다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あ、ぁあ、あぁ、あぁ～っ<emoji=heart04>\u3000おち○ちん、ふあ、あぁあっ<emoji=heart04>\u3000気持ちいいところ、す、すっごく、当たる、ふぁ、あぁあ、ぁっ<emoji=heart04>」"
translation = "「아, 아아, 아아, 아아~앗<emoji=heart04> 자지, 후아, 아아앗<emoji=heart04> 기분 좋은 곳에, 저, 정말로, 딱 닿아, 하아, 아아아, 아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「も、もっと深いところ、してっ<emoji=heart04>\u3000お尻掴んで、ぐい、ぐいぐいって、奥、してぇっ<emoji=heart04>」"
translation = "「더, 더 깊은 곳까지 해줘어<emoji=heart04> 엉덩이 잡고 꾹, 꾹꾹하고 깊숙이, 해줘어어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "汗ばんだヴィーナスのお尻をぎゅうっと掴みながら、彼女の好きなところをペニスで集中的に突き込む。"
translation = "땀에 젖은 비너스의 엉덩이를 꽉 잡으면서 그녀가 좋아하는 곳을 페니스로 집중적으로 찔러 넣는다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ひぁあああっ！？<emoji=heart04>\u3000あ、ぁーっ<emoji=heart04>\u3000あーっ！<emoji=heart04>\u3000あぁーっ<emoji=heart04>\u3000そこ好きっ、おち○ちん気持ちぃ、いぃっ<emoji=heart04>\u3000んんぁ、あ、ぁあ、ぁああっ<emoji=heart04>」"
translation = "「히아아아앗!?<emoji=heart04> 아, 아―앗<emoji=heart04> 아―앗!<emoji=heart04> 아아―앗<emoji=heart04> 거기 좋아, 자지 기분 좋아아, 아아앗<emoji=heart04> 응아, 아, 아아, 아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「も、もっとお尻、ぎゅうってして<emoji=heart04>\u3000指の痕、ついちゃうくらい、ぎゅうっって──ぁ、ぁ、あぁ、あぁああっ<emoji=heart04>」"
translation = "「더, 더 엉덩이 꽉 해줘<emoji=heart04> 손가락 자국 남을 정도로 꽉── 아, 아, 아아, 아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "普段なら躊躇していたと思う。ヴィーナスと交わる時は、優しく抱きしめたり、頭を撫でたりしてゆっくり愛し合うことが多かった。"
translation = "평소라면 주저했을 것이다. 비너스와 관계를 가질 때는 부드럽게 안아주거나 머리를 쓰다듬으며 천천히 사랑을 나누는 경우가 많았다."

[[dialogue]]
speaker = "unk"
original = "大切な恋人だから、丁重に油断せず、間違っても傷つけないように。そう思っていた──だけど、今は無理だった。"
translation = "소중한 연인이기에 정중하게 방심하지 않고, 실수로라도 상처 입히지 않도록. 그렇게 생각했었다── 하지만 지금은 무리였다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ひゃわぁぁああっ<emoji=heart04>\u3000あ、あぁあっ<emoji=heart04>\u3000お尻っ<emoji=heart04>\u3000お尻ぎゅーって<emoji=heart04>\u3000そ、それぇっ<emoji=heart04>\u3000気持ちぃ、ぃいっ<emoji=heart04>\u3000あぁんっ、好き、それ好きぃいいっ<emoji=heart04>」"
translation = "「히야와아아앗<emoji=heart04> 아, 아아앗<emoji=heart04> 엉덩이<emoji=heart04> 엉덩이 꽉꽉 해줘<emoji=heart04> 그, 그거어<emoji=heart04> 기분 좋아, 아앗<emoji=heart04> 아앙, 좋아, 그거 좋아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "部屋中に漂うお香の香りのせいでブレーキが利かない。もっちり指に吸い付くお尻に痕がつくくらい、指に力を込めてしまう。"
translation = "방 안 가득 감도는 향의 냄새 때문에 브레이크가 듣지 않는다. 말랑한 손가락에 달라붙는 엉덩이에 자국이 남을 정도로 손가락에 힘을 주고 만다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「いつもより太いっ……おち○ちん、太いのぉっ……ふああぁあ、あっ<emoji=heart04>」"
translation = "「평소보다 굵어…… 자지, 굵어어…… 후아아아, 앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ヴィーナスのも、いつもより……狭いっ……！」"
translation = "「비너스 것도, 평소보다…… 좁아……!」"

[[dialogue]]
speaker = "unk"
original = "ピストンで引き抜こうとするたび、名残惜しそうにちゅうちゅう吸い付いてくる膣穴。"
translation = "피스톤으로 뽑아내려 할 때마다, 아쉬운 듯이 쫍쫍 달라붙어 오는 질 구멍."

[[dialogue]]
speaker = "unk"
original = "ペニスを押し込む時だって、俺が腰を振っているのか、彼女の女性器に引っ張られているのか──よくわからないくらいだ。"
translation = "페니스를 밀어 넣을 때도, 내가 허리를 흔드는 건지, 그녀의 성기에 이끌려가는 건지── 잘 모를 정도다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「んんぅっ<emoji=heart04>\u3000あ、ぁぁあんっ<emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000ふぁあ、あぁあっ<emoji=heart04>\u3000あぁっ、あっあっあっ<emoji=heart04>\u3000ずぷずぷ、それもっと、もっとぉ<emoji=heart04>」"
translation = "「으응으읏<emoji=heart04> 아, 아아앙<emoji=heart04> 으응으읏<emoji=heart04> 화아, 아아앗<emoji=heart04> 아앗, 앗앗앗<emoji=heart04> 즈푸즈푸, 그거 더, 더어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「んっふぅ、うぅっ<emoji=heart04>\u3000あぁ、ぁあ～っ<emoji=heart04>\u3000あっあっ、ぁぁあ～っ！<emoji=heart04>\u3000はぁ、ふぅっ……喉、か、渇いちゃう、ぅうっ……<emoji=heart04>」"
translation = "「음후우, 우읏<emoji=heart04> 아아, 아아~앗<emoji=heart04> 앗앗, 아아아~앗!<emoji=heart04> 하아, 후우…… 목, 이, 말라버려, 어읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "２人とも汗みどろになっているけれど、荒い呼吸が止まらず口の中はカラカラだ。どちらからともなく、唇を寄せ合った。"
translation = "두 사람 모두 땀투성이가 되었지만, 거친 호흡이 멈추지 않아 입안은 바짝 말라 있다. 누가 먼저랄 것도 없이 입술을 맞댔다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「んんぅちゅるぅっ<emoji=heart04>\u3000れぇええ～っ<emoji=heart04>\u3000ちゅぅ、んちゅるぅ、ちゅぱ、れぇろぉ、んちゅるぅ、れちゅるうぅ<emoji=heart04>」"
translation = "「으응으쮸루읏<emoji=heart04> 레에에에~엣<emoji=heart04> 쮸우, 음쮸루, 쮸빠, 레로오, 음쮸루, 레쮸루우우<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ぷはあっ──<emoji=heart04>\u3000はふぅ、んんぅっ……バックでも、ちゃんとチューしてくれるのっ……うれ、し、ぃっ……<emoji=heart04>」"
translation = "「푸하아──<emoji=heart04> 하후우, 으응으읏…… 백에서도, 제대로 키스해주는구나…… 기뻐, 어, 엇……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは頭を撫でられるだけでなく、キスをするのも大好きだった。体勢的にちょっと苦しくても、キスの時間は必ず取らなければ拗ねてしまう。"
translation = "비너스는 머리를 쓰다듬어지는 것뿐만 아니라, 키스하는 것도 정말 좋아했다. 자세 때문에 조금 힘들어도, 키스 시간은 반드시 챙기지 않으면 삐지고 만다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ちゅぅうる、んれぇええ、ちゅぱっ、んちゅるぅ、れちゅれちゅ、んちゅうぅ、れぇ～っ<emoji=heart04>\u3000ぷはぁ<emoji=heart04>」"
translation = "「쮸우우루, 음레에에, 쮸빠앗, 음쮸루, 레쮸레쮸, 음쮸우우, 레에~엣<emoji=heart04> 푸하아<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「キスしながら、あなたのおち○ちんで突かれるの、し、幸せ、ぇっ……<emoji=heart04>」"
translation = "「키스하면서, 당신의 자지로 찔리는 거, 행, 행복해……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺もヴィーナスと繋がりながら、キスするの、幸せだ……っ」"
translation = "「나도 비너스와 이어져서, 키스하는 거, 행복해……!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「嬉しいっ……ん、んんぅっ<emoji=heart04>\u3000いっぱい、おま○こキュッキュッてするから、もっとぉっ……んちゅるぅう<emoji=heart04>」"
translation = "「기뻐…… 음, 으응으읏<emoji=heart04> 잔뜩, 보지 꽉꽉 할 테니까, 더어…… 음쮸루우우」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「んぅじゅるるっ<emoji=heart04>\u3000ぢゅるちゅぱっ<emoji=heart04>\u3000れぇれろぉっ<emoji=heart04>\u3000んぅちゅぱっ、ちゅぅぱっ、ちゅぱ、れりゅれりゅ、んちゅるぅう<emoji=heart04>」"
translation = "「음으쥬루루<emoji=heart04> 쥬루쮸빠앗<emoji=heart04> 레레로오옷<emoji=heart04> 음으쮸빠, 쮸우빠, 쮸빠, 레류레류, 음쮸루우우<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスが目を細めてキスを受け入れてくれるのが嬉しい。夢中でストロークして、彼女のお尻を波打たせるのも楽しい。"
translation = "비너스가 눈을 가늘게 뜨고 키스를 받아들여 주는 것이 기쁘다. 정신없이 스트로크하며 그녀의 엉덩이를 일렁이게 하는 것도 즐겁다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「もっと<emoji=heart04>\u3000もっとキスっ……ベロ、吸ってっ<emoji=heart04>\u3000吸わせてっ<emoji=heart04>\u3000あなたのお口、好き、キス好き、あなたが好きぃ……んちゅるぅ<emoji=heart04>」"
translation = "「더<emoji=heart04> 더 키스…… 혓바닥, 빨아줘<emoji=heart04> 빨게 해줘<emoji=heart04> 당신의 입, 좋아, 키스 좋아, 당신이 좋아…… 음쮸루」"

[[dialogue]]
speaker = "unk"
original = "舌を絡めるたびに膣穴の締まりが良くなる。よだれを注ぐと、本当に嬉しそうに喉を鳴らしてこくこく飲んでくれる。甘えん坊のひな鳥みたいだ。"
translation = "혀를 섞을 때마다 질 구멍의 조임이 좋아진다. 침을 흘려 넣어주면, 정말 기쁜 듯이 목을 울리며 꿀꺽꿀꺽 마셔준다. 응석꾸러기 아기 새 같다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ぷっはぁっ<emoji=heart04>\u3000はーっ<emoji=heart04>\u3000はぁ～っ<emoji=heart04>\u3000えへぇっ……よだれ、つぅ～って繋がって……え、えっちぃ……<emoji=heart04>」"
translation = "「푸핫<emoji=heart04> 하아<emoji=heart04> 하아~<emoji=heart04> 에헤헷…… 침이, 주르륵 하고 이어져서…… 에, 에로해……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「今日のあなた、乱暴にぱんぱんって、してくれてるけどっ……も、もっと激しく、して？<emoji=heart04>\u3000大好きなあなたに、もっともっと、乱暴にされたいのっ<emoji=heart04>」"
translation = "「오늘의 당신, 난폭하게 팡팡, 해주고 있지만…… 더, 더 격렬하게, 해줘?<emoji=heart04> 정말 좋아하는 당신에게, 더욱더, 난폭하게 다뤄지고 싶어<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「で、でも……その、本当にまずいんだ、今。このお香……む、ムラムラ、凄くて……」"
translation = "「하, 하지만…… 그게, 정말 위험해, 지금. 이 향기…… 바, 발정 나서, 장난 아니라고……」"

[[dialogue]]
speaker = "unk"
original = "ヘレナさんのイタズラに乗っかって、ヴィーナスをこれ以上乱暴に犯すのは……"
translation = "헬레나 씨의 장난에 올라타서, 비너스를 이 이상 난폭하게 범하는 건……"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「いいのっ……こ、このお香、私がヘレナちゃんに頼んで、あぁん<emoji=heart04>\u3000置いてもらったやつ、だからあっ……<emoji=heart04>」"
translation = "「괜찮아…… 이, 이 향기, 내가 헬레나짱에게 부탁해서, 아앙<emoji=heart04> 피워달라고 한 거니까앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「………………へ？」"
translation = "「………………에?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あぁぁっ<emoji=heart04>\u3000い、言っちゃったぁ……<emoji=heart04>\u3000え、えへへぇっ……あなた、いっつも優しいえっち、ばっかりしてくれる、からぁ……<emoji=heart04>」"
translation = "「아아아앗<emoji=heart04> 마, 말해버렸다……<emoji=heart04> 에, 에헤헤…… 당신, 언제나 다정한 섹스만, 해주니까아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「はぁぁんっ<emoji=heart04>\u3000た、たまには乱暴に犯してもらいたいんだけど……はふぅ<emoji=heart04>\u3000どうしたらいいかって聞いたら、ヘレナちゃんがね～っ……<emoji=heart04>」"
translation = "「하아아앙<emoji=heart04> 가, 가끔은 난폭하게 범해지고 싶었는데…… 하후우<emoji=heart04> 어떻게 하면 좋을지 물어봤더니, 헬레나짱이 말이야~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "発情するお香を準備してくれた、というわけらしい。"
translation = "발정하는 향을 준비해 주었다는 모양이다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ヴィーナスは俺に……乱暴に犯して欲しかったから、こんなものまで用意したのか」"
translation = "「비너스는 나한테…… 난폭하게 범해지고 싶어서, 이런 것까지 준비한 건가」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「う、うんっ……<emoji=heart04>\u3000そうなのっ、頭撫でられるのも、優しいキスも、好きだけどぉ……<emoji=heart04>」"
translation = "「으, 응……<emoji=heart04> 그런 거야, 머리 쓰다듬어 주는 것도, 다정한 키스도, 좋지만……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「はぁぁぁっ<emoji=heart04>\u3000大好きなあなたに、乱暴に求められたかったの……<emoji=heart04>\u3000き、嫌いに、なった？」"
translation = "「하아아아앗<emoji=heart04> 정말 좋아하는 당신에게, 난폭하게 원해지고 싶었어……<emoji=heart04> 시, 싫어하게 됐어?」"

[[dialogue]]
speaker = "unk"
original = "布団を２組敷いたのも、性欲が昂るお香を置いたのも……全てはヴィーナスが望んだこと。"
translation = "이불을 두 채 깔아둔 것도, 성욕이 고조되는 향을 둔 것도…… 모든 것은 비너스가 바란 일."

[[dialogue]]
speaker = "unk"
original = "そんな事実を知らされて──我慢できる彼氏がいるわけがない。"
translation = "그런 사실을 알게 되고── 참을 수 있는 남자친구가 있을 리 없다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──もう出すまで止まらないからな」"
translation = "「──이제 쌀 때까지 안 멈출 거니까」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「うんっ<emoji=heart04>\u3000──ふぁぁ、あぁあぁああっ！？<emoji=heart04>\u3000す、すごっ、すごい強い、ぱんぱん、来たぁっ……！<emoji=heart04>」"
translation = "「응<emoji=heart04> ──하아, 아아아아아앗!?<emoji=heart04> 서, 엄청, 엄청 강한, 팡팡, 이 왔어어……!<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あ、あぁーっ<emoji=heart04>\u3000あっあっあっあっあっ<emoji=heart04>\u3000奥、そんなところ知らないっ──ひぁあ、ぁ！<emoji=heart04>\u3000あ、あーっ<emoji=heart04>\u3000あーーーっ！<emoji=heart04>」"
translation = "「아, 아아ー앗<emoji=heart04> 앗앗앗앗앗<emoji=heart04> 안쪽, 그런 곳 몰라앗──히아아, 아!<emoji=heart04> 아, 아ー앗<emoji=heart04> 아ーーー앗!<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そこいぃいっ<emoji=heart04>\u3000気持ちよすぎて、ひぁあっ<emoji=heart04>\u3000あぁあ、ぁあぁ～っ！<emoji=heart04>」"
translation = "「거기 좋아앗<emoji=heart04> 너무 기분 좋아서, 히아앗<emoji=heart04> 아아아, 아아아~앗!<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "思いきり犯して欲しいと言ったのに、ヴィーナスのお尻が俺から逃げようとする。"
translation = "마음껏 범해달라고 말해놓고는, 비너스의 엉덩이가 나로부터 도망치려 한다."

[[dialogue]]
speaker = "unk"
original = "強すぎる快感に、意思とは無関係に体が動いているのかも──俺はしっかりと彼女のお尻を掴み直して、手加減一切なしのピストンをお見舞いしていく。"
translation = "너무 강한 쾌감에, 의지와는 관계없이 몸이 움직이는 걸지도 모른다── 나는 제대로 그녀의 엉덩이를 다시 붙잡고, 사정없는 피스톤을 선사해 나간다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ヴィーナスのお尻、めちゃくちゃエロいっ。ヴィーナスの全部、俺のものにしていいんだなっ！」"
translation = "「비너스 엉덩이, 엄청나게 에로해. 비너스의 전부, 내 것으로 만들어도 되는 거지!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「う、うんっ<emoji=heart04>\u3000うんっ<emoji=heart04>\u3000私のこと、あなたのものにしてぇっ<emoji=heart04>\u3000──ぁ、ぁぁあぁ！？<emoji=heart04>\u3000うぁ、ぁああっ<emoji=heart04>\u3000奥だめぇ、ぅあっ<emoji=heart04>\u3000あーっ！<emoji=heart04>」"
translation = "「으, 응<emoji=heart04> 응<emoji=heart04> 나를, 당신의 것으로 만들어줘어<emoji=heart04> ──아, 아아아아!?<emoji=heart04> 우아, 아아앗<emoji=heart04> 안쪽 안 돼애, 으앗<emoji=heart04> 아ー앗!<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ポルチオ周りをぐりぐりと突くと、長い髪を振り乱して喘ぐヴィーナス。"
translation = "포르치오 주변을 그리그리 찌르자, 긴 머리카락을 흩날리며 신음하는 비너스."

[[dialogue]]
speaker = "unk"
original = "汗だくのほっぺに髪の毛が貼りついて、普段の元気溌溂な印象と大違いの──いやらしい、とろけ顔。"
translation = "땀에 젖은 뺨에 머리카락이 달라붙어, 평소의 활기 넘치는 인상과는 딴판인── 야릇하게, 녹아내린 얼굴."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「乱暴に犯されるの、実際にやられて、どうだっ？」"
translation = "「난폭하게 범해지는 거, 실제로 당해보니, 어때?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「しゅ、しゅきぃっ<emoji=heart04>\u3000はぁぁぁん<emoji=heart04>\u3000だいしゅきぃっ<emoji=heart04>\u3000あぁん<emoji=heart04>\u3000優しいあなたの、乱暴なえっちっ……あ、あ、あぁぁああ～<emoji=heart04>\u3000しゅきぃい～っ<emoji=heart04>」"
translation = "「조, 좋아아앗<emoji=heart04> 하아아아앙<emoji=heart04> 너무 좋아아앗<emoji=heart04> 아앙<emoji=heart04> 다정한 당신의, 난폭한 섹스으…… 아, 아, 아아아아아~<emoji=heart04> 좋아해애~앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "全身からくたりと力が抜けているのに、お尻だけは俺がピストンしやすいように高く掲げるヴィーナス。"
translation = "온몸에서 힘이 쭉 빠져 있는데도, 엉덩이만큼은 내가 피스톤 하기 쉽도록 높게 치켜드는 비너스."

[[dialogue]]
speaker = "unk"
original = "あまりにいじらしくて、ヴィーナスのむき出しの首筋に全力で吸い付いていた。"
translation = "너무나도 애처로워서, 비너스의 드러난 목덜미에 전력으로 매달려 빨았다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「んんぁあっ！？<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んやぁあ、だめぇえ<emoji=heart04>\u3000くびすじっ<emoji=heart04>\u3000キスマーク残る、残っちゃうぅっ<emoji=heart04>」"
translation = "「으응아앗!?<emoji=heart04> 앗<emoji=heart04> 응야아아, 안 돼애애<emoji=heart04> 목덜미잇<emoji=heart04> 키스 마크 남아, 남아버려어앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「痕、残してほしかったんだろ？」"
translation = "「흔적, 남겨주길 바랐던 거 아냐?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「で、でもぉっ、恥ずかしっ<emoji=heart04>\u3000明日、お家のみんなに見られ、ちゃう、ぅ──あぁぁぁん<emoji=heart04>\u3000はぁぁっ、だめ、だめ、だめぇええっ<emoji=heart04>」"
translation = "「하, 하지만으앗, 부끄러워엇<emoji=heart04> 내일, 집안사람들에게 들켜버려, 어──아아아아앙<emoji=heart04> 하아아앗, 안 돼, 안 돼, 안 돼애애앳<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「駄目じゃないだろ。もっとして、だろ？\u3000ほら──」"
translation = "「안 되는 게 아니잖아. 더 해달라고, 할 거지? 자──」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「～～～～～っ<emoji=heart04>\u3000も、もっとしてぇっ<emoji=heart04>\u3000いっぱいキスマーク、付けてほしいのぉっ！<emoji=heart04>\u3000あぁぁぁん<emoji=heart04>\u3000好きぃっ<emoji=heart04>\u3000うぁっ<emoji=heart04>\u3000ぁ、あ、あぁ、あ、あぁっ<emoji=heart04>」"
translation = "「~~~~~~~~~앗<emoji=heart04> 더, 더 해줘어엇<emoji=heart04> 잔뜩 키스 마크, 남겨줬으면 좋겠어어엇!<emoji=heart04> 아아아아앙<emoji=heart04> 좋아해앗<emoji=heart04> 우아앗<emoji=heart04> 아, 아, 아아, 아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "キスマークを付けるたびにヴィーナスの体が震え、ペニスへの締め付けも強まっていく。"
translation = "키스 마크를 남길 때마다 비너스의 몸이 떨리고, 페니스를 조이는 힘도 강해져 간다."

[[dialogue]]
speaker = "unk"
original = "名残惜しいけれど……もう、俺も限界だ。"
translation = "아쉽지만…… 이제, 나도 한계다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ぁ、ぁぁああっ！<emoji=heart04>\u3000イく？\u3000もう、イくのっ？<emoji=heart04>\u3000いいよ、出してっ<emoji=heart04>\u3000精液、いっぱい、出して、出して、出してっ<emoji=heart04>」"
translation = "「아, 아아아앗!<emoji=heart04> 가? 벌써, 가는 거야앗?<emoji=heart04> 괜찮아, 싸줘어엇<emoji=heart04> 정액, 잔뜩, 내보내 줘, 내보내 줘, 내보내 줘엇<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「どこにっ？」"
translation = "「어디에?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「中っ！<emoji=heart04>\u3000中に出してぇっ<emoji=heart04>\u3000あぁぁん<emoji=heart04>\u3000好きだから<emoji=heart04>\u3000中出し<emoji=heart04>\u3000ふあぁぁん<emoji=heart04>\u3000してっ<emoji=heart04>\u3000してしてしてっ<emoji=heart04>\u3000してぇええっ！<emoji=heart04>」"
translation = "「안에!<emoji=heart04> 안에 싸줘어엇<emoji=heart04> 아아아앙<emoji=heart04> 좋아하니까<emoji=heart04> 질내사정<emoji=heart04> 후아아아앙<emoji=heart04> 해줘엇<emoji=heart04> 해줘해줘해줘엇<emoji=heart04> 해줘어어어엇!<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "恋人のおねだりに応えて、根元までしっかりとペニスを差し込み──ヴィーナスの弱いところに亀頭を押し当てながら、放った。"
translation = "연인의 부탁에 응하여, 뿌리까지 확실하게 페니스를 밀어 넣고── 비너스의 약한 곳에 귀두를 짓누르며, 뿜어냈다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あぁぁっ、あぁぁぁっ<emoji=heart04><emoji=heart04>\u3000んんぁぁぁああぁあああぁあああぁあ～～～～～っ！<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아앗, 아아아앗<emoji=heart04><emoji=heart04> 응으아아아아아아아아아아아아아아아아아~~~~~앗!<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あぁぁぁん<emoji=heart04>\u3000ふあぁぁあっ、あ、ぁぁあ、ぁぁああ～っ……！<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 아아아앙<emoji=heart04> 후아아아앗, 아, 아아아, 아아아아~앗……!<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「す、すごぃっ……んぁ、ぁ、ああぁぁ～～っ……はぁあっ……うぁっ……あぁあ～っ……<emoji=heart04>」"
translation = "「서, 엄청나앗…… 응아, 아, 아아아아~~앗…… 하아앗…… 우아앗…… 아아아~앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "最後の一滴まで、引き絞るように出して、出して、出し尽くして──ようやく射精が終わった。"
translation = "마지막 한 방울까지, 쥐어짜듯이 내보내고, 내보내고, 다 내보내고── 마침내 사정이 끝났다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「はぁああっ……ふぅううっ……す、すっごい、量……精液、おま○こから、どんどん、溢れてくる、ぅ……<emoji=heart04>」"
translation = "「하아아앗…… 후으으으…… 서, 서엄청난, 양…… 정액, 보지에서, 계속해서, 흘러넘쳐어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「はぁぁ……乱暴なエッチ……気持ち、良かったあ……<emoji=heart04>\u3000あなたに、求めてもらえるの、ふふっ<emoji=heart04>\u3000幸せぇ<emoji=heart04>」"
translation = "「하아아…… 난폭한 섹스…… 기분, 좋았어아……<emoji=heart04> 당신이, 원해주는 거, 후훗<emoji=heart04> 행복해애<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "射精が終わった後は、ゆったりピロートークをすることも多い、俺とヴィーナスだけど……"
translation = "사정이 끝난 후에는, 느긋하게 필로우 토크를 하는 경우도 많은 나와 비너스지만……"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「もう一回、いいか……？」"
translation = "「한 번 더, 해도 될까……?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「──うんっ<emoji=heart04>\u3000私も……し、したいって、思ってた、から……<emoji=heart04>」"
translation = "「──응<emoji=heart04> 나도…… 하, 하고 싶다고, 생각했, 으니까……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "お香のせいか。新年明けての激しい姫始めでテンションが上がっているのか──もうどっちでもいい。"
translation = "향기 때문일까. 새해를 맞이하는 격렬한 첫 성관계에 텐션이 오른 걸까── 이제 어느 쪽이든 상관없다."

[[dialogue]]
speaker = "unk"
original = "九浄家の敷地は膨大で、ここは人の寄り付かない離れ。"
translation = "쿠죠 가문의 부지는 방대하고, 이곳은 사람이 들르지 않는 별채."

[[dialogue]]
speaker = "unk"
original = "ヴィーナスを思いきり喘がせても聞こえることはないだろう。遠慮はいらない。"
translation = "비너스를 마음껏 신음하게 해도 들릴 일은 없을 것이다. 사양할 필요는 없다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あなたが満足するまで……いっぱい愛して？<emoji=heart04>」"
translation = "「당신이 만족할 때까지…… 잔뜩 사랑해줘?<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "とろけた眼差しのヴィーナスに誘われて、２回戦、３回戦──俺たちは汗だくになりながら夜通し、夢中で交わるのだった──"
translation = "황홀한 눈빛의 비너스에게 유혹되어, 2회전, 3회전── 우리는 땀범벅이 된 채 밤새도록, 정신없이 섞이는 것이었다──"

