[[dialogue]]
speaker = "unk"
original = "第２話,友チョコと本命チョコと,P"
translation = "제2화, 우정 초코와 진심 초코, P"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「うぅ……記憶が曖昧ですけど、私、会長さまとイレーナさまにご迷惑をおかけしてしまったような……？」"
translation = "「으으…… 기억이 애매합니다만, 제가 회장님과 이레나 님께 폐를 끼쳐버린 듯한……?」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「お詫びと日頃の感謝を込めてプレゼントをお渡ししたいのですけど……」"
translation = "「사죄와 평소의 감사를 담아 선물을 드리고 싶습니다만……」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「シスターが特定の方に入れ込むのはよろしくないと、イレーナさまはおっしゃっていましたし……バレンタインはあまりお好きではなさそうでしたし……」"
translation = "「시스터가 특정인에게 빠지는 건 좋지 않다고 이레나 님이 말씀하셨고…… 밸런타인은 별로 좋아하지 않으시는 것 같았고……」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「他に何かいい方法は──」"
translation = "「달리 뭔가 좋은 방법은──」"

[[dialogue]]
speaker = "unk"
original = "どうしたの、シャロン"
translation = "무슨 일이야, 샤론."

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「きゃっ！？\u3000か、会長さま」"
translation = "「꺄악!? 회, 회장님.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "（ど、どうしましょうっ！？\u3000会長さまに直接尋ねるのは、ちょっと恥ずかしいです──そうだっ！）"
translation = "（어, 어쩌죠!? 회장님께 직접 여쭤보는 건 조금 부끄러워요── 그렇지!）"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「も、もうじきバレンタインですよねっ！」"
translation = "「이, 이제 곧 밸런타인이죠!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ちょうどいい機会ですし、日頃の感謝を込めて、イレーナさまにプレゼントをお贈りしたいのですけど……」"
translation = "「마침 좋은 기회이기도 하니, 평소의 감사를 담아 이레나 님께 선물을 드리고 싶습니다만……」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「イレーナさまはあまりバレンタインを好ましく思っていないようでしたので、ご迷惑になってしまうかもと思い……どうでしょうか？」"
translation = "「이레나 님은 밸런타인을 별로 좋게 생각하지 않으시는 것 같아서, 민폐가 될지도 모른다는 생각에…… 어떨까요?」"

[[dialogue]]
speaker = "unk"
original = "友チョコって文化もあるし、いいと思う"
translation = "우정 초코라는 문화도 있고, 괜찮다고 봐."

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「友チョコ……お友達同士でチョコレートを贈り合うのですか……！\u3000なるほど、そのような文化もあるんですね！」"
translation = "「우정 초코…… 친구끼리 초콜릿을 주고받는 건가요……! 과연, 그런 문화도 있군요!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「親友のイレーナさまに贈るなら問題ありませんよねっ！\u3000ありがとうございます、会長さまっ！」"
translation = "「절친인 이레나 님께 드리는 거라면 문제없겠네요! 감사합니다, 회장님!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "（イレーナさまには友チョコをお渡しすることに決めましたけど、会長さまには──）"
translation = "（이레나 님께는 우정 초코를 드리기로 정했지만, 회장님께는──）"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「どうしたの、シャロン」"
translation = "「무슨 일이야, 샤론.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「イ、イレーナさまっ！\u3000その……バレンタインについて、ひとつご相談が……」"
translation = "「이, 이레나 님! 그…… 밸런타인에 대해 한 가지 상담이……」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「前にシスターは特定の方に入れ込むのはよろしくないとおっしゃっていましたけれど……」"
translation = "「전에 시스터는 특정인에게 빠지는 건 좋지 않다고 말씀하셨습니다만……」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「あの……会長さまにチョコレートをお渡ししてもよろしいものでしょうか……？」"
translation = "「저기…… 회장님께 초콜릿을 드려도 괜찮은 걸까요……?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「んー……それって、本命？」"
translation = "「음─…… 그거, 진심 초코야?」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「あ、えっ、えっと、その……は、はい……」"
translation = "「아, 에, 음, 그…… 네, 네……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「なら問題ないでしょ、好きなように渡しちゃえば？」"
translation = "「그럼 문제없잖아, 마음 가는 대로 줘버려.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「えっ！？\u3000でも──」"
translation = "「엣!? 하지만──」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「教皇庁の教えじゃ貞淑にって言ってるけど、本命がちゃんと決まってるなら大丈夫でしょ。だいたい、流星教皇だって妻子持ちだし」"
translation = "「교황청 가르침에는 정숙하라고 하지만, 진심인 상대가 제대로 정해져 있다면 괜찮겠지. 애초에 유성 교황님도 처자식이 있는걸.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「それにシャロンの性格的にも、スイッチ入っちゃったんなら、もう止まんなくない？」"
translation = "「게다가 샤론 성격상, 스위치가 켜졌다면 이제 못 멈추지 않아?」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「は、はいっ！\u3000さすがは大親友のイレーナさま……私のことをよくご存じなんですねっ、嬉しいです。ふふ」"
translation = "「네, 네! 역시 대친우인 이레나 님…… 저에 대해 잘 알고 계시네요, 기뻐요. 후후.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ちょっ……大親友はやめなさいってば」"
translation = "「잠깐…… 대친우는 관두라니까.」"

[[dialogue]]
speaker = "unk"
original = "シャロンに呼び出されて大聖堂に向かうと、そこにはイレーナの姿もあった。"
translation = "샤론의 부름을 받고 대성당으로 향하자, 그곳에는 이레나의 모습도 있었다."

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「会長さま、イレーナさま。お呼び立てに応じて、足を運んでいただき、ありがとうございます」"
translation = "「회장님, 이레나 님. 부름에 응해 발걸음을 해주셔서 감사합니다.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「シャロンがあんたに言いたいことがあるんだって」"
translation = "「샤론이 너한테 할 말이 있대.」"

[[dialogue]]
speaker = "unk"
original = "シャロンがイレーナに言いたいことがあるんだろ？"
translation = "샤론이 이레나에게 할 말이 있는 거 아냐?"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「は？\u3000なんであたしに──」"
translation = "「하? 왜 나한테──」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「お呼び立てしたのは他でもありません。おふたりに私から伝えたいことがありましたので……まずはイレーナさま」"
translation = "「부른 것은 다른 게 아닙니다. 두 분께 제가 전하고 싶은 말이 있었기에…… 우선 이레나 님.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「私、イレーナさまのことが大好きなんですっ！」"
translation = "「저, 이레나 님이 정말 좋아요!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あ、あたし……？\u3000言う相手、間違ってんでしょ」"
translation = "「나, 나……? 말할 상대, 틀렸잖아.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「いいえ、イレーナさまで間違いありません。何度迷惑をかけても優しく接していただき、感謝の言葉もありません」"
translation = "「아니요, 이레나 님이 맞습니다. 몇 번을 폐를 끼쳐도 상냥하게 대해주셔서 감사의 말로 다 못 할 정도예요.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「私からのせめてものお礼です。これからも親友として、末永くお付き合いくださいっ」"
translation = "「저의 작은 보답입니다. 앞으로도 친구로서 오랫동안 잘 부탁드려요!」"

[[dialogue]]
speaker = "unk"
original = "シャロンはプレゼントの包装を差し出す。"
translation = "샤론은 선물 포장을 내민다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「親友とか、末永くとか、そんなこっ恥ずかしいこと、よく真顔で言えるわね……」"
translation = "「친구라니, 오랫동안이라니, 그런 낯간지러운 소리를 잘도 정색하며 하네……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「まぁ、あたしのために用意してくれたっていうんなら受け取るわ。ありがとね」"
translation = "「뭐, 날 위해 준비해줬다니 받을게. 고마워.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ありがとうございますっ！」"
translation = "「감사합니다!」"

[[dialogue]]
speaker = "unk"
original = "めでたし、めでたし"
translation = "메데타시 메데타시."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「何、終わったみたいな空気出してんの。ほら、シャロン、女神様の前で誓いのチョコを渡すチャンスよ」"
translation = "「뭐야, 끝난 것 같은 분위기 내지 마. 자, 샤론, 여신님 앞에서 맹세의 초코를 건넬 찬스야.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「会長さまっ、私の想い、受け取ってくださいっ！」"
translation = "「회장님, 저의 마음을 받아주세요!」"

[[dialogue]]
speaker = "unk"
original = "俺にも！？"
translation = "나한테도!?"

[[dialogue]]
speaker = "unk"
original = "震える腕で差し出されたのは、ハートのシールが貼られた箱。"
translation = "떨리는 팔로 내밀어진 것은 하트 스티커가 붙은 상자."

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「会長さまには……チョコレートのカヌレを作りました」"
translation = "「회장님께는…… 초콜릿 까눌레를 만들었습니다.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「イレーナさまに相談したら、女神様の信徒は貞淑に……でも本気の本命なら構わないとのことでしたので」"
translation = "「이레나 님께 상담했더니, 여신님의 신도는 정숙하게…… 하지만 진심인 상대라면 상관없다고 하셨기에.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「世界中の皆様に捧げる慈愛と、特定の方に向ける愛は別物……私の本命の愛は、会長さまだけのものなんですっ」"
translation = "「세상 모든 분께 바치는 자애와 특정인에게 향하는 사랑은 별개…… 저의 진심 어린 사랑은 회장님만의 것입니다!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ですので！\u3000ひとつだけの！\u3000ほ、ほ、本命チョコなんですっ！」"
translation = "「그러니까! 단 하나뿐인! 지, 지, 진심 초코예요!」"

[[dialogue]]
speaker = "unk"
original = "ありがとう、シャロン"
translation = "고마워, 샤론."

[[dialogue]]
speaker = "unk"
original = "俺は真正面から、彼女の想いを受け止めた。"
translation = "나는 정면에서 그녀의 마음을 받아들였다."

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「嬉しいです、会長さまっ……<emoji=heart04>」"
translation = "「기뻐요, 회장님……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「はぁー、アツいアツい。せっかくもらったチョコが溶けちゃいそうだわ。いろんな意味でごちそうさま。２人ともお幸せにねー」"
translation = "「하아─, 뜨겁네 뜨거워. 기껏 받은 초코가 녹아버릴 것 같아. 여러 의미로 잘 먹었어. 둘 다 행복하라고─.」"

[[dialogue]]
speaker = "unk"
original = "イレーナは背を向けてクールに去り──俺はシャロンとともに女神へ互いの愛を誓うのだった。"
translation = "이레나는 등을 돌려 쿨하게 떠나고── 나는 샤론과 함께 여신에게 서로의 사랑을 맹세했다."

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「これからもずっとずっと、命尽きるまで……よろしくお願いしますね、会長さま<emoji=heart04>」"
translation = "「앞으로도 계속 계속, 목숨이 다할 때까지…… 잘 부탁드려요, 회장님<emoji=heart04>」"

