[[dialogue]]
speaker = "unk"
original = "第２話,娯楽を体験しよう～ボードゲーム編～,P"
translation = "제2화, 오락을 체험하자 ~보드게임 편~, P"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「……ボードゲーム？\u3000いえ、やったことはありませんわ」"
translation = "「……보드게임? 아니요, 해본 적은 없습니다わ」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あれま。会長の言うとおりだね。本当にお金が絡まない遊びを知らないんだ、セナリィって」"
translation = "「어라라. 회장 말대로네. 정말로 돈이 얽히지 않는 놀이를 모르는구나, 세너리는」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「仕方がないでしょう。時間が空けばビジネスのことばかり考える生活だったのですから」"
translation = "「어쩔 수 없지 않나요. 시간이 나면 비즈니스 생각만 하던 생활이었으니까요」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「でも今は、セナリィにいろんな遊びを経験させたいって思ってくれる優しい彼氏がいるから、考えも変わったってことなのかな？」"
translation = "「하지만 지금은 세너리에게 여러 가지 놀이를 경험시켜 주고 싶어 하는 상냥한 남자친구가 있으니까, 생각도 바뀌었다는 걸까?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「よかったねぇセナリィ。会長に愛されてるね～♪」"
translation = "「잘됐네 세너리. 회장에게 사랑받고 있네~♪」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「かっ、からかうんじゃありませんわよ！\u3000会長様の気遣いは感謝いたしますが、だからマインを誘うのは嫌だったんですわ……！」"
translation = "「노, 놀리지 마세요! 회장님의 배려는 감사하지만, 그래서 마인을 부르는 건 싫었던 겁니다わ……!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「そう言わずに～♪\u3000ボードゲームは大勢でやった方が楽しいし！\u3000ほらほら、どのゲームにする？」"
translation = "「그러지 말고~♪ 보드게임은 여럿이서 하는 게 더 즐거우니까! 자자, 어떤 게임으로 할래?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「会長の家、なんだかすっごいたくさんボドゲが揃ってるし♪\u3000選び放題だよ～」"
translation = "「회장네 집, 왠지 엄청나게 많은 보드게임이 갖춰져 있고♪ 고르기 나름이야~」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「──ボドゲカフェでバイトをした時にハマったんですの？\u3000相変わらず無駄に交友関係や趣味の広いお人ですわね……」"
translation = "「──보드게임 카페에서 알바했을 때 빠진 건가요? 여전히 쓸데없이 교우 관계나 취미가 넓은 분이군요……」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「あら──これは？」"
translation = "「어라── 이것은?」"

[[dialogue]]
speaker = "unk"
original = "ライフ＆マネーゲームだね"
translation = "라이프 & 머니 게임이야"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ライフ＆マネー……？\u3000ちょっと想像がつかないですわね」"
translation = "「라이프 & 머니……? 조금 상상이 안 가네요」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「職業と性別を決めてスタートする<ruby>双六<rt>すごろく</rt></ruby>だよ。マスに止まるたびに、人生の節目のイベントが起こって資産が変動して……」"
translation = "「직업과 성별을 정해서 시작하는 <ruby>주사위 놀이<rt>스고로쿠</rt></ruby>야. 칸에 멈출 때마다 인생의 분기점 이벤트가 일어나서 자산이 변동하고……」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「それでゴールした時の総資産が一番多い人が勝ち！\u3000シンプルでしょ？」"
translation = "「그래서 골인했을 때 총자산이 가장 많은 사람이 승리! 심플하지?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「面白そうですわ！\u3000人生という縮図の価値を、資産で測るだなんて！」"
translation = "「재밌어 보입니다わ! 인생이라는 축소판의 가치를 자산으로 측정하다니!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「実に私好みのゲームの匂いがいたしますわ！\u3000これにいたしましょう！」"
translation = "「실로 제 취향인 게임의 냄새가 납니다わ! 이걸로 하죠!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「オッケー。それじゃあ職業選択だね～……お、交渉人ってのがある。私はこれにしよーっと♪」"
translation = "「오케이. 그럼 직업 선택이네~…… 오, 교섭인이라는 게 있어. 난 이걸로 해야지~♪」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「私はもちろん、会社経営者でスタートですわ！\u3000ガッツリ儲けてぶっちぎりの１位を取りますわよ！」"
translation = "「저는 물론 회사 경영자로 스타트입니다わ! 팍팍 벌어서 압도적인 1위를 차지하겠어요!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ホワイ！？\u3000また株価の暴落ですの！？\u3000あぁ、大枚をはたいて購入した株券がすべて紙クズに……！」"
translation = "「화이!? 또 주가 폭락인가요!? 아아, 거금을 들여 구입한 주권이 전부 휴지 조각이……!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あはははっ♪\u3000ゲームの中でまでお金をスっちゃうとか。流石はセナリィ～♪」"
translation = "「아하하하♪ 게임 속에서까지 돈을 날려 먹다니. 역시 세너리~♪」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ゲームの中でまで、は余計です！\u3000しかしまだ順位は２位。会長様より私は資産を持っていますわ！」"
translation = "「게임 속에서까지는 사족입니다! 하지만 아직 순위는 2위. 회장님보다 저는 자산을 더 가지고 있어요!」"

[[dialogue]]
speaker = "unk"
original = "あ、宝くじで１億テルス当たった"
translation = "아, 복권으로 1억 텔스 당첨됐어"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ずりぃですわよ！？\u3000私、最下位じゃないですか！？」"
translation = "「치사합니다わ!? 저, 최하위잖아요!?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ここから巻き返さなくては……会社さえ守れていれば、逆転も十分狙える圏内ですわ……！」"
translation = "「여기서부터 만회해야…… 회사만 지키고 있다면 역전도 충분히 노릴 수 있는 권내입니다……!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「止まったのはイベントカードマス。ここでラッキーなものを引くのです──フンッ！\u3000ディスティニードロー！」"
translation = "「멈춘 곳은 이벤트 카드 칸. 여기서 럭키한 것을 뽑는 겁니다── 흣! 데스티니 드로우!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「『経営してる会社で部下がクーデターを起こす。代表権を剥奪されてフリーターに転職』……うわ～、ご愁傷様～♪」"
translation = "「『경영하던 회사에서 부하가 쿠데타를 일으킨다. 대표권을 박탈당하고 프리터로 전직』…… 우와~ 삼가 고인의 명복을 빕니다~♪」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ミウ！？\u3000ヒマワリー！？\u3000そんな！\u3000信じてましたのに……見捨てないでほしいですわ～！？」"
translation = "「미우!? 히마와리!? 그럴 수가! 믿고 있었는데…… 버리지 말아 주었으면 합니다わ~!?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あ、ラッキー♪\u3000私も宝くじ当たった！\u3000これで会長の総資産を超えたんじゃない？」"
translation = "「아, 럭키♪ 나도 복권 당첨됐다! 이걸로 회장의 총자산을 넘은 거 아냐?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「私ばかりバッドイベントを……！\u3000次こそラッキーなものを……ルーレット、頼みますわよ！」"
translation = "「저만 배드 이벤트를……! 다음이야말로 럭키한 것을…… 룰렛, 부탁합니다わ!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「──青色マスに止まりましたわ！\u3000何かおめでたいイベントが確定で起こるマスですわよね！？」"
translation = "「──파란색 칸에 멈췄습니다わ! 뭔가 경사스러운 이벤트가 확정으로 일어나는 칸이죠!?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「これは──おぉ♪\u3000やったね、結婚イベントだって<emoji=heart04>」"
translation = "「이것은── 오♪ 잘됐네, 결혼 이벤트래<emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「結婚！？\u3000誰と！？」"
translation = "「결혼!? 누구랑요!?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「異性は１人しかいないから……ひゅ～♪\u3000お相手は会長で～す<emoji=heart04>」"
translation = "「이성은 한 명뿐이니까…… 휴~♪ 상대는 회장입니~다<emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ファ～！？」"
translation = "「화아~!?」"

[[dialogue]]
speaker = "unk"
original = "あ、子供も産まれるみたい"
translation = "아, 아이도 태어나는 모양이야"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「子供！？\u3000会長様と私の！？\u3000それは……め、めでたいですわね……<emoji=heart04>」"
translation = "「아이!? 회장님과 저의!? 그것은…… 저, 경사스러운 일이군요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「うんうん。ここから毎月、給料日に子育て資金の積み立てが発生するから。１０パーセント天引きね～？」"
translation = "「응응. 여기서부터 매달 급여일에 육아 자금 적립이 발생하니까. 10퍼센트 원천징수네~?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「えっ、お金がかかるんですの！？」"
translation = "「엣, 돈이 드는 건가요!?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「当たり前じゃーん♪\u3000子育てはお金がかかるんだよ、セナリィ？」"
translation = "「당연하잖아~♪ 육아는 돈이 든다고, 세너리?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「でも結婚したから会長と総資産は折半だよ。さっきの１億テルス、半分はセナリィが所持できることになるね～」"
translation = "「하지만 결혼했으니까 회장이랑 총자산은 절반이야. 아까 그 1억 텔스, 절반은 세너리가 소지할 수 있게 되네~」"

[[dialogue]]
speaker = "unk"
original = "資産を吸われた……！？"
translation = "자산을 빨렸어……!?"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「やりましたわ！\u3000このままマインを追い抜きますわよ～！」"
translation = "「해냈습니다わ! 이대로 마인을 추월하겠어요~!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「追い抜くつもりでしたのに……！？」"
translation = "「추월할 생각이었는데……!?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「セナリィ、４回目の出産おめでと～♪\u3000積み立て金が増えま～す<emoji=heart04>」"
translation = "「세너리, 4번째 출산 축하해~♪ 적립금이 늘어납니~다<emoji=heart04>」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「てゆーか２人とも、子作りに気合い入れすぎ～♪\u3000私、見せつけられちゃってるー？」"
translation = "「그나저나 둘 다 애 만들기에 너무 기합 넣은 거 아냐~♪ 나, 염장 지러지는 중?」"

[[dialogue]]
speaker = "unk"
original = "セナリィが出産マスにばかり止まるから！"
translation = "세너리가 출산 칸에만 멈추니까!"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「しょうがねぇですわっ！？\u3000ルーレットなんですから……！」"
translation = "「어쩔 수 없지 않습니까! 룰렛이니까요……!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "（愛はあるのにお金はない……会長様と一緒に圧倒的の最下位……で、でも何だか悪くない気がいたしますわ……）"
translation = "（사랑은 있는데 돈은 없어…… 회장님과 함께 압도적인 최하위…… 하, 하지만 왠지 나쁘지 않은 기분이 듭니다わ……）"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "（愛する夫と、たくさんの可愛い子供に囲まれて……貧乏だけれどきっと温かな家庭が……<emoji=heart04>）"
translation = "（사랑하는 남편과, 수많은 귀여운 아이들에게 둘러싸여…… 가난하지만 분명 따뜻한 가정이……<emoji=heart04>）"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "（──ハッ！？\u3000こんな思考、悪の道から外れていますわ！\u3000この世は金！\u3000金こそ力のはず！）"
translation = "（──핫!? 이런 사고, 악의 길에서 벗어나 있습니다わ! 이 세상은 돈! 돈이야말로 힘일 터!）"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "（バンデット・セナリィ、己のポリシィを思い出すのです……ゲームに勝たねば！\u3000敗者には何も残らないのですわ！）"
translation = "（밴디트 세너리, 자신의 폴리시를 떠올리는 겁니다…… 게임에서 이겨야 해! 패자에게는 아무것도 남지 않는 법입니다わ!）"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「おーい？\u3000セナリィの番だよ、ルーレット」"
translation = "「어이~? 세너리 차례야, 룰렛」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「え、ええ──分かっていますわ。止まるマスは……？」"
translation = "「에, 예── 알고 있습니다わ. 멈추는 칸은……?」"

[[dialogue]]
speaker = "unk"
original = "孫が生まれたー！？"
translation = "손자가 태어났다─!?"

[[dialogue]]
speaker = "unk"
original = "俺たちの子供の……"
translation = "우리 아이의……"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「まさかの３世帯！\u3000で、でも流石に孫のぶんまでの積立金はありませんわよね！？」"
translation = "「설마 했던 3세대! 하, 하지만 설마 손자 몫까지 적립금이 있지는 않겠죠!?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「いやいや。お祖母ちゃんになるんだからお祝いも気合い入れなくちゃ♪\u3000こっからは２０パーセント積み立てに増額されるよ！\u3000めでたしめでたし♪」"
translation = "「아냐 아냐. 할머니가 되는 거니까 축하도 기합을 넣어야지♪ 지금부터는 20퍼센트 적립으로 증액될 거야! 메데타시 메데타시♪」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「めでたくないですわぁ～っ！？」"
translation = "「경사스럽지 않아요~!?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "（でも可愛い孫まで産まれて……やっぱり悪くない気がいたしますわ～！？\u3000ああ……私、どうしてしまいましたの～！？）"
translation = "（하지만 귀여운 손주까지 태어나고…… 역시 나쁘지 않은 기분이 들어요~!? 아아…… 저, 어떻게 되어 버린 건가요~!?）"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「安心しなって～。ゲーム終盤に子供や孫が一発当てるイベントもあるはずだし♪\u3000希望を捨てちゃだめだよセナリィ～？」"
translation = "「안심하라구~. 게임 종반에 자식이나 손주가 한 건 올리는 이벤트도 분명 있을 테니까♪ 희망을 버리면 안 돼, 세나리?」"

[[dialogue]]
speaker = "unk"
original = "しかしその後、セナリィに都合のよい儲かるイベントが起きることはなく。結婚イベントで資産を共有した俺たちは揃って最下位に沈むのだった……"
translation = "그러나 그 후, 세나리에게 형편 좋은 돈벌이 이벤트가 일어나는 일은 없었다. 결혼 이벤트로 자산을 공유한 우리들은 나란히 최하위로 가라앉는 것이었다……"

