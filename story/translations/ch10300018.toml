[[dialogue]]
speaker = "unk"
original = "ナミエルと恋人同士になってからというもの、星見家にある彼女の私室を訪れることが増えた。"
translation = "나미엘과 연인 사이가 된 이후로, 호시미 가에 있는 그녀의 사실을 방문하는 일이 늘었다."

[[dialogue]]
speaker = "unk"
original = "そして観察眼に優れるナミエルは、俺がムラムラした瞬間を決して見逃さない。"
translation = "그리고 관찰안이 뛰어난 나미엘은 내가 욕정이 끓어오르는 순간을 결코 놓치지 않는다."

[[dialogue]]
speaker = "ナミエル"
original = "「もう──またですか。本当に仕方のない人ですね」"
translation = "「정말──또인가요. 정말이지 어쩔 수 없는 사람이네요.」"

[[dialogue]]
speaker = "unk"
original = "今日もこの言葉と共に、行為が始まった──"
translation = "오늘도 이 말과 함께 행위가 시작되었다──"

[[dialogue]]
speaker = "ナミエル"
original = "「まったく……やっぱり男性はえっちな生き物ですね」"
translation = "「정말이지……역시 남성은 야한 생물이군요.」"

[[dialogue]]
speaker = "ナミエル"
original = "「お部屋でお喋りしていただけじゃないですか。どこに興奮する要素があったのです？」"
translation = "「방에서 대화만 하고 있었잖아요. 어디에 흥분할 요소가 있었던 거죠?」"

[[dialogue]]
speaker = "unk"
original = "そうとがめられても困ってしまう。"
translation = "그렇게 추궁당해도 곤란할 뿐이다."

[[dialogue]]
speaker = "unk"
original = "大好きな恋人と２人きりというシチュエーションなのだ。男として滾らないほうがおかしい。"
translation = "정말 좋아하는 연인과 단둘이라는 상황이다. 남자로서 끓어오르지 않는 쪽이 이상하다."

[[dialogue]]
speaker = "ナミエル"
original = "「まったく面倒なことです。男性は勃起してしまうと、射精するまで決して小さくならないのでしょう？\u3000知っていますよ」"
translation = "「정말 번거로운 일이네요. 남성은 발기하면 사정할 때까지 결코 작아지지 않는 거죠? 알고 있어요.」"

[[dialogue]]
speaker = "unk"
original = "……ナミエルの誤った性知識について、部分的に訂正していないのは、わざとだったりする。"
translation = "……나미엘의 잘못된 성지식에 대해 부분적으로 정정하지 않는 것은, 일부러 그러는 것이기도 하다."

[[dialogue]]
speaker = "unk"
original = "この勘違いがあるおかげで、勃起するたびにこうして相手をしてくれるからだ。"
translation = "이 착각 덕분에 발기할 때마다 이렇게 상대를 해주니까 말이다."

[[dialogue]]
speaker = "ナミエル"
original = "「……仕方ありません。こんな張りつめた状態でお屋敷を練り歩かれては困ります」"
translation = "「……어쩔 수 없군요. 이렇게 긴장한 상태로 저택을 돌아다니시면 곤란해요.」"

[[dialogue]]
speaker = "ナミエル"
original = "「それに……くんくん。くんくんくん……」"
translation = "「게다가……킁킁. 킁킁킁……」"

[[dialogue]]
speaker = "ナミエル"
original = "「んん……<emoji=heart04>\u3000すごくえっちな匂いです。この匂いも、私のおくちでしっかり綺麗にしないといけません」"
translation = "「음음……<emoji=heart04> 굉장히 야한 냄새가 나요. 이 냄새도, 제 입으로 확실히 깨끗하게 닦아내야겠어요.」"

[[dialogue]]
speaker = "unk"
original = "仕方ない人だ、本当に困った人だ──そうナミエルは繰り返すが、決して嫌そうなそぶりは見えない。"
translation = "어쩔 수 없는 사람이네, 정말 곤란한 사람이야── 그렇게 나미엘은 반복하지만, 결코 싫어하는 기색은 보이지 않는다."

[[dialogue]]
speaker = "ナミエル"
original = "「というか、ですよ。なぜこんなにも元気いっぱいなのです？」"
translation = "「그나저나, 말이에요. 왜 이렇게 기운이 넘치시는 거죠?」"

[[dialogue]]
speaker = "ナミエル"
original = "「昨日も、一昨日も……私のおくちにいっぱい出しましたよね？\u3000とても満足したと、仰っていたのに──」"
translation = "「어제도, 그저께도…… 제 입에 잔뜩 쏟아내셨잖아요? 정말 만족했다고 말씀하셨으면서──」"

[[dialogue]]
speaker = "ナミエル"
original = "「一晩経ったらこれです。タマタマはずっしり重くて、おち○ちんもガチガチ……男性の性欲は底なしなのですか？\u3000それともあなたが特別なのでしょうか」"
translation = "「하룻밤 지나니 이 모양이네요. 불알은 묵직하고, 자지도 딱딱하고…… 남자의 성욕은 바닥이 없는 건가요? 아니면 당신이 특별한 건가요?」"

[[dialogue]]
speaker = "ナミエル"
original = "「はっ──もしや。タマタマの中身、ぜんぶ搾り取れていなかったのでしょうか？」"
translation = "「핫── 설마. 불알 속 내용물, 전부 짜내지 못했던 걸까요?」"

[[dialogue]]
speaker = "ナミエル"
original = "「むぅ……なんだかお掃除の拭き残しを見つけた気分です」"
translation = "「음…… 왠지 청소하다가 덜 닦인 곳을 발견한 기분이에요.」"

[[dialogue]]
speaker = "ナミエル"
original = "「お掃除メイドのプライドに賭けて、今日はいつもより入念に、搾り抜くことにしましょう」"
translation = "「청소 메이드의 자존심을 걸고, 오늘은 평소보다 더 꼼꼼하게, 남김없이 짜내기로 하죠.」"

[[dialogue]]
speaker = "ナミエル"
original = "「タマタマの中にある精液、全部お掃除してあげます……いきますよ？」"
translation = "「불알 안에 있는 정액, 전부 청소해 드릴게요…… 갑니다?」"

[[dialogue]]
speaker = "ナミエル"
original = "「はぁ──むぅっ<emoji=heart04>」"
translation = "「하아── 음긋<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ナミエルの小さな、そして温かい口の中に……俺のペニスが飲み込まれる。"
translation = "나미엘의 작고, 따뜻한 입안으로…… 내 페니스가 집어삼켜진다."

[[dialogue]]
speaker = "unk"
original = "何度見ても背徳感が刺激される光景だ。"
translation = "몇 번을 봐도 배덕감이 자극되는 광경이다."

[[dialogue]]
speaker = "ナミエル"
original = "「ぁむ、んぅ、んむぅ……ちゅるう……<emoji=heart04>\u3000ちゅるちゅる……んん<emoji=heart04>」"
translation = "「아무, 응우, 음무…… 츄릅……<emoji=heart04> 츄릅츄릅…… 응응<emoji=heart04>」"

[[dialogue]]
speaker = "ナミエル"
original = "「どうですか？\u3000私の……お口の中……気持ちいいですか？」"
translation = "「어떠세요? 제…… 입안…… 기분 좋으신가요?」"

[[dialogue]]
speaker = "unk"
original = "ぽかぽか、ぬくぬくとしたナミエルのおくちはとても居心地が良い。俺は首を縦に振る。"
translation = "포근하고 따스한 나미엘의 입안은 무척이나 안락하다. 나는 고개를 끄덕인다."

[[dialogue]]
speaker = "ナミエル"
original = "「んふ。良かったです……いっぱい感じてください」"
translation = "「응후. 다행이에요…… 잔뜩 느껴주세요.」"

[[dialogue]]
speaker = "ナミエル"
original = "「はぁぷっ、はぷ、んぷ、れぅ、れぅれぅ、れぅれぅれぅ<emoji=heart04>」"
translation = "「하아풋, 하풋, 응풋, 레우, 레우레우, 레우레우레우<emoji=heart04>」"

[[dialogue]]
speaker = "ナミエル"
original = "「ちゅぷ、んちゅ、くぷちゅるっ……ちゅぶぶ、ちゅるぅ<emoji=heart04>」"
translation = "「츄풋, 응츄, 쿠풋츄룻…… 츄부부, 츄루우<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "舌がくるくると動いて、敏感な亀頭が舐めしゃぶられている。"
translation = "혀가 빙글빙글 움직이며, 민감한 귀두가 핥아 올려지고 있다."

[[dialogue]]
speaker = "ナミエル"
original = "「ンぅうっ……れちゃ、んちゅる、ちゅる、れぇ、はぷ、くちゅる、れぇれろ、れろぉ、れろれろ、れられられらっ……<emoji=heart04>」"
translation = "「응우웃…… 레챠, 응츄르, 츄르, 레에, 하풋, 쿠츄르, 레에레로, 레로오, 레로레로, 레라레라레랏……<emoji=heart04>」"

[[dialogue]]
speaker = "ナミエル"
original = "「んふぅ……ん……ちゅぱちゅぱ……ちゅくる……れろ、へろ、はぁむ……るれろれろ、れぇろ、んちゅるる<emoji=heart04>」"
translation = "「응후우…… 응…… 츄파츄파…… 츄쿠루…… 레로, 헤로, 하아무…… 루레로레로, 레에로, 응츄루루<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "メイド服をまとった後輩彼女の、上目遣いフェラ。"
translation = "메이드복을 입은 후배 여자친구의, 올려다보는 펠라치오."

[[dialogue]]
speaker = "unk"
original = "一生懸命にしゃぶってくれるのがいじらしく、可愛さとエロさがかみ合って、余計にペニスがガチガチになってしまう──"
translation = "열심히 빨아주는 모습이 애처로우면서도, 귀여움과 에로함이 맞물려 페니스가 더욱 딱딱하게 굳어버린다──"

[[dialogue]]
speaker = "ナミエル"
original = "「どんどん硬くなってますね。んぢゅっ……ゆっくり動いて、しごきます……」"
translation = "「점점 딱딱해지네요. 응쥬…… 천천히 움직여서, 훑어줄게요……」"

[[dialogue]]
speaker = "ナミエル"
original = "「んっぷ<emoji=heart04>\u3000んぷっ<emoji=heart04>\u3000んぷぅっ<emoji=heart04>\u3000んじゅ……ぢゅるっ……れぇ、れぇる、れるれるっ……<emoji=heart04>」"
translation = "「응풋<emoji=heart04> 응풋<emoji=heart04> 응푸웃<emoji=heart04> 응쥬…… 쥬룻…… 레에, 레에르, 레를레를……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスにフィットするように、ナミエルが少しだけ咥内をしぼってくる。"
translation = "페니스에 밀착되도록, 나미엘이 입안을 살짝 조여온다."

[[dialogue]]
speaker = "unk"
original = "きゅっ、とペニスを締め付けられながら、前後にゆっくり往復していく動き……たまらなく気持ちがいい。"
translation = "큭, 하고 페니스를 조여 오면서 앞뒤로 천천히 왕복하는 움직임…… 참을 수 없을 만큼 기분 좋다."

[[dialogue]]
speaker = "ナミエル"
original = "「んぢゅっ、んぢゅるっ、れりゅ、れりゅれりゅ、んじゅるっ<emoji=heart04>」"
translation = "「응쥬웃, 응쥬룻, 레류, 레류레류, 응쥬룻<emoji=heart04>」"

[[dialogue]]
speaker = "ナミエル"
original = "「おち○ちん、ビクビク動いて……切なそうです。はぷっ、れぇ、んれる、れるっ……んじゅ……ぢゅる、ちゅぷっ<emoji=heart04>」"
translation = "「자지, 움찔움찔 움직여서…… 안쓰러워 보여요. 하풋, 레에, 응레를, 레를…… 응쥬…… 쥬르, 츄풋<emoji=heart04>」"

[[dialogue]]
speaker = "ナミエル"
original = "「んじゅぶっ、じゅぷっ、じゅるっ……おち○ちん、大きい……ちゅぷっ、ちゅく、ちゅく、ちゅるぅっ<emoji=heart04>」"
translation = "「응쥬붓, 쥬풋, 쥬룻…… 자지, 커요…… 츄풋, 츄쿠, 츄쿠, 츄루우웃<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ナミエルは小柄だから、顔のパーツはどれも小さい。"
translation = "나미엘은 체구가 작아서, 얼굴의 부위도 전부 작다."

[[dialogue]]
speaker = "unk"
original = "勃起したペニスは太すぎるだろうに、それでもしっかりとしゃぶりこんでくれるのがたまらなく嬉しい。"
translation = "발기한 페니스는 너무 굵을 텐데, 그래도 확실하게 빨아주는 것이 참을 수 없이 기쁘다."

[[dialogue]]
speaker = "ナミエル"
original = "「おち○ちん……くさくて、熱いです……んぅ、じゅるるっ、んじゅるるっ……れぇえっ……あむぅ、んむ、ちゅるぅっ……れぇえっ<emoji=heart04>」"
translation = "「자지…… 냄새나고, 뜨거워요…… 응우, 쥬루루, 응쥬루루…… 레에에에…… 아무우, 응무, 츄루우웃…… 레에에에<emoji=heart04>」"

[[dialogue]]
speaker = "ナミエル"
original = "「じゅぶっ、くぷっ、んちゅぷっ……じゅるっ、れぇえ、じゅぢゅる、ぢゅるぢゅる、ぢゅぅ……<emoji=heart04>」"
translation = "「쥬붓, 쿠풋, 응츄풋…… 쥬룻, 레에에, 쥬쥬르, 쥬르쥬르, 쥬우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ぐぷぐぷ、じゅぷじゅぷと、下品な音が止まらない。"
translation = "구푸구푸, 쥬푸쥬푸, 음란한 소리가 멈추질 않는다."

[[dialogue]]
speaker = "unk"
original = "じいっと見つめてくるナミエルが可愛い……メイド服から覗くささやかなおっぱいにも興奮を煽られてしまう。"
translation = "빤히 올려다보는 나미엘이 귀엽다…… 메이드복 사이로 보이는 작은 가슴도 흥분을 부추긴다."

[[dialogue]]
speaker = "ナミエル"
original = "「んちゅっ……じゅぱっ……おっぱいを見ているの、バレバレですよ。ちゅくっ、ちゅくっ……ちゅぷっ<emoji=heart04>」"
translation = "「응츄…… 쥬팟…… 가슴 보는 거, 다 들켰어요. 츄쿠, 츄쿠…… 츄풋<emoji=heart04>」"

[[dialogue]]
speaker = "ナミエル"
original = "「こんな小さなおっぱいで興奮するなんて……ちゅくっ、ちゅるっ……じゅるる……男性はやはり性欲の塊ですね……んちゅるる<emoji=heart04>」"
translation = "「이런 작은 가슴으로 흥분하다니…… 츄쿠, 츄룻…… 쥬루루…… 남자는 역시 성욕의 덩어리네요…… 응츄루루<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "好きなナミエルのおっぱいだから──と言おうとしたが、ナミエルの巧みな責めを続けるせいでうまく言葉にできない"
translation = "좋아하는 나미엘의 가슴이라서──라고 말하려 했지만, 나미엘의 능숙한 애무가 이어지는 탓에 제대로 말을 할 수 없다."

[[dialogue]]
speaker = "ナミエル"
original = "「ちゅぷるっ、ちゅくちゅく……んふ<emoji=heart04>\u3000おち○ちん、おくちの中でビクビクして……んっ、ふっ……」"
translation = "「츄푸룻, 츄쿠츄쿠…… 응후<emoji=heart04> 자지, 입안에서 움찔거려서…… 응, 흣……」"

[[dialogue]]
speaker = "unk"
original = "下半身がぞくっと震え、ナミエルの舌の上に、直に先走りの汁を吐き出す。"
translation = "하반신이 짜릿하게 떨리며, 나미엘의 혀 위로 쿠퍼액을 직접 뱉어낸다."

[[dialogue]]
speaker = "ナミエル"
original = "「んんっ──！\u3000おち○ちんの先から、おつゆ出てきました。れろれろ、ちゅぱ……くちゅるっ……勝手に出てきてしまうなんて、おもらしみたいですね」"
translation = "「응응──! 자지 끝에서, 즙이 나왔어요. 레로레로, 츄파…… 쿠츄룻…… 멋대로 나와버리다니, 오줌 지리는 것 같네요.」"

[[dialogue]]
speaker = "クロト"
original = "「ごめん……」"
translation = "「미안……」"

[[dialogue]]
speaker = "ナミエル"
original = "「謝らなくていいですよ。ちゃんと受け止めてあげますから……れちゅっ、れぇろん、れろちゅぱっ<emoji=heart04>」"
translation = "「사과 안 하셔도 돼요. 제대로 받아낼 테니까…… 레츄, 레에론, 레로츄팟<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "舌を波打たせて、口内に出されたカウパーを舐めとるナミエル。"
translation = "혀를 물결치게 하며 입안에 나온 쿠퍼액을 핥아먹는 나미엘."

[[dialogue]]
speaker = "ナミエル"
original = "「じゅれろ、れぇろ……あなたの味がします……<emoji=heart04>\u3000んじゅぷっ、ちゅぷ、ちゅるる……じゅるるっ……んっ、こく<emoji=heart04>」"
translation = "「쥬레로, 레에로…… 당신 맛이 나요……<emoji=heart04> 응쥬풋, 츄풋, 츄루루…… 쥬루룻…… 응, 꿀꺽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "嫌そうにすることなく、むしろ愛おしそうに舐めてくれる。"
translation = "싫어하는 기색 없이, 오히려 사랑스럽다는 듯이 핥아준다."

[[dialogue]]
speaker = "unk"
original = "舌を動かして集めた先走りを吸いながら飲んでくれて、昂って余計に汁が溢れる。"
translation = "혀를 움직여 모은 쿠퍼액을 빨아 마셔주니, 흥분해서 즙이 더 흘러넘친다."

[[dialogue]]
speaker = "ナミエル"
original = "「れるっ、ちゅぱっ……舐めても舐めてもおつゆが出てきますね……ふぅ、ちゅるっ、れろ……本当に、仕方ない人です……<emoji=heart04>」"
translation = "「레룻, 츄팟…… 핥아도 핥아도 즙이 나오네요…… 후우, 츄룻, 레로…… 정말이지, 어쩔 수 없는 사람이네요……<emoji=heart04>」"

[[dialogue]]
speaker = "ナミエル"
original = "「んーんっ……んぅ、じゅるるっ……んぅう、んじゅる、ちゅぅぷ、れぇっ、れりゅ、れちゃれちゃ、れちゃぁっ……<emoji=heart04>」"
translation = "「응으응…… 응우, 쥬루룻…… 응우우, 응쥬르, 츄우푸, 레에, 레류, 레챠레챠, 레챠아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "よだれが混ぜられる音、ペニスに絡みつく水っ気。どれもが極上。腰から下がとろけてしまいそうだ──"
translation = "침이 섞이는 소리, 페니스를 감싸는 물기. 전부가 극상이다. 허리 아래가 녹아버릴 것만 같다──"

[[dialogue]]
speaker = "ナミエル"
original = "「ふふ♪\u3000あなたのお顔、すっごく情けないです……<emoji=heart04>\u3000そんなに私のおくち、気持ちいいんですか？」"
translation = "「후후♪ 당신 얼굴, 정말 한심해요……<emoji=heart04> 그렇게 제 입이 기분 좋으신가요?」"

[[dialogue]]
speaker = "ナミエル"
original = "「じゃあ──もっと強くシてあげます。んぢゅ、るるるっ！」"
translation = "「그럼── 더 세게 해드릴게요. 응쥬, 루루룻!」"

[[dialogue]]
speaker = "ナミエル"
original = "「んじゅるるぅっ、じゅるっ。れぇえっ……んじゅ、ちゅる、ちゅぷ、れぇ、じゅるうっ、ぢゅるるる、ぢゅるぅ～っ<emoji=heart04>」"
translation = "「응쥬루루웃, 쥬룻. 레에에엣…… 응쥬, 츄르, 츄풋, 레에, 쥬루우웃, 쥬루루루, 쥬루우~웃<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "さっきよりも速いおくちピストン。当然、ペニスへの刺激もぐんと増す。"
translation = "아까보다 빠른 입안 피스톤. 당연히, 페니스에 가해지는 자극도 훨씬 커진다."

[[dialogue]]
speaker = "ナミエル"
original = "「おち○ちん、まだ硬くなるんですか……えっち……<emoji=heart04>」"
translation = "「자지, 아직도 딱딱해지나요…… 야해……<emoji=heart04>」"

[[dialogue]]
speaker = "ナミエル"
original = "「じゅぷん、んじゅぷんっ、ぢゅっぷ、ぢゅずず、ぢゅぅううっ、れぇ、れじゅる、れるちゅぱ、れぇ、じゅる<emoji=heart04>」"
translation = "「쥬푼, 응쥬푼, 쥬뿌, 쥬즈즈, 쥬우우웃, 레에, 레쥬르, 레를츄파, 레에, 쥬르<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "からかうように見つめられることも、興奮のスパイスだ。"
translation = "놀리듯이 바라보는 것도, 흥분의 스파이스다."

[[dialogue]]
speaker = "unk"
original = "もうオナニーなんかじゃ絶対に満足できない。"
translation = "이제 자위 같은 걸로는 절대 만족할 수 없다."

[[dialogue]]
speaker = "unk"
original = "ムラムラするたび、ナミエルにフェラチオをねだってしまうかも……そう思わずこぼしてしまうと──"
translation = "욕정이 솟구칠 때마다, 나미엘에게 펠라치오를 조르게 될지도…… 그렇게 무심코 중얼거리고 말자──"

[[dialogue]]
speaker = "ナミエル"
original = "「んちゅ、じゅるっ、ぢゅぶっ、れぇ、じゅるるっ……いい、ですよ？」"
translation = "「응츄, 쥬룻, 쥬붓, 레에, 쥬루룻…… 좋아요?」"

[[dialogue]]
speaker = "ナミエル"
original = "「あなたの性欲処理も、んちゅ、お掃除と似たようなものです。別に大した手間じゃないので……じゅるっ、ちゅぶ、れぇ、れりゅれりゅ<emoji=heart04>」"
translation = "「당신의 성욕 처리도, 응츄, 청소랑 비슷한 거니까요. 딱히 큰 수고도 아니고…… 쥬룻, 츄부, 레에, 레류레류<emoji=heart04>」"

[[dialogue]]
speaker = "ナミエル"
original = "「毎日、んちゅ、欠かさず、ちゅぱ、してあげます……んぢゅ、れぢゅ、じゅるるっ、ちゅぶっ<emoji=heart04>」"
translation = "「매일, 응츄, 빠짐없이, 츄파, 해드릴게요…… 응쥬, 레쥬, 쥬루룻, 츄붓<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "明日も、明後日も、彼女におねだりしていい。毎日ナミエルのおくちで気持ち良くしてもらえる。そう思った瞬間、さらにペニスが膨らんだ。"
translation = "내일도, 모레도, 그녀에게 졸라도 된다. 매일 나미엘의 입으로 기분 좋게 해줄 것이다. 그렇게 생각한 순간, 페니스가 더욱 팽창했다."

[[dialogue]]
speaker = "ナミエル"
original = "「んぅ……<emoji=heart04>\u3000おち○ちん、すっごく興奮してます……本当にえっち……えっちすぎます……」"
translation = "「응우……<emoji=heart04> 자지, 엄청 흥분했어요…… 정말 야해…… 너무 야해요……」"

[[dialogue]]
speaker = "ナミエル"
original = "「タマタマ、持ち上がってます……出したいんですね……いいですよ……<emoji=heart04>」"
translation = "「불알, 치켜올라갔어요…… 쏟아내고 싶으신 거죠…… 괜찮아요……<emoji=heart04>」"

[[dialogue]]
speaker = "ナミエル"
original = "「ん～んっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んじゅるっ<emoji=heart04>\u3000ぢゅるっ<emoji=heart04>\u3000ぢゅるるる<emoji=heart04>\u3000ぢゅーっ<emoji=heart04>\u3000ぢゅるる、ぢゅうぅう～っ<emoji=heart04>」"
translation = "「응~응앗<emoji=heart04> 응앗<emoji=heart04> 응쥬룻<emoji=heart04> 쥬룻<emoji=heart04> 쥬루루루<emoji=heart04> 쥬~웃<emoji=heart04> 쥬루루, 쥬우우우~웃<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「あぅ、うあ、あぁあっ……！？」"
translation = "「아우, 우아, 아아앗……!?」"

[[dialogue]]
speaker = "ナミエル"
original = "「ぢゅるちゅぶちゅるっ<emoji=heart04>\u3000ぐぷじゅるるっ<emoji=heart04>\u3000ぢゅっぢゅ、んぢゅ、ぢゅるぅ<emoji=heart04>\u3000ぢゅるるっ<emoji=heart04>\u3000ぢゅびびびっ<emoji=heart04>」"
translation = "「쥬루츄부츄룻<emoji=heart04> 구푸쥬루룻<emoji=heart04> 쥬쥬, 응쥬, 쥬루우<emoji=heart04> 쥬루룻<emoji=heart04> 쥬비비빗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "激しく前後するナミエルの顔。そして口内でねろんねろんとかき混ぜられる舌。"
translation = "격렬하게 앞뒤로 움직이는 나미엘의 얼굴. 그리고 입안에서 끈적끈적하게 휘저어지는 혀."

[[dialogue]]
speaker = "unk"
original = "しっとりヌルヌルのよだれがペニスに絡んで、あまりの快感に膝が笑いだしてしまう。"
translation = "축축하고 미끌거리는 침이 페니스에 엉겨 붙어, 너무나 큰 쾌감에 다리가 후들거린다."

[[dialogue]]
speaker = "ナミエル"
original = "「れるれるっ<emoji=heart04>\u3000れるれるれるっ<emoji=heart04>\u3000じゅるっ、じゅるるっ<emoji=heart04>\u3000れるぢゅるっ<emoji=heart04>\u3000ぢゅるっ、ちゅぱっ、ちゅぽっ<emoji=heart04>」"
translation = "「레를레를룻<emoji=heart04> 레를레를레를룻<emoji=heart04> 쥬룻, 쥬루룻<emoji=heart04> 레를쥬룻<emoji=heart04> 쥬룻, 츄팟, 츄폿<emoji=heart04>」"

[[dialogue]]
speaker = "ナミエル"
original = "「んんっぢゅ！\u3000ぢゅぅ！\u3000ぢゅっぷ、ぢゅるるっ！\u3000ぢゅぷぢゅぷっ、ぢゅるっ、ぢゅるぢゅるぅ、ぢゅぅ～っ！」"
translation = "「응응쥬! 쥬우! 쥬뿌, 쥬루룻! 쥬푸쥬풋, 쥬룻, 쥬르쥬르우, 쥬우~웃!」"

[[dialogue]]
speaker = "ナミエル"
original = "「好きなタイミングでっ……イってくださいっ！\u3000じゅぅじゅるるっ！\u3000れるれる、じゅるる、じゅぶぶぶぅ～っ！\u3000ぢゅっぢゅ、ぢゅっ！」"
translation = "「원하는 타이밍에…… 싸세요! 쥬우쥬루룻! 레를레를, 쥬루루, 쥬부부부우~웃! 쥬쥬, 쥬!」"

[[dialogue]]
speaker = "unk"
original = "ナミエルのおくちピストンに引っ張られるように、精液がせり上がってきて──"
translation = "나미엘의 입 피스톤에 이끌리듯, 정액이 솟구쳐 올라와──"

[[dialogue]]
speaker = "ナミエル"
original = "「んっんっんっんっんっ！\u3000んっんっんっんっんっ！\u3000ぢゅるっ！\u3000ぢゅるるっ！\u3000ぢゅるぢゅる、ぢゅるるるるうぅ～っ<emoji=heart04>」"
translation = "「응응응응응! 응응응응응! 쥬룻! 쥬루룻! 쥬르쥬르, 쥬루루루루우우~웃<emoji=heart04>」"

[[dialogue]]
speaker = "ナミエル"
original = "「ふぅむむむむぅっ！？」"
translation = "「후무무무무웃!?」"

[[dialogue]]
speaker = "unk"
original = "爆ぜるような──射精。"
translation = "터져 나오는 듯한── 사정."

[[dialogue]]
speaker = "unk"
original = "ナミエルの口に、ねばついた精液をこれでもかと撃ち放った。"
translation = "나미엘의 입에, 끈적한 정액을 더할 나위 없이 쏟아부었다."

[[dialogue]]
speaker = "ナミエル"
original = "「んんうう～っ、んぅっ、んぅ！\u3000んぅううっ……！\u3000すごい、量……んふっ、んっ……んんぅ～～っ！」"
translation = "「응응우우~웃, 응우, 응우! 응우우우웃……! 굉장한, 양…… 응후, 응…… 응응우우~~웃!」"

[[dialogue]]
speaker = "unk"
original = "一滴も漏らすまいと唇をしぼっても意味がない。"
translation = "한 방울도 흘리지 않으려 입술을 조여봐도 소용없다."

[[dialogue]]
speaker = "unk"
original = "ナミエルの華奢な口で、せき止められる射精量ではなかった。"
translation = "나미엘의 가냘픈 입으로 막아낼 수 있는 사정량이 아니었다."

[[dialogue]]
speaker = "unk"
original = "唇の端から、どぱっと勢いよく精液が吹きこぼれ、ナミエルの口元や胸元を汚していく……"
translation = "입술 끝에서, 도파앗 하고 기세 좋게 정액이 뿜어져 나와, 나미엘의 입가와 가슴을 더럽혀 간다……"

[[dialogue]]
speaker = "ナミエル"
original = "「んんぅっ、ふぅうーっ、んんん～っ……」"
translation = "「응응우웃, 후우우~웃, 응응응~웃……」"

[[dialogue]]
speaker = "unk"
original = "苦しそうな彼女の声が余計に興奮を煽る。"
translation = "괴로운 듯한 그녀의 목소리가 더욱 흥분을 부추긴다."

[[dialogue]]
speaker = "unk"
original = "もっと出したい、最後の一滴まで──そう思いながら、俺は何度も何度もペニスに力を込め、絞り出す。"
translation = "더 쏟아내고 싶어, 마지막 한 방울까지── 그렇게 생각하며, 나는 몇 번이고 페니스에 힘을 주어 쥐어짠다."

[[dialogue]]
speaker = "ナミエル"
original = "「んぅんんんっ……ふぅう～っ……ふぅーっ……<emoji=heart04>\u3000こく、こくっ……ふ──んっ<emoji=heart04>」"
translation = "「응우응응응…… 후우우~웃…… 후우~웃……<emoji=heart04> 꿀꺽, 꿀꺽…… 후──응<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そして細くて白い喉が動き、口内に溜まった精液を飲んでいく。"
translation = "그리고 가늘고 하얀 목이 움직이며, 입안에 고인 정액을 삼켜간다."

[[dialogue]]
speaker = "ナミエル"
original = "「ずるるる……じゅるっ、じゅぱっ……んっ……こくん<emoji=heart04>」"
translation = "「즈루루루…… 츄릅, 츄팟…… 응…… 꿀꺽<emoji=heart04>」"

[[dialogue]]
speaker = "ナミエル"
original = "「ちゅっぱぁあ……<emoji=heart04>\u3000んぅうっ……すごい量、でした……ふはぁあ……<emoji=heart04>」"
translation = "「츄파아아……<emoji=heart04> 응우웃…… 엄청난 양, 이었어요…… 후하아아……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「めちゃくちゃ……良かった……今日もありがとう、ナミエル」"
translation = "「엄청나게…… 좋았어…… 오늘도 고마워, 나미엘.」"

[[dialogue]]
speaker = "ナミエル"
original = "「はい……<emoji=heart04>」"
translation = "「네……<emoji=heart04>」"

[[dialogue]]
speaker = "ナミエル"
original = "「あ、ダメです……まだ動かないで……」"
translation = "「아, 안 돼요…… 아직 움직이지 마세요……」"

[[dialogue]]
speaker = "ナミエル"
original = "「精液でどろどろのおち○ちん……お掃除、してあげますから……」"
translation = "「정액으로 끈적끈적한 자지…… 청소, 해드릴 테니까……」"

[[dialogue]]
speaker = "ナミエル"
original = "「んちゅ……ちゅる……ちゅ……はぷ……んちゅる……」"
translation = "「응츄…… 츄르…… 츄…… 하프…… 응츄르……」"

[[dialogue]]
speaker = "unk"
original = "自分の体だって精液で汚れているのに、俺のペニスの方ばかりを綺麗にしてくれる。"
translation = "자기 몸도 정액으로 더러워졌는데, 내 페니스 쪽만 깨끗하게 닦아주고 있다."

[[dialogue]]
speaker = "unk"
original = "健気でいじらしくて、本当に愛らしくってたまらない。"
translation = "기특하고 애처롭고, 정말 사랑스러워서 견딜 수가 없다."

[[dialogue]]
speaker = "ナミエル"
original = "「ちゅっ……ちゅぅ……んちゅ、ちゅぅ、ちゅぷ、れる、れる……」"
translation = "「츄…… 츄우…… 응츄, 츄우, 츄푸, 핥을, 핥을……」"

[[dialogue]]
speaker = "unk"
original = "舐めると言うより、優しくキスされているようなお掃除フェラ……ずっとしてもらいたいな、これ。"
translation = "핥는다기보다는 부드럽게 키스받는 듯한 청소 페라…… 계속 받고 싶네, 이거."

[[dialogue]]
speaker = "ナミエル"
original = "「んちゅ、ちゅる、れぇ、んちゅ、ちゅ、ちゅぅ、ちゅ……んん。あなたの精液……んく。この味、好きです……美味しい……<emoji=heart04>」"
translation = "「응츄, 츄르, 핥, 응츄, 츄, 츄우, 츄…… 응응. 당신의 정액…… 응크. 이 맛, 좋아해요…… 맛있어……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「一般的には、まずいらしいけどな」"
translation = "「일반적으로는, 맛없다던데 말이지.」"

[[dialogue]]
speaker = "ナミエル"
original = "「そう、らしいですね……んちゅ、ちゅ……」"
translation = "「그런, 것 같네요…… 응츄, 츄……」"

[[dialogue]]
speaker = "ナミエル"
original = "「でも、今だけは。味オンチで良かったと思ってしまいます」"
translation = "「하지만, 지금만큼은. 미각치라서 다행이라고 생각해요.」"

[[dialogue]]
speaker = "ナミエル"
original = "「あなたの精液を美味しいって思えるのは……なんだか、嬉しいですから。んちゅ」"
translation = "「당신의 정액을 맛있다고 느낄 수 있는 건…… 왠지, 기쁘니까요. 응츄.」"

[[dialogue]]
speaker = "ナミエル"
original = "「ん……おち○ちんもくったりしましたし……後は飛び散った精液も舐め取って、終わりにしましょう」"
translation = "「응…… 자지도 축 늘어졌고…… 나머지는 튀어 오른 정액도 핥아서, 끝내도록 하죠.」"

[[dialogue]]
speaker = "ナミエル"
original = "「明日以降も、ムラムラしたら私に奉仕を命じてください」"
translation = "「내일 이후로도, 욕정이 생기면 저에게 봉사를 명령해주세요.」"

[[dialogue]]
speaker = "ナミエル"
original = "「えっちなあなたのお世話……毎日してあげます」"
translation = "「야한 당신의 뒷바라지…… 매일 해드릴게요.」"

[[dialogue]]
speaker = "ナミエル"
original = "「仕方なく。あくまで仕方なく──ですからね？」"
translation = "「어쩔 수 없이. 어디까지나 어쩔 수 없이──니까요?」"

