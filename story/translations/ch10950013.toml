[[dialogue]]
speaker = "unk"
original = "第３話,染井シズハは諦めない,P"
translation = "제3화, 소메이 시즈하는 포기하지 않아, P"

[[dialogue]]
speaker = "unk"
original = "ある日、俺とサーシャさんは、シズハから呼び出しを受けた。"
translation = "어느 날, 나와 사샤 씨는 시즈하로부터 호출을 받았다."

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「シズハちゃ～ん♪\u3000ごきげんよう♪」"
translation = "「시즈하 짱~♪ 안녕~♪」"

[[dialogue]]
speaker = "シズハ"
original = "「サーシャさん！\u3000えへへ、ごきげんよう♪」"
translation = "「사샤 씨! 에헤헤, 안녕하세요♪」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「会長さん、サーシャさん、こんにちは～♪」"
translation = "「회장님, 사샤 씨, 안녕하세요~♪」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「あら♪\u3000トレジアンナさん、今日はサチちゃんと一緒じゃないの？」"
translation = "「어머♪ 트레지아나 씨, 오늘은 사치 짱이랑 같이 있지 않네?」"

[[dialogue]]
speaker = "unk"
original = "トレジアンナさんの声は、シズハが手に持っている四つ葉のクローバー型の髪飾りから聞こえてきた。"
translation = "트레지아나 씨의 목소리는 시즈하가 손에 들고 있는 네잎클로버 모양의 머리장식에서 들려왔다."

[[dialogue]]
speaker = "シズハ"
original = "「サチちゃんに頼んで、借りてきたの。トレジアンナさんに見てもらいたいものがあって」"
translation = "「사치 짱에게 부탁해서 빌려왔어. 트레지아나 씨에게 보여주고 싶은 게 있어서」"

[[dialogue]]
speaker = "シズハ"
original = "「ねぇ、会長、サーシャさん。お願いがあるんだけど――」"
translation = "「저기, 회장, 사샤 씨. 부탁이 있는데──」"

[[dialogue]]
speaker = "シズハ"
original = "「私に、魔王だけが使える技――『アルケインコード』を見せてもらえないかしら？」"
translation = "「나에게 마왕만이 사용할 수 있는 기술── 『알케인 코드』를 보여줄 수 없을까?」"

[[dialogue]]
speaker = "unk"
original = "アルケインコードは、以前、新星学園に転入して来た生徒――クルセイダースの子孫であるメイプル・モノクラウンから伝えられた、先代魔王が使っていたという秘技である。"
translation = "알케인 코드는 이전에 신성 학원에 전학 온 학생── 크루세이더스의 후예인 메이플 모노크라운으로부터 전해진, 선대 마왕이 사용했다는 비기이다."

[[dialogue]]
speaker = "unk"
original = "その真名は『アルケインノヴァエクストリーム』。メイプル曰く、魔王と絆で結ばれた仲間の潜在能力を覚醒させる技、とのことだ。"
translation = "그 진명은 『알케인 노바 익스트림』. 메이플의 말에 따르면, 마왕과 유대로 맺어진 동료의 잠재 능력을 각성시키는 기술이라고 한다."

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「１度変身に成功していれば、会長くんが近くにいなくてもノヴァフォームに変身可能だとは判明しているけれど……」"
translation = "「한 번 변신에 성공했다면 회장 군이 근처에 없어도 노바 폼으로 변신 가능하다는 건 판명되었지만……」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「シズハちゃんとトレジアンナさんが見たいのは、アルケインコードの発動ってことよね？」"
translation = "「시즈하 짱이랑 트레지아나 씨가 보고 싶은 건 알케인 코드의 발동이라는 거지?」"

[[dialogue]]
speaker = "シズハ"
original = "「うん。お願い！」"
translation = "「응. 부탁해!」"

[[dialogue]]
speaker = "unk"
original = "俺は、サーシャさんと目を合わせて頷き、技を唱える。"
translation = "나는 사샤 씨와 눈을 맞추고 고개를 끄덕이며 기술을 외친다."

[[dialogue]]
speaker = "unk"
original = "アルケインノヴァエクストリーム！"
translation = "알케인 노바 익스트림!"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「チェンジ――ノヴァフォーム！」"
translation = "「체인지── 노바 폼!」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「おおぉ～～～っ！\u3000これが魔王だけが使える技ですか～！」"
translation = "「오오오~~옷! 이것이 마왕만이 사용할 수 있는 기술인가요~!」"

[[dialogue]]
speaker = "シズハ"
original = "「サーシャさんのパワーアップした戦闘服、やっぱり素敵だわ♪\u3000氷の女王様って感じで、神々しくて、すっごく綺麗♪」"
translation = "「사샤 씨의 파워 업한 전투복, 역시 멋져요♪ 얼음 여왕님 같은 느낌이라 신성하고 정말 예뻐요♪」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「ふふっ、ありがと～♪\u3000あれから試してわかったんだけど、ノヴァフォームは会長くんが近くにいた方が、魔王の力と共鳴して、より強い力を発揮できるみたい」"
translation = "「후훗, 고마워~♪ 그때 이후로 시험해 봐서 알게 된 건데, 노바 폼은 회장 군이 근처에 있는 편이 마왕의 힘과 공명해서 더 강한 힘을 발휘할 수 있는 것 같아」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「ふむふむ、今見た感じ、アルケインコードは星力以外の力も使っているようですね～」"
translation = "「흠흠, 지금 본 느낌으로는 알케인 코드는 성력 이외의 힘도 사용하고 있는 것 같네요~」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「発動の瞬間、星力、霊力、魔力――３種の力を感じました。それらのミックスが必要となる為に、この技は魔王のみが使えるということなのでしょう」"
translation = "「발동 순간, 성력, 영력, 마력── 3종류의 힘을 느꼈습니다. 그것들의 믹스가 필요하기 때문에 이 기술은 마왕만이 사용할 수 있다는 것이겠죠」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「そして、術式の基盤はどうやら『魔法』となっているようですね。つまりこれは、一般に普及していない『新魔法』と言えるでしょう！」"
translation = "「그리고 술식의 기반은 아무래도 『마법』으로 되어 있는 것 같네요. 즉 이것은 일반적으로 보급되지 않은 『신마법』이라고 할 수 있겠죠!」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「古い時代の魔界では、新しい魔法はそう珍しいものではありませんでしたが……いやはや、しかしこれ程の完成度のものは、滅多にお目にかかれませんよ！」"
translation = "「옛날 시대의 마계에서는 새로운 마법이 그렇게 드문 것은 아니었습니다만…… 아니 정말, 하지만 이 정도의 완성도를 가진 것은 좀처럼 보기 힘들어요!」"

[[dialogue]]
speaker = "シズハ"
original = "「トレジアンナさん。私にも『新魔法』……作れるかな？」"
translation = "「트레지아나 씨. 나도 『신마법』…… 만들 수 있을까?」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「確証はないですが、実例が目の前にある以上、可能性はありますよ！」"
translation = "「확증은 없지만, 실례가 눈앞에 있는 이상 가능성은 있어요!」"

[[dialogue]]
speaker = "unk"
original = "そう言って、２人で何やら盛り上がるシズハとトレジアンナさん。"
translation = "그렇게 말하며 둘이서 무언가 분위기가 달아오르는 시즈하와 트레지아나 씨."

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「それで、アルケインコードを見たかったのには、どんな事情があるのかしら？」"
translation = "「그래서 알케인 코드를 보고 싶었던 데에는 어떤 사정이 있는 걸까?」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「はい。実はですね、シズハさんから『新しい魔法が作れないか？』というご相談を受けまして」"
translation = "「네. 사실은 말이죠, 시즈하 씨로부터 『새로운 마법을 만들 수 없을까?』라는 상담을 받아서요」"

[[dialogue]]
speaker = "unk"
original = "シズハはどうしてそんなものを？"
translation = "시즈하는 어째서 그런 걸?"

[[dialogue]]
speaker = "シズハ"
original = "「えっと、それはね――」"
translation = "「저기, 그건 말이야──」"

[[dialogue]]
speaker = "unk"
original = "――ある日、シズハはサチとトレジアンナと空き教室に呼んで、１つの相談をしていた。"
translation = "──어느 날, 시즈하는 사치와 트레지아나를 빈 교실로 불러서 한 가지 상담을 하고 있었다."

[[dialogue]]
speaker = "トレジアンナ"
original = "「なっ……！？\u3000『聖杯』を怪我や病気の人の治療に使いたいですって～～～！？」"
translation = "「뭐……!? 『성배』를 부상이나 병에 걸린 사람의 치료에 쓰고 싶다고요~~~!?」"

[[dialogue]]
speaker = "シズハ"
original = "「うん、そう。……ダメかな？」"
translation = "「응, 맞아. ……안 될까?」"

[[dialogue]]
speaker = "unk"
original = "シズハは自身の胸に手を当てながら言う。『願望』のロストアイテム――『願いの聖杯』は、シズハの心臓の部分にあり、融合している。"
translation = "시즈하는 자신의 가슴에 손을 얹으며 말한다. 『염원』의 로스트 아이템── 『소원의 성배』는 시즈하의 심장 부분에 있으며 융합되어 있다."

[[dialogue]]
speaker = "トレジアンナ"
original = "「だ、だだだ、ダメですよ！\u3000絶対に禁止です！\u3000いや、先に相談して下さってありがとうございます！！！」"
translation = "「아, 아아아, 안 돼요! 절대로 금지입니다! 아니, 먼저 상담해 주셔서 감사합니다!!!」"

[[dialogue]]
speaker = "サチ"
original = "「え？\u3000私はすごくいいことだと思うんだけど、そんなに慌てるほどダメなの？」"
translation = "「에? 나는 굉장히 좋은 일이라고 생각하는데, 그렇게 당황할 정도로 안 되는 거야?」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「ロストアイテムは、リクリエすら超越し得る『超常の力』です」"
translation = "「로스트 아이템은 리크리에조차 초월할 수 있는 『초상적인 힘』입니다」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「特に聖杯は、『過程を飛ばして結果を手に入れる』『結果を手に入れたことで現在が書き換わる』――」"
translation = "「특히 성배는 『과정을 건너뛰고 결과를 손에 넣는다』 『결과를 손에 넣음으로써 현재가 개변된다』──」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「すなわち『因果律に干渉する』力。ロストアイテムの中でも、トップクラスにヤバい代物です」"
translation = "「즉 『인과율에 간섭하는』 힘. 로스트 아이템 중에서도 톱클래스로 위험한 물건입니다」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「世界にも『自己修復力』とでも呼ぶような、『不自然の辻褄を勝手に合わせてくれる』能力があります」"
translation = "「세계에도 『자기 수복력』이라고 부를 법한, 『부자연스러운 앞뒤를 멋대로 맞춰주는』 능력이 있습니다」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「守護天使が一時不在でも、急に世界が崩壊しないのはこの力のお陰ですし……」"
translation = "「수호천사가 일시 부재 중이어도 갑자기 세계가 붕괴하지 않는 것은 이 힘 덕분이고……」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「ロストアイテムが多少使われるくらいの『不自然』なら、ヒトの体の傷が勝手に癒えるように、問題にはなりません」"
translation = "「로스트 아이템이 다소 사용되는 정도의 『부자연스러움』이라면, 사람 몸의 상처가 저절로 낫는 것처럼 문제가 되지 않습니다」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「つまり、シズハさんが戦闘に聖杯を用いるくらいなら問題にはならない」"
translation = "「즉, 시즈하 씨가 전투에 성배를 이용하는 정도라면 문제가 되지 않아요」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「ですが、死せる運命の人を、それも何人、何十人と救うのは、世界を大きく歪める原因になり得ます」"
translation = "「하지만 죽을 운명인 사람을, 그것도 몇 명, 몇십 명이나 구하는 것은 세계를 크게 왜곡하는 원인이 될 수 있습니다」"

[[dialogue]]
speaker = "サチ"
original = "「じゃあ、ロストアイテムで人を治療するのは……」"
translation = "「그럼 로스트 아이템으로 사람을 치료하는 건……」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「やめておいた方がいいと思いますね～。三界の摂理が壊れて、そこから次のリクリエが始まっちゃう可能性だってありますよ！」"
translation = "「그만두는 게 좋다고 생각해요~. 삼계의 섭리가 파괴되어 거기서부터 다음 리크리에가 시작될 가능성도 있다고요!」"

[[dialogue]]
speaker = "サチ"
original = "「なるほど……ロストアイテムの危険性って、具体的にはそういうことだったんですね」"
translation = "「과연…… 로스트 아이템의 위험성이란 구체적으로 그런 거였군요」"

[[dialogue]]
speaker = "シズハ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "シズハ"
original = "「世界に『自己修復力』があるというのは、仮説じゃなくて……間違いないのかな？」"
translation = "「세계에 『자기 수복력』이 있다는 건 가설이 아니라…… 틀림없는 걸까?」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「はい。それは確かです。これでも私、昔は研究者をやっていたので！」"
translation = "「네. 그건 확실합니다. 이래 봬도 저, 옛날에는 연구자였으니까요!」"

[[dialogue]]
speaker = "シズハ"
original = "「それなら、ロストアイテムの能力を使って人を治療するんじゃなくて……」"
translation = "「그렇다면 로스트 아이템의 능력을 사용해서 사람을 치료하는 게 아니라……」"

[[dialogue]]
speaker = "シズハ"
original = "「聖杯ちゃんの魔力を用いて、私の『魔法』で人を治療するのなら……どうかな？」"
translation = "「성배 짱의 마력을 이용해서 나의 『마법』으로 사람을 치료하는 거라면…… 어떨까?」"

[[dialogue]]
speaker = "シズハ"
original = "「つまりは、今ある医療や回復星術では治せない怪我や病気を治療する――『新魔法』を作るの」"
translation = "「즉, 지금 있는 의료나 회복 성술로는 고칠 수 없는 부상이나 병을 치료하는── 『신마법』을 만드는 거야」"

[[dialogue]]
speaker = "シズハ"
original = "「そんなわけで、新魔法の参考として、会長の『アルケインノヴァエクストリーム』を見せてもらいたかったの」"
translation = "「그런 이유로 신마법의 참고로서 회장의 『알케인 노바 익스트림』을 보여줬으면 했어」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「シズハちゃんはすごいことを考えるのね～」"
translation = "「시즈하 짱은 대단한 생각을 하는구나~」"

[[dialogue]]
speaker = "シズハ"
original = "「えへへ♪\u3000私、諦めないことに関しては、人一倍自信があるから！」"
translation = "「에헤헤♪ 나, 포기하지 않는 것에 관해서는 남들보다 배로 자신 있거든!」"

[[dialogue]]
speaker = "シズハ"
original = "「……前にも話したかもしれないけど、聖杯ちゃんと出会わなければ、私は余命わずかで、そのまま死ぬところだった」"
translation = "「……전에도 말했을지 모르지만, 성배 짱을 만나지 못했다면 나는 여명이 얼마 남지 않아서 그대로 죽었을 거야」"

[[dialogue]]
speaker = "シズハ"
original = "「だからね、入院生活の中で、人生の意味みたいなものをよく考えてたの」"
translation = "「그래서 말이야, 입원 생활 중에 인생의 의미 같은 걸 자주 생각했어」"

[[dialogue]]
speaker = "シズハ"
original = "「私は、全ての命に生まれた意味がある『とは思わない』わ」"
translation = "「나는 모든 생명에 태어난 의미가 있다고 『생각하지 않아』」"

[[dialogue]]
speaker = "シズハ"
original = "「何事も成せずに死んでいく命は多くある。実際に病院で見てきたし……」"
translation = "「아무것도 이루지 못하고 죽어가는 생명은 많이 있어. 실제로 병원에서 봐왔고……」"

[[dialogue]]
speaker = "シズハ"
original = "「だからこそ私は、生き延びた今日に感謝して、自分の生き残った意味を未来に、少しでも多く残したいって思うの」"
translation = "「그렇기에 나는 살아남은 오늘에 감사하며, 내가 살아남은 의미를 미래에 조금이라도 더 많이 남기고 싶다고 생각해」"

[[dialogue]]
speaker = "シズハ"
original = "「生きた証が偉業である必要はないと思う。けれど、私は『聖杯』の所持者になってしまったから」"
translation = "「살아있다는 증거가 위업일 필요는 없다고 생각해. 하지만 나는 『성배』의 소지자가 되어버렸으니까」"

[[dialogue]]
speaker = "シズハ"
original = "「それによって救える何かがあるなら、可能性を諦めたくないの」"
translation = "「그것으로 구할 수 있는 무언가가 있다면 가능성을 포기하고 싶지 않아」"

[[dialogue]]
speaker = "シズハ"
original = "「……寿命の短い人間でしかない私が生きてるうちに、『新魔法』は完成しないかもしれない」"
translation = "「……수명이 짧은 인간일 뿐인 내가 살아있는 동안에 『신마법』은 완성되지 않을지도 몰라」"

[[dialogue]]
speaker = "シズハ"
original = "「トレジアンナさんが言うには、素晴らしい魔法は何百年、何千年という積み重ねの果てに生まれるものであって、そうそう完成はしないんだって」"
translation = "「트레지아나 씨 말로는 훌륭한 마법은 수백 년, 수천 년이라는 축적 끝에 태어나는 것이라 그렇게 쉽게 완성되지 않는대」"

[[dialogue]]
speaker = "シズハ"
original = "「でもね……私の死は、私が何かを諦める理由にはならないわ」"
translation = "「하지만 말이야…… 나의 죽음이 내가 무언가를 포기할 이유가 되지는 않아」"

[[dialogue]]
speaker = "シズハ"
original = "「私の始めた研究を、いつかトレジアンナさんや、未来の星騎士や魔族のヒトが完成させてくれるかもしれない」"
translation = "「내가 시작한 연구를 언젠가 트레지아나 씨나 미래의 성기사나 마족 사람이 완성해 줄지도 모르잖아」"

[[dialogue]]
speaker = "シズハ"
original = "「だから私は目指すわ――命を救う『新魔法』の実現を！」"
translation = "「그래서 나는 목표로 할 거야── 생명을 구하는 『신마법』의 실현을!」"

[[dialogue]]
speaker = "unk"
original = "シズハ、なんだかカッコいいな"
translation = "시즈하, 왠지 멋진걸"

[[dialogue]]
speaker = "シズハ"
original = "「え？\u3000そうかな？\u3000会長に言われると、なんだか照れるわね♪」"
translation = "「에? 그럴까? 회장에게 그런 말을 들으니 왠지 쑥스럽네♪」"

[[dialogue]]
speaker = "unk"
original = "年下で普段は無邪気な姿を見せることも多い彼女なのに、今日はなんだか大人っぽく見えた。"
translation = "연하에 평소에는 천진난만한 모습을 보일 때가 많은 그녀인데, 오늘은 왠지 어른스럽게 보였다."

[[dialogue]]
speaker = "unk"
original = "新魔法の研究、もちろん協力するよ"
translation = "신마법 연구, 물론 협력할게"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「研究で私が手伝えることは少ないかもしれないけど、実験だったらいくらでも付き合うから、何でも言ってね♪」"
translation = "「연구에서 내가 도와줄 수 있는 건 적을지 모르지만, 실험이라면 얼마든지 어울려 줄 테니까 뭐든 말해줘♪」"

[[dialogue]]
speaker = "シズハ"
original = "「会長、サーシャさん、本当にありがとう！！」"
translation = "「회장, 사샤 씨, 정말 고마워!!」"

[[dialogue]]
speaker = "unk"
original = "俺たちが協力を約束すると、彼女は嬉しそうに微笑むのだった。"
translation = "우리가 협력을 약속하자 그녀는 기쁜 듯이 미소 짓는 것이었다."

