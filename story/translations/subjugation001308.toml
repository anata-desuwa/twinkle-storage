[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「わたくし……あるべきところに還るのね……」"
translation = "「나…… 있어야 할 곳으로 돌아가는구나……」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「私たちの勝利です……！」"
translation = "「우리의 승리입니다……!」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「セシアがフィーニスの塔に還ったね。これで世界も正常化に近づいたはずだよ」"
translation = "「세시아가 피니스의 탑으로 돌아갔네. 이걸로 세계도 정상화에 가까워졌을 거야」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「は～、お疲れ様でした～……。今日は思い通りにいくことばかりで、とってもラッキーでしたね！」"
translation = "「하~ 수고하셨습니다~……. 오늘은 생각대로 풀리는 일뿐이라 정말 럭키하네요!」"

[[dialogue]]
speaker_original = "クラウディア（黄昏）"
speaker_translation = "클라우디아(황혼)"
original = "「ハーーハッハッハ！\u3000余の大活躍であったな！」"
translation = "「하하하하하! 짐의 대활약이었도다!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「さすがネビュラの総帥。肩書に違わぬ力でした」"
translation = "「과연 네뷸라의 총수. 직함에 어울리는 힘이었습니다」"

[[dialogue]]
speaker_original = "クラウディア（黄昏）"
speaker_translation = "클라우디아(황혼)"
original = "「うむ。お主らの働きも悪くなかったぞ」"
translation = "「음. 그대들의 활약도 나쁘지 않았느니라」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「モンスターが消えましたわね。守護天使を解放できたようです」"
translation = "「몬스터가 사라졌어요. 수호천사를 해방한 모양이네요」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「ふっふん、あたしの方がモンスター倒してたよね！」"
translation = "「훗흥, 내가 몬스터를 더 많이 쓰러뜨렸지!」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「む。それは聞き捨てなりませんの。私の槍の方がモンスターを貫きましたわ！」"
translation = "「무. 그건 그냥 넘어갈 수 없어요. 제 창이 몬스터를 더 많이 꿰뚫었답니다!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「え～、あたしの方が倒したでしょ！\u3000む～……こうなったら模擬戦だ！」"
translation = "「에~ 내가 더 많이 쓰러뜨렸다니까! 으으…… 이렇게 된 이상 모의전이다!」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「ええ、受けて立ちますわ！\u3000流星市国に帰ったらすぐ始めますわよ！」"
translation = "「에에, 받아들이겠어요! 유성시국으로 돌아가면 바로 시작하겠어요!」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「結局こうなるのですね……」"
translation = "「결국 이렇게 되는군요……」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「さてと。家来のみなさーん、こっちですよー」"
translation = "「자, 그러면. 가신 여러분~ 이쪽이에요~」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ディアーブル家の方々、来ていたのですね。何をされるんですか？」"
translation = "「디아블 가문의 분들, 와 계셨군요. 무엇을 하시는 건가요?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「狩りの後の<ruby>野営<rt>ピクニック</rt></ruby>は貴族の嗜みですから。本当なら豪華な料理を用意するところですが、時間もないのでお茶とお菓子だけ用意させました」"
translation = "「사냥 후의 야영은 귀족의 소양이니깐요. 원래라면 호화로운 요리를 준비해야겠지만 시간도 없으니 차와 과자만 준비시켰어요」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「では私もお手伝いを……」"
translation = "「그럼 저도 돕겠습니다……」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「ナミエルさん。今日は給仕をしなくていいですよ」"
translation = "「나미엘 씨. 오늘은 시중을 들지 않아도 돼요」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「でも私はメイドですから……」"
translation = "「하지만 저는 메이드니까……」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「メイドであるならなおさら、客人の時は客人として扱われてください。私の使用人に恥をかかせないでくださいな」"
translation = "「메이드라면 더더욱 손님이 오셨을 때는 손님으로서 대접받으세요. 제 고용인에게 부끄러운 짓을 하게 하지 말아주세요」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「……はい。ではいただきますね」"
translation = "「……네. 그럼 감사히 먹겠습니다」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「わぁ、このジャムおいしそ～！\u3000こっちはスコーンかな？」"
translation = "「와아, 이 잼 맛있어 보여~! 이쪽은 스콘인가?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「貴様、さっきまでとは雰囲気が違うな」"
translation = "「네놈, 아까까지와는 분위기가 다르구나」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「いや～、今までは外行きモードっていうか、セドナさんにネビュラらしくしろって言われててね」"
translation = "「아니~ 지금까지는 대외용 모드랄까, 세드나 씨가 네뷸라답게 굴라고 말해서 말이지」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「でもリクリエは止めたし、もういいよね。私が言っちゃいけないかもだけど、人間界が無事で良かった！\u3000さ、お菓子一緒に食べよ、ミーちゃん♪」"
translation = "「하지만 리크리에는 멈췄고 이젠 상관없겠지. 내가 말할 처지는 아닐지도 모르지만 인간계가 무사해서 다행이야! 자, 과자 같이 먹자, 미짱♪」"

[[dialogue]]
speaker_original = "ミーちゃん"
speaker_translation = "미짱"
original = "「ホー！」"
translation = "「호!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ああ！？\u3000戻ってきたら美味しそうなもの食べてます！\u3000羨ましいです！」"
translation = "「아아!? 돌아와 보니 맛있는 걸 먹고 있어요! 부러워요!」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「もちろん皆さんの分もありますよ。ディアーブル家の土地で採れたベリーのジャムです。召し上がれ」"
translation = "「물론 여러분의 몫도 있답니다. 디아블 가문의 영지에서 딴 베리로 만든 잼이에요. 드셔보세요」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「いっただっきまーす♪\u3000ん～、これすごくおいしい♪」"
translation = "「잘 먹겠습니다~♪ 음~ 이거 정말 맛있어♪」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「では私も頂きますね。恥ずかしながら、激しい戦いでお腹が減ってしまって……」"
translation = "「그럼 저도 먹겠습니다. 부끄럽지만 격렬한 전투로 배가 고파버려서……」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ひょいっと」"
translation = "「휙」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「あ！\u3000今私が食べようとしたの取ったでしょ！」"
translation = "「아! 지금 내가 먹으려던 거 가져갔지!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「さぁ～？\u3000何のことか知らんなぁ～」"
translation = "「글쎄~? 무슨 소린지 모르겠구나~」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「これがケンカするほど仲が良い……ということなのでしょうか。トマルさんがいないとやはりこうなりますね」"
translation = "「이것이 싸울 정도로 사이가 좋다……는 것일까요. 토마루 씨가 없으면 역시 이렇게 되는군요」"

[[dialogue]]
speaker_original = "クラウディア（黄昏）"
speaker_translation = "클라우디아(황혼)"
original = "「もちろん余の分もあるのだろうな」"
translation = "「물론 짐의 몫도 있겠지」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「姫様！？\u3000どうしてここにいるんですか！？」"
translation = "「공주님!? 어째서 여기에 계신 건가요!?」"

[[dialogue]]
speaker_original = "クラウディア（黄昏）"
speaker_translation = "클라우디아(황혼)"
original = "「セドナの目を盗んでな。今頃慌てふためいているやもしれんが、あやつなら上手くやるだろう」"
translation = "「세드나의 눈을 피해 왔다. 지금쯤 허둥대고 있을지도 모르지만 그 녀석이라면 잘해내겠지」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "『姫様。お疲れ様でした。堕天使が相手といえど、光の魔女の敵ではありませんでしたね』"
translation = "『공주님. 수고하셨습니다. 타천사가 상대라곤 해도 빛의 마녀의 적은 아니었군요』"

[[dialogue]]
speaker_original = "クラウディア（黄昏）"
speaker_translation = "클라우디아(황혼)"
original = "「セドナ！？\u3000う、うむ、くるしゅうないぞ」"
translation = "「세드나!? 으, 음, 수고했다」"

[[dialogue]]
speaker_original = "クラウディア（黄昏）"
speaker_translation = "클라우디아(황혼)"
original = "（どうした？\u3000てっきりお説教かと思ったが……）"
translation = "(뭐지? 분명 설교를 들을 줄 알았는데……)"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "『ネビュラとしては姫様の労を労わねばなりません。採れたて野菜のフルコースを用意してお帰りをお待ちしています』"
translation = "『네뷸라로서는 공주님의 노고를 치하해야 합니다. 갓 수확한 채소 풀코스를 준비하고 귀환을 기다리고 있겠습니다』"

[[dialogue]]
speaker_original = "クラウディア（黄昏）"
speaker_translation = "클라우디아(황혼)"
original = "「やっぱり怒っているではないか！？\u3000野菜はイヤだ～～～！！」"
translation = "「역시 화난 것 아니냐!? 채소는 싫단 말이다~~!!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「ところでさぁ……シャルレーヌってほんとに１年生なの？」"
translation = "「그나저나 말이야…… 샤를레느는 정말로 1학년이야?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「はい、そうですよ。よく言われるんですけど、そんなに１年生らしくないですか？」"
translation = "「네, 맞아요. 자주 듣는 소리긴 한데 그렇게 1학년답지 않나요?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "（だって１年生なのに……）"
translation = "(그도 그럴 게 1학년인데……)"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "（この中で一番……）"
translation = "(이 중에서 제일……)"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "（お胸が大きいですから！）"
translation = "(가슴이 크니까요!)"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「へぇ、シャルレーヌさん、１年生だったんですか。一番大人っぽいから意外ですね！」"
translation = "「헤에, 샤를레느 씨 1학년이었나요. 가장 어른스러워서 의외네요!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「あぅっ……私、３年生で生徒会長なのに……」"
translation = "「아으으…… 나, 3학년에 학생회장인데……」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ハハッ、サチ、言われておるぞ」"
translation = "「하하, 사치, 한 소리 듣고 있구나」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「プリムラさまも体型は似たようなものでは……？」"
translation = "「프리뮬라 님도 체형은 비슷하신 것 같은데요……?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「我は真の姿ではボンキュッボンなのじゃ！」"
translation = "「짐은 진정한 모습에선 빵빵하단 말이다!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「他の場所でもきっと皆さんが頑張ってくれているはずです。私たちの戦いは終わった以上、信じて待ちましょう」"
translation = "「다른 곳에서도 분명 여러분이 힘내주고 계실 거예요. 우리의 전투가 끝난 이상 믿고 기다리기로 하죠」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「そうですね、絶対やってくれます！\u3000……あれ？\u3000パテルさんには流星学園、アルモタヘルさんには新星学園、セシアさんには附属校生……それだと他の場所は？」"
translation = "「그렇네요, 절대 해낼 거예요! ……어라? 파텔 씨는 유성학원, 아르모타헬 씨는 신성학원, 세시아 씨는 부속생…… 그렇다면 다른 곳은?」"

