[[dialogue]]
speaker = "unk"
original = "とある週末の出来事。"
translation = "어느 주말의 일."

[[dialogue]]
speaker = "unk"
original = "今日は朝からセナリィと２人きり。映画を観たり、買い物に行ったりと、実に学生らしい健全なデートをして過ごした。"
translation = "오늘은 아침부터 세나리와 단둘이. 영화를 보거나 쇼핑을 하러 가는 등, 참으로 학생다운 건전한 데이트를 하며 보냈다."

[[dialogue]]
speaker = "unk"
original = "楽しい時間が過ぎるのは、あっという間。気がつけば、日は沈み、隣にいるセナリィの顔もよく見えない夜更け。"
translation = "즐거운 시간이 지나가는 것은 순식간. 정신을 차려보니 해는 저물고, 옆에 있는 세나리의 얼굴도 잘 보이지 않는 깊은 밤."

[[dialogue]]
speaker = "セナリィ"
original = "「今日もすごく楽しいデートでしたわ。会長様、エスコートありがとうございます」"
translation = "「오늘도 정말 즐거운 데이트였어요. 회장님, 에스코트 감사합니다.」"

[[dialogue]]
speaker = "unk"
original = "顔は見えなくとも、ずっと繋いでいる手の温かみで、彼女が傍にいることを強く感じた。"
translation = "얼굴은 보이지 않아도 줄곧 맞잡고 있는 손의 온기로 그녀가 곁에 있다는 것을 강하게 느꼈다."

[[dialogue]]
speaker = "unk"
original = "もうすぐお別れの分岐点が迫っているけれど、彼女との別れはいつだって名残惜しい。"
translation = "이제 곧 헤어질 분기점이 다가오고 있지만, 그녀와의 이별은 언제나 아쉽기만 하다."

[[dialogue]]
speaker = "セナリィ"
original = "「まだあなたと離れたくありませんの……」"
translation = "「아직 당신과 떨어지고 싶지 않아요……」"

[[dialogue]]
speaker = "unk"
original = "考えていることはセナリィも同じだ。繋がっている手には跡が残りそうな程にギュッと力がこもった。"
translation = "생각하는 것은 세나리도 마찬가지다. 이어져 있는 손에는 자국이 남을 정도로 꽉 힘이 들어갔다."

[[dialogue]]
speaker = "セナリィ"
original = "「ちょうど明日はお休みですし、仕事もありませんし……よろしければ、私の家に泊まっていきません？」"
translation = "「마침 내일은 쉬는 날이고, 업무도 없으니까…… 괜찮으시다면, 저희 집에서 자고 가지 않겠어요?」"

[[dialogue]]
speaker = "クロト"
original = "「……いいの？」"
translation = "「……괜찮아?」"

[[dialogue]]
speaker = "セナリィ"
original = "「ダメだったら、こんなこと言いませんわ。それに会長様にお見せしたいものもありますから」"
translation = "「안 된다면, 이런 말 하지 않아요. 게다가 회장님께 보여드리고 싶은 것도 있으니까요」"

[[dialogue]]
speaker = "unk"
original = "俺とセナリィが恋人関係である以上、それはすなわちお泊りエッチの誘惑でもあるわけで……。"
translation = "나와 세나리가 연인 관계인 이상, 그것은 즉 외박 섹스의 유혹이기도 한 법이라……."

[[dialogue]]
speaker = "unk"
original = "セナリィの住む事務所へと向かうその道中、俺たちが漏らす吐息は少し熱くて、荒かった。"
translation = "세나리가 사는 사무소로 향하는 그 도중, 우리들이 내뱉는 한숨은 조금 뜨겁고, 거칠었다."

[[dialogue]]
speaker = "セナリィ"
original = "「会長様、もう少しお待ちくださいませ……ん、しょっ……１人で着るのは、ちょっと難儀しますわね」"
translation = "「회장님, 조금만 더 기다려 주세요…… 으, 차…… 혼자서 입는 건, 조금 힘드네요」"

[[dialogue]]
speaker = "セナリィ"
original = "「うん、よし、これで完璧ですわね。お待たせしました、会長様！」"
translation = "「응, 좋아, 이걸로 완벽해요. 오래 기다리셨어요, 회장님!」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
original = "「じゃーーーんっ！」"
translation = "「쨔잔!」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
original = "「ふふ、どうでしょう？\u3000バンデット・セナリィ、<ruby>女帝<rt>エンプレス</rt></ruby>フォームですわ！」"
translation = "「후후, 어떠신가요? 밴디트 세나리, <ruby>여제<rt>엠프레스</rt></ruby> 폼이에요!」"

[[dialogue]]
speaker = "クロト"
original = "「おお……見せたかったのって、この服？」"
translation = "「오오…… 보여주고 싶었다는 게, 이 옷?」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
original = "「ええ、今や我がゴールデングースの象徴とも呼べる私の新コスチュームですわ！」"
translation = "「네, 이제 저희 골든 구스의 상징이라고도 부를 수 있는 저의 새 코스튬이에요!」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
original = "「ちなみに、これは本物の<ruby>女帝<rt>エンプレス</rt></ruby>フォームではありません。レプリカですわ。アレを着用していたら星力が一瞬でなくなってしまいますからね」"
translation = "「참고로, 이것은 진짜 <ruby>여제<rt>엠프레스</rt></ruby> 폼이 아니에요. 레플리카예요. 저걸 착용하고 있으면 성력이 순식간에 없어져 버리니까요」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
original = "「今晩は趣向を変えて……この姿で、あなたに愛していただきたいですわ」"
translation = "「오늘 밤은 취향을 바꿔서…… 이 모습으로, 당신에게 사랑받고 싶어요」"

[[dialogue]]
speaker = "クロト"
original = "「今日は俺も試したい物があるんだ。さっきのデート中に買ったんだけど……」"
translation = "「오늘은 나도 시험해 보고 싶은 게 있어. 아까 데이트 중에 샀는데……」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
original = "「試したい物……？\u3000そういえば、こっそりと何か買われてたみたいですけど何でしょう？\u3000まさか、この前みたいに媚薬入りのローションとか──」"
translation = "「시험해 보고 싶은 것……? 그러고 보니, 몰래 무언가 사신 것 같던데 뭘까요? 설마, 요전번처럼 미약이 든 로션이라든가──」"

[[dialogue]]
speaker = "クロト"
original = "「はい、アナルビーズ」"
translation = "「자, 아날 비즈」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
original = "「もっとヒドいものでしたわぁーっ！？」"
translation = "「더 심한 거였잖아요!」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
original = "「噂には聞いたことがありますけども、実物は初めて見ましたわ……アナルに使用するということは、このツブツブを、お尻の穴に入れるんですわよね……？」"
translation = "「소문으로는 들어본 적이 있습니다만, 실물은 처음 봤어요…… 애널에 사용한다는 것은, 이 돌기들을 엉덩이 구멍에 넣는 것이군요……?」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
original = "「感触が想像できませんわね……ハッ、そうですわ！\u3000会長様のアナルに入れるというのもワンチャン──」"
translation = "「감촉이 상상되지 않네요…… 핫, 그렇죠! 회장님의 애널에 넣는다는 것도 원 찬스──」"

[[dialogue]]
speaker = "クロト"
original = "「なし。セナリィに入れるよ」"
translation = "「없어. 세나리ィ에게 넣을 거야」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
original = "「うぅ、ですわよねぇ……！\u3000会長様、本気ですの？」"
translation = "「으으, 그렇겠죠……! 회장님, 진심이신가요?」"

[[dialogue]]
speaker = "クロト"
original = "「俺はいつだって本気だよ。アナルを弄られるのは初めてじゃないでしょ」"
translation = "「난 언제나 진심이야. 애널을 만져지는 건 처음이 아니잖아」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
original = "「それは……まぁ……会長様のおち○ちんを受け入れたことは何度もありますし……そもそも初めてがアナルセックスでしたけど……」"
translation = "「그건…… 뭐…… 회장님의 자지를 받아들인 적은 몇 번이나 있고…… 애초에 처음이 애널 섹스였지만요……」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
original = "「ですが、大人のオモチャを挿入するとなると話は別ですわ。快楽を得るためだけの道具なんて、破廉恥極まれりです……」"
translation = "「하지만, 성인용 장난감을 삽입하는 건 이야기가 달라요. 쾌락을 얻기 위해서만 존재하는 도구라니, 파렴치하기 짝이 없어요……」"

[[dialogue]]
speaker = "クロト"
original = "「興味がないわけじゃないんだよね？」"
translation = "「흥미가 없는 건 아니지?」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
original = "「それは、その……まあ……優しくしてくださいます？」"
translation = "「그건, 그…… 뭐…… 살살 해주실 거죠?」"

[[dialogue]]
speaker = "unk"
original = "学生らしい健全なデートから一転、随分と上級者向けなプレイになって──"
translation = "학생다운 건전한 데이트에서 일전, 상당히 상급자용 플레이가 되어──"

[[dialogue]]
speaker = "セナリィ"
original = "「こ、こんな体位、変態的ですわっ……！\u3000アナルもおま○こも丸見えで……んぉ、おっ、お、ほぁぁ……！」"
translation = "「이, 이런 체위, 변태적이에요……! 애널도 보지도 다 보여서…… 응오, 오, 오, 호아아……!」"

[[dialogue]]
speaker = "セナリィ"
original = "「んぅ、お、おっ……ほぉおん……お尻にツブツブがいっぱい挿入ってまふ……！」"
translation = "「응으, 오, 오…… 호오옹…… 엉덩이에 돌기가 가득 삽입되고 이써요……!」"

[[dialogue]]
speaker = "セナリィ"
original = "「出ちゃいそうなのに、出ていかなくて、すごくもどかしくて……変な気持ちになってしまいますわ……」"
translation = "「나올 것 같은데, 나오지 않아서, 너무 감질나서…… 이상한 기분이 되어버려요……」"

[[dialogue]]
speaker = "セナリィ"
original = "「おち○ちんとも全然違う感触ですわ……んぉっ！？\u3000か、会長様っ、お尻、かき回しちゃ、おっ、ぐりぐり、しないれ、んほぉんっ！？」"
translation = "「자지하고는 전혀 다른 감촉이에요…… 응옷!? 회, 회장님, 엉덩이, 휘저으면, 오, 구릿구릿, 하지 마아, 응호옹!?」"

[[dialogue]]
speaker = "セナリィ"
original = "「はっ、はぉぉ……これが……アナルを気持ちよくするためだけに作られたオモチャですのねぇぇ……？」"
translation = "「하, 하오오…… 이것이…… 애널을 기분 좋게 하기 위해서만 만들어진 장난감이군요……?」"

[[dialogue]]
speaker = "クロト"
original = "「痛くない？」"
translation = "「아프지 않아?」"

[[dialogue]]
speaker = "セナリィ"
original = "「いっ、痛くはありませんけど、異物感がすごくて……あと、この格好はあまりにも恥ずかしすぎますわ……」"
translation = "「아, 아프지는 않지만, 이물감이 엄청나서…… 그리고, 이 모습은 너무나도 수치스러워요……」"

[[dialogue]]
speaker = "セナリィ"
original = "「決して人に見せてはいけない恥部が全て丸見えだなんて、ある種の拷問です……会長様が相手でなければ、舌を噛み切って死んでるところですわよ」"
translation = "「결코 남에게 보여선 안 될 치부가 전부 다 보이다니, 일종의 고문이에요…… 회장님이 상대가 아니었다면, 혀를 깨물고 죽었을 거예요」"

[[dialogue]]
speaker = "クロト"
original = "「そのわりに、セナリィのおま○こはしっとり濡れてるみたいだけど。あ、愛液が垂れたね」"
translation = "「그거치고는, 세나리의 보지는 촉촉하게 젖어 있는 것 같은데. 아, 애액이 흘렀네」"

[[dialogue]]
speaker = "セナリィ"
original = "「～～～ッ！？\u3000そ、そういう会長様のおち○ちんだって、いつもより大きく勃起してませんこと！？」"
translation = "「～～～윽!? 그, 그런 회장님의 자지야말로, 평소보다 크게 발기해 있지 않나요!?」"

[[dialogue]]
speaker = "セナリィ"
original = "「私がアナルを弄られ、喘いでる姿を見ていただけで……こんなにも荒々しく勃起して……会長様は随分と私を愛しく思ってくださってますのね……？」"
translation = "「제가 애널을 유린당하며, 헐떡이는 모습을 보고 있었던 것만으로…… 이렇게나 거칠게 발기해서…… 회장님은 상당히 저를 사랑스럽게 생각해주시는 거군요……?」"

[[dialogue]]
speaker = "クロト"
original = "「もちろん。俺はセナリィを愛してるから」"
translation = "「물론이지. 난 세나리를 사랑하니까」"

[[dialogue]]
speaker = "セナリィ"
original = "「くぅぅ……いきなりの口説き文句、ズルいですわ……！\u3000ああ、すごい……もっと大きく……まるで棍棒ですわね……」"
translation = "「쿠우우…… 갑작스러운 유혹 멘트, 치사해요……! 아아, 굉장해…… 좀 더 크게…… 마치 곤봉 같네요……」"

[[dialogue]]
speaker = "セナリィ"
original = "「私、今からこんなにも凶悪なオスのシンボルで犯されてしまいますのね……<emoji=heart04>」"
translation = "「저, 지금부터 이렇게나 흉악한 수컷의 심벌로 범해져 버리는 거군요……<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「んふ、すぅ、はぁ……おもらしみたいにカウパーが溢れて……<emoji=heart04>\u3000すんすん、くんくん……ふぁぁ……鼻の奥まで、とっても濃ゆぅいオスの臭いでいっぱぁい……<emoji=heart04>」"
translation = "「응후, 스으, 하아…… 오줌을 지린 것처럼 쿠퍼액이 넘쳐서……<emoji=heart04> 킁킁, 흠흠…… 화아…… 코끝까지, 정말 진한 수컷의 냄새로 가득해요……<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「こんな匂い嗅いでしまったら……ダメですわぁ……私のおま○こ、おち○ちんを欲しがってしまいます<emoji=heart04>」"
translation = "「이런 냄새를 맡아 버리면…… 안 돼요…… 제 보지, 자지를 원하게 되어버려요<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「エッチなお汁がもっと溢れてしまいます……ローションなんていらないくらい、ヌルヌルになってしまいますわ……」"
translation = "「야한 국물이 더 넘쳐버려요…… 로션 따윈 필요 없을 정도로, 미끌미끌해져 버려요……」"

[[dialogue]]
speaker = "セナリィ"
original = "「はあぁ……<emoji=heart04>\u3000なんて素敵、うっとりしてしまいますわぁ……こんなにも熱くて、固くて、ぶっとぉいおち○ちんを私だけが独り占め……<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 어쩜 이리 멋질까, 황홀해져 버려요…… 이렇게나 뜨겁고, 딱딱하고, 굵다란 자지를 저 혼자서 독점……<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「会長様ぁ……早くぅ……早く挿入れてくださいませ……はしたないメス穴を、オス棍棒で躾けてくださいませ……<emoji=heart04>」"
translation = "「회장님…… 빨리…… 빨리 삽입해 주세요…… 천박한 암컷 구멍을, 수컷 곤봉으로 길들여 주세요……<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「早く、早くぅ……<emoji=heart04>\u3000焦らさないでくださいませっ……んぁ、腰が勝手に動いてしまいます……おち○ちんに媚びてしまいますわぁ」"
translation = "「빨리, 빨리이……<emoji=heart04> 애태우지 말아 주세요…… 응아, 허리가 멋대로 움직여 버려요…… 자지에게 아양을 떨어버려요」"

[[dialogue]]
speaker = "セナリィ"
original = "「ぉんっ<emoji=heart04>\u3000先っぽがおま○ことキスして……やっ、焦らさないで、早く、もっと膣奥……膣奥までぶち込んでくださいませ……<emoji=heart04>」"
translation = "「온<emoji=heart04> 끝부분이 보지와 키스하고…… 얏, 애태우지 말고, 빨리, 좀 더 질 안쪽…… 질 안쪽까지 처박아 주세요……<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「ぉほっ<emoji=heart04>\u3000んぅ、んぉおぉぉ～～んっ<emoji=heart04>」"
translation = "「오홋<emoji=heart04> 응으, 응오오오오~~옹<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「はぁ、あっ、んぁはぁあぁんっ<emoji=heart04>\u3000はぁ、会長様のおち○ちん……深ぁい……私の奥の、奥っまでぇ……<emoji=heart04>」"
translation = "「하아, 앗, 응아하아아앙<emoji=heart04> 하아, 회장님의 자지…… 깊어…… 제 안쪽, 안쪽까지이……<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「ごつんって子宮、叩いてっ、んぉぉんっ……私のおま○こ、一瞬でチン負けしてしまいましたわぁぁ……<emoji=heart04>」"
translation = "「툭툭 하고 자궁, 때려줘, 응오오옹…… 제 보지, 순식간에 자지한테 져버렸사와요오……<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「んぉ、会長様ぁ……ぢゅぽぢゅぽぉ……おちん○んで、おま○こぢゅぽぢゅぽ突いてぇっ……！」"
translation = "「응오, 회장님…… 쥬폿쥬폿…… 자지로, 보지 쥬폿쥬폿 찔러줘요……!」"

[[dialogue]]
speaker = "セナリィ"
original = "「おっ、おぉうっ<emoji=heart04>\u3000んぉ、おっ、ほぁぁ……んおほっ！？\u3000おっ……ほっ、んぉ、おおんっ<emoji=heart04>」"
translation = "「어, 어우우<emoji=heart04> 응오, 어, 호아아…… 응오호!? 어…… 호, 응오, 오오옹<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「はっ、はぉ……おち○ちんピストンが、アナルにも伝わりましゅのっ、アナルビーズがごりゅごりゅ、ケツ穴刺激しまひゅのっ<emoji=heart04>」"
translation = "「하, 하오…… 자지 피스톤이, 애널에도 전해져요오, 애널 비즈가 고리고리, 똥꼬 자극해요오<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「んぉっ！？\u3000だっ、だめ、だめ、だめだめ、会長様ぁっ、イグ、もうイッグ、おま○ことアナル両方は刺激強しゅぎまふのぉっ<emoji=heart04>」"
translation = "「응오옷!? 아, 안돼, 안돼, 안돼안돼, 회장님, 가, 이제 가아, 보지랑 애널 양쪽은 자극 너무 강해요오<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「ごめんなひゃい、ごめんなしゃいっ<emoji=heart04>\u3000イギましゅ、おま○ことケツアクメ、一緒にキメぢゃいまひゅうぅっ<emoji=heart04>」"
translation = "「죄송해여, 죄송해여어<emoji=heart04> 가요오, 보지랑 똥꼬 절정, 같이 해버려요오오<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「んぉほお゛ぉぉぉ～～～～～～んっ<emoji=heart04>」"
translation = "「응오호오오오으으으으~~~~옹<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「んお゛っ<emoji=heart04>\u3000んほぉっ……<emoji=heart04>\u3000はっ、はひっ……んぎゅうぅぅっ<emoji=heart04>\u3000ほぁ、んほぉぉぉっ……<emoji=heart04>」"
translation = "「응오오<emoji=heart04> 응호오……<emoji=heart04> 하, 하히…… 응규우우우<emoji=heart04> 호아, 응호오오오……<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「はっ、はぁ<emoji=heart04>\u3000イ゛ッ、イッてしまいまひたぁ……ずーっとセックスしたくってぇ……おち○ちんきもちよしゅぎでぇ……チョロま○こでごめんなひゃあぃ……<emoji=heart04>」"
translation = "「하, 하아<emoji=heart04> 가, 가버렸어요…… 계속 섹스하고 싶어서어…… 자지 너무 기분 좋아서어…… 쵸로 보지라서 죄송해여어……<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「はぁ、はっ、はひぃぃ……んおぉん<emoji=heart04>\u3000アナルビーズがぐにぐに動いてまひゅのっ……待って<emoji=heart04>\u3000待って<emoji=heart04>\u3000イッたばっかで、どっちの穴も敏感なんれひゅっ」"
translation = "「하아, 하, 하히이이…… 응오옹<emoji=heart04> 애널 비즈가 구니구니 움직이고 있어여…… 기다려<emoji=heart04> 기다려<emoji=heart04> 방금 갔는데, 양쪽 구멍 다 민감해여어」"

[[dialogue]]
speaker = "セナリィ"
original = "「んっ、んぉっ！？\u3000会長しゃま、んぉほっ！？\u3000アナルビーズ抜いちゃ、んおぉ<emoji=heart04>\u3000出りゅっ、出ちゃいそうなのにぃ、ゾクゾクが止まりませんわぁぁ……<emoji=heart04>」"
translation = "「응, 응오!? 회장님, 응오호!? 애널 비즈 빼면, 응오오<emoji=heart04> 나와아, 나올 것 같은데에, 소름이 멈추지 않아요오……<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「んんぅ<emoji=heart04>\u3000またビーズがケツ穴にぃ……んぉ、おっ、おっ、もう入らないれふ、アナル満員でしゅわよぉ<emoji=heart04>」"
translation = "「응응우<emoji=heart04> 또 비즈가 똥꼬에…… 응오, 어, 어, 이제 안 들어가요오, 애널 만원이에요<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「はぁ、はぉぉ……か、会長様は、まだイッてませんものね……私の中で、おち○ちんがイライラしてるの伝わってきましゅよぉ<emoji=heart04>」"
translation = "「하아, 하오오…… 회, 회장님은, 아직 안 가셨으니까요…… 제 안에서, 자지가 안달복달하는 거 전해져와요오<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「いっぱい動いてくだしゃいまへ……私のおま○こ、会長様の肉オナホに……おち○ちんでゴリゴリ擦って<emoji=heart04>\u3000きもちよくなってくだしゃいませぇぇ……<emoji=heart04>」"
translation = "「잔뜩 움직여주세여…… 제 보지, 회장님의 육오나홀로…… 자지로 고리고리 비벼서<emoji=heart04> 기분 좋아져주세여어어……<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「んおっ<emoji=heart04>\u3000んぅふっ……ふぁあぁっ<emoji=heart04>\u3000会長様のおち○ちんが出たり入ったり出たり入ったりぃ……<emoji=heart04>」"
translation = "「응오옷<emoji=heart04> 응우후…… 후아아아<emoji=heart04> 회장님의 자지가 들어갔다 나갔다 들어갔다 나갔다아……<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「んぉっ、お、おっほぉんっ<emoji=heart04>\u3000おま○こを何度も何度も往復して……愛液をかき出して、ぢゅぶぢゅぶっていやらしい音立ててぇ……<emoji=heart04>」"
translation = "「응오옷, 어, 어호옷<emoji=heart04> 보지를 몇 번이고 몇 번이고 왕복해서…… 애액을 긁어내고, 쥬부쥬붓거리는 야한 소리를 내며……<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「出たり入ったり<emoji=heart04>\u3000出たり入ったりぃ、んぉっ<emoji=heart04>\u3000おま○こもアナルもきもちよくなりまひゅっ<emoji=heart04>」"
translation = "「들락날락<emoji=heart04> 들락날락거려어, 응오옷<emoji=heart04> 보지도 애널도 기분 좋아져 버려요옷<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「こんなスケベな光景見てたら、頭ヘンっ、ヘンになりまひゅ、私、おかしくなってしまいますわぁん<emoji=heart04>」"
translation = "「이런 야한 광경을 보고 있으면, 머리 이사해, 이상해져 버려요, 저, 이상해져 버려요오오옹<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「おっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000んぉほぉっ<emoji=heart04>\u3000クるッ<emoji=heart04>\u3000またおケツ、ケツアクメくる、イッぢゃうっイッぢゃうイッぢゃうぅうううぅぅ<emoji=heart04>」"
translation = "「오옷<emoji=heart04> 오옷<emoji=heart04> 응오호옷<emoji=heart04> 온다앗<emoji=heart04> 또 엉덩이, 엉덩이 아쿠메 온다, 가버려엇 가버려 가버려어어어어어어어<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「イクッイグッイクイグイッ──グぅううぅぅうぅぅぅぅぅんっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가앗 가아악 가 가앗── 가아아아아아아아아아아아아아앙<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「っオ゛ッ！？\u3000んぉ、んぉほおぉぉぉっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「윽 오옷!? 응오, 응오호오오오옷<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「ん゛っ<emoji=heart04>\u3000イギました、イギまひたからぁっ！\u3000会長様、止まって、おち○ちんずぼずぼっ、１回止まっ<emoji=heart04>」"
translation = "「응윽<emoji=heart04> 가버렸어요, 가버렸으니까요옷! 회장님, 멈춰줘요, 자지 즈보즈보, 한 번만 멈춰어<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「んぉおっ！？\u3000イグぅ、敏感しゅぎて、次はおま○こ、おま○ごアグメ、おま○こイッグぅうぅんっ……<emoji=heart04>」"
translation = "「응오오옷!? 가버려어, 너무 민감해서, 다음은 보지, 보지 아쿠메, 보지 가버려어어어어엇……<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「んぉ、お゛ぉおぉっ<emoji=heart04>\u3000んぉっ、おっ、んぉほおぉぉんっ<emoji=heart04><emoji=heart04>」"
translation = "「응오, 오오오옷<emoji=heart04> 응오옷, 오옷, 응오호오오오옹<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「はーっ！\u3000はぁぁーっ！\u3000はぁぁぁぁーっ！\u3000はっ、はぁっ、待って、ホント待っ、くだしゃいまひっ……<emoji=heart04>」"
translation = "「하아! 하아아! 하아아아아! 하앗, 하앗, 기다려, 진짜 기다려, 주세요오옷……<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「はっ！\u3000はぁ、はひっ！\u3000息、できなくなっ……死ぬ、死んじゃいまふ、イキすぎて死ぐぅ……<emoji=heart04>」"
translation = "「하앗! 하아, 하힉! 숨, 못 쉬겠어…… 죽어, 죽어버려요, 너무 가서 죽어어……<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「んぉごっ！？\u3000にゃんでおち○ちん止めてくれませんのぉ……だめ、きもぢい、ずっときもぢい゛い゛っ<emoji=heart04>」"
translation = "「응오고옷!? 어째서 자지를 멈춰주지 않으시는 건가요오…… 안 돼, 기분 좋아, 계속 기분 좋아아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「会長様以外に見せられない下劣な姿、下品な声ぇ……んぉぉんっ<emoji=heart04>\u3000こんな変態で、きもちいいこと覚えてしまったらぁ、私、もう戻れませんわぁ……<emoji=heart04>」"
translation = "「회장님 이외에는 보여줄 수 없는 저열한 모습, 저질스러운 목소리이…… 응오오옹<emoji=heart04> 이런 변태 같은, 기분 좋은 걸 배워버리면, 저, 이제 돌아갈 수 없어요오……<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「ふぁ、私のおま○こ、会長様のおち○ちんを覚えてしまいましたのぉ……<emoji=heart04>\u3000もぉ会長様のおち○ちんなしには生きていけませんわぁ……<emoji=heart04>」"
translation = "「화, 제 보지, 회장님의 자지를 기억해버렸어요오……<emoji=heart04> 이제 회장님의 자지 없이는 살아갈 수 없어요오……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「一生、俺だけの女になれ、セナリィ……！」"
translation = "「평생, 내 여자만 되어라, 세나리ィ……!」"

[[dialogue]]
speaker = "セナリィ"
original = "「んきゅぅううううぅぅぅぅんっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응큐우우우우우우우우우우운<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「そ、そんな<emoji=heart04>\u3000会長様ぁ……<emoji=heart04>\u3000そんな不意打ち、ズルいですわぁっ……そんなこと言われたら、堕ちてしまいまひゅ、絶対服従しちゃいまふわぁ……<emoji=heart04>」"
translation = "「그, 그런<emoji=heart04> 회장님……<emoji=heart04> 그런 기습은 비겁해요오…… 그런 말을 들으면 타락해 버려횩, 절대복종해 버려요오……<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「バカ、おま○こバカになりゅっ、セックスしゅきしゅきになっぢゃいまひゅわっ<emoji=heart04>\u3000会長様にめちゃくちゃにされるの好き、しゅきぃ、だぁいしゅきぃっ……<emoji=heart04>」"
translation = "「바보, 보지 바보가 돼횩, 섹스 좋아좋아하게 되어 버려요오옷<emoji=heart04> 회장님한테 엉망진창이 되는 거 좋아, 조아, 너무 조아아……<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「愛してまひゅ、会長しゃま会長しゃまぁっ<emoji=heart04>\u3000んお゛っ、ほごぉっ<emoji=heart04>\u3000んぉっ、お゛っお゛っお゛っお゛っ<emoji=heart04>\u3000んぉほおぉぉんっ<emoji=heart04>」"
translation = "「사랑해효, 회장님 회장님으으윽<emoji=heart04> 응오옷, 호고옷<emoji=heart04> 응옷, 오옷 오옷 오옷 오옷<emoji=heart04> 응오호오오오옷<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「嬉しすきて、おま○こ悦びすぎて<emoji=heart04>\u3000また、またイキまひゅ、またイグっ<emoji=heart04>\u3000おっおっ<emoji=heart04>\u3000お゛っ<emoji=heart04>\u3000おほぉおおぉぉぉんっ<emoji=heart04>」"
translation = "「너무 기뻐서, 보지가 너무 기뻐서<emoji=heart04> 또, 또 가요오, 또 가앗<emoji=heart04> 오옷오옷<emoji=heart04> 오옷<emoji=heart04> 오호오오오오오옷<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「はぉおお゛ぉぉぉ～～～～～～んっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하오오오오오오～～～～～～옷<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「んおおお゛ぉぉっ<emoji=heart04>\u3000本気ピストンっ<emoji=heart04>\u3000んぉっ、ほぉんっ、おっおっお゛ぉぉぉ～～んっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응오오오오옷<emoji=heart04> 진심 피스톤<emoji=heart04> 응옷, 호옷, 오옷오옷오오오오～～옷<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「んぉ、お゛っ<emoji=heart04>\u3000子宮突かれると、お潮出ちゃいまひゅのっ<emoji=heart04>\u3000お゛っ、おもらし、びちゃびちゃ、かかりまひゅのぉ<emoji=heart04>\u3000おっ、んお゛っ、お゛んっ<emoji=heart04>」"
translation = "「응오, 오옷<emoji=heart04> 자궁 찔리면, 애액 나와 버려요오<emoji=heart04> 오옷, 오줌 싸, 축축하게, 묻어 버려요오<emoji=heart04> 오옷, 응오옷, 오옷<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「はぁ、はっ、はひぃん<emoji=heart04>\u3000おま○こセックス、きもぢいぃ、きもぢいぃっ<emoji=heart04>\u3000腰、ヘコヘコしちゃいまひゅ、んぉお゛んっ<emoji=heart04>\u3000気持ちよしゅぎて、止まりませんのっ<emoji=heart04>」"
translation = "「하아, 하앗, 하히잉<emoji=heart04> 보지 섹스, 기분 조아아, 기분 조아아앗<emoji=heart04> 허리, 움찔움찔해 버려요, 응오오옷<emoji=heart04> 기분 너무 조아서, 멈추지 않아요오<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「会長様もお尻ヘコヘコしてくれるの、嬉しいっ、とっても嬉しいろっ<emoji=heart04>\u3000いっしょ、いっしょにきもぢよくなってまひゅ<emoji=heart04>\u3000んおっ、ほぉぉっ<emoji=heart04>\u3000んぉおんっ<emoji=heart04>」"
translation = "「회장님도 엉덩이 흔들어 주는 거, 기뻐, 너무 기뻐요오<emoji=heart04> 같이, 같이 기분 좋아지고 있어요오<emoji=heart04> 응오옷, 호오옷<emoji=heart04> 응오오옷<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「アナルも、おま○こも、きもぢい、い゛っ、きもぢいぃぃっ<emoji=heart04>\u3000んぉほっ<emoji=heart04>\u3000んぉっ、おっ、おぉんっ<emoji=heart04>」"
translation = "「애널도, 보지도, 기분 조아, 아앗, 기분 조아아아앗<emoji=heart04> 응오홋<emoji=heart04> 응옷, 오옷, 오오옷<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「おくっ<emoji=heart04>\u3000子宮っ、ごんごんっ、きもぢぃいぃれふっ<emoji=heart04>\u3000お゛っ！？\u3000またイッでる、イッでまひゅのっ<emoji=heart04>」"
translation = "「안쪽<emoji=heart04> 자궁, 쿵쿵, 기분 조아아아효<emoji=heart04> 오옷!? 또 가고 이써, 가고 있어요오<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「何回イッたか、わかりまへんのっ、体、バカになってまふ、ちっとも力が入りまへんのぉっ……<emoji=heart04>」"
translation = "「몇 번이나 갔는지, 모르겠어요오, 몸, 바보가 되어 버려요, 조금도 힘이 들어가지 않아요오……<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「んぉ、会長様の肉オナホにされぢゃってまふ<emoji=heart04>\u3000んおっ<emoji=heart04>\u3000おっ、おっ<emoji=heart04>\u3000んぉほぉんっ！？」"
translation = "「응오, 회장님의 육오나홀이 되어 버려요오<emoji=heart04> 응오옷<emoji=heart04> 오옷, 오옷<emoji=heart04> 응오호오옷!?」"

[[dialogue]]
speaker = "セナリィ"
original = "「会長様のおち○ちん膨らんでぇ……<emoji=heart04>\u3000まだおっきく固ぁくなりまじゅのぉ？\u3000んおっ、お゛ほぉん<emoji=heart04>」"
translation = "「회장님의 자지가 부풀어서어……<emoji=heart04> 아직 커다랗고 딱딱해지고 있눈고에효? 응옷, 오゛호온<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「ヤバいとこに当たりましゅっ、んぉ、会長様ぁ、イキますのね？\u3000おちんちん射精っ、会長様の赤ちゃん汁出ますのねっ！？」"
translation = "「위험한 곳에 닿아효옷, 응오, 회장님아, 가버려요? 자지 사정옷, 회장님의 아기 즙 나와버려요!?」"

[[dialogue]]
speaker = "クロト"
original = "「セナリィ、そろそろイクぞ……！」"
translation = "「세나리ィ, 슬슬 간다……!」"

[[dialogue]]
speaker = "セナリィ"
original = "「はぉ、んぉ、おっおお゛んっ<emoji=heart04>\u3000か、会長様ぁ、出して、このまま、膣奥っ、子宮にっ、ぶっかけへっ<emoji=heart04>\u3000どびゅどびゅぅってぇ、射精キメでぇっ<emoji=heart04>」"
translation = "「하오, 응오, 옷오오゛온<emoji=heart04> 회, 회장님아, 내보내줘, 이대로, 질 안쪽으으, 자궁에에, 듬뿍 뿌려어어<emoji=heart04> 도퓨도퓨우우하고, 사정해줘어어<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「中出しっ、種付けっ、私を孕ませてくだひゃいませっ<emoji=heart04>\u3000会長様の赤ちゃん欲ひいれふっ、ん゛っ、ほぁ、おっ、んぉ、おっ、んぉおぉおお゛ぉんっ<emoji=heart04>」"
translation = "「질내사정옷, 씨뿌리기잇, 저를 임신시켜 주세효오옷<emoji=heart04> 회장님의 아기 갖고 시퍼효옷, 응゛읏, 호아, 옷, 응오, 옷, 응오오오오오오゛오온<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「ん゛ぉほっ！？\u3000ヤバッ、これ、絶対にヤベぇですっ、中出しキメられたらヤバいイキ方しますわぁっ……<emoji=heart04>」"
translation = "「응゛오홋!? 위험해, 이거, 절대로 위험해효옷, 질내사정 당하면 위험하게 가버려요오옷……<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「んぉ！？\u3000んぉほぉお゛んっ<emoji=heart04>\u3000クるっ、ヤバアクメくりゅぅうぅぅぅぅぅんっ<emoji=heart04>」"
translation = "「응오!? 응오호오゛온<emoji=heart04> 온다, 위험해 아크메 와버려어어어어어어언<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「んお゛っ！\u3000おっお゛っおっ<emoji=heart04>\u3000イグッ<emoji=heart04>\u3000イグッイグッイグ、イッ──んぅグぅぅうぅぅうぅぅぅっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응오゛옷! 옷옷오゛옷옷<emoji=heart04> 가앗<emoji=heart04> 가앗가앗가앗, 가──응으구우우우우우우우우웃<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「ッッイッグぅふぅうぅうぅぅぅんっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「으으으윽 가아아후우우우우우우우운<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「んぉ゛ほっ！？\u3000お゛っ<emoji=heart04>\u3000んお゛っ、お゛っお゛ごっ！？\u3000ほっ、ほぁ、んお、お゛っ、んぉおおぉ～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응오゛홋!? 오゛옷<emoji=heart04> 응오゛옷, 오゛옷오゛고옷!? 홋, 호아, 응오, 오゛옷, 응오오오오~~~~옷<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「ん゛っ！\u3000どぴゅっ、どぴゅっ、どぴゅぅっ……子宮に、精子、注がれてまひゅうぅ……んぉ、お゛ぉおぉ～～っ……<emoji=heart04>」"
translation = "「응゛앗! 도퓨, 도퓨, 도퓨우우…… 자궁에, 정자가, 부어지고 있어효오오…… 응오, 오゛오오오~~~~옷……<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「おっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000ほぉあぁぁ<emoji=heart04>\u3000出てる、出へるぅっ……ずーーーっと、射精、止まってくんにゃぁい……子宮が満たされまふわぁ……<emoji=heart04>」"
translation = "「옷<emoji=heart04> 옷<emoji=heart04> 호오아아아<emoji=heart04> 나오고 있어, 나오고 있어어어…… 계에에에속, 사정, 멈추지 않아아아…… 자궁이 가득 채워져요오오……<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「はぁあぁんっ<emoji=heart04>\u3000愛する方の精子が、私の子宮になみなみと……すぅっっっごくしああせぇぇ……<emoji=heart04>」"
translation = "「하아아안<emoji=heart04> 사랑하는 분의 정액이, 제 자궁에 찰랑찰랑…… 너어어어어무 행복해애애……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「はぁ、はぁ……気持ち良かったよ、セナリィ」"
translation = "「하아, 하아…… 기분 좋았어, 세나리ィ」"

[[dialogue]]
speaker = "セナリィ"
original = "「私もですわ……今までで一番……最高の愛の営みでしたわ……<emoji=heart04>」"
translation = "「저도예요…… 지금까지 중 제일…… 최고의 사랑의 행위였어요……<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「会長様、射精が収まるまで……一滴残らず、私の膣内に吐き出してくださいませぇ……<emoji=heart04>」"
translation = "「회장님, 사정이 멈출 때까지…… 한 방울도 남기지 말고, 제 질 내에 뱉어내 주세요오오……<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「んぉっ<emoji=heart04>\u3000はぁ、はぁっ、やぁん……せっかく出してもらった会長様の子種が溢れてしまいます……」"
translation = "「응오옷<emoji=heart04> 하아, 하아앗, 야아앙…… 어렵게 내보내 주신 회장님의 씨앗이 넘쳐버려요……」"

[[dialogue]]
speaker = "セナリィ"
original = "「んぉ……アナルでもおま○こでも、こんな簡単にイケるようになってしまうだなんて……私の体、すっかり会長様の色に染められてしまいましたわ……<emoji=heart04>」"
translation = "「응오…… 애널로도 보지로도, 이렇게 간단히 가버리게 되어버리다니…… 제 몸, 완전히 회장님의 색으로 물들어버렸어요……<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「女の体をこんなにも猥らに変えてしまった責任、どうやって取るおつもりですの……？」"
translation = "「여자의 몸을 이렇게나 음란하게 바꿔버린 책임, 어떻게 지실 생각인가요……?」"

[[dialogue]]
speaker = "セナリィ"
original = "「先ほどおっしゃってた一生というのは、その、つまり……死が私たちを分かつまでの一生ということでよろしいのですわよね……？」"
translation = "「방금 말씀하신 평생이라는 건, 그, 그러니까…… 죽음이 우리를 갈라놓을 때까지의 평생이라는 걸로 괜찮은 거죠……?」"

[[dialogue]]
speaker = "クロト"
original = "「そのくらいの覚悟がなきゃ、生で中出しなんてしないよ。一生、セナリィと添い遂げたいんだ」"
translation = "「그 정도의 각오가 없으면, 생으로 질내사정 같은 건 안 해. 평생, 세나리ィ와 함께하고 싶어」"

[[dialogue]]
speaker = "セナリィ"
original = "「そ、そ、そ、それって、もはやプロポーズではないですの……！？」"
translation = "「그, 그, 그, 그거, 이제 프로포즈 아닌가요……!?」"

[[dialogue]]
speaker = "クロト"
original = "「そのつもりで言ったんだけど……伝わってなかった？」"
translation = "「그럴 생각으로 말한 건데…… 안 전해졌어?」"

[[dialogue]]
speaker = "セナリィ"
original = "「きゅぅうぅぅぅんっ<emoji=heart04>」"
translation = "「큐우우우우우운<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「ふぁぁ……会長様があんまり嬉しいことを言うから、私の子宮がおねだりしちゃってますわ……」"
translation = "「후아아…… 회장님이 너무 기쁜 말을 하니까, 제 자궁이 보채고 있어요……」"

[[dialogue]]
speaker = "セナリィ"
original = "「もっともっと会長様の子種を飲みたいって……会長様の精子はとても強そうですから、今ので命中してしまったかもしれませんけど……」"
translation = "「더 많이 회장님의 씨앗을 마시고 싶다고…… 회장님의 정액은 아주 강해 보이니까, 방금 걸로 명중해버렸을지도 모르지만……」"

[[dialogue]]
speaker = "セナリィ"
original = "「私ばかり何度もイッてしまったのも不公平ですし、会長様が満足するまで何度でも……私の体、お使いくださいませ」"
translation = "「저만 몇 번이나 가버린 것도 불공평하고, 회장님이 만족할 때까지 몇 번이고…… 제 몸, 사용해 주세요」"

[[dialogue]]
speaker = "セナリィ"
original = "「会長様が望む行為は、なんでも受け止めますわ。一生、私を……セナリィだけを愛してくださいませ……ちゅっ♪」"
translation = "「회장님이 바라는 행위는, 무엇이든 받아낼게요. 평생, 저를…… 세나리ィ만을 사랑해 주세요…… 쪽♪」"

[[dialogue]]
speaker = "unk"
original = "まだまだ俺たち２人だけの夜は続く。幸いにも明日も休みだ。"
translation = "아직 우리 둘만의 밤은 계속된다. 다행히 내일도 휴일이다."

[[dialogue]]
speaker = "unk"
original = "俺たちの情欲は枯れることも、冷める隙もなさそうだった。"
translation = "우리의 정욕은 마를 줄도, 식을 틈도 없어 보였다."

