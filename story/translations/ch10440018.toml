[[dialogue]]
speaker = "unk"
original = "プリムラと実質恋人のような仲になって数ヶ月。告白はまだ……しかし、色々と理由をつけて、体の関係が続いている。"
translation = "프림라와 실질적으로 연인 같은 사이가 된 지 수개월. 고백은 아직…… 하지만 여러 가지 이유를 대며 육체관계가 이어지고 있다."

[[dialogue]]
speaker = "unk"
original = "今日もプリムラに呼ばれて部屋にやってきたのだが……どうやらまた、奇妙なエッチのお誘いであるらしい。"
translation = "오늘도 프림라에게 불려 방으로 찾아왔는데…… 아무래도 또 기묘한 섹스 권유인 모양이다."

[[dialogue]]
speaker = "プリムラ"
original = "「ククク……よく来たな、我が眷族よ！」"
translation = "「쿠쿠쿠…… 잘 왔구나, 나의 권속이여!」"

[[dialogue]]
speaker = "プリムラ"
original = "「今日こそ貴様を我の下僕と認めさせる為に、秘策を練ってきたのじゃ！\u3000服を脱げぃ！」"
translation = "「오늘이야말로 네 녀석을 짐의 하인으로 인정하게 만들기 위해 비책을 짜왔느니라! 옷을 벗거라!」"

[[dialogue]]
speaker = "クロト"
original = "「相変わらずムードもへったくれもない！」"
translation = "「여전히 분위기고 뭐고 없네!」"

[[dialogue]]
speaker = "プリムラ"
original = "「むっ……ごちゃごちゃ言わず、早く脱ぐのじゃ！\u3000脱がないのなら……こうしてやるぞ！」"
translation = "「뭇…… 궁시렁대지 말고 얼른 벗는 게야! 벗지 않겠다면…… 이렇게 해주마!」"

[[dialogue]]
speaker = "プリムラ"
original = "「手荒な真似、と言いたげな目じゃな……しかし！\u3000さっさと脱がない貴様が悪いのじゃ！」"
translation = "「거친 짓이라도 할 셈이냐는 눈이군…… 하지만! 얼른 벗지 않는 네 녀석이 나쁜 것이니라!」"

[[dialogue]]
speaker = "プリムラ"
original = "「フフ……<emoji=heart04>\u3000これで準備は整ったな♪\u3000それでは……貴様に我が秘策を見せてやろう！」"
translation = "「후후……<emoji=heart04> 이걸로 준비는 끝났구나♪ 그러면…… 네 녀석에게 짐의 비책을 보여주마!」"

[[dialogue]]
speaker = "クロト"
original = "「えっ！？ \u3000中が透けて――」"
translation = "「엣!? 안이 비쳐 보여서――」"

[[dialogue]]
speaker = "プリムラ"
original = "「気づいたようじゃな……そう！\u3000これこそが、我が秘策！\u3000名づけて――」"
translation = "「눈치챈 모양이구나…… 그래! 이것이야말로 짐의 비책! 이름하여――」"

[[dialogue]]
speaker = "プリムラ"
original = "「おま○こ見え見え大作戦、じゃ！」"
translation = "「보지 훤히 보이기 대작전, 이니라!」"

[[dialogue]]
speaker = "プリムラ"
original = "「……って、おい！\u3000今、なんだかバカっぽいネーミングだと思ったじゃろ！」"
translation = "「……랄까, 어이! 지금 왠지 바보 같은 네이밍이라고 생각했지!」"

[[dialogue]]
speaker = "プリムラ"
original = "「――まあよい。ククク……貴様の顔を見ればわかるぞ？\u3000眷族、実はちょっと興奮してきとるじゃろ？」"
translation = "「――뭐 좋다. 쿠쿠쿠…… 네 녀석의 얼굴을 보면 알 수 있지. 권속, 사실 조금 흥분하고 있지 않느냐?」"

[[dialogue]]
speaker = "プリムラ"
original = "「生のおま○こ断面図を、こんな風に見られるなんて……体が賢者の石で構成されている我だからこそ、できることなんじゃぞ<emoji=heart04>」"
translation = "「생생한 보지 단면도를 이런 식으로 볼 수 있다니…… 몸이 현자의 돌로 구성된 짐이기에 가능한 일이니라<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「ほれほれ<emoji=heart04>\u3000この中におち○ぽ入れたらどうなるんじゃろうな～<emoji=heart04>\u3000眷族も気になって仕方がないのではないか？」"
translation = "「보렴 보렴<emoji=heart04> 이 안에 자지를 넣으면 어떻게 될까나~<emoji=heart04> 권속도 궁금해서 참을 수 없지 않느냐?」"

[[dialogue]]
speaker = "プリムラ"
original = "「おま○この中を、おち○ぽが掻きわけて入っていく卑猥な光景を、見たいじゃろう？\u3000我だったらそんな<ruby>邪<rt>よこしま</rt></ruby>な願望も叶えることができるが……どうじゃ？」"
translation = "「보지 안을 자지가 헤치고 들어가는 음란한 광경을 보고 싶지? 짐이라면 그런 사악한 소망도 들어줄 수 있다만…… 어떠냐?」"

[[dialogue]]
speaker = "プリムラ"
original = "「フフ……今、ごくりと生唾を飲み込む音がしたぞ<emoji=heart04>」"
translation = "「후후…… 지금 꿀꺽하고 침을 삼키는 소리가 들렸느니라<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「ほら、早くせい<emoji=heart04>\u3000下らぬ我慢などやめて、その大きくなったおち○ぽを、欲望のまま我の中に突っ込むのじゃ<emoji=heart04>」"
translation = "「자, 어서 하거라<emoji=heart04> 쓸데없는 참기 따위 그만두고, 그 커진 자지를 욕망대로 짐의 안에 쑤셔 넣는 게야<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「そうすれば、貴様にこの世の天国を味合わせてやるぞ<emoji=heart04>\u3000あっ――<emoji=heart04>」"
translation = "「그렇게 하면 네 녀석에게 이 세상의 천국을 맛보게 해주마<emoji=heart04> 앗――<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「はあああぁぁ～～～っ<emoji=heart04><emoji=heart04>\u3000んんっ……<emoji=heart04>\u3000フフ……それでよいのじゃ<emoji=heart04>」"
translation = "「하아아아아아～～～<emoji=heart04><emoji=heart04> 응으……<emoji=heart04> 후후…… 그걸로 된 것이니라<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「んっ……<emoji=heart04>\u3000よ～く見ておくんじゃぞ<emoji=heart04>\u3000こんな体験をできるのは、世界で貴様だけなんじゃからな……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 자~알 봐두거라<emoji=heart04> 이런 체험을 할 수 있는 건 세상에서 네 녀석뿐이니까 말이다……<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「ゆっくり……そうじゃ、ゆ～っくり中の感触を味わいながら、押し広げていくのじゃ……<emoji=heart04>\u3000はあぁ……<emoji=heart04>」"
translation = "「천천히…… 그래, 처~언천히 안의 감촉을 맛보면서 밀어 넓혀가는 게야……<emoji=heart04> 하아……<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「どうじゃ……？\u3000我の小さなおま○こを、貴様の凶悪なデカおち○ぽが侵略して、形が変わっていく様子が見えるじゃろ……<emoji=heart04>\u3000ふうぅ……<emoji=heart04>」"
translation = "「어떠냐……? 짐의 작은 보지를 네 녀석의 흉악한 데카 자지가 침략해서 형태가 변해가는 모습이 보이지……<emoji=heart04> 후우……<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「ンフフ……<emoji=heart04>\u3000いつもよりおち○ぽ、固く大きくなっているようじゃな<emoji=heart04>\u3000貴様の興奮が伝わってくるぞ……<emoji=heart04>」"
translation = "「응후후……<emoji=heart04> 평소보다 자지, 딱딱하고 커져 있는 모양이구나<emoji=heart04> 네 녀석의 흥분이 전해져 오느니라……<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「んっ……<emoji=heart04>\u3000おま○こにおち○ぽがぴっちり詰まってる姿を見られるのが、そんなに嬉しいか？」"
translation = "「응……<emoji=heart04> 보지에 자지가 꽉 들어찬 모습을 볼 수 있는 게 그렇게 기쁘냐?」"

[[dialogue]]
speaker = "プリムラ"
original = "「まったく、眷族は本当にスケベじゃな<emoji=heart04>\u3000……ほら、腰が動いてないぞ？\u3000それとも、我のおま○こが気持ちよくて動けないのか？」"
translation = "「정말이지, 권속은 정말 변태로구나<emoji=heart04> ……자, 허리가 움직이지 않고 있느니라? 아니면 짐의 보지가 기분 좋아서 움직일 수 없는 게냐?」"

[[dialogue]]
speaker = "プリムラ"
original = "「そっちが動かないというのなら……そうじゃ、我が動いてやろう<emoji=heart04>」"
translation = "「그쪽이 움직이지 않겠다면…… 그래, 짐이 움직여주마<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「おっ……<emoji=heart04>\u3000嬉しいのか？\u3000おち○ぽがピクピクと反応しておるぞ<emoji=heart04>」"
translation = "「오……<emoji=heart04> 기쁘냐? 자지가 움찔움찔 반응하고 있구나<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「フフフ……<emoji=heart04>\u3000正直で可愛いやつじゃ……それなら、もっとすごいことをしてやるぞ……<emoji=heart04>\u3000んっ……はあぁ……<emoji=heart04>」"
translation = "「후후후……<emoji=heart04> 솔직하고 귀여운 녀석이로군…… 그렇다면 더 굉장한 걸 해주마……<emoji=heart04> 응…… 하아……<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「ふうぅ……<emoji=heart04>\u3000どう、じゃっ<emoji=heart04>\u3000これが、おま○こ見え見え大作戦のその先――っ<emoji=heart04>」"
translation = "「후우……<emoji=heart04> 어, 떠냐<emoji=heart04> 이것이 보지 훤히 보이기 대작전의 그 다음――<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「おち○ぽフィット大作戦じゃ……っ<emoji=heart04>」"
translation = "「자지 피트 대작전이니라……<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「我の変形能力を……あっ<emoji=heart04>\u3000おま○こ内でしてみたのじゃ……んっ<emoji=heart04>」"
translation = "「짐의 변형 능력을…… 앗<emoji=heart04> 보지 내에서 해본 것이니라…… 응<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「眷族にも見えるじゃろ……<emoji=heart04>\u3000おま○このひだひだが動いて、おち○ぽに絡みついていく様子が……<emoji=heart04>」"
translation = "「권속에게도 보이지……<emoji=heart04> 보지 주름이 움직여서 자지를 휘감아가는 모습이……<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「貴様の感じる場所など、我にはお見通しじゃ……<emoji=heart04>\u3000ほら……こうやってカリをプリプリと引っかけるようにしたり……あんっ<emoji=heart04>」"
translation = "「네 녀석이 느끼는 곳 따위 짐에게는 훤히 들여다보이느니라……<emoji=heart04> 자…… 이렇게 귀두를 뿌득뿌득 걸리게 하거나…… 앙<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「あ、はぁ……っ<emoji=heart04>\u3000んんっ……<emoji=heart04>\u3000裏筋をちろちろ～っと舌で舐めるように、刺激してやれば……っ<emoji=heart04>」"
translation = "「아, 하아……<emoji=heart04> 응으……<emoji=heart04> 요도 쪽을 할짝할짝 혀로 핥듯이 자극해 주면……<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「んっ<emoji=heart04>\u3000あんっ……<emoji=heart04>\u3000はぁ、あっ……<emoji=heart04>\u3000やはりな<emoji=heart04>\u3000おち○ぽがビクビクと気持ちよさそうに震えておるぞ……<emoji=heart04>」"
translation = "「응<emoji=heart04> 앙……<emoji=heart04> 하아, 앗……<emoji=heart04> 역시나구나<emoji=heart04> 자지가 움찔움찔 기분 좋게 떨리고 있느니라……<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「先っぽもどうじゃ……っ<emoji=heart04>\u3000ほれ、子宮口を吸いつけてやるぞ<emoji=heart04>\u3000ちゅうちゅうと、貴様の我慢汁、ぜんぶ子宮で飲み込んでやるのじゃ<emoji=heart04>\u3000んっ……ふうぅ……<emoji=heart04>」"
translation = "「끝부분도 어떠냐……<emoji=heart04> 자, 자궁구를 빨아들여 주마<emoji=heart04> 츄릅츄릅 네 녀석의 쿠퍼액, 전부 자궁으로 마셔버리는 것이니라<emoji=heart04> 응…… 후우……<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「あんっ<emoji=heart04>\u3000な、なんじゃ……<emoji=heart04>\u3000今は我が貴様を気持ちよくしているというに……ふあぁっ<emoji=heart04>」"
translation = "「앙<emoji=heart04> 뭐, 뭐냐……<emoji=heart04> 지금은 짐이 네 녀석을 기분 좋게 해주고 있거늘…… 후아앗<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「あっ<emoji=heart04>\u3000はあぁっ……んっ<emoji=heart04>\u3000こ、こらぁ……<emoji=heart04>\u3000我のターンを勝手に……あっ―――<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 하아앗…… 응<emoji=heart04> 이, 이봐……<emoji=heart04> 짐의 턴을 멋대로…… 앗―――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「んああぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000おち○ぽピストンきたあぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あっ……ふあぁっ<emoji=heart04>\u3000んっ……あっ<emoji=heart04>\u3000ふあぁっ……んああぁっ<emoji=heart04>」"
translation = "「응아아아아～～～<emoji=heart04><emoji=heart04><emoji=heart04> 자지 피스톤 왔다아앗<emoji=heart04> 앙<emoji=heart04> 앗…… 후아앗<emoji=heart04> 응…… 앗<emoji=heart04> 후아앗…… 응아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「ふうぅ……はあぁっ<emoji=heart04>\u3000わ、我は別に気持ちよくなってなぞ……<emoji=heart04>\u3000むしろ貴様の方こそ、ピストンせずにいられぬくらい、おま○こ気持ちいいのであろう？」"
translation = "「후우…… 하아앗<emoji=heart04> 지, 짐은 딱히 기분 좋아진 게 아니……<emoji=heart04> 오히려 네 녀석이야말로 피스톤하지 않고는 못 배길 정도로 보지가 기분 좋은 것이지?」"

[[dialogue]]
speaker = "プリムラ"
original = "「あっ<emoji=heart04>\u3000ま、待てっ<emoji=heart04>\u3000ダメなのじゃっ<emoji=heart04>\u3000そんな色んなところを探るように動かれたらっ<emoji=heart04>\u3000ふああっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はあぁっ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 기, 기다려<emoji=heart04> 안 되느니라<emoji=heart04> 그렇게 여기저기 탐색하듯이 움직이면<emoji=heart04> 후아앗<emoji=heart04> 앙<emoji=heart04> 하아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「おま○こ、今は敏感になってるから……ダメなのじゃあ<emoji=heart04>\u3000んうぅっ……んああぁっ<emoji=heart04>」"
translation = "「보지, 지금은 민감해져 있으니까…… 안 된단 말이다아<emoji=heart04> 응우읏…… 응아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「あひっ……ふあぁっ<emoji=heart04>\u3000おま○こを手のように動かす為、変形させて感度を上げた弊害が……あんっ<emoji=heart04>\u3000あっ……はあぁっ<emoji=heart04>\u3000ふああぁっ……<emoji=heart04>」"
translation = "「아힛…… 후아앗<emoji=heart04> 보지를 손처럼 움직이기 위해 변형시켜서 감도를 올린 폐해가…… 앙<emoji=heart04> 앗…… 하아앗<emoji=heart04> 후아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「おち○ぽ、いつもより感じるのじゃあぁっ……<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁ……ふうぅっ<emoji=heart04>\u3000んあぁっ……<emoji=heart04>\u3000だから、動くのは待っ……ふああぁんっ<emoji=heart04>」"
translation = "「자지, 평소보다 느껴진단 말이다아앗……<emoji=heart04> 앗<emoji=heart04> 하아…… 후우읏<emoji=heart04> 응아앗……<emoji=heart04> 그러니까 움직이는 건 기다…… 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「我の言うこと……あんっ<emoji=heart04>\u3000聞けと言っておるのにぃ……んあぁっ<emoji=heart04>」"
translation = "「짐이 하는 말…… 앙<emoji=heart04> 들으라고 했거늘…… 응아앗<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「あっ<emoji=heart04>\u3000はああぁんっ……<emoji=heart04>\u3000はぁっ……んっ<emoji=heart04>\u3000ふうぅ……<emoji=heart04>\u3000これ以上されたら……我の方が先にっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000イってしまう……っ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 하아아앙……<emoji=heart04> 하앗…… 응<emoji=heart04> 후우……<emoji=heart04> 이 이상 당하면…… 짐이 먼저<emoji=heart04> 앙<emoji=heart04> 가버려……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「プリムラのおま○こ、よく見えるよ……どこが気持ちいいのかも、全部……<emoji=heart04>」"
translation = "「프림라의 보지, 잘 보여…… 어디가 기분 좋은지도 전부……<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「なっ、貴様ぁ……<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ず、ずるいのじゃあ……<emoji=heart04>\u3000我の弱いところ、観察するのっ、やめ……ふああぁっ<emoji=heart04>」"
translation = "「낫, 네 녀석……<emoji=heart04> 앗<emoji=heart04> 치, 치사하느니라……<emoji=heart04> 짐의 약한 곳 관찰하는 거 그만…… 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「あっ<emoji=heart04>\u3000んああぁっ……<emoji=heart04>\u3000け、眷族のくせにぃ<emoji=heart04>\u3000生意気じゃぞ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 응아아앗……<emoji=heart04> 거, 권속 주제에<emoji=heart04> 건방지구나……<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「今日は我がぁ……っ<emoji=heart04>\u3000勝つはずだったのにっ<emoji=heart04>\u3000貴様を快楽で屈服させて、我の下僕だと認めさせるはずだったのにぃ……ふあぁっ<emoji=heart04>」"
translation = "「오늘은 내가아……윽<emoji=heart04> 이길 수 있었는데에<emoji=heart04> 네놈을 쾌락으로 굴복시켜서, 내 하인이라고 인정하게 만들 셈이었는데에…… 후아아윽<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「こんなっ<emoji=heart04>\u3000気持ちいいところばかり擦られたらっ……あぁんっ<emoji=heart04>\u3000また我の……敗北になってしまうぅ<emoji=heart04>\u3000はああぁんっ<emoji=heart04>」"
translation = "「이런윽<emoji=heart04> 기분 좋은 곳만 문질러대면…… 아앙윽<emoji=heart04> 또 나의…… 패배가 되어버려어어<emoji=heart04> 하아아앙윽<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「悪の終末兵器である我が、人間のおち○ぽに屈服してしまうぅ……っ<emoji=heart04>\u3000んあぁっ<emoji=heart04>」"
translation = "「악의 종말병기인 내가, 인간의 자지에 굴복해버려어……윽<emoji=heart04> 응아아윽<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「い、イヤじゃ……っ<emoji=heart04>\u3000貴様を真の眷族にするために……あんっ<emoji=heart04>\u3000いっぱい考えた作戦なのじゃっ<emoji=heart04>\u3000なのにぃ……っ<emoji=heart04>」"
translation = "「시, 싫어어……윽<emoji=heart04> 네놈을 진정한 권속으로 만들기 위해…… 앙윽<emoji=heart04> 잔뜩 생각한 작전이었단 말이야아윽<emoji=heart04> 그런데에……윽<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「ふあぁっ<emoji=heart04>\u3000おち○ぽ、さっきからっ……はあぁんっ<emoji=heart04>\u3000気持ちいいところしか当たらないのじゃあぁっ……<emoji=heart04>」"
translation = "「후아아윽<emoji=heart04> 자지가, 아까부터…… 하아아앙윽<emoji=heart04> 기분 좋은 곳에만 닿는단 말이야아아윽……<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「眷族に……んあぁっ<emoji=heart04>\u3000我の体、研究されとるっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000気持ちいいところっ<emoji=heart04>\u3000見つけられちゃう……ふああぁっ<emoji=heart04>」"
translation = "「권속에게…… 응아아윽<emoji=heart04> 내 몸, 연구당하고 있어어윽<emoji=heart04> 앙윽<emoji=heart04> 기분 좋은 곳윽<emoji=heart04> 들켜버려어…… 후아아아윽<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「あひっ<emoji=heart04>\u3000眷族、そこダメぇ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000おま○こ入口のとこばっか擦るのっ<emoji=heart04>\u3000そこ弱いのじゃっ……あぁんっ<emoji=heart04>\u3000やめるのじゃあ<emoji=heart04>」"
translation = "「아힛<emoji=heart04> 권속, 거기 안 돼애<emoji=heart04> 앗<emoji=heart04> 보지 입구 쪽만 문지르는 거윽<emoji=heart04> 거기 약하단 말이야아…… 아앙윽<emoji=heart04> 그만두는 것이야아<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「んっ<emoji=heart04>\u3000はあぁっ……んあぁっ<emoji=heart04>\u3000おま○こ、パンパン突かれるたびに、頭の中バチバチって痺れて<emoji=heart04>\u3000おち○ぽのこと以外、考えられなくなるのじゃあ……っ<emoji=heart04>」"
translation = "「응윽<emoji=heart04> 하아아윽…… 응아아윽<emoji=heart04> 보지, 팡팡 찔릴 때마다, 머릿속이 찌릿찌릿 저려서<emoji=heart04> 자지 말고는, 아무것도 생각할 수 없게 된단 말이야아……윽<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「わ、わかった……っ<emoji=heart04>\u3000もう我の……我の負けでいいからぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000動くのやめ……ふああぁっ<emoji=heart04>」"
translation = "「아, 알았어……윽<emoji=heart04> 이제 나의…… 나의 패배로 좋으니까아윽<emoji=heart04> 앙윽<emoji=heart04> 움직이는 거 그마…… 후아아아윽<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「眷族の勝ちぃ<emoji=heart04>\u3000眷族のおち○ぽ、強すぎぃっ<emoji=heart04>\u3000我の負けっ<emoji=heart04>\u3000おしまいっ<emoji=heart04>\u3000これで、もういいじゃろぉ……っ<emoji=heart04>」"
translation = "「권속의 승리이이<emoji=heart04> 권속의 자지, 너무 강해애윽<emoji=heart04> 나의 패배윽<emoji=heart04> 끝윽<emoji=heart04> 이걸로, 이제 됐잖아아……윽<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「これ以上されたら……んあぁっ<emoji=heart04>\u3000我の方がおち○ぽの下僕にされてしまうぅ<emoji=heart04>\u3000はあぁんっ……<emoji=heart04>」"
translation = "「이 이상 당하면…… 응아아윽<emoji=heart04> 내가 자지의 하인이 되어버려어어<emoji=heart04> 하아아앙윽……<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「降参……っ<emoji=heart04>\u3000降参じゃ<emoji=heart04>\u3000調子に乗ってごめんなさ……ひあぁっ<emoji=heart04>\u3000謝ってるんじゃから……っ<emoji=heart04>\u3000おち○ぽ止めてくれてもいいじゃろぉ……っ<emoji=heart04>」"
translation = "「항복……윽<emoji=heart04> 항복이야아<emoji=heart04> 우쭐거려서 미안하…… 히아아윽<emoji=heart04> 사과하고 있잖아아……윽<emoji=heart04> 자지 멈춰줘도 괜찮잖아아……윽<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「……本当にやめてほしいの？」"
translation = "「……정말로 멈췄으면 좋겠어?」"

[[dialogue]]
speaker = "プリムラ"
original = "「んっ<emoji=heart04>\u3000ふうぅ……<emoji=heart04>\u3000当たり前じゃ……っ<emoji=heart04>\u3000負けを認めると言っておろうが……っ<emoji=heart04>」"
translation = "「응윽<emoji=heart04> 후우우……<emoji=heart04> 당연하잖아아……윽<emoji=heart04> 패배를 인정한다고 말하고 있잖아아……윽<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「こんなに気持ちよさそうなのに？\u3000プリムラはもう俺とエッチしたくないんだ？」"
translation = "「이렇게 기분 좋아 보이는데? 프리뮬라는 이제 나랑 섹스하기 싫은 거야?」"

[[dialogue]]
speaker = "プリムラ"
original = "「なっ……！？\u3000そ、そうは言っておらん……んっ<emoji=heart04>\u3000今日はおしまいと言ってるだけで……」"
translation = "「뭣……!? 그, 그렇게는 말 안 했어…… 응윽<emoji=heart04> 오늘은 끝이라고 말했을 뿐이지……」"

[[dialogue]]
speaker = "プリムラ"
original = "「う……っ、はぁ……<emoji=heart04>\u3000んぅ……<emoji=heart04>\u3000はぁ……ふぅ……<emoji=heart04>\u3000あっ……<emoji=heart04>」"
translation = "「우……윽, 하아……<emoji=heart04> 응으……<emoji=heart04> 하아…… 후우……<emoji=heart04> 앗……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「言われた通りやめたけど、プリムラの腰……まだ動いてない？\u3000どうしたの？」"
translation = "「말한 대로 멈췄는데, 프리뮬라의 허리…… 아직 움직이고 있지 않아? 왜 그래?」"

[[dialogue]]
speaker = "プリムラ"
original = "「うぅ……いじわるはやめるのじゃあ……<emoji=heart04>\u3000本当はわかっておるじゃろぉ……<emoji=heart04>」"
translation = "「우으…… 심술부리는 건 그만두는 것이야아……<emoji=heart04> 사실은 알고 있잖아아……<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「……てほしい」"
translation = "「……해줬으면 좋겠어」"

[[dialogue]]
speaker = "クロト"
original = "「ん？」"
translation = "「응?」"

[[dialogue]]
speaker = "プリムラ"
original = "「だから……動いてほしいのじゃ！\u3000もっといっぱい、おま○こ突いてほしいのじゃあぁっ<emoji=heart04>」"
translation = "「그러니까…… 움직여줬으면 좋겠단 말이야! 더 잔뜩, 보지 찔러줬으면 좋겠어어어윽<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「っ……しょうがないじゃろ！\u3000貴様のおち○ぽが気持ちよすぎるのが悪いんじゃ！」"
translation = "「윽…… 어쩔 수 없잖아! 네놈의 자지가 너무 기분 좋은 게 잘못이란 말이야!」"

[[dialogue]]
speaker = "プリムラ"
original = "「勝負だからって、意地を張っちゃっただけで……本当は、もっともっとおち○ぽ突っ込んでほしいに決まっておるじゃろうっ<emoji=heart04>」"
translation = "「승부라고 해서, 고집을 부렸을 뿐이지…… 사실은, 더 많이 자지 박아줬으면 좋겠는 게 당연하잖아아윽<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「だから……今日はもう、我の負けでいいから――」"
translation = "「그러니까…… 오늘은 이제, 나의 패배로 좋으니까――」"

[[dialogue]]
speaker = "プリムラ"
original = "「眷族の<ruby>主<rt>あるじ</rt></ruby>おち○ぽで、いっぱい、いっぱい下僕おま○こ、突っ込んでほしいのじゃ……っ<emoji=heart04>\u3000――ひああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「권속의 주인 자지로, 잔뜩, 잔뜩 하인 보지, 박아줬으면 좋겠어……윽<emoji=heart04> ――히아아아앙윽<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「んあああぁぁぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000そうっ<emoji=heart04>\u3000これぇっ<emoji=heart04>\u3000これが本当は好きなんじゃあぁっ<emoji=heart04>\u3000あっ、あっ、あっ、あんっ<emoji=heart04>\u3000あっ、あっ、あっ、ふああぁんっ<emoji=heart04>」"
translation = "「응아아아아아윽<emoji=heart04><emoji=heart04><emoji=heart04> 그래윽<emoji=heart04> 이거야아윽<emoji=heart04> 이게 사실은 좋단 말이야아아윽<emoji=heart04> 앗, 앗, 앗, 앙윽<emoji=heart04> 앗, 앗, 앗, 후아아아앙윽<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「眷族の性処理オナホみたいに、激しくおち○ぽピストンされるのっ<emoji=heart04>\u3000大好きなのじゃあぁっ<emoji=heart04>\u3000あっ、あっ、あっ、んああぁんっ<emoji=heart04>」"
translation = "「권속의 성처리 오나홀처럼, 격하게 자지 피스톤 당하는 거윽<emoji=heart04> 너무 좋단 말이야아아윽<emoji=heart04> 앗, 앗, 앗, 응아아아앙윽<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「本当はっ<emoji=heart04>\u3000今日も激しくされるの期待してぇ……はあぁんっ<emoji=heart04>」"
translation = "「사실은윽<emoji=heart04> 오늘도 격하게 당하는 걸 기대하고오…… 하아아앙윽<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「どうすれば眷族にいっぱい興奮してもらえるかっ、ふああぁっ<emoji=heart04>\u3000考えてたのじゃあっ<emoji=heart04>\u3000あっ、あっ、あっ、んああぁんっ<emoji=heart04>」"
translation = "「어떻게 하면 권속이 잔뜩 흥분해줄지이, 후아아아윽<emoji=heart04> 생각했단 말이야아윽<emoji=heart04> 앗, 앗, 앗, 응아아아앙윽<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「おち○ぽで激しく責められるのっ<emoji=heart04>\u3000興奮して気持ちいいとか、恥ずかしくてっ<emoji=heart04>\u3000言えない、からぁっ<emoji=heart04>」"
translation = "「자지로 격하게 괴롭힘당하는 거윽<emoji=heart04> 흥분해서 기분 좋다니, 부끄러워서윽<emoji=heart04> 말 못 하니까아윽<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「あんっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>\u3000勝負って言えばっ<emoji=heart04>\u3000眷族のおち○ぽで責めてもらえるからぁっ<emoji=heart04>\u3000あっ、あっ、あっ、ふああぁんっ<emoji=heart04>」"
translation = "「앙윽<emoji=heart04> 후아아아윽<emoji=heart04> 승부라고 말하면윽<emoji=heart04> 권속의 자지로 괴롭힘당할 수 있으니까아윽<emoji=heart04> 앗, 앗, 앗, 후아아아앙윽<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「――んああぁっ<emoji=heart04>\u3000セックス大好きな、スケベ下僕になっちゃってごめんなさいぃっ<emoji=heart04>」"
translation = "「――응아아윽<emoji=heart04> 섹스 너무 좋아하는, 야한 하인이 되어버려서 미안해요오윽<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「悪いエロスライムに、もっと主おち○ぽでお仕置き、してほしいのじゃあぁ<emoji=heart04>\u3000あっ、あっ、あっ、はああぁんっ<emoji=heart04>」"
translation = "「나쁜 에로 슬라임에게, 더 주인 자지로 벌, 줬으면 좋겠어어어윽<emoji=heart04> 앗, 앗, 앗, 하아아아앙윽<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「んっ<emoji=heart04>\u3000あっ、あっ、あっ、ふああぁっ<emoji=heart04>\u3000おち○ぽ気持ちいいっ<emoji=heart04>\u3000あっ、あっ、あっ、んああぁっ<emoji=heart04>\u3000おま○こ、すごく気持ちいいのじゃあぁっ<emoji=heart04>」"
translation = "「응윽<emoji=heart04> 앗, 앗, 앗, 후아아아윽<emoji=heart04> 자지 기분 좋아윽<emoji=heart04> 앗, 앗, 앗, 응아아아윽<emoji=heart04> 보지, 너무 기분 좋단 말이야아아윽<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「おち○ぽ好きっ<emoji=heart04>\u3000好き好き、しゅきぃっ<emoji=heart04>\u3000あっ、あっ、あっ、ふああぁんっ<emoji=heart04>\u3000もっと、もっと突いてほしいのじゃあっ<emoji=heart04>」"
translation = "「자지 좋아윽<emoji=heart04> 좋아 좋아, 됴아아윽<emoji=heart04> 앗, 앗, 앗, 후아아아앙윽<emoji=heart04> 더, 더 찔러줬으면 좋겠어어윽<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「あんっ<emoji=heart04>\u3000おち○ぽ凄いっ<emoji=heart04>\u3000ち○ぽ、ち○ぽち○ぽち○ぽぉ<emoji=heart04>\u3000あっ、あっ、あっ、んああぁんっ<emoji=heart04>」"
translation = "「앙윽<emoji=heart04> 자지 굉장해윽<emoji=heart04> 자지, 자지 자지 자지이이<emoji=heart04> 앗, 앗, 앗, 응아아아앙윽<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「こんな激しくされたらぁっ<emoji=heart04>\u3000前の我に戻れなくなっちゃうのじゃあぁっ<emoji=heart04>」"
translation = "「이렇게 격하게 당하면윽<emoji=heart04> 예전의 나로 돌아갈 수 없게 된단 말이야아아윽<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「体にっ<emoji=heart04>\u3000刻まれちゃうっ<emoji=heart04>\u3000あっ、あっ、あっ、はあぁんっ<emoji=heart04>」"
translation = "「몸에윽<emoji=heart04> 새겨져버려어윽<emoji=heart04> 앗, 앗, 앗, 하아아앙윽<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「眷族のおち○ぽには勝てないって……っ<emoji=heart04>\u3000我が眷族よりも下だと、体が覚えさせられちゃうのじゃあぁっ<emoji=heart04>」"
translation = "「권속의 자지에는 이길 수 없다고……윽<emoji=heart04> 내가 권속보다 아래라고, 몸이 기억하게 되어버린단 말이야아아윽<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「でもっ、それも嬉しいのじゃあぁっ<emoji=heart04>\u3000眷族の……んあぁっ<emoji=heart04>\u3000ものになるって<emoji=heart04>\u3000女にされるってことじゃから……っ<emoji=heart04>」"
translation = "「하지만윽, 그것도 기쁘단 말이야아아윽<emoji=heart04> 권속의…… 응아아윽<emoji=heart04> 것이 된다는 건<emoji=heart04> 여자로 만들어진다는 거니까……윽<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「本当に可愛いな、プリムラはっ……！」"
translation = "「정말 귀엽네, 프리뮬라는……!」"

[[dialogue]]
speaker = "プリムラ"
original = "「か、かわっ……！？\u3000あっ、あっ、あっ、ああぁんっ<emoji=heart04>\u3000ば、馬鹿者っ<emoji=heart04>\u3000急にそんなこと言われたら……っ<emoji=heart04>」"
translation = "「귀, 귀여……!? 앗, 앗, 앗, 아아아앙윽<emoji=heart04> 바, 바보 녀석윽<emoji=heart04> 갑자기 그런 소릴 들으면……윽<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「おま○こキュンキュンして、子宮が下がってきてしまうではないかっ<emoji=heart04>\u3000んっ、んっ、んっ、んああぁっ<emoji=heart04>\u3000我、肉体変化もしてないのにぃっ<emoji=heart04>」"
translation = "「보지 큥큥거려서, 자궁이 내려와 버리잖아아윽<emoji=heart04> 응윽, 응윽, 응윽, 응아아윽<emoji=heart04> 나, 육체 변화도 안 했는데에윽<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「我の体が、眷族の子供を作りたがってるのじゃあっ<emoji=heart04>\u3000あっ、あっ、あっ、ふああぁんっ<emoji=heart04>」"
translation = "「내 몸이, 권속의 아이를 만들고 싶어 한단 말이야아윽<emoji=heart04> 앗, 앗, 앗, 후아아아앙윽<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「け、眷族ぅ……っ<emoji=heart04>\u3000はっ、はっ、はぁっ<emoji=heart04>\u3000おね、お願いじゃ……っ<emoji=heart04>」"
translation = "「권, 권속으으……윽<emoji=heart04> 하앗, 하앗, 하아윽<emoji=heart04> 부탁, 부탁이야아……윽<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「我が眷族のものだという証をっ<emoji=heart04>\u3000眷族の子種をっ<emoji=heart04>\u3000我の子宮にいっぱいぶちまけてくれぇ<emoji=heart04>\u3000んっ、んっ、んっ、ふううぅっ<emoji=heart04>」"
translation = "「내가 권속의 것이라는 증거를윽<emoji=heart04> 권속의 씨물을윽<emoji=heart04> 내 자궁에 잔뜩 쏟아부어줘어어<emoji=heart04> 응윽, 응윽, 응윽, 후우우우윽<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「あっ、あっ、あっ<emoji=heart04>\u3000出して<emoji=heart04>\u3000出して出してぇ<emoji=heart04>\u3000我も、もうイキそうっ<emoji=heart04>\u3000はぁっ、あっ、あっ、あんっ<emoji=heart04>\u3000あっ、あっ、あっ、んああぁっ<emoji=heart04>」"
translation = "「앗, 앗, 앗<emoji=heart04> 싸줘<emoji=heart04> 싸줘 싸줘어어<emoji=heart04> 나도, 이제 갈 것 같아윽<emoji=heart04> 하아윽, 앗, 앗, 앙윽<emoji=heart04> 앗, 앗, 앗, 응아아아윽<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「我のおま○こで気持ちよくなって、眷属の精子っ<emoji=heart04>\u3000いっぱい飲ませてぇっ<emoji=heart04>」"
translation = "「내 보지로 기분 좋아져서, 권속의 정액윽<emoji=heart04> 잔뜩 마시게 해줘어윽<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「あっ<emoji=heart04>\u3000おち○ぽ膨らんできた<emoji=heart04>\u3000眷族ももう限界なんじゃな<emoji=heart04>\u3000あっ、あっ、あっ<emoji=heart04>\u3000我も、我もアクメくるのじゃあぁっ<emoji=heart04>\u3000ふあああぁっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 자지 부풀어 올랐어<emoji=heart04> 권속도 이제 한계구나아<emoji=heart04> 앗, 앗, 앗<emoji=heart04> 나도, 나도 아크메 온단 말이야아아윽<emoji=heart04> 후아아아아윽<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「眷族、一緒にっ<emoji=heart04>\u3000一緒にぃ<emoji=heart04>\u3000あああっ、来る、くるくるくるっ<emoji=heart04>\u3000気持ちいいの、登ってくるぅっ<emoji=heart04>」"
translation = "「권속, 같이っ<emoji=heart04> 같이이<emoji=heart04> 아아앗, 온다, 온다온다온다앗<emoji=heart04> 기분 좋아, 올라오고 있어어엇<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「来て、きてきてきて<emoji=heart04>\u3000眷族、射精してぇ<emoji=heart04>\u3000あああああっ<emoji=heart04><emoji=heart04>」"
translation = "「와줘, 와줘와줘와줘<emoji=heart04> 권속, 사정해줘어<emoji=heart04> 아아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「イクイクイクイクイクっ<emoji=heart04><emoji=heart04>\u3000あっ―――<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「이쿠이쿠이쿠이쿠이쿠으윽<emoji=heart04><emoji=heart04> 앗―――<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「ふあああぁぁぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000中出しされて、イっくぅぅぅぅぅぅぅうぅぅぅぅぅうぅぅぅ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 질내사정 당해서, 가버려어어어어어어어어어어어어어어어어～～～～～～엇<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「眷族の子種<emoji=heart04>\u3000いっぱい<emoji=heart04>\u3000入ってきてる……っ<emoji=heart04>\u3000おち○ぽ子宮口に押しつけられて、すごい勢いで出てるのじゃ……っ<emoji=heart04>」"
translation = "「권속의 씨물<emoji=heart04> 가득<emoji=heart04> 들어오고 있어……っ<emoji=heart04> 자지가 자궁구에 짓눌려서, 엄청난 기세로 나오고 있는 것이니라……っ<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「あぁっ……<emoji=heart04>\u3000ん……っ<emoji=heart04>\u3000精子、熱い……<emoji=heart04>\u3000はあぁっ……<emoji=heart04>\u3000んあぁ……っ<emoji=heart04>\u3000んっ……<emoji=heart04>\u3000すごい量なのじゃ……<emoji=heart04>\u3000ふうぅ……<emoji=heart04>」"
translation = "「아앗……<emoji=heart04> 응……っ<emoji=heart04> 정자, 뜨거워……<emoji=heart04> 하아앗……<emoji=heart04> 응아아……っ<emoji=heart04> 응……っ<emoji=heart04> 엄청난 양이니라……<emoji=heart04> 후우우……<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「子宮の中、精子で全部満たされておる……<emoji=heart04>」"
translation = "「자궁 안이, 정자로 전부 가득 찼느니라……<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「ん……はぁっ<emoji=heart04>\u3000ふぅ……んっ<emoji=heart04>\u3000あ……抜いてしまうのか？\u3000はぁん……<emoji=heart04>」"
translation = "「응……하앗<emoji=heart04> 후우……응<emoji=heart04> 아……빼버리는 것이냐? 하앙……<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「はあぁ……<emoji=heart04>\u3000量が多すぎて、精液出てきちゃうのじゃ<emoji=heart04>\u3000んっ……<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 양이 너무 많아서, 정액이 흘러나와 버리느니라<emoji=heart04> 응……<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「ダメじゃ……おま○こバカになって……腰に力が入らん……<emoji=heart04>」"
translation = "「안 되겠느니라……보지가 바보가 돼서……허리에 힘이 안 들어가……<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「って……な、なんじゃっ、そんなニヤニヤして！」"
translation = "「그보다……뭐, 뭐냐, 그렇게 싱글벙글 웃고!」"

[[dialogue]]
speaker = "プリムラ"
original = "「……まったく、勝負も負けるし、イかされるし……今日は散々じゃ」"
translation = "「……정말이지, 승부도 지고, 가버리게 되고…… 오늘은 엉망진창이니라」"

[[dialogue]]
speaker = "クロト"
original = "「でも、そうなるのを期待してたんでしょ？」"
translation = "「하지만, 그렇게 되길 기대했지?」"

[[dialogue]]
speaker = "プリムラ"
original = "「……う、うるさいわ！\u3000確かに眷族に責められるのは好きじゃが……こんなこと、事後にわざわざ言わせるでない！」"
translation = "「……시, 시끄러워! 확실히 권속에게 괴롭힘당하는 건 좋아하지만…… 이런 걸, 사후에 일부러 말하게 하지 마라!」"

[[dialogue]]
speaker = "プリムラ"
original = "「うぅ……してる最中に言ったことを思い出して、恥ずかしくなるじゃろうが……」"
translation = "「으으…… 하는 도중에 말했던 것들이 생각나서, 부끄러워지지 않느냐……」"

[[dialogue]]
speaker = "プリムラ"
original = "「それもこれも、貴様のおち○ぽが凶悪すぎるせいじゃ……！\u3000この……このっ！」"
translation = "「이것도 저것도, 네놈의 자지가 너무 흉악한 탓이니라……! 이…… 이잇!」"

[[dialogue]]
speaker = "クロト"
original = "「はいはい……でも、プリムラも悪いんだぞ？」"
translation = "「네네…… 하지만, 프리무라도 잘못했다구?」"

[[dialogue]]
speaker = "プリムラ"
original = "「我が……？\u3000どうしてじゃ」"
translation = "「짐이……? 어째서냐」"

[[dialogue]]
speaker = "クロト"
original = "「だって、エッチしてる時のプリムラ、凶悪な可愛さなんだから。男なら興奮するに決まってる」"
translation = "「그야, 섹스할 때의 프리무라, 흉악할 정도로 귀여우니까. 남자라면 흥분하는 게 당연하잖아」"

[[dialogue]]
speaker = "プリムラ"
original = "「そ、そうなのか……我、そんなに可愛いのか」"
translation = "「그, 그런 것이냐…… 짐이, 그렇게나 귀여운 것이냐」"

[[dialogue]]
speaker = "クロト"
original = "「俺だけのものにしたいって思える、最高に可愛い恋人だ」"
translation = "「나만의 것으로 만들고 싶다고 생각하게 되는, 최고로 귀여운 연인이야」"

[[dialogue]]
speaker = "プリムラ"
original = "「……フヘ、フヘへ♪\u3000ま、まぁ……眷族じゃし、体の関係もあるわけじゃしな。恋人……という言い方は間違いではないな。……フヘへ<emoji=heart04>」"
translation = "「……후헤, 후헤헤♪ 뭐, 뭐어…… 권속이기도 하고, 몸의 관계도 있는 사이니까 말이다. 연인……이라는 표현은 틀린 게 아니구나. ……후헤헤<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「せっかくじゃし……もっと褒めてもいいんじゃぞ<emoji=heart04>」"
translation = "「모처럼이니…… 좀 더 칭찬해도 좋느니라<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「そうだなぁ……でも、言葉にしてもし尽せないというか……」"
translation = "「그렇네…… 하지만, 말로는 다 표현할 수 없다고 할까……」"

[[dialogue]]
speaker = "プリムラ"
original = "「む……そうなのか？\u3000それは……ちょっと残念じゃが……って、ひゃっ！？\u3000おま○こに、おち○ぽ当たって……！」"
translation = "「무…… 그런 것이냐? 그것은…… 조금 아쉽지만…… 어라, 히약!? 보지에, 자지가 닿아서……!」"

[[dialogue]]
speaker = "クロト"
original = "「続きはこれで……。思い出したら、またムラムラしてきちゃったから」"
translation = "「다음은 이걸로……. 생각나니까, 또 달아올라 버렸거든」"

[[dialogue]]
speaker = "プリムラ"
original = "「あ、あんなに出したのに、もうおち○ぽ大きくなって……<emoji=heart04>\u3000んっ……<emoji=heart04>\u3000じ、じゃが、我の魅力でそうなるというなら仕方あるまい……<emoji=heart04>」"
translation = "「아, 그렇게나 내보냈는데, 벌써 자지가 커져서는……<emoji=heart04> 응……<emoji=heart04> 하, 하지만, 짐의 매력 때문에 그렇게 되는 것이라면 어쩔 수 없겠구나……<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「我がどんなに可愛いか……じっくりまったり……そして激しく、教えてもらわねばな<emoji=heart04>」"
translation = "「짐이 얼마나 귀여운지…… 느긋하고 듬뿍…… 그리고 격렬하게, 가르침 받아야겠구나<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「どんな甘い言葉が聞けるのか、期待しているからな……我が主よ<emoji=heart04>\u3000――あっ<emoji=heart04>\u3000あんっ……<emoji=heart04>」"
translation = "「어떤 달콤한 말을 들을 수 있을지, 기대하고 있을 테니까 말이다…… 나의 주인이여<emoji=heart04> ――앗<emoji=heart04> 안앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その後、プリムラの望み通り、激しく愛し合いながら、何度も可愛いと褒めてあげるのだった――"
translation = "그 후, 프리무라의 바람대로, 격렬하게 사랑을 나누면서, 몇 번이고 귀엽다고 칭찬해 주는 것이었다――"

