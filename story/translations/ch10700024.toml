[[dialogue]]
speaker = "unk"
original = "第４話,ホワイトデーのお返しデート,P"
translation = "제4화, 화이트데이 보답 데이트, P"

[[dialogue]]
speaker = "unk"
original = "今日はホワイトデー。俺はバレンタインチョコのお返しも兼ねて、ウズメを浅草デートに誘うことにした。"
translation = "오늘은 화이트데이. 나는 발렌타인 초코의 보답도 겸해 우즈메를 아사쿠사 데이트에 초대하기로 했다."

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「いい天気だね～、会長くん！\u3000絶好の浅草デート日和だし！」"
translation = "「날씨 좋다~, 회장군! 그야말로 아사쿠사 데이트하기 딱 좋은 날씨야!」"

[[dialogue]]
speaker = "unk"
original = "晴れてよかったね"
translation = "맑아서 다행이다."

[[dialogue]]
speaker = "unk"
original = "天気予報は雨だったけど"
translation = "일기예보는 비였지만."

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「むふふ～♪\u3000実はあたし、昔っから晴れ女だし！\u3000こーゆーイベント系のお出かけだと、だいたい天気予報を覆せるの！」"
translation = "「무후후~♪ 사실 나 옛날부터 날씨 요정(맑음 소녀)이었거든! 이런 이벤트성 외출이면 대부분 일기예보를 뒤집어 버린다구!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ところでさー、会長くん。その恰好どうしたの！？\u3000浴衣で来るとか聞いてないし……！」"
translation = "「그런데 말야 회장군, 그 차림은 뭐야!? 유카타 입고 온다는 말 없었잖아……!」"

[[dialogue]]
speaker = "unk"
original = "２人で和装デートしたら楽しいかなって"
translation = "둘이서 전통 의상 데이트를 하면 즐거울 것 같아서."

[[dialogue]]
speaker = "unk"
original = "浅草では浴衣のレンタルがあるんだ"
translation = "아사쿠사에는 유카타 대여가 있거든."

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「そんなのもあるんだね！\u3000さっすが会長くん、彼女の好みをよくわかってるし～♪」"
translation = "「그런 것도 있구나! 역시 회장군, 여자친구의 취향을 잘 알고 있다구~♪」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「会長くんの浴衣姿、バチバチに似合ってて動悸ヤバいかも～<emoji=heart04>\u3000ね、ねっ。一緒に記念写真撮ろ！？」"
translation = "「회장군의 유카타 차림, 어마무시하게 잘 어울려서 두근거림이 장난 아니야~<emoji=heart04> 저, 저기. 같이 기념사진 찍자!?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「は～い、ＤＩＳＣに向かってピースだしっ♪\u3000いぇ～いっ！」"
translation = "「자~, DISC를 향해서 피스라구♪ 예~잇!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「やっばぁ……<emoji=heart04>\u3000お付き合いしてる彼ピの和装姿……めっちゃアガるっ……待ち受け不可避だし<emoji=heart04>」"
translation = "「대박……<emoji=heart04> 사귀고 있는 남친의 전통 의상 모습…… 텐션 엄청 올라가…… 대기 화면 확정이라구<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「バレンタインのお返し、何がもらえるかな～って楽しみだったけど、まさか会長くんの浴衣を見せてもらえるなんて～。幸せだし！」"
translation = "「발렌타인 보답으로 뭘 받을까 기대됐는데, 설마 회장군의 유카타를 보게 될 줄이야~. 행복해!」"

[[dialogue]]
speaker = "unk"
original = "いや、これはまだ序の口だよ"
translation = "아니, 이건 아직 시작에 불과해."

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「なぬ！？\u3000まだあるの！？」"
translation = "「나닛!? 아직 더 있어!?」"

[[dialogue]]
speaker_original = "人力車の兄貴"
speaker_translation = "인력거 형님"
original = "「──どうもっ、お迎えにあがりました！」"
translation = "「──안녕하십니까, 모시러 왔습니다!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「なんか人力車のお兄さんまで来たし！？\u3000えっ、これも予約したの？\u3000これに乗って浅草をぐるっと一周デートプラン……！？」"
translation = "「왠지 인력거 오빠까지 왔는데!? 엣, 이것도 예약한 거야? 이걸 타고 아사쿠사를 한 바퀴 도는 데이트 플랜……!?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ぅ～っ<emoji=heart04><emoji=heart04>\u3000会長くん、大好きだし～っ<emoji=heart04>」"
translation = "「우으~<emoji=heart04><emoji=heart04> 회장군, 너무 좋아~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その後、ウズメと一緒に人力車に乗り、引き手のお兄さんもまじえて談笑しながら浅草を一周した。"
translation = "그 후, 우즈메와 함께 인력거를 타고 끄는 오빠와도 담소를 나누며 아사쿠사를 한 바퀴 돌았다."

[[dialogue]]
speaker = "unk"
original = "ウズメは俺の想像をはるかに超えるはしゃぎっぷりを見せてくれて──かなり前からプランを練った甲斐があったなと思うのだった。"
translation = "우즈메는 내 상상을 훨씬 뛰어넘는 흥분된 모습을 보여 주었고── 꽤 예전부터 플랜을 짠 보람이 있다는 생각이 들었다."

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「人力車に乗るのも楽しいけど、こうやって２人でのんびり食べ歩きするのもまたオツだし！ ん～、あんみつ美味しい！」"
translation = "「인력거를 타는 것도 즐겁지만, 이렇게 둘이서 한가롭게 길거리 음식 먹으면서 걷는 것도 운치 있다구! 음~ 안미츠 맛있다!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「はい、会長くん。あたしのあんみつ、１口どーぞ<emoji=heart04>\u3000あ～ん……<emoji=heart04>」"
translation = "「자, 회장군. 내 안미츠 한 입 먹어 봐<emoji=heart04> 아~앙……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「……甘さ控えめでおいしーでしょ！\u3000むふふ～、また推しの笑顔を間近でゲットだし♪」"
translation = "「……단맛이 덜해서 맛있지! 무후후~ 또 최애의 미소를 눈앞에서 겟 했다구♪」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あたしね、会長くんの笑顔が好きなんだ～<emoji=heart04>\u3000ず～っと間近で見てたいし<emoji=heart04>」"
translation = "「나는 말야, 회장군의 웃는 얼굴이 좋아~<emoji=heart04> 계속 가까이서 보고 싶다구<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「……会長くんも同じ気持ち？\u3000えへっ、めっちゃ幸せだし～<emoji=heart04>」"
translation = "「……회장군도 같은 마음? 에헷, 엄청 행복해~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "大好きな恋人と手を繋いで街を歩く──しかし、ここで小さなトラブルが起こった。"
translation = "사랑하는 연인과 손을 잡고 거리를 걷는다── 하지만 여기서 작은 트러블이 발생했다."

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ありゃ？\u3000晴れてるのに雨、降ってきちゃったし……！\u3000うわ～、晴れ女だって言ったばっかなのに！？」"
translation = "「어라라? 맑은데 비가 내리기 시작했어……! 우와~ 날씨 요정이라고 말하자마자 이래!?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「でも大丈夫だし！\u3000あたしの新衣装なら……え～いっ♪」"
translation = "「하지만 괜찮다구! 내 새 의상이라면…… 에잇♪」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「傘があるから問題なし～<emoji=heart04>\u3000会長くん、肩が濡れないように、ちゃーんとくっついてね？」"
translation = "「우산이 있으니까 문제없음~<emoji=heart04> 회장군, 어깨 젖지 않게 꼬옥 붙어야 해?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「にひ♪\u3000オンボロ傘シリーズのマネする以外で、よーやく正しいことに使えた気がするし♪」"
translation = "「니히♪ 낡은 우산 시리즈 흉내 내는 거 말고, 드디어 올바르게 쓴 기분이 들어♪」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「１人だったら、うわ～雨か～って思っちゃうけど、２人ならこういうトラブルも楽しくない？」"
translation = "「혼자였다면 으와~ 비네~ 하고 생각했겠지만, 둘이라면 이런 트러블도 즐겁지 않아?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「そういえばさ、晴れてる時に降る雨って、なんか名前があった気がする！\u3000確か……たぬきの嫁入り！」"
translation = "「그러고 보니 맑을 때 내리는 비를 뭐라고 불렀던 것 같은데! 분명…… 너구리 장가가는 날!」"

[[dialogue]]
speaker = "unk"
original = "きつね、だね"
translation = "여우, 야."

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あは、そだった♪\u3000たぬきときつね、セットになることが多いからさ～。留学生は覚えるのも一苦労だし」"
translation = "「아하, 그랬지♪ 너구리랑 여우는 세트로 묶이는 경우가 많으니까~. 유학생은 외우는 것도 고생이라구」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「今ごろどこかでお化粧したお狐様が、大好きな人と結婚式を挙げてるのかな～？」"
translation = "「지금쯤 어딘가에서 화장한 여우님이 사랑하는 사람이랑 결혼식을 올리고 있으려나?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「もしそうだったら、この雨も悪くないってゆーか、もうちょっと続いてあげて欲しいな～って思うよね！」"
translation = "「만약 그렇다면 이 비도 나쁘지 않달까, 조금 더 내려 줬으면 좋겠다고 생각하게 되네!」"

[[dialogue]]
speaker = "unk"
original = "ウズメのそういう優しいところが好きだ"
translation = "우즈메의 그런 상냥한 점이 좋아."

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「……っ<emoji=heart04>\u3000て、照れるしー<emoji=heart04>\u3000あたしもね、会長くんの優しいところ、大好きだよ？」"
translation = "「……윽<emoji=heart04> 부, 부끄럽다구~<emoji=heart04> 나도 말야, 회장군의 다정한 점, 정말 좋아해?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「こうやって相合傘するのって初めてだし、こうしてるだけで……実はめっちゃ、ドキドキしてるし<emoji=heart04>」"
translation = "「이렇게 한 우산을 쓰는 건 처음이기도 하고, 이러고 있는 것만으로도…… 사실 엄청, 두근거리고 있다구<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「──ちゅー、したいの？\u3000んー……歩いてる人いっぱいだから、ちょっぴりハズいけど……傘で隠れてるからだいじょぶかな？」"
translation = "「──뽀뽀, 하고 싶어? 으음…… 걷고 있는 사람이 많아서 살짝 부끄럽지만…… 우산으로 가려져 있으니까 괜찮으려나?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ん～っ……ちゅっ<emoji=heart04>」"
translation = "「음~…… 쪽<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「にひひひ～<emoji=heart04>\u3000ずーっと一緒にいようね、会長くん<emoji=heart04>\u3000め～っちゃ大好きだしっ<emoji=heart04>」"
translation = "「니히히히~<emoji=heart04> 계속 같이 있자, 회장군<emoji=heart04> 어~엄청 사랑한다구<emoji=heart04>」"

