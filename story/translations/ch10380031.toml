[[dialogue]]
speaker = "unk"
original = "第１話,妄想天使の異変,P"
translation = "제1화, 망상 천사의 이변, P"

[[dialogue]]
speaker = "unk"
original = "最近、恋人であるイクシーの様子がなんだかおかしい。"
translation = "최근, 연인인 익시의 상태가 어딘가 이상하다."

[[dialogue]]
speaker = "unk"
original = "バレンタインが過ぎてから少し経ち、俺とイクシーは日課の戦闘訓練を仮想結界内で行っていたのだが……。"
translation = "발렌타인이 지나고 조금 뒤, 나와 익시는 일과인 전투 훈련을 가상 결계 내에서 하고 있었는데……."

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「ひゃっ！？\u3000か、会長、申し訳ありません……！」"
translation = "「히얏!?\u3000회, 회장님, 죄송합니다……!」"

[[dialogue]]
speaker = "unk"
original = "隣で休憩していて、ちょっと手が触れただけで、顔を赤くしたり。"
translation = "옆에서 휴식하다가, 살짝 손이 닿은 것만으로도 얼굴을 붉히거나."

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「あ、あの……会長、そんなじっと見つめられると、恥ずかしいです……<emoji=heart04>」"
translation = "「저, 저기…… 회장님, 그렇게 빤히 쳐다보시면, 부끄러워요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「バレンタインフォーム、この前覚醒したばかりで、まだ着慣れていないので……」"
translation = "「발렌타인 폼, 요전에 갓 각성해서, 아직 익숙하지 않아서……」"

[[dialogue]]
speaker = "unk"
original = "俺がちょっと見つめただけで、もじもじと恥じらったり。"
translation = "내가 조금 쳐다본 것만으로도, 머뭇머뭇하며 수줍어하거나."

[[dialogue]]
speaker = "unk"
original = "この前チョコを渡してくれたときもそうだ。バレンタインフォームにいつの間にか覚醒していたことにも驚いたけれど、やけに緊張している様子が印象に残っていた。"
translation = "요전에 초코를 건네주었을 때도 그랬다. 발렌타인 폼으로 어느새 각성해 있었다는 것에도 놀랐지만, 유독 긴장하고 있는 모습이 인상에 남아 있었다."

[[dialogue]]
speaker = "unk"
original = "イクシー、最近何かあったのか？"
translation = "익시, 최근 무슨 일 있었어?"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「え？\u3000何か……と言いますと？」"
translation = "「에? 무슨 일……이라 하심은?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「――最近、私が会長に対して、前より恥ずかしがっているような気がする……？\u3000そ、それは……」"
translation = "「──최근, 제가 회장님에 대해서, 전보다 더 부끄러워하는 것 같다……?\u3000그, 그것은……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「その……心配かけて申し訳ありません。実は、会長と付き合い続ける内に、私――」"
translation = "「그게…… 걱정 끼쳐드려 죄송합니다. 실은, 회장님과 계속 사귀는 동안, 저──」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「会長のことが……<b>前より好き</b>になってしまったみたいで……<emoji=heart04>」"
translation = "「회장님이…… <b>전보다</b> <b>더</b> <b>좋아져</b> 버린 것 같아서……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "え？\u3000ど、どういうこと？"
translation = "어? 그, 그게 무슨 소리야?"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「会長が男らしく頼りになるところを見せて下さったり……優しく気遣って下さったり。それを近くで見ている内に……」"
translation = "「회장님이 남자답고 듬직한 모습을 보여주시거나…… 상냥하게 배려해 주시거나. 그걸 가까이서 지켜보는 동안……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「私、会長に改めて、こ、『恋をしている』ような気持ちになってしまって……<emoji=heart04>」"
translation = "「저, 회장님께 새삼스럽게, ‘사랑을 하고 있는’ 듯한 기분이 되어버려서……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "『恋』というワードと熱のこもった視線に、俺は思わずドキッとしてしまう。"
translation = "‘사랑’이라는 단어와 열띤 시선에, 나는 나도 모르게 가슴이 두근거리고 만다."

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「なので、自分のはしたない部分を見られるのが、恥ずかしくなってしまうというか……」"
translation = "「그래서, 제 부끄러운 부분을 보여드리는 게, 창피해진다고나 할까……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「以前の水着フォームの時は、会長に自分を曝け出したいと思っていたんです。でも今は……女の子として、会長にもっと好きになってもらいたいと思っていて……」"
translation = "「이전 수영복 폼일 때는, 회장님께 저를 다 드러내고 싶다고 생각했어요. 하지만 지금은…… 여자로서, 회장님이 저를 더 좋아해 주셨으면 해서……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「だから、私……会長にもう１度好きになってもらえるように、頑張ります<emoji=heart04>」"
translation = "「그러니까, 저…… 회장님이 다시 한번 저를 좋아해 주실 수 있도록, 노력할게요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はイクシーのこと、ちゃんと好きだぞ？"
translation = "나 익시 정말 좋아한다고?"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「あ、ありがとうございます。いつも優しくして頂いて……すごく伝わってきています<emoji=heart04>」"
translation = "「가, 감사합니다. 항상 상냥하게 대해주셔서…… 정말 잘 전해지고 있어요<emoji=heart04>」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「なので、不束者ですが、これからもお付き合い頂けると嬉しいです……<emoji=heart04>」"
translation = "「그러니, 부족한 저이지만, 앞으로도 계속 사귀어 주시면 기쁘겠습니다……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "清楚な恥じらいを帯びた微笑みに、俺もなんだか顔が熱くなってしまって。"
translation = "청초한 수줍음을 띤 미소에, 나도 왠지 얼굴이 화끈거려 버리고."

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「それでは会長、引き続き、訓練のお相手をよろしくお願い致します<emoji=heart04>」"
translation = "「그러면 회장님, 계속해서 훈련 상대 잘 부탁드립니다<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その日はイクシーと触れ合うどころか、目もちゃんと合わせられなくなってしまうくらい、ドキドキしてしまうのだった。"
translation = "그날은 익시와 접촉하기는커녕, 눈도 제대로 맞추지 못할 정도로 두근거리고 마는 것이었다."

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「ふぅ……なんとか今日も無事に訓練を終えることができました」"
translation = "「후우…… 어떻게든 오늘도 무사히 훈련을 마칠 수 있었습니다」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（今日も会長がカッコよくて、危うく色々エッチな妄想を膨らませてしまうところでした……<emoji=heart04>）"
translation = "（오늘도 회장님이 너무 멋있어서, 하마터면 여러 가지 야한 망상을 부풀려 버릴 뻔했어요……<emoji=heart04>）"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（普段は中性的なお顔なのに、戦闘訓練中は男らしい表情になって……はあぁ<emoji=heart04>）"
translation = "（평소에는 중성적인 얼굴이신데, 전투 훈련 중에는 남자다운 표정이 되셔서…… 하아아<emoji=heart04>）"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（あの表情で見つめられると、ついベッドに押し倒される妄想をしてしまいそうになります……<emoji=heart04>）"
translation = "（그 표정으로 쳐다보시면, 그만 침대에 눌려지는 망상을 해버릴 것 같아요……<emoji=heart04>）"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（それに訓練中に会長に近づくと、汗の匂いがして、つい激しく絡み合っている場面を妄想してしまい、興奮してしまって……<emoji=heart04>）"
translation = "（게다가 훈련 중에 회장님께 다가가면, 땀 냄새가 나서, 그만 격렬하게 엉키는 장면을 망상해버려 흥분해버리고……<emoji=heart04>）"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（ああ……どうして会長は、あんなに汗だくになってもいい匂いがするのでしょう<emoji=heart04>）"
translation = "（아아…… 어째서 회장님은, 그렇게 땀투성이가 되어도 좋은 냄새가 나는 걸까요<emoji=heart04>）"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（ですが――それも会長に相応しい女性になろうというイメージに集中することで、なんとか抑え込むことができました）"
translation = "（하지만── 그것도 회장님께 어울리는 여성이 되려는 이미지에 집중함으로써, 어떻게든 억누를 수 있었습니다）"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（会長は、私の『妄想癖』という恥ずかしい部分も受け止めて下さる、優しくて包容力のある素敵な男性です……）"
translation = "（회장님은, 저의 『망상벽』이라는 부끄러운 부분도 받아들여 주시는, 상냥하고 포용력 있는 멋진 남성이에요……）"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（でも、私はそれに甘えて努力しない自分でいたくない）"
translation = "（하지만, 저는 그에 어리광 부리며 노력하지 않는 자신으로 남고 싶지 않아요）"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（会長に惚れ直してもらえるような、『どこに出しても恥ずかしくない女性』を目指したいのです……！）"
translation = "（회장님이 다시금 반하실 만한, 『어디에 내놓아도 부끄럽지 않은 여성』을 목표로 하고 싶어요……！）"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（ただ……会長を以前より好きになってしまったことで、最近はちょっと触れ合うだけでもドキドキしてしまって……）"
translation = "（다만…… 회장님을 이전보다 더 좋아하게 된 탓에, 최근에는 살짝 닿기만 해도 두근거려 버려서……）"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（そのせいで、以前のように自然なスキンシップはできなくなってしまっていますが……）"
translation = "（그 때문에, 이전처럼 자연스러운 스킨십은 할 수 없게 되어 버렸지만……）"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（本当は、会長にもっと触れてほしいです……<emoji=heart04>\u3000抱き合って、キスして、もっと深く絡み合いたい……<emoji=heart04>）"
translation = "（사실은, 회장님이 좀 더 만져주셨으면 해요……<emoji=heart04> 껴안고, 키스하고, 좀 더 깊게 얽히고 싶어……<emoji=heart04>）"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「はぁ……はぁ……<emoji=heart04>」"
translation = "「하아…… 하아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（はっ……！？\u3000い、いけません。こんな外の暗い場所で妄想を膨らませて、息を荒くしては……！\u3000不審な痴女だと思われてしまいます！）"
translation = "（핫……!? 아, 안 돼요. 이런 밖의 어두운 곳에서 망상을 부풀려, 숨을 거칠게 몰아쉬다니……! 수상한 치녀라고 생각되어 버려요!）"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（と、とりあえず、今日の訓練は終わったのですから、早く部屋に戻って休むとしましょう<emoji=heart04>）"
translation = "（이, 일단, 오늘의 훈련은 끝났으니까, 빨리 방으로 돌아가 쉬기로 하죠<emoji=heart04>）"

[[dialogue]]
speaker = "unk"
original = "顔を赤くしながらイクシリオンはそんなことを考え、いそいそと新星寮の自室へ戻っていくのだった。"
translation = "얼굴을 붉히며 익실리온은 그런 생각을 하며, 서둘러 신성 기숙사의 자기 방으로 돌아가는 것이었다."

