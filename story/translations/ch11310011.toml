[[dialogue]]
speaker = "unk"
original = "第１話,シズルの街さんぽ,P"
translation = "제1화, 시즈루의 거리 산책, P"

[[dialogue]]
speaker = "unk"
original = "紫桜の里から戻ってしばらくが経ち、今度は逆にシズルさんが転移装置を使って流星市国に遊びに来ていた。"
translation = "자앵의 마을에서 돌아오고 나서 한동안 시간이 흘러, 이번에는 반대로 시즈루 씨가 전송 장치를 사용해 유성시국에 놀러 와 있었다."

[[dialogue]]
speaker = "シズル"
original = "「おや、魔王さん。こんなところで会うなんて偶然ですね♪」"
translation = "「어라, 마왕님. 이런 곳에서 만나다니 우연이네요♪」"

[[dialogue]]
speaker = "unk"
original = "こんにちは、何をしてたんですか？"
translation = "안녕하세요, 무엇을 하고 있었나요?"

[[dialogue]]
speaker = "シズル"
original = "「えへへ、お散歩を少々。毎日ちゃんと運動しないと、足腰が弱っちゃうと聞きますし」"
translation = "「에헤헤, 산책을 조금요. 매일 제대로 운동하지 않으면, 다리 허리가 약해진다고 들었거든요」"

[[dialogue]]
speaker = "シズル"
original = "「ちゃんと万歩計で測ってるんですよ。さーて、今日はどれくらい歩いたかな～？」"
translation = "「제대로 만보계로 재고 있답니다. 자아, 오늘은 얼마나 걸었으려나~?」"

[[dialogue]]
speaker = "シズル"
original = "「やったー！\u3000５万歩達成です～♪\u3000今日はまあまあ歩きましたねっ」"
translation = "「만세! 5만 보 달성이에요~♪ 오늘은 나름대로 걸었네요」"

[[dialogue]]
speaker = "unk"
original = "歩きすぎでは……？"
translation = "너무 많이 걸은 거 아닌가……?"

[[dialogue]]
speaker = "unk"
original = "５万歩！？"
translation = "5만 보!?"

[[dialogue]]
speaker = "シズル"
original = "「こんなものじゃありませんか？\u3000里では測ってませんでしたから、比較は出来ませんけど」"
translation = "「이 정도는 보통 아닌가요? 마을에서는 재지 않았으니까 비교는 할 수 없지만요」"

[[dialogue]]
speaker = "シズル"
original = "「昔はも～っといっぱい歩けたんですよ。でも今はもうダメダメですね。すぐに疲れてしまいます」"
translation = "「옛날에는 더어~욱 많이 걸을 수 있었답니다. 하지만 지금은 이제 엉망진창이네요. 금방 지쳐버려요」"

[[dialogue]]
speaker = "シズル"
original = "「だから、こうやって休憩しながら歩いていたところなんですが……あれ？」"
translation = "「그래서, 이렇게 휴식하면서 걷고 있었던 참입니다만…… 어라?」"

[[dialogue]]
speaker = "シズル"
original = "「ま、待って下さい。ここはどこですかっ？\u3000まるで覚えがない場所ですっ！」"
translation = "「자, 잠깐 기다려 주세요. 여기는 어디인가요? 전혀 기억이 없는 장소예요!」"

[[dialogue]]
speaker = "unk"
original = "もしかして方向音痴ですか？"
translation = "혹시 길치인가요?"

[[dialogue]]
speaker = "シズル"
original = "「そんなことはないと思います。任務に支障をきたしたことはありませんし……」"
translation = "「그럴 리는 없다고 생각해요. 임무에 지장을 준 적은 없으니까요……」"

[[dialogue]]
speaker = "シズル"
original = "「でも最近気が付いたら、お外に出かけた覚えもないのに、全然知らない場所を歩いていたりすることがあるんです」"
translation = "「하지만 최근 정신을 차려보면, 밖에 나간 기억도 없는데 전혀 모르는 장소를 걷고 있거나 할 때가 있어요」"

[[dialogue]]
speaker = "シズル"
original = "「その度に里の子が総出で私を見つけてくれるんですが、みんなに苦労をかけてしまうのが申し訳なくて」"
translation = "「그럴 때마다 마을 아이들이 총출동해서 저를 찾아주는데, 모두에게 고생을 끼치는 게 미안해서」"

[[dialogue]]
speaker = "unk"
original = "（それって……）"
translation = "(그건……)"

[[dialogue]]
speaker = "シズル"
original = "「でも都会はさすがですね。迷子になっていると親切なお巡りさんがやってきて、すぐに保護してくれるんですよ」"
translation = "「하지만 도시는 역시 대단하네요. 미아가 되어 있으면 친절한 경찰관 분이 오셔서, 바로 보호해 주거든요」"

[[dialogue]]
speaker = "シズル"
original = "「ちっちゃい子扱いされるのが玉に瑕ですが……あはは」"
translation = "「어린애 취급받는 게 옥에 티지만…… 아하하」"

[[dialogue]]
speaker = "シズル"
original = "「まだまだ元気いっぱい、頑張らなきゃです。こんな時こそ、すぺしゃるな秘薬を……」"
translation = "「아직은 기운 가득, 힘내야 해요. 이럴 때일수록, 스페셜한 비약을……」"

[[dialogue]]
speaker = "シズル"
original = "「ごくっ、ごくっ、ごくっ……ぷっは～～～っ、まじゅい！\u3000我ながらなんて激マズな秘薬を作るんだとびっくりしちゃいますね」"
translation = "「꿀꺽, 꿀꺽, 꿀꺽…… 푸하아~~~아, 맛없어! 나조차도 이렇게나 더럽게 맛없는 비약을 만들다니 깜짝 놀라버리네요」"

[[dialogue]]
speaker = "シズル"
original = "「でも、全身がポッポしてきましたよ～！\u3000これであと１０万歩は歩けますっ！」"
translation = "「하지만, 온몸이 뜨거워졌어요~! 이걸로 앞으로 10만 보는 더 걸을 수 있어요!」"

[[dialogue]]
speaker = "せつな"
original = "「主様ぁ～～～～っ！」"
translation = "「주인님~~~~아!」"

[[dialogue]]
speaker = "unk"
original = "そんなに急いでどうしたの？"
translation = "그렇게 서둘러서 무슨 일이야?"

[[dialogue]]
speaker = "unk"
original = "あれ？\u3000せつな？"
translation = "어라? 세츠나?"

[[dialogue]]
speaker = "せつな"
original = "「い、一大事にござる！\u3000師匠が行方不明になったでござるよ～！」"
translation = "「크, 큰일이 난 것이오! 스승님이 행방불명된 것이오~!」"

[[dialogue]]
speaker = "せつな"
original = "「師匠らしき女子を保護したと連絡を貰ったのでござるが、すぐにどこかに消えてしまったらしく！」"
translation = "「스승님으로 보이는 여자를 보호했다는 연락을 받았소만, 바로 어딘가로 사라져 버린 듯하여!」"

[[dialogue]]
speaker = "せつな"
original = "「どうすればよいでござろう！\u3000見た目はか弱き少女ゆえ、小脇に抱えてさらわれたら一大事でござるよ～～っ！」"
translation = "「어찌하면 좋겠소! 겉모습은 가냘픈 소녀인바, 옆구리에 끼여 납치당하기라도 하면 큰일인 것이오~~!」"

[[dialogue]]
speaker = "unk"
original = "シズルさんならそこにいるよ"
translation = "시즈루 씨라면 저기 있어"

[[dialogue]]
speaker = "せつな"
original = "「なんと……？\u3000どこにいるでござるか？」"
translation = "「무엇이라……? 어디에 있는 것이오?」"

[[dialogue]]
speaker = "unk"
original = "いつの間にかいない……"
translation = "어느새인가 없어……"

[[dialogue]]
speaker = "unk"
original = "あれ？"
translation = "어라?"

[[dialogue]]
speaker = "せつな"
original = "「くんくん、これは……確かに師匠の残り香でござる！\u3000あのまっずい秘薬の臭いがするでござるよ」"
translation = "「킁킁, 이것은…… 분명히 스승님의 잔향이오! 그 맛없는 비약의 냄새가 나는 것이오」"

[[dialogue]]
speaker = "せつな"
original = "「ぐぬぬ～、相変わらずの行動力でござる。当主様直々に、師匠の供をせよと命じられておりますのに、何度も何度も見失ってしまって！」"
translation = "「그으으~, 여전한 행동력이오. 당주님께서 직접 스승님의 수발을 들라 명하셨거늘, 몇 번이고 몇 번이고 놓쳐버리고!」"

[[dialogue]]
speaker = "せつな"
original = "「主様、お願いでござる！\u3000一緒に師匠を探して欲しいでござる！」"
translation = "「주인님, 부탁이오! 함께 스승님을 찾아주었으면 하오!」"

[[dialogue]]
speaker = "シズル"
original = "「おや？\u3000魔王さんとはぐれてしまいましたね……」"
translation = "「어라? 마왕님과 떨어져 버렸네요……」"

[[dialogue]]
speaker = "シズル"
original = "「でもせつなの気配を感じたので、ちょうどよかったかもです。お目付役がいると自由に都会を満喫できませんからね」"
translation = "「하지만 세츠나의 기척이 느껴지니, 마침 잘 된 걸지도요. 감시역이 있으면 자유롭게 도시를 만끽할 수 없으니까요」"

[[dialogue]]
speaker = "シズル"
original = "「……ここはどこでしょう？\u3000都会の中でも、一番都会っぽい感じのするところですね……大きなビルが沢山建ってます……」"
translation = "「……여기는 어디일까요? 도시 중에서도 가장 도시 같은 느낌이 드는 곳이네요…… 커다란 빌딩이 많이 서 있어요……」"

[[dialogue]]
speaker = "シズル"
original = "「うんうん、いいじゃないですか♪\u3000ここなら思う存分都会を満喫できそうです♪」"
translation = "「음음, 좋지 않나요♪ 여기라면 마음껏 도시를 만끽할 수 있을 것 같아요♪」"

[[dialogue]]
speaker = "シズル"
original = "「あ、こんにちはお巡りさん、何か御用ですか？」"
translation = "「아, 안녕하세요 경찰관님, 무슨 용건인가요?」"

[[dialogue]]
speaker = "シズル"
original = "「えっ……あ、違うんです、私はこれでも立派な大人でして……ふえっ、続きの話は派出所で！？\u3000いえいえ、そういうのは結構ですから！」"
translation = "「엣…… 아, 아니에요, 저는 이래 봬도 어엿한 어른이라서…… 후에엣, 다음 이야기는 파출소에서!? 아니아니, 그런 건 사양할게요!」"

[[dialogue]]
speaker = "せつな"
original = "「くんくんくん……この辺りにも師匠の居た痕跡が……」"
translation = "「킁킁킁…… 이 근처에도 스승님이 계셨던 흔적이……」"

[[dialogue]]
speaker = "せつな"
original = "「はっ！？\u3000危ないっ、撒き菱でござるっ！」"
translation = "「핫!? 위험하오, 마름쇠인 것이오!」"

[[dialogue]]
speaker = "せつな"
original = "「いや～、間一髪でござったな。まさかこんな所で撒き菱が使われているなんて、世も末でござるよ～」"
translation = "「이야~, 간발의 차였구려. 설마 이런 곳에서 마름쇠가 쓰이고 있다니, 말세인 것이오~」"

[[dialogue]]
speaker = "unk"
original = "シズルさんが使った撒き菱では？"
translation = "시즈루 씨가 사용한 마름쇠 아니야?"

[[dialogue]]
speaker = "せつな"
original = "「きっと、そうでござる！\u3000さすがは主様、慧眼にござる！」"
translation = "「분명, 그럴 것이오! 역시 주인님, 혜안이오!」"

[[dialogue]]
speaker = "せつな"
original = "「しかし……なぜ撒き菱を？\u3000はっ、つまり何者かに追われていた！！」"
translation = "「하지만…… 어째서 마름쇠를? 핫, 즉 누군가에게 쫓기고 있었다!!」"

[[dialogue]]
speaker = "せつな"
original = "「師匠の身に危険が迫っているでござる！\u3000せつなが案じた通り、曲者にお持ち帰りされてしまったでござるよ！」"
translation = "「스승님의 신변에 위험이 닥치고 있는 것이오! 세츠나가 걱정했던 대로, 괴한에게 납치당해 버린 것이오!」"

[[dialogue]]
speaker = "せつな"
original = "「どこでござるか、師匠～っ！\u3000せつなはここでござる～！」"
translation = "「어디요, 스승님~! 세츠나는 여기 있소~!」"

[[dialogue]]
speaker = "シズル"
original = "「せつなぁ……助けて……」"
translation = "「세츠나아…… 도와줘……」"

[[dialogue]]
speaker = "せつな"
original = "「はっ！\u3000師匠！\u3000よかった、無事でござったか！」"
translation = "「핫! 스승님! 다행이오, 무사하였구려!」"

[[dialogue]]
speaker = "シズル"
original = "「ぐすん……無事じゃないですよ～……何度説明しても、お巡りさんが解放してくれなくて……」"
translation = "「구스윽…… 무사하지 않아요~…… 몇 번을 설명해도 경찰관 분이 풀어주지 않아서……」"

[[dialogue]]
speaker = "シズル"
original = "「補導回数が２桁になっちゃいました。私、何も悪いことしてないのに～」"
translation = "「보도 횟수가 두 자릿수가 되어버렸어요. 나, 아무런 나쁜 짓도 하지 않았는데~」"

[[dialogue]]
speaker = "unk"
original = "こうしてシズルさんを無事保護したが、この人から目を離してはいけないと、強く思ったのだった。"
translation = "이렇게 시즈루 씨를 무사히 보호했지만, 이 사람에게서 눈을 떼면 안 되겠다고 강하게 생각했다."

