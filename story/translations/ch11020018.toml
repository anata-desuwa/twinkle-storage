[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「──ふぅ。戦闘トレーニング、本日もつつがなく終了」"
translation = "「──후우. 전투 트레이닝, 오늘도 무사히 종료」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「会長、お疲れ様でした。本日も厳しく、しかし思いやりのあるご指導を施して頂き、感謝にたえません」"
translation = "「회장, 고생하셨습니다. 오늘도 엄격하지만 배려심 넘치는 지도를 해주셔서 감사를 금치 못하겠습니다」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「さて会長、この後のスケジュールですが、把握しておいでですか？」"
translation = "「자 회장, 이후 스케줄 말입니다만 파악하고 계신가요?」"

[[dialogue]]
speaker = "unk"
original = "恋人同士になってからというもの、シュティレは俺の身の回りの世話──タイムスケジュールの管理まで担ってくれるようになっていた。"
translation = "연인 사이가 된 이후로, 슈틸레는 나의 뒷바라지── 타임 스케줄 관리까지 맡아주게 되었다."

[[dialogue]]
speaker = "unk"
original = "そのこと自体は嬉しいのだけど……妙だな？\u3000今日はこの後、何も用事は入れていないはずだけど。"
translation = "그 사실 자체는 기쁘지만…… 묘한걸? 오늘 이 뒤에는 아무 용무도 넣어두지 않았을 텐데."

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「真面目な会長のこと、きっと失念しておられると思いました。本日の午後、これから会長は、私の肉体を使って性欲処理の予定がございます」"
translation = "「성실한 회장님이시니 분명 망각하고 계실 거라 생각했습니다. 오늘 오후, 이제부터 회장은 저의 육체를 사용해 성욕 처리를 할 예정이 있습니다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──はぁ！？」"
translation = "「──하아!?」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「前回の射精は３日前。同じくこの場所で、訓練後に火照った体を鎮めました」"
translation = "「이전 사정은 3일 전. 똑같이 이 장소에서 훈련 후 달아오른 몸을 진정시켰습니다」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「以降、性的接触はなし。会長の過密スケジュールから見て自慰も行っているようには思えません」"
translation = "「이후, 성적 접촉은 없음. 회장의 과밀한 스케줄로 보아 자위도 하고 있는 것 같지는 않습니다」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「精液の溜めすぎは体に毒であると、ネットに記事がございました。こちら、エビデンスはまったくないのですが──」"
translation = "「정액을 너무 오래 가두는 건 몸에 독이라는 기사가 인터넷에 있었습니다. 이쪽은 근거가 전혀 없습니다만──」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「大好きな会長とパコパコやりたいシュティレにとって、ネットの情報は都合が良かったため全面的に信頼することにしました。ぶい」"
translation = "「사랑하는 회장님과 팍팍 하고 싶은 슈틸레에게 있어서, 인터넷 정보는 형편이 좋았기에 전면적으로 신뢰하기로 했습니다. V」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「さぁ会長、可及的速やかに、恋人のシュティレを用いて性欲を処理いたしましょう。レッツ、合体交尾」"
translation = "「자 회장님, 가급적 신속하게, 연인인 슈틸레를 이용해 성욕을 처리합시다. 레츠, 합체 교미」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「言い方……！」"
translation = "「말투가 좀……!」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「──む。確かに、恋人同士のまぐわいであるのに『処理』などと表現するのは、いささか不適切であったかもしれません」"
translation = "「──음. 확실히, 연인 사이의 정교인데도 『처리』라고 표현하는 것은, 다소 부적절했을지도 모르겠군요」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「訂正します。会長、可及的速やかに、恋人のシュティレと濃厚ベロチューたっぷりのらぶらぶえっちをいたしましょう。ぶいぶい」"
translation = "「정정하겠습니다. 회장님, 가급적 신속하게, 연인인 슈틸레와 농후한 딥키스가 가득한 러브러브 에로를 합시다. 브이브이」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だから、言い方……！！」"
translation = "「그러니까, 말투가……!!」"

[[dialogue]]
speaker = "unk"
original = "これから裸を見せる、その直前になってもシュティレはこんな風にマイペースなのだった──"
translation = "이제부터 알몸을 보여줄, 그 직전이 되어서도 슈틸레는 이런 식으로 마이페이스였다──"

[[dialogue]]
speaker = "unk"
original = "トレーニング施設に併設されている更衣室に移動した俺たち。部屋の入り口に貸し切りの札を出しておいたから、誰かに見つかる心配はないはずだ。"
translation = "트레이닝 시설에 병설된 탈의실로 이동한 우리들. 방 입구에 대절 팻말을 내걸었으니, 누군가에게 들킬 걱정은 없을 것이다."

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「騎乗位の体勢……準備完了しました」"
translation = "「기승위 자세…… 준비 완료했습니다」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「会長、どうぞ本日もごゆるりと。王様気分で仰向けになっていてください」"
translation = "「회장님, 부디 오늘도 느긋하게. 왕이 된 기분으로 천장을 보고 누워 있어 주세요」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「このバッキバキに反りかえった勃起チ○ポのお世話は、すべて恋人のシュティレにお任せください」"
translation = "「이 빳빳하게 휘어진 발기 자지의 시중은, 전부 연인인 슈틸레에게 맡겨 주세요」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「んっ……私のおま○こを、会長のチ○ポへ擦りつけます……ん……<emoji=heart04>」"
translation = "「응…… 제 보지를, 회장님의 자지에 비벼대겠어요…… 음…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「つながる前に、軽くグラインド。会長のチ○ポ、たくさん磨いてさしあげますね」"
translation = "「연결되기 전에, 가볍게 그라인드. 회장님의 자지, 잔뜩 닦아 드릴게요」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「ごし、ごしっ……ごーし、ごしっ……。ん、ビクビクと小刻みな震えを確認。心地よいと判断します」"
translation = "「슥삭, 슥삭…… 슥사악, 슥삭……. 응, 움찔움찔하고 미세한 떨림을 확인. 기분 좋다고 판단합니다」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「会長。素股による刺激と並行して、チューをしてもよろしいでしょうか？」"
translation = "「회장님. 허벅지 비비기를 통한 자극과 병행하여, 키스를 해도 괜찮을까요?」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「これまでのいちゃらぶえっちの経験から、キスをするとより硬く勃起していただけるという情報が、私にはインストールされています」"
translation = "「지금까지의 꽁냥 에로의 경험을 통해, 키스를 하면 더 단단하게 발기해 주신다는 정보가, 제게 인스톨되어 있습니다」"

[[dialogue]]
speaker = "unk"
original = "ちょっぴり変わったテンションの、マイペースなシュティレ。だけど俺を興奮させるために色々と尽くしてくれるのは、正直すごく嬉しい。"
translation = "조금 독특한 텐션에, 마이페이스인 슈틸레. 하지만 나를 흥분시키기 위해 여러모로 애써주는 것은, 솔직히 무척 기쁘다."

[[dialogue]]
speaker = "unk"
original = "ありがとう──そう伝えると、無表情ながらも少しだけ頬の赤みが増した気がした。"
translation = "고마워── 그렇게 전하자, 무표정하면서도 아주 조금 뺨의 붉은 기가 가신 듯한 기분이 들었다."

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「肯定していただき感謝します。では……<emoji=heart04>」"
translation = "「긍정해 주셔서 감사합니다. 그럼…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「んちゅっ……ちゅ、んちゅぅっ……ちゅ、ちゅぅっ……ちゅるっ……<emoji=heart04>」"
translation = "「음츄…… 츄, 음츄우…… 츄, 츄우…… 츄릅…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「舌を優しく絡ませます、ちゅる<emoji=heart04>\u3000チ○ポを擦るスピードと同じく、ゆったりとしたキスです……はむん、れる、れぇ、れろっ<emoji=heart04>」"
translation = "「혀를 상냥하게 얽을게요, 츄릅 <emoji=heart04> 자지를 문지르는 속도와 마찬가지로, 여유로운 키스예요…… 하암, 레르, 레에, 레로 <emoji=heart04>」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「んちゅぅっ……ちゅるる、れるれるっ……んちゅ、んちゅぅ、ちゅる、ちゅるぅうっ……<emoji=heart04>」"
translation = "「음츄우…… 츄르르, 레를레를…… 음츄, 음츄우, 츄르, 츄르우우…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「ちゅ、んちゅぅっ……ぷぁ<emoji=heart04>\u3000チ○ポに押し当てられている、柔らかいおま○この感触、しっかり味わってください……んちゅぅ、ちゅるれるっ<emoji=heart04>」"
translation = "「츄, 음츄우…… 푸하 <emoji=heart04> 자지에 눌려 있는, 부드러운 보지의 감촉, 제대로 맛봐 주세요…… 음츄우, 츄르레를 <emoji=heart04>」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「んれぇっ、れろれろっ、ちゅる、んちゅぅ、ちゅるるっ……ちゅ、んちゅぅ、れるれる、んちゅぅー……<emoji=heart04>」"
translation = "「음레에, 레로레로, 츄르, 음츄우, 츄르르…… 츄, 음츄우, 레를레를, 음츄우──…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "キスをしている間も、じーっと目を見開いて俺の表情を観察しているシュティレ。"
translation = "키스를 하는 동안에도, 빤히 눈을 크게 뜨고 내 표정을 관찰하고 있는 슈틸레."

[[dialogue]]
speaker = "unk"
original = "見つめられるのは恥ずかしいけれど、俺のことを感じさせるために観察しているのだと思うと、止めてとも言えなくて。"
translation = "지켜봐 지는 건 부끄럽지만, 나를 느끼게 하기 위해 관찰하고 있는 거라 생각하니, 그만두라고도 말할 수 없어서."

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「んちゅ……ぷはあぁっ<emoji=heart04>\u3000カウパー、たくさん溢れております。会長のチ○ポ、シュティレのキスでエッチなチ○ポになりました」"
translation = "「음츄…… 푸하아아 <emoji=heart04> 쿠퍼액, 잔뜩 넘치고 있어요. 회장님의 자지, 슈틸레의 키스로 야한 자지가 되었어요」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「シュティレのおま○こもトロトロに濡れて、準備完了です……では、合体開始です」"
translation = "「슈틸레의 보지도 걸쭉하게 젖어서, 준비 완료입니다…… 그럼, 합체 개시예요」"

[[dialogue]]
speaker = "unk"
original = "シュティレが軽く腰を浮かせて、俺のペニスをゆっくりと呑み込んでいって──"
translation = "슈틸레가 가볍게 허리를 띄워, 나의 페니스를 천천히 집어삼켜 가고──"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「んっ──ふぅぅっ……ぁっ……はぁ、あぁぁっ……<emoji=heart04>」"
translation = "「응── 후우우…… 아…… 하아, 아아아…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "小柄な見た目のシュティレ、その外見から想像の付くとおり、女性器の中もキツキツだ。"
translation = "아담한 외모의 슈틸레, 그 외관에서 상상할 수 있듯이, 성기 안쪽도 꽉꽉 조인다."

[[dialogue]]
speaker = "unk"
original = "まだピストンをしていない、入れただけだというのに、温かくて柔らかくて気持ちが良すぎる。仰向けに寝ているのに、腰が抜けてしまいそうだ。"
translation = "아직 피스톤을 하지 않고, 넣었을 뿐인데도, 따뜻하고 부드러워서 기분이 너무 좋다. 위를 보고 누워 있는데도, 허리에 힘이 빠져버릴 것만 같다."

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「ふぅーっ……挿入、完了です……ぶい……<emoji=heart04>」"
translation = "「후우──…… 삽입, 완료입니다…… V…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「なぜピースをするのかと言うと、実は先日のエッチ、挿入だけで軽く達してしまったという不手際がありまして」"
translation = "「왜 브이 사인을 하느냐 하면, 사실 요전번의 에로에서, 삽입만으로 가볍게 가버렸다는 실수가 있어서요」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「会長にご奉仕をする立場で、スタートダッシュから躓いてはならない。そう思い、今日はめっちゃ頑張ってイクのを堪えました」"
translation = "「회장님을 봉사하는 입장에서, 스타트 대시부터 넘어지면 안 된다. 그렇게 생각해서, 오늘은 정말 열심히 싸는 걸 참았습니다」"

[[dialogue]]
speaker = "unk"
original = "可愛いことを言ってくれるシュティレ。この子は言葉遣いや感情表現は独特だけど、とても素直で、優しく、愛嬌のある女の子だと思う。"
translation = "귀여운 소리를 해주는 슈틸레. 이 아이는 말투나 감정 표현은 독특하지만, 무척 솔직하고, 상냥하고, 애교 있는 여자아이라고 생각한다."

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「あっ……んん<emoji=heart04>\u3000おへその裏で、会長のチ○ポの先端が震えています……早く動いて欲しい、と判断……<emoji=heart04>」"
translation = "「아…… 으으음 <emoji=heart04> 배꼽 뒤쪽에서, 회장님 자지의 끝이 떨리고 있어요…… 빨리 움직여 주길 바란다, 고 판단…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「お待たせいたしました。シュティレの愛情をたっぷり込めた、騎乗位ピストン──味わってください。んんっ……<emoji=heart04>」"
translation = "「오래 기다리셨습니다. 슈틸레의 애정을 듬뿍 담은, 기승위 피스톤── 맛봐 주세요. 으음…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「ふぅっ……んっ、んんぅ、ふぅ、んぁっ……んんっ……<emoji=heart04>\u3000はぁっ……ぁっ……んっ……んんぅっ……<emoji=heart04>」"
translation = "「후우…… 응, 으응, 후우, 응아…… 으음…… <emoji=heart04> 하아…… 아…… 응…… 으으응…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「セックス開始、序盤は……緩やかなストロークを実行します。はぁっ……はっ……んんっ……ふぅっ……<emoji=heart04>」"
translation = "「섹스 개시, 초반은…… 완만한 스트로크를 실행합니다. 하아…… 하…… 으음…… 후우…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「チ○ポはいきなり強い摩擦を与えると、快感より痛みが強いと学んでおります、ので……んん、ふぅ<emoji=heart04>\u3000じっくりと……高めて、ゆきます……<emoji=heart04>」"
translation = "「자지는 갑자기 강한 마찰을 주면, 쾌감보다 고통이 강하다고 배웠기에…… 으음, 후우 <emoji=heart04> 차분히…… 높여, 가겠습니다…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「んっ……はぁっ……ふ～……<emoji=heart04>\u3000会長のお顔、チ○ポをシゴき立てるたびに、ふやけております……はぁ、んんっ<emoji=heart04>」"
translation = "「응…… 하아…… 후우…… <emoji=heart04> 회장님의 얼굴, 자지를 계속 문지를 때마다, 흐물흐물해지고 있어요…… 하아, 으음 <emoji=heart04>」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「おま○このストロークは、スローでありつつリズミカルに……たくさん感じてくださいね、会長……んん、はっ……ふぅっ……<emoji=heart04>」"
translation = "「보지의 스트로크는, 느리면서도 리드미컬하게…… 잔뜩 느껴 주세요, 회장님…… 으음, 하…… 후우…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "シュティレの温かい女性器で、ひと擦りされるたびにゾクゾクと背筋が震える。"
translation = "슈틸레의 따뜻한 성기로, 한 번 비벼질 때마다 오싹오싹하고 등줄기가 떨린다."

[[dialogue]]
speaker = "unk"
original = "それに、自分を慕ってくれる後輩が、自ら腰を動かしてくれるのも嬉しかった。"
translation = "게다가, 자신을 따르는 후배가, 스스로 허리를 움직여 주는 것도 기뻤다."

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「ンっ……<emoji=heart04>\u3000はぁ、んんっ……会長の腰が、わずかに動いているのを、確認……<emoji=heart04>\u3000んっ、チ○ポで、トントンと、突き上げられて、います……<emoji=heart04>」"
translation = "「응…… <emoji=heart04> 하아, 으음…… 회장님의 허리가, 미세하게 움직이는 것을, 확인…… <emoji=heart04> 응, 자지로, 톡톡, 쳐올려지고, 있어요…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「んっ、はぁ、んんっ<emoji=heart04>\u3000……会長、ピストンはっ……はぁ<emoji=heart04>\u3000シュティレに任せていただければ、よいのですよ？」"
translation = "「응, 하아, 으음 <emoji=heart04> ……회장님, 피스톤은…… 하아 <emoji=heart04> 슈틸레에게 맡겨 주시면, 되는 거라구요?」"

[[dialogue]]
speaker = "unk"
original = "動かしているというより、よく締まる女性器でペニスが捕まえられて、引っ張り上げられるような感触だ。"
translation = "움직인다기보다는, 잘 조이는 성기로 페니스가 붙잡혀서, 끌어올려지는 듯한 감촉이다."

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「んんっ……なるほど、理解しました……んっ<emoji=heart04>\u3000シュティレの、ちっちゃなおま○こ……締まりがよいのです、ねっ……んん<emoji=heart04>」"
translation = "「으음…… 과연, 이해했습니다…… 응 <emoji=heart04> 슈틸레의, 조그만 보지…… 조임이 좋군요, 네…… 으음 <emoji=heart04>」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「ではたくさん、ぎゅっと締めて、吸い付いて、さしあげます……んっ……ふぅっ……ん～っ……んぅっ<emoji=heart04>」"
translation = "「그럼 잔뜩, 꽉 조이고, 빨아들여, 드릴게요…… 응…… 후우…… 으음…… 응…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──っ！」"
translation = "「──윽!」"

[[dialogue]]
speaker = "unk"
original = "ペニスにかかる圧が増す。シュティレが女性器に力を込めてくれたのだ。快感が強まって、ぞくぞくっと全身が震えた。"
translation = "페니스에 걸리는 압력이 늘어난다. 슈틸레가 성기에 힘을 꽉 준 것이다. 쾌감이 강해져서, 오싹하고 온몸이 떨렸다."

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「私のおま○こ、とろとろに濡れていますよね？\u3000んぁ、はぁっ……ふぅっ<emoji=heart04>\u3000性感を高める練習を、したのですっ……<emoji=heart04>」"
translation = "「제 보지, 걸쭉하게 젖어 있지요? 응아, 하아…… 후우 <emoji=heart04> 성감을 높이는 연습을, 했거든요…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「会長とエッチができない日はっ……んん<emoji=heart04>\u3000たくさん自慰を行い、セックスの練習、をっ……はぁっ……ふぅうぅっ……<emoji=heart04>」"
translation = "「회장님과 에로를 할 수 없는 날은…… 으음 <emoji=heart04> 잔뜩 자위를 하며, 섹스 연습을…… 하아…… 후우우…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「機械制作が得意なので、んっ……会長のものと寸分違わない、オモチャを作成して……はぁっ……んぁっ……<emoji=heart04>」"
translation = "「기계 제작이 특기라, 응…… 회장님의 것과 한 치의 오차도 없는, 장난감을 작성해서…… 하아…… 응아…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "衝撃の事実。俺のペニスは、ディルドとして複製されていたらしい……"
translation = "충격적인 사실. 내 페니스는, 딜도로서 복제되어 있었던 모양이다……"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「でも、やはり……はぁっ……会長のものが一番、です……<emoji=heart04>\u3000温かくて、心地よい硬さが、あって……んんっ……<emoji=heart04>」"
translation = "「하지만, 역시…… 하아…… 회장님의 것이 제일, 이에요…… <emoji=heart04> 따뜻하고, 기분 좋은 단단함이, 있어서…… 으음…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「はぁっ……んんっ……ふぅっ、んんっ……んぁあっ……はぁ、あっ……チ○ポ、気持ちいいです……会長のチ○ポ、気持ちいい……<emoji=heart04>」"
translation = "「하아…… 으음…… 후우, 으음…… 응아아…… 하아, 아…… 자지, 기분 좋아요…… 회장님의 자지, 기분 좋아…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "未だシュティレの声は、淡々とした喋りには違いないのだけど……"
translation = "여전히 슈틸레의 목소리는, 담담한 말투임에는 틀림없었지만……"

[[dialogue]]
speaker = "unk"
original = "だんだんと、声に艶が帯びてきているような感じがする。"
translation = "점점, 목소리에 요염함이 배어 나오는 듯한 느낌이 든다."

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「んんぅっ……ふぅっ……んぁ、ぁっ……はぁ、あぁっ……んんん……<emoji=heart04>\u3000会長、気持ちいい、ですか……？\u3000私のおま○こ、いかがです、か？」"
translation = "「으음…… 후우…… 응아, 아…… 하아, 아아…… 으으음…… <emoji=heart04> 회장님, 기분 좋아, 요……? 제 보지, 어떠신가, 요?」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「たくさん、感じて……<emoji=heart04>\u3000んっ……たくさん、精液を作ってください……はぁ、んんっ……んぁっ……<emoji=heart04>」"
translation = "「잔뜩, 느껴 줘…… <emoji=heart04> 응…… 잔뜩, 정액을 만들어 주세요…… 하아, 으음…… 응아…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "セックスの快感で、シュティレの声が少しずつとろけている。"
translation = "섹스의 쾌감으로, 슈틸레의 목소리가 조금씩 녹아내리고 있다."

[[dialogue]]
speaker = "unk"
original = "もっと彼女のエッチな声を聴きたい。欲を言えば、表情もとろけさせたい。"
translation = "좀 더 그녀의 야한 목소리를 듣고 싶다. 욕심을 부리자면, 표정도 녹아내리게 만들고 싶다."

[[dialogue]]
speaker = "unk"
original = "ムラムラが抑えきれなくなった俺は、自分から強く腰を打ち上げることにした──"
translation = "욕정을 억누를 수 없게 된 나는, 직접 강하게 허리를 쳐올리기로 했다──"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「んんんんっ！？\u3000あっ──はぁっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000んあぁっ、あ、ぁ、ぁぁぁあ、あぁっ……<emoji=heart04>」"
translation = "「으으음!? 아── 하아 <emoji=heart04> 으음 <emoji=heart04> 응아아, 아, 아, 아아아아, 아아…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「か、会長っ……んん、ふぅ、ぁっ、はぁ、あぁあっ！\u3000んっ、チ○ポ、いきなり、そんな、強くっ……んんんっ！」"
translation = "「회, 회장님…… 으음, 후우, 아, 하아, 아아아! 응, 자지, 갑자기, 그렇게, 강하게…… 으으음!」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「きょ、今日はっ……あ、あぁっ<emoji=heart04>\u3000私が動きますと、お伝え、したのにっ……ん、ふぅっ……！」"
translation = "「오, 오늘은…… 아, 아아 <emoji=heart04> 제가 움직이겠다고, 말씀드렸는데…… 응, 후우……!」"

[[dialogue]]
speaker = "unk"
original = "シュティレの可愛い声。俺のペニスで突かれて、感じている声が聞きたかったんだ──そう伝えながら、小さな体を何度も何度も突きあげる。"
translation = "슈틸레의 귀여운 목소리. 내 페니스로 찔려서, 느끼고 있는 목소리가 듣고 싶었어── 그렇게 전하며, 작은 몸을 몇 번이고 몇 번이고 쳐올린다."

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「んんんっ……ふうぅ、んん、んぁあっ……！\u3000あっあっ、んんぅっ……ふぁ、あぁああっ……！」"
translation = "「으으음…… 후우, 으음, 응아아……! 아앗, 으으음…… 화, 아아아앗……!」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「そ、そんな風に言われたら、あ、ぁっ……やめてください、とは、い、言えませんっ……ん、ぁ、うぅっ、ふぁぁあっ……<emoji=heart04>」"
translation = "「그, 그런 식으로 말씀하시면, 아, 아…… 그만두라고는, 마, 말할 수 없잖아요…… 응, 아, 으으, 화아아아…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「で、では、攻守交替、です……会長のお好きなように、楽しんで、くださ──んんんっ<emoji=heart04><emoji=heart04>」"
translation = "「그, 그럼, 공수교대, 예요…… 회장님이 원하시는 대로, 즐겨, 주세── 으으으음 <emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「あ、ぁ、ああっ……さっきよりも硬いっ……会長のチ○ポ、すっごく硬くて、熱い、ですっ……あ、あ、んんんっ<emoji=heart04><emoji=heart04>」"
translation = "「아, 아, 아아…… 아까보다 단단해…… 회장님의 자지, 엄청 단단하고, 뜨거워, 요…… 아, 아, 으으음 <emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「おま○この奥を、ぐりぐりって──ぁ、あ、あぁ<emoji=heart04><emoji=heart04>\u3000そこ、そんなに強く突いたら、だ、ダメっ……<emoji=heart04>」"
translation = "「보지 안쪽을, 구리구리하고── 아, 아, 아아 <emoji=heart04><emoji=heart04> 거기, 그렇게 강하게 찌르면, 안, 돼…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「練習してた時から、そこ、刺激したら、快感が強くなるから、避けていましたっ……シュティレの弱点、なのですっ……<emoji=heart04>」"
translation = "「연습했을 때부터, 거기, 자극하면, 쾌감이 강해지니까, 피하고 있었거든요…… 슈틸레의 약점, 인 거예요…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「おま○この奥、弱いから、突きあげたらダメ、なので──んんぁあぁあっ<emoji=heart04><emoji=heart04>」"
translation = "「보지 안쪽, 약하니까, 쳐올리면 안, 되니까── 으음아아아앗 <emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それは良いことを聞いた。俺はシュティレの喘ぐ姿を見るために、執拗に弱点──女性器の最奥を突きこんでいく。"
translation = "그건 좋은 정보를 들었다. 나는 슈틸레의 신음하는 모습을 보기 위해, 집요하게 약점── 성기의 가장 깊은 곳을 찔러 들어간다."

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「んんん～っ……<emoji=heart04>\u3000あぁ、あ、あぁ……んんっ<emoji=heart04>\u3000気持ちいいっ、そこすごく、いい、ですっ、あ、あ、あ、ぅうぅっ<emoji=heart04><emoji=heart04>」"
translation = "「으으음~…… <emoji=heart04> 아아, 아, 아아…… 으음 <emoji=heart04> 기분 좋아, 거기 너무, 좋아, 요, 아, 아, 아, 우우우 <emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「経験、したことないようなっ……強い快感が来てますっ、会長、奥、こんなに気持ちいいの、し、知らなかったですっ……<emoji=heart04>」"
translation = "「경험해 본 적 없는…… 강한 쾌감이 오고 있어요, 회장님, 안쪽, 이렇게 기분 좋은 거, 몰, 몰랐어요…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「あ、ぁあ、あぁあっ！\u3000んん、ふぅっ、んぁ、ぁああっ<emoji=heart04><emoji=heart04>」"
translation = "「아, 아아, 아아아앗! 으음, 후우, 응아, 아아아 <emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "射精する前にもう一度キスがしたい。シュティレの体を引き寄せて、突き上げながら口付け。"
translation = "사정하기 전에 다시 한번 키스를 하고 싶다. 슈틸레의 몸을 끌어당겨, 쳐올리면서 입맞춤."

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「んんうっ<emoji=heart04><emoji=heart04>\u3000んむっ、ちゅる、んれぇっ、れろっ、んちゅるるっ、れぇえっ、れろ、んちゅぅう、ちゅぱっ、れろぉっ<emoji=heart04>」"
translation = "「으음욱 <emoji=heart04><emoji=heart04> 음뭇, 츄르, 응레에, 레로, 음츄르르, 레에에, 레로, 음츄우우, 츄파, 레로오 <emoji=heart04>」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「んちゅぅ、んむむむっ<emoji=heart04>\u3000れぇ、れろ<emoji=heart04>\u3000会長っ……そんな、口の中を、かき混ぜながらっ、んんっ……チ○ポダメ、れすっ……れちゅぅ<emoji=heart04>」"
translation = "「음츄우, 음무무무 <emoji=heart04> 레에, 레로 <emoji=heart04> 회장님…… 그렇게, 입안을, 휘저으면서, 으음…… 자지 안 돼여…… 레츄우 <emoji=heart04>」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「んむちゅっ、んちゅるるっ、れるれるっ、感じすぎてっ、私、んぅっ、も、もぅっ……ちゅうる、達して、しまいまっ……んんぅう！」"
translation = "「음무츄, 음츄르르, 레를레를, 너무 느껴서, 저, 응…… 이, 이제…… 츄우르, 가버릴 거 가타…… 으으응!」"

[[dialogue]]
speaker = "unk"
original = "俺がまだ射精していないから、シュティレはイクのを我慢しているみたいだった。"
translation = "내가 아직 사정하지 않았기에, 슈틸레는 가버리는 걸 참고 있는 모양이었다."

[[dialogue]]
speaker = "unk"
original = "絶頂を何とかこらえようと悶えながら、それでも俺の求めに応じて舌を絡めてくるシュティレが、愛おしい。"
translation = "절정을 어떻게든 견디려고 몸부림치면서도, 여전히 나의 요구에 응해 혀를 얽어오는 슈틸레가, 사랑스럽다."

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「んん、んぅうっ！\u3000んれぇっ、れるっ、んむちゅ、ちゅう、れりゅるっ、れろれろっ……んちゅぅ、ちゅるっ<emoji=heart04>」"
translation = "「으음, 응으으! 응레에, 레를, 음무츄, 츄우, 레류르, 레로레로…… 음츄우, 츄릅 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "だけど──そろそろ、俺も限界だ。名残惜しいけれど全力のピストンをする時にキスは難しい。"
translation = "하지만── 슬슬, 나도 한계다. 아쉽지만 전력으로 피스톤을 할 때 키스는 어렵다."

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「んちゅるるっ……ぷぁあっ……<emoji=heart04><emoji=heart04>」"
translation = "「음츄르르…… 푸하앗…… <emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "シュティレとの深いキスを取りやめて、全力でラストスパート。"
translation = "슈틸레와의 깊은 키스를 멈추고, 전력으로 라스트 스퍼트."

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「あっあっあっあっあっっ<emoji=heart04>\u3000はぁっ、うぁっ<emoji=heart04>\u3000んんぁっ<emoji=heart04>\u3000あ、ぁ、あぁあ、んん、ぁあんっ<emoji=heart04>\u3000チ○ポ、激しっ、あ、ぁ、あああっ<emoji=heart04>」"
translation = "「앗앗앗앗앗앗 <emoji=heart04> 하아, 우아 <emoji=heart04> 응아아 <emoji=heart04> 아, 아, 아아아, 으음, 아아앙 <emoji=heart04> 자지, 격렬해, 아, 아, 아아앗 <emoji=heart04>」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「チ○ポが太く、熱くっ……これは、会長の射精の予兆っ、もうすぐ、射精が始まることを確認っ……あ、あぁっ、んっんっ、んんんぅっ<emoji=heart04>」"
translation = "「자지가 굵고, 뜨겁게…… 이건, 회장님의 사정 전조, 곧, 사정이 시작될 것을 확인…… 아, 아아, 응응, 으으으응 <emoji=heart04>」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「会長、射精の際はっ<emoji=heart04>\u3000どうか抜かず、そのままっ……シュティレのおま○こに、お出しくださいっ……<emoji=heart04>」"
translation = "「회장님, 사정할 때는 <emoji=heart04> 부디 빼지 말고, 그대로…… 슈틸레의 보지에, 내보내 주세요…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "言われなくても、ここまで来て止まれるわけがない。ピストンをどんどん強めていく。"
translation = "말하지 않아도, 여기까지 와서 멈출 수 있을 리가 없다. 피스톤을 점점 강하게 해간다."

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「んっんっんっんっんっ<emoji=heart04>\u3000あっあっあっあっあっ、ぁあああっ<emoji=heart04>\u3000出してっ、出してくださいっ、会長、ぜんぶ出してっ……！」"
translation = "「응응응응응 <emoji=heart04> 앗앗앗앗앗, 아아아앗 <emoji=heart04> 내줘, 내보내 주세요, 회장님, 전부 내보내 줘……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「好きだっ……シュティレ！」"
translation = "「좋아해…… 슈틸레!」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「私もっ<emoji=heart04>\u3000私も、あなたのことがっ──好き、好き好きっ──大好きですっ……ぁ、あぁ、あぁぁあぁっ──<emoji=heart04><emoji=heart04>」"
translation = "「저도 <emoji=heart04> 저도, 당신을── 좋아해, 좋아해 좋아해── 너무 좋아해요…… 아, 아아, 아아아아아── <emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「イクっ<emoji=heart04>\u3000イク、イク、イクっ──イクぅうぅぅうっ<emoji=heart04>」"
translation = "「가버려 <emoji=heart04> 가, 가, 가── 가버려어어어어엇 <emoji=heart04>」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「ふわぁぁぁぁぁあああああぁあ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후와아아아아아아아아아아아아아아아앙～～～ <emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「んんっ……はぁっ……ふぅうっ……んんんっ<emoji=heart04><emoji=heart04>\u3000出てますっ……熱い精液が、んんっ、たっぷり、出ていますっ……<emoji=heart04>」"
translation = "「으음…… 하아…… 후우…… 으으음 <emoji=heart04><emoji=heart04> 나오고 있어요…… 뜨거운 정액이, 으음, 듬뿍, 나오고 있어요…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「はぁ、ぁっ、んんぁああっ……たくさん出て……あ、あぁっ……止まりませ、んっ……会長の、射精っ……あぁあぁぁっ<emoji=heart04>」"
translation = "「하아, 아, 응아아아…… 잔뜩 나와서…… 아, 아아…… 멈추지, 않아요…… 회장님의, 사정…… 아아아아아 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "滅多に見ることのできないシュティレのとろけた顔。ふやけた声。"
translation = "좀처럼 볼 수 없는 슈틸레의 녹아버린 얼굴. 풀린 목소리."

[[dialogue]]
speaker = "unk"
original = "俺の興奮を高めるスパイスがたっぷりで、普段の倍以上もドクドクと、大量の射精を放っていた──"
translation = "내 흥분을 높이는 스파이스가 듬뿍이라, 평소의 배 이상이나 울컥울컥하고, 대량의 사정을 쏟아내고 있었다──"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「んんぅっ……ふぅうっ……ふぅうーっ……はぁあーっ……<emoji=heart04>」"
translation = "「으으음…… 후우우…… 후우우──…… 하아아──…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「会長のチ○ポ、からの……射精が止まったことを、確認……しました……<emoji=heart04>」"
translation = "「회장님의 자지에서…… 사정이 멈춘 것을, 확인…… 했습니다…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「過去の射精データと、比較して……はぁあっ……<emoji=heart04>\u3000本日の射精は、一番の量であると、断定……<emoji=heart04>」"
translation = "「과거의 사정 데이터와, 비교해서…… 하아아…… <emoji=heart04> 오늘의 사정은, 최고의 양이라고, 단정…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「不思議、です……騎乗位も、キスも……何度も経験していた、はずなのですが……」"
translation = "「이상, 해요…… 기승위도, 키스도…… 몇 번이나 경험했었을, 터인데……」"

[[dialogue]]
speaker = "unk"
original = "セックスの途中から、シュティレの無表情が緩み、可愛い喘ぎ声も相まって興奮してしまったことを告げる。"
translation = "섹스 도중부터, 슈틸레의 무표정이 풀리고, 귀여운 신음도 곁들여져 흥분해 버렸다는 것을 전한다."

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「……なる、ほど。普段とは違う、ギャップ……でしょうか？\u3000男性は、色々なことがセックスの快感につながると、聞いたことが……」"
translation = "「……과연, 그렇군요. 평소와는 다른, 갭……일까요? 남성은, 여러 가지 일이 섹스의 쾌감으로 이어진다고, 들었습니다만……」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「では今後は、無表情セックスと……快感でふやけたトロ顔セックス」"
translation = "「그럼 앞으로는, 무표정 섹스와…… 쾌감으로 풀어진 흐물흐물한 얼굴 섹스」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「色々なパターンを試し、さらなる快感を模索することにいたしましょう。シュティレの色々な表情、見せられるように頑張ります」"
translation = "「여러 패턴을 시도하며, 한층 더한 쾌감을 모색하도록 합시다. 슈틸레의 여러 표정, 보여드릴 수 있도록 노력하겠습니다」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「私、こう見えて意外と……尽くすタイプ、ですので<emoji=heart04>」"
translation = "「저, 이래 보여도 의외로…… 헌신하는 타입, 이니까요 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "絶頂の余韻でふやけたまま、シュティレは微笑むのだった。"
translation = "절정의 여운으로 풀린 채, 슈틸레는 미소 짓는 것이었다."

