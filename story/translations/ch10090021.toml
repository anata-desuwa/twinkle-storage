[[dialogue]]
speaker = "unk"
original = "第１話,バニーセーラは見せつけたい,P"
translation = "제1화, 바니 세라는 보여주고 싶어, P"

[[dialogue]]
speaker = "ソフィア"
original = "「３と４のフルハウスです」"
translation = "「3과 4의 풀하우스입니다」"

[[dialogue]]
speaker = "unk"
original = "７のスリーカードだ"
translation = "7의 트리플이다"

[[dialogue]]
speaker = "ルリエル"
original = "「ふっふっふ、どうやらわたしの連敗記録もここでストップのようですね！\u3000８のフォーカードです！」"
translation = "「훗훗훗, 아무래도 저의 연패 기록도 여기서 멈추는 모양이군요! 8의 포카드입니다!」"

[[dialogue]]
speaker = "セーラ"
original = "「悪いね、ルリちー♪\u3000ストレートフラッシュ♪」"
translation = "「미안하네, 루리치~♪ 스트레이트 플러시♪」"

[[dialogue]]
speaker = "ルリエル"
original = "「へぇぁっ！？\u3000絶対イカサマですよぉ！\u3000５枚交換でストフラなんて出来すぎてますぅ～！」"
translation = "「헤에아!? 절대 사기예요! 5장 교환해서 스트플이라니 너무 말이 안 된다구요~!」"

[[dialogue]]
speaker = "セーラ"
original = "「いやいや今回はホントに勝たせてあげようとしたんだよ～？\u3000んでも５枚引いたら揃っちゃったもんでさー」"
translation = "「아니 아니 이번엔 정말로 이기게 해주려고 했다니까~? 근데 5장 뽑으니까 맞춰져 버려서 말이야~」"

[[dialogue]]
speaker = "ソフィア"
original = "「なんという豪運……。またセーラ先輩の一人勝ちですか……」"
translation = "「이 무슨 강운……. 또 세라 선배의 독식입니까……」"

[[dialogue]]
speaker = "ルリエル"
original = "「っっ！\u3000わかりました！\u3000そのデッカいおっぱいの中にカードを隠していたんですね！\u3000ズルい！\u3000このおっぱいオバケ～！」"
translation = "「윽윽! 알겠습니다! 그 커다란 가슴 속에 카드를 숨기고 있었던 거군요! 치사해! 이 가슴 괴물~!」"

[[dialogue]]
speaker = "セーラ"
original = "「いやおっぱいオバケならもっと上がいるっしょ。てかズルなんてしてないよね～、会長さん？\u3000どこにもカードなんか挟まってないよね？」"
translation = "「아니 가슴 괴물이라면 더 위가 있잖아. 그보다 속임수 같은 거 안 썼지~, 회장님? 어디에도 카드 같은 거 안 끼어있지?」"

[[dialogue]]
speaker = "unk"
original = "み、見当たりませんね……"
translation = "보, 보이지 않네요……"

[[dialogue]]
speaker = "セーラ"
original = "「え～？\u3000そんなんでホントにわかるの～？\u3000もっと……ん<emoji=heart04>\u3000中を調べてみないとわかんなくない……？」"
translation = "「에~? 그런 걸로 정말 알 수 있어~? 좀 더…… 응<emoji=heart04> 안을 조사해보지 않으면 모르지 않아……?」"

[[dialogue]]
speaker = "セーラ"
original = "「ほーら<emoji=heart04>\u3000ねぇ……確かめてみてよ？」"
translation = "「봐아<emoji=heart04> 응…… 확인해봐?」"

[[dialogue]]
speaker = "ソフィア"
original = "「……これはエリス先輩を呼んだ方が良いのでしょうか。風紀が乱れに乱れています」"
translation = "「……이건 에리스 선배를 부르는 게 좋을까요. 풍기가 문란해질 대로 문란해져 있습니다」"

[[dialogue]]
speaker = "ルリエル"
original = "「ハレンチですぅ！\u3000神聖な星徒会室でイチャつかないでください！」"
translation = "「파렴치해요! 신성한 성도회실에서 꽁냥거리지 말아 주세요!」"

[[dialogue]]
speaker = "セーラ"
original = "「あはは、落ち着いて落ち着いて。うちらのラブラブっぷりをちょっち見せつけてるだけじゃん♪」"
translation = "「아하하, 진정해 진정해. 우리들의 러브러브한 모습을 살짝 보여주고 있는 것뿐이잖아♪」"

[[dialogue]]
speaker = "ルリエル"
original = "「確信犯でした！？」"
translation = "「확신범이었나요!?」"

[[dialogue]]
speaker = "ソフィア"
original = "「付き合わされるこちらの身にもなっていただきたいのですが……」"
translation = "「어울려야 하는 이쪽 입장도 생각해주셨으면 합니다만……」"

[[dialogue]]
speaker = "セーラ"
original = "「恋せよ乙女ってゆー先輩からのエールだよ♪\u3000２人も早く恋人作った方がいいよ～？\u3000恋は女の子を何倍も可愛くするから♪」"
translation = "「사랑하라 소녀여, 라는 선배의 응원이야♪ 둘도 빨리 애인 만드는 게 좋아~? 사랑은 여자애를 몇 배나 귀엽게 만드니까♪」"

[[dialogue]]
speaker = "ソフィア"
original = "「余計なお気遣いありがとうございます。たとえ彼氏を作っても節度はしっかり弁えるべきだと強く学びました」"
translation = "「과분한 배려 감사합니다. 설령 남자친구를 사귀더라도 절도는 확실히 지켜야 한다고 뼈저리게 배웠습니다」"

[[dialogue]]
speaker = "ルリエル"
original = "「やっぱり手とかもう繋いでるんですかねっ？\u3000すごくハレンチですぅ、エッチですぅ！\u3000ハっ、ま、まさかキスなんかも……！」"
translation = "「역시 손이라든가 벌써 잡고 있는 거겠죠? 너무 파렴치해요, 야해요! 하, 서, 설마 키스 같은 것도……!」"

[[dialogue]]
speaker = "セーラ"
original = "「あはは、ルリちーはホント初心だね～？\u3000その程度のことで顔真っ赤にしちゃって」"
translation = "「아하하, 루리치는 정말 순진하네~? 그 정도 일로 얼굴이 새빨개져서는」"

[[dialogue]]
speaker = "ルリエル"
original = "「恋愛上級者オーラ半端ないですぅ！？\u3000いったい２人で何をしてるんですかぁ～！？」"
translation = "「연애 상급자 오라가 장난 아니에요!? 도대체 둘이서 뭘 하고 있는 건가요~!」"

[[dialogue]]
speaker = "ソフィア"
original = "「ルリ、冷静に。ビークール。このままではセーラ先輩の思う壺です」"
translation = "「루리, 냉정해져. 비 쿨. 이대로는 세라 선배의 의도대로예요」"

[[dialogue]]
speaker = "ソフィア"
original = "「きっとセーラ先輩もこう見えて照れているんですよ。ほら思い出してください、会長さんが来る前のことを」"
translation = "「분명 세라 선배도 이렇게 보여도 수줍어하고 있을 거예요. 자, 기억해내 보세요, 회장님이 오기 전의 일을」"

[[dialogue]]
speaker = "セーラ"
original = "「えっ、あっ、ちょっ、ソフィアちゃん……！？」"
translation = "「엣, 앗, 잠깐, 소피아짱……!?」"

[[dialogue]]
speaker = "ソフィア"
original = "「とてもソワソワしていたではありませんか。会長さんの気を引こうとわざわざ制服からバニースーツに着替えたりもして」"
translation = "「엄청 안절부절못하고 있지 않았나요. 회장님의 관심을 끌려고 일부러 교복에서 바니 슈트로 갈아입기까지 하고」"

[[dialogue]]
speaker = "セーラ"
original = "「っっ。べ、別にそういうんじゃないって。カジノのバイト終わって以来、中々バニー着る機会もなかったからせっかくだしと思って……！」"
translation = "「윽. 딱, 딱히 그런 거 아니라니까. 카지노 알바 끝난 이후로 좀처럼 바니 입을 기회도 없었으니까 이왕이면 싶어서……!」"

[[dialogue]]
speaker = "ルリエル"
original = "「ややっ！\u3000セーラ先輩のお顔がレッドアップルになってます！\u3000なるほど、先輩の赤裸々なところを会長さんに伝えて、居たたまれなくする作戦ですね！」"
translation = "「야얏! 세라 선배의 얼굴이 레드 애플이 됐어요! 과연, 선배의 적나라한 부분을 회장님께 전해서, 몸 둘 바를 모르게 만드는 작전이군요!」"

[[dialogue]]
speaker = "ソフィア"
original = "「ふふ、すごく可愛かったですよ。会長さんを待っている時のセーラ先輩。時計をチラチラ何度も確認して。かと思えば立ち上がって無意味にうろうろして」"
translation = "「후후, 무척 귀여웠어요. 회장님을 기다릴 때의 세라 선배. 시계를 힐끔힐끔 몇 번이나 확인하고. 그러다가 일어서서 의미 없이 서성거리고」"

[[dialogue]]
speaker = "セーラ"
original = "「っっ。か、会長さん、これはねっ？\u3000ソフィアちゃんが言ってることは、そのっ……！」"
translation = "「윽. 회, 회장님, 이건 말이지? 소피아짱이 말하는 건, 그게……!」"

[[dialogue]]
speaker = "ルリエル"
original = "「セーラ先輩がたじたじですぅ～！\u3000こんな先輩初めて見ましたよぉ～！\u3000ソフィア、もっとやっちまいましょう！」"
translation = "「세라 선배가 쩔쩔매고 있어요~! 이런 선배 처음 봤어요~! 소피아, 더 해버리자구요!」"

[[dialogue]]
speaker = "ソフィア"
original = "「ええ、たっぷり悶え苦しんでください。彼氏いない勢の前で幸せっぷりを見せつけるのが悪いんです」"
translation = "「네, 듬뿍 괴로워해 주세요. 남자친구 없는 사람들 앞에서 행복한 모습을 과시한 게 잘못이에요」"

[[dialogue]]
speaker = "セーラ"
original = "「あ、あう……。やっぱしうち、いつもと様子違ったかな……？」"
translation = "「아, 아우……. 역시 나, 평소랑 모습이 달랐나……?」"

[[dialogue]]
speaker = "ソフィア"
original = "「はい。それはもう。ふふふ、会長さんのことがよっぽどお好きなんですね？\u3000ポーカーを始めたのも少しでも長く一緒にいるためだったのでは？」"
translation = "「네. 아주 많이요. 후후후, 회장님을 어지간히 좋아하시나 보네요? 포커를 시작한 것도 조금이라도 오래 같이 있기 위해서였던 거 아닌가요?」"

[[dialogue]]
speaker = "ルリエル"
original = "「会長さんが来る前からラブラブオーラ全開でしたもんねぇ～！\u3000鏡の前であれこれセクシーなポーズも決めてましたよぉ！\u3000とっても愛らしかったですぅ～！」"
translation = "「회장님이 오기 전부터 러브러브 오라 전개였으니까요~! 거울 앞에서 이것저것 섹시한 포즈도 취하고 있었고요! 무척 사랑스러웠답니다~!」"

[[dialogue]]
speaker = "セーラ"
original = "「……っぱし……」"
translation = "「……역시……」"

[[dialogue]]
speaker = "ソフィア"
original = "「へ……？」"
translation = "「헤……?」"

[[dialogue]]
speaker = "セーラ"
original = "「やっぱし、そーだった～？\u3000そら見なよ、恋は女の子を魅力的にするんだーって♪\u3000２人も恋した方がいいよ～♪」"
translation = "「역시, 그랬어~? 거봐, 사랑은 여자애를 매력적으로 만든다니까~♪ 둘도 사랑하는 게 좋아~♪」"

[[dialogue]]
speaker = "ソフィア"
original = "「ぐっ……！？\u3000全然照れていません……！\u3000まさか先程までの焦った姿は演技だったのですか……！？」"
translation = "「윽……!? 전혀 부끄러워하지 않아요……! 설마 방금 전까지 당황하던 모습은 연기였나요……!?」"

[[dialogue]]
speaker = "unk"
original = "お、俺のためにセーラさんがそんなことを……"
translation = "나, 나를 위해서 세라 씨가 그런 짓을……"

[[dialogue]]
speaker = "ルリエル"
original = "「むしろ会長さんの方が照れちゃってますぅ！\u3000感極まってセーラ先輩への好感度が上がりまくってる顔してますよぉ～！」"
translation = "「오히려 회장님이 더 부끄러워하고 있어요~! 감격해서 세라 선배에 대한 호감도가 마구 올라가고 있는 얼굴이라구요~!」"

[[dialogue]]
speaker = "セーラ"
original = "「も～彼氏と会うのに気合い入れるのなんて当たり前じゃん<emoji=heart04>\u3000好きな人には会うたび可愛いって思ってもらいたいもん……<emoji=heart04>」"
translation = "「정말~ 남자친구랑 만나는데 기합 넣는 건 당연하잖아<emoji=heart04> 좋아하는 사람에겐 만날 때마다 귀엽다고 생각되고 싶은걸……<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「バニーだって着ちゃうし……ソワソワもするよ？\u3000ドキドキしてもらいたくって、セクシーポーズの練習だってしちゃうってば……<emoji=heart04>」"
translation = "「바니걸 복장까지 입어버리고…… 안절부절못하기도 한다구? 두근거려 줬으면 해서, 섹시 포즈 연습까지 해버린단 말이야……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "セーラさん……！"
translation = "세라 씨……!"

[[dialogue]]
speaker = "セーラ"
original = "「えへへ、ぎゅ～……<emoji=heart04>\u3000ん、ちゅ……<emoji=heart04>\u3000帰ったら、もっともーっとイチャイチャしちゃおうね<emoji=heart04>」"
translation = "「에헤헤, 꼬옥~……<emoji=heart04> 응, 츄……<emoji=heart04> 집에 가면, 더어~욱 더 꽁냥꽁냥하자<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「はわわっ、チューしてますよ、チュー！\u3000舌までぺろぺろ絡ませちゃってますよぉ～！？」"
translation = "「하와와, 키스하고 있어요, 키스! 혀까지 낼름낼름 섞어버리고 있다구요~!」"

[[dialogue]]
speaker = "ソフィア"
original = "「……どうやら見事に使われてしまったようですね。より２人でラブラブ、イチャイチャするための前振りに……まるでポーカーみたいです」"
translation = "「……아무래도 멋지게 이용당한 모양이네요. 둘이서 더 러브러브, 꽁냥꽁냥하기 위한 밑밥으로…… 마치 포커 같네요」"

[[dialogue]]
speaker = "セーラ"
original = "「ふふ、んじゃもう一勝負といこ<emoji=heart04>\u3000次も勝ったら～、うちの好きなとこ１０個ゆって<emoji=heart04>\u3000後輩たちに聞こえるくらい、大きな声で、ね？」"
translation = "「후후, 그럼 한 판 더 승부할까<emoji=heart04> 다음에도 이기면~ 내 좋은 점 10가지 말해줘<emoji=heart04> 후배들에게 들릴 정도로 커다란 목소리로, 알았지?」"

