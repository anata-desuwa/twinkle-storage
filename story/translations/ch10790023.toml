[[dialogue]]
speaker = "unk"
original = "第３話,働くパテルちゃん,P"
translation = "제3화, 일하는 파텔 짱, P"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「いらっしゃ～い♪\u3000海の家へようこそ～♪」"
translation = "「어서 와~♪ 바다의 집에 온 걸 환영해~♪」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「あ、驚いてる驚いてる。どうしてあたしがここで働いてるんだって思ったでしょ？」"
translation = "「아, 놀라고 있다 놀라고 있어. 어째서 내가 여기서 일하고 있나 생각했지?」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ほら、この前パテルストーンの件で迷惑かけちゃったでしょ？\u3000だからリップルにお詫びをしたいって話をしてさ」"
translation = "「봐봐, 저번에 파텔 스톤 건으로 폐를 끼쳤잖아? 그래서 리플에게 사과를 하고 싶다고 이야기했거든.」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「リップルは別にいいって言ってくれたんだけど、海の家が人手不足って聞いて、こっちを手伝うことになったんだ」"
translation = "「리플은 딱히 괜찮다고 해줬지만, 바다의 집이 일손 부족이라고 들어서, 이쪽을 돕기로 했어.」"

[[dialogue]]
speaker = "unk"
original = "マグダレナさんのバイトは笑ってたのに"
translation = "막달레나 씨의 아르바이트는 비웃었으면서."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「そりゃ世界の摂理を守る守護天使がティッシュ配りなんてしてたら、やることにギャップがありすぎるからね」"
translation = "「그야 세계의 섭리를 지키는 수호천사가 전단지나 돌리고 있으면, 하는 일에 갭이 너무 크니까 말이야.」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「でもあたしは借りは返す主義だから。迷惑をかけた分はちゃんと役に立つよ」"
translation = "「하지만 나는 빚은 갚는 주의니까. 폐를 끼친 만큼 제대로 도움이 될 거야.」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「というわけでドンドン注文してね、お客さん♪」"
translation = "「그런 고로 팍팍 주문해줘, 손님♪」"

[[dialogue]]
speaker = "unk"
original = "じゃあ焼きそばで"
translation = "그럼 야키소바로."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「は～い、焼きそば１つね。パテルりょーかい！」"
translation = "「네~에, 야키소바 하나. 파텔 확인!」"

[[dialogue]]
speaker = "unk"
original = "待つことしばらく──"
translation = "잠시 기다리자──"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「は～い、焼きそばお待ちどうさま～」"
translation = "「네~에, 야키소바 오래 기다리셨습니다~」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「どう？\u3000パテルちゃんの焼きそば美味しい？」"
translation = "「어때? 파텔 짱의 야키소바 맛있어?」"

[[dialogue]]
speaker = "unk"
original = "うん、美味しいよ"
translation = "응, 맛있어."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ならよかった。あたしは運んできただけだけどね♪」"
translation = "「그럼 다행이네. 나는 나르기만 했을 뿐이지만♪」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「おっと、お客さん来てるから行かなきゃ」"
translation = "「앗, 손님 왔으니까 가봐야겠다.」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「いらっしゃいませ～。来てくれて嬉しいな♪」"
translation = "「어서 오세요~. 와줘서 기뻐♪」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ご注文は……うんうん、ラーメンとカレーだね。おふたりさんならフライドポテトもオススメだけどどーする？」"
translation = "「주문은…… 응응, 라멘이랑 카레네. 두 분이라면 감자튀김도 추천하는데 어떡할래?」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「フライドポテトも追加？\u3000りょ～か～いっ」"
translation = "「감자튀김도 추가? 화~아인!」"

[[dialogue]]
speaker = "unk"
original = "的確に注文を取ったかと思えば……"
translation = "정확하게 주문을 받나 싶더니……"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「お待たせー。チャーシュー麺、いっちょあがりっ。熱いから気を付けてね」"
translation = "「오래 기다렸어. 차슈멘, 하나 완성. 뜨거우니까 조심해.」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ビーチパラソルの貸し出し？\u3000もちろんやってるよ。向こうの方で受け付けてるからね」"
translation = "「비치 파라솔 대여? 물론 하고 있지. 저쪽에서 접수하고 있으니까 말이야.」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「あ、お客さんお帰り？\u3000ありがと～、また来てね♪」"
translation = "「아, 손님 가시게? 고마워~, 또 와♪」"

[[dialogue]]
speaker = "unk"
original = "配膳をそつなくこなしつつ、客への案内や、見送りもしている。"
translation = "서빙을 능숙하게 해내면서도, 손님 안내나 배웅도 하고 있다."

[[dialogue]]
speaker = "unk"
original = "慣れないバイトに苦戦するかと思いきや、パテルは器用にこなしていた。"
translation = "익숙지 않은 알바에 고전할 줄 알았더니, 파텔은 능숙하게 해내고 있었다."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「そろそろ落ち着き……ってあれ！？\u3000お客さん増えてるっ！？」"
translation = "「슬슬 진정…… 어라!? 손님이 늘었어!?」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「え？\u3000かわいい店員さんがいるって噂になってる？\u3000そっかそっか、あたしのぷりちーさなら仕方ないね～……」"
translation = "「에? 귀여운 점원이 있다고 소문이 났어? 그렇구나 그렇구나, 나의 프리티함이라면 어쩔 수 없네~……」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「──って、ええぇっ！？\u3000人手が足りないから手伝ってるのに、お客さん増えたら意味ないじゃんっ！？」"
translation = "「──라니, 에에엑!? 일손이 부족해서 돕고 있는데, 손님이 늘어나면 의미 없잖아!?」"

[[dialogue]]
speaker = "unk"
original = "俺も手伝うよ"
translation = "나도 도울게."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「いいの？\u3000だけどリップルへのお詫びでやってるのに、魔王に手伝ってもらったら意味ないような……」"
translation = "「괜찮아? 하지만 리플에게 사과하려고 하는 건데, 마왕이 도와주면 의미가 없는 것 같은……」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「いや、そんなこと言ってる場合じゃないね。お願い、力を貸して」"
translation = "「아니, 그런 말 하고 있을 때가 아니네. 부탁해, 힘을 빌려줘.」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「は～……やっと落ち着いた……働くのって大変なんだね……。手伝ってくれてありがと、魔王」"
translation = "「하아~…… 겨우 진정됐다…… 일하는 건 힘든 거구나……. 도와줘서 고마워, 마왕.」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「いや～、魔王の働きっぷりはすごかったね。百戦錬磨のバイト戦士の力を見せてもらったよ。ラクシャも同じくらいバイトしてたんだからすごいなぁ～……」"
translation = "「이야~, 마왕의 일 솜씨는 대단했어. 백전노장 알바 전사의 힘을 봤다구. 락샤도 이 정도로 알바했었다니 대단하네~……」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「んじゃ休憩しよ。何か海の家っぽいもの食べたいな～……」"
translation = "「그럼 휴식하자. 뭔가 바다의 집 같은 걸 먹고 싶은데~……」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「そうだ、かき氷にしよっと。リゾート結界は一年中かき氷食べられるからいいよね」"
translation = "「맞다, 빙수로 하자. 리ゾート 결계는 일 년 내내 빙수를 먹을 수 있으니까 좋네.」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「魔王も一緒にかき氷食べる？\u3000じゃあお互い別の味にしようよ」"
translation = "「마왕도 같이 빙수 먹을래? 그럼 서로 다른 맛으로 하자.」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「あたしは～……イチゴ味！\u3000魔王は……キウイ味にした？\u3000へ～、そんなのもあるんだ。シロップもちゃんとキウイの色してるね」"
translation = "「나는~…… 딸기 맛! 마왕은…… 키위 맛으로 했어? 헤~, 그런 것도 있구나. 시럽도 제대로 키위 색을 띠고 있네.」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「それじゃ──」"
translation = "「그러면──」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「かき氷食べさせて、おにーさん<emoji=heart04>」"
translation = "「빙수 먹여줘, 오빠<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「あ～んっ。ん～っ、ちべたくておいしー♪\u3000キウイ味も甘酸っぱくて美味しいね♪」"
translation = "「아~앙. 음~, 차가워서 맛있어♪ 키위 맛도 새콤달콤해서 맛있네♪」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「それじゃあたしはイチゴ味食べさせてあげる。はい、あ～ん」"
translation = "「그러면 나는 딸기 맛 먹여줄게. 자, 아~앙.」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「……どう？\u3000美味しい？」"
translation = "「……어때? 맛있어?」"

[[dialogue]]
speaker = "unk"
original = "王道の味で美味しい"
translation = "왕도의 맛이라 맛있어."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「へ～、これが王道の味なんだ。あたしも食べてみよっと。あむっ」"
translation = "「헤~, 이게 왕도의 맛이구나. 나도 먹어봐야지. 냠.」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ん～っ！？\u3000キーンってきた！\u3000これが例のやつかー」"
translation = "「음~!? 찡해졌어! 이게 그건가~」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「でもイチゴ味、すっごく甘いね。確かにこれは王道の味かも」"
translation = "「하지만 딸기 맛, 정말 달콤하네. 확실히 이건 왕도의 맛일지도.」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ん？\u3000どうしたの？\u3000……間接キス？」"
translation = "「응? 왜 그래? ……간접 키스?」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「へ～、魔王ってば気にしちゃうんだぁ～……かわいいとこあるなぁ」"
translation = "「헤~, 마왕은 그런 걸 신경 쓰는구나~…… 귀여운 구석이 있네.」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「それじゃあたしのかき氷、もっと食べさせてあげる♪\u3000だから魔王のかき氷も食べさせてね♪」"
translation = "「그러면 내 빙수, 더 먹여줄게♪ 그러니까 마왕 빙수도 먹여줘♪」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「はい、あ～ん♪」"
translation = "「자, 아~앙♪」"

