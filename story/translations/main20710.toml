[[dialogue]]
speaker = "unk"
original = "第１０話,破壊の爪痕,B"
translation = "제10화, 파괴의 흔적, B"

[[dialogue]]
speaker = "unk"
original = "俺とヴィーナスもデネブの街に繰り出したのだが──"
translation = "나와 비너스도 데네브의 거리로 나섰는데──"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「本当に誰も見向きもしないわね。ちゃんと溶けこめているみたいだわ」"
translation = "「정말 아무도 쳐다보지 않네. 제대로 녹아든 모양이야.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。母さんには助けられっぱなしだ」"
translation = "「어. 어머니 덕분에 계속 도움만 받네.」"

[[dialogue]]
speaker = "unk"
original = "母さんの魔法で、周囲からは同年代の一般人に見えているんだとか。"
translation = "어머니의 마법으로, 주변에서는 또래의 평범한 일반인으로 보인다고 한다."

[[dialogue]]
speaker = "unk"
original = "ただし戦うと隠蔽が解除されてしまうので、戦闘は厳禁だと言われている。"
translation = "단, 싸우게 되면 은폐가 해제되어 버리기 때문에, 전투는 엄금이라는 말을 들었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「食料品はここから西のスーパーがいいらしい。でも先に──」"
translation = "「식료품은 여기서 서쪽에 있는 슈퍼가 좋대. 하지만 먼저──」"

[[dialogue]]
speaker = "unk"
original = "目的に向かって歩き出そうとしていると、男の子が向こうから走ってきた。"
translation = "목적지를 향해 걸어가려는데, 남자아이가 저편에서 달려왔다."

[[dialogue]]
speaker_original = "男の子"
speaker_translation = "남자아이"
original = "「わ～～～～っ！！」"
translation = "「와아아아아!!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「おっとっと」"
translation = "「어이쿠.」"

[[dialogue]]
speaker = "unk"
original = "ぶつかってきた男の子を受け止める。普段モンスターと戦ってるから、子どもの突進なんてかわいいものだ。"
translation = "부딪쳐 온 남자아이를 받아낸다. 평소에 몬스터와 싸우고 있으니, 아이의 돌진 정도는 귀여운 수준이다."

[[dialogue]]
speaker = "unk"
original = "男の子を追いかけて、母親らしき若い女性が心配そうに駆けてくる。"
translation = "남자아이를 쫓아서, 어머니로 보이는 젊은 여성이 걱정스러운 듯 달려온다."

[[dialogue]]
speaker_original = "母親"
speaker_translation = "어머니"
original = "「す、すみません！\u3000この子ったら、久しぶりに都会に来て、はしゃいでるみたいで……」"
translation = "「죄, 죄송합니다! 이 아이가 오랜만에 도시에 와서 신이 났는지……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いえ、大丈夫です。子どもは元気なのが仕事ですから」"
translation = "「아뇨, 괜찮습니다. 아이들은 활기찬 게 일이니까요.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「でも危ないから、他の人がいるところで走っちゃダメだよ」"
translation = "「하지만 위험하니까, 다른 사람들이 있는 곳에서 뛰면 안 돼.」"

[[dialogue]]
speaker_original = "男の子"
speaker_translation = "남자아이"
original = "「はーい、ごめんなさーい」"
translation = "「네에, 죄송해여─」"

[[dialogue]]
speaker = "unk"
original = "男の子と母親が手を繋いで、向こうのビルに歩いていく。"
translation = "남자아이와 어머니가 손을 잡고 저편의 빌딩으로 걸어간다."

[[dialogue]]
speaker = "unk"
original = "見えなくなる前に２人でペコリと頭を下げて、ビルの中に消えていった。"
translation = "보이지 않게 되기 전에 두 사람이 꾸벅 고개를 숙이고 빌딩 안으로 사라졌다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ほんとにパパみたいなこと言うのね」"
translation = "「정말 아빠 같은 소리를 하네.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺には大きな娘がいるからな」"
translation = "「나한테는 커다란 딸이 있으니까.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふふ、きっとかわいくて素敵な娘さんに違いないわね♪」"
translation = "「후후, 분명 귀엽고 멋진 따님임이 틀림없겠네♪」"

[[dialogue]]
speaker = "unk"
original = "あえて誰のこととは言わず、笑いながらとぼけ合う。"
translation = "굳이 누구라고 말하지 않고, 웃으며 시치미를 뗀다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「平和だな」"
translation = "「평화롭네.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「平和ねー」"
translation = "「평화롭네─.」"

[[dialogue]]
speaker = "unk"
original = "１０年前にリクリエを乗り越えたこの街は、何者にも脅かされない平穏を享受しているように見える。"
translation = "10년 전에 리크리에를 이겨낸 이 거리는, 그 무엇에게도 위협받지 않는 평온을 누리고 있는 것처럼 보인다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「今は極星学園は敵だけど、デネブだろうと、アルタイルだろうと、やっぱり平和が一番よね」"
translation = "「지금은 극성학원이 적이지만, 데네브든 알타이르든 역시 평화가 제일이야.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。アルタイルもデネブも、両方守りたいな」"
translation = "「어. 알타이르도 데네브도, 양쪽 다 지키고 싶네.」"

[[dialogue]]
speaker = "unk"
original = "俺たちは世界を守るために、誰かの幸せのために戦っている。"
translation = "우리는 세계를 지키기 위해, 누군가의 행복을 위해 싸우고 있다."

[[dialogue]]
speaker = "unk"
original = "平和に暮らしている人々を見ると、そう実感させられるのだった。"
translation = "평화롭게 살아가는 사람들을 보면, 그것을 실감하게 되는 것이었다."

[[dialogue]]
speaker = "unk"
original = "アポロから『一度自分たちの目で見た方がいい』と言われている場所があった。"
translation = "아폴로에게서 『한번 직접 눈으로 보는 게 좋다』는 말을 들은 장소가 있었다."

[[dialogue]]
speaker = "unk"
original = "それは俺とヴィーナスに深く関わる場所で──"
translation = "그곳은 나와 비너스에게 깊이 연관된 장소로──"

[[dialogue]]
speaker = "unk"
original = "破壊の痕が残る教皇庁と、その周辺の広場。"
translation = "파괴의 흔적이 남은 교황청과 그 주변의 광장."

[[dialogue]]
speaker = "unk"
original = "目を覆いたくなる惨状だが、ここで起きたことを思えば、これでもまだ綺麗な方だろう。"
translation = "눈을 돌리고 싶어지는 참상이지만, 여기서 일어난 일을 생각하면 이 정도도 아직 깨끗한 편일 것이다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは目を逸らしそうになるのをこらえて、この光景を目に焼き付けようとしていた。"
translation = "비너스는 눈을 돌리고 싶어지는 것을 참고, 이 광경을 눈에 새기려 하고 있었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（壊れている以外は、アルタイルの教皇庁と変わらないな。だから余計に見るのが苦しいんだけど……）"
translation = "(부서진 것 외에는 알타이르의 교황청과 다르지 않군. 그래서 더 보기가 괴롭지만……)"

[[dialogue]]
speaker = "unk"
original = "市民も観光客も、この辺りを訪れることはないという。"
translation = "시민도 관광객도 이 근처를 찾는 일은 없다고 한다."

[[dialogue]]
speaker = "unk"
original = "流星市国の中心であり、象徴であったこの場所が、まるで存在しないかのように捨て置かれている。"
translation = "유성시국의 중심이자 상징이었던 이곳이, 마치 존재하지 않는 것처럼 버려져 있다."

[[dialogue]]
speaker = "unk"
original = "流星市国やその周辺はビル街のように復興がなされているが、どうしてここだけ廃墟のままなのか。"
translation = "유성시국과 그 주변은 빌딩가처럼 복구가 이루어지고 있는데, 어째서 여기만 폐허인 채인 걸까."

[[dialogue]]
speaker = "unk"
original = "リクリエとの戦いの<ruby>記念碑<rt>モニュメント</rt></ruby>として保存されているわけではない。"
translation = "리크리에와의 싸움의 기념비로서 보존되고 있는 것은 아니다."

[[dialogue]]
speaker = "unk"
original = "それは──"
translation = "그것은──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker = "unk"
original = "空の色が変わる──いや、空が裂けた。"
translation = "하늘의 색이 바뀐다── 아니, 하늘이 찢어졌다."

[[dialogue]]
speaker = "unk"
original = "上空には光すら呑み込む闇が広がっていて、さながらブラックホールだ。"
translation = "상공에는 빛조차 삼키는 어둠이 펼쳐져 있어, 마치 블랙홀 같다."

[[dialogue]]
speaker = "unk"
original = "危険がないように離れているものの、虚空が空気を吸い込んで、唸るような風の音を巻き起こしている。"
translation = "위험하지 않게 떨어져 있음에도 불구하고, 허공이 공기를 빨아들여 울부짖는 듯한 바람 소리를 일으키고 있다."

[[dialogue]]
speaker = "unk"
original = "リクリエによる破壊の余波のようだけど……これをやったのは<b>俺</b>だ。"
translation = "리크리에에 의한 파괴의 여파 같지만…… 이걸 저지른 건 **나**다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「もう少しで勝てそうだったんだが……残念ながら俺はここまでのようだ」"
translation = "「조금만 더 하면 이길 수 있을 것 같았는데…… 아쉽게도 난 여기까지인 모양이다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「<ruby>娘<rt>ヴィーナス</rt></ruby>を頼んだぞ……ラク──」"
translation = "「<ruby>딸<rt>비너스</rt></ruby>을 부탁한다…… 락──」"

[[dialogue]]
speaker = "unk"
original = "デネブの俺は自身を犠牲にアルタイルへの道を開き、ヴィーナスをアルタイルに送り出した。"
translation = "데네브의 나는 자신을 희생해 알타이르로 향하는 길을 열고, 비너스를 알타이르로 보냈다."

[[dialogue]]
speaker = "unk"
original = "しかしその代償として、次元の裂け目が残されてしまった。"
translation = "하지만 그 대가로 차원의 균열이 남겨지고 말았다."

[[dialogue]]
speaker = "unk"
original = "１０年経った今でも不規則に空に穴が空いてしまい、そのせいで教皇庁の復興ができないのだという。"
translation = "10년이 지난 지금도 불규칙하게 하늘에 구멍이 뚫려 버리고, 그 때문에 교황청의 복구를 할 수 없다는 것이다."

[[dialogue]]
speaker = "unk"
original = "ルヴィネの思惑はさておき、元からあった太陽の壁画への信仰と、この惨状があれば、“魔王”が嫌われるのは無理もない。"
translation = "루비네의 의도는 어찌 됐든, 원래부터 있던 태양의 벽화에 대한 신앙과 이 참상을 보면, “마왕”이 미움받는 것도 무리는 아니다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "ここはヴィーナスが実の父を喪った場所。そして自分が送り出された場所。"
translation = "이곳은 비너스가 친아버지를 잃은 장소. 그리고 자신이 보내진 장소."

[[dialogue]]
speaker = "unk"
original = "ヴィーナスにとっての始まりの場所だ。"
translation = "비너스에게 있어서 시작의 장소다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……ねぇ、クロト」"
translation = "「……저기, 쿠로토.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「花を手向けたら、吸い込まれちゃうかしら」"
translation = "「꽃을 바치면, 빨려 들어가 버릴까?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そうだな。きっと吹き飛ばされる」"
translation = "「글쎄. 분명 날아가 버리겠지.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……そうよね」"
translation = "「……그렇겠지.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だから、言いたいことがあるなら言葉にすればいいんじゃないか」"
translation = "「그러니까, 하고 싶은 말이 있다면 말로 하면 되지 않을까?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「きっと伝わるよ。平行世界でも俺は俺だから、保証する」"
translation = "「분명 전해질 거야. 평행세계라도 나는 나니까, 보증할게.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……うん」"
translation = "「……응.」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは虚空の空を見上げ、風にかき消されそうなか細い声で告げる。"
translation = "비너스는 허공의 하늘을 올려다보며, 바람에 지워질 듯한 가느다란 목소리로 고한다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ありがとう、パパ。……ただいま」"
translation = "「고마워, 파파. ……다녀왔어.」"

[[dialogue]]
speaker = "unk"
original = "それでも俺にははっきりと聞こえた。"
translation = "그런데도 나에게는 똑똑히 들렸다."

[[dialogue]]
speaker = "unk"
original = "確かにここは、俺とヴィーナスが来なければいけない場所だった。"
translation = "확실히 이곳은, 나와 비너스가 와야만 하는 장소였다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "やがて時空の穴が閉じ、風も収まった。"
translation = "이윽고 시공의 구멍이 닫히고, 바람도 잦아들었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ヴィーナス、そろそろお腹空かないか？\u3000買い物の前にお昼にしよう」"
translation = "「비너스, 슬슬 배고프지 않아? 쇼핑하기 전에 점심 먹자.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「母さんには外で食べてもいいって言われてるし、どうせならアルタイルにないお店で美味しいもの食べよう」"
translation = "「어머니가 밖에서 먹어도 된다고 하셨고, 이왕이면 알타이르에 없는 가게에서 맛있는 거 먹자.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「いいわね！\u3000新星星徒会のみんなに思い出話しましょ！」"
translation = "「좋아! 신성성도회 모두에게 추억담을 들려주자!」"

