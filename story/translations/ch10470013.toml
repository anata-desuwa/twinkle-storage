[[dialogue]]
speaker = "unk"
original = "第３話,ファンシー・メルトダウン・前編,P"
translation = "제3화, 팬시 멜트다운 전편"

[[dialogue]]
speaker = "unk"
original = "メルエルと再会してから、３か月程経ったある日──"
translation = "메르엘과 재회하고 나서 3개월 정도 지난 어느 날──"

[[dialogue]]
speaker = "メルエル"
original = "「こうやって、何事もない平和な放課後も久しぶりだね～」"
translation = "「이렇게 아무 일도 없는 평화로운 방과 후도 오랜만이네~」"

[[dialogue]]
speaker = "メルエル"
original = "「このところずっと、目まぐるしい忙しさだったよね。星徒会で急ぎの案件が発生したり、出動要請が立て続いたり」"
translation = "「요즘 계속 눈코 뜰 새 없이 바빴잖아. 성도회에서 급한 안건이 발생하거나 출동 요청이 잇따르거나 해서.」"

[[dialogue]]
speaker = "unk"
original = "メルエルが色々と手伝ってくれて、助かったよ"
translation = "메르엘이 여러모로 도와줘서 살았어."

[[dialogue]]
speaker = "メルエル"
original = "「えへへっ。キミに褒められると、嬉しいな♪」"
translation = "「에헤헷. 너한테 칭찬받으니까 기쁘다♪」"

[[dialogue]]
speaker = "メルエル"
original = "「こうして一緒に帰るのも久しぶりで嬉しいし、思わず鼻歌も歌いたくなっちゃうよ♪」"
translation = "「이렇게 같이 하교하는 것도 오랜만이라 기쁘고, 나도 모르게 콧노래가 나올 것 같아♪」"

[[dialogue]]
speaker = "unk"
original = "お礼に何か出来ることはないかな？"
translation = "보답으로 뭔가 해줄 수 있는 건 없을까?"

[[dialogue]]
speaker = "メルエル"
original = "「え？\u3000そ、それってつまり……ご褒美ってこと！？」"
translation = "「어? 그, 그건 그러니까…… 상을 준다는 거야!?」"

[[dialogue]]
speaker = "メルエル"
original = "「だ、だったら私……えっと──」"
translation = "「그, 그렇다면 나…… 저기──」"

[[dialogue]]
speaker = "メルエル"
original = "「会長くんと、『放課後デート』がしてみたい……！」"
translation = "「회장군이랑 『방과 후 데이트』를 해보고 싶어……!」"

[[dialogue]]
speaker = "メルエル"
original = "「その……ダ、ダメ、かな？」"
translation = "「그…… 아, 안 될, 까?」"

[[dialogue]]
speaker = "unk"
original = "今までにもメルエルと出掛けることはあった。……しかし、『デート』とはっきり言われたのはこれが初めてで、俺の方もドギマギしてしまう。"
translation = "지금까지도 메르엘과 외출한 적은 있었다. ……하지만 『데이트』라고 확실히 들은 것은 이번이 처음이라 나도 가슴이 두근거린다."

[[dialogue]]
speaker = "unk"
original = "っ……メルエルが、それでいいのなら……"
translation = "윽…… 메르엘이 그걸로 괜찮다면……"

[[dialogue]]
speaker = "メルエル"
original = "「本当！？\u3000ありがとう、会長くんっ♪」"
translation = "「정말!? 고마워, 회장군♪」"

[[dialogue]]
speaker = "メルエル"
original = "（えへへ。会長くんとのデート、凄く嬉しい……♪）"
translation = "(에헤헤. 회장군과의 데이트, 너무 기뻐……♪)"

[[dialogue]]
speaker = "unk"
original = "俺とメルエルはそのまま『デート』へ出かけることになった。しかし何故か、彼女は口数が少なくて──"
translation = "나와 메르엘은 그대로 『데이트』를 하러 가게 되었다. 하지만 왠지 그녀는 말수가 적었고──"

[[dialogue]]
speaker = "メルエル"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "メルエル"
original = "（うぅ～、せっかくのデートなのに、何故か緊張しちゃって、全然言葉が出てこないよぉ～）"
translation = "(으으~ 모처럼의 데이트인데 왠지 긴장돼서 전혀 말이 안 나와아~.)"

[[dialogue]]
speaker = "unk"
original = "もしかして、緊張……してる？"
translation = "혹시 긴장…… 하고 있어?"

[[dialogue]]
speaker = "メルエル"
original = "「あ……！\u3000う、うん……実は……少し」"
translation = "「아……! 으, 응…… 사실은…… 조금.」"

[[dialogue]]
speaker = "メルエル"
original = "「一緒に出かけたのは、これが初めてじゃないのに、変だよね……あはは」"
translation = "「같이 나간 게 이번이 처음이 아닌데 이상하지…… 아하하.」"

[[dialogue]]
speaker = "unk"
original = "実は……俺も『デート』って言われて、ちょっと緊張してた"
translation = "사실은…… 나도 『데이트』라는 말을 듣고 조금 긴장했어."

[[dialogue]]
speaker = "メルエル"
original = "「そ、そうなの……？\u3000えへっ、えへへ♪」"
translation = "「그, 그래……? 에헷, 에헤헤♪」"

[[dialogue]]
speaker = "メルエル"
original = "（それって会長くんも私のこと……意識、してくれてたってことだよね？）"
translation = "(그건 회장군도 나를…… 의식해주고 있었다는 거지?)"

[[dialogue]]
speaker = "unk"
original = "そんな感じで並んで歩いていたら、ふとした瞬間、メルエルと手が触れてしまう。"
translation = "그런 느낌으로 나란히 걷고 있다가 문득 메르엘과 손이 닿는다."

[[dialogue]]
speaker = "メルエル"
original = "「あっ……ご、ごめんね！\u3000距離、近すぎたかも……」"
translation = "「앗…… 미, 미안해! 거리가 너무 가까웠을지도……」"

[[dialogue]]
speaker = "unk"
original = "い、いや、こちらこそゴメン"
translation = "아, 아니, 나야말로 미안."

[[dialogue]]
speaker = "メルエル"
original = "「って、幼なじみなのにね……手が触れたくらいで、大げさかな……あはは」"
translation = "「그치만 소꿉친구인데 말이야…… 손이 닿은 정도로 호들갑일까…… 아하하.」"

[[dialogue]]
speaker = "メルエル"
original = "「そういえば、昔は遊びに行く時はいつも手を繋いでたりしてたな～。キミは覚えてたりする？」"
translation = "「그러고 보니 옛날에 놀러 갈 때는 항상 손을 잡고 다녔었지~. 너는 기억하고 있어?」"

[[dialogue]]
speaker = "unk"
original = "朧気だけど、手を繋いでた記憶、思い出したかも……"
translation = "어렴풋하지만 손을 잡았던 기억, 떠올랐을지도……"

[[dialogue]]
speaker = "メルエル"
original = "「あっ、思い出してくれた？\u3000あの頃は普通のことだったのにね～……」"
translation = "「앗, 떠올려 줬어? 그때는 당연한 일이었는데 말이야~……」"

[[dialogue]]
speaker = "メルエル"
original = "（あの頃よりも、もっともっと、キミを好きになっちゃったから仕方ないことなんだけど……。気兼ねなく手を繋げないのは少し寂しいかも）"
translation = "(그때보다 훨씬 더 너를 좋아하게 되어버려서 어쩔 수 없는 거지만……. 아무렇지 않게 손을 잡을 수 없는 건 조금 외로울지도.)"

[[dialogue]]
speaker = "unk"
original = "（何も言わず、メルエルと手を繋ぐ）"
translation = "(아무 말 없이 메르엘과 손을 잡는다)"

[[dialogue]]
speaker = "メルエル"
original = "「か、会長くん？\u3000ど、どうしたの？」"
translation = "「회, 회장군? 왜, 왜 그래?」"

[[dialogue]]
speaker = "メルエル"
original = "（うぅぅ～～……っ。嬉しい、けどぉ！\u3000会長くんの手、大きくて、男の人って感じで、ドキドキしちゃうよぉ！）"
translation = "(으으으으~~윽. 기쁘지만! 회장군 손, 크고 남자라는 느낌이라 두근거려 버려어!)"

[[dialogue]]
speaker = "unk"
original = "で、デートだし、普通かなぁって……"
translation = "데, 데이트니까 평범한 걸까 싶어서……"

[[dialogue]]
speaker = "メルエル"
original = "「そ、そっか……デート。……デート、だもんねっ」"
translation = "「그, 그렇구나…… 데이트. ……데이트, 니까.」"

[[dialogue]]
speaker = "メルエル"
original = "（この感じ……懐かしくて胸がいっぱいになる）"
translation = "(이 느낌…… 그리워서 가슴이 벅차올라.)"

[[dialogue]]
speaker = "メルエル"
original = "（手は大きくなったけど、昔と変わらず温かくて、安心する……）"
translation = "(손은 커졌지만 옛날과 변함없이 따뜻해서 안심돼……)"

[[dialogue]]
speaker = "メルエル"
original = "（何より、キミは優しくて……やっぱり好き。大好き♪）"
translation = "(무엇보다 너는 상냥하고…… 역시 좋아해. 정말 좋아♪)"

[[dialogue]]
speaker = "メルエル"
original = "「えへへっ♪\u3000……メルトしちゃいそう<emoji=heart04>」"
translation = "「에헤헤♪ ……멜트해버릴 것 같아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "メルエルは照れたようにはにかみながら、俺の手をそっと握り返すのだった。"
translation = "메르엘은 수줍게 미소 지으며 내 손을 살며시 마주 잡았다."

