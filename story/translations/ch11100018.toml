[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「ん～～～！\u3000いい天気、こんな風にのんびりするのも久しぶりだね～」"
translation = "「음~~~! 날씨 좋다, 이런 식으로 느긋하게 있는 것도 오랜만이네~」"

[[dialogue]]
speaker = "unk"
original = "誰もいない砂浜。ここは地元の人にもあまり知られていない、プトラの秘密の場所らしい。"
translation = "아무도 없는 모래사장. 이곳은 현지인들에게도 잘 알려지지 않은, 푸트라의 비밀 장소인 모양이다."

[[dialogue]]
speaker = "unk"
original = "異世界から戻ってきたプトラから話を聞きながら、２人きりの時間を過ごしていた。"
translation = "이세계에서 돌아온 푸트라에게 이야기를 들으면서, 둘만의 시간을 보내고 있었다."

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「この服に変身してモンスターやクマロボさんたちと戦ったんだ～♪」"
translation = "「이 옷으로 변신해서 몬스터나 곰 로봇 씨들이랑 싸웠다구~♪」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「理由は分からないけど、こっちの世界に戻ってきて力は失っちゃったみたい。でもせっかくだから車掌さんにも見てもらいたくて」"
translation = "「이유는 모르겠지만, 이쪽 세계로 돌아오면서 힘은 잃어버린 것 같아. 하지만 모처럼이니까 차장님에게도 보여주고 싶어서」"

[[dialogue]]
speaker = "unk"
original = "可愛いしよく似合っている、と素直な感想を述べる。"
translation = "귀엽고 잘 어울린다는 솔직한 감상을 말한다."

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「えへへ、ありがとう～、ぎゅーっ<emoji=heart04>」"
translation = "「에헤헤, 고마워~, 꼬옥<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "変わらない明るい笑顔を見せながら、腕に抱き着いてくる。"
translation = "변함없는 밝은 미소를 지으며, 팔에 매달려 온다."

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「あのね……車掌さんと２人きりだから、すっごく甘えたくなっちゃった……いい、かな？」"
translation = "「저기…… 차장님이랑 둘뿐이니까, 엄청 응석 부리고 싶어져 버렸어…… 괜찮을, 까?」"

[[dialogue]]
speaker = "unk"
original = "上目遣いに求めるような視線を送ってくる。"
translation = "치켜뜬 눈으로 갈구하는 듯한 시선을 보내온다."

[[dialogue]]
speaker = "unk"
original = "もちろんそれを拒む理由はなく、プトラを抱きしめて砂浜にもつれるように倒れ込んだ。"
translation = "물론 그것을 거부할 이유는 없었고, 푸트라를 껴안으며 모래사장에 뒤엉키듯 쓰러졌다."

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「誰も来ないって分かってても、やっぱりドキドキしちゃうね……」"
translation = "「아무도 안 온다는 걸 알고 있어도, 역시 두근두근해버리네……」"

[[dialogue]]
speaker = "unk"
original = "誰にも見られる心配はない、とプトラは太鼓判を押していたが、やはりこんな青空の下でするのは緊張感があった。"
translation = "누구에게도 들킬 걱정은 없다고 푸트라는 장담했지만, 역시 이런 푸른 하늘 아래서 하는 것은 긴장감이 있었다."

[[dialogue]]
speaker = "unk"
original = "後ろからプトラの身体を抱きしめながら、こわごわと彼女のお尻から細い腰にかけてを撫で上げる。"
translation = "뒤에서 푸트라의 몸을 끌어안으며, 조심스럽게 그녀의 엉덩이에서 가느다란 허리에 걸쳐 쓸어올린다."

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「あっ……んん……ふふ……くすぐったいよ、車掌さん……んんっ……」"
translation = "「앗…… 응…… 후후…… 간지러워요, 차장님…… 응읏……」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「ん、はぁ……んん……でも……気持ちいい……んんっ……」"
translation = "「응, 하아…… 응…… 하지만…… 기분 좋아…… 응읏……」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「車掌さんの、おっきな手……んんっ……そんな風に、優しく撫でてもらえると……すっごく、落ち着く……」"
translation = "「차장님의, 커다란 손…… 응읏…… 그런 식으로, 상냥하게 쓰다듬어 주면…… 정말, 안심돼……」"

[[dialogue]]
speaker = "unk"
original = "プトラの肌に触れていると、自然にもっと柔らかい部分を求めて手が滑っていく。"
translation = "푸트라의 살결에 닿아있자, 자연스레 좀 더 부드러운 부분을 찾아 손이 미끄러져 간다."

[[dialogue]]
speaker = "unk"
original = "腰から上に向かってゆっくり撫でていくと、手のひらにタプンとした心地よい弾力が伝わってきた。"
translation = "허리에서 위를 향해 천천히 쓸어 올리자, 손바닥에 출렁이는 기분 좋은 탄력이 전해져 왔다."

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「ぁんっ……えへへ……おっぱい、触られちゃってる……」"
translation = "「앙읏…… 에헤헤…… 가슴, 만져지고 있어……」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「車掌さんはあたしのおっぱい好きだよね……そんなに気持ちいいのかな……？」"
translation = "「차장님은 내 가슴 좋아하지…… 그렇게 기분 좋은 걸까……?」"

[[dialogue]]
speaker = "unk"
original = "あどけなさの残る容貌に反して、プトラの胸は十分以上のボリュームを持っていた。"
translation = "앳됨이 남아있는 용모와는 반대로, 푸트라의 가슴은 충분하고도 남을 볼륨을 가지고 있었다."

[[dialogue]]
speaker = "unk"
original = "その大きなふくらみを手のひらで覆い、ゆっくりと味わうように指を動かして愉しむ。"
translation = "그 커다란 부풀어 오름을 손바닥으로 덮고, 천천히 음미하듯 손가락을 움직여 즐긴다."

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「あっ……んん……。んぅ……は、んぅ……ふぅ……んんん……」"
translation = "「앗…… 응……. 응으…… 하, 응으…… 후우…… 응응응……」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「そんな風に……もみもみされたら……んんっ……変な気持ちになってきちゃうよ……あ、んんっ……」"
translation = "「그런 식으로…… 주물주물 당하면…… 응읏…… 이상한 기분이 되어버려…… 아, 응읏……」"

[[dialogue]]
speaker = "unk"
original = "魅惑の弾力をいつまでも味わっていると、プトラが切なげな声で訴えてくる。"
translation = "매혹적인 탄력을 언제까지고 맛보고 있자, 푸트라가 애타는 목소리로 호소해 온다."

[[dialogue]]
speaker = "unk"
original = "ふと目を移すと、彼女は下半身をモゾモゾとしながら太股をすり合わせている。"
translation = "문득 눈을 옮기자, 그녀는 하반신을 가만두지 못하며 허벅지를 비비고 있다."

[[dialogue]]
speaker = "unk"
original = "視線に気づいたプトラは、少し困ったような笑顔を浮かべた。"
translation = "시선을 눈치챈 푸트라는, 조금 곤란한 듯한 미소를 지었다."

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「えへへ……車掌さんの欲しくて……もう、濡れてきちゃったかも……」"
translation = "「에헤헤…… 차장님 게 갖고 싶어서…… 벌써, 젖어버렸을지도……」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「車掌さんはどうかな……？」"
translation = "「차장님은 어때……?」"

[[dialogue]]
speaker = "unk"
original = "覗うように訊ねてくるプトラに応えるように、既に準備が整っている下半身のもので彼女の秘部をなぞった。"
translation = "살피듯 물어오는 푸트라에게 대답하듯, 이미 준비가 끝난 하반신의 그것으로 그녀의 비부를 훑었다."

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「んっ……はぁ……もう……硬くなってる……車掌さんも、あたしに挿れたくなってるんだね……」"
translation = "「응읏…… 하아…… 벌써…… 딱딱해졌어…… 차장님도, 나한테 삽입하고 싶어진 거구나……」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「それじゃ、しよ……車掌さんの、カチカチのおち○ちん……あたしのここに挿れて……」"
translation = "「그러면, 하자…… 차장님의, 딱딱한 자지…… 내 여기에 삽입해줘……」"

[[dialogue]]
speaker = "unk"
original = "わかった、と耳元で囁くと、先端をプトラの花びらの中へと潜らせる。"
translation = "알겠다고 귓가에 속삭이며, 선단을 푸트라의 꽃잎 속으로 잠기게 한다."

[[dialogue]]
speaker = "unk"
original = "蜜液のあふれ出してくる入り口をまさぐるようにして見つけ、そこに切っ先をあてがった。"
translation = "애액이 흘러나오는 입구를 더듬어 찾아내어, 그곳에 끝부분을 갖다 대었다."

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「っ……ぁあああああああんっ……！！」"
translation = "「읏…… 아아아아아아앙읏……!!」"

[[dialogue]]
speaker = "unk"
original = "弾力をかき分けて、プトラの狭い膣内にペニスが潜っていく。"
translation = "탄력을 헤치고, 푸트라의 좁은 질 안으로 페니스가 잠겨 들어간다."

[[dialogue]]
speaker = "unk"
original = "肉ひだの感触が亀頭を摩擦し、挿入しただけで達してしまいそうな刺激を与えてくる。"
translation = "육벽의 감촉이 귀두를 마찰하며, 삽입한 것만으로 가버릴 것 같은 자극을 준다."

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「はぁ……んぅうう……えへへ……車掌さんに、おち○ちんでこうやって、ずぶずぶってしてもらえるのも久しぶりだよ……」"
translation = "「하아…… 응으으으…… 에헤헤…… 차장님한테, 자지로 이렇게, 즈부즈부하고 받는 것도 오랜만이야……」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「あったかいのが奥の方まで入ってきて……んんっ……ぁ……嬉しい……」"
translation = "「따뜻한 게 안쪽 깊은 곳까지 들어와서…… 응읏…… 아…… 기뻐……」"

[[dialogue]]
speaker = "unk"
original = "感慨にふけるプトラ。その言葉には喜びの色に満たされていた。"
translation = "감상에 젖는 푸트라. 그 말에는 기쁨의 색이 가득 차 있었다."

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「動いて、車掌さん……」"
translation = "「움직여줘, 차장님……」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「ぁあ、あ……んんっ……はぁ……あっ……んん、ぁ……あぁあ、ん、んぅ……はぁ、あ……<emoji=heart04>」"
translation = "「아아, 아…… 응읏…… 하아…… 앗…… 응, 아…… 아아아, 응, 응으…… 하아, 아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「んんんぅ、んん……はぁ……気持ちいい……んっ、ん……はぁ……ぁ……ああ……<emoji=heart04>」"
translation = "「응응응으, 응응…… 하아…… 기분 좋아…… 응읏, 응…… 하아…… 아…… 아아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "腰の動きに合わせて、彼女の唇から甘やかな喘ぎがこぼれる。"
translation = "허리의 움직임에 맞춰, 그녀의 입술에서 달콤한 신음이 새어 나온다."

[[dialogue]]
speaker = "unk"
original = "そして、ペニスの先端が膣内を擦り、奥の方を突くたびに入り口の部分がギュッと締め付けてきた。"
translation = "그리고 페니스의 선단이 질 안을 긁고, 안쪽을 찌를 때마다 입구 부분이 꽉 조여왔다."

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「はぁ、ぅ……んんんっ<emoji=heart04>\u3000んぅ、は、ああっ……車掌さんのおち○ちんが……出たり入ったりして……んんっ……<emoji=heart04>」"
translation = "「하아, 으…… 응응응읏<emoji=heart04> 응으, 하, 아앗…… 차장님 자지가…… 들락날락거려서…… 응읏……<emoji=heart04>」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「あたしの、気持ちいいところ……んんっ……刺激して……ん、く……んぅぅ……ん……<emoji=heart04>」"
translation = "「내, 기분 좋은 곳…… 응읏…… 자극해줘…… 응, 쿠…… 응으으…… 응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「あぁあ、んっ……頭のなか……ぽーってしてきちゃう……んんんっ……はぁ、う……んんんっ……ん、はぁ、あ……んんっ<emoji=heart04>」"
translation = "「아아아, 응읏…… 머릿속이…… 멍해져 버려…… 응응응읏…… 하아, 우…… 응응응읏…… 응, 하아, 아…… 응읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「すごく、えっちな気持ち……んんっ、は、んんぅ……はぁ、ああ……あ、あっ、あ、ああっ……<emoji=heart04>」"
translation = "「정말로, 야한 기분…… 응읏, 하, 응응으…… 하아, 아아…… 아, 앗, 아, 아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "少しずつ淫靡な刺激に没入していくプトラ。"
translation = "조금씩 음란한 자극에 몰입해가는 푸트라."

[[dialogue]]
speaker = "unk"
original = "蕩けるような声色と、香り立つ女の子の香りが……そして絶え間なく走る官能の刺激が、男性の本能をかきたててくる。"
translation = "녹아내리는 듯한 목소리와, 풍겨오는 여자아이의 향기가…… 그리고 끊임없이 달리는 관능의 자극이, 남성의 본능을 자극해온다."

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「はぁ、あ……あああ……んっ……<emoji=heart04>\u3000車掌さん、んんっ……もっと……もっと、えっちなこと、して……んんんっ……<emoji=heart04>」"
translation = "「하아, 아…… 아아아…… 응읏……<emoji=heart04> 차장님, 응읏…… 좀 더…… 좀 더, 야한 거, 해줘…… 응응응읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "プトラの言葉が情動に拍車をかけ、下半身に力が入る。"
translation = "푸트라의 말이 감정에 박차를 가하고, 하반신에 힘이 들어간다."

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「んんっ、はぁ……はっ、はっ……ああぁっ……<emoji=heart04>\u3000深いところまで、来てる……<emoji=heart04>\u3000車掌さんのが、奥まで届いてる……<emoji=heart04>」"
translation = "「응읏, 하아…… 핫, 핫…… 아아아앗……<emoji=heart04> 깊은 곳까지, 오고 있어……<emoji=heart04> 차장님 게, 안쪽까지 닿고 있어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "気付けば膣全体が、ペニスに絡みつくように締まっている。"
translation = "어느샌가 질 전체가 페니스를 휘감듯이 조여들고 있다."

[[dialogue]]
speaker = "unk"
original = "まるで全身に、プトラが絡みついているかのような錯覚さえ起こさせた。"
translation = "마치 전신에 푸트라가 휘감겨 있는 것 같은 착각마저 불러일으켰다."

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「はぁ、う、んんっ、あ、ああ……あぁあ、んんっ……ぁ、ああ、あ、あ、んんっ……<emoji=heart04>\u3000あっ、あっ、あ、ああ、んんっ、はぁ、あああ……<emoji=heart04>」"
translation = "「하아, 우, 응읏, 아, 아아…… 아아아, 응읏…… 아, 아아, 아, 아, 응읏……<emoji=heart04> 앗, 앗, 아, 아아, 응읏, 하아, 아아아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "熱っぽい息を吐き出しながら、プトラの身体を貪るように愛し続ける。"
translation = "뜨거운 숨을 내뱉으며, 푸트라의 몸을 탐하듯 계속 사랑한다."

[[dialogue]]
speaker = "unk"
original = "肌と肌が打ち合うたびに、結合部からは彼女の興奮を示す蜜液があふれ出していた。"
translation = "살과 살이 맞부딪힐 때마다, 결합부에서는 그녀의 흥분을 나타내는 애액이 넘쳐흐르고 있었다."

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「んんう……ん……あたしのここ……えっちな声で鳴いてる……んんっ、あぁ、あ……恥ずかしいよぉ……ん、ぁ、ああっ……<emoji=heart04>」"
translation = "「응응우…… 응…… 내 여기…… 야한 소리로 울고 있어…… 응읏, 아아, 아…… 부끄러워요…… 응, 아, 아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「車掌さんに抱きしめてもらうと……んんっ……止められないの……どうしてもこんな風に、なっちゃうの……んんんっ……」"
translation = "「차장님이 안아주면…… 응읏…… 멈출 수가 없어…… 어떻게 해도 이런 식으로, 되어버려…… 응응응읏……」"

[[dialogue]]
speaker = "unk"
original = "それは男として歓喜するところだ。こちらのペニスで、プトラがそれだけ感じてくれるということだから。"
translation = "그것은 남자로서 환희할 일이다. 나의 페니스로 푸트라가 그만큼 느껴준다는 뜻이니까."

[[dialogue]]
speaker = "unk"
original = "その興奮に突き動かされて、ピストンが速まっていく。"
translation = "그 흥분에 이끌려 피스톤이 빨라진다."

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「あっ、あっ、あっ、んっ、あっ……あああっ……<emoji=heart04>\u3000ぁ、ああっ、んっ、あっ、あ、あ、あ、ああっ、ん……あぁああ……<emoji=heart04>」"
translation = "「앗, 앗, 앗, 응읏, 앗…… 아아앗……<emoji=heart04> 아, 아앗, 응읏, 앗, 아, 아, 아, 아앗, 응…… 아아아아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "あふれ出す愛液が動きをスムーズにし、クチュクチュと音を立てながら膣内を執拗にかき回していく。"
translation = "넘쳐흐르는 애액이 움직임을 매끄럽게 하고, 쿠츄쿠츄 소리를 내며 질 안을 집요하게 휘저어 간다."

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「はあっ、あっ、ん、ぁ、んんっ……ん、ぁ、ああぁ、ん、あぁ、あっ、ん……はぁっ、はぁっ、あっ、ああっ……あ、んんんぅ、ぁ、ああっ……<emoji=heart04>」"
translation = "「하앗, 앗, 응, 아, 응읏…… 응, 아, 아아아, 응, 아아, 앗, 응…… 하앗, 하앗, 앗, 아앗…… 아, 응응응으, 아, 아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「動き、んんっ、あっ、あ……激しくなって、きてるっ……んんっ、んっ、あ、ああっ……あっ、ん、くぅ、ん、ぁ、あああっ……<emoji=heart04>」"
translation = "「움직임, 응읏, 앗, 아…… 격렬해지고, 있어…… 응읏, 응읏, 아, 아앗…… 앗, 응, 쿠우, 응, 아, 아아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ピストンを速めると、プトラの叫びも高まっていく。"
translation = "피스톤을 빠르게 하자, 푸트라의 비명도 높아져 간다."

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「ああっ、あっ、あ、んんっ、んぅ、はぁ、あっ、ああ……<emoji=heart04>\u3000あっ、あっ、あ、ああ、あっ、ああ、あっ、あああっ<emoji=heart04>」"
translation = "「아앗, 앗, 아, 응읏, 응으, 하아, 앗, 아아……<emoji=heart04> 앗, 앗, 아, 아아, 앗, 아아, 앗, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「あっ、あ、あ、ああっ……気持ち、いいっ……んんっ……車掌、さんっ……ああっ、あ、気持ちいい、よぉ……んんっ、あっ、ああああ<emoji=heart04>」"
translation = "「앗, 아, 아, 아앗…… 기분, 좋아…… 응읏…… 차장, 님…… 아앗, 아, 기분 좋아, 요…… 응읏, 앗, 아아아아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "快感に震えるプトラの身体を、たまらず強く抱きしめる。"
translation = "쾌감에 떨리는 푸트라의 몸을, 참지 못하고 강하게 껴안는다."

[[dialogue]]
speaker = "unk"
original = "それだけでプトラの全身は興奮に震えた。"
translation = "그것만으로 푸트라의 전신은 흥분으로 떨렸다."

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「あぁあっ……すごく、嬉しいっ……んんっ、車掌さん……もっと、強く、ぎゅってして……あっ、ああ、あああっ……<emoji=heart04>」"
translation = "「아아앗…… 정말, 기뻐…… 응읏, 차장님…… 좀 더, 강하게, 꼬옥 해줘…… 앗, 아아, 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「んっ、あっ、あああっ……ぁ……ああっ<emoji=heart04>\u3000あ、あああっ……ん、ぁ、あああっ……はぁ、あ、あああっ<emoji=heart04>」"
translation = "「응읏, 앗, 아아앗…… 아…… 아앗<emoji=heart04> 아, 아아앗…… 응, 아, 아아앗…… 하아, 아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "周りの景色など映っていないかのように、奔放な叫びを上げるプトラ。"
translation = "주변 경치 같은 건 보이지 않는다는 듯, 방종한 비명을 지르는 푸트라."

[[dialogue]]
speaker = "unk"
original = "膣内が激しく蠢き、確実に絶頂への道をたどっているのが伝わってくる。"
translation = "질 안이 격렬하게 꿈틀거리며, 확실하게 절정으로 향하고 있다는 것이 전해져 온다."

[[dialogue]]
speaker = "unk"
original = "それを促すように、プトラがもっとも感じる部分を集中的に刺激する。"
translation = "그것을 재촉하듯, 푸트라가 가장 느끼는 부분을 집중적으로 자극한다."

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「ああっ、んっ！\u3000そこ、弱いのぉ……んんっ……あぁ、あ、あああっ<emoji=heart04>\u3000んんっ、あ、あああっ……あ、あああっ<emoji=heart04>」"
translation = "「아앗, 응읏! 거기, 약해…… 응읏…… 아아, 아, 아아앗<emoji=heart04> 응읏, 아, 아아앗…… 아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「気持ちよくて、すぐ、真っ白になっちゃう、からっ、んんっ、あ、ああっ、あ……！\u3000んんっ、はぁ、あ、あ、あ、あ、ああっ……<emoji=heart04>」"
translation = "「기분 좋아서, 금방, 하얗게 되어버리니까, 응읏, 아, 아앗, 아……! 응읏, 하아, 아, 아, 아, 아, 아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "快感に翻弄され、自分ではどうしようも無くなっている様子だ。"
translation = "쾌감에 농락당해 스스로는 어찌할 도리가 없어진 모습이다."

[[dialogue]]
speaker = "unk"
original = "それはそのままこちらにも跳ね返ってきて、プトラの高まりに応じて膣の締め付けも一層強くなっていた。"
translation = "그것은 그대로 이쪽으로도 되돌아와서, 푸트라의 고조에 응해 질의 조임도 한층 강해지고 있었다."

[[dialogue]]
speaker = "unk"
original = "それが下半身に欲望の熱を着々と募らせていく。"
translation = "그것이 하반신에 욕망의 열기를 착착 쌓아간다."

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「はあっ、あっ、あっ、ん、ぁああ、んっ<emoji=heart04>\u3000あっ、あ、あ、あああっ、ん、んぅ、あ、ああっ<emoji=heart04>\u3000あっ、あ、あ、あああっ、あ、ん、あぁああっ<emoji=heart04>」"
translation = "「하앗, 앗, 앗, 응, 아아아, 응읏<emoji=heart04> 앗, 아, 아, 아아앗, 응, 응으, 아, 아앗<emoji=heart04> 앗, 아, 아, 아아앗, 아, 응, 아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「っ、んぅ……ぅ、ぁ……車掌さんっ、あたし、もう……イッちゃいそう……あぁ、んっ、あ、あああっ、あ、んんんっ<emoji=heart04>」"
translation = "「읏, 응으…… 으, 아…… 차장님, 나, 이제…… 가버릴 것 같아…… 아아, 응읏, 아, 아아앗, 아, 응응응<emoji=heart04>」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「あっ、あ、んんっ、ああ……いい、かな……このまま……んんっ、あ、ああっ……イッても……んん、あ、あああっ、あ、あああっ<emoji=heart04>」"
translation = "「앗, 아, 응읏, 아아…… 괜찮을, 까…… 이대로…… 응읏, 아, 아앗…… 가버려도…… 응응, 아, 아아앗, 아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "切迫したプトラの訴えに、更にピストンを速める。"
translation = "절박한 푸트라의 호소에, 더욱 피스톤을 빠르게 한다."

[[dialogue]]
speaker = "unk"
original = "それはプトラの言葉への肯定であり、こちらの絶頂も近いという意志表示だった。"
translation = "그것은 푸트라의 말에 대한 긍정이었으며, 이쪽의 절정도 가깝다는 의사표시였다."

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「はぁ、あ……んんっ、あ、んんっ<emoji=heart04>\u3000いいの、んんっ、イッても、んんっ<emoji=heart04>\u3000車掌さん、んんっ、んぅ、ん、ん、んうううっ……！」"
translation = "「하아, 아…… 응읏, 아, 응읏<emoji=heart04> 괜찮아, 응읏, 가도, 응읏<emoji=heart04> 차장님, 응읏, 응으, 응, 응, 응우우우웃……!」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「ん、ぁあ、んっ……あたし、イクね……車掌さんも、一緒に……あ、ああっ……イッて欲しいな……んんっ、あっ、あ、あああっ……！」"
translation = "「응, 아아, 응읏…… 나, 갈게…… 차장님도, 같이…… 아, 아앗…… 갔으면 좋겠어…… 응읏, 앗, 아, 아아앗……!」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「このまま、突いて……最後まで、あっ、あ、あ、あああっ、あ、ああっ！\u3000んぅ、う、あ、ああっ、イクっ、ん、あぁああ、あ、あああっ！」"
translation = "「이대로, 찔러줘…… 끝까지, 앗, 아, 아, 아아앗, 아, 아앗! 응으, 우, 아, 아앗, 간다, 응, 아아아아, 아, 아아앗!」"

[[dialogue]]
speaker = "unk"
original = "プトラが快楽に身を任せる。"
translation = "푸트라가 쾌락에 몸을 맡긴다."

[[dialogue]]
speaker = "unk"
original = "艶めかしく全身をくねらせながら、絶頂の瞬間に向けて声を昂らせていく。"
translation = "요염하게 온몸을 비틀면서, 절정의 순간을 향해 목소리를 높여간다."

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「あぁ、あっ、あ、ああっ、く、ぅ、あ、あああっ、んんっ！\u3000あっ、あ、あああっ、や、ぁ、あああっ、あ、あ、あ、あああっ！！」"
translation = "「아으, 앗, 아, 아앗, 윽, 으, 아, 아아앗, 응응! 앗, 아, 아아앗, 야, 아, 아아앗, 아, 아, 아, 아아앗!!」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「ああっ、あ、あっ！\u3000んんっ、あ、ああっ、あ、車掌、さんっ、イッて、んんっ、あ、ああっ……あたしのおなか、車掌さんので、いっぱいにして！\u3000あっ、あああっ！！」"
translation = "「아앗, 아, 앗! 응응, 아, 아앗, 아, 차장, 님, 가버려, 응응, 아, 아앗…… 내 배 안, 차장님 걸로 가득 채워줘! 앗, 아아앗!!」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「っ、あ、あああっ、あ、イク、あたしもっ！\u3000んんっ、あっ、あっ、あ、んぅ、あ、あああっ、や、んんぅ、イク、イクっ、イクゥっ！！！！」"
translation = "「윽, 아, 아아앗, 아, 가, 나도! 응응, 앗, 앗, 아, 응으, 아, 아아앗, 야, 응으으, 가, 가앗, 가버려어어어!!!!」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「ぁ……あぁあああああああああああああっーーーー<emoji=heart04><emoji=heart04><emoji=heart04>！！！！！」"
translation = "「아…… 아아아아아아아아아아아아앗――――<emoji=heart04><emoji=heart04><emoji=heart04>!!!!」"

[[dialogue]]
speaker = "unk"
original = "プトラの絶頂と共にペニスを最深部まで突き入れ、白濁した精液をプトラの奥に思いっきり解き放った。"
translation = "푸트라의 절정과 함께 자지를 최심부까지 찔러 넣어, 백탁한 정액을 푸트라의 안쪽에 마음껏 해방했다."

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「あっ！\u3000ああっ！\u3000んんぅう<emoji=heart04>\u3000んん……<emoji=heart04>\u3000あぁあ……あったかいの、流れ込んでくるぅ……<emoji=heart04>」"
translation = "「앗! 아앗! 응응으으<emoji=heart04> 응음……<emoji=heart04> 아아아…… 뜨거운 게 흘러 들어와……<emoji=heart04>」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「車掌さんの、ビクンビクンってして……あぁあ……んん、ぁ……ずっと、ビュッビュッって……あぁああ、あ、んんっ……<emoji=heart04>」"
translation = "「차장님의, 파르르 떨리면서…… 아아아…… 응음, 아…… 계속, 울컥울컥 뿜어져 나와서…… 아아아아, 아, 응응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "絶頂の余韻に身を浸しながら、プトラは声を震わせる。"
translation = "절정의 여운에 몸을 적시며, 푸트라는 목소리를 떨었다."

[[dialogue]]
speaker = "unk"
original = "こちらもプトラをしっかりと抱きしめたまま、無限とも思える脈動に身を固くしていた。"
translation = "이쪽도 푸트라를 꽉 껴안은 채, 무한하게 느껴지는 맥동에 몸을 굳히고 있었다."

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「はぁ……ぁ……んんんぅ……<emoji=heart04>\u3000んん、ぁ……はぁ……はぁ……ぁ……んんぅ……<emoji=heart04>」"
translation = "「하아…… 아…… 응응응으……<emoji=heart04> 응음, 아…… 하아…… 하아…… 아…… 응응으……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "全てを注ぎ込んだ。"
translation = "모든 것을 쏟아부었다."

[[dialogue]]
speaker = "unk"
original = "そう思わせるような長い長い脈動が終わり、彼女を抱きしめていた腕の力が緩んでくる。"
translation = "그렇게 느껴질 정도의 길고 긴 맥동이 끝나고, 그녀를 안고 있던 팔의 힘이 풀려 왔다."

[[dialogue]]
speaker = "unk"
original = "するとプトラも緊張を解いたのか、はにかんだ微笑みを浮かべた。"
translation = "그러자 푸트라도 긴장을 풀었는지, 수줍은 미소를 지었다."

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「車掌さん……すごいね……あたしのお腹、パンパンになっちゃった……<emoji=heart04>」"
translation = "「차장님…… 대단하네…… 내 배, 빵빵해져 버렸어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「えっちするの、久しぶりだったからかな……あたしもいつも以上に感じちゃったきがするよ……」"
translation = "「엣찌하는 거, 오랜만이라서 그런가…… 나도 평소보다 훨씬 더 느껴버린 것 같아……」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「……えへへ、車掌さん<emoji=heart04>」"
translation = "「……에헤헤, 차장님<emoji=heart04>」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「異世界での経験はすごく楽しかったけど……でも、やっぱり車掌さんと離れ離れはいやだな……」"
translation = "「이세계에서의 경험은 정말 즐거웠지만…… 그래도, 역시 차장님과 떨어져 있는 건 싫어……」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「車掌さんの傍がいい……それが一番だよ……えへへ♪」"
translation = "「차장님 곁이 좋아…… 그게 제일이야…… 에헤헤♪」"

[[dialogue]]
speaker = "unk"
original = "そう言うとプトラは、身体に回された腕に愛おし気な様子で抱きついたのだった。"
