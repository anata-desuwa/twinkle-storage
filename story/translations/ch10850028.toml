[[dialogue]]
speaker = "unk"
original = "とある休日。その日も俺はマグダレナと２人きりで、リゾート結界のプライベートビーチを訪れていた。"
translation = "어느 휴일. 그날도 나는 막달레나와 단둘이서, 리조트 결계의 프라이빗 비치를 방문하고 있었다."

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「会長<emoji=heart04>\u3000んっ……ちゅっ……んちゅっ……<emoji=heart04>」"
translation = "「회장님<emoji=heart04> 응…… 츄…… 응츄…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ビーチチェアに腰掛けた俺の膝の上で、向かい合うように座ったマグダレナとキスを交わしながら甘い時間を過ごしていると――彼女は微笑む。"
translation = "비치 체어에 걸터앉은 내 무릎 위에서, 마주 보고 앉은 막달레나와 키스를 나누며 달콤한 시간을 보내고 있자―― 그녀는 미소 짓는다."

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「ちゅぱ……<emoji=heart04>\u3000ふふ……会長のが、ママダレナにもっと甘えたいって、お願いしてきてますよ<emoji=heart04>」"
translation = "「츄릅…… <emoji=heart04> 후후…… 회장님의 것이, 마마달레나에게 좀 더 어리광 부리고 싶다고, 부탁하고 있어요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "唇を離した彼女は、俺の海パン越しにそっと指先を這わせてきて、くすぐるように囁いた。"
translation = "입술을 뗀 그녀는, 내 수영복 너머로 살며시 손가락 끝을 훑으며, 간지럽히듯 속삭였다."

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「……まだ昼前ですけど、水上コテージのベッドに移動して、甘えちゃいますか？」"
translation = "「……아직 정오 전이지만, 수상 코테지의 침대로 이동해서, 어리광 부려 볼까요?」"

[[dialogue]]
speaker = "unk"
original = "俺が思わず生唾を飲み込みながら頷くと、マグダレナは幼い顔だちに艶を帯びた笑みを浮かべる。"
translation = "내가 나도 모르게 마른침을 삼키며 고개를 끄덕이자, 막달레나는 어린 얼굴에 요염함을 띤 미소를 짓는다."

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「ふふっ……決まりですね<emoji=heart04>」"
translation = "「후후…… 결정됐네요<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「実はですね、今日は会長に見せたいものがあるんですよ～<emoji=heart04>」"
translation = "「사실은요, 오늘은 회장님께 보여드리고 싶은 게 있거든요~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そうして俺たちは、水上コテージのベッドへと移動することになった。"
translation = "그렇게 우리들은, 수상 코테지의 침대로 이동하게 되었다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「んふっ……<emoji=heart04>\u3000今日も会長のおち○ちん、とっても元気でいい子ですね～<emoji=heart04>」"
translation = "「응후…… <emoji=heart04> 오늘도 회장님의 자지, 정말 활기차고 착한 아이네요~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "彼女はベッドの上で俺にまたがると、大きな胸を揺らしながら、ペニスを手で優しく撫でる。"
translation = "그녀는 침대 위에서 내 위에 올라타더니, 커다란 가슴을 흔들며, 페니스를 손으로 부드럽게 쓰다듬는다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それで、マグダレナが見せたいものって……？」"
translation = "「그래서, 막달레나가 보여주고 싶다는 건……?」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ふふっ、それはエッチが始まったら、すぐにわかりますよ～<emoji=heart04>」"
translation = "「후후, 그건 에치가 시작되면, 바로 알 수 있을 거예요~<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「では、ママダレナがすぐに、おま○こに挿れる準備をしちゃいますから、ちょっと待ってて下さいね～<emoji=heart04>」"
translation = "「그럼, 마마달레나가 금방, 보지에 삽입할 준비를 할 테니까, 잠시만 기다려 주세요~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言うと、マグダレナは腰を動かし、俺のペニスに小さな秘部をゆっくりと擦り付け始める。"
translation = "그렇게 말하자, 막달레나는 허리를 움직여, 내 페니스에 작은 비부를 천천히 문지르기 시작한다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「んっ……<emoji=heart04>\u3000ふうぅ……はあぁ……<emoji=heart04>\u3000おち○ちん、もうすっかりガチガチに大きくなってきてます……<emoji=heart04>」"
translation = "「응…… <emoji=heart04> 후우…… 하아…… <emoji=heart04> 자지, 벌써 완전히 딱딱하게 커지고 있어요…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「マグダレナのおま○こも、もう愛液がいっぱい溢れてきてる」"
translation = "「막달레나의 보지도, 벌써 애액이 가득 넘쳐흐르고 있어」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「はい<emoji=heart04>\u3000ママダレナのこの小さな体は、いっぱいエッチして、もうすっかり会長専用になっちゃってますから……<emoji=heart04>\u3000んふぅ……<emoji=heart04>」"
translation = "「네<emoji=heart04> 마마달레나의 이 작은 몸은, 잔뜩 에치해서, 이제 완전히 회장님 전용이 되어버렸으니까요……<emoji=heart04> 응후우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「だから、会長の逞しいおち○ちんを見ただけで、すぐ挿れて欲しくて準備をし始めちゃうんです……<emoji=heart04>\u3000んっ……ふうぅ……<emoji=heart04>」"
translation = "「그래서, 회장님의 늠름한 자지를 보는 것만으로, 얼른 삽입하고 싶어서 준비를 시작해버리는 거예요……<emoji=heart04> 응……후우우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺もマグダレナの大きなおっぱいを見てると、エッチな気分になってくる」"
translation = "「나도 막달레나의 커다란 가슴을 보고 있으면, 야한 기분이 들어」"

[[dialogue]]
speaker = "unk"
original = "俺は目の前で揺れる魅惑の果実へ手を伸ばし、触れようとする。"
translation = "나는 눈앞에서 흔들리는 매혹의 과실로 손을 뻗어, 만지려 한다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「あんっ<emoji=heart04>\u3000会長、おっぱい触るのは、もうちょっとだけ待ってもらえますか？」"
translation = "「안<emoji=heart04> 회장님, 가슴 만지는 건, 조금만 더 기다려 주시겠어요?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker = "unk"
original = "制止されて手を離すと、マグダレナは溢れる蜜をペニスに擦り付けながら言う。"
translation = "제지당해 손을 떼자, 막달레나는 넘쳐흐르는 꿀을 페니스에 문지르며 말한다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「もう少しで準備ができると思うので……<emoji=heart04>\u3000あっ……<emoji=heart04>\u3000んっ……ふうぅ……<emoji=heart04>」"
translation = "「조금만 더 있으면 준비가 될 것 같아서……<emoji=heart04> 앗……<emoji=heart04> 응……후우우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "先端が彼女の蜜でとろとろに滑り始める頃には、マグダレナの吐息も次第に熱を帯び、触れるたびに小さく震え始めていた。"
translation = "끝부분이 그녀의 꿀로 걸쭉하게 미끄러지기 시작할 무렵에는, 막달레나의 숨결도 점차 열기를 띠고, 닿을 때마다 미세하게 떨리기 시작하고 있었다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「んんっ……はあぁ……<emoji=heart04>\u3000疼いてきました<emoji=heart04>\u3000これで準備できたと思います……<emoji=heart04>」"
translation = "「응응……하아아……<emoji=heart04> 욱신거리기 시작했어요<emoji=heart04> 이걸로 준비됐다고 생각해요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そうして、マグダレナは亀頭を手で導き、愛液が滴り落ちる膣穴へと誘う。"
translation = "그렇게, 막달레나는 귀두를 손으로 이끌어, 애액이 뚝뚝 떨어지는 질 구멍으로 유혹한다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「それじゃあ、ママダレナの中におち○ちんをお迎えしちゃいますね……<emoji=heart04>」"
translation = "「그러면, 마마달레나의 안에 자지를 맞이할게요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「んっ……<emoji=heart04>\u3000あっ――<emoji=heart04>」"
translation = "「응……<emoji=heart04> 앗――<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「んあああぁ～～っ<emoji=heart04><emoji=heart04>\u3000おち○ちん入ってきましたぁ～～っ<emoji=heart04>」"
translation = "「응아아아아~~앗<emoji=heart04><emoji=heart04> 자지가 들어왔어요어어~~앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マグダレナの小さな膣は俺のペニスを知り尽くしたように柔らかく開き、ぬるりと奥まで呑み込んでしまった。"
translation = "막달레나의 작은 질은 내 페니스를 다 알고 있다는 듯이 부드럽게 열려, 미끄러지듯 안쪽까지 삼켜버렸다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「あっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はあぁっ……ふあぁっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000はああぁっ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 응아앗<emoji=heart04> 응<emoji=heart04> 앗<emoji=heart04> 안<emoji=heart04> 하아앗……후아앗<emoji=heart04> 응우웃<emoji=heart04> 앗<emoji=heart04> 하앙앗<emoji=heart04> 앗<emoji=heart04> 안<emoji=heart04> 응아앗<emoji=heart04> 하아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "甘い嬌声を上げながらも、マグダレナは自ら腰を動かす。"
translation = "달콤한 교성을 지르면서도, 막달레나는 스스로 허리를 움직인다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ま、マグダレナのおっぱいから出てるそれって……！」"
translation = "「마, 막달레나의 가슴에서 나오고 있는 그거……!」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「んっ<emoji=heart04>\u3000ふふっ……気づきましたか？\u3000ママダレナ、ついに<b>母乳</b>が出せるようになったんですよ～<emoji=heart04>」"
translation = "「응<emoji=heart04> 후훗…… 눈치채셨나요? 마마달레나, 드디어 <b>모유</b>를 나오게 할 수 있게 되었답니다~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう、なんとマグダレナの胸から、母乳が愛液のように溢れ出てきていた。"
translation = "그래, 놀랍게도 막달레나의 가슴에서 모유가 애액처럼 넘쳐흐르고 있었다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「実は、アニマさまから義体をアップデートして貰って、『性的に興奮すると母乳が出る』仕様になったんです<emoji=heart04>」"
translation = "「사실은, 아니마 님께서 의체를 업데이트해 주셔서, 『성적으로 흥분하면 모유가 나오는』 사양이 되었답니다<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「その方が、より母性的になって、会長にも喜んでもらえるかと思って<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふぅっ……<emoji=heart04>\u3000どうでしょう？」"
translation = "「그편이 좀 더 모성적이게 되어서, 회장님도 기뻐해 주실까 싶어서<emoji=heart04> 응읏<emoji=heart04> 후우……<emoji=heart04> 어떠신가요?」"

[[dialogue]]
speaker = "unk"
original = "そんなの、決まっている――俺は全力でぶんぶんと頷きまくっていた。"
translation = "그런 건, 뻔하다―― 나는 전력으로 세차게 고개를 끄덕여댔다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ふふっ、よかったです<emoji=heart04>\u3000なら、ママダレナのおっぱい、好きなだけチュパチュパ甘えていいですからね<emoji=heart04>」"
translation = "「후후, 다행이네요<emoji=heart04> 그러면, 마마다레나의 가슴, 마음껏 츄파츄파 어리광 부려도 좋으니까요<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「私のこの体は――会長専用なんですから<emoji=heart04>」"
translation = "「저의 이 몸은―― 회장님 전용이니까요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その煽りに俺は我慢することができず、おっぱいにむしゃぶりつく。"
translation = "그 유혹에 나는 참지 못하고, 가슴에 매달려 탐닉한다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「あっ<emoji=heart04>\u3000ママダレナの初めてのお乳、会長にあげちゃってますぅ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000ふあぁっ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 마마다레나의 첫 젖, 회장님께 드리고 있어요오<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 하앙<emoji=heart04> 후아아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "乳首を口に含んで、舌で舐め取りながら吸う。"
translation = "유두를 입에 머금고, 혀로 핥아 올리며 빤다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「はああぁっ<emoji=heart04>\u3000初めての授乳で、なんだか興奮しちゃってますぅ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んああぁっ……<emoji=heart04>」"
translation = "「하아아앗<emoji=heart04> 첫 수유라서, 왠지 흥분해 버리고 있어요오<emoji=heart04> 응<emoji=heart04> 후우우<emoji=heart04> 후아아<emoji=heart04> 응우우<emoji=heart04> 앗<emoji=heart04> 응아아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「会長、そんな慌てなくてもぉ……あんっ<emoji=heart04>\u3000ママダレナのおっぱいは、会長だけのものですからぁ<emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふああぁんっ……<emoji=heart04>」"
translation = "「회장님, 그렇게 서두르지 않아도오…… 앙<emoji=heart04> 마마다레나의 가슴은, 회장님만의 것이니까요오<emoji=heart04> 응응으<emoji=heart04> 하아아<emoji=heart04> 후아아앙……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「あっ<emoji=heart04>\u3000んうぅっ……んあぁっ<emoji=heart04>\u3000そんな夢中になって、乳首チュパチュパ甘えて<emoji=heart04>\u3000ママダレナのお乳、美味しいんですかぁ？」"
translation = "「앗<emoji=heart04> 응우우…… 응아아<emoji=heart04> 그렇게 열중해서, 유두를 츄파츄파 빨며 어리광 부리고<emoji=heart04> 마마다레나의 젖, 맛있나요?」"

[[dialogue]]
speaker = "unk"
original = "俺は再びこくこくと頷く。"
translation = "나는 다시금 끄덕끄덕 고개를 끄덕인다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「んっ<emoji=heart04>\u3000ふふっ<emoji=heart04>\u3000そうなんですね<emoji=heart04>\u3000あっ<emoji=heart04>\u3000なんだか赤ちゃんにおっぱいをあげているみたいでぇ<emoji=heart04>\u3000ママダレナ、幸福感が溢れて来ちゃいますっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 후후<emoji=heart04> 그렇군요<emoji=heart04> 앗<emoji=heart04> 왠지 아기에게 젖을 주고 있는 것 같아서어<emoji=heart04> 마마다레나, 행복감이 넘쳐흘러 버려요<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「んっ……よしよし<emoji=heart04>\u3000いい子いい子<emoji=heart04>\u3000どんな味がしますかぁ？」"
translation = "「응…… 착하다 착해<emoji=heart04> 착하지 착하지<emoji=heart04> 어떤 맛이 나나요?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「なんだか、ほんのり甘い味がする」"
translation = "「왠지, 은은하게 단맛이 나.」"

[[dialogue]]
speaker = "unk"
original = "それでいて、小さなママダレナの母乳であるということに、すごい背徳感を感じて、飲んでいると無性に興奮が昂ってきてしまう。"
translation = "그러면서도, 어린 마마다레나의 모유라는 사실에 엄청난 배덕감을 느끼며, 마시고 있으면 무턱대고 흥분이 고조되어 버린다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「あっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000前から会長にはいっぱいおっぱい吸ってもらってたせいか、母乳飲まれるの感じちゃいます<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んんっ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 응우으<emoji=heart04> 예전부터 회장님이 가슴을 잔뜩 빨아주신 탓인지, 모유를 먹히는 게 느껴져 버려요<emoji=heart04> 하아아<emoji=heart04> 응응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「母乳吸われるの、私も気持ちいいです……<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000はああぁっ……んああぁんっ<emoji=heart04>」"
translation = "「모유를 빨리는 거, 저도 기분 좋아요……<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 후우우<emoji=heart04> 하아아…… 응아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「んっ<emoji=heart04>\u3000私も興奮して、母乳ももっと溢れてきちゃってますっ……<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふああぁんっ……<emoji=heart04>」"
translation = "「응<emoji=heart04> 저도 흥분해서, 모유도 더 넘쳐흘러 버리고 있어요……<emoji=heart04> 앗<emoji=heart04> 응우으<emoji=heart04> 하아아<emoji=heart04> 후아아앙……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「はああぁっ<emoji=heart04>\u3000こうしていると子宮がキュンキュンして、<b>赤ちゃんが欲しく</b>なってきちゃいますぅ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はぁんっ……<emoji=heart04>」"
translation = "「하아아<emoji=heart04> 이러고 있으면 자궁이 큥큥거려서, <b>아기가</b> <b>갖고</b> <b>싶어</b>져 버려요오<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 하앙……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……！」"
translation = "「윽……!」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「アニマさまが仰っていたのですが<emoji=heart04>\u3000会長の魔王因子を摂取した際の体質変化データをこのまま蓄積し続ければ――」"
translation = "「아니마 님이 말씀하셨는데요<emoji=heart04> 회장님의 마왕 인자를 섭취했을 때의 체질 변화 데이터를 이대로 계속 축적한다면――」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「今回母乳が出せるようになったみたいに<emoji=heart04>\u3000この体で<b>妊娠</b>できるようになるのも、そう遠くはない未来に実現できそう、とのことですよ<emoji=heart04>」"
translation = "「이번에 모유가 나오게 된 것처럼<emoji=heart04> 이 몸으로 <b>임신</b>할 수 있게 되는 것도, 그리 멀지 않은 미래에 실현할 수 있을 것 같다고 하시더라고요<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「――あっ<emoji=heart04>\u3000すごい<emoji=heart04>\u3000会長のおち○ちん、中でもっと大きくなってますぅっ……<emoji=heart04>」"
translation = "「――앗<emoji=heart04> 대단해<emoji=heart04> 회장님의 자지, 안에서 더 커지고 있어요오……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だって、マグダレナが煽ってくるから……！」"
translation = "「그야, 막달레나가 유혹하니까……!」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ふふっ……なら、ちゃんと責任を持って、おち○ちんも甘えさせてあげないといけませんね<emoji=heart04>」"
translation = "「후후…… 그럼, 제대로 책임지고 자지도 어리광 부리게 해드려야겠네요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言って、マグダレナは亀頭を優しく撫でるかのように、腰をグラインドさせてくる。"
translation = "그렇게 말하며, 막달레나는 귀두를 부드럽게 어루만지듯이 허리를 그라인드해 온다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「んっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000おち○ちん、いい子いい子……<emoji=heart04>\u3000ママダレナがもっと気持ち良くしてあげますからね<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ……<emoji=heart04>」"
translation = "「응<emoji=heart04> 후우우<emoji=heart04> 자지, 착하다 착해……<emoji=heart04> 마마다레나가 더 기분 좋게 해줄게요<emoji=heart04> 응우으<emoji=heart04> 하아아<emoji=heart04> 앗<emoji=heart04> 앙……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "自身も喘ぎ声を上げながら、マグダレナはペニスを気持ち良くしようと献身的に動く。"
translation = "자신도 신음 소리를 내면서, 막달레나는 페니스를 기분 좋게 하려고 헌신적으로 움직인다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「おま○こでいっぱい褒めちゃいますよ～<emoji=heart04>\u3000おち○ちん、よしよし<emoji=heart04>\u3000えらいえらい<emoji=heart04>\u3000んっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふあぁっ……<emoji=heart04>」"
translation = "「보지로 잔뜩 칭찬해 줄게요~<emoji=heart04> 자지, 착하지 착하지<emoji=heart04> 장하다 장해<emoji=heart04> 응<emoji=heart04> 하아아<emoji=heart04> 앙<emoji=heart04> 후아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「あんっ<emoji=heart04>\u3000ママダレナのおま○こも気持ち良いですよぉ～<emoji=heart04>\u3000とってもいい子<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふああぁんっ……<emoji=heart04>」"
translation = "「앙<emoji=heart04> 마마다레나의 보지도 기분 좋아요오~<emoji=heart04> 정말 착한 아이<emoji=heart04> 앗<emoji=heart04> 응우으<emoji=heart04> 하아아<emoji=heart04> 후아아앙……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ママダレナのことも気持ち良くしてくれて、おち○ちんえらいですね～<emoji=heart04>\u3000よしよし<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んふぅっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04>」"
translation = "「마마다레나도 기분 좋게 해줘서, 자지 장하네요~<emoji=heart04> 착하다 착해<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 응후으<emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マグダレナはそれから、俺の耳元に顔を寄せて、甘い声で誘うように囁く。"
translation = "막달레나는 그러고 나서, 내 귓가에 얼굴을 가까이 대고 달콤한 목소리로 유혹하듯 속삭인다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「会長、気持ち良くなったら遠慮せずに、ママダレナの中にいつでもお射精して下さって構いませんからね<emoji=heart04>」"
translation = "「회장님, 기분 좋아지면 사양 말고 마마다레나 안에 언제든 사정하셔도 상관없으니까요<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「子宮にいっぱい子種を吐き出して、ママダレナを本当のママにして下さい<emoji=heart04>」"
translation = "「자궁에 잔뜩 씨앗을 쏟아내서, 마마다레나를 진짜 엄마로 만들어 주세요<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……<b>ママ</b>ダレナっ！！」"
translation = "「윽…… <b>마마</b>다레나!!」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「あっ――<emoji=heart04><emoji=heart04>」"
translation = "「앗――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ふあああぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000おち○ちん、激しく下から突き上げて来ましたあぁぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아<emoji=heart04><emoji=heart04><emoji=heart04> 자지가 격렬하게 밑에서 치올라 왔어요오오오오~~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「あっ、あっ、あっ、あんっ<emoji=heart04>\u3000あっ、あっ、あっ、はあぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>\u3000んっ、あっ、あっ、あっ、んああぁっ<emoji=heart04>\u3000あっ、あっ、あっ、あんっ、はあああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「앗, 앗, 앗, 앙<emoji=heart04> 앗, 앗, 앗, 하아아<emoji=heart04> 후아아앙<emoji=heart04> 응, 앗, 앗, 앗, 응아아아<emoji=heart04> 앗, 앗, 앗, 앙, 하아아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "昂る鼓動の高まりに引き寄せられるように、俺も腰を動かし、彼女の奥深くへ想いを届けるようにペニスの先でキスを繰り返す。"
translation = "고조되는 고동의 울림에 이끌리듯, 나도 허리를 움직여 그녀의 깊은 곳까지 마음을 전하듯 페니스 끝으로 키스를 반복한다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「あああっ<emoji=heart04>\u3000奥っ<emoji=heart04>\u3000奥当たってますぅっ<emoji=heart04>\u3000おち○ちんで、子宮にラブラブディープキス、気持ちいいですぅっ<emoji=heart04>」"
translation = "「아아아앗<emoji=heart04> 깊은 곳<emoji=heart04> 깊은 곳에 닿고 있어요오<emoji=heart04> 자지로 자궁에 러브러브 딥키스, 기분 좋아요오<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「あっ、あんっ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000本気で求められるおち○ちんキス、すごく感じちゃいますぅ<emoji=heart04>\u3000あっ、あっ、あっ、あっ<emoji=heart04>\u3000んああぁ～っ<emoji=heart04><emoji=heart04>」"
translation = "「앗, 앙<emoji=heart04> 기분 좋아<emoji=heart04> 진심으로 원하는 자지 키스, 엄청 느껴버려요오<emoji=heart04> 앗, 앗, 앗, 앗<emoji=heart04> 응아아아~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「あっ、あんっ、ふああぁっ<emoji=heart04>\u3000すごいっ<emoji=heart04>\u3000激しくおち○ちんに求められて、ゾクゾクしちゃいますぅ<emoji=heart04>\u3000あっ、あっ、あっ、あんっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「앗, 앙, 후아아<emoji=heart04> 대단해<emoji=heart04> 격렬하게 자지에게 원해져서, 조마조마해져 버려요오<emoji=heart04> 앗, 앗, 앗, 앙<emoji=heart04> 후아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はそのまま、上の口でもマグダレナの唇を奪う。"
translation = "나는 그대로 위의 입으로도 막달레나의 입술을 빼앗는다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「あっ<emoji=heart04>\u3000会長ぉ<emoji=heart04>\u3000んむぅ～っ<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000ちゅむっ<emoji=heart04>\u3000ちゅるっ<emoji=heart04>\u3000れろちゅっ<emoji=heart04>\u3000ちゅぱっ<emoji=heart04>\u3000ちゅむむっ<emoji=heart04>\u3000ちゅるるっ……！」"
translation = "「앗<emoji=heart04> 회장님<emoji=heart04> 응무으~<emoji=heart04> 츄<emoji=heart04> 츄무<emoji=heart04> 츄루<emoji=heart04> 레로츄<emoji=heart04> 츄파<emoji=heart04> 츄무무<emoji=heart04> 츄루루……!」"

[[dialogue]]
speaker = "unk"
original = "舌を絡め合うたびに、喉の奥から甘い音が漏れ、体の奥まで痺れるような快感が広がっていく。"
translation = "혀를 서로 얽을 때마다 목구멍 깊은 곳에서 달콤한 소리가 새어 나오고, 몸속 깊은 곳까지 저릿한 쾌감이 퍼져 나간다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ちゅっちゅっ、れるれるっ<emoji=heart04>\u3000ちゅうぅ～っ、れろちゅっ<emoji=heart04>\u3000んむぅっ<emoji=heart04>\u3000ちゅるっ<emoji=heart04>\u3000ちゅるるるっ<emoji=heart04>\u3000ちゅれるっ<emoji=heart04>\u3000ちゅむぅ～っ<emoji=heart04>\u3000れるれるっ、れろちゅっ<emoji=heart04>」"
translation = "「츄츄, 레루레루<emoji=heart04> 츄우으~, 레로츄<emoji=heart04> 응무으<emoji=heart04> 츄루<emoji=heart04> 츄루루루<emoji=heart04> 츄레루<emoji=heart04> 츄무으~<emoji=heart04> 레루레루, 레로츄<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ちゅぱっ――はああぁっ<emoji=heart04>\u3000おち○ちんハメハメしながらのラブラブキスで、頭の中まで気持ち良くなっちゃいますぅ～っ<emoji=heart04><emoji=heart04>」"
translation = "「츄파――하아아<emoji=heart04> 자지 하메하메하면서의 러브러브 키스로, 머릿속까지 기분 좋아져 버려요오~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "離した唇を、弾むように揺れる柔らかなおっぱいへ移し、再びむしゃぶりつく。"
translation = "뗀 입술을 탄력 있게 흔들리는 부드러운 가슴으로 옮겨 다시 탐닉한다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「あっ<emoji=heart04><emoji=heart04>\u3000おっぱい今吸ったらぁっ<emoji=heart04>\u3000あっ、あんっ<emoji=heart04>\u3000あっ、あっ、あっ、はあぁっ<emoji=heart04>\u3000ふあああぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04><emoji=heart04> 가슴 지금 빨면아앗<emoji=heart04> 앗, 앙<emoji=heart04> 앗, 앗, 앗, 하아아<emoji=heart04> 후아아아~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「おっぱい敏感に感じて、気持ちよくなっちゃいますぅ～～っ<emoji=heart04><emoji=heart04>\u3000あっ、あっ、あっ、あんっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「가슴 민감하게 느껴서, 기분 좋아져 버려요오~~<emoji=heart04><emoji=heart04> 앗, 앗, 앗, 앙<emoji=heart04> 응아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「はああぁっ<emoji=heart04><emoji=heart04>\u3000母乳吸われるの気持ちいいっ<emoji=heart04>\u3000乳首、授乳で感じちゃいますぅっ<emoji=heart04><emoji=heart04>\u3000あっ、あっ、あっ、んあぁっ<emoji=heart04>\u3000はあああぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「하아아<emoji=heart04><emoji=heart04> 모유 빨리는 거 기분 좋아<emoji=heart04> 유두, 수유로 느껴버려요오<emoji=heart04><emoji=heart04> 앗, 앗, 앗, 응아아<emoji=heart04> 하아아아~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「あっ<emoji=heart04>\u3000もうダメっ<emoji=heart04>\u3000私、来ちゃいますっ<emoji=heart04>\u3000気持ちよくてママダレナ、もうイっちゃいそうですぅ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 이제 안 돼<emoji=heart04> 저, 와버려요<emoji=heart04> 기분 좋아서 마마다레나, 이제 가버릴 것 같아요오~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ママダレナ、俺もそろそろイキそうだ……！」"
translation = "「마마다레나, 나도 슬슬 갈 것 같아……!」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「あっ、あっ、あっ、あんっ<emoji=heart04>\u3000はいぃっ<emoji=heart04>\u3000来てっ<emoji=heart04>\u3000来て下さいっ<emoji=heart04>\u3000ママダレナの中にいっぱい、赤ちゃん種付けして下さいぃっ<emoji=heart04>」"
translation = "「앗, 앗, 앗, 앙<emoji=heart04> 네에<emoji=heart04> 와줘요<emoji=heart04> 와주세요<emoji=heart04> 마마다레나 안에 잔뜩 아기 씨내리기 해주세요오<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "射精を促すように、マグダレナも腰の動きを激しくする。"
translation = "사정을 재촉하듯 막달레나도 허리 움직임을 격렬하게 한다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「あっ、あっ、あっ、はあぁっ、ふああぁっ<emoji=heart04><emoji=heart04>\u3000もうイクっ<emoji=heart04>\u3000イっちゃいますぅっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あっ、あっ、あっ、あっ<emoji=heart04>\u3000ふあああぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「앗, 앗, 앗, 하아아, 후아아<emoji=heart04><emoji=heart04> 이제 가<emoji=heart04> 가버려요오<emoji=heart04><emoji=heart04><emoji=heart04> 앗, 앗, 앗, 앗<emoji=heart04> 후아아아~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ママダレナ、本当に孕ませるつもりで出すよっ！」"
translation = "「마마다레나, 정말 임신시킬 생각으로 낼게!」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「はいぃっ<emoji=heart04>\u3000生みますっ<emoji=heart04>\u3000会長の赤ちゃん、生みますぅっ<emoji=heart04>\u3000あっあっあっあっ、はああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「네에<emoji=heart04> 낳을게요<emoji=heart04> 회장님의 아기, 낳을게요오<emoji=heart04> 앗앗앗앗, 하아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「精液いっぱい出して下さいぃっ<emoji=heart04><emoji=heart04>\u3000あっあっあっあっ、んああああああ～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「정액 잔뜩 내주세요오<emoji=heart04><emoji=heart04> 앗앗앗앗, 응아아아아아아~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くっ、もう出る！！\u3000ママダレナ、孕んでっ！！！」"
translation = "「큭, 이제 나온다!! 마마다레나, 임신해!!!」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「あああああっ<emoji=heart04><emoji=heart04>\u3000私もイキますっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イクっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イクイクイクイクイクぅっ―――<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아아아앗<emoji=heart04><emoji=heart04> 저도 가요<emoji=heart04><emoji=heart04><emoji=heart04> 가요<emoji=heart04><emoji=heart04><emoji=heart04> 가가가가가요오―――<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「イックううううううぅぅぅーーーーーーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふああああああぁぁぁ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가아아아아아아아아아아아아아아앗―――――――――<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04> 후아아아아아아아아아아아아아아아~~<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マグダレナが腰を落とした瞬間、俺も彼女の奥まで一気に突き上げる。子宮口へぴったりと密着したまま、そのまま全てを吐き出すように射精した。"
translation = "막달레나가 허리를 내린 순간, 나도 그녀의 깊은 곳까지 단숨에 치올린다. 자궁구에 딱 밀착한 채, 그대로 모든 것을 쏟아내듯 사정했다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「はああああぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ママダレナの子宮にいっぱい、熱い精液注がれてますぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하아아아아아아~~<emoji=heart04><emoji=heart04><emoji=heart04> 마마다레나의 자궁에 잔뜩, 뜨거운 정액이 부어지고 있어요오~~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ふあああぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000お潮噴くみたいに、母乳もいっぱい出ちゃってますぅ～～っ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000はああぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「후아아아아아아~~<emoji=heart04><emoji=heart04><emoji=heart04> 애액 뿜는 것처럼 모유도 잔뜩 나와버리고 있어요오~~<emoji=heart04><emoji=heart04> 앗<emoji=heart04> 하아아~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「はぁんっ<emoji=heart04>\u3000すごいですぅ……<emoji=heart04>\u3000会長の射精、まだ続いてます……<emoji=heart04>\u3000んうぅっ……<emoji=heart04>\u3000はあぁっ……ふうぅ……<emoji=heart04>」"
translation = "「하앙<emoji=heart04> 대단해요……<emoji=heart04> 회장님의 사정, 아직 계속되고 있어요……<emoji=heart04> 응우으……<emoji=heart04> 하아아…… 후우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "やがて、射精が終わりを迎えたところで、マグダレナはゆっくりと腰を上げてペニスを引き抜く。"
translation = "이윽고 사정이 끝날 무렵, 막달레나는 천천히 허리를 들어 페니스를 뽑아낸다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「はぁ……はぁ……<emoji=heart04>\u3000すごく気持ち良くて、ママダレナもイっちゃいましたぁ……<emoji=heart04>\u3000んん……<emoji=heart04>」"
translation = "「하아…… 하아……<emoji=heart04> 정말 기분 좋아서 마마다레나도 가버렸어요……<emoji=heart04> 응응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「おっぱいも気持ち良くなって……牛さんみたいにいっぱい噴き出して……<emoji=heart04>\u3000はあぁ……<emoji=heart04>」"
translation = "「가슴도 기분 좋아져서…… 소처럼 잔뜩 뿜어내고……<emoji=heart04> 하아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「会長もいっぱいお射精できましたね……<emoji=heart04>\u3000気持ちよかったですか……？」"
translation = "「회장님도 잔뜩 사정하셨네요……<emoji=heart04> 기분 좋으셨나요……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。ママダレナの母乳で、すごく興奮した……」"
translation = "「아아. 마마다레나의 모유 때문에 정말 흥분했어……」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ふふっ……会長に喜んでもらえてよかったです♪\u3000甘えたい気分なら、このままゆっくりおっぱいをチュパチュパしてもいいですよ<emoji=heart04>」"
translation = "「후후…… 회장님이 기뻐해 주셔서 다행이에요♪ 어리광 부리고 싶은 기분이라면, 이대로 천천히 가슴을 츄파츄파 해도 좋아요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そんな風に言われたら、また甘えたくなってしまう。"
translation = "그런 말을 들으니, 다시 어리광 부리고 싶어진다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「あんっ<emoji=heart04>\u3000ふふっ……いい子いい子……<emoji=heart04>」"
translation = "「앙<emoji=heart04> 후후…… 착하다 착해……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そうして俺の頭を撫でながら、ママダレナは耳元に口を寄せて、甘く囁く。"
translation = "그렇게 내 머리를 쓰다듬으며, 마마다레나는 귓가에 입을 대고 달콤하게 속삭인다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「そのうち、本当に赤ちゃんができるようになるといいですね<emoji=heart04>」"
translation = "「조만간 정말로 아기가 생기면 좋겠네요<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「――あっ<emoji=heart04>\u3000会長、おち○ちんがまたすぐに大きくなってきてますよ<emoji=heart04>\u3000ふふっ、元気でいい子ですね～<emoji=heart04>」"
translation = "「――앗<emoji=heart04> 회장님, 자지가 또 금방 커지고 있어요<emoji=heart04> 후후, 건강하고 착한 아이네요~<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「おっぱいだけじゃなくて……おま○この方にも甘えちゃいますか？」"
translation = "「가슴뿐만 아니라…… 보지 쪽에도 어리광 부리실 건가요?」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ふふっ……なら、早く赤ちゃんが作れるように、ママダレナといっぱい中出しエッチしちゃいましょうね<emoji=heart04>」"
translation = "「후후…… 그럼, 빨리 아기를 만들 수 있도록 마마다레나와 잔뜩 질내사정 섹스해 버려요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そうして、その日は日が暮れるまで、俺はママダレナに甘え続けてしまうのだった。"
translation = "그렇게 그날은 해가 질 때까지 나는 마마다레나에게 계속 어리광 부리는 것이었다."

