[[dialogue]]
speaker = "unk"
original = "第１話,天使なシスターさん,P"
translation = "제1화, 천사 같은 시스터, P"

[[dialogue]]
speaker = "unk"
original = "リクリエの時に暴虐を働いた『魔王』を倒した様子を描いたのが、ここにある『太陽の壁画』と言われている。"
translation = "리크리에 때 폭거를 일삼은 『마왕』을 쓰러뜨린 모습을 그린 것이, 여기 있는 『태양의 벽화』라고 전해진다."

[[dialogue]]
speaker = "unk"
original = "しかしヴィーナスは、魔王はリクリエから世界を救った英雄だと言っていた。いったいどちらが正しいのだろう？"
translation = "하지만 비너스는, 마왕은 리크리에로부터 세계를 구한 영웅이라고 말했었다. 도대체 어느 쪽이 옳은 것일까?"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「難しそうな顔をしてどうされましたか、会長さま？」"
translation = "「어려운 표정을 짓고 무슨 일이신가요, 회장님?」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「おや、申し遅れましたね。私は教皇庁所属のシスター、シャロン・ミストリアと申します。会長さまと同じく新星学園の２年生です」"
translation = "「어머, 인사가 늦었네요. 저는 교황청 소속의 시스터, 샤론 미스트리아라고 합니다. 회장님과 마찬가지로 신성 학원 2학년이에요」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「住まいは流星市国内の修道院ですが、学園に通いながら、この大聖堂の管理をお手伝いさせていただいております」"
translation = "「거처는 유성 시국 내의 수도원이지만, 학원에 다니면서 이 대성당의 관리를 돕고 있답니다」"

[[dialogue]]
speaker = "unk"
original = "お疲れ様です"
translation = "수고가 많네"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「いいえ、シスターは神に仕えるものですから。それにこの大聖殿は世界の信仰の中心。お掃除させていただけるのは光栄なことです」"
translation = "「아니요, 시스터는 신을 섬기는 자니까요. 게다가 이 대성전은 세계 신앙의 중심. 청소할 수 있다는 건 영광스러운 일이죠」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「それより会長さま、あまりお元気がないようですが……やはり星徒会のお仕事がお忙しいのでしょうか」"
translation = "「그보다 회장님, 별로 기운이 없어 보이시는데…… 역시 성도회 업무가 바쁘신 걸까요」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「会長さまは新星学園に転入されてきたばかり。それにここは普通の学び舎とは違う、星騎士の学園です」"
translation = "「회장님은 신성 학원에 전학 오신 지 얼마 되지 않았죠. 게다가 여기는 평범한 배움터와는 다른, 성기사의 학원입니다」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ただでさえ慣れない環境で、星徒会長のお仕事も求められるのですから、きっと苦労なさることもあるでしょう。心中お察しいたします」"
translation = "「안 그래도 익숙하지 않은 환경에서, 성도회장의 업무까지 요구받으시니 분명 고생하시는 일도 있겠죠. 그 마음 헤아려 드립니다」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「何か私にお手伝いできることはありませんか？」"
translation = "「제가 뭐 도와드릴 일은 없을까요?」"

[[dialogue]]
speaker = "unk"
original = "今のところ大丈夫"
translation = "지금은 괜찮아"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「そうですか、会長さまはお強いのですね。ですが、どうか無理はされないように」"
translation = "「그렇군요, 회장님은 강하시네요. 하지만 부디 무리는 하지 마시길」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「では私は聖堂のお掃除がありますので、失礼いたします。お力になれることがあればいつでもお声がけください」"
translation = "「그럼 저는 성당 청소가 있어서 이만 실례하겠습니다. 힘이 될 일이 있다면 언제든 말씀해 주세요」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「今日も星徒会お疲れ様～」"
translation = "「오늘도 성도회 수고했어~」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「まさかベリーダンス部があんな過激な衣装を作ってるなんて……セクシーっていってもさすがにあれはアウトでしょ……」"
translation = "「설마 밸리댄스 부가 그렇게 과격한 의상을 만들고 있을 줄이야…… 섹시하다고 해도 역시 저건 아웃이잖아……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「川釣り部が餌用に育てたミミズが大量に逃げ出すなんて思わなかったわ～」"
translation = "「민물낚시 부가 미끼용으로 키운 지렁이가 대량으로 도망칠 줄은 몰랐단다~」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「現代美術部がグラウンドにピラミッド建てようとしてた。もちろん止めたけど」"
translation = "「현대미술 부가 운동장에 피라미드를 세우려고 했어. 물론 막았지만」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あ、部活のフリーダムさにクロトくんが困惑気味ね～」"
translation = "「아, 동아리의 자유분방함에 쿠로토 군이 당황한 기색이네~」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「私が着たら恥ずかしい以前にすごく貧相なんだろうな……あんなのスタイルがいい人しか着られないでしょ……私もヴィーナスやサーシャさんみたいなら……」"
translation = "「내가 입으면 창피하기 이전에 엄청 빈약해 보이겠지…… 저런 건 몸매 좋은 사람이나 입을 수 있는 거잖아…… 나도 비너스나 사샤 씨 같았다면……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「マトイ～、何ぶつぶつ言ってるの？」"
translation = "「마토이~, 뭘 중얼중얼거리고 있는 거니?」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「お疲れ様です！」"
translation = "「수고하셨습니다!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「シャロンさん！？」"
translation = "「샤론 씨!?」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ご多忙な星徒会役員の皆さまのため、栄養ドリンクをお作りしましたっ」"
translation = "「바쁘신 성도회 임원 여러분을 위해, 영양 드링크를 만들어 왔습니다앗」"

[[dialogue]]
speaker = "unk"
original = "昨日となんか違う！？"
translation = "어제랑 뭔가 다른데!?"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「女神様のご慈悲をあまねく届かせるのが私の務め。いてもたってもいられず星徒会室を訪ねてしまいましたっ」"
translation = "「여신님의 자비를 널리 전하는 것이 저의 임무. 가만히 있을 수가 없어서 성도회실을 찾아오고 말았습니다앗」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あ～……シャロンさんはいつもは清楚なシスターさんなんだけど、スイッチ入るとこうなるからね……」"
translation = "「아~…… 샤론 씨는 평소에는 청초한 시스터지만, 스위치가 켜지면 이렇게 되니까……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「どちらかというと、こっちが地の性格っぽいわね～」"
translation = "「어느 쪽인가 하면 이쪽이 본래 성격 같네~」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「さぁ、どうぞどうぞ。今お世話になっている修道院に伝わる疲労回復ドリンクですっ」"
translation = "「자, 어서 어서요. 지금 신세를 지고 있는 수도원에 전해 내려오는 피로 해소 드링크입니다앗」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「じゃあ遠慮なくいただくわ。味は……うん、まずまずってところかしら」"
translation = "「그럼 사양 않고 마실게. 맛은…… 음, 그럭저럭인 느낌일까」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「お酢が入っているみたい。体に良さそうね～」"
translation = "「식초가 들어있는 것 같네. 몸에 좋을 것 같아~」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あ、私は飲みやすくて好きかも。トレーニングの後とかに良さそう」"
translation = "「아, 나는 마시기 편해서 좋을지도. 트레이닝 후에 마시면 좋겠어」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「酢に含まれるクエン酸は疲労回復に有用な成分です」"
translation = "「식초에 포함된 구연산은 피로 해소에 유용한 성분입니다」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ささ、会長さまもどうぞ。グイっと一気に！」"
translation = "「자자, 회장님도 어서요. 쭈욱 한 번에!」"

[[dialogue]]
speaker = "unk"
original = "すっぱい！\u3000……けど確かに効きそう"
translation = "셔! ……하지만 확실히 효과가 있을 것 같아"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「そうでしょうそうでしょう。他にお力になれることはありませんかっ？\u3000お腹は空いていませんかっ？\u3000勉強でご不便はありませんかっ？」"
translation = "「그렇죠 그렇죠. 그 밖에 힘이 되어드릴 일은 없나요앗? 배는 고프지 않으신가요앗? 공부에 불편함은 없으신가요앗?」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「宿題はお済みですかっ？\u3000マッサージしましょうかっ？\u3000\u3000膝枕でお休みされますかっ？」"
translation = "「숙제는 다 하셨나요앗? 마사지해 드릴까요앗? 무릎베개로 쉬시겠어요앗?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「圧がすごい……」"
translation = "「압박감이 대단해……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ちょっとちょっと、膝枕はやりすぎなんじゃない？\u3000クロトには私たちがいるんだから。マッサージくらいにしときなさい」"
translation = "「잠깐잠깐, 무릎베개는 너무 나간 거 아냐? 쿠로토에게는 우리가 있으니까. 마사지 정도로 해 둬」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「マッサージですね、わかりましたっ。では失礼して……」"
translation = "「마사지군요, 알겠습니다앗. 그럼 실례해서……」"

[[dialogue]]
speaker = "unk"
original = "ああああああぁっ！？"
translation = "아아아아아아악!?"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「とっても痛そうなマッサージね～」"
translation = "「무척 아파 보이는 마사지네~」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ごめんなさい。やっぱりシャロンさんは止められないわ……」"
translation = "「미안해. 역시 샤론 씨는 말릴 수 없나 봐……」"

