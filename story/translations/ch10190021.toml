[[dialogue]]
speaker = "unk"
original = "第１話,恥じらい忍者への告白方法,P"
translation = "제1화, 부끄럼쟁이 닌자에게 고백하는 방법, P"

[[dialogue]]
speaker = "unk"
original = "これはせつなが正式な『専属忍者』になってから、しばらく経った頃の出来事。"
translation = "이것은 세츠나가 정식으로 『전속 닌자』가 되고 나서 얼마간 지났을 무렵의 일."

[[dialogue]]
speaker = "unk"
original = "せつなのことが好きだ。"
translation = "세츠나가 좋다."

[[dialogue]]
speaker = "unk"
original = "専属忍者になる以前からデートを繰り返していて、自分でも薄々気付いてはいたのだが、最近ではもうすっかり自分でもその感情を自覚せざるを得なくなっていた。"
translation = "전속 닌자가 되기 이전부터 데이트를 반복해 왔고, 스스로도 어렴풋이 눈치채고는 있었지만, 최근에는 이미 완전히 스스로도 그 감정을 자각하지 않을 수 없게 되어 있었다."

[[dialogue]]
speaker = "せつな"
original = "「？\u3000どうかしたでござるか、主様？\u3000せつなの顔をじっくり眺めたりして」"
translation = "「? 무슨 일이오, 주군? 세츠나의 얼굴을 빤히 쳐다보시고」"

[[dialogue]]
speaker = "unk"
original = "今日もせつなが可愛いなと思って"
translation = "오늘도 세츠나가 귀엽다고 생각해서."

[[dialogue]]
speaker = "せつな"
original = "「にゃにゃ、にゃっ！？\u3000突然どうしたでござるか、主様！？\u3000そういうイタズラは、心臓に悪いでござりまする！」"
translation = "「냐냐, 냐앗!? 갑자기 무슨 말씀이오, 주군!? 그런 장난은 심장에 해롭소이다!」"

[[dialogue]]
speaker = "せつな"
original = "「せつなはいつも通り、主様の忍びとして、休日の掃除と洗濯をしに来ただけでござる！」"
translation = "「세츠나는 평소대로 주군의 닌자로서 휴일의 청소와 빨래를 하러 왔을 뿐이오!」"

[[dialogue]]
speaker = "せつな"
original = "「えっ？\u3000掃除と洗濯は忍者の仕事じゃない……？」"
translation = "「에? 청소와 빨래는 닌자의 일이 아니라고요……?」"

[[dialogue]]
speaker = "せつな"
original = "「いえいえ、せつなはただの忍者ではございませぬ。九浄家メイド隊が一人、メイド忍者にござりまする！\u3000であればこそ、主様への奉仕の精神も忘れないのでござる」"
translation = "「아니 아니, 세츠나는 평범한 닌자가 아니오. 쿠죠 가문 메이드대 중 한 명, 메이드 닌자이오! 그렇기에 주군을 향한 봉사 정신도 잊지 않는 것이오.」"

[[dialogue]]
speaker = "unk"
original = "でもこれだと、恋人にお世話されてるみたい"
translation = "그래도 이러면 연인에게 보살핌받는 것 같아."

[[dialogue]]
speaker = "せつな"
original = "「にゃんですとぉ！？\u3000はわわっ、ダメでござる、主様！\u3000そんな男女が密室に恋人だのなんだのって……そんなの、破廉恥すぎるでござる！！」"
translation = "「냐니라고요!? 하와와, 안 되오 주군! 그런 남녀가 밀실에서 연인이니 뭐니…… 그런 건 너무 파렴치하오!!」"

[[dialogue]]
speaker = "せつな"
original = "「もっとこう年頃の健全な若者は、ヌードとかおっぱいとか、○○○○とか○○○○みたいな本能に忠実なもので発散しないと！？」"
translation = "「좀 더 이렇게 꽃다운 건전한 젊은이는 누드라든가 가슴이라든가, ○○○○라든가 ○○○○ 같은 본능에 충실한 것으로 발산해야지!?」"

[[dialogue]]
speaker = "unk"
original = "うん、まあ。せつなは相変わらずだよね"
translation = "응, 뭐. 세츠나는 여전하네."

[[dialogue]]
speaker = "unk"
original = "なぜかせつなは、恋愛とエロの羞恥心が普通の人の真逆なのだった。"
translation = "왠지 세츠나는 연애와 에로에 대한 수치심이 보통 사람과 정반대였다."

[[dialogue]]
speaker = "unk"
original = "そうであるが故に、せつなに対しての告白というのは、一筋縄ではいかない予感がすでにヒシヒシとしていた。"
translation = "그렇기에 세츠나에게 고백한다는 것은 결코 만만치 않을 것이라는 예감이 이미 강하게 들고 있었다."

[[dialogue]]
speaker = "せつな"
original = "「せつなとしても、主様がその気であれば、いつでも房中術を披露するでござる！」"
translation = "「세츠나로서도 주군이 원하신다면 언제든 방중술을 선보이겠소!」"

[[dialogue]]
speaker = "せつな"
original = "「さすがに路上や学園ではやりませぬが、ここは主様のお家。せつなのたわわに実ったおっぱい、そろそろ主様にも披露したいと思っていたところでござる！」"
translation = "「역시 길거리나 학원에서는 하지 않겠으나 여기는 주군의 집. 세츠나의 탐스럽게 영근 가슴, 슬슬 주군께도 선보이고 싶다고 생각하던 참이었소!」"

[[dialogue]]
speaker = "せつな"
original = "「？\u3000何を慌てているでござる？\u3000男子たる者、女子のおっぱいに興味を持つのは当然のこと！\u3000主様であれば、遠慮はなしにござる♪」"
translation = "「? 왜 당황하시는 것이오? 남자라면 여자의 가슴에 관심을 갖는 건 당연한 일! 주군이라면 사양은 필요 없소이다♪」"

[[dialogue]]
speaker = "せつな"
original = "「ダメでござるか……？\u3000うぅぅ、主様はいけずでござるぅ。忍びにだって、忠誠を誓った主様に自慢の体を見てもらいたい欲求がござりまする……」"
translation = "「안 되는 것이오……? 우으으, 주군은 심술쟁이오. 닌자라도 충성을 맹세한 주군께 자랑스러운 몸을 보여드리고 싶은 욕구가 있소이다……」"

[[dialogue]]
speaker = "せつな"
original = "「せつながどう考えてるかはともかく、一般的にそういうのは恋人同士ですること……でござるか？」"
translation = "「세츠나가 어떻게 생각하든 간에 일반적으로 그런 건 연인끼리 하는 것…… 이오?」"

[[dialogue]]
speaker = "せつな"
original = "「むむぅ……別にせつなは、主様相手だったら気にしないのでござるが」"
translation = "「음음…… 딱히 세츠나는 주군 상대라면 신경 쓰지 않소만.」"

[[dialogue]]
speaker = "unk"
original = "せつなは人から告白されたらどうする？"
translation = "세츠나는 누군가에게 고백받으면 어떻게 할 거야?"

[[dialogue]]
speaker = "unk"
original = "とはいえ、苦手なのは知ってるけど"
translation = "뭐, 서투른 건 알고 있지만."

[[dialogue]]
speaker = "せつな"
original = "「こ、告白というのはつまり……恋愛対象であることを認め合って、お互いが好き同士であることを受け入れ合った、破廉恥な関係になる、ということでござるか？」"
translation = "「고, 고백이라는 건 즉…… 연애 대상임을 서로 인정하고, 서로가 서로를 좋아한다는 것을 받아들인 파렴치한 관계가 된다는 것이오?」"

[[dialogue]]
speaker = "せつな"
original = "「な、なるほど……せつなは忍び故、誰かに告白するなんてことはあり得ませぬが、他人から告白される可能性は確かにゼロにはできませぬ」"
translation = "「나, 과연…… 세츠나는 닌자이기에 누군가에게 고백할 일은 없겠으나 타인에게 고백받을 가능성은 확실히 제로라고 할 수 없소.」"

[[dialogue]]
speaker = "せつな"
original = "「ただ、当然のことではありまするが、せつなは主様の専属メイド忍者。誰の告白であろうとも、受け入れることはありませぬ」"
translation = "「다만 당연한 일이겠으나 세츠나는 주군의 전속 메이드 닌자. 누구의 고백이든 받아들일 일은 없소이다.」"

[[dialogue]]
speaker = "せつな"
original = "「せつなは主様が不要と断ずるまでは、主様ただ一人にどこまでもついていくでござる！」"
translation = "「세츠나는 주군이 불필요하다고 판단하실 때까지 주군 단 한 분만을 어디까지나 따라갈 것이오!」"

[[dialogue]]
speaker = "unk"
original = "じゃ、じゃあもし、俺が告白したら？"
translation = "그, 그럼 만약 내가 고백한다면?"

[[dialogue]]
speaker = "せつな"
original = "「は……？」"
translation = "「하……?」"

[[dialogue]]
speaker = "せつな"
original = "「それはつまり、せつなと主様が……恋愛対象であることを認め合って、お互いが好き同士であることを受け入れ合った、破廉恥な関係になる、ということでござるか？」"
translation = "「그건 즉 세츠나와 주군이…… 연애 대상임을 서로 인정하고, 서로가 서로를 좋아한다는 것을 받아들인 파렴치한 관계가 된다는 것이오?」"

[[dialogue]]
speaker = "せつな"
original = "「そ、そそそ、そんにゃこと……！？」"
translation = "「그, 그그그, 그런 일이……!?」"

[[dialogue]]
speaker = "せつな"
original = "「破廉恥でござる！\u3000破廉恥でござる！\u3000破廉恥でござるぅ～～～～～～っ！？」"
translation = "「파렴치하오! 파렴치하오! 파렴치하오오오~~~~~~앗!?」"

[[dialogue]]
speaker = "unk"
original = "まあやっぱり、こうなるよなぁ……。"
translation = "뭐 역시 이렇게 되는구나……."

[[dialogue]]
speaker = "ヨミ"
original = "「なるほど、そんなことが……」"
translation = "「과연, 그런 일이……」"

[[dialogue]]
speaker = "ヨミ"
original = "「会長とせつなさん、かなり仲が良さそうだと思ってたんですが、確かにせつなさん相手だと恋人になるのは苦労しそうですね……」"
translation = "「회장님과 세츠나 씨, 꽤 사이가 좋다고 생각했는데 확실히 세츠나 씨 상대라면 연인이 되는 건 고생 좀 하겠네요……」"

[[dialogue]]
speaker = "unk"
original = "うん、まあ。せつなは相変わらずだよね"
translation = "응, 뭐. 세츠나는 여전하니까."

[[dialogue]]
speaker = "ヨミ"
original = "「わっ、会長のそこまで弱った顔、初めて見たかもしれません。それだけ真剣、ってことですね」"
translation = "「와, 회장님이 그렇게까지 지친 얼굴을 하는 건 처음 봤을지도 몰라요. 그만큼 진심이라는 거네요.」"

[[dialogue]]
speaker = "ヨミ"
original = "「そうですねぇ……だったら、こんなのはどうでしょうか？」"
translation = "「그렇네요…… 그렇다면 이건 어떨까요?」"

[[dialogue]]
speaker = "ヨミ"
original = "「題して、ラブレター大作戦です！」"
translation = "「이름하여 러브레터 대작전입니다!」"

[[dialogue]]
speaker = "ヨミ"
original = "「せつなさんの反応を見ている限り、恋愛は苦手ってだけで嫌いなわけじゃないと思うんです」"
translation = "「세츠나 씨의 반응을 보는 한, 연애가 서투를 뿐이지 싫어하는 건 아니라고 생각해요.」"

[[dialogue]]
speaker = "ヨミ"
original = "「苦手っていうか、とにかく恥ずかしいって感じですよね。だから、会長から恋愛感情を向けられていることとか、自分の中にある恋愛感情を直視できないだけで……」"
translation = "「서투르다기보다 어쨌든 부끄러워한다는 느낌이죠. 그러니까 회장님으로부터 연애 감정을 받고 있다는 것이나 자신 안에 있는 연애 감정을 직시하지 못할 뿐이지……」"

[[dialogue]]
speaker = "ヨミ"
original = "「人のことを好きになれないとか、人から好かれたくないって感じではありません。これはもう、勝手ながら断言しちゃいます！」"
translation = "「사람을 좋아할 수 없다거나 남에게 사랑받고 싶지 않다는 느낌은 아니에요. 이건 이제 제가 멋대로 단언할게요!」"

[[dialogue]]
speaker = "ヨミ"
original = "「面と向かって好きって言われるのって、嬉しいけど、きっと恥ずかしいじゃないですか。せつなさんじゃなくたって、恥ずかしくて逃げちゃいたくなる人はたくさんいます」"
translation = "「마주 보고 좋아한다는 말을 듣는 건 기쁘지만 분명 부끄럽잖아요. 세츠나 씨가 아니더라도 부끄러워서 도망치고 싶어지는 사람은 많아요.」"

[[dialogue]]
speaker = "ヨミ"
original = "「そこで、想いを伝える方法をラブレターにするんです」"
translation = "「그래서 마음을 전하는 방법을 러브레터로 하는 거예요.」"

[[dialogue]]
speaker = "ヨミ"
original = "「面と向かって言われたら恥ずかしくて逃げだしちゃいたくなることでも、文章になっていれば自分のペースで読むことができます」"
translation = "「마주 보고 들으면 부끄러워서 도망치고 싶어지는 일이라도, 글로 되어 있으면 자신의 페이스로 읽을 수 있으니까요.」"

[[dialogue]]
speaker = "ヨミ"
original = "「せつなさんにはきっと、会長の好意を受け取る覚悟を決める時間が必要なんじゃないかと、私は思うんです」"
translation = "「세츠나 씨에게는 분명 회장님의 호의를 받아들일 각오를 다질 시간이 필요한 게 아닐까 하고 저는 생각해요.」"

[[dialogue]]
speaker = "unk"
original = "ラブレター大作戦、やってみる！"
translation = "러브레터 대작전, 해볼게!"

[[dialogue]]
speaker = "unk"
original = "ありがとう、ヨミヨミ"
translation = "고마워, 요미요미."

[[dialogue]]
speaker = "ヨミ"
original = "「はい、頑張ってください、会長」"
translation = "「네, 힘내세요 회장님.」"

[[dialogue]]
speaker = "ヨミ"
original = "「同僚として、せつなさんと会長の幸せを、私も願っていますから」"
translation = "「동료로서 세츠나 씨와 회장님의 행복을 저도 바라고 있으니까요.」"

