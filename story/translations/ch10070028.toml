[[dialogue]]
speaker = "ルリエル"
original = "「ふぅ～……お仕事がようやく終わったのです～……」"
translation = "「후우~…… 일이 드디어 끝난 거예요~……」"

[[dialogue]]
speaker = "ルリエル"
original = "「会長さんもごめんなさいなのです。学園が違うのに、お手伝いまでしてもらって……」"
translation = "「회장님도 죄송한 거예요. 학원이 다른데도, 도움까지 받아서……」"

[[dialogue]]
speaker = "unk"
original = "他のメンバーにばれたらまずいかもしれないけれど、恋人のルリエルが困っていたのだ。できる限りのことがしたいのは彼氏として当然だろう。"
translation = "다른 멤버에게 들키면 곤란할지도 모르지만, 연인인 루리엘이 곤란해하고 있었다. 가능한 한 도움을 주고 싶은 것은 남자친구로서 당연하겠지."

[[dialogue]]
speaker = "unk"
original = "ただ、手伝いの動機には少しばかり不純な気持ちも混じっていて……"
translation = "다만, 도와주려는 동기에는 약간 불순한 기분도 섞여 있어서……"

[[dialogue]]
speaker = "ルリエル"
original = "「んん？\u3000どうしたのですか、会長さん」"
translation = "「으응? 무슨 일인가요, 회장님」"

[[dialogue]]
speaker = "unk"
original = "ここのところドタバタが続いていたせいもあり、まともにルリエルとの時間が取れていなかった。"
translation = "요 근래 소동이 계속되었던 탓도 있어, 제대로 루리엘과 시간을 보내지 못했다."

[[dialogue]]
speaker = "ルリエル"
original = "「……どうかしましたか、会長さん？」"
translation = "「……무슨 일인가요, 회장님?」"

[[dialogue]]
speaker = "unk"
original = "そんな状態で恋人と２人きりのシチュエーション。時刻は真夜中。おまけにこの部屋には鍵までかけられる。"
translation = "그런 상태에서 연인과 단둘이 있는 상황. 시각은 한밤중. 게다가 이 방은 문을 잠글 수도 있다."

[[dialogue]]
speaker = "unk"
original = "言い訳の材料がたんまりあるせいもあって、俺はむくむくと沸き起こる性欲をとうとう我慢できなくなり──"
translation = "변명할 거리가 잔뜩 있는 탓도 있어서, 나는 뭉게뭉게 솟구치는 성욕을 결국 참을 수 없게 되어──"

[[dialogue]]
speaker = "ルリエル"
original = "「きゃ、きゃあっ？」"
translation = "「꺄, 꺄앗?」"

[[dialogue]]
speaker = "ルリエル"
original = "「こ、ここで……えっ。えっえっ……だ、ダメなのです、星徒会室は、えっちするところじゃないのです、よ……？」"
translation = "「여, 여기서…… 엣. 에엣 에엣…… 아, 안 돼요, 성도회실은, 야한 짓을 하는 곳이 아니에요, 요……?」"

[[dialogue]]
speaker = "unk"
original = "慌てて言い返してくるルリエルだったけれど、強く拒絶する意思はないように思えたから。"
translation = "당황해서 대꾸하는 루리엘이었지만, 강하게 거절할 의사는 없는 것처럼 보였기에."

[[dialogue]]
speaker = "クロト"
original = "「服、脱いで。そこに寝転がってくれるか？」"
translation = "「옷, 벗어. 거기에 누워 줄래?」"

[[dialogue]]
speaker = "unk"
original = "欲望のままに、大好きな天使にそう告げていた──"
translation = "욕망이 이끄는 대로, 사랑하는 천사에게 그렇게 고하고 있었다──"

[[dialogue]]
speaker = "ルリエル"
original = "「は、はわわわっ……！\u3000会長さんのおち○ちん、もう、ガッチガチになっちゃってますぅ……！」"
translation = "「하, 하와와왓……! 회장님의 자지, 벌써, 딱딱하게 굳어버렸어요어……!」"

[[dialogue]]
speaker = "ルリエル"
original = "「すごい迫力、なのです……こんなに会長さんのおち○ちん、大きかったでしょうか……？」"
translation = "「엄청난 박력, 이에요…… 이렇게 회장님의 자지, 컸었나요……?」"

[[dialogue]]
speaker = "ルリエル"
original = "「びくびく震えて……ご、ごくり。こんな大きいの、ルリエルのお腹、いっぱいになっちゃいますよぅ……」"
translation = "「파르르 떨리면서…… 꿀, 꺽. 이렇게 큰 거, 루리엘의 배, 가득 차 버릴 거예요오……」"

[[dialogue]]
speaker = "unk"
original = "身じろぎするたびに柔らかいおま○こがペニスに当たって、たまらない。"
translation = "몸을 뒤척일 때마다 부드러운 보지가 페니스에 닿아서, 견딜 수 없다."

[[dialogue]]
speaker = "ルリエル"
original = "「で、でもちょっぴり嬉しいのです……会長さんが、ルリエルでおち○ちん、大きくしてくれて……」"
translation = "「하, 하지만 조금 기쁜 거예요…… 회장님이, 루리엘로 자지, 크게 해 줘서……」"

[[dialogue]]
speaker = "unk"
original = "大好きなルリエルの裸を前にして興奮しないわけがないのに、不思議なことを言う。"
translation = "사랑하는 루리엘의 알몸을 앞에 두고 흥분하지 않을 리가 없는데, 이상한 소리를 한다."

[[dialogue]]
speaker = "ルリエル"
original = "「だ、だって。その……最近出会ったクルセイダースさん、可愛い人ばかりでしたし……」"
translation = "「그, 그게. 그…… 최근에 만난 크루세이더즈 분들, 귀여운 사람뿐이었고……」"

[[dialogue]]
speaker = "ルリエル"
original = "「それにあのハレンチなパンダさんも、ちっぱいのルリエルには興味なさそうだったので……」"
translation = "「게다가 그 파렴치한 판다 씨도, 빈유인 루리엘에게는 흥미가 없어 보였으니까요……」"

[[dialogue]]
speaker = "ルリエル"
original = "「会長さんにとって、ルリエルはいつまで魅力的に映るのかな～って……ちょっぴり不安だったと言いますか……」"
translation = "「회장님에게 루리엘은 언제까지 매력적으로 보일까~ 해서…… 조금 불안했다고나 할까요……」"

[[dialogue]]
speaker = "unk"
original = "自分の魅力を分かっていないルリエルに思い知らせるつもりで、俺は一気に根元までペニスを挿入することにした。"
translation = "자신의 매력을 모르는 루리엘에게 뼈저리게 느끼게 해 줄 생각으로, 나는 단숨에 뿌리까지 페니스를 삽입하기로 했다."

[[dialogue]]
speaker = "ルリエル"
original = "「ふぅう──ぁ、ぁああぁっ<emoji=heart04>\u3000おち○ちん、奥までぇっ……来ちゃい、ましたぁっ……<emoji=heart04>」"
translation = "「후우우──아, 아아아앗<emoji=heart04> 자지, 안쪽까지…… 와버렸, 어요……<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「ぁっ──ぁ、ぁっ──ぁあ<emoji=heart04>\u3000おっきぃ……熱々の、おち○ちんっ……ふぁ、あぁ、あぁ、あぁあっ……<emoji=heart04>」"
translation = "「아윽──아, 아윽──아아<emoji=heart04> 커다란…… 뜨끈뜨끈한, 자지…… 하아, 아아, 아아, 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "小柄なルリエルのあそこをかき分けるのは、めまいがするほどに気持ちがよかった。"
translation = "아담한 루리엘의 그곳을 헤집는 것은, 현기증이 날 정도로 기분이 좋았다."

[[dialogue]]
speaker = "ルリエル"
original = "「んんぅっ……ふぅう～……<emoji=heart04>\u3000会長さん、すっごく興奮してくれてます～……<emoji=heart04>」"
translation = "「응으읏…… 후우우~……<emoji=heart04> 회장님, 엄청 흥분해 주시고 계시네요~……<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「いつもと服装が違うから、でしょうか？\u3000はぁあ、ん、んっ……<emoji=heart04>」"
translation = "「평소랑 복장이 달라서, 일까요? 하아아, 응, 윽……<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「い、いいですよ、会長さぁんっ……おち○ちん、いっぱい動かして、ください<emoji=heart04>」"
translation = "「조, 좋아요, 회장니이임…… 자지, 잔뜩 움직여, 주세요<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「ルリエルの天使おま○こに、いっぱい出し入れして、びゅーってして、いいですよー……？」"
translation = "「루리엘의 천사 보지에, 잔뜩 넣었다 뺐다 하고, 뷰우우 하고 해줘도, 괜찮아요……?」"

[[dialogue]]
speaker = "ルリエル"
original = "「んんぅ、ぅ、ふぅ<emoji=heart04>\u3000ぁ、ぁ、ぁっ……<emoji=heart04>\u3000すっごい、気持ちいい、ですぅ……おち○ちんの、ずりずり、ぁ、ぁんっ……<emoji=heart04>」"
translation = "「응으, 윽, 후우<emoji=heart04> 아, 아, 앗……<emoji=heart04> 엄청, 기분 좋아, 요…… 자지가, 질척질척, 아, 아앙……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ムラムラして押し倒すように始まったのに、ルリエルの中はとろとろに濡れそぼっている。"
translation = "욕정이 끓어올라 밀어젖히듯 시작했는데도, 루리엘의 안은 걸쭉하게 젖어 있었다."

[[dialogue]]
speaker = "unk"
original = "ぱんぱんに勃起したペニスに愛液が温かく絡みついて、気持ちいい。"
translation = "팽팽하게 발기한 페니스에 애액이 뜨겁게 얽혀들어, 기분이 좋다."

[[dialogue]]
speaker = "ルリエル"
original = "「んっ……ふぅ、んんっ……<emoji=heart04>\u3000おま○こ、濡れちゃって、ますけどぉっ……ち、違うのですよ？」"
translation = "「응…… 후우, 응윽……<emoji=heart04> 보지, 젖어버렸, 지만요…… 그, 그런 게 아니에요?」"

[[dialogue]]
speaker = "ルリエル"
original = "「お仕事してた時は、んぅ、ぅ<emoji=heart04>\u3000えっちなことなんて、考えてなかったの、ですっ……<emoji=heart04>」"
translation = "「일하고 있었을 때는, 응으, 윽<emoji=heart04> 야한 생각 같은 거, 안 하고 있었던, 거예요……<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「ルリエルは、ぁっ、んんっ<emoji=heart04>\u3000真面目で、高潔な、天使、でぇっ……あ、あっ<emoji=heart04>」"
translation = "「루리엘은, 아, 응윽<emoji=heart04> 성실하고, 고결한, 천사, 라서…… 아, 앗<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「会長さんがお顔を近づけて、チューして……ん、ふぁ、あ<emoji=heart04>\u3000エッチさせてって、お願い、してくるからぁっ……<emoji=heart04>」"
translation = "「회장님이 얼굴을 가까이하고, 츄우 하고…… 응, 하아, 아<emoji=heart04> 섹스하게 해달라고, 부탁, 해오니까……<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「ふうぁ、あ、あぁ、あぁっ……<emoji=heart04>\u3000その瞬間に、ぢゅ、ぢゅわって、濡れちゃった、だけなのですっ……<emoji=heart04>」"
translation = "「후아, 아, 아아, 아아앗……<emoji=heart04> 그 순간에, 쥬, 쥬르륵 하고, 젖어버린, 것뿐이에요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "──何なんだ、その可愛い告白は。"
translation = "──뭐냐고, 그 귀여운 고백은."

[[dialogue]]
speaker = "ルリエル"
original = "「ぁ、ぁ、ぁ、あぁあ、ぁっ<emoji=heart04>\u3000おち○ちん、さっきより奥まで、ぐりぐり、だ、ダメ<emoji=heart04>\u3000ダメなのですっ<emoji=heart04>」"
translation = "「아, 아, 아, 아아아, 앗<emoji=heart04> 자지, 아까보다 안쪽까지, 구리구리, 아, 안 돼<emoji=heart04> 안 되는 거예요<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「なんでダメなの？」"
translation = "「왜 안 되는데?」"

[[dialogue]]
speaker = "ルリエル"
original = "「それは、ぁっ……お、奥、弱いから、です、ぅっ<emoji=heart04>\u3000お、ぁっ……ぁ、ぁ、ぁ、んんんっ<emoji=heart04>」"
translation = "「그건, 아윽…… 오, 깊은 곳, 약하니까, 예요, 윽<emoji=heart04> 오, 아윽…… 아, 아, 아, 응응응윽<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「大好きな会長さんのっ、おち○ちんが奥まで来てるって、思うとっ……あ、ふうぅあ、あぁ、ぁああ～っ……<emoji=heart04>」"
translation = "「정말 좋아하는 회장님의, 자지가 깊숙이까지 오고 있다고, 생각하면…… 아, 후우으아, 아아, 아아아~윽……<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「おへそのとこが、きゅんきゅんしてっ<emoji=heart04>\u3000苦しいのに、も、もっとシてって思っちゃうから、です、ぅ、ぅぅっ……ぁ、ぁあ<emoji=heart04>」"
translation = "「배꼽 있는 데가, 큥큥거려서<emoji=heart04> 괴로운데도, 더, 더 해달라고 생각하게 되니까, 예요, 으, 으으윽…… 아, 아아<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「あ、ぁ、ぁっ<emoji=heart04>\u3000ずぷずぷ、ダメです<emoji=heart04>\u3000もっと好きになっちゃうから、ダメですぅっ……う、ぅ<emoji=heart04>」"
translation = "「아, 아, 아윽<emoji=heart04> 즈푸즈푸, 안 돼요<emoji=heart04> 더 좋아하게 되어버리니까, 안 돼요오윽…… 으, 으<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「良いこと聞いちゃったな。奥、いっぱい突いたらもっと好きになってくれるんだ？」"
translation = "「좋은 말을 들었네. 깊은 곳, 잔뜩 찔러주면 더 좋아해 주는 거야?」"

[[dialogue]]
speaker = "ルリエル"
original = "「ひぁっ<emoji=heart04>\u3000ひぅっ<emoji=heart04>\u3000んぅっ<emoji=heart04>\u3000そ、そうでしゅっ<emoji=heart04>\u3000いっぱいしゅきになっちゃいますっ<emoji=heart04>」"
translation = "「히아윽<emoji=heart04> 히으윽<emoji=heart04> 응으윽<emoji=heart04> 그, 그래요오윽<emoji=heart04> 잔뜩 좋아하게 되어버려요윽<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「ぅ、ぅ──ぁぁ～<emoji=heart04>\u3000だから、りゃ、りゃめえ、なんれ、しゅぅっ……お、ぉ、お、ぉお～っ<emoji=heart04>」"
translation = "「으, 으──아아~<emoji=heart04> 그러니까, 아, 안 돼애, 서어, 요오윽…… 오, 오, 오, 오오~윽<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「もっとルリエルに好きになって欲しい……！\u3000もっと、奥、ぐりぐりって、するぞっ……！」"
translation = "「더 루리에루가 좋아해 줬으면 좋겠어……! 더, 깊은 곳, 구리구리, 할게……!」"

[[dialogue]]
speaker = "ルリエル"
original = "「ふぅぇ、ぇあぁああ<emoji=heart04>\u3000会長さんっ、会長さぁんっ<emoji=heart04>\u3000す、好きぃ<emoji=heart04>\u3000好きでしゅっ、ルリエル、会長さんが好き、好きぃっ<emoji=heart04>」"
translation = "「후우에, 에아아아아<emoji=heart04> 회장님, 회장니임<emoji=heart04> 조, 좋아해<emoji=heart04> 좋아해요오윽, 루리에루, 회장님이 좋아, 좋아아윽<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「んんんぅっ、ぁ、ぁあ～<emoji=heart04>\u3000あっあっあっ<emoji=heart04>\u3000ふぅう、んんう、ぁ、あぁあ、ぁっ<emoji=heart04>」"
translation = "「응응응윽, 아, 아아~<emoji=heart04> 앗앗앗<emoji=heart04> 후우우, 응응우, 아, 아아아, 아윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "天使のおま○こを何度もほじくり返しながら、あらわになっているおっぱいも触る。"
translation = "천사의 보지를 몇 번이고 파헤치면서, 드러나 있는 가슴도 만진다."

[[dialogue]]
speaker = "ルリエル"
original = "「ふぅう、んんう<emoji=heart04>\u3000おっぱい、小さくても、好き、ですかぁっ……？」"
translation = "「후우우, 응응우<emoji=heart04> 가슴, 작아도, 좋아요……?」"

[[dialogue]]
speaker = "クロト"
original = "「もちろん。大好きなルリエルのおっぱいだからっ……ずっと触っていたいくらい」"
translation = "「물론이지. 정말 좋아하는 루리에루의 가슴이니까…… 계속 만지고 싶을 정도야」"

[[dialogue]]
speaker = "ルリエル"
original = "「ぁ、ぁ<emoji=heart04>\u3000嬉しい<emoji=heart04>\u3000触ってください<emoji=heart04>\u3000いっぱい揉んでくださいっ<emoji=heart04>\u3000会長さん好き、好きな人におっぱい触られるの、幸せれしゅっ<emoji=heart04>」"
translation = "「아, 아<emoji=heart04> 기뻐요<emoji=heart04> 만져주세요<emoji=heart04> 잔뜩 주물러주세요윽<emoji=heart04> 회장님 좋아, 좋아하는 사람에게 가슴 만져지는 거, 행복해요오윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "さくら色の乳首をつまんだり、しぼるようにおっぱいを揉んだりするたび、ペニスへの締め付けが変わるから、気持ちよくてクラクラする……！"
translation = "벚꽃색 유두를 꼬집거나, 짜내듯이 가슴을 주무를 때마다, 페니스로의 조임이 변하기에, 기분 좋아서 어질어질하다……!"

[[dialogue]]
speaker = "ルリエル"
original = "「中で、んん、んぅっ……おち○ちん、もっと硬くなって、太くなってっ……ふぁ、ぁ<emoji=heart04>\u3000ふぇあああぁっ<emoji=heart04>」"
translation = "「안에서, 응응, 응윽…… 자지, 더 딱딱해지고, 굵어져서…… 화, 아<emoji=heart04> 후에아아아윽<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「ちっちゃいですけど、会長さん、だけの、専用、のっ<emoji=heart04>\u3000おっぱい、れすからぁっ……<emoji=heart04>」"
translation = "「조그맣지만, 회장님, 만의, 전용, 이에요오윽……<emoji=heart04> 가슴, 이니까아윽……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ルリエルのおっぱいは、俺だけのもの？」"
translation = "「루리에루의 가슴은, 내 것?」"

[[dialogue]]
speaker = "ルリエル"
original = "「は、はいぃっ<emoji=heart04>\u3000大好きな会長さんのものですっ<emoji=heart04>\u3000いつでも、見たり、触ったりしていい、おっぱいです<emoji=heart04>」"
translation = "「네, 네에윽<emoji=heart04> 정말 좋아하는 회장님의 거예요윽<emoji=heart04> 언제든, 보거나, 만지거나 해도 좋은, 가슴이에요<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「おま○こも？」"
translation = "「보지도?」"

[[dialogue]]
speaker = "ルリエル"
original = "「もちろんです、こ、こういう場所で、求められるの、困っちゃいます、けどぉっ……会長さんがしたいなら、い、いつでも<emoji=heart04>」"
translation = "「물론이에요, 이, 이런 장소에서, 요구받는 거, 곤란해버려요, 하지만…… 회장님이 하고 싶다면, 어, 언제든지<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「おち○ちん入れてっ、ぱんぱん<emoji=heart04>\u3000射精するための、ぱんぱんっ<emoji=heart04>\u3000していい、ですぅ<emoji=heart04>\u3000あ、あぁ、ぁ<emoji=heart04>\u3000好き、好き、好きぃ<emoji=heart04>」"
translation = "「자지 넣어줘, 팡팡<emoji=heart04> 사정하기 위한, 팡팡<emoji=heart04> 해도 좋아요오<emoji=heart04> 아, 아아, 아<emoji=heart04> 좋아, 좋아, 좋아아<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「……キスしたいな。ルリエルの唇も、俺専用？」"
translation = "「……키스하고 싶네. 루리에르의 입술도, 내 전용?」"

[[dialogue]]
speaker = "ルリエル"
original = "「もちろんなのですっ<emoji=heart04>\u3000会長さん、いっぱいチュー、してくださいっ<emoji=heart04>」"
translation = "「물론인 거예요<emoji=heart04> 회장님, 잔뜩 츄, 해주세요<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「んっぢゅぅ、んれぇえ、ちゅぱ、んぷちゅっ、ちゅ、ちゅるぅ、れぇえ、れちゃ、れちゅれりゅれりゅ<emoji=heart04>\u3000ちゅるる、ちゅぅ、ちゅる<emoji=heart04>」"
translation = "「응쮸우, 응레에에, 츄파, 응푸츄, 츄, 츄루, 레에, 레챠, 레츄레류레류<emoji=heart04> 츄루루, 츄우, 츄루<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ちょっとしたスキンシップのキスなんかじゃなく、お互い夢中で舌を絡ませるようなキス。"
translation = "가벼운 스킨십인 키스가 아니라, 서로 꿈속에서 혀를 얽는 듯한 키스."

[[dialogue]]
speaker = "ルリエル"
original = "「会長さんとのキス、しゅきぃっ……チューしながらえっちするの、いっちばん、しゅきぃっ……んむぅ、んむちゅる、れるれるれる<emoji=heart04>」"
translation = "「회장님과의 키스, 죠아아…… 츄하면서 에치하는 거, 제이일, 죠아아…… 응무우, 응무츄루, 레를레를레를<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「ルリエルのおくち、いっぱい、愛してくださぁいっ……しゅき、しゅきぃ、会長さん、んんぅっ、ちゅば、ちゅるる、れぇえ、ちゅぱ<emoji=heart04>」"
translation = "「루리에르의 입안, 잔뜩, 사랑해주세요오…… 죠아, 죠아아, 회장님, 응응으, 츄바, 츄루루, 레에에, 츄파<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "あどけない笑顔が可愛くて、食いしん坊で、みんなのマスコットみたいなルリエルの唇を犯す。"
translation = "천진난만한 미소가 귀엽고, 먹보에다, 모두의 마스코트 같은 루리에르의 입술을 범한다."

[[dialogue]]
speaker = "unk"
original = "普段、真面目に仕事をしている星徒会室で、口元をべたべたにしてしまうくらいの深いキスは、とても気持ちよくて──"
translation = "평소, 성실하게 업무를 보는 성도회실에서, 입가를 끈적하게 만들어 버릴 정도의 깊은 키스는, 무척 기분 좋아서──"

[[dialogue]]
speaker = "ルリエル"
original = "「んんぅう<emoji=heart04>\u3000会長さっ、んちゅるぅ、んぅ、んぅんぅ<emoji=heart04>\u3000おっぱい、くりくり、らめぇ<emoji=heart04>\u3000はぷ、んゅぅ<emoji=heart04>\u3000じゅるれるれりゅ<emoji=heart04>」"
translation = "「응응으으<emoji=heart04> 회장니, 응츄루, 응, 응응으<emoji=heart04> 가슴, 굴리는 거, 안대애<emoji=heart04> 하푸, 응유우<emoji=heart04> 쥬루렐레류<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「んんんぅっ<emoji=heart04>\u3000んっ、んんっんんっ──んんんぅ～～～っ──ぷはぁあっ<emoji=heart04>」"
translation = "「응응응으<emoji=heart04> 응, 응응응응──응응응으~~~──푸하아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「はーっ……はーっ……<emoji=heart04>\u3000ちょっと、イっちゃい、ました、ぁっ……<emoji=heart04>」"
translation = "「하아…… 하아……<emoji=heart04> 조금, 가버렸, 어요, 오……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "律儀に報告してくれるルリエルがあんまり愛おしくって、もっと感じさせたいと思ってしまった。"
translation = "꼬박꼬박 보고해 주는 루리에르가 너무나 사랑스러워서, 좀 더 느끼게 해주고 싶어졌다."

[[dialogue]]
speaker = "クロト"
original = "「イったばかりでごめん。速くするね」"
translation = "「방금 갔는데 미안. 빨리 할게」"

[[dialogue]]
speaker = "ルリエル"
original = "「え──？」"
translation = "「에──?」"

[[dialogue]]
speaker = "ルリエル"
original = "「くっふ──ぅ！？<emoji=heart04>\u3000あ、ぁ、、ああ、ぁあ、あぁっ<emoji=heart04>\u3000おち○ちん、ん、んんぅっ<emoji=heart04>\u3000はげしっ……れ、すぅっ……<emoji=heart04>」"
translation = "「큿후──우!?<emoji=heart04> 아, 아,, 아아, 아아, 아앗<emoji=heart04> 자지, 응, 응응으<emoji=heart04> 격렬해…… 요오……<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「ふう、ぁ、あっあっ、ぁ<emoji=heart04>\u3000ぁ、ぁあ、ぁ～っ<emoji=heart04>\u3000そんな奥、ぐりぐり、したらっ……また、イっちゃい、ま、すっ……<emoji=heart04>」"
translation = "「후우, 아, 앗앗, 아<emoji=heart04> 아, 아아, 아~앗<emoji=heart04> 그런 깊은 곳, 구리구리, 하면…… 또, 가버려, 요, 옷……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ルリエルのイくところ、もっと見たいな」"
translation = "「루리에르가 가는 모습, 더 보고 싶네」"

[[dialogue]]
speaker = "ルリエル"
original = "「ら、らめらめっ<emoji=heart04>\u3000ぁ、ぅう、ぁ、ぁ、ぁっ<emoji=heart04>\u3000気持ちいいの、ずっと続いて、ふぅ、ぁ、あ、ぁっ<emoji=heart04>\u3000んんんぁ、あぁ～っ……！<emoji=heart04>」"
translation = "「아, 안대안대<emoji=heart04> 아, 으우, 아, 아, 앗<emoji=heart04> 기분 좋은 거, 계속 이어져서, 후우, 아, 아, 앗<emoji=heart04> 응응응아, 아아~앗……!<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「らめれす、ぅっ……会長さんっ、手加減、してくださいっ……うぁ、ぁっ……おへその裏、そんなごりごり、したら、ぁっ──！<emoji=heart04>」"
translation = "「안 돼여, 윽…… 회장님, 사, 살살 해주세욧…… 우아, 아윽…… 배꼽 뒤쪽, 그렇게 고리고리, 하면, 아윽──! <emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ごりごりしたら？」"
translation = "「고리고리하면?」"

[[dialogue]]
speaker = "ルリエル"
original = "「またイっちゃいますっ、ふぅ、ぅ、ふうぅっ<emoji=heart04>\u3000ふうぁ、ぅあ、あっあっあっ<emoji=heart04>\u3000イっちゃいますからぁ、あぁっ<emoji=heart04>」"
translation = "「또 가버려욧, 후우, 윽, 후우우윽 <emoji=heart04> 후우아, 으아, 앗 앗 앗 <emoji=heart04> 가버리니까아, 아아윽 <emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「イく時、変なお顔、しちゃいますからぁっ<emoji=heart04>\u3000らめなんれすっ、あっ、あっあっ、あっ、ぁぁああっ<emoji=heart04>」"
translation = "「가버릴 때, 이상한 얼굴, 해버리니까아앗 <emoji=heart04> 안 되는 거예여, 앗, 앗 앗, 앗, 아아아아앗 <emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「変じゃないよ。ルリエルのイく顔、ものすごく可愛いから。何回でも見たいよ」"
translation = "「이상하지 않아. 루리엘이 가버리는 얼굴, 엄청나게 귀여우니까. 몇 번이고 보고 싶어」"

[[dialogue]]
speaker = "ルリエル"
original = "「ふぅ──うぅ、ぅうぅぅぅっ<emoji=heart04>\u3000そんなのずるいですっ、あ、ぅあっ、あぁ、あぁ、ぁあっ<emoji=heart04>\u3000イく、イく、イく、イく──<emoji=heart04>」"
translation = "「후우── 우윽, 으으으으윽 <emoji=heart04> 그런 건 치사해욧, 아, 으앗, 아아, 아아, 아아윽 <emoji=heart04> 가, 가, 가, 가── <emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「ま、またイっちゃいま──す、ぅう、ぅぅうぅ～っ！<emoji=heart04>\u3000あっあっあっあっあっ──ぁぁあ～っ！<emoji=heart04>」"
translation = "「또, 또 가버려어──욧, 으우, 으으우우~윽! <emoji=heart04> 앗 앗 앗 앗 앗── 아아아~윽! <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ピストン中のペニスが、ぎゅうううっ！\u3000と締め付けられる。"
translation = "피스톤 중인 자지가, 뀨우우우욱! 하고 조여진다."

[[dialogue]]
speaker = "unk"
original = "つま先までピンと伸ばして絶頂するルリエルの痴態があんまりにも可愛いから、俺の性欲にさらに火がついてしまって。"
translation = "발끝까지 꼿꼿이 펴고 절정하는 루리엘의 치태가 너무나도 귀여워서, 내 성욕에 더욱 불이 붙어버렸다."

[[dialogue]]
speaker = "unk"
original = "腰のペースを一切落とさず、射精に向かうことにした。"
translation = "허리의 속도를 일절 늦추지 않고, 사정을 향해 나아가기로 했다."

[[dialogue]]
speaker = "ルリエル"
original = "「んん～～～っ！<emoji=heart04>\u3000んんぅっ！<emoji=heart04>\u3000ふぇあ、あぁあ、ぁああっ<emoji=heart04>」"
translation = "「음음~~~윽! <emoji=heart04> 음음윽! <emoji=heart04> 페아, 아아아, 아아아윽 <emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「おち○ちん、なんで、止まって、くれなっ──ひぃぃいっ<emoji=heart04>\u3000あ、あぁあ<emoji=heart04>\u3000ふぇえあ、あぁ、あぁあっ！<emoji=heart04>」"
translation = "「자지, 왜, 멈춰주지 않── 히이이익 <emoji=heart04> 아, 아아아 <emoji=heart04> 페에아, 아아, 아아앗! <emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「会長さんっ、これダメこれダメこれダメっ<emoji=heart04>\u3000ダメれすようっ<emoji=heart04>\u3000おま○こイってましゅっ<emoji=heart04>\u3000イってましゅ、ぅうぅうっ<emoji=heart04>」"
translation = "「회장님, 이거 안 돼 이거 안 돼 이거 안 돼욧 <emoji=heart04> 안 돼여어 <emoji=heart04> 보지 가버려어욧 <emoji=heart04> 가버려어, 으우으우윽 <emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「ぱんぱん、止めてぇっ<emoji=heart04>\u3000気持ちいいの、止めてぇええっ<emoji=heart04>\u3000ふぅあっ<emoji=heart04>\u3000あぁっ<emoji=heart04>\u3000あっあっあっあっあっ<emoji=heart04>\u3000あぁああ～っ……！<emoji=heart04>」"
translation = "「팡팡, 멈춰줘어 <emoji=heart04> 기분 좋은 거, 멈춰줘어어어억 <emoji=heart04> 후우앗 <emoji=heart04> 아앗 <emoji=heart04> 앗 앗 앗 앗 앗 <emoji=heart04> 아아아아~윽……! <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスでひと突きするたびに、ビクビク、ガクガク、快感で痙攣するルリエルが愛おしくて。"
translation = "자지로 한 번 찌를 때마다, 파르르, 부르르, 쾌감으로 경련하는 루리엘이 사랑스러워서."

[[dialogue]]
speaker = "クロト"
original = "「もうちょっとだけ、我慢して……！\u3000ルリエルっ……！」"
translation = "「조금만 더, 참아줘……! 루리엘……!」"

[[dialogue]]
speaker = "ルリエル"
original = "「ふぅうっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000あっ、ひぁあ、ぁ、ぅあ、ぁ、ぁ、ぁ、ぁ、ぁっ……！<emoji=heart04>」"
translation = "「후우우윽 <emoji=heart04> 아앙 <emoji=heart04> 앗, 히아아, 아, 으아, 아, 아, 아, 아, 아앗……! <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ルリエルの太ももを掴んで、お尻を叩くみたいに強くペニスを出し入れする。"
translation = "루리엘의 허벅지를 붙잡고, 엉덩이를 때리듯이 강하게 자지를 넣었다 뺐다 한다."

[[dialogue]]
speaker = "ルリエル"
original = "「が、頑張りますっ……頑張ります、からぁっ……！<emoji=heart04>\u3000キス、してぇっ……！<emoji=heart04>」"
translation = "「버, 버틸게요…… 버틸 테니까아……! <emoji=heart04> 키스, 해줘어……! <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "おねだりに答えて、激しいピストンをしながら深く口づけをする。"
translation = "부탁에 응하여, 격렬한 피스톤을 하며 깊게 입을 맞춘다."

[[dialogue]]
speaker = "ルリエル"
original = "「んんちゅぅうう、れるれる、んちゅる<emoji=heart04>\u3000ちゅっぱ、ちゅるう、んちゅぅ、ちゅぱ、んちゅる、ちゅう、れぇっ<emoji=heart04>」"
translation = "「음음츄우우우, 낼름낼름, 음츄르 <emoji=heart04> 츕파, 츄르우, 음츄우, 츄파, 음츄르, 츄, 레에윽 <emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「んんちゅるる、れぇええっ<emoji=heart04>\u3000ちゅぱ、れりゅれりゅ<emoji=heart04>\u3000んんちゅるぅ、ちゅぱ、ちゅるぅ、んちゅる、ちゅるぅう……ぷぁあ<emoji=heart04>」"
translation = "「음음츄르르, 레에에에윽 <emoji=heart04> 츄파, 레류레류 <emoji=heart04> 음음츄르우, 츄파, 츄르우, 음츄르, 츄르우우…… 푸아아 <emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「はぁあああっ<emoji=heart04>\u3000ふぅううっ<emoji=heart04>\u3000んんぅっ、んんぅっ……おち○ちん、あ、ぁっ……震えて、ます、これって、これってっ……<emoji=heart04>」"
translation = "「하아아아앗 <emoji=heart04> 후우우우윽 <emoji=heart04> 음음윽, 음음윽…… 자지, 아, 아윽…… 떨리고, 있어요, 이건, 이건…… <emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「イっちゃう、んですか？\u3000射精、しそうなんですか、会長さんっ……<emoji=heart04>」"
translation = "「가버리는, 건가요? 사정, 할 것 같나요, 회장님…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ぞくぞくと沸きあがってくる射精欲をルリエルに指摘され、うなずく。"
translation = "속속들이 끓어오르는 사정욕을 루리엘에게 지적받고, 고개를 끄덕인다."

[[dialogue]]
speaker = "ルリエル"
original = "「な、中にっ……欲しい、です……<emoji=heart04>」"
translation = "「아, 안에…… 갖고 싶어, 요…… <emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「会長さんの精液っ……ぜんぶ、ルリエルのお腹の、奥っ……赤ちゃんのお部屋に、くださいっ……！<emoji=heart04>」"
translation = "「회장님의 정액…… 전부, 루리엘의 배, 안쪽…… 아기방에, 주세요……! <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "おねだりされた瞬間、精液がものすごい勢いで昇ってきた──"
translation = "부탁받은 순간, 정액이 엄청난 기세로 치솟아 올랐다──"

[[dialogue]]
speaker = "ルリエル"
original = "「ぁ、イくっ……ルリエル、またイきますっ、イっちゃい、ます、イく、イくイく、イくイくイくイくイくっ──！<emoji=heart04>」"
translation = "「아, 가버려…… 루리엘, 또 가버려요, 가버려, 요, 가, 가 가, 가 가 가 가 가앗──! <emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ルリエルっ……！」"
translation = "「루리엘……!」"

[[dialogue]]
speaker = "ルリエル"
original = "「ふううぁ、あぁ、あぁあ、あぁああ～っ！<emoji=heart04>\u3000あっあっ！<emoji=heart04>\u3000あっ、あぁああ、あぁ～っ！<emoji=heart04>」"
translation = "「후우우아, 아아, 아아아, 아아아아~앗! <emoji=heart04> 앗 앗! <emoji=heart04> 앗, 아아아아, 아아~앗! <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "打ち付けるように、ルリエルの中で精液をぶちまけた。"
translation = "내리치듯이, 루리엘의 안에서 정액을 쏟아냈다."

[[dialogue]]
speaker = "ルリエル"
original = "「す、すごっ……い、量ですっ……ぅあ、あっ！\u3000どくどくって、震えてっ……あ！<emoji=heart04>\u3000ふぅ、ぅうっ<emoji=heart04>\u3000んんぅ、ぅっ……！<emoji=heart04>」"
translation = "「우, 와…… 이, 양이에요…… 으아, 앗! 울컥울컥하고, 떨려서…… 아! <emoji=heart04> 후우, 으윽 <emoji=heart04> 음음으, 윽……! <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "絶頂してひと際強く締まるルリエルのおま○この中で、ペニスが揉まれている。踏ん張らないと腰が抜けてしまいそうだった。"
translation = "절정하여 한층 더 강하게 조여지는 루리엘의 보지 안에서, 자지가 비벼지고 있다. 버티지 않으면 허리에 힘이 풀려버릴 것 같았다."

[[dialogue]]
speaker = "ルリエル"
original = "「会長さんのっ……大好きな会長さんのっ……精液……ぁ、ぅう、んんぅ、ぅうう、ぅ～っ……！<emoji=heart04>」"
translation = "「회장님의…… 너무나 좋아하는 회장님의…… 정액…… 아, 으우, 음음으, 으으우, 으~윽……! <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ぎゅーっ、ぎゅーっ、ぎゅーっ……と、一滴残さず搾り取られるような、最高の射精は、十数秒も続いて……"
translation = "꽉, 꽉, 꽉…… 하고, 한 방울도 남김없이 짜내지는 듯한, 최고의 사정은 십수 초나 이어졌고……"

[[dialogue]]
speaker = "ルリエル"
original = "「ふはぁあ～っ……はぁあああーっ……ふぅううーっ……<emoji=heart04>」"
translation = "「후하아아~아…… 하아아아아─…… 후우우우─…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "くたっ、とルリエルが脱力して、ようやく俺も全身のこばわりが抜けた。"
translation = "탁, 하고 루리엘이 탈력하자, 겨우 나도 전신의 경직이 풀렸다."

[[dialogue]]
speaker = "unk"
original = "もうひとしずくも出ない、と言い切れるくらいの射精であったにもかかわらず、ペニスはまだ勃起を維持したまま。"
translation = "이제 한 방울도 나오지 않는다, 라고 단언할 수 있을 정도의 사정이었음에도 불구하고, 페니스는 아직 발기를 유지한 채."

[[dialogue]]
speaker = "unk"
original = "ルリエルの中があまりに気持ちよすぎて、弾切れになってもなお、萎えられない。本当に、気持ちがよかった。"
translation = "루리엘의 안이 너무나 기분 좋아서, 총알이 떨어졌는데도 여전히 시들지 않는다. 정말로, 기분이 좋았다."

[[dialogue]]
speaker = "ルリエル"
original = "「ま……満足、してくれましたか……？\u3000会長さぁん……」"
translation = "「마…… 만족, 하셨나요……? 회장님……」"

[[dialogue]]
speaker = "クロト"
original = "「うん……なんか、ごめん。ちょっと乱暴だったかも……」"
translation = "「응…… 왠지, 미안. 조금 난폭했을지도……」"

[[dialogue]]
speaker = "ルリエル"
original = "「いえ……ルリエルも、久しぶりのえっちで、すっごく盛り上がっちゃったのです……」"
translation = "「아니에요…… 루리엘도, 오랜만의 에치라서, 엄청 달아올라 버린 거예요……」"

[[dialogue]]
speaker = "ルリエル"
original = "「でも……会長さん、確かにすごく興奮しちゃってました……この服、そんなに良かったですか……？」"
translation = "「그치만…… 회장님, 확실히 굉장히 흥분하셨어요…… 이 옷, 그렇게 좋았나요……?」"

[[dialogue]]
speaker = "ルリエル"
original = "「もしかして、コスプレの趣味があったり……とか♪」"
translation = "「혹시, 코스프레 취미가 있다거나…… 라든지♪」"

[[dialogue]]
speaker = "ルリエル"
original = "「でしたらルリエル、今度エッチする時も衣装を持ってくるのです<emoji=heart04>」"
translation = "「그렇다면 루리엘, 다음에 에치할 때도 의상을 가져오는 거예요 <emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「体操服とか、水着とか、ちょっとエッチな下着とか……色々な格好で誘惑しちゃいますよぅ♪」"
translation = "「체육복이라든가, 수영복이라든가, 조금 야한 속옷이라든가…… 여러 가지 모습으로 유혹해 버릴게요♪」"

[[dialogue]]
speaker = "ルリエル"
original = "「それでも会長さんが喜ばなかったら、コスプレは趣味じゃないって認めてあげます♪」"
translation = "「그래도 회장님이 기뻐하지 않으신다면, 코스프레는 취미가 아니라고 인정해 드릴게요♪」"

[[dialogue]]
speaker = "クロト"
original = "「……もしもコスプレが趣味だって結論になったら、どうなるんだ？」"
translation = "「……만약 코스프레가 취미라는 결론이 나면, 어떻게 되는 거지?」"

[[dialogue]]
speaker = "ルリエル"
original = "「そうですね。こっそりガイドブックに書いちゃうかもしれません。『新星学園の会長さんはコスプレ大好き』って♪」"
translation = "「글쎄요. 몰래 가이드북에 써버릴지도 몰라요. 『신성 학원의 회장님은 코스프레를 아주 좋아함』이라고♪」"

[[dialogue]]
speaker = "unk"
original = "流石にそんな記述が残ったらまずい──いたずらっぽく笑うルリエルに、苦笑いを返す俺なのだった。"
translation = "과연 그런 기술이 남으면 곤란하다── 장난스럽게 웃는 루리엘에게, 쓴웃음을 돌려주는 나였다."

[[dialogue]]
speaker = "ルリエル２Ｂ"
original = "「んぅうっ<emoji=heart04>\u3000んちゅる<emoji=heart04>\u3000ちゅぱ<emoji=heart04>\u3000れるれる<emoji=heart04>\u3000んちゅる<emoji=heart04>\u3000ちゅぅう<emoji=heart04>\u3000れぇえ～っ<emoji=heart04>\u3000れろれろ<emoji=heart04>\u3000んれろっ<emoji=heart04>\u3000んちゅる<emoji=heart04>\u3000れぇっ<emoji=heart04>\u3000じゅるれりゅれりゅ<emoji=heart04>\u3000んちゅるるっ<emoji=heart04>\u3000んれろれろっ、んちゅるるっ<emoji=heart04>\u3000んぷぁあっ<emoji=heart04>」"
translation = "「음으으윽 <emoji=heart04> 음츄르 <emoji=heart04> 츄파 <emoji=heart04> 레루레루 <emoji=heart04> 음츄르 <emoji=heart04> 츄우우 <emoji=heart04> 레에에~엣 <emoji=heart04> 레로레로 <emoji=heart04> 음레로 <emoji=heart04> 음츄르 <emoji=heart04> 레엣 <emoji=heart04> 쥬루레류레류 <emoji=heart04> 음츄르르 <emoji=heart04> 음레로레로, 음츄르르 <emoji=heart04> 음푸아아 <emoji=heart04>」"

