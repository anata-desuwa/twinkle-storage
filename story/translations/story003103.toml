[[dialogue]]
speaker = "unk"
original = "晴れ着フォームの力を手に入れる為、獅子舞と羽根突き勝負をすることになった星騎士たち。"
translation = "설빔 폼의 힘을 손에 넣기 위해 사자탈과 하네츠키 승부를 하게 된 성기사들."

[[dialogue]]
speaker = "unk"
original = "ソフィア、ウズメイア、舞亜の３人も加勢するが、しかし――"
translation = "소피아, 우즈메, 마이아 세 사람도 가세하지만, 그러나――"

[[dialogue]]
speaker = "獅子舞"
original = "「食らうがいい。<ruby>七彩<rt>しちさい</rt></ruby>流羽根突き術・壱ノ型『<ruby>赤<rt>あか</rt></ruby>』！」"
translation = "「받아라. 칠채류 하네츠키술 제1형 『적』!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「うわっ！？\u3000ダメだ、取れないし！\u3000獅子舞さんの技、強過ぎなんだけど～！」"
translation = "「우왓!? 안 돼, 못 받겠어! 사자탈 씨 기술, 너무 강한데~!」"

[[dialogue]]
speaker = "ソフィア"
original = "「あっという間に負けてしまいました。これで私たち全員、ストレート負け……」"
translation = "「순식간에 져버렸습니다. 이걸로 우리 전원 스트레이트 패배……」"

[[dialogue]]
speaker = "アナ"
original = "「まさか、ただの羽根突きではなく、晴れ着の武器や術を使って、羽根を落とさないように打ち合う『星術羽根突き』とは……」"
translation = "「설마 단순한 하네츠키가 아니라 설빔의 무기나 술법을 사용해 깃털을 떨어뜨리지 않게 주고받는 『성술 하네츠키』일 줄이야……」"

[[dialogue]]
speaker = "unk"
original = "獅子舞は正月の力で作り出した宙に浮く羽子板１つで、自身は１度も羽根を落とさず、星騎士たちに全勝してみせていた。"
translation = "사자탈은 정월의 힘으로 만들어낸 공중에 뜬 하고이타 하나로, 자신은 한 번도 깃털을 떨어뜨리지 않고 성기사들에게 전승을 거두고 있었다."

[[dialogue]]
speaker = "舞亜"
original = "「獅子舞さん、とんでもない腕前だね。世界レベルのスケーターを目の前で見ているような、輝く星が見えたよ」"
translation = "「사자탈 씨, 엄청난 솜씨네. 세계 레벨의 스케이터를 눈앞에서 보고 있는 것 같은 빛나는 별이 보였어」"

[[dialogue]]
speaker = "獅子舞"
original = "「ふふん、当然だ。お前ら小娘共とは年季が違う。何より、今日は元旦というこの上なく縁起の良き日」"
translation = "「후훈, 당연하다. 네놈들 계집애들과는 짬밥이 다르다. 무엇보다 오늘은 설날이라는 더할 나위 없이 길조인 날」"

[[dialogue]]
speaker = "獅子舞"
original = "「朝の流星市国ニュース番組『もにスタ』でも、元旦生まれ山羊座の吾輩の運勢は、１位だったのだからな！」"
translation = "「아침 유성 시국 뉴스 프로그램 『모니스타』에서도, 설날 태생 염소자리인 이 몸의 운세는 1위였으니까 말이다!」"

[[dialogue]]
speaker = "サーシャ"
original = "「獅子舞さんも、ニュースの占いコーナーを見たりするのね～♪」"
translation = "「사자탈 씨도 뉴스 점술 코너를 보기도 하는구나~♪」"

[[dialogue]]
speaker = "獅子舞"
original = "「ふん、無論。縁起は大事だからな」"
translation = "「흥, 물론이다. 길조는 중요하니까 말이지」"

[[dialogue]]
speaker = "リーリア"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "シズハ"
original = "「リーリア先輩？\u3000どうかしました？」"
translation = "「리리아 선배? 왜 그러세요?」"

[[dialogue]]
speaker = "リーリア"
original = "「え？\u3000あっ、ううん、獅子舞さんの技がすごく綺麗だったから、思わず見惚れちゃって……」"
translation = "「에? 앗, 아니, 사자탈 씨 기술이 너무 예뻐서 나도 모르게 넋을 잃고 보느라……」"

[[dialogue]]
speaker = "獅子舞"
original = "「ふむ……」"
translation = "「흠……」"

[[dialogue]]
speaker = "リーリア"
original = "「って、わっ！？\u3000な、なんですか？\u3000獅子舞さんもじ～っと見てきたりして……私の顔になんか付いてます？」"
translation = "「앗, 와앗!? 뭐, 뭔가요? 사자탈 씨도 빤히 쳐다보고…… 제 얼굴에 뭐 묻었나요?」"

[[dialogue]]
speaker = "獅子舞"
original = "「魔女の星騎士……渋谷リーリアといったか。吾輩は――」"
translation = "「마녀 성기사…… 시부야 리리아라고 했나. 이 몸은――」"

[[dialogue]]
speaker = "獅子舞"
original = "「特に、お前を認めん！」"
translation = "「특히 너를 인정 못 한다!」"

[[dialogue]]
speaker = "リーリア"
original = "「えええぇっ！？\u3000突然なんなんですかぁ！？」"
translation = "「에에에엑!? 갑자기 무슨 소리예요!?」"

[[dialogue]]
speaker = "獅子舞"
original = "「それだけお前が晴れ着を着こなせていない、ということだ」"
translation = "「그만큼 네가 설빔을 제대로 소화하지 못하고 있다는 소리다」"

[[dialogue]]
speaker = "獅子舞"
original = "「他の者たちも、これではまるで相手にならん。星騎士ならば、もっと晴れ着の力を使いこなしてみせよ！\u3000故に――」"
translation = "「다른 녀석들도 이래서는 도저히 상대가 안 된다. 성기사라면 좀 더 설빔의 힘을 능숙하게 다뤄 보아라! 고로――」"

[[dialogue]]
speaker = "獅子舞"
original = "「これより各自、吾輩が用意したくじ引きで２人ずつの組に分かれ、羽根突きの練習をするがいい！」"
translation = "「지금부터 각자 이 몸이 준비한 제비뽑기로 두 명씩 조를 나누어 하네츠키 연습을 하도록 해라!」"

[[dialogue]]
speaker = "シズハ"
original = "「こ、これはちょっと、思っていたより大変そうかも……」"
translation = "「이, 이건 좀 생각했던 것보다 힘들 것 같을지도……」"

[[dialogue]]
speaker = "ディーラック"
original = "「やれやれ、予想していた通り、面倒な展開になったのサ」"
translation = "「에휴, 예상했던 대로 귀찮은 전개가 됐다구」"

[[dialogue]]
speaker = "unk"
original = "それから獅子舞の指示通り、羽根突きの練習を開始することになった。"
translation = "그리하여 사자탈의 지시대로 하네츠키 연습을 시작하게 되었다."

[[dialogue]]
speaker = "unk"
original = "結界内は広く使えるということで、チーム別に練習場所を変えようと、シズハとリーリアは大門前へと移動してきた。"
translation = "결계 안은 넓게 쓸 수 있으니 팀별로 연습 장소를 바꾸자며 시즈하와 리리아는 대문 앞으로 이동해 왔다."

[[dialogue]]
speaker = "リーリア"
original = "「なんか変なことになっちゃったけど、シズハちゃん、よろしくね～☆」"
translation = "「왠지 이상하게 돼버렸지만, 시즈하짱 잘 부탁해~☆」"

[[dialogue]]
speaker = "シズハ"
original = "「はい！\u3000リーリア先輩、こちらこそよろしくお願いします」"
translation = "「네! 리리아 선배, 저야말로 잘 부탁드립니다」"

[[dialogue]]
speaker = "リーリア"
original = "「それじゃあ、行きますよ～？\u3000えいっ☆」"
translation = "「그럼 갑니다~? 에잇☆」"

[[dialogue]]
speaker = "シズハ"
original = "「おっと！\u3000先輩、鋭い打ち込み……！」"
translation = "「오옷! 선배, 날카로운 공격……!」"

[[dialogue]]
speaker = "シズハ"
original = "「先輩って、羽根突きを前にもやったこと、あったりするんですか？\u3000すごく上手ですっ」"
translation = "「선배는 하네츠키를 전에도 해본 적이 있으신가요? 엄청 잘하시네요」"

[[dialogue]]
speaker = "リーリア"
original = "「ううん、私は羽根突きするの、今日が初めてだよ～っ」"
translation = "「아니, 나 하네츠키 하는 거 오늘이 처음이야~」"

[[dialogue]]
speaker = "シズハ"
original = "「えっ、そうなんですか！？」"
translation = "「엣, 정말인가요!?」"

[[dialogue]]
speaker = "リーリア"
original = "「うん。私、目で見て覚えるのは得意なんだよね～☆\u3000えいっ！」"
translation = "「응. 나 눈으로 보고 배우는 건 자신 있거든~☆ 에잇!」"

[[dialogue]]
speaker = "シズハ"
original = "「すごい！\u3000バトルフェスタの戦いを見てた時も思いましたけど、リーリア先輩って、やっぱりすごい魔女なんですね！」"
translation = "「대단해요! 배틀 페스타 때 싸움을 봤을 때도 생각했지만, 리리아 선배는 역시 대단한 마녀군요!」"

[[dialogue]]
speaker = "リーリア"
original = "「ふっふ～ん、強くて可愛い先輩でしょ～？」"
translation = "「훗후~ㄴ, 강하고 귀여운 선배지~?」"

[[dialogue]]
speaker = "unk"
original = "羽根突きを続けたまま、ウインクして見せるリーリア。"
translation = "하네츠키를 계속하며 윙크해 보이는 리리아."

[[dialogue]]
speaker = "リーリア"
original = "「そういえばシズハちゃんに、聞きたかったことあるんだけど～っ」"
translation = "「그러고 보니 시즈하짱한테 물어보고 싶은 게 있는데~」"

[[dialogue]]
speaker = "シズハ"
original = "「はい、なんでしょう？」"
translation = "「네, 뭔가요?」"

[[dialogue]]
speaker = "リーリア"
original = "「獅子舞さんがロストアイテムだって名乗った時、シズハちゃん、何か知ってるみたいだったじゃない？」"
translation = "「사자탈 씨가 로스트 아이템이라고 자처했을 때, 시즈하짱 뭔가 알고 있는 것 같았잖아?」"

[[dialogue]]
speaker = "シズハ"
original = "「……！\u3000えっと～、それはなんていうか……」"
translation = "「……! 저기~ 그건 뭐랄까……」"

[[dialogue]]
speaker = "リーリア"
original = "「実は私も魔女の森にある文献で、ロストアイテムっていうものが存在していることは、読んだことがあって――」"
translation = "「사실 나도 마녀의 숲에 있는 문헌에서 로스트 아이템이라는 게 존재한다는 건 읽어본 적이 있어서――」"

[[dialogue]]
speaker = "リーリア"
original = "「その中には、大昔の魔女が作り出した物も多くあるって……」"
translation = "「그중에는 아주 먼 옛날 마녀가 만들어낸 물건도 많이 있다고……」"

[[dialogue]]
speaker = "シズハ"
original = "（どうしよう、トレジアンナさんからロストアイテムの回収については、特にネビュラの人たちには話さないようにって口止めされてるんだよね……）"
translation = "（어쩌지, 트레지아나 씨가 로스트 아이템 회수에 대해서는 특히 네뷸라 사람들한테는 말하지 말라고 입단속 시켰는데……）"

[[dialogue]]
speaker = "リーリア"
original = "「あと、シズハちゃんのそばにずっとくっ付いてる、その『ディーちゃん』って子も気になるし……」"
translation = "「그리고 시즈하짱 곁에 계속 붙어있는 그 『디짱』이라는 애도 신경 쓰이고……」"

[[dialogue]]
speaker = "ディーラック"
original = "「あん？\u3000ボクかい？」"
translation = "「앙? 나 말이야?」"

[[dialogue]]
speaker = "シズハ"
original = "（ディーちゃんに関することも話さないように言われてる。ネビュラに知られると面倒だからって……）"
translation = "（디짱에 관한 것도 말하지 말라고 들었어. 네뷸라가 알게 되면 귀찮아진다고……）"

[[dialogue]]
speaker = "ディーラック"
original = "「……はぁ、仕方ないなぁ～。簡単に説明すると、ボクはシズハちゃんの使い魔みたいなものサ」"
translation = "「……하아, 어쩔 수 없네~. 간단히 설명하자면 난 시즈하짱의 사역마 같은 거라구」"

[[dialogue]]
speaker = "ディーラック"
original = "「で、ロストアイテムのことを知っているのは、元々病気だったシズハちゃんを治したのが、ロストアイテムの力によるものだからサ」"
translation = "「그리고 로스트 아이템에 대해 아는 건, 원래 병약했던 시즈하짱을 고친 게 로스트 아이템의 힘 덕분이라서 그렇다구」"

[[dialogue]]
speaker = "ディーラック"
original = "「そこから先は、プライベートな話になるから、ボクもシズハちゃんもあまり話したくない。そんなところサ」"
translation = "「그다음부터는 사적인 이야기가 되니까 나도 시즈하짱도 별로 말하고 싶지 않아. 그런 거라구」"

[[dialogue]]
speaker = "リーリア"
original = "「なるほど！\u3000何やら訳アリってことだね、了解了解～☆」"
translation = "「과연! 뭔가 사정이 있다는 거네, 알았어 알았어~☆」"

[[dialogue]]
speaker = "リーリア"
original = "「それじゃあ、これ以上は深くは聞かないことにして、別の話題で仲良くなりましょう♪」"
translation = "「그럼 이 이상은 깊게 묻지 않기로 하고, 다른 화제로 친해지자구♪」"

[[dialogue]]
speaker = "シズハ"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker = "リーリア"
original = "「誰しも人に言えないことって、多かれ少なかれあるじゃないですか～？\u3000だから、それはシズハちゃんが話したいなって思った時でいいです」"
translation = "「누구나 남에게 말 못 할 사정은 조금씩은 다 있잖아~? 그러니까 그건 시즈하짱이 말하고 싶어질 때 하면 돼」"

[[dialogue]]
speaker = "リーリア"
original = "「ほら私も、元々ネビュラのスパイとして学園に潜入していた身ですから☆」"
translation = "「봐봐, 나도 원래 네뷸라의 스파이로서 학원에 잠입했던 몸이니까☆」"

[[dialogue]]
speaker = "リーリア"
original = "「なので私は、言えないことがあったとしても、今目の前にいるシズハちゃんのことを見て仲良くするよ♪」"
translation = "「그러니까 난 말 못 할 게 있다고 해도 지금 내 눈앞에 있는 시즈하짱을 보고 사이좋게 지낼 거야♪」"

[[dialogue]]
speaker = "シズハ"
original = "「リーリア先輩……！\u3000ありがとうございます」"
translation = "「리리아 선배……! 감사합니다」"

[[dialogue]]
speaker = "リーリア"
original = "「マジカルな晴れ着の星騎士同士、ウィンウィンな友達になりましょう☆」"
translation = "「매지컬한 설빔 성기사끼리 윈윈하는 친구가 되자☆」"

[[dialogue]]
speaker = "シズハ"
original = "「はいっ♪\u3000それじゃあ、お近づきの印になんですけど――お尻を触ってもいいでしょうか？」"
translation = "「네♪ 그럼 친해진 기념으로 말인데요―― 엉덩이를 만져도 될까요?」"

[[dialogue]]
speaker = "リーリア"
original = "「ん？\u3000なんて？」"
translation = "「응? 뭐라고?」"

[[dialogue]]
speaker = "シズハ"
original = "「お尻です、お尻！\u3000リーリア先輩ともっと仲良くなる為に、その可愛くてプリプリなお尻と触れ合いたいなと！！！」"
translation = "「엉덩이요, 엉덩이! 리리아 선배랑 좀 더 친해지기 위해서 그 귀엽고 탱글탱글한 엉덩이랑 교감하고 싶어서요!!!」"

[[dialogue]]
speaker = "リーリア"
original = "「聞き間違いじゃなかった！？」"
translation = "「헛들은 게 아니었어!?」"

[[dialogue]]
speaker = "シズハ"
original = "「もちろん、先輩も私のお尻を揉みしだいちゃって大丈夫なので！！」"
translation = "「물론 선배도 제 엉덩이를 마음껏 주물러도 괜찮으니까요!!」"

[[dialogue]]
speaker = "リーリア"
original = "「何も大丈夫じゃないけどどういうことなのかな！？」"
translation = "「하나도 안 괜찮은데 대체 무슨 소리니!?」"

[[dialogue]]
speaker = "シズハ"
original = "「私にとってはお尻を触ることが、仲良くなる為のファーストステップなんです！」"
translation = "「저한테는 엉덩이를 만지는 게 친해지기 위한 퍼스트 스텝이에요!」"

[[dialogue]]
speaker = "シズハ"
original = "「邪な気持ちは一切ありません！！\u3000この曇りなき眼を見てください、先輩！！！」"
translation = "「사심은 일절 없습니다!! 이 흐림 없는 눈을 보세요, 선배!!!」"

[[dialogue]]
speaker = "リーリア"
original = "「食い気味でただただ怖いよ！？」"
translation = "「말 끊으면서 달려드니까 그냥 무섭거든!?」"

[[dialogue]]
speaker = "リーリア"
original = "「え、えっと～。とりあえず、獅子舞さんに羽根突きで勝たないといけないじゃない？\u3000だから、それが終わった後にしたいかな～？」"
translation = "「어, 저기~. 일단 사자탈 씨한테 하네츠키로 이겨야 하잖아? 그러니까 그게 끝난 다음에 하고 싶은데~?」"

[[dialogue]]
speaker = "シズハ"
original = "「つまり獅子舞さんに勝てば、リーリア先輩のお尻を私の好きにしていいということですね！？」"
translation = "「즉 사자탈 씨에게 이기면 리리아 선배의 엉덩이를 제 마음대로 해도 된다는 뜻이군요!?」"

[[dialogue]]
speaker = "リーリア"
original = "「そこまでは言ってない……！」"
translation = "「거기까지는 말 안 했어……!」"

[[dialogue]]
speaker = "シズハ"
original = "「そういうことなら私、頑張ります！\u3000てぇーいっ！」"
translation = "「그렇게 된 거라면 저 힘낼게요! 테이잇!」"

[[dialogue]]
speaker = "リーリア"
original = "「ちょっ！？\u3000急にマジカル強い羽根突きスマッシュが炸裂！？\u3000私のお尻でそんなにやる気が出るの！？」"
translation = "「잠깐!? 갑자기 매지컬하게 강한 하네츠키 스매시가 작렬!? 내 엉덩이로 그렇게 의욕이 생기는 거야!?」"

[[dialogue]]
speaker = "シズハ"
original = "「はい！\u3000獅子舞さんとの羽根突き、次は絶対に勝ちますっ！\u3000いけいけゴーゴー！」"
translation = "「네! 사자탈 씨와의 하네츠키, 다음엔 반드시 이길 거예요! 가자 가자 고고!」"

[[dialogue]]
speaker = "リーリア"
original = "（う、迂闊に適当なことを口にするんじゃなかった……！）"
translation = "（으, 어설프게 적당히 대답하는 게 아니었어……!）"

[[dialogue]]
speaker = "unk"
original = "やる気に火が点いた<ruby>後輩<rt>シズハ</rt></ruby>の気迫に押されて、後でどう誤魔化そうかと困る<ruby>先輩<rt>リーリア</rt></ruby>なのであった。"
translation = "의욕에 불이 붙은 후배의 기백에 눌려 나중에 어떻게 얼버무릴지 고민하는 선배였다."

