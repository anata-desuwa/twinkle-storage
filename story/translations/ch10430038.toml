[[dialogue]]
speaker = "unk"
original = "その日、俺はサチと共にロストアイテムの回収にあたっていた。"
translation = "그날, 나는 사치와 함께 로스트 아이템 회수에 임하고 있었다."

[[dialogue]]
speaker = "unk"
original = "しかし、回収が無事に成功した後――リバースフォームに変身していたサチの様子が、どこかおかしいことに気づく。"
translation = "하지만, 회수가 무사히 성공한 후――리버스 폼으로 변신해 있던 사치의 상태가, 어딘가 이상하다는 것을 깨닫는다."

[[dialogue]]
speaker = "サチ"
original = "「はぁ……ふぅ……」"
translation = "「하아…… 후우……」"

[[dialogue]]
speaker = "クロト"
original = "「サチ、大丈夫か？」"
translation = "「사치, 괜찮아?」"

[[dialogue]]
speaker = "サチ"
original = "「ん……はい。大丈夫です……」"
translation = "「음…… 네. 괜찮아요……」"

[[dialogue]]
speaker = "unk"
original = "例の一件以来、戦う際に変身するようになったサチの『リバースフォーム』。"
translation = "그 사건 이후, 싸울 때 변신하게 된 사치의 『리버스 폼』."

[[dialogue]]
speaker = "unk"
original = "それは、サチ本来の能力とは正反対の――『不運を引き寄せる』力を持つ。"
translation = "그것은, 사치 본래의 능력과는 정반대인――『불운을 끌어당기는』 힘을 가진다."

[[dialogue]]
speaker = "unk"
original = "あれから訓練を重ね、サチはその反転した力を徐々に使いこなせるようになっていたが――今の様子は、どこか変だった。"
translation = "그로부터 훈련을 거듭하여, 사치는 그 반전된 힘을 서서히 다룰 수 있게 되었지만――지금의 모습은, 어딘가 이상했다."

[[dialogue]]
speaker = "サチ"
original = "「――ふふっ<emoji=heart04>\u3000ごめんなさい、お兄さん<emoji=heart04>」"
translation = "「――후훗<emoji=heart04> 미안해요, 오빠<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「え？\u3000おわっ……！？」"
translation = "「에? 어왓……!?」"

[[dialogue]]
speaker = "unk"
original = "次の瞬間、サチはいきなり俺の懐へと飛び込んでくる。"
translation = "다음 순간, 사치는 갑자기 내 품속으로 뛰어들어 온다."

[[dialogue]]
speaker = "unk"
original = "そして、そのまま俺の体を抱え上げるようにして――強引に場所を移動する。"
translation = "그리고, 그대로 내 몸을 껴안듯이 들어 올려서――강제로 장소를 이동한다."

[[dialogue]]
speaker = "サチ"
original = "「はあぁっ<emoji=heart04>\u3000ふうぅっ……<emoji=heart04>」"
translation = "「하아아<emoji=heart04> 후우우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "連れて来られたのは、ビルとビルの隙間にひっそりと存在する、人気のない脇道。"
translation = "끌려온 곳은, 빌딩과 빌딩 틈새에 호젓하게 존재하는, 인적 없는 골목길."

[[dialogue]]
speaker = "unk"
original = "俺は路上に押し倒され、そのままズボンを下ろされてしまっていた。"
translation = "나는 노상에 밀쳐 넘어졌고, 그대로 바지가 벗겨져 버리고 말았다."

[[dialogue]]
speaker = "クロト"
original = "「サチ、やっぱり精神まで反転して、暴走状態に……！？」"
translation = "「사치, 역시 정신까지 반전돼서, 폭주 상태로……!?」"

[[dialogue]]
speaker = "サチ"
original = "「はい<emoji=heart04>\u3000ごめんなさぁい<emoji=heart04>\u3000どうやら、さっきの戦闘で力を使い過ぎて、アンラッキーを引き当てちゃったみたいで<emoji=heart04>」"
translation = "「네<emoji=heart04> 미안해요오<emoji=heart04> 아무래도, 아까 전투에서 힘을 너무 많이 써서, 언럭키를 뽑아버린 모양이라서<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「ただ暴走しているだけじゃなくて、前のフォルトゥーナフォームの時みたいに、また『淫紋』が浮かび上がってきちゃったみたいです<emoji=heart04>」"
translation = "「그저 폭주하고 있는 것뿐만이 아니라, 예전 포르투나 폼 때처럼, 다시 『음문』이 떠올라 버린 모양이에요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "サチの腹部には、以前にも見たことのある淫紋が、淡く光を帯びながら浮かび上がっていた。"
translation = "사치의 복부에는 전에도 본 적 있는 음문이 은은하게 빛을 띠며 떠올라 있었다."

[[dialogue]]
speaker = "サチ"
original = "「そのせいで、体が強制的に『発情状態』になってしまって……だから、解除をお願いしたくて<emoji=heart04>」"
translation = "「그 탓에 몸이 강제적으로 『발정 상태』가 되어버려서…… 그래서, 해소를 부탁드리고 싶어서요<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「『絶頂による性欲の発散』<emoji=heart04>\u3000お願いしても、いいですよね……？」"
translation = "「『절정에 의한 성욕의 발산』<emoji=heart04> 부탁드려도, 괜찮겠죠……?」"

[[dialogue]]
speaker = "unk"
original = "サチはそう言って、俺のペニスを自らの秘部へと擦り付け始める。"
translation = "사치는 그렇게 말하며 내 자지를 자신의 비부로 문지르기 시작한다."

[[dialogue]]
speaker = "サチ"
original = "「んっ……ふうぅ<emoji=heart04>\u3000はぁあんっ<emoji=heart04>」"
translation = "「응읏…… 후우우<emoji=heart04> 하아앙<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「サチ、外はマズいって！\u3000せめて、近くのホテルに……！」"
translation = "「사치, 밖은 위험하다니까! 적어도 근처 호텔로……!」"

[[dialogue]]
speaker = "サチ"
original = "「大丈夫ですよぉ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000他のヒトが入ってこられないように、<b>人払い</b>の結界、張りましたからぁ<emoji=heart04>」"
translation = "「괜찮아요오<emoji=heart04> 앙<emoji=heart04> 다른 사람이 들어오지 못하게, <b>인척</b> <b>차단</b>의 결계를 쳤으니까요오<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「私、もう我慢できないんですぅ<emoji=heart04>\u3000お兄さんの大きくて逞しい『おち○ぽ様』<emoji=heart04>\u3000中に入れさせてもらえないと、頭おかしくなっちゃいそうなんですぅ<emoji=heart04>\u3000はふぅうんっ<emoji=heart04>」"
translation = "「저, 이제 참을 수 없어요오<emoji=heart04> 오빠의 크고 늠름한 『자지님』<emoji=heart04> 안에 넣지 않으면, 머리가 이상해져 버릴 것 같아요오<emoji=heart04> 하후우우웅<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "物欲しげな瞳で俺のペニスを見つめながら、サチは腰を擦り付け続ける。"
translation = "원하는 게 가득한 눈동자로 내 자지를 바라보며 사치는 허리를 계속 문지른다."

[[dialogue]]
speaker = "unk"
original = "秘部から溢れる蜜で、ペニスはあっという間にぬるぬるに濡れていく。"
translation = "비부에서 흘러넘치는 애액으로 자지는 눈 깜짝할 새에 미끌미끌하게 젖어간다."

[[dialogue]]
speaker = "サチ"
original = "「はあぁっあ<emoji=heart04>\u3000エッチな子でごめんなさぁい<emoji=heart04>\u3000もうこんなにヌルヌルですから……おち○ぽ様、挿れちゃいますねっ<emoji=heart04>」"
translation = "「하아아아<emoji=heart04> 야한 아이라서 죄송해여어<emoji=heart04> 벌써 이렇게 미끌미끌하니까…… 자지님, 삽입할게요오<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう告げると、サチは興奮に震える吐息を漏らしながら、ゆっくりと腰を下ろしていく。"
translation = "그렇게 고하자 사치는 흥분으로 떨리는 숨결을 내뱉으며 천천히 허리를 내린다."

[[dialogue]]
speaker = "サチ"
original = "「んっ――<emoji=heart04>」"
translation = "「응읏――<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「あっ――ふあああぁぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「앗――후아아아아아~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺を受け入れた瞬間、サチの身体がびくりと大きく跳ねた。"
translation = "나를 받아들인 순간 사치의 신체가 움찔하며 크게 튀어 올랐다."

[[dialogue]]
speaker = "サチ"
original = "「おち○ぽ様、中に入ってきましたぁ～～っ<emoji=heart04><emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はぁあんっ<emoji=heart04>\u3000ふああぁあっ<emoji=heart04>\u3000はああぁっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04>」"
translation = "「자지님, 안으로 들어왔어요오~~ <emoji=heart04><emoji=heart04> 앙 <emoji=heart04> 하앙 <emoji=heart04> 후아아앗 <emoji=heart04> 하아아앗 <emoji=heart04> 응아아앙 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "外だというのに、サチは羞恥心を忘れたかのように、大胆に腰を揺らし始める。"
translation = "밖인데도 불구하고, 사치는 수치심을 잊은 듯이 대담하게 허리를 흔들기 시작한다."

[[dialogue]]
speaker = "サチ"
original = "「おま○こ気持ちいいっ<emoji=heart04>\u3000淫紋で発情してるぐちゅぐちゅおま○こ、すごく気持ちいいですぅ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「보지 기분 좋아 <emoji=heart04> 음문으로 발정해서 구츗구츗해진 보지, 너무 기분 좋아요오~~ <emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「外でエッチしちゃうの、本当は禁止なのにぃ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ、あんっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「밖에서 엣찌해버리는 거, 원래는 금지인데에 <emoji=heart04> 앗 <emoji=heart04> 하아앗, 앙 <emoji=heart04> 응아앗 <emoji=heart04> 후아아앙 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "言葉とは裏腹に、サチの表情はとろけきっている。理性よりも快楽が勝っているのが一目でわかった。"
translation = "말과는 정반대로 사치의 표정은 완전히 녹아내려 있다. 이성보다 쾌락이 이기고 있다는 것을 한눈에 알 수 있었다."

[[dialogue]]
speaker = "サチ"
original = "「でもぉ……いけないことして『悪い子になっちゃってる』って思うと、興奮して気持ちいいですぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふあぁあっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04>」"
translation = "「하지만…… 안 될 짓을 해서 『나쁜 아이가 되어버렸어』라고 생각하면, 흥분돼서 기분 좋아요옷 <emoji=heart04> 앗 <emoji=heart04> 앙 <emoji=heart04> 후아아앗 <emoji=heart04> 하아아앙 <emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「外でおま○ことおっぱい、丸出しにして<emoji=heart04>\u3000お兄さんとパンパンしてるの、すごく興奮するのぉっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000んああぁ～っ<emoji=heart04><emoji=heart04>」"
translation = "「밖에서 보지랑 가슴을 전부 드러내고 <emoji=heart04> 오빠랑 팡팡 하는 거, 너무 흥분돼애 <emoji=heart04> 하아앗 <emoji=heart04> 후아앗 <emoji=heart04> 응아아아~ <emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「生徒会長として、附属生の模範にならなくちゃいけないのにぃ<emoji=heart04>\u3000そんな私が、エッチでいけないことをしちゃってると思うと、余計興奮しちゃいますぅっ<emoji=heart04>」"
translation = "「학생회장으로서 부속생의 모범이 되어야만 하는데에 <emoji=heart04> 그런 내가 엣찌하고 안 될 짓을 하고 있다고 생각하니 더 흥분돼버려요옷 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "背徳と誇りの狭間で揺れ動く感情。その葛藤さえも、サチの感度をさらに引き上げているようだった。"
translation = "배덕과 긍지의 사이에서 흔들리는 감정. 그 갈등조차 사치의 감도를 더욱 끌어올리는 듯했다."

[[dialogue]]
speaker = "サチ"
original = "「はああぁっ<emoji=heart04>\u3000開放的な気分で、おま○こと一緒に心も気持ち良くなっちゃうぅ<emoji=heart04>\u3000悪い子になるの、気持ちよすぎるよぉ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000はああぁ～っ<emoji=heart04><emoji=heart04>」"
translation = "「하아아앗 <emoji=heart04> 개방적인 기분으로 보지와 함께 마음도 기분 좋아져버려어 <emoji=heart04> 나쁜 아이가 되는 거, 너무 기분 좋아아 <emoji=heart04> 후아앗 <emoji=heart04> 하아아아~ <emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「エッチな附属生でごめんなさいっ<emoji=heart04>\u3000でも、外でのいけないセックス……気持ちいいのぉ～っ<emoji=heart04><emoji=heart04>」"
translation = "「음란한 부속생이라서 죄송해요옷 <emoji=heart04> 하지만 밖에서 하는 안 될 섹스…… 기분 좋아아~ <emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「おち○ぽ様、気持ち良くて好きっ<emoji=heart04>\u3000お兄さんとのセックス、大好きですぅっ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「자지님, 기분 좋아서 좋아 <emoji=heart04> 오빠와의 섹스, 정말 좋아해요옷 <emoji=heart04><emoji=heart04> 앗 <emoji=heart04> 앙 <emoji=heart04> 후아아앙 <emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「すんすんっ<emoji=heart04>\u3000はぁぁあっ、お兄さんの汗の匂い、甘ぁい<emoji=heart04>\u3000あの、ですねっ<emoji=heart04>\u3000訓練中にこっそり嗅ぐ、お兄さんの汗の匂い、大好きなんですぅ<emoji=heart04>」"
translation = "「킁킁<emoji=heart04> 하아아아, 오빠의 땀 냄새, 달콤해<emoji=heart04> 저기, 있잖아요<emoji=heart04> 훈련 중에 몰래 맡는 오빠의 땀 냄새, 정말 좋아해요오<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "サチは理性が熱に溶かされてしまったかのように、そんなカミングアウトをし始める。"
translation = "사치는 이성이 열기에 녹아버린 것처럼, 그런 커밍아웃을 시작한다."

[[dialogue]]
speaker = "サチ"
original = "「汗の匂いでムラムラすると……お兄さんに抱いてもらってる時のこと、思い出して<emoji=heart04>\u3000すぐにでも、犯して欲しくなっちゃうんですぅ<emoji=heart04>」"
translation = "「땀 냄새 때문에 몸이 달아오르면…… 오빠한테 안기고 있을 때가 생각나서<emoji=heart04> 당장이라도, 범해지고 싶어져 버려요오<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「あぁあっ<emoji=heart04>\u3000普段なら恥ずかしくて、言えないのに……今は全部、口にできちゃう<emoji=heart04>\u3000エッチで解放された気分ですっ<emoji=heart04>」"
translation = "「아아앗<emoji=heart04> 평소라면 부끄러워서 말 못 하는데…… 지금은 전부 말할 수 있어<emoji=heart04> 야한 짓으로 해방된 기분이에요<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「だから今日は……いつも気持ち良く、犯してくれるお兄さんの代わりに<emoji=heart04>\u3000私がお兄さんを犯して、気持ちよくしてあげますねっ<emoji=heart04><emoji=heart04>\u3000はああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「그러니까 오늘은…… 언제나 기분 좋게 범해주는 오빠 대신에<emoji=heart04> 제가 오빠를 범해서, 기분 좋게 해드릴게요<emoji=heart04><emoji=heart04> 하아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「ああっ、普段なら言えない、エッチなこと<emoji=heart04>\u3000たくさん言っちゃうの、ゾクゾクして気持ちいい、ですぅっ<emoji=heart04>」"
translation = "「아앗, 평소라면 못 할 야한 말들<emoji=heart04> 잔뜩 해버리는 거, 오싹오싹해서 기분 좋아아, 요옷<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「悪い子になるの、気持ちいいっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000エッチなの最高ですぅっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「나쁜 아이가 되는 거, 기분 좋아<emoji=heart04> 앙<emoji=heart04> 야한 거 최고예요옷<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「恥ずかしがって、興味ないふりしてる普段の私、バカみたいっ<emoji=heart04>」"
translation = "「부끄러워하며 관심 없는 척하는 평소의 나, 바보 같아<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「本当はエッチ大好きで、気持ちいいのも大好きっ<emoji=heart04>\u3000性欲旺盛な、ドスケベのメスなのにぃ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あぁあんっ<emoji=heart04>」"
translation = "「실은 에로한 거 엄청 좋아하고, 기분 좋은 것도 정말 좋아해<emoji=heart04> 성욕 왕성한, 완전 밝히는 암컷인데에<emoji=heart04> 앗<emoji=heart04> 아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「もっと素直になって……お兄さんといけないエッチしたら、こんなに気持ちいいのにぃ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「좀 더 솔직해져서…… 오빠랑 못된 섹스 하니까, 이렇게 기분 좋은데에<emoji=heart04> 앙<emoji=heart04> 응아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その瞬間、サチの淫紋がひときわ強く輝いた。淡い光が肌を這い、魔力の波動が熱を帯びて脈打つ。"
translation = "그 순간, 사치의 음문이 유독 강하게 빛났다. 은은한 빛이 피부를 타고 흐르고, 마력의 파동이 열기를 띠며 맥동한다."

[[dialogue]]
speaker = "unk"
original = "内側がきゅうぅっと締まり、俺のペニスを強く吸い上げた。"
translation = "안쪽이 뀨우우하며 조여지더니, 내 페니스를 강하게 빨아올렸다."

[[dialogue]]
speaker = "サチ"
original = "「すごぉいっ<emoji=heart04>\u3000淫紋から気持ちいいのが溢れて……おま○こ、もっと敏感になっちゃいますぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁあっ<emoji=heart04>\u3000ふああぁ～っ<emoji=heart04><emoji=heart04>」"
translation = "「대단해애<emoji=heart04> 음문에서 기분 좋은 게 넘쳐흘러서…… 보지, 좀 더 민감해져 버려요오<emoji=heart04> 앗<emoji=heart04> 하아아앗<emoji=heart04> 후아아아~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "腰の動きがさらに激しくなる。サチは自ら深く沈み込み、俺を奥へと導いた。"
translation = "허리 놀림이 더욱 격렬해진다. 사치는 스스로 깊숙이 가라앉으며, 나를 안쪽 끝까지 인도했다."

[[dialogue]]
speaker = "サチ"
original = "「ふああぁあっ<emoji=heart04>\u3000おち○ぽ様、気持ちいいっ<emoji=heart04>\u3000おま○こ、もうイっちゃいますぅっ<emoji=heart04><emoji=heart04>」"
translation = "「후아아아앗<emoji=heart04> 자지님, 기분 좋아아<emoji=heart04> 보지, 벌써 가버려요오<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「あっ、あっ、んあぁっ<emoji=heart04>\u3000はああぁっ――<emoji=heart04><emoji=heart04>」"
translation = "「앗, 앗, 응아아<emoji=heart04> 하아아앗――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「ふああぁ～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "全身を仰け反らせながら大きく震わせ、サチは絶頂する。"
translation = "전신을 뒤로 젖히며 크게 떨면서, 사치는 절정에 달한다."

[[dialogue]]
speaker = "サチ"
original = "「んうぅっ、外ではしたなく、イっちゃいましたぁっ<emoji=heart04><emoji=heart04>」"
translation = "「응우웃, 밖에서 상스럽게, 가버렸어요오<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「でも……まだ興奮止まらなくてっ<emoji=heart04>\u3000もっと気持ちよく、なりたいですぅ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はあぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「하지만…… 아직 흥분이 멈추지 않아서어<emoji=heart04> 좀 더 기분 좋게, 되고 싶어요오<emoji=heart04> 응<emoji=heart04> 하아아앗<emoji=heart04> 응우웃<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 하아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "サチの瞳の奥に宿る熱は、まだ消えていない。背徳の状況そのものが、サチをさらに煽っているようだ。"
translation = "사치의 눈동자 깊은 곳에 깃든 열기는, 아직 사라지지 않았다. 배덕적인 상황 그 자체가, 사치를 더욱 부추기고 있는 듯하다."

[[dialogue]]
speaker = "クロト"
original = "「サチ、それ以上声を大きくしたら、結界の外に聞こえちゃうから、もうちょっと抑えて……！」"
translation = "「사치, 그 이상 목소리를 크게 내면, 결계 밖까지 들려버리니까, 조금만 더 억눌러줘……!」"

[[dialogue]]
speaker = "サチ"
original = "「……！\u3000こ、声聞こえちゃったら、誰か中に迷い込んできちゃうかも……？」"
translation = "「……! 모, 목소리 들려버리면, 누군가 안으로 헤매 들어올지도……?」"

[[dialogue]]
speaker = "unk"
original = "一瞬、サチの表情に羞恥がよぎったように見えた。"
translation = "찰나, 사치의 표정에 수치심이 스친 것처럼 보였다."

[[dialogue]]
speaker = "unk"
original = "だが――"
translation = "하지만――"

[[dialogue]]
speaker = "サチ"
original = "「はああぁああぁぁっ<emoji=heart04>\u3000そんなの……そんなエッチで悪い子になってるところ、見られるなんて……」"
translation = "「하아아아아아아아앗<emoji=heart04> 그런 거…… 그렇게 섹스하며 나쁜 아이가 되어 있는 모습, 들켜버린다니……」"

[[dialogue]]
speaker = "サチ"
original = "「想像したら私……もっと興奮しちゃいますぅ<emoji=heart04><emoji=heart04>\u3000んんんぅ――<emoji=heart04><emoji=heart04>」"
translation = "「상상하니까 저…… 좀 더 흥분돼 버려요오<emoji=heart04><emoji=heart04> 응응응으――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「あっ<emoji=heart04><emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふあああぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04><emoji=heart04> 하아앗<emoji=heart04> 후아아아아~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "荒い吐息が重なり、サチの動きはさらに激しくなった。"
translation = "거친 숨결이 겹쳐지며, 사치의 움직임은 더욱 격렬해졌다."

[[dialogue]]
speaker = "サチ"
original = "「あっ、あっ、あっ、あんっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04><emoji=heart04>\u3000あっ、あっ、あっ、あっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「앗, 앗, 앗, 앙<emoji=heart04> 응아아앙<emoji=heart04><emoji=heart04> 앗, 앗, 앗, 앗<emoji=heart04> 하아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "サチはペニスを奥深くまで受け入れ、腰を強く打ちつける。"
translation = "사치는 자지를 깊숙한 곳까지 받아들이고, 허리를 강하게 부딪친다."

[[dialogue]]
speaker = "unk"
original = "そのたびに、ひときわ甘い嬌声が辺りに響きわたった。"
translation = "그럴 때마다, 유난히 달콤한 교성이 주변에 울려 퍼졌다."

[[dialogue]]
speaker = "サチ"
original = "「あああっ<emoji=heart04>\u3000エッチな声、知らないヒトに聞かれちゃってるかもしれないのにぃ<emoji=heart04>」"
translation = "「아아앗<emoji=heart04> 야한 목소리, 모르는 사람에게 들려버리고 있을지도 모르는데에<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「このままじゃ、外でドスケベセックスしてるの見せつける、すごく悪い子になっちゃいますっ<emoji=heart04>\u3000でもでもぉ――<emoji=heart04>」"
translation = "「이대로라면, 밖에서 엄청 야한 섹스하는 걸 보여주는, 정말 나쁜 아이가 되어버려요오<emoji=heart04> 하지만 하지만으――<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "人目を気にするように肩を震わせながらも、サチはさらに腰を深く落とす。"
translation = "남의 눈을 신경 쓰는 듯 어깨를 떨면서도, 사치는 더욱 허리를 깊게 내린다."

[[dialogue]]
speaker = "サチ"
original = "「想像したらすっごくゾクゾクして、おま○こ気持ちよくなっちゃうのぉっ<emoji=heart04><emoji=heart04>\u3000あっ、あっ、あっ、あっ、ふああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「상상하니까 정말 짜릿짜릿해서, 보지 기분 좋아져버려요오앗<emoji=heart04><emoji=heart04> 앗, 앗, 앗, 앗, 후아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「お兄さん以外にエッチな姿、見られたくないって思ってたのにぃっ<emoji=heart04>\u3000はああぁ～んっ<emoji=heart04><emoji=heart04>」"
translation = "「오빠 말고 다른 사람에게 야한 모습, 보여주고 싶지 않다고 생각했는데에잇<emoji=heart04> 하아아~앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「お兄さんが『私のもの』だって見せつけるの、あんっ<emoji=heart04>\u3000悪くないかもってぇっ<emoji=heart04>\u3000あぁああっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04>」"
translation = "「오빠가 『내 것』이라고 보여주는 거, 앙<emoji=heart04> 나쁘지 않을지도라니잇<emoji=heart04> 아아아앗<emoji=heart04> 응아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「お兄さんのおち○ぽ様は私だけのものって、みんなに見せつけてあげたくなっちゃうっ<emoji=heart04>」"
translation = "「오빠의 자지님은 나만의 것이라고, 모두에게 보여주고 싶어져버려요오잇<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「お兄さんとのラブラブドスケベセックスっ<emoji=heart04>\u3000見せつけたら絶対、気持ちよくなっちゃいますぅっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「오빠와의 러브러브 엄청 야한 섹스으<emoji=heart04> 보여주면 분명, 기분 좋아져버릴 거예요오잇<emoji=heart04> 하아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「んううぅっ、すごぉいっ<emoji=heart04>\u3000おち○ぽ様奥に強く当たると、子宮がキュンキュン悦んじゃいますぅっ<emoji=heart04>\u3000あっ、あっ、あっ、あっ、んあああぁっ<emoji=heart04><emoji=heart04>」"
translation = "「응우우웃, 대단해애잇<emoji=heart04> 자지님이 안쪽에 강하게 닿으니까, 자궁이 큥큥거리며 기뻐해버려요오잇<emoji=heart04> 앗, 앗, 앗, 앗, 응아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "サチが強く腰を落として、ペニスが子宮を突き上げるたびに、彼女の身体はびくりと跳ねる。"
translation = "사치가 강하게 허리를 내리고, 자지가 자궁을 찔러올릴 때마다, 그녀의 몸은 움찔하며 튀어 오른다."

[[dialogue]]
speaker = "サチ"
original = "「おま○こ気持ちよくて幸せぇっ<emoji=heart04>\u3000はああぁっ<emoji=heart04>\u3000おち○ぽ様、好きっ好きっ、大好きぃ<emoji=heart04>\u3000あっ、あっ、あっ、あんっ、ふああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「보지 기분 좋아서 행복해애잇<emoji=heart04> 하아아앗<emoji=heart04> 자지님, 좋아해 좋아해, 정말 좋아해요오<emoji=heart04> 앗, 앗, 앗, 앙, 후아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「はああぁっ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000青姦セックス、気持ちよくて最高ですぅ～～っ<emoji=heart04><emoji=heart04>\u3000はああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「하아아앗<emoji=heart04> 기분 좋아아잇<emoji=heart04> 야외 섹스, 기분 좋아서 최고예요오~~잇<emoji=heart04><emoji=heart04> 하아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ひたすら快楽を貪ろうとする淫らな腰使いに、俺も理性が削られていく。"
translation = "그저 쾌락을 탐하려는 음란한 허리 놀림에, 나도 이성이 깎여 나간다."

[[dialogue]]
speaker = "unk"
original = "腹の奥から精が込み上げ、限界が目前まで迫っていた。"
translation = "배 속 깊은 곳에서 정액이 치밀어 올라, 한계가 눈앞까지 다가와 있었다."

[[dialogue]]
speaker = "サチ"
original = "「あっ、すごいっ<emoji=heart04>\u3000おち○ぽ様、中でもっと大きくなってますぅっ<emoji=heart04>\u3000あぁあんっ<emoji=heart04>」"
translation = "「앗, 대단해잇<emoji=heart04> 자지님, 안에서 좀 더 커지고 있어요오잇<emoji=heart04> 아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「お兄さん、射精したいんですね？\u3000きてっ<emoji=heart04>\u3000中に出して下さいっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「오빠, 사정하고 싶은 거군요? 자아아잇<emoji=heart04> 안에 싸주세요오잇<emoji=heart04> 후아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「私だけのお兄さん精子、子宮にドピュドピュかけて欲しいですぅ<emoji=heart04>\u3000んっ、ふんっ、ふんっ、ふんっ、んふぅううんっ<emoji=heart04><emoji=heart04>」"
translation = "「나만의 오빠 정액, 자궁에 뷰릇뷰릇 뿌려줬으면 좋겠어요오<emoji=heart04> 응, 흠, 흠, 흠, 응후우우운<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「くっ……サチ！\u3000もうイキそうだっ！」"
translation = "「큭…… 사치! 이제 갈 것 같아!」"

[[dialogue]]
speaker = "サチ"
original = "「私もイっちゃうっ<emoji=heart04>\u3000お兄さん一緒にっ、一緒にラブラブ絶頂で中出ししてくださぁいっ<emoji=heart04><emoji=heart04>\u3000ふんっ、ふんっ、ふんっ、んふうぅ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「저도 가버려요오잇<emoji=heart04> 오빠 같이잇, 같이 러브러브 절정으로 질내사정 해주세요오잇<emoji=heart04><emoji=heart04> 흠, 흠, 흠, 응후우으~~잇<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「あっ、くるっ<emoji=heart04>\u3000きちゃいますっ<emoji=heart04>\u3000イっちゃいますっ<emoji=heart04><emoji=heart04>\u3000あっ、あっ、あっ、あっ、んあああぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「앗, 온다앗<emoji=heart04> 와버려요오잇<emoji=heart04> 가버려요오잇<emoji=heart04><emoji=heart04> 앗, 앗, 앗, 앗, 응아아아~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「あっ<emoji=heart04><emoji=heart04>\u3000イクっ<emoji=heart04><emoji=heart04>\u3000イクイクイクイク、イクっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04><emoji=heart04> 간다앗<emoji=heart04><emoji=heart04> 가버려 가버려 가버려 가버려, 간다앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「サチ、もう出るっ！！」"
translation = "「사치, 이제 나온다!!」"

[[dialogue]]
speaker = "サチ"
original = "「ふああああああっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イっ――――<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 가아――――<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「イックうううぅぅぅーーーーーーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふあああああああああぁ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가버려어어어어어으으으으으으으―――――――――앗<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04> 후아아아아아아아아아앗~~~~~~~~~~~~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "サチが強く腰を落とした瞬間、俺も彼女の奥へと精を思いっきり吐き出した。"
translation = "사치가 강하게 허리를 내린 순간, 나도 그녀의 안쪽으로 정액을 힘껏 쏟아냈다."

[[dialogue]]
speaker = "サチ"
original = "「あっ――はあああぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000お兄さんの熱い精子、どくどくって子宮の中に注がれてますぅ～～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗――하아아아아~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 오빠의 뜨거운 정액, 울컥울컥 자궁 속에 쏟아지고 있어요오~~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "絶頂の波に呑まれ、サチの身体が大きく震える。"
translation = "절정의 파도에 휩쓸려, 사치의 몸이 크게 떨린다."

[[dialogue]]
speaker = "サチ"
original = "「んっ、はあぁあ……っ<emoji=heart04><emoji=heart04>\u3000あぁあんっ<emoji=heart04><emoji=heart04>\u3000外で初めての、種付け射精ですぅ……<emoji=heart04>\u3000んうぅっ、ふうぅう<emoji=heart04>」"
translation = "「응, 하아아……앗<emoji=heart04><emoji=heart04> 아아앙<emoji=heart04><emoji=heart04> 밖에서 첫, 씨내리기 사정이에요오……<emoji=heart04> 응우웃, 후우우으<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "なおも脈打つペニスを膣で吸い上げながら、サチはうっとりと目を細める。"
translation = "여전히 맥동하는 자지를 질로 빨아들이며, 사치는 황홀하게 눈을 가늘게 뜬다."

[[dialogue]]
speaker = "サチ"
original = "「はあぁあ<emoji=heart04>\u3000すごいぃ……<emoji=heart04>\u3000おち○ぽ様、まだ中でどくんどくんって射精し続けて、逞しくて男らしいです……<emoji=heart04>」"
translation = "「하아아아<emoji=heart04> 대단해애……<emoji=heart04> 자지님, 아직 안에서 덜컥덜컥 사정 계속하고, 늠름하고 남자다워요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そうしてしばらく余韻が続き、やがて射精の波が収まっていく。"
translation = "그렇게 잠시 여운이 이어지고, 이윽고 사정의 파도가 가라앉아 간다."

[[dialogue]]
speaker = "unk"
original = "快感に浸ったまま、サチはゆっくりと腰を上げた。"
translation = "쾌감에 젖은 채, 사치는 천천히 허리를 올렸다."

[[dialogue]]
speaker = "サチ"
original = "「はあぁ……<emoji=heart04>\u3000外でのエッチ、最高に気持ちよかったです……<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 밖에서의 섹스, 최고로 기분 좋았어요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "恍惚とした笑みを浮かべ、うっとりと息を漏らすサチ。"
translation = "황홀한 미소를 지으며, 넋을 잃고 숨을 내뱉는 사치."

[[dialogue]]
speaker = "unk"
original = "しかし、次第に呼吸が落ち着いてくると、ふいに我に返ったように目を見開いた。"
translation = "하지만, 서서히 호흡이 안정되자, 문득 제정신으로 돌아온 듯 눈을 크게 떴다."

[[dialogue]]
speaker = "サチ"
original = "「ハッ……！？\u3000わ、私……」"
translation = "「핫……!? 저, 저는……」"

[[dialogue]]
speaker = "unk"
original = "暴走が収まり、反転していた精神が元に戻ったのだろう。"
translation = "폭주가 가라앉고, 반전되었던 정신이 원래대로 돌아온 것이리라."

[[dialogue]]
speaker = "サチ"
original = "「せ、性欲に負けて、外でエッチなことを……！」"
translation = "「서, 성욕에 져서, 밖에서 야한 짓을……!」"

[[dialogue]]
speaker = "unk"
original = "羞恥で頬を真っ赤に染めるサチ。その唇を、俺は体を起こして強引に奪う。"
translation = "수치심으로 뺨을 새빨갛게 물들이는 사치. 그 입술을, 나는 몸을 일으켜 강제로 빼앗는다."

[[dialogue]]
speaker = "サチ"
original = "「んっ……！？\u3000んむっ<emoji=heart04>\u3000ちゅっ、ちゅぱっ……<emoji=heart04>」"
translation = "「응……!? 응믓<emoji=heart04> 쪽, 쭈웁……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "やがて唇が離れ、サチはとろんとした瞳でこちらを見上げた。"
translation = "이윽고 입술이 떨어지고, 사치는 멍한 눈동자로 이쪽을 올려다보았다."

[[dialogue]]
speaker = "サチ"
original = "「ぷはぁっ……<emoji=heart04>\u3000お、お兄さん……？」"
translation = "「푸하앗……<emoji=heart04> 오, 오빠……?」"

[[dialogue]]
speaker = "クロト"
original = "「正直、サチに襲われるのは興奮した」"
translation = "「솔직히, 사치에게 덮쳐지는 건 흥분됐어」"

[[dialogue]]
speaker = "unk"
original = "そう言って、俺は笑顔を浮かべてみせる。"
translation = "그렇게 말하며, 나는 미소를 지어 보인다."

[[dialogue]]
speaker = "クロト"
original = "「だから――恋人同士、たまのアブノーマルプレイも悪くないよ」"
translation = "「그러니까―― 연인끼리, 가끔은 이런 아브노멀한 플레이도 나쁘지 않아」"

[[dialogue]]
speaker = "サチ"
original = "「い、いや、外でエッチするのは、でも……」"
translation = "「아, 아니, 밖에서 섹스하는 건, 그래도……」"

[[dialogue]]
speaker = "クロト"
original = "「リバースフォームのせいなのは分かってる。それに――」"
translation = "「리버스 폼 때문이라는 건 알고 있어. 게다가――」"

[[dialogue]]
speaker = "クロト"
original = "「サチのこういうエッチなところを見られるのは、恋人だからこその特権だろ？」"
translation = "「사치의 이런 야한 모습을 볼 수 있는 건, 연인이기에 가능한 특권이잖아?」"

[[dialogue]]
speaker = "サチ"
original = "「……！\u3000も、もうっ、お兄さんは本当に、エッチなんですから<emoji=heart04>」"
translation = "「……! 정, 정말이지, 오빠는 정말, 변태라니까요오<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「そうだぞ。サチの恋人は、エッチなことが大好きなんだ」"
translation = "「그렇지. 사치의 연인은, 야한 걸 정말 좋아하거든」"

[[dialogue]]
speaker = "クロト"
original = "「だからこの後……サチのこと、ラブホに連れ込んじゃってもいいか？」"
translation = "「그러니까 이 뒤에…… 사치, 러브호텔로 데려가도 될까?」"

[[dialogue]]
speaker = "サチ"
original = "「……<emoji=heart04>\u3000は、はい、お兄さんっ<emoji=heart04>」"
translation = "「……<emoji=heart04> 네, 네, 오빠앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "サチは嬉しそうに頷いたあと、さらに頬を赤らめて小さく呟く。"
translation = "사치는 기쁜 듯 고개를 끄덕인 뒤, 더욱 뺨을 붉히며 작게 중얼거린다."

[[dialogue]]
speaker = "サチ"
original = "「悪い子の私に……たくさんお仕置き、してください<emoji=heart04>」"
translation = "「나쁜 아이인 저에게…… 잔뜩 벌, 주세요오<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その後、俺たちはラブホテルへと場所を移し、心ゆくまで愛し合うのだった。"
translation = "그 후, 우리들은 러브호텔로 장소를 옮겨, 마음껏 서로 사랑을 나누었다."

