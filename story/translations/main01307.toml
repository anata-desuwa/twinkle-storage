[[dialogue]]
speaker = "unk"
original = "第７話,フィーニスの塔・第零階層,B"
translation = "제7화, 피니스의 탑・제영계층, B"

[[dialogue]]
speaker = "unk"
original = "そうして──俺たちは魔界の広大な原野をひたすらに<ruby>翔<rt>か</rt></ruby>け抜けた。"
translation = "그렇게── 우리들은 마계의 광대한 원야를 오로지 달려 나갔다."

[[dialogue]]
speaker = "unk"
original = "ひたすら西へ、西へ……"
translation = "오로지 서쪽으로, 서쪽으로……"

[[dialogue]]
speaker = "unk"
original = "それだけで一冊の旅行記が書けそうなくらい、過酷な道のりだったけれど、難を乗り越えて俺たちはシャリオン地方へ達した。"
translation = "그것만으로도 한 권의 여행기가 쓰일 수 있을 정도로, 가혹한 여정이었지만, 어려움을 극복하고 우리들은 샤리온 지방에 도착했다."

[[dialogue]]
speaker = "unk"
original = "そして塔の入り口は、打ち捨てられた遺跡の中心にあった。"
translation = "그리고 탑의 입구는, 버려진 유적의 중심에 있었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「サーシャさん──それじゃ、ここが……！？」"
translation = "「사샤 씨── 그럼, 여기가……!?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ええ。そのはずよ。もちろん立ち入り厳禁だけど──今さら気にかけてる場合じゃないわね」"
translation = "「응. 그럴 거야. 물론 출입 엄금이지만── 이제 와서 신경 쓸 때가 아니지.」"

[[dialogue]]
speaker = "unk"
original = "シャリオン地方にそびえるフィーニスの塔は、外観から流星市国のそれと大きく異なっていた。"
translation = "샤리온 지방에 우뚝 솟은 피니스의 탑은, 외관부터 유성 시국의 그것과 크게 달랐다."

[[dialogue]]
speaker = "unk"
original = "そして、その内部も……"
translation = "그리고, 그 내부도……"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「おいおい……なんだここ」"
translation = "「어이어이…… 뭐야 여기.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「これが……フィーニスの塔……なのですか？」"
translation = "「이것이…… 피니스의 탑…… 인가요?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「話には聞いていましたが……本当に、ガラリと中身が変わるんですね」"
translation = "「이야기는 들었지만…… 정말로, 내용물이 확 바뀌는군요.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「第零層──想像してたより異質だな」"
translation = "「제영층── 상상했던 것보다 이질적이군.」"

[[dialogue]]
speaker = "unk"
original = "これまでのどの層とも異なる空間が広がっていた。"
translation = "지금까지의 어느 계층과도 다른 공간이 펼쳐져 있었다."

[[dialogue]]
speaker = "unk"
original = "フィーニスの塔内部といえば、各層はどれも『ヒトの文明』を感じさせる様相だったにもかかわらず、ここはどこまでも無機質で寒々しい。"
translation = "피니스의 탑 내부라고 하면, 각 계층은 모두 『인간의 문명』을 느끼게 하는 모습이었음에도 불구하고, 이곳은 한없이 무기질적이고 삭막했다."

[[dialogue]]
speaker = "unk"
original = "塔の『制覇者』であった学園長の記憶にもなかった、完全なる未開の層──"
translation = "탑의 『제패자』였던 학원장의 기억에도 없었던, 완전한 미개의 계층──"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「零層ってことは、ここより下はねえ。でもって登ってさえいきゃあ……人間界にもたどり着くって話だったな？\u3000フィオナ」"
translation = "「영층이라는 건, 여기보다 아래는 없다는 거군. 게다가 올라가기만 하면…… 인간계에도 도착한다는 이야기였지? 피오나.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はい。魔界、人間界、天界と──どこにあってもフィーニスの塔だけは同じ軸を貫きます」"
translation = "「네. 마계, 인간계, 천계와── 어디에 있더라도 피니스의 탑만은 같은 축을 관통합니다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「よって、このまま上昇していけば……学園の敷地内に着くはずです」"
translation = "「따라서, 이대로 상승해 가면…… 학원 부지 내에 도착할 것입니다.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「魔界から人間界まで……か。そう聞くとキリがなさそうだけど」"
translation = "「마계에서 인간계까지……라. 그렇게 들으니 끝이 없을 것 같지만.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ま、行くっきゃないわね！\u3000ここしか残された道がないなら」"
translation = "「뭐, 가는 수밖에 없지! 여기밖에 남겨진 길이 없다면.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「一応──俺たちも塔を昇ることに関しちゃ慣れたものだしな。行くぞ」"
translation = "「일단── 우리들도 탑을 오르는 것에 관해서는 익숙한 편이니까. 가자.」"

[[dialogue]]
speaker = "unk"
original = "人間界へ戻るために。今までで最も特異な層の攻略が始まった。"
translation = "인간계로 돌아가기 위해. 지금까지 가장 특이한 계층의 공략이 시작되었다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「気をつけましょう。こんな不思議な空間……何が飛び出してきてもおかしくありません……！」"
translation = "「조심합시다. 이런 신기한 공간…… 무엇이 튀어나와도 이상하지 않아요……!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そうね──ん？」"
translation = "「그렇지── 응?」"

[[dialogue]]
speaker_original = "ガーディアン"
speaker_translation = "가디언"
original = "「ポロポロ……パロパロ……ピピ、ガガガ」"
translation = "「포로포로…… 파로파로…… 삐삐, 가가가」"

[[dialogue]]
speaker_original = "ガーディアン"
speaker_translation = "가디언"
original = "「エネミー発見。エネミー発見。迎撃モードに移行シマス」"
translation = "「에너미 발견. 에너미 발견. 요격 모드로 이행합니다.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「なんだ、ガーディアン。むしろ見慣れてるぶん安心しちゃうくらい」"
translation = "「뭐야, 가디언이네. 오히려 익숙해서 안심이 될 정도야.」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「そうニャね。あれがいるニャら、ここがフィーニスの塔の中ってわかるニャン」"
translation = "「그렇냥네. 저것이 있다면, 여기가 피니스의 탑 안이라는 걸 알 수 있냥.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「んじゃ──ちゃっちゃと倒しちゃいましょ♪」"
translation = "「그럼── 후딱 해치워 버리자♪」"

[[dialogue]]
speaker = "unk"
original = "例によって俺たちを侵入者とみなしてきたガーディアンたちを、慣れた星術さばきで掃討していく。"
translation = "여느 때처럼 우리들을 침입자로 간주한 가디언들을, 익숙한 성술 솜씨로 소탕해 나간다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「楽勝、楽勝。今さら私たちの相手じゃないわね！」"
translation = "「식은 죽 먹기, 식은 죽 먹기. 이제 와서 우리의 상대가 아니지!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ええ。この調子で──」"
translation = "「네. 이 기세로──」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……待った。みんな、あっちを見てくれ」"
translation = "「……잠깐. 모두, 저쪽을 봐줘.」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「んぁ……？」"
translation = "「응아……?」"

[[dialogue]]
speaker_original = "ガーディアン"
speaker_translation = "가디언"
original = "「ピ……ガガ……起動完了。起動完了。Ｃ区域へ移動シマス」"
translation = "「삐…… 가가…… 기동 완료. 기동 완료. C 구역으로 이동합니다.」"

[[dialogue]]
speaker_original = "ガーディアン"
speaker_translation = "가디언"
original = "「ウィーン……ウィーン……環境の瘴気を測定。異常アリ。異常アリ」"
translation = "「위잉…… 위잉…… 환경의 장기를 측정. 이상 있음. 이상 있음.」"

[[dialogue]]
speaker = "unk"
original = "俺たちが目をやった一角では──"
translation = "우리들이 눈을 돌린 한쪽 구석에서는──"

[[dialogue]]
speaker = "unk"
original = "落とし穴のような<ruby>陥穽<rt>かんせい</rt></ruby>から、新たなガーディアンたちが無数に湧き出てきていた。"
translation = "함정 같은 구덩이에서, 새로운 가디언들이 무수히 솟아 나오고 있었다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「な──何よあれ！\u3000ガーディアン製造工場！？」"
translation = "「뭐── 뭐야 저거! 가디언 제조 공장!?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「１０……１１……１２……ああ、数え切れません。ひっきりなしに出てきてます」"
translation = "「10…… 11…… 12…… 아아, 셀 수가 없어요. 끊임없이 나오고 있어요.」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「なんつー光景だよ……」"
translation = "「이런 광경이 다 있냐……」"

[[dialogue]]
speaker = "unk"
original = "おびただしいまでの頭数が湧き上がるガーディアンたち。"
translation = "엄청난 수의 개체수가 솟아오르는 가디언들."

[[dialogue]]
speaker = "unk"
original = "しかし彼らは襲ってくることなく、右へ左へと散開していった。"
translation = "하지만 그들은 습격해 오지 않고, 오른쪽으로 왼쪽으로 흩어져 나갔다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あのガーディアンたち……散り散りになっているようですが……」"
translation = "「저 가디언들…… 뿔뿔이 흩어지고 있는 것 같습니다만……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「飛んで、昇っていく子もいるわね」"
translation = "「날아서, 올라가는 아이도 있네.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「これは勘だけど──配置につこうとしているんじゃないか？」"
translation = "「이건 직감이지만── 배치되려고 하는 것 아닌가?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「！\u3000なるほど。ここ以外の層にも──ということですか」"
translation = "「! 과연. 이곳 이외의 계층에도── 라는 말씀이시군요.」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「ってことはニャ……今までのガーディアンも全部ここで造られたのかニャン！？」"
translation = "「그렇다면냥…… 지금까지의 가디언도 전부 여기서 만들어진 거냥!?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ほー……ありえそうだな。ヴィーナスの言う通り、ホントに製造工場なのかもしれん」"
translation = "「호오…… 그럴싸하군. 비너스가 말한 대로, 정말로 제조 공장일지도 모르겠어.」"

[[dialogue]]
speaker_original = "ガーディアン"
speaker_translation = "가디언"
original = "「ピ──ピピ。有機生命体の反応を感知」"
translation = "「삐── 삐삐. 유기 생명체의 반응을 감지.」"

[[dialogue]]
speaker_original = "ガーディアン"
speaker_translation = "가디언"
original = "「侵入者発見。侵入者発見。直チニ迎撃体制へ移行する」"
translation = "「침입자 발견. 침입자 발견. 즉시 요격 태세로 이행한다.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「って、またロックオンされてるんですけど──！？」"
translation = "「라니, 또 록온당하고 있는데요──!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「当然、入り口の門番も無限に生成されるってわけだ」"
translation = "「당연히, 입구의 문지기도 무한하게 생성된다는 이야기군.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「き、きりがない……！」"
translation = "「끄, 끝이 없어……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「こうなると──いつどこからガーディアンが出てくるかわからない。気を引き締めていくぞ」"
translation = "「이렇게 되면── 언제 어디서 가디언이 나올지 모른다. 정신 바짝 차리고 가자.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ええ。普段通りのオペレーションができれば、負けないはずです」"
translation = "「네. 평소대로의 작전을 수행할 수 있다면, 지지 않을 것입니다.」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「おうっ！」"
translation = "「오우!」"

