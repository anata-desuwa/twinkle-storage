[[dialogue]]
speaker = "unk"
original = "第３話,かつての強敵との邂逅,P"
translation = "제3화, 과거의 강적과의 해후, P"

[[dialogue]]
speaker = "unk"
original = "星徒会で借りた本の返却と資料の追加レンタルのため、図書館を訪れると、先客のシアン先輩の姿があった。"
translation = "성도회에서 빌린 책 반납과 자료 추가 대출을 위해 도서관을 방문하자, 먼저 와 있는 시안 선배의 모습이 보였다."

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「地図に観光ガイド……ああ、スラング辞典も借りておくか。他に必要なのは、っと……あんまり抱えてると目立っちまうか……？」"
translation = "「지도의 관광 가이드…… 아아, 슬랭 사전도 빌려둘까. 그 밖에 필요한 건, 앗…… 너무 많이 들고 있으면 눈에 띄려나……?」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「ウィステリアは、いねえよな……？\u3000ったく、なんでこんなコソコソしなきゃいけねえんだか……」"
translation = "「위스테리아는 없겠지……? 나 원 참, 왜 이렇게 쭈볏거려야 하는 건지……」"

[[dialogue]]
speaker = "unk"
original = "たくさん本抱えて、何してるんです？"
translation = "책을 잔뜩 들고 뭐 하세요?"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「うおっ、な、なんだ、会長さんか。あっちに気を取られて、気づけなかったぜ……不覚」"
translation = "「우왓, 뭐야, 회장님인가. 저쪽에 신경 쓰느라 눈치채지 못했어…… 불찰이군」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「次の任務の資料探ししてるとこだよ。現地の地図や初めて行く国なら、独自の文化も事前に調べておかなきゃなんねえからな」"
translation = "「다음 임무 자료를 찾는 중이야. 현지 지도나 처음 가는 나라라면 독특한 문화도 미리 조사해둬야 하니까 말이야」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「現地人として潜入した時は些細なところでボロを出しちまいがちなんだ。こういう地味な仕事がわりと大事なんだぜ」"
translation = "「현지인으로 잠입했을 때는 사소한 부분에서 빈틈을 보이기 쉽거든. 이런 수수한 작업이 의외로 중요하다고」"

[[dialogue]]
speaker = "unk"
original = "大変そうだし、なんか手伝いますよ"
translation = "힘들어 보이는데 뭐라도 도와드릴게요"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「そりゃありがてえけど、面倒をかけるわけにはいかねえ。気持ちだけ受け取──」"
translation = "「그거 고맙구만, 하지만 폐를 끼칠 수는 없지. 마음만 받──」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「──そ、そうだ、会長さん！\u3000ここの資料の貸し出し、会長さんの名義でお願いできねえか？」"
translation = "「──그, 그래, 회장님! 여기 자료 대출, 회장님 명의로 부탁할 수 없을까?」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「いや、人の名前で借りるのは良くないってのは、もちろんわかってるけどよ。あまり顔を合わせたくねえヤツがいてさ」"
translation = "「아니, 남의 이름으로 빌리는 게 안 좋다는 건 당연히 알지만. 좀 마주치고 싶지 않은 녀석이 있어서 말이야」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「ここの司書には、ちょっとばかし因縁が──」"
translation = "「여기 사서랑은 약간의 악연이──」"

[[dialogue]]
speaker = "？？？"
original = "「図書館ではお静かに」"
translation = "「도서관에서는 조용히」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「ぎくっ！？」"
translation = "「기겁!?」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「会長くん、こんにちは」"
translation = "「회장군, 안녕」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「読書？\u3000それとも調べ物かしら？\u3000会長の仕事で忙しいのに勤勉ね。偉いじゃない」"
translation = "「독서? 아니면 조사 중일까? 회장 업무로 바쁠 텐데 근면하네. 기특해라」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「でも、声のボリュームには気をつけて。周りの迷惑になるから……あら？」"
translation = "「하지만 목소리 크기는 조심해 줘. 주변에 방해가 되니까…… 어라?」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「そろ～っ……」"
translation = "「살금살금……」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「そちらのあなた、新星の生徒かしら？\u3000あまり見ない顔だけれど」"
translation = "「거기 당신, 신성의 학생일까? 별로 못 보던 얼굴인데」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「あ、あ、あ、あたし！？\u3000もちろんよ！\u3000新星に転校してきたばかりで、シアンって言うの！」"
translation = "「나, 나, 나, 나!? 당연하지! 신성으로 막 전학 온 시안이라고 해!」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「あら……そうなの、ごめんなさい。シアンさんっていうの。とても良い名前ね」"
translation = "「어머…… 그렇구나, 미안해. 시안 양이라고 하는구나. 아주 좋은 이름이네」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「あ、あ、ありがとう。私も気に入ってる名前なの、オホ、オホホホホ」"
translation = "「고, 고마워. 나도 마음에 들어 하는 이름이야, 오호, 오호호호호」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「ん？\u3000シアンさん……私、あなたと前にどこかで会ったことないかしら……」"
translation = "「음? 시안 양…… 나, 당신이랑 전에 어디선가 만난 적 없나……」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「い、いいえ？\u3000全然？\u3000ちっとも？\u3000これっぽっちもあなたと会ったことなんてございませんわね」"
translation = "「아, 아니? 전혀? 조금도? 이만큼도 당신이랑 만난 적 따윈 없사옵니다」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「そうかしら──あっ……もしかして」"
translation = "「그럴까── 앗…… 혹시」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「ごめんなさい。きっと他人の空似ね。世の中には似た人が３人はいるというものね」"
translation = "「미안해. 분명 사람을 잘못 본 거겠지. 세상에는 닮은 사람이 세 명은 있다고 하니까」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「そうねー、きっとそっくりさんねー。そうに違いないわ。絶対そうよ。あたしに似てる人、会ってみたいなー」"
translation = "「그렇네ー, 분명 닮은 사람이겠네ー. 틀림없어. 절대 그래. 나랑 닮은 사람, 만나보고 싶다아ー」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「いけないいけない。まだ整頓が片付いてないのに、あまりお喋りしてたら夜中になっちゃうわ」"
translation = "「이러면 안 되지. 아직 정리가 안 끝났는데 너무 수다 떨면 한밤중이 되겠어」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「では、会長くん、シアンさん、ごゆっくり。くれぐれも、図書館ではお静かに」"
translation = "「그럼 회장군, 시안 양, 천천히 하렴. 부디 도서관에서는 조용히」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「どうも～……気をつけます～……」"
translation = "「네에~…… 조심할게요~……」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「ふう……やれやれ、どうやら気づかれなかったみたいだな」"
translation = "「후우…… 이런이런, 아무래도 안 들킨 모양이군」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「ホッとしたけど、覚えられてなかったっつうのも屈辱だな……くそっ、どっちに転んでも複雑だぜ」"
translation = "「안심은 되지만 기억조차 못 하고 있었다는 것도 굴욕적이군…… 젠장, 어느 쪽이든 기분이 묘하구만」"

[[dialogue]]
speaker = "unk"
original = "今のは……何？"
translation = "방금 그건…… 뭐예요?"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「あ゛ー……あんまり言いたかねえんだけど……無理だよなあ……あれは気になっちまうよなあ……」"
translation = "「아ー…… 정말 말하고 싶지 않다만…… 무리겠지…… 그건 신경 쓰일 수밖에 없겠군……」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「やっちまったな……一応言っておくけど、いつもの任務じゃ、あんな失態はやらかしてねえからな……？」"
translation = "「실수해버렸군…… 일단 말해두겠는데, 평소 임무에선 저런 실책 저지르지 않으니까 말이야……?」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「わかったわかった、話すよ。ただ場所は変えさせてくれ。またウィステリアに目をつけられてもなんだし」"
translation = "「알았어 알았어, 말할게. 대신 장소는 옮기자고. 또 위스테리아한테 찍히면 곤란하니까」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「でも、もう一度、顔合わせたら今度こそ気づかれるかもしれねえし……会長さん、これ借りてきてくれねえか？」"
translation = "「하지만 한 번 더 마주치면 이번엔 진짜 들킬지도 모르니까…… 회장님, 이것 좀 빌려다 줄 수 없을까?」"

[[dialogue]]
speaker = "unk"
original = "結局、俺の名義でシアンの任務資料を借りたのだった。"
translation = "결국 내 명의로 시안의 임무 자료를 빌리게 되었다."

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「サンキュー。恩に着るよ、会長さん」"
translation = "「땡큐. 신세 졌어, 회장님」"

[[dialogue]]
speaker = "unk"
original = "礼には及ばないけれど、シアン先輩が一風変わった側面を見せてくれたお代ということにしておこう。"
translation = "답례까진 필요 없지만, 시안 선배가 이색적인 모습을 보여준 대가라고 해두자."

