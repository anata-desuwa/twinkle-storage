[[dialogue]]
speaker = "unk"
original = "第１話,幼なじみの幼なじみ,P"
translation = "제1화, 소꿉친구의 소꿉친구, P"

[[dialogue]]
speaker = "unk"
original = "ある日の休日。街に買い物に出ると……"
translation = "어느 휴일. 거리로 쇼핑을 나가자……"

[[dialogue]]
speaker = "若い男"
original = "「君、かわいいね。俺とイイところ行かない？」"
translation = "「너, 귀엽네. 나랑 좋은 곳에 가지 않을래?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「イイところってどこ？\u3000私、人間界に来たばかりだからわかんないなぁ～」"
translation = "「좋은 곳이라니 어디? 나, 인간계에 막 온 참이라 잘 모르겠는걸~」"

[[dialogue]]
speaker = "若い男"
original = "「え、じゃあ君、天使か魔族？\u3000いやこんなにかわいいんだからきっと天使だろ。この辺詳しいから案内するよ」"
translation = "「에, 그럼 너, 천사나 마족? 아니 이렇게 귀여우니까 분명 천사겠지. 이 근처 잘 아니까 안내해 줄게」"

[[dialogue]]
speaker = "ナターシャ"
original = "「そうそう、天使なの。でもこれから人と約束があるから遠慮しとくね」"
translation = "「맞아 맞아, 천사야. 하지만 이제부터 사람이랑 약속이 있어서 사양할게」"

[[dialogue]]
speaker = "若い男"
original = "「まぁまぁ、そう釣れないこと言わないでよ。ちゃんと楽しませてあげるからさ」"
translation = "「자자, 그렇게 쌀쌀맞게 굴지 말고. 제대로 즐겁게 해줄 테니까 말이야」"

[[dialogue]]
speaker = "unk"
original = "男がナターシャの腕を掴もうとしたところに──"
translation = "남자가 나타샤의 팔을 잡으려던 찰나에──"

[[dialogue]]
speaker = "unk"
original = "待った"
translation = "잠깐"

[[dialogue]]
speaker = "ナターシャ"
original = "「あ、会長さん。こんにちは」"
translation = "「아, 회장님. 안녕하세요」"

[[dialogue]]
speaker = "若い男"
original = "「あ？\u3000なんだ、男がいたのかよ。ならさっさとそう言えよ」"
translation = "「아? 뭐야, 남자가 있었냐고. 그럼 진작 그렇게 말하라고」"

[[dialogue]]
speaker = "unk"
original = "俺の顔を見ると、男は露骨に不機嫌そうな顔をして去っていった。"
translation = "내 얼굴을 보자, 남자는 노골적으로 불쾌한 표정을 지으며 떠나갔다."

[[dialogue]]
speaker = "ナターシャ"
original = "「ありがと、会長さん。しつこく声かけられて困っちゃってさ」"
translation = "「고마워, 회장님. 끈질기게 말을 걸어와서 곤란하던 참이었어」"

[[dialogue]]
speaker = "ナターシャ"
original = "「あれが伝説に聞くナンパってやつ？\u3000いや～、まさか私が声かけられるとは思わなかったよ」"
translation = "「저게 전설로 듣던 헌팅이라는 거야? 이야~, 설마 내가 말을 걸릴 줄은 몰랐네」"

[[dialogue]]
speaker = "unk"
original = "ナターシャなら自分でなんとかできたんじゃ？"
translation = "나타샤라면 스스로 어떻게든 할 수 있었던 거 아냐?"

[[dialogue]]
speaker = "ナターシャ"
original = "「うん、できたよ。でも暗殺者だから目立つ真似はしたくないんだよね」"
translation = "「응, 할 수 있었어. 하지만 암살자니까 눈에 띄는 짓은 하고 싶지 않거든」"

[[dialogue]]
speaker = "ナターシャ"
original = "「私、表向きは普通の留学生ってことになってるから。エージェントの任務と星騎士の戦闘以外は、荒事は慎みたいの」"
translation = "「나, 겉으로는 평범한 유학생으로 되어 있으니까. 에이전트 임무와 성기사의 전투 이외에는, 거친 일은 삼가고 싶어」"

[[dialogue]]
speaker = "unk"
original = "ならどうして俺に暗殺者って名乗ったんだ？"
translation = "그럼 왜 나한테 암살자라고 자처한 거야?"

[[dialogue]]
speaker = "ナターシャ"
original = "「あなたを消すことが目的じゃないからだよ。あくまで魔王の暴走を止めたいだけだから、<ruby>牽制<rt>けんせい</rt></ruby>してるの」"
translation = "「당신을 없애는 게 목적이 아니기 때문이야. 어디까지나 마왕의 폭주를 막고 싶을 뿐이니까, 견제하고 있는 거야」"

[[dialogue]]
speaker = "ナターシャ"
original = "「『魔王』は聖庭園が警戒するほど力を持った存在。あなたも自覚はあるでしょ？\u3000なら、最初から種明かししてしまった方が誤解はないってこと」"
translation = "「『마왕』은 성정원이 경계할 정도로 힘을 가진 존재. 당신도 자각은 있지? 그렇다면, 처음부터 패를 보여주는 편이 오해가 없다는 거지」"

[[dialogue]]
speaker = "ナターシャ"
original = "「それに、私は私なりにあなたを信用してこうしてるの」"
translation = "「게다가, 나는 나대로 당신을 신용해서 이러는 거야」"

[[dialogue]]
speaker = "ナターシャ"
original = "「あなたは利口だから、知らせても不用意に騒ぎ立てることはしないし、静観することで潔白を証明できるならそうする」"
translation = "「당신은 영리하니까, 알려줘도 부주의하게 소란을 피우지는 않을 거고, 정관하는 것으로 결백을 증명할 수 있다면 그렇게 하겠지」"

[[dialogue]]
speaker = "ナターシャ"
original = "「そうすれば、私がしばらく近くにいるだけで聖庭園からの疑いは晴れるし、私の仕事も平和に終わる。お互いの利益になるんだよ」"
translation = "「그렇게 하면, 내가 잠시 곁에 있는 것만으로 성정원으로부터의 의심은 풀릴 거고, 내 일도 평화롭게 끝나. 서로의 이익이 되는 거야」"

[[dialogue]]
speaker = "メルエル"
original = "「ナターシャちゃ～ん！」"
translation = "「나타샤 쨔~응!」"

[[dialogue]]
speaker = "ナターシャ"
original = "「あ、来たね」"
translation = "「아, 왔네」"

[[dialogue]]
speaker = "メルエル"
original = "「ナターシャちゃん、お待た──」"
translation = "「나타샤 쨩, 기다──」"

[[dialogue]]
speaker = "メルエル"
original = "「会長くん！？\u3000どうして２人が一緒にいるの！？」"
translation = "「회장 군!? 어째서 둘이 같이 있는 거야!?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「今そこでたまたま出会ってね。私がナンパされてたところを助けてもらったんだ」"
translation = "「방금 여기서 우연히 만났어. 내가 헌팅당하던 걸 도와줬거든」"

[[dialogue]]
speaker = "メルエル"
original = "「ええっ、ナターシャちゃん大丈夫だった？」"
translation = "「에엣, 나타샤 쨩 괜찮았어?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「うん、会長さんが颯爽と現れてかっこよく助けてくれたからね」"
translation = "「응, 회장님이 시원하게 나타나서 멋지게 도와줬으니까」"

[[dialogue]]
speaker = "メルエル"
original = "「そ、そうなんだ……ありがとう、会長くん」"
translation = "「그, 그렇구나…… 고마워, 회장 군」"

[[dialogue]]
speaker = "メルエル"
original = "（ナターシャちゃんが無事だったのは良かったけど、かっこいい会長くんは見たかったよ～っ）"
translation = "(나타샤 쨩이 무사했던 건 다행이지만, 멋있는 회장 군은 보고 싶었어~!)"

[[dialogue]]
speaker = "unk"
original = "２人は幼なじみなんだっけ？"
translation = "둘은 소꿉친구였던가?"

[[dialogue]]
speaker = "ナターシャ"
original = "「そうそう。メルエルと同じ、天界の聖庭園の出身で、小さい頃から一緒だったんだ。一時期流星市国に行ってた頃は寂しかったな」"
translation = "「맞아 맞아. 메르엘과 같은 천계의 성정원 출신으로, 어릴 때부터 함께였어. 한때 유성시국에 가 있었을 때는 외로웠지」"

[[dialogue]]
speaker = "ナターシャ"
original = "「でも帰ってきたら、向こうで会った男の子の話ばっかりするようになっちゃって」"
translation = "「하지만 돌아왔더니, 저쪽에서 만난 남자애 이야기만 하게 되어버려서」"

[[dialogue]]
speaker = "メルエル"
original = "「なな、ナターシャちゃん！？\u3000その話は内緒にして～っ」"
translation = "「나, 나나, 나타샤 쨩!? 그 이야기는 비밀로 해줘~!」"

[[dialogue]]
speaker = "ナターシャ"
original = "「あ、言っちゃいけなかった？」"
translation = "「아, 말하면 안 되는 거였어?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ま、そんな感じで、会長さんの幼なじみの幼なじみってわけ」"
translation = "「뭐, 그런 느낌으로, 회장님의 소꿉친구의 소꿉친구라는 거지.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「で、今日は人間界に来たばかりで不慣れな私のために、メルエルが案内してくれる約束だったんだ」"
translation = "「그래서, 오늘은 인간계에 막 와서 익숙하지 않은 나를 위해서, 메르엘이 안내해 주기로 약속했었어.」"

[[dialogue]]
speaker = "unk"
original = "なるほど。お邪魔そうだし俺はこれで"
translation = "과연. 방해될 것 같으니 난 이만."

[[dialogue]]
speaker = "メルエル"
original = "「えっ！？\u3000あ、うん……」"
translation = "「엣!? 아, 응……」"

[[dialogue]]
speaker = "ナターシャ"
original = "「え～、全然邪魔じゃないよね、メルエル？\u3000むしろ賑やかな方が楽しいくらい」"
translation = "「에~, 전혀 방해 안 되지, 그치 메르엘? 오히려 북적거리는 편이 즐거울 정도야.」"

[[dialogue]]
speaker = "メルエル"
original = "「！\u3000う、うん。良かったら会長くんも一緒に行こ？」"
translation = "「! 으, 응. 괜찮다면 회장 군도 같이 갈래?」"

[[dialogue]]
speaker = "unk"
original = "それなら喜んで"
translation = "그렇다면 기꺼이."

[[dialogue]]
speaker = "メルエル"
original = "「やった！」"
translation = "「앗싸!」"

[[dialogue]]
speaker = "メルエル"
original = "「こっちが服屋さんで、あっちの建物が本屋さん。向こうのディスカウントストアにはだいたい何でもあるんだよ！」"
translation = "「이쪽이 옷 가게고, 저쪽 건물이 서점. 저 너머 디스카운트 스토어에는 웬만한 건 다 있어!」"

[[dialogue]]
speaker = "ナターシャ"
original = "「へ～、さすが人間界。いろいろあるんだね」"
translation = "「헤~, 역시 인간계. 여러 가지가 있네.」"

[[dialogue]]
speaker = "メルエル"
original = "「この辺はご飯食べるところもたくさんあるし……そうだ、みんなで一緒にお昼食べよっ」"
translation = "「이 근처는 밥 먹을 곳도 많이 있고…… 맞다, 다 같이 점심 먹자!」"

[[dialogue]]
speaker = "ナターシャ"
original = "（ふふ、メルエル楽しそうだね。会長さんがいてくれてよかった）"
translation = "（후후, 메르엘 즐거워 보이네. 회장님이 있어 줘서 다행이야.）"

[[dialogue]]
speaker = "unk"
original = "（メルエルはどこまで知ってるんだ？）"
translation = "（메르엘은 어디까지 알고 있는 거지?）"

[[dialogue]]
speaker = "ナターシャ"
original = "（私の仕事のこと？\u3000大丈夫、メルエル含めて、ほとんどの天使は聖庭園の後ろ暗い部分は知らないから）"
translation = "（내 일에 대해서? 괜찮아, 메르엘을 포함해서 대부분의 천사는 성정원의 어두운 부분은 모르니까.）"

[[dialogue]]
speaker = "ナターシャ"
original = "（私のことは、エリートが聖庭園の仕事を任されてる……ぐらいにしか思ってないよ）"
translation = "（나에 대해서는, 엘리트가 성정원의 업무를 맡고 있다…… 정도로밖에 생각 안 해.）"

[[dialogue]]
speaker = "メルエル"
original = "「ナターシャちゃん、会長くん！\u3000あっちのイタリアンのお店どうかな？\u3000お洒落で美味しそうだよ！」"
translation = "「나타샤짱, 회장 군! 저기 이탈리안 레스토랑 어때? 세련되고 맛있어 보여!」"

[[dialogue]]
speaker = "ナターシャ"
original = "「うん、いいんじゃない」"
translation = "「응, 괜찮네.」"

[[dialogue]]
speaker = "unk"
original = "聖庭園の特務エージェント・ナターシャ。彼女については不明なことが多いが、メルエルと仲がいいことは間違いなさそうだ。"
translation = "성정원의 특무 에이전트 나타샤. 그녀에 대해서는 불명확한 점이 많지만, 메르엘과 사이가 좋은 것은 틀림없어 보인다."

[[dialogue]]
speaker = "ナターシャ"
original = "「ふふ……」"
translation = "「후후……」"

[[dialogue]]
speaker = "unk"
original = "だけどナターシャがメルエルを見つめる目に、何かそれ以上のものがある気がするのだった。"
translation = "하지만 나타샤가 메르엘을 바라보는 눈에, 무언가 그 이상의 것이 있는 듯한 기분이 들었다."

