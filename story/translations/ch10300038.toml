[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "（それは、私のクリスマスフォームの力が発動して、恋人である会長と１メートル以上離れられなくなってしまった夜のこと――）"
translation = "（그것은, 나의 크리스마스 폼의 힘이 발동해서, 연인인 회장과 1미터 이상 떨어질 수 없게 되어 버린 밤의 일――）"

[[dialogue]]
speaker = "unk"
original = "私たちはクリスマスの埋め合わせをするようにスキンシップを重ね続けて、それは次第に熱を帯びていっていた。"
translation = "우리는 크리스마스를 만회하듯이 스킨십을 계속했고, 그것은 점차 열기를 띠어 가고 있었다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「んっ……<emoji=heart04>\u3000会長……<emoji=heart04>」"
translation = "「응읏……<emoji=heart04> 회장……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「んむっ……<emoji=heart04>\u3000ちゅっ……<emoji=heart04>\u3000んちゅっ……ちゅむっ<emoji=heart04>\u3000ちゅれるっ<emoji=heart04>\u3000ちゅるるっ<emoji=heart04>\u3000れるれるっ<emoji=heart04>\u3000れろちゅっ……<emoji=heart04>」"
translation = "「음믓……<emoji=heart04> 츕……<emoji=heart04> 응츕…… 츕믓<emoji=heart04> 츄르릅<emoji=heart04> 츄르르릅<emoji=heart04> 르르르릅<emoji=heart04> 레로츕……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "会長と何度もキスをして、お互いの舌を絡め合う。"
translation = "회장과 몇 번이고 키스를 하고, 서로의 혀를 얽어맨다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ちゅぱっ……はあぁっ……<emoji=heart04>」"
translation = "「츄팟…… 하아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ナミエル、俺……したい」"
translation = "「나미엘, 나…… 하고 싶어」"

[[dialogue]]
speaker = "unk"
original = "会長が深く抱き締めてきて、耳元で求められる。久しぶりなので、私も心臓が大きく脈打って、ドキドキしてしまう。"
translation = "회장이 깊게 끌어안아 오고, 귓가에서 요구한다. 오랜만이라서, 나도 심장이 크게 박동하고, 두근거려 버린다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「んっ……<emoji=heart04>\u3000会長ってば、お腹に固いのが当たってますよ……？\u3000全く……スキンシップしてると、すぐに大きくしてしまうんですから……<emoji=heart04>」"
translation = "「응읏……<emoji=heart04> 회장도 참, 배에 딱딱한 게 닿고 있어요……? 정말…… 스킨십만 하면, 바로 커져 버리니까요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "会長はそこで、私にあるお願いをしてくる。"
translation = "회장은 거기서, 나에게 어떤 부탁을 해 온다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「えっ？\u3000――脇を見せながら、ご奉仕して欲しい？\u3000も、もう……<emoji=heart04>」"
translation = "「엣? ――겨드랑이를 보여주면서, 봉사해 줬으면 좋겠다고요? 모, 정말……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「んっ……<emoji=heart04>\u3000はあぁっ……ふうぅ……<emoji=heart04>」"
translation = "「응읏……<emoji=heart04> 하아앗…… 후우우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それから、ソファーに深くもたれかかるように会長が座って、私はその膝の上に乗るような形で向かい合った。"
translation = "그리고 나서, 소파에 깊숙이 기대듯이 회장이 앉고, 나는 그 무릎 위에 올라타는 형태로 마주 보았다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「脇を見せるポーズでなんて……会長はやっぱりいやらしいです……<emoji=heart04>」"
translation = "「겨드랑이를 보여주는 포즈라니…… 회장님은 역시 야해요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それでも、なんだかんだやってくれるナミエルが好きだ」"
translation = "「그래도, 이래저래 해주는 나미엘이 좋아」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「それは一応……恋人として、彼氏の性欲処理はちゃんとしてあげないといけませんから……」"
translation = "「그건 일단…… 연인으로서, 남자친구의 성욕 처리는 제대로 해 줘야 하니까요……」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「な、なので、別に私がしたいわけじゃなくて、こんなの恥ずかしいんですから、変にからかったりしたら、処しますからね……！」"
translation = "「그, 그러니까, 별로 내가 하고 싶은 게 아니라, 이런 건 부끄러우니까, 이상하게 놀리거나 하면, 처단할 거예요……!」"

[[dialogue]]
speaker = "unk"
original = "私は脇を見せることに恥ずかしさを感じながら、腰をちょっと浮かして、ストッキングを破り覗かせた秘部を、おち○ちんへと擦りつけ始める。"
translation = "나는 겨드랑이를 보여주는 것에 부끄러움을 느끼면서, 허리를 살짝 띄우고, 스타킹을 찢어 드러낸 은밀한 부분을, 자지에게 문지르기 시작한다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "（んっ<emoji=heart04>\u3000久しぶりの会長のおち○ちん……大きくて存在感がすごい……<emoji=heart04>）"
translation = "（응읏<emoji=heart04> 오랜만의 회장님의 자지…… 크고 존재감이 대단해……<emoji=heart04>）"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「んんっ<emoji=heart04>\u3000はあぁっ……<emoji=heart04>\u3000んっ<emoji=heart04>\u3000あっ……<emoji=heart04>\u3000んふぅ……<emoji=heart04>」"
translation = "「응응읏<emoji=heart04> 하아앗……<emoji=heart04> 응읏<emoji=heart04> 앗……<emoji=heart04> 응후우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "熱くて固いおち○ちんの形や感触を、スマタしながら確かめていると、おま○こが勝手に反応してきてしまう。"
translation = "뜨겁고 단단한 자지의 모양이나 감촉을, 보지 비비기를 하면서 확인하고 있자, 보지가 멋대로 반응해 와 버린다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "（これまで何度もしてきたエッチの感覚を思い出して、久しぶりの美味しいご馳走を目の前にしたみたいに、おま○こから<ruby>愛液<rt>よだれ</rt></ruby>が溢れてきちゃう……<emoji=heart04>）"
translation = "（지금까지 몇 번이고 했던 섹스의 감각을 떠올리고, 오랜만의 맛있는 진수성찬을 눈앞에 둔 것처럼, 보지에서 애액이 넘쳐흘러 버려……<emoji=heart04>）"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「あっ<emoji=heart04>\u3000会長、脇に触っていいなんて許可してませんよ……<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふうぅっ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 회장, 겨드랑이에 만져도 된다고 허락 안 했어요……<emoji=heart04> 응읏<emoji=heart04> 후우읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "会長が手を伸ばしてきて、私の脇にそっと指で触れ、優しく愛撫してくる。"
translation = "회장이 손을 뻗어 와서, 나의 겨드랑이에 살짝 손가락으로 만지며, 부드럽게 애무해 온다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「んぁっ<emoji=heart04>\u3000そんなくすぐるみたいに触っちゃっ――はぁんっ<emoji=heart04>\u3000んっ……ふあぁっ……<emoji=heart04>」"
translation = "「응아앗<emoji=heart04> 그렇게 간지럽히듯이 만지면―― 하앙읏<emoji=heart04> 응읏…… 후아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「も、もう<emoji=heart04>\u3000変な悪戯しないで下さいっ<emoji=heart04>\u3000準備できたので、おち○ちん、もう挿れちゃいますよ……<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふうぅっ……<emoji=heart04>」"
translation = "「모, 정말<emoji=heart04> 이상한 장난치지 말아 주세요읏<emoji=heart04> 준비되었으니, 자지, 이제 넣어 버릴 거예요……<emoji=heart04> 응읏<emoji=heart04> 후우읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "私は愛液ですっかりぐしょぐしょになってしまったショーツを横にズラしながら、おち○ちんの大きな亀頭を、膣穴にあてがう。"
translation = "나는 애액으로 완전히 축축해져 버린 팬티를 옆으로 밀어 올리면서, 자지의 커다란 귀두를, 질 구멍에 갖다 댄다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「んんっ――<emoji=heart04>」"
translation = "「응응읏――<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「あっ──ふぁあああぁ～っ<emoji=heart04><emoji=heart04>」"
translation = "「앗── 후아아아아앙~읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "久しぶりの膣内挿入に、思わず大きな声が出てしまった。"
translation = "오랜만의 질 내 삽입에, 무심코 큰 소리가 나와 버렸다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「あぁっ<emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んふぅっ……<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んああぁっ……！」"
translation = "「아아앗<emoji=heart04> 흐응으읏<emoji=heart04> 후아아앗<emoji=heart04> 앗<emoji=heart04> 앙앗<emoji=heart04> 흐응으읏……<emoji=heart04> 앗<emoji=heart04> 흐응아아앗……!」"

[[dialogue]]
speaker = "unk"
original = "オナニーする時の自分の指とは比べ物にならない程に、逞しく太い会長の男根に中を押し広げられる。ちょっと腰を動かしただけで強い刺激を感じて、背筋がゾクゾクとしてしまう。"
translation = "자위할 때 쓰는 자신의 손가락과는 비교도 되지 않을 만큼, 억세고 굵은 회장의 남근에 안이 밀려 넓혀진다. 살짝 허리를 움직인 것만으로도 강한 자극을 느껴서, 등골이 오싹해진다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "（す、数週間ぶりのおち○ちん、すごく気持ちいい……！\u3000腰が思わず抜けちゃいそうなくらいっ……<emoji=heart04><emoji=heart04>）"
translation = "（스, 수 주일 만의 자지, 너무 기분 좋아……! 허리가 무심코 빠져버릴 것만 같아……<emoji=heart04><emoji=heart04>）"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "（でも、メイドの恋人として、ちゃんと動いてご奉仕しないと……っ<emoji=heart04>）"
translation = "（하지만, 메이드의 애인으로서, 제대로 움직여서 봉사해야 해……!）"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「んっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000んうぅっ……<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000あっ！？\u3000あんっ<emoji=heart04>\u3000んああぁっ<emoji=heart04>」"
translation = "「응읏<emoji=heart04> 흐우읏<emoji=heart04> 흐응으읏……<emoji=heart04> 하아앗<emoji=heart04> 앗!? 앙앗<emoji=heart04> 흐응아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "会長が再び手を伸ばしてきて、脇を愛撫される。"
translation = "회장이 다시 손을 뻗어와서, 겨드랑이를 애무한다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「あっ<emoji=heart04>\u3000会長……ダメですってばっ<emoji=heart04>\u3000脇を触ったりしちゃ……んっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふああぁっ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 회장…… 안 된다니까요<emoji=heart04> 겨드랑이를 만지거나 하면…… 응읏<emoji=heart04> 흐우읏<emoji=heart04> 하아앗<emoji=heart04> 후아아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺……今日はナミエルの脇を愛したい」"
translation = "「나…… 오늘은 나미엘의 겨드랑이를 사랑하고 싶어」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「んっ<emoji=heart04>\u3000なに言っているんですかっ<emoji=heart04>\u3000恥ずかしいから、それ以上脇を撫でちゃダメですっ<emoji=heart04>\u3000んっ！？\u3000んむっ……<emoji=heart04>\u3000んふうぅっ……<emoji=heart04><emoji=heart04>」"
translation = "「응읏<emoji=heart04> 무, 무슨 말씀을 하시는 거예요<emoji=heart04> 부끄러우니까, 그 이상 겨드랑이를 쓰다듬으면 안 돼요<emoji=heart04> 응읏!? 흐응으읏……<emoji=heart04> 흐응으우읏……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そこで、ソファーの背もたれから起き上がってきた会長に唇を塞がれて、キスされてしまう。"
translation = "그때, 소파 등받이에서 몸을 일으킨 회장에게 입술이 막혀서, 키스를 당하고 만다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ちゅっ<emoji=heart04>\u3000んむっ……んちゅっ<emoji=heart04>\u3000ちゅむむっ<emoji=heart04>\u3000ちゅるるっ<emoji=heart04>\u3000れろちゅっ<emoji=heart04>\u3000ちゅぱぁっ……<emoji=heart04>」"
translation = "「츄읏<emoji=heart04> 흐응으읏…… 흐응츄읏<emoji=heart04> 츄므므읏<emoji=heart04> 츄르르읏<emoji=heart04> 레로츄읏<emoji=heart04> 츄파앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "会長の舌が唇の間から入ってきて、私の舌と粘膜を絡め合う。"
translation = "회장의 혀가 입술 사이로 들어와서, 나의 혀와 점막을 얽어맨다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「んはぁっ<emoji=heart04>\u3000んむっ<emoji=heart04>\u3000ちゅむっ<emoji=heart04>\u3000ちゅぷぷっ<emoji=heart04>\u3000ちゅれるっ<emoji=heart04>\u3000れるれるっ<emoji=heart04>\u3000れろちゅっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ちゅるるるっ<emoji=heart04>\u3000んはぁっ……！」"
translation = "「흐응하앗<emoji=heart04> 흐응으읏<emoji=heart04> 츄므읏<emoji=heart04> 츄프프읏<emoji=heart04> 츄레르읏<emoji=heart04> 레르레르읏<emoji=heart04> 레로츄읏<emoji=heart04> 응읏<emoji=heart04> 츄르르르읏<emoji=heart04> 흐응하앗……!」"

[[dialogue]]
speaker = "unk"
original = "舌の絡み合う感覚が、おま○この粘膜が擦れ合う感覚と重なり、上の口でもセックスしているかのような快楽に、脳内を侵されていく。"
translation = "혀가 얽히는 감각이, 보지의 점막이 비벼지는 감각과 겹쳐져, 윗입으로도 섹스하는 듯한 쾌락에, 뇌내를 침범당해 간다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "（はあぁっ<emoji=heart04>\u3000ダメっ<emoji=heart04>\u3000キス、すごく気持ちいいっ……<emoji=heart04>\u3000理性がとろけて、何も考えられなくなっちゃうっ……<emoji=heart04>）"
translation = "（하아앗<emoji=heart04> 안 돼<emoji=heart04> 키스, 너무 기분 좋아……<emoji=heart04> 이성이 녹아내려서, 아무것도 생각할 수 없게 돼……<emoji=heart04>）"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ナミエル……脇、触っちゃダメか……？」"
translation = "「나미엘…… 겨드랑이, 만지면 안 돼……?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「んっ<emoji=heart04>\u3000も、もう、しょうがない彼氏ですね……<emoji=heart04>\u3000ダメって言っても、我慢できなくなっちゃう癖に……<emoji=heart04>」"
translation = "「응읏<emoji=heart04> 모, 정말, 어쩔 수 없는 남자친구네요……<emoji=heart04> 안 된다고 해도, 참지 못하게 될 버릇이 있으면서……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "すると会長は、脇に顔を近づけて、舌でちろっと舐めてくる。"
translation = "그러자 회장은, 겨드랑이에 얼굴을 가까이 대고, 혀로 낼름 핥아온다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ふああぁっ<emoji=heart04><emoji=heart04>\u3000んっ<emoji=heart04>\u3000な、舐めていいなんて、まだ許可してないですよ――はぁんっ<emoji=heart04>」"
translation = "「후아아앗<emoji=heart04><emoji=heart04> 응읏<emoji=heart04> 나, 핥아도 된다고, 아직 허락하지 않았어요――하앙읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「んうぅっ<emoji=heart04>\u3000んはぁっ……やぁっ<emoji=heart04>\u3000くすぐったいですっ……<emoji=heart04>」"
translation = "「흐응으읏<emoji=heart04> 흐응하앗…… 꺄앗<emoji=heart04> 간지러워요<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "（でも、なんだか……くすぐったいだけじゃなくて、変な感じが……<emoji=heart04>）"
translation = "（하지만, 왠지…… 간지러울 뿐만 아니라, 이상한 느낌이……<emoji=heart04>）"

[[dialogue]]
speaker = "unk"
original = "会長は片方の脇を舐めるだけじゃなく、更にもう片方の脇も、指で愛撫し始める。"
translation = "회장은 한쪽 겨드랑이를 핥는 것뿐만 아니라, 더욱이 다른 한쪽 겨드랑이도, 손가락으로 애무하기 시작한다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「あっ、か、会長<emoji=heart04>\u3000同時になんて……ずるいですっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふああぁっ……<emoji=heart04>」"
translation = "「앗, 회, 회장<emoji=heart04> 동시에라니…… 치사해요<emoji=heart04> 응읏<emoji=heart04> 하아앗<emoji=heart04> 후아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "最初は『恥ずかしい』『くすぐったい』という思っていた感覚が、徐々に変化してきていることに気づく。"
translation = "처음에는 '부끄럽다', '간지럽다'라고 생각했던 감각이, 서서히 변화하고 있다는 것을 깨닫는다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "（な、なんだか少しずつ、脇を弄られるのが『気持ちいい』って感覚に近づいてきて……<emoji=heart04>）"
translation = "（워, 왠지 조금씩, 겨드랑이를 희롱당하는 것이 '기분 좋다'는 감각에 가까워지고……<emoji=heart04>）"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「あっ<emoji=heart04>\u3000んぁっ<emoji=heart04>\u3000それっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000キス混ぜるの、いやらしいですっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んああぁっ……<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 흐응앗<emoji=heart04> 그거<emoji=heart04> 응읏<emoji=heart04> 키스 섞는 거, 야해요<emoji=heart04> 앗<emoji=heart04> 흐응아아앗……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "会長が舌で舐めていた方の脇に、ちゅっとキスを時折し始める。"
translation = "회장이 혀로 핥고 있던 쪽 겨드랑이에, 쪽 하고 키스를 가끔씩 하기 시작한다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「はぁんっ<emoji=heart04>\u3000キスされるたびに、勝手に体が反応しちゃいますっ……<emoji=heart04>\u3000んっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふああぁっ……<emoji=heart04>」"
translation = "「하앙읏<emoji=heart04> 키스 받을 때마다, 멋대로 몸이 반응해 버려요<emoji=heart04> 응읏<emoji=heart04> 하아앗<emoji=heart04> 후아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "脇から愛情が流れ込んでくるようで、感度がどんどん高まっていくのを肌に感じる。"
translation = "겨드랑이에서 애정이 흘러들어오는 것 같아서, 감도가 점점 높아져 가는 것을 피부로 느낀다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "（会長から愛されてる感じがして……なんだか、脇にキスされて、気持ち良く感じちゃう……<emoji=heart04>）"
translation = "（회장에게 사랑받는 느낌이 들어서…… 왠지, 겨드랑이에 키스받고, 기분 좋게 느껴져……<emoji=heart04>）"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「もう片方の脇、汗がいっぱい溜まってきてるね」"
translation = "「다른 쪽 겨드랑이, 땀이 잔뜩 고여 있네」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「んっ<emoji=heart04>\u3000会長……？」"
translation = "「응읏<emoji=heart04> 회장……?」"

[[dialogue]]
speaker = "unk"
original = "ふと、会長は指で愛撫していた方の脇に――鼻を近づけて、言う。"
translation = "문득, 회장은 손가락으로 애무하고 있던 쪽 겨드랑이에――코를 가까이 대고, 말한다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ナミエルの脇汗、フェロモンたっぷりのエッチな匂いがする」"
translation = "「나미엘의 겨드랑이 땀, 페로몬 가득한 야한 냄새가 나」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ふえっ！？\u3000やっ<emoji=heart04>\u3000会長、嗅がないで下さいっ……！\u3000それは反則ですよっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふうぅっ……<emoji=heart04>」"
translation = "「푸엣!? 꺄앗<emoji=heart04> 회장, 냄새 맡지 마세요……! 그건 반칙이에요<emoji=heart04> 앗<emoji=heart04> 응읏<emoji=heart04> 흐우읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "会長はそれから、汗を舌で舐めてくる。"
translation = "회장은 그리고 나서, 땀을 혀로 핥아온다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「味もすごくエッチで、興奮してきた……」"
translation = "「맛도 엄청 야해서, 흥분돼 왔어……」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「やぁっ<emoji=heart04>\u3000そんなねちっこく舐めたら感じちゃっ……んっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000あっ――！？」"
translation = "「꺄앗<emoji=heart04> 그렇게 끈적하게 핥으면 느껴버려…… 응읏<emoji=heart04> 하아앗<emoji=heart04> 앗――!?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「んあああぁぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「흐응아아아아아아~~~읏<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "突然、会長が下から腰を動かし始めて、思わずまた大きな嬌声を上げてしまう。"
translation = "갑자기, 회장이 아래에서 허리를 움직이기 시작해서, 무심코 또다시 큰 교성을 질러버린다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「会長、そんないきなりぃっ<emoji=heart04>\u3000あっ、あんっ、んあぁっ、んうぅっ<emoji=heart04>\u3000はあぁっ、ふあぁっ、んああぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「회장, 그렇게 갑자기<emoji=heart04> 앗, 앙읏, 흐응앗, 흐응으읏<emoji=heart04> 하아앗, 후아앗, 흐응아아앗~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「おち○ちん、奥をぐりぐりって突き上げてきてぇ<emoji=heart04>\u3000あっ、はぁんっ、んふぅっ、んあぁっ<emoji=heart04>\u3000感じちゃうっ<emoji=heart04>\u3000あっ、あ、ぁ、あ、はああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「자지, 안쪽을 꾹꾹 찔러 올려와<emoji=heart04> 앗, 하앙읏, 흐응으읏, 흐응앗<emoji=heart04> 느껴버려<emoji=heart04> 앗, 아, 아, 아, 하아아앙읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "私が最後まで動くつもりだったのに、奥への刺激で腰の力が抜けてきてしまう。"
translation = "내가 끝까지 움직일 생각이었는데, 안쪽으로의 자극에 허리의 힘이 빠져버린다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「だ、ダメぇ<emoji=heart04>\u3000おま○こ気持ち良くて、力が抜けて動けなくなっちゃいますぅ<emoji=heart04>\u3000あっ、あんっ、はあぁっ、ふあぁっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「아, 안 돼<emoji=heart04> 보지 기분 좋아서, 힘이 빠져서 움직일 수 없게 돼요<emoji=heart04> 앗, 앙읏, 하아앗, 후아앗<emoji=heart04> 흐응아아앙읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ナミエル、好きだっ……！」"
translation = "「나미엘, 사랑해……!」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「あっ、ふああぁっ<emoji=heart04><emoji=heart04>\u3000会長、そんな風に言いながら脇にキスされたらぁ<emoji=heart04>\u3000んっ、はあぁっ、んあぁっ<emoji=heart04>\u3000感じちゃいますぅっ<emoji=heart04>\u3000あっ、あ、あ、あ、ふああぁ～っ<emoji=heart04><emoji=heart04>」"
translation = "「앗, 후아아앗<emoji=heart04><emoji=heart04> 회장, 그런 식으로 말하면서 겨드랑이에 키스하면<emoji=heart04> 응읏, 하아앗, 흐응앗<emoji=heart04> 느껴버려요<emoji=heart04> 앗, 아, 아, 아, 후아아앗~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "感度が上がった脇にキスをされる度に、甘美な電流が流れるように感じてしまう。"
translation = "감도가 높아진 겨드랑이에 키스를 받을 때마다, 감미로운 전류가 흐르는 것처럼 느껴버린다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「はぁんっ<emoji=heart04>\u3000ダメぇっ<emoji=heart04>\u3000気持ちいいですっ<emoji=heart04>\u3000あっ、あ、あ、ぁ、はああぁ～っ<emoji=heart04><emoji=heart04>」"
translation = "「하앙읏<emoji=heart04> 안 돼<emoji=heart04> 기분 좋아요<emoji=heart04> 앗, 아, 아, 아, 하아아앗~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「このままされ続けたら、脇を愛されるのが気持ちいいって覚えちゃいますぅっ<emoji=heart04>\u3000あっ、あ、ぁ、あ、あんっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「이대로 계속 당하면, 겨드랑이를 사랑받는 게 기분 좋다는 걸 기억해버려요<emoji=heart04> 앗, 아, 아, 아, 앙읏<emoji=heart04> 하아아앙읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "頭の中が『気持ちいい』でいっぱいになって、恥ずかしさよりももっと気持ち良くなりたいという欲求の方が大きくなっていく。"
translation = "머릿속이 '기분 좋다'로 가득 차서, 부끄러움보다도 더 기분 좋아지고 싶다는 욕구가 더 커져 간다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ふあぁっ<emoji=heart04>\u3000もうダメっ<emoji=heart04>\u3000おま○こ気持ちいいっ<emoji=heart04>\u3000気持ちいいので何も考えられなくなっちゃいますぅ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「후아앗<emoji=heart04> 이제 안 돼<emoji=heart04> 보지 기분 좋아<emoji=heart04> 기분 좋아서 아무것도 생각할 수 없게 되어 버려요~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「私、もうすぐイっちゃいそうですぅっ<emoji=heart04><emoji=heart04>\u3000あっ、あ、ぁ、あんっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「저, 이제 곧 가 버릴 것 같아요<emoji=heart04><emoji=heart04> 앗, 아, 아, 앙<emoji=heart04> 응아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……俺も気持ち良くて、もうそろそろイキそうだ……！」"
translation = "「읏…… 나도 기분 좋아서, 이제 곧 갈 것 같아……!」"

[[dialogue]]
speaker = "unk"
original = "そう言って、会長は腰の動きを次第に激しくしていく。"
translation = "그렇게 말하며, 회장은 허리의 움직임을 점차 격렬하게 해 간다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「あっ、あ、あ、ぁ、はあぁんっ<emoji=heart04><emoji=heart04>\u3000おち○ちん、すごいぃっ<emoji=heart04><emoji=heart04>\u3000んっ、あ、あ、ぁ、んあぁっ<emoji=heart04>\u3000はあぁっ、あ、ぁ、あ、あんっ<emoji=heart04>\u3000ふああぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「앗, 아, 아, 아, 하아앙<emoji=heart04><emoji=heart04> 자지, 대단해<emoji=heart04><emoji=heart04> 응, 아, 아, 아, 응아앗<emoji=heart04> 하아앗, 아, 아, 아, 앙<emoji=heart04> 후아아앙~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "絶頂へ向けて大きくなり続ける快楽の波に、私も会長の動きに合わせて、腰の力が上手く入らないのに思わず揺すってしまう。"
translation = "절정을 향해 계속 커지는 쾌락의 파도에, 나도 회장의 움직임에 맞춰, 허리에 힘이 잘 들어가지 않는데도 무심코 흔들고 만다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「はあああぁっ<emoji=heart04>\u3000ダメっ<emoji=heart04>\u3000気持ちいいですっ<emoji=heart04>\u3000おち○ちん気持ちいいっ<emoji=heart04>\u3000んっ、あ、あ、あんっ<emoji=heart04>\u3000ふぁああぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「하아아아앗<emoji=heart04> 안 돼<emoji=heart04> 기분 좋아요<emoji=heart04> 자지 기분 좋아<emoji=heart04> 응, 아, 아, 앙<emoji=heart04> 후아아아앙~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「もっと<emoji=heart04>\u3000おま○こ、もっと愛して欲しいですっ<emoji=heart04>\u3000数週間ぶりのエッチで、気持ちいいですぅ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「더<emoji=heart04> 보지, 더 사랑해 줬으면 좋겠어요<emoji=heart04> 몇 주 만의 섹스라, 기분 좋아요~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「あっ、ふああぁっ<emoji=heart04><emoji=heart04>\u3000会長<emoji=heart04>\u3000そこ<emoji=heart04>\u3000奥のそこ、ぐりぐりって強くされるの気持ちいいっ<emoji=heart04>\u3000あっ、あんっ、はあぁっ、ふあぁっ<emoji=heart04>\u3000んああぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「앗, 후아아앗<emoji=heart04><emoji=heart04> 회장<emoji=heart04> 거기<emoji=heart04> 안쪽의 거기, 꾹꾹 강하게 하는 거 기분 좋아<emoji=heart04> 앗, 앙, 하아앗, 후아앗<emoji=heart04> 응아아앙~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "会長のおち○ちんで激しく愛されて、大きな絶頂の波がいよいよ迫ってくる。"
translation = "회장의 자지로 격렬하게 사랑받아, 큰 절정의 파도가 드디어 다가온다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ふああああぁっ<emoji=heart04><emoji=heart04>\u3000もうダメぇっ<emoji=heart04>\u3000来ちゃいますっ<emoji=heart04>\u3000会長、私もうイっちゃいますぅっ<emoji=heart04>\u3000あっ、あ、ぁ、あ、んあああぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「후아아아아앗<emoji=heart04><emoji=heart04> 이제 안 돼<emoji=heart04> 와 버려요<emoji=heart04> 회장, 저 이제 가 버려요<emoji=heart04> 앗, 아, 아, 아, 응아아아앙~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いいよ、一緒にイこう……！」"
translation = "「좋아, 같이 가자……!」"

[[dialogue]]
speaker = "unk"
original = "そう言って、会長は私の脇に深く、キスをする。"
translation = "그렇게 말하며, 회장은 나의 겨드랑이에 깊숙이, 키스를 한다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「んあぁっ！？\u3000会長ぉっ<emoji=heart04>\u3000あっ――<emoji=heart04><emoji=heart04>」"
translation = "「응아앗!? 회장<emoji=heart04> 앗――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "絶頂寸前に極限まで敏感になった脇から、一気に電流が流れるような快楽がゾクゾクッと、おま○こへと駆け抜けて――"
translation = "절정 직전에 극한까지 민감해진 겨드랑이에서, 단숨에 전류가 흐르는 듯한 쾌락이 오싹하고, 보지로 달려 나가――"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「はあああぁ～～っ<emoji=heart04><emoji=heart04>\u3000イクっ<emoji=heart04>\u3000イっちゃいますっ<emoji=heart04>\u3000あっ、あ、あ、あ、ああぁっ<emoji=heart04><emoji=heart04>\u3000んあああぁぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하아아아앙~~<emoji=heart04><emoji=heart04> 간다<emoji=heart04> 가 버려요<emoji=heart04> 앗, 아, 아, 아, 아아앗<emoji=heart04><emoji=heart04> 응아아아아아앙~~~~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「あっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イクっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イクイクイクイクイクっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04><emoji=heart04><emoji=heart04> 간다<emoji=heart04><emoji=heart04><emoji=heart04> 간다간다간다간다간다<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「イっ――――<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가――――<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「イクううううううぅぅぅ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000んあああああああああぁ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>\u3000」"
translation = "「가아아아아아아아아아아아앙~~~~~~~~~~~~~<emoji=heart04><emoji=heart04><emoji=heart04> 응아아아아아아아아아아아앙~~~~~~~~~~~~~<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04> 」"

[[dialogue]]
speaker = "unk"
original = "会長のおち○ちんが大きく膨らんで、子宮内に向かって大量の精液が流れ込んでくると同時に、私も絶頂してしまう。"
translation = "회장의 자지가 크게 부풀어 오르고, 자궁 안으로 대량의 정액이 흘러 들어옴과 동시에, 나도 절정하고 만다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ふああああああぁぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000熱い精子、中にいっぱいきてますぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000はあぁっ、あ、ぁ、んあああぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아아아아아앙~~~<emoji=heart04><emoji=heart04><emoji=heart04> 뜨거운 정자, 안에 가득 들어와요~~~<emoji=heart04><emoji=heart04><emoji=heart04> 하아앗, 아, 아, 응아아아앙~~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "子宮の奥に勢いよく叩き付けられる熱さに、私はゾクゾクが止まらず、連続でイってしまう。"
translation = "자궁 깊숙이 세차게 부딪히는 뜨거움에, 나는 오싹함이 멈추지 않고, 연속으로 가 버린다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「あっ<emoji=heart04><emoji=heart04>\u3000んはぁあああぁ～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000久しぶりの中出し射精、気持ち良くて、何度もイっちゃいますぅっ……！」"
translation = "「앗<emoji=heart04><emoji=heart04> 응하아아아아앙~~<emoji=heart04><emoji=heart04><emoji=heart04> 오랜만의 질내 사정, 기분 좋아서, 몇 번이고 가 버려요……!」"

[[dialogue]]
speaker = "unk"
original = "子宮から脳に向かって多幸感が湧き上がってきて、<ruby>三度<rt>みたび</rt></ruby>登り詰めてしまう。"
translation = "자궁에서 뇌로 향해 다행감이 솟아오르고, 세 번째로 절정에 이르고 만다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「あっ、はああぁ～っ……<emoji=heart04><emoji=heart04>\u3000子宮の中、会長ので温かくて……幸せ感じちゃいます……<emoji=heart04>\u3000んんっ……<emoji=heart04>\u3000はあぁっ……ふうぅっ……<emoji=heart04>」"
translation = "「앗, 하아아앙~……<emoji=heart04><emoji=heart04> 자궁 안, 회장 걸로 따뜻해서…… 행복을 느껴요……<emoji=heart04> 응응……<emoji=heart04> 하아앗…… 후우웃……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "やがて、会長の長い射精が終わり、私はようやく腰に力が入るようになって、ゆっくりとおち○ちんを引き抜く。"
translation = "이윽고, 회장의 긴 사정이 끝나고, 나는 겨우 허리에 힘이 들어오게 되어, 천천히 자지를 빼낸다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「んっ……<emoji=heart04>\u3000はぁ……はぁ……<emoji=heart04>\u3000んふぅ……<emoji=heart04>」"
translation = "「응읏……<emoji=heart04> 하아……하아……<emoji=heart04> 응후우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "淫らな水音と共に、子宮に入り切らなかった精液が、膣穴から溢れ出してくる。"
translation = "음란한 물소리와 함께, 자궁에 다 들어가지 못한 정액이, 질 구멍에서 넘쳐흐른다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "（今日も、私の中にこんなにいっぱい……<emoji=heart04>）"
translation = "（오늘도, 내 안에 이렇게나 가득……<emoji=heart04>）"

[[dialogue]]
speaker = "unk"
original = "それだけ会長が、自分に興奮してくれたという証を見て、密かに充足感を感じてしまう。"
translation = "그만큼 회장이 자신에게 흥분해 주었다는 증거를 보고, 은밀하게 충족감을 느껴 버린다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ん、もう……<emoji=heart04>\u3000会長がずっと脇を弄るから……恥ずかしいのに、イっちゃったじゃないですか……<emoji=heart04>」"
translation = "「응, 정말……<emoji=heart04> 회장님이 계속 겨드랑이를 만지니까…… 부끄러운데, 가버렸잖아요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「でも、脇で感じているナミエル、すごくエッチで可愛かったよ」"
translation = "「하지만, 겨드랑이로 느끼는 나미엘, 굉장히 야하고 귀여웠어」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「んっ……あんっ<emoji=heart04>」"
translation = "「응읏……앙읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "会長は言いながら、脇にもう１度、そっとキスをしてくる。"
translation = "회장은 말하면서, 겨드랑이에 다시 한 번, 살짝 키스를 해 온다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「なら……次は私の番ですね」"
translation = "「그럼…… 다음은 제 차례네요」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「え？」"
translation = "「응?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「私は恋人で、メイドですから……会長の脇にもちゃんとご奉仕して差し上げないと<emoji=heart04>」"
translation = "「저는 연인이자, 메이드니까요…… 회장님의 겨드랑이에도 제대로 봉사해 드려야죠<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「まさか、嫌とは言いませんよね、旦那様？\u3000ふふっ……<emoji=heart04>」"
translation = "「설마, 싫다고는 안 하시겠죠, 주인님? 후훗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "私は人差し指でつんつんと会長の脇を突っつきながら、お返しとばかりに、ちょっと意地悪に笑って見せるのだった。"
translation = "나는 검지로 콕콕 회장의 겨드랑이를 찌르면서, 보답이라도 하듯이, 조금 짓궂게 웃어 보이는 것이었다."

