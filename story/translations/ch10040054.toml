[[dialogue]]
speaker = "unk"
original = "第４話,大人の静かなデート,P"
translation = "제4화, 어른들의 조용한 데이트, P"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ふーっ──黒ベア子も追っ払って、これでようやく一安心だな。魔王」"
translation = "「후우── 흑베아코도 쫓아냈고, 이걸로 겨우 한시름 놨네. 마왕.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「クマロボもモンスターもいないし……のどかで平和な平日だ。うんうん、こういうのが一番だよな」"
translation = "「곰 로봇도 몬스터도 없고…… 한가롭고 평화로운 평일이야. 응응, 이런 게 제일이지.」"

[[dialogue]]
speaker = "unk"
original = "またその格好なの？"
translation = "또 그 모습이야?"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ん？\u3000あぁ──ちゃんと元の姿にも切り替えられるようになったんだけどな。なんか名残り惜しくてよ」"
translation = "「응? 아아── 제대로 원래 모습으로도 돌아갈 수 있게 됐지만 말이야. 왠지 아쉬워서 말이지.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ていうか、魔王の口からこのフォームの感想を聞いてないぞ。ほら、何か言うことあるだろ～？」"
translation = "「그보다, 마왕의 입으로 이 폼의 감상을 듣지 못했다구. 자, 뭔가 할 말 있잖아~?」"

[[dialogue]]
speaker = "unk"
original = "フレイムフォーム、可愛くて格好いいよ"
translation = "플레임 폼, 귀엽고 멋있어."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「だろ～？\u3000元はアルテのカッコらしいけど、あたしにも似合ってるよな！\u3000赤くて強そうだし！」"
translation = "「그렇지~? 원래는 아르테의 모습인 것 같지만, 나한테도 잘 어울리지! 붉어서 강해 보이고!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ていうか、そういうのはあたしに言われなくても魔王から言ってくれよな。あたしだって女の子なんだから」"
translation = "「그보다, 그런 건 내가 말하지 않아도 마왕이 먼저 말해달라구. 나도 여자아이니까 말이야.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ま、このフォームをくれて、アルテとプトラに会わせてくれたところは、黒ベア子に感謝するかな」"
translation = "「뭐, 이 폼을 주고, 아르테랑 푸트라를 만나게 해준 점은, 흑베아코한테 감사할까나.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「それにこのカッコでいると、普段のあたしにはない感性がついてくる気がすんだよな」"
translation = "「게다가 이 모습으로 있으면, 평소의 나에게는 없는 감성이 생겨나는 기분이 든단 말이지.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ほら、芸術に目覚めたっつーのも嘘じゃないんだぜ？\u3000アルテみたく上手な絵は描けねーけど……」"
translation = "「봐봐, 예술에 눈을 떴다는 것도 거짓말이 아니라구? 아르테처럼 잘 그리지는 못하지만……」"

[[dialogue]]
speaker = "unk"
original = "いいと思う"
translation = "좋다고 생각해."

[[dialogue]]
speaker = "unk"
original = "上手い下手じゃない"
translation = "잘하고 못하고의 문제가 아니야."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「へへ、だよな」"
translation = "「헤헤, 그렇지.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「んでだな。わざわざ今日のデートにここを選んだのも理由があるんだ」"
translation = "「그래서 말인데. 일부러 오늘 데이트 장소로 여기를 고른 데도 이유가 있어.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「駅の建物ん中にギャラリーがあるってのは聞いたか？\u3000なんでも、そこで今日から特別に『どうぶつの作品』展ってのをやってるらしい」"
translation = "「역 건물 안에 갤러리가 있다는 거 들었어? 거기서 오늘부터 특별히 『동물 작품』전이라는 걸 하는 모양이야.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「前までのあたしじゃ、退屈そうな場所としか思ってなかったけど──」"
translation = "「예전의 나라면, 지루해 보이는 장소라고만 생각했겠지만──」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「今なら楽しめそうな気がしてな！\u3000オマエと一緒に来たかったんだ」"
translation = "「지금이라면 즐길 수 있을 것 같아서 말이야! 너랑 같이 오고 싶었어.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「もちろんおとなしく鑑賞するぞ！\u3000今のあたしはゲージュツをリスペクトしてるんだからな！」"
translation = "「물론 얌전하게 감상할 거라구! 지금의 나는 예술을 리스펙트하고 있으니까!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「そうと決まればさっそくだ。ギャラリーに突撃しようぜ！」"
translation = "「그렇게 정했으면 바로 가자. 갤러리에 돌격하자구!」"

[[dialogue]]
speaker = "unk"
original = "そうして、俺たちは駅舎にある特別展示を巡った……。"
translation = "그렇게, 우리들은 역사에 있는 특별 전시를 둘러보았다……."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「いやー、すごい作品ばっかだったな。うまく言葉にはできねーけど……こう、ビビッときて、ググッーときて、バーンってなるような感動があったぞ！」"
translation = "「이야~ 대단한 작품들뿐이었네. 말로는 잘 표현 못 하겠지만…… 이렇게, 찌릿하고 오고, 꾸욱 하고 와서, 콰앙! 하고 터지는 듯한 감동이 있었다구!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「クマの絵もあって、黒ベア子のこと思い出しちまったよ。そうだ、フレイムフォームの次は動物っぽいフォームもいいな」"
translation = "「곰 그림도 있어서, 흑베아코 생각이 나버렸어. 맞아, 플레임 폼 다음은 동물 같은 폼도 좋겠네.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ライオンフォームとか……ファルコンフォームもかっこよさそうだな！\u3000黒ベア子ー、新しいフォームくれるならまた来てもいいぞー！」"
translation = "「사자 폼이라든가…… 팔콘 폼도 멋있을 것 같아! 흑베아코~, 새로운 폼을 줄 거라면 또 와도 좋다구~!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「……なんてな。あんなやつが何度も現れたら、世界が穴ボコだらけになっちまうぜ」"
translation = "「……라든가 말이지. 저런 녀석이 몇 번이나 나타나면, 세계가 구멍투성이가 되어버릴 거라구.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「魔王はどうだった？\u3000何が印象に残ったんだ？」"
translation = "「마왕은 어땠어? 뭐가 인상에 남았어?」"

[[dialogue]]
speaker = "unk"
original = "女神と獅子の彫刻"
translation = "여신과 사자의 조각"

[[dialogue]]
speaker = "unk"
original = "猛禽類の絵画"
translation = "맹금류의 회화"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ああ、確かにあれはすげー迫力だったよな！」"
translation = "「아아, 확실히 그건 엄청난 박력이었지!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「人ってあんなどでかいキャンバスにも絵が描けるんだな……あたし、柄にもなく感動しちゃったぜ」"
translation = "「사람은 저렇게 커다란 캔버스에도 그림을 그릴 수 있구나…… 나, 어울리지 않게 감동해버렸다구.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「あたしの絵心が爆発すれば、いつかアルテみたく藝術魔法が使えるようにならないかな？\u3000さすがに無理か」"
translation = "「나의 그림 실력이 폭발하면, 언젠가 아르테처럼 예술 마법을 쓸 수 있게 되지 않을까? 역시 무리려나.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ま、たまにはこういう<b>あかでみっく</b>なデートもいいだろ？\u3000なんか大人になった気がするよな」"
translation = "「뭐, 가끔은 이런 <b>아카데믹</b>한 데이트도 괜찮잖아? 왠지 어른이 된 기분이 든다구.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「あたしはほら……この体ってこともあるしな。この先、フィオナに追いつくためにも──どんどん大人にならなくちゃって思ってるんだ」"
translation = "「나는 봐봐…… 이 몸이기도 하니까 말이야. 앞으로 피오나를 따라잡기 위해서라도── 점점 어른이 되어야겠다고 생각하고 있어.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「だから魔王。オマエはあたしの成長にこれからも付き合ってくれよな♪」"
translation = "「그러니까 마왕. 너는 나의 성장에 앞으로도 함께해달라구♪」"

[[dialogue]]
speaker = "unk"
original = "アポロのペースでね"
translation = "아폴로의 페이스대로네"

[[dialogue]]
speaker = "unk"
original = "付き合うよ"
translation = "함께할게"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ああ、ありがとな！」"
translation = "「아아, 고마워!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「んじゃ、日も暮れてきたしそろそろ帰るか。ほれ」"
translation = "「그럼, 해도 저물었으니 슬슬 돌아갈까. 자.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「何キョトンとしてるんだよ、手を繋ぐに決まってるだろ。あたしとオマエなんだから当然だろ」"
translation = "「왜 멍하니 있는 거야, 손을 잡는 게 당연하잖아. 나와 너니까 당연한 거라구.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「……そうそう、それでいい。このまま帰るぞ」"
translation = "「……그래그래, 그거면 돼. 이대로 돌아가자.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「オマエの手、大きいな。あたしはこの手、けっこう好きだぞ」"
translation = "「너의 손, 크네. 나는 이 손, 꽤 좋아한다구.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「んじゃ、夜は流星ライダーの上映会といこうぜ！\u3000静かな鑑賞も悪くなかったけど、やっぱ騒ぎ足りなくてよ～！」"
translation = "「그럼, 밤에는 유성 라이더 상영회를 하자구! 조용한 감상도 나쁘지 않았지만, 역시 더 떠들고 싶단 말이지~!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「魔王！\u3000オマエはどっちのあたしにも、しっかりついてくるんだぞ──！」"
translation = "「마왕! 너는 어느 쪽의 나에게도, 확실히 따라와야 한다구──!」"

