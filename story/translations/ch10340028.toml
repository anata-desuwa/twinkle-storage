[[dialogue]]
speaker = "unk"
original = "星霊祭の準備期間の途中、カティアに会いに行くと、体育倉庫で片付け中だと言われた。"
translation = "성령제 준비 기간 도중, 카티아를 만나러 가자 체육 창고에서 정리 중이라고 했다."

[[dialogue]]
speaker = "unk"
original = "それなら片付けを手伝おうかと、体育倉庫に向かう。"
translation = "그렇다면 정리를 돕자며, 체육 창고로 향한다."

[[dialogue]]
speaker = "カティア"
original = "「あ、魔王様！\u3000もしかして私に会いに来てくれたんですか！？\u3000嬉しいです！」"
translation = "「아, 마왕님! 혹시 저를 만나러 와주신 건가요!? 기뻐요!」"

[[dialogue]]
speaker = "クロト"
original = "「ああ。俺も一緒に片付けを──」"
translation = "「아아. 나도 같이 정리를──」"

[[dialogue]]
speaker = "unk"
original = "ガラガラ──ガチャ。"
translation = "드르륵── 찰칵."

[[dialogue]]
speaker = "カティア"
original = "「あっ、閉められちゃいました！？\u3000誰もいないと勘違いされちゃったんでしょうか……」"
translation = "「앗, 닫혀버렸어요!? 아무도 없다고 착각하신 걸까요……」"

[[dialogue]]
speaker = "unk"
original = "閉じこめられてしまったが、ＤＩＳＣで助けを呼べるし、最悪扉を破壊することもできるので、慌てる必要はない。"
translation = "갇혀버렸지만, 디스크로 도움을 요청할 수 있고, 최악의 경우 문을 부술 수도 있으므로 당황할 필요는 없다."

[[dialogue]]
speaker = "カティア"
original = "「だけど密室で魔王様と２人きり……」"
translation = "「하지만 밀실에서 마왕님과 단둘이……」"

[[dialogue]]
speaker = "クロト"
original = "「カティア……？」"
translation = "「카티아……?」"

[[dialogue]]
speaker = "unk"
original = "<ruby>不埒<rt>ふらち</rt></ruby>なことを企むような笑顔を浮かべるカティア。"
translation = "불경한 일을 꾸미는 듯한 미소를 짓는 카티아."

[[dialogue]]
speaker = "unk"
original = "何をするつもりかと思っていると……"
translation = "무슨 짓을 할 생각인가 했더니……"

[[dialogue]]
speaker = "カティア"
original = "「わふーっ！」"
translation = "「와후ー옷!」"

[[dialogue]]
speaker = "クロト"
original = "「わっ！？」"
translation = "「와앗!?」"

[[dialogue]]
speaker = "カティア"
original = "「えへへ、主従逆転の下剋上です<emoji=heart04>」"
translation = "「에헤헤, 주종 역전의 하극상입니다<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「尊敬する魔王様を押し倒しちゃうなんて、これってワルいことですよね……<emoji=heart04>」"
translation = "「존경하는 마왕님을 밀어 넘어뜨리다니, 이거 나쁜 짓이죠……<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「ふふーん……私とふたりっきりになった魔王様が、エッチな気分になってるのはバレバレですワン……<emoji=heart04>」"
translation = "「후후훗…… 저와 단둘이 있게 된 마왕님이, 야릇한 기분이 된 건 다 들켰습니다멍……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それは押し倒してきたカティアの方だろ、とは突っ込まないでおく。"
translation = "그건 밀어 넘어뜨린 카티아 쪽이겠지, 라고는 태클 걸지 않기로 한다."

[[dialogue]]
speaker = "カティア"
original = "「いつも魔王様とのえっちではイジめられてますから、たまにはぁ……こーゆーのもよくないですか？」"
translation = "「항상 마왕님과의 야릇한 일에서는 괴롭힘당했으니까, 가끔은요…… 이런 것도 좋지 않나요?」"

[[dialogue]]
speaker = "カティア"
original = "「どうしてもイヤだったら、どけてくれていいんですよー？\u3000魔王様なら私をどかすくらい簡単ですもんねー」"
translation = "「정말 싫으시다면, 비켜주셔도 괜찮아요ー? 마왕님이라면 저를 밀어내는 것쯤은 간단하겠죠ー」"

[[dialogue]]
speaker = "unk"
original = "カティアはいつになくエッチに対して積極的でノリノリだ。しばらくはこのノリに付き合ってあげよう。"
translation = "카티아는 평소와 달리 야릇한 일에 적극적이고 신이 나 있다. 당분간은 이 분위기에 맞춰주기로 하자."

[[dialogue]]
speaker = "カティア"
original = "「いつも練習中に魔王様の視線を感じてました……私のお尻、気になってたんですよね？」"
translation = "「항상 연습 중에 마왕님의 시선을 느꼈어요…… 제 엉덩이, 신경 쓰였던 거죠?」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、ブルマがお尻に食い込んでるのがそそるなって思ってたよ」"
translation = "「아아, 부르마가 엉덩이에 파고드는 게 흥분된다고 생각했었지.」"

[[dialogue]]
speaker = "カティア"
original = "「えへへ……もう、仕方ない魔王様なんですから……<emoji=heart04>\u3000それじゃあ……んっ……んんっ……<emoji=heart04>」"
translation = "「에헤헤…… 정말, 어쩔 수 없는 마왕님이시네요……<emoji=heart04> 그럼…… 응!…… 음음!……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "カティアが腰を前後に振ると、お尻の肉感がペニスに伝わり、下半身に血流が集まってくる。"
translation = "카티아가 허리를 앞뒤로 흔들자, 엉덩이의 살집이 페니스에 전해지며 하반신에 혈류가 모여든다."

[[dialogue]]
speaker = "カティア"
original = "「あれれー？\u3000お尻でスリスリしてるだけなのに、おち○ちん気持ちよくなっちゃってるんですか？」"
translation = "「어라라ー? 엉덩이로 부비부비하고 있을 뿐인데, 고추 기분 좋아지고 있는 건가요?」"

[[dialogue]]
speaker = "カティア"
original = "「こんなにおっきくなってるんだったら……このまま生おち○ちん挿入れちゃっても、いいですよねー……？」"
translation = "「이렇게 커지고 있다면…… 이대로 맨 고추 넣어버려도, 괜찮겠죠ー……?」"

[[dialogue]]
speaker = "カティア"
original = "「ゴムもないですしー……魔王様のおち○ちんもパンパンに膨らんで、もう我慢できなさそうですしー……」"
translation = "「콘돔도 없고요ー…… 마왕님의 고추도 빵빵하게 부풀어서, 더 이상 참을 수 없을 것 같고요ー……」"

[[dialogue]]
speaker = "カティア"
original = "「私はワルい子なので……ダメって言われても、挿入れちゃいますけどね♪」"
translation = "「저는 나쁜 아이라서…… 안 된다고 해도, 넣어버릴 거지만요♪」"

[[dialogue]]
speaker = "カティア"
original = "「わふっ……あっ、ぁおぉぉんっ……<emoji=heart04>」"
translation = "「와훗…… 앗, 아오오옹!……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "カティアが腰を落とすと、いきり立った勃起が狭い肉間をかき分け、膣内に侵入していく。"
translation = "카티아가 허리를 숙이자, 잔뜩 흥분한 발기가 좁은 살 사이를 헤치고 질 내로 침입해 들어간다."

[[dialogue]]
speaker = "カティア"
original = "「んぅううぅっ！？\u3000わふぅうぅぅっ……魔王様のおち○ちん、いつもよりアツアツでカッチカチですよぉ……！」"
translation = "「응으으으으윽!? 와후우우우윽…… 마왕님의 고추, 평소보다 뜨끈뜨끈하고 딱딱해요오……!」"

[[dialogue]]
speaker = "unk"
original = "俺を押し倒すシチュエーションに興奮しているせいだろうか、カティアの膣内は粘度と温度の高い愛液に満ちていて、ペニスが火傷してしまいそうだった。"
translation = "나를 밀어 넘어뜨리는 상황에 흥분한 탓일까, 카티아의 질 내는 점도와 온도가 높은 애액으로 가득 차 있어, 페니스가 화상을 입을 것만 같았다."

[[dialogue]]
speaker = "カティア"
original = "「おぅんっ<emoji=heart04>\u3000はっ、ふぁ、ふぁぁっ……<emoji=heart04>\u3000おち○ちん、全部入っちゃいましたぁ……」"
translation = "「오웅!<emoji=heart04> 핫, 파, 파아앗……<emoji=heart04> 고추, 전부 들어가버렸어요오……」"

[[dialogue]]
speaker = "カティア"
original = "「私のお腹ん中に魔王様がいるの、感じますよぉ……重い感じがして、あったかぁいです……はぁっ、はぁ……んんっ<emoji=heart04>」"
translation = "「제 배 안에 마왕님이 있는 거, 느껴져요오…… 무거운 느낌이 들고, 따뜻해요오…… 하앗, 하아…… 음음!<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「カティアの顔、もう蕩けてる」"
translation = "「카티아의 얼굴, 벌써 녹아내리고 있군.」"

[[dialogue]]
speaker = "カティア"
original = "「──っ！？\u3000そ、そんなことないんですからぁ……！」"
translation = "「──윽!? 그, 그럴 리 없잖아요오……!」"

[[dialogue]]
speaker = "カティア"
original = "「いつもは私がおち○ちんにイジめられてるから……今日は、私が魔王様をイジめるんですっ……<emoji=heart04>」"
translation = "「평소에는 제가 고추에게 괴롭힘당하니까…… 오늘은, 제가 마왕님을 괴롭힐 거예요옷……<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「はぁ、はっ……アツアツおま○こで、魔王様のおっきいおち○ちん、ゴシゴシ擦っちゃいますからっ……<emoji=heart04>」"
translation = "「하아, 핫…… 뜨끈뜨끈한 보지로, 마왕님의 커다란 고추, 벅벅 문질러 버릴 거니까앗……<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「んんっ<emoji=heart04>\u3000はぁっ……ふぁ……はぁーっ……んぁ、はぁ、うぅううぅんっ……<emoji=heart04>」"
translation = "「음음!<emoji=heart04> 하앗…… 파…… 하아ー앗…… 응아, 하아, 우으으으윽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "肉付きが良くて可愛いお尻が上下に動き、同時にカティアの嬌声も響く。"
translation = "살집이 좋고 귀여운 엉덩이가 위아래로 움직이고, 동시에 카티아의 교성도 울려 퍼진다."

[[dialogue]]
speaker = "カティア"
original = "「はぁ、はぁっ……んんっ<emoji=heart04>\u3000おち○ちんっ、ぐりぐり擦れるぅっ<emoji=heart04>\u3000はぁ……ふぁっ……ぁおぉん<emoji=heart04>」"
translation = "「하아, 하앗…… 음음!<emoji=heart04> 고추, 꼬옥꼬옥 문질러져엇!<emoji=heart04> 하아…… 팟…… 아오옹<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「はぁ……はぁ……んっ<emoji=heart04>\u3000誰か来たら、ここでエッチしてるの、気づかれちゃうかもですね……っ<emoji=heart04>」"
translation = "「하아…… 하아…… 응!<emoji=heart04> 누가 오면, 여기서 야릇한 짓 하는 거, 들킬지도 모르겠네요……윽<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「星徒会長の魔王様が、私みたいなしもべに押し倒されて、好き放題されちゃってるなんて……はあぁっ……誰かに見られたら、幻滅されちゃい、ますよ……っ」"
translation = "「성도회장인 마왕님이, 저 같은 하인에게 밀어 넘어뜨려져서, 마음대로 당하고 있다니…… 하아아앗…… 누군가에게 보인다면, 실망할 거예요……윽」"

[[dialogue]]
speaker = "unk"
original = "カティアは虚勢を張るが、押し寄せる快楽でいっぱいいっぱいなのが明らかだ。"
translation = "카티아는 허세를 부리지만, 밀려오는 쾌락으로 벅차 있다는 것이 명백하다."

[[dialogue]]
speaker = "unk"
original = "膣内の熱は更に増していき、陸上競技で鍛えられた膣の締まりが、欲しそうにペニスを絞ってくる。"
translation = "질 내의 열은 더욱 증가하고, 육상 경기에서 단련된 질의 조임이, 원하는 듯이 페니스를 쥐어짠다."

[[dialogue]]
speaker = "カティア"
original = "「はーっ、はーっ、はぁーっ……自分からおち○ちんに乗っかって、お尻フリフリするなんて、とってもエッチでワルい子です……<emoji=heart04>」"
translation = "「하ー앗, 하ー앗, 하아ー앗…… 스스로 고추 위에 올라타서, 엉덩이 흔들흔들하다니, 정말 야릇하고 나쁜 아이예요……<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「今日は、私が……魔王様をひぃひぃ言わせるんだからぁ……ふあぁっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000んんっ<emoji=heart04>」"
translation = "「오늘은, 제가…… 마왕님을 끙끙 앓게 만들 거니까아…… 푸아아앗<emoji=heart04> 하앗<emoji=heart04> 음음!<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「あっ、ふぁ、あんっ<emoji=heart04>\u3000太いおち○ちん好きぃ……んぃっ……ぁうぅぅん……<emoji=heart04>」"
translation = "「앗, 파, 앙!<emoji=heart04> 굵은 고추 좋아아…… 응잇…… 아우우우웅……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "小さな体躯に不釣り合いな、大きなおっぱいとお尻をダイナミックに揺らしながら、普段の無邪気な姿からは想像できないほど淫らに喘ぐ。"
translation = "작은 체구에 어울리지 않는, 커다란 가슴과 엉덩이를 역동적으로 흔들면서, 평소의 천진난만한 모습에서는 상상할 수 없을 정도로 음란하게 신음한다."

[[dialogue]]
speaker = "カティア"
original = "「はぁ、あっ、んぁあぁぁぁ……ダメ<emoji=heart04>\u3000魔王様をイジめてるのに、もう、おま○こイッちゃいそっ<emoji=heart04>\u3000ふぁっ……はっ……あぉぉんっ<emoji=heart04>」"
translation = "「하아, 앗, 응아아아아아…… 안 돼<emoji=heart04> 마왕님을 괴롭히고 있는데, 벌써, 보지 가버릴 것 같아앗<emoji=heart04> 팟…… 핫…… 아오오옹!<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「んぁあっ<emoji=heart04>\u3000ダメ、ダメ<emoji=heart04>\u3000お先にイッちゃうぅっ<emoji=heart04>\u3000おま○こイッちゃ……ふぁあっ<emoji=heart04>\u3000イッ──イッちゃうぅうぅぅっ……<emoji=heart04>」"
translation = "「응아앗<emoji=heart04> 안 돼, 안 돼<emoji=heart04> 먼저 가버려엇<emoji=heart04> 보지 가버려…… 파앗<emoji=heart04> 가── 가버려어어어어윽……<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「んぉおおぉおぉぉぉんっ……<emoji=heart04><emoji=heart04>」"
translation = "「응오오오오오오오옹!……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「はぁ、はっ、はぁっ……<emoji=heart04>\u3000イッ、イッちゃったぁ……<emoji=heart04>\u3000やっぱひ、魔王様のおち○ちん、きもちよすぎれす……<emoji=heart04>」"
translation = "「하아, 핫, 하앗……<emoji=heart04> 가, 가버렸다아……<emoji=heart04> 역시 마왕님의 고추, 너무 기분 좋아요오……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「好き勝手動いて、カティアは気持ちよくなれたみたいだな」"
translation = "「마음대로 움직이더니, 카티아는 기분 좋아진 모양이군.」"

[[dialogue]]
speaker = "カティア"
original = "「ふぁぁ……？\u3000はぁっ……はぁ、ふぁあぁい……<emoji=heart04>\u3000おち○ちん、きもちよしゅぎました……<emoji=heart04>」"
translation = "「푸아아……? 하앗…… 하아, 파아아잇……<emoji=heart04> 고추, 너무 기분 좋았어요오……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「だけど発情メス犬のカティアに、下剋上はまだ早かったんじゃないか？」"
translation = "「하지만 발정 난 암캐 카티아에게, 하극상은 아직 일렀던 거 아닌가?」"

[[dialogue]]
speaker = "カティア"
original = "「メ、メス犬じゃないですっ！\u3000今日の私は、魔王様より──」"
translation = "「아, 암캐 아니에요옷! 오늘의 저는, 마왕님보다──」"

[[dialogue]]
speaker = "unk"
original = "根が優しすぎる上、俺に服従を誓っているカティアだ。"
translation = "본성이 너무 착한 데다, 나에게 복종을 맹세한 카티아다."

[[dialogue]]
speaker = "unk"
original = "結局、本気じゃない下剋上なんてプレイの一環。エッチのスパイスにしかならない。"
translation = "결국, 진심이 아닌 하극상 따위는 플레이의 일환. 야릇한 일의 향신료밖에 되지 않는다."

[[dialogue]]
speaker = "クロト"
original = "「カティアじゃどうしたって俺には勝てないこと、体に刻み込んでやるよ」"
translation = "「카티아로는 어떻게 해도 나를 이길 수 없다는 걸, 몸에 새겨주마.」"

[[dialogue]]
speaker = "カティア"
original = "「えっ、ま、魔王様ぁ？\u3000声がちょっと怖いですけど──」"
translation = "「엣, 마, 마왕님아? 목소리가 좀 무서운데──」"

[[dialogue]]
speaker = "unk"
original = "わざと声を低くしながら、ペニスを一気に突き上げた。"
translation = "일부러 목소리를 낮추면서, 페니스를 단숨에 찔러 올렸다."

[[dialogue]]
speaker = "カティア"
original = "「んぉぅぅうぅぅっ！？！？？<emoji=heart04>」"
translation = "「응오우우우우욱!?!?!?<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "カティアの胎内に衝撃が走り、股間の辺りに熱い飛沫が散る。だが俺の反撃は始まったばかりだ。"
translation = "카티아의 태내에 충격이 달리고, 사타구니 부근에 뜨거운 물보라가 흝뿌려진다. 하지만 나의 반격은 이제 막 시작되었을 뿐이다."

[[dialogue]]
speaker = "カティア"
original = "「あぉっ、おんっ、あおぉんっ<emoji=heart04>\u3000ま、魔王様ぁっ、そんなに動いちゃ、おんっ、ぁおぉんっ<emoji=heart04>」"
translation = "「아옷, 옹!, 아오옹!<emoji=heart04> 마, 마왕님아앗, 그렇게 움직이면, 옹!, 아오옹!<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「私がきもちよくっ、ぉんっ<emoji=heart04>\u3000魔王様が参ったするまで、搾り取るはずだったのにぃっ<emoji=heart04>」"
translation = "「제가 기분 좋게, 옹!<emoji=heart04> 마왕님이 졌다고 할 때까지, 쥐어짜낼 생각이었는데엣!<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「んぁっ<emoji=heart04>\u3000あっ、んぃひっ<emoji=heart04>\u3000イッたばっかしだからっ、おま○こっ、おま○こシビれてっ、力入んないぃ<emoji=heart04>」"
translation = "「응앗!<emoji=heart04> 앗, 응이힛!<emoji=heart04> 방금 가버렸으니까앗, 보지잇, 보지 저려서엇, 힘 안 들어가아<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「ズルいっ、魔王様ズルいですっ、ワルい人ですよぅっ<emoji=heart04>\u3000おっ、おんっ<emoji=heart04>\u3000きもちっ、きもぢいいっ、おち○ちんきもちいいよぉっ<emoji=heart04>」"
translation = "「치사해엣, 마왕님 치사해요옷, 나쁜 사람이에요오옷<emoji=heart04> 옷, 옹!<emoji=heart04> 기분, 기분 좋아아, 고추 기분 좋아아<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「カティアは尻尾も弱いよな？」"
translation = "「카티아는 꼬리도 약점이지?」"

[[dialogue]]
speaker = "カティア"
original = "「ひゃ、ひゃいっ、尻尾も弱点って──わふぅんっ！？」"
translation = "「햐, 햐이잇, 꼬리도 약점이라고── 와후웅!?」"

[[dialogue]]
speaker = "unk"
original = "快感で膨らんでいる尻尾をギュッと掴み、お尻に近い根元の部分を上下に扱く。"
translation = "쾌감으로 부풀어 있는 꼬리를 꽉 잡고, 엉덩이에 가까운 뿌리 부분을 위아래로 주무른다."

[[dialogue]]
speaker = "カティア"
original = "「はっ、んぁっ<emoji=heart04>\u3000尻尾シコシコらめですっ、わふぅん<emoji=heart04>\u3000はひぃっ、ぞくぞくしちゃうんれすっ<emoji=heart04>」"
translation = "「핫, 응앗!<emoji=heart04> 꼬리 시코시코 안 돼요옷, 와후웅<emoji=heart04> 하이잇, 짜릿짜릿해요오옷<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "尻尾を扱いたおかげで膣肉の反応が更に過敏になり、丸見えになっているお尻の穴も、キュッキュッと収縮を繰り返す。"
translation = "꼬리를 주무른 덕분에 질 근육의 반응이 더욱 과민해지고, 훤히 보이는 엉덩이 구멍도, 큐웃큐웃 수축을 반복한다."

[[dialogue]]
speaker = "カティア"
original = "「ふぁ、ああっ<emoji=heart04>\u3000はうんっ、はっ、わぉおぉぉん<emoji=heart04>\u3000あっ、あーっ、あーっ<emoji=heart04>\u3000あぁあぁーっ<emoji=heart04>」"
translation = "「파, 아앗!<emoji=heart04> 하웅!, 핫, 와오오오옹<emoji=heart04> 앗, 아ー앗, 아ー앗<emoji=heart04> 아아아아ー앗<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「だめ、れすっ、また、またイッちゃう、イッちゃうっ、イッぢゃいますってぇえぇぇっ<emoji=heart04>」"
translation = "「안 돼, 요옷, 또, 또 가버려, 가버려엇, 가버려요오오오오옷<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「好きなだけイけ。主の俺が許可する」"
translation = "「좋아하는 만큼 가버려. 주인인 내가 허락한다.」"

[[dialogue]]
speaker = "カティア"
original = "「んひっ……<emoji=heart04>\u3000魔王様カッコいい……<emoji=heart04>」"
translation = "「응힛……<emoji=heart04> 마왕님 멋있어……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「でも中出しするまで終わらないから。俺がイクまでにメス犬のカティアは何回イッちゃうかな？」"
translation = "「하지만 안에 싸기 전까지는 안 끝날 거니까. 내가 가기 전에 암캐 카티아는 몇 번이나 가버릴까?」"

[[dialogue]]
speaker = "カティア"
original = "「そんにゃあっ<emoji=heart04>\u3000何回もイカされたら、壊れちゃうっ、私のおま○こ、壊れちゃいましゅよぉっ<emoji=heart04>」"
translation = "「서언냐앗<emoji=heart04> 몇 번이나 가게 하면, 망가져엇, 제 보지, 망가져버려요오옷<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「でも気持ちいいのが嬉しいんだよな？」"
translation = "「하지만 기분 좋은 게 기쁜 거지?」"

[[dialogue]]
speaker = "unk"
original = "フワフワの尻尾は、俺の言葉を肯定するようにフリフリと揺れる。"
translation = "푹신푹신한 꼬리는, 내 말을 긍정하듯이 살랑살랑 흔들린다."

[[dialogue]]
speaker = "カティア"
original = "「う、うぅうぅぅ……<emoji=heart04>\u3000は、はぃぃ……魔王様にきもちよくされるの、嬉しいです……大好きですぅ……<emoji=heart04>」"
translation = "「우, 우으으으으윽……<emoji=heart04> 하, 하이이…… 마왕님에게 기분 좋게 되는 거, 기뻐요…… 너무 좋아요오……<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「いっぱいイカされたら、おま○こ、魔王様しゅきしゅきになっちゃいましゅっ……<emoji=heart04>\u3000骨の髄まで魔王様のモノにされちゃいますぅっ……<emoji=heart04>」"
translation = "「많이 가게 되면, 보지, 마왕님 좋아좋아하게 되어버려요옷……<emoji=heart04> 뼛속까지 마왕님의 것이 되어버려요오옷……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "カティアとのより深い繋がりを求めて、子宮を突き上げるピストンを更に加速させた。"
translation = "카티아와의 더욱 깊은 연결을 원하며, 자궁을 찔러 올리는 피스톤을 더욱 가속시켰다."

[[dialogue]]
speaker = "カティア"
original = "「んぅいっ！？\u3000あっ、あっ、んぁあああぁっ<emoji=heart04>\u3000おち○ちん、激しっ、あぉぉおぉぉぉんっ<emoji=heart04>」"
translation = "「응으잇!? 앗, 앗, 응아아아아앗<emoji=heart04> 고추, 격렬해엣, 아오오오오오옹!<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「いいぞ、メス犬らしくなってきたな」"
translation = "「좋아, 암캐다워졌군.」"

[[dialogue]]
speaker = "unk"
original = "発情したメス犬の雄叫びを上げながら、カティアが全身を痙攣させる。"
translation = "발정 난 암캐의 울부짖음을 토해내며, 카티아가 전신을 경련시킨다."

[[dialogue]]
speaker = "カティア"
original = "「ちっ、違っ、あっ<emoji=heart04>\u3000あぉっ<emoji=heart04>\u3000勝手に、勝手に出ちゃうんれすっ<emoji=heart04>\u3000子宮っ、ごちゅごちゅされると、ヘンな声っ、勝手にぃいぃいぃぃぃんっ<emoji=heart04><emoji=heart04>」"
translation = "「트, 틀려엇, 앗<emoji=heart04> 아옷<emoji=heart04> 멋대로, 멋대로 나와버리는 거예욧<emoji=heart04> 자궁, 꼬치꼬치 당하면, 이상한 소리, 멋대로이이이이이이잉!<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「んぃっ、また、またイッぢゃいまひたっ<emoji=heart04>\u3000おま○こイキまひたからっ<emoji=heart04>\u3000はぅうぅんっ<emoji=heart04>\u3000おち○ちんっ、おち○ちん止まってくらひゃぁいっ<emoji=heart04>」"
translation = "「응잇, 또, 또 가버렸어요옷<emoji=heart04> 보지 가버렸으니까앗<emoji=heart04> 하우우웅!<emoji=heart04> 고추잇, 고추 멈춰주세욧<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ダメだ。これからも変な気起こさないように、徹底的に調教するからな」"
translation = "「안 돼. 앞으로도 딴생각 품지 못하도록, 철저하게 조교할 테니까.」"

[[dialogue]]
speaker = "カティア"
original = "「ふぁああぁあぁぁっ<emoji=heart04>\u3000わかってまひゅっ<emoji=heart04>\u3000ごめんなしゃいっ<emoji=heart04>\u3000ごめんなしゃぁいっ<emoji=heart04>」"
translation = "「푸아아아아아아앗<emoji=heart04> 알겠어요옷<emoji=heart04> 죄송합니닷<emoji=heart04> 죄송해요오옷<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「私っ、カティアはっ、魔王様のちゅーじつなしもべれしゅっ<emoji=heart04>\u3000おま○こメス犬れしゅうぅっ<emoji=heart04>」"
translation = "「저, 카티아는앗, 마왕님의 충실한 하인이에욧<emoji=heart04> 보지 암캐예유우웃<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺への服従を誓う言葉を漏らす度、カティアの膣内はぶるぶると痙攣し、股間の辺りに温かな液体が広がる。"
translation = "나에게 복종을 맹세하는 말을 흘릴 때마다, 카티아의 질 내는 부들부들 경련하고, 사타구니 부근에 따뜻한 액체가 퍼진다."

[[dialogue]]
speaker = "unk"
original = "こちら側からはあまり見えないけど、恍惚のあまり、嬉ションでもしてるのかもしれない。"
translation = "이쪽에서는 잘 보이지 않지만, 황홀함에 겨워 기쁨의 오줌이라도 싸는 것일지도 모른다."

[[dialogue]]
speaker = "カティア"
original = "「んぅっ、ふひっ、んぃいいぃっ<emoji=heart04>\u3000きもち、よしゅぎてっ、アタマ真っ白にっ、なっちゃいまふっ<emoji=heart04>」"
translation = "「응웃, 푸힛, 응이이이잇<emoji=heart04> 기분, 너무 좋아서엇, 머릿속이 새하얗게, 되어버려욧<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「ふぁっ、はーっ、はーっ、はぁぁ～～～っ<emoji=heart04>\u3000おち○ちんとおま○こしかわかんなくなっちゃう……頭おバカになっちゃうよぉっ……<emoji=heart04>」"
translation = "「팟, 하ー앗, 하ー앗, 하아아～～～앗<emoji=heart04> 고추랑 보지밖에 모르게 되어버려…… 머리가 바보가 되어버려요오옷……<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「ふぁ、あっ、んぁあぁぁ<emoji=heart04>\u3000魔王様ぁ……おかしくなっちゃったら、セキニン取ってくれますかぁ……？」"
translation = "「파, 앗, 응아아아아<emoji=heart04> 마왕님아…… 이상해져버리면, 책임져 주실 건가요오……?」"

[[dialogue]]
speaker = "クロト"
original = "「もちろんだ。カティアは一生俺のしもべだって言ったろ？\u3000誰にも渡さない」"
translation = "「물론이지. 카티아는 평생 나의 하인이라고 했잖아? 누구에게도 넘겨주지 않아.」"

[[dialogue]]
speaker = "カティア"
original = "「んんぅぅぅぅぅんっ<emoji=heart04><emoji=heart04>」"
translation = "「응으으으으으으응!<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「そんなのズルいですよぉっ<emoji=heart04>\u3000おっぱいもおま○こもキュンキュンしちゃいますぅ<emoji=heart04>」"
translation = "「그런 건 치사해요오옷<emoji=heart04> 가슴도 보지도 큥큥거려요오<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「ふぁ、あぁあぁんっ<emoji=heart04>\u3000魔王しゃまぁっ、しゅき、しゅきしゅきしゅきぃぃぃいぃぃ<emoji=heart04><emoji=heart04>」"
translation = "「후, 아아아앙앙<emoji=heart04> 마왕님아앗, 좋아, 좋아좋아좋아아아아아아<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "尻を浮かしては下ろし、打ち付けるカティアの腰の動きが激しくなる。"
translation = "엉덩이를 띄웠다가 내리치며 박아대는 카티아의 허리 움직임이 격렬해진다."

[[dialogue]]
speaker = "unk"
original = "ペニスのストロークが大きくなり、１往復毎に快感の刺激が全身を駆け巡った。"
translation = "페니스의 스트로크가 커지고, 한 번 왕복할 때마다 쾌감의 자극이 전신을 휩쓸었다."

[[dialogue]]
speaker = "カティア"
original = "「んぅうぅぅんっ<emoji=heart04>\u3000おくっ、おくに、ずんっずんって<emoji=heart04>\u3000赤ちゃんのお部屋っ、おち○ちんに叩かれてるぅっ<emoji=heart04>」"
translation = "「응으으으응읏<emoji=heart04> 안쪽, 안쪽에, 푹푹하고<emoji=heart04> 아기 방이, 자지에 두들겨 맞고 있어엇<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「ふぁっ、あっ、ああぁんっ<emoji=heart04>\u3000もぉ、何回イッてるかわかんないれすっ<emoji=heart04>\u3000んぁ、ぁおんっ<emoji=heart04>」"
translation = "「홧, 앗, 아아아앙읏<emoji=heart04> 모, 몇 번이나 갔는지 모르겠어요옷<emoji=heart04> 응아, 아옹읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "カティアのフワフワな尻尾を掴み、芯を扱きながら、絶頂間近のペニスを突き上げる。"
translation = "카티아의 복슬복슬한 꼬리를 잡고, 심지를 주무르면서, 절정 직전의 페니스를 쳐 올린다."

[[dialogue]]
speaker = "カティア"
original = "「んぅいいぃぃんっ<emoji=heart04>\u3000しっぽっ、しっぽシコシコらめれしゅ<emoji=heart04>\u3000きもちよしゅぎちゃうからっ、尻尾もおま○こも敏感すぎるんれしゅうぅっ<emoji=heart04>」"
translation = "「응으이이잉읏<emoji=heart04> 꼬리, 꼬리 시코시코 안 돼요오<emoji=heart04> 너무 기분 좋아지잖아요옷, 꼬리도 보지도 너무 민감해요오오옷<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「はぁっ、んぉんっ<emoji=heart04>\u3000おち○ちんしゅきしゅきっ、魔王様だぁいしゅきぃいぃぃぃっ<emoji=heart04><emoji=heart04>」"
translation = "「하앗, 응옹읏<emoji=heart04> 자지 좋아좋아앗, 마왕님 너어무 좋아아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺もついに限界に追い込まれ、睾丸から煮えたぎった情動がこみ上げてくる。"
translation = "나도 마침내 한계에 몰려, 고환에서 끓어오르는 정동이 치밀어 오른다."

[[dialogue]]
speaker = "クロト"
original = "「カティア……中に、出すぞっ……！」"
translation = "「카티아…… 안에, 싼다앗……!」"

[[dialogue]]
speaker = "カティア"
original = "「ふぁっ、あっ、くだしゃいっ<emoji=heart04>\u3000魔王様の子種っ、強ぉいせーえきっ<emoji=heart04>\u3000いっぱい、いっぱいっ、びゅーっ、びゅーっ、びゅーって<emoji=heart04>」"
translation = "「홧, 앗, 싸주세요옷<emoji=heart04> 마왕님의 씨앗앗, 강한 정액읏<emoji=heart04> 잔뜩, 잔뜩읏, 뷰웃, 뷰웃, 뷰웃하고<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「調教済みメス犬ま○こっ、種付けされたがってましゅからぁっ<emoji=heart04>\u3000魔王様の赤ちゃん、欲しがってましゅからぁっ<emoji=heart04>」"
translation = "「조교된 암캐 보지잇, 씨앗 박히고 싶어 하니까아앗<emoji=heart04> 마왕님의 아기, 원하고 있으니까아앗<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「んぁおぉぉんっ！？！？？<emoji=heart04>\u3000おぢ○ぢんおっきくぅっ<emoji=heart04>\u3000おっきいのがじゅぼじゅぼっ、じゅぼじゅぼっ<emoji=heart04>」"
translation = "「응아오오오옹읏!?!?!!?<emoji=heart04> 자지 커다랗게엣<emoji=heart04> 커다란 게 주버주버읏, 주버주버읏<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「あっ、あっ、ああぁああぁっ<emoji=heart04>\u3000イッぢゃうっ、イギますっ<emoji=heart04>\u3000おま○こイグイグイグイグッッッ<emoji=heart04>」"
translation = "「앗, 앗, 아아아아아아앗<emoji=heart04> 가버린다앗, 가요옷<emoji=heart04> 보지 가이가이가이가잇<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「イッ──くぅうぅうぅうぅぅぅぅんっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가──앙으으으으으으으으으으읏<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「んぅぅううぅぅっ<emoji=heart04>\u3000わふっ、んぉおおぉおお～～～～～～～～～んっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응으으으으으읏<emoji=heart04> 와훗, 응오오오오오오～～～～～～～～～옹읏<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「ふぎゅっ<emoji=heart04>\u3000んぉ、わふぅぅ……びゅーっ、びゅーっ、びゅーっ……<emoji=heart04>\u3000せーえき、たっぷり出てるぅ……<emoji=heart04>\u3000しきゅー、たぷたぷになってくよぉっ……<emoji=heart04>」"
translation = "「후귯<emoji=heart04> 응오, 와후으으…… 뷰웃, 뷰웃, 뷰웃……<emoji=heart04> 정액, 잔뜩 나오고 있어……<emoji=heart04> 자궁, 출렁출렁해져 가요옷……<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「ふひっ……んぃ、おぉおんっ……<emoji=heart04>\u3000おち○ちん、止まんない……どんだけ出すんれすかぁ……<emoji=heart04>」"
translation = "「흐힛…… 응이, 오오옹읏……<emoji=heart04> 자지, 멈추지 않아…… 얼마나 싸는 거예요오……<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「はぁ、はぁ……はあぁ……<emoji=heart04>\u3000魔王様の精液で、お腹あったかぁいです……しああせですぅ……<emoji=heart04>」"
translation = "「하아, 하아…… 하아아……<emoji=heart04> 마왕님의 정액으로, 배가 따뜻해요…… 행복해요오……<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「こんないっぱい出されたら……大丈夫な日だって、絶対に赤ちゃんデキちゃいますってぇ……<emoji=heart04>」"
translation = "「이렇게 잔뜩 싸면…… 괜찮은 날이라도, 절대로 아기 생겨 버린다구요오……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "カティアの声と表情は蕩け、膣内は悦びを露わにして、ギュッギュッと最後の一滴まで搾り取るように締め付けてくる。"
translation = "카티아의 목소리와 표정은 녹아내렸고, 질 내는 기쁨을 드러내며, 꽉꽉 마지막 한 방울까지 짜내듯이 조여왔다."

[[dialogue]]
speaker = "カティア"
original = "「んぅううっ……<emoji=heart04>\u3000まだせーえき出てますぅ……魔王様ぁ……どんだけ溜めてたんですかぁ……？」"
translation = "「응으으으읏……<emoji=heart04> 아직 정액 나오고 있어요오…… 마왕님아…… 얼마나 모아뒀던 거예요오……?」"

[[dialogue]]
speaker = "unk"
original = "尿道に残る最後の一滴まで子宮に吐き出すため、しばらくペニスを挿入したまま、カティアの膣内に留まった。"
translation = "요도에 남은 마지막 한 방울까지 자궁에 토해내기 위해, 잠시 페니스를 삽입한 채, 카티아의 질 내에 머물렀다."

[[dialogue]]
speaker = "カティア"
original = "「ふぁぁ……中出し種付けされちゃいました<emoji=heart04>\u3000魔王様との赤ちゃんデキちゃうかな……すっごく可愛いんだろうなぁ……<emoji=heart04>\u3000わふっ<emoji=heart04>」"
translation = "「후아아…… 안에 싸서 씨앗 박혀 버렸어요<emoji=heart04> 마왕님과의 아기 생길까…… 엄청 귀여울 텐데에……<emoji=heart04> 와훗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そしてまだ甘く締め付けてくる膣からペニスを引き抜く。"
translation = "그리고 아직 달콤하게 조여오는 질에서 페니스를 빼낸다."

[[dialogue]]
speaker = "カティア"
original = "「わふぅ……！？\u3000あっ……せっかく出してもらったせーえき、こぼれちゃいます……もったいなぁい……<emoji=heart04>」"
translation = "「와후으……!? 앗…… 모처럼 싸준 정액, 흘러넘쳐요…… 아까워어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ポッカリと開いた膣穴からは中出しした精液が逆流し、ごぽっと音を立てた。"
translation = "벌어진 질 구멍에서는 안에 쌌던 정액이 역류하며, 꿀럭 소리를 냈다."

[[dialogue]]
speaker = "カティア"
original = "「はぁ、はぁ……うわぁ……すっごい量……！\u3000魔王様ぁ、こんなに溜めてたら体に毒ですよぉ……？」"
translation = "「하아, 하아…… 우와아…… 엄청난 양……! 마왕님아, 이렇게 모아두면 몸에 독이에요오……?」"

[[dialogue]]
speaker = "カティア"
original = "「星霊祭の準備で忙しくて、エッチしてなかったですもんね……おち○ちんすっきりしましたか？」"
translation = "「성령제 준비로 바빠서, 섹스 못 했었잖아요…… 자지 시원해졌어요?」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、ありがとう。気持ちよかったよ」"
translation = "「아아, 고마워. 기분 좋았어」"

[[dialogue]]
speaker = "カティア"
original = "「えへへ、私も……<emoji=heart04>\u3000ちょっと気持ちよくなりすぎちゃいましたけど……やっぱり魔王様には勝てませんね」"
translation = "「에헤헤, 저도……<emoji=heart04> 조금 기분 좋아지긴 했지만…… 역시 마왕님은 못 이기겠네요」"

[[dialogue]]
speaker = "カティア"
original = "「わふぅ……腰が抜けちゃって、しばらく動けそうにないです……魔王様ぁ、もうしばらくこのまま……くっついてても、いいですか？」"
translation = "「와후으…… 허리가 풀려서, 당분간 움직일 수 없을 것 같아요…… 마왕님아, 조금만 더 이대로…… 붙어 있어도, 괜찮을까요?」"

[[dialogue]]
speaker = "クロト"
original = "「カティアが満足するまで一緒にいてあげる。よしよし」"
translation = "「카티아가 만족할 때까지 같이 있어 줄게. 착하다 착해」"

[[dialogue]]
speaker = "カティア"
original = "「ふわぁぁぁん……魔王様ぁ……<emoji=heart04>\u3000しゅき、しゅきぃ……愛してまぁす……<emoji=heart04>」"
translation = "「후와아아앙…… 마왕님아……<emoji=heart04> 좋아, 좋아아…… 사랑해요오……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "カティアの尻尾を撫でてあげると、快感の余韻の残る全身をぶるぶると震わせ、甘い声を漏らした。"
translation = "카티아의 꼬리를 쓰다듬어 주자, 쾌감의 여운이 남은 전신을 부들부들 떨며, 달콤한 목소리를 흘렸다."

[[dialogue]]
speaker = "unk"
original = "幸いＤＩＳＣを持っているので、人を呼べばここを出るのは難しくない。"
translation = "다행히 디스크를 가지고 있으니, 사람을 부르면 이곳을 나가는 것은 어렵지 않다."

[[dialogue]]
speaker = "unk"
original = "だけどそれは少し後で──お互いの火照りが鎮まるのを待ってからにするとしよう。"
translation = "하지만 그것은 조금 나중에── 서로의 열기가 가라앉기를 기다린 후에 하기로 하자."

