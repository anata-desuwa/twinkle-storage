[[dialogue]]
speaker = "unk"
original = "ロストアイテムの捜索がはじまり、各自変身して、空を飛んだりしながら探していると――"
translation = "로스트 아이템 수색이 시작되고 각자 변신해서 하늘을 날거나 하며 찾고 있자니――"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「大変です、お兄さん！\u3000マトイさん！」"
translation = "「큰일이에요, 오빠! 마토이 씨!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「どうしたの、サチちゃん！\u3000もしかして、ロストアイテムを見つけた！？」"
translation = "「무슨 일이야, 사치 짱! 혹시 로스트 아이템을 찾았어!?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「フィオナ会長が……記憶を奪われてしまいました！」"
translation = "「피오나 회장님이…… 기억을 빼앗겨 버렸어요!」"

[[dialogue]]
speaker = "unk"
original = "なんだって！？"
translation = "뭐라고!?"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「それで、フィオナさんがロストアイテムに襲われたって本当なの！？」"
translation = "「그래서 피오나 씨가 로스트 아이템에게 습격당했다는 게 정말이야!?」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「流星学園の屋外で倒れていたのを、私とサチさまで見つけたんです」"
translation = "「유성 학원 실외에서 쓰러져 있는 걸 저와 사치 님이 발견했어요」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「それで記憶の状態を確かめてみたんですが……その――」"
translation = "「그래서 기억 상태를 확인해 봤는데…… 그게――」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「かなり前まで記憶が退行してしまっているみたいで……」"
translation = "「꽤 전까지 기억이 퇴행해 버린 모양이라……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あの……！\u3000サチお姉さんはもしかして、本物の魔法少女なんですか！？」"
translation = "「저기……! 사치 언니는 혹시 진짜 마법소녀인가요!?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「い、いや、フィオナ会長、違うんです。私は普通のプリマステラで……」"
translation = "「아, 아니, 피오나 회장님, 아니에요. 저는 평범한 프리마스텔라고……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あ……！\u3000ごめんなさい。ついはしゃいじゃって……」"
translation = "「아……! 죄송해요. 그만 신이 나서……」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「いえ、よくそれっぽいって言われてるんで……」"
translation = "「아뇨, 자주 그럴싸하다는 소리를 들어서……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「そうですよね……魔法少女たるもの、正体を隠さないといけませんもんね！」"
translation = "「그렇죠…… 마법소녀라면 정체를 숨겨야 하는 법이니까요!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「大丈夫です、お姉さん。私、そういうのわかってますから！\u3000誰にも言いません……！」"
translation = "「괜찮아요, 언니. 저 그런 거 잘 알아요! 아무에게도 말하지 않을게요……!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「い、いやいや！\u3000そういうことじゃなくて、私は本当に魔法少女ではないんです……！」"
translation = "「아, 아니 아니! 그런 게 아니라 저는 정말로 마법소녀가 아니에요……!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ほら、サチさんってやっぱり魔法少女に見えるんですよ！」"
translation = "「봐요, 사치 씨는 역시 마법소녀로 보인다니까요!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「杖がしゃべった……！\u3000これは……！」"
translation = "「지팡이가 말을 했어……! 이건……!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ちょっとトレジアンナさん！\u3000今喋り出したら、ややこしくなるでしょ！？」"
translation = "「잠깐 트레지안나 씨! 지금 말을 꺼내면 복잡해지잖아요!?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「フィオナさん、ちなみに魔法少女名は、トレジャー☆サチって言うんですよ～♪」"
translation = "「피오나 씨, 참고로 마법소녀 이름은 트레저☆사치라고 한답니다~♪」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「なにを開き直ってるんですか、この杖はぁぁぁ！？」"
translation = "「뭘 정색하고 말하는 거예요, 이 지팡이는!?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「わあぁ……！\u3000魔法少女……本当に存在したんですね……！」"
translation = "「와아……! 마법소녀…… 정말로 존재했군요……!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ほらぁ！\u3000信じちゃってる！\u3000どうするんですか、これ！？」"
translation = "「거봐요! 믿어버렸잖아! 어쩔 거예요, 이거!?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「てへぺろ☆」"
translation = "「데헤페로☆」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「フィオナさん、なんか魔法少女にすごい食いついてるんだけど……」"
translation = "「피오나 씨, 왠지 마법소녀에 엄청 꽂힌 것 같은데……」"

[[dialogue]]
speaker = "unk"
original = "瞳が子供みたいにキラキラしてるな……"
translation = "눈동자가 아이처럼 반짝거리고 있네……"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「それから、そっちのプリムラお姉さんも！」"
translation = "「그리고 저쪽의 프리뮬러 언니도!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「な、なんじゃ？\u3000我はサチと違って、本当に魔法少女ではないぞ？\u3000我は悪の終末兵器で……」"
translation = "「뭐, 뭐냐? 나는 사치와 달리 정말로 마법소녀가 아니니라? 나는 악의 종말 병기이고……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「わかってます！\u3000お姉さんはそういうパターンですよね！」"
translation = "「알고 있어요! 언니는 그런 패턴인 거죠!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「そ、そういうパターン……？」"
translation = "「그, 그런 패턴……?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「主人公の魔法少女と対になる、ライバルポジション！\u3000黒い衣装を着て、魔法少女とは名乗らないし、設定としても違う……ですが！」"
translation = "「주인공 마법소녀와 대조되는 라이벌 포지션! 검은 의상을 입고 마법소녀라고 자처하지도 않고 설정상으로도 다르지만…… 하지만!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「その行動をもって、次第に周囲から主人公と同じ魔法少女として認められていき、最後には自分ではなく、他の人達から呼ばれるようになるんです！」"
translation = "「그 행동을 통해 점차 주위로부터 주인공과 같은 마법소녀로 인정받게 되고, 마지막에는 자신이 아니라 다른 사람들로부터 불리게 되는 거예요!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「漆黒の魔法少女、プリムラ†ノワールと！」"
translation = "「칠흑의 마법소녀, 프리뮬러†누아르라고!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あ、ちなみに下の名前と、冠名の間に入っているのは、『ダガー』って十字記号のイメージです！\u3000本当は名前の前に冠名を入れたいところですが……」"
translation = "「아, 참고로 이름 뒤에 붙은 건 『대거』라는 십자 기호 이미지예요! 원래는 이름 앞에 칭호를 넣고 싶었지만……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「語呂が悪いのと、トレジャー☆サチの対という存在であることから、あえて名前の後に冠名を入れてみました！」"
translation = "「어감이 안 좋은 것과, 트레저☆사치와 대조되는 존재라는 점에서 일부러 이름 뒤에 칭호를 넣어 봤어요!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「はあぁぁぁっ！？\u3000プリムラ†ノワールじゃと！？\u3000貴様！\u3000ふっ――」"
translation = "「하아아!? 프리뮬러†누아르라고!? 네놈! 훗――」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「フフフ……！\u3000悪くないのじゃ……次からそう名乗ってやらんこともないぞ？」"
translation = "「후후후……! 나쁘지 않구나…… 다음부터 그렇게 자처해 주지 못할 것도 없느니라」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「気に入ってるーーーーーーっ！！？」"
translation = "「마음에 들어 했어ーーーーーー!!?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「採用してくれるんですか！？\u3000やりました！\u3000私が本物の魔法少女の名づけ親に……！」"
translation = "「채용해 주시는 건가요!? 해냈다! 제가 진짜 마법소녀의 작명가가……!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「おおぉっ！？\u3000私が勧誘しても拒否られていたのに、新たな魔法少女がついに……！」"
translation = "「오오!? 제가 권유해도 거절당했는데, 새로운 마법소녀가 드디어……!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「いやいやいやいやいや！\u3000プリムラが横で名乗りはじめたら、私も同じ魔法少女に見られちゃうんだけど！？」"
translation = "「아니 아니 아니 아니! 프리뮬러가 옆에서 그렇게 자처하기 시작하면 나도 똑같이 마법소녀로 보일 텐데!?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「大丈夫ですよ。そんな嫉妬なんてせずとも、トレジャー☆サチが主役の魔法少女であることは変わりませんから」"
translation = "「괜찮아요. 그런 질투는 하지 않아도 트레저☆사치가 주역 마법소녀라는 사실은 변하지 않으니까요」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「そうじゃぞ、トレジャー☆サチ。プリムラ†ノワールはいずれ貴様を倒す悪の魔法少女なのじゃからな！」"
translation = "「그렇느니라, 트레저☆사치. 프리뮬러†누아르는 머지않아 네놈을 쓰러뜨릴 악의 마법소녀일 테니까 말이다!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「私はトレジャー☆サチも、王道でいい魔法少女名だと思います！」"
translation = "「저는 트레저☆사치도 왕도적이고 좋은 마법소녀 이름이라고 생각해요!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「とりあえず全員、トレジャー付けるのやめてくれる！？」"
translation = "「일단 전원, 트레저 붙이는 것 좀 그만해 줄래!?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はっ……！」"
translation = "「핫……!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「そうか、魔法少女が実在するということは――」"
translation = "「그렇군, 마법소녀가 실재한다는 것은――」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「もしかして、特撮ヒーローも実在するのでは……！？」"
translation = "「혹시 특촬 히어로도 실재하는 게 아닐까요……!?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「と、とりあえず……」"
translation = "「일, 일단……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「フィオナさんの記憶が戻っても、今日のことは触れない方がよさそうだね……」"
translation = "「피오나 씨의 기억이 돌아와도 오늘의 일은 언급하지 않는 게 좋겠네……」"

[[dialogue]]
speaker = "unk"
original = "うん、忘れることにしよう……"
translation = "응, 잊기로 하자……"

[[dialogue]]
speaker = "unk"
original = "マトイと２人、密かにそう誓うのだった。"
translation = "마토이와 둘이서 남몰래 그렇게 맹세하는 것이었다."

