[[dialogue]]
speaker = "unk"
original = "第１１話,厄災の暴走,B"
translation = "제11화, 재앙의 폭주"

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「よーっし！\u3000これにて一件落着ね！」"
translation = "「좋아~! 이걸로 사건 해결이네!」"

[[dialogue]]
speaker = "unk"
original = "ルヴィネを説得することができた。ジグの視た惨劇の未来を回避することができた。"
translation = "루비네를 설득할 수 있었다. 지그가 보았던 참극의 미래를 회피할 수 있었다."

[[dialogue]]
speaker = "unk"
original = "俺たちが安堵に包まれたその時だった──"
translation = "우리들이 안도감에 휩싸인 바로 그때였다──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ──！？\u3000みんな、避けろ！！」"
translation = "「윽──!? 모두들, 피햇!!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「っ！？\u3000待ちなさい、もう戦いは終わった……！\u3000く、ぅっ──！？」"
translation = "「!? 기다리세요, 이제 싸움은 끝났……! 크, 윽──!?」"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「まずいです──暴走しています！」"
translation = "「위험해요── 폭주하고 있어요!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「私が霊力を消耗したから……！？\u3000どうして──まだコントロールする分は残っているはずなのに……！」"
translation = "「내가 영력을 소모했기 때문에……!? 어째서── 아직 컨트롤할 분량은 남아있을 텐데……!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「みんな、下がりなさい！\u3000私が何とかする──！」"
translation = "「모두들, 물러나세요! 내가 어떻게든 하겠어──!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──ッ！？\u3000待て、ルヴィネ！！」"
translation = "「──!? 기다려, 루비네!!」"

[[dialogue]]
speaker = "unk"
original = "ルヴィネ死亡の未来を回避したと思っていたが──ジグが視た光景は、もしかしなくてもこの瞬間なのではないか？"
translation = "루비네가 사망하는 미래를 회피했다고 생각했지만── 지그가 보았던 광경은, 혹시 이 순간인 것이 아닐까?"

[[dialogue]]
speaker = "unk"
original = "強大な霊力を持つルヴィネが死亡するような事態……ディザスターハンドはこれ以上ない『答え合わせ』だ……！"
translation = "강대한 영력을 가진 루비네가 사망할 정도의 사태…… 디재스터 핸드는 이보다 더할 수 없는 『답 맞추기』다……!"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ルヴィネ、下がれ！！\u3000こいつの相手は俺たちがする！！」"
translation = "「루비네, 물러나!! 이 녀석 상대는 우리들이 하겠어!!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「何を言っているの、あなたたちでは敵わない！\u3000こいつは私が連れてきた……私が止めるわ！」"
translation = "「무슨 소리를 하는 거예요, 당신들로는 당해낼 수 없어요! 이 녀석은 내가 데려온…… 내가 막겠어요!」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「それはだめ。ここでルヴィがやられたら、私たちがしてきたことが無駄になっちゃうもの……！」"
translation = "「그건 안 돼. 여기서 루비가 당하면, 우리가 해온 일들이 헛수고가 되어버리는걸……!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「レティシア！？\u3000放しなさい、私でないと無理よ……魔王、あなたが死んでしまう！」"
translation = "「레티시아!? 놓으세요, 내가 아니면 무리예요…… 마왕, 당신이 죽고 말아요!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ルヴィネ！\u3000君は霊力を練り上げることに集中しろ──弱らせれば制御を取り戻せるかもしれない！」"
translation = "「루비네! 너는 영력을 끌어올리는 것에 집중해── 약하게 만들면 제어권을 되찾을 수 있을지도 몰라!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「極星のみんなでルヴィネを守れ！！\u3000新星星徒会──いくぞ！！」"
translation = "「극성학원 모두들 루비네를 지켜라!! 신성성도회── 간다!!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──うぉぉおぉおッ！！」"
translation = "「──우오오오오옷!!」"

[[dialogue]]
speaker = "unk"
original = "アルケインカオスクエーサー──渦巻くリクリエの力を拳に乗せて、渾身の打撃を放つ！"
translation = "아르케인 카오스 퀘이사── 소용돌이치는 리크리에의 힘을 주먹에 실어, 혼신의 타격을 날린다!"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「……っ！？\u3000ダメです、損傷が見られません！」"
translation = "「……윽!? 안 됩니다, 손상이 보이지 않아요!」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「くうぅっ……！\u3000凍結させても、１秒も止められないなんて！」"
translation = "「크으윽……! 동결시켜도, 1초도 멈출 수 없다니!」"

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「──きゃぁあぁっ！？」"
translation = "「──꺄아아악!?」"

[[dialogue]]
speaker = "unk"
original = "埃を払うようななんてことない指の動き一つで、塔の頂上を破壊の嵐が包み込む。"
translation = "먼지를 터는 듯한 아무렇지도 않은 손가락 움직임 하나에, 탑의 정상이 파괴의 폭풍에 휩싸인다."

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「だめっ──シールドが持たないっ！？」"
translation = "「안 돼── 실드가 버티질 못해!?」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「くっ、なんて力なの……！」"
translation = "「큭, 대체 무슨 힘이야……!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ノヴァフォームが、もう……！」"
translation = "「노바 폼이, 벌써……!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「こんなところで……！」"
translation = "「이런 곳에서……!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ベアト！\u3000どきなさい、私が出る──！」"
translation = "「베아토! 비키세요, 내가 나가겠어──!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「で、でもっ……！」"
translation = "「하, 하지만……!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「このままでは新星星徒会がやられてしまう……！\u3000援護しないと……！！」"
translation = "「이대로는 신성성도회가 당하고 말아……! 원호해야 해……!!」"

[[dialogue]]
speaker = "unk"
original = "厄災の右腕が、大きく腕を振りかぶる。"
translation = "재앙의 오른팔이, 크게 팔을 휘둘러 올린다."

[[dialogue]]
speaker = "unk"
original = "マトイたちが狙われている──防御が間に合わない！"
translation = "마토이 일행이 노려지고 있다── 방어가 늦는다!"

[[dialogue]]
speaker = "？？？"
original = "「──灼炎大皇」"
translation = "「──작염대황(灼炎大皇)」"

[[dialogue]]
speaker = "unk"
original = "瞬間、ディザスターハンドの全身が炎に包まれた──ノヴァ星騎士、いやフィオナの魔王フォームにも比する絶大な業火。"
translation = "순간, 디재스터 핸드의 전신이 불길에 휩싸였다── 노바 성기사, 아니 피오나의 마왕 폼에도 비견될 절대한 업화."

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「──ほう？\u3000妾の大炎を受けて、怯むだけとは……！」"
translation = "「──호오? 소첩의 대염을 받고도 움츠러들기만 할 뿐이라니……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「煌嶺……！！」"
translation = "「코레이……!!」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「随分と手こずっているな魔王！\u3000まあ無理もない。３０００年も生きたご老体には、酷な相手よ！」"
translation = "「상당히 애먹고 있구나, 마왕! 뭐 무리도 아니지. 3000년이나 산 고령에게는 가혹한 상대니라!」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「それに……まだ１人も死んでいないとは。察するに、まだ<b>始まったばかり</b>と言ったところか？」"
translation = "「게다가…… 아직 한 명도 죽지 않았다니. 짐작건대, 아직 <b>시작된</b> <b>참</b>이라고 할 수 있겠구나?」"

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「何てこと言うのよ！？\u3000大変だったんだから！！」"
translation = "「무슨 소리를 하는 거야!? 얼마나 힘들었다고!!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……キュリオスの煌嶺」"
translation = "「……큐리오스의 코레이.」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「お前が──ルヴィネか？\u3000ほう……凄まじい力を秘めている。後で味見をするも面白いが……」"
translation = "「네놈이── 루비네냐? 호오…… 엄청난 힘을 비축하고 있구나. 나중에 맛을 보는 것도 재미있겠다만……」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「緋宮会長……！\u3000よかった、間に合いましたね！」"
translation = "「히노미야 회장님……! 다행이에요, 늦지 않았군요!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「助太刀に来たぞ、魔王！！」"
translation = "「도와주러 왔다, 마왕!!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「フィオナ！\u3000アポロ！\u3000それに……ジグまで！\u3000地上は大丈夫なのか！？」"
translation = "「피오나! 아폴로! 게다가…… 지그까지! 지상은 괜찮은 거야!?」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「アガサが１人で引き受けるって張り切っていてね。今しばらくは持つだろう」"
translation = "「아가사가 혼자서 떠맡겠다고 의욕이 넘쳐서 말이야. 당분간은 버티겠지.」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「地上はプリマステラを総動員して防衛に当たっています！\u3000この厄災の化身の相手は、魔王の力を持つ者が１人でも多く必要かと……！」"
translation = "「지상은 프리마스텔라를 총동원해서 방어에 임하고 있습니다! 이 재앙의 화신을 상대하려면, 마왕의 힘을 가진 자가 한 명이라도 더 필요할 것 같아서……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「すまない、助かる……！\u3000ディザスターハンドを少しでも弱らせてくれ！\u3000そうすればルヴィネがコントロールを取り戻せる！」"
translation = "「미안해, 고맙다……! 디재스터 핸드를 조금이라도 약하게 만들어 줘! 그러면 루비네가 제어권을 되찾을 수 있어!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「任せろ！\u3000ヒーローの一撃、見せてやるぜ！」"
translation = "「맡겨 둬! 히어로의 일격, 보여주겠다고!」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「──フン。<ruby>姦<rt>かしま</rt></ruby>しくなってきたな」"
translation = "「──흥. 시, 시끄러워지기 시작했구나.」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「魔王、ここからは争奪戦だ。よもや異論はあるまい？」"
translation = "「마왕, 여기서부터는 쟁탈전이다. 설마 이견은 없겠지?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「争奪戦……？」"
translation = "「쟁탈전……?」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「貴様たちがコントロールを取り戻すか。それとも妾が、あの腕を傀儡にするか──奪い合うのだ」"
translation = "「네놈들이 제어권을 되찾을 것인가. 아니면 소첩이 저 팔을 꼭두각시로 삼을 것인가── 서로 빼앗는 것이니라.」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「そ、そんなことを言っている場合では……！」"
translation = "「그, 그런 말을 하고 있을 때가……!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「そうだぞお前！\u3000ちゃんと協力しろ！！」"
translation = "「맞아, 너! 제대로 협력하라고!!」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「協力だと……？\u3000くだらんことを聞かせるな、耳が腐る」"
translation = "「협력이라니……? 시시한 소리 하지 마라, 귀가 썩겠구나.」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「構わぬな──魔王？」"
translation = "「상관없겠지── 마왕?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「競い合うのが望みなら。でも、勝つのは俺たちだ」"
translation = "「겨루는 게 소원이라면야. 하지만, 이기는 건 우리다.」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「それでよい！」"
translation = "「그거면 됐다!」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「さぁ──死合いだ、厄災。その力、妾にとくと見せてみよ！！」"
translation = "「자── 사투(死合)다, 재앙이여. 그 힘, 소첩에게 똑똑히 보여보거라!!」"

