[[dialogue]]
speaker = "unk"
original = "第１話,ヒメ様は委員長,P"
translation = "제1화, 히메 님은 위원장"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "世界の摂理を司る守護天使──その四柱が一堂に会し、険しい顔で沈黙している。いったい何があったんだ……？"
translation = "세계의 섭리를 다스리는 수호천사── 그 사주가 한자리에 모여 험악한 표정으로 침묵하고 있다. 도대체 무슨 일이 있었던 거지……?"

[[dialogue]]
speaker = "unk"
original = "ヒメ、お取込み中……？"
translation = "히메, 대화 중이야……?"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「ああ、魔王か……すまない、心配させてしまったか」"
translation = "「아아, 마왕인가…… 미안하다, 걱정하게 만들었군」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「我々守護天使が集まっているのは、世界の危機だとかそういうことではない。そこは安心してくれ」"
translation = "「우리 수호천사들이 모여 있는 건 세계의 위기 같은 것이 아니다. 그 점은 안심해라」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「だが──」"
translation = "「하지만──」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「さすがに目に余るのではないか！？」"
translation = "「역시나 눈에 너무 밟히는 것 아니냐!?」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「ここ数日、先にこちらにやってきた守護天使の皆と過ごしてみたが……」"
translation = "「요 며칠간, 먼저 이곳에 온 수호천사 동료들과 지내보았다만……」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「マグダレナは一日中ドラマを貪るように見ているし──」"
translation = "「마그달레나는 하루 종일 드라마를 탐하듯이 보고 있고──」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「待ちに待った新シリーズなのですよ！？\u3000夢中になって当然ではないですか！？」"
translation = "「애타게 기다리던 신작 시리즈라고요!? 빠져드는 게 당연하지 않나요!?」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「あのハラハラドキドキは何にも代えがたいもの。オオヒメだって見てみればその良さがわかります！\u3000さぁ私とシリーズ一気見して沼に浸かりましょう！」"
translation = "「그 조마조마하고 두근거리는 마음은 그 무엇과도 바꿀 수 없는 것. 오오히메도 보면 그 장점을 알게 될 거예요! 자, 저와 함께 시리즈 정주행하며 늪에 빠져보자고요!」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「反省するどころか私を道連れにしようとするだと……！？\u3000しかし沼とは何だ……？」"
translation = "「반성하기는커녕 나까지 끌어들이려 하다니……!? 그런데 늪이란 게 뭐냐……?」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「アルモタヘルは何かにつけて食べてばかりだ。特にドネルケバブ。何も食べていない時の方が珍しいのではないか……？」"
translation = "「아르모타헬은 틈만 나면 먹기만 한다. 특히 도네르 케바브. 아무것도 먹고 있지 않을 때가 더 드문 것 아니냐……?」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「もぐもぐ……何を言う。食こそ人の生み出した最大の文化。様々な料理を食すことで理解を深めようとしているのだ」"
translation = "「우걱우걱…… 무슨 소리냐. 먹는 것이야말로 인간이 만들어낸 최대의 문화. 다양한 요리를 먹음으로써 이해를 넓히고자 하는 것이다」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「特にケバブは奥が深い。流星市国近辺には名店も多いぞ。お前も我とともに食べ歩きをすれば、気に入るものが見つかるはずだ」"
translation = "「특히 케바브는 깊이가 있지. 유성시국 근처에는 맛집도 많다. 너도 나와 함께 맛집 탐방을 한다면 마음에 드는 걸 찾을 수 있을 거다」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「あなたも私をその道に<ruby>誘<rt>いざな</rt></ruby>おうとするのか……しかも今も食べてる……」"
translation = "「너까지 나를 그 길로 유혹하려 하는 거냐…… 게다가 지금도 먹고 있어……」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「セシアは『新しいママよ！』と、モネ殿に膝枕と絵本の読み聞かせをせがんでいた」"
translation = "「세시아는 『새로운 엄마야!』라며 모네 공에게 무릎 베개와 그림책 낭독을 조르고 있었다」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「モネ殿は快く応じてくれたが、傍から見れば新手の変質者のようであった……」"
translation = "「모네 공은 흔쾌히 응해주었다만, 옆에서 보기에는 신종 변태 같았느니라……」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「あなたは真のバブみを知らないから、そんなことが言えるのよ。一度ママにオギャれば、心に不可欠なことがわかるわ」"
translation = "「당신은 진정한 바브미를 모르니까 그런 말을 하는 거야. 한 번 엄마에게 응애 하면 마음의 필수 요소를 알게 될걸」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「バブみ……？\u3000オギャる……？\u3000わかっていいものなのか、それは……？」"
translation = "「바브미……? 응애……? 알아도 되는 것인가, 그것은……?」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「と、守護天使たちはこうして、あまりにも自由に過ごしている。堕天使とは別の方面で堕落しているではないか」"
translation = "「하고, 수호천사들은 이렇게 너무나도 자유롭게 지내고 있다. 타천사와는 다른 의미로 타락한 것 아니냐」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「しかもラクシャとパテルは行方知れず。彼女たちも何をしていることやら」"
translation = "「심지어 락샤와 파텔은 행방불명. 그녀들도 무엇을 하고 있을지 원」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「なんというかこう……すまない。いろいろな意味ですまない」"
translation = "「뭐랄까 그…… 미안하다. 여러 의미로 미안하군」"

[[dialogue]]
speaker = "unk"
original = "俺に謝らなくても……"
translation = "나한테 사과하지 않아도……"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「マグダレナ、アルモタヘル、セシアよ。人間界での生活を楽しむなとは言う気はない。だが守護天使として、より節度を持った暮らしを心がけるべきではないのか？」"
translation = "「마그달레나, 아르모타헬, 세시아여. 인간계에서의 생활을 즐기지 말라는 소리는 아니다. 하지만 수호천사로서 좀 더 절도 있는 생활을 유념해야 하지 않겠느니라?」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「言わんとしていることは理解できるが、神殿に引きこもっていたお前に言われたくはないな」"
translation = "「말하려는 바는 이해하지만, 신전에 틀어박혀 있던 네게 듣고 싶지는 않군」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「ぐはっ……！？」"
translation = "「구학……!?」"

[[dialogue]]
speaker = "unk"
original = "お労しや、ヒメ様……"
translation = "가엾어라, 히메 님……"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「くっ……！？\u3000今そう呼ばれると、その……堪える」"
translation = "「큭……!? 지금 그렇게 불리면, 그…… 가슴에 사무치는군」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「しかしいいのか？\u3000人間・天使・魔族は、今もリクリエに抗おうとしている」"
translation = "「하지만 괜찮은 건가? 인간·천사·마족은 지금도 리크리에에 저항하려 하고 있다」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「それなのに世界を支える我々守護天使が、安穏としていてよいものか……？\u3000人々に示しがつかないのではないだろうか……？」"
translation = "「그런데 세계를 지탱하는 우리 수호천사들이 안온하게 있어도 되는 것인가……? 사람들에게 본보기가 되지 않는 것 아니겠느냐……?」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「相変わらず真面目ですね、オオヒメ。こういう性格は何というんでしたっけ。人間界の言葉にあったような……」"
translation = "「여전히 고지식하시네요, 오오히메. 이런 성격을 뭐라고 하더라. 인간계 말에 있었던 것 같은데……」"

[[dialogue]]
speaker = "unk"
original = "委員長気質？"
translation = "위원장 기질?"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「そう、それです」"
translation = "「맞아요, 그거예요」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「我々の中で強大な力を持っているのはアウクセシアでしたが、中心的な役割を果たしていた、リーダーともいうべき存在がオオヒメです」"
translation = "「우리 중에서 강대한 힘을 가진 건 아욱세시아였지만, 중심적인 역할을 했던 리더라고 할 수 있는 존재는 오오히메입니다」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ただその分生真面目で、責任感が強く、思い詰めてしまうところがあるのです」"
translation = "「다만 그만큼 너무 성실하고 책임감이 강해서 혼자 고민을 짊어지는 면이 있죠」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「魔王はどう思う？\u3000三界に住まう者として、忌憚のない意見を聞かせてほしい」"
translation = "「마왕은 어떻게 생각하나? 삼계에 사는 자로서 가감 없는 의견을 들려다오」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「ひゃっ……！？\u3000ど、どうした、顔が近いぞ……？」"
translation = "「히얏……!? 어, 어이, 얼굴이 가깝다……?」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「え……？\u3000守護天使が少しくらい羽を休めるのは構わない……？」"
translation = "「에……? 수호천사가 조금쯤 날개를 쉬게 하는 건 상관없다……?」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「守護天使たちが楽しんでくれるのなら、歓迎する……？」"
translation = "「수호천사들이 즐거워한다면 환영한다……?」"

[[dialogue]]
speaker = "unk"
original = "ヒメたちは今まで世界のために頑張ってたんだから"
translation = "히메 일행은 지금까지 세계를 위해 노력해 왔으니까"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「そ、そうか……魔王がそう言うのなら、私も少し気を緩めよう。時には力を抜くことも必要だ」"
translation = "「그, 그런가…… 마왕이 그렇게 말한다면 나도 조금 마음을 놓도록 하지. 때로는 힘을 빼는 것도 필요하겠군」"

[[dialogue]]
speaker = "unk"
original = "ヒメ、ちょっと顔が赤いけど"
translation = "히메, 얼굴이 좀 빨간데"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「な、なんでもないぞ！？\u3000なんでもないからな！？」"
translation = "「아, 아무것도 아니다!? 아무것도 아니니까 말이다!?」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「フィーニスの塔の中で永きを過ごしていて、男性に触れる機会がなかっからな、照れているのだろう」"
translation = "「피니스의 탑 안에서 영겁의 시간을 보내느라 남성과 접촉할 기회가 없었으니 말이다, 수줍어하는 거겠지」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「なっ……！？\u3000私は守護天使の一柱だぞ！\u3000そんなことあるものか！」"
translation = "「나앗……!? 나는 수호천사의 일주라고! 그럴 리가 있겠느냐!」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「オオヒメは男に優しくされてダメになる<ruby>質<rt>たち</rt></ruby>であったか。少々意外だな」"
translation = "「오오히메는 남자에게 다정한 대우를 받으면 무너지는 기질이었던가. 조금 의외군」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「そうでしょうか？\u3000以前から片鱗はあった気がしますけど」"
translation = "「그럴까요? 이전부터 편린은 보였던 것 같습니다만」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「男性に甘えるよりもママのバブみの方が健全じゃないかしら？\u3000わたくしちょっと心配だわ」"
translation = "「남성에게 어리광부리는 것보다 엄마의 바브미 쪽이 더 건전하지 않겠어? 난 좀 걱정되네」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「言い過ぎたのは謝るが、好き勝手言ってくれるな……！\u3000あとバブみは健全じゃないだろう！？」"
translation = "「지나친 말은 사과하겠다만, 마음대로 떠들지 마라……! 그리고 바브미는 건전하지 않잖아!?」"

[[dialogue]]
speaker = "unk"
original = "ヒメも少しダメになってみたら？"
translation = "히메도 조금 망가져 보는 건 어때?"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「ひゃぅっ！？\u3000それは、その……考えさせてくれ……」"
translation = "「히얏!? 그것은, 그…… 생각하게 해다오……」"

