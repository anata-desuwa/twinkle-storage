[[dialogue]]
speaker = "unk"
original = "第４話,ナミエルとアフタークリスマス②,P"
translation = "제4화, 나미엘과 애프터 크리스마스②, P"

[[dialogue]]
speaker = "ナミエル"
original = "「まさか、クリスマスフォームの不思議な力がまた発動してしまうだなんて……」"
translation = "「설마, 크리스마스 폼의 신기한 힘이 또 발동해 버릴 줄이야……」"

[[dialogue]]
speaker = "unk"
original = "デートの最後、何故かクリスマスフォームに変身してしまったナミエルは、磁石で引き寄せられるように、俺と１メートル以上離れられない状態となってしまった。"
translation = "데이트 마지막, 왠지 크리스마스 폼으로 변신해 버린 나미엘은, 자석에 이끌리듯이, 나와 1미터 이상 떨어질 수 없는 상태가 되어 버렸다."

[[dialogue]]
speaker = "ナミエル"
original = "「それで会長の家に泊まることになって……。し、しかも、リノさままで気遣って、わざわざ家を空けるだなんて……」"
translation = "「그래서 회장님 댁에서 묵게 되었고……. 그, 게다가, 리노 님까지 배려해서, 일부러 집을 비우시다니……」"

[[dialogue]]
speaker = "unk"
original = "イチャイチャするように言われてるみたい？"
translation = "꽁냥꽁냥하라고 말하는 것 같아?"

[[dialogue]]
speaker = "ナミエル"
original = "「っ……わざわざ言わなくてもいいですから！\u3000うぅ……なんか恥ずかしいです……」"
translation = "「읏…… 일부러 말하지 않아도 되니까요! 으윽…… 뭔가 부끄러워요……」"

[[dialogue]]
speaker = "ナミエル"
original = "「え？\u3000離れられなくなる力が発動してしまった原因ですか……？」"
translation = "「에? 떨어질 수 없게 되는 힘이 발동해 버린 원인 말인가요……?」"

[[dialogue]]
speaker = "ナミエル"
original = "「――このところ、スキンシップできていなかったから？\u3000ち、違いますっ……！」"
translation = "「――요즘, 스킨십을 못 했기 때문에? 아, 아니에요……!」"

[[dialogue]]
speaker = "ナミエル"
original = "「確かに、クリスマス以前から今日まで、アム先輩と離れられない状態だったので、会長と全然スキンシップはできてませんでしたけど……！」"
translation = "「확실히, 크리스마스 이전부터 오늘까지, 아무 선배와 떨어질 수 없는 상태였기 때문에, 회장님과 전혀 스킨십은 할 수 없었습니다만……!」"

[[dialogue]]
speaker = "unk"
original = "でも、試してみる価値はあるかも？"
translation = "하지만, 시도해 볼 가치는 있을지도?"

[[dialogue]]
speaker = "ナミエル"
original = "「も、もうっ……会長がスキンシップしたいだけなんじゃないですか……？\u3000いやらしいですよ……！」"
translation = "「모, 정말…… 회장님이 스킨십 하고 싶은 것뿐인 거 아니에요……? 야해요……!」"

[[dialogue]]
speaker = "ナミエル"
original = "「――じゃあ、しないのかって……べ、別にそんな風には言ってないじゃないですか……」"
translation = "「――그럼, 안 할 거냐고…… 바, 별로 그렇게 말한 건 아니잖아요……」"

[[dialogue]]
speaker = "unk"
original = "そんなこんなで、俺たちは久しぶりに２人で恋人同士のスキンシップをすることになった。"
translation = "이러니저러니 해서, 우리는 오랜만에 둘이서 연인끼리의 스킨십을 하게 되었다."

[[dialogue]]
speaker = "ナミエル"
original = "「ん……<emoji=heart04>\u3000はあぁ……ふうぅ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 하아아…… 후우우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ソファーに腰かけて、膝の上にナミエルを座らせる。後ろから少し体重をかけるように覆い被さると、彼女は吐息を漏らす。"
translation = "소파에 앉아, 무릎 위에 나미엘을 앉힌다. 뒤에서 조금 체중을 싣듯이 덮쳐 안자, 그녀는 숨결을 흘린다."

[[dialogue]]
speaker = "ナミエル"
original = "（あ……<emoji=heart04>\u3000会長の手が頬を撫でてきて……んっ<emoji=heart04>\u3000ふうぅ……<emoji=heart04>）"
translation = "（아……<emoji=heart04> 회장님의 손이 뺨을 쓰다듬어 오고…… 응읏<emoji=heart04> 후우우……<emoji=heart04>）"

[[dialogue]]
speaker = "unk"
original = "ナミエルと付き合う中で、彼女がどんな風にスキンシップされるのが好きなのか、俺も少しずつ分かるようになってきていた。"
translation = "나미엘과 사귀면서, 그녀가 어떤 식으로 스킨십 받는 것을 좋아하는지, 나도 조금씩 알게 되어가고 있었다."

[[dialogue]]
speaker = "ナミエル"
original = "「んんっ……<emoji=heart04>\u3000会長、頬ずりまでしてきて……いやらしいですよ……<emoji=heart04>」"
translation = "「응응읏……<emoji=heart04> 회장님, 뺨까지 비벼 오시고…… 야해요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "たまには甘えて欲しいな"
translation = "가끔은 응석 부려 줬으면 좋겠는데"

[[dialogue]]
speaker = "unk"
original = "ウェディングフォームの時みたいに"
translation = "웨딩 폼일 때처럼"

[[dialogue]]
speaker = "ナミエル"
original = "「う、ウェディングフォームについては、恥ずかしいからあんまり言わないで下さい……！」"
translation = "「우, 웨딩 폼에 대해서는, 부끄러우니까 너무 말하지 말아 주세요……!」"

[[dialogue]]
speaker = "ナミエル"
original = "「あ、あれはちょっと、フォームの特性で、変身すると精神が影響を受けるというか……<emoji=heart04>」"
translation = "「아, 그건 좀, 폼의 특성으로, 변신하면 정신이 영향을 받는다고 할까……<emoji=heart04>」"

[[dialogue]]
speaker = "ナミエル"
original = "「――え？\u3000い、言ってることが全部ウソってわけじゃないですけど……も、もうっ。そこは恋人として察して下さい……！」"
translation = "「――에? 아, 말하는 것이 전부 거짓말이라는 건 아니지만…… 모, 정말. 거기는 연인으로서 알아차려 주세요……!」"

[[dialogue]]
speaker = "unk"
original = "恥ずかしがっているナミエルに、俺はもう１度耳元で、甘えて欲しいとお願いする。"
translation = "부끄러워하는 나미엘에게, 나는 다시 한번 귓가에, 응석 부려 달라고 부탁한다."

[[dialogue]]
speaker = "ナミエル"
original = "「ん……<emoji=heart04>\u3000仕方ないですね……<emoji=heart04>\u3000わかりました。その代わり、変にからかったりしちゃダメですからね……？」"
translation = "「응……<emoji=heart04> 어쩔 수 없네요……<emoji=heart04> 알겠습니다. 그 대신, 이상하게 놀리거나 하면 안 돼요……?」"

[[dialogue]]
speaker = "unk"
original = "ナミエルは体をくるりと俺の方に向けて座り直し、正面から目を合わせながら、じ～っと見つめてくる。"
translation = "나미엘은 몸을 빙글 돌려 나를 향해 다시 앉고, 정면에서 눈을 맞추면서, 지이익 바라본다."

[[dialogue]]
speaker = "ナミエル"
original = "「じゃあ――<b>旦那様</b>……<emoji=heart04>\u3000久しぶりに、キスをして欲しいです……<emoji=heart04>」"
translation = "「그럼――<b>남편님</b>……<emoji=heart04> 오랜만에, 키스를 해 줬으면 좋겠어요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "お願いを聞いてくれたナミエルを抱き締めて、俺は彼女と唇をそっと重ねる。"
translation = "부탁을 들어준 나미엘을 끌어안고, 나는 그녀와 입술을 살짝 포갠다."

[[dialogue]]
speaker = "ナミエル"
original = "「あっ……旦那様<emoji=heart04>\u3000んっ……ちゅっ……<emoji=heart04>」"
translation = "「앗…… 남편님<emoji=heart04> 응읏…… 츕……<emoji=heart04>」"

[[dialogue]]
speaker = "ナミエル"
original = "「ちゅっ……<emoji=heart04>\u3000んむっ……ちゅっ……<emoji=heart04>\u3000はあぁ……<emoji=heart04>」"
translation = "「츕……<emoji=heart04> 음믓…… 츕……<emoji=heart04> 하아아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "能動的にスキンシップする日を作らないか？"
translation = "능동적으로 스킨십하는 날을 만들지 않을래?"

[[dialogue]]
speaker = "unk"
original = "俺、考えたんだけど……今度から"
translation = "나, 생각했는데…… 다음부터는"

[[dialogue]]
speaker = "ナミエル"
original = "「能動的に、ですか……？\u3000それはどうして……？」"
translation = "「능동적으로, 말인가요……? 그건 왜……?」"

[[dialogue]]
speaker = "ナミエル"
original = "「――スキンシップが不足すると、今回みたいに欲求不満になっちゃうから……？」"
translation = "「――스킨십이 부족하면, 이번처럼 욕구불만이 되어 버리니까……?」"

[[dialogue]]
speaker = "ナミエル"
original = "「もう……旦那様ったら、仕方ないですね……<emoji=heart04>\u3000でしたら、未来の奥さんとして、スキンシップ不足にならないように、ちゃんと管理してあげます<emoji=heart04>」"
translation = "「정말…… 남편님도 참, 어쩔 수 없네요……<emoji=heart04> 그렇다면, 미래의 아내로서, 스킨십 부족이 되지 않도록, 제대로 관리해 드릴게요<emoji=heart04>」"

[[dialogue]]
speaker = "ナミエル"
original = "「――頻度はどのくらいなら許してくれるか？\u3000そうですね……週３日、とかでしょうか……？」"
translation = "「――빈도는 어느 정도면 허락해 줄 거냐고요? 글쎄요…… 주 3일, 정도일까요……?」"

[[dialogue]]
speaker = "unk"
original = "思ってたより多くて嬉しい"
translation = "생각했던 것보다 많아서 기뻐"

[[dialogue]]
speaker = "ナミエル"
original = "「あっ、でも、その時だけすればいいってわけじゃなくて……私が『したい』と考えてる時は、ちゃんと察してくれないとダメですよ？」"
translation = "「앗, 하지만, 그때만 하면 된다는 건 아니고…… 제가 『하고 싶다』고 생각할 때는, 제대로 알아차려 주지 않으면 안 돼요?」"

[[dialogue]]
speaker = "ナミエル"
original = "「――大変そう？\u3000ふふっ……ダメです。それが、旦那様としての甲斐性というものですよ……<emoji=heart04>」"
translation = "「――힘들 것 같다고요? 후훗…… 안 돼요. 그것이, 남편님으로서의 가장의 도리라는 거예요……<emoji=heart04>」"

[[dialogue]]
speaker = "ナミエル"
original = "「んっ……<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「응읏……<emoji=heart04> 츕……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それからも、俺たちは久しぶりのスキンシップを繰り返し堪能し続けるのだった。"
translation = "그 후로도, 우리는 오랜만의 스킨십을 반복하며 계속 만끽하는 것이었다."

[[dialogue]]
speaker = "unk"
original = "――翌朝。"
translation = "――다음 날 아침."

[[dialogue]]
speaker = "ナミエル"
original = "「……どうやら、クリスマスフォームの力は収まったみたいですね」"
translation = "「……아무래도, 크리스마스 폼의 힘은 가라앉은 것 같네요」"

[[dialogue]]
speaker = "unk"
original = "目覚めた時には、ナミエルの変身は解除され、制服姿に戻っていた。"
translation = "눈을 떴을 때는, 나미엘의 변신은 해제되어, 교복 차림으로 돌아와 있었다."

[[dialogue]]
speaker = "unk"
original = "本当だったんだな"
translation = "정말이었구나"

[[dialogue]]
speaker = "unk"
original = "ナミエルが、抱き枕がないと寝られないって"
translation = "나미엘이, 안는 베개가 없으면 못 잔다는 거"

[[dialogue]]
speaker = "ナミエル"
original = "「～～～っ……！\u3000それは、仕方がないじゃないですかっ。そういう人も中にはいるんです……！」"
translation = "「~~~읏……! 그건, 어쩔 수 없잖아요. 그런 사람도 가끔은 있는 거예요……!」"

[[dialogue]]
speaker = "ナミエル"
original = "「寝る時に抱き着かれて、幸せな気分だった……？\u3000も、もうっ、思い出してニヤニヤしないで下さいっ。いやらしいですよ……！」"
translation = "「잘 때 안겨서, 행복한 기분이었다고……? 모, 정말, 생각하고 히죽거리지 말아 주세요. 야해요……!」"

[[dialogue]]
speaker = "ナミエル"
original = "「こ、このことは、他の人に言いふらしたりしちゃ、ダメですからね……？」"
translation = "「이, 이 일은, 다른 사람에게 떠벌리고 다니면, 안 돼요……?」"

[[dialogue]]
speaker = "unk"
original = "俺はナミエルの可愛い一面をまた知れて、嬉しい気持ちになりつつ、彼女の頭を優しく撫でるのだった。"
translation = "나는 나미엘의 귀여운 일면을 또 알게 되어, 기쁜 마음이 들면서, 그녀의 머리를 부드럽게 쓰다듬는 것이었다."

