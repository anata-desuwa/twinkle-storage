[[dialogue]]
speaker = "unk"
original = "第３話,アムとスペシャルハンバーグ,P"
translation = "제3화, 아무와 스페셜 햄버그, P"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「会長とこうして２人きりで過ごすのは、久しぶりだね～」"
translation = "「회장이랑 이렇게 둘이서만 지내는 건 오랜만이네~」"

[[dialogue]]
speaker = "unk"
original = "今回のクリスマスは、アムとナミエルが二人三脚生活を送ることになり、その間、恋人である俺とは、２人きりで過ごすことが不可能な状況だった。"
translation = "이번 크리스마스는 아무와 나미엘이 2인 3각 생활을 보내게 되어, 그동안 연인인 나와는 둘이서만 시간을 보내는 것이 불가능한 상황이었다."

[[dialogue]]
speaker = "unk"
original = "なので、改めて『２人でクリスマスパーティーをしよう』という話になり、俺たちは休日に家で過ごすことになったのだ。"
translation = "그래서 다시 한번 『둘이서 크리스마스 파티를 하자』는 이야기가 나왔고, 우리는 휴일에 집에서 시간을 보내게 된 것이다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「でも、楽しみだな～♪\u3000まさか、会長がパーティーのご馳走を作ってくれるだなんて！」"
translation = "「그치만 기대된다~♪ 설마 회장이 파티 요리를 만들어 줄 줄이야!」"

[[dialogue]]
speaker = "unk"
original = "アムは何が食べたい？"
translation = "아무는 뭐가 먹고 싶어?"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「え？\u3000あたしの食べたい物を言っていいの？\u3000それじゃあ、えっと……ハンバーグとか？」"
translation = "「에? 내가 먹고 싶은 걸 말해도 돼? 그럼, 음…… 햄버그 같은 거?」"

[[dialogue]]
speaker = "unk"
original = "俺はそれから、キッチンで準備をし、調理し始めた。"
translation = "나는 그 후 주방에서 준비를 하고 조리를 시작했다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「会長、すごい……！\u3000あたしが言った料理を、レシピを見ずに、すぐにするっと作っちゃうなんて……！」"
translation = "「회장, 대단해……! 내가 말한 요리를 레시피도 안 보고 금방 뚝딱 만들어 버리다니……!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "（なんか、星騎士として強いだけじゃなくて、私生活でもできる男って感じがして、カッコいい……！）"
translation = "(왠지 성기사로서 강할 뿐만 아니라 사생활에서도 능력 있는 남자라는 느낌이 들어서 멋있어……!)"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "（これがあたしの彼氏なんだよね……なんかキュンとしちゃうかも……<emoji=heart04>\u3000『惚れ直す』ってこういうことなのかな……？）"
translation = "(이게 내 남자친구란 말이지…… 왠지 심쿵할지도……<emoji=heart04> 『다시 반한다』는 게 이런 걸까……?)"

[[dialogue]]
speaker = "unk"
original = "ん？\u3000アム、どうかした？"
translation = "응? 아무, 왜 그래?"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「え！？\u3000あっ、ううん、なんでもないよ！\u3000あはははっ……！」"
translation = "「에!? 아, 아니, 아무것도 아니야! 아하하하……!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "（って、なんか照れて思わず誤魔化しちゃったけど……好きな人をちゃんと褒められないのは、『いい女』としてカッコよくないよね……）"
translation = "(랄까, 왠지 부끄러워서 무심코 얼버무려 버렸는데…… 좋아하는 사람을 제대로 칭찬하지 못하는 건 『멋진 여자』답지 않지……)"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「――ごめん、会長。なんでもないっていうのはウソ……あたし今、照れて誤魔化そうとしちゃった」"
translation = "「──미안, 회장. 아무것도 아니라는 건 거짓말…… 나 방금 부끄러워서 얼버무리려고 했어.」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あのね……本当は、その……」"
translation = "「저기 말야…… 사실은, 그……」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「カッコいいなぁって思ったんだ、会長のこと。あたしの食べたいって言った料理をさらっと手作りしてくれて……」"
translation = "「멋있다고 생각했어, 회장. 내가 먹고 싶다고 한 요리를 척척 직접 만들어 줘서……」"

[[dialogue]]
speaker = "unk"
original = "好きな子に褒めてもらえて、嬉しい"
translation = "좋아하는 사람한테 칭찬받으니 기쁜걸."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「……！\u3000え、えへへっ……そっか<emoji=heart04>」"
translation = "「……! 에, 에헤헤…… 그렇구나<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その後、でき上がったハンバーグをアムは口にする。"
translation = "그 후 완성된 햄버그를 아무가 입에 넣는다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「――いただきま～す♪\u3000あむっ……もぐもぐ……ん～～っ<emoji=heart04>\u3000これ、すごく美味しい！\u3000お世辞抜きにこれ、あたしの好きな味だよっ♪」"
translation = "「──잘 먹겠습니다~♪ 냠…… 우물우물…… 음~~!!<emoji=heart04> 이거 정말 맛있어! 빈말이 아니라 이거 내가 딱 좋아하는 맛이야!」"

[[dialogue]]
speaker = "unk"
original = "アムはハンバーグ、好きだよな"
translation = "아무는 햄버그 좋아하잖아."

[[dialogue]]
speaker = "unk"
original = "カフェテリアでも一緒に食事をして、よく注文しているから、俺は知っていた。"
translation = "카페테리아에서도 같이 식사하며 자주 주문하는 걸 보고 나는 알고 있었다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「うん、ちょっと子供っぽいかも～って思って、頼むときに気恥ずかしくなっちゃう時もあるけど……」"
translation = "「응, 조금 애 같을지도~ 라고 생각해서 주문할 때 쑥스러워질 때도 있지만……」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「でも、昔からあたしの好物でさ。お母さんの得意料理で、頑張った時とか、お祝いの時は『スペシャルハンバーグ』を作ってくれるんだ」"
translation = "「그래도 옛날부터 내가 제일 좋아하는 음식이거든. 엄마가 잘하시는 요리라 열심히 했을 때나 축하할 때는 『스페셜 햄버그』를 만들어 주셔.」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あっ、スペシャルっていうのは、いつも作ってくれるのより、ちょっと豪華なハンバーグでね？\u3000それがレストランとかで出るのよりも、すっごく美味しいんだ♪」"
translation = "「앗, 스페셜이라는 건 평소 만들어 주시는 것보다 좀 더 화려한 햄버그인데 말야? 그게 레스토랑 같은 데서 나오는 것보다 훨씬 맛있어♪」"

[[dialogue]]
speaker = "unk"
original = "なんだか楽しそうに言うアムに、俺は１つ思いついたことを口にしてみる。"
translation = "왠지 즐겁게 말하는 아무에게 나는 문득 떠오른 생각을 말해본다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「えっ？\u3000――今度あたしのお母さんに、どんなレシピで作っているのか、聞いてみたいって？」"
translation = "「엣? ──나중에 우리 엄마한테 어떤 레시피로 만드는지 물어보고 싶다고?」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「それって……もしかして会長がスペシャルハンバーグを作ってくれるの！？\u3000わぁ～、食べてみたい！」"
translation = "「그건…… 혹시 회장이 스페셜 햄버그를 만들어 준다는 거야!? 와아~ 먹어보고 싶어!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「それじゃあまた今度、うちに遊びに来る？\u3000お母さんも喜ぶと思うよ！」"
translation = "「그럼 다음에 또 우리 집에 놀러 올래? 엄마도 기뻐하실 거야!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「――よ～し！\u3000そうと決まれば、家に帰ったらすぐにお母さんに相談しないと！\u3000えへへっ、楽しみだな～♪」"
translation = "「──좋아! 그렇게 정했으면 집에 가자마자 엄마한테 상담해야지! 에헤헤, 기대된다~♪」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「って、そうだ！\u3000今は恋人同士の時間なんだから、久しぶりにアレをやらないとね♪」"
translation = "「앗, 맞다! 지금은 연인끼리의 시간이니까 오랜만에 그거 해야지♪」"

[[dialogue]]
speaker = "unk"
original = "アムはひと口サイズに切り分けたハンバーグをフォークで刺すと、俺の前に差し出してくる。"
translation = "아무는 한입 크기로 썰어낸 햄버그를 포크로 찍어 내 앞에 내민다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「はい、会長、口開けて♪\u3000ほら――あ～ん<emoji=heart04>」"
translation = "「자, 회장, 입 벌려♪ 자── 아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はそれに応じて、アムからハンバーグを食べさせてもらう。"
translation = "나는 그에 응해 아무가 먹여주는 햄버그를 받아먹는다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「ふふふっ、どう？\u3000美味しい？\u3000まあ、会長自身が作ったものなんだけどね♪」"
translation = "「후후훗, 어때? 맛있어? 뭐, 회장 본인이 만든 거긴 하지만♪」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「でも、あたしから食べさせてもらえて、嬉しいでしょ～？\u3000なんてね！\u3000えへへっ♪」"
translation = "「그래도 내가 먹여주니까 기쁘지~? 농담이야! 에헤헤♪」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「――うん？\u3000次は会長があたしに？\u3000あ、あたしが先にやったんだから、お返しを恥ずかしがっちゃダメだよね……よ～し、バッチコイ！」"
translation = "「──응? 이번엔 회장이 나한테? 나, 내가 먼저 했으니까 답례를 부끄러워하면 안 되겠지…… 좋아, 가즈아!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あ、あ～ん……っ！\u3000んっ……<emoji=heart04>\u3000あむっ……もぐもぐ……」"
translation = "「아, 아앙……! 음……<emoji=heart04> 냠…… 우물우물……」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "（な、なんか自分で食べるのより、美味しく感じちゃうかも……<emoji=heart04>）"
translation = "(왠지 직접 먹는 것보다 맛있게 느껴질지도……<emoji=heart04>)"

[[dialogue]]
speaker = "unk"
original = "このまま最後まで食べる？"
translation = "이대로 끝까지 먹여줄까?"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「えっ！？\u3000そ、それは……なんかカッコよくないし……」"
translation = "「엣!? 그, 그건…… 왠지 멋없고……」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「だけど……会長がそう言うなら……今日はクリスマス気分で過ごす特別な日だし……うん<emoji=heart04>」"
translation = "「하지만…… 회장이 그렇게 말한다면…… 오늘은 크리스마스 기분으로 보내는 특별한 날이니까…… 응<emoji=heart04>」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あ、あ～ん……<emoji=heart04>」"
translation = "「아, 아앙……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "こくりと頷いて、あ～んと口を開けるアムが可愛くて、俺は幸せな気持ちになりながら、再びハンバーグを食べさせてあげるのだった。"
translation = "고개를 끄덕이며 아앙 하고 입을 벌리는 아무가 귀여워서, 나는 행복한 기분을 느끼며 다시 햄버그를 먹여주었다."

