[[dialogue]]
speaker = "unk"
original = "第2話,メイド長の後継,B"
translation = "제2화, 메이드장의 후계, B"

[[dialogue]]
speaker = "unk"
original = "キリカ師匠が風邪を引いて休んだと聞いた翌日。経過が心配で訪ねると、そこには仕事に復帰した彼女の姿があった。"
translation = "키리카 스승님이 감기에 걸려 쉬었다고 들은 다음 날. 경과가 걱정되어 찾아가니 그곳엔 업무에 복귀한 그녀의 모습이 있었다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「まさか風邪を引いて、１日仕事を休んでしまうとは、メイド長にあらざる失態です……」"
translation = "「설마 감기에 걸려 하루 업무를 쉬어버리다니, 메이드장으로서 있을 수 없는 실태입니다……」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「ふふっ、お見舞いに行った時のキリカさん、とてもお可愛らしかったんですよ<emoji=heart04>\u3000パジャマ姿が似合っていて……」"
translation = "「후훗, 문병 갔을 때의 키리카 씨 정말 사랑스러웠다구요<emoji=heart04> 파자마 차림이 잘 어울려서……」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「マリオンさん。その話を続けたら、<ruby>貫手<rt>ぬきて</rt></ruby>を食らわしますよ？」"
translation = "「마리온 씨. 그 이야기를 계속하면 관수를 먹여주겠어요?」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「まあ、残念。お口を糸で結んでおきますね♪」"
translation = "「머머, 아쉬워라. 입을 실로 꿰매둘게요♪」"

[[dialogue]]
speaker = "unk"
original = "でも、師匠に大事がなくてよかったです"
translation = "그래도 스승님에게 별일 없어서 다행이에요."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ありがとうございます。緋宮会長にもご心配をかけてしまい、申し訳ありませんでした」"
translation = "「감사합니다. 히노미야 회장님께도 걱정을 끼쳐드려 죄송했습니다」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「風邪自体はそこまで大したことなくて、仕事を休むつもりはなかったのですが……」"
translation = "「감기 자체는 그렇게 큰일이 아니라서 업무를 쉴 생각은 없었습니다만……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「私が、主人命令で１日休ませたんです」"
translation = "「제가 주인 명령으로 하루 쉬게 했습니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「こうでもしないと、キリカは体調が悪化しようがお構いなしに働き続けますから」"
translation = "「이렇게라도 안 하면 키리카는 컨디션이 악화되든 말든 상관없이 계속 일하니까요」"

[[dialogue]]
speaker = "unk"
original = "フィオナ、こんにちは"
translation = "피오나, 안녕."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ごきげんよう、緋宮会長」"
translation = "「안녕하세요, 히노미야 회장님」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「――それにしても、キリカが風邪を引くのは、私が小さい時に移してしまった時以来のことで、驚きました」"
translation = "「──그나저나 키리카가 감기에 걸리는 건 제가 어릴 때 옮겼을 때 이후로 처음이라 놀랐어요」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「申し訳ありません。後から冷静になって考えたのですが……」"
translation = "「죄송합니다. 나중에 냉정하게 생각해 보았는데……」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「風邪を引いた私が働くことで、お嬢様やメイド隊の皆に感染を広げてしまう危険性がありました」"
translation = "「감기에 걸린 제가 일함으로써 아가씨나 메이드대 모두에게 감염을 넓힐 위험성이 있었습니다」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「メイドとして一生の不覚です。責任をとって――」"
translation = "「메이드로서 평생의 실수입니다. 책임을 지고──」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「メイド長の座を降りるのも仕方ないと考えております」"
translation = "「메이드장 자리에서 물러나는 것도 어쩔 수 없다고 생각하고 있습니다」"

[[dialogue]]
speaker = "unk"
original = "ちょっ、師匠！？"
translation = "잠깐, 스승님!?"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「まあまあ、うふふ♪\u3000キリカさんのいつもの冗談ですよ」"
translation = "「자자, 우후후♪ 키리카 씨의 평소 같은 농담이에요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「キリカの真面目さは、腹を切って詫びるタイプなので……」"
translation = "「키리카의 성실함은 배를 갈라 사죄하는 타입이라……」"

[[dialogue]]
speaker = "unk"
original = "武士！！！"
translation = "무사냐고!!!"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「私は毎回本気で言っているのですが……メイド長の役職は元々、成り行きでなったものですし」"
translation = "「전 매번 진심으로 말하고 있습니다만…… 메이드장 역직은 원래 상황에 따라 맡게 된 것이고」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「私にとって大事なのは、上月家の者として星見家とフィオナお嬢様にお仕えすることですので」"
translation = "「제게 중요한 것은 코즈키 가문의 사람으로서 호시미 가문과 피오나 아가씨를 모시는 것이니까요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「キリカったら、またそういうことを言う……」"
translation = "「키리카도 참, 또 그런 소릴 하고……」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「とはいえ、メイド長としての責任というものがありますから、そう簡単に投げ出すのはよくないですよね、キリカさん？」"
translation = "「그렇다고 해도 메이드장으로서의 책임이라는 게 있으니까 그렇게 쉽게 던져버리는 건 좋지 않겠죠, 키리카 씨?」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「あなたがそれを言いますか……。ですが、真面目な話、自分が今回病気になったことで、先のことをちゃんと考えておかなくては と思いました」"
translation = "「당신이 그런 말을 합니까…… 하지만 진지하게 이번에 병이 난 것으로 앞으로의 일을 제대로 생각해 두어야겠다고 생각했습니다」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「私がやむを得ない事情や、年老いてメイド長の仕事を全うできなくなった時……」"
translation = "「제가 어쩔 수 없는 사정이나 나이가 들어 메이드장 업무를 완수할 수 없게 되었을 때……」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「次の優秀なメイド長候補が自然とそこにいてくれればいいのですが、運に頼るわけにもいきません」"
translation = "「다음 우수한 메이드장 후보가 자연스럽게 그곳에 있어 주면 좋겠지만 운에 맡길 수는 없으니까요」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「今のうちから、芽のある若いメイドたちを育てて、次のメイド長候補を決めておく必要があります」"
translation = "「지금부터 싹이 있는 젊은 메이드들을 키워서 다음 메이드장 후보를 정해둘 필요가 있습니다」"

[[dialogue]]
speaker = "unk"
original = "数日後、稽古をつけてもらう為にいつものように師匠のもとを訪ねると、次のメイド長候補を選ぼうと声をかけているところで――"
translation = "며칠 뒤, 지도를 받기 위해 평소처럼 스승님을 찾아가자 다음 메이드장 후보를 고르려 말을 걸고 있는 중이었는데──"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「えっ、私を次のメイド長候補に、ですか？」"
translation = "「엣, 저를 다음 메이드장 후보로 말인가요?」"

[[dialogue]]
speaker = "unk"
original = "彼女は星見家メイド隊の１人で、流星学園附属校１年生のナミエル・クレシェンテ。"
translation = "그녀는 호시미 가문 메이드대 중 한 명인 유성학원 부속교 1학년 나미엘 크레셴테."

[[dialogue]]
speaker = "unk"
original = "師匠と似たクールで真面目なメイドで、掃除が大の得意。苦手なのは――"
translation = "스승님과 닮은 쿨하고 성실한 메이드로 청소가 특기다. 약점은──"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「キリカさんから声をかけて頂けるなんて、すごく光栄ですが、私……その……」"
translation = "「키리카 씨가 말을 걸어주시다니 정말 영광이지만 전…… 그게……」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「知っての通り、料理の腕が……味オンチで、メイドとして先にそこをなんとかしないとは……」"
translation = "「아시다시피 요리 솜씨가…… 미각치라서 메이드로서 먼저 그 부분부터 어떻게든 하지 않으면……」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「って、緋宮会長、いつの間に！？\u3000覗き見なんて、やらしいですよっ。やはり会長も男性……要警戒対象です……！」"
translation = "「앗, 히노미야 회장님 어느 틈에!? 엿보기라니 야해요. 역시 회장님도 남자…… 경계 대상입니다……!」"

[[dialogue]]
speaker = "unk"
original = "――といった感じで、男性のこともちょっと苦手だったりする。"
translation = "──라는 느낌으로 남자도 좀 서툴다."

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「わ、私を星見家メイド隊の、次のメイド長候補にですかっ？」"
translation = "「저, 저를 호시미 가문 메이드대의 다음 메이드장 후보로 말인가요!?」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「な、なして……！？\u3000そんな……バイトの身なのに恐れ多いです……！」"
translation = "「어, 어째서……!? 그런…… 알바 신분인데 가당치도 않습니다……!」"

[[dialogue]]
speaker = "unk"
original = "以前、『寮生争奪チキチキ花いちもんめバトルウィーク』の一件で仲良くなった流星学園１年生、フェニエル。愛称は『フニ』。"
translation = "예전 『기숙사생 쟁탈 치키치키 하나이치몬메 배틀 위크』 일로 친해진 유성학원 1학년 페니엘. 애칭은 『후니』."

[[dialogue]]
speaker = "unk"
original = "彼女は北海道出身で、後天的に星力に目覚めて学園にやってきた転入生。先輩からの推薦があり、星見家メイド隊でバイトをしている。"
translation = "그녀는 홋카이도 출신으로 후천적으로 성력에 눈을 떠 학원에 오게 된 전입생. 선배의 추천으로 호시미 가문 메이드대에서 알바를 하고 있다."

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「――評価して頂いて、とてもありがたいです。メイドの仕事は好きですし。でも……」"
translation = "「──평가해 주셔서 정말 감사합니다. 메이드 일은 좋아하고요. 하지만……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「私、まだちゃんと言えてませんけれど――お世話になっている流星寮のヒルディオーネお姉様のもとで、次の寮長を目指したいと思っているんです」"
translation = "「저 아직 제대로 말씀 못 드렸지만── 신세를 지고 있는 유성 기숙사의 힐디오네 언니분 밑에서 다음 기숙사장을 목표로 하고 싶거든요」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「だから、申し訳ありません、キリカさん。メイド長候補には……」"
translation = "「그러니까 죄송해요 키리카 씨. 메이드장 후보는……」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ふぅ……参りました。あの２人ならば、どちらも次のメイド長候補になれる可能性があると思っていたのですが、断られてしまいました」"
translation = "「후우…… 졌습니다. 저 둘이라면 누구든 다음 메이드장 후보가 될 가능성이 있다고 생각했습니다만 거절당해 버렸군요」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「ふふっ、なかなか決まらないようですね、キリカさん」"
translation = "「후훗, 좀처럼 정해지지 않는 모양이네요 키리카 씨」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「マリオンさん……ええ。当てが外れてしまって、これからどうしたものかと考えていたところです」"
translation = "「마리온 씨…… 네. 예상이 빗나가 버려서 앞으로 어떻게 해야 할지 생각하던 참입니다」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「私に１人、当てがあると言ったらどうしますか？」"
translation = "「제게 한 명 짚이는 데가 있다고 하면 어쩌실 건가요?」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「あなたが推薦を……？\u3000それは一体？」"
translation = "「당신이 추천을……? 그건 대체 누구죠?」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「あなたの隣にいらっしゃるじゃありませんか。女の子のようにお可愛らしいお顔立ちをされた方が♪」"
translation = "「당신 옆에 계시지 않나요. 여자아이처럼 사랑스러운 이목구비를 하신 분이♪」"

[[dialogue]]
speaker = "unk"
original = "え！？\u3000俺！？"
translation = "에!? 나!?"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「なにをふざけたことを言っているんですか。緋宮会長は男性ですよ？」"
translation = "「무슨 장난 같은 소릴 하는 겁니까. 히노미야 회장님은 남성이라구요?」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「別にメイド隊のトップが執事でも、おかしくはないと思いますが？\u3000それに上月神闘流は、星見家を守る者として上月家が代々伝えてきたもの」"
translation = "「딱히 메이드대의 정점이 집사여도 이상할 건 없다고 생각하는데요? 게다가 코즈키 신투류는 호시미 가문을 지키는 자로서 코즈키 가문이 대대로 전해온 것」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「そこには戦闘技術だけでなく、奉仕の精神も含まれている。とキリカさんは会長様に指導していたはずでは？」"
translation = "「거기에는 전투 기술뿐만 아니라 봉사 정신도 포함되어 있다, 고 키리카 씨는 회장님께 지도하고 계셨을 텐데요?」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「確かに、メイドとしての心構えや技術も、上月神闘流の一環として教えていましたが……」"
translation = "「확실히 메이드로서의 마음가짐이나 기술도 코즈키 신투류의 일환으로 가르치고 있었습니다만……」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「ならば後は、性別がどうかというよりも、メイドであるか否かの問題ということです。そこで――」"
translation = "「그렇다면 나머지는 성별이 어떠냐보다 메이드인지 아닌지의 문제라는 거죠. 그래서──」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「じゃ～ん♪\u3000私が趣味で会長様ピッタリに作ったメイド服がここに♪」"
translation = "「쨔잔~♪ 제가 취미로 회장님께 딱 맞게 만든 메이드복이 여기♪」"

[[dialogue]]
speaker = "unk"
original = "いや、着ませんよ！？"
translation = "아니, 안 입을 거거든요!?"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「私、前々から思っていたのです。会長様はきっと……いえ、必ずや、お可愛らしい女装が似合うんじゃないかと！」"
translation = "「전 예전부터 생각했답니다. 회장님은 분명…… 아니, 반드시 사랑스러운 여장이 잘 어울릴 거라고!」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「そしてついに、その時がやってきたということです<emoji=heart04>」"
translation = "「그리고 드디어 그 때가 왔다는 거예요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "どういうこと！？"
translation = "무슨 소리야!?"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「え～♪\u3000メイクもすれば、絶対にメイド服似合いますよ<emoji=heart04>\u3000キリカさんも、そう思いませんか？」"
translation = "「에~♪ 메이크업까지 하면 분명 메이드복 잘 어울릴 거예요<emoji=heart04> 키리카 씨도 그렇게 생각하지 않나요?」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「アリですね」"
translation = "「괜찮네요」"

[[dialogue]]
speaker = "unk"
original = "師匠！？"
translation = "스승님!?"

[[dialogue]]
speaker = "unk"
original = "そうして、俺はメイド服を着せられる羽目になったのだった。"
translation = "그렇게 나는 메이드복을 입게 되는 처지가 되고 만 것이었다."

