[[dialogue]]
speaker = "unk"
original = "第１３話,決意,B"
translation = "제13화, 결의, B"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「色々脱線もしたけど……アタシがルヴィと出会って、この１０年をどう過ごしたか。少しは伝わったか、魔王？」"
translation = "「여러모로 이야기가 샜지만…… 내가 루비를 만나고 이 10년을 어떻게 보냈는지. 조금은 전해졌나, 마왕?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……ああ。話してくれてありがとう。おかげでルヴィネのこと、そしてキミたちのこと……少しだけわかった気がする」"
translation = "「……아아. 이야기해줘서 고마워. 덕분에 루비네에 대해서, 그리고 너희에 대해서…… 조금은 알 것 같은 기분이 들어」"

[[dialogue]]
speaker = "unk"
original = "チナの口から語られた、１０年前に起こったニュクス流星群の惨劇。"
translation = "치나의 입을 통해 전해진 10년 전에 일어난 닉스 유성우의 참극."

[[dialogue]]
speaker = "unk"
original = "どれほどの絶望と苦境が流星市国を襲ったのか、そしてルヴィネという存在がどれほど人々の心の支えとなったのか。"
translation = "얼마나 큰 절망과 고경이 유성시국을 덮쳤는지, 그리고 루비네라는 존재가 얼마나 사람들의 마음의 버팀목이 되었는지."

[[dialogue]]
speaker = "unk"
original = "ルヴィネは『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』に生み出された、新たな女神の幼体。リクリエを扇動する人類の敵……アルタイルに住む俺たちの目からはどうしてもそう見える。"
translation = "루비네는 『<ruby>제로스<rt>XELOS</rt></ruby>』에 의해 생겨난 새로운 여신의 유체. 리크리에를 선동하는 인류의 적…… 알타이르에 사는 우리 눈에는 아무래도 그렇게 보인다."

[[dialogue]]
speaker = "unk"
original = "けれど、ルヴィネと１０年を過ごしたチナたちからはそう見えていない。心優しく、思いやりのある、かけがえのない仲間であることがよくわかった。"
translation = "하지만 루비네와 10년을 보낸 치나 일행에게는 그렇게 보이지 않는다. 마음씨 곱고 배려심 넘치는, 더할 나위 없는 동료라는 것을 잘 알 수 있었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（ルヴィネ……キミの真意は何なんだ？\u3000どうしてそこまで身を粉にして、デネブを復興させ、チナたちと友情を築いたんだ……？）"
translation = "(루비네…… 네 진의는 대체 뭐야? 왜 그렇게까지 몸을 아끼지 않고 데네브를 부흥시키고, 치나 일행과 우정을 쌓은 거지……?)"

[[dialogue]]
speaker = "unk"
original = "その場にいる他の皆も、俺と似たような感想を抱いているようだった。"
translation = "그 자리에 있는 다른 이들도 나와 비슷한 감상을 품고 있는 듯했다."

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「じゃあ次は、私の視点から見たルヴィとのエピソードを──」"
translation = "「그럼 다음은 제 시점에서 본 루비와의 에피소드를──」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「まあまあ。喉も渇いたし、ずいぶん長いこと話し込んでる。今日はこのくらいでいいんじゃないか？」"
translation = "「자자. 목도 마르고 꽤 오랫동안 이야기했어. 오늘은 이 정도로 해두는 게 어때?」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「え～っ！？\u3000チナばっかり喋ってずるいですよ！」"
translation = "「에~!? 치나만 이야기하고 치사해요!」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「いや、ずるいってなんだよ……つーかグレイスに喋らせたら収拾つかなくなるだろ」"
translation = "「아니, 치사하다니 뭐야…… 그보다 그레이스한테 말하게 하면 수습이 안 될 거 아냐」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「どうしてですかー！？\u3000ひどいです！！」"
translation = "「어째서인가요~!? 너무해요!!」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ともかく、だ。魔王、これでわかってくれただろ？」"
translation = "「어쨌든 말이야. 마왕, 이걸로 알아줬겠지?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「アタシは今、確かにほんの少しだけ、ルヴィに疑いを持ってはいる」"
translation = "「나는 지금 확실히 아주 조금은 루비에게 의구심을 품고 있어」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「でも……ルヴィの口から、そんなの誤解だ、私を信じてって説得されたら……」"
translation = "「하지만…… 루비의 입으로 그런 건 오해다, 나를 믿어달라고 설득당하면……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「アタシは、ルヴィを信じると思う……悪いけどさ」"
translation = "「나는 루비를 믿을 것 같아…… 미안하지만 말이야」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──当然だと思う。俺だって、チナの立場だったら同じことを言うだろう」"
translation = "「──당연하다고 생각해. 나라도 치나의 입장이라면 똑같이 말했을 거야」"

[[dialogue]]
speaker = "unk"
original = "苦楽を共にした、１０年来の親友の言葉なのだから。"
translation = "고락을 함께한 10년 지기 친구의 말이니까."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……今日は本当にありがとう。極星学園のみんなはゆっくり休んでくれ」"
translation = "「……오늘은 정말 고마워. 극성학원 여러분은 푹 쉬어줘」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「新しく聞けた話も多い。アルタイルとしても、今後の方針をまとめ直して行きたい──だから、また明日も頼む」"
translation = "「새롭게 들은 이야기도 많아. 알타이르로서도 향후 방침을 다시 정리해가고 싶어── 그러니까 내일도 잘 부탁해」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「…………ああ」"
translation = "「…………아아」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「私はよろしくしたくないけれど、休めるのは助かるわ」"
translation = "「나는 잘 부탁하고 싶지 않지만, 쉴 수 있는 건 다행이네」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「長くお喋りしてお腹が空きましたね。チナ、捕虜にはどんな夕食が出るのでしょうか……！」"
translation = "「오랫동안 수다를 떨어서 배가 고파졌네요. 치나, 포로에게는 어떤 저녁 식사가 나오나요……!」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「お前はほんっとーに、もうちょい緊張感を持て！\u3000マジで！！」"
translation = "「너는 진짜로 긴장감 좀 가져! 제발!!」"

[[dialogue]]
speaker = "unk"
original = "──やるべきことは見えた。あとは行動に移し、掴み取るだけだ。"
translation = "──해야 할 일은 보였다. 남은 것은 행동으로 옮겨 쟁취하는 것뿐이다."

[[dialogue]]
speaker = "unk"
original = "翌日、俺はメルエルとナターシャを星徒会室に呼び出した。"
translation = "다음 날, 나는 메르엘과 나타샤를 성도회실로 불러냈다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「お、おはよう会長くん。それに……ナターシャちゃんも」"
translation = "「아, 안녕 회장님. 그리고…… 나타샤짱도」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「……うん、おはよ。会長さん、これってどういう状況？」"
translation = "「……응, 안녕. 회장님, 이건 어떤 상황?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そう遠くないうちに、俺たちアルタイルはルヴィネと激突することになる。だからできうる限りの準備はしておきたい」"
translation = "「머지않아 우리 알타이르는 루비네와 격돌하게 될 거야. 그래서 가능한 한 준비를 해두고 싶어」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺たちの手元には、天界襲撃の際にグレイスが使っていた転送装置がある。あれを使えば……」"
translation = "「우리 손에는 천계 습격 때 그레이스가 사용했던 전송 장치가 있어. 그걸 사용하면……」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「デネブに乗り込めるってことでしょ。それはわかる」"
translation = "「데네브에 쳐들어갈 수 있다는 거지. 그건 알겠어」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。その際、少しでも戦力になる人員が欲しい。そこでメルエルには、天界へ戦力補強の打診に向かってもらうことにした」"
translation = "「아아. 그때 조금이라도 전력이 될 인원이 필요해. 그래서 메르엘에게는 천계로 전력 보강 타진을 하러 가달라고 하기로 했어」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「天界襲撃があったのはつい先日……まだ片付いていないこともたくさんあると思う」"
translation = "「천계 습격이 있었던 건 바로 며칠 전…… 아직 정리되지 않은 일도 많을 거야」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そんな状況で援軍を連れてこられるとしたら、リガルタ翁の娘であるメルエルだけだ」"
translation = "「그런 상황에서 원군을 데려올 수 있는 건 리갈타 옹의 딸인 메르엘뿐이야」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「そう、だね。……それで、どうして私まで？」"
translation = "「그렇구나. ……그런데 왜 나까지?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「人手が足りないとは言え、１人で向かわせるのは心配だろ。サポートできる人を連れて行っていいと言ったら、メルエルがキミを希望したんだ」"
translation = "「일손이 부족하다고는 해도 혼자 보내는 건 걱정되잖아. 서포트할 수 있는 사람을 데려가도 좋다고 했더니 메르엘이 너를 희망했어」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「…………いいの、メルエル？」"
translation = "「…………괜찮겠어, 메르엘?」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「うん。ナターシャちゃんも、今私と２人旅なんて居心地が悪いとは思うんだけど……やっぱり私、このままでいるの、嫌だなって……」"
translation = "「응. 나타샤짱도 지금 나랑 둘이서 여행하는 게 불편하긴 하겠지만…… 역시 나, 이대로 있는 건 싫다고 생각해서……」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「隠してたこととか、思ってたこととか……たくさん聞きたい。お話がしたいの。だから、ナターシャちゃんがよかったら……」"
translation = "「숨겼던 일이라든가, 생각했던 거라든가…… 잔뜩 듣고 싶어. 이야기를 하고 싶어. 그러니까 나타샤짱만 괜찮다면……」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「──そう。そういうこと」"
translation = "「──그래. 그런 거구나」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「……わかった。言っておくけど居心地悪いよー、絶対。メルエルには、積もり積もった恨みつらみがあるからねー」"
translation = "「……알았어. 미리 말해두겠는데 불편할 거야, 분명. 메르엘에게는 쌓이고 쌓인 원망이 많으니까 말이야~」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「うん！\u3000いっぱい聞かせて！」"
translation = "「응! 잔뜩 들려줘!」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「メルエルは眩しいなぁ……まあ。退屈はしないで済みそうかな？」"
translation = "「메르엘은 눈부시네…… 뭐. 지루하지는 않겠어」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「会長さんのオーダーは了解。ドタバタしてる天界から、強～い星騎士を引っ張って来ればＯＫだね？」"
translation = "「회장님의 오더는 확인 완료. 북적거리는 천계에서 강~한 성기사를 끌고 오면 되는 거지?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。メルエル、ナターシャ。頼んだ」"
translation = "「아아. 메르엘, 나타샤. 부탁한다」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「任せて！」"
translation = "「맡겨줘!」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「できうる範囲で、頑張らせてもらうよ」"
translation = "「할 수 있는 범위 내에서 노력해볼게」"

[[dialogue]]
speaker = "unk"
original = "退室していく２人を見送る。"
translation = "퇴실하는 두 사람을 배웅한다."

[[dialogue]]
speaker = "unk"
original = "どれだけかき集めても戦力は足りない。決戦の準備を整えなくてはならない──"
translation = "아무리 긁어모아도 전력은 부족하다. 결전의 준비를 갖추어야만 한다──"

[[dialogue]]
speaker = "unk"
original = "そのまましばらく部屋で待機していると、次の約束の人物がやってきた。"
translation = "그대로 잠시 방에서 대기하고 있자, 다음 약속의 인물이 찾아왔다."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「やあ、わざわざ私だけを呼び出すだなんて……愛の告白でもしてくれるのかな？」"
translation = "「야아, 일부러 나만을 불러내다니…… 사랑의 고백이라도 해주려는 걸까?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「悪いな。少しも艶っぽくない、真面目な話だ」"
translation = "「미안하군. 조금도 요염하지 않은, 진지한 이야기다」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「そいつは残念──それで？」"
translation = "「그거 유감이네── 그래서?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺たちアルタイルは、デネブと共存の道を探す……ずっとそう言ってきた」"
translation = "「우리 알타이르는 데네브와 공존의 길을 찾는다…… 계속 그렇게 말해왔어」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そこにもう１つ、我儘を言いたい」"
translation = "「거기에 한 가지 더, 억지를 부리고 싶어」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ルヴィネが死ぬ運命を阻止する。極星学園星徒会が、誰一人欠けることなく、この戦いを終わらせたいんだ」"
translation = "「루비네가 죽을 운명을 저지한다. 극성학원 성도회가 누구 하나 빠지는 일 없이, 이 싸움을 끝내고 싶어」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「へぇ……？」"
translation = "「헤에……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……極星学園の皆は、もうすでにたくさんのものを失っている。彼女たちにとって、ルヴィネはかけがえのない友人だ」"
translation = "「……극성학원의 모두는 이미 수많은 것들을 잃었어. 그녀들에게 있어 루비네는 둘도 없는 친구다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「このまま時が進むと、ジグが見た未来は実現する……そうなると、彼女たちは死に別れてしまうことになるだろう」"
translation = "「이대로 시간이 흐르면 지그가 본 미래는 실현되겠지…… 그렇게 되면 그녀들은 사별하게 되고 말 거야」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「必要な犠牲ってやつだね。違うかい？」"
translation = "「필요한 희생이라는 거네. 아니니?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺は……違うと思う」"
translation = "「나는…… 아니라고 생각해」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「一軍の将が、情に流されているようでは話にならないと思うけど？」"
translation = "「일군의 장이 정에 휩쓸리고 있어서야 말이 안 된다고 생각하는데?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「同情する気持ちがないと言えば嘘になる。だけど、重要なのはそこじゃない」"
translation = "「동정하는 마음이 없다고 하면 거짓말이겠지. 하지만 중요한 건 그게 아냐」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ジグの視た未来のことを聞いてからずっと考えていた──ルヴィネが死ぬこと、イコール俺たちの勝利とは思えない」"
translation = "「지그가 본 미래에 대해 듣고 나서 계속 생각했어── 루비네가 죽는 것이 곧 우리의 승리라고는 생각되지 않아」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「仮にルヴィネが死亡したところで、あの子に代わる、第２、第３の『女神の幼体』が生み出されるだけなんじゃないか？」"
translation = "「설령 루비네가 사망한다 한들, 그 아이를 대신할 제2, 제3의 『여신의 유체』가 만들어질 뿐인 게 아닐까?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だから俺は新しいルートを見つけたい。この世界で最も『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』のことを知るルヴィネを、仲間に引き込めたら……きっと心強いはずだ」"
translation = "「그러니까 나는 새로운 루트를 찾고 싶어. 이 세계에서 가장 『<ruby>제로스<rt>XELOS</rt></ruby>』에 대해 잘 아는 루비네를 동료로 끌어들일 수 있다면…… 분명 든든할 거야」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「可能性が視えるジグに聞きたい。キミが見た、すでに決定しているであろう『ルヴィネ死亡の未来』を回避した上で──」"
translation = "「가능성이 보이는 지그에게 묻고 싶어. 네가 본, 이미 결정되었을 『루비네 사망의 미래』를 회피한 뒤에──」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「誰１人欠けることなくリクリエを止める。そんな未来を引き寄せることは……可能か？」"
translation = "「누구 하나 빠지는 일 없이 리크리에를 멈춘다. 그런 미래를 끌어당기는 것은…… 가능한가?」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「……………………」"
translation = "「……………………」"

[[dialogue]]
speaker = "unk"
original = "長い、長い沈黙。"
translation = "길고 긴 침묵."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「これはまた……ずいぶんと業突く張りな宣言だね。失敗したらベガのように滅ぶ。そのことは本当に理解しているのかい？」"
translation = "「이것 참…… 상당히 욕심 많은 선언이네. 실패하면 베가처럼 멸망한다. 그 사실은 정말로 이해하고 있는 거니?」"

[[dialogue]]
speaker = "unk"
original = "ジグは呆れたようにそうこぼしてから──"
translation = "지그는 어이없다는 듯 그렇게 중얼거리고는──"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「方法はなくもない──かもしれないね？」"
translation = "「방법이 없지는 않다── 고 할 수 있을지도 모르겠네?」"

