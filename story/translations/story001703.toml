[[dialogue]]
speaker = "unk"
original = "シュティレと出会った翌日──"
translation = "슈틸레를 만난 다음 날──"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「完成しました。こちらがモンスターの装甲を破る発明となります」"
translation = "「완성했습니다. 이것이 몬스터의 장갑을 뚫을 발명품입니다.」"

[[dialogue]]
speaker = "unk"
original = "早すぎじゃない！？"
translation = "너무 빠른 거 아니야!?"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「自称とはいえ、流石はアニマ先輩の弟子ですね。時間をくれと言われた次の日に成果物が到着する……このやり取り、デジャヴを感じます」"
translation = "「자칭이라지만 과연 아니마 선배님의 제자군요. 시간을 달라고 한 다음 날에 성과물이 도착하다니…… 이 전개, 데자뷔가 느껴집니다.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「恐縮です。さて、取り出したるこちらは、ドリルナックルです」"
translation = "「송구합니다. 자, 꺼내놓은 이것은 드릴 너클입니다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「これは──ガントレットを改造したものですか？」"
translation = "「이건── 건틀릿을 개조한 것인가요?」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「はい。握りの部分から星力を流し込むことで、取りつけてある先端のドリル部分が回転する仕組みとなっています」"
translation = "「네. 손잡이 부분에서 성력을 흘려보냄으로써 장착된 선단의 드릴 부분이 회전하는 구조로 되어 있습니다.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「マスターの弱体化薬は、モンスターの装甲を破れないことがネック」"
translation = "「마스터의 약화약은 몬스터의 장갑을 뚫지 못하는 것이 난관.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「そして弱体化薬は、星力総量が低い星騎士こそが扱えなければなりません」"
translation = "「그리고 약화약은 성력 총량이 낮은 성기사야말로 다룰 수 있어야 합니다.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「その課題を解決するために、量産が可能な外部アタッチメントを作成すれば良いのでは、と考えました」"
translation = "「그 과제를 해결하기 위해 양산이 가능한 외부 어태치먼트를 제작하면 되지 않을까 생각했습니다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「このドリルナックルが実用に耐えうるなら、非プリマステラでも機械型モンスター相手に有利に立ち回れるかもしれませんね」"
translation = "「이 드릴 너클이 실전에 견딜 수 있다면 프리마스텔라가 아닌 이들도 기계형 몬스터를 상대로 유리하게 싸울 수 있을지도 모르겠네요.」"

[[dialogue]]
speaker = "unk"
original = "しかし……なぜドリル？"
translation = "하지만…… 왜 드릴이야?"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「愚問です。ドリルはロマン」"
translation = "「우문입니다. 드릴은 로망.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「おお、言い切った」"
translation = "「오오, 단언했어.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「お二人はロボットアニメを視聴されないのですか？\u3000今シーズンの超機動武神ギガンドムでも、ドリルは重要な役目を果たします」"
translation = "「두 분은 로봇 애니메이션을 안 보시나요? 이번 시즌의 초기동무신 기간돔에서도 드릴은 중요한 역할을 합니다.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「１２話にて絶対的なシールドを持つ敵が現れるのですが、新武装ギガンドリルによって敵は葬られました」"
translation = "「12화에서 절대적인 실드를 가진 적이 나타나지만 신무장 기간드릴에 의해 적은 소멸했습니다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ほう。これはそのアニメから着想を得たと？」"
translation = "「호오. 이건 그 애니메이션에서 착안했다는 건가요?」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「はい。星騎士が使用可能なギガンドリルを、私の主観と想像で補い、小型化させたのです」"
translation = "「네. 성기사가 사용 가능한 기간드릴을 저의 주관과 상상으로 보충하여 소형화시킨 것입니다.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「さて──兵器は持っていて嬉しいコレクションではありません。使って見せなければ」"
translation = "「자── 병기는 가지고 있어서 기쁜 컬렉션이 아닙니다. 써서 보여줘야죠.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「というわけでアナお姉ちゃん。トレーニング施設のモンスターをお願いします。お披露目させてください」"
translation = "「그런 고로 아나 언니. 트레이닝 시설의 몬스터를 부탁드립니다. 선보이게 해주세요.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「わかりました。準備をしましょう」"
translation = "「알겠습니다. 준비를 하죠.」"

[[dialogue]]
speaker = "unk"
original = "数分後──戦闘服へと変身したシュティレがフワッチと向き合った。"
translation = "몇 분 뒤── 전투복으로 변신한 슈틸레가 후와치와 마주 보았다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「戦闘シミュレーションを開始。残念ながら、トレーニング施設で機械型モンスターを出現させる技術はまだありません」"
translation = "「전투 시뮬레이션 시작. 안타깝게도 트레이닝 시설에서 기계형 몬스터를 출현시킬 기술은 아직 없습니다.」"

[[dialogue]]
speaker_original = "フワッチ"
speaker_translation = "후왓치"
original = "「イ～～～ッ」"
translation = "「이이잇.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「しかし、兵器の強さを確認するにはこれで十分のはずです。シュティレさん、攻撃をどうぞ」"
translation = "「하지만 병기의 강함을 확인하기엔 이걸로 충분할 겁니다. 슈틸레 씨, 공격해 보세요.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「はい。それでは刮目ください。星力をドリルに込めます」"
translation = "「네. 그럼 지켜봐 주세요. 성력을 드릴에 담겠습니다.」"

[[dialogue]]
speaker = "unk"
original = "シュティレの持つ星力がドリルナックルに流れ込み、先端がギュィイイン──！！\u3000ともの凄い回転を始めた！"
translation = "슈틸레가 가진 성력이 드릴 너클에 흘러들어 가 선단이 규이이잉──!! 하고 엄청난 회전을 시작했다!"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「砕け散れ！\u3000ギガンドリル・プレッシャー！」"
translation = "「산산조각 나버려라! 기간드릴 프레셔!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「おお、ドリルがフワッチに突き刺さって──えっ！？」"
translation = "「오오, 드릴이 후와치에게 박혀서── 엣!?」"

[[dialogue]]
speaker = "unk"
original = "ギュガガガガガァァ──！！"
translation = "규가가가가가가아──!!"

[[dialogue]]
speaker_original = "フワッチ"
speaker_translation = "후왓치"
original = "「イィイィィイィイィイイイ～～～～っ！？」"
translation = "「이이이이이이이이이이이이이이~~~~!?」"

[[dialogue]]
speaker = "unk"
original = "フワッチーーー！？"
translation = "후와치──!?"

[[dialogue]]
speaker = "unk"
original = "高速回転する鋼鉄のドリルによって、フワッチの体が内側から破壊されていく。"
translation = "고속 회전하는 강철 드릴에 의해 후와치의 몸이 안쪽부터 파괴되어 간다."

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「ふぅ……殲滅完了です。ぶい」"
translation = "「후우…… 섬멸 완료입니다. 브이.」"

[[dialogue]]
speaker = "unk"
original = "シュティレの足元には、モザイクなしでは見せられないような姿のフワッチが……！"
translation = "슈틸레의 발치에는 모자이크 없이는 보여줄 수 없는 모습의 후와치가……!"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「いかがでしたかアナお姉ちゃん、私の発明は。ドリルがロマンであること、しっかりアピールできたかと」"
translation = "「어떠셨나요 아나 언니, 제 발명품은. 드릴이 로망이라는 것, 확실히 어필했다고 봅니다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……木っ端ミジンコよ～、でした」"
translation = "「……가루가 되어버렸네요.」"

[[dialogue]]
speaker = "unk"
original = "フワッチ……おいたわしや……"
translation = "후와치…… 가엾어라……"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「流石はアニマ先輩が評価するだけありますね。星力と機械技術をこれだけ組み合わせた逸品を作り上げてしまうとは」"
translation = "「과연 아니마 선배님이 평가할 만하네요. 성력과 기계 기술을 이만큼 조합한 일품을 만들어내다니.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「まだ流星附属の１年生ですよね？\u3000将来が楽しみです」"
translation = "「아직 유성 부속 1학년이죠? 장래가 기대됩니다.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「褒められました。ぶいぶい。ドリルもぎゅいんぎゅいん」"
translation = "「칭찬받았습니다. 브이브이. 드릴도 규잉규잉.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「あの、危ないのでモンスターがいない場所では回転させないように」"
translation = "「저기, 위험하니까 몬스터가 없는 곳에서는 회전시키지 않도록 하세요.」"

[[dialogue]]
speaker = "unk"
original = "アニマ先輩の言っていた通り、シュティレも素晴らしい才能を持っているようだ。"
translation = "아니마 선배가 말한 대로 슈틸레도 훌륭한 재능을 가지고 있는 것 같다."

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「この呼び出し音は──」"
translation = "「이 호출음은──」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「モンスター発見のアラームですね。市街地に……これは機械型モンスターの反応です！」"
translation = "「몬스터 발견 알람이네요. 시가지에…… 이건 기계형 몬스터의 반응입니다!」"

[[dialogue]]
speaker = "unk"
original = "実戦データが収集できるな"
translation = "실전 데이터를 수집할 수 있겠어"

[[dialogue]]
speaker = "unk"
original = "ちょうどいい！"
translation = "마침 잘 됐네!"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はい。シュティレさん、あなたも連れて行きます。ですが敵は手強い。必ず会長の指示を守ってください」"
translation = "「네. 슈틸레 씨, 당신도 데려가겠습니다. 하지만 적은 강합니다. 반드시 회장님의 지시를 따르세요.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「承りました。マスターの顔に泥を塗らぬよう、全力でお供いたします」"
translation = "「명령 받들겠습니다. 마스터의 얼굴에 먹칠을 하지 않도록 전력으로 따르겠습니다.」"

[[dialogue]]
speaker = "unk"
original = "結論から言うと、機械型モンスターの強靭な外殻を、シュティレのドリルは突破できなかった。"
translation = "결론부터 말하면 기계형 몬스터의 강인한 외피를 슈틸레의 드릴은 돌파하지 못했다."

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「これでトドメよ──フィンブル・ストライク！」"
translation = "「이걸로 마무리에요── 핀불 스트라이크!」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「お疲れ様～。みんな、怪我はない？」"
translation = "「수고했어~. 얘들아, 다친 데는 없니?」"

[[dialogue]]
speaker = "unk"
original = "シュティレの安全を確保するため、ノヴァフォームを操れるサーシャ先輩を呼んでいて正解だった。"
translation = "슈틸레의 안전을 확보하기 위해 노바 폼을 다룰 수 있는 사샤 선배를 불러두길 잘했다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ノープロブレムです。助かりました、サーシャ先輩」"
translation = "「노 프라블럼입니다. 도움받았습니다, 사샤 선배님.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「これがノヴァフォームの戦闘力……素晴らしい火力です。感服いたしました」"
translation = "「이것이 노바 폼의 전투력…… 훌륭한 화력입니다. 감복했습니다.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「うんうん、ところでアナちゃん……聞いてもいいかしら？」"
translation = "「응응, 그런데 아나야…… 물어봐도 될까?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はい、なんなりと」"
translation = "「네, 무엇이든.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「こちらのと～ってもキュートで、お姉ちゃん心をくすぐるちっちゃな星騎士ちゃんはだあれ？」"
translation = "「여기 아주아주 귀여워서 언니 마음을 자극하는 작은 성기사짱은 누구니?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ご紹介します。流星附属１年の不動シュティレさんです」"
translation = "「소개하겠습니다. 유성 부속 1학년인 후도 슈틸레 씨입니다.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「初めまして。購買部で美少女看板娘２号をやっております。趣味はロボットアニメ鑑賞とラーメン屋めぐり。嫌いなものは納豆です」"
translation = "「처음 뵙겠습니다. 매점에서 미소녀 간판녀 2호를 하고 있습니다. 취미는 로봇 애니메이션 감상과 라멘집 순례. 싫어하는 것은 낫토입니다.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あ～ん♪\u3000とっても可愛いわ～<emoji=heart04>\u3000機械型モンスターが相手で怖かったでしょ？\u3000お姉ちゃんがナデナデしてあげる～<emoji=heart04>」"
translation = "「아앙♪ 너무 귀엽구나~<emoji=heart04> 기계형 몬스터가 상대라 무서웠지? 언니가 쓰담쓰담 해줄게~<emoji=heart04>」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「いただけるものは何でも貰う。それが不動家の教えです。どうぞ、シュティレのサラサラショートカットの頭をご査収ください」"
translation = "「주시는 것이라면 무엇이든 받는다. 그것이 후도가의 가르침입니다. 자, 슈틸레의 찰랑찰랑한 쇼트커트 머리를 수령해 주세요.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「まあ♪\u3000これはご丁寧に～<emoji=heart04>\u3000うふふ、ナデナデ、ナデナデ～<emoji=heart04>」"
translation = "「어머♪ 참 정중하기도 해라~<emoji=heart04> 우후후, 쓰담쓰담, 쓰담쓰담~<emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「むむっ……」"
translation = "「으으……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「──はっ！？\u3000お姉ちゃんセンサーが今、嫉妬の波動を背中に感じたわ……！\u3000この気配は……アナちゃんね！！」"
translation = "「──핫!? 언니 센서가 지금, 질투의 파동을 등 뒤에서 느꼈어……! 이 기척은…… 아나구나!!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……そんなものは出していません。サーシャ先輩の気のせいです」"
translation = "「…… 그런 건 내뿜지 않았습니다. 사샤 선배님의 기분 탓이에요.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「うふふ。普段はすげなく断ってるけど、本当は寂しいのね？\u3000大丈夫よ～、サーシャお姉ちゃんは反抗期の妹のお相手も慣れっこだから♪」"
translation = "「우후후. 평소에는 무심하게 거절하지만, 사실은 외로운 거지? 괜찮아~, 사샤 언니는 반항기 여동생 상대하는 것도 익숙하니까♪」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ですから、嫉妬なんてしていません」"
translation = "「그러니까, 질투 같은 거 안 한다고요.」"

[[dialogue]]
speaker = "unk"
original = "そっけなく言っているけれど、アナは新星星徒会最年少ということもあり、甘やかされることも多い。"
translation = "무뚝뚝하게 말하고는 있지만, 아나는 신성학생회 최연소라는 점도 있어 귀여움받는 일도 많다."

[[dialogue]]
speaker = "unk"
original = "サーシャさんがシュティレばかりに構っているのは、ちょっぴり面白くないのかもしれない。"
translation = "사샤 씨가 슈틸레만 챙겨주는 것이 조금은 재미없을지도 모른다."

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「ふう。サーシャ先輩、いえ、サーシャお姉ちゃんのナデナデは素晴らしいです。ドリルが通じなかったショックが和らぎました」"
translation = "「후우. 사샤 선배님, 아니, 사샤 언니의 쓰담쓰담은 훌륭합니다. 드릴이 통하지 않았던 쇼크가 완화되었습니다.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あん、呼び方まで変わっちゃった。とっても素直で可愛い後輩ちゃんね～♪」"
translation = "「안, 호칭까지 바뀌어 버렸네. 정말 솔직하고 귀여운 후배짱이야~♪」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「この流れで、アナお姉ちゃんにも撫でてもらうことにします。シュティレは頑張りました、褒めてください」"
translation = "「이 흐름을 타서, 아나 언니에게도 쓰담쓰담 받기로 하겠습니다. 슈틸레는 열심히 했습니다, 칭찬해 주세요.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「えっ──」"
translation = "「엣──」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あらあら、うふふ♪\u3000新鮮な展開ね～」"
translation = "「어머어머, 우후후♪ 신선한 전개네~」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「私が……？」"
translation = "「내가……?」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「はい。シュティレは後輩で、アナお姉ちゃんは先輩です。甘えたいです」"
translation = "「네. 슈틸레는 후배고, 아나 언니는 선배입니다. 응석 부리고 싶습니다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「…………で、では、少しだけ」"
translation = "「…………그, 그럼, 조금만요.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「アナお姉ちゃんの妹ポジもゲットです。ぶい」"
translation = "「아나 언니의 여동생 포지션도 겟입니다. 브이.」"

[[dialogue]]
speaker = "unk"
original = "照れつつも、シュティレの頭をナデナデするアナなのだった──"
translation = "수줍어하면서도 슈틸레의 머리를 쓰담쓰담 하는 아나였다──"

[[dialogue]]
speaker = "unk"
original = "戦闘が終わった後、シュティレが駅前の広場に行きたいと言い出した。"
translation = "전투가 끝난 후, 슈틸레가 역 앞 광장에 가고 싶다고 말을 꺼냈다."

[[dialogue]]
speaker = "unk"
original = "シュティレの好きなロボットアニメの立像展示が、ちょうど今日から始まるらしい──"
translation = "슈틸레가 좋아하는 로봇 애니메이션의 입상 전시가 마침 오늘부터 시작되는 모양이다──"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「おお、これが……！」"
translation = "「오오, 이것이……!」"

[[dialogue]]
speaker = "unk"
original = "すごい、ギガンドムだ……！"
translation = "대단해, 기간돔이다……!"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「はい。アニメ・超機動武神ギガンドムにて、主人公が搭乗する機体。そちらの実物展示になります。眼福の極み」"
translation = "「네. 애니메이션 『초기동무신 기간돔』에서 주인공이 탑승하는 기체. 그 실물 전시가 됩니다. 안복의 극치.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「すごい迫力ね～……！\u3000お姉ちゃん、ロボットアニメは全然詳しくないんだけど、人気なの？」"
translation = "「대단한 박력이네~……! 언니는 로봇 애니메이션은 전혀 잘 모르지만, 인기 있니?」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「もちろんです。人間界で育ってギガンドムを知らない者はおりません」"
translation = "「물론입니다. 인간계에서 자라며 기간돔을 모르는 자는 없습니다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「私たち留学生組には初見ですが……いえ。コンビニなどでこのロボットが印刷されたお菓子の箱を見たことがありますね」"
translation = "「저희 유학생 팀에게는 처음 보는 것입니다만…… 아니요. 편의점 등에서 이 로봇이 인쇄된 과자 상자를 본 적이 있네요.」"

[[dialogue]]
speaker = "unk"
original = "ギガンドム、懐かしいなぁ……！"
translation = "기간돔, 그립구만……!"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「会長のテンション上昇を確認。私も嬉しいです……こうして悠然と立ち、身じろぎするギガンドムを見られるだなんて」"
translation = "「회장의 텐션 상승을 확인. 저도 기쁩니다…… 이렇게 유연히 서서 몸을 움찔거리는 기간돔을 볼 수 있다니.」"

[[dialogue]]
speaker = "unk"
original = "数十分おきに、ギガンドムは小さく身じろぎをしたり、スモークを吐き出したりして、通行人を楽しませる仕組みになっているらしい。"
translation = "수십 분 간격으로 기간돔은 작게 몸을 움직이거나 연기를 뿜어내며 통행인을 즐겁게 하는 구조로 되어 있는 듯하다."

[[dialogue]]
speaker = "unk"
original = "小さい頃に夢中になったロボットの実物展示を見られるだなんて、感激だ。"
translation = "어릴 적 열광했던 로봇의 실물 전시를 볼 수 있다니 감격스럽다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「うふふ、シュティレちゃんってば、目をキラキラさせちゃって。クールな子かなって思ってたのに、可愛い所もあるのね～」"
translation = "「우후후, 슈틸레짱두 참, 눈을 반짝반짝 빛내고는. 쿨한 아이인 줄 알았는데 귀여운 구석도 있네~」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「表情筋は未発達ですが、スーパーロボットに対する熱い想いは誰にも負けません」"
translation = "「표정근은 미발달이지만, 슈퍼 로봇에 대한 뜨거운 마음은 누구에게도 지지 않습니다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そんなに面白いアニメなのですか、ギガンドム」"
translation = "「그렇게 재미있는 애니메이션인가요, 기간돔?」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「もちろんです。息の長いアニメなので、シリーズは両手で収まりきらないほどあります」"
translation = "「물론입니다. 장수 애니메이션이라 시리즈는 양손으로 다 꼽을 수 없을 만큼 많습니다.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「初見の方にはまず全４８話のファーストギガンドムをオススメしています。起源にして頂点と言えましょう」"
translation = "「처음 보시는 분께는 우선 전 48화의 퍼스트 기간돔을 추천합니다. 기원이자 정점이라 할 수 있습니다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「シュティレさんが好むアニメ、少し興味が湧いてきました。今度、時間を作って見てみますね」"
translation = "「슈틸레 씨가 좋아하는 애니메이션, 조금 흥미가 생겼어요. 다음에 시간을 내서 볼게요.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「なんと……感激です。マスターは誘っても、なかなか頷いてくれないので」"
translation = "「무려…… 감격입니다. 마스터는 권유해도 좀처럼 고개를 끄덕여 주지 않아서.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「人間界の文化は何でも知りたいです。せっかくの留学ですから」"
translation = "「인간계의 문화는 무엇이든 알고 싶습니다. 모처럼의 유학이니까요.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「では、サーシャお姉ちゃんと会長もぜひご一緒に」"
translation = "「그럼 사샤 언니와 회장님도 부디 함께.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「うふふ、もちろんよ～。可愛い妹のおねだりは断れないものね♪」"
translation = "「우후후, 물론이지~. 귀여운 여동생의 부탁은 거절할 수 없는걸♪」"

[[dialogue]]
speaker = "unk"
original = "その後、シュティレの趣味である自撮り（無表情）撮影をギガンドムの前でこなして。"
translation = "그 후, 슈틸레의 취미인 셀카(무표정) 촬영을 기간돔 앞에서 마치고."

[[dialogue]]
speaker = "unk"
original = "ギガンドムのアニメを４人で鑑賞してから、その日は解散となったのだった──"
translation = "기간돔 애니메이션을 넷이서 감상한 뒤 그날은 해산하게 되었다──"

[[dialogue]]
speaker = "unk"
original = "その日の夜──トレーニング施設を訪れた人影がひとつ。"
translation = "그날 밤── 트레이닝 시설을 방문한 인영이 하나."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「モンスター数、最大。敵戦力のステータス数値、最大。ウェーブ数１０……いや、２０に設定」"
translation = "「몬스터 수, 최대. 적 전력의 스테이터스 수치, 최대. 웨이브 수 10…… 아니, 20으로 설정.」"

[[dialogue]]
speaker = "unk"
original = "──新星星徒会副会長のアナは、黙々とパネルを操作する。"
translation = "──신성학생회 부회장인 아나는 묵묵히 패널을 조작한다."

[[dialogue]]
speaker = "unk"
original = "生徒を危険にさらさないよう、トワ先生が設定している安全用リミッターを勝手に解除しての操作。見つかれば叱責は免れない。"
translation = "학생을 위험에 빠뜨리지 않도록 토와 선생님이 설정해 둔 안전용 리미터를 멋대로 해제한 조작. 들키면 질책을 면할 수 없다."

[[dialogue]]
speaker = "unk"
original = "会長であるクロトにも、バレればきっと怒られてしまうだろう。ルールを破った事ではなく、危険なトレーニングを１人で行ったことを心配して。"
translation = "회장인 쿠로토에게도 들키면 분명 혼날 것이다. 규칙을 어긴 것이 아니라, 위험한 트레이닝을 혼자서 한 것을 걱정해서."

[[dialogue]]
speaker = "unk"
original = "けれどアナは操作を止めない。自分が意識を失うか否か、限界ぎりぎりの数値をパネルへ打ち込んでいく。"
translation = "하지만 아나는 조작을 멈추지 않는다. 자신이 의식을 잃을지 어떨지, 한계 직전의 수치를 패널에 입력해 나간다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「今日も戦闘で、役に立てなかった……」"
translation = "「오늘도 전투에서 도움이 되지 못했어……」"

[[dialogue]]
speaker = "unk"
original = "ノヴァフォームに覚醒できないことに対する、焦り。"
translation = "노바 폼으로 각성하지 못하는 것에 대한 초조함."

[[dialogue]]
speaker = "unk"
original = "特に今は、自分に懐いてくれる流星附属の後輩がいる。いつまでも弱いままではいられない。"
translation = "특히 지금은 자신을 잘 따르는 유성 부속 후배가 있다. 언제까지나 약한 채로 있을 수는 없다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「プラネットマルス、セット──」"
translation = "「플래닛 마르스, 셋──」"

[[dialogue]]
speaker = "unk"
original = "アナのノヴァフォーム覚醒のためのハードトレーニングは、日付けが変わってもひたすらに続くのだった──"
translation = "아나의 노바 폼 각성을 위한 하드 트레이닝은 날짜가 바뀌어도 한결같이 계속되었다──"

