[[dialogue]]
speaker = "unk"
original = "第１０話,茶屋でひと休み,B"
translation = "제10화, 찻집에서 한숨 돌리기, B"

[[dialogue]]
speaker = "unk"
original = "それから俺たちは街を移動し……"
translation = "그 후 우리는 거리를 이동하고……"

[[dialogue]]
speaker = "unk"
original = "やはりヴィーナスが『ビビッときた』茶屋を見つけて、そこになだれ込むこととなった。"
translation = "역시 비너스가 『필이 꽂힌』 찻집을 찾아, 그곳으로 들이닥치게 되었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ここは……古民家を改装したカフェみたいだな」"
translation = "「여기는…… 고택을 개조한 카페 같네」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「落ち着くわ～。いい汗もかいたし、ちょうどいいわね」"
translation = "「편안해~. 땀도 적당히 흘렸고, 딱 좋네」"

[[dialogue]]
speaker = "unk"
original = "俺たちは軒先のテラスに着席し、人通りを眺めながら甘味を楽しむ。"
translation = "우리는 처마 밑 테라스에 착석하여, 오가는 사람들을 바라보며 단맛을 즐긴다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「この抹茶あんみつ中々やるわね──蜜漬けの虎豆を使ってるみたい」"
translation = "「이 말차 안미츠 꽤 괜찮네── 꿀에 절인 호랑이 강낭콩을 쓰는 것 같아」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「豆か。あまり気にしたことはなかったけど……ヴィーナスはこだわるのか？」"
translation = "「콩인가. 별로 신경 쓴 적은 없었는데…… 비너스는 까다로운 편이야?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「家じゃ和菓子しか出てこないから。嫌でも詳しくなるって感じね」"
translation = "「집에서는 화과자밖에 안 나오니까. 싫어도 자세히 알게 된다는 느낌이지」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そうか。九浄家のメイドさんも──言われてみたら和スイーツみたいな格好してるよな」"
translation = "「그렇군. 쿠죠 가문의 메이드도── 듣고 보니 화과자 같은 복장을 하고 있네」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「何よ、その例え」"
translation = "「뭐야, 그 비유는」"

[[dialogue]]
speaker = "unk"
original = "他愛ない話に花を咲かせて……"
translation = "사소한 이야기에 꽃을 피우고……"

[[dialogue]]
speaker = "unk"
original = "ひとしきり今日の振り返りを終えたところで、あの件について触れてみた。"
translation = "오늘의 되돌아보기를 한바탕 끝낸 후, 그 문제에 대해 언급해 보았다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「へ？\u3000ため息？」"
translation = "「헤? 한숨?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。ヴィーナスが、最近浮かない顔してるからって……みんな心配してたよ」"
translation = "「아아. 비너스가, 요즘 시무룩한 표정을 짓고 있으니까…… 모두 걱정했어」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あー……うん。見通しがつかなくて参ってただけなんだけど」"
translation = "「아ー…… 응. 전망이 안 보여서 힘들었을 뿐인데」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「わかってる。でもみんな、普段のヴィーナスに支えられてるから──心配してたぞ」"
translation = "「알고 있어. 하지만 모두, 평소의 비너스에게 의지하고 있으니까── 걱정했어」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あはは……ごめんごめん。もう、みんな私がいないとダメねぇ」"
translation = "「아하하…… 미안 미안. 정말, 모두 내가 없으면 안 된다니까」"

[[dialogue]]
speaker = "unk"
original = "今日はいつもより落ち着いていたし、楽しんでくれたみたいでよかった。"
translation = "오늘은 평소보다 차분했고, 즐거워해 준 것 같아 다행이었다."

[[dialogue]]
speaker = "unk"
original = "もしかしたら昨日あたりに──誰かと何かあったのかもな。"
translation = "어쩌면 어제쯤── 누군가와 무슨 일이 있었을지도 모른다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……待っててね」"
translation = "「……기다려 줘」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……何をだ？」"
translation = "「……뭘?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「アポロのこと。クロトだって、ここ最近ずっと考えてるでしょ」"
translation = "「아폴로 일. 쿠로토도, 요 근래 계속 생각하고 있잖아」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……そうだな。まだ糸口は見えないが」"
translation = "「……그렇지. 아직 실마리는 안 보이지만」"

[[dialogue]]
speaker = "unk"
original = "アポロは悪で、それを倒す──そう単純に図式化できているうちはまだよかった。"
translation = "아폴로는 악이고, 그를 쓰러뜨린다── 그렇게 단순하게 도식화할 수 있을 때는 그나마 괜찮았다."

[[dialogue]]
speaker = "unk"
original = "でも現実は、フィオナの素性までも絡んだ複雑な関係になってしまっている。ただの勧善懲悪で済む話ではない。"
translation = "하지만 현실은, 피오나의 정체까지 얽힌 복잡한 관계가 되어 버렸다. 단순한 권선징악으로 끝날 이야기가 아니다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──俺、ひとつ考えたんだ。現状を打開するための策を」"
translation = "「──나, 하나 생각했어. 현 상황을 타개하기 위한 책략을」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「！\u3000それって？」"
translation = "「! 그게 뭔데?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。フィーニスの塔に登ってみる──ってのはどうだ」"
translation = "「아아. 피니스의 탑에 올라보는 건── 어때」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……学園を離れることになるわよ。それでも？」"
translation = "「……학원을 떠나게 될 거야. 그래도?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「確かにリスクもある。けど、月の壁画にしろ、リクリエの真実にしろ……今まで俺たちを導いてきた真実はいつもあそこにあった」"
translation = "「확실히 위험도 있지. 하지만, 달의 벽화든, 리크리에의 진실이든…… 지금까지 우리를 이끌어 온 진실은 항상 그곳에 있었어」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そう言われてみれば、そうね……」"
translation = "「그렇게 말하니, 그렇네……」"

[[dialogue]]
speaker = "unk"
original = "無論、あの塔に入るからには相応の覚悟が要る。"
translation = "물론, 그 탑에 들어가려면 그에 상응하는 각오가 필요하다."

[[dialogue]]
speaker = "unk"
original = "道中の険しさも半端ではないし、奥には必ず強敵が待ち受けているだろう。"
translation = "도중의 험난함도 만만치 않을 것이고, 안쪽에는 반드시 강적이 기다리고 있을 것이다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「フィオナにも声をかけて、また俺たち３人で行ってもいい。何もしないよりは、あえて虎穴に入ってみるのも大事だろう」"
translation = "「피오나에게도 말을 걸어서, 다시 우리 셋이서 가도 돼. 아무것도 하지 않는 것보다는, 일부러 호랑이 굴에 들어가 보는 것도 중요할 거야」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……なるほどね。よくわかったわ──けど」"
translation = "「……과연. 잘 알겠어── 하지만」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「今まで、塔に登る時は……必ず日誌をあてにしてきたわよね。天高き塔がなんとか──って」"
translation = "「지금까지, 탑에 오를 때는…… 반드시 일지를 의지해 왔잖아. 하늘 높은 탑이 어떻게든── 하고」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「でも今は、まだ塔のことなんてひとつも書かれていないわ。まだ動いちゃダメなのかもしれない」"
translation = "「하지만 지금은, 아직 탑에 대한 건 하나도 쓰여 있지 않아. 아직 움직이면 안 될지도 몰라」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「何も記述を待たなくてもいい。日誌の先手を打つことに不都合はないだろ？」"
translation = "「아무런 기술을 기다릴 필요 없어. 일지의 선수를 치는 것에 문제 될 건 없잖아?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「わかんない。けどやっぱり──日誌に背くのは座りが悪いのよ。大事なことならなおさらね」"
translation = "「모르겠어. 하지만 역시── 일지를 거스르는 건 마음이 불편해. 중요한 일이라면 더욱 그렇지」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「お願いクロト。もう少し待って。それもこれも──日誌が書かれるまでの辛抱だから」"
translation = "「부탁이야 쿠로토. 조금만 더 기다려 줘. 이것도 저것도── 일지가 쓰여질 때까지의 인내니까」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは譲らなかった。"
translation = "비너스는 양보하지 않았다."

[[dialogue]]
speaker = "unk"
original = "今日も明日も平穏な日々と、日誌に記されている以上、それを裏切るような行動はしたくないのだという。"
translation = "오늘도 내일도 평온한 나날이, 일지에 기록되어 있는 이상, 그것을 배반하는 행동은 하고 싶지 않다는 것이다."

[[dialogue]]
speaker = "unk"
original = "先ほどまでの、直感とフィーリングで動いていた彼女とは──えらい違いだ。"
translation = "방금 전까지, 직감과 필링으로 움직이던 그녀와는── 엄청난 차이다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「わかった。日誌なんだけど──少し見せてみてくれ」"
translation = "「알았어. 일지 말인데── 잠깐 보여줘 봐」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「？\u3000いいけど……」"
translation = "「? 괜찮지만……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（……）"
translation = "（……）"

[[dialogue]]
speaker = "unk"
original = "今日の日付を見る。"
translation = "오늘 날짜를 본다."

[[dialogue]]
speaker = "unk"
original = "なんの事件もない平穏な一日──確かに今のところその通りだ。"
translation = "아무런 사건도 없는 평온한 하루── 확실히 지금으로서는 그 말대로다."

[[dialogue]]
speaker = "unk"
original = "そこには当然、風船のこともあんみつのことも書かれちゃいなかった。"
translation = "거기에는 당연히, 풍선에 대한 것도 안미츠에 대한 것도 쓰여 있지 않았다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ヴィーナス。これ、借りてもいいか？」"
translation = "「비너스. 이거, 빌려도 될까?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「へ？\u3000日誌のこと？」"
translation = "「헤? 일지 말이야?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。ちょっと気になることがあって──明日には返すよ」"
translation = "「아아. 좀 신경 쓰이는 게 있어서── 내일 돌려줄게」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ん～～～…………ホントは、命と同じくらい大切なものなんだけど……」"
translation = "「음～～～………… 사실은, 목숨만큼 소중한 건데……」"

[[dialogue]]
speaker = "unk"
original = "うんうんと悩むヴィーナス。しかし。"
translation = "음음 고민하는 비너스. 그러나."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「うん、クロトならいいわ！\u3000──特別よ。ただし、明日までには返すこと」"
translation = "「응, 쿠로토라면 괜찮아! ──특별이야. 단, 내일까지는 돌려줘야 해」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ありがとう。もし、重要な追記がされたらすぐに連絡するよ」"
translation = "「고마워. 만약, 중요한 추가 기록이 되면 바로 연락할게」"

[[dialogue]]
speaker = "unk"
original = "俺はヴィーナスから借りた『未来の日誌』を大事にしまった。"
translation = "나는 비너스에게 빌린 『미래의 일지』를 소중히 넣었다."

[[dialogue]]
speaker = "unk"
original = "それから席を立つ。"
translation = "그리고 자리에서 일어선다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ちょっとお手洗いに行ってくる。俺の分のわらび餅、食べてていいよ」"
translation = "「잠깐 화장실에 다녀올게. 내 몫의 칡 전분떡, 먹고 있어도 돼」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ほへ？」"
translation = "「호헤?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「もう口に入れてんのかい」"
translation = "「벌써 입에 넣고 있는 거냐」"

[[dialogue]]
speaker = "unk"
original = "俺はテーブルを後にして洗面所へと向かう。"
translation = "나는 테이블을 뒤로하고 세면장으로 향한다."

[[dialogue]]
speaker = "unk"
original = "こうしてお手洗いに行っておいて──その隙に会計も済ませておくというデキる男のテクを使わせてもらおうか。"
translation = "이렇게 화장실에 간다고 해 놓고── 그 틈에 계산도 끝내 놓는다는 유능한 남자의 기술을 사용해 볼까."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（ヴィーナスはきっと、男として俺を見直すことだろう……ふふ）"
translation = "（비너스는 분명, 남자로서 나를 다시 보게 될 것이다…… 후후）"

