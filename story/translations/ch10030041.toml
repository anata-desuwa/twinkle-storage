[[dialogue]]
speaker = "unk"
original = "第１話,プロポーズはまたの日に,P"
translation = "제1화, 프로포즈는 훗날로, P"

[[dialogue]]
speaker = "unk"
original = "リクリエとの戦いがひと段落して、しばらく経ったある日。"
translation = "리크리에와의 싸움이 일단락되고, 얼마간의 시간이 흐른 어느 날."

[[dialogue]]
speaker = "unk"
original = "そろそろ、ずっと棚上げしていた問題と向き合うべきだろうと考え、放課後にヴィーナスをうちまで連れてきた。"
translation = "슬슬, 계속 미뤄두었던 문제와 마주해야겠다고 생각하여, 방과 후에 비너스를 우리 집까지 데려왔다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「恋人になった後、娘であることが判明したが、どうするか──？」"
translation = "「연인이 된 후, 딸이라는 것이 판명되었는데, 어떻게 할 것인가──?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「娘兼、恋人兼、嫁ってことよね、パパ！」"
translation = "「딸 겸, 연인 겸, 아내라는 거지, 아빠!」"

[[dialogue]]
speaker = "unk"
original = "父親の嫁になることに葛藤とかないの！？"
translation = "아버지의 아내가 되는 것에 갈등 같은 거 없어!?"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「う～ん、そう言われてもねぇ？」"
translation = "「으음, 그렇게 말해도 말이야?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ママにはちょっと悪いなぁって思うけど、私、ママの記憶ないし！」"
translation = "「엄마에게는 조금 미안하다는 생각은 들지만, 나, 엄마에 대한 기억이 없는걸!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そもそも、なんで娘だとパパのお嫁さんになっちゃいけないのかしら？」"
translation = "「애초에, 왜 딸이면 아빠의 아내가 되면 안 되는 걸까?」"

[[dialogue]]
speaker = "unk"
original = "え？"
translation = "에?"

[[dialogue]]
speaker = "unk"
original = "改めて問われると、難しい質問だ。"
translation = "새삼 질문을 받으니, 어려운 질문이다."

[[dialogue]]
speaker = "unk"
original = "俺はヴィーナスのことが女の子として好きだし、当のヴィーナスも好きだと言ってくれているのなら、なんら問題はないように思える。"
translation = "나는 비너스를 여자로서 좋아하고, 당사자인 비너스도 좋아한다고 말해주고 있다면, 아무런 문제가 없는 것처럼 느껴진다."

[[dialogue]]
speaker = "unk"
original = "とはいえ、なあなあで済ませていい問題でないことも事実だ。"
translation = "그렇다고는 해도, 유야무야 넘겨도 될 문제가 아니라는 것도 사실이다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「生理的に嫌じゃないのかって？\u3000何言ってるのよ！\u3000私がクロトのこと、嫌いになるわけないじゃない！！」"
translation = "「생리적으로 싫지 않냐고? 무슨 소리를 하는 거야! 내가 쿠로토를, 싫어하게 될 리 없잖아!!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「むしろ、私の身体の半分はクロトで出来てるんだって考えたら……えへへ♪\u3000改めて運命感じちゃったくらいよ」"
translation = "「오히려, 내 몸의 절반은 쿠로토로 이루어져 있다고 생각하니까…… 에헤헤♪ 새삼 운명을 느껴버렸을 정도라고」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「世間的には、思春期に入ると娘は父親を生理的に気持ち悪く思うもの……？\u3000ふーん、なんか不思議ね！」"
translation = "「세상에서는, 사춘기에 접어들면 딸은 아버지를 생리적으로 기분 나쁘게 여기는 법……? 흐음, 왠지 신기하네!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「でもそれって、私が気にしなかったら問題ないってことよね？」"
translation = "「하지만 그건, 내가 신경 쓰지 않는다면 문제없다는 뜻이지?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あ、もしかして、クロトがダメなのかしら……？\u3000私のことが娘だとわかったら、前みたいにイチャイチャするのは気持ち悪い？」"
translation = "「아, 혹시, 쿠로토가 안 되는 걸까……? 내가 딸이라는 걸 알게 되니까, 예전처럼 꽁냥거리는 건 기분 나빠?」"

[[dialogue]]
speaker = "unk"
original = "背徳感とか、気恥ずかしさを感じるだけ"
translation = "배덕감이라든가, 쑥스러움을 느낄 뿐"

[[dialogue]]
speaker = "unk"
original = "そんなことはない！"
translation = "그럴 리가 없잖아!"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふふっ、良かった♪」"
translation = "「후훗, 다행이다♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それじゃあ、他の問題は何があるのかしら？」"
translation = "「그럼, 다른 문제는 뭐가 있을까?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふむふむ、遺伝的には血が濃くなりすぎるのが良くない……」"
translation = "「흠흠, 유전적으로는 피가 너무 진해지는 게 좋지 않다……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「難しい話は私にはよく分からないけれど、魔王の血が濃くなることはいいことなんじゃないかしら！」"
translation = "「어려운 이야기는 나는 잘 모르겠지만, 마왕의 피가 진해지는 건 좋은 일 아닐까!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「私は魔王の力を受け継がなかったみたいだけど、魔王の娘である私と、魔王であるクロトの子供なら、きっと無敵の魔王が生まれるに違いないわ！」"
translation = "「나는 마왕의 힘을 이어받지 못한 모양이지만, 마왕의 딸인 나와, 마왕인 쿠로토의 아이라면, 분명 무적의 마왕이 태어날 게 틀림없어!」"

[[dialogue]]
speaker = "unk"
original = "まあ確かに、普通のヒトなら遺伝的な問題も無視はできないんだろうけど、普通のヒトの体でもない俺が今更そんなことを気にしてもしょうがないか……"
translation = "뭐 확실히, 평범한 인간이라면 유전적인 문제도 무시할 수 없겠지만, 평범한 인간의 몸도 아닌 내가 이제 와서 그런 걸 신경 써봤자 소용없으려나……"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そうそう♪」"
translation = "「그래그래♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そんなことよりも、次代の無敵魔王は男の子がいいか、女の子がいいか、そういうことを考えた方がケンセツテキってものよ！」"
translation = "「그런 것보다, 차세대 무적 마왕은 남자아이가 좋을지, 여자아이가 좋을지, 그런 걸 생각하는 게 건설적이라구!」"

[[dialogue]]
speaker = "unk"
original = "それは建設的なのか！？"
translation = "그게 건설적인 거야!?"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そういうわけだから、未来の明るい家族計画のために、これからも毎日イチャイチャするわよ、パーパ<emoji=heart04>」"
translation = "「상황이 이러니까, 미래의 밝은 가족 계획을 위해서, 앞으로도 매일매일 꽁냥거릴 거야, 아~빠<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そんなことを言いながら腕に抱き着いてくるヴィーナスの頭を撫でると、彼女は機嫌よさげに目を細めながら、もっともっとと頭を擦りつけてくるのだった。"
translation = "그런 말을 하며 팔에 매달려오는 비너스의 머리를 쓰다듬자, 그녀는 기분 좋은 듯 눈을 가늘게 뜨며, 더 해달라는 듯 머리를 비벼대는 것이었다."

[[dialogue]]
speaker = "unk"
original = "それからしばらく、家でヴィーナスとイチャイチャしていたのだが──"
translation = "그 후로 한참 동안, 집에서 비너스와 꽁냥거리고 있었는데──"

[[dialogue]]
speaker = "unk"
original = "あ、そうそう。１つだけ"
translation = "아, 맞다. 한 가지만"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ん？\u3000どうかしたの、クロト？」"
translation = "「응? 왜 그래, 쿠로토?」"

[[dialogue]]
speaker = "unk"
original = "嫁を名乗るのはもうちょっと待てる？"
translation = "아내라고 자칭하는 건 조금만 더 기다려 줄래?"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスが恋人なのは間違いないけど"
translation = "비너스가 연인인 건 틀림없지만"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「私、将来的に振られる可能性があるってことぉ！？」"
translation = "「나, 장래에 차일 가능성이 있다는 거야아!?」"

[[dialogue]]
speaker = "unk"
original = "違うから！！"
translation = "아니라니까!!"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「婚約は重要なイベントだから、考えてはいるけれどもうちょっとだけ待って欲しい……？\u3000ふ～む、そういうものなの？」"
translation = "「약혼은 중요한 이벤트니까, 생각은 하고 있지만 조금만 더 기다려 줬으면 좋겠어……? 으음, 그런 거야?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「まあ確かに、ヘレナちゃんに挨拶も説明も、まだ何もしてないものね」"
translation = "「뭐 확실히, 헬레나짱에게 인사도 설명도, 아직 아무것도 안 했으니까 말이야」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「他にも、幸せになるためには周りの人たちへの説明や理解が必要……？」"
translation = "「그 밖에도, 행복해지기 위해서는 주변 사람들에 대한 설명이나 이해가 필요하다……?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふ～ん。お嫁さんになるって、難しいことなのね……」"
translation = "「흐음. 아내가 된다는 건, 어려운 일이구나……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ただクロトのことが好きで、クロトが私のことを好きなら、それだけで結婚できるものだと思っていたわ」"
translation = "「그저 쿠로토가 좋고, 쿠로토가 나를 좋아한다면, 그것만으로 결혼할 수 있는 거라고 생각했어」"

[[dialogue]]
speaker = "unk"
original = "もちろん、それが一番大事だよ"
translation = "물론, 그게 가장 중요해"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「うふふっ。私の大好きだけは揺るがないから、こっちの準備はいつでも万端よ！」"
translation = "「우후후. 나의 '정말 좋아'만큼은 흔들리지 않으니까, 이쪽 준비는 언제든지 만반이야!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロトの準備が整ったら、いつでもプロポーズしてきなさい！」"
translation = "「쿠로토의 준비가 끝나면, 언제든지 프로포즈하러 오렴!」"

[[dialogue]]
speaker = "unk"
original = "ああ、頑張るから"
translation = "아아, 노력할게"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それなら、今しばらくは娘兼恋人で我慢しておいてあげるわ」"
translation = "「그렇다면, 지금은 당분간 딸 겸 연인으로 참아줄게」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……そう考えると、お嫁さんになる前の『恋人』の期間って、すっごく貴重な気がしてきたわ！」"
translation = "「……그렇게 생각하니, 아내가 되기 전의 『연인』 기간이라는 거, 엄청 귀중한 느낌이 들어!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「えへへ♪\u3000クロト、大好きよっ<emoji=heart04>」"
translation = "「에헤헤♪ 쿠로토, 정말 좋아해<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「んっ……ちゅっ<emoji=heart04>」"
translation = "「응…… 쪽<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「貴重な恋人期間、これからも目一杯、楽しんじゃいましょう！」"
translation = "「귀중한 연인 기간, 앞으로도 마음껏, 즐겨버리자!」"

[[dialogue]]
speaker = "unk"
original = "満面の笑みで可愛いことを言う恋人に、今度は俺の方からキスをするのだった。"
translation = "만면에 미소를 띠며 귀여운 말을 하는 연인에게, 이번에는 내가 먼저 키스를 하는 것이었다."

