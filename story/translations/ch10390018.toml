[[dialogue]]
speaker = "unk"
original = "俺とイニシュは関東近郊の森に現れたモンスターを討伐しに来たものの、イニシュが珍しく敵の攻撃を受けてしまった。"
translation = "나와 이니슈는 관동 근교의 숲에 나타난 몬스터를 토벌하러 왔으나, 이니슈가 드물게 적의 공격을 받고 말았다."

[[dialogue]]
speaker = "unk"
original = "とはいえ大きな怪我はなく、無事にモンスターを倒すことはできた。"
translation = "그렇다고는 해도 큰 부상은 없었고, 무사히 몬스터를 쓰러뜨릴 수는 있었다."

[[dialogue]]
speaker = "unk"
original = "だけどイニシュの戦闘服がボロボロになってしまって……"
translation = "하지만 이니슈의 전투복이 너덜너덜해져서……"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「魔王、股間が」"
translation = "「마왕, 가랑이가」"

[[dialogue]]
speaker = "unk"
original = "胸や股間まで露わになってしまったイニシュを見て、下半身が勃起してしまっていた。"
translation = "가슴이나 가랑이까지 드러나 버린 이니슈를 보고 하반신이 발기해버리고 말았다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ごめん、つい……収まるまで放っておいてくれると助かる……」"
translation = "「미안, 나도 모르게…… 가라앉을 때까지 내버려 두면 고맙겠어……」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「なら──セックスしますか？」"
translation = "「그럼── 섹스할까요?」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「これでいいのですか、魔王？」"
translation = "「이걸로 된 건가요, 마왕?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ、ありがとう」"
translation = "「아아, 고마워」"

[[dialogue]]
speaker = "unk"
original = "誰も来ない森の中とはいえ、野外で性器を露出することに解放感と緊張感が入り混じる。"
translation = "아무도 오지 않는 숲속이라고는 해도, 야외에서 성기를 노출하는 것에 해방감과 긴장감이 뒤섞인다."

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「魔王のペニスが勃起状態になっています。どうぞ。性器を挿入してください」"
translation = "「마왕의 페니스가 발기 상태가 되어 있습니다. 자. 성기를 삽입해 주세요」"

[[dialogue]]
speaker = "unk"
original = "明確に恋人だと確認し合ってはいないものの、俺とイニシュは体を重ねる関係になっていた。"
translation = "명확하게 연인이라고 확인하진 않았지만, 나와 이니슈는 몸을 겹치는 관계가 되어 있었다."

[[dialogue]]
speaker = "unk"
original = "だけどイニシュは人形のように無感情な反応で、まるでイニシュを道具として使っているようで背徳感を覚えてしまう。"
translation = "하지만 이니슈는 인형처럼 무감정한 반응이라, 마치 이니슈를 도구로서 사용하는 것 같아 배덕감을 느끼고 만다."

[[dialogue]]
speaker = "unk"
original = "そして無抵抗なイニシュの腕を掴み、逃がさないようしっかりと捕まえて──"
translation = "그리고 무저항인 이니슈의 팔을 붙잡아, 놓치지 않도록 꽉 붙들고──"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「ふあぁああっ……」"
translation = "「후아아앗……」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「魔王のペニスが……私の膣内に、侵入しています……」"
translation = "「마왕의 페니스가…… 제 질 내에 침입하고 있습니다……」"

[[dialogue]]
speaker = "unk"
original = "亀頭を中に沈ませると、イニシュの体温を感じる。"
translation = "귀두를 안으로 가라앉히자 이니슈의 체온이 느껴진다."

[[dialogue]]
speaker = "unk"
original = "普段はマシーンのようなイニシュだが、その温もりは血の通った人のもので、粘膜の熱さでますます股間に血流が集中していく。"
translation = "평소에는 머신 같은 이니슈지만, 그 온기는 피가 흐르는 사람의 것이라 점막의 뜨거움에 점점 더 가랑이로 혈류가 집중되어 간다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「イニシュに頼みがあるんだが──」"
translation = "「이니슈에게 부탁이 있는데──」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「……？\u3000わかりました……あっ、はぁ……どのような意味があるのか、わかりませんが、あなたが望むなら」"
translation = "「……? 알겠습니다…… 앗, 하아…… 어떤 의미가 있는지 모르겠지만, 당신이 원하신다면」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「んんっ……魔王の、おち○ちんがっ……私の、<b>中</b>に……」"
translation = "「응읏…… 마왕의 자지가…… 제 안에……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「中、じゃなくて」"
translation = "「안이 아니라」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「はい……私のおま○こに……魔王のおち○ちんが、入っていますっ……んんっ」"
translation = "「네…… 제 보지에…… 마왕의 자지가 들어와 있습니다…… 응읏」"

[[dialogue]]
speaker = "unk"
original = "イニシュらしくない卑猥な言葉遣いに下半身がぞくりと震える。想像以上の威力だ。"
translation = "이니슈답지 않은 음란한 말투에 하반신이 오싹하고 떨린다. 상상 이상의 위력이다."

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「ふっ……はぁ……魔王のおち○ちんが、私のおま○この中で、動いています……あっ、はぁっ……」"
translation = "「훗…… 하아…… 마왕의 자지가 제 보지 안에서 움직이고 있습니다…… 앗, 하앗……」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「おち○ちんがおま○こと摩擦して……んっ……あ……はぁ」"
translation = "「자지가 보지와 마찰해서…… 응…… 아…… 하아」"

[[dialogue]]
speaker = "unk"
original = "淡く濡れた性器を慣らすように、怒張したペニスをゆっくり前後に動かす。"
translation = "살짝 젖은 성기를 길들이듯, 노장한 페니스를 천천히 전후로 움직인다."

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「ふぁ……はぁ……ぁん……はぁ、はぁ……」"
translation = "「후아…… 하아…… 앙…… 하아, 하아……」"

[[dialogue]]
speaker = "unk"
original = "下半身を突き出す度、イニシュの胸が重そうにたぷたぷと揺れる。"
translation = "하반신을 들이밀 때마다 이니슈의 가슴이 무겁게 출렁출렁 흔들린다."

[[dialogue]]
speaker = "unk"
original = "ボディラインが見えてしまう戦闘服は、肉付きがいい太ももやお尻、大きな胸を意識させられてしまって、破れていなくとも扇情的なくらいだ。"
translation = "바디라인이 다 보이는 전투복은 살집이 좋은 허벅지나 엉덩이, 큰 가슴을 의식하게 만들어버려서 찢어지지 않았더라도 선정적일 정도다."

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「ふぅ……ぁん……私のおま○こは気持ちいいですか、魔王？」"
translation = "「후우…… 앙…… 제 보지는 기분 좋습니까, 마왕?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ、すごくいいよ」"
translation = "「아아, 정말 좋아」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「ならいいのですが……はっ、んっ……ふぁっ……ドクドクと、おち○ちんが脈打っています……」"
translation = "「그렇다면 다행입니다만…… 하, 응…… 후앗…… 두근두근하고 자지가 맥동하고 있습니다……」"

[[dialogue]]
speaker = "unk"
original = "膣内の熱さ、ぬるりとした愛液、膣壁の柔らかさ、肉ひだがペニスをなぞる感触……下半身を使って女の肉体を堪能する。"
translation = "질 내의 뜨거움, 미끈거리는 애액, 질벽의 부드러움, 살주름이 페니스를 훑는 감촉…… 하반신을 사용해 여자의 육체를 만끽한다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「イニシュは気持ちいい？」"
translation = "「이니슈는 기분 좋아?」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「わかりま……せん……ふ……あぁ……」"
translation = "「모르겠…… 어요…… 후…… 아아……」"

[[dialogue]]
speaker = "unk"
original = "そう言いつつもくぐもった吐息が漏れ、膣内から愛液がにじんでくる。"
translation = "그렇게 말하면서도 억눌린 숨결이 새어 나오고, 질 내에서 애액이 번져 나온다."

[[dialogue]]
speaker = "unk"
original = "いつもは機械的なイニシュが少しずつ快楽に染まっているのが伝わってきて、男として愉悦を覚えざるをえない。"
translation = "평소에는 기계적인 이니슈가 조금씩 쾌락에 물들어가는 것이 전해져 와서, 남자로서 유열을 느끼지 않을 수 없다."

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「ふっ……あっ……は……んん……」"
translation = "「훗…… 앗…… 하…… 응……」"

[[dialogue]]
speaker = "unk"
original = "イニシュにもっと感じてほしいと期待を込めながら、力強くペニスを突き出した。"
translation = "이니슈가 좀 더 느끼길 바라는 기대를 담아 힘차게 페니스를 찔러 넣었다."

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「んん～～っ<emoji=heart04>\u3000魔王の、おち○ちんがっ……私の、中で……はぁ、あんっ……<emoji=heart04>」"
translation = "「응으~~읏<emoji=heart04> 마왕의 자지가…… 제 안에서…… 하아, 아앙……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「はぁ……あぁっ……<emoji=heart04>\u3000おま○こと、おち○ちん、擦れて……刺激が……んっ……ふぁぁっ<emoji=heart04>」"
translation = "「하아…… 아앗……<emoji=heart04> 보지랑 자지, 쓸려서…… 자극이…… 응…… 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "淡泊だったイニシュの声にもはっきりと快感が混じってくる。"
translation = "담백했던 이니슈의 목소리에도 확실히 쾌감이 섞여 들어온다."

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「ふあぁっ、はっ、あんっ……んん～っ<emoji=heart04>\u3000おち○ちんが、何度も、おま○この中で動いて、ます……ふぁああっ<emoji=heart04>」"
translation = "「후아앗, 하, 아앙…… 응으~읏<emoji=heart04> 자지가 몇 번이고 보지 안에서 움직이고 있어요…… 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺のおち○ちん大きい？」"
translation = "「내 자지 커?」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「はい、魔王のおち○ちん、大きいです……<emoji=heart04>」"
translation = "「네, 마왕의 자지, 커요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「他には？」"
translation = "「또 다른 건?」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「あっ、はんっ……おち○ちん熱くて、硬くて、私のおま○こ、広げられてます……っ<emoji=heart04>」"
translation = "「앗, 하앙…… 자지 뜨겁고 딱딱해서 제 보지 벌려지고 있어요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "素直に答えてくれるイニシュがかわいくてエッチだ。"
translation = "솔직하게 대답해주는 이니슈가 귀엽고 야하다."

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「んんっ……！？\u3000おち○ちん、ビクっと震えました……今ので興奮しているのですか？」"
translation = "「응읏……!? 자지, 움찔하고 떨렸어요…… 방금 걸로 흥분하고 있는 건가요?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ、イニシュが言ってくれるとエッチだから」"
translation = "「아아, 이니슈가 말해주니까 야해서」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「そ、そうなのですか……はぁ、はぁ……んっ<emoji=heart04>\u3000あっ、おち○ちん、私の中でまた大きくなってます……ん……ああぁっ<emoji=heart04>」"
translation = "「그, 그런 건가요…… 하아, 하아…… 응<emoji=heart04> 앗, 자지 제 안에서 또 커지고 있어요…… 응…… 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "エッチなことを言わされていると知って、わずかに羞恥を見せるイニシュ。"
translation = "야한 말을 억지로 하고 있다는 것을 알고 살짝 수줍음을 보이는 이니슈."

[[dialogue]]
speaker = "unk"
original = "イニシュが恥ずかしがるところなんてめったに見ないから、つい興奮してしまう。"
translation = "이니슈가 부끄러워하는 모습은 좀처럼 보기 힘드니까 나도 모르게 흥분해버린다."

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「学習、しました……魔王は、私がおち○ちんやおま○こと言うのが、好きなのですね」"
translation = "「학습했습니다…… 마왕은 제가 자지나 보지라고 말하는 걸 좋아하는군요」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「んんっ……<emoji=heart04>\u3000おち○ちんが出たり入ったりして……おま○こ、熱いです……ふぁっ、あっ……んあぁっ<emoji=heart04>」"
translation = "「응읏……<emoji=heart04> 자지가 들락날락거려서…… 보지, 뜨거워요…… 후앗, 앗…… 응아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「あっ……はっ……はぁ、はんっ<emoji=heart04>\u3000おち○ちん、大きくて、声が……はぁ、あっ、あぁんっ<emoji=heart04>」"
translation = "「앗…… 하…… 하아, 하앙<emoji=heart04> 자지, 커서, 목소리가…… 하아, 앗, 아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "蜜の量が増し、溢れた愛液が地面に染みを作る。"
translation = "꿀의 양이 늘어나 넘쳐흐른 애액이 지면에 얼룩을 만든다."

[[dialogue]]
speaker = "unk"
original = "艶めかしい声も、淫猥な水音も、森の静謐に溶けていく。"
translation = "요염한 목소리도, 음란한 물소리도 숲의 정적 속으로 녹아든다."

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「はあぁ……はぁ、はぁ、あぁっ<emoji=heart04>\u3000あ──そこに、おち○ちん、当たると……ふ──あ──ひああ～～っ<emoji=heart04>」"
translation = "「하아아…… 하아, 하아, 아앗<emoji=heart04> 아── 거기에 자지 닿으면…… 후── 아── 히아아~~앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "腕を掴まれたイニシュに自由はなく、俺にされるがまま。"
translation = "팔을 붙잡힌 이니슈에게 자유는 없으며, 내가 하는 대로 내버려 둘 뿐."

[[dialogue]]
speaker = "unk"
original = "戦闘服を破いたのは俺ではないが、イニシュを倒して無理やり犯しているみたいだ。"
translation = "전투복을 찢은 건 내가 아니지만, 이니슈를 쓰러뜨리고 억지로 범하고 있는 것 같다."

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「ふっ、あっ、あっ……はぁ……ひあぁっ<emoji=heart04>\u3000おま○こ熱い、です……はぁはっ、はぁ……あっ、んっ、んんっ<emoji=heart04>」"
translation = "「훗, 앗, 앗…… 하아…… 히아앗<emoji=heart04> 보지 뜨거워요…… 하아하, 하아…… 앗, 응, 응읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「魔王の、おち○ちんが……深いところまで、来て……あっ、あっ──ああぁっ<emoji=heart04>」"
translation = "「마왕의 자지가…… 깊은 곳까지 와서…… 앗, 앗── 아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「んぁっ……あっ……ふああぁっ<emoji=heart04>\u3000胸を、揉まれて……あ、あ、あんっ<emoji=heart04>」"
translation = "「응앗…… 앗…… 후아아앗<emoji=heart04> 가슴을 주물려져서…… 아, 아, 아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "手からこぼれるくらい大きな胸を揉みしだくと、きゅっと膣が締まってペニスを締め付けた。"
translation = "손에서 넘칠 정도로 큰 가슴을 주무르자 질이 꽉 조여지며 페니스를 압박했다."

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「んん～っ<emoji=heart04>\u3000はぁ、はぁ……魔王の手で、胸が……ふっ、んっ……あぁんっ<emoji=heart04>」"
translation = "「응으~읏<emoji=heart04> 하아, 하아…… 마왕의 손에 가슴이…… 훗, 응…… 아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ボリュームのある乳房は持ち上げると重く、強めに力を込めると指が沈み、その間から胸の肉がはみ出る。"
translation = "볼륨감 있는 유방은 들어 올리면 묵직하고, 강하게 힘을 주면 손가락이 파고들며 그 사이로 가슴살이 비어져 나온다."

[[dialogue]]
speaker = "unk"
original = "イニシュの興奮を表すように乳首が硬くなっていて、感触を確かめるように押し潰す。"
translation = "이니슈의 흥분을 나타내듯 유두가 딱딱해져 있어서 감촉을 확인하듯 짓누른다."

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「んん～～～っ<emoji=heart04>\u3000乳首を触られると、体が、強張って……ふ──はあぁんっ<emoji=heart04>\u3000胸が、熱い……ぁっ……ひあぁっ<emoji=heart04>」"
translation = "「응으~~~읏<emoji=heart04> 유두를 만져지면 몸이 뻣뻣해져서…… 후── 하아앙<emoji=heart04> 가슴이 뜨거워…… 앗…… 히아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「胸じゃなくて、おっぱいって言ってくれるか？」"
translation = "「가슴이 아니라 찌찌라고 말해주겠어?」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「はぁ……はい……おっぱいをぎゅっとされたり、ぐにぐにされたりすると、……お腹の奥が、疼きます……ふ──はぁっ──ああぁっ<emoji=heart04>」"
translation = "「하아…… 네…… 찌찌를 꽉 쥐어지거나 조물조물 당하면…… 배 속 깊은 곳이 욱신거려요…… 후── 하앗── 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "おっぱいを揉みくちゃにされて、イニシュの膣内がますます熱く蕩けていく。"
translation = "찌찌를 엉망진창으로 주물려져 이니슈의 질 내는 점점 더 뜨겁게 녹아내린다."

[[dialogue]]
speaker = "unk"
original = "イニシュの体は男を受け入れるのに最高の状態になっていて、より深くペニスを沈ませる。"
translation = "이니슈의 몸은 남자를 받아들이기에 최고의 상태가 되어 있어 더욱 깊이 페니스를 가라앉힌다."

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「ふぁああぁっ<emoji=heart04>\u3000んあっ、はっ、はぁ……おち○ちん、激しいですっ<emoji=heart04>」"
translation = "「후아아아앗<emoji=heart04> 응앗, 하, 하아…… 자지 격렬해요<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「イニシュのおま○こ、気持ちいいよ」"
translation = "「이니슈 보지, 기분 좋아」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「はい、嬉しいです……<emoji=heart04>\u3000はぁっ、はっ……あんっ<emoji=heart04>\u3000私のおま○こで、もっと気持ち良くなって……ふぁっ、はっ……はあぁっ<emoji=heart04>」"
translation = "「네, 기뻐요……<emoji=heart04> 하앗, 하…… 아앙<emoji=heart04> 제 보지로 좀 더 기분 좋아지세요…… 후앗, 하…… 하아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「もっと、私のおま○こ使ってくださいっ<emoji=heart04>\u3000んっ、あっ……魔王のおち○ちんで、たくさん、突いてください……っ<emoji=heart04>」"
translation = "「좀 더 제 보지 써주세요<emoji=heart04> 응, 앗…… 마왕의 자지로 잔뜩 찔러주세요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「ひぁあああぁ～～～～っ<emoji=heart04>\u3000はぁっ、はっ、はっ──ふぁああぁっ<emoji=heart04>」"
translation = "「히아아아아아~~~~앗<emoji=heart04> 하앗, 하, 하── 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「魔王の、おち○ちんが、奥に……はぁっ、あっ、あんっ<emoji=heart04>\u3000ひぁああっ、はぁ……んぁああっ<emoji=heart04>」"
translation = "「마왕의 자지가 안쪽에…… 하앗, 앗, 아앙<emoji=heart04> 히아아앗, 하아…… 응아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "イニシュの腕を掴んで、突き出されたお尻に下半身を叩きつける。"
translation = "이니슈의 팔을 붙잡고 내밀어진 엉덩이에 하반신을 때려 박는다."

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「はあぁっ、はっ──あっ、あんっ<emoji=heart04>\u3000あなたのおち○ちん、太くて……私のおま○こ、おち○ちんの形に、なってしまいますっ<emoji=heart04>」"
translation = "「하아앗, 하── 앗, 아앙<emoji=heart04> 당신의 자지 굵어서…… 제 보지 자지 모양이 되어버려요<emoji=heart04>」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「んんっ<emoji=heart04>\u3000おち○ちんで、お腹の中、いっぱいになってます……はぁは……あ──ひやあぁっ<emoji=heart04>\u3000あ、あ、あ──んん～～～っ<emoji=heart04>」"
translation = "「응읏<emoji=heart04> 자지로 배 속 가득 찼어요…… 하아하…… 아── 히야아앗<emoji=heart04> 아, 아, 아── 응으~~~읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「ひぁっ、あっ、あっ……私の中、おち○ちんでかき混ぜられてますっ<emoji=heart04>\u3000んっ、んんっ……ふぁああんっ<emoji=heart04>」"
translation = "「히앗, 앗, 앗…… 제 안 자지로 휘저어지고 있어요<emoji=heart04> 응, 응읏…… 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「おま○こ中、ぐちゃぐちゃになって、ますっ<emoji=heart04>\u3000ふぁっ、はっ、あっ……んっ……ひぁああっ<emoji=heart04>」"
translation = "「보지 안 엉망진창이 되고 있어요<emoji=heart04> 후앗, 하, 앗…… 응…… 히아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「はあぁ、はっ、あっ、あっ、あんっ<emoji=heart04>\u3000はぁっ、あっ、あっ……ふぁあっ<emoji=heart04>\u3000はぁっ、あっ、ん──ぁああ～～っ<emoji=heart04>」"
translation = "「하아아, 하, 앗, 앗, 아앙<emoji=heart04> 하앗, 앗, 앗…… 후아앗<emoji=heart04> 하앗, 앗, 응── 아아아~~앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスを奥まで突き入れる度、操り人形のように揺られるイニシュの体。"
translation = "페니스를 끝까지 찔러 넣을 때마다 꼭두각시 인형처럼 흔들리는 이니슈의 몸."

[[dialogue]]
speaker = "unk"
original = "イニシュを俺だけの、俺専用の性具にして支配したようだ。"
translation = "이니슈를 나만의, 나 전용의 성구로 만들어 지배한 것 같다."

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「魔王の、おち○ちん、奥まで届いて……ふぁああっ<emoji=heart04>\u3000はぁっ、はぁっ、あ──んっ──んん～～っ<emoji=heart04>」"
translation = "「마왕의 자지 끝까지 닿아서…… 후아아앗<emoji=heart04> 하앗, 하앗, 아── 응── 응으~~읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "だけどイニシュは嬌声を上げ、乱暴に突かれて女の悦びに打ち震えていた。"
translation = "하지만 이니슈는 교성을 지르며 난폭하게 찔리며 여자의 기쁨에 떨고 있었다."

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「ひああぁっ、はっ、あぁっ<emoji=heart04>\u3000魔王のおち○ちんが……当たって、ますっ<emoji=heart04>\u3000あっ、あっ、あっ──ひぃああっ<emoji=heart04>」"
translation = "「히아아앗, 하, 아앗<emoji=heart04> 마왕의 자지가…… 닿고 있어요<emoji=heart04> 앗, 앗, 앗── 히이아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「どこに当たってるんだ？」"
translation = "「어디에 닿고 있어?」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000私の、奥に……子宮に当たってますっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 제 안쪽에…… 자궁에 닿고 있어요<emoji=heart04>」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「あっ、あっ、あっ、あんっ<emoji=heart04>\u3000おち○ちん、奥に当たると、思考が……はぁっ、はっ……あっ……んぁあーーっ<emoji=heart04>」"
translation = "「앗, 앗, 앗, 아앙<emoji=heart04> 자지 안쪽에 닿으면 사고가…… 하앗, 하…… 앗…… 응아아──앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「気持ちいいか？」"
translation = "「기분 좋아?」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「はい、魔王のおち○ちん、気持ちいいですっ<emoji=heart04>」"
translation = "「네, 마왕의 자지 기분 좋아요<emoji=heart04>」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「おち○ちんで、おま○こ突かれるの、気持ちいいですっ<emoji=heart04>\u3000おま○こ熱くて、お腹の奥が疼いて……はっ、あ、あ、あぁんっ<emoji=heart04>」"
translation = "「자지로 보지 찔리는 거 기분 좋아요<emoji=heart04> 보지 뜨겁고 배 속 깊은 곳이 욱신거려서…… 하, 아, 아, 아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "思い切り下半身を突き出すと、イニシュの肉感的なお尻にぶつかる。"
translation = "힘껏 하반신을 들이밀자 이니슈의 육감적인 엉덩이에 부딪힌다."

[[dialogue]]
speaker = "unk"
original = "亀頭が子宮口を叩くと膣全体がきゅうっと収縮し、物欲しそうにペニスを締め付けてきた。"
translation = "귀두가 자궁구를 때리자 질 전체가 꽉 수축하며 갈구하듯 페니스를 조여왔다."

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「ふぁああっ、はぁ、はぁっ、あぁっ<emoji=heart04>\u3000魔王のおち○ちん、脈打って、ますっ<emoji=heart04>\u3000ふぁああっ、あっ、んんっ<emoji=heart04>」"
translation = "「후아아앗, 하아, 하앗, 아앗<emoji=heart04> 마왕의 자지 맥동하고 있어요<emoji=heart04> 후아아앗, 앗, 응읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「あっ、はんっ……あっ、あっ、あ──ひぁあんっ<emoji=heart04>\u3000あ、は、んん──ひやぁああっ<emoji=heart04>\u3000これ以上は……壊れて、しまいます……<emoji=heart04>」"
translation = "「앗, 하앙…… 앗, 앗, 아── 히아앙<emoji=heart04> 아, 하, 응── 히야아아앗<emoji=heart04> 이 이상은…… 망가져 버려요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "むしろイニシュを壊さんばかりの勢いで欲望を叩きつける。"
translation = "오히려 이니슈를 망가뜨릴 기세로 욕망을 때려 박는다."

[[dialogue]]
speaker = "unk"
original = "膣内が痙攣して絶頂の予兆を伝えてきて、俺も情動を全力でぶつけようとラストスパートをかけた。"
translation = "질 내의 경련하며 절정의 예조를 전해오고, 나도 정동을 전력으로 부딪치려 라스트 스퍼트를 올렸다."

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「はっ、はっ、はっ──んん～～～～っ<emoji=heart04>\u3000あっ──はぁはっ──あっ、あっあっ──ひぁああんっ<emoji=heart04>」"
translation = "「하, 하, 하── 응으~~~~읏<emoji=heart04> 앗── 하아하── 앗, 앗앗── 히아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「私の子宮に、おち○ちんがぶつかると、頭が真っ白に──んんんっ<emoji=heart04>\u3000おかしく、なりそうです……はっ、はぁ──あっ、あっ──んぁあああっ<emoji=heart04>」"
translation = "「제 자궁에 자지가 부딪히면 머릿속이 하얘져서── 응응읏<emoji=heart04> 이상해질 것 같아요…… 하, 하아── 앗, 앗── 응아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「おかしくなる時はイクって言ってくれ」"
translation = "「이상해질 때는 간다고 말해줘」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「は、はいっ<emoji=heart04>\u3000イクっ、イキそうですっ<emoji=heart04>\u3000私の中、ぐちゃぐちゃにかき混ぜられて──ふぁ──あ──んぁああ～～っ<emoji=heart04>」"
translation = "「하, 하잇<emoji=heart04> 가요, 갈 것 같아요<emoji=heart04> 제 안 엉망진창으로 휘저어져서── 후아── 아── 응아아아~~앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「あ──あっ、あんっ<emoji=heart04>\u3000大きいおち○ちんで、たくさん突かれて、イクっ<emoji=heart04>\u3000イキますっ<emoji=heart04>」"
translation = "「아── 앗, 아앙<emoji=heart04> 큰 자지로 잔뜩 찔려서 가요<emoji=heart04> 갑니다<emoji=heart04>」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「イクっ、イクイクイク──<emoji=heart04>\u3000はっ、あっ、あっ──おま○こイッてしまいますっ<emoji=heart04>」"
translation = "「가요, 가가각──<emoji=heart04> 하, 앗, 앗── 보지 가버려요<emoji=heart04>」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「あ<emoji=heart04>\u3000あ<emoji=heart04>\u3000あ<emoji=heart04>\u3000イクっ、イキますっ<emoji=heart04>\u3000魔王のおち○ちんで、おま○こイキますぅっ──<emoji=heart04>」"
translation = "「아<emoji=heart04> 아<emoji=heart04> 아<emoji=heart04> 가요, 갑니다<emoji=heart04> 마왕의 자지로 보지 가버려요오옷──<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そして最後にもう一度、力任せにペニスを打ち込んで──"
translation = "그리고 마지막으로 다시 한번 힘껏 페니스를 박아 넣고──"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「ふぁあああぁああ～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아아아~~~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「あなたの精液が……私の中に、たくさん……っ<emoji=heart04>\u3000んん──はぁっ──あぁっ──ああっ<emoji=heart04>」"
translation = "「당신의 정액이…… 제 안에 잔뜩……<emoji=heart04> 응── 하앗── 아앗── 아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「はぁっ、はぁっ、はぁあぁっ──熱いぃっ<emoji=heart04>\u3000おち○ちんが、ドクドクして──はっ──熱い精液が、子宮に入ってきますっ<emoji=heart04>」"
translation = "「하앗, 하앗, 하아아앗── 뜨거워요<emoji=heart04> 자지가 움찔움찔해서── 하── 뜨거운 정액이 자궁으로 들어와요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "体の奥で精を受け止めながらイニシュの体が震える。"
translation = "몸 깊은 곳에서 정을 받아내며 이니슈의 몸이 떨린다."

[[dialogue]]
speaker = "unk"
original = "子宮に突き立てたペニスが何度も脈打ち、欲望のまま最後の一滴まで注ぎ込む。"
translation = "자궁에 박힌 페니스가 몇 번이고 맥동하며 욕망대로 마지막 한 방울까지 쏟아붓는다."

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「ふああぁ<emoji=heart04>\u3000魔王の精液で……お腹、いっぱいになりますっ<emoji=heart04>\u3000んん～～っ<emoji=heart04>」"
translation = "「후아아<emoji=heart04> 마왕의 정액으로…… 배 속이 가득 차요<emoji=heart04> 응으~읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「ああっ──うああぁっ<emoji=heart04>\u3000まだ、出て……ん──ふ──ひぁああぁっ<emoji=heart04>」"
translation = "「아앗── 우아아앗<emoji=heart04> 아직 나오고…… 응── 후── 히아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「ふーっ、ふーっ……はぁ……ああぁ……<emoji=heart04>」"
translation = "「후우, 후우…… 하아…… 아아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「私の子宮が、魔王の精液で満たされています……<emoji=heart04>」"
translation = "「제 자궁이 마왕의 정액으로 가득 차 있어요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "膣から溢れた精液がボタボタと垂れ落ちる。"
translation = "질에서 넘쳐흐른 정액이 뚝뚝 떨어진다."

[[dialogue]]
speaker = "unk"
original = "イニシュの表情はすっかり快感で蕩けていて、機械的な普段とは別人のようだ。"
translation = "이니슈의 표정은 완전히 쾌감으로 녹아내려 있어, 기계적인 평소와는 딴판이다."

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「はぁ、はぁ……満足しましたか、魔王？」"
translation = "「하아, 하아…… 만족하셨나요, 마왕?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ、ありがとう」"
translation = "「아아, 고마워」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「なら私も嬉しいです……」"
translation = "「그렇다면 저도 기쁩니다……」"

[[dialogue]]
speaker = "unk"
original = "イニシュが愛おしくて、抱き締めてキスをする。"
translation = "이니슈가 사랑스러워 끌어안고 키스를 한다."

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「んちゅっ……ちゅぱっ……れるるん……れるっ、ちゅるっ、んれろ……<emoji=heart04>」"
translation = "「응츄…… 츄파…… 레르른…… 레릇, 츄릇, 응레로……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「くちゅっ……じゅるっ、ちゅるっ……あなたのことを信頼しています、魔王……んっちゅ、ちゅるる<emoji=heart04>」"
translation = "「쿠츄…… 쥬릇, 츄릇…… 당신을 신뢰하고 있습니다, 마왕…… 응츄, 츄르르<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "絡み合う唾液の音と吐息が森の中に響く。"
translation = "얽히는 타액 소리와 숨결이 숲속에 울려 퍼진다."

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「ちゅるっ、れろ、れぇろ……ぴちゃ、ぴちゃ……んふぅ……んっ、ちゅるるっ<emoji=heart04>」"
translation = "「츄릇, 레로, 레에로…… 피챠, 피챠…… 응후…… 응, 츄르릇<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そうして仲間に連絡するのも忘れて、気が済むまでイニシュと抱き合っていた──"
translation = "그렇게 동료에게 연락하는 것도 잊고 기분이 풀릴 때까지 이니슈와 껴안고 있었다──"

