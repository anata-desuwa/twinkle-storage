[[dialogue]]
speaker = "unk"
original = "第３話,突撃アキバデイズ,P"
translation = "제3화, 돌격 아키바 데이즈, P"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「アキバとうちゃーく♪\u3000今日のお出かけはここで決まりぃ」"
translation = "「아키바 도차아악♪ 오늘 외출은 여기로 결정이야」"

[[dialogue]]
speaker = "unk"
original = "どうして秋葉原？"
translation = "어째서 아키하바라?"

[[dialogue]]
speaker = "unk"
original = "なぜここに？"
translation = "왜 여기에?"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「うんうん。星騎士の任務じゃよく出撃するけどさ、よく考えたらプライベートで来たこと１度もなかったなと思って」"
translation = "「응응. 성기사 임무로는 자주 출격하지만, 잘 생각해보니 사적으로 온 적은 한 번도 없었구나 싶어서」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「せっかくなら会長さんとのデートに使っちゃえと思って。じっくり見てみたいとこ、結構あるし！」"
translation = "「이왕이면 회장님과의 데이트에 써버리자고 생각했지. 자세히 보고 싶은 곳도 꽤 있고!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「平和なほうが珍しい──ってのも変な感じだけど。本来はこうなんだよね」"
translation = "「평화로운 게 더 드물다──는 것도 이상한 기분이지만. 원래는 이렇단 말이지」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ちなみに、会長さんはこのへんよく来る？」"
translation = "「그건 그렇고, 회장님은 이 근처 자주 와?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「たまに──か。ふむふむ、なるほどねぇ。なら教えてもらいたいかも」"
translation = "「가끔──이라. 흠흠, 그렇구나. 그럼 좀 알려줬으면 좋겠어」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「街並みもけっこう変わってきてる？\u3000有名なアニメにも出てくる？\u3000へー！\u3000気になる気になる」"
translation = "「거리 풍경도 꽤 바뀌고 있어? 유명한 애니메이션에도 나와? 헤에~! 궁금해 궁금해」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「聞いてるだけで面白そうかも。それじゃ行ってみよ～！」"
translation = "「듣기만 해도 재밌을 것 같아. 그럼 가보자~!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「わー……一気に色んなカルチャーを浴びて頭クラクラ気味……」"
translation = "「와아…… 한꺼번에 여러 문화를 접하니까 머리가 어질어질해……」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「でも楽しい！\u3000なんかアガる！\u3000雰囲気重視！」"
translation = "「그래도 즐거워! 왠지 텐션 올라! 분위기 중시!」"

[[dialogue]]
speaker = "unk"
original = "自分もそう"
translation = "나도 그래"

[[dialogue]]
speaker = "unk"
original = "それでいい"
translation = "그걸로 됐어"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「あ、やっぱり？\u3000わかんなくても楽しんだもん勝ちだよね」"
translation = "「아, 역시? 몰라도 즐기면 장땡이지.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「向こうに売ってたカメラとか、超可愛くなかった？\u3000すっごい物欲刺激されたわ……！」"
translation = "「저쪽에 팔던 카메라 같은 거, 초 귀엽지 않았어? 완전 물욕 자극되더라……!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「けど学生には手が出ないくらいの値段だったね……ああいうのは立派に稼げるようになるまでお預けかなあ」"
translation = "「그치만 학생이 손대기엔 좀 비싼 가격이었지…… 그런 건 제대로 벌게 될 때까지 보류려나아.」"

[[dialogue]]
speaker = "unk"
original = "カメラ好きでしたっけ"
translation = "카메라 좋아했었나요"

[[dialogue]]
speaker = "unk"
original = "写真の趣味が？"
translation = "사진이 취미인가요?"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「いや、全然？\u3000ＤＩＳＣの撮影機能くらいしか使ったことないよ」"
translation = "「아니, 전혀? DISC 촬영 기능 정도밖에 써본 적 없어.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「でもでも、写真の趣味ってなんかお洒落で大人っぽいじゃん？\u3000単なる憧れ！\u3000みたいな」"
translation = "「그치만 그치만, 사진이라는 취미는 왠지 세련되고 어른스럽잖아? 단순한 동경! 같은 거.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「そーそー、うちなんてミーハーなんだから。その場のノリであれいいなーとかこれいいなーって言ってるだけ！」"
translation = "「맞아 맞아, 나 같은 건 유행에 민감하니까. 그 자리의 분위기로 저거 좋네~ 라든가 이거 좋네~ 라고 말할 뿐이야!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「にしても……個性的なお店が多いよね、ホント。これだけお店があると、その方が集客に効果的なのかな……」"
translation = "「그나저나…… 개성적인 가게가 많네, 정말. 이만큼 가게가 있으면, 그게 집객에 효과적인 걸까……」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ん？\u3000ああこれ──ちょっとメモっておこうかなって。後学のために」"
translation = "「응? 아아 이거── 잠깐 메모해 둘까 해서. 나중을 위해서.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「必要なのか──って、もちろん！\u3000ほら、色んなビジネスの形態を知っておくことは大事でしょ？」"
translation = "「필요하냐니── 그야 당연하지! 봐봐, 여러 비즈니스 형태를 알아두는 건 중요하잖아?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「外国の人も多いねー……色んな言葉で案内も書かれてるし……」"
translation = "「외국인도 많네~…… 여러 언어로 안내문도 적혀 있고……」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「インバウンドっていうんだよね、こういうの。これからの時代には大事か──」"
translation = "「인바운드라고 하던가, 이런 거. 앞으로의 시대에는 중요하려나──」"

[[dialogue]]
speaker = "unk"
original = "もっと気楽に"
translation = "좀 더 편하게"

[[dialogue]]
speaker = "unk"
original = "そんな真面目に見るところでもない"
translation = "그렇게 진지하게 볼 만한 곳도 아니야"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「あはは、そうだった。雰囲気重視って言ったばかりなのに」"
translation = "「아하하, 그랬지. 분위기 중시라고 말한 참인데.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「せっかくのデートだもんね？\u3000会長さんとの時間を大事にしなくっちゃ──腕組んじゃお。えいっ」"
translation = "「모처럼의 데이트니까 말이야? 회장님과의 시간을 소중히 해야지── 팔짱 껴야지. 에잇.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ふふふ。どやぁ。間近で感じる桐原先輩は」"
translation = "「후후후. 어떠냐아. 가까이서 느껴지는 키리하라 선배는.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ほらほら、向こうにもっと大胆なカップルもいるよ？\u3000うちらも負けてらんないよね～」"
translation = "「봐봐, 저쪽에 더 대담한 커플도 있어? 우리도 질 수 없지~」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「後は……そうだ！\u3000うち向こうのメイド喫茶行ってみたい！」"
translation = "「다음은…… 맞아! 나 저쪽 메이드 카페 가보고 싶어!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「やっぱ秋葉原って言ったらメイドっしょ！\u3000会長さんだって案外興味あるんじゃないの～？」"
translation = "「역시 아키하바라라고 하면 메이드지! 회장님도 의외로 관심 있는 거 아니야~?」"

[[dialogue]]
speaker = "unk"
original = "目移りしない"
translation = "한눈팔지 않아"

[[dialogue]]
speaker = "unk"
original = "自分にはセーラさんがいる"
translation = "나에게는 세라 씨가 있어"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「へぇ……言ってくれるじゃん。この～」"
translation = "「헤에…… 제법 말해주잖아. 이 녀석~」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ふふーん……会長さんが望むなら着てあげないこともないよ？」"
translation = "「후후-ㄴ…… 회장님이 원한다면 입어주지 못할 것도 없다고?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「水着も見せたしー、バニーにだって挑戦したんだから、今さらメイド服ぐらいヨユーヨユー！」"
translation = "「수영복도 보여줬고-, 바니걸까지 도전했으니까, 이제 와서 메이드복 정도는 여유 여유!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「いつかウエディングドレスを着るまでさ……色んなうちを見せてあげるから覚悟してよね、会長さん♪」"
translation = "「언젠가 웨딩드레스를 입을 때까지 말이야…… 여러 가지 내 모습을 보여줄 테니까 각오하라고, 회장님♪」"

