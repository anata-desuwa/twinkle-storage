[[dialogue]]
speaker = "unk"
original = "第３話,人見知りモナカと帰り道,P"
translation = "제3화, 낯가리는 모나카와 귀갓길, P"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「えへへ、今日はありがとう、にぃ様。おなか部の備品の買い出しに付き合ってもらっちゃって」"
translation = "「에헤헤, 오늘은 고마워, 오라버니. 오나카부 비품 사는 거 같이 해줘서.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「あ……荷物重くない？\u3000やっぱりモナカが持つよ？\u3000あう、本当にいいの……？」"
translation = "「아…… 짐 안 무거워? 역시 모나카가 들게. 아우, 정말 괜찮아……?」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「にぃ様って本当に優しい……。それにすっごく力持ちで……。か、格好いいな……」"
translation = "「오라버니는 정말 다정해……. 게다가 엄청 힘도 세고……. 머, 멋지다……」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「あっ……ううんっ。なんでもないよ。それにしても、えとっ。やっぱり流星市国って人が多いね？」"
translation = "「앗…… 아냐. 그나저나 에토. 역시 유성시국은 사람이 많네.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「モナカの地元はすごく田舎だから。こうして街へ出かける度に人の多さにクラクラしちゃうもん」"
translation = "「모나카 고향은 정말 시골이라서. 이렇게 시내로 나올 때마다 많은 사람 때문에 어질어질해.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「お店に入る時なんかも心の中で、よぉーし頑張るぞ～……って意気込んでからじゃないと入れないくらいで」"
translation = "「가게에 들어갈 때도 마음속으로 '좋아 힘내자~' 하고 각오를 다지지 않으면 못 들어갈 정도라.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「きっと今日もにぃ様がいてくれなかったらお店の前でずっと立ち往生しちゃってたや……。本当にありがとね、にぃ様……？」"
translation = "「분명 오늘도 오라버니가 없었다면 가게 앞에서 계속 망설이고 있었을 거야……. 정말 고마워, 오라버니……?」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「こういう人見知りなところも直していきたいなぁ……。モナカ、俯いて過ごすことがクセになっちゃってて……」"
translation = "「이런 낯가리는 성격도 고쳐나가고 싶어……. 모나카, 땅만 보고 지내는 게 버릇이 돼버려서……」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「おなか部の部長さんとしてダメだよね。モナカがビクビクしてたら相談しに来てくれた人も不安になっちゃうかもしれないし」"
translation = "「오나카부 부장으로서 그러면 안 되겠지. 모나카가 덜덜 떨고 있으면 상담하러 온 사람도 불안해질지 모르고.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「最近は部室へ直接お悩み相談しに来てくれる人も増えてきたから。少しでも人の目を見て話せるようにならないと……」"
translation = "「요즘은 부실로 직접 고민 상담하러 오는 사람도 늘었으니까. 조금이라도 사람 눈을 보고 대화할 수 있게 되어야……」"

[[dialogue]]
speaker = "unk"
original = "なら俺で練習してみる？"
translation = "그럼 나랑 연습해 볼래?"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「にぃ様で……？\u3000確かにモナカもにぃ様のお顔なら緊張しないで見られるかも……」"
translation = "「오라버니랑……? 확실히 모나카도 오라버니 얼굴이라면 긴장하지 않고 볼 수 있을지도……」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「試してみてもいい……？\u3000じー……。じー……」"
translation = "「시험해 봐도 될까? 빤히……. 빤히……」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「～～っっ。ダ、ダメ、にぃ様のお顔が一番見られないかも……！\u3000か、体が熱くなってきちゃう……」"
translation = "「～～윽. 아, 안 돼, 오라버니 얼굴이 제일 못 보겠어……! 모, 몸이 뜨거워져 버려……」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「う、ううん、にぃ様が悪いわけじゃないの。モナカが、その、変なだけで」"
translation = "「으, 응, 오라버니가 잘못한 게 아니야. 모나카가 그, 이상할 뿐이라.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「そういえば、にぃ様は人見知りしないよね……？\u3000初めてにぃ様と出会った時も、にぃ様から話しかけてきてくれたし……」"
translation = "「그러고 보니 오라버니는 낯을 안 가리지……? 처음 오라버니랑 만났을 때도 오라버니가 먼저 말을 걸어줬고……」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「やっぱり色々な人とたくさんお喋りするのが一番なのかな……。でもモナカ、あんまりハキハキ喋れないタイプで……」"
translation = "「역시 여러 사람과 많이 대화하는 게 제일일까……. 하지만 모나카는 활발하게 말하는 타입이 아니라서……」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「姉様たちにもよく叱られちゃってたな……。オドオドせずにもっと目を見て話せって……。人の顔色窺うなって……」"
translation = "「언니들한테도 자주 혼났었지……. 쭈뼛거리지 말고 더 눈을 보고 말하라고……. 남의 눈치 보지 말라고……」"

[[dialogue]]
speaker = "unk"
original = "そういえばモナカの地元ってどんな場所なの？"
translation = "그러고 보니 모나카의 고향은 어떤 곳이야?"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「え？\u3000ええと、本当に田舎だよ……？\u3000山の中にある小さな田舎町で……」"
translation = "「에? 에토, 정말 시골이야……? 산속에 있는 작은 시골 마을인데……」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「すごく水と空気が綺麗な場所でね？\u3000人も少ないからとっても静かで。夜になると星がすっごくピカピカ輝いて見えるんだぁ」"
translation = "「정말 물이랑 공기가 깨끗한 곳이라서 말이야. 사람도 적으니까 아주 조용하고. 밤이 되면 별이 정말 반짝반짝 빛나 보여.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「山の中にある湖がモナカのお気に入りの場所でね？\u3000モナカはお家のお稽古に混ざれなかったから、そこでこっそり星術の練習をしたりもして」"
translation = "「산속에 있는 호수가 모나카가 제일 좋아하는 장소인데. 모나카는 집안 훈련에 낄 수 없었으니까 거기서 몰래 성술 연습을 하기도 하고.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「パルちゃんやシフォンちゃんと出会ってからは毎日その湖に集まって一緒に遊んでたの」"
translation = "「파르 짱이나 시퐁 짱이랑 만난 뒤로는 매일 그 호수에 모여서 같이 놀았어.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「ああ見えてもパルちゃんは遊ぶときはパワフルでね？\u3000野球とかサッカーとかサバゲーとか色々やったなぁ」"
translation = "「그렇게 보여도 파르 짱은 놀 때 파워풀해서 말이야. 야구나 축구나 서바이벌 게임 같은 거 이것저것 많이 했지.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「パルちゃんは昔から星力の扱いも上手でね？\u3000星騎士ごっこって言って、モナカとシフォンちゃんに稽古を付けてくれたりもして」"
translation = "「파르 짱은 옛날부터 성력 다루는 것도 능숙했거든. 성기사 놀이라면서 모나카랑 시퐁 짱한테 훈련을 시켜주기도 하고.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「シフォンちゃんとはよく山菜採りをしてたんだよ？\u3000一時期は一攫千金を狙って、みんなでトリュフ採りもしたっけ」"
translation = "「시퐁 짱이랑은 나물 캐기를 자주 했어. 한때는 일확천금을 노리고 다 같이 트러플 캐기도 했었지.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「みんな泥んこになるまで探してね。終わったら湖で水浴びして。えへへ、楽しかったなぁ」"
translation = "「다들 흙투성이가 될 때까지 찾았어. 끝나면 호수에서 멱 감고. 에헤헤, 즐거웠지.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「そういえば、シフォンちゃんが森の中でお肉を見つけたことがあってね？\u3000ついて行ったら、本当に大きなステーキ肉が置いてあったの」"
translation = "「그러고 보니 시퐁 짱이 숲속에서 고기를 발견한 적이 있었는데. 따라가 보니까 정말 커다란 스테이크 고기가 놓여 있는 거야.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「でもシフォンちゃんがそれを掴んだ瞬間、ずざざざーって宙吊りにされちゃって……！\u3000猟師さんの仕掛けた動物用の罠だったんだって」"
translation = "「하지만 시퐁 짱이 그걸 잡는 순간 즈자자자 하고 공중에 매달려버려서……! 사냥꾼이 설치한 동물용 덫이었다나 봐.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「あの時は焦ったなぁ。パルちゃんは大笑いするし、シフォンちゃんは頑なにお肉を手放さないし、モナカの身長じゃ縄まで届かなくて」"
translation = "「그땐 정말 당황했어. 파르 짱은 배꼽 빠지게 웃고, 시퐁 짱은 고기를 안 놓으려고 버티고, 모나카 키로는 줄까지 안 닿고.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「あ、他にもね。シフォンちゃんが毒キノコを間違えて食べちゃった時があって──」"
translation = "「아, 또 있지. 시퐁 짱이 독버섯을 잘못 먹었을 때가──」"

[[dialogue]]
speaker = "unk"
original = "しっかり喋れてるじゃないか"
translation = "말 잘하고 있잖아."

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「え？\u3000あっ……本当だ。モナカ、いつの間にかたくさん喋ってて……」"
translation = "「에? 앗…… 정말이다. 모나카 어느새 엄청 말하고 있어서……」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「もしかしてにぃ様、モナカに練習させようとしてお話振ってくれたの……？」"
translation = "「혹시 오라버니, 모나카 연습시키려고 이야기 꺼내준 거야……?」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「そんなことないって……ふふ。にぃ様の嘘つき」"
translation = "「그렇지 않다니…… 후후. 오라버니는 거짓말쟁이.」"

[[dialogue]]
speaker = "unk"
original = "でも２人とも本当に仲良しだね"
translation = "그래도 두 사람 정말 사이가 좋네."

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「パルちゃんとシフォンちゃんのこと？\u3000ふふ、うん。子どもの頃からずっと一緒だから」"
translation = "「파르 짱이랑 시퐁 짱 말이야? 후후, 응. 어릴 때부터 계속 함께였으니까.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「でもね、その。最近は、にぃ様ともパルちゃんやシフォンちゃんたちと同じくらい仲良しになってると思うよ……？」"
translation = "「하지만 말이야, 그. 요즘은 오라버니랑도 파르 짱이나 시퐁 짱들만큼 친해졌다고 생각해……?」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「本当のお兄様みたいに思ってるというか……。だから、その、モナカも緊張せずにお話することができて……」"
translation = "「진짜 오빠처럼 생각한다고 해야 하나……. 그래서 그, 모나카도 긴장하지 않고 대화할 수 있게 돼서……」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「モナカだけ……かな？\u3000そんな風に思ってるの……？」"
translation = "「모나카만…… 일까? 그렇게 생각하는 거……?」"

[[dialogue]]
speaker = "unk"
original = "俺も可愛い妹ができた気持ちだよ"
translation = "나도 귀여운 여동생이 생긴 기분이야."

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「ふ、ふぇ。ひ、一言余計だよ。モナカ全然可愛くないからっ」"
translation = "「후, 후에. 그, 한마디가 사족이야. 모나카 전혀 안 귀여우니까.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「あう、ダメ。今モナカのお顔見ちゃ。ますますにぃ様のお顔見て話せなくなっちゃうからっ」"
translation = "「아우, 안 돼. 지금 모나카 얼굴 보지 마. 점점 더 오라버니 얼굴 보고 말 못 하게 되니까.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「でも、えへへ、良かった。にぃ様もモナカのこと、そんな風に思ってくれていて……」"
translation = "「하지만 에헤헤, 다행이다. 오라버니도 모나카를 그렇게 생각해 줘서……」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「う、ううん、なんでもない。それとやっぱりモナカも荷物持つよ。にぃ様にばかり持たせるのは悪いもん」"
translation = "「으, 응, 아무것도 아냐. 그리고 역시 모나카도 짐 들게. 오라버니한테만 들게 하는 건 미안하니까.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「ビニール袋の手を１本ずつ持って歩こう？\u3000これなら、その、にぃ様のお顔を見ながらお話しできるかもしれないし」"
translation = "「비닐봉지 손잡이를 하나씩 잡고 걸을까? 이러면 그, 오라버니 얼굴 보면서 대화할 수 있을지도 모르니까.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「部室に戻るまで、もう少しだけモナカのお喋りの練習に付き合って欲しいな……」"
translation = "「부실에 돌아갈 때까지 조금만 더 모나카 말하기 연습 좀 도와줬으면 좋겠어……」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「ちゃんと、その……にぃ様のおめめ見て話せるようになりたいから」"
translation = "「제대로, 그…… 오라버니 눈을 보고 말할 수 있게 되고 싶으니까.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「ダメ、かな……？」"
translation = "「안 될, 까……?」"

