[[dialogue]]
speaker = "unk"
original = "第２話,ヘレナ社長の視察,P"
translation = "제2화, 헬레나 사장의 시찰, P"

[[dialogue]]
speaker = "ヘレナ"
original = "「リゾート結界は今日も盛況のようだな──よしよし」"
translation = "「리조트 결계는 오늘도 성황인 모양이군── 좋아 좋아」"

[[dialogue]]
speaker = "ヘレナ"
original = "「こうして学生たちが気軽に楽しめる場所があるというのは素晴らしいことだ。理事長として、やはりリップルには感謝せねばなるまい」"
translation = "「이렇게 학생들이 가볍게 즐길 수 있는 장소가 있다는 것은 멋진 일이다. 이사장으로서, 역시 리플에게 감사해야겠군」"

[[dialogue]]
speaker = "unk"
original = "よく海へ行く？"
translation = "바다에 자주 가?"

[[dialogue]]
speaker = "unk"
original = "ヘレナちゃんは……"
translation = "헬레나짱은……"

[[dialogue]]
speaker = "ヘレナ"
original = "「海水浴──という意味では、ほとんど来たことがないな」"
translation = "「해수욕──이라는 의미로는, 거의 온 적이 없구나」"

[[dialogue]]
speaker = "ヘレナ"
original = "「魔王は慣れている様子だな。ふむ……ならば今日は、貴殿にエスコートを頼もうではないか」"
translation = "「마왕은 익숙해 보이는구나. 흠…… 그렇다면 오늘은 귀하에게 에스코트를 부탁하도록 할까」"

[[dialogue]]
speaker = "ヘレナ"
original = "「さっそくだが魔王よ。私はあの、海の家のフードが気になるぞ」"
translation = "「당장이다만 마왕이여. 나는 저 바다의 집 푸드가 신경 쓰이는구나」"

[[dialogue]]
speaker = "ヘレナ"
original = "「そうだ。焼きそばやら、かき氷やら……『ザ・夏の定番！』といったラインナップがいろいろ並んでいるだろう」"
translation = "「그렇다. 야키소바라든가, 빙수라든가…… 『더 여름의 스테디셀러!』 같은 라인업이 여러 가지 늘어서 있지 않느냐」"

[[dialogue]]
speaker = "unk"
original = "初めて？"
translation = "처음이야?"

[[dialogue]]
speaker = "unk"
original = "食べたことない？"
translation = "먹어본 적 없어?"

[[dialogue]]
speaker = "ヘレナ"
original = "「無論、焼きそばくらい食べたことはある。だが──ヴィーナスいわく、海で食すそれはまた別物だという」"
translation = "「물론 야키소바 정도야 먹어본 적 있다. 하지만── 비너스 말로는, 바다에서 먹는 그것은 또 별개라고 하더군」"

[[dialogue]]
speaker = "ヘレナ"
original = "「そうした夏の粋もまた、肌で感じることが風流と言えよう。馴染みある食べ物であっても、また違った色合いを<ruby>醸<rt>かも</rt></ruby>すはずだ」"
translation = "「그런 여름의 멋 또한 피부로 느끼는 것이 풍류라 할 수 있지. 낯익은 음식이라 해도, 또 다른 색채를 자아낼 것이 분명하다」"

[[dialogue]]
speaker = "ヘレナ"
original = "「縁側で聞く風鈴の<ruby>音<rt>ね</rt></ruby>や、蚊取り線香の匂いのように……その時にしか味わえないのが風物詩というものだ」"
translation = "「툇마루에서 듣는 풍경 소리나, 모기향 냄새처럼…… 그때밖에 맛볼 수 없는 것이 풍물시라는 것이다」"

[[dialogue]]
speaker = "ヘレナ"
original = "「というわけでこのヘレナ、ラムネに焼きそば、最後にかき氷イチゴ味をオーダーだっ！\u3000共に<b>しぇあ</b>しようぞ、魔王♪」"
translation = "「그런 고로 이 헬레나, 라무네에 야키소바, 마지막으로 빙수 딸기 맛을 오더 하겠다! 함께 <b>셰어</b>하자꾸나, 마왕♪」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ふう──なかなか悪くない体験であった。これで腹ごしらえも済んだというもの」"
translation = "「후우── 제법 나쁘지 않은 체험이었다. 이것으로 요기는 마친 셈이군」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ん？\u3000本当は、泳いで疲れた後が一番おいしい……？\u3000なるほど、そこまでは考慮していなかったな。まだ真の風流を理解したとは言えぬか」"
translation = "「응? 사실은, 수영하고 지친 뒤가 제일 맛있다……? 과연, 거기까지는 고려하지 않았군. 아직 진정한 풍류를 이해했다고는 할 수 없는 건가」"

[[dialogue]]
speaker = "ヘレナ"
original = "「だが、実のところ今日は泳ぎに来たのではない」"
translation = "「하지만, 사실 오늘은 수영하러 온 것이 아니다」"

[[dialogue]]
speaker = "unk"
original = "ここに何の用？"
translation = "여기에 무슨 용건?"

[[dialogue]]
speaker = "unk"
original = "今日はどうして"
translation = "오늘은 어째서"

[[dialogue]]
speaker = "ヘレナ"
original = "「うむ。今回の目的は他でもない──視察だ」"
translation = "「음. 이번 목적은 다름 아닌── 시찰이다」"

[[dialogue]]
speaker = "ヘレナ"
original = "「水着商品を展開するにおいて、様々なニーズに応えられるデザインを用意しておく必要がある。そのために、実際のビーチの様子を見に来ようと思ってな」"
translation = "「수영복 상품을 전개함에 있어, 다양한 니즈에 부응할 수 있는 디자인을 준비해 둘 필요가 있지. 그러기 위해 실제 비치의 모습을 보러 오려 생각해서 말이다」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ここへ来れば若い女子の水着姿が拝み放題。フフ……参考にもしつつ、眼福にもなるというわけだ」"
translation = "「여기에 오면 젊은 여자들의 수영복 차림을 마음껏 감상할 수 있지. 후후…… 참고도 하면서, 눈호강도 된다는 말씀이다」"

[[dialogue]]
speaker = "unk"
original = "問題発言だ"
translation = "문제 발언이야"

[[dialogue]]
speaker = "unk"
original = "ヘレナちゃんじゃなかったら"
translation = "헬레나짱이 아니었다면"

[[dialogue]]
speaker = "ヘレナ"
original = "「はっはっ、気にするな──これもデザイナーの性分というもの」"
translation = "「하하, 신경 쓰지 마라── 이것도 디자이너의 성미라는 것」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ふむ……セパレートの有無のみならず、パンツタイプ……パレオ……フリル……スク水もいるか。水着とひと口に言っても、やはり種類は多いな」"
translation = "「흠…… 세퍼레이트의 유무뿐만 아니라, 팬츠 타입…… 파레오…… 프릴…… 스쿠미즈도 있는가. 수영복이라고 한마디로 말해도, 역시 종류는 많구나」"

[[dialogue]]
speaker = "ヘレナ"
original = "「男子と違って女子の水着には様々なニーズが生じる。そこにどう寄り添っていくかがセールスのポイントとなる」"
translation = "「남자와 달리 여자의 수영복에는 다양한 니즈가 생긴다. 거기에 어떻게 다가가느냐가 세일즈의 포인트가 되지」"

[[dialogue]]
speaker = "ヘレナ"
original = "「やはり各々の体型をどう活かすかが肝だろうか。自分のスタイルにあった水着をセレクトできるようになれば一番よいが……」"
translation = "「역시 개개인의 체형을 어떻게 살리느냐가 관건일까. 자신의 스타일에 맞는 수영복을 셀렉트 할 수 있게 된다면 제일 좋겠다만……」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ん？\u3000何？\u3000いつになく真面目──だと？」"
translation = "「응? 뭐야? 평소답지 않게 진지──하다고?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「私はいつでも真面目だ。常に目を光らせておかなくては、商機が逃げてしまうからな」"
translation = "「나는 언제나 진지하다. 항상 눈을 빛내고 있지 않으면, 상업적 기회를 놓쳐 버리니까 말이다」"

[[dialogue]]
speaker = "ヘレナ"
original = "「水着の選択肢の多さは、時に女子たちを惑わせることにもなろう。うまく商機を把握できればよいのだが……」"
translation = "「수영복의 선택지의 다양함은, 때로 여자들을 미혹하게 하기도 할 터. 잘 상기를 파악할 수 있으면 좋겠다만……」"

[[dialogue]]
speaker = "ヘレナ"
original = "「それより──って、なんだ？\u3000魔王？」"
translation = "「그보다── 어라? 뭐야? 마왕?」"

[[dialogue]]
speaker = "unk"
original = "みんなこっちを見てる"
translation = "다들 이쪽을 보고 있어"

[[dialogue]]
speaker = "unk"
original = "注目を集めてる"
translation = "주목을 모으고 있어"

[[dialogue]]
speaker = "ヘレナ"
original = "「む……？\u3000確かに。こちらが視察をしていたつもりが、いつの間にか衆目を集めてしまっているな」"
translation = "「음……? 확실히. 이쪽이 시찰을 하고 있었을 생각이었는데, 어느새 중목을 집중시켜 버리고 있구나」"

[[dialogue]]
speaker = "ヘレナ"
original = "「深遠を覗く者は──というやつか？\u3000それとも理事長である私がビーチにいることは、それほど珍しいことだろうか？」"
translation = "「심연을 들여다보는 자는── 이라는 것인가? 아니면 이사장인 내가 비치에 있는 것이 그렇게 희귀한 일일까?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「理事長じゃなく、みんなヘレナちゃんの体に見惚れてる……？\u3000フッ、なるほど」"
translation = "「이사장이 아니라, 다들 헬레나짱의 몸에 넋을 잃고 있어……? 훗, 과연」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ならばそれもよし。これも我がブランドのよい宣伝になるというもの」"
translation = "「그렇다면 그것도 좋다. 이것도 우리 브랜드의 좋은 선전이 될 터」"

[[dialogue]]
speaker = "ヘレナ"
original = "「──『ヘレナ』の新作水着を着れば、たちまちこの美ボディに！」"
translation = "「── 『헬레나』의 신작 수영복을 입으면, 단숨에 이 미바디로!」"

[[dialogue]]
speaker = "unk"
original = "誇大広告になりますよ"
translation = "과대광고가 됩니다"

[[dialogue]]
speaker = "unk"
original = "そんな効果はない"
translation = "그런 효과는 없어"

[[dialogue]]
speaker = "ヘレナ"
original = "「はっはっ、冗談だ冗談。にしても──こうも注目されると、遊びたくなってしまうな」"
translation = "「하하, 농담이다 농담. 그나저나── 이렇게 주목받으니, 장난치고 싶어지는구나」"

[[dialogue]]
speaker = "ヘレナ"
original = "「……腕でも組むか、魔王」"
translation = "「……팔이라도 낄까, 마왕」"

[[dialogue]]
speaker = "ヘレナ"
original = "「照れるな、照れるな。会長と理事長──誰の目にも驚きのカップリングだ。堂々としてやろうではないか」"
translation = "「부끄러워하지 마라, 부끄러워하지 마라. 회장과 이사장── 누구의 눈에도 놀라운 커플링이다. 당당하게 있어 주자꾸나」"

[[dialogue]]
speaker = "ヘレナ"
original = "「お？\u3000さらに視線を感じるぞ？\u3000ふふふ、もっと過激な絡みをしてみせようか？」"
translation = "「오? 시선이 더 느껴지는군? 후후후, 좀 더 과격한 얽힘을 보여줄까?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「はっはっは……何、女子の視線を集めるのが心地よくてな。少々目立ちすぎたかもしれんが」"
translation = "「하하하…… 뭐, 여자의 시선을 모으는 것이 기분 좋아서 말이지. 조금 너무 눈에 띄었을지도 모르겠다만」"

[[dialogue]]
speaker = "ヘレナ"
original = "「それに……これには他の意味もあるのだぞ」"
translation = "「게다가…… 이것에는 다른 의미도 있단다?」"

[[dialogue]]
speaker = "unk"
original = "どういうこと？"
translation = "무슨 뜻이야?"

[[dialogue]]
speaker = "unk"
original = "他の意味？"
translation = "다른 의미?"

[[dialogue]]
speaker = "ヘレナ"
original = "「──逆ナン防止、だ。貴殿を１人ビーチで歩かせたら──悪い虫が寄りつくかもしれん」"
translation = "「── 역헌팅 방지, 다. 귀하를 혼자 비치에서 걷게 했다간── 나쁜 벌레가 꼬일지도 모르지」"

[[dialogue]]
speaker = "unk"
original = "ヘレナちゃんは独占欲を発揮するように、ぎゅっと組んだ腕の力を強めた。"
translation = "헬레나짱은 독점욕을 발휘하듯, 꽉 낀 팔의 힘을 주었다."

[[dialogue]]
speaker = "ヘレナ"
original = "「水着で２人、ビーチを歩くというのも……『青春』らしい１ページだろう？\u3000ふふ、今日はとくと私に付き合え」"
translation = "「수영복 차림으로 둘이서 비치를 걷는다는 것도…… 『청춘』다운 한 페이지겠지? 후후, 오늘은 톡톡히 나를 상대해라」"

[[dialogue]]
speaker = "unk"
original = "その日は最後まで、ヘレナちゃんの気まぐれに付き合わされるのだった──"
translation = "그날은 마지막까지 헬레나짱의 변덕에 어울려 주게 되는 것이었다──"

