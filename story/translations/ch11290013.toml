[[dialogue]]
speaker = "unk"
original = "第３話,強火魔王信者,P"
translation = "제3화, 극성 마왕 신자, P"

[[dialogue]]
speaker = "unk"
original = "エステルの様子を見に星見家にやってきた。"
translation = "에스텔의 모습을 보러 호시미 가문에 찾아왔다."

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「ありがとうございます、魔王様。わざわざ会いに来てくださるなんて」"
translation = "「감사합니다, 마왕님. 일부러 만나러 와주시다니.」"

[[dialogue]]
speaker = "unk"
original = "ここでの生活も慣れた？"
translation = "여기 생활도 적응됐어?"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「はい。お屋敷の方々がとても良くしてくださいます」"
translation = "「네. 저택 분들이 아주 잘 대해주세요.」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「特にメイドのナミエルさんとはとても仲良くなりました」"
translation = "「특히 메이드인 나미엘 씨와는 아주 친해졌답니다.」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「とても可愛らしくて、それなのにしっかりしていて、私、大好きになってしまいました」"
translation = "「정말 귀여우시고, 그러면서도 야무지셔서 저, 너무 좋아하게 됐어요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「コホン……そのように持ち上げられると恥ずかしいのですが」"
translation = "「큼큼…… 그렇게 띄워주시니 부끄럽습니다만.」"

[[dialogue]]
speaker = "unk"
original = "こんにちは、ナミエル"
translation = "안녕, 나미엘."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ようこそおいでくださいました……と言いたいところですが」"
translation = "「어서 오십시오……라고 말하고 싶습니다만.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「エステルさまに会いに来る頻度が、少しずつ上がってきているように思うのは気のせいですか？」"
translation = "「에스텔 님을 보러 오시는 빈도가 조금씩 높아지고 있는 것 같은데 기분 탓인가요?」"

[[dialogue]]
speaker = "unk"
original = "純粋に心配してなんだけど"
translation = "순수하게 걱정돼서 그런 건데."

[[dialogue]]
speaker = "unk"
original = "そうかな？"
translation = "그럴까?"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「純粋に、ね……」"
translation = "「순수하게, 라니……」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「そんな事を言って、もしかしてエステルさまに気があるんじゃないでしょうね？」"
translation = "「그런 말을 하고, 혹시 에스텔 님께 마음이 있는 건 아니겠죠?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「エステルさまに手を出そうとしたら、私が許しませんから！」"
translation = "「에스텔 님께 손을 대려고 하신다면 제가 용납하지 않을 테니까요!」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「大丈夫ですよ、ナミエルさん。そんなに警戒しなくても魔王様が私に手を出そうなどと考えるはずがありませんから」"
translation = "「괜찮아요, 나미엘 씨. 그렇게 경계하지 않으셔도 마왕님이 저에게 손을 대시려는 생각 따위 하실 리가 없으니까요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「え……そうですか？」"
translation = "「에…… 그렇습니까?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「いえいえ、油断はできませんよ。緋宮会長だって男なんですから。心のうちにどんな邪な感情を抱いてるか分かったものではありません」"
translation = "「아니요, 방심할 수 없습니다. 히노미야 회장님도 남자니까요. 마음속에 어떤 사악한 감정을 품고 있을지 알 수 없는 노릇입니다.」"

[[dialogue]]
speaker = "unk"
original = "酷い言われようだ"
translation = "너무한 평가네."

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「ふふっ、本当に大丈夫ですよ。魔王様がそんな邪な考えなど抱くはずがありません」"
translation = "「후훗, 정말 괜찮아요. 마왕님이 그런 사악한 생각 따위 품으실 리 없어요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「う……どうしてそんなにきっぱり言い切れるんです？」"
translation = "「으…… 어째서 그렇게 단정 지어 말씀하시는 거죠?」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「だって魔王様は公明正大で正義感にあふれる素晴らしい方ですから」"
translation = "「그야 마왕님은 공명정대하고 정의감 넘치는 훌륭한 분이시니까요.」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「今、私がこちらの世界に居るという状況も、私１人を置いてくると危機に晒されてしまうだろうと慮ってくださったからです」"
translation = "「지금 제가 이쪽 세계에 있다는 상황도, 저 혼자 남겨두면 위기에 처하게 될까 봐 우려해주셨기 때문입니다.」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「そんな風に私の身を案じてくださった魔王様が、私に手を出そうなどと考えるでしょうか？\u3000そうですよね、魔王様」"
translation = "「그렇게 제 몸을 걱정해주신 마왕님이 저에게 손을 대시려는 생각 따위 하실까요? 그렇죠, 마왕님?」"

[[dialogue]]
speaker = "unk"
original = "ええと……"
translation = "그게 그러니까……."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「なぜ緋宮会長を信用しているのか、理由は伺いましたが……それでもそこまで無条件に信じられるものでしょうか？」"
translation = "「왜 히노미야 회장님을 신용하는지 이유는 들었습니다만…… 그래도 그렇게까지 무조건적으로 믿을 수 있는 걸까요?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「エステルさまとは色々な点で共感するところも多いのですが、この点だけは相容れることはなさそうです」"
translation = "「에스텔 님과는 여러 점에서 공감하는 부분이 많았습니다만, 이 점만큼은 서로 용납할 수 없을 것 같네요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「第一、あなたを救った緋宮会長と、ここにいる緋宮会長とは別人なのでしょう？」"
translation = "「애초에 당신을 구한 히노미야 회장님과 여기 있는 히노미야 회장님은 별개의 인물이잖습니까?」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「別人であったとしても魔王様は魔王様です。どうやらこちらの世界でも同じ事が起こり、同じように私を救い出してくださったと聞きます」"
translation = "「별개의 인물이라 하더라도 마왕님은 마왕님입니다. 듣자하니 이쪽 세계에서도 같은 일이 일어나 똑같이 저를 구해내 주셨다고 하니까요.」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「それは私のことを救って下さった……そう言ってしまってもいいのではないでしょうか？」"
translation = "「그것은 저를 구해주셨다…… 그렇게 말해버려도 되지 않을까요?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ぅ……」"
translation = "「으……」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「それに普段の行いを見ていても、魔王様が素晴らしい人であるということは聡明なナミエルさんになら分かるのでは？」"
translation = "「게다가 평소의 행실을 봐도 마왕님이 훌륭한 분이라는 건 총명하신 나미엘 씨라면 아실 텐데요?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「そ、そんな迷いのない笑顔で言い切られると……緋宮会長が素晴らしい人物であるように思えてきます……」"
translation = "「그, 그런 망설임 없는 미소로 말씀하시니…… 히노미야 회장님이 훌륭한 인물인 것처럼 느껴지기 시작하네요……」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「確かに緋宮会長は紳士的で、私やお嬢様に対して気配りも行き届いていますし、人格として問題となるところはありません」"
translation = "「확실히 히노미야 회장님은 신사적이고 저나 아가씨께 배려도 아끼지 않으시며, 인격적으로 문제가 될 부분은 없습니다.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「男性だからという理由で、きつく当たっていましたが……もしかして私の今までの行為は全て誤りだったのでは……？」"
translation = "「남자라는 이유로 모질게 대했습니다만…… 혹시 저의 지금까지의 행위는 모두 잘못된 것이 아니었을지……?」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「大丈夫ですよ。魔王様は懐の広い方ですから、きちんと謝れば許してくれるはずです」"
translation = "「괜찮아요. 마왕님은 마음이 넓은 분이시니 제대로 사과하면 용서해 주실 거예요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ごめんなさい！\u3000私、今まで緋宮会長にとんでもない扱いを……！！」"
translation = "「죄송합니다! 저, 지금까지 히노미야 회장님께 말도 안 되는 대접을……!!」"

[[dialogue]]
speaker = "unk"
original = "正気に戻って！"
translation = "제정신 차려!"

[[dialogue]]
speaker = "unk"
original = "しっかりして！"
translation = "정신 차려!"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「はっ！？」"
translation = "「핫!?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「そうですっ！\u3000どうして私があなたに謝らなければならないのですか！\u3000いい加減にしてください！」"
translation = "「맞습니다! 어째서 제가 당신에게 사과해야 하는 거죠! 적당히 좀 하세요!」"

[[dialogue]]
speaker = "unk"
original = "俺に怒らないで……"
translation = "나한테 화내지 마……."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「まったく……エステルさまは口が上手いんですから。あなたと話していると私まで緋宮会長信者になってしまいそうで怖いです」"
translation = "「정말이지…… 에스텔 님은 말솜씨가 좋다니까요. 당신과 이야기하고 있으면 저까지 히노미야 회장 신자가 되어버릴 것 같아서 무섭습니다.」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「ふふふ、そんなそんな……」"
translation = "「후후후, 설마요 설마요……」"

[[dialogue]]
speaker = "unk"
original = "笑って流すエステル。"
translation = "웃으며 넘기는 에스텔."

[[dialogue]]
speaker = "unk"
original = "けれどあのナミエルさえもおかしくさせてしまうエステルの魔王信奉者ぶりは、少し恐ろしいもののように感じてしまうのだった。"
translation = "하지만 그 나미엘조차 이상하게 만들어버리는 에스텔의 마왕 숭배적인 모습은 조금 무시무시한 것처럼 느껴지는 것이었다."

