[[dialogue]]
speaker = "unk"
original = "第３話,陰なるもの,B"
translation = "제3화, 음지(陰地)의 존재, B"

[[dialogue]]
speaker = "unk"
original = "──激戦は実った。"
translation = "──격전은 결실을 맺었다."

[[dialogue]]
speaker = "unk"
original = "星見エリシアによる魂の叫びが、姉アポロの内に宿る魔王としての血を呼び覚ました。"
translation = "호시미 엘리시아에 의한 영혼의 외침이, 언니 아폴로 안에 깃든 마왕으로서의 피를 일깨웠다."

[[dialogue]]
speaker = "unk"
original = "アポロを、魔王として覚醒させる──"
translation = "아폴로를, 마왕으로서 각성시킨다──"

[[dialogue]]
speaker = "unk"
original = "そんな、誰もが予期しなかった因果によって、俺たちはついに『リクリエの使徒』を倒したのだ。"
translation = "그런, 아무도 예측하지 못했던 인과에 의해, 우리들은 마침내 『리크리에의 사도』를 쓰러뜨린 것이다."

[[dialogue]]
speaker = "リノ"
original = "「さて──それじゃ、最後の後始末ね。散らばった仮面を封印しましょう」"
translation = "「자── 그럼, 마지막 뒤처리네. 흩어진 가면을 봉인하자」"

[[dialogue]]
speaker = "クロト"
original = "「ああ。どんな細かい破片も残しちゃいけない」"
translation = "「아아. 아무리 작은 파편도 남기면 안 돼」"

[[dialogue]]
speaker = "アポロ"
original = "「……頼んだ」"
translation = "「……부탁한다」"

[[dialogue]]
speaker = "unk"
original = "それから俺たちは手分けして、割れた仮面の破片を慎重に回収していった。"
translation = "그리고 나서 우리들은 역할을 나누어, 깨진 가면의 파편을 신중하게 회수해 나갔다."

[[dialogue]]
speaker = "unk"
original = "『シエルの筐』の封印力は大したもので、内部に収めたピースからは一切の瘴気を感じ取れなくなっていた。"
translation = "『시엘의 궤』의 봉인력은 대단한 것이어서, 내부에 수납한 조각에서는 일체의 장기를 느낄 수 없게 되어 있었다."

[[dialogue]]
speaker = "アポロ"
original = "「……ありがとう。本当に、いい奴らだな」"
translation = "「……고맙다. 정말로, 좋은 녀석들이네」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
original = "「ええ──自慢の仲間たちです」"
translation = "「네── 자랑스러운 동료들입니다」"

[[dialogue]]
speaker = "ユウリ"
original = "「うし、あそこに落ちてるのがラストだな──」"
translation = "「좋아, 저기에 떨어진 게 마지막이군──」"

[[dialogue]]
speaker = "マトイ"
original = "「よかった……これで……」"
translation = "「다행이다…… 이걸로……」"

[[dialogue]]
speaker = "unk"
original = "最後のピースに手をかけようとする──"
translation = "마지막 조각에 손을 대려고 하는──"

[[dialogue]]
speaker = "unk"
original = "その時だった。"
translation = "그때였다."

[[dialogue]]
speaker = "ギエル"
original = "「ああ……いけませんねえ。英雄ともあろうものが、最後の最後でお役目を放棄してしまうなんて」"
translation = "「아아…… 안 되겠군요. 영웅이라고 하는 분이, 마지막 순간에 임무를 포기해 버리시다니」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker = "マトイ"
original = "「あなたは……！」"
translation = "「당신은……!」"

[[dialogue]]
speaker = "クロト"
original = "「ギエル──どうしてここに……」"
translation = "「기엘── 어째서 여기에……」"

[[dialogue]]
speaker = "ギエル"
original = "「どうして？\u3000これは異なことを仰る。主のもとへ駆けつけるのは、従者として当然の定めでしょう」"
translation = "「어째서요? 이상한 말씀을 하시는군요. 주군 곁으로 달려가는 것은, 종자로서 당연한 숙명일 텐데요」"

[[dialogue]]
speaker = "ギエル"
original = "「本来は、地上のコントロールを命じられていたのですがね。主に何かあってはいけないと思い……ただちに馳せ参じた次第ですよ」"
translation = "「본래는, 지상의 통제를 명받았었습니다만. 주군께 무슨 일이라도 생겨서는 안 된다고 생각하여…… 즉시 달려온 것입니다」"

[[dialogue]]
speaker = "クロト"
original = "「……っ！」"
translation = "「……읏!」"

[[dialogue]]
speaker = "unk"
original = "ギエルは──アポロの解放を察してここへやってきた。"
translation = "기엘은── 아폴로의 해방을 감지하고 이곳에 왔다."

[[dialogue]]
speaker = "unk"
original = "そして彼の手元には、集めるべき最後のピースが。"
translation = "그리고 그의 손에는, 모아야 할 마지막 조각이."

[[dialogue]]
speaker = "アポロ"
original = "「ギエル……待て。そいつを拾ったらダメだ」"
translation = "「기엘…… 기다려. 그걸 주우면 안 돼」"

[[dialogue]]
speaker = "ギエル"
original = "「おやおや。アポロ様。どうされました？\u3000仮面を脱いで、そのような者たちと馴れ合うなど」"
translation = "「이런이런. 아폴로 님. 무슨 일이십니까? 가면을 벗고, 그런 자들과 어울리시다니」"

[[dialogue]]
speaker = "アポロ"
original = "「あたしは……あたしは目を覚ました。世界を壊せばいいだなんて馬鹿げてた」"
translation = "「나는…… 나는 눈을 떴다. 세계를 부수면 된다니 바보 같았다」"

[[dialogue]]
speaker = "アポロ"
original = "「オマエにも──迷惑かけた。悪かった。だから、それ以上アポロの幻影を追っちゃいけない」"
translation = "「너에게도── 폐를 끼쳤다. 미안했다. 그러니, 그 이상 아폴로의 환영을 쫓으면 안 돼」"

[[dialogue]]
speaker = "アポロ"
original = "「オマエはただの人間だ。まだ引き返せる。妹たちと一緒に」"
translation = "「너는 그저 인간이다. 아직 되돌릴 수 있어. 여동생들과 함께」"

[[dialogue]]
speaker = "ギエル"
original = "「なるほど。あなたが私の主だったなら従ったでしょう──が。『使徒』を捨てたあなた様に仕える義理はありませんねぇ」"
translation = "「과연. 당신이 저의 주군이었다면 따랐겠지요── 허나. 『사도』를 버리신 당신께 섬길 의리는 없군요」"

[[dialogue]]
speaker = "ソフィア"
original = "「っ、この人……！」"
translation = "「윽, 이 사람……!」"

[[dialogue]]
speaker = "unk"
original = "燕尾服の青年。その瞳には、紛れもない失望が宿っていた。"
translation = "연미복의 청년. 그 눈동자에는, 틀림없는 실망이 깃들어 있었다."

[[dialogue]]
speaker = "unk"
original = "彼がこれまで付き従ってきた『<ruby>アポロ<rt>リクリエ</rt></ruby>』の意志は──たった今、失われてしまったのだから。"
translation = "그가 지금까지 따라왔던 『<ruby>아폴로<rt>리크리에</rt></ruby>』의 의지는── 방금, 사라져 버렸기 때문이다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「待ちなさいよ──せっかく戦いは終わったのよ！\u3000アポロだって正気に戻って──」"
translation = "「기다려 봐요── 모처럼 싸움은 끝났다고요! 아폴로도 제정신으로 돌아왔고──」"

[[dialogue]]
speaker = "ギエル"
original = "「で？\u3000世界は何も変わっていない。それじゃいけない」"
translation = "「그래서요? 세계는 아무것도 변하지 않았습니다. 그래서는 안 되지요」"

[[dialogue]]
speaker = "ギエル"
original = "「なにせ我が主は……共にこの世界を壊してしまおうと、私を<ruby>誘<rt>いざな</rt></ruby>ったのですから！」"
translation = "「왜냐하면 저의 주군은…… 함께 이 세계를 부숴버리자고, 저를 유혹했으니까요!」"

[[dialogue]]
speaker = "アポロ"
original = "「違う──違うんだ、ギエル！\u3000待ってくれ」"
translation = "「아니야── 아니라고, 기엘! 기다려 줘」"

[[dialogue]]
speaker = "アポロ"
original = "「オマエはあたしと違って──ここの、アルタイルの人間だ。リクリエに囚われた使徒じゃない。そうだろギエル──いや……希崎レイト……！」"
translation = "「너는 나랑 달라서── 이곳, 알타이르의 인간이다. 리크리에에 사로잡힌 사도가 아니야. 그렇지 기엘── 아니…… 키자키 레이토……!」"

[[dialogue]]
speaker = "ギエル"
original = "「……ふむ。そちらはとうに捨てた名ですが」"
translation = "「……흠. 그쪽은 이미 오래전에 버린 이름입니다만」"

[[dialogue]]
speaker = "リノ"
original = "（彼はアルタイルの人間──）"
translation = "（그는 알타이르의 인간──）"

[[dialogue]]
speaker = "アナ"
original = "（どうやら……元々アポロとは縁のない存在だったようですね……）"
translation = "（아무래도…… 원래 아폴로와는 인연이 없는 존재였던 것 같군요……）"

[[dialogue]]
speaker = "アポロ"
original = "「オマエをそんな風にしたのはあたしなんだ。本当に、悪かった」"
translation = "「너를 그렇게 만든 건 나다. 정말로, 미안했다」"

[[dialogue]]
speaker = "ギエル"
original = "「悪い？\u3000何を謝られることがあるのです。私は真実、あなたに出会って救われたというのに」"
translation = "「미안하다고요? 무엇을 사과받을 것이 있습니까. 저는 진실로, 당신을 만나 구원받았는데」"

[[dialogue]]
speaker = "ギエル"
original = "「ですが、だからこそ残念でなりません。アポロ様──いえ、星見フィオナ様。あなたはこの仮面にふさわしくなかった」"
translation = "「하지만, 그렇기에 유감스러울 따름입니다. 아폴로 님── 아니, 호시미 피오나 님. 당신은 이 가면과 어울리지 않았습니다」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
original = "「！\u3000姉さんを本名で……」"
translation = "「! 언니를 본명으로……」"

[[dialogue]]
speaker = "ユウリ"
original = "（強引にでもとっ捕まえてやりてえけど──）"
translation = "（억지로라도 붙잡아 버리고 싶지만──）"

[[dialogue]]
speaker = "クロト"
original = "（近づけない──なんだ、この結界めいた『影』は……）"
translation = "（가까이 갈 수 없어── 뭐야, 이 결계 같은 『그림자』는……）"

[[dialogue]]
speaker = "アナ"
original = "（新月の星術──だけじゃない、何かが働いている……！？）"
translation = "（신월의 성술── 뿐만이 아니야, 무언가가 작용하고 있어……!?）"

[[dialogue]]
speaker = "unk"
original = "──ぞくり、ぞくりと。"
translation = "──오싹, 오싹하고."

[[dialogue]]
speaker = "unk"
original = "ギエルを中心に広がる、影のような暗黒色の波動が……俺たちの挙動を縛っていた。"
translation = "기엘을 중심으로 퍼지는, 그림자 같은 암흑색의 파동이…… 우리들의 움직임을 묶고 있었다."

[[dialogue]]
speaker = "ギエル"
original = "「希崎レイトなどという名は捨てた。あなたもそうだと思っていました。それが、よもやただの人間へ還るとは……口惜しくてなりません」"
translation = "「키자키 레이토 따위의 이름은 버렸습니다. 당신도 그럴 거라고 생각했습니다. 그것이, 설마 단순한 인간으로 돌아가다니…… 분통 터져 견딜 수 없습니다」"

[[dialogue]]
speaker = "アポロ"
original = "「あたしは……アポロとしての自分まで消し去ったわけじゃない。拭えない罪だってわかってる」"
translation = "「나는…… 아폴로로서의 나 자신까지 지워버린 건 아니야. 씻을 수 없는 죄라는 것도 알고 있어」"

[[dialogue]]
speaker = "アポロ"
original = "「オマエが抱えてたものも……わかってるつもりだ。何もかもなくなればいいって気持ちも」"
translation = "「네가 안고 있던 것도…… 알고 있다고 생각해. 모든 것이 사라지면 좋겠다는 마음도」"

[[dialogue]]
speaker = "アポロ"
original = "「だけど──オマエはあたしとは違う。ここの人間なんだ。オマエはまだ、この世界でやり直せるんだ！」"
translation = "「하지만── 너는 나랑 달라. 이곳의 인간이야. 너는 아직, 이 세계에서 다시 시작할 수 있어!」"

[[dialogue]]
speaker = "ギエル"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "アポロの叫びを、ギエルは虚ろな面持ちで聞いていた。"
translation = "아폴로의 외침을, 기엘은 공허한 표정으로 듣고 있었다."

[[dialogue]]
speaker = "unk"
original = "ふとこちらに振り向いたギエルに俺は呼びかける。"
translation = "문득 이쪽으로 돌아선 기엘에게 나는 말을 건다."

[[dialogue]]
speaker = "クロト"
original = "「希崎レイト──か。それが、元のおまえの名前なんだな」"
translation = "「키자키 레이토──인가. 그게, 원래 네 이름이구나」"

[[dialogue]]
speaker = "ギエル"
original = "「あなたには関係のない話ですよ、魔王」"
translation = "「당신과는 관계없는 이야기입니다, 마왕」"

[[dialogue]]
speaker = "クロト"
original = "「かもしれないな。俺は……そういう意味じゃ、本来のおまえに会ったことすらないわけだし」"
translation = "「그럴지도 모르지. 나는…… 그런 의미로는, 원래의 너를 만난 적조차 없는 셈이니까」"

[[dialogue]]
speaker = "ギエル"
original = "「会いたくもありませんでしたね。あなたと私では、到底棲む世界が違うのですから」"
translation = "「만나고 싶지도 않았습니다. 당신과 저와는, 도저히 사는 세계가 다르니까요」"

[[dialogue]]
speaker = "unk"
original = "諦めたように微笑むギエル。"
translation = "체념한 듯 미소 짓는 기엘."

[[dialogue]]
speaker = "unk"
original = "その独白に応じて、さらなる影のオーラが彼を包み込んでいく。"
translation = "그 독백에 호응하여, 더욱더 그림자의 오라가 그를 감싸 안는다."

[[dialogue]]
speaker = "ギエル"
original = "「私は……私はずっと、居場所がないと感じていた。生まれてからずっとだ」"
translation = "「저는…… 저는 줄곧, 안식처가 없다고 느끼고 있었습니다. 태어났을 때부터 줄곧」"

[[dialogue]]
speaker = "ギエル"
original = "「星騎士──あなた方のような眩しい存在ではいられなかった。同じように生きることも叶わなかった」"
translation = "「성기사── 당신들 같은 눈부신 존재로는 있을 수 없었습니다. 똑같이 사는 것도 이루어지지 않았습니다」"

[[dialogue]]
speaker = "ギエル"
original = "「深海を生きる魚にとっては……陽の当たる場所にいることさえ、耐えがたい苦痛なのですよ」"
translation = "「심해를 사는 물고기에게는…… 해가 드는 장소에 있는 것조차, 견디기 힘든 고통입니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「どういうこと──あんたは、星騎士になりたかったの？」"
translation = "「무슨 소리야── 너는, 성기사가 되고 싶었던 거야?」"

[[dialogue]]
speaker = "ギエル"
original = "「さあ。そうとも言えるし、そうでないとも言えます。結局、自分の存在意義さえ見いだせればなんでもよかったのかもしれない」"
translation = "「글쎄요. 그렇다고도 할 수 있고, 그렇지 않다고도 할 수 있습니다. 결국, 자신의 존재 의의만 찾을 수 있다면 무엇이든 상관없었을지도 모릅니다」"

[[dialogue]]
speaker = "ギエル"
original = "「私の両親は普通だった。育った環境も普通だった。アポロ様のような才も、血筋も私にはない」"
translation = "「저의 부모님은 평범했습니다. 자란 환경도 평범했습니다. 아폴로 님 같은 재능도, 혈통도 저에게는 없습니다」"

[[dialogue]]
speaker = "ギエル"
original = "「私はちっぽけな悪だ。巨悪にも、英雄にもなれない小物でしかない」"
translation = "「저는 보잘것없는 악입니다. 거악도, 영웅도 될 수 없는 잡범일 뿐입니다」"

[[dialogue]]
speaker = "ギエル"
original = "「それでも──あなたの与えてくれた従者という立場こそが唯一の居場所となった。私にとって、これ以上なく棲みやすい深淵だった」"
translation = "「그럼에도── 당신이 주신 종자라는 입장이 유일한 안식처가 되었습니다. 저에게 있어, 이보다 더 살기 좋은 심연은 없었습니다」"

[[dialogue]]
speaker = "ギエル"
original = "「リクリエを司りし使徒に付き従う金魚のフン。本来、その立ち場さえ出来すぎなほどでした。私のような日陰者からしてみれば」"
translation = "「리크리에를 관장하는 사도에게 붙어 다니는 찌꺼기. 본래, 그 입장조차 너무나도 과분했습니다. 저 같은 음지(陰地)의 사람으로서는」"

[[dialogue]]
speaker = "アポロ"
original = "「──だったら！\u3000あたしがまた、この世界でのオマエの居場所になってやる！」"
translation = "「──그렇다면! 내가 다시, 이 세계에서 너의 안식처가 되어 줄게!」"

[[dialogue]]
speaker = "アポロ"
original = "「……オマエは確かに陰気な奴だ。キラキラ輝く学園生活──なんてのとは、言っちゃ悪いけど縁遠い男だよな」"
translation = "「……너는 확실히 음침한 녀석이다. 반짝반짝 빛나는 학원생활── 같은 것과는, 나쁘게 말해서 거리가 먼 남자지」"

[[dialogue]]
speaker = "アポロ"
original = "「だけどあたしは、そんなオマエとの会話が案外嫌いじゃなかった」"
translation = "「하지만 나는, 그런 너와의 대화가 의외로 싫지 않았어」"

[[dialogue]]
speaker = "アポロ"
original = "「『１日分のグミ』を小分けに用意してるマメさも、わざと量を減らしてあたしが嫌がる顔を見たがる陰湿さも、何もかも新鮮で面白かったんだ」"
translation = "「『하루치 젤리』를 조금씩 나눠서 준비하는 꼼꼼함도, 일부러 양을 줄여서 내가 싫어하는 얼굴을 보려고 하는 음습함도, 모든 것이 신선하고 재미있었어」"

[[dialogue]]
speaker = "アポロ"
original = "「何も世界をゼロから創り直さなくたって──あたしとオマエとなら、まだまだ面白いことができる」"
translation = "「굳이 세계를 제로에서부터 다시 만들지 않아도── 나와 너라면, 아직도 재미있는 일을 할 수 있어」"

[[dialogue]]
speaker = "アポロ"
original = "「恨みが──ぶつけたい想いがあるっていうなら……舞台は壊しちゃいけないだろ？」"
translation = "「원한이── 쏟아내고 싶은 마음이 있다면…… 무대는 부수면 안 되는 거잖아?」"

[[dialogue]]
speaker = "アポロ"
original = "「あたしもオマエも、今さらヒーローなんて柄じゃない。……でも、だったらヴィランでいいじゃないか」"
translation = "「나도 너도, 이제 와서 히어로 같은 건 체질이 아니야. ……하지만, 그렇다면 빌런으로 괜찮지 않아?」"

[[dialogue]]
speaker = "アポロ"
original = "「リクリエのパシリなんかじゃなくて……今度はこの世界で、堂々と胸張って悪役をやってみようぜ」"
translation = "「리크리에의 똘마니 같은 게 아니라…… 이번에는 이 세계에서, 당당하게 가슴 펴고 악역을 해 보자고」"

[[dialogue]]
speaker = "アポロ"
original = "「だからあたしと一緒に来い！\u3000今度こそあたしが──オマエの居場所になってみせるから」"
translation = "「그러니 나랑 같이 가자! 이번에야말로 내가── 너의 안식처가 되어 보일 테니까」"

[[dialogue]]
speaker = "unk"
original = "──アポロが手を差し伸べる。"
translation = "──아폴로가 손을 내민다."

[[dialogue]]
speaker = "アポロ"
original = "「<ruby>星見フィオナ<rt>あたし</rt></ruby>にエリシアが居たように……希崎レイトにはアポロがいる。そんなのも、悪くないだろ？」"
translation = "「호시미 피오나에게 엘리시아가 있었듯이…… 키자키 레이토에게는 아폴로가 있다. 그런 것도, 나쁘지 않잖아?」"

[[dialogue]]
speaker = "ギエル"
original = "「……つまり、あなたなりに罪滅ぼしがしたいと？」"
translation = "「……즉, 당신 나름대로 속죄를 하고 싶다는 겁니까?」"

[[dialogue]]
speaker = "アポロ"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker = "ギエル"
original = "「──くっ……ははっ」"
translation = "「──크읏…… 하하」"

[[dialogue]]
speaker = "ギエル"
original = "「──御免ですねえ！\u3000なぜ私が、今さらあなたの罪滅ぼしなどに付き合わねばならないのです？」"
translation = "「──사양하겠습니다! 왜 제가, 이제 와서 당신의 속죄 따위에 어울려야 하는 겁니까?」"

[[dialogue]]
speaker = "アポロ"
original = "「違う、そういうことじゃなくて──」"
translation = "「아니, 그런 뜻이 아니라──」"

[[dialogue]]
speaker = "ギエル"
original = "「そもそも私は、今更『居場所が欲しい』などとは思っていません。ただ純粋に、この世界の破滅が見たいのですよ」"
translation = "「애초에 저는, 이제 와서 『안식처가 갖고 싶다』고는 생각하지 않습니다. 그저 순수하게, 이 세계의 파멸을 보고 싶은 것입니다」"

[[dialogue]]
speaker = "ギエル"
original = "「確かに最初は……ありふれた鬱屈の発露だった。しかし私は気づかされただけなのです。ずっと秘めていた心の願望にね」"
translation = "「확실히 처음에는…… 흔해 빠진 울분의 발로였습니다. 하지만 저는 깨달았을 뿐입니다. 줄곧 숨겨왔던 마음속 염원을 말이죠」"

[[dialogue]]
speaker = "ギエル"
original = "「我が主アポロはもう──この世に亡き存在です。単なる小娘に戻ったあなたに興味はありません」"
translation = "「저의 주군 아폴로는 이제── 이 세상에 없는 존재입니다. 단순한 꼬마 아가씨로 돌아간 당신에게 흥미는 없습니다」"

[[dialogue]]
speaker = "アポロ"
original = "「あ──う……！」"
translation = "「아── 으……!」"

[[dialogue]]
speaker = "unk"
original = "今のアポロでは……彼を説得できなかった。"
translation = "「지금의 아폴로로는…… 그를 설득할 수 없었다.」"

[[dialogue]]
speaker = "unk"
original = "主を失った従者の暴走──それは誰にも止められない。"
translation = "「주인을 잃은 종자의 폭주──그것은 누구도 막을 수 없다.」"

[[dialogue]]
speaker = "ギエル"
original = "「──ゆえに。今。私の為すべきはひとつ」"
translation = "「──그러므로. 지금. 제가 해야 할 일은 하나입니다」"

[[dialogue]]
speaker = "ギエル"
original = "「元・<ruby>主<rt>あるじ</rt></ruby>にこれが不要というのなら……私が定めを受け継ぎ、真の終焉を拝ませていただくとしましょう！」"
translation = "「전 주인에게 이것이 불필요하다면…… 제가 운명을 이어받아, 진정한 종언을 보게 해 드리겠습니다!」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
original = "「──ッ！」"
translation = "「──읏!」"

[[dialogue]]
speaker = "クロト"
original = "「やめろギエル──おまえまで取り込まれるぞ！」"
translation = "「그만둬 기엘── 너마저 집어삼켜질 거다!」"

[[dialogue]]
speaker = "unk"
original = "ギエルの拾い上げた最後の破片に、リクリエの瘴気が宿り始める。"
translation = "「기엘이 주워 올린 마지막 파편에, 리크리에의 장기가 깃들기 시작한다.」"

[[dialogue]]
speaker = "unk"
original = "それに対抗するかのように『シエルの筐』がかつてないほど<ruby>赫灼<rt>かくやく</rt></ruby>した。"
translation = "「그것에 대항하듯이 『시엘의 궤』가 전례 없을 정도로 혁작했다.」"

[[dialogue]]
speaker = "リノ"
original = "「させないわ──ソレは必ずこの場で封印する。私の命に代えても──！」"
translation = "「안 돼── 그건 반드시 이 자리에서 봉인할 거야. 내 목숨과 바꿔서라도──!」"

[[dialogue]]
speaker = "ギエル"
original = "「天界の聖遺物……なるほど。魔女の動きは掴んでいましたが、そのアイテムは想定外だ」"
translation = "「천계의 성유물…… 과연. 마녀의 움직임은 파악하고 있었지만, 그 아이템은 상정 외입니다」"

[[dialogue]]
speaker = "ギエル"
original = "「ですが──無駄だ。世界を終わらせる厄災は、いかなる外殻にも縛られない！」"
translation = "「하지만── 소용없습니다. 세계를 끝낼 재앙은, 어떠한 외피에도 묶이지 않습니다!」"

[[dialogue]]
speaker = "クロト"
original = "「！？」"
translation = "「!?」"

[[dialogue]]
speaker = "unk"
original = "ギエルを覆っていた『影』が破片に共鳴した。"
translation = "「기엘을 뒤덮고 있던 『그림자』가 파편에 공명했다.」"

[[dialogue]]
speaker = "unk"
original = "すると、その現象へ呼応するかのように──『筐』内部に収めたはずの断片までもが暴走を始めた！"
translation = "「그러자, 그 현상에 호응하듯이── 『궤』 내부에 넣어 두었을 조각마저 폭주하기 시작했다!」"

[[dialogue]]
speaker = "ギエル"
original = "「さあ──『使徒』の仮面よ！\u3000新たな主導者の誕生を祝して集うがいい──！」"
translation = "「자── 『사도』의 가면이여! 새로운 주도자의 탄생을 축하하며 모여라──!」"

[[dialogue]]
speaker = "ユウリ"
original = "「なっ……待て！\u3000せっかく集めた破片が──！」"
translation = "「뭣…… 기다려! 모처럼 모은 파편이──!」"

[[dialogue]]
speaker = "リノ"
original = "「く──っ……！？\u3000ダメ、流出が抑えられない──！」"
translation = "「크──읏……!? 안 돼, 유출을 막을 수 없어──!」"

[[dialogue]]
speaker = "unk"
original = "ギエルの掲げる一欠片へ向けて集約されていく仮面の断片！"
translation = "「기엘이 내건 한 조각을 향해 집약되어 가는 가면의 파편!」"

[[dialogue]]
speaker = "unk"
original = "その勢いはすさまじく、いくら『筐』の封印をもってしても歯止めが利かない。"
translation = "「그 기세는 엄청나서, 아무리 『궤』의 봉인을 가지고도 제동이 걸리지 않는다.」"

[[dialogue]]
speaker = "unk"
original = "さらに──"
translation = "「게다가──」"

[[dialogue]]
speaker = "リノ"
original = "「──！？\u3000そん、な──」"
translation = "「──!? 그, 럴수가──」"

[[dialogue]]
speaker = "ルリエル"
original = "「は、筐が砕けてしまいました──！」"
translation = "「하, 궤가 부서져 버렸습니다──!」"

[[dialogue]]
speaker = "ギエル"
original = "「──くははは！\u3000悪くない秘策だったと褒めておきましょう。しかし──見立てが甘いと言わざるを得ませんねえ！」"
translation = "「──크하하하! 나쁘지 않은 비책이었다고 칭찬해 드리겠습니다. 하지만── 판단이 미숙했다고 말할 수밖에 없겠군요!」"

[[dialogue]]
speaker = "unk"
original = "ギエルという一点に集約されていく仮面の破片。"
translation = "「기엘이라는 한 점으로 집약되어 가는 가면의 파편.」"

[[dialogue]]
speaker = "unk"
original = "爆発的に膨れ上がる負のエネルギーが、ギエルの全身を包み込んでいく。"
translation = "「폭발적으로 부풀어 오르는 부정적인 에너지가, 기엘의 전신을 감싸 안는다.」"

[[dialogue]]
speaker = "アポロ"
original = "「頼む、みんな──力を貸してくれ。ギエルと仮面が適合したら手遅れになる！」"
translation = "「부탁한다, 모두── 힘을 빌려줘. 기엘과 가면이 적합해지면 늦어!」"

[[dialogue]]
speaker = "クロト"
original = "「ああ──まだ仮面が結合しないうちに食い止めるんだ！」"
translation = "「아아── 아직 가면이 결합하지 않은 사이에 막아야 해!」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
original = "「ええ──決して、姉さんのようにはさせません！」"
translation = "「네── 결코, 언니처럼은 되지 않을 거예요!」"

[[dialogue]]
speaker = "unk"
original = "完全体となったアポロさえ打ち砕いた、魔王と星騎士によるフルバースト──"
translation = "「완전체가 된 아폴로조차 부숴버린, 마왕과 성기사에 의한 풀 버스트──」"

[[dialogue]]
speaker = "unk"
original = "俺たちの持てる限りを合わせた──星術の究極がギエルを見舞う！"
translation = "「우리들이 가진 모든 것을 합친── 성술의 궁극이 기엘을 덮친다!」"

