[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「隠し芸大会、第２部！\u3000司会進行は再び魔女アイリーンとミーちゃんがお送りするよー！」"
translation = "「장기 자랑 대회, 제2부! 사회 진행은 다시 마녀 아이린과 미짱이 전해드립니다~!」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「解説も引き続きマグダレナでお送りします。注目は舞亜さまですね。この短期間で何かを掴んだのでしょうか……？」"
translation = "「해설도 계속해서 마그달레나가 맡겠습니다. 주목할 점은 마아 님이군요. 이 짧은 기간에 무언가를 깨달은 걸까요……?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「あまり練習の時間は取れなかったけどね、みんなのおかげで新しいプログラムができたから、期待してて」"
translation = "「연습할 시간은 별로 없었지만, 다들 덕분에 새로운 프로그램이 완성됐으니까 기대해 줘♥」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「自信満々の舞亜さんですが……おやー？\u3000フィオナさんとヴィーナスさんが舞台に上がってますねー」"
translation = "「자신만만한 마아 씨입니다만…… 어라~? 피오나 씨와 비너스 씨가 무대에 올라와 있네요~」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「前回の反省を踏まえ、場を温めるのはお任せください！\u3000お正月の風物詩、羽根つきを披露させていただきます！」"
translation = "「지난번의 반성을 토대로, 분위기를 띄우는 건 맡겨주세요! 설날의 풍물시, 하고이타를 선보이겠습니다!」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「面目躍如といったところでしょうか？\u3000しかし羽根つきではそこまで華やかさがないように思われますが……」"
translation = "「명예 회복이라 해야 할까요? 하지만 하고이타로는 그렇게 화려함이 없을 것으로 생각됩니다만……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「前回の失敗は、私の隠し芸なのに派手さが足りなかったのが敗因ね！\u3000でも、フィオナとなら！」"
translation = "「지난번 실패는 내 장기인데 화려함이 부족했던 게 패인이었지! 하지만 피오나와 함께라면!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「私は照れが邪魔をし、勢いが足りていませんでした。ですが、ヴィーナスさんとなら！」"
translation = "「저는 쑥스러움이 방해가 되어 기세가 부족했습니다. 하지만 비너스 씨와 함께라면!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「手加減なんてしませんからね！\u3000行きますよ！」"
translation = "「봐주지 않을 테니까요! 갑니다!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「星見流羽根突術・曙！」"
translation = "「호시미류 하네츠키술·아케보노!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ぐぅうぅっ！\u3000やるわね……！\u3000でも──」"
translation = "「구우우웃! 제법인데……! 하지만──」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ミラクル・ガラティーンッ！」"
translation = "「미라클 갈라틴!」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「すごいすごいすごーーいっ！\u3000２人が打つ度に勢いと威力がドンドン強くなってくよー！」"
translation = "「대단해 대단해 대단해~! 둘이 칠 때마다 기세와 위력이 점점 강해지고 있어~!」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「なんと……人間界の羽根つきという遊戯は……こんなにも激しく……心昂るものなのですね……？」"
translation = "「세상에…… 인간계의 하고이타라는 유희는…… 이렇게나 격렬하고…… 마음을 고동치게 하는 것이었나요……?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「違います、違います！\u3000あんなの羽根つきじゃないです……！\u3000まるで花火──いえ大砲を撃ち合ってるみたいな……！」"
translation = "「아닙니다, 아니에요! 저런 건 하고이타가 아니라고요……! 마치 불꽃── 아니 대포를 쏘아대고 있는 것 같은……!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「一発ミスっただけで、大爆発しちゃうって！\u3000あんな本気の羽根つき、星徒会長クラスじゃなきゃムリっしょ！」"
translation = "「한 번만 실수해도 대폭발 하겠다구! 저런 진심 모드 하고이타는 성도회장 클래스 아니면 무리라니까!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「盛り上がったところで、そろそろ〆ましょ！\u3000ハッピー・ニュースターッ！！」"
translation = "「분위기가 달아올랐으니 슬슬 마무리하자! 해피 뉴 스타!!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「くううぅぅっ！\u3000重い一撃……ですが！」"
translation = "「쿠우우우웃! 묵직한 일격…… 하지만!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「星見流羽根突術奥義・御来光！」"
translation = "「호시미류 하네츠키술 오의·고라이코!」"

[[dialogue]]
speaker = "unk"
original = "フィオナの打ち上げた羽根は空に舞い上がり、閃光を咲かせて消えていった。"
translation = "피오나가 쳐 올린 깃털은 하늘로 날아올라 섬광을 피우며 사라졌다."

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「爆発してフィニーッシュ！\u3000良い子は真似しないでねー！\u3000ヴィーナスさん、フィオナさんの超すっごい羽根つきでした！\u3000おふたりに拍手ーっ！」"
translation = "「폭발하며 피니쉬! 착한 아이들은 따라 하지 마세요~! 비너스 씨, 피오나 씨의 엄청난 하고이타였습니다! 두 분께 박수~!」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「サスペンス海外ドラマのような……いえ、それ以上の緊張感でした。これが前座というのですから、真打には期待も高まろうというものですね」"
translation = "「서스펜스 해외 드라마 같은…… 아니, 그 이상의 긴장감이었습니다. 이것이 서막이라니, 주연에게는 기대가 더 높아지는군요.」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「続いては、舞亜さんたち団体フィギュアスケートでーす。前回は惜しくもオオヒメさんの胸には響かなかったですけど、リベンジできるでしょうかー」"
translation = "「다음은 마아 씨 일행의 단체 피겨 스케이트입니다. 지난번에는 아쉽게도 오오히메 님의 가슴에 닿지 않았는데, 설욕할 수 있을까요~」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「おみくじは皆さんの勝負運を……大吉と告げていますので……絶対に成功します……サポートと演出はお任せください」"
translation = "「제비뽑기는 여러분의 승부운을…… 대길이라 말하고 있으니…… 반드시 성공할 거예요…… 서포트와 연출은 맡겨주세요.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「トリシャさんのおみくじがそう言ってるなら安心だね。行くよ、ソフィ、ウズメ」"
translation = "「트리샤 씨의 제비가 그렇게 말한다면 안심이네. 가자, 소피, 우즈메♥」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「肝心なところでミスらないでね、舞亜」"
translation = "「중요한 부분에서 실수하지 마, 마아.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「大丈夫だよ。私、本番でミスしないから」"
translation = "「괜찮아. 나, 실전에서 실수 안 하거든♥」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「くっ……本当にそうだから、何も言い返せない……」"
translation = "「큿…… 정말 그러니까 아무 대꾸도 못 하겠네……」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「むしろ、あたしが失敗しそうになったらフォローよろ～。んじゃ、行ってくるねっ！」"
translation = "「차라리 내가 실수할 것 같으면 팔로우 부탁해~. 그럼, 다녀올게!」"

[[dialogue]]
speaker = "unk"
original = "大吉って本当？"
translation = "「대길이라는 거 진짜야?」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ふふ……あなたの目は誤魔化せませんね……おみくじは未だ、不確定の未来を示していました……」"
translation = "「후후…… 당신의 눈은 속일 수 없군요…… 제비는 아직 불확실한 미래를 보여주고 있었습니다……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ですが……あの３人なら──私の友達ならばきっと……明るい未来を指し示してくれるはずです……」"
translation = "「하지만…… 저 세 사람이라면── 제 친구들이라면 분명…… 밝은 미래를 가리켜 줄 것입니다……」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「この３人だと堕天使のパテルさんと戦った時のこと、思い出すね」"
translation = "「이 셋이 모이니 타락천사 파텔 씨와 싸웠을 때가 생각나네♥」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「パテルさんに続いて、オオヒメさんにまで一矢報いるなんて……ジャイアントキリングにも程があるよ」"
translation = "「파텔 씨에 이어 오오히메 씨에게까지 일격을 가하다니…… 자이언트 킬링도 정도가 있지.」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「めちゃスゴだよね～！\u3000一生モノの滑らない話になりそ～！\u3000これからスケートで滑るのに！」"
translation = "「완전 대박이잖아~! 평생 안 질릴 이야깃거리가 될 것 같아~! 지금부터 스케이트로 미끄러질 거지만!」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「準備整ったみたーい。舞亜さんたちの星術で、空中にスケートリンクができあがっていきまーす！」"
translation = "「준비가 다 된 모양이네요. 마아 씨 일행의 성술로 공중에 스케이트 링크가 만들어지고 있습니다!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「咲き誇れ、希望の花っ！」"
translation = "「흐드러져라, 희망의 꽃!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「導け、虹の架け橋っ！」"
translation = "「인도하라, 무지개 다리!」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「ウズメさんの走った跡に花が咲いて……ソフィアさんの方は虹が出てきてるー！？\u3000えーっ、どうなってるの、これー！？」"
translation = "「우즈메 씨가 달린 흔적에 꽃이 피고…… 소피아 씨 쪽에서는 무지개가 나오고 있어~!? 에엣, 어떻게 된 거야 이거~!?」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「裏方で頑張っている方がいるみたいですね。星術を舞台の演出に用いるとは……驚きです」"
translation = "「무대 뒤에서 노력하고 계신 분이 있는 모양이군요. 성술을 무대 연출에 사용하다니…… 놀랍습니다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「まさか星力をこんなふうに使うなんて思いませんでしたけど、遠隔星術のコントロール、いいトレーニングになりますね」"
translation = "「설마 성력을 이런 식으로 쓰게 될 줄은 몰랐지만, 원격 성술 컨트롤이라니 좋은 트레이닝이 되겠네요.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「おもいっきり体をあっためておいたおかげで、絶好調よ！\u3000もーっと派手にしてあげるわ！\u3000花火もドーーーーン！！」"
translation = "「몸을 한껏 데워놓은 덕분에 절정이야! 훨씬 화려하게 해줄게! 불꽃놀이도 콰아앙!!」"

[[dialogue]]
speaker = "unk"
original = "俺も３人をサポートするぞ！"
translation = "「나도 세 사람을 서포트하겠어!」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「わー！\u3000真冬に花火が見られるなんて素敵ー！」"
translation = "「와~! 한겨울에 불꽃놀이를 볼 수 있다니 멋져~!」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「降り注げ、雪の花」"
translation = "「쏟아져 내려라, 눈꽃♥」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「弾けた火花が雪の結晶に……なんとも夢のような光景ですね」"
translation = "「터진 불꽃이 눈 결정으로…… 참으로 꿈만 같은 광경이군요.」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「いつまでも見ていたい幻想的な世界ですが……花は散り、虹は消え、雪は解け……夢のような刻はやがて終わりを告げます……」"
translation = "「영원히 보고 싶은 환상적인 세계지만…… 꽃은 지고 무지개는 사라지며 눈은 녹고…… 꿈같은 시간은 이윽고 끝을 고합니다……」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ラスト決めるよ。息を揃えて──」"
translation = "「마지막 결정한다. 호흡을 맞춰서──♥」"

[[dialogue]]
speaker_original = "3人"
speaker_translation = "3명"
original = "「<ruby>夢幻六花<rt>むげんりっか</rt></ruby>！」"
translation = "「몽환육화!」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「すごいすごいすごーい！\u3000あ、こほん……進行忘れて夢中になっちゃったー。どうでしたか、マグダレナさん」"
translation = "「대단해 대단해 대단해! 아, 흠흠…… 진행도 잊고 넋을 잃어버렸네요. 어떠셨나요, 마그달레나 씨.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ふふ、感想を尋ねるなら、彼女に……ですね」"
translation = "「후후, 감상을 묻는다면 그녀에게……겠죠.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「オオヒメ様、あなたに捧げた私たちの神楽舞、ご満足いただけましたか」"
translation = "「오오히메 님, 당신에게 바친 저희의 카구라 춤, 만족하셨나요?♥」"

[[dialogue]]
speaker = "unk"
original = "これで駄目なら、もう打つ手は……"
translation = "「이걸로 안 된다면 이제 방법이……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「大丈夫ですよ……出てきたおみくじの結果は、本当に大吉……今、新たな未来が開かれました……！」"
translation = "「괜찮아요…… 나온 제비의 결과는 정말로 대길…… 지금, 새로운 미래가 열렸습니다……!」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「おお……おお……なんと美しい……！\u3000なんと輝かしい……！\u3000真に素晴らしい物を目の当たりにした時、紡ぐべき言葉を失ってしまうものなのだな……！」"
translation = "「오오…… 오오…… 어찌 이리 아름다운가……! 어찌 이리 빛나는가……! 진정 훌륭한 것을 목격했을 때, 자아낼 말을 잃어버린다는 것이 이런 것이었구나……!」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「そうだ……太古より人は歌い、踊り、描き、造り……数多の芸により知恵を育み、栄えてきた……」"
translation = "「그렇다…… 태고로부터 인간은 노래하고, 춤추고, 그리고, 만들고…… 수많은 기예를 통해 지혜를 기르며 번영해 왔다……」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「世界が失われれば、これほどの芸が消え……まだ見ぬ素晴らしい芸までもが失われてしまうのだな……」"
translation = "「세계가 사라지면 이 정도의 기예가 사라지고…… 아직 보지 못한 훌륭한 기예마저 잃어버리게 되는 것이었군……」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「私の胸に感動を呼び起こしてくれたこと、感謝するぞ……」"
translation = "「내 가슴에 감동을 불러일으켜 준 것, 감사하마……」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「あれれ。オオヒメさん、消えちゃった」"
translation = "「어라라. 오오히메 씨, 사라져 버렸어♥」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「満足して、今度こそフィーニスの塔へと還ったようですね」"
translation = "「만족하고 이번에야말로 피니스의 탑으로 돌아간 모양이네요.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「つまり、隠し芸大会は、大・成・功ね！\u3000みんな、お疲れさまー！」"
translation = "「즉, 장기 자랑 대회는 대·성·공이네! 다들 수고했어~!」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「オオヒメに重ねて礼を言わせてください。みなさまの力で世界は守られました。ありがとうございます」"
translation = "「오오히메를 대신해 감사를 전하게 해주세요. 여러분의 힘으로 세계는 지켜졌습니다. 감사합니다.」"

[[dialogue]]
speaker = "unk"
original = "もう大丈夫なの？"
translation = "「이제 괜찮은 거야?」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「はい。きっと今頃人間界では──」"
translation = "「네. 분명 지금쯤 인간계에서는──」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「む、空が……！」"
translation = "「음, 하늘이……!」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「フ……皆、うまくやってくれたようだな。祝いの準備をするとしようか」"
translation = "「후…… 다들 잘해준 모양이군. 축하 준비를 하도록 할까.」"

[[dialogue]]
speaker = "unk"
original = "こうして守護天使六柱はフィーニスの塔へと戻り、みんなの渾身の隠し芸によって、世界の崩壊は食い止められたのであった。"
translation = "이렇게 수호천사 육주는 피니스의 탑으로 돌아갔고, 모두의 혼신이 담긴 장기를 통해 세계의 붕괴는 막아낼 수 있었다."

