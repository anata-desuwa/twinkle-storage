[[dialogue]]
speaker = "unk"
original = "第４話,デート作戦！？,P"
translation = "제4화, 데이트 작전!?, P"

[[dialogue]]
speaker = "unk"
original = "今日は星徒会がないので、真っ直ぐ帰宅していると……"
translation = "오늘은 성도회가 없어서 곧장 귀가하고 있자니……"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「魔王さん、デートしよ！」"
translation = "「마왕 씨, 데이트하자!」"

[[dialogue]]
speaker = "unk"
original = "デート！！？"
translation = "데이트!!?"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「そう、デート！\u3000いいでしょ？\u3000ね、デートしよ？」"
translation = "「그래, 데이트! 좋지? 응, 데이트하자?」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「……え、急に言われても困る？\u3000デートしてくれないの？」"
translation = "「……어, 갑자기 말해도 곤란해? 데이트 안 해줄 거야?」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「ヤダヤダヤダヤダ！\u3000デートしてくれないとヤダ～っ！」"
translation = "「싫어싫어싫어싫어! 데이트 안 해주면 싫어~!」"

[[dialogue]]
speaker = "unk"
original = "初めて会った時みたいに、おもちゃを買ってもらえない子どものように地面を転げ回る煌嶺。"
translation = "처음 만났을 때처럼 장난감을 사주지 않는 아이처럼 바닥을 뒹구는 코우레이."

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「魔王さんのケチ！\u3000ドケチ！\u3000イジワル～！」"
translation = "「마왕 씨 구두쇠! 왕구두쇠! 심술쟁이~!」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「うぅ……私の体、あんなに好きにしてたくせに……飽きたら捨てちゃうんだ……」"
translation = "「으으…… 내 몸을 그렇게나 마음대로 했으면서…… 질리니까 버리는구나……」"

[[dialogue]]
speaker_original = "通行人Ａ"
speaker_translation = "행인 A"
original = "「やだ……痴情のもつれだわ……」"
translation = "「어머…… 치정 싸움인가 봐……」"

[[dialogue]]
speaker_original = "通行人Ｂ"
speaker_translation = "행인 B"
original = "「若いのにただれてるわ……やぁ～ね～」"
translation = "「젊은데 문란하네…… 정말 싫다~」"

[[dialogue]]
speaker = "unk"
original = "周りにヒソヒソされてる！？"
translation = "주변에서 수군거리고 있어!?"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「ねぇ、魔王さん、デートしてよ～」"
translation = "「저기, 마왕 씨, 데이트해줘~」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「……いい？\u3000やったぁ！\u3000ありがと、魔王さん！」"
translation = "「……해줄 거야? 얏호! 고마워, 마왕 씨!」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「それじゃ次の週末ね！\u3000楽しみにしてるから～！」"
translation = "「그럼 다음 주말에 봐! 기대하고 있을게~!」"

[[dialogue]]
speaker = "unk"
original = "そして約束通り、次の週末。"
translation = "그리고 약속대로 다음 주말."

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「やっほー、お待たせ～！\u3000じゃあデートいこっか！」"
translation = "「안녕, 오래 기다렸지~! 그럼 데이트 가자!」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「でもデートって何すればいいの？\u3000人間界の映画を見てたら、デートって楽しそうって思ったんだけど、何するのかよく知らないんだよね」"
translation = "「근데 데이트는 뭐 하면 되는 거야? 인간계 영화를 봤는데 데이트가 즐거워 보이긴 했지만, 뭘 하는지는 잘 모르겠단 말이지」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「どこに行って何するかは魔王さんにお任せするね。つまらなかったら処しちゃうかも♪」"
translation = "「어디 가서 뭐 할지는 마왕 씨한테 맡길게. 재미없으면 처단할지도♪」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「……とりあえずクレープ食べる？\u3000いいね、私クレープ好きだよ。かわいいし美味しいし」"
translation = "「……일단 크레이프 먹을래? 좋네, 나 크레이프 좋아해. 귀엽고 맛있으니까」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「こないだ私が買ったお店があるし、そこにしよっか」"
translation = "「얼마 전에 내가 산 가게가 있으니까 거기로 가자」"

[[dialogue]]
speaker = "unk"
original = "俺は王道のチョコバナナ、煌嶺は苺と生クリームのクレープを選んだ。"
translation = "나는 왕도인 초코 바나나, 코우레이는 딸기와 생크림 크레이프를 골랐다."

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「あむっ。ん～、おいし♪\u3000さすが私が買ったお店だよ」"
translation = "「아앙. 음~, 맛있다♪ 역시 내가 산 가게야」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「でもこれじゃクレープ食べてるだけだよね？\u3000１人で食べるのと変わらなくない？」"
translation = "「하지만 이러면 그냥 크레이프 먹는 것뿐이지? 혼자 먹는 거랑 다르지 않잖아?」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「……頼んだものを２人で食べさせ合う？\u3000へ～、そういうのもあるんだ」"
translation = "「……주문한 걸 둘이서 서로 먹여준다? 헤에~ 그런 것도 있구나」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「じゃあはい、食べていいよ、あ～ん。……どう、美味しい？」"
translation = "「그럼 자, 먹어도 돼, 아~앙. ……어때, 맛있어?」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「魔王さんのも食べさせて？\u3000あ～ん」"
translation = "「마왕 씨 것도 먹여줘. 아~앙」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「うん、こっちも美味しい♪」"
translation = "「응, 이쪽도 맛있다♪」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「でもデートらしくできたかな？\u3000普通に食べるのと変わらないような……違うような……う～ん」"
translation = "「근데 데이트답게 됐으려나? 그냥 먹는 거랑 별로 안 다른 것 같기도 하고…… 다른 것 같기도 하고…… 으음」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「ま、他にもデートらしいことしてみよっか。何がいいかな？」"
translation = "「뭐, 다른 데이트 같은 것도 해보자. 뭐가 좋을까?」"

[[dialogue]]
speaker = "unk"
original = "手を繋ぐとか？"
translation = "손을 잡는다거나?"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「あ、それは映画でもやってた気がする。じゃあやってみよっか」"
translation = "「아, 그건 영화에서도 했던 것 같아. 그럼 해보자」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「魔王さんの手を失礼……っと」"
translation = "「마왕 씨의 손을 실례…… 하구」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「ふんふん……魔王さんの手、思ったより大きいね。それにけっこう硬くて、男の人の手って感じ……？」"
translation = "「흠흠…… 마왕 씨 손, 생각보다 크네. 그리고 꽤 딱딱해서 남자 손이라는 느낌……?」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「ふにふに……ふにふに……お？\u3000おお？」"
translation = "「조물조물…… 조물조물…… 오? 오오?」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「なんかこう……落ち着かないような、ちょっとふわふわするような……不思議な感じ。でも嫌いじゃない……気がする」"
translation = "「뭔가 이렇게…… 안절부절못하겠는, 좀 둥둥 뜨는 것 같은…… 신기한 느낌. 근데 싫지는…… 않은 것 같아」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「……手を繋いでるから当たり前だけど、魔王さんと近いね」"
translation = "「……손을 잡고 있으니까 당연하지만 마왕 씨랑 가깝네」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「あ、あはは……一旦離れよっか。なんか変な気分になってきたかも……」"
translation = "「아, 아하하…… 일단 놓자. 왠지 묘한 기분이 된 것 같아……」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「じゃ、他にはデートで何するの？」"
translation = "「자, 그럼 다른 건 데이트 때 뭐 해?」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「ふむふむ……ショッピングしたりー、ゲームセンターで写真撮ったりー……なるほどなるほど」"
translation = "「흠흠…… 쇼핑도 하고~, 게임 센터에서 사진도 찍고~…… 그렇구나 그렇구나」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「じゃあそれ全部やってみよっか！」"
translation = "「그럼 그거 전부 해보자!」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「はぁ～……楽しかった♪\u3000デートって面白いものなんだね」"
translation = "「하아~…… 즐거웠어♪ 데이트는 재미있는 거구나」"

[[dialogue]]
speaker = "unk"
original = "あの煌嶺とデートすることになった時はいろんな意味で戦々恐々としたけど、思ったより普通のデートになった。"
translation = "그 코우레이와 데이트하게 됐을 때는 여러 의미로 전전긍긍했지만, 생각보다 평범한 데이트가 되었다."

[[dialogue]]
speaker = "unk"
original = "思いついたことを片っ端からしたせいで、もうクタクタだけど。"
translation = "생각난 걸 닥치는 대로 한 탓에 이미 녹초가 됐지만."

[[dialogue]]
speaker = "unk"
original = "恋愛に興味ないのに、どうして急にデートを？"
translation = "연애에 관심 없다더니 왜 갑자기 데이트를?"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「人間界の映画を見たって言ったじゃん？\u3000一応恋愛映画みたいなんだけど……」"
translation = "「인간계 영화를 봤다고 했잖아? 일단 연애 영화 같은 건데……」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「ある女性が恋をして、死ぬとわかってても子どもを産む──みたいな話だったんだよね」"
translation = "「어떤 여성이 사랑을 하고, 죽을 걸 알면서도 아이를 낳는다── 같은 이야기였어」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「それを見て思ったの。好きな人の子どもだから、煌嶺の座を追われるとわかってても産んだのかなって」"
translation = "「그걸 보고 생각했지. 좋아하는 사람의 아이니까 코우레이의 자리를 뺏길 걸 알면서도 낳은 걸까 하고」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「だから恋をすれば、先代の煌嶺──お母さんの気持ちがわかるかもって」"
translation = "「그래서 사랑을 하면 선대 코우레이── 어머니의 마음을 알 수 있을지도 모른다고」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「でもどうかな。やっぱりわかんないかも」"
translation = "「하지만 어떨까. 역시 모를 것 같기도 해」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「もしかすると、人を好きになるって気持ちが理解できたら……わかるかも？」"
translation = "「어쩌면 누군가를 좋아한다는 마음을 이해하게 되면…… 알게 될지도?」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「だからまたデートしてよ、魔王さん。もっとデートしたら、その気持ちがわかるかもしれないから」"
translation = "「그러니까 또 데이트해줘, 마왕 씨. 좀 더 데이트하면 그 마음을 알 수 있을지도 모르니까」"

[[dialogue]]
speaker = "unk"
original = "……わかった"
translation = "……알겠어"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「うん、ありがとう」"
translation = "「응, 고마워」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「あとね。映画ではね、見つめ合って口付けしてたんだ。それもデートなんだよね？」"
translation = "「그리고 말이야. 영화에서는 서로 마주 보고 입을 맞췄어. 그것도 데이트지?」"

[[dialogue]]
speaker = "unk"
original = "多分そう"
translation = "아마 그럴 거야"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「そっか……じゃあ──」"
translation = "「그렇구나…… 그럼──」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「ん……」"
translation = "「음……」"

[[dialogue]]
speaker = "unk"
original = "柔らかい感触が唇に触れる。それがキスだと気付いたのは、一瞬遅れてからだった。"
translation = "부드러운 감촉이 입술에 닿는다. 그것이 키스라는 걸 깨달은 건 한순간 늦은 뒤였다."

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「えへへ……キスしちゃった。ふわふわするけど、この気持ちの先に何があるのか、ちゃんと知りたいな」"
translation = "「에헤헤…… 키스해버렸다. 두근거리지만, 이 마음 끝에 뭐가 있는지 제대로 알고 싶어」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「じゃ、デートの約束忘れないでね。忘れたらほんとに処しちゃうから」"
translation = "「자, 데이트 약속 잊지 마. 잊으면 정말로 처단할 거니까」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「またねー☆」"
translation = "「또 봐─☆」"

