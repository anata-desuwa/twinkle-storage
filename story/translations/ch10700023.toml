[[dialogue]]
speaker = "unk"
original = "第３話,早朝チャンバラごっこ,P"
translation = "제3화, 이른 아침의 찬바라 놀이, P"

[[dialogue]]
speaker = "unk"
original = "その日、なんだかやけに早く目が覚めてしまった俺は、家で時間を無駄にするのももったいないと思い、早めに登校していた。"
translation = "그날, 왠지 꽤나 일찍 눈이 떠진 나는 집에서 시간을 낭비하는 것도 아깝다는 생각에 일찍 등교하고 있었다."

[[dialogue]]
speaker = "unk"
original = "そういえば流星星徒会に用事があったっけ"
translation = "그러고 보니 유성성도회에 용건이 있었지."

[[dialogue]]
speaker = "unk"
original = "早朝の散歩がてら、流星学園の方まで行くのもいいかもしれない──"
translation = "새벽 산책 삼아 유성학원 쪽까지 가는 것도 좋을지도 모르겠다──"

[[dialogue]]
speaker = "unk"
original = "流星学園までの道のりをのんびりと歩いていたら、朝の空気を切りさく見事な太刀筋の音が聞こえてきた。"
translation = "유성학원까지의 길을 한가로이 걷고 있으니, 아침 공기를 가르는 훌륭한 칼질 소리가 들려왔다."

[[dialogue]]
speaker = "ウズメイア"
original = "「はーっ！\u3000たっ──！\u3000やぁっ──！！」"
translation = "「하앗! 타앗──! 야아앗──!!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「──はぁああっ！！」"
translation = "「──하아아앗!!」"

[[dialogue]]
speaker = "unk"
original = "（ウズメの早朝鍛錬か……！）"
translation = "(우즈메의 새벽 단련인가……!)"

[[dialogue]]
speaker = "ウズメイア"
original = "「てぇぇいっ──！」"
translation = "「테이이이잇──!」"

[[dialogue]]
speaker = "unk"
original = "ちょうどキリのいいところまで終わったように思えたので、声をかけようと思ったその時──"
translation = "마침 딱 적당한 곳까지 끝난 것처럼 보여서 말을 걸려던 찰나──"

[[dialogue]]
speaker = "ウズメイア"
original = "「ふっ。またつまらぬ物を斬ってしまった……！」"
translation = "「훗. 또 하찮은 것을 베어 버렸군……!」"

[[dialogue]]
speaker = "unk"
original = "（あ、これは例の時代劇のマネ……！）"
translation = "(아, 이건 예의 시대극 흉내……!)"

[[dialogue]]
speaker = "ウズメイア"
original = "「よーし。次は薙刀術、基本の型・その参だし……！」"
translation = "「좋아. 다음은 치도술, 기본 형·제3번이라구……!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「うりゃりゃりゃりゃ～っ……！！」"
translation = "「으랴랴랴랴랴~……!!」"

[[dialogue]]
speaker = "unk"
original = "（見事な薙刀捌き……そして……！）"
translation = "(훌륭한 치도 다루기…… 그리고……!)"

[[dialogue]]
speaker = "ウズメイア"
original = "「しゅばばばばっ……！\u3000ふん、犬畜生にかける情けなし……！」"
translation = "「슈바바바바앗……! 흥, 개돼지에게 베풀 동정은 없다……!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「娘さん、怪我はないかい？\u3000……すまぬな。生憎だが拙者、名乗るほどの者ではござらぬ。御免！」"
translation = "「아가씨, 다친 곳은 없나? ……미안하군. 공교롭게도 소생, 통성명을 할 만한 자는 아니오. 실례!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「……く～っ♪\u3000やっぱり時代劇のマネすると、残心が捗るし～♪」"
translation = "「……크~♪ 역시 시대극 흉내를 내면 잔심이 잘 잡힌다구~♪」"

[[dialogue]]
speaker = "ウズメイア"
original = "「あっ、そうだ。せっかく傘の武器も手に入れたんだから……オンボロ傘シリーズのマネもやっちゃおっと♪」"
translation = "「앗, 맞다. 어렵게 우산 무기도 얻었으니까…… 낡은 우산 시리즈 흉내도 내 버려야지♪」"

[[dialogue]]
speaker = "ウズメイア"
original = "「許せねぇ……てめぇら人間じゃねぇっ！\u3000叩っ切って──」"
translation = "「용서 못 해…… 네놈들은 인간이 아니야! 베어 넘겨서──」"

[[dialogue]]
speaker = "ウズメイア"
original = "「────っ！？！？！？」"
translation = "「────!?!?!?!?」"

[[dialogue]]
speaker = "unk"
original = "おはよう"
translation = "좋은 아침."

[[dialogue]]
speaker = "ウズメイア"
original = "「いいいっ、いつからいたし～～～っ！？」"
translation = "「어어어, 언제부터 있었어어어~~~!?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「とほほ……まさか時代劇のマネしてるところ見られちゃうだなんて……いつもはこの時間、誰もいないはずなのにぃ！」"
translation = "「토호호…… 설마 시대극 흉내 내는 걸 들켜 버리다니…… 평소엔 이 시간에 아무도 없을 텐데에!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「……偶然、朝早く目が覚めちゃったの？\u3000そ、そっかぁ～……あ、ところで今見たものはどうかご内密に……」"
translation = "「……우연히 아침 일찍 눈이 떠진 거야? 그, 그렇구나~…… 아, 그런데 방금 본 건 부디 비밀로 해 줘……」"

[[dialogue]]
speaker = "unk"
original = "俺も時代劇、大好きだからね"
translation = "나도 시대극 정말 좋아하거든."

[[dialogue]]
speaker = "unk"
original = "正直、気持ちはわかるよ"
translation = "솔직히 그 기분 이해해."

[[dialogue]]
speaker = "ウズメイア"
original = "「だ──だよねっ！？\u3000あんなにカッコいいんだもん！\u3000思わずマネしたくなっちゃうのも仕方ないよね！？」"
translation = "「그──그렇지!? 그렇게 멋있는걸! 나도 모르게 따라 하고 싶어지는 것도 어쩔 수 없지!?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「見つかった時は思わず照れちゃったけど……よくよく考えれば別に全然平気な気がしてきたし！」"
translation = "「들켰을 때는 나도 모르게 쑥스러웠지만…… 가만히 생각해 보니 별로 전혀 상관없는 것 같기도 하고!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「オンボロ傘シリーズは不朽の名作だし、見られても恥ずかしいものじゃない！\u3000うん！」"
translation = "「낡은 우산 시리즈는 불후의 명작이고, 들켜도 창피한 게 아니야! 응!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「……ねぇ会長くん。何だかさっきからウズウズしてない？\u3000もしかして会長くんも、時代劇ごっこやってみたいって思ってたり……？」"
translation = "「……있잖아 회장군. 왠지 아까부터 몸이 근질근질하지 않아? 혹시 회장군도 시대극 놀이 해 보고 싶다고 생각하고 있거나……?」"

[[dialogue]]
speaker = "unk"
original = "──わかるか、ウズメ！"
translation = "──알겠어, 우즈메!"

[[dialogue]]
speaker = "ウズメイア"
original = "「そりゃ～時代劇を愛する仲間だし！\u3000どうどう、やっちゃう！？」"
translation = "「그야 시대극을 사랑하는 동료인걸! 어때어때, 해 버릴까!?」"

[[dialogue]]
speaker = "せつな"
original = "「なにやら稽古の気配がしたのでやってきたでござるが……主様とウズメ殿ではござりませぬか。おはようでござる」"
translation = "「무언가 수련하는 기척이 느껴져서 와 보았소만…… 주군과 우즈메 공이지 않소. 좋은 아침이오.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ござるちゃん！\u3000ちょうどいいところに！\u3000ねぇねぇ、一緒に時代劇ごっこ、やらない！？」"
translation = "「고자루 짱! 마침 잘 왔다! 저기 저기, 같이 시대극 놀이 하지 않을래!?」"

[[dialogue]]
speaker = "せつな"
original = "「ファっ！？\u3000いきなり謎のお誘いでござるが……」"
translation = "「화앗!? 갑자기 수수께끼의 권유이오만……」"

[[dialogue]]
speaker = "せつな"
original = "「主様の命とあらば、紫桜の里が忍・せつな！\u3000いくらでもお付き合いするでござる！」"
translation = "「주군의 명이라면 자앵의 마을 닌자 세츠나! 얼마든지 함께하겠소!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「悪行三昧、見捨てておけぬ！\u3000お天道様が許しても、この和傘侍が許さ～ん！\u3000悪代官よ、お主の悪行も今日までだし！！」"
translation = "「악행 삼매, 지켜보고만 있을 수 없지! 하늘이 용서해도 이 화사(和傘) 무사가 용서치 않는다! 악덕 사또여, 그대의 악행도 오늘까지라구!!」"

[[dialogue]]
speaker = "unk"
original = "出合え、出合ぇぇい！！"
translation = "게 섰거라, 게 섰거라!!"

[[dialogue]]
speaker = "unk"
original = "うぬ……曲者じゃ！"
translation = "으으…… 자객이로구나!"

[[dialogue]]
speaker = "せつな"
original = "「──シュタッ！\u3000我が屋敷の秘密を知ったとあっては、生かして帰すわけにはいかんでござる！\u3000覚悟！」"
translation = "「──슈탓! 우리 저택의 비밀을 알게 된 이상 살려 보낼 수 없소! 각오하시오!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「てぇ～いっ！！」"
translation = "「테~잇!!」"

[[dialogue]]
speaker = "せつな"
original = "「ぐぬぅ……やるでござるな！\u3000ただの素浪人ではないようでござるが……！」"
translation = "「구누우…… 제법이구려! 평범한 떠돌이 무사가 아닌 모양이오만……!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「余の顔を忘れるとは情けなし！\u3000控えおろう！\u3000この紋所が目に入らぬか～っ！！」"
translation = "「짐의 얼굴을 잊다니 한심하구나! 썩 물러가라! 이 문장이 눈에 들어오지 않느냐~!!」"

[[dialogue]]
speaker = "せつな"
original = "「──なぬーっ！？\u3000そ、そそ、その<ruby>御紋<rt>ごもん</rt></ruby>は……！！」"
translation = "「──나닛!? 그, 그그, 그 문장은……!!」"

[[dialogue]]
speaker = "せつな"
original = "「主様！\u3000まずいでござる、あの御紋を持つということは、きゃつは将軍っ……上様ということでござる～！？」"
translation = "「주군! 큰일이오, 저 문장을 가졌다는 것은 저자가 쇼군…… 상감마마라는 것이오~!?」"

[[dialogue]]
speaker = "unk"
original = "お手向かい致しますぞ！！"
translation = "맞서 싸우겠소!!"

[[dialogue]]
speaker = "unk"
original = "ええい、上様とて構わぬ！"
translation = "에잇, 상감마마라 해도 상관없다!"

[[dialogue]]
speaker = "ウズメイア"
original = "「かかってこいだし～～！！」"
translation = "「덤벼 보라구~~!!」"

[[dialogue]]
speaker = "フィオナ"
original = "「何だか騒がしいと思って来てみれば……い、いったい何事ですか、これは？」"
translation = "「왠지 소란스럽다 싶어 와 봤더니…… 이, 이게 대체 무슨 일인가요?」"

[[dialogue]]
speaker = "ソフィア"
original = "「もういい歳をした学園生なのに……会長さんも一緒になって、何をやってるんでしょう……」"
translation = "「이제 나이도 먹을 만큼 먹은 학생들인데…… 회장님도 같이 어울려서 대체 뭘 하고 계시는 건가요……」"

[[dialogue]]
speaker = "ウズメイア"
original = "「あー！\u3000ソフィ、おはよー！\u3000今ね、悪代官ごっこしてるし！」"
translation = "「아─! 소피, 안녕! 지금 말야, 악덕 사또 놀이 하고 있어!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ちょうど<ruby>腰元<rt>こしもと</rt></ruby>役がいなくて困ってたの！\u3000帯をほどかれて、あ～れ～ってするやつ！」"
translation = "「마침 시녀 역이 없어서 곤란했거든! 허리띠가 풀리면서 『아~레~』 하는 거!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「あれ、ソフィが晴れ着フォームに変身してくれたらバッチリじゃない！？\u3000ねーねー、一緒にやろ～！！」"
translation = "「그거 소피가 설빔 폼으로 변신해 주면 딱이겠는데!? 저기 저기, 같이 하자~!!」"

[[dialogue]]
speaker = "フィオナ"
original = "「ああ言っていますが……」"
translation = "「저렇게 말하고 있습니다만……」"

[[dialogue]]
speaker = "ソフィア"
original = "「知らない人です。行きましょう」"
translation = "「모르는 사람입니다. 가죠.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ちょっとちょっと～～！？\u3000何で無視するし～！？」"
translation = "「잠깐 잠깐~~!? 왜 무시하냐구~!?」"

[[dialogue]]
speaker = "unk"
original = "こうして第１回時代劇ごっこは終わった。次は俺が上様の役をやってみたいなぁ……"
translation = "이렇게 제1회 시대극 놀이는 끝났다. 다음엔 내가 상감마마 역을 해 보고 싶네……"

