[[dialogue]]
speaker = "unk"
original = "第３話,グレイス、動く,B"
translation = "제3화, 그레이스, 움직이다, B"

[[dialogue]]
speaker = "アナ"
original = "「おはようございます。極星学園のみなさん」"
translation = "「좋은 아침입니다. 극성학원 여러분」"

[[dialogue]]
speaker = "グレイス"
original = "「おはようございます！」"
translation = "「좋은 아침이에요!」"

[[dialogue]]
speaker = "マトイ"
original = "「元気そうだね。朝ごはんはちゃんと届いてた？」"
translation = "「기운차 보이네. 아침밥은 제대로 도착했어?」"

[[dialogue]]
speaker = "グレイス"
original = "「はい！\u3000給食委員会さんお手製のお弁当、堪能しました！\u3000とってもおいしかったです！」"
translation = "「네! 급식위원회 분들이 직접 만든 도시락, 만끽했습니다! 정말 맛있었어요!」"

[[dialogue]]
speaker = "サーシャ"
original = "「うふふ。それならよかったわ～♪」"
translation = "「우후후. 그렇다면 다행이네~♪」"

[[dialogue]]
speaker = "グレイス"
original = "「でもでも、量がもう少しあるともっと嬉しいかなって……！\u3000あとデザートも欲しいです！！」"
translation = "「하지만 하지만, 양이 조금 더 있으면 더 기쁠 것 같달까……! 그리고 디저트도 갖고 싶어요!!」"

[[dialogue]]
speaker = "チナ"
original = "「グレイス。お前マジで、遠慮って言葉を知らねーのか？」"
translation = "「그레이스. 너 진짜로, 염치라는 말을 모르냐?」"

[[dialogue]]
speaker = "レティシア"
original = "「ふふ、グレイス。足りないなら言ってくれればいいのに。お昼は、私のぶんをわけてあげるわね？」"
translation = "「후후, 그레이스. 부족하면 말해주지 그랬니. 점심은, 내 몫을 나눠줄게?」"

[[dialogue]]
speaker = "グレイス"
original = "「本当ですか！？\u3000嬉しいです～！！」"
translation = "「정말인가요!? 기뻐요~!!」"

[[dialogue]]
speaker = "unk"
original = "三者三様、いつも通りの極星星徒会のみんなだった。"
translation = "삼인삼색, 평소와 다름없는 극성 성도회 모두였다."

[[dialogue]]
speaker = "クロト"
original = "「今日は君たちに話を持ってきた。アナ、例のものを」"
translation = "「오늘은 너희에게 할 이야기가 있어. 아나, 예의 그것을」"

[[dialogue]]
speaker = "アナ"
original = "「はい。みなさん、こちらをどうぞ」"
translation = "「네. 여러분, 여기를 봐주세요」"

[[dialogue]]
speaker = "チナ"
original = "「……これ、ＤＩＳＣか？」"
translation = "「……이거, DISC인가?」"

[[dialogue]]
speaker = "アナ"
original = "「はい。貴女たちが所有していたものではなく、学園側で用意した端末です」"
translation = "「네. 여러분이 소유하고 있던 것이 아니라, 학원 측에서 준비한 단말기입니다」"

[[dialogue]]
speaker = "アナ"
original = "「位置情報を伝えるＧＰＳや、会長権限で内部データを閲覧できるよう改造してはいますが……アルタイルにいる間はこの端末をご使用ください」"
translation = "「위치 정보를 전달하는 GPS나, 회장 권한으로 내부 데이터를 열람할 수 있도록 개조하긴 했습니다만…… 알타이르에 있는 동안은 이 단말기를 사용해 주세요」"

[[dialogue]]
speaker = "チナ"
original = "「…………なんだって？」"
translation = "「…………뭐라고?」"

[[dialogue]]
speaker = "アナ"
original = "「セレスティアと転送装置。この２つの脅威を取り上げているため、貴女たちの脱走は困難です」"
translation = "「셀레스티아와 전송 장치. 이 두 가지 위협을 압수했기에, 여러분의 탈주는 어렵습니다」"

[[dialogue]]
speaker = "アナ"
original = "「そのため、今後の共闘路線のためにも、本日付けで極星学園のみなさんの軟禁を緩和するという方針でまとまりました」"
translation = "「그렇기에, 향후의 공투 노선을 위해서라도, 오늘 자로 극성학원 여러분의 연금을 완화한다는 방침으로 정리되었습니다」"

[[dialogue]]
speaker = "グレイス"
original = "「本当ですかっ！？」"
translation = "「정말인가요!?」"

[[dialogue]]
speaker = "アナ"
original = "「はい。外出したい時は星徒会にご連絡ください」"
translation = "「네. 외출하고 싶을 때는 성도회에 연락해 주세요」"

[[dialogue]]
speaker = "アナ"
original = "「私たちの監視下でなら、学園内の散策や街への買い物など、ご自由にどうぞ」"
translation = "「저희의 감시하에서라면, 학원 내 산책이나 거리 쇼핑 등, 자유롭게 하셔도 좋습니다」"

[[dialogue]]
speaker = "グレイス"
original = "「おぉおおっ……！\u3000やりました、これでお外に行けます！！」"
translation = "「오오오옷……! 해냈어요, 이걸로 밖에 나갈 수 있어요!!」"

[[dialogue]]
speaker = "チナ"
original = "「そう──か」"
translation = "「그렇──나」"

[[dialogue]]
speaker = "レティシア"
original = "「親切にして、寝返るのを期待しているのかしら？\u3000だったら的外れもいいところだわ」"
translation = "「친절하게 대해줘서, 변절하기를 기대하고 있는 걸까? 그렇다면 번지수가 틀려도 한참 틀렸어」"

[[dialogue]]
speaker = "クロト"
original = "「どう取るかは君たちの自由だ。ともかく、俺たちの考えは伝えてるとおりだよ」"
translation = "「어떻게 받아들일지는 너희의 자유다. 아무튼, 우리의 생각은 전한 대로야」"

[[dialogue]]
speaker = "チナ"
original = "「デネブとアルタイルの、共存の道……」"
translation = "「데네브와 알타이르의, 공존의 길……」"

[[dialogue]]
speaker = "クロト"
original = "「ああ。デネブ世界のここ１０年のことは、チナにたくさん教えてもらった」"
translation = "「아아. 데네브 세계의 지난 10년 동안의 일은, 치나에게 많이 들었어」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「今度は私たちの番ってこと！\u3000アルタイル世界のこと、たくさん見て、知ってほしいってわけね！」"
translation = "「이번엔 우리 차례라는 거! 알타이르 세계의 일, 많이 보고, 알아줬으면 좋겠다는 거지!」"

[[dialogue]]
speaker = "アナ"
original = "「いずれ私たちは、グレイスさんが使用していた転送装置を使ってデネブへ──ルヴィネさんに会いに行きます」"
translation = "「조만간 저희는, 그레이스 씨가 사용하던 전송 장치를 사용해 데네브로── 루비네 씨를 만나러 갈 것입니다」"

[[dialogue]]
speaker = "アナ"
original = "「その際、貴女方も連れていくつもりです。天界での傷はまだ癒えていないはず……その治療期間を、アルタイルの理解のために使ってください」"
translation = "「그때, 여러분도 데려갈 생각입니다. 천계에서의 상처는 아직 아물지 않았을 터…… 그 치료 기간을, 알타이르의 이해를 위해 사용해 주세요」"

[[dialogue]]
speaker = "レティシア"
original = "「口では何とでも言えるわね。そんなこと言って、油断をさせようとしてもそうはいかないわ」"
translation = "「말로는 뭔들 못 하겠어. 그런 말을 해서, 방심하게 하려 해도 그렇게는 안 돼」"

[[dialogue]]
speaker = "クロト"
original = "「どこまで信用してもらえるかわからないけど……気が向いたら連絡をくれ」"
translation = "「어디까지 신용해 줄지는 모르겠지만…… 마음이 내키면 연락해 줘」"

[[dialogue]]
speaker = "クロト"
original = "「俺たちの世界、アルタイルを。君たちの目で見て、肌で感じて……理解してくれると嬉しい」"
translation = "「우리의 세계, 알타이르를. 너희의 눈으로 보고, 피부로 느끼며…… 이해해 준다면 기쁘겠어」"

[[dialogue]]
speaker = "unk"
original = "いきなり自由になったところで、彼女たちも動きづらいだろうか。ある程度の説得が出来たとはいえ、デネブにおいて緋宮クロトは『裏切り者』だ。"
translation = "갑자기 자유로워진들, 그녀들도 움직이기 힘들까. 어느 정도 설득이 되었다고는 해도, 데네브에서 히노미야 쿠로토는 『배신자』다."

[[dialogue]]
speaker = "unk"
original = "善意の裏に何かがあると疑いを向けられても仕方がない──"
translation = "선의 뒤에 무언가가 있다고 의심을 사도 어쩔 수 없다──"

[[dialogue]]
speaker = "クロト"
original = "「……そう、思ってたんだけどな」"
translation = "「……그렇게, 생각했었는데 말이지」"

[[dialogue]]
speaker = "マトイ"
original = "「また来たぁ！？」"
translation = "「또 왔어!?」"

[[dialogue]]
speaker = "グレイス"
original = "『マトイさん！\u3000私、流星学園の星徒会室に遊びに行きたいです！！』"
translation = "『마토이 씨! 저, 유성학원의 성도회실에 놀러 가고 싶어요!!』"

[[dialogue]]
speaker = "マトイ"
original = "「あ、う、うんっ。ちょっと待ってね……？」"
translation = "「아, 우, 응. 잠깐만 기다려 줄래……?」"

[[dialogue]]
speaker = "マトイ"
original = "「会長。グレイスちゃんが──」"
translation = "「회장님. 그레이스짱이──」"

[[dialogue]]
speaker = "クロト"
original = "「……ここまで聞こえた。フィオナへの連絡もあるし、俺も同行するよ」"
translation = "「……여기까지 들렸어. 피오나에게 연락할 일도 있고, 나도 동행할게」"

[[dialogue]]
speaker = "ルリエル"
original = "「流星星徒会へようこそなのです、デネブの星騎士さん！\u3000４っ！」"
translation = "「유성 성도회에 오신 것을 환영하는 거예요, 데네브의 성기사님! 4!」"

[[dialogue]]
speaker = "グレイス"
original = "「はい！\u3000いきなり訪ねたのに、まさかＵＭＯにまで誘っていただけるだなんて光栄です！\u3000８！」"
translation = "「네! 갑자기 방문했는데, 설마 UMO에까지 초대해 주시다니 영광입니다! 8!」"

[[dialogue]]
speaker = "セーラ"
original = "「我が星徒会では、ゲームでお客さんを歓迎するのが習わしだからね～。よーし、お姉さんは３を２枚出しちゃうぞー♪」"
translation = "「우리 성도회에서는, 게임으로 손님을 환영하는 것이 관례니까 말이야~. 좋아, 언니는 3을 2장 내버리겠어~♪」"

[[dialogue]]
speaker = "ユウリ"
original = "「平行世界でもＵＭＯってあるんだなあ。まあゆっくりしていけよ。スキップ！」"
translation = "「평행세계에도 UMO라는 게 있구나. 뭐 천천히 즐기다 가라고. 스킵!」"

[[dialogue]]
speaker = "ルリエル"
original = "「ああっ、飛ばされちゃいました～っ！？」"
translation = "「아앗, 건너뛰어 버렸어요~!?」"

[[dialogue]]
speaker = "ソフィア"
original = "「まさか平行世界の方にまで恥をさらすことになるだなんて……」"
translation = "「설마 평행세계 분에게까지 망신을 당하게 될 줄이야……」"

[[dialogue]]
speaker = "マトイ"
original = "「お、お騒がせしちゃってごめんなさい……！」"
translation = "「버, 번거롭게 해드려서 죄송해요……!」"

[[dialogue]]
speaker = "フィオナ"
original = "「構いませんよ。極星学園の方とは、以前から交流してみたいと思っていましたから」"
translation = "「상관없답니다. 극성학원 분과는, 이전부터 교류해 보고 싶다고 생각했으니까요」"

[[dialogue]]
speaker = "ソフィア"
original = "「名誉のために言っておきますが、ゲームで歓迎する習わしなんてありません。流星星徒会は、フィオナ会長率いるとても真面目な組織で──」"
translation = "「명예를 위해 말해둡니다만, 게임으로 환영하는 관례 같은 건 없습니다. 유성 성도회는, 피오나 회장님이 이끄는 매우 진지한 조직으로──」"

[[dialogue]]
speaker = "セーラ"
original = "「ソフィアちゃんもＵＭＯ混ざらない？\u3000大勢の方が楽しいよ～♪」"
translation = "「소피아짱도 UMO 섞이지 않을래? 머릿수가 많은 게 즐겁다구~♪」"

[[dialogue]]
speaker = "ソフィア"
original = "「やりません！\u3000まったくもう……！！」"
translation = "「안 해요! 정말이지 정말……!!」"

[[dialogue]]
speaker = "unk"
original = "和気あいあいとした雰囲気に似合わないけれど、用件をすまさなくてはならない。"
translation = "화기애애한 분위기에 어울리지는 않지만, 용건을 마쳐야 한다."

[[dialogue]]
speaker = "unk"
original = "俺はジグの星眼による未来の情報と、今後の方針についてをフィオナに伝えた──"
translation = "나는 지그의 성안에 의한 미래 정보와, 향후 방침에 대해 피오나에게 전했다──"

[[dialogue]]
speaker = "クロト"
original = "「……というわけだ。ごめん、フィオナにも事前に話を通しておくべきだった」"
translation = "「……라는 거다. 미안, 피오나에게도 사전에 이야기를 해뒀어야 했는데」"

[[dialogue]]
speaker = "フィオナ"
original = "「大丈夫ですよ。方々に確認を取っていては、どうしても初動が遅くなります。それに私も同じ気持ちですから」"
translation = "「괜찮아요. 여기저기 확인을 거치다 보면, 아무래도 초동이 늦어지니까요. 게다가 저도 같은 마음이니까요」"

[[dialogue]]
speaker = "フィオナ"
original = "「前回のフィヴォス流星群の折……新星学園のみなさんにはたくさん助けていただきました」"
translation = "「지난번 피보스 유성우 때…… 신성학원 여러분께 많은 도움을 받았습니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「使徒となった姉さんの命を、一時は諦めていた私を説得してくださったのも、みなさんです」"
translation = "「사도가 된 언니의 목숨을, 한때는 포기했던 저를 설득해 주신 것도, 여러분입니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「──ルヴィネさんを救いましょう。そのためなら、流星学園も協力は惜しみません」"
translation = "「──루비네 씨를 구하죠. 그러기 위해서라면, 유성학원도 협력을 아끼지 않겠습니다」"

[[dialogue]]
speaker = "クロト"
original = "「……ありがとう、フィオナ」"
translation = "「……고마워, 피오나」"

[[dialogue]]
speaker = "フィオナ"
original = "「──それにしても」"
translation = "「──그나저나」"

[[dialogue]]
speaker = "グレイス"
original = "「あの、こっちの世界でドロー２の重ね出しはできますか！？」"
translation = "「저기, 이쪽 세계에서 드로우 2 겹쳐 내기가 가능한가요!?」"

[[dialogue]]
speaker = "セーラ"
original = "「ローカルルールだけど、うちのシマではあり！」"
translation = "「로컬 룰이지만, 우리 구역에선 가능!」"

[[dialogue]]
speaker = "グレイス"
original = "「いいことを聞きました！\u3000貯めに貯めたヤツを今ここで解放します！\u3000てぇい！！」"
translation = "「좋은 정보를 들었습니다! 모으고 모은 녀석을 지금 여기서 해방합니다! 테잇!!」"

[[dialogue]]
speaker = "セーラ"
original = "「始まっちゃったね～♪\u3000うちも乗るよ～。ドロー２追加っ♪」"
translation = "「시작되어 버렸네~♪ 나도 탈게~. 드로우 2 추가♪」"

[[dialogue]]
speaker = "ユウリ"
original = "「冷静に考えると普通にクソゲーだよな。最初にドロー２尽きたやつが負けだし……まあ、乗るけどな！」"
translation = "「냉정하게 생각하면 그냥 망겜이잖아. 처음에 드로우 2 다 떨어진 녀석이 지는 거고…… 뭐, 타겠지만 말이야!」"

[[dialogue]]
speaker = "ルリエル"
original = "「ふっふっふ～！\u3000これまでの敗北でルリエルも学んでいるのですよ～！\u3000ドロー２、ゴー！」"
translation = "「훗훗후~! 그동안의 패배로 루리앨도 배운 거예요~! 드로우 2, 고!」"

[[dialogue]]
speaker = "フィオナ"
original = "「グレイスさん。とても賑やかで、楽しい方ですね」"
translation = "「그레이스 씨. 매우 활기차고, 즐거운 분이시네요」"

[[dialogue]]
speaker = "フィオナ"
original = "「彼女を見ていると、ルヴィネさんを何としても助けなくては……と。改めて思ってしまいますね」"
translation = "「그녀를 보고 있으면, 루비네 씨를 어떻게 해서든 구해야만…… 하고. 다시금 생각하게 되네요」"

[[dialogue]]
speaker = "フィオナ"
original = "「あんなに優しい女の子の笑顔を、曇らせたくありませんから」"
translation = "「저렇게 상냥한 여자아이의 미소를, 흐리게 하고 싶지 않으니까요」"

[[dialogue]]
speaker = "ルリエル"
original = "「ひえ～っ！？\u3000もうスキップはやめて欲しいのです！\u3000散々カードを引いて、手札がうちわみたいになってるのに～！？」"
translation = "「히에~!? 이제 스킵은 그만해줬으면 하는 거예요! 잔뜩 카드를 뽑아서, 손패가 부채처럼 되어 있는데~!?」"

[[dialogue]]
speaker = "グレイス"
original = "「ふふふ、まだまだ！\u3000ルリエルさんにはこのまま沈んでもらいます！\u3000スキップ２枚目！！」"
translation = "「후후후, 아직 멀었어요! 루리앨 씨는 이대로 침몰해 주셔야겠습니다! 스킵 2장째!!」"

[[dialogue]]
speaker = "ルリエル"
original = "「うわ～ん！\u3000血も涙もないのです～っ！？」"
translation = "「우와앙! 피도 눈물도 없는 거예요~!?」"

[[dialogue]]
speaker = "マトイ"
original = "「優しい……かな？」"
translation = "「상냥…… 하려나?」"

[[dialogue]]
speaker = "フィオナ"
original = "「げ、ゲームですので……」"
translation = "「게, 게임이니까요……」"

[[dialogue]]
speaker = "unk"
original = "その後もグレイスは、カフェテリアや図書館、街の散策などをリクエストし、マトイを振り回し続けるのだった──"
translation = "그 후로도 그레이스는, 카페테리아나 도서관, 거리 산책 등을 리퀘스트하며, 마토이를 계속 휘두르는 것이었다──"

