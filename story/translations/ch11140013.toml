[[dialogue]]
speaker = "unk"
original = "第３話,デネブ探訪,P"
translation = "제3화, 데네브 탐방"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ん……平行世界間の移動は、問題なしね」"
translation = "「음…… 평행세계 간의 이동은 문제없네」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ごめんなさい魔王。まだチナたちがアルタイルから帰る日は先だけれど……こっちの世界にいる幼い彼女たちのことが気になってしまって」"
translation = "「미안해 마왕. 아직 치나 일행이 알타이르에서 돌아오는 날은 멀었지만…… 이쪽 세계에 있는 어린 그녀들이 걱정돼서」"

[[dialogue]]
speaker = "unk"
original = "改良された平行世界間の転送装置は、アルタイルとデネブの双方から、同時にヒトを送り合い、交換できるようになった。"
translation = "개량된 평행세계 간의 전송 장치는 알타이르와 데네브 양측에서 동시에 사람을 보내 서로 교환할 수 있게 되었다."

[[dialogue]]
speaker = "unk"
original = "この機能により、双方の世界に同一存在がいたとしても、予定を合わせて人物を交換すれば、意識の昏倒は起こらない。"
translation = "이 기능 덕분에 양쪽 세계에 동일 존재가 있더라도 일정을 맞춰 인물을 교환하면 의식 혼탁은 일어나지 않는다."

[[dialogue]]
speaker = "unk"
original = "……逆に言うと、チナたちがアルタイルに出向いている間は、彼女らの同一存在はデネブに遊びに来ていることになる。"
translation = "……반대로 말하면 치나 일행이 알타이르에 가 있는 동안은 그녀들의 동일 존재가 데네브에 놀러 와 있는 셈이 된다."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「アルタイルのチナたちの様子を見るためにも、今日１日は、デネブで過ごしてもいいかしら？」"
translation = "「알타이르의 치나 일행의 모습을 보기 위해서라도 오늘 하루는 데네브에서 지내도 될까?」"

[[dialogue]]
speaker = "unk"
original = "こっちの母さんやアポロにも挨拶したいから"
translation = "이쪽 어머니나 아폴로에게도 인사하고 싶으니까"

[[dialogue]]
speaker = "unk"
original = "問題ないよ"
translation = "문제없어"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「そう言ってくれると助かるわ。ついでと言ったら何だけど、デネブの流星市国を案内させて」"
translation = "「그렇게 말해주니 고맙네. 겸사겸사라고 하긴 그렇지만 데네브의 유성시국을 안내해 줄게」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「まだ完全に復興しているとは言えないけれど……全ての戦いが終わった今、デネブは平和そのもの」"
translation = "「아직 완전히 부흥했다고는 할 수 없지만…… 모든 싸움이 끝난 지금 데네브는 평화 그 자체」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「貴方に対する誤解も解けているから『空間の魔女』の魔法で身を隠す必要もないわ」"
translation = "「당신에 대한 오해도 풀렸으니까 『공간의 마녀』의 마법으로 몸을 숨길 필요도 없어」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「たくさん迷惑をかけてきたお詫びに、貴方をもてなしたいの。今日はゆっくり羽を伸ばしていって頂戴？」"
translation = "「잔뜩 폐를 끼쳤던 사죄로 당신을 대접하고 싶어. 오늘은 푹 쉬다 가줘?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ここが極星学園の中庭ね。広さ自体は、新星学園とほとんど変わらないかしら」"
translation = "「여기가 극성학원의 중정이야. 넓이 자체는 신성학원과 거의 다르지 않을까」"

[[dialogue]]
speaker = "unk"
original = "カフェテリアや大聖堂の場所も同じだ"
translation = "카페테리아나 대성당의 위치도 같아"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「そうね。極星学園の建設にあたって、元あった建物から参考にした点も多いの」"
translation = "「맞아. 극성학원을 건설할 때 원래 있던 건물에서 참고한 점도 많거든」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「アルタイルのアリーナみたいに、再現できていない場所もあるけれど……魔王が望むならどこでも案内するわ」"
translation = "「알타이르의 아레나처럼 재현하지 못한 장소도 있지만…… 마왕이 원한다면 어디든 안내할게」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「お互いの良いところをまねて、より良い学園を目指していけたらいいわね」"
translation = "「서로의 좋은 점을 본받아서 더 좋은 학원을 목표로 해 나갈 수 있으면 좋겠네」"

[[dialogue]]
speaker = "unk"
original = "これまでデネブを訪れた回数は２回──１度目はチナの自爆を防いだ時の事故で。２度目は『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』との決着のために乗り込んだ。"
translation = "지금까지 데네브를 방문한 횟수는 2번── 첫 번째는 치나의 자폭을 막았을 때의 사고로. 두 번째는 『<ruby>XELOS<rt>제로스</rt></ruby>』와의 결착을 위해 쳐들어왔을 때였다."

[[dialogue]]
speaker = "unk"
original = "だからこんなにも穏やかな気持ちでデネブの世界を回れるのは初めてのこと。１０年も未来を進む流星市国、楽しませてもらおう──"
translation = "그래서 이렇게나 평온한 기분으로 데네브의 세계를 도는 것은 처음 있는 일. 10년이나 미래를 앞서가는 유성시국, 즐겨보도록 하자──"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「そろそろお昼時だし、何か食べましょうか。魔王、希望はあるかしら？」"
translation = "「슬슬 점심때인데 뭔가 먹을까. 마왕, 희망하는 곳 있어?」"

[[dialogue]]
speaker = "unk"
original = "ルヴィネのお気に入りの店だよな"
translation = "루비네가 좋아하는 가게지?"

[[dialogue]]
speaker = "unk"
original = "『火仙』に行きたい"
translation = "『카센』에 가고 싶어"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「そうだけど──どうしてそのことを知っているの？」"
translation = "「그렇긴 한데── 어떻게 그 사실을 알고 있어?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「エステルと私が話しているのを聞いていた……？\u3000そう、『空間の魔女』の力で、私のすぐ傍にいた時があったのね」"
translation = "「에스텔과 내가 대화하는 걸 들었어……? 그래, 『공간의 마녀』의 힘으로 내 바로 곁에 있었을 때가 있었지」"

[[dialogue]]
speaker = "unk"
original = "担々麺はゴマが命！"
translation = "탄탄면은 깨가 생명이야!"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「その通りよ！！\u3000よくわかっているじゃない！！」"
translation = "「그 말대로야!! 잘 알고 있잖아!!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……昔は食べ物にこだわりなんてなかったわ。でもベアトたちのおかげで、食事を楽しむようになって──」"
translation = "「……옛날엔 음식에 고집 같은 거 없었어. 하지만 베아트 일행 덕분에 식사를 즐기게 되어서──」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「最初は『フリ』だったのよ。周りに怪しまれないようにしないとダメだって思って……」"
translation = "「처음엔 『척』이었어. 주변에서 의심하지 않도록 해야 한다고 생각해서……」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「でも色々な食事を試しているうちに、自分の嗜好がわかってきて──こだわりも出てきた……」"
translation = "「하지만 여러 식사를 시도하는 동안 자신의 기호를 알게 되었고── 고집도 생겨났어……」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「自覚していなかったけれど、女神の幼体としての私は、とっくに壊れていたんだと思う。そのことに、魔王と相対するまで気づかなかった……」"
translation = "「자각하지 못했지만 여신의 유체로서의 나는 이미 망가져 있었다고 생각해. 그 사실을 마왕과 상대하기 전까지 깨닫지 못했어……」"

[[dialogue]]
speaker = "unk"
original = "ルヴィネはもう傀儡じゃない"
translation = "루비네는 이제 꼭두각시가 아니야"

[[dialogue]]
speaker = "unk"
original = "大切なのは『今』だ"
translation = "중요한 건 『지금』이야"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「そうね──全部、貴方のおかげよ」"
translation = "「그래── 전부 당신 덕분이야」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「それじゃあ『火仙』に行きましょうか。オススメのメニューから何から、全部教えてあげるわ」"
translation = "「그럼 『카센』으로 갈까. 추천 메뉴부터 하나하나 전부 가르쳐 줄게」"

[[dialogue]]
speaker = "unk"
original = "そうしてルヴィネに案内されて、デネブの流星市国を満喫し──その足でレジスタンスのアジトにも訪れた。"
translation = "그렇게 루비네의 안내를 받아 데네브의 유성시국을 만끽하고── 그 길로 레지스탕스의 은신처에도 방문했다."

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「よう、２人とも！\u3000わざわざ顔を見せに来てくれたのか！」"
translation = "「여어, 둘 다! 일부러 얼굴 보러 와준 건가!」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「いらっしゃ～い♪\u3000子供たちもみんな元気にしてるわよ」"
translation = "「어서 와~♪ 아이들도 모두 잘 지내고 있어」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「感謝するわ──ベアトたちも元気そうね。お土産があるから皆で食べて頂戴」"
translation = "「감사해── 베아트 일행도 건강해 보이네. 선물이 있으니까 다 같이 먹으렴」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「くんくん！\u3000甘いおやつの香り……これはおまんじゅうですね！」"
translation = "「킁킁! 달콤한 과자 냄새…… 이건 만쥬네요!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「よくわかるわね。帰り道で見つけて買ったの──デネブまんじゅうよ。どうぞ？」"
translation = "「잘 아는구나. 오는 길에 발견해서 샀어── 데네브 만쥬야. 자?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ありがと！\u3000天使のお姉ちゃん！」"
translation = "「고마워! 천사 언니!」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「まさか平行世界の名前が付いたお菓子が作られるだなんてなぁ……」"
translation = "「설마 평행세계의 이름이 붙은 과자가 만들어질 줄이야……」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ふふ。世界門の管理は大変だけれど、これからもたくさん交流していくだろうし……いい傾向じゃないかしら♪」"
translation = "「후후. 세계문의 관리는 힘들지만 앞으로도 잔뜩 교류해 나갈 테니까…… 좋은 경향 아닐까♪」"

[[dialogue]]
speaker = "unk"
original = "アルタイルまんじゅうも、そのうちできそう"
translation = "알타이르 만쥬도 조만간 생기겠네"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「そうなったら味比べね。ふふっ」"
translation = "「그렇게 되면 맛 비교네. 후후」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「そういえば魔王。もうじき日も暮れるけど、今日はどこに泊まるんだ？」"
translation = "「그러고 보니 마왕. 곧 해가 저무는데 오늘은 어디서 묵을 거냐?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「極星の学園寮に空いている部屋があるから、そこを使ってもらう予定よ」"
translation = "「극성의 학원 기숙사에 비어 있는 방이 있으니까 거기를 쓰게 할 예정이야」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「え～、せっかく来てくれたんだし、ここに泊まっていけばいいじゃない！\u3000空間魔法で、部屋はいくらでも増やせるし」"
translation = "「에~, 기껏 와줬는데 여기서 자고 가면 좋잖아! 공간 마법으로 방은 얼마든지 늘릴 수 있고」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ああ。ルヴィネもどうだ？\u3000遠慮はいらないぞ！」"
translation = "「그래. 루비네도 어때? 사양할 거 없다!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「でも、迷惑じゃあ……」"
translation = "「하지만 폐가 되지 않을지……」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「そんなことないさ。子供たちも、きっとお前と話したがってる」"
translation = "「그럴 리 있나. 아이들도 분명 너와 얘기하고 싶어 할 거다」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「平行世界の自分が仲良くしてる相手だもの。ねぇ、みんな？」"
translation = "「평행세계의 자신이 사이좋게 지내는 상대인걸. 그치, 얘들아?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「はい！\u3000ルヴィネさんとお話、してみたいです……！」"
translation = "「네! 루비네 씨와 이야기, 해보고 싶어요……!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……ベアト」"
translation = "「……베아트」"

[[dialogue]]
speaker = "unk"
original = "お言葉に甘えちゃおうか"
translation = "호의를 받아들일까"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ええ──そうね。そうしましょうか」"
translation = "「응── 그래. 그러자」"

[[dialogue]]
speaker = "unk"
original = "そうして俺とルヴィネは、アルタイルからやってきたベアトリスたちに囲まれながら、賑やかな外泊を楽しんだ。"
translation = "그렇게 나와 루비네는 알타이르에서 온 베아트리스 일행에게 둘러싸여 시끌벅적한 외박을 즐겼다."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「──アポロとリノに、色々なところに連れて行ってもらっているの？」"
translation = "「──아폴로와 리노가 여러 곳에 데려다주고 있어?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ふふ……よかったら詳しく聞かせて頂戴？\u3000デネブのこと、もっと好きになってくれると嬉しいわ」"
translation = "「후후…… 괜찮다면 자세히 들려주겠니? 데네브를 좀 더 좋아해 준다면 기쁘겠어」"

[[dialogue]]
speaker = "unk"
original = "──幼いベアトリスたちに囲まれて、穏やかにほほ笑むルヴィネは、本当に幸せそうで。"
translation = "──어린 베아트리스 일행에게 둘러싸여 온화하게 미소 짓는 루비네는 정말 행복해 보였다."

[[dialogue]]
speaker = "unk"
original = "ルヴィネを救うことが出来て良かったと、俺は改めて思うのだった──"
translation = "루비네를 구할 수 있어서 다행이라고 나는 새삼 생각하는 것이었다──"

