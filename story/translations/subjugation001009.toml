[[dialogue]]
speaker = "unk"
original = "果たして、新種のモンスターは見事に討ち果たされ、今度こそ瘴気も残らず、完全な消滅が確認された。"
translation = "과연 신종 몬스터는 훌륭하게 토벌되었고, 이번에야말로 장기도 남지 않은 채 완전한 소멸이 확인되었다."

[[dialogue]]
speaker = "unk"
original = "そして――"
translation = "그리고──"

[[dialogue]]
speaker = "unk"
original = "みんな、お疲れ様！\u3000乾杯！"
translation = "모두들 수고했어! 건배!"

[[dialogue]]
speaker_original = "クラスメイト達"
speaker_translation = "반 친구들"
original = "「カンパーイ！！！」"
translation = "「건배!!」"

[[dialogue]]
speaker = "unk"
original = "モンスターを倒した後、みんなでお疲れ様会をすることになった。"
translation = "몬스터를 쓰러뜨린 후, 모두 함께 뒤풀이를 하게 되었다."

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「カンパーイ♪\u3000そして、いただきますなのだ～！\u3000もぐもぐ♪」"
translation = "「건배♪ 그리고 잘 먹는 것이다~! 우적우적♪」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「もう、アルモタヘルったら、またそんな沢山、肉料理を頼んで。１人だけガッツリ夕食みたいになってるじゃないですか」"
translation = "「정말이지, 아르모타헬도 참, 또 그렇게 많이 고기 요리를 주문하고. 혼자서만 든든한 저녁 식사처럼 되어버렸잖아요.」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「鬼ごっこに戦闘にと、沢山動き回ってお腹が空いたから、その分の補給なのだ！」"
translation = "「숨바꼭질에 전투에, 많이 돌아다녀서 배가 고프니까 그만큼 보충하는 것이다!」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「それにこうして、美味なお肉を食べていると、生きていてよかったと実感できるのだ♪\u3000もぐもぐ♪」"
translation = "「게다가 이렇게 맛있는 고기를 먹고 있으면 살아있길 잘했다고 실감할 수 있는 것이다♪ 우적우적♪」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「一時はどうなるかと思いましたが、お２人が無事でよかったです」"
translation = "「한때는 어떻게 될까 싶었지만, 두 분이 무사해서 다행이에요.」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「ありがとうございます、ナミエル。私たちのことを諦めずに戦ってくれて」"
translation = "「감사합니다, 나미엘. 저희를 포기하지 않고 싸워주셔서.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「いえ。あれはその、星騎士として……当然のことをしただけと言いますか……」"
translation = "「아니요. 그건 그, 성기사로서…… 당연한 일을 했을 뿐이라고나 할까……」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「それに皆さま、ママダレナって呼んでくれて、とても嬉しかったです♪」"
translation = "「게다가 여러분이 마마달레나라고 불러줘서 정말 기뻤어요♪」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「ナミエルも、ね？\u3000ふふっ♪」"
translation = "「나미엘도, 말이지? 후훗♪」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「う……」"
translation = "「우……」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「そ、そう呼んで欲しいって言っていましたから……」"
translation = "「그, 그렇게 불러달라고 말했으니까요……」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「我のことも、ちゃんとアルモたんと呼んでくれて、嬉しかったぞ！」"
translation = "「이 몸의 것도 제대로 알모땅이라고 불러줘서 기뻤다!」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「皆さまのおかげで、こうしてこの場にいられます」"
translation = "「여러분 덕분에 이렇게 이 자리에 있을 수 있어요.」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「だから改めて、ナミエル」"
translation = "「그러니 다시 한번, 나미엘.」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「これから友達として、仲よくして頂けますか？」"
translation = "「앞으로 친구로서 사이좋게 지내 주시겠어요?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「……！\u3000はい。それは、もちろんです」"
translation = "「……! 네. 그건 물론이죠.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「出会いは大切にしたいですから。その……ママダレナ」"
translation = "「만남은 소중히 하고 싶으니까요. 그…… 마마달레나.」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「はい♪」"
translation = "「네♪」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「アルモたん」"
translation = "「알모땅.」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「うむ！」"
translation = "「음!」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「友達として、これからよろしくお願いします」"
translation = "「친구로서 앞으로 잘 부탁드립니다.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「じ～っ……」"
translation = "「지──익……」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「お？\u3000セシア、どうしたのだ？\u3000ナミエルにママ判定か？」"
translation = "「오? 세시아, 왜 그러는 것이다? 나미엘에게 마마 판정인가?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「……いいえ、違うわ。ナミエルは残念ながら、わたくしのママではないわ。でも――」"
translation = "「……아니, 아니야. 나미엘은 유감스럽게도 나의 마마는 아니야. 하지만──」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「２人が親しく呼ばれているのに、わたくしだけ仲間外れは悲しいと思って」"
translation = "「두 사람이 친하게 불리고 있는데 나만 따돌림당하는 건 슬프다고 생각해서.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「じ、じゃあ……セッシ―」"
translation = "「그, 그럼…… 세시.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ふふっ♪\u3000プラス１ポイントね、ナミエル。附属校の１年生同士、これから仲よくしましょう♪」"
translation = "「후훗♪ 플러스 1포인트네, 나미엘. 부속교 1학년끼리 앞으로 사이좋게 지내자♪」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「はい。こちらこそ、よろしくお願いします」"
translation = "「네. 저야말로 잘 부탁드려요.」"

[[dialogue]]
speaker = "unk"
original = "握手を交わす、ナミエルとセシア。"
translation = "악수를 나누는 나미엘과 세시아."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「フヒ♪\u3000趣味で作った幼アバターだったガ、どうやらいい化学反応を起こしたようダ」"
translation = "「후히♪ 취미로 만든 어린 아바타였다만다, 아무래도 좋은 화학 반응을 일으킨 모양이다다.」"

[[dialogue]]
speaker = "unk"
original = "アニマ先輩、助けに来てくれてありがとう"
translation = "아니마 선배, 구하러 와줘서 고마워."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「なに、お互い様サ。会長もアニマのことを信じて、待っていてくれたダロウ？」"
translation = "「뭐, 서로 돕는 거다다. 회장도 아니마를 믿고 기다려줬지 않나다?」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「……保健室で攻撃された時、手に持っていたＤＩＳＣが壊れて、すぐに連絡することができなカッタ」"
translation = "「……보건실에서 공격받았을 때 손에 들고 있던 DISC가 부서져서 바로 연락할 수가 없었다다.」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「会長が時間を稼いでくれなかったら、ワクチンの完成は間に合わなかったかもしれナイ」"
translation = "「회장이 시간을 벌어주지 않았다면 백신의 완성은 늦었을지도 모른다다.」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「だから、信じていてくれて、こちらこそ嬉しかったヨ。ありがとダ、会長♪」"
translation = "「그러니까 믿어줘서 이쪽이야말로 기뻤다다. 고맙다다, 회장♪」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「――フヒ♪」"
translation = "「──후히♪」"

[[dialogue]]
speaker = "unk"
original = "ところで、俺たちの体は――"
translation = "그나저나 우리들의 몸은──"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「ああ、瘴気は完全に取り除かれたから、いつでも戻ることが可能だヨ」"
translation = "「아아, 장기는 완전히 제거됐으니 언제든 돌아가는 게 가능하다다.」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「会長はもう、元の体に戻りたいのカナ？」"
translation = "「회장은 이제 원래 몸으로 돌아가고 싶은 건가다?」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「えっ、会長。附属校に通うのを止めてしまわれるのですか？」"
translation = "「엣, 회장님. 부속교에 다니는 걸 그만두시는 건가요?」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「え～！\u3000アルモたんは寂しいのだ！」"
translation = "「에~! 알모땅은 외로운 것이다!」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「男に戻らず、もうそのままでいればいいのでは？」"
translation = "「남자로 돌아가지 말고 그냥 그대로 있으면 되는 거 아닌가요?」"

[[dialogue]]
speaker = "unk"
original = "いやいや、会長としての仕事があるし！"
translation = "아니 아니, 회장으로서의 업무가 있고!"

[[dialogue]]
speaker = "unk"
original = "それにずっとこの体でいると、いつか心まで女の子になってしまいそうなのが怖い！"
translation = "게다가 계속 이 몸으로 있으면 언젠가 마음까지 여자아이가 되어버릴 것 같아서 무서워!"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「アニマ的にはどっちもアリだぞ？\u3000フヒ♪」"
translation = "「아니마 입장에서는 어느 쪽이든 상관없다다? 후히♪」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「元の会長も悪くはないけど、セシアはやっぱりクロトママの方にプラス１ポイントね♪」"
translation = "「원래 회장도 나쁘지는 않지만, 세시아는 역시 쿠로토 마마 쪽에 플러스 1포인트네♪」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「それなら、多数決を取るのだ！\u3000会長にまだ、附属校に通って欲しい人～！」"
translation = "「그렇다면 다수결을 하는 것이다! 회장이 아직 부속교에 다녀줬으면 하는 사람~!」"

[[dialogue]]
speaker_original = "クラスメイト達"
speaker_translation = "반 친구들"
original = "「は～い！！！」"
translation = "「저요!!!」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「全員なのだ！」"
translation = "「전원인 것이다!」"

[[dialogue]]
speaker = "unk"
original = "いや、そう言ってくれるのは嬉しいけども！"
translation = "아니, 그렇게 말해주니 기쁘긴 한데!"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「ふふっ、１度仲よくなった以上、会長も附属生アバターをこまめに使っていかないといけませんね♪」"
translation = "「후훗, 한번 친해진 이상 회장님도 부속생 아바타를 틈틈이 사용해 주셔야겠네요♪」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「男として、責任は取らないと」"
translation = "「남자로서 책임은 져야죠.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「――ですよね？\u3000緋宮会長」"
translation = "「──그렇죠? 히노미야 회장님.」"

[[dialogue]]
speaker = "unk"
original = "どうやら俺の附属生女子としての生活は、これからも並行して続いていくらしかった――"
translation = "아무래도 나의 부속생 여학생으로서의 생활은 앞으로도 병행해서 계속될 모양이었다──"

