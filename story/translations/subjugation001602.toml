[[dialogue]]
speaker = "ヒトリ"
original = "「き、急に出てくるのやめてください……びっくりしちゃいます……」"
translation = "「가, 갑자기 나오는 거 그만두세요…… 깜짝 놀라잖아요……」"

[[dialogue]]
speaker = "サラン"
original = "「イタズラ好きなんだって～。サランもちょっとだけ驚いちゃった！」"
translation = "「장난을 좋아한대~. 사란도 조금 놀랐어!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「ゆーちゃんだって驚いていますし……」"
translation = "「유짱조차 놀라고 있고……」"

[[dialogue]]
speaker = "ゆーちゃん"
original = "「ゆー！\u3000ゆー！」"
translation = "「유-! 유-!」"

[[dialogue]]
speaker = "？？？"
original = "「ゆーっゆっゆっゆ♪\u3000どうだゆ？\u3000驚いたゆ！」"
translation = "「유-윳유윳유♪ 어떠냐유? 놀랐지유!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「もう、出てくる度に人を驚かしちゃダメですよぉ……次はやめてくださいね？」"
translation = "「정말, 나올 때마다 사람 놀라게 하면 안 돼요오…… 다음엔 그러지 마세요?」"

[[dialogue]]
speaker = "？？？"
original = "「はーい、なの！」"
translation = "「네에-, 인유!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「本当にわかってるのかなぁ……」"
translation = "「정말로 알고 있는 걸까나……」"

[[dialogue]]
speaker = "？？？"
original = "「ん？\u3000余が何者なのか気になるのかゆ？」"
translation = "「응? 유가 누구인지 궁금한 거냐유?」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ゆーっゆっゆっゆ♪\u3000そこまで求められたなら、名乗ってやってもいいゆ。余の名前は、ジャクリーヌ・オー・ランタンなの♪」"
translation = "「유-윳유윳유♪ 거기까지 원한다면 이름을 대줄 수도 있유. 유의 이름은 자클린 오 랜턴인유♪」"

[[dialogue]]
speaker = "unk"
original = "ジャック・オー・ランタンに似てる……"
translation = "잭 오 랜턴이랑 닮았어……"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ジャックはパパなの～♪\u3000人間界のハロウィンを見学してこいって言われて、ヒトリの力を借りてやってきたの」"
translation = "「잭은 아빠인유~♪ 인간계의 할로윈을 견학하고 오라고 해서, 히토리의 힘을 빌려 온 유」"

[[dialogue]]
speaker = "ヒトリ"
original = "「ジャック・オー・ランタンは人間界では有名な精霊の類ですが、そういう種族名とかではなく……ハロウィンの化身であり、いわゆる『ご本人』、だそうです……」"
translation = "「잭 오 랜턴은 인간계에선 유명한 정령의 일종입니다만, 그런 종족명이 아니라…… 할로윈의 화신이자 이른바 『본인』이라고 합니다……」"

[[dialogue]]
speaker = "サラン"
original = "「ヒトリちゃんはそんな有名なジャックちゃんを、前回のハロウィンの時に呼んじゃってたんだ～。すご～い♪」"
translation = "「히토리짱은 그런 유명한 잭짱을 지난 할로윈 때 불렀던 거구나~. 대단해~♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「余はそのジャック・オー・ランタンの娘で、結構偉い存在なの！\u3000お姫様なの♪」"
translation = "「유는 그 잭 오 랜턴의 딸로, 꽤 높은 존재인유! 공주님인유♪」"

[[dialogue]]
speaker = "unk"
original = "お姫様！？"
translation = "공주님!?"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「でもそんなことはどうでもいいから、とにかくたくさんお菓子をよこすの！\u3000人間界にはお菓子を食べに来たんだゆ！」"
translation = "「하지만 그런 건 아무래도 좋으니까, 어쨌든 과자를 잔뜩 내놓으라는유! 인간계에는 과자를 먹으러 온 거다유!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「初めて対話した時からずっとこの調子で……実家にあった備え付けのお菓子はすでに全滅してしまいました……」"
translation = "「처음 대화했을 때부터 계속 이런 상태라…… 집에 비치되어 있던 과자는 이미 전멸해버렸습니다……」"

[[dialogue]]
speaker = "unk"
original = "ノリが軽いなぁ……"
translation = "넉살이 좋네……"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ヒトリはお菓子くれるし、余以外の幽霊とも仲良しで良い奴なの！」"
translation = "「히토리는 과자도 주고, 유 이외의 유령이랑도 사이좋게 지내는 착한 녀석인유!」"

[[dialogue]]
speaker = "サラン"
original = "「ヒトリちゃんは幽霊ちゃんとお話できるもんね～」"
translation = "「히토리짱은 유령짱이랑 대화할 수 있으니까 말이야~」"

[[dialogue]]
speaker = "ヒトリ"
original = "「は、はい。それで棺桶の中にいる時から、色々お話させていただいて……ゆーちゃんともすっかり仲良しなんですよ」"
translation = "「네, 네. 그래서 관 속에 있을 때부터 여러 가지 이야기를 나눠서…… 유짱과도 완전히 단짝이에요」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ヒトリとゆーちゃんは、余が人間界に来て初めての友達なの！」"
translation = "「히토리랑 유짱은 유가 인간계에 와서 처음 사귄 친구인유!」"

[[dialogue]]
speaker = "ゆーちゃん"
original = "「ゆー！」"
translation = "「유-!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「わ、わたし、いつもぼっちだから……嬉しくて……」"
translation = "「저, 저는 항상 혼자였으니까…… 기뻐서……」"

[[dialogue]]
speaker = "サラン"
original = "「ジャクリーヌちゃん、サランとも仲良くなったんだよね～♪」"
translation = "「자클린짱, 사란이랑도 친해졌지~♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「サランはおいしいお菓子を作ってくれるから、お菓子好きな余としては欠かせない存在なの！」"
translation = "「사란은 맛있는 과자를 만들어 주니까, 과자를 좋아하는 유에게는 빠질 수 없는 존재인유!」"

[[dialogue]]
speaker = "サラン"
original = "「そうだ。ペロペロキャンディーがあったんだけど、いる～？」"
translation = "「맞다. 막대 사탕이 있는데, 가질래~?」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「わ～い、早く食べさせるのー！」"
translation = "「와~이, 빨리 먹여주는유-!」"

[[dialogue]]
speaker = "サラン"
original = "「はーい、じゃあ、あーーーーん<emoji=heart04>」"
translation = "「네에-, 자, 아~~~~앙<emoji=heart04>」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「あーーーーん……」"
translation = "「아~~~~앙……」"

[[dialogue]]
speaker = "ヒトリ"
original = "「こ、こここ……これは……！！」"
translation = "「이, 이이이…… 이것은……!!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「ほ、ほら……会長さんも見てください……！\u3000あ～んですよ、あ～ん！」"
translation = "「보, 보세요…… 회장님도 보세요……! 아~앙이에요, 아~앙!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「サランさんがジャクリーヌさんに食べさせてあげてるの、とっても……てぇてぇですよぉ……」"
translation = "「사란 씨가 자클린 씨에게 먹여주고 있는 거, 정말…… 테에테에해요오……」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ぺろぺろ、ぺろぺろ♪」"
translation = "「낼름낼름, 낼름낼름♪」"

[[dialogue]]
speaker = "ヒトリ"
original = "「あっ、そんな……！\u3000ジャクリーヌさんが舌でかわいく、ぺろぺろって……」"
translation = "「앗, 저런……! 자클린 씨가 혀로 귀엽게 낼름낼름하고……」"

[[dialogue]]
speaker = "サラン"
original = "「どう～？\u3000おいしい？」"
translation = "「어때~? 맛있어?」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「おいしいのー！」"
translation = "「맛있는유-!」"

[[dialogue]]
speaker = "サラン"
original = "「ホント？\u3000良かった～<emoji=heart04>」"
translation = "「정말? 다행이다~<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
original = "「それに……ゆーちゃんも見て？\u3000ジャクリーヌさんの姿、とってもかわいくないですか……？」"
translation = "「게다가…… 유짱도 봐? 자클린 씨의 모습, 정말 귀엽지 않나요……?」"

[[dialogue]]
speaker = "ゆーちゃん"
original = "「ゆー！」"
translation = "「유-!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「だって……頭のお団子みたいなところに、かわいいジャックさんが付いてるんです……表情もそれぞれ違って……」"
translation = "「그게…… 머리 만두 같은 곳에 귀여운 잭 씨가 붙어 있어요…… 표정도 각각 다르고……」"

[[dialogue]]
speaker = "ヒトリ"
original = "「服なんて、袖が長くて手が全部隠れちゃってて……萌え袖って言うんでしょうか？\u3000お化けのうらめしや～みたいな感じなんですよ……！」"
translation = "「옷은 소매가 길어서 손이 전부 가려져 있고…… 모에 소매라고 하던가요? 유령의 흐느적흐느적~ 같은 느낌이에요……!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「はぁぁぁ～～～、てぇてぇ……ジャクリーヌさんとお友達になれて、これをいつでも見られるなんて……ぼっち卒業して良かったです……！」"
translation = "「하아아아~~, 테에테에…… 자클린 씨랑 친구가 되어서 이걸 언제든 볼 수 있다니…… 혼밥 탈출해서 다행이에요……!」"

[[dialogue]]
speaker = "ゆーちゃん"
original = "「てーてー！」"
translation = "「테에테에!」"

[[dialogue]]
speaker = "unk"
original = "お～い、また自分の世界に入ってるぞ～？"
translation = "어~이, 또 자기 세계에 빠졌어~?"

[[dialogue]]
speaker = "ヒトリ"
original = "「はっ！？\u3000す、すすす、すみません……！\u3000いつもの癖で……！」"
translation = "「핫!? 죄, 죄죄죄죄, 죄송해요……! 평소 버릇이라……!」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ごちそうさまなの～！\u3000ゆゆ？\u3000ヒトリはどうしたの？\u3000顔が赤いゆ？」"
translation = "「잘 먹었유~! 유유? 히토리는 왜 그러는유? 얼굴이 빨갛다유?」"

[[dialogue]]
speaker = "ヒトリ"
original = "「な、なんでもないです……！\u3000それよりもジャクリーヌさん、お菓子ホントに好きなんですね」"
translation = "「아, 아무것도 아니에요……! 그보다 자클린 씨, 과자를 정말 좋아하시네요」"

[[dialogue]]
speaker = "サラン"
original = "「やっぱり、パンプキンファントムだから～？」"
translation = "「역시 펌킨 팬텀이라서 그럴까나~?」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「当然なの！\u3000『お菓子に始まりお菓子に終わる』ということわざだってあるって、パパに聞いたゆ！」"
translation = "「당연한유! 『과자로 시작해서 과자로 끝난다』라는 속담도 있다고 아빠한테 들었유!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「言いたいことはわかるような、よくよく考えるとやっぱりよくわからないような……」"
translation = "「하고 싶은 말은 알 것 같기도 하고, 곰곰이 생각해보면 역시 잘 모르겠기도 하고……」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「そんなことはどうでもいいゆ！\u3000まだまだ食べたりないの～！」"
translation = "「그런 건 아무래도 좋유! 아직 먹어도 부족한유~!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「さっきペロペロキャンディー食べたばかりなのに……」"
translation = "「방금 막대 사탕 드셨는데……」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「お菓子は身体の一部みたいなものなの！\u3000常に食べていないとお腹がすくの！」"
translation = "「과자는 몸의 일부 같은 거인유! 항상 먹고 있지 않으면 배가 고픈유!」"

[[dialogue]]
speaker = "サラン"
original = "「わかるかも～♪\u3000サランもずっと食べてたいけど、ちょっと我慢してるところあるから～」"
translation = "「이해할 것 같아~♪ 사란도 계속 먹고 싶지만 조금 참고 있는 부분도 있으니까~」"

[[dialogue]]
speaker = "ヒトリ"
original = "「わ、わたしも甘いものは好きですけど……１個あれば充分です……」"
translation = "「저, 저도 단것은 좋아합니다만…… 한 개면 충분해요……」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「だからもっとお菓子よこすゆー！\u3000じゃないとイタズラしちゃうのー！」"
translation = "「그러니까 과자 더 내놓으라는유-! 안 그러면 장난칠 거다유-!」"

[[dialogue]]
speaker = "unk"
original = "一口サイズの飴ならあるけどいる？"
translation = "한입 크기 사탕이라면 있는데 가질래?"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「いるの～♪\u3000ぱくんっ」"
translation = "「가질유~♪ 함냠」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「……そういえば、お前は誰なの？」"
translation = "「……그러고 보니, 네놈은 누구냐유?」"

[[dialogue]]
speaker = "サラン"
original = "「わ～。本当にお菓子とお菓子をくれる人にしか興味なんだね～」"
translation = "「와아. 정말 과자랑 과자 주는 사람한테만 관심 있구나~」"

[[dialogue]]
speaker = "ヒトリ"
original = "「す、すみません、会長さん……」"
translation = "「죄, 죄송해요, 회장님……」"

[[dialogue]]
speaker = "unk"
original = "全然気にしてないよ。\n新星学園には個性的な人がたくさんいるから"
translation = "전혀 신경 안 써.\\n신성학원에는 개성적인 사람이 많으니까"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ヒトリとサランのお友達なの？」"
translation = "「히토리랑 사란의 친구냐유?」"

[[dialogue]]
speaker = "サラン"
original = "「うん！\u3000サランたちが通う新星学園の、星徒会長さんなんだよ～♪」"
translation = "「응! 사란들이 다니는 신성학원의 성도회장님이야~♪」"

[[dialogue]]
speaker = "ヒトリ"
original = "「は、はい！\u3000会長さんは、とってもすごい人なんですよ！」"
translation = "「네, 네! 회장님은 정말 대단하신 분이에요!」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ゆ～ん……それで、お前はもっとお菓子をくれるゆ？」"
translation = "「유~음…… 그래서, 네놈은 과자를 더 줄 거냐유?」"

[[dialogue]]
speaker = "unk"
original = "そこの戸棚にあるお菓子なら\nジャクリーヌが食べてもいいぞ"
translation = "저기 찬장에 있는 과자라면\\n자클린이 먹어도 괜찮아"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ゆーっゆっゆっゆ♪\u3000お前、良い奴なの！」"
translation = "「유-윳유윳유♪ 네놈, 좋은 녀석인유!」"

[[dialogue]]
speaker = "サラン"
original = "「もうすぐハロウィンだから、準備してたの？\u3000さすが会長ちゃんだ～♪」"
translation = "「곧 할로윈이라 준비해둔 거야? 역시 회장짱이야~♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ペロペロキャンディーがあるゆ！\u3000いただきま～す……ぺろぺろ、ぺろぺろ♪」"
translation = "「막대 사탕이 있유! 잘 먹겠유~…… 낼름낼름, 낼름낼름♪」"

[[dialogue]]
speaker = "ヒトリ"
original = "「もう、ジャクリーヌさんったら……」"
translation = "「정말, 자클린 씨도 참……」"

[[dialogue]]
speaker = "ヒトリ"
original = "「これから人間界のハロウィンを案内してあげるから、他のお菓子もたくさん食べられるのに……食べ過ぎるとお腹壊しちゃいますよ？」"
translation = "「이제부터 인간계의 할로윈을 안내해 드릴 테니 다른 과자도 잔뜩 먹을 수 있을 텐데…… 너무 많이 먹으면 배탈 난다구요?」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「お菓子は別腹だから大丈夫だゆ！」"
translation = "「과자는 배가 따로 있으니까 괜찮다유!」"

[[dialogue]]
speaker = "サラン"
original = "「確かにデザートは別腹って言うもんね～<emoji=heart04>」"
translation = "「확실히 디저트 배는 따로 있다고들 하지~<emoji=heart04>」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「だから早く案内するのー！」"
translation = "「그러니까 빨리 안내하라는유-!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「わ、わかりましたから……ああ、引っ張らないでぇ……！\u3000ゆーちゃんもですよぉ……」"
translation = "「아, 알았으니까요…… 아아, 잡아당기지 마세요오……! 유짱도 참……」"

[[dialogue]]
speaker = "ゆーちゃん"
original = "「てーてー！」"
translation = "「테에테에!」"

[[dialogue]]
speaker = "サラン"
original = "「あっはは、楽しみだね～<emoji=heart04>」"
translation = "「앗하하, 기대되네~<emoji=heart04>」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「レッツゴーなの！」"
translation = "「렛츠 고인유!」"

[[dialogue]]
speaker = "unk"
original = "というわけで、俺たちはハロウィンの化身であるジャクリーヌに、人間界のハロウィンを案内してあげることになったのだった。"
translation = "그렇게 해서, 우리들은 할로윈의 화신인 자클린에게 인간계의 할로윈을 안내해주게 된 것이었다."

