[[dialogue]]
speaker = "unk"
original = "第？？？話,平行世界デネブ,B"
translation = "제???화, 평행세계 데네브, B"

[[dialogue]]
speaker = "？？？"
original = "「以前みんなに説明したように、世界は３つある。でも天界・人間界・魔界の三界のことじゃないわ」"
translation = "「이전에 모두에게 설명했듯이 세계는 세 개가 있어. 하지만 천계·인간계·마계의 삼계를 말하는 게 아니야.」"

[[dialogue]]
speaker = "？？？"
original = "「私たちがいる世界は、デネブ・ベガ・アルタイルの３つの平行世界うち１つ──デネブ」"
translation = "「우리가 있는 세계는 데네브·베가·알타이르라는 세 평행세계 중 하나── 데네브.」"

[[dialogue]]
speaker = "？？？"
original = "「ベガは滅びた。残るはデネブとアルタイルだけど……生き残る世界は２つに１つ。残念ながら平行世界は並存できない」"
translation = "「베가는 멸망했어. 남은 건 데네브와 알타이르지만…… 살아남는 세계는 둘 중 하나. 안타깝게도 평행세계는 병존할 수 없어.」"

[[dialogue]]
speaker = "？？？"
original = "「だからこの世界のために、あちらには消えてもらう」"
translation = "「그러니까 이 세계를 위해서 저쪽은 사라져 줘야겠어.」"

[[dialogue]]
speaker = "？？？"
original = "「私たち<ruby>極星<rt>きょくせい</rt></ruby>学園が──アルタイルを滅ぼすわ」"
translation = "「우리 극성<rt>쿄쿠세이</rt></ruby> 학원이── 알타이르를 멸망시키겠어.」"

