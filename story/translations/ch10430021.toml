[[dialogue]]
speaker = "unk"
original = "第１話,嫌よ嫌よも好きのうち,P"
translation = "제1화, 싫어 싫어는 좋아하는 것 중 하나, P"

[[dialogue]]
speaker = "unk"
original = "サチと好意を伝え合い、恋人として付き合い始めてからしばらく経った、ある日の放課後。"
translation = "사치와 호의를 전하고, 연인으로서 사귀기 시작한 지 얼마 되지 않은 어느 날 방과 후."

[[dialogue]]
speaker = "unk"
original = "俺はサチと一緒に、日課の戦闘訓練を行っていた――"
translation = "나는 사치와 함께 일과인 전투 훈련을 하고 있었다――"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「や、やった……！」"
translation = "「해, 해냈다……!」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「やりましたよ、お兄さん！\u3000２人で、ＳＳ級モンスター討伐の両学園内、最速記録達成です♪」"
translation = "「해냈어요, 오빠! 둘이서 SS급 몬스터 토벌 양 학원 내 최단 기록 달성이에요♪」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「よっし……！\u3000えへへへへっ♪」"
translation = "「요시……! 에헤헤헤헷♪」"

[[dialogue]]
speaker = "unk"
original = "小さくガッツポーズしながら、嬉しそうに顔をほころばせるサチ。"
translation = "작게 승리 포즈를 취하며 기쁜 듯 얼굴을 펴는 사치."

[[dialogue]]
speaker = "unk"
original = "我が恋人ながら……すごく可愛い"
translation = "내 연인이지만…… 정말 귀엽다."

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「お、お兄さん！？\u3000い、いきなり可愛いとか、なに言ってるんですか！？」"
translation = "「오, 오빠!? 갑자기 귀엽다니, 무슨 소리를 하는 거예요!?」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「そういうのは、ムードある時じゃないと……恥ずかしくなっちゃうじゃないですか、もう<emoji=heart04>」"
translation = "「그런 건 분위기 있을 때가 아니면…… 부끄러워지잖아요, 정말<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "フォルトゥーナフォームは慣れてきた？"
translation = "포르투나 폼은 익숙해졌어?"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「あっ、はい♪\u3000最初は出力が高過ぎてコントロールが大変でしたけど、お兄さんが訓練に根気強く付き合ってくれたおかげで、少しずつ加減ができるようになってきました」"
translation = "「앗, 네♪ 처음에는 출력이 너무 높아서 컨트롤이 힘들었지만, 오빠가 훈련에 끈기 있게 어울려 준 덕분에 조금씩 조절할 수 있게 되었어요」"

[[dialogue]]
speaker = "unk"
original = "サチの新たな戦闘服『フォルトゥーナフォーム』は、トレジアンナさんがサチ専用の魔法少女衣装として作り上げたものだ。"
translation = "사치의 새로운 전투복 『포르투나 폼』은 트레지안나 씨가 사치 전용 마법소녀 의상으로 만들어낸 것이다."

[[dialogue]]
speaker = "unk"
original = "起動には俺のアルケインコード発動が必要だったこともあり、実質サチのノヴァフォームであるとも言える。"
translation = "기동에는 나의 아케인 코드 발동이 필요했던 점도 있어, 실질적으로 사치의 노바 폼이라고도 할 수 있다."

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「あと……お兄さんとの絆で覚醒した力でもあるので、心が繋がっている感じがして、このフォームになるとすごく安心します♪」"
translation = "「그리고…… 오빠와의 유대로 각성한 힘이기도 해서, 마음이 연결되어 있는 느낌이 들어 이 폼이 되면 정말 안심돼요♪」"

[[dialogue]]
speaker = "unk"
original = "俺はサチの頭をそっと撫でる。"
translation = "나는 사치의 머리를 살며시 쓰다듬는다."

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「ん……<emoji=heart04>\u3000えへへ♪」"
translation = "「응……<emoji=heart04> 에헤헤♪」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「――お兄さんも、私と一緒に戦っていると心強い、ですか？\u3000ふふっ♪」"
translation = "「――오빠도 저랑 같이 싸우면 든든한가요? 후훗♪」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「フォルトゥーナフォームになることが増えてから、一緒に戦っても<b>ラッキースケベ</b>が起こらなくなりましたもんね♪」"
translation = "「포르투나 폼이 되는 일이 늘어난 뒤로, 같이 싸워도 <b>럭키</b> <b>스케베</b>가 일어나지 않게 되었으니까요♪」"

[[dialogue]]
speaker = "unk"
original = "フォルトゥーナフォームになって進化したサチの能力は『自身だけでなく周りにも幸運を授ける』というもの。"
translation = "포르투나 폼이 되어 진화한 사치의 능력은 『자신뿐만 아니라 주변에도 행운을 선사하는 것』."

[[dialogue]]
speaker = "unk"
original = "更には、サチも以前より幸運のコントロールが上手くなったこともあり、ここ最近はラッキースケベが全然発生していなかった。"
translation = "게다가 사치도 이전보다 행운 컨트롤이 능숙해진 탓에, 요 근래 럭키 스케베는 전혀 발생하지 않고 있었다."

[[dialogue]]
speaker = "サチ（覚醒）"
original = "（まあ、ちょっと寂しい気もするから、たまになら起きてくれても……）"
translation = "(뭐, 조금 아쉬운 기분도 드니까, 가끔이라면 일어나 줘도……)"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「――いえ、なんでもないです！\u3000お兄さん、訓練の続きをしましょう！」"
translation = "「――아니요, 아무것도 아니에요! 오빠, 훈련 계속해요!」"

[[dialogue]]
speaker = "unk"
original = "それから、俺たちは１対１の模擬戦をすることになった。"
translation = "그러고 나서 우리는 1대 1 모의전을 하게 되었다."

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「ルーレットフルスロットル！\u3000――フォーチュンバースト！」"
translation = "「룰렛 풀 스로틀! ――포춘 버스트!」"

[[dialogue]]
speaker = "unk"
original = "幸運の力、今日こそ突破してみせる！"
translation = "행운의 힘, 오늘이야말로 돌파해 보이겠어!"

[[dialogue]]
speaker = "unk"
original = "俺はサチの攻撃をわざと受けて防御しながら、そのまま接近戦に持ち込む。"
translation = "나는 사치의 공격을 일부러 받으며 방어하면서, 그대로 근접전으로 끌고 간다."

[[dialogue]]
speaker = "unk"
original = "彼女も怯まず、それを受けて立とうとする。――が、その時だった。"
translation = "그녀도 겁먹지 않고 그것을 받아내려 한다. ――가, 그때였다."

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「きゃっ！？」"
translation = "「꺄악!?」"

[[dialogue]]
speaker = "unk"
original = "俺たちは同時にいきなりバランスを崩して、もつれるように転んでしまい……俺がサチを押し倒すような格好になってしまった。"
translation = "우리는 동시에 갑자기 균형을 잃고 뒤엉키듯 넘어져 버렸고…… 내가 사치를 덮치는 듯한 모습이 되어 버렸다."

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「あ……」"
translation = "「아……」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「お、起きちゃいましたね……ラッキースケベ……<emoji=heart04>」"
translation = "「이, 일어나 버렸네요…… 럭키 스케베……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「あっ！\u3000わざとじゃないですよ！？\u3000でも……」"
translation = "「앗! 일부러 그런 거 아니에요!? 하지만……」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「最近起こらなくて寂しいって、ちょっと思っちゃったせい、かもしれません……」"
translation = "「최근 일어나지 않아서 아쉽다고 조금 생각해 버린 탓, 일지도 모르겠네요……」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「で、でも、今は訓練中ですから……」"
translation = "「하, 하지만 지금은 훈련 중이니까……」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「エッチなことは禁止ですよ？\u3000お兄さん……<emoji=heart04>」"
translation = "「야한 짓은 금지예요? 오빠……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言いつつも、俺を見上げるサチの瞳は、熱を帯びたように潤んでいて。"
translation = "그렇게 말하면서도 나를 올려다보는 사치의 눈동자는 열기를 띤 듯 젖어 있어서."

[[dialogue]]
speaker = "unk"
original = "それに吸い込まれるように、俺は彼女に顔を近づけて――"
translation = "거기에 빨려 들어가듯 나는 그녀에게 얼굴을 가까이 대고――"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「あっ<emoji=heart04>\u3000お兄さん……ダメ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 오빠…… 안 돼……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「んっ……<emoji=heart04>\u3000ちゅっ<emoji=heart04>」"
translation = "「응……<emoji=heart04> 츄릅<emoji=heart04>」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「はぁ……<emoji=heart04>\u3000こんなところで、キスしちゃうなんて……エッチです……<emoji=heart04>」"
translation = "「하아……<emoji=heart04> 이런 곳에서 키스해 버리다니…… 야해요……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「ちゅっ……<emoji=heart04>\u3000んちゅっ<emoji=heart04>」"
translation = "「츄릅……<emoji=heart04> 응츄릅<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "と、その時。"
translation = "그때였다."

[[dialogue]]
speaker = "プリムラ"
original = "「お～い、サチ！\u3000我も訓練に付き合ってやるのじゃ。感謝せい……って」"
translation = "「어~이, 사치! 나도 훈련을 도와주마. 감사하거라…… 어라」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「え」"
translation = "「에」"

[[dialogue]]
speaker = "プリムラ"
original = "「……破廉恥の訓練じゃったか。このムッツリドスケベめ」"
translation = "「……파렴치 훈련 중이었느냐. 이 음흉한 변태 녀석」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「プリムラっ！？\u3000ちちち、違っ、これは……！」"
translation = "「프림라!? 아아아, 아냐, 이건……!」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「ありゃりゃ～、むふふ♪\u3000お２人共、お盛んですね～☆」"
translation = "「어라라~, 무후후♪ 두 분 다 혈기 왕성하시네요~☆」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「ち――」"
translation = "「아――」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「違うんです～～～っ！\u3000これは不慮の事故だったんですぅ～～～っ！！！」"
translation = "「아니에요오오오～～～앗! 이건 불의의 사고였다고요오오오～～～앗!!!」"

[[dialogue]]
speaker = "unk"
original = "顔を赤くして叫ぶサチだったが、『幸運体質』であるが故に、決して信じてもらえないのだった――"
translation = "얼굴을 붉히며 외치는 사치였지만, 『행운 체질』인 탓에 결코 믿어주지 않는 것이었다――"

