[[dialogue]]
speaker = "？？？"
original = "「うーん、うーん、うーん……」"
translation = "「으음, 으음, 으음……」"

[[dialogue]]
speaker = "？？？"
original = "「そうだ、わかったくま！\u3000こうすればみんなも、もーーーっと盛り上がれるくま！」"
translation = "「그래, 알았다곰! 이렇게 하면 모두도 더어어어욱 달아오를 수 있다곰!」"

[[dialogue]]
speaker = "？？？"
original = "「よーしッ！\u3000お祭りだーっ！！！！」"
translation = "「좋아! 축제다!!!!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「…………アナとサーシャさん、遅いわね」"
translation = "「…………아나랑 사샤 씨, 늦네.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「デパートでやってる全国物産展を見に行ったっきり帰ってこないじゃない」"
translation = "「백화점에서 하는 전국 물산전에 간 뒤로 돌아오질 않잖아.」"

[[dialogue]]
speaker = "unk"
original = "アナが夢中になってるんだと思う"
translation = "아나가 푹 빠져 있는 것 같아."

[[dialogue]]
speaker = "unk"
original = "和菓子フェスをやってるから"
translation = "화과자 페스티벌을 하고 있으니까."

[[dialogue]]
speaker = "ヴィーナス"
original = "「その可能性は高いわね……でも、それにしたって時間がかかり過ぎじゃない？」"
translation = "「그럴 가능성이 높네…… 하지만 그렇다 쳐도 시간이 너무 걸리는 거 아니야?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ＤＩＳＣで連絡をしてみたけど、ぜーんぜん反応なしだし……これはもう行ってみるしかないんじゃないかしら？」"
translation = "「DISC로 연락해 봤지만 저언혀 반응이 없고…… 이건 직접 가보는 수밖에 없지 않을까?」"

[[dialogue]]
speaker = "unk"
original = "行き違いになるかもしれないよ"
translation = "길이 엇갈릴지도 몰라."

[[dialogue]]
speaker = "ヴィーナス"
original = "「まあ、その時はその時よ」"
translation = "「뭐, 그때는 그때지.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「えーっと、物産展がやっているのはあのビルね。行きましょう、クロト♪」"
translation = "「음, 물산전을 하는 곳이 저 빌딩이네. 가자, 쿠로토♪」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「きゃっ！\u3000な、なにこれ！？\u3000アステラ！？」"
translation = "「꺄악! 머, 뭐야 이거!? 아스테라!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「……じゃない、みたいだけど……っ……！\u3000気を付けて、何か来るわよ！！」"
translation = "「……는 아닌 것 같지만……윽……! 조심해, 뭔가가 오고 있어!!」"

[[dialogue]]
speaker = "？？？"
original = "「ふぅ……」"
translation = "「후우……」"

[[dialogue]]
speaker = "？？？"
original = "「謎の空間に閉じ込められたかと思えば、今度はやたら角ばった建物ばかりのところに出ましたね……」"
translation = "「수수께끼의 공간에 갇혔나 싶더니, 이번에는 꽤나 각진 건물들만 있는 곳으로 나왔네요……」"

[[dialogue]]
speaker = "？？？"
original = "「明らかに『アテネス』とは違う場所のようですが……さて一体、ここはどこなのやら？」"
translation = "「명백히 『아테네스』와는 다른 장소인 듯합니다만…… 자 도대체 여기는 어디일까요?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「誰、かしら？\u3000あなた、さっきの変な穴から出てきたわよね？」"
translation = "「누구, 일까? 당신, 아까 그 이상한 구멍에서 나왔지?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「新星学園の制服を着てるから、学園生みたいだけど……知らない子だわ」"
translation = "「신성 학원의 교복을 입고 있으니 학생 같긴 한데…… 모르는 아이야.」"

[[dialogue]]
speaker = "？？？"
original = "「おやおや、天才美少女藝術家であるこの私を知らないとは、ずいぶんと不勉強な方ですね？」"
translation = "「오호라, 천재 미소녀 예술가인 이 저를 모르다니 꽤나 공부가 부족한 분이군요?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「な……！？\u3000出てきて早々ドヤ顔かますとはいい度胸ね！」"
translation = "「뭐……!? 나오자마자 거만한 얼굴을 하다니 배짱 한번 좋네!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「知らないものは知らないわよ。で、結局誰なの、キリキリ名乗りなさいっ！」"
translation = "「모르는 건 모르는 거야. 그래서 결국 누구야, 빨리 이름이나 대!」"

[[dialogue]]
speaker = "？？？"
original = "「仕方ありませんね。そこまで請われたら名乗らないわけにもいかないでしょう」"
translation = "「어쩔 수 없군요. 그렇게까지 청하신다면 이름을 대지 않을 수 없겠죠.」"

[[dialogue]]
speaker = "アルテ"
original = "「私の名はアルテ。藝術都市アテネスが誇る『夢幻美術館』に所属する天才美少女藝術家です。以後お見知りおきを」"
translation = "「제 이름은 아르테. 예술도시 아테네스가 자랑하는 『몽환 미술관』에 소속된 천재 미소녀 예술가입니다. 앞으로 잘 부탁드리죠.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「美少女って自分で言うのね……」"
translation = "「미소녀라고 스스로 말하네……」"

[[dialogue]]
speaker = "unk"
original = "夢幻美術館？"
translation = "몽환 미술관?"

[[dialogue]]
speaker = "unk"
original = "藝術都市アテネス？"
translation = "예술도시 아테네스?"

[[dialogue]]
speaker = "アルテ"
original = "「おや？\u3000まさかそれもご存じない？」"
translation = "「오야? 설마 그것도 모르시나요?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「初めて聞くわね。そのアテネスってとこも、あなたの名前も」"
translation = "「처음 들어봐. 그 아테네스라는 곳도, 당신 이름도.」"

[[dialogue]]
speaker = "アルテ"
original = "「ふむ……単なる無知、というわけではなさそうですね」"
translation = "「흠…… 단순한 무지는 아닌 듯하군요.」"

[[dialogue]]
speaker = "アルテ"
original = "「では逆にお聞きします。ここは一体何処でしょう？」"
translation = "「그럼 반대로 묻겠습니다. 여기는 도대체 어디죠?」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナス、これって……"
translation = "비너스, 이거 설마……"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ええ、私も今、同じことを考えていたわ」"
translation = "「응, 나도 지금 똑같은 생각을 하고 있었어.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あなた、ここは東京の渋谷よ。私たちは新星学園に通う生徒で、私たちやあなたが着ている服は新星学園の制服なの」"
translation = "「당신, 여기는 도쿄의 시부야야. 우리는 신성 학원에 다니는 학생이고, 우리나 당신이 입고 있는 옷은 신성 학원의 교복이야.」"

[[dialogue]]
speaker = "アルテ"
original = "「……そういえば私、いつの間にか知らない服を着ていますね」"
translation = "「……그러고 보니 저도 어느샌가 모르는 옷을 입고 있군요.」"

[[dialogue]]
speaker = "アルテ"
original = "「ですが違和感はありません。どころか完璧に似合っています。お仕着せの衣装すら着こなしてしまうとは、さすが私です」"
translation = "「하지만 위화감은 없습니다. 오히려 완벽하게 어울리네요. 정해진 의상조차 소화해 버리다니 역시 저답습니다.」"

[[dialogue]]
speaker = "アルテ"
original = "「しかしトーキョー？\u3000シブヤ？\u3000シンセイガクエン……？\u3000聞いたことがありませんね」"
translation = "「하지만 토쿄? 시부야? 신세이가쿠엔……? 들어본 적이 없군요.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「これは推測なのだけど、あなたはさっき謎の黒い穴を通って、この世界に来てしまったんだと思うわ」"
translation = "「이건 추측인데, 당신은 아까 그 수수께끼의 검은 구멍을 통해 이 세계로 오게 된 것 같아.」"

[[dialogue]]
speaker = "アルテ"
original = "「つまりここは異世界だと？」"
translation = "「즉 여기는 이세계라는 건가요?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そういうこと。稀によくあることだわ」"
translation = "「그런 셈이지. 드물게 자주 있는 일이야.」"

[[dialogue]]
speaker = "アルテ"
original = "「なるほど。稀によくあることですね。夢幻美術館でも例があります」"
translation = "「과연. 드물게 자주 있는 일이군요. 몽환 미술관에서도 사례가 있습니다.」"

[[dialogue]]
speaker = "unk"
original = "（稀によくあるとはいったい……？）"
translation = "（드물게 자주 있다니 도대체……?）"

[[dialogue]]
speaker = "ヴィーナス"
original = "「これもリクリエの引き起こした現象……なのかしら？」"
translation = "「이것도 리크리에가 일으킨 현상……인 걸까?」"

[[dialogue]]
speaker = "クマロボ"
original = "「くまぁーーーーーーーーーー！！！！！！」"
translation = "「곰아아아아아아아아아아아!!!!!!!!!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「わっ！\u3000なんか、いっぱい出てきたわ！\u3000何なのこいつら、アルテ、あなた知ってる？」"
translation = "「왓! 뭔가 잔뜩 나왔어! 뭐야 이 녀석들, 아르테, 당신 알아?」"

[[dialogue]]
speaker = "アルテ"
original = "「残念ながら知らない子たちですね」"
translation = "「안타깝게도 모르는 아이들이네요.」"

[[dialogue]]
speaker = "クマロボ"
original = "「くまぁーーーーーーーーーー！！！！！！」"
translation = "「곰아아아아아아아아아아아!!!!!!!!!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「襲ってきた！？」"
translation = "「습격해 왔어!?」"

[[dialogue]]
speaker = "アルテ"
original = "「何だかよくわかりませんが、いい度胸です。天才美少女藝術家の私がサクッと返り討ちにしてみせましょう」"
translation = "「뭔지 잘 모르겠지만 배짱이 좋군요. 천재 미소녀 예술가인 제가 가볍게 역습해 주겠습니다.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あなたも戦えるの！？」"
translation = "「당신도 싸울 수 있어!?」"

[[dialogue]]
speaker = "アルテ"
original = "「──と思ったのですが、天才である私は繊細なので、環境が変わると調子が出ません。ここはお任せします」"
translation = "「──라고 생각했습니다만, 천재인 저는 섬세해서 환경이 바뀌면 컨디션이 나지 않습니다. 여기는 맡기겠습니다.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「期待させるんじゃないわよ！」"
translation = "「기대하게 만들지 마!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「まぁいいわ、危ないから私たちの後ろに下がって！」"
translation = "「뭐 됐어, 위험하니까 우리 뒤로 물러나 있어!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「何だかよく分かんないけど、とりあえずぶっ倒すわよ、クロト！」"
translation = "「뭔지 잘 모르겠지만 일단 때려눕히자고, 쿠로토!」"

[[dialogue]]
speaker = "アルテ"
original = "「……！？\u3000姿が変わった……！？」"
translation = "「……!? 모습이 변했다……!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ディバインスフィア！！」"
translation = "「디바인 스피어!!」"

[[dialogue]]
speaker = "クマロボ"
original = "「く、くまぁああああああ！！！！」"
translation = "「고, 곰아아아아아아아!!!!」"

[[dialogue]]
speaker = "アルテ"
original = "（この不思議な力は……？\u3000私たちの藝術魔法とは違う力のようですが……）"
translation = "（이 불가사의한 힘은……? 우리들의 예술 마법과는 다른 힘인 듯합니다만……）"

[[dialogue]]
speaker = "ヴィーナス"
original = "「オッケー、行けそうね！」"
translation = "「오케이, 할 수 있겠어!」"

[[dialogue]]
speaker = "unk"
original = "モンスターってわけでもなさそうだな"
translation = "몬스터라는 느낌도 아닌 것 같네."

[[dialogue]]
speaker = "ヴィーナス"
original = "「そうね。一気に片付けちゃいましょう！」"
translation = "「그렇네. 단숨에 정리해 버리자!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふぅ、終わったわね。大した相手じゃなかったわ」"
translation = "「휴우, 끝났네. 별거 아닌 상대였어.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「アルテは大丈夫かしら？\u3000怪我はなかった？」"
translation = "「아르테는 괜찮아? 다친 데는 없었어?」"

[[dialogue]]
speaker = "アルテ"
original = "「ええ、この通りピンピンしています。ありがとうございます」"
translation = "「네, 보시다시피 쌩쌩합니다. 감사합니다.」"

[[dialogue]]
speaker = "アルテ"
original = "「ですがあなたたちはいったい……？\u3000藝術家ではないんですよね……？」"
translation = "「하지만 당신들은 도대체……? 예술가는 아니신 거죠……?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私たちは世界の命運をかけて超常現象リクリエと戦う者──<ruby>星騎士<rt>スターナイト</rt></ruby>よ」"
translation = "「우리는 세계의 운명을 걸고 초자연 현상 리크리에와 싸우는 자── 성기사야.」"

[[dialogue]]
speaker = "アルテ"
original = "「星騎士……」"
translation = "「성기사……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私は九浄ヴィーナス、で、こっちは緋宮クロト。詳しい話は一旦、学園の星徒会室で話しましょう」"
translation = "「나는 쿠죠 비너스, 그리고 이쪽은 히노미야 쿠로토. 자세한 이야기는 일단 학원의 성도회실에서 하자.」"

