[[dialogue]]
speaker = "unk"
original = "第３話,謎の声,P"
translation = "제3화, 수수께끼의 목소리, P"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「会長、勝負だー！」"
translation = "「회장, 승부다!」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「……って、全然驚いてないじゃん。そこはもっと驚いてよ～」"
translation = "「……라니, 전혀 놀라지 않잖아. 거기선 좀 더 놀라달라고~」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「星術なら俺が勝つけど？\u3000って顔してる会長に説明しよう！」"
translation = "「성술이라면 내가 이기겠지만? 이라는 얼굴을 하고 있는 회장에게 설명하지!」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「ほら、ボクまだプリマステラにもなってないじゃない？\u3000だから星騎士の頂点に立つ星徒会長様に、ご指導ご鞭撻を賜って強くなろうと思ってさ」"
translation = "「봐봐, 나 아직 프리마스텔라도 못 됐잖아? 그러니까 성기사의 정점에 서 있는 성도회장님께, 지도 편달을 받아서 강해지려고 말이야」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「……ＯＫ？\u3000ありがとー！\u3000今日はバイトもないし、いっぱい付き合ってもらうよ！」"
translation = "「……OK? 고마워! 오늘은 알바도 없으니까, 잔뜩 어울려줘야 해!」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「はぁ、はぁ……もう動けない……ちょっと休憩……」"
translation = "「하아, 하아…… 이제 못 움직이겠어…… 잠깐 휴식……」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「も～っ、いつの間にかこんなに強くなったのさ～！\u3000転入生なのに、一緒にバイトしてたのに……ずるーいっ」"
translation = "「정말~, 어느새 이렇게 강해진 거야~! 전입생인데다, 같이 알바도 했었는데…… 치사해~」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「あはははっ！\u3000でも叫んだらスッキリしたや。特訓付き合ってくれてありがとね」"
translation = "「아하하핫! 그래도 소리 지르니까 개운하네. 특훈 도와줘서 고마워.」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「そういえばさ、御前試合でヴィーナスに勝ったあの力ってなんだったの？\u3000ヴィーナスは魔王がどうとか言ってた気がするけど」"
translation = "「그러고 보니 말이야, 어전시합에서 비너스에게 이겼던 그 힘은 뭐였어? 비너스는 마왕이 어쩌구 했던 것 같은데.」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「……ふーん。本人でもわからないんだ。しかもあれは自由には使えないと」"
translation = "「……흐음. 본인도 모르는구나. 게다가 그건 자유롭게 쓸 수 없다고.」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「それじゃあヴィーナスにちゃんと勝ったとは言えないかもね。あの力を自力で出せるようになったら会長として一人前かな」"
translation = "「그렇다면 비너스에게 제대로 이겼다고는 할 수 없을지도 모르겠네. 그 힘을 스스로 낼 수 있게 되면 회장으로서 제구실을 하는 걸까.」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「ボクはプリマステラに。会長は自分の力を使いこなせるように。お互い頑張って強くなっていこうね」"
translation = "「나는 프리마스텔라로. 회장은 자신의 힘을 능숙하게 다룰 수 있도록. 서로 노력해서 강해지자.」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「でも新星学園でまた会えて良かったな。あんなにバイト頑張ってたのに、ぱったりやめちゃったからどうしたのか気になってたんだ」"
translation = "「그건 그렇고 신성학원에서 다시 만나서 다행이야. 그렇게 알바 열심히 했었는데, 갑자기 그만둬 버려서 어떻게 된 건지 신경 쓰였거든.」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「そもそも、新星学園に転入するためにバイトしてたんだよね。そんな話聞いてなかったから驚いちゃった。もしかしたら忘れてるだけかもしれないけど」"
translation = "「애초에, 신성학원에 전입하기 위해서 알바했던 거지? 그런 얘기 못 들었으니까 깜짝 놀랐어. 어쩌면 잊어버린 것뿐일지도 모르지만.」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「いや～、大変だったけど楽しかったな。コンビニはけっこうやること多いし、喫茶店ではコーヒーひっくり返してめちゃくちゃ謝ったね」"
translation = "「이야~, 힘들었지만 즐거웠지. 편의점은 꽤 할 일이 많고, 카페에서는 커피 엎질러서 엄청나게 사과했었네.」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「そうだ、着ぐるみもヤバかったよね。あれに比べたらモンスターの攻撃なんて大したことないくらい。でも休憩時間に食べるお弁当はおいしかったなぁ……」"
translation = "「맞다, 인형 탈도 장난 아니었지. 그거에 비하면 몬스터의 공격 따위 별거 아닐 정도야. 그래도 휴식 시간에 먹는 도시락은 맛있었지……」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「ねぇ……知ってる？」"
translation = "「있지…… 알고 있어?」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「ボク……キミのことずっと見てたんだよ？」"
translation = "「나…… 너를 계속 보고 있었다구?」"

[[dialogue]]
speaker = "unk"
original = "！？"
translation = "「!?」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「どしたの？\u3000顔が赤いよ？」"
translation = "「왜 그래? 얼굴이 빨개.」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「おや？\u3000おやおや？\u3000もしかしてボクにときめいちゃった？\u3000しょうがないよね～、ボク美少女だから♪」"
translation = "「오야? 오야오야? 설마 나한테 설레버린 거야? 어쩔 수 없지~, 나 미소녀니까♪」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「……あれ？\u3000今のはツッコむところだよ？\u3000その反応だとマジみたいじゃん。恥ずかしいから何とか言ってよ──」"
translation = "「……어라? 방금 건 태클 걸어야 할 타이밍이야. 그런 반응이면 진짜 같잖아. 부끄러우니까 뭐라고 말 좀 해봐──」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「──！\u3000モンスター……アステラも出てるっぽいね」"
translation = "「──! 몬스터…… 아스텔라도 나온 모양이네.」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「ごめん。ボクも行きたかったんだけど、もう戦える星力がないや」"
translation = "「미안. 나도 가고 싶었지만, 이제 싸울 수 있는 성력이 없어.」"

[[dialogue]]
speaker = "unk"
original = "任せてくれ"
translation = "맡겨 줘"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「うん、お願い。モンスターなんて会長パワーでぶっ飛ばしちゃって！」"
translation = "「응, 부탁해. 몬스터 같은 건 회장 파워로 날려버려 줘!」"

[[dialogue]]
speaker = "unk"
original = "だが──"
translation = "하지만──"

[[dialogue]]
speaker = "unk"
original = "強い……！"
translation = "강해……!"

[[dialogue]]
speaker = "unk"
original = "やられ──"
translation = "당하──"

[[dialogue]]
speaker = "？？？"
original = "『うーん……キミも力を付けてきたと思ったんだけど、このレベルはまだ早かったかな。ごめんごめん』"
translation = "『으음…… 너도 실력을 키웠다고 생각했는데, 이 레벨은 아직 일렀나 보네. 미안 미안』"

[[dialogue]]
speaker = "？？？"
original = "『でも強くならないと大切なものは守れないよ。忘れないでね、魔王』"
translation = "『하지만 강해지지 않으면 소중한 것은 지킬 수 없어. 잊지 마, 마왕』"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あ～、目が覚めたかしら～？\u3000私たちが駆け付けたら、モンスターもアステラも消えてて会長が倒れてたの～」"
translation = "「아~, 정신이 좀 들어~? 우리가 달려왔을 때는 몬스터도 아스테라도 사라지고 회장이 쓰러져 있었어~」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そうよ、他にはな～にもなくてびっくりしたんだから！」"
translation = "「그래, 그 외에는 아~무것도 없어서 깜짝 놀랐다니까!」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「ごめん、会長……」"
translation = "「미안해, 회장……」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「ボクがもっと強かったらキミを１人にさせなかったのに……本当にごめんね」"
translation = "「내가 좀 더 강했더라면 너를 혼자 두지 않았을 텐데…… 정말 미안해」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「ううん……会長が無事でよかった」"
translation = "「으응…… 회장이 무사해서 다행이야」"

[[dialogue]]
speaker = "unk"
original = "あのモンスターは普通より数段強力だった。"
translation = "그 몬스터는 보통보다 몇 단계는 강력했다."

[[dialogue]]
speaker = "unk"
original = "だが俺が本当に魔王であるなら、倒せて当然の敵だったんだろう。"
translation = "하지만 내가 정말로 마왕이라면, 쓰러뜨리는 게 당연한 적이었겠지."

[[dialogue]]
speaker = "unk"
original = "しかし薄れゆく意識の中で聞こえてきたのは、いったい誰の声だったんだ……？"
translation = "하지만 희미해지는 의식 속에서 들려온 것은, 대체 누구의 목소리였을까……?"

