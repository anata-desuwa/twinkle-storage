[[dialogue]]
speaker = "ミア"
original = "「ミアね。大きくなったらママとパパみたいな、りっぱな星騎士になるの！」"
translation = "「미아는 말이지. 크면 엄마랑 아빠 같은, 훌륭한 성기사가 될 거야!」"

[[dialogue]]
speaker = "unk"
original = "それが幼い頃からの私の口癖だった。"
translation = "그것이 어릴 적부터 내 말버릇이었다."

[[dialogue]]
speaker = "unk"
original = "私にとってママとパパは、目標で、理想で、誇りで──自分もいつかママとパパのような正義の味方になることを信じて疑わなかった。"
translation = "내게 있어 엄마와 아빠는, 목표이고, 이상이고, 자랑이며── 자신도 언젠가 엄마와 아빠 같은 정의의 편이 될 것을 믿어 의심치 않았다."

[[dialogue]]
speaker = "unk"
original = "だけど──"
translation = "하지만──"

[[dialogue]]
speaker = "ミア"
original = "「コラー、ケンカはやめなさーい！」"
translation = "「이봐, 싸움은 그만둬!」"

[[dialogue]]
speaker = "同級生Ａ"
original = "「やったなっ、おまえっ……！」"
translation = "「네가 먼저 쳤잖아, 이 녀석아……!」"

[[dialogue]]
speaker = "同級生Ｂ"
original = "「おまえこそっ……！」"
translation = "「너야말로……!」"

[[dialogue]]
speaker = "ミア"
original = "「だからやめなさいってば！\u3000言うこと聞きなさいよっ～！」"
translation = "「그러니까 그만두라니까! 내 말 좀 들어!」"

[[dialogue]]
speaker = "同級生Ａ"
original = "「うるせーなっ。いつもいつも、しゃしゃりでてくんなよ、このちんちくりんっ」"
translation = "「시끄러워. 맨날 맨날, 참견하지 마, 이 땅딸보야」"

[[dialogue]]
speaker = "ミア"
original = "「なっ……！」"
translation = "「나앗……!」"

[[dialogue]]
speaker = "同級生Ｂ"
original = "「そーだそーだっ。とめたきゃとめてみろよっ。止められる星力も持ってないくせにっ」"
translation = "「맞아 맞아. 멈추고 싶으면 멈춰보든가. 멈출 수 있는 성력도 없으면서」"

[[dialogue]]
speaker = "ミア"
original = "「あうっ……」"
translation = "「아우……」"

[[dialogue]]
speaker = "unk"
original = "だけど附属校に入学して現実を知った。"
translation = "하지만 부속교에 입학하고 현실을 알게 되었다."

[[dialogue]]
speaker = "unk"
original = "私の星力は平凡もいいところで、体格に至っては同世代の子たちより圧倒的に劣っていたから。"
translation = "내 성력은 평범하기 짝이 없었고, 체격에 이르러서는 또래 아이들보다 압도적으로 열등했으니까."

[[dialogue]]
speaker = "unk"
original = "同級生たちのケンカを止めることすらできなくて、そんな自分がとても歯がゆかった。"
translation = "동급생들의 싸움조차 멈출 수 없어서, 그런 자신이 너무나 안타까웠다."

[[dialogue]]
speaker = "同級生Ａ"
original = "「ちびっ子はおとなしくその辺に隠れてろよ。出てきてもどーせ何もできねーんだから」"
translation = "「꼬맹이는 얌전히 저기 숨어 있어. 나와봤자 어차피 아무것도 못 하니까」"

[[dialogue]]
speaker = "同級生Ｂ"
original = "「親が星騎士だからって調子に乗るなってのっ。お前の実力じゃプリマステラなんて夢のまた夢じゃんか」"
translation = "「부모가 성기사라고 우쭐대지 말라고. 네 실력으론 프리마스텔라 같은 건 꿈도 못 꿀 일이잖아」"

[[dialogue]]
speaker = "ミア"
original = "「そんなこと、ぐすっ、ないもんっ……！」"
translation = "「그렇지, 흑, 않아……!」"

[[dialogue]]
speaker = "unk"
original = "小さいからって侮られることが悔しかった。夢を否定されることが許せなかった。"
translation = "작다고 얕보이는 게 분했다. 꿈을 부정당하는 걸 용서할 수 없었다."

[[dialogue]]
speaker = "unk"
original = "何より、虚勢を張って言い返すことしかできない自分が悲しかった──"
translation = "무엇보다, 허세를 부리며 대꾸하는 것밖에 할 수 없는 자신이 슬펐다──"

[[dialogue]]
speaker = "ミア"
original = "「何やってるんだろ私……。昔のこと思い出して、泣きながら会長さんから逃げだしちゃって……」"
translation = "「나 지금 뭐 하는 거지……. 옛날 생각이나 하고, 울면서 회장님으로부터 도망쳐버리고……」"

[[dialogue]]
speaker = "ミア"
original = "「こんなことじゃ会長さんに心配されるのも当然よ……」"
translation = "「이런 식이면 회장님께서 걱정하시는 것도 당연해……」"

[[dialogue]]
speaker = "ミア"
original = "「せっかくプリマステラになったのに……。凡人なりに頑張って、死に物狂いで努力して、ようやくスタートラインに立てたのに……」"
translation = "「겨우 프리마스텔라가 되었는데……. 범인 나름대로 노력하고, 죽을 힘을 다해 애써서 겨우 스타트 라인에 섰는데……」"

[[dialogue]]
speaker = "ミア"
original = "「なのに駄々っ子みたいに<ruby>喚<rt>わめ</rt></ruby>いて、虚勢を張って、挙げ句の果てに泣きながら逃げちゃうなんて……あの頃から私、何も変わってない」"
translation = "「그런데 떼쓰는 어린애처럼 울부짖고, 허세를 부리고, 결국 울면서 도망치다니…… 그때부터 난, 아무것도 변하지 않았어」"

[[dialogue]]
speaker = "ミア"
original = "「戻ろう。戻って会長さんに謝らなくちゃ……」"
translation = "「돌아가자. 돌아가서 회장님께 사과드려야 해……」"

[[dialogue]]
speaker = "ミア"
original = "「悔しいけど、みんなの言う通りだもん。エリス先輩が敵わなかった相手を一人で捕まえようだなんて無謀にも程があるわ……」"
translation = "「분하지만, 모두가 말한 대로인걸. 에리스 선배가 당해내지 못한 상대를 혼자서 잡으려 하다니 무모하기 짝이 없어……」"

[[dialogue]]
speaker = "ミア"
original = "「私はもっと工夫を凝らさなくちゃ。体が小さい分、星力が平凡な分、みんなと協力したり、頭を使ったりして、物事に対処しないと」"
translation = "「나는 좀 더 머리를 써야 해. 몸이 작은 만큼, 성력이 평범한 만큼, 모두와 협력하거나 머리를 써서 상황에 대처해야지」"

[[dialogue]]
speaker = "ミア"
original = "「今一番大切なことは、私のチンケなプライドを守ることじゃなくて──エリス先輩たちを襲った犯人を捕まえることだもんっ」"
translation = "「지금 가장 중요한 건, 내 잘난 자존심을 지키는 게 아니라── 에리스 선배 일행을 습격한 범인을 잡는 거니까!」"

[[dialogue]]
speaker = "ミア"
original = "「でも犯人は何者……？\u3000私たちぐらいの年頃で魔族、そして戦う力を持っているなら星騎士……」"
translation = "「하지만 범인은 대체 누구지……? 우리 정도의 나이대에 마족, 그리고 싸울 힘을 가지고 있다면 성기사……」"

[[dialogue]]
speaker = "ミア"
original = "「でも星徒会役員並みに強いエリス先輩を倒す星騎士なんて、私たちが知らないはずが……」"
translation = "「하지만 성도회 임원급으로 강한 에리스 선배를 쓰러뜨릴 성기사라면, 우리가 모를 리가……」"

[[dialogue]]
speaker = "ミア"
original = "「な──何っ！？\u3000ケンカっ！？\u3000あっちの通りからだわ……！」"
translation = "「어── 뭐지!? 싸움!? 저쪽 거리에서야……!」"

[[dialogue]]
speaker = "？？？"
original = "「テメエ、今何しやがった？」"
translation = "「네놈, 지금 무슨 짓거리냐?」"

[[dialogue]]
speaker = "男性"
original = "「な、何って、パンを捨てただけだろっ。思ったような味じゃなかったし、いらねーんだからいいだろうがっ」"
translation = "「뭐, 뭐라니, 빵을 버렸을 뿐이잖아. 생각했던 맛도 아니었고, 필요 없으니까 상관없잖아!」"

[[dialogue]]
speaker = "？？？"
original = "「あぁ？\u3000でも食えただろうが。その口はゴミみてーなセリフをほざくためにあんのかよ」"
translation = "「아앙? 그래도 먹을 수는 있었잖아. 그 주둥이는 쓰레기 같은 소리나 지껄이려고 달려 있는 거냐?」"

[[dialogue]]
speaker = "？？？"
original = "「いいか、食い物は命を繋ぐものだ。なら食い物を粗末にするヤツは、命を粗末にされても仕方ねぇよなぁ？」"
translation = "「잘 들어라, 먹을거리는 목숨을 잇는 거다. 그럼 먹을거리를 함부로 다루는 녀석은, 제 목숨이 함부로 다뤄져도 할 말 없겠지?」"

[[dialogue]]
speaker = "男性"
original = "「ゴホゴホっ、首が……離じっ、離じてぐれっ、ぐるじっ……！」"
translation = "「컥, 커흑, 목이…… 노, 노아줘, 노아달라고, 괴로워……!」"

[[dialogue]]
speaker = "ミア"
original = "「その人から手を離しなさいっ！」"
translation = "「그 사람에게서 손 떼세요!」"

[[dialogue]]
speaker = "？？？"
original = "「あぁ？\u3000なんだテメエ。ガキはすっ込んでろよ」"
translation = "「아앙? 뭐야 네놈은. 꼬맹이는 저리 비켜라」"

[[dialogue]]
speaker = "ミア"
original = "「いいから離してっ！\u3000それ以上続けるなら実力行使に出るわよっ！」"
translation = "「됐으니까 놓으세요! 더 이상 계속한다면 실력 행사에 나서겠어요!」"

[[dialogue]]
speaker = "？？？"
original = "「実力行使だぁ……？\u3000……なんだ、その恰好、テメエ星騎士か。いいぜ、それなら相手になってやる」"
translation = "「실력 행사아……? ……뭐냐, 그 모습, 네놈 성기사냐. 좋다, 그렇다면 상대해주지」"

[[dialogue]]
speaker = "男性"
original = "「がふっ……！」"
translation = "「커헉……!」"

[[dialogue]]
speaker = "ミア"
original = "「！？\u3000ちょっと！\u3000やめなさいって言ってるのよ！」"
translation = "「!? 잠깐! 그만두라고 했잖아요!」"

[[dialogue]]
speaker = "？？？"
original = "「だから星騎士様に免じて一発殴るくらいにしてやったんだろうが」"
translation = "「그래서 성기사 나리 체면을 봐서 한 대 때리는 정도로 끝내준 거 아니냐」"

[[dialogue]]
speaker = "？？？"
original = "「アタシに指図すんじゃねえ。テメエみてえな正義の味方面したヤツを見てるとイライラすんだよ」"
translation = "「나한테 지시하지 마라. 네놈처럼 정의의 사자인 척하는 녀석을 보면 짜증 난단 말이다」"

[[dialogue]]
speaker = "？？？"
original = "「テメエが売ってきたケンカだ。お望み通り串刺しにしてやる。昨日の金髪女みてえに逃げてくれんなよ？」"
translation = "「네놈이 걸어온 싸움이다. 원하는 대로 꼬챙이로 만들어주지. 어제의 금발 여자처럼 도망치지 마라?」"

[[dialogue]]
speaker = "ミア"
original = "「昨日の金髪女って──……その耳、その尻尾」"
translation = "「어제의 금발 여자라면──…… 그 귀, 그 꼬리」"

[[dialogue]]
speaker = "ミア"
original = "「まさかあなたがエリス先輩を襲った犯人っ……！？」"
translation = "「설마 당신이 에리스 선배를 습격한 범인……!?」"

[[dialogue]]
speaker = "？？？"
original = "「あん？\u3000なんだ、金髪女の仲間か？\u3000敵討ちってわけか。ハッ、いじらしいねぇ」"
translation = "「엉? 뭐야, 금발 여자의 동료냐? 복수하겠다는 거군. 하, 가상하기도 해라」"

[[dialogue]]
speaker = "キサナ"
original = "「おら、とっととかかってこいよ、正義の味方。キサナ様が身の程教えてやる」"
translation = "「어이, 얼른 덤벼봐라, 정의의 사자님. 키사나 님께서 분수를 가르쳐주마」"

