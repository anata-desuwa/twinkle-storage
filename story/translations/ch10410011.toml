[[dialogue]]
speaker = "unk"
original = "第１話,裏の世界へようこそ,P"
translation = "제1화, 뒷세계에 오신 것을 환영합니다, P"

[[dialogue]]
speaker = "unk"
original = "星徒会の仕事で夜遅くなったある日の帰宅途中。ガラの悪い連中に囲まれている女子生徒を見つけ、助けに入ったのだが――"
translation = "성도회 업무로 밤늦게 귀가하던 어느 날. 질 나쁜 패거리에게 둘러싸인 여학생을 발견하고 도와주러 들어갔는데――"

[[dialogue]]
speaker = "チンピラ"
original = "「この野郎！\u3000オレ以外の連中を倒したからって、調子に乗ってんじゃねぇ！\u3000くらいやがれ！」"
translation = "「이 자식이! 나 말고 다른 녀석들을 쓰러뜨렸다고 우쭐대지 마! 먹어라!」"

[[dialogue]]
speaker = "unk"
original = "ただのチンピラじゃないのか！？"
translation = "그냥 양아치가 아닌 건가!?"

[[dialogue]]
speaker = "unk"
original = "こいつも星術を……！"
translation = "이 녀석도 성술을……!"

[[dialogue]]
speaker = "チンピラ"
original = "「誰がチンピラだオラァ！\u3000ぐあっ……！？」"
translation = "「누가 양아치라는 거냐 임마! 끄악……!?」"

[[dialogue]]
speaker = "unk"
original = "キミ、怪我はない？"
translation = "너, 다친 곳은 없어?"

[[dialogue]]
speaker = "unk"
original = "ふぅ……何とか全員鎮圧出来たな……"
translation = "후우…… 어떻게든 전원 진압했군……"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「いや～、お兄さん、強いね～♪\u3000助かっちゃった～」"
translation = "「이야~, 오빠, 강하네~♪ 덕분에 살았어~」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「おっと……ちょっと足元がふらつくなぁ。気付かない内に攻撃くらってたかも……」"
translation = "「어라…… 조금 발이 휘청거리네. 모르는 사이에 공격을 받았을지도……」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ん？\u3000肩を貸してくれるの？\u3000優しい～♪\u3000じゃあ、お言葉に甘えて――」"
translation = "「응? 어깨를 빌려주는 거야? 상냥해라~♪ 그럼, 사양 않고――」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「トラップ爆弾をくっ付けさせて貰うね♪」"
translation = "「트랩 폭탄을 붙여둘게♪」"

[[dialogue]]
speaker = "unk"
original = "全身に貼り付いて動けない！？"
translation = "전신에 달라붙어서 움직일 수 없어!?"

[[dialogue]]
speaker = "unk"
original = "うわっ、何かガムみたいなのが"
translation = "우와, 뭔가 껌 같은 게"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「にひひ♪\u3000私が事前に星術で作っておいた拘束用爆弾『ラプチャーガム』だよ。相手の星力を吸うことで粘着力が強くなるから、簡単には剥がせないよ～？」"
translation = "「니히히♪ 내가 미리 성술로 만들어 둔 구속용 폭탄 『랩처 검』이야. 상대의 성력을 흡수하면 점착력이 강해지니까 쉽게 떼어낼 수 없을걸~?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「それにしても、星術を悪用する犯罪者を、秘密裏に処理する『公安委員会』なんて都市伝説があったけど、まさか実在したとはね～」"
translation = "「그나저나, 성술을 악용하는 범죄자를 비밀리에 처리하는 『공안위원회』 같은 도시 전설이 있었는데, 설마 실재했다니 말이야~」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「違う？\u3000自分は星徒会長？\u3000いやいや、転入して早々に会長就任とか怪し過ぎるでしょ～。本当は公安委員会のエージェントなんだよね？\u3000あくまでしらを切るっていうなら――」"
translation = "「아니라고? 자신은 성도회장? 에이, 전학 오자마자 회장 취임이라니 너무 수상하잖아~. 사실은 공안위원회의 에이전트지? 끝까지 시치미를 떼겠다면――」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「脇腹を……えいっ♪」"
translation = "「옆구리를…… 에잇♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「こうやって、拷問するしかないよね～♪\u3000こちょこちょこちょ～♪」"
translation = "「이렇게 고문할 수밖에 없겠네~♪ 간질간질간질~♪」"

[[dialogue]]
speaker = "unk"
original = "あはははははは！"
translation = "아하하하하하하!"

[[dialogue]]
speaker = "unk"
original = "ちょっ……やめっ"
translation = "잠깐…… 그만"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「にひひ♪\u3000きゃはははははは！\u3000会長の悶える顔見るの、楽しくて癖になっちゃうかも～♪」"
translation = "「니히히♪ 꺄하하하하하하! 회장님이 괴로워하는 얼굴을 보는 거, 즐거워서 버릇이 될지도~♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「あっ……やべっ、会長って言っちった☆」"
translation = "「앗…… 이런, 회장님이라고 해버렸네☆」"

[[dialogue]]
speaker = "せつな"
original = "「マイン殿、ちょっと遊び過ぎでござる」"
translation = "「마인 공, 너무 장난이 심하오」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「あちゃ～、もう見つかっちゃったか。本丸はもう制圧終了？」"
translation = "「아차~, 벌써 들켜버렸나. 본진은 벌써 제압 종료?」"

[[dialogue]]
speaker = "せつな"
original = "「左様。その報告にと来てみれば……主様に何をしているのでござるか」"
translation = "「그렇소. 그 보고를 하러 와보니…… 주군께 무엇을 하고 있는 것이오」"

[[dialogue]]
speaker = "unk"
original = "制圧って一体何を……！？"
translation = "제압이라니 도대체 뭘……!?"

[[dialogue]]
speaker = "unk"
original = "せつな……！？"
translation = "세츠나……!?"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「しゃーない。もうちょっと遊びたかったけど……拘束解除っと」"
translation = "「어쩔 수 없지. 좀 더 놀고 싶었지만…… 구속 해제」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「はい、これで拘束は消えたから、自由に動けるよ～♪」"
translation = "「자, 이걸로 구속은 사라졌으니까 자유롭게 움직일 수 있어~♪」"

[[dialogue]]
speaker = "せつな"
original = "「任務中に悪戯心を出すのは、マイン殿の悪い癖にござる。しかも主様相手とは……」"
translation = "「임무 중에 장난기를 드러내는 것은 마인 공의 나쁜 버릇이오. 게다가 주군을 상대로……」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「会長に獲物を奪われちゃったからさ～。その代わりに、ストレス解消を引き受けて貰ったんだよ♪\u3000大丈夫、痛いことはしてないって～」"
translation = "「회장님한테 사냥감을 빼앗겨 버렸으니까 말이야~. 그 대신에 스트레스 해소를 도와달라고 한 거야♪ 괜찮아, 아픈 짓은 안 했다니까~」"

[[dialogue]]
speaker = "せつな"
original = "「そういう問題じゃないでござる！\u3000第一、これでは主様に我々の任務を知られ……まさかマイン殿、主様に話したのでござるか？」"
translation = "「그런 문제가 아니오! 우선, 이래서는 주군께 우리의 임무를 들키게…… 설마 마인 공, 주군께 이야기한 것이오?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「いや、まだ。……だけど、委員会の取り決めでは、星徒会長には事情に応じて身分を明かしていいってことになってたよ？」"
translation = "「아니, 아직. ……하지만 위원회의 규정에는 성도회장에게는 사정에 따라 신분을 밝혀도 된다고 되어 있었어」"

[[dialogue]]
speaker = "せつな"
original = "「ヴィーナスお嬢様には明かさなかったのにでござるか！？\u3000それに、上の判断も仰ぐ必要が……」"
translation = "「비너스 아가씨께는 밝히지 않았는데 말이오!? 게다가 윗선의 판단도 물어볼 필요가……」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「怒られるかもね～。でも、そこはまあ交渉するよ。私は一応、交渉人だからね♪」"
translation = "「혼날지도 모르겠네~. 하지만 그건 뭐, 교섭해야지. 나는 일단 교섭인이니까♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「そんなわけで会長。色々と疑問符を頭に抱えてるだろうから、自己紹介させてもらうね」"
translation = "「그런 이유로 회장님. 여러모로 머릿속에 물음표가 가득할 테니까 자기소개를 할게」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「私は新星学園の１年生、立朽ネーゼマイン。学園の裏組織『公安委員会』に所属するエージェントなんだ。よろしくね♪」"
translation = "「나는 신성 학원 1학년, 타치쿠치 네제마인. 학원의 어둠의 조직 『공안위원회』에 소속된 에이전트야. 잘 부탁해♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「当たり前だけど、星力を持っている人が全員、星騎士になるわけじゃないし、善人なわけでもない」"
translation = "「당연한 거지만, 성력을 가진 사람이 전부 성기사가 되는 건 아니고, 선인인 것도 아니야」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「そういった星術使いの犯罪が、事件化する前に秘密裏に処理するのが私達の使命ってわけ。だから表向きには存在しない、裏の委員会ってこと」"
translation = "「그런 성술사의 범죄가 사건이 되기 전에 비밀리에 처리하는 것이 우리의 사명이라는 말씀. 그래서 겉으로는 존재하지 않는 어둠의 위원회라는 거야」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「何故自分に話したのかって顔だね？\u3000こうして現場を見られたからってのもあるけど……ヴィーナスさんより、会長はこっちの世界に向いてそうだって、私が感じたからかな？」"
translation = "「왜 자신에게 말했냐는 얼굴이네? 이렇게 현장을 들켰기 때문이기도 하지만…… 비너스 씨보다 회장님이 이쪽 세계에 더 어울릴 것 같다고 내가 느꼈기 때문일까?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「せつなとも既に面識があるみたいだし。会長の適応力に関しては、目を見張るものがあるよ」"
translation = "「세츠나와도 이미 안면이 있는 것 같고. 회장님의 적응력에 관해서는 눈여겨볼 만한 게 있어」"

[[dialogue]]
speaker = "せつな"
original = "「せつなは別に、主様を巻き込む気は……」"
translation = "「세츠나는 딱히 주군을 끌어들일 생각은……」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「でも、せつなだって、主様がバックアップしてくれたら、心強いし、嬉しいでしょ？」"
translation = "「하지만 세츠나도 주군이 백업해 준다면 든든하고 기쁘잖아?」"

[[dialogue]]
speaker = "せつな"
original = "「それはまあ……仕事を褒めてもらえたりしたら、嬉しいでござるが……」"
translation = "「그거야 뭐…… 업무를 칭찬받거나 하면 기쁘겠지만 말이오……」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「それに私の想像通りなら、会長はそういう悪が存在すると知ってしまった以上、何も見なかったことになんて出来ない人なんじゃないかな。……違います？」"
translation = "「게다가 내 상상대로라면 회장님은 그런 악이 존재한다는 걸 알아버린 이상, 아무것도 못 본 척할 수 없는 사람이 아닐까 싶어서. ……아닌가요?」"

[[dialogue]]
speaker = "unk"
original = "うん。見なかったことには出来ない"
translation = "응. 못 본 척할 수는 없어"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「だったら、正体を明かして、協力を取り付けちゃった方がメリットが大きい。そうじゃない？」"
translation = "「그렇다면 정체를 밝히고 협력을 얻어내는 편이 메리트가 커. 그렇지 않아?」"

[[dialogue]]
speaker = "せつな"
original = "「……マイン殿、まさかとは思うでござるが、この状況をわざと作り出して……」"
translation = "「……마인 공, 설마 하는 생각이 들지만, 이 상황을 일부러 만들어내서……」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ん？\u3000いや、流石に勘繰り過ぎだよ～。偶然だよ、偶然♪\u3000でも……」"
translation = "「응? 아니, 그건 너무 깊게 생각한 거야~. 우연이야, 우연♪ 하지만……」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「偶然なら仕方ないよね？\u3000見られてしまったから、交渉して協力関係を結んだ。ミスはフォロー出来たし、結果的にはプラスになってる」"
translation = "「우연이라면 어쩔 수 없잖아? 들켜버렸으니까 교섭해서 협력 관계를 맺었다. 실수는 만회했고 결과적으로는 플러스가 됐어」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「私が怒られるだけで、結果オーライってやつじゃないかな？\u3000にひひ♪」"
translation = "「나만 혼나면 되는 거니까, 결과 좋으면 다 좋다는 거 아닐까? 니히히♪」"

[[dialogue]]
speaker = "せつな"
original = "「あ、あまり追究すると怖いので……せつなは聞かなかったことにしておくでござる」"
translation = "「너, 너무 추궁하면 무서우니까…… 세츠나는 못 들은 것으로 하겠소」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ともあれ、これから会長には色々とお願いすると思うんで、よろしくお願いしますね♪」"
translation = "「어쨌든, 앞으로 회장님께는 여러 가지 부탁을 할 것 같으니 잘 부탁드려요~♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「裏の世界へようこそ、会長♪」"
translation = "「뒷세계에 오신 것을 환영해요, 회장님♪」"

[[dialogue]]
speaker = "unk"
original = "そう言って、ネーゼマインは楽しげに、ニヤリと笑ってみせるのだった。"
translation = "그렇게 말하며 네제마인은 즐거운 듯이 씨익 웃어 보였다."

