[[dialogue]]
speaker = "unk"
original = "第４話,アルテの残したもの,P"
translation = "제4화, 아르테가 남긴 것 / P"

[[dialogue]]
speaker = "unk"
original = "流星市国内でアステラが発生。新星星徒会が急行しようとしたのだが──"
translation = "유성시국 내에서 아스텔라 발생. 신성학생회가 급히 출동하려 했으나──"

[[dialogue]]
speaker = "アルテ"
original = "「またアステラとかいうのが発生したのですか？\u3000でしたら私も一緒に行きます」"
translation = "「또 아스텔라인가 하는 게 발생했나요? 그렇다면 저도 같이 가겠습니다.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「どうしたのよ、急に。何か変な物でも食べた？\u3000それともこの前のお肉の恨みがまだ晴らしきれてないとか？」"
translation = "「갑자기 왜 그래? 뭐 잘못 먹었어? 아니면 저번에 고기 원한이 아직 덜 풀린 거야?」"

[[dialogue]]
speaker = "アルテ"
original = "「あなたは私を、食べることしか頭に無い人間だと思っていませんか？」"
translation = "「당신은 저를 먹는 것밖에 머리에 없는 인간이라고 생각하시나요?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ぶっちゃけ思ってるわ！」"
translation = "「솔직히 그렇게 생각해!」"

[[dialogue]]
speaker = "アルテ"
original = "「まったく失礼な人ですね。天才美少女藝術家である私を捕まえて」"
translation = "「정말 실례되는 분이네요. 천재 미소녀 예술가인 저를 두고.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「じゃあどういう風の吹き回しよ」"
translation = "「그럼 갑자기 무슨 바람이 불어서야?」"

[[dialogue]]
speaker = "アルテ"
original = "「ここ最近、美味しいものを毎日のように食べていますからね。たまには運動するのもいいと思いまして」"
translation = "「요 근래 맛있는 걸 매일같이 먹고 있으니까요. 가끔은 운동하는 것도 좋겠다고 생각해서요.」"

[[dialogue]]
speaker = "アルテ"
original = "「元の世界に戻った時、無神経な館長に無神経なことを言われたくありませんし」"
translation = "「원래 세계로 돌아갔을 때 무신경한 관장에게 무신경한 소리를 듣고 싶지도 않고요.」"

[[dialogue]]
speaker = "マトイ"
original = "「私たち的には人手がある方が助かるけど、いいの？」"
translation = "「우리 입장에서는 인원이 늘면 도움이 되긴 하는데 괜찮겠어?」"

[[dialogue]]
speaker = "アルテ"
original = "「いいですよ。いろいろお世話になっていますし、たまには恩返しをさせてもらいます」"
translation = "「괜찮아요. 여러모로 신세 지고 있으니 가끔은 보답하게 해주세요.」"

[[dialogue]]
speaker = "unk"
original = "アルテを伴って、アステラの発生現場に向かう。"
translation = "아르테를 동반해 아스텔라 발생 현장으로 향한다."

[[dialogue]]
speaker = "unk"
original = "現れたモンスターたちは強力だったが、アルテが戦力に加わってくれたおかげで無事に倒すことが出来た。"
translation = "나타난 몬스터들은 강력했지만 아르테가 전력에 가세해 준 덕분에 무사히 쓰러뜨릴 수 있었다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「すっかりこっちの世界での戦い方も板についてきたわね」"
translation = "「이제 이쪽 세계에서의 싸움 방식도 꽤 익숙해졌네.」"

[[dialogue]]
speaker = "マトイ"
original = "「アルテさんがいてくれて本当に助かるよ～」"
translation = "「아르테 씨가 있어 줘서 정말 큰 도움이 됐어~」"

[[dialogue]]
speaker = "アルテ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "どうしたの？"
translation = "왜 그래?"

[[dialogue]]
speaker = "アルテ"
original = "「いえ、少し考えごとをしていただけです」"
translation = "「아니요, 조금 생각할 게 있었을 뿐입니다.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そういえばさっきの戦いの最中も、私たちのことをじっと見てる感じがあったわね」"
translation = "「그러고 보니 아까 싸우는 도중에도 우리를 빤히 쳐다보는 느낌이 있었지.」"

[[dialogue]]
speaker = "アルテ"
original = "「目ざといですね、気付いていたんですか？」"
translation = "「눈치 빠르시네요, 알고 계셨나요?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふふふ、甘く見ないことね……私にかかればなんだってお見通しよ！」"
translation = "「후후후, 얕보지 말라고…… 내 눈엔 뭐든 다 보인단 말이야!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そうね……あなた、私たちを絵のモチーフにしようとしているんじゃないかしら？」"
translation = "「그렇지…… 너 우리를 그림 모티브로 삼으려는 거 아냐?」"

[[dialogue]]
speaker = "アルテ"
original = "「うわぁ……その得意げな顔、腹立ちますね……」"
translation = "「우와…… 그 기세등등한 얼굴, 화나네요……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「アルテにだけは言われたくないわ！」"
translation = "「아르테 너한테만은 듣고 싶지 않아!」"

[[dialogue]]
speaker = "マトイ"
original = "「でも、アルテさんに描いてもらえるなら嬉しいな。もしかしたらその絵が、後世に語り継がれる名画になったりして……」"
translation = "「그래도 아르테 씨가 그려준다면 기쁠 것 같아. 어쩌면 그 그림이 후세에 전해질 명화가 될지도……」"

[[dialogue]]
speaker = "アルテ"
original = "「まあ私が描けば歴史に残る名作が生まれること間違いなしですが、すべては気分次第ですね」"
translation = "「뭐 제가 그리면 역사에 남을 명작이 탄생할 건 틀림없지만 모든 건 기분 내키는 대로니까요.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そんなに自信があるなら、たまには描いてみせてよ」"
translation = "「그렇게 자신 있으면 가끔은 좀 그려서 보여줘 봐.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それともアルテってもしかして口だけで、本当は絵なんて描けないんじゃないかしら？」"
translation = "「아니면 아르테 너 혹시 말로만 그러고 사실 그림 같은 건 못 그리는 거 아냐?」"

[[dialogue]]
speaker = "アルテ"
original = "「おや、そんなこと言っていいんですか？\u3000私の絵を見たら、恥ずかしさと後悔で震えることになりますよ？」"
translation = "「오호, 그런 말을 하셔도 되는 건가요? 제 그림을 보면 부끄러움과 후회로 떨게 될걸요?」"

[[dialogue]]
speaker = "アルテ"
original = "「まあ、描くとしても元の世界に戻ってから、ということになると思いますが」"
translation = "「뭐, 그린다고 해도 원래 세계로 돌아간 뒤의 일이 되겠지만요.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「はぁ！？\u3000それじゃ完成しても私たちが見れないじゃない！\u3000何とかして届けて！」"
translation = "「하아!? 그럼 완성해도 우리가 못 보잖아! 어떻게든 전해주라고!」"

[[dialogue]]
speaker = "アルテ"
original = "「無理に決まってるでしょう」"
translation = "「무리인 게 당연하잖아요.」"

[[dialogue]]
speaker = "unk"
original = "でもアルテの絵は純粋に見てみたいな"
translation = "그래도 아르테의 그림은 순수하게 보고 싶네"

[[dialogue]]
speaker = "アルテ"
original = "「そうですか？\u3000では、あまり期待しないで待っていてください」"
translation = "「그렇습니까? 그럼 너무 기대하지 말고 기다려 주세요.」"

[[dialogue]]
speaker = "unk"
original = "と、そんな話をした数日後のこと。"
translation = "라고 그런 이야기를 나눈 며칠 뒤의 일."

[[dialogue]]
speaker = "unk"
original = "別れはあっけなく訪れた。"
translation = "이별은 허무하게 찾아왔다."

[[dialogue]]
speaker = "unk"
original = "このお祭り騒ぎの元凶である黒ベア子が、突然現れたベア子という少女によって連れ戻されたのだ。"
translation = "이 축제 소동의 원흉인 흑베아코가 갑자기 나타난 베아코라는 소녀에 의해 끌려간 것이다."

[[dialogue]]
speaker = "unk"
original = "そして、首謀者がいなくなったことで異変は収まり、アルテとプトラはそれぞれの世界へと帰っていった。"
translation = "그리고 주모자가 사라짐으로써 이변은 수습되었고 아르테와 푸트라는 각자의 세계로 돌아갔다."

[[dialogue]]
speaker = "マトイ"
original = "「あれ？\u3000日誌に描いてあるこの絵って、もしかしてアルテさんが描いたものかな？」"
translation = "「어라? 일지에 그려진 이 그림, 혹시 아르테 씨가 그린 걸까?」"

[[dialogue]]
speaker = "unk"
original = "どれどれ？"
translation = "「어디 어디?」"

[[dialogue]]
speaker = "アナ"
original = "「これはまた前衛的な……この絵を描いた人が私たちと入れ替わりにこちらに来ていた人なのですね」"
translation = "「이건 또 전위적인…… 이 그림을 그린 사람이 우리와 교대해서 이쪽으로 왔던 사람이군요.」"

[[dialogue]]
speaker = "サーシャ"
original = "「不思議な迫力が伝わってくる絵だわ～」"
translation = "「불가사의한 박력이 전해져 오는 그림이네~」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「言葉にできないけど、目が離せないわね……あの子、本当にちゃんとした藝術家だったのね」"
translation = "「말로 표현할 수는 없지만, 눈을 뗄 수가 없네…… 그 아이, 정말로 제대로 된 예술가였구나.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「……あれ？\u3000もしかしてこれ、この絵のモデルって私たちじゃない？」"
translation = "「……어라? 혹시 이거, 이 그림의 모델 말이야, 우리 아니야?」"

[[dialogue]]
speaker = "unk"
original = "言われてみたらそんな気もするな"
translation = "듣고 보니 그런 기분도 드네"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ほら、一緒にモンスターと戦った時の！\u3000間違いないわ！」"
translation = "「봐봐, 같이 몬스터와 싸웠을 때의! 틀림없어!」"

[[dialogue]]
speaker = "マトイ"
original = "「アルテさん、ちゃんと私たちの絵を描いてくれてたんだね」"
translation = "「아르테 씨, 제대로 우리 그림을 그려 줬구나.」"

[[dialogue]]
speaker = "マトイ"
original = "「でもどれが私なんだろ？\u3000独特な絵でわかりにくいような……」"
translation = "「하지만 어떤 게 나일까? 독특한 그림이라 알기 어려운 것 같기도……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「いや、案外特徴を捉えてるわよ。この子でしょ、マトイって。そっくりじゃない」"
translation = "「아니, 의외로 특징을 잘 포착하고 있어. 이 애지, 마토이 말이야. 판박이잖아.」"

[[dialogue]]
speaker = "アナ"
original = "「ええ、私もマトイ先輩は一番に分かりました」"
translation = "「네, 저도 마토이 선배는 제일 먼저 알아봤어요.」"

[[dialogue]]
speaker = "サーシャ"
original = "「目立つところに描いてもらってよかったわね～」"
translation = "「눈에 띄는 곳에 그려져서 다행이네~」"

[[dialogue]]
speaker = "マトイ"
original = "「……なんかちょっと複雑な気分なんですけど」"
translation = "「……왠지 좀 복잡한 기분입니다만.」"

[[dialogue]]
speaker = "unk"
original = "アルテの絵の描かれた日誌をみんなで覗き込んで笑い合う。"
translation = "아르테의 그림이 그려진 일지를 다 함께 들여다보며 웃음꽃을 피운다."

[[dialogue]]
speaker = "unk"
original = "そして、アルテが帰ってしまったのはついこの間だというのに、もう寂しい気持ちになってしまって……"
translation = "그리고, 아르테가 돌아가 버린 것은 바로 요 전날의 일인데도, 벌써 쓸쓸한 기분이 들어서……"

[[dialogue]]
speaker = "unk"
original = "アルテのお気に入りだったソファについ目をやるのだった。"
translation = "아르테가 즐겨 앉던 소파로 그만 눈길을 돌리고 마는 것이었다."

