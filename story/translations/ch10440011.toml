[[dialogue]]
speaker = "unk"
original = "第１話,自称・悪の終末兵器（前編）,P"
translation = "제1화, 자칭·악의 종말병기 (전편), P"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「きゃあああぁぁぁ～～～っ！」"
translation = "「꺄아아아아아아~~~~앗!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「お兄さん、転んだどさくさに紛れて、どこを触ってるんですか！\u3000というか、お兄さんが一緒にいると、どうしてこんなエッチなことばかり起きるんですかぁぁぁっ！？」"
translation = "「오빠, 넘어진 틈을 타서 어디를 만지는 거예요! 그보다, 오빠랑 같이 있으면 왜 이렇게 야한 일만 일어나는 건가요오오오오앗!?」"

[[dialogue]]
speaker = "unk"
original = "ごめん、わざとじゃないんだーーーっ！"
translation = "미안, 일부러 그런 게 아니야――앗!"

[[dialogue]]
speaker = "？？？"
original = "「ククク……！\u3000ついに見つけたのじゃ、<b>特異点</b>を……！」"
translation = "「크크크……! 드디어 찾아낸 것이니라, <b>특이점</b>을……!」"

[[dialogue]]
speaker = "unk"
original = "流星学園附属校の生徒会長であるサチと知り合って少し経った、ある日のこと。外を歩いていると、どこからか大きな笑い声が聞こえてきた。"
translation = "류세이 학원 부속교의 학생회장인 사치와 알게 된 지 얼마 되지 않은 어느 날. 밖을 걷고 있자, 어디선가 커다란 웃음소리가 들려왔다."

[[dialogue]]
speaker = "？？？"
original = "「フハハハハハ！\u3000新星学園の星徒会長、待っておったぞ！」"
translation = "「후하하하하하! 신성 학원의 성도회장, 기다리고 있었느니라!」"

[[dialogue]]
speaker = "？？？"
original = "「って、どこを見ておるのじゃ！\u3000我がいるのは、校門の上じゃ、上！」"
translation = "「아니, 어디를 보고 있는 것이냐! 내가 있는 곳은 교문 위이니라, 위!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「フハハハ！\u3000我の名は、プリムラ！\u3000かつて世界をリクリエの危機におとしいれ、今は世界征服をもくろむ、悪の終末兵器じゃ！」"
translation = "「후하하하! 나의 이름은 프리뮬러! 과거 세계를 리크리에의 위기에 빠뜨리고, 지금은 세계 정복을 꾀하는, 악의 종말병기이니라!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「喜べ、新星の星徒会長よ！\u3000貴様はこたび、特異点として我の眼鏡にかなったのじゃ。よって貴様を、我の第一の<ruby>眷族<rt>けんぞく</rt></ruby>にしてやろう！」"
translation = "「기뻐하거라, 신성의 성도회장이여! 네놈은 이번에 특이점으로서 나의 눈에 들었느니라. 따라서 네놈을 나의 제1의 권속으로 삼아주마!」"

[[dialogue]]
speaker = "unk"
original = "そんなところに立っていると、危ないよ？"
translation = "그런 곳에 서 있으면 위험해?"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「いや、人の話を聞かんか！\u3000というか、我を子供扱いすなぁーーっ！」"
translation = "「아니, 남의 말을 안 듣는 것이냐! 그보다 나를 어린애 취급 하지 마아아――앗!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「よく見ろ、流星学園附属の制服を着とるじゃろうが！\u3000我は２年生で、しかも生徒会役員なのじゃ！」"
translation = "「잘 보거라, 류세이 학원 부속의 교복을 입고 있지 않느냐! 나는 2학년이고, 게다가 학생회 임원이란 말이다!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「――そうじゃ、サチと同じじゃ！\u3000だからもっと礼を尽くし――のわっ！？\u3000しまったのじゃ、足が滑っ……！？」"
translation = "「――그래, 사치와 마찬가지이니라! 그러니 좀 더 예의를 갖추―― 노왓!? 이런, 발이 미끄러……!?」"

[[dialogue]]
speaker = "unk"
original = "言わんこっちゃない！\u3000キャッチ！"
translation = "거봐, 내가 뭐랬어! 캐치!"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「おおっ！\u3000さすがは我が認めた男じゃ、苦しゅうないぞ♪」"
translation = "「오오! 역시 내가 인정한 남자구나, 기특하도다♪」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「もっとも、我は<b>どんな高さから落ちようと</b>体に傷１つ付きはせぬが……レディに対するその気遣いは悪くないのじゃ」"
translation = "「뭐, 나는 <b>어떤</b> <b>높이에서</b> <b>떨어지든</b> 몸에 상처 하나 나지 않지만…… 숙녀에 대한 그 배려는 나쁘지 않구나」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「改めて名乗ろう。我はプリムラ。不本意ながらサチの『ロストアイテム』回収を手伝わされておる。あやつから魔法少女活動のことは聞いておろう？」"
translation = "「다시 통성명하지. 나는 프리뮬러. 본의 아니게 사치의 『로스트 아이템』 회수를 돕고 있느니라. 그 녀석에게 마법 소녀 활동에 대해서는 들었겠지?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「――そう、ロストアイテムは、使い方によっては世界を滅ぼすことも可能な、危険な古代遺物じゃ。それを放置して、勝手に世界を終末へ導かれても困るのでな」"
translation = "「――그래, 로스트 아이템은 사용법에 따라서는 세계를 멸망시키는 것도 가능한 위험한 고대 유물이니라. 그것을 방치해서 멋대로 세계를 종말로 인도하게 둬서는 곤란하니까 말이다」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ククク……それにあわよくば、サチの横から掠めとり、世界征服に利用してやるのも悪くないのじゃ。あやつをいつか、ギャフンと言わせてやらねば気が済まぬからな」"
translation = "「크크크…… 게다가 운이 좋으면 사치의 옆에서 가로채 세계 정복에 이용해 주는 것도 나쁘지 않지. 그 녀석을 언젠가 꼼짝 못 하게 해주지 않으면 직성이 풀리지 않으니까」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「なんせ我は、あやつが持っているロストアイテムのせいで、命令に逆らうことができぬ。『悪の終末兵器』だというのに、無理矢理従わされているのじゃ」"
translation = "「그도 그럴 것이 나는 그 녀석이 가진 로스트 아이템 때문에 명령을 거역할 수가 없느니라. 『악의 종말병기』인데도 억지로 부려 먹히고 있단 말이다」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「これも全て、サチの化け物じみた幸運のせい。我はそのとばっちりを受け、散々辛酸を舐めさせられてきたのじゃ。しかし、そんな不幸な日々もこれまで！」"
translation = "「이것도 전부 사치의 괴물 같은 행운 때문이니라. 나는 그 불똥을 맞고 산전수전을 다 겪어왔지. 하지만 그런 불행한 나날도 이제 끝이다!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「我はついにあやつの幸運に対抗し得る特異点を見つけたのじゃ！\u3000それが、新星の星徒会長……貴様じゃ！」"
translation = "「나는 마침내 그 녀석의 행운에 대항할 수 있는 특이점을 찾아냈느니라! 그것이 신성의 성도회장…… 네놈이다!」"

[[dialogue]]
speaker = "unk"
original = "俺が、特異点……？"
translation = "내가 특이점……?"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「そうじゃ。我の目はあざむけぬぞ！\u3000サチは貴様といると、何故かハレンチなトラブルに見舞われる！\u3000それはつまり、貴様がサチの幸運を狂わす存在ということなのじゃ！」"
translation = "「그렇다. 내 눈은 속일 수 없느니라! 사치는 네놈과 있으면 왠지 파렴치한 트러블을 겪게 되지! 그것은 즉 네놈이 사치의 행운을 뒤흔드는 존재라는 뜻이니라!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「その力を見込んでこたび、貴様を我の眷属にしてやろうというわけじゃ。光栄に思うがよい！」"
translation = "「그 힘을 보고 이번에 네놈을 나의 권속으로 삼아주겠다는 것이다. 영광으로 알거라!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「――よし、それでは貴様。頭の位置を少し下げるがよい」"
translation = "「――좋아, 그럼 네놈. 머리 위치를 조금 낮추거라」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「何故かって？\u3000先程、我が校門の上から落ちたところを助けたであろう？\u3000その礼みたいなものじゃ」"
translation = "「왜냐고? 아까 내가 교문 위에서 떨어졌을 때 도와주지 않았느냐? 그 답례 같은 것이니라」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ククク……よいぞ。その頭の高さなら、ちょうどよく届く」"
translation = "「크크크…… 좋다. 그 머리 높이라면 딱 알맞게 닿겠구나」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ん……ちゅっ<emoji=heart04>」"
translation = "「음…… 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "っ！？\u3000ちょっ、いきなり何でキスを！？"
translation = "윽!? 잠깐, 갑자기 왜 키스를!?工"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「フハハハ！\u3000かかったな！\u3000今更警戒しても、もう遅い！」"
translation = "「후하하하! 걸려들었구나! 이제 와서 경계해도 이미 늦었다!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「我の体の一部をお前に飲ませた。契約の儀式により、貴様は強制的に我の眷属となるのじゃ！」"
translation = "「나의 신체 일부를 네놈에게 먹였느니라. 계약 의식에 의해 네놈은 강제적으로 나의 권속이 되는 것이니라!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「フハハハ！\u3000契約成立なのじゃ！」"
translation = "「후하하하! 계약 성립이니라!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「これで貴様は、我の眷族となった。我の命令は絶対で、逆らうことはできないのじゃ。フフフ、試してみるか？\u3000そうじゃな……ほれ――」"
translation = "「이걸로 네놈은 나의 권속이 되었다. 나의 명령은 절대적이며 거역할 수 없느니라. 후후후, 시험해 보겠느냐? 그렇군…… 자――」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「我の手の甲に、キスをするのじゃ！」"
translation = "「나의 손등에 키스를 하거라!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「……って、どうした？\u3000何をボーッとしておる？\u3000我の命令には絶対のはず……」"
translation = "「……어라, 왜 그러느냐? 뭘 멍하니 있는 것이냐? 나의 명령에는 절대적일 텐데……」"

[[dialogue]]
speaker = "unk"
original = "手の甲にって、忠誠を示せ！\u3000ってこと？"
translation = "손등에 하라니, 충성을 맹세하라는 거야?"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「そうじゃ！\u3000――のわっ！？\u3000な、何……！？\u3000わ、我の体が勝手に動いて……！」"
translation = "「그렇다! ――노왓!? 뭐, 뭐야……!? 내, 내 몸이 멋대로 움직여서……!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ちゅっ<emoji=heart04>\u3000……って、どうして我の方が、貴様の手にキスをしておるのじゃあぁぁぁっ！？」"
translation = "「쪽<emoji=heart04> ……어째서 내가 네놈의 손에 키스를 하고 있는 것이냐아아아아앗!?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ま、まさか我よりも、貴様の格の方が上じゃというのか……！？\u3000それ故に、我の方が貴様の眷族になってしまったとでも！？」"
translation = "「서, 설마 나보다 네놈의 격이 위라는 것이냐……!? 그 때문에 내가 네놈의 권속이 되어버렸다는 것이냐!?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「そ、そんな馬鹿なぁぁぁーーーっ！\u3000何故こうなるのじゃあぁぁぁーーーっ！？」"
translation = "「그, 그럴 수가아아아아――앗! 왜 이렇게 되는 것이냐아아아아――앗!?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「貴様を眷族にして、サチからロストアイテムを奪い取らせ、我の力を取り戻すという完璧な計画が……！」"
translation = "「네놈을 권속으로 삼아 사치에게서 로스트 아이템을 빼앗게 하고 나의 힘을 되찾는다는 완벽한 계획이……!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ふんふん、それでそれで？」"
translation = "「흥흥, 그래서 그래서?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「もちろん、力を取り戻した後は、サチに戦闘を挑み、眷族との共闘で理不尽な幸運を封殺、我の終末兵器としての本領を発揮し、ギャフンと……ってサチ、いつからそこに！？」"
translation = "「물론 힘을 되찾은 뒤에는 사치에게 싸움을 걸어 권속과의 협공으로 불합리한 행운을 봉쇄, 나의 종말병기로서의 본령을 발휘해 꼼짝 못 하게…… 사치, 언제부터 거기에 있었느냐!?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「拘束ーーーーーーっ！！！」"
translation = "「구속――――――!!!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ぎゃあああぁぁぁ～～～っ！！！\u3000鎖は止めるのじゃあああぁぁぁ～～～っ！！！」"
translation = "「기야아아아아아아~~~~앗!!! 사슬은 그만두는 것이니라아아아아아아~~~~앗!!!」"

[[dialogue]]
speaker = "unk"
original = "何もないところから突然、無数の鎖が！？"
translation = "아무것도 없는 곳에서 갑자기 무수한 사슬이!?"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「悪いことは禁止ですっ！」"
translation = "「나쁜 짓은 금지입니다!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「す、<ruby>簀巻<rt>すま</rt></ruby>きは嫌なのじゃ……」"
translation = "「서, <ruby>멍석말이<rt>스마키</rt></ruby>는 싫으니라……」"

[[dialogue]]
speaker = "unk"
original = "鎖で雁字搦めにされたプリムラを見て、サチに逆らえないのはこういうことかと納得する俺なのだった。"
translation = "사슬로 꽁꽁 묶인 프리뮬러를 보며, 사치에게 거역할 수 없다는 건 이런 거구나 하고 납득하는 나였다."

