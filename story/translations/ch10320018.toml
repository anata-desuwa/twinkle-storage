[[dialogue]]
speaker = "unk"
original = "いつしか、時間がある時は図書館に通うのが当たり前になっていた。"
translation = "어느샌가, 시간이 날 때면 도서관에 들르는 것이 당연해져 있었다."

[[dialogue]]
speaker = "unk"
original = "そしてウィステリアさんと恋仲になり、何度か肌を重ねるようになって……"
translation = "그리고 위스테리아 씨와 연인 사이가 되어, 몇 번이고 살을 섞게 되었고……"

[[dialogue]]
speaker = "ウィステリア"
original = "「あ──」"
translation = "「아──」"

[[dialogue]]
speaker = "unk"
original = "俺の顔を見つけて頬を染めるウィステリアさん。"
translation = "내 얼굴을 발견하고 뺨을 붉히는 위스테리아 씨."

[[dialogue]]
speaker = "unk"
original = "すると彼女の部屋で夜を共にした時のことが思い出されて、熱が蘇ってくる。"
translation = "그러자 그녀의 방에서 밤을 함께 보냈던 일이 떠올라, 열기가 되살아난다."

[[dialogue]]
speaker = "ウィステリア"
original = "「だ、ダメよ……こんなところで……」"
translation = "「아, 안 돼…… 이런 곳에서……」"

[[dialogue]]
speaker = "unk"
original = "そんな俺の様子を察したのか、少し震えた声で制する。"
translation = "그런 내 기색을 눈치챘는지, 조금 떨리는 목소리로 제지한다."

[[dialogue]]
speaker = "unk"
original = "けれどウィステリアさんの――いや、ウィステリアの表情はむしろ誘っているようで……"
translation = "하지만 위스테리아 씨의―― 아니, 위스테리아의 표정은 오히려 유혹하는 것처럼 보여서……"

[[dialogue]]
speaker = "ウィステリア"
original = "「ちょ、ちょっと待って、なんで近づいてくるの……？\u3000きゃっ！？」"
translation = "「저, 잠깐만, 왜 다가오는 거야……? 꺄악!?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ほ、ほんとにここでする気なの……？」"
translation = "「허, 정말로 여기서 할 생각이야……?」"

[[dialogue]]
speaker = "unk"
original = "ウィステリアを人のいないところまで連れてくると、服を強引に脱がせ、書架に手を突かせた。"
translation = "위스테리아를 사람이 없는 곳까지 데려와, 옷을 강제로 벗기고 서가에 손을 짚게 했다."

[[dialogue]]
speaker = "unk"
original = "足を大きく開かされて秘部も露わになり、あられもない姿に男の本能がそそられる。"
translation = "다리를 크게 벌리게 해 비부를 드러내니, 그 적나라한 모습에 남자의 본능이 자극된다."

[[dialogue]]
speaker = "ウィステリア"
original = "「若いから、その……たくさんしたいのはわかるけど、もし見つかったら……」"
translation = "「어리니까, 그…… 많이 하고 싶은 건 알겠지만, 만약 들키면……」"

[[dialogue]]
speaker = "unk"
original = "ウィステリアの言葉を遮るように、いきり立ったペニスを秘部に擦り付ける。"
translation = "위스테리아의 말을 가로막듯, 빳빳하게 선 페니스를 비부에 비벼댄다."

[[dialogue]]
speaker = "ウィステリア"
original = "「ひゃんっ！？」"
translation = "「히양!?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「あ……はんっ……ちがう、濡れてなんてないってば……ひゃっ……あっ、んっ……<emoji=heart04>」"
translation = "「아…… 하앙…… 아니야, 젖어 있지 않다니까…… 히얏…… 앗, 응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その言葉とは裏腹に、秘裂から蜜がにじみ、艶めかしい声がこぼれる。"
translation = "그 말과는 반대로, 질구에서 애액이 배어 나오고 요염한 신음이 흘러나온다."

[[dialogue]]
speaker = "ウィステリア"
original = "「ふぁ……はぁ……おち○ちん、熱くて、ビクビクしてる……はぁ……ぁん……やっ、おち○ちん擦っちゃダメぇ……<emoji=heart04>」"
translation = "「흐아…… 하아…… 자지, 뜨거워서, 움찔거리고 있어…… 하아…… 아앙…… 앗, 자지 비비지 마……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "哀願するように声を震わせるウィステリア。"
translation = "애원하듯 목소리를 떨며 말하는 위스테리아."

[[dialogue]]
speaker = "unk"
original = "けれど蜜はさらに量を増し、ペニスが擦れる度にお尻をびくびくと跳ねさせる。"
translation = "하지만 애액은 더욱 양이 늘어나고, 페니스가 비벼질 때마다 엉덩이를 움찔거리며 튕긴다."

[[dialogue]]
speaker = "ウィステリア"
original = "「はぁ、ぁん……ダメだって言ってるのに……んんっ……やぁっ、ほんとにダメぇっ……<emoji=heart04>」"
translation = "「하아, 아앙…… 안 된다고 말했잖아…… 응응…… 싫어, 정말 안 돼……<emoji=heart04>」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ふ……はぁ、あっ……んんっ──<emoji=heart04>\u3000クリトリス、当たって……んっ──あ──ひぁああっ<emoji=heart04>」"
translation = "「흐…… 하아, 앗…… 응응──<emoji=heart04> 클리토리스, 닿아서…… 응── 아── 히아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "さらに切なくなる声を聞きながら、後ろから手を伸ばして乳房を鷲掴みにした。"
translation = "더욱 애처로운 신음을 들으며, 뒤에서 손을 뻗어 유방을 움켜쥐었다."

[[dialogue]]
speaker = "ウィステリア"
original = "「んん～～っ！？\u3000んぁ、はぁん……おっぱいぐにぐにされてる……あ……ふ、んん……<emoji=heart04>」"
translation = "「응응~~!? 으앙, 하앙…… 젖가슴 주물러지고 있어…… 아…… 흐, 응응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "いつも扇情的に男を誘う大きな胸は、下から持ち上げると確かな重みがある。"
translation = "언제나 선정적으로 남자를 유혹하는 커다란 가슴은, 아래에서 받쳐 들면 묵직한 무게감이 느껴진다."

[[dialogue]]
speaker = "unk"
original = "乱暴に力を込めた指が乳房に沈みこみ、どこまでも柔らかい手触りに夢中になっていた。"
translation = "거칠게 힘을 준 손가락이 유방 속으로 파고들고, 끝없이 부드러운 감촉에 정신이 팔려 있었다."

[[dialogue]]
speaker = "ウィステリア"
original = "「そんなにおっぱい触っちゃ……ひゃんっ<emoji=heart04>\u3000あっ……はぁ、はぁ……揉みすぎだってばぁ……は──んんっ<emoji=heart04>」"
translation = "「그렇게 젖가슴 만지면…… 히양<emoji=heart04> 앗…… 하아, 하아…… 너무 주무르지 마…… 하──응응……<emoji=heart04>」"

[[dialogue]]
speaker = "ウィステリア"
original = "「はぁっ、あんっ……乳首も――ふあぁっ<emoji=heart04>\u3000先っぽくりくりされて……ふ、はぁ……やっ、摘んじゃ……ん～～っ<emoji=heart04>」"
translation = "「하앗, 아앙…… 유두도―― 흐아앗<emoji=heart04> 끝부분 굴려져서…… 흐, 하아…… 싫어, 꼬집으면…… 응~~……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "乳首を責められ、艶めかしい声とともに身をよじるウィステリア。"
translation = "유두를 괴롭힘당하며, 요염한 신음과 함께 몸을 비트는 위스테리아."

[[dialogue]]
speaker = "unk"
original = "十分に濡れてきたことを確認すると、ペニスの先端を秘裂に突き付け、ゆっくりと進ませていく。"
translation = "충분히 젖어든 것을 확인하고, 페니스의 끝을 질구에 대고 천천히 밀어 넣기 시작한다."

[[dialogue]]
speaker = "ウィステリア"
original = "「待って！\u3000ダメ、ダメ……ほんとにダメだから……おち○ちん入れちゃダメぇっ……<emoji=heart04>」"
translation = "「기다려! 안 돼, 안 돼…… 정말 안 된다니까…… 자지 넣으면 안 돼……<emoji=heart04>」"

[[dialogue]]
speaker = "ウィステリア"
original = "「んん～～～～～～～っ<emoji=heart04><emoji=heart04>\u3000んはぁっ、はっ……はぁ……おち○ちん入ってきてぇっ……<emoji=heart04>」"
translation = "「응응~~~~~~~~~<emoji=heart04><emoji=heart04> 응하앗, 핫…… 하아…… 자지 들어와……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "亀頭が膣口を広げて侵入すると、膣壁全体が歓喜するようにぶるぶると震えた。"
translation = "귀두가 질구를 넓히며 침입하자, 질벽 전체가 환희에 찬 듯 부르르 떨렸다."

[[dialogue]]
speaker = "ウィステリア"
original = "「ふやぁ、はぁ、あぁんっ……<emoji=heart04>\u3000おち○ちん出たり、入ったりして……はぁは、ん……ウソ……ほんとに図書館でセックスしてる……<emoji=heart04>」"
translation = "「흐야아, 하아, 아앙……<emoji=heart04> 자지가, 나왔다, 들어갔다 해서…… 하아하, 응…… 거짓말…… 정말로 도서관에서 섹스하고 있어……<emoji=heart04>」"

[[dialogue]]
speaker = "ウィステリア"
original = "「んくっ、んん……やだ、おち○ちん、おっきい……はあぁ……私の中で、動いて……あっ、ん……んぅ～っ<emoji=heart04>」"
translation = "「응긋, 응응…… 싫어, 자지, 커…… 하아…… 내 안에서, 움직여서…… 앗, 응…… 응우~……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺が腰を使うのに合わせて大きな胸が揺れる。"
translation = "내가 허리를 움직이는 것에 맞춰 커다란 가슴이 흔들린다."

[[dialogue]]
speaker = "unk"
original = "声を抑えようとはしているものの、漏れ出る嬌声は完全に止められずにいた。"
translation = "신음을 참으려 하고는 있지만, 새어 나오는 교성은 완전히 멈추지 못하고 있었다."

[[dialogue]]
speaker = "ウィステリア"
original = "「はぁ、ぁん……こんなの、ダメなのにぃ……んん、はぁ……ふぁ……あ、あぁっ……<emoji=heart04>」"
translation = "「하아, 아앙…… 이런 건, 안 되는데…… 응응, 하아…… 흐아…… 아, 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「でもグチュグチュ音がして、すごく濡れてますよ」"
translation = "「하지만 질척질척 소리가 나고, 엄청 젖어 있어요.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ちがうっ……これは生理現象で……ん、はぁ……気持ち良くなんか──んん～～～っ<emoji=heart04>」"
translation = "「아니야…… 이건 생리 현상이라서…… 응, 하아…… 기분 좋을 리가── 응응~~……<emoji=heart04>」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ひぁっ……あっ……あんっ<emoji=heart04>\u3000何度もダメって、言ってるのに――ひあぁっ<emoji=heart04>\u3000んぁっ、はぁ……あ、あんっ……<emoji=heart04>」"
translation = "「히앗…… 앗…… 아앙<emoji=heart04> 몇 번이나 안 된다고, 말했는데―― 히아앗<emoji=heart04> 응앗, 하아…… 아, 아앙……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "否定の言葉をかき消すように、ウィステリアの口から艶っぽい声がこぼれる。"
translation = "부정하는 말을 지우듯, 위스테리아의 입에서 요염한 신음이 흘러나온다."

[[dialogue]]
speaker = "unk"
original = "最大まで怒張したペニスが中を押し広げながら膣内を擦り、膣も応えるようにきゅうきゅうと収縮を繰り返す。"
translation = "최대까지 발기한 페니스가 안을 밀어 넓히며 질 내부를 비비고, 질도 응하듯 꽉꽉 수축을 반복한다."

[[dialogue]]
speaker = "ウィステリア"
original = "「私は、そんなつもりじゃ……ふあぁ、はぁ……あっ、あんっ<emoji=heart04>\u3000あ、あ……そんな、たくさん突かないでぇっ<emoji=heart04>」"
translation = "「나는, 그런 의도가…… 흐아아, 하아…… 앗, 아앙<emoji=heart04> 아, 아…… 그렇게, 많이 찌르지 마……<emoji=heart04>」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ふぁ、あっ――んぅ～～っ<emoji=heart04>\u3000ひぁっ、あ、あん……しかもこんな体勢で……あっ、んん……やめ、て……あっ、あっ、あんっ──ひあぁっ<emoji=heart04>」"
translation = "「흐아, 앗―― 응우~~……<emoji=heart04> 히앗, 아, 아앙…… 게다가 이런 자세로…… 앗, 응응…… 그만, 둬…… 앗, 앗, 아앙── 히아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "場所だけでなく、お尻を突き出す体位のせいか、声や表情に羞恥と屈辱がにじむ。"
translation = "장소뿐만 아니라, 엉덩이를 치켜든 체위 때문인지, 신음과 표정에 수치와 굴욕이 배어 나온다."

[[dialogue]]
speaker = "unk"
original = "そんな彼女を強引に犯すことにこの上ない征服感を覚えた。"
translation = "그런 그녀를 강제로 범하는 것에 더할 나위 없는 정복감을 느꼈다."

[[dialogue]]
speaker = "ウィステリア"
original = "「やぁんっ、おち○ちん動かさないで……ふぁっ、はっ、はぁっ……<emoji=heart04>\u3000\u3000こんなところでエッチしてるの見つかったら、恥ずかしくて死んじゃうっ……<emoji=heart04>」"
translation = "「야앙, 자지 움직이지 마…… 흐앗, 핫, 하앗……<emoji=heart04> 이런 곳에서 야한 짓 하는 거 들키면, 부끄러워서 죽어버릴 거야……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「感じてるとこ見られるの、恥ずかしいですからね」"
translation = "「느끼는 모습 들키는 거, 부끄러우니까요.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ちが……感じてるわけ、ないからっ……ふっ、ん……はぁ……図書館でエッチして、気持ち良くなるわけないでしょっ」"
translation = "「아니…… 느끼는 거, 아니니까…… 흣, 응…… 하아…… 도서관에서 야한 짓 해서, 기분 좋아질 리 없잖아.」"

[[dialogue]]
speaker = "unk"
original = "快楽を認めたがらないウィステリアを問い詰めるように、弱いところにペニスを強く押し付けてやる。"
translation = "쾌락을 인정하려 하지 않는 위스테리아를 추궁하듯, 약한 곳에 페니스를 강하게 밀어붙여 준다."

[[dialogue]]
speaker = "ウィステリア"
original = "「ひやぁ～っ<emoji=heart04>\u3000やぁっ、それダメっ<emoji=heart04>\u3000そこぐりぐりするの、反則っ……ふっ、んんっ……んーーっ<emoji=heart04>」"
translation = "「히야~~……<emoji=heart04> 싫어, 그거 안 돼……<emoji=heart04> 거기 굴리는 거, 반칙…… 흣, 응응…… 응~~……<emoji=heart04>」"

[[dialogue]]
speaker = "ウィステリア"
original = "「はぁはっ、あんっ……ダメダメ……ほんとにダメぇっ……<emoji=heart04>\u3000はぁ、はっ……はんっ……おま○こ、イッちゃ――」"
translation = "「하아핫, 아앙…… 안 돼 안 돼…… 정말 안 돼……<emoji=heart04> 하아, 핫…… 하앙…… 보지, 가버려――」"

[[dialogue]]
speaker = "モネ"
original = "「ウィステリアさーん？」"
translation = "「위스테리아 씨?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「！？」"
translation = "「!?」"

[[dialogue]]
speaker = "モネ"
original = "「あれ？\u3000この辺で作業してるって聞いたはずなんですが……」"
translation = "「어라? 이 근처에서 작업하고 있다고 들었는데……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ふぅ、ふぅ……紙屋敷さんが行くまで動いちゃダメよ……絶対動かないでね……」"
translation = "「후우, 후우…… 카미야시키 씨가 갈 때까지 움직이면 안 돼…… 절대 움직이지 마……」"

[[dialogue]]
speaker = "unk"
original = "息を殺して様子を窺うウィステリア。"
translation = "숨을 죽이고 상황을 살피는 위스테리아."

[[dialogue]]
speaker = "unk"
original = "けれど俺は無防備な胸を揉みしだく。"
translation = "하지만 나는 무방비한 가슴을 주무른다."

[[dialogue]]
speaker = "ウィステリア"
original = "「んん～～～っ！？」"
translation = "「응응~~!?」"

[[dialogue]]
speaker = "モネ"
original = "「ん？\u3000今ウィステリアさんの声がしたような……」"
translation = "「응? 방금 위스테리아 씨 목소리가 들린 것 같은데……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ふっ……ふっ……くっ、んん……な、何するのよ……見つかっちゃうでしょ……んっ、はぁ……<emoji=heart04>」"
translation = "「흣…… 흣…… 큿, 응응…… 무, 무슨 짓이야…… 들키잖아…… 응, 하아……<emoji=heart04>」"

[[dialogue]]
speaker = "ウィステリア"
original = "「んふっ……ふっ……んっ……<emoji=heart04>\u3000だから、おっぱいぐにぐにしないでってば……ん……はぁ、あっ……ダメ、見られちゃうぅ……<emoji=heart04>」"
translation = "「응흣…… 흣…… 응……<emoji=heart04> 그러니까, 젖가슴 주무르지 말라니까…… 응…… 하아, 앗…… 안 돼, 들켜버려……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "抗議を無視して、味わわせるようにペニスをゆっくりと動かす。"
translation = "항의를 무시하고, 맛보게 하듯 페니스를 천천히 움직인다."

[[dialogue]]
speaker = "ウィステリア"
original = "「ふっ――んん～～っ<emoji=heart04>\u3000ふっ……んっ……ん……んぅ……<emoji=heart04>\u3000はぁ……ふっ……ふっ、んっ、んん～～っ……<emoji=heart04>」"
translation = "「흣―― 응응~~……<emoji=heart04> 흣…… 응…… 응…… 응우……<emoji=heart04> 하아…… 흣…… 흣, 응, 응응~~……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "粘膜とペニスを摩擦させ、ゾクゾクと快感が走り抜ける。"
translation = "점막과 페니스를 마찰시키자, 짜릿하게 쾌감이 달려 나간다."

[[dialogue]]
speaker = "unk"
original = "奥まで突き入れると、ペニス全体が弾力のある肉壁に包まれて心地いい。"
translation = "안쪽까지 찔러 넣으면, 페니스 전체가 탄력 있는 육벽에 감싸여 기분이 좋다."

[[dialogue]]
speaker = "ウィステリア"
original = "「んっ、ふっ……んっくぅ……はぁ……んんっ……<emoji=heart04>\u3000はあぁ……おち○ちん、動かさないで……ぁっ、はぁん<emoji=heart04>」"
translation = "「응, 흣…… 응쿠…… 하아…… 응응……<emoji=heart04> 하아아…… 자지, 움직이지 마…… 앗, 하앙<emoji=heart04>」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ダメ、止まってぇ……ふっ……んんっ……図書館でこんなことしてるのバレたら、あの子に殺されるからぁ……」"
translation = "「안 돼, 멈춰…… 흣…… 응응…… 도서관에서 이런 짓 하는 거 들키면, 그 아이한테 죽으니까……」"

[[dialogue]]
speaker = "unk"
original = "そう言いつつも膣内は嬉しそうに震えっぱなしで、たっぷりの蜜で濡れた粘膜がペニスに絡みついてくる。"
translation = "그렇게 말하면서도 질내는 기쁜 듯 떨림이 멈추지 않았고, 듬뿍 젖은 점막이 페니스를 휘감아 온다."

[[dialogue]]
speaker = "モネ"
original = "「やっぱりウィステリアさんの声が聞こえる気が……ウィステリアさーん？」"
translation = "「역시 위스테리아 씨 목소리가 들리는 것 같은…… 위스테리아 씨?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「おち○ちん、ダメ……ふーっ、ふーっ……んん～～っ<emoji=heart04>\u3000感じたく、ないのに、なんで……はぁ、はぁ……んっ、ふ～っ……<emoji=heart04>」"
translation = "「자지, 안 돼…… 후우, 후우…… 응응~~……<emoji=heart04> 느끼고, 싶지 않은데, 왜…… 하아, 하아…… 응, 후우……<emoji=heart04>」"

[[dialogue]]
speaker = "ウィステリア"
original = "「おま○こおかしくなっちゃう……んふっ……ん……<emoji=heart04>\u3000んんっ、来ないでぇ……ふっ……はぁ……は……はぁん……<emoji=heart04>」"
translation = "「보지 이상해질 것 같아…… 응흣…… 응……<emoji=heart04> 응응앗, 오지 마…… 흣…… 하아…… 하…… 하앙……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "こうして息を殺していると、不思議と感覚が鋭くなっている気がして、ペニスを通じてウィステリアの中をより強く感じる。"
translation = "이렇게 숨을 죽이고 있으니, 신기하게도 감각이 예민해진 것 같아 페니스를 통해 위스테리아의 안을 더욱 강하게 느낀다."

[[dialogue]]
speaker = "unk"
original = "溢れんばかりの熱い愛液に、粘膜の柔らかさ、肉ひだの並びまではっきりと感じ取れた。"
translation = "넘쳐흐를 듯한 뜨거운 애액에, 점막의 부드러움, 육주름의 배열까지 확실히 느껴졌다."

[[dialogue]]
speaker = "ウィステリア"
original = "「んっく、んぅ……はあぁ……ふっ……ふぅっ<emoji=heart04>\u3000ダメ、ダメっ、おま○こイッちゃ……はぁっ……ふっ……ふ、んっ……ふっ――」"
translation = "「응긋, 응우…… 하아아…… 흣…… 후우……<emoji=heart04> 안 돼, 안 돼, 보지 가버리면…… 하앗…… 흣…… 흐, 응…… 흣――」"

[[dialogue]]
speaker = "モネ"
original = "「ウィステリアさーん？」"
translation = "「위스테리아 씨?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「んん～～～～～っ<emoji=heart04>」"
translation = "「응응~~~~~~~~~<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「……いないみたいですね。他のところを探しましょうか」"
translation = "「……없는 모양이네요. 다른 곳을 찾아볼까요.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「はぁはぁ……やっと行ってくれた……あっ、はっ……あぁん<emoji=heart04>」"
translation = "「하아하아…… 겨우 가줬다…… 앗, 하…… 아앙<emoji=heart04>」"

[[dialogue]]
speaker = "ウィステリア"
original = "「見つかったらいけないのに、イッちゃって、変になりそうだったんだから……バカ……<emoji=heart04>」"
translation = "「들키면 안 되는데, 가버려서, 이상해질 뻔했잖아…… 바보……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "お姉さんなのにちょっと恨みがましく言うのがかわいらしい。"
translation = "연상이면서도 조금 원망 섞인 말투로 말하는 것이 사랑스럽다."

[[dialogue]]
speaker = "unk"
original = "だが──"
translation = "하지만――"

[[dialogue]]
speaker = "ウィステリア"
original = "「ちょっと、何見てるのよっ」"
translation = "「잠깐, 뭘 보고 있는 거야.」"

[[dialogue]]
speaker = "unk"
original = "ウィステリアの焦った声で驚いたが、周囲を見回しても誰もいない。"
translation = "위스테리아의 다급한 목소리에 놀랐지만, 주위를 둘러봐도 아무도 없다."

[[dialogue]]
speaker = "unk"
original = "──いや、ウィステリアの手枷と繋がった魔導書……その中央の赤い瞳のようなものが確かに俺たちを捉えていた。"
translation = "──아니, 위스테리아의 수갑과 연결된 마도서…… 그 중앙의 붉은 눈 같은 것이 확실히 우리를 포착하고 있었다."

[[dialogue]]
speaker = "ウィステリア"
original = "「相変わらずっ……悪趣味な本ね。はぁはぁ……そんなに私が嫌がる顔が見たいの？」"
translation = "「여전하네…… 악취미인 책이라니까. 하아하아…… 그렇게나 내가 싫어하는 얼굴이 보고 싶은 거야?」"

[[dialogue]]
speaker = "unk"
original = "ウィステリアが魔導書を睨むが、膣壁はひくひくと震えている。"
translation = "위스테리아가 마도서를 노려보지만, 질벽은 움찔움찔 떨리고 있다."

[[dialogue]]
speaker = "unk"
original = "それなら──"
translation = "그렇다면――"

[[dialogue]]
speaker = "ウィステリア"
original = "「んん～～～～～っ！？」"
translation = "「응응~~~~~~~~~!?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ふぁっ、はっ、あっ、あんっ<emoji=heart04>\u3000何するの、やめなさ──んんっ<emoji=heart04>\u3000あっ、はぁ、はぁ……ん──ひぁああっ<emoji=heart04>」"
translation = "「흣, 핫, 앗, 아앙<emoji=heart04> 무슨 짓이야, 그만둬―― 응응……<emoji=heart04> 앗, 하아, 하아…… 응── 히아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「見られて感じてるんじゃないですか？」"
translation = "「들키면서 느끼는 거 아니에요?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「そんなはず、ないから……はっ、あっ……あ──んん～～っ<emoji=heart04>\u3000\u3000激し、いっ……ふあぁっ、あ、あ、あっ――ひぁああ～っ<emoji=heart04>」"
translation = "「그럴 리가, 없으니까…… 핫, 앗…… 아── 응응~~……<emoji=heart04> 격렬, 해…… 흐아앗, 아, 아, 앗―― 히아아아~~……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「図書館で喘ぐなんて悪い司書ですね」"
translation = "「도서관에서 신음하다니 나쁜 사서네요.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「それは、君がおち○ちん入れてくるからぁっ……ふぁ、ああぁっ<emoji=heart04>\u3000\u3000んん、ふっ……あっ、あっ……ひぁああ～～っ<emoji=heart04>」"
translation = "「그건, 네가 자지 넣어오니까…… 흐아, 아아앗……<emoji=heart04> 응응, 흣…… 앗, 앗…… 히아아아~~……<emoji=heart04>」"

[[dialogue]]
speaker = "ウィステリア"
original = "「太くて硬いおち○ちん、叩きつけられてっ……はぁっ……おま○こ壊れちゃうぅっ<emoji=heart04>\u3000んっ、はぁ……あっ、はっ、はっ、あぁんっ<emoji=heart04>」"
translation = "「굵고 딱딱한 자지, 들이박혀서…… 하앗…… 보지 망가져버려……<emoji=heart04> 응, 하아…… 앗, 핫, 핫, 아앙……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "豊満なおっぱいが激しく暴れて男の本能を刺激する。"
translation = "풍만한 젖가슴이 격렬하게 흔들리며 남자의 본능을 자극한다."

[[dialogue]]
speaker = "unk"
original = "まるでウィステリアを道具として使うように、荒々しくペニスで突き上げる。"
translation = "마치 위스테리아를 도구처럼 사용하듯, 거칠게 페니스로 들이받는다."

[[dialogue]]
speaker = "ウィステリア"
original = "「あっ、ふっ、んっ<emoji=heart04>\u3000んんっ、深いぃっ……おち○ちん、奥まで届いて……ふぁっ、はぁんっ<emoji=heart04>\u3000あっ、あっ、あっ……あんっ<emoji=heart04>」"
translation = "「앗, 흣, 응……<emoji=heart04> 응응, 깊어…… 자지, 안쪽까지 닿아서…… 흐앗, 하앙……<emoji=heart04> 앗, 앗, 앗…… 아앙……<emoji=heart04>」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ふあぁ――んん～～～っ<emoji=heart04>\u3000君のおち○ちん、奥に当たってるっ……<emoji=heart04>\u3000こつこつって、子宮にぶつかってっ……はぁあっ……あっ、あぁ～っ<emoji=heart04>」"
translation = "「흐아―― 응응~~……<emoji=heart04> 네 자지, 안쪽에 닿고 있어……<emoji=heart04> 콕콕, 자궁에 부딪혀서…… 하아앗…… 앗, 아아~~……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "だがウィステリアも甲高い声を上げて、子宮を責められる快楽に打ち震えていた。"
translation = "하지만 위스테리아도 높은 신음을 내지르며, 자궁을 괴롭힘당하는 쾌락에 몸을 떨고 있었다."

[[dialogue]]
speaker = "ウィステリア"
original = "「ふっ……んんっ、んぅ～っ……<emoji=heart04>\u3000あなたは、いつまで……見てるのよっ……はっ、はぁ、はぁ……んっ、ふぅっ……<emoji=heart04>」"
translation = "「흣…… 응응, 응우~~……<emoji=heart04> 당신은, 언제까지…… 보고 있는 거야…… 핫, 하아, 하아…… 응, 후우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "いやらしく喘ぎながらも、反抗的な目で魔導書を睨み返すウィステリア。"
translation = "요염하게 신음하면서도, 반항적인 눈으로 마도서를 노려보는 위스테리아."

[[dialogue]]
speaker = "unk"
original = "だがそれが気に障ったのか、魔導書の赤い目が妖しく輝いて──"
translation = "하지만 그것이 거슬렸는지, 마도서의 붉은 눈이 요사스럽게 빛나며――"

[[dialogue]]
speaker = "ウィステリア"
original = "「ひぃんっ！？」"
translation = "「히잉!?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「あ──あ──ダメ──子宮、疼く……んんっ<emoji=heart04>\u3000ダメダメダメっ、これダメっ……<emoji=heart04>\u3000ほんとにおかしくなるぅっ<emoji=heart04>」"
translation = "「아── 아── 안 돼── 자궁, 쑤셔…… 응응……<emoji=heart04> 안 돼 안 돼 안 돼, 이거 안 돼……<emoji=heart04> 정말로 이상해질 것 같아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "膣内が尋常でない震え方をして、ウィステリアが歯をガチガチと鳴らすほど痙攣する。"
translation = "질내가 평소와 다르게 떨리고, 위스테리아가 이를 딱딱 부딪힐 정도로 경련한다."

[[dialogue]]
speaker = "ウィステリア"
original = "「こんな時に、呪いなんて……ふ──ん──んんっ<emoji=heart04>\u3000ダメっ、お腹の奥、熱くてっ……んんっ……はっ、あぁんっ<emoji=heart04>」"
translation = "「이런 때에, 저주라니…… 흐── 응── 응응……<emoji=heart04> 안 돼, 뱃속 안쪽, 뜨거워서…… 응응…… 핫, 아앙……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ウィステリアにかけられたのは、いうなれば快楽を増幅する呪い。"
translation = "위스테리아에게 걸린 것은, 말하자면 쾌락을 증폭시키는 저주."

[[dialogue]]
speaker = "unk"
original = "雄を求めて膣がぎゅっと収縮し、押し潰すようにペニスを締め付ける。"
translation = "수컷을 원하며 질이 꽉 수축하고, 짓누르듯 페니스를 조여온다."

[[dialogue]]
speaker = "ウィステリア"
original = "「らめっ、らめらめぇっ……犯されて、感じてるっ<emoji=heart04>\u3000頭痺れてっ……ふぁっ、あっ、あっ……おち○ちん気持ちいいっ<emoji=heart04>\u3000おま○こ溶けちゃうっ<emoji=heart04>」"
translation = "「안 돼, 안 돼 안 돼…… 범해지면서 느끼고 있어…… 머리가 멍해져…… 흣, 앗, 앗…… 자지 기분 좋아…… 보지가 녹아버려……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「奥ばっかりダメ……あっ──あ、あ──ひぁああ～～っ<emoji=heart04>\u3000おち○ちんズンズン来て……ダメっ、イクっ<emoji=heart04>\u3000またイッちゃうっ<emoji=heart04>」"
translation = "「안쪽만은 안 돼…… 앗── 아, 아── 히아아아～～…… 자지가 쿵쿵 들어와서…… 안 돼, 가버려…… 또 가버릴 것 같아……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ひっ──あ──は──んん～～～～っ<emoji=heart04>\u3000おま○こ、イッて……はっ、あっ──んああぁっ<emoji=heart04>」"
translation = "「히── 아── 하── 응응～～～～…… 보지, 가버려…… 핫, 앗── 응아아앗……」"

[[dialogue]]
speaker = "unk"
original = "呪いが思考を溶かし、快楽だけを欲する雌に堕ちていく。"
translation = "저주가 사고를 녹이고, 쾌락만을 원하는 암컷으로 타락해 간다."

[[dialogue]]
speaker = "unk"
original = "ウィステリアの膣は男を悦ばせるための肉壺と化して、俺にも極上の快楽をもたらしていた。"
translation = "위스테리아의 질은 남자를 기쁘게 하기 위한 육변기가 되어, 나에게도 극상의 쾌락을 가져다주고 있었다."

[[dialogue]]
speaker = "ウィステリア"
original = "「んああっ……はっ、はっ、はっ──あぁんっ<emoji=heart04>\u3000すごいっ、おち○ちんビクビクしてるっ<emoji=heart04>\u3000せーし、出すのっ？\u3000出しちゃうの<emoji=heart04>」"
translation = "「응아앗…… 핫, 핫, 핫── 아앙…… 굉장해, 자지가 꿈틀거리고 있어…… 정액, 쌀 거야? 쌀 거야?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「出されたらっ、また、イッちゃ――ああぁんっ<emoji=heart04>\u3000おま○こに出されたら、イッちゃうぅっ<emoji=heart04>」"
translation = "「싸면…… 또, 가버려── 아아앙…… 보지에 싸면, 가버려어어……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「おち○ちんで、子宮突かれてっ……あ、あ、あ、あんっ<emoji=heart04>\u3000お腹の奥、キュンキュンするっ<emoji=heart04>\u3000すごいのきちゃうっ、くる、くるぅっ<emoji=heart04>」"
translation = "「자지로, 자궁 찔려서…… 아, 아, 아, 앙…… 뱃속 안쪽, 큥큥거려…… 굉장한 게 와, 와, 와아……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ひああっ、はっ、ああっ、はんっ<emoji=heart04>\u3000おま○こイクっ<emoji=heart04>\u3000イクイクイク、イッちゃうぅ～っ<emoji=heart04>」"
translation = "「히아앗, 핫, 아앗, 한…… 보지 가버려…… 가 가 가, 가버려어어～……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「っ──んんん～～～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「읏── 응응～～～～～～～～～～～……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「熱いの出てるっ……<emoji=heart04>\u3000私の、奥に……子宮にびゅーって……出てるぅっ<emoji=heart04>」"
translation = "「뜨거운 게 나오고 있어…… 내, 안쪽에…… 자궁에 뷰릇하고…… 나오고 있어……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「あ、あ、あ……っ<emoji=heart04>\u3000ここ図書館なのに、せーえき、たくさん……あっあっ……んん～～～っ<emoji=heart04>」"
translation = "「아, 아, 아…… 여기 도서관인데, 정액, 잔뜩…… 앗 앗…… 응응～～～……」"

[[dialogue]]
speaker = "unk"
original = "ウィステリアも射精と同時に絶頂し、柔らかな肉壁がぎゅっとペニスを締め付けてくる。"
translation = "위스테리아도 사정과 동시에 절정하고, 부드러운 육벽이 꽉 페니스를 조여온다."

[[dialogue]]
speaker = "unk"
original = "奥歯を噛み、子宮口に亀頭を押し付けながら最後の一滴まで注ぐ。"
translation = "어금니를 깨물고, 자궁구에 귀두를 밀어붙이며 마지막 한 방울까지 쏟아붓는다."

[[dialogue]]
speaker = "ウィステリア"
original = "「んっ、んんっ……見られながら、イッてるぅ……<emoji=heart04>\u3000はぁはぁ……あっ、んっ、んんぅ～～っ<emoji=heart04>」"
translation = "「응, 응응…… 보면서, 가고 있어…… 하아 하아…… 앗, 응, 응응～～～……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「はっ、あっ、あんっ……<emoji=heart04>\u3000おち○ちん、ドクドク震えて、まだ出てるぅっ……<emoji=heart04>\u3000あっ、あっ……はあぁ<emoji=heart04>」"
translation = "「핫, 앗, 앙…… 자지, 두근두근 떨려서, 아직 나오고 있어…… 앗, 앗…… 하아……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「はーっ……はーっ……ほんとに図書館でセックスしちゃった……<emoji=heart04>」"
translation = "「하아…… 하아…… 진짜로 도서관에서 섹스해버렸어……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「呪いもやっと収まったわ……。まったく……変な呪いまでかけてきて、こんなことで主導権を握れると思ったら大間違いよ」"
translation = "「저주도 겨우 진정됐네……. 정말이지…… 이상한 저주까지 걸어와서, 이런 걸로 주도권을 잡을 수 있다고 생각했다면 큰 오산이야.」"

[[dialogue]]
speaker = "unk"
original = "さっきまで魔導書から放たれていた妖しい気配はもう消えていた。"
translation = "조금 전까지 마도서에서 뿜어져 나오던 요사스러운 기운은 이미 사라져 있었다."

[[dialogue]]
speaker = "unk"
original = "常に魂を狙われていると思うと恐ろしいが、ウィステリアにとっては日常茶飯事のようだった。"
translation = "항상 영혼을 노리고 있다고 생각하면 무섭지만, 위스테리아에게는 일상다반사인 듯했다."

[[dialogue]]
speaker = "ウィステリア"
original = "「お腹の奥、熱い……もう、こんなにたくさん中に出すなんて……んっ……君の精液が溢れてきちゃってるじゃない」"
translation = "「뱃속 안쪽, 뜨거워…… 정말, 이렇게 잔뜩 안에 싸다니…… 응…… 네 정액이 흘러넘치고 있잖아.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「何回ダメって言わせるの？\u3000お姉さんを手籠めにするなんて悪い星徒会長ね」"
translation = "「몇 번이나 안 된다고 말하게 할 거야? 연상인 사람을 덮치다니 나쁜 성도회장이네.」"

[[dialogue]]
speaker = "unk"
original = "イタズラした弟を咎めるように口を尖らせるウィステリア。"
translation = "장난친 남동생을 나무라듯 입술을 삐죽이는 위스테리아."

[[dialogue]]
speaker = "unk"
original = "その口調は本気の怒りではなくて、むしろ心地よいくらいだ。"
translation = "그 말투는 진심 어린 분노가 아니라, 오히려 기분 좋을 정도다."

[[dialogue]]
speaker = "ウィステリア"
original = "「んんっ……<emoji=heart04>\u3000またおっぱい触ってる……ほんとに反省してないんだから。私は君の性処理道具じゃないのよ？」"
translation = "「응응…… 또 가슴 만지고 있어…… 정말 반성 안 한다니까. 나는 네 성처리 도구가 아니라고?」"

[[dialogue]]
speaker = "クロト"
original = "「だって、好きな人にあんなエッチな顔されたら我慢できないじゃないですか」"
translation = "「그야, 좋아하는 사람이 그런 야한 얼굴을 하고 있으면 참을 수가 없잖아요.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「なっ──し、失礼ね、そんな顔してないわよ」"
translation = "「낫── 실, 실례네, 그런 얼굴 안 했거든.」"

[[dialogue]]
speaker = "unk"
original = "拗ねたようなウィステリアがかわいくて、衝動的に唇を奪う。"
translation = "토라진 듯한 위스테리아가 귀여워서, 충동적으로 입술을 빼앗는다."

[[dialogue]]
speaker = "ウィステリア"
original = "「んんっ……！\u3000ちゅっ、れろれろ、れる……<emoji=heart04>\u3000ふぅ……キスも強引なんだから……れる、れろっ、ちゅぱっ……じゅるるっ、んっちゅぅっ<emoji=heart04>」"
translation = "「응응……! 츄, 렐로렐로, 레루…… 후우…… 키스도 강제적이긴…… 레루, 레롯, 츄팟…… 쥬루루…… 응츄우……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ちゅっ、ちゅぱっ、れろ……くちゅ、ちゅるるるっ<emoji=heart04>\u3000ぷぁ…………もうっ、バカ<emoji=heart04>」"
translation = "「츄, 츄팟, 레로…… 쿠츄, 츄루루…… 푸아………… 정말, 바보.」"

[[dialogue]]
speaker = "unk"
original = "そして上も下も繋がったまま、しばらく抱きしめ合った。"
translation = "그리고 위아래가 연결된 채로, 한동안 서로를 껴안았다."

