[[dialogue]]
speaker = "unk"
original = "世界樹を通り、コラプサーたちは魔界に到着した。"
translation = "세계수를 지나 콜랩서들은 마계에 도착했다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「世界樹ってやつは本当に便利だな。密航なんざ面倒なことしなくてもいいし」"
translation = "「세계수라는 건 정말 편리하구먼. 밀항 같은 귀찮은 짓을 안 해도 되니」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「キレイな海ー！\u3000すごいすごーい！」"
translation = "「예쁜 바다다! 우와 대단해!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「景色はいいけどあっつーい！\u3000さっそく変身、水着フォーム！」"
translation = "「경치는 좋지만 너어무 더워! 당장 변신, 수영복 폼!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「じゃーん！\u3000胸がちょっときつい気がするけど、帰ったら調整してもらいます！」"
translation = "「짜잔! 가슴이 좀 끼는 느낌이지만, 돌아가면 조정해달라고 해야겠어!」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「見て見て、レイラお姉ちゃん！\u3000可愛い水着でしょ！」"
translation = "「봐봐, 레이라 언니! 귀여운 수영복이지!」"

[[dialogue]]
speaker = "unk"
original = "レイラの目の前で、リーナがくるっと回ってみせる。"
translation = "레이라 앞에서 리나가 한 바퀴 돌아 보였다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「うん、可愛いね。ナデナデしちゃいたいな」"
translation = "「응, 귀엽네. 쓰담쓰담 해주고 싶어」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「お兄ちゃん、褒めてくれるかな？\u3000……褒めてくれるよね？」"
translation = "「오빠가 칭찬해 줄까? ……칭찬해 주겠지?」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「う、うん……帰ったらお兄ちゃんと一緒にプール行こうね」"
translation = "「으, 응…… 돌아가면 오빠랑 같이 수영장 가자」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「それにしても、あっちーな」"
translation = "「그나저나 덥구먼」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「キサナの水着は……というか、キサナが水着を着ること自体が意外かも」"
translation = "「키사나의 수영복은…… 이라기보다, 키사나가 수영복을 입는 것 자체가 의외일지도」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ああ？\u3000アタシが水着を着ちゃ悪いかよ」"
translation = "「앙? 내가 수영복 좀 입으면 안 되냐」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「その凄み方やめてよ～。される度に寿命がちょっと縮みそう」"
translation = "「그렇게 윽박지르지 마~. 그럴 때마다 수명이 조금 줄어들 것 같아」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「オマエはアタシを怖がってんのかバカにしてんのかどっちなんだよ……それよりメシだメシ」"
translation = "「너는 나를 무서워하는 거냐 바보 취급하는 거냐 어느 쪽이냐고…… 그것보다 밥이다 밥」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「そうだった！\u3000今日は絶好のＢＢＱ日和！\u3000肉を焼かねば女がすたる！」"
translation = "「맞다! 오늘은 절호의 BBQ 날씨! 고기를 굽지 않으면 여자가 아니지!」"

[[dialogue]]
speaker = "unk"
original = "持参したクーラーボックスを、レイラがパンパン叩く。"
translation = "지참한 쿨러백을 레이라가 팡팡 두드린다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「いいから早く焼け」"
translation = "「됐으니까 빨리 구워」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「はいはい、キサナも手伝ってよね。イングリットも……」"
translation = "「네네, 키사나도 도와줘. 잉그리드도……」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「イングリット？」"
translation = "「잉그리드?」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「……戦いだ」"
translation = "「……싸움이다」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「新しい力を得たのなら、それを試したいと思うのが道理だろう。まずは貴様からだ、レイラ」"
translation = "「새로운 힘을 얻었다면 그것을 시험해 보고 싶어 하는 것이 도리겠지. 우선 너부터다, 레이라」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "（えぇ……どうしよう）"
translation = "（에에…… 어쩌지）"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "（適当に誤魔化せよ。それが<ruby>首領<rt>ボス</rt></ruby>の仕事だろ）"
translation = ""

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「イングリット。今日は任務で来ているの。あなたとは戦いません」"
translation = "「잉그리드. 오늘은 임무로 온 거야. 너와는 싸우지 않아」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「肉を焼くことが任務なのか？\u3000遊びに来たようにしか見えないが。なら私と戦ってもいいはずだ」"
translation = "「고기를 굽는 것이 임무인가? 놀러 온 것으로밖에 보이지 않는다만. 그렇다면 나와 싸워도 될 터다」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「ファッ！？\u3000イングリットがまさかの正論パンチ！？」"
translation = "「홧!? 잉그리드가 설마 하던 정론 펀치!?」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「はぁ……しゃあねえな。まずは仕事を片付けるぞ。それからアタシは肉を食う。テメエはレイラに遊んでもらえ。いいな？」"
translation = "「하아…… 어쩔 수 없구먼. 우선 일을 처리하자고. 그러고 나서 난 고기를 먹겠다. 네놈은 레이라랑 놀든가 해. 알겠냐?」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「ふん、いいだろう。レイラ、必ず私と戦ってもらうからな」"
translation = "「흥, 좋다. 레이라, 반드시 나와 싸워줘야겠다」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「え。私、戦うことになってる……？」"
translation = "「에. 나, 싸우는 걸로 되어있어……?」"

[[dialogue]]
speaker_original = "老人の魔族"
speaker_translation = "노인 마족"
original = "「お客人ですかな？」"
translation = "「손님들이신가?」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「うわ！\u3000……えっと、どちら様でしょうか？」"
translation = "「우와! ……저기, 누구신가요?」"

[[dialogue]]
speaker = "unk"
original = "振り返ると、そこには現地の住人らしき魔族の姿があった。"
translation = "뒤를 돌아보니 거기에는 현지 주민으로 보이는 마족의 모습이 있었다."

[[dialogue]]
speaker_original = "老人の魔族"
speaker_translation = "노인 마족"
original = "「わしは近くの村で村長をしとる者じゃ。魔族以外もおるようじゃが、こちらに来られるのは初めてかな？」"
translation = "「나는 근처 마을에서 이장을 맡고 있는 사람일세. 마족 이외의 분들도 있는 듯한데, 이쪽으로 오신 건 처음인가?」"

[[dialogue]]
speaker_original = "老人の魔族"
speaker_translation = "노인 마족"
original = "「悪いことは言わん。砂浜の奥に行ってはいかんよ」"
translation = "「나쁜 말은 하지 않겠네. 백사장 깊숙한 곳에는 가지 말게나」"

[[dialogue]]
speaker_original = "老人の魔族"
speaker_translation = "노인 마족"
original = "「凶悪な怪物を封印した祠があってな。それを壊すと封印が解けて、怪物が出てくると伝えられておるのじゃ」"
translation = "「흉악한 괴물을 봉인한 사당이 있어서 말이야. 그걸 부수면 봉인이 풀려 괴물이 나타난다고 전해지고 있다네」"

[[dialogue]]
speaker = "unk"
original = "それだけ言うと、老人は踵を返して帰っていった。"
translation = "그 말만 남기고 노인은 발길을 돌려 돌아갔다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「なんだったんだ、今のジジイは」"
translation = "「뭐였냐, 방금 그 영감탱이는」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「さぁ……でも、その祠が空間の歪みと関係あるのかも。探してみよう」"
translation = "「글쎄…… 하지만 그 사당이 공간 왜곡과 관계있을지도 몰라. 찾아보자」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「レイラお姉ちゃん、お地蔵さまみたいなの見つけたよ！」"
translation = "「레이라 언니, 지장보살 같은 거 찾았어!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「うん、ありがとう、リーナ」"
translation = "「응, 고마워, 리나」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「見た感じ、ただの小さな祠だけど、キサナはどう思う？」"
translation = "「보기에는 그냥 작은 사당인데, 키사나는 어떻게 생각해?」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「どうも何もねぇよ。ちゃっちゃと調査とやらを終わらせて、肉食おうぜ」"
translation = "「생각하고 자시고 할 게 어디 있어. 후딱 조사인지 뭔지 끝내고 고기나 먹자고」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「……イングリットは？」"
translation = "「……잉그리드는?」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「てい！」"
translation = "「테잇!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「あの祠を壊したんか……じゃなくて、なんで祠壊しちゃったのぉ！？」"
translation = "「저 사당을 부순 거냐…… 가 아니라, 왜 사당을 부수고 난리야아!?」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「知れたこと。凶悪な怪物が出るというなら、それと戦うのが戦士だろう。……さぁ、来い！」"
translation = "「뻔한 일. 흉악한 괴물이 나온다면 그것과 싸우는 것이 전사겠지. ……자, 와라!」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「キシャーーーーッ！！」"
translation = "「키샤아아아아!!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「本当にモンスター出たぁ～～～っ！！？」"
translation = "「진짜로 몬스터 나왔어어어어어!!?」"

