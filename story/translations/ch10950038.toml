[[dialogue]]
speaker = "unk"
original = "その日、俺はシズハと街へデートに出かけていた。"
translation = "그날 나는 시즈하와 마을로 데이트를 나갔다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「シズハ、暗くなってきちゃったし、今日はもうそろそろ帰ろうか」"
translation = "「시즈하, 어두워졌으니 오늘은 이제 슬슬 돌아갈까?」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「え？\u3000う、うん、そうだね……！」"
translation = "「에? 어, 응, 그렇네……!」"

[[dialogue]]
speaker = "unk"
original = "日が落ちて辺りが暗くなってきたところで俺が提案すると、シズハはどこか名残惜しそうな――けれど何か言いたげな表情を浮かべる。"
translation = "해가 지고 주위가 어두워졌을 때 내가 제안하자, 시즈하는 어딘가 아쉬운 듯한―― 하지만 뭔가 말하고 싶은 듯한 표정을 짓는다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「って、あれ？\u3000なんか体が光って……！？」"
translation = "「어, 어라? 왠지 몸이 빛나서……!?」"

[[dialogue]]
speaker = "unk"
original = "と、次の瞬間、彼女の身体が光に包まれる。"
translation = "그러자 다음 순간, 그녀의 신체가 빛에 휩싸인다."

[[dialogue]]
speaker_original = "シズハ（覚醒）"
speaker_translation = "시즈하(각성)"
original = "「勝手にヴィクトリアフォームに変身しちゃった……！？」"
translation = "「멋대로 빅토리아 폼으로 변신해 버렸어……!?」"

[[dialogue]]
speaker = "unk"
original = "それだけではない。周囲の空間がぐにゃりと歪み始め――"
translation = "그뿐만이 아니다. 주위 공간이 일그러지기 시작하더니――"

[[dialogue]]
speaker_original = "シズハ（覚醒）"
speaker_translation = "시즈하(각성)"
original = "「えっ！？\u3000こ、ここって――前に来たことある『ラブホテル』……！？」"
translation = "「엣!? 여, 여기는―― 전에 왔던 『러브호텔』……!?」"

[[dialogue]]
speaker = "unk"
original = "気づけば俺たちは、大きなベッドが置かれた室内にいた。確かに、記憶と同じ場所だ。"
translation = "정신을 차려보니 우리들은 커다란 침대가 놓인 실내에 있었다. 분명 기억 속의 그 장소다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いや、出入り口の上のところに、なんか変なモニターが付いてるぞ……？」"
translation = "「아니, 출입구 위쪽에 웬 이상한 모니터가 달려 있어……?」"

[[dialogue]]
speaker = "unk"
original = "視線を向けると、モニターには何やら文字が映し出されていた。"
translation = "시선을 돌리자 모니터에는 무언가 글자가 비치고 있었다."

[[dialogue]]
speaker = "unk"
original = "――『セックスでシズハを満足させないと出られない部屋』。"
translation = "――『섹스로 시즈하를 만족시키지 않으면 나갈 수 없는 방』."

[[dialogue]]
speaker_original = "シズハ（覚醒）"
speaker_translation = "시즈하(각성)"
original = "「なっ……どういうこと～～～っ！？\u3000これってまさか、また聖杯ちゃんのしわざ……！？」"
translation = "「뭐…… 어떻게 된 거야~~~!? 이거 설마 또 성배짱의 소행……!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「し、新フォームにパワーアップしたせいか、前より手が込んでいる……！」"
translation = "「새, 새 폼으로 파워 업한 탓인지 전보다 공을 들였군……!」"

[[dialogue]]
speaker = "unk"
original = "呆れ半分、納得半分。どうやら今回も、抗う術はなさそうだ。"
translation = "반쯤 어이없고, 반쯤은 납득. 아무래도 이번에도 저항할 방법은 없을 것 같다."

[[dialogue]]
speaker = "unk"
original = "そんなわけで――俺たちはベッドに移動して、部屋から出るためにエッチをすることになった。"
translation = "그런 이유로―― 우리들은 침대로 이동해서 방에서 나가기 위해 섹스를 하기로 했다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「んっ……<emoji=heart04>\u3000ふうぅ……はあぁ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 후으…… 하아아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "恥ずかしさで体を震わせながらも、シズハはゆっくりと背を向け、お尻をこちらへ向ける。"
translation = "부끄러움에 몸을 떨면서도 시즈하는 천천히 등을 돌려 엉덩이를 이쪽으로 향한다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「シズハ……もしかして本当は、エッチしたいと思ってた？」"
translation = "「시즈하…… 혹시 사실은 섹스하고 싶다고 생각했어?」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「なっ……ば、バカバカ！\u3000別にそんなことないもんっ<emoji=heart04>」"
translation = "「뭐…… 바, 바보바보! 딱히 그런 거 아니거든<emoji=heart04>」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "（はうぅっ……<emoji=heart04>\u3000こんなのまるで、会長とエッチしたくてしょうがなかった欲求不満女みたいじゃないっ……<emoji=heart04>）"
translation = "(하우으……<emoji=heart04> 이건 마치 회장님이랑 섹스하고 싶어서 참을 수 없는 욕구불만녀 같잖아……<emoji=heart04>)"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "（ううん、それ自体は本当なんだけど、バレバレなの、すごく恥ずかしい……！）"
translation = "(아니, 그거 자체는 사실이지만, 다 들키는 건 너무 부끄러워……!)"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「って、ひょっとして聖杯ちゃんの力で、私の心の声、もう聞こえちゃってる……！？」"
translation = "「그보다, 설마 성배짱의 힘으로 내 마음의 소리, 벌써 들리고 있는 거야……!?」"

[[dialogue]]
speaker = "unk"
original = "俺は小さく頷き、正直に答える。"
translation = "나는 작게 고개를 끄덕이며 솔직하게 대답한다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺も本当はエッチしたいと思ってたから、同じ気持ちで嬉しいよ」"
translation = "「나도 사실은 섹스하고 싶다고 생각했으니까, 같은 마음이라서 기뻐.」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「え？\u3000――あっ<emoji=heart04>\u3000あんっ……<emoji=heart04>」"
translation = "「에? ――앗<emoji=heart04> 앙……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "言葉と同時に、俺は彼女のお尻へと手を伸ばす。"
translation = "말과 동시에 나는 그녀의 엉덩이로 손을 뻗는다."

[[dialogue]]
speaker = "unk"
original = "両手で包み込むように撫でると、むちっとした弾力が指に吸いついてきた。"
translation = "양손으로 감싸듯이 쓰다듬자, 포동포동한 탄력이 손가락에 달라붙어 왔다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「はあぁっ<emoji=heart04>\u3000会長、お尻触っちゃ……あんっ<emoji=heart04>\u3000ふあぁっ……<emoji=heart04>」"
translation = "「하아아<emoji=heart04> 회장님, 엉덩이 만지면…… 앙……<emoji=heart04> 후아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「お尻をこっちに向けてたのに？」"
translation = "「엉덩이를 이쪽으로 향했으면서?」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「んっ……<emoji=heart04>\u3000それは、正面からするのがなんだか恥ずかしくて……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 그건 정면으로 하는 게 왠지 부끄러워서……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺にとっては、背を向けて無防備に晒される方がよほどエッチに見える。"
translation = "나에게는 등을 돌리고 무방비하게 노출되는 쪽이 훨씬 야하게 보인다."

[[dialogue]]
speaker = "unk"
original = "思わず指に力が入り、ぐっと鷲掴みにする。弾むような柔らかさが、掌いっぱいに広がった。"
translation = "나도 모르게 손가락에 힘이 들어가 꽉 움켜쥔다. 탄력 있는 부드러움이 손바닥 가득 퍼졌다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「あっ<emoji=heart04>\u3000会長、お尻そんな、モミモミしちゃダメぇっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 회장님, 엉덩이 그렇게 주물주물하면 안 돼애<emoji=heart04>」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "（ふあぁっ……<emoji=heart04>\u3000お尻揉まれるの気持ちいいっ<emoji=heart04>）"
translation = "(후아아……<emoji=heart04> 엉덩이 주물러지는 거 기분 좋아<emoji=heart04>)"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「お尻揉まれて気持ちいいって、心の声が聞こえてきてるよ」"
translation = "「엉덩이 주물러져서 기분 좋다는 마음의 소리가 들려오고 있어.」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「やぁんっ、言わないでぇ<emoji=heart04>\u3000お尻触られて気持ちよく感じちゃってるの、恥ずかしい……<emoji=heart04>」"
translation = "「야앙, 말하지 마아<emoji=heart04> 엉덩이 만져져서 기분 좋게 느껴버리는 거 부끄러워……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「まだおま○こには触ってなかったのに、すごく濡れてきてる」"
translation = "「아직 보지에는 손도 안 댔는데 벌써 엄청 젖어 있어.」"

[[dialogue]]
speaker = "unk"
original = "俺は既に熱を帯びて大きく隆起したペニスを擦り付けると、秘部はすでにしっとりと濡れていた。"
translation = "이미 열기를 띠고 크게 팽창한 자지를 비벼대자, 비부는 벌써 촉촉하게 젖어 있었다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「だって、エッチするたびに、会長が私のお尻を触ったり揉んだり、いっぱいするからぁ<emoji=heart04>\u3000会長にお尻触られると、感じるようになっちゃったんだもん<emoji=heart04>」"
translation = "「그야 섹스할 때마다 회장님이 내 엉덩이를 만지거나 주무르거나 잔뜩 하니까아<emoji=heart04> 회장님이 엉덩이 만져주면 느끼게 되어버렸는걸<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「思わず触りたくなっちゃうような、むちむちでエッチなお尻をしてるシズハが悪い」"
translation = "「나도 모르게 만지고 싶어질 정도로 포동포동하고 야한 엉덩이를 한 시즈하가 나빠.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「おかげでもう、俺も我慢できなくなっちゃってるから、挿れちゃうぞ？」"
translation = "「덕분에 벌써 나도 참을 수 없게 됐으니까, 넣을게?」"

[[dialogue]]
speaker = "unk"
original = "愛液で濡れた先端を、ゆっくりと彼女の奥へと導く。"
translation = "애액으로 젖은 끝부분을 천천히 그녀의 안쪽으로 인도한다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「あっ<emoji=heart04>\u3000んぁ――っ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 응아――앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「ふああぁ～～っ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はあぁんっ<emoji=heart04>」"
translation = "「후아아아~~<emoji=heart04><emoji=heart04> 앗<emoji=heart04> 앙……<emoji=heart04> 하아아<emoji=heart04> 앙……<emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "蜜壺の中へゆっくりと押し入れた瞬間、熱く絡みつく感触が包み込んでくる。内側はとろりと濡れ、柔らかな肉壁が脈打つように締め付けてきた。"
translation = "밀호 안으로 천천히 밀어 넣은 순간, 뜨겁게 얽혀오는 감촉이 감싸온다. 내벽은 걸쭉하게 젖어 부드러운 육벽이 맥동하듯 조여왔다."

[[dialogue]]
speaker = "unk"
original = "俺のペニスは、そのあまりにも濃密な快楽に一瞬で呑み込まれる。"
translation = "내 자지는 그 너무나도 농밀한 쾌락에 순식간에 삼켜진다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "（会長のおっきいおち○ちんで、膣穴じゅぶじゅぶかき回されるの気持ちいいっ<emoji=heart04>\u3000出し入れするたび、いいところ全部擦られて……最高なのぉ～っ<emoji=heart04>）"
translation = "(회장님의 커다란 자지로 질 구멍 쥬브쥬브 휘저어지는 거 기분 좋아<emoji=heart04> 넣었다 뺄 때마다 좋은 곳 전부 쓸려서…… 최고야아~<emoji=heart04>)"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「んううぅっ<emoji=heart04>\u3000あっ、あんっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「응으으윽<emoji=heart04> 앗, 앙<emoji=heart04> 하아아<emoji=heart04> 앙<emoji=heart04> 후아아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺もシズハのおま○こ、すごく気持ちがいいぞ……！」"
translation = "「나도 시즈하의 보지, 정말 기분 좋아……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「お尻と同じで、エッチするたびに俺に合わせて変わっていってる感じがして……！」"
translation = "「엉덩이랑 마찬가지로 섹스할 때마다 나에게 맞춰서 변해가는 느낌이 들어서……!」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「そんなエッチなこと言っちゃダメぇ～っ<emoji=heart04>\u3000会長ぉ、あぁああっ<emoji=heart04>」"
translation = "「그런 야한 말 하면 안 돼애~<emoji=heart04> 회장니임, 아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "（会長に気持ちいいって言われたら、おま○こ嬉しくなって、私ももっと気持ちよく感じちゃうぅ～っ<emoji=heart04>）"
translation = "(회장님이 기분 좋다고 말해주면, 보지가 기뻐서 나도 더 기분 좋게 느껴버려어~<emoji=heart04>)"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「んっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はあぁんっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 후우으<emoji=heart04> 앙<emoji=heart04> 하아아앙<emoji=heart04> 응아아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はそこで、彼女のお尻に添えていた手を動かし、改めてがっしりと鷲掴みにする。"
translation = "나는 거기서 그녀의 엉덩이에 얹고 있던 손을 움직여 다시금 꽉 움켜쥔다."

[[dialogue]]
speaker = "unk"
original = "むにゅり、と弾む感触が掌いっぱいに広がった。"
translation = "무뉴릿 하고 탄력 있는 감촉이 손바닥 가득 퍼졌다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「あっ！？\u3000会長っ<emoji=heart04>\u3000今お尻強く揉んだら、ダメぇ～っ<emoji=heart04><emoji=heart04>」"
translation = "「앗!? 회장님<emoji=heart04> 지금 엉덩이 세게 주무르면 안 돼애~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "（おま○ことお尻が同時に感じてっ<emoji=heart04>\u3000頭の中、気持ちいいのでおかしくなっちゃうぅ～～っ<emoji=heart04><emoji=heart04>）"
translation = "(보지랑 엉덩이가 동시에 느껴져서<emoji=heart04> 머릿속이 기분 좋은 걸로 이상해져 버려어~~<emoji=heart04><emoji=heart04>)"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「ふああぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んああぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「후아아아<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 하아아<emoji=heart04> 응아아아~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "お尻を揉むたびに、膣内が敏感に反応し、きゅうぅっと締め付けてくる。"
translation = "엉덩이를 주무를 때마다 질 내부가 민감하게 반응하며 뀨우욱 하고 조여온다."

[[dialogue]]
speaker = "unk"
original = "その収縮があまりにも心地よく、思わず俺の喉から熱い吐息が漏れた。"
translation = "그 수축이 너무나도 기분 좋아서 나도 모르게 목구멍에서 뜨거운 숨결이 샜다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "（お尻強く揉まれるの、気持ちいいっ<emoji=heart04>\u3000これでもし今、お尻を叩かれたりしたら――<emoji=heart04>）"
translation = "(엉덩이 세게 주물러지는 거 기분 좋아<emoji=heart04> 이대로 만약 지금 엉덩이를 맞거나 한다면――<emoji=heart04>)"

[[dialogue]]
speaker = "unk"
original = "そんな心の声が聞こえてきた以上、恋人として応えないわけにはいかない。"
translation = "그런 마음의 소리가 들려온 이상 연인으로서 응하지 않을 수 없다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「ひゃんっ！？」"
translation = "「히양!?」"

[[dialogue]]
speaker = "unk"
original = "俺は力を加減しながら、彼女のお尻を手の平でスパンキングする。"
translation = "나는 힘을 조절하며 그녀의 엉덩이를 손바닥으로 스팽킹한다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「あぁんっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04><emoji=heart04>」"
translation = "「아앙<emoji=heart04> 후아아아<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "（会長にまた心の声聞かれて、お尻叩かれちゃってるぅ～っ<emoji=heart04>）"
translation = "(회장님한테 또 마음의 소리 들려서 엉덩이 맞고 있어어~<emoji=heart04>)"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "（好きな男の人に、ちょっと乱暴にされちゃってる感じがゾクゾクして、興奮しちゃうっ<emoji=heart04>）"
translation = "(좋아하는 남자한테 좀 거칠게 다뤄지는 느낌이 짜릿해서 흥분돼애<emoji=heart04>)"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "（お尻が大きな音立ててるの、恥ずかしくてっ<emoji=heart04>\u3000おま○こにゾクゾク伝わってきちゃうぅっ<emoji=heart04><emoji=heart04>）"
translation = "(엉덩이가 큰 소리를 내고 있는 거 부끄러워서<emoji=heart04> 보지에 찌릿찌릿 전해져 버려어<emoji=heart04><emoji=heart04>)"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「はあああぁっ<emoji=heart04><emoji=heart04>\u3000ダメっ<emoji=heart04><emoji=heart04>\u3000興奮し過ぎて、おま○こ気持ちいいのが登って――っ<emoji=heart04><emoji=heart04>」"
translation = "「하아아아아<emoji=heart04><emoji=heart04> 안 돼<emoji=heart04><emoji=heart04> 너무 흥분해서 보지 기분 좋은 게 올라와서――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「あっ、あっ、あっ、あっ<emoji=heart04><emoji=heart04>\u3000ふああああああっ<emoji=heart04><emoji=heart04>」"
translation = "「앗, 앗, 앗, 앗<emoji=heart04><emoji=heart04> 후아아아아아아<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「あっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000んああああああぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04><emoji=heart04><emoji=heart04> 응아아아아아아아~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "全身をびくびくと震わせながら、膣内がひときわ強く締まる。"
translation = "전신을 파르르 떨면서 질 내부가 한층 더 강하게 조여진다."

[[dialogue]]
speaker = "unk"
original = "脈打つような収縮が、何度もペニスを搾り上げた。"
translation = "맥동하는 수축이 몇 번이고 자지를 짜 올렸다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "（お尻叩かれて、おま○こ絶頂しちゃったぁ～～<emoji=heart04><emoji=heart04>）"
translation = "(엉덩이 맞고 보지 절정해 버렸어어~~<emoji=heart04><emoji=heart04>)"

[[dialogue]]
speaker = "unk"
original = "シズハはどうやら本気でイってしまったらしい。"
translation = "시즈하는 아무래도 진심으로 가버린 모양이다."

[[dialogue]]
speaker = "unk"
original = "俺は叩くのを止め、優しく撫でながら腰の動きを緩める。"
translation = "나는 때리는 것을 멈추고 부드럽게 쓰다듬으며 허리 움직임을 늦춘다."

[[dialogue]]
speaker = "unk"
original = "しかし――"
translation = "하지만――"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「んっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んふぅ～っ……<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000んふぅ～っ<emoji=heart04>」"
translation = "「응<emoji=heart04> 응으윽<emoji=heart04> 앗<emoji=heart04> 응<emoji=heart04> 응후우~……<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 응<emoji=heart04> 후우윽<emoji=heart04> 응후우~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "シズハの方から、お尻を突き出すように腰を揺らしてきた。"
translation = "시즈하 쪽에서 엉덩이를 내밀 듯 허리를 흔들어왔다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「会長ぉ<emoji=heart04>\u3000腰止めなくていいからぁ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000はあぁんっ<emoji=heart04>」"
translation = "「회장님<emoji=heart04> 허리 멈추지 않아도 되니까아<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 응<emoji=heart04> 후우으<emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "シズハは横目で俺を見つめ、今度ははっきりと声に出して言う。"
translation = "시즈하는 곁눈질로 나를 바라보며 이번에는 확실히 목소리를 내어 말한다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「もっと動いて、いっぱい突いてぇ～<emoji=heart04>\u3000あっ、はあぁあっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>」"
translation = "「더 움직여줘, 잔뜩 찔러줘어~<emoji=heart04> 앗, 하아아아앗<emoji=heart04> 후아아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「ねぇ、お願いっ――<emoji=heart04>」"
translation = "「저기, 부탁이야――<emoji=heart04>」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「会長のおち○ちんで……私のおま○こ、もっといっぱい気持ちよくして欲しいのぉ<emoji=heart04><emoji=heart04>」"
translation = "「회장님 자지로…… 내 보지 더 잔뜩 기분 좋게 해줬으면 좋겠어어<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……！」"
translation = "「윽……!」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「あっ！？<emoji=heart04><emoji=heart04>\u3000――ふあぁああぁぁっ<emoji=heart04><emoji=heart04>\u3000はあぁああぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗!?<emoji=heart04><emoji=heart04> ――후아아아아앗<emoji=heart04><emoji=heart04> 하아아아아아~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はピストンを一気に速め、彼女のお尻へと腰を打ち付け始めた。"
translation = "나는 피스톤질을 단숨에 빠르게 하며 그녀의 엉덩이에 허리를 부딪치기 시작했다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「あっ、あっ、あっ、あっ、はぁんっ<emoji=heart04>\u3000あんっ、ふああぁんっ<emoji=heart04>\u3000あっ、あっ、んああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「앗, 앗, 앗, 앗, 하앙<emoji=heart04> 앙, 후아아앙<emoji=heart04> 앗, 앗, 응아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「会長っ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000おち○ちんで奥突かれるの、気持ちいい～～っ<emoji=heart04><emoji=heart04>」"
translation = "「회장님<emoji=heart04> 기분 좋아<emoji=heart04> 자지로 안쪽 찔리는 거 기분 좋아아~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「すごいぃ<emoji=heart04>\u3000お尻にパンパン、気持ちいいのぉ～～っ<emoji=heart04><emoji=heart04>\u3000あっあっあっ、あぁあんっ<emoji=heart04>」"
translation = "「대단해애<emoji=heart04> 엉덩이에 팡팡, 기분 좋아아~~<emoji=heart04><emoji=heart04> 앗앗앗, 아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「いいっ<emoji=heart04>\u3000あっ、あっ、あっ、あんっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「좋아<emoji=heart04> 앗, 앗, 앗, 앙<emoji=heart04> 응아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「気持ちいいっ<emoji=heart04><emoji=heart04>\u3000おま○こ、気持ちいいよぉ～～っ<emoji=heart04><emoji=heart04>\u3000あんっ、あんっ、ふああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「기분 좋아<emoji=heart04><emoji=heart04> 보지 기분 좋아아~~<emoji=heart04><emoji=heart04> 앙, 앙, 후아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「会長、お尻もぉっ<emoji=heart04>\u3000お尻も強く揉んでぇっ\u3000んふうぅっ<emoji=heart04><emoji=heart04>」"
translation = "「회장님, 엉덩이도오<emoji=heart04> 엉덩이도 세게 주물러줘어 응후으<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は応えるように、彼女のお尻を強く掴み、揉みしだく。"
translation = "나는 응하듯이 그녀의 엉덩이를 세게 잡고 주물러댄다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「お尻気持ちいいっ<emoji=heart04>\u3000叩くのもっ<emoji=heart04>\u3000お尻叩くのも、もっとしてぇっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000あっあっあっあっ<emoji=heart04>」"
translation = "「엉덩이 기분 좋아<emoji=heart04> 때리는 것도오<emoji=heart04> 엉덩이 때리는 것도 더 해줘어<emoji=heart04> 아앙<emoji=heart04> 앗앗앗앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「んあああぁ～～っ<emoji=heart04><emoji=heart04>\u3000ゾクゾクするぅっ<emoji=heart04><emoji=heart04>\u3000おま○こに来ちゃうのぉっ<emoji=heart04><emoji=heart04>」"
translation = "「응아아아아~~<emoji=heart04><emoji=heart04> 짜릿짜릿해애<emoji=heart04><emoji=heart04> 보지에 와버려어<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くっ……！\u3000おま○こ強く締まって、気持ちいいっ！」"
translation = "「큭……! 보지가 세게 조여서 기분 좋아!」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「私も気持ちいぃっ<emoji=heart04>\u3000お尻叩かれながらおま○こ突かれるの、気持ちいいのぉ～～っ<emoji=heart04><emoji=heart04>\u3000ふああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「나도 기분 좋아아<emoji=heart04> 엉덩이 맞으면서 보지 찔리는 거 기분 좋아아~~<emoji=heart04><emoji=heart04> 후아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「ダメダメっ、おま○こ気持ちいいの登ってきてるぅっ<emoji=heart04><emoji=heart04>\u3000大きい絶頂きちゃうよぉ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「안 돼 안 돼, 보지 기분 좋은 게 올라오고 있어어<emoji=heart04><emoji=heart04> 커다란 절정 와버려어~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺も、もうちょっとでイキそうだっ……！」"
translation = "「나도 이제 곧 갈 것 같아……!」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「会長っ、おち○ちん激しいっ<emoji=heart04>\u3000あっあっあっあっ、はあぁああっ<emoji=heart04><emoji=heart04>\u3000んあああぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「회장님, 자지 격해애<emoji=heart04> 앗앗앗앗, 하아아아아<emoji=heart04><emoji=heart04> 응아아아아~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は射精の衝動に突き動かされ、お尻を強く鷲掴みにしたまま、さらに腰を速める。"
translation = "나는 사정의 충동에 내몰려 엉덩이를 세게 움켜쥔 채 허리를 더욱 빠르게 놀린다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「気持ちいいっ<emoji=heart04>\u3000お尻強く掴まれながら、おま○こ強く突かれるの気持ちいい～～っ<emoji=heart04><emoji=heart04>\u3000あっあっあっあっ<emoji=heart04>」"
translation = "「기분 좋아<emoji=heart04> 엉덩이 세게 잡히면서 보지 세게 찔리는 거 기분 좋아아~~<emoji=heart04><emoji=heart04> 앗앗앗앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「お尻とおま○こ気持ちよくて、すごいの登ってきちゃうよぉ～～っ<emoji=heart04><emoji=heart04>\u3000あっあっあっあっ、んああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「엉덩이랑 보지 기분 좋아서 대단한 게 올라와 버려어~~<emoji=heart04><emoji=heart04> 앗앗앗앗, 응아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「くるくるっ、きちゃうのっ<emoji=heart04>\u3000おま○こ絶頂くるぅ～～っ<emoji=heart04><emoji=heart04>\u3000あんっ、あんっ、あんっ、あんっ、あぁああっ<emoji=heart04><emoji=heart04>」"
translation = "「온다 온다, 와버려어<emoji=heart04> 보지 절정 온다아~~<emoji=heart04><emoji=heart04> 앙, 앙, 앙, 앙, 아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「イクっ、イクイクっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000おま○こイっちゃうっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふああああああっ、イクイクイクイクイクっ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가, 가가앗<emoji=heart04><emoji=heart04><emoji=heart04> 보지 가버려어<emoji=heart04><emoji=heart04><emoji=heart04> 후아아아아아아, 가가가가가앗<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「シズハ、もう出るっ！！\u3000中に出すぞっ！！！」"
translation = "「시즈하, 이제 나온다!! 안에 낸다!!!」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「あっあっあっあっ、んあああああああっ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>\u3000おま○こイクううううううぅぅぅーーーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗앗앗앗, 응아아아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04> 보지 가아아아아아아아아아앗――――――<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「あっ――ふああああああぁぁぁ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗――후아아아아아아아아아아아~~~~~~~~~~~<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は限界まで腰を打ち込み、鷲掴みにしたお尻を引き寄せると、シズハのいちばん奥へ精液を解き放った。"
translation = "나는 한계까지 허리를 처박고 움켜쥔 엉덩이를 끌어당기며 시즈하의 가장 깊숙한 곳에 정액을 해방했다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「ふあああぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000会長の精子、子宮に勢いよく入ってくるぅ～～っ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000んっ……はああぁ～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「후아아아아아~~<emoji=heart04><emoji=heart04><emoji=heart04> 회장님의 정자가 자궁에 세차게 들어와아~~<emoji=heart04><emoji=heart04> 앗<emoji=heart04> 응…… 하아아아아~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "脈打つたびに、奥へ奥へと注ぎ込まれていく感覚。シズハの身体が大きく震える。"
translation = "맥동할 때마다 안으로, 안으로 쏟아져 들어가는 감각. 시즈하의 신체가 크게 떨린다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「ふあああぁっ<emoji=heart04><emoji=heart04>\u3000中出しされるの気持ちいいぃっ<emoji=heart04>\u3000精液注がれてるの感じるたびに、子宮キュンキュン感じちゃうよぉ……<emoji=heart04>\u3000あっ、んふぅう<emoji=heart04>」"
translation = "「후아아아아앗<emoji=heart04><emoji=heart04> 질내사정 당하는 거 기분 좋아아<emoji=heart04> 정액 쏟아지는 거 느껴질 때마다 자궁이 큥큥거려어……<emoji=heart04> 앗, 응후우으<emoji=heart04>」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「はぁんっ<emoji=heart04>\u3000すごいっ……<emoji=heart04>\u3000会長のまだ出て……子宮の中、熱いのでいっぱいに満たされちゃう……<emoji=heart04>\u3000はあぁっ……ふうぅ……<emoji=heart04>」"
translation = "「하앙<emoji=heart04> 대단해……<emoji=heart04> 회장님 거 아직 나오고 있어…… 자궁 안이 뜨거운 걸로 가득 채워져 버려……<emoji=heart04> 하아아…… 후으……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "最後の一滴まで搾り出すように、子宮口へ先端を押し付けたまま、しばし至福の余韻に浸る。"
translation = "마지막 한 방울까지 짜내듯 자궁구에 끝부분을 밀어붙인 채 잠시 지복의 여운에 잠긴다."

[[dialogue]]
speaker = "unk"
original = "やがて熱が引いていくのを感じながら、俺はゆっくりと腰を引いた。"
translation = "이윽고 열기가 가라앉는 것을 느끼며 나는 천천히 허리를 뺐다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「あんっ……<emoji=heart04>\u3000んんぅ、ふうぅ<emoji=heart04>」"
translation = "「앙……<emoji=heart04> 으응, 후으<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "抜けた瞬間、膣穴から入りきらなかった精子がとろりと溢れ落ちる。"
translation = "빠지는 순간 질 구멍에서 다 들어가지 못한 정자가 주르륵 넘쳐흐른다."

[[dialogue]]
speaker = "unk"
original = "シズハはぼんやりとした目のまま、荒い呼吸を整えながら呟いた。"
translation = "시즈하는 멍한 눈으로 거친 호흡을 가다듬으며 중얼거렸다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「お尻揉まれて気持ちよくなって、いっぱいイっちゃったぁ<emoji=heart04>」"
translation = "「엉덩이 주물러져서 기분 좋아져서 잔뜩 가버렸어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「興奮して、いっぱいお尻叩いちゃったけど……痛くなかった？」"
translation = "「흥분해서 엉덩이 잔뜩 때려버렸는데…… 아프지는 않았어?」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「ん、大丈夫<emoji=heart04>\u3000私も興奮しちゃってたし、会長が興奮してくれてたなら、私も嬉しい……<emoji=heart04>」"
translation = "「응, 괜찮아<emoji=heart04> 나도 흥분했었고, 회장님이 흥분해 줬다면 나도 기뻐……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その言葉に、胸の奥がじんわりと温かくなる。"
translation = "그 말에 가슴 깊은 곳이 뭉클하게 따뜻해진다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「そうだ<emoji=heart04>\u3000ねぇ、会長？」"
translation = "「맞다<emoji=heart04> 저기, 회장님?」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「次は――私が会長のお尻を揉んだり、叩いたりしながら、してあげたいな<emoji=heart04>」"
translation = "「다음에는―― 내가 회장님 엉덩이를 주무르거나 때리면서 해주고 싶어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker = "unk"
original = "思わず間の抜けた声が出る。"
translation = "나도 모르게 얼빠진 소리가 나온다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そ、それって……どんな体勢……？」"
translation = "「그, 그거…… 어떤 자세로……?」"

[[dialogue]]
speaker = "unk"
original = "シズハはまだ快楽の余韻の残る目を、ちらっとこちらに向けて、口にする。"
translation = "시즈하는 아직 쾌락의 여운이 남은 눈을 슬쩍 이쪽으로 향하며 입을 연다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「えっとね～<emoji=heart04>\u3000逆ちんぐり返し<emoji=heart04>」"
translation = "「그게 말야아~<emoji=heart04> 역 칭구리가에시<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「………………冗談とかじゃなくて？」"
translation = "「………………농담 같은 게 아니고?」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「うん♪\u3000会長、お願～い<emoji=heart04>」"
translation = "「응♪ 회장님, 부탁해애<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そうして悪戯っぽく微笑む恋人の顔を見ていると、断れるはずもなく――"
translation = "그렇게 장난스럽게 미소 짓는 연인의 얼굴을 보고 있으니 거절할 수 있을 리 없었고――"

[[dialogue]]
speaker = "unk"
original = "その後、俺はシズハのおねだりに負けて、今度は自分がお尻を揉まれまくる番になるのだった……。"
translation = "그 후 나는 시즈하의 조르기에 져서, 이번에는 자신이 엉덩이를 실컷 주물러질 차례가 되었다……."

