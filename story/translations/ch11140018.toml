[[dialogue]]
speaker = "unk"
original = "世界の存亡を懸けた戦いを経て──恋人関係となった俺とルヴィ。"
translation = "세계의 존망을 건 싸움을 거쳐── 연인 관계가 된 나와 루비."

[[dialogue]]
speaker = "unk"
original = "今日は彼女の方から、アルタイル世界を訪ねてくれていた。"
translation = "오늘은 그녀가 먼저 알타이르 세계를 방문해 주었다."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……ここが魔王の部屋。意外だわ、ずいぶんと片付いているのね」"
translation = "「……여기가 마왕의 방. 의외네, 아주 잘 정돈되어 있어」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「彼女が来るから、慌てて綺麗にしたとも言う」"
translation = "「그녀가 오니까 서둘러서 깨끗하게 치웠다고도 하지」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ふふっ──そうなの？\u3000言わなければバレないのに、正直すぎないかしら」"
translation = "「후후── 그래? 말하지 않으면 모를 텐데 너무 솔직한 거 아니야?」"

[[dialogue]]
speaker = "unk"
original = "お互いに平静は装っていても、どうしても意識してしまう。"
translation = "서로 평정을 가장하고 있어도 아무래도 의식하게 된다."

[[dialogue]]
speaker = "unk"
original = "なにせ『今日は母さんがいないから』と言って自宅に誘ったのだ。ルヴィもこれから何をするのか、察しているはず。"
translation = "애초에 『오늘은 엄마가 없으니까』라며 집으로 초대했다. 루비도 이제부터 무엇을 할지 짐작하고 있을 것이다."

[[dialogue]]
speaker = "unk"
original = "バクバクと早鐘を打つ心臓の音も、ルヴィに届いているかもしれない。"
translation = "쿵쾅거리며 경종을 울리는 심장 소리도 루비에게 들리고 있을지 모른다."

[[dialogue]]
speaker = "unk"
original = "ひとまず落ち着こうとベッドに腰を下ろすと──"
translation = "일단 진정하려고 침대에 걸터앉자──"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ん……しょ」"
translation = "「응…… 쌰」"

[[dialogue]]
speaker = "unk"
original = "ルヴィは俺の隣ではなく、膝上に座ってきた。"
translation = "루비는 내 옆이 아니라 무릎 위에 앉아 왔다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「今日はずいぶん、大胆なんだな……？」"
translation = "「오늘은 무척 대담하네……?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「いいじゃない。これからもっと、凄いことをするんでしょう？」"
translation = "「괜찮잖아. 이제부터 더 대단한 일을 할 거잖아?」"

[[dialogue]]
speaker = "unk"
original = "俺の体に背中を預けて、見上げてくるルヴィ。恋人にぴったり密着されて、俺のペニスはすぐに反応を始めてしまう。"
translation = "내 몸에 등을 기대고 올려다보는 루비. 연인에게 딱 밀착되니 내 자지는 금세 반응을 시작해 버린다."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ん……魔王の、大きくなってる……」"
translation = "「응…… 마왕 거, 커지고 있어……」"

[[dialogue]]
speaker = "unk"
original = "スカートに包まれたルヴィのまるいお尻に、勃起ペニスがぐいぐいと当たっている……"
translation = "스커트에 감싸인 루비의 둥근 엉덩이에 발기한 자지가 꾹꾹 닿고 있다……"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……嫌じゃ、ないか？」"
translation = "「……싫지 않아?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「いいえ。むしろ反応してくれて嬉しいくらい……私みたいな体でも興奮してくれるんだなって……」"
translation = "「아니. 오히려 반응해 줘서 기쁠 정도야…… 나 같은 몸으로도 흥분해 주는구나 싶어서……」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「あ──また硬くなったわ。私のお尻に、ぐい、ぐいって……ふふ<emoji=heart04>」"
translation = "「아── 또 딱딱해졌어. 내 엉덩이에 꾹, 꾹 하고…… 후후 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ルヴィがお尻をもじもじ動かして、刺激してくる。"
translation = "루비가 엉덩이를 꼼지락거리며 자극해 온다."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……少し面白いかも。このまま続けてあげましょうか？」"
translation = "「……조금 재미있을지도. 이대로 계속해 줄까?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……悪いけど、もう我慢できそうにない──いいか？」"
translation = "「……미안하지만 더는 못 참을 것 같아── 해도 돼?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ええ。私は次の女神になる者ではあるけれど……気兼ねなんてしなくていいわ」"
translation = "「응. 나는 다음 여신이 될 자이긴 하지만…… 사양할 거 없어」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「魔王……私の処女、もらってくれる？」"
translation = "「마왕…… 나의 처녀, 가져가 줄래?」"

[[dialogue]]
speaker = "unk"
original = "ルヴィの問いかけに、俺はうなずく。"
translation = "루비의 물음에 나는 고개를 끄덕인다."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ありがとう。初めての相手が貴方だなんて、すごく嬉しい……<emoji=heart04>」"
translation = "「고마워. 첫 상대가 당신이라니 너무 기뻐…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ね、魔王。せっかくだから、したいことは全部聞かせて頂戴？」"
translation = "「저기 마왕. 기왕 하는 거 하고 싶은 건 전부 말해줘?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「私、魔王の彼女だもの。彼女は、彼氏のしたいことを叶えてあげるものでしょう？」"
translation = "「나, 마왕의 여자친구인걸. 여자친구는 남자친구가 하고 싶은 걸 들어주는 법이잖아?」"

[[dialogue]]
speaker = "unk"
original = "頬を赤く染めた恋人に、そんないじらしいことを言われたら……もう歯止めは利かない。"
translation = "뺨을 붉게 물들인 연인에게 그런 기특한 소리를 들으니…… 이제 제어는 불가능하다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だったら────」"
translation = "「그렇다면────」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ず、随分といい趣味をしているのね……貴方……」"
translation = "「제, 제법 좋은 취미를 가졌네…… 당신……」"

[[dialogue]]
speaker = "unk"
original = "俺がしたリクエストは、大きく２つ。"
translation = "내가 한 요청은 크게 두 가지."

[[dialogue]]
speaker = "unk"
original = "１つは、戦闘服に着替えてほしいというもの。"
translation = "하나는 전투복으로 갈아입어 달라는 것."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「確かに私の戦闘服は、露出が多い方だけれど……貴方、もしかして私が変身するたびに、いやらしい目で見ていたの……？」"
translation = "「확실히 내 전투복은 노출이 많은 편이지만…… 당신, 설마 내가 변신할 때마다 야한 눈으로 보고 있었던 거야……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……黙秘権を行使したい」"
translation = "「……묵비권을 행사하고 싶어」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「白状しているのと変わらないじゃない……」"
translation = "「자백하는 거나 다름없잖아……」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「それに、こんな体勢でしたい、だなんて──」"
translation = "「게다가 이런 자세로 하고 싶다니──」"

[[dialogue]]
speaker = "unk"
original = "２つ目のお願いは──行為の前に、ルヴィが膝上に乗ってきてくれた体勢。それを変えずに、そのまま繋がりたいというもの。"
translation = "두 번째 부탁은── 행위 전에 루비가 무릎 위에 올라타 준 자세. 그걸 바꾸지 않고 그대로 이어지고 싶다는 것."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「私から甘えてくれたのが、嬉しかったからって……それは、いいのだけど……」"
translation = "「내가 응석 부려준 게 기뻤다니…… 그건 괜찮지만……」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「な、なんだか予想と違うわ……正常位でするとばかり、思ってたから……」"
translation = "「머, 뭔가 예상과 달라…… 정상위로만 할 줄 알았으니까……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それは次のエッチでさせてほしい」"
translation = "「그건 다음 섹스에서 하게 해줘」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「さりげなく次の予約まで取って……いやらしいんだから、本当に……<emoji=heart04>」"
translation = "「슬쩍 다음 예약까지 잡고…… 정말 변태라니까…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そんな会話をしているうちに、ルヴィの視線が俺のペニスへと向かう。"
translation = "그런 대화를 나누는 사이 루비의 시선이 내 자지로 향한다."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……勃起した男性器を見るのは、初めてなのだけど。お、大きすぎないかしら……？」"
translation = "「……발기한 남성기를 보는 건 처음인데. 너, 너무 크지 않아……?」"

[[dialogue]]
speaker = "unk"
original = "男はなんて単純なんだろう──彼女に大きいと言われただけで体が震える。"
translation = "남자는 얼마나 단순한지── 그녀에게 크다는 소리를 들은 것만으로 몸이 떨린다."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ぴくぴく震えて、喜んでる……こっちは全部入るか、不安になってるのに……えい<emoji=heart04>」"
translation = "「움찔움찔 떨며 기뻐하고 있어…… 이쪽은 전부 들어갈지 불안해하고 있는데…… 에잇 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ルヴィの指先が、亀頭をつんと触る。"
translation = "루비의 손가락 끝이 귀두를 툭 건드린다."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「──やっぱり敏感なのね、これ。凄い……ガチガチに硬いのは、竿のところだけ……？\u3000先っぽは張っているけど、ぷにってしてるのね……」"
translation = "「──역시 민감하네, 이거. 대단해…… 딱딱하게 굳은 건 기둥뿐이야……? 끝부분은 팽팽하지만 말랑하네……」"

[[dialogue]]
speaker = "unk"
original = "つん、つん。さわ、さわ。"
translation = "툭, 툭. 조물, 조물."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「魔王……これ、何て呼んで欲しい……？\u3000その、エッチな知識は調べてきたけれど……男性器の呼び方って、たくさんあるでしょう」"
translation = "「마왕…… 이거 뭐라고 불러줬으면 좋겠어……? 그, 야한 지식은 조사해 왔지만…… 남성기를 부르는 법은 잔뜩 있잖아」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「どう呼ぶのが、貴方は一番、嬉しい……？」"
translation = "「어떻게 부르는 게 당신은 가장 기뻐……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「じゃあ、ルヴィが知ってる中で、一番いやらしいヤツでお願い」"
translation = "「그럼 루비가 아는 것 중에 가장 야한 걸로 부탁해」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「私の、知ってる中で……？\u3000えっと……その……じゃあ……」"
translation = "「내가 아는 것 중에……? 그게…… 저기…… 그럼……」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ち──ち○ぽ……とか……？」"
translation = "「자── 자지…… 라든가……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「…………っ！」"
translation = "「…………윽!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「あ、ぁっ……<emoji=heart04>\u3000また──ち、ち○ぽ<emoji=heart04>\u3000ビクビク、してっ……そ、そう。貴方が喜んでくれるなら……いっぱい呼んであげる……<emoji=heart04>」"
translation = "「아, 아앗…… <emoji=heart04> 또── 자, 자지 <emoji=heart04> 움찔움찔하고 있어…… 그래. 당신이 기뻐해 준다면…… 잔뜩 불러줄게…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "あの真面目で聡明なルヴィが、ものすごく直接的な呼び方をしてくれる。それだけでもう、たまらなくなっていた。"
translation = "그 성실하고 총명한 루비가 너무나 직접적인 명칭을 써준다. 그것만으로도 이미 견딜 수 없게 되었다."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「その……ね？\u3000貴方の膝に乗って、お、おま○こっ<emoji=heart04>\u3000膝を開いて、見せていたら……私の方も、濡れてきちゃった、みたいなの……<emoji=heart04>」"
translation = "「그…… 있지? 당신 무릎에 앉아서 보, 보지 <emoji=heart04> 무릎을 벌리고 보여줬더니…… 나도 젖어버린 것 같아…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「じ、自分でも知らなかったのだけれど……私って、なんだかすごく、濡れやすかった、みたいっ<emoji=heart04>」"
translation = "「나, 나조차 몰랐는데…… 나란 애, 왠지 엄청 잘 젖는 모양이야 <emoji=heart04>」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「だから、もう、前戯はいらないというか……ううん、違うわ<emoji=heart04>\u3000もう、私の方がたまらなく、なっちゃってるから……<emoji=heart04>」"
translation = "「그러니까 이제 전희는 필요 없다고 해야 하나…… 아니, 아니야 <emoji=heart04> 이미 나도 참을 수 없게 돼버렸으니까…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「魔王のち○ぽ、私のおま○こに……頂戴？\u3000遠慮しないで、いいからぁ……<emoji=heart04>」"
translation = "「마왕의 자지, 나의 보지에…… 줘? 사양하지 않아도 되니까…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "もう本当に我慢できない。俺はルヴィの体をしっかり抱えなおして、狙いを定めて──"
translation = "정말로 더는 참을 수 없다. 나는 루비의 몸을 단단히 고쳐 안고 조준을 정해──"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「んんぅぅうっ──あぁ、ああぁああっ……<emoji=heart04><emoji=heart04>」"
translation = "「음응으으윽── 아아, 아아아앗…… <emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「あっ……こ、これっ……凄い……<emoji=heart04>\u3000ぶっといち○ぽっ……ずぶって、は、挿入って、るっ……<emoji=heart04>」"
translation = "「앗…… 이, 이거…… 굉장해…… <emoji=heart04> 굵은 자지가…… 즈부우 하고 사, 삽입되고 있어…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「これが、せ、せっくすっ……<emoji=heart04>\u3000あ、ぁっ……ふぅうっ<emoji=heart04>」"
translation = "「이게 섹, 섹스…… <emoji=heart04> 아, 아앗…… 후우으 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "華奢なルヴィの女性器の狭さは凄まじく、柔らかい膣肉がぎちゅぎちゅと俺のペニスを締め付けてくる。"
translation = "가냘픈 루비의 보지는 엄청나게 좁았고, 부드러운 질 고기가 기득기득하며 내 자지를 조여온다."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「はぁ、あ、ぅっ……<emoji=heart04>\u3000ま、魔王……？\u3000う、動いて、いいわっ……<emoji=heart04>\u3000遠慮しないで……<emoji=heart04>」"
translation = "「하아, 아, 윽…… <emoji=heart04> 마, 마왕……? 움, 움직여도 돼…… <emoji=heart04> 사양하지 마…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ち○ぽ、大きくて、ちょっぴり苦しいけれどっ<emoji=heart04>\u3000すごく……濡れててっ<emoji=heart04>\u3000痛みは、ほとんど、ないからぁ……<emoji=heart04>\u3000お願い、う、動いて……？」"
translation = "「자지, 커서 조금 괴롭지만 <emoji=heart04> 무척…… 젖어 있어서 <emoji=heart04> 아픔은 거의 없으니까…… <emoji=heart04> 부탁이야, 움, 움직여줘……?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「いっぱい、出し入れして……ち○ぽ、気持ちよくなって欲しいの……<emoji=heart04>」"
translation = "「잔뜩 넣었다 뺐다 해줘…… 자지, 기분 좋아졌으면 좋겠어…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "とろけたルヴィの声音に誘われて、俺は──"
translation = "녹아내리는 루비의 음성에 이끌려 나는──"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ふぁぁあっ<emoji=heart04>\u3000ああっ……んん、んぅっ……<emoji=heart04>\u3000ぁ、あぁあっ……んん、んぁぁ、あぁっ……<emoji=heart04>」"
translation = "「하아아앗 <emoji=heart04> 아앗…… 응, 으윽…… <emoji=heart04> 아, 아아앗…… 응, 응아아, 아앗…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「魔王の、ち○ぽっ……<emoji=heart04>\u3000出たり、入ったりっ……ぅう、ふぁ、あぁっ<emoji=heart04>\u3000私の、なかっ<emoji=heart04>\u3000広げられてっ……ひぁ、あ、あぁっ<emoji=heart04>」"
translation = "「마왕의 자지가 <emoji=heart04> 나왔다 들어갔다…… 으으, 하아, 아앗 <emoji=heart04> 내 안이 <emoji=heart04> 넓혀져서…… 히아, 아, 아아앗 <emoji=heart04>」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「や、やっぱりっ<emoji=heart04>\u3000あんまり、痛く、ないっ……<emoji=heart04>\u3000んん、ぅあ、あ、あぁっ……<emoji=heart04>\u3000はぁ、んんっ<emoji=heart04>」"
translation = "「역, 역시 <emoji=heart04> 별로 안 아파…… <emoji=heart04> 응, 으아, 아, 아아앗…… <emoji=heart04> 하아, 응윽 <emoji=heart04>」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「初めてだから、覚悟、してた、のにっ……<emoji=heart04>\u3000わ、私と、魔王っ……体の相性、いいのっ……かしらっ……あ、あぁあっ……ふぅうっ<emoji=heart04>」"
translation = "「처음이라 각오하고 있었는데…… 나, 나와 마왕…… 몸의 궁합이 좋은 걸까…… 아, 아아앗…… 후우으 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ルヴィの声は本当に気持ちよさそうで、ホッとする。小柄な彼女に無理をさせているんじゃないかって、少し心配していたから。"
translation = "루비의 목소리는 정말 기분 좋아 보여서 안심이 된다. 왜소한 그녀에게 무리를 시키는 게 아닐까 조금 걱정했으니까."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「あ、あぁっ……ひぅうっ<emoji=heart04>\u3000そ、そこっ<emoji=heart04>\u3000好き、かもっ……んんんっ<emoji=heart04>」"
translation = "「아, 아아앗…… 히으으 <emoji=heart04> 거, 거기 <emoji=heart04> 좋을지도…… 응응윽 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ストロークをするたび、ルヴィの反応が変わる。どうやら女性器の奥──おへその裏あたりに感じるポイントがあるみたいだ。"
translation = "스트로크를 할 때마다 루비의 반응이 변한다. 아무래도 질 안쪽── 배꼽 뒤쪽 즈음에 느끼는 포인트가 있는 모양이다."

[[dialogue]]
speaker = "unk"
original = "抱きかかえているから、角度の調整は簡単だ。ルヴィにもっと気持ちよくなってもらいたい。"
translation = "껴안고 있으니 각도 조절은 쉽다. 루비가 더 기분 좋아졌으면 좋겠다."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「あッ──ぁっ<emoji=heart04>\u3000あ、ああ、あぁっ<emoji=heart04>\u3000魔王、そんなっ<emoji=heart04>\u3000おへその、裏っ<emoji=heart04>\u3000ばっかりっ──ふあぁ、あ、あぁ、んん、あぁっ<emoji=heart04>」"
translation = "「아── 앗 <emoji=heart04> 아, 아아, 아앗 <emoji=heart04> 마왕, 그런 <emoji=heart04> 배꼽 뒤쪽만── 하아아, 아, 아아, 응, 아아앗 <emoji=heart04>」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「こ、こんなの、知ら──ないっ<emoji=heart04>\u3000私の、し、知らない、ところっ<emoji=heart04>\u3000魔王の、ち○ぽでっ<emoji=heart04>\u3000見つけられてるっ……んんぅうっ<emoji=heart04>」"
translation = "「이, 이런 거 몰──라 <emoji=heart04> 나의 모, 모르는 곳 <emoji=heart04> 마왕의 자지로 <emoji=heart04> 발견되고 있어…… 응으으윽 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "──私の知らないところ？\u3000つまり……知っているところもある、ということなのか？"
translation = "──나의 모르는 곳? 즉…… 알고 있는 곳도 있다는 건가?"

[[dialogue]]
speaker = "unk"
original = "こんなこと訊ねるのはマナー違反かもしれないけれど──"
translation = "이런 걸 묻는 건 매너 위반일지도 모르지만──"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「え、えぇっ……？\u3000普段、１人で、んんっ……する、のかって……あ、貴方、ねっ……！？\u3000あ、あぁあっ……ひぅ、んんっ……<emoji=heart04>」"
translation = "「에, 에엣……? 평소에 혼자서 응윽…… 하냐니…… 다, 당신 정말……!? 아, 아아앗…… 히으, 응윽…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ルヴィのこと、たくさん知りたいんだ」"
translation = "「루비에 대해 잔뜩 알고 싶어」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「そ、そんなこと、言ってっ……んんんっ<emoji=heart04>\u3000もう……い、言えば、いいんで、しょうっ……あ、ああっ<emoji=heart04>」"
translation = "「그, 그런 소릴 하고…… 응응윽 <emoji=heart04> 정말…… 마, 말하면 되잖아…… 아, 아앗 <emoji=heart04>」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「お、オナニー……しっ……したこと、あるわっ……<emoji=heart04>\u3000ま、前までは、しなかったっ……全然、しなかった、けどっ……<emoji=heart04>」"
translation = "「자, 자위…… 해, 해본 적 있어…… <emoji=heart04> 전, 전까지는 안 했어…… 전혀 안 했었지만…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「貴方とっ──お付き合い、始めてからっ……し始めたっ……んんぁぁっ<emoji=heart04>\u3000なんで、ち○ぽ硬くしてる、のっ？\u3000ぁ、んんぅっ<emoji=heart04>」"
translation = "「당신과── 사귀기 시작하고 나서…… 하기 시작했어…… 응아아앗 <emoji=heart04> 왜 자지를 딱딱하게 하는 거야? 아, 응윽 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "女神候補の女の子が、俺と付き合い始めてから、自身を慰めるようになった──本当に聞いてはいけない告白を聞いている気がして、興奮してしまう。"
translation = "여신 후보인 소녀가 나와 사귀기 시작한 후 스스로를 달래게 되었다── 정말 들으면 안 될 고백을 들은 기분이 들어 흥분하고 만다."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「でも、おま○この中、あんまり、感じなかったし……愛液も、こんなに出ちゃうことなんて、なかったからぁ<emoji=heart04>\u3000お、驚い、ちゃったのっ……<emoji=heart04>\u3000ふぅ、ぁ、あっ<emoji=heart04>」"
translation = "「하지만 보지 안은 별로 안 느껴졌고…… 애액도 이렇게나 나와버린 적은 없었으니까 <emoji=heart04> 놀, 놀라버렸어…… <emoji=heart04> 후으, 아, 앗 <emoji=heart04>」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「自分で、する時は──ク、クリトリス、とかっ……ばっかり、触ってっ……はぁぁ、あぁ、あぁっ<emoji=heart04>\u3000ん、んんんぅっ<emoji=heart04>」"
translation = "「혼자서 할 때는── 클, 클리토리스라든가…… 그런 데만 만져서…… 하아아, 아아, 아앗 <emoji=heart04> 응, 응응으윽 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ルヴィは根が真面目なのか、本当に包み隠さず喋ってくれる。こんな自慰の告白を聞いたら、むくむくと好奇心が湧いてきてしまう。"
translation = "루비는 천성이 성실한지 정말 숨김없이 말해준다. 이런 자위 고백을 들으니 호기심이 무럭무럭 솟아오른다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ルヴィが自分で触ってるところ、見てみたいな」"
translation = "「루비가 스스로 만지는 모습, 보고 싶어」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「な、何を言って、るの……！？\u3000そ、そんなの、は、恥ずかしいっ……<emoji=heart04>」"
translation = "「머, 무슨 소릴 하는 거야……!? 그, 그런 거 부, 부끄러워…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「彼女は、彼氏のしたいことを叶えてあげるものだって、さっき──」"
translation = "「여자친구는 남자친구가 하고 싶은 걸 들어주는 법이라고 아까──」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「そ、そんなっ……そんなのっ……ぁ、ぁぅ、んんっ……<emoji=heart04>」"
translation = "「그, 그런 건…… 그런 건…… 아, 아우, 응윽…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「…………す、すれば、いいんで、しょう……？\u3000本当に……え、えっち……なんだからっ……<emoji=heart04>」"
translation = "「…………하, 하면 되잖아…… 정말…… 배, 변태라니까…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ルヴィの細い指が、ゆっくりとクリトリスに伸びて……"
translation = "루비의 가느다란 손가락이 천천히 클리토리스로 뻗어 나간다……"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「──ひぁっ<emoji=heart04>\u3000ぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あぅっ<emoji=heart04>\u3000ち○ぽされながら、クリっ……あ、あぁぁあっ<emoji=heart04>\u3000はあぁあ、んぅ、ぁあぁあっ……<emoji=heart04>」"
translation = "「──히앗 <emoji=heart04> 앗 <emoji=heart04> 앗 <emoji=heart04> 아우윽 <emoji=heart04> 자지 박히면서 클리…… 아, 아아아앗 <emoji=heart04> 하아아아, 응, 아아아앗…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ま、魔王っ……これっ<emoji=heart04>\u3000これで、いいっ……？\u3000あ、あぁっ──んんんっ<emoji=heart04>\u3000興奮、して──くれてるっ……？」"
translation = "「마, 마왕…… 이, 이거<emoji=heart04> 이걸로 됐어……? 아, 아앗── 응응윽<emoji=heart04> 흥분, 해── 주고 있어……?」"

[[dialogue]]
speaker = "unk"
original = "ペニスを出し入れされながら、ルヴィが覚えたてのクリトリスオナニーを始めた。"
translation = "페니스를 넣었다 뺐다 당하며, 루비가 막 배운 클리토리스 자위를 시작했다."

[[dialogue]]
speaker = "unk"
original = "それを間近で、特等席で見物できるだなんて──興奮しないわけがない。"
translation = "그것을 바로 옆에서, 특등석에서 구경할 수 있다니── 흥분하지 않을 리가 없다."

[[dialogue]]
speaker = "unk"
original = "もっと彼女の乱れたところを見たい……！"
translation = "좀 더 그녀의 흐트러진 모습을 보고 싶어……!"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ひぁぁあぁああっ！？\u3000あっあっあっ、んんぅ、んぁあ、あぁああっ<emoji=heart04>\u3000ああぁあっ<emoji=heart04>\u3000はぁあ、ふぅぅっ<emoji=heart04>」"
translation = "「히아아아아앗!? 앗앗앗, 응으, 응아, 아아아앗<emoji=heart04> 아아아앗<emoji=heart04> 하아, 후우우<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「いきなり、そんなっ──ぁぁあ、んんんぅっ<emoji=heart04>\u3000ち○ぽ、強すぎっ──<emoji=heart04>\u3000あっあっあっ、あぁあ、ふぅぅ、んんあぁああっ<emoji=heart04>」"
translation = "「갑자기, 그렇게── 아아아, 응응윽<emoji=heart04> 자지, 너무 강해── <emoji=heart04> 앗앗앗, 아아아, 후우, 응응아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「中っ<emoji=heart04>\u3000奥ぅっ<emoji=heart04>\u3000ち○ぽ、ごりごり当たる、ぅっ<emoji=heart04>\u3000うぁあ、ああ、ぁあ、ぁあっ<emoji=heart04>\u3000気持ちいいっ……これ、いい、気持ちいいっ<emoji=heart04>」"
translation = "「안이<emoji=heart04> 깊숙한 곳이<emoji=heart04> 자지, 고리고리 닿아, 앗<emoji=heart04> 우아아, 아아, 아아, 아앗<emoji=heart04> 기분 좋아…… 이거, 좋아, 기분 좋아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺に真下から穿たれながら、ルヴィがクリオナで乱れていく。"
translation = "나에게 바로 아래에서 꿰뚫리며, 루비가 클리 자위로 흐트러져 간다."

[[dialogue]]
speaker = "unk"
original = "背面座位での、激しいピストンでどんどんルヴィの体は火照り、ふわふわと甘い香りが俺の鼻をくすぐる──"
translation = ""

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「魔王っ<emoji=heart04>\u3000あ、あぁあ、ああぁあっ<emoji=heart04>\u3000ち○ぽ、奥ばっかり、そんな、ぁっ……あぅっ<emoji=heart04>\u3000ひぅう、んぁ、あぁ、あぁっ<emoji=heart04>」"
translation = "「마왕<emoji=heart04> 아, 아아아, 아아아앗<emoji=heart04> 자지, 깊숙한 곳만, 그렇게, 아…… 아윽<emoji=heart04> 히우, 응아, 아아, 아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "一突きごとにルヴィの体がびくついて、愛液がとぱとぱ漏れ出て、ペニスの侵入を容易いものへ変えていく。"
translation = "한 번 찌를 때마다 루비의 몸이 움찔거리고, 애액이 뚝뚝 새어 나와 페니스의 침입을 수월하게 바꿔 나간다."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「はぁあ、ふぅうっ<emoji=heart04>\u3000ぅあ、あ、あぁっ<emoji=heart04>\u3000こんなの知らないっ……こんなに気持ちいいの知らないっ、知らない知らないっ──ぁぁああっ<emoji=heart04>」"
translation = "「하아아, 후우우<emoji=heart04> 우아, 아, 아앗<emoji=heart04> 이런 거 몰라…… 이렇게 기분 좋은 거 몰라, 몰라 몰라── 아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "──もっと乱れて欲しい。セックスしながらのオナニー、もっと見せて欲しい。"
translation = "──좀 더 흐트러졌으면 좋겠어. 섹스하면서 하는 자위, 좀 더 보여줬으면 좋겠어."

[[dialogue]]
speaker = "unk"
original = "そう伝えながら、ピストンを続けていると……ルヴィは自ら、おっぱいを触り始めた。"
translation = "그렇게 전하며 피스톤을 계속하자…… 루비는 스스로 가슴을 만지기 시작했다."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ふぅっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000んぁっ、あっあっあっ、んぁあ、あぁっ<emoji=heart04>\u3000おっぱい、ぜ、全然、感じなかった、のにっ<emoji=heart04>」"
translation = "「후우<emoji=heart04> 응윽<emoji=heart04> 응아, 앗앗앗, 응아, 아앗<emoji=heart04> 가슴, 전, 전혀, 못 느꼈었는데<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「魔王の、ち○ぽで、ぱんぱんされてるとっ<emoji=heart04>\u3000ぜ、ぜんぶいいっ<emoji=heart04>\u3000ふぁ、ああ、ぁあっ<emoji=heart04>\u3000ひぅ、んんん、んぅうっ<emoji=heart04>」"
translation = "「마왕의 자지로 꽉꽉 채워지니까<emoji=heart04> 저, 전부 좋아<emoji=heart04> 화, 아아, 아앗<emoji=heart04> 히우, 응응응, 응으윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "冷静沈着な、デネブの指導者。次代の女神となる予定の天使。数多の立派な肩書きを持つ彼女が、汗だくになって乱れている。"
translation = "냉정 침착한 데네브의 지도자. 차세대 여신이 될 예정인 천사. 수많은 훌륭한 직함을 가진 그녀가, 땀범벅이 되어 흐트러지고 있다."

[[dialogue]]
speaker = "unk"
original = "小柄なのにお尻周りの肉付きはよくて、もっちりしたヒップへピストンを繰り返すのが心地よくて仕方がない。"
translation = "소형인데도 엉덩이 주변의 살집은 좋아서, 모찌 같은 힙에 피스톤을 반복하는 것이 기분 좋아 견딜 수가 없다."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「魔王、好きっ……好きっ<emoji=heart04>\u3000あ、あぁ、ああぁあっ<emoji=heart04>\u3000好きよ、好きなのっ……あ、あぁあ、ぅうぅうっ<emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000ふぁああっ<emoji=heart04>」"
translation = "「마왕, 좋아해…… 좋아해<emoji=heart04> 아, 아아, 아아아앗<emoji=heart04> 좋아해, 좋아하는걸…… 아, 아아아, 우우우우윽<emoji=heart04> 응응윽<emoji=heart04> 화아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺も好きだ──ルヴィ！」"
translation = "「나도 좋아해── 루비!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「うんっ──ぁ、あぁあっ<emoji=heart04>\u3000ひぅ、んん、んんんっ<emoji=heart04>\u3000あっあっあっあっあっ<emoji=heart04>\u3000ち○ぽ、膨らんでっ──これ、も、もう、出るのっ？」"
translation = "「응── 아, 아아앗<emoji=heart04> 히우, 응응, 응응윽<emoji=heart04> 앗앗앗앗앗<emoji=heart04> 자지, 부풀어서── 이거, 이, 이제 나오는 거야?」"

[[dialogue]]
speaker = "unk"
original = "──限界は間近だ。俺は歯を食いしばって、ピストンを続ける。"
translation = "──한계는 머지않았다. 나는 이를 악물고 피스톤을 계속한다."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「遠慮、しないでっ<emoji=heart04>\u3000きてっ<emoji=heart04>\u3000きて、きて、きてっ<emoji=heart04>\u3000私のおま○こにっ<emoji=heart04>\u3000いっぱい、出してっ──んんんぅぅううっ<emoji=heart04>」"
translation = "「사양, 하지 마<emoji=heart04> 와줘<emoji=heart04> 와줘, 와줘, 와줘<emoji=heart04> 내 보지에<emoji=heart04> 잔뜩, 내보내 줘── 응응으으우우우윽<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「あ、ぁ──イクっ<emoji=heart04>\u3000私もっ、イクっ──ぅ、ぁあっ<emoji=heart04>\u3000イク、イク、イクイクイクっ──<emoji=heart04>」"
translation = "「아, 아── 가버려<emoji=heart04> 나도, 가버려── 우, 아앗<emoji=heart04> 가, 가, 가가 가버려── <emoji=heart04>」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ぁ、ぁああぁ、ぁぁぁぁあああぁあ──っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아, 아아아, 아아아아아아아아── 앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「んぅぁあぁあぁぁぁぁぁあああ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응으아아아아아아아아아아아아아～～～앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「あ、あぅっ<emoji=heart04>\u3000ひぅっ<emoji=heart04>\u3000ひぅぁ、あっ──あぁぁあっ<emoji=heart04>\u3000あった、かいっ……気持ち、ぃいっ……ふうぅうっ……<emoji=heart04>」"
translation = "「아, 아윽<emoji=heart04> 히윽<emoji=heart04> 히우아, 앗── 아아아앗<emoji=heart04> 따뜻, 해…… 기분, 좋아…… 후우우우…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "恋人の天使のお腹に、容赦も遠慮もなく精液を送り込む。"
translation = "연인인 천사의 배 속에 용서도 사양도 없이 정액을 쏟아붓는다."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ぅあぁっ<emoji=heart04>\u3000びゅるって、びゅるびゅるって──まだ、出てっ<emoji=heart04>\u3000ひぅぁあ、あぁあぁぁぁっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「우아앗<emoji=heart04> 울컥하고, 울컥울컥하고── 아직, 나와<emoji=heart04> 히우아아, 아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "どくん、どくんと撃ち放つたび、ルヴィは小刻みに痙攣して反応を返してくれる──なんて可愛いんだ、この子。"
translation = "두근, 두근 하고 쏘아 보낼 때마다, 루비는 잘게 경련하며 반응을 돌려준다── 정말 귀엽네, 이 아이."

[[dialogue]]
speaker = "unk"
original = "そして、長い射精がようやく終わりに近づいたその時……"
translation = "그리고 긴 사정이 드디어 끝에 가까워진 그때……"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「────っ！？」"
translation = "「────앗!?」"

[[dialogue]]
speaker = "unk"
original = "ぶるるっ、とルヴィの体が震えた。"
translation = "부르르, 하고 루비의 몸이 떨렸다."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「え、ぁっ──？\u3000や、ぁぁっ──！？\u3000ま、待ってっ……で、出るっ……やぁっ……！」"
translation = "「어, 아──? 시, 싫어──!? 기, 기다려…… 나, 나와…… 싫어……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「出る……？」"
translation = "「나온다니……?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「だ、だめだめだめだめっ──だめぇえぇえぇっ──！！」"
translation = "「안, 안돼안돼안돼안돼── 안돼애애애애──!!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ふぇああぁぁあぁぁあぁ～～～～っ……！！」"
translation = "「후에아아아아아아아아아～～～～앗……!!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──！？」"
translation = "「──!?」"

[[dialogue]]
speaker = "unk"
original = "しゅぃぃいぃぃぃぃ──"
translation = "슈이이이이이이이──"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ま、まって……とまってっ……ぁ、あぁあっ<emoji=heart04>\u3000んんぅぅうう～っ……<emoji=heart04>」"
translation = "「기, 기다려…… 멈춰줘…… 아, 아아앗<emoji=heart04> 응응으으우우우～윽…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "絶頂で緊張が弛んでしまったのか。ルヴィはイキながら、おもらしを始めてしまった。"
translation = "절정으로 긴장이 풀려버린 것일까. 루비는 가버리면서 실례를 범하기 시작했다."

[[dialogue]]
speaker = "unk"
original = "何だこの光景……すごい。めちゃくちゃ、興奮する──"
translation = "뭐야 이 광경…… 굉장해. 엄청나게 흥분돼──"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「や、やだぁっ……ま、魔王の部屋、汚しちゃっ、ぅっ……とまって、とまって、ぇっ……！」"
translation = "「시, 싫어…… 마, 마왕의 방, 더럽혀버려, 윽…… 멈춰줘, 멈춰줘……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──気にしなくていいよルヴィ。全部出し切っちゃおう。ほらっ」"
translation = "「──신경 쓰지 않아도 돼, 루비. 전부 쏟아내 버리자. 자」"

[[dialogue]]
speaker = "unk"
original = "ぐりっ、とルヴィの感じるおへその裏をペニスで一突きする。"
translation = "그리, 하고 루비가 느끼는 배꼽 안쪽을 페니스로 한 번 찌른다."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「やぁぁあっ！？\u3000ばかぁっ<emoji=heart04>\u3000あぁ──あぁぁぁあぁああぁぁ～～～…………っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「야아아앗!? 바보야<emoji=heart04> 아아── 아아아아아아아아아～～～…………앗<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "しゅろろろろろろっ──"
translation = "슈로로로로로로옷──"

[[dialogue]]
speaker = "unk"
original = "そうして──たっぷり時間をかけて、ルヴィのおもらし絶頂は止まった。"
translation = "그렇게── 듬뿍 시간을 들여, 루비의 실례 절정은 멈췄다."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「────死にたい」"
translation = "「────죽고 싶어」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「初エッチで……彼氏の部屋で……イキすぎておもらしだなんて……」"
translation = "「첫 섹스에서…… 남자친구 방에서…… 너무 가버려서 실례라니……」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「これは夢……？\u3000夢であって。お願い……」"
translation = "「이건 꿈……? 꿈이어라. 제발……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「気にしないでいいよ。掃除すればすむから」"
translation = "「신경 쓰지 마. 청소하면 되니까」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「…………最悪だわ。貴方との、初めての……思い出が……」"
translation = "「…………최악이야. 당신과의 첫…… 추억이……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺は嬉しいよ。大好きなルヴィと繋がれたし……こんなになっちゃうくらい、感じてくれたってことだし」"
translation = "「난 기쁜걸. 정말 좋아하는 루비와 이어졌고…… 이렇게 되어버릴 정도로 느껴줬다는 거니까」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それに正直言うと、ルヴィのおもらし、偶然とはいえ見られたの……ちょっと……」"
translation = "「그리고 솔직히 말하면, 루비의 실례, 우연이긴 해도 본 거…… 조금……」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……ちょっと？」"
translation = "「……조금?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ちょっと興奮した」"
translation = "「조금 흥분했어」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「…………ばかぁっ！」"
translation = "「…………바보!」"

[[dialogue]]
speaker = "unk"
original = "アクシデントもあったけれど、そんな感じで俺とルヴィの初体験エッチは幕を閉じたのだった──"
translation = "해프닝도 있었지만, 그런 느낌으로 나와 루비의 첫 체험 섹스는 막을 내린 것이었다──"

