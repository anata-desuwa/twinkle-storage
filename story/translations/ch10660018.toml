[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「──私に『男』を教えてくれないか？」"
translation = "「──내게 '남자'를 가르쳐 주지 않겠나?」"

[[dialogue]]
speaker = "unk"
original = "浜辺での訓練のさなか、ラティエさんに想いを伝えてから数日後。"
translation = "해변에서의 훈련 도중 라티에 씨에게 마음을 전하고 며칠 뒤."

[[dialogue]]
speaker = "unk"
original = "夕暮れに沈む流星星徒会室に呼び出された俺は、そんな衝撃的なセリフを聞いた。"
translation = "해 질 녘 노을이 지는 유성 성도회실로 불려간 나는 그런 충격적인 대사를 들었다."

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「私たちは歳も立場も離れているが……それでもあの日、きみは私を女として見ていると伝えてくれただろう」"
translation = "「우리는 나이도 입장도 차이가 나지만…… 그래도 그날 자네는 나를 여자로 보고 있다고 말해주었지」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「嬉しかったよ。異性と手も繋いだことのない女に、熱い気持ちをぶつけてくれたこと」"
translation = "「기뻤어. 이성과 손도 잡아 본 적 없는 여자에게 뜨거운 감정을 부딪쳐 준 것」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「だが……その後はどうだろう。きみはなかなか手を出してくれないな？\u3000告白した時の男気はどこにいったのかな」"
translation = "「하지만…… 그 후론 어떤가. 자네는 좀처럼 손을 대 주지 않는군? 고백했을 때의 기개는 어디로 갔나」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……すみませんでした。想いを伝えていきなり、というのが軽薄に映るかと」"
translation = "「……죄송했습니다. 마음을 전하고 갑자기 그러는 건 경박해 보일까 봐」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺も、ラティエさんともっと深い仲になりたいです」"
translation = "「저도 라티에 씨와 좀 더 깊은 사이가 되고 싶습니다.」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「うん。遠慮なくぶつけてくれ、きみの想いを。今、ここでね」"
translation = "「음. 사양 말고 부딪쳐 주게, 자네의 마음을. 지금 여기서 말이야」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「…………えっ？」"
translation = "「…………네?」"

[[dialogue]]
speaker = "unk"
original = "てっきりどちらかの家へ移動するとばかり思っていたのに、どうしてこうなった……！？"
translation = "틀림없이 둘 중 한 명의 집으로 이동할 거라고만 생각했는데 대체 왜 이렇게 된 거야……!?"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「ふふっ。何を困惑しているんだ。仮にも魔王であり、星徒会長だろう。どっしりと構えてはどうかな？」"
translation = "「후후. 뭘 당황하고 있나. 명색이 마왕이자 성도회장 아닌가. 대범하게 굴어보는 건 어때?」"

[[dialogue]]
speaker = "unk"
original = "他校の星徒会室。まだ陽は落ちきっていない。誰か来るかも。見られたらとんでもないスキャンダル──"
translation = "타교의 성도회실. 아직 해는 다 지지 않았다. 누가 올지도 모른다. 들키면 엄청난 스캔들이──"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「周りの目なんて気にするな。私はそれよりも……きみが欲しい。きみのものにしてもらいたいんだ。今すぐに」"
translation = "「주변 시선 따윈 신경 쓰지 마라. 난 그보다…… 자네를 원해. 자네의 것으로 만들어 주었으면 좋겠어. 지금 당장」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「どうだろう。スタイルには気を遣っているつもりだが……きみの劣情を煽れているだろうか？」"
translation = "「어떤가. 몸매에는 신경 쓰고 있다고 생각한다만…… 자네의 열정을 부추기고 있나?」"

[[dialogue]]
speaker = "unk"
original = "はだけた戦闘服からおっぱいをこぼし、お尻をゆすって強調してくるラティエさん。"
translation = "흐트러진 전투복 사이로 가슴을 드러내고, 엉덩이를 흔들며 강조해 오는 라티에 씨."

[[dialogue]]
speaker = "unk"
original = "こんなふしだらな格好の恋人を見て、反応しないわけがない。"
translation = "이런 파렴치한 모습의 연인을 보고 반응하지 않을 리가 없다."

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「フフ。緊張している割には、すごい勃起じゃないか。きみの……」"
translation = "「후후. 긴장한 것치고는 굉장한 발기 아닌가. 자네의……」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「……っと、その。きみの、それ。どう言えばいいんだろうか？\u3000男性器、みたいな淡白な単語では、男は喜べないと聞いたことがあるぞ」"
translation = "「……아니, 그게. 자네의, 그거. 뭐라고 말하면 좋을까? 남성기 같은 담백한 단어로는 남자를 기쁘게 할 수 없다고 들은 적이 있어서 말이지」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あ、それじゃあ……」"
translation = "「아, 그럼……」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「チ、チ○ポ？\u3000なんだか恥ずかしいな。ちょっと下品な響きだが……うん。わかった……」"
translation = "「자, 자지? 왠지 부끄럽군. 조금 저속한 울림이다만…… 음. 알겠네……」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「きみのチ○ポ……とても大きくなっているぞ。私の裸を見て、勃起してくれたんだな？」"
translation = "「자네의 자지…… 무척 커져 있군. 내 알몸을 보고 발기해 준 건가?」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「安心するといい。扉の外へは、私が気を張っておく。誰か近づけば気配でわかる。だから……」"
translation = "「안심해도 좋아. 문밖으로는 내가 신경을 곤두세우고 있으니까. 누군가 접근하면 기척으로 알 수 있어. 그러니까……」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「きみのチ○ポで、白夜院ラティエを……女にして欲しい」"
translation = "「자네의 자지로, 뱌쿠야인 라티에를…… 여자로 만들어 주었으면 좋겠군」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「────ッ！」"
translation = "「────윽!」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「くぅうっ……あ、ぁ！\u3000挿入って、きたなっ……<emoji=heart04>」"
translation = "「쿠우윽…… 아, 아! 삽입해, 왔군……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「すごいな、これはっ……んん、んっ……<emoji=heart04>\u3000体の内側を、んんっ……男に、こすられる感触っ……ぁ、うぅっ<emoji=heart04>」"
translation = "「굉장하군, 이건…… 응, 윽……<emoji=heart04> 몸 안쪽을, 응윽…… 남자에게, 비벼지는 감촉…… 아, 우윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺よりもずっと年上のラティエさん。"
translation = "나보다 훨씬 연상인 라티에 씨."

[[dialogue]]
speaker = "unk"
original = "流星学園の凛々しい学園長──しかし彼女の女性器からは、つぅっと赤いしずくが伝っている。"
translation = "유성학원의 늠름한 학원장── 하지만 그녀의 보지에서는 붉은 이슬이 한 줄기 흘러내리고 있다."

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「大丈夫、心配いらない……んんっ<emoji=heart04>\u3000戦闘で傷を負うより、はるかに楽だ……」"
translation = "「괜찮아, 걱정 말게…… 응윽<emoji=heart04> 전투에서 상처를 입는 것보다 훨씬 편하군……」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「ん、んんっ……それに何だろうな、この気持ち。痛いのに心地いい……？\u3000いや、違う、か……？」"
translation = "「음, 응윽…… 그건 그렇고 이 기분은 뭘까. 아픈데도 기분 좋아……? 아니, 틀린, 건가……?」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「あぁ──わかった。嬉しいんだ、私は……<emoji=heart04>\u3000きみに貫かれたのが、とても嬉しいんだな、きっと……<emoji=heart04>」"
translation = "「아아── 알겠어. 기쁜 거야, 나는……<emoji=heart04> 자네에게 꿰뚫린 것이, 무척 기쁜 거겠지, 분명……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「んんんんっ──<emoji=heart04>\u3000ぁ、はっ……うぁ、ぁ、あっ……<emoji=heart04>」"
translation = "「으으으응──<emoji=heart04> 아, 하…… 으아, 아, 앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そんなことを言われたらもう抑えられない──俺はたまらず腰を振って、ラティエさんの中を穿っていく。"
translation = "그런 말을 들으니 더 이상 억누를 수 없다── 나는 참지 못하고 허리를 흔들며 라티에 씨의 안을 파고든다."

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「くっふぅ、ぅ、あっ<emoji=heart04>\u3000は、ぁっ、ぅ、んんっ<emoji=heart04>\u3000フフっ、い、いいぞっ、きみ<emoji=heart04>\u3000男なのだからな、そう来なくてはっ……んっ<emoji=heart04>」"
translation = "「쿠후우, 우, 앗<emoji=heart04> 하, 아앗, 우, 응윽<emoji=heart04> 후후, 조, 좋아, 자네<emoji=heart04> 남자니까 말이야, 그래야지…… 응<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「はぁ、あっ、んんっ、くぅっ……か、硬いなっ……ぅあ、あっ……きみのチ○ポっ……や、やけどしてしまいそう、だっ……ぁ、あっ<emoji=heart04>」"
translation = "「하아, 앗, 응윽, 쿠윽…… 타, 딱딱하군…… 으아, 앗…… 자네의 자지…… 데, 데어버릴 것만 같아…… 아, 앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「ど、どうだろうか。私の中は……？\u3000心地いい、かな？」"
translation = "「어, 어떤가. 내 안은……? 기분 좋은, 가?」"

[[dialogue]]
speaker = "unk"
original = "夢中でうなずく。声を出したら気が抜けて、思わず精液を漏らしてしまいそうなほどに快感が強い……！"
translation = "정신없이 고개를 끄덕인다. 소리를 내면 맥이 풀려 나도 모르게 정액을 쏟아버릴 정도로 쾌감이 강하다……!"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「んんっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふぅっ<emoji=heart04>\u3000ははっ……そんなに締め付けが、強いのか……ンン、鍛えているから、だろうか？」"
translation = "「응윽<emoji=heart04> 응<emoji=heart04> 후우<emoji=heart04> 하하…… 그렇게 조임이 강한가…… 음음, 단련하고 있어서, 그런 걸까?」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「男は、強い締まりが気持ちいいんだろう？\u3000ん、んんっ……ちょっと待ちたまえ。こう──か？」"
translation = "「남자는 강한 조임이 기분 좋다고들 하지? 음, 응윽…… 잠시 기다려 보게. 이렇게── 인가?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「うぅうっ！？」"
translation = "「우으윽!?」"

[[dialogue]]
speaker = "unk"
original = "瞬間、キュゥウゥウッ──<emoji=heart04>\u3000っと強烈に膣内の締まりが増した。根元から先端まで、膣肉がまとわりついて揉みしだかれて……！"
translation = "순간, 큐우우우우욱──<emoji=heart04> 하고 강렬하게 질 안의 조임이 더해졌다. 뿌리부터 끝까지 질 육벽이 휘감기며 비벼대서……!"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「フフ、チ○ポが震えたな？\u3000なるほど、中をこういう風に動かすと、きみを悦ばせられる、ようだな……<emoji=heart04>\u3000んんっ<emoji=heart04>」"
translation = "「후후, 자지가 떨렸군? 과연, 안을 이런 식으로 움직이면 자네를 즐겁게 해줄 수 있는 모양이군……<emoji=heart04> 응윽<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「任せろ。大切な初体験だ……きみのチ○ポ、たくさん、んっ、穴の中で、握ってやるっ……んんっ<emoji=heart04>」"
translation = "「맡겨주게. 소중한 첫 경험이다…… 자네의 자지, 듬뿍, 응, 구멍 속에서 쥐어 주겠어…… 응윽<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「んんっ、んっ！\u3000私の中を堪能してくれ……ぁ、はっ<emoji=heart04>\u3000くぅっ<emoji=heart04>\u3000もっと硬くなったぞ……？\u3000逞しいな、きみはっ……んんっ<emoji=heart04>」"
translation = "「응윽, 응! 내 안을 만끽해 주게…… 아, 하앗<emoji=heart04> 쿠윽<emoji=heart04> 더 딱딱해졌군……? 늠름하군, 자네는…… 응윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "身体能力的なセンスの素晴らしさからか。破瓜の痛みなんてもう忘れたみたいに、ラティエさんは妖艶な顔つきで膣内を搾ってくる。"
translation = "신체 능력적인 센스가 뛰어난 탓일까. 파과의 고통 따위는 벌써 잊은 듯이, 라티에 씨는 요염한 얼굴로 질 안을 짜낸다."

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「ぁっ、ぁ、あっ<emoji=heart04>\u3000き、きみっ<emoji=heart04>\u3000チ○ポをビクビク、ぁ、ぁっ<emoji=heart04>\u3000震わせないでくれっ……は、ぁっは、ぁ<emoji=heart04>」"
translation = "「아앗, 아, 앗<emoji=heart04> 자, 자네<emoji=heart04> 자지를 움찔움찔, 아, 아앗<emoji=heart04> 떨게 하지 말아 주게…… 하, 아하, 아<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「そんなに硬くされると、んっ、私まで感じてしまう、じゃないか……んん、んっ<emoji=heart04>\u3000あ、ぁあっ<emoji=heart04>\u3000あっ、あ、ぁっ<emoji=heart04>」"
translation = "「그렇게 딱딱해지면, 응, 나까지 느껴버리게 되잖아…… 응음, 응윽<emoji=heart04> 아, 아아앗<emoji=heart04> 앗, 아, 아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「ふ、ふはっ……声が、自然と出てしまう、ぅっ<emoji=heart04>\u3000そうか、私も、女性があげる、いやらしい声を、出せるのだなっ……ん、んんんっ<emoji=heart04>」"
translation = "「후, 후하…… 목소리가 자연스럽게 나와버리는군……<emoji=heart04> 그렇군, 나도 여자가 내는 야한 목소리를 낼 수 있는 거였군…… 음, 응으응<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "どこからどう見ても美しい女性なのに、何を当たり前のことを言っているのだろう、この人は。"
translation = "어디를 봐도 아름다운 여인인데, 이 사람은 대체 무엇을 당연한 듯이 말하는 걸까."

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「自慰の経験も、ほとんどないんだっ……ん、んっ<emoji=heart04>\u3000何度か、触ったが、んっ、少しも気持ちよくなかったから……ぁ、あっ<emoji=heart04>」"
translation = "「자위 경험도 거의 없어서 말이야…… 응, 응윽<emoji=heart04> 몇 번인가 만져보긴 했지만, 응, 조금도 기분 좋지 않았으니까…… 아, 앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「きみにつまらない女だと思われたらどうしようと……ふぁ、あ、あっ<emoji=heart04>\u3000んんんっ！？\u3000チ○ポ、急に、熱くっ……ぁ、あっ<emoji=heart04>」"
translation = "「자네에게 재미없는 여자라고 생각되면 어쩌나 하고…… 후아, 아, 앗<emoji=heart04> 응으응!? 자지, 갑자기 뜨거워…… 아, 앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ラティエさんは魅力的です……綺麗で……可愛いです……！」"
translation = "「라티에 씨는 매력적이에요…… 아름답고…… 귀엽습니다……!」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「んんんっ<emoji=heart04>\u3000ありがとう、フフ、嬉しいぞっ……んんっ！<emoji=heart04>」"
translation = "「응으응<emoji=heart04> 고맙네, 후후, 기쁘군…… 응윽!<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「きみもっ……素敵だっ……あ、ぁっ……<emoji=heart04>\u3000もっと突いてくれ、私で気持ちよく、なってくれっ<emoji=heart04>」"
translation = "「자네도…… 멋지다네…… 아, 아앗……<emoji=heart04> 좀 더 찔러주게, 나로 기분 좋아져 주게<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ラティエさんの足を掴み、お尻をたわませるほどに深くぶちこみながら、唇も奪う。"
translation = "라티에 씨의 다리를 붙잡고 엉덩이가 휠 정도로 깊숙이 박아넣으며 입술도 빼앗는다."

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「んぅぢゅるる<emoji=heart04>\u3000んぢゅるっ、れぇえっ<emoji=heart04>\u3000ちゅるっ、ちゅぅ、ちゅぱっ、れぇ、れろっ<emoji=heart04>」"
translation = "「응우쥬르르<emoji=heart04> 응쥬릅, 레에에<emoji=heart04> 츄릅, 츄우, 츄파, 레에, 레로<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「んちゅぅっ……ふはぁっ<emoji=heart04>\u3000行為中の、深いキスは、すごいなっ……<emoji=heart04>\u3000ふしだらだが、心地いいっ……もっと、したいぞ、きみ<emoji=heart04>」"
translation = "「응츄우…… 후하아<emoji=heart04> 행위 중의 깊은 키스는 굉장하군……<emoji=heart04> 음탕하지만 기분 좋아…… 더 하고 싶군, 자네<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「れぇえっ<emoji=heart04>\u3000んぢゅぅるっ、れろ、れちゃ<emoji=heart04>\u3000んちゅる、じゅるちゅるっ<emoji=heart04>\u3000んちゅるぅっ<emoji=heart04>\u3000ちゅる、ちゅぱ、れぇええ～っ<emoji=heart04>」"
translation = "「레에에<emoji=heart04> 응쥬우릅, 레로, 레챠<emoji=heart04> 응츄릅, 쥬릅츄릅<emoji=heart04> 응츄르윽<emoji=heart04> 츄르, 츄파, 레에에에~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "深い口付けを交わすたび、ラティエさんの中がとろとろと濡れそぼっていく。締まりの強さはそのままに、ぬかるむ感じ。"
translation = "깊은 입맞춤을 나눌 때마다 라티에 씨의 안이 걸쭉하게 젖어 들어간다. 조임의 강도는 그대로이되 질퍽해지는 느낌."

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「んちゅぅっ──ぷぁ<emoji=heart04>\u3000きみの嬉しそうな顔……もっと見せてくれ。私の中で感じている顔が、とても、愛おしい……<emoji=heart04>」"
translation = "「응츄윽── 푸하<emoji=heart04> 자네의 기뻐 보이는 얼굴…… 더 보여주게. 내 안에서 느끼고 있는 얼굴이 무척 사랑스러워……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「私は……行為中のキスが、とても好きみたいだ……は、ぁっ<emoji=heart04>\u3000ほ、他の者には内緒だからな？」"
translation = "「나는…… 행위 중의 키스가 무척 좋은 모양이야…… 하, 앗<emoji=heart04> 다, 다른 이들에겐 비밀이니까?」"

[[dialogue]]
speaker = "unk"
original = "誰にも言うわけがない。この人の、こんな姿を見ていいのは俺だけだ──そんな思いを込めて、さらに奥までラティエさんを犯した。"
translation = "누구에게 말할 리가 없다. 이 사람의 이런 모습을 봐도 되는 건 나뿐이다── 그런 마음을 담아 더욱 깊숙이 라티에 씨를 범했다."

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「ぁ、あ、あぁっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000んんぁっ<emoji=heart04>\u3000ぁ、あ、あ、あ、あっ<emoji=heart04>\u3000あっ……はぁああっ<emoji=heart04>」"
translation = "「아, 아, 아아앗<emoji=heart04> 후우윽<emoji=heart04> 응으아앗<emoji=heart04> 아, 아, 아, 아, 앗<emoji=heart04> 앗…… 하아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「なんだ、きみっ……まだ男らしく、なれるのかっ……ふ、ふふっ<emoji=heart04>\u3000かっこいいな、ぅあ、あ、あっ……<emoji=heart04>」"
translation = "「뭐냐, 자네…… 아직 더 남자다워질 수 있는 건가…… 후, 후후<emoji=heart04> 멋지군, 으아, 아, 앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「チ○ポがっ、深いところまでぐりぐりっ……んぁっ<emoji=heart04>\u3000ふぅっ<emoji=heart04>\u3000んんんっ<emoji=heart04>\u3000んんぁっ、ぁっぁっ、はぁあ、あああっ<emoji=heart04>」"
translation = "「자지가, 깊은 곳까지 구리구리…… 응아앗<emoji=heart04> 후우윽<emoji=heart04> 응으응윽<emoji=heart04> 응으아앗, 아앗아앗, 하아아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ラティエさんの声量がぐんと増す。先ほどよりも感じてくれているのは嬉しいのだけど、誰かが来てしまうかもしれない。"
translation = "라티에 씨의 목소리가 부쩍 커진다. 아까보다 느껴주는 것은 기쁘지만, 누군가 와버릴지도 모른다."

[[dialogue]]
speaker = "unk"
original = "思わずピストンを緩めてしまいそうになったけれど──"
translation = "나도 모르게 피스톤을 늦출 뻔했지만──"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「もっと<emoji=heart04>\u3000もっとだっ<emoji=heart04>\u3000きみ、もっとしてくれっ、あ、ぁ、ああ、あっ<emoji=heart04>\u3000きみの気持ちを、たくさん、ぶつけて欲しいんだっ……！<emoji=heart04>」"
translation = "「더<emoji=heart04> 더다<emoji=heart04> 자네, 더 해주게, 아, 아, 아아, 앗<emoji=heart04> 자네의 마음을 듬뿍 부딪쳐 주길 원해……!<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "こんなことを言われてしまったら、無理だ。"
translation = "이런 말을 들어버린다면 무리다."

[[dialogue]]
speaker = "unk"
original = "それにラティエさんが、外の警戒はしてくれるとも言ってくれた。だから俺は──快感をむさぼるために思いきり腰を打ち付ける。"
translation = "게다가 라티에 씨가 밖의 경계는 해주겠다고도 했다. 그러니 나는── 쾌감을 탐하기 위해 힘껏 허리를 쳐올린다."

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「ふうぅあ、あ、あ、あぁ、あっ<emoji=heart04>\u3000いいぞっ、んんっ、すごくいいっ……もっとだ、もっとしてくれっ、んぁ、あ、あ、ぁっ<emoji=heart04>」"
translation = "「후우으아, 아, 아, 아아, 앗<emoji=heart04> 좋아, 응윽, 무척 좋아…… 더다, 더 해주게, 응아, 아, 아, 앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「私が、きみの女だということを、刻み付けて、くれっ……あ、あ、ぁっ<emoji=heart04>\u3000ん、くぅうっ──そこ、イイ、あ、ぁっ、ああ<emoji=heart04>」"
translation = "「내가 자네의 여자라는 것을 새겨주게…… 아, 아, 앗<emoji=heart04> 응, 쿠우윽── 거기, 좋아, 아, 앗, 아아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ピストンするたびに悩ましく揺れるラティエさんのおっぱいを掴み、乱暴に揉みしだく。力加減なんてできないほどに、俺は興奮していた。"
translation = "피스톤 할 때마다 요염하게 흔들리는 라티에 씨의 가슴을 움켜잡고 난폭하게 주무른다. 힘 조절 따위 할 수 없을 정도로 나는 흥분해 있었다."

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「んんんっ！<emoji=heart04>\u3000あ、ぁっ<emoji=heart04>\u3000フフっ……いいぞ、もっとがっついてくれっ……きみの女なんだ、遠慮するなっ……！<emoji=heart04>」"
translation = "「응으응윽!<emoji=heart04> 아, 앗<emoji=heart04> 후후…… 좋아, 더 탐욕스럽게 굴어주게…… 자네의 여자다, 사양 마라……!<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「はぁ、あ、あっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000胸も、い、いいなっ<emoji=heart04>\u3000剣を振るのに邪魔だとばかり、思っていたがっ……んぁあっ<emoji=heart04>」"
translation = "「하아, 아, 앗<emoji=heart04> 응윽<emoji=heart04> 가슴도, 조, 좋군<emoji=heart04> 검을 휘두르는 데 방해만 된다고 생각했다만…… 응아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「きみに触られて、わかったっ<emoji=heart04>\u3000ぁ、あっ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000もっとして、くれ<emoji=heart04>\u3000んんんっ<emoji=heart04>\u3000ぁ、ああ、ぁあっ<emoji=heart04>」"
translation = "「자네에게 만져지고서야 알았어<emoji=heart04> 아, 앗<emoji=heart04> 기분 좋아<emoji=heart04> 더 해줘<emoji=heart04> 응으응윽<emoji=heart04> 아, 아아, 아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "体のどこを触っても、ラティエさんは喜んでくれる。"
translation = "몸 어디를 만져도 라티에 씨는 기뻐해 준다."

[[dialogue]]
speaker = "unk"
original = "こんな誘われ方をされたら、男なら誰だって……もっと欲しい、犯したいと思って当然だった。"
translation = "이런 유혹을 받는다면 남자라면 누구라도…… 더 원하고, 범하고 싶다고 생각하는 게 당연했다."

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「うぁ、あああっ<emoji=heart04>\u3000あっあっあっ、あっあっあっあっ<emoji=heart04>」"
translation = "「으아, 아아앗<emoji=heart04> 앗앗앗, 앗앗앗앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「ペースが、んんっ、速くなった、なっ？<emoji=heart04>\u3000これは、あれか、きみが果てる準備をしてる、のかっ……？<emoji=heart04>」"
translation = "「페이스가, 응윽, 빨라졌군? <emoji=heart04> 이건 그건가, 자네가 끝낼 준비를 하고 있는 건가……? <emoji=heart04>」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「んんんっ──ぁ、あ、あぁあっ<emoji=heart04>\u3000いいぞ、いつでもいいっ……んぁ、あ、あぁあっ<emoji=heart04>\u3000ふぅ、ぁあっ<emoji=heart04>」"
translation = "「응으응윽── 아, 아, 아아앗<emoji=heart04> 좋아, 언제라도 좋네…… 응아, 아, 아아앗<emoji=heart04> 후우, 아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「きみのチ○ポ、最後まで、ずっと私の中で、感じさせてやる……！\u3000いいか、抜くなよ、絶対だぞ……！<emoji=heart04>」"
translation = "「자네의 자지, 마지막까지 계속 내 안에서 느끼게 해주겠어……! 알겠나, 빼지 마라, 절대다……! <emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それって……」"
translation = "「그건……」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「外に出すと、怒る……そう言ったんだっ<emoji=heart04>\u3000ぁ、あ、あっ<emoji=heart04>\u3000遠慮は嫌いだ、最後まで犯してくれ──んんんっ！<emoji=heart04>」"
translation = "「밖에 내보내면 화낼 거다…… 그렇게 말한 거다<emoji=heart04> 아, 아, 앗<emoji=heart04> 사양은 싫다, 마지막까지 범해다오── 응으응윽! <emoji=heart04>」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「んれぇっ<emoji=heart04>\u3000んちゅ<emoji=heart04>\u3000ちゅぅ<emoji=heart04>\u3000ちゅぱっ<emoji=heart04>\u3000んちゅるるっ<emoji=heart04>\u3000ちゅう、ちゅぱ、れろぉっ<emoji=heart04>」"
translation = "「응레에<emoji=heart04> 응츄<emoji=heart04> 츄우<emoji=heart04> 츄파<emoji=heart04> 응츄르르<emoji=heart04> 츄우, 츄파, 레로오<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "射精までのわずかな時間、少しでも心地よくなりたくてラティエさんと口付けを交わす。"
translation = "사정까지의 짧은 시간, 조금이라도 기분 좋아지고 싶어 라티에 씨와 입맞춤을 나눈다."

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「んちゅぅ、これ、本当にっ……んちゅぅる、好きだっ<emoji=heart04>\u3000んんんっ<emoji=heart04>\u3000ずっとしていたい、な……<emoji=heart04>」"
translation = "「응츄우, 이거 정말로…… 응츄우르, 좋아<emoji=heart04> 응으응윽<emoji=heart04> 계속 하고 싶군…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "キスするたびに濡れそぼっていく女性器に、夢中でペニスを出し入れし……"
translation = "키스할 때마다 젖어 들어가는 보지에 정신없이 페니스를 들락거리고……"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「んちゅるう、ちゅう、ちゅるうっ、んちゅる、ん、んんっ<emoji=heart04>\u3000いいぞ、出して、くれっ……ぜんぶっ……<emoji=heart04>」"
translation = "「응츄르우, 츄우, 츄르우, 응츄르, 응, 응윽<emoji=heart04> 좋아, 내보내 주게…… 전부…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ぞくぞくっ──と震えの起こったペニスが限界であることを、ラティエさんに見抜かれてしまった。"
translation = "조금씩 떨림이 일어난 페니스가 한계라는 것을 라티에 씨에게 간파당하고 말았다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「出し──ます。ぜんぶ、中でっ……！」"
translation = "「내보낼── 게요. 전부, 안에서……!」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「ああっ、出せ、出せっ……全部出せっ……<emoji=heart04>\u3000私の、ぁ、あっ<emoji=heart04>\u3000一番奥で、ぜんぶっ……！<emoji=heart04>」"
translation = "「아앗, 내보내, 내보내…… 전부 내보내게…… <emoji=heart04> 내, 아, 앗<emoji=heart04> 가장 안쪽에서, 전부……! <emoji=heart04>」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「んんんんっ<emoji=heart04>\u3000ぁああ、ぁ、あぁあっ<emoji=heart04>\u3000あ、ぁ、あっ<emoji=heart04>\u3000好きだっ……好きだっ……来てくれっ、私に、出せ、ぜんぶっ……！<emoji=heart04>」"
translation = "「응으으으응<emoji=heart04> 아아아, 아, 아아앗<emoji=heart04> 아, 아, 앗<emoji=heart04> 좋아해…… 좋아해…… 와주게, 나에게, 내보내, 전부……! <emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「う──ぁ、ああっ！」"
translation = "「으── 아, 아앗!」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「んんぁっ……！<emoji=heart04>\u3000あ、あ、あぁあっ……！<emoji=heart04>\u3000はあぁああぁあ～～～っ……！<emoji=heart04>」"
translation = "「응으아앗……! <emoji=heart04> 아, 아, 아아앗……! <emoji=heart04> 하아아아아아아~~~앗……! <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "腰が抜けるほどの快感とともに、ラティエさんの膣内に大量の精を放った。"
translation = "허리가 빠질 정도의 쾌감과 함께 라티에 씨의 질 안에 대량의 정액을 쏟아냈다."

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「んんんっ<emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000ぁ、あっ……これが、男の射精っ……<emoji=heart04>\u3000は、ははっ……す、すごいっ……勢い、だっ……なっ<emoji=heart04>」"
translation = "「응으응윽<emoji=heart04> 응으윽<emoji=heart04> 아, 앗…… 이것이 남자의 사정…… <emoji=heart04> 하, 하하…… 대, 대단한…… 기세구……나<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「んっ、ふぅうっ……んんんっ<emoji=heart04>\u3000ぁ、な、なんだ、これっ……ぁ、あっ……へその裏が、あっ……ゾクゾク、し──てっ……<emoji=heart04>」"
translation = "「응, 후우우윽…… 응으응윽<emoji=heart04> 아, 뭐, 뭐야 이건…… 아, 앗…… 배꼽 뒤쪽이, 앗…… 움찔움찔, 해──서…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「んんっ──くっ──ふぅ、ぅうぅぅうう～～っ……<emoji=heart04>」"
translation = "「응윽── 윽── 후우, 우우우우우우우~~윽…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ラティエさんの体がぎゅうっと硬直して、射精を終えたばかりのペニスが心地よく締め付けられる。"
translation = "라티에 씨의 몸이 꽉 하고 경직되며, 사정을 마친 참인 페니스가 기분 좋게 조여진다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ラティエさんっ、うぁ、ちょっと緩めてっ──！」"
translation = "「라티에 씨, 으아, 잠깐 힘 좀 빼줘요──!」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「む、無理だ、ぁっ……あ、ぁっ<emoji=heart04>\u3000気持ちいいのが、んぁ、止まらなっ……ぁ、ああ、ぁあ～～……っ！<emoji=heart04>」"
translation = "「무, 무리다, 앗…… 아, 앗<emoji=heart04> 기분 좋은 게, 응아, 멈추질 않…… 아, 아아, 아아~~……앗! <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その痙攣は長く、十数秒以上も続いて──ようやく力の抜けた膣内から、俺のペニスがこぼれ出た。"
translation = "그 경련은 길어 십수 초 이상이나 계속되었고── 이윽고 힘이 빠진 질 내부에서 내 페니스가 빠져나왔다."

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「はぁああーっ……はぁああーっ……ふぅううっ……ふぅうううーっ……<emoji=heart04>」"
translation = "「하아아아──앗…… 하아아아──앗…… 후우우우윽…… 후우우우우──윽…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「はぁ、あっ……んんっ……フフ<emoji=heart04>\u3000あれが、絶頂、というやつかな……？\u3000すごいんだな、頭の中が真っ白になって、体の制御が利かなかった……」"
translation = "「하아, 앗…… 응윽…… 후후<emoji=heart04> 저것이 절정이라는 녀석일까……? 대단하군, 머릿속이 하얘져서 몸 제어가 안 됐어……」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「きみの精液が、注ぎ込まれている……と思った瞬間、津波みたいにやってきて……はぁっ……ふぅうっ……<emoji=heart04>」"
translation = "「자네의 정액이 쏟아져 들어온다……고 생각한 순간, 쓰나미처럼 몰려와서…… 하아…… 후우윽…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……その、すごく可愛い声、でした」"
translation = "「……그, 무척 귀여운 목소리였어요」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「そ、そういう風に言われると、流石の私も恥ずかしいんだが……？」"
translation = "「그, 그런 식으로 말하면 아무리 나라도 부끄럽다만……?」"

[[dialogue]]
speaker = "unk"
original = "そう言ってはにかみながら、お互い、汗だくになったまま見つめあう。"
translation = "그렇게 말하며 수줍게 웃으며 서로 땀범벅이 된 채 바라본다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「嬉しいです、俺。ラティエさんと繋がれて……」"
translation = "「기뻐요, 저. 라티에 씨와 이어져서……」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「私もだ。フフ……しかし、この行為は考えものだな。あまりに心地よいから、多少の気配が近づいてきても、静止する気が薄れてしまう」"
translation = "「나도다. 후후…… 하지만 이 행위는 좀 생각해 봐야겠군. 너무나 기분 좋아서, 약간의 기척이 다가와도 멈추고 싶은 마음이 옅어져 버려」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「きみがピストンを速める前に、一度誰かが通ったようだったが……バレずにすんでホッとしたよ……」"
translation = "「자네가 피스톤을 빠르게 하기 전에 한 번 누군가 지나간 것 같았다만…… 들키지 않고 끝나서 다행이야……」"

[[dialogue]]
speaker = "unk"
original = "…………。"
translation = "…………."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──えぇえっ！？\u3000誰かが廊下を歩いていたらセックスはやめるって言ったじゃないですか！？」"
translation = "「──에에에엣!? 누군가 복도를 걸어가면 섹스는 그만둔다고 했잖아요!?」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「む、そうだったか？\u3000はっはっ、大丈夫だ。この星徒会室は壁が厚い。少しでも音が漏れていたら、あの足音にもよどみが出るだろう？」"
translation = "「음, 그랬던가? 하하, 괜찮아. 이 성도회실은 벽이 두꺼워. 조금이라도 소리가 샜다면 그 발소리에도 동요가 생겼겠지?」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「何の異常にも気づいていない、実に自然な足取りだった。問題なさそうだから言わないでおいたんだ」"
translation = "「아무런 이상도 깨닫지 못한 실로 자연스러운 발걸음이었어. 문제없을 것 같아서 말하지 않은 거다」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「せっかくの行為中に止めてしまうだなんて、無粋だろう？」"
translation = "「모처럼의 행위 중에 멈춰버리는 건 멋없지 않나?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そういう問題じゃないですよラティエさん！！\u3000バレたら本当にシャレにならないですって！」"
translation = "「그런 문제가 아니잖아요 라티에 씨!! 들키면 정말 장난 아니라고요!」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「まぁまぁ、そういきり立つものではないよ。バレなかったんだからいいじゃないか──な？」"
translation = "「자자, 그렇게 화내지 말게. 안 들켰으니까 된 거 아닌가── 응?」"

[[dialogue]]
speaker = "unk"
original = "大らかで細かいことを気にしない、ラティエさんらしい言い分だなと思いつつも──"
translation = "너그럽고 세세한 것을 신경 쓰지 않는 라티에 씨다운 주장이라고 생각하면서도──"

[[dialogue]]
speaker = "unk"
original = "次にする時は、必ずちゃんと鍵のかかるホテルでしよう──そう思うのだった。"
translation = "다음에 할 때는 반드시 제대로 열쇠가 걸리는 호텔에서 하자── 그렇게 생각하는 것이었다."

