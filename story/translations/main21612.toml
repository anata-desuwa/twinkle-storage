[[dialogue]]
speaker = "unk"
original = "第１２話,世界を滅ぼす力なれど,B"
translation = "제12화, 세계를 멸망시킬 힘일지라도, B"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……もう自分を取り戻すことなんて、できないと思ってた」"
translation = "「……이제 자신을 되찾는 일 따위, 할 수 없을 거라 생각했어」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「でも……ネビュラの皆を見て、リノを見て……ほんのわずかだけど、自分を取り戻すことができた……」"
translation = "「하지만…… 네뷸라의 모두를 보고, 리노를 보고…… 아주 조금이지만, 자신을 되찾을 수 있었어……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「君にコンタクトを取ろうと必死で……だから嫌なもの、見せちゃったな……すまない」"
translation = "「너에게 컨택트하려고 필사적이었어…… 그래서 싫은 걸 보여줘 버렸네…… 미안해」"

[[dialogue]]
speaker = "unk"
original = "『ベガの俺』はずっと、願っていた。"
translation = "『베가의 나』는 계속 바라고 있었다."

[[dialogue]]
speaker = "unk"
original = "みんなに会いたい。"
translation = "모두를 만나고 싶어."

[[dialogue]]
speaker = "unk"
original = "もう一度、愛しい家族に会いたいと──"
translation = "다시 한번, 사랑하는 가족을 만나고 싶다고──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「…………っ」"
translation = "「…………윽」"

[[dialogue]]
speaker = "unk"
original = "──そこに付け込まれ、ディザスターハンドにされてしまった。"
translation = "──그 마음을 이용당해, 디재스터 핸드가 되어버렸다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……どうして君が泣くんだ？」"
translation = "「……어째서 네가 우는 거야?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「君は……『俺』だから」"
translation = "「너는…… 『나』니까」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「見つけたぞ、緋宮クロト」"
translation = "「찾았다, 히노미야 쿠로토」"

[[dialogue]]
speaker = "unk"
original = "──あの時。梨緒が駆けつけてくれなかったら。"
translation = "──그때. 리오가 달려와 주지 않았다면."

[[dialogue]]
speaker = "unk"
original = "俺はヴィーナスを、マトイを、サーシャさんを、アナを……愛しい人達をこの手で──"
translation = "나는 비너스를, 마토이를, 사샤 씨를, 아나를…… 사랑하는 사람들을 이 손으로──"

[[dialogue]]
speaker = "unk"
original = "だから『ベガの俺』に起きたことは、どうしても他人事に思えなかった──"
translation = "그래서 『베가의 나』에게 일어난 일은, 도저히 남 일처럼 느껴지지 않았다──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……そっか。でも、俺に同情してもらう資格なんてない」"
translation = "「……그렇구나. 하지만, 나에겐 동정받을 자격 따위 없어」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺は何もできなかった……それどころか、守るべき世界を滅ぼした……」"
translation = "「나는 아무것도 하지 못했어…… 그뿐만 아니라, 지켜야 할 세계를 멸망시켰어……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「でも……本当は違う。みんなを守りたかった……」"
translation = "「하지만…… 사실은 아냐. 모두를 지키고 싶었어……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「みんなの笑顔を……大切な人を、世界を守りたいだけだった……そうだろ？」"
translation = "「모두의 미소를…… 소중한 사람을, 세계를 지키고 싶었을 뿐이었어…… 그렇지?」"

[[dialogue]]
speaker = "unk"
original = "……ベガの俺。厄災の右腕。ディザスターハンド──彼を救うことは、できないのか？"
translation = "……베가의 나. 재앙의 오른팔. 디재스터 핸드── 그를 구할 수는 없는 걸까?"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……変な感じだな。もしも立場が逆だったなら、きっと俺も、今の君と同じことを考えた気がする……」"
translation = "「……이상한 기분이네. 만약 입장이 반대였다면, 분명 나도 지금의 너와 같은 생각을 했을 것 같아……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ありがとう──アルタイルの『俺』」"
translation = "「고마워── 알타이르의 『나』」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「でも、慰めてもらうために来たわけじゃないんだ──」"
translation = "「하지만, 위로받으러 온 게 아니야──」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネL"
speaker_translation = "할로우 루비네 L"
original = "「もういいでしょう。他の星騎士と同様に、抵抗なんてやめてしまいなさい」"
translation = "「이제 됐겠죠. 다른 성기사들과 마찬가지로, 저항 따윈 그만두세요」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「誰が……やめる、ものか！！」"
translation = "「누가…… 그만둘, 줄 알고!!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「梨緒……もう１度、力を渡すわ……」"
translation = "「리오…… 다시 한번, 힘을 보낼게……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「すまない……だがルヴィネ。君ももう、限界のはずだ……これ以上無理をするな……」"
translation = "「미안하다…… 하지만 루비네. 너도 이미 한계일 터…… 더 이상 무리하지 마라……」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……最期まで戦わせて。このまま膝を折ったら、魔王とテルルに、顔向けできないわ……」"
translation = "「……마지막까지 싸우게 해줘. 이대로 무릎을 꿇으면, 마왕과 테루루를 볼 낯이 없어……」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「せめて潔く、という考えはどうしても持てないようね。ならば最期まで醜く足掻くといい」"
translation = "「적어도 품위 있게, 라는 생각은 도저히 가질 수 없는 모양이네. 그렇다면 마지막까지 추하게 발버둥 치도록 해」"

[[dialogue]]
speaker = "unk"
original = "ホロウ・ルヴィネの纏う霊力がさらに膨れ上がる。梨緒は、数瞬先の因果を見通し、手立てを探すが──"
translation = "홀로우 루비네가 두른 영력이 더욱 부풀어 오른다. 리오는 수 순간 앞의 인과를 꿰뚫어 보며 수단을 찾지만──"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（これはダメ──あれもダメ──ああ、こっちもダメだ──！！）"
translation = "(이건 안 돼── 저것도 안 돼── 아아, 이쪽도 안 돼──!! 코)"

[[dialogue]]
speaker = "unk"
original = "絶命を避ける因果を辿れない。ノルンの力をもってしても挽回ができない。"
translation = "절명을 피할 인과를 찾을 수 없다. 노른의 힘을 가지고서도 만회할 수 없다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（だが、もう目は逸らさない……エリシア、フィオナ）"
translation = "(하지만, 이제 눈은 돌리지 않아…… 엘리시아, 피오나)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（君たちと同じく、私も足掻こう──この心臓が止まらぬ限り──）"
translation = "(너희와 마찬가지로, 나도 발버둥 치겠어── 이 심장이 멈추지 않는 한──)"

[[dialogue]]
speaker = "unk"
original = "その様子を『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』は見下ろす。予定よりも数千年以上も伸びた森羅歴が、とうとう終わる。"
translation = "그 모습을 『<ruby>XELOS<rt>제로스</rt></ruby>』는 내려다본다. 예정보다 수천 년이나 늘어난 삼라력이 드디어 끝난다."

[[dialogue]]
speaker = "unk"
original = "次は今よりももっと進化、成長した世界となることだろう。"
translation = "다음은 지금보다 훨씬 진화하고 성장한 세계가 될 것이다."

[[dialogue]]
speaker_original = "ＸＥＬＯＳ"
speaker_translation = "제로스"
original = "「……………………」"
translation = "「……………………」"

[[dialogue]]
speaker = "unk"
original = "だが１点の気がかりがぬぐえない。"
translation = "하지만 한 가지 마음에 걸리는 점을 지울 수 없다."

[[dialogue]]
speaker = "unk"
original = "動きを止めたディザスターハンドのことだけが、理解不能だった──"
translation = "움직임을 멈춘 디재스터 핸드만은 이해 불가능이었다──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「魂は、他者のものでは代替が利かないんだろう？」"
translation = "「영혼은 타인의 것으로 대체할 수 없는 거지?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「でも──俺の魂ならどうかな」"
translation = "「하지만── 나의 영혼이라면 어떨까」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「…………！」"
translation = "「…………!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「平行世界の同一存在なら、失われたアルタイルの『俺』の魂を代替できるはずだ。違うか、守護天使ラクシャ？」"
translation = "「평행세계의 동일 존재라면, 잃어버린 알타이르의 『나』의 영혼을 대체할 수 있을 거다. 아닌가, 수호천사 락샤?」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「……そんなことをしたら、ベガのキミが代わりに死ぬよ？\u3000たった１つの、キミの最後の持ち物だ」"
translation = "「……그런 짓을 하면, 베가의 네가 대신 죽는다고? 단 하나뿐인, 너의 마지막 소유물이야」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……構わない。俺の悲願は、もう叶えられた」"
translation = "「……상관없어. 나의 비원은 이미 이루어졌어」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「リノや<ruby>セドナ<rt>母さん</rt></ruby>……生きているネビュラのみんなをもう一度、見ることができた……」"
translation = "「리노나 <ruby>세도나<rt>어머니</rt></ruby>…… 살아있는 네뷸라의 모두를 다시 한번 볼 수 있었어……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「彼女たちが生き残る可能性と、出会うことができた……だから今度こそ、<b>家族</b>を守りたい」"
translation = "「그녀들이 살아남을 가능성과 만날 수 있었어…… 그러니까 이번에야말로 <b>가족</b>을 지키고 싶어」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それに、俺が意識を保てていることだって、いま一時のことにすぎない……」"
translation = "「게다가 내가 의식을 유지하고 있는 것도 지금 한때일 뿐이야……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「時間が経てば、また俺は瘴気に飲まれることになる。もう、誰も殺したくないんだ……」"
translation = "「시간이 지나면 다시 나는 장기에 삼켜지게 돼. 더 이상 누구도 죽이고 싶지 않아……」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「だけど……失った緋宮クロトの魂を補填したとしても、『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』には敵わないよ……」"
translation = "「하지만…… 잃어버린 히노미야 쿠로토의 영혼을 보충한다 해도, 『<ruby>XELOS<rt>제로스</rt></ruby>』에겐 대적할 수 없어……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。だから魂だけじゃなく、もう１つ託したいんだ」"
translation = "「아아. 그래서 영혼뿐만 아니라, 하나 더 맡기고 싶어」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺の……厄災の力を」"
translation = "「나의…… 재앙의 힘을」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「…………！！」"
translation = "「…………!!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「瘴気にまみれきったリクリエの力。ベガを丸ごと飲み込み、１つの世界を完全に破壊、掌握した力」"
translation = "「장기로 가득 찬 리크리에의 힘. 베가를 통째로 집어삼키고, 하나의 세계를 완전히 파괴, 장악한 힘」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だけど……その出力だけは、保証する」"
translation = "「하지만…… 그 출력만큼은 보증하지」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「そんなものを呑み込んだら、アルタイルの彼まで同じ末路を──」"
translation = "「그런 걸 삼켰다간, 알타이르의 그까지 똑같은 말로를──」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いや、問題ない。偶然生まれた、奇跡みたいなこの瞬間なら話は別なんだ」"
translation = "「아니, 문제없어. 우연히 태어난 기적 같은 이 순간이라면 이야기가 달라져」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──そうか！！\u3000『俺たち』には、メルエルのアルケインコードがある──」"
translation = "「──그렇군!! 『우리』에겐 멜엘의 아르케인 코드가 있어──」"

[[dialogue]]
speaker = "unk"
original = "俺は<ruby>掌<rt>てのひら</rt></ruby>に、メルエルから天界で受け取ったコードを輝かせる。"
translation = "나는 손바닥에 멜엘로부터 천계에서 받은 코드를 빛낸다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「『アルケインカオスクエーサー』──魔王という器が取り込んでしまった異物を、自らの力に変換する術式！」"
translation = "「『아르케인 카오스 퀘이서』── 마왕이라는 그릇이 거두어 버린 이물을 자신의 힘으로 변환하는 술식!」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「そんなの。浄化しきれるかどうか、わからない……！」"
translation = "「그런 거. 다 정화할 수 있을지 없을지 모른다고……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「大丈夫だ、環。ベガの過去で、ディザスターハンドに<ruby>変化<rt>へんげ</rt></ruby>してしまった時……ベガのメルエルが、何かを施そうとしていたのが見えた！」"
translation = "「괜찮아, 타마키. 베가의 과거에서 디재스터 핸드로 변화해버렸을 때…… 베가의 멜엘이 무언가를 하려 했던 게 보였어!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ベガの『俺』、あるんだな……！\u3000そちらの世界のアルケインコードが！！」"
translation = "「베가의 『나』, 있는 거지……! 그쪽 세계의 아르케인 코드가!!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。俺の中に……姫咲さんの遺した力が、間違いなくある」"
translation = "「아아. 내 안에…… 히메사키 씨가 남긴 힘이 확실히 있어」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「姫咲さんは死の間際、俺を──ディザスターハンドを浄化しようとしたわけじゃない」"
translation = "「히메사키 씨는 죽기 직전, 나를── 디재스터 핸드를 정화하려 했던 게 아니야」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「彼女は『アルケインカオスクエーサー』を使っても、どうにもならないことをわかっていた……」"
translation = "「그녀는 『아르케인 카오스 퀘이서』를 써도 어찌할 수 없다는 걸 알고 있었어……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──だからあの子は、自身の存在をすべて霊力に変換して『アルケインカオスクエーサー』にコードを書き足したんだ」"
translation = "「──그래서 그 아이는 자신의 존재를 모두 영력으로 변환해 『아르케인 카오스 퀘이서』에 코드를 덧쓴 거야」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「今ではない、いつかの勝利のため──自分と同等か、それ以上の魔王の力による働きかけがあった時に初めて発動するように──」"
translation = "「지금이 아닌, 언젠가의 승리를 위해── 자신과 대등하거나 그 이상의 마왕의 힘에 의한 작용이 있을 때 비로소 발동하도록──」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「これ単体では何もすることができないが、外からの大きな働きかけがあれば、本来の出力とは比較にもならない浄化の力を発揮する」"
translation = "「이것 단체로는 아무것도 할 수 없지만, 외부로부터의 커다란 작용이 있다면 본래의 출력과는 비교도 되지 않는 정화의 힘을 발휘해」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「『だからきっと、なんとかなるよ』って……それが、姫咲さんが俺に遺してくれたすべてだ」"
translation = "「『그러니까 분명 어떻게든 될 거야』라고…… 그것이 히메사키 씨가 나에게 남겨준 전부야」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「……内と外、両側から同時にアルケインコードを使用する……そういうこと？」"
translation = "「……안과 밖, 양쪽에서 동시에 아르케인 코드를 사용한다…… 그런 거야?」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「ベガの緋宮クロトを堕とした、リクリエの瘴気のみを祓うことができれば……２つの世界の魔王の力を束ねることも、あるいは……？」"
translation = "「베가의 히노미야 쿠로토를 타락시킨 리크리에의 장기만을 씻어낼 수 있다면…… 두 세계의 마왕의 힘을 묶는 것도, 어쩌면……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「アルタイルの『俺』……どうか、頼む」"
translation = "「알타이르의 『나』…… 부디, 부탁해」"

[[dialogue]]
speaker = "unk"
original = "ベガの『俺』が掲げた掌に、俺もぴったりと掌を合わせる。"
translation = "베가의 『나』가 들어 올린 손바닥에 나도 딱 맞춰 손바닥을 마주한다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「世界を壊してしまった、そんな呪いの力でよければ……全てを君に託したい」"
translation = "「세계를 부수고 만 그런 저주의 힘이라도 괜찮다면…… 모든 것을 너에게 맡기고 싶어」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「今度こそ、俺が本当に守りたかったみんなのことを──守ってほしい」"
translation = "「이번에야말로 내가 정말 지키고 싶었던 모두를── 지켜줘」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「誓うよ、ベガの『俺』」"
translation = "「맹세할게, 베가의 『나』」"

[[dialogue]]
speaker = "unk"
original = "世界を滅ぼすほどの力であるのなら──"
translation = "세계를 멸망시킬 정도의 힘이라면──"

[[dialogue]]
speaker = "unk"
original = "きっと世界を守ることだって、できるはずだから──"
translation = "분명 세계를 지키는 것 또한 가능할 터이니까──"

[[dialogue]]
speaker = "unk"
original = "だから、行こう……！！"
translation = "그러니까, 가자……!!"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「「──アルケイン・カオスクエーサー！！」」"
translation = "「「──아르케인 카오스 퀘이서!!」」"

[[dialogue]]
speaker_original = "厄災の右腕"
speaker_translation = "재앙의 오른팔"
original = "「ギ…………ギギ………………ッ！！」"
translation = "「기………… 기기………………윽!!」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネL"
speaker_translation = "할로우 루비네 L"
original = "「……！？\u3000ディザスターハンドが、弾けて──消えた！？」"
translation = "「……!? 디재스터 핸드가 터져서── 사라졌어!?」"

[[dialogue]]
speaker = "unk"
original = "その場にいた者が息を呑む。"
translation = "그 자리에 있던 자들이 숨을 삼킨다."

[[dialogue]]
speaker = "unk"
original = "光の粒となって消えたディザスターハンドの粒子が、緋宮クロトの亡骸に吸い込まれ、消えていく──"
translation = "빛의 알갱이가 되어 사라진 디재스터 핸드의 입자가 히노미야 쿠로토의 유해로 빨려 들어가 사라져 간다──"

[[dialogue]]
speaker_original = "ＸＥＬＯＳ"
speaker_translation = "제로스"
original = "「──────ッ！？！？！？」"
translation = "「──────윽!?!?!?!?」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「お父様……！？\u3000ど、どうされたのですか──」"
translation = "「아버님……!? 어, 어떻게 된 것입니까──」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』が再び……あの姿に！？」"
translation = "「『<ruby>XELOS<rt>제로스</rt></ruby>』가 다시…… 그 모습으로!?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「梨緒、あれを……！！」"
translation = "「리오, 저걸……!!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……！？\u3000魔、王────？」"
translation = "「……!? 마, 왕────?」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスに抱きかかえられていた、命を落としていたはずの少年が──"
translation = "비너스에게 안겨 있던, 목숨을 잃었을 터인 소년이──"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「…………パ、パ？」"
translation = "「…………파, 파?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「…………クロ、ト？」"
translation = "「…………쿠로, 토?」"

[[dialogue]]
speaker = "unk"
original = "リクリエの危機の際に、人類の救世主は現れるという。"
translation = "리크리에의 위기 때 인류의 구세주가 나타난다고 한다."

[[dialogue]]
speaker = "unk"
original = "それは未完のままであった、３つの世界の──"
translation = "그것은 미완성인 채였던 세 세계의──"

[[dialogue]]
speaker = "unk"
original = "──最後の魔王の姿。"
translation = "──최후의 마왕의 모습."

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「…………お前は、いったい、何なの……？」"
translation = "「…………너는 대체 뭐야……?」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「命を……魂すらを奪ったのに──どうしてまた戻ってくるっ！？」"
translation = "「목숨을…… 영혼마저 빼앗았는데── 어째서 다시 돌아오는 거야!?」"

[[dialogue]]
speaker = "unk"
original = "セレスティアすら用いずに変身を果たし、右の<ruby>腕<rt>かいな</rt></ruby>に巻き付くは、厄災の力。"
translation = "셀레스티아조차 사용하지 않고 변신을 완수하고, 오른팔에 휘감긴 것은 재앙의 힘."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「みんな──心配をかけてごめん」"
translation = "「모두들── 걱정 끼쳐서 미안해」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロト……パパ……？」"
translation = "「쿠로토…… 아빠……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ヴィーナス。遅くなって悪かった……」"
translation = "「비너스. 늦어서 미안했다……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「幽霊じゃ、ない……？\u3000ほんとに、生きてる……？」"
translation = "「유령이 아니야……? 정말로 살아있어……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ──この通りだ。安心してくれ、ヴィーナス」"
translation = "「아아── 이대로다. 안심해, 비너스」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「あのまま死ぬような愚物ではないと思ってはいたが……貴様、何をした？」"
translation = "「그대로 죽을 어리석은 자는 아닐 거라 생각했지만…… 네놈, 무슨 짓을 했지?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「どういう、こと？\u3000いったい……どうやって──」"
translation = "「어떻게 된 거야? 대체…… 어떻게──」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……ベガの俺とコンタクトを取った。彼の魂と力、その全てを譲り受けて──だから、還ってくることができたんだ」"
translation = "「……베가의 나와 컨택트했어. 그의 영혼과 힘, 그 모든 것을 물려받아서── 그래서 돌아올 수 있었던 거야」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ベガの、君に……！？」"
translation = "「베가의 너와……!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺はいつもこうだ。１人じゃ何もできない。いつも誰かに力を貸してもらって──だから立ち上がれる……」"
translation = "「나는 항상 이래. 혼자선 아무것도 못 해. 언제나 누군가에게 힘을 빌려서── 그래서 일어설 수 있어……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「みんな、今の今まで持ちこたえてくれてありがとう……これが本当に最後の戦いだ！\u3000だから……」"
translation = "「모두들, 지금까지 버텨줘서 고마워…… 이것이 정말 마지막 싸움이다! 그러니까……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺に──いや、『俺たち』について来てくれ！！」"
translation = "「나에게── 아니, 『우리』를 따라와 줘!!」"

