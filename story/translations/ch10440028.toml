[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「ふぃ～♪\u3000眷族の作った夕食、なかなかに美味かったぞ！\u3000お腹いっぱいなのじゃ～<emoji=heart04>」"
translation = "「휘이～♪ 권속이 만든 저녁 식사, 꽤나 맛있었느니라! 배가 가득 찼느니라～<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「さぁ、腹もこなれたことじゃし……フッフッフ<emoji=heart04>\u3000そろそろ２人きりの時間といこうかの！」"
translation = "「자, 배도 좀 꺼졌으니…… 훗훗훗<emoji=heart04> 슬슬 둘만의 시간을 가져볼까!」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「……なぬっ！？\u3000今日、お泊まりはダメ……？\u3000な、なぜじゃっ！？」"
translation = "「……뭐랏!? 오늘 자고 가는 건 안 돼……? 어, 어째서냐!?」"

[[dialogue]]
speaker = "unk"
original = "お泊まりできると思っていたらしいプリムラに事情を説明する。"
translation = "자고 갈 수 있을 거라 생각했던 프리뮬러에게 사정을 설명한다."

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「ムムム。リノは残業をしているだけで、あと数時間で帰って来るのか……残念じゃのう」"
translation = "「무무무. 리노는 잔업을 하고 있을 뿐이고, 몇 시간 뒤면 돌아온다는 것이냐…… 아쉽구나.」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「──いや待て。あと数時間で帰ってくるということは、あと数時間は帰ってこないということなのじゃ！」"
translation = "「──아니 기다려라. 몇 시간 뒤에 돌아온다는 것은, 몇 시간 동안은 돌아오지 않는다는 것이니라!」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「な～眷族。最近、忙しくてなかなかそういう時間を取れておらんかったではないか～？」"
translation = "「저기 권속. 최근 바빠서 좀처럼 그런 시간을 갖지 못하지 않았느냐～?」"

[[dialogue]]
speaker = "unk"
original = "でも、いたしている最中に母さんが帰ってくるのはまずい。プリムラも外泊許可は取っていないはずだ。ちゃんと寮まで送り届けないと……"
translation = "하지만 하고 있는 도중에 엄마가 돌아오면 곤란해. 프리뮬러도 외박 허가는 받지 않았을 거야. 제대로 기숙사까지 데려다줘야지……"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「そうか、そうか。眷族の意思は固いようじゃな……ではお別れのキッスだけしておくかの」"
translation = "「그런가, 그런가. 권속의 의지가 확고한 모양이구나…… 그럼 작별의 키스만 해두도록 하지.」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「んぅ、ちゅっ<emoji=heart04>\u3000んちゅ、ちゅぱっ……れぇ、れろぉっ……ちゅぱぁ<emoji=heart04>」"
translation = "「응으, 쪽<emoji=heart04> 응츄, 츄릅…… 레에, 레로오…… 츄르릅<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「あ～あ、残念じゃの～……<emoji=heart04>\u3000今日の我、いっぱい責めて欲しい気分じゃったのになぁ～？」"
translation = "「아～아, 아쉽구나～……<emoji=heart04> 오늘 짐은 잔뜩 괴롭힘당하고 싶은 기분이었는데 말이다～?」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「眷族にオネダリされたら、ど～んなスケベなことでも付き合ったと思うぞ～？\u3000残念、残念じゃ～……<emoji=heart04>」"
translation = "「권속이 조른다면 어～떤 야한 일이라도 함께해 줬을 텐데 말이다～? 아쉽구나, 아쉬워～……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "さわさわと、ズボンの上から俺のペニスを撫でながら、プリムラがにんまりと笑う。"
translation = "살랑살랑, 바지 위로 내 페니스를 쓰다듬으며 프리뮬러가 싱긋 웃는다."

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「眷族はちっちゃな我を押し倒して、両手をぎゅ～っと恋人繋ぎで捕まえて……ピストンするの、好きじゃったよな～？」"
translation = "「권속은 조그만 짐을 눌러서, 양손을 꼬옥 연인 잡기로 붙잡고…… 피스톤 하는 거 좋아했었지～?」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「我、あの激し～いえっち、して欲しかったんじゃがなぁ～？」"
translation = "「짐, 그 격렬～한 섹스 하고 싶었는데 말이다～?」"

[[dialogue]]
speaker = "unk"
original = "あと数時間で、母さんが帰ってくるんだ。ここは鋼の意思で断るんだ……！"
translation = "몇 시간 뒤면 엄마가 돌아와. 여기선 강철 같은 의지로 거절해야 해……!"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「あ～ぁ、眷族の許可さえあれば、デストロイフォームに変身して、戦闘服で新鮮なコスプレえっちだって、してあげられたんじゃがな～？」"
translation = "「아～아, 권속의 허락만 있다면 디스트로이 폼으로 변신해서 전투복으로 신선한 코스프레 섹스도 해줄 수 있었는데 말이다～?」"

[[dialogue]]
speaker = "unk"
original = "……あと数時間で帰ってくるということは、あと数時間は帰ってこないということだ。俺の鋼の意思は、たやすく吹き飛んだ。"
translation = "……몇 시간 뒤에 돌아온다는 것은, 몇 시간 동안은 돌아오지 않는다는 뜻이다. 나의 강철 같은 의지는 가볍게 날아갔다."

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「にゅふふふ♪\u3000よい目だ。では眷族よ、命じるのじゃ！\u3000我に、えっちのために変身しろ──となっ<emoji=heart04>」"
translation = "「뉴후후후♪ 좋은 눈빛이다. 그럼 권속이여, 명령하거라! 짐에게 섹스를 위해 변신해라── 라고 말이다<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「あっはぁ～……<emoji=heart04>\u3000すっごい勃起なのじゃあ……眷族のおち○ぽ、ものすっごく反りかえって、我のおま○こにすりすり当たっておるぅ……<emoji=heart04>」"
translation = "「앗하아～……<emoji=heart04> 엄청난 발기이니라아…… 권속의 자지, 엄청나게 휘어서 짐의 보지에 비비적 닿고 있느니라……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "小柄なプリムラの両手をがっちりと拘束して、ベッドに縫い付ける正常位──男がガンガン腰を振れる体勢は、否が応でも興奮してしまう。"
translation = "자그마한 프리뮬러의 양손을 꽉 구속하고 침대에 박아넣는 정상위── 남자가 마음껏 허리를 흔들 수 있는 자세는 어쩔 수 없이 흥분하게 된다."

[[dialogue]]
speaker = "unk"
original = "おまけにプリムラのおっぱいも、おま○こも丸見え。こんなの、ムラムラしない方がおかしい。"
translation = "게다가 프리뮬러의 가슴도, 보지도 훤히 보인다. 이런 상황에 발기하지 않는 게 이상하다."

[[dialogue]]
speaker = "プリムラ"
original = "「あはぁ……♪\u3000見られておる……我のおっぱい、眷族にじ～っと見られておるのじゃ……<emoji=heart04>」"
translation = "「아하아……♪ 보고 있느니라…… 짐의 가슴, 권속이 빤히 쳐다보고 있느니라……<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「ちっちゃくてすまんな～……男はこう、でっかい乳が好きなんじゃろー？」"
translation = "「작아서 미안하구나～…… 남자는 이렇게 커다란 가슴을 좋아하는 것이지?」"

[[dialogue]]
speaker = "unk"
original = "──そんなことない。好きな女の子のおっぱいなら、大きかろうが小さかろうが関係ないんだ。"
translation = "──그렇지 않아. 좋아하는 여자의 가슴이라면 크든 작든 상관없어."

[[dialogue]]
speaker = "プリムラ"
original = "「ンフフ～……それを聞きたくて、わざと言わせてしまったのじゃ。嬉しいぞ～、眷族<emoji=heart04>」"
translation = "「음후후～…… 그 말을 듣고 싶어서 일부러 말하게 했느니라. 기쁘구나, 권속<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「今夜もいっぱい見て、触って、吸ってほしいのじゃ<emoji=heart04>\u3000我、おっぱいいじられると、おま○こびちょびちょに濡れるからの……<emoji=heart04>」"
translation = "「오늘 밤도 잔뜩 보고, 만지고, 빨아주길 바라느니라<emoji=heart04> 짐, 가슴을 괴롭힘당하면 보지가 축축하게 젖어버리니까……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "お尻をモジモジと動かして、俺のペニスをおま○こで撫でながら、プリムラがそんなことを言う。"
translation = "엉덩이를 꼼지락거리며 내 페니스를 보지로 문지르면서 프리뮬러가 그런 말을 한다."

[[dialogue]]
speaker = "プリムラ"
original = "「ふわあ、ちょっと擦っただけで、先走りがものすごいのじゃ……アッツアツの眷族ち○ぽ、我……大好きじゃ～♪」"
translation = "「후아아, 살짝 스친 것만으로 쿠퍼액이 엄청나느니라…… 뜨끈뜨끈한 권속 자지, 짐…… 정말 좋느니라～♪」"

[[dialogue]]
speaker = "プリムラ"
original = "「トクントクンと震えて、くさいおつゆを次々に垂らして……にゅふふ♪\u3000<ruby>番<rt>つが</rt></ruby>った後は、いつもみたいにお掃除フェラもしてやるからの<emoji=heart04>」"
translation = "「두근두근 떨리며 야한 국물을 차례차례 흘리고…… 뉴후후♪ 반려가 된 후에는 언제나처럼 청소 펠라도 해줄 테니까 말이다<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「思わず２回戦にゆきたくなるような、じゅるじゅるフェラチオ、してやるから楽しみにしておくのじゃ♪」"
translation = "「나도 모르게 2회전까지 가고 싶어질 정도로 쥬르륵거리는 펠라치오, 해줄 테니 기대하고 있거라♪」"

[[dialogue]]
speaker = "unk"
original = "繋いだ手にぎゅうっと力を込めて、なぜか２回戦の予約まで入れようとしているプリムラ。それはまずいって。"
translation = "맞잡은 손에 힘을 꽉 주며 왠지 2회전 예약까지 넣으려 하는 프리뮬러. 그건 곤란하다니까."

[[dialogue]]
speaker = "プリムラ"
original = "「──おっと、そうじゃった。リノが帰って来るまでに、サクっとヤらねばならんものな<emoji=heart04>」"
translation = "「──앗, 그랬지. 리노가 돌아오기 전까지 후딱 해치워야 하니까 말이다<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「では～、眷族よ？\u3000我のおま○こに、そのぶっといおち○ぽ、ぶち込んで欲しいのじゃ♪」"
translation = "「그럼～, 권속이여? 짐의 보지에 그 굵직한 자지, 박아넣어 주길 바라느니라♪」"

[[dialogue]]
speaker = "プリムラ"
original = "「準備はいらん。さっきお前とキスした時から、我のおま○こ、トロトロじゃからな……フヘへ<emoji=heart04>」"
translation = "「준비는 필요 없느니라. 아까 너와 키스했을 때부터 짐의 보지는 걸쭉하니까 말이다…… 후헤헤<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「おち○ぽ押し込んで、確かめてみるとよいぞ～……んんぅっ<emoji=heart04>」"
translation = "「자지를 밀어 넣어서 확인해 보거라…… 음음읏<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「んんんっ──はぁあ、あぁぁあああぁ～っ……<emoji=heart04><emoji=heart04>」"
translation = "「음음읏── 하아아, 아아아아아아아～앗……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「入ったのじゃ、あぁあっ……<emoji=heart04>\u3000ふぅうっ、相変わらず、ものすごい大きさ、なのじゃっ……は、ぁぁあぁっ……<emoji=heart04>」"
translation = "「들어왔느니라, 아아앗……<emoji=heart04> 후우읏, 여전히 엄청난 크기이니라…… 하, 아아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "プリムラの小さなおま○こは、入れただけで気持ちいいけれど──"
translation = "프리뮬러의 작은 보지는 넣는 것만으로도 기분 좋지만──"

[[dialogue]]
speaker = "プリムラ"
original = "「うん、いっぱい動いて、我を気持ちよくしてくれ、眷族っ──んんぅっ<emoji=heart04>」"
translation = "「응, 잔뜩 움직여서 짐을 기분 좋게 해다오, 권속── 음음읏<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「んんぁあっ<emoji=heart04>\u3000はぁっ、あぁあ、あぁああっ、んんっ<emoji=heart04>\u3000んんぁっ、あっ、はぁあ、あ、ぁああっ……<emoji=heart04>」"
translation = "「음음아앗<emoji=heart04> 하앗, 아아아, 아아아앗, 음읏<emoji=heart04> 음음앗, 앗, 하아아, 아, 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「おち○ぽ、奥までぐいぐい、入ってきてっ……ん、ふぅうっ<emoji=heart04>\u3000んあぁ、はああ、ぁあ、うぅっ、んんぅ～っ<emoji=heart04>」"
translation = "「자지, 안쪽까지 꾹꾹 들어와서…… 응, 후우읏<emoji=heart04> 응아아, 하아아, 아아, 으읏, 음음으으～읏<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「ぁっ──ぁ、あ、ぁあぁ～っ<emoji=heart04>\u3000それ好き、なのじゃっ<emoji=heart04>\u3000おま○この深い、ところっ……んん<emoji=heart04>\u3000いっぱい、突いてくれ、ぁ、あぁ<emoji=heart04>」"
translation = "「앗──아, 아, 아아아～앗<emoji=heart04> 그거 좋느니라<emoji=heart04> 보지의 깊은 곳…… 음음<emoji=heart04> 잔뜩 찔러다오, 아, 아아<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「我のちっちゃな、んんぅ、おま○こっ<emoji=heart04>\u3000眷族専用の、あぁっ<emoji=heart04>\u3000おま○こぉ<emoji=heart04>\u3000ほじくられてるの、じゃぁあっ<emoji=heart04>\u3000あ、あ、ああっ<emoji=heart04>」"
translation = "「짐의 조그만, 음음으, 보지잇<emoji=heart04> 권속 전용의, 아아앗<emoji=heart04> 보지이이<emoji=heart04> 파헤쳐지고 있느니라아아앗<emoji=heart04> 아, 아, 아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "突くというより、押し込むという表現がぴったりの狭い穴。"
translation = "찌른다기보다 밀어 넣는다는 표현이 딱 맞는 좁은 구멍."

[[dialogue]]
speaker = "unk"
original = "俺がピストンをするたび、プリムラの体はぽかぽかと温もり、控えめなおっぱいも可愛らしく揺れる。"
translation = "내가 피스톤을 할 때마다 프리뮬러의 몸은 따끈따끈하게 달아오르고, 아담한 가슴도 귀엽게 흔들린다."

[[dialogue]]
speaker = "プリムラ"
original = "「ふぅうっ<emoji=heart04>\u3000んんぁ、はぁあっ<emoji=heart04>\u3000眷族のえっちな視線、感じるのじゃっ……はぁ、あぅ<emoji=heart04>\u3000我のおっぱい、好き、じゃろ？\u3000んん<emoji=heart04>」"
translation = "「후우읏<emoji=heart04> 음음아, 하아앗<emoji=heart04> 권속의 야한 시선, 느껴지느니라…… 하아, 아우<emoji=heart04> 짐의 가슴, 좋지? 음음<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「はぁ、ふぅう<emoji=heart04>\u3000眷族におっぱい、あげたいのじゃっ……ほ、ほれ、遠慮するなっ……んんぅう！」"
translation = "「하아, 후우우<emoji=heart04> 권속에게 가슴 주고 싶느니라…… 보, 보거라, 사양하지 마라…… 음음으우!」"

[[dialogue]]
speaker = "unk"
original = "性器で繋がり、両手も固定されたプリムラは、敏感な乳首を隠すこともできない。ピストンをしながら俺は、コリコリと硬くしこった乳首にしゃぶりつく。"
translation = "성기로 연결되고 양손도 고정된 프리뮬러는 민감한 유두를 숨길 수도 없다. 피스톤을 하며 나는 오돌토돌하게 선 유두를 입에 머금는다."

[[dialogue]]
speaker = "プリムラ"
original = "「ふぅうっ──きゅぅうぅうっ<emoji=heart04><emoji=heart04>\u3000はぁあ、ぁ、ぁぅううっ<emoji=heart04><emoji=heart04>\u3000おっぱい、チューチュー、吸われてるの、じゃあぁっ<emoji=heart04>」"
translation = "「후우읏── 뀨우우우우읏<emoji=heart04><emoji=heart04> 하아아, 아, 아우우우읏<emoji=heart04><emoji=heart04> 가슴, 쪽쪽 빨리고 있느니라아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「はぁああ、あ、あぁあ～っ<emoji=heart04>\u3000気持ちいぃ<emoji=heart04>\u3000気持ちいいのじゃっ……んんぅ<emoji=heart04>\u3000ふぇえぇああぁあっ<emoji=heart04><emoji=heart04>」"
translation = "「하아아아, 아, 아아아～앗<emoji=heart04> 기분 좋아<emoji=heart04> 기분 좋느니라…… 음음으<emoji=heart04> 페에에아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「眷族におち○ぽされて、ん、んぅう<emoji=heart04>\u3000身動きできないまま、おっぱい、ねぶられるの、我、好き<emoji=heart04>\u3000好きじゃ、あぅ、んんんっ<emoji=heart04>」"
translation = "「권속에게 자지 박히며, 응, 음음으우<emoji=heart04> 꼼짝도 못한 채 가슴 핥아지는 거, 짐, 좋아<emoji=heart04> 좋아하느니라, 아우, 음음음읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "プリムラのとろけた表情。ふやけた喘ぎ声が聞こえるたび、突き込むペニスに熱が入る。"
translation = "프리뮬러의 황홀한 표정. 풀린 신음이 들릴 때마다 박아넣는 페니스에 힘이 실린다."

[[dialogue]]
speaker = "プリムラ"
original = "「──んんぅっ！\u3000おち○ぽ、またぶっとく、なったのじゃっ……あぅ、んんっ、ふぅう<emoji=heart04>\u3000眷族、興奮して、くれてるのじゃあっ……んんぅうぅ<emoji=heart04>」"
translation = "「──음음읏! 자지, 또 굵어졌느니라…… 아우, 음음읏, 후우우<emoji=heart04> 권속, 흥분해 주고 있구나…… 음음으우우<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「ぶっといおち○ぽっ、あぅ<emoji=heart04>\u3000我の気持ちいいところ──ふぅうっ<emoji=heart04>\u3000いっぱいゴシゴシ、してくれてるのじゃ<emoji=heart04>\u3000あぁ、あぁ、ああ～っ<emoji=heart04>」"
translation = "「굵직한 자지이, 아우<emoji=heart04> 짐의 기분 좋은 곳── 후우우읏<emoji=heart04> 잔뜩 문질러주고 있느니라<emoji=heart04> 아아, 아아, 아아～앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "プリムラの弱点は散々に知り尽くしている。おへそのすぐ裏側のところを、えぐるように突いたり──"
translation = "프리뮬러의 약점은 속속들이 알고 있다. 배꼽 바로 뒷부분을 파내듯이 찌르거나──"

[[dialogue]]
speaker = "プリムラ"
original = "「──んんぅ～～っ<emoji=heart04><emoji=heart04>\u3000あ、あ、あぁ、はぁ、うぅ、んんっ……おま○こ、感じすぎちゃうのじゃっ……あうぅ、ふうぅんっ<emoji=heart04>」"
translation = "「──음음으으～～읏<emoji=heart04><emoji=heart04> 아, 아, 아아, 하아, 으우, 음음읏…… 보지, 너무 느껴버리느니라…… 아우우, 후우우응읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "子宮の入口あたりにぎゅ～っと体重をかけてあげたり──"
translation = "자궁 입구 근처에 꾹 체중을 실어주거나──"

[[dialogue]]
speaker = "プリムラ"
original = "「──おぉおおおおっ<emoji=heart04><emoji=heart04>\u3000うぅうっ<emoji=heart04>\u3000身動き、できんから、ぅうぅ<emoji=heart04>\u3000そ、それぇ、めちゃめちゃ、キくのじゃぁ、あぁあっ<emoji=heart04>」"
translation = "「──오오오오오옷<emoji=heart04><emoji=heart04> 으으으읏<emoji=heart04> 꼼짝도 못 하니까, 으우으우<emoji=heart04> 거, 그거, 엄청나게 잘 듣느니라아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "あとはペニスの動きだけじゃない。握っている手に力を込めてあげただけでも──"
translation = "그저 페니스의 움직임뿐만이 아니다. 쥐고 있는 손에 힘을 주는 것만으로도──"

[[dialogue]]
speaker = "プリムラ"
original = "「んっ──ふぅうぅうっ<emoji=heart04>\u3000あ、あぁああ<emoji=heart04>\u3000我の手、ぎゅ～ってするの、それもダメじゃあぁ<emoji=heart04>\u3000ふうう、んんう、んぁ、あぁあっ<emoji=heart04>」"
translation = "「응── 후우우우읏<emoji=heart04> 아, 아아아아<emoji=heart04> 짐의 손, 꼬옥 쥐는 거, 그것도 안 되느니라아아<emoji=heart04> 후우우, 음음우, 응아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "プリムラは普段の小生意気な態度と裏腹に、エッチの時は攻められるのが大好きな女の子になる。いわゆるＭだ。"
translation = "프리뮬러는 평소의 건방진 태도와 달리 섹스할 때는 공략당하는 것을 아주 좋아하는 여자아이가 된다. 이른바 M이다."

[[dialogue]]
speaker = "プリムラ"
original = "「はぁ、はあぁあ～っ<emoji=heart04>\u3000ふうう、うぅうっ<emoji=heart04>\u3000雄の強い力で、こうっ……屈服させられてる感じが、た、たまらないのじゃぁ<emoji=heart04>」"
translation = "「하아, 하아아아～앗<emoji=heart04> 후우우, 으으으읏<emoji=heart04> 수컷의 강한 힘으로 이렇게…… 굴복당하는 느낌이, 처, 참을 수 없느니라아<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「眷族ぅっ、も、もっと<emoji=heart04>\u3000もっと強いやつ、し、して欲しいのじゃっ<emoji=heart04>\u3000んん、はぁ、うぅ、んんっ、んぁ、ああ<emoji=heart04>」"
translation = "「권속으으으, 더<emoji=heart04> 더 강한 거, 해, 해줬으면 좋겠느니라앗<emoji=heart04> 음음, 하아, 으우, 음음읏, 응아, 아아아<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「ピストンされるたび、ばちゅ、ばちゅ、って音が出るような、乱暴なやつ<emoji=heart04>\u3000我の好きならんぼーなえっち、してっ<emoji=heart04>\u3000してぇっ<emoji=heart04>！」"
translation = "「피스톤 할 때마다 찌걱, 찌걱, 소리가 나는 것 같은 난폭한 거<emoji=heart04> 짐이 좋아하는 난폭한 섹스, 해줘<emoji=heart04> 해줘어어<emoji=heart04>!」"

[[dialogue]]
speaker = "unk"
original = "可愛らしいおねだりに、俺もうなずく。こっちもプリムラのおま○こが気持ち良すぎて、昂りを抑えられなくなってきていたから──"
translation = "귀여운 조르기에 나도 고개를 끄덕인다. 나 역시 프리뮬러의 보지가 너무 기분 좋아서 고조되는 마음을 억누를 수 없게 되었으니까──"

[[dialogue]]
speaker = "プリムラ"
original = "「んんぅうあっ、あぁあああっ！\u3000ふぁあああっ<emoji=heart04>\u3000んんぁっ、あっあっ、あぁぁ、んんん、んぁぁあ～っ……！」"
translation = "「음음으우앗, 아아아아앗! 파아아아앗<emoji=heart04> 음음아앗, 앗앗, 아아아, 음음음, 응아아아～앗……!」"

[[dialogue]]
speaker = "プリムラ"
original = "「そ、それじゃあっ<emoji=heart04>\u3000んんぅ、ふぅうっ<emoji=heart04>\u3000はぁああ<emoji=heart04>\u3000眷族の、乱暴ピストン、あ、あぁ、あぁああ<emoji=heart04>\u3000気持ち良すぎるのじゃぁあっ<emoji=heart04>」"
translation = "「그, 그거니라앗<emoji=heart04> 음음으, 후우우읏<emoji=heart04> 하아아아<emoji=heart04> 권속의 난폭 피스톤, 아, 아아, 아아아아<emoji=heart04> 너무 기분 좋느니라아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「ふうぅ、んんんっ<emoji=heart04>\u3000んんぁっ、ぁぁう、はぁぁ、あぁ、ああ、ぅ、んん、ぁあ、んんんっ<emoji=heart04>」"
translation = "「후우우, 음음음읏<emoji=heart04> 음음아앗, 아아우, 하아아, 아아, 아아, 우, 음음, 아아, 음음음읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "まるで俺のペニスに甘えてくるみたいに、きゅっきゅっと締まりを強くしてくれるプリムラのおま○こ。"
translation = "마치 내 페니스에 응석을 부리는 것처럼 조임이 강해지는 프리뮬러의 보지."

[[dialogue]]
speaker = "unk"
original = "見下ろす正常位だと、とにかく俺と彼女の体格差が浮き彫りになる。"
translation = "내려다보는 정상위에서는 무엇보다 나와 그녀의 체격 차이가 두드러진다."

[[dialogue]]
speaker = "プリムラ"
original = "「はぁああ、ぁうぅ、んんんぅ、ふぁぁ、んん～っ<emoji=heart04>\u3000ガッチガチでっ……ぬるぬる、しててっ、おち○ぽ気持ちいぃっ……んんぅ、はぁあっ<emoji=heart04>」"
translation = "「하아아아, 아우우, 음음음으, 파아아, 음음～읏<emoji=heart04> 딱딱하고…… 미끈거려서, 자지 기분 좋아…… 음음으, 하아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "こんなに小さい体なのに、勃起ペニスを根元までしっかりと飲み込んで、シゴいてくれる。背徳感がぞくぞくと登ってきて、たまらない。"
translation = "이렇게 작은 몸인데도 발기한 페니스를 뿌리까지 확실히 삼키고 조여준다. 배덕감이 등줄기를 타고 올라와 참을 수 없다."

[[dialogue]]
speaker = "プリムラ"
original = "「ふう、ふぅうっ<emoji=heart04>\u3000け、眷族ぅ……<emoji=heart04>\u3000我、もっと求めて、欲しい、のじゃぁっ……<emoji=heart04>」"
translation = "「후우, 후우우읏<emoji=heart04> 거, 권속으으……<emoji=heart04> 짐을 더 원해 주길 바라느니라아……<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「おち○ぽしながら、えっちなキスもぉっ……んぇああ～……<emoji=heart04>」"
translation = "「자지 하면서 야한 키스도오…… 응에아아～……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「──っ！」"
translation = "「──윽!」"

[[dialogue]]
speaker = "unk"
original = "愛らしいおねだりに誘われて、俺は襲いかかるようにしてプリムラの唇を奪った。"
translation = "사랑스러운 조르기에 유혹되어 나는 덮치듯이 프리뮬러의 입술을 빼앗았다."

[[dialogue]]
speaker = "プリムラ"
original = "「んんぅぢゅるう<emoji=heart04>\u3000んれぇええ<emoji=heart04>\u3000んれえ、れろ、れろれりゅ、んちゅるう、れぇえっ<emoji=heart04>\u3000べろれろべろ、れぇれろぉおっ<emoji=heart04><emoji=heart04>」"
translation = "「음음으쥬르우<emoji=heart04> 응레에에에<emoji=heart04> 응레에, 레로, 레로레류, 응츄르우, 레에엣<emoji=heart04> 베로레로베로, 레에레로오오옷<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスのピストンの激しさに負けないくらい、夢中で舌を絡ませあうディープキス。"
translation = "페니스의 격렬한 피스톤에 지지 않을 만큼 정신없이 혀를 섞는 딥 키스."

[[dialogue]]
speaker = "プリムラ"
original = "「じゅるっ<emoji=heart04>\u3000んぅぢゅるる<emoji=heart04>\u3000けんぞく～……しゅきぃ<emoji=heart04>\u3000んちゅぅ、好きなのじゃぁっ……はぅむ、んぅむ、んむぅむぅむぅっ<emoji=heart04>」"
translation = "「쥬릅<emoji=heart04> 응으쥬르르<emoji=heart04> 권속～…… 좋아해에<emoji=heart04> 응츄우, 좋아하느니라아아앗…… 하으무, 응으무, 응무으무으무으읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "キスしながら、俺への好意まで伝えてくれる──"
translation = "키스하면서 나를 향한 호의까지 전해준다──"

[[dialogue]]
speaker = "プリムラ"
original = "「もっと<emoji=heart04>\u3000んぅぢゅるっ<emoji=heart04>\u3000もっとして<emoji=heart04>\u3000ちゅぱ、れぇ、れろっ<emoji=heart04>\u3000んちゅぅるっ<emoji=heart04>\u3000しゅき<emoji=heart04>\u3000だいすきじゃぁ<emoji=heart04>\u3000じゅる、ちゅぱ、れろぉ<emoji=heart04>」"
translation = "「더<emoji=heart04> 응으쥬릅<emoji=heart04> 더 해줘<emoji=heart04> 츄파, 레에, 레로옷<emoji=heart04> 응츄우르읏<emoji=heart04> 좋아해<emoji=heart04> 정말 좋아하느니라아<emoji=heart04> 쥬르, 츄파, 레로오<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「れるれるれるっ……んんちゅる<emoji=heart04>\u3000おち○ぽ、突いてくれえっ……ちゅ、ちゅぅ、んちゅるうっ、れぇえ、れろ、ちゅぱっ<emoji=heart04>」"
translation = "「렐렐렐렛…… 음음츄르<emoji=heart04> 자지, 찔러다오오옷…… 츄, 츄우, 응츄르우웃, 레에, 레로, 츄파앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "手のひらに汗をかき始めてきた。でも、恋人繋ぎが滑りそうになると、プリムラはほどけないように強く握り返してきてくれる。"
translation = "손바닥에 땀이 나기 시작했다. 하지만 연인 잡기가 미끄러질 것 같으면 프리뮬러는 풀리지 않도록 강하게 맞잡아 준다."

[[dialogue]]
speaker = "unk"
original = "もうそろそろ限界だ──ラストスパートのピストンがしたい、と伝えながらのキス。"
translation = "이제 슬슬 한계다── 라스트 스퍼트 피스톤을 하고 싶다고 전하며 키스한다."

[[dialogue]]
speaker = "プリムラ"
original = "「んれりゅ、れるれるれるっ<emoji=heart04>\u3000うむ、わかった<emoji=heart04>\u3000来てくれっ、ちゅるうるぅ～っ……ぷっはぁぁ<emoji=heart04>」"
translation = "「응레류, 렐렐렐렛<emoji=heart04> 음, 알았느니라<emoji=heart04> 와다오, 츄르우르으～읏…… 푸하아아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "お互いの唇を離し、串刺しにするみたいにプリムラのおま○こへピストンを叩きこむ。"
translation = "서로의 입술을 떼고 꼬챙이에 꿰듯이 프리뮬러의 보지에 피스톤을 때려 박는다."

[[dialogue]]
speaker = "プリムラ"
original = "「ぉおぉおおぉっ！？\u3000お、ぉおぉっ<emoji=heart04>\u3000おおぉ、ぉおお、ぉおお～っ、おっ、おぉっ、おっおっおっ、おぉぉぉお～っ……！」"
translation = "「오오오오오오옷!? 오, 오오오옷<emoji=heart04> 오오오, 오오오, 오오오～옷, 오옷, 오오옷, 오옷오옷오옷, 오오오오오～옷……!」"

[[dialogue]]
speaker = "プリムラ"
original = "「き、来たのじゃ──んぅおっ<emoji=heart04>\u3000眷族の、おぉぉっ<emoji=heart04>\u3000本気のパンパンっ、ぉ、ぉお、おぉお、ぉおおっ、ぅおお、おぉ～っ……！」"
translation = "「와, 왔느니라── 응으오옷<emoji=heart04> 권속의, 오오오옷<emoji=heart04> 진심 팡팡, 오, 오오, 오오오, 오오오옷, 우오오, 오오～옷……!」"

[[dialogue]]
speaker = "プリムラ"
original = "「ぁ、ぁーっ！\u3000んんんあ、ぁ、あぁあぁ～っ<emoji=heart04>\u3000おち○ぽ、膨らんでる、膨らんでるのじゃぁっ<emoji=heart04>\u3000うぅ、ぉ、ぉ、ぉおおっ<emoji=heart04>」"
translation = "「아, 아ー앗! 음음음아, 아, 아아아아～앗<emoji=heart04> 자지, 부풀고 있느니라, 부풀고 있느니라아앗<emoji=heart04> 우우, 오, 오, 오오오옷<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「で、出るのか？\u3000精液、びゅうって、我のおま○こに、出るのか、眷族ぅっ？\u3000あっ、あぁぁぁああっ<emoji=heart04>」"
translation = "「나, 나오는 것이냐? 정액, 뷰우 하고 짐의 보지에 나오는 것이냐, 권속으으으으읏? 앗, 아아아아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "射精欲がどんどん高まってくる。雄の本能が、目の前の恋人に、種付けをしたがっている──"
translation = "사정욕이 점점 높아진다. 수컷의 본능이 눈앞의 연인에게 씨내리기를 하고 싶어 한다──"

[[dialogue]]
speaker = "プリムラ"
original = "「ぉ、ぉお、ぉお、ぉ、ぉおぉおおっ！\u3000いいぞっ、出してくれっ<emoji=heart04>\u3000精液、欲しいのじゃっ<emoji=heart04><emoji=heart04>\u3000眷族の恋人せーえき、欲しいのじゃぁっ<emoji=heart04>」"
translation = "「오, 오오, 오오, 오, 오오오오오옷! 좋다, 내보내 다오<emoji=heart04> 정액, 갖고 싶느니라앗<emoji=heart04><emoji=heart04> 권속의 연인 정액, 갖고 싶느니라아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「あ、ぁ、あぁ、あ、あ、ぁ、あ、ぁっ──我もイクっ<emoji=heart04>\u3000イクのじゃっ<emoji=heart04><emoji=heart04>\u3000ぉ、ぉ、ぉ、ぉ、ぉ、ぉっ──おぉぉおっ！」"
translation = "「아, 아, 아아, 아, 아, 아, 아, 아앗── 짐도 가느니라<emoji=heart04> 가느니라앗<emoji=heart04><emoji=heart04> 오, 오, 오, 오, 오, 오옷── 오오오오옷!」"

[[dialogue]]
speaker = "プリムラ"
original = "「イクっ<emoji=heart04>\u3000イクイクっ、イクイクイクイクっ──イック、ぅぅうぅうう～っ……！！」"
translation = "「간다<emoji=heart04> 가가가, 가가가가가앗── 가앗, 으으으으으으～으……!!」"

[[dialogue]]
speaker = "プリムラ"
original = "「んんぁぁあっ、ふぇぁあぁああぁあぁああ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「음음아아아앗, 페아아아아아아아아아아아～～～앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "身じろぎもできないほどに強く組み伏せられたまま、お腹の奥で射精を受け止めるプリムラ。"
translation = "몸부림조차 칠 수 없을 정도로 강하게 짓눌린 채 뱃속 깊은 곳에서 사정을 받아내는 프리뮬러."

[[dialogue]]
speaker = "プリムラ"
original = "「ぁあっ──ふぅうっ<emoji=heart04>\u3000ううぁあ、んんぅ、ぁあっぁあっ！？\u3000出てるのじゃっ、我のおま○こで、びゅーびゅー、出てる、のじゃぁぁっ<emoji=heart04><emoji=heart04>」"
translation = "「아앗── 후우우읏<emoji=heart04> 우우아아, 음음으, 아앗아앗!? 나오고 있느니라, 짐의 보지에서 뷰뷰, 나오고 있느니라아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「うぅぅううっ<emoji=heart04><emoji=heart04>\u3000あ、あったかいのじゃっ……眷族のせーえきっ、あったくて、気持ちぃいっ……<emoji=heart04>\u3000ああぁ、ぁぁああ～っ……<emoji=heart04>」"
translation = "「으으으으으읏<emoji=heart04><emoji=heart04> 아, 따뜻하느니라…… 권속의 정액, 따뜻해서 기분 좋아……<emoji=heart04> 아아아, 아아아아～앗……<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「ぁああっ……眷族、好きぃっ<emoji=heart04>\u3000んんぁっ……好きじゃぁっ……んんぅう～っ……<emoji=heart04><emoji=heart04>」"
translation = "「아아아앗…… 권속, 좋아해에엣<emoji=heart04> 음음아앗…… 좋아하느니라아앗…… 음음으우우～읏……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "腰が抜けそうなほどの締め付けに誘われて、一滴も余さずプリムラのお腹へ注いでいく。"
translation = "허리가 빠질 것 같은 조임에 이끌려 한 방울도 남김없이 프리뮬러의 배에 쏟아부었다."

[[dialogue]]
speaker = "unk"
original = "どくん、どくん、どくん──何度も何度も震えて、ようやく射精が収まって……"
translation = "두근, 두근, 두근── 몇 번이고 떨리고서야 겨우 사정이 잦아들고……"

[[dialogue]]
speaker = "プリムラ"
original = "「んんぅうぁああぁ～っ…………おち○ぽ、抜けちゃったの、じゃあ……<emoji=heart04>\u3000はふぅうう～っ……<emoji=heart04><emoji=heart04>」"
translation = "「음음으우아아아아～앗………… 자지, 빠져버렸느니라아……<emoji=heart04> 하후우우우～앗……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「ふぅうぅうぅ～……<emoji=heart04>\u3000眷族の、精液……んぁう<emoji=heart04>\u3000いっぱいすぎて、おま○こからあふれてしまうのじゃあ～……<emoji=heart04>」"
translation = "「후우우우우우～……<emoji=heart04> 권속의 정액…… 응아우<emoji=heart04> 너무 많아서 보지에서 넘쳐버리느니라아～……<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「ぁ、はぁ、ぁぁぁっ……出てゆかんで、欲しいのにぃ……んんぅ<emoji=heart04>\u3000体がちっちゃいの、こーゆう時に、寂しく感じるのじゃぁ……<emoji=heart04>」"
translation = "「아, 하아, 아아아앗…… 나가지 말아 주었으면 하는데에…… 음음으<emoji=heart04> 몸이 조그만 게 이런 때 외롭게 느껴지느니라아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "お尻をふりふり揺すって、逆流する精液を少しでもとどめようと苦心するプリムラが、愛おしくて……"
translation = "엉덩이를 살랑살랑 흔들며 역류하는 정액을 조금이라도 머무르게 하려 애쓰는 프리뮬러가 사랑스러워서……"

[[dialogue]]
speaker = "プリムラ"
original = "「……はえ？\u3000も、もう１回……じゃと？\u3000えっ、でも、リノが帰ってくるん、じゃろ？」"
translation = "「……하에? 하, 한 번 더…… 라고? 엣, 하지만 리노가 돌아오지 않느냐?」"

[[dialogue]]
speaker = "unk"
original = "時計を見ると──かなりぎりぎりな気がする。だけど、こんなに可愛い恋人を前に１回じゃ収まらない。完全に火が点いてしまった。"
translation = "시계를 보니── 꽤나 아슬아슬한 기분이다. 하지만 이렇게 귀여운 연인을 앞에 두고 한 번으로 끝낼 순 없다. 완전히 불이 붙어버렸다."

[[dialogue]]
speaker = "プリムラ"
original = "「う、うむっ<emoji=heart04>\u3000それじゃあもう１回、ペースアップしてヤるのじゃ<emoji=heart04>\u3000安心せい、我は終末兵器、プリムラじゃ♪」"
translation = "「으, 음으읏<emoji=heart04> 그럼 한 번 더, 페이스를 올려서 하는 것이니라<emoji=heart04> 안심하거라, 짐은 종말병기 프리뮬러이니라♪」"

[[dialogue]]
speaker = "プリムラ"
original = "「思いっきり乱暴なはーどせっくすでも、バッチリ受け止めてみせるのじゃ<emoji=heart04>」"
translation = "「마음껏 난폭한 하드 섹스라도 확실히 받아내 주겠느니라<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「眷族のおち○ぽ、出した直後でちょいと柔くなっておるしー……うむ。我がお口で元気にしてやるのじゃ<emoji=heart04>」"
translation = "「권속의 자지, 싼 직후라 조금 말랑해졌고…… 음. 짐의 입으로 팔팔하게 만들어 주겠느니라<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「気持ちよーく、気持ちよーく、してやるからの、眷族……フヘへへへ～……っ<emoji=heart04>」"
translation = "「기분 조오오게, 기분 조오오게 해줄 테니 말이다, 권속…… 후헤헤헤헤～엣<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ぺろりと唇を舐めながら、プリムラが笑う。"
translation = "낼름 입술을 핥으며 프리뮬러가 웃는다."

[[dialogue]]
speaker = "unk"
original = "その顔が可愛らしくって、俺は思わず覆いかぶさり、何度目かもわからないディープキスをしてしまうのだった──"
translation = "그 얼굴이 너무 귀여워서 나는 나도 모르게 덮쳐 누르며 몇 번째인지도 모를 딥 키스를 해버렸다──"

