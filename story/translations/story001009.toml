[[dialogue]]
speaker = "unk"
original = "目の前の堕天使パテルを全て倒し、急ぎ駆けつけると──"
translation = "눈앞의 타천사 파텔을 전부 쓰러뜨리고 서둘러 달려가자──"

[[dialogue]]
speaker = "フラン"
original = "「よぉ、そっちも終わったか。さっきは助かったぜ、サンキュー」"
translation = "「요어, 그쪽도 끝났나. 아까는 고마웠어, 땡큐」"

[[dialogue]]
speaker = "グロリア"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "何かあった……？"
translation = "무슨 일 있었어……?"

[[dialogue]]
speaker = "グロリア"
original = "「ああ、いえ……あったといえば、あったのでしょうか……」"
translation = "「아아, 아니요…… 있었다고 하면, 있었다고 해야 할까요……」"

[[dialogue]]
speaker = "パテル"
original = "「やっほー魔王！\u3000フィーニスの塔ではお世話になったね！」"
translation = "「얏호 마왕! 피니스의 탑에서는 신세 많이 졌어!」"

[[dialogue]]
speaker = "unk"
original = "プルちゃん！？"
translation = "푸루짱!?"

[[dialogue]]
speaker = "フラン"
original = "「こいつ、守護天使パテルだったんだってよ。オレたちを騙してやがった」"
translation = "「이 녀석, 수호천사 파텔이었다나 봐. 우리를 속이고 있었어」"

[[dialogue]]
speaker = "パテル"
original = "「騙してたって人聞き悪いな～。ま、ホントのことだけど」"
translation = "「속였다니 듣기 거북하네~. 뭐, 사실이지만 말야」"

[[dialogue]]
speaker = "フラン"
original = "「グロリアを囮にしやがったくせに悪びれねえな。しかも余計なことをズケズケ言ってきやがったし」"
translation = "「글로리아를 미끼로 삼은 주제에 미안해하지도 않네. 게다가 쓸데없는 소리를 거리낌 없이 지껄여대고 말이야」"

[[dialogue]]
speaker = "パテル"
original = "「うーん、お節介だったかー。高位存在である守護天使が普通のいち天使に接するのは難しいねえ～」"
translation = "「으음, 참견이었나~. 고위 존재인 수호천사가 보통 천사 하나를 상대하는 건 어렵네~」"

[[dialogue]]
speaker = "フラン"
original = "「この期に及んでマウント取ってきてんじゃねえ！」"
translation = "「이 마당에 서열질 하고 자빠졌네!」"

[[dialogue]]
speaker = "パテル"
original = "「アハハッ」"
translation = "「아하핫」"

[[dialogue]]
speaker = "グロリア"
original = "「まぁまぁ、私は無事でしたし、プルちゃんなりに私を想ってのことですから……」"
translation = "「자자, 저는 무사했고, 푸루짱 나름대로 저를 생각해서 한 일이니까요……」"

[[dialogue]]
speaker = "フラン"
original = "「フンッ」"
translation = "「흥」"

[[dialogue]]
speaker = "パテル"
original = "「ま、グロリアをエサにしたとはいえ、死なせるつもりはなかったんだけどさ」"
translation = "「뭐, 글로리아를 미끼로 썼다고는 해도, 죽게 할 생각은 없었지만 말야」"

[[dialogue]]
speaker = "パテル"
original = "「生き物の生き死にに直接関わらないのがあたしのポリシー。だからこそ、堕天使パテルは止めなくちゃいけなかった」"
translation = "「생물의 생사에 직접 관여하지 않는 게 내 폴리시. 그렇기에, 타천사 파텔은 멈춰야만 했어」"

[[dialogue]]
speaker = "パテル"
original = "「堕天使パテルは死神のくせに……というか自分が死神だからか、生存本能が強いからね。敏感ですぐに逃げる」"
translation = "「타천사 파텔은 사신 주제에…… 라고 할까 자신이 사신이라 그런지, 생존 본능이 강하거든. 민감해서 금방 도망쳐버려」"

[[dialogue]]
speaker = "パテル"
original = "「エサが必要だったんだよ。花の蜜のような、あま～い匂いのエサがね。それがグロリアってわけ」"
translation = "「미끼가 필요했어. 꽃의 꿀 같은, 다~콤한 냄새의 미끼가 말이지. 그게 글로리아라는 말씀」"

[[dialogue]]
speaker = "パテル"
original = "「おかげで堕天使を倒せたけど──間に合わなかったね」"
translation = "「덕분에 타천사를 쓰러뜨렸지만── 늦어버렸네」"

[[dialogue]]
speaker = "グロリア"
original = "「プルちゃん……！？」"
translation = "「푸루짱……!?」"

[[dialogue]]
speaker = "フラン"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker = "unk"
original = "パテルが堕天使になった……！？"
translation = "파텔이 타천사가 되었다……!?"

[[dialogue]]
speaker = "パテル"
original = "「確かに<ruby>パテル<rt>あたし</rt></ruby>は意識を取り戻した。だけど元は堕天使だからね。完全じゃない。一時的なものだ」"
translation = "「확실히 <ruby>나<rt>파텔</rt></ruby>는 의식을 되찾았어. 하지만 원래는 타천사니까 말야. 완전하지 않아. 일시적인 거야」"

[[dialogue]]
speaker = "パテル"
original = "「分裂した堕天使を倒せば何とかなるかと思ったけど……結果はご覧の通り。堕天使に引きずられてこの有様さ」"
translation = "「분열한 타천사를 쓰러뜨리면 어떻게든 될 줄 알았는데…… 결과는 보시는 바와 같이. 타천사에게 끌려가서 이 모양 이 꼴이야」"

[[dialogue]]
speaker = "パテル"
original = "「あたしはもうすぐまた理性を失って、あなたたちを襲う。だからその前に、あなたたちの手であたしを消して」"
translation = "「나는 이제 곧 다시 이성을 잃고, 당신들을 습격할 거야. 그러니까 그전에, 당신들 손으로 나를 지워줘」"

[[dialogue]]
speaker = "グロリア"
original = "「そんな……せっかく仲良くなれたと思ったのに……」"
translation = "「그런…… 겨우 친해졌다고 생각했는데……」"

[[dialogue]]
speaker = "パテル"
original = "「仲良くなれたからこそだよ。あなたたちにお願いしたいんだ」"
translation = "「친해졌으니까 하는 부탁이야. 당신들에게 부탁하고 싶어」"

[[dialogue]]
speaker = "グロリア"
original = "「また会えます……よね？」"
translation = "「다시 만날 수…… 있겠죠?」"

[[dialogue]]
speaker = "パテル"
original = "「さあ？\u3000わかんない」"
translation = "「글쎄? 모르겠어」"

[[dialogue]]
speaker = "グロリア"
original = "「えっ！？\u3000でもマグダレナ様やアルモタヘル様は……」"
translation = "「엣!? 하지만 막달레나 님이나 아르모타헬 님은……」"

[[dialogue]]
speaker = "パテル"
original = "「義体はもう残ってないかもしれないし、あたしの魂が適合するかもわからない。今回は分裂なんて無茶をやったから、余計に難しいかもね」"
translation = "「의체는 이제 남아있지 않을지도 모르고, 내 영혼이 적합할지도 모르겠어. 이번에는 분열 같은 무리를 했으니까, 훨씬 더 어려울지도」"

[[dialogue]]
speaker = "パテル"
original = "「それに『淘汰』を司るあたしは、守護天使の中じゃ珍しいリクリエ静観派だから。そもそもあなたたちの前に現れる理由がないかも」"
translation = "「게다가 『도태』를 관장하는 나는 수호천사 중에서도 드문 리크리에 정관파니까. 애초에 당신들 앞에 나타날 이유가 없을지도 몰라」"

[[dialogue]]
speaker = "グロリア"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "フラン"
original = "「ハッ、お前の顔を見なくて済むと思うとせいせいするぜ」"
translation = "「핫, 네 얼굴을 안 봐도 된다고 생각하니 속이 다 시원하네」"

[[dialogue]]
speaker = "パテル"
original = "「ハハッ、フランは守護天使が相手でも変わらないね。ホント生意気」"
translation = "「하핫, 프랑은 수호천사가 상대라도 변함없네. 정말 건방져」"

[[dialogue]]
speaker = "パテル"
original = "「皮肉なものだよ。死神であるあたしが、仮初とはいえこうして死を経験するなんて……」"
translation = "「아이러니한 일이네. 사신인 내가 비록 일시적이라 해도 이렇게 죽음을 경험하다니……」"

[[dialogue]]
speaker = "パテル"
original = "「もうだいぶ眠くなってきた。さぁ……早くあたしを……」"
translation = "「이제 꽤 졸려지기 시작했어. 자…… 어서 나를……」"

[[dialogue]]
speaker = "グロリア"
original = "「さようなら……プルちゃん」"
translation = "「안녕히…… 푸루짱」"

[[dialogue]]
speaker = "パテル"
original = "「あたしも……挨拶しなきゃ……」"
translation = "「나도…… 인사해야지……」"

[[dialogue]]
speaker = "パテル"
original = "「縁があったらまた会おうね。シーユー」"
translation = "「인연이 있으면 다시 만나자. 씨 유」"

