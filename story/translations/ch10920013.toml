[[dialogue]]
speaker = "unk"
original = "第３話,潜入調査・星徒会！,P"
translation = "제3화, 잠입 조사·성도회!"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「ここが新星学園の星徒会室か……」"
translation = "「여기가 신성학원의 성도회실인가……」"

[[dialogue]]
speaker = "unk"
original = "ゆっくりしていってね"
translation = "천천히 쉬다 가."

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「別にくつろぎに来たわけじゃねえ！\u3000あたしは会長サンを監視するために──」"
translation = "「딱히 쉬러 온 게 아니야! 나는 회장님을 감시하기 위해서──」"

[[dialogue]]
speaker = "unk"
original = "お菓子あるけど、いる？"
translation = "과자 있는데 먹을래?"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「いただくぜい！」"
translation = "「먹겠어!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ねぇねぇ会長。この子は？」"
translation = "「있지 있지 회장. 이 아이는?」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「はぐはぐはぐっ……あたしは天桐ヒヨ！\u3000新星１年のプリマステラでさぁ！\u3000今日は会長サンを監視するために来たのさ！」"
translation = "「우걱우걱우걱…… 나는 아마기리 히요! 신성 1학년 프리마스텔라지! 오늘은 회장님을 감시하러 왔다!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「監視！？\u3000会長ってば何か悪いことしたの？」"
translation = "「감시!? 회장이 뭔가 나쁜 짓이라도 했어?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……ふむ、それとも何か疑惑でもかけられているのでしょうか？」"
translation = "「……흠, 아니면 뭔가 의혹이라도 사고 있는 걸까요?」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「会長サンは星徒会でハーレムを作ってるって話だ。それを確かめに来たんでい」"
translation = "「회장님이 성도회에서 하렘을 만들고 있다는 이야기다. 그걸 확인하러 왔지」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あら～♪\u3000知らない間にみんなをハーレムの一員にしちゃうなんて、スミにおけないわね～♪」"
translation = "「어머나～♪ 모르는 사이에 모두를 하렘 일원으로 만들다니, 보통이 아니네～♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そんな事実はないわよ！\u3000もしクロトがそんな気を起こすなら、真っ先に私に声をかけるはずだもの！！」"
translation = "「그런 사실은 없어! 만약 쿠로토가 그런 마음을 먹는다면 제일 먼저 나에게 말을 걸었을 테니까!!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あはは……相変わらずすごい自信……」"
translation = "「아하하…… 여전히 엄청난 자신감……」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「おっと、続々と集まってきたな……。それで、誰が会長サンの本命なんでい？」"
translation = "「오호, 계속해서 모여드는군……. 그래서 누가 회장님의 본처냐?」"

[[dialogue]]
speaker = "unk"
original = "みんな大切な仲間だから"
translation = "다들 소중한 동료니까."

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「そんなヒヨった返事は聞いてないやいっ」"
translation = "「그런 얼버무리는 대답은 듣고 싶지 않아!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そうよ！\u3000男の子なんだから、シャキッとしなさい！」"
translation = "「맞아! 남자애니까 똑 부러지게 말해!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ヴィーナスまで加勢してるし」"
translation = "「비너스까지 가세하고 있네」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ですが、会長の本命が誰なのかは、少し気になりますね」"
translation = "「하지만 회장의 진심이 누구인지는 조금 궁금하긴 하네요」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「会長サンは助兵衛そうだから……やっぱり、色っぽい年上の先輩が一番かい？」"
translation = "「회장님은 호색한 같으니까…… 역시 섹시한 연상의 선배가 제일인가?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あらあら、私のことかしら♪」"
translation = "「어머 어머, 내 이야기일까♪」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「一目で分かる大きな乳房に、溢れる母性……普通の男なら、イチコロで堕ちちまうぜ」"
translation = "「한눈에 봐도 커다란 유방에 넘치는 모성…… 평범한 남자라면 단번에 넘어갈 거다」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「照れるわね～♪」"
translation = "「부끄러운걸～♪」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「……ほう、それでも本命じゃないときたか。だったら逆に年下好きなのかい？」"
translation = "「……호오, 그래도 본심이 아니라는 건가. 그럼 반대로 연하 취향인가?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ということは私ですかね」"
translation = "「그렇다면 저일까요」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「身体は未成熟……だけど、精神年齢は高めのギャップがいい！\u3000こいつは罪な香りがするぜい……」"
translation = "「몸은 미성숙…… 하지만 정신 연령은 높은 갭이 좋아! 이건 범죄의 향기가 나는구먼……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「まだまだ成長途中ですが、会長はそういうのがお好みですか？」"
translation = "「아직 한창 성장 중입니다만, 회장은 그런 게 취향입니까?」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「ふむ違うのか……年上でも年下でもないとすると……」"
translation = "「흠, 아닌가…… 연상도 연하도 아니라면……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「もちろん、私が一番よね！」"
translation = "「물론 내가 제일이지!」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「そこの大人しそうな同級生が好みかい？」"
translation = "「거기 얌전해 보이는 동급생이 취향인가?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「え！？\u3000私……！」"
translation = "「에!? 나……!」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「一見地味に見えるが、自分だけが分かってあげられる魅力に溢れてやがる……守ってあげたくなるような女の子らしさが抜群だぜい！」"
translation = "「얼핏 수수해 보이지만, 자신만이 알아줄 수 있는 매력이 넘쳐흐르고 있어…… 지켜주고 싶어지는 여자아이다움이 발군이로군!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そ、そんな私なんて、なんの取り柄もないのにっ」"
translation = "「그, 그런 나 같은 건 아무 장점도 없는데」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「ううむ……それでも違うって感じだな……。じゃあ残るは……」"
translation = "「으음…… 그래도 아니라는 느낌이네……. 그럼 남은 건……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そう、私よ！」"
translation = "「그래, 나야!」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「いや、ないな……」"
translation = "「아니, 없군……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「なんでよ！」"
translation = "「왜야!」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「いやぁ、前会長さんは乙女力が足りねぇぜ」"
translation = "「아니, 전 회장님은 소녀력이 부족해」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「何を言ってるの？\u3000星徒会随一の乙女と言えばこの私よ。ほら、マトイも言ってやりなさい」"
translation = "「무슨 소리야? 성도회 제일의 소녀라면 바로 나야. 자, 마토이도 한마디 해줘」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「うーん……乙女、だと思うよ？」"
translation = "「으음…… 소녀, 라고 생각해?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「なんで疑問形なのよ！\u3000アナからも何か言ってやってちょうだい！」"
translation = "「왜 의문형인 거야! 아나도 한마디 좀 해줘!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ノーコメントでお願いします」"
translation = "「노코멘트로 부탁드립니다」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「ダメじゃねぇか」"
translation = "「글러 먹었구먼」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「しかし、結局会長サンの本命は分からず仕舞いだな」"
translation = "「하지만 결국 회장님의 본심은 알 수 없었군」"

[[dialogue]]
speaker = "unk"
original = "仲間に順位付けなんて出来ないよ"
translation = "동료에게 순위를 매길 수는 없어."

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「そうやって、あやふやにするのがハーレムのコツってわけかい」"
translation = "「그렇게 애매하게 만드는 게 하렘의 요령이라는 건가」"

[[dialogue]]
speaker = "unk"
original = "ヒヨだって、大切な後輩だよ"
translation = "히요도 소중한 후배야."

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「なっ！？\u3000あたしまで会長サンの守備範囲なのかい！？\u3000あたしなんて、全然良かねぇだろ……」"
translation = "「뭣!? 나까지 회장님의 수비 범위인 거냐!? 나 같은 건 전혀 좋지 않을 텐데……」"

[[dialogue]]
speaker = "unk"
original = "ううん、可愛い後輩だよ"
translation = "아니, 귀여운 후배야."

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「そ、そうやって籠絡しようたって、無駄だからなっ」"
translation = "「그, 그렇게 구슬리려 해도 소용없으니까!」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「あたしは姐さん一筋なんでいっ、会長サンなんか興味ないやい」"
translation = "「나는 누님 일편단심이다, 회장님 같은 건 관심 없다고!」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「だがまあ……姐さんの安全を守るためにも、会長サンの監視は続けさせてもらうぜい！」"
translation = "「하지만 뭐…… 누님의 안전을 지키기 위해서라도 회장님 감시는 계속하도록 하겠어!」"

