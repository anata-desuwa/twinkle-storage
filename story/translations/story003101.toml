[[dialogue]]
speaker = "unk"
original = "新たに迎えた元日。"
translation = "새롭게 맞이한 설날."

[[dialogue]]
speaker = "unk"
original = "流星学園附属校３年生の『染井シズハ』は、サーシャと一緒に浅草の有名なお寺へ初詣にやってきていた。"
translation = "유성 학원 부속교 3학년 『소메이 시즈하』는 사샤와 함께 아사쿠사의 유명한 절로 첫 참배를 왔다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「わぁ～♪\u3000すごく大きな提灯！\u3000この門を進んだ先にお寺があるんだね～」"
translation = "「와아~♪ 정말 큰 등불! 이 문을 지나간 끝에 절이 있는 거네~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふふっ、そうよ～。昔から星騎士にとってご利益のあるお寺って言われてて、私たちも以前ここで晴れ着フォームに覚醒したの」"
translation = "「후후후, 맞아~. 옛날부터 성기사에게 영험이 있는 절이라고 불려서 우리들도 예전에 여기서 설빔 폼으로 각성했단다」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「サーシャさんも、妹のソフィア先輩と、ここで仲直りしたんだよね？」"
translation = "「사샤 언니도 동생인 소피아 선배랑 여기서 화해한 거지?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ええ、そうなの。だから縁起もいいかなって。シズハちゃんもきっと、ソフィと仲良くなれると思うわ」"
translation = "「응, 맞아. 그래서 운도 좋을 것 같아서. 시즈하짱도 분명 소피와 사이좋게 지낼 수 있을 거라 생각해」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「うん……ソフィア先輩はもう少ししたら来るって？」"
translation = "「응…… 소피아 선배는 조금 이따가 온다고?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「さっきＤＩＳＣでメッセージが送られてきたけど、こっちにはもう向かってるみたい」"
translation = "「방금 DISC로 메시지가 왔는데 이쪽으로 벌써 오고 있는 모양이야」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「そっか。いざ対面するとなると、ちょっと緊張するな～……」"
translation = "「그렇구나. 막상 대면하게 되니까 좀 긴장되네~……」"

[[dialogue]]
speaker = "unk"
original = "サーシャの妹である『奏ソフィア』。シズハがサーシャと知り合って以来、実はまだ１度も彼女と対面して話したことがなかった。"
translation = "사샤의 동생인 『카나데 소피아』. 시즈하가 사샤와 알게 된 이래 사실 아직 한 번도 그녀와 대면해서 이야기한 적이 없었다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "（サーシャさんの<b>本物</b>の妹さんだから、私が勝手に負い目みたいなのを感じちゃってるせいなんだけど……）"
translation = "(사샤 언니의 **진짜** 여동생이니까 내가 멋대로 부채감 같은 걸 느끼고 있는 탓이기도 하지만……)"

[[dialogue]]
speaker = "unk"
original = "とある一件で、サーシャの『偽物の妹』になりすましていた経験があるシズハは、ソフィアと直接会うのを、これまでなんとなく避け続けてしまっていた。"
translation = "어떤 사건으로 사샤의 『가짜 여동생』 행세를 했던 경험이 있는 시즈하는 소피아와 직접 만나는 것을 지금까지 왠지 모르게 계속 피해왔었다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「――大丈夫よ、シズハちゃん」"
translation = "「――괜찮아, 시즈하짱」"

[[dialogue]]
speaker = "unk"
original = "シズハが少し考え込んでいると、頭の上にサーシャの手が優しく置かれる。"
translation = "시즈하가 조금 생각에 잠겨 있자 머리 위에 사샤의 손이 부드럽게 얹혔다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ソフィにも事情はある程度話してあるし、私もそばに付いてるわ。だから、大丈夫」"
translation = "「소피에게도 사정은 어느 정도 말해뒀고 나도 곁에 있을게. 그러니까 괜찮아」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「サーシャさん……うん、ありがとう。私、勇気を出して、ちゃんと話してみるね」"
translation = "「사샤 언니…… 응, 고마워. 나 용기 내서 제대로 이야기해 볼게」"

[[dialogue]]
speaker = "unk"
original = "と、その時だった。"
translation = "그런데 그때였다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「サーシャ先輩、シズハさん。ハッピニューイヤーです」"
translation = "「사샤 선배, 시즈하 씨. 해피 뉴 이어입니다」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あら、アナちゃん！\u3000聞いていた通り今日、初詣にきたのね～♪」"
translation = "「어머, 아나짱! 듣던 대로 오늘 첫 참배를 왔구나~♪」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ええ。ひょっとしたら会えるかもと言っていましたが、見事に遭遇できましたね」"
translation = "「네. 혹시 만날 수 있을지도 모른다고 생각했습니다만 훌륭하게 조우했네요」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「お２人共、あけおめマジカルで～す☆\u3000アナちゃんと一緒に初詣に来ちゃいました～♪」"
translation = "「여러분, 아케오메 매지컬입니다~☆ 아나짱이랑 같이 첫 참배 하러 왔어요~♪」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あら～、リーリアちゃん、あけましておめでと～♪\u3000今年もよろしくね～♪」"
translation = "「어머~ 리리아짱, 새해 복 많이 받아~♪ 올해도 잘 부탁해~♪」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「はいっ☆\u3000可愛い後輩として、今年もよろしくお願いします～♪」"
translation = "「네에☆ 귀여운 후배로서 올해도 잘 부탁드립니다~♪」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「シズハちゃんとは、こうして面と向かって話すのは初めてですよね？\u3000新星学園１年、魔女の星騎士、『<ruby>渋谷<rt>しぶたに</rt></ruby>リーリア』で～す☆」"
translation = "「시즈하짱이랑은 이렇게 마주 보고 이야기하는 건 처음이죠? 신성 학원 1학년, 마녀 성기사 『시부야 리리아』입니다~☆」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「初めまして、附属校３年の染井シズハです！\u3000リーリア先輩のことは、会長や同じクラスのサチちゃんから、よく聞いていました」"
translation = "「처음 뵙겠습니다, 부속교 3학년 소메이 시즈하입니다! 리리아 선배님 이야기는 회장님이나 같은 반 사치짱한테 자주 들었어요」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ふふふっ、シズハちゃんからは、サチちゃんと同じマジカルな気配を感じていたので、前から注目していたんですよ～♪」"
translation = "「후후후, 시즈하짱한테서는 사치짱과 같은 매지컬한 기색이 느껴져서 전부터 주목하고 있었거든요~♪」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「今回、新しい『晴れ着フォーム』仲間っていう縁もできましたし、これから仲良くしましょうね～☆」"
translation = "「이번에 새로운 『설빔 폼』 동료라는 인연도 생겼으니 앞으로 사이좋게 지내요~☆」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「はいっ、よろしくお願いします、リーリア先輩♪」"
translation = "「네, 잘 부탁드립니다, 리리아 선배♪」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「確かに。リーリアさんの言う通り、ヘレナさんから新たに晴れ着フォームをもらった４人が、奇しくも揃いましたね」"
translation = "「확실히 리리아 씨 말대로 헬레나 씨에게 새롭게 설빔 폼을 받은 4명이 기묘하게도 모였군요」"

[[dialogue]]
speaker = "unk"
original = "新しいお正月に向けて、九浄ヘレナは新しい人工戦闘服を用意していた。"
translation = "새로운 정월을 향해 쿠죠 헬레나는 새로운 인공 전투복을 준비했었다."

[[dialogue]]
speaker = "unk"
original = "今回用意できたのは４着。新たな晴れ着フォームの使用者に選ばれたのが、ここにいるアナたち４人だった。"
translation = "이번에 준비된 것은 4벌. 새로운 설빔 폼의 사용자로 선택된 것이 여기 있는 아나 일행 4명이었다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「うふふっ、新年から縁があるわね～♪\u3000それにしても３人共すごく可愛い晴れ着で、お姉ちゃん、思わずハグしたくなっちゃうわ～♪\u3000ぎゅ～っ<emoji=heart04>」"
translation = "「우후후, 신년부터 인연이 있네~♪ 그나저나 셋 다 정말 귀여운 설빔이라 언니가 나도 모르게 허그하고 싶어지네~♪ 꼬옥~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言って、サーシャがリーリアに抱き着いて、ハグをする。"
translation = "그렇게 말하며 사샤가 리리아에게 달려들어 허그를 한다."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「わぁっ！？\u3000もう、サーシャさん、いきなり抱き着かれたら、ビックリしちゃいますよ～☆」"
translation = "「와앗!? 정말, 사샤 언니 갑자기 껴안으면 깜짝 놀란다니까요~☆」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "（すごい、サーシャさんのおっぱい、こぼれそうな程にマジカル大きい……！\u3000これが天然物の巨乳……ぶっちゃけ羨ましいっ）"
translation = "(대단해, 사샤 언니 가슴, 쏟아질 정도로 매지컬하게 커……! 이게 천연물 거유…… 솔직히 부럽다)"

[[dialogue]]
speaker = "unk"
original = "ちなみに、リーリアの晴れ着フォームの胸は、相変わらず『幻影魔法』で盛られている。"
translation = "참고로 리리아의 설빔 폼 가슴은 여전히 『환영 마법』으로 보정되어 있다."

[[dialogue]]
speaker = "unk"
original = "胸元の露出が大きい服であっても、パッドで物理的に盛り上げたあと、幻影魔法でテクスチャーを貼り、他人からは巨乳にしか見えない完璧な仕上がりである。"
translation = "가슴 부위의 노출이 큰 옷일지라도 패드로 물리적으로 보정한 뒤 환영 마법으로 텍스처를 입혀 타인이 보기에는 거유로밖에 보이지 않는 완벽한 마무리였다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「サーシャ先輩は前の晴れ着フォームもセクシーでしたが、パワーアップした『スーパー晴れ着フォーム』は、色気も更にスーパーになっていますね」"
translation = "「사샤 선배는 예전 설빔 폼도 섹시했지만 파워업한 『슈퍼 설빔 폼』은 색기가 더욱 슈퍼해졌네요」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ほんとう？\u3000ありがと～♪\u3000私だけまた新しく作り直してもらっちゃって、なんだかちょっと申し訳ない気持ちもあるけれど……」"
translation = "「정말? 고마워~♪ 나만 또 새로 만들어주셔서 왠지 좀 미안한 마음도 있지만……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そこはヘレナさん曰く、サーシャ先輩は特に晴れ着フォームとの相性がいいらしいとのことですので、それこそ縁があったと素直に喜んでいいと思いますよ」"
translation = "「그건 헬레나 씨 말에 따르면 사샤 선배는 특히 설빔 폼과의 상성이 좋다고 하니 그야말로 인연이 닿았다고 솔직히 기뻐해도 된다고 봐요」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「そうそう！\u3000美人なサーシャさんにイケイケゴーゴーで、すごく似合ってるし♪」"
translation = "「맞아 맞아! 미인인 사샤 언니한테 이케 이케 고고로 정말 잘 어울리고♪」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「シズハちゃんもありがとう♪\u3000なら、せっかく作ってもらった以上は、またちゃんと<b>起動</b>させられるように頑張らないとね～」"
translation = "「시즈하짱도 고마워♪ 그럼 모처럼 만들어주신 이상 다시 제대로 **기동**시킬 수 있도록 노력해야겠네~」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「そこですよね～。私もまだ全然、戦闘服として起動することができなくて～」"
translation = "「그 점이죠~. 저도 아직 전혀 전투복으로서 기동시킬 수가 없어서~」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「フォームチェンジ技術は、私とアニマ先輩で共同研究し、日進月歩でアップデートを重ねていますが、晴れ着フォームの起動条件は未だはっきりと解明はされていません」"
translation = "「폼 체인지 기술은 저와 아니마 선배가 공동 연구하여 일진월보로 업데이트를 거듭하고 있습니다만 설빔 폼의 기동 조건은 아직 확실히 해명되지 않았습니다」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「それならせっかく４人集まったわけですし、初詣をしながらどうやったら起動できるか、色々試してみませんか？」"
translation = "「그럼 모처럼 4명이 모였으니 첫 참배를 하면서 어떻게 하면 기동할 수 있을지 여러 가지 시험해 보지 않을래?」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「サーシャさんも前に初詣へきた時、晴れ着フォームが起動したって言ってたし」"
translation = "「사샤 언니도 전에 첫 참배 왔을 때 설빔 폼이 기동했다고 했잖아」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「確かに、お寺への参拝を済ませることで起動条件を満たす可能性もゼロではありません。私的にはノープロブレムです」"
translation = "「확실히 절 참배를 마침으로써 기동 조건을 만족할 가능성도 제로가 아닙니다. 제 입장에서는 노 프로블럼입니다」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「シズハちゃん、ナイスアイデア☆\u3000その方が楽しい初詣になりそうだし、私も賛成～♪」"
translation = "「시즈하짱, 나이스 아이디어☆ 그게 더 즐거운 첫 참배가 될 것 같고 저도 찬성~♪」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「うふふっ、私もいいわよ～。後でソフィ達も合流するし、他のアイディアを聞いてみるのもよさそうね～」"
translation = "「우후후, 나도 좋아~. 나중에 소피 일행도 합류할 테니 다른 아이디어를 들어보는 것도 좋겠네~」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「よ～し、それじゃあみんなで、初詣にいけいけゴーゴー♪」"
translation = "「좋아~ 그럼 다 같이 첫 참배 하러 이케 이케 고고♪」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「お～☆」"
translation = "「오~☆」"

[[dialogue]]
speaker = "unk"
original = "そうして、門をくぐり抜けて、お寺へと向かい始める４人。"
translation = "그렇게 문을 통과해 절로 향하기 시작하는 4명."

[[dialogue]]
speaker = "unk"
original = "その様子を建物の影から見つめている者がいた。"
translation = "그 모습을 건물 그림자에서 지켜보는 자가 있었다."

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「……ふん」"
translation = "「……흥」"

[[dialogue]]
speaker = "unk"
original = "新たな晴れ着を巡って、星騎士たちの初詣が始まろうとしていた。"
translation = "새로운 설빔을 둘러싸고 성기사들의 첫 참배가 시작되려 하고 있었다."

