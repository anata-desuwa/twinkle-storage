[[dialogue]]
speaker = "unk"
original = "第６話,グレイスの決意,B"
translation = "제6화, 그레이스의 결의, B"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「まあ、こんな感じですね！\u3000１０年前、デネブの新星学園に潜入した時にお２人に出会ったんです！」"
translation = "「뭐, 이런 느낌이에요! 10년 전 데네브의 신성학원에 잠입했을 때 두 분을 만났답니다!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……君は昔からけっこうめちゃくちゃだったんだな」"
translation = "「……너는 옛날부터 꽤 막무가내였구나」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「めちゃくちゃだなんてとんでもない！\u3000大事なことですよ。自分の目で見て判断しなければ、真実はわかりませんからね！」"
translation = "「막무가내라니 천만의 말씀! 중요한 일이에요. 제 눈으로 보고 판단하지 않으면 진실을 알 수 없으니까요!」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「それに私、わかっちゃいました。こっちの世界の魔王さんとヴィーナスさんは──」"
translation = "「게다가 저, 알아버렸어요. 이쪽 세계의 마왕님과 비너스 씨는──」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……私たちは？」"
translation = "「……우리는?」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「お付き合いしていないっ！\u3000そうでしょう！\u3000デネブのお２人と雰囲気が違いますからね！！」"
translation = "「사귀지 않아! 그렇죠! 데네브의 두 분과는 분위기가 다르니까요!!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「いきなりすぎて意味がわからないわ！？」"
translation = "「너무 갑작스러워서 의미를 모르겠는데!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「というか私とパパは、お付き合いなんていう次元を飛び越えた関係なんですけど！？」"
translation = "「그보다 나랑 파파는 사귄다느니 하는 차원을 뛰어넘은 관계거든!?」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「今度はパパ……？\u3000あの、たまにヴィーナスさん、おかしなことを言いますよね。いったいどういう事なんです？」"
translation = "「이번엔 파파……? 저기, 가끔 비너스 씨는 이상한 소리를 하네요. 대체 어떻게 된 일인가요?」"

[[dialogue]]
speaker = "unk"
original = "デネブで暮らしてきたグレイスにとって、無関係の話ではない──俺はグレイスにできる限りのことを伝えた。"
translation = "데네브에서 살아온 그레이스에게 무관한 이야기가 아니다── 나는 그레이스에게 가능한 한 모든 것을 전달했다."

[[dialogue]]
speaker = "unk"
original = "ヴィーナスが『人間に転生した女神テルル』と『デネブの緋宮クロト』の子であること。"
translation = "비너스가 『인간으로 전생한 여신 테루루』와 『데네브의 히노미야 쿠로토』의 아이라는 것."

[[dialogue]]
speaker = "unk"
original = "デネブの緋宮クロトが、最期の最期までデネブのために戦い続け、事切れたこと。"
translation = "데네브의 히노미야 쿠로토가 마지막의 마지막까지 데네브를 위해 계속 싸우다 숨을 거두었다는 것."

[[dialogue]]
speaker = "unk"
original = "戦死する直前に、アルタイル世界にヴィーナスを託したことも──"
translation = "전사하기 직전에 알타이르 세계에 비너스를 맡겼다는 사실도──"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「デネブのクロトさんと、テルルさんのお子様……そう、だったんですね……」"
translation = "「데네브의 쿠로토 씨와 테루루 씨의 아이…… 그랬, 군요……」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「びっくりしましたけど……うん。ようやくスッキリしました。お２人ともそっくりなのに、私の記憶とちょびっとずつ違ってましたから」"
translation = "「깜짝 놀랐지만…… 응. 이제야 속이 시원해요. 두 분 다 똑 닮았는데 제 기억과 조금씩 달랐거든요」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「それに、デネブの魔王さんの最期も教えていただき、ありがとうございました……」"
translation = "「게다가 데네브의 마왕님의 최후도 알려주셔서 감사합니다……」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「あの人は卑怯者なんかじゃない。裏切り者でもない……」"
translation = "「그분은 비겁자 같은 게 아니었어. 배신자도 아니야……」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「私との約束を違えないように、戦ってくれていた……あはは……そう、でしたか……」"
translation = "「나와의 약속을 어기지 않으려고 싸워주고 계셨어…… 아하하…… 그랬, 군요……」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「…………魔王さんは、ちゃんと私との約束を、果たそうとしてくれたんですね」"
translation = "「…………마왕님은 제대로 저와의 약속을 지키려 해주셨던 거네요」"

[[dialogue]]
speaker = "unk"
original = "心のしこりが消えた今ならば、グレイスに『ルヴィネ死亡の未来』のことを伝えられる気がした。"
translation = "마음의 응어리가 사라진 지금이라면 그레이스에게 『루비네 사망의 미래』에 대해 전할 수 있을 것 같았다."

[[dialogue]]
speaker = "unk"
original = "俺は慎重に言葉を選んで、ジグの星眼のこと、そして起こりうる未来の可能性について話をした。"
translation = "나는 신중하게 단어를 골라 지그의 성안에 대해, 그리고 일어날 수 있는 미래의 가능성에 대해 이야기했다."

[[dialogue]]
speaker = "unk"
original = "ベアトリス同様に驚いていたグレイスだったが──"
translation = "베아트리스와 마찬가지로 놀라던 그레이스였지만──"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「──ルヴィが死んでしまう未来。それを変えて、リクリエを止める……それが魔王さんたちのスタンスなんですね」"
translation = "「──루비가 죽어버리는 미래. 그것을 바꾸고 리크리에를 멈춘다…… 그것이 마왕님들의 스탠스군요」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。だからグレイスにも協力してほしいんだ」"
translation = "「아아. 그래서 그레이스도 협력해줬으면 해」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……俺たちと一緒に、戦ってくれないか」"
translation = "「……우리와 함께 싸워주지 않겠어?」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「──はい！」"
translation = "「──네!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ず、ずいぶんあっさりなのね……？」"
translation = "「어, 엄청 시원시원하네……?」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「魔王さんもヴィーナスさんも、嘘を言っているようには思えません。それに……」"
translation = "「마왕님도 비너스 씨도 거짓말을 하는 것 같지는 않아요. 게다가……」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「私もできることなら、デネブもアルタイルも両方が滅びない未来を目指したいです！」"
translation = "「저도 가능하다면 데네브도 알타이르도 둘 다 멸망하지 않는 미래를 지향하고 싶어요!」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「極星学園星徒会、グレイス・オベロニア。あなたたちアルタイルと共闘します」"
translation = "「극성학원 성도회, 그레이스 오베로니아. 당신들 알타이르와 공투하겠습니다」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「ルヴィの説得と救出……私にも、協力させてください！」"
translation = "「루비의 설득과 구출…… 저도 협력하게 해주세요!」"

[[dialogue]]
speaker = "unk"
original = "その日の夜──極星学園生の就寝場所となっている会議室。"
translation = "그날 밤── 극성학원생들의 취침 장소가 된 회의실."

[[dialogue]]
speaker = "unk"
original = "用意された寝具に頭までくるまって、グレイスは──"
translation = "준비된 침구에 머리까지 파묻고 그레이스는──"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「…………魔王さん、ごめんなさい」"
translation = "「…………마왕님, 죄송해요」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「指きりしてくれたのに……あなたは嘘なんて吐かないって、わかってたはずなのに……１０年も恨んで……本当にごめんなさい……」"
translation = "「손가락 걸어주셨는데…… 당신은 거짓말 같은 건 하지 않는다고 알고 있었을 텐데…… 10년이나 원망해서…… 정말 죄송해요……」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「私、絶対にリクリエを止めてみせます。もう二度と、大切なものを亡くさないように……」"
translation = "「저, 반드시 리크리에를 멈춰 보이겠어요. 다시는 소중한 것을 잃어버리지 않도록……」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「世界も……<ruby>友達<rt>ルヴィ</rt></ruby>も……絶対に手放しませんから……」"
translation = "「세계도…… <ruby>친구<rt>루비</rt></ruby>도…… 절대로 놓지 않을 테니까요……」"

[[dialogue]]
speaker = "unk"
original = "あの日に憧れた『魔王さん』はもう死んでしまって、どこにもいない。"
translation = "그날 동경했던 『마왕님』은 이제 죽어버려 어디에도 없다."

[[dialogue]]
speaker = "unk"
original = "けれど、グレイスは誓う。あの日のように。"
translation = "하지만 그레이스는 맹세한다. 그날처럼."

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「あなたの──デネブの英雄の意思を継ぎます。今度こそ、破られない約束をしますから……」"
translation = "「당신의── 데네브의 영웅의 의지를 잇겠어요. 이번에야말로 깨지지 않는 약속을 할 테니까……」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「もう一度、私と指きり、してくれますか……？」"
translation = "「다시 한번 저와 손가락 걸기, 해주실래요……?」"

[[dialogue]]
speaker = "unk"
original = "立てた小指に願いを込めて、明日からはまたたくさん笑うことも同時に誓って。"
translation = "세운 새끼손가락에 소원을 담아, 내일부터는 다시 많이 웃을 것도 동시에 맹세하며."

[[dialogue]]
speaker = "unk"
original = "グレイスは、その夜だけは──デネブのクロトへ想いを馳せるのだった。"
translation = "그레이스는 그날 밤만큼은── 데네브의 쿠로토를 추억하는 것이었다."

