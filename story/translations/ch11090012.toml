[[dialogue]]
speaker = "unk"
original = "第２話,アテネスと夢幻美術館,P"
translation = "제2화, 아테네스와 몽환 미술관 / P"

[[dialogue]]
speaker = "unk"
original = "アルテはこちらの世界にいる間、九浄家に身を寄せている。"
translation = "아르테는 이쪽 세계에 있는 동안 쿠죠 가문에 머물고 있다."

[[dialogue]]
speaker = "unk"
original = "何だかんだ要領の良さそうなアルテのことだから、上手くやっているのだろうとは思ったが、念のため様子を見に来た。"
translation = "이래저래 요령 좋아 보이는 아르테니까 잘하고 있을 거라 생각했지만, 만약을 위해 상태를 보러 왔다."

[[dialogue]]
speaker = "ヘレナ"
original = "「──『アテネス』か……聞けば聞くほど興味深い世界だな」"
translation = "「──『아테네스』인가…… 들으면 들을수록 흥미로운 세계군.」"

[[dialogue]]
speaker = "アルテ"
original = "「アテネスは世界最大の芸術都市ですからね。世界中から私のような一流の藝術家や芸術品が集まってきます」"
translation = "「아테네스는 세계 최대의 예술 도시니까요. 전 세계에서 저 같은 일류 예술가나 예술품이 모여듭니다.」"

[[dialogue]]
speaker = "アルテ"
original = "「そして、そんな芸術品の数々には魂が宿ります」"
translation = "「그리고 그런 예술품들에는 혼이 깃들지요.」"

[[dialogue]]
speaker = "アルテ"
original = "「それらが覚醒して人の姿をとったものがイマージュというわけです」"
translation = "「그것들이 각성하여 인간의 모습을 취한 것이 이마주라는 것입니다.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「へえ……じゃあ夢幻美術館には藝術家の他にも、そのイマージュたちが一緒に暮らしてるんだ」"
translation = "「헤에…… 그럼 몽환 미술관에는 예술가 말고도 그 이마주들이 함께 살고 있구나.」"

[[dialogue]]
speaker = "アルテ"
original = "「そういうことですね」"
translation = "「그렇게 되는군요.」"

[[dialogue]]
speaker = "unk"
original = "夢のある世界だなあ"
translation = "꿈이 있는 세계네"

[[dialogue]]
speaker = "アルテ"
original = "「良いことばかりではありませんよ」"
translation = "「좋은 일만 있는 건 아니에요.」"

[[dialogue]]
speaker = "アルテ"
original = "「一流の藝術家が集まり、一流の芸術品が生み出されれば、それを狙う賊も集まってくるわけです」"
translation = "「일류 예술가가 모이고 일류 예술품이 탄생하면 그걸 노리는 도적들도 모이기 마련이니까요.」"

[[dialogue]]
speaker = "アルテ"
original = "「そういった不届き者から芸術品たちを守り、街の治安維持に貢献するのも私たちの役目でした」"
translation = "「그런 무뢰한들로부터 예술품들을 지키고 도시의 치안 유지에 공헌하는 것도 저희의 역할이었습니다.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「貴殿らは自らそういった輩に対抗していたのか？」"
translation = "「귀공들은 스스로 그런 무리에 대항했던 건가?」"

[[dialogue]]
speaker = "アルテ"
original = "「ええ。もちろん市警はいるんですが、市警ではどうしようもないこともあるので」"
translation = "「네. 물론 시경이 있습니다만, 시경으로는 어찌할 수 없는 일도 있어서요.」"

[[dialogue]]
speaker = "アルテ"
original = "「それに、芸術から生まれるのはイマージュばかりではありません。負の感情から生まれた芸術品は、人々を襲う『死の芸術』になることもあるんです」"
translation = "「게다가 예술에서 태어나는 건 이마주뿐만이 아닙니다. 부정한 감정에서 태어난 예술품은 사람들을 습격하는 『죽음의 예술』이 되기도 하죠.」"

[[dialogue]]
speaker = "アルテ"
original = "「そんな『死の芸術』と、それらを故意に生み出す『死の芸術家』を、市警が相手にするのは難しいですからね。私たち藝術家とイマージュの出番、というわけです」"
translation = "「그런 『죽음의 예술』과 그것들을 고의로 만들어내는 『죽음의 예술가』를 시경이 상대하는 건 어려우니까요. 저희 예술가와 이마주가 나설 차례인 겁니다.」"

[[dialogue]]
speaker = "unk"
original = "そっちの世界もいろいろ大変なんだな"
translation = "그쪽 세계도 여러모로 힘들구나"

[[dialogue]]
speaker = "アルテ"
original = "「まあ私たちも１人ではありません。大勢の仲間がいますから」"
translation = "「뭐 저희도 혼자가 아니니까요. 수많은 동료가 있으니.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ふむ……しかしそんな大勢が暮らしているとなると、夢幻美術館というのは相当な大きさなのだろうな」"
translation = "「흠…… 하지만 그렇게 많은 인원이 살고 있다면 몽환 미술관이라는 곳은 상당한 규모겠군.」"

[[dialogue]]
speaker = "アルテ"
original = "「そうですね。初めてだと、建物の中で迷子になってしまう子もいるほどです」"
translation = "「그렇죠. 처음 오면 건물 안에서 길을 잃어버리는 아이가 있을 정도니까요.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「そんなに大きな建物なのか……これは大事業になりそうだな」"
translation = "「그렇게 큰 건물인가…… 이건 대사업이 되겠군.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ヘレナちゃん、もしかして？」"
translation = "「헬레나짱, 설마?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「うむ！\u3000我が九浄家も美術館の建設に着手しようと思ってな！」"
translation = "「음! 우리 쿠죠 가문도 미술관 건설에 착수할까 생각해서 말이다!」"

[[dialogue]]
speaker = "unk"
original = "またそんな思い付きで……"
translation = "또 그런 즉흥적인 생각을……"

[[dialogue]]
speaker = "ヘレナ"
original = "「思い付きではないぞ……私も以前より美術品を収集する趣味があってな。いっそそれらを展示する場所を用意したいと考えていたのだ」"
translation = "「즉흥적인 게 아니다…… 나도 이전부터 미술품을 수집하는 취미가 있어서 말이지. 이왕이면 그것들을 전시할 장소를 마련하고 싶다고 생각하고 있었다.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「貴殿の話す夢幻美術館は、まさに私の理想とする美術館のそれだ。ぜひ色々な意見を聞かせて欲しい」"
translation = "「귀공이 말하는 몽환 미술관은 그야말로 내 이상적인 미술관의 모습이다. 부디 여러 의견을 들려주었으면 한다.」"

[[dialogue]]
speaker = "アルテ"
original = "「そうですね……」"
translation = "「그렇군요……」"

[[dialogue]]
speaker = "アルテ"
original = "「私から言えることがひとつだけあるとしたら、それは美術館の管理者がとても重要な存在だということです」"
translation = "「제가 드릴 수 있는 말이 하나 있다면, 그건 미술관의 관리자가 매우 중요한 존재라는 것입니다.」"

[[dialogue]]
speaker = "アルテ"
original = "「夢幻美術館では、先代から今の館長に引き継がれる間に、館長不在の期間があったらしいのですが、それだけで一瞬で廃れたと聞いていますからね」"
translation = "「몽환 미술관에서는 선대에서 지금의 관장으로 이어지는 사이에 관장 부재 기간이 있었다고 하는데, 그것만으로 순식간에 폐허가 되었다고 들었으니까요.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ほう。では館長不在で一度廃れた美術館を、今の館長がその手腕によって立て直した、ということか」"
translation = "「호오. 그럼 관장 부재로 한 번 폐허가 된 미술관을 지금의 관장이 그 수완으로 다시 세웠다는 건가.」"

[[dialogue]]
speaker = "アルテ"
original = "「ん……まあ……そういうことですね」"
translation = "「음…… 뭐…… 그렇게 되네요.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「急に歯切れが悪くなったわね。今の館長さん、ダメな人なの？」"
translation = "「갑자기 말이 흐려지네. 지금 관장님, 별로인 사람이야?」"

[[dialogue]]
speaker = "アルテ"
original = "「そういうわけではありません。……優秀な部類の人ではあると思います。さすがにそれは認めないわけにはいきません」"
translation = "「그런 건 아닙니다. ……우수한 부류의 사람이라고는 생각해요. 과연 그건 인정하지 않을 수 없으니까요.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「じゃあ何が不満なの？\u3000仕事はできる人なんでしょ？」"
translation = "「그럼 뭐가 불만인데? 일은 잘하는 사람이라며?」"

[[dialogue]]
speaker = "アルテ"
original = "「それも……少し違うというか、何と言ったらいいのでしょうね……」"
translation = "「그것도…… 조금 다르다고 해야 하나, 뭐라고 말하면 좋을까요……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「じゃあやっぱりダメな人なの？」"
translation = "「그럼 역시 별로인 사람이야?」"

[[dialogue]]
speaker = "アルテ"
original = "「……そんなことはありません。まがりなりにも館長ですので」"
translation = "「……그렇지 않습니다. 명색이 관장이니까요.」"

[[dialogue]]
speaker = "アルテ"
original = "「私を見つけて夢幻美術館に連れてきたことは大きな功績です。ええ、館長の最大のお手柄と言ってもいいでしょう」"
translation = "「저를 찾아내서 몽환 미술관으로 데려온 건 큰 공적입니다. 네, 관장의 최대 공로라고 해도 좋겠죠.」"

[[dialogue]]
speaker = "アルテ"
original = "「ただ、色々と頼りなかったり危なっかしかったりするのです。お人好しで、人のフォローをして自分の仕事をため込んで、夜も遅くて徹夜もしばしば……」"
translation = "「다만 여러모로 미덥지 못하거나 위태로울 때가 있어요. 오지랖이 넓어서 남의 뒷바라지하느라 제 일을 쌓아두고, 밤도 늦고 철야도 잦고……」"

[[dialogue]]
speaker = "アルテ"
original = "「だから私が一緒に行動してサポートしてあげなくてはならない、困った人なのです」"
translation = "「그러니까 제가 같이 행동하며 서포트해주지 않으면 안 되는, 곤란한 사람인 겁니다.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "（ねえねえ、クロト。私だんだん分かってきたんだけど、アルテがこういう憎まれ口を叩く時って……）"
translation = "（있잖아, 쿠로토. 나 점점 알 것 같은데, 아르테가 이런 식으로 험담을 할 때 말이야……）"

[[dialogue]]
speaker = "unk"
original = "むしろ心を許してる人？"
translation = "오히려 마음을 열고 있는 사람?"

[[dialogue]]
speaker = "アルテ"
original = "「こほん……そこの２人、何をこそこそ話しているのですか？」"
translation = "「코흠…… 거기 두 분, 뭘 소곤소곤 얘기하는 건가요?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふふん、べっつに～♪」"
translation = "「후흥, 아~무것도 아냐♪」"

[[dialogue]]
speaker = "アルテ"
original = "「変な勘違いはやめて頂けますか？\u3000迷惑なので」"
translation = "「이상한 오해는 말아 주시겠어요? 민폐니까.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「要するに、だ。美術館を誰に任せるか、それはとても重要な問題ということだな」"
translation = "「요컨대, 미술관을 누구에게 맡기느냐가 무척 중요한 문제라는 거군.」"

[[dialogue]]
speaker = "アルテ"
original = "「ええ、そういうことです」"
translation = "「네, 그렇습니다.」"

[[dialogue]]
speaker = "unk"
original = "答えながら、プイッと俺たちから顔を反らすアルテ。"
translation = "대답하며 휙 하고 우리로부터 고개를 돌리는 아르테."

[[dialogue]]
speaker = "unk"
original = "そんな珍しく可愛げのある様子を見せてくれたアルテに、ホッコリした気持ちになる俺とヴィーナスだった。"
translation = "그런 드물게 귀여운 구석을 보여준 아르테의 모습에 마음이 훈훈해지는 나와 비너스였다."

