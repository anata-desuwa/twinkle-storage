[[dialogue]]
speaker = "unk"
original = "そうして、修業の日々を経て迎えた、バレンタイン前日の夜。"
translation = "그렇게 수행의 나날을 거쳐 맞이한, 밸런타인 전날 밤."

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「……できたでござる」"
translation = "「……완성했소」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「ついに……！\u3000せつなの愛を込めた、最強の主様チョコが……！」"
translation = "「드디어……! 세츠나의 사랑을 담은, 최강의 주군 초코가……!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「まだ決戦前だけど、せつな――」"
translation = "「아직 결전 전이지만, 세츠나──」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「おめでとうと言っておくわ。結構キツいことも言ったけど、よく私の指導に耐え抜いたわね」"
translation = "「축하한다는 말을 해둘게. 꽤 심한 말도 했지만, 내 지도를 잘 견뎌냈네」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「他の料理はまだ無理だとしても、チョコ作りに関しては……私から特別に、合格点をあげるわ」"
translation = "「다른 요리는 아직 무리라 해도, 초코 만들기에 관해서는…… 내가 특별히 합격점을 줄게」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「光栄に思いなさい♪」"
translation = "「영광으로 생각하도록♪」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「蘭美殿……！\u3000ありがとうでございまする！」"
translation = "「라비 공……! 고맙소!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「今日まで親身にご指導下さったおかげで、せつなは手作りチョコを諦めず、形にすることができたでござる……！」"
translation = "「오늘까지 친절하게 지도해 주신 덕분에, 세츠나는 수제 초코를 포기하지 않고 완성할 수 있었소……!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「これであとは、明日のバレンタイン当日、会長に渡すだけね」"
translation = "「이제 남은 건, 내일 밸런타인 당일, 회장에게 건네주는 것뿐이네」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「はい！\u3000主様に――って」"
translation = "「네! 주군께── 엇」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「ハッ……！？\u3000し、しまったござる！\u3000どうしよう……すっかり忘れてしまっていたでござる！」"
translation = "「헉……!? 이, 이런! 어쩌지…… 완전히 잊고 있었소!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「え？\u3000どうしたの？\u3000なにをそんなに慌てて――」"
translation = "「에? 왜 그래? 뭘 그렇게 당황해서──」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「せつな、どうやってこのチョコを主様に渡すか、全然考えていなかったでござる！」"
translation = "「세츠나, 어떻게 이 초코를 주군께 건넬지 전혀 생각지 못했소!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「は？\u3000いや、普通に会長の前に行って、どうぞって渡せばいいじゃない」"
translation = "「하? 아니, 평소처럼 회장 앞에 가서, 여기요 하고 주면 되잖아」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「そ、そんな恥ずかしいこと、せつなはできないでござる！」"
translation = "「그, 그런 부끄러운 짓, 세츠나는 못 하오!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「なんでよ！？\u3000普段から主様主様～♪\u3000って、飼い猫みたいに懐いているでしょ！」"
translation = "「왜!? 평소에는 주군 주군~♪ 하면서 기르는 고양이처럼 따랐잖아!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「日頃の感謝の気持ちとか言って渡せば、今更そんな恥ずかしいことなんてないわよ！」"
translation = "「평소의 감사를 전한다고 하면서 주면, 이제 와서 부끄러울 것도 없잖아!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「バレンタインに男性へチョコを渡すのは、せつなの中では恋愛的行動なのでござる！\u3000せつなに恋愛は、刺激が強過ぎるでござる！」"
translation = "「밸런타인에 남성에게 초코를 주는 건 세츠나에겐 연애적인 행동이오! 세츠나에게 연애는 자극이 너무 강하오!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「よくそれで手作りチョコを渡そうと思ったわね！？」"
translation = "「그러면서 수제 초코를 줄 생각은 잘도 했네!?」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「だからこそ、主様にはバレンタインまで秘密にして、星徒会の会長机の上などにこっそり置いておく予定だったのでござる！」"
translation = "「그래서 주군께는 밸런타인까지 비밀로 하고 성도회의 회장 책상 위에 몰래 둘 예정이었소!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「しかし、今回作ったチョコレートでは、それができませぬ……！」"
translation = "「하지만 이번에 만든 초콜릿으로는 그럴 수가 없소……!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「かくなる上は、房中術の一環ということにして、裸にリボンを巻いたせつなのお色気で誤魔化しながら、チョコを――」"
translation = "「이렇게 된 이상, 방중술의 일환인 셈 치고 알몸에 리본을 감은 세츠나의 미인계로 얼버무리며 초코를──」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「いや、そっちの方が恥ずかしいでしょ！？\u3000なんでエロ方面は、そんな平気なのよ！」"
translation = "「아니, 그쪽이 훨씬 부끄럽잖아!? 왜 에로 쪽은 그렇게 태연한 건데!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「エロが好きという気持ちは、誰しもみんな心の奥に抱いているものだからでござる！\u3000せつなはエロに関して、自分の気持ちを隠さない派でござる！」"
translation = "「에로를 좋아하는 마음은 누구나 마음 깊은 곳에 품고 있는 것이기 때문이오! 세츠나는 에로에 관해서 자신의 솔직한 마음을 숨기지 않는 파요!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「そこはもうちょっと忍びなさいよ！？」"
translation = "「거기는 좀 더 인술을 발휘해 보라고!?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ああもう！\u3000仕方ないわね！\u3000ここまで来たら――」"
translation = "「아 정말! 어쩔 수 없네! 여기까지 왔으니──」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「そこも私が特別に、プロデュースしてあげるわ！」"
translation = "「그 부분도 내가 특별히 프로듀스해 줄게!」"

[[dialogue]]
speaker = "unk"
original = "バレンタイン当日の放課後。"
translation = "밸런타인 당일 방과 후."

[[dialogue]]
speaker = "unk"
original = "俺は蘭美に呼び出されて、アリーナへと足を運んだ――"
translation = "나는 라비에게 불려 나와 아레나로 발걸음을 옮겼다──"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「よく来たわね、会長！\u3000待っていたわ！」"
translation = "「잘 왔어, 회장! 기다리고 있었어!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「なぜ呼び出されたかは、貴方なら何となく察しているんじゃないかしら？」"
translation = "「왜 불려 나왔는지는 당신이라면 어느 정도 짐작하고 있지 않을까?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「でも、１つだけ言っておくと、貴方に用があるのは私じゃないわ」"
translation = "「하지만 한 가지만 말해두자면, 당신에게 용건이 있는 건 내가 아니야」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「というわけで、せつな！\u3000出てきなさい！」"
translation = "「그런 의미에서, 세츠나! 나오렴!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「は、はいでござる……！」"
translation = "「네, 네이오……!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「そそそ、その、主様！\u3000ほほほ、本日はお日柄もよく……！」"
translation = "「저, 저저, 그, 주군! 오오오, 오늘은 날씨도 좋고……!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「お忙しいところ、わざわざせつなの為に足をお運び、真に感謝致しますと共に、せせせ、せつにゃの愛を込めた、ちちち……ちゅよこをお渡ちちたく……」"
translation = "「바쁘신 와중에 일부러 세츠나를 위해 발걸음을 해주셔서 진심으로 감사드림과 동시에, 세세세, 세츠냐의 사랑을 담은, 쪼쪼쪼…… 쪼꼬를 드리고 시포소……」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「いや噛みすぎでしょ！？」"
translation = "「아니, 너무 버벅대잖아!?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「まぁでも、なんとなくそうなるんじゃないかと予想はしてたわ！\u3000せつな、挨拶はもういいから、口寄せの星術を使いなさい！」"
translation = "「뭐 하지만, 어느 정도 이렇게 될 거라 예상은 했어! 세츠나, 인사는 됐으니까 소환 성술을 쓰렴!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「か、かしこまりでござる！\u3000口寄せ――」"
translation = "「아, 알겠소! 소환──」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「出でよ、チョコゴーレム！」"
translation = "「나와라, 초코 골렘!」"

[[dialogue]]
speaker_original = "ゴーレム"
speaker_translation = "골렘"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "これは、カフェテリアの時の……！？"
translation = "이건 카페테리아 때의……!?"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「続いて、解凍の術でござる！」"
translation = "「이어서 해동술이오!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ふふふっ、会長、とくと味わいなさい！\u3000これが――」"
translation = "「후후훗, 회장, 톡톡히 맛보도록 해! 이것이──」"

[[dialogue]]
speaker_original = "ゴーレム"
speaker_translation = "골렘"
original = "「――ゴォォォッレム！！！」"
translation = "「──고오오오오올렘!!!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「私とせつなで作り上げた、最強のチョコレートよ！」"
translation = "「나와 세츠나가 만들어낸 최강의 초콜릿이야!」"

[[dialogue]]
speaker = "unk"
original = "どういうこと！？！？"
translation = "이게 어떻게 된 일이야!?!?"

[[dialogue]]
speaker = "unk"
original = "俺は思わず、全力でツッコむのだった――"
translation = "나는 나도 모르게 전력으로 태클을 걸고 있었다──"

