[[dialogue]]
speaker = "unk"
original = "流星寮のクリスマスパーティーの準備は順調に進んでいた。"
translation = "유성 기숙사의 크리스마스 파티 준비는 순조롭게 진행되고 있었다."

[[dialogue]]
speaker = "unk"
original = "ところで、クリスマスに欠かせないものが１つある。"
translation = "그런데 크리스마스에 빠질 수 없는 것이 하나 있다."

[[dialogue]]
speaker = "unk"
original = "今日はそれが届いたとの連絡を受け、実行委員のメンバー全員で星見家を訪れた。"
translation = "오늘은 그것이 도착했다는 연락을 받고, 실행위원 멤버 전원이 호시미 가문을 방문했다."

[[dialogue]]
speaker = "フィオナ"
original = "「いらっしゃい。皆さんよく来てくださいました」"
translation = "「어서 오세요. 여러분, 잘 와주셨습니다.」"

[[dialogue]]
speaker = "舞亜"
original = "「ええと、何かが届いた、としか聞いてないんですけど、いったい何が届いたんですか？」"
translation = "「저기, 뭔가가 도착했다는 말만 들었는데, 대체 뭐가 도착한 건가요?」"

[[dialogue]]
speaker = "フィオナ"
original = "「フニ、説明してなかったの？」"
translation = "「후니, 설명 안 했어?」"

[[dialogue]]
speaker = "フェニエル"
original = "「は、はいっ、直接見てもらった方が早いですし、それにっ……」"
translation = "「네, 네엣, 직접 보는 게 더 빠르기도 하고, 게다가……」"

[[dialogue]]
speaker = "unk"
original = "事前に教えたら逃げるかも知れないしね"
translation = "미리 알려주면 도망칠지도 모르니까 말이야."

[[dialogue]]
speaker = "舞亜"
original = "「何それ、嫌な予感しかしないんだけど」"
translation = "「그게 뭐야, 안 좋은 예감밖에 안 드는데.」"

[[dialogue]]
speaker = "アニュラス"
original = "「どんなものだろうと私は恐れないぞ！」"
translation = "「어떤 것이든 나는 두려워하지 않는다!」"

[[dialogue]]
speaker = "アポロ"
original = "「嘘だな、アニュラスは料理の特訓にビビってたぞ」"
translation = "「거짓말이네, 아뉴라스는 요리 특훈 때 겁먹었으면서.」"

[[dialogue]]
speaker = "アニュラス"
original = "「それはっ……うわぁぁっ、騎士ともあろう者が、雑に嘘をついてしまったぁぁ！！」"
translation = "「그건…… 우와아앗, 기사라는 자가 엉성하게 거짓말을 해버렸다아아!!」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふふっ、では最初からお話をしましょうか。フニ、あなたからお願い」"
translation = "「후훗, 그럼 처음부터 이야기를 해볼까요. 후니, 당신이 부탁해요.」"

[[dialogue]]
speaker = "フェニエル"
original = "「わかりました。ええと、実はクリスマスパーティー用に、ヘレナ様が皆さんの人工戦闘服を作ってくださいまして……」"
translation = "「알겠습니다. 저기, 실은 크리스마스 파티용으로 헬레나 님께서 여러분의 인공 전투복을 만들어 주셔서……」"

[[dialogue]]
speaker = "フェニエル"
original = "「それが本日完成し、皆さんに受け取っていただくために足を運んでいただいた次第です」"
translation = "「그것이 오늘 완성되어, 여러분께 전달해 드리기 위해 발걸음을 해 주십사 한 것입니다.」"

[[dialogue]]
speaker = "舞亜"
original = "「それをパーティーの衣装として着る、っていう感じ？」"
translation = "「그걸 파티 의상으로 입는다는 느낌?」"

[[dialogue]]
speaker = "フェニエル"
original = "「よろしければ是非、そうしていただければと」"
translation = "「괜찮으시다면 부디 그렇게 해주셨으면 해서요.」"

[[dialogue]]
speaker = "アニュラス"
original = "「衣装か……そういうのがあった方が士気も上がりそうだ」"
translation = "「의상인가…… 그런 게 있으면 사기도 오를 것 같군.」"

[[dialogue]]
speaker = "舞亜"
original = "「でも人工戦闘服を作ったって、そんなに簡単に作れちゃうようなものなの？」"
translation = "「하지만 인공 전투복을 만들었다니, 그렇게 간단히 만들 수 있는 거야?」"

[[dialogue]]
speaker = "フェニエル"
original = "「簡単じゃないはずなんですが……ヘレナ様がノリノリで作ってしまって」"
translation = "「간단하지 않을 텐데…… 헬레나 님께서 신이 나셔서 만들어 버리셨어요.」"

[[dialogue]]
speaker = "アポロ"
original = "「ま、ヘレナだからな！」"
translation = "「뭐, 헬레나니까!」"

[[dialogue]]
speaker = "unk"
original = "そのひと言の説得力がすごい……"
translation = "그 한마디의 설득력이 굉장해……"

[[dialogue]]
speaker = "unk"
original = "舞亜もアニュラスもコクコクと頷きながら、新たな戦闘服を受け取った。"
translation = "마이아도 아뉴라스도 고개를 끄덕이며 새로운 전투복을 받았다."

[[dialogue]]
speaker = "キリカ"
original = "「それでは１人ずつ変身を……まずは舞亜様、お願いします」"
translation = "「그럼 한 분씩 변신을…… 먼저 마이아 님, 부탁드립니다.」"

[[dialogue]]
speaker = "アポロ"
original = "「舞亜！\u3000早く変身して欲しいぞ！」"
translation = "「마이아! 빨리 변신해줬으면 좋겠다!」"

[[dialogue]]
speaker = "舞亜"
original = "「うん。じゃあ行くね……」"
translation = "「응. 그럼 갈게……」"

[[dialogue]]
speaker = "舞亜"
original = "「これが私のクリスマスフォーム……」"
translation = "「이게 나의 크리스마스 폼……」"

[[dialogue]]
speaker = "アニュラス"
original = "「ほう……なんというか……舞亜によく似合う。可憐だな」"
translation = "「호오…… 뭐랄까…… 마이아에게 잘 어울리는군. 가련하다.」"

[[dialogue]]
speaker = "アポロ"
original = "「めちゃくちゃ可愛いぞ！\u3000でもこれ、何がモチーフなんだ？」"
translation = "「엄청나게 귀엽다! 그런데 이거 모티프가 뭐야?」"

[[dialogue]]
speaker = "舞亜"
original = "「ハンドミキサーと……こっちのはヘラかな？\u3000料理人っぽい感じがするけど」"
translation = "「핸드 믹서랑…… 이쪽 건 주걱인가? 요리사 같은 느낌이 드는데.」"

[[dialogue]]
speaker = "フェニエル"
original = "「これはパティシエさんですね。料理特訓のお話を聞きましたので、そのイメージだと思います」"
translation = "「이건 파티시에네요. 요리 특훈 이야기를 들어서 그 이미지라고 생각합니다.」"

[[dialogue]]
speaker = "アニュラス"
original = "「待ってくれ！\u3000料理特訓を受けたのはこの私だぞ！」"
translation = "「잠깐만! 요리 특훈을 받은 건 바로 나다!」"

[[dialogue]]
speaker = "アポロ"
original = "「あたしも特訓したけどな～。でも、メインはアニュラスだったはずだ」"
translation = "「나도 특훈 했지만 말이야~. 그래도 메인은 아뉴라스였을 텐데.」"

[[dialogue]]
speaker = "unk"
original = "一番うまかったのが舞亜だったから？"
translation = "가장 잘 만든 게 마이아였으니까?"

[[dialogue]]
speaker = "アニュラス"
original = "「ぐうっ！\u3000事実すぎて反論できないっ……」"
translation = "「구웃! 너무 사실이라 반론할 수 없다……」"

[[dialogue]]
speaker = "舞亜"
original = "「でも……うん、クリスマスパーティーの準備には便利そうだね」"
translation = "「하지만…… 응, 크리스마스 파티 준비에는 편리할 것 같네.」"

[[dialogue]]
speaker = "キリカ"
original = "「次はアニュラス様、お願いします」"
translation = "「다음은 아뉴라스 님, 부탁드립니다.」"

[[dialogue]]
speaker = "アニュラス"
original = "「わかった。では行くぞ。変身！」"
translation = "「알았다. 그럼 간다. 변신!」"

[[dialogue]]
speaker = "アニュラス"
original = "「おおっ！\u3000これが私専用のクリスマスフォームか！」"
translation = "「오오! 이것이 나 전용 크리스마스 폼인가!」"

[[dialogue]]
speaker = "アニュラス"
original = "「この武装は強そうだな。剣ではないが大砲とは、火力が期待できそうだ」"
translation = "「이 무장은 강해 보이는군. 검은 아니지만 대포라니, 화력을 기대할 수 있겠어.」"

[[dialogue]]
speaker = "キリカ"
original = "「申し訳ありません、そちら、バズーカ砲に見えますが、パーティー用のクラッカーになります」"
translation = "「죄송합니다, 그건 바주카포처럼 보이지만 파티용 폭죽(크래커)입니다.」"

[[dialogue]]
speaker = "アニュラス"
original = "「……は？」"
translation = "「……하?」"

[[dialogue]]
speaker = "キリカ"
original = "「火力ゼロの非殺傷タイプですね」"
translation = "「화력 제로인 비살상 타입이죠.」"

[[dialogue]]
speaker = "アニュラス"
original = "「どどど、どういうことなんだ、それは！」"
translation = "「어어어, 어떻게 된 거냐, 그건!」"

[[dialogue]]
speaker = "舞亜"
original = "「うーん、アニュラスに武器持たせると嬉々として使いそうだから？」"
translation = "「음, 아뉴라스에게 무기를 쥐여주면 신나서 휘두를 것 같으니까?」"

[[dialogue]]
speaker = "フェニエル"
original = "「クリスマスパーティーに武器は必要ありませんからね」"
translation = "「크리스마스 파티에 무기는 필요 없으니까요.」"

[[dialogue]]
speaker = "アニュラス"
original = "「そんなぁ……ひそかにめちゃくちゃ期待してたんだぞ……」"
translation = "「이럴 수가…… 남몰래 엄청나게 기대하고 있었는데……」"

[[dialogue]]
speaker = "アポロ"
original = "「元気出せ、アニュラス。パーティーでは大活躍かもしれないぞ」"
translation = "「기운 내, 아뉴라스. 파티에서는 대활약할지도 모른다고.」"

[[dialogue]]
speaker = "舞亜"
original = "「そうそう、試しに１発撃ってみたら？」"
translation = "「그래그래, 시험 삼아 한 발 쏴보는 게 어때?」"

[[dialogue]]
speaker = "アニュラス"
original = "「そうだな……。よし、やってみよう！」"
translation = "「그렇군……. 좋아, 해보자!」"

[[dialogue]]
speaker = "unk"
original = "砲口を人に向けてはいけません！"
translation = "포구를 사람에게 향하면 안 돼!"

[[dialogue]]
speaker = "unk"
original = "ちょ！\u3000俺に向かって撃つの！？"
translation = "잠깐! 나한테 쏘는 거야!?"

[[dialogue]]
speaker = "アニュラス"
original = "「心配ない、クラッカーだから」"
translation = "「걱정 마라, 폭죽이니까.」"

[[dialogue]]
speaker = "キリカ"
original = "「非殺傷タイプでございます」"
translation = "「비살상 타입입니다.」"

[[dialogue]]
speaker = "アポロ"
original = "「いけいけー、撃てー！」"
translation = "「가라가라~ 쏴라~!」"

[[dialogue]]
speaker = "アニュラス"
original = "「ファイヤー！！」"
translation = "「파이어!!」"

[[dialogue]]
speaker = "フェニエル"
original = "「び、びっくりしたぁ」"
translation = "「깜, 깜짝이야.」"

[[dialogue]]
speaker = "アポロ"
original = "「どかーんってしたぞ、どかーんって！」"
translation = "「콰광 하고 터졌다, 콰광 하고!」"

[[dialogue]]
speaker = "舞亜"
original = "「派手な音は鳴るけど、本当にただのクラッカーみたいだね……」"
translation = "「화려한 소리는 나지만 정말 그냥 폭죽 같네……」"

[[dialogue]]
speaker = "アニュラス"
original = "「しかし、やはり実用的なものではないのか……残念だな」"
translation = "「하지만 역시 실용적인 건 아닌가…… 아쉽군.」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふふっ、でもほら、姉さんには大ウケみたいですよ？」"
translation = "「후훗, 하지만 봐요, 언니한테는 엄청 먹히는 것 같은데요?」"

[[dialogue]]
speaker = "アポロ"
original = "「次、あたしの番！\u3000あたしに向けて撃ってくれ！」"
translation = "「다음은 내 차례! 나를 향해서 쏴줘!」"

[[dialogue]]
speaker = "舞亜"
original = "「うわ、ほんとだ。アポロちゃんの目、キラッキラしてるし」"
translation = "「우와, 정말이네. 아폴로 짱 눈이 초롱초롱해.」"

[[dialogue]]
speaker = "アポロ"
original = "「アニュラス、早く！\u3000もう待ちきれないぞ～！」"
translation = "「아뉴라스, 빨리! 더는 못 기다리겠다~!」"

[[dialogue]]
speaker = "フィオナ"
original = "「待ってください、先に姉さんの人工戦闘服をお披露目しましょう」"
translation = "「기다려 주세요, 먼저 언니의 인공 전투복을 선보이죠.」"

[[dialogue]]
speaker = "アポロ"
original = "「む、そうだな、そっちも気になる。あたしのはどんなのだ？\u3000めちゃくちゃ楽しみだぞ！」"
translation = "「음, 그렇군, 그쪽도 궁금해. 내 건 어떤 거지? 엄청나게 기대된다!」"

[[dialogue]]
speaker = "アポロ"
original = "「どうだっ！\u3000これがあたしのクリスマスフォームだ！」"
translation = "「어떠냐! 이것이 나의 크리스마스 폼이다!」"

[[dialogue]]
speaker = "フィオナ"
original = "「うっ……姉さん……」"
translation = "「윽…… 언니……」"

[[dialogue]]
speaker = "フィオナ"
original = "「……ぎゅ」"
translation = "「……꼬옥.」"

[[dialogue]]
speaker = "アポロ"
original = "「うわっ！\u3000いきなり抱きついてどうしたんだ？」"
translation = "「우왓! 갑자기 껴안고 왜 그러는 거야?」"

[[dialogue]]
speaker = "フィオナ"
original = "「ごめんなさい、想像以上に姉さんがプリティーだったから、つい……<emoji=heart04>」"
translation = "「미안해요, 상상 이상으로 언니가 프리티해서 그만……<emoji=heart04>」"

[[dialogue]]
speaker = "キリカ"
original = "「ええ、大変プリティーでございます。お嬢様、次は私の番ですよ」"
translation = "「네, 매우 프리티합니다. 아가씨, 다음은 제 차례예요.」"

[[dialogue]]
speaker = "フィオナ"
original = "「えっ、次とかないんだけど」"
translation = "「엣, 다음 같은 건 없는데.」"

[[dialogue]]
speaker = "キリカ"
original = "「もしや……アポロ様を独り占めなさるおつもりですか？」"
translation = "「설마…… 아폴로 님을 독점하실 생각이십니까?」"

[[dialogue]]
speaker = "フィオナ"
original = "「いけない？」"
translation = "「안 돼?」"

[[dialogue]]
speaker = "キリカ"
original = "「いかなお嬢様と言えど、アポロ様を独占させるわけには参りません」"
translation = "「아무리 아가씨라 해도 아폴로 님을 독점하게 둘 수는 없습니다.」"

[[dialogue]]
speaker = "アニュラス"
original = "「取り合いが始まった……アポロ、大人気だな」"
translation = "「쟁탈전이 시작됐군…… 아폴로, 인기 폭발이네.」"

[[dialogue]]
speaker = "舞亜"
original = "「まあ、めっちゃ可愛いからね。ここまでの破壊力とは思わなかったよ。私も気を抜いたら抱き締めに行っちゃいそうだし」"
translation = "「뭐, 엄청 귀여우니까 말이야. 이 정도 파괴력일 줄은 몰랐어. 나도 방심하면 안으러 가버릴 것 같고.」"

[[dialogue]]
speaker = "フィオナ"
original = "「姉さん、ぎゅう～～～～っ<emoji=heart04>」"
translation = "「언니, 꼬오오오옥~~<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「うう～っ、く～る～し～い～！」"
translation = "「으으~ 괴, 괴로워~!」"

[[dialogue]]
speaker = "キリカ"
original = "「お嬢様は抱き締め慣れていませんからね。その点、私ならむぎゅっとエキスパートですよ」"
translation = "「아가씨는 안는 것에 익숙하지 않으시니까요. 그 점에선 제가 꼬옥 안아주기 엑스퍼트랍니다.」"

[[dialogue]]
speaker = "unk"
original = "むぎゅっとエキスパートって……"
translation = "꼬옥 안아주기 엑스퍼트라니……"

[[dialogue]]
speaker = "フェニエル"
original = "「はわわっ、キリカさんまでアポロ様の虜に……」"
translation = "「하와와, 키리카 씨까지 아폴로 님의 포로가……」"

[[dialogue]]
speaker = "アニュラス"
original = "「あれではアポロが可哀想だ。強制的に引き剥がすか？」"
translation = "「저래서는 아폴로가 불쌍하군. 강제로 떼어놓을까?」"

[[dialogue]]
speaker = "マリオン"
original = "「うふふっ、その必要はないですよ」"
translation = "「우후훗, 그럴 필요는 없어요.」"

[[dialogue]]
speaker = "マリオン"
original = "「本当に可愛らしい。私が頂きますね<emoji=heart04>」"
translation = "「정말 사랑스럽네요. 제가 데려갈게요<emoji=heart04>」"

[[dialogue]]
speaker = "キリカ"
original = "「マリオンさん、いつの間に……！？」"
translation = "「마리온 씨, 어느 사이에……!?」"

[[dialogue]]
speaker = "マリオン"
original = "「私に内緒で可愛い子を愛でるなんて、油断も隙もありませんね」"
translation = "「저 몰래 귀여운 아이를 예뻐하다니, 한시도 방심할 수 없군요.」"

[[dialogue]]
speaker = "マリオン"
original = "「うふふっ、本当に可愛い。ちゅっちゅしたくなっちゃいます♪」"
translation = "「우후훗, 정말 귀여워. 뽀뽀해주고 싶어지네요♪」"

[[dialogue]]
speaker = "フィオナ"
original = "「マリオンさん！\u3000姉さんを返してください！」"
translation = "「마리온 씨! 언니를 돌려주세요!」"

[[dialogue]]
speaker = "キリカ"
original = "「いかな元メイド長と言えど、アポロ様を渡すわけには参りません」"
translation = "「아무리 전 메이드장이라 해도 아폴로 님을 넘겨드릴 순 없습니다.」"

[[dialogue]]
speaker = "アポロ"
original = "「うおおお～～っ！\u3000あたしを勝手に取り合うな～～っ！」"
translation = "「우오오오~~! 나를 마음대로 서로 차지하려고 하지 마라~~!」"

[[dialogue]]
speaker = "アポロ"
original = "「かっこいい戦闘服を期待してたのに、どうしてこうなったんだーっ！！」"
translation = "「멋진 전투복을 기대했는데 왜 이렇게 된 거냐아앗!!」"

[[dialogue]]
speaker = "unk"
original = "アポロの嘆きも虚しく、取り合いはしばらく続くのだった。"
translation = "아폴로의 탄식도 헛되이, 쟁탈전은 한동안 계속되었다."

