[[dialogue]]
speaker = "unk"
original = "第２話,仮面の謎,P"
translation = "제2화, 가면의 수수께끼"

[[dialogue]]
speaker = "派手な女生徒"
original = "（ね、ねえ、なんでアニュラスさんって、いつも仮面を被ってるのかな……）"
translation = "(저기, 저기, 왜 아뉴라스 씨는 언제나 가면을 쓰고 있는 걸까……)"

[[dialogue]]
speaker = "地味な女生徒"
original = "（わ、わかんないよ。体育の時間とかもずっと被ってるんでしょ？\u3000クラスメイトでさえ、素顔見たことないって噂だもん）"
translation = "(모, 모르겠어. 체육 시간 같은 때도 계속 쓰고 있다며? 클래스메이트조차 맨얼굴을 본 적 없다는 소문이야)"

[[dialogue]]
speaker = "アニュラス"
original = "「…………気になるのなら、直接聞きにくればいいだろうに」"
translation = "「…………궁금하면 직접 물어보러 오면 될 것을」"

[[dialogue]]
speaker = "unk"
original = "なんでずっと仮面を被ってるんだ？"
translation = "왜 계속 가면을 쓰고 있는 거야?"

[[dialogue]]
speaker = "アニュラス"
original = "「……人の話を盗み聞きするのは騎士道精神に反するな。あまり褒められた行為ではないぞ、新星の会長」"
translation = "「……남의 이야기를 엿듣는 건 기사도 정신에 반하는군. 별로 칭찬받을 행위는 아니다, 신성의 회장」"

[[dialogue]]
speaker = "アニュラス"
original = "「なに、私も前に盗み聞きしてた？\u3000あ、あれは観察だと言っただろう！」"
translation = "「뭐라고, 나도 전에 엿들었다고? 그, 그것은 관찰이라고 말했을 텐데!」"

[[dialogue]]
speaker = "アニュラス"
original = "「む、むぅ……まあ、たまたま聞こえてきただけというのなら、仕方のないことだ」"
translation = "「으, 음…… 뭐, 우연히 들려왔을 뿐이라면 어쩔 수 없는 일이지」"

[[dialogue]]
speaker = "アニュラス"
original = "「……それで、仮面のことだったか。この仮面は実技試験の最優秀成績を収めた時に、お父様から贈られたものだ」"
translation = "「……그래서 가면 이야기였나. 이 가면은 실기 시험에서 최우수 성적을 거두었을 때 아버님께 받은 것이다」"

[[dialogue]]
speaker = "アニュラス"
original = "「微力ながら星力を高める力があるらしい。お父様の現役時代に使っていたものだから、私も愛用させてもらっている」"
translation = "「미력하게나마 성력을 높이는 힘이 있는 모양이다. 아버님의 현역 시절에 사용하시던 것이니 나도 애용하고 있다」"

[[dialogue]]
speaker = "unk"
original = "いつも付けている必要なくない？"
translation = "항상 쓰고 있을 필요는 없지 않아?"

[[dialogue]]
speaker = "アニュラス"
original = "「それを言うのなら、いつも付けない理由もないだろう」"
translation = "「그렇게 말한다면 항상 쓰지 않을 이유도 없지 않나」"

[[dialogue]]
speaker = "アニュラス"
original = "「みんなだって、お気に入りのアクセサリーを身に着けたりするだろう？\u3000それと同じ感覚だ。大切なものだから、いつも身に着けている」"
translation = "「너희들도 마음에 드는 액세서리를 몸에 걸치거나 하지 않나? 그것과 같은 감각이다. 소중한 것이기에 언제나 몸에 지니고 있는 거다」"

[[dialogue]]
speaker = "アニュラス"
original = "「納得したか？\u3000――そうか、ならばよし」"
translation = "「납득했나? ──그래, 그럼 됐다」"

[[dialogue]]
speaker = "unk"
original = "……で、その附属生用の計算ドリルは何？"
translation = "……그런데 그 부속생용 계산 문제는 뭐야?"

[[dialogue]]
speaker = "アニュラス"
original = "「見てわからないのか。計算ドリルなのだから、計算の勉強をしていたのだ」"
translation = "「보고도 모르겠나. 계산 문제집이니 계산 공부를 하고 있었던 거다」"

[[dialogue]]
speaker = "アニュラス"
original = "「……ん？\u3000いや待て。いまお前、これを附属生用と言ったか？」"
translation = "「……응? 아니 잠깐. 지금 너, 이걸 부속생용이라고 했나?」"

[[dialogue]]
speaker = "アニュラス"
original = "「これは、筆記試験の成績がふるわなかった私に、先生が復習用にと渡したものだぞ？\u3000だから私もこうして、休み時間に解いていたわけで――」"
translation = "「이것은 필기 시험 성적이 좋지 않았던 나에게 선생님께서 복습용으로 주신 거다. 그래서 나도 이렇게 쉬는 시간에 풀고 있었던 건데──」"

[[dialogue]]
speaker = "アニュラス"
original = "「……え、これ本当に附属生用？」"
translation = "「……에, 이거 정말 부속생용?」"

[[dialogue]]
speaker = "アニュラス"
original = "「じ、冗談はよせ。この計算ドリル、半分もわからなかったんだぞ。さすがの私でもそこまでではないはずだ。……ないよね？」"
translation = "「조, 농담 마라. 이 계산 문제, 절반도 모르겠단 말이다. 아무리 나라도 그 정도는 아닐 거다. ……아니지?」"

[[dialogue]]
speaker = "unk"
original = "いや………………附属生用、ですね"
translation = "아니……………… 부속생용, 맞네요"

[[dialogue]]
speaker = "アニュラス"
original = "「う、嘘だっ！\u3000待て、じゃあこの歴史の問題集は？\u3000こっちの漢字の問題集も見ろ！」"
translation = "「거, 거짓말이다! 잠깐, 그럼 이 역사 문제집은? 이쪽 한자 문제집도 봐라!」"

[[dialogue]]
speaker = "アニュラス"
original = "「あと英語も出ているんだ、ほら！\u3000さすがに全部が全部、そんな」"
translation = "「그리고 영어도 나와 있다고, 봐! 설마 전부가 다 그런」"

[[dialogue]]
speaker = "unk"
original = "全部…………附属生用、ですね"
translation = "전부………… 부속생용, 맞네요"

[[dialogue]]
speaker = "アニュラス"
original = "「なん、だと……？」"
translation = "「그럴, 수가……?」"

[[dialogue]]
speaker = "アニュラス"
original = "「…………わ、私には勉強など不要だ。いいか、立派な星騎士になるのに必要なのは、掛け算や割り算じゃない。剣の腕だ」"
translation = "「…………나, 나에게 공부 따위는 필요 없다. 잘 들어라, 훌륭한 성기사가 되는 데 필요한 건 곱셈이나 나눗셈이 아니다. 검술 실력이다」"

[[dialogue]]
speaker = "unk"
original = "掛け算と割り算も怪しいレベル！？"
translation = "곱셈이랑 나눗셈도 수상한 수준!?"

[[dialogue]]
speaker = "アニュラス"
original = "「バカにするな！\u3000今のは言葉の綾だ！\u3000さすがの私も掛け算はできる！\u3000九九の計算を間違えたら、ご飯が抜きになったあの日々を忘れるものか！」"
translation = "「바보 취급 하지 마라! 방금 건 말버릇이다! 아무리 나라도 곱셈은 할 수 있다! 구구단 계산을 틀리면 밥을 굶어야 했던 그 나날을 잊을 성싶으냐!」"

[[dialogue]]
speaker = "アニュラス"
original = "「割り算は……割り算は知らん！\u3000あんなもの日常で使わんだろう！？」"
translation = "「나눗셈은…… 나눗셈은 모른다! 그런 거 일상에서 안 쓰지 않나!?」"

[[dialogue]]
speaker = "unk"
original = "いや、意外と使うよ……！？"
translation = "아니, 의외로 써……!?"

[[dialogue]]
speaker = "アニュラス"
original = "「……まさか、先生は私のレベルを見越して、この附属生用の計算ドリルを渡してくれたのか？」"
translation = "「……설마 선생님은 내 수준을 내다보고 이 부속생용 계산 문제집을 주신 건가?」"

[[dialogue]]
speaker = "アニュラス"
original = "「さすが教師と言わざるを得ないな。私のことをよく見ている……」"
translation = "「역시 교사라고 할 수밖에 없군. 나를 잘 지켜보고 있어……」"

[[dialogue]]
speaker = "アニュラス"
original = "「だが、残念だ。この計算ドリルも、私にとっては少しレベルが高いようだ……」"
translation = "「하지만 유감이다. 이 계산 문제집도 나에게는 조금 수준이 높은 모양이다……」"

[[dialogue]]
speaker = "アニュラス"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "アニュラス"
original = "「いや、凹んでいる暇はない。ひとまずこのドリルを終わらせよう。話はそれからだ」"
translation = "「아니, 낙담하고 있을 틈은 없다. 일단 이 문제집을 끝내자. 이야기는 그다음이다」"

[[dialogue]]
speaker = "unk"
original = "よければ、俺が勉強教えようか？"
translation = "괜찮다면 내가 공부 가르쳐줄까?"

[[dialogue]]
speaker = "アニュラス"
original = "「な、何？\u3000お前は勉強ができるのか！？\u3000なるほどそうか、お前は新星学園に途中編入したのだったな」"
translation = "「뭐, 뭐라고? 너는 공부를 잘하는 건가!? 과연 그렇군, 너는 신성학원에 중도 편입했었지」"

[[dialogue]]
speaker = "アニュラス"
original = "「む、むぅ……申し出は嬉しく思うが、新星の会長に借りを作るわけにはいかない」"
translation = "「으, 음…… 제안은 기쁘게 생각하지만 신성의 회장에게 빚을 질 수는 없다」"

[[dialogue]]
speaker = "アニュラス"
original = "「……教えてくれる知り合い？\u3000い、いないが？\u3000何か問題でも？」"
translation = "「……가르쳐줄 지인? 어, 없지만? 무슨 문제라도?」"

[[dialogue]]
speaker = "アニュラス"
original = "「赤点でも退学になったりはしないが……んぅ、お父様の期待は裏切ってしまうな……」"
translation = "「낙제점이라도 퇴학당하거나 하지는 않지만…… 으음, 아버님의 기대는 저버리게 되겠군……」"

[[dialogue]]
speaker = "アニュラス"
original = "「できれば成績を安定させて、お父様には安心して欲しいのだが……むむぅ……」"
translation = "「가능하면 성적을 안정시켜서 아버님을 안심시켜 드리고 싶다만…… 으으음……」"

[[dialogue]]
speaker = "unk"
original = "勉強を教える代わりに、稽古をつけてくれ"
translation = "공부를 가르쳐 주는 대신에, 대련을 해 줘"

[[dialogue]]
speaker = "アニュラス"
original = "「……なるほど。そういえばこの前、私を実力で納得させると言っていたな」"
translation = "「……과연. 그러고 보니 요전번에, 나를 실력으로 납득시키겠다고 말했었지」"

[[dialogue]]
speaker = "アニュラス"
original = "「いいだろう。交換条件なら、私も頼みやすい」"
translation = "「좋다. 교환 조건이라면, 나도 부탁하기 편하군」"

[[dialogue]]
speaker = "アニュラス"
original = "「すまない、気を遣わせてしまったな。その申し出、嬉しく思う。ぜひ私に勉強を教えて欲しい」"
translation = "「미안하다, 신경 쓰게 만들었군. 그 제안, 기쁘게 생각한다. 부디 나에게 공부를 가르쳐 주었으면 한다」"

[[dialogue]]
speaker = "アニュラス"
original = "「代わりに稽古をつけることを約束しよう。新星の会長の戦い方は徒手空拳だったか。専門ではないが、アドバイスできることもあろう」"
translation = "「대신 대련을 해 줄 것을 약속하지. 신성의 회장의 싸움 방식은 도수공권이었나. 전문은 아니지만, 조언해 줄 수 있는 것도 있을 게다」"

[[dialogue]]
speaker = "アニュラス"
original = "「……あと、私に仮面のことを聞いてくれて、感謝する」"
translation = "「……그리고, 나에게 가면에 대해 물어봐 주어서 고맙다」"

[[dialogue]]
speaker = "アニュラス"
original = "「あそこにいた生徒も私たちの会話に耳をそばだてていたようだから、謎は解けただろう。これで陰口を言われることもなくなる」"
translation = "「저기 있던 학생도 우리 대화에 귀를 기울이고 있었던 모양이니, 의문은 풀렸겠지. 이걸로 뒷공론을 듣는 일도 없어질 게다」"

[[dialogue]]
speaker = "アニュラス"
original = "「……強さとは、優しさと厳しさを持ち合わせているものだと、お父様は言っていた」"
translation = "「……강함이란, 다정함과 엄격함을 겸비하고 있는 것이라고, 아버님께서 말씀하셨다」"

[[dialogue]]
speaker = "アニュラス"
original = "「ふっ、お前にはそれが揃っているのかもしれないな」"
translation = "「훗, 네게는 그것이 갖춰져 있는지도 모르겠군」"

[[dialogue]]
speaker = "unk"
original = "仮面越しだったけれど、アニュラスが優しく微笑んだような、そんな気がしたのだった。"
translation = "가면 너머였지만, 아뉴라스가 부드럽게 미소 지은 듯한, 그런 기분이 들었다."

