[[dialogue]]
speaker = "unk"
original = "第１話,フィーニスの塔・第二階層,B"
translation = "제1화, 피니스의 탑・제2계층, B"

[[dialogue]]
speaker = "unk"
original = "時間は、不吉な夜が再び流星市国を覆う、数時間前に遡る──"
translation = "시간은, 불길한 밤이 다시 유성 시국을 덮기 수 시간 전으로 거슬러 올라간다──"

[[dialogue]]
speaker = "ヴィーナス"
original = "『誰も見てないわね？\u3000先生とか』"
translation = "「『아무도 안 보고 있지? 선생님이라든가』」"

[[dialogue]]
speaker = "フィオナ"
original = "『ふふ。なんだか不良になってしまったようです』"
translation = "「『후후. 왠지 불량아가 되어버린 것 같아요』」"

[[dialogue]]
speaker = "クロト"
original = "『共犯だな』"
translation = "「『공범이네』」"

[[dialogue]]
speaker = "ヴィーナス"
original = "『これ──塔の──っ……！？』"
translation = "「『이거── 탑의──……!?』」"

[[dialogue]]
speaker = "フィオナ"
original = "『……！\u3000私たちが、ここに立った時点で──』"
translation = "「『……! 저희가, 여기에 선 시점에서──』」"

[[dialogue]]
speaker = "クロト"
original = "『問答無用──ってことか……！』"
translation = "「『묻지도 따지지도 않는다는 건가……!』」"

[[dialogue]]
speaker = "クロト"
original = "「いつつ……みんな、大丈夫か？」"
translation = "「아야야…… 모두, 괜찮아?」"

[[dialogue]]
speaker = "unk"
original = "学園の敷地内で話していた俺たちだったが──"
translation = "학원 부지 내에서 이야기하고 있던 우리였지만──"

[[dialogue]]
speaker = "unk"
original = "不意に白い光に包まれ、気がつけばここに転がされていた。"
translation = "갑자기 하얀 빛에 휩싸여, 정신을 차려보니 여기에 굴러떨어져 있었다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「んもう──なんなのよ、急に！」"
translation = "「정말── 뭐야, 갑자기!」"

[[dialogue]]
speaker = "フィオナ"
original = "「少し、覚えのある感覚でしたが……」"
translation = "「조금, 익숙한 감각이었지만……」"

[[dialogue]]
speaker = "クロト"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "この場の光景に見覚えはない。"
translation = "이 장소의 광경에는 익숙하지 않다."

[[dialogue]]
speaker = "unk"
original = "しかし、ここの空気には覚えがある。"
translation = "하지만, 이곳의 공기는 익숙하다."

[[dialogue]]
speaker = "unk"
original = "そして何より、足元に沈殿している紫のよどんだ瘴気……つまりここは……。"
translation = "그리고 무엇보다, 발밑에 침전되어 있는 보랏빛의 침체된 장기…… 즉 이곳은……."

[[dialogue]]
speaker = "クロト"
original = "「フィーニスの塔──の、中か」"
translation = "「피니스의 탑──의, 안인가」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「歓迎にしちゃ、えらく手荒だったけど……」"
translation = "「환영치고는, 꽤나 거칠었지만……」"

[[dialogue]]
speaker = "unk"
original = "<b>招かれた</b>。"
translation = "<b>초대받았다</b>."

[[dialogue]]
speaker = "unk"
original = "本能的に察したこの感覚は、恐らく彼女たち２人も同様だろう。"
translation = "본능적으로 감지한 이 감각은, 아마 그녀들 두 명도 마찬가지일 것이다."

[[dialogue]]
speaker = "フィオナ"
original = "「間違いないとは思いますが──また随分と様変わりしていますね」"
translation = "「틀림없다고는 생각하지만── 또 상당히 모습이 바뀌었네요」"

[[dialogue]]
speaker = "unk"
original = "ここがフィーニスの塔であることは状況からしても明らかだが……"
translation = "이곳이 피니스의 탑이라는 것은 상황으로 보아도 분명하지만……"

[[dialogue]]
speaker = "unk"
original = "内部の意匠は、俺たちが以前訪れた地とハッキリ異なる。"
translation = "내부의 디자인은, 우리가 이전에 방문했던 곳과 확실히 다르다."

[[dialogue]]
speaker = "unk"
original = "そして……かつて守護天使が言っていたことを考えるなら答えはひとつだ。"
translation = "그리고…… 예전에 수호 천사가 말했던 것을 생각하면 답은 하나다."

[[dialogue]]
speaker = "クロト"
original = "「第二階層──ということだろうな」"
translation = "「제2계층──이라는 것이겠지」"

[[dialogue]]
speaker = "フィオナ"
original = "「その可能性が高いですね。ここまで変貌するとは思いませんでしたが」"
translation = "「그 가능성이 높네요. 이렇게까지 변모할 줄은 몰랐지만요」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「遺跡みたい……あの塔の中身がこんなのなんて、信じられないわね」"
translation = "「유적 같아…… 그 탑의 내부가 이렇다니, 믿을 수 없네.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ていうか、引き返す道もないわね。ま──どうせ入るつもりだったからいいけど」"
translation = "「그보다, 되돌아갈 길도 없네. 뭐── 어차피 들어갈 생각이었으니까 상관없지만.」"

[[dialogue]]
speaker = "クロト"
original = "「<ruby>ＤＩＳＣ<rt>ディスク</rt></ruby>もやっぱり通じない。俺たちだけで進むしかなさそうだな」"
translation = "「디스크도 역시 통하지 않아. 우리들끼리만 나아갈 수밖에 없을 것 같네.」"

[[dialogue]]
speaker = "フィオナ"
original = "「そうですね。とはいえ、３人では心細いですし……ニャリオンを呼びましょう」"
translation = "「그렇네요. 그렇다고 해도, 세 명으로는 불안하니…… 냐리온을 부르죠.」"

[[dialogue]]
speaker = "unk"
original = "魔導書を取り出して詠唱を諳んじるフィオナ。"
translation = "마도서를 꺼내 영창을 외우는 피오나."

[[dialogue]]
speaker = "unk"
original = "が……"
translation = "하지만……"

[[dialogue]]
speaker = "フィオナ"
original = "「え──あ……あれ」"
translation = "「에── 아…… 어라」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「どしたの？\u3000ニャリオン、居留守？」"
translation = "「왜 그래? 냐리온, 집에 없는 척하는 거야?」"

[[dialogue]]
speaker = "クロト"
original = "「居留守はできないんじゃないか？」"
translation = "「집에 없는 척은 못 하지 않나?」"

[[dialogue]]
speaker = "フィオナ"
original = "「どうやら……ニャリオン召喚の経路さえ絶たれているようです」"
translation = "「아무래도…… 냐리온 소환 경로조차 끊긴 것 같아요.」"

[[dialogue]]
speaker = "フィオナ"
original = "「というより──私たちが、そもそもあちらと繋がっていない……と称したほうが正しいでしょうか」"
translation = "「라기보다는── 저희가, 애초에 저쪽과 연결되어 있지 않다……고 표현하는 편이 맞을까요?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「？\u3000どゆこと？」"
translation = "「? 무슨 뜻이야?」"

[[dialogue]]
speaker = "フィオナ"
original = "「私の召喚術はたとえ天界や魔界であっても座標を結び、呼び出します」"
translation = "「저의 소환술은 설령 천계나 마계라 할지라도 좌표를 연결하여, 불러냅니다.」"

[[dialogue]]
speaker = "フィオナ"
original = "「それが今は人間界にいるはずのニャリオンにも通じない。つまり、ここは三界のどこでもない場所」"
translation = "「그것이 지금은 인간계에 있을 터인 냐리온에게도 통하지 않아요. 즉, 이곳은 삼계의 어디도 아닌 장소.」"

[[dialogue]]
speaker = "クロト"
original = "「そこまでの……」"
translation = "「그 정도의……」"

[[dialogue]]
speaker = "unk"
original = "天界でも、魔界でも、そして人間界でもない世界。"
translation = "천계도, 마계도, 그리고 인간계도 아닌 세계."

[[dialogue]]
speaker = "unk"
original = "塔という外観に惑わされていたが、この中は完全なる異界なのだと知る。"
translation = "탑이라는 외관에 현혹되었지만, 이 안은 완전한 이계라는 것을 알게 된다."

[[dialogue]]
speaker = "フィオナ"
original = "「私の星術も工夫をしなくてはなりませんね。戦闘くらいであれば何とかなると思いますが」"
translation = "「저의 성술도 궁리를 해야겠네요. 전투 정도라면 어떻게든 될 거라고 생각하지만요.」"

[[dialogue]]
speaker = "unk"
original = "そうして、俺たちが足を進めようとすると……"
translation = "그렇게, 우리들이 발을 내딛으려 하자……"

[[dialogue]]
speaker = "unk"
original = "『よく来たわね……ヴィーナス……いい子……おいでなさい……こちらへ……』"
translation = "「『잘 왔구나…… 비너스…… 착한 아이…… 오렴…… 이쪽으로……』」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「やっぱり……また……前と同じ声が聞こえる」"
translation = "「역시…… 또…… 전과 같은 목소리가 들려.」"

[[dialogue]]
speaker = "クロト"
original = "「今度は俺にも聞こえた。もしかしたら……」"
translation = "「이번에는 나에게도 들렸다. 혹시……」"

[[dialogue]]
speaker = "フィオナ"
original = "「声の主に近づいている──のかもしれませんね。上へ昇るにつれて」"
translation = "「목소리의 주인에게 가까워지고 있는 것일지도 모르겠네요. 위로 올라갈수록.」"

[[dialogue]]
speaker = "unk"
original = "ならばこの先に行けば本体と会えるのかもしれない。"
translation = "그렇다면 이 앞으로 가면 본체와 만날 수 있을지도 모른다."

[[dialogue]]
speaker = "unk"
original = "俺たちは期待と不安を抱いて、第二階層の遺跡を進んでいった。"
translation = "우리들은 기대와 불안을 품고, 제2계층의 유적을 계속 나아갔다."

[[dialogue]]
speaker = "unk"
original = "その道中には……"
translation = "그 도중에는……"

[[dialogue]]
speaker = "ガーディアン"
original = "「ポロポロ……パロパロ……ピピ、ガガガ」"
translation = "「포로포로…… 파로파로…… 삐삐, 가가가」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「！\u3000塔の敵──ってことは、ガーディアンね！」"
translation = "「! 탑의 적──이라는 건, 가디언이네!」"

[[dialogue]]
speaker = "ガーディアン"
original = "「エネミー発見。エネミー発見。迎撃モードに移行シマス」"
translation = "「에너미 발견. 에너미 발견. 요격 모드로 이행합니다.」"

[[dialogue]]
speaker = "フィオナ"
original = "「私たちを敵視しているのは変わりないようですね」"
translation = "「저희를 적대시하고 있는 것은 변함없는 것 같네요.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ほんと。勝手に呼んどいて侵入者扱いなんて無礼よね──ま、突破するっきゃないけど！」"
translation = "「정말. 멋대로 불러놓고 침입자 취급이라니 무례하네── 뭐, 돌파할 수밖에 없지만!」"

[[dialogue]]
speaker = "ガーディアン"
original = "「侵入者──排除──シマス。ピ──ガ──！」"
translation = "「침입자── 배제── 합니다. 삐──가──!」"

