[[dialogue]]
speaker = "unk"
original = "星霊舞闘会の２回戦で激突することになったフェニエルとマハムート。"
translation = "성령무투회 2회전에서 격돌하게 된 페니엘과 마하무트."

[[dialogue]]
speaker = "unk"
original = "その勝敗の行方は――"
translation = "그 승패의 행방은――"

[[dialogue]]
speaker = "フェニエル（覚醒）"
original = "「っ……」"
translation = "「크읏……」"

[[dialogue]]
speaker = "ホウちゃん"
original = "「不死鳥の力を上回るとは……これが今を生きる竜の力……お見事です」"
translation = "「불사조의 힘을 능가하다니…… 이것이 지금을 사는 용의 힘…… 훌륭합니다」"

[[dialogue]]
speaker = "マハムート"
original = "「不死鳥からの畏怖、光栄よ。そして――」"
translation = "「불사조에게서 오는 외경심, 영광이야. 그리고――」"

[[dialogue]]
speaker = "マハムート"
original = "「フニ、あなたも大したものだわ。竜たる私の全力を受けて、最後まで立ち続けていた」"
translation = "「후니, 너도 대단하네. 용인 나의 전력을 받고, 끝까지 계속 서 있었다」"

[[dialogue]]
speaker = "マハムート"
original = "「ただ、惜しむらくは……未だ完全には不死鳥の力を使いこなせていないこと」"
translation = "「다만, 아쉬운 점은…… 아직 완전히 불사조의 힘을 다루지 못한다는 것」"

[[dialogue]]
speaker = "マハムート"
original = "「それともう１つ。この私に勝つという強いイメージが、まだ持てていなかった。次に挑戦する時は、誰よりも――」"
translation = "「그리고 하나 더. 이 나에게 이긴다는 강한 이미지를, 아직 가지지 못했다. 다음에 도전할 때는, 누구보다도――」"

[[dialogue]]
speaker = "マハムート"
original = "「ヒルディオーネよりも強く、自分が優勝するつもりで来なさい」"
translation = "「힐디 오네보다 강하게, 자신이 우승할 생각으로 오도록 해」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
original = "「……！\u3000イエス・マム。ありがとうございました……！」"
translation = "「……! 예스 마무. 감사했습니다……!」"

[[dialogue]]
speaker = "マハムート"
original = "「ええ。期待しているわ」"
translation = "「응. 기대하고 있을게」"

[[dialogue]]
speaker = "unk"
original = "マハムートは軽く手を振ると、背中を向けて会場から去って行く。"
translation = "마하무트는 가볍게 손을 흔들고, 등을 돌려 회장에서 떠나간다."

[[dialogue]]
speaker = "紅明"
original = "『試合終了ーーっ！\u3000勝者は新星寮寮長、マム選手だ～～っ！！』"
translation = "『시합 종료ーー! 승자는 신성 기숙사 사감, 마무 선수다～～!!』"

[[dialogue]]
speaker = "フェニエル（覚醒）"
original = "「お姉様、ごめんなさい……。私、マムに勝つことができませんでした……」"
translation = "「언니, 죄송합니다……. 저, 마무에게 이길 수 없었습니다…….」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
original = "「やっぱり、マムはなまら強かったです……」"
translation = "「역시, 마무는 나마라 강했습니다…….」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「いいえ。謝る必要なんて全くありませんわよ、フニ。あなたは本当によく頑張りましたわ」"
translation = "「아닙니다요. 사과할 필요는 전혀 없습니다요, 후니. 당신은 정말로 열심히 했습니다와」"

[[dialogue]]
speaker = "unk"
original = "そう言って、ヒルディオーネはフェニエルの頭に手を置き、その髪を優しく撫でる。"
translation = "그렇게 말하며, 힐디 오네는 페니엘의 머리에 손을 얹고, 그 머리카락을 상냥하게 쓰다듬는다."

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「１年生でありながら、あのマムに本気を出させて、全力で渡り合った末に負けたんですもの」"
translation = "「1학년이면서, 그 마무에게 진심을 끌어내게 하고, 전력으로 맞선 끝에 진 것입니다요」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「次は……私が先輩として頑張る姿を見せる番ですわ」"
translation = "「다음은…… 제가 선배로서 열심히 하는 모습을 보여줄 차례입니다와」"

[[dialogue]]
speaker = "unk"
original = "そこから星霊祭と並行して、トーナメントが進み――"
translation = "그곳에서부터 성령제와 병행하여, 토너먼트가 진행되고――"

[[dialogue]]
speaker = "unk"
original = "星霊祭最終日の７日目。"
translation = "성령제 최종일인 7일째."

[[dialogue]]
speaker = "unk"
original = "学園の生徒や関係者で満員になったアリーナで、星霊舞闘会は決勝戦の時を迎える。"
translation = "학원 학생들과 관계자들로 만원이 된 아레나에서, 성령무투회는 결승전의 때를 맞이한다."

[[dialogue]]
speaker = "マハムート"
original = "「――やはり、勝ち上がってきたわね。ヒルディオーネ」"
translation = "「――역시, 이겨 올라왔네. 힐디 오네」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ええ。流星寮の寮長として……あなたと戦うまでに負けるわけにはいきませんもの」"
translation = "「예. 유성 기숙사의 사감으로서…… 당신과 싸울 때까지 질 수는 없습니다요」"

[[dialogue]]
speaker = "マハムート"
original = "「そう……それで？」"
translation = "「그래…… 그래서?」"

[[dialogue]]
speaker = "マハムート"
original = "「負けるわけにはいかないというからには、この私に勝つイメージ、ちゃんと出来ているのかしら？」"
translation = "「질 수는 없다고 하니, 이 나에게 이길 이미지, 제대로 만들어져 있는 걸까?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「当然ですわ――」"
translation = "「당연합니다와――」"

[[dialogue]]
speaker = "unk"
original = "ヒルディオーネは槍を構えながら、告げる。"
translation = "힐디 오네는 창을 겨누면서, 고한다."

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「この世界で１番あなたに勝ちたいと思っているのは――この私、千園寺ヒルディオーネなのですから！！」"
translation = "「이 세상에서 가장 당신에게 이기고 싶다고 생각하는 것은―― 바로 이 저, 치온지 힐디 오네이니까요!!」"

[[dialogue]]
speaker = "マハムート"
original = "「相変わらず、いい度胸ね。であれば――」"
translation = "「여전하네, 좋은 배짱이야. 그렇다면――」"

[[dialogue]]
speaker = "unk"
original = "マムが鉄球の鎖を振るいながら、答える。"
translation = "마무가 철구의 사슬을 휘두르면서, 대답한다."

[[dialogue]]
speaker = "マハムート"
original = "「畏怖をもって、本気で跪かせてあげる」"
translation = "「외경심을 가지고, 진심으로 무릎 꿇게 해줄게」"

[[dialogue]]
speaker = "紅明"
original = "『――それでは、両雄準備が整ったみたいだし、元気に行くぜ～！』"
translation = "『――그러면, 두 영웅 준비가 끝난 것 같으니, 힘차게 가보자고～!』"

[[dialogue]]
speaker = "紅明"
original = "『星霊舞闘会、決勝戦！\u3000千園寺ヒルディオーネＶＳ妃竜院マハムート！！\u3000いざ――』"
translation = "『성령무투회, 결승전! 치온지 힐디 오네 VS 히류인 마하무트!! 자아――』"

[[dialogue]]
speaker = "unk"
original = "アリーナの中央フィールドに仮想結界が展開され――そして。"
translation = "아레나 중앙 필드에 가상 결계가 전개되고―― 그리고."

[[dialogue]]
speaker = "紅明"
original = "『試合開始ィィィーーーッ！！！』"
translation = "『시합 개시이이이ーー!!!』"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「――スパイラルストリームッ！！」"
translation = "「――스파이럴 스트림!!」"

[[dialogue]]
speaker = "マハムート"
original = "「――メテオインパクトッ！」"
translation = "「――메테오 임팩트!」"

[[dialogue]]
speaker = "unk"
original = "２つの極星がついに、激突を開始するのだった――"
translation = "두 개의 극성이 마침내, 격돌을 시작하는 것이었다――"

