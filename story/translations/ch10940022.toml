[[dialogue]]
speaker = "unk"
original = "第２話,ポンポンパンチ！,P"
translation = "제2화, 폼폼 펀치!, P"

[[dialogue]]
speaker = "カティア"
original = "「応援ありがとう、美鶴！\u3000おかげで入賞できたワン！」"
translation = "「응원 고마워, 미츠루! 덕분에 입상할 수 있었어 멍!」"

[[dialogue]]
speaker = "美鶴"
original = "「どういたしまして。お役に立てたなら何よりっす」"
translation = "「천만에요. 도움이 되었다니 다행입니다」"

[[dialogue]]
speaker = "unk"
original = "星霊祭でフランに気に入られた美鶴は、チア服の研究の一環で、時々応援団のヘルプに入っていた。"
translation = "성령제에서 프란에게 마음에 든 미츠루는, 치어복 연구의 일환으로, 가끔 응원단의 도움을 맡고 있었다."

[[dialogue]]
speaker = "カティア"
original = "「美鶴に応援されると、集中力がギュンってなって自分だけの世界に入れるんだ。あれがいわゆるゾーンっていうの？」"
translation = "「미츠루에게 응원을 받으면, 집중력이 퓽하고 올라가서 나만의 세계에 들어갈 수 있어. 그게 소위 말하는 존이라는 거야?」"

[[dialogue]]
speaker = "カティア"
original = "「元気が出る魔王様のと違って面白いや！\u3000またお願いね！」"
translation = "「기운이 나는 마왕님의 것과는 달라서 재미있네! 또 부탁해!」"

[[dialogue]]
speaker = "美鶴"
original = "「げ、モンスターすか」"
translation = "「게, 몬스터입니까」"

[[dialogue]]
speaker = "カティア"
original = "「魔王様、私たちで対処しましょう！\u3000ここから近いみたいですガオ！」"
translation = "「마왕님, 저희가 대처합시다! 여기서 가까운 것 같습니다 갸오!」"

[[dialogue]]
speaker = "美鶴"
original = "「しゃーないっすね。こんなカッコだし、うちは２人を徹底サポートしますよ」"
translation = "「어쩔 수 없네요. 이런 복장이니, 저는 두 분을 철저히 서포트하겠습니다」"

[[dialogue]]
speaker = "モンスター"
original = "「イーーーッ！」"
translation = "「이이이잇!」"

[[dialogue]]
speaker = "カティア"
original = "「あ、モンスターがこっちに来ました！」"
translation = "「아, 몬스터가 이쪽으로 왔습니다!」"

[[dialogue]]
speaker = "美鶴"
original = "「がんばれがんばれ、２人とも～。悪～いモンスターやっつけろ～」"
translation = "「힘내라 힘내라, 두 사람 다~. 나ー쁜 몬스터 물리쳐라~」"

[[dialogue]]
speaker = "カティア"
original = "「フルスピーーードッ！\u3000今です、魔王様っ！」"
translation = "「풀 스피ー드! 지금입니다, 마왕님!」"

[[dialogue]]
speaker = "unk"
original = "俺がトドメを刺す！"
translation = "내가 마무리를 짓는다!"

[[dialogue]]
speaker = "unk"
original = "カティアのスピードでかく乱し……"
translation = "카티아의 스피드로 교란하고……"

[[dialogue]]
speaker = "モンスター"
original = "「イィィ……」"
translation = "「이이이……」"

[[dialogue]]
speaker = "カティア"
original = "「さすが魔王様～♪\u3000お見事ですワン！」"
translation = "「역시 마왕님~♪ 훌륭하십니다 멍!」"

[[dialogue]]
speaker = "美鶴"
original = "「む……」"
translation = "「음……」"

[[dialogue]]
speaker = "美鶴"
original = "（カティアにはそーゆーつもりはなさそうなんだけど……会長さんとイチャってるとこ見ると、なーんかモヤる）"
translation = "（카티아는 그럴 생각은 없는 것 같지만…… 회장군과 알콩달콩하는 모습을 보면, 왠지 모르게 찜찜하다）"

[[dialogue]]
speaker = "カティア"
original = "「美鶴もナイス応援ガオ！\u3000爆速で動けたワン！」"
translation = "「미츠루도 나이스 응원 갸오! 폭속으로 움직일 수 있었어 멍!」"

[[dialogue]]
speaker = "美鶴"
original = "「ん、ども」"
translation = "「응, 고마워」"

[[dialogue]]
speaker = "カティア"
original = "「今のでモンスターは全部やっつけたガオ？\u3000大したことなかったですね！\u3000私たちの連携、完璧すぎです！」"
translation = "「이걸로 몬스터는 전부 물리친 갸오? 별거 아니었네요! 저희의 연계, 완벽합니다!」"

[[dialogue]]
speaker = "unk"
original = "まだ反応が残っている"
translation = "아직 반응이 남아 있다"

[[dialogue]]
speaker = "unk"
original = "油断は禁物だぞ"
translation = "방심은 금물이다"

[[dialogue]]
speaker = "カティア"
original = "「ふふーん、どっからでもかかってきやがれだワン！\u3000シュッ、シュッ！」"
translation = "「후훗, 어디서든 덤벼보시지 멍! 슉, 슉!」"

[[dialogue]]
speaker = "モンスター"
original = "「クルルーッ！」"
translation = "「크르르륵!」"

[[dialogue]]
speaker = "美鶴"
original = "「！？\u3000カティア、後ろっ！」"
translation = "「!? 카티아, 뒤!」"

[[dialogue]]
speaker = "カティア"
original = "「わふっ！？\u3000不意打ちっ！？」"
translation = "「와풋!? 불의의 일격!?」"

[[dialogue]]
speaker = "美鶴"
original = "（会長さんも間に合わないかっ！\u3000だったら、うちが──）"
translation = "（회장군도 늦었나! 그렇다면, 내가──）"

[[dialogue]]
speaker = "美鶴"
original = "「ぶん殴った方が早いっ！」"
translation = "「때려눕히는 게 빠르다!」"

[[dialogue]]
speaker = "美鶴"
original = "「閃拳・輝禍祓掌っ！」"
translation = "「섬권・휘화불장!」"

[[dialogue]]
speaker = "モンスター"
original = "「クルルッ！？」"
translation = "「크르르륵!?」"

[[dialogue]]
speaker = "unk"
original = "ナイスパンチ！"
translation = "나이스 펀치!"

[[dialogue]]
speaker = "unk"
original = "ポンポンでぶん殴った！？"
translation = "폼폼으로 때려눕혔다!?"

[[dialogue]]
speaker = "美鶴"
original = "「あー、スッキリー。やっぱ、うちは応援でサポるより戦闘に参加する方が性に合ってるみたいすね」"
translation = "「아ー, 속 시원해ー. 역시 저는 응원으로 서포트하는 것보다 전투에 참가하는 게 체질에 맞는 것 같네요」"

[[dialogue]]
speaker = "美鶴"
original = "「カティア、お手本みたいな油断だったよ。気ぃつけて」"
translation = "「카티아, 모범적인 방심이었어. 조심해」"

[[dialogue]]
speaker = "カティア"
original = "「うぅ、面目ないワン。守ってくれてありがとう！」"
translation = "「으윽, 면목 없습니다 멍. 지켜주셔서 감사합니다!」"

[[dialogue]]
speaker = "カティア"
original = "「くんくん……んん！？\u3000モンスターの新手、全方向から来ます！」"
translation = "「킁킁…… 으음!? 몬스터의 새로운 무리가, 전 방향에서 옵니다!」"

[[dialogue]]
speaker = "モンスター"
original = "「イ～～～ッ！」"
translation = "「이~~~잇!」"

[[dialogue]]
speaker = "モンスター"
original = "「イーーーーッ！」"
translation = "「이ーーーー잇!」"

[[dialogue]]
speaker = "美鶴"
original = "「うっわ、めちゃおかわり来た」"
translation = "「우왓, 엄청 리필 왔네」"

[[dialogue]]
speaker = "美鶴"
original = "「ここからはうちの応援なしでいいすか？\u3000うちも殴るんで」"
translation = "「여기부터는 제 응원 없이 해도 괜찮습니까? 저도 때릴 거라서요」"

[[dialogue]]
speaker = "unk"
original = "背中は任せた！"
translation = "등은 맡기겠다!"

[[dialogue]]
speaker = "カティア"
original = "「美鶴が後ろにいてくれると心強いワン！」"
translation = "「미츠루가 뒤에 있어 주니 든든합니다 멍!」"

[[dialogue]]
speaker = "美鶴"
original = "「ま、応援するよか背中を任される方が、うちらしいかもすね」"
translation = "「뭐, 응원하는 것보다 등을 맡겨지는 편이, 저답다고 할 수 있겠네요」"

[[dialogue]]
speaker = "美鶴"
original = "「さ、うちのポンポンに殴られたい奴からかかって来な」"
translation = "「자, 제 폼폼에게 맞고 싶은 녀석부터 덤벼」"

[[dialogue]]
speaker = "unk"
original = "美鶴がモンスターを片っ端から殴り倒し、街の平和を取り戻したのだった。"
translation = "미츠루가 몬스터를 닥치는 대로 때려눕히고, 마을의 평화를 되찾았던 것이다."

