[[dialogue]]
speaker = "unk"
original = "流星学園附属校１年Ｃ組での自己紹介を終えた後、俺と守護天使２人はクラスメイト達に囲まれて、挨拶を交わすことになった。"
translation = "유성학원 부속교 1학년 C반에서의 자기소개를 마친 후, 나와 수호천사 두 사람은 클래스메이트들에게 둘러싸여 인사를 나누게 되었다."

[[dialogue]]
speaker = "unk"
original = "それが落ち着いた頃に、こそっと１人の見知った顔が近づいてきて――"
translation = "그것이 진정되었을 무렵, 살며시 아는 얼굴 하나가 다가와서는──"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「……小さくなった上に、女子になって附属校に通い始めるなんて、どういうことなんですか、緋宮会長」"
translation = "「……작아진 데다 여자가 되어 부속교에 다니기 시작하다니, 대체 어떻게 된 일인가요, <u>히노미야</u> 회장님.」"

[[dialogue]]
speaker = "unk"
original = "ナミエルと同じクラスだったんだね"
translation = "나미엘이랑 같은 반이었구나."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「はい。私もまさか緋宮会長と同級生になるなんて、夢にも思いませんでした」"
translation = "「네. 저도 설마 <u>히노미야</u> 회장님과 동급생이 될 줄은 꿈에도 몰랐습니다.」"

[[dialogue]]
speaker = "unk"
original = "ナミエルは、星見家メイド隊の１人で、美化委員会にも所属する掃除のスペシャリストだ。"
translation = "나미엘은 호시미 가문 메이드대의 일원이자 미화위원회에도 소속된 청소의 스페셜리스트다."

[[dialogue]]
speaker = "unk"
original = "男に対して潔癖なところがあり、俺にもいささか手厳しい。しかしいざ話してみると、何だかんだ真面目に対応してくれる、いい子である。"
translation = "남자에 대해 결벽한 면이 있어 나에게도 다소 엄격하다. 하지만 막상 대화해 보면 이런저런 일에 진지하게 대응해 주는 착한 아이다."

[[dialogue]]
speaker = "unk"
original = "……実は元暗殺者であり、暗殺対象であったフィオナに拾ってもらったという過去があったりする。"
translation = "……사실은 전직 암살자이며, 암살 대상이었던 피오나에게 거두어졌다는 과거가 있다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「クラスメイトの皆さまとの会話で、体が小さくなった事情は大体わかりましたけど……本校の授業には出なくても大丈夫なんですか？」"
translation = "「클래스메이트분들과의 대화로 몸이 작아진 사정은 대충 알았습니다만…… 본교 수업에는 나가지 않아도 괜찮은 건가요?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「――ヴィーナス様から、せっかくだから本体が回復するまで、附属校体験してきなさいと無茶振りされた？」"
translation = "「──비너스 님께서 모처럼이니까 본체가 회복될 때까지 부속교 체험을 하고 오라고 억지를 부리셨다구요?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「何をやっているんですか、一体……」"
translation = "「대체 뭘 하고 계신 건가요……」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「というか、わざわざ女の体になる必要があったんですか？」"
translation = "「그보다 굳이 여자의 몸이 될 필요가 있었나요?」"

[[dialogue]]
speaker = "unk"
original = "それはアニマ先輩のノリで……"
translation = "그건 아니마 선배의 기분 탓으로……"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「――治療用の幼アバターは女性用しかなかった？\u3000ふぅむ」"
translation = "「──치료용 어린 아바타는 여성용밖에 없었다? 흐음.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「まぁ……かわいいとは、思いますけど……」"
translation = "「뭐…… 귀엽다고는 생각합니다만……」"

[[dialogue]]
speaker = "unk"
original = "え？"
translation = "에?"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「い、いえ。なんでもないです」"
translation = "「아, 아니요. 아무것도 아닙니다.」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「あの～、ナミエル・クレシェンテさまですよね？」"
translation = "「저기~ 나미엘 크레셴테 님이시죠?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「あ……！\u3000マグダレナ様……！」"
translation = "「아……! 마그달레나 님……!」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「うふふ、そんなかしこまらなくていいですよ。今日から同級生なんですから♪」"
translation = "「우후후, 그렇게 격식을 차리지 않아도 괜찮아요. 오늘부터 동급생이니까요♪」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「直接のご挨拶がまだでしたよね。初めまして、ナミエルさま。守護天使、《境界》のマグダレナです♪\u3000これからよろしくお願いしますね♪」"
translation = "「직접 인사가 아직이었죠. 처음 뵙겠습니다, 나미엘 님. 수호천사, 《경계》의 마그달레나예요♪ 앞으로 잘 부탁드려요♪」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「は、はい！\u3000こちらこそ、よろしくお願いします……！」"
translation = "「하, 네! 저야말로 잘 부탁드립니다……!」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「汝のことは、我も会長から聞いたことがあるぞ、ナミエルよ」"
translation = "「그대의 일은 나도 회장에게 들은 적이 있다, 나미엘이여.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「アルモタヘル様……！」"
translation = "「아르모타헬 님……!」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「様付けはよい。我のことは親しみを込めて、アルモたんと呼ぶのだ！」"
translation = "「님 자는 됐다. 나를 부를 때는 친근함을 담아 알모땅이라고 부르는 것이다!」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「い、いえ、それはちょっとハードルが……」"
translation = "「아, 아니요, 그건 좀 난이도가……」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「む～っ。この姿になっても、なかなかみんな呼んでくれないのだ。会長は呼んでくれたというのに～」"
translation = "「무우~. 이 모습이 되어도 다들 좀처럼 불러주지 않는 것이다. 회장은 불러주었는데 말이다~」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "（あ……むくれ顔、かわいい……）"
translation = "(아…… 삐친 얼굴, 귀여워……)"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「アルモタヘルはまだいいじゃないですか。私なんか、会長さまにもまだママダレナと呼んでもらえてないんですよ！」"
translation = "「아르모타헬은 아직 낫잖아요. 저는 회장님께 아직 마마달레나라고 불리지도 못했다구요!」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「いや、それはいささか無理があると思うのだ」"
translation = "「아니, 그건 아무래도 무리가 있다고 생각한다.」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「なんでですか！\u3000新星寮の寮長であるマハムートさまは、小柄ながらもマムと呼ばれているのですよ？」"
translation = "「왜인가요! 신성료의 사감인 마하무트 님은 자그마하면서도 마무라고 불리고 있잖아요?」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「だから私も、守護天使として皆からあんな風に、母のように慕われる存在になりたいのです。そう、<b>ママ</b>ダレナと……！」"
translation = "「그래서 저도 수호천사로서 모두에게 저렇게 어머니처럼 흠모받는 존재가 되고 싶단 말이에요. 그래요, 마마달레나라고……!」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「その為にはまず、アルモタヘルと同じように、会長さまから呼んでもらうのが第一目標です」"
translation = "「그러기 위해서는 우선 아르모타헬과 마찬가지로 회장님이 불러주시는 것이 제일 목표입니다.」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「というわけで会長さま、恥ずかしがらず、ママダレナと呼んで甘えてくれていいのですよ♪\u3000ほら♪」"
translation = "「그런 고로 회장님, 부끄러워하지 말고 마마달레나라고 부르며 어리광 부려도 괜찮다구요♪ 자♪」"

[[dialogue]]
speaker = "unk"
original = "そ、そんなキラキラした瞳で見られても……"
translation = "그, 그렇게 초롱초롱한 눈으로 보셔도……"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「な、なんだかお２人とも、外見だけでなく中身も少し、変わっているような……」"
translation = "「왠지 두 분 다 외형뿐만 아니라 속마음도 조금 변하신 것 같은……」"

[[dialogue]]
speaker = "unk"
original = "俺がアニマ先輩から聞いた説明を、ナミエルにすると――"
translation = "내가 아니마 선배에게 들은 설명을 나미엘에게 해주자──"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「魂が体に引っ張られている……？\u3000そんなことが……でも、言われてみれば緋宮会長も、仕草が女の子らしくなっていますね」"
translation = "「영혼이 몸에 이끌리고 있다……? 그런 일이…… 하지만 듣고 보니 <u>히노미야</u> 회장님도 몸짓이 여자아이처럼 변했네요.」"

[[dialogue]]
speaker = "unk"
original = "え！？\u3000嘘！？"
translation = "에!? 거짓말!?"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「自覚なかったのだ？\u3000今に限らず、アニマの薬で女体化している時はいつも、違和感ないくらい女の仕草をしているぞ、人の子よ」"
translation = "「자각 없었던 것인가? 지금뿐만 아니라 아니마의 약으로 여체화했을 때는 언제나 위화감 없을 정도로 여자의 몸짓을 하고 있다구, 인간의 아이여.」"

[[dialogue]]
speaker = "unk"
original = "いつの間にか心まで女体化してるーーっ！？"
translation = "어느새 마음까지 여체화하고 있어──!"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「いきなり膝を着いたりして大丈夫か！？\u3000そんなにショックだったのか、人の子よ！？」"
translation = "「갑자기 무릎을 꿇고서 괜찮은 건가!? 그렇게나 충격이었던 것이냐, 인간의 아이여!?」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「ママダレナが癒してあげますね～。よしよし♪」"
translation = "「마마달레나가 위로해 드릴게요~. 착하다 착해♪」"

[[dialogue]]
speaker = "unk"
original = "と、マグダレナさんに頭を撫でてもらっていると――"
translation = "마그달레나 씨가 머리를 쓰다듬어주고 있자──"

[[dialogue]]
speaker = "？？？"
original = "「ママダレナ～！」"
translation = "「마마달레나~!」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「！\u3000この声は……！」"
translation = "「! 이 목소리는……!」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ママダレナとアルモタヘルが転入してきたって話を聞いて、早速会いにきたわ♪」"
translation = "「마마달레나와 아르모타헬이 전입해 왔다는 소식을 듣고 얼른 만나러 왔어♪」"

[[dialogue]]
speaker = "unk"
original = "彼女は、附属校１年生のセシア。その正体は、守護天使《万成》のアウクセシアの転生体である。"
translation = "그녀는 부속교 1학년인 세시아. 그 정체는 수호천사 《만성》의 아우크세시아의 환생체다."

[[dialogue]]
speaker = "unk"
original = "去年のクリスマス頃、流星市国に転生し、記憶喪失だったところをヴィーナスに拾われて、学園へとやってきた。"
translation = "지난해 크리스마스 무렵 유성시국에 환생했고, 기억 상실 상태였던 것을 비너스가 거두어 학원으로 오게 되었다."

[[dialogue]]
speaker = "unk"
original = "守護天使の２人と再会したことで自身が何者なのか思い出し、現在はリクリエとの戦いに力を貸してくれている。"
translation = "수호천사 두 사람과 재회함으로써 자신이 누구인지 기억해 냈고, 현재는 리크리에와의 싸움에 힘을 보태주고 있다."

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「セシア～♪\u3000ママダレナも会いたかったですよ～♪」"
translation = "「세시아~♪ 마마달레나도 보고 싶었어요~♪」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「ふふっ、どうだセシア、我ら２人の制服姿は？\u3000なかなか似合っているであろう♪」"
translation = "「후훗, 어떠냐 세시아, 우리 둘의 교복 차림은? 제법 잘 어울리지 않느냐♪」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「……じ～っ」"
translation = "「……지긋──」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「これで守護天使３人、お揃いですね♪\u3000……っと、セシア、どうかしましたか？」"
translation = "「이걸로 수호천사 세 명, 세트네요♪ ……엇, 세시아, 왜 그래요?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「――マグダレナ。残念ながら、今のあなたはママではないわ」"
translation = "「──마그달레나. 유감이지만 지금의 당신은 마마가 아니야.」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「えええぇぇぇ～～～っ！？」"
translation = "「에에에에에엑~~~~!?」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「セシアの『ママ判定』、まさかの手の平返しなのだ！」"
translation = "「세시아의 『마마 판정』, 설마 했던 태세 전환인 것이다!」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「な、なんでですか！？\u3000私の心は今、自らママダレナになりたいと、母性がみなぎっているというのに！」"
translation = "「어, 어째서인가요!? 제 마음은 지금 스스로 마마달레나가 되고 싶다고 모성애가 넘쳐흐르고 있는데!」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「う～ん、なんと言えばいいのかしら……」"
translation = "「으음, 뭐라고 말해야 할까……」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「今のあなた、とてもあざとくて、子供っぽいわ」"
translation = "「지금의 당신, 너무 영악하고 아이 같아.」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「あざといっ！？」"
translation = "「영악하다구요!?」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「そ……そんなぁぁぁ～～～っ！\u3000うわあああぁぁぁ～～～ん！」"
translation = "「그…… 그럴 수가아아아~~~~! 으아아아아아앙!」"

[[dialogue]]
speaker = "unk"
original = "ちょっ、マグダレナさんガチ泣き！？"
translation = "잠깐, 마그달레나 씨 진짜로 울어!?"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「！\u3000あなたは……？」"
translation = "「! 당신은……?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「――えっ、会長！？\u3000……なるほど、アバターで女の子になったのね？」"
translation = "「──어, 회장!? ……과연, 아바타로 여자가 된 거구나?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「じ～っ……」"
translation = "「지긋──……」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「……見つけたわ」"
translation = "「……찾았다.」"

[[dialogue]]
speaker = "unk"
original = "え？"
translation = "에?"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「あなたがセシアの新しいママね！」"
translation = "「당신이 세시아의 새로운 마마야!」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「なっ！？」"
translation = "「뭐라구!?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「クロトママ～♪」"
translation = "「쿠로토 마마~♪」"

[[dialogue]]
speaker = "unk"
original = "そう言うと、セシアが俺に抱き着き、胸に顔を埋めてきて――"
translation = "그렇게 말하며 세시아가 나에게 안겨 가슴에 얼굴을 묻어왔고──"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「えへへ～♪\u3000クロトママのおっぱい、大きくて柔らか～い♪」"
translation = "「에헤헤~♪ 쿠로토 마마 가슴, 크고 말랑말랑해~♪」"

[[dialogue]]
speaker = "unk"
original = "えええぇぇぇーーーーーーっ！！？"
translation = "에에에에에에──────!!?"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「会長さまにママの座を奪われましたぁぁぁ～～～っ！！！」"
translation = "「회장님께 마마의 자리를 빼앗겼어요오오오~~~~!!!」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「ぷっ……あははは！\u3000マグダレナ、まさかの会長と、立場が逆転しちゃってて面白いのだ！」"
translation = "「풉…… 아하하하! 마그달레나, 설마 했던 회장과 입장이 역전돼 버리다니 재미있는 것이다!」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「う……うわあぁぁぁ～～～ん！」"
translation = "「으…… 으아아아앙!」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「何なんですか……このカオスな状況……」"
translation = "「도대체 뭔가요…… 이 카오스한 상황은……」"

[[dialogue]]
speaker = "unk"
original = "横から見ていて、思わずツッコんでしまうナミエルなのだった。"
translation = "옆에서 보고 있던 나미엘은 자기도 모르게 태클을 걸고 있었다."

