[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「ここからクライマックスまでの流れを、通しでやる！\u3000よーい……アクション！」"
translation = "「여기서부터 클라이맥스까지의 흐름을 통으로 간다! 준비…… 액션!」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「キャピュレット夫人の甥ティボルトが、ロミオの親友であるマーキューシオを殺してしまった」"
translation = "「캐퓰릿 부인의 조카 티볼트가 로미오의 절친인 머큐시오를 죽여버렸다.」"

[[dialogue]]
speaker_original = "マーキューシオ"
speaker_translation = "머큐시오"
original = "「ぎゃー！\u3000おのれ、ティボルトめー！\u3000この恨み、はらさでおくべきかー！」"
translation = "「갸아! 이놈, 티볼트 녀석! 이 원한, 갚지 않고 배기겠느냐!」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「親友のマーキューシオを失い、逆上したロミオはティボルトに反撃し、勢い余って殺めてしまう」"
translation = "「친우인 머큐시오를 잃고 격분한 로미오는 티볼트에게 반격하고, 기세를 몰아 죽이고 만다.」"

[[dialogue]]
speaker = "unk"
original = "マーキューシオ……仇は取ったぜ"
translation = "머큐시오…… 원수는 갚았어"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「だが、仇討ちは新たな悲しみを産むだけだ。殺人の大罪人となったロミオは、ヴェローナから永久追放された」"
translation = "「하지만 복수는 새로운 슬픔을 낳을 뿐이다. 살인을 저지른 대죄인이 된 로미오는 베로나에서 영구 추방당했다.」"

[[dialogue]]
speaker_original = "ジュリエット"
speaker_translation = "줄리엣"
original = "「ロミオ様が殺人犯に……！？\u3000ヴェローナから永久追放されたですって……！？\u3000そんな……ヨヨヨ」"
translation = "「로미오 님이 살인범이라니……!? 베로나에서 영구 추방되었다고요……!? 그런…… 흐윽흐윽.」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「もうロミオとは二度と会えぬと悲しみに暮れるジュリエット。そして、父・キャピュレットは望まぬ政略結婚をジュリエットに命じる」"
translation = "「이제 로미오와는 다시 만날 수 없다는 슬픔에 잠긴 줄리엣. 그리고 아버지 캐퓰릿은 원치 않는 정략결혼을 줄리엣에게 명한다.」"

[[dialogue]]
speaker_original = "ジュリエット"
speaker_translation = "줄리엣"
original = "「嫌よ、絶対に嫌！\u3000ロミオ様以外の人と結ばれるなんて！」"
translation = "「싫어, 절대로 싫어! 로미오 님 이외의 사람과 맺어지다니!」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「彼女は何とかしてこの話から逃れようと、ロレンス神父に助けを求める。そして、ロレンスはジュリエットに」"
translation = "「그녀는 어떻게든 이 이야기에서 도망치려 로렌스 신부에게 도움을 청한다. 그리고 로렌스는 줄리엣에게」"

[[dialogue]]
speaker_original = "ロレンス神父"
speaker_translation = "로렌스 신부"
original = "「２時間仮死状態になる薬を飲み、死者として霊廟に埋葬され、目覚めたところに、知らせを受けて迎えに来たロミオと駆け落ちするがよいよいよい」"
translation = "「2시간 동안 가사 상태가 되는 약을 마시고, 죽은 사람으로서 영묘에 매장된 뒤, 깨어났을 때 소식을 듣고 데리러 온 로미오와 도망치도록 하거라라라.」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「──という命がけの策を持ちかけた。まったく無茶をする」"
translation = "「──라는 목숨을 건 계책을 제안했다. 참으로 무모하군.」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「パリスとの結婚式の前夜、死の危険をも覚悟し、ジュリエットは仮死の薬をぐいっと一気に飲み干す」"
translation = "「패리스와의 결혼식 전날, 죽음의 위험까지 각오하고 줄리엣은 가사약을 꿀꺽 한 번에 들이켠다.」"

[[dialogue]]
speaker_original = "ジュリエット"
speaker_translation = "줄리엣"
original = "「これを飲めば、目覚めた時、私はロミオ様とともに生きることができるのね……ぐび、ぐびっ……うぅぅぅ……がくっ」"
translation = "「이걸 마시면 깨어났을 때, 나는 로미오 님과 함께 살 수 있는 거네…… 꿀꺽, 꿀꺽…… 으으으으…… 털썩.」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「ロレンスの思惑通り、仮死状態になったジュリエット。翌日、キャピレット家では服毒死したと思われた娘の最期を嘆く葬儀が行われた」"
translation = "「로렌스의 의도대로 가사 상태가 된 줄리엣. 다음 날, 캐퓰릿 가문에선 독을 마시고 죽은 줄 알았던 딸의 마지막을 애도하는 장례식이 치러졌다.」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「火葬とか土葬じゃなくて良かったね～」"
translation = "「화장이나 매장이 아니라서 다행이네~」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「変わり果てた姿のジュリエットと再会したロミオは、彼女の後を追って毒を飲み、息絶えた。こっちは本物の毒だ」"
translation = "「변해버린 모습의 줄리엣과 재회한 로미오는 그녀의 뒤를 쫓아 독을 마시고 숨이 끊어졌다. 이쪽은 진짜 독이다.」"

[[dialogue]]
speaker = "unk"
original = "君がいない世界なんて考えられない……\n俺も後を追うよ……ぐび、ぐび……がふっ！？"
translation = "네가 없는 세상 따위 생각할 수 없어……\\n나도 뒤를 쫓을게…… 꿀꺽, 꿀꺽…… 컥!? 로미오가 쓰러진다."

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ちなみに今、お兄ちゃんが飲んだのは、死ぬほど苦～い罰ゲーム用のお茶だよ♪」"
translation = "「참고로 방금 오빠가 마신 건 죽을 만큼 쓰~은 벌칙 게임용 차야♪」"

[[dialogue]]
speaker = "unk"
original = "（こんなところに凝らなくても……マッズぅ）"
translation = "(이런 데까지 신경 안 써도 되는데…… 더럽게 맛없네)"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「その直後、ジュリエットが目を覚ますと、すぐ傍でロミオが息絶えていた」"
translation = "「그 직후 줄리엣이 눈을 뜨자, 바로 곁에서 로미오가 숨져 있었다.」"

[[dialogue]]
speaker_original = "ジュリエット"
speaker_translation = "줄리엣"
original = "「まあ、なんてこと！？\u3000ロミオ様！\u3000ロミオ様！？」"
translation = "「어머, 이럴 수가! 로미오 님! 로미오 님!?」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「そのロミオを見て、ジュリエットは事の成り行きを悟った」"
translation = "「그 로미오를 보고 줄리엣은 사태의 전말을 깨달았다.」"

[[dialogue]]
speaker_original = "ジュリエット"
speaker_translation = "줄리엣"
original = "「はっ！\u3000つまり、私が本当に死んだと思い込んで、後を追ってしまわれたのですね！？」"
translation = "「핫! 즉, 제가 정말로 죽었다고 오해하시고 뒤를 쫓으신 거군요!?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「察しが良すぎるね～」"
translation = "「눈치가 너무 빠르네~」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「ジュリエットはロミオの持っていた短剣で自害し、彼の後を追った」"
translation = "「줄리엣은 로미오가 가지고 있던 단검으로 자결하여 그의 뒤를 쫓았다.」"

[[dialogue]]
speaker_original = "ジュリエット"
speaker_translation = "줄리엣"
original = "「ああ、なんてこと！\u3000ロミオ様のいないこの世界で、生き続けても仕方ありませんわ……私もあなたの剣で後を追います」"
translation = "「아아, 이럴 수가! 로미오 님이 없는 이 세상에서 계속 살아가 봤자 소용없어요…… 저도 당신의 칼로 뒤를 쫓겠습니다.」"

[[dialogue]]
speaker_original = "ジュリエット"
speaker_translation = "줄리엣"
original = "「せめて、天国では一緒に……」"
translation = "「적어도 천국에서는 함께……」"

[[dialogue]]
speaker_original = "ジュリエット"
speaker_translation = "줄리엣"
original = "「ぐふっ……ぱたり」"
translation = "「구훕…… 털썩.」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「思い切りが良すぎるね～」"
translation = "「결단력이 너무 좋네~」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「両家の争いは、若い彼らを死に追いやった。息子と娘の死を悔やみ、両家は和解を誓い合ったのである」"
translation = "「두 가문의 분쟁은 젊은 그들을 죽음으로 몰아넣었다. 아들과 딸의 죽음을 후회하며 두 가문은 화해를 맹세했다.」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「めでたし、めでたし」"
translation = "「오래오래 행복하게 살았답니다.」"

[[dialogue]]
speaker = "unk"
original = "めでたくはないね"
translation = "행복한 결말은 아니지"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「うう……悲しいお話です……」"
translation = "「우우…… 슬픈 이야기예요……」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「穴が開くほど読んだ、今やどこにでもある結末だ。今更、涙するようなものでもない」"
translation = "「구멍이 날 정도로 읽어서 이제는 어디에나 있는 결말이다. 이제 와서 눈물 흘릴 만한 것도 아니지.」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「使い古されていて新鮮味はないが、王道とはそういうものだ。本作から着想を得た後世の作品も無数に存在する」"
translation = "「진부해서 신선함은 없지만 왕도란 그런 법이다. 본작에서 영감을 얻은 후세의 작품도 무수히 존재하지.」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「……うむ。後半はほぼ２人の接触がないから、問題ない。そのすれ違いこそが、涙を誘う肝なのだが」"
translation = "「……음. 후반은 거의 두 사람의 접촉이 없으니 문제없다. 그 엇갈림이야말로 눈물을 유도하는 핵심이지만.」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「やはり肉体接触のある中盤が大問題だ。そこを克服するには──よし、会長、藍」"
translation = "「역시 육체 접촉이 있는 중반이 큰 문제다. 그걸 극복하려면── 좋아, 회장, 아이.」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「は、はい」"
translation = "「네, 네.」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「今週末、２人でデートしろ。部長命令だ」"
translation = "「이번 주말, 둘이서 데이트해라. 부장 명령이다.」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「えぇえぇぇぇっ！？」"
translation = "「에에에에엑!?」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「か、会長さんとデートしろだなんて……部長はいつも無茶振りばかりなんです……うぅ……」"
translation = "「회, 회장님과 데이트라니…… 부장님은 언제나 무리한 요구만 하세요…… 으으……」"

[[dialogue]]
speaker = "unk"
original = "嫌なら無茶しなくても"
translation = "싫으면 억지로 안 해도 돼"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「い、嫌ではないです……よ？\u3000お芝居を仕事にする以上、男性恐怖症もいつかは克服しなきゃって思ってますし……」"
translation = "「시, 싫은 건 아니에요……요? 연기를 업으로 삼는 이상 남성 공포증도 언젠가는 극복해야 한다고 생각하고 있고……」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「会長さんの貴重なお時間を、私とのデートなんかで使わせちゃうのが……ご迷惑かなって……」"
translation = "「회장님의 귀중한 시간을 저 같은 애랑 데이트하는 데 쓰게 만드는 게…… 민폐일까 싶어서……」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「会長さん、退屈しちゃいます……私といても面白くないと思いますよ……？」"
translation = "「회장님, 지루해하실 거예요…… 저랑 있어도 재미없을걸요……?」"

[[dialogue]]
speaker = "unk"
original = "そんなことないと思うけど"
translation = "그렇지 않을 것 같은데"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「ダメです、ダメです。今だってまっすぐ目も合わせられないですし……演劇のことくらいしか話せないですし、私なんて欠点だらけなんですから」"
translation = "「안 돼요, 안 돼. 지금도 똑바로 눈도 못 맞추고…… 연극 얘기 정도밖에 못 하고, 저는 결점투성이니까요.」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「で、でも、でもでも、そ、それでもいいというのでしたら……その……」"
translation = "「하, 하지만, 하지만 하지만, 그, 그래도 괜찮으시다면…… 그게……」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「会長さんとデート……男の人と初デートして、みたいです……私と、デート、してくれます、か……？」"
translation = "「회장님과 데이트…… 남자분과 첫 데이트 해, 보고 싶어요…… 저와 데이트, 해 주시겠, 어요……?」"

[[dialogue]]
speaker = "unk"
original = "もちろん\nよろしくね、藍"
translation = "물론이지\\n잘 부탁해, 아이"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「は、はいっ！\u3000よろしくお願い、します……！」"
translation = "「네, 네! 잘 부탁, 드립니다……!」"

