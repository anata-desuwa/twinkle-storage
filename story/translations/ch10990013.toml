[[dialogue]]
speaker = "unk"
original = "第３話,ミウの秘密特訓,P"
translation = "제3화, 미우의 비밀 특훈"

[[dialogue]]
speaker = "unk"
original = "俺は地下トレーニング施設で、ミウと対峙していた。"
translation = "나는 지하 트레이닝 시설에서 미우와 대치하고 있었다."

[[dialogue]]
speaker = "ミウ"
original = "「行きますよ、会長さんっ！\u3000はっ！\u3000たっ！\u3000レイピアバレット！」"
translation = "「갑니다, 회장님! 하앗! 타앗! 레이피어 발렛!」"

[[dialogue]]
speaker = "ミウ"
original = "「嘘っ、今の銃弾が防がれるなんて──」"
translation = "「거짓말, 방금 총알이 막히다니──」"

[[dialogue]]
speaker = "unk"
original = "隙だらけだよ！"
translation = "빈틈투성이야!"

[[dialogue]]
speaker = "ミウ"
original = "「きゃあっ！\u3000はぁ、はぁ……まっ、まだまだです……手加減無用……続き、お願いします……！」"
translation = "「꺄악! 하아, 하아…… 아, 아직이에요…… 봐주기 없기…… 계속, 부탁드려요……!」"

[[dialogue]]
speaker = "unk"
original = "トレーニング開始から１時間。まだ彼女は俺に一度も決定打を与えられていない。"
translation = "트레이닝 시작 후 1시간. 그녀는 아직 나에게 단 한 번의 결정타도 날리지 못했다."

[[dialogue]]
speaker = "ミウ"
original = "「会長さん、あなたを学園最強と見込んでお願いします」"
translation = "「회장님, 당신을 학원 최강으로 보고 부탁드리는 겁니다.」"

[[dialogue]]
speaker = "ミウ"
original = "「日々の業務でお忙しいとは思いますけど、私にお稽古をつけてもらえませんでしょうか」"
translation = "「매일 업무로 바쁘시겠지만, 저에게 가르침을 주실 수 없을까요.」"

[[dialogue]]
speaker = "ミウ"
original = "「セナリィ社長の<ruby>女帝<rt>エンプレス</rt></ruby>フォームばかりに頼りきりじゃ、いつか社長は過労で倒れてしまいます」"
translation = "「세나리 사장님의 여제 폼에만 의존해서는 언젠가 사장님이 과로로 쓰러지고 말 거예요.」"

[[dialogue]]
speaker = "ミウ"
original = "「新型モンスターとの戦いにおいて、私は何の役にも立ててません……社長やヒマワリちゃんの足を引っ張りたくないんです」"
translation = "「신형 몬스터와의 싸움에서 저는 아무런 도움이 되지 못하고 있어요…… 사장님이나 히마와리짱의 발목을 잡고 싶지 않아요.」"

[[dialogue]]
speaker = "unk"
original = "でも、ミウはまだ附属生だし"
translation = "하지만 미우는 아직 부속생이고."

[[dialogue]]
speaker = "ミウ"
original = "「それは弱くていい理由にはならないです。いつか強くなれるんだとしても、力が欲しいのは今なんです」"
translation = "「그건 약해도 된다는 이유가 되지 않아요. 언젠가 강해질 수 있다 하더라도, 힘이 필요한 건 지금이에요.」"

[[dialogue]]
speaker = "ミウ"
original = "「だから、一度だけでもいいんです。会長さんと剣を交えることで得られるものは、きっと大きいはずですから」"
translation = "「그러니까 한 번이라도 좋아요. 회장님과 검을 나누며 얻는 것은 분명히 클 테니까요.」"

[[dialogue]]
speaker = "unk"
original = "ミウの熱意に負けて、俺は彼女に稽古をつけることになった。"
translation = "미우의 열의에 져서 나는 그녀에게 대련을 해주기로 했다."

[[dialogue]]
speaker = "ミウ"
original = "「はぁ、はぁっ、ま、まだです……！」"
translation = "「하아, 하아, 아, 아직이에요……!」"

[[dialogue]]
speaker = "ミウ"
original = "「えっ、もう時間……！？\u3000まだ会長さんに一矢も報えてない……何も掴めてないのに……私は、強くなれないの……？\u3000足手まといでしかないの……？」"
translation = "「엣, 벌써 시간……!? 아직 회장님께 한 방도 먹이지 못했는데…… 아무것도 깨닫지 못했는데…… 나는 강해질 수 없는 거야……? 짐이 될 뿐인 거야……?」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「そんなわけないじゃんっ！」"
translation = "「그럴 리가 없잖아!」"

[[dialogue]]
speaker = "ミウ"
original = "「えっ……その声は──ヒマワリちゃん！？」"
translation = "「엣…… 그 목소리는── 히마와리짱!?」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「そーだよ、あたしだよ！\u3000水臭いじゃん、ミウ」"
translation = "「그래, 나야! 너무 정 없잖아, 미우.」"

[[dialogue]]
speaker = "ミウ"
original = "「どうして、ここに……？\u3000内緒にしてたのに……」"
translation = "「어떻게 여기에……? 비밀로 하고 있었는데……」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「『附属の子が会長と特訓してる』って噂が聞こえてきたからさ。ピーンと来たんだよね、絶対にミウだーって！」"
translation = "「『부속 아이가 회장이랑 특훈하고 있다』는 소문이 들려왔거든. 딱 감이 왔지, 절대 미우라고!」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「抜け駆けなんてズルいじゃん！\u3000会長さん、あたしもトレーニングに参加させてよ！」"
translation = "「새치기하는 건 치사하잖아! 회장님, 나도 트레이닝에 끼워줘!」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「まさか会長さんが、附属の子相手に『２対１は卑怯だー』なんて言わないよねー？」"
translation = "「설마 회장님이 부속생 상대로 『2대 1은 비겁하다~』 같은 소린 안 하겠지?」"

[[dialogue]]
speaker = "unk"
original = "もちろん、望むところだ！"
translation = "물론, 바라던 바다!"

[[dialogue]]
speaker = "ヒマワリ"
original = "「よーし、ミウ！\u3000会長さんのこと、やっつけちゃおう！」"
translation = "「좋아, 미우! 회장님을 혼내주자!」"

[[dialogue]]
speaker = "ミウ"
original = "「でも、会長さんはすごく強いよ。さっきから何度やっても弾かれちゃって……」"
translation = "「하지만 회장님은 정말 강해. 아까부터 몇 번을 해도 다 튕겨 나가서……」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「頭に血が昇っちゃってるんだろうけどさ。せっかくのミウの持ち味を殺しちゃ意味ないじゃん。ほら、深呼吸、深呼吸」"
translation = "「머리에 피가 쏠려 있는 모양인데 말이야. 미우의 장점을 죽여버리면 의미 없잖아. 자, 심호흡, 심호흡.」"

[[dialogue]]
speaker = "ミウ"
original = "「あっ……すぅー、はぁー……すぅー、はぁー……うん、大丈夫、落ち着いた」"
translation = "「앗…… 후우, 하아…… 후우, 하아…… 응, 괜찮아, 진정됐어.」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「会長さんをやっつけるプラン、思いつきそ？」"
translation = "「회장님을 이길 플랜, 떠올랐어?」"

[[dialogue]]
speaker = "ミウ"
original = "「やっつけるのは難しいけど、ビックリさせるくらいはできるかも。ごにょごにょごにょ──」"
translation = "「이기는 건 어렵겠지만 깜짝 놀라게 할 정도는 가능할지도. 소곤소곤소곤──」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「ふんふん……あは、あははっ！\u3000さっすがー！\u3000それでこそ、いつものミウだ！」"
translation = "「흐음흐음…… 아하, 아하하! 역시! 그래야 평소의 미우지!」"

[[dialogue]]
speaker = "ミウ"
original = "「ヒマワリちゃん、私よりも私のことよくわかってるんだね」"
translation = "「히마와리짱, 나보다 나를 더 잘 알고 있구나.」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「当たり前でしょ、だって、あたしたち──」"
translation = "「당연하지, 그야 우리들은──」"

[[dialogue]]
speaker = "ミウ"
original = "「──親友だもんね！\u3000行きます、会長さん！」"
translation = "「──절친이니까! 갑니다, 회장님!」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「会長さん強かったねー！」"
translation = "「회장님 강했어!」"

[[dialogue]]
speaker = "ミウ"
original = "「うん、思ってた以上だった。さすがだね」"
translation = "「응, 생각 이상이었어. 역시 대단하네.」"

[[dialogue]]
speaker = "unk"
original = "ふたりの連携もバッチリだったよ"
translation = "둘의 연계도 완벽했어."

[[dialogue]]
speaker = "ミウ"
original = "「私に注意が向いてる時は、ヒマワリちゃんが斬り込んで」"
translation = "「나에게 주의가 쏠려 있을 때는 히마와리짱이 파고들고.」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「あたしが目くらまししてる時は、ミウが狙撃で狙う！\u3000そしたら、会長さんの頭をズキューンって！」"
translation = "「내가 눈속임을 할 때는 미우가 저격으로 조준! 그러면 회장님 머리를 즈큐웅 하고!」"

[[dialogue]]
speaker = "unk"
original = "２人の息をもつかせぬ連携で、最後の最後にミウの狙撃で１本取られてしまった。"
translation = "둘의 숨 쉴 틈 없는 연계에 마지막 순간 미우의 저격으로 한 판을 내주고 말았다."

[[dialogue]]
speaker = "unk"
original = "自分の長所を伸ばし続けるようにね"
translation = "자신의 장점을 계속 키워나가도록 해."

[[dialogue]]
speaker = "ミウ＆ヒマワリ"
original = "「はいっ！」"
translation = "「네!」"

[[dialogue]]
speaker = "ミウ"
original = "「あっ、鯛焼き、焼けたみたいです。ここの鯛焼き屋さんは注文してから焼いてくれるんで、いつも焼き立てアツアツで、本っ当に美味しいんです！」"
translation = "「앗, 붕어빵 다 구워진 것 같아요. 여기 붕어빵 집은 주문하면 구워주기 때문에 항상 갓 구운 따끈따끈한 게 정말 맛있거든요!」"

[[dialogue]]
speaker = "ミウ"
original = "「ささやかですけど、私からのせめてもの感謝の気持ちです。２人とも奢られてください」"
translation = "「약소하지만 저의 작은 감사의 마음입니다. 두 분 다 대접받아 주세요.」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「いっただっきまーす！\u3000はふはふ、ほふほふ……んーっ！\u3000美味ぁーっ！」"
translation = "「잘 먹겠습니다! 하후하후, 호후호후…… 음~! 맛있다!!」"

[[dialogue]]
speaker = "unk"
original = "うん、美味しい！"
translation = "응, 맛있어!"

[[dialogue]]
speaker = "ミウ"
original = "「お口に合ったようで、良かったです」"
translation = "「입맛에 맞으신 것 같아 다행이에요.」"

[[dialogue]]
speaker = "ミウ"
original = "「会長さん、いずれは私もなれるでしょうか。誰よりも輝けるプリマステラに」"
translation = "「회장님, 언젠가 저도 될 수 있을까요. 누구보다 빛나는 프리마스텔라가.」"

[[dialogue]]
speaker = "unk"
original = "ミウなら必ずなれるよ。俺が保証する"
translation = "미우라면 반드시 될 수 있어. 내가 보증하지."

[[dialogue]]
speaker = "ミウ"
original = "「ありがとうございます。会長さんがそう言ってくれると、不思議と叶いそうな……そんな気がするんです」"
translation = "「감사합니다. 회장님이 그렇게 말씀해 주시니 신기하게도 이뤄질 것 같은…… 그런 기분이 들어요.」"

[[dialogue]]
speaker = "ミウ"
original = "「できればでいいんですけど……私の成長、見守っててくださいね、会長さん♪」"
translation = "「가능하다면 좋겠지만…… 제가 성장하는 모습, 지켜봐 주세요, 회장님♪」"

