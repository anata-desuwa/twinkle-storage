[[dialogue]]
speaker = "unk"
original = "第２話,アニマファーストコンタクト・後編,P"
translation = "제2화, 아니마 퍼스트 컨택트 · 후편"

[[dialogue]]
speaker = "unk"
original = "前略。アニマ先輩の薬を飲んで、副作用で盛大に爆発した。"
translation = "전략. 아니마 선배의 약을 먹고 부작용으로 성대하게 폭발했다."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「ケホッ、ケホッ、爆発の煙で一面真っ白だナ……無事かね、会長？\u3000……おや？」"
translation = "「케혹, 케혹, 폭발 연기로 온통 하얗다다로우…… 무사한가, 회장? ……오야?」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「……フヒヒッ、ヒヒヒッ、ハハハハハッ！\u3000何ということダ、素晴らしい！\u3000アニマが錬金術で仕上げをしてあげるヨ。そら、制服ダ！」"
translation = "「……후히히, 히히히, 하하하하하! 이럴 수가, 대단하다다! 아니마가 연금술로 마무리를 해주겠다요. 자, 교복이다다!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「煙がようやく収まったわね。クロト、無事！？\u3000……って、あなた誰！？」"
translation = "「연기가 겨우 가라앉았네. 쿠로토, 무사해!? ……랄까, 당신 누구야!?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「いやでも、どことなく……まさか、会長！？」"
translation = "「아니 근데 어딘지 모르게…… 설마, 회장님!?」"

[[dialogue]]
speaker = "unk"
original = "な……なんだよ、２人とも。どういうことだ？"
translation = "뭐…… 뭐야, 둘 다. 어떻게 된 거야?"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ちょっと自分で鏡を見てみなさい！\u3000手鏡貸してあげるから！」"
translation = "「잠깐 직접 거울 좀 봐! 손거울 빌려줄 테니까!」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「それなら、アニマが錬金術でスタンドミラーも出してあげるヨ。フヒ、そっちの方が見やすいダロウ？」"
translation = "「그렇다면 아니마가 연금술로 전신 거울도 내주겠다요. 후히, 그쪽이 보기 편하다다로우?」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「錬成陣展開。──よし、出来たゾ。見てみるといい……フヒヒッ」"
translation = "「연성진 전개. ──좋아, 됐다다. 봐보라다로우…… 후히히.」"

[[dialogue]]
speaker = "unk"
original = "な……なんじゃこりゃあああぁぁぁ──ッ！？"
translation = "이…… 이게 뭐야아아아아아──악!?"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「フヒッ、ハハハハハッ！\u3000見事過ぎる程に、美少女に変身してるゾ、会長！\u3000キミは薬の副作用で女体化したというわけダ！」"
translation = "「후히, 하하하하하! 너무나도 훌륭하게 미소녀로 변신했다다, 회장! 너는 약의 부작용으로 여체화했다는 거라다!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「か、可愛い……絶世の美少女だわ！\u3000というか、胸が『可愛さ余って肉１００倍』になってるわよ！」"
translation = "「가, 귀여워…… 절세의 미소녀야! 그보다 가슴이 『귀여움이 지나쳐 살 100배』가 됐잖아!」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「ことわざが間違っているが……フヒヒッ、確かにとんでもない爆乳だゾ、会長。ちょっと失礼」"
translation = "「속담이 틀렸다만…… 후히히, 확실히 엄청난 폭유라다다, 회장. 잠깐 실례.」"

[[dialogue]]
speaker = "unk"
original = "きゃあぁぁぁっ！？\u3000どこ触ってんの！？"
translation = "꺄아아악!? 어디 만지는 거야!?"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「ハハハッ！\u3000可愛い声が出たナ。アニマの鑑定によると……スリーサイズはなんと上から９９・６１・８９ダ！\u3000カップサイズは脅威のＩカップ！」"
translation = "「하하하! 귀여운 소리가 났다다로우. 아니마의 감정에 따르면…… 쓰리 사이즈는 무려 위에서부터 99 · 61 · 89라다! 컵 사이즈는 경이로운 I컵!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「星徒会最強のサーシャさんより上！？」"
translation = "「성도회 최강인 사샤 씨보다 위라고!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「可愛さ余って憎さ１００倍よ、クロト！」"
translation = "「귀여움이 지나쳐 미움 100배야, 쿠로토!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「嫉妬でことわざが一致した！？」"
translation = "「질투로 속담이 일치했어!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「というか、全身から美少女オーラが溢れてて、後光がさしてるみたいに眩しいんだけど……これはひょっとして星力なの！？」"
translation = "「그보다 온몸에서 미소녀 오라가 넘쳐흘러서 후광이 비치는 것처럼 눈부신데…… 이거 설마 성력이야!?」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「その通りだヨ、ヴィーナス。実験は成功ダ！\u3000会長は今、美少女に変身した上に星力も倍増した、まさに最強形態というわけサ！」"
translation = "「그 말대로다요, 비너스. 실험은 성공이다다! 회장은 지금 미소녀로 변신한 데다 성력도 배가된, 그야말로 최강 형태라는 거라다!」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「フヒッ、ハハハハハッ！\u3000実に素晴らしイ！」"
translation = "「후히, 하하하하하! 실로 훌륭하다다!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「いやこれ……きっと私の星力を上回ってるわよ？\u3000副作用の性転換を差し引いても、本当に対リクリエの切り札になり得るんじゃ……」"
translation = "「아니 이거…… 분명 내 성력을 웃돌고 있어. 부작용인 성전환을 빼더라도 정말로 대 리크리에용 비장의 카드가 될 수 있을지도……」"

[[dialogue]]
speaker = "unk"
original = "お花摘みに行きたい……！"
translation = "꽃 따러 가고 싶어(화장실 가고 싶어)……!"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「フム……利尿作用もアリ、と」"
translation = "「후무…… 이뇨 작용도 있음, 이라다.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「お茶かな！？」"
translation = "「차 마시는 거냐고!」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「いや、ちょっと待ちたまえ会長。思ったのだが……キミ、トイレのやり方は分かるのかい？」"
translation = "「아니, 잠깐 기다려봐라다 회장. 생각한 건데…… 너, 화장실 사용법은 아냐로우?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そういえば、確かに……」"
translation = "「그러고 보니 확실히……」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「今回の実験、アニマは凄く感謝している。おかげで世界を救う発明に大きく貢献しタ」"
translation = "「이번 실험, 아니마는 무척 감사하고 있다다. 덕분에 세계를 구하는 발명에 크게 공헌했다다.」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「──故にダ。キミの手伝いくらい、喜んで引き受けるヨ」"
translation = "「──고로다다. 너를 돕는 것 정도는 기꺼이 맡아주겠다요.」"

[[dialogue]]
speaker = "unk"
original = "いやいやいやいやいや大丈夫です！"
translation = "아뇨아뇨아뇨아뇨 괜찮습니다!"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「なに、遠慮するな。男と女だと体の構造は大きく異なる。初めてだと難儀すると思うゾ？」"
translation = "「뭐야, 사양하지 마라다. 남녀는 신체 구조가 크게 다르다다로우. 처음이면 고생할 거라다로우?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ち、ちょっと先輩！？\u3000いきなり何言い出してるの！？」"
translation = "「자, 잠깐 선배!? 갑자기 무슨 소릴 하는 거야!?」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「何って……初めてだと困るダロウ？\u3000実験に協力してもらった身としては、シモの世話まで面倒みるのが責任というものダ」"
translation = "「뭐냐니…… 처음이면 곤란하다다로우? 실험에 협력받은 입장으로서는 뒤처리까지 돌봐주는 게 책임이라는 거라다.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ダ、ダメです！\u3000男女２人きりで、それは色々とマズいでしょう！？\u3000普通に考えて！」"
translation = "「안, 안 돼요! 남녀가 단둘이서 그건 여러모로 위험하잖아요!? 상식적으로 생각해서!」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「２人だとマズいのカ？\u3000ならば、ヴィーナスとマトイも、一緒に来ればいいのでは？」"
translation = "「둘이면 위험하냐로우? 그렇다면 비너스와 마토이도 같이 오면 되지 않냐로우?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「え」"
translation = "「에」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「３人で教えるのでも、アニマは別に構わないゾ」"
translation = "「셋이서 가르쳐주는 거라도 아니마는 딱히 상관없다다.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ふ、普通に考えて……そ、そうよね。クラスメイトだもの。困った時は手を差し伸べるのが常識よね！」"
translation = "「그, 상식적으로 생각해서…… 그, 그렇네. 클래스메이트인걸. 곤란할 때는 손을 내미는 게 상식이니까!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「マトイ！？」"
translation = "「마토이!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「いえ……そうだわ！\u3000私だって星徒会長を影から支えるフィクサー！\u3000クロトが困っているなら全力で支えるわ！」"
translation = "「아니…… 맞아! 나도 성도회장을 뒤에서 받치는 픽서! 쿠로토가 곤란해한다면 전력으로 도울 거야!」"

[[dialogue]]
speaker = "unk"
original = "この状況で言われても全然嬉しくないんだけど！？"
translation = "이 상황에서 들어도 전혀 안 기쁘거든!?"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「フヒ、どうやら方針は決まったようだネ。さあ、皆で仲良くお花摘みに行こうじゃないか……って、おい会長、どこに行く？」"
translation = "「후히, 아무래도 방침은 정해진 모양이네. 자, 다 같이 사이좋게 꽃 따러 가자꾸나…… 어이 회장, 어디 가냐로우?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あっ、クロトが逃げた！\u3000待ちなさい！」"
translation = "「앗, 쿠로토가 도망쳤어! 기다려!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「会長、大丈夫！\u3000女の子同士だったら普通！\u3000普通のことだから！」"
translation = "「회장님, 괜찮아요! 여자끼리면 보통! 보통 있는 일이니까!」"

[[dialogue]]
speaker = "unk"
original = "絶対に普通じゃなぁぁぁ──いッ！！！"
translation = "절대로 보통이 아니야아아아아──악!!!"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「フヒヒッ、よく分からないが面白いゾ、星徒会長！\u3000何故逃げるのか教えたまえ！\u3000ハハハハハッ！」"
translation = "「후히히, 잘 모르겠지만 재밌다다, 성도회장! 왜 도망치는지 가르쳐달라요! 하하하하하!」"

[[dialogue]]
speaker = "unk"
original = "後日、どこのクラスでも見つからない謎の美少女転校生が現れたと、学園中で噂になっていた。"
translation = "며칠 뒤, 어느 반에서도 찾을 수 없는 수수께끼의 미소녀 전학생이 나타났다고 학원 안에 소문이 돌았다."

[[dialogue]]
speaker = "unk"
original = "そして、この日を境に、アニマ先輩は俺に対してやたらと絡むようになるのだった。"
translation = "그리고 이날을 경계로 아니마 선배는 나에게 유독 끈질기게 얽히게 되었다."

