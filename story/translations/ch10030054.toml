[[dialogue]]
speaker = "unk"
original = "第４話,愛しの女神に捧ぐ,P"
translation = "제4화, 사랑하는 여신에게 바치다"

[[dialogue]]
speaker = "unk"
original = "休日、俺はヴィーナスと遊園地デートへやって来ていた――"
translation = "휴일, 나는 비너스와 놀이공원 데이트를 하러 왔다──"

[[dialogue]]
speaker = "ヴィーナス"
original = "「最近はクロト、ちょっと忙しそうにしてたから、久しぶりのデートね♪」"
translation = "「최근 쿠로토가 좀 바빠 보여서 오랜만의 데이트네♪」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「その分、今日は目いっぱい遊んじゃうわよ～！」"
translation = "「그만큼 오늘은 마음껏 놀아버릴 거야~!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「まずは何と言ってもジェットコースターからね！\u3000行きましょ、クロト♪」"
translation = "「우선 뭐니 뭐니 해도 제트 코스터부터 시작하자! 가자, 쿠로토♪」"

[[dialogue]]
speaker = "unk"
original = "そうして、ジェットコースターに乗ることになり――"
translation = "그렇게 제트 코스터를 타게 되었고──"

[[dialogue]]
speaker = "ヴィーナス"
original = "「わぁーーーいっ♪\u3000空を全速力で飛び回るのもいいけど、ジェットコースターはやっぱり別腹ね♪」"
translation = "「와아아아앙♪ 하늘을 전속력으로 날아다니는 것도 좋지만 제트 코스터는 역시 별미네♪」"

[[dialogue]]
speaker = "unk"
original = "ちなみに、ヴィーナスは絶叫マシーンを一切怖がったりしない。"
translation = "참고로 비너스는 절규 머신을 전혀 무서워하지 않는다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「あっ、もうすぐでっかい下り坂が来るわよ！\u3000せ～のっ――」"
translation = "「앗, 이제 곧 커다란 내리막길이 나와! 하나~ 둘──」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ぎゅーーーんっ！\u3000あははははははっ♪\u3000楽しいぃ～～～っ♪」"
translation = "「규으으으응! 아하하하하하하하♪ 즐거워어어어어♪」"

[[dialogue]]
speaker = "unk"
original = "保護者のヘレナちゃん曰く、遊園地で初めてジェットコースターに乗った時の感想は「めちゃんこ楽しかった～！\u3000でも、この安全バーっている？」だったとか。"
translation = "보호자인 헬레나짱 말로는 놀이공원에서 처음 제트 코스터를 탔을 때 소감이 「엄청 즐거웠어~! 근데 이 안전바 꼭 필요해?」였다나."

[[dialogue]]
speaker = "unk"
original = "それからも遊園地を満喫して、夕方になったところで、俺はヴィーナスを誘って観覧車に乗り込んだ。"
translation = "그 뒤로도 놀이공원을 만끽하고 저녁이 되었을 즈음, 나는 비너스를 이끌고 관람차에 올라탔다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「ねぇ、パパ、膝の上に座ってもいい？」"
translation = "「있지, 아빠, 무릎 위에 앉아도 돼?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「――えへへ<emoji=heart04>\u3000やったぁ♪」"
translation = "「──에헤헤<emoji=heart04> 앗싸♪」"

[[dialogue]]
speaker = "unk"
original = "観覧車の中で、俺の膝に乗るヴィーナス。"
translation = "관람차 안에서 내 무릎 위에 앉는 비너스."

[[dialogue]]
speaker = "ヴィーナス"
original = "「～～♪\u3000～～～♪」"
translation = "「~~♪ ~~~♪」"

[[dialogue]]
speaker = "unk"
original = "そのまま機嫌良さそうに鼻歌を唄い始める。"
translation = "그대로 기분 좋은 듯 콧노래를 부르기 시작한다."

[[dialogue]]
speaker = "unk"
original = "そんな娘兼恋人の姿を見ていると、愛おしい気持ちが溢れてしまい、思わず頭を撫でてしまう。"
translation = "그런 딸 겸 연인의 모습을 보고 있자니 사랑스러운 마음이 넘쳐흘러 나도 모르게 머리를 쓰다듬어 주었다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「あっ♪\u3000えへへへ……<emoji=heart04>\u3000パパの頭なでなで、好き～<emoji=heart04>」"
translation = "「앗♪ 에헤헤헤……<emoji=heart04> 아빠가 쓰담쓰담 해주는 거 좋아~<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「んふふふ<emoji=heart04>\u3000私も頬っぺすりすりしちゃうんだから<emoji=heart04>」"
translation = "「응후후후<emoji=heart04> 나도 볼 부비부비 할 거니까<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ほら、パ～パ<emoji=heart04>\u3000すりすり～……<emoji=heart04>」"
translation = "「자, 아~빠<emoji=heart04> 부비부비~……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そんな風にしばらく、恋人のスキンシップを楽しんだ後……"
translation = "그런 식으로 한동안 연인끼리의 스킨십을 즐긴 뒤……"

[[dialogue]]
speaker = "ヴィーナス"
original = "「――ん？\u3000パパ、改まってどうしたの？」"
translation = "「──응? 아빠, 정색하고 왜 그래?」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスに渡したいものがあるんだ"
translation = "비너스에게 주고 싶은 게 있어"

[[dialogue]]
speaker = "ヴィーナス"
original = "「渡したいもの？\u3000なにかしら？」"
translation = "「주고 싶은 거? 뭔데?」"

[[dialogue]]
speaker = "unk"
original = "俺はポケットから小さな箱を取り出して、開いて中を見せる。"
translation = "나는 주머니에서 작은 상자를 꺼내 열어 안을 보여준다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「これって……指輪？」"
translation = "「이건…… 반지?」"

[[dialogue]]
speaker = "unk"
original = "実はここ最近忙しかったのは――"
translation = "사실 최근에 바빴던 건──"

[[dialogue]]
speaker = "unk"
original = "ヘレナちゃんに頼んで、公安委員会の仕事を紹介して貰い、それを夜や休日にこなしていたのだった。"
translation = "헬레나짱에게 부탁해서 공안위원회의 일을 소개받아 밤이나 휴일에 해치우고 있었기 때문이었다."

[[dialogue]]
speaker = "unk"
original = "その理由は、ヴィーナスにこの――婚約指輪を買って渡す為。"
translation = "그 이유는 비너스에게 이── 약혼반지를 사서 주기 위해서."

[[dialogue]]
speaker = "ヴィーナス"
original = "「前に結婚するって誓ったから、それの証として……？」"
translation = "「전에 결혼하겠다고 약속했으니까 그 증표로……?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「クロト！\u3000私、すごく嬉しいわ♪」"
translation = "「쿠로토! 나 정말 기뻐♪」"

[[dialogue]]
speaker = "unk"
original = "ただ、デートが出来てなかったのはごめん"
translation = "다만 데이트를 못 했던 건 미안해"

[[dialogue]]
speaker = "ヴィーナス"
original = "「休日で会えない日も確かにあったけど、私、寂しいとは全然感じなかったわよ？」"
translation = "「휴일에 못 만나는 날도 분명 있었지만 난 외롭다고 전혀 느끼지 않았어!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「だってクロトって、会えない日でも連絡をくれるし、いつだって私を気にかけてくれるでしょう？」"
translation = "「그야 쿠로토는 못 만나는 날에도 연락을 해주고 언제나 나를 신경 써주잖아?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「この指輪だって、私のことが１番好きだってことを形にしてくれてる……」"
translation = "「이 반지도 나를 제일 좋아한다는 걸 형태로 만들어 준 거고……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「だからとっても嬉しいわ！\u3000クロトが私を想ってくれた時間と愛情の結晶だもの♪」"
translation = "「그러니까 정말 기뻐! 쿠로토가 나를 생각해 준 시간과 애정의 결정체인걸♪」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ねぇ、指にはめてみてもいい？」"
translation = "「있지, 손가락에 끼워봐도 돼?」"

[[dialogue]]
speaker = "unk"
original = "俺は頷き、指輪を手に取る。"
translation = "나는 고개를 끄덕이며 반지를 집어 들었다."

[[dialogue]]
speaker = "unk"
original = "それから、ヴィーナスの背中側から手を伸ばして、彼女の左手をそっと握る。"
translation = "그리고 비너스의 등 쪽에서 손을 뻗어 그녀의 왼손을 살며시 쥐었다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「えへへ……♪\u3000クロトが付けてくれるの？」"
translation = "「에헤헤……♪ 쿠로토가 끼워주는 거야?」"

[[dialogue]]
speaker = "unk"
original = "俺は改めて伝える。"
translation = "나는 다시 한번 전한다."

[[dialogue]]
speaker = "unk"
original = "ヴィーナス、俺と結婚して欲しい"
translation = "비너스, 나와 결혼해 줘"

[[dialogue]]
speaker = "ヴィーナス"
original = "「うんっ♪\u3000これからもずっと、学園を卒業しても一緒よ、クロト♪」"
translation = "「응♪ 앞으로도 계속, 학원을 졸업해도 함께야, 쿠로토♪」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスの左手の薬指に指輪を付ける。"
translation = "비너스의 왼손 약지에 반지를 끼워준다."

[[dialogue]]
speaker = "unk"
original = "彼女はそれを嬉しそうに見つめながら──"
translation = "그녀는 그것을 기쁘게 바라보며──"

[[dialogue]]
speaker = "ヴィーナス"
original = "「えへへへへへぇ～<emoji=heart04>\u3000ありがとう♪\u3000それと……」"
translation = "「에헤헤헤헤헤헤~<emoji=heart04> 고마워♪ 그리고……」"

[[dialogue]]
speaker = "unk"
original = "身体を反転させて、向き合う体勢に座り直してから、ぎゅっと抱き着いて来る。"
translation = "몸을 돌려 마주 보는 자세로 고쳐 앉더니 꽉 끌어안아 온다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「本当に結婚しちゃったら、旦那さんって意味でパパになっちゃうわね♪」"
translation = "「정말로 결혼해버리면 남편이라는 의미로 아빠가 되어버리겠네♪」"

[[dialogue]]
speaker = "unk"
original = "夫婦でもあるって関係を、特別に思ってる"
translation = "부부이기도 하다는 관계를 특별하게 생각하고 있어"

[[dialogue]]
speaker = "unk"
original = "それも嬉しいけど、今では親子でありつつ"
translation = "그것도 기쁘지만 지금은 부녀이면서도"

[[dialogue]]
speaker = "ヴィーナス"
original = "「確かにそうね<emoji=heart04>」"
translation = "「확실히 그렇네<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私の最愛の人は、パパでありクロトだから、私の運命そのものなんだもの<emoji=heart04>」"
translation = "「내 최애는 아빠이자 쿠로토니까 내 운명 그 자체인걸<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "彼女の柔らかさや温かさ、それと好きな女の子のいい匂いが伝わって来て、幸せを感じる。"
translation = "그녀의 부드러움과 온기, 그리고 좋아하는 여자아이의 좋은 향기가 전해져 와 행복을 느낀다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「ねぇ、パパ？\u3000私、指輪だけじゃなくて、誓いのキスもしたいわ<emoji=heart04>」"
translation = "「있지, 아빠? 나 반지뿐만 아니라 맹세의 키스도 하고 싶어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは１度見つめ合える距離まで顔を離してから、俺と両手を繋ぐ。"
translation = "비너스는 다시 한번 마주 볼 수 있는 거리까지 얼굴을 떼고는 나와 양손을 잡는다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「ん……<emoji=heart04>\u3000ただ手を繋ぐんじゃなくて、指も絡めなくちゃイヤ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 그냥 손을 잡는 게 아니라 손가락도 얽지 않으면 싫어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスの要望に応えて、両手の指を絡め直して、恋人繋ぎにする。"
translation = "비너스의 요청에 응해 양손의 손가락을 다시 얽어 연인끼리 맞잡는 손으로 만든다."

[[dialogue]]
speaker = "unk"
original = "そして――"
translation = "그리고──"

[[dialogue]]
speaker = "ヴィーナス"
original = "「パパ<emoji=heart04>\u3000ん～……<emoji=heart04>」"
translation = "「아빠<emoji=heart04> 응~……<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ちゅっ<emoji=heart04>」"
translation = "「쪽<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「んっ……<emoji=heart04>\u3000好き<emoji=heart04>\u3000ちゅっ……<emoji=heart04>\u3000世界で一番大好きっ<emoji=heart04>」"
translation = "「응……<emoji=heart04> 좋아해<emoji=heart04> 쪽……<emoji=heart04> 세상에서 제일 좋아해<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ちゅっ……<emoji=heart04>\u3000ちゅっ<emoji=heart04>」"
translation = "「쪽……<emoji=heart04> 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "観覧車が地上に降りるギリギリまで、俺たちはこれまでで一番甘いキスを交わすのだった――"
translation = "관람차가 지상에 내려오기 직전까지 우리들은 지금까지 중 가장 달콤한 키스를 나누는 것이었다──"

