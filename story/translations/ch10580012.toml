[[dialogue]]
speaker = "unk"
original = "第２話,教えて！\u3000ご当主さん！！,P"
translation = "제2화, 가르쳐줘! 당주님!!, P"

[[dialogue]]
speaker = "ヘレナ"
original = "「『おしえて！\u3000ご当主さ～ん！！』」"
translation = "「『가르쳐줘! 당주님~!!』」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ようこそ星徒会の諸君、帰ってきた『おしえて！\u3000ご当主さ～ん！！』のコーナーへ」"
translation = "「환영하네 성도회 제군, 돌아온 『가르쳐줘! 당주님~!!』 코너에.」"

[[dialogue]]
speaker = "unk"
original = "なんの話！？\u3000というか、なぜ俺の家！？"
translation = "무슨 소리야!? 그보다, 왜 우리 집인데!?"

[[dialogue]]
speaker = "ヘレナ"
original = "「それは、いわゆる大人の事情というやつだ」"
translation = "「그것은, 이른바 어른의 사정이라는 것이다.」"

[[dialogue]]
speaker = "リノ"
original = "「わ～♪\u3000ぱちぱちぱち～♪」"
translation = "「와~♪ 짝짝짝~♪」"

[[dialogue]]
speaker = "unk"
original = "母さんもなんかノリノリだし！"
translation = "어머니도 왠지 신나 하시고!"

[[dialogue]]
speaker = "ヘレナ"
original = "「今回は、魔王も気になっているであろう、この九浄ヘレナのパーソナリティについて少し語っていこうと思ってな」"
translation = "「이번에는, 마왕도 궁금해할, 이 쿠죠 헬레나의 퍼스낼리티에 대해 조금 이야기해 볼까 해서 말이다.」"

[[dialogue]]
speaker = "リノ"
original = "「は～い、質問～！\u3000ヘレナちゃんって確か、新星学園の運営に関わっているのよね？」"
translation = "「네~, 질문~! 헬레나 짱은 확실히, 신성 학원의 운영에 관여하고 있는 거지?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「いかにも。それに触れるにはまず、九浄家のことについて説明した方がいいだろう」"
translation = "「그렇다. 그것을 언급하려면 우선, 쿠죠 가문에 대해 설명하는 편이 좋겠군.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「魔王は既に聞いたことがあるかもしれないが、九浄家は流星市国において『五名門』といわれる家の１つだ。ほかに挙げると『<ruby>桜十路家<rt>さくらじゅうじけ</rt></ruby>』『<ruby>千園寺家<rt>せんおんじけ</rt></ruby>』などだな」"
translation = "「마왕은 이미 들어본 적이 있을지도 모르겠지만, 쿠죠 가문은 유성시국에서 『5명문』이라 불리는 가문 중 하나다. 다른 곳을 꼽자면 『사쿠라쥬지가』 『센온지가』 등이 있지.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ちなみに誤解されやすいのだが、『星見家』はこれに含まれない。かの家はまた特殊なルーツを持っているからな」"
translation = "「참고로 오해하기 쉬운데, 『호시미 가문』은 여기에 포함되지 않는다. 그 가문은 또 특수한 뿌리를 가지고 있으니까 말이다.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「『五名門』は必ずしも歴史が長い家というわけではない。それぞれ得意な分野の事業で、流星市国に大きな影響を与えていることから、そう言われている」"
translation = "「『5명문』이 반드시 역사가 긴 가문이라는 뜻은 아니다. 각각 특기 분야의 사업으로, 유성시국에 큰 영향력을 주고 있다는 점에서 그렇게 불리고 있지.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「例えば、桜十路家は『食品流通』、千園寺家は『宇宙開発』などで有名だ」"
translation = "「예를 들어, 사쿠라쥬지 가문은 『식품 유통』, 센온지 가문은 『우주 개발』 등으로 유명하다.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「そして、九浄家が担っているのは『人材育成』。才能ある者たちをスカウトして、育成し世に送り出す、キャリアマネジメントを多く手がけている」"
translation = "「그리고, 쿠죠 가문이 맡고 있는 것은 『인재 육성』. 재능 있는 자들을 스카우트해서, 육성하여 세상에 내보내는, 커리어 매니지먼트를 많이 다루고 있다.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「といっても、九浄家は古くから存在する家だが、財閥として息を吹き返したのは最近のこと」"
translation = "「그렇다고 해도, 쿠죠 가문은 옛날부터 존재하던 가문이지만, 재벌로서 숨통이 트인 것은 최근의 일.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「私が当主の座についたばかりの時は、資金難で没落寸前の家だった」"
translation = "「내가 당주 자리에 앉았을 초기에는, 자금난으로 몰락 직전인 가문이었다.」"

[[dialogue]]
speaker = "unk"
original = "そうだったのか。想像できないな"
translation = "그랬었구나. 상상이 안 가네."

[[dialogue]]
speaker = "ヘレナ"
original = "「歴史の長い家は、血統にこだわるものでな。跡継ぎを手に入れる為に、無駄金を使いまくったのだ」"
translation = "「역사가 긴 가문은, 혈통에 집착하는 법이라서 말이다. 후계자를 얻기 위해, 쓸데없는 돈을 쏟아부었지.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「おっと、無駄金というのもよくないな。当時の当主が無能だったわけではない。どうやら、ある種の『呪い』をかけられていたらしく、とにかく跡継ぎに恵まれなかったのだ」"
translation = "「아니, 쓸데없는 돈이라는 표현은 좋지 않군. 당시의 당주가 무능했던 것은 아니다. 아무래도, 일종의 『저주』를 받았던 모양인지, 여하튼 후계자 복이 없었다.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「その後、色々あって私が生まれたわけだが、その頃の九浄家は相当やばかった」"
translation = "「그 후, 여러 일이 있어 내가 태어난 셈이다만, 그 시절의 쿠죠 가문은 상당히 위험했다.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「私は当主の座を引き継いだ後、失った資産を取り返すべく、さまざまな事業を展開した。ベンチャー企業への支援、通信パーツの開発、環境ファンド、デイトレード――」"
translation = "「나는 당주 자리를 승계한 후, 잃어버린 자산을 되찾기 위해, 다양한 사업을 전개했다. 벤처 기업 지원, 통신 부품 개발, 환경 펀드, 데이트레이딩──」"

[[dialogue]]
speaker = "ヘレナ"
original = "「幸い私は、勝負運というものには恵まれていてな。手がけたビジネスは成功して、今では資金力で星騎士たちを支えられる立場になったというわけだ」"
translation = "「다행히 나는, 승부운이라는 것에는 축복받아서 말이다. 손을 댄 비즈니스는 성공했고, 지금은 자금력으로 성기사들을 지탱할 수 있는 입장이 되었다는 뜻이다.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「それから、流星教皇庁に声をかけられて、新たな事業として手がけたのが新星学園の設立と運営だった」"
translation = "「그러고 나서, 유성교황청의 제안을 받아, 새로운 사업으로 착수한 것이 신성 학원의 설립과 운영이었다.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「学園運営の資金や対外的な折衝は私が担当し、学内の統括は、学園長であるジェラルド・セイファートに任せている」"
translation = "「학원 운영 자금이나 대외적인 절충은 내가 담당하고, 학내 통괄은, 학원장인 제랄드 세이퍼트에게 맡기고 있다.」"

[[dialogue]]
speaker = "リノ"
original = "「なるほどね～。ヘレナちゃんがいたからこそ、新星学園が生まれたというわけね！」"
translation = "「과연 그렇네~. 헬레나 짱이 있었기에, 신성 학원이 태어난 셈이구나!」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ふふっ、そこは我ながら、いい仕事をしたと自負している」"
translation = "「후훗, 그 점은 나로서도, 좋은 일을 했다고 자부하고 있다.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「こうして魔王が新星学園に現れたのも、なにかの運命であろう」"
translation = "「이렇게 마왕이 신성 학원에 나타난 것도, 무언가의 운명이겠지.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「あとはそうだな……我が魂のことについても、一応言っておいた方がいいだろう」"
translation = "「남은 건 그렇군…… 나의 영혼에 대해서도, 일단 말해두는 편이 좋겠군.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「もっとも、信じるどうかは貴殿次第だが――」"
translation = "「무엇보다, 믿을지 어떨지는 귀공의 자유다만──」"

[[dialogue]]
speaker = "ヘレナ"
original = "「魔王よ、私の魂は九浄ヘレナの鏡映し。姿形は違えど、同一のものだ」"
translation = "「마왕이여, 나의 영혼은 쿠죠 헬레나의 거울상. 생김새는 다를지언정, 동일한 존재다.」"

[[dialogue]]
speaker = "unk"
original = "それはどういう……？"
translation = "그건 무슨……?"

[[dialogue]]
speaker = "ヘレナ"
original = "「なに、ちょっとしたオカルトだ。理解できずとも別によい」"
translation = "「뭐, 약간의 오컬트다. 이해하지 못해도 상관없다.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ただ、我が魂が皆に、久しぶりと言いたくなった――というだけのことだ」"
translation = "「그저, 나의 영혼이 모두에게, 오랜만이라는 인사를 건네고 싶어졌다──는 것뿐이다.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「それよりもほかに、ヘレナちゃんに聞きたいことはないか？\u3000質問があれば答えるぞ」"
translation = "「그것보다 달리, 헬레나 짱에게 묻고 싶은 건 없느냐? 질문이 있다면 대답해 주마.」"

[[dialogue]]
speaker = "リノ"
original = "「じゃあ、は～い！\u3000ヘレナちゃんの趣味はなんですか～？」"
translation = "「그럼, 저요~! 헬레나 짱의 취미는 뭔가요~?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「よい質問だ。いくつかあるが、『服作り』は特に好きだな」"
translation = "「좋은 질문이다. 몇 가지 있다만, 『옷 만들기』를 특히 좋아한다.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「『ヘレナ』というアパレルブランドもやっていたりする。九浄家メイド隊のメイド服も、実は私が手がけたデザインなのだ」"
translation = "「『헬레나』라는 어패럴 브랜드도 운영하고 있지. 쿠죠 가문 메이드 부대의 메이드복도, 사실 내가 다룬 디자인이다.」"

[[dialogue]]
speaker = "リノ"
original = "「若い女の子にも人気のブランドじゃない！\u3000ヘレナちゃん、そんなところでも活躍してたのね～！」"
translation = "「젊은 여자애들한테도 인기 있는 브랜드잖아! 헬레나 짱, 그런 분야에서도 활약하고 있었구나~!」"

[[dialogue]]
speaker = "ヘレナ"
original = "「あと他には、時代劇を観るのは好きだな」"
translation = "「그리고 그 외에는, 사극을 보는 걸 좋아한다.」"

[[dialogue]]
speaker = "リノ"
original = "「あら、そうなの！？\u3000クロトと同じ趣味ね！」"
translation = "「어머, 정말!? 쿠로토랑 똑같은 취미네!」"

[[dialogue]]
speaker = "ヘレナ"
original = "「おかげで、魔王とはよくその話で盛り上がる。ふふっ、意外な共通点だったな」"
translation = "「덕분에, 마왕과는 자주 그 이야기로 달아오른다. 후훗, 의외의 공통점이었지.」"

[[dialogue]]
speaker = "リノ"
original = "「ハッ……！\u3000もしかして、ヘレナちゃんが今日やってきたのって、共通の趣味を通して親密な仲になったからだったり……！？」"
translation = "「핫……! 설마, 헬레나 짱이 오늘 찾아온 건, 공통된 취미를 통해서 친밀한 사이가 되었기 때문이라던가……!?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「なるほど。そう考えると、今回はある意味、家族への顔合わせと言えるかもしれぬな。ふふっ♪」"
translation = "「과연. 그렇게 생각하면, 이번 방문은 어떤 의미에서, 가족에게 인사하는 자리라고 할 수 있을지도 모르겠군. 후훗♪」"

[[dialogue]]
speaker = "unk"
original = "いや、突然の訪問だったよね！？"
translation = "아니, 갑작스러운 방문이었잖아!?"

[[dialogue]]
speaker = "リノ"
original = "「ヘレナちゃん！\u3000そういうことなら、これからは私とも仲良くしましょう♪」"
translation = "「헬레나 짱! 그런 거라면, 앞으로는 저랑도 사이좋게 지내요♪」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ああ、ちょうど私も気の合う友達になれそうな気がしていたところだ。こちらこそよろしく頼むぞ、リノ♪」"
translation = "「아아, 마침 나도 마음이 맞는 친구가 될 수 있을 것 같은 기분이 들던 참이다. 이쪽이야말로 잘 부탁한다, 리노♪」"

[[dialogue]]
speaker = "ヘレナ"
original = "「――ああ、ちなみにだが」"
translation = "「──아아, 참고로 말해두겠다만.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「私たちが何歳なのかという質問については……」"
translation = "「우리가 몇 살인가 하는 질문에 대해서는……」"

[[dialogue]]
speaker = "リノ"
original = "「女の秘密だから、ノーコメントよ♪」"
translation = "「여자의 비밀이니까, 노코멘트야♪」"

[[dialogue]]
speaker = "unk"
original = "なにも言ってないよ！？"
translation = "아무 말도 안 했거든!?"

[[dialogue]]
speaker = "unk"
original = "急にユニゾンし出す２人にツッコむ俺なのだった――"
translation = "갑자기 유니즌하기 시작한 두 사람에게 태클을 거는 나였다――"

