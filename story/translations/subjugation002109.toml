[[dialogue]]
speaker = "unk"
original = "アステラで戦ったコラプサーたち、そしてエンジュとメテオラは、気を失っているうちに拘束され、ネビュラ基地に護送された。"
translation = "아스텔라에서 싸웠던 콜랩서들, 그리고 엔쥬와 메테오라는 의식을 잃은 동안 구속되어 네뷸라 기지로 호송되었다."

[[dialogue]]
speaker = "unk"
original = "星力を吸収するコラプサーだが、魔力を扱う魔女ならば対処も可能だ。"
translation = "성력을 흡수하는 콜랩서지만 마력을 다루는 마녀라면 대처도 가능하다."

[[dialogue]]
speaker = "unk"
original = "クラウディアやセドナという強大な戦力を擁しておることもあり、当面はネビュラ基地で身柄を預かることとなった。"
translation = "클라우디아나 세드나라는 강력한 전력을 보유하고 있기도 하여, 당분간은 네뷸라 기지에서 신병을 맡기로 했다."

[[dialogue]]
speaker = "unk"
original = "だがコラプサーたちの暗躍はこれで終わりではない。"
translation = "하지만 콜랩서들의 암약은 이것으로 끝이 아니다."

[[dialogue]]
speaker = "？？？"
original = "「──作戦は失敗のようね。惜しいところまで行ったのだけど、残念だわ」"
translation = "「──작전은 실패한 모양이네. 아까운 지점까지 갔는데 아쉬워.」"

[[dialogue]]
speaker = "？？？"
original = "「だけど問題ないわ。計画は必ず成就する」"
translation = "「하지만 문제없어. 계획은 반드시 성취될 거야.」"

[[dialogue]]
speaker = "？？？"
original = "「最後のコラプサーであるあなたがいれば大丈夫よ、レイラ」"
translation = "「마지막 콜랩서인 당신이 있다면 괜찮아, 레이라.」"

[[dialogue]]
speaker = "？？？"
original = "「世界を救うのは私たちコラプサー──そうでしょう？」"
translation = "「세상을 구하는 건 우리 콜랩서── 그렇겠지?」"

