[[dialogue]]
speaker = "unk"
original = "第２話,桜花爛漫,B"
translation = "제2화, 벚꽃 만발, B"

[[dialogue]]
speaker = "unk"
original = "……。"
translation = "…….」"

[[dialogue]]
speaker = "unk"
original = "…………。"
translation = "…………。」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「散る桜――残る桜も――散る桜――」"
translation = "「지는 벚꽃── 남은 벚꽃도── 지는 벚꽃──」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「諸君、お初にお目にかかる。いや、場合によっては、久しぶりと言えるかもしれぬが――」"
translation = "「제군, 처음 뵙겠습니다. 아니, 경우에 따라서는, 오랜만이라고 말할 수도 있겠으나──」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「立てばプリティ、座ればゴージャス。泣く子も黙る、九浄家二十六代目当主・<b>九浄ヘレナ</b>ちゃんとは、私のこと」"
translation = "「서면 프리티, 앉으면 고저스. 우는 아이도 뚝 그치게 하는, 쿠죠 가문 제26대 당주・<ruby>쿠죠 헬레나<rt>・・ ・・・</rt></ruby>짱은, 나를 말하는 것」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「桜に代わって……成敗だ」"
translation = "「벚꽃을 대신하여…… 천벌을 내리겠다」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「……あの、当主様」"
translation = "「……저, 당주님」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「む、どうかしたか？\u3000せつな」"
translation = "「음, 무슨 일인가? 세츠나」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「突然、お初にって……一体誰に名乗っているのでござるか？\u3000それに何もない方を見たりして……」"
translation = "「갑자기, 처음 뵙는다고…… 대체 누구에게 이름을 밝히고 있는 것이옵니까? 게다가 아무도 없는 쪽을 보거나 해서……」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「なに、我が内なる魂が名乗るべきタイミングだと囁いたのでな。どうやらここが『私の初めての出番』であるらしいと」"
translation = "「무엇, 나의 내면의 영혼이 이름을 밝혀야 할 타이밍이라고 속삭였기 때문이지. 아무래도 여기가 『나의 첫 등장』인 듯하니」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「は、はぁ……左様でござるか」"
translation = "「하, 하아…… 그러하옵니까」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "（相変わらず当主様は、不思議なことを言うお方でござる……）"
translation = "（여전히 당주님은, 신기한 말씀을 하시는 분이옵니다……）"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「って、のんきに冗談を言ってる場合じゃありませんよ、ご当主様！」"
translation = "「라고, 한가하게 농담할 때가 아니옵니다, 당주님!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「今はヴィーナスお嬢様の行方がわからない一大事なんですから！」"
translation = "「지금은 비너스 아가씨의 행방을 알 수 없는 일대 사건이옵니다!」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ヨミヨミか。任務管轄係の仕事はよいのか？」"
translation = "「요미요미인가. 임무 관할계의 일은 괜찮은가?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「よ、よくはありませんが……どうしてもお嬢様のことが気がかりで、何度もミスをしてしまって……。それで、頭を冷やしていたところです……」"
translation = "「괘, 괜찮지는 않지만…… 아무래도 아가씨가 걱정되어, 몇 번이나 실수를 해버려서……. 그래서, 머리를 식히고 있던 참입니다……」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「……お嬢様が謎の影に<ruby>拐<rt>さら</rt></ruby>われて、もう丸２日以上――せつなもこれ以上は、じっとしていられませぬ！」"
translation = "「……아가씨가 의문의 그림자에게 납치당한 지, 벌써 만 이틀 이상―― 세츠나도 더 이상은, 가만히 있을 수 없사옵니다!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「当主様、何卒、せつなにお嬢様捜索のご指示を下さいませ！\u3000お願い致しまする！」"
translation = "「당주님, 부디, 세츠나에게 아가씨 수색의 지시를 내려 주시옵소서! 부탁드리옵니다!」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「落ち着け、せつな。察するに……今は私の<b>手の届かぬところ</b>で事が推移しているようだ」"
translation = "「진정해, 세츠나. 짐작하건대…… 지금은 나의 <ruby>손이 닿지 않는 곳<rt>・・ ・・ ・・ ・</rt></ruby>에서 일이 진행되고 있는 듯하다」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「残念ながら、まだ我々の出番ではないということだ。ヨミヨミ、今月のモンスター出現傾向はどうなってる？」"
translation = "「유감스럽게도, 아직 우리들의 차례는 아니라는 것이다. 요미요미, 이달의 몬스터 출현 경향은 어떻게 되고 있지?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「あ、はい！\u3000アステライトの出現が３５％増で、リクリエは着実に勢力を……って、そうじゃなくて！\u3000ご当主様はお嬢様が心配じゃないんですか！？」"
translation = "「아, 네! 아스테라이트의 출현이 35% 증가했고, 리크리에는 착실하게 세력을…… 이 아니라! 당주님은 아가씨가 걱정되지 않으신 건가요!?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「閃先輩なんか、ショックすぎて日課のストーキングがウォーキングになってしまったんですよ！？」"
translation = "「센 선배 같은 분은, 충격이 너무 커서 일과의 스토킹이 워킹이 되어버렸다고요!?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「健康でよいではないか」"
translation = "「건강해서 좋지 않은가」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「いや、確かにそうでござるけども……」"
translation = "「아니, 확실히 그러하옵니다만은……」"

[[dialogue]]
speaker = "unk"
original = "せつなとヨミがいくら訴えようとも、ヘレナが平静な顔を変えることはなかった。"
translation = "세츠나와 요미가 아무리 호소해도, 헬레나가 평온한 얼굴을 바꾸는 일은 없었다."

[[dialogue]]
speaker = "unk"
original = "それは<ruby>諦観<rt>ていかん</rt></ruby>であったのか、それとも……"
translation = "그것은 체념이었던 것인가, 아니면……"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「ハッ……せつな、わかったでござる！\u3000当主様はその超常的な先見性で、お嬢様の無事を見通しているのでござるな！？」"
translation = "「핫…… 세츠나, 알았사옵니다! 당주님은 그 초상적인 선견지명으로, 아가씨의 무사를 꿰뚫어 보고 계시는 것이옵니다!?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「！\u3000なるほど！\u3000それなら確かに、落ち着いているのも納得です！」"
translation = "「! 과연! 그렇다면 확실히, 침착한 것도 납득이 됩니다!」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「？\u3000いや？」"
translation = "「? 아니?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ヴィーナスは──あるいはここで死ぬやもしれぬな。我が魂も、かつてない凶兆を囁いている」"
translation = "「비너스는── 어쩌면 여기서 죽을지도 모르겠군. 나의 영혼도, 전례 없는 흉조를 속삭이고 있다」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「なっ……！？」"
translation = "「뭣……!?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「そんな……！\u3000ご当主様にとって、ヴィーナスお嬢様は大事な娘でしょう！？」"
translation = "「설마……! 당주님에게 있어서, 비너스 아가씨는 소중한 딸이시지 않습니까!?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「大事な娘……か。私が腹を痛めて産んだわけではないが……確かにそうだな」"
translation = "「소중한 딸……인가. 내가 배 아파 낳은 것은 아니지만…… 확실히 그렇군」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「えっ！？\u3000ご当主様は、ヴィーナスお嬢様の実母ではあられないのでござるか……！？」"
translation = "「엣!? 당주님은, 비너스 아가씨의 친어머니는 아니신 것이옵니까……!?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「……以前、メイド隊の先輩から聞いたことがあります。ご当主様とヴィーナスお嬢様の『出会い』──」"
translation = "「……이전에, 메이드대의 선배에게 들은 적이 있습니다. 당주님과 비너스 아가씨의 『만남』──」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「改めて、ご当主様の口からお聞きしたいです。ヴィーナスお嬢様は、昔の記憶がないとも仰っしゃっていたので」"
translation = "「다시 한번, 당주님의 입으로 듣고 싶습니다. 비너스 아가씨는, 옛 기억이 없다고도 말씀하셨기에」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ふむ……わかった。今こそ語るべき機というやつか」"
translation = "「흠…… 알겠다. 지금이야말로 이야기해야 할 때라는 것인가」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「あれは５年前……いや、６年前だったか。ん？\u3000４年前？\u3000違うな、７年前だったような気も……」"
translation = "「그것은 5년 전…… 아니, 6년 전이었나. 응? 4년 전? 아니지, 7년 전이었던 것 같기도……」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「うろ覚え！？\u3000こ、細かいところは今いいですから……とにかく、数年前ですね？」"
translation = "「가물가물!? 자, 자세한 부분은 지금 됐으니까…… 어쨌든, 몇 년 전이시죠?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「うむ。当時、私は既に当主の座についていた。財政難を覆し、九浄の屋敷を再建させたのもちょうどその頃だったか」"
translation = "「음. 당시, 나는 이미 당주의 자리에 올라 있었다. 재정난을 뒤엎고, 쿠죠의 저택을 재건한 것도 딱 그 무렵이었던가」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「そういえば……昔の九浄家は、長らく低迷していたと聞いたことがあるでござる」"
translation = "「그러고 보니…… 옛 쿠죠 가문은, 오랫동안 침체되어 있었다고 들은 적이 있사옵니다」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「はい。代替わりしたご当主様は次々と新事業を打ち立て、その手腕によって苦境の九浄家をみるみる復興させていったそうです」"
translation = "「네. 대를 이은 당주님은 연이어 신사업을 추진했고, 그 수완으로 고난의 쿠죠 가문을 순식간에 부흥시켰다고 합니다」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「そうしてご当主様は、今の大資産家としての地位を築きました」"
translation = "「그렇게 당주님은, 지금의 대자산가로서의 지위를 쌓았습니다」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「せつなの――<ruby>紫桜<rt>しおう</rt></ruby>の里もまた、そんな九浄家の財力に助けられた場所の１つ……というわけでござるな」"
translation = "「세츠나의── 자앵의 마을도 또한, 그런 쿠죠 가문의 재력에 도움을 받은 장소 중 하나……라는 것이옵니다」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「新星学園なるものを立ち上げるから出資してくれないかと、持ちかけられたのもその頃だったか。まあ、それはよい」"
translation = "「신성 학원이라는 것을 세울 테니 출자해 주지 않겠냐고, 제의받은 것도 그 무렵이었던가. 뭐, 그것은 좋다」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「それで……そう、ヴィーナスと出会った日の話だったな」"
translation = "「그래서…… 그래, 비너스와 만난 날의 이야기였지」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "（――光のどけき、ある春の日。私はいつものように屋敷でくつろいでいた）"
translation = "（――빛이 평화로운, 어느 봄날. 나는 평소처럼 저택에서 쉬고 있었다）"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "（ふむふむ）"
translation = "（흠흠）"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "（それでどうなったのでござるか？）"
translation = "（그래서 어떻게 된 것이옵니까?）"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "（うむ。その折、突然――時空の扉が開いた）"
translation = "（음. 그때, 갑자기── 시공의 문이 열렸다）"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "（はい？）"
translation = "（네?）"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "（急展開すぎるでござる！\u3000えっと……何かの比喩でござるか？）"
translation = "（너무 급전개이옵니다! 에또…… 뭔가 비유이옵니까?）"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "（ただの事実だ。私も面食らいはしたが、確かに目の前には扉らしきものが開かれていた）"
translation = "（단지 사실이다. 나도 당황했지만, 확실히 눈앞에는 문 같은 것이 열려 있었다）"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "（程なくして、そこから幼き<ruby>女子<rt>おなご</rt></ruby>が歩み出てきた。両手に日記帳と、<ruby>簪<rt>かんざし</rt></ruby>を大事そうに抱えてな。そして奴はこう名乗ったわけだ）"
translation = "（얼마 지나지 않아, 그곳에서 어린 여자아이가 걸어 나왔다. 양손에 일기장과, 비녀를 소중히 안고서 말이지. 그리고 그 녀석은 이렇게 이름을 밝혔다）"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「私はヴィーナス！\u3000えーっと……この<ruby>簪<rt>かんざし</rt></ruby>が目に入らぬか！」"
translation = "「나는 비너스! 에ー또…… 이 비녀가 눈에 들어오지 않느냐!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「私、まだ色んなこと思い出せないままなんだけど──お願い！\u3000私を九浄家の娘にしてほしいの！」"
translation = "「나, 아직 여러 가지 기억이 안 나는데── 부탁이야! 나를 쿠죠 가문의 딸로 삼아줬으면 좋겠어!」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "（──とな）"
translation = "（──라고）"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「その簪とは一体……？」"
translation = "「그 비녀는 대체……?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ヴィーナスの示した簪は──調べた結果、九浄家に代々受け継がれてきた『<ruby>鴛桜<rt>えんおう</rt></ruby>の<ruby>簪<rt>かんざし</rt></ruby>』と判明した」"
translation = "「비너스가 보여준 비녀는── 조사 결과, 쿠죠 가문에 대대로 계승되어 온 『원앙 벚꽃의 비녀』로 판명되었다」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「それは本来、数十年前に失われていたもの。またその喪失をきっかけに、九浄家の没落が始まったとも言われている」"
translation = "「그것은 본래, 수십 년 전에 사라졌던 것. 또한 그 상실을 계기로, 쿠죠 가문의 몰락이 시작되었다고도 전해진다」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「そんな道具を、年端も行かぬ<ruby>女子<rt>おなご</rt></ruby>が持ち帰ってきたわけだから……ま、ただならぬ運命を感じるのも頷けよう？」"
translation = "「그런 도구를, 어린 여자아이가 가져왔으니…… 뭐, 예사롭지 않은 운명을 느끼는 것도 당연하겠지?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「故に私は、奴を娘として迎え入れ、九浄の名を与えることを決めた。ヴィーナスとの出会いはそんなところだ」"
translation = "「그러므로 나는, 그 녀석을 딸로 맞이하여, 쿠죠의 이름을 주기로 결정했다. 비너스와의 만남은 이 정도다」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「お嬢様はどこでその<ruby>簪<rt>かんざし</rt></ruby>を……」"
translation = "「아가씨는 어디서 그 비녀를……」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「さてな。だが、九浄家の記録によれば、かの家宝は不幸な事故により跡形もなく破壊されたとある。当時の証言からも間違いはあるまい」"
translation = "「글쎄. 하지만, 쿠죠 가문의 기록에 따르면, 그 가보는 불행한 사고로 흔적도 없이 파괴되었다고 한다. 당시의 증언으로도 틀림없을 것이다」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「え……？\u3000それじゃあ、お嬢様が持ち帰ったものって――」"
translation = "「에……? 그럼, 아가씨가 가져온 것은――」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「本来、破壊され消滅したはずの宝を、傷ひとつない状態で持ってきた」"
translation = "「본래, 파괴되어 소멸했을 터인 보물을, 흠집 하나 없는 상태로 가져왔다」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「そして私の前に開いた次元の扉。諸々を総合して私はこう結論づけた」"
translation = "「그리고 내 앞에 열린 차원의 문. 여러 가지를 종합하여 나는 이렇게 결론지었다」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ヴィーナスは──<b>ここならぬ世</b>から来た存在」"
translation = "「비너스는── <ruby>여기가 아닌 세상<rt>・・・ ・・ ・・</rt></ruby>에서 온 존재」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ここならぬ、世……」"
translation = "「여기가 아닌, 세상……」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「……かもしれない。ま、可能性の話だがな」"
translation = "「……일지도 모른다. 뭐, 가능성의 이야기지만 말이지」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「で、でもそれって──？」"
translation = "「그, 근데 그건──?」"

[[dialogue]]
speaker = "unk"
original = "その時、ヘレナに声がかかった。"
translation = "그때, 헬레나에게 목소리가 걸렸다."

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「――当主様、失礼致します」"
translation = "「──당주님, 실례하겠습니다」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「あっ、閃殿！」"
translation = "「앗, 센 님!」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「幼きヴィーナスお嬢様の話、それはもう大変興味深く、改めてじっくりとお聞きしたいところではあるのですが――」"
translation = "「어린 비너스 아가씨의 이야기, 그것은 정말 흥미진진하여, 다시 한번 자세히 듣고 싶은 마음이 굴뚝같지만은――」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「当主様に会いたいというお客人がいらっしゃっておりまして……」"
translation = "「당주님을 뵙고 싶다는 손님이 와 계셔서……」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ほう。貴殿か……珍しいな」"
translation = "「호오. 귀공인가…… 드물군」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ご無沙汰しております、九浄ヘレナ様」"
translation = "「오랜만입니다, 쿠죠 헬레나 님」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「あなたは、星見家メイド長の……！」"
translation = "「당신은, 호시미 가문 메이드장의……!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「上月キリカ殿……！」"
translation = "「카미즈키 키리카 님……!」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「あちらの命運は<b>お嬢様方</b>に託すとして──こちらの危機について、少しばかりお力をお借りしたく存じます。九浄の皆さま」"
translation = "「저쪽의 명운은 <b>아가씨들</b>에게 맡긴다고 치고── 이쪽의 위기에 대해, 잠시 힘을 빌리고자 합니다. 쿠죠의 여러분」"

