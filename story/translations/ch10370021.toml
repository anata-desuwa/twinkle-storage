[[dialogue]]
speaker = "unk"
original = "第１話,ふわふわラバーズ,P"
translation = "제1화, 폭신폭신 러버즈, P"

[[dialogue]]
speaker = "unk"
original = "サランと恋人として付き合い始めて、しばらく経ったある日のお昼休み。いつものようにサランと昼食をとる為、大聖堂カフェテリアに向かうと――"
translation = "사란과 연인으로서 사귀기 시작하고, 얼마간의 시간이 흐른 어느 날 점심시간. 평소처럼 사란과 점심을 먹기 위해, 대성당 카페테리아로 향하자――"

[[dialogue]]
speaker = "サラン"
original = "「会長ちゃ～ん、こっちこっち～♪\u3000席を取っておいたよ～」"
translation = "「회장짱~, 여기야 여기~♪ 자리를 잡아 뒀어~」"

[[dialogue]]
speaker = "unk"
original = "ありがとう。待たせちゃった？"
translation = "고마워. 기다리게 했어?"

[[dialogue]]
speaker = "サラン"
original = "「ううん、そんなに待ってないよ♪\u3000それにサラン、会長ちゃんを待っている時間も、ふわふわなスパイスになるから、結構好きなんだ～♪」"
translation = "「으응, 그렇게 안 기다렸어♪ 게다가 사란, 회장짱을 기다리는 시간도, 폭신폭신한 스파이스가 되니까, 꽤 좋아해~♪」"

[[dialogue]]
speaker = "サラン"
original = "「――うん、ふわふわスパイス～♪\u3000えっとね、会長ちゃんがどんな顔で現れるかな～って想像したり～、今日はどんなお話をしようかな～って考えたり～」"
translation = "「――응, 폭신폭신 스파이스~♪ 음 그러니까, 회장짱이 어떤 얼굴로 나타날까~ 하고 상상하거나~, 오늘은 무슨 이야기를 할까~ 하고 생각하거나~」"

[[dialogue]]
speaker = "サラン"
original = "「そうしてるとね～、実際に会長ちゃんと会った時に、サラン、何倍もふわふわな気持ちになるの～♪\u3000えへへ♪」"
translation = "「그러고 있으면 말야~, 실제로 회장짱이랑 만났을 때, 사란, 몇 배나 더 폭신폭신한 기분이 돼~♪ 에헤헤♪」"

[[dialogue]]
speaker = "unk"
original = "今の話を聞いてたら、俺もふわふわになった"
translation = "방금 이야기를 들으니, 나도 폭신폭신해졌어"

[[dialogue]]
speaker = "サラン"
original = "「本当？\u3000それなら嬉しいな～♪」"
translation = "「정말? 그렇다면 기쁘네~♪」"

[[dialogue]]
speaker = "サラン"
original = "「――あっ、えへへ♪\u3000会長ちゃん、頭を撫でてくれるの？\u3000サランもふわふわ～♪」"
translation = "「――앗, 에헤헤♪ 회장짱, 머리를 쓰다듬어 주는 거야? 사란도 폭신폭신~♪」"

[[dialogue]]
speaker = "サラン"
original = "「じゃあ、そろそろ一緒にお昼ご飯選びに行こっか♪\u3000サラン、今日は何食べようかな～？」"
translation = "「그럼, 이제 슬슬 같이 점심 고르러 갈까♪ 사란, 오늘은 뭐 먹을까나~?」"

[[dialogue]]
speaker = "サラン"
original = "「ん～<emoji=heart04>\u3000日替わりの唐揚げ定食、美味しい～<emoji=heart04>\u3000心がふわふわ～♪」"
translation = "「음~<emoji=heart04> 오늘의 가라아게 정식, 맛있어~<emoji=heart04> 마음이 폭신폭신~♪」"

[[dialogue]]
speaker = "サラン"
original = "「会長ちゃんも１個食べる～？\u3000――うん、いいよ～♪\u3000足りなかったら、おかわりすればいいし～」"
translation = "「회장짱도 하나 먹을래~? ――응, 괜찮아~♪ 부족하면, 한 그릇 더 하면 되고~」"

[[dialogue]]
speaker = "サラン"
original = "「サランが食べさせてあげるね～♪\u3000はい、会長ちゃん。あ～ん♪」"
translation = "「사란이 먹여줄게~♪ 자, 회장짱. 아~♪」"

[[dialogue]]
speaker = "unk"
original = "そ、それは恥ずかしいっていうか……！"
translation = "그, 그건 부끄럽다고나 할까……!"

[[dialogue]]
speaker = "サラン"
original = "「え～？\u3000なんで～？\u3000――周りからの視線が気になるって？」"
translation = "「에~? 왜~? ――주변 시선이 신경 쓰인다고?」"

[[dialogue]]
speaker = "サラン"
original = "「サランはふわふわだから気にしな～い♪\u3000ほら、会長ちゃん、お口あけて～♪\u3000あ～ん<emoji=heart04>」"
translation = "「사란은 폭신폭신하니까 신경 안 써~♪ 자, 회장짱, 입 벌려봐~♪ 아~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "（サラン、ちょっと美食酔いしてる……）"
translation = "(사란, 조금 미식 취기가 돌고 있어……)"

[[dialogue]]
speaker = "サラン"
original = "「――美味しい～？\u3000えへへ、ならよかった～♪」"
translation = "「――맛있어~? 에헤헤, 그럼 다행이다~♪」"

[[dialogue]]
speaker = "蛍火"
original = "「じーっ……」"
translation = "「지이익……」"

[[dialogue]]
speaker = "サラン"
original = "「あっ、蛍火ちゃんだ。蛍火ちゃ～ん♪\u3000そんなところで、どうしたの～？」"
translation = "「앗, 호타루비짱이다. 호타루비짱~♪ 그런 데서, 무슨 일이야~?」"

[[dialogue]]
speaker = "蛍火"
original = "「ひゃっ！？\u3000さ、サランさん、師匠……。え、えっと……これはですね……！」"
translation = "「히얏!? 사, 사란 씨, 스승님……. 에, 에또…… 이건 말이죠……!」"

[[dialogue]]
speaker = "サラン"
original = "「もしかして、休憩もらったところ～？\u3000よければ蛍火ちゃんも、サランたちと一緒にランチタイムしよ～♪」"
translation = "「혹시, 휴식 시간 받은 거야~? 괜찮으면 호타루비짱도, 사란이랑 같이 런치 타임 하자~♪」"

[[dialogue]]
speaker = "蛍火"
original = "「そ、それはありがたい申し出ですが、しかし私が、お２人の幸せそうな雰囲気に水を差すわけにも……！」"
translation = "「그, 그것은 감사한 제안입니다만, 하지만 제가, 두 분의 행복해 보이는 분위기에 찬물을 끼얹을 수는……!」"

[[dialogue]]
speaker = "サラン"
original = "「ぽよ？\u3000確かに会長ちゃんと２人でいる時はふわふわだけど、それはお家でもできるし、気にしなくていいよ～？\u3000――ほら、会長ちゃんもおいでって言ってるし♪」"
translation = "「뽀요? 확실히 회장짱이랑 둘이 있을 때는 폭신폭신하지만, 그건 집에서도 할 수 있고, 신경 안 써도 돼~? ――봐봐, 회장짱도 오라고 하잖아♪」"

[[dialogue]]
speaker = "蛍火"
original = "「い、いいのですか？\u3000ありがとうございます。それでは、同席失礼します……！」"
translation = "「괘, 괜찮은 건가요? 감사합니다. 그럼, 합석 실례하겠습니다……!」"

[[dialogue]]
speaker = "unk"
original = "それから蛍火が料理を取ってきて、３人で談笑しつつ昼食をとっていると――"
translation = "그 뒤로 호타루비가 음식을 가져와서, 셋이서 담소를 나누며 점심을 먹고 있자니――"

[[dialogue]]
speaker = "蛍火"
original = "「あのっ……実はお２人に、前から聞いてみたかったことがありまして……」"
translation = "「저기…… 사실은 두 분께, 전부터 여쭤보고 싶었던 게 있어서요……」"

[[dialogue]]
speaker = "サラン"
original = "「ぽよ？\u3000聞いてみたかったことって？」"
translation = "「뽀요? 여쭤보고 싶었던 거?」"

[[dialogue]]
speaker = "蛍火"
original = "「その……お恥ずかしながら私、お２人がどういった経緯でお付き合いすることになったのか、気になっていて……どちらが先に告白されたのか、とか」"
translation = "「그…… 부끄러운 말씀입니다만 저, 두 분이 어떤 경위로 사귀게 되신 건지, 궁금해서…… 어느 쪽이 먼저 고백하셨는지, 라든가」"

[[dialogue]]
speaker = "サラン"
original = "「そういえば、誰にも話してなかったかも～。えへへ♪\u3000告白はね～、会長ちゃんの方からしてくれたんだ～♪」"
translation = "「그러고 보니, 아무한테도 이야기 안 했을지도~. 에헤헤♪ 고백은 말야~, 회장짱 쪽에서 해줬어~♪」"

[[dialogue]]
speaker = "サラン"
original = "「会長ちゃんの家に遊びに行った時にね、手作りお菓子を食べさせてくれて、サランのこと好きだって言ってくれたの～」"
translation = "「회장짱 집에 놀러 갔을 때 말야, 수제 과자를 먹여주면서, 사란을 좋아한다고 말해줬어~」"

[[dialogue]]
speaker = "サラン"
original = "「サラン、その時ね、心がふわふわ～ってなるだけじゃなくて、なんだかすっごくドキドキしたんだ～」"
translation = "「사란, 그때 말야, 마음이 폭신폭신~ 하게 될 뿐만 아니라, 왠지 엄청 두근거렸어~」"

[[dialogue]]
speaker = "サラン"
original = "「それで初めて、サランは会長ちゃんのこと、男の子として好きなんだって気付いて、お付き合いすることになったの～♪」"
translation = "「그래서 처음으로, 사란은 회장짱을, 남자로 좋아하는구나 하고 깨달아서, 사귀게 된 거야~♪」"

[[dialogue]]
speaker = "蛍火"
original = "「素敵です……♪\u3000ちなみになのですが……師匠は、サランさんのどんなところを好きになったのですか？」"
translation = "「멋집니다……♪ 참고로 말입니다만…… 스승님은, 사란 씨의 어떤 점을 좋아하게 되신 건가요?」"

[[dialogue]]
speaker = "unk"
original = "う～ん、好きなところは沢山あるけど……"
translation = "음~, 좋아하는 점은 잔뜩 있지만……"

[[dialogue]]
speaker = "unk"
original = "いつも美味しそうにご飯を食べる顔とか。ポジティブで、悪いことがあってもへこたれずに次を頑張るところや、困っている人の助けになろうと行動できるところとか。"
translation = "언제나 맛있게 밥을 먹는 얼굴이라든가. 긍정적이고, 안 좋은 일이 있어도 굴하지 않고 다음을 위해 노력하는 점이나, 곤란한 사람을 도와주려고 행동하는 점이라든가."

[[dialogue]]
speaker = "unk"
original = "でも、何より――"
translation = "하지만, 무엇보다――"

[[dialogue]]
speaker = "蛍火"
original = "「――サランさんと一緒にいると、心がふわふわな気持ちになるから、ですか」"
translation = "「――사란 씨와 함께 있으면, 마음이 폭신폭신한 기분이 들기 때문, 인가요」"

[[dialogue]]
speaker = "蛍火"
original = "「分かる気がします。私もサランさんといる時は、こうして緊張せずに話せますから」"
translation = "「알 것 같은 기분이 듭니다. 저도 사란 씨와 있을 때는, 이렇게 긴장하지 않고 이야기할 수 있으니까요」"

[[dialogue]]
speaker = "サラン"
original = "「ぽよ？\u3000どうしたの、会長ちゃん？\u3000――サランの頬っぺたにご飯粒が付いてる？」"
translation = "「뽀요? 왜 그래, 회장짱? ――사란 볼에 밥풀이 묻어있어?」"

[[dialogue]]
speaker = "サラン"
original = "「あ、取ってくれるの～？\u3000……んっ<emoji=heart04>\u3000ありがと～♪」"
translation = "「아, 떼어주는 거야~? ……응<emoji=heart04> 고마워~♪」"

[[dialogue]]
speaker = "サラン"
original = "「えへへ～♪\u3000サランは～、会長ちゃんの、今みたいな優しいところが好き～<emoji=heart04>」"
translation = "「에헤헤~♪ 사란은~, 회장짱의, 지금 같은 상냥한 점이 좋아~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言って、サランはまた、ふわふわの笑顔を浮かべるのだった。"
translation = "그렇게 말하며, 사란은 다시, 폭신폭신한 미소를 짓는 것이었다."

