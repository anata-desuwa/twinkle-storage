[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "（私は天界の武闘都市ウリルに生まれた。ウリルは戦士の街。天界中から戦士が集められ、鍛錬を積んでいる）"
translation = "(나는 천계의 무투 도시 우릴에서 태어났다. 우릴은 전사의 도시. 천계 곳곳에서 전사들이 모여 단련을 쌓는다)"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "（私は代々、守護天使を祀る家系で、当然、戦士の家系だ。母様も星騎士だったと聞いている）"
translation = "(나는 대대로 수호천사를 모시는 가문이며, 당연히 전사 가문이다. 어머니도 성기사였다고 들었다)"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "（私も星騎士になるのだと自然に思って鍛錬を積んでいた。だが、私は星騎士にはなれなかった）"
translation = "(나도 성기사가 되는 것이 당연하다고 생각하며 단련을 쌓았다. 하지만 나는 성기사가 되지 못했다)"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "（星力に目覚め、流星市国に旅立つ戦士たちを見送りながら、私はそれでも鍛錬を続けた。武の極致に至れば、星騎士すら超えられる──そう信じて）"
translation = "(성력에 눈을 떠 유성시국으로 떠나는 전사들을 배웅하며, 나는 그래도 단련을 계속했다. 무의 극치에 도달하면 성기사조차 뛰어넘을 수 있다── 그렇게 믿으며)"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "（そんなある日、ウリルにモンスターが現れた。私は戦った。星力はなくても勝てると信じていた。私は、私の力を信じていた）"
translation = "(그러던 어느 날, 우릴에 몬스터가 나타났다. 나는 싸웠다. 성력은 없어도 이길 수 있다고 믿었다. 나는 나의 힘을 믿었다)"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "（現実は残酷だった。モンスターに私の攻撃は効かず、爪に引き裂かれ、私は一度死んだ。めちゃくちゃ痛かった）"
translation = "(현실은 잔혹했다. 몬스터에게 나의 공격은 통하지 않았고, 발톱에 찢겨 나는 한 번 죽었다. 엄청나게 아팠다)"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "（だが、悪いことばかりではなかった。その瞬間、私はコラプサーとしてよみがえった）"
translation = "(하지만 나쁜 일만 있었던 것은 아니다. 그 순간 나는 콜랩서로서 되살아났다)"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "（あの昂りは今でも忘れようがない。目覚めた時、私の手には刀が握られていた。全身に湧き上がる力が、私を動かした）"
translation = "(그 고양감은 지금도 잊을 수 없다. 눈을 떴을 때 내 손에는 도가 쥐어져 있었다. 전신에 솟구치는 힘이 나를 움직였다)"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "（何が起きたかなど分からない。分かるのは脳髄が焼けるような興奮、衝動だけ。その昂りのままに、私はモンスターを斬り続けた）"
translation = "(무슨 일이 일어났는지 같은 건 모른다. 아는 것은 뇌수가 타버릴 듯한 흥분, 충동뿐. 그 고양감 그대로 나는 몬스터를 계속 베었다)"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "（モンスターがいなくなったら、ウリルの戦士相手に戦いを挑んだ。だが、あがりを待つだけの衰えた星騎士では相手にならなかった）"
translation = "(몬스터가 사라지자 우릴의 전사들을 상대로 싸움을 걸었다. 하지만 은퇴만을 기다리는 쇠약한 성기사들은 상대가 되지 않았다)"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "（強い星騎士と戦いたい。私はその本能のままに流星市国を目指した。大交流に紛れようとして、道に迷った）"
translation = "(강한 성기사와 싸우고 싶다. 나는 그 본능대로 유성시국을 향했다. 대교류에 섞여 들려다 길을 잃었다)"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "（そんなときだった。レイラと出会ったのは）"
translation = "(그때였다. 레이라와 만난 것은)"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "（見るからに戦士とは程遠い奴だと思った。まず、覇気がない。隙だらけで、のろまで、戦場が似合わない奴だと思った）"
translation = "(보기에도 전사와는 거리가 먼 녀석이라 생각했다. 우선 패기가 없다. 빈틈투성이에 굼뜨고 전장이 어울리지 않는 녀석이라 생각했다)"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "（けれど、それは私の間違いだった）"
translation = "(하지만 그것은 나의 착각이었다)"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "（大地を消し飛ばす圧倒的な力。得体のしれないブラックホール。私は敗北した）"
translation = "(대지를 날려버리는 압도적인 힘. 정체불명의 블랙홀. 나는 패배했다)"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "（当然、悔しかった。同時に、歓喜した）"
translation = "(당연히 분했다. 동시에 환희했다)"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "（この世界には私の知らない強者がまだまだいる。それはつまり、私はもっと強くなれるということだ！）"
translation = "(이 세계에는 내가 모르는 강자가 아직도 많다. 그것은 즉, 나는 더 강해질 수 있다는 뜻이다!)"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "（私は全ての強者を倒して、倒して、倒して、最強のその先、真の最強になってみせる！）"
translation = "(나는 모든 강자를 쓰러뜨리고, 쓰러뜨리고, 쓰러뜨려서 최강의 너머, 진정한 최강이 되어 보이겠다!)"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "（まずは貴様だ──レイラ！\u3000貴様を倒さずして、私は最強にはなれない！）"
translation = "(우선은 네놈이다── 레이라! 네놈을 쓰러뜨리지 않고서 나는 최강이 될 수 없다!)"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「私は貴様に負け、コラプサーに入った。貴様と再び戦い、勝つために」"
translation = "「나는 네놈에게 지고 콜랩서에 들어왔다. 네놈과 다시 싸워 이기기 위해」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「だが、貴様は私との戦いから逃げ続けた。あーだこーだと理由を付け戦わなかった」"
translation = "「하지만 네놈은 나와의 싸움에서 계속 도망쳤지. 이래저래 핑계를 대며 싸우지 않았다」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「それどころか、魔王などというぽっと出に負ける体たらくだ。記録映像を見たが、敵の前で泣き出すなど情けないにもほどがある！」"
translation = "「그뿐인가, 마왕 따위에게 지는 꼴이라니. 기록 영상을 봤다만, 적 앞에서 울음을 터뜨리다니 한심하기 짝이 없더군!」"

[[dialogue]]
speaker = "unk"
original = "水着戦闘服に着替えたイングリットの得物は二振りのチャンバラ刀。オモチャにも見えるが、星力の込め方で斬撃にも打撃にも使える優れ物だ。"
translation = "수영복 전투복으로 갈아입은 잉그리드의 무기는 두 자루의 찬바라 도(장난감 칼). 장난감처럼 보이지만 성력을 담는 방식에 따라 참격으로도 타격으로도 쓸 수 있는 우수한 물건이다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「あ、あれは自分でもよくなかったとは思ってますっ」"
translation = "「아, 그건 저 스스로도 좋지 않았다고 생각해요」"

[[dialogue]]
speaker = "unk"
original = "対して、レイラは以前よりブラックホールを自在に扱えるようになっていた。超小型のブラックホールをピストルのジェスチャーをした指先から生み出す。"
translation = "반면, 레이라는 이전보다 블랙홀을 자유자재로 다룰 수 있게 되어 있었다. 초소형 블랙홀을 권총 제스처를 취한 손가락 끝에서 만들어낸다."

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「そもそも、あのまま星術を撃っていれば貴様の勝利だったろうに。理解に苦しむ」"
translation = "「애초에 그대로 성술을 쐈더라면 네놈의 승리였을 텐데. 이해하기 힘들군」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「いや、撃ってたら秋葉原壊滅してたからね！？」"
translation = "「아니, 쐈으면 아키하바라 궤멸했으니까 말이야!?」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「知らん。全力で戦えないなら戦場に立つな。私に失礼だろうが」"
translation = "「모른다. 전력으로 싸울 수 없다면 전장에 서지 마라. 나에게 실례지 않나」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「相手に失礼、じゃなくて？\u3000イングリットに？」"
translation = "「상대에게 실례인 게 아니고? 잉그리드한테?」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「そうだ。私に勝った貴様が負けたら、私まで弱く見えるだろう。私が勝つまで、誰にも負けるな！」"
translation = "「그렇다. 나에게 이긴 네놈이 진다면 나까지 약해 보이지 않나. 내가 이길 때까지 누구에게도 지지 마라!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「えぇ……」"
translation = "「에에……」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「だいたい、貴様はもっと私の気持ちを考えろ！\u3000私とは戦わないくせに、私以外とはぽんぽん戦うじゃないか。当てつけか」"
translation = "「그보다 네놈은 좀 더 내 기분을 생각해라! 나와는 싸워주지 않으면서 나 이외의 녀석들과는 펑펑 싸우지 않나. 시위하는 건가?」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「今度はめんどくさい彼女みたいなこと言い出した……」"
translation = "「이번엔 귀찮은 여자친구 같은 소리를 하기 시작했어……」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「貴様は、私が真の最強に至るために越えなければならない壁だ。その自覚を持て！」"
translation = "「네놈은 내가 진정한 최강에 도달하기 위해 넘어야 할 벽이다. 그 자각을 가져라!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「え。それは……私を倒すのがイングリットの目標……ってコト？」"
translation = "「에. 그건…… 나를 쓰러뜨리는 게 잉그리드의 목표……라는 거?」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「だからそうだと言っている。……何が可笑しい？\u3000気色悪いにやけ面をやめろ」"
translation = "「그래서 그렇다고 말하고 있잖나. ……뭐가 우스운 거지? 기분 나쁘게 웃는 낯짝 치워라」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「ごめん、イングリット。それ無理かも」"
translation = "「미안, 잉그리드. 그건 무리일지도」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "（イングリットが私のことをそんな風に思ってたなんて知らなかった。せいぜい取り損ねた実績トロフィーくらいだろうと思ってたから）"
translation = "(잉그리드가 나를 그런 식으로 생각하고 있었을 줄은 몰랐어. 기껏해야 못다 한 도전과제 트로피 정도로 생각할 줄 알았는데)"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "（でも、違った。イングリットは私のことを認めてくれていたんだ。めちゃくちゃ迷惑な基準だけど！）"
translation = "(하지만 아니었어. 잉그리드는 나를 인정해 주고 있었던 거야. 엄청나게 민폐인 기준이지만!)"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「私が負けたら、イングリットはコラプサー辞めちゃうんだよね？」"
translation = "「내가 지면 잉그리드는 콜랩서 그만두는 거지?」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「当然だ。そしてもっと強い奴と戦いに行く。両学園の星徒会ども……それに、デネブとやらに殴り込みをかけるのも面白そうだ」"
translation = "「당연하다. 그리고 더 강한 녀석과 싸우러 가겠지. 양 학원의 성도회 놈들…… 그리고 데네브라는 곳에 쳐들어가는 것도 재미있을 것 같군」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「じゃあ負けられないね。安心して、イングリット。あなたはまだまだコラプサーだよ」"
translation = "「그럼 질 수 없겠네. 안심해, 잉그리드. 당신은 아직 한참 더 콜랩서야」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「ほざけ、私が勝つ！\u3000ツインリッパーッ！」"
translation = "「지껄여라, 내가 이긴다! 트윈 리퍼!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「ラスターグリルシュートッ！」"
translation = "「러스터 그릴 슛!」"

[[dialogue]]
speaker = "unk"
original = "レイラが打ち出した超小型ブラックホールは、二振りの剣に簡単に弾かれた。"
translation = "레이라가 쏘아 올린 초소형 블랙홀은 두 자루의 검에 간단히 튕겨 나갔다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「やっぱりイングリットに小細工は通用しないよね。──じゃあ！\u3000ムーンウォッチクレーター！」"
translation = "「역시 잉그리드에게 잔꾀는 통하지 않네. ──그럼! 문 워치 크레이터!」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「甘い！\u3000ブレイドクロスシザー！」"
translation = "「물러! 블레이드 크로스 시저!」"

[[dialogue]]
speaker = "unk"
original = "レイラのブラックホールが膨らむ前に、イングリットの斬撃がブラックホールを叩き斬った。お互いに手の内は知れている。戦闘服が変わっても戦い方の根本は変わらない。"
translation = "레이라의 블랙홀이 팽창하기 전에 잉그리드의 참격이 블랙홀을 베어버렸다. 서로의 수법은 뻔하다. 전투복이 바뀌어도 싸우는 방식의 근본은 변하지 않는다."

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「大きなブラックホールを生み出す隙は与えん！\u3000そらそら、逃げ回るだけでは勝てんぞ！」"
translation = "「커다란 블랙홀을 만들 틈은 주지 않겠다! 어이 어이, 도망만 다녀서는 이길 수 없다고!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「くっ！」"
translation = "「큭!」"

[[dialogue]]
speaker = "unk"
original = "イングリットは打撃と斬撃、面と線の攻撃を使い分けてレイラを襲う。"
translation = "잉그리드는 타격과 참격, 면과 선의 공격을 섞어가며 레이라를 몰아붙인다."

[[dialogue]]
speaker = "unk"
original = "レイラはただ、逃げるように飛んでいた。"
translation = "레이라는 그저 도망치듯 날고 있었다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "（初めて会った日、美しいと思ってしまった。たとえイングリットがこの世で最も愚かな天使だとしても、その剣の閃きの前では些細なことに思える）"
translation = "(처음 만난 날, 아름답다고 생각해 버렸어. 설령 잉그리드가 이 세상에서 가장 어리석은 천사라 해도, 그 검의 섬광 앞에서는 사소한 일처럼 느껴져)"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "（いつもはちゃめちゃで自分勝手で、戦うことしか考えてない人格破綻者だけど、それがイングリットだ）"
translation = "(언제나 엉망진창이고 제멋대로에 싸우는 것밖에 생각하지 않는 인격 파탄자지만, 그게 잉그리드야)"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "（だから私は勝たなくちゃ。私が勝ち続ける限り、あなたはコラプサーでいてくれるから）"
translation = "(그러니까 나는 이겨야 해. 내가 계속 이기는 한 당신은 콜랩서로 있어 줄 테니까)"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「これで終わりだ！\u3000ザンブレイクセイバー！」"
translation = "「이걸로 끝이다! 잔 브레이크 세이버!」"

[[dialogue]]
speaker = "unk"
original = "二刀を重ねた巨大な剣を構え、レイラの上空から迫るイングリット。だが──"
translation = "두 자루의 칼을 겹친 거대한 검을 겨누고 레이라의 상공에서 육박하는 잉그리드. 하지만──"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「ふっ、それはどうかな？\u3000巨人の<ruby>顎<rt>あぎと</rt></ruby>よ！」"
translation = "「훗, 그건 어떨까? 거인의 턱이다!」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「なっ！？」"
translation = "「뭣!?」"

[[dialogue]]
speaker = "unk"
original = "レイラの真下からブラックホールが現れた。"
translation = "레이라의 바로 아래에서 블랙홀이 나타났다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「グランコロッサスイーター！」"
translation = "「그랑 콜로세움 이터!」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「がああぁっ！！」"
translation = "「가아아악!!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「ぐうぅっ！」"
translation = "「구우욱!」"

[[dialogue]]
speaker = "unk"
original = "レイラは逃げながら超小型ブラックホールを生成し、このタイミングで一気に解放したのだった。"
translation = "레이라는 도망치면서 초소형 블랙홀을 생성했고, 이 타이밍에 한꺼번에 해방한 것이었다."

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「…………ぱたり」"
translation = "「…………툭」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「はぁ、はぁ……<ruby>完全勝利<rt>パーフェクトビクトリー</rt></ruby>！」"
translation = "「하아, 하아…… <ruby>완전 승리<rt>퍼펙트 빅토리</rt></ruby>!」"

[[dialogue]]
speaker = "unk"
original = "暗闇が消えると、海岸のクレーターにレイラが立っていた。"
translation = "어둠이 사라지자 해안의 크레이터에 레이라가 서 있었다."

