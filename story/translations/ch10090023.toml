[[dialogue]]
speaker = "unk"
original = "第３話,バカップルに気を付けろ,P"
translation = "제3화, 바보 커플을 조심해라, P"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「プリズミックファイア！」"
translation = "「프리즘 파이어!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「これでこの辺りのモンスターは片付けましたね。ボスモンスターへ挑む前に小休止を挟みましょうか」"
translation = "「이걸로 이 근처의 몬스터는 정리됐네요. 보스 몬스터에게 도전하기 전에 잠시 휴식을 가질까요」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「んじゃうちが特製スタミナドリンクを振る舞ってあげるね。こんなこともあろうかとシェーカーやら持ってきたから♪」"
translation = "「그럼 내가 특제 스태미나 드링크를 대접해 줄게. 이럴 줄 알고 셰이커 같은 걸 챙겨왔거든♪」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「わぁ、シェイキングってヤツですね！\u3000格好良いです！\u3000バニーガールさんってそういうこともするんですね！」"
translation = "「와아, 셰이킹이라는 거군요! 멋있어요! 바니걸 분들은 그런 것도 하시는군요!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「趣味の一環だよ～。なんかに使えるかと思って、カジノのバーテンさんに美味しいカクテルの作り方教わっててさ～。ほい、まずはアナちゃんどうぞ♪」"
translation = "「취미의 일환이야~. 어딘가에 쓸 수 있을까 싶어서, 카지노 바텐더분에게 맛있는 칵테일 만드는 법을 배웠거든~. 자, 우선 아나 짱부터 드세요♪」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「コクコク……ふぁ、とても美味です。芳醇でフルーティーな果実の味が口の中にふわっと甘く広がって。スタミナドリンクとは思えません」"
translation = "「꿀꺽꿀꺽…… 하아, 무척 맛있습니다. 향긋하고 풍부한 과일 맛이 입안 가득 달콤하게 퍼져서 스태미나 드링크라고는 생각되지 않아요」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ふふん、林檎と黒蜜を中心にアレンジしてみたんだ。和菓子っぽい味して喜んでもらえるかな～って」"
translation = "「후후훗, 사과랑 흑설탕 시럽을 중심으로 어레인지해 봤어. 화과자 같은 맛이라 기뻐해 줄까 싶어서」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「とても気に入りました。戦闘の疲れも吹き飛んでいきますよ」"
translation = "「무척 마음에 들었습니다. 전투의 피로가 싹 가시는 것 같아요」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「マトイちゃんにはこれ♪\u3000生姜とラズベリーを組み合わせた普通よりもちょっぴり刺激的なピリ辛ドリンク♪」"
translation = "「마토이 짱에겐 이거♪ 생강이랑 라즈베리를 조합한 평소보다 조금 자극적인 매콤한 드링크♪」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ひゃふっ、舌がピリピリします～。でも甘酸っぱくて美味しい。えへへ、なんだかオトナの気分がしますね！」"
translation = "「히야훗, 혀가 찌릿찌릿해요~. 그래도 새콤달콤해서 맛있어. 에헤헤, 왠지 어른이 된 기분이에요!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「もち会長さんのもあるよ～。ねね、何を入れたと思う？」"
translation = "「물론 회장님 것도 있어~. 저기 저기, 뭘 넣었을 것 같아?」"

[[dialogue]]
speaker = "unk"
original = "愛情……ですかね"
translation = "애정…… 인가요?"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「わお大正解<emoji=heart04>\u3000たっぷりたっぷり入ってるから味わって飲んでね～？\u3000ううん、うちが飲ませて、あ・げ・る<emoji=heart04>」"
translation = "「와오 정답<emoji=heart04> 듬뿍듬뿍 들어있으니까 음미하면서 마셔줘? 아니, 내가 먹여, 줄·게<emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……ソフィアさんたちから聞いてはいましたが、本当に隙あらばイチャつき始めるんですね、この２人は……」"
translation = "「……소피아 씨 일행에게 듣긴 했습니다만, 정말 틈만 나면 꽁냥거리기 시작하는군요, 이 두 사람은……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ま、まぁ、ラブラブでいいんじゃないかな……」"
translation = "「뭐, 뭐어, 러브러브해서 좋은 거 아닐까……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ですがセーラ先輩は本当に器用ですね。バニーフォームも平然と使いこなされていますし。先日得たばかりの力とは思えません」"
translation = "「하지만 세라 선배는 정말 손재주가 좋으시네요. 바니 폼도 태연하게 다루고 계시고. 요전날 얻은 힘이라고는 생각되지 않아요」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「早撃ちとかすごかったよねっ。まるで映画のセクシーな女スパイみたいにバババンって格好良く急所を撃ち抜いて」"
translation = "「속사 같은 거 정말 대단했어. 마치 영화 속 섹시한 여스파이처럼 탕탕탕 하고 멋지게 급소를 쏴 맞히고」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「あはは、バニー着るとついスタイリッシュに決めたくなっちゃって♪\u3000２人も着てみたら？\u3000セクシーかつスマートに振る舞いたくなるよ～？」"
translation = "「아하하, 바니걸 복장을 입으면 나도 모르게 스타일리시하게 폼 잡고 싶어져서♪ 둘도 입어볼래? 섹시하면서도 스마트하게 행동하고 싶어진다구~?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「私がバニースーツを……～～っっ！\u3000ダメです、恥ずかしすぎます！\u3000普通に似合わないと思いますし……！」"
translation = "「제가 바니 수트를…… ~~윽! 안 돼요, 너무 부끄러워요! 분명 안 어울릴 것 같기도 하고……!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……私も遠慮しておきます。一部の嗜好の方向けになりそうですから」"
translation = "「……저도 사양하겠습니다. 일부 취향이신 분들을 위한 모습이 될 것 같으니까요」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「新星星徒会だと誰が似合うかなー？\u3000ヴィーナスはノリノリで着そうではあるけど」"
translation = "「신성 성도회라면 누가 어울릴까? 비너스는 신나서 입을 것 같긴 한데」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「サーシャ先輩もすごく似合いそうですよね。あえて鞭とか持っていただければ一部の方に需要がありそうです」"
translation = "「사샤 선배도 무척 잘 어울릴 것 같아요. 차라리 채찍 같은 걸 들어주신다면 일부 계층에 수요가 있을 것 같습니다」"

[[dialogue]]
speaker = "unk"
original = "サーシャさんとヴィーナスのバニーか……"
translation = "사샤 씨와 비너스의 바니걸이라……"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「……ちょっと彼氏さーん？\u3000彼女の前で一体何を想像してるのかな～？\u3000なんで鼻の下伸ばしちゃってるのかな～？」"
translation = "「……잠깐 남자친구님~? 여자친구 앞에서 대체 뭘 상상하는 걸까나~? 왜 입꼬리가 올라가 있는 걸까나~?」"

[[dialogue]]
speaker = "unk"
original = "い、いえ、何も！"
translation = "아, 아니요, 아무것도!"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「へー、ふーん、誤魔化しちゃうんだ？\u3000そかそか、誤魔化しちゃうんだ？」"
translation = "「헤에~ 흐응~ 얼버무리는 거네? 그렇구나 그렇구나, 얼버무리는 거구나?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ああいいよいいよ。今更謝らなくても。ヴィーナスちゃんとサーシャさんに似合うのは間違いないと思うし～？」"
translation = "「아아 됐어 됐어. 이제 와서 사과하지 않아도. 비너스 짱이랑 사샤 선배가 잘 어울릴 건 틀림없으니까~?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「……ど、どうしよアナ。一気に空気が……。私たち、知らず知らずのうちに会長を地雷原へ誘導しちゃったかも……！」"
translation = "「……어, 어쩌지 아나. 단숨에 분위기가……. 우리도 모르는 사이에 회장을 지뢰밭으로 유도해 버린 걸지도……!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「いえ、今のは会長が悪いでしょう。彼女がいながら性欲感知式の地雷に引っかかる方がいけないんです」"
translation = "「아니요, 방금 건 회장이 잘못한 거죠. 여자친구가 있으면서 성욕 감지식 지뢰에 걸리는 쪽이 나쁜 겁니다」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「はい、休憩終わり！\u3000ちゃっちゃとボスモンスター倒しにいこ！\u3000思いっきし乱射乱発したい気分だし！」"
translation = "「자, 휴식 끝! 얼른얼른 보스 몬스터 잡으러 가자! 마음껏 난사하고 싶은 기분이니까!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「し……しかしこの空気は確かに困りますね。連携に支障が出なければいいんですが……」"
translation = "「그…… 하지만 이 분위기는 확실히 곤란하네요. 연계에 지장이 없으면 좋겠습니다만……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「普通にマズいよね……！\u3000どうしよ、これが原因で２人が別れちゃったりしたら……！」"
translation = "「보통 일이 아니네……! 어쩌지, 이것 때문에 둘이 헤어지기라도 하면……!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「っっ。防御は任せてっ！\u3000アナ、お願いっ……！」"
translation = "「윽. 방어는 맡겨줘! 아나, 부탁해……!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そこですっ！\u3000バーミリオンイータ！」"
translation = "「거기입니다! 버밀리언 이터!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「体勢は崩しましたっ。とどめをお願いしますっ！」"
translation = "「자세를 무너뜨렸습니다. 마무리를 부탁드려요!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ああでも、あの二人って今っ……！」"
translation = "「아아 하지만, 저 두 사람은 지금……!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「行くよっ、会長さん！\u3000うちに合わせてっ！」"
translation = "「간다, 회장님! 나한테 맞춰!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「シャイニングバニーレイ！」"
translation = "「샤이닝 바니 레이!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ふっ……。うちらラブラブコンビの前で隙を見せたのが運の尽きだったね」"
translation = "「훗……. 우리 러브러브 콤비 앞에서 빈틈을 보인 게 운이 다한 거였네」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あ……あれ？\u3000息すっごい合ってる……？」"
translation = "「어…… 어라? 호흡이 엄청 잘 맞는데……?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ふふ、あのくらいでヤキモチなんか妬かないってば～。会長さんがうちを一番に想ってくれてることくらいわかってるも～ん<emoji=heart04>」"
translation = "「후후, 그 정도로 질투 따위 안 한다니까~. 회장님이 나를 제일로 생각해주고 있다는 것 정도는 알고 있는걸~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺のハートも改めて撃ち抜かれましたよ"
translation = "제 하트도 다시 한번 저격당했어요"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「でしょでしょ♪\u3000う～んとセクシーに格好良く決めてあげたんだから<emoji=heart04>」"
translation = "「그치그치♪ 아주 섹시하고 멋지게 결정해 줬으니까<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "魅入っちゃいました！"
translation = "넋을 잃고 봤어요!"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ふふっ、おっぱいとお尻見てるのバレてるぞ<emoji=heart04>\u3000そっちじゃなくて活躍を見て欲しいんだってば～<emoji=heart04>」"
translation = "「후훗, 가슴이랑 엉덩이 보고 있는 거 다 들켰어<emoji=heart04> 그쪽 말고 활약을 봐줬으면 좋겠는데 말이야~<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「……なるほど、これがバカップルかぁ」"
translation = "「……과연, 이것이 바보 커플인가」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……無駄に疲れましたね。私たちの気苦労は一体……」"
translation = "「……무의미하게 지쳤네요. 우리의 걱정은 대체……」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「さ、モンスターは退治したし、早くお部屋帰ろ♪\u3000うちのバニーガールが一番だってこと、またじーっくり教えてあげるから<emoji=heart04>」"
translation = "「자, 몬스터는 퇴치했고, 빨리 방으로 돌아가자♪ 내 바니걸 모습이 최고라는 거, 다시 처어언천히 가르쳐 줄 테니까<emoji=heart04>」"

