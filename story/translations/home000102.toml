[[dialogue]]
speaker = "聖沙"
original = "「ティンクル☆くるせいだーすコラボ──」"
translation = "「팅클☆크루세이더스 콜라보──」"

[[dialogue]]
speaker = "リア"
original = "「始まりました♪」"
translation = "「시작됐습니다♪」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「流星クルセイダースが来てくれたら百人力──いいえ、百万人力よ！\u3000頼りにしてるわね、聖沙、リアさん♪」"
translation = "「유성 크루세이더스가 와준다면 백인력── 아니, 백만인력이야! 믿고 있을게, 미사, 리아 씨♪」"

[[dialogue]]
speaker = "ルリエル"
original = "「まっかせてください！\u3000このルリエル、クルセイダースとして頑張りますよ！」"
translation = "「맡겨주세요! 이 루리엘, 크루세이더스로서 열심히 할게요!」"

[[dialogue]]
speaker = "フィオナ"
original = "「世界を守る前に、うちの星徒会役員には正気に戻ってもらう必要がありそうですね……」"
translation = "「세계를 지키기 전에 우리 성도회 임원부터 제정신으로 돌려놓을 필요가 있겠네요……」"

[[dialogue]]
speaker = "パッキー"
original = "「おっと、俺様も忘れてもらっちゃ困るんだぜ。クックック……どんなデカパイに出会えるか楽しみだぜ！」"
translation = "「오옷, 이 몸도 잊으면 곤란하다고. 큭큭큭…… 어떤 데카파이를 만날 수 있을지 기대되는군!」"

[[dialogue]]
speaker = "聖沙"
original = "「あ、パッキーさんがまたよからぬこと考えてる～！？」"
translation = "「아, 팟키 씨가 또 좋지 않은 생각을 하고 있어~!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それじゃ、ティンクルスターナイツ×ティンクル☆くるせいだーすコラボイベント──」"
translation = "「그럼, 팅클 스타 나이츠×팅클☆크루세이더스 콜라보 이벤트──」"

[[dialogue]]
speaker = "フィオナ"
original = "「楽しんでくださいねっ♪」"
translation = "「즐겨주세요♪」"

