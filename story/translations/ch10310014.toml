[[dialogue]]
speaker = "unk"
original = "第４話,アニマシンクロハート,P"
translation = "제4화, 아니마 싱크로 하트"

[[dialogue]]
speaker = "unk"
original = "ある休日。街へタブレットを買い換えに来ていた俺は、迷子らしき女の子と一緒にいるアニマ先輩と遭遇した。"
translation = "어느 휴일. 시내에 태블릿을 바꾸러 왔던 나는 미아인 듯한 여자아이와 함께 있는 아니마 선배와 조우했다."

[[dialogue]]
speaker = "アニマ"
original = "「フヒ、安心したまえ、お嬢ちゃん。キミのお母さんはアニマがすぐに見つけてみせるとも」"
translation = "「후히, 안심해라다 꼬마 아가씨. 네 엄마는 아니마가 금방 찾아내 보이겠다다.」"

[[dialogue]]
speaker = "女の子"
original = "「ひ、ひとりで大丈夫……です……」"
translation = "「호, 혼자서 괜찮……아요……」"

[[dialogue]]
speaker = "アニマ"
original = "「いやいや、ひとりで不安そうに見えるゾ？\u3000そうだ、いいものがある。飲むと精神が安定する薬ダ♪」"
translation = "「아니 아니, 혼자서 불안해 보인다다로우? 맞아, 좋은 게 있다다. 마시면 정신이 안정되는 약이라다요♪」"

[[dialogue]]
speaker = "アニマ"
original = "「ほら、綺麗な緑色ダロウ？\u3000味もわざとらしいメロン味にしてみた」"
translation = "「보라다, 예쁜 초록색이다다로우? 맛도 일부러 멜론 맛으로 해봤다다.」"

[[dialogue]]
speaker = "アニマ"
original = "「フヒヒッ、飲んでみたまえ。余りの美味しさに──飛ぶゾ？」"
translation = "「후히히, 마셔보라다로우. 너무 맛있어서── 뿅 갈 거라다?」"

[[dialogue]]
speaker = "女の子"
original = "「ひぃっ……！？」"
translation = "「히익……!?」"

[[dialogue]]
speaker = "unk"
original = "アニマ先輩、ストォォォ──ップ！！！"
translation = "아니마 선배, 스토오오오──옵!!!"

[[dialogue]]
speaker = "アニマ"
original = "「おや？\u3000こんにちはダ、会長。こんなところで会うとは奇遇だネ」"
translation = "「오야? 안녕이다다, 회장. 이런 데서 만나다니 기구하네.」"

[[dialogue]]
speaker = "アニマ"
original = "「……なに、方法が間違っている？\u3000フム、キミがそう言うなら、試してみよう」"
translation = "「……뭐야, 방법이 틀렸냐로우? 후무, 네가 그렇게 말한다면 시험해 보겠다다.」"

[[dialogue]]
speaker = "アニマ"
original = "「お嬢ちゃん、これならどうだろうカ？\u3000アニマが作った特製クッキーだヨ」"
translation = "「꼬마 아가씨, 이건 어떠냐로우? 아니마가 만든 특제 쿠키라다요.」"

[[dialogue]]
speaker = "女の子"
original = "「わぁ……可愛い袋！\u3000それに良い匂い……！\u3000これ、本当にお姉ちゃんが作ったの？」"
translation = "「와아…… 귀여운 봉투! 게다가 좋은 냄새……! 이거 정말 언니가 만든 거야?」"

[[dialogue]]
speaker = "アニマ"
original = "「フヒ、そうだとも。しかも、発明した保存術式で、中身は焼き立てホカホカのままダ。美味しいゾ？」"
translation = "「후히, 그렇다다. 게다가 발명한 보존 술식으로 내용물은 갓 구운 따끈따끈한 상태라다. 맛있다다로우?」"

[[dialogue]]
speaker = "女の子"
original = "「もぐもぐ……本当だ！\u3000こんなに美味しいクッキー、初めて食べた！\u3000お姉ちゃん、ありがとう！」"
translation = "「우물우물…… 진짜다! 이렇게 맛있는 쿠키, 처음 먹어봐! 언니, 고마워!」"

[[dialogue]]
speaker = "アニマ"
original = "「……！\u3000ああ、どういたしましてダ。フヒ」"
translation = "「……! 아아, 별말씀을다다. 후히.」"

[[dialogue]]
speaker = "unk"
original = "その後、程なくしてお母さんは見つかった。女の子はすっかりアニマ先輩に心許して「ばいばい、お姉ちゃん！」と笑顔で手を振り、去って行った。"
translation = "그 후 머지않아 어머니를 찾았다. 여자아이는 완전히 아니마 선배에게 마음을 열고 「바이바이, 언니!」라며 웃으며 손을 흔들고 떠나갔다."

[[dialogue]]
speaker = "アニマ"
original = "「……キミの言う通りだったナ。精神安定薬など、使う必要はなかった」"
translation = "「……네 말대로였다다로우. 정신 안정약 같은 건 쓸 필요 없었네.」"

[[dialogue]]
speaker = "アニマ"
original = "「子供をどうすれば笑顔に出来るか、理解はしたヨ。しかしながら、どうもアニマはそこら辺の……他人への共感というものが欠如しているようダ」"
translation = "「아이를 어떻게 하면 웃게 할 수 있는지 이해했다다. 하지만 아무래도 아니마는 그런 쪽의…… 타인에 대한 공감이라는 게 결여된 모양이라다.」"

[[dialogue]]
speaker = "アニマ"
original = "「キミに指摘されなければ、アニマには多分、『ただ普通のお菓子をあげればいい』だなんて、思い付かなかっただろうネ」"
translation = "「네가 지적해 주지 않았다면 아니마에게는 아마 『그냥 평범한 과자를 주면 된다』 같은 건 생각나지 않았을 거라다로우.」"

[[dialogue]]
speaker = "アニマ"
original = "「……いや、変なことを言ったナ、すまない。そんなことより、キミは今日どうしてここに？」"
translation = "「……아니, 이상한 소릴 했네, 미안하다다. 그보다 너는 오늘 왜 여기에?」"

[[dialogue]]
speaker = "unk"
original = "タブレットの買い換えに。……先輩は？"
translation = "태블릿을 바꾸러요. ……선배는요?"

[[dialogue]]
speaker = "アニマ"
original = "「アニマは研究資材が少なくなって来たので、その調達だヨ。それにしてもタブレットか、フム……」"
translation = "「아니마는 연구 자재가 적어져서 조달하러 왔다다요. 그나저나 태블릿인가, 후무……」"

[[dialogue]]
speaker = "アニマ"
original = "「キミが学園でも使っていたものだナ？\u3000錬金術と情報技術は相反するため、これまで積極的に知ろうとはしなかったが──」"
translation = "「네가 학원에서도 쓰던 거네? 연금술과 정보 기술은 상반되기에 지금까지 적극적으로 알려고 하진 않았다만──」"

[[dialogue]]
speaker = "アニマ"
original = "「提案なのだが、アニマも一緒に付いて行ってもいいだろうカ？\u3000なに、キミが便利だというなら、これを機に学んでみるのもいいかもしれないと思ってネ」"
translation = "「제안인데 아니마도 같이 따라가도 되겠냐로우? 뭐야, 네가 편리하다고 한다면 이번 기회에 배워보는 것도 좋을 것 같아서 말이다다.」"

[[dialogue]]
speaker = "アニマ"
original = "「フヒッ♪\u3000アニマもついにタブレットを買ってしまったゾ。しかも、キミと同じ機種をダ。ドヤァ」"
translation = "「후히♪ 아니마도 드디어 태블릿을 사버렸다다. 게다가 너랑 같은 기종으로 말이다다. 도야아.」"

[[dialogue]]
speaker = "アニマ"
original = "「ム？\u3000どうしたのダ、会長。なぜ照れている？\u3000機種が同じだと、何か問題があるのカ？」"
translation = "「무? 왜 그러냐로우, 회장. 왜 부끄러워하지? 기종이 같으면 무슨 문제라도 있냐로우?」"

[[dialogue]]
speaker = "unk"
original = "カップルみたいなので……"
translation = "커플 같아서요……"

[[dialogue]]
speaker = "unk"
original = "その……女の子とお揃いだと、"
translation = "그게…… 여자애랑 세트면,"

[[dialogue]]
speaker = "アニマ"
original = "「……なるほど。カップルみたい、か。確かに言われてみると、そうかもしれないナ……？」"
translation = "「……과연. 커플 같다, 인가. 확실히 듣고 보니 그럴지도 모르겠다다로우……?」"

[[dialogue]]
speaker = "アニマ"
original = "「すまない、会長。気付くと、やってしまった感があるナ……。さっき同じ失敗をしたばかりだというのに、浮かれて繰り返してしまった」"
translation = "「미안하다다, 회장. 깨닫고 보니 저질러버린 느낌이라다로우……. 아까 똑같은 실수를 한 참인데 들떠서 반복해버렸네.」"

[[dialogue]]
speaker = "アニマ"
original = "「アニマはやはり、他人への共感が足りていないようダ……」"
translation = "「아니마는 역시 타인에 대한 공감이 부족한 모양이라다……」"

[[dialogue]]
speaker = "unk"
original = "同じ機種にしようと思ったんですか？"
translation = "같은 기종으로 하려고 생각했나요?"

[[dialogue]]
speaker = "unk"
original = "先輩はどうして、"
translation = "선배는 어째서,"

[[dialogue]]
speaker = "アニマ"
original = "「それは……キミが使っているものと同じものなら、ツールとして信頼出来ル。わからないことがあれば、教えてもらえるし──」"
translation = "「그건…… 네가 쓰는 거랑 같은 거라면 툴로서 신뢰할 수 있다다. 모르는 게 있으면 물어볼 수도 있고──」"

[[dialogue]]
speaker = "アニマ"
original = "「キミと一緒だと、面白そうだと思ったんダ……」"
translation = "「너랑 함께라면 재밌을 것 같다고 생각했다다……」"

[[dialogue]]
speaker = "unk"
original = "じゃあ先輩は、俺とお揃いだと嫌ですか？"
translation = "그럼 선배는 나랑 세트인 게 싫으세요?"

[[dialogue]]
speaker = "アニマ"
original = "「いや、そんなことはないゾ。恥ずかしさはあるが、嫌じゃない……あぁ！」"
translation = "「아니, 그런 건 아니다다. 부끄러움은 있지만 싫지 않아…… 아아!」"

[[dialogue]]
speaker = "アニマ"
original = "「──ああ、そうカ。この気持ちは……キミも一緒か」"
translation = "「──아아, 그렇구나다. 이 기분은…… 너도 마찬가지냐로우.」"

[[dialogue]]
speaker = "アニマ"
original = "「フヒヒッ……確かにこれは、ちょっと照れるナ？」"
translation = "「후히히…… 확실히 이건 좀 부끄럽네?」"

[[dialogue]]
speaker = "アニマ"
original = "「ありがとうダ、会長。……アニマはキミのおかげで一つ、共感を知ることが出来タ」"
translation = "「고맙다다, 회장. ……아니마는 너 덕분에 하나, 공감을 알 수 있었다다.」"

[[dialogue]]
speaker = "アニマ"
original = "「だから、そうだな……。その……今度は人の心についても……また一緒に、実験して貰えると嬉しイ」"
translation = "「그러니까 그렇네……. 그…… 이번에는 사람의 마음에 대해서도…… 또 같이 실험해 주면 기쁘겠다요.」"

[[dialogue]]
speaker = "unk"
original = "もちろん、いくらでも"
translation = "물론이죠, 얼마든지"

[[dialogue]]
speaker = "アニマ"
original = "「……さて。気を取り直してダ、会長。今日はまだ、時間はあったりするのかね？」"
translation = "「……자. 기분 전환하고다다, 회장. 오늘은 아직 시간은 있냐로우?」"

[[dialogue]]
speaker = "アニマ"
original = "「ならばせっかくダ、このまま一緒に街で実験と洒落込もうじゃないか」"
translation = "「그렇다면 모처럼이다다, 이대로 같이 거리에서 실험이라도 하러 가자꾸나.」"

[[dialogue]]
speaker = "アニマ"
original = "「ほら、こっちダ。早く来たまえ！」"
translation = "「자, 이쪽이다다. 빨리 오라다로우!」"

[[dialogue]]
speaker = "アニマ"
original = "「フヒ♪」"
translation = "「후히♪」"

[[dialogue]]
speaker = "unk"
original = "そうしてアニマ先輩は、楽しそうに俺の手を取ると。"
translation = "그렇게 아니마 선배는 즐거운 듯 내 손을 잡더니."

[[dialogue]]
speaker = "unk"
original = "思わず見惚れてしまうような、女の子らしい笑顔を浮かべるのだった。"
translation = "나도 모르게 넋을 잃고 볼 정도로 여자아이 같은 미소를 짓는 것이었다."

