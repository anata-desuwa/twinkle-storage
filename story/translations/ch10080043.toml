[[dialogue]]
speaker = "unk"
original = "第３話,いつか空の向こうへ、一緒に,P"
translation = "제3화, 언젠가 하늘 너머로, 함께, P"

[[dialogue]]
speaker = "unk"
original = "それはまだ、冬休みが明ける前のこと。"
translation = "그것은 아직 겨울 방학이 끝나기 전의 일."

[[dialogue]]
speaker = "unk"
original = "俺とアナは初詣デートに出かけ、２人並んで参拝していた。"
translation = "나와 아나는 새해 첫 참배 데이트를 나갔고, 둘이 나란히 서서 참배하고 있었다."

[[dialogue]]
speaker = "unk"
original = "俺とアナはお賽銭を投げ、<ruby>鰐口<rt>わにぐち</rt></ruby>を鳴らす。一礼の後、胸の前で手を合わせ、静かに祈りを捧げた。"
translation = "나와 아나는 시줏돈을 던지고, <ruby>방울<rt>와니구치</rt></ruby>을 울린다. 일례 후, 가슴 앞에서 손을 맞잡고 조용히 기도를 올렸다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "それから甘酒をもらいに行き、２人で口にしながら、お寺の境内をぶらりと歩く。"
translation = "그러고 나서 단술을 받으러 가, 둘이서 마시며 절 경내를 한가롭게 걷는다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「前から思っていたのですが、甘酒の味って、ちょっと和菓子っぽいですよね」"
translation = "「전부터 생각했습니다만, 단술 맛은 약간 화과자 느낌이 나네요」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「――それは思いつかなかった、ですか？\u3000しかし、ネットで調べてみると甘酒を使った和菓子は色々出てきます」"
translation = "「――그건 생각지 못했다, 인가요? 하지만 인터넷으로 찾아보면 단술을 사용한 화과자는 여러 가지가 나옵니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「甘酒ようかんや、甘酒をあんこに使用したどら焼き、後は甘酒プリンなるものもあったりするようで……想像しただけで、ちょっとよだれが出てきてしまいます。じゅるり……♪」"
translation = "「단술 양갱이나, 단술을 앙금에 사용한 도라야키, 그리고 단술 푸딩이라는 것도 있는 모양이라…… 상상만 해도 약간 침이 나오네요. 쥬르륵……♪」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「浅草にも甘酒の和菓子を取り扱っているお店があるみたいなので……よろしければこの後、一緒に食べに行きませんか？」"
translation = "「아사쿠사에도 단술 화과자를 취급하는 가게가 있는 것 같으니…… 괜찮으시다면 이따가 같이 먹으러 가지 않겠습니까?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ふふっ、そうと決まれば、早く向かいましょうっ。わくわく……♪」"
translation = "「후훗, 그렇게 정해졌으면 빨리 가죠. 두근두근……♪」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ふんふんふん、ふっふふ～ん……♪」"
translation = "「흠흠흠, 훗후후~음……♪」"

[[dialogue]]
speaker = "unk"
original = "俺と恋人繋ぎで手を取り、アナは上機嫌に鼻歌を口ずさみながら、寄り添うように歩く。"
translation = "나와 연인 잡기로 손을 맞잡고, 아나는 기분 좋게 콧노래를 흥얼거리며 곁에 붙어서 걷는다."

[[dialogue]]
speaker = "unk"
original = "アナは初詣で、何をお願いしたんだ？"
translation = "아나는 첫 참배에서 뭘 빌었어?"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「無難ですが、無病息災、必勝祈願、といったところです。会長は何を？」"
translation = "「무난하지만 무병장수, 필승 기원, 같은 겁니다. 회장님은 무엇을?」"

[[dialogue]]
speaker = "unk"
original = "――俺も大体同じだった。誰１人欠けることなく、リクリエに勝ちたい。"
translation = "――나도 거의 비슷했어. 누구 하나 빠지는 일 없이 리크리에에게 이기고 싶어."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そうですね……ただ、最近は『勝った後のこと』も考えるようになりました」"
translation = "「그렇네요…… 다만, 최근에는 『이긴 뒤의 일』도 생각하게 되었습니다」"

[[dialogue]]
speaker = "unk"
original = "俺はそこまで頭が回ってなかったかも"
translation = "나는 거기까지는 생각이 미치지 못했을지도"

[[dialogue]]
speaker = "unk"
original = "勝った後のこと、か……。"
translation = "이긴 뒤의 일이라……."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「特別高尚なことを考えていたわけじゃありませんよ」"
translation = "「특별히 고상한 걸 생각한 건 아니에요」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ただ、リクリエとの戦いを通じて、星力や三界の仕組みについて、過去の歴史でも類を見ないほどに急速な理解と進歩が見られます」"
translation = "「다만 리크리에와의 싸움을 통해 성력이나 삼계의 구조에 대해 과거 역사에서도 유례를 찾아볼 수 없을 정도로 급속한 이해와 진보가 보이고 있습니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「会長に昔、話したことを覚えていますか？\u3000私は、人間界と天界の移動方法を増やしたいと考えていました」"
translation = "「회장님께 옛날에 이야기했던 걸 기억하시나요? 저는 인간계와 천계의 이동 수단을 늘리고 싶다고 생각했습니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>を使っての、ヒトや物の移動は四半期に１回だけ……ですが、私たちは魔女の森にある世界樹を通じて、それ以外の移動方法が実在していることを知りました」"
translation = "「<ruby>경계의 호수<rt>라고 시엘로</rt></ruby>를 통한 사람이나 물건의 이동은 분기에 한 번뿐…… 하지만 우리는 마녀의 숲에 있는 세계수를 통해 그 이외의 이동 방법이 실재한다는 것을 알게 되었습니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「他にも、フィーニスの塔をたどることで、天界や魔界に移動する方法もある。当然、こちらは星騎士でない人に耐えられる移動方法ではありませんが……」"
translation = "「그 밖에도 피니스의 탑을 따라가 천계나 마계로 이동하는 방법도 있죠. 당연히 이쪽은 성기사가 아닌 사람이 견딜 수 있는 이동 방법은 아닙니다만……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「私は、自分が生きているうちに、三界の移動方法が本当に増えるとは思っていませんでした」"
translation = "「저는 제가 살아있는 동안에 삼계의 이동 수단이 정말로 늘어날 거라고는 생각지 않았습니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「しかし今の調子であれば、遠くない未来、本当に正規の手段での三界の移動方法が増えてしまいそうです」"
translation = "「하지만 지금 기세라면 머지않은 미래에 정말로 정규 수단에 의한 삼계 이동 방법이 늘어날 것 같습니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ただ、理論が確立されたとしても、実際にそれを交通インフラとして落とし込むのは、大変な仕事になるでしょう」"
translation = "「다만 이론이 확립된다고 해도 실제로 그것을 교통 인프라로 정착시키는 것은 힘든 일이 되겠죠」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「実現するのは１年後か１０年後か、はたまた５０年後か。おそらく誰にもわかりません」"
translation = "「실현되는 것은 1년 후일지 10년 후일지, 아니면 50년 후일지. 아마 아무도 모를 겁니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「もし間に合うのなら、私は新星学園を卒業した後、そうしたインフラに関わる仕事に携わりたいと、少し前から考えていました」"
translation = "「만약 때가 맞는다면 저는 신성 학원을 졸업한 뒤 그런 인프라에 관련된 일에 종사하고 싶다고 조금 전부터 생각하고 있었습니다」"

[[dialogue]]
speaker = "unk"
original = "天界に和菓子屋さんを作る夢はどうする？"
translation = "천계에 화과자 가게를 차리는 꿈은 어떡하고?"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そっちも、もちろん忘れていません」"
translation = "「그쪽도 물론 잊지 않았습니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ですが、まずはあんこを人間界から安定して仕入れるルートを確立してからでないと、話は始まりません」"
translation = "「하지만 우선은 앙금을 인간계에서 안정적으로 조달할 루트를 확립한 뒤가 아니면 이야기가 시작되지 않으니까요」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「星力や三界の仕組みを研究するのは、リノさんも所属している研究機関『ヘキサグラム』の仕事です」"
translation = "「성력이나 삼계의 구조를 연구하는 것은 리노 씨도 소속되어 있는 연구 기관 『헥사그램』의 일입니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「なので卒業後の具体的な進路としては、ヘキサグラムはありえると思っていました」"
translation = "「그래서 졸업 후의 구체적인 진로로서는 헥사그램이 가능성 있다고 생각했습니다」"

[[dialogue]]
speaker = "unk"
original = "アナと母さんが同僚になる未来もあるってことかぁ……と、白衣を着ているアナをちょっと想像する。"
translation = "아나와 엄마가 동료가 되는 미래도 있다는 건가…… 하며 흰 가운을 입고 있는 아나를 잠깐 상상해 본다."

[[dialogue]]
speaker = "unk"
original = "――うん、めちゃくちゃ似合ってるな。"
translation = "――응, 엄청나게 잘 어울리네."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「それ以外だと、ヒルディオーネ先輩のご実家が経営されている『<ruby>千園寺<rt>せんおんじ</rt></ruby>ギャラクティック』なども候補に挙がります」"
translation = "「그 밖에는 힐디요네 선배의 본가에서 경영하는 『<ruby>치온지<rt>센온지</rt></ruby> 갤럭틱』 등도 후보에 오릅니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「以前も話題にしましたが、天界と人間界の宇宙は『概念的な距離』が近いとされています」"
translation = "「이전에도 화제로 삼았습니다만, 천계와 인간계의 우주는 『개념적인 거리』가 가깝다고 여겨집니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「天界へのゲートや港を作るのであれば、宇宙やそれに近い高所に作られる可能性は高い」"
translation = "「천계로 가는 게이트나 항구를 만든다면 우주나 그에 가까운 높은 곳에 만들어질 가능성이 높죠」"

[[dialogue]]
speaker = "unk"
original = "どんな風になるのか、全然想像もつかないな"
translation = "어떤 식이 될지 전혀 상상도 안 가네"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そうですね。でも、世界樹の存在も、フィーニスの塔の内部も、私たちの想像の外にありましたが……今はもう、そうではありません」"
translation = "「그렇네요. 하지만 세계수의 존재도, 피니스의 탑 내부도 우리의 상상 밖이었지만…… 지금은 더 이상 그렇지 않습니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「課題を１つずつ解決していった先に、きっと私たちが想像もできなかったようなすごいことが待っている、そんな気がして、ちょっとワクワクします」"
translation = "「과제를 하나씩 해결해 나간 끝에 분명 우리가 상상도 하지 못했던 대단한 일이 기다리고 있을 것 같은, 그런 기분이 들어서 조금 설렙니다」"

[[dialogue]]
speaker = "unk"
original = "そこまで考えてるなんて、やっぱりアナはすごい、と俺は感心する。"
translation = "거기까지 생각하고 있다니 역시 아나는 대단해, 하고 나는 감탄한다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「いえ、アニマ先輩と違って、世界を救うのとは直接関係ない分野ですから、そこまで立派な考えではないですよ」"
translation = "「아니요, 아니마 선배와 달리 세계를 구하는 것과는 직접 관계없는 분야니까 그렇게 훌륭한 생각은 아니에요」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ただ、私はやっぱり……自分の知らなかったことを知るのが、すごく好きだなって思ったんです」"
translation = "「다만 저는 역시…… 제가 몰랐던 것을 알아가는 게 정말 좋다고 생각했어요」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そういう意味では、天界のことを抜きにしても、『宇宙』というものにはとても心惹かれます」"
translation = "「그런 의미에서는 천계 일을 빼놓더라도 『우주』라는 것에는 무척 마음이 끌립니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「千園寺ギャラクティックについては、三界移動のインフラ事業を抜きにしても、魅力的な就職先です」"
translation = "「치온지 갤럭틱에 대해서는 삼계 이동 인프라 사업을 빼놓더라도 매력적인 직장입니다」"

[[dialogue]]
speaker = "unk"
original = "宇宙って、それだけでワクワクするもんな！"
translation = "우주란 건, 그것만으로도 두근거리는 법이지!"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ふふ、さすが会長。わかってる」"
translation = "「후후, 역시 회장님. 잘 아시네요.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「実はこの間、『モデルロケット』というものを知りました。とても興味深いものだったので、今度会長にもシェアします」"
translation = "「사실 요전에 『모델 로켓』이라는 것을 알게 되었습니다. 무척 흥미로운 것이었기에, 다음에 회장님께도 공유할게요.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「それでもし、もしもの話なんですが……私が千園寺ギャラクティックに就職すると言ったら――」"
translation = "「그래서 만약, 만약의 이야기입니다만…… 제가 센온지 갤럭틱에 취직한다고 한다면――」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「会長も、一緒に来てくれますか？」"
translation = "「회장님도, 함께 가주실 건가요?」"

[[dialogue]]
speaker = "unk"
original = "宇宙開発と関わる大企業に、俺も就職！？"
translation = "우주 개발과 관련된 대기업에, 나도 취직!?"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ダメ……でしょうか？」"
translation = "「안…… 될까요?」"

[[dialogue]]
speaker = "unk"
original = "いや、ダメじゃない！\u3000全然ダメじゃない！\u3000けれども……！！"
translation = "아니, 안 될 리가 없지! 전혀 안 될 리가 없어! 하지만……!!"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「――私はともかく、会長の成績だと、その就職先は受かるか心配……？」"
translation = "「――저는 그렇다 치고, 회장님의 성적으로는 그 직장에 합격할 수 있을지 걱정……?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ノープロブレム。勉強は得意♪」"
translation = "「노 프로블럼. 공부는 자신 있어요♪」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「成績や試験が問題というだけなら、私と一緒に勉強しましょう。ふんすっ♪」"
translation = "「성적이나 시험이 문제라면, 저와 함께 공부해요. 흥스♪」"

[[dialogue]]
speaker = "unk"
original = "乗り気なアナを前に、俺は『勉強も頑張る』という新年の新たな目標が加わるのだった。"
