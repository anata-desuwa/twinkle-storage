[[dialogue]]
speaker = "unk"
original = "第６話,流星学園星徒会,B"
translation = "제6화, 유성 학원 성도회, B"

[[dialogue]]
speaker = "フィオナ"
original = "「流星学園星徒会会長、星見フィオナです」"
translation = "「유성 학원 성도회 회장, 호시미 피오나입니다.」"

[[dialogue]]
speaker = "フィオナ"
original = "「改めてよろしくお願いしますね──新星学園の、新星徒会長さん」"
translation = "「다시 한번 잘 부탁드립니다──신성 학원의, 신임 성도 회장님.」"

[[dialogue]]
speaker = "クロト"
original = "「……ああ。緋宮クロトだ──よろしく頼む」"
translation = "「……아아. 히노미야 쿠로토다──잘 부탁한다.」"

[[dialogue]]
speaker = "unk"
original = "差し出された手を取り、名を告げる。"
translation = "내밀어진 손을 잡고, 이름을 알린다."

[[dialogue]]
speaker = "unk"
original = "星徒会長と言われて一瞬面食らってしまったが……自分のことだ。そろそろ慣れないとな。"
translation = "성도 회장이라고 불려서 한순간 당황했지만…… 내 일이다. 슬슬 익숙해져야지."

[[dialogue]]
speaker = "unk"
original = "しかし……"
translation = "하지만……"

[[dialogue]]
speaker = "フィオナ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "クロト"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "握手を交わしたまま、数秒が経った。"
translation = "악수를 나눈 채, 몇 초가 지났다."

[[dialogue]]
speaker = "unk"
original = "向こうが力を緩めないのでなんとなく手を放せずにいる。"
translation = "상대가 힘을 풀지 않아서 왠지 모르게 손을 놓지 못하고 있다."

[[dialogue]]
speaker = "unk"
original = "ここまでまじまじと顔を見つめられると照れが交じるが……これもトップに立つ者の宿命なのだろうか？"
translation = "이렇게 빤히 얼굴을 바라보니 부끄러움이 섞이지만…… 이것도 정상에 선 자의 숙명인 걸까?"

[[dialogue]]
speaker = "フィオナ"
original = "「っと。ごめんなさい。これから、共に力を合わせていきましょうね」"
translation = "「읍. 죄송합니다. 앞으로, 함께 힘을 합쳐 나갑시다.」"

[[dialogue]]
speaker = "クロト"
original = "「そうだな。同じ星徒会長同士──良い関係を築いていこう」"
translation = "「그렇지. 같은 성도 회장끼리──좋은 관계를 만들어가자.」"

[[dialogue]]
speaker = "unk"
original = "お互いに手を放す。"
translation = "서로 손을 놓는다."

[[dialogue]]
speaker = "unk"
original = "にしても、星見フィオナさん──か。"
translation = "그나저나, 호시미 피오나 씨──인가."

[[dialogue]]
speaker = "unk"
original = "どこかで聞いた覚えがあるような……"
translation = "어디선가 들어본 기억이 있는 듯한……"

[[dialogue]]
speaker = "ルリエル"
original = "「（あ──あれが噂の下剋上星徒会長でありますかっ！）」"
translation = "「(아──저것이 소문의 하극상 성도 회장인 것입니까!)」"

[[dialogue]]
speaker = "ユウリ"
original = "「（とんでもねえ強者のオーラ──をそこまで纏ってるようには見えねえが……）」"
translation = "「(말도 안 되는 강자의 오라──를 거기까지 두르고 있는 것 같지는 않아 보이는데……)」"

[[dialogue]]
speaker = "セーラ"
original = "「（能ある鷹は爪を隠すからね～。きっと戦いに入ったらヤバいんじゃない？）」"
translation = "「(능력 있는 매는 발톱을 숨기는 법이지～。 분명 싸움에 들어가면 위험하지 않을까?)」"

[[dialogue]]
speaker = "ニャリオン"
original = "「（どんニャ男だろうと、フィオナ嬢の足元にも及ばないのは決まっているニャン！）」"
translation = "「어떤 남자든, 피오나 양의 발밑에도 미치지 못하는 건 정해져 있다냥!」"

[[dialogue]]
speaker = "ソフィア"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "星見会長のすぐ後ろで会話をする４人の女子たち（あと謎の一匹）。なぜかじろじろ見つめられている。"
translation = "호시미 회장 바로 뒤에서 대화하는 네 명의 여자들(그리고 정체불명의 한 마리). 왠지 모르게 빤히 쳐다보고 있다."

[[dialogue]]
speaker = "unk"
original = "彼女たちが残る流星星徒会のメンバー……"
translation = "그녀들이 남아있는 유성 성도회의 멤버……"

[[dialogue]]
speaker = "unk"
original = "そして、このアステライトを解放した立役者であることに疑いはなかった。"
translation = "그리고, 이 아스테라이트를 해방한 주역이라는 것에 의심은 없었다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「──流星星徒会のあなた達！\u3000今回は私達に代わりアステラを解放してくれたこと、礼を言うわ！」"
translation = "「──유성 성도회의 당신들! 이번에 우리를 대신해 아스테라를 해방해 준 것, 감사를 표하겠어!」"

[[dialogue]]
speaker = "フィオナ"
original = "「ええ。何事もなく済んで良かったです」"
translation = "「네. 아무 일 없이 끝나서 다행입니다.」"

[[dialogue]]
speaker = "unk"
original = "どん、と俺たちの前に出張ってきたのはヴィーナスだった。"
translation = "쿵, 하고 우리들 앞에 불쑥 나선 것은 비너스였다."

[[dialogue]]
speaker = "unk"
original = "同じ立場という話をしたばかりなのに、偉そうに大きく腕を組んでいる。"
translation = "같은 입장이라고 말한 지 얼마 되지도 않았는데, 잘난 듯이 크게 팔짱을 끼고 있다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「こちらがうちの書記──もとい切り込み隊長、マトイよ」"
translation = "「이쪽이 우리 서기──아니 돌격대장, 마토이야.」"

[[dialogue]]
speaker = "マトイ"
original = "「えぇっ」"
translation = "「에엣.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そしてこっちが副会長──いえスーパー副会長のアナ！」"
translation = "「그리고 이쪽이 부회장──아니 슈퍼 부회장 아나!」"

[[dialogue]]
speaker = "アナ"
original = "「よろしく」"
translation = "「잘 부탁드립니다.」"

[[dialogue]]
speaker = "unk"
original = "マトイは驚いて、アナはペコリと軽くお辞儀した。"
translation = "마토이는 놀라고, 아나는 꾸벅 가볍게 고개를 숙였다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「そしてここにおわす我らが星徒会長こそが真の魔王・緋宮クロトなんだから！」"
translation = "「그리고 여기에 계신 우리 성도 회장이야말로 진정한 마왕・히노미야 쿠로토인 거니까!」"

[[dialogue]]
speaker = "フィオナ"
original = "「魔王……」"
translation = "「마왕……」"

[[dialogue]]
speaker = "クロト"
original = "「（ヴィーナス、そこまで張り合わなくても）」"
translation = "「(비너스, 거기까지 경쟁하지 않아도.)」"

[[dialogue]]
speaker = "マトイ"
original = "「（そうそう、緋宮くんが誤解されちゃうって！）」"
translation = "「(맞아 맞아, 히노미야군이 오해받는다고!)」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「（いいのよ。こういうのは舐められたら終わりなんだから！\u3000ファーストインプレッションが肝心よ！）」"
translation = "「(괜찮아. 이런 건 얕보이면 끝이니까! 첫인상이 중요해!)」"

[[dialogue]]
speaker = "unk"
original = "舐められまいとひたすらハッタリを利かせるヴィーナスだった。"
translation = "얕보이지 않으려고 오로지 허세를 부리는 비너스였다."

[[dialogue]]
speaker = "unk"
original = "一応ライバル校とはいえ……。"
translation = "일단 라이벌 학교라고는 해도…….」"

[[dialogue]]
speaker = "ルリエル"
original = "「で、ではでは貴女さまはっ？」"
translation = "「그, 그럼 그럼 당신께서는요?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私？\u3000ふふっ、聞いて驚きなさい──私こそ新星学園の影のフィクサー・九浄ヴィーナス！」"
translation = "「나? 후훗, 듣고 놀라거라──나야말로 신성 학원의 그림자 실세・쿠죠 비너스!」"

[[dialogue]]
speaker = "ルリエル"
original = "「ふぃ、ふぃふぃくさー！？」"
translation = "「시, 실실실세!?」"

[[dialogue]]
speaker = "ユウリ"
original = "「……って何だっけ」"
translation = "「……이게 뭐였더라.」"

[[dialogue]]
speaker = "ソフィア"
original = "「政財界などのバックから実務を牛耳る権力者……のはずです」"
translation = "「정재계 등의 배후에서 실무를 좌지우지하는 권력자……일 것입니다.」"

[[dialogue]]
speaker = "ルリエル"
original = "「う、裏ボスでありますか！？」"
translation = "「우, 뒷보스인 것입니까!?」"

[[dialogue]]
speaker = "マトイ"
original = "「（またヴィーナスがありもしない役職に就こうとしてる……）」"
translation = "「(또 비너스가 있지도 않은 직책에 오르려고 하고 있어……)」"

[[dialogue]]
speaker = "アナ"
original = "「（どうしてああいう語彙は豊富なんでしょう）」"
translation = "「(어째서 저런 어휘는 풍부한 걸까요.)」"

[[dialogue]]
speaker = "unk"
original = "言ったもん勝ちだった。"
translation = "말한 사람이 이기는 것이었다."

[[dialogue]]
speaker = "unk"
original = "これを受けて、星見会長の右肩から一匹の従者が声を上げる。"
translation = "이를 받아, 호시미 회장의 오른쪽 어깨에서 한 마리의 종자가 목소리를 높인다."

[[dialogue]]
speaker = "ニャリオン"
original = "「こっちだって負けてないニャン！\u3000フィオナ嬢はあの教皇庁・星見家が第一皇女にして次期教皇候補！」"
translation = "「이쪽도 지지 않는다냥! 피오나 양은 저 교황청・호시미 가문의 제1 황녀이자 차기 교황 후보!」"

[[dialogue]]
speaker = "クロト"
original = "「！\u3000そうか、星見家の……」"
translation = "「! 그런가, 호시미 가문의……」"

[[dialogue]]
speaker = "ニャリオン"
original = "「さらにフィオナ嬢は頭脳明晰・成績優秀・眉目秀麗と文武両道の超絶美少女！\u3000どうだ！\u3000参ったかニャン！」"
translation = "「게다가 피오나 양은 두뇌 명석・성적 우수・용모 수려한 문무 겸비의 초절정 미소녀! 어떠냐! 졌다고 할 거냐냥!」"

[[dialogue]]
speaker = "ユウリ"
original = "「あたしらの紹介をしろよ」"
translation = "「우리들 소개를 하라고.」"

[[dialogue]]
speaker = "セーラ"
original = "「うちらのマスコット、ニャリオンちゃんでーす」"
translation = "「우리들의 마스코트, 냐리온짱이예ー요.」"

[[dialogue]]
speaker = "ソフィア"
original = "「……ソフィアです。よろしくお願いします」"
translation = "「……소피아입니다. 잘 부탁드립니다.」"

[[dialogue]]
speaker = "ルリエル"
original = "「大天使……うーん熾天使……いやケルビムも捨てがたい……いっそユアエンジェルなんてのも……」"
translation = "「대천사…… 으음 치천사…… 아니 케루빔도 버리기 아깝다…… 차라리 유어 엔젤이라는 것도……」"

[[dialogue]]
speaker = "unk"
original = "泰然自若と微笑む星見会長に、和気あいあいと談笑するそのメンバーたち。"
translation = "태연자약하게 미소 짓는 호시미 회장에게, 화기애애하게 담소하는 그 멤버들."

[[dialogue]]
speaker = "unk"
original = "俺たちとあり方は違えど、そこには十分な信頼関係が築かれているように思えた。"
translation = "우리들과 방식은 달라도, 그곳에는 충분한 신뢰 관계가 구축되어 있는 것처럼 보였다."

[[dialogue]]
speaker = "クロト"
original = "「（それにしても……星見家か……）」"
translation = "「(그렇다고 해도…… 호시미 가문인가……)」"

[[dialogue]]
speaker = "unk"
original = "星見家は流星教皇庁の首長だ。"
translation = "호시미 가문은 유성 교황청의 수장이다."

[[dialogue]]
speaker = "unk"
original = "つまり有りていに言って、星見家とは流星市国の統治者である。"
translation = "즉 노골적으로 말해, 호시미 가문은 유성 시국의 통치자이다."

[[dialogue]]
speaker = "unk"
original = "この国に住んでいれば知らぬ者はいない、九浄家に並ぶほどの由緒正しさと言えるだろう。"
translation = "이 나라에 살고 있다면 모르는 사람이 없을, 쿠죠 가문에 필적할 정도의 유서 깊음이라고 할 수 있을 것이다."

[[dialogue]]
speaker = "フィオナ"
original = "「ふふっ……でも、面白い方々ですね。切り込み隊長にスーパー副会長、後は影のフィクサーと……」"
translation = "「후훗…… 하지만, 재미있는 분들이네요. 돌격대장에 슈퍼 부회장, 그리고는 그림자 실세라니……」"

[[dialogue]]
speaker = "マトイ"
original = "「あ、あの。役職についてはあまり真に受けないでもらえると……」"
translation = "「아, 저기. 직책에 대해서는 너무 진지하게 받아들이지 않아 주시면……」"

[[dialogue]]
speaker = "unk"
original = "おどけた様子でこちらへと微笑みかける星見会長。"
translation = "익살스러운 모습으로 이쪽을 향해 미소 짓는 호시미 회장."

[[dialogue]]
speaker = "unk"
original = "マトイがそれを制止しようとするが──"
translation = "마토이가 그것을 제지하려고 하지만──"

[[dialogue]]
speaker = "フィオナ"
original = "「それに」"
translation = "「게다가」"

[[dialogue]]
speaker = "フィオナ"
original = "「<b>魔王</b>」"
translation = "「<b>마왕</b>」"

[[dialogue]]
speaker = "クロト"
original = "「──」"
translation = "「──」"

[[dialogue]]
speaker = "unk"
original = "一瞬。"
translation = "순간."

[[dialogue]]
speaker = "unk"
original = "星見会長の眼が、底知れぬ光を帯びた気がした。"
translation = "호시미 회장의 눈이, 헤아릴 수 없는 빛을 띠는 듯했다."

[[dialogue]]
speaker = "フィオナ"
original = "「……緋宮会長。あなたは……“魔王”なのですか？」"
translation = "「……히노미야 회장. 당신은…… “마왕”이신가요?」"

[[dialogue]]
speaker = "クロト"
original = "「それは……」"
translation = "「그건……」"

[[dialogue]]
speaker = "unk"
original = "冗談めかした問い。"
translation = "농담 섞인 질문."

[[dialogue]]
speaker = "unk"
original = "だがそこには、どこか言い知れない深意らしきものが潜んでいて……"
translation = "하지만 그곳에는, 어딘가 말로 표현할 수 없는 깊은 의미 같은 것이 숨어 있어서……"

[[dialogue]]
speaker = "クロト"
original = "「魔王だ──と、ヴィーナスは言っている」"
translation = "「마왕이다──라고, 비너스는 말하고 있다.」"

[[dialogue]]
speaker = "クロト"
original = "「が……正直よくわからない」"
translation = "「하지만…… 솔직히 잘 모르겠다.」"

[[dialogue]]
speaker = "ルリエル"
original = "「わからないんかーーーーーいっっ」"
translation = "「모르시는 거냐아아아아아아!」"

[[dialogue]]
speaker = "ソフィア"
original = "「ルリ。よその会長さんに対する態度じゃない」"
translation = "「루리. 다른 학교 회장님에 대한 태도가 아니야.」"

[[dialogue]]
speaker = "ルリエル"
original = "「はっ！\u3000これは大変失礼いたしました！」"
translation = "「핫! 이, 이건 대단히 실례했습니다!」"

[[dialogue]]
speaker = "クロト"
original = "「はは……別に構わないよ。生徒としては俺のほうが新参だし、ラフな方が助かるな」"
translation = "「하하…… 별로 상관없어. 학생으로서는 내가 신참이고, 편한 게 더 도움이 되지.」"

[[dialogue]]
speaker = "ルリエル"
original = "「新参……？\u3000わたし達は一年生でありますが……」"
translation = "「신참……? 저희들은 1학년입니다만……」"

[[dialogue]]
speaker = "マトイ"
original = "「緋宮くん──会長は転入生だから。それも先週来たばかりの」"
translation = "「히노미야군──회장님은 전학생이니까. 그것도 지난주에 막 온.」"

[[dialogue]]
speaker = "ユウリ"
original = "「先週……！？」"
translation = "「지난주에……!?」"

[[dialogue]]
speaker = "セーラ"
original = "「スピード出世すぎん？」"
translation = "「초고속 승진 아니야?」"

[[dialogue]]
speaker = "unk"
original = "さすがに驚愕された。"
translation = "과연 경악했다."

[[dialogue]]
speaker = "unk"
original = "御前試合の件といい、本当は成り行きだったのだが、とんでもない破天荒野郎に見えているかもしれない。"
translation = "어전 시합 건도 그렇고, 사실은 되는 대로였지만, 터무니없는 파천황으로 보이고 있을지도 모른다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふふん。その破天荒さこそクロトが魔王である証よ、規格外でしょ？」"
translation = "「후훗. 그 파천황스러움이야말로 쿠로토가 마왕이라는 증거야, 규격 외잖아?」"

[[dialogue]]
speaker = "マトイ"
original = "「（あのねヴィーナス、魔王なんて子どもでも知ってる大昔の悪者なんだから……）」"
translation = "「(저기 비너스, 마왕은 어린애도 아는 아주 옛날의 악당이니까……)」"

[[dialogue]]
speaker = "アナ"
original = "「（そんな人物が新星の会長と思われるのは、いささか対外的に不都合かと）」"
translation = "「(그런 인물이 신성 학원의 회장으로 여겨지는 것은, 다소 대외적으로 부적절하다고 봅니다만.)」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスの放言を抑えようとする２人だったが、時既に遅しというものだった。"
translation = "비너스의 망언을 억누르려는 두 사람이었지만, 이미 때는 늦은 것이었다."

[[dialogue]]
speaker = "ルリエル"
original = "「ううむ、魔王さん……！\u3000こう見えて実はとんでもないワルなんでしょうか……！？」"
translation = "「으으음, 마왕님……! 이렇게 보여도 사실은 터무니없는 악당인 것일까요……!?」"

[[dialogue]]
speaker = "クロト"
original = "「別に普通だ。というより、正義の味方でありたいと思ってる」"
translation = "「별로 평범하다. 오히려, 정의의 사도이고 싶다고 생각하고 있다.」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスが俺を魔王と呼ぶ真意は未だによくわかっていない。"
translation = "비너스가 나를 마왕이라고 부르는 진의는 아직도 잘 모르겠다."

[[dialogue]]
speaker = "unk"
original = "ただ、彼女は彼女でこのように自信満々だから……俺としては“わからない”というほかないのだ。"
translation = "다만, 그녀는 그녀대로 이렇게 자신만만하니까…… 나로서는 “모르겠다”고 할 수밖에 없는 것이다."

[[dialogue]]
speaker = "フィオナ"
original = "「ふふ。よくわかりました。変なことを聞いてごめんなさい」"
translation = "「후후. 잘 알겠습니다. 이상한 것을 물어봐서 죄송합니다.」"

[[dialogue]]
speaker = "フィオナ"
original = "「でも、否定はしないなんて──面白い方ですね。緋宮会長は」"
translation = "「하지만, 부정하지 않는다니──재미있는 분이시네요. 히노미야 회장님은.」"

[[dialogue]]
speaker = "unk"
original = "星見会長のこちらを見る眼差しが、最後まで気になっていた……。"
translation = "호시미 회장이 이쪽을 보는 눈빛이, 마지막까지 신경 쓰였다……."

