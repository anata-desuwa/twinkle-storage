[[dialogue]]
speaker = "unk"
original = "第３話,妄想天使とホワイトデー,P"
translation = "제3화, 망상 천사와 화이트 데이, P"

[[dialogue]]
speaker = "unk"
original = "その日、俺は日課の訓練へ向かう前に、イクシーと話がしたくて声をかけていた。"
translation = "그날, 나는 일과인 훈련을 하러 가기 전에, 익시와 이야기하고 싶어서 말을 걸었다."

[[dialogue]]
speaker = "イクシリオン"
original = "「会長、お疲れ様です……<emoji=heart04>\u3000それであの……話とは一体何でしょう？」"
translation = "「회장님, 수고하셨어요……<emoji=heart04> 그래서 저기…… 드릴 말씀이란 대체 뭔가요?」"

[[dialogue]]
speaker = "unk"
original = "校舎裏でちょっと話そう"
translation = "교사 뒤에서 잠깐 얘기하자"

[[dialogue]]
speaker = "イクシリオン"
original = "「はい、わかりました――って、ええぇっ！？\u3000こ、校舎裏ですか……？」"
translation = "「네, 알겠습니다――앗, 에에엣!? 교, 교사 뒤라고요……?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「そ、そんな人目に付かない場所に呼び出すなんて……！\u3000昼間でも薄暗く、声を出さなければバレない、絶好のシチュエーション……っ<emoji=heart04>」"
translation = "「그, 그런 남의 눈에 띄지 않는 장소로 불러내시다니……! 낮이라도 어둑어둑하고, 소리만 내지 않으면 들키지 않는, 절호의 시추에이션……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「ああっ<emoji=heart04>\u3000会長、いけませんっ<emoji=heart04>\u3000そんないやらしいところ……！」"
translation = "「아앗<emoji=heart04> 회장님, 안 돼요<emoji=heart04> 그런 야한 곳에서……!」"

[[dialogue]]
speaker = "イクシリオン"
original = "「――ハッ！？\u3000ちちち、違うんです会長！\u3000今のは決して、実際にいやらしいことをしている場面を妄想したわけでは……！」"
translation = "「――핫!? 아아아, 아니에요 회장님! 방금 건 결코, 실제로 야한 짓을 하고 있는 장면을 망상한 게 아니라……!」"

[[dialogue]]
speaker = "イクシリオン"
original = "「って、あうぅ……<emoji=heart04>\u3000私、また会長の前でテンパって、はしたないことを口にしてしまいました……」"
translation = "「앗, 아우우……<emoji=heart04> 저, 또 회장님 앞에서 당황해서, 천박한 소리를 입에 담고 말았어요……」"

[[dialogue]]
speaker = "unk"
original = "恥ずかしそうに顔を赤く染めるイクシーに、俺は微笑みながら言う。"
translation = "부끄러운 듯 얼굴을 붉게 물들이는 익시에게, 나는 미소 지으며 말한다."

[[dialogue]]
speaker = "イクシリオン"
original = "「――え？\u3000バレンタインのお返し……？\u3000あっ、今日って……ホワイトデー……！」"
translation = "「――에? 발렌타인 답례……? 앗, 오늘이…… 화이트데이……!」"

[[dialogue]]
speaker = "unk"
original = "それから校舎裏へ移動し、俺はイクシーにお菓子を手渡した。"
translation = "그러고 나서 교사 뒤편으로 이동해, 나는 이쿠시에게 과자를 건네주었다."

[[dialogue]]
speaker = "イクシリオン"
original = "「あ、ありがとうございます……<emoji=heart04>\u3000今日がホワイトデーだということ、すっかり忘れていました……」"
translation = "「아, 감사합니다……<emoji=heart04> 오늘이 화이트데이라는 것, 완전히 잊고 있었어요……」"

[[dialogue]]
speaker = "unk"
original = "最近は一生懸命、訓練してたからな"
translation = "「최근에는 열심히 훈련했으니까 말이야」"

[[dialogue]]
speaker = "イクシリオン"
original = "「はい。新しいバレンタインフォームをちゃんと使いこなせるようになりたくて……新星学園の星騎士として、誇れる自分になりたいと」"
translation = "「네. 새로운 발렌타인 폼을 제대로 다룰 수 있게 되고 싶어서…… 신성 학원의 성기사로서, 자랑스러운 자신이 되고 싶다고」"

[[dialogue]]
speaker = "イクシリオン"
original = "「あとはその……できれば会長に褒めてもらえるような、強い星騎士になれたらと……<emoji=heart04>」"
translation = "「나머지는 그…… 가능하다면 회장님이 칭찬해 주실 수 있는, 강한 성기사가 된다면 하고……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "最近のイクシーを見て、俺、思い出したんだ"
translation = "「최근의 이쿠시를 보고, 나, 떠올렸어」"

[[dialogue]]
speaker = "イクシリオン"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker = "unk"
original = "俺はイクシーと初めて会った時、真面目で誰かを助けようとする優しさがあり、清楚で綺麗な子だという印象を持った。"
translation = "나는 이쿠시와 처음 만났을 때, 성실하고 누군가를 도우려는 다정함이 있으며, 청초하고 아름다운 아이라는 인상을 가졌다."

[[dialogue]]
speaker = "イクシリオン"
original = "「――それから何度も会って話すうちに、実は内心でよくエッチな妄想をしちゃうお茶目な一面もあるとわかって、親近感が湧いた……？」"
translation = "「――그러고 나서 몇 번이나 만나 이야기하는 사이에, 사실 내심 에로틱한 망상을 자주 해버리는 장난스러운 일면도 있다는 걸 알게 되어, 친근감이 솟았다……?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「あぅ……お、お恥ずかしい限りです……」"
translation = "「아으…… 부, 부끄러울 따름이에요……」"

[[dialogue]]
speaker = "unk"
original = "反省するようにシュンとした顔をするイクシーに、俺は言った。"
translation = "반성하듯 시무룩한 표정을 짓는 이쿠시에게, 나는 말했다."

[[dialogue]]
speaker = "unk"
original = "でも俺は、そんなイクシーを好きになったんだ"
translation = "「하지만 나는, 그런 이쿠시를 좋아하게 됐어」"

[[dialogue]]
speaker = "unk"
original = "ついエッチな妄想をしてしまい、それを恥ずかしがる真面目なイクシー。それが可愛くて、俺はいつしか目を離せなくなっていた。"
translation = "그만 에로틱한 망상을 해버리고, 그것을 부끄러워하는 성실한 이쿠시. 그것이 귀여워서, 나는 어느샌가 눈을 뗄 수 없게 되어 있었다."

[[dialogue]]
speaker = "unk"
original = "俺はやっぱり、イクシーのことが好きだ"
translation = "「나는 역시, 이쿠시가 좋아」"

[[dialogue]]
speaker = "イクシリオン"
original = "「――真面目なところも、エッチなところも、恥ずかしがるところも、全部ひっくるめて……？」"
translation = "「――성실한 면도, 야한 면도, 부끄러워하는 면도, 전부 포함해서……?」"

[[dialogue]]
speaker = "unk"
original = "これからは俺も、イクシーからもっと好きになってもらえるよう頑張ると伝える。"
translation = "앞으로는 나도, 이쿠시가 더 좋아해 줄 수 있도록 노력하겠다고 전한다."

[[dialogue]]
speaker = "イクシリオン"
original = "「――私に、何度も惚れ直してもらえるように……？」"
translation = "「――제가, 몇 번이고 다시 반하게 만들 수 있도록……?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「か、会長……<emoji=heart04>」"
translation = "「회, 회장님……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「今の会長、とてもカッコよくて……私、また惚れ直して好きになってしまいます……<emoji=heart04>」"
translation = "「지금의 회장님, 너무 멋있어서…… 저, 또 다시 반해서 좋아하게 되어버려요……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「え？\u3000――もう１つ告白しなきゃいけないことがある……ですか？\u3000それは一体……？」"
translation = "「에? ――또 하나 고백해야 할 것이…… 있다고요? 그건 대체……?」"

[[dialogue]]
speaker = "unk"
original = "惚れ直してもらえるように頑張ると言っておきながら、ちょっとカッコ悪い話なんだけど……と、俺は前置きしてから告げた。"
translation = "다시 반할 수 있게 노력하겠다고 말해놓고선, 조금 꼴사나운 이야기지만…… 하고 나는 서두를 뗀 뒤 고백했다."

[[dialogue]]
speaker = "イクシリオン"
original = "「――最近、私と触れ合えてないことが寂しい、ですか……？」"
translation = "「――최근, 저와 스킨십을 하지 못해서 외롭다, 고요……?」"

[[dialogue]]
speaker = "unk"
original = "恋人であるイクシーとバレンタインの前辺りからずっとスキンシップできていないのは、少し……ではなく、俺も男なので、正直かなりモヤモヤしていた。"
translation = "연인인 이쿠시와 밸런타인 전부터 계속 스킨십을 하지 못한 것은, 조금……이 아니라, 나도 남자이기에 솔직히 꽤나 좀이 쑤시고 있었다."

[[dialogue]]
speaker = "unk"
original = "だから俺はイクシーの目を見て、今度はちゃんと気持ちを伝える。"
translation = "그래서 나는 이쿠시의 눈을 보며, 이번에는 제대로 마음을 전한다."

[[dialogue]]
speaker = "unk"
original = "俺は前みたいに、イクシーと触れ合いたい"
translation = "나는 예전처럼, 이쿠시와 살을 맞대고 싶어."

[[dialogue]]
speaker = "イクシリオン"
original = "「……！\u3000そ、その……」"
translation = "「……! 그, 그게……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「はい……<emoji=heart04>\u3000すごくドキドキしちゃいますけど……私も、好きな会長には触れて欲しいです……<emoji=heart04>」"
translation = "「네……<emoji=heart04> 굉장히 두근거리지만…… 저도, 좋아하는 회장님께서 만져주셨으면 해요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "恥ずかしそうに顔を赤く染めながら、こくりと頷くイクシーの手を、俺はそっと取って指を絡めた。"
translation = "부끄러운 듯 얼굴을 붉게 물들이며 꾸벅 고개를 끄덕이는 이쿠시의 손을, 나는 살며시 잡고 손가락을 얽었다."

[[dialogue]]
speaker = "イクシリオン"
original = "「あっ……<emoji=heart04>\u3000久しぶりの、恋人繋ぎ……<emoji=heart04>」"
translation = "「앗……<emoji=heart04> 오랜만의, 연인 잡기……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はゆっくりと腰に手を回し、抱き寄せる。そして――"
translation = "나는 천천히 허리에 손을 감아 끌어당겼다. 그리고――"

[[dialogue]]
speaker = "イクシリオン"
original = "「会長……<emoji=heart04>\u3000んっ……<emoji=heart04>」"
translation = "「회장님……<emoji=heart04> 응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "久しぶりに唇を重ね、キスをする。"
translation = "오랜만에 입술을 겹치며 키스를 한다."

[[dialogue]]
speaker = "イクシリオン"
original = "「んむっ……ちゅっ……<emoji=heart04>」"
translation = "「음뭇…… 츄……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "数秒が長く感じられるほど濃密な甘い時間。唇を離すと、彼女は熱い吐息を漏らす。"
translation = "수 초가 길게 느껴질 정도로 농밀하고 달콤한 시간. 입술을 떼자, 그녀는 뜨거운 한숨을 내뱉는다."

[[dialogue]]
speaker = "イクシリオン"
original = "「んっ……はあぁっ<emoji=heart04>\u3000久しぶりのキス、すごいです……<emoji=heart04>\u3000甘く痺れるみたいな感覚が全身を駆け抜けて……<emoji=heart04>」"
translation = "「응…… 하아아<emoji=heart04> 오랜만의 키스, 굉장해요……<emoji=heart04> 달콤하게 저릿한 감각이 전신을 타고 흘러서……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「すごく恥ずかしいのに、でも――もっとしたいです……<emoji=heart04>」"
translation = "「무척 부끄러운데, 하지만―― 더 하고 싶어요……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「んっ……ちゅっ……<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「응…… 츄……<emoji=heart04> 츄……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それから俺たちは、今日まで触れ合えなかった埋め合わせをするように、校舎裏で唇を重ね続けるのだった。"
translation = "그 후 우리들은, 오늘까지 닿지 못했던 보상을 하듯 교사 뒤편에서 계속해서 입술을 겹쳤다."

