[[dialogue]]
speaker = "unk"
original = "第１話,スーパーパタンナーあらわる,P"
translation = "제1화, 슈퍼 파턴너 나타나다"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ん～～～～っ……今日も疲れたわ～～」"
translation = "「으음~~~~~~…… 오늘도 지쳤다~~」"

[[dialogue]]
speaker = "unk"
original = "背伸びをしたヴィーナスが、大きく胸を反らしたその時だった。"
translation = "기지개를 켠 비너스가 가슴을 크게 젖힌 그때였다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「きゃっ！？」"
translation = "「꺄악!?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「え──痛ぁっ！？\u3000何かおでこに当たった！？」"
translation = "「에── 아파라!? 뭔가 이마에 맞았어!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ごめんね、マトイ。ボタンが弾け飛んじゃったみたい」"
translation = "「미안해, 마토이. 단추가 튕겨 나가버린 것 같아」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「なんとなーく胸周りがキツいとは思ってたのよね。また胸がおっきくなったのかしら」"
translation = "「왠지 가슴 주변이 꽉 낀다고 생각했거든. 또 가슴이 커진 걸까」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ヴィーナスのお胸、恐るべし……！」"
translation = "「비너스의 가슴, 대단해……!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「でも、制服のサイズが合わなくなったら買い換えるのも大変だよね」"
translation = "「하지만 교복 사이즈가 안 맞게 되면 새로 사는 것도 큰일이잖아」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「その点は大丈夫よ、九浄家には優秀なメイドがいるもの。服飾のスペシャリストがね」"
translation = "「그 점은 괜찮아, 쿠죠 가문에는 우수한 메이드가 있으니까. 복식 전문가 말이야」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「胸周りだけなら買い換えるほどじゃないし、今晩にでも美鶴に制服のサイズを調整してもらった方が良さそうね」"
translation = "「가슴 주변만이라면 새로 살 정도는 아니고, 오늘 밤에라도 미츠루에게 교복 사이즈를 조정해달라고 하는 게 좋겠어」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「お呼びですか、お嬢様」"
translation = "「부르셨습니까, 아가씨.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「美鶴！？\u3000いつからそこにいたの！？」"
translation = "「미츠루!? 언제부터 거기 있었어!?」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「いえ、閃じゃないんですから。たまたま、通りがかったところでうちの名前を呼ばれたので何事かと……おや、ここに落ちてるボタンは？」"
translation = "「아뇨, 센도 아닌데요. 마침 지나가던 참에 제 이름을 부르시길래 무슨 일인가 해서…… 어라, 여기 떨어진 단추는?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それ、私のよ。ほら、ここの」"
translation = "「그거 내 거야. 봐, 여기 거」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「なるほど。お嬢様の制服のボタンがはじけ飛んだんですか」"
translation = "「그렇군요. 아가씨의 교복 단추가 튕겨 나간 건가요.」"

[[dialogue]]
speaker = "unk"
original = "はじめまして、美鶴"
translation = "처음 뵙겠습니다, 미츠루"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「星徒会の皆さんとは初対面ですね、はじめまして。新星学園１年、<ruby>長篠<rt>ながしの</rt></ruby><ruby>美鶴<rt>みつる</rt></ruby>です」"
translation = "「성도회 여러분과는 초면이네요, 처음 뵙겠습니다. 신성학원 1학년, 나가시노 미츠루입니다.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「えっ、１年生なんだ！\u3000落ち着いてて大人っぽいから年上かと思っちゃった。九浄家のメイドさんなんだよね？」"
translation = "「엣, 1학년이었어! 차분하고 어른스러워서 연상인 줄 알았어. 쿠죠 가문의 메이드지?」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「元々はメイドとして雇われたんじゃないんですけどね。九浄家でパタンナーをしてます」"
translation = "「원래는 메이드로 고용된 게 아니지만요. 쿠죠 가문에서 파턴너를 하고 있습니다.」"

[[dialogue]]
speaker = "unk"
original = "パタンナーって？"
translation = "파턴너란?"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「あまりメジャーな職種じゃないんで、知らなくても無理ないですね。デザイナーが制作したデザインを基に型紙を作る仕事です」"
translation = "「그리 메이저한 직종은 아니라서 모르시는 것도 무리는 아니네요. 디자이너가 제작한 디자인을 바탕으로 형지(패턴)를 만드는 일입니다.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「当主様が考えた無茶振りなデザインを、うちが型紙に起こし、縫製まで手掛けてます」"
translation = "「당주님이 생각하신 무리한 디자인을 제가 형지로 옮기고, 봉제까지 다루고 있어요.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「縫製って……服を作ってるの？」"
translation = "「봉제라면…… 옷을 만들고 있는 거야?」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「ええ。パタンナーとはいってますが、服飾全般です」"
translation = "「네. 파턴너라고는 하지만 복식 전반입니다.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「メイド隊のみんながバレンタインとかクリスマスに着てた特別な衣装、あるじゃない？」"
translation = "「메이드대 모두가 밸런타인이나 크리스마스에 입었던 특별한 의상 있잖아?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「せつなちゃんとかヨミちゃんが着てた服かな？\u3000すっごく可愛かったね」"
translation = "「세츠나짱이나 요미짱이 입었던 옷 말인가? 정말 귀여웠지」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「でしょう！？\u3000あれは全部、美鶴のお手製なのよ！」"
translation = "「그렇지!? 저건 전부 미츠루가 직접 만든 거야!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「全部、ひとりで！？\u3000スゴいね！」"
translation = "「전부 혼자서!? 대단하네!」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「ええ、まあ。とはいえデザイン元は当主様ですし、もらってるお賃金通りの仕事をしてるだけですけど」"
translation = "「네, 뭐. 그렇다 해도 디자인 원형은 당주님이시고, 저는 받는 임금만큼 일을 할 뿐이지만요.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「見た目だけでなく、着心地も抜群なの！\u3000美鶴はスゴいのよ、ふふーん♪」"
translation = "「겉모습뿐만 아니라 착용감도 최고라구! 미츠루는 정말 대단해, 후흥~♪」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「褒めてくれるのは嬉しいですが、ヴィーナスお嬢様、服の前がはだけたままなのは、だらしないです。替えのボタンがありますんで、つけ替えますね」"
translation = "「칭찬해 주시는 건 기쁩니다만, 비너스 아가씨, 옷 앞섶이 벌어진 채로 있는 건 단정치 못해요. 여분의 단추가 있으니 갈아 끼워 드릴게요.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「助かるわ。帰ったら、制服の調整もお願いできる？」"
translation = "「도움이 되네. 집에 가면 교복 조정도 부탁할 수 있을까?」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「それがうちの仕事なんで、任せてください。あ、壊れたこっちのボタンは、うちが預かります」"
translation = "「그게 제 일이니까 맡겨주세요. 아, 망가진 이쪽 단추는 제가 맡아둘게요.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「壊れたボタンなんてどうするの？」"
translation = "「망가진 단추 같은 걸 어떡하게?」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「閃にあげたら、尻尾振って喜びそうなんで」"
translation = "「센에게 주면 꼬리를 흔들며 기뻐할 것 같아서요.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「んー？\u3000ただのボタンじゃない。センちゃん、ボタンのコレクションなんてしてたかしら」"
translation = "「응~? 그냥 단추잖아. 센짱, 단추 수집 같은 걸 했었나?」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「いえ、ヴィーナスお嬢様の胸を支えていたボタンというところに付加価値が」"
translation = "「아뇨, 비너스 아가씨의 가슴을 지탱하고 있던 단추라는 점에 부가가치가……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……私の胸？\u3000よくわからないけど、もうダメになってしまったボタンなんだし、好きにしていいわよ」"
translation = "「……내 가슴? 잘 모르겠지만 이미 못 쓰게 된 단추니까 마음대로 해」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「では、遠慮なく。……お嬢様、完成しました」"
translation = "「그럼 사양 않고. ……아가씨, 다 됐습니다.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「わっ、やっぱり美鶴ちゃん、手際いいね！\u3000話してる内につけ終わっちゃった」"
translation = "「와, 역시 미츠루짱 솜씨 좋네! 말하는 사이에 다 달았어」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「このくらいなら朝飯前ですよ。他にも何かあれば承りますが、うちへの依頼には作業料が発生します。タダ働きはしませんので、あしからず」"
translation = "「이 정도면 식은 죽 먹기죠. 그 외에 다른 게 있다면 받겠습니다만, 저한테 하는 의뢰에는 작업료가 발생합니다. 공짜 일은 안 하니까 양해해 주세요.」"

[[dialogue]]
speaker = "unk"
original = "しっかりしてるね"
translation = "확실하네"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「だって、プロだもの。彼女の仕事にはそれだけの価値があるわ！\u3000美鶴、これからも期待してるわね！」"
translation = "「그야 프로인걸. 그녀의 일에는 그만큼의 가치가 있어! 미츠루, 앞으로도 기대할게!」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「どうも。では、失礼」"
translation = "「감사합니다. 그럼 실례.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「……美鶴ちゃん、ちょっととっつきにくそうな空気出してたね」"
translation = "「……미츠루짱, 조금 다가가기 어려운 분위기를 풍기네」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そうなのよ。必要以上に人と接したがらないの。ウチのメイド隊でもちょっと浮いちゃってるわ」"
translation = "「그래. 필요 이상으로 사람과 접하려 하지 않거든. 우리 메이드대 내에서도 좀 겉도는 편이야」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「いい子だと思うんだけど、誤解されっぱなしなのは可哀想だわ……そうね、クロトにお願いしようかしら」"
translation = "「착한 아이인 것 같은데 계속 오해받는 건 불쌍해…… 그래, 쿠로토에게 부탁해볼까」"

[[dialogue]]
speaker = "unk"
original = "俺に！？"
translation = "나한테!?"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「名付けて『美鶴の心を開け大作戦』！」"
translation = "「이름하여 『미츠루의 마음을 열어라 대작전』!」"

[[dialogue]]
speaker = "unk"
original = "作戦名からだいたいの内容は想像はできるし、俺も美鶴のことが気になってはいるけれど。"
translation = "작전명에서 대략적인 내용은 상상이 가고, 나도 미츠루가 신경 쓰이긴 하지만."

[[dialogue]]
speaker = "unk"
original = "ヘレナさんもヴィーナスも無茶振りが過ぎるのは、親子の縁が成せる業なんだろうかと思わずにはいられなかった。"
translation = "헬레나 씨나 비너스나 무리한 요구가 지나친 건 부녀 관계가 낳은 업보가 아닐까 하는 생각이 절로 들었다."

