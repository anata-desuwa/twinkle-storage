[[dialogue]]
speaker = "ルリエル"
original = "「それでは皆さん──本日も生徒会活動を始めちゃいますよ～！」"
translation = "「그러면 여러분── 오늘도 학생회 활동을 시작해 버릴 거예요～!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「相変わらず騒がしいわね。もう少し落ち着いて話せないのかしら」"
translation = "「여전히 시끄럽네. 좀 더 침착하게 말할 수 없을까」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふふ、張り切りすぎてドジをしないようにね？\u3000先輩方に迷惑をかけないよう気を付けて」"
translation = "「후후, 너무 의욕이 넘쳐서 실수하지 않도록 해? 선배님들께 폐를 끼치지 않도록 조심하고」"

[[dialogue]]
speaker = "聖沙"
original = "「迷惑だなんてそんな。フィオナたち転入生組にやる気を出してもらえると、私たちも身が引き締まる思いだわ。ね、マグダレナ先生？」"
translation = "「폐라니 그런. 피오나 같은 전학생들이 의욕을 내주니, 우리도 마음을 다잡게 돼. 안 그래, 막달레나 선생님?」"

[[dialogue]]
speaker = "マグダレナ"
original = "「そうですね。生徒会メンバーが一丸となるのは、顧問として喜ばしいことです」"
translation = "「그렇습니다. 학생회 멤버가 하나가 되는 것은, 고문으로서 기쁜 일입니다」"

[[dialogue]]
speaker = "マグダレナ"
original = "「それでは今日も会議を始めましょうか。まずは先日に引き続き流星ドキドキフェスティバルの催し物について──」"
translation = "「그러면 오늘도 회의를 시작할까요. 우선 지난번에 이어서 유성 두근두근 페스티벌의 행사 내용에 대해서──」"

[[dialogue]]
speaker = "リア"
original = "「クロト君、どうかした？\u3000何か難しい顔をしてるけど……」"
translation = "「쿠로토 군, 무슨 일 있어? 뭔가 어려운 표정을 짓고 있는데……」"

[[dialogue]]
speaker = "unk"
original = "何か……違和感が"
translation = "뭔가…… 위화감이"

[[dialogue]]
speaker = "リア"
original = "「違和感？\u3000どういうこと？」"
translation = "「위화감? 무슨 뜻이야?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「しゃっきりしなさい。これから大切な会議なんだから」"
translation = "「정신 차려. 이제부터 중요한 회의잖아」"

[[dialogue]]
speaker = "フィオナ"
original = "「そうですよ。ドキフェスを企画した張本人がそれでは先輩方に顔向けができません」"
translation = "「그렇습니다. 두근 페스티벌을 기획한 장본인이 그러면 선배님들께 면목이 없습니다」"

[[dialogue]]
speaker = "ルリエル"
original = "「ですです！\u3000この催し物はわたしたちが真の意味で流星生徒会の一員になるための、謂わば、登下校なんですから！」"
translation = "「맞아요 맞아요! 이 행사는 저희가 진정한 의미로 유성 학생회의 일원이 되기 위한, 말하자면, 등하교니까요!」"

[[dialogue]]
speaker = "聖沙"
original = "「それを言うなら登竜門よ。まぁでも緋宮クンにはしっかりしてもらわないと困るわ。私を差し置いて会長になったんだもの」"
translation = "「그걸 말하자면 등용문이지. 뭐 하지만 히노미야 군은 제대로 해줘야 곤란해. 나를 제쳐두고 회장이 됐으니까」"

[[dialogue]]
speaker = "unk"
original = "俺、どうして会長になったんだっけ？"
translation = "나, 왜 회장이 된 거지?"

[[dialogue]]
speaker = "ヴィーナス"
original = "「……本当にどうしたのよ？\u3000聖沙を御前試合で破って……あれ？\u3000御前試合？\u3000クロトと御前試合したのは私──え？\u3000あれれ？」"
translation = "「……정말로 왜 그래? 미사를 어전 시합에서 꺾고…… 어라? 어전 시합? 쿠로토와 어전 시합을 한 건 나── 엣? 어라라?」"

[[dialogue]]
speaker = "フィオナ"
original = "「このドキドキフェスティバルは、緋宮会長がみんなにドキドキ胸弾む学園生活を送ってもらいたいと言って企画したではありませんか。忘れないでください」"
translation = "「이 두근두근 페스티벌은, 히노미야 회장님이 모두에게 두근두근 가슴 뛰는 학원 생활을 보내게 해주고 싶다고 말해서 기획한 거잖아요. 잊지 말아 주세요」"

[[dialogue]]
speaker = "ルリエル"
original = "「議事録にもちゃーんと書いてありますよ～？\u3000ほら、ここ！\u3000わたし、ばっちり記録させてもらいましたから！」"
translation = "「의사록에도 제대로 쓰여 있어요～? 자, 여기! 제가, 확실히 기록해 뒀으니까요!」"

[[dialogue]]
speaker = "聖沙"
original = "「そうね──って、ルリエルさん。書記なら、議事録はもう少し丁寧に書いてもらえると嬉しいんだけど……」"
translation = "「그렇네── 라고, 루리엘 씨. 서기라면, 의사록은 좀 더 정중하게 써주면 좋겠는데……」"

[[dialogue]]
speaker = "ルリエル"
original = "「ややっ！？\u3000これでも綺麗に書いたつもりなのですがっ！？」"
translation = "「야얏!? 이것도 깨끗하게 쓴 거라고 생각하는데요!?」"

[[dialogue]]
speaker = "聖沙"
original = "「ルリエルさんって、こんなにも特徴的な筆跡をされていたかしら……？\u3000字だけは誰よりも綺麗だったような……」"
translation = "「루리엘 씨는, 이렇게나 특징적인 필체를 사용했었나……? 글씨만큼은 누구보다 깨끗했던 것 같은데……」"

[[dialogue]]
speaker = "フィオナ"
original = "「ルリエルが書記、ですか？\u3000おかしいですね、会計担当だったような……」"
translation = "「루리엘이 서기, 인가요? 이상하네요, 회계 담당이었던 것 같은데……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そう、よね……。私もそんなイメージが……」"
translation = "「그렇지, 맞지……. 나도 그런 이미지가……」"

[[dialogue]]
speaker = "ルリエル"
original = "「はえ？\u3000わたしはずーっと書記ですよ？\u3000会計のやり方なんて、ちっとも知りません」"
translation = "「하에? 저는 줄곧 서기예요? 회계 처리 방법 같은 건, 전혀 몰라요」"

[[dialogue]]
speaker = "聖沙"
original = "「ガイドブックには載ってないの？\u3000会計のやり方くらいなら書いてありそうなものだけど」"
translation = "「가이드북에는 안 실려 있어? 회계 처리 방법 정도는 쓰여 있을 것 같은데」"

[[dialogue]]
speaker = "ルリエル"
original = "「ガイドブックですか？\u3000そんなの持ち歩いていませんけど」"
translation = "「가이드북이요? 그런 거 들고 다니지 않는데요」"

[[dialogue]]
speaker = "聖沙"
original = "「あらそう……？\u3000うちの書記は事あるごとにおかしなガイドブックを見ていた気が……」"
translation = "「어머 그래……? 우리 서기는 일만 생기면 이상한 가이드북을 보고 있었던 것 같은데……」"

[[dialogue]]
speaker = "unk"
original = "やっぱり何か"
translation = "역시 뭔가"

[[dialogue]]
speaker = "リア"
original = "「……クロト君。ちょっと一緒に来てくれるかな？」"
translation = "「……쿠로토 군. 잠깐 같이 와 줄래?」"

[[dialogue]]
speaker = "リア"
original = "「こんなところまでついてきてもらっちゃって、ごめんね？\u3000でも、どうしても２人きりで話したくて」"
translation = "「이런 곳까지 따라오게 해서, 미안해? 하지만, 꼭 둘이서만 이야기하고 싶어서」"

[[dialogue]]
speaker = "リア"
original = "「クロト君も感じてるんだね？\u3000この日常が何かおかしいっていうことを」"
translation = "「쿠로토 군도 느끼고 있지? 이 일상이 뭔가 이상하다는 것을」"

[[dialogue]]
speaker = "リア"
original = "「実は私も……落ち着かないんだ」"
translation = "「사실 나도…… 불안해」"

[[dialogue]]
speaker = "リア"
original = "「こんなことを言うとものすごく失礼なんだけど……クロト君たちが生徒会にいることがとても不自然な気がして……」"
translation = "「이런 말을 하면 엄청 실례겠지만…… 쿠로토 군들이 학생회에 있는 게 굉장히 부자연스러운 기분이 들어서……」"

[[dialogue]]
speaker = "リア"
original = "「私がクロト君を会長に任命したはずなのに、クロト君が会長って呼ばれる度に、その……おかしな感じがして」"
translation = "「내가 쿠로토 군을 회장으로 임명했을 텐데, 쿠로토 군이 회장이라고 불릴 때마다, 그…… 이상한 느낌이 들어서」"

[[dialogue]]
speaker = "リア"
original = "「って、あはは……。ごめんね？\u3000私、疲れちゃってるのかも。生徒会の仲間にこんなこと思っちゃうなんて」"
translation = "「라니, 아하하……. 미안해? 나, 지친 건지도 몰라. 학생회 동료에게 이런 생각을 하다니」"

[[dialogue]]
speaker = "リア"
original = "「さ～て生徒会室に戻ろっか♪\u3000ドキフェスの計画を進めなくちゃ♪\u3000元会長と現会長が揃ってサボってたらマズいもん♪」"
translation = "「자～ 학생회실로 돌아갈까♪ 두근 페스티벌 계획을 진행해야지♪ 전 회장이랑 현 회장이 같이 농땡이 치면 안 되잖아♪」"

[[dialogue]]
speaker = "リア"
original = "「みんなにドキドキ胸弾む学園生活を送ってもらうためにも頑張らなくちゃ──……って、ひゃっ！？」"
translation = "「모두에게 두근두근 가슴 뛰는 학원 생활을 보내게 해 주기 위해서도 힘내야지──……라고, 햣!?」"

[[dialogue]]
speaker = "unk"
original = "危ないっ"
translation = "위험해"

[[dialogue]]
speaker = "リア"
original = "「あ、ありがとう。躓いちゃって……」"
translation = "「아, 고마워. 발을 헛디뎌서……」"

[[dialogue]]
speaker = "リア"
original = "「……それより、どうしたの？\u3000じっと私のロザリオなんか見つめて……」"
translation = "「……그보다, 왜 그래? 가만히 내 로자리오 같은 걸 쳐다보고……」"

[[dialogue]]
speaker = "unk"
original = "このロザリオ……"
translation = "이 로자리오……"

[[dialogue]]
speaker = "リア"
original = "「うん？\u3000クロト君も持ってるよね？\u3000それは流星学園生徒会役員の証。代々受け継がれてきた、守護天使の力が宿ったロザリオ」"
translation = "「응? 쿠로토 군도 가지고 있지? 그건 유성 학원 학생회 임원의 증표. 대대로 계승되어 온, 수호 천사의 힘이 깃든 로자리오」"

[[dialogue]]
speaker = "リア"
original = "「このロザリオに選ばれたからこそ、私たちは生徒会役員に、流星クルセイダースになったんじゃない」"
translation = "「이 로자리오에 선택받았기 때문에, 우리는 학생회 임원이, 유성 크루세이더스가 된 거잖아」"

[[dialogue]]
speaker = "unk"
original = "俺は持ってません"
translation = "나는 가지고 있지 않아"

[[dialogue]]
speaker = "リア"
original = "「え？\u3000確かに渡したはず──うっ……！」"
translation = "「엣? 분명 건네줬을 텐데── 윽……!」"

[[dialogue]]
speaker = "リア"
original = "「あ、あれ……？\u3000違う……。違うよ……。私は、渡してない……」"
translation = "「아, 어라……? 아니야……. 아니야……. 나는, 건네주지 않았어……」"

[[dialogue]]
speaker = "リア"
original = "「私は、私の仲間に……！\u3000聖沙ちゃんにナナカちゃん、それにロロットちゃんと、そして、シン君に──」"
translation = "「나는, 내 동료에게……! 미사짱에게 나나카짱, 그리고 로롯토짱과, 그리고, 신 군에게──」"

[[dialogue]]
speaker = "unk"
original = "ロザリオが……！"
translation = "로자리오가……!"

[[dialogue]]
speaker = "リア"
original = "「そうだよ……！\u3000違う、間違ってるよ、クロト君！」"
translation = "「맞아……! 아니야, 잘못됐어, 쿠로토 군!」"

[[dialogue]]
speaker = "リア"
original = "「私たちにはそれぞれ大切な場所がある……！\u3000守るべき生徒会が、学園が、世界がある……！」"
translation = "「우리에게는 각자 소중한 장소가 있어……! 지켜야 할 학생회가, 학원이, 세계가 있어……!」"

[[dialogue]]
speaker = "リア"
original = "「お願い、力を貸して私の守護天使……！\u3000私たちの心を惑わす深淵を払って……！」"
translation = "「부탁해, 힘을 빌려줘 나의 수호 천사……! 우리 마음을 현혹하는 심연을 물리쳐 줘……!」"

[[dialogue]]
speaker = "リア"
original = "「主に付き従い、現世に降臨せよ玲瓏たる閃光の天使、ルミエル！」"
translation = "「주를 따르며, 현세에 강림하라 영롱한 섬광의 천사, 루미엘!」"

[[dialogue]]
speaker = "リア"
original = "「思い出した……！\u3000思い出したよ、クロト君！\u3000これは“リ・クリエ”の影響なんだよ！」"
translation = "「생각났어……! 생각났어, 쿠로토 군! 이건 “리크리에”의 영향이야!」"

[[dialogue]]
speaker = "unk"
original = "俺も……！"
translation = "나도……!"

[[dialogue]]
speaker = "聖沙"
original = "「何かあったんですか、リア先輩っ！？\u3000まさか魔族がっ！？\u3000って──……あら？」"
translation = "「무슨 일 있었어요, 리아 선배!? 설마 마족이!? 라고──…… 어라?」"

[[dialogue]]
speaker = "リア"
original = "「聖沙ちゃん！\u3000それにみんなっ……！」"
translation = "「미사짱! 그리고 모두……!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「この神々しい光……──あれ？\u3000なんで私、自分が流星学園の一員だと思い込んで……」"
translation = "「이 신성한 빛……──어라? 왜 나, 내가 유성 학원의 일원이라고 착각하고……」"

[[dialogue]]
speaker = "フィオナ"
original = "「思い出し、ました。私たちは認識を改変されてしまって……」"
translation = "「생각이, 났습니다. 저희는 인식이 개변되어 버려서……」"

[[dialogue]]
speaker = "マグダレナ"
original = "「……ルミエルに助けられたようですね。私としたことが、またしてもリクリエの力に呑まれてしまうなんて……」"
translation = "「……루미엘에게 도움을 받은 것 같네요. 제가, 또다시 리크리에의 힘에 삼켜지다니……」"

[[dialogue]]
speaker = "リア"
original = "「良かった。みんな、記憶が戻ったんだねっ？」"
translation = "「다행이다. 모두, 기억이 돌아왔구나?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「お陰様でね。約一名、まだ取り戻してないのがいるみたいだけど」"
translation = "「덕분에 말이지. 약 한 명, 아직 되찾지 못한 사람이 있는 것 같지만」"

[[dialogue]]
speaker = "ルリエル"
original = "「ほえ？\u3000どーしたんですか皆さん、怖い顔をして……」"
translation = "「호에? 왜 그러세요 여러분, 무서운 얼굴을 하고……」"

[[dialogue]]
speaker = "フィオナ"
original = "「目を覚ましなさい、ルリエル。ここは私たちがいるべき世界じゃない。元の世界に戻らないと」"
translation = "「정신 차리세요, 루리엘. 이곳은 우리가 있어야 할 세계가 아닙니다. 원래 세계로 돌아가야 합니다」"

[[dialogue]]
speaker = "ルリエル"
original = "「何を言ってるんですか……？\u3000全く意味がわかりません」"
translation = "「무슨 말씀을 하시는 거예요……? 전혀 의미를 모르겠어요」"

[[dialogue]]
speaker = "マグダレナ"
original = "「やはりルリエルさまはリクリエの影響を大きく受けてしまったようですね」"
translation = "「역시 루리엘 님은 리크리에의 영향을 크게 받아버린 것 같네요」"

[[dialogue]]
speaker = "マグダレナ"
original = "「この世界に余程彼女に似た依り代がいたか……あるいは、彼女自身もまた元の世界に帰ることを望んでいないのか」"
translation = "「이 세계에 꽤 그녀와 닮은 의지할 곳이 있었거나…… 혹은, 그녀 자신도 원래 세계로 돌아가는 것을 바라지 않는 것인지」"

[[dialogue]]
speaker = "聖沙"
original = "「ルリエルさんに似た依り代……。それってたぶん……」"
translation = "「루리엘 씨와 닮은 의지할 곳……. 그건 아마도……」"

[[dialogue]]
speaker = "リア"
original = "「ロロットちゃんのことだよね……。ルリエル・ローゼンクロイツって名乗ったりしていたし……」"
translation = "「로롯토짱 말이지……. 루리엘 로젠크로이츠라고 자칭하기도 했었고……」"

[[dialogue]]
speaker = "フィオナ"
original = "「いいから行きますよ……！\u3000これ以上この世界に留まっていては危険です……！」"
translation = "「됐으니 갑시다……! 더 이상 이 세계에 머물러 있으면 위험합니다……!」"

[[dialogue]]
speaker = "ルリエル"
original = "「は、離してください！\u3000わたしはどこにも行きません……！」"
translation = "「노, 놓으세요! 저는 어디에도 가지 않을 거예요……!」"

[[dialogue]]
speaker = "フィオナ"
original = "「ひゃっ！？」"
translation = "「햣!?」"

[[dialogue]]
speaker = "ルリエル"
original = "「わたしはよーやく手に入れたんです……！\u3000平和に暮らせる世界を……！\u3000恐ろしいモンスターに怯えなくていい世界を……！」"
translation = "「저는 겨우 손에 넣었어요……! 평화롭게 살 수 있는 세계를……! 무서운 몬스터에게 떨지 않아도 되는 세계를……!」"

[[dialogue]]
speaker = "ルリエル"
original = "「だからわたしは──って、ほえ、わたし何を言って？」"
translation = "「그러니까 저는── 라고, 호에, 제가 무슨 말을?」"

[[dialogue]]
speaker = "フィオナ"
original = "「ルリエル……」"
translation = "「루리엘……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「どうやら元の世界に帰りたくないって気持ちも本当だったみたいね」"
translation = "「아무래도 원래 세계로 돌아가고 싶지 않다는 마음도 사실이었던 것 같네」"

[[dialogue]]
speaker = "マグダレナ"
original = "「しかし放置はできません。放っておけばまた同じような認識の改変が行われてしまうでしょう」"
translation = "「하지만 방치할 수는 없습니다. 내버려 두면 또다시 같은 인식 개변이 일어날 것입니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ならフィオナには悪いけど──ショック療法でいかせてもらうわよ！」"
translation = "「그럼 피오나에게는 미안하지만── 쇼크 요법으로 가도록 하겠어!」"

[[dialogue]]
speaker = "ルリエル"
original = "「な、なんですか、あなたたち……！？\u3000──ハッ、まさか魔族の精神攻撃を受けてるんですね！？\u3000正気を取り戻してください！」"
translation = "「무, 뭐예요, 당신들……!? ──핫, 설마 마족의 정신 공격을 받고 있는 거죠!? 제정신을 되찾으세요!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「我に返るのは、あなたの方よ！\u3000天使のくせにリ・クリエに化かされちゃって情けないわ……！」"
translation = "「정신 차릴 건, 당신 쪽이야! 천사 주제에 리크리에에게 속아 넘어갔다니 한심하네……!」"

[[dialogue]]
speaker = "ルリエル"
original = "「バカ！？\u3000わたしのことバカって言いましたね！？\u3000バカって言った方がバカなんですから、バーカ、バーカ！」"
translation = "「바보!? 저한테 바보라고 했죠!? 바보라고 말한 사람이 바보니까, 바ー보, 바ー보!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「バカじゃなくて化かされた、よ！？」"
translation = "「바보가 아니라 속아 넘어간, 거야!?」"

[[dialogue]]
speaker = "聖沙"
original = "「私も手伝うわ。ルリエルさんの目を覚まさせてあげましょう」"
translation = "「나도 돕겠어. 루리엘 씨의 눈을 뜨게 해 주자」"

[[dialogue]]
speaker = "リア"
original = "「手荒な真似はしたくないけど……。リ・クリエが関わってるなら、悠長なことは言っていられないよね」"
translation = "「거친 짓은 하고 싶지 않지만……. 리크리에가 관련되어 있다면, 느긋하게 있을 수 없지」"

[[dialogue]]
speaker = "ルリエル"
original = "「ややっ！？\u3000聖沙さんとリア先輩まで！？」"
translation = "「야얏!? 미사 씨랑 리아 선배까지!?」"

[[dialogue]]
speaker = "フィオナ"
original = "「ごめんなさい、ルリエル……。あなたがそんなに追い詰められていたなんて知らなかった……。星徒会長失格です……」"
translation = "「죄송합니다, 루리엘……. 당신이 그렇게까지 몰려 있었다니 몰랐습니다……. 성도회장 실격입니다……」"

[[dialogue]]
speaker = "フィオナ"
original = "「でも、それでも──私たちはこの世界に留まるべきじゃない。私たちには私たちの使命があるから」"
translation = "「하지만, 그럼에도── 우리는 이 세계에 머물러서는 안 됩니다. 우리에게는 우리의 사명이 있으니까요」"

[[dialogue]]
speaker = "フィオナ"
original = "「誰よりも天使としての使命を果たそうと努力していたあなたなら、それをよくわかっているはずです……！」"
translation = "「누구보다 천사로서의 사명을 다하려고 노력했던 당신이라면, 그것을 잘 알고 있을 것입니다……!」"

[[dialogue]]
speaker = "ルリエル"
original = "「わ、訳のわからないこと言わないでください……！\u3000誰に何を言われようが、わたしはこの世界から出て行きませんよ……！」"
translation = "「마, 말도 안 되는 소리 하지 마세요……! 누가 뭐라고 하든, 저는 이 세계에서 나가지 않을 거예요……!」"

[[dialogue]]
speaker = "ルリエル"
original = "「来るならかかってこいです！\u3000みーんなまとめて、この大天使ルリエル・ローゼンクロイツ様がぶっ倒してあげますから！」"
translation = "「올 테면 덤벼요! 모ー두 다 함께, 이 대천사 루리엘 로젠크로이츠 님이 때려눕혀 줄 테니까!」"

