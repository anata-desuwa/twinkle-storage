[[dialogue]]
speaker = "unk"
original = "翌日の昼休み、俺たちは再び星徒会室に集まることになった――"
translation = "다음 날 점심시간, 우리들은 다시 성도회실에 모이게 되었다――"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「というわけで、アナとアニマ先輩が一晩でやってくれたわ！」"
translation = "「그런 고로, 아나와 아니마 선배가 하룻밤 만에 해줬어!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「マジか！\u3000アタシの戦闘服のデータを渡して１日も経ってないのに！\u3000アナっちとアニっち先輩、マジで天才っしょ♪」"
translation = "「실화냐! 내 전투복 데이터를 넘긴 지 하루도 안 지났는데! 아나칭이랑 아니칭 선배, 진짜 천재라구♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それじゃあ早速、人工的に生み出した、試作戦闘服第１号のお披露目よ！\u3000入ってきていいわよ、ヨミヨミ！」"
translation = "「그럼 바로 인공적으로 만들어낸 시작 전투복 제1호의 공개야! 들어와도 좋아, 요미요미!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「は、はい……」"
translation = "「네, 네……」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ええっと……天ヶ崎ヨミ、クリスマスフォーム、です……」"
translation = "「에 그러니까…… 아마가사키 요미, 크리스마스 폼, 입니다……」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「って、お嬢様！\u3000なんで私までクリスマス衣装を着ることに！？」"
translation = "「근데 아가씨! 왜 저까지 크리스마스 의상을 입게 된 거죠!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それは――」"
translation = "「그건――」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「かわいいからよ！\u3000それに、サンタの補佐として、ピッタリの衣装じゃない？」"
translation = "「귀여우니까! 게다가 산타의 보좌로서 딱 맞는 의상 아니니?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「いや、爆裂恥ずかしいんですけど！？」"
translation = "「아니, 폭렬 부끄러운데요!?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「わたくしは、かわいくて似合っていると思うわよ？\u3000モフモフで」"
translation = "「저는 귀엽고 잘 어울린다고 생각해요? 복슬복슬해서」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「それ衣装関係なくないですか！？」"
translation = "「그건 의상이랑 상관없지 않나요!?」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「そんなことないぜ、ヨミヨミ！\u3000マジでかわいいから！\u3000ねぇ、ＳＮＳに上げていい！？\u3000こんなのバズりまくりっしょ♪」"
translation = "「그렇지 않다구, 요미요미! 진짜 귀여우니까! 저기, SNS에 올려도 돼!? 이건 무조건 화제가 된다구♪」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ダメです！\u3000ＤＩＳＣで写真撮るのは禁止ですからっ！」"
translation = "「안 돼요! DISC로 사진 찍는 건 금지라니까요!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「え～、マジでかわいいのに～！\u3000ダーリンもそう思うっしょ？」"
translation = "「에~ 진짜 귀여운데~ 달링도 그렇게 생각하지?」"

[[dialogue]]
speaker = "unk"
original = "本当にすごく似合ってるよ"
translation = "정말로 잘 어울려"

[[dialogue]]
speaker = "unk"
original = "かわいいと思う"
translation = "귀엽다고 생각해"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こやっ！？\u3000か、会長、そんな……かわいいだなんて。えへへ……♪」"
translation = "「코야!? 회, 회장님, 그런…… 귀엽다니. 에헤헤……♪」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ヨミヨミ、会長に言われると照れた反応をするのね」"
translation = "「요미요미, 회장님이 말하니까 수줍어하는 반응을 보이네」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「はっ……！？\u3000い、いやいや、そんなんじゃないですよ！？」"
translation = "「핫……!? 아, 아니아니, 그런 거 아니거든요!?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「と、というか！\u3000私よりセシアちゃんがクリスマス衣装着た方がよかったのでは……？\u3000絶対にかわいいと思うんですけど……」"
translation = "「그, 그보다! 저보다 세시아 짱이 크리스마스 의상을 입는 게 낫지 않았을까요……? 분명 귀여울 거라 생각하는데……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「残念ながら、セシアは力を取り戻してる最中で、戦闘データがまだまだ足りてないのよ」"
translation = "「안타깝지만 세시아는 힘을 되찾는 중이라 전투 데이터가 아직 한참 부족해」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それにヨミは、私が認める優秀な星騎士だもの。新しい力も必ず使いこなせるはずだって思ったのよ！」"
translation = "「게다가 요미는 내가 인정하는 우수한 성기사인걸. 새로운 힘도 반드시 다룰 수 있을 거라 생각했어!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「お嬢様……！」"
translation = "「아가씨……!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「――私、恥ずかしいですけど、クリスマスフォーム頑張ります……！」"
translation = "「――저, 부끄럽지만 크리스마스 폼 열심히 해볼게요……!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それでこそヨミよ！\u3000期待しているわ♪」"
translation = "「그래야 요미지! 기대하고 있을게♪」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「クリスマスフォームか……。ならアタシも、『<ruby>戦衣弐式<rt>せんいにしき</rt></ruby>』から呼び方を今時に改めて、そう名乗るとするぜ！」"
translation = "「크리스마스 폼인가…… 그럼 나도 『전의2식』에서 호칭을 요즘 식으로 고쳐서 그렇게 자처하겠다구!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「よっしゃあ！\u3000それじゃいよいよ、今日からプレゼント配りを開始していくっしょ～☆」"
translation = "「좋았어! 그럼 드디어 오늘부터 선물 배달을 개시하자구~☆」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「楽しみだわ♪\u3000お～♪」"
translation = "「기대돼♪ 오~♪」"

[[dialogue]]
speaker = "unk"
original = "そうして放課後になり、いざクリスマスフォームで生徒たちの前に立つヨミだったが――"
translation = "그렇게 방과 후가 되어 크리스마스 폼으로 학생들 앞에 서게 된 요미였지만――"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ごめんなさい！\u3000やっぱり恥ずかしいですぅぅ～～っ！！」"
translation = "「죄송해요! 역시 부끄러워요오오~~!!」"

[[dialogue]]
speaker_original = "女生徒Ａ"
speaker_translation = "여학생 A"
original = "「ヨミちゃん、クリスマス衣装、めっちゃかわいい～～～っ<emoji=heart04>\u3000顔隠さないでこっち向いて～～～っ<emoji=heart04>」"
translation = "「요미 짱, 크리스마스 의상 진짜 귀여워~~~<emoji=heart04> 얼굴 가리지 말고 여기 좀 봐줘~~~<emoji=heart04>」"

[[dialogue]]
speaker_original = "女生徒Ｂ"
speaker_translation = "여학생 B"
original = "「や～ん！\u3000ヨミちゃん、照れて顔真っ赤にして、可愛いすぎでしょっ<emoji=heart04>\u3000一緒に写真撮ろ？\u3000ほら、チーズ♪」"
translation = "「어머! 요미 짱, 수줍어서 얼굴 새빨개진 거 너무 귀엽잖아<emoji=heart04> 같이 사진 찍자, 자 치즈♪」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こやぁ！？\u3000写真はダメです！\u3000拡散されたら、爆裂恥ずかしすぎますからっ！」"
translation = "「코야아!? 사진은 안 돼요! 퍼지면 폭렬 너무 부끄럽단 말이에요!」"

[[dialogue]]
speaker = "unk"
original = "照れるヨミヨミ、かわいい！"
translation = "수줍어하는 요미요미, 귀여워!"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ちょっ、会長まで！？\u3000そんなかわいいかわいいって、沢山言われたら恥ずかしさで私――」"
translation = "「잠깐, 회장님까지!? 그렇게 귀엽다 귀엽다 자꾸 말씀하시면 부끄러워서 저――」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「爆裂しちゃいますぅぅぅ！\u3000こやあぁぁぁ～～～ん！！！」"
translation = "「폭발해버려요오오! 코야아아아앙!!!」"

[[dialogue]]
speaker = "unk"
original = "ヨミのかわいい叫びが、冬の空に木霊するのであった。"
translation = "요미의 귀여운 비명이 겨울 하늘에 메아리치는 것이었다."

