[[dialogue]]
speaker = "unk"
original = "第３話,どっちが好き？（後編）,P"
translation = "제3화, 어느 쪽이 좋아? (후편), P"

[[dialogue]]
speaker = "unk"
original = "俺は、分裂した大きな方のアルモによって、校舎隅の人気のない空き教室へ連れてこられていた――"
translation = "나는 분열된 큰 쪽의 알모에 의해 교사 구석의 인기 없는 빈 교실로 끌려와 있었다――"

[[dialogue]]
speaker = "アルモタヘル"
original = "「よし、小さい我を撒いたようだな。これでしばらくは２人きりだ」"
translation = "「좋아, 작은 나를 따돌린 모양이군. 이걸로 당분간은 둘뿐이다.」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「――ここで何をするのかだと？\u3000決まっているであろう。あれだけ小さい我に煽られたのだ。然れば――」"
translation = "「――여기서 무엇을 하느냐고? 정해져 있지 않으냐. 그만큼 작은 나에게 도발당했다. 그렇다면――」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「我の方がファーストキスの相手なのだと、お前に思い出してもらわなけば、気が済まぬというもの……」"
translation = "「내가 첫 키스의 상대라는 것을 네가 떠올리게 하지 않으면 직성이 풀리지 않는 법……」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「んっ……<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 츄……<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「はぁ……<emoji=heart04>\u3000我にも、小さい体でキスした記憶はあるが、それでも何だか久しぶりの感じがするな」"
translation = "「하아……<emoji=heart04> 나에게도 작은 몸으로 키스한 기억은 있지만 그래도 왠지 오랜만인 기분이 드는구나.」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「胸がドキドキして、体が燃えるように熱くなってしまう……ふふっ<emoji=heart04>\u3000守護天使なのに、今ではすっかり１人の女だ」"
translation = "「가슴이 두근거리고 몸이 타오르듯 뜨거워져 버려…… 후후<emoji=heart04> 수호천사인데 이제는 완전히 한 명의 여자다.」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「人の子よ……お前はどうであろうか？\u3000こっちの我でも、ドキドキしてくれているか……？」"
translation = "「사람의 아이여…… 너는 어떠냐? 이쪽의 나에게도 두근거려 주고 있느냐……?」"

[[dialogue]]
speaker = "unk"
original = "ちょっと不安そうな顔をするアルモ。そんな彼女が愛おしくて――"
translation = "조금 불안한 표정을 짓는 알모. 그런 그녀가 사랑스러워서――"

[[dialogue]]
speaker = "アルモタヘル"
original = "「あっ……<emoji=heart04>\u3000んっ……ちゅっ<emoji=heart04>\u3000はあぁ……<emoji=heart04>\u3000そんなに優しく頭を撫でられたら、小さい体の我みたいに甘えたくなってしまうではないか……<emoji=heart04>」"
translation = "「앗……<emoji=heart04> 응…… 츄<emoji=heart04> 하아아……<emoji=heart04> 그렇게 다정하게 머리를 쓰다듬어 주면 작은 몸의 나처럼 어리광 부리고 싶어지지 않느냐……<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「――恋人だから、甘えてもいいと？\u3000じゃあ……もっといっぱい、キスのおかわりを所望するぞ……<emoji=heart04>」"
translation = "「――연인이니까 어리광 부려도 된다고? 그럼…… 더 많이 키스를 더 원하노라……<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「んっ……ちゅっ……<emoji=heart04>\u3000好きだ、人の子よ……<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「응…… 츄……<emoji=heart04> 좋아한다, 사람의 아이여……<emoji=heart04> 츄……<emoji=heart04>」"

[[dialogue]]
speaker = "アルモたん"
original = "「そこまでなのだーーーっ！！！」"
translation = "「거기까지인 것이다ーーー!!!」"

[[dialogue]]
speaker = "unk"
original = "うわっ！？\u3000アルモ、ごめん！"
translation = "우왓!? 알모, 미안!"

[[dialogue]]
speaker = "アルモタヘル"
original = "「むぅ……存外早かったな……」"
translation = "「무으…… 생각보다 빨랐군……」"

[[dialogue]]
speaker = "アルモたん"
original = "「自分の考えることだから、逃げる場所くらい想像つくに決まってるのだ！」"
translation = "「자신이 생각하는 거니까 도망칠 장소 정도는 상상 가는 게 당연한 것이다!」"

[[dialogue]]
speaker = "アルモたん"
original = "「強引に２人きりになってキスをするなんて、ずるいのだ！\u3000しかも、なんかものすごくいい雰囲気だったのだ！」"
translation = "「강제로 둘이서만 키스를 하다니 치사한 것이다! 게다가 왠지 엄청나게 좋은 분위기였던 것이다!」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「ふふっ、そうだな。久しぶりだったから、つい燃え上がってしまったようだ<emoji=heart04>」"
translation = "「후후, 그렇구나. 오랜만이라서 그만 달아올라 버린 모양이다<emoji=heart04>」"

[[dialogue]]
speaker = "アルモたん"
original = "「ぐぬぬ……！\u3000どんな感じだったか、ものすごく気になるのだ……！」"
translation = "「구누누……! 어떤 느낌이었는지 엄청나게 신경 쓰이는 것이다……!」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「ふふふ、残念だったな。分裂している間は、記憶は別々だからな。薬の効果が切れて共有されるまでは、おあずけだ」"
translation = "「후후후, 아쉽게 됐구나. 분열되어 있는 동안은 기억이 별개니까 말이다. 약의 효과가 끊겨서 공유될 때까지는 보류다.」"

[[dialogue]]
speaker = "アルモたん"
original = "「む～っ！\u3000こうなったら……アルモたんだってしちゃうのだ！」"
translation = "「무~! 이렇게 되면…… 알모땅도 해버릴 것이다!」"

[[dialogue]]
speaker = "アルモたん"
original = "「ん～っ<emoji=heart04>\u3000ちゅっ<emoji=heart04>」"
translation = "「음~<emoji=heart04> 츄<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「あっ！\u3000こらっ、無理矢理割って入ってくるとは……！」"
translation = "「앗! 이봐, 억지로 끼어들다니……!」"

[[dialogue]]
speaker = "アルモたん"
original = "「お肉を分け合わないなんて、大人はケチなのだ！\u3000同じくらいアルモたんだってキスしないと、不公平なのだ！」"
translation = "「고기를 나눠 먹지 않다니 어른은 구두쇠인 것이다! 똑같이 알모땅도 키스하지 않으면 불공평한 것이다!」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「今更それを言うか！？\u3000騙されぬぞ！\u3000ええい、人の子から、は～な～れ～ろ～！」"
translation = "「이제 와서 그런 말을 하느냐!? 속지 않겠다! 에잇, 사람의 아이에게서 떨-어-져-라-!」"

[[dialogue]]
speaker = "アルモたん"
original = "「い～や～な～の～だ～！」"
translation = "「싫-은-것-이-다-!」"

[[dialogue]]
speaker = "unk"
original = "ふ、２人共、落ち着いて！"
translation = "두, 둘 다 진정해!"

[[dialogue]]
speaker = "アルモタヘル"
original = "「ええい！\u3000こうなったら……人の子よ！」"
translation = "「에잇! 이렇게 되면…… 사람의 아이여!」"

[[dialogue]]
speaker = "アルモたん"
original = "「手段は１つしかないのだ！\u3000会長！」"
translation = "「수단은 하나밖에 없는 것이다! 회장!」"

[[dialogue]]
speaker = "アルモ×２"
original = "「どっちの我が好きなのだ！？」"
translation = "「어느 쪽의 내가 좋은 것이냐!?」"

[[dialogue]]
speaker = "unk"
original = "こういう時だけユニゾン！？"
translation = "이럴 때만 유니존!?"

[[dialogue]]
speaker = "アルモタヘル"
original = "「当然、先に好きだと告白してくれたのは我の方なのだから、色々と大きい方が好きであろう？」"
translation = "「당연히 먼저 좋아한다고 고백해 준 건 나니까 여러모로 큰 쪽이 좋겠지?」"

[[dialogue]]
speaker = "アルモたん"
original = "「それは仕方なくなのだ。今の会長は、可愛さがパワーアップした小さいアルモたんにメロメロなのだ！」"
translation = "「그건 어쩔 수 없이였던 것이다. 지금의 회장은 귀여움이 파워 업한 작은 알모땅에게 헤롱헤롱인 것이다!」"

[[dialogue]]
speaker = "unk"
original = "俺は、どっちのアルモも本気で好きだ！"
translation = "나도 어느 쪽의 알모도 진심으로 좋아해!"

[[dialogue]]
speaker = "unk"
original = "目の前にいるのは、どちらも本物なのだ。だったら、俺は男として、アルモの両面をまとめて愛してみせる――覚悟を決めて、２人にそう告げた。"
translation = "눈앞에 있는 건 둘 다 진짜다. 그렇다면 나는 남자로서 알모의 양면을 모두 사랑해 보이겠어―― 각오를 다지고 두 사람에게 그렇게 고했다."

[[dialogue]]
speaker = "アルモタヘル"
original = "「……！\u3000つ、つい勢いで言ってしまったので、そこまで深く考えていなかったが……」"
translation = "「……! 괘, 괜히 기세로 말해버려서 그렇게까지 깊게 생각하지 않았지만……」"

[[dialogue]]
speaker = "アルモたん"
original = "「そんな真面目な顔で言われたら、どっちか選べなんて、これ以上言えなくなっちゃうのだ……」"
translation = "「그런 진지한 얼굴로 말하면 어느 쪽을 고르라고 더는 말할 수 없게 되어버리는 것이다……」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「……というか、最初はもう１人の我に嫉妬するはずがないと思っていたのだが、気づけば感情を抑えられなくなってしまっていたな」"
translation = "「……라기보다, 처음에는 또 다른 나에게 질투할 리가 없다고 생각했다만, 정신을 차려보니 감정을 억제할 수 없게 되어 버렸군」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「もしかしたら、『もう１人の自分に嫉妬してしまう』というのが、分裂薬の副作用だったのかもしれぬ」"
translation = "「어쩌면, 『또 다른 자신에게 질투해 버린다』는 것이, 분열약의 부작용이었을지도 모르겠구나」"

[[dialogue]]
speaker = "アルモたん"
original = "「そもそも分裂薬を飲んだのは、会長に喜んでもらうことが目的だったのだ。なのに、むしろ困らせてしまったのだ……」"
translation = "「애초에 분열약을 마신 건, 회장님을 기쁘게 해 드리는 게 목적이었던 것이다. 그런데, 오히려 곤란하게 만들어 버린 것이다……」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「そうだな。ならば、その反省とお詫びを兼ねて、ちゃんとせねばなるまい」"
translation = "「그렇군. 그렇다면, 그 반성과 사죄를 겸해서, 제대로 하지 않으면 안 되겠지」"

[[dialogue]]
speaker = "アルモたん"
original = "「嫉妬はしても、気持ちは１つなのだ！」"
translation = "「질투는 해도, 마음은 하나인 것이다!」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「うむ。ということで、人の子よ。待たせたな。ここからはお待ちかねのハーレムだぞ<emoji=heart04>」"
translation = "「음. 그런 고로, 인간의 아이여. 기다리게 했구나. 여기서부터는 고대하던 하렘이다<emoji=heart04>」"

[[dialogue]]
speaker = "アルモたん"
original = "「いっぱい喜ばせちゃうのだ<emoji=heart04>\u3000ん～っ……ちゅっ……<emoji=heart04>」"
translation = "「잔뜩 기쁘게 해 줄 것이란다<emoji=heart04> 응~…… 쪽……<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「ちゅっ……ちゅっ……<emoji=heart04>\u3000――ん？\u3000どうした、人の子よ？」"
translation = "「쪽…… 쪽……<emoji=heart04> ――응? 왜 그러느냐, 인간의 아이여?」"

[[dialogue]]
speaker = "unk"
original = "ふ、２人同時は刺激は強過ぎる……！"
translation = "두, 두 명 동시는 자극이 너무 강해……!"

[[dialogue]]
speaker = "アルモタヘル"
original = "「んっ……<emoji=heart04>\u3000ふふっ、嫉妬心よりも、なんだか人の子の反応の方が面白くなってきてしまったぞ<emoji=heart04>」"
translation = "「응……<emoji=heart04> 후훗, 질투심보다는, 왠지 인간의 아이의 반응 쪽이 더 재미있어져 버렸구나<emoji=heart04>」"

[[dialogue]]
speaker = "アルモたん"
original = "「２人でいっぱい好き好き攻撃して、会長をもっと可愛い顔にしちゃうのだ<emoji=heart04>」"
translation = "「둘이서 잔뜩 좋아 좋아 공격을 해서, 회장님을 좀 더 귀여운 얼굴로 만들어 버릴 것이란다<emoji=heart04>」"

[[dialogue]]
speaker = "アルモたん"
original = "「ちゅっ……<emoji=heart04>」"
translation = "「쪽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その後、俺は２人に挟まれた熱で、甘々に理性を溶かされてしまうのだった――"
translation = "그 후, 나는 두 사람 사이에 끼인 열기에, 달콤하게 이성을 녹여버리고 마는 것이었다――"

