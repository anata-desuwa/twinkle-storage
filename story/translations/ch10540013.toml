[[dialogue]]
speaker = "unk"
original = "第３話,男の子を知りたい,P"
translation = "제3화, 남자아이를 알고 싶어"

[[dialogue]]
speaker = "ユーリス"
original = "「おはよう、調子はどうだい？」"
translation = "「안녕, 컨디션은 어때?」"

[[dialogue]]
speaker = "ユーリス"
original = "「一緒に食べていいかな？」"
translation = "「같이 먹어도 될까?」"

[[dialogue]]
speaker = "ユーリス"
original = "「星徒会の仕事が終わったところかな？\u3000途中まで一緒に帰ろうよ」"
translation = "「성도회 업무가 끝난 참일까? 도중까지 같이 돌아가자」"

[[dialogue]]
speaker = "ユーリス"
original = "「そうそう、最近この国の漫画にはまっているんだけど、面白い作品がたくさんあるね」"
translation = "「맞다, 최근 이 나라의 만화에 빠져 있는데, 재미있는 작품이 아주 많네」"

[[dialogue]]
speaker = "ユーリス"
original = "「漫画はけっこう知っているつもりだったんだけど、この国に来てみると全然だったよ」"
translation = "「만화는 꽤 안다고 생각했는데, 이 나라에 와보니 전혀 아니었어」"

[[dialogue]]
speaker = "unk"
original = "最近、心なしかユーリスからの距離が近い気がする。"
translation = "최근, 기분 탓인지 유리스와의 거리가 가깝다는 느낌이 든다."

[[dialogue]]
speaker = "unk"
original = "それにユーリスが近くにいるとドキドキするような……"
translation = "게다가 유리스가 가까이 있으면 두근거리는 것 같기도……"

[[dialogue]]
speaker = "ユーリス"
original = "「会長？\u3000聞いてる？」"
translation = "「회장? 듣고 있어?」"

[[dialogue]]
speaker = "ユーリス"
original = "「……そんなにじっと見てどうしたんだい？」"
translation = "「……그렇게 빤히 쳐다보고 왜 그래?」"

[[dialogue]]
speaker = "unk"
original = "最近なんだか近くないか？"
translation = "최근 왠지 너무 가깝지 않아?"

[[dialogue]]
speaker = "ユーリス"
original = "「そ、そうかな？\u3000男同士ならこんなものだと思うけど……もし気分を害したなら謝るよ。ごめんね」"
translation = "「그, 그런가? 남자끼리라면 이 정도라고 생각하는데…… 만약 불쾌했다면 사과할게. 미안해」"

[[dialogue]]
speaker = "ユーリス"
original = "「だけど……そうだね、確かに近かったかも。会長を通じて知りたいことがあって」"
translation = "「하지만…… 그렇네, 확실히 가까웠을지도. 회장을 통해서 알고 싶은 게 있어서」"

[[dialogue]]
speaker = "ユーリス"
original = "「私は男の子について知りたいんだ」"
translation = "「나는 남자아이에 대해 알고 싶어」"

[[dialogue]]
speaker = "unk"
original = "…………"
translation = "…………"

[[dialogue]]
speaker = "unk"
original = "……………………"
translation = "……………………"

[[dialogue]]
speaker = "ユーリス"
original = "「ま、待ってくれ！\u3000今のは誤解を生みかねない発言だった……言い直すよ」"
translation = "「기, 기다려 줘! 방금 건 오해를 살 만한 발언이었어…… 다시 말할게」"

[[dialogue]]
speaker = "ユーリス"
original = "「ひけらかすつもりはないけど、私はジルラント王国の王子だ。いわゆる普通の男の子ではない」"
translation = "「뽐낼 생각은 없지만, 나는 질란트 왕국의 왕자다. 이른바 평범한 남자아이는 아니지」"

[[dialogue]]
speaker = "ユーリス"
original = "「知りたいんだ。普通の男子学生が何をして、何を楽しんでいるのか」"
translation = "「알고 싶어. 평범한 남학생이 무엇을 하고, 무엇을 즐기는지」"

[[dialogue]]
speaker = "ユーリス"
original = "「だから私に男の子のことを教えてくれないか？\u3000こんなこと頼めるのは会長だけなんだ」"
translation = "「그러니 나에게 남자아이에 대해 가르쳐 주지 않겠나? 이런 걸 부탁할 수 있는 건 회장뿐이야」"

[[dialogue]]
speaker = "unk"
original = "それなら今からうちに来る？"
translation = "그러면 지금부터 우리 집에 올래?"

[[dialogue]]
speaker = "ユーリス"
original = "「か、会長の家に！？」"
translation = "「회, 회장의 집에!?」"

[[dialogue]]
speaker = "ユーリス"
original = "「コホン。ぜひともお願いするよ。お邪魔するね」"
translation = "「큼큼. 부디 부탁하도록 하지. 실례할게」"

[[dialogue]]
speaker = "unk"
original = "ジュースどうぞ"
translation = "주스 여기 있어"

[[dialogue]]
speaker = "ユーリス"
original = "「ありがとう。ちなみにお手洗いは……あっちだね。わかった」"
translation = "「고마워. 그나저나 화장실은…… 저쪽이네. 알았어」"

[[dialogue]]
speaker = "ユーリス"
original = "「家まで連れてきたということは、何か見せてもらえるのかな？」"
translation = "「집까지 데려왔다는 건, 뭔가 보여줄 게 있는 걸까?」"

[[dialogue]]
speaker = "unk"
original = "ジャーン！\u3000少年漫画誌！"
translation = "짜잔! 소년 만화 잡지!"

[[dialogue]]
speaker = "ユーリス"
original = "「おお、これが……！\u3000私はアプリで見ているから、連載誌で読むのは初めてだよ」"
translation = "「오오, 이것이……! 나는 앱으로 보고 있어서, 연재 잡지로 읽는 건 처음이야」"

[[dialogue]]
speaker = "ユーリス"
original = "「ふむふむ……なるほど、週刊連載だから１冊は安く、その分紙質はあまり良くないんだね。綺麗なのを読みたければ単行本を買えばいいと」"
translation = "「흠흠…… 과연, 주간 연재라서 한 권은 싸고, 그만큼 종이질은 별로 좋지 않구나. 깨끗한 걸 읽고 싶으면 단행본을 사면 된다고」"

[[dialogue]]
speaker = "ユーリス"
original = "「楽しみにしている漫画が毎週読めるのは素晴らしいね。想像するだけでワクワクする──」"
translation = "「기대하고 있는 만화를 매주 읽을 수 있는 건 멋진 일이네. 상상하는 것만으로도 설레──」"

[[dialogue]]
speaker = "ユーリス"
original = "「きゃぁっ！？」"
translation = "「꺄악!?」"

[[dialogue]]
speaker = "ユーリス"
original = "「ん、んん……声が裏返ってしまった。驚かせたかな。あはは……」"
translation = "「으, 음음…… 목소리가 뒤집혀 버렸네. 놀라게 했을까. 아하하……」"

[[dialogue]]
speaker = "ユーリス"
original = "「肌色が多い漫画があったんだけど……こういう漫画は珍しいものなのかな？」"
translation = "「살색이 많은 만화가 있었는데…… 이런 만화는 희귀한 걸까?」"

[[dialogue]]
speaker = "ユーリス"
original = "「……少年誌だとよくある？\u3000しかもアニメ化するくらい人気なんだ……」"
translation = "「……소년지라면 자주 있다고? 게다가 애니메이션화될 정도로 인기구나……」"

[[dialogue]]
speaker = "ユーリス"
original = "「なら私も男子として勉強しないと。ふむふむ……」"
translation = "「그렇다면 나도 남자로서 공부해야겠네. 흠흠……」"

[[dialogue]]
speaker = "ユーリス"
original = "「女の子の服はこんなに簡単に脱げるものじゃないんだけど……いや、漫画なんだからそこを気にしても仕方ないか」"
translation = "「여자아이의 옷은 이렇게 쉽게 벗겨지는 게 아닌데…… 아니, 만화니까 그런 걸 신경 써봐야 별수 없나」"

[[dialogue]]
speaker = "ユーリス"
original = "「おっぱいを鷲掴みにしてる……ひゃっ、そんなところまで顔を突っ込むんだ……」"
translation = "「가슴을 움켜쥐고 있어…… 히익, 그런 곳까지 얼굴을 들이미는구나……」"

[[dialogue]]
speaker = "ユーリス"
original = "「なるほど、男の子はこういうのが好きなのか──ひゃあぁっ！？」"
translation = "「과연, 남자아이는 이런 걸 좋아하는 건가── 히야아앗!?」"

[[dialogue]]
speaker = "ユーリス"
original = "「あ、いやお風呂のシーンだったから……当たり前だけど、男も裸になるんだね……」"
translation = "「아, 아니 목욕 장면이었으니까…… 당연하지만, 남자도 알몸이 되는구나……」"

[[dialogue]]
speaker = "ユーリス"
original = "「そそ、そうじゃなくて！\u3000王子とはいえ私も男だからね、見るなら女の子の裸の方がいいなと思っただけだよ」"
translation = "「그, 그게 아니라! 왕자라고는 해도 나도 남자니까 말이야, 볼 거라면 여자아이의 알몸인 편이 좋겠다고 생각했을 뿐이야」"

[[dialogue]]
speaker = "ユーリス"
original = "「今のは他の人には言わないでくれよ。私にも外聞というものがあるからね」"
translation = "「방금 건 다른 사람에게는 말하지 말아 줘. 나에게도 체면이라는 게 있으니까」"

[[dialogue]]
speaker = "unk"
original = "（ユーリスが少し変だ）"
translation = "(유리스가 조금 이상하다)"

[[dialogue]]
speaker = "ユーリス"
original = "「……他の漫画も取ってくる？\u3000わかった、ここで待ってるよ」"
translation = "「……다른 만화도 가져올 거야? 알았어, 여기서 기다릴게」"

[[dialogue]]
speaker = "ユーリス"
original = "（お手洗いは……あっちだったね。ジュースを飲んだから尿意が……）"
translation = "(화장실은…… 저쪽이었지. 주스를 마셨더니 뇨의가……)"

[[dialogue]]
speaker = "unk"
original = "ちょっとトイレ……"
translation = "잠깐 화장실……"

[[dialogue]]
speaker = "ユーリス"
original = "「きゃあああああぁっ！？」"
translation = "「꺄아아아아아악!?」"

[[dialogue]]
speaker = "unk"
original = "トイレでユーリスと鉢合わせた俺が見たものは──"
translation = "화장실에서 유리스와 마주친 내가 본 것은──"

