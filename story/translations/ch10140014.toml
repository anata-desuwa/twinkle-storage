[[dialogue]]
speaker = "unk"
original = "第４話,酒酔いトワイライト・後編,P"
translation = "제4화, 취중 트와일라잇·후편, P"

[[dialogue]]
speaker = "unk"
original = "俺の胸に抱き付いたまま眠ってしまったトワ先生。それから小一時間ほど経過し、回復体質によって、完全に酔いが醒めたようで──"
translation = "내 가슴에 매달린 채 잠들어 버린 토와 선생님. 그로부터 한 시간 정도 경과하여, 회복 체질에 의해 완전히 취기가 깬 듯해서──"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「んんっ……ここは……？」"
translation = "「으음…… 여기는……?」"

[[dialogue]]
speaker = "unk"
original = "あっ、先生。目が覚めましたか？"
translation = "앗, 선생님. 눈이 떠지셨나요?"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「あれ……どうしてキミが……？\u3000なんでだっけ……？」"
translation = "「어라…… 어째서 네가……? 왜였더라……?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ええと、確か……酔っているわたしを、キミが介抱してくれて、それで──」"
translation = "「에또, 분명…… 취해 있는 나를, 네가 간호해 줘서, 그래서──」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「……って、なんじゃこりゃあぁぁぁっ！？」"
translation = "「……랄까, 이게 뭐야아아아앗!?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「え！？\u3000ちょっと待って、なんで！？\u3000どうして先生、キミに赤ちゃん抱っこされてるの！？」"
translation = "「에!? 잠깐 기다려, 왜!? 어째서 선생님, 너한테 공주님 안기(아기 안기)를 당하고 있는 거야!?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「そ、そう！\u3000キミに泣きついて眠っちゃったのは思い出したけども！\u3000赤ちゃん抱っことかしてなかったよね！？」"
translation = "「그, 그래! 너한테 매달려 울다 잠든 건 기억났지만! 공주님 안기 같은 건 안 했었지!?」"

[[dialogue]]
speaker = "unk"
original = "寝言で赤ちゃん抱っこがいい、って言っていたので──"
translation = "잠꼬대로 공주님 안기가 좋다고 말씀하셔서──"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ま、まさか……なんでそんな……はっ！？」"
translation = "「설, 설마…… 왜 그런…… 핫!?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（心当たりは……ある！）"
translation = "（짚이는 데는…… 있어!）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（結婚式に来てた友達に、彼氏に抱き締められながら飲むお酒が凄く幸せな気分になるとか、惚気を聞かされたのを覚えてる）"
translation = "（결혼식에 왔던 친구에게, 남자친구에게 안겨서 마시는 술이 굉장히 행복한 기분이 된다느니 하는 자랑을 들었던 게 기억나）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（赤ちゃん抱っこの体勢が特に癖になるとか何とか……。わたし、もともと酔うと抱き付き魔になるって自覚はあったし）"
translation = "（공주님 안기 자세가 특히 버릇이 된다느니 어쩌니……. 나, 원래 취하면 매달리는 버릇이 있다는 자각은 있었고）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ま、まさか……それでわたし、無意識に……？」"
translation = "「설, 설마…… 그래서 나, 무의식중에……?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「う……うわぁぁぁ！\u3000恥ずかしいぃぃぃ！\u3000何やっちゃってんの、わたしぃぃぃ！」"
translation = "「우…… 우와아아! 부끄러워어어! 무슨 짓을 한 거야, 나아아아!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「いくら彼氏がいないからって、先生が生徒に赤ちゃん抱っこおねだりとか！\u3000う……うぅぅ……うえぇぇぇん！」"
translation = "「아무리 남자친구가 없다고 해도, 선생님이 학생에게 공주님 안기를 조르다니! 우…… 우으…… 우에에에엥!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「しかも酔ってた時と寝言で２度も……うぅぅぅ！」"
translation = "「게다가 취했을 때랑 잠꼬대로 두 번이나…… 우으으으!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「それだけじゃなくて、ぐすっ……不安になって、キミに変なこと色々言っちゃったし！」"
translation = "「그것뿐만이 아니라, 흑…… 불안해져서, 너한테 이상한 소리 여러 가지 해 버렸고!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「恥ずかし過ぎて、先生もう生きていけないぃ！\u3000うわぁぁぁん！」"
translation = "「너무 부끄러워서, 선생님 이제 못 살아아! 우와아아앙!」"

[[dialogue]]
speaker = "unk"
original = "先生、落ち着いて"
translation = "선생님, 진정하세요"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「そんなの無理だよ！\u3000こんなの泣くに決まってるでしょ！？」"
translation = "「그런 건 무리야! 이런 건 당연히 울 수밖에 없잖아!?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「うぅぅぅ！\u3000わたしは先生なのに、生徒のキミにこんなところ見られて……！」"
translation = "「우으으으! 나는 선생님인데, 학생인 너에게 이런 모습을 보이고……!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「とんでもなく迷惑掛けまくってるし！\u3000ぐすっ……年上としても立場がなくて、もうどうしたらいいかわかんないよぉ！\u3000うわぁぁぁん！」"
translation = "「엄청나게 폐만 끼치고 있고! 흑…… 연상으로서 체면도 없고, 이제 어떻게 해야 좋을지 모르겠어어! 우와아아앙!」"

[[dialogue]]
speaker = "unk"
original = "俺は、先生のことを知れて良かったって思ってますよ"
translation = "저는, 선생님에 대해 알 수 있어서 좋았다고 생각하고 있어요"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「うぇっ！？\u3000そ、それってどういう……！？」"
translation = "「우엣!? 그, 그거 무슨……!?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「先生……キミとは年とか離れてるのに……？\u3000それは何というかその……ありが、とう……？」"
translation = "「선생님…… 너랑은 나이 차이도 나는데……? 그건 뭐랄까 그…… 고마, 워……?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「いや、先生は確かにちっちゃくて可愛いけども！\u3000それはそれとして……ずっと年上なんだから、年下の男の子に女の子扱いされたら……やっぱり照れるの！」"
translation = "「아니, 선생님은 확실히 작고 귀엽지만! 그건 그거고…… 한참 연상이니까, 연하의 남자애한테 여자 취급받으면…… 역시 수줍단 말이야!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「……これからも愚痴とか聞いてくれるの？\u3000それはあんまり先生らしくないっていうか……。で、でも、またこういう状況になって、迷惑掛けちゃうのもあれだし」"
translation = "「……앞으로도 푸념 같은 거 들어줄 거야? 그건 별로 선생님답지 않다고나 할까……. 하, 하지만, 또 이런 상황이 돼서, 폐를 끼치는 것도 좀 그렇고」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「愚痴とは言わないまでも、ときどき話を聞いてもらっちゃおう、かな……？」"
translation = "「푸념이라고까지는 하지 않더라도, 가끔 이야기를 들어달라고 할, 까……?」"

[[dialogue]]
speaker = "unk"
original = "なので、酔い過ぎて夜に一人歩きしたりしないように"
translation = "그러니까, 너무 취해서 밤에 혼자 돌아다니거나 하지 않도록"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「う……それは、確かに……。危なかったよね。ごめんなさい、反省します……」"
translation = "「우…… 그건, 확실히……. 위험했지. 미안해요, 반성할게요……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（というか、今思い出した。キミがあの時、わたしに言ってくれたこと──）"
translation = "（그보다, 이제야 생각났어. 네가 그때, 나에게 해 주었던 말──）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（リクリエは俺が止めます、そうしたら安心してくれますか、って……）"
translation = "（리크리에는 제가 막겠습니다, 그렇게 하면 안심해 주실 건가요, 라고……）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（わたし、凄く嬉しかった。それこそ涙が止まらないくらいに）"
translation = "（나, 굉장히 기뻤어. 그야말로 눈물이 멈추지 않을 정도로）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（あの瞬間にわたしは、キミのことを──）"
translation = "（그 순간에 나는, 너를──）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「あ、あの……もう１つお願い、してもいい？」"
translation = "「저, 저기…… 하나 더 부탁, 해도 될까?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「その……少しでいいんだけど、まだこのままでいて、いいかな？」"
translation = "「그게…… 조금이라도 좋으니까, 아직 이대로 있어도, 될까?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ほ、本当？\u3000ありがとう……えへへ♪」"
translation = "「정, 정말? 고마워…… 에헤헤♪」"

[[dialogue]]
speaker = "unk"
original = "先生、寝言でこの方が安心するって言ってましたから"
translation = "선생님, 잠꼬대로 이쪽이 더 안심된다고 말씀하셨으니까요"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「そ、そんなことまで！？\u3000うぅぅぅ……恥ずかしいよぉ……」"
translation = "「그, 그런 것까지!? 우으으으…… 부끄러워어……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「じゃあ、えっと……こっちからもうちょっとだけくっ付くのも、大丈夫……かな？\u3000その方が安心、するし……？」"
translation = "「그럼, 에또…… 이쪽에서 조금만 더 달라붙는 것도, 괜찮을…… 까? 그게 더 안심, 되기도 하고……?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「い、いいの？\u3000それじゃあ……」"
translation = "「개, 괜찮아? 그렇다면……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「うん……確かに、凄く安心する……」"
translation = "「응…… 확실히, 굉장히 안심돼……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（心臓はドキドキしてて、全然落ち着かないけど）"
translation = "（심장은 두근거려서, 전혀 진정되지 않지만）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（あっ、でも……キミのドキドキも伝わって来る。ふふっ、わたしと一緒なんだ）"
translation = "（앗, 하지만…… 너의 두근거림도 전해져 와. 후훗, 나랑 똑같구나）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「……先生、やっぱり彼氏いなくてよかったかも」"
translation = "「……선생님, 역시 남자친구 없어서 다행이었을지도」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「どうしてって？\u3000……それは内緒♪」"
translation = "「어째서냐고? ……그건 비밀♪」"

[[dialogue]]
speaker = "unk"
original = "トワ先生はそう言って、なんだか嬉しそうに微笑むのだった。"
translation = "토와 선생님은 그렇게 말하며, 왠지 기쁜 듯이 미소 짓는 것이었다."

