[[dialogue]]
speaker = "unk"
original = "翌日、大聖堂カフェテリアにて――"
translation = "다음 날, 대성당 카페테리아에서――"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「マム～♪\u3000セシアにあ～んってして～♪」"
translation = "「마무~♪ 세시아한테 아~ 해줘요~♪」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「やれやれ、仕方ないわね。今回は特別だけど、甘えてばかりじゃダメよ、セシア」"
translation = "「이런이런, 어쩔 수 없네. 이번엔 특별히 해주는 거지만 어리광만 부리면 안 돼, 세시아」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ほら、畏怖をもって口を開けなさい。この私が食べさせてあげるんだから」"
translation = "「자, 경외심을 가지고 입을 벌리렴. 이 내가 먹여주는 거니까」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「は～い♪\u3000あ～ん♪\u3000……もぐもぐ、えへへ～♪\u3000マムに食べさせてもらうクリスマスケーキ、とっても美味しいわ♪」"
translation = "「네~♪ 아~♪ ……우물우물, 에헤헤~♪ 마무가 먹여주는 크리스마스 케이크, 정말 맛있어요♪」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「――ん？\u3000なにかしら、会長？\u3000言いたいことありげな顔をしているけれど？」"
translation = "「――응? 왜 그러지, 회장? 할 말이 있는 듯한 얼굴을 하고 있는데?」"

[[dialogue]]
speaker = "unk"
original = "えっと……"
translation = "그게……"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「――なんで正座させられてるのかって？\u3000あら、なにか文句でも？」"
translation = "「――왜 무릎을 꿇리고 있느냐고? 어라, 뭐 불만이라도 있니?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「それとも、別のお仕置きの方がよかったかしら？」"
translation = "「아니면 다른 벌이 더 좋았을까?」"

[[dialogue]]
speaker = "unk"
original = "やっぱり正座で結構です！"
translation = "역시 무릎 꿇는 걸로 충분합니다!"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「よろしい。畏怖をもって跪きなさい」"
translation = "「좋아. 경외심을 가지고 무릎 꿇고 있으렴」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「いや～、それにしてもセッシー、マムにあっという間に懐いちゃったな～。まあ、どう考えてもアタシが負け確の流れだったけども！」"
translation = "「이야~ 그나저나 세시, 마무한테 순식간에 붙어버렸네~ 뭐, 어떻게 생각해도 내가 질 수밖에 없는 흐름이었지만 말이야!」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「そんなことないわ。セシアは紅明ママのことも好きよ？\u3000ママはどれだけ多くても困らないもの♪」"
translation = "「그렇지 않아요. 세시아는 코우메이 마마도 좋아요! 마마는 많을수록 좋으니까요♪」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んモー、甘えん坊だな、セッシーは～☆\u3000ならアタシも、マムに負けじとセッシーにあ～んしちゃおっかな～♪」"
translation = "「음메~ 어리광쟁이라니까, 세시는~☆ 그럼 나도 마무한테 질 수 없지, 세시한테 아~ 해줄까나~♪」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「わ～い♪\u3000ママ２人からの『ダブルあ～ん』はとっても素敵ね♪」"
translation = "「와아~♪ 마마 두 명의 『더블 아~』는 정말 멋지네요♪」"

[[dialogue]]
speaker = "unk"
original = "新星寮に住むことになったんだって？"
translation = "신성료에 살게 됐다며?"

[[dialogue]]
speaker = "unk"
original = "ところで、セシアは"
translation = "그런데 세시아는"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ええ、そうなの。寮に住めば、沢山マムに会えるでしょう？」"
translation = "「네, 맞아요. 기숙사에 살면 마무를 자주 볼 수 있잖아요?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「やれやれ、困った子ね……まぁ、学園に通うというのなら、面倒は見るけれど」"
translation = "「이런이런, 못 말리는 아이네…… 뭐, 학원에 다니겠다면 돌봐는 주겠지만」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「えへへ～♪\u3000マム、ありがと～♪」"
translation = "「에헤헤~♪ 마무, 고마워요~♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そのことはいいんだけど――」"
translation = "「그건 그렇다 치고――」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ねぇ、昨日みんなで新星寮に忍び込んだって本当！？\u3000ダメじゃない！」"
translation = "「있지, 어제 다 같이 신성료에 잠입했다는 게 정말이야!? 그러면 안 되지!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「申し訳ありません、お嬢様。反対はしてたんですが、結局止めることができなくて……」"
translation = "「죄송합니다, 아가씨. 반대는 했지만 결국 막을 수가 없어서……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そんな面白そうなこと、私も誘ってくれないと！」"
translation = "「그렇게 재밌어 보이는 일에 나도 안 끼워주다니!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「って、そっちですか！？」"
translation = "「어, 그쪽이에요!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「深夜だったら私だって参加できたもの！\u3000あ～、潜入ミッション、私もやりたかったわ……」"
translation = "「심야라면 나도 참가할 수 있었단 말이야! 아~ 잠입 미션, 나도 하고 싶었는데……」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「あははは！\u3000来年はじゃあ、ヴィナちーを加えて５人でクリスマスプレゼントを配ろうぜ☆」"
translation = "「아하하하! 내년에는 그럼 비나치까지 포함해서 다섯 명이서 크리스마스 선물을 나눠주자구☆」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「もう！\u3000来年もやるなら、無断侵入はなしですからね！」"
translation = "「정말! 내년에도 할 거라면 무단 침입은 금지라구요!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「おっ？\u3000ヨミヨミ、否定はしないってことは、ノリ気ってことでいいのかな～？」"
translation = "「오? 요미요미, 부정하지 않는다는 건 하고 싶다는 뜻으로 봐도 되려나~?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「この衣装をまた着るのはちょっと恥ずかしいですけど……」"
translation = "「이 의상을 또 입는 건 좀 부끄럽지만……」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「今回プレゼントを配ってみて、みんなの喜んでくれる顔を見られるのは、素敵だなって思ったので……いいですよ？」"
translation = "「이번에 선물을 나눠줘 보니까 모두가 기뻐하는 얼굴을 보는 게 멋진 일이라고 생각해서…… 좋아요?」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「マジか！\u3000うんっ♪\u3000来年も一緒にやろうぜ、ヨミヨミ♪」"
translation = "「실화냐! 응♪ 내년에도 같이 하자, 요미요미♪」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ヨミヨミ、今のはわたくし的にプラス１ポイントね」"
translation = "「요미요미, 방금 건 내 기준으로 플러스 1점이야」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「なので、紅明先輩、まずは今年のサンタ大作戦をちゃんと終わらせるところからです」"
translation = "「그러니까 코우메이 선배, 우선은 올해의 산타 대작전을 제대로 끝내는 것부터예요」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「え？\u3000どゆこと？」"
translation = "「에? 무슨 소리야?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「はい。これ、私たち４人から、紅明先輩にクリスマスプレゼントです」"
translation = "「네. 이거 저희 네 명으로부터 코우메이 선배에게 주는 크리스마스 선물이에요」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「プレゼント……アタシに？」"
translation = "「선물…… 나한테?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「学園のみんなにプレゼントを配るっていうなら――」"
translation = "「학원 모두에게 선물을 나눠준다면――」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「紅明先輩にもプレゼントを渡さないと。……でしょう？」"
translation = "「코우메이 선배에게도 선물을 줘야죠. ……그렇죠?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「私も貰ったしね♪\u3000ヨミヨミたちから相談を受けて、九浄家パワーを使って特急で用意したわ！」"
translation = "「나도 받았으니까! 요미요미 일행의 상담을 듣고 쿠죠 가문의 파워를 써서 특급으로 준비했어!」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「サンタさん、わたくしにクリスマスの楽しさを教えてくれてありがとう」"
translation = "「산타 할아버지, 저에게 크리스마스의 즐거움을 알려줘서 고마워요」"

[[dialogue]]
speaker = "unk"
original = "紅明、メリークリスマス！"
translation = "코우메이, 메리 크리스마스!"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「あ……！\u3000っ～～～！！」"
translation = "「아……! 윽~!!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んモー、こんなサプライズ、感激不可避っしょ～～っ！！」"
translation = "「음메~ 이런 서프라이즈, 감격하지 않을 수가 없다구~!!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「わぷっ、紅明先輩！？\u3000ハグするのは別にいいんですけど、お、おっぱいで息が苦しい……！」"
translation = "「와픅, 코우메이 선배!? 허그하는 건 좋지만 가, 가슴 때문에 숨 막혀요……!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「セッシーにもハグ～♪」"
translation = "「세시한테도 허그~♪」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ふふっ、紅明ママに喜んでもらえて、セシアも嬉しいわ♪」"
translation = "「후훗, 코우메이 마마가 기뻐해 줘서 세시아도 기뻐요♪」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ヴィナちーにも～♪」"
translation = "「비나치한테도~♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「紅明、私にもクリスマスプレゼントくれて、ありがとう！\u3000あなたは学園のみんなに元気を与えてくれる、すごくて素敵な星騎士だわ♪」"
translation = "「코우메이, 나한테도 크리스마스 선물 줘서 고마워! 넌 학원 모두에게 활기를 주는 굉장하고 멋진 성기사야♪」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ダーリンには～、ほっぺに……チュッ<emoji=heart04>」"
translation = "「달링한테는~ 볼에…… 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "！？"
translation = "!?"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ちょっ、なにやってんですか！？\u3000紅明先輩！？」"
translation = "「잠깐, 뭐 하시는 거예요!? 코우메이 선배!?」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「だって、ダーリンはダーリンだし♪\u3000あ～、ひょっとしてヨミヨミ、ヤキモチ焼いちゃったりとか～？」"
translation = "「그치만 달링은 달링인걸♪ 아~ 설마 요미요미, 질투한다거나~?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こやっ！？\u3000ちちち、違います！\u3000そんなんじゃありませんからっ！」"
translation = "「코야!? 아아아, 아니에요! 그런 거 아니니까요!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「そういうことなら、言ってくれればヨミヨミのほっぺにも喜んでキスしちゃうぜ？\u3000ん～<emoji=heart04>」"
translation = "「그런 거라면 말만 하면 요미요미 볼에도 기꺼이 뽀뽀해 주겠다구? 음~<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「そっち！？\u3000ちょっ、違いますって！\u3000近い近い近い！」"
translation = "「그쪽!? 잠깐, 아니라니까요! 가까워 가까워 가까워!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「あはははっ☆」"
translation = "「아하하핫☆」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「よ～し、今日はアタシがみんなに奢っちゃうぜ！\u3000このままカフェテリアでひと足早いクリスマスパーティーを開催するっしょ～！」"
translation = "「조~아, 오늘은 내가 모두에게 쏘겠어! 이대로 카페테리아에서 한발 빠른 크리스마스 파티를 개최하는 거야~!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ウェ～イ♪」"
translation = "「웨~이♪」"

[[dialogue]]
speaker = "unk"
original = "元気なサンタクロースは、満面の笑顔を浮かべながら、ピースサインを掲げるのだった。"
translation = "활기찬 산타클로스는 만면에 미소를 띄우며 브이 사인을 치켜드는 것이었다."

