[[dialogue]]
speaker = "unk"
original = "メルエルが元の１人へと戻ってから数日後。"
translation = "메루엘이 원래의 하나로 돌아온 지 며칠 후."

[[dialogue]]
speaker = "unk"
original = "ヴィーナスやレミカも元の大きな姿へと、無事に戻れるようになった……のだが。"
translation = "비너스와 레미카도 원래의 커다란 모습으로 무사히 돌아올 수 있게 되었……지만."

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「パパ～♪」"
translation = "「아빠~♪」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「え～い！\u3000娘からの甘えハグよ♪」"
translation = "「에잇! 딸내미의 어리광 허그야♪」"

[[dialogue]]
speaker = "unk"
original = "星徒会室へ元気よく入ってきたのは、小さい姿のヴィーナスであった。"
translation = "성도회실로 활기차게 들어온 것은 작은 모습의 비너스였다."

[[dialogue]]
speaker = "unk"
original = "なんでまた小さくなってるんだ！？"
translation = "왜 또 작아져 있는 거야!?"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「ふっふっふっ♪\u3000今日は『娘』としてパパに甘えたい気分だから、こっちの姿に<b>変身</b>したのよ♪」"
translation = "「훗훗훗♪ 오늘은 『딸』로서 아빠한테 어리광 부리고 싶은 기분이라 이쪽 모습으로 <b>변신</b>한 거야♪」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスたちの小さな姿は、新たな戦闘服『リトルフォーム』として定着し、元に戻ってからは自分の意思で変身できるようになっていた。"
translation = "비너스 일행의 작은 모습은 새로운 전투복 『리틀 폼』으로 정착되어, 원래대로 돌아온 후에는 자신의 의지로 변신할 수 있게 되었다."

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「この姿なら、気兼ねなくパパって呼べるから便利ね♪」"
translation = "「이 모습이라면 거리낌 없이 아빠라고 부를 수 있으니까 편리하네♪」"

[[dialogue]]
speaker = "unk"
original = "いや、そこは多少気にしてもらえると……"
translation = "아니, 그 부분은 조금 신경 써 줬으면 하는데……"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「それならアレだわ！\u3000リトルフォームの時は強制的にパパ呼びになっちゃうってことにするわ♪」"
translation = "「그럼 그거다! 리틀 폼일 때는 강제적으로 아빠라고 부르게 되는 걸로 할게♪」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「ふふっ、これからはこの姿で、パパと今までできなかったこと、沢山してみたいわ♪」"
translation = "「후훗, 앞으로는 이 모습으로 아빠랑 지금까지 못 했던 거 잔뜩 해보고 싶어♪」"

[[dialogue]]
speaker = "unk"
original = "子供のように無邪気な笑顔でそんな風に言われれば、仕方ないなと受け入れてしまう自分がいる。"
translation = "아이처럼 천진난만한 미소로 그런 말을 들으니 어쩔 수 없지 하며 받아들여 버리는 내가 있다."

[[dialogue]]
speaker = "unk"
original = "でも星徒会活動は真面目にするんだぞ"
translation = "하지만 성도회 활동은 성실하게 해야 한다"

[[dialogue]]
speaker = "unk"
original = "わかった。"
translation = "알았어."

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「――いいの？\u3000わ～い♪\u3000私、いい子って褒めてもらえるように頑張るわね！」"
translation = "「――정말? 와~이♪ 나, 착한 아이라는 칭찬 들을 수 있도록 열심히 할게!」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「あっ、えへへへへへぇ<emoji=heart04>\u3000パパに頭撫でてもらうの、好き～<emoji=heart04>」"
translation = "「앗, 에헤헤헤헤헤❤ 아빠가 머리 쓰다듬어 주는 거 좋아~❤」"

[[dialogue]]
speaker = "unk"
original = "俺はついヴィーナスを甘やかして、頭を撫でてしまうのだった。"
translation = "나는 그만 비너스를 응석받이로 만들며 머리를 쓰다듬어 주고 말았다."

[[dialogue]]
speaker = "unk"
original = "一方、レミカもあれ以来、リトルフォームによく変身しているようだった。"
translation = "한편, 레미카도 그 이후로 리틀 폼으로 자주 변신하는 듯했다."

[[dialogue]]
speaker_original = "レミカ（幼少）"
speaker_translation = "레미카(어린 시절)"
original = "「ふぅ……あっ、会長。お疲れ様♪」"
translation = "「후우…… 앗, 회장. 수고했어♪」"

[[dialogue]]
speaker = "unk"
original = "仮想結界で訓練してたのか？"
translation = "가상 결계에서 훈련하고 있었어?"

[[dialogue]]
speaker_original = "レミカ（幼少）"
speaker_translation = "레미카(어린 시절)"
original = "「うん。星騎士としてもそうだけど、アイドルとしても新しいスタイルを手に入れたって言えるわけじゃない？」"
translation = "「응. 성기사로서도 그렇지만, 아이돌로서도 새로운 스타일을 손에 넣었다고 할 수 있잖아?」"

[[dialogue]]
speaker_original = "レミカ（幼少）"
speaker_translation = "레미카(어린 시절)"
original = "「だったら、いつステージに立つことになってもパーフェクトに歌えるように、レッスンしておきたいなって……」"
translation = "「그렇다면 언제 무대에 서게 되더라도 퍼펙트하게 노래할 수 있도록 레슨해 두고 싶어서……」"

[[dialogue]]
speaker_original = "レミカ（幼少）"
speaker_translation = "레미카(어린 시절)"
original = "「実はさ、このリトルフォームを使って、愛戸レミカとは別の『愛戸ミソラ』として、引き続き活動していけないかなって考えてるんだ！」"
translation = "「사실 말이야, 이 리틀 폼을 써서 아이도 레미카와는 별개인 『아이도 미소라』로서 계속 활동해 나갈 수 없을까 생각 중이야!」"

[[dialogue]]
speaker_original = "レミカ（幼少）"
speaker_translation = "레미카(어린 시절)"
original = "「アイドル事務所のしがらみにとらわれない、個人活動をする姿として」"
translation = "「아이돌 사무소의 제약에 얽매이지 않는 개인 활동을 하는 모습으로 말이지.」"

[[dialogue]]
speaker_original = "レミカ（幼少）"
speaker_translation = "레미카(어린 시절)"
original = "「それでね、私的には『Ｖチューバー』として、この姿に近いアバターを作って、ネット上で活動するのはどうかなって思ってるんだよね」"
translation = "「그래서 말인데, 내 생각엔 『버튜버』로서 이 모습에 가까운 아바타를 만들어서 인터넷상에서 활동하는 건 어떨까 싶거든.」"

[[dialogue]]
speaker_original = "レミカ（幼少）"
speaker_translation = "레미카(어린 시절)"
original = "「ほら、最近人気になってきた子で『<ruby>汐<rt>うしお</rt></ruby>ルカルカ』っているでしょ？\u3000あの子みたいに、歌ってみた動画をあげてく感じで」"
translation = "「봐봐, 요즘 인기 많아진 애 중에 『시오 루카루카』라고 있잖아? 그 애처럼 노래 커버 영상을 올리는 느낌으로.」"

[[dialogue]]
speaker = "unk"
original = "る、ルカルカ！？"
translation = "루, 루카루카!?"

[[dialogue]]
speaker_original = "レミカ（幼少）"
speaker_translation = "레미카(어린 시절)"
original = "「ん？\u3000どうしたの、そんな驚いた顔して？」"
translation = "「응? 왜 그래, 그렇게 놀란 얼굴을 하고?」"

[[dialogue]]
speaker_original = "レミカ（幼少）"
speaker_translation = "레미카(어린 시절)"
original = "「あっ、もしかして会長、ルカルカのリスナーだったりする？」"
translation = "「앗, 혹시 회장, 루카루카 리스너라든가 그래?」"

[[dialogue]]
speaker_original = "レミカ（幼少）"
speaker_translation = "레미카(어린 시절)"
original = "「ルカルカはユーモアもあって面白いから、私が可愛いアイドルを目指すための参考になるかなって思ったんだけど……」"
translation = "「루카루카는 유머도 있고 재밌어서 내가 귀여운 아이돌을 목표로 삼는 데 참고가 될까 싶었는데……」"

[[dialogue]]
speaker = "unk"
original = "『汐ルカルカ』の正体は、新星学園の生徒であり、レミカが所属する『聖歌隊』の後輩でもある『海野辺ルルカ』だったりする。"
translation = "『시오 루카루카』의 정체는 신성 학원의 학생이자 레미카가 소속된 『성가대』의 후배이기도 한 『우미노베 루루카』다."

[[dialogue]]
speaker = "unk"
original = "な、なるほど。いいんじゃないかな……"
translation = "그, 그렇구나. 괜찮지 않을까……"

[[dialogue]]
speaker = "unk"
original = "そのことを知っている俺は苦笑いしてしまいつつも、レミカのＶチューバー活動というアイデアはなかなか面白そうだと思った。"
translation = "그 사실을 알고 있는 나는 쓴웃음을 지으면서도, 레미카의 버튜버 활동이라는 아이디어는 꽤 재미있을 것 같다고 생각했다."

[[dialogue]]
speaker_original = "レミカ（幼少）"
speaker_translation = "레미카(어린 시절)"
original = "「そっか。なら後で、また相談に乗ってくれたら嬉しいな♪」"
translation = "「그렇구나. 그럼 나중에 또 상담해 주면 좋겠어♪」"

[[dialogue]]
speaker = "unk"
original = "俺が頷くと、レミカはふと笑顔を浮かべてみせて。"
translation = "내가 고개를 끄덕이자 레미카는 문득 미소를 지어 보였다."

[[dialogue]]
speaker_original = "レミカ（幼少）"
speaker_translation = "레미카(어린 시절)"
original = "「――ふふっ……じゃあ、約束ね♪」"
translation = "「――후훗…… 그럼 약속이야♪」"

[[dialogue]]
speaker = "unk"
original = "その笑顔は、リトルフォームに変身しているせいか、前よりずっと柔らかく感じられるのだった。"
translation = "그 미소는 리틀 폼으로 변신하고 있는 탓인지 전보다 훨씬 부드럽게 느껴졌다."

[[dialogue]]
speaker = "unk"
original = "そして――メルエルはあれから、以前よりも多く俺に会いに来るようになっていた。"
translation = "그리고―― 메루엘은 그때 이후로 이전보다 자주 나를 찾아오게 되었다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「会長くん。こっちの書類、できたよ♪」"
translation = "「회장군. 이쪽 서류 다 됐어♪」"

[[dialogue]]
speaker = "unk"
original = "ありがとう。手伝ってくれて助かる"
translation = "고마워. 도와줘서 살았어"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「えへへ、どういたしまして♪」"
translation = "「에헤헤, 별말씀을♪」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「でも、お礼なんて大丈夫だよ。私にとっては、会長くんとこうして一緒にお仕事できること自体、ご褒美みたいなものだから<emoji=heart04>」"
translation = "「하지만 보답 같은 건 괜찮아. 나한테는 회장군이랑 이렇게 같이 일할 수 있는 것 자체가 포상 같은 거니까❤」"

[[dialogue]]
speaker = "unk"
original = "メルエルはそんな風に、前よりもストレートに好意を見せてくるので、俺もついついドキッとしてしまう。"
translation = "메루엘은 그런 식으로 전보다 더 직설적으로 호의를 보여와서 나도 모르게 두근거리고 만다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「だからこれからも、星徒会のお仕事で人手が必要な時は、遠慮なく私に声をかけてくれたら嬉しいな♪」"
translation = "「그러니까 앞으로도 성도회 업무로 일손이 필요할 때는 사양 말고 나를 불러주면 좋겠어♪」"

[[dialogue]]
speaker = "unk"
original = "と、そんな時、モンスター出現のアラートが鳴り響く。"
translation = "그때, 몬스터 출현 알람이 울려 퍼진다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「会長くん、出撃するなら、私も力を貸すよ！」"
translation = "「회장군, 출격한다면 나도 힘을 보탤게!」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「イー！」"
translation = "「이이!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「見つけた！\u3000――フォームチェンジ！」"
translation = "「찾았다! ――폼 체인지!」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「リトルフォーム！\u3000会長くん、行けるよ！」"
translation = "「리틀 폼! 회장군, 갈 수 있어!」"

[[dialogue]]
speaker = "unk"
original = "ああ、一緒に攻撃するぞ！"
translation = "아아, 같이 공격하자!"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「うん♪\u3000２人で気持ちを合わせて！」"
translation = "「응♪ 둘이서 마음을 맞춰서!」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「――ユニゾン！！\u3000ドロップ・イン・ユアハートッ！！」"
translation = "「――유니존!! 드롭 인 유어 하트!!」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「イ～～ッ！？」"
translation = "「이이이익!?」"

[[dialogue]]
speaker = "unk"
original = "俺とメルエルのユニゾンアタックによって、モンスターは一瞬で消滅してしまった。"
translation = "나와 메루엘의 유니존 어택에 의해 몬스터는 순식간에 소멸해 버렸다."

[[dialogue]]
speaker = "unk"
original = "その後も、メルエルとのコンビネーションによって、他の星騎士たちが駆け付けてくる前にモンスターを全て倒すことができた。"
translation = "그 후로도 메루엘과의 콤비네이션 덕분에 다른 성기사들이 달려오기 전에 몬스터를 모두 쓰러뜨릴 수 있었다."

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「よし♪\u3000やったね、会長くん！」"
translation = "「좋아♪ 해냈네, 회장군!」"

[[dialogue]]
speaker = "unk"
original = "ああ。メルエルが力を貸してくれたおかげだ"
translation = "아아. 메루엘이 힘을 빌려준 덕분이야"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「あのね、会長くん……そのぉ……」"
translation = "「저기, 회장군…… 그게……」"

[[dialogue]]
speaker = "unk"
original = "武器をしまったメルエルが、何やらもじもじと体をくねらせていた。"
translation = "무기를 거둔 메루엘이 무언가 머뭇머뭇하며 몸을 배배 꼬고 있었다."

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「お願いがあるんだけど……いいかなぁ？」"
translation = "「부탁이 하나 있는데…… 괜찮을까?」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「えっとね……ヴィーナスちゃんがよく、頑張った時とかに、会長くんから頭を撫でてもらってるでしょ？」"
translation = "「저기 말이야…… 비너스짱이 자주, 노력했을 때라든가 회장군이 머리를 쓰다듬어 주잖아?」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「私……それが羨ましいなって、ずっと前から思ってて。だから……」"
translation = "「나…… 그게 부럽다고 아주 오래전부터 생각했거든. 그래서……」"

[[dialogue]]
speaker = "unk"
original = "そこまで聞いてメルエルの<b>お願い</b>が何なのか察した俺は、何も言わずに彼女の頭に手を差し出した。"
translation = "거기까지 듣고 메루엘의 <b>부탁</b>이 무엇인지 눈치챈 나는 아무 말 없이 그녀의 머리에 손을 내밀었다."

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「あっ……<emoji=heart04>」"
translation = "「앗……❤」"

[[dialogue]]
speaker = "unk"
original = "俺が伸ばした手のひらに、目を輝かせながら頭を潜り込ませてくるメルエル。"
translation = "내가 뻗은 손바닥에 눈을 반짝이며 머리를 들이미는 메루엘."

[[dialogue]]
speaker = "unk"
original = "まるで小動物のような純度１００％の好意が、心地よくもこそばゆい……。俺はそんな自分の気持ちを余り直視しないようにしつつ、メルエルの頭を優しく撫でる。"
translation = "마치 소동물 같은 순도 100%의 호의가 기분 좋으면서도 간지럽다……. 나는 그런 내 마음을 너무 직시하지 않으려 하며 메루엘의 머리를 상냥하게 쓰다듬는다."

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「えへへへへへぇ<emoji=heart04>\u3000すごく幸せで……メルトしちゃいそう<emoji=heart04>」"
translation = "「에헤헤헤헤헤❤ 너무 행복해서…… 멜트해버릴 것 같아❤」"

[[dialogue]]
speaker = "unk"
original = "そのまましばらくメルエルの頭を撫でていると、彼女がぽつりと口を開く。"
translation = "그대로 한동안 메루엘의 머리를 쓰다듬고 있자 그녀가 툭 입을 열었다."

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「……ねぇ、会長くん。この前、告白した時のことだけど――」"
translation = "「……저기, 회장군. 요전에 고백했을 때 말인데――」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「私ね、実はあの時、勇気を出してちょっぴり<b>ズル</b>をしたんだよ」"
translation = "「나 말이야, 사실 그때 용기를 내서 조금 <b>반칙</b>을 했어.」"

[[dialogue]]
speaker = "unk"
original = "ズル……？"
translation = "반칙……?"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「うん。会長くんの返事を、保留してほしいってお願いしたこと」"
translation = "「응. 회장군의 대답을 보류해 달라고 부탁한 거.」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「リクリエとの最終決戦が終わるまでは、余計な邪魔をしたくないって気持ちは嘘じゃないけど、でもね……」"
translation = "「리크리에와의 최종 결전이 끝날 때까지는 불필요한 방해를 하고 싶지 않다는 마음은 거짓말이 아니지만, 그래도……」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「一番はね、会長くんに私のことを好きって思ってもらえるように、もっとアピールする時間が欲しかったんだ<emoji=heart04>」"
translation = "「가장 큰 이유는 회장군이 나를 좋아하게 될 수 있도록 좀 더 어필할 시간이 필요했거든❤」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「つまり今は、『告白のロスタイム』中なんだよ」"
translation = "「즉 지금은 『고백의 로스타임』 중인 거야.」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「会長くんに好きって思ってもらえるように、良い女の子だなって思ってもらえるように、リクリエとの戦いも頑張っちゃうんだから♪」"
translation = "「회장군이 나를 좋아하게 될 수 있도록, 좋은 여자애라고 생각할 수 있도록 리크리에와의 싸움도 열심히 할 거니까♪」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「ちょっとズルいけど……恋の駆け引きでは『ズルさも勇気』だって、小さい私が教えてくれたから<emoji=heart04>」"
translation = "「조금 치사할지도 모르지만…… 사랑의 밀당에서는 『치사함도 용기』라고 어린 내가 가르쳐 줬으니까❤」"

[[dialogue]]
speaker = "unk"
original = "俺の腕の中で振り返ったメルエルは、そう言ってイタズラっぽく微笑んでみせるのだった。"
translation = "내 품 안에서 뒤를 돌아본 메루엘은 그렇게 말하며 장난스럽게 미소 지었다."

