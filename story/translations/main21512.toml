[[dialogue]]
speaker = "unk"
original = "第１２話,降臨,B"
translation = "제12화, 강림, B"

[[dialogue]]
speaker = "unk"
original = "極星学園の中庭を奪還し、極星学園のプリマステラたちと合流した。"
translation = "극성학원의 중정을 탈환하고 극성학원의 프리마스텔라들과 합류했다."

[[dialogue]]
speaker = "クロト"
original = "「──先遣部隊をさらに分割して、各所の対応にあたる」"
translation = "「──선발대를 다시 분할해서 각지의 대처를 맡기겠다」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「１つは、教皇庁前の時空の裂け目に対応する攻撃チームね。ホロウの複製体がアルタイルに投入される、その発送元を叩く」"
translation = "「하나는 교황청 앞의 시공의 균열에 대응하는 공격 팀이야. 호로우의 복제체가 알타이르에 투입되는 그 발송지를 타격한다」"

[[dialogue]]
speaker = "クロト"
original = "「ああ。新星学園と極星学園の星徒会。あとは……」"
translation = "「아아. 신성학원과 극성학원의 성도회. 그리고……」"

[[dialogue]]
speaker = "フィオナ（魔王）"
original = "「私も行きましょう。ホロウとの戦闘に慣れている者が当たった方が効率がいいはずです」"
translation = "「저도 가겠습니다. 호로우와의 전투에 익숙한 자가 대처하는 편이 효율적일 것입니다」"

[[dialogue]]
speaker = "煌嶺"
original = "「妾たちも参るぞ、リーエン。キュリオスの力をデネブの民に知らしめろ。失態は許さん」"
translation = "「소첩들도 가겠노라, 리엔. 큐리오스의 힘을 데네브의 백성들에게 널리 알리거라. 실태는 용납지 않느니라」"

[[dialogue]]
speaker = "unk"
original = "煌嶺の言葉にリーエンは静かに膝を折り、鋭い眼差しのまま「御意」と短く応じる。"
translation = "코레이의 말에 리엔은 조용히 무릎을 꿇고, 날카로운 눈빛을 유지한 채 「어명대로」라고 짧게 답한다."

[[dialogue]]
speaker = "梨緒"
original = "「そして私たち選管は、フィーニスの塔に向かう。目的は……」"
translation = "「그리고 우리 선관은 피니스의 탑으로 향한다. 목적은……」"

[[dialogue]]
speaker = "ジグ"
original = "「第零層に封印されている、デネブの守護天使を解放する部隊というわけだ」"
translation = "「제0층에 봉인되어 있는 데네브의 수호천사를 해방하는 부대라는 뜻이군」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「魔王たちを帰還させるために、ラクシャは塔に封印されて動けなくなってる……」"
translation = "「마왕들을 귀환시키기 위해, 락샤는 탑에 봉인되어 움직일 수 없게 되었어……」"

[[dialogue]]
speaker = "エステル"
original = "「守護天使様の御助力をいただけるのならば、これ以上の支援はありませんね！」"
translation = "「수호천사님의 도움을 얻을 수 있다면 이 이상의 지원은 없겠네요!」"

[[dialogue]]
speaker = "フィオナ（魔王）"
original = "「セーラさん。流星星徒会は解放チームに当たってください！」"
translation = "「세라 씨. 유성성도회는 해방 팀을 맡아 주세요!」"

[[dialogue]]
speaker = "セーラ"
original = "「オッケー、フィオナちゃん。解放次第、教皇庁前に行くから待ってて！」"
translation = "「오케이, 피오나짱. 해방하는 대로 교황청 앞으로 갈 테니 기다려!」"

[[dialogue]]
speaker = "梨緒"
original = "「ルヴィネ。ラクシャを含め守護天使は皆、君の手で封印されたと聞いているが……今でも働きかけることは可能か？」"
translation = "「루비네. 락샤를 포함해 수호천사는 모두 네 손으로 봉인되었다고 들었는데…… 지금도 손을 쓰는 것이 가능한가?」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「……ごめんなさい。すでにホロウへ塔のコントロール権が移っているみたい。霊力を扱えない今の私では……」"
translation = "「……미안해요. 이미 호로우에게 탑의 제어권이 넘어간 것 같아요. 영력을 다룰 수 없는 지금의 저로서는……」"

[[dialogue]]
speaker = "梨緒"
original = "「まあ、そうだろうな。敵もそこまでバカではない、か……」"
translation = "「뭐, 그렇겠지. 적도 그렇게 바보는 아니라는 건가……」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「代わりに極星学園のプリマステラを派遣するわ。この場にいる数十人──全員を連れて行って。みんな、できるわね？」"
translation = "「대신 극성학원의 프리마스텔라를 파견하겠어. 이 자리에 있는 수십 명── 전원을 데려가 줘. 모두들, 할 수 있지?」"

[[dialogue]]
speaker = "極星学園の星騎士"
original = "「──はい、ルヴィネ様！！」"
translation = "「──네, 루비네 님!!」"

[[dialogue]]
speaker = "unk"
original = "かつて１度目のデネブ来訪の際、ラクシャ──環はその身を挺して俺たちを救ってくれた。"
translation = "예전 첫 번째 데네브 방문 때, 락샤── 타마키는 그 몸을 던져 우리를 구해주었다."

[[dialogue]]
speaker = "クロト"
original = "（いつか迎えに行くと約束したのに……）"
translation = "（언젠가 데리러 가겠다고 약속했는데……）"

[[dialogue]]
speaker = "unk"
original = "俺が行くことができなくてすまない、環──"
translation = "내가 갈 수 없어서 미안해, 타마키──"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
original = "「──ふふ。見つけたわ」"
translation = "「──후후. 찾았어」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
original = "「アルタイルの流星市国……その市街地に直通するための転送ルート。もう『私たち』を無駄をしなくていいわね──」"
translation = "「알타이르의 유성시국…… 그 시가지로 직통하기 위한 전송 루트. 이제 『우리』를 낭비하지 않아도 되겠네──」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
original = "「ぐぅっ……！？」"
translation = "「크윽……!?」"

[[dialogue]]
speaker = "クロト"
original = "「タッチの差だったな、ホロウ！\u3000お前の好きにはさせない！」"
translation = "「간발의 차였군, 호로우! 네 멋대로 두진 않는다!」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
original = "「緋宮、クロト……！！！\u3000どこまでも諦めが悪い……３０００年前から、貴方は何度、私たちの邪魔をすれば気がすむの……！」"
translation = "「히노미야 쿠로토……!!! 어디까지 미련하게 포기하지 못하는지…… 3000년 전부터 당신은 몇 번이나 우리의 방해를 해야 속이 풀리는 거야……!」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
original = "「私への妨害は、創造神であるお父様の御意思に盾突くことに他ならない……咎人は粛清しなくては──」"
translation = "「나에 대한 방해는 창조신이신 아버님의 뜻에 대적하는 것에 다름없어…… 죄인은 숙청해야지──」"

[[dialogue]]
speaker = "unk"
original = "ホロウがはっきりと敵意を向けてくる。このまま自身の複製体を大量に展開するはず──"
translation = "호로우가 똑똑히 적의를 드러낸다. 이대로 자신의 복제체를 대량으로 전개할 게 분명하다──"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
original = "「────っ！？」"
translation = "「────윽!?」"

[[dialogue]]
speaker = "unk"
original = "しかしその瞬間、びくりとホロウの瞳が見開かれた。"
translation = "그러나 그 순간, 움찔하며 호로우의 눈동자가 크게 떠졌다."

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
original = "「……そんな。私だけでも……し、しかし──」"
translation = "「……그럴 수가. 나뿐이라도…… 하, 하지만──」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「──っ！？\u3000まさか！\u3000魔王、まずいわ……！！」"
translation = "「──윽!? 설마! 마왕, 위험해……!!」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
original = "「……喜びなさい、緋宮クロト」"
translation = "「……기뻐하렴, 히노미야 쿠로토」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
original = "「お父様が御姿を見せる、と仰っているわ」"
translation = "「아버님께서 모습을 보이시겠다고 말씀하셨어」"

[[dialogue]]
speaker = "クロト"
original = "「──ッ！？」"
translation = "「──윽!?」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
original = "「私が相手をするのは合理的ではない……とお父様は判断なされた」"
translation = "「내가 상대하는 것은 합리적이지 않다……고 아버님께서 판단하셨어」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
original = "「自らの不甲斐なさに、今すぐ命を絶って詫びたい気持ちよ……申し訳ございません、お父様……」"
translation = "「스스로의 한심함에 당장이라도 목숨을 끊어 사죄하고 싶은 심정이야…… 죄송합니다, 아버님……」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「魔王！\u3000ここを離れるわよ、早く──！！」"
translation = "「마왕! 여기서 벗어나야 해, 어서──!!」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
original = "「──ふざけるな。それだけは認めない」"
translation = "「──까불지 마. 그것만은 인정하지 않아」"

[[dialogue]]
speaker = "unk"
original = "俺たちの背後を埋め尽くすように、数十体の複製体が横並びになる──"
translation = "우리 배후를 가득 채우듯이 수십 대의 복제체가 가로로 늘어선다──"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
original = "「この世すべてを創りたもうた主に、背を向ける無礼など絶対に許されることではない──」"
translation = "「이 세상 모든 것을 창조하신 주님께 등을 돌리는 무례 따위는 절대 용납받을 수 있는 일이 아니야──」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
original = "「ひれ伏しなさい。お父様が、おいでになられるわ──」"
translation = "「엎드리렴. 아버님께서 오실 테니──」"

[[dialogue]]
speaker = "unk"
original = "<b>それ</b>がいったい何なのか──すぐには理解できなかった。"
translation = "<b>그것</b>이 대체 무엇인지── 곧바로는 이해할 수 없었다."

[[dialogue]]
speaker = "unk"
original = "しいて表現をするならば、それは途方もなく巨大な立方体で──"
translation = "굳이 표현하자면 그것은 터무니없이 거대한 입방체로──"

[[dialogue]]
speaker = "unk"
original = "今まで見てきた何よりも整然としているのに、何よりもグロテスクな。"
translation = "지금까지 보아온 그 무엇보다 정연하면서도, 그 무엇보다 그로테스크한 것."

[[dialogue]]
speaker = "unk"
original = "目が、脳が、本能が、理解を拒む──<b>それ</b>はきっと、本来なら見てはならないもの。"
translation = "눈이, 뇌가, 본능이 이해를 거부한다── <b>그것</b>은 분명 원래대로라면 보아서는 안 되는 것."

[[dialogue]]
speaker = "unk"
original = "ヒトの身で、その存在には触れてはならぬと直感させるもの──"
translation = "인간의 몸으로 그 존재에 손을 대서는 안 된다고 직감하게 만드는 것──"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
original = "「いつ見ても美しい御姿。ああ、お父様──」"
translation = "「언제 보아도 아름다운 모습. 아아, 아버님──」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
original = "「これが……ママを創った……」"
translation = "「이것이…… 엄마를 만든……」"

[[dialogue]]
speaker = "フィオナ（魔王）"
original = "「私たちの世界の……創造神……？」"
translation = "「우리 세계의…… 창조신……?」"

[[dialogue]]
speaker = "unk"
original = "──『<ruby>Ｘｅｎｏ<rt>ゼノ</rt></ruby>\u3000<ruby>Ｌｏｒｄ<rt>ロード</rt></ruby>\u3000<ruby>Ｓａｎｃｔｉｆｉｅｄ<rt>サンクティファイド</rt></ruby>』。"
translation = "──『<ruby>제노<rt>Xeno</rt></ruby> <ruby>로드<rt>Lord</rt></ruby> <ruby>산크티파이드<rt>Sanctified</rt></ruby>』."

[[dialogue]]
speaker = "unk"
original = "全てを創りし、真の敵との邂逅だった────"
translation = "모든 것을 창조한 진짜 적과의 해후였다────"

