[[dialogue]]
speaker = "unk"
original = "第４話,潮騒オンステージ,P"
translation = "제4화, 파도 소리 온 스테이지, P"

[[dialogue]]
speaker = "unk"
original = "今日のリゾート結界は、学園生以外の一般客もやってくる日だ。"
translation = "오늘의 리조트 결계는 학원생 이외의 일반 손님들도 찾아오는 날이다."

[[dialogue]]
speaker = "unk"
original = "俺とルルカも今日ばかりは配信活動の打ち合わせはお休み。海水浴デートをしようということになり──"
translation = "나와 루루카도 오늘만큼은 방송 활동 회의를 쉬기로 했다. 해수욕 데이트를 하기로 해서──"

[[dialogue]]
speaker = "ルルカ"
original = "「うわわわっ、すごい人だぁ～っ……！？」"
translation = "「우와와왓, 사람 진짜 많다아~……!?」"

[[dialogue]]
speaker = "unk"
original = "ルルカ、手を繋ごうか"
translation = "「루루카, 손 잡을까?」"

[[dialogue]]
speaker = "ルルカ"
original = "「わっ……<emoji=heart04>\u3000えへへ、お兄ちゃん、ありがとう。助かっちゃった」"
translation = "「왓……<emoji=heart04> 에헤헤, 오빠, 고마워. 살았다.」"

[[dialogue]]
speaker = "ルルカ"
original = "「いつも打ち合わせの時は、普通の人は入れないプライベートビーチの方に入れてもらっちゃってたけど……」"
translation = "「항상 회의할 때는 일반인은 못 들어오는 프라이빗 비치 쪽에 넣어주셨지만……」"

[[dialogue]]
speaker = "ルルカ"
original = "「一般開放のリゾート結界って、お休みの日はこんなに賑わうんだね。びっくりしちゃった」"
translation = "「일반 개방 리조트 결계는 쉬는 날에 이렇게 붐비는구나. 깜짝 놀랐어.」"

[[dialogue]]
speaker = "unk"
original = "今日は日曜日だしな"
translation = "「오늘은 일요일이니까.」"

[[dialogue]]
speaker = "ルルカ"
original = "「そうだね！\u3000それに季節関係なく海水浴ができるっていうのも素敵だし、人が集まるのも納得かな～」"
translation = "「그렇네! 게다가 계절 상관없이 해수욕을 할 수 있다는 것도 멋지고, 사람이 모이는 것도 납득이 가네~」"

[[dialogue]]
speaker = "ルルカ"
original = "「今日はいっぱい遊ぼうね、お兄ちゃん！\u3000ここのところ夜まで配信続きだったから、あたしも羽を伸ばしたいし……！」"
translation = "「오늘은 잔뜩 놀자, 오빠! 요새 밤늦게까지 계속 방송했으니까, 나도 기분 전환하고 싶고……!」"

[[dialogue]]
speaker = "ルルカ"
original = "「お兄ちゃんも今日のために星徒会のお仕事、頑張って片付けてくれたんだよね？\u3000あたし知ってるよ♪」"
translation = "「오빠도 오늘을 위해서 성도회 업무, 열심히 끝내준 거지? 나 다 알고 있어♪」"

[[dialogue]]
speaker = "ルルカ"
original = "「素敵なデートにしようね、お兄ちゃん。さっそく泳ぐのもいいけどちょうどお昼時だし……何か食べてからにしよっか」"
translation = "「멋진 데이트로 만들자, 오빠. 바로 수영하는 것도 좋지만 마침 점심때니까…… 뭐 좀 먹고 나서 할까?」"

[[dialogue]]
speaker = "ルルカ"
original = "「……うん！\u3000リップルさんおすすめの焼きそば、気になってたんだ～！\u3000一緒に並ぼう、お兄ちゃん！」"
translation = "「……응! 리플 씨가 추천한 야키소바, 궁금했거든~! 같이 줄 서자, 오빠!」"

[[dialogue]]
speaker = "ルルカ"
original = "「ふー、ごちそうさま♪\u3000おいしかった～<emoji=heart04>」"
translation = "「후우, 잘 먹었습니다♪ 맛있었어~<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「プライベートビーチみたいに貸し切るのも贅沢でいいけど、賑やかな海もやっぱりいいね、お兄ちゃん！」"
translation = "「프라이빗 비치처럼 전세 내는 것도 사치스럽고 좋지만, 북적거리는 바다도 역시 좋네, 오빠!」"

[[dialogue]]
speaker = "ルルカ"
original = "「みんな楽しそうだし、海はきれいで大きいし……うーん♪\u3000新曲のインスピレーションも沸いて来ちゃいそうだよ～♪」"
translation = "「다들 즐거워 보이고, 바다는 깨끗하고 넓고…… 으음♪ 신곡 영감도 막 떠오를 것 같아~♪」"

[[dialogue]]
speaker = "ルルカ"
original = "「それじゃあ何して遊ぼっか。海に泳ぎに行く？\u3000イルカの浮き輪、一緒に使っちゃうのもいいよね♪」"
translation = "「그럼 이제 뭐 하고 놀까? 바다에 수영하러 갈래? 돌고래 튜브, 같이 쓰는 것도 좋겠지♪」"

[[dialogue]]
speaker = "unk"
original = "それもいいけど、あれは？"
translation = "「그것도 좋지만, 저건 어때?」"

[[dialogue]]
speaker = "ルルカ"
original = "「ん？\u3000なんだか舞台が設置されてるね……？\u3000アンプとか、マイクを準備してる人もいる……」"
translation = "「응? 왠지 무대가 설치되어 있네……? 앰프나 마이크를 준비하는 사람도 있고……」"

[[dialogue]]
speaker = "ルルカ"
original = "「あのー、すみません。これって何が始まるんですか？」"
translation = "「저기, 죄송합니다. 여기서 뭐가 시작되나요?」"

[[dialogue]]
speaker = "お姉さん"
original = "「野外ライブよ！\u3000とは言っても、有志で参加するカラオケ大会みたいな感じのゆる～いやつだけどね」"
translation = "「야외 라이브야! 그렇다고는 해도 유지들이 참가하는 노래방 대회 같은 느낌의 가벼운 거지만 말이야.」"

[[dialogue]]
speaker = "ルルカ"
original = "「は～。のど自慢大会、みたいな？」"
translation = "「하아~. 노래 자랑 대회 같은 거?」"

[[dialogue]]
speaker = "お姉さん"
original = "「ええ。あなたも歌に自信があったら出てみたら？」"
translation = "「응. 너도 노래에 자신 있으면 나가보는 게 어때?」"

[[dialogue]]
speaker = "ルルカ"
original = "「あ、でもあたしは～……」"
translation = "「아, 하지만 저는~……」"

[[dialogue]]
speaker = "お姉さん"
original = "「あら。彼氏さんとデートだったのね。ふふ、ごめんなさい」"
translation = "「어머. 남자친구랑 데이트 중이었구나. 후후, 미안해.」"

[[dialogue]]
speaker = "ルルカ"
original = "「い、いえ！\u3000ありがとうございました～」"
translation = "「아, 아니에요! 감사합니다~」"

[[dialogue]]
speaker = "ルルカ"
original = "「ね、お兄ちゃん。歌のライブがあるんだって～。ちょっと聴いて行こっか。楽しそう！」"
translation = "「있지, 오빠. 노래 라이브가 있대~. 조금 듣고 갈까? 재밌겠다!」"

[[dialogue]]
speaker = "unk"
original = "ルルカも参加してみたら？"
translation = "「루루카도 참가해 보는 건 어때?」"

[[dialogue]]
speaker = "ルルカ"
original = "「えっ……でもせっかくのデートだし。それにあたし、何も準備してないし……」"
translation = "「엣…… 하지만 모처럼 데이트인데. 게다가 나, 아무 준비도 안 했고……」"

[[dialogue]]
speaker = "unk"
original = "ルルカの歌が聴きたいな"
translation = "「루루카의 노래가 듣고 싶은걸.」"

[[dialogue]]
speaker = "ルルカ"
original = "「うっ──そ、そういうことを言われちゃうと……うんっ」"
translation = "「윽── 그, 그런 말을 들으면…… 응.」"

[[dialogue]]
speaker = "ルルカ"
original = "「期待に応えるしかないよね！\u3000そうだよね。お兄ちゃんには『ルカルカ』としての歌はたくさん届けてるけど……」"
translation = "「기대에 부응할 수밖에 없겠네! 그렇지. 오빠한테는 『루카루카』로서의 노래는 많이 들려줬지만……」"

[[dialogue]]
speaker = "ルルカ"
original = "「あたし、海野辺ルルカとしての歌はあんまり聴いてもらってないかも。よ～しっ……！」"
translation = "「나, 우미노베 루루카로서의 노래는 별로 들려주지 않았을지도. 조~아……!」"

[[dialogue]]
speaker = "ルルカ"
original = "「お兄ちゃん、参加してくるね！\u3000頑張って歌うから、最前列で聴いて欲しいな！」"
translation = "「오빠, 참가하고 올게! 열심히 노래할 테니까, 맨 앞줄에서 들어줬으면 좋겠어!」"

[[dialogue]]
speaker = "unk"
original = "まかせろ！"
translation = "「맡겨줘!」"

[[dialogue]]
speaker = "ルルカ"
original = "「うんっ！\u3000それじゃあ、行ってきま～すっ！」"
translation = "「응! 그럼, 다녀오겠습니다~!」"

[[dialogue]]
speaker = "unk"
original = "──こうして海の家の歌唱ライブは大盛況となった。"
translation = "──이렇게 해서 바다의 집 가창 라이브는 대성황을 이루었다."

[[dialogue]]
speaker = "unk"
original = "ルルカがステージで歌った曲は、かつて彼女が作曲した『恋と海』をテーマにした汐ルカルカの有名なナンバー。"
translation = "루루카가 스테이지에서 부른 곡은 과거 그녀가 작곡한 『사랑과 바다』를 테마로 한 시오 루카루카의 유명한 넘버."

[[dialogue]]
speaker = "unk"
original = "俺にとっても特別な曲を、屋外のステージで聴くのは、とても贅沢な時間だった──"
translation = "나에게도 특별한 곡을 야외 스테이지에서 듣는 것은 매우 사치스러운 시간이었다──"

[[dialogue]]
speaker = "ルルカ"
original = "「ただいま、お兄ちゃん！\u3000どうだったかな♪」"
translation = "「다녀왔어, 오빠! 어땠어?♪」"

[[dialogue]]
speaker = "unk"
original = "最高だった……！"
translation = "「최고였어……!」"

[[dialogue]]
speaker = "ルルカ"
original = "「えへへっ、そう言ってもらえてホッとしたよ～。あの曲、お兄ちゃんのために書き下ろしたやつだったから」"
translation = "「에헤헤, 그렇게 말해주니 안심이야~. 그 곡, 오빠를 위해 쓴 거였으니까.」"

[[dialogue]]
speaker = "ルルカ"
original = "「あたし、やっぱり歌が好き。いつかお母さんみたいな歌手になりたいって、生の観客を前にして改めて思っちゃった」"
translation = "「나, 역시 노래가 좋아. 언젠가 엄마 같은 가수가 되고 싶다고, 생생한 관객들 앞에서 다시 한번 생각하게 됐어.」"

[[dialogue]]
speaker = "ルルカ"
original = "「これからもっと上手になって、もっともっと人気になってみせるから。お兄ちゃんも最前列で応援してね。約束だよっ！」"
translation = "「앞으로 더 잘하게 되고, 훨씬 더 인기 있어질 테니까. 오빠도 맨 앞줄에서 응원해 줘. 약속이야!」"

[[dialogue]]
speaker = "unk"
original = "嬉しそうにはにかむルルカを見て、これからも誰よりも近くで彼女を支えていこうと思うのだった──"
translation = "기쁜 듯이 수줍어하는 루루카를 보며, 앞으로도 누구보다 가까이서 그녀를 지탱해 주겠다고 생각했다──"

