[[dialogue]]
speaker = "unk"
original = "第３話,アルモたんの幸せ計画,P"
translation = "제3화, 알모땅의 행복 계획"

[[dialogue]]
speaker = "unk"
original = "その日、俺はアルモと一緒に、リゾート結界の海の家でバイトをしていた。"
translation = "그날, 나는 알모와 함께 리조트 결계의 바다의 집에서 아르바이트를 하고 있었다."

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「焼肉定食、お待たせしましたなのだ～♪」"
translation = "「불고기 정식, 오래 기다리셨던 것이다~♪」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「わぁ～♪\u3000アルモたん、ありがと～♪\u3000いただきま～す♪」"
translation = "「와아~♪ 알모땅, 고마워~♪ 잘 먹겠습니다~♪」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「あむっ……もぐもぐ♪\u3000ん～、美味しくてふわふわ～♪」"
translation = "「아암…… 우물우물♪ 음~, 맛있어서 푹신푹신해~♪」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「サランはいつも美味しそうに食べてくれるから、嬉しいのだ♪」"
translation = "「사란은 언제나 맛있게 먹어주니까, 기쁜 것이다♪」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「だって、アルモたんの作ってくれるお肉料理、ほんとに美味しいんだもん♪\u3000サラン、ふわふわの笑顔になっちゃう～♪」"
translation = "「그치만, 알모땅이 만들어 주는 고기 요리, 정말 맛있는걸♪ 사란, 푹신푹신한 미소가 되어버려~♪」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「アルモたんが焼くお肉は、お客さんにも評判デスので、ワタシもとてもタスカッテま～す♪」"
translation = "「알모땅이 굽는 고기는 손님들에게도 평판이 좋슴다보니, 저도 아주 도움받고 있슴다~♪」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「えへへ♪\u3000みんなが喜んでくれて、アルモたん嬉しいのだ～♪」"
translation = "「에헤헤♪ 모두가 기뻐해 줘서, 알모땅 기쁜 것이다~♪」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「このままずっと、一緒に海の家で働いてホシイくらいですよ～♪」"
translation = "「이대로 계속, 같이 바다의 집에서 일해줬으면 할 정도임다~♪」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「アルモたんも、これからも時々バイトさせてもらえるとありがたいのだ♪」"
translation = "「알모땅도, 앞으로도 가끔 아르바이트하게 해주면 고마운 것이다♪」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「もちろんダイカンゲイで～す♪」"
translation = "「물론 대환영임다~♪」"

[[dialogue]]
speaker = "unk"
original = "バイトが終わったあと、アルモは焼肉定食を作り、俺にもご馳走してくれた。"
translation = "알바가 끝난 뒤, 알모는 불고기 정식을 만들어 나에게도 대접해 주었다."

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「会長、アルモたんの作った定食は、どうなのだ？」"
translation = "「회장, 알모땅이 만든 정식은 어떤 것이다?」"

[[dialogue]]
speaker = "unk"
original = "うん、うまいっ！\u3000すごく美味だ！"
translation = "응, 맛있어! 정말 별미야!"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「えへへ～♪\u3000蛍火に作り方を教わって、練習してよかったのだ～♪」"
translation = "「에헤헤~♪ 호타루비에게 만드는 법을 배워서, 연습하길 잘한 것이다~♪」"

[[dialogue]]
speaker = "unk"
original = "アルモの嬉しそうな笑顔を見て、俺は最近気になっていたことを尋ねてみた。"
translation = "알모의 기쁜 듯한 미소를 보고, 나는 최근 궁금했던 것을 물어보았다."

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「――ん？\u3000アルモたんが最近よくバイトしてる理由か？」"
translation = "「――응? 알모땅이 최근 자주 알바하는 이유인가?」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「それはな、アルモたん、人間界で『やりたいこと』を考えてみることにしたのだ♪」"
translation = "「그건 말이지, 알모땅, 인간계에서 『하고 싶은 일』을 생각해 보기로 한 것이다♪」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「この前、アニマと会った時に言われたのだ。リクリエとの戦いが終わった後なら、本体に急いで戻る必要はないんじゃないかって」"
translation = "「요전에 아니마와 만났을 때 들은 것이다. 리크리에와의 싸움이 끝난 뒤라면, 본체로 서둘러 돌아갈 필요는 없지 않겠냐고」"

[[dialogue]]
speaker = "unk"
original = "聞けば、オペレーション・ペンタグラムで守護天使本体の封印が解かれた為、世界の摂理を守護する柱としての役割は、本体が問題なく果たしているから、ということらしい。"
translation = "들어보니, 오퍼레이션 펜타그램으로 수호천사 본체의 봉인이 풀렸기 때문에, 세계의 섭리를 수호하는 기둥으로서의 역할은 본체가 문제없이 수행하고 있기 때문이라는 모양이다."

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「――なら、せっかくの機会だし、命脈の守護天使として、ヒトの『人生』というものを１度体験してから帰りたいと思ったのだ」"
translation = "「――그렇다면 모처럼의 기회고, 명맥의 수호천사로서 인간의 『인생』이라는 것을 한 번 체험해 보고 돌아가고 싶다고 생각한 것이다」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「何より……アルモたんは会長のことが大好きだからな♪\u3000すぐに戻らなくていいのなら、会長と一緒に人生を過ごしてみたいのだ♪」"
translation = "「무엇보다…… 알모땅은 회장을 정말 좋아하니까 말이지♪ 바로 돌아가지 않아도 된다면, 회장과 함께 인생을 보내보고 싶은 것이다♪」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「それで、生きて何をしたいかと考えたら……アルモたんは人間界でお肉を食べて感動したから、食に関する仕事がしてみたいって思ったのだ！」"
translation = "「그래서, 살아가며 무엇을 하고 싶은지 생각했더니…… 알모땅은 인간계에서 고기를 먹고 감동했으니까, 음식에 관한 일을 해보고 싶다고 생각한 것이다!」"

[[dialogue]]
speaker = "unk"
original = "だから料理を？"
translation = "그래서 요리를?"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「うんっ♪\u3000アルモたんが焼いたお肉を『美味しい』って言ってもらえると、すごく嬉しいって感じることに気づいたのだ！」"
translation = "「응♪ 알모땅이 구운 고기를 『맛있다』고 해주면, 정말 기쁘다고 느낀다는 걸 깨달은 것이다!」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「だから、お肉だけじゃなくて、合わせて出す料理ももっと上手くなりたいと思っているのだ！」"
translation = "「그러니까 고기뿐만 아니라, 곁들여 내는 요리도 좀 더 잘하고 싶다고 생각하고 있는 것이다!」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「それで、いつかは肉料理のお店を開けたらいいなって♪\u3000食べたみんなが笑顔になれるようなお店を作れたら、すっごく楽しそうだと思ったのだ♪」"
translation = "「그래서 언젠가는 고기 요리 가게를 열 수 있으면 좋겠다고♪ 먹은 모두가 웃을 수 있는 그런 가게를 만들 수 있다면, 정말 즐거울 것 같다고 생각한 것이다♪」"

[[dialogue]]
speaker = "unk"
original = "なら、アルモの夢、俺も手伝うよ"
translation = "그럼, 알모의 꿈, 나도 도와줄게."

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「えっ？\u3000会長も一緒に手伝ってくれるのか！？\u3000わぁっ♪\u3000ありがとうなのだ～♪」"
translation = "「엣? 회장도 같이 도와주는 것인가!? 와앗♪ 고마운 것이다~♪」"

[[dialogue]]
speaker = "unk"
original = "アルモたんは勢いよく飛びついてくる。"
translation = "알모땅은 기세 좋게 뛰어들어 온다."

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「会長と一緒なら、絶対に楽しいに決まってるのだ♪」"
translation = "「회장과 함께라면, 분명 즐거울 게 뻔한 것이다♪」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「あとは将来、会長と結婚して～、<b>子供</b>もできたらもっと楽しくなりそうだな♪」"
translation = "「그리고 나중에 회장과 결혼해서~, <b>아이</b>도 생기면 더 즐거워질 것 같은 것이다♪」"

[[dialogue]]
speaker = "unk"
original = "っ！？\u3000ごほっ、ごほっ……！"
translation = "윽!? 쿨럭, 쿨럭……!"

[[dialogue]]
speaker = "unk"
original = "定食を食べながら聞いていた俺は、肉を喉に詰まらせかけて思わずむせてしまう。"
translation = "정식을 먹으며 듣고 있던 나는, 고기가 목에 걸릴 뻔해서 사레들리고 만다."

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「会長！？\u3000大丈夫か？」"
translation = "「회장!? 괜찮은 것이다?」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「――いきなり子供とか言い出すからビックリした？」"
translation = "「――갑자기 아이라든가 말하니까 놀란 것이다?」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「だけど、アルモたんたちは恋人なんだし、このまま結婚したら、子供を作るのは普通のことじゃないのか？」"
translation = "「하지만 알모땅들은 연인이고, 이대로 결혼하면 아이를 만드는 건 보통 일이 아닌 것인가?」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「アルモたんは、会長との子供ができるの、すっごく楽しみだぞ♪」"
translation = "「알모땅은 회장과의 아이가 생기는 거, 정말 기대되는 것이다♪」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「そうだ！\u3000会長は子供、何人くらい欲しいのだ？」"
translation = "「그렇다! 회장은 아이, 몇 명 정도 갖고 싶은 것이다?」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「アルモたんは、会長との子供ならいくらでも欲しいぞ♪\u3000たくさんの子供に囲まれた家族は、すっごく幸せそうだなと思うのだ♪」"
translation = "「알모땅은 회장과의 아이라면 얼마든지 갖고 싶은 것이다♪ 많은 아이에게 둘러싸인 가족은 정말 행복해 보일 것 같다고 생각하는 것이다♪」"

[[dialogue]]
speaker = "unk"
original = "が、頑張ります……"
translation = "노, 노력하겠습니다……"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「うんっ♪\u3000アルモたんも一緒に頑張って、元気な子供をいっぱい産んじゃうのだ♪\u3000えへへっ♪」"
translation = "「응♪ 알모땅도 같이 노력해서, 건강한 아이를 잔뜩 낳아버리는 것이다♪ 에헤헷♪」"

[[dialogue]]
speaker = "unk"
original = "そう言って無邪気に笑うアルモに、俺は恥ずかしくもこそばゆい気持ちになってしまうのだった。"
translation = "그렇게 말하며 천진난만하게 웃는 알모에게, 나는 부끄러우면서도 간지러운 기분이 되어버리는 것이었다."

