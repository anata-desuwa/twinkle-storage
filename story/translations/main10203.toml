[[dialogue]]
speaker = "unk"
original = "第３話,当主様の命令は絶対です,B"
translation = "제3화, 당주님의 명령은 절대적입니다"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ご当主様、美鶴を連れてまいりました」"
translation = "「당주님, 미츠루를 데려왔습니다.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ご苦労、蘭美。よく来てくれたな、美鶴」"
translation = "「수고했다, 라비. 잘 와주었구나, 미츠루.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「当主様のご指名とのことですけど、わざわざ呼びつけたということは、ヒミツのお仕事、です？」"
translation = "「당주님의 지명이라고 들었습니다만, 일부러 불러내신 걸 보니 비밀스러운 일, 인가요?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「そうだ。皆にはくれぐれも内密に、だ」"
translation = "「그렇다. 모두에게는 부디 비밀로 하거라.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "（うへ、メイド長、大当たり。さすが）"
translation = "(우와, 메이드장 정답. 역시 대단해)"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「事は一刻を争うのでな、率直に話すとしよう」"
translation = "「일이 일각을 다투기에 솔직하게 이야기하도록 하지.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「メイド隊のせつな、ヨミらとともに、『<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>』の調査に当たってほしい」"
translation = "「메이드대의 세츠나, 요미 등과 함께, 『<ruby>경계의 호수<rt>라고 시에로</rt></ruby>』의 조사에 임해주었으면 한다.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「この人選、どう思うか、蘭美」"
translation = "「이 인선, 어떻게 생각하느냐, 라비.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「素晴らしいですね。せつなもヨミも個々のスペックは非常に高いのですが、如何せん注意力に乏しく、危なっかしいところがあります」"
translation = "「훌륭합니다. 세츠나도 요미도 개별 스펙은 매우 높습니다만, 아무래도 주의력이 부족해 위태로운 면이 있습니다.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「そこを冷静沈着な美鶴が制してくれるならば心配は無用です。危機管理・危険回避能力に長けており、ここぞという時の集中力もメイド隊の中でも随一」"
translation = "「그 부분을 냉정 침착한 미츠루가 제어해 준다면 걱정은 없습니다. 위기관리 및 위험 회피 능력이 뛰어나며, 결정적일 때의 집중력도 메이드대 중에서 으뜸입니다.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「彼女ならではの着眼点で、必ずや成功をもたらしてくれますよ。私は常にできるメイド長ですが、美鶴はやればできるメイドです」"
translation = "「그녀만의 착안점으로 반드시 성공을 가져다줄 것입니다. 저는 언제나 잘하는 메이드장이지만, 미츠루는 하면 잘하는 메이드입니다.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「うむ。貴殿らも知っての通り、<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>は唯一、人間界・魔界・天界を行き来できる場所だ」"
translation = "「음. 귀공들도 알다시피 <ruby>경계의 호수<rt>라고 시에로</rt></ruby>는 유일하게 인간계, 마계, 천계를 오갈 수 있는 장소다.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ヴィーナスは魔界にいると目されている。ならば、三界を渡れるあそこならば、何かしらの手がかりを掴めると踏んでいるのだ」"
translation = "「비너스는 마계에 있는 것으로 추정된다. 그렇다면 삼계를 건널 수 있는 그곳이라면 무언가 단서를 잡을 수 있을 거라 판단하고 있느니라.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「そんな大事な場所なら、とっくに調査してるのでは？」"
translation = "「그렇게 중요한 장소라면 벌써 조사하고 있지 않았나요?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「うむ、イの一番に調査隊が向かっている。結果、特筆すべき点は何もなかったと報告を受けた」"
translation = "「음, 가장 먼저 조사대가 향했느니라. 결과, 특필할 만한 점은 아무것도 없었다고 보고받았도다.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「え。それなら改めて、うちらが行かなくても」"
translation = "「에. 그렇다면 다시 우리가 가지 않아도.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「最初の報告から既に時間が経過している。変化が生じることもあるだろう。念には念を入れてな」"
translation = "「첫 보고로부터 이미 시간이 경과했느니라. 변화가 생길 수도 있겠지. 돌다리도 두드려 보고 건너는 법이니라.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「用心深いんですね」"
translation = "「조심성이 많으시네요.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「それに私の直感が告げている。あそこで何か起きるとな」"
translation = "「게다가 짐의 직감이 말하고 있느니라. 그곳에서 무언가 일어날 것이라고 말이다.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "（当主様の直感がそういってるなら仕方ない。そこいらの占い師の１００倍は信用に値するからね）"
translation = "(당주님의 직감이 그렇다면 어쩔 수 없지. 동네 점쟁이보다 100배는 신용할 가치가 있으니까)"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「でもうちメイドですし、頂いたお賃金の分以上は働けないっていうか──」"
translation = "「하지만 나 메이드고, 받은 임금 이상으로는 일할 수 없달까──」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ちなみに……特別手当も出すぞ？」"
translation = "「참고로…… 특별 수당도 지급하겠노라.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「むぅ」"
translation = "「무우.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "（そういう風に言われちゃったら、うちはぐうの音も出ない。効果的すぎ）"
translation = "(그런 식으로 말씀하시면 나는 아무 말도 못 하죠. 너무 효과적이야)"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「ご期待に応えられるかはわからないですけど……うちは雇われの身ですからね。当主様のお願いは断りませんし、うちに出来る限りのことはいたしますよ」"
translation = "「기대에 부응할 수 있을지는 모르겠지만…… 나는 고용된 몸이니까요. 당주님의 부탁은 거절하지 않고, 내가 할 수 있는 한 최선을 다할게요.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「美鶴、あなたね──」"
translation = "「미츠루, 너는 정말──」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「それでよい。十分だ。貴殿の働き、期待しているぞ」"
translation = "「그거면 됐다. 충분하구나. 귀공의 활약, 기대하겠노라.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「美鶴さん、今回の任務、よろしくお願いします！」"
translation = "「미츠루 씨, 이번 임무 잘 부탁드려요!」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「よろしく、ヨミー。んで、もう１人のニンニンは？」"
translation = "「잘 부탁해, 요미─. 그런데, 나머지 한 명인 닌닌이는?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「せつなさんは偵察のため、先行して<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>周辺に向かっています」"
translation = "「세츠나 씨는 정찰을 위해 먼저 <ruby>경계의 호수<rt>라고 시에로</rt></ruby> 주변으로 향했습니다.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「偉いねー。じゃ、うちらもとっとと追いつこ」"
translation = "「기특하네─. 자, 우리도 얼른 따라잡자.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「それにしても……星読事変だっけ。空にこのヘンテコなおもちゃが浮いてたのって」"
translation = "「그나저나…… 성독사변이었나. 하늘에 이 이상한 장난감이 떠 있었던 게.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「なんか起きてるのは間違いなさそうだ。さっさと調査に行って、ちゃちゃっと帰ってきた方が良さそうね」"
translation = "「무언가 일어나고 있는 건 틀림없어 보여. 빨리 조사하러 가서 후딱 돌아오는 게 좋겠네.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「はい。せつなさんも心配ですし、急ぎましょう！」"
translation = "「네. 세츠나 씨도 걱정되니 서둘러요!」"

