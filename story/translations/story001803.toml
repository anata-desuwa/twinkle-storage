[[dialogue]]
speaker = "unk"
original = "俺がセシアたちのサンタ企画を手伝うことになった翌日。"
translation = "내가 세시아 일행의 산타 기획을 돕기로 한 다음 날."

[[dialogue]]
speaker = "unk"
original = "今日はみんなで空き教室に集まって、クリスマスプレゼントのブレスレットを作ることになった。"
translation = "오늘은 다 같이 빈 교실에 모여, 크리스마스 선물로 줄 팔찌를 만들기로 했다."

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「フニ、あれから熱っぽいのは大丈夫？」"
translation = "「후니, 그때부터 열이 있는 건 괜찮니?」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「はい。体温は今日も高めですけど、体調は引き続き良い感じです！」"
translation = "「네. 체온은 오늘도 높은 편이지만, 몸 상태는 계속해서 좋은 느낌이에요!」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ならいいけど……。無理はしちゃダメよ？」"
translation = "「그럼 다행이지만……. 무리는 하면 안 돼?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「そうそう！\u3000あたし達、もう友達なんだから。遠慮はナシだからね！」"
translation = "「맞아 맞아! 우린 이제 친구니까. 사양은 없기다!」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「はい、ありがとうございます、お２人共」"
translation = "「네, 감사합니다, 두 분 다.」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「だけど、それにしても驚いたな～。魔界でも伝説の生き物って言われている『魔獣』の内の１体が、フニちゃんの中に宿っているだなんて」"
translation = "「하지만 그나저나 놀랍네~. 마계에서도 전설의 생물이라 불리는 『마수』 중 한 마리가 후니 짱 안에 깃들어 있다니.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「魔獣『フェニックス』……。ヒトの言葉を理解できる程の高い知能と、強大な魔力を持つ、魔界で生まれた特殊個体――」"
translation = "「마수 『페닉스』……. 인간의 말을 이해할 정도의 높은 지능과 강대한 마력을 지닌, 마계에서 태어난 특수 개체――」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「『不死鳥』という二つ名の通り、例え死んだとしても炎に包まれた後、その灰の中から若い姿で再生する……と魔界で執筆された本には記述されているわ」"
translation = "「『불사조』라는 이명 그대로, 설령 죽더라도 불꽃에 휩싸인 후 그 재 속에서 젊은 모습으로 재생한다……고 마계에서 집필된 책에는 기술되어 있어.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「私が星力に目覚めたのは、北海道で街へ買い出しに出かけていた時に、モンスターの襲撃に居合わせたのがきっかけでした」"
translation = "「제가 성력에 눈을 뜬 건, 홋카이도에서 마을로 장을 보러 나갔을 때 몬스터의 습격 현장에 마침 있었던 게 계기였어요.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「そこで瀕死の重傷を負った時に、体の中に眠っていたホウちゃんが目覚めて……傷を治してくれたんです」"
translation = "「거기서 빈사의 중상을 입었을 때, 몸속에 잠들어 있던 호우 짱이 깨어나서…… 상처를 치료해 줬거든요.」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「道理でフニちゃんって、パワーがすごいわけだよね。ほら、作ったアクセサリーを詰め込んだ箱、かなり重いはずなのに簡単に持ち上げたり――」"
translation = "「어쩐지 후니 짱은 파워가 엄청나더라니. 봐, 만든 액세서리를 가득 담은 상자, 꽤 무거울 텐데 가볍게 들어 올리기도 하고――」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「今も針金で作ってくれてる星型の小さな装飾、ペンチも無しに小さく折り畳んでみせてるじゃない？\u3000それってホウちゃんのおかげだったんだね！」"
translation = "「지금도 철사로 만들고 있는 별 모양의 작은 장식, 펜치도 없이 작게 접어내고 있잖아? 그게 호우 짱 덕분이었구나!」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「え？\u3000いやこれは、特に星力は使ってないんで、昔からの素というか……」"
translation = "「에? 아뇨 이건, 딱히 성력은 쓰고 있지 않아서 옛날부터의 본모습이라고 할까……」"

[[dialogue]]
speaker = "unk"
original = "言いながら、グニグニと指先で難なく、綺麗な星型を完成させるフニ。"
translation = "말하면서 꾸물꾸물 손끝으로 아무렇지도 않게 예쁜 별 모양을 완성하는 후니."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「いやいや！\u3000そんなわけないでしょ～！\u3000フニちゃんってば、面白い冗談言うんだから～！\u3000あははっ♪\u3000ねぇ、お兄ちゃん？」"
translation = "「아니아니! 그럴 리가 없잖아~! 후니 짱도 참, 재미있는 농담을 한다니까~! 아하핫♪ 그치, 오빠?」"

[[dialogue]]
speaker = "unk"
original = "フニは腕相撲負けなしなんだ"
translation = "후니는 팔씨름 져본 적이 없어."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「は？\u3000――流星寮で腕相撲大会があって、あのフィジカル最強のヒルディオーネ先輩にも勝った？\u3000……せ、戦闘服で、だよね？」"
translation = "「하? ――유성 기숙사에서 팔씨름 대회가 있어서, 그 피지컬 최강인 힐디오네 선배에게도 이겼다고? ……저, 전투복 입고였지?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「――違う？\u3000お互いに星力なしの、純粋フィジカル勝負だったって……ど、どういうことぉ！？」"
translation = "「――아니야? 서로 성력 없이 순수 피지컬 승부였다니…… 어, 어떻게 된 거야!?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「わたくしが来る前の話かしら？\u3000とっても興味深いわ♪」"
translation = "「제가 오기 전의 이야기일까요? 무척 흥미롭네요♪」"

[[dialogue]]
speaker = "unk"
original = "実際にフニと腕相撲してみたらわかる"
translation = "실제로 후니랑 팔씨름해보면 알 거야."

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「腕相撲ですか？\u3000はい、もちろんいいですよ♪」"
translation = "「팔씨름인가요? 네, 물론 좋아요♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「――あ、あたしは星力アリで？\u3000よ、よ～し……」"
translation = "「――나, 나는 성력 쓰고? 조, 좋아……」"

[[dialogue]]
speaker = "unk"
original = "そうして、フニが机に肘を乗せて差し出した手を、ルルカが取った途端。"
translation = "그렇게 후니가 책상에 팔꿈치를 올리고 내민 손을 루루카가 잡은 순간."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ハッ……！？」"
translation = "「핫……!?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "（ま、全く微動だにしない……！？\u3000ちょっと待って、何これ……！？）"
translation = "（저, 전혀 미동도 안 해……!? 잠깐만, 뭐야 이거……!?）"

[[dialogue]]
speaker = "unk"
original = "流星寮での腕相撲大会の時、俺もフニに挑戦した。その時に、フニの手を取って頭の中を過ぎったイメージは――"
translation = "유성 기숙사에서의 팔씨름 대회 때 나도 후니에게 도전했다. 그때 후니의 손을 잡고 머릿속을 스쳐 지나간 이미지는――"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「金剛力士像……！？」"
translation = "「금강역사상……!?」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「えいっ」"
translation = "「에잇.」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あぅっ」"
translation = "「아우윽.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「えへへ……どうでしょう？」"
translation = "「에헤헤…… 어때요?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ま、参りました……」"
translation = "「졌, 졌습니다……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「いや、ていうか、不死鳥関係なくこのパワーってどういうこと！？\u3000そっちの方が理由気になるんだけど！？」"
translation = "「아니, 그보다 불사조랑 상관없이 이 파워는 대체 뭐야!? 그쪽 이유가 더 궁금해지는데!?」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「う～ん」"
translation = "「으음.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「――私、生まれつき体が丈夫なので♪」"
translation = "「――저, 태어날 때부터 몸이 튼튼해서요♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「理由になってなくない！？\u3000そんな生まれつき『竜』のマムみたいなノリで言われても！」"
translation = "「전혀 이유가 안 되잖아! 그런 태어날 때부터 『용』인 마무 같은 느낌으로 말해도!」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「なるほど、わかったわ」"
translation = "「과연, 알겠어요.」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「え！？\u3000セッシーちゃん、わかったの！？」"
translation = "「에!? 세시 짱, 알겠어!?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「フニはやっぱり――」"
translation = "「후니는 역시――」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「内に大いなるママパワーを秘めているから、力持ちなのね！\u3000母は強しって言葉があるでしょう？」"
translation = "「안에 위대한 마마 파워를 비장하고 있기에 힘이 센 거네요! 어머니는 강하다는 말이 있잖아요?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「いや、その説明じゃ全然わからないんだけど！？」"
translation = "「아니, 그 설명으론 전혀 모르겠거든!?」"

[[dialogue]]
speaker = "unk"
original = "そんなわけで、フニの規格外のパワーについては、引き続き謎のままなのであった――"
translation = "그리하여 후니의 규격 외 파워에 대해서는 계속해서 수수께끼인 채로 남았다――"

