[[dialogue]]
speaker = "unk"
original = "第１話,完璧なるメイド,P"
translation = "제1화, 완벽한 메이드"

[[dialogue]]
speaker = "キリカ"
original = "「ふっ――」"
translation = "「훗――」"

[[dialogue]]
speaker = "キリカ"
original = "「……感心なされているようですが、この程度は当然です。メイドたる者、主人を守るためには戦闘もこなせなくてはなりませんから」"
translation = "「……감탄하신 모양입니다만, 이 정도는 당연합니다. 메이드란 자, 주인을 지키기 위해서라면 전투도 해낼 수 있어야 하니까요」"

[[dialogue]]
speaker = "キリカ"
original = "「メイドとは即ち、主のために全てを極めるもの。戦いとて例外ではありません」"
translation = "「메이드란 즉, 주인을 위해 모든 것을 통달하는 존재. 싸움이라 해도 예외는 아닙니다」"

[[dialogue]]
speaker = "unk"
original = "なぜキリカさんと一緒に戦っているかというと──"
translation = "왜 키리카 씨와 함께 싸우고 있느냐 하면──"

[[dialogue]]
speaker = "キリカ"
original = "「ごきげんよう。お嬢様がお世話になっております。お買い物でしょうか」"
translation = "「평안하신지요. 아가씨가 신세를 지고 있습니다. 장을 보러 오신 건가요?」"

[[dialogue]]
speaker = "キリカ"
original = "「私はこの近くに星見家のお屋敷で使っている紅茶のお店がありますので、茶葉を購入しに向かうところです」"
translation = "「저는 이 근처에 호시미 가문의 저택에서 사용하는 홍차 가게가 있어, 찻잎을 구매하러 가던 참입니다」"

[[dialogue]]
speaker = "キリカ"
original = "「……そんなにこちらをじっとご覧になって、どうされましたか？」"
translation = "「……그렇게 이쪽을 빤히 바라보시고, 무슨 일이신가요?」"

[[dialogue]]
speaker = "キリカ"
original = "「ああ、メイドが珍しいのですね。確かに、どの家庭にもいるものではありませんから」"
translation = "「아아, 메이드가 신기하신 거군요. 확실히, 어느 가정에나 있는 존재는 아니니까요」"

[[dialogue]]
speaker = "キリカ"
original = "「加えて私たちは星見家に仕えるために様々な訓練を積んだ精鋭。物珍しく思われるのも無理はないでしょう」"
translation = "「게다가 저희는 호시미 가문을 섬기기 위해 다양한 훈련을 쌓은 정예. 신기하게 여기시는 것도 무리는 아닐 테지요」"

[[dialogue]]
speaker = "キリカ"
original = "「方向が同じなら途中まで一緒に……？\u3000ええ、構いません」"
translation = "「방향이 같다면 도중까지 함께……? 네, 상관없습니다」"

[[dialogue]]
speaker = "キリカ"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "……"
translation = "……"

[[dialogue]]
speaker = "unk"
original = "…………"
translation = "…………"

[[dialogue]]
speaker = "unk"
original = "この辺よく来るんですか？"
translation = "이 근처 자주 오시나요?"

[[dialogue]]
speaker = "キリカ"
original = "「いえ、そんなに」"
translation = "「아니요, 그렇게 자주 오지는」"

[[dialogue]]
speaker = "unk"
original = "……"
translation = "……"

[[dialogue]]
speaker = "unk"
original = "…………"
translation = "…………"

[[dialogue]]
speaker = "unk"
original = "好きなお店とか……？"
translation = "좋아하는 가게라든가……?"

[[dialogue]]
speaker = "キリカ"
original = "「特にありません」"
translation = "「딱히 없습니다」"

[[dialogue]]
speaker = "unk"
original = "…………"
translation = "…………"

[[dialogue]]
speaker = "unk"
original = "……………………"
translation = "……………………"

[[dialogue]]
speaker = "キリカ"
original = "「モンスターの反応ですか。……近いようですね。私も助力させていただきます」"
translation = "「몬스터의 반응이군요. ……가까운 모양입니다. 저도 조력하도록 하겠습니다」"

[[dialogue]]
speaker = "unk"
original = "――というわけで今に至る。"
translation = "──라는 연유로 지금에 이르렀다."

[[dialogue]]
speaker = "unk"
original = "しまった、後ろから……！"
translation = "아차, 뒤에서……!"

[[dialogue]]
speaker = "キリカ"
original = "「失礼します」"
translation = "「실례하겠습니다」"

[[dialogue]]
speaker = "キリカ"
original = "「お礼は結構ですが、油断は禁物です」"
translation = "「감사는 괜찮습니다만, 방심은 금물입니다」"

[[dialogue]]
speaker = "キリカ"
original = "「拳を使った戦闘スタイルではインファイトになりがちですが、それは相手の懐に飛び込むと同時に、自らを危険に晒すことでもあります」"
translation = "「권법을 사용하는 전투 스타일은 인파이트가 되기 쉽습니다만, 그것은 상대의 품으로 뛰어드는 동시에 스스로를 위험에 노출시키는 것이기도 합니다」"

[[dialogue]]
speaker = "キリカ"
original = "「至近距離ではこちらは退きづらく、相手にとっても恰好の的です。一瞬の判断ミスが命取りになりますので注意してください」"
translation = "「지근거리에서는 이쪽에서 물러나기 어렵고, 상대에게 있어서도 좋은 표적입니다. 찰나의 판단 실수가 치명상이 되므로 주의해 주십시오」"

[[dialogue]]
speaker = "キリカ"
original = "「それに攻撃の際は顕著ですが、あなたの戦い方には隙があります」"
translation = "「게다가 공격할 때 현저히 드러납니다만, 당신의 싸움 방식에는 빈틈이 있습니다」"

[[dialogue]]
speaker = "キリカ"
original = "「気を張り巡らせて相手の動きを察知しつつ、戦いの盤面の上で自身を俯瞰し、敵味方の行動を予測することが肝要です」"
translation = "「신경을 곤두세워 상대의 움직임을 감지하면서, 전투의 국면 위에서 자신을 조감하고, 적과 아군의 행동을 예측하는 것이 긴요합니다」"

[[dialogue]]
speaker = "キリカ"
original = "「……出過ぎた発言、失礼いたしました。私は指導する立場ではありませんので」"
translation = "「……주제넘은 발언, 실례했습니다. 저는 지도하는 입장이 아니기에」"

[[dialogue]]
speaker = "キリカ"
original = "「講釈を垂れる気はありません。用事の途中ですし、手早く済ませましょう」"
translation = "「강의를 늘어놓을 생각은 없습니다. 용무 중이기도 하니, 서둘러 끝내도록 하죠」"

[[dialogue]]
speaker = "キリカ"
original = "「モンスターの全滅を確認。お疲れ様でした」"
translation = "「몬스터의 전멸을 확인. 수고하셨습니다」"

[[dialogue]]
speaker = "unk"
original = "（ほとんどキリカさんが倒してしまった……）"
translation = "(거의 키리카 씨가 쓰러뜨려 버렸어……)"

[[dialogue]]
speaker = "キリカ"
original = "「では私はお店に向かいますので、これで──」"
translation = "「그럼 저는 가게로 향할 테니, 이만──」"

[[dialogue]]
speaker = "キリカ"
original = "「？\u3000何か仰りたいご様子ですが。お嬢様への言伝でしょうか？」"
translation = "「? 뭔가 말씀하고 싶으신 모양입니다만. 아가씨께 전하실 말씀이라도 있나요?」"

[[dialogue]]
speaker = "unk"
original = "師匠と呼ばせてください！"
translation = "스승님이라고 부르게 해주세요!"

[[dialogue]]
speaker = "キリカ"
original = "「……師匠？」"
translation = "「……스승님?」"

[[dialogue]]
speaker = "キリカ"
original = "「そう呼ばれるのは構いませんが、私は弟子をとるつもりはありません」"
translation = "「그렇게 불리는 것은 상관없습니다만, 저는 제자를 들일 생각은 없습니다」"

[[dialogue]]
speaker = "キリカ"
original = "「お嬢様のお世話や新人のメイドの教育もありますので、申し訳ありませんが、私にそのような時間は──」"
translation = "「아가씨를 보필하는 일이나 신입 메이드 교육도 있으니, 죄송합니다만 제게 그런 시간은──」"

[[dialogue]]
speaker = "フィオナ"
original = "「ちょっと待って、キリカ」"
translation = "「잠깐 기다려, 키리카」"

[[dialogue]]
speaker = "キリカ"
original = "「お嬢様……？」"
translation = "「아가씨……?」"

