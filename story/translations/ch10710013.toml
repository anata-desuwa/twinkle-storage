[[dialogue]]
speaker = "unk"
original = "第３話,戸惑うキサナ,P"
translation = "제3화, 당황하는 키사나, P"

[[dialogue]]
speaker = "キサナ"
original = "「もしあの家を追い出されたらここで寝りゃいい。ここの芝生は柔らかくてかなり寝心地が──……って」"
translation = "「만약 그 집에서 쫓겨나면 여기서 자면 돼. 여기 잔디는 부드러워서 꽤 잠자리가──…… 어라」"

[[dialogue]]
speaker = "キサナ"
original = "「魔王じゃねえか。ガキども引き連れて何やってんだ？\u3000まさかコイツみてえなヤツらを集め回ってんじゃねえだろうな？」"
translation = "「마왕이잖아. 꼬맹이들 이끌고 뭐 하고 있는 거야? 설마 이 녀석 같은 놈들을 모으고 다니는 건 아니겠지?」"

[[dialogue]]
speaker = "unk"
original = "みんな施設の子たちだよ"
translation = "모두 시설 아이들이야."

[[dialogue]]
speaker = "キサナ"
original = "「施設って例の？\u3000まさかオマエ……アタシを説得するために施設を見に行ったってのか？」"
translation = "「시설이라면 그 시설? 설마 네놈…… 나를 설득하려고 시설을 보러 간 거냐?」"

[[dialogue]]
speaker = "キサナ"
original = "「チッ、んなことしてもアタシの意志は変わんねえよ。そーいうとこはな。外面だけはいつもよくしてんだ」"
translation = "「칫, 그런 짓을 해도 내 의지는 안 변해. 그런 곳은 말이야, 겉모습만은 언제나 잘 해 둔다고」"

[[dialogue]]
speaker = "キサナ"
original = "「どうせコイツらも裏で施設のオトナに殴られたりして──ひぃあんっ！？\u3000ちょっ、ガキども人の尻尾触んな……！！」"
translation = "「어차피 이 녀석들도 뒤에서 시설 어른들한테 맞거나── 히익!? 야 꼬맹이들 남의 꼬리 만지지 마……!!」"

[[dialogue]]
speaker = "キサナ"
original = "「あっ、コラ、ひぃあっ、引っ張んなっ……！\u3000耳は、くははっ、やめっ、くすぐったっ……！」"
translation = "「앗, 야, 히익, 잡아당기지 마……! 귀는, 쿠하핫, 하지 마, 간지러워……!」"

[[dialogue]]
speaker = "キサナ"
original = "「やめ、いい加減にしねえと、んにゃあああっっ、ぶっ殺すぞっ……！」"
translation = "「그만, 적당히 안 하면, 냐아아아아앗, 죽여버린다……!」"

[[dialogue]]
speaker = "unk"
original = "元気いっぱいで楽しそうだろ？"
translation = "활기차고 즐거워 보이지?"

[[dialogue]]
speaker = "キサナ"
original = "「はぁーっ、はぁーっ、あぁ？\u3000確かに……まぁ。殴られたりしてるようには見えねえがよ……」"
translation = "「하아- 하아- 아아? 확실히…… 뭐. 맞거나 하는 것처럼은 안 보이지만 말이야……」"

[[dialogue]]
speaker = "キサナ"
original = "「ん？\u3000なんだガキ？\u3000コイツらと一緒に遊びたいってか？\u3000チッ、勝手にすりゃいいじゃねえか。いちいちアタシに聞くなよ」"
translation = "「응? 왜 그래 꼬맹아? 이 녀석들이랑 같이 놀고 싶다고? 칫, 마음대로 하든가. 일일이 나한테 묻지 마」"

[[dialogue]]
speaker = "キサナ"
original = "「アタシも一緒に？\u3000んなもん嫌に決まって──ふにゃっ！？\u3000だからことあるごとに尻尾を引っ張んなっ！\u3000遊べばいいんだろ、遊べばっ……！」"
translation = "「나도 같이? 그런 거 싫은 게 당연── 후냐앗!? 그러니까 틈만 나면 꼬리 잡아당기지 말라고! 놀면 되잖아, 놀면……!」"

[[dialogue]]
speaker = "キサナ"
original = "「そっちのお兄ちゃんもって……おいおい。バカ言ってんじゃねえよ。アイツとアタシは敵同士っつったろ？」"
translation = "「저쪽 오빠도 같이 라니…… 어이 어이. 바보 같은 소리 하지 마. 저 녀석이랑 나는 적이라니까?」"

[[dialogue]]
speaker = "キサナ"
original = "「敵同士で仲良くお遊びなんかするわきゃねえだろ。アタシもアイツもそこまで頭ん中お花畑じゃねーっつの」"
translation = "「적끼리 사이좋게 놀이 같은 걸 할 리가 없잖아. 나나 저 녀석이나 그렇게까지 머릿속이 꽃밭인 건 아니라고」"

[[dialogue]]
speaker = "unk"
original = "まずはかくれんぼからだ！"
translation = "우선은 숨바꼭질부터다!"

[[dialogue]]
speaker = "キサナ"
original = "「遊ぶ気満々かよ！？\u3000少しは緊張感ってもんを持てやテメエ！？」"
translation = "「놀 생각 만만이냐!? 조금은 긴장감이라는 걸 좀 가져라 네놈은!?」"

[[dialogue]]
speaker = "キサナ"
original = "「つか、かくれんぼだぁ？\u3000上等だよ。いい加減、オマエらから逃げ隠れするのにも飽き飽きしてきた頃だ」"
translation = "「그보다 숨바꼭질이라고? 좋지. 슬슬 너희한테 도망 다니고 숨는 것도 지겨워지던 참이다」"

[[dialogue]]
speaker = "キサナ"
original = "「今度はアタシが徹底的にテメエを追い回してやるよ！\u3000隠れられるもんなら隠れてみやがれ！」"
translation = "「이번엔 내가 철저하게 네놈을 쫓아다녀 주지! 숨을 수 있으면 숨어 보라고!」"

[[dialogue]]
speaker = "キサナ"
original = "「はっ、口ほどにもねえな。魔王もガキどももまとめて捕まえてやったぜ」"
translation = "「핫, 입만 살았구만. 마왕도 꼬맹이들도 몽땅 잡아버렸다고」"

[[dialogue]]
speaker = "キサナ"
original = "「大体アタシから逃げ隠れしよーってんのが間違いなんだ。足音でわかんだ、足音で」"
translation = "「애초에 나한테서 도망가 숨겠다는 것부터가 잘못이라고. 발소리로 안단 말이야, 발소리로」"

[[dialogue]]
speaker = "キサナ"
original = "「この耳は飾りじゃねえ。テメエら星騎士の足音を聞きゃあピンとくるからな。逃げるのも追うのも自由自在だ。目や鼻も利くしよ」"
translation = "「이 귀는 장식이 아냐. 너희 성기사들의 발소리를 들으면 감이 오거든. 도망치는 것도 쫓는 것도 자유자재라고. 눈이나 코도 밝고 말이야」"

[[dialogue]]
speaker = "キサナ"
original = "「ガキといる時は油断しちまってたが、気を張ってりゃ足音と匂いでわかるから、テメエらに見つからないで済む──」"
translation = "「꼬맹이랑 있을 때는 방심해 버렸지만, 정신 바짝 차리고 있으면 발소리와 냄새로 알 수 있으니까 네놈들한테 들키지 않고 끝난──」"

[[dialogue]]
speaker = "キサナ"
original = "「って、ヤベっ。うっかりばらしちまった！？」"
translation = "「엇, 시발. 얼떨결에 다 불어버렸네!?」"

[[dialogue]]
speaker = "キサナ"
original = "「今のはなしだ、なし！\u3000忘れねえとぶっ殺すぞ！」"
translation = "「방금 건 없던 거다, 없던 거! 안 잊으면 죽여버린다!」"

[[dialogue]]
speaker = "unk"
original = "わかった忘れる"
translation = "알았어 잊을게."

[[dialogue]]
speaker = "キサナ"
original = "「いや、アホか！？\u3000貴重なアタシの情報だろ！？\u3000そこは忘れんなよ！？」"
translation = "「아니, 바보냐!? 귀중한 내 정보라고!? 거긴 잊지 말라고!?」"

[[dialogue]]
speaker = "キサナ"
original = "「いったいどんだけ頭沸いてんだよ……。お尋ね者が目の前にいるってのにお仲間に連絡取ってる様子もねえしよ」"
translation = "「대체 얼마나 머리가 꽃밭인 거야……. 지명수배자가 눈앞에 있는데도 동료한테 연락하는 기색도 없고 말이야」"

[[dialogue]]
speaker = "キサナ"
original = "「ガキどもと遊んでるからって一時休戦のつもりか？\u3000ま……別にそっちがその気ならいいけどよ。アタシも上からの指示がなきゃケンカふっかけるつもりもねえし」"
translation = "「꼬맹이들이랑 놀고 있다고 일시 휴전이라도 할 셈이냐? 뭐…… 딱히 저쪽이 그럴 생각이라면 상관없지만. 나도 위에서 지시가 없으면 싸움을 걸 생각은 없으니」"

[[dialogue]]
speaker = "キサナ"
original = "「だけど何が悲しくて魔王と肩を並べてガキどもと遊ばなきゃなんねーんだ……。アタシもどーかしてたぜ……」"
translation = "「하지만 뭐가 아쉬워서 마왕이랑 어깨를 나란히 하고 꼬맹이들이랑 놀아야 하는 건지…… 나도 어떻게 됐었나 보군……」"

[[dialogue]]
speaker = "キサナ"
original = "「おいガキ。そろそろ帰るぞ。……あぁ？\u3000まだ遊びたいだぁ？\u3000チッ……んだよ楽しそうにしやがって」"
translation = "「야 꼬맹이. 슬슬 돌아간다. ……아아? 더 놀고 싶다고? 칫…… 뭐야 즐거워 보이고 말이야」"

[[dialogue]]
speaker = "キサナ"
original = "「んな顔、今までしてなかったじゃねえか……。んな能天気な顔してたら生き残れねえっつーの……」"
translation = "「그런 표정, 지금까지 안 했었잖아……. 그런 태평한 얼굴 하고 있으면 살아남지 못한다고……」"

[[dialogue]]
speaker = "キサナ"
original = "「施設のガキどももアホ面晒して駆け回ってやがるし……。んな良いトコなのかよ、その保護施設ってのは……」"
translation = "「시설 꼬맹이들도 바보 같은 면상으로 뛰어다니고 있고 말이야……. 그렇게 좋은 곳인 거냐, 그 보호 시설이라는 건……」"

[[dialogue]]
speaker = "unk"
original = "少しは印象が変わった？"
translation = "조금은 인상이 변했어?"

[[dialogue]]
speaker = "キサナ"
original = "「っ！\u3000うるせえなっ。テメエは黙ってろ。どー思うかはアタシの勝手だろっ！」"
translation = "「! 시끄러워. 네놈은 닥치고 있어. 어떻게 생각하든 내 마음이잖아!」"

[[dialogue]]
speaker = "キサナ"
original = "「テメエのことはテメエで決める。他人の言うことなんざ信用ならねえ」"
translation = "「내 일은 내가 정해. 타인의 말 따위는 신용할 수 없어」"

[[dialogue]]
speaker = "キサナ"
original = "「アタシはそういう世界で生きてきたんだ。誰かに守ってもらおうなんて甘い考えしてたらあっという間にやられちまう世界でな」"
translation = "「나는 그런 세계에서 살아왔다고. 누군가에게 도움받으려 하는 안일한 생각을 했다간 눈 깜짝할 새 당해버리는 세계에서 말이야」"

[[dialogue]]
speaker = "キサナ"
original = "「だからオマエがどれだけ理屈並べても──……」"
translation = "「그러니 네가 아무리 논리를 펼쳐도──……」"

[[dialogue]]
speaker = "キサナ"
original = "「いや……ここはアタシの住んでた場所じゃねえんだよな。あのガキを縛り付けてんのはアタシの方……か……」"
translation = "「아니…… 여기는 내가 살던 곳이 아니지. 저 꼬맹이를 묶어두고 있는 건 나인가……」"

[[dialogue]]
speaker = "キサナ"
original = "「……なんでもねえよ。なんでもねえっつってんだろ！」"
translation = "「……아무것도 아냐. 아무것도 아니라고 했잖아!」"

[[dialogue]]
speaker = "キサナ"
original = "「おい、ガキ。やっぱ今日は帰るぞ。そろそろ行かねえと弁当にもありつけねえ」"
translation = "「야, 꼬맹이. 역시 오늘은 돌아간다. 슬슬 안 가면 도시락도 못 구한다고」"

[[dialogue]]
speaker = "キサナ"
original = "「……あ？\u3000今度は妙に素直じゃねえか。おい、テメエ……まさかアタシの顔色窺ってんじゃねえだろうな？」"
translation = "「……아? 이번엔 묘하게 순순하네. 야, 너…… 설마 내 눈치 살피는 건 아니겠지?」"

[[dialogue]]
speaker = "キサナ"
original = "「アタシはな、そういう誰かに媚びた顔は嫌いなんだよ」"
translation = "「나는 말이지, 그렇게 누군가에게 아부하는 얼굴은 질색이라고」"

[[dialogue]]
speaker = "キサナ"
original = "「テメエのことはテメエで決めろっていつも言ってんだろ。遊びてえなら遊びてえって言え」"
translation = "「네 일은 네가 정하라고 항상 말했잖아. 놀고 싶으면 놀고 싶다고 말해」"

[[dialogue]]
speaker = "キサナ"
original = "「そうだ。それでいいんだ、バカ野郎が。はいはい、アタシも一緒にな。わーったから引っ張んなって」"
translation = "「그래. 그거면 된 거야, 바보 녀석아. 네네, 나도 같이 가마. 알았으니까 잡아당기지 마」"

[[dialogue]]
speaker = "キサナ"
original = "「……んだよ魔王？\u3000ニヤニヤ気持ち悪い笑顔浮かべやがってムカつくぜ」"
translation = "「……뭐야 마왕? 히죽히죽 기분 나쁜 웃음 짓고 자빠졌고 짜증 나게」"

[[dialogue]]
speaker = "キサナ"
original = "「っしゃあガキども。今度はボール遊びだ。あの上から目線の星騎士さまにボールぶつけて、あの顔思い切り歪ませてやっぞ！」"
translation = "「좋아 꼬맹이들. 이번엔 공놀이다. 저 거만한 성기사 나으리한테 공을 던져서 그 면상을 확 일그러뜨려 주자고!」"

