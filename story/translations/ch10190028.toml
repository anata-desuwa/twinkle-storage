[[dialogue]]
speaker = "unk"
original = "──想像してみて欲しい。リボンでぐるぐる巻きになった恋人が、天井から吊るされている場面に居合わせた俺の気持ちを。"
translation = "──상상해 보길 바란다. 리본으로 칭칭 감긴 연인이 천장에 매달려 있는 장면을 마주한 내 기분을."

[[dialogue]]
speaker = "クロト"
original = "「一応聞くんだけど……いったい何をしててこうなった？」"
translation = "「일단 묻겠는데…… 대체 뭘 하다가 이렇게 된 거야?」"

[[dialogue]]
speaker = "せつな"
original = "「うぅ。面目ないでござる……せつな、バレンタインフォームで拘束忍術の鍛錬をしていたのでござる……」"
translation = "「으으. 면목 없소…… 세츠나, 발렌타인 폼으로 구속 인술 단련을 하고 있었소……」"

[[dialogue]]
speaker = "せつな"
original = "「途中で術式を誤ってしまい、体の色々なところにリボンが絡んで……もがくほどに術中にはまり、このようなことに～」"
translation = "「도중에 술식을 실수해서 몸 곳곳에 리본이 얽히는 바람에…… 발버둥 칠수록 술법에 빠져들어 이런 꼴이~」"

[[dialogue]]
speaker = "unk"
original = "拘束忍術の練習でどうしてこんな体位になるのかわからない……おっぱいとかあそことか見えちゃいけないものが見えまくっている……！"
translation = "구속 인술 연습을 하는데 왜 이런 체위가 되는 건지 모르겠다…… 가슴이나 거기라든가, 보이면 안 되는 것들이 잔뜩 보이고 있어……!"

[[dialogue]]
speaker = "クロト"
original = "「なるほど。それで、助けて欲しいから俺を呼んだ、と」"
translation = "「그렇군. 그래서 도와달라고 나를 부른 거구나.」"

[[dialogue]]
speaker = "せつな"
original = "「──いえ！\u3000主様をお呼びしたのはまた別の理由にござりまする！！」"
translation = "「──아니오! 주님을 부른 것은 또 다른 이유 때문이오!!」"

[[dialogue]]
speaker = "せつな"
original = "「転んでもただでは起きるな、が師の教えでござる！\u3000どうかこのまま、せつなを手籠めにしてはくださりませぬかっ？」"
translation = "「넘어져도 그냥 일어나지 마라, 가 스승님의 가르침이오! 부디 이대로 세츠나를 겁탈해 주시지 않겠소?」"

[[dialogue]]
speaker = "せつな"
original = "「拘束忍術の失敗を、房中術の訓練ということで上書きするでござるっ！\u3000我ながら名案でござる～♪」"
translation = "「구속 인술의 실패를 방중술 훈련으로 덮어씌우는 것이오! 나름대로 명안이지 않소~♪」"

[[dialogue]]
speaker = "unk"
original = "相変わらず独特な感性……でもせつなが望むのであれば、付き合うのもやぶさかではない。だけど──"
translation = "여전히 독특한 감성…… 하지만 세츠나가 원한다면 어울려 주는 것도 나쁘지 않다. 하지만──"

[[dialogue]]
speaker = "クロト"
original = "「覚悟しろよ？\u3000自分の忍術で動けなくなっちゃうダメ忍者には、きついお仕置きをしちゃうからな？」"
translation = "「각오하라고? 자기 인술에 걸려 움직이지도 못하게 된 덜렁이 닌자에게는 혹독한 벌을 줄 테니까.」"

[[dialogue]]
speaker = "せつな"
original = "「にゃ、にゃにゃぁ～……！\u3000主様のおち○ちん、も、もうすごいことになってるでござる……<emoji=heart04>」"
translation = "「냐, 냐냐아~……! 주님의 자지, 버, 벌써 굉장한 상태가 되었소……<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
original = "「は、はうぅ……硬く反りかえって……せつなのお尻に熱いのが当たって……<emoji=heart04>」"
translation = "「하, 하우으…… 딱딱하게 휘어져서…… 세츠나의 엉덩이에 뜨거운 게 닿아서……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「せつなのおま○こも、もうびしょびしょに濡れてるぞ？\u3000エッチな格好で宙吊りになるの、そんなに興奮するのか？」"
translation = "「세츠나의 보지도 벌써 축축하게 젖어 있는데? 야한 차림으로 공중에 매달리는 게 그렇게 흥분돼?」"

[[dialogue]]
speaker = "unk"
original = "亀頭でくちゅくちゅとおま○この入り口をいじるようにほぐす。"
translation = "귀두로 구덕구덕 보지 입구를 만지작거리며 풀어준다."

[[dialogue]]
speaker = "せつな"
original = "「ふ、ふにゃぁあっ！？<emoji=heart04>\u3000おち○ちんですりすりするの、だ、ダメでござるぅっ<emoji=heart04>\u3000んにゃぁっ<emoji=heart04>」"
translation = "「후, 후냐아앗!?<emoji=heart04> 자지로 비비는 거, 안, 안 되오오앗<emoji=heart04> 으냐아앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ダメなんて言える身分じゃないだろ？\u3000せつなは今から何をされるんだっけ」"
translation = "「안 된다고 말할 처지가 아닐 텐데? 세츠나는 지금부터 뭘 당하기로 했더라?」"

[[dialogue]]
speaker = "せつな"
original = "「ふ、ふぅうっ<emoji=heart04>\u3000お、お仕置きでござるぅっ……忍術に失敗して、主様の手を煩わせた、ダメダメ忍者だからあっ……」"
translation = "「후, 후우웃<emoji=heart04> 버, 벌을 받는 것이오오옷…… 인술에 실패해서 주님을 번거롭게 해드린, 부족한 닌자니까앗……」"

[[dialogue]]
speaker = "せつな"
original = "「主様のおっきなおち○ちんで、できの悪いせつなのおま○こ、叱ってもらうのでござる……<emoji=heart04>」"
translation = "「주님의 커다란 자지로, 실력 없는 세츠나의 보지, 혼내주시는 것이오……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「よくわかってるな。今からせつなの大好きなコレでいっぱい躾けてやるけど、許可なしでイっちゃダメだぞ」"
translation = "「잘 알고 있네. 지금부터 세츠나가 제일 좋아하는 이걸로 잔뜩 길들여 줄 테니까, 허락 없이 가버리면 안 돼.」"

[[dialogue]]
speaker = "せつな"
original = "「ふ、ふぇえっ……！？\u3000そそそ、そんなっ。せつな無理でござるっ！\u3000主様とまぐわうと、すぐにイっちゃうのにっ……」"
translation = "「후, 후에엣……!? 그그그, 그건. 세츠나 무리요! 주님과 교합하면 금방 가버리는데……」"

[[dialogue]]
speaker = "せつな"
original = "「それに、ほ、ほらっ。この通り身動きもとれぬ体勢ゆえ、快楽も逃がせないでござるっ……防御力ゼロの忍者にござるっ、だから──」"
translation = "「게다가, 보, 보시오! 이처럼 꼼짝도 할 수 없는 자세라 쾌락도 흘려보낼 수 없소…… 방어력 제로인 닌자요, 그러니까──」"

[[dialogue]]
speaker = "クロト"
original = "「訓練しがいがあるってことだな。お望み通り『手籠め』にしてやる」"
translation = "「훈련할 맛이 난다는 뜻이네. 원하는 대로 『겁탈』해 줄게.」"

[[dialogue]]
speaker = "せつな"
original = "「あぁあぁっ、待って欲しいでござる主様ぁっ！\u3000まだ心の準備が──」"
translation = "「아아아앗, 기다려 주시오 주님! 아직 마음의 준비가──」"

[[dialogue]]
speaker = "unk"
original = "ちょうど俺の腰の高さでふりふりと揺れるお尻をぐっと掴んで、反りかえったペニスを一気に根元まで挿入した。"
translation = "마침 내 허리 높이에서 살랑살랑 흔들리는 엉덩이를 꽉 붙잡고, 빳빳하게 선 페니스를 단번에 뿌리까지 삽입했다."

[[dialogue]]
speaker = "せつな"
original = "「くっはあぁ、ぁぁぁあ～っ……！<emoji=heart04>」"
translation = "「큿하아아, 아아아아~앗……!<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
original = "「ふぅ、んんぅっ……んんぅ～っ<emoji=heart04>\u3000主様のおち○ちん、い、いいぃ、一気に奥まで入っちゃったで、ござるぅっ……んんぁあっ<emoji=heart04>」"
translation = "「후으, 응으읏…… 응으으~읏<emoji=heart04> 주님의 자지, 거, 거어, 단번에 안쪽까지 들어와 버렸소오옷…… 응응아앗<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
original = "「あ、熱々で、ガチガチぃっ……せつなのおま○こ、や、やけどしちゃいそうでござる、ぅっ……んん、ぅっ……<emoji=heart04>」"
translation = "「뜨거워서, 꽉꽉 조여서…… 세츠나의 보지, 데, 데어버릴 것 같소, 오읏…… 응응, 읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ぎちゅぎちゅと締め付けてくるせつなのおま○こ。気を抜けば躾ける側のこちらが搾り取られてしまいそうだ。"
translation = "질척질척하게 조여오는 세츠나의 보지. 방심하면 길들이는 쪽인 내가 오히려 착취당해 버릴 것 같다."

[[dialogue]]
speaker = "せつな"
original = "「は、ぁ、ぁあっ……主様のおち○ちん、いつもと感触が違う気がっ……するで、ござるぅっ……は、ぁあ、あぁあっ……<emoji=heart04>」"
translation = "「하, 아, 아앗…… 주인님의 자지, 평소랑 감촉이 다른 기분이…… 드는, 것이오…… 하, 아아, 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「宙吊りのまま串刺しにされる気分はどう？」"
translation = "「공중에 매달린 채로 꿰뚫리는 기분은 어때?」"

[[dialogue]]
speaker = "せつな"
original = "「すごく深くまでっ……おへその裏のあたりまで、ぐりぐりと入ってる気が、してぇっ……は、はぅ、んぅうっ……<emoji=heart04>」"
translation = "「엄청 깊은 곳까지…… 배꼽 뒤쪽 근처까지, 그리그리하고 들어오는 기분이, 들어서어…… 하, 하우, 응으읏……<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
original = "「こ、これはまずい気が、するでござるぅっ……んんぅ、おま○この、せつなが鍛えていないところに、当たっているようなっ……<emoji=heart04>」"
translation = "「이, 이건 위험한 기분이, 드는 것이오…… 응응으, 보지의, 세츠나가 단련하지 않은 곳에, 닿고 있는 듯한……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「なるほど。このあたりか？」"
translation = "「그렇군. 이 근처인가?」"

[[dialogue]]
speaker = "せつな"
original = "「あ、ぁ、あっ<emoji=heart04>\u3000おち○ちんが、今当たってるそこ、そこヤバイでござるっ<emoji=heart04>\u3000絶対、絶対気持ちいいところでござるからっ──」"
translation = "「아, 아, 앗<emoji=heart04> 자지가, 지금 닿고 있는 거기, 거기 위험한 것이오<emoji=heart04> 절대, 절대 기분 좋은 곳이니까아──」"

[[dialogue]]
speaker = "せつな"
original = "「にゃっ──にゃぁあぁあぁ～っ！？<emoji=heart04>\u3000あ、あっあっあっ<emoji=heart04>\u3000ひにゃあ、ぁ、あぁあ～っ<emoji=heart04>」"
translation = "「냐앗──냐아아아아~앗!?<emoji=heart04> 아, 앗앗앗<emoji=heart04> 히냐아, 아, 아아아~앗<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
original = "「あ、あぁあ、あるじしゃまっ<emoji=heart04>\u3000そんな、んんぅっ、ぐりぐりって、子宮の入り口、突かれたら、ひ、ひぅうっ<emoji=heart04>\u3000ひぅう～っ！<emoji=heart04>」"
translation = "「아, 아아아, 주인니임<emoji=heart04> 그런, 응응으, 그리그리하고, 자궁 입구, 찔려버리면, 히, 히우우<emoji=heart04> 히우우~앗!<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リボンに釣られたせつなが、ばたばたもじもじと動いている──よほど快楽が強いらしい。もっと突いてあげよう。"
translation = "리본에 매달린 세츠나가, 파닥파닥 몸부림치며 움직이고 있다── 제법 쾌락이 강한 모양이다. 좀 더 찔러 주자."

[[dialogue]]
speaker = "せつな"
original = "「んんっ<emoji=heart04>\u3000んぅっ<emoji=heart04>\u3000んぁ、あ、ぁ、ああぁっ<emoji=heart04>\u3000よ、容赦ないでござる、ぅうっ<emoji=heart04>\u3000せつなの弱点を、的確にぃっ……！<emoji=heart04>」"
translation = "「응응<emoji=heart04> 응윽<emoji=heart04> 응아, 아, 아, 아아앗<emoji=heart04> 요, 용서 없는 것이오, 우웃<emoji=heart04> 세츠나의 약점을, 정확하게에……!<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「お仕置きだからな。ほら、強く押し込むけどイっちゃだめだぞ」"
translation = "「벌을 주는 거니까 말이야. 자, 강하게 밀어 넣을 테니까 가버리면 안 된다고」"

[[dialogue]]
speaker = "せつな"
original = "「んんんぅ～っ！<emoji=heart04>\u3000あ、無理無理っ<emoji=heart04>\u3000無理でござるっ──ぁあ、あ、あ、ぁ──！<emoji=heart04>」"
translation = "「응응응으~읏!<emoji=heart04> 아, 무리무리<emoji=heart04> 무리인 것이오──아아, 아, 아, 아──!<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
original = "「ふにゃっ──あ、あ、あぁあ～っ……！<emoji=heart04>」"
translation = "「후냐앗──아, 아, 아아아~앗……!<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ピストンをしているペニスに、せつなが軽く絶頂した震えがびくびくと伝わってきた。"
translation = "피스톤질을 하는 페니스에, 세츠나가 가볍게 절정하며 떨리는 전율이 움찔움찔 전해져 왔다."

[[dialogue]]
speaker = "unk"
original = "いつもより随分早い。宙吊りで突かれるの、よほど快感が強いみたいだ。"
translation = "평소보다 훨씬 빠르다. 공중에 매달려 찔리는 게, 제법 쾌감이 강한 모양이다."

[[dialogue]]
speaker = "クロト"
original = "「今、イった？」"
translation = "「방금, 갔어?」"

[[dialogue]]
speaker = "せつな"
original = "「も、申し訳っ……あ、あひぃっ<emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000イっちゃったでござるぅ～っ……<emoji=heart04>」"
translation = "「조, 죄송…… 아, 아히잇<emoji=heart04> 응응으잇<emoji=heart04> 가버린 것이오~옷……<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
original = "「気持ちいい波が来て、いつもなら受け流せるはずがっ……んんぅ、はっ、ぁあ、ぁぅ、んんぅ、ふぅうあ、ぁああっ<emoji=heart04>」"
translation = "「기분 좋은 파도가 밀려와서, 평소라면 흘려보낼 수 있었을 텐데…… 응응으, 핫, 아아, 아우, 응응으, 후우아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
original = "「この体勢、ま、まずいでござるっ……気持ちいいの全然逃がせなくてっ……ふぅ、んんぅ、んんぅっ、あ、あぁっ<emoji=heart04>」"
translation = "「이 자세, 위, 위험한 것이오…… 기분 좋은 걸 전혀 흘려보내지 못해서…… 후우, 응응으, 응응으읏, 아, 아앗<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
original = "「きゅ、休憩っ……！\u3000休憩が欲しいで、ござるっ……主様っ……んんぅっ！<emoji=heart04>」"
translation = "「휴, 휴식……! 휴식이 필요하오, 주인님…… 응응으읏!<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「せつなは房中術が得意なんだろ？\u3000大丈夫大丈夫。すぐにコツを掴めるよ」"
translation = "「세츠나는 방중술이 특기잖아? 괜찮아, 괜찮아. 금방 요령을 잡을 수 있을 거야」"

[[dialogue]]
speaker = "せつな"
original = "「そんな殺生なぁっ！？<emoji=heart04>\u3000おち○ちんで突かれるたびっ、んんんっ<emoji=heart04>\u3000おま○こ、ビクビクしちゃってるのでござる、んんぁああっ<emoji=heart04>」"
translation = "「그런 살생을 하시다닛!?<emoji=heart04> 자지가 찔러올 때마다, 응응응<emoji=heart04> 보지, 파들파들 떨려버리는 것이오, 응아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「泣き言はダメだろ？\u3000せつなは魔王に仕える従者なんだから。敵に捕まってこのプレイをされたらどうするんだ？」"
translation = "「약한 소리 하면 안 되지? 세츠나는 마왕을 섬기는 종자니까. 적에게 잡혀서 이런 플레이를 당하면 어떡할 거야?」"

[[dialogue]]
speaker = "クロト"
original = "「あっという間におま○こ堕ちして、敵のおち○ちんに降参しちゃうのか？」"
translation = "「순식간에 보지 타락해서, 적의 자지에 항복해버릴 건가?」"

[[dialogue]]
speaker = "せつな"
original = "「いいい、イジワルでござるよぅっ！\u3000せつな、主様以外のおち○ちんで感じたりしないでござるっ──ぁ、ぁ、あ、あ、あぁあっ<emoji=heart04>」"
translation = "「이이이, 심술궂으시오! 세츠나, 주님 이외의 자지로 느껴버리거나 하지 않소──아, 아, 아, 아, 아앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「本当かな？\u3000弱いところツンツンされたら、すぐイっちゃいたくなる雑魚おま○こみたいだけど？」"
translation = "「과연 그럴까? 약한 곳을 쿡쿡 찔리면, 금방 가버리고 싶어 하는 잡어 보지 같은데?」"

[[dialogue]]
speaker = "せつな"
original = "「そんなことないでござるっ、大好きな主様だからっ、んんっ<emoji=heart04>\u3000感じちゃうだけでっ──んんぁ<emoji=heart04>」"
translation = "「그럴 리 없소, 정말 좋아하는 주님이니까, 응윽<emoji=heart04> 느껴버리는 것뿐이라──응아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "宙吊りでピストンされながらおま○こを濡らすせつな。"
translation = "공중에 매달린 채 피스톤질 당하며 보지를 적시는 세츠나."

[[dialogue]]
speaker = "unk"
original = "突いているうちに、俺の胸中にもどんどんいじめっ子のスイッチが入っていく──力任せに勃起で彼女の膣内をえぐってみると。"
translation = "찌르는 동안, 내 흉중에도 점점 괴롭히고 싶은 스위치가 들어간다──힘껏 발기한 성기로 그녀의 질 내부를 헤집어보자."

[[dialogue]]
speaker = "せつな"
original = "「ななめ下から、突き上げるみたいにっ──んんぅ、おっ<emoji=heart04>\u3000お、ぉおお、ぉおっ……！<emoji=heart04>\u3000そ、それも気持ちいいでござる、ぅ、ぅう～っ<emoji=heart04>」"
translation = "「비스듬히 아래에서, 치올리는 것처럼──응으, 오<emoji=heart04> 오, 오오오, 오옷……!<emoji=heart04> 그, 그것도 기분 좋소, 으, 으으~윽<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「何でも感じちゃうんだな、せつなって。でもイっちゃダメだぞ。イったらもっと強く乱暴しちゃうからな？」"
translation = "「뭐든지 느껴버리는구나, 세츠나는. 하지만 가버리면 안 돼. 가버리면 더 강하고 난폭하게 해버릴 거니까?」"

[[dialogue]]
speaker = "せつな"
original = "「お、ぉ、ぉ、ぉ、ぉっ<emoji=heart04>\u3000な、情けが欲しいでござるっ、手加減、どうか手加減──ぉお、ぉおぉっ！？<emoji=heart04>」"
translation = "「오, 오, 오, 오, 옷<emoji=heart04> 자, 자비를 베풀어 주시오, 살살, 제발 살살──오오, 오오옷!?<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "突くたびにおま○こ全体がきゅっきゅっと締まるポイント発見。当然、ピストンに力を込める。"
translation = "찌를 때마다 보지 전체가 꽉꽉 조여드는 포인트를 발견. 당연히, 피스톤에 힘을 싣는다."

[[dialogue]]
speaker = "せつな"
original = "「んんぅっ、あぁ、あぁ、あ、あ、ああ、ぁあ！<emoji=heart04>\u3000や、や、やぁあ<emoji=heart04>\u3000またイグっ<emoji=heart04>\u3000イっちゃうっ<emoji=heart04>\u3000イ、イクっ、イクイクイク～っ──<emoji=heart04>」"
translation = "「응으윽, 아아, 아아, 아, 아, 아아, 아아!<emoji=heart04> 야, 야, 야아아<emoji=heart04> 또 가버렷<emoji=heart04> 가버려엇<emoji=heart04> 가, 가, 가가각~──<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
original = "「んんんぅっ──ふぅ、うぅう、ぅうう～っ……！<emoji=heart04>」"
translation = "「응응으윽──후우, 우우우, 우우우~……!<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "鍛錬をしっかりと積んでいる、せつなのプニプニおま○こがペニスをこれでもかと締め上げてくる。２回目の絶頂。"
translation = "단련을 충분히 쌓은, 세츠나의 말랑말랑한 보지가 페니스를 이래도 되나 싶을 정도로 조여온다. 두 번째 절정."

[[dialogue]]
speaker = "unk"
original = "根元から先端に向かってペニスを揉むみたいにしてうねうねうと動く膣内……流石は房中術が趣味なだけはある。おま○この使い方が本当にうまい。"
translation = "뿌리부터 끝부분을 향해 페니스를 주무르듯이 꿈틀꿈틀 움직이는 질 내부…… 과연 방중술이 취미인 보람이 있다. 보지 사용법이 정말 훌륭하다."

[[dialogue]]
speaker = "unk"
original = "でも今はお仕置き中なので、俺も歯を食いしばって射精欲求をやり過ごす。"
translation = "하지만 지금은 벌을 주는 중이기에, 나도 이를 악물고 사정 욕구를 참아낸다."

[[dialogue]]
speaker = "クロト"
original = "「……っ。また言いつけ破ってイったな？\u3000せつな」"
translation = "「……윽. 또 명령을 어기고 가버렸네? 세츠나」"

[[dialogue]]
speaker = "せつな"
original = "「ふぅう、んんんうっ……もも、申し訳ございませんっ……<emoji=heart04>\u3000主様のおち○ちん、気持ちよすぎるからぁっ……<emoji=heart04>」"
translation = "「후우우, 응응응윽…… 저, 저, 죄송하옵니다……<emoji=heart04> 주님의 자지, 너무 기분 좋아서어……<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
original = "「はぁあ、ふぅうっ……い、一度でいいでござるっ……呼吸だけでも整えさせて、いただきたくっ……せつなの、一生のお願いでっ……<emoji=heart04>」"
translation = "「하아아, 후우우…… 하, 한 번이면 족하오…… 호흡만이라도 가다듬게, 해주셨으면 하오…… 세츠나의, 평생의 소원이오……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「却下。全力でピストンするぞ？」"
translation = "「기각. 전력으로 피스톤질한다?」"

[[dialogue]]
speaker = "unk"
original = "せつなの背面で、彼女の両腕をしっかりとクロスさせて固定する。細い手首をつかんだ瞬間、びくりと震えるせつなが可愛い。"
translation = "세츠나의 등 뒤에서, 그녀의 양팔을 단단히 교차시켜 고정한다. 가는 손목을 붙잡은 순간, 비쿠리 하고 떨리는 세츠나가 귀엽다."

[[dialogue]]
speaker = "せつな"
original = "「あ、ぁ、あ──来ちゃうっ……乱暴なおち○ちん、来ちゃうでござるぅっ……！<emoji=heart04>」"
translation = "「아, 아, 아── 와버렷…… 난폭한 자지, 와버리오오……!<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
original = "「にゃ、にゃあぁあぁっ！？<emoji=heart04>\u3000あっあっあっ！<emoji=heart04>\u3000ふぅう、ふぅう～っ<emoji=heart04>\u3000ふにゃにゃぁあ、あ、ぁぁあ～っ！<emoji=heart04>」"
translation = "「냐, 냐아아아앗!?<emoji=heart04> 앗앗앗!<emoji=heart04> 후우우, 후우우~<emoji=heart04> 후냐냐아아, 아, 아아아~!<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
original = "「は、激しっ<emoji=heart04>\u3000おち○ちん激しすぎるで、ござるっ──んんぅっ！<emoji=heart04>\u3000あ、あぁ、んんぅ<emoji=heart04>\u3000ふぅう、んんんう、ぅうっ！<emoji=heart04>」"
translation = "「하, 격렬해<emoji=heart04> 자지 너무 격렬하오── 응응으!<emoji=heart04> 아, 아아, 응응으<emoji=heart04> 후우우, 응응응우, 우웃!<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「気持ちいい？」"
translation = "「기분 좋아?」"

[[dialogue]]
speaker = "せつな"
original = "「良すぎっ<emoji=heart04>\u3000良しゅぎるでござりゅっ<emoji=heart04>\u3000これ無理っ<emoji=heart04>\u3000無理無理無理っ<emoji=heart04>\u3000ほんと無理でござるぅうっ！<emoji=heart04>\u3000あ、あ、あーっ！<emoji=heart04>\u3000あああ～っ！<emoji=heart04>」"
translation = "「너무 좋소<emoji=heart04> 너무 죠소오<emoji=heart04> 이거 무리<emoji=heart04> 무리무리무리!<emoji=heart04> 정말 무리이오오!<emoji=heart04> 아, 아, 아! 아아아~! <emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
original = "「おち○ちん気持ちよしゅぎるでござるよぉっ<emoji=heart04>\u3000し、しんじゃうっ<emoji=heart04>\u3000しんじゃうでござるぅうっ！<emoji=heart04>\u3000おっおっおっおっお、おぉお～っ<emoji=heart04>」"
translation = "「자지 기분 너무 죠소오오<emoji=heart04> 주, 죽어버렷<emoji=heart04> 죽어버리오오오!<emoji=heart04> 오오오오오, 오오오~<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「得意の房中術はどうした？\u3000せつなが鍛錬したおま○この実力、見せてくれないと困るぞ」"
translation = "「특기인 방중술은 어쨌어? 세츠나가 단련한 보지의 실력, 보여주지 않으면 곤란하다고」"

[[dialogue]]
speaker = "せつな"
original = "「ふうぅう、ぅぅ、んんぅ～っ<emoji=heart04>\u3000あっあっ、あぁああっ<emoji=heart04>\u3000そんにゃことを言われてもぉっ、う、ぅう、うっ……！<emoji=heart04>」"
translation = "「후우우, 우우, 응응으~<emoji=heart04> 앗앗, 아아아앗<emoji=heart04> 그런 말을 들어도오, 우, 우우, 우……!<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
original = "「イカないように我慢してもっ、んぅ、ふぅう、ぅううっ<emoji=heart04>\u3000すぐに気持ちいいのが上がってきて──あ、あ、あ<emoji=heart04>\u3000ま、またぁっ<emoji=heart04>」"
translation = "「가지 않도록 참아도, 응으, 후우우, 우우우<emoji=heart04> 금방 기분 좋은 게 올라와서── 아, 아, 아<emoji=heart04> 또, 또오!」"

[[dialogue]]
speaker = "せつな"
original = "「イっク──んぅう、うぅぅう～っ！<emoji=heart04>」"
translation = "「가버렷── 응으우, 우우우우~! <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "びっちょびちょに濡れたふわとろおま○こが、ギチギチギチっ！\u3000とペニスを締め立ててくる。"
translation = "축축하게 젖은 말랑말랑한 보지가, 기치기치기치! 하며 페니스를 조여온다."

[[dialogue]]
speaker = "クロト"
original = "「くっ……！\u3000もう、３回目だぞ？\u3000せつな、もしかしてお仕置きされたくて、わざとイってる？」"
translation = "「큭……! 벌써 3번째라고? 세츠나, 설마 벌 받고 싶어서 일부러 가는 거야?」"

[[dialogue]]
speaker = "せつな"
original = "「そんにゃことないでごじゃるっ<emoji=heart04>\u3000せつなにとって、んぉっ<emoji=heart04>\u3000主様の命令はぜったいっ<emoji=heart04>\u3000ぉ、ぉ、ぉっ──ぜったいでぇぇ、えぇ～っ<emoji=heart04>」"
translation = "「그런 거 아니오오<emoji=heart04> 세츠나에게 있어, 응오<emoji=heart04> 주인님의 명령은 절대적<emoji=heart04> 오, 오, 오── 절대적이이이, 이이~<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「その割にはめちゃくちゃイってるけど」"
translation = "「그거치고는 엄청나게 가고 있는데」"

[[dialogue]]
speaker = "せつな"
original = "「う、うぅうっ……が、頑張らなきゃまずいでござるっ、こ、このままイキまくったら紫桜の里の名折れっ……む、むむむぅ～っ……<emoji=heart04>」"
translation = "「우, 우우우…… 가, 고군분투하지 않으면 안 되오, 이, 이대로 계속 가버리면 시온의 마을의 수치…… 으, 으으으으~……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "苛烈なピストンを食らいながらも、せつなが深い呼吸をし始めた。"
translation = "가혹한 피스톤질을 당하면서도, 세츠나가 깊은 호흡을 하기 시작했다."

[[dialogue]]
speaker = "せつな"
original = "「み、見ててください、主様っ……んんぅっ\u3000ふぅう、ふぅううっ<emoji=heart04>\u3000これ以上の醜態は見せられ、ないでござるからぁっ……ふ、ふぅ～っ<emoji=heart04>」"
translation = "「보, 보고 계셔주십시오, 주인님…… 응응으 후우우, 후우우우<emoji=heart04> 이 이상의 추태는 보여드릴 수, 없으니까아…… 후, 후우~<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
original = "「お、ぉ、おぉおっ……うぅう～っ<emoji=heart04>\u3000お、おち○ちんの気持ちいいの、やり過ごしてっ……せつなはできる忍者だって、アピールでござる、ぅ～っ……<emoji=heart04>」"
translation = "「오, 오, 오오옷…… 으으으~윽<emoji=heart04> 자, 자지의 기분 좋은 거, 참아내서…… 세츠나는 유능한 닌자라고, 어필하는 것이오, 으으~윽……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「お、すごい。さっきまでせつなの体、ガチガチにこわばってたのに。ちょっと力が抜けてきた」"
translation = "「오, 대단한데. 방금 전까지 세츠나의 몸, 딱딱하게 굳어 있었는데. 힘이 좀 빠졌네」"

[[dialogue]]
speaker = "せつな"
original = "「む、むふふっ……せつな、これでも房中術には自信があるでござるよっ……<emoji=heart04>」"
translation = "「무, 무후후…… 세츠나, 이래 봬도 방중술에는 자신 있는 것이오……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "でもせつなの余裕を壊すのは簡単だ。例えば耳元で──"
translation = "하지만 세츠나의 여유를 부수는 건 간단하다. 예를 들어 귓가에서──"

[[dialogue]]
speaker = "クロト"
original = "「せつな、大好きだぞ」"
translation = "「세츠나, 정말 좋아해」"

[[dialogue]]
speaker = "せつな"
original = "「──ふにゃぁあっ！？<emoji=heart04>」"
translation = "「──후냐아앗!?<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「感じまくってるせつな、めちゃくちゃ可愛いから好きだな。もっと見せてくれる？」"
translation = "「느끼고 있는 세츠나, 엄청 귀여워서 좋네. 더 보여줄래?」"

[[dialogue]]
speaker = "せつな"
original = "「は、はににゃにゃゃぁっ！<emoji=heart04>\u3000それは禁じ手っ、卑怯でござるぅっ<emoji=heart04>\u3000せつながそういうストレートなの、弱いって知ってるのにっ……！<emoji=heart04>」"
translation = "「하, 하니냐냐아앗!<emoji=heart04> 그건 금지된 수법, 비겁한 것이오오<emoji=heart04> 세츠나가 그런 스트레이트한 거에, 약하다는 거 알면서……!<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「でも本当のことだから。せつな、好きだよ。大好き」"
translation = "「하지만 진심이니까. 세츠나, 좋아해. 정말로」"

[[dialogue]]
speaker = "せつな"
original = "「ふぅう、にゃ、にゃっ──<emoji=heart04>\u3000あ、あ、あ、あぁあぁ～っ！<emoji=heart04>\u3000好きってささやくのダメぇぇっ<emoji=heart04>」"
translation = "「후으으, 냐, 냐앗──<emoji=heart04> 아, 아, 아, 아아아아~앗!<emoji=heart04> 좋아한다고 속삭이는 건 안 돼애애<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
original = "「イっちゃうでござる、またイっちゃう、ダメ忍者になっちゃうでござるからぁっ！<emoji=heart04>」"
translation = "「가버리는 것이오, 또 가버려, 낙제 닌자가 되어버리는 것이오니까아앗!<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ダメ忍者でも大好きだよ。ずっとそばに置いてあげるからな」"
translation = "「낙제 닌자라도 정말 좋아해. 계속 곁에 있게 해줄 테니까」"

[[dialogue]]
speaker = "せつな"
original = "「ふっきゅぅうう、ぅうっ！？<emoji=heart04>\u3000ひぁ、あ、あぁああっ、らめらめらめ、おっきいのくる、来ちゃう、来ちゃう、来ちゃうっ──<emoji=heart04>」"
translation = "「후뀨우우우, 우웃!?<emoji=heart04> 히아, 아, 아아아앗, 안돼안돼안돼, 큰 거 와, 와버려, 와버려, 와버려엇──<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "今までみたいな軽い絶頂ではなく、背筋に電流が流れ続けるような大きな絶頂の予感にせつなが震える。"
translation = "지금까지 같은 가벼운 절정이 아니라, 등줄기에 전류가 계속 흐르는 듯한 커다란 절정의 예감에 세츠나가 떨린다."

[[dialogue]]
speaker = "せつな"
original = "「あるじしゃまっ、あるじしゃま、あるじしゃまぁっ<emoji=heart04>\u3000せつなイっちゃう、イっちゃうでござる、あ、あ、あ、あ、あっ──<emoji=heart04>」"
translation = "「주인님, 주인님, 주인님으으앗<emoji=heart04> 세츠나 가버려, 가버리는 것이오, 아, 아, 아, 아, 앗──<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "拘束された逃げ場のないせつなが喘ぐ。おっぱいをたぷたぷ揺らしながら喘ぎ続ける。"
translation = "구속되어 도망칠 곳 없는 세츠나가 헐떡인다. 가슴을 출렁출렁 흔들며 계속 헐떡인다."

[[dialogue]]
speaker = "unk"
original = "俺も限界が近い。トドメとばかりに最奥までペニスをぶちこみながら、せつなの耳元で……"
translation = "나도 한계가 가깝다. 마지막 일격이라는 듯 최심부까지 페니스를 쳐박으며, 세츠나의 귓가에서……"

[[dialogue]]
speaker = "クロト"
original = "「愛してるよ、せつな」"
translation = "「사랑해, 세츠나」"

[[dialogue]]
speaker = "せつな"
original = "「～～～～～～～っ！？<emoji=heart04>\u3000ぁ、あ、あぁぁ、イクイク、イっクぅううう～っ……！<emoji=heart04>」"
translation = "「～～～～～～～앗!?<emoji=heart04> 아, 아, 아아아, 가, 가버려, 가버려어어어~엇……!<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
original = "「っ……ふにゃぁぁあぁああぁぁあぁああ～～～～～～～～～～～～～っ！！<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「윽…… 후냐아아아아아아아아아아아아아아아아아～～～～～～～～～～～～～앗!!<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ビクビクビクッ──と痙攣しているせつなのお腹の奥へ、全力で射精を行う。"
translation = "파르르르르── 하고 경련하고 있는 세츠나의 배 깊숙한 곳으로, 전력을 다해 사정한다."

[[dialogue]]
speaker = "せつな"
original = "「んんぅうっ<emoji=heart04>\u3000熱っ<emoji=heart04>\u3000あ、あぁあ<emoji=heart04>\u3000主様のせーしっ……ん、んんぅーっ……すっごい、出てるで、ござる、ぅ、ぅうう～っ<emoji=heart04>」"
translation = "「응으으윽<emoji=heart04> 뜨거워<emoji=heart04> 아, 아아아<emoji=heart04> 주인님의 정자앗…… 응, 응응으으윽…… 엄청, 나오고 있는, 것이오, 으, 으으으~윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "もっと子宮に飲ませてほしいとでも言いたげに、ちゅうちゅうと吸い付いてくるせつなの膣内。"
translation = "더 자궁에 마시게 하고 싶다는 듯이, 츄우츄우 하고 빨아올리는 세츠나의 질 내부."

[[dialogue]]
speaker = "せつな"
original = "「ふぅぅっ、あ、ぁああっ──はぁあああーっ……！<emoji=heart04>\u3000まだ出てっ……んん、んぅ、あ、あぁ、あぁあーっ……<emoji=heart04>」"
translation = "「후으으윽, 아, 아아앗── 하아아아아앗……!<emoji=heart04> 아직 나오고 있어…… 응, 응으, 아, 아아, 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "せつなのむっちりしたお尻をつかみ直して、奥まで入念に、丹念に子種を注ぎ続け──"
translation = "세츠나의 풍만한 엉덩이를 다시 움켜쥐고, 안쪽까지 면밀하게, 정성스럽게 씨앗을 계속 쏟아붓고──"

[[dialogue]]
speaker = "unk"
original = "ようやく長い射精が止まった。"
translation = "겨우 긴 사정이 멈췄다."

[[dialogue]]
speaker = "せつな"
original = "「はぁあっ……ふぅううーっ……はぁああーっ……ふぅうーっ……<emoji=heart04>」"
translation = "「하아앗…… 후으으으~윽…… 하아아아~앗…… 후으으~윽……<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
original = "「主様のお仕置きえっち……す、すごかったでござるぅ……体も、心も、めちゃくちゃにされちゃったで、ござるよぉ……<emoji=heart04>」"
translation = "「주인님의 벌주기 섹스…… 어, 엄청났던 것이오…… 몸도, 마음도, 엉망진창이 되어버린 것이오오……<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
original = "「でも……す、すっごく感じちゃったでござる……<emoji=heart04>\u3000宙吊りになるだけで、こんなにも……はぅう、房中術は奥が深いでござる……<emoji=heart04>」"
translation = "「하지만…… 어, 엄청나게 느껴버린 것이오……<emoji=heart04> 매달려 있는 것만으로, 이렇게나…… 하우우, 방중술은 심오한 것이오……<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
original = "「主様、そのぉ……良ければまた、拘束プレイの練習、付き合って欲しいでござる……<emoji=heart04>」"
translation = "「주인님, 저기…… 괜찮으시다면 또, 구속 플레이 연습, 같이 해주셨으면 하는 것이오……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「もしかして、身動きできないまま乱暴にされるの気に入っちゃったのか？」"
translation = "「혹시, 움직이지 못하는 채로 거칠게 다뤄지는 게 마음에 들어버린 거야?」"

[[dialogue]]
speaker = "せつな"
original = "「エヘ……す、少しだけ……<emoji=heart04>」"
translation = "「에헤…… 조, 조금만……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "きっとかなり気に入ったに違いない。せつなはうっとりと快感に濡れた微笑みを浮かべて──"
translation = "분명 꽤 마음에 든 것이 틀림없다. 세츠나는 황홀하게 쾌감에 젖은 미소를 지으며──"

[[dialogue]]
speaker = "せつな"
original = "「主様……大好きで、ござるぅー……<emoji=heart04>」"
translation = "「주인님…… 정말 좋아하는 것이오오……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "真心を俺に伝えてくれたのだった。"
translation = "진심을 나에게 전해준 것이었다."

