[[dialogue]]
speaker = "unk"
original = "ホワイトデーの後日。恋人のイクシーと街でデートをしていた時のこと。"
translation = "화이트데이 며칠 뒤. 연인인 익시와 거리에서 데이트를 하던 때의 일."

[[dialogue]]
speaker = "イクシリオン"
original = "「あ、辺りが暗くなってきてしまいましたね……」"
translation = "「아, 주변이 어두워져 버렸네요……」"

[[dialogue]]
speaker = "unk"
original = "手を繋ぎながら歩いていると、イクシーがちらちらと期待するような視線を向けてくる。"
translation = "손을 잡고 걷고 있으니, 익시가 힐끗힐끗 기대하는 듯한 시선을 보내온다."

[[dialogue]]
speaker = "クロト"
original = "「もうそろそろ寮に帰る？」"
translation = "「이제 슬슬 기숙사로 돌아갈까?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「あっ、え、えっと……その……<emoji=heart04>」"
translation = "「앗, 에, 에또…… 그게……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "もじもじと恥ずかしそうにしているイクシーを可愛いと思いつつ、俺は彼女にそっと耳打ちをする。"
translation = "머뭇머뭇 부끄러워하는 익시를 귀엽다고 생각하며, 나는 그녀에게 살며시 귓속말을 한다."

[[dialogue]]
speaker = "クロト"
original = "「それとも……ホテルに行く？」"
translation = "「아니면…… 호텔에 갈까?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「……！\u3000は、はい……<emoji=heart04>」"
translation = "「……! 네, 네……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "顔を赤くしながらも嬉しそうに頷くイクシー。"
translation = "얼굴을 붉히면서도 기쁜 듯이 고개를 끄덕이는 익시."

[[dialogue]]
speaker = "クロト"
original = "「実は今日の為に、サプライズを用意してたんだ」"
translation = "「사실 오늘을 위해서 서프라이즈를 준비했어.」"

[[dialogue]]
speaker = "イクシリオン"
original = "「え？\u3000サプライズ……？」"
translation = "「에? 서프라이즈……?」"

[[dialogue]]
speaker = "unk"
original = "それからラブホテルに移動し、部屋に入ると、イクシーはバレンタインフォームに変身してみせる。"
translation = "그 후 러브호텔로 이동해 방에 들어가자, 익시는 발렌타인 폼으로 변신해 보인다."

[[dialogue]]
speaker = "イクシリオン"
original = "「会長、本日はこちらの衣装で私のことを召し上がって頂ければと……<emoji=heart04>」"
translation = "「회장님, 오늘은 이 의상으로 저를 맛있게 드셔 주셨으면 해서……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「じゃあ、俺も――」"
translation = "「그럼 나도――」"

[[dialogue]]
speaker = "unk"
original = "今度は俺が用意してきたサプライズを披露してみせると、イクシーは驚いたように顔を赤くする。"
translation = "이번에는 내가 준비해 온 서프라이즈를 선보이자, 익시는 놀란 듯 얼굴을 붉힌다."

[[dialogue]]
speaker = "イクシリオン"
original = "「えっ！？\u3000えぇっ……！？」"
translation = "「엣!? 에에엣……!?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「はああぁっ……<emoji=heart04>\u3000まさか、こんなぁ……<emoji=heart04>」"
translation = "「하아아아……<emoji=heart04> 설마 이런 일이……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「会長が、<b>３人に分裂</b>してしまうなんてぇ……<emoji=heart04>」"
translation = "「회장님이 <b>세</b> <b>명으로</b> <b>분열</b>해 버리다니……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう、俺はアニマ先輩が作った『分裂薬』を飲んで、自分の分身を作り出していた。"
translation = "그렇다, 나는 아니마 선배가 만든 『분열약』을 마시고 자신의 분신을 만들어 낸 것이었다."

[[dialogue]]
speaker = "クロト"
original = "「前にエッチした時、イクシーが読んでる漫画みたいに、女の子が大勢の男子に輪姦されちゃうのはどう思うって聞いたでしょ？」"
translation = "「전에 섹스할 때, 익시가 읽는 만화처럼 여자애가 많은 남자들한테 윤간당하는 건 어떻게 생각하냐고 물어봤었지?」"

[[dialogue]]
speaker = "クロト"
original = "「そうしたら、『俺としかいやらしいことはしたくない』って言ってくれたけど、それはそれとして輪姦はちょっと興味ありそうだったし」"
translation = "「그랬더니 『회장님하고만 야한 짓을 하고 싶다』고 말해줬지만, 그건 그거대로 윤간에는 조금 흥미가 있어 보였거든.」"

[[dialogue]]
speaker = "クロト"
original = "「それなら、俺が複数に増えたら、どうかなって思ったんだけど……」"
translation = "「그렇다면 내가 여러 명으로 늘어나면 어떨까 싶어서……」"

[[dialogue]]
speaker = "unk"
original = "イクシーが嫌そうな雰囲気なら、俺は無理にせずにやめておくつもりではいたのだが――"
translation = "익시가 싫어하는 분위기라면 억지로 하지 않고 그만둘 생각이었지만――"

[[dialogue]]
speaker = "イクシリオン"
original = "「はあぁっ……<emoji=heart04>\u3000会長の逞しいおち○ちんが３本も……<emoji=heart04>\u3000ふうぅっ……こんなのエッチ過ぎます……<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 회장님의 늠름한 자지가 3개나……<emoji=heart04> 후우우…… 이런 건 너무 야해요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺が何も言っていないのに、彼女は興奮して、両手で左右に立っている分身のペニスを触り始めていた。"
translation = "내가 아무 말도 하지 않았는데 그녀는 흥분해서, 양손으로 좌우에 서 있는 분신의 페니스를 만지기 시작했다."

[[dialogue]]
speaker = "クロト"
original = "「……普通に嬉しそうだな、うん」"
translation = "「……평범하게 기뻐 보이네, 응.」"

[[dialogue]]
speaker = "unk"
original = "大丈夫そうなので、俺はイクシーの秘部にペニスを擦り付け始める。"
translation = "괜찮은 것 같아서 나는 익시의 비부에 페니스를 문지르기 시작한다."

[[dialogue]]
speaker = "イクシリオン"
original = "「あっ<emoji=heart04>\u3000おち○ちんが、おま○こに擦れてぇ……んっ<emoji=heart04>\u3000はあぁっ……ふあぁっ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 자지가 보지에 스쳐서…… 응<emoji=heart04> 하아아…… 후아아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "イクシーのおま○こは既に準備不要なくらいに愛液が溢れて、ぬるぬるになっていた。そのことを指摘すると、彼女は恥ずかしそうに言う。"
translation = "익시의 보지는 이미 준비가 필요 없을 정도로 애액이 넘쳐나서 미끌미끌해져 있었다. 그 점을 지적하자 그녀는 부끄러운 듯 말한다."

[[dialogue]]
speaker = "イクシリオン"
original = "「じ、実は前に、漫画で同じような逆ハーレムのシチュエーションを見たことがありまして……<emoji=heart04>」"
translation = "「사실은 이전에 만화에서 비슷한 역하렘 시츄에이션을 본 적이 있어서……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「それで、会長がもし同じように増えたらどうなっちゃうのかって、妄想しながらオナニーを……<emoji=heart04>\u3000あっ……んふぅっ……<emoji=heart04>」"
translation = "「그래서 회장님이 만약 똑같이 늘어나면 어떻게 될까 하고 망상하면서 자위를……<emoji=heart04> 앗…… 응후……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「その時は、気持ち良くイけた？」"
translation = "「그때는 기분 좋게 갔어?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「は、はい……<emoji=heart04>\u3000会長の精液を全身に浴びながら、何度も繰り返しするのを想像して……イキまくっちゃいました……<emoji=heart04>」"
translation = "「네, 네……<emoji=heart04> 회장님의 정액을 온몸에 뒤집어쓰면서 몇 번이고 반복하는 걸 상상하며…… 엄청나게 가버렸어요……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「大好きな会長に囲まれての逆ハーレムエッチなんて……ふうぅっ<emoji=heart04>\u3000夢みたいで、すごく興奮しちゃいます……<emoji=heart04>」"
translation = "「좋아하는 회장님에게 둘러싸인 역하렘 섹스라니…… 후우우<emoji=heart04> 꿈만 같아서 정말 흥분돼요……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「なら、イクシー」"
translation = "「그럼 익시.」"

[[dialogue]]
speaker = "unk"
original = "俺は彼女に顔を近づけると、耳元で囁く。"
translation = "나는 그녀에게 얼굴을 가까이하고 귓가에 속삭인다."

[[dialogue]]
speaker = "クロト"
original = "「このまま――俺たち３人で愛しちゃうからな」"
translation = "「이대로―― 우리 셋이서 사랑해 줄 테니까.」"

[[dialogue]]
speaker = "イクシリオン"
original = "「～～っ<emoji=heart04>\u3000は、はいぃ……<emoji=heart04>\u3000お願いします……<emoji=heart04>」"
translation = "「～～っ<emoji=heart04> 네, 네에……<emoji=heart04> 부탁드려요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ぶるっと体を身震いさせて、小さく頷くイクシー。"
translation = "부르르 몸을 떨며 작게 고개를 끄덕이는 이쿠시."

[[dialogue]]
speaker = "unk"
original = "俺は彼女の愛液でぬるぬるになったペニスの先端を膣穴に押し当て、ゆっくりと挿入する。"
translation = "나는 그녀의 애액으로 미끌미끌해진 페니스의 끝부분을 질 구멍에 밀어 넣고 천천히 삽입한다."

[[dialogue]]
speaker = "イクシリオン"
original = "「あっ――<emoji=heart04>」"
translation = "「앗――<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「ふあああぁぁぁ～～～～～～っ<emoji=heart04><emoji=heart04>\u3000会長の極太おち○ちん、入って来ましたああぁ～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「후아아아아아～～～～～～っ<emoji=heart04><emoji=heart04> 회장님의 굵직한 자지, 들어왔어요오오～～～っ<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "イクシーの蜜壺は、俺が挿入すると同時に待ちわびていたように膣ヒダを一斉に絡ませてきて、ペニスが一気にいちばん奥まで引き込まれてしまう。"
translation = "이쿠시의 꿀단지는 내가 삽입함과 동시에 기다렸다는 듯 질 주름을 일제히 휘감아왔고, 페니스는 단숨에 가장 깊은 곳까지 끌려 들어가 버린다."

[[dialogue]]
speaker = "イクシリオン"
original = "「ふあぁっ<emoji=heart04>\u3000奥のいちばん気持ちいいところ、一発で当たってぇ<emoji=heart04>\u3000頭までバチッってすごい刺激、登って来ますぅ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「후아앗<emoji=heart04> 안쪽의 가장 기분 좋은 곳에 한 방에 닿아서<emoji=heart04> 머리까지 찌릿하고 굉장한 자극이 올라와요오～～っ<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000おち○ちん気持ちいいですぅ～っ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 앙<emoji=heart04> 하아앗<emoji=heart04> 후아아앙<emoji=heart04> 기분 좋아<emoji=heart04> 자지 기분 좋아요오～っ<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 하앙<emoji=heart04> 응아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "心から気持ちよさそうに、悦びの声を上げるイクシー。"
translation = "진심으로 기분 좋은 듯 희열의 목소리를 내는 이쿠시."

[[dialogue]]
speaker = "クロト"
original = "「イクシー、気持ちいいのに夢中になって、左右の手がお留守になってるぞ？」"
translation = "「이쿠시, 기분 좋은 것에 정신이 팔려서 양손이 놀고 있잖아?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「あっ<emoji=heart04>\u3000はいぃ<emoji=heart04>\u3000ごめんなさい<emoji=heart04>\u3000左右のおち○ちんも、ちゃんと気持ち良くしますぅっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000はあぁっ……ふうぅっ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 네에<emoji=heart04> 죄송해요<emoji=heart04> 양옆의 자지도 제대로 기분 좋게 해드릴게요오<emoji=heart04> 응<emoji=heart04> 하아앗…… 후우우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "イクシーは両手で、俺の分身のペニスもシゴき始める。"
translation = "이쿠시는 양손으로 내 분신의 페니스도 흔들기 시작한다."

[[dialogue]]
speaker = "イクシリオン"
original = "「んあぁっ<emoji=heart04>\u3000左右のおち○ちんから、我慢汁がいっぱい出てきててぇ<emoji=heart04>\u3000はあぁっ……会長の力強いオスの匂いで興奮しちゃいますぅ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000んんっ……<emoji=heart04>」"
translation = "「응아앗<emoji=heart04> 양옆의 자지에서 쿠퍼액이 잔뜩 나와서<emoji=heart04> 하아앗…… 회장님의 힘찬 수컷 냄새에 흥분돼버려요오<emoji=heart04> 후우우<emoji=heart04> 응응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺と分身は全員、思考や感覚が共有されている為、左右の手コキされている気持ち良さもそのまま伝わってくる。"
translation = "나와 분신은 전원 사고와 감각이 공유되고 있기 때문에, 양손으로 핸드잡을 당하는 기분 좋음도 그대로 전해져 온다."

[[dialogue]]
speaker = "イクシリオン"
original = "「んはぁっ……すごい<emoji=heart04>\u3000会長のおち○ちん、本当に大きくて<emoji=heart04>\u3000カリが太く張っていて……<emoji=heart04>\u3000触ると、固くて熱くてぇ……<emoji=heart04>」"
translation = "「응하아…… 굉장해<emoji=heart04> 회장님의 자지, 정말 커서<emoji=heart04> 귀두가 굵게 부풀어 있고……<emoji=heart04> 만지면 딱딱하고 뜨거워서……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「そんな惚れ惚れしちゃうくらい逞しいおち○ちんに、囲まれているなんて……はあぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふあぁっ……<emoji=heart04>」"
translation = "「그렇게 넋을 잃을 정도로 늠름한 자지에 둘러싸여 있다니…… 하아앗<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 후아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「幸せで心も体も悦んじゃってますぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000おま○こ気持ちいいっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04>」"
translation = "「행복해서 몸도 마음도 기뻐하고 있어요오<emoji=heart04> 앗<emoji=heart04> 응<emoji=heart04> 하아앗<emoji=heart04> 응아앗<emoji=heart04> 보지 기분 좋아<emoji=heart04> 응우우<emoji=heart04> 하아앗<emoji=heart04> 후아앗<emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "イクシーは恍惚とした様子でペニスをシゴきながら、おま○この方も快楽を堪能するようにきゅうきゅうと締め付けてくる。"
translation = "이쿠시는 황홀한 표정으로 페니스를 흔들면서, 보지 쪽도 쾌락을 만끽하듯 꽉꽉 조여온다."

[[dialogue]]
speaker = "クロト"
original = "「乳首も触って欲しそうにぷっくり膨らんでるよ、イクシー」"
translation = "「유두도 만져달라는 듯이 볼록하게 부풀어 있어, 이쿠시.」"

[[dialogue]]
speaker = "イクシリオン"
original = "「あっ<emoji=heart04>\u3000会長<emoji=heart04>\u3000そんなおっぱいも触られたらっ……ふああぁっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 회장님<emoji=heart04> 그런 가슴까지 만져지면…… 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "イクシーの左右にいる俺の分身がそれぞれ片手を伸ばして、イクシーの両方のおっぱいを同時に弄り始める。"
translation = "이쿠시의 양옆에 있는 내 분신이 각각 한 손을 뻗어 이쿠시의 양쪽 가슴을 동시에 주무르기 시작한다."

[[dialogue]]
speaker = "イクシリオン"
original = "「はあぁっ<emoji=heart04>\u3000左右の会長から優しくおっぱい揉まれてぇ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふああぁっ……<emoji=heart04>」"
translation = "「하아앗<emoji=heart04> 양옆의 회장님에게 상냥하게 가슴을 비벼져서<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 후아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「んあぁっ<emoji=heart04>\u3000乳首も愛撫されて、感じちゃいますぅっ<emoji=heart04>\u3000３人同時に愛されるの気持ちいいですっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000はああぁんっ……<emoji=heart04>」"
translation = "「응아앗<emoji=heart04> 유두도 애무당해서 느껴버려요오<emoji=heart04> 세 명에게 동시에 사랑받는 거 기분 좋아요<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 후아앗<emoji=heart04> 하아아앙……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "おっぱいを愛撫するのは続けたまま、俺は更に右の分身で、イクシーに顔を近づけてキスをする。"
translation = "가슴을 애무하는 것은 계속한 채, 나는 다시 오른쪽 분신으로 이쿠시에게 얼굴을 가까이 대고 키스를 한다."

[[dialogue]]
speaker = "イクシリオン"
original = "「あっ！？\u3000んむぅっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000ちゅむっ……んちゅっ<emoji=heart04>\u3000ちゅっちゅっ……ちゅぱっ<emoji=heart04>\u3000はああぁっ……<emoji=heart04>」"
translation = "「앗!? 응무우<emoji=heart04> 응<emoji=heart04> 쪽<emoji=heart04> 쭈웁…… 응츄<emoji=heart04> 쪽쪽…… 츄릅<emoji=heart04> 하아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "続いて今度は、左の分身で唇を奪う。"
translation = "이어서 이번에는 왼쪽 분신으로 입술을 빼앗는다."

[[dialogue]]
speaker = "イクシリオン"
original = "「んんっ！？\u3000んむちゅっ<emoji=heart04>\u3000ちゅぷっ……ちゅぷぷっ<emoji=heart04>\u3000れろちゅっ<emoji=heart04>\u3000んちゅぅっ……ちゅぱぁっ<emoji=heart04>\u3000んはあぁっ……<emoji=heart04>」"
translation = "「응응!? 응무츄<emoji=heart04> 츄릅…… 츄릅츄릅<emoji=heart04> 레로츄<emoji=heart04> 응츄우…… 츄파아<emoji=heart04> 응하아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そして、最後に正面の俺が覆い被さるようにキスをして、舌を絡める。"
translation = "그리고 마지막으로 정면의 내가 덮어씌우듯 키스를 하며 혀를 섞는다."

[[dialogue]]
speaker = "イクシリオン"
original = "「あっ、会長ぉっ……<emoji=heart04>\u3000んむっ<emoji=heart04>\u3000ちゅっ……んちゅっ<emoji=heart04>\u3000れろちゅっ<emoji=heart04>\u3000れるれるっ<emoji=heart04>\u3000ちゅるるるっ<emoji=heart04>\u3000ちゅれるっ<emoji=heart04>\u3000ちゅむっ……ちゅぱぁっ……！」"
translation = "「앗, 회장님……<emoji=heart04> 응무<emoji=heart04> 쪽…… 응츄<emoji=heart04> 레로츄<emoji=heart04> 레를레를<emoji=heart04> 츄르르르<emoji=heart04> 츄레를<emoji=heart04> 츄릅…… 츄파아……!」"

[[dialogue]]
speaker = "unk"
original = "イクシーの唇との間に唾液の糸を光らせながら顔を離すと、彼女の顔はすっかりとろけきっていて。"
translation = "이쿠시의 입술 사이에 타액의 실을 반짝이며 얼굴을 떼자, 그녀의 얼굴은 완전히 녹아내려 있었다."

[[dialogue]]
speaker = "イクシリオン"
original = "「はああぁっ……<emoji=heart04>\u3000３人で連続キスするの、反則過ぎますぅ……<emoji=heart04>」"
translation = "「하아아앗……<emoji=heart04> 세 명에게서 연속 키스라니, 너무 반칙이에요……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「おま○こも、おっぱいも、唇も同時に愛されて、頭の中、何も考えられないくらいとろけちゃいますぅ……<emoji=heart04>」"
translation = "「보지도, 가슴도, 입술도 동시에 사랑받아서 머릿속에 아무 생각도 안 날 정도로 녹아버려요오……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「じゃあ、こんなのはどう？」"
translation = "「그럼 이건 어때?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「え……？\u3000ふあっ！？<emoji=heart04><emoji=heart04>」"
translation = "「에……? 후앗!? <emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "分身２人がイクシーの胸に顔を近づけて、同時に乳首に吸い付く。"
translation = "분신 두 명이 이쿠시의 가슴에 얼굴을 가까이 대고 동시에 유두를 빨아들인다."

[[dialogue]]
speaker = "イクシリオン"
original = "「あっ<emoji=heart04><emoji=heart04>\u3000そんなっ<emoji=heart04>\u3000ただでさえ興奮しすぎてる敏感乳首、いま同時に舌で愛されたらぁっ<emoji=heart04><emoji=heart04>\u3000んっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふああぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04><emoji=heart04> 그런<emoji=heart04> 안 그래도 너무 흥분한 민감한 유두를 지금 동시에 혀로 애무당하면아앗<emoji=heart04><emoji=heart04> 응<emoji=heart04> 하아앗<emoji=heart04> 앙<emoji=heart04> 후아아아～～っ<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "しばらく舌でねぶって愛してから、２人同時に乳首を強く吸い上げる。"
translation = "한동안 혀로 핥으며 사랑해준 뒤, 두 명이 동시에 유두를 강하게 빨아올린다."

[[dialogue]]
speaker = "イクシリオン"
original = "「あっ<emoji=heart04>\u3000はあああぁっ<emoji=heart04><emoji=heart04>\u3000それ感じるっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふああぁっ<emoji=heart04><emoji=heart04>\u3000強いぃっ<emoji=heart04>\u3000気持ちいいのすごすぎて、キちゃいますぅっ<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 하아아아앗<emoji=heart04><emoji=heart04> 그거 느껴져요<emoji=heart04><emoji=heart04><emoji=heart04> 후아아앗<emoji=heart04><emoji=heart04> 강해애<emoji=heart04> 기분 좋은 게 너무 심해서 가버려요오옷<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "イクシーの体がぶるぶると震え、次の瞬間、全身が跳ね上がる。"
translation = "이쿠시의 몸이 부르르 떨리고, 다음 순간 전신이 튀어 오른다."

[[dialogue]]
speaker = "イクシリオン"
original = "「ふあああああああああっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イクうううぅぅぅ～～～～～～っ！！！<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 가버려어어어어어～～～～～～っ!!! <emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "足を震わせ、彼女は限界を超えるように絶頂した。"
translation = "다리를 떨며 그녀는 한계를 넘어서듯 절정에 달했다."

[[dialogue]]
speaker = "イクシリオン"
original = "「あっ……<emoji=heart04>\u3000はああぁ～～っ<emoji=heart04><emoji=heart04>\u3000んふうぅ～っ<emoji=heart04><emoji=heart04>」"
translation = "「앗……<emoji=heart04> 하아아～～っ<emoji=heart04><emoji=heart04> 응후우～っ<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺が動きを緩めた途端、イクシーは絶頂の余韻を引きずりながらも興奮に突き動かされるように、自ら腰を動かし始めた。"
translation = "내가 움직임을 늦추자마자, 이쿠시는 절정의 여운을 끌면서도 흥분에 떠밀리듯 스스로 허리를 움직이기 시작했다."

[[dialogue]]
speaker = "イクシリオン"
original = "「会長ぉ<emoji=heart04>\u3000このままもっといっぱい愛して下さいっ<emoji=heart04>\u3000会長は３人共まだイってないから、足りてないですよね？」"
translation = "「회장님<emoji=heart04> 이대로 더 잔뜩 사랑해 주세요<emoji=heart04> 회장님은 세 명 다 아직 안 가셨으니까 부족하시죠?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「私も、体が――子宮が欲しがって、キュンキュン疼きが止まらないんですぅ<emoji=heart04><emoji=heart04>\u3000だから――」"
translation = "「저도 몸이―― 자궁이 원해서 큥큥 욱신거림이 멈추지 않아요오<emoji=heart04><emoji=heart04> 그러니까――」"

[[dialogue]]
speaker = "イクシリオン"
original = "「会長の精液、私の中にも外にもいっぱいぶっかけて下さぁいっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「회장님의 정액, 제 안에도 밖에도 잔뜩 뿌려주세요오옷<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "イクシーは腰を貪るように振りながら、頬をとろけさせた淫らな表情で俺を見つめてくる。その熱を帯びた瞳に射抜かれ、俺の興奮もついに限界を迎えてしまう。"
translation = "이쿠시는 허리를 탐욕스럽게 흔들며 뺨을 붉힌 음란한 표정으로 나를 바라본다. 그 열기를 띤 눈동자에 꿰뚫려 나의 흥분도 마침내 한계에 도달한다."

[[dialogue]]
speaker = "クロト"
original = "「……今日はイクシーに気持ち良くなってもらおうと自分は抑えるつもりだったのに、そんな風に煽ると、俺も我慢できなくなっちゃうぞ」"
translation = "「……오늘은 이쿠시를 기분 좋게 해주려고 나 자신을 억누를 생각이었는데, 그렇게 도발하면 나도 참을 수 없게 된다고.」"

[[dialogue]]
speaker = "イクシリオン"
original = "「はい<emoji=heart04>\u3000遠慮なさらなくていいので……っ<emoji=heart04>」"
translation = "「네<emoji=heart04> 사양하지 않으셔도 되니까……っ<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「どうか、会長もいっぱい気持ちよくなって下さいっ<emoji=heart04><emoji=heart04>」"
translation = "「부디 회장님도 잔뜩 기분 좋아져 주세요오옷<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「っ……！\u3000イクシー！」"
translation = "「윽……! 이쿠시!」"

[[dialogue]]
speaker = "イクシリオン"
original = "「あっ――んああああああぁぁぁ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗――응아아아아아아아～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「おち○ちん、ぱんぱん激しいですうぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あっ、あん、あんっ<emoji=heart04>\u3000はあぁっ、あっ、あっ、ふああぁんっ<emoji=heart04><emoji=heart04>\u3000あっ、あっ、ふあぁっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「자지, 빵빵하고 격해요오오～～～っ<emoji=heart04><emoji=heart04><emoji=heart04> 앗, 앙, 앙<emoji=heart04> 하아앗, 앗, 앗, 후아아앙<emoji=heart04><emoji=heart04> 앗, 앗, 후아앗<emoji=heart04> 응아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺も快楽に身を任せ、腰を激しく動かし、イクシーのおま○こを貪るように味わう。"
translation = "나도 쾌락에 몸을 맡기고 허리를 격하게 움직이며 이쿠시의 보지를 탐하듯 맛본다."

[[dialogue]]
speaker = "イクシリオン"
original = "「激しいおち○ちん気持ちいいっ<emoji=heart04>\u3000おち○ちん、好きっ<emoji=heart04>\u3000好き好き大好きっ<emoji=heart04><emoji=heart04>\u3000はあぁんっ<emoji=heart04>\u3000会長おち○ちん、気持ちいいですうぅ～～っ<emoji=heart04><emoji=heart04>\u3000ふあああぁ～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「격한 자지 기분 좋아<emoji=heart04> 자지, 좋아<emoji=heart04> 좋아좋아 너무 좋아<emoji=heart04><emoji=heart04> 하아앙<emoji=heart04> 회장님 자지, 기분 좋아요오오～～っ<emoji=heart04><emoji=heart04> 후아아아～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「俺もイクシーのおま○こ、すごく気持ちいいっ……！」"
translation = "「나도 이쿠시의 보지, 정말 기분 좋아……!」"

[[dialogue]]
speaker = "イクシリオン"
original = "「はあああぁっ<emoji=heart04>\u3000嬉しいですぅっ<emoji=heart04>\u3000他のおち○ちんも、いっぱい気持ち良くなって下さぁいっ<emoji=heart04>\u3000あっあっ、あんっあんっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「하아아아앗<emoji=heart04> 기뻐요오옷<emoji=heart04> 다른 자지들도 잔뜩 기분 좋아져 주세요오<emoji=heart04> 앗앗, 앙앙<emoji=heart04> 후아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺の腰に合わせ、イクシーも両手の手コキの速度を上げる。"
translation = "나의 허리 놀림에 맞춰 이쿠시도 양손의 핸드잡 속도를 올린다."

[[dialogue]]
speaker = "イクシリオン"
original = "「んふうぅっ<emoji=heart04>\u3000すごいですっ<emoji=heart04>\u3000左右のおち○ちんも、どんどん膨らんで大きく固くなってきてますぅっ<emoji=heart04>\u3000んうぅっ、んっ、んっ、んあぁっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「응후우우<emoji=heart04> 굉장해요<emoji=heart04> 양옆의 자지도 점점 부풀어 올라서 크고 딱딱해지고 있어요오옷<emoji=heart04> 응우우, 응, 응, 응아앗<emoji=heart04> 하아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「それに我慢汁いっぱい溢れて来て、手のひらベトベトになってぇ<emoji=heart04>\u3000はああぁっ<emoji=heart04>\u3000くちゅくちゅいやらしい音立ててますぅっ<emoji=heart04>\u3000んっ、あっ、あっ、んああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「게다가 쿠퍼액이 잔뜩 넘쳐흘러서 손바닥이 끈적끈적해지고오<emoji=heart04> 하아아앗<emoji=heart04> 쿠츄쿠츄 야한 소리를 내고 있어요오옷<emoji=heart04> 응, 앗, 앗, 응아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「くっ……イクシーの手コキ、上手くて気持ちいいっ……！」"
translation = "「큭…… 이쿠시의 핸드잡, 능숙해서 기분 좋아……!」"

[[dialogue]]
speaker = "イクシリオン"
original = "「んふうぅ～っ<emoji=heart04>\u3000大好きな会長おち○ちんの気持ちいいとこ、ちゃんとわかってますので<emoji=heart04>\u3000んっ、んっ、んっ、んぅっ<emoji=heart04>\u3000んんうぅ～っ<emoji=heart04><emoji=heart04>」"
translation = "「응후우우～っ<emoji=heart04> 좋아하는 회장님 자지의 기분 좋은 곳은 제대로 알고 있으니까요<emoji=heart04> 응, 응, 응, 응<emoji=heart04> 응응우우～っ<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「私のお手々ま○こで、気持ち良く射精してくださぁいっ<emoji=heart04>\u3000んっ、あっ、あっ、あっ<emoji=heart04>\u3000んあああぁっ<emoji=heart04><emoji=heart04>」"
translation = "「제 손보지로 기분 좋게 사정해 주세요오옷<emoji=heart04> 응, 앗, 앗, 앗<emoji=heart04> 응아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "分身と感覚が繋がっているせいで、左右の手コキの快楽も重なり、俺のペニスには射精感が一気に込み上げてくる。"
translation = "분신과 감각이 연결된 탓에 양옆의 핸드잡 쾌락도 겹쳐져, 내 페니스에는 사정감이 단숨에 밀려온다."

[[dialogue]]
speaker = "イクシリオン"
original = "「あっ<emoji=heart04>\u3000すごいぃっ<emoji=heart04>\u3000ぱんぱん激しいですぅ～～っ<emoji=heart04><emoji=heart04>\u3000あっあっあっあっ<emoji=heart04>\u3000ふあぁああああっ<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 굉장해애<emoji=heart04> 빵빵하고 격해요오오～～っ<emoji=heart04><emoji=heart04> 앗앗앗앗<emoji=heart04> 후아아아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "昂る快楽に身をゆだね、俺は腰の動きをどんどん速めていく。"
translation = "고조되는 쾌락에 몸을 맡기고 나는 허리 움직임을 점점 빠르게 한다."

[[dialogue]]
speaker = "イクシリオン"
original = "「気持ちいいっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>\u3000気持ちいいですぅ～～っ<emoji=heart04><emoji=heart04>\u3000あんっあんっあんっあんっ<emoji=heart04><emoji=heart04>\u3000んあああぁん<emoji=heart04><emoji=heart04>」"
translation = "「기분 좋아<emoji=heart04> 후아앗<emoji=heart04> 기분 좋아요오오～～っ<emoji=heart04><emoji=heart04> 앙앙앙앙<emoji=heart04><emoji=heart04> 응아아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「好きっ、好きっ<emoji=heart04>\u3000おち○ちん気持ちよくて大好きぃ～～っ<emoji=heart04><emoji=heart04>\u3000あっあっあっあっ<emoji=heart04>\u3000ふあああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「좋아, 좋아<emoji=heart04> 자지 기분 좋아서 너무 좋아아～～っ<emoji=heart04><emoji=heart04> 앗앗앗앗<emoji=heart04> 후아아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「はあああぁっ<emoji=heart04><emoji=heart04>\u3000もうダメ、会長っ<emoji=heart04>\u3000私、さっきよりも大きいのキちゃいますぅ～～っ<emoji=heart04><emoji=heart04>\u3000んうぅっ、あっあっあっ<emoji=heart04>\u3000ふあああぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「하아아아앗<emoji=heart04><emoji=heart04> 이제 안 돼, 회장님<emoji=heart04> 저, 아까보다 더 큰 게 와버려요오오～～っ<emoji=heart04><emoji=heart04> 응우우, 앗앗앗<emoji=heart04> 후아아아～～っ<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「俺ももうイキそうだっ！」"
translation = "「나도 이제 쌀 것 같아!」"

[[dialogue]]
speaker = "イクシリオン"
original = "「んあああぁっ<emoji=heart04><emoji=heart04>\u3000来てっ<emoji=heart04>\u3000きてきてっ<emoji=heart04>\u3000出して下さいぃっ<emoji=heart04><emoji=heart04>\u3000精液いっぱいぃっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あっあっあっあっ<emoji=heart04>\u3000ふあああぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「응아아아앗<emoji=heart04><emoji=heart04> 와줘요<emoji=heart04> 와줘와줘<emoji=heart04> 내보내 주세요오옷<emoji=heart04><emoji=heart04> 정액 잔뜩으으윽<emoji=heart04><emoji=heart04><emoji=heart04> 앗앗앗앗<emoji=heart04> 후아아아～～っ<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「キますっ<emoji=heart04>\u3000大きいのイキますぅっ<emoji=heart04><emoji=heart04>\u3000んああああああっ<emoji=heart04><emoji=heart04>\u3000イクイクイクイクイクぅっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「와요<emoji=heart04> 큰 게 와요오옷<emoji=heart04><emoji=heart04> 응아아아아아앗<emoji=heart04><emoji=heart04> 가요가요가요가요가요오옷<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「っ……！\u3000イクシー、もう出るっ！！\u3000ぶちまけるぞっ！！！」"
translation = "「윽……! 이쿠시, 이제 나온다!! 쏟아부을게!!!」"

[[dialogue]]
speaker = "イクシリオン"
original = "「あああああああっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000おま○こイックううううううぅぅぅ――――っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 보지 가버려어어어어어어어――――っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「あっ――ふあああああああああぁぁぁ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗――후아아아아아아아아아아아～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "いちばん奥にペニスを突き入れた瞬間、溜め込んでいた射精欲が一気に弾け、俺は勢いよくぶちまけた。"
translation = "가장 깊은 곳에 페니스를 찔러 넣은 순간, 쌓아두었던 사정욕이 단숨에 터져 나오며 나는 기세 좋게 쏟아부었다."

[[dialogue]]
speaker = "イクシリオン"
original = "「はあああぁんっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000会長の熱い精液、いっぱい出てますぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하아아아앙<emoji=heart04><emoji=heart04><emoji=heart04> 회장님의 뜨거운 정액, 잔뜩 나오고 있어요오오～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "もちろん、子宮の中だけでなく、左右のペニスからも射精し、彼女の美しい肢体にぶっかけていく。"
translation = "물론 자궁 안뿐만 아니라 양옆의 페니스에서도 사정하여 그녀의 아름다운 나신에 쏟아부어 간다."

[[dialogue]]
speaker = "イクシリオン"
original = "「ふああぁ～～っ<emoji=heart04><emoji=heart04>\u3000精液、全身にいっぱいぃっ……<emoji=heart04><emoji=heart04>\u3000会長のオスの匂いで全身包まれて、はあぁっ……<emoji=heart04>\u3000幸せぇ……<emoji=heart04>」"
translation = "「후아아～～っ<emoji=heart04><emoji=heart04> 정액, 온몸에 잔뜩으으윽……<emoji=heart04><emoji=heart04> 회장님의 수컷 냄새로 온몸이 감싸여서, 하아앗……<emoji=heart04> 행복해……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「あんっ<emoji=heart04>\u3000すごいっ……<emoji=heart04>\u3000射精、まだ続いて……<emoji=heart04>\u3000男らしくて、素敵ですぅ……<emoji=heart04>\u3000はあぁっ……<emoji=heart04>\u3000んふぅ……<emoji=heart04>」"
translation = "「앙<emoji=heart04> 굉장해……<emoji=heart04> 사정, 아직 계속돼서……<emoji=heart04> 남자다워서 멋져요……<emoji=heart04> 하아앗……<emoji=heart04> 응후……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "やがて射精が終わり、しばらく絶頂の余韻に浸った後、俺はゆっくりとペニスを引き抜く。"
translation = "이윽고 사정이 끝나고 한동안 절정의 여운에 잠긴 뒤, 나는 천천히 페니스를 뽑아낸다."

[[dialogue]]
speaker = "イクシリオン"
original = "「んっ……<emoji=heart04>\u3000はあぁ……ふうぅ……<emoji=heart04>\u3000会長の本気ピストンで、全力イキしちゃいましたぁ……<emoji=heart04>\u3000気持ちよかったですぅ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 하아아…… 후우우……<emoji=heart04> 회장님의 진심 피스톤으로 전력으로 가버렸어요……<emoji=heart04> 기분 좋았어요……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「分身と感覚共有してるから、俺もすごく気持ちよかった……」"
translation = "「분신과 감각을 공유하고 있어서 나도 정말 기분 좋았어……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「会長の精液で、全身白濁に染められて幸せですぅ……<emoji=heart04>\u3000ありがとうございます……<emoji=heart04>」"
translation = "「회장님의 정액으로 온몸이 백탁으로 물들어서 행복해요……<emoji=heart04> 감사합니다……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺がイクシーの体を拭こうとティッシュ箱を取りに立ったところで、彼女が口を開く。"
translation = "내가 이쿠시의 몸을 닦아주려고 티슈 상자를 가지러 일어났을 때, 그녀가 입을 열었다."

[[dialogue]]
speaker = "イクシリオン"
original = "「あの……会長、３人いらっしゃるから、１回だけじゃ満足してないですよね……？」"
translation = "「저기…… 회장님, 세 분이나 계시니까 한 번으로는 만족 못 하셨죠……?」"

[[dialogue]]
speaker = "unk"
original = "驚いてイクシーの顔を見やると、その瞳には未だ冷めやらぬ熱が宿っていて。"
translation = "놀라서 이쿠시의 얼굴을 바라보자, 그 눈동자에는 아직 식지 않은 열기가 서려 있었다."

[[dialogue]]
speaker = "イクシリオン"
original = "「私、休憩しなくても大丈夫ですので……」"
translation = "「저, 휴식하지 않아도 괜찮으니까요……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「よろしければ、会長が３人共満足されるまで、私の体でもっと気持ちよくなって頂けたら……<emoji=heart04>」"
translation = "「괜찮으시다면 회장님 세 분 모두 만족하실 때까지 제 몸으로 더 기분 좋아지신다면……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「あっ<emoji=heart04>\u3000会長ぉ……はぁんっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 회장님…… 하앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そうして、性欲の強い者同士、すぐに２回戦が始まって。"
translation = "그렇게 성욕이 강한 자들끼리 곧바로 2회전이 시작되었고."

[[dialogue]]
speaker = "unk"
original = "その後は彼女が満足するまで、俺も愛を込めて白濁で染め続けるのだった。"
translation = "그 후로는 그녀가 만족할 때까지 나도 사랑을 담아 백탁으로 계속 물들여 주었다."

