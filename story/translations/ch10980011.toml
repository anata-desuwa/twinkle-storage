[[dialogue]]
speaker = "unk"
original = "第１話,ガチョウの雛鳥たち,P"
translation = "제1화, 거위의 새끼들"

[[dialogue]]
speaker = "unk"
original = "今日は星徒会活動がないので、真っ直ぐ帰ろうとすると──"
translation = "오늘은 성도회 활동이 없어서 곧장 돌아가려 하자──"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「あっ、会長さんだ！」"
translation = "「앗, 회장님이다!」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「お疲れさまです。今日は早いお帰りなんですね」"
translation = "「수고하셨습니다. 오늘은 일찍 귀가하시네요.」"

[[dialogue]]
speaker = "unk"
original = "２人は附属生の鈴野ヒマワリと深沢ミウ。"
translation = "두 사람은 부속생인 스즈노 히마와리와 후카자와 미우."

[[dialogue]]
speaker = "unk"
original = "セナリィに心酔するあまり、彼女の設立した秘密結社『ゴールデングース』に新たに加入した見習い社員だ。"
translation = "세나리에게 심취한 나머지, 그녀가 설립한 비밀 결사 『골든 구스』에 새로 가입한 수습 사원이다."

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「この前のお仕事ではお世話になりました！\u3000会長さんって、やっぱりめちゃ強なんですねー！」"
translation = "「저번 일할 때는 신세 졌습니다! 회장님은 역시 엄청 강하시네요!」"

[[dialogue]]
speaker = "unk"
original = "ゴールデングースとの合同任務で彼女たちと知り合い、それ以降、すれ違う度に声をかけられる程度の仲には進展している。"
translation = "골든 구스와의 합동 임무에서 그녀들과 알게 되었고, 그 이후 마주칠 때마다 인사를 나누는 정도의 사이로는 발전해 있다."

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「ところで会長さん、小腹空いてませんか？」"
translation = "「그런데 회장님, 출출하지 않으세요?」"

[[dialogue]]
speaker = "unk"
original = "お腹ペコペコだ"
translation = "배가 아주 고픈걸."

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「やった！\u3000頼れる援軍の到着だー！」"
translation = "「해냈다! 의지할 수 있는 원군의 도착이다!」"

[[dialogue]]
speaker = "unk"
original = "援軍？"
translation = "원군?"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「あたしたち、今からファーストフードに行くんですけど会長さんもいかがです？」"
translation = "「저희, 지금부터 패스트푸드점에 가는데 회장님도 어떠세요?」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「私はヒマワリちゃんの付き添いです。夕飯前にファーストフードなんて太っちゃうから、控えたいんですけど……」"
translation = "「저는 히마와리짱의 동행이에요. 저녁 전에 패스트푸드라니 살찌니까 삼가고 싶었지만……」"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「お金ならご心配なく！\u3000全部あたしが奢りますんで！\u3000胃袋を借りたいんです！」"
translation = "「돈이라면 걱정 마세요! 전부 제가 쏠 테니까요! 위장을 좀 빌리고 싶거든요!」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「今、ラッキーセットのオマケが、ボンバーロボなんですけど……ご存じですか？\u3000日曜日の朝にやってる特撮番組なんですけど」"
translation = "「지금 럭키 세트 사은품이 봄버 로보인데…… 알고 계시나요? 일요일 아침에 하는 특촬 프로그램인데요.」"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「全８種のパーツを集めないと爆裂無敵合体できないんで、コンプ狙ってるんです！\u3000なので、手伝ってください！」"
translation = "「총 8종의 파츠를 모으지 않으면 폭렬무적합체를 할 수 없어서, 컴플리트를 노리고 있어요! 그러니까 도와주세요!」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「８種類がランダムなんで、数をこなさなきゃいけないんです。３日連続通ってるんですけど、あと２つがどうしても出てくれなくて……」"
translation = "「8종류가 랜덤이라서 물량을 쏟아부어야 하거든요. 3일 연속 다니고 있는데 마지막 2개가 죽어도 안 나와줘서……」"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「コンプするまで思う存分食べていいですからね！」"
translation = "「다 모을 때까지 마음껏 드셔도 되니까요!」"

[[dialogue]]
speaker = "unk"
original = "ヒマワリの熱量に負けて、ファーストフード店に同行することにした。"
translation = "히마와리의 열정에 밀려 패스트푸드점에 동행하기로 했다."

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「もぐもぐ……ごめん、ヒマワリちゃん。私もうギブアップ……」"
translation = "「우물우물…… 미안, 히마와리짱. 나 이제 기브업……」"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「もぐもぐ……けっぷ、右腕は出たから、残りは頭だけなのにー。やっぱり頭は封入率低いのかなぁ……うぅ、あたしも、もうギブ……」"
translation = "「우물우물…… 꺽, 오른팔은 나왔으니까 남은 건 머리뿐인데. 역시 머리는 봉입률이 낮은 걸까…… 으으, 나도 이제 기브……」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「ヒマワリちゃん、ネットでバラで買うとかじゃダメなの？」"
translation = "「히마와리짱, 인터넷에서 낱개로 사는 거라든가 하면 안 돼?」"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「ダメに決まってるでしょ！\u3000自分で引かなきゃ意味ないの！」"
translation = "「안 되는 게 당연하잖아! 직접 뽑지 않으면 의미가 없다고!」"

[[dialogue]]
speaker = "unk"
original = "あ、あと１セット行くぞ……！"
translation = "조, 조금만 더 먹어볼게……!"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「うぅ、ありがとうございます、会長さん……！」"
translation = "「으으, 감사합니다, 회장님……!」"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「んっ！？\u3000これは今までと違う手触り！\u3000この突起は、もしかして！」"
translation = "「응!? 이건 지금까지와 다른 손맛! 이 돌기는 설마!」"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「やったー！\u3000頭部パーツだ！\u3000これでボンバーロボコンプリート！」"
translation = "「해냈다! 머리 파츠다! 이걸로 봄버 로보 컴플리트!」"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「ありがとうございます、会長さんの引きのおかげです！\u3000ミウもありがとうね！」"
translation = "「감사합니다, 회장님의 뽑기 운 덕분이에요! 미우도 고마워!」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「良かったね、ヒマワリちゃん」"
translation = "「잘됐네, 히마와리짱.」"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「うんっ！\u3000部屋に帰ったら、組み立てて飾ろうっと！」"
translation = "「응! 방에 가면 조립해서 장식해야지!」"

[[dialogue]]
speaker = "unk"
original = "おめでとう、ヒマワリ。はい、ハンバーガー代"
translation = "축하해, 히마와리. 자, 여기 햄버거값."

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「えっ、払わなくていいんですって！\u3000あたしのわがままに付き合ってもらったんですから」"
translation = "「엣, 안 내셔도 된다니까요! 제 고집에 어울려주신 거니까요.」"

[[dialogue]]
speaker = "unk"
original = "たまたまラッキーセットを５つ食べたかっただけだから"
translation = "마침 럭키 세트를 5개 먹고 싶었을 뿐이니까."

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「なにそれ！\u3000カッコよ！\u3000でも、ここで受け取ったら負けなんで！」"
translation = "「뭐야 그게! 멋있어! 하지만 여기서 받아버리면 지는 거니까요!」"

[[dialogue]]
speaker = "unk"
original = "いやいや、受け取って"
translation = "아니 아니, 받아줘."

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「いやいや、もらえません」"
translation = "「아니 아니, 못 받아요.」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「それじゃ私がもらっちゃおうかなー」"
translation = "「그럼 내가 받아버릴까나─」"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「なんでミウが持ってくねーん！\u3000あはは！」"
translation = "「왜 미우가 가져가는데! 아하하!」"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「どうしても、っていうなら受け取りますけど……それじゃ、あたしは会長さんに借り１です！」"
translation = "「정 그러시다면 받겠지만…… 그럼 저는 회장님께 빚 1스택이에요!」"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「この借りはいつか絶対に返しますんで！\u3000覚えとけ！」"
translation = "「이 빚은 언젠가 반드시 갚을 테니까! 기억해두라고!」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「ふふっ、ヒマワリちゃん、それ悪役の捨て台詞みたい」"
translation = "「후훗, 히마와리짱, 그거 악당의 대사 같아.」"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「なんたって、あたしはセナリィ社長率いるゴールデングースの一員だからね！」"
translation = "「뭐라 해도 나는 세나리 사장님이 이끄는 골든 구스의 일원이니까!」"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「とゆーわけで、会長さん、困ったこととかあたしにしてほしいことがあったら、いつでも言ってくださいね！\u3000汚れ仕事でもなんでもやりますんで！」"
translation = "「그런 고로 회장님, 곤란한 일이나 저에게 바라는 일이 생기면 언제든 말해주세요! 지저분한 일이라도 뭐든 할 테니까요!」"

[[dialogue]]
speaker = "unk"
original = "こうして、数千カロリーと引き換えに心強い味方を得たのだった。"
translation = "이렇게 수천 칼로리와 맞바꿔 든든한 아군을 얻은 것이었다."

