[[dialogue]]
speaker = "unk"
original = "第３話,甘々アンラッキーデー,P"
translation = "제3화, 달콤달콤 언럭키 데이, P"

[[dialogue]]
speaker = "unk"
original = "ある朝、俺がサチと一緒に登校していると、モンスター出現アラートが鳴った。"
translation = "어느 날 아침, 내가 사치와 함께 등교하고 있자 몬스터 출현 알람이 울렸다."

[[dialogue]]
speaker = "unk"
original = "それからすぐに２人で現場に向かい、モンスターを撃退して――"
translation = "그 후 바로 둘이서 현장으로 향해 몬스터를 격퇴하고――"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「探知魔法……反応なし。よし、これで全部倒せたみたいですね」"
translation = "「탐지 마법…… 반응 없음. 좋아, 이걸로 전부 쓰러뜨린 것 같네요」"

[[dialogue]]
speaker = "unk"
original = "サチのおかげで難なく勝てたよ"
translation = "사치 덕분에 무난하게 이겼어"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「いえ。私はむしろ、お兄さんが近くにいてくれるから、強くなれるというか……えへへ<emoji=heart04>」"
translation = "「아니요. 저는 오히려 오빠가 곁에 있어 주니까 강해질 수 있다고나 할까…… 에헤헤<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そうして、俺たちは飛行して学園に到着したのだが――"
translation = "그렇게 해서 우리들은 비행하여 학원에 도착했지만――"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「……あれ？」"
translation = "「……어라?」"

[[dialogue]]
speaker = "unk"
original = "どうしたんだ？"
translation = "왜 그래?"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「え、えっと……その……」"
translation = "「어, 에또…… 그게……」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「なんか……変身が解除できなくて……」"
translation = "「왠지…… 변신이 해제되지 않아서……」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「うぅぅ……まさか、この格好のまま授業を受けることになるなんて……」"
translation = "「으으으…… 설마 이 복장 그대로 수업을 듣게 되다니……」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「あむっ……もぐもぐ……」"
translation = "「아무…… 우물우물……」"

[[dialogue]]
speaker = "unk"
original = "昼休みになり、星徒会室へ逃げるようにやって来たサチは、顔を赤くしたままお弁当を食べる。"
translation = "점심시간이 되어 성도회실로 도망치듯 찾아온 사치는 얼굴을 붉힌 채 도시락을 먹는다."

[[dialogue]]
speaker = "unk"
original = "トレジアンナさんに解析してもらった結果、サチの変身が解除できなくなったのは、フォルトゥーナフォームの<b>反動</b>が原因だと判明した。"
translation = "트레지안나 씨에게 해석을 맡긴 결과, 사치의 변신이 해제되지 않게 된 것은 포르투나 폼의 <b>반동</b>이 원인이라고 판명되었다."

[[dialogue]]
speaker = "unk"
original = "サチの幸運を更に強化するフォルトゥーナフォーム。その反動は大きく、本来なら年に１回周期で訪れる不幸の日――『アンラッキーデー』の周期が、早まってしまったらしい。"
translation = "사치의 행운을 더욱 강화하는 포르투나 폼. 그 반동은 컸고, 본래라면 1년에 한 번 주기로 찾아오는 불행의 날―― 『언럭키 데이』의 주기가 앞당겨진 모양이다."

[[dialogue]]
speaker = "unk"
original = "つまりは今日、再び訪れたアンラッキーデーにより、サチは不幸にも変身解除ができなくなってしまった――というわけだった。"
translation = "즉 오늘은 다시 찾아온 언럭키 데이로 인해, 사치는 불행히도 변신 해제를 할 수 없게 되어버렸다――는 것이었다."

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「……午前中、周りからは衣装が可愛いと沢山褒められました」"
translation = "「……오전 중에 주변에서 의상이 귀엽다고 많이 칭찬받았어요」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「笑われないのはすごくありがたいんですけど……可愛い可愛いって褒められるのも、それはそれで無性に恥ずかしいというか……はぅぅ」"
translation = "「비웃음당하지 않는 건 정말 다행이지만…… 귀엽다 귀엽다 칭찬받는 것도 그건 그것대로 무척 부끄럽다고나 할까…… 하으으」"

[[dialogue]]
speaker = "unk"
original = "今日は無理せず休んだっていいんだぞ？"
translation = "오늘은 무리하지 말고 쉬어도 된다고?"

[[dialogue]]
speaker = "unk"
original = "あんまり恥ずかしいなら"
translation = "너무 부끄럽다면"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「いえ……私は流星学園附属校の生徒会長ですから」"
translation = "「아니요…… 저는 유성학원 부속교의 성도회장이니까요」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「何より、私が誇れる自分でいたいんです」"
translation = "「무엇보다 제가 자랑스러워할 수 있는 자신으로 있고 싶어요」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「たとえ不運な時でも、自分やみんなを信じて諦めずに戦い続ける、お兄さんみたいに強い星騎士であれるように」"
translation = "「설령 불운할 때라도 자신과 모두를 믿고 포기하지 않고 계속 싸우는, 오빠처럼 강한 별의 기사로 있을 수 있도록」"

[[dialogue]]
speaker = "unk"
original = "サチのそういう頑張り屋なところ、好きだぞ"
translation = "사치의 그런 노력파 같은 면, 좋아한다고"

[[dialogue]]
speaker = "unk"
original = "俺は彼女の頭に手を置き、そっと撫でる。"
translation = "나는 그녀의 머리에 손을 얹고 살며시 쓰다듬는다."

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「あっ……えへへへへぇ<emoji=heart04>」"
translation = "「앗…… 에헤헤헤헤<emoji=heart04>」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「お兄さんに撫でられると……安心します♪」"
translation = "「오빠가 쓰다듬어 주면…… 안심돼요♪」"

[[dialogue]]
speaker = "unk"
original = "俺はサチの恋人なんだから"
translation = "나는 사치의 연인이니까"

[[dialogue]]
speaker = "unk"
original = "でも、本当に辛い時はちゃんと言ってね"
translation = "하지만 정말 힘들 때는 꼭 말해줘"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「……！\u3000お兄さん……はい<emoji=heart04>」"
translation = "「……! 오빠…… 네<emoji=heart04>」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「じゃあ、その……お願いごと、してもいいですか？」"
translation = "「그럼, 저기…… 부탁 하나 해도 될까요?」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「授業は休まずに頑張って受けようと思っているんですけど……帰りに交通事故に合わないかとかは、ちょっと怖くて……」"
translation = "「수업은 쉬지 않고 열심히 들으려고 생각하고 있지만…… 하굣길에 교통사고를 당하지 않을까 하는 건 조금 무서워서……」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「だから……できれば今日は前の時みたいに、星徒会室に泊まることができたらって思うんですけど……どうでしょう？」"
translation = "「그러니까…… 가능하면 오늘은 저번처럼 성도회실에서 자고 갈 수 있었으면 하는데…… 어떨까요?」"

[[dialogue]]
speaker = "unk"
original = "俺は頷いてみせる。"
translation = "나는 고개를 끄덕여 보인다."

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「――幸い、急ぎの仕事はないし、みんなに事情を話して、星徒会は１日休みに……ですか？」"
translation = "「――다행히 급한 일은 없고, 모두에게 사정을 이야기해서 성도회는 하루 쉬기로…… 하는 건가요?」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「ありがとうございます、お兄さん♪」"
translation = "「감사합니다, 오빠♪」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「え？\u3000――前みたいに、魔法少女のみんなも呼んでお泊り会にするかって？」"
translation = "「에? ――저번처럼 마법소녀 친구들도 불러서 파자마 파티를 할 거냐고요?」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「そ、それも楽しそうでいいんですけど……その、今回は……」"
translation = "「그, 그것도 즐거울 것 같아 좋지만…… 저기, 이번에는……」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「みんなには内緒で、お兄さんと２人きり……っていうのは、ダメですか……？」"
translation = "「모두에게는 비밀로 오빠랑 둘이서만……이라는 건 안 될까요……?」"

[[dialogue]]
speaker = "unk"
original = "一瞬、思考が停止する。が、次の瞬間、俺は全力で首を縦に振っていた。"
translation = "일순 사고가 정지한다. 하지만 다음 순간, 나는 전력을 다해 고개를 세로로 젓고 있었다."

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「いいんですか？\u3000えへへへへぇ<emoji=heart04>」"
translation = "「괜찮나요? 에헤헤헤헤<emoji=heart04>」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「――いつもと反応が違ってエッチ！？\u3000も、もう、そこはわざわざツッコまないで下さいっ」"
translation = "「――평소랑 반응이 달라서 야해!? 저, 정말, 거기는 굳이 딴지 걸지 말아 주세요」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「今日はアンラッキーデーだから……仕方なくです！\u3000ほら、風邪を引いた時みたいなものですから……！」"
translation = "「오늘은 언럭키 데이니까…… 어쩔 수 없이 그러는 거예요! 봐요, 감기 걸렸을 때 같은 거니까요……!」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「とりあえず、これで……放課後までどんなアンラッキーに遭っても、へっちゃらです♪」"
translation = "「일단 이걸로…… 방과 후까지 어떤 언럭키를 겪어도 끄떡없어요♪」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「あっ、でも……」"
translation = "「앗, 하지만……」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「もう少しだけ、勇気をもらってもいいですか？\u3000午後の授業を頑張れるように……」"
translation = "「조금만 더 용기를 얻어도 될까요? 오후 수업을 힘낼 수 있도록……」"

[[dialogue]]
speaker = "unk"
original = "そう言って、照れた顔で近くへ来るサチ。"
translation = "그렇게 말하며 수줍은 얼굴로 가까이 다가오는 사치."

[[dialogue]]
speaker = "unk"
original = "俺は頷いて、彼女の体を抱き寄せる。"
translation = "나는 고개를 끄덕이며 그녀의 몸을 끌어안는다."

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「ん……<emoji=heart04>\u3000お兄さんの体……温かいです……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 오빠 몸…… 따뜻해요……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「えへへ<emoji=heart04>\u3000アンラッキーでも幸せな気分になっちゃいます<emoji=heart04>」"
translation = "「에헤헤<emoji=heart04> 언럭키라도 행복한 기분이 되어버려요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そうして、しばらく抱き合ったまま過ごす俺たちなのだった――"
translation = "그렇게 해서 잠시 동안 서로 껴안은 채 시간을 보내는 우리들이었다――"

