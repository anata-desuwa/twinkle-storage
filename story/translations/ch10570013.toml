[[dialogue]]
speaker = "unk"
original = "第３話,トリシャの意外な特技,P"
translation = "제3화, 트리샤의 의외의 특기, P"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「魔界レゾフより、ようこそお越しくださいました。私、お嬢様にお仕えしております、星見家メイド隊の長──キリカと申します」"
translation = "「마계 레조프에서, 잘 오셨습니다. 저, 아가씨를 모시고 있는, 호시미 가문 메이드대의 장── 키리카라고 합니다」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「うっ、おっ、あ、わ、私は……トリ。トリシャ、アポ、ア、ポテレス……」"
translation = "「윽, 엇, 아, 와, 저는…… 트리. 트리샤, 아포, 아, 포테레스……」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「魔界では大層、お嬢様がお世話になったと伺っております。当家に滞在中は、ぜひご実家のように寛がれてください」"
translation = "「마계에서는 대단히, 아가씨가 신세를 졌다고 들었습니다. 당가에 머무시는 동안은, 부디 본가처럼 편히 쉬십시오」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「きょ、恐縮の至り……あ、あなたにも、星の加護が訪れますよう……」"
translation = "「송, 송구할 따름…… 다, 당신에게도, 별의 가호가 깃들기를……」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「高名な占星術師様からのお言葉、ありがたく頂戴いたします。それでは私は外に控えておりますので、何かありましたらお呼びください」"
translation = "「고명하신 점성술사님의 말씀, 감사히 받겠습니다. 그러면 저는 밖에 대기하고 있을 테니, 무슨 일이 있으면 불러주십시오」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「あ。ま、待って欲しい……これ。その、お近づきのしるしに……プレゼント……」"
translation = "「아. 기, 기다려 줬으면 해…… 이거. 그, 친해지고 싶다는 증표로…… 선물……」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「私にですか？\u3000まあ……これは素敵なものを。ありがとうございます」"
translation = "「저에게 말입니까? 어머…… 이건 멋진 것을. 감사합니다」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「大切に使わせていただきますね。それでは……」"
translation = "「소중히 사용하도록 하겠습니다. 그러면……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ふっはぁああ～……！\u3000スケールが、違う……星見家……物語で読んだ、お姫様の城、みたいです……」"
translation = "「푸하아아아~……! 스케일이, 달라…… 호시미 가문…… 이야기에서 읽은, 공주님의 성, 같아요……」"

[[dialogue]]
speaker = "unk"
original = "お疲れ様、トリシャさん"
translation = "수고했어, 트리샤 씨"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ありがとう……でも、本当にすごい。屋敷にいる人、みんな心が綺麗で……星と繋がっている。フィオナさんの人柄、でしょうか……」"
translation = "「고마워…… 하지만, 정말 대단해. 저택에 있는 사람, 모두 마음이 깨끗하고…… 별과 이어져 있어. 피오나 씨의 인품, 덕분일까요……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「人間の友達が、どんどん増えて……に、へ、へへっ……師匠に伝えたらきっと卒倒する、でしょう……」"
translation = "「인간 친구가, 점점 늘어나서…… 헤, 헤, 헤헤…… 스승님께 전하면 분명 졸도하실, 거예요……」"

[[dialogue]]
speaker = "unk"
original = "まだまだこれからだよ"
translation = "아직 이제부터 시작이야"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「そうでした。そろそろ……本命の……」"
translation = "「그랬죠. 슬슬…… 본론인……」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「失礼いたします。お嬢様より、こちらに顔を出すようにと仰せつか──」"
translation = "「실례하겠습니다. 아가씨로부터, 이쪽에 얼굴을 비추라고 분부받──」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「て、天使っ……！！\u3000は、ははは、初めて、見た……！」"
translation = "「처, 천사……!! 처, 처처, 처음, 봤어……!」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ひゃっ！？\u3000あ、あの、私が何か……？」"
translation = "「히약!? 저, 저기, 제가 뭔가……?」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「お、ぉおお……すごいっ……綺麗な羽……ヘイロー……魔族と全然違う……！」"
translation = "「오, 오오오…… 굉장해…… 예쁜 날개…… 헤일로…… 마족이랑 전혀 달라……!」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ひ、緋宮会長。この方が、あの、トリシャ様……？\u3000どうしてこんなに興奮して……！？」"
translation = "「히, 히노미야 회장님. 이분이, 그, 트리샤 님……? 어째서 이렇게 흥분해서……!?」"

[[dialogue]]
speaker = "unk"
original = "天使に会うの、初めてなんだ"
translation = "천사를 만나는 건, 처음이거든"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「それは何となく分かるのですが……きゃっ。は、羽をつんつんしないでくださいっ……！」"
translation = "「그건 왠지 알겠습니다만…… 꺄악. 나, 날개를 콕콕 찌르지 말아 주세요!」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「素晴らしい……本当に綺麗……そしてただならぬ香りもする……くんくん……」"
translation = "「훌륭해…… 정말 예뻐…… 그리고 심상치 않은 향기도 나…… 킁킁……」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「た、ただならぬ！？\u3000嗅ぐのはもっとダメです！\u3000ななな、何なんですか、この方はっ！」"
translation = "「심, 심상치 않다니!? 냄새를 맡는 건 더 안 돼요! 머머머, 뭐 하는 분인가요, 이분은!」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「申し遅れた。私は魔界レゾフの占星術師、トリシャ……フィオナさんとは、と、友達……に、へへっ……」"
translation = "「인사가 늦었군. 나는 마계 레조프의 점성술사, 트리샤…… 피오나 씨와는, 치, 친구…… 헤, 헤헤……」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「名前を聞いているのではありませんっ……う、ぅう、私はいったいどうすれば……？」"
translation = "「이름을 묻는 게 아니에요! 으, 으으, 저는 대체 어떻게 하면……?」"

[[dialogue]]
speaker = "unk"
original = "優しい子だから相手してあげて"
translation = "상냥한 아이니까 상대해 줘"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「わ……わかりました。そういうミッション、ということですね？」"
translation = "「아…… 알겠습니다. 그런 미션, 이라는 거군요?」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「あなたの守護星は……<ruby>コップ座α星<rt>アルケス</rt></ruby>。なるほど。天の杯に似合う、水の波動……」"
translation = "「당신의 수호성은…… <ruby>컵자리 α별<rt>알케스</rt></ruby>. 과연. 하늘의 잔에 어울리는, 물의 파동……」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「え……！\u3000見ただけで、他人の守護星が分かるのですか？」"
translation = "「에……! 보는 것만으로, 타인의 수호성을 알 수 있는 건가요?」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「星との対話は占星術師の基本だから。天使さん、あの、お名前は……？」"
translation = "「별과의 대화는 점성술사의 기본이니까. 천사 씨, 저기, 이름은……?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ナミエルです。ナミエル・クレシェンテ……」"
translation = "「나미엘입니다. 나미엘 크레셴테……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ナミエルさん……あの、良ければ、私と、友達に……」"
translation = "「나미엘 씨…… 저기, 괜찮다면, 저와, 친구가……」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「あ、は、はい……？\u3000それは、もちろん構いませんが……」"
translation = "「아, 하, 네……? 그건, 물론 상관없습니다만……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「に、にへへっ……で、では。これ。お近づきのしるしに、お土産をどうぞ……」"
translation = "「헤, 헤헤…… 그, 그럼. 이거. 친해지고 싶다는 증표로, 기념품을 받으세요……」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「あ、ありがとうございます──あ、でも、お嬢様の許可なく物をいただくわけには」"
translation = "「아, 감사합니다── 아, 하지만, 아가씨의 허락 없이 물건을 받을 수는」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「大丈夫。高価な物じゃない……その、私が編んだ、お手製の……」"
translation = "「괜찮아. 비싼 물건이 아니야…… 그, 내가 뜬, 수제……」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「あ……マフラー、ですね。丁寧に編み込まれていて、とても優しい手触り……」"
translation = "「아…… 목도리, 네요. 정성스럽게 짜여 있어서, 아주 부드러운 감촉……」"

[[dialogue]]
speaker = "unk"
original = "編み物、得意なんだ？"
translation = "뜨개질, 잘하나 보네?"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「占星術以外で、唯一身に付いてる技……ここに来る予定が立った時から、レゾフでたくさん編んで、持ってきた……フフ……」"
translation = "「점성술 이외에, 유일하게 익힌 기술…… 여기 올 예정이 잡혔을 때부터, 레조프에서 잔뜩 떠서, 가져왔어…… 후후……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ただし問題も、あって……」"
translation = "「다만 문제도, 있어서……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「こんにちはー！\u3000フィオナ会長に言われてやってきました！\u3000魔界からのお客様がいらっしゃるそうでー！」"
translation = "「안녕하세용~! 피오나 회장님이 가보라고 해서 왔습니닷! 마계에서 온 손님이 계시다고 해서용~!」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「お、おぉっ……新しい、天使、さん……！」"
translation = "「오, 오오…… 새로운, 천사, 씨……!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「はい、ルリエルは天使なのですっ！\u3000どんなご用事でしょうかっ！」"
translation = "「네, 루리엘은 천사인 거예요! 어떤 용무인가요!」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「どうしよう……あれだけ作ってきたマフラーのストックが……フィオナさんのコミュニティ……すごく広い……」"
translation = "「어쩌지…… 그렇게나 만들어 온 목도리 재고가…… 피오나 씨의 커뮤니티…… 너무 넓어……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「自分のことを占えていれば……こんなことには……」"
translation = "「자신의 일을 점칠 수 있었다면…… 이런 일은……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ルリエル、さん……申し訳ないのだけど、３……いや、２時間ほど、待っていて欲しい……今からマフラー編むから……」"
translation = "「루리엘, 씨…… 미안하지만, 3…… 아니, 2시간 정도, 기다려 줬으면 해…… 지금부터 목도리 뜰 테니까……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「どどど、どういうことなのですっ！？」"
translation = "「머머머, 무슨 소리인가요!?」"

[[dialogue]]
speaker = "unk"
original = "その後、さらに大勢の人たちがトリシャさんに会いに来て……そのたびに新しいマフラーを編んでいくトリシャさんなのだった。"
translation = "그 후, 더욱 많은 사람이 트리샤 씨를 만나러 왔고…… 그때마다 새로운 목도리를 떠가는 트리샤 씨였다."

