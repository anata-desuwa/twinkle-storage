[[dialogue]]
speaker = "unk"
original = "第５話,女帝の懐刀,B"
translation = "제5화, 여제의 심복, B"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「リフレクトゴッデスカリバー！」"
translation = "「리플렉트 가디스 칼리버!」"

[[dialogue]]
speaker = "unk"
original = "紫電をまとった長剣を横一文字に振るい、ガーディアンを両断した。"
translation = "자전(紫電)을 두른 장검을 가로로 휘둘러, 가디언을 양단했다."

[[dialogue]]
speaker = "unk"
original = "だが無辜の民を襲う脅威は、極星従騎ばかりではない。"
translation = "하지만 무고한 백성을 습격하는 위협은 극성종기뿐만이 아니었다."

[[dialogue]]
speaker_original = "マキナ・スクアルス"
speaker_translation = "마키나 스쿠알스"
original = "「シャァアアアッ！！」"
translation = "「샤아아아앗!!」"

[[dialogue]]
speaker = "unk"
original = "鋼の鎧で身を固めた機械のモンスターが、頭の刃で地面を引き裂き、牙をコンクリートに突き立て、街を瓦礫に変えていく。"
translation = "강철 갑옷으로 몸을 굳힌 기계 몬스터가, 머리의 칼날로 지면을 가르고, 송곳니를 콘크리트에 박아 넣으며 거리를 잔해로 바꾸어 간다."

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「ボルカニック・イプシロン──！」"
translation = "「볼카닉 입실론──!」"

[[dialogue]]
speaker_original = "マキナ・スクアルス"
speaker_translation = "마키나 스쿠알스"
original = "「シャアアアッ……！」"
translation = "「샤아아앗……!」"

[[dialogue]]
speaker = "unk"
original = "炎の矢がサメの口内を貫き、モンスターが内側から爆散する。"
translation = "불꽃의 화살이 상어의 입안을 꿰뚫고, 몬스터가 내면에서 폭발한다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「はぁ、はぁ……トドメを刺す時だけノヴァフォームになってるけど、これはこれでキツい……」"
translation = "「하아, 하아…… 마무리를 지을 때만 노바 폼이 되고 있지만, 이건 이것대로 힘드네……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ノヴァフォームを維持するよりはマシですが、消耗は激しいですね。もっと長くノヴァフォームを維持できればいいのですが……」"
translation = "「노바 폼을 유지하는 것보다는 낫지만, 소모가 격렬하군요. 좀 더 오래 노바 폼을 유지할 수 있으면 좋겠습니다만……」"

[[dialogue]]
speaker = "unk"
original = "流星市国に襲来したのは数百体の極星従騎。モンスターに至っては数もわからない。"
translation = "유성시국에 내습한 것은 수백 마리의 극성종기. 몬스터에 이르러서는 숫자조차 알 수 없다."

[[dialogue]]
speaker = "unk"
original = "ノヴァフォームでも戦力を覆すには及ばず、今も星騎士たちが傷つき倒れ、街が廃墟と化していた。"
translation = "노바 폼으로도 전력을 뒤집기엔 역부족이었고, 지금도 성기사들이 상처 입어 쓰러지고 거리가 폐허로 변해가고 있었다."

[[dialogue]]
speaker_original = "ドラケルス"
speaker_translation = "드라켈스"
original = "「ガアゥゥ！」"
translation = "「가우우!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「マトイ先輩、１２時の方向からモンスター来ます！」"
translation = "「마토이 선배, 12시 방향에서 몬스터가 옵니다!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「くっ……また機械のモンスター……すごく硬いやつ……」"
translation = "「큭…… 또 기계 몬스터…… 엄청 단단한 녀석……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（もう手の感覚がほとんどない……星力も残り少なくて、頭がくらくらする……）"
translation = "（벌써 손의 감각이 거의 없어…… 성력도 얼마 남지 않아서, 머리가 어질어질해……）"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（でも弱気になっちゃダメ……極星従騎やあの新しいモンスターを倒せる星騎士は少ないんだから、星徒会が先頭に立たないと……！）"
translation = "（하지만 약해지면 안 돼…… 극성종기나 저 새로운 몬스터를 쓰러뜨릴 수 있는 성기사는 적으니까, 성도회가 앞장서야 해……!）"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「この世界は──流星市国は私たちが守るんだから！」"
translation = "「이 세계는── 유성시국은 우리가 지킬 거니까!」"

[[dialogue]]
speaker_original = "マキナ・スクアルス"
speaker_translation = "마키나 스쿠알스"
original = "「シャーッ！！」"
translation = "「샤앗!!」"

[[dialogue]]
speaker_original = "スレイプニル"
speaker_translation = "슬레이프니르"
original = "「ブルルル……！」"
translation = "「부르르르……!」"

[[dialogue]]
speaker_original = "ホルン"
speaker_translation = "호른"
original = "「クルルーーッ！」"
translation = "「쿠루루웃!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「！？\u3000敵がこんなに……！？」"
translation = "「!? 적이 이렇게나……!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「これはさすがに……まずいかもしれませんね……」"
translation = "「이건 역시…… 위험할지도 모르겠네요……」"

[[dialogue]]
speaker = "unk"
original = "モンスターとガーディアンが同時に襲い来るその刹那──"
translation = "몬스터와 가디언이 동시에 덮쳐오는 그 찰나──"

[[dialogue]]
speaker = "？？？"
original = "「破ッ！」"
translation = "「하앗!」"

[[dialogue]]
speaker = "unk"
original = "炎をまとった影がマトイたちと敵の間に飛び込み、その拳でモンスターの<ruby>顎<rt>あぎと</rt></ruby>を打ち抜いた。"
translation = "불꽃을 두른 그림자가 마토이 일행과 적 사이로 뛰어들어, 그 주먹으로 몬스터의 턱을 쳐 올렸다."

[[dialogue]]
speaker = "unk"
original = "モンスターの巨体が地面に叩きつけられ、衝撃で地鳴りが響く。"
translation = "몬스터의 거구가 지면에 내동댕이쳐지고, 충격으로 땅울림이 울려 퍼진다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「だ、誰……！？」"
translation = "「누, 누구……!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「新星学園や流星学園の星騎士ではなさそうですが……」"
translation = "「신성학원이나 유성학원의 성기사는 아닌 것 같습니다만……」"

[[dialogue]]
speaker = "？？？"
original = "「フン」"
translation = "「흥.」"

[[dialogue]]
speaker = "unk"
original = "いきなり現れた魔族の戦士は、マトイとアナを一瞥すると、空を舞うガーディアンに飛び掛かり、強烈な蹴りで剣を砕く。"
translation = "갑자기 나타난 마족 전사는 마토이와 아나를 힐끗 보더니, 하늘을 나는 가디언에게 달려들어 강렬한 발차기로 검을 부순다."

[[dialogue]]
speaker = "？？？"
original = "「はぁっ！」"
translation = "「하앗!」"

[[dialogue]]
speaker_original = "デネブ・カイトス"
speaker_translation = "데네브 카이토스"
original = "「オオオーーーッ」"
translation = "「오오오오옷」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「こっちにもモンスター！？\u3000でも最近出る機械のやつじゃないような……」"
translation = "「이쪽에도 몬스터!? 하지만 최근에 나오는 기계 녀석은 아닌 것 같은데……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「しかもモンスターとモンスターが戦ってる……？\u3000どういうこと……？」"
translation = "「게다가 몬스터랑 몬스터가 싸우고 있어……? 어떻게 된 거지……?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「モンスターを従えているとなると、まさか……」"
translation = "「몬스터를 부리고 있는 걸 보니, 설마……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あ、聞いたことあるかも……もしかしてあの人が煌嶺！？」"
translation = "「아, 들어본 적 있을지도…… 혹시 저 사람이 코레이!?」"

[[dialogue]]
speaker = "？？？"
original = "「何……？」"
translation = "「뭐라고……?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「怒ってる！？\u3000なんで！？」"
translation = "「화났어!? 왜!?」"

[[dialogue]]
speaker = "？？？"
original = "「勘違いするな。モンスターは陛下から<ruby>下賜<rt>かし</rt></ruby>されたものにすぎん」"
translation = "「착각하지 마라. 몬스터는 폐하로부터 하사받은 것에 불과하다.」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「あたしはリーエン。煌嶺陛下の懐刀だ」"
translation = "「나는 리엔. 코레이 폐하의 심복이다.」"

[[dialogue]]
speaker_original = "ドラケルス"
speaker_translation = "드라켈스"
original = "「グァア……」"
translation = "「가아……」"

[[dialogue]]
speaker_original = "スレイプニル"
speaker_translation = "슬레이프니르"
original = "「ブルルル……」"
translation = "「부르르르……」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「叩き伏せたつもりだが、頑丈さだけはあるようだな。ならば陛下から賜った力を見せてやる」"
translation = "「때려눕혔다고 생각했는데, 튼튼함 하나는 있나 보군. 그렇다면 폐하께 하사받은 힘을 보여주마.」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「煌け新星──ノヴァフォーム！」"
translation = "「빛나라 신성── 노바 폼!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「！？」"
translation = "「!?」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「破ァッ！」"
translation = "「하앗!」"

[[dialogue]]
speaker = "unk"
original = "手にした<ruby>戟<rt>げき</rt></ruby>を薙ぎ払うと、炎の奔流がモンスターとガーデイアンをまとめて切り裂き、残骸すら業火が焼き尽くした。"
translation = "손에 든 극을 휘두르자, 불꽃의 분류가 몬스터와 가디언을 한꺼번에 베어 넘겼고, 잔해조차 업화가 태워버렸다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「どうして私たち以外にノヴァフォームが……？」"
translation = "「어째서 우리 말고 노바 폼이……?」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「おまえたちだけの専売特許だと思ったか？」"
translation = "「너희만의 전유물이라고 생각했나?」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「アルケインコードは元々キュリオスで伝承されていたもの。そして煌嶺陛下は魔王の血を継ぐ者。こちらにも使える者がいて当然だろう」"
translation = "「아르케인 코드는 원래 큐리오스에서 전승되던 것. 그리고 코레이 폐하는 마왕의 피를 잇는 자. 이쪽에도 사용할 수 있는 자가 있는 건 당연하겠지.」"

[[dialogue]]
speaker_original = "マキナ・スクアルス"
speaker_translation = "마키나 스쿠알스"
original = "「シャーッ！」"
translation = "「샤앗!」"

[[dialogue]]
speaker_original = "スレイプニル"
speaker_translation = "슬레이프니르"
original = "「ブルル！」"
translation = "「부르르!」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「次から次へと……邪魔だ！」"
translation = "「차례차례…… 방해된다!」"

[[dialogue]]
speaker = "unk"
original = "戟の一撃でモンスターをかち割り、ガーディアンを真っ二つにし、次々と蹴散らしていく。"
translation = "극의 일격으로 몬스터를 쪼개고, 가디언을 두 동강 내며 차례차례 격퇴해 나간다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あの人、強い……！」"
translation = "「저 사람, 강해……!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「しかも私たちより洗練されていますね……星力の循環に無駄がありません」"
translation = "「게다가 저희보다 세련되었네요…… 성력의 순환에 낭비가 없어요.」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「おまえたちのような付け焼刃ではないのだ。おまえたちこそ、ノヴァフォームを使いこなせていないことを恥じるべきではないか？」"
translation = "「너희 같은 벼락치기와는 다르다. 너희야말로, 노바 폼을 제대로 다루지 못하는 것을 부끄러워해야 하지 않겠나?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「……！\u3000ノヴァフォームを、使いこなせてない……」"
translation = "「……! 노바 폼을, 제대로 다루지 못해……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「マトイ先輩……」"
translation = "「아나짱……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あはは……ちょっとショックだったけど、大丈夫」"
translation = "「아하하…… 조금 충격이었지만, 괜찮아.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「だって、私たちはもっと強くなれるってことだから……！」"
translation = "「그치만, 우리는 더 강해질 수 있다는 뜻이니까……!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……ええ、そうですね」"
translation = "「……네, 그렇네요.」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「フン、根性はそれなりにあるようだな。足を引っ張るなよ」"
translation = "「흥, 근성은 그럭저럭 있는 모양이군. 발목이나 잡지 마라.」"

[[dialogue]]
speaker_original = "エレマル"
speaker_translation = "엘레말"
original = "「ビビビビ！」"
translation = "「비비비비!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「モンスターの大群が接近。こちらを包囲しようとしています」"
translation = "「몬스터 대군이 접근. 이쪽을 포위하려 하고 있습니다.」"

[[dialogue]]
speaker = "？？？"
original = "「させませんよ」"
translation = "「하게 두지 않겠어요.」"

[[dialogue]]
speaker = "unk"
original = "銃撃の雨がモンスターに降り注ぎ、軍隊のような容赦ない攻撃が敵を瓦礫に変えていく。"
translation = "총격의 비가 몬스터에게 쏟아지고, 군대와 같은 용서 없는 공격이 적을 잔해로 바꾸어 간다."

[[dialogue]]
speaker_original = "エレマル"
speaker_translation = "엘레말"
original = "「ビビビ……」"
translation = "「비비비……」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「ふぅ……この辺りは落ち着きましたかね」"
translation = "「후우…… 이 부근은 진정된 모양이네요.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あなたは……新しい学園長先生！？\u3000変身できたんですか！？」"
translation = "「당신은…… 새로운 학원장 선생님!? 변신할 수 있었던 건가요!?」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「はい。ヘレナさんの勧めで適性検査を受けてみたら……この通り、私にも星力があったようで」"
translation = "「네. 헬레나 씨의 권유로 적성 검사를 받아봤더니…… 보시는 바와 같이, 제게도 성력이 있었던 모양이라.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「護身も兼ねて訓練したので、戦闘もこなせるようになりました。<ruby>セイファート元学園長<rt>前任の方</rt></ruby>ほどでありませんが、私も戦いますよ」"
translation = "「호신도 겸해서 훈련했기에, 전투도 해낼 수 있게 되었습니다. 세이파트 전 학원장 정도는 아니지만, 저도 싸우겠어요.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「天才っているものなんですね……」"
translation = "「천재라는 건 정말 있는 거군요……」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「シノといったな。今はおまえの命令に従えと煌嶺陛下に仰せつかっている。陛下の懐刀、上手く使ってみせろ」"
translation = "「시노라고 했나. 지금은 네 명령에 따르라고 코레이 폐하께 분부받았다. 폐하의 심복, 잘 부려보도록 해라.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「思いのほか高く買ってくれてるんですね、あの人。戦闘指揮は勉強中ですが、頑張って期待に応えるとしましょう！」"
translation = "「생각보다 높게 평가해 주시고 계시네요, 그분. 전투 지휘는 공부 중입니다만, 열심히 기대에 부응해 보도록 하죠!」"

