[[dialogue]]
speaker = "unk"
original = "第２話,アムたちのお出かけ,P"
translation = "「잔뜩 뛰어다녔더니 배가 고픈 것이다~」"

[[dialogue]]
speaker = "unk"
original = "アムとナミエルの二人三脚生活が無事に終わった、クリスマスの後日。"
translation = "「후우…… 어떻게 이번엔 끝까지 남을 수 있었네요.」"

[[dialogue]]
speaker = "unk"
original = "２人は週末の休日に、街へ出かけることになった。"
translation = "「이예~이♪ 나이스 콤비네이션! 잘 풀렸네♪」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「ふんふん、ふふふ～ん♪\u3000いや～、ナミエルとのお出かけ、楽しみにしてたんだよね～」"
translation = "「뭐, 뭐어……. 하지만 아무 선배, 역시 대단하시네요. 함께 싸워보니 성기사로서의 실력이 느껴졌어요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ただの外出で、そこまでテンション上がらなくても……」"
translation = "「후후훗, 그렇지~?」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「えっ、だって、ナミエルともっと仲良くなることができる日じゃん？\u3000そりゃワクワクしてきちゃうよ～」"
translation = "「하지만 나미엘도 엄청 잘 싸우잖아! 나, 앞으로 더 친해지고 싶다고 생각했어♪」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「仲良くって……アム先輩はやはり『陽キャ』ですね。そういうことを何気なくさらっと言っちゃうんですから……」"
translation = "「친하게…… 그, 그렇군요.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「私も本日のお出かけは、とても楽しみにしておりましたわ♪」"
translation = "「일단 나미엘, 승리의 하이파이브 하자♪」"

[[dialogue]]
speaker = "unk"
original = "そう――今回のお出かけにはなんと、附属校３年生でアムのクラスメイトであるエルデリーゼも同行していた。"
translation = "「에? 네, 네……!」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「ナミエル様、先輩後輩として更に親睦を深められるよう、本日はこの前のお泊り会の時みたいに、楽しい１日に致しましょうね♪」"
translation = "조금 쑥스러움을 느끼면서도 나미엘이 손바닥을 위로 내밀자, 아무는 미소를 띄우며 활기차게 하이파이브를 나누었다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「はい、エルゼ先輩。私も楽しみにしていました。本日はよろしくお願いします」"
translation = "제2화, 아무 일행의 외출, P"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あたしに対する態度と、なんか微妙に温度差ない！？」"
translation = "아무와 나미엘의 2인 3각 생활이 무사히 끝난 크리스마스 며칠 뒤."

[[dialogue]]
speaker = "unk"
original = "そうして、エルデリーゼを含めた３人で、街を歩くことになったアム達。"
translation = "두 사람은 주말 휴일에 거리로 외출하게 되었다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あっ、２人共、見てこれ！\u3000この服、めっちゃカッコよくない！？」"
translation = "「흠흠, 흐흐흐~음♪ 이야~, 나미엘과의 외출, 기대하고 있었거든~」"

[[dialogue]]
speaker = "unk"
original = "ウィンドウショッピングをしている途中で服屋に入った際、アムが足を止めて言った。"
translation = "「그냥 외출인데 그렇게까지 텐션이 올라가지 않아도……」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「えっ、この黒いコートですか……？\u3000なんかその……微妙に『ダサい』気が……」"
translation = "「엣, 그치만 나미엘이랑 더 친해질 수 있는 날이잖아? 그야 두근거릴 수밖에 없지~」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「ダサい！？」"
translation = "「친하게라니…… 아무 선배는 역시 『인싸』네요. 그런 말을 아무렇지도 않게 툭 내뱉으시니까……」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「すみません、ダサいは言い過ぎました。個人的にあまり良さが分からないファッションというか……」"
translation = "「저도 오늘 외출은 무척 기대하고 있었답니다♪」"

[[dialogue]]
speaker = "unk"
original = "ナミエルが思わずダサいと言ってしまったその服は――いわゆる『思春期の男子』が喜びそうな雰囲気の、アニメや漫画に登場しそうな漆黒のロングコートであった。"
translation = "그렇다── 이번 외출에는 무려 부속교 3학년이자 아무의 클래스메이트인 엘데리제가 동행하고 있었다."

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「大丈夫ですわ、ナミエル様。私もアムの服装のセンスについては、前から同じようにズレていると感じていましたもの」"
translation = "「나미엘 님, 선후배로서 더욱 친목을 다질 수 있도록 오늘은 지난번 파자마 파티 때처럼 즐거운 하루를 보내기로 해요♪」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「ズレてる！？\u3000いや、待って？\u3000２人は女の子らしく可愛い系の服が好みかもしれないけども！\u3000あたしはカッコいい系が好みってだけだし……！」"
translation = "「네, 엘제 선배. 저도 기대하고 있었습니다. 오늘 잘 부탁드려요.」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「ほら、このところどころ穴が開いてる感じがカッコよくない……！？\u3000ダメージジーンズってあるじゃん？\u3000あれと同じ感じで……！」"
translation = "「나를 대하는 태도랑 왠지 미묘하게 온도 차이 나지 않아!?」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「――アム。現在は会長と異性として、お付き合いされているのですわよね？」"
translation = "그렇게 엘데리제를 포함한 세 명은 거리를 걷게 되었다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「え？\u3000う、うん……そうだけど？」"
translation = "「앗, 둘 다 이것 봐! 이 옷, 완전 멋있지 않아!?」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「こんな意味不明に穴が開きまくったコートをもしデートに着ていったら――フラれますわよ？」"
translation = "윈도쇼핑을 하던 도중 옷 가게에 들어갔을 때 아무가 발을 멈추며 말했다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「そこまで！？\u3000いや、会長はコート１つがダサかったくらいで、フったりなんかしないはず……！」"
translation = "「에? 이 검은 코트 말인가요……? 왠지 그…… 미묘하게 『촌스러운』 기분이……」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「正直、『お芋っぽい』香りが致しますわ」"
translation = "「촌스럽다니!?」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「お芋！？」"
translation = "「죄송해요, 촌스럽다는 건 말이 좀 심했네요. 개인적으로 별로 장점을 모르겠는 패션이랄까……」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「……なんだか、アム先輩が普段どんな私服を着ているのか、気になってきました。……家ではジャージとかですか？」"
translation = "나미엘이 무심코 촌스럽다고 말해버린 그 옷은── 소위 『사춘기 소년』들이 좋아할 법한 분위기의, 애니메이션이나 만화에 등장할 것 같은 칠흑의 롱 코트였다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「芋ジャージってこと！？\u3000変なイメージするのやめて！\u3000違うから！\u3000あたし、家ではちゃんと別の私服を着てるからっ！」"
translation = "「괜찮아요, 나미엘 님. 저도 아무의 패션 센스에 대해서는 예전부터 똑같이 어긋나 있다고 느끼고 있었으니까요.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「ちなみに、私服のバリエーションはこんな感じですわ♪\u3000ほら、１つだけじゃなくて、沢山ありますのよ。え～っと、ＤＩＳＣで写真を見る操作は確か……」"
translation = "「어긋나 있다니!? 아니, 잠깐만? 둘은 여자애답고 귀여운 계열의 옷을 좋아할지 몰라도! 난 멋진 계열이 취향일 뿐이고……!」"

[[dialogue]]
speaker = "unk"
original = "そう言って、エルデリーゼはたどたどしい手つきでＤＩＳＣを操作し、アムが私服を着ている写真を開く。それから指でスライドさせ、いくつも見せていく。"
translation = "「봐봐, 여기저기 구멍이 뚫린 느낌이 멋있지 않아……!? 데미지 진이라는 거 있잖아? 그거랑 같은 느낌으로……!」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「え？\u3000私服のアム先輩、いつもより女の子らしくて可愛い……！」"
translation = "「──아무. 현재는 회장님과 이성으로서 사귀고 있는 사이죠?」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「ちょっ！？\u3000エルゼ、勝手に見せないでよ！\u3000恥ずかしいじゃん！」"
translation = "「어? 으, 응…… 그렇긴 한데?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ですが、どうしてエルゼ先輩がこんなに写真を……？」"
translation = "「이런 의미불명하게 구멍이 숭숭 뚫린 코트를 만약 데이트에 입고 나갔다간── 차일 거예요?」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「ふふっ、実はアムの私服……私がこうして一緒に出かけた時に、毎回選んで差し上げておりますのよ♪」"
translation = "「그 정도야!? 아니, 회장은 코트 하나 촌스럽다고 차거나 하지는 않을 거야……!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「だって～、エルゼが毎度毎度、あたしがカッコいいの選ぼうとすると、断固阻止してくるから……」"
translation = "「솔직히, 『감자 같은』 냄새가 나요.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「アムってば、放っておくと全然可愛くない服を買おうとするんですもの！\u3000ライバルとして見過ごせませんわ！」"
translation = "「감자!?」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「くぅっ……！\u3000あたしはただ、女として大人っぽくてカッコいいファッションをしたいだけなのに……！」"
translation = "「……왠지 아무 선배가 평소에 어떤 사복을 입는지 궁금해졌어요. ……집에서는 츄리닝 같은 걸 입나요?」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「アムの言う『カッコいい』は、お子様っぽいのですわ！」"
translation = "「아무가 말하는 『멋지다』는 어린애 같아요!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「子供っぽくないし！」"
translation = "「어린애 아니거든!」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「子供みたいに頬を膨らませてて可愛い……」"
translation = "「아이처럼 볼을 부풀리고 있어서 귀여워……」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「ナミエル、誰が可愛いって！？\u3000むぅ～！\u3000こうなったら――」"
translation = "「나미엘, 누가 귀엽다는 거야!? 으으~! 이렇게 되면──」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「この中で誰が一番カッコいい私服コーデを選べるか、勝負だよ！」"
translation = "「이 중에서 누가 제일 멋진 사복 코디를 고르는지 승부야!」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「面白そうですわね♪\u3000『可愛い』ではなく、『カッコいい』の基準で私服を選ぶのは、私、初めてですわ。ふふっ♪」"
translation = "「재미있겠네요♪ 『귀여움』이 아니라 『멋짐』을 기준으로 사복을 고르는 건 저도 처음이에요. 후훗♪」"

[[dialogue]]
speaker = "unk"
original = "その後。"
translation = "그 후."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「ま、負けたぁぁぁーーーっ！！！」"
translation = "「졌다아아아아아──!!!」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「おみそれしました。これは完全に、エルゼ先輩の勝ちですね」"
translation = "「정말 놀랐습니다. 이건 완전히 엘제 선배의 승리네요.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「ふふふっ♪\u3000ファッションセンスでは、アムには決して負けませんわよ♪」"
translation = "「후후훗♪ 패션 센스에서는 아무에게 결코 지지 않아요♪」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「くうぅ～～っ！\u3000あたしだってそのうち絶対、エルゼがカッコいいと唸るコーデを見せてやるんだからぁ～～っ！！」"
translation = "「으으으윽~! 나도 조만간 꼭 엘제가 멋지다고 감탄할 코디를 보여줄 테니까아아아~~!!」"

[[dialogue]]
speaker = "unk"
original = "こうして、ファッションでもいつかエルゼに勝つと誓うアムなのであった。"
translation = "이렇게 패션에서도 언젠가 엘제를 이기겠다고 맹세하는 아무였다."

