[[dialogue]]
speaker = "unk"
original = "第４話,アニュラスとすれ違い……？,P"
translation = "제4화, 아뉴라스와 엇갈림……?, P"

[[dialogue]]
speaker = "unk"
original = "最近アニュラスが、俺と一緒にいるのを避けているような気がする。学園内で出会ってもどこかよそよそしいというか……"
translation = "최근 아뉴라스가, 나와 함께 있는 것을 피하고 있는 듯한 기분이 든다. 학원 내에서 만나도 어딘가 서먹서먹하달까……"

[[dialogue]]
speaker = "unk"
original = "例えば、こんな感じ──"
translation = "예를 들면, 이런 느낌──"

[[dialogue]]
speaker = "ヨミ"
original = "「そうですね。例えばこれとか……あとはこっちのメニューをよく頼まれている気がします」"
translation = "「그렇네요. 예를 들면 이거라든가…… 아니면 이쪽 메뉴를 자주 주문하시는 것 같아요」"

[[dialogue]]
speaker = "アニュラス"
original = "「なるほど……全体的に濃いめの味付けのものが多いな。ヘルシーなものよりも肉類が多い……？」"
translation = "「과연…… 전체적으로 진한 양념인 것이 많군. 헬시한 것보다 육류가 많아……?」"

[[dialogue]]
speaker = "ヨミ"
original = "「トレーニングもハードでしょうから、やっぱりお腹が空くんじゃないでしょうか？\u3000男の子ですし、がっつり系が多い印象ですね！」"
translation = "「트레이닝도 하드하실 테니, 역시 배가 고픈 게 아닐까요? 남자애이기도 하고, 든든한 계열이 많은 인상이네요!」"

[[dialogue]]
speaker = "アニュラス"
original = "「ふむ。やはりカフェの現場で働く方の意見は参考になる……！」"
translation = "「흠. 역시 카페 현장에서 일하는 분의 의견은 참고가 되는군……!」"

[[dialogue]]
speaker = "unk"
original = "何の話をしてるの？"
translation = "무슨 얘기 하고 있어?"

[[dialogue]]
speaker = "unk"
original = "２人が一緒なのは新鮮だね"
translation = "둘이 같이 있는 건 신선하네"

[[dialogue]]
speaker = "アニュラス"
original = "「っ！？\u3000か、会長！？\u3000ななな、何でもない！\u3000大したことじゃないんだ！\u3000なあヨミ！」"
translation = "「!? 회, 회장!? 아아아, 아무것도 아니다! 별거 아니야! 그지 요미!」"

[[dialogue]]
speaker = "ヨミ"
original = "「こやっ！？\u3000は、はいっ、ほんと些細な雑談というかっ……ここで会ったのもとっても爆裂な偶然なんですっ！」"
translation = "「코얏!? 네, 네엣, 정말 사소한 잡담이랄까…… 여기서 만난 것도 정말 폭렬적인 우연이에요!」"

[[dialogue]]
speaker = "アニュラス"
original = "「そうその通り！\u3000で、ではな！\u3000ぁ、ヨミ、参考になった。ありがとう。それでは私は失礼する──！」"
translation = "「그래 바로 그거다! 그, 그럼 이만! 아, 요미, 참고가 됐다. 고맙다. 그럼 나는 실례하마──!」"

[[dialogue]]
speaker = "unk"
original = "俺が話しかけるとなぜか慌ててどこかに行ってしまうアニュラス。彼女が俺を避ける理由がまったくわからない……"
translation = "내가 말을 걸면 왠지 당황하며 어딘가로 가버리는 아뉴라스. 그녀가 나를 피하는 이유를 전혀 모르겠다……"

[[dialogue]]
speaker = "unk"
original = "他にはこんなこともあったっけ──"
translation = "그 외에는 이런 일도 있었지──"

[[dialogue]]
speaker = "モネ"
original = "「アニュラスさん、どうでしょう。ご要望どおりの本をそろえておきましたよ。お役に立てばよいのですが……」"
translation = "「아뉴라스 씨, 어떠신가요. 요청하신 대로 책을 갖춰두었어요. 도움이 되면 좋겠는데요……」"

[[dialogue]]
speaker = "アニュラス"
original = "「ふむ……これはいいな！\u3000写真がたくさん載っていて工程がわかりやすい。こういうのを探していたんだ！」"
translation = "「흠…… 이거 좋군! 사진이 많이 실려 있어서 공정이 알기 쉬워. 이런 걸 찾고 있었다!」"

[[dialogue]]
speaker = "アニュラス"
original = "「モネ先輩、ありがとう。こんなにたくさんの本を集めてくれて……大変だったのではないか？」"
translation = "「모네 선배, 고맙다. 이렇게 많은 책을 모아주다니…… 힘들지 않았나?」"

[[dialogue]]
speaker = "モネ"
original = "「いえいえ。レファレンスは図書委員の本業ですから！\u3000今後もぜひご活用くださいね」"
translation = "「아니에요. 레퍼런스는 도서위원의 본업이니까요! 앞으로도 부디 활용해 주세요」"

[[dialogue]]
speaker = "unk"
original = "何の本を借りてるの？"
translation = "무슨 책 빌리고 있어?"

[[dialogue]]
speaker = "unk"
original = "アニュラスが図書館なんて珍しいね"
translation = "아뉴라스가 도서관이라니 드문 일이네"

[[dialogue]]
speaker = "アニュラス"
original = "「っ！\u3000かかか、会長っ！？\u3000──何でもないっ！\u3000大したことは何もないぞっ！\u3000なぁモネ先輩！？」"
translation = "「! 회회회, 회장!? ──아무것도 아니다! 대단한 건 아무것도 없어! 그지 모네 선배!?」"

[[dialogue]]
speaker = "モネ"
original = "「そそそ、そうですね！\u3000ちょっとお喋りをしていただけですので……あはは……！」"
translation = "「그그그, 그렇네요! 잠깐 수다를 떨고 있었을 뿐이라서…… 아하하……!」"

[[dialogue]]
speaker = "アニュラス"
original = "「あー用事を思い出した！\u3000そろそろ鍛錬の時間だったな！\u3000私はこれで失礼する──！」"
translation = "「아- 볼일이 생각났다! 슬슬 단련할 시간이었지! 나는 이만 실례하마──!」"

[[dialogue]]
speaker = "unk"
original = "こんなことが数日続いているのだ。アニュラスと過ごせる時間が激減していて、正直けっこう辛い。"
translation = "이런 일이 며칠째 계속되고 있다. 아뉴라스와 보낼 수 있는 시간이 급감해서, 솔직히 꽤 괴롭다."

[[dialogue]]
speaker = "unk"
original = "だけど今日は問題ないだろう。なぜなら俺の誕生日なのだ。忙しそうなアニュラスだって、流石に一緒に過ごしてくれるはず──"
translation = "하지만 오늘은 문제없겠지. 왜냐하면 내 생일이니까. 바빠 보이는 아뉴라스라도, 설마 같이 보내주겠지──"

[[dialogue]]
speaker = "アニュラス"
original = "「すまない会長。今日は用事があるから先に帰らせてもらう」"
translation = "「미안하다 회장. 오늘은 용무가 있어서 먼저 실례하마」"

[[dialogue]]
speaker = "unk"
original = "えぇっ！？"
translation = "에엣!?"

[[dialogue]]
speaker = "アニュラス"
original = "「ああ、そうだ、このメモを渡しておく。リノお母様からお前宛てだ。何でも学校帰りにおつかいをしてくれとのことだ。ではな」"
translation = "「아아, 맞다, 이 메모를 전해주마. 리노 어머님께서 네게 주신 거다. 아무래도 학교 끝나고 심부름을 해달라는 것 같군. 그럼 이만」"

[[dialogue]]
speaker = "unk"
original = "…………泣いてもいいかな、俺"
translation = "…………울어도 될까, 나"

[[dialogue]]
speaker = "unk"
original = "母さんの命じたおつかいは、分厚い学術書の購入。街中の本屋をはしごすることになってしまい、自宅にたどり着いた時にはすっかり日が暮れていた。"
translation = "어머니가 시킨 심부름은, 두꺼운 학술서 구입. 시내 서점을 전전하게 되어, 집에 도착했을 때는 이미 해가 완전히 저물어 있었다."

[[dialogue]]
speaker = "unk"
original = "お腹は空いているし、恋人とデートもできないし、散々な誕生日だ──"
translation = "배는 고프고, 연인과 데이트도 못 하고, 엉망진창인 생일이다──"

[[dialogue]]
speaker = "unk"
original = "ただいまー……"
translation = "다녀왔어-……"

[[dialogue]]
speaker = "アニュラス"
original = "「お、お帰り会長！\u3000それと……誕生日おめでとう！」"
translation = "「오, 왔나 회장! 그리고…… 생일 축하한다!」"

[[dialogue]]
speaker = "unk"
original = "しかも俺の好物ばかり……！！"
translation = "게다가 내가 좋아하는 것들뿐……!!"

[[dialogue]]
speaker = "unk"
original = "え……すごい量のご馳走が！？"
translation = "에…… 엄청난 양의 진수성찬이!?"

[[dialogue]]
speaker = "リノ"
original = "「ふふ、アニュラスちゃんが全部、１人で作ったのよ？」"
translation = "「후후, 아뉴라스 짱이 전부, 혼자서 만든 거란다?」"

[[dialogue]]
speaker = "リノ"
original = "「学園のカフェであなたの好きなメニューの聞き取りをしたり、図書館でレシピ本を探したり。最近は毎日、放課後にうちでお料理の特訓までしてたんだから！」"
translation = "「학원 카페에서 네가 좋아하는 메뉴를 물어보기도 하고, 도서관에서 레시피 책을 찾기도 하고. 최근에는 매일 방과 후에 우리 집에서 요리 특훈까지 했다니까!」"

[[dialogue]]
speaker = "アニュラス"
original = "「リノお母様にもたくさんサポートをしてもらったんだ。私は包丁の握り方から危うかったからな……」"
translation = "「리노 어머님께도 많은 서포트를 받았다. 나는 식칼 쥐는 법부터 위태로웠으니까 말이지……」"

[[dialogue]]
speaker = "リノ"
original = "「最初はちょっぴり心配だったけど、アニュラスちゃん真面目だし素直だから教えがいがあったわ～、ふふ♪\u3000これからも息子をよろしくね！」"
translation = "「처음에는 조금 걱정됐지만, 아뉴라스 짱은 성실하고 솔직해서 가르칠 맛이 났단다~, 후후♪ 앞으로도 아들을 잘 부탁해!」"

[[dialogue]]
speaker = "アニュラス"
original = "「は、はい……！\u3000こちらこそっ……！」"
translation = "「네, 넵……! 저야말로요……!」"

[[dialogue]]
speaker = "unk"
original = "てっきり嫌われたのかと……"
translation = "난 또 미움받는 줄 알고……"

[[dialogue]]
speaker = "unk"
original = "ここのところ、よそよそしかったから"
translation = "요즘, 서먹서먹했으니까"

[[dialogue]]
speaker = "アニュラス"
original = "「そ、そんなわけないだろう！？\u3000その、サプライズをしたかっただけなんだ。不安にさせてしまったか……？」"
translation = "「그, 그럴 리가 없잖나!? 그게, 서프라이즈를 하고 싶었을 뿐이다. 불안하게 만들어 버렸나……?」"

[[dialogue]]
speaker = "リノ"
original = "「よかったわね～、クロト。こーんないい子、今後絶対に見つからないわよ？\u3000大事にしなさい！」"
translation = "「잘됐네~, 쿠로토. 이렇~게 착한 아이, 앞으로 절대 못 찾을 거야? 소중히 하렴!」"

[[dialogue]]
speaker = "アニュラス"
original = "「じゃ、じゃあ手を洗ってきたら食べようか。会長」"
translation = "「그, 그럼 손 씻고 오면 먹을까. 회장」"

[[dialogue]]
speaker = "unk"
original = "その後、アニュラスと母さんの３人で、ささやかな誕生日パーティを楽しんだ。"
translation = "그 후, 아뉴라스와 어머니 셋이서, 소박한 생일 파티를 즐겼다."

[[dialogue]]
speaker = "unk"
original = "アニュラスの手料理はどれも頬が落ちるほどに美味しくて……家事の苦手な彼女が、俺の為に頑張ってくれたことがすごく嬉しくて。"
translation = "아뉴라스의 손요리는 어느 것 하나 할 것 없이 뺨이 떨어질 정도로 맛있어서…… 가사에 서툰 그녀가, 나를 위해 노력해 준 것이 무척 기뻤다."

[[dialogue]]
speaker = "unk"
original = "アニュラスの誕生日には、俺も真心を込めてお祝いしないといけないなと思うのだった──"
translation = "아뉴라스의 생일에는, 나도 진심을 담아 축하해 줘야겠다고 생각하는 것이었다──"

