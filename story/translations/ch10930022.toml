[[dialogue]]
speaker = "unk"
original = "第２話,応援タッグバトル（後編）,P"
translation = "제2화, 응원 태그 배틀 (후편), P"

[[dialogue]]
speaker = "unk"
original = "翌日の放課後。"
translation = "다음 날 방과 후."

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「走りたくて、昨日から足がウズウズしてたガオ！」"
translation = "「뛰고 싶어서, 어제부터 발이 근질거렸갸오!」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「あたしもだ！\u3000さあさあ、早くやろうじゃねえか！」"
translation = "「나도다! 자자, 빨리 시작하자고!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「私だって応援したくて仕方なかったよ！」"
translation = "「나도 응원하고 싶어 죽는 줄 알았어!」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「姐さん、チアガールフル装備でメチャクチャやる気じゃねえか！\u3000嬉しいねえ！」"
translation = "「누님, 치어리더 풀 장비로 엄청나게 의욕적이잖아! 기쁘네!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「勝負はトラックを３周してゴールした方が勝ちね」"
translation = "「승부는 트랙을 3바퀴 돌아서 골인하는 쪽이 이기는 거야」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「もちろん、走るのを妨害するのはダメだよ。スポーツマンシップに則って、正々堂々と！」"
translation = "「물론, 달리는 것을 방해하는 건 안 돼. 스포츠맨십에 입각해서, 정정당당하게!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「私たちはスタート地点で、一生懸命応援してるからね！\u3000ファイトだよ、ヒヨちゃんっ！」"
translation = "「우리는 스타트 지점에서, 열심히 응원하고 있을 테니까! 파이팅이야, 히요짱!」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「おうよ、やってやるぜいっ！」"
translation = "「오우, 해치워 주겠어!」"

[[dialogue]]
speaker = "unk"
original = "頑張れ、カティア！"
translation = "힘내라, 카티아!"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「この勝利、魔王様に捧げますワン！」"
translation = "「이 승리, 마왕님께 바치겠습니다멍!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「位置について！\u3000よーーーい……ドン！」"
translation = "「위치에 서! 요ーーー이…… 땅!」"

[[dialogue]]
speaker = "unk"
original = "ピストルの合図と同時に２人が駆け出した！"
translation = "피스톨 신호와 동시에 두 사람이 달려 나갔다!"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「ちぃ、スタートダッシュはワン公に分があるか！\u3000でも、あたしはこっからでい！」"
translation = "「쳇, 스타트 대시는 멍멍이에게 유리한가! 하지만, 나는 지금부터다!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「すっごーいっ！\u3000２人とも星霊祭の時よりも速くなってるよっ！」"
translation = "「대단해ー! 둘 다 성령제 때보다 빨라지고 있어!」"

[[dialogue]]
speaker = "unk"
original = "行け行け、カティアーっ！"
translation = "가라 가라, 카티아ー!"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「まだ始まったばかりっ！\u3000全っ然追いつけるよ、ヒヨちゃんっ！」"
translation = "「아직 시작했을 뿐이야! 전ー혀 따라잡을 수 있어, 히요짱!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ヒヨちゃん、ファイトーッ！\u3000ゴー・ファイト・ウィンッ！」"
translation = "「히요짱, 파이토ー! 고・파이트・윈!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「あぁんっ、そこっ！\u3000もうちょっとっ！\u3000もうちょっとで抜けるよーっ！\u3000がんばれっ、がーんばれっ♪」"
translation = "「아앙, 거기! 조금만 더! 조금만 더 하면 앞지를 수 있어ー! 힘내, 히ー임내♪」"

[[dialogue]]
speaker = "unk"
original = "（ミルフィーのがまろび出そう！？）"
translation = "（밀피의 것이 새어 나올 것 같잖아!?）"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「わふっ！？\u3000魔王様の応援が途切れた！？」"
translation = "「와훗!? 마왕님의 응원이 끊겼어!?」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「追いついた──いいや、このまま抜かせてもらうぜえ、ワン公っ！」"
translation = "「따라잡았다── 아니, 이대로 앞질러 주겠어, 멍멍이!」"

[[dialogue]]
speaker = "unk"
original = "俺がミルフィーに気を取られている間に、ヒヨが先に俺たちの前を通過した。"
translation = "내가 밀피에게 정신이 팔린 사이에, 히요가 먼저 우리 앞을 통과했다."

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「これで１周目！\u3000すごいぞ、すごいぞ、ヒ・ヨ・ちゃんっ<emoji=heart04>」"
translation = "「이걸로 1바퀴째! 대단해, 대단해, 히・요・짱<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「姐さん、ありがとなっ！\u3000このままぶっちぎるぜえ！」"
translation = "「누님, 고맙다! 이대로 압도해 주겠어!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「魔王様っ、ここから挽回しますっ！」"
translation = "「마왕님, 여기서 만회하겠습니다!」"

[[dialogue]]
speaker = "unk"
original = "いいところ見せてくれ！"
translation = "멋진 모습 보여줘!"

[[dialogue]]
speaker = "unk"
original = "全然行けるっ！"
translation = "충분히 할 수 있어!"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「はいっ！\u3000期待に応えて見せまーす！」"
translation = "「네! 기대에 부응해 보이겠습니다ー!」"

[[dialogue]]
speaker = "unk"
original = "ほんのわずかに遅れて、カティアがスタート地点を通過する。"
translation = "아주 조금 뒤처져서, 카티아가 스타트 지점을 통과한다."

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「うぅ、会長くんにめいっぱい応援してもらえて……カティアちゃん、いいなぁ……」"
translation = "「으으, 회장군에게 마음껏 응원을 받고…… 카티아짱, 부럽다아……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「私だってクラス委員のお仕事が大変な時は、会長くんに応援してほしいよー」"
translation = "「나도 학급 위원 일이 힘들 때는, 회장군에게 응원받고 싶어ー」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「な、なんだあ？\u3000姐さんの声が届かねぇ──」"
translation = "「뭐, 뭐야? 누님의 목소리가 들리지 않아──」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「──って、いけない！\u3000ヒヨちゃんの応援に集中しなきゃっ！」"
translation = "「──라고, 안 돼! 히요짱 응원에 집중해야지!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「行け行けゴーゴー！\u3000ダッシュダーッシュ！」"
translation = "「가라 가라 고고! 대시 대쉬!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「ぐぅ、もうちょっとで追いつけそうだったのに、また離されちゃったワン……さすがはヒヨっ……！」"
translation = "「크윽, 조금만 더 하면 따라잡을 수 있을 것 같았는데, 또 멀어졌어멍…… 역시 히요야……!」"

[[dialogue]]
speaker = "unk"
original = "カ・ティ・ア！\u3000カ・ティ・ア！"
translation = "카・티・아! 카・티・아!"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「魔王様に声を張り上げて応援してもらってるのに……負けたくないっ、負けたくなぁいっ！」"
translation = "「마왕님께서 목이 터져라 응원해 주시는데…… 지고 싶지 않아, 지고 싶지 않앗!」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「あと１周っ！」"
translation = "「앞으로 1바퀴!」"

[[dialogue]]
speaker = "unk"
original = "２周目、再び俺たちの前を先に通過したのはヒヨだった。"
translation = "2바퀴째, 다시 우리 앞을 먼저 통과한 것은 히요였다."

[[dialogue]]
speaker = "unk"
original = "さっきよりもカティアとの差が開いているように見える。"
translation = "아까보다 카티아와의 차이가 벌어진 것처럼 보인다."

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「はぁ、はっ、はっ、はぁっ！\u3000ま、魔王様っ、ここから逆転して見せますワンっ！」"
translation = "「하아, 핫, 핫, 하앗! 마, 마왕님, 여기서 역전해 보이겠습니다멍!」"

[[dialogue]]
speaker = "unk"
original = "１周目より明らかに疲弊の色が濃い。ここからの逆転は厳しいようにも見えるが……"
translation = "1바퀴째보다 확실히 지친 기색이 역력하다. 여기서의 역전은 힘들어 보이기도 하지만……"

[[dialogue]]
speaker = "unk"
original = "カティアの勝利を信じる！"
translation = "카티아의 승리를 믿는다!"

[[dialogue]]
speaker = "unk"
original = "それでも俺は！"
translation = "그럼에도 나는!"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「そのままイケるよっ！\u3000ヒヨちゃんガンバっ！\u3000Ｖ・Ｉ・Ｃ・Ｔ・Ｏ・Ｒ・Ｙ──ビクトリー！」"
translation = "「이대로 갈 수 있어! 히요짱 힘내! V・I・C・T・O・R・Y── 빅토리!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "（ヒヨちゃんが勝ったら……えへへ、会長くんになんて命令しちゃおっかな……<emoji=heart04>）"
translation = "（히요짱이 이기면…… 에헤헤, 회장군에게 뭐라고 명령할까나……<emoji=heart04>）"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "（私もカティアちゃんみたいに応援してもらおうかな……ううん、もうちょっと攻めてもいいよね）"
translation = "（나도 카티아짱처럼 응원해 달라고 할까…… 아니, 좀 더 공격적으로 나가도 괜찮겠지）"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "（耳元で甘ぁいセリフを言ってもらう、とか……？）"
translation = "（귓가에 달콤ー한 대사를 속삭여 달라고 한다든가……?）"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "（アゴをクイッてやられて『可愛いぜ、ミルフィー』なぁんて……きゃーっ<emoji=heart04>）"
translation = "（턱을 큇하고 잡히면서 '귀엽군, 밀피' 라니…… 꺄ー앗<emoji=heart04>）"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「……っ？\u3000あれ、また姐さんの声が……！？\u3000飛ばしすぎたけどよお、残りはあと少し、踏ん張れ、あたし！」"
translation = "「……윽? 어라, 또 누님의 목소리가……!? 너무 달렸지만, 남은 건 이제 조금, 버텨라, 나!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「ヒヨのスピードが落ちたっ！\u3000チャンスだガオーーーーーっ！」"
translation = "「히요의 스피드가 떨어졌어! 찬스다 가오ーーーー옷!」"

[[dialogue]]
speaker = "unk"
original = "残り１／４周。ゴール直前のデッドヒート。"
translation = "남은 1/4바퀴. 골 직전의 막상막하."

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ええっ！？\u3000がんばれ、ヒヨちゃーんっ！」"
translation = "「에엣!? 힘내, 히요짱ー!」"

[[dialogue]]
speaker = "unk"
original = "ぶっちぎれ、カティアーっ！"
translation = "압도해라, 카티아ー!"

[[dialogue]]
speaker = "unk"
original = "最後にテープを切ったのは──"
translation = "마지막에 테이프를 끊은 것은──"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「ガオ～～～っ！！」"
translation = "「가오～～～옷!!」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「くああああっ！\u3000負けちまったあっ！」"
translation = "「크아아아앗! 져버렸다앗!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「やったやった！\u3000これで１００勝ですガオ！」"
translation = "「됐다 됐다! 이걸로 100승입니다갸오!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ご、ごめんね、ヒヨちゃん！\u3000私の応援が足りなかったばっかりに……」"
translation = "「미, 미안해, 히요짱! 내 응원이 부족했던 탓에……」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「あ、謝らないでくれやい。リードを取った後で油断しちまったあたしの実力不足さあ」"
translation = "「아, 사과하지 마. 리드를 잡은 후에 방심해 버린 나의 실력 부족이야.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "（ヒヨちゃんは悪くないっ！\u3000私の応援に邪念が入っちゃったせいだよー！）"
translation = "（히요짱은 잘못 없어! 내 응원에 사심이 들어가 버린 탓이야ー!）"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "（会長くんはずっとカティアちゃんを真面目に応援してたのに……うぅ、私ってば悪い子だ……）"
translation = "（회장군은 계속 카티아짱을 진심으로 응원했는데…… 으으, 나는 나쁜 아이야……）"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「でも次は負けねえ。姐さん、次も応援頼みまさぁ」"
translation = "「하지만 다음엔 안 져. 누님, 다음에도 응원 부탁하마.」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「魔王様、次も応援お願いしますガオ！」"
translation = "「마왕님, 다음에도 응원 부탁드립니다갸오!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「そ、それなんだけど！\u3000２人の勝負は私たちの応援に頼らずに、自分たちだけでやらなきゃダメじゃないかな！？」"
translation = "「그, 그건 그렇고! 두 사람의 승부는 우리 응원에 의지하지 않고, 자신들끼리만 해야 하는 거 아닐까!?」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「いつでも私たちが応援に駆け付けられるわけじゃないんだし……！\u3000だよね！\u3000会長くん！」"
translation = "「언제든지 우리가 응원하러 달려갈 수 있는 건 아니잖아……! 그렇지! 회장군!」"

[[dialogue]]
speaker = "unk"
original = "う、うん？"
translation = "으, 응?"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「お、おう？\u3000まあ、確かにそうか……。次は正々堂々、サシでやろうぜい！」"
translation = "「오, 오우? 뭐, 확실히 그렇네……. 다음엔 정정당당하게, 일대일로 하자고!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「望むところだワン！」"
translation = "「바라는 바다멍!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "（また応援しながら対決するなんて、私にはできないよ……）"
translation = "（또 응원하면서 대결하는 건, 나로서는 할 수 없어……）"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "（カティアちゃんばっかり、会長くんに応援してもらえるなんて羨ましくて……）"
translation = "（카티아짱만, 회장군에게 응원받을 수 있다니 부러워서……）"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "（余計なこと考えて、応援に集中できなくなっちゃうもん！）"
translation = "（쓸데없는 생각해서, 응원에 집중할 수 없게 되어 버리니까!）"

