[[dialogue]]
speaker = "unk"
original = "ある日の仕事終わりの星徒会室。"
translation = "어느 날 일과가 끝난 성도회실."

[[dialogue]]
speaker = "unk"
original = "ヴィーナスと一緒に帰ろうとしたところで、彼女が唐突に宣言した。"
translation = "비너스와 함께 돌아가려던 참에 그녀가 돌연 선언했다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「今日からパパ呼びとイチャイチャを禁止するわよ！」"
translation = "「오늘부터 아빠라고 부르는 거랑 꽁냥거리는 거 금지야!」"

[[dialogue]]
speaker = "クロト"
original = "「それってもしかして……マトイに怒られちゃったから？」"
translation = "「그건 혹시…… 마토이한테 혼나서야?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ええ。マトイが言う以上、私もきちんと反省しなくちゃって思ったの」"
translation = "「응. 마토이가 말하는 이상 나도 제대로 반성해야겠다고 생각했어」"

[[dialogue]]
speaker = "unk"
original = "今日、星徒会室でヴィーナスが俺のことをパパと呼んで甘えて来て、ついイチャイチャしてしまっていたのだが――"
translation = "오늘 성도회실에서 비너스가 나를 아빠라고 부르며 응석 부려 와서 그만 꽁냥거리고 말았는데──"

[[dialogue]]
speaker = "unk"
original = "それを見ていたマトイから、「さすがに人前ではもうちょっと自重するべき」と注意を受けてしまったのだ。"
translation = "그걸 보던 마토이로부터 「아무리 그래도 남들 앞에서는 좀 더 자제해야지」라는 주의를 듣고 만 것이다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「マトイは『２人きりの時は別にいい』って言ってくれてたけど、確かに最近、ちょっとルーズになりすぎていたのは事実ね」"
translation = "「마토이는 『둘만 있을 때는 상관없어』라고 해줬지만 확실히 최근에 좀 너무 루즈해졌던 건 사실이야」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「だから自分への罰も含めて、１ヶ月間、パパに甘えるのは禁止にしようと思うの！」"
translation = "「그러니까 자신에게 주는 벌도 포함해서 한 달 동안 아빠한테 응석 부리는 건 금지하기로 했어!」"

[[dialogue]]
speaker = "unk"
original = "俺は恋人らしいことができないのを寂しく思いつつも、ヴィーナスが頑張ろうと思っているならと、それに頷いたのだが――"
translation = "나는 연인다운 일을 할 수 없는 게 아쉽긴 했지만 비너스가 노력하겠다고 하니 고개를 끄덕였는데──"

[[dialogue]]
speaker = "unk"
original = "それから３日経った、休日の朝。"
translation = "그로부터 사흘이 지난 휴일 아침."

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
original = "「んっ……<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふうぅっ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 하아아<emoji=heart04> 후우우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスの声が聞こえた気がして、目を開けると――"
translation = "비너스의 목소리가 들린 것 같아 눈을 뜨자──"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あっ、起きたのねっ……<emoji=heart04>」"
translation = "「앗, 일어났구나……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "なんと、自室のベッドで仰向けに寝ていた俺の上に、ヴィーナスが馬乗りになっていた。"
translation = "놀랍게도 내 방 침대에서 천장을 보고 자고 있던 내 위에 비너스가 올라타 있었다."

[[dialogue]]
speaker = "クロト"
original = "「ヴィーナス！？\u3000一体どうしたんだ……！？」"
translation = "「비너스!? 대체 무슨 일이야……!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あのねっ<emoji=heart04>\u3000あれから私、頑張って我慢、してたんだけど――」"
translation = "「저기 말야<emoji=heart04> 그때부터 나 열심히 참아봤는데──」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「はぁぁっ<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000やっぱり無理っ！！\u3000パパ、エッチして！！！」"
translation = "「하아아<emoji=heart04> 아아아<emoji=heart04> 역시 무리야!! 아빠, 섹스하자!!!」"

[[dialogue]]
speaker = "unk"
original = "――詳しく聞けば、禁欲の我慢が限界に達し、ノヴァフォームに変身して全速力で飛んできた、ということらしい。"
translation = "──자세히 들어보니 금욕을 참는 게 한계에 달해 노바 폼으로 변신해서 전속력으로 날아왔다는 모양이다."

[[dialogue]]
speaker = "クロト"
original = "「というか、どうやって家に入って来たんだ！？」"
translation = "「그보다 집에 어떻게 들어온 거야!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あぁぁんっ<emoji=heart04>\u3000はぁぁっ<emoji=heart04>\u3000リノさんがいつでも来ていいからって、合い鍵をくれていたからぁ<emoji=heart04>」"
translation = "「아아앙<emoji=heart04> 하아아<emoji=heart04> 리노 아주머니가 언제든 와도 된다면서 보조 열쇠를 주셨으니까아<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それに昨日の夜、今日は朝早くから用事があって、１日家を空けるからってリノさんが……んんぅ<emoji=heart04>\u3000あぁぁっ<emoji=heart04>」"
translation = "「게다가 어제 밤에 리노 아주머니가 오늘은 아침 일찍부터 볼일이 있어서 하루 종일 집을 비운다고…… 응으으<emoji=heart04> 아아아<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「はふぅぅん<emoji=heart04>\u3000だから、好きなだけイチャイチャしていいからねって……はぁぁっ<emoji=heart04>\u3000メッセージをもらっててぇ<emoji=heart04>」"
translation = "「하후우운<emoji=heart04> 그러니까 마음껏 꽁냥거려도 된다면서…… 하아아<emoji=heart04> 메시지를 보내주셔서어<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それでムラムラして、我慢できなくなっちゃったの……<emoji=heart04>\u3000んんんぅっ<emoji=heart04>」"
translation = "「그래서 몸이 달아서 참을 수 없게 되어버렸어……<emoji=heart04> 응으으으으윽<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「母さんのせいだったか……」"
translation = "「어머니 때문이었나……」"

[[dialogue]]
speaker = "unk"
original = "母さんには禁欲のことを話していなかったので、良かれと思ってヴィーナスに連絡をしたのだろう。しかし今回は、それが逆効果になってしまった。"
translation = "어머니에게는 금욕에 대해 이야기하지 않았기에, 잘해주고 싶어서 비너스에게 연락을 한 것이리라. 하지만 이번에는 그것이 역효과가 되어버렸다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「ねぇねぇ～<emoji=heart04>\u3000はぁぁんっ<emoji=heart04>\u3000パパぁ、エッチっ<emoji=heart04>\u3000エッチしてぇ<emoji=heart04>\u3000お願い～<emoji=heart04>」"
translation = "「있지 있지~<emoji=heart04> 하아앙<emoji=heart04> 아빠아, 에치<emoji=heart04> 에치해줘어<emoji=heart04> 부탁이야~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "思えば恋人になってから、１日以上スキンシップをしないことなんてなかった。"
translation = "생각해보면 연인이 된 이후로, 하루 이상 스킨십을 하지 않은 적은 없었다."

[[dialogue]]
speaker = "unk"
original = "一般的に見ればヴィーナスは堪え性がないんだろうが……自分の大好きな女の子が、自分をこんなにも求めてくれていたとわかって、嬉しくないわけがない。"
translation = "일반적으로 보면 비너스는 참을성이 없는 거겠지만…… 자신이 정말 좋아하는 여자아이가 자신을 이토록 원해주고 있다는 것을 알고, 기쁘지 않을 리가 없다."

[[dialogue]]
speaker = "クロト"
original = "「わかった。ヴィーナス、おいで」"
translation = "「알았어. 비너스, 이리 와.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「はふぅぅん<emoji=heart04>\u3000ありがと、パパぁ<emoji=heart04>\u3000はあぁっ……<emoji=heart04>\u3000ずっと我慢してたおち○ちんっ<emoji=heart04>」"
translation = "「하후우운<emoji=heart04> 고마워, 아빠아<emoji=heart04> 하아앗……<emoji=heart04> 계속 참고 있었던 자지잇<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そうして、彼女はおま○こをペニスに擦り付け始める。"
translation = "그렇게 그녀는 보지를 페니스에 비비기 시작한다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「んんっ<emoji=heart04>\u3000ふうぅ……<emoji=heart04>\u3000んうぅっ、ふあぁっ<emoji=heart04>\u3000こうしておま○この外側擦り付けるだけでも、気持ちいいっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んっ……ふうぅっ<emoji=heart04>」"
translation = "「응읏<emoji=heart04> 후우……<emoji=heart04> 응우웃, 후아앗<emoji=heart04> 이렇게 보지 겉면을 비비는 것만으로도 기분 좋아앗<emoji=heart04> 앗<emoji=heart04> 응…… 후우웃<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「早く挿れたくて、おま○この中から愛液溢れて来ちゃうっ<emoji=heart04>\u3000はあぁっ……んんぅっ<emoji=heart04>\u3000いつもよりいっぱいですごいのっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000んふぅっ……<emoji=heart04>」"
translation = "「빨리 넣고 싶어서, 보지 안에서 애액이 흘러나와 버려어<emoji=heart04> 하아앗…… 응응웃<emoji=heart04> 평소보다 가득이라서 대단해엣<emoji=heart04> 응아앗<emoji=heart04> 응후웃……<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あっ<emoji=heart04>\u3000クリ擦れるの感じちゃうっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000んんっ……んうぅっ<emoji=heart04>\u3000はあぁあっ……気持ちいいっ<emoji=heart04>\u3000んぅっ<emoji=heart04>\u3000はぁっ……ふうぅぅ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 클리 스치는 거 느껴져엇<emoji=heart04> 후아앗<emoji=heart04> 응응…… 응우웃<emoji=heart04> 하아아앗…… 기분 좋아앗<emoji=heart04> 응웃<emoji=heart04> 하앗…… 후우우우<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "発情顔で快楽を求めて腰を振るヴィーナスがエッチで、俺のペニスもすぐさま勃起してきてしまう。"
translation = "발정난 얼굴로 쾌락을 구하며 허리를 흔드는 비너스가 야해서, 내 페니스도 금세 발기해버리고 만다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「んんんぅっ<emoji=heart04>\u3000パパのおち○ちん、ぬるぬるになったから、もう挿れてもいいわよねっ？\u3000あぁああっ<emoji=heart04>\u3000早くおち○ちん欲しくて、我慢できないのぉっ<emoji=heart04>」"
translation = "「응응응웃<emoji=heart04> 아빠 자지, 미끈미끈해졌으니까 이제 넣어도 되는 거지이? 아아아앗<emoji=heart04> 빨리 자지 갖고 싶어서 못 참겠어어엇<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「はぁっ<emoji=heart04>\u3000はぁっ……<emoji=heart04>\u3000もうダメっ<emoji=heart04>\u3000おち○ちん挿れちゃうわねっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000ふうぅっ……<emoji=heart04>」"
translation = "「하앗<emoji=heart04> 하앗……<emoji=heart04> 이제 안 돼엣<emoji=heart04> 자지 넣어버릴게에<emoji=heart04> 응우웃<emoji=heart04> 후우웃……<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あっ――<emoji=heart04><emoji=heart04>」"
translation = "「앗――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふあああぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000パパのおち○ちん、来たああぁ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 아빠 자지, 왔다아아~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「んんぅっ<emoji=heart04><emoji=heart04>\u3000これっ<emoji=heart04>\u3000これが欲しかったのぉっ<emoji=heart04>\u3000ああぁっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000はあぁっ……んうぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んあぁっ……ふうぅっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「응응웃<emoji=heart04><emoji=heart04> 이거어<emoji=heart04> 이걸 원했어어엇<emoji=heart04> 아아앗<emoji=heart04> 응<emoji=heart04> 하아앗…… 응우웃<emoji=heart04> 앗<emoji=heart04> 안앗<emoji=heart04> 응아앗…… 후우웃<emoji=heart04> 하아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「気持ちいいっ<emoji=heart04>\u3000おち○ちん気持ちいぃっ<emoji=heart04><emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000んあぁっ……んっ<emoji=heart04>\u3000はああぁっ<emoji=heart04>\u3000あっ……ふああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「기분 좋아앗<emoji=heart04> 자지 기분 좋아아앗<emoji=heart04><emoji=heart04> 하아앗<emoji=heart04> 응응웃<emoji=heart04> 응아앗…… 응<emoji=heart04> 하아아앗<emoji=heart04> 앗…… 후아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「おま○こ気持ちいいっ<emoji=heart04>\u3000幸せでキュンキュンしちゃうのぉ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んうぅっ……はあぁっ……ふああぁっ<emoji=heart04>\u3000んああぁ～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「보지 기분 좋아앗<emoji=heart04> 행복해서 큥큥거려어어<emoji=heart04> 앗<emoji=heart04> 응우웃…… 하아앗…… 후아아앗<emoji=heart04> 응아아아~~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「パパっ<emoji=heart04>\u3000キスもぉっ<emoji=heart04>\u3000キスもしてぇっ<emoji=heart04>\u3000んんぅ～っ<emoji=heart04>」"
translation = "「아빠앗<emoji=heart04> 키스도오<emoji=heart04> 키스도 해줘어엇<emoji=heart04> 응응우~웃<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスはそう言うと、大きなおっぱいを押し付けながら、顔を近づけて唇をちゅっちゅっ<emoji=heart04>\u3000と触れ合わせてくる。"
translation = "비너스는 그렇게 말하며, 커다란 가슴을 밀착시키면서 얼굴을 가까이해 입술을 쪽쪽<emoji=heart04> 하고 맞추어 온다."

[[dialogue]]
speaker = "unk"
original = "俺がそれに応えて、舌を彼女の口の中に入れて、絡めて返してあげると──"
translation = "내가 그것에 응하여 혀를 그녀의 입안에 넣고 얽어주자──"

[[dialogue]]
speaker = "ヴィーナス"
original = "「んむぅっ<emoji=heart04>\u3000パパぁ<emoji=heart04>\u3000んっ……ちゅっ<emoji=heart04>\u3000ちゅぱっ<emoji=heart04>\u3000ちゅぷっ……ちゅぷぷっ……ちゅむっ<emoji=heart04>\u3000ちゅるっ……ちゅるるるっ<emoji=heart04>\u3000れるれるっ……れろちゅっ<emoji=heart04>」"
translation = "「응무웃<emoji=heart04> 아빠아<emoji=heart04> 응…… 츄웃<emoji=heart04> 츄파앗<emoji=heart04> 츄풋…… 츄푸풋…… 츄뭇<emoji=heart04> 츄룻…… 츄르르릇<emoji=heart04> 레를레를…… 레로츄웃<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「はあぁっ<emoji=heart04>\u3000我慢してたキス、気持ちいいっ<emoji=heart04>\u3000んむぅっ……ちゅるっ……ちゅれるっ<emoji=heart04>\u3000舌気持ちいいっ<emoji=heart04>\u3000んちゅっ……ちゅれるっ……れるれるっ、れろちゅっ<emoji=heart04>」"
translation = "「하아앗<emoji=heart04> 참고 있었던 키스, 기분 좋아앗<emoji=heart04> 응무웃…… 츄룻…… 츄레를<emoji=heart04> 혀 기분 좋아앗<emoji=heart04> 응츄웃…… 츄레를…… 레를레를, 레로츄웃<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ちゅぱっ<emoji=heart04>\u3000好きって気持ち、溢れちゃうっ<emoji=heart04>\u3000ちゅっちゅ<emoji=heart04>\u3000パパ、好きっ、しゅきぃっ<emoji=heart04>\u3000んむっ<emoji=heart04>\u3000ちゅるっ……ちゅるるっ<emoji=heart04>」"
translation = "「츄파앗<emoji=heart04> 좋아한다는 마음이 흘러넘쳐어엇<emoji=heart04> 츄츄<emoji=heart04> 아빠, 좋아해, 조아해에<emoji=heart04> 응뭇<emoji=heart04> 츄룻…… 츄르릇<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「しゅきしゅきっ<emoji=heart04>\u3000ちゅむっ……ちゅむむっ<emoji=heart04>\u3000れろちゅっ<emoji=heart04>\u3000んっ――ぷはぁっ……<emoji=heart04>\u3000パパ<emoji=heart04>\u3000おっぱいもぉ<emoji=heart04>\u3000おっぱいも揉んでぇっ<emoji=heart04>」"
translation = "「조아조아앗<emoji=heart04> 츄뭇…… 츄무뭇<emoji=heart04> 레로츄웃<emoji=heart04> 응――푸핫……<emoji=heart04> 아빠<emoji=heart04> 가슴도오<emoji=heart04> 가슴도 주물러줘어엇<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは俺の手を掴むと、自身のおっぱいへと導く。"
translation = "비너스는 내 손을 잡더니 자신의 가슴으로 이끈다."

[[dialogue]]
speaker = "unk"
original = "目の前で大きく揺れるそれに、俺が触れると……"
translation = "눈앞에서 크게 흔들리는 그것에 내가 손을 대자……"

[[dialogue]]
speaker = "ヴィーナス"
original = "「はあぁあんっ<emoji=heart04>\u3000おっぱい感じるぅっ<emoji=heart04>\u3000パパに触られたところ、熱くなっちゃうのぉっ<emoji=heart04>\u3000ふうぅんっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「하아아앙<emoji=heart04> 가슴 느껴져어엇<emoji=heart04> 아빠가 만진 곳이 뜨거워져 버려어엇<emoji=heart04> 후우운<emoji=heart04> 응아앗<emoji=heart04> 후아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「パパ、もっと強くっ<emoji=heart04>\u3000いっぱいっ<emoji=heart04>\u3000いっぱい揉んで欲しいっ<emoji=heart04><emoji=heart04>\u3000んんっ<emoji=heart04>\u3000はあぁっ……んうぅっ<emoji=heart04><emoji=heart04>」"
translation = "「아빠, 좀 더 강하게엣<emoji=heart04> 가득<emoji=heart04> 가득 주물러줬으면 좋겠어어엇<emoji=heart04><emoji=heart04> 응응<emoji=heart04> 하아앗…… 응우웃<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "今度は両手で、彼女のおっぱいを強く鷲掴みにして、揉みしだく。"
translation = "이번에는 양손으로 그녀의 가슴을 강하게 움켜쥐고 마구 주무른다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「んああぁあっ<emoji=heart04>\u3000それぇ<emoji=heart04>\u3000おっぱい揉まれて感じるのぉっ<emoji=heart04>\u3000あっ、あんっ<emoji=heart04>\u3000ふあぁっ……んんぅっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04>」"
translation = "「응아아아앗<emoji=heart04> 그거어<emoji=heart04> 가슴 주물러져서 느껴져어엇<emoji=heart04> 앗, 안앗<emoji=heart04> 후아앗…… 응응웃<emoji=heart04> 응아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「おっぱい気持ちいいっ<emoji=heart04>\u3000んんあぁっ<emoji=heart04>\u3000強く揉まれると、キュンキュンしちゃうっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000はあぁっ……ふああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「가슴 기분 좋아앗<emoji=heart04> 응응아앗<emoji=heart04> 강하게 주물러지면 큥큥거려어엇<emoji=heart04> 응응<emoji=heart04> 하아앗…… 후아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「パパ、乳首も弄ってぇ<emoji=heart04>\u3000あっ――<emoji=heart04><emoji=heart04>」"
translation = "「아빠, 유두도 괴롭혀줘어<emoji=heart04> 앗――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「んっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04><emoji=heart04>\u3000固くなった乳首、コリコリされるの気持ちいいっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んうぅっ……んあぁっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「응<emoji=heart04> 후아아앗<emoji=heart04><emoji=heart04> 딱딱해진 유두, 고리고리 만져지는 거 기분 좋아앗<emoji=heart04> 앗<emoji=heart04> 응우웃…… 응아앗<emoji=heart04> 하아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あんっ<emoji=heart04>\u3000パパの指で強くされるの、乳首キュンキュンしちゃうぅっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000はあぁっ……ふああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「안앗<emoji=heart04> 아빠 손가락으로 강하게 당하니까 유두가 큥큥거려어어엇<emoji=heart04> 응응<emoji=heart04> 하아앗…… 후아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「パパ、指だけじゃなくて、お口でっ<emoji=heart04>\u3000おっぱい吸ってぇ<emoji=heart04>」"
translation = "「아빠, 손가락 말고 입으로오<emoji=heart04> 가슴 빨아줘어어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言って、大きなおっぱいを俺の顔に押し付けてくる。乳首を咥えて、強く吸ってあげると──"
translation = "그렇게 말하며 커다란 가슴을 내 얼굴에 밀어붙인다. 유두를 물고 강하게 빨아주자──"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふあああぁっ<emoji=heart04><emoji=heart04>\u3000乳首感じるぅっ<emoji=heart04>\u3000おま○この奥、キュンキュンしちゃうぅっ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「후아아아앗<emoji=heart04><emoji=heart04> 유두 느껴져어엇<emoji=heart04> 보지 깊은 곳이 큥큥거려어어엇<emoji=heart04><emoji=heart04> 앗<emoji=heart04> 안앗<emoji=heart04> 하아앗<emoji=heart04> 응아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「左だけじゃなくて、右の乳首も吸ってぇっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>\u3000乳首気持ちいぃ～っ<emoji=heart04>\u3000気持ち良くて、私――」"
translation = "「왼쪽뿐만이 아니라, 오른쪽 유두도 빨아줘어<emoji=heart04> 하아아앗<emoji=heart04> 유두 기분 좋아아~<emoji=heart04> 기분 좋아서, 나――」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「パパの赤ちゃん、欲しくなってきちゃうぅっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000あっ……はああぁっ<emoji=heart04><emoji=heart04>」"
translation = "「아빠의 아기, 갖고 싶어져 버려어<emoji=heart04> 응<emoji=heart04> 앗…… 하아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あぁぁっ<emoji=heart04>\u3000おっぱい吸ってもらったら、母乳、出るようになるかなぁ？\u3000あぁあんっ<emoji=heart04>\u3000ねぇ、パパぁ<emoji=heart04>」"
translation = "「아아앗<emoji=heart04> 가슴 빨아주면, 모유, 나오게 되려나아? 아아앙<emoji=heart04> 있지, 아빠아<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「パパとの赤ちゃん、欲しいのぉっつ<emoji=heart04><emoji=heart04>\u3000あっ……んあぁっ<emoji=heart04>\u3000ふあああぁっ<emoji=heart04><emoji=heart04>」"
translation = "「아빠와의 아기, 갖고 싶어어<emoji=heart04><emoji=heart04> 앗…… 응아앗<emoji=heart04> 하아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「パパぁ<emoji=heart04>\u3000赤ちゃんっ<emoji=heart04>\u3000私のお腹に、赤ちゃん作ってぇ<emoji=heart04><emoji=heart04>」"
translation = "「아빠아<emoji=heart04> 아기이<emoji=heart04> 내 배에, 아기 만들어줘어<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "熱に浮かされたような顔をしながら、そんなことを言うヴィーナス。"
translation = "열에 들뜬 듯한 얼굴을 하면서, 그런 말을 하는 비너스."

[[dialogue]]
speaker = "unk"
original = "俺も男として興奮してしまい、ペニスが更に大きく膨らんでしまう。"
translation = "나도 남자로서 흥분해 버려, 페니스가 더욱 크게 부풀어 오른다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「はぁあんっ<emoji=heart04><emoji=heart04>\u3000あああっ<emoji=heart04>\u3000パパのおち○ちん、魔王フォームになったぁっ<emoji=heart04>」"
translation = "「하아앙<emoji=heart04><emoji=heart04> 아아앗<emoji=heart04> 아빠의 자지, 마왕 폼이 됐어어<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「早くちょうだいっ、パパの赤ちゃん<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000んうぅっ……はあぁっ<emoji=heart04>\u3000赤ちゃん欲しいのぉ<emoji=heart04><emoji=heart04>」"
translation = "「빨리 줘, 아빠의 아기<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 아아앗<emoji=heart04> 응우웃…… 하아앗<emoji=heart04> 아기 갖고 싶어어<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスの言葉に呼応するように、おま○こが搾り取るような動きをしてきて、俺はその気持ち良さに声を上げてしまう。"
translation = "비너스의 말에 호응하듯, 보지가 짜내는 듯한 움직임을 보여와서, 나는 그 기분 좋음에 목소리를 높이고 만다."

[[dialogue]]
speaker = "クロト"
original = "「くっ……！？\u3000ヴィーナス、それダメだっ。出るっ！！！」"
translation = "「큭……!? 비너스, 그거 안 돼. 나온다!!!」"

[[dialogue]]
speaker = "unk"
original = "俺もここ３日は禁欲していたこともあり、我慢できず射精してしまった。"
translation = "나도 최근 3일 동안 금욕하고 있었던 탓에, 참지 못하고 사정해 버렸다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「あっ！？\u3000ふああああぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000パパの精液、来たあああぁぁぁんっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗!? 하아아아아아~~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 아빠의 정액, 왔다아아아아앙<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「んっ<emoji=heart04>\u3000はあああぁっ<emoji=heart04><emoji=heart04>\u3000あああっ<emoji=heart04>\u3000精子いっぱい入って来て、気持ちいいっ<emoji=heart04>\u3000私もイッちゃうぅ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응<emoji=heart04> 하아아아앗<emoji=heart04><emoji=heart04> 아아앗<emoji=heart04> 정자 가득 들어와서, 기분 좋아<emoji=heart04> 나도 가버려어<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「んんぅっ<emoji=heart04><emoji=heart04>\u3000あっ――ふああああああぁぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응응웃<emoji=heart04><emoji=heart04> 앗――하아아아아아아아~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "おま○こがきゅうぅっ<emoji=heart04>\u3000とペニスを締め付けて来て、ヴィーナスは背筋を仰け反らせながら震わせる。"
translation = "보지가 뀨우우웃<emoji=heart04> 하고 페니스를 조여와서, 비너스는 등줄기를 젖히며 몸을 떤다."

[[dialogue]]
speaker = "unk"
original = "彼女も絶頂してしまったようだ――しかし、彼女の腰振りは止まらない。"
translation = "그녀도 절정해 버린 듯하다――하지만, 그녀의 허리 흔들림은 멈추지 않는다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「んんんぅっ<emoji=heart04><emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000はぁああんっ<emoji=heart04>\u3000んあぁっ……ふああぁ～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응응응웃<emoji=heart04><emoji=heart04> 하아앗<emoji=heart04> 아아앗<emoji=heart04> 하아아앙<emoji=heart04> 응아앗…… 하아아~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「くっ、ヴィーナス、イったばかりなのにそんなに腰振られたら……！」"
translation = "「큭, 비너스, 막 가버린 참인데 그렇게 허리를 흔들면……!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「だってぇ、おま○こ喜んでて、すごく気持ちいいんだもんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あぁあんっ<emoji=heart04>\u3000パパの子種、もっと欲しがってるのぉっ<emoji=heart04><emoji=heart04>\u3000んあぁっ……ふああぁっ<emoji=heart04>」"
translation = "「그치만, 보지가 기뻐해서, 정말 기분 좋은걸<emoji=heart04> 앙<emoji=heart04> 아아앙<emoji=heart04> 아빠의 씨물, 더 갖고 싶어해애<emoji=heart04><emoji=heart04> 응아앗…… 하아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「んんぅっ<emoji=heart04>\u3000あぁあんっ<emoji=heart04>\u3000パパの子種、もっとぉ<emoji=heart04>\u3000もっと頂戴っ<emoji=heart04>\u3000あぁあんっ<emoji=heart04>」"
translation = "「응응웃<emoji=heart04> 아아앙<emoji=heart04> 아빠의 씨물, 더어<emoji=heart04> 더 줘어<emoji=heart04> 아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「パパの赤ちゃんっ<emoji=heart04>\u3000赤ちゃん作りたいのぉっ<emoji=heart04><emoji=heart04>」"
translation = "「아빠의 아기이<emoji=heart04> 아기 만들고 싶어어<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「っ……そんなことばかり言って、自分の娘なのに、ヴィーナスのこと本気で孕ませたくなっちゃうじゃないか！」"
translation = "「윽…… 그런 소리만 하면, 내 딸인데도, 비너스를 진심으로 임신시키고 싶어지잖아!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「うんっ<emoji=heart04>\u3000来て、パパぁ<emoji=heart04>\u3000私、もっと頑張って動くから――」"
translation = "「응<emoji=heart04> 이리 와, 아빠아<emoji=heart04> 나, 더 열심히 움직일 테니까――」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「魔王の赤ちゃん、種付けしてぇ<emoji=heart04>」"
translation = "「마왕의 아기, 씨내리 해줘어<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「っ……ヴィーナス！」"
translation = "「윽…… 비너스!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あっ――――<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗――――<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふあああぁぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000パパの本気ピストンっ<emoji=heart04>\u3000あああっ、来たぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「하아아아아아~~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 아빠의 진심 피스톤<emoji=heart04> 아아앗, 왔다아~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "興奮が限界に達し、俺は欲望に身を任せて下から腰を突き上げる。"
translation = "흥분이 한계에 달해, 나는 욕망에 몸을 맡기고 아래에서 허리를 찔러 올린다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「あっ<emoji=heart04><emoji=heart04>\u3000はぁんっ、んんぅっ、ふあぁあっ<emoji=heart04><emoji=heart04>\u3000子宮口にどちゅどちゅ、おち○ちんキス気持ちいいっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふあぁっ、んうぅっ、んああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04><emoji=heart04> 하앙, 응응웃, 하아앗<emoji=heart04><emoji=heart04> 자궁구에 도츗도츗, 자지 키스 기분 좋아<emoji=heart04> 하아앗<emoji=heart04> 하아앗, 응우웃, 응아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「子宮メロメロになって、下りて来ちゃうぅんっ<emoji=heart04><emoji=heart04>\u3000んんっ<emoji=heart04>\u3000はあぁっ、んうぅっ<emoji=heart04>\u3000あっ、ふあぁっ、あんっ<emoji=heart04>\u3000んっ、んあぁっ、ふああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「자궁 메롱메롱이 돼서, 내려와 버려어<emoji=heart04><emoji=heart04> 응응<emoji=heart04> 하아앗, 응우웃<emoji=heart04> 앗, 하아앗, 앙<emoji=heart04> 응, 응아앗, 하아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「パパの精子我慢できなくて、早く早くって、おち○ちんに吸い付いちゃってるぅっ<emoji=heart04>\u3000あんっ、はあぁんっ<emoji=heart04><emoji=heart04>\u3000んっ、んんぅっ、んああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「아빠의 정자 못 참겠어서, 빨리 빨리라고, 자지에 달라붙어 버려어<emoji=heart04> 앙, 하아앙<emoji=heart04><emoji=heart04> 응, 응응웃, 응아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「子宮が子作りモード入っちゃってるのぉっ<emoji=heart04><emoji=heart04>\u3000ふあぁあっ、んあぁあっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「자궁이 아기 만들기 모드 들어갔어어<emoji=heart04><emoji=heart04> 하아아앗, 응아아앗<emoji=heart04> 하아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「赤ちゃん作る準備しちゃってるぅっ<emoji=heart04>\u3000ふあぁんっ、はあぁあっ<emoji=heart04>\u3000んあああぁっ<emoji=heart04><emoji=heart04>」"
translation = "「아기 만들 준비 해버려어<emoji=heart04> 하아앙, 하아아앗<emoji=heart04> 응아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あんっ<emoji=heart04>\u3000卵子、排卵しちゃってるのぉっ<emoji=heart04>\u3000あぁあんっ<emoji=heart04>\u3000はあぁっ、んあぁっ<emoji=heart04><emoji=heart04>\u3000ふああぁんっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앙<emoji=heart04> 난자, 배란해 버려어<emoji=heart04> 아아앙<emoji=heart04> 하아앗, 응아앗<emoji=heart04><emoji=heart04> 하아아앙<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「パパぁ、キスっ<emoji=heart04>\u3000キスしてぇ<emoji=heart04>」"
translation = "「아빠아, 키스<emoji=heart04> 키스해줘어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は彼女の唇を奪って、舌を入れて絡める。"
translation = "나는 그녀의 입술을 빼앗고, 혀를 넣어 얽힌다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「――んむぅっ<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000ちゅぱっ……ちゅぶっ、ちゅぶぶっ<emoji=heart04>\u3000ちゅれるっ<emoji=heart04>\u3000ちゅむっ……じゅるるっ<emoji=heart04>」"
translation = "「――음무웃<emoji=heart04> 츄<emoji=heart04> 츄파…… 츄븟, 츄븟븟<emoji=heart04> 츄르륵<emoji=heart04> 츄뭇…… 쥬르르<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「はあぁっ<emoji=heart04>\u3000舌しゅごいっ<emoji=heart04>\u3000キス気持ちいぃっ<emoji=heart04>\u3000んぶっ<emoji=heart04>\u3000じゅるるっ<emoji=heart04>\u3000ちゅばっ……ちゅぶぶっ<emoji=heart04>\u3000れるれる……れろちゅっ<emoji=heart04>\u3000じゅれるっ<emoji=heart04>」"
translation = "「하아앗<emoji=heart04> 혀 굉장해<emoji=heart04> 키스 기분 좋아<emoji=heart04> 응븟<emoji=heart04> 쥬르르<emoji=heart04> 츄밧…… 츄븟븟<emoji=heart04> 레로레로…… 레로츄<emoji=heart04> 쥬르륵<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ちゅぱぁっ<emoji=heart04>\u3000パパしゅき、しゅきぃ<emoji=heart04>\u3000んちゅっ<emoji=heart04>\u3000ちゅっちゅ<emoji=heart04>\u3000ちゅぶっ……ちゅぶぶぶっ<emoji=heart04>\u3000じゅるっ、じゅるるっ<emoji=heart04>\u3000んぶっ……れろれろ、れろちゅっ<emoji=heart04>」"
translation = "「츄파아<emoji=heart04> 아빠 좋아, 좋아아<emoji=heart04> 응츄<emoji=heart04> 츄츄<emoji=heart04> 츄븟…… 츄븟븟븟<emoji=heart04> 쥬르르, 쥬르르<emoji=heart04> 응븟…… 레로레로, 레로츄<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「俺も好きだっ……！\u3000愛してるぞ、ヴィーナスっ！」"
translation = "「나도 좋아한다……! 사랑한다, 비너스!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「はぁあんっ<emoji=heart04>\u3000嬉しいっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000んうぅっ、ふあああぁっ<emoji=heart04>\u3000子宮喜んで、卵子いっぱい出ちゃうぅんっ<emoji=heart04><emoji=heart04>」"
translation = "「하아아앙<emoji=heart04> 기뻐어<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 아아앗<emoji=heart04> 응우웃, 하아아아앗<emoji=heart04> 자궁 기뻐서, 난자 잔뜩 나와 버려어<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あっ、んふぅっ<emoji=heart04>\u3000パパしゅきっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000しゅきしゅきっ<emoji=heart04><emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んんぅっ、ふああぁっ<emoji=heart04><emoji=heart04>\u3000はああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「앗, 응후웃<emoji=heart04> 아빠 좋아아<emoji=heart04> 하아앗<emoji=heart04> 좋아좋아아<emoji=heart04><emoji=heart04> 앙<emoji=heart04> 응응웃, 하아아앗<emoji=heart04><emoji=heart04> 하아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「パパ、私もイキそうっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁあんっ<emoji=heart04>\u3000ふあああぁっ<emoji=heart04><emoji=heart04>」"
translation = "「아빠, 나도 갈 것 같아아<emoji=heart04> 앗<emoji=heart04> 하아아앙<emoji=heart04> 하아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「俺もまたイキそうだ……！\u3000ラストスパート行くぞっ！」"
translation = "「나도 또 갈 것 같다……! 라스트 스퍼트 간다!」"

[[dialogue]]
speaker = "unk"
original = "俺とヴィーナスは絶頂に向けて、腰の動きを更に激しくする。"
translation = "나와 비너스는 절정을 향해, 허리의 움직임을 더욱 격렬하게 한다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「あっ、パパぁっ<emoji=heart04>\u3000おち○ちん、突き上げすごいっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふあぁあっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000ふあああぁっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗, 아빠아<emoji=heart04> 자지, 찔러 올리는 거 굉장해<emoji=heart04> 앙<emoji=heart04> 하아아앗<emoji=heart04> 응아아앙<emoji=heart04><emoji=heart04><emoji=heart04> 응<emoji=heart04> 후우웃<emoji=heart04> 응아앗<emoji=heart04> 하아아아앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「気持ちいいっ<emoji=heart04>\u3000おま○こ気持ちいいっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ、はあぁんっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「기분 좋아<emoji=heart04> 보지 기분 좋아<emoji=heart04> 앗<emoji=heart04> 앙, 하아앙<emoji=heart04> 하아아앙<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「パパのおち○ちん、しゅきぃ<emoji=heart04>\u3000おま○こ気持ちいいっ<emoji=heart04>\u3000おま○こしゅきぃぃ<emoji=heart04><emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아빠의 자지, 좋아아<emoji=heart04> 보지 기분 좋아<emoji=heart04> 보지 좋아아아<emoji=heart04><emoji=heart04> 하아앗<emoji=heart04> 하아아앙<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あああっ<emoji=heart04>\u3000もうダメ<emoji=heart04>\u3000イっちゃう<emoji=heart04>\u3000すごいの来ちゃうぅっ<emoji=heart04><emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はぁんっ、ふあぁんっ<emoji=heart04>\u3000んあああぁ～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아앗<emoji=heart04> 이제 안 돼<emoji=heart04> 가버려<emoji=heart04> 굉장한 게 와버려어<emoji=heart04><emoji=heart04> 앙<emoji=heart04> 하앙, 하아앙<emoji=heart04> 응아아아아~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「中に出すぞ！\u3000本当に孕ませるからなっ！」"
translation = "「안에 내보낸다! 정말로 임신시킬 거니까!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「うんっ<emoji=heart04>\u3000来て、来てぇ<emoji=heart04>\u3000パパの精子、ぶっかけてぇっ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁんっ<emoji=heart04><emoji=heart04>\u3000ふああああぁっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응<emoji=heart04> 와줘, 와줘어<emoji=heart04> 아빠의 정액, 뿌려줘어<emoji=heart04><emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 하앙<emoji=heart04><emoji=heart04> 하아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あっ、パパ<emoji=heart04>\u3000イクっ<emoji=heart04><emoji=heart04>\u3000イクイクイクイクイクっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗, 아빠<emoji=heart04> 간다<emoji=heart04><emoji=heart04> 가가각가각<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「んああああああっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イっ――――<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 가버렷――――<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「イックうぅぅぅーーーーーーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふああああああぁぁぁ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「간다아아아아아아아―――――――――앗<emoji=heart04><emoji=heart04><emoji=heart04> 하아아아아아아아아~~~~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はヴィーナスのお尻を鷲掴みにして、ペニスをおま○この一番奥まで突き上げると、欲望の猛りを全てぶちまけた。"
translation = "나는 비너스의 엉덩이를 움켜쥐고, 페니스를 보지의 가장 안쪽까지 찔러 올리며, 욕망의 광기를 전부 쏟아부었다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「んああああぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000パパの精子で受精するぅぅぅっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000はあぁぁああああぁんっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응아아아아아~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 아빠의 정자로 수정해버려어어엇<emoji=heart04><emoji=heart04><emoji=heart04> 하아아아아아아아앙<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふあああぁ～～～っ<emoji=heart04><emoji=heart04>\u3000パパの本気射精、すごいのぉ<emoji=heart04>\u3000どくどくって、ずっと力強く脈打ってる<emoji=heart04>\u3000んんんっ<emoji=heart04>\u3000はあぁ～っ<emoji=heart04>\u3000気持ち良くて好きぃ<emoji=heart04><emoji=heart04>」"
translation = "「하아아아~~앗<emoji=heart04><emoji=heart04> 아빠의 진심 사정, 굉장해애<emoji=heart04> 울컥울컥하고, 계속 힘차게 고동치고 있어<emoji=heart04> 응응응<emoji=heart04> 하아아~앗<emoji=heart04> 기분 좋아서 좋아아<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「んんうぅ……っ<emoji=heart04>\u3000おま○この中、パパの愛でいっぱい……<emoji=heart04>\u3000はあぁあっ<emoji=heart04>\u3000ふうぅっ……<emoji=heart04>」"
translation = "「응응우……웃<emoji=heart04> 보지 안, 아빠의 사랑으로 가득……<emoji=heart04> 하아아앗<emoji=heart04> 후우웃……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "やがて、長かった射精も終わり――"
translation = "이윽고, 길었던 사정도 끝나고――"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あんっ……<emoji=heart04>\u3000パパの、抜けちゃう<emoji=heart04>」"
translation = "「앙……<emoji=heart04> 아빠 거, 빠져버려<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「んっ……はあぁあ<emoji=heart04>\u3000ふうぅ……<emoji=heart04>」"
translation = "「응…… 하아아아<emoji=heart04> 후우……<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「パパとのエッチ、やっぱり気持ちいい……<emoji=heart04>\u3000はふぅん<emoji=heart04>」"
translation = "「아빠와의 섹스, 역시 기분 좋아……<emoji=heart04> 하후웅<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「んふぅ……<emoji=heart04>\u3000おま○この中、パパのでいっぱいで幸せぇ<emoji=heart04>\u3000赤ちゃん、本当にできちゃうかも……<emoji=heart04>」"
translation = "「응후……<emoji=heart04> 보지 안, 아빠 거로 가득해서 행복해애<emoji=heart04> 아기, 정말로 생겨버릴지도……<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「なんて、えへへへへへぇ<emoji=heart04>\u3000本当は今日、できちゃう日じゃないんだけどね……<emoji=heart04>」"
translation = "「이러구, 에헤헤헤헤헤<emoji=heart04> 사실은 오늘, 생기는 날이 아니지만 말이야……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「……気分は落ち着いた？」"
translation = "「……기분은 좀 진정됐어?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「うんっ<emoji=heart04>\u3000今日もいっぱい気持ち良くしてくれて、ありがと、パパ<emoji=heart04>」"
translation = "「응<emoji=heart04> 오늘도 가득 기분 좋게 해줘서, 고마워, 아빠<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ここまで我慢できなくなっちゃう前に、もっと早く相談してくれればよかったのに」"
translation = "「이렇게 참지 못하게 되기 전에, 좀 더 빨리 상담해 줬으면 좋았을 텐데」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ごめんなさい。自分ではできると思ったの……。でも、実際にやってみたら、思っていたよりずっと寂しくて……」"
translation = "「미안해요. 스스로는 할 수 있을 거라 생각했어……. 하지만, 실제로 해보니까, 생각했던 것보다 훨씬 외로워서……」"

[[dialogue]]
speaker = "クロト"
original = "「やっぱり全部禁止するんじゃなくて、星徒会室では禁止、とかでいいんじゃない？」"
translation = "「역시 전부 금지하는 게 아니라, 성도회실에서는 금지, 같은 걸로 하면 되잖아?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「むぅ……悔しいけど、やっぱりそれしかないかも」"
translation = "「무으…… 분하지만, 역시 그것밖에 없을지도」"

[[dialogue]]
speaker = "クロト"
original = "「……今度からは夜に別の場所で会って、２人でデートしよう」"
translation = "「……다음부터는 밤에 다른 장소에서 만나서, 둘이서 데이트하자」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「いいの？\u3000場所はどこがいいかしら……リゾート結界のプライベートビーチとか？\u3000あっ、それと……」"
translation = "「정말? 장소는 어디가 좋을까…… 리조트 결계의 프라이빗 비치라든가? 앗, 그리고……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「できれば毎日デートしたい、って言ったら……ダメ？」"
translation = "「가능하면 매일 데이트하고 싶다, 라고 하면…… 안 돼?」"

[[dialogue]]
speaker = "クロト"
original = "「わかった。いいよ」"
translation = "「알았어. 좋아」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「やった♪\u3000えへへっ、嬉しい<emoji=heart04>\u3000あ、でも……夜にイチャイチャしてたら、毎日エッチしたくなっちゃうかも<emoji=heart04>」"
translation = "「앗싸♪ 에헤헷, 기뻐<emoji=heart04> 아, 하지만…… 밤에 꽁냥거리고 있으면, 매일 섹스하고 싶어질지도<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あっ……ふふっ<emoji=heart04>\u3000おち○ちん、反応したわ<emoji=heart04>\u3000想像したら、したくなっちゃった？」"
translation = "「앗…… 후훗<emoji=heart04> 자지, 반응했네<emoji=heart04> 상상했더니, 하고 싶어졌어?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「じゃあ、デート……約束ね、パパ<emoji=heart04>」"
translation = "「그럼, 데이트…… 약속이야, 아빠<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「んっ……ちゅっ<emoji=heart04>」"
translation = "「응…… 츄<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その後、これまで我慢していた分、俺たちは昼過ぎまでベッドを軋ませ続けてしまうのだった――"
translation = "그 후, 그동안 참아왔던 만큼, 우리들은 낮이 지날 때까지 침대를 계속 삐걱거리게 만들고 말았다――"

