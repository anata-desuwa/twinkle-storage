[[dialogue]]
speaker = "unk"
original = "第１話,エリスさんは風紀委員,P"
translation = "제1화, 에리스 씨는 풍기위원, P"

[[dialogue]]
speaker = "unk"
original = "新星学園の星徒会長になり、流星の星徒会とも邂逅してから数日。"
translation = "신성학원의 성도회장이 되고, 유성의 성도회와도 해후한 지 수일."

[[dialogue]]
speaker = "unk"
original = "星徒会の仕事の帰りにモンスターと遭遇し、俺が倒そうとしたのだが──"
translation = "성도회 업무를 마치고 돌아가는 길에 몬스터와 조우하여, 내가 쓰러뜨리려 했으나──"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「フルール・ド・エクレール！」"
translation = "「플뢰르 드 에클레르!」"

[[dialogue]]
speaker = "unk"
original = "一撃で倒した！？"
translation = "일격에 쓰러뜨렸어!?"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「お怪我はありませんか？\u3000……ご無事なようですね。良かったです」"
translation = "「다친 곳은 없으신가요? ……무사하신 것 같네요. 다행입니다.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「ところで見慣れないお顔ですが、新星学園の生徒でしょうか？」"
translation = "「그런데 낯선 얼굴입니다만, 신성학원의 학생인가요?」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「しかしあなたはプリマステラではないですよね？\u3000私は流星・新星・附属各校のプリマステラを把握していますが、あなたのことは存じ上げておりません」"
translation = "「하지만 당신은 프리마스텔라가 아니지요? 저는 유성·신성·부속 각 학교의 프리마스텔라를 파악하고 있습니다만, 당신에 대해서는 알지 못합니다.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「──失礼、申し遅れました。私はエリス・クローデル。流星学園２年生で、風紀委員に所属しています」"
translation = "「──실례, 인사가 늦었습니다. 저는 에리스 클로델. 유성학원 2학년으로, 풍기위원에 소속되어 있습니다.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「星徒会が先頭に立ってモンスターと戦うように、流星学園や新星学園の委員会には普通の学校とは違う役割があります」"
translation = "「성도회가 앞장서서 몬스터와 싸우는 것처럼, 유성학원이나 신성학원의 위원회에는 보통 학교와는 다른 역할이 있습니다.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「風紀委員の仕事は星騎士のルールを守らせること。たとえばプリマステラでないのに独断で戦闘したり、星術を使って私闘を行ったりですね」"
translation = "「풍기위원의 업무는 성기사의 규칙을 지키게 하는 것. 예를 들어 프리마스텔라가 아닌데 독단으로 전투하거나, 성술을 사용해 사적인 싸움을 벌이는 것 등이지요.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「もし注意や警告に従わない場合、実力を行使して直接取り締まる権限もあります」"
translation = "「만약 주의나 경고에 따르지 않을 경우, 실력을 행사하여 직접 단속할 권한도 있습니다.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「新星学園の生徒であればご存じのことと思いますが……」"
translation = "「신성학원의 학생이라면 알고 계실 거라 생각합니다만……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ルリエル参上──って、もう終わっちゃってるです。エリス先輩と新星の会長さんがやったんですか？」"
translation = "「루리엘 등장── 어라, 벌써 끝나버린 거예요. 에리스 선배랑 신성의 회장님이 한 건가요?」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「会長さん？\u3000もしかして、御前試合でヴィーナス前会長を破って新会長になったという……あなたがそうでしたか」"
translation = "「회장님? 설마, 어전 시합에서 비너스 전 회장을 꺾고 새 회장이 되었다는…… 당신이 그분이었나요.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「であれば私が剣を抜く必要はありませんでしたね。すみません、差し出がましい真似をしました」"
translation = "「그렇다면 제가 검을 뽑을 필요는 없었겠네요. 죄송합니다, 참견을 했군요.」"

[[dialogue]]
speaker = "unk"
original = "でも俺は会長やプリマステラじゃなくても戦う"
translation = "하지만 나는 회장이나 프리마스텔라가 아니더라도 싸울 거야."

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「ふふっ」"
translation = "「후훗.」"

[[dialogue]]
speaker = "unk"
original = "笑われた！？"
translation = "비웃음당했어!?"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「すみません、失礼しました。とても真っ直ぐな人だなと思って」"
translation = "「죄송합니다, 실례했습니다. 정말 곧은 분이구나 싶어서요.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「私も同感です」"
translation = "「저도 동감입니다.」"

[[dialogue]]
speaker = "unk"
original = "え？"
translation = "에?"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「ですが、そういう人がいるからこそ、プリマステラがあるのだと理解してください。血気盛んな生徒に言うことを聞かせるためにも規則やルールが必要なんですよ」"
translation = "「하지만, 그런 분이 있기에 프리마스텔라가 있는 것이라고 이해해 주세요. 혈기 왕성한 학생들을 따르게 하기 위해서라도 규율과 규칙이 필요한 법입니다.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「実は私も経験がありまして──」"
translation = "「사실 저도 경험이 있어서요──」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「私はフランスのリヨンの生まれなのですが、故郷でモンスターが発生した際、私も独力で迎え撃とうとしたのです」"
translation = "「저는 프랑스 리옹 태생입니다만, 고향에서 몬스터가 발생했을 때 저도 독력으로 맞서 싸우려 했습니다.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「私の母はかつて流星学園に在籍していた天使で、私はその母から星術の手ほどきを受けていました」"
translation = "「제 어머니는 예전에 유성학원에 재적했던 천사로, 저는 그 어머니로부터 성술 지도를 받고 있었습니다.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「だから私なら十分戦える。そう思ったのですが……結果は敗北。危うく命を落とすところを助けてもらいました」"
translation = "「그래서 저라면 충분히 싸울 수 있다. 그렇게 생각했습니다만…… 결과는 패배. 하마터면 목숨을 잃을 뻔한 것을 도움받았습니다.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「そしてより力をつけるために流星学園に入学したのです」"
translation = "「그리고 더욱 힘을 기르기 위해 유성학원에 입학한 것입니다.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「星騎士はモンスターと戦うのが務めなのに、どうしてプリマステラの規則があるのか。疑問に思われたかもしれません」"
translation = "「성기사는 몬스터와 싸우는 것이 임무인데, 어째서 프리마스텔라의 규칙이 있는지 의문이 드셨을지도 모릅니다.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「それはもちろん、単純に危険だからです」"
translation = "「그것은 물론, 단순히 위험하기 때문입니다.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「経験があれば、自分より強い敵が出現してもそれを察し、足止めに撤する、あるいは撤退するという判断ができます」"
translation = "「경험이 있다면 자신보다 강한 적이 출현해도 그것을 감지하고, 발을 묶는 데 전념하거나 혹은 후퇴한다는 판단을 할 수 있습니다.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「ですが経験のない者ほど彼我の戦力を正確に判断できません。星力や星術も未熟な中、強敵と遭遇し、戦力差に気付かず戦ってしまったら……想像したくないですね」"
translation = "「하지만 경험이 없는 자일수록 피아의 전력을 정확히 판단하지 못합니다. 성력이나 성술도 미숙한 가운데 강적과 조우하여 전력 차를 깨닫지 못하고 싸워버린다면…… 상상하고 싶지 않네요.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「一般の方々の安全が脅かされている状況だったら──とも思うでしょう。ですが戦う力がないなら逃げるべきです」"
translation = "「일반인들의 안전이 위협받는 상황이라면── 하고 생각할 수도 있겠지요. 하지만 싸울 힘이 없다면 도망쳐야 합니다.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「星騎士は選ばれた戦士ですが、同時に若き学生でもある。本来なら守られる側の存在です」"
translation = "「성기사는 선택받은 전사이지만, 동시에 젊은 학생이기도 합니다. 본래라면 보호받아야 할 존재지요.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「未熟な力で立ち向かえば、何も守れないばかりか、いたずらに命を散らしてしまう。それを防ぐための規則です」"
translation = "「미숙한 힘으로 맞서면 아무것도 지키지 못할 뿐만 아니라, 헛되이 목숨을 잃게 됩니다. 그것을 방지하기 위한 규칙입니다.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「……と、いち風紀委員が星徒会長に説明するのもおこがましいですが」"
translation = "「……라고, 일개 풍기위원이 성도회장님께 설명하는 것도 외람됩니다만.」"

[[dialogue]]
speaker = "unk"
original = "ありがとう。納得した"
translation = "고마워. 납득했어."

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「それなら良かったです」"
translation = "「그렇다면 다행입니다.」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ほえ～……さすがエリス先輩なのです……」"
translation = "「호에~…… 역시 에리스 선배인 거예요……」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「いえ、そこまで感心されなくても……」"
translation = "「아니요, 그렇게까지 감탄하지 않아도……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「でもでも、エリス先輩だって星徒会でもおかしくないのですよ！」"
translation = "「그치만 그치만, 에리스 선배는 성도회에 있어도 이상하지 않다고요!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「風紀委員は、場合によっては他の星騎士を力ずくで止める必要がありますから、よほど強くないとなれません」"
translation = "「풍기위원은 경우에 따라 다른 성기사를 힘으로 저지해야 하니까, 웬만큼 강하지 않으면 될 수 없거든요.」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「エリス先輩はそのエースですし、流星学園のプリマステラの中でも実力者なのです」"
translation = "「에리스 선배는 그 에이스고, 유성학원의 프리마스텔라 중에서도 실력자예요.」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「だけどエリス先輩がモンスターに負けた話は初めて聞きました。ちょっと意外です」"
translation = "「그런데 에리스 선배가 몬스터에게 졌다는 이야기는 처음 들었어요. 조금 의외네요.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「いえいえ、私なんてまだまだです」"
translation = "「아니요 아니요, 저 따위는 아직 멀었습니다.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「ちなみにその話ですが……あまり口外しないでいただけると助かります。私にとっては恥ずかしい記憶ですし、風紀委員としての立場がありますので」"
translation = "「참고로 그 이야기는…… 가급적 발설하지 않아 주시면 감사하겠습니다. 제게는 부끄러운 기억이기도 하고, 풍기위원으로서의 입장이 있으니까요.」"

[[dialogue]]
speaker = "unk"
original = "わかった、約束する"
translation = "알았어, 약속할게."

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「ありがとうございます。風紀委員としても私個人としても助かります」"
translation = "「감사합니다. 풍기위원으로서도 저 개인으로서도 큰 도움이 됩니다.」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ルリエルもりょーかいでありますっ」"
translation = "「루리엘도 알겠습니닷!」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「それでは私とルリエルさんは寮に戻ります。新しい新星の星徒会長として、頑張ってくださいね」"
translation = "「그러면 저와 루리엘 씨는 기숙사로 돌아가겠습니다. 새로운 신성의 성도회장으로서 힘내주세요.」"

