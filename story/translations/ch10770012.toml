[[dialogue]]
speaker = "unk"
original = "第２話,メイド長は成長中,P"
translation = "제2화, 메이드장은 성장 중, P"

[[dialogue]]
speaker = "unk"
original = "それは、蘭美、せつな、ヴィーナスの３人が、星徒会室で談笑していた時のことだった――"
translation = "그것은, 라비, 세츠나, 비너스 세 사람이, 성도회실에서 담소하고 있을 때의 일이었다――"

[[dialogue]]
speaker = "せつな"
original = "「そういえば、せつな、最近１つ悩みがござりまして……」"
translation = "「그러고 보니, 세츠나, 최근 한 가지 고민이 있사옵니다만……」"

[[dialogue]]
speaker = "蘭美"
original = "「なに？\u3000そういうことなら、この私に言ってみなさい。メイド長として、特別に聞いてあげるわ」"
translation = "「뭐야? 그런 거라면, 이 나에게 말해 보렴. 메이드장으로서, 특별히 들어 줄게」"

[[dialogue]]
speaker = "せつな"
original = "「ありがとうございまする。実は――」"
translation = "「감사하옵니다. 실은――」"

[[dialogue]]
speaker = "せつな"
original = "「せつな、最近また胸が大きくなって、ブラジャーのサイズが合わなくなってしまったのでござる！」"
translation = "「세츠나, 최근 또 가슴이 커져서, 브래지어 사이즈가 맞지 않게 되었사옵니다!」"

[[dialogue]]
speaker = "蘭美"
original = "「は！？」"
translation = "「하!?」"

[[dialogue]]
speaker = "unk"
original = "いきなり何を言い出してるんだ！？"
translation = "갑자기 무슨 소리를 하는 거야!?"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あのね……せつな――」"
translation = "「저기 말이야…… 세츠나――」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「実は私も同じく、ブラが合わなくなっていたところだったの！\u3000奇遇ね！」"
translation = "「실은 나도 마찬가지로, 브라가 맞지 않게 되었던 참이었어! 기막힌 우연이네!」"

[[dialogue]]
speaker = "unk"
original = "えぇ～～～っ！？"
translation = "에에에에엣~!?」"

[[dialogue]]
speaker = "蘭美"
original = "「ていうか、待ちなさいよ！\u3000それの何が悩みなわけ！？\u3000胸が大きくなったのはいいことじゃない！」"
translation = "「랄까, 기다려 봐! 그게 뭐가 고민이라는 거야!? 가슴이 커진 건 좋은 일 아니야!」"

[[dialogue]]
speaker = "せつな"
original = "「悩みなのは、せつな、新しいブラが欲しいのでござるが、大人っぽいやつを買うことに挑戦してみたいのでござる！」"
translation = "「고민인 것은, 세츠나, 새 브라를 갖고 싶사옵니다만, 어른스러운 것을 사는 것에 도전해 보고 싶사옵니다!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ビビッときたわ！\u3000つまりあれよ、いわゆる大人なランジェリーショップに売ってるやつってことよね？」"
translation = "「번뜩였어! 즉 그거지, 이른바 어른스러운 란제리 숍에서 파는 거라는 거지?」"

[[dialogue]]
speaker = "せつな"
original = "「その通りでござる。せつな、次の新しいブラは、大人なエロスが溢れるものを付けてみたいのでござる！」"
translation = "「그렇사옵니다. 세츠나, 다음 새 브라는, 어른스러운 에로스가 넘치는 것을 착용해 보고 싶사옵니다!」"

[[dialogue]]
speaker = "せつな"
original = "「しかし、いざそういう場所に入ろうと思うと、１人では尻込みしてまう雰囲気があるというか……」"
translation = "「하지만, 막상 그런 장소에 들어가려고 하면, 혼자서는 뒷걸음질 치게 되는 분위기가 있다고 할까……」"

[[dialogue]]
speaker = "蘭美"
original = "「いや、普段から房中術とか口にしてる貴方が、それを言う！？\u3000別に入れるでしょ、普通に！」"
translation = "「아니, 평소부터 방중술 같은 걸 입에 담는 당신이, 그걸 말해!? 별로 들어갈 수 있잖아, 평범하게!」"

[[dialogue]]
speaker = "せつな"
original = "「なんと！？\u3000蘭美殿は大人なランジェリーショップに入ったことがあるのでござるか！？」"
translation = "「뭐라고!? 라비 님은 어른스러운 란제리 숍에 들어가 본 적이 있으신 것이옵니까!?」"

[[dialogue]]
speaker = "蘭美"
original = "「あるわよ！\u3000だって、大人っぽい場所……カッコいいじゃない！」"
translation = "「있지! 왜냐면, 어른스러운 장소…… 멋있잖아!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「なるほど……面白いわね！\u3000ならせっかくだし、今度の休日、みんなで一緒に買いに行きましょう！」"
translation = "「과연…… 재미있네! 그럼 이왕 이렇게 된 거, 다음 휴일, 다 같이 함께 사러 가자!」"

[[dialogue]]
speaker = "せつな"
original = "「本当でござるか！？\u3000それは心強くて、助かりまする♪\u3000是非お願いしたいでござる！」"
translation = "「정말이옵니까!? 그것은 든든하고, 도움이 되옵니다♪ 꼭 부탁드리고 싶사옵니다!」"

[[dialogue]]
speaker = "蘭美"
original = "「って、待ちなさい！\u3000みんなってことは、私も行くの！？」"
translation = "「랄까, 기다려 봐! 다 같이라는 건, 나도 간다는 거야!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「？\u3000そうだけど、嫌だった？\u3000買い換える必要があるのは、私とせつなだし、蘭美が他になにか用事があるなら無理には――」"
translation = "「? 그렇지만, 싫었어? 바꿔 살 필요가 있는 건, 나와 세츠나이고, 라비가 다른 용무가 있다면 무리하게는――」"

[[dialogue]]
speaker = "蘭美"
original = "「って、誰の胸が小さくて成長してないですって！？」"
translation = "「랄까, 누구의 가슴이 작아서 성장하지 않았다는 거야!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「いや、言ってないけど！？」"
translation = "「아니, 말 안 했는데!?」"

[[dialogue]]
speaker = "蘭美"
original = "「言っとくけど、私はお嬢様やせつなと比べて年齢が下だからそう見えるだけで、胸は発展途上なだけぴょん！」"
translation = "「말해두지만, 나는 아가씨나 세츠나와 비교해서 나이가 어리니까 그렇게 보일 뿐이고, 가슴은 발전 도상일 뿐이뿅!」"

[[dialogue]]
speaker = "蘭美"
original = "「３年後くらいには、最速で成長して、２人を越えるくらいダイナマイトになっているぴょん！！」"
translation = "「3년 후쯤에는, 가장 빠르게 성장해서, 두 사람을 뛰어넘을 정도로 다이너마이트가 될 거이뿅!!」"

[[dialogue]]
speaker = "せつな"
original = "「蘭美殿。興奮してまた、ラパン地方の方言が出ているでござるよ！」"
translation = "「라비 님. 흥분해서 또, 라판 지방의 방언이 나오고 있사옵니다!」"

[[dialogue]]
speaker = "蘭美"
original = "「おっと、いけないいけない……ふぅ」"
translation = "「이런, 안 돼 안 돼…… 휴」"

[[dialogue]]
speaker = "蘭美"
original = "「そういうことだから、会長！\u3000私は年相応なだけで、貧乳なわけじゃないから、そこのところ勘違いしないで頂戴！」"
translation = "「그러니까, 회장! 나는 나이에 걸맞을 뿐이고, 빈유인 건 아니니까, 그 점 착각하지 말아 줘!」"

[[dialogue]]
speaker = "unk"
original = "なにも言ってないけど！？"
translation = "아무 말도 안 했는데!?"

[[dialogue]]
speaker = "蘭美"
original = "「だから、もちろん私も行くわよ！\u3000ええ！\u3000私の胸も絶賛最速で成長中だもの！」"
translation = "「그러니까, 물론 나도 갈 거야! 응! 내 가슴도 극찬 가장 빠르게 성장 중이니까!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「決まりね！\u3000そしたら、今度の休日は、私たち４人で大人なブラを買いに行くわよ！」"
translation = "「결정됐네! 그럼, 다음 휴일은, 우리 넷이서 어른스러운 브라를 사러 가는 거야!」"

[[dialogue]]
speaker = "せつな"
original = "「お～！\u3000でござる♪」"
translation = "「오~! 이옵니다♪」"

[[dialogue]]
speaker = "unk"
original = "――って、４人って言った今！？"
translation = "――랄까, 넷이라고 지금 말했어!?"

[[dialogue]]
speaker = "unk"
original = "行ってらっしゃ～い"
translation = "잘 다녀와~"

[[dialogue]]
speaker = "unk"
original = "日曜日――"
translation = "일요일――"

[[dialogue]]
speaker = "ヴィーナス"
original = "「さすが東京。潤沢なラインナップで、全員大人なブラを買うことができたわね！」"
translation = "「역시 도쿄. 풍부한 라인업으로, 모두 어른스러운 브라를 살 수 있었네!」"

[[dialogue]]
speaker = "蘭美"
original = "「ええ、私も買えたわ。それはいいんだけど――」"
translation = "「네, 저도 샀어요. 그건 좋은데――」"

[[dialogue]]
speaker = "蘭美"
original = "「会長がこの中で１番大きい、Ｉカップのブラを買っているのはどういうことなの！？」"
translation = "「회장이 이 중에서 가장 큰, I컵 브라를 사고 있는 건 대체 무슨 일이야!?」"

[[dialogue]]
speaker = "unk"
original = "最近、俺も前のじゃサイズが合わなくなって"
translation = "최근, 나도 이전 것은 사이즈가 안 맞아서"

[[dialogue]]
speaker = "蘭美"
original = "「前のってなに！？\u3000男の胸筋がってこと！？」"
translation = "「이전 거라니 뭐야!? 남자의 가슴 근육 말이야!?」"

[[dialogue]]
speaker = "せつな"
original = "「主様は、アニマ先輩の研究している薬の副作用で、時折女体化することがあるのでござる！」"
translation = "「주인님은, 아니마 선배가 연구하고 있는 약의 부작용으로, 때때로 여체화하는 일이 있사옵니다!」"

[[dialogue]]
speaker = "蘭美"
original = "「はぁ！？\u3000女体化！？\u3000なにを言って――」"
translation = "「하아!? 여체화!? 무슨 말을――」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「実際に見せた方が早いわ！\u3000クロト、アニマ先輩からいざという時の為に貰っている、星力倍増薬マーク２の出番よ！」"
translation = "「실제로 보여주는 게 빠르겠네! 쿠로토, 아니마 선배에게 만약을 위해 받아 둔, 성력 배증약 마크 2의 차례야!」"

[[dialogue]]
speaker = "unk"
original = "そうして、アニマ先輩の薬を飲んで、変身してから戻ってくると――"
translation = "그렇게, 아니마 선배의 약을 마시고, 변신했다가 돌아오자――"

[[dialogue]]
speaker = "ヴィーナス"
original = "「見なさい！\u3000これが……脅威のＩカップ、バスト９９センチのスーパークロトよ！」"
translation = "「보렴! 이것이…… 경이로운 I컵, 가슴 99센티미터의 슈퍼 쿠로토야!」"

[[dialogue]]
speaker = "蘭美"
original = "「な……！」"
translation = "「뭐……!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あ、でも、ブラが合わなくなったってことは、更に大きくなったってことよね。１００の大台に乗ったかもしれないわ、多分！」"
translation = "「아, 근데, 브라가 안 맞게 되었다는 건, 더욱 커졌다는 거네. 100이라는 큰 단위에 올랐을지도 몰라, 아마!」"

[[dialogue]]
speaker = "蘭美"
original = "「っ……か、会長の――」"
translation = "「윽…… 배, 회장의――」"

[[dialogue]]
speaker = "蘭美"
original = "「裏切り者おぉぉぉ～～～～～～～～～っ！！！」"
translation = "「배신자아아아아아아아아아아아앗!!!」"

[[dialogue]]
speaker = "unk"
original = "そんなわけで、天才なのに胸が小さいのがコンプレックスな蘭美なのだった――"
translation = "그런 이유로, 천재인데 가슴이 작은 것이 콤플렉스인 라비였던 것이었다――"

