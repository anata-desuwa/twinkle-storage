[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「肉ですね！」"
translation = "「고기예요!」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「魚だよ！」"
translation = "「생선이야!」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「肉！」"
translation = "「고기!」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「魚！」"
translation = "「생선!」"

[[dialogue]]
speaker = "unk"
original = "ランチを巡って壮絶な争いが勃発していた。"
translation = "런치를 둘러싸고 처절한 다툼이 발발했다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「あ～、２人ともケンカはやめるんだ！\u3000仲良くしろ！」"
translation = "「아~ 둘 다 싸움은 그만둬! 사이좋게 지내라고!」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「いえいえ、ここはどうしても譲れません。これほど様々な技術が発展した世界なら、きっと肉料理も発展しているはずです！」"
translation = "「아뇨 아뇨, 여기만큼은 절대 양보 못 해요. 이토록 다양한 기술이 발전한 세계라면, 분명 고기 요리도 발전했을 게 분명해요!」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「世界が違うってことは海も違うんでしょ？\u3000なら魚も違うはずだよ！\u3000漁師の娘として、ここは引けない！」"
translation = "「세계가 다르다는 건 바다도 다르다는 거잖아? 그럼 생선도 다를 게 분명해! 어부의 딸로서 여긴 물러설 수 없어!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ええと、美味しいお肉も魚も、両方食べられる店がありますから、そこにしましょう？」"
translation = "「저기, 맛있는 고기도 생선도 둘 다 먹을 수 있는 가게가 있으니까 거기로 할까요?」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「えっ、両方食べられるお店があるの！？」"
translation = "「엣, 둘 다 먹을 수 있는 가게가 있어!?」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「おやおや、そんなお店があるなら早く言ってください」"
translation = "「어라어라, 그런 가게가 있다면 진작 말씀해 주시지 그랬어요.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「美味くて有名なお店だからな、２人とも期待しててくれよ！」"
translation = "「맛있기로 유명한 가게니까 둘 다 기대하라고!」"

[[dialogue]]
speaker = "unk"
original = "俺たちが店に向かって歩き出そうとした、その瞬間だった。"
translation = "우리가 가게를 향해 걸어가려던 바로 그 순간이었다."

[[dialogue]]
speaker_original = "クマロボ"
speaker_translation = "곰 로봇"
original = "「クマァーーーーーーーーーー！！！！！！」"
translation = "「쿠마아아아아아아아아아아!!!!!!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「なっ！？\u3000また……！」"
translation = "「앗!? 또……!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「現れやがったな、こいつらがクマロボか！\u3000ちょうどいい、この戦闘服の強さを試してやるぜ！」"
translation = "「나타났구나, 이 녀석들이 곰 로봇인가! 마침 잘됐어, 이 전투복의 위력을 시험해 주지!」"

[[dialogue]]
speaker_original = "クマロボ"
speaker_translation = "곰 로봇"
original = "「クマァーーーーーーーーーー！！！！！！」"
translation = "「쿠마아아아아아아아아아아!!!!!!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ブレイブヒート！」"
translation = "「브레이브 히트!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「私たちも行くわよ！」"
translation = "「우리도 가자!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はいっ！」"
translation = "「네!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ヒューペリオンイレイザー！」"
translation = "「히페리온 이레이저!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「シャイニングゴッデスビーーームッ！」"
translation = "「샤이닝 가디스 비이이임!」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "（特鉄隊として戦闘訓練は受けているけど、今のあたしに、フィオナみたいな力はない……）"
translation = "(특철대로서 전투 훈련은 받았지만, 지금의 나에겐 피오나 같은 힘은 없어……)"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "（あたしは見ていることしか出来ないのかな？）"
translation = "(나는 지켜보는 것밖에 할 수 없는 걸까?)"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "（……ううん、そんなことない。何か出来ることはあるはずだよ）"
translation = "(……아니, 그렇지 않아. 뭔가 할 수 있는 일이 있을 거야.)"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "（考えよう。こんな時、どうすればいいか。車掌さんなら何て言ってくれるか……）"
translation = "(생각하자. 이럴 때 어떻게 하면 좋을지. 차장님이라면 뭐라고 말씀해 주실지……)"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "（やれやれ、これから美味しいご飯というところで、完全に水を差されてしまいました）"
translation = "(이런이런, 이제 막 맛있는 식사를 하려던 참인데 완전히 찬물을 끼얹는군요.)"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "（藝術魔法も今は使えないようですし、ここはヴィーナスたちに任せるしかありませんね）"
translation = "(예술 마법도 지금은 쓸 수 없는 것 같고, 여긴 비너스 일행에게 맡길 수밖에 없겠네요.)"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "（──ですが、まあ……あの人たちには何だかんだ世話を焼いてもらってますし、任せっぱなしというのも如何なものでしょう？）"
translation = "(──하지만 뭐…… 저 사람들에게 이런저런 도움을 받고 있기도 하고, 마냥 맡겨두기만 하는 것도 좀 그렇겠죠?)"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「仕方ありませんね。少しは私の華麗な活躍を見せてあげるとしましょう──」"
translation = "「어쩔 수 없네요. 조금은 저의 화려한 활약을 보여주도록 하죠──」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「ふふん、上出来です。この剣と楯でぶっ飛ばしてあげましょう！」"
translation = "「후훈, 아주 잘 됐어요. 이 검과 방패로 날려버려 주겠어요!」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「えっ！？\u3000アルテが……変身……？\u3000変身できたの！？」"
translation = "「엣!? 아르테가…… 변신……? 변신할 수 있었어!?」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「私も驚いていますが、まあ、天才ですから当然ですね」"
translation = "「저도 놀랐습니다만, 뭐, 천재니까 당연한 결과네요.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「違う世界に来たことで、力の引き出し方が分からなくなっていましたが、ようやく掴めてきましたね」"
translation = "「다른 세계에 오면서 힘을 끌어내는 법을 몰랐었는데, 이제야 감을 잡았어요.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「プトラもやってみてはどうですか？\u3000もしかしたら出来るかもしれませんよ」"
translation = "「푸트라도 해보는 게 어때요? 어쩌면 가능할지도 몰라요.」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「あたしも？\u3000え、えっと……変身……変身ーっ……んんん……！！」"
translation = "「나도? 에, 에또…… 변신…… 변신~! ……으으으으!!」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「ええっ！？\u3000ほんとにあたしも変身出来ちゃった！」"
translation = "「에엣!? 정말로 나도 변신해 버렸어!」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「どうやらあなたも掴んだようですね」"
translation = "「아무래도 당신도 감을 잡은 모양이네요.」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「ぜ、全然掴んでないよ！\u3000ただ、フィオナたちの力になりたいって考えたら、あたしにも変身出来ちゃって……」"
translation = "「저, 전혀 감 못 잡았어! 그냥 피오나 일행에게 힘이 되고 싶다고 생각했더니 나도 변신이 돼서……」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「だったら、そういうことなんじゃありませんか？」"
translation = "「그렇다면 바로 그런 거 아니겠어요?」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「えっ？」"
translation = "「엣?」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「あ……うん、そうかも……しれない！」"
translation = "「아…… 응, 그럴지도…… 몰라!」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「で、どうするんです？\u3000せっかく変身したのですから、みなさんに加勢しにいくのでしょう？」"
translation = "「자, 그럼 어떻게 할 거죠? 기껏 변신했으니 다들 도우러 가야겠죠?」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「もちろんだよ！」"
translation = "「당연하지!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「２人とも、どうしたのその格好！？」"
translation = "「둘 다 그 모습은 뭐야!?」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「みんなの力になりたいって気持ちがあたしたちを変身させたんだよ！」"
translation = "「모두에게 힘이 되고 싶다는 마음이 우리를 변신시켰어!」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「いえ、私は違いますが……。ともかく、私の活躍が見られることを光栄に思ってください感謝してください」"
translation = "「아뇨, 저는 아닙니다만……. 어쨌든 저의 활약을 볼 수 있다는 걸 영광으로 알고 감사하세요.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そこはそういうことにしときなさいよ……」"
translation = "「거기는 그냥 그렇다고 해두라고……」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「おお、こういう熱い展開、待ってたぜ！\u3000一緒にこいつらぶちのめすぞ！」"
translation = "「오오, 이런 뜨거운 전개, 기다렸다고! 같이 이 녀석들을 두들겨 패주자!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ありがとうございます。２人とも、お願いします！」"
translation = "「고맙습니다. 두 분 다 부탁드려요!」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「任せて！\u3000それじゃ行くよ、アルテっ！」"
translation = "「맡겨줘! 자, 간다 아르테!」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「ええ、手短に済ませましょう。食事が待ってますから！」"
translation = "「네, 짧게 끝내죠. 식사가 기다리고 있으니까요!」"

