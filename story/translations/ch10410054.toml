[[dialogue]]
speaker = "unk"
original = "第４話,続・猫ちゃんスキンシップ,P"
translation = "제4화, 속·고양이 스킨십, P"

[[dialogue]]
speaker = "unk"
original = "その日は休日で、マインが俺の家に遊びにやって来ていた。"
translation = "그날은 휴일이었고, 마인이 우리 집에 놀러 와 있었다."

[[dialogue]]
speaker_original = "ネーゼマイン（覚醒）"
speaker_translation = "네제마인 (각성)"
original = "「会長～、前に『約束』したの忘れてないよね～？」"
translation = "「회장~ 전에 『약속』했던 거 잊지 않았지~?」"

[[dialogue]]
speaker = "unk"
original = "ああ、もちろん覚えてるよ"
translation = "아아, 물론 기억하고 있어"

[[dialogue]]
speaker = "unk"
original = "<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>との最終決戦にあたり、マインには魔界各国との交渉でできる限り多くの戦力を集めてもらうようにお願いした。"
translation = ""

[[dialogue]]
speaker = "unk"
original = "そして、彼女は見事それをやり遂げて、更には自身もノヴァフォームに覚醒。戦況に大きく貢献してみせたのだった。"
translation = "그리고 그녀는 훌륭하게 그것을 완수했고, 나아가 자신도 노바 폼으로 각성. 전황에 크게 공헌해 보였다."

[[dialogue]]
speaker_original = "ネーゼマイン（覚醒）"
speaker_translation = "네제마인 (각성)"
original = "「じゃあ約束通り――今日は会長が『なんでもしてくれる日』ってことでいいよね～？」"
translation = "「그럼 약속대로―― 오늘은 회장이 『뭐든지 해주는 날』이라는 걸로 괜찮지~?」"

[[dialogue]]
speaker = "unk"
original = "できれば、お手柔らかにお願いします……"
translation = "가능하면 살살 부탁합니다……"

[[dialogue]]
speaker_original = "ネーゼマイン（覚醒）"
speaker_translation = "네제마인 (각성)"
original = "「大丈夫、大丈夫～♪\u3000ストレス解消を兼ねて、ノヴァフォームの絆を深める為の訓練をするだけだから♪」"
translation = "「괜찮아, 괜찮아~♪ 스트레스 해소를 겸해서 노바 폼의 유대를 깊게 하기 위한 훈련을 하는 것뿐이니까♪」"

[[dialogue]]
speaker_original = "ネーゼマイン（覚醒）"
speaker_translation = "네제마인 (각성)"
original = "「というわけで――はい♪\u3000アニマ先輩特製の『獣人化薬』～♪」"
translation = "「그런 의미에서―― 자♪ 아니마 선배 특제 『수인화 약』~♪」"

[[dialogue]]
speaker = "unk"
original = "え！？\u3000まさかまた、猫の姿に……！？"
translation = "에!? 설마 또 고양이 모습으로……!?"

[[dialogue]]
speaker_original = "ネーゼマイン（覚醒）"
speaker_translation = "네제마인 (각성)"
original = "「にひひ♪\u3000この前とはちょ～っと違うんだよね～」"
translation = "「니히히♪ 저번이랑은 조~금 다르거든~」"

[[dialogue]]
speaker = "unk"
original = "そうして、俺はマインの頼みを聞いて、再び『獣人化薬』を試すことになったのだが……。"
translation = "그렇게 나는 마인의 부탁을 들어 다시 한 번 『수인화 약』을 시험하게 되었는데……."

[[dialogue]]
speaker_original = "ネーゼマイン（覚醒）"
speaker_translation = "네제마인 (각성)"
original = "「おぉ～！\u3000会長、黒い猫ちゃんの耳と尻尾が生えた～♪」"
translation = "「오오~! 회장, 검은 고양이 귀랑 꼬리가 돋아났어~♪」"

[[dialogue]]
speaker = "unk"
original = "どうやら今回の薬は、前回の実験結果を踏まえてアニマ先輩が再調整したものらしく、今度こそ『猫系獣人の魔族』の姿へと変身を果たしていた。"
translation = "아무래도 이번 약은 지난 실험 결과를 바탕으로 아니마 선배가 재조정한 모양인지, 이번에야말로 『고양이계 수인 마족』의 모습으로 변신해 있었다."

[[dialogue]]
speaker_original = "ネーゼマイン（覚醒）"
speaker_translation = "네제마인 (각성)"
original = "「にひひ♪\u3000それじゃあ――猫ちゃん会長とのイチャイチャを始めちゃおっか<emoji=heart04>」"
translation = "「니히히♪ 그럼―― 고양이 회장이랑 꽁냥거리기를 시작해 볼까<emoji=heart04>」"

[[dialogue]]
speaker_original = "ネーゼマイン（覚醒）"
speaker_translation = "네제마인 (각성)"
original = "「この前触れられなかったところを試しちゃうよ～？\u3000えいっ<emoji=heart04>」"
translation = "「저번에 못 만졌던 곳을 시험해 볼게~? 에잇<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "にゃんっ！？\u3000し、尻尾……！"
translation = "냥!? 꼬, 꼬리……!"

[[dialogue]]
speaker_original = "ネーゼマイン（覚醒）"
speaker_translation = "네제마인 (각성)"
original = "「きゃははっ♪\u3000猫ちゃんみたいな可愛い声が出たね～<emoji=heart04>」"
translation = "「꺄하핫♪ 고양이 같은 귀여운 목소리가 나왔네~<emoji=heart04>」"

[[dialogue]]
speaker_original = "ネーゼマイン（覚醒）"
speaker_translation = "네제마인 (각성)"
original = "「――なんか咄嗟に鳴き声みたいに出ちゃう？\u3000そうなんだ～♪\u3000確かに、『せつな』とかも驚いたりすると、そういうふうに言ったりするもんね～」"
translation = "「――왠지 엉겁결에 울음소리처럼 나와버려? 그렇구나~♪ 확실히 『세츠나』 같은 애들도 놀라면 그렇게 말하곤 하니까~」"

[[dialogue]]
speaker_original = "ネーゼマイン（覚醒）"
speaker_translation = "네제마인 (각성)"
original = "「猫ちゃんって、尻尾は神経が集まってる敏感な部分だって聞くけど……どう？」"
translation = "「고양이는 꼬리에 신경이 집중된 민감한 부분이라고 들었는데…… 어때?」"

[[dialogue]]
speaker_original = "ネーゼマイン（覚醒）"
speaker_translation = "네제마인 (각성)"
original = "「――へぇ～、敏感で、触られると結構くるんだ？\u3000にひひ♪\u3000じゃあ、優しく撫でてあげるね～<emoji=heart04>\u3000すりすり～♪」"
translation = "「――헤에~ 민감해서 만져지면 꽤 자극이 오는구나? 니히히♪ 그럼 살살 쓰다듬어 줄게~<emoji=heart04> 부비부비~♪」"

[[dialogue]]
speaker_original = "ネーゼマイン（覚醒）"
speaker_translation = "네제마인 (각성)"
original = "「あとはここも触ってなかったよね～……猫耳<emoji=heart04>」"
translation = "「그리고 여기도 안 만졌었지~…… 고양이 귀<emoji=heart04>」"

[[dialogue]]
speaker_original = "ネーゼマイン（覚醒）"
speaker_translation = "네제마인 (각성)"
original = "「ほ～ら、裏からゆっくり……なでなで<emoji=heart04>」"
translation = "「자아, 뒤쪽부터 천천히…… 쓰담쓰담<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "に、人間の耳より、敏感かも……"
translation = "이, 인간 귀보다 민감할지도……"

[[dialogue]]
speaker_original = "ネーゼマイン（覚醒）"
speaker_translation = "네제마인 (각성)"
original = "「あっ、ピコピコしてる～♪\u3000ん～<emoji=heart04>\u3000これはちょっとヤバいな～」"
translation = "「앗, 쫑긋거리고 있어~♪ 음~<emoji=heart04> 이건 좀 위험한데~」"

[[dialogue]]
speaker_original = "ネーゼマイン（覚醒）"
speaker_translation = "네제마인 (각성)"
original = "「私、昔から動物にはあんまり好かれなくてさ～。触ろうとすると、警戒されて逃げられちゃうんだよね～」"
translation = "「나, 옛날부터 동물들한테는 별로 인기가 없었거든~. 만지려고 하면 경계해서 도망가 버리고 말이야~」"

[[dialogue]]
speaker_original = "ネーゼマイン（覚醒）"
speaker_translation = "네제마인 (각성)"
original = "「だから、じっくり触るのは、会長が変身した猫ちゃんが初めてだったんだけど～……はあぁ<emoji=heart04>」"
translation = "「그래서 제대로 만져보는 건 회장이 변신한 고양이가 처음이었는데~…… 하아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "ネーゼマイン（覚醒）"
speaker_translation = "네제마인 (각성)"
original = "「こうしてると、可愛いくて思わず、抱きしめたくなっちゃう♪\u3000――ぎゅ～っ<emoji=heart04>」"
translation = "「이러고 있으니까 귀여워서 나도 모르게 꼬옥 안아주고 싶어져♪ ――꾸욱~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マインが俺に抱き着いてくる。"
translation = "마인이 나에게 매달려 온다."

[[dialogue]]
speaker_original = "ネーゼマイン（覚醒）"
speaker_translation = "네제마인 (각성)"
original = "「からの～、猫吸いならぬ『彼氏吸い』～♪\u3000――すぅ～、はぁ～<emoji=heart04>」"
translation = "「그리고~ 고양이 흡입이 아닌 『남친 흡입』~♪ ――스으~읍, 하아~아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ちょっ……そんな思いっきり嗅ぐのは……！"
translation = "잠깐…… 그렇게 대놓고 냄새를 맡는 건……!"

[[dialogue]]
speaker_original = "ネーゼマイン（覚醒）"
speaker_translation = "네제마인 (각성)"
original = "「んふぅ～<emoji=heart04>\u3000大丈夫♪\u3000会長の匂い、もうすっかり好きになっちゃってるから<emoji=heart04>」"
translation = "「음후으~<emoji=heart04> 괜찮아♪ 회장 냄새, 이미 완전히 좋아하게 됐으니까<emoji=heart04>」"

[[dialogue]]
speaker_original = "ネーゼマイン（覚醒）"
speaker_translation = "네제마인 (각성)"
original = "「あと気になってるのは～、ここがどう感じるのかかな？\u3000――トントン♪」"
translation = "「그리고 궁금한 건~ 여기가 어떻게 느끼는지일까? ――톡톡♪」"

[[dialogue]]
speaker = "unk"
original = "にゃあぁっ！？♥♥\u3000そ、そこは～……！"
translation = "냐아아앗!?♥♥ 거, 거기는~……!"

[[dialogue]]
speaker_original = "ネーゼマイン（覚醒）"
speaker_translation = "네제마인 (각성)"
original = "「あっ♪\u3000やっぱり猫ちゃんの時と同じように感じるんだ～？\u3000――お尻トントン<emoji=heart04>」"
translation = "「앗♪ 역시 고양이 때랑 똑같이 느끼는구나~? ――엉덩이 톡톡<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "抱っこしている子供の背中を優しくポンポンするように、マインは尻尾の付け根の上辺りをトントンと優しく叩いてくる。"
translation = "안고 있는 아이의 등을 상냥하게 토닥여주듯, 마인은 꼬리 시작 부분 위쪽을 톡톡 상냥하게 두드려 온다."

[[dialogue]]
speaker_original = "ネーゼマイン（覚醒）"
speaker_translation = "네제마인 (각성)"
original = "「ん～？\u3000――気持ち良すぎて、変な気分になっちゃう～？\u3000ふぅ～ん、なるほどね～♪」"
translation = "「음~? ――너무 기분 좋아서 이상한 기분이 돼버려~? 후으음, 그렇구나~♪」"

[[dialogue]]
speaker_original = "ネーゼマイン（覚醒）"
speaker_translation = "네제마인 (각성)"
original = "「じゃあ……そんな気分にしちゃった責任を取らないとね<emoji=heart04>」"
translation = "「그럼…… 그런 기분으로 만든 책임을 져야겠네<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言うと、マインはそっと顔を近づけてきて。"
translation = "그렇게 말하며 마인은 살며시 얼굴을 가까이 대고."

[[dialogue]]
speaker_original = "ネーゼマイン（覚醒）"
speaker_translation = "네제마인 (각성)"
original = "「会長……<emoji=heart04>\u3000ん～っ、ちゅっ……<emoji=heart04>」"
translation = "「회장……<emoji=heart04> 음~, 쪽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "唇を触れ合わせて、キスを交わす。"
translation = "입술을 맞대고 키스를 나눈다."

[[dialogue]]
speaker_original = "ネーゼマイン（覚醒）"
speaker_translation = "네제마인 (각성)"
original = "「――はあぁ～……にひひ<emoji=heart04>\u3000どう？\u3000少しは落ち着いた？」"
translation = "「――하아아~…… 니히히<emoji=heart04> 어때? 조금은 진정됐어?」"

[[dialogue]]
speaker = "unk"
original = "いや……まだ……"
translation = "아니…… 아직……"

[[dialogue]]
speaker_original = "ネーゼマイン（覚醒）"
speaker_translation = "네제마인 (각성)"
original = "「そっか～。じゃあ――どうして欲しいか、ちゃんと言って<emoji=heart04>」"
translation = "「그렇구나~. 그럼―― 어떻게 해주길 바라는지 제대로 말해줘<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "もっと……マインとキスがしたい"
translation = "더…… 마인이랑 키스하고 싶어"

[[dialogue]]
speaker_original = "ネーゼマイン（覚醒）"
speaker_translation = "네제마인 (각성)"
original = "「……にひひ<emoji=heart04>」"
translation = "「……니히히<emoji=heart04>」"

[[dialogue]]
speaker_original = "ネーゼマイン（覚醒）"
speaker_translation = "네제마인 (각성)"
original = "「じゃあ、お尻トントンも……もっとしちゃう？」"
translation = "「그럼 엉덩이 톡톡도…… 더 해줄까?」"

[[dialogue]]
speaker_original = "ネーゼマイン（覚醒）"
speaker_translation = "네제마인 (각성)"
original = "「ん～っ……ちゅっ<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「음~…… 쪽<emoji=heart04> 쪽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それからも、俺は猫のように、マインからたっぷりと可愛がられてしまうのだった。"
translation = "그 뒤로도 나는 고양이처럼 마인에게 듬뿍 귀여움을 받고 말았다."

