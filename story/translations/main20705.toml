[[dialogue]]
speaker = "unk"
original = "第５話,もう１人の使徒,B"
translation = "제5화, 또 한 명의 사도, B"

[[dialogue]]
speaker = "unk"
original = "ディザスターハンドの件で中断したが、アルタイル側からの情報共有は続く。"
translation = "디재스터 핸드 건으로 중단되었지만, 알타이르 측의 정보 공유는 계속된다."

[[dialogue]]
speaker = "梨緒"
original = "「他にも共有しておきたい情報がある。アルタイルに現れた新たなリクリエの使徒──ジグについてだ」"
translation = "「그 외에도 공유해두고 싶은 정보가 있다. 알타이르에 나타난 새로운 리크리에의 사도── 지그에 대해서다」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「あたしの他にもアルタイルに使徒がいたのか？」"
translation = "「나 말고도 알타이르에 사도가 있었나?」"

[[dialogue]]
speaker = "梨緒"
original = "「ああ。彼女はレナーテ・<ruby>Ｚ<rt>ジグ</rt></ruby>・サイフリート」"
translation = "「아아. 그녀는 레나테 <ruby>Z<rt>지그</rt></ruby> 자이프리트」"

[[dialogue]]
speaker = "梨緒"
original = "「ジグは、ベガの新星学園で星徒会長をしていた。ベガの君にも匹敵する実力者で、私もあいつには何度も敗れた」"
translation = "「지그는 베가의 신성학원에서 성도회장을 맡고 있었다. 베가의 너에게도 필적하는 실력자로, 나도 그 녀석에게 몇 번이나 패했지」"

[[dialogue]]
speaker = "梨緒"
original = "「同じ星徒会で共に戦った者として、私はジグに勝ち、あいつをリクリエの使徒から解放したいと思っている」"
translation = "「같은 성도회에서 함께 싸웠던 자로서, 나는 지그에게 이겨서 그 녀석을 리크리에의 사도에게서 해방하고 싶다」"

[[dialogue]]
speaker = "ラクシャ"
original = "「ジグとはセイファートと行動してる時に一度接触したことあるけど、よくわかんないやつだったな」"
translation = "「지그와는 세이퍼트와 행동할 때 한 번 접촉한 적이 있는데, 잘 모르겠는 녀석이었지」"

[[dialogue]]
speaker = "梨緒"
original = "「ジグを知っていたのか！？\u3000ならどうして言わなかった？」"
translation = "「지그를 알고 있었나!? 그럼 왜 말하지 않았지?」"

[[dialogue]]
speaker = "ラクシャ"
original = "「いやキミの知り合いとか知らなかったし。ボクもあいつについては全然情報がないから、言ったら余計混乱させると思ったんだよ」"
translation = "「아니, 네 지인인 줄은 몰랐고. 나도 그 녀석에 대해서는 전혀 정보가 없어서 말하면 괜히 혼란만 줄 것 같았거든」"

[[dialogue]]
speaker = "ラクシャ"
original = "「だけどアルタイルではあまり動きを見せてなかったし、デネブの方で何かやってたのかも」"
translation = "「하지만 알타이르에서는 별다른 움직임을 보이지 않았고, 데네브 쪽에서 무언가 하고 있었을지도 몰라」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「ふむ……あたしはデネブで遭遇したことはないが、どこかで暗躍していたのかもしれないな」"
translation = "「흠…… 나는 데네브에서 조우한 적은 없지만, 어딘가에서 암약하고 있었을지도 모르겠군」"

[[dialogue]]
speaker = "unk"
original = "リクリエの使徒は平行世界を超えて現れる。"
translation = "리크리에의 사도는 평행세계를 넘어 나타난다."

[[dialogue]]
speaker = "unk"
original = "ならベガの使徒が、デネブに現れても不思議ではない。"
translation = "그렇다면 베가의 사도가 데네브에 나타나도 이상할 건 없다."

[[dialogue]]
speaker = "クロト"
original = "「そしてジグは自身を“真なる神”の騎士と呼んでいた。何か心当たりはないか？」"
translation = "「그리고 지그는 자신을 “진정한 신”의 기사라 부르고 있었다. 혹시 짚이는 건 없나?」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「“真なる神”……？\u3000いいや、あたしもリクリエの使徒だったが、聞いたことがないな」"
translation = "「“진정한 신”……? 아니, 나도 리크리에의 사도였지만 들어본 적 없군」"

[[dialogue]]
speaker = "unk"
original = "アルタイルのアポロと同じく、“真なる神”についてはわからないらしい。"
translation = "알타이르의 아폴로와 마찬가지로 “진정한 신”에 대해서는 모르는 모양이다."

[[dialogue]]
speaker = "unk"
original = "使徒は思考にリクリエの影響を受けるといっても、アポロとジグでは影響の及ぼし方がやはり違うようだ。"
translation = "사도는 사고에 리크리에의 영향을 받는다고 해도, 아폴로와 지그는 영향이 미치는 방식이 역시 다른 듯하다."

[[dialogue]]
speaker = "クロト"
original = "「俺たちは、その“真なる神”が、かつてバジュラ教団が信仰していたチャカパラ神と関係があるんじゃないかと思ってる」"
translation = "「우리는 그 “진정한 신”이 과거 바주라 교단이 신봉했던 차카파라 신과 관계가 있는 게 아닐까 생각하고 있어」"

[[dialogue]]
speaker = "リノ"
original = "「チャカパラ神……確か魔王ラクシスと対立していたのよね。魔王ラクシスがリクリエを止めた時だから、もう３０００年以上も前のことだわ」"
translation = "「차카파라 신…… 분명 마왕 락시스와 대립하고 있었지. 마왕 락시스가 리크리에를 멈췄을 때니까 벌써 3000년도 더 전의 일이야」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、だけどバジュラ教団と同じような信仰は、いろんな時代や地域にあったらしい」"
translation = "「아아, 하지만 바주라 교단과 비슷한 신앙은 여러 시대나 지역에 있었던 모양이야」"

[[dialogue]]
speaker = "クロト"
original = "「チャカパラ神は名前を変えて、常に世界に存在し続けているのかもしれない」"
translation = "「차카파라 신은 이름을 바꾸어 항상 세계에 계속 존재하고 있는지도 몰라」"

[[dialogue]]
speaker = "クロト"
original = "「アルタイルでもネビュラにあたってみたんだけど、関連する資料が散逸してるらしいんだ。だからデネブに資料があればと思ったんだけど……」"
translation = "「알타이르에서도 네뷸라에 문의해 봤지만 관련 자료가 산일된 모양이야. 그래서 데네브에 자료가 있다면 좋겠다고 생각했는데……」"

[[dialogue]]
speaker = "リノ"
original = "「……もしかしたらネビュラ基地から持ち出した資料にあるかもしれないわ。探してみるわね」"
translation = "「……어쩌면 네뷸라 기지에서 가지고 나온 자료 중에 있을지도 모르겠구나. 찾아보마」"

[[dialogue]]
speaker = "クロト"
original = "「本当に？\u3000お願いするよ」"
translation = "「정말인가요? 부탁드릴게요」"

[[dialogue]]
speaker = "unk"
original = "デネブではネビュラが活動していないから期待はできないかと思ったが、もし資料があるならありがたい。"
translation = "데네브에서는 네뷸라가 활동하지 않기에 기대하기 힘들 거라 생각했지만, 만약 자료가 있다면 고마운 일이다."

[[dialogue]]
speaker = "ナターシャ"
original = "「情報共有はだいたい済んだかな」"
translation = "「정보 공유는 대충 끝난 것 같네」"

[[dialogue]]
speaker = "ナターシャ"
original = "「それじゃ……ベアトのことについて話してもらっていい、委員長？」"
translation = "「그럼…… 베아트에 대해서 이야기해 줄 수 있어, 위원장?」"

[[dialogue]]
speaker = "梨緒"
original = "「……ああ」"
translation = "「……아아」"

[[dialogue]]
speaker = "梨緒"
original = "「レジスタンスの２人に説明しておくと、私は緋宮クロトを監視するために、新星学園に選挙管理委員会を作った。アルタイルのアポロも選挙管理委員会に入っている」"
translation = "「레지스탕스 두 분께 설명하자면, 나는 히노미야 쿠로토를 감시하기 위해 신성학원에 선거관리위원회를 만들었다. 알타이르의 아폴로도 선거관리위원회에 들어와 있지」"

[[dialogue]]
speaker = "梨緒"
original = "「その選挙管理委員会に、ベアトリスという生徒がいた。魔界からの留学生……ということになっていた」"
translation = "「그 선거관리위원회에 베아트리스라는 학생이 있었다. 마계에서 온 유학생……으로 되어 있었지」"

[[dialogue]]
speaker = "梨緒"
original = "「だが彼女は、実はデネブからやってきた、極星学園の生徒だった」"
translation = "「하지만 그녀는 사실 데네브에서 건너온 극성학원의 학생이었다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ベアトリスが極星の……！？\u3000どういうこと……！？」"
translation = "「베아트리스가 극성의……!? 그게 무슨 소리야……!?」"

[[dialogue]]
speaker = "梨緒"
original = "「詳しいことはわからない。だがチナはベアトのことを『副会長』と呼び、ベアトはチナを助けた」"
translation = "「자세한 건 모른다. 하지만 치나는 베아트를 『부회장』이라 불렀고, 베아트는 치나를 도왔다」"

[[dialogue]]
speaker = "梨緒"
original = "「デネブで再会したベアトにそのことを聞くと、極星学園の星徒会副会長であることを認めた」"
translation = "「데네브에서 재회한 베아트에게 그 일을 묻자, 극성학원의 성도회 부회장임을 인정했다」"

[[dialogue]]
speaker = "ナターシャ"
original = "「へぇ、ただの生徒じゃなくて副会長だったんだ」"
translation = "「헤에, 그냥 학생이 아니라 부회장이었구나」"

[[dialogue]]
speaker = "梨緒"
original = "「どうして素性を隠して新星学園に入ったのか、私はベアトに聞こうとしたが……逃げられてしまった。ラクシャに見つかったのはその後だ」"
translation = "「어째서 정체를 숨기고 신성학원에 들어왔는지 베아트에게 물으려 했지만…… 도망쳐 버렸다. 락샤에게 발견된 건 그 이후다」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「ふむ。そのベアトリスについてもなんとかしないといけないか。もしスパイだとすれば、重要な情報を持っている可能性がある」"
translation = "「흠. 그 베아트리스에 대해서도 어떻게든 해야겠군. 만약 스파이라면 중요한 정보를 가지고 있을 가능성이 있어」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「情報を共有できたところで、これからどう動くか決めたいところだが──」"
translation = "「정보를 공유했으니 이제부터 어떻게 움직일지 정하고 싶지만──」"

[[dialogue]]
speaker = "梨緒"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「今日はさすがにいろいろありすぎた。もう遅いし、一晩休んでからまた話し合おう」"
translation = "「오늘은 아무래도 일이 너무 많았어. 이미 늦었으니 하룻밤 쉬고 나서 다시 이야기하자」"

[[dialogue]]
speaker = "リノ"
original = "「ええ、そうね。みんなには休息が必要だわ」"
translation = "「네, 그래요. 모두에게 휴식이 필요해요」"

[[dialogue]]
speaker = "リノ"
original = "「魔法で秘密基地を拡張して、みんなに個室を用意したわ。デネブに飛ばされて困惑しているだろうけど、今日はゆっくり休んでね」"
translation = "「마법으로 비밀기지를 확장해서 모두에게 개인실을 준비했단다. 데네브로 날려와서 당황스럽겠지만 오늘은 푹 쉬렴」"

[[dialogue]]
speaker = "フィオナ"
original = "「ありがとうございます。デネブでは行く宛てがなかったので、とても助かります」"
translation = "「감사합니다. 데네브에서는 갈 곳이 없었는데 정말 큰 도움이 되었어요」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ありがとう、おばあちゃん！\u3000さすが空間の魔女ね！」"
translation = "「고마워요, 할머니! 역시 공간의 마녀네요!」"

[[dialogue]]
speaker = "リノ"
original = "「ふふふ♪\u3000孫の笑顔を見るのは嬉しいものね～♪」"
translation = "「후후후♪ 손녀의 미소를 보는 건 기쁜 일이구나~♪」"

