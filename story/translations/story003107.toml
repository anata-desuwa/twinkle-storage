[[dialogue]]
speaker = "unk"
original = "全員に見守られる中で始まった、リーリアと獅子舞の羽根突き勝負。"
translation = "전원이 지켜보는 가운데 시작된 리리아와 사자탈의 하네츠키 승부."

[[dialogue]]
speaker = "unk"
original = "しかし、羽根が１度でも落ちれば決着というその勝負は、あっという間に結末を迎える。"
translation = "하지만 깃털이 한 번이라도 떨어지면 끝나는 그 승부는 순식간에 결말을 맞이한다."

[[dialogue]]
speaker = "獅子舞"
original = "「七彩流羽根突き術・弐ノ型『<ruby>橙<rt>だいだい</rt></ruby>』！」"
translation = "「칠채류 하네츠키술 제2형 『등』!」"

[[dialogue]]
speaker = "リーリア"
original = "「っ……！」"
translation = "「윽……!」"

[[dialogue]]
speaker = "unk"
original = "リーリアはその技を受け切れず、地面に羽根を落としてしまった。"
translation = "리리아는 그 기술을 다 받아내지 못하고 바닥에 깃털을 떨어뜨리고 말았다."

[[dialogue]]
speaker = "シズハ"
original = "「あぁっ……！\u3000リーリア先輩、技を出されるまでは返せていたのに！」"
translation = "「아앗……! 리리아 선배, 기술을 쓰기 전까지는 받아내고 있었는데!」"

[[dialogue]]
speaker = "獅子舞"
original = "「ふん……確かに、交流を深めながらも練習はちゃんとしていたようだな。しかし、それだけで勝てる程、吾輩は甘くない」"
translation = "「흥…… 확실히 교류를 나누면서도 연습은 제대로 하고 있었던 모양이군. 하지만 그것만으로 이길 수 있을 만큼 이 몸은 호락호락하지 않다」"

[[dialogue]]
speaker = "獅子舞"
original = "「渋谷リーリア、これでは到底、お前を認められんな！\u3000分かったら練習に戻って、出直して――」"
translation = "「시부야 리리아, 이래서는 도저히 너를 인정할 수 없겠군! 알았으면 연습으로 돌아가서 다시――」"

[[dialogue]]
speaker = "リーリア"
original = "「挑戦が１度だなんて、私がいつ言いました？」"
translation = "「도전이 한 번뿐이라고 제가 언제 그랬죠?」"

[[dialogue]]
speaker = "獅子舞"
original = "「……何？」"
translation = "「……뭐?」"

[[dialogue]]
speaker = "リーリア"
original = "「要するに、獅子舞さんに１回でも羽根を落とさせればいいんですよね？\u3000だったら――」"
translation = "「요컨대 사자탈 씨에게 한 번이라도 깃털을 떨어뜨리게 하면 되는 거죠? 그렇다면――」"

[[dialogue]]
speaker = "リーリア"
original = "「このまま勝つまで連戦し続けて、あなたに認めさせてみせます！」"
translation = "「이대로 이길 때까지 연전을 계속해서 당신에게 인정받고 말겠어요!」"

[[dialogue]]
speaker = "獅子舞"
original = "「ふん……そう来たか。だが、言うは易く行うは難し――やれるものならやってみるがいい！」"
translation = "「흥…… 그렇게 나오시겠다. 하지만 말은 쉽고 행동은 어려운 법―― 할 수 있다면 해보거라!」"

[[dialogue]]
speaker = "unk"
original = "それから、リーリアと獅子舞の羽根突きは繰り返し続いていた。"
translation = "그 후로 리리아와 사자탈의 하네츠키는 반복해서 이어졌다."

[[dialogue]]
speaker = "獅子舞"
original = "「七彩流羽根突き術・参ノ型『<ruby>黄色<rt>きいろ</rt></ruby>』！」"
translation = "「칠채류 하네츠키술 제3형 『황』!」"

[[dialogue]]
speaker = "リーリア"
original = "「っ……！\u3000はぁ……はぁ……！」"
translation = "「윽……! 하아…… 하아……!」"

[[dialogue]]
speaker = "unk"
original = "だが、それは同時に敗北が積み重なることも意味する。リーリアは地に羽根が転がる光景を、もはや数え切れぬほど目に焼き付けていた。"
translation = "하지만 그것은 동시에 패배가 쌓이는 것을 의미하기도 했다. 리리아는 바닥에 깃털이 구르는 광경을 이미 셀 수 없을 정도로 눈에 새기고 있었다."

[[dialogue]]
speaker = "サーシャ"
original = "「リーリアちゃん、大丈夫？\u3000一旦、休憩したっていいのよ？\u3000少し休んでから、また挑戦すれば――」"
translation = "「리리아짱, 괜찮아? 일단 휴식해도 된다구? 조금 쉬었다가 다시 도전하면――」"

[[dialogue]]
speaker = "リーリア"
original = "「サーシャさん、ありがとうございます。でも、大丈夫です。あとちょっとで、見えそうなんで……！」"
translation = "「사샤 씨, 감사합니다. 하지만 괜찮아요. 조금만 더 하면 보일 것 같거든요……!」"

[[dialogue]]
speaker = "サーシャ"
original = "「見える？」"
translation = "「보인다고?」"

[[dialogue]]
speaker = "リーリア"
original = "「はい。獅子舞さんに勝てるイメージが……！」"
translation = "「네. 사자탈 씨에게 이길 수 있는 이미지가……!」"

[[dialogue]]
speaker = "リーリア"
original = "「獅子舞さん、次の勝負です！\u3000はあぁっ！」"
translation = "「사자탈 씨, 다음 승부예요! 하아앗!」"

[[dialogue]]
speaker = "unk"
original = "地面に落ちた羽根を拾って、リーリアは再び獅子舞に向かって、魔法を乗せて打ち放つ。"
translation = "바닥에 떨어진 깃털을 줍고 리리아는 다시 사자탈을 향해 마법을 실어 쳐낸다."

[[dialogue]]
speaker = "獅子舞"
original = "「ふん……わかっているぞ。この連戦が最も効率のよい練習であり、そして、勝機のある策、ということであろう？」"
translation = "「흥…… 알고 있다. 이 연전이 가장 효율적인 연습이며 또한 승산이 있는 책략이라는 것이겠지?」"

[[dialogue]]
speaker = "アナ"
original = "（そう、リーリアさんにとっては獅子舞さんの技を見切る練習となり、連戦に連戦を続ければ、獅子舞さんだって集中力が切れてミスを起こす可能性が上がっていく――）"
translation = "（그래, 리리아 씨에겐 사자탈 씨의 기술을 간파하는 연습이 되고, 연전에 연전을 거듭하면 사자탈 씨도 집중력이 떨어져 실수를 일으킬 가능성이 올라가――）"

[[dialogue]]
speaker = "獅子舞"
original = "「だが、そんな下らないやり方での勝利など、吾輩は断じて認めん！」"
translation = "「하지만 그런 시시한 방식의 승리 따위 이 몸은 결코 인정 못 한다!」"

[[dialogue]]
speaker = "獅子舞"
original = "「七彩流羽根突き術・<ruby>肆<rt>よん</rt></ruby>ノ型『<ruby>緑<rt>みどり</rt></ruby>』！」"
translation = "「칠채류 하네츠키술 제4형 『녹』!」"

[[dialogue]]
speaker = "unk"
original = "容赦なく、獅子舞がこれまで何度も繰り返してきたのと同じように、一寸の狂いもなく技を放つ。"
translation = "가차 없이, 사자탈이 지금까지 몇 번이고 반복해 온 것과 똑같이 한 치의 오차도 없이 기술을 내지른다."

[[dialogue]]
speaker = "リーリア"
original = "「獅子舞さんの技、本当に綺麗ですよね……」"
translation = "「사자탈 씨 기술, 정말 예쁘네요……」"

[[dialogue]]
speaker = "unk"
original = "技の名前通り、羽根が緑色の光の軌跡を描きながら飛び、地面へと落ち行く。リーリアはそれを瞳に焼き付けるように、しっかりと見て。"
translation = "기술 이름대로 깃털이 녹색 빛의 궤적을 그리며 날아가 바닥으로 떨어진다. 리리아는 그것을 눈동자에 새기듯 똑똑히 지켜보고."

[[dialogue]]
speaker = "リーリア"
original = "「だから――その色、真似させてもらいます！」"
translation = "「그러니까―― 그 색, 흉내 내보도록 할게요!」"

[[dialogue]]
speaker = "リーリア"
original = "「<ruby>七彩<rt>しちさい</rt></ruby>流羽根突き術・壱ノ型『<ruby>赤<rt>あか</rt></ruby>』！」"
translation = "「칠채류 하네츠키술 제1형 『적』!」"

[[dialogue]]
speaker = "獅子舞"
original = "「何ぃ！？」"
translation = "「뭐라!?」"

[[dialogue]]
speaker = "unk"
original = "獅子舞がここまでに見せてきた技でもって、リーリアが赤い光の軌跡を描いてみせた。"
translation = "사자탈이 지금까지 보여준 기술을 사용하여 리리아가 붉은 빛의 궤적을 그려 보였다."

[[dialogue]]
speaker = "獅子舞"
original = "「くっ……七彩流羽根突き術・伍ノ型『<ruby>青<rt>あお</rt></ruby>』！」"
translation = "「큭…… 칠채류 하네츠키술 제5형 『청』!」"

[[dialogue]]
speaker = "unk"
original = "初めて、獅子舞の洗練された動きに乱れが生じる。"
translation = "처음으로 사자탈의 세련된 움직임에 흐트러짐이 생긴다."

[[dialogue]]
speaker = "unk"
original = "リーリアの技に対して、咄嗟に次の技を使って返す。が――"
translation = "리리아의 기술에 대해 다급히 다음 기술을 써서 받아친다. 하지만――"

[[dialogue]]
speaker = "リーリア"
original = "「弐ノ型『<ruby>橙<rt>だいだい</rt></ruby>』！」"
translation = "「제2형 『등』!」"

[[dialogue]]
speaker = "unk"
original = "リーリアはそれを橙色に変えて、カウンターを決める。"
translation = "리리아는 그것을 주황색으로 바꾸어 카운터를 날린다."

[[dialogue]]
speaker = "サーシャ"
original = "「また技で返した♪\u3000リーリアちゃん、すごいわ～！」"
translation = "「또 기술로 받아쳤어♪ 리리아짱 대단하네~!」"

[[dialogue]]
speaker = "獅子舞"
original = "「渋谷リーリア、お前は……！」"
translation = "「시부야 리리아, 너는……!」"

[[dialogue]]
speaker = "リーリア"
original = "「あなたの羽根突き術……その綺麗な色を、ここまでの勝負で全て覚えさせてもらいました！」"
translation = "「당신의 하네츠키술…… 그 예쁜 색들을 지금까지의 승부로 전부 외웠거든요!」"

[[dialogue]]
speaker = "シズハ"
original = "「リーリア先輩、すごい！\u3000そんなことできるなんて……！」"
translation = "「리리아 선배, 대단해! 그런 걸 할 수 있다니……!」"

[[dialogue]]
speaker = "アナ"
original = "「リーリアさんは生まれつき『<ruby>完全記憶能力<rt>ハイパーサイメシア</rt></ruby>』という特殊体質を持っています。それによって、獅子舞さんの動きと技を見て覚えたんです」"
translation = "「리리아 씨는 태어날 때부터 『완전기억능력』이라는 특수 체질을 가지고 있습니다. 그것을 통해 사자탈 씨의 움직임과 기술을 보고 외운 거예요.」"

[[dialogue]]
speaker = "舞亜"
original = "「それ、聞いたことある。見たものを全て記憶して絶対に忘れない――どんなに昔の記憶でも数瞬前のように、鮮明に思い出すことができるって」"
translation = "「그거 들어본 적 있어. 본 것을 전부 기억해서 절대 잊지 않는―― 아무리 옛날 기억이라도 불과 몇 순간 전처럼 선명하게 떠올릴 수 있다고.」"

[[dialogue]]
speaker = "シズハ"
original = "「あっ！\u3000じゃあ、リーリア先輩の能力『魔弾』って……」"
translation = "「앗! 그럼 리리아 선배의 능력 『마탄』이란 건……」"

[[dialogue]]
speaker = "アナ"
original = "「そう。完全記憶能力によって過去の思い出を頭の中に鮮明に呼び起せるからこそ、リーリアさんは想いを力に変える魔弾を作り出すことができるんです」"
translation = "「맞아요. 완전기억능력 덕분에 과거의 추억을 머릿속에 선명하게 불러낼 수 있기에, 리리아 씨는 마음을 힘으로 바꾸는 마탄을 만들어낼 수 있는 거랍니다.」"

[[dialogue]]
speaker = "リーリア"
original = "「さあ、ここから勝ちを取りに行きますよ！\u3000七彩流羽根突き術・参ノ型『<ruby>黄色<rt>きいろ</rt></ruby>』！」"
translation = "「자, 이제부터 승리를 따내러 가겠어요! 칠채류 하네츠키술 제3형 『황색』!」"

[[dialogue]]
speaker = "獅子舞"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "unk"
original = "その瞬間、獅子舞は昔の記憶を思い出していた。"
translation = "그 순간, 사자탈은 옛 기억을 떠올리고 있었다."

[[dialogue]]
speaker = "unk"
original = "それはリクリエを何度も挟んだ遥か昔の――しかし、今でも鮮明に思い出せる、決して忘れられない記憶だ。"
translation = "그것은 리크리에를 몇 번이나 사이에 둔 먼 옛날의―― 하지만 지금도 선명하게 떠올릴 수 있는, 결코 잊을 수 없는 기억이다."

[[dialogue]]
speaker = "？？？"
original = "「獅子舞、行っくよ～☆\u3000七彩流羽根突き術・<ruby>陸<rt>ろく</rt></ruby>ノ型『<ruby>藍色<rt>あいいろ</rt></ruby>』！」"
translation = "「사자탈, 간다~☆ 칠채류 하네츠키술 제6형 『남색』!」"

[[dialogue]]
speaker = "獅子舞"
original = "「何っ！？\u3000くっ……！\u3000また新しい技だと！？」"
translation = "「뭐랏!? 큭……! 또 새로운 기술이라고!?」"

[[dialogue]]
speaker = "？？？"
original = "「ふふふっ、綺麗な技でしょ～？\u3000あと１つ作り出せれば、まさに七彩の技が完成だね☆」"
translation = "「후후훗, 예쁜 기술이지~? 앞으로 하나만 더 만들어내면 그야말로 칠채의 기술이 완성되겠네☆」"

[[dialogue]]
speaker = "unk"
original = "記憶の中でそう言って微笑むのは、ロストアイテムである獅子舞を作り出した『七彩の魔女』。"
translation = "기억 속에서 그렇게 말하며 미소 짓는 것은 로스트 아이템인 사자탈을 만들어낸 『칠채의 마녀』."

[[dialogue]]
speaker = "獅子舞"
original = "「おのれ……もう１回だ！\u3000次こそは吾輩が勝ってみせるぞ、<b>ラルク</b>！」"
translation = "「네 이놈…… 한 번 더다! 다음번에야말로 이 몸이 이겨 보이겠다, <b>라르크</b>!」"

[[dialogue]]
speaker = "ラルク"
original = "「え～？\u3000そう言いつつ、さっきから全然勝ててないけど～？\u3000ふふっ☆」"
translation = "「에~? 그렇게 말하면서 아까부터 전혀 못 이기고 있는데~? 후훗☆」"

[[dialogue]]
speaker = "unk"
original = "結局、獅子舞はその日、ラルクに１度も羽根突きで勝つことができなかった。"
translation = "결국 사자탈은 그날, 라르크에게 단 한 번도 하네츠키로 이기지 못했다."

[[dialogue]]
speaker = "獅子舞"
original = "「……しかし、貴様は本当に『七』という数にこだわるな」"
translation = "「……하지만 네놈은 정말로 『7』이라는 숫자에 집착하는군.」"

[[dialogue]]
speaker = "ラルク"
original = "「ん？\u3000まぁね～♪\u3000ほら、縁起の良い数字でしょ☆」"
translation = "「응? 뭐 그렇지~♪ 자, 운수 좋은 숫자잖아☆」"

[[dialogue]]
speaker = "獅子舞"
original = "「ふん、例の魔道具もあと１つ作る気か？」"
translation = "「흥, 예의 마도구도 하나 더 만들 셈이냐?」"

[[dialogue]]
speaker = "ラルク"
original = "「もちろん！\u3000それで『七彩のアイテムズ』が完成ってね☆」"
translation = "「물론이지! 그걸로 『칠채의 아이템즈』가 완성되는 거야☆」"

[[dialogue]]
speaker = "獅子舞"
original = "「頭の痛い話だ。今でさえ変な<ruby>弟妹<rt>ていまい</rt></ruby>ばかりで、気苦労が絶えぬというのに……」"
translation = "「골치 아픈 소리군. 지금도 이상한 동생들뿐이라 고생이 끊이질 않는데……」"

[[dialogue]]
speaker = "ラルク"
original = "「まあ、そこは１番上の長男として頑張ってもらわないとね～☆\u3000獅子舞お兄ちゃん♪\u3000お母さんは頼りにしてるよ～♪」"
translation = "「뭐, 그건 첫째인 장남으로서 힘내줘야지~☆ 사자탈 오빠♪ 엄마는 믿고 있다구~♪」"

[[dialogue]]
speaker = "獅子舞"
original = "「勘弁してくれ……」"
translation = "「봐주게나……」"

[[dialogue]]
speaker = "unk"
original = "そんな風に言いつつも、獅子舞は内心楽しみにしていた。"
translation = "그렇게 말하면서도 사자탈은 내심 기대하고 있었다."

[[dialogue]]
speaker = "unk"
original = "自分の主はいずれ７つ、最後まで作り上げるだろうと信じて疑わなかった。"
translation = "자신의 주인은 언젠가 7개, 마지막까지 만들어낼 것이라고 믿어 의심치 않았다."

[[dialogue]]
speaker = "獅子舞"
original = "「おい、ラルク。七彩流羽根突き術の７番目の技は、いつになったら完成させる気だ？」"
translation = "「어이, 라르크. 칠채류 하네츠키술의 7번째 기술은 언제쯤 완성할 셈이냐?」"

[[dialogue]]
speaker = "ラルク"
original = "「あはは、ごめん。でも私、魔道具はちゃんと７つ作り上げたでしょ？」"
translation = "「아하하, 미안. 하지만 나, 마도구는 제대로 7개 만들어냈잖아?」"

[[dialogue]]
speaker = "ラルク"
original = "「だから、羽根突きの最後の技は、私の代わりに、獅子舞にお願いしようかな。あと、人間界のことも」"
translation = "「그러니까 하네츠키의 마지막 기술은 나 대신 사자탈에게 부탁할까 해. 그리고 인간계의 일도.」"

[[dialogue]]
speaker = "獅子舞"
original = "「ふざけるな！\u3000そんな中途半端は認めん！」"
translation = "「웃기지 마라! 그런 어중간한 건 인정 못 해!」"

[[dialogue]]
speaker = "獅子舞"
original = "「お前が作った技だぞ！？\u3000吾輩が作ってどうする！\u3000ちゃんと最後まで投げ出さずに、<b>生きて</b>作りきれ！」"
translation = "「네가 만든 기술이잖아!? 이 몸이 만들어서 어쩌란 말이냐! 제대로 마지막까지 내팽개치지 말고, <b>살아서</b> 다 만들어내라!」"

[[dialogue]]
speaker = "ラルク"
original = "「ごめん……でも、お願い、獅子舞。私の好きな人間界を、代わりに見守っていて欲しいの」"
translation = "「미안…… 하지만 부탁해, 사자탈. 내가 좋아하는 인간계를 대신 지켜봐 줬으면 좋겠어.」"

[[dialogue]]
speaker = "ラルク"
original = "「リクリエは止められないかもしれない。だけど、<ruby>私の魔道具<rt>あなたたち</rt></ruby>が人間界の文化を次の世界へと繋いでくれたら、私たちの色は――記憶は消えない」"
translation = "「리크리에는 막지 못할지도 몰라. 하지만 나의 마도구들이 인간계의 문화를 다음 세계로 이어준다면, 우리의 색은―― 기억은 사라지지 않아.」"

[[dialogue]]
speaker = "獅子舞"
original = "「お前自身が生きて繋げばいい！\u3000何故わざわざお前が命をかけて戦いに行く必要がある！？\u3000お前は魔女なのだぞ！？」"
translation = "「네놈 자신이 살아서 이으면 될 것 아니냐! 왜 굳이 네가 목숨을 걸고 싸우러 가야 한단 말이냐!? 너는 마녀이지 않느냐!?」"

[[dialogue]]
speaker = "獅子舞"
original = "「魔女の森に戻って、リクリエをやり過ごせ！\u3000なのにどうしてそこまで人間界に――！」"
translation = "「마녀의 숲으로 돌아가서 리크리에를 피하란 말이다! 그런데 어째서 그렇게까지 인간계에――!」"

[[dialogue]]
speaker = "ラルク"
original = "「大切な友達がいるから」"
translation = "「소중한 친구들이 있으니까.」"

[[dialogue]]
speaker = "獅子舞"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "ラルク"
original = "「人間界に来て、大切な友達が沢山できた。それを放って、私だけ逃げるなんてできない」"
translation = "「인간계에 와서 소중한 친구들이 많이 생겼어. 그걸 내버려 두고 나만 도망칠 수는 없어.」"

[[dialogue]]
speaker = "ラルク"
original = "「私、本当に心から人間界を愛しているんだ。だから、守りたい。最後まで一緒に、みんなと戦いたいんだよ」"
translation = "「나, 정말 진심으로 인간계를 사랑하고 있어. 그러니까 지키고 싶어. 마지막까지 함께, 모두와 싸우고 싶단 말이야.」"

[[dialogue]]
speaker = "ラルク"
original = "「だから、あなたたちを作った七彩の魔女として、最後のお願い。もしも世界がリクリエに飲み込まれても、私が愛した人間界を守って」"
translation = "「그러니까 너희를 만든 칠채의 마녀로서 마지막 부탁이야. 만약 세계가 리크리에에 삼켜지더라도, 내가 사랑한 인간계를 지켜줘.」"

[[dialogue]]
speaker = "獅子舞"
original = "「……認めんぞ。他の奴らが認めても、吾輩だけはお前が戦いに行くことを最後まで認めんっ！」"
translation = "「……인정 못 한다. 다른 녀석들이 인정해도, 이 몸만은 네가 싸우러 가는 것을 마지막까지 인정 못 해!」"

[[dialogue]]
speaker = "ラルク"
original = "「ごめんね。獅子舞……」"
translation = "「미안해. 사자탈……」"

[[dialogue]]
speaker = "ラルク"
original = "「いつか、あなたにもわかって欲しい――」"
translation = "「언젠가 너도 알아줬으면 좋겠어――」"

[[dialogue]]
speaker = "リーリア"
original = "「七彩流羽根突き術・伍ノ型『<ruby>青<rt>あお</rt></ruby>』！」"
translation = "「칠채류 하네츠키술 제5형 『청』!」"

[[dialogue]]
speaker = "獅子舞"
original = "「っ……！」"
translation = "「윽……!」"

[[dialogue]]
speaker = "unk"
original = "獅子舞の目の前にいるリーリアの姿が、自身の創造主と重なる。だからこそ、認められなかった。"
translation = "사자탈의 눈앞에 있는 리리아의 모습이 자신의 창조주와 겹쳐진다. 그렇기에 인정할 수 없었다."

[[dialogue]]
speaker = "獅子舞"
original = "「おのれ……<ruby>肆<rt>よん</rt></ruby>ノ型『<ruby>緑<rt>みどり</rt></ruby>』！」"
translation = "「네 이놈…… 제4형 『녹』!」"

[[dialogue]]
speaker = "獅子舞"
original = "「認めん……吾輩は認めんぞ、リーリア！\u3000そう簡単に、認めるわけにはいかないのだ！！」"
translation = "「인정 못 해…… 이 몸은 인정 못 한다, 리리아! 그렇게 쉽게 인정할 수는 없단 말이다!!」"

[[dialogue]]
speaker = "unk"
original = "彼女がもしかしたら、七彩の魔女の<b>生まれ変わり</b>かもしれないだなんて。"
translation = "그녀가 어쩌면 칠채의 마녀의 <b>환생</b>일지도 모른다니."

[[dialogue]]
speaker = "リーリア"
original = "「<ruby>陸<rt>ろく</rt></ruby>ノ型『<ruby>藍色<rt>あいいろ</rt></ruby>』！」"
translation = "「제6형 『남색』!」"

[[dialogue]]
speaker = "獅子舞"
original = "「弐ノ型『<ruby>橙<rt>だいだい</rt></ruby>』！」"
translation = "「제2형 『등』!」"

[[dialogue]]
speaker = "unk"
original = "違う色を違う色で打ち返す、技の応酬。そんな中で一瞬、リーリアはアナと視線が合う。"
translation = "다른 색을 다른 색으로 받아치는 기술의 공방. 그런 와중에 순간 리리아는 아나와 시선이 마주친다."

[[dialogue]]
speaker = "アナ"
original = "（リーリアさん、今です！）"
translation = "（리리아 씨, 지금이에요!）"

[[dialogue]]
speaker = "unk"
original = "リーリアはこくりと頷いて、言う。"
translation = "리리아는 고개를 끄덕이며 말한다."

[[dialogue]]
speaker = "リーリア"
original = "「――七彩流羽根突き術の色は全て覚えました。だからこそ……獅子舞さん、勝負です！」"
translation = "「――칠채류 하네츠키술의 색은 전부 외웠습니다. 그렇기에…… 사자탈 씨, 승부예요!」"

[[dialogue]]
speaker = "リーリア"
original = "「七彩流羽根突き術・<ruby>漆<rt>しち</rt></ruby>ノ型――『<ruby>紫<rt>むらさき</rt></ruby>』！！」"
translation = "「칠채류 하네츠키술 제7형―― 『자』!!」"

[[dialogue]]
speaker = "獅子舞"
original = "「っ――！」"
translation = "「윽――!」"

[[dialogue]]
speaker = "unk"
original = "その技は、獅子舞の知らない紫色だった。それだけじゃなく――"
translation = "그 기술은 사자탈이 모르는 보라색이었다. 그뿐만 아니라――"

[[dialogue]]
speaker = "シズハ"
original = "「すごい……！\u3000綺麗な色！」"
translation = "「대단해……! 예쁜 색!」"

[[dialogue]]
speaker = "サーシャ"
original = "「虹だわ～♪」"
translation = "「무지개네~♪」"

[[dialogue]]
speaker = "unk"
original = "紫に加えて、赤、橙、黄、緑、青、藍色と七彩の光条へと変化して、虹の橋を描く。"
translation = "보라색에 더해 빨강, 주황, 노랑, 초록, 파랑, 남색의 칠채 광조로 변화하며 무지개 다리를 그린다."

[[dialogue]]
speaker = "獅子舞"
original = "（ああ、なんて……）"
translation = "（아아, 어찌 이리……）"

[[dialogue]]
speaker = "unk"
original = "それを見た獅子舞は、思わず――"
translation = "그것을 본 사자탈은 저도 모르게――"

[[dialogue]]
speaker = "獅子舞"
original = "（綺麗な技なのだ……）"
translation = "（아름다운 기술이로구나……）"

[[dialogue]]
speaker = "unk"
original = "羽根を返すのを忘れて、地面に落ちるまで見惚れてしまった。"
translation = "깃털을 받아치는 것도 잊고 지면에 떨어질 때까지 넋을 잃고 바라보았다."

[[dialogue]]
speaker = "舞亜"
original = "「あ……！」"
translation = "「아……!」"

[[dialogue]]
speaker = "ソフィア"
original = "「やりました……！」"
translation = "「해냈어요……!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「リーリアの勝ちだし！！」"
translation = "「리리아의 승리라구!!」"

[[dialogue]]
speaker = "シズハ"
original = "「やったぁ～～～っ！！」"
translation = "「야호~~~!!」"

[[dialogue]]
speaker = "サーシャ"
original = "「リーリアちゃん、すごいわ～♪\u3000お姉ちゃん、よしよししちゃう～♪\u3000ぎゅ～っ♪」"
translation = "「리리아짱 대단해~♪ 언니가 우쭈쭈 해줄게~♪ 꼬옥~♪」"

[[dialogue]]
speaker = "リーリア"
original = "「わぷっ！？\u3000サーシャさん、おっぱいに埋まって息できないです～……！」"
translation = "「와푸!? 사샤 씨, 가슴에 파묻혀서 숨을 못 쉬겠어요~……!」"

[[dialogue]]
speaker = "獅子舞"
original = "「なぜ……お前が、最後の<ruby>漆<rt>しち</rt></ruby>ノ型を？」"
translation = "「어째서…… 네가 마지막 제7형을?」"

[[dialogue]]
speaker = "unk"
original = "しばらく言葉もなく惚けていた獅子舞が、リーリアに視線を向けて問いかける。"
translation = "한동안 말없이 멍하니 있던 사자탈이 리리아에게 시선을 돌려 묻는다."

[[dialogue]]
speaker = "リーリア"
original = "「――不思議なんですけど、私が羽根突きの技を作るとしたら『こんな感じかな』っていう感覚に、どの技も驚くくらいピッタリ当てはまるんですよ」"
translation = "「――신기하게도 제가 하네츠키 기술을 만든다면 『이런 느낌일까』 하는 감각에 모든 기술이 놀랄 만큼 딱 들어맞았거든요.」"

[[dialogue]]
speaker = "リーリア"
original = "「だからこそ、思ったんです。この七彩流羽根突き術っていうのは、７つの技を順番に繋げて打つことで奥義の『虹』が完成する連続技だって」"
translation = "「그렇기에 생각했어요. 이 칠채류 하네츠키술이라는 건 7가지 기술을 순서대로 이어서 침으로써 오의인 『무지개』가 완성되는 연속기라고요.」"

[[dialogue]]
speaker = "リーリア"
original = "「だから……最後の漆ノ型は、獅子舞さんが隠していましたけど、きっとこういう技だろうって」"
translation = "「그래서…… 마지막 제7형은 사자탈 씨가 숨기고 있었지만, 분명 이런 기술일 거라고 생각했어요.」"

[[dialogue]]
speaker = "リーリア"
original = "「正解でしたかね？」"
translation = "「정답이었나요?」"

[[dialogue]]
speaker = "獅子舞"
original = "「……見事だ」"
translation = "「……훌륭하군.」"

[[dialogue]]
speaker = "unk"
original = "獅子舞は、あえて口にしなかった。"
translation = "사자탈은 굳이 입 밖으로 내지 않았다."

[[dialogue]]
speaker = "unk"
original = "漆ノ型は、獅子舞が長年考えても作れなかった、未だ見ぬ未完の技であったことを。"
translation = "제7형은 사자탈이 오랫동안 고민해도 만들지 못했던, 아직 보지 못한 미완의 기술이었다는 것을."

[[dialogue]]
speaker = "獅子舞"
original = "「……リーリア、お前は練習の最中、人間界が好きだと言っていたな」"
translation = "「……리리아, 너는 연습 도중에 인간계를 좋아한다고 했었지.」"

[[dialogue]]
speaker = "リーリア"
original = "「え？\u3000あ、はい……」"
translation = "「에? 아, 네……」"

[[dialogue]]
speaker = "獅子舞"
original = "「リクリエによって、もし人間界が絶望的な状況に陥ったとして……それと立ち向かうために、命をかけられる程にか？」"
translation = "「리크리에에 의해 만약 인간계가 절망적인 상황에 빠진다고 해도…… 그것에 맞서기 위해 목숨을 걸 수 있을 정도냐?」"

[[dialogue]]
speaker = "リーリア"
original = "「……そうですね。私はもう、逃げられないと思います」"
translation = "「……글쎄요. 저는 이제 도망칠 수 없다고 생각해요.」"

[[dialogue]]
speaker = "リーリア"
original = "「人間界に好きなものがいっぱいできちゃったので。だから、私はこれからもっと強くなりたいです」"
translation = "「인간계에 좋아하는 것들이 잔뜩 생겨버렸으니까요. 그러니까 저는 앞으로 더 강해지고 싶어요.」"

[[dialogue]]
speaker = "リーリア"
original = "「獅子舞さんがくれたこの晴れ着の力で、人間界と友達を守れるように」"
translation = "「사자탈 씨가 주신 이 설빔의 힘으로 인간계와 친구들을 지킬 수 있도록요.」"

[[dialogue]]
speaker = "獅子舞"
original = "「……そうか。ならば仕方あるまい」"
translation = "「……그런가. 그렇다면 어쩔 수 없군.」"

[[dialogue]]
speaker = "獅子舞"
original = "「認めてやろう、渋谷リーリア。お前のことを」"
translation = "「인정해주마, 시부야 리리아. 너를.」"

[[dialogue]]
speaker = "リーリア"
original = "「いよっしっ☆\u3000これにてマジカルウィンです！\u3000えへへっ♪」"
translation = "「이욧샤☆ 이걸로 매지컬 윈입니다! 에헤헤♪」"

[[dialogue]]
speaker = "unk"
original = "両手でぐっとガッツポーズをして、満面の笑顔を咲かせるリーリア。"
translation = "양손으로 꽉 가츠포즈를 취하며 만면에 미소를 짓는 리리아."

[[dialogue]]
speaker = "アナ"
original = "「やりましたね、リーリアさん。グッジョブです」"
translation = "「해냈군요, 리리아 씨. 굿잡입니다.」"

[[dialogue]]
speaker = "リーリア"
original = "「アナちゃんが、七彩流の技が虹の七色かもって推測して、ヒントをくれたおかげだよ♪\u3000いぇ～い☆」"
translation = "「아나짱이 칠채류 기술이 무지개의 일곱 색깔일지도 모른다고 추측해서 힌트를 준 덕분이야♪ 예이~☆」"

[[dialogue]]
speaker = "アナ"
original = "「ハイタッチです♪」"
translation = "「하이파이브예요♪」"

[[dialogue]]
speaker = "獅子舞"
original = "（ふん……友達、か）"
translation = "（흥…… 친구, 인가.）"

[[dialogue]]
speaker = "unk"
original = "そうして、友達と嬉しげに手を打ち合わせるリーリアを眺めながら、獅子舞も小さく笑うように鼻を鳴らすのだった。"
translation = "그렇게 친구와 즐겁게 손을 맞부딪치는 리리아를 바라보며 사자탈도 작게 웃듯 콧소리를 냈다."

