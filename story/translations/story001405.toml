[[dialogue]]
speaker = "unk"
original = "突発的に始まった、水着対水着による模擬戦が終了した。"
translation = "돌발적으로 시작된, 수영복 대 수영복에 의한 모의전이 종료되었다."

[[dialogue]]
speaker = "unk"
original = "勝ったのは新星星徒会チーム。"
translation = "이긴 것은 신성학생회 팀."

[[dialogue]]
speaker = "unk"
original = "セドナさんもリーリアも凄かったが、やはり戦闘服の性能を上手く引き出したヴィーナスとマトイに、今はまだ分があったようだ。"
translation = "세드나 씨와 리리아도 대단했지만, 역시 전투복의 성능을 잘 이끌어낸 비너스와 마토이에게 지금은 아직 승기가 있었던 모양이다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「初めてなのに、なかなかやるわねっ！」"
translation = "「처음인데도 제법 하는걸!」"

[[dialogue]]
speaker = "セドナ"
original = "「胸を借りるつもりではあったが……考えていた以上に高い壁だ」"
translation = "「한 수 배울 생각이었다만…… 생각했던 것 이상으로 높은 벽이군.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「いつでもかかってきなさい、相手になるから」"
translation = "「언제든 덤비렴, 상대해 줄 테니까.」"

[[dialogue]]
speaker = "セドナ"
original = "「ありがたい申し出だ、遠慮なく挑ませて頂こう」"
translation = "「고마운 제안이다, 유감없이 도전하도록 하지.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ええ、私たちは逃げも隠れもしないわっ！\u3000年中無休、四十六時間営業中よ！」"
translation = "「그래, 우리는 도망치지도 숨지도 않는다구! 연중무휴, 46시간 영업 중이야!」"

[[dialogue]]
speaker = "マトイ"
original = "「それはもしかして、四六時中って言いたかった……？\u3000というか私たちって、またしれっと巻き込まれてるし！」"
translation = "「그건 혹시, 사시사철(46시중)이라고 말하고 싶었던 거니……? 그보다 우리는 또 자연스럽게 휘말려 있고!」"

[[dialogue]]
speaker = "unk"
original = "リーリアもお疲れ様"
translation = "리리아도 수고했어"

[[dialogue]]
speaker = "リーリア"
original = "「あう～～、大変でしたよ～。センパーイ、よしよししてください～」"
translation = "「아우~~, 힘들었어요~. 선배~, 착하다 착하다 해주세요~」"

[[dialogue]]
speaker = "unk"
original = "えらいぞ～、よしよし"
translation = "기특하네~, 착하다 착하다"

[[dialogue]]
speaker = "unk"
original = "初めてなのによく頑張ったな"
translation = "처음인데도 잘 노력했어"

[[dialogue]]
speaker = "リーリア"
original = "「えっへへ～、嬉しいな～。もっといっぱいナデナデお願いしま～す<emoji=heart04>」"
translation = "「에헤헤~, 기쁘다~. 좀 더 많이 쓰담쓰담 부탁드려요~<emoji=heart04>」"

[[dialogue]]
speaker = "セドナ"
original = "「気を緩めている場合ではないぞ。反省すべき点は山ほどあったのだ」"
translation = "「마음을 놓고 있을 때가 아니다. 반성해야 할 점은 산더미처럼 있었다.」"

[[dialogue]]
speaker = "セドナ"
original = "「この経験から反省点を洗い出し、どうすべきか対策を……」"
translation = "「이 경험에서 반성점을 씻어내고, 어떻게 해야 할지 대책을……」"

[[dialogue]]
speaker = "リーリア"
original = "「あの～、それは基地に帰ってからにしませんか？」"
translation = "「저기~, 그건 기지에 돌아가서 하면 안 될까요?」"

[[dialogue]]
speaker = "セドナ"
original = "「む……」"
translation = "「음……」"

[[dialogue]]
speaker = "サーシャ"
original = "「みなさ～ん、アイスクリームを持ってきたので、一緒に食べましょう～」"
translation = "「여러분~, 아이스크림을 가져왔으니 같이 먹어요~」"

[[dialogue]]
speaker = "リーリア"
original = "「アイス！？\u3000食べたい食べたい、食べたいでーす！」"
translation = "「아이스!? 먹고 싶어 먹고 싶어, 먹고 싶어요!」"

[[dialogue]]
speaker = "セドナ"
original = "「ふぅ……仕方のないやつだ」"
translation = "「후우…… 어쩔 수 없는 녀석이군.」"

[[dialogue]]
speaker = "リーリア"
original = "「えへへ～、アイス美味しー」"
translation = "「에헤헤~, 아이스 맛있어~」"

[[dialogue]]
speaker = "リーリア"
original = "「どうです、センパイ？\u3000バニラアイスをペロペロする水着の後輩ちゃん、マジカルかわいいと思いませんか？」"
translation = "「어때요, 선배? 바닐라 아이스를 핥짝핥짝하는 수영복 후배짱, 매지컬하게 귀엽다고 생각하지 않나요?」"

[[dialogue]]
speaker = "リーリア"
original = "「ひゃん、冷たい♪\u3000アイスが溶けて、お胸に落ちちゃった<emoji=heart04>」"
translation = "「히양, 차가워♪ 아이스가 녹아서, 가슴에 떨어져 버렸어요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "だがそのお胸はニセモノなのであった"
translation = "하지만 그 가슴은 가짜였다."

[[dialogue]]
speaker = "リーリア"
original = "「センパイ……そのおしゃべりなお口、無理やりアイスをつっこんで塞いであげましょうか？」"
translation = "「선배…… 그 수다스러운 입에 억지로 아이스를 쑤셔 넣어서 막아 버릴까요?」"

[[dialogue]]
speaker = "サーシャ"
original = "「うふふ、リーリアちゃんはホントに会長くんと仲がいいのね～」"
translation = "「우후후, 리리아짱은 정말로 회장군이랑 사이가 좋네~」"

[[dialogue]]
speaker = "リーリア"
original = "「そりゃもう、私の一目惚れの相手ですから♪」"
translation = "「그야 물론, 제 첫눈에 반한 상대니까요♪」"

[[dialogue]]
speaker = "マトイ"
original = "「ええっ！\u3000そうだったの！？」"
translation = "「에엣! 그랬던 거야!?」"

[[dialogue]]
speaker = "リーリア"
original = "「実はそうなんですよ～、マトイ先輩」"
translation = "「사실은 그렇답니다~, 마토이 선배.」"

[[dialogue]]
speaker = "unk"
original = "その話は嘘だったんじゃ？"
translation = "그 이야기는 거짓말 아니었어?"

[[dialogue]]
speaker = "リーリア"
original = "「まあ確かに、あの時の私はスパイだったから、センパイに近づくための口実だったんですけど～」"
translation = "「뭐 확실히, 그때의 저는 스파이였으니까 선배에게 접근하기 위한 구실이었지만요~」"

[[dialogue]]
speaker = "リーリア"
original = "「でもセンパイって優しいし、かわいいし。それにかっこいいし♪\u3000カレシにしたら最強って感じじゃないですか？」"
translation = "「하지만 선배는 다정하고, 귀엽고. 게다가 멋있고♪ 남자친구로 삼으면 최강이라는 느낌 들지 않나요?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「うんうん、カッコイイのは当然ね！\u3000なんたってリクリエを退けた最強魔王なんだから！」"
translation = "「음음, 멋진 건 당연하지! 뭐니 뭐니 해도 리크리에를 물리친 최강 마왕이니까!」"

[[dialogue]]
speaker = "アナ"
original = "「ええ……それに会長が優しいのは、私も認めるところです」"
translation = "「네…… 게다가 회장님이 다정한 건 저도 인정하는 바입니다.」"

[[dialogue]]
speaker = "サーシャ"
original = "「私も会長くんのこと、カワイイ男の子だって思うわ～<emoji=heart04>」"
translation = "「나도 회장군 말이야, 귀여운 남자아이라고 생각해~<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「むむむ……共感してもらえて嬉しいけど、もしかしてみんなセンパイのこと狙ってる？\u3000ライバル多そうですね～！」"
translation = "「무무무…… 공감해 줘서 기쁘지만, 혹시 다들 선배를 노리고 있나요? 라이벌이 많을 것 같네요~!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そういえば、前回もそんな話で盛り上がったわね！」"
translation = "「그러고 보니 전에도 그런 이야기로 분위기가 달아올랐었지!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「こうなったら、今夜は第二回恋バナトーク……やっちゃう？」"
translation = "「이렇게 된 이상, 오늘 밤은 제2회 사랑 이야기 토크…… 해버릴까?」"

[[dialogue]]
speaker = "リーリア"
original = "「もーっ、そんなの、やっちゃうに決まってるじゃないですか！\u3000今から夜が楽しみだな～♪」"
translation = "「모처럼인데 그런 건 당연히 하는 걸로 정해져 있잖아요! 벌써 밤이 기대되네요~♪」"

[[dialogue]]
speaker = "セドナ"
original = "「……リーリア。楽しむのも結構だが、日課のトレーニングは欠かすんじゃないぞ」"
translation = "「……리리아. 즐기는 것도 좋지만, 일과인 트레이닝은 거르지 마라.」"

[[dialogue]]
speaker = "リーリア"
original = "「む……分かってますってば。盛り上がってるんですから、何も今言わなくたって……」"
translation = "「무…… 알고 있다니까요. 달아오르고 있는데, 아무렴 지금 말 안 해도 되잖아요……」"

[[dialogue]]
speaker = "セドナ"
original = "「何か不満でもあるのか？」"
translation = "「무슨 불만이라도 있나?」"

[[dialogue]]
speaker = "リーリア"
original = "「い、いえいえ。滅相もありませんよ～、っと！」"
translation = "「아, 아니오. 천부당만부당한 말씀이에요~, 얍!」"

[[dialogue]]
speaker = "セドナ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "リーリア"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "セドナ"
original = "「出過ぎた真似をしてしまったな……この場はお前に任せた方が良さそうだ」"
translation = "「참견이 지나쳤군…… 이 자리는 네게 맡기는 편이 좋을 것 같구나.」"

[[dialogue]]
speaker = "リーリア"
original = "「…………はぁ、もう……」"
translation = "「…………하아, 정말……」"

[[dialogue]]
speaker = "unk"
original = "その相手ってセドナさん？"
translation = "그 상대라는 게 세드나 씨야?"

[[dialogue]]
speaker = "unk"
original = "前に上司と衝突したって話があったけど"
translation = "전에도 상사랑 충돌했다는 이야기가 있었는데"

[[dialogue]]
speaker = "リーリア"
original = "「まあ……そういうことですね」"
translation = "「뭐…… 그렇게 된 거네요.」"

[[dialogue]]
speaker = "マトイ"
original = "「確かにセドナさんとリーリアさんって、性格が全然違うもんね」"
translation = "「확실히 세드나 씨랑 리리아 씨는 성격이 전혀 다르긴 하네.」"

[[dialogue]]
speaker = "リーリア"
original = "「そーなんですよ。話していても意見が合わないのなんのって……」"
translation = "「그렇다니까요. 대화를 해도 의견이 어찌나 안 맞는지……」"

[[dialogue]]
speaker = "リーリア"
original = "「でもあのヒトの言ってること、何から何まで正論だから言い返すに言い返せないんですよね」"
translation = "「하지만 저 사람 말은 하나부터 열까지 정론이라서 말대꾸를 하려야 할 수가 없거든요.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「正論パンチってやつね！」"
translation = "「정론 펀치라는 거네!」"

[[dialogue]]
speaker = "リーリア"
original = "「もう少し温かみを持ってくれれば、私としても『しょうがない』って納得がしやすいんですけど……」"
translation = "「조금만 더 따뜻함을 가져주면 저로서도 『어쩔 수 없지』 하고 납득하기 쉬울 텐데……」"

[[dialogue]]
speaker = "リーリア"
original = "「はっ！？\u3000気が付いたら全然楽しくない会話になってるっ！！」"
translation = "「핫!? 정신을 차려보니 전혀 즐겁지 않은 대화가 되어버렸어!!」"

[[dialogue]]
speaker = "リーリア"
original = "「やだやだやだっ！\u3000センパイとはもっと楽しい時間を過ごしたいのにっ！」"
translation = "「싫어싫어싫어! 선배와는 좀 더 즐거운 시간을 보내고 싶은데!」"

[[dialogue]]
speaker = "unk"
original = "水上スキーとかどうかな？"
translation = "수상 스키 같은 건 어때?"

[[dialogue]]
speaker = "unk"
original = "楽しいこと、か……"
translation = "즐거운 일이라, 과연……"

[[dialogue]]
speaker = "ヴィーナス"
original = "「いいわね！\u3000私も前々からやってみたいと思ってたの！」"
translation = "「좋네! 나도 전부터 해보고 싶다고 생각했어!」"

[[dialogue]]
speaker = "リーリア"
original = "「あはは、それとは違うニュアンスの楽しいだったんだけどな……でも水上スキーは面白そうです♪」"
translation = "「아하하, 그것과는 다른 뉘앙스의 즐거움이었지만…… 그래도 수상 스키는 재미있을 것 같아요♪」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「決まりね！\u3000誰が一番早いか競争よ！」"
translation = "「결정됐네! 누가 제일 빠른지 경쟁이야!」"

[[dialogue]]
speaker = "マトイ"
original = "「もー、何でもかんでも勝負にしないでってば～」"
translation = "「정말, 뭐든지 승부로 삼지 말라니까~」"

[[dialogue]]
speaker = "リーリア"
original = "「ふふっ♪\u3000いいですよ、こういう勝負なら喜んで受けて立ちます♪」"
translation = "「후후♪ 좋아요, 이런 승부라면 기꺼이 받아들이겠어요♪」"

