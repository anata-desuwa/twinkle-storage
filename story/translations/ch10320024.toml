[[dialogue]]
speaker = "unk"
original = "第４話,バトルＤＥデート！？,P"
translation = "제4화, 배틀 DE 데이트!?"

[[dialogue]]
speaker = "ウィステリア"
original = "「はぁ……夏ももうすぐ終わりなのよね……水着、思ったより着れなかったわ……」"
translation = "「하아…… 여름도 이제 곧 끝이네…… 수영복, 생각보다 못 입었어……」"

[[dialogue]]
speaker = "unk"
original = "これから海デート行きましょう！"
translation = "지금부터 바다 데이트 가요!"

[[dialogue]]
speaker = "ウィステリア"
original = "「！\u3000そうよね、時間がないことを嘆くより行動するべきだわ。行きましょう、海！」"
translation = "「! 그렇네, 시간이 없는 걸 한탄하기보다 행동해야겠어. 가자, 바다로!」"

[[dialogue]]
speaker = "unk"
original = "その週末──"
translation = "그 주말──"

[[dialogue]]
speaker = "ウィステリア"
original = "「会長くんと海デート～♪\u3000細かいこと考えずに、最初からこうすれば良かったのよ」"
translation = "「회장군과 바다 데이트~♪ 세세한 건 생각하지 말고 처음부터 이럴걸 그랬어」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ふふ……こういうところは、好きな人と来てこそよね。泳ぐのもいいけど、海の家で何か食べるのも悪くないわね。会長くんはお腹空いて──」"
translation = "「후후…… 이런 곳은 좋아하는 사람과 와야 제맛이지. 수영하는 것도 좋지만 바다의 집에서 뭔가를 먹는 것도 나쁘지 않네. 회장군은 배 안 고파──」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ん？\u3000この音は──」"
translation = "「응? 이 소리는──」"

[[dialogue]]
speaker = "モンスター"
original = "「イ～～～ッ！」"
translation = "「이~~~잇!」"

[[dialogue]]
speaker = "ウィステリア"
original = "「やっぱりーっ！」"
translation = "「역시나──!」"

[[dialogue]]
speaker = "ウィステリア"
original = "「でもデートの邪魔はさせないわ！」"
translation = "「하지만 데이트 방해는 하게 두지 않아!」"

[[dialogue]]
speaker = "水着フワッチ"
original = "「イ～……」"
translation = "「이~~……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「油断も隙もあったもんじゃないわね。これでデートを再開──」"
translation = "「방심할 틈도 없네. 이걸로 데이트를 재개──」"

[[dialogue]]
speaker = "モンスター"
original = "「イ～～～～～～～ッ！！」"
translation = "「이~~~~~~~잇!!」"

[[dialogue]]
speaker = "ウィステリア"
original = "「できなかった！？」"
translation = "「못 하잖아!?」"

[[dialogue]]
speaker = "モンスター"
original = "「シャ～～～～～～～ッ！！！」"
translation = "「샤~~~~~~~앗!!!」"

[[dialogue]]
speaker = "ウィステリア"
original = "「サメまで出てきちゃって……はぁ、ホント不運だわ。このままじゃ延々とモンスターが湧いてきそうね。それなら──」"
translation = "「상어까지 나와버리고…… 하아, 정말 불운해. 이대로라면 끝없이 몬스터가 솟아날 것 같네. 그렇다면──」"

[[dialogue]]
speaker = "ウィステリア"
original = "「戦いながらデートすればいいのよ！」"
translation = "「싸우면서 데이트하면 되는 거야!」"

[[dialogue]]
speaker = "unk"
original = "ええ～～～～～っ！？"
translation = "에에~~~~~엣!?"

[[dialogue]]
speaker = "ウィステリア"
original = "「会長くん、かき氷買ってきたわよ。一緒に食べましょ♪」"
translation = "「회장군, 빙수 사 왔어. 같이 먹자♪」"

[[dialogue]]
speaker = "ウィステリア"
original = "「はい、あ～ん<emoji=heart04>\u3000かき氷おいしい？」"
translation = "「자, 아~앙<emoji=heart04> 빙수 맛있어?」"

[[dialogue]]
speaker = "unk"
original = "頭がキーンとします……"
translation = "머리가 띵해요……"

[[dialogue]]
speaker = "ウィステリア"
original = "「ふふ、それも夏の風物詩よ♪\u3000それじゃ私も……あんっ。ん～～っ、ほんとにキーンとするわね♪」"
translation = "「후후, 그것도 여름의 묘미지♪ 그럼 나도…… 앙. 음~~, 정말로 띵하네♪」"

[[dialogue]]
speaker = "モンスター"
original = "「イ～～～」"
translation = "「이~~~」"

[[dialogue]]
speaker = "ウィステリア"
original = "「そこっ！」"
translation = "「거기!」"

[[dialogue]]
speaker = "モンスター"
original = "「イ～～……」"
translation = "「이~~……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ちょっと砂浜を歩きましょうか。ほら、手を繋いで」"
translation = "「잠깐 백사장을 걸을까. 자, 손잡고」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ふふふ……耳を澄ますと、さざ波の音が心地いいわね。まるで海に<ruby>揺蕩<rt>たゆた</rt></ruby>っているみたい──」"
translation = "「후후후…… 귀를 기울이면 파도 소리가 기분 좋네. 마치 바다에 일렁이고 있는 것 같아──」"

[[dialogue]]
speaker = "モンスター"
original = "「シャーー──」"
translation = "「샤아──」"

[[dialogue]]
speaker = "ウィステリア"
original = "「サメにはサメよ、マリシャスシャークバイト！」"
translation = "「상어에게는 상어야, 말리셔스 샤크 바이트!」"

[[dialogue]]
speaker = "モンスター"
original = "「シャ～～～ッ！？」"
translation = "「샤~~~앗!?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「あ、バナナボートもあるみたいね。船で引っ張ってくれるんだって。楽しそうじゃない？」"
translation = "「아, 바나나 보트도 있는 모양이네. 배로 끌어준대. 재밌어 보이지 않아?」"

[[dialogue]]
speaker = "unk"
original = "まるでモンスターがいないみたいに振る舞ってる……"
translation = "마치 몬스터가 없는 것처럼 행동하고 있어……"

[[dialogue]]
speaker = "ウィステリア"
original = "「だってモンスターにかかずらってるだけ損じゃない。海にいられる時間は限られてるのよ。できるだけ楽しまなきゃ」"
translation = "「그야 몬스터에게 매달려 있는 것만으로도 손해잖아. 바다에 있을 수 있는 시간은 한정되어 있어. 가능한 한 즐겨야지」"

[[dialogue]]
speaker = "ウィステリア"
original = "「それに、君と一緒にいたいって気持ちは、モンスターなんかじゃ邪魔できないわ」"
translation = "「게다가 너와 함께 있고 싶다는 마음은 몬스터 따위가 방해할 수 없어」"

[[dialogue]]
speaker = "ウィステリア"
original = "「好きよ……会長くん」"
translation = "「좋아해…… 회장군」"

[[dialogue]]
speaker = "unk"
original = "俺もウィステリアさんが好きです"
translation = "저도 위스테리아 씨가 좋아요"

[[dialogue]]
speaker = "ウィステリア"
original = "「ふふ、好きって言われちゃった<emoji=heart04>\u3000これだけでもデートに来た甲斐あったかも」"
translation = "「후후, 좋아한다는 말을 들어버렸네<emoji=heart04> 이것만으로도 데이트하러 온 보람이 있었을지도」"

[[dialogue]]
speaker = "ウィステリア"
original = "「だけどそれだけじゃなくて、キス──」"
translation = "「하지만 그것뿐만 아니라 키스──」"

[[dialogue]]
speaker = "モンスター"
original = "「グルルル！」"
translation = "「그르르르!」"

[[dialogue]]
speaker = "ウィステリア"
original = "「邪魔！」"
translation = "「방해돼!」"

[[dialogue]]
speaker = "モンスター"
original = "「グルル……」"
translation = "「그르르……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ようやく終わり──」"
translation = "「드디어 끝──」"

[[dialogue]]
speaker = "ウィステリア"
original = "「近くにアステラ？\u3000もう、夏も終わりだからってモンスターのバーゲンセールしなくていいのに……やっぱり呪われてる」"
translation = "「근처에 아스텔라? 정말, 여름도 끝나간다고 몬스터 바겐세일 안 해도 되는데…… 역시 저주받았어」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ごめんね、いつも運と間が悪い彼女で……。こんなんじゃデート気分になれないわよね」"
translation = "「미안해, 언제나 운과 타이밍이 나쁜 여자친구라서……. 이래서는 데이트 기분이 안 나겠지」"

[[dialogue]]
speaker = "unk"
original = "刺激的なデートです"
translation = "자극적인 데이트예요"

[[dialogue]]
speaker = "ウィステリア"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker = "ウィステリア"
original = "「……ありがとう、会長くん、こんな私を彼女にしてくれて」"
translation = "「……고마워, 회장군, 이런 나를 여자친구로 삼아줘서」"

[[dialogue]]
speaker = "ウィステリア"
original = "「私、やっぱり君が好き。君がいてくれて良かった」"
translation = "「나, 역시 네가 좋아. 네가 있어 줘서 다행이야」"

[[dialogue]]
speaker = "ウィステリア"
original = "「君となら不運なんて吹き飛ばせるわ。だから──」"
translation = "「너와 함께라면 불운 따위 날려버릴 수 있어. 그러니까──」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ちゅっ<emoji=heart04>」"
translation = "「쪽<emoji=heart04>」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ようやくキスできたわね。さ、アステラなんてぶっとばして、思い切りイチャイチャしましょう<emoji=heart04>」"
translation = "「드디어 키스했네. 자, 아스텔라 같은 건 날려버리고 마음껏 꽁냥거리자<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そして２人でアステラを消滅させ、残りの時間を思う存分楽しんだのだった──"
translation = "그리고 둘이서 아스텔라를 소멸시키고, 남은 시간을 마음껏 즐기는 것이었다──"

