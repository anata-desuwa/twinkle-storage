[[dialogue]]
speaker = "unk"
original = "第４話,君に惹かれて,P"
translation = "제4화, 너에게 이끌려, P"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「おはよっ、会長くん！\u3000今日もいい天気だねっ！」"
translation = "「안녕, 회장군! 오늘도 날씨 좋다!」"

[[dialogue]]
speaker = "unk"
original = "おはようございます"
translation = "안녕하세요."

[[dialogue]]
speaker = "unk"
original = "シルヴィ先輩はいつも元気だ。元気でないところを見たことがない。"
translation = "실비 선배는 언제나 활기차다. 활기차지 않은 모습을 본 적이 없다."

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「ん？\u3000何かいいたそう」"
translation = "「응? 뭔가 할 말 있는 표정인데.」"

[[dialogue]]
speaker = "unk"
original = "今日の放課後、時間ありますか？"
translation = "오늘 방과 후에 시간 있으신가요?"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「放課後？\u3000いいよ！」"
translation = "「방과 후? 좋아!」"

[[dialogue]]
speaker = "unk"
original = "俺とデートしましょう"
translation = "저랑 데이트해요."

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「うん、デートだね！\u3000もちろんオッケー──」"
translation = "「응, 데이트네! 물론 오케이──」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「って、デート！？\u3000いや、えっと、でも、いいよって言っちゃったし……」"
translation = "「라니, 데이트!? 아니, 저기, 하지만 좋다고 말해버렸고……」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「女に二言はない！\u3000よし、分かった！\u3000デートしよう！」"
translation = "「여자가 한입으로 두말할 수 없지! 좋아, 알았어! 데이트하자!」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「お待たせ。待った？\u3000……今来たとこ？\u3000そ、そっか」"
translation = "「오래 기다렸지. 기다렸어? ……방금 왔다고? 그, 그렇구나.」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「何か用事があるんだよね？\u3000女の子と一緒じゃないと頼めないメニューがあるとか、星徒会の誰かにプレゼントを買うとか……」"
translation = "「무슨 용건이 있는 거지? 여자애랑 같이 아니면 시킬 수 없는 메뉴가 있다거나, 성도회 누구한테 줄 선물을 산다거나……」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「……そういうのじゃない？\u3000ふ、ふ～ん……」"
translation = "「……그런 게 아냐? 흐, 흠……」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「えっと、じゃあ、どこか行く？\u3000チキンは……え、ダメ？」"
translation = "「저기, 그럼 어디 갈까? 치킨은…… 에, 안 돼?」"

[[dialogue]]
speaker = "unk"
original = "それから俺たちは繁華街に向かって──"
translation = "그러고 나서 우리는 번화가로 향해서──"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「これが１６色ケーキか～。えへへ、前に話したの覚えててくれたんだ」"
translation = "「이게 16색 케이크구나~ 에헤헤, 전에 말했던 거 기억해줬네.」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「どれどれ、味は……ん～？\u3000美味しい、気はする……」"
translation = "「어디 어디 맛은…… 음~? 맛있는 것 같기도……」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「スポンジもクリームも色で味が違って……甘い、酸っぱい、苦い、また甘い？」"
translation = "「스펀지도 크림도 색깔마다 맛이 달라서…… 달고 시고 쓰고 또 달고?」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「分かんない。美味しいってなんだったっけ……」"
translation = "「모르겠어. 맛있는 게 뭐였더라……」"

[[dialogue]]
speaker = "unk"
original = "気を取り直して、気になっていた別のお店へ。"
translation = "기분을 전환해서 눈여겨보던 다른 가게로."

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「次はから揚げドーナツだよ！\u3000一度揚げたドーナツに衣をつけて、また揚げてるんだって！」"
translation = "「다음은 가라아게 도넛이야! 한 번 튀긴 도넛에 튀김옷을 입혀서 또 튀겼대!」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「絶対カロリーえげつないよこれ！\u3000でも味には期待できそう。ハイカロリー・イズ・デリシャスだからね！」"
translation = "「절대 칼로리 엄청날 거야 이거! 하지만 맛은 기대해도 좋을 것 같아. 하이 칼로리 이즈 델리셔스니까!」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「あ～……んっ」"
translation = "「아~…… 암.」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「外はサクサク、中はしっとり！\u3000そしてめっちゃ甘い！\u3000美味しいよコレ！」"
translation = "「겉은 바삭, 속은 촉촉! 그리고 엄청 달아! 이거 맛있어!」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「会長くん、半分残ってるけど食べないの？\u3000食べないならもらっちゃうけど」"
translation = "「회장군, 반 남았는데 안 먹어? 안 먹으면 내가 먹어버린다?」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「……ケーキの後で苦しい？\u3000じゃあ会長くんのも食べちゃうよ？」"
translation = "「……케이크 먹은 뒤라 힘들어? 그럼 회장군 것도 내가 먹을게?」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「いいの？\u3000ありがとっ！\u3000んー、美味しー！」"
translation = "「괜찮아? 고마워! 음~ 맛있다!」"

[[dialogue]]
speaker = "unk"
original = "それから俺もから揚げドーナツにチャレンジしてみたのだが──"
translation = "그 후 나도 가라아게 도넛에 도전해 보았지만──"

[[dialogue]]
speaker = "unk"
original = "く、くるしい……"
translation = "커, 헉…… 배불러……"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「会長くん、大丈夫？\u3000もしかして甘いもの苦手だった？\u3000無理させちゃってごめんね」"
translation = "「회장군, 괜찮아? 혹시 단 거 잘 못 먹었어? 무리하게 해서 미안해.」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「グレープフルーツジュース飲む？\u3000口がスッキリするよ」"
translation = "「자몽 주스 마실래? 입안이 깔끔해질 거야.」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「……落ち着いてきた？\u3000ならよかった」"
translation = "「……좀 진정됐어? 그럼 다행이다.」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「じゃあそろそろ……聞いてもいいかな？」"
translation = "「그럼 슬슬…… 물어봐도 될까?」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「デートに誘うってことは、会長くんはあたしのこと……その……」"
translation = "「데이트 신청했다는 건 회장군은 나를…… 그……」"

[[dialogue]]
speaker = "unk"
original = "好きです"
translation = "좋아합니다."

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「言い切った！？\u3000めっちゃストレートに言うね！？」"
translation = "「단정 지어 말했어!? 엄청 스트레이트로 말하네!?」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「でもその……うん。あたしもね、君のこと、いいなって思ってる。惹かれてるんだと思う」"
translation = "「하지만 그…… 응. 나도 말이야, 널 좋게 생각하고 있어. 이끌리고 있다고 생각해.」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「あたしのこと、守りたいって言ってくれたのも、本当はすごく嬉しかった」"
translation = "「나를 지키고 싶다고 말해준 것도 사실은 정말 기뻤어.」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「でもね、君があたしのこと守りたいって思うのと同じくらい、あたしも君を守りたい」"
translation = "「하지만 말이야, 네가 나를 지키고 싶다고 생각하는 것만큼 나도 너를 지키고 싶어.」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「会長くんの方がずっと強いけど、それでも、この気持ちは本当なんだ」"
translation = "「회장군이 훨씬 강하지만, 그래도 이 마음은 진심이야.」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「あたしの気持ち、受け取ってくれる？」"
translation = "「내 마음, 받아줄래?」"

[[dialogue]]
speaker = "unk"
original = "おずおずと差し出された手を握る。思っていたより小さい、けれど温かい手だ。"
translation = "조심스레 내밀어진 손을 잡는다. 생각보다 작지만 따뜻한 손이다."

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「隙あり！」"
translation = "「빈틈 발견!」"

[[dialogue]]
speaker = "unk"
original = "手を強く引かれ、顔がすぐそばに近づいて。"
translation = "손을 강하게 끌어당겨 얼굴이 바로 곁으로 다가와서."

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「ちゅっ」"
translation = "「쪽」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「えへへ、キスしちゃった♪」"
translation = "「에헤헤, 키스해버렸다♪」"

[[dialogue]]
speaker = "unk"
original = "夕陽にシルヴィ先輩の笑顔が映える。"
translation = "석양에 실비 선배의 미소가 빛난다."

[[dialogue]]
speaker = "unk"
original = "これが俺たちの最初のキスになったのだった。"
translation = "이것이 우리들의 첫 키스가 된 것이었다."

