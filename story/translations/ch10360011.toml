[[dialogue]]
speaker = "unk"
original = "第１話,白昼の極星,P"
translation = "제1화, 백주의 극성, P"

[[dialogue]]
speaker = "unk"
original = "それはフィオナと知り合って、数日後のこと――"
translation = "그것은 피오나와 알게 되고, 며칠 뒤의 일──"

[[dialogue]]
speaker = "フィオナ"
original = "「失礼致します、緋宮会長。先日の戦闘の報告書を持って来ました」"
translation = "「실례하겠습니다, 히노미야 회장님. 지난번 전투의 보고서를 가져왔습니다」"

[[dialogue]]
speaker = "unk"
original = "ところで、そちらの方は……？"
translation = "그런데, 그쪽 분은……?"

[[dialogue]]
speaker = "unk"
original = "フィオナ、ありがとう"
translation = "피오나, 고마워"

[[dialogue]]
speaker = "フィオナ"
original = "「実は、こちらに来る途中でお会いしまして。そうしたら、流星寮の寮長として、緋宮会長に挨拶をしたいとのことで」"
translation = "「사실, 여기 오는 길에 만났거든요. 그랬더니, 유성 기숙사의 기숙사장으로서, 히노미야 회장님께 인사를 하고 싶다고 하셔서요」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「おーっほっほっほ！\u3000ごきげんよう。お初にお目に掛かりますわ、新星学園の会長」"
translation = "「오─홋홋홋! 평안하신가요. 처음 뵙겠습니다, 신성학원의 회장님」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「私は流星学園の３年生、<ruby>千園寺<rt>せんおんじ</rt></ruby>ヒルディオーネですわ！\u3000流星寮の寮長<ruby>『真昼の極星』<rt>エトワール・イルソーレ</rt></ruby>を務めておりますの」"
translation = "「저는 유성학원의 3학년, 키류인 힐디요네예요! 유성 기숙사의 기숙사장 『진일의 극성<rt>에투알 일소레</rt></ruby>』를 맡고 있답니다」"

[[dialogue]]
speaker = "unk"
original = "エトワール・イルソーレ……？"
translation = "에투알 일소레……?"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「生徒達から寮長へ、敬意を込めて呼ばれる二つ名ですわ。栄えある流星寮の伝統ですわね。私も誇りを持って名乗っておりますわ」"
translation = "「학생들이 기숙사장에게, 경의를 담아 부르는 이명이에요. 영광스러운 유성 기숙사의 전통이지요. 저도 자부심을 가지고 자칭하고 있답니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「千園寺先輩は流星学園において、星騎士の模範とも称されている方です。特に寮生からは『お姉様』と呼ばれて、尊敬されているんですよ」"
translation = "「센온지 선배님은 유성학원에서 별의 기사의 모범이라 칭송받는 분이에요. 특히 기숙사생들에게는 『언니분』이라 불리며 존경받고 있답니다」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「おーっほっほ、それ程でもありましてよ！\u3000私は千園寺家の令嬢として当然の、エレガントな振る舞いをしているだけですわ」"
translation = "「오─홋홋, 그 정도까지는 아니에요! 저는 센온지 가문의 영애로서 당연한, 엘레강트한 행동을 하고 있을 뿐이랍니다」"

[[dialogue]]
speaker = "unk"
original = "宇宙開発で有名な、あの千園寺……？"
translation = "우주 개발로 유명한, 그 센온지……?"

[[dialogue]]
speaker = "フィオナ"
original = "「はい。九浄家も名を連ねている流星市国『五名門』の１つで、宇宙開発企業の『千園寺ギャラクティック』が世界的にも有名ですね」"
translation = "「네. 쿠죠 가문도 이름을 올리고 있는 유성시국 『오명문』 중 하나로, 우주 개발 기업인 『센온지 갤럭틱』이 세계적으로도 유명하죠」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「さて、私の自己紹介はこれくらいでよろしいでしょう。今日来たのは、挨拶する為だけではありませんわ」"
translation = "「자, 제 자기소개는 이 정도로 해두죠. 오늘 온 것은, 인사하기 위해서만은 아니랍니다」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ズバリ、緋宮会長。貴方に宣戦布告をする為でしてよ！」"
translation = "「바로, 히노미야 회장님. 당신에게 선전포고를 하기 위해서예요!」"

[[dialogue]]
speaker = "unk"
original = "えぇっ！？"
translation = "에엣!?"

[[dialogue]]
speaker = "フィオナ"
original = "「千園寺先輩……！？\u3000私、そんなこと聞いていないんですが！？」"
translation = "「센온지 선배님……!? 저, 그런 이야기는 못 들었는데요!?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「先日の御前試合、私も映像で観させて頂きましたわ。新星学園最強と呼ばれる内の１人、九浄ヴィーナスに勝利したことには驚きましたが……」"
translation = "「지난번 어전 시합, 저도 영상으로 보았습니다. 신성학원 최강이라 불리는 이들 중 한 명, 쿠죠 비너스에게 승리한 것에는 놀랐습니다만……」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「それで調子に乗ってもらっては困りますわ！\u3000学園最強と称される者は他にもおりますのよ！\u3000まずはここにいる流星学園星徒会長である星見フィオナ！」"
translation = "「그걸로 우쭐해져서는 곤란하답니다! 학원 최강이라 칭해지는 자는 이외에도 있다고요! 우선 여기 있는 유성학원 성도회장인 호시미 피오나!」"

[[dialogue]]
speaker = "フィオナ"
original = "「ま、まあ、会長なので間違ってはないですけど……」"
translation = "「뭐, 뭐어, 회장이니까 틀린 말은 아니지만요……」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「それから私と対を為す<ruby>『宵闇の極星』<rt>エトワール・ラルーナ</rt></ruby>こと、新星寮の寮長である<ruby>妃竜院<rt>きりゅういん</rt></ruby>マハムート！」"
translation = "「그리고 저와 쌍을 이루는 『초저녁의 극성<rt>에투알 라 루나</rt></ruby>』이자, 신성 기숙사의 기숙사장인 키류인 마하무트!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「そして、マムと入学の頃からライバル関係にあるこの私、千園寺ヒルディオーネ！\u3000少なくとも私たちを破らぬ限り、最強の肩書きは名乗らせませんわ！」"
translation = "「그리고, 마무와 입학 시절부터 라이벌 관계에 있는 이 몸, 센온지 힐디요네! 적어도 우리들을 꺾지 않는 한, 최강이라는 칭호는 자칭하게 두지 않겠어요!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「御前試合の内容も、お粗末なもの！\u3000何度も無様に転がされ、ギリギリで力を覚醒させての逆転。エレガントとは程遠いですわ！」"
translation = "「어전 시합의 내용도 형편없었죠! 몇 번이나 꼴사납게 굴러다니다가, 마지막에 겨우 힘을 각성시켜서 역전이라니. 엘레강트와는 거리가 멀답니다!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「とはいえ、あの九浄ヴィーナスに勝ったのもまた事実！\u3000故に、貴方には特別に、この私と親交を結ぶことを許可しましてよ！\u3000光栄に思いなさい！」"
translation = "「하지만, 그 쿠죠 비너스에게 이긴 것도 사실! 고로, 당신에게는 특별히, 이 몸과 친교를 맺는 것을 허가하겠어요! 영광으로 아세요!」"

[[dialogue]]
speaker = "unk"
original = "え、えっと……？"
translation = "어, 그러니까……?"

[[dialogue]]
speaker = "フィオナ"
original = "「こ、これはつまり、千園寺先輩なりに緋宮会長を評価しているというか。友人になりましょう、というお誘いってことですよね……？」"
translation = "「그, 이건 그러니까, 센온지 선배님 나름대로 히노미야 회장님을 평가하고 있다고나 할까. 친구가 되자는 권유라는 뜻이죠……?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「は？\u3000何を言ってますの、フィオナ。友人に戦線布告などするわけがないでしょう！」"
translation = "「하? 무슨 소리를 하는 건가요, 피오나. 친구에게 선전포고 따위를 할 리가 없잖아요!」"

[[dialogue]]
speaker = "フィオナ"
original = "「あれぇ！？」"
translation = "「아레에!?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「……私はあの御前試合を見て、感じましたのよ。緋宮会長は人並みならぬ努力を重ねて、ここに立っている人間だと」"
translation = "「……저는 그 어전 시합을 보고 느꼈답니다. 히노미야 회장님은 남다른 노력을 거듭하여 이 자리에 서 있는 인간이라고」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「故に私は……貴方に問いますわ。緋宮会長は、<b>最強</b>というものに興味がありまして？」"
translation = "「고로 저는…… 당신에게 묻겠습니다. 히노미야 회장님은, <b>최강</b>이라는 것에 흥미가 있으신가요?」"

[[dialogue]]
speaker = "unk"
original = "興味はある"
translation = "흥미는 있어"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「それは、何故ですの……？」"
translation = "「그것은, 어째서인가요……?」"

[[dialogue]]
speaker = "unk"
original = "最強になれば、リクリエから皆を守れる"
translation = "최강이 되면, 리크리에로부터 모두를 지킬 수 있어"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「おーっほっほっほ、笑わせてくれますこと！\u3000しかし、落ち着いていて、それも本気の目ですわ」"
translation = "「오─홋홋홋, 웃겨주시는군요! 하지만, 침착하면서도 진심인 눈빛이네요」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「私の見立てはやはり、間違っていませんでしたわ。ならば貴方をやはり友人とは呼べませんわね！」"
translation = "「제 안목은 역시 틀리지 않았답니다. 그렇다면 당신을 역시 친구라고 부를 수는 없겠네요!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「緋宮会長、今日から貴方は、私と同じ最強を目指す<b>同志</b>ですわ！」"
translation = "「히노미야 회장님, 오늘부터 당신은, 저와 함께 최강을 목표로 하는 <b>동지</b>랍니다!」"

[[dialogue]]
speaker = "フィオナ"
original = "「えっと……つまり、これから仲良くしようってことですね！？」"
translation = "「그러니까…… 결국, 앞으로 사이좋게 지내자는 뜻이죠!?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ですわ！！！」"
translation = "「그렇답니다!!!」"

[[dialogue]]
speaker = "フィオナ"
original = "「ほっ……」"
translation = "「휴우……」"

[[dialogue]]
speaker = "unk"
original = "（通訳、大変そうだな……）"
translation = "(통역, 힘들겠네……)"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「どうやら緋宮会長の顔を見るに、私の言いたいことは伝わったようですわね？\u3000でも、宣戦布告というのは別に間違っておりませんのよ」"
translation = "「아무래도 히노미야 회장님의 얼굴을 보니, 제가 하고 싶은 말은 전달된 모양이네요? 하지만 선전포고라는 건 딱히 틀린 말이 아니랍니다」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「緋宮会長は『学園対抗杯』について、もうご存知かしら？」"
translation = "「히노미야 회장님은 『학원 대항배』에 대해 이미 알고 계시려나?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「流星学園と新星学園は毎年、モンスターの討伐戦績で実力を競い合っておりますの。すなわち、緋宮会長と私は、同志でありライバルということになりますわ」"
translation = "「유성학원과 신성학원은 매년, 몬스터 토벌 실적으로 실력을 겨루고 있답니다. 즉, 히노미야 회장님과 저는 동지이자 라이벌이라는 뜻이 되지요」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ちなみに、私が入学してからの２年間は、流星学園が連勝しておりますわ」"
translation = "「참고로, 제가 입학한 뒤 2년 동안은 유성학원이 연승하고 있답니다」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「今年も勿論、エレガントに勝たせて頂きますので。無様を晒したくなければ、御前試合の最後のように本気で来ることですわ」"
translation = "「올해도 물론, 엘레강트하게 이겨드릴 테니까요. 꼴사나운 모습을 보이기 싫다면, 어전 시합의 마지막처럼 진심으로 덤비는 거예요」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「それでは私、お先に失礼致しますわね」"
translation = "「그럼 전, 먼저 실례하겠어요」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「おーっほっほっほ！\u3000ごめんあそばせ！」"
translation = "「오─홋홋홋! 실례할게요!」"

[[dialogue]]
speaker = "unk"
original = "千園寺先輩、凄く面白い人だね"
translation = "센온지 선배, 정말 재밌는 사람이네"

[[dialogue]]
speaker = "フィオナ"
original = "「ええ、まあ……。でも、言葉選びがちょっと悪いだけで……本当に凄い人なんですよ」"
translation = "「네, 뭐어……. 하지만 단어 선택이 좀 나쁠 뿐이지…… 정말 대단한 분이에요」"

[[dialogue]]
speaker = "フィオナ"
original = "「お世辞でも何でもなく、２年間、学園対抗杯を勝利に導いて来た、流星学園が誇る<ruby>極星<rt>スター</rt></ruby>ですから」"
translation = "「빈말이 아니라 2년 동안 학원 대항배를 승리로 이끌어 온, 유성학원이 자랑하는 극성<rt>스타</rt></ruby>니까요」"

