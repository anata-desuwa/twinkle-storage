[[dialogue]]
speaker = "エンジュ"
original = "「誰かと思えば、魔王か……懲りずに毎日、毎日……今日は何しに来たんだ？\u3000差し入れなら大歓迎だ。それだけ置いて、とっとと帰れ」"
translation = "「누군가 했더니 마왕인가…… 지치지도 않고 매일, 매일…… 오늘은 뭐 하러 왔지? 간식거리라면 대환영이야. 그것만 두고 냉큼 돌아가.」"

[[dialogue]]
speaker = "unk"
original = "最初は警戒心むき出しで敵対していたエンジュだったが、幾度と会話を交える内に徐々に打ち解けていった。"
translation = "처음에는 경계심을 노골적으로 드러내며 적대하던 엔쥬였지만, 여러 번 대화를 나누는 사이에 서서히 마음을 열어갔다."

[[dialogue]]
speaker = "unk"
original = "言葉が通じる以上、何度も言葉を交わすことで想いを伝えることができる。"
translation = "말이 통하는 이상, 몇 번이고 대화를 나눔으로써 마음을 전할 수 있다."

[[dialogue]]
speaker = "unk"
original = "いつの間にやら、俺はエンジュの垣間見せる可愛らしさに心を射止められていたし、嬉しいことにどうやらそれはエンジュも同じだったようだ。"
translation = "어느샌가 나는 엔쥬가 언뜻 보여주는 사랑스러움에 마음을 빼앗겼고, 기쁘게도 그건 엔쥬 역시 마찬가지였던 모양이다."

[[dialogue]]
speaker = "エンジュ"
original = "「お前、本当におかしなヤツだよな……あたしみたいに可愛げのない女にアプローチしてどうすんだ……」"
translation = "「너, 정말 이상한 녀석이라니까…… 나같이 귀염성 없는 여자한테 대시해서 어쩌려고……」"

[[dialogue]]
speaker = "エンジュ"
original = "「星徒会にはあたしなんかよりずっと綺麗で、スタイルのいい女だっているってのにさ……バカ」"
translation = "「성도회에는 나보다 훨씬 예쁘고 몸매 좋은 여자도 널렸는데 말이야…… 바보.」"

[[dialogue]]
speaker = "クロト"
original = "「『あたしなんか』とか言うな。俺が好きなのは、エンジュだけなんだ」"
translation = "「『나 같은 거』라고 하지 마. 내가 좋아하는 건 엔쥬뿐이야.」"

[[dialogue]]
speaker = "エンジュ"
original = "「ズルいぞ、お前……あたしだって、お前のことが……その……す……き、嫌いじゃないよ」"
translation = "「치사해, 너…… 나도 너를…… 그…… 조…… 좋아, 싫어하지 않아.」"

[[dialogue]]
speaker = "エンジュ"
original = "「いつここからいなくなるかも、わかんないしさ……せめてもの想い出作りっていうのかな。あたしが好きっていうのが嘘じゃないなら──」"
translation = "「언제 여기서 사라질지도 모르니까…… 최소한의 추억 만들기라고 해야 할까. 내가 좋다는 게 거짓말이 아니라면──」"

[[dialogue]]
speaker = "エンジュ"
original = "「あたしを女にしてくれないか……？」"
translation = "「나를 여자로 만들어주지 않을래……?」"

[[dialogue]]
speaker = "unk"
original = "一瞬『女にする』という言葉の意味がわからず、思考がフリーズしてしまったが、理解したその後でもう一度、あまりの衝撃で時間が止まったような気がした。"
translation = "순간 『여자로 만든다』는 말의 의미를 파악하지 못해 사고가 정지해 버렸지만, 이해한 직후 너무나 큰 충격에 시간이 멈춘 듯한 기분이 들었다."

[[dialogue]]
speaker = "クロト"
original = "「え……い、いいのか……？」"
translation = "「어…… 이, 있어도 되는 거야……?」"

[[dialogue]]
speaker = "エンジュ"
original = "「ダメなら冗談でも言うわけないだろ。あたしだって、お前のこと、初めてをあげてもいいくらいには──」"
translation = "「안 될 거라면 농담으로라도 말할 리 없잖아. 나도 너라면 처음을 줘도 좋을 정도로──」"

[[dialogue]]
speaker = "エンジュ"
original = "「ああ、違う、そうじゃない……こういう時くらい、ちゃんと伝えないとな……」"
translation = "「아아, 아냐, 이게 아냐…… 이럴 때 정도는 제대로 전해야겠지……」"

[[dialogue]]
speaker = "エンジュ"
original = "「好きなお前に抱かれたい……あたしの体に、お前を刻んでほしいんだ」"
translation = "「좋아하는 너에게 안기고 싶어…… 내 몸에 너를 새겨줬으면 좋겠어.」"

[[dialogue]]
speaker = "エンジュ"
original = "「抱かれたいとは言ったけど、この格好はいくらなんでも……子供におしっこさせるみたいじゃないか……！？」"
translation = "「안기고 싶다고는 했지만, 이 자세는 아무리 그래도…… 어린애 소변 누이는 것 같지 않아……!?」"

[[dialogue]]
speaker = "unk"
original = "『あまり正面から見られるのは恥ずかしい』というエンジュの要望で、俺は背を向けた彼女を脚に乗せた。"
translation = "『너무 정면에서 보이는 건 부끄럽다』는 엔쥬의 요망에 따라, 나는 등을 돌린 그녀를 다리 위에 앉혔다."

[[dialogue]]
speaker = "クロト"
original = "「俺も初めてだから、入れる場所がよくわからなくて……」"
translation = "「나도 처음이라 넣는 곳을 잘 모르겠어서……」"

[[dialogue]]
speaker = "エンジュ"
original = "「魔王も初めてなのか……？\u3000周りにあれだけ綺麗な女がいて、何やってんだか……本当にあたしが初めての女で良いのかよ……」"
translation = "「마왕도 처음인 거냐……? 주변에 그렇게 예쁜 여자들을 두고 뭘 하는 건지…… 정말 내가 첫 여자여도 괜찮은 거냐고……」"

[[dialogue]]
speaker = "クロト"
original = "「初めては大好きなエンジュが良いんだ」"
translation = "「처음은 내가 제일 좋아하는 엔쥬가 좋아.」"

[[dialogue]]
speaker = "エンジュ"
original = "「んぁんっ……<emoji=heart04>\u3000耳元で囁くのやめろって……ぞわぞわするだろっ……んっ<emoji=heart04>\u3000あんまり調子に──んはぁぁ……<emoji=heart04>」"
translation = "「응아앗……<emoji=heart04> 귓가에서 속삭이지 말라니까…… 소름 돋잖아…… 응윽<emoji=heart04> 너무 신나서── 응하아아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "囁いただけでいい反応をしてくれるエンジュが可愛すぎる。うっかり暴発してしまいそうなほど張りつめている勃起を膣口の付近に添えた。"
translation = "속삭이는 것만으로도 좋은 반응을 보여주는 엔쥬가 너무 귀엽다. 깜빡 폭발해 버릴 정도로 팽팽해진 발기물을 보지 입구 근처에 갖다 대었다."

[[dialogue]]
speaker = "unk"
original = "性器同士が触れ合い、俺の先走りとエンジュの愛液、双方の分泌液が混ざり、くちゅりと小さく水音を鳴らす。"
translation = "성기끼리 맞닿고 나의 쿠퍼액과 엔쥬의 애액, 양측의 분비물이 섞이며 쿠츄릿 하고 작은 물소리를 낸다."

[[dialogue]]
speaker = "エンジュ"
original = "「あっ、ああ、その辺だ……あたしの、その……あそこは──って、ちょ、ちょっと待って……ペニスって、こんなにデカいのか！？\u3000ここに入るとは思えないんだが！？」"
translation = "「앗, 아아, 그쯤이다…… 나의, 그…… 거기는── 잠깐, 자, 잠시만 기다려…… 페니스라는 거 이렇게 큰 거야!? 여기에 들어갈 리가 없다고 생각하는데!?」"

[[dialogue]]
speaker = "クロト"
original = "「怖いなら、ここでやめるけど」"
translation = "「무섭다면 여기서 그만둘게.」"

[[dialogue]]
speaker = "エンジュ"
original = "「むっ……！\u3000バカを言うな……ここまでしておいて、何を今更……お前は我慢できるのか……？」"
translation = "「윽……! 바보 같은 소리 마…… 여기까지 해놓고 이제 와서 뭘…… 너는 참을 수 있는 거냐……?」"

[[dialogue]]
speaker = "クロト"
original = "「正直に言えば、今すぐエンジュとしたくてしょうがない」"
translation = "「솔직히 말하면 지금 당장 엔쥬와 하고 싶어서 견딜 수가 없어.」"

[[dialogue]]
speaker = "エンジュ"
original = "「そうだろうな──正直に言ってくれて、ありがとう。愛してるよ、魔王。あたしの初めて、もらってくれ……」"
translation = "「그렇겠지── 솔직하게 말해줘서 고마워. 사랑해, 마왕. 나의 처음, 가져가 줘……」"

[[dialogue]]
speaker = "エンジュ"
original = "「ふぅ、くぅ、うぅぅうぅぅぅぅぅんっ……！？」"
translation = "「후우, 쿠우, 으으으으으으으읏……!?」"

[[dialogue]]
speaker = "unk"
original = "抱えているエンジュをゆっくりと下ろすと、膣口に添えていたペニスは、温かなぬかるみの中へと埋まっていく。"
translation = "안고 있던 엔쥬를 천천히 내리자 보지 입구에 대고 있던 페니스가 따스한 진흙 속으로 파묻혀 들어간다."

[[dialogue]]
speaker = "エンジュ"
original = "「っく！？\u3000んぅ、はっ、はぁ……中で、なんか引っかかって……ひぅぐっ！？」"
translation = "「윽!? 응으, 하아, 하아…… 안에서 뭔가 걸려서…… 히으윽!?」"

[[dialogue]]
speaker = "unk"
original = "ペニスの尖端で柔らかな何かを引き裂いたような感触が微かに伝わる。おそらく、エンジュの乙女の証だろう。"
translation = "페니스의 끝부분에서 부드러운 무언가를 찢어발긴 듯한 감촉이 희미하게 전해진다. 아마도 엔쥬의 처녀의 증표일 것이다."

[[dialogue]]
speaker = "クロト"
original = "「エンジュ、大丈夫か……？\u3000痛くない……？」"
translation = "「엔쥬, 괜찮아……? 아프진 않아……?」"

[[dialogue]]
speaker = "エンジュ"
original = "「はぁっ、はひっ……はっ、らいじょうぶじゃ、にゃぃ……！\u3000ぶっとい棒があたしの中に入ってきたんだぞ……！\u3000痛いに決まってるだろ……！」"
translation = "「하아, 하히…… 하아, 개, 괜찮지 않아……! 굵다란 몽둥이가 내 안에 들어왔다고……! 아픈 게 당연하잖아……!」"

[[dialogue]]
speaker = "unk"
original = "俺を受け入れたエンジュは、大きく口を開け、口の端から唾液を垂らしながら激しく息をついていた。"
translation = "나를 받아들인 엔쥬는 입을 크게 벌리고 입가에 침을 흘리며 거칠게 숨을 몰아쉬고 있었다."

[[dialogue]]
speaker = "unk"
original = "申し訳ないと思う反面、エンジュの初めての男になれた嬉しさに体が震える。"
translation = "미안하다는 생각 한편으로 엔쥬의 첫 남자가 되었다는 기쁨에 몸이 떨린다."

[[dialogue]]
speaker = "エンジュ"
original = "「はぁ、はっ……でも、このくらいの痛みと血なら慣れっこだ……全っ然、耐えられる……」"
translation = "「하아, 하아…… 하지만 이 정도 통증이랑 피라면 익숙해…… 저언혀, 견딜 수 있어……」"

[[dialogue]]
speaker = "エンジュ"
original = "「お前があたしを女にしてくれたこの痛み……不思議と、嬉しさすら感じてるよ……一生、忘れてやらないからな、ふふ」"
translation = "「네가 나를 여자로 만들어준 이 고통…… 신기하게도 기쁨마저 느껴져…… 평생 잊어주지 않을 거니까, 후후.」"

[[dialogue]]
speaker = "エンジュ"
original = "「はぁ、はっ……あたしを気遣ってくれるのは嬉しいけど、お前はどうなんだ……？\u3000その……ペニスは、きもち、よくなれてるのか……？」"
translation = "「하아, 하아…… 나를 배려해 주는 건 기쁘지만 너는 어때……? 그…… 페니스는 기부, 기분 좋아졌어……?」"

[[dialogue]]
speaker = "クロト"
original = "「ああ……エンジュの膣内、アツくて、締めつけてきて、最高に気持ちいい……！」"
translation = "「아아…… 엔쥬의 질 내부, 뜨겁고 꽉 조여와서 최고로 기분 좋아……!」"

[[dialogue]]
speaker = "unk"
original = "痛みに耐えているエンジュに申し訳ないと思う以上に、初めて挿入した女性器の官能的な感触と温もりに一瞬で溺れてしまった。"
translation = "통증을 견디고 있는 엔쥬에게 미안한 마음보다, 처음 삽입한 여성기의 관능적인 감촉과 온기에 순식간에 빠져버리고 말았다."

[[dialogue]]
speaker = "エンジュ"
original = "「んっ……そうか、あたしでも、お前の役に立てるんだな……はぁ、んくぅっ……！」"
translation = "「응윽…… 그런가, 나라도 네게 도움이 되는구나…… 하아, 응쿠웃……!」"

[[dialogue]]
speaker = "エンジュ"
original = "「ただ入れてるだけじゃペニスは気持ちよくならないんだろう……？\u3000あたしの体は気にしなくていいからさ。お前の好きなように動け……」"
translation = "「그냥 넣고만 있어서는 페니스가 기분 좋아지지 않잖아……? 내 몸은 신경 쓰지 않아도 되니까. 네 마음대로 움직여……」"

[[dialogue]]
speaker = "unk"
original = "我慢が限界に達していた俺は、言葉に甘えてペニスをより深くへと沈める。"
translation = "참을성이 한계에 달했던 나는 그 말에 응석 부리듯 페니스를 더욱 깊숙이 가라앉힌다."

[[dialogue]]
speaker = "エンジュ"
original = "「んぁあぁぁぁ……！\u3000深くまで、入ってきたぁっ……あっ、んぁ、お腹が、広げられてっ……なんだ、この感触は……！？」"
translation = "「응아아아아……! 깊은 곳까지 들어왔어앗…… 앗, 응아, 배가 벌려져서…… 뭐야, 이 감촉은……!?」"

[[dialogue]]
speaker = "エンジュ"
original = "「お前のペニスで……あたしの中が満たされて……お前の色に、染め上げられている、みたいな……ふぁぁん……<emoji=heart04>」"
translation = "「네 페니스로…… 내 안이 가득 차서…… 네 색깔로 물들어가는 것 같은…… 화아앙……<emoji=heart04>」"

[[dialogue]]
speaker = "エンジュ"
original = "「んぁっ……！？\u3000あたしの中で、ペニスが更に膨らんだぞ……どうなってるんだ、男の体というのは──」"
translation = "「응앗……!? 내 안에서 페니스가 더 부풀어 올랐어…… 어떻게 된 거야, 남자의 몸이라는 건──」"

[[dialogue]]
speaker = "クロト"
original = "「エンジュ、ちょっとお願いしてもいい？」"
translation = "「엔쥬, 부탁 하나만 해도 될까?」"

[[dialogue]]
speaker = "エンジュ"
original = "「な、なんだ……？\u3000ここまでされてたら、今更お願いのひとつやふたつ──なっ……！？」"
translation = "「뭐, 뭐야……? 여기까지 당했으면 이제 와서 부탁 한두 개쯤은── 낫……!?」"

[[dialogue]]
speaker = "unk"
original = "俺のお願いの耳打ちに、エンジュの体がびくんと跳ねた。"
translation = "내 부탁의 귓속말에 엔쥬의 몸이 비쿠운 하고 튀어 올랐다."

[[dialogue]]
speaker = "エンジュ"
original = "「お、お前は、本当にバカだな……ただの言葉だし、べ、別に構わないが……んっ……」"
translation = "「너, 너는 정말 바보구나…… 그냥 말일 뿐이고, 별, 별로 상관없지만…… 응윽……」"

[[dialogue]]
speaker = "エンジュ"
original = "「ああ……お、お前の、ち○ぽ……大きく膨らんで……あたしのおま○こ、擦って、る……！」"
translation = "「아아…… 너, 너의 자지…… 크게 부풀어서…… 내 보지, 문지르고, 있어……!」"

[[dialogue]]
speaker = "エンジュ"
original = "「ったく……『性器の名前を具体的に言え』とか……あたしの恋人は思っていた以上に変態なんだな」"
translation = "「정말이지…… 『성기의 이름을 구체적으로 말해라』라니…… 내 연인은 생각했던 것보다 변태였구나.」"

[[dialogue]]
speaker = "クロト"
original = "「エンジュがエロいことを言ってくれると、思っていた以上に、クるな……！」"
translation = "「엔쥬가 야한 말을 해주니까 생각했던 것보다 더 반응이 오네……!」"

[[dialogue]]
speaker = "エンジュ"
original = "「ふ、ふんっ、たかが恥ずかしい言葉ひとつで、お前が興奮するなら──んぁっ<emoji=heart04>\u3000ますますち○ぽが硬くなった……！」"
translation = "「후, 훗, 고작 부끄러운 말 한마디에 네가 흥분한다면── 응앗<emoji=heart04> 점점 자지가 딱딱해졌어……!」"

[[dialogue]]
speaker = "エンジュ"
original = "「あたしのおま○こは、そんなにいいのか……？\u3000単純なヤツめっ……ちょっと可愛いじゃないか、ふふ<emoji=heart04>」"
translation = "「내 보지가 그렇게 좋은 거야……? 단순한 녀석 같으니…… 조금 귀엽잖아, 후후<emoji=heart04>」"

[[dialogue]]
speaker = "エンジュ"
original = "「んっ、んぁ……んぅふっ……<emoji=heart04>\u3000えっ……？\u3000ちょ、ちょっと、待って……お前のち○ぽで擦られているところが……きもちいい、かも……？」"
translation = "「응윽, 응아…… 응으후……<emoji=heart04> 엣……? 자, 잠깐 기다려…… 네 자지로 문질러지는 곳이…… 기분 좋을지도……?」"

[[dialogue]]
speaker = "unk"
original = "エンジュのおへその裏辺りを角度をつけて擦ると──"
translation = "엔쥬의 배꼽 뒤쪽 언저리를 각도를 주어 문지르자──"

[[dialogue]]
speaker = "エンジュ"
original = "「んふあぁっ！？<emoji=heart04>\u3000や、あっ、な、なんだ、そこ……ぞくぞくして、きもち、いいっ……<emoji=heart04>」"
translation = "「응후아앗!?<emoji=heart04> 야, 앗, 뭐, 뭐야 거기…… 소름 돋고 기부운 좋아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "亀頭に擦れるざらざらとした膣壁の感触は、エンジュにとっても、俺にとっても極上の快感をもたらしてくれる。"
translation = "귀두에 스치는 까슬까슬한 질벽의 감촉은 엔쥬에게도 나에게도 극상의 쾌감을 안겨준다."

[[dialogue]]
speaker = "エンジュ"
original = "「う、嘘だろっ……初めてなのに……こんなすぐにきもちよくなっちゃうとか……スケベな女みたいじゃないかぁ……<emoji=heart04>」"
translation = "「거, 거짓말이지…… 처음인데…… 이렇게 금방 기분 좋아져 버리다니…… 음란한 여자 같잖아아……<emoji=heart04>」"

[[dialogue]]
speaker = "エンジュ"
original = "「いやらしい言葉を言わされたからじゃないからなっ……あたしはそんな単純な女じゃ……はっ、んぁぁ……<emoji=heart04>」"
translation = "「상스러운 말을 하게 해서 그런 게 아니니까앗…… 나는 그렇게 단순한 여자가…… 하아, 응아아……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「気持ちよくなってるエンジュの可愛い声、もっと聴きたいな」"
translation = "「기분 좋아진 엔쥬의 귀여운 목소리, 더 듣고 싶은데.」"

[[dialogue]]
speaker = "エンジュ"
original = "「なっ……！\u3000恥ずかしいこと言うなっ！\u3000あたしなんて、か、可愛く、ないだろっ……！」"
translation = "「낫……! 부끄러운 소리 하지 마앗! 나 같은 거 기, 귀엽지 않잖아앗……!」"

[[dialogue]]
speaker = "クロト"
original = "「可愛いよ、今のエンジュ、すっごく可愛い……！」"
translation = "「귀여워, 지금의 엔쥬 정말 귀여워……!」"

[[dialogue]]
speaker = "エンジュ"
original = "「バカっ……かわいい、かわいいって何度も言うな……その気になるだろ……勘違いさせるな……ぁんっ<emoji=heart04>」"
translation = "「바보…… 귀엽다, 귀엽다 몇 번이나 말하지 마…… 그런 기분이 들잖아…… 착각하게 만들지 마…… 아앙<emoji=heart04>」"

[[dialogue]]
speaker = "エンジュ"
original = "「んぁ、やっぱ、きもちいいっ……ひとりでするより全っ然、いいっ……んぁあぁっ<emoji=heart04>\u3000そんなとこ触ったことないっ……こんなきもひいいの知らなぁいっ……<emoji=heart04>」"
translation = "「응아, 역시 기분 좋아…… 혼자 하는 것보다 저언혀 좋아…… 응아아앗<emoji=heart04> 그런 곳 만져본 적 없어앗…… 이런 기분 좋은 거 몰라앗……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「エンジュもオナニーするんだ……！？」"
translation = "「엔쥬도 자위해……!?」"

[[dialogue]]
speaker = "エンジュ"
original = "「はぁっ……！？\u3000あ、当たり前だろっ、あたしだって、興奮したらひとりで慰めること、くらいっ……<emoji=heart04>」"
translation = "「하아……!? 다, 당연하잖아, 나도 흥분하면 혼자서 달래는 것 정도는……<emoji=heart04>」"

[[dialogue]]
speaker = "エンジュ"
original = "「お前だって、ひとりでち○ぽ扱いてんだろ──ひぅ、んっ、ふぁ、んぅふぅうぅぅっ<emoji=heart04>」"
translation = "「너도 혼자서 자지 만지잖아── 히으, 응윽, 후아, 응으후우우읏<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「エンジュのおま○こ、自分の手で扱くより、ずっとずっと気持ちいいよ……」"
translation = "「엔쥬의 보지, 내 손으로 만지는 것보다 훨씬 훨씬 기분 좋아……」"

[[dialogue]]
speaker = "エンジュ"
original = "「ひぁぁ……だから、耳元で囁くなぁっ……<emoji=heart04>\u3000あたしだって……お前のち○ぽで、おかひくなるっ……<emoji=heart04>\u3000ふぁぁっ……セックスって、こんなにすごかったのかぁ……<emoji=heart04>」"
translation = "「히아아…… 그러니까 귓가에서 속삭이지 말라니까아……<emoji=heart04> 나도…… 네 자지 때문에 이상해져어……<emoji=heart04> 화아앗…… 섹스라는 거 이렇게 대단한 거였냐아……<emoji=heart04>」"

[[dialogue]]
speaker = "エンジュ"
original = "「う、うぅうぅぅ……お願いっ、もっと、もっと、おま○こ、きもちよく、ひてっ……<emoji=heart04>\u3000お前と、きもちよく、なり、たいっ……<emoji=heart04>」"
translation = "「우, 으으으으…… 부탁이야, 더, 더 보지 기분 좋게 해줘어……<emoji=heart04> 너랑 기분 좋아지고 싶어어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "さっきまで恥じらって、まともに口にすることもできなかった性器の名称も、蕩けきった口からはボロボロ溢れ出る。"
translation = "조금 전까지 부끄러워하며 제대로 입에 담지도 못했던 성기의 명칭도 쾌락에 녹아버린 입술 사이로 뚝뚝 흘러나온다."

[[dialogue]]
speaker = "unk"
original = "おねだりするエンジュが愛おしくて、俺は彼女の体を抱え上げながら、激しく突き上げた。"
translation = "조르는 엔쥬가 사랑스러워서 나는 그녀의 몸을 안아 올리며 격렬하게 쳐올렸다."

[[dialogue]]
speaker = "エンジュ"
original = "「んぁっ<emoji=heart04>\u3000あ、あぁっ<emoji=heart04>\u3000あっ、あっ、ぅあぁあぁん<emoji=heart04>\u3000知らにゃいっ、こんなの知らにゃいっ<emoji=heart04>\u3000おかひく、頭っ、おかひくなっちゃうだろぉっ<emoji=heart04>」"
translation = "「응앗<emoji=heart04> 아, 아앗<emoji=heart04> 앗, 앗, 우아아아앙<emoji=heart04> 몰라아, 이런 거 몰라아<emoji=heart04> 이상해져, 머리, 이상해져 버린다구우웃<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスが子宮口を小突くテンポに合わせて、甲高い喘ぎが漏れた。"
translation = "페니스가 자궁구를 쿡쿡 찌르는 템포에 맞춰 날카로운 신음이 새어 나왔다."

[[dialogue]]
speaker = "unk"
original = "エンジュの喘ぎから感じられるのはもう甘さだけ。初めてのセックスの気持ちよさ以上に、クールなエンジュがこんなにも感じてくれてるのは嬉しすぎる想定外だった。"
translation = "엔쥬의 신음에서 느껴지는 것은 이제 달콤함뿐. 첫 섹스의 기분 좋음 이상으로 쿨한 엔쥬가 이렇게나 느껴주고 있는 것은 너무나 기쁜 예상 밖의 일이었다."

[[dialogue]]
speaker = "エンジュ"
original = "「んぁ、ぁはっ、きもひいいっ<emoji=heart04>\u3000おま○こ、おま○こきもひいいっ<emoji=heart04>\u3000魔王っ、もっと<emoji=heart04>\u3000もっと、ち○ぽずんずんしへっ<emoji=heart04>\u3000あたしの体、壊してぇっ<emoji=heart04>」"
translation = "「응아, 아핫, 기부운 좋아아<emoji=heart04> 보지, 보지 기부운 좋아아<emoji=heart04> 마왕, 더<emoji=heart04> 더 자지 푹푹 해줘어<emoji=heart04> 내 몸 망가뜨려줘어앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "脳ミソが蕩けてしまいそうなおねだりを受けて、ピストンが限界まで加速する。"
translation = "뇌가 녹아버릴 듯한 애원을 받으며 피스톤이 한계까지 가속한다."

[[dialogue]]
speaker = "エンジュ"
original = "「んぁあっ！？\u3000激ひっ<emoji=heart04>\u3000ち○ぽっ、ち○ぽ激しくなったぁ<emoji=heart04>\u3000あっ、あっ、あっ、もっときもひいいのぉ<emoji=heart04>」"
translation = "「응아앗!? 격렬해앳<emoji=heart04> 자지, 자지 격렬해졌어어<emoji=heart04> 앗, 앗, 앗, 더 기분 좋은 거어어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスを出し入れする度、白く泡だった愛液が掻き出され、俺とエンジュの交わり合う匂いが部屋に満ちる。"
translation = "페니스를 넣고 뺄 때마다 하얗게 거품 일어난 애액이 긁혀 나오고, 나와 엔쥬의 섞여드는 냄새가 방안에 가득 찬다."

[[dialogue]]
speaker = "unk"
original = "この部屋は監視されているかもしれないが、誰に覗かれていようが、どんな邪魔が入ろうが、ここまで来たら止められやしない。"
translation = "이 방은 감시되고 있을지도 모르지만, 누가 엿보고 있든 어떤 방해가 들어오든 여기까지 오면 멈출 수 없다."

[[dialogue]]
speaker = "エンジュ"
original = "「んぁ、あっ、あっ<emoji=heart04>\u3000魔王、魔王ぉっ……<emoji=heart04>\u3000しゅき、らいしゅきぃっ……<emoji=heart04>\u3000ち○ぽも、セックスもしゅきっしゅきしゅきぃっ……<emoji=heart04>」"
translation = "「응아, 앗, 앗<emoji=heart04> 마왕, 마왕어엇……<emoji=heart04> 좋아해, 정말 좋아해애……<emoji=heart04> 자지도 섹스도 좋아 좋아 좋아애애……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "初めてで勢い任せな俺のセックスを、小さな体でしっかりと受け止めてくれるエンジュがただただ愛おしい。"
translation = "처음이라 기세에만 맡긴 나의 섹스를 작은 몸으로 꿋꿋이 받아주는 엔쥬가 그저 사랑스럽기만 하다."

[[dialogue]]
speaker = "エンジュ"
original = "「お前のち○ぽが、あたしのおま○こできもちよぉくなってくれるの、すっごく嬉ひいぁ……♪」"
translation = "「네 자지가 내 보지에서 기분 좋아져 주는 거 정말 기뻐어……♪」"

[[dialogue]]
speaker = "エンジュ"
original = "「はっ、はぁん<emoji=heart04>\u3000魔王、あたしのおま○こ、きもひいい？\u3000ちゃんとイケそう？\u3000精子出せそ？」"
translation = "「하아, 하앙<emoji=heart04> 마왕, 내 보지 기분 좋아? 제대로 갈 것 같아? 정자 낼 수 있겠어?」"

[[dialogue]]
speaker = "unk"
original = "派手な水音を鳴らして陰部を擦り合わせる度、快感の電気が全身を駆け巡る。限界を向かえるまで、そう遠くない。"
translation = "요란한 물소리를 내며 음부를 문지릴 때마다 쾌감의 전기가 온몸을 휘감는다. 한계를 맞이하기까지 그리 멀지 않았다."

[[dialogue]]
speaker = "エンジュ"
original = "「んっ、いいぉ……<emoji=heart04>\u3000おま○こ突いて、もっともぉっときもちよくなって……魔王の精子、あたしの奥に、たぁっぷり出していいからなっ……<emoji=heart04>」"
translation = "「응윽, 좋아아……<emoji=heart04> 보지 찔러서 더 더어 기분 좋아져줘…… 마왕의 정자 내 깊숙한 곳에 듬뿌욱 내도 되니까앗……<emoji=heart04>」"

[[dialogue]]
speaker = "エンジュ"
original = "「ぜんぶぜぇんぶっ、あたしのお腹に、子宮に出してっ……<emoji=heart04>\u3000このまま、欲しいっ、魔王の全部が欲しいっ……<emoji=heart04>」"
translation = "「전부 전부우, 내 배에, 자궁에 내줘어……<emoji=heart04> 이대로 갖고 싶어, 마왕의 전부를 갖고 싶어어……<emoji=heart04>」"

[[dialogue]]
speaker = "エンジュ"
original = "「んぁあっ<emoji=heart04>\u3000もっと、もっとぉっ<emoji=heart04>\u3000ごんごん、突いてっ<emoji=heart04>\u3000おま○こっ、壊れちゃうくらい、んっ<emoji=heart04>\u3000強く、強くシてっ<emoji=heart04>」"
translation = "「응아앗<emoji=heart04> 더, 더어엇<emoji=heart04> 퍽퍽 찔러줘어<emoji=heart04> 보지, 망가져 버릴 정도로, 응윽<emoji=heart04> 강하게, 강하게 해줘어앗<emoji=heart04>」"

[[dialogue]]
speaker = "エンジュ"
original = "「あっ、は、ふぁっ！\u3000あっ、あん、ぁんッ……ああぁっ<emoji=heart04>\u3000イク、イクッ……しゅき、しゅきっ、だいしゅきぃっ<emoji=heart04>」"
translation = "「앗, 하, 후앗! 앗, 아앙, 아앙…… 아아앗<emoji=heart04> 가, 간다앗…… 좋아해, 좋아해, 정말 좋아해애……<emoji=heart04>」"

[[dialogue]]
speaker = "エンジュ"
original = "「はぁ、んっ……離れちゃやだぁっ<emoji=heart04>\u3000ぜったい、あたしを離さないでっ……<emoji=heart04>\u3000おま○こアツくぅ、ひゃっ、やっ<emoji=heart04>\u3000あ、っはぁ、んぁ、あ、ああ、あぁあぁっ<emoji=heart04>」"
translation = "「하아, 응윽…… 떨어지면 안 돼애……<emoji=heart04> 절대 나를 놓지 말아줘어……<emoji=heart04> 보지 뜨거워어, 히얏, 얏<emoji=heart04> 아, 하아, 응아, 아, 아아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺も絶頂に至る合図だとばかりに、甘えてくる彼女を強く抱きしめながら、最も深い一突きを子宮口に叩きつけた。"
translation = "나 역시 절정에 달한다는 신호인 양 매달려오는 그녀를 강하게 껴안으며 가장 깊숙한 일격을 자궁구에 때려 박았다."

[[dialogue]]
speaker = "エンジュ"
original = "「あっ、あぁっ、はぁあぁんっ<emoji=heart04>\u3000んぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000おま○こ、おま○こイクッ、ち○ぽでイカされぢゃうぅっ<emoji=heart04>」"
translation = "「앗, 아앗, 하아아앙앗<emoji=heart04> 응앗<emoji=heart04> 앗<emoji=heart04> 보지, 보지 가, 자지로 가게 돼버려어엇<emoji=heart04>」"

[[dialogue]]
speaker = "エンジュ"
original = "「んぁっ、やっ、やぁっ<emoji=heart04>\u3000んふぁ、あぁうぅっ<emoji=heart04>\u3000はぁあぁんっ<emoji=heart04>\u3000おま○こすごいの、すごいの、クるぅうぅっ<emoji=heart04>」"
translation = "「응앗, 얏, 야앗<emoji=heart04> 응화, 아아우웃<emoji=heart04> 하아아앙앗<emoji=heart04> 보지 대단한 거, 대단한 거 와아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "エンジュ"
original = "「ひぁっ<emoji=heart04>\u3000あっ、あっ、んぅんぅんっ<emoji=heart04>\u3000イク、イグッ、イクイクイッグぅううぅぅぅぅぅぅっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「히앗<emoji=heart04> 앗, 앗, 응으응으응윽<emoji=heart04> 가, 간다앗, 간다간다 가버려어어어어어어어어엇<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "エンジュ"
original = "「ふぁ、あ――んぁはぁあああぁあぁぁっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「화, 아── 응아하아아아아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "エンジュの膣道をみっちりと塞いでるペニスは激しく脈打ち、直後、億単位の子種がエンジュの子宮を満たした。"
translation = "엔쥬의 질도를 빽빽하게 막고 있는 페니스는 격렬하게 맥동하고, 직후 억 단위의 씨앗이 엔쥬의 자궁을 채웠다."

[[dialogue]]
speaker = "エンジュ"
original = "「んぁっ<emoji=heart04>\u3000はっ、はぁ、あぁっ……<emoji=heart04>\u3000んぁっ、すっごぉ……お腹で、ち○ぽっ<emoji=heart04>\u3000びくびく、跳ねてるの……わかるぅ……<emoji=heart04>」"
translation = "「응앗<emoji=heart04> 하, 하아, 아앗……<emoji=heart04> 응앗, 굉장해어…… 배에서 자지가아<emoji=heart04> 파르르 떨리는 거…… 느껴져어……<emoji=heart04>」"

[[dialogue]]
speaker = "エンジュ"
original = "「どくん、どくんって、いっぱい、いっぱぁい<emoji=heart04>\u3000魔王の精子、出てるぅ……中に、どぷどぷ、出ちゃってるぅ……<emoji=heart04>」"
translation = "「울컥, 울컥 하고 많이, 마아아니이<emoji=heart04> 마왕의 정자 나오고 있어어…… 안에 듬뿍듬뿍 나와버리고 있어어……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「くっ、エンジュのおま○こ、締めつけすぎっ……！」"
translation = "「큭, 엔쥬의 보지 너무 조여……!」"

[[dialogue]]
speaker = "エンジュ"
original = "「お前のち○ぽがおっきすぎるせいだろぉ……はぁぁ……すぅっごく、きもちいい……<emoji=heart04>\u3000こんなきもちいいことが、世の中にあるんだな……<emoji=heart04>」"
translation = "「네 자지가 너무 크기 때문이잖아아…… 하아아…… 저어엉말 기분 좋아……<emoji=heart04> 이런 기분 좋은 일이 세상에 있구나……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ここまで強烈すぎる射精は、今までに経験したことがない。失神しないよう、意識を保つだけで精一杯。頭がどうにかなりそうだった。"
translation = "지금까지 겪어본 적 없는 강렬한 사정이었다. 실신하지 않도록 의식을 유지하는 것만으로도 벅찼다. 머리가 어떻게 될 것 같았다."

[[dialogue]]
speaker = "エンジュ"
original = "「んんっ……どれだけ出すつもりだよ……初めてでいきなり、あたしを孕ませちゃうつもりか……？\u3000はあぁん……<emoji=heart04>」"
translation = "「응응…… 얼마나 낼 생각인 거야…… 처음부터 갑자기 나를 임신시켜버릴 셈이냐……? 하아앙……<emoji=heart04>」"

[[dialogue]]
speaker = "エンジュ"
original = "「んっ……<emoji=heart04>\u3000ち○ぽ抜けちゃった……こんなに大きいのが、あたしの中に入ってたなんて、まだ信じられないよ……」"
translation = "「응윽……<emoji=heart04> 자지 빠져버렸어…… 이렇게 큰 게 내 안에 들어있었다니 아직도 믿기지 않아……」"

[[dialogue]]
speaker = "unk"
original = "役目を終えたペニスがエンジュの膣内からずるりと抜け、ぽっかり開いた膣穴は白濁の粘液を滴らせていた。"
translation = "역할을 마친 페니스가 엔쥬의 질 안에서 주르륵 빠지고, 뻥 뚫린 질 구멍에서는 백탁의 점액이 뚝뚝 떨어지고 있었다."

[[dialogue]]
speaker = "エンジュ"
original = "「はぁぁ……お腹の奥が、あったかい……これが魔王の温もりなんだな……<emoji=heart04>」"
translation = "「하아아…… 배 속 깊은 곳이 따뜻해…… 이게 마왕의 온기구나……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "絶頂を終えても、エンジュの目はとろんと夢見るように蕩けたまま、半開きの唇は緩んでいた。"
translation = "절정을 마친 뒤에도 엔쥬의 눈은 꿈을 꾸듯 흐리멍덩하게 녹아 있었고, 반쯤 벌어진 입술은 느슨하게 풀려 있었다."

[[dialogue]]
speaker = "クロト"
original = "「ありがとう、エンジュ……最高の初体験だった……」"
translation = "「고마워, 엔쥬…… 최고의 첫 경험이었어……」"

[[dialogue]]
speaker = "エンジュ"
original = "「あたしもだよ……ありがと。まさか、お前とこんな関係になるだなんて……な。出会った頃には夢にも思ってなかったよ」"
translation = "「나도야…… 고마워. 설마 너랑 이런 관계가 될 줄이야…… 말이지. 처음 만났을 땐 꿈에도 생각 못 했어.」"

[[dialogue]]
speaker = "エンジュ"
original = "「人と肌を重ねるのが、こんなにも心地いいなんて……こうやって、触れ合うのも、悪くないもんだな……<emoji=heart04>」"
translation = "「사람과 몸을 겹치는 게 이렇게나 기분 좋을 줄이야…… 이렇게 서로 맞닿는 것도 나쁘지 않네……<emoji=heart04>」"

[[dialogue]]
speaker = "エンジュ"
original = "「ね、魔王、ぎゅーってして……」"
translation = "「있지, 마왕, 꽉 안아줘……」"

[[dialogue]]
speaker = "unk"
original = "まだ火照りの残る彼女の体を背後から強めに抱きしめる。"
translation = "아직 열기가 남은 그녀의 몸을 뒤에서 강하게 끌어안았다."

[[dialogue]]
speaker = "エンジュ"
original = "「はぁ……はぁっ、しゅきぃ……だぁいしゅきぃっ……<emoji=heart04>\u3000また、あたしとセックス、してくれる……？」"
translation = "「하아…… 하아, 좋아해…… 정말 좋아해애……<emoji=heart04> 또 나랑 섹스 해줄 거야……?」"

[[dialogue]]
speaker = "クロト"
original = "「いつでも。喜んで」"
translation = "「언제든지. 기꺼이.」"

[[dialogue]]
speaker = "エンジュ"
original = "「やったぁ……えへへへ……<emoji=heart04>」"
translation = "「얏호…… 에헤헤헤……<emoji=heart04>」"

