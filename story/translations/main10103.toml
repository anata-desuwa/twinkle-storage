[[dialogue]]
speaker = "unk"
original = "第３話,はじめてのアステラ,B"
translation = "제3화, 첫 아스테라, B"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「私たちの星徒会、最初の行事は──」"
translation = "「우리 성도회의 첫 행사는──」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「新入生歓迎会よ！」"
translation = "「신입생 환영회야!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「未来の新星学園を担う新入生たちを、盛大に歓迎するわ！\u3000一生忘れられない想い出にするわよ！」"
translation = "「미래의 신성학원을 짊어질 신입생들을 성대하게 환영할 거야! 평생 잊지 못할 추억으로 만들어 주겠어!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「去年は私たちがやったのよね～。ヴィーナスちゃん、マトイちゃん、どうだった？」"
translation = "「작년에는 우리가 했었지~. 비너스짱, 마토이짱, 어땠니?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「サーシャさんの星徒会長挨拶が印象的でした。凛としてて、素敵な会長さんだって思いました」"
translation = "「사샤 씨의 성도회장 인사가 인상적이었어요. 늠름해서 멋진 회장님이라고 생각했어요.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あらあら、嬉しいわ～♪」"
translation = "「어라라, 기쁘네~♪」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「他には、学園での生活を紹介したり、体育祭や文化祭といった年間行事の伝達……あと各部活動によるデモンストレーションなどですね」"
translation = "「그 외에는 학원 생활 소개나 체육대회, 문화제 같은 연간 행사 전달…… 그리고 각 동아리의 데먼스트레이션 등이었죠.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「毎年やっていることですし、記録も残ってますから、段取り通りに進めれば、それなりに盛り上が――」"
translation = "「매년 하는 일이고 기록도 남아 있으니까, 절차대로 진행하면 어느 정도 달아오를──」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「段取り通り？\u3000それなり？\u3000そんなの面白くないわ！」"
translation = "「절차대로? 어느 정도? 그런 건 재미없어!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「今までとは一味も七味も違う星徒会だというところを、発足最初のイベントで学園中に見せつけるの！」"
translation = "「지금까지와는 한 맛도 일곱 맛도 다른 성도회라는 걸, 발족 첫 이벤트에서 학원 전체에 보여주는 거야!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「星徒会は唐辛子じゃないです！」"
translation = "「성도회는 고춧가루가 아니에요!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「スーパーミラクル面白イベントができないかしら？\u3000素晴らしいアイデアをちょうだい。例えば……そうね、流星市国フルマラソンとか！」"
translation = "「슈퍼 미라클 재미있는 이벤트 없을까? 멋진 아이디어를 줘. 예를 들어…… 그래, 유성시국 풀 마라톤이라든가!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「入ったばかりの新入生に過酷すぎません！？」"
translation = "「막 들어온 신입생에게 너무 가혹하지 않나요!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「平等に在校生全員強制参加にするわ！」"
translation = "「평등하게 재학생 전원 강제 참가로 할 거야!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「支持率大暴落待ったなしです！」"
translation = "「지지율 대폭락 확정이에요!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「もっと見ているだけでも、楽しめる物の方が良いんじゃないかしら～」"
translation = "「좀 더 보기만 해도 즐길 수 있는 게 좋지 않을까~」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それならサーカスなんてどうかしら！」"
translation = "「그럼 서커스는 어떨까!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「サーカス団でも呼ぶんですか？\u3000突然のオファーは難しいと思いますけど……」"
translation = "「서커스단이라도 부르실 건가요? 갑작스러운 섭외는 어려울 것 같은데요……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「もちろん、私たちでやるのよ！\u3000ライオンを調教して日の輪くぐりをマスターさせるの！」"
translation = "「물론 우리가 하는 거야! 사자를 조련해서 불꽃 고리 통과를 마스터시키는 거지!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クライマックスは、サーシャさんとマトイの命綱なしの空中ブランコ３回転半！」"
translation = "「클라이맥스는 사샤 씨와 마토이의 생명줄 없는 공중그네 3회전 반!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「まあまあ、綺麗に決められたら、絶対盛り上がるわね～。マトイちゃん、できる～？」"
translation = "「어머어머, 멋지게 해낸다면 분명 달아오르겠네~. 마토이짱, 할 수 있겠니~?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「できるわけないですねー！？」"
translation = "「할 수 있을 리가 없잖아요!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「特訓の時間が欲しい、ってことね？」"
translation = "「특훈 시간이 필요하다는 뜻이네?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「特訓してもです！\u3000そんな離れ技、一朝一夕でできるはずがないじゃないですか！」"
translation = "「특훈을 해도 안 돼요! 그런 묘기를 하루아침에 할 수 있을 리가 없잖아요!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（あ、あれ？\u3000この星徒会って、放っておいたらヴィーナス会長の暴走を止める人が……いない？）"
translation = "(어, 어라? 이 성도회는 가만히 두면 비너스 회장님의 폭주를 멈출 사람이…… 없어?)"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それなら……花火大会はどう？\u3000ドドーンって！\u3000盛り上がること間違いなしよ！」"
translation = "「그럼…… 불꽃놀이 대회는 어때? 콰쾅 하고! 달아오를 게 분명해!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「今までのアイデアに比べたら、幾分か現実味がありますけど……花火玉ってすごく高いんですよ？」"
translation = "「지금까지의 아이디어에 비하면 어느 정도 현실성이 있습니다만…… 불꽃은 무척 비싸다고요?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「１万テルスくらい？」"
translation = "「1만 테루스 정도?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「桁が２つ違います！」"
translation = "「자릿수가 두 개 다릅니다!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「１００テルス？」"
translation = "「100 테루스?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「なんで減るんですか！\u3000逆です！\u3000増えるんです！」"
translation = "「왜 줄어드나요! 반대예요! 늘어난다고요!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「へ～、１００万テルスもするのね？\u3000会計のサーシャさん、予算は？」"
translation = "「헤~, 100만 테루스나 하는구나? 회계인 사샤 씨, 예산은?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「会計的にはＯＫ出せませ～ん」"
translation = "「회계적으로는 OK 해줄 수 없단다~」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「も～、あれもダメ、これもダメで仕方ないわね。アイデア出しは持ち帰りで。また明日、改めて話し合いましょ！」"
translation = "「정말이지, 이것도 안 돼, 저것도 안 돼서 어쩔 수 없네. 아이디어 구상은 숙제로 하고. 내일 다시 이야기하자!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そうだわ、話は変わるけど、私、流星の会長みたいにマントが欲しいの！\u3000あれがあれば一目で星徒会長ってわかるでしょ。風でたなびいたりすると格好いいじゃない！」"
translation = "「맞다, 이야기는 바뀌지만, 나 유성의 회장처럼 망토가 갖고 싶어! 그게 있으면 한눈에 성도회장인 걸 알 수 있잖아. 바람에 휘날리거나 하면 멋있지 않겠어!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「それは確かに……代々、会長に受け継がれていったりすると素敵ですね」"
translation = "「그건 확실히…… 대대로 회장에게 계승되어 가거나 하면 멋지겠네요.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「でしょう？\u3000やがて歴代の血と汗と想いが染み込んだエモエモマントになるの」"
translation = "「그렇지? 이윽고 역대 회장들의 피와 땀과 염원이 깃든 에모에모 망토가 되는 거야.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「マントって、どれくらいするのかしら？\u3000さすがに１００万テルスはしないわよね？」"
translation = "「망토는 얼마나 하려나? 설마 100만 테루스는 안 하겠지?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「どうかしら～。ピンキリだと思うけど……あまり複雑な物でなければ、私でも作れるわよ～」"
translation = "「글쎄~. 천차만별이겠지만…… 너무 복잡한 게 아니라면 나라도 만들 수 있단다~」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ホント！？\u3000それは是非お願いしたいわ！\u3000なるはやだと嬉しい──」"
translation = "「정말!? 그건 꼭 부탁하고 싶어! 가급적 빨리해주면 좋겠──」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「！\u3000この音は──」"
translation = "「! 이 소리는──」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「アステラが発生したわね～」"
translation = "「아스테라가 발생했네~」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（一般人だったら、緊急避難のアラーム。速やかに安全な建物に避難し、救援を待つ……）"
translation = "(일반인이라면 긴급 대피 알람. 신속하게 안전한 건물로 대피하고 구조를 기다린다……)"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（でも、今の私は違う！\u3000私もまた、アステラを制圧する部隊なんだから！！）"
translation = "(하지만 지금의 나는 달라! 나 또한 아스테라를 제압하는 부대니까!!)"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「出撃の合図よ！\u3000新星学園星徒会、行くわよ！」"
translation = "「출격 신호야! 신성학원 성도회, 가자!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「到着ーっと！\u3000ちゃんとついてきてる？」"
translation = "「도착ー! 잘 따라오고 있어?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ヴィーナスちゃん星徒会、初めての出撃ね」"
translation = "「비너스짱 성도회, 첫 출격이네.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「記念すべき初陣、失敗は許されないわ！\u3000失敗なんてしたことないけど！」"
translation = "「기념비적인 첫 전투, 실패는 용납되지 않아! 실패해 본 적도 없지만!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「マトイちゃんはアステラに入るのは初めて？」"
translation = "「마토이짱은 아스테라에 들어오는 건 처음이니?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「は、はい、見たことはありますけど、入るのは初めてです」"
translation = "「네, 네, 본 적은 있지만 들어오는 건 처음이에요.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「初めてはなんでもドキドキしちゃうわよね～。でも安心して。マトイちゃんが怪我しないよう、私たちがちゃ～んと守るから」"
translation = "「처음은 뭐든 두근거리기 마련이지~. 하지만 안심하렴. 마토이짱이 다치지 않게 우리가 자~알 지켜줄 테니까.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あ、ありがとうございます」"
translation = "「가, 감사합니다.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「サーシャさん、あんまり甘やかしてばっかりもダメよ。マトイにも星徒会役員として、ちゃんと仕事してもらうんだから。できるわよね？」"
translation = "「사샤 씨, 너무 응석만 받아줘도 안 돼. 마토이도 성도회 임원으로서 제대로 일을 해야 하니까. 할 수 있지?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「……っ！」"
translation = "「……윽!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そうですよね……私だって星徒会役員の端くれ。２人におんぶに抱っこじゃダメですよね」"
translation = "「그렇죠…… 저도 성도회 임원의 말석. 두 분에게 업혀가기만 해서는 안 되죠.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（初めてのことだし……『やれる』なんて断言はできないけど、私は私にできる努力をするだけだ）"
translation = "(처음 하는 일이고…… '할 수 있다'고 단언할 수는 없지만, 나는 내가 할 수 있는 노력을 할 뿐이야.)"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（私から努力を取ったら、何も残らないんだから！）"
translation = "(나에게서 노력을 빼면 아무것도 남지 않으니까!)"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「やります！」"
translation = "「하겠습니다!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「うん、良い返事だわ！\u3000突入よ！」"
translation = "「응, 좋은 대답이야! 돌입하자!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「はぁっ！」"
translation = "「하앗!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「マトイちゃん、やるじゃな～い！」"
translation = "「마토이짱, 제법인걸~!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（確かにアステラの外のモンスターよりは強いけれど、歯が立たないわけじゃない、攻撃は通っている）"
translation = "(확실히 아스테라 밖의 몬스터보다는 강하지만, 상대도 안 될 정도는 아니야. 공격이 먹히고 있어.)"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ぐっ！」"
translation = "「큭!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（盾でモンスターの攻撃を受け止められる。私が盾で受け止めて、隙を作れば──）"
translation = "(방패로 몬스터의 공격을 받아낼 수 있어. 내가 방패로 받아내서 빈틈을 만들면──)"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「消し飛びなさい！」"
translation = "「날아가 버리렴!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「サーシャさん、後ろです！」"
translation = "「사샤 씨, 뒤예요!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「マトイちゃん、ありがと～。えーーーいっ！」"
translation = "「마토이짱, 고마워~. 에잇!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（サーシャさんが倒してくれた！）"
translation = "(사샤 씨가 쓰러뜨려 줬어!)"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（大丈夫。ちゃんと周りだって、見えてる！\u3000私だって星徒会のみんなと一緒に戦えるんだ！）"
translation = "(괜찮아. 주변도 제대로 보이고 있어! 나도 성도회 모두와 함께 싸울 수 있어!)"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「お疲れさまー！」"
translation = "「수고했어!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「思っていたよりもずっと楽に片付いたわね～」"
translation = "「생각했던 것보다 훨씬 수월하게 끝났네~」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「はぁ、はぁっ、お疲れ、さま、でしたっ……！」"
translation = "「하아, 하앗, 수고, 하셨, 습니다……!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「マトイ、さっきの戦い、星力を出し過ぎよ。常にフルパワーにするんじゃなくって、必要な時に必要な分だけ出した方が、長時間戦えるようになるわよ」"
translation = "「마토이, 방금 전투는 성력을 너무 많이 썼어. 항상 풀 파워로 하는 게 아니라, 필요할 때 필요한 만큼만 내보내는 게 더 오래 싸울 수 있는 비결이야.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「まあまあ。そういわれても、初めてのアステラじゃわからないわよね～」"
translation = "「자자. 그렇게 말해도 처음 온 아스테라에선 모를 수밖에 없지~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「大丈夫よ、マトイちゃん。気を抜いても大丈夫な時とダメな時。任務を重ねる内に、自然とわかるようになるわ～」"
translation = "「괜찮아, 마토이짱. 긴장을 풀어도 될 때와 안 될 때. 임무를 거듭하다 보면 자연스럽게 알게 될 거야~」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そ、そうですか……頑張ります……」"
translation = "「그, 그렇군요…… 열심히 하겠습니다……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「私、おふたりの足を引っ張ってませんでしたか……？」"
translation = "「저, 두 분의 발목을 잡지는 않았나요……?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「？\u3000おかしなこと言うのね。すっごくいい仕事してたわよ！」"
translation = "「? 이상한 소릴 하네. 아주 훌륭하게 해냈어!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「マトイちゃんのおかげで、いつもより楽チンに戦えたわ～。さすがヴィーナスちゃんが選んだ子ね～」"
translation = "「마토이짱 덕분에 평소보다 훨씬 편하게 싸웠단다~. 역시 비너스짱이 고른 아이네~」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そう、ですか……？\u3000ちゃんと役に立ててたなら、良かったです……嬉しいです……！」"
translation = "「그, 그런가요……? 제대로 도움이 되었다면 다행이에요…… 기뻐요……!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「自分がチームにどれだけ貢献できているのか、気づけるようになったら一人前かもね。次も頑張りなさい！\u3000期待してるわ！」"
translation = "「자신이 팀에 얼마나 공헌하고 있는지 깨닫게 되면 한 사람 몫을 다하는 걸지도 모르겠네. 다음에도 힘내! 기대하고 있을게!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「は、はいっ……！」"
translation = "「네, 넷……!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「……あれっ？」"
translation = "「……어라?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あの、ごめんなさい、肩、貸してもらえませんか……？\u3000もう一歩も動けそうになくて……」"
translation = "「저기, 죄송해요, 어깨 좀 빌려주실 수 있나요……? 이제 한 발자국도 못 움직일 것 같아서……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「うんうん、マトイちゃん、頑張ったものね～」"
translation = "「그래그래, 마토이짱, 정말 열심히 했으니까~」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「はい、すみま……せん……」"
translation = "「네, 죄송……해요……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あらあら、気を失っちゃったみたい。初めての戦いだし無理もないかしら？」"
translation = "「어머어머, 정신을 잃은 모양이네. 첫 전투였으니 무리도 아니려나?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そうね。後のことは私たちに任せて、マトイはゆっくり休んでなさい！」"
translation = "「그러게. 뒷일은 우리에게 맡기고, 마토이는 푹 쉬고 있어!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（はい……ありがとう、ございます……）"
translation = "(네…… 감사, 합니다……)"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（……ふふ……私、やれた……よね……？）"
translation = "(……후후…… 나, 해냈……지……?)"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（私でも……星徒会でやっていけるんだ……うん……これからも頑張るぞ……）"
translation = "(나도…… 성도회에서 잘해 나갈 수 있어…… 응…… 앞으로도 힘내자……)"

