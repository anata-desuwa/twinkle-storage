[[dialogue]]
speaker = "unk"
original = "第３話,霊力,B"
translation = "제3화, 영력, B"

[[dialogue]]
speaker = "マグダレナ"
original = "「──なるほど。得体の知れない力を使ったと」"
translation = "「──과연. 정체를 알 수 없는 힘을 사용했다고」"

[[dialogue]]
speaker = "フィオナ"
original = "「はい。あれは明らかに、私たちの星術とは異なる摂理で動いていました」"
translation = "「네. 그것은 분명히, 저희의 성술과는 다른 섭리로 움직이고 있었습니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「守護天使のあなたなら、何か思い当たる節はないでしょうか──マグダレナ様」"
translation = "「수호 천사이신 당신이라면, 뭔가 짐작 가는 바가 있지 않을까요── 막달레나 님」"

[[dialogue]]
speaker = "unk"
original = "クロトとセイファートが相まみえていたその頃──星徒会室の面々は、マグダレナに意見を仰いでいた。"
translation = "쿠로토와 세이퍼트가 맞붙고 있던 그때── 성도회 멤버들은, 막달레나에게 의견을 묻고 있었다."

[[dialogue]]
speaker = "マグダレナ"
original = "「ええ。心当たりがあります。いくつか」"
translation = "「예. 짐작 가는 바가 있습니다. 몇 가지」"

[[dialogue]]
speaker = "マグダレナ"
original = "「まずその『黒騎士』が操ったという力は──恐らく、霊力」"
translation = "「우선 그 『검은 기사』가 조종했다는 힘은── 아마도, 영력」"

[[dialogue]]
speaker = "マトイ"
original = "「霊、力……？」"
translation = "「영, 력……?」"

[[dialogue]]
speaker = "ルリエル"
original = "「……聞き覚えがあるような」"
translation = "「……들어본 적이 있는 듯한」"

[[dialogue]]
speaker = "アナ"
original = "「三千年前──世界を救った『クルセイダース』が用いたといわれる力ですね」"
translation = "「삼천 년 전── 세계를 구한 『크루세이더스』가 사용했다고 하는 힘이군요」"

[[dialogue]]
speaker = "マグダレナ"
original = "「はい。星の力が存在しない当時、彼らは霊力という機構を活かして勇敢に戦いました」"
translation = "「예. 성의 힘이 존재하지 않던 당시에, 그들은 영력이라는 기구를 활용하여 용감하게 싸웠습니다」"

[[dialogue]]
speaker = "マグダレナ"
original = "「その結果、以前のリクリエを打ち払うことができたというのもまた……皆さんが知っての通り」"
translation = "「그 결과, 이전의 리크리에를 물리칠 수 있었다는 것도 또한…… 여러분이 아시다시피」"

[[dialogue]]
speaker = "ユウリ"
original = "「？\u3000だけどよ、そいつはもう残ってないんじゃなかったのか？」"
translation = "「? 하지만 말이야, 그건 이제 남아있지 않다고 하지 않았나?」"

[[dialogue]]
speaker = "マグダレナ"
original = "「その通りです。一度、リクリエを退けた霊力は、世界の働きによってその存在ごと失われました」"
translation = "「그렇습니다. 한 번, 리크리에를 물리친 영력은, 세계의 작용에 의해 그 존재 자체가 사라졌습니다」"

[[dialogue]]
speaker = "セーラ"
original = "「リクリエさんにとって都合が悪い力だから──ってことだね～」"
translation = "「리크리에 씨에게 형편이 안 좋은 힘이니까── 라는 거네～」"

[[dialogue]]
speaker = "マグダレナ"
original = "「皆さんが用いている『星力』は──失われた霊力に代わり、女神テルルがこの時代へ授けたものです」"
translation = "「여러분이 사용하고 있는 『성력』은── 사라진 영력을 대신하여, 여신 테루루가 이 시대로 내려준 것입니다」"

[[dialogue]]
speaker = "マグダレナ"
original = "「どちらも元はリクリエに対抗する力。目的としては同じものです」"
translation = "「둘 다 원래는 리크리에에 대항하는 힘. 목적은 같은 것입니다」"

[[dialogue]]
speaker = "アナ"
original = "「人は剣を失った代わりに、槍を手にした……そんなところでしょうか」"
translation = "「사람은 검을 잃은 대신에, 창을 손에 넣었다…… 그런 것일까요」"

[[dialogue]]
speaker = "マグダレナ"
original = "「ふふ、そう言い換えても構いませんね」"
translation = "「후후, 그렇게 바꿔 말해도 괜찮겠네요」"

[[dialogue]]
speaker = "ソフィア"
original = "「そう考えると──余計に相手の不気味さが際立ちます」"
translation = "「그렇게 생각하니── 더욱 상대의 섬뜩함이 두드러집니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「ええ。あの黒騎士は──何らかの手段で失われたはずの霊力を使っている……」"
translation = "「예. 그 검은 기사는── 모종의 수단으로 사라졌어야 할 영력을 사용하고 있다……」"

[[dialogue]]
speaker = "セーラ"
original = "「星術っぽい気配も感じなかったかな」"
translation = "「성술 같은 기척도 못 느꼈으려나」"

[[dialogue]]
speaker = "サーシャ"
original = "「その意味じゃ──あのアポロちゃん以上に特殊な相手ね」"
translation = "「그런 의미에선── 그 아폴로짱 이상으로 특수한 상대네」"

[[dialogue]]
speaker = "マグダレナ"
original = "「ええ。ですが私の知る限りただひとつ──現代においても霊力を扱うことのできる『器』が存在します」"
translation = "「예. 하지만 제가 아는 한 단 하나── 현대에서도 영력을 다룰 수 있는 『그릇』이 존재합니다」"

[[dialogue]]
speaker = "ルリエル"
original = "「それって──？」"
translation = "「그건──?」"

[[dialogue]]
speaker = "マグダレナ"
original = "「魔王──そう呼ばれた存在の系譜です」"
translation = "「마왕── 그렇게 불렸던 존재의 계보입니다」"

[[dialogue]]
speaker = "unk"
original = "──星徒会室へ戻ってみると、そこにはマグダレナさん含め勢ぞろいだった。"
translation = "──성도회실로 돌아와 보니, 그곳에는 막달레나 씨를 포함해 모두 모여 있었다."

[[dialogue]]
speaker = "フィオナ"
original = "「緋宮会長──ど、泥だらけですけれど、大丈夫ですか？」"
translation = "「히노미야 회장── 즈, 흙투성이이신데, 괜찮으십니까?」"

[[dialogue]]
speaker = "クロト"
original = "「はは……いや、少し稽古をつけてもらっててさ」"
translation = "「하하…… 아니, 잠깐 수련을 받고 왔거든」"

[[dialogue]]
speaker = "アナ"
original = "「……星力の消耗量から言って、ただ事ではない。何があったんですか？」"
translation = "「……성력의 소모량으로 볼 때, 예사롭지 않습니다. 무슨 일이 있었습니까?」"

[[dialogue]]
speaker = "クロト"
original = "「──少し……な」"
translation = "「──좀……」"

[[dialogue]]
speaker = "クロト"
original = "「──ぐっ……！」"
translation = "「──크윽……!」"

[[dialogue]]
speaker = "セイファート"
original = "「──まだまだ、青いな」"
translation = "「──아직 멀었군」"

[[dialogue]]
speaker = "unk"
original = "──ひんやりとした剣刃が俺の首元に添えられていた。"
translation = "──차가운 검날이 나의 목덜미에 닿아 있었다."

[[dialogue]]
speaker = "クロト"
original = "（一瞬──届いたと、思ったのに……）"
translation = "（한순간── 닿았다고, 생각했는데……）"

[[dialogue]]
speaker = "unk"
original = "ようやく彼の太刀さばきにも目が慣れてきて、こちらの星術がかすり始めたと思いきや……"
translation = "겨우 그의 칼놀림에도 눈이 익숙해져서, 이쪽의 성술이 스치기 시작했다고 생각했는데……"

[[dialogue]]
speaker = "unk"
original = "こちらが攻め急ぐのを見透かしたように、前もって踏み込みの位置に切り返しが置かれていた。"
translation = "이쪽이 공격을 서두르는 것을 꿰뚫어 본 것처럼, 미리 발을 디딜 위치에 되받아치는 공격이 놓여 있었다."

[[dialogue]]
speaker = "クロト"
original = "「……完敗です。はっ……この体たらくじゃ……あの黒騎士に敵うほどの力は、俺にはまだ……」"
translation = "「……완패입니다. 핫…… 이 꼴로는…… 그 검은 기사를 이길 만한 힘은, 저에게는 아직……」"

[[dialogue]]
speaker = "セイファート"
original = "「……勘違いをするな。青いと言ったのは、その実力に対してではない」"
translation = "「……착각하지 마라. 미숙하다고 한 것은, 그 실력에 대해서가 아니다」"

[[dialogue]]
speaker = "クロト"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker = "セイファート"
original = "「私はただ──君の焦る心を刈り取ったにすぎない。一辺倒な攻め口と、迷いの多い足さばきをな」"
translation = "「나는 단지── 자네의 조급한 마음을 잘라냈을 뿐이다. 일변도적인 공격 방식과, 망설임이 많은 발놀림을 말이지」"

[[dialogue]]
speaker = "クロト"
original = "「あ……」"
translation = "「아……」"

[[dialogue]]
speaker = "unk"
original = "俺の立ち回りはあまりにも浅はかだった。"
translation = "나의 움직임은 너무나도 얕았다."

[[dialogue]]
speaker = "unk"
original = "目の前の敵に打ち勝たねばという一心で、気づけば突貫を繰り返していた。そんなことにも今さら気づかされた。"
translation = "눈앞의 적을 이겨야 한다는 일념으로, 정신을 차려보니 돌격을 반복하고 있었다. 그런 것도 이제야 깨달았다."

[[dialogue]]
speaker = "セイファート"
original = "「思い出せ。君はこの新星学園を導く、星徒会長なのだ。今のそれがリーダーにふさわしい姿か？」"
translation = "「기억해라. 자네는 이 신성 학원을 이끄는, 성도 회장이다. 지금의 그 모습이 리더에게 걸맞은 모습인가?」"

[[dialogue]]
speaker = "セイファート"
original = "「今の君の背中に、星徒会のメンバーが、新星の全<ruby>星騎士<rt>スターナイト</rt></ruby>たちがついてきてくれると思うか？」"
translation = "「지금의 자네의 등 뒤를, 성도회 멤버들이, 신성 학원의 모든 성기사들이 따라와 줄 것이라 생각하는가?」"

[[dialogue]]
speaker = "クロト"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "セイファート"
original = "「無論──その真摯な<ruby>我武者羅<rt>がむしゃら</rt></ruby>さ全てが悪いとは思わない。大事なのは、己を冷静にコントロールすることだ」"
translation = "「물론── 그 진실된 무모함 전부가 나쁘다고는 생각하지 않는다. 중요한 것은, 자신을 냉정하게 통제하는 것이다」"

[[dialogue]]
speaker = "セイファート"
original = "「上に立つ者は、常にその資質を求められる──仲間を信用しているのならなおさらな」"
translation = "「위에 서는 자는, 항상 그 자질을 요구받는다── 동료를 신뢰하고 있다면 더욱더」"

[[dialogue]]
speaker = "セイファート"
original = "「もっとも……こんな説教をしてしまう私も、まだまだ青いか」"
translation = "「가장…… 이런 설교를 하는 나도, 아직 미숙한가」"

[[dialogue]]
speaker = "クロト"
original = "「学園……長……」"
translation = "「학원…… 장……」"

[[dialogue]]
speaker = "unk"
original = "彼はそう自嘲気味に笑い、去っていった……。"
translation = "그는 그렇게 자조적으로 웃으며, 떠나갔다……."

[[dialogue]]
speaker = "クロト"
original = "（まだまだ学園長の言うとおりに出来てるとは思えないけれど、あるべき姿の指標は得られた……と思う）"
translation = "（아직 학원장님이 말씀하신 대로 할 수 있다고는 생각하지 않지만, 있어야 할 모습의 지표는 얻었다……고 생각한다）"

[[dialogue]]
speaker = "アナ"
original = "「ふむ。何やら会長なりに、得られるものがあった様子」"
translation = "「흠. 뭔가 회장님 나름대로, 얻은 것이 있는 모양입니다」"

[[dialogue]]
speaker = "マトイ"
original = "「ちょっとだけ、いつもの調子が戻ってきた……かな？」"
translation = "「조금, 평소의 컨디션으로 돌아온…… 걸까?」"

[[dialogue]]
speaker = "クロト"
original = "「いつもの調子……か。そうだといいんだけど、実際はそうじゃないと思う。今だって、気持ちが急いて仕方ないから……」"
translation = "「평소의 컨디션…… 인가. 그랬으면 좋겠지만, 실제로는 그렇지 않다고 생각해. 지금도, 마음이 급해서 어쩔 수가 없으니까……」"

[[dialogue]]
speaker = "unk"
original = "焦りは今も拭えない。"
translation = "초조함은 지금도 씻어낼 수 없다."

[[dialogue]]
speaker = "unk"
original = "──<ruby>我武者羅<rt>がむしゃら</rt></ruby>なのは悪いことではない。"
translation = "──무모한 것은 나쁜 것이 아니다."

[[dialogue]]
speaker = "unk"
original = "──大事なのは、焦りもコントロールして冷静さを保つことだ。"
translation = "──중요한 것은, 초조함도 통제하여 냉정함을 유지하는 것이다."

[[dialogue]]
speaker = "unk"
original = "熱さと冷たさ、両方を心に備えるなんて矛盾している。だけどきっと、それを成り立たせることこそが、リーダーに求められるものなんだ。"
translation = "뜨거움과 차가움, 양쪽을 마음에 갖춘다는 것은 모순된다. 하지만 분명, 그것을 성립시키는 것 자체가, 리더에게 요구되는 것일 것이다."

[[dialogue]]
speaker = "unk"
original = "今はそれを完璧にできなくとも、そこを目指して進むしかない。"
translation = "지금은 그것을 완벽하게 할 수 없더라도, 그곳을 향해 나아갈 수밖에 없다."

[[dialogue]]
speaker = "クロト"
original = "「──ヴィーナスは強い。こっちも闇雲に足掻くんじゃなく、今ある時間を有効に使って次の手を考えないと」"
translation = "「──비너스는 강해. 이쪽도 무턱대고 발버둥 치지 말고, 지금 있는 시간을 유효하게 써서 다음 수를 생각해야 해」"

[[dialogue]]
speaker = "unk"
original = "半分以上、自分に言い聞かせるように宣言する。"
translation = "절반 이상, 자신에게 타이르듯이 선언한다."

[[dialogue]]
speaker = "サーシャ"
original = "「うんうん。さすが会長くんね」"
translation = "「응응. 역시 회장 군이네」"

[[dialogue]]
speaker = "クロト"
original = "「それで──マグダレナさんを呼んで、何の話をしてたんだ？」"
translation = "「그래서── 막달레나 씨를 불러서, 무슨 이야기를 하고 있었던 거야?」"

[[dialogue]]
speaker = "ソフィア"
original = "「はい。ちょうど今、会長さん達の話になったところなんです」"
translation = "「네. 마침 지금, 회장님들의 이야기가 나온 참입니다」"

[[dialogue]]
speaker = "クロト"
original = "「俺……たち？」"
translation = "「나……들?」"

[[dialogue]]
speaker = "アナ"
original = "「はい。霊力を操る器──それが魔王の血統だとか」"
translation = "「네. 영력을 다루는 그릇── 그것이 마왕의 혈통이라고 합니다」"

[[dialogue]]
speaker = "マグダレナ"
original = "「……軽くお話しましょうか」"
translation = "「……가볍게 이야기해 드릴까요」"

[[dialogue]]
speaker = "unk"
original = "マグダレナさんの口から、黒騎士の使っていた『霊力』について話を聞いた。"
translation = "막달레나의 입을 통해, 검은 기사가 사용했던 『영력』에 대한 이야기를 들었다."

[[dialogue]]
speaker = "クロト"
original = "「──なるほど。黒騎士の得体の知れない力は、霊力だったのか」"
translation = "「──과연. 검은 기사의 정체 모를 힘은, 영력이었나」"

[[dialogue]]
speaker = "アナ"
original = "「はい。本来は、クルセイダースの時代に失われたもののはずですが……魔王の系譜なら例外的に操れると」"
translation = "「네. 본래는, 크루세이더스 시대에 사라진 힘이어야 하지만…… 마왕의 계보라면 예외적으로 다룰 수 있다고 합니다」"

[[dialogue]]
speaker = "サーシャ"
original = "「てことはー、会長くん達にも同じ力が備わってたり？」"
translation = "「그럼ー, 회장 군들에게도 같은 힘이 갖춰져 있거나?」"

[[dialogue]]
speaker = "クロト"
original = "「意識したことはありませんが……」"
translation = "「의식한 적은 없지만……」"

[[dialogue]]
speaker = "unk"
original = "ただ、御前試合の時に『覚醒』したことは思い出す。"
translation = "다만, 어전 시합 때 『각성』했던 것은 떠오른다."

[[dialogue]]
speaker = "unk"
original = "あの時にあふれた得体の知れない力──あれは今思えば、星力とはまた別のベクトルも混じっていたかもしれない。"
translation = "그때 넘쳐흘렀던 정체 모를 힘── 그것은 지금 생각하면, 성력과는 또 다른 벡터도 섞여 있었을지도 모른다."

[[dialogue]]
speaker = "セーラ"
original = "「ってか……魔王の血統ってことなら、フィオナちゃんのご両親も同じ感じなの？」"
translation = "「랄까…… 마왕의 혈통이라는 건, 피오나짱의 부모님도 같은 느낌인 거야?」"

[[dialogue]]
speaker = "マグダレナ"
original = "「いえ。そうとは限りません」"
translation = "「아닙니다. 그렇다고는 할 수 없습니다」"

[[dialogue]]
speaker = "マグダレナ"
original = "「魔王の系譜は隔世遺伝──脈々と受け継がれていく中で……時折、極めて濃度の高い個体が生まれる。と思ったほうがよいでしょう」"
translation = "「마왕의 계보는 격세유전── 면면히 계승되어 가는 가운데…… 때때로, 극히 농도가 높은 개체가 태어난다고 생각하는 편이 좋을 것입니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「はい。実際──私の父も告げていました。自分に魔王の資質はないと」"
translation = "「네. 실제로── 저의 아버지도 말씀하셨습니다. 자신에게는 마왕의 자질이 없다고」"

[[dialogue]]
speaker = "ソフィア"
original = "「フィオナ会長のお父様……つまりは、流星教皇さま……」"
translation = "「피오나 회장님의 아버님…… 즉, 유성 교황님……」"

[[dialogue]]
speaker = "フィオナ"
original = "「だからこそ父は──私たち姉妹に期待していました。私たち双子には、魔王の血がしかと眠っているからと」"
translation = "「그렇기 때문에 아버지는── 저희 자매에게 기대했습니다. 저희 쌍둥이에게는, 마왕의 피가 확실히 잠들어 있으니까요」"

[[dialogue]]
speaker = "unk"
original = "星見家には元々、月の壁画を通じて正しい『魔王』観が伝わっていた──"
translation = "호시미 가문에는 원래, 달의 벽화를 통해 올바른 『마왕』관이 전해지고 있었다──"

[[dialogue]]
speaker = "unk"
original = "だからこそ星見姉妹にその資質があったことは、恐らく喜ばしいこととして歓迎されたのだろう。"
translation = "그렇기에 호시미 자매에게 그 자질이 있었던 것은, 아마도 기쁜 일로 환영받았을 것이다."

[[dialogue]]
speaker = "サーシャ"
original = "「じゃあ、会長くんのお母さん……リノさんも、魔王じゃないんだ」"
translation = "「그럼, 회장 군의 어머니…… 리노 씨도, 마왕이 아니라는 거네」"

[[dialogue]]
speaker = "クロト"
original = "「はは……母さんはそんなガラじゃないですよ」"
translation = "「하하…… 어머니는 그런 분이 아니에요」"

[[dialogue]]
speaker = "unk"
original = "それに──そもそものことを言えば、俺と母さんは血が繋がっているわけじゃない。"
translation = "게다가── 애초에 말하자면, 나와 어머니는 피가 이어진 사이가 아니다."

[[dialogue]]
speaker = "unk"
original = "とはいえ、今に切り出すことでもないので黙っていた。"
translation = "그렇다고는 해도, 지금 꺼낼 이야기도 아니기에 침묵했다."

[[dialogue]]
speaker = "アナ"
original = "「魔王の末裔だけは霊力が使える──と。平たく言えばそういうことですか」"
translation = "「마왕의 후예만이 영력을 사용할 수 있다── 라고. 쉽게 말하면 그런 건가요」"

[[dialogue]]
speaker = "マトイ"
original = "「でも……本当なのかな。三千年前に消えちゃった力なんでしょ？\u3000それなのに……」"
translation = "「하지만…… 정말일까. 삼천 년 전에 사라져 버린 힘이잖아? 그런데도……」"

[[dialogue]]
speaker = "ニャリオン"
original = "「ニャ──間違いないニャ。<b>魔王</b>の器というのは『霊力』と『魔力』。その身に双方を宿すものだからニャン」"
translation = "「냐── 틀림없냐. <b>마왕</b>의 그릇이라는 것은 『영력』과 『마력』. 그 몸에 쌍방을 품는 존재이기 때문이냥」"

[[dialogue]]
speaker = "unk"
original = "ひょっこりと。"
translation = "불쑥."

[[dialogue]]
speaker = "unk"
original = "フィオナの肩から顔を出したニャリオンが、堂々と腕を組んで宣言した。"
translation = "피오나의 어깨에서 얼굴을 내민 냐리온이, 당당하게 팔짱을 끼고 선언했다."

[[dialogue]]
speaker = "ソフィア"
original = "「魔力って……」"
translation = "「마력이라니……」"

[[dialogue]]
speaker = "ユウリ"
original = "「あの『魔女』たちが使ってたヤツだろ？\u3000デタラメ言うなよアホネコ」"
translation = "「그 『마녀』들이 썼던 거잖아? 헛소리하지 마라 바보 고양이」"

[[dialogue]]
speaker = "ニャリオン"
original = "「デタラメではないニャン！\u3000これにはれっきとした根拠があるニャン」"
translation = "「헛소리가 아니냥! 여기에는 엄연한 근거가 있냥」"

[[dialogue]]
speaker = "ユウリ"
original = "「根拠だあ？」"
translation = "「근거라니?」"

[[dialogue]]
speaker = "ニャリオン"
original = "「そうニャ。ニャぜニャら三千年前の魔王もまた──霊力と魔力を操っていたからニャン！」"
translation = "「그렇냥. 왜냐하면 삼천 년 전의 마왕 또한── 영력과 마력을 다루고 있었기 때문이냥!」"

[[dialogue]]
speaker = "ソフィア"
original = "「随分、見てきたかのように語りますね」"
translation = "「꽤나, 보고 온 것처럼 이야기하시네요」"

[[dialogue]]
speaker = "アナ"
original = "「マグダレナさん。ニャリオンが言っているのは……」"
translation = "「막달레나 씨. 냐리온이 말하는 것은……」"

[[dialogue]]
speaker = "マグダレナ"
original = "「……真実です。守護天使の認識とも合致します」"
translation = "「……진실입니다. 수호 천사의 인식과도 일치합니다」"

[[dialogue]]
speaker = "ユウリ"
original = "「デタラメじゃないってのか──？」"
translation = "「헛소리가 아니란 말이야──?」"

[[dialogue]]
speaker = "ニャリオン"
original = "「ニャッニャッニャッ。吾輩に間違いはないニャ」"
translation = "「냥냥냥. 이 몸에게 실수는 없냥」"

[[dialogue]]
speaker = "ルリエル"
original = "「なんでそんなこと知ってるんです……？」"
translation = "「왜 그런 걸 알고 계신 거예요……?」"

[[dialogue]]
speaker = "ソフィア"
original = "「というか、今の今までずいぶんとお静かでしたね。ニャリオンさん」"
translation = "「랄까, 지금까지 줄곧 꽤나 조용하셨네요. 냐리온 씨」"

[[dialogue]]
speaker = "フィオナ"
original = "「ニャリオンは昨日からすっかり塞ぎ込んでいました。落ち込んでいたものかと思ったのですが……」"
translation = "「냐리온은 어제부터 완전히 틀어박혀 있었습니다. 풀이 죽어 있는 건가 싶었는데……」"

[[dialogue]]
speaker = "ニャリオン"
original = "「ご心配をおかけしたニャン、フィオナ嬢。ニャがもう大丈夫ニャンよ」"
translation = "「걱정을 끼쳤냥, 피오나 아가씨. 냐는 이제 괜찮냥」"

[[dialogue]]
speaker = "ニャリオン"
original = "「なぜなら吾輩は思い出したのニャン。あいつの波動を……間近で浴びることでニャン」"
translation = "「왜냐하면 이 몸은 떠올린 것이냥. 그 녀석의 파동을…… 가까이에서 쐬면서 말이냥」"

[[dialogue]]
speaker = "フィオナ"
original = "「思い出した……？」"
translation = "「떠올렸다……?」"

[[dialogue]]
speaker = "ニャリオン"
original = "「そうですニャ。それは……前世の記憶とでも言うべきものニャ」"
translation = "「그렇냥. 그것은…… 전생의 기억이라고 해야 할 것이냥」"

[[dialogue]]
speaker = "ユウリ"
original = "「おいおい。とうとう頭がいかれちまったか」"
translation = "「어이쿠. 드디어 머리가 돌아버린 건가」"

[[dialogue]]
speaker = "ニャリオン"
original = "「お黙りニャ！\u3000吾輩は三千年前、あの先代魔王に仕えた由緒正しき使い魔ニャンぞ！」"
translation = "「닥치라냥! 이 몸은 삼천 년 전, 그 선대 마왕을 섬긴 유서 깊은 사역마이냥!」"

[[dialogue]]
speaker = "ニャリオン"
original = "「そして今はフィオナ嬢という、次なる魔王の器の導き手なのニャアン！」"
translation = "「그리고 지금은 피오나 아가씨라는, 다음 마왕의 그릇의 인도자이냥!」"

[[dialogue]]
speaker = "ソフィア"
original = "「さ、三千年前……？」"
translation = "「사, 삼천 년 전……?」"

[[dialogue]]
speaker = "マトイ"
original = "「ええと……？\u3000つまり、どゆこと……？」"
translation = "「어, 그러니까……? 즉, 무슨 말이야……?」"

[[dialogue]]
speaker = "マグダレナ"
original = "「……なるほど。ニャリオン、あなたはそういう存在でしたか」"
translation = "「……과연. 냐리온, 당신은 그런 존재였군요」"

[[dialogue]]
speaker = "ルリエル"
original = "「？\u3000そういう存在──と仰いますと」"
translation = "「? 그런 존재──라고 하시면」"

[[dialogue]]
speaker = "マグダレナ"
original = "「過去──クルセイダースの時代、魔王には特別な使い魔がついたと言います」"
translation = "「과거── 크루세이더스 시대, 마왕에게는 특별한 사역마가 따랐다고 합니다」"

[[dialogue]]
speaker = "マグダレナ"
original = "「大賢者──かつての使い魔は、自らをそう名乗ったとか」"
translation = "「대현자── 예전의 사역마는, 스스로를 그렇게 자칭했다고 합니다」"

[[dialogue]]
speaker = "ユウリ"
original = "「大賢者ぁ……？」"
translation = "「대현자아……?」"

[[dialogue]]
speaker = "マグダレナ"
original = "「はい。ニャリオンはもしかすると、かの大賢者と同一の存在かもしれません」"
translation = "「네. 냐리온은 어쩌면, 그 대현자와 동일한 존재일지도 모릅니다」"

[[dialogue]]
speaker = "マグダレナ"
original = "「いかなる経緯かはわかりませんが──今代のリクリエに応じて、この森羅暦３０００年の世界にもやってきたのではないでしょうか」"
translation = "「어떠한 경위인지는 모르겠지만── 이번 대의 리크리에에 호응하여, 이 신라력 3000년의 세계에도 찾아온 것이 아닐까요」"

[[dialogue]]
speaker = "ニャリオン"
original = "「そうそう、そうなのだニャン！\u3000神聖にして偉大なる大賢者、ニャリオン様を仰ぐのだニャン！」"
translation = "「그렇고말고, 그런 것이냥! 신성하고 위대한 대현자, 냐리온 님을 우러러보는 것이냥!」"

[[dialogue]]
speaker = "ユウリ"
original = "「意味がわからん」"
translation = "「의미를 모르겠군」"

[[dialogue]]
speaker = "ソフィア"
original = "「若干ついていけません」"
translation = "「약간 따라가기 힘드네요」"

[[dialogue]]
speaker = "クロト"
original = "「つまり──ニャリオンの前世？\u3000は、先代魔王の使い魔だったってことか」"
translation = "「즉── 냐리온의 전생? 은, 선대 마왕의 사역마였다는 건가」"

[[dialogue]]
speaker = "ニャリオン"
original = "「大体そーニャ！」"
translation = "「대충 그렇냥!」"

[[dialogue]]
speaker = "アナ"
original = "「会長の飲み込みの早さは美徳と思われます」"
translation = "「회장님의 이해력이 빠르다는 것은 미덕이라고 생각됩니다」"

[[dialogue]]
speaker = "unk"
original = "まあニャリオンは見た目からして特別な使い魔だし、俺のソウルフレンドでもある。"
translation = "뭐 냐리온은 겉모습부터가 특별한 사역마이고, 나의 소울 프렌드이기도 하다."

[[dialogue]]
speaker = "unk"
original = "それくらいスペシャルな存在でも驚きはしないというものだ。"
translation = "그 정도 스페셜한 존재라도 놀랍지 않다는 것이다."

[[dialogue]]
speaker = "フィオナ"
original = "「……ニャリオンは私の召喚した使い魔です。<ruby>フィオナ<rt>あね</rt></ruby>ではなく、<ruby>エリシア<rt>わたし</rt></ruby>の」"
translation = "「……냐리온은 제가 소환한 사역마입니다. 피오나가 아니라, 엘리시아의」"

[[dialogue]]
speaker = "フィオナ"
original = "「私はたびたび召喚術を用いますが、あの時のことはよく覚えています。不思議な──引っ張られるような感覚があったので」"
translation = "「저는 종종 소환술을 사용하지만, 그때의 일은 잘 기억하고 있습니다. 신기한── 끌어당겨지는 듯한 감각이 있었기에」"

[[dialogue]]
speaker = "マグダレナ"
original = "「魔王の血に引きずられて──遠い時空から召喚されたのかもしれませんね」"
translation = "「마왕의 피에 이끌려── 먼 시공에서 소환되었을지도 모르겠네요」"

[[dialogue]]
speaker = "セーラ"
original = "「フィオナちゃんすご！」"
translation = "「피오나짱 대단해!」"

[[dialogue]]
speaker = "アナ"
original = "「つまりその前世の記憶とやらを、霊力との接触によって思い出した……と。一応筋は通りますが」"
translation = "「즉 그 전생의 기억이라는 것을, 영력과의 접촉으로 인해 떠올렸다…… 라고. 일단 이치는 통하지만요」"

[[dialogue]]
speaker = "ルリエル"
original = "「そんなに偉い存在には見えませんねえ。ニャリオンさんは」"
translation = "「그렇게 대단한 존재로는 보이지 않네요. 냐리온 씨는」"

[[dialogue]]
speaker = "ニャリオン"
original = "「失敬ニャ！\u3000そもそも最初から神聖なる猫の化身と再三言っておるニャ！」"
translation = "「실례이냥! 애초에 처음부터 신성한 고양이의 화신이라고 재삼 말하고 있냥!」"

[[dialogue]]
speaker = "クロト"
original = "「ニャリオン。それじゃ君の知ってる範囲でいいから、教えて欲しいことがある」"
translation = "「냐리온. 그럼 네가 아는 범위 내에서 좋으니까, 알려줬으면 하는 게 있어」"

[[dialogue]]
speaker = "ニャリオン"
original = "「何ニャ？」"
translation = "「무엇이냥?」"

[[dialogue]]
speaker = "クロト"
original = "「先代の魔王ってのは、どんな人物だったんだ？」"
translation = "「선대 마왕이라는 건, 어떤 인물이었어?」"

[[dialogue]]
speaker = "ニャリオン"
original = "「そうニャ。大事なのはそこニャ」"
translation = "「그렇냥. 중요한 것은 거기이냥」"

[[dialogue]]
speaker = "ニャリオン"
original = "「先代の魔王はとんでもニャく強かったニャ。先代魔王の操る二つの力──霊力と魔力は、相互に絡み合ってものすごいパワーを生み出していたニャン」"
translation = "「선대 마왕은 엄청나게 강했냥. 선대 마왕이 다루는 두 가지 힘── 영력과 마력은, 상호 간에 얽혀서 엄청난 파워를 만들어내고 있었냥」"

[[dialogue]]
speaker = "マトイ"
original = "「二つの力……！」"
translation = "「두 가지 힘……!」"

[[dialogue]]
speaker = "アナ"
original = "「なるほど。先の話に繋がりますね」"
translation = "「과연. 앞선 이야기로 이어지네요」"

[[dialogue]]
speaker = "ニャリオン"
original = "「そうニャ。だからこそ、同じく魔王の血を継ぐフィオナ嬢たちもまた、霊力と魔力を操る器であると言えるニャン」"
translation = "「그렇냥. 그렇기 때문에, 마찬가지로 마왕의 피를 잇는 피오나 아가씨들도 또한, 영력과 마력을 다루는 그릇이라고 말할 수 있냥」"

[[dialogue]]
speaker = "マグダレナ"
original = "「どうやらニャリオンは正しく歴史を理解しているようです。取り立てて補足する点はありません」"
translation = "「아무래도 냐리온은 역사를 올바르게 이해하고 있는 것 같습니다. 특별히 보충할 점은 없습니다」"

[[dialogue]]
speaker = "ニャリオン"
original = "「ニャーッニャッニャッニャッ！\u3000吾輩は大賢者なる偉大な存在ニャン！\u3000これくらい当然ニャンよ！」"
translation = "「냐앗냐앗냐앗냐앗! 이 몸은 대현자라는 위대한 존재이냥! 이 정도는 당연한 것이냥!」"

[[dialogue]]
speaker = "ユウリ"
original = "「箔が付いて余計にうざくなったな……」"
translation = "「허세가 붙어서 더 짜증 나게 됐군……」"

[[dialogue]]
speaker = "ソフィア"
original = "「度が過ぎたらキリカさんにお願いしましょう」"
translation = "「정도가 지나치면 키리카 씨에게 부탁합시다」"

[[dialogue]]
speaker = "unk"
original = "霊力──"
translation = "영력──"

[[dialogue]]
speaker = "unk"
original = "その失われたはずの力を通じて、３０００年前の先代リクリエの事情が俺たちに深く関わるらしいこともわかってきた。"
translation = "그 사라졌어야 할 힘을 통해, 3000년 전 선대 리크리에의 사정이 우리와 깊이 관련되어 있다는 것도 알게 되었다."

[[dialogue]]
speaker = "セーラ"
original = "「へー……あれ、でも待って？\u3000今のフィオナちゃんと会長さんは、星力だって使ってるじゃんね？」"
translation = "「헤ー…… 어라, 근데 잠깐? 지금의 피오나짱이랑 회장님은, 성력도 쓰고 있잖아?」"

[[dialogue]]
speaker = "クロト"
original = "「そうですね。現代に生きる俺たちに与えられた力──ってことですから」"
translation = "「그렇지. 현대에 사는 우리에게 주어진 힘── 이라는 거니까」"

[[dialogue]]
speaker = "フィオナ"
original = "「！\u3000となると……もし私たちに霊力が扱えたら？」"
translation = "「! 그렇다면…… 만약 우리가 영력을 다룰 수 있다면?」"

[[dialogue]]
speaker = "ニャリオン"
original = "「そうニャ。吾輩がフィオナ嬢に期待するのもそこなのニャ──つまり」"
translation = "「그렇냥. 이 몸이 피오나 아가씨에게 기대하는 것도 바로 거기이냥── 즉」"

[[dialogue]]
speaker = "ニャリオン"
original = "「もし二人が今代の魔王として覚醒したニャら──霊力・星力・魔力のすべてを兼ね備えた、究極の存在となるのニャ！」"
translation = "「만약 두 사람이 이번 대의 마왕으로 각성한다면── 영력・성력・마력의 모든 것을 겸비한, 궁극의 존재가 되는 것이냥!」"

[[dialogue]]
speaker = "マトイ"
original = "「！？」"
translation = "「!?」"

[[dialogue]]
speaker = "クロト"
original = "「盛りだくさんだな……」"
translation = "「엄청나게 많네……」"

[[dialogue]]
speaker = "セーラ"
original = "「アナちゃんの例えに乗っかるなら──剣も槍も、ついでに弓も使えるみたいな感じかな？」"
translation = "「아나짱의 비유에 빗대자면── 검도 창도, 게다가 활도 쓸 수 있는 듯한 느낌일까?」"

[[dialogue]]
speaker = "unk"
original = "『もし、二度目の制覇を願うのなら──最強の魔王が必要なのです』"
translation = "『만약, 두 번째 제패를 바란다면── 최강의 마왕이 필요합니다』"

[[dialogue]]
speaker = "クロト"
original = "（最強の魔王……あれが言っていたのはもしかすると）"
translation = "（최강의 마왕…… 저것이 말했던 것은 혹시）"

[[dialogue]]
speaker = "フィオナ"
original = "（……ええ。そういう意味だったのかもしれません）"
translation = "（……네. 그런 의미였을지도 모릅니다）"

[[dialogue]]
speaker = "unk"
original = "霊力の代わりに女神から授かった星力──"
translation = "영력 대신 여신에게서 받은 성력──"

[[dialogue]]
speaker = "unk"
original = "それを身に着けた俺たちが、なお過去の力を引き出して生まれる進化形。"
translation = "그것을 몸에 익힌 우리가, 다시 과거의 힘을 끌어내어 생겨나는 진화형."

[[dialogue]]
speaker = "unk"
original = "『今代の魔王』をそう定義するなら、確かに未知にして最強の器に違いなかった。"
translation = "『이번 대의 마왕』을 그렇게 정의한다면, 확실히 미지이자 최강의 그릇임에 틀림없었다."

[[dialogue]]
speaker = "アナ"
original = "「しかし──これでなんとなく見えてきました。あの黒騎士という相手も、会長たちと似たような存在なのかもしれないと」"
translation = "「하지만── 이걸로 대충 알겠습니다. 그 검은 기사라는 상대도, 회장님들과 비슷한 존재일지도 모른다고」"

[[dialogue]]
speaker = "ニャリオン"
original = "「可能性はあるニャン。ただ、断言はできないニャン」"
translation = "「가능성은 있냥. 다만, 단언은 할 수 없냥」"

[[dialogue]]
speaker = "ニャリオン"
original = "「あの男からは……正直、邪気しか感じなかったニャンからね」"
translation = "「그 남자에게서는…… 솔직히, 사기밖에 느껴지지 않았냥」"

[[dialogue]]
speaker = "マグダレナ"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "マグダレナ"
original = "「……あの。これも伝えておかねばと思っていたのですが」"
translation = "「……저. 이것도 전해 드려야겠다고 생각했는데요」"

[[dialogue]]
speaker = "クロト"
original = "「？\u3000なんでしょう」"
translation = "「? 무엇인가요」"

[[dialogue]]
speaker = "マグダレナ"
original = "「その『黒騎士』という人物──もしかすると、<ruby>守護天使<rt>わたしたち</rt></ruby>を封印したのと同じ存在かもしれません」"
translation = "「그 『검은 기사』라는 인물── 어쩌면, 수호 천사를 봉인한 것과 같은 존재일지도 모릅니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「！？」"
translation = "「!?」"

[[dialogue]]
speaker = "ユウリ"
original = "「おいおい……そっちにも繋がってんのか？」"
translation = "「어이쿠…… 그쪽으로도 연결되어 있는 건가?」"

[[dialogue]]
speaker = "クロト"
original = "「守護天使は確か──六柱バラバラに、どこかへ本体が封印されているんだったか」"
translation = "「수호 천사는 분명── 여섯 기둥이 뿔뿔이 흩어져, 어딘가에 본체가 봉인되어 있었던가」"

[[dialogue]]
speaker = "アナ"
original = "「ええ。しかし、本当にあの影が……」"
translation = "「네. 하지만, 정말로 그 그림자가……」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「間違いないだろう──我の記憶とも一致する」"
translation = "「틀림없을 것이다── 나의 기억과도 일치한다」"

[[dialogue]]
speaker = "マグダレナ"
original = "「アルモタヘル……」"
translation = "「아르모타헬……」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「話は聞いた。一刻を争う事態のようだが──我らとしても捨て置けぬ」"
translation = "「이야기는 들었다. 일각을 다투는 사태인 듯하지만── 우리로서도 내버려 둘 수 없다」"

[[dialogue]]
speaker = "マグダレナ"
original = "「あなたは……当時のことを覚えているのですか？」"
translation = "「당신은…… 당시의 일을 기억하고 계신가요?」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「朧げだがな。何より、お前たちの証言で確信を得た」"
translation = "「희미하게나마. 무엇보다, 너희들의 증언으로 확신을 얻었다」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「あの日。塔にいた我々に奇襲を仕掛けてきたのは……漆黒の甲冑だった」"
translation = "「그날. 탑에 있던 우리에게 기습을 가해 온 것은…… 칠흑의 갑옷이었다」"

[[dialogue]]
speaker = "フィオナ"
original = "「！\u3000なら、やはり……」"
translation = "「! 그럼, 역시……」"

[[dialogue]]
speaker = "クロト"
original = "「守護天使の皆さんは──元々、フィーニスの塔を守る存在なんですよね」"
translation = "「수호 천사 여러분은── 원래, 피니스의 탑을 지키는 존재인 거죠」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「然り。そして奴はあの時も『塔』に現れた。どんな手段で侵入してきたのかは知らないが……」"
translation = "「그렇다. 그리고 그 녀석은 그때도 『탑』에 나타났다. 어떤 수단으로 침입해 왔는지는 모르겠지만……」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「奴は超常的な力によって──我ら六柱の守護天使を<b>さらった</b>。本体を封印することによって」"
translation = "「그 녀석은 초상적인 힘에 의해── 우리 여섯 기둥의 수호 천사를 <b>납치했다</b>. 본체를 봉인함으로써」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「その後の醜い堕天に関しては……お前たちも知る通りだ」"
translation = "「그 후의 추악한 타천에 관해서는…… 너희들도 아는 바와 같다」"

[[dialogue]]
speaker = "アナ"
original = "「守護天使六柱をまとめて相手に……それだけでも、尋常でない脅威です」"
translation = "「수호 천사 여섯 기둥을 한꺼번에 상대하다니…… 그것만으로도, 예사롭지 않은 위협입니다」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「一人ではなかったかもしれない。詳細に覚えているわけではないが」"
translation = "「혼자는 아니었을지도 모른다. 자세히 기억하고 있는 것은 아니지만」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「ただ、今にして思えば……奴の手管はいささか<ruby>熟<rt>こな</rt></ruby>れすぎていた。まるで、塔の構造を把握していたかのような……」"
translation = "「다만, 이제 와서 생각하면…… 그 녀석의 수법은 다소 능숙했다. 마치, 탑의 구조를 파악하고 있었던 것처럼……」"

[[dialogue]]
speaker = "unk"
original = "マグダレナさんやアルモタヘルさんは、未だに核の部分をいずこかに封印されたままでいる。"
translation = "막달레나와 아르모타헬는, 아직도 핵의 부분을 어딘가에 봉인당한 채로 있다."

[[dialogue]]
speaker = "unk"
original = "そしてまだ見ぬ他の守護天使たちは、どこかで堕天している恐れもあるのだ。"
translation = "그리고 아직 보지 못한 다른 수호 천사들은, 어딘가에서 타천하고 있을 우려도 있는 것이다."

[[dialogue]]
speaker = "アルモタヘル"
original = "「いずれにせよ……我らにとっても捨て置けぬ相手だ。その黒騎士とやらは」"
translation = "「어쨌든…… 우리에게도 내버려 둘 수 없는 상대다. 그 검은 기사라는 녀석은」"

[[dialogue]]
speaker = "ルリエル"
original = "「おおっ！\u3000なればアルモタヘルさんも共に戦ってくれるのですね！」"
translation = "「오옷! 그렇다면 아르모타헬 씨도 함께 싸워 주시는 거군요!」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「いや……この身はあくまでも一時的な依り代──さしたる戦力にはならないだろう」"
translation = "「아니…… 이 몸은 어디까지나 일시적인 의지처── 별다른 전력은 되지 못할 것이다」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「代わりに──これを渡しておく」"
translation = "「대신── 이것을 건네주겠다」"

[[dialogue]]
speaker = "クロト"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker = "フィオナ"
original = "「それは……？」"
translation = "「그것은……?」"

[[dialogue]]
speaker = "unk"
original = "アルモタヘルさんから俺に手渡されたひと欠片の輝石。"
translation = "아르모타헬에게서 나에게 건네진 한 조각의 휘석."

[[dialogue]]
speaker = "unk"
original = "まるで星屑のようなきらめきを放つ、それは……"
translation = "마치 별똥별 같은 반짝임을 내뿜는 그것은……"

[[dialogue]]
speaker = "アルモタヘル"
original = "「『<ruby>霊屑<rt>クロスダスト</rt></ruby>』──我ら守護天使にのみ与えられた、かつての<b>霊力の残滓</b>だ」"
translation = "「『영설』── 우리 수호 천사에게만 주어진, 옛 <ruby>영력의 잔재<rt>・・・ ・・</rt></ruby>다」"

[[dialogue]]
speaker = "クロト＆フィオナ"
original = "「！！」"
translation = "「!!」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「霊力は──本来、この時代に存在しない術式ゆえに、星術をすり抜ける。相殺しないのだ」"
translation = "「영력은── 본래, 이 시대에 존재하지 않는 술식이기에, 성술을 빠져나간다. 상쇄되지 않는 것이다」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「よって、霊力の使い手に対抗できるとすれば……それはより強き霊力の持ち主しかいない」"
translation = "「따라서, 영력의 사용자에게 대항할 수 있다고 한다면…… 그것은 더욱 강한 영력의 소유자밖에 없다」"

[[dialogue]]
speaker = "クロト"
original = "「これを……俺に」"
translation = "「이것을…… 나에게」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「そうだ。信じて託すとする」"
translation = "「그렇다. 믿고 맡기도록 하겠다」"

[[dialogue]]
speaker = "サーシャ"
original = "「そこに会長くんの本来の力が合わされば……！」"
translation = "「거기에 회장 군의 본래 힘이 합쳐진다면……!」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「最強だ。霊力＋魔力＋星力は３じゃない、３００にもなろう。十倍だぞ十倍」"
translation = "「최강이다. 영력 + 마력 + 성력은 3이 아니라, 300도 될 것이다. 열 배다 열 배」"

[[dialogue]]
speaker = "アナ"
original = "「百倍です」"
translation = "「백 배입니다」"

[[dialogue]]
speaker = "ソフィア"
original = "（ア、アルモタヘルさんって、こういう方だったんですね……）"
translation = "（아, 아르모타헬 씨는, 이런 분이셨군요……）"

[[dialogue]]
speaker = "unk"
original = "先代魔王は霊力と魔力とを融合させ、すさまじい力を誇った──とニャリオンは言っていた。"
translation = "선대 마왕은 영력과 마력을 융합시켜, 엄청난 힘을 자랑했다── 고 냐리온은 말했었다."

[[dialogue]]
speaker = "unk"
original = "その図式に則れば、アルモタヘルさんの言うことも理解できる気がした。"
translation = "그 도식에 따른다면, 아르모타헬의 말도 이해할 수 있을 것 같았다."

[[dialogue]]
speaker = "マグダレナ"
original = "「……なるほど。そういうことなら、私の分も渡しておきましょう」"
translation = "「……과연. 그런 것이라면, 제 몫도 건네 드리겠습니다」"

[[dialogue]]
speaker = "unk"
original = "そして、マグダレナさんからはフィオナへ──"
translation = "그리고, 막달레나는 피오나에게──"

[[dialogue]]
speaker = "unk"
original = "俺たちは共に、霊力の資格ありとして『<ruby>霊屑<rt>クロスダスト</rt></ruby>』を受け取った。"
translation = "우리는 함께, 영력의 자격이 있다며 『영설』를 받았다."

[[dialogue]]
speaker = "フィオナ"
original = "「ありがとうございます──マグダレナ様。必ず役に立てます」"
translation = "「감사합니다── 막달레나 님. 반드시 도움이 되도록 하겠습니다」"

[[dialogue]]
speaker = "ニャリオン"
original = "「ニャ！\u3000フィオナ嬢なら必ずや、かの先代魔王をも超える存在になると信じているニャン！」"
translation = "「냐! 피오나 아가씨라면 반드시, 그 선대 마왕마저 뛰어넘는 존재가 될 것이라 믿고 있냥!」"

[[dialogue]]
speaker = "マグダレナ"
original = "「ふふ。頼もしいですね」"
translation = "「후후. 든든하네요」"

[[dialogue]]
speaker = "クロト"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「……どうかしたのか。新星の魔王」"
translation = "「……무슨 일이냐. 신성의 마왕」"

[[dialogue]]
speaker = "クロト"
original = "「──あ、いえ……そもそもの疑問を感じてしまって」"
translation = "「──아, 아니요…… 근본적인 의문을 느껴서요」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「そもそもの疑問？」"
translation = "「근본적인 의문?」"

[[dialogue]]
speaker = "クロト"
original = "「はい。俺は──本当に魔王でいいんでしょうか」"
translation = "「네. 저는── 정말로 마왕으로 괜찮은 걸까요」"

[[dialogue]]
speaker = "unk"
original = "いつか、塔に響いた謎の声は、魔王の血統として最も濃い候補は『星見フィオナ』と宣言していた。"
translation = "언젠가, 탑에 울려 퍼진 수수께끼의 목소리는, 마왕의 혈통으로서 가장 농후한 후보는 『호시미 피오나』라고 선언했었다."

[[dialogue]]
speaker = "unk"
original = "他にも魔界、天界にもそれぞれ候補がいたとも……。"
translation = "그 외에도 마계, 천계에도 각각 후보가 있었다고도……. ."

[[dialogue]]
speaker = "unk"
original = "そう考えると俺を魔王とする根拠は、ヴィーナスがしきりに連呼してくれていた事実しかない。"
translation = "그렇게 생각하면 나를 마왕으로 하는 근거는, 비너스가 줄곧 연호해 주었던 사실밖에 없다."

[[dialogue]]
speaker = "アルモタヘル"
original = "「フィーニスの塔で聴こえた声……ということは、ふむ」"
translation = "「피니스의 탑에서 들린 목소리…… 라는 것은, 흠」"

[[dialogue]]
speaker = "マグダレナ"
original = "「ええ。間違いはないでしょうね。…………あのお方のお告げならば」"
translation = "「네. 틀림없을 것입니다. …………그분의 말씀이라면」"

[[dialogue]]
speaker = "unk"
original = "最後にぼそりと呟いたのは、わずかに聞き取れなかった。"
translation = "마지막에 중얼거린 말은, 희미하게 들리지 않았다."

[[dialogue]]
speaker = "マグダレナ"
original = "「とはいえ問題はありません。そもそも三千年前の魔王の血統は、すでに三界に散り散りになっているもの──」"
translation = "「그렇다고 해도 문제는 없습니다. 애초에 삼천 년 전의 마왕의 혈통은, 이미 삼계에 뿔뿔이 흩어져 있는 것──」"

[[dialogue]]
speaker = "マグダレナ"
original = "「あなたが発揮したという力は紛れもなく人間を超えたそれでした。あなたが魔王の系譜にあるというのも確かでしょう」"
translation = "「당신이 발휘했다는 힘은 틀림없이 인간을 초월한 그것이었습니다. 당신이 마왕의 계보에 있다는 것도 확실하겠지요」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「ああ。たとえ星見の娘より血が薄かったとしても……緋宮クロトという人間には『器』がある」"
translation = "「아아. 설령 호시미의 딸보다 피가 옅다고 해도…… 히노미야 쿠로토라는 인간에게는 『그릇』이 있다」"

[[dialogue]]
speaker = "クロト"
original = "「……なるほど。ありがとうございます」"
translation = "「……과연. 감사합니다」"

[[dialogue]]
speaker = "unk"
original = "血の濃淡の差はあれ、資格としては十分とのことだった。"
translation = "피의 농담 차이는 있을지언정, 자격으로서는 충분하다고 했다."

[[dialogue]]
speaker = "サーシャ"
original = "「それじゃー会長くんとフィオナちゃんが霊力に目覚めたら、一気に対抗できちゃう感じかしら？」"
translation = "「그럼ー 회장 군이랑 피오나짱이 영력에 눈을 뜨면, 단숨에 대항할 수 있게 되는 느낌일까?」"

[[dialogue]]
speaker = "マグダレナ"
original = "「……どうでしょう。<ruby>霊屑<rt>クロスダスト</rt></ruby>はあくまでも前世界の残滓。少々寄せ集めたところで、かの存在に敵うとは思えません」"
translation = "「……어떨까요. 영설는 어디까지나 전 세계의 잔재. 조금 모았다고 해서, 그 존재를 이길 수 있다고는 생각되지 않습니다」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「……そうだな。こうしてカケラとして渡せる程度のものでしかない」"
translation = "「……그렇지. 이렇게 조각으로서 건네줄 수 있는 정도의 것일 뿐이다」"

[[dialogue]]
speaker = "クロト"
original = "「──いえ。それでも……持つ価値は十分にあると思います」"
translation = "「──아닙니다. 그래도…… 가질 가치는 충분히 있다고 생각합니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「そうですね。もし私たちに『器』が備わっているのなら、まずは回路を開かなくてはなりませんから」"
translation = "「그렇습니다. 만약 저희에게 『그릇』이 갖춰져 있다면, 우선은 회로를 열어야 하니까요」"

[[dialogue]]
speaker = "unk"
original = "今まで──『もうないもの』としか聞いてこなかった力。霊力。"
translation = "지금까지── 『이제 없는 것』으로만 들어왔던 힘. 영력."

[[dialogue]]
speaker = "unk"
original = "それを会得する資格が俺たちにあるのなら、賭けてみたい。"
translation = "그것을 습득할 자격이 우리에게 있다면, 걸어보고 싶다."

[[dialogue]]
speaker = "クロト"
original = "「フィオナ──」"
translation = "「피오나──」"

[[dialogue]]
speaker = "フィオナ"
original = "「ええ。──必ずや目にものをみせてやりましょう」"
translation = "「네. ──반드시 본때를 보여줍시다」"

[[dialogue]]
speaker = "unk"
original = "黒騎士というかつてない強大な相手。"
translation = "검은 기사라는 전례 없는 강대한 상대."

[[dialogue]]
speaker = "unk"
original = "それに再会しても勝てる見込みはあるのか？"
translation = "그와 재회해도 이길 가망이 있는가?"

[[dialogue]]
speaker = "unk"
original = "そんな絶望的な問いかけに対して、わずかでも希望の光が見いだせたのは大きい。"
translation = "그런 절망적인 물음에 대해, 아주 조금이라도 희망의 빛을 발견할 수 있었다는 것은 크다."

[[dialogue]]
speaker = "unk"
original = "そう、前向きになっていると──"
translation = "그렇게, 긍정적으로 생각하고 있을 때──"

[[dialogue]]
speaker = "セーラ"
original = "「ん？\u3000ＤＩＳＣ？」"
translation = "「응? 디스크?」"

[[dialogue]]
speaker = "アナ"
original = "「私です──どうやら頼んでいた宛てが間に合ったようですね」"
translation = "「저입니다── 아무래도 부탁했던 곳에서 연락이 온 것 같네요」"

[[dialogue]]
speaker = "マトイ"
original = "「宛て？」"
translation = "「부탁했던 곳?」"

[[dialogue]]
speaker = "アナ"
original = "「トレーニングルームへ向かいましょう──<b>先輩</b>が待っています」"
translation = "「트레이닝 룸으로 향합시다── <b>선배</b>가 기다리고 있습니다」"

