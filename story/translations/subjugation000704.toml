[[dialogue]]
speaker = "キサナ"
original = "「あぁ？\u3000どうした！？\u3000かかってこいっつってんだろうが！」"
translation = "「아앙? 왜 그러냐!? 덤벼보라고 했잖아!」"

[[dialogue]]
speaker = "ミア"
original = "「きゃふっ！？\u3000くっ……！！」"
translation = "「꺄훗!? 큭……!!」"

[[dialogue]]
speaker = "キサナ"
original = "「デカい口叩いたクセに逃げてんじゃねえぞ、このガキ！\u3000星騎士ってのはどいつもこいつも逃げるしか能がねえのかよ？」"
translation = "「입만 살아서는 도망치지 마라, 이 꼬맹아! 성기사라는 놈들은 하나같이 도망치는 것밖에 할 줄 모르냐?」"

[[dialogue]]
speaker = "ミア"
original = "「きゃっ！\u3000な、なんて滅茶苦茶な相手なの……！\u3000周りに人がたくさんいるっていうのに……！」"
translation = "「꺄악! 마, 뭐 이런 막무가내인 상대가……! 주변에 사람이 이렇게 많은데……!」"

[[dialogue]]
speaker = "ミア"
original = "「とにかく今は人のいない場所までアイツを誘導しなくちゃ……！\u3000こんな場所で戦って誰かが巻き込まれでもしたら……！」"
translation = "「어쨌든 지금은 사람이 없는 곳까지 저 녀석을 유도해야 해……! 이런 곳에서 싸우다 누가 휘말리기라도 하면……!」"

[[dialogue]]
speaker = "ミア"
original = "「はぁはぁっ、ここなら……！」"
translation = "「하아, 하아, 여기라면……!」"

[[dialogue]]
speaker = "キサナ"
original = "「ようやく串刺しになる覚悟ができたか？\u3000それとも膝が震えすぎてもう動けませんってか？」"
translation = "「드디어 꼬챙이가 될 각오가 섰냐? 아니면 무릎이 너무 떨려서 이제 못 움직이는 거냐?」"

[[dialogue]]
speaker = "ミア"
original = "「だ、黙りなさいっ。あんたなんか怖くもなんともないんだからっ……！」"
translation = "「다, 닥치세요. 당신 같은 건 하나도 안 무서우니까……!」"

[[dialogue]]
speaker = "ミア"
original = "（落ち着くのよ、ミア。少しでも隙を見せたらきっと一瞬でやられる。救援を呼んでいる暇はない。こうなったからには私が一人でコイツを倒すしかない……！）"
translation = "(진정해, 미아. 조금이라도 빈틈을 보이면 분명 한순간에 당할 거야. 지원을 부를 틈은 없어. 이렇게 된 이상 내가 혼자서 이 녀석을 쓰러뜨릴 수밖에 없어……!)"

[[dialogue]]
speaker = "ミア"
original = "（私のバカっ……！\u3000バカバカバカっ！\u3000素直にエリス先輩の言うことを聞いていれば……会長さんと一緒にいれば、こんな事態にはならなかったのに……！）"
translation = "(난 바보야……! 바보 바보 바보! 솔직하게 에리스 선배 말을 들었더라면…… 회장님과 함께 있었더라면, 이런 일은 없었을 텐데……!)"

[[dialogue]]
speaker = "ミア"
original = "（私に、倒せるのかしら……。エリス先輩を一方的に打ちのめした敵を……。エリス先輩より弱くて未熟な私が一人で……）"
translation = "(내가 쓰러뜨릴 수 있을까……. 에리스 선배를 일방적으로 몰아붙인 적을……. 에리스 선배보다 약하고 미숙한 내가 혼자서……)"

[[dialogue]]
speaker = "キサナ"
original = "「どこ見てやがる。敵の前でぼさっとしてんじゃねえ！」"
translation = "「어딜 보고 있냐. 적 앞에서 멍하니 있지 마!」"

[[dialogue]]
speaker = "ミア"
original = "「きゃあっ！？\u3000はぁはぁっ、うぐっ……！」"
translation = "「꺄악!? 하아, 하아, 으윽……!」"

[[dialogue]]
speaker = "キサナ"
original = "「ハッ、正義の味方が戦ってる時にビビってんじゃねえよ。それともなんだ？\u3000星騎士ってのはヒーローショーの真似事しかできねえのか？」"
translation = "「하, 정의의 사자가 싸울 때 쫄아있지 마라. 아니면 뭐냐? 성기사라는 건 히어로 쇼 흉내밖에 못 내는 거냐?」"

[[dialogue]]
speaker = "キサナ"
original = "「プチプチプチプチ雑魚モンスター潰して回って拍手喝采キャー素敵ってか？\u3000いいご身分だなぁ！\u3000羨ましいぜ！」"
translation = "「조무래기 몬스터들 톡톡 터뜨리고 다니면서 박수갈채 받고 '꺄아 멋져요' 소리 듣는 거냐? 팔자 좋구만! 부러워 죽겠네!」"

[[dialogue]]
speaker = "ミア"
original = "「くっ！\u3000ひゃっ……！」"
translation = "「큭! 히얏……!」"

[[dialogue]]
speaker = "キサナ"
original = "「んだよ、避けんじゃねえよ。結局逃げんじゃねえか。これなら昨日の金髪女の方がいくぶんか上等な獲物だったぜ」"
translation = "「뭐야, 피하지 마라. 결국 도망치는 거냐. 이래서야 어제의 금발 여자가 훨씬 나은 사냥감이었겠어」"

[[dialogue]]
speaker = "キサナ"
original = "「もう──殺すか」"
translation = "「이제── 죽일까」"

[[dialogue]]
speaker = "ミア"
original = "「あうっ……！」"
translation = "「아우……!」"

[[dialogue]]
speaker = "ミア"
original = "（怖い……！\u3000怖い怖い怖い……！\u3000本物の殺意を向けられることが、こんなにも怖いことだったなんて……！）"
translation = "(무서워……! 무서워 무서워 무서워……! 진짜 살의를 마주한다는 게 이렇게나 무서운 일이었다니……!)"

[[dialogue]]
speaker = "ミア"
original = "（だけど、逃げるわけにはいかない……！\u3000ここで逃げたら、立ち向かえなかったら──）"
translation = "(하지만 도망칠 수는 없어……! 여기서 도망치면, 맞서 싸우지 못하면──)"

[[dialogue]]
speaker = "ミア"
original = "「私は一生ママとパパみたいな立派な星騎士になんてなれないもんっ！」"
translation = "「나는 평생 엄마랑 아빠 같은 훌륭한 성기사가 될 수 없단 말이야!」"

[[dialogue]]
speaker = "キサナ"
original = "「あぁ……その目、イライラする。自分が正しいことを疑ってねえ、正義に燃えてますって目。アタシの嫌いな目だ」"
translation = "「아아…… 그 눈, 짜증 나. 자기가 옳다는 걸 의심하지 않는, 정의에 불타는 눈. 내가 제일 싫어하는 눈이다」"

[[dialogue]]
speaker = "ミア"
original = "（恐れないで、ミア……！\u3000相手は私を子どもだと思って舐めてる……！\u3000その油断を突くの……！）"
translation = "(두려워 마, 미아……! 상대는 나를 어린애라고 생각해서 얕보고 있어……! 그 방심을 찌르는 거야……!)"

[[dialogue]]
speaker = "ミア"
original = "（私だって何も闇雲に逃げ回っていたわけじゃない。私の力は『燃焼』。体に熱を溜めれば溜めるほど私は星力を高められる……！）"
translation = "(나도 아무 생각 없이 도망만 다닌 게 아냐. 내 힘은 『연소』. 몸에 열을 모으면 모을수록 성력을 높일 수 있어……!)"

[[dialogue]]
speaker = "ミア"
original = "（体はもう十分温まってるわ。あとはこの溜めに溜めた全熱量を一気に解放してぶつけに行くだけ……！）"
translation = "(몸은 이제 충분히 달궈졌어. 남은 건 모으고 모은 이 전 열량을 한꺼번에 해방해서 부딪치러 가는 것뿐……!)"

[[dialogue]]
speaker = "ミア"
original = "（この技だけは絶対の自信がある……！\u3000たとえ相手がエリス先輩を打ちのめした相手でも、避けられない限り勝機はある……！）"
translation = "(이 기술만큼은 절대적으로 자신 있어……! 설령 상대가 에리스 선배를 쓰러뜨린 상대라 해도, 피하지만 못한다면 승산은 있어……!)"

[[dialogue]]
speaker = "ミア"
original = "（だけどこれは全星力を込めた一度きりの大技。一度熱を放出してしまえばろくに動けなくなってしまう諸刃の剣）"
translation = "(하지만 이건 모든 성력을 쏟아부은 단 한 번뿐인 필살기. 한 번 열을 방출해버리면 제대로 움직일 수 없게 되는 양날의 검)"

[[dialogue]]
speaker = "ミア"
original = "（そして、万が一外してしまえば私は──）"
translation = "(그리고, 만약 빗나간다면 나는──)"

[[dialogue]]
speaker = "キサナ"
original = "「ちょうどいい。その目玉、抉り抜いてやるか」"
translation = "「마침 잘됐군. 그 눈깔, 파내주마」"

[[dialogue]]
speaker = "ミア"
original = "「っっ──！！」"
translation = "「윽──!!」"

[[dialogue]]
speaker = "ミア"
original = "（震えないで、私の足……！\u3000今動かないでいつ動くのよ……！）"
translation = "(떨지 마, 내 다리……! 지금 안 움직이면 언제 움직일 거야……!)"

[[dialogue]]
speaker = "ミア"
original = "（勇気を出すのっ！\u3000この技だけは──エリス先輩にだって褒めてもらえたんだからっ！）"
translation = "(용기를 내! 이 기술만큼은── 에리스 선배한테도 칭찬받았으니까!)"

[[dialogue]]
speaker = "ミア"
original = "「食らいなさいっ──バーニング・エクスプロージョン！！」"
translation = "「받아라── 버닝 익스플로전!!」"

[[dialogue]]
speaker = "ミア"
original = "（灼熱をまとって突進するだけの単純な攻撃。でもこの速度は、威力は、エリス先輩にだって負けない──！！）"
translation = "(작열을 두르고 돌진할 뿐인 단순한 공격. 하지만 이 속도는, 위력은, 에리스 선배에게도 지지 않아──!!)"

[[dialogue]]
speaker = "キサナ"
original = "「ハッ……」"
translation = "「하……」"

[[dialogue]]
speaker = "ミア"
original = "「え…………？」"
translation = "「에…………?」"

[[dialogue]]
speaker = "キサナ"
original = "「貧相な見た目の割には大した星力だが、所詮こんなもんか。腹の半分にも足りねえ」"
translation = "「빈약한 겉모습치고는 제법인 성력이지만, 결국 이 정도냐. 배의 반도 안 차겠어」"

[[dialogue]]
speaker = "ミア"
original = "「な、なんでこんなあっさり止められて…………──きゃあっ！？」"
translation = "「어, 어째서 이렇게 간단히 막히고…………── 꺄앗!?」"

[[dialogue]]
speaker = "キサナ"
original = "「あぁ……羨ましいなぁ、星騎士ってやつは。弱くてもなれて、ヒーロー気取りでチヤホヤされんだからよ」"
translation = "「아아…… 부럽네, 성기사라는 놈들은. 약해 빠졌어도 될 수 있고, 히어로인 척하며 대접받으니까 말이야」"

[[dialogue]]
speaker = "ミア"
original = "「あうっ……！\u3000はっ、はああああっっ……！！」"
translation = "「아우……! 하, 하아아아악……!!」"

[[dialogue]]
speaker = "キサナ"
original = "「アハハハッ！\u3000なんだ、その苦し紛れの攻撃は。ロウソクに火でもつける気か？」"
translation = "「아하하하! 뭐야, 그 궁색한 공격은. 양초에 불이라도 붙일 셈이냐?」"

[[dialogue]]
speaker = "ミア"
original = "「なっ──……！？\u3000わ、私の星力が打ち消されて……！？」"
translation = "「머──……!? 내, 내 성력이 지워지고 있어……!?」"

[[dialogue]]
speaker = "キサナ"
original = "「いいだろ、この力。星力に頼り切りの星騎士サマの素顔を嫌でも曝け出させてやれる」"
translation = "「좋지, 이 힘. 성력에만 의존하는 성기사 님의 본모습을 억지로라도 까발려줄 수 있거든」"

[[dialogue]]
speaker = "キサナ"
original = "「どうした、もう終わりか？\u3000アタシを倒すんだろ？\u3000アタシが許せねえんだろ？\u3000あぁ？\u3000正義の味方さんよぉ？」"
translation = "「왜 그러냐, 벌써 끝이냐? 나를 쓰러뜨린다며? 내가 용서가 안 된다며? 엉? 정의의 사자님아?」"

[[dialogue]]
speaker = "ミア"
original = "「くっ…………」"
translation = "「큭…………」"

[[dialogue]]
speaker = "ミア"
original = "（ダメ、もう体に力が……。星力を、使い切っちゃって……）"
translation = "(안 돼, 이제 몸에 힘이……. 성력을 다 써버려서……)"

[[dialogue]]
speaker = "キサナ"
original = "「……んだよ。マジで終わりかよ。やっぱガキはガキだな……」"
translation = "「……뭐야. 진짜 끝이냐. 역시 꼬맹이는 꼬맹이구만……」"

[[dialogue]]
speaker = "キサナ"
original = "「じゃ、死ね」"
translation = "「그럼, 죽어라」"

[[dialogue]]
speaker = "ミア"
original = "「きゃっ──きゃあああああああっっ～～！！」"
translation = "「꺄앗── 꺄아아아아아아악~~!!」"

