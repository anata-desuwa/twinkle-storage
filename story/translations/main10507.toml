[[dialogue]]
speaker = "unk"
original = "第７話,潜入作戦再びだぴょん！,B"
translation = "제7화, 잠입 작전 다시 한번이다뿅!, B"

[[dialogue]]
speaker = "unk"
original = "そんな風に忙しくプレゼントを配って回り。"
translation = "그렇게 바쁘게 선물을 나눠주고 다니며."

[[dialogue]]
speaker = "unk"
original = "お屋敷の人たち全員にプレゼントを配り終わる頃には、２４日、クリスマスイブになっていた。"
translation = "저택 사람 전원에게 선물을 다 나눠줬을 무렵에는, 24일, 크리스마스 이브가 되어 있었다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「どう？\u3000クリスマスフォームが起動する感じはあるかしら？」"
translation = "「어때? 크리스마스 폼이 기동하는 느낌이 있니?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「まだだわ。兆しは感じるものの、何かが足りていないみたい」"
translation = "「아직이야. 조짐은 느껴지지만, 무언가가 부족한 것 같아」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そうね……ふふふ、ここまでは想定通りよ」"
translation = "「그렇네…… 후후후, 여기까지는 상정했던 대로야」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「な……全てはお嬢様の計画通りだったということなの！？」"
translation = "「뭐…… 모든 것이 아가씨의 계획대로였다는 거야!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「蘭美、あなたはまだフォーム解放の最後の鍵を開いていないわ」"
translation = "「라비, 너는 아직 폼 해방의 마지막 열쇠를 열지 않았어」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そして……その鍵は、あそこにある！」"
translation = "「그리고…… 그 열쇠는, 저기에 있어!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「っ……！\u3000当主様……そういうことね？」"
translation = "「윽……! 당주님…… 그런 거였구나?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ええ、そうよ。ヘレナちゃんにプレゼントを渡して、それでこの作戦はやっと完成する……そういうこと！」"
translation = "「응, 그래. 헬레나짱에게 선물을 건네고, 그래야 이 작전은 겨우 완성되는 거야…… 그런 거지!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「お嬢様、やってやるわ！\u3000当主様の部屋の灯りが消えたら最後のミッションを開始しましょう！」"
translation = "「아가씨, 해보겠어! 당주님 방의 불이 꺼지면 마지막 미션을 개시하자!」"

[[dialogue]]
speaker = "unk"
original = "そして夜が訪れた。"
translation = "그리고 밤이 찾아왔다."

[[dialogue]]
speaker = "unk"
original = "戦闘服に身を包んだ蘭美は、中庭でヴィーナスと合流する。"
translation = "전투복을 몸에 두른 라비는 중정에서 비너스와 합류한다."

[[dialogue]]
speaker = "unk"
original = "息をひそめて待っていると、やがてヘレナの部屋の灯りが消える。"
translation = "숨을 죽이고 기다리고 있자, 이윽고 헬레나의 방 불이 꺼진다."

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「どうやらお休みになられたようね……」"
translation = "「아무래도 잠드신 모양이네……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そろそろいいんじゃない？」"
translation = "「슬슬 괜찮지 않아?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「深夜ともなれば屋敷の警備システムが作動しているわ。出来るだけ物音を立てないように、私の後についてきて」"
translation = "「심야가 되면 저택의 경비 시스템이 작동해. 가능한 한 소리를 내지 않도록 내 뒤를 따라오렴」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「どこを進めばいいか分かってるの？」"
translation = "「어디로 가야 할지 알고 있어?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「私は九浄家のメイド長。もちろん屋敷の警備体制についても完璧に把握しているわ」"
translation = "「나는 쿠죠 가의 메이드장. 물론 저택의 경비 체제에 대해서도 완벽하게 파악하고 있단다」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「今はＣランクの警備体制が敷かれているはずだから……こっちね」"
translation = "「지금은 C랭크 경비 체제가 깔려 있을 테니까…… 이쪽이야」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「うんうん、まさに潜入ミッションって感じね！」"
translation = "「응응, 정말 잠입 미션이라는 느낌이네!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「……問題ないわ。これならヘレナ様の寝室までたどり着けそう──」"
translation = "「……문제없어. 이대로라면 헬레나 님의 침실까지 도달할 수 있겠──」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「警報っ！？\u3000探知に掛かった！？」"
translation = "「경보!? 탐지에 걸렸어!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「見つかっちゃったの！\u3000どうして！？」"
translation = "「들켜버린 거야! 어째서!?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「屋敷の警備体制がいつの間にかＳランクに引き上げられてる！」"
translation = "「저택의 경비 체제가 어느새 S랭크로 격상되어 있어!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「Ｓランク！？\u3000最上級の警戒態勢ってこと？」"
translation = "「S랭크!? 최상급 경계 태세라는 거야?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「そうよ。どうやらヘレナ様は、私たちの目論見を看破していたようね」"
translation = "「그래. 아무래도 헬레나 님은 우리의 속셈을 간파하고 계셨던 모양이구나」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "『小癪な鼠が２人よ。立てばプリティ、座ればゴージャス、我こそは九浄家二十六代目当主・九浄ヘレナちゃんである！』"
translation = "『가소로운 쥐새끼가 둘이로다. 서면 프리티, 앉으면 고저스, 나야말로 쿠죠 가 26대 당주·쿠죠 헬레나짱이니라!』"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "『我が九浄家の屋敷に忍び込もうとは見上げた度胸だ』"
translation = "『우리 쿠죠 가의 저택에 잠입하려 하다니 가상한 배짱이도다』"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "『その勇気に敬意を表して、全力の防衛体制で迎えることにしよう』"
translation = "『그 용기에 경의를 표하여, 전력의 방위 체제로 맞이해주도록 하지』"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "『貴殿らの目的は私だろう？\u3000見事、警備網を突破して我が元までたどり着いてみせよ！\u3000待っているぞ、ふっふっふ！』"
translation = "『귀공들의 목적은 나겠지? 보란 듯이 경비망을 돌파하여 내 앞까지 도달해 보거라! 기다리고 있겠노라, 훗훗훗!』"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふぅん……私たちはプレゼントを届けに来ただけなんだけど──面白いじゃない！」"
translation = "「흐응…… 우리는 선물을 전하러 왔을 뿐인데── 재미있잖아!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ということは勿論？」"
translation = "「그렇다는 건 물론?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「強行突破に決まってるでしょ！」"
translation = "「강행 돌파로 결정됐잖아!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「いいわね、そうこなくっちゃ！」"
translation = "「좋구나, 그래야지!」"

[[dialogue]]
speaker_original = "ガーディアン"
speaker_translation = "가디언"
original = "『侵入者ヲ、発見シマシタ──排除シマス──』"
translation = "『침입자를, 발견했습니다── 배제합니다──』"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「きゃっ！？\u3000何……！？」"
translation = "「꺄악!? 뭐야……!?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ガーディアンよ、気を付けて！」"
translation = "「가디언이야, 조심하렴!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「これってフィーニスの塔にいた、あのガーディアン！？」"
translation = "「이거 피니스의 탑에 있던 그 가디언!?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「そのデータを収集して造ったものらしいわ。コピーだけど性能はオリジナルに負けないほど高いわよ！」"
translation = "「그 데이터를 수집해서 만든 모양이야. 복제품이지만 성능은 오리지널에 뒤지지 않을 정도로 높단다!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「関係ないわね！\u3000私はそのオリジナルとだって戦ってるんだから！」"
translation = "「상관없어! 나는 그 오리지널과도 싸웠으니까!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ディバインスフィアっ！！！！」"
translation = "「디바인 스피어!!!!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ま、こんなものね！」"
translation = "「뭐, 이 정도네!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「さすがお嬢様だわ！」"
translation = "「역시 아가씨야!」"

[[dialogue]]
speaker_original = "ガーディアン"
speaker_translation = "가디언"
original = "『侵入者、排除シマス──排除シマス──排除シマス──』"
translation = "『침입자, 배제합니다── 배제합니다── 배제합니다──』"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ぞろぞろと出てきたわね！\u3000いいわ、いくらでもかかって来なさい！」"
translation = "「우르르 몰려나왔네! 좋아, 얼마든지 덤벼보렴!」"

[[dialogue]]
speaker_original = "ガーディアン"
speaker_translation = "가디언"
original = "『排除──排除──排除──排除──……』"
translation = "『배제── 배제── 배제── 배제──……』"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「後ろからも！？\u3000なるほど、物量で押してくる作戦ってわけね！」"
translation = "「뒤에서도!? 과연, 물량으로 밀어붙이는 작전이라는 거네!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「お嬢様、後ろの敵は私に任せて！\u3000いつもの戦闘服に変身して──」"
translation = "「아가씨, 뒤쪽 적은 저에게 맡겨주세요! 평소의 전투복으로 변신해서──」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「待って、変身しちゃだめよ！\u3000あなたはそのフォームのままでいなさい！」"
translation = "「기다려, 변신하면 안 돼! 당신은 그 폼 그대로 있도록 해!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「っ！！\u3000だけどこれだけの数、いくらお嬢様でも！」"
translation = "「윽!! 하지만 이 정도 숫자라면, 아무리 아가씨라도!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「なんてこと無いわ！\u3000ディバインスフィアっ！！！！」"
translation = "「아무것도 아니야! 디바인 스피어!!!!」"

[[dialogue]]
speaker_original = "ガーディアン"
speaker_translation = "가디언"
original = "『排除シマス──排除シマス──排除シマス──』"
translation = "『배제합니다── 배제합니다── 배제합니다──』"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「次はそっちね！！！！」"
translation = "「다음은 그쪽이네!!!!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「さあ、どんどん来なさい！」"
translation = "「자, 어서 덤비렴!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "（お嬢様ノリノリね……でも、さすがに数が多すぎる）"
translation = "(아가씨 신나셨네…… 하지만, 역시 숫자가 너무 많아)"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "（やっぱり私も戦った方が……でも、それだとこの戦い自体に意味が無くなってしまうわ）"
translation = "(역시 나도 싸우는 편이…… 하지만, 그러면 이 싸움 자체에 의미가 없어져 버려)"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "（く……指を咥えて見ている事しかできないっていうの？\u3000この私が……？）"
translation = "(큭…… 손가락만 빨며 보고 있을 수밖에 없다는 거야? 이 내가……?)"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「……ふっ、そんなの違うでしょ」"
translation = "「……훗, 그건 아니지」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「戦うのよ、羽宮蘭美！\u3000簡単なことじゃない、今すぐ覚醒させればいいだけの話っ！」"
translation = "「싸우는 거야, 하네미야 라비! 간단한 일이잖아, 지금 당장 각성시키면 될 뿐인 이야기!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「さあ！\u3000今こそ目覚めなさい、私のクリスマスフォームっ！！！！」"
translation = "「자! 지금이야말로 눈을 뜨거라, 나의 크리스마스 폼!!!!」"

