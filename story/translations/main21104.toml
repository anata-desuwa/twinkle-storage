[[dialogue]]
speaker = "unk"
original = "第４話,再び戦いの地へ,B"
translation = "제4화, 다시 전장의 땅으로, B"

[[dialogue]]
speaker = "メルエル"
original = "「会長くん。私は神殿の中じゃ戦えないし、聖庭園に戻るよ」"
translation = "「회장님. 저는 신전 안에서는 싸울 수 없으니 성정원으로 돌아갈게요.」"

[[dialogue]]
speaker = "メルエル"
original = "「リガルタ様──今はまだお父さんだと思えないけど……お父さんが残したアルケインコードが役に立つかもしれない」"
translation = "「리갈타 님── 지금은 아직 아빠라고 생각되지 않지만…… 아빠가 남긴 아르케인 코드가 도움이 될지도 몰라요.」"

[[dialogue]]
speaker = "メルエル"
original = "「それに、今起きてることを聖庭園のみんなに伝えないと！」"
translation = "「게다가 지금 일어나고 있는 일을 성정원의 모두에게 전해야 해요!」"

[[dialogue]]
speaker = "メルエル"
original = "「万が一、女神様の神殿が止められなかったら、聖庭園のみんなが潰されちゃう」"
translation = "「만약에 여신님의 신전을 멈출 수 없다면 성정원의 모두가 짓눌려 버릴 거예요.」"

[[dialogue]]
speaker = "メルエル"
original = "「神殿が聖庭園にぶつかったら、天使はみんな消えちゃうかもしれないけど、念のため避難はしておいた方がいいと思うんだ」"
translation = "「신전이 성정원에 부딪히면 천사들은 모두 사라져 버릴지도 모르지만, 만약을 위해 피난은 해두는 게 좋다고 생각해요.」"

[[dialogue]]
speaker = "クロト"
original = "「確かに……できることはしておいた方がいいか」"
translation = "「확실히…… 할 수 있는 일은 해두는 게 좋겠군.」"

[[dialogue]]
speaker = "unk"
original = "この状況では、聖庭園にどんな被害が及ぶかわからない。"
translation = "이 상황에서는 성정원에 어떤 피해가 미칠지 알 수 없다."

[[dialogue]]
speaker = "unk"
original = "聖庭園に滞在している人間や魔族もいるかもしれないし、避難するに越したことはないだろう。"
translation = "성정원에 체류하고 있는 인간이나 마족도 있을지 모르니, 피난해서 나쁠 건 없을 것이다."

[[dialogue]]
speaker = "アポロ"
original = "「神殿を止める以外にも、激突を避ける方法があればいいんだが……」"
translation = "「신전을 멈추는 것 말고도 격돌을 피할 방법이 있으면 좋겠는데……」"

[[dialogue]]
speaker = "メルエル"
original = "「女神様の神殿と聖庭園がぶつからないようにする方法…………あ！」"
translation = "「여신님의 신전과 성정원이 부딪히지 않게 하는 방법………… 아!」"

[[dialogue]]
speaker = "アポロ"
original = "「メルエル？\u3000何か思いついたのか？」"
translation = "「메르엘? 뭔가 떠오른 거야?」"

[[dialogue]]
speaker = "メルエル"
original = "「うん、聖庭園の土地というか、空中島を壊しちゃえばいいんだよ！」"
translation = "「응, 성정원의 땅이라고 할까, 공중섬을 부숴버리면 돼요!」"

[[dialogue]]
speaker = "アポロ"
original = "「はぁっ！？」"
translation = "「하앗!?」"

[[dialogue]]
speaker = "クロト"
original = "「聖庭園を……壊す……？」"
translation = "「성정원을…… 부순다고……?」"

[[dialogue]]
speaker = "unk"
original = "メルエルの口から出た、思いもよらない提案に一瞬耳を疑った。"
translation = "메르엘의 입에서 나온 생각지도 못한 제안에 순간 귀를 의심했다."

[[dialogue]]
speaker = "メルエル"
original = "「もちろん最悪の場合の話だけど、聖庭園がその軌道上になければ、神殿がぶつかることはないでしょ？」"
translation = "「물론 최악의 경우를 말하는 거지만, 성정원이 그 궤도상에 없다면 신전이 부딪힐 일은 없잖아요?」"

[[dialogue]]
speaker = "メルエル"
original = "「聖庭園は故郷だし、大事な場所だけど、天界そのものがなくなるよりはいいよ！」"
translation = "「성정원은 고향이고 소중한 장소지만, 천계 자체가 없어지는 것보다는 나아요!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「なるほど！\u3000確かに一理あるわね！」"
translation = "「과연! 확실히 일리가 있네!」"

[[dialogue]]
speaker = "アポロ"
original = "（メルエルって意外と脳筋なところがあるな……）"
translation = "(메르엘은 의외로 근육 뇌 같은 구석이 있단 말이지……)"

[[dialogue]]
speaker = "ナターシャ"
original = "「まぁ、ジグを倒すのに賭けるしかないよりはマシじゃない？」"
translation = "「뭐, 지그를 쓰러뜨리는 데 도박을 거는 것보다는 낫지 않아?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「壊すんじゃなくても、神殿みたいに動かす方法はあるかもしれないし、聖庭園の議会の連中に提案してみる価値はあると思うよ」"
translation = "「부수는 게 아니더라도 신전처럼 움직이는 방법이 있을지도 모르고, 성정원 의회 녀석들에게 제안해 볼 가치는 있다고 봐.」"

[[dialogue]]
speaker = "メルエル"
original = "「うん。その案を伝えるためにも、私は聖庭園に向かうね！」"
translation = "「응. 그 안을 전하기 위해서라도 나는 성정원으로 향할게!」"

[[dialogue]]
speaker = "アポロ"
original = "「ならあたしも行くぞ！\u3000神殿の中じゃ戦えないし、本当に聖庭園の空中島をバラバラにする必要があるなら、魔王の力が要るかもしれない」"
translation = "「그럼 나도 가겠어! 신전 안에서는 싸울 수 없고, 정말로 성정원의 공중섬을 뿔뿔이 흩어놓아야 한다면 마왕의 힘이 필요할지도 몰라.」"

[[dialogue]]
speaker = "チナ"
original = "「じゃあアタシの極星従騎に乗れ」"
translation = "「그럼 내 극성종기에 타라.」"

[[dialogue]]
speaker = "チナ"
original = "「リクリエの使徒は気になるが、戦えないグレイスとレティシアを連れていくのは危険だし、アタシも聖庭園に戻る」"
translation = "「리크리에의 사도는 신경 쓰이지만, 싸울 수 없는 그레이스와 레티시아를 데리고 다니는 건 위험하고, 나도 성정원으로 돌아가겠어.」"

[[dialogue]]
speaker = "グレイス"
original = "「うぅ、面目ない……」"
translation = "「으으, 면목 없습니다……」"

[[dialogue]]
speaker = "unk"
original = "メルエルと、アポロ、極星星徒会の３人は聖庭園に戻ることになった。"
translation = "메르엘과 아폴로, 극성성도회 세 사람은 성정원으로 돌아가기로 했다."

[[dialogue]]
speaker = "unk"
original = "改めてジグと戦うメンバーを決めなければいけないが、消去法でいくと──"
translation = "새삼 지그와 싸울 멤버를 정해야 하지만, 소거법으로 가자면──"

[[dialogue]]
speaker = "梨緒"
original = "「さっきは却下されたが、やはり私が行こう」"
translation = "「아까는 거절당했지만 역시 내가 가겠어.」"

[[dialogue]]
speaker = "梨緒"
original = "「魔王の力が使えない今、リクリエの使徒であるジグに対抗できる可能性があるのは、私の中の守護天使ノルンの力だけだ」"
translation = "「마왕의 힘을 쓸 수 없는 지금, 리크리에의 사도인 지그에게 대항할 가능성이 있는 건 내 안의 수호천사 노른의 힘뿐이다.」"

[[dialogue]]
speaker = "梨緒"
original = "「そのノルンの力も未知数ではあるが、それに頼るしかない」"
translation = "「그 노른의 힘도 미지수긴 하지만, 거기에 기댈 수밖에 없어.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ま……正直今の梨緒を行かせたくはないけど、仕方ないか。そもそも頭数が足りてないし」"
translation = "「뭐…… 솔직히 지금의 리오를 보내고 싶지는 않지만 어쩔 수 없나. 애초에 머릿수가 부족하고.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「もちろん私も行くよ。天使全員の命が懸かってるしね」"
translation = "「물론 나도 갈 거야. 천사 전원의 목숨이 걸려 있으니까 말이야.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「私も戦うよ！\u3000天使のみんなを消させたりしないから！」"
translation = "「나도 싸울게! 천사들을 사라지게 두지 않을 거니까!」"

[[dialogue]]
speaker = "unk"
original = "今の戦力で、ジグと戦えるのは梨緒、ナターシャ、ベアトリスの３人だけ。"
translation = "지금 전력으로 지그와 싸울 수 있는 건 리오, 나타샤, 베아트리스 세 사람뿐."

[[dialogue]]
speaker = "unk"
original = "本来は率先して戦うのが星徒会の役目だが、ここは選挙管理委員会の３人に託すしかない。"
translation = "본래는 앞장서서 싸우는 것이 성도회의 역할이지만, 여기서는 선거관리위원회 세 사람에게 맡길 수밖에 없다."

[[dialogue]]
speaker = "クロト"
original = "「すまないが、ジグのことは任せる。言いたくはないけど、天界の命運は梨緒たちに懸かっている」"
translation = "「미안하지만 지그는 부탁한다. 말하고 싶지는 않지만 천계의 운명은 리오 너희에게 달려 있어.」"

[[dialogue]]
speaker = "梨緒"
original = "「ああ、理解している。ここでジグに勝てなければ、天界に……そしてアルタイルに未来はない」"
translation = "「아아, 이해하고 있다. 여기서 지그에게 이기지 못하면 천계에…… 그리고 알타이르에 미래는 없어.」"

[[dialogue]]
speaker = "アポロ"
original = "「悪い……あたしも一緒に戦いたいが、一緒に行っても足手まといになるだけだ」"
translation = "「미안해…… 나도 같이 싸우고 싶지만, 같이 가봤자 발목만 잡을 뿐이야.」"

[[dialogue]]
speaker = "アポロ"
original = "「頼んだぞ。梨緒、ベアト、ナターシャ」"
translation = "「부탁한다. 리오, 베아토, 나타샤.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「うん、アポロちゃんの分まで戦うよ」"
translation = "「응, 아폴로 짱 몫까지 싸울게.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「生きてまた会えるといいね」"
translation = "「살아서 다시 만나면 좋겠네.」"

[[dialogue]]
speaker = "梨緒"
original = "「ああ、必ずジグに勝つ」"
translation = "「아아, 반드시 지그에게 이기겠다.」"

[[dialogue]]
speaker = "梨緒"
original = "「……では行こう。時間は限られている」"
translation = "「……그럼 가자. 시간은 한정되어 있다.」"

[[dialogue]]
speaker = "unk"
original = "チナの極星従騎には、チナ本人と、メルエル、アポロ、グレイス、レティシア。"
translation = "치나의 극성종기에는 치나 본인과 메르엘, 아폴로, 그레이스, 레티시아."

[[dialogue]]
speaker = "unk"
original = "ベアトリスの極星従騎には、梨緒、ベアトリス、ナターシャ。"
translation = "베아트리스의 극성종기에는 리오, 베아트리스, 나타샤."

[[dialogue]]
speaker = "unk"
original = "神殿の外に出て飛べるようになった俺とヴィーナスは、その場で待機して、２騎が飛び立つのを見送ろうとしたが──"
translation = "신전 밖으로 나와 날 수 있게 된 나와 비너스는 그 자리에서 대기하며 두 기가 날아오르는 것을 배웅하려 했지만──"

[[dialogue]]
speaker = "ドラケルス"
original = "「グルルァアッ！」"
translation = "「구르르아앗!」"

[[dialogue]]
speaker = "クロト"
original = "「ジグが連れてきた機械型モンスターか！」"
translation = "「지그가 데려온 기계형 몬스터인가!」"

[[dialogue]]
speaker = "unk"
original = "どうやら神殿の外に離脱した俺たちを見逃すつもりはないらしい。"
translation = "아무래도 신전 밖으로 이탈한 우리를 놓아줄 생각은 없는 모양이다."

[[dialogue]]
speaker = "unk"
original = "だが神殿の外なら、魔王因子への干渉も届かない。俺もヴィーナスも戦える。"
translation = "하지만 신전 밖이라면 마왕 인자에 대한 간섭도 닿지 않는다. 나도 비너스도 싸울 수 있다."

[[dialogue]]
speaker = "unk"
original = "神殿内で戦う梨緒たちの敵が少しでも減るよう、俺たちも戦わなければ……！"
translation = "신전 안에서 싸우는 리오 일행의 적이 조금이라도 줄어들도록 우리도 싸워야만 해……!"

[[dialogue]]
speaker = "クロト"
original = "「ヴィーナス、モンスターを迎撃するぞ！」"
translation = "「비너스, 몬스터를 요격하자!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ええ、木っ端ミジンコにしてやるわ！」"
translation = "「그래, 가루로 만들어 주겠어!」"

