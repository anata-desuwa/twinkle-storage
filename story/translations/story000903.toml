[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「すっご～い♪\u3000流石は九浄家直営のカジノ！\u3000めっちゃ華やかじゃん！」"
translation = "「대~박♪ 역시 쿠죠 가문 직영 카지노! 엄청 화려하잖아!」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「しかしこうも店内が煌びやかですと、場違いになっていないか心配になってしまいますね。上手く溶け込めているとよいのですが」"
translation = "「하지만 이렇게나 가게 안이 눈부시면 겉돌지 않을지 걱정되네요. 잘 녹아들 수 있으면 좋으련만.」"

[[dialogue]]
speaker = "unk"
original = "ユーリスはバッチリ溶け込んでるよ"
translation = "유리스는 완벽하게 녹아들었어"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「ふふ、ありがとう。お世辞でも嬉しいよ」"
translation = "「후후, 고마워. 빈말이라도 기쁘네.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「実際めちゃくちゃ溶け込んでると思うけどね。２人ともやり手のディーラーにしか見えないってゆーか」"
translation = "「실제로 엄청 잘 녹아들었다고 보는데. 둘 다 유능한 딜러로밖에 안 보인다고나 할까.」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「セーラさんこそカジノの看板娘の風格を感じますよ」"
translation = "「세라 씨야말로 카지노 간판 스타의 풍채가 느껴져요.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「え、やっぱし？\u3000うちもイケてる気がしてたんだよね～♪\u3000『お客様……ドリンクはいかがですか？』」"
translation = "「에, 역시? 나도 좀 잘나가는 기분이 들었거든~♪ 『손님…… 음료는 어떠신가요?』」"

[[dialogue]]
speaker = "unk"
original = "それに比べると……"
translation = "그에 비하면……"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「っっ。な、なんだよ、こっち見んなっ！」"
translation = "「윽. 뭐, 뭐야, 이쪽 보지 마!」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「ま、まだ恥ずかしがられていたんですね……」"
translation = "「아, 아직 부끄러워하고 계셨군요……」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「『まだ』ってなんだ『まだ』って！？\u3000元はと言えばあんたがこんな格好させっから──」"
translation = "「『아직』은 무슨 『아직』이야!? 원래 따지고 보면 네가 이런 옷을 입히니까──」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「はいはい、ストーップ。これ以上の恥じらいボケはくどいってばユウリちゃん」"
translation = "「자자, 스톱. 그 이상의 부끄럼 개그는 진부하다구, 유우리짱.」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ボケてるわけじゃねえんすけど！？」"
translation = "「개그 치는 거 아님!?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ここまで来たら腹括りなって。いつまでもウジウジしてるのらしくないよ～？」"
translation = "「여기까지 왔으면 배짱 좀 튀기라구. 언제까지 쭈뼛거리는 건 너답지 않아~」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「うっ……！\u3000でも、だってその、ホントに恥ずかし、くて……」"
translation = "「윽……! 하지만, 그게, 정말로 창피, 해서……」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「おお～……。なんかエロい……」"
translation = "「오오~……. 왠지 야해……」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ひゃっ！？\u3000い、いきなり人のお尻撫でてなんのつもりっすか！？」"
translation = "「히익!? 가, 갑자기 남의 엉덩이는 만져서 뭐 하려는 거임!?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「や。世のおじさまたちが新人バニーガールにちょっかいかけたくなる気持ちがわかっちゃったもんで」"
translation = "「아니. 세상 아저씨들이 신입 바니걸한테 장난치고 싶어 하는 기분을 알 것 같아서 말이야.」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「うえぇ……マジ帰りてぇ……」"
translation = "「으으…… 진짜 집에 가고 싶어……」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「と、とにかくあくまで主目的はカジノの警備とモンスターの調査ですから。気を引き締めて参りましょう」"
translation = "「아, 아무튼 어디까지나 주 목적은 카지노의 경비와 몬스터 조사니까요. 마음을 다잡고 갑시다.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「でもでもホントにモンスターなんかいるのかな？\u3000さっき一通りみんなで調べて回ったけど気配ひとつなかったじゃん？」"
translation = "「근데 근데 정말로 몬스터 같은 게 있을까? 아까 다 같이 한 바퀴 돌아봤지만 기척 하나 없었잖아?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「やっぱ野良モンスターが隠れてただけだったんじゃないっすか？\u3000あたしはむしろカジノのバイトの方が心配っすよ」"
translation = "「역시 들개 몬스터가 숨어 있었을 뿐인 거 아님? 나는 차라리 카지노 알바 쪽이 걱정임.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ゲームの種類とかルールとか全然わかんないもんね～？\u3000洋画とかで見たことはあるケドも」"
translation = "「게임 종류나 규칙 같은 거 전혀 모르니까 말이야~? 외화 같은 데서 본 적은 있지만서도.」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「見たところゲームの種類は、ルーレットにポーカー、あとバカラにブラックジャックと言ったところでしょうか。スロットもありますね」"
translation = "「보니 게임 종류는 룰렛에 포커, 그리고 바카라에 블랙잭이라고나 할까요. 슬롯도 있네요.」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「ジルラント王国のカジノに行ったことがあるので、一通りルールや遊び方は知っていますよ」"
translation = "「질란트 왕국의 카지노에 가본 적이 있어서 대충 규칙이나 노는 법은 알고 있어요.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「お～、王子感あるね～。あれでしょ？\u3000そういう時に限って窃盗団とか現れるんでしょ？\u3000そして始まる女窃盗団員とのラブロマンス！」"
translation = "「오~ 왕자님 느낌 나네~. 그런 거지? 그럴 때 꼭 절도단 같은 게 나타나고 말이야. 그리고 시작되는 여성 절도단원과의 러브 로맨스!」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「え、映画の見過ぎかと……」"
translation = "「여, 영화를 너무 많이 보신 게……」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「けっ。どーせＶＩＰルームでバニーガールはべらせて遊んでたんだろ？\u3000だから人にバニーガールなんざ着せるんだ」"
translation = "「쳇. 어차피 VIP 룸에서 바니걸들 끼고 놀았겠지? 그러니까 남한테 바니걸 같은 걸 입히는 거야.」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「遊びの意味合いが変わってますよね！？」"
translation = "「노는 의미가 변질됐는데요!?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「でも夢あるよね～。ジルラント王国のバニーさんはレベル高いの？\u3000今度遊びにいかせてよ～」"
translation = "「그래도 꿈은 있네~. 질란트 왕국 바니걸들은 레벨 높아? 다음에 놀러 가게 해줘~」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「あ、いえ……その。祖国のカジノはリクリエの影響を受けて今はもう……」"
translation = "「아, 아니요…… 그게. 고국의 카지노는 리크리에의 영향을 받아 지금은 이미……」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「へっ？\u3000そ、そうだったんだ。ごめんね、ノンデリ発言しちゃって……」"
translation = "「헤? 그, 그랬구나. 미안, 눈치 없는 발언을 해서……」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「い、いえいえ！\u3000現在再建中ではありますので！\u3000是非再建後は遊びにきていただけると嬉しいです！\u3000観光客が増えれば国の財政も少しは楽になりますし……！」"
translation = "「아, 아니요 아니요! 현재 재건 중이니까요! 부디 재건 후에는 놀러 와주시면 기쁘겠습니다! 관광객이 늘어나면 국가 재정도 조금은 나아질 테니까요……!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「国の財政て……。なんか王子も大変そーだな……」"
translation = "「국가 재정이라니……. 왕자님도 고생이 많네……」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「そ──そうだ皆さん！\u3000働く前に一勝負でもしてみませんか？\u3000カジノの雰囲気を掴めるかもしれませんよ？」"
translation = "「그── 그래요 여러분! 일하기 전에 한 판 해보지 않겠습니까? 카지노 분위기를 파악할 수 있을지도 몰라요.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「い、いいねいいね！\u3000一通り遊んでみるっ？」"
translation = "「좋네 좋아! 한 번씩 다 해볼까?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「そ、そっすね。ルールや遊び方も覚えてえし！」"
translation = "「그, 그러네. 규칙이나 노는 법도 익히고 싶고!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「要するに……バカラってのは出た目の合計値が９に近けりゃいいってことだな？」"
translation = "「요컨대…… 바카라라는 건 나온 숫자의 합이 9에 가까우면 된다는 거지?」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「簡単に言うとそうですね。プレイヤーとバンカーのどちらに賭けるかの勝負になります。ただしバカラのプレイヤーとは遊ぶ人のことではないですよ」"
translation = "「간단히 말하면 그렇죠. 플레이어와 뱅커 중 어느 쪽에 걸 것인가의 승부가 됩니다. 다만 바카라의 플레이어란 노는 사람을 말하는 게 아니에요.」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「ディーラーはまずカードを２枚ずつ双方に配りまして──……」"
translation = "「딜러는 먼저 카드를 두 장씩 양쪽에 나눠주고──……」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「んーと。今、会長さんがプレイヤーに、ユウリちゃんがバンカーに賭けてる状況だっけ？\u3000ユウリちゃんは３と５で８か」"
translation = "「음. 지금 회장님이 플레이어에, 유우리짱이 뱅커에 걸고 있는 상황인가? 유우리짱은 3이랑 5로 8이네.」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「ナチュラル８ですね。もし会長のカードの合計値が０から７であれば、ユウリさんの無条件勝利です」"
translation = "「내추럴 8이네요. 만약 회장의 카드 합계가 0에서 7이라면 유우리 씨의 무조건 승리입니다.」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「そして会長の１枚目は……４。まだ勝ち目はあります。もう１枚が５であればナチュラル９。逆転勝利ですね」"
translation = "「그리고 회장의 첫 번째 장은…… 4. 아직 승산은 있습니다. 나머지 한 장이 5라면 내추럴 9. 역전 승리네요.」"

[[dialogue]]
speaker = "unk"
original = "５……か"
translation = "5……인가"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「うわ、なんかジワジワめくっていくねー？\u3000おお、カードの下にマークが二つあんじゃん！」"
translation = "「우와, 뭔가 야금야금 넘기네? 오, 카드 밑에 마크가 두 개 있잖아!」"

[[dialogue]]
speaker = "unk"
original = "アシありだ！"
translation = "다리(Side) 있다!"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「あぁ？\u3000アシ？」"
translation = "「아앙? 다리?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「おっ、今度はカードを横に向けて。まーたジワジワめくってくじゃん。こっちでもマークが２つ見えるけど……これって４か５確定ってこと？\u3000激アツ？」"
translation = "「오, 이번엔 카드를 가로로 돌려서. 또 야금야금 넘긴다. 이쪽에서도 마크가 2개 보이는데…… 이건 4나 5 확정이라는 거? 완전 대박?」"

[[dialogue]]
speaker = "unk"
original = "付け！\u3000付け！\u3000付け！"
translation = "붙어라! 붙어라! 붙어라!"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「なんだ、コイツ……。めくるの超遅え……」"
translation = "「뭐야, 이 녀석……. 넘기는 거 드럽게 느려……」"

[[dialogue]]
speaker = "unk"
original = "付け！\u3000付け！\u3000付け！"
translation = "붙어라! 붙어라! 붙어라!"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ちゃっちゃとめくれ！？」"
translation = "「빨리빨리 좀 넘겨!?」"

[[dialogue]]
speaker = "unk"
original = "バカラの醍醐味がっ！？"
translation = "바카라의 묘미가!?"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「おや。８対８で引き分けですね。タイに賭けてたセーラさんの９倍勝ちです」"
translation = "「어라. 8 대 8로 비겼네요. 타이에 걸었던 세라 씨의 9배 승리입니다.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「えっ、ホント？\u3000やーん、大金持ち～」"
translation = "「엣, 진짜? 야호, 부자 됐다~」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「た、単なるリハーサルですからね……？」"
translation = "「그, 단순한 리허설이니까요……?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「遊び方は大体わかったけどよ。イマイチ燃えねえな。せっかくならもっとヒリつける勝負をやろうぜ」"
translation = "「노는 법은 대충 알겠는데. 영 안 타오르네. 이왕이면 더 심장이 쫄깃해지는 승부를 하자고.」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「バカラは勝負スピードが特徴のゲームですからね。一戦だけでは確かに盛り上がらないかもしれませんね」"
translation = "「바카라는 승부 속도가 특징인 게임이니까요. 한 판만으로는 확실히 분위기가 안 살지도 모르겠네요.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「んじゃ最後にポーカーでもやる？\u3000ルールもいろいろあるし楽しめるんじゃない？」"
translation = "「그럼 마지막으로 포커라도 할래? 규칙도 여러 가지고 즐길 수 있지 않을까?」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「こちらではテキサスホールデムを採用しているようですね。カジノの雰囲気を味わうにはもってこいだと思いますよ」"
translation = "「이곳은 텍사스 홀덤을 채용하고 있는 모양이네요. 카지노 분위기를 맛보기에는 안성맞춤이라고 생각해요.」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「へっ、吠え面かかせてやるぜ」"
translation = "「헷, 울상을 짓게 해주마.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「じゃあじゃあ一番チップを稼いだ人が最下位の人になんでも命令していいってコトで♪」"
translation = "「그럼 그럼 칩을 제일 많이 딴 사람이 꼴찌한테 뭐든지 명령하기로♪」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「ふふ。それではオープンザゲームといきましょう」"
translation = "「후후. 그럼 오픈 더 게임 하도록 하죠.」"

