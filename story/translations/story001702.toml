[[dialogue]]
speaker = "シュティレ"
original = "「どちら様と訊ねられましたので、改めて名乗らせていただきます」"
translation = "「누구냐고 물으셨으니 다시 한번 통성명을 하겠습니다.」"

[[dialogue]]
speaker = "シュティレ"
original = "「私は不動シュティレ。購買部の美少女看板娘、その２号を担っております」"
translation = "「저는 후도 슈틸레. 매점의 미소녀 간판녀, 그 2호를 맡고 있습니다.」"

[[dialogue]]
speaker = "シュティレ"
original = "「流星学園附属の１年生。天使ですが人間界生まれの人間界育ち。趣味はロボットアニメ鑑賞とラーメン屋めぐり。嫌いなものは納豆です」"
translation = "「유성학원 부속 1학년. 천사이지만 인간계 태생에 인간계 성장. 취미는 로봇 애니메이션 감상과 라멘집 순례. 싫어하는 것은 낫토입니다.」"

[[dialogue]]
speaker = "アナ"
original = "「えっと、これはご丁寧にどうも……？」"
translation = "「저기, 이거 참 정중하시네요……?」"

[[dialogue]]
speaker = "シュティレ"
original = "「ちなみに、天才錬金術師であるアニマ先輩の弟子もやっております。錬金術師の弟子です」"
translation = "「참고로 천재 연금술사인 아니마 선배님의 제자도 하고 있습니다. 연금술사의 제자입니다.」"

[[dialogue]]
speaker = "unk"
original = "そこ、一番に喋るべき情報じゃない！？"
translation = "그거, 제일 먼저 말해야 할 정보 아니야!?"

[[dialogue]]
speaker = "シュティレ"
original = "「実はこれも作戦なのです」"
translation = "「사실 이것도 작전입니다.」"

[[dialogue]]
speaker = "シュティレ"
original = "「最も大切な情報を最後にお伝えすることで、お相手に強く印象付けることが可能となります。シュティレの頭脳プレーです。ぶいぶい」"
translation = "「가장 중요한 정보를 마지막에 전함으로써 상대에게 강한 인상을 남기는 것이 가능해집니다. 슈틸레의 두뇌 플레이입니다. 브이브이.」"

[[dialogue]]
speaker = "アナ"
original = "「なるほど、独特の雰囲気を持ったお方のようですね。流石はアニマ先輩の弟子……初耳ですが」"
translation = "「과연, 독특한 분위기를 가진 분이시군요. 과연 아니마 선배님의 제자…… 처음 듣는 사실입니다만.」"

[[dialogue]]
speaker = "アナ"
original = "「──ご挨拶が遅れました、私はアナ。新星学園星徒会の副会長をしています。和菓子が三度のご飯より大好きです。ぶいぶい」"
translation = "「──인사가 늦었습니다, 저는 아나. 신성학원 성도회의 부회장을 맡고 있습니다. 화과자를 밥보다 좋아합니다. 브이브이.」"

[[dialogue]]
speaker = "シュティレ"
original = "「まさか『ピース返し』とは……高度な技をお持ちですね、アナ先輩」"
translation = "「설마 『피스 맞받아치기』라니…… 고도의 기술을 가지고 계시는군요, 아나 선배님.」"

[[dialogue]]
speaker = "アナ"
original = "「フ……あなたこそ、附属１年とは思えぬ実力です」"
translation = "「후…… 당신이야말로 부속 1학년이라고는 생각되지 않는 실력입니다.」"

[[dialogue]]
speaker = "unk"
original = "ルールを説明してもらえる？？？"
translation = "규칙 좀 설명해 줄래???"

[[dialogue]]
speaker = "アナ"
original = "「無粋ですよ、会長」"
translation = "「무드 없어요, 회장님.」"

[[dialogue]]
speaker = "シュティレ"
original = "「そちらの先輩は……まだまだ我々と渡り合える<b>カルマ</b>はお持ちではないようです」"
translation = "「저기 선배님은…… 아직 우리와 맞설 수 있는 <b>카르마</b>를 가지고 있지 않은 모양이군요.」"

[[dialogue]]
speaker = "unk"
original = "（初対面なのに仲いいな……）"
translation = "(처음 만났는데 사이좋네……)"

[[dialogue]]
speaker = "unk"
original = "絶対適当に喋ってるだけだろ……と思ったが、それこそ無粋なので沈黙を選択した。"
translation = "절대 적당히 내뱉는 것뿐이겠지……라고 생각했지만, 그것이야말로 무드 없는 짓이기에 침묵을 선택했다."

[[dialogue]]
speaker = "シュティレ"
original = "「アナ先輩。お近づきの印に、私と１枚、記念撮影よろしいでしょうか」"
translation = "「아나 선배님. 친해진 기념으로 저와 한 장, 기념 촬영 가능할까요?」"

[[dialogue]]
speaker = "シュティレ"
original = "「好きな風景や人物と共に、ピースサインで自撮りするのが３度のご飯より好きなのです」"
translation = "「좋아하는 풍경이나 인물과 함께 피스 사인으로 셀카를 찍는 것을 밥보다 좋아합니다.」"

[[dialogue]]
speaker = "アナ"
original = "「うむ、よかろー。さ、会長もご一緒に」"
translation = "「음, 좋다다. 자, 회장님도 같이.」"

[[dialogue]]
speaker = "シュティレ"
original = "「新星学園の会長と写真が撮れるなんて光栄です。では失礼します」"
translation = "「신성학원 회장님과 사진을 찍을 수 있다니 영광입니다. 그럼 실례하겠습니다.」"

[[dialogue]]
speaker = "シュティレ"
original = "「タイマーを起動します。ポーズはピースサインにて。３、２、１──ぶいっ」"
translation = "「타이머를 가동합니다. 포즈는 피스 사인으로. 3, 2, 1── 브잇.」"

[[dialogue]]
speaker = "アナ"
original = "「ぶい」"
translation = "「브이.」"

[[dialogue]]
speaker = "unk"
original = "ぶ、ぶい？（ピースをする）"
translation = "브, 브이? (피스를 한다)"

[[dialogue]]
speaker = "シュティレ"
original = "「思い出のメモリーをゲット。つきましてはＤＩＳＣの連絡先交換を。写真、お送りします」"
translation = "「추억의 메모리를 겟. 그런 의미에서 DISC 연락처 교환을. 사진 보내드릴게요.」"

[[dialogue]]
speaker = "アナ"
original = "「早速ありがとうございます。ところでシュティレさん。私たち、あなたのお師匠様に用事があるのですが……」"
translation = "「벌써 감사합니다. 그런데 슈틸레 씨. 저희, 당신의 스승님께 용건이 있습니다만……」"

[[dialogue]]
speaker = "シュティレ"
original = "「はい。マスターは不在……だったのですが──前方数メートル先、お姿を発見しました」"
translation = "「네. 마스터는 부재중……이었으나── 전방 수 미터 앞, 모습을 발견했습니다.」"

[[dialogue]]
speaker = "アニマ"
original = "「──やぁ、会長にアナ。呼び出したのに席を外してしまってすまないネ」"
translation = "「──안녕, 회장이랑 아나. 불러놓고 자리를 비워서 미안하다다.」"

[[dialogue]]
speaker = "アニマ"
original = "「ちょ～っと実験室でトラブルがあってネ。遅刻してしまったようだ、面目ない」"
translation = "「조~금 실험실에서 트러블이 있었다다. 늦어버린 모양이다다, 면목 없다다.」"

[[dialogue]]
speaker = "unk"
original = "──彼女は、新星学園３年生のアニマ先輩。学園きっての錬金術師であり、その発明には毎度のことながら驚かされている。"
translation = "──그녀는 신성학원 3학년인 아니마 선배. 학원 최고의 연금술사이며, 그 발명에는 매번 놀라고 있다."

[[dialogue]]
speaker = "unk"
original = "守護天使の義体を作成したり、人工戦闘服の理論を組み立てたり。彼女の作り出す奇蹟によって、俺たちは何度も命を救われてきた。"
translation = "수호천사의 의체를 제작하거나 인공 전투복의 이론을 세우거나. 그녀가 만들어내는 기적 덕분에 우리는 몇 번이나 목숨을 구했다."

[[dialogue]]
speaker = "unk"
original = "ただ……ぶっ飛んだ副作用のある薬を嬉々として飲ませてくるのだけは、何とかしてほしかったりする。"
translation = "다만…… 정신 나간 부작용이 있는 약을 기쁘게 먹이려고 하는 것만은 어떻게 좀 해줬으면 좋겠다."

[[dialogue]]
speaker = "アニマ"
original = "「フヒ。その様子だと、シュティレとはずいぶん打ち解けたようだナ？」"
translation = "「후히. 그 모습을 보니 슈틸레와는 꽤 친해진 모양이다다?」"

[[dialogue]]
speaker = "アナ"
original = "「はい。しかし驚きました。まさかアニマ先輩が弟子を取っていただなんて」"
translation = "「네. 하지만 놀랐습니다. 설마 아니마 선배님이 제자를 두셨을 줄이야.」"

[[dialogue]]
speaker = "アニマ"
original = "「いや？\u3000アニマは弟子なんか取っていないゾ？」"
translation = "「아니? 아니마는 제자 같은 거 안 받았다다?」"

[[dialogue]]
speaker = "アナ"
original = "「え、でも……」"
translation = "「에, 하지만……」"

[[dialogue]]
speaker = "シュティレ"
original = "「どうも。マスターの弟子をやってます。ぶい」"
translation = "「안녕하세요. 마스터의 제자를 하고 있습니다. 브이.」"

[[dialogue]]
speaker = "アニマ"
original = "「フヒヒ。実は認めていないんだナ、これが！」"
translation = "「후히히. 사실 인정하지 않고 있다다, 이게!」"

[[dialogue]]
speaker = "シュティレ"
original = "「どうも。マスターの弟子（仮）をやってます。ぶい」"
translation = "「안녕하세요. 마스터의 제자(임시)를 하고 있습니다. 브이.」"

[[dialogue]]
speaker = "アナ"
original = "「えぇえ……？」"
translation = "「에에에……?」"

[[dialogue]]
speaker = "unk"
original = "弟子じゃなかったの！？"
translation = "제자가 아니었어!?"

[[dialogue]]
speaker = "アニマ"
original = "「ちょっと前に、錬金術を習いたいと言って訪ねて来たんだがネ。実験の時間が減ってしまうのは困るので、断ったんダ」"
translation = "「얼마 전에 연금술을 배우고 싶다고 찾아왔다다만. 실험 시간이 줄어드는 건 곤란하니까 거절했다다.」"

[[dialogue]]
speaker = "アニマ"
original = "「なのにあんまりしつこいから、近くで見て盗む分には構わないって言ってあるんだヨ」"
translation = "「그런데 너무 끈질겨서 근처에서 보고 훔치는 정도는 상관없다고 말해뒀다다.」"

[[dialogue]]
speaker = "シュティレ"
original = "「好きにしろと言われたので、好きにさせてもらってます」"
translation = "「마음대로 하라고 하셔서 마음대로 하고 있습니다.」"

[[dialogue]]
speaker = "アニマ"
original = "「まぁ店番を頼めるのは助かっているヨ。見てのとおりオモシロイ奴だから近くに置いてるわけだナ♪」"
translation = "「뭐 가게를 봐달라고 할 수 있는 건 도움이 된다다. 보다시피 재밌는 녀석이라 근처에 두고 있는 거다다♪」"

[[dialogue]]
speaker = "シュティレ"
original = "「こうやってお傍に控えていれば、いずれマスターも<ruby>胸襟<rt>きょうきん</rt></ruby>を開いてくれるはず。目指せ、マスターとも仲良し自撮りピクチャー」"
translation = "「이렇게 곁에 대기하고 있으면 언젠가 마스터도 속마음을 열어줄 터. 목표는 마스터와도 사이좋은 셀카 픽쳐.」"

[[dialogue]]
speaker = "アニマ"
original = "「フヒヒ。アニマは写真が嫌いなんダ。何度おねだりしても無駄だヨ？」"
translation = "「후히히. 아니마는 사진을 싫어한다다. 아무리 졸라도 소용없다다?」"

[[dialogue]]
speaker = "シュティレ"
original = "「諦めません、勝つまでは」"
translation = "「포기하지 않습니다, 이길 때까지는.」"

[[dialogue]]
speaker = "アナ"
original = "「……アニマ先輩とは、また違った意味で変わったお方のようですね」"
translation = "「……아니마 선배님과는 또 다른 의미로 특이한 분이시군요.」"

[[dialogue]]
speaker = "unk"
original = "アナの感想に、俺は首肯するしかないのだった。"
translation = "아나의 감상에 나는 고개를 끄덕일 수밖에 없었다."

[[dialogue]]
speaker = "アニマ"
original = "「アナ、これが例の機械型モンスターを弱体化させる新薬──」"
translation = "「아나, 이게 그 기계형 몬스터를 약화시키는 신약──」"

[[dialogue]]
speaker = "アニマ"
original = "「名付けて『ヨワッチクナール』ダ！」"
translation = "「이름하여 『약해져라무울』이다다!」"

[[dialogue]]
speaker = "シュティレ"
original = "「流石はマスター。ネーミングセンスも一級品です。惚れ直しました」"
translation = "「과연 마스터. 작명 센스도 일급품입니다. 다시 반했습니다.」"

[[dialogue]]
speaker = "アナ"
original = "「個人的にはあまり良くないセンスかと思いますが、期待は膨らみます。アニマ先輩お手製となれば、効果は抜群でしょう」"
translation = "「개인적으로는 그다지 좋지 않은 센스라고 생각합니다만 기대는 큽니다. 아니마 선배님 친제라면 효과는 만점이겠죠.」"

[[dialogue]]
speaker = "アニマ"
original = "「ン～、それなんだがネ。実はこの弱体化薬、まだ試作段階なんダ」"
translation = "「음~, 그게 말이다다. 사실 이 약화약은 아직 시작 단계다다.」"

[[dialogue]]
speaker = "アニマ"
original = "「小瓶に入っている液体……コイツをモンスターにぶちまければいいんダガ、体の核とでも呼べる部分にしっかりとしみこませなければならナイ」"
translation = "「작은 병에 든 액체…… 이 녀석을 몬스터에게 퍼부으면 된다다만, 몸의 핵이라고 부를 수 있는 부분에 확실히 스며들게 해야 한다다.」"

[[dialogue]]
speaker = "アナ"
original = "「……機械型モンスターは装甲が分厚い。薬効が出る前に弾かれてしまう、と？」"
translation = "「……기계형 몬스터는 장갑이 두껍죠. 약효가 나타나기 전에 튕겨 나가버린다는 건가요?」"

[[dialogue]]
speaker = "アニマ"
original = "「話が早くて助かるヨ。そこが今の課題だナ。どうやって装甲を打ち破るか……」"
translation = "「말이 통하니 편하다다. 그게 지금 과제다다. 어떻게 장갑을 뚫을 것인가……」"

[[dialogue]]
speaker = "アニマ"
original = "「別の薬品も混ぜて装甲を溶かすか、ウイルスのようにモンスターの体内で薬品が増殖するように配合を組み立て直すか……悩みどころダ」"
translation = "「다른 약품도 섞어서 장갑을 녹일지, 바이러스처럼 몬스터 체내에서 약품이 증식하도록 배합을 다시 짤지…… 고민 중이다다.」"

[[dialogue]]
speaker = "アニマ"
original = "「そういうワケで、開発もちょっと壁に当たっているんダ。しばらく追加の時間をもらえるかナ？」"
translation = "「그런 고로 개발도 좀 벽에 부딪혔다다. 당분간 추가 시간을 줄 수 있겠나다?」"

[[dialogue]]
speaker = "アナ"
original = "「それはもちろん問題ありません。よろしくお願いします」"
translation = "「그건 당연히 문제없습니다. 잘 부탁드립니다.」"

[[dialogue]]
speaker = "アニマ"
original = "「フヒ。報酬はいつもの……」"
translation = "「후히. 보수는 언제나처럼……」"

[[dialogue]]
speaker = "アナ"
original = "「はい。うちの会長を煮るなり焼くなり、お好きにどうぞ」"
translation = "「네. 우리 회장님을 삶든 굽든 마음대로 하세요.」"

[[dialogue]]
speaker = "unk"
original = "俺のことを売らないで、アナ！"
translation = "나를 팔지 마, 아나!"

[[dialogue]]
speaker = "アナ"
original = "「必要な犠牲でした。アーメン」"
translation = "「필요한 희생이었습니다. 아멘.」"

[[dialogue]]
speaker = "アニマ"
original = "「フヒヒッ♪\u3000なーに、会長。少しの間、気持ち良くなるだけダ。怖くないヨ？」"
translation = "「후히히♪ 뭐야, 회장. 잠깐 동안 기분 좋아질 뿐이다다. 무섭지 않다다?」"

[[dialogue]]
speaker = "unk"
original = "逆に怖いし痛い方がまだマシだ！"
translation = "오히려 무섭고 아픈 게 차라리 나아!"

[[dialogue]]
speaker = "シュティレ"
original = "「──マスター、少しよろしいでしょうか」"
translation = "「──마스터, 잠깐 괜찮을까요.」"

[[dialogue]]
speaker = "アニマ"
original = "「なんだ、シュティレ。マスターじゃないけど話は聞くゾ？」"
translation = "「뭐냐다, 슈틸레. 마스터는 아니지만 얘기는 들어준다다.」"

[[dialogue]]
speaker = "シュティレ"
original = "「その装甲を破るアイデア、私に任せていただけませんか？\u3000我に策あり、です」"
translation = "「그 장갑을 뚫을 아이디어, 저에게 맡겨주시지 않겠습니까? 저에게 책략이 있습니다, 입니다.」"

[[dialogue]]
speaker = "アニマ"
original = "「──フム、なるほど。シュティレの知識と技術、もしかしたら役に立つかもしれないナ」"
translation = "「──흠, 과연. 슈틸레의 지식과 기술이라면 어쩌면 도움이 될지도 모르겠다다.」"

[[dialogue]]
speaker = "アニマ"
original = "「会長。シュティレはこう見えて、アニマとは違ったベクトルに突き抜けた才能を持っていル」"
translation = "「회장. 슈틸레는 이래 보여도 아니마와는 다른 방향으로 돌출된 재능을 가지고 있다다.」"

[[dialogue]]
speaker = "アニマ"
original = "「アナログ錬金術師のアニマとは正反対の、機械技術に特化した子なんダ」"
translation = "「아날로그 연금술사인 아니마와는 정반대인 기계 기술에 특화된 아이다다.」"

[[dialogue]]
speaker = "アニマ"
original = "「星力を動力源とした、機械兵器の製造を行える子でネ。アニマとは違ったアプローチも取れるはず」"
translation = "「성력을 동력원으로 한 기계 병기 제조를 할 수 있는 아이다다. 아니마와는 다른 접근도 가능할 거다다.」"

[[dialogue]]
speaker = "アニマ"
original = "「いいダロウ、やってみろシュティレ！\u3000どちらがモンスターの装甲を突破するアイデアを先に出せるか、勝負だナ！」"
translation = "「좋다다, 해봐라 슈틸레! 누가 몬스터 장갑을 돌파할 아이디어를 먼저 낼지 승부다다!」"

[[dialogue]]
speaker = "シュティレ"
original = "「嬉しいです。この問題をクリアすれば、マスターに弟子と認めていただける。ワクワクします」"
translation = "「기쁩니다. 이 문제를 클리어하면 마스터에게 제자로 인정받을 수 있다. 두근거립니다.」"

[[dialogue]]
speaker = "アニマ"
original = "「フヒヒ、しれっとご褒美を加えるんじゃない！\u3000上手くいっても弟子にはしないゾ？」"
translation = "「후히히, 슬쩍 포상을 끼워 넣지 마라다! 잘 돼도 제자로는 안 삼을 거다다?」"

[[dialogue]]
speaker = "シュティレ"
original = "「残念です。また振られてしまいました。でも諦めません」"
translation = "「아쉽습니다. 또 차여버렸습니다. 하지만 포기하지 않습니다.」"

[[dialogue]]
speaker = "アニマ"
original = "「さて、ではアニマは実験室に戻る。店番は頼んだゾ、シュティレ！」"
translation = "「자, 그럼 아니마는 실험실로 돌아간다다. 가게 잘 봐라다, 슈틸레!」"

[[dialogue]]
speaker = "シュティレ"
original = "「イエス、マスター。粉骨砕身の店番、お見せします」"
translation = "「예스, 마스터. 분골쇄신의 가게 보기 보여드리겠습니다.」"

[[dialogue]]
speaker = "アナ"
original = "「都合のいい時だけ、弟子のような扱いをしている気が……」"
translation = "「편할 때만 제자처럼 부려 먹는 느낌이……」"

[[dialogue]]
speaker = "アナ"
original = "「アニマ先輩に良いように使われているようですが……大丈夫なのですか？」"
translation = "「아니마 선배님에게 이용당하는 것 같은데…… 괜찮은 건가요?」"

[[dialogue]]
speaker = "シュティレ"
original = "「問題ありません。雨垂れ石を穿つ、と申します。こういう小さな積み重ねが、いつかマスターの心を溶かすのです」"
translation = "「문제없습니다. 낙숫물이 댓돌을 뚫는다고 하였습니다. 이런 작은 쌓임이 언젠가 마스터의 마음을 녹이는 것입니다.」"

[[dialogue]]
speaker = "アナ"
original = "「……あなたも、目標に向かって頑張っているんですね」"
translation = "「……당신도 목표를 향해 노력하고 있군요.」"

[[dialogue]]
speaker = "シュティレ"
original = "「……あなた『も』？」"
translation = "「……당신『도』?」"

[[dialogue]]
speaker = "アナ"
original = "「いえ。良かったら、私にもシュティレさんの作業を手伝わせてくれませんか？」"
translation = "「아뇨. 괜찮다면 저도 슈틸레 씨의 작업을 도와드려도 될까요?」"

[[dialogue]]
speaker = "アナ"
original = "「元々、弱体化薬の制作は星徒会からの依頼ですし。それにアニマ先輩が認める、あなたの才能にも興味があります」"
translation = "「애당초 약화약 제작은 성도회의 의뢰이기도 하고요. 게다가 아니마 선배님이 인정하는 당신의 재능에도 흥미가 있습니다.」"

[[dialogue]]
speaker = "アナ"
original = "「及ばずながらお手伝いさせていただければ、と」"
translation = "「힘 닿는 데까지 돕고 싶습니다.」"

[[dialogue]]
speaker = "シュティレ"
original = "「なんと。新星学園が誇る２人の天才──マスターと並ぶ逸材であるアナ先輩のサポートとは。これはもう勝ち確というやつです」"
translation = "「세상에. 신성학원이 자랑하는 두 명의 천재── 마스터와 어깨를 나란히 하는 일재인 아나 선배님의 서포트라니. 이건 이미 승리가 확정된 셈입니다.」"

[[dialogue]]
speaker = "シュティレ"
original = "「ではこれからは、親しみを込めて『アナお姉ちゃん』と呼ばせていただきます。ぶい」"
translation = "「그럼 이제부터는 친근함을 담아 『아나 언니』라고 부르겠습니다. 브이.」"

[[dialogue]]
speaker = "アナ"
original = "「い、いきなり距離を詰めてきますね……？\u3000いえ、全然いいんですが」"
translation = "「가, 갑자기 거리를 좁혀오네요……? 뭐, 전혀 상관없습니다만.」"

[[dialogue]]
speaker = "unk"
original = "俺も力を貸すよ"
translation = "나도 힘을 보탤게"

[[dialogue]]
speaker = "シュティレ"
original = "「ありがとうございます。それでは会長とアナお姉ちゃん」"
translation = "「감사합니다. 그럼 회장님과 아나 언니.」"

[[dialogue]]
speaker = "シュティレ"
original = "「今日から機械型モンスターの装甲を破るための発明に取り掛かりますので、製作に少々お時間をいただけますと幸いです」"
translation = "「오늘부터 기계형 몬스터의 장갑을 뚫기 위한 발명에 착수할 테니 제작에 시간이 조금 걸려도 양해 부탁드립니다.」"

[[dialogue]]
speaker = "unk"
original = "独特な距離感を持つ、自称・錬金術師の弟子、シュティレ。"
translation = "독특한 거리감을 가진 자칭 연금술사 제자, 슈틸레."

[[dialogue]]
speaker = "unk"
original = "俺とアナは、彼女の手伝いをすることになったのだった。"
translation = "나와 아나는 그녀의 일을 돕게 되었다."

