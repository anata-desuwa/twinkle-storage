[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「２人きりで抜け出しちゃいましたね、センパイ」"
translation = "「둘이서만 빠져나와 버렸네요, 선배.」"

[[dialogue]]
speaker = "unk"
original = "ごめんね、急に誘ったりして"
translation = "미안해, 갑자기 불러내서"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「何言ってるんですか。センパイから声をかけてくれて、マジカル嬉しかったですよ♪」"
translation = "「무슨 소릴 하시는 거예요. 선배가 먼저 말을 걸어줘서 매지컬하게 기뻤다구요♪」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「あの～、ひとつお願いがあるんですけど……いいですか？」"
translation = "「저기~, 부탁이 하나 있는데…… 괜찮을까요?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「せっかく誰も見てないですから……腕、組んでみたいなって……」"
translation = "「모처럼 아무도 안 보고 있으니까…… 팔짱, 껴보고 싶어서……」"

[[dialogue]]
speaker = "unk"
original = "いいよ。はい、どうぞ"
translation = "좋아. 자, 여기"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「いいんですか！？\u3000え～、どういう風の吹き回しです？\u3000なんだかいつもより優しい気がするんですけど！？」"
translation = "「정말요!? 에~, 웬일이세요? 왠지 평소보다 다정하신 것 같은데요!?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「いや、もちろんしますけどね。遠慮なく、ぎゅ～～っと<emoji=heart04>」"
translation = "「아니, 물론 낄 거지만요. 유감없이, 꽈아아악~<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「…………えへへ、やった……嬉しいな」"
translation = "「…………에헤헤, 됐다…… 기쁘다.」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「……波の音、静かで……ロマンチック……なんだかドキドキしちゃいますね」"
translation = "「……파도 소리, 조용하고…… 로맨틱해…… 왠지 두근거려 버리네요.」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「こうして歩いてると、本当に恋人同士になれた気分です……センパイはどうですか？」"
translation = "「이렇게 걷고 있으니 정말 연인 사이가 된 기분이에요…… 선배는 어때요?」"

[[dialogue]]
speaker = "unk"
original = "うーん、どうかなぁ？"
translation = "음, 어떠려나?"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「あ～あ、またそんな意地悪言っちゃうんだ～」"
translation = "「아~아, 또 그렇게 심술궂게 말씀하신다~」"

[[dialogue]]
speaker = "unk"
original = "一目惚れは嘘だったんだよね？"
translation = "첫눈에 반했다는 건 거짓말이었지?"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「お昼にお話しした通りですよ。一目惚れっていうのは嘘です」"
translation = "「낮에 말씀드린 대로예요. 첫눈에 반했다는 건 거짓말입니다.」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「でも、こうして話しているうちに、センパイのいい所にどんどん気付いていって……」"
translation = "「하지만 이렇게 이야기하는 동안 선배의 좋은 점을 점점 알게 되어서……」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「一目惚れじゃなかったとしても……嘘から出た誠、そういうのも、あるかもしれませんね♪」"
translation = "「첫눈에 반한 게 아니었다고 해도…… 거짓에서 나온 진실, 그런 것도 있을지 모르겠네요♪」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "（――ってあれ？\u3000こんな会話、最近どこかでしたような）"
translation = "（――어라? 이런 대화, 최근 어딘가에서 했던 것 같은데）"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "（あ、思い出した！\u3000昼間、現実逃避しちゃった時の妄想だ）"
translation = "（아, 생각났다! 낮에 현실 도피했을 때의 망상이야）"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "（確かこの後、センパイに告白されて……それからキスを……）"
translation = "（분명 이 다음에 선배한테 고백받고…… 그러고 나서 키스를……）"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "（っっ！！\u3000ど、どうしよう、あれがホントに現実になったら私っ！？）"
translation = "（윽!! 어, 어쩌지, 그게 정말로 현실이 되면 나!?）"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「な、なーんて♪\u3000こんな風に迫られたりしたら、センパイ、困っちゃいますよね？」"
translation = "「나, 랄까♪ 이런 식으로 대시하면 선배, 곤란하시겠죠?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ぶっちゃけて言うと、こうやって仲良くおしゃべりできればそれで十分、みたいなところあるんですよ」"
translation = "「솔직히 말하면 이렇게 사이좋게 수다 떨 수 있으면 그걸로 충분하다는 생각도 있거든요.」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「どう取り繕っても私たちの出会いって、いいものじゃなかったと思うんですよね」"
translation = "「어떻게 포장해도 우리의 만남은 좋은 게 아니었다고 생각하니까요.」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「『一目惚れした～』なんて言って近づいてきて『実はスパイでした～』とか、普通に考えて最悪じゃないですか」"
translation = "「『첫눈에 반했다~』라며 접근해 놓고 『사실은 스파이였습니다~』라니, 보통 생각하면 최악이잖아요.」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「なのにセンパイや、センパイの周りのヒトたちは、全然気にしてないみたいに接してくれています」"
translation = "「그런데도 선배나 선배 주변 사람들은 전혀 신경 쓰지 않는 것처럼 대해주고 있어요.」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「それがすっごく嬉しくて、大切にしたくて……」"
translation = "「그게 정말 기뻐서, 소중히 하고 싶어서……」"

[[dialogue]]
speaker = "unk"
original = "それがリーリアの本心なんだね？"
translation = "그게 리리아의 본심이구나?"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「はい♪\u3000だから私、センパイを本当に困らせるようなことはしません」"
translation = "「네♪ 그러니까 저, 선배를 정말로 곤란하게 할 짓은 하지 않을게요.」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「その代わり、これからも時々こうやって、デートの誘いに付き合ってもらえると嬉しいです♪」"
translation = "「대신 앞으로도 가끔 이렇게 데이트 신청에 응해주시면 기쁠 것 같아요♪」"

[[dialogue]]
speaker = "unk"
original = "だったら、そんなに頑張らなくてもいい"
translation = "그렇다면 그렇게까지 무리하지 않아도 돼"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「…………へ？」"
translation = "「…………헤?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「あの……それってどういう意味です？\u3000私、別になにも頑張ってることなんてありませんけど？」"
translation = "「저기…… 그게 무슨 의미예요? 저 별로 딱히 노력하고 있는 건 없는데요?」"

[[dialogue]]
speaker = "unk"
original = "ネビュラと学園のために頑張ってくれた事"
translation = "네뷸라와 학원을 위해 노력해 준 것"

[[dialogue]]
speaker = "unk"
original = "セドナさんから聞いたよ"
translation = "세드나 씨한테 들었어"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「……あ～、そういえば昼間、２人で話してましたよね」"
translation = "「……아~, 그러고 보니 낮에 둘이서 이야기했었죠.」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ちょっと気になってたんですけど、そういう話をしてたんですか……」"
translation = "「좀 신경 쓰였는데 그런 이야기를 하고 있었나요……」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「センパイ……まさか私がセンパイと仲良くしてるのはネビュラと学園の友好のため、なんて考えてたりしません？」"
translation = "「선배…… 설마 제가 선배랑 사이좋게 지내는 게 네뷸라와 학원의 우호를 위해서라거나, 그렇게 생각하고 계세요?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「だとしたら、大間違いですよ！\u3000そんなこと言い出したら、私怒っちゃいますからね」"
translation = "「만약 그렇다면 큰 착각이에요! 그런 소릴 하시면 저 화낼 거니까요.」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「いいですか？\u3000私がセンパイにアタックしているのは、純粋にセンパイのことが好きだからです」"
translation = "「알겠어요? 제가 선배한테 대시하는 건 순수하게 선배가 좋기 때문이에요.」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「他のみんなについても一緒。私が一緒にいて楽しいから、そうしてるだけです」"
translation = "「다른 사람들에 대해서도 마찬가지. 제가 같이 있으면 즐거우니까 그렇게 하는 것뿐이에요.」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「そりゃまあ、二つの組織が仲良くやっていくために、自分に出来ることはないかなって多少は頑張ったりしましたけど……」"
translation = "「그야 뭐, 두 조직이 사이좋게 지내기 위해서 내가 할 수 있는 일은 없을까 하고 조금은 노력하긴 했지만……」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「でもそうした理由は全部、私がそうしたかったからってだけです」"
translation = "「하지만 그렇게 한 이유는 전부 제가 그러고 싶었기 때문일 뿐이에요.」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「そこに打算的な気持ちなんて、誓ってないですからね！」"
translation = "「거기에 타산적인 기분 같은 건 맹세코 없다구요!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「……どうしたんです？\u3000何とか言ったらどうなんですか？」"
translation = "「……왜 그래요? 뭐라고 말 좀 해보라구요.」"

[[dialogue]]
speaker = "unk"
original = "……告白？"
translation = "……고백?"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「へ？」"
translation = "「헤?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "（あ、あれ？\u3000私、もしかして勢いで……とんでもない事、言った……？）"
translation = "（어, 어라? 나 혹시 기세로…… 엄청난 소릴 해버린 건가……?）"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "（センパイにアタックしてるのは、純粋にセンパイのこと好きだから、って……）"
translation = "（선배한테 대시하는 건 순수하게 선배가 좋기 때문이라고……）"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "（そうだけど！\u3000そうなんだけど！\u3000気持ちの準備が全然出来てないってば！）"
translation = "（그렇긴 하지만! 그렇긴 한데! 마음의 준비가 전혀 안 됐다니까!）"

[[dialogue]]
speaker = "unk"
original = "俺も真剣に考えなくちゃいけないな"
translation = "나도 진지하게 생각해야겠네"

[[dialogue]]
speaker = "unk"
original = "だとしたら……"
translation = "그렇다면……"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "（え？\u3000あ、待って……展開、戻ってるって……！）"
translation = "（에? 아, 잠깐만…… 전개 돌아왔잖아……!）"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "（このままいくと、センパイが私のこと……す……好きって）"
translation = "（이대로 가면 선배가 나를…… 조…… 좋아한다고）"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "（やだ、顔が……燃えてるみたいに、熱い……）"
translation = "（싫어, 얼굴이…… 타는 것처럼 뜨거워……）"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "（なんか、勢いで、みたいだけど……このまま流されちゃっても、いいかも……だって……）"
translation = "（왠지 기세 때문인 것 같지만…… 이대로 휩쓸려 버려도 괜찮을지도…… 그야……）"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「センパイ…………私……センパイのこと……――」"
translation = "「선배………… 저…… 선배를……――」"

