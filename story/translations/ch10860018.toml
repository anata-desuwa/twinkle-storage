[[dialogue]]
speaker = "unk"
original = "とある休日。その日は母さんが不在で、アルモが家に遊びにきて、２人でテレビゲームをして遊んでいたのだが――"
translation = "어느 휴일. 그날은 어머니가 부재중이라, 알모가 집에 놀러 와서, 둘이서 비디오 게임을 하며 놀고 있었는데――"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「えいっ！\u3000そこなのだ！\u3000必殺技発動なのだ！」"
translation = "「에잇! 거기인 것이다! 필살기 발동인 것이다!」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「――よしっ、決まったのだ～！\u3000またアルモたんの勝ちだぞ♪」"
translation = "「――요시, 결정됐다~! 또 아르모탄의 승리라고♪」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「会長ってば、さっきから技をミスしまくりでヨワヨワなのだ。一体どうしたのだ～？」"
translation = "「회장님도 참, 아까부터 기술을 계속 실수해서 허약허약인 것이다. 대체 어찌 된 일인 것이다~?」"

[[dialogue]]
speaker = "クロト"
original = "「それは、アルモがお尻をあそこに押し付けてくるから、集中できなくて……」"
translation = "「그건, 아르모가 엉덩이를 저기에 밀어붙여 오니까, 집중할 수가 없어서……」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「え～？\u3000アルモたんはわざとやっているわけじゃないのにな～？\u3000会長ってば、そんなヨコシマなことを考えていたのだ？」"
translation = "「에~? 아르모탄은 일부러 그러는 게 아닌데 말야~? 회장님도 참, 그런 사악한 것을 생각하고 있었던 것이다?」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「ふふっ、小さい体のアルモたんとくっ付いてるだけでムラムラしちゃうとか、スケベ魔王なのだ<emoji=heart04>」"
translation = "「후훗, 작은 몸의 아르모탄과 붙어 있는 것만으로 불끈불끈해버리다니, 변태 마왕인 것이다<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「それで、あそこが大きくなっちゃってる会長は、どうしたいのだ？」"
translation = "「그래서, 저기가 커져 버린 회장님은, 어떻게 하고 싶은 것이다?」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「今は格闘ゲームしてる方が楽しいから、アルモたん的にはエッチな方の対戦は、あんまりノリ気じゃないんだけどな～？」"
translation = "「지금은 격투 게임 하는 쪽이 즐거우니까, 아르모탄적으로는 야한 쪽의 대전은, 별로 내키지 않는데 말야~?」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「ふふふっ……<emoji=heart04>」"
translation = "「후후후……<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「んっ……<emoji=heart04>\u3000アルモたんを強引に自分の部屋に連れ込むなんて、会長はやっぱりスケベな性欲魔王なのだ<emoji=heart04>」"
translation = "「응……<emoji=heart04> 아르모탄을 억지로 자기 방으로 끌어들이다니, 회장님은 역시 변태 성욕 마왕인 것이다<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「わざとエッチに煽る悪戯っ子には、お仕置きをしないとな」"
translation = "「일부러 야하게 도발하는 장난꾸러기에게는, 벌을 줘야겠군」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「って、指をローションでぬるぬるにして……どうするのだ？」"
translation = "「앗, 손가락을 로션으로 미끌미끌하게 해서…… 어떻게 할 셈인 것이다?」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「あっ……！？\u3000お、お尻に会長の指が入ってきて――ふああぁっ<emoji=heart04>」"
translation = "「앗……!? 어, 엉덩이에 회장님의 손가락이 들어와서――후아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「今日は、お尻の方でしちゃうのだ……？\u3000おっ<emoji=heart04>\u3000指で中を探られて……おおっ<emoji=heart04>\u3000おほぉ……<emoji=heart04>」"
translation = "「오늘은, 엉덩이 쪽으로 해버리는 것이다……? 읏<emoji=heart04> 손가락으로 안을 휘저어져서…… 오옷<emoji=heart04> 오호오……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「人のことスケベとか言いながら、アルモもお尻の穴の方、綺麗にしてきてるじゃないか」"
translation = "「남보고 변태라고 말하면서, 아르모도 뒷보지 구멍 쪽, 깨끗하게 하고 왔지 않나」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「そ、それは一応、するかもと思って……んあぁっ……<emoji=heart04>」"
translation = "「그, 그건 일단, 할지도 모른다고 생각해서…… 응아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「よ、弱いところわかってて触るの、ずるいのだ……おっ<emoji=heart04>\u3000んうぅっ……<emoji=heart04>\u3000はあぁっ……んほぉっ……<emoji=heart04>」"
translation = "「야, 약한 곳 알고서 만지는 거, 치사한 것이다…… 읏<emoji=heart04> 응으윽……<emoji=heart04> 하아앗…… 응호옷……<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「――エッチなこと、期待してたんじゃないかって？\u3000おっ……おほぉっ……<emoji=heart04>\u3000ふうぅっ……<emoji=heart04>」"
translation = "「――야한 일, 기대하고 있었던 거 아니냐고? 읏…… 오호옷……<emoji=heart04> 후우웃……<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「ち、違うのだ<emoji=heart04>\u3000これは会長の方がムラムラして襲ってくるかもしれないから、その時に備えてなのだ<emoji=heart04>」"
translation = "「아, 아닌 것이다<emoji=heart04> 이건 회장님 쪽이 불끈해서 덮쳐올지도 모르니까, 그때를 대비해서인 것이다<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「――最初からおま○こも濡れてたって？\u3000そ、そんなことないのだ……<emoji=heart04>\u3000おっ……おぉんっ……<emoji=heart04>」"
translation = "「――처음부터 보지도 젖어 있었다고? 그, 그럴 리 없는 것이다……<emoji=heart04> 읏…… 오오응……<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「会長がお尻の穴を、弄っているせいなのだ……おっ<emoji=heart04>\u3000ふうぅっ……はあぁっ……<emoji=heart04>\u3000んあぁっ……<emoji=heart04>」"
translation = "「회장님이 똥구멍을, 만지고 있는 탓인 거다…… 윽<emoji=heart04> 후우으…… 하아아……<emoji=heart04> 응아아……<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「あっ<emoji=heart04>\u3000会長のおち○ぽ、アルモたんのあそこに当たっているのだ……んっ<emoji=heart04>\u3000んうぅっ……はあぁっ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 회장님의 자지, 아르모땅의 거기에 닿고 있는 거다…… 응<emoji=heart04> 응우으…… 하아아……<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「もうギンギンに勃起して、固くて熱いのが、おま○こに擦れて……あっ<emoji=heart04>\u3000あぁんっ……<emoji=heart04>」"
translation = "「벌써 빳빳하게 발기해서, 딱딱하고 뜨거운 게, 보지에 스쳐서…… 앗<emoji=heart04> 아앙……<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「き、今日はお尻の方に挿れるんじゃ、ないのだ……？\u3000ローション使ってるから、てっきり……あっ<emoji=heart04>\u3000ふあぁっ……<emoji=heart04>」"
translation = "「오, 오늘은 엉덩이 쪽에 넣는 게, 아닌 거다……? 로션 쓰고 있으니까, 틀림없이…… 앗<emoji=heart04> 후아아……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「おま○この方に挿れて、アナルもこのまま指で責めちゃうから。今日は――」"
translation = "「보지 쪽에 넣고, 애널도 이대로 손가락으로 괴롭힐 거니까. 오늘은――」"

[[dialogue]]
speaker = "クロト"
original = "「『二穴責め』だ」"
translation = "「『이혈 공격』이다」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「……！\u3000おま○ことお尻の穴を同時にっ……<emoji=heart04>」"
translation = "「……! 보지랑 똥구멍을 동시에……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "耳元で囁くと、想像して興奮したのか、アルモがぶるっと体を震わせる。"
translation = "귓가에 속삭이자, 상상하며 흥분했는지 아르모가 부르르 몸을 떤다."

[[dialogue]]
speaker = "アルモタヘル"
original = "「はあぁっ……<emoji=heart04>\u3000ふうぅっ……<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 후우으……<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「あっ……！？\u3000お、おち○ぽが擦れて……ふあぁっ<emoji=heart04>」"
translation = "「앗……!? 자, 자지가 스쳐서…… 후아아<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「あっ<emoji=heart04>\u3000先っぽがおま○この穴に、当たってるのだ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000はあぁっ……ふうぅっ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 끝부분이 보지 구멍에, 닿아 있는 거다<emoji=heart04> 응<emoji=heart04> 하아아…… 후우으……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「アルモのおま○こ、愛液でもうぬちゅぬちゅになっちゃってるから、挿れちゃうよ？」"
translation = "「아르모의 보지, 애액으로 벌써 눅진눅진해졌으니까, 넣어버린다?」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「あっ<emoji=heart04>\u3000あっ……<emoji=heart04>\u3000アルモたんの小さなおま○こ穴、押し広げられて……はあぁっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗……<emoji=heart04> 아르모땅의 작은 보지 구멍, 억지로 벌려져서…… 하아아<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「会長のおち○ぽ、中に入って――あああぁっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「회장님의 자지, 안에 들어와서―― 아아아아<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「ふあああぁぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000おち○ぽ奥まできたぁぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아아~~~~<emoji=heart04><emoji=heart04><emoji=heart04> 자지 깊숙한 곳까지 왔어어어어~~~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「あっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>\u3000あっ……あんっ<emoji=heart04>\u3000はあぁっ……んあぁっ<emoji=heart04>\u3000あっ……んうぅっ<emoji=heart04>\u3000はあぁっ……ふあぁっ……！」"
translation = "「앗<emoji=heart04> 후아아<emoji=heart04> 앗…… 아앙<emoji=heart04> 하아아…… 응아아<emoji=heart04> 앗…… 응우으<emoji=heart04> 하아아…… 후아아……!」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「会長の魔王おち○ぽ……あっ、あんっ<emoji=heart04>\u3000大きくて固くて、すごいのだ<emoji=heart04>\u3000はあぁっ……ふあぁっ<emoji=heart04>\u3000ふうぅっ……んああぁっ……！」"
translation = "「회장님의 마왕 자지…… 앗, 아앙<emoji=heart04> 크고 딱딱해서, 굉장한 거다<emoji=heart04> 하아아…… 후아아<emoji=heart04> 후우으…… 응아아아……!」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「あっ<emoji=heart04>\u3000おま○こ気持ちいいっ<emoji=heart04>\u3000はあぁっ……んあぁっ<emoji=heart04>\u3000んうぅっ……ふあぁっ<emoji=heart04>\u3000そこっ<emoji=heart04>\u3000そこいいのだっ<emoji=heart04>\u3000あっ、あんっ<emoji=heart04>\u3000ふうぅっ……んああぁっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 보지 기분 좋아<emoji=heart04> 하아아…… 응아아<emoji=heart04> 응우으…… 후아아<emoji=heart04> 거기<emoji=heart04> 거기 좋은 거다<emoji=heart04> 앗, 아앙<emoji=heart04> 후우으…… 응아아아<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「アナルも、奥まで挿れるぞ」"
translation = "「애널도, 깊숙이 넣을게」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「えっ？\u3000あっ……！\u3000おっ――んほお゛ぉぉっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「엣? 앗……! 윽―― 응호오오오<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「会長の指、お尻の深い、ところまで……お゛お゛お゛っ<emoji=heart04>\u3000おほっ<emoji=heart04>\u3000んおっ<emoji=heart04>\u3000んほおぉぉっ……<emoji=heart04>」"
translation = "「회장님의 손가락, 엉덩이 깊은, 곳까지…… 오오오오<emoji=heart04> 오호<emoji=heart04> 응오<emoji=heart04> 응호오오오……<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「おっ<emoji=heart04>\u3000そこダメ<emoji=heart04>\u3000そこ弱いところなのだ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000んおっ<emoji=heart04>\u3000ふうぅっ……おおっ<emoji=heart04>\u3000おほっ……ほおぉっ<emoji=heart04>\u3000んおぉっ<emoji=heart04>\u3000ふおおぉっ……<emoji=heart04>」"
translation = "「윽<emoji=heart04> 거기 안 돼<emoji=heart04> 거기 약한 곳인 거다<emoji=heart04> 윽<emoji=heart04> 응오<emoji=heart04> 후우으…… 오오<emoji=heart04> 오호…… 호오오<emoji=heart04> 응오오<emoji=heart04> 후오오오……<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「ふ、二穴責め、すごっ……<emoji=heart04>\u3000ほおぉっ……<emoji=heart04>\u3000おっ<emoji=heart04>\u3000んおぉっ<emoji=heart04>\u3000すごいのだっ……おっ<emoji=heart04>\u3000おおお゛っ<emoji=heart04>\u3000んほおおぉっ<emoji=heart04>」"
translation = "「이, 이혈 공격, 대단해……<emoji=heart04> 호오오……<emoji=heart04> 윽<emoji=heart04> 응오오<emoji=heart04> 굉장한 거다…… 윽<emoji=heart04> 오오오오<emoji=heart04> 응호오오오<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「アルモ、こっち見て」"
translation = "「아르모, 여기 봐」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「え？\u3000んっ……！？」"
translation = "「에? 응……!?」"

[[dialogue]]
speaker = "unk"
original = "俺は彼女の唇を奪い、キスをする。"
translation = "나는 그녀의 입술을 빼앗아, 키스를 한다."

[[dialogue]]
speaker = "アルモタヘル"
original = "「んむっ！？\u3000んっ<emoji=heart04>\u3000ちゅっ……んんっ……<emoji=heart04>」"
translation = "「응무!? 응<emoji=heart04> 츄…… 응응……<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「ちゅぱっ<emoji=heart04>\u3000舌が入って……んむっ<emoji=heart04>\u3000ちゅぷぷっ……ちゅぷっ<emoji=heart04>\u3000れろちゅっ……んむぅっ<emoji=heart04>\u3000ちゅるるっ……ちゅぶぶっ……ちゅぱっ！」"
translation = "「츄파<emoji=heart04> 혀가 들어와서…… 응무<emoji=heart04> 츄푸푸…… 츄푸<emoji=heart04> 레로츄…… 응무우<emoji=heart04> 츄루루…… 츄부부…… 츄파!」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「はあぁっ<emoji=heart04>\u3000これダメ<emoji=heart04>\u3000ふ、二穴責めと同時にキス、反則なのだ<emoji=heart04>\u3000んむっ！？\u3000ちゅっ……ちゅぶっ<emoji=heart04>\u3000ちゅぶぶっ……んちゅるっ！」"
translation = "「하아아<emoji=heart04> 이거 안 돼<emoji=heart04> 이, 이혈 공격과 동시에 키스, 반칙인 거다<emoji=heart04> 응무!? 츄…… 츄부<emoji=heart04> 츄부부…… 응츄루!」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「ぷはっ<emoji=heart04>\u3000さ、三点責めらめっ<emoji=heart04>\u3000頭おかしく、なっちゃうのら<emoji=heart04>\u3000お゛っ<emoji=heart04>\u3000んほおぉっ<emoji=heart04><emoji=heart04>」"
translation = "「푸하<emoji=heart04> 사, 삼점 공격 안 돼애<emoji=heart04> 머리 이상해져, 버리는 거다아<emoji=heart04> 오옷<emoji=heart04> 응호오오<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「お、お尻弄るの激しっ<emoji=heart04>\u3000お゛っ<emoji=heart04>\u3000おほっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ダメダメ、それヤバッ<emoji=heart04>\u3000ピストンとアナルの両側から、同じところ責めるの利くっ<emoji=heart04>」"
translation = "「어, 엉덩이 만지는 거 격해애<emoji=heart04> 오옷<emoji=heart04> 오호<emoji=heart04> 앗<emoji=heart04> 안 돼 안 돼, 그거 위험해애<emoji=heart04> 피스톤이랑 애널 양쪽에서, 같은 곳을 공격하는 거 잘 들어어!」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「おっ<emoji=heart04>\u3000お゛っ<emoji=heart04>\u3000ヤバッ、ヤバいのだ<emoji=heart04>\u3000んむっ！？\u3000い、今キスはぁ……んっ<emoji=heart04>\u3000ちゅぷぷっ……れろちゅっ……ちゅぶぶっ<emoji=heart04>」"
translation = "「윽<emoji=heart04> 오옷<emoji=heart04> 위험해, 위험한 거다<emoji=heart04> 응무!? 지, 지금 키스는…… 응<emoji=heart04> 츄푸푸…… 레로츄…… 츄부부<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「ぷはっ！\u3000おっ<emoji=heart04>\u3000おお゛っ<emoji=heart04>\u3000ダメダメ、くるっ<emoji=heart04>\u3000もう来ちゃうのだっ<emoji=heart04>」"
translation = "「푸하! 윽<emoji=heart04> 오오오<emoji=heart04> 안 돼 안 돼, 온다아<emoji=heart04> 벌써 와버리는 거다아!」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「おっ<emoji=heart04>\u3000お゛っ<emoji=heart04>\u3000んおお゛っ<emoji=heart04><emoji=heart04>\u3000くるくるっ<emoji=heart04>\u3000イクッ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「윽<emoji=heart04> 오옷<emoji=heart04> 응오오오<emoji=heart04><emoji=heart04> 온다 온다아<emoji=heart04> 가버려어<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「イっちゃうのだっ<emoji=heart04>\u3000イクイクイクッ<emoji=heart04>\u3000イっ――」"
translation = "「가버리는 거다아<emoji=heart04> 가버려 가버려 가버려어<emoji=heart04> 가버――」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「イっくうぅぅぅーーーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふあああぁぁぁ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가버려어어어어어어어어어~~~~~~!!<emoji=heart04><emoji=heart04><emoji=heart04> 후아아아아아아~~~~~~!!<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「あっ……はあぁっ……！\u3000ふうぅっ……はあぁっ……<emoji=heart04>」"
translation = "「앗…… 하아아……! 후우으…… 하아아……<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「はぁ……はぁ……<emoji=heart04>\u3000お潮吹いて、イっちゃったのだ……<emoji=heart04>」"
translation = "「하아…… 하아……<emoji=heart04> 하악질하고, 가버린거다……<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「って、ふああぁぁっ！？<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「그보다, 후아아아아앗!?<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「か、会長、待ってなのだ！\u3000まだアルモたん、イったばかりでっ<emoji=heart04>\u3000あっ、ふあぁっ……<emoji=heart04>\u3000はあぁっ……んああぁっ<emoji=heart04>」"
translation = "「회, 회장, 기다리는거다! 아직 알모땅, 가버린 지 얼마 안 돼서<emoji=heart04> 앗, 후아앗……<emoji=heart04> 하아앗…… 응아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「おっ<emoji=heart04>\u3000おほぉっ<emoji=heart04><emoji=heart04>\u3000アナルも弄っちゃらめっ<emoji=heart04>\u3000ふおっ<emoji=heart04>\u3000お゛っ<emoji=heart04>\u3000んほおおぉっ<emoji=heart04>」"
translation = "「오<emoji=heart04> 오호옷<emoji=heart04><emoji=heart04> 애널도 만지면 안 되는거다<emoji=heart04> 후옷<emoji=heart04> 오윽<emoji=heart04> 응호오오옷<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「おっ、おま○こもお尻も、お゛<emoji=heart04>\u3000敏感になってるから、感じちゃ……んお゛おぉっ！？」"
translation = "「오, 보지도 뒷보지도, 오윽<emoji=heart04> 민감해져 있어서, 느껴버렷…… 응오오옷!?」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「おっ<emoji=heart04>\u3000んおっ<emoji=heart04>\u3000おおおっ……んお゛ぉっ<emoji=heart04>\u3000おほっ<emoji=heart04>\u3000ふおぉっ……んお゛おぉっ<emoji=heart04>」"
translation = "「오<emoji=heart04> 응옷<emoji=heart04> 오오옷…… 응오옷<emoji=heart04> 오홋<emoji=heart04> 후오옷…… 응오오옷<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「１人で勝手にイっちゃうなんて、ダメじゃないか。お仕置きエッチだって言っただろ？」"
translation = "「혼자서 멋대로 가버리다니, 안 되지 않나. 벌칙 섹스라고 말했잖아?」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「ご、ごめんなさいなのだ<emoji=heart04>\u3000んほぉぉっ<emoji=heart04>\u3000き、気持ちよすぎて、我慢できなかったのだ<emoji=heart04>」"
translation = "「죄, 죄송한のだ<emoji=heart04> 응호오옷<emoji=heart04> 기, 기분이 너무 좋아서, 참을 수 없었던거다<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「エッチの時、アルモは俺の何になるんだっけ？」"
translation = "「섹스할 때, 알모는 내 뭐가 된다고 했었지?」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「……！\u3000お、オナホ天使<emoji=heart04>\u3000アルモたんは会長専用の、オナホ天使なのだっ<emoji=heart04>」"
translation = "「……! 오, 오나홀 천사<emoji=heart04> 알모땅은 회장 전용의, 오나홀 천사인거다!<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「それを忘れちゃってた悪い子には、お仕置きをしないとな。アルモ――」"
translation = "「그걸 잊어버린 나쁜 아이에게는, 벌을 줘야겠네. 알모――」"

[[dialogue]]
speaker = "クロト"
original = "「全力で激しくするぞ」"
translation = "「전력으로 격렬하게 하겠어」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「あっ――<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗――<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「ふあああぁぁぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000全力ピストンきたあああぁぁぁーーーっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000おおおっ<emoji=heart04>\u3000おほぉぉぉっ<emoji=heart04><emoji=heart04>」"
translation = "「후아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 전력 피스톤 왔다아아아아――앗<emoji=heart04><emoji=heart04><emoji=heart04> 오오옷<emoji=heart04> 오호오오옷<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「あっ、あっ、あっ<emoji=heart04>\u3000んああぁっ<emoji=heart04>\u3000……おほぉぉっ！？<emoji=heart04>\u3000おっ、おっ、おっ<emoji=heart04>\u3000おほぉぉぉっ<emoji=heart04>」"
translation = "「앗, 앗, 앗<emoji=heart04> 응아아앗<emoji=heart04> ……오호오옷!?<emoji=heart04> 오, 오, 오<emoji=heart04> 오호오오옷<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「ダメっ<emoji=heart04>\u3000感じるっ<emoji=heart04>\u3000おま○こも感じるのだっ<emoji=heart04>\u3000同時にきてるのだぁ<emoji=heart04>\u3000あっ、あっ、あっ<emoji=heart04>\u3000はあぁんっ<emoji=heart04>」"
translation = "「안 돼<emoji=heart04> 느껴져<emoji=heart04> 보지도 느껴지는거다!<emoji=heart04> 동시에 오고 있는거다<emoji=heart04> 앗, 앗, 앗<emoji=heart04> 하아앙<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「奥、気持ちっ<emoji=heart04>\u3000おち○ぽ気持ちいいっ<emoji=heart04>\u3000はあぁんっ<emoji=heart04>\u3000あっ、あっ、あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「안쪽, 기분 좋아<emoji=heart04> 자지 기분 좋아<emoji=heart04> 하아앙<emoji=heart04> 앗, 앗, 앗<emoji=heart04> 앙<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「お゛お゛っ！？\u3000ダメっ<emoji=heart04>\u3000お尻の穴も激しくっ<emoji=heart04>\u3000おっ、おっ、お゛っ<emoji=heart04>\u3000んほおおぉっ<emoji=heart04>\u3000おっ、お゛っ、おほっ<emoji=heart04>\u3000んほおおぉんっ<emoji=heart04>」"
translation = "「오윽!? 안 돼<emoji=heart04> 똥꼬도 격렬하게<emoji=heart04> 오, 오, 오윽<emoji=heart04> 응호오오옷<emoji=heart04> 오, 오윽, 오홋<emoji=heart04> 응호오오옹<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「二穴責め効くっ<emoji=heart04>\u3000キク、キクキクキクッ<emoji=heart04>\u3000気持ちいい゛っ<emoji=heart04>\u3000お゛っ、おっ、おほぉっ<emoji=heart04>\u3000ふおぉっ<emoji=heart04>\u3000お゛お゛お゛お゛お゛っ<emoji=heart04>\u3000んおお゛ぉんっ<emoji=heart04>」"
translation = "「두 구멍 공략 잘 들어<emoji=heart04> 들어, 들어들어들어엇<emoji=heart04> 기분 좋아윽<emoji=heart04> 오윽, 오, 오호옷<emoji=heart04> 후오옷<emoji=heart04> 오오오오오옷<emoji=heart04> 응오오온<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「あっ<emoji=heart04>\u3000キスまでっ<emoji=heart04>\u3000んむぅっ！？\u3000ちゅっ……ちゅぶぶっ……じゅるるっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 키스까지<emoji=heart04> 응무웃!? 츄…… 츄부븟…… 쥬르르<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「おほっ<emoji=heart04>\u3000気持ちよしゅぎて、頭バチバチしゅりゅっ<emoji=heart04>\u3000んむ゛っ<emoji=heart04>\u3000れろち゛ゅっ……ちゅばっ<emoji=heart04>\u3000ちゅぶっ……ぢゅるるるっ<emoji=heart04>」"
translation = "「오홋<emoji=heart04> 기분이 너무 좋아서, 머리가 찌릿찌릿해지는거다<emoji=heart04> 응무윽<emoji=heart04> 레로츄…… 츄밧<emoji=heart04> 츄븟…… 쥬르르르<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「お゛っ！？\u3000く、くりゅっ<emoji=heart04>\u3000またくりゅっ<emoji=heart04>」"
translation = "「오윽!? 오, 온다<emoji=heart04> 또 온다<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「さっきよりすごい気持ちいいのがきてりゅっ<emoji=heart04>\u3000こ、これヤバッ……飛んじゃう<emoji=heart04>\u3000イったら意識が飛んじゃうのだぁっ<emoji=heart04>」"
translation = "「아까보다 엄청 기분 좋은 게 오고 있는거다<emoji=heart04> 이, 이거 위험해…… 날아가 버려<emoji=heart04> 가버리면 의식이 날아가 버리는거다 아앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「俺ももう、イキそうだ！」"
translation = "「나도 이제, 갈 것 같아!」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「あ゛っ<emoji=heart04>\u3000あっ、あっ、あっ<emoji=heart04>\u3000ピストン激しっ<emoji=heart04>\u3000おお゛っ<emoji=heart04>\u3000おっ、おっ、お゛っ<emoji=heart04>\u3000お尻もぉっ<emoji=heart04>」"
translation = "「아윽<emoji=heart04> 앗, 앗, 앗<emoji=heart04> 피스톤 격렬해<emoji=heart04> 오오윽<emoji=heart04> 오, 오, 오윽<emoji=heart04> 뒷보지도오<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「おっ、おっ、お゛っ、んおお゛ぉっ<emoji=heart04>\u3000おっ、お゛っ、おほっ<emoji=heart04>\u3000アルモたんもイク<emoji=heart04>\u3000くるっ<emoji=heart04>\u3000くるくるくりゅぅっ<emoji=heart04><emoji=heart04>\u3000でっかいのくりゅっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「오, 오, 오윽, 응오오옷<emoji=heart04> 오, 오윽, 오홋<emoji=heart04> 알모땅도 가<emoji=heart04> 온다<emoji=heart04> 온다온다온다아앗<emoji=heart04><emoji=heart04> 커다란 게 온다앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「あっ<emoji=heart04>\u3000きだっ<emoji=heart04><emoji=heart04>\u3000きたのだっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あっあっあっあ゛っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 왔다<emoji=heart04><emoji=heart04> 온다앗<emoji=heart04><emoji=heart04><emoji=heart04> 앗앗앗아윽<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「アルモ、中に出すぞ！」"
translation = "「알모, 안에 내보낼게!」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「きてっ<emoji=heart04>\u3000オナホ天使のおま○こに出してっ<emoji=heart04><emoji=heart04>\u3000お゛っ、おっおっおっおっお゛お゛お゛っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「와줘<emoji=heart04> 오나홀 천사의 보지에 내보내 줘<emoji=heart04><emoji=heart04> 오윽, 오오오오오오오윽<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「イク、イクイクイクイクイグッ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000お゛っ――――<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가, 가가가가가앗<emoji=heart04><emoji=heart04><emoji=heart04> 오윽――――<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「んほお゛おおおおおぉぉぉ゛ーーーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>\u3000イック゛ぅぅぅーーーーーーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응호오오오오오오오오오――――――앗<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04> 가버려어어어어―――――――――엇<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「ふあああぁぁぁ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000気持ちいいので頭飛ぶうぅぅぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아아아～～～～～～앗<emoji=heart04><emoji=heart04><emoji=heart04> 기분 좋아서 머리가 날아가버려어어어～～～앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「はあああぁぁぁっ……<emoji=heart04><emoji=heart04>\u3000お潮、いっぱい出て……<emoji=heart04>\u3000あっ…………<emoji=heart04>」"
translation = "「하아아아아앗……<emoji=heart04><emoji=heart04> 하악질, 잔뜩 나와서……<emoji=heart04> 앗…………<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "クロト"
original = "「――アルモ。アルモ、大丈夫か？」"
translation = "「――알모. 알모, 괜찮아?」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「…………あっ……いま一瞬、意識飛んでたのだぁ……<emoji=heart04>」"
translation = "「…………앗…… 방금 일순간, 의식이 날아갔던거다……<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「はあぁ……<emoji=heart04>\u3000ふうぅ……<emoji=heart04>\u3000んっ……<emoji=heart04>」"
translation = "「하아……<emoji=heart04> 후우……<emoji=heart04> 응……<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「あぁぁっ<emoji=heart04>\u3000すごいのだ……<emoji=heart04>\u3000おち○ぽ抜いたら、アルモたんの中から精液がいっぱい溢れてきて……<emoji=heart04>」"
translation = "「아아앗<emoji=heart04> 대단한거다……<emoji=heart04> 자지 뺐더니, 알모땅 안에서 정액이 잔뜩 넘쳐흘러서……<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「――いつもよりも興奮して、いっぱい出た？\u3000えへへぇ<emoji=heart04>\u3000アルモたんもいつもより、すごいイキ方しちゃったのだ……<emoji=heart04>」"
translation = "「――평소보다 더 흥분해서, 잔뜩 나왔어? 에헤헤<emoji=heart04> 알모땅도 평소보다, 엄청난 방식으로 가버린거다……<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「って、どうしたのだ、会長？\u3000申し訳なさそうな顔して……」"
translation = "「그보다, 왜 그러는거다, 회장? 미안하다는 듯한 얼굴을 하고……」"

[[dialogue]]
speaker = "クロト"
original = "「ごめん。今日は興奮し過ぎて、ちょっとやり過ぎたかも……」"
translation = "「미안. 오늘은 너무 흥분해서, 좀 과하게 한 것 같아……」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「なんだ、そんなことか！\u3000アルモたんは全然平気なのだ<emoji=heart04>」"
translation = "「뭐야, 그런 거였나! 알모땅은 전혀 괜찮은거다<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「この体は小さくても頑丈だし、元はといえば、アルモたんが煽ったせいなのだ。それに――」"
translation = "「이 몸은 작아도 튼튼하고, 원래 따지고 보면, 알모땅이 도발한 탓인거다. 게다가――」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「アルモたんは今日みたいに、オナホ天使として激しく使われた方が、興奮しちゃうのだ……<emoji=heart04>」"
translation = "「알모땅은 오늘처럼, 오나홀 천사로서 격렬하게 사용되는 편이, 더 흥분되는거다……<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「だから今日はもっと……アルモたんを使って、いっぱい遊んで欲しいのだ<emoji=heart04>」"
translation = "「그러니까 오늘은 좀 더…… 알모땅을 사용해서, 잔뜩 놀아줬으면 하는거다<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "恋人からそんな風に可愛く言われて、俺は我慢できずに、アルモにまたキスをしてしまう。"
translation = "연인으로부터 그런 식으로 귀엽게 말을 들어서, 나는 참지 못하고, 알모에게 다시 키스를 해버린다."

[[dialogue]]
speaker = "アルモタヘル"
original = "「あっ、んっ……ちゅ……<emoji=heart04>」"
translation = "「앗, 응…… 츄……<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「会長……好きなのだ<emoji=heart04>」"
translation = "「회장…… 좋아하는거다<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「ちゅっ……<emoji=heart04>」"
translation = "「츄……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その後も彼女の望むまま、１日中エッチな遊びにふけってしまうのだった――"
translation = "그 후로도 그녀가 원하는 대로, 하루 종일 야한 놀이에 빠져버리는 것이었다――"

