[[dialogue]]
speaker = "unk"
original = "第１話,ゴールデングースのブレイン,P"
translation = "제1화, 골든 구스의 브레인"

[[dialogue]]
speaker = "ミウ"
original = "「う～んと、これで大丈夫かな？\u3000次は忘れないでね」"
translation = "「으~음, 이걸로 괜찮으려나? 다음엔 잊어버리면 안 돼.」"

[[dialogue]]
speaker = "附属生Ａ"
original = "「ありがと、ミウ。ミウのノート、綺麗で見やすいから助かったわー、恩に着る！」"
translation = "「고마워, 미우. 미우의 노트는 깨끗하고 보기 편해서 도움이 됐다니까~, 신세 좀 졌어!」"

[[dialogue]]
speaker = "附属生Ｂ"
original = "「ミウ、帰りに鯛焼き食べに行かない？\u3000ノート貸してくれたお礼に奢るからさ！」"
translation = "「미우, 가는 길에 붕어빵 먹으러 안 갈래? 노트 빌려준 답례로 내가 살게!」"

[[dialogue]]
speaker = "ミウ"
original = "「う～～ん、すっごく魅力的だけど……ごめんね、放課後はヒマワリちゃんと約束があって」"
translation = "「으~~음, 정말 매력적인 제안이지만…… 미안해, 방과 후에는 히마와리짱이랑 약속이 있어서.」"

[[dialogue]]
speaker = "附属生Ａ"
original = "「えー、またー？\u3000いつもヒマワリと一緒だね」"
translation = "「에이, 또야? 항상 히마와리랑 같이 있네.」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「ごめんねー、ミウはあたしのもんだからさ♪」"
translation = "「미안미안~, 미우는 내 거라서 말이야♪」"

[[dialogue]]
speaker = "附属生Ｂ"
original = "「独り占めはズルいってー。２人ってホントに仲良いよねー」"
translation = "「독차지하는 건 치사하다니까~. 둘은 정말 사이 좋네─.」"

[[dialogue]]
speaker = "ミウ"
original = "「うん、私たち、親友だから！\u3000じゃ、行こっか、ヒマワリちゃん」"
translation = "「응, 우리들, 절친이니까! 그럼, 가볼까, 히마와리짱.」"

[[dialogue]]
speaker = "unk"
original = "附属２年生・深沢ミウ。真面目で、人当たりがよくて、しっかり者の優等生。"
translation = "부속 2학년·후카자와 미우. 성실하고 사교성 좋으며, 야무진 우등생."

[[dialogue]]
speaker = "unk"
original = "しかし、そんな彼女の裏の顔は──"
translation = "하지만, 그런 그녀의 이면은──"

[[dialogue]]
speaker = "ミウ"
original = "「お疲れさまです、セナリィ社長」"
translation = "「수고하십니다, 세나리 사장님.」"

[[dialogue]]
speaker = "unk"
original = "秘密結社ゴールデングースの見習い新入社員である。"
translation = "비밀 결사 골든 구스의 견습 신입 사원이다."

[[dialogue]]
speaker = "ミウ"
original = "「どうして新星の会長さんがいらっしゃるんですか？」"
translation = "「어째서 신성의 회장님이 와 계신 건가요?」"

[[dialogue]]
speaker = "セナリィ"
original = "「今日は会長様を含めた合同任務ですわ。ミウとヒマワリは会長様に会うのは初めてだったかしら」"
translation = "「오늘은 회장님을 포함한 합동 임무예요. 미우와 히마와리는 회장님을 뵙는 게 처음이었던가요?」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「遠目に姿を見かけたことはありますけど、直に会うのは初めてです。よろしくお願いします、会長さん！」"
translation = "「멀리서 모습을 뵌 적은 있습니다만, 직접 뵙는 건 처음이에요. 잘 부탁드립니다, 회장님!」"

[[dialogue]]
speaker = "ミウ"
original = "「よろしくお願いします。かつての戦闘のアーカイブも拝見してます。会長の座にいるだけあって圧巻の戦闘力でした」"
translation = "「잘 부탁드립니다. 예전 전투의 아카이브도 봤습니다. 회장의 자리에 계신 만큼 압도적인 전투력이더군요.」"

[[dialogue]]
speaker = "ミウ"
original = "「正式にセナリィ社長の傘下に入っていただければ、プランに投入できるのに……残念です」"
translation = "「정식으로 세나리 사장님 휘하로 들어오신다면 플랜에 투입할 수 있을 텐데…… 아쉽네요.」"

[[dialogue]]
speaker = "ミウ"
original = "「上から目線で恐縮ですけど……今回の任務で会長さんの実力、確かめさせてもらいますね」"
translation = "「위에서 내려다보는 말투라 송구스럽습니다만…… 이번 임무에서 회장님의 실력, 확인하도록 하겠어요.」"

[[dialogue]]
speaker = "unk"
original = "よろしくね、ミウ、ヒマワリ"
translation = "잘 부탁해, 미우, 히마와리."

[[dialogue]]
speaker = "unk"
original = "公安委員会から『違法薬物が混入された酒が流通・取引されている』という情報を受けた俺たちはその現場へと向かった。"
translation = "공안위원회로부터 『위법 약물이 혼입된 술이 유통·거래되고 있다』는 정보를 받은 우리들은 그 현장으로 향했다."

[[dialogue]]
speaker = "ヒマワリ"
original = "「遊園地なんかで取引してんのー？」"
translation = "「유원지 같은 데서 거래를 하는 거야~?」"

[[dialogue]]
speaker = "ミウ"
original = "「遊戯施設ならアルコールを提供していてもおかしくないですし、『まさかこんなところで』っていう隠れ蓑ですかね」"
translation = "「유희 시설이라면 알코올을 제공하고 있어도 이상하지 않고, 『설마 이런 곳에서』라는 식의 은신처겠지요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「しっ……！\u3000怪しい人影がありますわ……５……８……１７人……なかなかの大所帯ですわね。ミウ、良いプランは思いつきまして？」"
translation = "「쉿……! 수상한 인영이 있습니다…… 5…… 8…… 17명…… 꽤 대인원이군요. 미우, 좋은 플랜은 떠올랐나요?」"

[[dialogue]]
speaker = "ミウ"
original = "「そうですね……人数差がありますし、正面切っての交戦は控え、奇襲を仕掛けるべきかと」"
translation = "「그렇네요…… 인원 차이가 있으니 정면 승부는 피하고, 기습을 가해야 할 것 같습니다.」"

[[dialogue]]
speaker = "ミウ"
original = "「私が遠距離から狙撃し、１人を無力化します。あえて射線を明らかにして、敵を引きつけ、手薄になったところを、社長とヒマワリちゃんで制圧……というのはどうでしょう？」"
translation = "「제가 원거리에서 저격하여 한 명을 무력화시키겠습니다. 일부러 사선을 노출해 적을 유인하고, 허술해진 틈을 타서 사장님과 히마와리짱이 제압…… 하는 건 어떨까요?」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「あたしとセナリィ社長……あれ？\u3000会長さんは？」"
translation = "「나랑 세나리 사장님…… 어라? 회장님은?」"

[[dialogue]]
speaker = "ミウ"
original = "「会長さんには私の方に寄ってくる敵を引き付けてもらいます。囮になってください」"
translation = "「회장님께는 제 쪽으로 다가오는 적을 유인해 주셔야겠습니다. 미끼가 되어주세요.」"

[[dialogue]]
speaker = "unk"
original = "了解。任せてよ"
translation = "알았어. 맡겨줘."

[[dialogue]]
speaker = "ミウ"
original = "「え……自分が提案したプランではありますけど、随分と簡単に了承してくれるんですね。最も危険な役回りですよ？」"
translation = "「에…… 제가 제안한 플랜이긴 합니다만, 꽤 순순히 승낙해 주시네요. 가장 위험한 역할이라구요?」"

[[dialogue]]
speaker = "unk"
original = "君の導いた最適解なら間違いなさそうだから"
translation = "네가 도출한 최적해라면 틀림없을 것 같으니까."

[[dialogue]]
speaker = "ミウ"
original = "「……っ！\u3000はい、私のプランは失敗しません！」"
translation = "「……윽! 네, 제 플랜은 실패하지 않아요!」"

[[dialogue]]
speaker = "セナリィ"
original = "「行きますわよ、ゴールデングース！\u3000ミッションスタート！\u3000ですわ！」"
translation = "「갑니다, 골든 구스! 미션 스타트! 예요!」"

[[dialogue]]
speaker = "unk"
original = "ミウのプラン通り、ゴールデングースと俺が奇襲をかけ、犯罪者たちはあえなくお縄についた。"
translation = "미우의 플랜대로 골든 구스와 내가 기습을 가했고, 범죄자들은 속수무책으로 붙잡혔다."

[[dialogue]]
speaker = "セナリィ"
original = "「ふふ、楽勝でしたわね！」"
translation = "「후후, 낙승이었네요!」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「会長さんがヘイト集めて、タンクになってくれたおかげです！\u3000ありがとうございます！」"
translation = "「회장님이 어그로를 끌어서 탱커가 되어주신 덕분이에요! 감사합니다!」"

[[dialogue]]
speaker = "密売人"
original = "「くっ、くそ……なんなんだ、てめぇら……」"
translation = "「크, 윽…… 뭐야, 너희들……」"

[[dialogue]]
speaker = "セナリィ"
original = "「おーっほっほっほ、何者と尋ねられれば颯爽と名乗らせていただきましょう！\u3000我ら秘密結社ゴールデ──」"
translation = "「오~홋홋홋, 누구냐고 물으신다면 늠름하게 이름을 밝혀드리지요! 우리들은 비밀 결사 골든──」"

[[dialogue]]
speaker = "ミウ"
original = "「おかしいですね。この程度の量では流通量と釣り合いません。取引場所はここだけではないですよね？\u3000他の在庫は？」"
translation = "「이상하네요. 이 정도 양으로는 유통량과 수지가 맞지 않습니다. 거래 장소는 여기뿐만이 아니죠? 다른 재고는?」"

[[dialogue]]
speaker = "密売人"
original = "「ハッ、バカが。言うわけねーだろ」"
translation = "「핫, 바보가. 말할 리가 없잖아.」"

[[dialogue]]
speaker = "ミウ"
original = "「なるほど、なるほど……そうですよねー。会長さん、汚れ仕事で申し訳ないんですけど……そこに転がってる方をうつぶせにして、お尻を向けさせてくれますか？」"
translation = "「과연, 과연…… 그렇군요~. 회장님, 궂은일이라 죄송합니다만…… 거기 굴러다니는 분을 엎드리게 해서 엉덩이를 향하게 해 주시겠어요?」"

[[dialogue]]
speaker = "セナリィ"
original = "「ミウ？\u3000貴方、何をするつもりですの？」"
translation = "「미우? 당신, 뭘 할 생각인가요?」"

[[dialogue]]
speaker = "ミウ"
original = "「ああ、いえ、悪い取引をされているので、お酒の危険性について教えてあげようかなぁって♪」"
translation = "「아아, 아뇨, 나쁜 거래를 하고 계시길래 술의 위험성에 대해 가르쳐 드릴까 해서요♪」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「あー……ミウを本気にさせちゃった。おじさん、早めに素直になっとけば良かったのにね」"
translation = "「아~…… 미우를 진심으로 만들었네. 아저씨, 진작 솔직하게 말했으면 좋았을 텐데.」"

[[dialogue]]
speaker = "ミウ"
original = "「私はまだ飲んだことはありませんけど……お尻からアルコールを摂取すると、即座に直腸で吸収されて、べろんべろんに酔っぱらっちゃうそうじゃないですか」"
translation = "「저는 아직 마셔본 적은 없지만…… 엉덩이로 알코올을 섭취하면 즉시 직장으로 흡수되어 인사불성이 될 정도로 취한다고 하더라고요.」"

[[dialogue]]
speaker = "ミウ"
original = "「おクスリの入ったお酒なら、さぞ悪酔いして、お喋りになっちゃうんでしょうねー？\u3000さぁさ、女の子のお酌で一献、楽しんでくださいね♪」"
translation = "「약물이 들어간 술이라면 아주 고약하게 취해서 술술 불게 되겠죠~? 자자, 여자아이의 술 따르기 한 잔, 즐겨주세요♪」"

[[dialogue]]
speaker = "密売人"
original = "「ちょ、ま、待て、な、なんなんだよ、オマエらッ！\u3000女の面した悪魔か！？」"
translation = "「잠, 마, 기다려, 뭐, 뭐야 너희들! 여자 얼굴을 한 악마냐!?」"

[[dialogue]]
speaker = "ミウ"
original = "「えーっ、悪魔なんてひどい言いがかりです。私たちはどこにでもいるごく普通の女の子なのに」"
translation = "「에이, 악마라니 너무한 모함이에요. 저희는 어디에나 있을 법한 평범한 여자아이일 뿐인데.」"

[[dialogue]]
speaker = "ミウ"
original = "「じゃあいきますよー。美味しいお酒を味わってくださいね♪」"
translation = "「그럼 갑니다~. 맛있는 술을 맛봐 주세요♪」"

[[dialogue]]
speaker = "密売人"
original = "「ひっ！？\u3000わかった！\u3000わかったよ、喋るから、やめてくれぇっ！？」"
translation = "「히익!? 알았어! 알았다고, 말할 테니까 그만둬!!」"

[[dialogue]]
speaker = "セナリィ"
original = "「ひぃいぃっ……！？」"
translation = "「히이이익……!?」"

[[dialogue]]
speaker = "unk"
original = "合掌……"
translation = "합장……."

[[dialogue]]
speaker = "unk"
original = "こうして、秘密結社ゴールデングースの手により、またひとつ悪徳犯罪が解決されたのであった。"
translation = "이렇게 비밀 결사 골든 구스의 손에 의해 또 하나의 악덕 범죄가 해결되었다."

