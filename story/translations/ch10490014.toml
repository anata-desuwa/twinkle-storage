[[dialogue]]
speaker = "unk"
original = "第４話,転生したら２０００年後だった件,P"
translation = "제4화, 전생했더니 2000년 후였던 건에 대하여, P"

[[dialogue]]
speaker = "unk"
original = "ある日の放課後、俺は紅明に呼び出され、何故かアリーナで向かい合っていた──"
translation = "어느 날 방과 후, 나는 코우메이에게 호출받아 웬일인지 아레나에서 마주 보고 있었다──"

[[dialogue]]
speaker = "紅明"
original = "「ダーリン、よくぞここまで来た！！！\u3000アタシと戦って勝ったなら、重大な秘密を教えてしんぜよう！」"
translation = "「달링, 잘도 여기까지 왔구나!!! 나와 싸워서 이긴다면 중대한 비밀을 가르쳐 주마!」"

[[dialogue]]
speaker = "unk"
original = "どうした急に"
translation = "갑자기 왜 이래"

[[dialogue]]
speaker = "紅明"
original = "「気付けば、ダーリンとの付き合いも幾星霜。アタシに対する好感度も、いい感じに上がって来た頃合いっしょ？」"
translation = "「어느덧 달링과의 인연도 기성조. 나에 대한 호감도도 기분 좋게 올라왔을 때잖아?」"

[[dialogue]]
speaker = "紅明"
original = "「そろそろアタシの真実を話してもいいんじゃないかと思ってね☆」"
translation = "「슬슬 나의 진실을 이야기해도 되지 않을까 싶어서 말이야☆」"

[[dialogue]]
speaker = "unk"
original = "それ戦う意味ある？"
translation = "그게 싸울 의미가 있어?"

[[dialogue]]
speaker = "紅明"
original = "「ラブ・イズ・ウォー！\u3000愛とは戦いなのだよ、ダーリン♪」"
translation = "「러브 이즈 워! 사랑이란 전쟁인 법이라구, 달링♪」"

[[dialogue]]
speaker = "紅明"
original = "「そう、アタシの秘密……それは今から遡ること２０００年前──」"
translation = "「그래, 나의 비밀…… 그것은 지금으로부터 거슬러 올라가 2000년 전──」"

[[dialogue]]
speaker = "unk"
original = "結局、先に語るんかーーい！"
translation = "결국 먼저 말하는 거냐ーー아!"

[[dialogue]]
speaker = "紅明"
original = "「アタシの<b>前世</b>は、かの西遊記に登場する魔族──」"
translation = "「나의 <b>전생</b>은 저 서유기에 등장하는 마족──」"

[[dialogue]]
speaker = "紅明"
original = "「牛魔王の娘『<ruby>紅孩児<rt>こうがいじ</rt></ruby>』であった……」"
translation = "「우마왕의 딸 『홍해아』였느니라……」"

[[dialogue]]
speaker = "unk"
original = "あー、はいはい。前世っていうか祖先の話ね"
translation = "아~ 예예. 전생이라기보다 조상님 이야기지"

[[dialogue]]
speaker = "紅明"
original = "「そう、ダーリンには以前話したことがあったね！\u3000アタシのこの体は、確かに紅孩児の子孫のもの」"
translation = "「그래, 달링에게는 이전에 말한 적이 있었지! 나의 이 몸은 확실히 홍해아 후손의 몸」"

[[dialogue]]
speaker = "紅明"
original = "「そして、びっくりすることに当時のアタシと外見が瓜二つ！」"
translation = "「그리고 깜짝 놀랄 정도로 당시의 나와 외모가 판박이야!」"

[[dialogue]]
speaker = "紅明"
original = "「つまり、アタシの正体は──」"
translation = "「즉, 나의 정체는──」"

[[dialogue]]
speaker = "紅明"
original = "「実は２０００年後の現代に転生した、紅孩児本人だったんだよ！！！」"
translation = "「사실 2000년 후의 현대에 전생한 홍해아 본인이었어!!!」"

[[dialogue]]
speaker = "unk"
original = "な、なんだってー（棒）"
translation = "그, 그렇구나아 (국어책 읽기)"

[[dialogue]]
speaker = "紅明"
original = "「ダーリンの信じられない気持ち、分かるぜ！\u3000アタシもどうして転生したのかよくわかってないから、生まれてこの方、今の両親にだって打ち明けたことがなかったしね」"
translation = "「달링의 믿기지 않는 마음, 이해한다구! 나도 왜 전생했는지 잘 모르니까, 태어나서 지금까지 지금 부모님께도 털어놓은 적이 없었거든」"

[[dialogue]]
speaker = "紅明"
original = "「それに２０００年前、事故死したとかそういうことでもなく、アタシは娘や孫達に囲まれながら天寿を全うした記憶もある」"
translation = "「게다가 2000년 전, 사고사했다거나 그런 것도 아니고, 나는 자식과 손주들에게 둘러싸여 천수를 누렸던 기억도 있어」"

[[dialogue]]
speaker = "紅明"
original = "「ただ、リクリエが間近に迫りつつある今だからこそ、お釈迦様の導きで現代に呼ばれたのかなって気はしてるよ」"
translation = "「다만 리크리에가 머지않은 지금이기에 부처님의 인도로 현대에 불려 온 게 아닐까 하는 느낌은 들어」"

[[dialogue]]
speaker = "unk"
original = "じゃあ、三蔵法師一行も転生してるってこと？"
translation = "그럼 삼장법사 일행도 전생했다는 거야?"

[[dialogue]]
speaker = "紅明"
original = "「ダーリン、いいところに気付いた！」"
translation = "「달링, 좋은 지점이야!」"

[[dialogue]]
speaker = "紅明"
original = "「それについては、アタシも可能性は高いんじゃないかと思ってる。残念ながら、まだ見つけられてはいないんだけど」"
translation = "「그 점에 대해서는 나도 가능성이 높지 않을까 생각하고 있어. 아쉽게도 아직 찾아내지는 못했지만」"

[[dialogue]]
speaker = "紅明"
original = "「アタシが転生したのに、悟空やお師匠様が呼ばれないって手落ち感あるしね！」"
translation = "「내가 전생했는데 오공이나 스승님이 불려 오지 않는다면 좀 허술한 느낌이 들기도 하고!」"

[[dialogue]]
speaker = "紅明"
original = "「豚や河童の魔族も分かりやすいし、学園では見かけ次第声を掛けたりしてんだけど……うーん、何だろう？\u3000何か反応的に違うっぽいんだよね～」"
translation = "「돼지나 갓파 마족도 알아보기 쉬우니까 학원에서 보이는 대로 말을 걸어보기도 하는데…… 으음, 뭘까? 뭔가 반응이 아닌 것 같단 말이지~」"

[[dialogue]]
speaker = "unk"
original = "……本当に紅孩児なの？"
translation = "……정말 홍해아야?"

[[dialogue]]
speaker = "紅明"
original = "「マジも大マジなんだな～、これが！」"
translation = "「진짜 중의 진짜라니까~, 이게!」"

[[dialogue]]
speaker = "紅明"
original = "「アタシが前世で紅孩児だった証拠が何か示せればいいんだけどね～。当時は写真なんてものは無いから、アタシの見た目が今と瓜二つなんだってのも、見せられないしな～」"
translation = "「내가 전생에 홍해아였다는 증거를 뭐라도 보여줄 수 있으면 좋겠는데~. 당시에는 사진 같은 건 없었으니까 내 외모가 지금이랑 판박이라는 것도 보여줄 수 없고 말이야~」"

[[dialogue]]
speaker = "紅明"
original = "「あ、でも１つだけあるわ！\u3000証拠になるかわからんけど……」"
translation = "「아, 그래도 하나 있다! 증거가 될지는 모르겠지만……」"

[[dialogue]]
speaker = "紅明"
original = "「ダーリンは『<ruby>紅瓢<rt>べにひさご</rt></ruby>』って知ってる？\u3000西遊記に登場する<ruby>瓢箪<rt>ひょうたん</rt></ruby>なんだけど」"
translation = "「달링은 『홍호로』라고 알아? 서유기에 등장하는 호로병인데」"

[[dialogue]]
speaker = "unk"
original = "金角と銀角が使っていたっていう……？"
translation = "금각과 은각이 사용했다는……?"

[[dialogue]]
speaker = "紅明"
original = "「物語だとそうなってるね！\u3000それって実は、当時敵だったアタシがお師匠様一行を倒す為に、金銀姉妹に貸したやつだったんだよ！」"
translation = "「이야기상으로는 그렇게 되어 있지! 그건 사실 당시 적이었던 내가 스승님 일행을 쓰러뜨리기 위해 금은 자매에게 빌려줬던 거야!」"

[[dialogue]]
speaker = "紅明"
original = "「それから、呼び掛けて返事をすると、中に吸い込まれてしまうって瓢箪の話は、正確には返事した相手から元気を吸い込む能力のこと」"
translation = "「그리고 이름을 불러서 대답을 하면 안으로 빨려 들어간다는 호로병 이야기는, 정확히는 대답한 상대에게서 활력을 빨아들이는 능력을 말해」"

[[dialogue]]
speaker = "紅明"
original = "「うむ！！！\u3000アタシが戦闘中に使ってる、この背中の紅い瓢箪。これが２０００年前から使っているアタシの相棒、紅瓢なんだよね！」"
translation = "「음!!! 내가 전투 중에 쓰고 있는 이 등 뒤의 붉은 호로병. 이게 2000년 전부터 사용해 온 내 파트너, 홍호로라구!」"

[[dialogue]]
speaker = "紅明"
original = "「でもまあ、これも口では何とでも言えるから、信じてもらえるかわからんけども……」"
translation = "「하지만 뭐, 이것도 말로는 얼마든지 할 수 있으니까 믿어줄지는 모르겠지만……」"

[[dialogue]]
speaker = "unk"
original = "どうして転生の話を、俺に打ち明けたんだ……？"
translation = "왜 전생 이야기를 나한테 털어놓은 거야……?"

[[dialogue]]
speaker = "紅明"
original = "「親にも話してないのに、ダーリンに打ち明けた理由？」"
translation = "「부모님께도 안 했는데 달링에게 털어놓은 이유?」"

[[dialogue]]
speaker = "紅明"
original = "「それは、ダーリンだからこそ、かな」"
translation = "「그건 달링이기 때문일까나」"

[[dialogue]]
speaker = "紅明"
original = "「ほら、最近はすっかり慣れて言わなくなったけど、何でダーリンって呼ぶのか、最初の頃にツッコんでたじゃん？」"
translation = "「봐봐, 요즘은 완전히 익숙해져서 안 묻게 됐지만, 왜 달링이라고 부르는지 처음에 따졌었잖아?」"

[[dialogue]]
speaker = "紅明"
original = "「それってさ……実はダーリンが、アタシの当時のダーリンと瓜二つだからなんだよね♪」"
translation = "「그거 말이야…… 사실 달링이 당시 내 달링이랑 판박이라서 그런 거야♪」"

[[dialogue]]
speaker = "unk"
original = "な……！"
translation = "뭐……!"

[[dialogue]]
speaker = "紅明"
original = "「ダーリンはそんな記憶持ってないみたいだし、世の中には激似の人が３人は居るっていうしね！」"
translation = "「달링은 그런 기억 없는 것 같고, 세상에는 똑 닮은 사람이 세 명은 있다고 하니까!」"

[[dialogue]]
speaker = "紅明"
original = "「実際はただの偶然、他人の空似なんだろうなって思うけど、でも……」"
translation = "「실제로는 그냥 우연, 닮은 사람일 뿐이겠지 싶지만, 그래도……」"

[[dialogue]]
speaker = "紅明"
original = "「仲良くなってもやっぱり、ダーリンはダーリンに似てるから、アタシのこと、知ってて欲しかったんだよね♪」"
translation = "「친해져 봐도 역시 달링은 달링을 닮았으니까, 나에 대해 알아줬으면 했거든♪」"

[[dialogue]]
speaker = "紅明"
original = "「ってダーリン、ひょっとして照れてる？\u3000顔赤いよ？」"
translation = "「어라 달링, 혹시 부끄러워하는 거야? 얼굴 빨개졌어?」"

[[dialogue]]
speaker = "unk"
original = "紅明が変なこと言うから……！"
translation = "코우메이가 이상한 소리를 하니까……!"

[[dialogue]]
speaker = "紅明"
original = "「うしし、そんなこと言いつつ満更でもない感じ？\u3000いや～、やっぱ相性いいんだよね、アタシとダーリン♪」"
translation = "「우시시, 그렇게 말하면서도 싫지 않은 눈치? 이랴~ 역시 궁합이 좋다니까, 나랑 달링♪」"

[[dialogue]]
speaker = "紅明"
original = "「えいっ、このこの～。ぶっちゃけアタシのことどう思ってんのさ～。教えてよ、ダーリン☆」"
translation = "「에잇, 이 녀석~. 솔직히 나를 어떻게 생각하는 거야~. 가르쳐 줘, 달링☆」"

[[dialogue]]
speaker = "紅明"
original = "「ほれほれ～？\u3000正直に言わないと、おっぱい揉ますぞ～？\u3000というか、せっかくだから一発揉んどき？\u3000うっしっし♪」"
translation = "「어라어라~? 솔직하게 말 안 하면 가슴 주무르게 할 거다~? 아니, 기왕 이렇게 된 거 한 번 주물러 볼래? 우시시♪」"

[[dialogue]]
speaker = "unk"
original = "その後、俺が正直な気持ちを告白するまで、紅明にイジられ続けることになるのだった。"
translation = "그 후, 내가 솔직한 마음을 고백할 때까지 코우메이에게 계속 놀림당하게 되었다."

