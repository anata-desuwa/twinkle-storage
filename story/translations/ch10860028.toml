[[dialogue]]
speaker = "unk"
original = "近頃立て込んでいた仕事がひと段落したとある休日。俺は久しぶりに恋人のアルモとリゾート結界へ遊びにやって来ていた。"
translation = "요즘 밀려 있던 업무가 일단락된 어느 휴일. 나는 오랜만에 연인인 알모와 리조트 결계에 놀러 왔다."

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「わ～い♪\u3000今日はやっと、会長といっぱい遊べるのだ～！」"
translation = "「와~이♪ 오늘은 드디어 회장과 잔뜩 놀 수 있는 것이다~!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「どうする？\u3000まずは海に入って遊ぶ？」"
translation = "「어떡할까? 우선 바다에 들어가서 놀까?」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「それももちろん後でしたいのだ！\u3000でも、それより今日は、先に試してみたいものがあるのだ♪」"
translation = "「그것도 물론 나중에 하고 싶은 것이다! 하지만 그것보다 오늘은 먼저 시도해 보고 싶은 게 있는 것이다♪」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「試してみたいもの……？」"
translation = "「시도해 보고 싶은 것……?」"

[[dialogue]]
speaker = "unk"
original = "アルモは『煉獄』に繋がった虫捕り網の中から、ある物を取り出してみせる。"
translation = "알모는 『연옥』에 연결된 잠자리채 안에서 어떤 물건을 꺼내 보인다."

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「ふっふっふっ♪\u3000会長、今日は<b>これ</b>を使って、アルモたんと遊ぶのだ♪」"
translation = "「훗훗훗♪ 회장, 오늘은 <b>이것</b>을 사용해서 알모땅과 노는 것이다♪」"

[[dialogue]]
speaker = "unk"
original = "俺はアルモと海ではなく、浜辺のビーチチェアーに移動し、そこへ腰かける。"
translation = "나는 알모와 바다가 아니라 해변의 비치 체어로 이동해 그곳에 앉는다."

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「じゃ～ん！\u3000今日は初めて『ディルド』というものを持ってきたから、これを使ってエッチをするのだ～<emoji=heart04>」"
translation = "「짜잔! 오늘은 처음으로 『딜도』라는 것을 가져왔으니까, 이걸 사용해서 섹스를 하는 것이다~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "アルモが意気揚々と見せてきたのは、なんとペニスの形状を模した大人のおもちゃ――ディルドであった。"
translation = "알모가 의기양양하게 보여준 것은, 무려 자지의 형상을 본뜬 성인용 장난감―― 딜도였다."

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「ん～？\u3000――どこで手に入れたのかって？\u3000アニマにお願いしたら、作ってくれたのだ♪」"
translation = "「음~? ――어디서 구했냐고? 아니마에게 부탁했더니 만들어 준 것이다♪」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「なんか聞くところによると、会長のおち○ぽと同じ大きさのディルドらしいぞ？」"
translation = "「어디서 듣기로는 회장의 자지와 같은 크기의 딜도라는 모양이라구?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ちょっと待って！？\u3000なんでアニマ先輩が俺の大きさを知ってるんだ！？」"
translation = "「잠깐만!? 어째서 아니마 선배가 내 크기를 알고 있는 거야!?」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「アルモたんの体を分析して、そのデータを見ればわかると言っていたのだ！」"
translation = "「알모땅의 몸을 분석해서, 그 데이터를 보면 알 수 있다고 말한 것이다!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「性事情が筒抜けになってるーーっ！？」"
translation = "「성생활이 다 새나가고 있잖아――!?」"

[[dialogue]]
speaker = "unk"
original = "恥ずかしさから頬が熱くなり、俺はアルモの綺麗な黒髪に顔を埋める。"
translation = "부끄러움에 뺨이 뜨거워져, 나는 알모의 아름다운 흑발에 얼굴을 묻는다."

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「あっ……ふふっ♪\u3000会長、首筋に息がかかってくすぐったいぞ♪\u3000とりあえず、このディルドを早く試してみるのだ！」"
translation = "「앗…… 후훗♪ 회장, 목덜미에 숨결이 닿아서 간지럽다구♪ 일단 이 딜도를 빨리 시험해 보는 것이다!」"

[[dialogue]]
speaker = "unk"
original = "更に聞くと、ディルドはまだ１度も試しておらず、使うのは今回が初めてらしい。"
translation = "더 들어보니, 딜도는 아직 한 번도 시험해보지 않았고, 사용하는 것은 이번이 처음인 모양이다."

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「――これをおま○こに挿れて、それでお尻の方にもおち○ぽを挿れたら、すごく気持ちいいエッチが体験できると思うのだ♪」"
translation = "「――이걸 보지에 넣고, 거기다 엉덩이 쪽에도 자지를 넣으면, 엄청 기분 좋은 섹스를 체험할 수 있을 거라 생각하는 것이다♪」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「じ、自分で言うのも変だけど……そんな大きなディルドを使って、いきなり二穴エッチするのは、ハードルが高くないか……？」"
translation = "「그, 내가 말하긴 좀 그렇지만…… 그런 커다란 딜도를 써서 갑자기 두 구멍 섹스를 하는 건 허들이 너무 높지 않아……?」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「大丈夫なのだ！\u3000アルモたんのおま○こも、お尻も、会長といっぱいエッチをして慣れているからな♪」"
translation = "「괜찮은 것이다! 알모땅의 보지도, 엉덩이도, 회장과 잔뜩 섹스를 해서 익숙해져 있으니까 말이다♪」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そ、それはまぁ……うん……」"
translation = "「그, 그건 뭐…… 응……」"

[[dialogue]]
speaker = "unk"
original = "アルモたんは食欲と同じくらい性欲も旺盛であり、俺も負けず劣らず性欲が強い自覚があるので、ヒトには言えないくらい行為がお盛んだったりする。"
translation = "알모땅은 식욕만큼이나 성욕도 왕성하며, 나 또한 그에 못지않게 성욕이 강하다는 자각이 있어서, 남들에게는 말 못 할 정도로 행위가 활발하곤 하다."

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「それに……会長は最近忙しくて、今日は久しぶりだから、ここでお預けされちゃうのは嫌なのだ<emoji=heart04>」"
translation = "「게다가…… 회장은 요즘 바빠서 오늘은 오랜만이니까, 여기서 감질나게 멈추는 건 싫은 것이다<emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「ほら、アルモたんのおま○こ……早くエッチしたくて、もうよだれがいっぱい溢れてきちゃってるのだ<emoji=heart04>」"
translation = "「자, 알모땅의 보지…… 빨리 섹스하고 싶어서, 벌써 침이 잔뜩 흘러넘치고 있는 것이다<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "アルモの膣からはだくだくと汁が溢れて、俺のペニスへと滴り落ちてきていた。"
translation = "알모의 질에서는 국물이 뚝뚝 흘러넘쳐, 내 자지로 흘러내리고 있었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「――わかった。それじゃあ、挿れられるように準備しちゃうからな」"
translation = "「――알았어. 그럼 삽입할 수 있게 준비할 테니까」"

[[dialogue]]
speaker = "unk"
original = "俺も久しぶりで、既に納まりがつかないくらいペニスが勃起してしまっていることもあり、愛液滴るおま○こへとペニスを擦り付け始める。"
translation = "나도 오랜만이라 이미 주체할 수 없을 정도로 자지가 발기해 버린 탓도 있어, 애액이 흐르는 보지에 자지를 문지르기 시작한다."

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「んっ……<emoji=heart04>\u3000アルモたんもディルドの準備をするのだ<emoji=heart04>\u3000ローションでぬるぬるにしちゃうのだ<emoji=heart04>」"
translation = "「응……<emoji=heart04> 알모땅도 딜도 준비를 하는 것이다<emoji=heart04> 로션으로 미끈미끈하게 해버리는 것이다<emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「おち○ぽの方は、アルモたんの愛液が天然のローションになって、大丈夫そうだな<emoji=heart04>\u3000んうぅっ……<emoji=heart04>\u3000ふうぅ……<emoji=heart04>」"
translation = "「자지 쪽은 알모땅의 애액이 천연 로션이 되어서 괜찮을 것 같네<emoji=heart04> 응으읏……<emoji=heart04> 후우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「よし、ディルドがぬるぬるになって……んっ<emoji=heart04>\u3000準備できたのだ<emoji=heart04>\u3000会長のおち○ぽも同時に挿れて欲しいのだ<emoji=heart04>」"
translation = "「좋아, 딜도가 미끈미끈해져서…… 응<emoji=heart04> 준비 다 된 것이다<emoji=heart04> 회장의 자지도 동시에 넣어줬으면 하는 것이다<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はアルモに言われていた通り、愛液でぬるぬるになったペニスの亀頭を、彼女のアナルの方にあてがう。"
translation = "나는 알모가 말한 대로, 애액으로 미끈거리는 자지의 귀두를 그녀의 애널 쪽에 갖다 댄다."

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「それじゃあ、挿れちゃうのだ<emoji=heart04>\u3000んっ――<emoji=heart04>」"
translation = "「그러면, 넣는 것이다<emoji=heart04> 응――<emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「おっ！？\u3000――んおおおぉぉ～～～っ<emoji=heart04><emoji=heart04>\u3000ディルドとおち○ぽ、両方入ってきたのだぁ～～っ<emoji=heart04>」"
translation = "「오!? ――음오오오오~~옷<emoji=heart04><emoji=heart04> 딜도랑 자지, 양쪽 다 들어온 것이다~~앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "アナルにゆっくりとペニスを挿入すると、アルモは最初から大きな嬌声を上げた。"
translation = "애널에 천천히 자지를 삽입하자, 알모는 처음부터 커다란 교성을 질렀다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「アルモ、大丈夫か……？」"
translation = "「알모, 괜찮아……?」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「お、おぉっ……<emoji=heart04>\u3000アルモたんの体はヒトよりも丈夫にできているから、大丈夫なのだ……<emoji=heart04>」"
translation = "「오, 오옷……<emoji=heart04> 알모땅의 몸은 인간보다 튼튼하게 만들어져서 괜찮은 것이다……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「だ、だから会長、ディルドの電源を挿れると同時に、動いて欲しいのだ<emoji=heart04>」"
translation = "「그, 그러니까 회장, 딜도의 전원을 켬과 동시에 움직여 줬으면 하는 것이다<emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「一緒に行くぞ？\u3000せ～のっ……んっ――<emoji=heart04>」"
translation = "「함께 가는 거다? 하나~둘…… 응――<emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「おっ<emoji=heart04><emoji=heart04>\u3000ふおおおぉぉぉ～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000中でウィンウィン動いて、おほおおおぉ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「오<emoji=heart04><emoji=heart04> 후오오오오오~~~~옷<emoji=heart04><emoji=heart04><emoji=heart04> 안에서 위잉위잉 움직여서, 오호오오오오~~옷<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺がピストンし始めると同時に、ディルドの電源が入り、うねるように動き始めた。"
translation = "내가 피스톤질을 시작함과 동시에 딜도의 전원이 켜져, 꿈틀거리듯 움직이기 시작했다."

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「おっ<emoji=heart04>\u3000おんっ<emoji=heart04>\u3000んおぉっ<emoji=heart04>\u3000ふうぅっ……おほっ<emoji=heart04>\u3000ほおぉっ<emoji=heart04>\u3000ふおぉっ<emoji=heart04>\u3000んおっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000おんっ<emoji=heart04>\u3000おほぉっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000んおおおぉ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「오<emoji=heart04> 온<emoji=heart04> 응오옷<emoji=heart04> 후우읏…… 오홋<emoji=heart04> 호오옷<emoji=heart04> 후오옷<emoji=heart04> 응옷<emoji=heart04> 오옷<emoji=heart04> 온<emoji=heart04> 오호옷<emoji=heart04> 오옷<emoji=heart04> 오옷<emoji=heart04> 응오오오~~옷<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "やはり刺激が強いのか、アルモは最初から気持ち良さそうな喘ぎ声を上げる。"
translation = "역시 자극이 강한 것인지, 알모는 처음부터 기분 좋은 듯한 신음 소리를 낸다."

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「こ、これ、すごいのだぁ～っ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000おほっ<emoji=heart04>\u3000ディルド、おち○ぽとは違う動きをして、気持ちいいのだぁ～～っ<emoji=heart04><emoji=heart04>\u3000おっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000ふおおぉ～っ<emoji=heart04>」"
translation = "「이, 이거 굉장한 것이다아~앗<emoji=heart04> 오<emoji=heart04> 오홋<emoji=heart04> 딜도, 자지랑은 다른 움직임을 해서 기분 좋은 것이다아~~앗<emoji=heart04><emoji=heart04> 오<emoji=heart04> 오<emoji=heart04> 후오오오~앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「おっ<emoji=heart04>\u3000おんっ<emoji=heart04>\u3000んおぉ～っ<emoji=heart04>\u3000おま○この中、ぐりぐりかき回されて、アルモたん気持ち良くなっちゃうのだぁ～～っ<emoji=heart04><emoji=heart04>\u3000おっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000おほぉ～っ<emoji=heart04>」"
translation = "「오<emoji=heart04> 온<emoji=heart04> 응오오~옷<emoji=heart04> 보지 안이 구릿구릿 휘저어져서, 알모땅 기분 좋아져 버리는 것이다아~~앗<emoji=heart04><emoji=heart04> 오<emoji=heart04> 오<emoji=heart04> 오호오~앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "アルモのアナルがディルドの動きに反応するように、きつく締め上げてくる。"
translation = "알모의 애널이 딜도의 움직임에 반응하듯 꽉 조여 온다."

[[dialogue]]
speaker = "unk"
original = "その熱と脈動に煽られて、俺も快感が込み上げ、抑えきれずに腰をさらに動かしてしまう。"
translation = "그 열기와 박동에 부추겨져, 나도 쾌감이 치밀어 올라 억제하지 못하고 허리를 더욱 움직이고 만다."

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「んおぉ～っ<emoji=heart04>\u3000お尻の方もおち○ぽすごいのだぁっ<emoji=heart04>\u3000気持ちいいのだぁ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000おほぉっ<emoji=heart04>\u3000ふおおぉ～っ<emoji=heart04>」"
translation = "「응오오~옷<emoji=heart04> 엉덩이 쪽도 자지 굉장한 것이다앗<emoji=heart04> 기분 좋은 것이다아<emoji=heart04> 오<emoji=heart04> 오<emoji=heart04> 오호옷<emoji=heart04> 후오오오~앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「これすごいっ<emoji=heart04>\u3000ディルドとおち○ぽが同時に動くの気持ち良すぎるのだぁ～っ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000おんっ<emoji=heart04>\u3000おほぉんっ<emoji=heart04>\u3000んおおぉんっ<emoji=heart04>」"
translation = "「이거 굉장해<emoji=heart04> 딜도랑 자지가 동시에 움직이는 거 너무 기분 좋은 것이다아~앗<emoji=heart04> 오<emoji=heart04> 온<emoji=heart04> 오호온<emoji=heart04> 응오오온<emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「おま○ことお尻の両側から挟まれるような感じがしてすごいのだ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000んおぉっ<emoji=heart04>\u3000これ、すごく気持ちよくなっちゃうのだぁ～っ<emoji=heart04>」"
translation = "「보지랑 엉덩이 양쪽에서 끼이는 느낌이 들어서 굉장한 것이다<emoji=heart04> 오<emoji=heart04> 오<emoji=heart04> 응오옷<emoji=heart04> 이거, 엄청 기분 좋아져 버리는 것이다아~앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「おっ<emoji=heart04>\u3000ふおぉっ<emoji=heart04>\u3000すごすぎて、もうイク<emoji=heart04>\u3000おま○こ、すぐにイっちゃうのだぁ～～っ<emoji=heart04><emoji=heart04>\u3000おっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000ほおぉっ<emoji=heart04>\u3000んおおぉ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「오<emoji=heart04> 후오옷<emoji=heart04> 너무 굉장해서 벌써 가<emoji=heart04> 보지, 금방 가버리는 것이다아~~앗<emoji=heart04><emoji=heart04> 오<emoji=heart04> 오<emoji=heart04> 호오옷<emoji=heart04> 응오오오~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「おっ<emoji=heart04>\u3000おんっ<emoji=heart04>\u3000んおぉっ<emoji=heart04>\u3000イクっ<emoji=heart04>\u3000イクイクイクイクっ<emoji=heart04>\u3000イクうぅぅ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「오<emoji=heart04> 온<emoji=heart04> 응오옷<emoji=heart04> 가<emoji=heart04> 가가가가앗<emoji=heart04> 가버려어어어~~옷<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「おっ――んおおおおぉぉぉ～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「오――응오오오오오~~~~옷<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「んっ<emoji=heart04>\u3000んおおぉっ<emoji=heart04>\u3000おま○こ、イっちゃったのだぁ～～っつ<emoji=heart04><emoji=heart04>」"
translation = "「응<emoji=heart04> 응오오옷<emoji=heart04> 보지, 가버린 것이다아~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「あっ！？\u3000ろ、ローションで滑って、ディルドが上手く掴めないのだ……！？」"
translation = "「앗!? 로, 로션 때문에 미끄러져서 딜도가 잘 안 잡히는 것이다……!?」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「これじゃ、抜けなっ……おぉっ！？\u3000おっ<emoji=heart04>\u3000おんっ<emoji=heart04><emoji=heart04>\u3000ふおおぉんっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「이래선 안 빠져…… 오옷!? 오<emoji=heart04> 온<emoji=heart04><emoji=heart04> 후오오온<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「おおぉっ<emoji=heart04>\u3000ダメなのだ<emoji=heart04>\u3000敏感おま○こ、ディルドでほじられてぇ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000ほぉっ<emoji=heart04>\u3000ふおぉっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000おんっ<emoji=heart04>\u3000んほおぉっ<emoji=heart04>\u3000んおおぉ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「오오옷<emoji=heart04> 안 되는 것이다<emoji=heart04> 민감한 보지, 딜도로 파헤쳐져서어<emoji=heart04> 오<emoji=heart04> 호오<emoji=heart04> 후오오<emoji=heart04> 오<emoji=heart04> 온<emoji=heart04> 응호오오<emoji=heart04> 응오오오~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「き、気持ち良すぎて、またすぐにイっちゃう<emoji=heart04>\u3000おっ<emoji=heart04>\u3000おんっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000おほぉっ<emoji=heart04>\u3000ふおおおぉ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「기, 기분이 너무 좋아서 또 금방 가버려<emoji=heart04> 오<emoji=heart04> 온<emoji=heart04> 오<emoji=heart04> 오호옷<emoji=heart04> 후오오오오~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「イクっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イクイクっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イっちゃうのだぁ～～っ<emoji=heart04><emoji=heart04>\u3000おほおおおぉ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가<emoji=heart04><emoji=heart04><emoji=heart04> 가가가앗<emoji=heart04><emoji=heart04><emoji=heart04> 가버리는 것이다아~~앗<emoji=heart04><emoji=heart04> 오호오오오오~~옷<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「――んおおおぉ～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000またイっちゃったのだぁ～～っ<emoji=heart04><emoji=heart04>\u3000おっ<emoji=heart04>\u3000おんっ<emoji=heart04>\u3000おふぅっ<emoji=heart04>\u3000い、一旦ディルド止めたいのに抜けにゃいぃ～っ<emoji=heart04>」"
translation = "「――응오오오~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 또 가버린 것이다아~~앗<emoji=heart04><emoji=heart04> 오<emoji=heart04> 온<emoji=heart04> 오후웃<emoji=heart04> 이, 일단 딜도 멈추고 싶은데 안 빠져어~앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「ディルド、愛液とローションでぬるぬる過ぎて、スイッチも滑って止められにゃいのだぁ～～っ<emoji=heart04><emoji=heart04>\u3000おっ<emoji=heart04>\u3000おんっ<emoji=heart04>\u3000おんっ<emoji=heart04>\u3000んおおぉ～っ<emoji=heart04>」"
translation = "「딜도, 애액이랑 로션 때문에 너무 미끈거려서 스위치도 미끄러져서 안 멈춰지는 것이다아~~앗<emoji=heart04><emoji=heart04> 오<emoji=heart04> 온<emoji=heart04> 온<emoji=heart04> 응오오~앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「か、会長っ<emoji=heart04>\u3000ストップっ<emoji=heart04>\u3000おち○ぽ止めて欲しいのだぁ～～っ<emoji=heart04><emoji=heart04>\u3000落ち着いて、ディルド抜きたいからぁっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000おほおぉ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「회, 회장님<emoji=heart04> 스톱<emoji=heart04> 자지 멈춰줬으면 하는 것이다아~~앗<emoji=heart04><emoji=heart04> 진정하고 딜도 빼고 싶으니까아앗<emoji=heart04> 오<emoji=heart04> 오<emoji=heart04> 오호오오~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「ち、調子に乗ってたのだっ<emoji=heart04>\u3000おま○こ、いっぱいイっちゃってるから、少し休ませて欲しいのだぁ～っ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000おんっ<emoji=heart04>\u3000ふおおぉんっ<emoji=heart04><emoji=heart04>」"
translation = "「너, 너무 들떠 있었던 것이다앗<emoji=heart04> 보지, 잔뜩 가버렸으니까 조금 쉬게 해줬으면 하는 것이다아~앗<emoji=heart04> 오<emoji=heart04> 오<emoji=heart04> 온<emoji=heart04> 후오오온<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いや――ダメだ。アルモをまだお尻でイかせてない……！」"
translation = "「아니―― 안 돼. 알모를 아직 엉덩이로 가게 하지 않았어……!」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「えっ！？\u3000か、会長、どういうことなのだ……！？\u3000おっ――<emoji=heart04><emoji=heart04>」"
translation = "「엣!? 회, 회장, 그게 무슨 소리인 것이다……!? 오――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「アルモが俺じゃなく、ディルドでイキまくってるのがなんか嫌だ」"
translation = "「알모가 내가 아니라 딜도로 계속 가버리는 게 왠지 싫어」"

[[dialogue]]
speaker = "unk"
original = "俺はこの時、ディルドに対して、妙な<b>嫉妬心</b>のようなものを燃やしてしまっていた。"
translation = "나는 이때 딜도에 대해 묘한 <b>질투심</b> 같은 것을 불태우고 있었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺の方が、ディルドより気持ちいいって言わせてやる……！」"
translation = "「내 쪽이 딜도보다 기분 좋다고 말하게 해주겠어……!」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「会長、ちょっと待っ――<emoji=heart04><emoji=heart04>」"
translation = "「회장, 잠깐만――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「んお゛っ！？\u3000ふお゛おおおおおぉぉぉ～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응오억!? 후오오오오오오오오~~~~옷<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「会長、激しっ<emoji=heart04>\u3000おち○ぽ激しいのだあぁ～～～っ<emoji=heart04><emoji=heart04>\u3000お゛っ、おっ、おっ、おんっ<emoji=heart04>\u3000ふお゛おおぉんっ<emoji=heart04>\u3000おっ、おっ、おっ、お゛っ<emoji=heart04>\u3000んお゛おおぉ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「회장, 격해<emoji=heart04> 자지 너무 격한 것이다아아~~~앗<emoji=heart04><emoji=heart04> 오억, 오, 오, 온<emoji=heart04> 후오오오온<emoji=heart04> 오, 오, 오, 오억<emoji=heart04> 응오오오오~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は腰を激しく打ち込み、アルモのアナルで、俺が知る敏感なポイントをペニスでじっくり責め立て始めた。"
translation = "나는 허리를 격하게 몰아치며, 알모의 애널에서 내가 아는 민감한 포인트를 자지로 정성껏 공략하기 시작했다."

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「お゛っ<emoji=heart04><emoji=heart04>\u3000そこダメっ<emoji=heart04>\u3000気持ちいいのだぁ～～っ<emoji=heart04><emoji=heart04>\u3000おっ、おっ、おっ、おんっ<emoji=heart04>\u3000おほ゛おぉんっ<emoji=heart04>」"
translation = "「오억<emoji=heart04><emoji=heart04> 거기 안 돼<emoji=heart04> 기분 좋은 것이다아~~앗<emoji=heart04><emoji=heart04> 오, 오, 오, 온<emoji=heart04> 오호오오온<emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「お尻っ<emoji=heart04>\u3000お尻もすごくいいのだっ<emoji=heart04>\u3000気持ちいぃ～～っ<emoji=heart04><emoji=heart04>\u3000んっ、お゛っ、おっ、おっ<emoji=heart04>\u3000お゛ほおおぉ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「엉덩이<emoji=heart04> 엉덩이도 너무 좋은 것이다앗<emoji=heart04> 기분 좋아아~~앗<emoji=heart04><emoji=heart04> 응, 오억, 오, 오<emoji=heart04> 오호오오오~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺のペニスとディルド、どっちが気持ちいいんだ！？」"
translation = "「내 자지랑 딜도, 어느 쪽이 더 기분 좋아!?」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「お゛っ、おち○ぽっ<emoji=heart04>\u3000会長のおち○ぽの方が気持ちいいのだぁ<emoji=heart04>\u3000おっ、おっ、おっ、お゛んっ<emoji=heart04>\u3000んお゛おおぉ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「오억, 자지이<emoji=heart04> 회장의 자지 쪽이 더 기분 좋은 것이다아<emoji=heart04> 오, 오, 오, 오억<emoji=heart04> 응오오오오~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「なのに、おま○こで先にイっちゃったのかっ！」"
translation = "「그런데 보지로 먼저 가버린 거냐!」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「ごっ、ごめんなさいぃっ<emoji=heart04>\u3000会長のおち○ぽと同じ形で、２本入れられてるみたいで、気持ち良くなっちゃったのだぁっ<emoji=heart04>\u3000お゛っ、おっ、おっ、んお゛おおぉんっ<emoji=heart04><emoji=heart04>」"
translation = "「죄, 죄송해요오옷<emoji=heart04> 회장의 자지랑 같은 모양으로 두 개나 들어와 있는 것 같아서 기분 좋아져 버린 것이다아앗<emoji=heart04> 오억, 오, 오, 응오오오오온<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「アルモは俺の何だったか、忘れてないよなっ？」"
translation = "「알모는 내 뭐였는지 잊지 않았겠지?」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「おっ、オナホ天使っ<emoji=heart04>\u3000アルモたんは会長専用のオナホ天使なのだぁ～～っ<emoji=heart04><emoji=heart04>\u3000お゛っ、おっ、おっ、おっ<emoji=heart04>\u3000お゛ほおおぉ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「오, 오나홀 천사<emoji=heart04> 알모땅은 회장 전용 오나홀 천사인 것이다아~~앗<emoji=heart04><emoji=heart04> 오억, 오, 오, 오<emoji=heart04> 오호오오오~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「なら、ちゃんと俺のチ○ポで気持ち良くならなきゃダメだろっ！」"
translation = "「그럼 제대로 내 자지로 기분 좋아져야 할 거 아냐!」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「なってるっ<emoji=heart04>\u3000もうなってるのだぁ～～っ<emoji=heart04><emoji=heart04>\u3000お尻気持ちいいぃっ<emoji=heart04>\u3000おま○こよりもアナルの本気ピストン、すごく気持ちいいのだぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「되고 있어<emoji=heart04> 벌써 되고 있는 것이다아~~앗<emoji=heart04><emoji=heart04> 엉덩이 기분 좋아아앗<emoji=heart04> 보지보다 애널의 본격 피스톤, 너무 기분 좋은 것이다아~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「よしっ、ちゃんと言えたご褒美に、二穴同時にイかせてやるからなっ！」"
translation = "「좋아, 제대로 말한 보답으로 두 구멍 동시에 가게 해줄 테니까!」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「えっ？\u3000あ゛っ――<emoji=heart04><emoji=heart04>」"
translation = "「엣? 아억――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はアルモがディルドを掴んでいるその上から手を重ね、おま○この方もピストンし始める。"
translation = "나는 알모가 딜도를 잡고 있는 그 위로 손을 겹쳐, 보지 쪽도 피스톤질을 시작한다."

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「お゛っ！？\u3000んお゛おおおぉ～～っ<emoji=heart04><emoji=heart04>\u3000ディルド出し入れするの、それしゅごいいぃ～～っ<emoji=heart04><emoji=heart04>\u3000お゛っ、おっ、おっ、おっ<emoji=heart04>\u3000ふお゛おおぉ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「오억!? 응오오오오오~~앗<emoji=heart04><emoji=heart04> 딜도 넣었다 뺐다 하는 거 그거 너모 좋아아아~~앗<emoji=heart04><emoji=heart04> 오억, 오, 오, 오<emoji=heart04> 후오오오오~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「お゛っ、おち○ぽっ<emoji=heart04>\u3000おち○ぽ２本でピストンされてるみたいに感じちゃうのだあぁ～～っ<emoji=heart04><emoji=heart04>\u3000お゛っ、おっ、おっ、おっ、んお゛おおぉ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「오억, 자지이<emoji=heart04> 자지 두 개로 피스톤질 당하는 것처럼 느껴져 버리는 것이다아아~~앗<emoji=heart04><emoji=heart04> 오억, 오, 오, 오, 응오오오오~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「気持ちいいっ<emoji=heart04>\u3000しゅごく気持ちいいのだぁ～～っ<emoji=heart04><emoji=heart04>\u3000おっ、おっ、おっ、おんっ<emoji=heart04>\u3000ふお゛おおぉんっ<emoji=heart04><emoji=heart04>」"
translation = "「기분 좋아<emoji=heart04> 너모 기분 좋은 것이다아~~앗<emoji=heart04><emoji=heart04> 오, 오, 오, 온<emoji=heart04> 후오오오오온<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「気持ち良すぎて、両方きちゃうっ<emoji=heart04>\u3000すごいのきちゃうのだあぁ～～っ<emoji=heart04><emoji=heart04>\u3000お゛っ、おっ、おっ、おんっ<emoji=heart04>\u3000お゛ほおおぉ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「기분이 너무 좋아서 양쪽 다 와버려<emoji=heart04> 굉장한 게 와버리는 것이다아아~~앗<emoji=heart04><emoji=heart04> 오억, 오, 오, 온<emoji=heart04> 오호오오오~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……アルモっ、そろそろ中に出すからな！」"
translation = "「윽…… 알모, 슬슬 안에 내보낼 테니까!」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「アルモたんも、イクっ<emoji=heart04>\u3000おま○ことアナル、同時にイっちゃうのだぁっ<emoji=heart04><emoji=heart04>\u3000おっおっおっお゛っ、おほおおお゛ぉっ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「알모땅도 가<emoji=heart04> 보지랑 애널 동시에 가버리는 것이다앗<emoji=heart04><emoji=heart04> 오오오오억, 오호오오오억~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「おっ<emoji=heart04>\u3000きたっ<emoji=heart04>\u3000イクイクイクイクっ<emoji=heart04>\u3000イっちゃううぅ～～～っ<emoji=heart04><emoji=heart04>\u3000お゛っおっおっおっ、んお゛おおぉ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「오<emoji=heart04> 왔다<emoji=heart04> 가가가가앗<emoji=heart04> 가버려어어어~~앗<emoji=heart04><emoji=heart04> 오오오오, 응오오오오~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「アルモ、イけっ！！！」"
translation = "「알모, 가버려!!!」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「お゛っ――――<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「오억――――<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「んお゛おおおおおぉぉぉ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>\u3000二穴同時にイ゛クうううぅぅぅ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응오오오오오오오오오오오~~~~~~~~옷<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04> 두 구멍 동시에 가아아아아아아아아~~~~~~~~옷<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスとディルドを同時に奥まで押し込むと、体の奥から湧き上がる熱い快楽の波に堪えきれず、思い切り射精した。"
translation = "자지와 딜도를 동시에 끝까지 밀어 넣자, 몸 깊은 곳에서 솟구치는 뜨거운 쾌락의 파도를 견디지 못하고 마음껏 사정했다."

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「お゛っ<emoji=heart04>\u3000ふおおおぉ～～っ<emoji=heart04><emoji=heart04>\u3000お尻の中に、会長の熱いのいっぱい出てるのだあぁ～～っ<emoji=heart04><emoji=heart04>\u3000おっ<emoji=heart04>\u3000おほおおぉっ……<emoji=heart04><emoji=heart04>」"
translation = "「오억<emoji=heart04> 후오오오오~~앗<emoji=heart04><emoji=heart04> 엉덩이 속에 회장의 뜨거운 거 잔뜩 나오고 있는 것이다아아~~앗<emoji=heart04><emoji=heart04> 오<emoji=heart04> 오호오오오옷……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「おっ<emoji=heart04>\u3000んおおおぉっ……<emoji=heart04><emoji=heart04>\u3000おま○こもお尻もイクの止まらにゃいぃ～……っ<emoji=heart04><emoji=heart04>」"
translation = "「오<emoji=heart04> 응오오오옷……<emoji=heart04><emoji=heart04> 보지도 엉덩이도 가는 게 안 멈춰어~……앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「おっ<emoji=heart04>\u3000ほおぉっ……んっ……ふうぅ……<emoji=heart04>\u3000ふおぉっ……<emoji=heart04><emoji=heart04>」"
translation = "「오<emoji=heart04> 호오옷…… 응…… 후우……<emoji=heart04> 후오옷……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "快楽の余韻がすごいのか呆けた様子のアルモ。俺もしばらく余韻に浸ってから、ゆっくりとペニスとディルドを引き抜く。"
translation = "쾌락의 여운이 엄청난지 멍해진 모습의 알모. 나도 잠시 여운에 젖어 있다가 천천히 자지와 딜도를 뽑아낸다."

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「おっ……<emoji=heart04>\u3000んっ――はぁ……はぁっ……<emoji=heart04>\u3000すごかったのだ……<emoji=heart04>\u3000同時イキし続けて、ちょっと意識が飛んじゃってたのだぁ……<emoji=heart04>\u3000んふぅ……<emoji=heart04>」"
translation = "「오……<emoji=heart04> 응―― 하아…… 하앗……<emoji=heart04> 굉장했던 것이다……<emoji=heart04> 계속 동시에 가버려서 잠깐 의식이 날아갔었던 것이다아……<emoji=heart04> 응후……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "絶頂の余韻に震えたまま、俺の胸に後頭部を寄りかからせて、呼吸を静かに整えるアルモ。"
translation = "절정의 여운에 떨면서 내 가슴에 뒷머리를 기댄 채 조용히 숨을 고르는 알모."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ごめん、なんかディルドに嫉妬しちゃって……またやり過ぎた」"
translation = "「미안, 왠지 딜도에 질투해버려서…… 또 너무 심하게 했네」"

[[dialogue]]
speaker = "unk"
original = "俺が頭を撫でながら謝罪すると、アルモは天使の笑顔で言う。"
translation = "내가 머리를 쓰다듬으며 사과하자, 알모는 천사의 미소로 말한다."

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「んっ……ふふっ<emoji=heart04>\u3000大丈夫なのだ<emoji=heart04>\u3000アルモたんは会長専用の、オナホ天使だからな<emoji=heart04>」"
translation = "「응…… 후훗<emoji=heart04> 괜찮은 것이다<emoji=heart04> 알모땅은 회장 전용 오나홀 천사니까 말이다<emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「でも、すごく激しくされたから、アルモたんの体、まだ熱いままになっちゃってるのだ……<emoji=heart04>」"
translation = "「하지만 너무 격하게 당해서 알모땅의 몸, 아직 뜨거운 채로 남아버린 것이다……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「だから会長……今度はさっきの『逆』でお願いしたいのだ<emoji=heart04>」"
translation = "「그러니까 회장…… 이번에는 아까의 『반대』로 부탁하고 싶은 것이다<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「え？\u3000逆……？」"
translation = "「에? 반대……?」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「今度はディルドをお尻の方に挿れて……おま○こにはおち○ぽを挿れて、アルモたんのことをわからせて欲しいのだ<emoji=heart04>」"
translation = "「이번에는 딜도를 엉덩이 쪽에 넣고…… 보지에는 자지를 넣어서 알모땅을 굴복시켜 줬으면 하는 것이다<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……そんなこと言うと、本気で愛してイかせまくっちゃうからな」"
translation = "「……그런 말을 하면 진심으로 사랑해서 계속 가게 만들어 버릴 거니까」"

[[dialogue]]
speaker = "unk"
original = "俺はアルモのうなじに、愛を込めたキスをする。"
translation = "나는 알모의 목덜미에 사랑을 담은 키스를 한다."

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「えへへ<emoji=heart04>\u3000アルモたんのおま○こも、いっぱい愛して欲しいのだ<emoji=heart04>」"
translation = "「에헤헤<emoji=heart04> 알모땅의 보지도 잔뜩 사랑해 줬으면 하는 것이다<emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「あっ<emoji=heart04>\u3000会長……あんっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 회장…… 안<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それから俺はディルドに負けないように、海に入るのも忘れてビーチチェアーを激しく軋ませ続けてしまうのだった。"
translation = "그 후 나는 딜도에 지지 않도록 바다에 들어가는 것도 잊은 채 비치 체어를 격하게 계속 삐걱거리게 만들었다."

