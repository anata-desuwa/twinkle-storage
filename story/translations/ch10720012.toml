[[dialogue]]
speaker = "unk"
original = "第２話,正義に燃えるお年頃,P"
translation = "제2화, 정의에 불타는 나이대, P"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ん？\u3000新星の会長さんじゃ～ん。もしかして、そっちも今帰り～？\u3000軽くなんか食べに来た的な～？」"
translation = "「응? 신성의 회장님이잖아~. 혹시 그쪽도 지금 가는 길~? 가볍게 뭐 좀 먹으러 온 느낌적인 느낌~?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ならなら一緒に行こうよ♪\u3000１人より２人の方が楽しいし♪\u3000実はついさっき友達が先に帰っちゃってさ～」"
translation = "「그럼 그럼 같이 가자♪ 혼자보다 둘이 더 즐겁기도 하고♪ 사실 아까 막 친구가 먼저 가버렸거든~」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「コラーっ！\u3000そこの２人ーっ！」"
translation = "「게섯거라─! 거기 두 사람─!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「おやおや？\u3000この声は……」"
translation = "「오호라? 이 목소리는……」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「下校中の寄り道はいけないわよっ。買い食いなんて以ての外！\u3000遅くなる前に早くお家に帰りなさーいっ！」"
translation = "「하교 중에 딴 데로 새는 건 안 된다고! 길거리 음식 같은 건 말할 것도 없고! 늦기 전에 어서 집으로 돌아가─!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「やっぱミアちじゃーん。今日も見回り頑張ってて偉いね～。よしよし、ご褒美にこれあげちゃう♪」"
translation = "「역시 미아치잖아. 오늘도 순찰 열심히 하고 대견하네~. 자자, 보상으로 이거 줄게♪」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「あっ、これ新発売のお団子……！\u3000えへへ、あんこたっぷりで美味しい～。あまぁ～い。ありがとうございます～！」"
translation = "「앗, 이거 새로 나온 경단……! 에헤헤, 팥 앙금 듬뿍 들어서 맛있다~. 달콤해~. 감사합니다~!」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「じゃなくて！\u3000買い食いはダメって言ったところでしょっ！\u3000何を食べさせてるのよ！」"
translation = "「가 아니라! 딴 길로 새는 건 안 된다고 말한 참이잖아! 뭘 먹이고 있는 거야!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「あはは、相変わらずミアちはかわい～なぁ。一緒に食べ歩き行かない？\u3000プリプリしてるより、美味しいもの食べてる顔の方がよっぽど愛らしいよ～？」"
translation = "「아하하, 여전히 미아치는 귀엽네~. 같이 먹방 찍으러 안 갈래? 씩씩거리고 있는 것보다 맛있는 거 먹는 얼굴이 훨씬 더 사랑스럽다고~?」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「よ、余計なお世話です。私は２つの学園の風紀を守るためにこうして見回りをしてるんだからっ」"
translation = "「버, 불필요한 참견입니다. 나는 두 학원의 풍기를 지키기 위해 이렇게 순찰하고 있는 거니까요」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「それより２人ともなんのつもりですか？\u3000新星学園と流星学園の星徒会メンバーともあろう人たちが寄り道なんて不良行為をしちゃって」"
translation = "「그보다 두 사람 다 무슨 생각인가요? 신성학원과 유성학원의 성도회 멤버나 되는 사람들이 딴 길로 새는 불량 행위를 하다니」"

[[dialogue]]
speaker = "unk"
original = "不良行為ってこれまたオーバーな"
translation = "불량 행위라니 그건 좀 오버 같은데"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「オーバーじゃないもんっ。寄り道はダメだって、ママに教わらなかったのっ？」"
translation = "「오버 아니거든! 딴 데로 새면 안 된다고 엄마한테 안 배웠어?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「あはは、ミアちはちょっと生真面目すぎるってば。別に校則でも寄り道が絶対ダメってわけじゃないんだし。ほどほどにしときなさいって感じっしょ？」"
translation = "「아하하, 미아치는 좀 너무 고지식하다니까. 딱히 교칙으로 딴 길로 새는 게 절대 안 된다는 것도 아니고. 적당히 좀 하라는 느낌 아냐?」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「たとえ禁止されてなくても守らなきゃいけない規律ってものがありますっ。特に２人は学園のトップなんだから。みんなの模範になってもらわないと困りますっ」"
translation = "「설령 금지되어 있지 않더라도 지켜야 할 규율이라는 게 있습니다. 특히 두 사람은 학원의 정점이니까요. 모두의 모범이 되어주지 않으면 곤란합니다」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「まま落ち着いて。肩に力が入り過ぎちゃってるよ。ほらほらお団子のおかわりでも食べて」"
translation = "「자자 진정해. 어깨에 힘이 너무 들어갔어. 자자 경단 하나 더 먹어봐」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「わっ……！\u3000さっきとまた違う味だ……！\u3000はむはむ──んんっ～！\u3000こっちも美味しい～！\u3000抹茶味のあんこだ～！」"
translation = "「왓……! 아까랑 또 다른 맛이다……! 함냐함냐── 음음~! 이쪽도 맛있어~! 말차 맛 앙금이다~!」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「じゃなくて！\u3000事あるごとに餌付けしようとしないでってばぁ～！\u3000人のこと子ども扱いしてぇ～！」"
translation = "「가 아니라! 틈만 나면 먹이 주려고 하지 말라니까아~! 사람을 어린애 취급하고~!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「あはは、ミアちはホント甘いものに目がないね～。そういうところも可愛いんだけど♪」"
translation = "「아하하, 미아치는 정말 단것에 사족을 못 쓰네~. 그런 점도 귀엽지만♪」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「人をからかうのもいい加減にしてくださいっ。私は真面目に注意してるんですからねっ？」"
translation = "「사람 놀리는 것도 적당히 하세요. 나는 진지하게 주의를 주는 거니까요?」"

[[dialogue]]
speaker = "unk"
original = "でも時には羽根を伸ばすことも大事だよ"
translation = "하지만 때로는 기분 전환도 중요해"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「そ、それはわかってるけど……！」"
translation = "「그, 그건 알고 있지만……!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「むしろミアちは羽根を伸ばさなすぎなんだよ。ふふふ、ここはひとつ、うちでミアちの羽根をバッチリ伸ばさせてあげようじゃん」"
translation = "「오히려 미아치는 기분 전환을 너무 안 하는 거야. 후후후, 이참에 우리 집에서 미아치의 기분을 확실히 풀어주자고」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「ちょっ、その手は何っ？\u3000わ、私は行きませんからねっ。不良行為に手を染めるつもりは一切ないから……！」"
translation = "「잠깐, 그 손은 뭐야? 나, 나는 안 갈 거니까요. 불량 행위에 발을 들일 생각은 추호도 없으니까……!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「そっか残念だなー。実は丁度さっきコスメの試供品もらったんだよね～。ミアちに合いそうな感じのヤツだったんだけどな～」"
translation = "「그렇구나 아쉽네~. 사실 딱 아까 화장품 샘플 받았거든~. 미아치한테 어울릴 것 같은 느낌이었는데 말이야~」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「け、化粧なんて不良行為の最たるものじゃないですかっ。学生は化粧なんてしなくていーんですっ。そういうのは大人になってからですっ」"
translation = "「화, 화장이라니 불량 행위의 끝판왕 아닌가요. 학생은 화장 같은 거 안 해도 돼요. 그런 건 어른이 되고 나서부터입니다」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「あれ？\u3000つまりミアちはまだ子どもってこと？」"
translation = "「어라? 즉 미아치는 아직 어린애라는 거?」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「～～っっ！\u3000ち、違うもんっ。私は大人だもんっ！」"
translation = "「~~윽! 아, 아니거든. 나는 어른이거든!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ならいいじゃん♪\u3000うちに化粧させてくれたら、ぐーんと大人っぽくしてあげるよ～？」"
translation = "「그럼 됐잖아♪ 우리 집에서 화장시켜 주면 훨씬 어른스럽게 만들어 줄게~?」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「ぐ、ぐーんと大人っぽく……！？」"
translation = "「허, 훨씬 어른스럽게……!?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「どうどう？\u3000興味出てきた？」"
translation = "「어때 어때? 흥미 생겼지?」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「あうっ……！\u3000で、でもでも、お化粧はやっぱり不良なイメージが強くて──」"
translation = "「아우……! 하, 하지만 하지만, 화장은 역시 불량한 이미지가 강해서──」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「問答無用～！」"
translation = "「문답무용~!」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「きゃああああああっっ～！！？」"
translation = "「꺄아아아아아악~~!!?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「はーい完成。どう？\u3000大人っぽくなったっしょ？」"
translation = "「자 완성. 어때? 어른스러워졌지?」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「っっ……！\u3000た、確かにぐんと大人っぽくなったかも……。化粧ってすごい。眉や目元を少し弄っただけなのに、こんなに変わるものなんだ……」"
translation = "「윽……! 화, 확실히 훨씬 어른스러워졌을지도……. 화장이란 거 대단해. 눈썹이나 눈매를 조금 만졌을 뿐인데 이렇게 변하다니……」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「会長さんから見てもどう？\u3000ミアち、大人っぽくなったと思わない？」"
translation = "「회장님이 보기엔 어때? 미아치, 어른스러워진 것 같지 않아?」"

[[dialogue]]
speaker = "unk"
original = "かわいいより美人って感じかも"
translation = "귀엽다기보다 미인이라는 느낌일지도"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「え、えへへ、ホント……？\u3000会長さんの目から見てもそう見える……？」"
translation = "「에, 에헤헤, 정말……? 회장님 눈에도 그렇게 보여……?」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「お化粧って、意外と悪くないかも……。思ってたより簡単にできそうな感じだったし……」"
translation = "「화장이라는 거, 의외로 나쁘지 않을지도……. 생각보다 간단히 할 수 있을 것 같았고……」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「それでこんなに大人っぽく見えるのなら割と有りなんじゃ……。風紀委員としての威厳も出るかもしれないし……。子ども扱いされなくなるかもしれないし……」"
translation = "「그래서 이렇게 어른스러워 보인다면 꽤 괜찮을지도……. 풍기위원으로서의 위엄도 생길 것 같고……. 어린애 취급도 안 당하게 될지도 모르고……」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「だったら今から本格的に見に行く？\u3000うちがミアちに似合うコスメ、見繕ってあげるよ～？」"
translation = "「그럼 지금부터 본격적으로 보러 갈래? 내가 미아치한테 어울리는 코스메 골라 줄게~」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「ホ、ホントっ？\u3000じゃあ、お願い──……」"
translation = "「정, 정말? 그럼 부탁──……」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「って！\u3000あ、危ないところだったわっ。私としたことが不良の道に自ら足を踏み入れるところだった……！」"
translation = "「앗! 위, 위험할 뻔했어. 나도 참 불량의 길에 스스로 발을 들일 뻔했다니……!」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「やっぱりダメよっ、こんなのダメ！\u3000化粧は大人になってからってママにも言われてるもんっ！\u3000そもそもこのまま買い物に行ったら寄り道になっちゃうしっ！」"
translation = "「역시 안 돼, 이런 건 안 돼! 화장은 어른이 된 다음 하라고 엄마도 말했는걸! 애초에 이대로 쇼핑하러 가면 딴 길로 새는 게 되기도 하고!」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「セーラ先輩の気持ちは有り難いけど、寄り道はダメ！\u3000２人もそろそろ帰りなさいっ。これは風紀委員命令よっ！」"
translation = "「세라 선배의 마음은 고맙지만, 딴 길로 새는 건 안 돼! 두 사람도 이제 돌아가세요. 이건 풍기위원 명령이야!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ところがどっこい二度目の問答無用～！」"
translation = "「하지만 두 번째 문답무용~!」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「きゃああああああっっ！？\u3000離してっ、離してってばっ！\u3000行かないっ、私はお化粧品なんて買いに行かないもんっ！」"
translation = "「꺄아아아아아악!? 놔줘, 놔달라니까! 안 가, 나는 화장품 같은 거 사러 안 갈 거야!」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「私を不良の道に引きずり込まないでぇ～！！」"
translation = "「나를 불량의 길로 끌어들이지 마아~~!!」"

