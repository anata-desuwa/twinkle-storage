[[dialogue]]
speaker = "unk"
original = "第２話,ショッピングフレンズ,P"
translation = "제2화, 쇼핑 프렌즈, P"

[[dialogue]]
speaker = "unk"
original = "ハロウィンの後、仲良くなった３人は街に買い物へ出かけていた。"
translation = "할로윈 후, 친해진 세 사람은 거리에 쇼핑을 나섰다."

[[dialogue]]
speaker = "ウズメイア"
original = "「ハロウィンで仲良くなったから、これを機会にもっと親交を深めるし♪」"
translation = "「할로윈으로 친해졌으니까, 이걸 기회로 더 친목을 다지는 시♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ヒトリと出かけるときは、いつもお菓子屋さんだゆ！\u3000ここには初めて来たゆ！」"
translation = "「히토리랑 외출할 때는, 항상 과자 가게였유! 여기는 처음 와봤유!」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「人がいっぱいだし、にぎやかだし、なんだか不思議と楽しい気持ちになってくる街ゆ！」"
translation = "「사람이 가득하고, 활기차고, 왠지 모르게 신기하게 즐거운 기분이 드는 거리유!」"

[[dialogue]]
speaker = "ソフィア"
original = "「土地柄的にハロウィンとも相性がいいですからね」"
translation = "「지역 특성상 할로윈과도 궁합이 좋으니까요」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「何かあるのかゆ？」"
translation = "「무슨 일이라도 있는 유?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ハロウィンの時はここも派手なお祭り騒ぎになるし、通りは歩行者天国になって仮装する人でいっぱいになるし♪」"
translation = "「할로윈 때는 여기도 화려한 축제 분위기가 되는 시, 거리는 보행자 천국이 돼서 코스프레 하는 사람들로 가득 차는 시♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ゆっゆっゆ～♪\u3000次はそれにも参加してみたいゆ！」"
translation = "「윳윳유~♪ 다음에는 그것에도 참가해보고 싶유!」"

[[dialogue]]
speaker = "ソフィア"
original = "「私はあまり騒がしいのは得意ではないのですが……」"
translation = "「저는 그다지 소란스러운 것은 잘하지 못하는데요……」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「そうなのかゆ？\u3000それじゃソフィアはお留守番ゆ？」"
translation = "「그런 유? 그럼 소피아는 집에서 기다리는 유?」"

[[dialogue]]
speaker = "ソフィア"
original = "「そうは言ってません。みんなが行くなら私も行きます」"
translation = "「그렇게 말하지 않았습니다. 모두가 간다면 저도 갈 거예요」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ソフィは寂しがりやだし♪」"
translation = "「소피는 외로움을 많이 타는 시♪」"

[[dialogue]]
speaker = "ソフィア"
original = "「仲間外れにされるのが許せないだけです」"
translation = "「따돌림당하는 것을 용납할 수 없을 뿐입니다」"

[[dialogue]]
speaker = "ソフィア"
original = "「できれば舞亜も一緒に来て、ジャクリーヌさんと仲良くなって欲しいのですが」"
translation = "「가능하다면 마이아도 같이 와서, 재클린 씨와 친해졌으면 좋겠는데요」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「舞亜は何をしてるゆ？」"
translation = "「마이아는 뭘 하고 있는 유?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「フィギュアスケートの遠征から帰ってきてないの」"
translation = "「피겨 스케이트 원정에서 돌아오지 않았어」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ハロウィンの時も一緒に遊べなかったし……あ～あ、早く帰ってこないかなぁ」"
translation = "「할로윈 때도 같이 놀지 못했고…… 아~ 빨리 돌아오지 않으려나」"

[[dialogue]]
speaker = "ソフィア"
original = "「もうすぐですよ。そしたら舞亜も加えて４人でショッピングに行きましょう」"
translation = "「곧 올 거예요. 그러면 마이아도 더해서 넷이서 쇼핑하러 갑시다」"

[[dialogue]]
speaker = "ウズメイア"
original = "「うんうん、そうするし！\u3000それじゃ２人ともお店にレッツゴー♪」"
translation = "「응응, 그렇게 하는 시! 그럼 두 사람 다 가게로 레츠 고♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ゆっ！？\u3000すごいゆ！\u3000お洋服がいっぱいだゆ！！」"
translation = "「윳!? 대단하유! 옷이 잔뜩 있유!!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「でしょ～♪\u3000このお店はあたしのお気に入りなの♪」"
translation = "「그렇지~♪ 이 가게는 내가 제일 좋아하는 곳이야♪」"

[[dialogue]]
speaker = "ウズメイア"
original = "「あっ、今日は和装フェアなんだ。ちょっと行ってみるし♪」"
translation = "「앗, 오늘은 일본 전통 의상 페어네. 잠깐 가보는 시♪」"

[[dialogue]]
speaker = "ソフィア"
original = "「待ってください。今日はジャクリーヌさんのお洋服を選ぶのが目的でしょう？\u3000あなたが買い物に夢中になってどうするんです！」"
translation = "「기다려 주세요. 오늘은 재클린 씨의 옷을 고르는 것이 목적이잖아요? 당신이 쇼핑에 정신이 팔려서 어쩌자는 거예요!」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「そうゆ！\u3000さっさと余の好きそうなお洋服の売り場に案内するゆ！」"
translation = "「그렇유! 어서 짐이 좋아할 만한 옷 매장으로 안내하는 유!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ゆゆ姫ちゃん、和装はいいよ～。一度騙されたと思って着てみて欲しいかも」"
translation = "「유유 공주짱, 일본 전통 의상은 좋다구~. 한번 속는 셈 치고 입어봤으면 좋겠을지도」"

[[dialogue]]
speaker = "ウズメイア"
original = "「そしたらきっとゆゆ姫ちゃんも和装の虜になるはずだし♪」"
translation = "「그러면 분명 유유 공주짱도 일본 전통 의상의 포로가 될 시♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「着物も嫌いじゃないゆ！\u3000でも余の好みはもっと派手なお洋服ゆ！」"
translation = "「기모노도 싫지는 않유! 하지만 짐의 취향은 더 화려한 옷이유!」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ゆっ、例えばあれ！\u3000こんな感じの、着ているだけで楽しくなっちゃうようなお洋服がいいゆ！」"
translation = "「윳, 예를 들면 저거! 이런 느낌의, 입고 있는 것만으로도 즐거워지는 듯한 옷이 좋유!」"

[[dialogue]]
speaker = "ソフィア"
original = "「うっ！\u3000可愛いには可愛いですが、ギンギンのオレンジが鮮やか過ぎて目が痛いです……」"
translation = "「윽! 귀엽기는 귀엽지만, 번쩍이는 오렌지색이 너무 선명해서 눈이 아픕니다……」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「オレンジの何が悪いゆ！\u3000オレンジ色はこの世で最も高貴な色なんだゆ！」"
translation = "「오렌지색이 뭐가 나쁘유! 오렌지색은 이 세상에서 가장 고귀한 색이유!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「えーっ！？\u3000高貴って言ったら紫色っしょ！\u3000ゆゆ姫ちゃんはカボチャ王国の姫なんだから紫いってみよ、紫」"
translation = "「에엣!? 고귀하다고 하면 보라색이잖아! 유유 공주짱은 호박 왕국의 공주니까 보라색으로 가보자, 보라색」"

[[dialogue]]
speaker = "ソフィア"
original = "「紫……ジャクリーヌさんはもっと明るいイメージのような……」"
translation = "「보라색…… 재클린 씨는 좀 더 밝은 이미지 같은데……」"

[[dialogue]]
speaker = "ソフィア"
original = "「そうですね……こういう感じのはどうでしょう？\u3000きっとジャクリーヌさんに似合うと思いますよ」"
translation = "「그렇네요…… 이런 느낌은 어떨까요? 분명 재클린 씨에게 잘 어울릴 거라고 생각해요」"

[[dialogue]]
speaker = "ウズメイア"
original = "「うーん……」"
translation = "「음~……」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ゆ～……」"
translation = "「유~……」"

[[dialogue]]
speaker = "ソフィア"
original = "「あれ？\u3000そんな微妙な反応が返ってきますか？」"
translation = "「어라? 그런 미묘한 반응이 돌아오나요?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ちょっと地味過ぎじゃない？\u3000もっと露出があった方がいいし」"
translation = "「좀 너무 수수하지 않아? 노출이 더 있는 편이 좋은 시」"

[[dialogue]]
speaker = "ソフィア"
original = "「着物がいいとか言ってた人の発言とは思えないです！」"
translation = "「기모노가 좋다고 말했던 사람의 발언이라고는 생각되지 않아요!」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「胸のあたりが窮屈そうゆ。もっとパカッと開いてる感じがいいゆ！」"
translation = "「가슴 부분이 답답할 것 같유. 좀 더 활짝 열린 느낌이 좋유!」"

[[dialogue]]
speaker = "ソフィア"
original = "「む、胸なんて主張する必要はありません！\u3000わざわざ寒い格好をするなんて愚か者のすることです！」"
translation = "「가, 가슴을 굳이 주장할 필요는 없습니다! 일부러 추운 복장을 하는 것은 어리석은 자들이나 하는 짓이에요!」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ゆ？\u3000ソフィアはどうして怒ってるゆ？」"
translation = "「유? 소피아는 왜 화를 내는 유?」"

[[dialogue]]
speaker = "ソフィア"
original = "「怒ってませんから！\u3000ほら、２人とも自分の趣味に走ってないで、ちゃんと選びなさい！！」"
translation = "「화 안 났거든요! 자, 두 사람 다 자기 취미대로만 하지 말고, 제대로 고르세요!!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「あははっ♪」"
translation = "「아하핫♪」"

[[dialogue]]
speaker = "ソフィア"
original = "「あなたも何を笑っているんですか、ウズメ」"
translation = "「당신도 뭘 웃고 있는 거예요, 우즈메」"

[[dialogue]]
speaker = "ウズメイア"
original = "「なんかソフィもゆゆ姫ちゃんとふつーに言い合いできるくらいに打ち解けたなーって思って」"
translation = "「왠지 소피도 유유 공주짱이랑 평범하게 말다툼할 수 있을 정도로 허물없이 지내게 됐구나~ 싶어서」"

[[dialogue]]
speaker = "ソフィア"
original = "「ん、それは……そうかもしれませんね……」"
translation = "「음, 그건…… 그럴지도 모르겠네요……」"

[[dialogue]]
speaker = "ウズメイア"
original = "「それだけでも今日、一緒に買い物に来た甲斐はあったし♪」"
translation = "「그것만으로도 오늘, 같이 쇼핑 온 보람은 있는 시♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「何を言ってるゆ？\u3000余は最初からソフィアと仲良しゆ」"
translation = "「무슨 말을 하는 유? 짐은 처음부터 소피아랑 사이가 좋았유」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ゆゆ姫ちゃんはそのままでオッケーだし♪\u3000ほらほら、それじゃ服選びの続きしよ！」"
translation = "「유유 공주짱은 그대로 오케이인 시♪ 자자, 그럼 옷 고르기 계속하자!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「──ってね、この間のお休みはそんな感じだったんだ～」"
translation = "「──라고 말이지, 지난번 쉬는 날은 그런 느낌이었어~」"

[[dialogue]]
speaker = "unk"
original = "ハロウィンの時よりもっと仲良くなれた？"
translation = "할로윈 때보다 더 친해진 건가?"

[[dialogue]]
speaker = "ウズメイア"
original = "「そうそう。そっからもうずっとソフィのツッコミがキレキレだったんだ～」"
translation = "「그렇고말고. 그때부터 계속 소피의 태클이 날카로웠어~」"

[[dialogue]]
speaker = "ウズメイア"
original = "「最後はソフィがお姉ちゃんみたいな感じになってたよ。ゆゆ姫ちゃんは絶対ソフィをお姉ちゃんと思ってないだろうけど」"
translation = "「마지막에는 소피가 언니 같은 느낌이 됐어. 유유 공주짱은 절대 소피를 언니라고 생각하지 않겠지만」"

[[dialogue]]
speaker = "ウズメイア"
original = "「でも、２人ともすっごい楽しそうだったし。また一緒に行こうって計画も立ててるし……」"
translation = "「하지만, 두 사람 다 엄청 즐거워 보였고. 또 같이 가자고 계획도 세우고 있는 시……」"

[[dialogue]]
speaker = "ウズメイア"
original = "「そだ、次は会長くんも一緒に来る？」"
translation = "「맞다, 다음에는 회장군도 같이 올래?」"

[[dialogue]]
speaker = "unk"
original = "俺が混じって邪魔にならないかな？"
translation = "내가 끼어들면 방해되지 않을까?"

[[dialogue]]
speaker = "ウズメイア"
original = "「全然だし♪\u3000会長くんが来るって聞いたら２人も喜ぶし♪」"
translation = "「전혀 아닌 시♪ 회장군이 온다고 들으면 두 사람도 기뻐할 시♪」"

[[dialogue]]
speaker = "unk"
original = "だったら次は俺も参加で──"
translation = "그렇다면 다음은 나도 참가해서──"

[[dialogue]]
speaker = "ウズメイア"
original = "「はい、決定♪\u3000ちなみに次はみんなで下着を買いに行くことになってるから」"
translation = "「네, 결정♪ 참고로 다음은 모두 함께 속옷을 사러 가기로 했으니까」"

[[dialogue]]
speaker = "ウズメイア"
original = "「あたしのは会長くんに選んでもらうからお願いだし♪」"
translation = "「내 건 회장군이 골라줄 거니까 부탁하는 시♪」"

[[dialogue]]
speaker = "unk"
original = "それは女の子だけで行ってきて！"
translation = "그건 여자들끼리 다녀와!"

[[dialogue]]
speaker = "unk"
original = "前言撤回！"
translation = "방금 한 말 취소!"

[[dialogue]]
speaker = "ウズメイア"
original = "「あはは、もう言質を取ったから遅いし～♪」"
translation = "「아하하, 이미 언질을 잡았으니까 늦은 시~♪」"

[[dialogue]]
speaker = "unk"
original = "と、そんなわけで次は俺も３人に付き合って買い物に出かけることになった。"
translation = "그리하여, 다음에는 나도 세 사람과 함께 쇼핑을 나가게 되었다."

[[dialogue]]
speaker = "unk"
original = "何とか下着売り場に引っ張り込まれるという事態だけは回避して──"
translation = "어떻게든 속옷 매장으로 끌려가는 사태만은 회피하고──"

[[dialogue]]
speaker = "unk"
original = "そして俺はウズメから聞いた話だけでなく、３人の打ち解けた様子を実際に目の当たりにすることが出来たのだった。"
translation = "그리고 나는 우즈메에게 들은 이야기뿐만 아니라, 세 사람이 허물없이 지내는 모습을 실제로 목격할 수 있었던 것이다."

