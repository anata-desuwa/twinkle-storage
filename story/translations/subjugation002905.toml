[[dialogue]]
speaker = "unk"
original = "ついに始まった、ヒルディオーネとマハムートの対決。"
translation = "마침내 시작된, 힐디 오네와 마하무트의 대결."

[[dialogue]]
speaker = "unk"
original = "一気に接近しての格闘戦で拳や蹴りを激しく打ち合った後、凄まじい技の応酬が繰り広げられていた――"
translation = "단숨에 접근하여 격투전으로 주먹과 발차기를 격렬하게 주고받은 후, 엄청난 기술의 응수가 펼쳐지고 있었다――"

[[dialogue]]
speaker = "マハムート"
original = "「妃竜ライジングインパクト！」"
translation = "「비룡 라이징 임팩트!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ベイパークラッシュッ！！」"
translation = "「베이퍼 크래시!!」"

[[dialogue]]
speaker = "unk"
original = "重力に逆らって下から跳ね上がるように襲い来る鉄球に、ヒルディオーネが渾身の踵落としを叩き込む。"
translation = "중력에 거스르며 아래에서 튀어 오르듯이 덮쳐오는 철구에, 힐디 오네가 혼신의 발꿈치 찍기를 내리꽂는다."

[[dialogue]]
speaker = "マハムート"
original = "「引力操作！」"
translation = "「인력 조작!」"

[[dialogue]]
speaker = "unk"
original = "マハムートが能力を発動し、ヒルディオーネにかかる引力を一気に引き上げ、地面に叩き付けようとするが――"
translation = "마하무트가 능력을 발동하여, 힐디 오네에게 걸리는 인력을 단숨에 끌어올려, 지면에 내리꽂으려 하지만――"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ミラージュブレイカーッ！！」"
translation = "「미라지 브레이커!!」"

[[dialogue]]
speaker = "unk"
original = "槍のドリルが高速回転し、引力操作の術式を粉砕する。"
translation = "창의 드릴이 고속 회전하며, 인력 조작의 술식을 분쇄한다."

[[dialogue]]
speaker = "unk"
original = "ヒルディオーネの槍を用いて発動する『対象を物理的に破壊可能なものと定義し打ち砕く』固有の能力で、無効化したのだ。"
translation = "힐디 오네가 창을 사용하여 발동하는 『대상을 물리적으로 파괴 가능한 것으로 정의하고 부숴버리는』 고유의 능력으로, 무효화한 것이다."

[[dialogue]]
speaker = "マハムート"
original = "「やはりそのドリルは、私の引力操作にとって天敵ね……」"
translation = "「역시 그 드릴은, 나의 인력 조작에 있어서 천적이네……」"

[[dialogue]]
speaker = "マハムート"
original = "「さっさと次の手札を切るとしましょう」"
translation = "「빨리 다음 패를 내도록 하자」"

[[dialogue]]
speaker = "マハムート"
original = "「――<ruby>竜化<rt>りゅうか</rt></ruby>」"
translation = "「――용화」"

[[dialogue]]
speaker = "マハムート"
original = "「……この姿になるのは、久しぶりね」"
translation = "「……이 모습이 되는 건, 오랜만이네」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「出ましたわね、竜の姿への変身……！」"
translation = "「나오셨군요, 용의 모습으로의 변신……!」"

[[dialogue]]
speaker = "マハムート"
original = "「さあ――畏怖をもって跪きなさい」"
translation = "「자아――외경심을 가지고 무릎 꿇어」"

[[dialogue]]
speaker = "unk"
original = "竜の一族の中でも才能を持つ者のみが行使できる能力――『竜化』。"
translation = "용의 일족 중에서도 재능을 가진 자만이 행사할 수 있는 능력――『용화』."

[[dialogue]]
speaker = "unk"
original = "それは体力を大きく消耗するのと引き換えに、星力を一時的に数倍にも跳ね上げる強力な変身能力である。"
translation = "그것은 체력을 크게 소모하는 것과 맞바꿔, 성력을 일시적으로 수 배로 끌어올리는 강력한 변신 능력이다."

[[dialogue]]
speaker = "マハムート"
original = "「ドラゴニッククロー！」"
translation = "「드래고닉 클로!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「くうぅっ……！」"
translation = "「크으윽……!」"

[[dialogue]]
speaker = "unk"
original = "大きな竜の体からは想像もつかないような速さで振るわれる爪撃を、なんとか槍で受け流すヒルディオーネ。"
translation = "커다란 용의 몸에서는 상상도 할 수 없는 듯한 속도로 휘둘러지는 발톱 공격을, 어떻게든 창으로 받아넘기는 힐디 오네."

[[dialogue]]
speaker = "マハムート"
original = "「よく凌いだわね。でも――」"
translation = "「잘 버텼네. 하지만――」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "（以前にも増して竜形態のパワーが凄まじくて、完全に攻撃を受け流せなかった……！\u3000体勢が崩れて、マズいですわ！）"
translation = "（이전보다 용 형태의 파워가 엄청나서, 완전히 공격을 받아넘기지 못했어……! 자세가 무너져서, 위험해요!）"

[[dialogue]]
speaker = "unk"
original = "前回の舞闘会における記憶が、ヒルディオーネの頭の中にデジャヴで蘇る。"
translation = "지난번 무투회에서의 기억이, 힐디 오네의 머릿속에 데자뷔로 되살아난다."

[[dialogue]]
speaker = "unk"
original = "マハムートが竜の口を開き、そこに凄まじい密度の炎の星力を収束させて行く。"
translation = "마하무트가 용의 입을 벌리고, 그곳에 엄청난 밀도의 불꽃의 성력을 수속시켜 간다."

[[dialogue]]
speaker = "ヒルディオーネ"
original = "（竜の<ruby>息吹<rt>ブレス</rt></ruby>が――来る！）"
translation = "（용의 숨결이―― 온다!）"

[[dialogue]]
speaker = "マハムート"
original = "「ドラゴニックメガフレア！」"
translation = "「드래고닉 메가 플레어!」"

[[dialogue]]
speaker = "unk"
original = "放たれた炎の息吹が着弾し、大爆発を引き起こす。その威力は凄まじく、アリーナ観客席との間に張られた仮想結界の境界を震撼させる程。"
translation = "발사된 불꽃의 숨결이 착탄하여, 대폭발을 일으킨다. 그 위력은 엄청나서, 아레나 관객석과의 사이에 쳐진 가상 결계의 경계를 뒤흔들 정도."

[[dialogue]]
speaker = "マハムート"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ふうぅ……間一髪でしたわ」"
translation = "「후우…… 간발의 차였습니다」"

[[dialogue]]
speaker = "unk"
original = "しかし――ヒルディオーネはそれを回避することに成功していた。"
translation = "하지만―― 힐디 오네는 그것을 회피하는 데 성공하고 있었다."

[[dialogue]]
speaker = "マハムート"
original = "「……どうやら、まだ終わりじゃないみたいね」"
translation = "「……아무래도, 아직 끝이 아닌 모양이네」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「前回と同じ轍を踏むわけには行きませんわ。これが私の、竜を打倒する為に編み出した新技――」"
translation = "「지난번과 같은 바퀴자국을 밟을 수는 없어요. 이것이 저의, 용을 타도하기 위해 고안해낸 신기술――」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「『スチームオーバーブースト』ですわ！」"
translation = "「『스팀 오버 부스트』입니다!」"

[[dialogue]]
speaker = "マハムート"
original = "「消えた？\u3000いや――」"
translation = "「사라졌나? 아니――」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「はああぁーーーっ！！」"
translation = "「하아아아ーー!!」"

[[dialogue]]
speaker = "unk"
original = "ヒルディオーネは一瞬でマハムートの背後を取り、拳を叩き込む。"
translation = "힐디 오네는 순식간에 마하무트의 등 뒤를 잡고, 주먹을 내리꽂는다."

[[dialogue]]
speaker = "マハムート"
original = "「速い……！」"
translation = "「빠르네……!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "（この技は、最初にノヴァフォームに覚醒したトワ先生の星術『ライズオーバーブースト』を見て思いつき、先生に協力して頂いて完成させたもの）"
translation = "（이 기술은, 처음에 노바 폼에 각성한 토와 선생님의 성술 『라이즈 오버 부스트』를 보고 떠올려, 선생님의 협력을 받아 완성시킨 것）"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "（私の身体能力を強化する戦闘服――スチームドレス内の水蒸気を極限まで圧縮し、一気に解放することで、ノヴァフォームに匹敵するパワーを引き出す！）"
translation = "（나의 신체 능력을 강화하는 전투복―― 스팀 드레스 내부의 수증기를 극한까지 압축하고, 단숨에 해방함으로써, 노바 폼에 필적하는 파워를 끌어낸다!）"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「スチームオーバースマッシュッ！！」"
translation = "「스팀 오버 스매시!!」"

[[dialogue]]
speaker = "マハムート"
original = "「――ドラゴニックテイル！」"
translation = "「――드래고닉 테일!」"

[[dialogue]]
speaker = "unk"
original = "咄嗟に反応してみせたマハムートは竜の尻尾を振るい、ヒルディオーネの放った拳とぶつかり合う。が――"
translation = "순식간에 반응해 보인 마하무트는 용의 꼬리를 휘둘러, 힐디 오네가 날린 주먹과 부딪힌다. 하지만――"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「蒸気出力、全開ですわぁーーーっ！！」"
translation = "「증기 출력, 전개입니다아ーー!!」"

[[dialogue]]
speaker = "マハムート"
original = "「くぅっ……！？」"
translation = "「크윽……!?」"

[[dialogue]]
speaker = "unk"
original = "吹き飛ばされたのはなんと、マハムートの方だった。"
translation = "날아간 것은 다름 아닌, 마하무트 쪽이었다."

[[dialogue]]
speaker = "マハムート"
original = "「なるほど……竜になった私の力を上回るなんて、大したパワーだわ」"
translation = "「과연…… 용이 된 나의 힘을 능가하다니, 대단한 파워네」"

[[dialogue]]
speaker = "マハムート"
original = "「前回だったら、もしかすると私が負けていたかもしれないわね」"
translation = "「지난번이었다면, 어쩌면 내가 졌을지도 모르겠네」"

[[dialogue]]
speaker = "マハムート"
original = "「でも――その技だけじゃ、<b>今の</b>私は倒せない」"
translation = "「하지만―― 그 기술만으로는, <b>지금</b>의 나는 쓰러뜨릴 수 없어」"

[[dialogue]]
speaker = "マハムート"
original = "「チェンジ――ノヴァフォーム」"
translation = "「체인지―― 노바 폼」"

[[dialogue]]
speaker = "unk"
original = "現れたのは、元の小さな体へと戻ったマハムート。しかし――"
translation = "나타난 것은, 원래의 작은 몸으로 돌아온 마하무트. 하지만――"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「来ましたわね、ノヴァフォーム……！」"
translation = "「오셨군요, 노바 폼……!」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「――頭が高いわよ」"
translation = "「――고개가 높네」"

[[dialogue]]
speaker = "unk"
original = "彼女から発せられる<ruby>威圧感<rt>プレッシャー</rt></ruby>は、先程の大きな竜形態よりも遥かに上。"
translation = "그녀에게서 발산되는 위압감은, 방금 전의 커다란 용 형태보다 훨씬 위다."

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「くっ！？\u3000ミラージュブレイカー！」"
translation = "「크윽!? 미라지 브레이커!」"

[[dialogue]]
speaker = "unk"
original = "マハムートの言葉と同時に発動した『引力操作』で、ヒルディオーネの体が引っ張られる。それをドリルで無効化しようとするが――"
translation = "마하무트의 말과 동시에 발동한 『인력 조작』으로, 힐디 오네의 몸이 끌어당겨진다. 그것을 드릴로 무효화하려 하지만――"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「っ……解除できない！？」"
translation = "「윽…… 해제할 수 없어!?」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「残念ね。打ち破るには純粋に、ドリルのパワー不足よ」"
translation = "「유감이지만. 깨부수기에는 순수하게, 드릴의 파워 부족이야」"

[[dialogue]]
speaker = "unk"
original = "通常フォームの時とは比べ物にならない引力の強さで、マハムートの方に引き寄せられるヒルディオーネ。"
translation = "통상 폼일 때와는 비교도 안 될 정도의 인력의 강도로, 마하무트 쪽으로 끌어당겨지는 힐디 오네."

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「っ……だったら！\u3000――ドリルオーバーブレイカーッ！！」"
translation = "「윽…… 그렇다면! ――드릴 오버 브레이커!!」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「――メテオクロー！」"
translation = "「――메테오 클로!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「くうぅっ！？」"
translation = "「크으윽!?」"

[[dialogue]]
speaker = "unk"
original = "今度はヒルディオーネの方が力で競り負け、吹き飛ばされてしまう。"
translation = "이번에는 힐디 오네 쪽이 힘 싸움에서 밀려, 날아가 버린다."

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「かはっ……！」"
translation = "「카핫……!」"

[[dialogue]]
speaker = "unk"
original = "背中から地面に強く叩き付けられ、肺の中の空気が強制的に吐き出される。"
translation = "등부터 지면에 강하게 내리꽂히고, 폐 속의 공기가 강제적으로 토해진다."

[[dialogue]]
speaker = "ヒルディオーネ"
original = "（スチームオーバーブーストの持続時間は約３分……その効果はまだ続いているはずなのに……！）"
translation = "（스팀 오버 부스트의 지속 시간은 약 3분…… 그 효과는 아직 계속되고 있을 텐데……!）"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「――前にバトルフェスタで戦った私のシャドウとは、比べ物にならない程に強くなっている……そんな風に思ったりした？」"
translation = "「――예전에 배틀 페스타에서 싸웠던 나의 섀도와는, 비교도 안 될 정도로 강해졌다고…… 그렇게 생각했니?」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「だとしたら、畏怖が足りてないわよ、ヒルディオーネ」"
translation = "「그렇다면, 외경심이 부족한 거야, 힐디 오네」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「言っていたでしょう？\u3000同じノヴァフォームであっても――この私が、あの時と同じ強さのままでいるわけがないじゃない」"
translation = "「말했잖아? 같은 노바 폼이라고 해도―― 이 내가, 그때와 같은 강함으로 있을 리가 없잖아」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「っ……！」"
translation = "「윽……!」"

[[dialogue]]
speaker = "unk"
original = "ヒルディオーネは仰向けに倒れたまま、圧倒的な星力を纏い飛翔する<ruby>小さき竜<rt>マハムート</rt></ruby>の姿を見上げるのだった――"
translation = "힐디 오네는 하늘을 향해 쓰러진 채, 압도적인 성력을 두르고 비상하는 <ruby>작은 용<rt>마하무트</rt></ruby>의 모습을 올려다보는 것이었다――"

