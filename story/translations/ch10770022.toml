[[dialogue]]
speaker = "unk"
original = "第２話,恋もお仕事も,P"
translation = "제2화, 사랑도 일도, P"

[[dialogue]]
speaker = "unk"
original = "渋谷の街を歩いていると、あちこちからクリスマスの曲が流れてくる。そんな中を、俺と蘭美はいつものように２人で寄り添い合いながら歩いていた。"
translation = "시부야 거리를 걷고 있자, 여기저기서 크리스마스 음악이 흘러나온다. 그런 가운데를, 나와 라비는 평소처럼 둘이서 서로 기대며 걷고 있었다."

[[dialogue]]
speaker = "unk"
original = "クリスマスも間近に迫ってきて、街中のイルミネーションも華やいでいる。それを片っ端から見て回ろうじゃないか、というデートプランだった。"
translation = "크리스마스가 코앞으로 다가와, 거리의 일루미네이션도 화려해지고 있다. 그것을 모조리 구경하자는 데이트 계획이었다."

[[dialogue]]
speaker = "unk"
original = "当然、１日では時間が全然足りない。そのため、クリスマスに向けて俺たちは毎日のようにあちこち出かけているのだ。"
translation = "당연히, 하루로는 시간이 전혀 부족하다. 그래서, 크리스마스를 향해 우리는 매일같이 여기저기 나가고 있는 것이다."

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ふふっ、渋谷のイルミネーションも綺麗だったわね。青いライトが『冬』を感じさせてロマンチックだったわ」"
translation = "「후훗, 시부야의 일루미네이션도 예뻤네. 푸른 라이트가 『겨울』을 느끼게 해서 로맨틱했어」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「いろいろ見て回ったけど、今のところ貴方的にはどこが一番だったかしら？」"
translation = "「여러 가지 둘러봤는데, 지금까지 너에게는 어디가 가장 좋았어?」"

[[dialogue]]
speaker = "unk"
original = "正直甲乙つけがたい"
translation = "솔직히 우열을 가리기 어렵다"

[[dialogue]]
speaker = "unk"
original = "どれも綺麗だったからな……"
translation = "모두 예뻤으니까……"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ふふっ、そうね。どれも素晴らしいものだったわ！」"
translation = "「후훗, 그렇지. 모두 훌륭했어!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「今まではあまり気にしていなかったけど、人間界にはこんなにいろんなイルミネーションがあったのね」"
translation = "「지금까지는 별로 신경 쓰지 않았지만, 인간계에는 이렇게 여러 가지 일루미네이션이 있었네」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「しかも、まだまだ見ていないところが沢山残っていると言うんだから……クリスマスまでいっぱい楽しめそうね。明日はどこに行きましょうか？」"
translation = "「게다가, 아직 보지 못한 곳이 잔뜩 남아 있다고 하니……크리스마스까지 잔뜩 즐길 수 있을 것 같네. 내일은 어디로 갈까?」"

[[dialogue]]
speaker = "unk"
original = "嬉しいけど、大丈夫なの？"
translation = "기쁘지만, 괜찮아?"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「あら、もしかして私のお仕事のことを気にしてくれたのかしら？」"
translation = "「어머, 혹시 내 일을 신경 써 준 거야?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「大丈夫よ。学園とお屋敷の仕事は、デート前に最速で終わらせてきたから」"
translation = "「괜찮아. 학원과 저택의 일은, 데이트 전에 가장 빠르게 끝내고 왔으니까」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「それに貴方と過ごす時間は、私にとってとても重要なの」"
translation = "「게다가 너와 보내는 시간은, 나에게 있어서 매우 중요한 거야」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「貴方との時間を疎かにして、恋人関係を解消された……なんて事になったら、悔やんでも悔やみきれないわ」"
translation = "「너와의 시간을 소홀히 해서, 연인 관계를 해소당했다……라는 일이 된다면, 후회해도 후회할 수 없을 거야」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「だから私の仕事のことは気にしなくても大丈夫よ」"
translation = "「그러니까 내 일은 신경 쓰지 않아도 괜찮아」"

[[dialogue]]
speaker = "unk"
original = "メイドのお仕事はどうするの？"
translation = "메이드 일은 어떻게 할 거야?"

[[dialogue]]
speaker = "unk"
original = "もし俺と結婚したら"
translation = "만약 나와 결혼한다면"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ん……それは、あまりちゃんとは考えていなかったわね」"
translation = "「음……그건, 별로 제대로 생각해 보지 않았네」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「もちろん私にとって、メイドの仕事は大切なものよ」"
translation = "「물론 나에게 있어서, 메이드 일은 소중한 거야」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「憧れである師匠を超えて世界１位のメイドになる、という夢もまだ叶えてないしね……簡単に捨て去れるものではないわ」"
translation = "「동경하는 스승을 넘어 세계 1위의 메이드가 된다는 꿈도 아직 이루지 못했고……쉽게 버릴 수 있는 것은 아니지」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「けれど、妻として貴方に尽くしたいという気持ちも、それと同じくらい大きいの」"
translation = "「하지만, 아내로서 너에게 헌신하고 싶다는 마음도, 그만큼 커」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「これは難しい問題ね……私１人で簡単に答えを出せそうにないわ。ねえ、貴方はどうして欲しいかしら？」"
translation = "「이건 어려운 문제네……나 혼자서 쉽게 답을 낼 수 없을 것 같아. 있잖아, 너는 어떻게 해줬으면 좋겠어?」"

[[dialogue]]
speaker = "unk"
original = "蘭美の望むようにして欲しい"
translation = "라비가 원하는 대로 해줬으면 좋겠다"

[[dialogue]]
speaker = "unk"
original = "俺は……"
translation = "나는……"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「私の好きなようにしていいの？\u3000ふふ……優しいのね」"
translation = "「내가 좋아하는 대로 해도 된다고? 후후……상냥하네」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「そうね。だったら……こういうのはどうかしら？\u3000結婚してもメイドは続ける──」"
translation = "「그렇네. 그렇다면……이런 건 어때? 결혼해도 메이드는 계속한다──」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「けれど、九浄のお屋敷からはお<ruby>暇<rt>いとま</rt></ruby>を頂くことにするわ」"
translation = "「하지만, 쿠죠 저택에서는 휴가를 받기로 할게」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「そうして貴方だけに仕える、貴方だけのメイドになってあげる。これなら家庭とメイドを両立できるでしょう？」"
translation = "「그렇게 해서 너만을 섬기는, 너만의 메이드가 되어 줄게. 이러면 가정과 메이드를 양립할 수 있겠지?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「貴方に誠心誠意仕えることで、私はメイドとしての腕を磨き──そして世界１位のメイドになる。それが最高の選択じゃないかしら？」"
translation = "「너에게 성심성의껏 봉사함으로써, 나는 메이드로서의 실력을 갈고닦고──그리고 세계 1위의 메이드가 된다. 그것이 최고의 선택이 아닐까?」"

[[dialogue]]
speaker = "unk"
original = "蘭美が、俺だけのメイド……"
translation = "라비가, 나만의 메이드……"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ふふふ……鼻の下が伸びてるわね。もしかして貴方だけのメイドになった私を想像して、エッチなことでも考えたのかしら？」"
translation = "「후후후……콧대가 높아지고 있네. 혹시 너만의 메이드가 된 나를 상상하고, 야한 거라도 생각한 거야?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「そんなことない、って……どうかしら？\u3000その慌てっぷりは怪しいものね」"
translation = "「그럴 리 없다, 고……어떨까? 그 당황하는 모습은 수상한데」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「でもまあ……貴方は私の主であり夫になるわけだから、多少はそういった求めにも、応じなければならないかしら？」"
translation = "「하지만 뭐……너는 나의 주인이자 남편이 될 테니까, 어느 정도는 그런 요구에도, 응해야 할까?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「どんな命令をされてしまうのか……今から恐ろしくて仕方がないわ。ふふっ♪」"
translation = "「어떤 명령을 받게 될지……지금부터 무서워서 견딜 수가 없어. 후훗♪」"

[[dialogue]]
speaker = "unk"
original = "震えるようなリアクションを取りながらも、蘭美の声は明るく弾んでいた。"
translation = "떨리는 듯한 리액션을 취하면서도, 라비의 목소리는 밝고 경쾌했다."

[[dialogue]]
speaker = "unk"
original = "そして、未来に想いを馳せる蘭美の顔は、期待にキラキラと輝いているように見えたのだった。"
translation = "그리고, 미래를 생각하는 라비의 얼굴은, 기대감에 반짝반짝 빛나고 있는 것처럼 보였다."

