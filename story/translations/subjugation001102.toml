[[dialogue]]
speaker = "unk"
original = "アステライト消滅後、俺たちは学園に帰還し、改めてメイプルが何者なのか、話を聞くことになった。"
translation = "아스텔라이트 소멸 후, 우리들은 학원으로 귀환하여 다시금 메이플이 누구인지 이야기를 듣게 되었다."

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「じゃあ、改めて紹介するね。この子は魔界からやってきた、メイプルちゃん。年齢は、アナちゃんと同い年で――」"
translation = "「자, 다시 한번 소개할게. 이 아이는 마계에서 온 메이플짱. 나이는 아나짱이랑 동갑이고──」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「一週間前に、道で行き倒れてたところを、私が拾ったんだ」"
translation = "「일주일 전에 길에서 쓰러져 있던 걸 내가 주워왔어.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「行き倒れてた！？」"
translation = "「쓰러져 있었다고!?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「お腹が減り過ぎて、動けなくなっちゃったんだよね。そこをトワちゃんに助けてもらって、今はトワちゃんの家に居候させてもらってるんだ」"
translation = "「배가 너무 고파서 움직일 수 없게 됐었거든. 그걸 토와짱이 구해줘서 지금은 토와짱네 집에서 얹혀살고 있어.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ということは、学園に所属する生徒ではないのね」"
translation = "「그렇다는 건 학원에 소속된 학생은 아니라는 거네.」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「うん。でも、あたしは魔王になる為に人間界へ来たから、できれば星騎士になりたいって思ってるんだ！」"
translation = "「응. 하지만 나는 마왕이 되기 위해 인간계에 왔으니까, 가능하다면 성기사가 되고 싶다고 생각하고 있어!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そういえば確か、クルセイダースの子孫だって仰っていましたね」"
translation = "「그러고 보니 분명 크루세이더스의 후예라고 말씀하셨죠.」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「そう、あたしのご先祖様は、３０００年前に魔王と一緒にリクリエと戦った、伝説のクルセイダースの一員だったんだよ！」"
translation = "「맞아, 내 조상님은 3000년 전에 마왕과 함께 리크리에와 싸웠던 전설의 크루세이더스 일원이었어!」"

[[dialogue]]
speaker = "unk"
original = "魔王のことを知ってるのか？"
translation = "마왕에 대해 알고 있는 거야?"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「あたしの実家、モノクラウン家は代々、魔王の血を引く者の片腕として仕えてきたからね」"
translation = "「내 본가인 모노크라운 가문은 대대로 마왕의 피를 이어받은 자의 오른팔로서 섬겨왔으니까.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「魔王の血を引く者……？」"
translation = "「마왕의 피를 이어받은 자……?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「あたしの生まれ故郷は、魔界の<ruby>頽廃<rt>たいはい</rt></ruby>都市『キュリオス』。そこを統べる皇妃『<ruby>煌嶺<rt>こうれい</rt></ruby>』が、魔王の子孫だよ。公にはされてないけどね」"
translation = "「내 고향은 마계의 퇴폐 도시 『큐리오스』. 그곳을 다스리는 황비 『코우레이』가 마왕의 후손이야. 공식적으로 밝혀지진 않았지만 말이야.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それって、フィーニスの塔で聞いた名前だわ！」"
translation = "「그건 피니스의 탑에서 들었던 이름이야!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「まあ、最も、血を引いているだけで、実際は自己中で酷い奴だよ」"
translation = "「뭐, 하지만 피만 이어받았을 뿐이지 실제로는 자기중심적이고 지독한 녀석이야.」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「自分の領地さえ守れればそれでよくて、リクリエの最前線である人間界に来ようとか、微塵も思っていないんだよ、煌嶺は」"
translation = "「자기 영지만 지킬 수 있으면 그걸로 족해서, 리크리에의 최전선인 인간계에 오겠다거나 하는 생각은 눈곱만큼도 안 하고 있다고, 코우레이는.」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「私はあんな奴が魔王だなんて認めないし、パパやママのように仕えたいとは思えない」"
translation = "「나는 그런 녀석이 마왕이라고 인정하지 않고, 아빠나 엄마처럼 섬기고 싶지도 않아.」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「だから、家出してきたんだ。あたしが本当の魔王になる為に」"
translation = "「그래서 가출해온 거야. 내가 진짜 마왕이 되기 위해서.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ふむ……メイプルさん、１つ気になるのですが、いいでしょうか？」"
translation = "「흠…… 메이플 씨, 한 가지 궁금한 게 있는데 괜찮을까요?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「魔界から人間界へ来たのは『大交流』で、ということですよね？」"
translation = "「마계에서 인간계로 온 것은 『대교류』 때라는 거죠?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「うん、そうだよ」"
translation = "「응, 맞아.」"

[[dialogue]]
speaker = "unk"
original = "――大交流。それは、四半期に１度、三界を繋げて行き来できるようにする行事のことである。"
translation = "──대교류. 그것은 분기에 한 번, 삼계를 연결해 오갈 수 있게 하는 행사를 말한다."

[[dialogue]]
speaker = "unk"
original = "そして、魔界と人間界を行き来する為には『<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>』という場所を、船に乗って通る必要がある。"
translation = "그리고 마계와 인간계를 오가기 위해서는 『<ruby>경계의 호수<rt>라르고 시엘로</rt></ruby>』라는 장소를 배를 타고 지나갈 필요가 있다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ですが、<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>は誰でも自由に通れるわけではありません。１度に移動できる人数も限られています」"
translation = "「하지만 <ruby>경계의 호수<rt>라르고 시엘로</rt></ruby>는 누구나 자유롭게 통과할 수 있는 게 아닙니다. 한 번에 이동할 수 있는 인원도 제한되어 있고요.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「移動できるヒトや物は事前に決められているんだものね。色々と許可が必要だし……」"
translation = "「이동할 수 있는 사람이나 물건은 사전에 정해져 있는걸. 여러 가지 허가도 필요하고……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はい。なので、メイプルさんがどうやって人間界に来たのかが気になりまして」"
translation = "「네. 그래서 메이플 씨가 어떻게 인간계에 왔는지가 궁금해서요.」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「えっと……それについては、あんまり大きな声じゃ言えないんだけど……」"
translation = "「저기…… 그것에 대해서는 별로 큰 소리로 말할 순 없는데……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「どうやらメイプルちゃん、船の積み荷に紛れて、密航して来たらしくて……」"
translation = "「아무래도 메이플짱, 배의 화물에 섞여서 밀항해 온 모양이라……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「えぇっ！？\u3000それってかなりマズいんじゃ……！？」"
translation = "「에엣!? 그거 꽤 심각한 거 아냐……!?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ふっ……魔王になる為には、時に綺麗事じゃ済まないこともやらなくちゃいけないんだよ」"
translation = "「훗…… 마왕이 되기 위해서는 때로 깨끗한 일로만 끝낼 수 없는 일도 해야 하는 법이지.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「なるほど、聞かなかったことにします」"
translation = "「과연, 못 들은 걸로 하겠습니다.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「メイプル、あなた、大胆なことするわね！」"
translation = "「메이플, 너 대담한 짓을 하는구나!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「とりあえず、そのことについては学園の上層部に相談中なので、星徒会の皆さん、オフレコでお願いします……」"
translation = "「우선 그 건에 대해서는 학원 상층부와 상담 중이니까 성도회 여러분은 오프 더 레코드로 부탁드려요……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「でも、Ｓランクモンスターを倒せる程の星術が使えるなら、クロトの会長権限で、新星学園の生徒として迎えればいいんじゃないかしら？」"
translation = "「하지만 S랭크 몬스터를 쓰러뜨릴 정도의 성술을 쓸 수 있다면 쿠로토의 회장 권한으로 신성학원 학생으로 받아들이면 되지 않을까?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「リクリエと戦う為に必要な人材だからってことにすれば、密航のことも許してもらえそうじゃない？」"
translation = "「리크리에와 싸우기 위해 필요한 인재라는 점을 내세우면 밀항 건도 용서받을 수 있을 것 같은데?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「にへへ♪\u3000学園の生徒にしてもらえたら、あたしは喜んでリクリエと戦うよ！」"
translation = "「니헤헤♪ 학원 학생으로 만들어 준다면 나는 기꺼이 리크리에와 싸울게!」"

[[dialogue]]
speaker = "unk"
original = "う～ん、それについては、要相談かな"
translation = "으음, 그것에 대해서는 좀 상담해 봐야겠는데."

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「え～！？\u3000お兄ちゃん、なんで～！？」"
translation = "「에~!? 오빠, 왜~!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロトが言うなら、仕方ないわね。メイプル、クロトに認めてもらえるように頑張りなさい！」"
translation = "「쿠로토가 저렇게 말한다면 어쩔 수 없네. 메이플, 쿠로토에게 인정받을 수 있도록 노력해!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ぐぬぬ……！\u3000やはりモンスターを倒して実績を上げるしか……」"
translation = "「구누누……! 역시 몬스터를 쓰러뜨려서 실적을 쌓을 수밖에……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「メイプルちゃん、それはダメだってば！\u3000言ったでしょ、学園に登録されていない星術使いがモンスターと戦うのは、危ないから認められてないんだって！」"
translation = "「메이플짱, 그건 안 된다니까! 말했잖아, 학원에 등록되지 않은 성술사가 몬스터와 싸우는 건 위험하니까 인정되지 않는다고!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「む～っ……」"
translation = "「무~……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「とりあえず、みんなでカフェテリアにお茶しにいかない？\u3000メイプルちゃんと仲よくなりたいし♪」"
translation = "「일단 다 같이 카페테리아에 차 마시러 가지 않을래? 메이플짱이랑 친해지고 싶기도 하고♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「いいわね！\u3000メイプルにはまだまだ聞きたいこともあるし！」"
translation = "「좋아! 메이플에게는 아직 듣고 싶은 것도 많으니까!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「確かにひと息つきたいかも。帰ってきてそのまま話し始めちゃってたしね」"
translation = "「확실히 한숨 돌리고 싶긴 하네. 돌아오자마자 바로 얘기하기 시작했으니까.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ちょうど和菓子を食べたい気分になってたところです」"
translation = "「마침 화과자를 먹고 싶은 기분이 들던 참이었어요.」"

[[dialogue]]
speaker = "unk"
original = "そうして俺たちは一旦、場所を移すことになった。"
translation = "그렇게 우리들은 일단 장소를 옮기기로 했다."

[[dialogue]]
speaker = "unk"
original = "お茶をしながら、ヴィーナスが尋ねる。"
translation = "차를 마시며 비너스가 묻는다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「――ねぇ、気になってたことといえば、メイプル。あなたの口調、アステラで出会った時となんか違くない？」"
translation = "「──저기, 궁금했던 건데 메이플. 네 말투, 아스테라에서 만났을 때랑 좀 다르지 않아?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ん？\u3000ああ、今は『オフモード』だからね」"
translation = "「응? 아아, 지금은 『오프 모드』니까.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「オフモード？」"
translation = "「오프 모드?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「あの時は眼帯を付けてたでしょ。それにより、自分の中に眠る魔王の人格が目覚め、強大な力を行使できるようになるんだよ」"
translation = "「그때는 안대를 쓰고 있었잖아. 그것에 의해 자신 안에 잠든 마왕의 인격이 깨어나 강대한 힘을 행사할 수 있게 되는 거야.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そうなの！？\u3000まさか二重人格というやつ！？」"
translation = "「정말!? 설마 이중인격이라는 그거!?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ふっふっふ……まあ、そんな感じかな♪」"
translation = "「훗훗훗…… 뭐, 그런 느낌이려나♪」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「こらこら！\u3000嘘言わないの！\u3000あれは単純にカッコつけて、魔王っぽい口調で喋ってただけでしょ！」"
translation = "「이녀석! 거짓말하면 안 돼! 저건 단순히 폼 잡으면서 마왕 같은 말투로 얘기한 것뿐이잖아!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ああ、なるほど。つまりそういう……」"
translation = "「아아, 그렇군요. 그러니까 그런……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あらあらうふふ♪\u3000メイプルちゃんは、そういうのが好きなのね～」"
translation = "「어머어머 우후후♪ 메이플짱은 그런 걸 좋아하는구나~」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「？\u3000どういうこと？」"
translation = "「? 무슨 소리야?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ヘレナさんが時々、不思議なことを口にするのと同じ感じかと」"
translation = "「헬레나 씨가 가끔 신기한 말을 내뱉는 것과 비슷한 느낌이라고 생각해요」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「なるほど！\u3000理解したわ。いわゆる思春期にかかる<ruby>病<rt>やまい</rt></ruby>的なやつってことね！」"
translation = "「그렇구나! 이해했어. 이른바 사춘기에 걸리는 병 같은 거네!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「思春期の病……？\u3000ふふふ、よくわからないけど、魔王を目指す者として威厳は必要でしょ？」"
translation = "「사춘기의 병……? 후후후, 잘은 모르겠지만 마왕을 지망하는 자로서 위엄은 필요하잖아?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ならば、自身の理想の姿を追い求め、それを実践するのは必然……！\u3000あたしは我が魂の導きに従ったまでのこと！」"
translation = "「그렇다면 자신의 이상적인 모습을 쫓으며 그것을 실천하는 것은 필연……! 나는 내 영혼의 인도에 따랐을 뿐이야!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「私としては、会長をなんで『お兄ちゃん』って呼ぶのかも気になるんだけど……」"
translation = "「나로서는 회장을 왜 『오빠』라고 부르는지도 궁금한데……」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「それもまた運命だからだよ！」"
translation = "「그것 또한 운명이기 때문이지!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「実際に会って話して、ビビッと来たんだよね。魔王と噂される存在で、あたしと対になるライバル。そして、年上の男子！」"
translation = "「실제로 만나서 이야기하고 찌릿하고 왔거든. 마왕이라 소문난 존재이자 나와 짝을 이루는 라이벌. 그리고 연상의 남자!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「それはつまり……お兄ちゃんと呼んでも過言ではないと！」"
translation = "「그건 즉…… 오빠라고 불러도 과언이 아니라는 뜻이지!」"

[[dialogue]]
speaker = "unk"
original = "いや、よくわからないんだけど！？"
translation = "아니, 전혀 모르겠는데!?"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「わかるわ～。私もメイプルちゃん見てると、可愛くて自分の妹に欲しくなるもの～♪」"
translation = "「알 것 같아~. 나도 메이플짱을 보고 있으면 귀여워서 내 여동생으로 삼고 싶어지는걸~♪」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「いや、サーシャちゃんには<ruby>本物の妹<rt>ソフィアちゃん</rt></ruby>がいるよね？」"
translation = "「아니, 사샤짱에겐 <ruby>진짜 여동생<rt>소피아짱</rt></ruby>이 있잖아?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ただ！\u3000お兄ちゃんとは呼んでも、魔王としては認めたわけじゃないから、そこは勘違いしないでよね！」"
translation = "「다만! 오빠라고는 불러도 마왕으로서 인정한 건 아니니까 그 점은 착각하지 말라구!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「今回のリクリエを打倒し、新しい魔王となるのは、このあたしなんだから！」"
translation = "「이번 리크리에를 타도하고 새로운 마왕이 되는 건 바로 이 나니까!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「それにあたしは――魔王の秘伝である『アルケインコード』を知っている！」"
translation = "「게다가 나는── 마왕의 비전인 『알케인 코드』를 알고 있어!」"

[[dialogue]]
speaker = "unk"
original = "アルケインコード……？"
translation = "알케인 코드……?"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「なんか、メイプルちゃん曰く、魔王だけが使うことのできる技らしいんだけど、詳しいことは教えてくれないんだよね」"
translation = "「뭐랄까, 메이플짱 말로는 마왕만이 사용할 수 있는 기술이라는데 자세한 건 가르쳐주지 않더라구요」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「秘伝だからね！\u3000それを私が自分で使えるようになった時、名実共に次代の魔王として君臨するというわけだよ！\u3000ふふん♪」"
translation = "「비전이니까! 그걸 내가 스스로 사용할 수 있게 되었을 때, 명실상부한 차세대 마왕으로서 군림하게 된다는 말씀이지! 후훈♪」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「とにかく、今日からあたしたちは、どっちが真の魔王になるか競うライバルってこと！」"
translation = "「어쨌든 오늘부터 우리들은 누가 진정한 마왕이 될지 경쟁하는 라이벌이라는 거!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「だから、ちゃんと覚えておいてよね、お兄ちゃん！」"
translation = "「그러니까 잘 기억해 둬, 오빠!」"

[[dialogue]]
speaker = "unk"
original = "そう言って、メイプルは不敵に笑ってみせるのだった。"
translation = "그렇게 말하며 메이플은 대담하게 미소 지어 보였다."

