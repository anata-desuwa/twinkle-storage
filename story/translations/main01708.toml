[[dialogue]]
speaker = "unk"
original = "第９話,ルーザー,B"
translation = "제9화, 루저, B"

[[dialogue]]
speaker = "？？？"
original = "「もう……困ったわねぇ」"
translation = "「정말…… 곤란하네」"

[[dialogue]]
speaker = "unk"
original = "けど──声がした。"
translation = "하지만── 목소리가 들렸다."

[[dialogue]]
speaker = "？？？"
original = "「魔王として目覚めたあなたは、もう原点を忘れてしまったの？\u3000クロト──あなたは、それくらいで終わる人間だったかしら」"
translation = "「마왕으로서 눈을 뜬 당신은, 벌써 원점을 잊어버린 건가요? 쿠로토── 당신은, 그 정도로 끝날 인간이었던가요」"

[[dialogue]]
speaker = "？？？"
original = "「私が人の子に与えた『星の力』は決して霊力の代替品ではないわ。星騎士──あなた達にしかできないことがあるはずよ」"
translation = "「내가 인간의 아이에게 준 『별의 힘』은 결코 영력의 대체품이 아니에요. 성기사── 당신들에게만 할 수 있는 일이 있을 거예요」"

[[dialogue]]
speaker = "？？？"
original = "「立ち上がりなさい──クロト。そして……不甲斐ない英雄には、あなたがお尻を叩いてあげなさい。ヴィーナス！」"
translation = "「일어나세요── 쿠로토. 그리고…… 못난 영웅에게는, 당신이 엉덩이를 때려주세요. 비너스!」"

[[dialogue]]
speaker = "魔神ギエル"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker = "魔神ギエル"
original = "「防イダ……？\u3000我ガマクロ・ノヴァヲ……？\u3000バカナ……ドコニソンナ力ガ残サレテイルトイウ」"
translation = "「막아냈다고……? 나의 매크로 노바를……? 바보 같은…… 어디에 그런 힘이 남아 있다는 것이냐」"

[[dialogue]]
speaker = "unk"
original = "俺とヴィーナスの放った光芒は、奇跡的な噛み合いによってギエルの超新星爆発を相殺させる。"
translation = "나와 비너스가 내뿜은 광망은, 기적적인 맞물림에 의해 기엘의 초신성 폭발을 상쇄시킨다."

[[dialogue]]
speaker = "unk"
original = "それから──立ち上がる。"
translation = "그리고── 일어선다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「参ったわね……あんな風に言われちゃ、死ぬまでやるしかないじゃない」"
translation = "「난감하네…… 저런 식으로 말하면, 죽을 때까지 할 수밖에 없잖아」"

[[dialogue]]
speaker = "クロト"
original = "「ああ……まったく。にしても──ふふっ……そうか。そうだよな。忘れてたよ」"
translation = "「아아…… 정말. 그나저나── 후훗…… 그렇구나. 그랬었지. 잊고 있었어」"

[[dialogue]]
speaker = "魔神ギエル"
original = "「ナニ……？」"
translation = "「뭐지……?」"

[[dialogue]]
speaker = "クロト"
original = "「まだ負けてない──なんて意地の張り方は……間違ってたよ。俺らしくなかった」"
translation = "「아직 지지 않았다── 같은 고집을 부리는 방식은…… 틀렸어. 나답지 않았지」"

[[dialogue]]
speaker = "クロト"
original = "「構わない──いいさ。負けを認めてやるよ、ギエル。一度はな！」"
translation = "「상관없어── 괜찮아. 패배를 인정해주지, 기엘. 한 번은 말이야!」"

[[dialogue]]
speaker = "unk"
original = "俺がいくら哀れで、負け犬で、敗残者だろうと構いやしない。"
translation = "내가 아무리 불쌍하고, 패배자이고, 잔존자일지라도 상관없다."

[[dialogue]]
speaker = "unk"
original = "だってそんなの、今に始まった話じゃないんだ。"
translation = "왜냐하면 그런 건, 지금 시작된 이야기가 아니니까."

[[dialogue]]
speaker = "ヴィーナス"
original = "「魔王なんでしょ……英雄なんでしょ？」"
translation = "「마왕인 거잖아…… 영웅인 거잖아?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「だったら……私１人くらい、軽くひねってみせてよ──！」"
translation = "「그렇다면…… 나 한 명 정도는, 가볍게 비틀어 보여줘──!」"

[[dialogue]]
speaker = "unk"
original = "──あの時だって。"
translation = "──그때도."

[[dialogue]]
speaker = "unk"
original = "一度、ヴィーナスの前に敗れ去った俺は、みっともなく決着を覆して抗った。"
translation = "한 번, 비너스 앞에서 패배했던 나는, 꼴사납게 결착을 뒤집고 저항했다."

[[dialogue]]
speaker = "unk"
original = "そして──今の俺はようやく、娘の期待に応えるだけの真の魔王になれたんだ。"
translation = "그리고── 지금의 나는 드디어, 딸의 기대에 부응할 만한 진정한 마왕이 된 것이다."

[[dialogue]]
speaker = "クロト"
original = "「……だから」"
translation = "「……그러니까」"

[[dialogue]]
speaker = "unk"
original = "何度だって受け入れよう。敗北を。情けない自分を。"
translation = "몇 번이고 받아들이자. 패배를. 한심한 나 자신을."

[[dialogue]]
speaker = "unk"
original = "最初から圧倒して勝ち切るなんて──スマートなヒーローのやり方は、映画にでも任せておけばいい。"
translation = "처음부터 압도적으로 이기는 것 같은── 스마트한 히어로의 방식은, 영화에나 맡겨두면 된다."

[[dialogue]]
speaker = "魔神ギエル"
original = "「ナゼダ……ナゼ、マダ立テルト言ウ……！？\u3000ラクシス──！！」"
translation = "「왜냐…… 왜, 아직도 설 수 있다는 것이냐……!? 락시스──!!」"

[[dialogue]]
speaker = "クロト"
original = "「諦めが悪いだけだ。もしかしたらこいつも、<b>先代譲り</b>なのかもしれないけどさ」"
translation = "「포기가 나쁜 것뿐이다. 어쩌면 이 녀석도, <b>선대에게</b> 물려받은 것일지도 모르겠지만 말이야」"

[[dialogue]]
speaker = "unk"
original = "だけど──俺は<ruby>先代<rt>ラクシス</rt></ruby>とは違う。"
translation = "하지만── 나는 <ruby>선대<rt>락시스</rt></ruby>와는 다르다."

[[dialogue]]
speaker = "unk"
original = "緋宮クロトには、女神より授かった星の加護がある。"
translation = "히노미야 쿠로토에게는, 여신에게서 받은 별의 가호가 있다."

[[dialogue]]
speaker = "unk"
original = "だから、俺は、負ければ負けるほど──地を這いつくばれば這いつくばるほど──"
translation = "그러니까, 나는, 지면 질수록── 땅을 기면 길수록──"

[[dialogue]]
speaker = "クロト"
original = "「何度、地に倒れ伏したって……俺はその度に……強くなる。心の芯が折れない限り」"
translation = "「몇 번, 땅에 쓰러져 엎드려도…… 나는 그때마다…… 강해진다. 마음의 심지가 꺾이지 않는 한」"

[[dialogue]]
speaker = "クロト"
original = "「俺の守護星は──地球だ！\u3000この、地に足つけて立ち上がるための、地球なんだ！！」"
translation = "「나의 수호성은── 지구다! 이, 땅에 발을 붙이고 일어서기 위한, 지구인 것이다!!」"

[[dialogue]]
speaker = "魔神ギエル"
original = "「──ッ──？\u3000ナ、ニ────？」"
translation = "「──읏──? 무, 엇이────?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「これ──私と戦った時の──」"
translation = "「이거── 나랑 싸웠을 때의──」"

[[dialogue]]
speaker = "アナ"
original = "「地球由来の──『不屈』の力──！」"
translation = "「지구 유래의── 『불굴』의 힘──!」"

[[dialogue]]
speaker = "モンスターＡ"
original = "「イ～ッ！」"
translation = "「이~잇!」"

[[dialogue]]
speaker = "モンスターＢ"
original = "「ィィィ──！」"
translation = "「이이이──!」"

[[dialogue]]
speaker = "unk"
original = "少年がモンスターに襲われていた。その少年は、俺だった。"
translation = "소년이 몬스터에게 습격당하고 있었다. 그 소년은, 나였다."

[[dialogue]]
speaker = "クロト"
original = "（はは──あの時は……さんざん泣いてたっけ）"
translation = "（하하── 그때는…… 실컷 울었었지）"

[[dialogue]]
speaker = "飢えたモンスターA"
original = "『グッグッグッ……ガッガッガッガッ』"
translation = "『끄으으으윽…… 칵칵칵칵칵』"

[[dialogue]]
speaker = "飢えたモンスターB"
original = "『グルル……ゲヘェ』"
translation = "『크르르…… 켁』"

[[dialogue]]
speaker = "unk"
original = "街で襲われたとき──アステラに連れて行かれたとき──"
translation = "거리에서 습격당했을 때── 아스테라에 끌려갔을 때──"

[[dialogue]]
speaker = "unk"
original = "それは、緋宮クロトが人生で経験してきた『敗北』の歴史だった。"
translation = "그것은, 히노미야 쿠로토가 인생에서 경험해 온 『패배』의 역사였다."

[[dialogue]]
speaker = "クロト"
original = "（こんなの──いちいち思い出してたら、キリがないよ）"
translation = "（이런 거── 일일이 떠올리면, 끝이 없어）"

[[dialogue]]
speaker = "unk"
original = "──小さい頃からモンスターにばかり襲われていた。"
translation = "──어릴 때부터 몬스터에게만 습격당했다."

[[dialogue]]
speaker = "unk"
original = "──何度も泣いて、逃げ出して、その度に現実が嫌になって……。"
translation = "──몇 번이고 울고, 도망치고, 그때마다 현실이 싫어져서……."

[[dialogue]]
speaker = "unk"
original = "走馬灯のように流れていく記憶。"
translation = "주마등처럼 흘러가는 기억."

[[dialogue]]
speaker = "unk"
original = "それだけじゃない。今の自分に覚えのない敗走の記憶まで、雪崩のように流れ込んできた。"
translation = "그뿐만이 아니다. 지금의 자신에게는 기억에 없는 패주의 기억까지, 눈사태처럼 흘러들어 왔다."

[[dialogue]]
speaker = "クロト"
original = "（ああ──そうか──これは──別次元の俺の出来事）"
translation = "（아아── 그렇구나── 이건── 다른 차원의 나의 일）"

[[dialogue]]
speaker = "クロト"
original = "（俺はずっと──他の平行世界でも、同じように負け続けてきたんだな）"
translation = "（나는 계속── 다른 평행 세계에서도, 똑같이 계속 져왔던 거구나）"

[[dialogue]]
speaker = "unk"
original = "デネブで、ベガで……俺は御前試合で何度負けたんだろう？"
translation = "데네브에서, 베가에서…… 나는 어전 시합에서 몇 번이나 졌을까?"

[[dialogue]]
speaker = "unk"
original = "細かい数はわからないけど──"
translation = "정확한 숫자는 모르겠지만──"

[[dialogue]]
speaker = "unk"
original = "湧き上がってくる底知れない強さは、我ながら苦笑してしまうほど、泥臭い敗北の結晶だった。"
translation = "솟아오르는 헤아릴 수 없는 강함은, 나 스스로도 쓴웃음을 지을 정도로, 흙투성이 패배의 결정이었다."

[[dialogue]]
speaker = "クロト"
original = "「緋宮クロトは諦めない……」"
translation = "「히노미야 쿠로토는 포기하지 않아……」"

[[dialogue]]
speaker = "クロト"
original = "「いい敗北をくれたな、ギエル。人生最高の屈辱だったよ」"
translation = "「좋은 패배를 안겨줬군, 기엘. 인생 최고의 굴욕이었어」"

[[dialogue]]
speaker = "魔神ギエル"
original = "「────」"
translation = "「────」"

[[dialogue]]
speaker = "unk"
original = "立つ。吠える。気炎を上げる。"
translation = "선다. 포효한다. 기염을 토한다."

[[dialogue]]
speaker = "unk"
original = "どんなにか屈辱的な敗北だろうと──それは緋宮クロトにとって、這い上がる最高の糧になる。"
translation = "아무리 굴욕적인 패배일지라도── 그것은 히노미야 쿠로토에게, 기어 올라갈 최고의 양식이 된다."

[[dialogue]]
speaker = "魔神ギエル"
original = "「アリエヌ……イクラ魔王ダロウト、コノ規模ノ天体爆発ヲ防ゲルハズガナイ！」"
translation = "「말도 안 돼…… 아무리 마왕이라도, 이 규모의 천체 폭발을 막아낼 리가 없다!」"

[[dialogue]]
speaker = "クロト"
original = "「そうだな。魔王ってだけじゃ無理だっただろう──だからこれは、俺の諦めの悪さでしかない」"
translation = "「그렇겠지. 마왕이라는 것만으로는 무리였을 거야── 그러니까 이건, 나의 포기가 나쁜 것일 뿐이다」"

[[dialogue]]
speaker = "クロト"
original = "「俺の立つ地平は……何度だって、俺を奮い立たせてくれる」"
translation = "「내가 서 있는 지평은…… 몇 번이고, 나를 분발하게 해준다」"

[[dialogue]]
speaker = "アナ"
original = "「何重にも重なった『不屈』の能力……これは……」"
translation = "「몇 겹으로 겹쳐진 『불굴』의 능력…… 이것은……」"

[[dialogue]]
speaker = "リノ"
original = "「今のクロトはさっきまでの数倍──いえ、もしかしたら数十倍……！」"
translation = "「지금의 쿠로토는 방금 전의 몇 배── 아니, 어쩌면 수십 배……!」"

[[dialogue]]
speaker = "unk"
original = "魔王覚醒すら上回る力のインフレーションが発動していた。"
translation = "마왕 각성조차 뛰어넘는 힘의 인플레이션이 발동하고 있었다."

[[dialogue]]
speaker = "unk"
original = "要はそれだけ負け続けたってことで、不甲斐ない戦績の証明でしかないけれど。"
translation = "요컨대 그만큼 계속 졌다는 것이고, 한심한 전적의 증명일 뿐이지만."

[[dialogue]]
speaker = "unk"
original = "敗北こそが緋宮クロトを強くする──その限界は平行世界の<ruby>軛<rt>くびき</rt></ruby>さえ超えた青天井。"
translation = "패배야말로 히노미야 쿠로토를 강하게 한다── 그 한계는 평행 세계의 멍에조차 넘어선 청천장이다."

[[dialogue]]
speaker = "トリュファイナ"
original = "『魔王ラクシス──あなたは、一輪の花のようですね』"
translation = "『마왕 락시스── 당신은, 한 송이의 꽃과 같군요』"

[[dialogue]]
speaker = "トリュファイナ"
original = "『重なり合う可能性の花弁。そんなあなたの種を植えれば、きっと……新たな領域が芽吹くことになるのでしょう』"
translation = "『겹쳐지는 가능성의 꽃잎. 그런 당신의 씨앗을 심으면, 분명…… 새로운 영역이 싹트게 될 것입니다』"

[[dialogue]]
speaker = "クロト"
original = "（デネブ──ベガ──アルタイル──３つに分かたれた世界すべての『敗北』を、今この瞬間に束ねる）"
translation = "（데네브── 베가── 알타이르── 세 개로 나뉜 세계 모든 『패배』를, 지금 이 순간에 묶는다）"

[[dialogue]]
speaker = "unk"
original = "それは──この宇宙に分岐を生んだ『根』としての存在証明。"
translation = "그것은── 이 우주에 분기를 낳은 『뿌리』로서의 존재 증명."

[[dialogue]]
speaker = "unk"
original = "緋宮クロトにしかできない、超次元の重ね合わせ──"
translation = "히노미야 쿠로토만이 할 수 있는, 초차원의 겹쳐 쌓기──"

[[dialogue]]
speaker = "クロト"
original = "「フロンティア、ドライブ──」"
translation = "「프론티어, 드라이브──」"

