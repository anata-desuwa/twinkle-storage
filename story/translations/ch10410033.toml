[[dialogue]]
speaker = "unk"
original = "第３話,会長の可愛いバニーを見てみたい♪,P"
translation = "제3화, 회장의 귀여운 바니걸을 보고 싶어♪, P"

[[dialogue]]
speaker = "unk"
original = "ある日の放課後。星徒会室で１人さみしく事務仕事を片付けていたら、マインがやってきた──"
translation = "어느 날 방과 후. 성도회실에서 혼자 쓸쓸히 사무 업무를 처리하고 있었더니 마인이 찾아왔다──"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「会長、お仕事お疲れ様～♪\u3000お菓子の差し入れ持ってきたよ！」"
translation = "「회장, 일하느라 수고가 많아~♪ 과자 좀 가져왔어!」"

[[dialogue]]
speaker = "unk"
original = "ありがとう、助かるよ"
translation = "고마워, 도움이 되네."

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ついでにお茶も淹れてあげるね。座って待ってて～」"
translation = "「하는 김에 차도 우려줄게. 앉아서 기다려~」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「星徒会役員じゃないのに、すっかりどこに何があるか覚えちゃったなー。にひひ♪」"
translation = "「성도회 임원도 아닌데 완전히 어디에 뭐가 있는지 외워버렸네. 니히히♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「会長も今度、公安の事務所に遊びに来てよ。部外者は駄目だけど、会長ならぜんぜんＯＫだと思うし……」"
translation = "「회장도 다음에 공안 사무소에 놀러 와. 외부인은 안 되지만 회장이라면 전혀 OK라고 생각하고……」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「は～い、どうぞ♪\u3000召し上がれ～♪」"
translation = "「자, 여기 있어♪ 맛있게 드세요~♪」"

[[dialogue]]
speaker = "unk"
original = "テーブルの上に置かれたケーキも紅茶も美味しそう──だが、１つだけ違和感というか、拭いきれない懸念がある。"
translation = "테이블 위에 놓인 케이크도 홍차도 맛있어 보인다── 하지만 한 가지 위화감이라고 할까, 씻어낼 수 없는 우려가 있다."

[[dialogue]]
speaker = "unk"
original = "なぜなら……そろそろ周期的に、マインがイタズラをしたくなるタイミングだからだ！！"
translation = "왜냐하면…… 슬슬 주기적으로 마인이 장난을 치고 싶어지는 타이밍이기 때문이다!!"

[[dialogue]]
speaker = "unk"
original = "この紅茶、不思議な香りがするね？"
translation = "이 홍차, 신기한 향이 나네?"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「うん。もらい物なんだ～。何でも市販されてないレアフレーバーなんだって！」"
translation = "「응. 선물 받은 거야~. 뭐든 시판되지 않는 레어 플레이버라나 봐!」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「えー♪\u3000何も入れてないよ～……本当だってば！\u3000嘘はついてない！」"
translation = "「에~♪ 아무것도 안 넣었어~…… 정말이라니까! 거짓말 안 했어!」"

[[dialogue]]
speaker = "unk"
original = "じゃあ、誰から貰った紅茶……？"
translation = "그럼 누구한테 받은 홍차야……?"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「アニマ先輩！」"
translation = "「아니마 선배!」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「わぉ♪\u3000すっごいスウェーバック♪」"
translation = "「와오♪ 엄청난 스웨이백♪」"

[[dialogue]]
speaker = "unk"
original = "絶対に飲まないぞ！！"
translation = "절대로 안 마셔!!"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「そんなぁ……しょぼん。会長ってばひどーい……せっかく恋人が心を込めて淹れた紅茶なのに……」"
translation = "「너무해…… 시무룩. 회장도 참 너무해…… 어렵게 연인이 마음을 담아 우린 홍차인데……」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「もー、そんなに警戒しないでよ～♪\u3000毒ってわけじゃないし！」"
translation = "「정말, 그렇게 경계하지 말라구~♪ 독 같은 건 아니니까!」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「にひ……♪\u3000目的は何って言われても……ちょ～っと会長の可愛いところが見たくなっちゃっただけだよ？」"
translation = "「니히……♪ 목적이 뭐냐고 물어도…… 조~금 회장의 귀여운 면을 보고 싶어졌을 뿐이라구?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ダッチから貰ったバニー服。戦闘服として起動はできないけど、変身自体はできるでしょ？」"
translation = "「닷지에게 받은 바니복. 전투복으로서 기동은 안 되지만 변신 자체는 할 수 있잖아?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「だからさ、その紅茶──女体化できる紅茶を使って女の子になって？\u3000もっかいバニーになった可愛い会長を見～せ～て♪」"
translation = "「그러니까 말야, 그 홍차── 여체화할 수 있는 홍차를 써서 여자애가 되어줘? 다시 한번 바니걸이 된 귀여운 회장을 보・여・줘♪」"

[[dialogue]]
speaker = "unk"
original = "──断る！！！"
translation = "──거절한다!!!"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「まぁ、そうだよね～。そう言うに決まってるよね～。おっけー、じゃあ助っ人かもーん！」"
translation = "「뭐, 그렇겠지~. 그렇게 말할 줄 알았어~. 오케이, 그럼 헬퍼 컴온!」"

[[dialogue]]
speaker = "トワ先生"
original = "「話は聞かせてもらったよ、会長くん！！」"
translation = "「이야기는 다 들었다구, 회장 군!!」"

[[dialogue]]
speaker = "トワ先生"
original = "「ダメじゃない！\u3000星騎士として新しい力を手に入れたなら、それはちゃんと学園に報告してくれないと！」"
translation = "「안 되잖아! 성기사로서 새로운 힘을 손에 넣었다면 그건 제대로 학원에 보고해줘야지!」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ごめんねー、会長♪\u3000先生と雑談してたら、ついつい会長がめっちゃ可愛いバニー服をアステラカジノで手に入れたこと、喋っちゃった♪」"
translation = "「미안해~ 회장♪ 선생님이랑 잡담하다가 그만 회장이 엄청 귀여운 바니복을 아스테라 카지노에서 손에 넣었다고 말해버렸어♪」"

[[dialogue]]
speaker = "トワ先生"
original = "「アステラで敵から渡された戦闘服だなんて……ちゃんと調査しないと危ないから！\u3000先生命令です！\u3000今すぐ変身しなさい！」"
translation = "「아스테라에서 적에게 건네받은 전투복이라니…… 제대로 조사하지 않으면 위험하니까! 선생님 명령입니다! 지금 당장 변신하세요!」"

[[dialogue]]
speaker = "unk"
original = "もう他には誰にも言ってないよね！？"
translation = "이제 다른 사람한텐 아무한테도 말 안 한 거 맞지!?"

[[dialogue]]
speaker = "unk"
original = "マイン、あれは内緒って言っただろ！？"
translation = "마인, 그건 비밀이라고 했잖아!?"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「あ～……う～ん♪\u3000私もそのつもりだったんだけどさー……ごめんね☆」"
translation = "「아~…… 으음♪ 나도 그럴 생각이었는데 말야ー…… 미안해☆」"

[[dialogue]]
speaker = "ヒトリ"
original = "「バニーに変身した、てぇてぇ会長が見られるって本当ですかっ！？」"
translation = "「바니걸로 변신한 귀한 회장님을 볼 수 있다는 게 정말인가요!?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「うん、これからお披露目だよ～♪」"
translation = "「응, 이제 곧 공개할 거야~♪」"

[[dialogue]]
speaker = "ヒトリ"
original = "「よ、よかったです、間に合いました……！」"
translation = "「다, 다행이에요, 늦지 않았네요……!」"

[[dialogue]]
speaker = "トワ先生"
original = "「ほら！\u3000早く女の子になって、会長くん！」"
translation = "「자! 어서 여자애가 되렴, 회장 군!」"

[[dialogue]]
speaker = "unk"
original = "ゆーちゃん、助けて！！"
translation = "유우짱, 도와줘!!"

[[dialogue]]
speaker = "ヒトリ"
original = "「て～て～♪（カップを差し出す）」"
translation = "「귀~해~♪ (컵을 내민다)」"

[[dialogue]]
speaker = "unk"
original = "いやだあああああああ！！！"
translation = "싫어어어어어어어어어!!!"

[[dialogue]]
speaker = "unk"
original = "そうして俺は再び、女体化バニーをお披露目することになったのだった……"
translation = "그렇게 나는 다시 한번 여체화 바니걸을 선보이게 된 것이었다……"

