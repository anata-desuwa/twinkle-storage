[[dialogue]]
speaker = "unk"
original = "第３話,裏ネタあるよ,P"
translation = "제3화, 뒷이야기 있어요, P"

[[dialogue]]
speaker = "unk"
original = "あれから──"
translation = "그 후──"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「この辺りで──例の件について調査を行いましょう」"
translation = "「이 근처에서── 그 건에 대해 조사를 진행합시다」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「こうして２人でいたら、また見物人がやってくるかもしれませんし……」"
translation = "「이렇게 둘이 함께 있으면, 또 구경꾼이 올지도 모르고……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あーアツアツのお２人はっけーん！\u3000今日も午後からお出かけですか～？」"
translation = "「아ー 뜨끈뜨끈한 두 분 발견ー! 오늘도 오후부터 외출이신가요～?」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「あ、ルリエル。ちょうどよかったです」"
translation = "「아, 루리엘. 마침 잘 됐어요」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「？\u3000わたしに？\u3000何のご用でしょう──」"
translation = "「? 저에게? 무슨 용무이실까요──」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「こちらのグッズをご存知ありませんか？\u3000キーホルダーなんですけど……その、見慣れた顔が描かれていると思うのですが」"
translation = "「이 굿즈를 알고 계신가요? 키홀더인데요…… 그, 낯익은 얼굴이 그려져 있다고 생각하는데요」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あ、会長さん達のグッズですよね。知ってます知ってます。クラスでも星ミミの子たちがカバンにつけてました」"
translation = "「아, 회장님들 굿즈 말이죠. 알아요 알아요. 반에서도 호시미미 아이들이 가방에 달고 다녔어요」"

[[dialogue]]
speaker = "unk"
original = "周知の事実なの？"
translation = "널리 알려진 사실이야?"

[[dialogue]]
speaker = "unk"
original = "自然に受け入れられてるぞ"
translation = "자연스럽게 받아들여지고 있군"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「星ミミという呼称まで……いつの間にか市民権を得ているとは」"
translation = "「호시미미라는 호칭까지…… 어느새 시민권을 얻고 있었다니」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「もしかして、知らなかったのは私たちだけなんでしょうか……？」"
translation = "「혹시, 모르고 있었던 건 저희뿐이었던 걸까요……?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「これがどうかしたんですか？」"
translation = "「이게 왜 그러신가요?」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「こちらのグッズ──私たちに断りなく販売されているようなんです」"
translation = "「이 굿즈── 저희에게 허락 없이 판매되고 있는 것 같아요」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ええっ！\u3000知らなかったんですか？\u3000びっくりです──てっきり、会長さん達が星徒会プロモーションの一貫か何かでやっているものかと」"
translation = "「에엣! 모르셨어요? 깜짝 놀랐어요── 당연히, 회장님들이 성도회 프로모션의 일환이라도 되는 것처럼 하고 계신 줄 알았어요」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「確かにそう思われても無理はありません。ですが、これは紛れもなく闇グッズ。何か知りませんか、ルリエル？」"
translation = "「확실히 그렇게 생각해도 무리는 아닙니다. 하지만, 이것은 틀림없는 어둠 굿즈. 아는 것 없나요, 루리엘?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「う、うーん……すみません。わたしはリアル会長さん達をいつも見ているので、グッズ類にあんまり興味がなくて……」"
translation = "「으, 으음…… 죄송해요. 저는 리얼 회장님들을 항상 보고 있어서, 굿즈류에는 별로 흥미가 없어서……」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「そうでしたか──ご協力ありがとうございます。他を当たってみましょう、緋宮会長」"
translation = "「그랬군요── 협력 감사합니다. 다른 곳을 찾아봅시다, 히노미야 회장군」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「……ということなの。何か知らない、キリカ？」"
translation = "「……라는 거예요. 아는 것 없나요, 키리카?」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「……なるほど。それは確かに由々しき事態です」"
translation = "「……과연. 그것은 확실히 심각한 사태입니다」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ただ……残念ながら、私も既に学園は卒業した身。そのようなグッズの販売経路は存じておりません」"
translation = "「다만…… 유감스럽게도, 저도 이미 학원을 졸업한 몸. 그러한 굿즈의 판매 경로는 알지 못합니다」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「そう……キリカでも知らないなんて」"
translation = "「그렇군요…… 키리카도 모른다니」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ええ。ご期待に添えず申し訳ありませんが……私は家事があるので……」"
translation = "「네. 기대에 부응하지 못해 죄송하지만…… 저는 집안일이 있어서……」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「──待って。キリカ、今なにかを隠さなかった？」"
translation = "「──잠깐. 키리카, 지금 무언가를 숨기지 않았나요?」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「いえ。何も？」"
translation = "「아뇨. 아무것도요?」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「不自然な間があったよ。長年の付き合いを舐めないでよね──そこっ！」"
translation = "「부자연스러운 틈이 있었어요. 오랜 세월의 관계를 얕보지 말아 줘요── 거기!」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「くっ」"
translation = "「크윽」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「こ、これは……私のアクリルスタンド！\u3000ＸＬサイズ！」"
translation = "「이, 이것은…… 저의 아크릴 스탠드! XL 사이즈!」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「しかもこれ──今のこの魔王フォームの私じゃないですか！」"
translation = "「게다가 이것── 지금의 이 마왕 폼의 저 아닙니까!」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「く……せっかく内密に入手しましたのに……」"
translation = "「크…… 모처럼 은밀하게 입수했습니다만……」"

[[dialogue]]
speaker = "unk"
original = "すごい生産ペースだ"
translation = "엄청난 생산 속도다"

[[dialogue]]
speaker = "unk"
original = "なんでもうあるの？"
translation = "왜 벌써 있는 거야?"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「私としたことが出来心に負けてしまい、申し訳ございません」"
translation = "「저로서도 순간적인 욕심에 져 버려, 죄송합니다」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「学園公認カップルグッズと聞いて……こちらのお嬢様の表情があまりにもよくできていたものですから……」"
translation = "「학원 공인 커플 굿즈라고 듣고…… 이 아가씨의 표정이 너무나 잘 만들어져 있었기에……」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「確かにすごいクオリティ──こんな作り込み、プロの技としか思えません」"
translation = "「확실히 대단한 퀄리티── 이런 정교함은 프로의 기술이라고밖에 생각할 수 없어요」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「緋宮会長。事態はやはり、私たちが思うより広がっているみたいです──」"
translation = "「히노미야 회장군. 사태는 역시, 저희가 생각하는 것보다 퍼져 있는 것 같아요──」"

[[dialogue]]
speaker = "unk"
original = "キリカさんは例のグッズをファンづてに入手したらしく、どこで売買が行われているかは本当に知らないとのことだった。"
translation = "키리카 씨는 문제의 굿즈를 팬을 통해 입수했으며, 어디서 매매가 이루어지고 있는지는 정말로 모른다고 했다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふう……キリカからも製造元まではたどり着けませんでしたか。なかなか手強い道のりです」"
translation = "「휴…… 키리카에게서도 제조원까지는 찾아낼 수 없었나요. 꽤나 험난한 여정이네요」"

[[dialogue]]
speaker = "unk"
original = "また明日頑張ろう"
translation = "내일 또 힘내자"

[[dialogue]]
speaker = "unk"
original = "見つからなかったな"
translation = "찾지 못했네"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ええ……そうですね。情報が判明しただけでも良しとしましょう」"
translation = "「네…… 그렇네요. 정보가 판명된 것만으로도 좋다고 합시다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「そうだ──たまには購買でお茶でも飲みませんか？\u3000カフェテリアに行くと、また天体観測されてしまうかもしれませんし……」"
translation = "「맞다── 가끔은 구매부에서 차라도 마시지 않을래요? 카페테리아에 가면, 또 천체 관측을 당할지도 모르고……」"

[[dialogue]]
speaker = "unk"
original = "使いこなさないで"
translation = "능숙하게 쓰지 마"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふふふっ。なんだか楽しくて──私が面白がっていたらいけませんよね」"
translation = "「후후훗. 왠지 즐거워서── 제가 재미있어 하면 안 되겠죠」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「すみませーん」"
translation = "「실례합니다ー」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「──フヒ、いらっしゃいませダ。購買部は今日も自慢の品揃え、お求めのものは何カナ？」"
translation = "「──흐히, 어서 오시게다. 구매부는 오늘도 자랑스러운 품목, 원하는 것은 무엇카나?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「こんにちは、アニマ先輩。えーと、飲み物を……」"
translation = "「안녕하세요, 아니마 선배. 음ー, 마실 것을……」"

[[dialogue]]
speaker = "unk"
original = "フィオナがクーラーボックスを見ながら悩んでいると……"
translation = "피오나가 쿨러 박스를 보며 고민하고 있을 때……"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「フヒヒ……お客さん。極秘の裏ネタを仕入れているのダガ、どうカナ？」"
translation = "「흐히히…… 손님. 극비의 뒷이야기를 들여놓고 있는다만, 어떤카나?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「裏ネタ……とは？」"
translation = "「뒷이야기……란?」"

[[dialogue]]
speaker = "unk"
original = "詳細を"
translation = "자세히"

[[dialogue]]
speaker = "unk"
original = "なんだそれは"
translation = "그게 뭐야"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「それはもちろん、星ミミ御用達、Ｗ会長の限定フィギュアやスマホケース。アニマが丹精込めて錬成した、ここでしか手に入らない秘蔵グッズ目白押しダ」"
translation = "「그것은 물론, 호시미미 전용, W 회장의 한정 피규어나 스마트폰 케이스. 아니마가 정성껏 연성한, 여기서만 손에 넣을 수 있는 비장의 굿즈가 가득하다」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「今日の目玉商品は２人の魔王フォームを合体させた新作アクリルスタンド…………おっと、間違エタ。この人たちには売ってはいけないんダッタ」"
translation = "「오늘의 특가 상품은 두 사람의 마왕 폼을 합체시킨 신작 아크릴 스탠드………… 앗, 실수했다. 이 사람들에게는 팔면 안 되는다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「ここは仕切り直しダナ……エット……」"
translation = "「여기는 다시 시작하는다나…… 에엣……」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「──フヒ、いらっしゃい。購買部は今日も自慢の品揃え、お求めのものは何かナ？」"
translation = "「──흐히, 어서 오시게. 구매부는 오늘도 자랑스러운 품목, 원하는 것은 무엇카나?」"

[[dialogue]]
speaker = "unk"
original = "今隠したものを見せろ！"
translation = "지금 숨긴 것을 보여줘!"

[[dialogue]]
speaker = "unk"
original = "ごまかすな！"
translation = "속이지 마!"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「こんな初歩的なミスを犯してしまうとハ……天才錬金術師アニマ、万事休ス！」"
translation = "「이런 초보적인 실수를 저지르다니…… 천재 연금술사 아니마, 만사휴스!」"

