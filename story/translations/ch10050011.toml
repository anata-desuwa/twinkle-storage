[[dialogue]]
speaker = "unk"
original = "第１話,生真面目な１年生,P"
translation = "제1화, 고지식한 1학년, P"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「くちゅんっ」"
translation = "「에취」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「うぅ……ビル風がコールド……どうして皆さんは平気なんですか……？」"
translation = "「으으…… 빌딩 바람이 콜드…… 어째서 여러분은 아무렇지도 않은 건가요……?」"

[[dialogue]]
speaker = "unk"
original = "大丈夫？"
translation = "괜찮아?"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ああいえ、大丈夫です。お気遣いありがとうございます」"
translation = "「아아, 아뇨, 괜찮아요. 신경 써주셔서 감사합니다.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「――って、新星学園の星徒会長さんじゃないですか。こんにちは、流星学園星徒会書記の奏ソフィアです」"
translation = "「――랄까, 신성 학원의 성도회장님 아니신가요. 안녕하세요, 유성 학원 성도회 서기인 카나데 소피아입니다.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「しばしば附属生と間違われますが、れっきとした本校一年生です。飛び級とかでもありません」"
translation = "「종종 부속생으로 오해받곤 합니다만, 엄연한 본교 1학년생이에요. 월반 같은 것도 아니고요.」"

[[dialogue]]
speaker = "unk"
original = "（念を押された）"
translation = "(다짐을 받았다)"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「そんな私はただいま街のパトロールをしているところです」"
translation = "「그런 저는 지금 거리 파트롤을 하던 중이었어요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「流星学園と新星学園の星徒会は、生徒を代表してモンスターやアステラに対処し、リクリエに対抗するのが本分ですから」"
translation = "「유성 학원과 신성 학원의 성도회는 학생을 대표해서 몬스터나 아스테라에 대처하고, 리크리에에 대항하는 것이 본분이니까요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「とはいえモンスターの発生場所がわかるわけではありませんし、パトロールができるのも手が空いている時だけですが……」"
translation = "「그렇다고는 해도 몬스터의 발생 장소를 알 수 있는 건 아니고, 파트롤을 할 수 있는 것도 손이 비었을 때뿐입니다만…….」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「それでは私はこれで……一緒に行く？\u3000いえ、これは私が自主的にしていることですから気にしないでください」"
translation = "「그러면 저는 이만…… 같이 가자고요? 아뇨, 이건 제가 자주적으로 하는 일이니까 신경 쓰지 마세요.」"

[[dialogue]]
speaker = "unk"
original = "２人の方が心強いから"
translation = "둘이서 가는 게 든든하니까"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「それは……そうですけど。私の戦力を低く見積もられている気もしなくもないですが、戦闘では不測の事態が起きるもの。単独行動を避けるのはクールな判断です」"
translation = "「그건…… 그렇긴 하네요. 제 전력을 낮게 평가받는 기분도 안 드는 건 아니지만, 전투에서는 불측의 사태가 일어나는 법. 단독 행동을 피하는 건 쿨한 판단입니다.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「でもいいんですか？\u3000会長さんも何か用事があったのでは……」"
translation = "「하지만 괜찮으시겠어요? 회장님도 뭔가 용무가 있으셨던 게……?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ただの買い物──そうですか。ではよろしくお願いします、会長さん。とりあえずこの辺りを一回り……」"
translation = "「그저 장보기── 그렇군요. 그럼 잘 부탁드려요, 회장님. 우선 이 근처를 한 바퀴……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「じー……」"
translation = "「빤히……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「あ、いえ、何も見てませんよ、何も。気になるお店とかありませんから」"
translation = "「아, 아뇨, 아무것도 안 보고 있어요, 아무것도. 신경 쓰이는 가게 같은 건 없으니까요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ところで、前会長に“御前試合”で勝利して会長になったとホットな話題になりましたが、どうしてそんなことになったんですか？」"
translation = "「그나저나, 전 회장님에게 “어전 시합”에서 승리해서 회장이 되었다고 핫한 화제가 되었습니다만, 어째서 그렇게 된 건가요?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「よくわからない？\u3000成り行き？\u3000それは……すごいですね、会長さんも、ヴィーナスさんも」"
translation = "「잘 모르겠다? 어쩌다 보니? 그건…… 대단하네요, 회장님도, 비너스 씨도.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「……え、私が星徒会に入った理由ですか？」"
translation = "「……에, 제가 성도회에 들어온 이유 말인가요?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「それはですねっ、あれは私が流星学園に入学したばかりの頃……フィオナ会長を一目見た瞬間、まばゆいオーラに目を奪われました」"
translation = "「그건 말이죠, 그건 제가 유성 학원에 입학한 지 얼마 안 되었을 무렵…… 피오나 회장님을 한눈에 본 순간, 눈부신 오라에 마음을 빼앗겼습니다.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「文武両道、眉目秀麗……聡明で、知的で、物腰柔らかく優雅で、でも戦闘の時は凛々しくて、フィオナ会長はまさしく私の理想でした」"
translation = "「문무양도, 미목수려…… 총명하고, 지적이고, 태도가 부드럽고 우아하며, 하지만 전투 때는 늠름해서, 피오나 회장님은 그야말로 저의 이상이었어요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「まさに完璧を形にしたようでした。ひとつしか年が違わないのに、こんな人が本当にいるのかと衝撃を受けたくらいです」"
translation = "「정말로 완벽을 형상화한 것 같았습니다. 한 살밖에 차이 나지 않는데, 이런 사람이 정말로 있는 건가 하고 충격을 받았을 정도예요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「何せ私の周りの年上の女性といえば……いえ、それは置いておくとして」"
translation = "「무엇보다 제 주변의 연상 여성이라고 하면…… 아뇨, 그건 제쳐두고서라도.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「フィオナ会長は、私の出会った中で最も尊敬する人と言っても過言ではありません」"
translation = "「피오나 회장님은, 제가 만난 사람 중에서 가장 존경하는 사람이라고 해도 과언이 아닙니다.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ですからフィオナ会長に近づくために、フィオナ会長のような人になるために星徒会を志したのですっ」"
translation = "「그래서 피오나 회장님께 다가가기 위해, 피오나 회장님 같은 사람이 되기 위해 성도회를 지망한 것이랍니다!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「……あ」"
translation = "「……아.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「──コホン。すみません、ついヒートアップしてしまいました。パトロールを続けましょう」"
translation = "「──큼큼. 죄송합니다, 그만 히트 업 해버렸네요. 파트롤을 계속하죠.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "（チラッ）"
translation = "(힐끗)"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「いえ、何でもないです。集中しましょう」"
translation = "「아뇨, 아무것도 아니에요. 집중합시다.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「お疲れさ──くちゅんっ」"
translation = "「수고하셨어── 에취.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「失礼しました。いつものことですのでお気になさらず」"
translation = "「실례했습니다. 늘 있는 일이니까 신경 쓰지 마세요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「改めてお疲れ様でした。何事もなくて良かったです」"
translation = "「새삼스럽지만 수고 많으셨습니다. 아무 일도 없어서 다행이네요.」"

[[dialogue]]
speaker = "unk"
original = "さっき見ていたお店に行く？"
translation = "아까 보고 있던 가게에 갈래?"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「べ、別に私はパンケーキのお店なんて気になってませんからっ。今日は遊びではなくパトロールに来たんですから──」"
translation = "「따, 딱히 저는 팬케이크 가게 같은 거 신경 안 쓰고 있으니까요! 오늘은 놀러 온 게 아니라 파트롤을 하러 온 거니까──」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「──あっ！？\u3000いえっ、パンケーキが好きなわけじゃないですっ！\u3000たまたま目に付いただけですからっ！」"
translation = "「──앗!? 아뇨! 팬케이크를 좋아하는 게 아니에요! 우연히 눈에 띄었을 뿐이니까요!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「……え？\u3000パトロールに付き合ったから、代わりに付き合ってほしい？\u3000雰囲気的に男一人じゃ入れない？」"
translation = "「……에? 파트롤에 어울려줬으니까, 대신 어울려줬으면 좋겠다고요? 분위기상 남자 혼자서는 못 들어가겠다고요?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「そこまで言うなら……行きましょうか。でも遊びじゃないですからね。栄養補給ですから。いいですね？」"
translation = "「그렇게까지 말씀하신다면…… 갈까요. 하지만 노는 거 아니니까요. 영양 보급이니까. 알겠죠?」"

