[[dialogue]]
speaker = "unk"
original = "第６話,ジグが見た可能性,B"
translation = "제6화, 지그가 본 가능성, B"

[[dialogue]]
speaker = "梨緒"
original = "「くっ──！？」"
translation = "「큭──!?」"

[[dialogue]]
speaker = "unk"
original = "ビルすら両断するジグの斬撃をギリギリで躱し、切り裂かれた金髪が焼け焦げる。"
translation = "빌딩조차 양단하는 지그의 참격을 간발의 차로 피하자, 잘려 나간 금발이 타들어 간다."

[[dialogue]]
speaker = "ジグ"
original = "「今のを避けたんだ。私の眼には君が真っ二つになる可能性が見えていたんだが……やっぱりノルンの力は相性が悪いようだね」"
translation = "「방금 그걸 피했군. 내 눈에는 네가 두 동강이 나는 가능성이 보였다만…… 역시 노른의 힘은 상성이 나쁜 모양이네」"

[[dialogue]]
speaker = "梨緒"
original = "（ジグの言う通り、ノルンの力がなければ私は死んでいた。だがこのままでは……）"
translation = "（지그의 말대로 노른의 힘이 없었다면 나는 죽었을 거야. 하지만 이대로라면……）"

[[dialogue]]
speaker = "unk"
original = "梨緒はかろうじて直撃を避けているが、攻める余裕などなく、防戦一方を強いられていた。"
translation = "리오는 가까스로 직격을 피하고는 있지만, 공격할 여유 따위 없이 방어 일변도로 내몰리고 있었다."

[[dialogue]]
speaker = "unk"
original = "ジグが攻撃を仕掛ける度に剣尖が掠め、逆巻く炎が梨緒の肌を焼く。"
translation = "지그가 공격을 가할 때마다 검끝이 스치고, 소용돌이치는 불꽃이 리오의 피부를 태운다."

[[dialogue]]
speaker = "ジグ"
original = "「でもだんだん動きが鈍くなってきたよ？\u3000私を救ってくれるんじゃなかったのかい？」"
translation = "「하지만 점점 움직임이 둔해지고 있어? 나를 구해주는 게 아니었니?」"

[[dialogue]]
speaker = "unk"
original = "ジグが無造作に剣を振るうと、炎の斬撃が飛ぶ。"
translation = "지그가 무심하게 검을 휘두르자 불꽃의 참격이 날아간다."

[[dialogue]]
speaker = "梨緒"
original = "「うぁっ……！？」"
translation = "「우앗……!?」"

[[dialogue]]
speaker = "梨緒"
original = "（くっ……因果の糸を、読み切れない……）"
translation = "（큭…… 인과의 실을 다 읽어낼 수 없어……）"

[[dialogue]]
speaker = "梨緒"
original = "（それでも──！）"
translation = "（그래도──!）"

[[dialogue]]
speaker = "unk"
original = "ジグが剣を振るった後のわずかな隙を、ノルンの因果の糸が捉えた。"
translation = "지그가 검을 휘두른 뒤의 미세한 빈틈을 노른의 인과의 실이 포착했다."

[[dialogue]]
speaker = "unk"
original = "狙うのはその瞬間。炎に呑まれながらも、ジグの剣めがけて矢を放つ。"
translation = "노리는 것은 그 순간. 불길에 휩싸이면서도 지그의 검을 향해 화살을 쏜다."

[[dialogue]]
speaker = "ジグ"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker = "unk"
original = "思惑通り剣に矢が命中し、衝撃で腕が揺れた。"
translation = "생각대로 검에 화살이 명중했고, 충격으로 팔이 흔들렸다."

[[dialogue]]
speaker = "unk"
original = "剣が使えない無防備な一瞬、かすかに見えたチャンスを逃がさず撃ち抜く！"
translation = "검을 쓸 수 없는 무방비한 찰나, 희미하게 보인 찬스를 놓치지 않고 꿰뚫는다!"

[[dialogue]]
speaker = "梨緒"
original = "「ライトニングテンペスト！！」"
translation = "「라이트닝 템페스트!!」"

[[dialogue]]
speaker = "unk"
original = "稲妻をバチバチと迸らせながら、雷の矢がジグに迫る。"
translation = "번개를 번쩍이며 튀기며, 뇌광의 화살이 지그에게 육박한다."

[[dialogue]]
speaker = "unk"
original = "──しかし目の前に飛来した矢を、ジグは手で掴んで止めてみせた。"
translation = "──하지만 눈앞으로 날아온 화살을 지그는 손으로 붙잡아 멈춰 세웠다."

[[dialogue]]
speaker = "ジグ"
original = "「残念でした」"
translation = "「안타깝게 됐네」"

[[dialogue]]
speaker = "梨緒"
original = "「なっ──！？」"
translation = "「나, 닛──!?」"

[[dialogue]]
speaker = "ジグ"
original = "「見えている……と言っただろう？」"
translation = "「보이고 있다……고 말했을 텐데?」"

[[dialogue]]
speaker = "unk"
original = "ジグの剣に炎が宿り、十数メートルの巨大な劫火の刃が生まれる。"
translation = "지그의 검에 불꽃이 깃들며 수십 미터에 달하는 거대한 겁화의 칼날이 생겨난다."

[[dialogue]]
speaker = "unk"
original = "そして剣を真っ直ぐ振り下ろし──"
translation = "그리고 검을 수직으로 내리치며──"

[[dialogue]]
speaker = "ジグ"
original = "「ブラントアングリフ」"
translation = "「브란트 앙그리프」"

[[dialogue]]
speaker = "梨緒"
original = "「うああああっ！！？」"
translation = "「우아아아악!!?」"

[[dialogue]]
speaker = "unk"
original = "ジグの攻撃をまともに受け、梨緒が地面に叩き落とされた。"
translation = "지그의 공격을 정면으로 받고 리오가 지면으로 처박혔다."

[[dialogue]]
speaker = "梨緒"
original = "「ぅっ……はぁ……はぁっ……！」"
translation = "「윽…… 하아…… 하악……!」"

[[dialogue]]
speaker = "ジグ"
original = "「まだ生きてるんだ。さすがアガサ」"
translation = "「아직 살아있구나. 역시 아가사야」"

[[dialogue]]
speaker = "梨緒"
original = "「負けられ、ない……」"
translation = "「질 수, 없어……」"

[[dialogue]]
speaker = "unk"
original = "神殿の床に這いつくばりながらも、拳を握る梨緒。"
translation = "신전 바닥에 엎드린 채로도 주먹을 쥐는 리오."

[[dialogue]]
speaker = "unk"
original = "全身に走る激痛を堪えながら、立ち上がろうと心を奮わせる。"
translation = "전신에 달리는 격통을 견뎌내며, 일어서려고 마음을 다잡는다."

[[dialogue]]
speaker = "梨緒"
original = "「あの時、私はジグを見捨てた……だから今度こそ君を、救わなければいけない………」"
translation = "「그때, 나는 지그를 저버렸어…… 그러니까 이번에야말로 너를 구해야만 해………」"

[[dialogue]]
speaker = "梨緒"
original = "「私は、諦めるわけには……いかないんだ……！」"
translation = "「나는 포기할 수는…… 없단 말이야……!」"

[[dialogue]]
speaker = "ジグ"
original = "「はぁ……アガサは変わらないね。諦めが悪くて、強がることばかり得意で」"
translation = "「하아…… 아가사는 변하지 않네. 포기가 나쁘고, 강한 척하는 것만 잘해서」"

[[dialogue]]
speaker = "ジグ"
original = "「君はいつもそうだ。負けても負けても、諦めずに立ち上がる。そういうところ、健気だと思うよ」"
translation = "「너는 언제나 그래. 지고 또 져도 포기하지 않고 일어서지. 그런 점, 기특하다고 생각해」"

[[dialogue]]
speaker = "ジグ"
original = "「でも私だって頑張っていたんだよ？」"
translation = "「하지만 나도 노력하고 있었다고?」"

[[dialogue]]
speaker = "梨緒"
original = "「なに……？」"
translation = "「뭐라고……?」"

[[dialogue]]
speaker = "梨緒"
original = "（私の記憶の中のジグはいつも飄々としていた）"
translation = "（내 기억 속의 지그는 언제나 표표했어）"

[[dialogue]]
speaker = "梨緒"
original = "（努力しているところや、敵に苦戦するところなんて私には──いや誰にも見せたことはないはず）"
translation = "（노력하는 모습이나 적에게 고전하는 모습 따위 나에게는── 아니, 누구에게도 보여준 적이 없을 터）"

[[dialogue]]
speaker = "梨緒"
original = "（そんなジグが……『頑張っていた』……？）"
translation = "（그런 지그가…… 『노력하고 있었다』……?）"

[[dialogue]]
speaker = "unk"
original = "梨緒の知るジグなら言うであろうはずのない言葉──それもリクリエの使徒となった今になって口にすることに、違和感を覚えた。"
translation = "리오가 아는 지그라면 할 리가 없는 말── 그것도 리크리에의 사도가 된 지금에 와서야 입에 담는 것에 위화감을 느꼈다."

[[dialogue]]
speaker = "ジグ"
original = "「この神殿は外敵の侵入を防ぐため、様々な仕掛けが備わっている」"
translation = "「이 신전은 외적의 침입을 막기 위해 다양한 장치가 갖춰져 있다」"

[[dialogue]]
speaker = "ジグ"
original = "「これはさっき拾ってきたんだけど……私もその仕掛けを利用させてもらおうかな」"
translation = "「이건 아까 주워온 건데…… 나도 그 장치를 이용해 볼까 해」"

[[dialogue]]
speaker = "unk"
original = "ジグの手の中には、過去の記憶を見せてきたガーディアンの残骸があった。"
translation = "지그의 손안에는 과거의 기억을 보여주었던 가디언의 잔해가 있었다."

[[dialogue]]
speaker = "unk"
original = "そして紫の瘴気がガーディアンへと吸い込まれていく。"
translation = "그리고 보랏빛 장기가 가디언에게로 빨려 들어간다."

[[dialogue]]
speaker = "梨緒"
original = "「何をするつもりだ……！？」"
translation = "「무얼 할 셈이지……!?」"

[[dialogue]]
speaker = "ジグ"
original = "「それは体験してみてのお楽しみ……さ♪」"
translation = "「그건 직접 체험해 보는 즐거움으로…… 남겨둘게♪」"

[[dialogue]]
speaker = "ジグ"
original = "（ああ……この可能性もダメか）"
translation = "（아아…… 이 가능성도 안 되는 건가）"

[[dialogue]]
speaker = "ジグ"
original = "（大地から文明が消え去り、世界が作り変えられていく光景……おそらくリクリエの果てにあるものがこれなのだろう）"
translation = "（대지에서 문명이 사라지고, 세계가 재창조되어 가는 광경…… 아마 리크리에의 끝에 있는 것이 이것이겠지）"

[[dialogue]]
speaker = "ジグ"
original = "（私の『天機の星眼』は幾通りもの可能性を見通す）"
translation = "（나의 『천기의 성안』은 수많은 가능성을 내다본다）"

[[dialogue]]
speaker = "ジグ"
original = "（……３つに分かれる道を見た時、左に進んだ可能性と、真ん中に進んだ可能性、右に進んだ可能性がそれぞれ見える）"
translation = "（……세 갈래로 나뉜 길을 보았을 때, 왼쪽으로 나아간 가능성과, 가운데로 나아간 가능성, 오른쪽으로 나아간 가능성이 각각 보인다）"

[[dialogue]]
speaker = "ジグ"
original = "（左の道の先が崖になっていて、真ん中で土砂崩れが起き、右が安全な道だとわかれば、右の道を選ぶことができる）"
translation = "（왼쪽 길 끝이 절벽이고, 가운데에서 산사태가 일어나며, 오른쪽이 안전한 길이라는 것을 알면, 오른쪽 길을 택할 수 있다）"

[[dialogue]]
speaker = "ジグ"
original = "（『<ruby>可能性<rt>みらい</rt></ruby>』の中から『最善』を選ぶことができる。それが私の力だ）"
translation = "（『<ruby>가능성<rt>미래</rt></ruby>』 중에서 『최선』을 택할 수 있다. 그것이 나의 힘이다）"

[[dialogue]]
speaker = "ジグ"
original = "（しかしこの眼が見た可能性は、全て世界の破滅に繋がっていた）"
translation = "（하지만 이 눈이 본 가능성은, 모두 세계의 파멸로 이어져 있었다）"

[[dialogue]]
speaker = "ジグ"
original = "（初めて<b>その可能性</b>を見たのは、星騎士となるべく、新星学園に入学してからのことだった）"
translation = "（처음으로 <ruby>그 가능성<rt>· ···</rt></ruby>을 본 것은, 성기사가 되기 위해 신성학원에 입학하고 나서의 일이었다）"

[[dialogue]]
speaker = "ジグ"
original = "（モンスターやアステラをこの眼で見た時、<b>あの</b>破滅の光景が脳裏に浮かぶ）"
translation = "（몬스터나 아스테라를 이 눈으로 보았을 때, <ruby>그<rt>·</rt></ruby> 파멸의 광경이 뇌리에 스친다）"

[[dialogue]]
speaker = "ジグ"
original = "（幻でも錯覚でもない。私がこの眼で見た可能性は実際に起こりうるもの）"
translation = "（환상도 착각도 아니다. 내가 이 눈으로 본 가능성은 실제로 일어날 수 있는 것）"

[[dialogue]]
speaker = "ジグ"
original = "（そして選ばれた『<ruby>可能性<rt>みらい</rt></ruby>』は、必ず現実になる）"
translation = "（그리고 선택된 『<ruby>가능성<rt>미래</rt></ruby>』은 반드시 현실이 된다）"

[[dialogue]]
speaker = "ジグ"
original = "（なのに全ての『<ruby>可能性<rt>みらい</rt></ruby>』が破滅に繋がっているのなら、世界は滅ぶしかないじゃないか）"
translation = "（그런데 모든 『<ruby>가능성<rt>미래</rt></ruby>』이 파멸로 이어져 있다면, 세계는 멸망할 수밖에 없지 않은가）"

[[dialogue]]
speaker = "ジグ"
original = "（私は星徒会長になり、先頭に立って数多くのモンスターを倒した）"
translation = "（나는 성도회장이 되어, 앞장서서 수많은 몬스터를 쓰러뜨렸다）"

[[dialogue]]
speaker = "ジグ"
original = "（星騎士の育成にも力を入れた。流星市国外の人材の確保も積極的に行った）"
translation = "（성기사 육성에도 힘을 쏟았다. 유성시국 외의 인재 확보도 적극적으로 행했다）"

[[dialogue]]
speaker = "ジグ"
original = "（市民の被害を度外視し、アステラの駆逐を優先した可能性も見た。それでもダメだった）"
translation = "（시민의 피해를 도외시하고 아스테라 구축을 우선한 가능성도 보았다. 그래도 안 됐다）"

[[dialogue]]
speaker = "ジグ"
original = "（星騎士たちを兵器として使い潰して戦う可能性もあった。だけど結局、破滅を止めることはできなかった）"
translation = "（성기사들을 병기로 소모하며 싸우는 가능성도 있었다. 하지만 결국 파멸을 막을 수는 없었다）"

[[dialogue]]
speaker = "ジグ"
original = "（幾千、幾万もの可能性を見た）"
translation = "（수천, 수만 가지의 가능성을 보았다）"

[[dialogue]]
speaker = "ジグ"
original = "（けれど同じ数の破滅が見えただけだった）"
translation = "（하지만 같은 수의 파멸이 보였을 뿐이었다）"

[[dialogue]]
speaker = "ジグ"
original = "（いつからだろう。どれだけ濃いコーヒーを飲んでも味がしなくなったのは）"
translation = "（언제부터였을까. 아무리 진한 커피를 마셔도 맛이 느껴지지 않게 된 것은）"

[[dialogue]]
speaker = "梨緒"
original = "「また、救えなかった……！\u3000私は、弱い……っ」"
translation = "「또, 구하지 못했어……! 나는, 약해……!」"

[[dialogue]]
speaker = "ジグ"
original = "（また泣いているのかい、アガサ）"
translation = "（또 울고 있는 거니, 아가사）"

[[dialogue]]
speaker = "ジグ"
original = "（自分の弱さに涙するなんて、悠長なことだ。だけどアガサが泣くのは、まだ諦めていないからかもしれないね）"
translation = "（자신의 약함에 눈물 흘리다니, 한가한 소리네. 하지만 아가사가 우는 건, 아직 포기하지 않았기 때문일지도 모르겠어）"

[[dialogue]]
speaker = "ジグ"
original = "「やぁ、アガサ。コーヒー飲むかい？」"
translation = "「안녕, 아가사. 커피 마실래?」"

[[dialogue]]
speaker = "梨緒"
original = "「──！\u3000見るな……」"
translation = "「──! 보지 마……」"

[[dialogue]]
speaker = "ジグ"
original = "「君が泣き虫なのはとっくに知ってるよ。今さらじゃないか」"
translation = "「네가 울보라는 건 진작에 알고 있어. 이제 와서 새삼스럽게」"

[[dialogue]]
speaker = "梨緒"
original = "「うる……さい……」"
translation = "「시끄러……워……」"

[[dialogue]]
speaker = "梨緒"
original = "「だいたい、君は今……」"
translation = "「그보다, 너는 지금……」"

[[dialogue]]
speaker = "ジグ"
original = "「出撃中のはずだって？\u3000今日は想定よりモンスターが少なくてね、さくっと終わらせて帰ってきたよ」"
translation = "「출격 중이어야 하는 거 아니냐고? 오늘은 예상보다 몬스터가 적어서 말이야, 후딱 끝내고 돌아왔어」"

[[dialogue]]
speaker = "ジグ"
original = "「いやぁ、最近出撃ばかりだったから、ようやく少し休めるね」"
translation = "「이야, 요즘 계속 출격뿐이었으니까 겨우 좀 쉴 수 있겠네」"

[[dialogue]]
speaker = "ジグ"
original = "（明日にはモンスターの大群が現れることは見えているんだけど……でも今は言えないか）"
translation = "（내일이면 몬스터 대군이 나타날 거라는 게 보이지만…… 지금은 말할 수 없으려나）"

[[dialogue]]
speaker = "梨緒"
original = "「……流星市国以外にもモンスターが現れるのが当たり前になり、各地で大きな被害が出ている。関東だけでもいくつもの都市が壊滅した」"
translation = "「……유성시국 이외에도 몬스터가 나타나는 게 당연해졌고, 각지에서 큰 피해가 나오고 있어. 관동 지역만 해도 여러 도시가 괴멸했어」"

[[dialogue]]
speaker = "梨緒"
original = "「人類の生存圏は刻一刻と狭まり、今もどこかで犠牲が出ている……」"
translation = "「인류의 생존권은 시시각각 좁아지고, 지금도 어딘가에서 희생이 나오고 있는데……」"

[[dialogue]]
speaker = "ジグ"
original = "「ああ、そうだね。その通りだ」"
translation = "「아아, 그렇네. 네 말이 맞아」"

[[dialogue]]
speaker = "ジグ"
original = "「でも、勝つよ」"
translation = "「하지만, 이길 거야」"

[[dialogue]]
speaker = "ジグ"
original = "（勝てたらいいんだけどね）"
translation = "（이길 수 있다면 좋겠지만 말이야）"

[[dialogue]]
speaker = "梨緒"
original = "「だけど……！\u3000このままでは世界は……！」"
translation = "「하지만……! 이대로라면 세계는……!」"

[[dialogue]]
speaker = "ジグ"
original = "「大丈夫、何とかなるさ」"
translation = "「괜찮아, 어떻게든 될 거야」"

[[dialogue]]
speaker = "ジグ"
original = "「根拠もなく気休めを言っているわけじゃないよ」"
translation = "「근거도 없이 위로하는 게 아니야」"

[[dialogue]]
speaker = "ジグ"
original = "「３０００年前、以前のリクリエの時だって世界は滅亡の間際まで追い詰められた」"
translation = "「3000년 전, 이전의 리크리에 때도 세계는 멸망 직전까지 몰렸었어」"

[[dialogue]]
speaker = "ジグ"
original = "（なんて、３０００年前がどうだったかは知らないけれど。もしかしたらすでに、３０００年前より状況は悪くなっているかもしれない）"
translation = "（라니, 3000년 전이 어땠는지는 모르겠지만. 어쩌면 이미 3000년 전보다 상황이 나빠졌을지도 몰라）"

[[dialogue]]
speaker = "ジグ"
original = "「だけど世界は破滅に打ち勝った。だから今がある」"
translation = "「하지만 세계는 파멸을 이겨냈어. 그래서 지금이 있는 거야」"

[[dialogue]]
speaker = "ジグ"
original = "「可能性は残されている。私はそう思うよ」"
translation = "「가능성은 남아 있어. 나는 그렇게 생각해」"

[[dialogue]]
speaker = "梨緒"
original = "「ジグ……」"
translation = "「지그……」"

[[dialogue]]
speaker = "ジグ"
original = "（可能性は残されている……か。我ながら口がよく回る）"
translation = "（가능성은 남아 있다……라니. 나도 참 말이 잘 나오네）"

[[dialogue]]
speaker = "ジグ"
original = "（そんな可能性がないことなんて、私が一番よく知っているというのに。どこかにあるなら私が見せてほしいくらいだ）"
translation = "（그런 가능성 따위 없다는 걸 내가 제일 잘 알고 있는데. 어딘가에 있다면 나한테 좀 보여줬으면 싶을 정도야）"

[[dialogue]]
speaker = "ジグ"
original = "（騙してごめん、アガサ）"
translation = "（속여서 미안해, 아가사）"

[[dialogue]]
speaker = "ジグ"
original = "（私は新星学園の星徒会長。つまり世界最強の星騎士だ）"
translation = "（나는 신성학원의 성도회장. 즉 세계 최강의 성기사다）"

[[dialogue]]
speaker = "ジグ"
original = "（もし私が『世界を救える可能性はない』と言ってしまえば、星騎士も市民も絶望してしまうだろう）"
translation = "（만약 내가 『세계를 구할 가능성은 없다』고 말해버리면, 성기사도 시민도 절망해버리겠지）"

[[dialogue]]
speaker = "ジグ"
original = "（実際、その『<ruby>可能性<rt>みらい</rt></ruby>』も見てみた。結果は──やはり凄惨なものだった）"
translation = "（실제로 그 『<ruby>가능성<rt>미래</rt></ruby>』도 보았어. 결과는── 역시 처참한 것이었지）"

[[dialogue]]
speaker = "ジグ"
original = "（私は諦めないふりをして、偽物の希望を示しながら、ただ奇跡を待った。破滅を覆す奇跡を）"
translation = "（나는 포기하지 않은 척하며 가짜 희망을 보여주면서, 그저 기적을 기다렸어. 파멸을 뒤엎을 기적을）"

[[dialogue]]
speaker = "ジグ"
original = "（もし私が見た可能性を覆すことができるとしたら、それは奇跡に他ならない）"
translation = "（만약 내가 본 가능성을 뒤엎을 수 있다면, 그것은 기적에 다름없어）"

[[dialogue]]
speaker = "ジグ"
original = "（だけど奇跡は起きなかった）"
translation = "（하지만 기적은 일어나지 않았어）"

[[dialogue]]
speaker = "ジグ"
original = "（無辜の人々が死に、星騎士が倒れ、街が滅びて……私が見た『<ruby>可能性<rt>みらい</rt></ruby>』が刻一刻と近づいてきた）"
translation = "（무고한 사람들이 죽고, 성기사가 쓰러지고, 거리가 멸망하고…… 내가 본 『<ruby>가능성<rt>미래</rt></ruby>』이 시시각각 다가왔어）"

[[dialogue]]
speaker = "ジグ"
original = "（私はいつしか奇跡を願うことすら忘れ、全てが早く終わることだけを願うようになっていた）"
translation = "（나는 어느샌가 기적을 바라는 것조차 잊고, 모든 것이 빨리 끝나기만을 바라게 되었지）"

[[dialogue]]
speaker = "ジグ"
original = "（そしてエリシアもフィオナも死に、終焉が訪れた）"
translation = "（그리고 엘리시아도 피오나도 죽고, 종언이 찾아왔어）"

[[dialogue]]
speaker = "梨緒"
original = "「フィオ……ナ……あぁ……うぅ……」"
translation = "「피오……나…… 아아…… 으으……」"

[[dialogue]]
speaker = "ジグ"
original = "「やぁ生きてるかい、アガサ」"
translation = "「여어, 살아있니, 아가사」"

[[dialogue]]
speaker = "梨緒"
original = "「ジグ！？\u3000まだ生きて……！？」"
translation = "「지그!? 아직 살아……!?」"

[[dialogue]]
speaker = "ジグ"
original = "「すまない、少し気を失っていたようだ。だけど私はまだ戦えるよ」"
translation = "「미안, 잠시 정신을 잃었던 것 같아. 하지만 난 아직 싸울 수 있어」"

[[dialogue]]
speaker = "ジグ"
original = "（出血はひどいし、死にかけなんだけど。世界の終焉に立ち会ってしまうのは、幸運なのか不運なのか……）"
translation = "（출혈은 심하고 죽기 직전이지만. 세계의 종언을 지켜보게 된 건 행운일까 불운일까……）"

[[dialogue]]
speaker = "梨緒"
original = "「私も……まだ、諦めていない……！\u3000この世界を、守るんだ……！」"
translation = "「나도…… 아직, 포기하지 않았어……! 이 세계를, 지킬 거야……!」"

[[dialogue]]
speaker = "ジグ"
original = "「ああ、それでこそアガサだ。倒れていったみんなの分まで頑張ろう」"
translation = "「아아, 그래야 아가사지. 쓰러져간 모두의 몫까지 힘내자」"

[[dialogue]]
speaker = "ジグ"
original = "（アガサってば、私のセリフを言葉通りに受け取って、まだ諦めてない顔をしてる）"
translation = "（아가사 녀석, 내 말을 곧이곧대로 받아들이고 아직 포기하지 않은 얼굴을 하고 있어）"

[[dialogue]]
speaker = "ジグ"
original = "（この期に及んでというか、さすがアガサというか……諦めないまま死ぬことができるのは、それはそれで幸せなことかもしれない）"
translation = "（이 지경이 되어서까지라고 해야 할지, 역시 아가사라고 해야 할지…… 포기하지 않은 채 죽을 수 있다는 건, 그건 그것대로 행복한 일일지도 모르겠네）"

[[dialogue]]
speaker = "ジグ"
original = "（ああ、あの手が世界を滅ぼす）"
translation = "（아아, 저 손이 세계를 멸망시킨다）"

[[dialogue]]
speaker = "ジグ"
original = "（私にはこの『<ruby>可能性<rt>みらい</rt></ruby>』が見えていたのに、それを現実にしてしまった）"
translation = "（나에게는 이 『<ruby>가능성<rt>미래</rt></ruby>』이 보였는데도, 그것을 현실로 만들고 말았어）"

[[dialogue]]
speaker = "ジグ"
original = "（私は最善を尽くしたつもりで、みんなを滅びに導いただけだったのかもしれない）"
translation = "（나는 최선을 다한답시고 모두를 멸망으로 인도했을 뿐인지도 몰라）"

[[dialogue]]
speaker = "ジグ"
original = "（ごめんね、アガサ。私がもっと強ければ、世界を救えたのに──）"
translation = "（미안해, 아가사. 내가 좀 더 강했다면 세계를 구했을 텐데──）"

[[dialogue]]
speaker = "梨緒"
original = "「あ……あああああっ……！！」"
translation = "「아…… 아아아아앗……!!」"

[[dialogue]]
speaker = "梨緒"
original = "「うああ……あっ……ああぁああぁあぁっ！！」"
translation = "「으아아…… 앗…… 아아아아아아아앗!!」"

[[dialogue]]
speaker = "梨緒"
original = "「うぁ……ぅっ……うぅぅ……ジグは……ジグは……」"
translation = "「으아…… 윽…… 으으으…… 지그는…… 지그는……」"

[[dialogue]]
speaker = "梨緒"
original = "「私は……何も知らなくて……っ……うああっ……！」"
translation = "「나는…… 아무것도 모르고…… 윽…… 으아앗……!」"

[[dialogue]]
speaker = "unk"
original = "勘違いしていた。"
translation = "착각하고 있었다."

[[dialogue]]
speaker = "unk"
original = "ジグは誰よりも強くて、どんなに危機的な状況でも、希望を失わずに戦っているのだと。"
translation = "지그는 누구보다 강하고, 어떤 위기 상황에서도 희망을 잃지 않고 싸우는 것이라고."

[[dialogue]]
speaker = "unk"
original = "だけど違った。"
translation = "하지만 아니었다."

[[dialogue]]
speaker = "unk"
original = "ジグは絶望していた。"
translation = "지그는 절망하고 있었다."

[[dialogue]]
speaker = "unk"
original = "泣いている梨緒に寄り添ってくれている間も、たった１人で、暗い闇の中にいた。"
translation = "울고 있는 리오의 곁을 지켜주는 동안에도, 홀로 어두운 어둠 속에 있었다."

[[dialogue]]
speaker = "ジグ"
original = "「いやぁ、レナーテという星騎士はもう他人だと思っていたけど、赤裸々に記憶を見られるのは気恥ずかしいね」"
translation = "「이야, 레나테라는 성기사는 이제 타인이라고 생각했는데, 적나라하게 기억을 들키는 건 쑥스럽네」"

[[dialogue]]
speaker = "unk"
original = "場違いな照れ笑いを浮かべるジグ。"
translation = "상황에 어울리지 않는 수줍은 미소를 짓는 지그."

[[dialogue]]
speaker = "unk"
original = "しかし口元の笑みを消すと、梨緒に向かってゆっくり歩いてくる。"
translation = "그러나 입가의 미소를 지우더니, 리오를 향해 천천히 걸어온다."

[[dialogue]]
speaker = "ジグ"
original = "「アガサ」"
translation = "「아가사」"

[[dialogue]]
speaker = "ジグ"
original = "「私は君のことが嫌いだった」"
translation = "「나는 네가 싫었어」"

[[dialogue]]
speaker = "ジグ"
original = "「私より弱いくせに諦めが悪くて、本当に不快だった」"
translation = "「나보다 약한 주제에 포기할 줄 몰라서, 정말 불쾌했지」"

[[dialogue]]
speaker = "ジグ"
original = "「世界を救えもしないのに、諦めないところだけは一人前で滑稽だったよ」"
translation = "「세계를 구하지도 못하면서 포기하지 않는 것만은 일류라니, 우스꽝스러웠어」"

[[dialogue]]
speaker = "梨緒"
original = "「ジグ……」"
translation = "「지그……」"

[[dialogue]]
speaker = "梨緒"
original = "「私は……君のおかげで、戦うことが、できて……」"
translation = "「나는…… 너 덕분에 싸울 수 있었고……」"

[[dialogue]]
speaker = "梨緒"
original = "「でも私は……私はぁ……っ」"
translation = "「하지만 나는…… 나는…… 윽」"

[[dialogue]]
speaker = "ジグ"
original = "「ああ、何の役にも立たなかった。君は何もできなかった」"
translation = "「아아, 아무런 도움이 되지 않았지. 너는 아무것도 할 수 없었어」"

[[dialogue]]
speaker = "梨緒"
original = "「うぅっ……うぅぅっ……」"
translation = "「으윽…… 으으윽……」"

[[dialogue]]
speaker = "unk"
original = "星徒会の仲間としてジグの近くにいたはずなのに、その絶望に気付くことができなかった。"
translation = "성도회의 동료로서 지그의 곁에 있었음에도, 그 절망을 알아채지 못했다."

[[dialogue]]
speaker = "unk"
original = "それどころか、ずっとジグを頼ってばかりいた。"
translation = "그뿐만 아니라, 줄곧 지그에게 의지하기만 했다."

[[dialogue]]
speaker = "unk"
original = "ジグの絶望の深さと、自分の無力に打ちひしがれる。"
translation = "지그의 절망의 깊이와 자신의 무력함에 짓눌린다."

[[dialogue]]
speaker = "ジグ"
original = "「でもいいんだよ」"
translation = "「하지만 괜찮아」"

[[dialogue]]
speaker = "梨緒"
original = "「え──？」"
translation = "「에──?」"

[[dialogue]]
speaker = "ジグ"
original = "「私たちは負けた。ベガは滅びた」"
translation = "「우리는 졌어. 베가는 멸망했지」"

[[dialogue]]
speaker = "ジグ"
original = "「それはもういい。だから──」"
translation = "「그건 이제 됐어. 그러니까──」"

[[dialogue]]
speaker = "ジグ"
original = "「一緒に世界をやり直そう、アガサ」"
translation = "「같이 세계를 다시 시작하자, 아가사」"

