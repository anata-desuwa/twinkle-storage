[[dialogue]]
speaker = "unk"
original = "第２話,あざといメロウメロン,P"
translation = "제2화, 영악한 멜로우 멜론, P"

[[dialogue]]
speaker = "unk"
original = "リーリアと知り合ってから、１ヵ月程が経ったある日──"
translation = "리리아와 알게 된 지 한 달 정도 지난 어느 날──"

[[dialogue]]
speaker = "リーリア"
original = "「セ～ンパイ♪\u3000今日も遊びに来ちゃいました☆」"
translation = "「선~배♪ 오늘도 놀러 와버렸어요☆」"

[[dialogue]]
speaker = "リーリア"
original = "「おや、どうしました？\u3000物言いたげな顔をして。遠慮などせず、私の可愛さを存分に褒め称えてくれてもいいんですよ？」"
translation = "「어라, 왜 그러세요? 할 말이 있다는 듯한 얼굴을 하고. 사양 말고 저의 귀여움을 마음껏 칭찬해 주셔도 된다고요?」"

[[dialogue]]
speaker = "unk"
original = "全然変わりないなと思って"
translation = "전혀 변함이 없구나 싶어서"

[[dialogue]]
speaker = "unk"
original = "いや、一目惚れが嘘だとバレたのに、"
translation = "아니, 첫눈에 반했다는 게 거짓말인 거 들켰는데도,"

[[dialogue]]
speaker = "unk"
original = "──リーリアの言動があざといので、つい先日、一目惚れは嘘だったのではとツッコんだら、「バレちゃいました？\u3000てへぺろ☆」とあっさり認めたのだった。"
translation = "──리리아의 언행이 영악해서, 바로 전날 첫눈에 반했다는 건 거짓말 아니었냐고 찌르자, 「들켰나요? 데헤페로☆」라며 순순히 인정했던 것이었다."

[[dialogue]]
speaker = "リーリア"
original = "「いや～、だって今更じゃないですか？\u3000私はもう、センパイの可愛い後輩なわけですし♪」"
translation = "「아니~ 그치만 이제 와서 상관없지 않나요? 저는 이미 선배의 귀여운 후배인 셈이고요♪」"

[[dialogue]]
speaker = "リーリア"
original = "「私はセンパイとお近づきになりたい。センパイは可愛い私を享受できる」"
translation = "「저는 선배와 가까워지고 싶고, 선배는 귀여운 저를 누릴 수 있죠」"

[[dialogue]]
speaker = "リーリア"
original = "「──これってまさに、利害一致した美しい『ウィンウィン』の関係というやつですよね♪」"
translation = "「──이거야말로 바로 이해관계가 일치한 아름다운 『윈윈』 관계라는 거잖아요♪」"

[[dialogue]]
speaker = "リーリア"
original = "「というわけで、え～い☆」"
translation = "「그런 의미에서, 에잇☆」"

[[dialogue]]
speaker = "リーリア"
original = "「センパ～イ、可愛い後輩と遊んで下さい～♪」"
translation = "「선~배, 귀여운 후배랑 놀아주세요~♪」"

[[dialogue]]
speaker = "unk"
original = "あー、はいはい、そういうあざといのはいいから"
translation = "아─ 예예, 그런 영악한 건 됐으니까"

[[dialogue]]
speaker = "リーリア"
original = "「真顔でスルー！？」"
translation = "「정색하며 무시!?」"

[[dialogue]]
speaker = "リーリア"
original = "「センパイ最近、私の扱い雑になってません！？」"
translation = "「선배 요즘 저를 대하는 게 너무 대충 아니에요!?」"

[[dialogue]]
speaker = "リーリア"
original = "「というか、私のような美少女にボディータッチされてるのに、どうして喜ばないんですか！？\u3000利害一致してますよね！？」"
translation = "「그보다 나 같은 미소녀가 바디 터치를 하고 있는데 왜 기뻐하지 않는 거예요!? 이해관계 일치하잖아요!?」"

[[dialogue]]
speaker = "unk"
original = "素の性格を見せるようになったよね"
translation = "본래 성격을 보여주게 됐네"

[[dialogue]]
speaker = "unk"
original = "リーリアの方はいつの間にか、"
translation = "리리아 쪽은 어느새,"

[[dialogue]]
speaker = "リーリア"
original = "「センパイが面倒臭いせいです！\u3000普通の男性は、美少女がこうやって腕に抱き付いて来たら、もっとデレデレするもんでしょう！？」"
translation = "「선배가 까다로운 탓이에요! 보통 남자는 미소녀가 이렇게 팔에 매달려 오면 더 헤벌레하는 법이라고요!?」"

[[dialogue]]
speaker = "リーリア"
original = "「って、センパイ、なに平然と仕事しちゃってるんですか！\u3000せめて可愛い後輩とイチャイチャトークくらいして下さいよ～！」"
translation = "「그보다 선배, 왜 태연하게 일하고 있는 거예요! 적어도 귀여운 후배랑 꽁냥꽁냥 토크 정도는 해달라고요~!」"

[[dialogue]]
speaker = "サーシャ"
original = "「お疲れ様～……って、あら～？」"
translation = "「수고했어~…… 어라라~?」"

[[dialogue]]
speaker = "サーシャ"
original = "「あらあら♪\u3000会長くんとリーリアちゃん、何だか楽しそうなことしてるわね～♪」"
translation = "「어머어머♪ 회장군이랑 리리아짱, 왠지 즐거운 일을 하고 있네~♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「お姉ちゃんも混ぜて～♪」"
translation = "「누나도 끼워줘~♪」"

[[dialogue]]
speaker = "unk"
original = "ちょっ、サーシャさん！？"
translation = "잠깐, 사샤 씨!?"

[[dialogue]]
speaker = "リーリア"
original = "「まさかの乱入！？」"
translation = "「설마 했던 난입!?」"

[[dialogue]]
speaker = "サーシャ"
original = "「あらあら、会長くん？\u3000もしかしてお姉ちゃんに抱き着かれて、照れてるのかしら♪\u3000うふふ、顔が赤くなってるわよ～？」"
translation = "「어머어머, 회장군? 혹시 누나가 안아줘서 부끄러운 걸까♪ 우후후, 얼굴이 빨개졌어~?」"

[[dialogue]]
speaker = "unk"
original = "胸が当たってるので、あんまり密着されると、その……"
translation = "가슴이 닿고 있어서, 너무 밀착하면 그게……"

[[dialogue]]
speaker = "リーリア"
original = "「いや、なんでサーシャさんの時だけそういう反応！？\u3000理不尽なんですけど！」"
translation = "「아니, 왜 사샤 씨 때만 그런 반응!? 불공평하다고요!」"

[[dialogue]]
speaker = "リーリア"
original = "「やはりおっぱいですか！？\u3000おっぱいの大きさが問題なんですか！？」"
translation = "「역시 가슴인가요!? 가슴 크기가 문제인 건가요!?」"

[[dialogue]]
speaker = "unk"
original = "天然でやってて不意打ちっていうか……"
translation = "천연으로 하는 거라 기습이랄까……"

[[dialogue]]
speaker = "unk"
original = "サーシャさんの場合、"
translation = "사샤 씨의 경우,"

[[dialogue]]
speaker = "リーリア"
original = "「天然！？\u3000天然って、はっ……！」"
translation = "「천연!? 천연이라니, 핫……!」"

[[dialogue]]
speaker = "リーリア"
original = "「ま、まさかセンパイ──」"
translation = "「설, 설마 선배──」"

[[dialogue]]
speaker = "リーリア"
original = "「私の胸が……<ruby>偽乳<rt>パッド入り</rt></ruby>だって、気付いてたんですか！？」"
translation = "「내 가슴이…… 가짜 가슴이라는 거, 눈치채고 있었던 거예요!?」"

[[dialogue]]
speaker = "サーシャ"
original = "「えっ？\u3000そうだったの……？」"
translation = "「엣? 그랬던 거야……?」"

[[dialogue]]
speaker = "unk"
original = "スルーしてたのに……"
translation = "무시하고 있었는데……"

[[dialogue]]
speaker = "unk"
original = "実はそうかなって思ってたけど、"
translation = "사실 그렇지 않을까 생각했지만,"

[[dialogue]]
speaker = "リーリア"
original = "「ぬあぁぁぁ！\u3000まさかの自爆カミングアウトだったぁぁぁ！」"
translation = "「누아아아아! 설마 했던 자폭 커밍아웃이었다아아아!」"

[[dialogue]]
speaker = "リーリア"
original = "「センパイのバカ！\u3000鬼畜！」"
translation = "「선배 바보! 귀축!」"

[[dialogue]]
speaker = "unk"
original = "俺のせいじゃなくない！？"
translation = "내 탓이 아니잖아!?"

[[dialogue]]
speaker = "リーリア"
original = "「センパイのおっぱい星人～！！！」"
translation = "「선배 이 가슴 성인~~!!!」"

[[dialogue]]
speaker = "サーシャ"
original = "「あらあら。リーリアちゃん、逃げちゃったわね～」"
translation = "「어머어머. 리리아짱, 도망가 버렸네~」"

[[dialogue]]
speaker = "サーシャ"
original = "「……ねぇ、会長くん。本当はリーリアちゃんにくっ付かれて、ドキドキしてたんじゃない？」"
translation = "「……있지, 회장군. 사실은 리리아짱이 달라붙어서 두근거렸던 거 아냐?」"

[[dialogue]]
speaker = "サーシャ"
original = "「うふふ～♪\u3000誤魔化してても、お姉ちゃんには分かっちゃうんだから。……意地になるリーリアちゃんが可愛いから、何でもないフリしてからかっちゃうんでしょう？」"
translation = "「우후후~♪ 얼버무려도 누나는 다 안다니까. ……안달복달하는 리리아짱이 귀여우니까 아무렇지 않은 척 놀리는 거지?」"

[[dialogue]]
speaker = "サーシャ"
original = "「でも、たまにはちゃんとフォローしてあげなきゃダメよ？\u3000口にしなきゃ伝わらないこともあるってことは、会長くんが私に教えてくれたことでしょう？」"
translation = "「하지만 가끔은 제대로 챙겨줘야 한다고? 말하지 않으면 전해지지 않는 것도 있다는 건 회장군이 나한테 가르쳐준 거잖아?」"

[[dialogue]]
speaker = "unk"
original = "（確かに、今回はやりすぎたかも……）"
translation = "(확실히 이번엔 좀 심했을지도……)"

[[dialogue]]
speaker = "unk"
original = "後でリーリアに何かお詫びをしよう、と俺は考え始めるのだった。"
translation = "나중에 리리아에게 뭔가 사과를 해야겠다고 나는 생각하기 시작했다."

