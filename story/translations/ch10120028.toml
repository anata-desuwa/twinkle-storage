[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「良い式でしたね」"
translation = "「좋은 예식이었네요」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ」"
translation = "「아아」"

[[dialogue]]
speaker = "unk"
original = "披露宴を終えた後、２人してチャペルに戻ってくる。"
translation = "피로연을 마친 뒤, 둘이서 채플로 돌아온다."

[[dialogue]]
speaker = "unk"
original = "みんな二次会に行く準備をしているんだろう。ここで誓いの言葉を口にした時とは反対に、中はとても静かだった。"
translation = "모두 2차 파티에 갈 준비를 하고 있겠지. 여기서 맹세의 말을 입에 담았을 때와는 반대로, 안은 매우 정적이었다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「まだ心臓が早鐘を打っております。頭の中もまるで夢でも見ているように朧気で」"
translation = "「아직 심장이 요동치고 있습니다. 머릿속도 마치 꿈이라도 꾸고 있는 것처럼 몽롱해서」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「いついかなる時も冷静沈着にいられる。それが私の取り柄だと自負しておりましたが……ふふ。どうやら見当違いでしたね」"
translation = "「언제 어느 때라도 냉정 침착하게 있을 수 있다. 그것이 제 장점이라고 자부하고 있었습니다만…… 후후. 아무래도 착각이었나 보네요」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「けれど、このままドキドキフワフワしていたいです。とても……本当にとても、幸せな気分ですので……」"
translation = "「하지만 이대로 두근두근 둥실둥실하고 싶습니다. 너무나…… 정말 너무나도 행복한 기분이라서……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「綺麗だよ、キリカ」"
translation = "「예뻐, 키리카」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ふふ。あなたも……いえ。旦那様も、格好良いですよ？」"
translation = "「후후. 당신도…… 아니요. 서방님도 멋지시답니다?」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ん……ちゅっ……んふ……<emoji=heart04>」"
translation = "「응…… 츄…… 응후……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "どちらともなくお互いの身体を抱き締めて唇を重ねる。"
translation = "누가 먼저랄 것도 없이 서로의 몸을 껴안고 입술을 겹친다."

[[dialogue]]
speaker = "unk"
original = "キスくらい恋人の頃から何度もしているはずなのに、結婚式を終えた今、より大きな幸せが心に広がっていく。"
translation = "키스 정도는 연인 시절부터 몇 번이고 했을 텐데, 결혼식을 마친 지금 더 큰 행복이 마음속에 퍼져 나간다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「好き……好きですよ。旦那様……」"
translation = "「좋아해요…… 좋아합니다. 서방님……」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「旦那様、旦那様……旦那様……」"
translation = "「서방님, 서방님…… 서방님……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……何度も囁かれると恥ずかしいって」"
translation = "「……몇 번이나 속삭여지니 부끄러운데」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ふふ、私もです。だからこそ、いち早く慣れねばと思いまして。呼ぶだけで照れるようでは生活に支障が出ますから」"
translation = "「후후, 저도 마찬가지입니다. 그렇기에 하루빨리 익숙해져야겠다고 생각해서요. 부르는 것만으로 수줍어해서는 생활에 지장이 생길 테니까요」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「旦那様……ああ旦那様……ん、ちゅっ、愛しておりますよ、旦那様……」"
translation = "「서방님…… 아아 서방님…… 응, 츄, 사랑합니다, 서방님……」"

[[dialogue]]
speaker = "unk"
original = "頬ずりしながらキリカが幾度も囁いてくれる。"
translation = "뺨을 부비며 키리카가 몇 번이고 속삭여 준다."

[[dialogue]]
speaker = "unk"
original = "旦那様と呼ばれるたび、ドレス姿を目にするたびに、キリカと結婚できたのだと実感する。"
translation = "서방님이라 불릴 때마다, 드레스 차림을 눈에 담을 때마다, 키리카와 결혼했다는 것이 실감 난다."

[[dialogue]]
speaker = "unk"
original = "すると、どうしようもなく愛が膨れあがってしまって──"
translation = "그러자 걷잡을 수 없이 사랑이 부풀어 올라서──"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「……くすくす。やはり早く慣れていただかねばなりませんね？」"
translation = "「……쿠스쿠스. 역시 빨리 익숙해지셔야겠군요?」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「旦那様と呼ぶだけで、こうも興奮されてしまっては……この子のお世話をするだけで一日が終わってしまいます」"
translation = "「서방님이라고 부르는 것만으로 이렇게나 흥분해 버리시면…… 이 아이를 돌보는 것만으로 하루가 끝나버리겠어요」"

[[dialogue]]
speaker = "unk"
original = "おもむろに俺の服を脱がしながら、キリカが硬くなった股間を愛おしげに撫でてくれる。"
translation = "느닷없이 내 옷을 벗기면서, 키리카가 단단해진 가랑이를 사랑스럽게 쓰다듬어 준다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「お胸で失礼いたしますね……？\u3000いま挿れてしまうと……旦那様に可愛がっていただく羽目になりそうですから……」"
translation = "「가슴으로 실례하겠습니다……? 지금 삽입해 버리면…… 서방님께 귀여움받는 처지가 될 것 같으니까요……」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「妻として……まずは愛する旦那様にご奉仕させていただきたいのです。この想いを、どうか受け取ってくださいませ……」"
translation = "「아내로서…… 우선은 사랑하는 서방님께 봉사해 드리고 싶습니다. 이 마음을 부디 받아주세요……」"

[[dialogue]]
speaker = "unk"
original = "そしてキリカは淑やかに俺の前に跪くと──"
translation = "그리고 키리카는 조신하게 내 앞에 무릎을 꿇더니──"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「んっ……れろぉ……<emoji=heart04>\u3000ん、はぁ……<emoji=heart04>」"
translation = "「응…… 레로오……<emoji=heart04> 응, 하아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "貞淑な所作とは裏腹に艶めかしく舌先を伸ばして、乳房で包み込んだペニスをチロチロと舐めてくれる。"
translation = "정숙한 몸가짐과는 딴판으로 요염하게 혀끝을 내밀어, 유방으로 감싸 안은 페니스를 할짝할짝 핥아 준다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「あぁ旦那様の……ちゅっ、ぺるるっ……恋人の頃より大きい……<emoji=heart04>」"
translation = "「아아 서방님의…… 츄, 페루룻…… 연인 시절보다 커요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「嬉しい、です……<emoji=heart04>\u3000んっ、ふぁっ……私との結婚を心から喜んでいただけているみたいで……<emoji=heart04>」"
translation = "「기뻐요……<emoji=heart04> 응, 화앗…… 저와의 결혼을 진심으로 기뻐해 주시는 것 같아서……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺も嬉しくて仕方なかった。"
translation = "나도 기뻐서 어쩔 줄 몰랐다."

[[dialogue]]
speaker = "unk"
original = "恋人の頃よりも熱く火照ったキリカの乳房が、蕩けるような唾液まみれの舌先が、彼女の喜びをこれでもかと教えてくれて。"
translation = "연인 시절보다 더 뜨겁게 달아오른 키리카의 유방이, 녹아내릴 듯한 침 범벅인 혀끝이 그녀의 기쁨을 이보다 더할 수 없을 정도로 가르쳐 주어서."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「んっ、じゅるる……っ、どうか、受け取ってくださいませ……<emoji=heart04>\u3000私はどうも感情の表現が苦手でございますから……<emoji=heart04>」"
translation = "「응, 쥬루루…… 부디 받아주세요……<emoji=heart04> 저는 아무래도 감정 표현이 서툴러서요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「このご奉仕で、んっ、れるっ、んっ、ちゅぁ、私の心を知っていただきたいのです……<emoji=heart04>」"
translation = "「이 봉사로, 응, 레룻, 응, 츄아, 제 마음을 알아주셨으면 합니다……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「私がどれだけ旦那様を愛しているのか、んちゅぁ、旦那様の花嫁となれて、どれだけ舞い上がってしまっているのか……<emoji=heart04>」"
translation = "「제가 얼마나 서방님을 사랑하는지, 응츄아, 서방님의 신부가 되어 얼마나 들떠 있는지……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「旦那様のおち○ぽ様に気持ち良くなっていただきながら……れろろぉ、んちゅぁ、んっ、ふっ、たっぷりとお伝えしたくて……<emoji=heart04>」"
translation = "「서방님의 자지 님께서 기분 좋아지시게 하면서…… 레로로오, 응츄아, 응, 훗, 듬뿍 전해드리고 싶어서……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスにまで様を付けられて、思わずビクンと肉竿を震わせてしまう。"
translation = "페니스에까지 '님'을 붙이는 바람에 나도 모르게 움찔하며 육봉을 떨고 만다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ふふ、いつものようにおち○ちんとお呼びした方が良かったですか？」"
translation = "「후후, 평소처럼 자지라고 부르는 편이 좋았나요?」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「私としては……んっ、ぺろぉ、れろろぉ、是非おち○ぽ様と呼ばせていただきたいです……<emoji=heart04>」"
translation = "「저로서는…… 응, 페로오, 레로로오, 부디 자지 님이라고 부르게 해주셨으면 합니다……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「旦那様に身も心も捧げた証として、ちゅっ、んっ……<emoji=heart04>\u3000どうかどうか、この妻にお許しください……<emoji=heart04>」"
translation = "「서방님께 몸도 마음도 바친 증거로서, 츄, 응……<emoji=heart04> 부디 부디 이 아내에게 허락해 주세요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "言葉にする前にペニスが答えてしまっていた。ビクンビクンと嬉しそうに跳ねて、キリカの想いに頷くように猛る。"
translation = "말로 하기 전에 페니스가 대답해 버렸다. 움찔움찔 기쁜 듯이 튀어 오르며 키리카의 마음에 화답하듯 사납게 일어선다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ありがとうございます、お優しい旦那様……<emoji=heart04>」"
translation = "「감사합니다, 다정한 서방님……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「であれば私も花嫁として……より旦那様とおち○ぽ様を悦ばせねばなりませんね……<emoji=heart04>\u3000失礼、します……<emoji=heart04>」"
translation = "「그렇다면 저도 신부로서…… 더욱 서방님과 자지 님을 기쁘게 해드려야겠군요……<emoji=heart04> 실례하겠습니다……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "するとキリカは口を大きく開いて──"
translation = "그러자 키리카는 입을 크게 벌리고──"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「んっ、ぢゅぱっ……ぢゅぷっ、れるるっ、んっぷぅ……<emoji=heart04>」"
translation = "「응, 쥬팟…… 쥬풋, 레루룻, 응뿌우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「んふぅんっ、んっ、んんっ、いかがでしゅか、旦那しゃま……<emoji=heart04>」"
translation = "「응후웅, 응, 응응, 어떠셰요, 셔방님……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "先端をずっぽりと咥え込んだまま、豊満な乳房を上下させてペニスを扱いてくれる。"
translation = "끝부분을 푹 물어버린 채, 풍만한 유방을 위아래로 움직이며 페니스를 훑어 준다."

[[dialogue]]
speaker = "unk"
original = "上品で丁寧な舌遣いが気持ちいい。"
translation = "우아하고 정중한 혀 놀림이 기분 좋다."

[[dialogue]]
speaker = "unk"
original = "おっぱいの柔らかさと弾力を一度に味わわせてくれる圧迫感がとても心地よくて、キリカの口内でペニスが跳ねてしまう。"
translation = "가슴의 부드러움과 탄력을 동시에 맛보게 해주는 압박감이 너무나 기분 좋아서, 키리카의 입안에서 페니스가 튀어 오른다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「んふふ……<emoji=heart04>\u3000おひ○ぽしゃまが悦んでくだしゃっへりゅの、ぢゅぱっ、ぢゅぷぷっ、はっきりわかりましゅ……<emoji=heart04>」"
translation = "「응후후……<emoji=heart04> 자지 님이 기뻐해 쥬시는 거, 쥬팟, 쥬푸풋, 확실히 알겠어효……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「うれひい……<emoji=heart04>\u3000じゅぶぶぅっ、れろろぉぉ……<emoji=heart04>\u3000恋人の頃にしへいた時より、精をだしへしまっへ……<emoji=heart04>」"
translation = "「기뻐효……<emoji=heart04> 쥬부부웃, 레로로오오……<emoji=heart04> 연인 시절에 하던 것보랴 졍성을 랴해 벼려서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「しゅき……<emoji=heart04>\u3000しゅきれふ、旦那しゃま……<emoji=heart04>」"
translation = "「죠아효……<emoji=heart04> 죠아합니다, 셔방님……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「キリカれ、ちゅぁっ、れるるぅ、たくしゃんきもひよくなっへくだひゃい……<emoji=heart04>」"
translation = "「키리카랴, 츄아, 레루루우, 먾이 기분 조아져 쥬셰요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「いっぱひ勃起しへ、ぢゅぱちゅぷぅ、いっぱひご奉仕させへ欲しいれふ……<emoji=heart04>」"
translation = "「듬뿍 발기해셔, 쥬파쥬푸우, 듬뿍 봉샤하게 해쥬셨으면 죠케써요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "恋人の頃よりもいっそう熱を孕んだ乳房が、口が、俺のペニスを淫らに熱烈に刺激してくる。"
translation = "연인 시절보다 한층 더 열기를 품은 유방이, 입이 내 페니스를 음란하고 열렬하게 자극해 온다."

[[dialogue]]
speaker = "unk"
original = "幸せそうにペニスを頬張って、大胆に胸を揺り動かしてくれるキリカが愛おしくてたまらない。"
translation = "행복한 듯이 페니스를 입에 머금고 대담하게 가슴을 흔들어 주는 키리카가 사랑스러워 견딜 수 없다."

[[dialogue]]
speaker = "unk"
original = "これから毎日この素敵な花嫁とイチャイチャできるのだと思うと、かつてないほど興奮が高まってしまう。"
translation = "앞으로 매일 이 멋진 신부와 꽁냥거릴 수 있다고 생각하니 전례 없는 흥분이 고조된다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「んふぁ……おっひい<emoji=heart04>\u3000顎が、んぷぅ、外れへしまいしょーれふ……<emoji=heart04>」"
translation = "「응화…… 아파효<emoji=heart04> 턱이, 응뿌우, 빠져벼릴 거 가타효……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「れしゅが、最高にうれひい……しあわしぇれふ……<emoji=heart04>」"
translation = "「하지만 셰샹에서 졔일 기뻐효…… 행복해효……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「わたひのぱいじゅりふぇらま○これ、んっ、んっ、どーか癒やされへくだしゃいまへ……<emoji=heart04>」"
translation = "「졔 파이즈리 펠라 보지로, 응, 응, 부디 치유받아 쥬셰요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「きょーもあひたも、あしゃっへも、ちゅぁ、れるるぅ、こーひへ旦那しゃまを愛させへいただきひゃいれふ……<emoji=heart04>」"
translation = "「오늘랴 내일랴 모레랴, 츄아, 레루루우, 이려케 셔방님을 샬랑하게 해쥬셰요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ちゅぁっ、ぺるるぅっ、んっ、ふぁっ、んはむぅんっ、ちゅるるるぅっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「츄앗, 페루루웃, 응, 화앗, 응하무웅윽, 츄루루루우<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "どんな時でも平静を乱さないキリカが、がむしゃらにペニスへ吸い付き、乳房をギュウギュウと擦り付けてきてくれる。"
translation = "어떤 때라도 평정심을 잃지 않던 키리카가 필사적으로 페니스를 빨아대며 유방을 꽉꽉 문질러 온다."

[[dialogue]]
speaker = "unk"
original = "完璧なご奉仕じゃなくて、ただひたすら愛をぶつけるように俺を悦ばせようとしてくれる。"
translation = "완벽한 봉사가 아니라, 그저 한결같이 사랑을 부딪치듯 나를 기쁘게 해주려 노력한다."

[[dialogue]]
speaker = "unk"
original = "それが嬉しくて仕方なかった。ペニスごと彼女の愛に全身が包み込まれていく心地で、快感と幸福感が噴き上がる。"
translation = "그것이 기뻐서 어쩔 줄 몰랐다. 페니스와 함께 그녀의 사랑에 온몸이 감싸이는 기분으로, 쾌감과 행복감이 뿜어져 나온다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「っっ……<emoji=heart04><emoji=heart04><emoji=heart04>\u3000らめれふ、旦那しゃま、しょんなに悦んれ、いただけりゅひょ……んちゅぁ、れるぅ……<emoji=heart04>」"
translation = "「윽윽……<emoji=heart04><emoji=heart04><emoji=heart04> 안레효, 셔방님, 려렇게 기뻐해 쥬시면…… 응츄아, 레루우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「にゃにもっ──んちゅぁむぅんっっ<emoji=heart04>\u3000わからにゃくなっへしまっへっ──……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아무것도── 응츄아무웅윽<emoji=heart04> 모르게 되어버려서──……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "するとキリカは熱に浮かされたように、より深くペニスを頬張って──"
translation = "그러자 키리카는 열기에 휩싸인 듯, 더욱 깊게 페니스를 입에 머금고──"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「んはぁむぅんんっっ<emoji=heart04>\u3000ぢゅぷぅっ<emoji=heart04>\u3000じゅぱっぢゅぶっ、んっ、んっ、んっ、んふぅぅんんんっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응하무웅으윽<emoji=heart04> 쥬푸웃<emoji=heart04> 쥬파쥬부우, 응, 응, 응, 응후우우우웅윽<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くぁっっ……！」"
translation = "「크아앗……!」"

[[dialogue]]
speaker = "unk"
original = "彼女らしくない無我夢中のご奉仕が気持ち良すぎて、思わず喘いでしまう。"
translation = "그녀답지 않은 무아몽중의 봉사가 너무 기분 좋아서, 나도 모르게 신음하고 만다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「しゅみましぇっ、んちゅぁっ<emoji=heart04>\u3000もっひょじっくり敏感にしへいくほーが、んっ、んっ、適切らのは、わかっへいりゅのれふがっ……<emoji=heart04>」"
translation = "「졔숑해효, 응츄앗<emoji=heart04> 죠금 더 쳔쳔히 민감하게 해드리는 편이, 응, 응, 적쳘하다는 건 알고 이찌만……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「自分れも、んっ、ふっ、とめられにゃくへっ<emoji=heart04>\u3000旦那しゃまが感じへくれへりゅと思ふひょ、とめられにゃくへっ<emoji=heart04>」"
translation = "「졔 자신도, 응, 훗, 멈출 슈가 업셔셔<emoji=heart04> 셔방님이 느껴쥬신다고 생각하니, 멈출 슈가 업셔셔<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「しゅみましぇんっ……<emoji=heart04>\u3000浮かれきっひゃ愚かにゃ妻を、じゅぶぶぅっ、どーかお許しくだひゃいっ……<emoji=heart04>」"
translation = "「졔숑해효……<emoji=heart04> 들떠버린 어리석은 아내를, 쥬부부우, 부디 용셔해 쥬셰요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「しゅきしゅぎへっ、んふぅんっ、旦那しゃまのこひょがしゅきしゅぎへっ、自分れ自分をとめられにゃくへっ……<emoji=heart04>」"
translation = "「너무 죠아셔, 응후웅, 셔방님이 너무너무 죠아셔, 졔가 졔를 멈출 슈가 업셔셔……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "自分の乳房を唾液で汚しながら、キリカが一心不乱に口と胸を動かし続けてくれる。"
translation = "자신의 유방을 타액으로 더럽히며, 키리카가 일심불란하게 입과 가슴을 계속 움직여 준다."

[[dialogue]]
speaker = "unk"
original = "あのキリカがこんなにも感情的に求めてくれるなんて──"
translation = "그 키리카가 이렇게나 감정적으로 원해 주다니──"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ん゛んんっっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000旦那、しゃまっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응으으윽<emoji=heart04><emoji=heart04><emoji=heart04> 셔방, 님……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "我慢汁が噴き出す。キリカのはしたないほどの愛に、情熱的なご奉仕に。幸せすぎて、気持ち良すぎて。"
translation = "쿠퍼액이 뿜어져 나온다. 키리카의 상스러울 정도의 사랑에, 정열적인 봉사에. 너무 행복해서, 너무 기분 좋아서."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「じゅるっ、じゅるるるぅっ<emoji=heart04>\u3000んっ、ふっ、ぢゅぅぅぅぅっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「쥬루, 쥬루루루우<emoji=heart04> 응, 훗, 쥬우우우우우웃~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「おいひいっ、うれひいっ、はむぅんっ、ぢゅぶぶぅっ、んっ、ふっ、ん゛んんんんっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「마시쪄효, 기뻐효, 하무웅, 쥬부부우, 응, 훗, 응으으으으윽<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「旦那しゃまっ、んっ、んっ、旦那しゃまっ<emoji=heart04>\u3000もっひょ感じへくだひゃいっ、ぢゅぶぶぶっ、気持ちよくなっへくだひゃいっ<emoji=heart04>」"
translation = "「셔방님, 응, 응, 셔방님<emoji=heart04> 더 느껴쥬셰요, 쥬부부부, 기분 죠아져 쥬셰요<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「こにょ口も、おっぱひも、んれろろぉっ、おま○こも、望むなりゃお尻もっ……<emoji=heart04>」"
translation = "「이 입도, 가슴도, 응레로로오, 보지도, 원하신다면 엉덩이도……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「キリカのすべへはもう、ぜんぶぜんぶ旦那しゃまのものれございましゅかりゃっ……<emoji=heart04>」"
translation = "「키리카의 모둔 거슨 이제, 젼부 젼부 셔방님의 거시니까요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「旦那しゃまが気持ひよくなりゅためにっ、んっ、ふっ、ぢゅぶぶぅっ、いつれも使っへくだひゃいっ……<emoji=heart04>」"
translation = "「셔방님이 기분 죠아지기 위해셔라면, 응, 훗, 쥬부부우, 언제든 써쥬셰요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "彼女らしいどこまでも献身的な愛の訴えに、ペニスと心が火照る。"
translation = "그녀다운 끝없는 헌신적인 사랑의 호소에, 페니스와 마음이 달아오른다."

[[dialogue]]
speaker = "unk"
original = "俺もぶちまけたい。この想いを、興奮を、最愛の花嫁に──"
translation = "나도 쏟아내고 싶다. 이 마음을, 흥분을, 최애하는 신부에게──"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「んふぁっ<emoji=heart04>\u3000おひ○ぽしゃまが、どきゅんどきゅんしへっ<emoji=heart04>」"
translation = "「응화앗<emoji=heart04> 자지님이, 두근두근거려셔<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「だひれっ<emoji=heart04>\u3000だひれくらひゃいっ<emoji=heart04>\u3000旦那しゃまのせーしっ<emoji=heart04>\u3000ドクドクっって、おもいっきり<emoji=heart04>\u3000んぶじゅるるっ<emoji=heart04>」"
translation = "「내보내 쥬셰요<emoji=heart04> 내보내 쥬셰요<emoji=heart04> 셔방님의 정액<emoji=heart04> 울컥울컥하고, 마음껏<emoji=heart04> 응부쥬루루<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「んぢゅぶっ、ぢゅぶぶっ<emoji=heart04>\u3000れりゅりゅっ<emoji=heart04>\u3000ん゛っ、んっ、んっ、んっ、ん゛んんんっっ<emoji=heart04>」"
translation = "「응쥬붓, 쥬부붓<emoji=heart04> 나온다아<emoji=heart04> 응, 응, 응, 응, 응으으으윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "想いが止めらないとばかりにキリカのご奉仕がいっそう激しさを増してくる。"
translation = "마음을 멈출 수 없다는 듯 키리카의 봉사가 더욱 격렬해진다."

[[dialogue]]
speaker = "unk"
original = "俺も出したいっ、キリカに射精したいっ……！"
translation = "나도 내보내고 싶어, 키리카에게 사정하고 싶어……!"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「きへりゅっ<emoji=heart04>\u3000のぼっへきへりゅっ<emoji=heart04>」"
translation = "「와요<emoji=heart04> 차올라 와요<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「旦那しゃまのザーメンがっ、ぢゅるっ、ぢゅるるるぅっ<emoji=heart04>\u3000だいしゅきな人のせーしがっ<emoji=heart04>」"
translation = "「셔방님의 정액이, 쥬루, 쥬루루루우<emoji=heart04> 졔일 죠아하는 사람의 정액이<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「どぴゅどぴゅしへっ<emoji=heart04>\u3000ん゛んっ、んっ、ふっ、ぢゅばぢゅぶっ、ぢゅぶぶっっ<emoji=heart04>\u3000らしへくだひゃいっ<emoji=heart04>」"
translation = "「도퓨도퓨해셔<emoji=heart04> 응응, 응, 훗, 쥬바쥬부, 쥬부부웃<emoji=heart04> 내보내 쥬셰요<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「旦那しゃまのザーメンれっ、わたひをっ、んっ、んっ、ぢゅりゅりゅぅぅっっ、わたひをぉっっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「셔방님의 정액으로, 저를, 응, 응, 쥬류류우우웃, 저를으으윽……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「旦那しゃま色にっ──じゅるるるるるるるぅぅっっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000染めあげへくだひゃいましぇええっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「셔방님 색으로── 쥬루루루루루루루우우웃<emoji=heart04><emoji=heart04><emoji=heart04> 물드려 쥬셰요오오오옷~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ぷはぁっ──んぁっ、んはぁぁああああんんんっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「푸하앗── 응아, 응하아아아아아아앙으으윽~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "かつてない量の精子が尿道から噴き出す。キリカの顔を、胸を、純白のドレスまでも白濁色に染め上げていく。"
translation = "전례 없는 양의 정자가 요도에서 뿜어져 나온다. 키리카의 얼굴을, 가슴을, 순백의 드레스까지도 백탁색으로 물들여 간다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ふぁぁぁぁ……<emoji=heart04>\u3000あたたかい、きもちいい……<emoji=heart04>」"
translation = "「화아아아아……<emoji=heart04> 따뜻해, 기분 좋아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「旦那様のザーメンが、はぁー、はぁー、本当に私を染め上げてくださって……<emoji=heart04>」"
translation = "「서방님의 정액이, 하아, 하아, 정말로 저를 물들여 주셔서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「イって、あぁ、しまいます……<emoji=heart04>\u3000幸せすぎてっ、んぁぁあんっっ……<emoji=heart04>\u3000嬉し、すぎてっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가버려, 아아, 가버려요……<emoji=heart04> 너무 행복해서, 응아아앙……<emoji=heart04> 너무, 기뻐서……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺の精子を浴びながらキリカがビクンビクンと痙攣する。"
translation = "내 정액을 뒤집어쓰며 키리카가 파들파들 경련한다."

[[dialogue]]
speaker = "unk"
original = "そんな愛する花嫁の姿を見て、俺もまたさらに精を吐き出してしまう。"
translation = "그런 사랑스러운 신부의 모습을 보며, 나 또한 더욱 정을 토해내고 만다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「あぁ、本当に幸せ……<emoji=heart04>\u3000一生このまま浴び続けていたいほど、です……<emoji=heart04>」"
translation = "「아아, 정말 행복해……<emoji=heart04> 평생 이대로 계속 맞고 싶을 정도, 예요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "最後の一滴まで搾り出すように、ぎゅうっとキリカが胸を寄せ上げてくれる。"
translation = "마지막 한 방울까지 짜내듯이, 키리카가 가슴을 꽉 모아 올린다."

[[dialogue]]
speaker = "unk"
original = "そのグツグツに火照りきった乳房の感触に促されるまま、だらしないほど精子を噴き出し続けた。"
translation = "그 뜨겁게 달아오른 유방의 감촉에 이끌리는 대로, 한심할 정도로 정자를 계속 뿜어냈다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「んちゅぁ……れろろぉ……<emoji=heart04>\u3000んふふ、旦那様のがたくさん唇へ垂れてきてくれます……<emoji=heart04>」"
translation = "「응츄아…… 레로로오……<emoji=heart04> 응후후, 서방님 것이 잔뜩 입술로 흘러내려 와요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「はぁ、はぁ、とっても濃い……<emoji=heart04>\u3000恋人の頃に出していただいた精子の、何倍も……<emoji=heart04>」"
translation = "「하아, 하아, 정말 진해요……<emoji=heart04> 연인 시절에 내보내 주셨던 정액의, 몇 배나……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ですが……余計に初夜が待ち切れなくなってしまいました。こうなれば、このまま式場で挿れていただきましょうか？」"
translation = "「하지만…… 오히려 첫날밤을 기다릴 수 없게 되어버렸어요. 이렇게 된 거, 이대로 식장에서 삽입해 주시겠어요?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「さすがにそれはやめとこうか。そろそろ人が来そうだ」"
translation = "「역시 그건 참아두자. 슬슬 사람이 올 것 같아」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「そうなのですけど……体は焦れてしまっています」"
translation = "「그렇긴 합니다만…… 몸이 달아올라 버렸어요」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だから今夜を楽しみにしていて。待たせた分かわいがってあげるから」"
translation = "「그러니까 오늘 밤을 기대해 줘. 기다리게 한 만큼 예뻐해 줄 테니까」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「……わかりました。お待ちしています<emoji=heart04>」"
translation = "「……알겠습니다. 기다리고 있을게요<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「そして願わくば旦那様との愛の結晶を、私のお腹に授けていただきたいと思っておりますから……<emoji=heart04>」"
translation = "「그리고 바라건대 서방님과의 사랑의 결실을, 제 배에 내려주셨으면 하고 생각하고 있으니까요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「我が儘な妻をどうかお許しくださいませ……<emoji=heart04>」"
translation = "「이기적인 아내를 부디 용서해 주시옵소서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「愛しておりますよ、旦那様……<emoji=heart04>」"
translation = "「사랑하고 있어요, 서방님……<emoji=heart04>」"

