[[dialogue]]
speaker = "unk"
original = "第４話,残された者,B"
translation = "제4화, 남겨진 자, B"

[[dialogue]]
speaker = "マトイ"
original = "「だけど市倉さんは、デネブのフィーニスの塔に残ったんだよね……」"
translation = "「하지만 이치쿠라 씨는 데네브의 피니스의 탑에 남았지……」"

[[dialogue]]
speaker = "アナ"
original = "「デネブに帰ったアポロさんも、生存が判明したのはいいのですが……」"
translation = "「데네브로 돌아간 아폴로 씨도 생존이 확인된 건 다행입니다만……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ええ……向こうのアポロとはまた別れちゃったわ……」"
translation = "「응…… 저쪽 아폴로와는 또 헤어져 버렸네……」"

[[dialogue]]
speaker = "unk"
original = "デネブのアポロと母さんは、俺たちを逃がすために<ruby>殿<rt>しんがり</rt></ruby>になってくれた。"
translation = "데네브의 아폴로와 어머니는 우리를 도망치게 하려고 후방을 맡아주었다."

[[dialogue]]
speaker = "unk"
original = "ディザスターハンドを足止めしてくれたけど、今どうなっているかはわからない。"
translation = "디재스터 핸드의 발을 묶어주었지만 지금 어떻게 되었는지는 알 수 없다."

[[dialogue]]
speaker = "フィオナ"
original = "「姉さん……」"
translation = "「언니……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「２人とも無事だといいんだけど……」"
translation = "「두 사람 다 무사하면 좋겠는데……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "フィオナを始め、デネブから帰ってきたみんなが沈痛な表情を浮かべる。"
translation = "피오나를 비롯해 데네브에서 돌아온 모두가 침통한 표정을 짓는다."

[[dialogue]]
speaker = "ナターシャ"
original = "「何とか逃げてくれたと思いたいところだけどね」"
translation = "「어떻게든 도망쳤다고 믿고 싶지만 말이야.」"

[[dialogue]]
speaker = "梨緒"
original = "「……信じろ、とアポロは言っていた。だから私は信じる。２人はあの場を切り抜けて、今も生きていると」"
translation = "「……믿으라고 아폴로가 말했다. 그러니 나는 믿는다. 두 사람은 그 자리를 빠져나와 지금도 살아있을 거라고.」"

[[dialogue]]
speaker = "クロト"
original = "「……ああ、そうだな」"
translation = "「……아아, 그래.」"

[[dialogue]]
speaker = "クロト"
original = "「母さんは『何とかする算段はある』と言っていた。母さんがそう言うなら、何か手立てはあるはずだ」"
translation = "「어머니는 『어떻게든 할 방도는 있다』고 하셨어. 어머니가 그렇게 말씀하신다면 분명 무슨 수든 있을 거야.」"

[[dialogue]]
speaker = "アポロ"
original = "「そうだぞ、平行世界とはいえあたしはあたしだ。ヒーローは負けないさ！」"
translation = "「그렇다구, 평행세계라고는 해도 나(あたし)는 나야. 히어로는 지지 않는다구!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「……そうね。今はくよくよしている場合じゃないわ！」"
translation = "「……그래. 지금은 우물쭈물하고 있을 때가 아니지!」"

[[dialogue]]
speaker = "フィオナ"
original = "「はい。『世界を救ってこい』と言われましたから」"
translation = "「네. 『세계를 구하고 오라』는 말을 들었으니까요」"

[[dialogue]]
speaker = "unk"
original = "残念ながら、レジスタンスの２人のために今できることは何もない。"
translation = "안타깝게도, 레지스탕스인 두 사람을 위해 지금 할 수 있는 일은 아무것도 없다."

[[dialogue]]
speaker = "unk"
original = "命を賭して俺たちを送り出してくれた２人のためにも、今は前を向かなければいけない。"
translation = "목숨을 걸고 우리를 보내준 두 사람을 위해서라도, 지금은 앞을 향해야만 한다."

[[dialogue]]
speaker = "unk"
original = "環もいつか必ず迎えに行くと約束した。"
translation = "타마키도 언젠가 반드시 데리러 가겠다고 약속했다."

[[dialogue]]
speaker = "アポロ"
original = "「デネブのあたしがレジスタンスなんてやってるとはな。かっこいいじゃないか！」"
translation = "「데네브의 내가 레지스탕스 같은 걸 하고 있다니 말이야. 멋지잖아!」"

[[dialogue]]
speaker = "アポロ"
original = "「なぁなぁ、向こうのあたしはどんな感じだったんだ？」"
translation = "「있지 있지, 저쪽의 나는 어떤 느낌이었어?」"

[[dialogue]]
speaker = "梨緒"
original = "「ベガの彼女よりも成長していて、立派な大人になっていたよ。まさにヒーローのような強さと頼もしさだった」"
translation = "「베가의 그녀보다도 성장해 있었고, 훌륭한 어른이 되어 있었어. 그야말로 히어로 같은 강함과 든든함이었지」"

[[dialogue]]
speaker = "アポロ"
original = "「そうか！\u3000いっぺん自分で見てみたいけど、何とかならないかなぁ～」"
translation = "「그래! 한번 직접 보고 싶은데, 어떻게 안 되려나~」"

[[dialogue]]
speaker = "梨緒"
original = "（デネブのアポロは言った。『お前を信じる』──と）"
translation = "（데네브의 아폴로는 말했다. 『너를 믿는다』──고）"

[[dialogue]]
speaker = "梨緒"
original = "（そう言われたら、私だって信じるしかないだろう……！\u3000必ず生きて会えると……信じているからな……！）"
translation = "（그렇게 말한다면, 나 역시 믿을 수밖에 없겠지……! 반드시 살아서 만날 수 있다고…… 믿고 있으니까……!）"

[[dialogue]]
speaker = "梨緒"
original = "（ぐっ……）"
translation = "（윽……）"

[[dialogue]]
speaker = "梨緒"
original = "（何だ、この光景は……？）"
translation = "（뭐지, 이 광경은……?）"

[[dialogue]]
speaker = "梨緒"
original = "（ベガの最期の瞬間……ディザスターハンドに世界が滅ぼされる時の……）"
translation = "（베가의 최후의 순간…… 디재스터 핸드에 의해 세계가 멸망할 때의……）"

[[dialogue]]
speaker = "梨緒"
original = "（ベガの滅びの瞬間、ジグはあそこにいたはずだ……なのに、どうしてこうも胸騒ぎを覚える……？）"
translation = "（베가의 멸망의 순간, 지그는 그곳에 있었을 터다…… 그런데 어째서 이렇게 불길한 예감이 드는 거지……?）"

[[dialogue]]
speaker = "梨緒"
original = "（ぐっ……頭が、痛い……）"
translation = "（윽…… 머리가, 아파……）"

[[dialogue]]
speaker = "梨緒"
original = "（ジグの姿が……あの時の光景がちらつく……）"
translation = "（지그의 모습이…… 그때의 광경이 아른거려……）"

[[dialogue]]
speaker = "梨緒"
original = "（私はあの時何を見た……？\u3000何を忘れている……？）"
translation = "（ 나는 그때 무엇을 보았지……? 무엇을 잊고 있는 거지……?）"

[[dialogue]]
speaker = "梨緒"
original = "（それは決して忘れてはいけない……目を逸らしてはいけないもののような……）"
translation = "（그것은 결코 잊어서는 안 되는…… 눈을 돌려서는 안 되는 것 같은……）"

[[dialogue]]
speaker = "アポロ"
original = "「梨緒？\u3000顔色が悪いぞ？」"
translation = "「리오? 안색이 안 좋아?」"

[[dialogue]]
speaker = "梨緒"
original = "「──！\u3000あ、ああ、大丈夫だ……」"
translation = "「──! 아, 아아, 괜찮다……」"

[[dialogue]]
speaker = "アポロ"
original = "「本当に？\u3000大丈夫なようには見えないが……」"
translation = "「정말? 괜찮아 보이지는 않는데……」"

[[dialogue]]
speaker = "unk"
original = "ごまかすように返事をする梨緒の顔を、アポロが心配そうにのぞき込む。"
translation = "얼버무리듯 대답하는 리오의 얼굴을, 아폴로가 걱정스럽게 들여다본다."

[[dialogue]]
speaker = "梨緒"
original = "「正直、自分でもよくわからないんだ……」"
translation = "「솔직히, 나 자신도 잘 모르겠어……」"

[[dialogue]]
speaker = "梨緒"
original = "「だけど、きっと誰かに相談できることじゃない。自分で向き合わなきゃいけないことなんだ」"
translation = "「하지만, 분명 누군가에게 상담할 수 있는 일이 아니야. 스스로 마주해야만 하는 일이야」"

[[dialogue]]
speaker = "アポロ"
original = "「……そうか。オマエがそう言うなら信じるぞ」"
translation = "「……그래. 네가 그렇게 말한다면 믿을게」"

[[dialogue]]
speaker = "アポロ"
original = "「だけど相談したいことがあったら言ってくれよな。あたしたちは仲間なんだから」"
translation = "「하지만 상담하고 싶은 게 있으면 말해줘. 우리는 동료니까」"

[[dialogue]]
speaker = "梨緒"
original = "「ああ、ありがとう、アポロ」"
translation = "「아아, 고마워, 아폴로」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ベアトは大丈夫？\u3000ベアトもショックだったでしょ？」"
translation = "「베아토는 괜찮아? 베아토도 충격이었지?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「う、うん……ルヴィが女神で、しかもリクリエ側だったなんて……」"
translation = "「으, 응…… 루비가 여신이고, 게다가 리크리에 측이었다니……」"

[[dialogue]]
speaker = "unk"
original = "ベアトリスは極星学園の副会長として、ルヴィネを誰よりも近くで見てきたはずだ。"
translation = "베아트리스는 극성학원의 부회장으로서, 루비네를 누구보다 가까이서 지켜봐 왔을 것이다."

[[dialogue]]
speaker = "unk"
original = "そんなベアトリスにとって、ルヴィネの正体は大きな衝撃だっただろう。"
translation = "그런 베아트리스에게 있어, 루비네의 정체는 커다란 충격이었을 터다."

[[dialogue]]
speaker = "ベアトリス"
original = "「でもルヴィは極星星徒会の仲間で、誰よりも一生懸命デネブを守ってきた……」"
translation = "「하지만 루비는 극성 성도회의 동료이고, 누구보다 열심히 데네브를 지켜왔어……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ルヴィがリクリエ側だとしたら、デネブを守ってきたのも、リクリエを成就させるため……」"
translation = "「루비가 리크리에 측이라고 한다면, 데네브를 지켜온 것도 리크리에를 성취시키기 위해서……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「だけどそんなの、信じられないよ……」"
translation = "「하지만 그런 거, 믿을 수 없어……」"

[[dialogue]]
speaker = "ナターシャ"
original = "「まぁ確かに、何日か監視したけど、ルヴィネは真面目にデネブを守ってたよね」"
translation = "「뭐 확실히, 며칠간 감시해 봤지만 루비네는 성실하게 데네브를 지키고 있었지」"

[[dialogue]]
speaker = "ナターシャ"
original = "「少なくとも、どうせ滅ぼすからどうでもいい、って思ってるようには見えなかったかな」"
translation = "「적어도, 어차피 멸망시킬 거니까 아무래도 좋다, 고 생각하는 것처럼은 보이지 않았으려나」"

[[dialogue]]
speaker = "ベアトリス"
original = "「私がみんなに自分の素性を話せなかったように、ルヴィも言えないことがあるのかも……」"
translation = "「내가 모두에게 내 정체를 말하지 못했던 것처럼, 루비도 말할 수 없는 사정이 있는 걸지도……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』に生み出されたから、その命令に従っているのかもしれない……」"
translation = "「『<ruby>제로스<rt>XELOS</rt></ruby>』에 의해 태어났으니까, 그 명령을 따르고 있는 걸지도 몰라……」"

[[dialogue]]
speaker = "ナターシャ"
original = "「つまり、ベアトはまだルヴィネを信じたいんだ？」"
translation = "「즉, 베아토는 아직 루비네를 믿고 싶다는 거네?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「うん。アルタイルのみんなからすれば、虫のいいことを言ってると思うだろうけど……」"
translation = "「응. 알타이르의 모두가 보기에는 염치없는 소리를 한다고 생각하겠지만……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「でも私、もう一度ルヴィに会わないと納得できない。もう一回、ルヴィの口から話を聞きたい……！」"
translation = "「하지만 나, 다시 한번 루비를 만나지 않으면 납득할 수 없어. 다시 한번, 루비의 입으로 직접 이야기를 듣고 싶어……!」"

[[dialogue]]
speaker = "ナターシャ"
original = "「なるほど。ま、いいんじゃない」"
translation = "「과연. 뭐, 괜찮지 않아?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』や新しい女神の存在だけでも、とんでもないどんでん返しだったからね。まだ何かあってもおかしくないよ」"
translation = "「『<ruby>제로스<rt>XELOS</rt></ruby>』나 새로운 여신의 존재만으로도 엄청난 반전이었으니까. 아직 무슨 일이 더 있어도 이상하지 않아」"

[[dialogue]]
speaker = "クロト"
original = "「現状、ルヴィネがアルタイルの敵であることは間違いないだろう」"
translation = "「현 상황에서 루비네가 알타이르의 적이라는 사실은 틀림없겠지」"

[[dialogue]]
speaker = "クロト"
original = "「だけど俺も、彼女がデネブの人々を守るところを見た。確かにルヴィネは真摯にデネブを守ろうとしているように思える」"
translation = "「하지만 나도 그녀가 데네브의 사람들을 지키는 모습을 보았어. 확실히 루비네는 진심으로 데네브를 지키려 하고 있는 것처럼 보여」"

[[dialogue]]
speaker = "クロト"
original = "「彼女がディザスターハンドを操れるなら、今までもアルタイルやデネブを破壊することができたはずだ。それをしなかった理由があるのかもしれない」"
translation = "「그녀가 디재스터 핸드를 조종할 수 있다면, 지금까지도 알타이르나 데네브를 파괴할 수 있었을 터다. 그러지 않았던 이유가 있을지도 몰라」"

[[dialogue]]
speaker = "クロト"
original = "「彼女が本当に『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』に従っているのか、あるいは他に思惑があるのか、ルヴィネにはまだ聞くべきことがありそうだ」"
translation = "「그녀가 정말로 『<ruby>제로스<rt>XELOS</rt></ruby>』를 따르고 있는 것인지, 아니면 다른 의도가 있는 것인지, 루비네에게는 아직 물어봐야 할 것이 있을 것 같군」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そうね、知ってることを洗いざらい喋ってもらうわ！」"
translation = "「그래, 알고 있는 걸 낱낱이 불게 하겠어!」"

[[dialogue]]
speaker = "unk"
original = "フィーニスの塔ではルヴィネの正体に迫ることができた。"
translation = "피니스의 탑에서는 루비네의 정체에 다가갈 수 있었다."

[[dialogue]]
speaker = "unk"
original = "だが『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』に生み出されたルヴィネなら、まだ俺たちの知らない事実を知っているのではないかと思うのだった。"
translation = "하지만 『<ruby>제로스<rt>XELOS</rt></ruby>』에 의해 태어난 루비네라면, 아직 우리가 모르는 사실을 알고 있지 않을까 생각하는 것이었다."

