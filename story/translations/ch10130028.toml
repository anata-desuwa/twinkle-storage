[[dialogue]]
speaker = "ユウリ"
original = "「ほ、本当にこれっきりだからな……？\u3000こんなこと一回こっきりだぞ……？」"
translation = "「정, 정말로 이번뿐이니까 말이야? 이런 거 딱 한 번뿐이라고……?」"

[[dialogue]]
speaker = "unk"
original = "恥ずかしそうに尋ねてくるユウリに深く頷く。"
translation = "부끄러운 듯이 물어오는 유우리에게 깊게 고개를 끄덕인다."

[[dialogue]]
speaker = "unk"
original = "その悩ましげに視線を泳がせる姿を見ているだけでも、ズボンの膨らみが一段と大きくなった。"
translation = "그 고민스럽게 시선을 헤매는 모습을 보고 있는 것만으로도, 바지의 팽창이 한층 더 커졌다."

[[dialogue]]
speaker = "ユウリ"
original = "「～～っっ。や、やっぱしやめるっ……！\u3000大体閉店作業中にこんなことしちゃいけねえし……！」"
translation = "「~~윽. 여, 역시 그만둘래……! 애초에 폐점 작업 중에 이런 짓 하면 안 되고……!」"

[[dialogue]]
speaker = "ユウリ"
original = "「イチャイチャするなら部屋に帰ってからいくらでも……！\u3000ここでする必要なんてどこにもねえじゃんか……！」"
translation = "「꽁냥거리는 건 방에 돌아가서 얼마든지……! 여기서 할 필요 따위 어디에도 없잖아……!」"

[[dialogue]]
speaker = "unk"
original = "いいや、部屋に帰ってからではダメだ。ユウリがバニースーツから着替えてしまう。"
translation = "아니, 방에 돌아가서 하면 안 돼. 유우리가 바니 수트에서 갈아입어 버릴 거잖아."

[[dialogue]]
speaker = "unk"
original = "俺はバニー姿のユウリとエッチがしたかった。"
translation = "나는 바니 차림의 유우리와 섹스하고 싶었어."

[[dialogue]]
speaker = "ユウリ"
original = "「ちゃ、ちゃんと着てやるから。特訓の時だって着てたろ？\u3000いやまぁ明らかにそういう目をしてきてからは避けてたけど……」"
translation = "「제, 제대로 입어줄게. 특훈 때도 입었었잖아? 아니 뭐 분명히 그런 눈으로 본 뒤로는 피했지만……」"

[[dialogue]]
speaker = "ユウリ"
original = "「でも着るって約束するから……！\u3000ホントマジで絶対……！\u3000今度こそ必ず着てやっからさ……！」"
translation = "「하지만 입겠다고 약속할 테니까……! 진짜 정말 절대……! 이번에야말로 반드시 입어줄 테니까……!」"

[[dialogue]]
speaker = "ユウリ"
original = "「だから、なっ？\u3000今回はやめとこうぜっ？」"
translation = "「그러니까, 응? 이번엔 넘어가자고?」"

[[dialogue]]
speaker = "ユウリ"
original = "「バニー姿でエッチするなんて恥ずか──ひゃっ！？」"
translation = "「바니 차림으로 섹스하는 건 부끄러── 히익!?」"

[[dialogue]]
speaker = "unk"
original = "流石にもう先送りにされたくない。半ば強引にユウリをテーブルへ押し倒す。"
translation = "더 이상 미뤄지고 싶지 않다. 반쯤 강제로 유우리를 테이블로 밀어 넘어뜨린다."

[[dialogue]]
speaker = "unk"
original = "そして簡単には逃げられないようにぎゅっと手首を掴んで──"
translation = "그리고 쉽게 도망치지 못하도록 꽉 손목을 붙잡고──"

[[dialogue]]
speaker = "ユウリ"
original = "「バ、バカヤロっ、離せっ……！\u3000せめて部屋に帰ってからっ……！」"
translation = "「바, 바보 녀석아, 놔……! 적어도 방에 돌아가서……!」"

[[dialogue]]
speaker = "ユウリ"
original = "「ひぃあっ！？\u3000ズリズリ擦り付けんなぁ……！\u3000人のこと眺めながら、なに腰揺らしてんだよぉ……！」"
translation = "「히이앗!? 비비지 마아……! 사람 쳐다보면서 왜 허리를 흔드는 거야아……!」"

[[dialogue]]
speaker = "unk"
original = "テーブルの上で照れ悶えるユウリを目の当たりにした途端、無意識のうちに肉棒を扱いていた。"
translation = "테이블 위에서 부끄러워 몸부림치는 유우리를 목격하자마자, 무의식중에 육봉을 만지고 있었다."

[[dialogue]]
speaker = "unk"
original = "初体験の時よりも初々しい。ユウリが照れれば照れるほど興奮してしまう。"
translation = "첫 경험 때보다 더 풋풋하다. 유우리가 부끄러워하면 할수록 흥분되어 버린다."

[[dialogue]]
speaker = "ユウリ"
original = "「うぅ、なんでこんなに発情してっ……。フリフリの服着てやった時も、めちゃくちゃはぁはぁ言ってたしっ……」"
translation = "「으으, 왜 이렇게 발정해서……. 팔랑거리는 옷 입어줬을 때도 엄청 헉헉댔으면서……」"

[[dialogue]]
speaker = "ユウリ"
original = "「そういう反応されると困るんだよぉ……。似合ってるって、可愛いって、口で言うよりも言ってもらってる気分になって……」"
translation = "「그런 반응을 보이면 곤란하단 말이야……. 어울린다고, 귀엽다고 말로 하는 것보다 더 전해지는 기분이 들어서……」"

[[dialogue]]
speaker = "ユウリ"
original = "「恥ずかしいのに嬉しくなって、興奮してくれてるの見てドキドキしちゃって……」"
translation = "「부끄러운데 기뻐지고, 흥분한 거 보니까 두근거려버려서……」"

[[dialogue]]
speaker = "ユウリ"
original = "「あたしらしくなくなっちまうっ……。こ、こんなモジモジ照れるようなキャラじゃねえのにっ……」"
translation = "「나답지 않게 돼버려……! 이, 이런 식으로 쭈뼛거리며 부끄러워할 캐릭터가 아닌데……!」"

[[dialogue]]
speaker = "unk"
original = "まるで初心な乙女のように恥じらうユウリが可愛い。"
translation = "마치 순진한 소녀처럼 수줍어하는 유우리가 귀엽다."

[[dialogue]]
speaker = "unk"
original = "その『らしくない反応』を俺は見たかったんだ。"
translation = "그 『답지 않은 반응』을 나는 보고 싶었다."

[[dialogue]]
speaker = "unk"
original = "他の誰にも見せない女の子らしい姿を。俺だけが知っているユウリの一番可愛い姿を。"
translation = "다른 누구에게도 보여주지 않는 여자아이 같은 모습을. 나만이 알고 있는 유우리의 가장 귀엽은 모습을."

[[dialogue]]
speaker = "ユウリ"
original = "「ふぁぁぁっ……<emoji=heart04>\u3000入って、んぁぁ、先っぽ入ってきてるってばっ……<emoji=heart04>」"
translation = "「후아아아앗……<emoji=heart04> 들어와, 응아아, 끝부분이 들어오고 있다니까……<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「ダメだからっ……<emoji=heart04>\u3000店の中でこんなことっ……<emoji=heart04>\u3000ヘレナさんに、あぁぁ、叱られちまうっ……<emoji=heart04>」"
translation = "「안 된다니까……<emoji=heart04> 가게 안에서 이런 짓……<emoji=heart04> 헬레나 씨한테, 아아아, 혼나버릴 거야……<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「イチャつくなら部屋でっ……<emoji=heart04>\u3000エッチするのは嫌じゃないからっ、あたしだってしたいからっ……<emoji=heart04>」"
translation = "「꽁냥거릴 거면 방에서……<emoji=heart04> 섹스하는 게 싫은 건 아니니까, 나도 하고 싶으니까……<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「こんな場所でするのっ、めちゃくちゃ恥ずかし──」"
translation = "「이런 곳에서 하는 거, 엄청 부끄러──」"

[[dialogue]]
speaker = "ユウリ"
original = "「あはぁぁああああああんんんんっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아하아아아아아앙응응응으읏～～<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "股を閉じようとするユウリを阻止してペニスを突き入れる。"
translation = "가랑이를 닫으려는 유우리를 저지하며 페니스를 찔러 넣는다."

[[dialogue]]
speaker = "ユウリ"
original = "「あっ、はぁっ、んぁぁぁっ……<emoji=heart04>\u3000挿れるなって言ってんのにっ……<emoji=heart04>\u3000やめっ、あぁっ、動くなっ……<emoji=heart04>」"
translation = "「앗, 하앗, 응아아아앗……<emoji=heart04> 넣지 말라고 했는데……<emoji=heart04> 그만, 아앗, 움직이지 마……<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「バレちゃっ、あっ、あっ、あぁっ……<emoji=heart04>\u3000興奮しちゃってるのバレちゃうっ……<emoji=heart04>」"
translation = "「들켜버려, 앗, 앗, 아앗……<emoji=heart04> 흥분해버린 거 들켜버려어……<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「絶対あたしのおま○こ今っ、ふぁぁぁぁっ……<emoji=heart04>\u3000いつも以上にギュウギュウしてっ、蕩けちゃってっっ……<emoji=heart04>」"
translation = "「분명 내 보지 지금, 후아아아앗……<emoji=heart04> 평소보다 꽉꽉 조여서, 녹아버려서어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ユウリの言う通り、締まりも濡れ具合も凄まじくて、火照り滾った膣内にペニスが溶かされてしまいそうだ。"
translation = "유우리의 말대로, 조임도 젖은 정도도 굉장해서, 달아올라 끓어오르는 질 내부에 페니스가 녹아버릴 것만 같다."

[[dialogue]]
speaker = "unk"
original = "ひと突きごとに恥ずかしそうによがるユウリの姿が情欲を掻き立ててくる。"
translation = "한 번 찌를 때마다 부끄러운 듯이 느끼는 유우리의 모습이 정욕을 부추긴다."

[[dialogue]]
speaker = "ユウリ"
original = "「ふぁっ、あはぁんっ、ち○ちん熱いっ……<emoji=heart04>\u3000普段よりおっきいっ……<emoji=heart04>\u3000膣内でどんどん膨らんでっ……<emoji=heart04>」"
translation = "「후아, 아하앙, 자지 뜨거워……<emoji=heart04> 평소보다 커어……<emoji=heart04> 질 안에서 점점 부풀어서……<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「それダメぇ……<emoji=heart04>\u3000はぁあんっ……<emoji=heart04>\u3000嬉しくなっちゃうからぁ……<emoji=heart04>\u3000もっと恥ずかしくなっちゃうからぁ……<emoji=heart04>」"
translation = "「그거 안 돼……<emoji=heart04> 하아앙……<emoji=heart04> 기뻐져 버리니까아……<emoji=heart04> 더 부끄러워져 버리니까아……<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「こんな女の子な姿、あふぁ、見ないでっ、見るなぁっ、見られたくないっ……<emoji=heart04>」"
translation = "「이런 여자아이 같은 모습, 아후아, 보지 마, 보지 말라니까, 보여주고 싶지 않아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "真っ赤な顔を手で覆おうとしているのか、ユウリが必死に俺の腕をほどこうとする。"
translation = "새빨개진 얼굴을 손으로 가리려는 것인지, 유우리가 필사적으로 내 팔을 풀려고 한다."

[[dialogue]]
speaker = "unk"
original = "だけどさせない。乙女な姿に興奮して、可愛すぎて今にも射精しそうになってしまう。"
translation = "하지만 하게 두지 않는다. 소녀 같은 모습에 흥분해서, 너무 귀여워 당장에라도 사정할 것만 같다."

[[dialogue]]
speaker = "ユウリ"
original = "「あはぁあんっ、あっ、はぁっ、あぁぁぁっっ……<emoji=heart04>\u3000可愛いって言うのもダメっ、今は好きって言うの禁止ぃ……<emoji=heart04>」"
translation = "「아하아앙, 앗, 하앗, 아아아앗……<emoji=heart04> 귀엽다고 말하는 것도 안 돼, 지금은 좋아한다고 말하는 거 금지야……<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「イっちゃうっ、あぁっ、イっちゃうからっ……<emoji=heart04>\u3000知ってるクセにっ、可愛いって言われたらすぐイっちゃうの知ってるクセにっ……<emoji=heart04>」"
translation = "「가버려, 아앗, 가버리니까……<emoji=heart04> 알고 있으면서, 귀엽다는 말 들으면 바로 가버리는 거 알고 있으면서……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺がつい口に出した言葉に反応して、ユウリがビクビクと体を悶えさせる。"
translation = "내가 무심코 내뱉은 말에 반응하여, 유우리가 움찔움찔 몸을 떨며 괴로워한다."

[[dialogue]]
speaker = "unk"
original = "ただでさえトロトロな膣内が一気に愛液で満たされて、テーブルの上に大きな染みを作っていく。"
translation = "그렇지 않아도 걸쭉한 질 내부가 단숨에 애액으로 가득 차서, 테이블 위에 커다란 얼룩을 만들어 간다."

[[dialogue]]
speaker = "ユウリ"
original = "「はふぁぁぁああっっ<emoji=heart04>\u3000あっ、はぁああんっ<emoji=heart04>\u3000ゆっくり動くのもズルいぃ……<emoji=heart04>\u3000わざとち○ちんの感触味わわせてきてっ……<emoji=heart04>」"
translation = "「하후아아아앗<emoji=heart04> 앗, 하아앙<emoji=heart04> 천천히 움직이는 것도 치사해……<emoji=heart04> 일부러 자지 감촉을 느끼게 해서……<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「おま○こ吸い付いていっちゃうじゃんかぁ……<emoji=heart04>\u3000ち○ちん抱き締めにいっちゃうっ……<emoji=heart04>」"
translation = "「보지가 빨아들여 버리잖아아……<emoji=heart04> 자지를 꽉 껴안으러 가버려어……<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「はぁぁあっ、ぶっといっ……<emoji=heart04>\u3000やっぱりいつもよりおっきいっ……<emoji=heart04>\u3000発情しまくってくれてるの、丸わかりでっ……<emoji=heart04>」"
translation = "「하아아앗, 굵어……<emoji=heart04> 역시 평소보다 커어……<emoji=heart04> 발정 엄청 해준 거, 다 알겠어서……<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「ふぁぁぁっ<emoji=heart04>\u3000ち○ちんパンパンで、おま○こ張り裂けそっ……<emoji=heart04>\u3000バニー着てるだけで、こんなにたくさん精子作ってくれてっ……<emoji=heart04>」"
translation = "「후아아아앗<emoji=heart04> 자지 팽팽해서, 보지 찢어질 것 같아……<emoji=heart04> 바니 입고 있는 것만으로, 이렇게나 많이 정자를 만들어 줘서……<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「ホントに、あふぁっ、ホントに可愛いと思ってくれてるんだっ……<emoji=heart04>\u3000らしくない格好してるのにっ、らしくない反応してるのにっ……<emoji=heart04>」"
translation = "「정말로, 아후앗, 정말로 귀엽다고 생각해 주는구나……<emoji=heart04> 나답지 않은 복장 하고 있는데, 나답지 않은 반응 하고 있는데……<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「えへへっ、えへっ、あはぁあんっ……<emoji=heart04>\u3000照れてイっちゃうっ……<emoji=heart04>\u3000嬉しくてっ、イックぅぅぅっ～～<emoji=heart04>」"
translation = "「에헤헷, 에헷, 아하아앙……<emoji=heart04> 부끄러워서 가버려어……<emoji=heart04> 기뻐서, 가버렷어어어어어억～～<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「やっぱり幸せっ……<emoji=heart04>\u3000幸せすぎてっ……<emoji=heart04>\u3000こんなあたしを本気で可愛いと思ってくれてるのがイクほど嬉しくてっ……<emoji=heart04>」"
translation = "「역시 행복해……<emoji=heart04> 너무 행복해서……<emoji=heart04> 이런 나를 진심으로 귀엽다고 생각해 주는 게 갈 정도로 기뻐서……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ユウリの腕から力が抜ける。照れた顔をしながらも俺を上目遣いに見つめてきてくれる。"
translation = "유우리의 팔에서 힘이 빠진다. 부끄러워하는 얼굴을 하면서도 나를 치켜뜬 눈으로 바라봐 준다."

[[dialogue]]
speaker = "unk"
original = "それどころか、ユウリからも甘えるように腰を振ってきてくれて──"
translation = "그뿐만 아니라, 유우리 쪽에서도 응석 부리듯 허리를 흔들어 와서──"

[[dialogue]]
speaker = "ユウリ"
original = "「はぁっ、あっ、あっ、はぁあんっ……<emoji=heart04>\u3000もういいっ……<emoji=heart04>\u3000もう焦らさなくてもいいから、もっと動いてっ……<emoji=heart04>」"
translation = "「하앗, 앗, 앗, 하아앙……<emoji=heart04> 이제 됐어……<emoji=heart04> 이제 안 태워도 되니까, 더 움직여줘……<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「もっとち○ちんで好きって言ってっ……<emoji=heart04>\u3000あたしのこと可愛いって言ってっ……<emoji=heart04>」"
translation = "「더 자지로 좋아한다고 말해줘……<emoji=heart04> 나보고 귀엽다고 말해줘……<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「興奮してくれてるの、はぁっ、はぁっ、本当はすげぇ嬉しいからっ……<emoji=heart04>\u3000やらしい目で見てくれるの幸せだからぁ……<emoji=heart04>」"
translation = "「흥분해 주는 거, 하앗, 하앗, 사실은 엄청 기쁘니까……<emoji=heart04> 야한 눈으로 봐주는 거 행복하니까아……<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「あたしの照れ屋なモジモジおま○こっ、彼氏ち○ちんでいっぱいズボズボしてぇぇっっ……<emoji=heart04>」"
translation = "「내 부끄럼쟁이 쭈뼛쭈뼛 보지, 남친 자지로 잔뜩 퍽퍽해줘어어엇……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ユウリの声に応えて、その手を思いっきり引き寄せる。"
translation = "유우리의 목소리에 응하여, 그 손을 힘껏 끌어당긴다."

[[dialogue]]
speaker = "ユウリ"
original = "「んぁっ、あっ、あっ、あっ、あっ、あはぁああっ、くふぁぁあああんんっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응앗, 앗, 앗, 앗, 앗, 아하아앗, 쿠후아아아앙응응으읏<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「これっ、これこれっ、イクっ<emoji=heart04>\u3000イクイクっ<emoji=heart04>\u3000イクぅぅぅっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「이거, 이거 이거, 가버려<emoji=heart04> 가버려 가버려<emoji=heart04> 가버려어어어억～～<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「この瞬間が一番幸せっ<emoji=heart04>\u3000大好きなヤツが、ふぁっ、あぁあっ、夢中であたしのこと愛してくれてっ<emoji=heart04>」"
translation = "「이 순간이 제일 행복해<emoji=heart04> 좋아하는 녀석이, 후앗, 아아앗, 정신없이 나를 사랑해 줘서<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「女の子になっちまうっ<emoji=heart04>\u3000らしくない声出して甘えちまうっ<emoji=heart04>」"
translation = "「여자아이가 돼버려<emoji=heart04> 나답지 않은 목소리 내며 응석 부리게 돼버려<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「だけどっ、あっ、ふぁっ、くはぁああんっっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000めちゃくちゃ幸せぇ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하지만, 앗, 후앗, 쿠하아아앙응응으읏<emoji=heart04><emoji=heart04><emoji=heart04> 너무 행복해……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "顔をフニャフニャにしてユウリが快感に喘ぐ。"
translation = "얼굴을 흐물흐물하게 풀고 유우리가 쾌감에 헐떡인다."

[[dialogue]]
speaker = "unk"
original = "普段の強気な彼女からは想像も付かないほど、目尻を垂らして、だらしなく口を半開きにして。"
translation = "평소의 강한 척하는 그녀에게서는 상상도 할 수 없을 정도로, 눈꼬리를 늘어뜨리고, 다정하게 입을 반쯤 벌린 채."

[[dialogue]]
speaker = "unk"
original = "そんなユウリの姿が一番好きだ。恋人の俺にしか見せない顔。イチャイチャしてる時だけ見せてくれる女の子の顔──"
translation = "그런 유우리의 모습이 가장 좋다. 연인인 나에게만 보여주는 얼굴. 꽁냥거리고 있을 때만 보여주는 여자아이의 얼굴──"

[[dialogue]]
speaker = "ユウリ"
original = "「ふぁああんっっ<emoji=heart04>\u3000あはぁあんっっ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000もっと、あっ、あっ、もっと激しくしていいからっ……<emoji=heart04>」"
translation = "「후아아앙응으읏<emoji=heart04> 아하아앙응으읏<emoji=heart04> 기분 좋아<emoji=heart04> 더, 앗, 앗, 더 격하게 해도 되니까……<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「あたしも気持ち良くするっ<emoji=heart04>\u3000んふぅぅんんっっ<emoji=heart04>\u3000おま○こいっぱい締めてっ、ち○ちん気持ち良くしてあげたいっ<emoji=heart04>」"
translation = "「나도 기분 좋게 해줄게<emoji=heart04> 응후우웅응으읏<emoji=heart04> 보지 잔뜩 조여서, 자지 기분 좋게 해주고 싶어<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「一緒に気持ち良くなろっ<emoji=heart04>\u3000たくさんエッチしよっ<emoji=heart04>\u3000大好きな彼氏と、あはぁあんっ、いっぱいイチャイチャしたいっ<emoji=heart04>」"
translation = "「같이 기분 좋아지자<emoji=heart04> 잔뜩 섹스하자<emoji=heart04> 좋아하는 남친이랑, 아하아앙, 잔뜩 꽁냥거리고 싶어<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「あっ、あっ、あんっ、おま○こキュンキュンするっ<emoji=heart04>\u3000彼氏のち○ちん、抱き締めちゃうっ<emoji=heart04>」"
translation = "「앗, 앗, 앙, 보지 큥큥거려<emoji=heart04> 남친 자지, 꽉 껴안아 버릴래<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「おっきなち○ちんで、奥までズンズンされて、んぁっ、ああっ<emoji=heart04>\u3000深いところ、入って、あっ、あっ、んん～～～っ<emoji=heart04>」"
translation = "「커다란 자지로, 안쪽까지 즈응즈응당해서, 응앗, 아앗<emoji=heart04> 깊은 곳, 들어와서, 앗, 앗, 응응～～～으읏<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「あっ、あっ、あっ、あっ<emoji=heart04>\u3000そうっ、もっと腕引っ張ってっ<emoji=heart04>\u3000奥気持ちいいっ<emoji=heart04>\u3000イクっ、イクイクイクぅぅっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗, 앗, 앗, 앗<emoji=heart04> 그래, 더 팔을 잡아당겨줘<emoji=heart04> 안쪽 기분 좋아<emoji=heart04> 가버려, 가버려 가버려 가버려어어억～～<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「あふぁっ、嬉しいっ<emoji=heart04>\u3000ち○ちんすげぇブルブルしてくれてっ<emoji=heart04>\u3000ビュービュー我慢汁噴き出してくれてっ<emoji=heart04>」"
translation = "「아후앗, 기뻐<emoji=heart04> 자지 엄청 부르르 떨어줘서<emoji=heart04> 뷰뷰 쿠퍼액 뿜어내 줘서<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「いつでも出していいからなっ<emoji=heart04>\u3000好きなだけ出してくれていいからっ<emoji=heart04>」"
translation = "「언제든 싸도 되니까 말이야<emoji=heart04> 마음껏 싸줘도 되니까<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「だけど絶対、膣内に出してっ<emoji=heart04>\u3000腕引っ張りながら、奥の奥にドピュドピュしてっ<emoji=heart04>」"
translation = "「하지만 절대, 질 내부에 싸줘<emoji=heart04> 팔 잡아당기면서, 깊숙한 곳에 도퓨도퓨 해줘<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「膣内に出してもらうの一番好きだからっ<emoji=heart04>\u3000出した後もっ、あっ、あっ、ち○ちん絶対すぐ抜かないでっ……<emoji=heart04>」"
translation = "「질 내부에 싸주는 게 제일 좋으니까<emoji=heart04> 싼 뒤에도, 앗, 앗, 자지 절대 바로 빼지 마……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "腕を引っ張る動きに合わせてユウリが器用に腰を揺らす。"
translation = "팔을 잡아당기는 움직임에 맞춰 유우리가 능숙하게 허리를 흔든다."

[[dialogue]]
speaker = "unk"
original = "キスの雨を降らせるように子宮口を亀頭にチュッチュと当てて、ジュクジュクのおま○こで肉竿にねぶってくる。"
translation = "키스 세례를 퍼붓듯이 자궁구를 귀두에 츄츄 대며, 질척질척한 보지로 육봉을 핥아 온다."

[[dialogue]]
speaker = "unk"
original = "それがたまらなく気持ちよくてペニスが蕩けそうだ。デレデレのユウリに溶かされていく心地がピストンをさらに加速させていく。"
translation = "그것이 참을 수 없을 정도로 기분 좋아서 페니스가 녹아버릴 것 같다. 데레데레해진 유우리에게 녹아가는 기분이 피스톤을 더욱 가속시킨다."

[[dialogue]]
speaker = "ユウリ"
original = "「ふぁっ、あふぁっ<emoji=heart04>\u3000きてるっ、えへへっ、ち○ちんすっげぇビクついてるぅっ<emoji=heart04>」"
translation = "「후앗, 아후앗<emoji=heart04> 오고 있어, 에헤헷, 자지 엄청 움찔거리고 있어어<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「でももっとぉっ<emoji=heart04>\u3000もっとち○ちんアツアツに火照らせてっ<emoji=heart04>\u3000もっとあたしのおま○こ夢中で犯してっ<emoji=heart04>」"
translation = "「하지만 더어<emoji=heart04> 더 자지 뜨겁게 달궈줘<emoji=heart04> 더 내 보지 정신없이 범해줘<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「バニー姿、いくらでもオカズにしていいからっ<emoji=heart04>\u3000ハメてっ<emoji=heart04>\u3000もっとハメてっ<emoji=heart04>\u3000いっぱい興奮してぇっ<emoji=heart04>」"
translation = "「바니 모습, 얼마든지 반찬으로 삼아도 되니까<emoji=heart04> 박아줘<emoji=heart04> 더 박아줘<emoji=heart04> 잔뜩 흥분해줘어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "言われるまでもなくユウリのおま○こをハメまくる。"
translation = "말할 것도 없이 유우리의 보지를 마구 박아댄다."

[[dialogue]]
speaker = "unk"
original = "セクシーなバニー姿を見下ろしながら、ピストンに喘ぎ悶える彼女の姿をオカズにしながら──"
translation = "섹시한 바니 모습을 내려다보며, 피스톤에 헐떡이며 몸부림치는 그녀의 모습을 반찬 삼아──"

[[dialogue]]
speaker = "ユウリ"
original = "「はふあぁああっっ<emoji=heart04>\u3000イクっ、イクイクっ<emoji=heart04>\u3000あああああっっ<emoji=heart04>\u3000はげしっ、気持ちっ、イくっ、イックぅぅぅっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하후아아아앗<emoji=heart04> 가버려, 가버려 가버려<emoji=heart04> 아아아아앗<emoji=heart04> 격해, 기분 좋아, 가, 가버려어어어억～～<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「しゅきっ、だいしゅきっ<emoji=heart04>\u3000あふぁぁあっっ、ち○ちん熱いっ<emoji=heart04>\u3000おま○こ焼けちゃっ、イクぅぅぅっっ～～<emoji=heart04>」"
translation = "「조아, 너무 조아<emoji=heart04> 아후아아앗, 자지 뜨거워<emoji=heart04> 보지 타버렷, 가버려어어어억～～<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「んぁっ、あっ、イクイクっ<emoji=heart04>\u3000爆発しそうなち○ちんで、あたしのおま○こ、イク、イっちゃうぅっっ<emoji=heart04><emoji=heart04>」"
translation = "「응앗, 앗, 가버려 가버려<emoji=heart04> 폭발할 것 같은 자지로, 내 보지, 가, 가버려어어엇<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「あふぁぁっっ<emoji=heart04>\u3000くるっ<emoji=heart04>\u3000くるくるっ<emoji=heart04>\u3000くるくるくるぅぅっっ<emoji=heart04>」"
translation = "「아후아아앗<emoji=heart04> 온다<emoji=heart04> 온다 온다<emoji=heart04> 온다 온다 온다아아악<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「出してっ<emoji=heart04>\u3000一滴残らず膣内に出してっ<emoji=heart04>\u3000あたしのおま○こっ、彼氏精子で、ラブラブ精子でっっ<emoji=heart04>」"
translation = "「싸줘<emoji=heart04> 한 방울도 남김없이 질 내부에 싸줘<emoji=heart04> 내 보지, 남친 정액으로, 러브러브 정액으로어어어엇<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「満タンにしてええぇぇぇっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가득 채워줘어어어어억～～<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「くふぁあああっっ<emoji=heart04>\u3000あああああっっ<emoji=heart04>\u3000あっ、あっ、んはぁああああっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「쿠후아아아앗<emoji=heart04> 아아아아앗<emoji=heart04> 앗, 앗, 응하아아아아앗～～<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「しゅごっ、あふぁあああっっ、いつもより熱いっ<emoji=heart04>\u3000多いっ<emoji=heart04>\u3000イくイくイくぅぅっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「대단해, 아후아아아앗, 평소보다 뜨거워<emoji=heart04> 많아<emoji=heart04> 가버려 가버려 가버려어어어억～～<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「きもひいいっっ、しあわせぇっ、しゅきぃっ、んふぁぁぁっ、しゅきぃぃっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「기분 조아아, 행복해에, 조아아, 응후아아앗, 조아아아아악<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「このままぜんぶだしへっ<emoji=heart04>\u3000ぜったいぬかないでっ<emoji=heart04>\u3000ずっとつながってたいっ、ぜんぶうけとめたいっ、しゃせーでもっとイキたいっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「이대로 전부 싸줘어<emoji=heart04> 절대 빼지 마아<emoji=heart04> 계속 이어져 있고 싶어, 전부 받아내고 싶어, 사정으로 더 가고 싶어어어어억<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "全身を激しく痙攣させながら、ユウリが震えるおま○こでペニスを咥え込んでくる。"
translation = "전신을 격하게 경련시키며, 유우리가 떨리는 보지로 페니스를 물고 늘어진다."

[[dialogue]]
speaker = "unk"
original = "ぎゅっと絞られる快感を貪りながら、俺も無我夢中で中出しし続ける。"
translation = "꽉 조여지는 쾌감을 탐하며, 나도 무아지경으로 질내사정을 계속한다."

[[dialogue]]
speaker = "unk"
original = "そして──"
translation = "그리고──"

[[dialogue]]
speaker = "ユウリ"
original = "「くはぁぁーっ、はぁーっ、はぁーっ、あふぁぁ……<emoji=heart04>\u3000こんなに溢れるくらい、えへへ、注いでくれて……<emoji=heart04>」"
translation = "「쿠하아아-앗, 하아-앗, 하아-앗, 아후아아……<emoji=heart04> 이렇게 넘칠 정도로, 에헤헤, 부어줘서……<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「バニー着るだけで、こんなに興奮してくれるんだ……<emoji=heart04>\u3000あたしのバニー姿でこんなに発情してくれるんだ……<emoji=heart04>」"
translation = "「바니 입는 것만으로, 이렇게 흥분해 주는구나……<emoji=heart04> 내 바니 모습에 이렇게 발정해 주는구나……<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「えへへ、嬉しい……<emoji=heart04>\u3000たまには、んふぁ……<emoji=heart04>\u3000女の子らしい服着るの、ありかも……<emoji=heart04>」"
translation = "「에헤헤, 기뻐……<emoji=heart04> 가끔은, 응후아……<emoji=heart04> 여자아이 같은 옷 입는 거, 괜찮을지도……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "照れて拒んでいた姿はどこへやら、ユウリが幸せいっぱいの笑みを浮かべてくれる。"
translation = "부끄러워하며 거부하던 모습은 어디 가고, 유우리가 행복 가득한 미소를 지어준다."

[[dialogue]]
speaker = "unk"
original = "でもきっと我に返ったらまた照れて取り乱してしまうんだろう。エッチを終えた後のユウリは照れ屋に拍車がかかるから。"
translation = "하지만 분명 정신을 차리면 다시 부끄러워하며 당황해 버리겠지. 섹스를 마친 뒤의 유우리는 부끄럼쟁이 기질에 박차가 가해지니까."

[[dialogue]]
speaker = "unk"
original = "だけど──"
translation = "하지만──"

[[dialogue]]
speaker = "ユウリ"
original = "「あっ……<emoji=heart04>\u3000まだ抜いちゃヤダ……<emoji=heart04>\u3000しばらくこのままでいて……<emoji=heart04>」"
translation = "「앗……<emoji=heart04> 아직 빼면 싫어……<emoji=heart04> 잠시 이대로 있어줘……<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「もっとイチャイチャしてたい……<emoji=heart04>\u3000大好きな人と繋がってたい……<emoji=heart04>」"
translation = "「더 꽁냥거리고 싶어……<emoji=heart04> 좋아하는 사람이랑 이어져 있고 싶어……<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「それとできたら、はぁはぁ、もっかいしたい……<emoji=heart04>\u3000ううん、もっかいじゃなくて、もっともっとしたい……<emoji=heart04>」"
translation = "「그리고 가능하다면, 하아하아, 한 번 더 하고 싶어……<emoji=heart04> 아니, 한 번 더가 아니라, 더 더 하고 싶어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "だけど──だからこそデレデレなユウリが可愛くて仕方がない。"
translation = "하지만── 그렇기에 데레데레해진 유우리가 귀여워서 견딜 수가 없다."

[[dialogue]]
speaker = "unk"
original = "この後、我に返って焦る姿を想像するとさらに愛しさが膨れあがってくる。"
translation = "이후에 정신을 차리고 당황할 모습을 상상하니 더욱 사랑스러움이 부풀어 오른다."

[[dialogue]]
speaker = "ユウリ"
original = "「今度はあたしが上がいい……<emoji=heart04>\u3000繋がったままあたしのこと抱き上げて……？」"
translation = "「이번에는 내가 위가 좋아……<emoji=heart04> 연결된 채로 나를 안아 올려줘……?」"

[[dialogue]]
speaker = "ユウリ"
original = "「そんで二回戦……しよ<emoji=heart04>\u3000してくれなきゃ、許さないから……<emoji=heart04>」"
translation = "「그러고서 2회전…… 하자<emoji=heart04> 안 해주면, 용서 안 할 거니까……」"

[[dialogue]]
speaker = "unk"
original = "閉店作業が遅れた理由を何か考えておこう。"
translation = "폐점 작업이 늦어진 이유를 뭔가 생각해 두자."

[[dialogue]]
speaker = "unk"
original = "そうして唇を尖らせて甘えてくるユウリに唇を重ねながら、俺は可愛い彼女を抱き起こした。"
translation = "그렇게 입술을 내밀며 응석 부리는 유우리에게 입술을 겹치며, 나는 귀여운 여자친구를 안아 일으켰다."

