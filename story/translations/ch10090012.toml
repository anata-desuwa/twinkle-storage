[[dialogue]]
speaker = "unk"
original = "第２話,副会長来訪？,P"
translation = "제2화, 부회장 내방?, P"

[[dialogue]]
speaker = "マトイ"
original = "「ねぇ会長、学園生活や星徒会には慣れてきた？」"
translation = "「저기 회장, 학원 생활이나 성도회에는 좀 익숙해졌어?」"

[[dialogue]]
speaker = "unk"
original = "おかげさまで"
translation = "덕분에"

[[dialogue]]
speaker = "マトイ"
original = "「なら良かった。いきなりの御前試合だったもんね。私も驚いちゃった」"
translation = "「그럼 다행이다. 갑작스러운 어전 시합이었으니까 말이야. 나도 깜짝 놀랐어」"

[[dialogue]]
speaker = "セーラ"
original = "「やっほー。遊びに来たよ～♪」"
translation = "「얏호~ 놀러 왔어~♪」"

[[dialogue]]
speaker = "ソフィア"
original = "「セーラ先輩が言うと本気に聞こえますよ」"
translation = "「세라 선배가 말하면 진심처럼 들려요」"

[[dialogue]]
speaker = "セーラ"
original = "「ソフィアっち手厳しー。はい、これお土産のお菓子。お母さんの実家から送ってくれたやつでマジオススメ」"
translation = "「소피아치 너무해~. 자, 이거 선물로 가져온 과자. 우리 엄마 친가에서 보내주신 건데 진짜 추천해」"

[[dialogue]]
speaker = "マトイ"
original = "「あ、美味しそう……。わざわざありがとうございます。お茶淹れますね」"
translation = "「아, 맛있겠다…… 일부러 감사합니다. 차 내올게요」"

[[dialogue]]
speaker = "ソフィア"
original = "「いえ、お構いなく。遊びに来たわけではありませんので」"
translation = "「아뇨, 신경 쓰지 마세요. 놀러 온 게 아니니까요」"

[[dialogue]]
speaker = "セーラ"
original = "「まぁまぁ。これから仲良くしなきゃだし、遠慮しなくていいんじゃない？」"
translation = "「에이~ 이제부터 사이좋게 지내야 하니까 사양하지 않아도 되잖아?」"

[[dialogue]]
speaker = "マトイ"
original = "「そうですね。どうぞどうぞ」"
translation = "「맞아요. 자, 어서요」"

[[dialogue]]
speaker = "ソフィア"
original = "「むー……」"
translation = "「무으……」"

[[dialogue]]
speaker = "unk"
original = "何かご用ですか？"
translation = "무슨 용건인가요?"

[[dialogue]]
speaker = "セーラ"
original = "「新星の星徒会でも聞いてるっしょ？\u3000今回のリクリエはヤバそうだから流星と新星両校の連携を強めていきたいって話。こないだの星読事変のこともあるしね」"
translation = "「신성 성도회에서도 들었지? 이번 리크리에는 위험해 보이니까 유성과 신성 양교의 연계를 강화하고 싶다는 이야기. 요전번의 성독사변 일도 있고 말이야」"

[[dialogue]]
speaker = "セーラ"
original = "「でも新星学園ってこんな感じなんだね～。ライバル校だから入ったことなかったけど、こんなに近くにあるのに全然知らないってのも変な感じ」"
translation = "「그나저나 신성 학원은 이런 느낌이구나~. 라이벌 학교라 들어와 본 적 없었는데, 이렇게 가까이 있는데 전혀 모른다는 것도 이상한 기분이야」"

[[dialogue]]
speaker = "セーラ"
original = "「そっちの星徒会は会長さんとマトイちゃん……あとヴィーナスちゃん、アナちゃん、サーシャさんだっけ」"
translation = "「그쪽 성도회는 회장님이랑 마토이짱…… 그리고 비너스짱, 아나짱, 사샤 씨였나」"

[[dialogue]]
speaker = "セーラ"
original = "「新星の方が自由な校風ってイメージだけど、新星の星徒会のが真面目なメンツ多いかも。流星の方はガラじゃないメンツがけっこういるからね～、うち含めて」"
translation = "「신성 쪽이 자유로운 학풍이라는 이미지지만, 신성 성도회가 더 성실한 멤버가 많을지도. 유성 쪽은 안 어울리는 멤버가 꽤 있거든~ 나를 포함해서」"

[[dialogue]]
speaker = "ソフィア"
original = "「全くです。みなさんフィオナ会長をもう少し見習ってください」"
translation = "「정말이지 그래요. 여러분 피오나 회장님을 조금이라도 본받으세요」"

[[dialogue]]
speaker = "マトイ"
original = "「ヴィーナスがいるので自由さならこちらも負けていませんよ」"
translation = "「비너스가 있어서 자유로움이라면 이쪽도 지지 않는답니다」"

[[dialogue]]
speaker = "セーラ"
original = "「あ～、確かにあの子のフリーダムさには負けるかな。破天荒っていうか、型破りっていうか、楽しそうな子だとは思うけど」"
translation = "「아~ 확실히 그 아이의 프리덤함에는 질지도 모르겠네. 파천황이라고 해야 하나, 형식을 파괴한다고 해야 하나, 즐거워 보이는 아이긴 하지만」"

[[dialogue]]
speaker = "セーラ"
original = "「会長さんとマトイちゃんは星徒会楽しい？」"
translation = "「회장님이랑 마토이짱은 성도회 즐거워?」"

[[dialogue]]
speaker = "マトイ"
original = "「楽しいって言っていいのかわかりませんけど……そうですね、楽しんでると思います。振り回されることも多いですが」"
translation = "「즐겁다고 말해도 될지 모르겠지만…… 그렇네요, 즐기고 있다고 생각해요. 휘둘리는 일도 많지만요」"

[[dialogue]]
speaker = "unk"
original = "俺もけっこう楽しいです"
translation = "저도 꽤 즐거워요"

[[dialogue]]
speaker = "セーラ"
original = "「そっかそっか」"
translation = "「그렇구나 그렇구나」"

[[dialogue]]
speaker = "セーラ"
original = "「それで本題だけど、こういうのどう？\u3000ちょっと企画資料作ってみたんだけど」"
translation = "「그래서 본론인데, 이런 건 어때? 기획 자료를 좀 만들어 봤는데」"

[[dialogue]]
speaker = "マトイ"
original = "「資料見やすいですね。さすがセーラ先輩です。ふむふむ……両星徒会主導で合同文化祭や、生徒同士で技術を教え合うなど……」"
translation = "「자료가 보기 편하네요. 역시 세라 선배예요. 흠흠…… 양 성도회 주도로 합동 문화제나, 학생들끼리 기술을 서로 가르쳐주는 등……」"

[[dialogue]]
speaker = "セーラ"
original = "「あと代表者を出して模擬戦したり、両校対抗の体育大会とか、バチバチぶつかるのでもいいと思うな。激闘の後で友情が芽生える、的な」"
translation = "「그리고 대표자를 내서 모의전을 하거나, 양교 대항 체육 대회라든가, 치열하게 부딪히는 것도 좋다고 봐. 격투 끝에 우정이 싹트는 그런 느낌으로」"

[[dialogue]]
speaker = "ソフィア"
original = "「流星学園と新星学園の部活同士で競うのもいいかもしれませんね」"
translation = "「유성 학원과 신성 학원의 동아리끼리 경쟁하는 것도 좋을 것 같네요」"

[[dialogue]]
speaker = "マトイ"
original = "「ではお菓子いただきますね。……あ、このおせんべい、ほんとにおいしい」"
translation = "「그럼 과자 잘 먹겠습니다. ……아, 이 센베이 정말 맛있어」"

[[dialogue]]
speaker = "セーラ"
original = "「マトイちゃんが全部食べちゃっても口裏合わせてあげるからね」"
translation = "「마토이짱이 전부 먹어버려도 내가 입 맞춰 줄게」"

[[dialogue]]
speaker = "マトイ"
original = "「もうっ、みんなの分もちゃんと残しておきますから」"
translation = "「정말, 다른 사람들 몫도 제대로 남겨둘 거라니까요」"

[[dialogue]]
speaker = "セーラ"
original = "「ははははっ」"
translation = "「하하하하」"

[[dialogue]]
speaker = "セーラ"
original = "「見送りありがと。ソフィアちゃんはスケートの練習あるからって、お姉ちゃんにも会わずにさっさと帰っちったけど」"
translation = "「배웅 고마워. 소피아짱은 스케이트 연습 있다면서 언니도 안 만나고 얼른 돌아가 버렸지만」"

[[dialogue]]
speaker = "セーラ"
original = "「いや～、ソフィアちゃんもマトイちゃんも真面目だけど、うちへの態度全然違うね～。あ、マトイちゃんにはお茶ありがとうって伝えといて」"
translation = "「이야~ 소피아짱도 마토이짱도 성실하지만, 나를 대하는 태도는 전혀 다르네~. 아, 마토이짱한테는 차 고맙다고 전해줘」"

[[dialogue]]
speaker = "セーラ"
original = "「じゃ、今日出たアイディアはお互いの星徒会で共有しとくとして、今後も案を出し合っていこー」"
translation = "「자, 오늘 나온 아이디어는 서로의 성도회에서 공유하기로 하고, 앞으로도 안을 계속 내보자고~」"

[[dialogue]]
speaker = "セーラ"
original = "「会長さんはどんなふうに仕事してるのかなと思ったけど、それなりにやれてそうだね。見に来れて良かったよ」"
translation = "「회장님은 어떤 식으로 일하고 있나 싶었는데, 나름대로 잘하고 있는 것 같네. 보러 오길 잘했어」"

[[dialogue]]
speaker = "セーラ"
original = "「流星と新星の星徒会って普通じゃないし大変だから、自分の意志じゃないと後悔するかもしれない。もちろん自分で選んでも後悔するかもしれないけど」"
translation = "「유성과 신성의 성도회는 평범하지 않아서 힘드니까, 자기 의지가 아니면 후회할지도 몰라. 물론 스스로 선택해도 후회할지 모르지만」"

[[dialogue]]
speaker = "セーラ"
original = "「……でも、会長さんがそうじゃなくて良かった」"
translation = "「……하지만 회장님이 그렇지 않아서 다행이야」"

[[dialogue]]
speaker = "unk"
original = "セーラさんはどうだったんですか？"
translation = "세라 씨는 어땠나요?"

[[dialogue]]
speaker = "セーラ"
original = "「ん？\u3000前の星徒会のことが気になる？\u3000そっか、居残り組だって言ってたもんね」"
translation = "「응? 전임 성도회 때 일이 궁금해? 그렇구나, 잔류파라고 했었지」"

[[dialogue]]
speaker = "セーラ"
original = "「うち、前の星徒会長に誘われて星徒会に入ったの。自慢話みたいでアレなんだけど……１年の時に実技試験でめっちゃいい点出て、その時の星徒会長に目をつけられちゃって」"
translation = "「나, 전임 성도회장한테 권유받아서 성도회에 들어왔어. 자랑 같아서 좀 그렇긴 한데…… 1학년 때 실기 시험에서 엄청 좋은 점수가 나와서, 그때 성도회장 눈에 띄어버렸거든」"

[[dialogue]]
speaker = "セーラ"
original = "「最初はやんわり断ったし、実技でわざと手を抜いて最初のはまぐれですって言ったんだけど、それでも諦めてくれなくて」"
translation = "「처음엔 완곡하게 거절했고, 실기에서 일부러 힘을 빼서 처음 건 우연이라고 말했는데도 포기해주질 않더라고」"

[[dialogue]]
speaker = "セーラ"
original = "「あなたが必要なの、ってまっすぐ目を見て口説かれちゃってね。結局、星徒会入っちゃった」"
translation = "「네가 필요해, 라고 똑바로 눈을 보며 꼬셔버려서 말이야. 결국 성도회에 들어오게 됐지」"

[[dialogue]]
speaker = "セーラ"
original = "「でもその時にはうちはもう２年になってて、センパイ――あ、例のうちを勧誘した当時の星徒会長のことなんだけど。センパイと同じ星徒会にいられたのは短い間だけだった」"
translation = "「하지만 그때 난 이미 2학년이 되어 있었고, 선배―― 아, 아까 말한 나를 권유했던 당시 성도회장 말이야. 선배랑 같은 성도회에 있을 수 있었던 건 짧은 시간뿐이었어」"

[[dialogue]]
speaker = "セーラ"
original = "「『センパイ、もういなくなっちゃうじゃないですか』って、ぶー垂れながら言ったんだけどさ、センパイは得意げに笑ってた」"
translation = "「『선배, 이제 곧 없어져 버리잖아요』라고 투덜거리며 말했는데, 선배는 득의양양하게 웃고 있었지」"

[[dialogue]]
speaker = "セーラ"
original = "「その顔見てたら、文句言えなくなっちゃって。会長が代わっても、何かの形で星徒会には関わろうって思ったの」"
translation = "「그 얼굴을 보고 있으니 불평을 할 수 없게 되더라고. 회장이 바뀌어도 어떤 형태로든 성도회에는 관여하자고 생각했어」"

[[dialogue]]
speaker = "セーラ"
original = "「だからって副会長になるとは思わなかったけど！」"
translation = "「그렇다고 부회장이 될 줄은 몰랐지만!」"

[[dialogue]]
speaker = "セーラ"
original = "「……って、会長さんはもっとすごいよね、転入してすぐ御前試合だったんだから。なんかおかしーや」"
translation = "「……그나저나 회장님은 더 대단하네, 전입하자마자 어전 시합이었으니까. 왠지 웃기네」"

[[dialogue]]
speaker = "セーラ"
original = "「でも懐かしいな～。前の星徒会も楽しかったなー」"
translation = "「그래도 그립다~. 전임 성도회도 즐거웠는데」"

[[dialogue]]
speaker = "セーラ"
original = "「任期が終わって解散した時、いい仲間だったなって会長さんも振り返れるといいね」"
translation = "「임기가 끝나고 해산했을 때, 좋은 동료였다고 회장님도 회상할 수 있으면 좋겠네」"

[[dialogue]]
speaker = "セーラ"
original = "「おっと、電話だ。ごめーん、それじゃまったね～」"
translation = "「앗, 전화다. 미안~ 그럼 다음에 봐~」"

