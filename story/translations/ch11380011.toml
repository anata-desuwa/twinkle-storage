[[dialogue]]
speaker = "unk"
original = "第１話,恋人のメルエルが増えた場合,P"
translation = "제1화, 연인인 메르엘이 늘어난 경우, P"

[[dialogue]]
speaker = "unk"
original = "メルエルと恋人として学園生活を送っていたある日のこと。"
translation = "메르엘과 연인으로서 학원 생활을 보내고 있던 어느 날의 일."

[[dialogue]]
speaker = "メルエル"
original = "「まさか、自分がもう１人増えちゃうなんて……！」"
translation = "「설마, 자신이 한 명 더 늘어나 버리다니……!」"

[[dialogue]]
speaker = "メルエル（幼少）"
original = "「うん、しかもちっちゃい体に変身しちゃってて、自分でもビックリしちゃったよ～」"
translation = "「응, 게다가 조그만 몸으로 변신해 버려서, 나 스스로도 깜짝 놀랐어~」"

[[dialogue]]
speaker = "unk"
original = "なんと、ヴィーナスの持つ『女神の力』の影響を受けて、メルエルが２人に増えてしまった。"
translation = "놀랍게도 비너스가 가진 『여신의 힘』의 영향을 받아, 메르엘이 두 명으로 늘어나 버렸다."

[[dialogue]]
speaker = "unk"
original = "ヴィーナス自身や、その時近くにいたレミカも同じような現象に見舞われており、俺はその解決を手伝っていた。"
translation = "비너스 자신이나, 그때 근처에 있던 레미카도 비슷한 현상을 겪고 있었고, 나는 그 해결을 돕고 있었다."

[[dialogue]]
speaker = "メルエル"
original = "「でも、ヴィーナスちゃんが無事に元の１人へ戻れたのを見るに、私たちも戻る為には、何か自分が望むことを叶える必要があるみたいだけど……」"
translation = "「하지만, 비너스짱이 무사히 원래의 한 명으로 돌아온 걸 보면, 우리도 돌아가기 위해서는 뭔가 자신이 바라는 것을 이룰 필요가 있는 것 같은데……」"

[[dialogue]]
speaker = "メルエル"
original = "「う～ん、でも、私の望むことかぁ……」"
translation = "「으~음, 하지만 내가 바라는 거라아……」"

[[dialogue]]
speaker = "メルエル"
original = "「正直、私は会長くんとお付き合いできててすごく幸せだから、パッとは思いつかないなぁ」"
translation = "「솔직히 나는 회장 군이랑 사귀고 있어서 정말 행복하니까, 바로 떠오르지는 않네」"

[[dialogue]]
speaker = "メルエル（幼少）"
original = "「そこは色々あるでしょ？\u3000たとえば、会長くんと早く本当に結婚したいとか……！」"
translation = "「거기엔 여러 가지가 있잖아? 예를 들면, 회장 군이랑 빨리 정말로 결혼하고 싶다든가……!」"

[[dialogue]]
speaker = "メルエル"
original = "「はいっ！？\u3000なななっ、いっきなり何を言ってるのかな、ちっちゃい私！？」"
translation = "「하앗!? 머머머, 갑자기 무슨 말을 하는 거야, 어린 나!?」"

[[dialogue]]
speaker = "メルエル（幼少）"
original = "「だって……もう婚約指輪までもらってるんだもん。内心ではよく妄想してるでしょ？」"
translation = "「그치만…… 벌써 약혼반지까지 받았는걸. 내심 자주 망상하고 있지?」"

[[dialogue]]
speaker = "メルエル"
original = "「それはそうだけど……って、違うよ！\u3000そういうことじゃなくて、普通は考えてても恥ずかしくて言えないでしょ！？」"
translation = "「그건 그렇지만…… 아니, 틀려! 그런 게 아니라, 보통은 생각하고 있어도 부끄러워서 말 못 하잖아!?」"

[[dialogue]]
speaker = "メルエル"
original = "「それに、私が思ってても、会長くんが早く結婚したいかどうかは、わからないし……」"
translation = "「게다가 내가 생각하고 있어도, 회장 군이 빨리 결혼하고 싶어 할지는 모르고……」"

[[dialogue]]
speaker = "unk"
original = "そう言って恥ずかしそうに、ちらっと俺の顔を伺ってくるメルエル。"
translation = "그렇게 말하며 부끄러운 듯, 슬쩍 내 안색을 살피는 메르엘."

[[dialogue]]
speaker = "unk"
original = "ただ、流石に学園を卒業してからかな？"
translation = "다만, 역시 학원을 졸업하고 나서일까?"

[[dialogue]]
speaker = "unk"
original = "俺も、メルエルと早く結婚したい。"
translation = "나도, 메르엘과 빨리 결혼하고 싶어."

[[dialogue]]
speaker = "メルエル"
original = "「！\u3000か、会長くん……<emoji=heart04>」"
translation = "「! 회, 회장 군……<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「はうぅ～<emoji=heart04>\u3000そんなこと言われたら、嬉しすぎて、メルトしちゃうよぉ～……<emoji=heart04>」"
translation = "「하우우~<emoji=heart04> 그런 말을 들으면, 너무 기뻐서 멜트해버릴 것 같아아~……<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル（幼少）"
original = "「えへへへへへぇ<emoji=heart04>\u3000私も嬉しいな<emoji=heart04>\u3000――って、あっ！\u3000もしかして……」"
translation = "「에헤헤헤헤헤<emoji=heart04> 나도 기뻐<emoji=heart04> ――어라, 앗! 설마……」"

[[dialogue]]
speaker = "メルエル（幼少）"
original = "「私が一体なんの為に増えたのか、わかったかも……！」"
translation = "「내가 대체 무엇을 위해서 늘어난 건지, 알 것 같아……!」"

[[dialogue]]
speaker = "メルエル"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker = "メルエル（幼少）"
original = "「大きな私が恥ずかしがって言えない本心を、小さな私が背中を押すために増えたんじゃないかな？」"
translation = "「커다란 내가 부끄러워서 말하지 못하는 본심을, 작은 내가 등을 밀어주기 위해서 늘어난 게 아닐까?」"

[[dialogue]]
speaker = "メルエル"
original = "「あっ！\u3000だからさっき恥ずかしがらずに、思っていることを……！」"
translation = "「앗! 그래서 아까 부끄러워하지 않고, 생각하고 있는 것을……!」"

[[dialogue]]
speaker = "メルエル（幼少）"
original = "「うん。なんかこの体だと、不思議と勇気が湧いてくる感じがするんだ♪」"
translation = "「응. 왠지 이 몸이면, 신기하게 용기가 솟아나는 느낌이 들어♪」"

[[dialogue]]
speaker = "メルエル（幼少）"
original = "「それなら……元に戻るには、私がよく妄想してるけど、会長くんの前だと恥ずかしくて言えないことを、実行に移せばいいんじゃないかな？」"
translation = "「그러면…… 원래대로 돌아가려면, 내가 자주 망상하곤 하지만, 회장 군 앞이라 부끄러워서 말 못 하는 것들을, 실행에 옮기면 되지 않을까?」"

[[dialogue]]
speaker = "メルエル"
original = "「えっ……えぇ～っ！？」"
translation = "「엣…… 에에~!?」"

[[dialogue]]
speaker = "unk"
original = "そうして、メルエルに『恥ずかしいから２人（３人）きりになれる場所がいい』とお願いされ、俺の部屋へと移動してくることになった。"
translation = "그렇게 해서, 메르엘에게 『부끄러우니까 둘(셋)이서만 있을 수 있는 장소가 좋아』라는 부탁을 받아, 내 방으로 이동하게 되었다."

[[dialogue]]
speaker = "メルエル"
original = "「うぅ～、妄想を実際に叶えちゃうなんて、恥ずかしい……！\u3000このままメルトしちゃいそうだよぉ～……<emoji=heart04>」"
translation = "「우우~, 망상을 실제로 이루어버리다니, 부끄러워……! 이대로 멜트해버릴 것 같아아~……<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル（幼少）"
original = "「それじゃあ、発表するね♪\u3000私が望んでいることは、『会長くんと新婚さんごっこをして、旦那様になってもらいたい』ってことだよ<emoji=heart04>」"
translation = "「그럼, 발표할게♪ 내가 바라는 건, 『회장 군과 신혼부부 놀이를 해서, 서방님이 되어주었으면 좋겠다』는 거야<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「なんでそんなノリノリで言えるの、ちっちゃい私！？」"
translation = "「어째서 그렇게 신이 나서 말할 수 있는 거야, 작은 나!?」"

[[dialogue]]
speaker = "メルエル（幼少）"
original = "「ふふっ♪\u3000今まで恥ずかしくて、大好きな会長くんに本心を言えなかった分、なんだか素直に言葉を口にできることが嬉しくって～<emoji=heart04>」"
translation = "「후훗♪ 지금까지 부끄러워서, 정말 좋아하는 회장 군에게 본심을 말하지 못했던 만큼, 왠지 솔직하게 말을 입 밖으로 낼 수 있는 게 기뻐서~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "……今までもだいぶストレートに好意を伝えてもらっていた気がするが、メルエル的にはあれでもまだ『恥ずかしい』と思って遠慮している部分があったらしい。"
translation = "……지금까지도 꽤 스트레이트하게 호의를 전해 받았던 기분이 들지만, 메르엘 입장에서는 저것조차 아직 『부끄럽다』고 생각하며 사양하고 있던 부분이 있었던 모양이다."

[[dialogue]]
speaker = "unk"
original = "彼氏としては『嬉しい』以外の感情はないのだけれど……まずい、メルエルは困っているのに、ニヤニヤしちゃうのはまずいぞ、俺！"
translation = "남자친구로서는 『기쁘다』 이외의 감정은 없지만…… 위험해, 메르엘은 곤란해하고 있는데, 싱글벙글 웃어버리는 건 위험하다고, 나!"

[[dialogue]]
speaker = "メルエル（幼少）"
original = "「えへへぇ<emoji=heart04>\u3000あんなことや、こんなことも、この体だったら言いたい放題だよぉ<emoji=heart04>」"
translation = "「에헤헤<emoji=heart04> 이런 일이나, 저런 일도, 이 몸이라면 말하고 싶은 대로야아<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「一刻も早く元に戻らないといけない気がしてきたよ！？」"
translation = "「한시라도 빨리 원래대로 돌아가야만 할 것 같은 기분이 들어!?」"

[[dialogue]]
speaker = "unk"
original = "なら早速、『新婚さんごっこ』しよっか"
translation = "그럼 당장, 『신혼부부 놀이』 할까"

[[dialogue]]
speaker = "メルエル"
original = "「！\u3000そ、そんな子供みたいなお願い、聞いてくれるの……！？」"
translation = "「! 그, 그런 아이 같은 부탁, 들어주는 거야……!?」"

[[dialogue]]
speaker = "unk"
original = "もちろんだと力強く頷いて見せる。"
translation = "물론이라고 힘차게 고개를 끄덕여 보인다."

[[dialogue]]
speaker = "unk"
original = "というか、彼女とイチャイチャできるだけなので、俺にも得しかない……"
translation = "그보다, 그녀와 꽁냥거릴 수 있을 뿐이라, 나에게도 이득밖에 없다……"

[[dialogue]]
speaker = "メルエル"
original = "「か、会長くん<emoji=heart04>\u3000それじゃあ……」"
translation = "「회, 회장 군<emoji=heart04> 그러면……」"

[[dialogue]]
speaker = "メルエル"
original = "「その……だ、<b>旦那様</b><emoji=heart04>\u3000不束者ですが、よろしくお願いします……<emoji=heart04>」"
translation = "「그…… 서, <b>서방님</b><emoji=heart04> 부족한 사람이지만, 잘 부탁드려요……<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル（幼少）"
original = "「旦那様……私、ラブラブなキスがしたいです<emoji=heart04>」"
translation = "「서방님…… 나, 러브러브한 키스가 하고 싶어요<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「えっ！？\u3000ちっちゃな私！？」"
translation = "「엣!? 작은 나!?」"

[[dialogue]]
speaker = "メルエル（幼少）"
original = "「ん～っ<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「응~<emoji=heart04> 츄……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ずいっと俺に顔を近づけてきた小さなメルエルから、そのまま唇を奪われる。"
translation = "쑥 하고 나에게 얼굴을 가까이 가져온 작은 메르엘에게, 그대로 입술을 빼앗긴다."

[[dialogue]]
speaker = "メルエル"
original = "「いきなりキスとか、早いよ！？\u3000女の子から行くのもちょっとはしたない気がするし、ムードとか流れとか、色々あるでしょ！？」"
translation = "「갑자기 키스라니, 빨라!? 여자애가 먼저 하는 것도 좀 조신하지 못한 것 같고, 분위기나 흐름이라든가, 여러 가지 있잖아!?」"

[[dialogue]]
speaker = "メルエル（幼少）"
original = "「だって……私は旦那様のこと、大好きなんだもん<emoji=heart04>」"
translation = "「그치만…… 나는 서방님을 정말 좋아하는걸<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル（幼少）"
original = "「受け入れてくれるって思ったら、好きって気持ちが抑えられなくなっちゃうでしょ？」"
translation = "「받아들여 줄 거라고 생각하면, 좋아한다는 마음을 억누를 수 없게 되어버리잖아?」"

[[dialogue]]
speaker = "メルエル（幼少）"
original = "「おっきい私だって、できることなら会長くんとちゅーしたまま、ベッドの中で２４時間ずっとイチャイチャしてみたいって思ってるじゃん♪」"
translation = "「커다란 나도, 할 수만 있다면 회장님과 츄-한 채로, 침대 안에서 24시간 내내 꽁냥거려 보고 싶다고 생각하고 있잖아♪」"

[[dialogue]]
speaker = "メルエル"
original = "「思ってないよ、そんなはしたないこと！？」"
translation = "「생각 안 해, 그런 조신하지 못한 짓!?」"

[[dialogue]]
speaker = "メルエル（幼少）"
original = "「自分に嘘ついても意味ないんだよ？」"
translation = "「자신에게 거짓말해 봤자 의미 없다구?」"

[[dialogue]]
speaker = "メルエル"
original = "「…………はいぃ、嘘です。妄想しちゃってたことあります」"
translation = "「…………하으으, 거짓말이에요. 망상해 버린 적 있어요」"

[[dialogue]]
speaker = "unk"
original = "（メルエルが俺とそんな妄想を……！？）"
translation = "（메르엘이 나와 그런 망상을……!?）"

[[dialogue]]
speaker = "unk"
original = "まずい！\u3000ニヤニヤするな、俺！\u3000彼女が恥ずかしがってるのに、それはあまりよくないぞ……！"
translation = "위험해! 싱글벙글하지 마, 나! 그녀가 부끄러워하고 있는데, 그건 별로 좋지 않다고……!葬"

[[dialogue]]
speaker = "unk"
original = "でも嬉しい！！\u3000普段の行動が奥ゆかしいから、メルエルってもしかしてベタベタするの好きじゃないのかも、って思ってたところは正直ある！！"
translation = "하지만 기뻐!! 평소 행동이 조신하니까, 메르엘은 혹시 달라붙는 걸 좋아하지 않는 건가, 하고 생각했던 부분도 솔직히 있었어!!"

[[dialogue]]
speaker = "メルエル（幼少）"
original = "「だから、おっきい私がこのまま恥ずかしがってたら、私の方が旦那様といっぱいラブラブしちゃうんだから♪」"
translation = "「그러니까, 커다란 내가 이대로 부끄러워하고 있으면, 내가 서방님이랑 잔뜩 러브러브해 버릴 거니까♪」"

[[dialogue]]
speaker = "メルエル"
original = "「そんなぁ……う、うぅぅ～～！」"
translation = "「그런…… 으, 으으으~~!」"

[[dialogue]]
speaker = "unk"
original = "メルエルは恥ずかしそうにしながらも、決意したように深呼吸をして──"
translation = "메르엘은 부끄러워하면서도, 결심한 듯 심호흡을 하고──"

[[dialogue]]
speaker = "メルエル"
original = "「すぅ～、はぁ～。だ、旦那様……<emoji=heart04>」"
translation = "「스으~, 하아~. 서, 서방님……<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「私も、き、キス<emoji=heart04>\u3000したいです……<emoji=heart04>」"
translation = "「저도, 키, 키스<emoji=heart04> 하고 싶어요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ちっちゃいメルエルと違い、受け身でそっと唇を差し出すメルエルの唇に、俺は優しくキスをする。"
translation = "조그만 메르엘과 달리, 수동적으로 살며시 입술을 내미는 메르엘의 입술에, 나는 상냥하게 키스한다."

[[dialogue]]
speaker = "メルエル"
original = "「んっ……<emoji=heart04>\u3000ちゅっ<emoji=heart04>」"
translation = "「응……<emoji=heart04> 츄<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "どうしよう……これ、ヤバいかも"
translation = "어쩌지…… 이거, 위험할지도"

[[dialogue]]
speaker = "メルエル"
original = "「え？\u3000い、今のキス、変だったかな……！？」"
translation = "「에? 지, 지금 키스, 이상했나……!?」"

[[dialogue]]
speaker = "メルエル（幼少）"
original = "「――そうじゃなくて、好きな子２人に挟まれてのキスで、幸せすぎてクラクラしてきちゃう？」"
translation = "「──그게 아니라, 좋아하는 아이 두 명 사이에 끼어서 하는 키스라, 너무 행복해서 어질어질해진 거야?」"

[[dialogue]]
speaker = "メルエル"
original = "「そ、そうなんだ……えへへへへへぇ<emoji=heart04>\u3000会長くんが幸せに感じてくれてるなら、嬉しいな……♪」"
translation = "「그, 그렇구나…… 에헤헤헤헤헤<emoji=heart04> 회장님이 행복하게 느껴준다면, 기뻐요……♪」"

[[dialogue]]
speaker = "メルエル（幼少）"
original = "「ふふっ♪\u3000なら奥さんとして、もっと旦那様にご奉仕しないとね<emoji=heart04>」"
translation = "「후훗♪ 그럼 아내로서, 좀 더 서방님께 봉사해야겠네<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「うん<emoji=heart04>\u3000旦那様、いっぱい幸せになって下さい<emoji=heart04>」"
translation = "「응<emoji=heart04> 서방님, 잔뜩 행복해지세요<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル（幼少）"
original = "「ん～っ<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000旦那様、大好きっ<emoji=heart04>」"
translation = "「음~<emoji=heart04> 츄<emoji=heart04> 서방님, 정말 좋아해<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「私も好き……<emoji=heart04>\u3000心から愛してます<emoji=heart04>\u3000ちゅっ<emoji=heart04>」"
translation = "「저도 좋아해요……<emoji=heart04> 진심으로 사랑하고 있어요<emoji=heart04> 츄<emoji=heart04>」"

[[dialogue]]
speaker = "２人"
original = "「ちゅっ<emoji=heart04>\u3000ちゅっ……<emoji=heart04>\u3000ちゅっ<emoji=heart04>」"
translation = "「츄<emoji=heart04> 츄……<emoji=heart04> 츄<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それからも２人のメルエルから時に同時に、時に交互にキスの雨を降らされて、俺は何も考えられなくなってしまうくらい、甘くて幸せな時間を過ごすのだった。"
translation = "그 후로도 두 명의 메르엘로부터 때로는 동시에, 때로는 번갈아 가며 키스 세례를 받으며, 나는 아무것도 생각할 수 없게 될 정도로 달콤하고 행복한 시간을 보내는 것이었다."

