[[dialogue]]
speaker = "unk"
original = "第１話,守護天使のお茶会,P"
translation = "제1화, 수호천사의 다과회, P"

[[dialogue]]
speaker = "unk"
original = "クリスマスパーティーが終わって少し経ったある日、大聖堂カフェテリアへ足を運ぶと、守護天使３人がお茶しているところに遭遇した。"
translation = "크리스마스 파티가 끝나고 조금 지난 어느 날, 대성당 카페테리아로 발걸음을 옮기자 수호천사 3명이 차를 마시고 있는 것을 발견했다."

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「あら、会長。こんにちは。もしかして、会長もお茶しにきたのかしら？」"
translation = "「어머, 회장. 안녕하세요. 혹시 회장도 차 마시러 온 걸까?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「そう、仕事の休憩にきたのね。それなら、せっかくだし、わたくしたちと一緒にお茶でもどうかしら？\u3000――ねぇ、ママダレナ、いいでしょう？」"
translation = "「그래, 업무 중에 쉬러 왔구나. 그렇다면 모처럼이니 우리랑 같이 차라도 어떠니? ──그렇지, 마마다레나, 괜찮지?」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ええ、もちろんいいですよ。会長さま、隣の席が空いていますから、どうぞ」"
translation = "「네, 물론 좋지요. 회장님, 옆자리가 비어있으니 앉으세요.」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「我も構わぬぞ、人の子よ。もぐもぐ……ほら、チキンも沢山あるぞ。話のつまみに食べるがよい」"
translation = "「나도 상관없다, 사람의 아이여. 우물우물…… 봐라, 치킨도 많이 있다. 이야기 안주 삼아 먹어라.」"

[[dialogue]]
speaker = "unk"
original = "俺はお言葉に甘えて、同席させてもらうことにした。"
translation = "나는 호의를 받아들여 동석하기로 했다."

[[dialogue]]
speaker = "unk"
original = "セシア、学園生活にはなれてきた？"
translation = "세시아, 학원 생활에는 익숙해졌어?"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ええ、附属校のみんなが優しくしてくれて、とても楽しいわ」"
translation = "「응, 부속 학교 모두가 친절하게 대해줘서 아주 즐거워.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「わたくしのママになってくれそうな人たちも見つけたのよ♪\u3000ふふっ、甘え甲斐がありそうだわ。あむっ……もぐもぐ」"
translation = "「내 마마가 되어줄 것 같은 사람들도 찾았단다♪ 후훗, 어리광부릴 보람이 있을 것 같아. 아함…… 우물우물」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「セシア、口元にケーキのクリームが付いてますよ。拭きますから、じっとしてて下さい」"
translation = "「세시아, 입가에 케이크 크림이 묻었어요. 닦아줄 테니 가만히 계세요.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ん……♪\u3000えへへ、ママダレナ、ありがと～<emoji=heart04>」"
translation = "「응……♪ 에헤헤, 마마다레나, 고마워~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マグダレナさんは『ママ』なんだね"
translation = "막달레나 씨는 『마마』구나"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「そうよ。わたくしが初めて、ママというものを知った相手……記憶が失われても、魂がちゃんとママダレナのことを覚えていたわ」"
translation = "「그래. 내가 처음으로 마마라는 존재를 알게 된 상대…… 기억을 잃어도 영혼이 똑똑히 마마다레나를 기억하고 있었어.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「私自身は、母性というものに自覚があるわけではないのですが……」"
translation = "「정작 저는 모성이라는 것에 자각이 있는 건 아닙니다만……」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「母というならば、種族を司る我の方が相応しいと思うのだが、セシアの感覚はいまいちわからぬ」"
translation = "「어머니라고 한다면 종족을 관장하는 내가 더 어울릴 것 같다만, 세시아의 감각은 영 모르겠군.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「理屈ではないのよ、アルモタヘル。あなたもここに来て、食文化にハマったのならわかるでしょう？\u3000好きとは理屈を超越するの」"
translation = "「이론이 아니야, 아르모타헬. 너도 여기 와서 식문화에 빠졌다면 알 거 아니니? 좋아함이란 이론을 초월하는 거야.」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「確かに、栄養の補給であっても、つい美味な肉を求めてしまう……そうか、セシアよ。我にとっての肉が、お前にとってのママであったのだな」"
translation = "「과연, 영양 보급일 뿐이라도 무심코 맛있는 고기를 찾게 되지…… 그런가, 세시아여. 나에게 있어서의 고기가 너에게 있어서의 마마였던 것이군.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ええ、アルモタヘル。わたくしたち、転生前よりお互いのことをわかりあえそうね♪」"
translation = "「그래, 아르모타헬. 우리, 전생 전보다 서로를 더 잘 이해할 수 있을 것 같네♪」"

[[dialogue]]
speaker = "unk"
original = "そういえば、セシアはなんで転生したんだ？"
translation = "그러고 보니 세시아는 왜 전생한 거야?"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ああ、そういえば、会長にはまだ、転生の経緯を話していなかったわね」"
translation = "「아, 그러고 보니 회장에게는 아직 전생의 경위를 이야기하지 않았었네.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「転生前のわたくしは、『蓄積』を司る守護天使『《<ruby>万成<rt>ばんせい</rt></ruby>》のアウクセシア』。生物の成長や進化、時間の進行などの概念を管理していたわ」"
translation = "「전생 전의 나는 『축적』을 관장하는 수호천사 『만성의 아우크세시아』. 생물의 성장이나 진화, 시간의 진행 등의 개념을 관리했어.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「アウクセシアが存在しなければ、この世界のあらゆる情報を記録し、保持することができません。いわば『世界の記憶装置』と言えるでしょう」"
translation = "「아우크세시아가 존재하지 않으면 이 세계의 온갖 정보를 기록하고 유지할 수 없습니다. 말하자면 『세계의 기억 장치』라고 할 수 있겠지요.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「そして、わたくしの霊力の源は、これまで三界が積み重ねてきたありとあらゆる蓄積――『世界の歴史』という圧倒的な情報量に直結していた」"
translation = "「그리고 내 영력의 근원은 지금까지 삼계가 쌓아온 온갖 축적 ── 『세계의 역사』라는 압도적인 정보량에 직결되어 있었지.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「《万成》の冠名が示す通り、『万物が積み重ねてきた集大成』というべき力を持っていたの」"
translation = "「《만성》이라는 관명이 나타내듯, 『만물이 쌓아온 집대성』이라 할만한 힘을 가지고 있었어.」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「３０００年前のリクリエ阻止以降、更に積み重ねられた三界の歴史によって、アウクセシアは我ら守護天使６柱の中でも最強というべき霊力を有していた」"
translation = "「3000년 전 리크리에 저지 이후 더욱 쌓여온 삼계의 역사 덕분에, 아우크세시아는 우리 수호천사 6주 중에서도 최강이라 할만한 영력을 보유하고 있었다.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「だからこそ、わたくしは何者かによって厳重な封印をかけられたみたいなの。ママダレナやアルモタヘルのように、わたくしは堕天すらも許されなかった」"
translation = "「그렇기에 나는 누군가에 의해 엄중한 봉인이 걸린 것 같아. 마마다레나나 아르모타헬처럼 나는 타천조차 허락되지 않았어.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「リクリエを起こそうとする上で、セシアの強大な力は邪魔だったのでしょう。利用せず、完全に封印することを選んだと考えられます」"
translation = "「리크리에를 일으키려 함에 있어 세시아의 강력한 힘은 방해가 되었겠지요. 이용하지 않고 완전히 봉인하는 것을 택했다고 생각됩니다.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「だけど、転生前のわたくしは、リクリエの危機が迫る中で、自分１人なにもできない状況を良しとしなかった。そこで、生まれ変わる道を選んだ」"
translation = "「하지만 전생 전의 나는 리크리에의 위기가 닥치는 상황에서 자신 혼자 아무것도 할 수 없는 상황을 좋게 여기지 않았어. 그래서 다시 태어나는 길을 택했지.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「自身を消滅させて、流星市国に転生することで、あなたたち星騎士の力になろうとしたのよ」"
translation = "「자신을 소멸시켜서 유성시국으로 전생함으로써 너희 성기사들의 힘이 되려고 했던 거야.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「そうして生まれたのが、わたくし、万成の守護天使２代目『セシア』というわけ」"
translation = "「그렇게 해서 태어난 것이 나, 만성의 수호천사 2대째 『세시아』라는 말씀.」"

[[dialogue]]
speaker = "unk"
original = "セシアとアウクセシアは違う存在なのか？"
translation = "세시아와 아우크세시아는 다른 존재야?"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ええ。どうしてわたくしが転生したのかという情報は思い出すことができたけど、アウクセシアとしての記憶は、完全に失われている」"
translation = "「응. 어째서 내가 전생했는지에 대한 정보는 떠올릴 수 있었지만, 아우크세시아로서의 기억은 완전히 잃었어.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「わたくしはあくまで生まれ変わり。この前誕生したばかりの、新たな守護天使セシアよ」"
translation = "「나는 어디까지나 환생. 얼마 전 탄생한 지 얼마 안 된 새로운 수호천사 세시아야.」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「と言いつつも、我らからすれば、話せば話す程、アウクセシアと全然変わらぬのだがな。マグダレナをママ扱いしたり……」"
translation = "「말은 그렇게 하지만 우리가 보기엔 대화하면 할수록 아우크세시아와 전혀 다르지 않다만. 막달레나를 마마 취급하거나……」"

[[dialogue]]
speaker = "unk"
original = "あ、転生前から、そこは変わらないんだ"
translation = "아, 전생 전부터 그건 변함없구나"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「はい。見た目は小さくなりましたが、中身は大体今みたいな感じですね」"
translation = "「네. 겉모습은 작아졌지만 알맹이는 대체로 지금 같은 느낌이네요.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「でも、私はセシアが昔と変わらないままで嬉しかったですよ。ふふっ……♪」"
translation = "「하지만 저는 세시아가 예전과 변함없는 모습이라 기뻤답니다. 후훗……♪」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ママダレナ……♪\u3000えへへ、セシアもママダレナにまた会えて嬉しいわ♪」"
translation = "「마마다레나……♪ 에헤헤, 세시아도 마마다레나를 다시 만나서 기뻐♪」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ん？\u3000なにかしら、会長？\u3000――なんでママ好きになったのか気になるですって？」"
translation = "「응? 왜 그래, 회장? ──왜 마마를 좋아하게 됐는지 궁금하다고?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「さっきも言ったけど、好きに理由なんてないのよ。心ある者ならば誰しも、本能でママを求めているの」"
translation = "「아까도 말했지만 좋아하는 데 이유 따윈 없어. 마음이 있는 자라면 누구나 본능으로 마마를 구하고 있어.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「そして、わたくしはただ、その本能に人より素直なだけよ」"
translation = "「그리고 나는 단지 그 본능에 남보다 솔직할 뿐이야.」"

[[dialogue]]
speaker = "unk"
original = "ただの性癖では……？"
translation = "그냥 성벽 아닌가……?"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「なによ会長、その顔は。あなただって、性癖の１つや２つ、あるでしょう？」"
translation = "「뭐야 회장, 그 표정은. 당신도 성벽 한두 개쯤은 있잖아?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ママの魅力に共感しないということは、わたくしのような小さい子の方が好きなのかしら？」"
translation = "「마마의 매력에 공감하지 못한다는 건 나처럼 작은 아이가 더 취향인 걸까?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「わたくしのことを話したんだもの。今度はあなたのことを教えなさい」"
translation = "「내 이야기를 했으니 이번엔 당신의 이야기를 가르쳐주렴.」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「ほう、人の子の性癖か。それは我も気になるな」"
translation = "「호오, 사람의 아이의 성벽인가. 그건 나도 궁금하군.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「こらこら、２人ともいけませんよ。そのように迫っては……」"
translation = "「얘들아, 둘 다 그러면 안 돼요. 그렇게 몰아붙이면……」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「大丈夫ですよ、会長さま。私はあなたがどんな性癖でも受け入れましょう。落ち着いて話して下さい」"
translation = "「괜찮아요, 회장님. 저는 당신이 어떤 성벽이라도 받아들일게요. 진정하고 말씀해 보세요.」"

[[dialogue]]
speaker = "unk"
original = "いや、話しませんよ！？"
translation = "아니, 말 안 한다고요!?"

[[dialogue]]
speaker = "unk"
original = "その後も守護天使３人から、性癖について追究される羽目になったのだった――"
translation = "그 뒤로도 수호천사 3명에게 성벽에 대해 추궁당하는 신세가 되었다──"

