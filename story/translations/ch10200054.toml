[[dialogue]]
speaker = "unk"
original = "第４話,ルルカと恋人ＡＳＭＲ・後編,P"
translation = "제4화, 루루카와 연인 ASMR·후편, P"

[[dialogue]]
speaker = "unk"
original = "ルルカに耳かきをしてあげることになり、リビングから俺の部屋へと場所を移した。"
translation = "루루카에게 귀를 파주기로 하여, 거실에서 내 방으로 장소를 옮겼다."

[[dialogue]]
speaker = "unk"
original = "ベッドに座った俺は、ルルカを膝の上に寝かせて、竹製の耳かきをそっと手に取る。"
translation = "침대에 앉은 나는, 루루카를 무릎 위에 눕히고, 대나무 귀이개를 살며시 손에 든다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あたしが耳かきするのはたまにしてるけど、お兄ちゃんにやってもらうのは初めてだよね」"
translation = "「내가 귀 파는 건 가끔 하고 있지만, 오빠가 해주는 건 처음이지」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「――昔、バイトで獣人系魔族の耳かきをしたことがあるから、慣れてる？」"
translation = "「――옛날에, 알바로 수인계 마족의 귀를 파준 적이 있어서, 익숙해?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「い、一体どんなバイトをしてたらそんな経験をするのか、相変わらずお兄ちゃんのバイト遍歴が気になるんだけど……」"
translation = "「도, 대체 어떤 알바를 하면 그런 경험을 하는 건지, 여전이 오빠의 알바 이력이 신경 쓰이는데……」"

[[dialogue]]
speaker = "unk"
original = "だから安心して、身を任せて"
translation = "그러니 안심하고, 몸을 맡겨줘"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ひゃあぁっ<emoji=heart04>\u3000お、お兄ちゃん、そんな急に近くで囁かれたら……ビックリして、ドキドキしちゃうよぉ……<emoji=heart04>」"
translation = "「히야아앗<emoji=heart04> 오, 오빠, 그렇게 갑자기 가까이서 속삭이면…… 깜짝 놀라서, 두근거려 버려어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は微笑みながら、そっと彼女のケモ耳に息を吹きかける。そのたびにルルカの体が小さく震え、頬がほんのり赤く染まっていく。"
translation = "나는 미소 지으며, 살며시 그녀의 수인 귀에 숨을 불어넣는다. 그럴 때마다 루루카의 몸이 작게 떨리고, 뺨이 발그레하게 물들어 간다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「お、お兄ちゃん、くすぐったくて耳がピコピコしちゃうよぉ……<emoji=heart04>」"
translation = "「오, 오빠, 간지러워서 귀가 쫑긋거려어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「んっ<emoji=heart04>\u3000お兄ちゃんの手が、耳に触れて……<emoji=heart04>」"
translation = "「응읏<emoji=heart04> 오빠의 손이, 귀에 닿아서……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それじゃあ、入れるよ？"
translation = "그럼, 넣을게?"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あっ<emoji=heart04>\u3000お兄ちゃん……ふあぁっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 오빠…… 후아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は耳かきをそっと差し込み、細い動きで優しく内側を撫でていく。ルルカの呼吸が、少しずつ甘く乱れていった。"
translation = "나는 귀이개를 살며시 밀어 넣어, 미세한 움직임으로 부드럽게 안쪽을 어루만져 간다. 루루카의 호흡이, 조금씩 달콤하게 흐트러져 갔다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「はぁぁ……んっ……<emoji=heart04>\u3000お兄ちゃんに耳の奥まで撫でられる感じがして……気持ちいい……<emoji=heart04>」"
translation = "「하아아…… 응읏……<emoji=heart04> 오빠가 귀 안쪽까지 어루만져 주는 느낌이 들어서…… 기분 좋아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "――痛くはないか？"
translation = "――아프지는 않아?"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ううん……ぜんぜん……<emoji=heart04>\u3000すごく上手だよ……お兄ちゃんの手、優しくて安心するの……<emoji=heart04>」"
translation = "「으응…… 전혀……<emoji=heart04> 정말 잘해…… 오빠 손, 다정해서 안심돼……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「んんっ……<emoji=heart04>\u3000耳の奥、こそばゆいけど……気持ちよくて……とろけちゃいそう……<emoji=heart04>」"
translation = "「응응……<emoji=heart04> 귀 안쪽, 간질거리지만…… 기분 좋아서…… 녹아버릴 것 같아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "――ルルカは最近、星騎士の訓練も、Ｖチューバーの活動も、すごく頑張ってるよな。"
translation = "――루루카는 최근에, 성기사 훈련도, 브이튜버 활동도, 정말 열심히 하고 있네."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ひゃうっ……！\u3000そ、そんな風に褒められたら……<emoji=heart04>\u3000もっと頑張りたくなっちゃう……<emoji=heart04>」"
translation = "「히야웃……! 그, 그런 식으로 칭찬받으면……<emoji=heart04> 더 열심히 하고 싶어져버려……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あたし、最近色んなフォームに変身できるようになってきたから……お兄ちゃんや、友達や、リスナーのみんな……みんなのこと、守れるようになりたいと思って……<emoji=heart04>」"
translation = "「나, 최근에 여러 폼으로 변신할 수 있게 됐으니까…… 오빠랑, 친구들이랑, 리스너들 모두…… 모두를, 지킬 수 있게 되고 싶다고 생각해서……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "――偉いな。自分だけじゃなく誰かの為に頑張れるルルカは、本当にすごい。"
translation = "――기특하네. 자신뿐만 아니라 누군가를 위해 노력하는 루루카는, 정말 대단해."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「はあぁ……<emoji=heart04>\u3000お兄ちゃんに褒められると……耳だけじゃなく、心まで気持ちよくなっちゃう……<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 오빠한테 칭찬받으면…… 귀뿐만 아니라, 마음까지 기분 좋아져버려……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "――いいよ。恥ずかしがらなくて。気持ちいいって、素直に感じて。"
translation = "――괜찮아. 부끄러워하지 마. 기분 좋다고, 솔직하게 느껴줘."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ふああぁっ……<emoji=heart04>\u3000お兄ちゃんの優しい声……好きぃ……<emoji=heart04>」"
translation = "「후아아앗……<emoji=heart04> 오빠의 다정한 목소리…… 좋아해에……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「はああぁ……<emoji=heart04>\u3000ふにゃぁ……<emoji=heart04>」"
translation = "「하아아아……<emoji=heart04> 후냐아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "耳かきが終わる頃には、ルルカは完全に力が抜け、とろけるような表情を浮かべていた。"
translation = "귀 파기가 끝날 무렵에는, 루루카는 완전히 힘이 빠져, 녹아내리는 듯한 표정을 짓고 있었다."

[[dialogue]]
speaker = "unk"
original = "耳かき、気持ちよかった？"
translation = "귀 파기, 기분 좋았어?"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「う、うん……<emoji=heart04>\u3000でも、耳だけじゃなくて……<emoji=heart04>」"
translation = "「으, 응……<emoji=heart04> 하지만, 귀뿐만이 아니라……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「お兄ちゃんと、もっと……イチャイチャしたい気分になってきちゃった……<emoji=heart04>」"
translation = "「오빠랑, 좀 더…… 꽁냥꽁냥하고 싶은 기분이 들어버렸어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ねぇ……しても、いい？」"
translation = "「저기…… 해도, 돼?」"

[[dialogue]]
speaker = "unk"
original = "俺は頷いて、再び耳元で囁くように言う。"
translation = "나는 고개를 끄덕이고, 다시 귓가에서 속삭이듯 말한다."

[[dialogue]]
speaker = "unk"
original = "――いいよ。おいで。"
translation = "――좋아. 이리 와."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ふあっ<emoji=heart04>\u3000――うん<emoji=heart04>\u3000お兄ちゃん……<emoji=heart04>」"
translation = "「후앗<emoji=heart04> ――응<emoji=heart04> 오빠……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ルルカは体を起こすと、胸に飛び込むように抱きついてくる。"
translation = "루루카는 몸을 일으키더니, 품에 뛰어들 듯이 안겨 온다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「はああぁっ……<emoji=heart04>\u3000お兄ちゃんの匂い……落ち着くのに、ドキドキする……<emoji=heart04>」"
translation = "「하아아앗……<emoji=heart04> 오빠 냄새…… 안심되는데, 두근거려……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺の胸元に顔を埋め、嬉しそうにスリスリと頬を寄せる。"
translation = "내 가슴팍에 얼굴을 묻고, 기쁜 듯이 부비부비 뺨을 비빈다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ねぇ、お兄ちゃん……<emoji=heart04>\u3000あたし、キスしたい……<emoji=heart04>」"
translation = "「저기, 오빠……<emoji=heart04> 나, 키스하고 싶어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は頷き、ルルカの頬に手を添えて、唇を重ねた。"
translation = "나는 고개를 끄덕이고, 루루카의 뺨에 손을 얹어, 입술을 겹쳤다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「んっ……<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 츄……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "柔らかい唇が触れ合うたび、彼女の体がわずかに震える。その耳元で、俺はそっと口にする。"
translation = "부드러운 입술이 맞닿을 때마다, 그녀의 몸이 미세하게 떨린다. 그 귓가에, 나는 살며시 속삭인다."

[[dialogue]]
speaker = "unk"
original = "――ルルカ、好きだよ。愛してる。"
translation = "――루루카, 좋아해. 사랑해."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ひゃうっ……<emoji=heart04>\u3000お兄ちゃん、耳元でそんなこと言われたら……<emoji=heart04>\u3000もう、だめ……好きが止まらなくなっちゃうよぉ……<emoji=heart04>」"
translation = "「히야웃……<emoji=heart04> 오빠, 귓가에서 그런 말을 들으면……<emoji=heart04> 이제, 안 돼…… 좋아하는 마음이 멈추지 않게 돼버려어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はルルカの耳たぶの内側にキスを落としながら、何度も何度も『好き』と囁く。"
translation = "나는 루루카의 귓볼 안쪽에 키스를 남기며, 몇 번이고 몇 번이고 『좋아해』라고 속삭인다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「んんっ……<emoji=heart04>\u3000そんなに好きって言われたら……あたしも……気持ちがいっぱい溢れてきちゃう……<emoji=heart04>」"
translation = "「응응……<emoji=heart04> 그렇게 좋아한다고 말해주면…… 나도…… 마음이 가득 넘쳐흘러 버려……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あたしも、お兄ちゃんが大好き……世界でいちばん好き……<emoji=heart04>」"
translation = "「나도, 오빠가 너무 좋아…… 세상에서 제일 좋아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ん～っ……<emoji=heart04>\u3000ちゅっ……ちゅっ……<emoji=heart04>」"
translation = "「응~……<emoji=heart04> 츄…… 츄……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "――俺も、ルルカの声が大好きだ。聞いてるだけで、心が溶けそうになる。"
translation = "――나도, 루루카의 목소리가 정말 좋아. 듣고 있는 것만으로도, 마음이 녹을 것 같아."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「えへへ……<emoji=heart04>\u3000嬉しい……でもね、あたしは声だけじゃなくて――」"
translation = "「에헤헤……<emoji=heart04> 기뻐…… 하지만 말야, 나는 목소리뿐만이 아니라――」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「お兄ちゃんの優しいところも、男らしいところも、全部、ぜんぶ好き……<emoji=heart04>」"
translation = "「오빠의 다정한 점도, 남자다운 점도, 전부, 전부 좋아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ちょっとエッチなところも……あたしだけの特別だから……もっと好き……<emoji=heart04>」"
translation = "「조금 야한 점도…… 나만의 특별함이니까…… 더 좋아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は愛しさをこらえきれず、ルルカを強く抱きしめる。"
translation = "나는 사랑스러움을 참지 못하고, 루루카를 강하게 껴안는다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あっ……<emoji=heart04>\u3000お兄ちゃん……ぎゅ～ってされるの、好き……<emoji=heart04>」"
translation = "「앗……<emoji=heart04> 오빠…… 꼬옥 안아주는 거, 좋아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「キスも、もっとしたい……<emoji=heart04>」"
translation = "「키스도, 더 하고 싶어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「んむっ……<emoji=heart04>\u3000ちゅっ……んちゅっ……<emoji=heart04>」"
translation = "「음뭇……<emoji=heart04> 츄…… 응츄……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "唇が触れるたび、世界が甘くとろけていく。"
translation = "입술이 닿을 때마다, 세계가 달콤하게 녹아내려 간다."

[[dialogue]]
speaker = "unk"
original = "２人だけの静かな部屋で、俺たちは言葉よりも多くの『好き』を確かめ合うように、何度も何度もキスを重ねるのだった。"
translation = "둘만의 조용한 방에서, 우리들은 말보다 더 많은 『좋아함』을 서로 확인하듯, 몇 번이고 몇 번이고 키스를 거듭하는 것이었다."

