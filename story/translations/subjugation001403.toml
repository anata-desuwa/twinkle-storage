[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「はぁっ、はぁっ、あひぃぃっ……！」"
translation = "「하앗, 하앗, 아히이이익……!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「んっ、ふっ、んっ、んんっ……！」"
translation = "「응, 흣, 응, 으으음……!」"

[[dialogue]]
speaker = "unk"
original = "水着戦闘服をものにするべく、砂浜を走る２人。"
translation = "수영복 전투복을 마스터하기 위해 백사장을 달리는 두 사람."

[[dialogue]]
speaker = "unk"
original = "だが──"
translation = "하지만──"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ぜぇっ、ぜぇっ、ぜぇっ……！\u3000うへぇぇぇ……！」"
translation = "「허억, 허억, 허억……! 우헤에에……!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「大丈夫ですか、ルリエルさんっ。遅れていますよっ？」"
translation = "「괜찮으세요어, 루리에르 씨이. 뒤처지고 있어요어?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ぜんぜ、大丈夫じゃない、ですぅ……！\u3000というか──」"
translation = "「저녀, 안 괜찮아욧……! 그보다──」"

[[dialogue]]
speaker = "unk"
original = "背中が丸まってきてるぞ！\u3000もっと背筋伸ばして！"
translation = "등이 굽어지고 있어! 허리를 더 펴!"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「そもそもどーして砂浜なんて走らされてるんですかぁ～！？」"
translation = "「애초에 왜 백사장 같은 데를 뛰게 하는 거냐구욧~!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「はい？\u3000もちろん、新しい力を使いこなすためにですが」"
translation = "「네에? 당연히 새로운 힘을 다루기 위해서입니다만아」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「他にやり方がありますよね！？\u3000これじゃ体育会系ですよ！\u3000もしくは軍隊ですよ！\u3000ピカピカの水着女子がすることじゃないですぅ！」"
translation = "「다른 방법도 있잖아욧! 이건 체육회 계열이라구욧! 아니면 군대라구욧! 반짝반짝 수영복 미소녀가 할 짓이 아니란 말이에욧!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「潮風を浴びながらランニングなんて気持ちいいではありませんか。砂浜の走りづらさも体力向上にもってこいです。体幹も強くなりますしね」"
translation = "「해풍을 맞으며 러닝이라니 기분 좋지 않나요어. 백사장의 달리기 힘든 점도 체력 향상에 안성맞춤이에요어. 체간도 강해지고요어.」"

[[dialogue]]
speaker = "unk"
original = "浅瀬を走るのもいいかもな"
translation = "얕은 곳을 달리는 것도 좋을지 모르겠네."

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「水の抵抗が加わって天然のパワーアンクルになるわけですね！\u3000膝下くらいまで入って走ってみましょう！」"
translation = "「물의 저항이 더해져 천연 파워 앵클이 되는 거군요어! 무릎 아래 정도까지 들어가서 달려봐요어!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「おふたりとも脳まで筋肉さんですか！？\u3000ぜーったいに嫌ですよぉ！\u3000こんな地味で辛いだけの特訓をしても星力制御なんかできませんってばぁ～！」"
translation = "「두 분 다 뇌까지 근육인가욧!? 저어얼대로 싫어욧! 이런 수수하고 힘들기만 한 특훈을 해도 성력 제어 같은 건 못 한다니까욧~!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「見てください！\u3000ぶぉ、ぶぉおおおっっ──ぶおっほっ……！？\u3000息が上がりすぎてわたし、法螺貝の演奏すらままならなくなってますよぉ……！！」"
translation = "「보세요어! 부오, 부오오오오오── 부억훅……!? 숨이 너무 가빠서 저, 소라나팔 연주조차 제대로 안 된다구욧……!!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「しかし、こういった基礎訓練以外となると、どういった特訓を行うべきなのか……」"
translation = "「하지만, 이런 기초 훈련 이외라면 어떤 특훈을 해야 할지……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「フィオナ会長、カムバーックっ！\u3000ルリエル、新星学園では生きていけそうにありませ～んっ！」"
translation = "「피오나 회장님, 컴바아악! 루리에르, 신성학원에서는 못 살 것 같아욧~!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「絶対に他の方法がありますってば！\u3000ほらヘレナさんも言ってましたよねっ？\u3000人工戦闘服を使いこなすには、きっかけが必要だって……！」"
translation = "「분명히 다른 방법이 있다니까욧! 봐요어, 헬레나 씨도 말했었죠어? 인공 전투복을 마스터하려면 계기가 필요하다고……!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「？？？」"
translation = "「???」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「なんで疑問符を浮かべてるんですか！？\u3000あの時ですよ、あの時！」"
translation = "「왜 물음표를 띄우고 있는 거예욧!? 그때잖아욧, 그때!」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「人工戦闘服は半ば強引に力の組成を変化させる。慣れぬ内は自身の潜在能力に振り回されることもあるだろう」"
translation = "「인공 전투복은 절반쯤 강압적으로 힘의 조성을 변화시킨다. 익숙해지기 전까지는 자신의 잠재능력에 휘둘리는 일도 있겠지」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「身に付けるものひとつで世界の見え方や気分が変わると言ったが、己がその世界や心持ちに適応できなければ意味がない」"
translation = "「몸에 걸치는 것 하나로 세계가 보이는 방식이나 기분이 바뀐다고 했지만, 자신이 그 세계나 마음가짐에 적응하지 못하면 의미가 없다」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「何かきっかけを掴めば、２人も立ち所に新たな力を使いこなせるようになるだろう」"
translation = "「무언가 계기를 잡으면, 두 사람도 즉시 새로운 힘을 다룰 수 있게 되겠지」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ほえー……何かきっかけを掴めば、ですかぁ……」"
translation = "「호에─…… 무언가 계기를 잡으면, 인가요어……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「どんな水着にしましょうか……王道のビキニもいいですが、際どいハイレグも捨てがたい……」"
translation = "「어떤 수영복으로 할까요어…… 왕도인 비키니도 좋지만, 아슬아슬한 하이레그도 버리기 힘드네요어……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「マイクロビキニなんて大胆過ぎ……。ハッ──ボディペイントは水着に入るのでしょうか……！？」"
translation = "「마이크로 비키니라니 너무 대담해……. 핫── 바디 페인팅은 수영복에 포함되는 걸까요어……!?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「２人には期待している。より幅広い人工戦闘服が実用化すれば、私も星騎士たちを好きに着替えさせたい放題──ではなく、より貴殿らを助力できるようになるからな」"
translation = "「두 사람에게 기대하고 있다. 보다 폭넓은 인공 전투복이 실용화되면, 나도 성기사들을 마음껏 갈아입힐 수──가 아니라, 보다 귀공들을 도울 수 있게 될 테니까」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「言われてみれば……。あの時はその、自分の水着のことで頭がおっぱ──じゃなくて、いっぱいで……」"
translation = "「듣고 보니……. 그때는 그, 제 수영복 생각으로 머릿속이 자지──가 아니라, 가득해서……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「とにかく！\u3000こんなスポ根な修業は意味ないんです、したくないんです！\u3000せっかく海に来てるんですから、もっと違うことしましょうよ～！」"
translation = "「어쨌든! 이런 열혈 근성 수행은 의미 없어욧, 하고 싶지 않아욧! 어렵게 바다에 왔으니까, 좀 더 다른 걸 하자구욧~!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「では向こうに見える岩場でロッククライミングなど如何ですか？\u3000下が柔らかい砂浜ならたとえ落ちても怪我をしませんし！」"
translation = "「그럼 저기 보이는 암벽에서 록 클라이밍 같은 건 어떠세요어? 아래가 부드러운 백사장이라면 설령 떨어져도 다치지 않을 테고요어!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「いや普通に怪我しますよ！？\u3000何を『妙案を思いつきました！』みたいな顔で言ってるんですか！」"
translation = "「아니 보통 다치거든욧!? 뭘 『묘안을 떠올렸습니다!』 같은 얼굴로 말하는 거예욧!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ビーチバレーとか、サーフィンとか、水着ならではの体験をしようって言ってるんです～！」"
translation = "「비치발리볼이라든가, 서핑이라든가, 수영복이기에 할 수 있는 체험을 하자는 거예욧~!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「ビーチバレー……サーフィン……なるほど！\u3000良いアイデアですね！\u3000目から鱗です！」"
translation = "「비치발리볼…… 서핑…… 과연! 좋은 아이디어네요어! 금시초문이에요어!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「うぅ、ソフィアって、いつもこんなに大変な仕事をしていたのですね……。今度ツッコんでもらった時はお礼を言わないとですぅ……」"
translation = "「으으, 소피아는 항상 이렇게 힘든 일을 하고 있었던 거군요어……. 다음에 태클 걸어주면 고맙다고 말해야겠어욧……」"

[[dialogue]]
speaker = "unk"
original = "まぁまぁかき氷でも食べて落ち着いて"
translation = "자자, 빙수라도 먹으면서 진정해."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「そんなあからさまなご機嫌取りじゃルリエルは誤魔化されませんよ！\u3000シャクシャク──んん～！\u3000美味しいです！\u3000頭キーンってしますぅ～！」"
translation = "「그런 노골적인 비위 맞추기엔 루리에르가 안 속아욧! 아작아작── 음음~! 맛있어욧! 머리가 띵해욧~!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「アイスクリーム頭痛と呼ばれる症状ですね。おでこやこめかみを冷やせば、痛みが和らぐはずですよ」"
translation = "「아이스크림 두통이라 불리는 증상이네요어. 이마나 관자놀이를 식히면 통증이 완화될 거예요어」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「保健委員さんの豆知識！」"
translation = "「보건위원님의 토막 지식!」"

[[dialogue]]
speaker = "unk"
original = "それで話は戻るけど"
translation = "그래서 이야기가 돌아와서 말인데."

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「はい。星力の制御をするには何かしらのきっかけを掴めばいいんですよね？\u3000つまり、海や水着に関連する苦手を克服することが肝要ということでしょうか？」"
translation = "「네. 성력 제어를 하려면 무언가 계기를 잡으면 된다는 거죠어? 즉, 바다나 수영복에 관련된 서툰 점을 극복하는 것이 중요하다는 뜻일까요어?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「苦手は無理に克服しなくていいと思いますよ！\u3000その発想が既に体育会系ですってば！」"
translation = "「서툰 건 억지로 극복하지 않아도 된다고 생각해욧! 그 발상이 이미 체육회 계열이라니까욧!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「そういえばルリエルさんは泳げないとセーラさんが仰っていたような……」"
translation = "「그러고 보니 루리에르 씨는 수영을 못한다고 세라 씨가 말씀하셨던 것 같은데……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「き、気のせいですよぉ～。わたし、泳ぎにだけは自信があるんですぅ～」"
translation = "「기, 기분 탓이에욧~. 저, 수영만큼은 자신 있단 말이에욧~」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「ふふ、それなら遠泳をしてもいいかもしれませんね。海ならではの楽しい特訓ですし、私も水難救助の訓練になりますから」"
translation = "「후후, 그렇다면 원영을 해도 좋을지 모르겠네요어. 바다만의 즐거운 특훈이고, 저도 수난 구조 훈련이 되니까요어」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ごめんなさい！\u3000法螺を吹きました！\u3000ルリエル、カナヅチなのです！\u3000これっぽっちも泳げないのです！」"
translation = "「죄송해욧! 허풍 떨었어욧! 루리에르, 맥주병인 것이에욧! 이만큼도 못 헤엄치는 것이에욧!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「では尚更、星力制御に繋がるきっかけになり得るかもですね！」"
translation = "「그럼 더더욱 성력 제어로 이어지는 계기가 될 수도 있겠네요어!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「うわ～ん、この人、壁が高いほど燃えちゃうタイプの人ですぅ～！\u3000わたしはもっと甘やかされて育ちたいんですよぉ～……！」"
translation = "「우와앙, 이 사람, 벽이 높을수록 불타오르는 타입의 사람이에욧~! 저는 좀 더 응석받이로 자라고 싶단 말이에욧~……!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「というか、イクシーさんはどうなんですかっ？\u3000そんなに都合良く苦手なことがあるんですかっ？」"
translation = "「그보다, 익시 씨는 어떠세욧? 그렇게 사정 좋게 못하는 게 있나욧?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「私、ですか？\u3000そうですね……」"
translation = "「저, 말인가요어? 그렇네요어……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あっ、ないならないで構わないんですよっ！\u3000楽しく遊びながら、徐々に力を使いこなしていきましょう……！」"
translation = "「앗, 없으면 없는 대로 상관없어욧! 즐겁게 놀면서 서서히 힘을 마스터해 가자구욧……!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「いえ。強いて挙げるなら……」"
translation = "「아니요어. 굳이 꼽자면……」"

[[dialogue]]
speaker = "unk"
original = "ん……？"
translation = "응……?"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「～～っっ。み、水着姿に慣れないというのが一番でしょうか。会長に見つめられるだけでも、その、熱中症になってしまいそうなくらいで……」"
translation = "「~~윽. 수, 수영복 차림에 익숙해지지 않는 것이 가장 클까요어. 회장님이 쳐다보는 것만으로도, 그, 열사병에 걸려버릴 정도로……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「で……でも、確かにこれを克服すれば、何か変われそうな気はしますね……。新しい世界の扉が開けるような気がします……」"
translation = "「하…… 하지만, 확실히 이걸 극복하면 무언가 변할 수 있을 것 같은 기분은 드네요어……. 새로운 세계의 문이 열릴 것 같은 기분이 들어요어……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「想像するだけでも恥ずかしすぎて……はぁはぁ……死んでしまいそうですが……。もしも会長の視線に、んんっ、耐えられるようになれば……」"
translation = "「상상하는 것만으로도 너무 부끄러워서…… 하아하아…… 죽어버릴 것 같지만……. 만약 회장님의 시선을, 으음, 견딜 수 있게 된다면……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「待ってくださいっ！\u3000なんだか苦手を克服する流れになってませんかっ？\u3000何度も言いますが、進んで辛いことをする必要は──」"
translation = "「기다려욧! 왠지 서툰 걸 극복하는 흐름이 되지 않았나욧? 몇 번이나 말하지만, 굳이 힘든 일을 할 필요는──」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「いいえ、やりましょうっ！\u3000新たな力を身に付けるためですからっ！\u3000会長も協力してくださりますよねっ？」"
translation = "「아니요어, 해요어! 새로운 힘을 익히기 위해서니까요어! 회장님도 협력해 주실 거죠어?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ふえ～ん、苦手なことなんて聞かなきゃ良かったですぅ～！」"
translation = "「후에엥, 못하는 것 따위 묻지 말걸 그랬어욧~!」"

