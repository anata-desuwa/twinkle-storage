[[dialogue]]
speaker = "unk"
original = "第１０話,君の生き方を肯定する,B"
translation = "제10화, 너의 삶의 방식을 긍정한다, B"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「今さら……生き方を変えろなんて、無理なのよ」"
translation = "「이제 와서…… 삶의 방식을 바꾸라니, 무리야」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「学園に入ったことも──クロトに出会えたことだって！\u3000みんな日誌のおかげなんだから──！」"
translation = "「학원에 들어온 것도── 쿠로토를 만날 수 있었던 것도! 모두 일지 덕분이니까──!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──それは違う」"
translation = "「──그건 틀렸다」"

[[dialogue]]
speaker = "unk"
original = "でも。"
translation = "하지만."

[[dialogue]]
speaker = "unk"
original = "そのひと言だけは、きっぱりと否定した。"
translation = "그 한마디만은, 단호하게 부정했다."

[[dialogue]]
speaker = "unk"
original = "彼女はやはり──大事な部分を履き違えている。"
translation = "그녀는 역시── 중요한 부분을 착각하고 있다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ヴィーナスが今ここにいるのは、ヴィーナス自身のおかげだよ」"
translation = "「비너스가 지금 여기에 있는 건, 비너스 자신 덕분이야」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "unk"
original = "だから……俺は伝えてやらなくちゃいけなかった。"
translation = "그러니까…… 나는 전해줘야만 했다."

[[dialogue]]
speaker = "unk"
original = "いつまでも、日誌という鎖に縛られたままの彼女を、解放するために。"
translation = "언제까지나, 일지라는 사슬에 묶인 채인 그녀를, 해방시키기 위해서."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ここに書かれてるのは、ただの文字だ」"
translation = "「여기에 쓰여 있는 건, 단순한 글자다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「内容だって、ヴィーナスの人生を構成するほんの一部にすぎない。それこそ、女子が毎日したためる日記と変わらない程度にな」"
translation = "「내용도, 비너스의 인생을 구성하는 아주 일부에 지나지 않아. 그야말로, 여자가 매일 쓰는 일기와 다르지 않을 정도로 말이야」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「っ……な、何を……」"
translation = "「크읏…… 무, 무슨 말을……」"

[[dialogue]]
speaker = "unk"
original = "俺は未来の日誌を手に取って言う。"
translation = "나는 미래의 일지를 손에 들고 말한다."

[[dialogue]]
speaker = "unk"
original = "これは、彼女の思っているほど、だいそれた存在ではないのだと。"
translation = "이것은, 그녀가 생각하는 만큼, 대단한 존재가 아니라고."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「危険な竜が相手でも、みんながついてきてくれたのは──『日誌に書かれてるから』なんかじゃない」"
translation = "「위험한 용이 상대라도, 모두가 따라와 준 건── ‘일지에 쓰여 있기 때문’ 같은 게 아니다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「九浄ヴィーナスっていう個人を──みんなが信頼した結果だ。どうして、そんな簡単なことがわからない？」"
translation = "「쿠죠 비너스라는 개인을── 모두가 신뢰한 결과다. 어째서, 그런 간단한 것을 모르는 거지?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「っっ……」"
translation = "「크읏……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「最初からそう言ってるんだけどね……」"
translation = "「처음부터 그렇게 말하고 있는데 말이지……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ヴィーナスちゃんのわがままは今に始まったことじゃないからねぇ」"
translation = "「비너스짱의 제멋대로는 오늘 시작된 일이 아니니까」"

[[dialogue]]
speaker = "unk"
original = "当たり前の事実をヴィーナスに教えてやる。"
translation = "당연한 사실을 비너스에게 가르쳐준다."

[[dialogue]]
speaker = "unk"
original = "それでも、彼女は首を横に振って否定した。"
translation = "그럼에도, 그녀는 고개를 가로저으며 부정했다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「で……でもっ、違うの！\u3000私とその日誌は──っ……ほとんど同じものっていうか」"
translation = "「하…… 하지만! 아니야! 나와 그 일지는── 크읏…… 거의 같은 것이랄까」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「みんなが私を頼ってくれるのは──嬉しいけど。当の私は……ずっとそれに頼りっきりだったの。クロトと出会う前から」"
translation = "「모두가 나를 믿어주는 건── 기쁘지만. 정작 나는…… 계속 그것에만 의지해 왔어. 쿠로토를 만나기 전부터」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「だから──今さら日誌に背いたら、私が私じゃなくなっちゃうような気がして……！」"
translation = "「그러니까── 이제 와서 일지를 등지면, 내가 내가 아니게 될 것 같은 기분이 들어서……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それは無用な心配だな。みんなはちゃんと、ヴィーナス本人のことを見てるよ」"
translation = "「그건 쓸데없는 걱정이다. 모두는 제대로, 비너스 본인을 보고 있어」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「自分のことを軽視しすぎなんだよ。言っただろ、ここに書かれてるのは一部にすぎないって」"
translation = "「자신을 너무 경시하는 거다. 말했잖아, 여기에 쓰여 있는 건 일부에 지나지 않는다고」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「っ……そんなの、わかるはずないじゃない──！」"
translation = "「크읏…… 그런 거, 알 리 없잖아──!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「わかるよ。全部読んだから」"
translation = "「알아. 전부 읽었으니까」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「！？」"
translation = "「!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ヴィーナスが辿ってきた人生を知った。だから、何もかもとは言わないけど、わかる」"
translation = "「비너스가 걸어온 인생을 알았다. 그러니까, 전부라고는 말하지 않겠지만, 안다」"

[[dialogue]]
speaker = "unk"
original = "大事な日誌を借り受けた昨日。"
translation = "소중한 일지를 빌려 받은 어제."

[[dialogue]]
speaker = "unk"
original = "少々時間はかかってしまったけれど、夜通しでなんとか読破できた。"
translation = "시간은 좀 걸렸지만, 밤새도록 어떻게든 독파할 수 있었다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「全部、なんて……何ページあると思ってるのよ……」"
translation = "「전부, 라니…… 몇 페이지나 있다고 생각하는 거야……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「１９２１ページ」"
translation = "「1921페이지」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（数えてんのかい）"
translation = "（세고 있는 거냐）"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「面白かった。九浄家に着いてから、俺と出会うまで……ヴィーナスの日々がありありと記されてた」"
translation = "「재미있었다. 쿠죠 가문에 도착하고 나서, 나와 만나기까지…… 비너스의 나날이 생생하게 기록되어 있었어」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「～～っ。か、貸すとは言ったけどっ、勝手に読んでいいなんて言ってないわよっ！」"
translation = "「~~~읏. 브, 빌려준다고는 했지만, 멋대로 읽어도 된다고는 안 했잖아!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「はは……確かに女子の日記を読むなんて、デリカシーに欠ける行為だったかもな。でも、おかげでよくわかったよ」"
translation = "「하하…… 확실히 여자애의 일기를 읽는 건, 배려심 없는 행위였을지도 모르겠네. 하지만, 덕분에 잘 알게 됐어」"

[[dialogue]]
speaker = "unk"
original = "この数年、彼女の人生を導いてきた道しるべ。"
translation = "이 몇 년 동안, 그녀의 인생을 이끌어 온 이정표."

[[dialogue]]
speaker = "unk"
original = "それを読むことで、俺には彼女の生きた軌跡が追体験できるかのようだった。"
translation = "그것을 읽음으로써, 나는 그녀가 살아온 궤적을 간접 체험할 수 있는 듯했다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「確かにここには──ヴィーナスにとって、重要な人生の選択肢が刻まれてる」"
translation = "「확실히 여기에는── 비너스에게 있어, 중요한 인생의 선택지가 새겨져 있어」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ヴィーナスにとってかけがえのない宝物だっていうのも、当然だと思った。俺と引き合わせてくれたのも間違いないしな」"
translation = "「비너스에게 둘도 없는 보물이라는 것도, 당연하다고 생각했다. 나와 이어지게 해준 것도 틀림없고」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そ、そう──そうよ。だから……今さら他の生き方なんて……」"
translation = "「그, 그래── 그래. 그러니까…… 이제 와서 다른 삶의 방식 같은 건……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「けど──九浄ヴィーナスって人間の真価は、これだけじゃないだろ？」"
translation = "「하지만── 쿠죠 비너스라는 인간의 진가는, 이것뿐만이 아니잖아?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺は今日まで近くでヴィーナスを見てきた。俺と出会ってからの日付も、全部読み返したけど……ここに書かれてないことなんて山ほどあったぞ」"
translation = "「나는 오늘까지 가까이에서 비너스를 봐왔다. 나와 만나고 나서의 날짜도, 전부 다시 읽어봤지만…… 여기에 쓰여 있지 않은 일은 산더미처럼 많았다고」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そんなことないわ！\u3000大事なことはいつだって、そこに書かれてたもの！」"
translation = "「그렇지 않아! 중요한 일은 언제나, 거기에 쓰여 있었단 말이야!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「本当か？\u3000昨日、ヴィーナスの買ったバッグの柄まで書かれてたか？」"
translation = "「정말인가? 어제, 비너스가 산 가방의 무늬까지 쓰여 있었나?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「男の子の失くした風船を、迷わず空まで取ってくるなんて記述があったか？」"
translation = "「남자아이가 잃어버린 풍선을, 망설임 없이 하늘까지 가져다주는 기록이 있었나?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「！\u3000そ、それはないけど──あんなの、ただ体が勝手に動いただけだし……」"
translation = "「! 그, 그건 없지만── 그런 건, 그저 몸이 멋대로 움직인 것뿐이고……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ていうか、大事なことでもなんでもないじゃない。そんなの！」"
translation = "「랄까, 중요한 일도 아무것도 아니잖아. 그런 건!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「なんでもなくないよ。あの男の子にとってはきっと、人生の中でも大きなイベントだったに違いない」"
translation = "「아무것도 아닌 게 아니야. 그 남자아이에게는 분명, 인생에서도 큰 이벤트였음에 틀림없다」"

[[dialogue]]
speaker = "unk"
original = "人は一日の中で、数限りない選択をする。"
translation = "사람은 하루 동안, 수없이 많은 선택을 한다."

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは、たくさんの決断を下してきているくせに、重要なことほど日誌任せにしてしまうという悪癖を患っていた。"
translation = "비너스는, 수많은 결단을 내려왔으면서도, 중요한 일일수록 일지에 맡겨버리는 악습을 앓고 있었다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……でも」"
translation = "「……하지만」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「でも、私が勝手に動いたら……あんまり良くない結果になる」"
translation = "「하지만, 내가 멋대로 움직이면…… 별로 좋지 않은 결과가 돼」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロトに迷惑かけちゃったことだって──あったでしょ？\u3000この前だって──」"
translation = "「쿠로토에게 폐를 끼친 일도── 있었잖아? 요전에도──」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ん？\u3000ああ……」"
translation = "「응? 아아……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「来季の予算編成？\u3000そんなものはね──こうでこうでこうよ！」"
translation = "「다음 시즌 예산 편성? 그런 건 말이지── 이렇게 이렇게 이렇게야!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そんな適当に決めていいのか？\u3000アナに相談したほうがいいんじゃ」"
translation = "「그렇게 대충 정해도 되는 건가? 아나에게 상담하는 게 좋지 않나」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「大丈夫大丈夫♪\u3000部長とはみんな知り合いだし、なんとなく規模感もわかってるから♪」"
translation = "「괜찮아 괜찮아♪ 부장과는 모두 아는 사이고, 어쩐지 규모감도 알고 있으니까♪」"

[[dialogue]]
speaker = "unk"
original = "そんなノリで編成された部活動への予算割当てだったが──"
translation = "그런 식으로 편성된 부활동에 대한 예산 할당이었지만──"

[[dialogue]]
speaker = "unk"
original = "後に各所から不満が噴出することになった。"
translation = "나중에 각지에서 불만이 터져 나오게 되었다."

[[dialogue]]
speaker = "unk"
original = "特に規模の大きいサバイバル部やアニマル研究会からは、不当に評価が低いと連日抗議されたものだ。"
translation = "특히 규모가 큰 서바이벌부나 애니멀 연구회에서는, 부당하게 평가가 낮다고 연일 항의를 받았다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「確かにそんなこともあったな。あの時は結構てんてこまいだった」"
translation = "「확실히 그런 일도 있었지. 그때는 꽤 정신이 없었다」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「でしょう……？\u3000これまでは私が会長だったから、自分が責任を取れば良かったけど……今はそうじゃないし」"
translation = "「그렇죠……? 전에는 내가 회장이었으니까, 내가 책임을 지면 됐지만…… 지금은 그렇지 않고」"

[[dialogue]]
speaker = "unk"
original = "しおらしく反省しているヴィーナス。"
translation = "얌전하게 반성하고 있는 비너스."

[[dialogue]]
speaker = "unk"
original = "しかし、彼女はまだ気づいていなかったようだ。"
translation = "하지만, 그녀는 아직 깨닫지 못했던 것 같다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あの件……実はあれでよかったんだよ」"
translation = "「그 일…… 사실은 그걸로 괜찮았던 거다」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「へっ……？」"
translation = "「헷……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「サバイバル部とアニマル研究会は──部員数を偽ってたんだ。正確には、掛け持ちの幽霊部員を水増ししてた」"
translation = "「서바이벌부와 애니멀 연구회는── 부원 수를 속이고 있었다. 정확히는, 겸임하는 유령 부원을 부풀리고 있었지」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「これは、後日アナが調査してくれたことなんだが」"
translation = "「이건, 훗날 아나가 조사해 준 거지만」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「明確な校則違反でした。そのオーバー分を考慮すると、前会長の見積もりでちょうど適切」"
translation = "「명확한 교칙 위반이었습니다. 그 초과분을 고려하면, 전 회장님의 견적이 딱 적절했습니다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ヴィーナスの勘のほうが、彼らの話よりも的確だったんだよ。だから未然に良からぬことを防ぐことができた」"
translation = "「비너스의 직감이, 그들의 이야기보다 더 정확했던 거다. 그래서 미연에 좋지 않은 일을 막을 수 있었다」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そ……そうだったの……？」"
translation = "「그…… 그랬던 거야……?」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスの向こう見ずな推進力が──時に日誌の運命力をも上回ることだってある。"
translation = "비너스의 무모한 추진력이── 때로는 일지의 운명력마저 능가할 때도 있다."

[[dialogue]]
speaker = "unk"
original = "俺が伝えたかったのは、そういうことだ。"
translation = "내가 전하고 싶었던 것은, 그런 것이다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「マトイやアナにしたってそうだ。星徒会に入った時のこと、教えてくれたよな」"
translation = "「마토이나 아나도 마찬가지다. 성도회에 들어왔을 때의 일, 알려줬었지」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「うんうん。今でも覚えてる──『ビビッときた』って、ヴィーナスにいきなり手首掴まれて」"
translation = "「응응. 지금도 기억하고 있어── 『찌릿하고 왔다』며, 비너스에게 갑자기 손목을 붙잡혀서」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「私も──教室に乗り込まれました。副会長の座を用意するなんて、新入生の私を相手に無茶言って」"
translation = "「저도── 교실로 쳐들어왔습니다. 부회장 자리를 마련하겠다며, 신입생인 저를 상대로 무리한 말을 하고」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そ、それは──ただ日誌に書かれてたようにやっただけで……」"
translation = "「그, 그건── 그저 일지에 쓰여 있는 대로 했을 뿐이고……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いや。日誌の中には──ただ『書記候補と出会った』とか『副会長の座を与えた』としか書かれてないよ」"
translation = "「아니. 일지 안에는── 그저 『서기 후보와 만났다』거나 『부회장 자리를 주었다』라고만 쓰여 있어」"

[[dialogue]]
speaker = "unk"
original = "そして、だからこそ──この日誌には概して個人名が記されていない。"
translation = "그리고, 그렇기 때문에── 이 일지에는 대체로 개인 이름이 기록되어 있지 않다."

[[dialogue]]
speaker = "unk"
original = "書記、副会長、魔族、天使……それら一般的なカテゴリーでしか、人物については記載がない。"
translation = "서기, 부회장, 마족, 천사…… 그러한 일반적인 카테고리로만, 인물에 대해서 기재되어 있다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だから──『アナ』や『マトイ』との出会いは、決して予期されていたものじゃない」"
translation = "「그러니까── 『아나』나 『마토이』와의 만남은, 결코 예기치 않았던 것이 아니다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「全部が全部、ヴィーナス流の<b>解釈</b>なんだよ。それは紛れもないヴィーナス自身の意思だ」"
translation = "「전부가 전부, 비너스식의 해석인 거다. 그것은 틀림없는 비너스 자신의 의지다」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "unk"
original = "そして──そんな彼女の想いに引っ張られてできたのが、俺たちだ。"
translation = "그리고── 그런 그녀의 마음에 이끌려 만들어진 것이, 우리들이다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「今の新星星徒会は──予定調和の結果なんかじゃない」"
translation = "「지금의 신성 성도회는── 예정 조화의 결과 같은 게 아니야」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ヴィーナス自身が選び取って、作り上げた居場所なんだよ。だからみんな、ヴィーナス自身のことを信じるんだ。簡単なことだ」"
translation = "「비너스 자신이 선택하고, 만들어낸 보금자리인 거다. 그러니까 모두, 비너스 자신의 것을 믿는 거다. 간단한 일이다」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「わたし……自身を……」"
translation = "「나…… 자신을……」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスを、新星のみんなが見つめていた。"
translation = "비너스를, 신성의 모두가 바라보고 있었다."

[[dialogue]]
speaker = "unk"
original = "当の本人以外──誰も理解していたことだ。"
translation = "정작 본인 외에는── 아무도 이해하고 있던 일이다."

[[dialogue]]
speaker = "unk"
original = "いくら日誌とやらが正しそうな道筋を指し示していたって、それだけで破滅的な竜に立ち向かおうとは思えない。"
translation = "아무리 일지라는 것이 올바른 길을 가리키고 있었다고 해도, 그것만으로 파멸적인 용에게 맞서려고는 생각하지 않는다."

[[dialogue]]
speaker = "unk"
original = "みんな──ヴィーナスが正義のために足掻くのを知ってるからこそ、ついてきてくれるんだ。"
translation = "모두── 비너스가 정의를 위해 발버둥 치는 것을 알고 있기에, 따라와 주는 거다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「緋宮会長を立派な魔王に鍛える──ヴィーナスさんの信条でしたね。でも、そのことは……」"
translation = "「히노미야 회장님을 훌륭한 마왕으로 단련시킨다── 비너스 씨의 신조였죠. 하지만, 그 내용은……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。この日誌に、そんな使命は書かれてない。ただ、俺と出会うまでの道筋が漠然と示されているだけだ」"
translation = "「아아. 이 일지에는, 그런 사명은 쓰여 있지 않아. 그저, 나와 만나기까지의 길만이 막연하게 제시되어 있을 뿐이다」"

[[dialogue]]
speaker = "unk"
original = "俺じゃなきゃダメなのだと以前のヴィーナスは言った。"
translation = "내가 아니면 안 된다고 이전의 비너스는 말했다."

[[dialogue]]
speaker = "unk"
original = "その根拠はこの際、フィーリングでもビビッときたでもなんでも構わない。"
translation = "그 근거는 이 자리에서는, 필링이든 찌릿하고 왔든 뭐든 상관없다."

[[dialogue]]
speaker = "unk"
original = "ただ、その選択は紛れもなく彼女自身のものだ。"
translation = "단지, 그 선택은 틀림없이 그녀 자신의 것이다."

[[dialogue]]
speaker = "unk"
original = "だから──俺と出会ってからの行動がどれも、間違いだったなんて思わない。思わせたくない。"
translation = "그러니까── 나와 만나고 나서의 행동이 모두, 잘못이었다고는 생각하지 않는다. 생각하게 하고 싶지 않다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "俺たちの言葉を聞いて──ヴィーナスは呆気にとられたように、放心していた。"
translation = "우리들의 말을 듣고── 비너스는 어안이 벙벙한 듯, 넋을 놓고 있었다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ヴィーナスさんの本心は──もう痛いくらいにお聞きしています。あれは、日誌に書かれた予定調和なんかじゃないはずです」"
translation = "「비너스 씨의 본심은── 이미 아플 정도로 듣고 있습니다. 그것은, 일지에 쓰인 예정 조화 같은 것이 아닐 것입니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そうですね。もっとわがままでいてください。妙な不思議アイテムより、前会長の根拠のない自信のほうが私は好きです」"
translation = "「그렇습니다. 좀 더 제멋대로 구세요. 이상한 신비 아이템보다, 전 회장님의 근거 없는 자신감을 저는 더 좋아합니다」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あはは、辛辣。でも同感かも」"
translation = "「아하하, 신랄하네. 하지만 동감일지도」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あ……う……みんな……」"
translation = "「아…… 우…… 모두……」"

[[dialogue]]
speaker = "unk"
original = "言ってしまえば──ヴィーナスの手元にはいつも、日誌という攻略本があった。"
translation = "말하자면── 비너스의 손에는 언제나, 일지라는 공략본이 있었다."

[[dialogue]]
speaker = "unk"
original = "日々を生きていく上で、それにすがろうとするのはむしろ自然な行為だったろう。"
translation = "나날을 살아가는 데 있어, 그것에 매달리려고 하는 것은 오히려 자연스러운 행위였을 것이다."

[[dialogue]]
speaker = "unk"
original = "たとえ自分に置き換えてみたとしても、依存せず生きるのは難しかっただろう。"
translation = "설령 자신에게 대입해 본다고 해도, 의존하지 않고 살아가기는 어려웠을 것이다."

[[dialogue]]
speaker = "unk"
original = "だけど、いつの間にか……未来の日誌は、彼女にとって指針ではなく呪縛になってしまっていた。"
translation = "하지만, 어느새인가…… 미래의 일지는, 그녀에게 있어 지침이 아닌 족쇄가 되어 버렸다."

[[dialogue]]
speaker = "unk"
original = "正しい未来が来たれば来たるほどに、従わなくちゃという強迫観念に駆られるようになった。"
translation = "올바른 미래가 다가올수록, 따라야 한다는 강박관념에 사로잡히게 되었다."

[[dialogue]]
speaker = "unk"
original = "そしていつしか、その予知性が『使命』となって重くのしかかり……ヴィーナス本人の意志をも奪ってしまった。"
translation = "그리고 어느덧, 그 예지성이 『사명』이 되어 무겁게 짓눌러…… 비너스 본인의 의지마저 빼앗아 버렸다."

[[dialogue]]
speaker = "unk"
original = "でも。"
translation = "하지만."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ヴィーナスは──自分が気づいてなかっただけで、ちゃんと重大な決断を下してきてるよ。一人じゃ何も決められないなんてことはない」"
translation = "「비너스는── 자신이 눈치채지 못했을 뿐, 제대로 중대한 결단을 내려왔어. 혼자서는 아무것도 결정할 수 없다는 일은 없다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だから……もっと自分を信じてくれ。俺たちを導いてきてくれたように」"
translation = "「그러니까…… 좀 더 자신을 믿어줘. 우리들을 이끌어 왔던 것처럼」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「他の何にも縛られない──本当のヴィーナスを、俺たちは見てるから」"
translation = "「다른 무엇에도 얽매이지 않는── 진정한 비너스를, 우리들은 보고 있으니까」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロト……」"
translation = "「쿠로토……」"

[[dialogue]]
speaker = "unk"
original = "目に見えた成果なんかすぐに出なくてもいい。"
translation = "눈에 보이는 성과 같은 건 당장 나오지 않아도 좋다."

[[dialogue]]
speaker = "unk"
original = "彼女が突き進んだ道の先には、きっと明るい未来が待っているのだと、他ならぬ俺たちが信じられているのだから。"
translation = "그녀가 돌진한 길의 끝에는, 분명 밝은 미래가 기다리고 있을 것이라고, 다름 아닌 우리들이 믿고 있으니까."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「もし、それでも、寄る辺がなくて不安だっていうなら」"
translation = "「만약, 그래도, 의지할 곳이 없어 불안하다면」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺を頼れ」"
translation = "「나를 의지해라」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「今度は俺が──ヴィーナスを引っ張ってやるから。もう二度と、不甲斐ないなんて言わせない」"
translation = "「이번에는 내가── 비너스를 이끌어 줄 테니까. 다시는, 한심하다는 말은 못 하게 할 거야」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「な……何よ……もう。いきなり……格好つけちゃって」"
translation = "「뭐…… 뭐야…… 정말. 갑자기…… 멋진 척하고」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "（ヴィーナスちゃん、顔赤い？）"
translation = "（비너스짱, 얼굴 빨개?）"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "（珍しいこともあるものです）"
translation = "（드문 일도 다 있군요）"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふ……ふふっ。ええ……でも──そうね。なら、お言葉に甘えちゃおうかしら」"
translation = "「흐…… 후훗. 네…… 하지만── 그렇네요. 그럼, 그 말에 응석 부려 볼까」"

[[dialogue]]
speaker = "unk"
original = "それからヴィーナスは……笑った。"
translation = "그리고 나서 비너스는…… 웃었다."

[[dialogue]]
speaker = "unk"
original = "つきものが落ちたみたいに、清々しい笑顔になる。"
translation = "홀가분해진 것처럼, 상쾌한 미소를 짓는다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あーあ。なんか、私だけ気づいてなかったのね」"
translation = "「아아. 뭔가, 나만 눈치채지 못했었네」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……わかったわ」"
translation = "「……알았어」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「私──もう、決めることから逃げない。どんなに不透明な道でも突き進んでやるわ」"
translation = "「나── 이제, 결정하는 것에서 도망치지 않을 거야. 아무리 불투명한 길이라도 돌진해 줄 거야」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。その意気だ」"
translation = "「아아. 그 기세다」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それに──みんなだって巻き込んでやるんだから、覚悟しなさい。ここから先の保証なんかないわよ！」"
translation = "「게다가── 모두도 끌어들일 테니까, 각오해. 여기부터 앞은 보장 같은 거 없으니까!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「おおっ！\u3000それでこそ新星のフィクサー様なのです！」"
translation = "「오오옷! 그거야말로 신성의 픽서님이십니다!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「んー♪\u3000ヴィーナスちゃんはやっぱり元気な方がいいねー♪」"
translation = "「음~♪ 비너스짱은 역시 활기찬 게 좋네~♪」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「ニャ。乱暴な性格のくせに、ウニャウニャ悩みすぎなのニャン」"
translation = "「냥. 난폭한 성격 주제에, 웅냐웅냐 너무 고민하는 거다냥」"

[[dialogue]]
speaker = "unk"
original = "みんなで決意を新たにしたが──なんとことはない。"
translation = "모두가 결의를 새롭게 했지만── 별것은 아니다."

[[dialogue]]
speaker = "unk"
original = "ただ、俺たちはヴィーナスを信じていると再確認したにすぎなかった。"
translation = "단지, 우리들은 비너스를 믿고 있다는 것을 재확인했을 뿐이었다."

