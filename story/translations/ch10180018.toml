[[dialogue]]
speaker = "unk"
original = "いつもは役員たちの声でにぎやかな星徒会室。"
translation = "평소에는 임원들의 목소리로 시끌벅적한 성도회실."

[[dialogue]]
speaker = "unk"
original = "だけど今は役員たちの姿はなく──"
translation = "하지만 지금은 임원들의 모습은 없고──"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「見損ないました。あなたが悪しき魔王だったなんて……！」"
translation = "「실망했어요. 당신이 사악한 마왕이었다니……!」"

[[dialogue]]
speaker = "unk"
original = "普段は優雅な微笑みをたたえていた美貌が、きっと俺を睨む。"
translation = "평소에는 우아한 미소를 머금고 있던 미모가, 매섭게 나를 노려본다."

[[dialogue]]
speaker = "unk"
original = "だが両手を拘束され、股を大きく開かされた姿では迫力に欠けるというものだ。"
translation = "하지만 양손을 구속당하고, 가랑이를 크게 벌려진 모습으로는 박력이 부족한 법이다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「フン、そんな恰好で睨まれても怖くないな」"
translation = "「흥, 그런 꼴로 노려봐도 무섭지 않다고.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "俺の嘲笑を受けても眼光はなお鋭く、女騎士の顔には気高さが残っている。"
translation = "나의 조소에도 눈빛은 여전히 날카롭고, 여기사의 얼굴에는 고결함이 남아 있다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いつ見ても大きな乳だ。男を誘っているのか？\u3000いやらしい女め」"
translation = "「언제 봐도 커다란 가슴이군. 남자를 유혹하는 건가? 음란한 여자로군.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「ッ……」"
translation = "「윽……」"

[[dialogue]]
speaker = "unk"
original = "しかし隠し切れない屈辱と羞恥に顔が赤く染まる。"
translation = "하지만 숨길 수 없는 굴욕과 수치심에 얼굴이 붉게 물든다."

[[dialogue]]
speaker = "unk"
original = "豊満な乳房が剥き出しになり、下着も露わにされて、男の欲望を満たすために展示されているかのよう。"
translation = "풍만한 유방이 노출되고, 속옷도 드러나서, 남자의 욕망을 채우기 위해 전시되어 있는 듯하다."

[[dialogue]]
speaker = "unk"
original = "普段の清楚さはそこにはなく、すさまじい落差だ。"
translation = "평소의 청초함은 온데간데없고, 엄청난 낙차다."

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「くっ……殺すなら早く殺しなさい！\u3000辱めは受けません！」"
translation = "「큭…… 죽일 거라면 어서 죽이세요! 치욕은 받지 않겠습니다!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それを決めるのは俺だ。そもそもお前が弱いのが悪いんだぞ？\u3000責めるなら魔王に負けた自分を責めるんだな」"
translation = "「그걸 결정하는 건 나다. 애초에 네가 약한 게 잘못이라고? 탓하려거든 마왕에게 패배한 자신을 탓해라.」"

[[dialogue]]
speaker = "unk"
original = "敗れた女騎士の末路など決まったもので、下卑た欲望の慰みになるだけだ。"
translation = "패배한 여기사의 말로 따위 정해진 것이라, 저속한 욕망의 노리개가 될 뿐이다."

[[dialogue]]
speaker = "unk"
original = "このエリスという女も弄んで犯しつくしてやろう。"
translation = "이 에리스라는 여자도 마음껏 농락하고 범해주지."

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「ゲスめ……！」"
translation = "「비열한 놈……!」"

[[dialogue]]
speaker = "unk"
original = "エリスが強く俺を睨みつけるが、罵倒の言葉も侮蔑の視線も今の俺には心地いい。"
translation = "에리스가 강하게 나를 노려보지만, 매도하는 말도 멸시하는 시선도 지금의 내게는 기분 좋게 느껴진다."

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「いかに辱められようと、私が心まで屈することはありません……！」"
translation = "「아무리 치욕을 당하더라도, 제 마음까지 굴복하는 일은 없습니다……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「本当に？」"
translation = "「정말 그럴까?」"

[[dialogue]]
speaker = "unk"
original = "いきり立ったペニスを女騎士の股に突き付ける。"
translation = "잔뜩 화가 난 자지를 여기사의 가랑이에 들이댄다."

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「ッ──！？」"
translation = "「윽──!?」"

[[dialogue]]
speaker = "unk"
original = "強気だった表情に、女として辱められる恐怖と嫌悪がにじむ。"
translation = "강인했던 표정에, 여자로서 치욕을 당하는 공포와 혐오가 번진다."

[[dialogue]]
speaker = "unk"
original = "その顔が何よりの快楽だ。"
translation = "그 얼굴이야말로 무엇보다 큰 쾌락이다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「今の言葉が真実かどうか、試してみようじゃないか」"
translation = "「방금 한 말이 진실인지 아닌지, 한번 시험해 보자고.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「っ──やめ──」"
translation = "「윽── 그만──」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「くっ……うぅっ……あぁっ……！\u3000魔王が、私の、中に……うぁ……は、あぁ……くぅっ……」"
translation = "「큭…… 으윽…… 아앗……! 마왕이, 내, 안에…… 으아…… 하, 아아…… 쿠윽……」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「はぁはっ……くぅ……動きを封じないと女を抱けないのですね……恥を知りなさい、魔王……！」"
translation = "「하아 하아…… 쿠우…… 움직임을 봉하지 않으면 여자 하나 안지 못하는군요…… 부끄러운 줄 아세요, 마왕……!」"

[[dialogue]]
speaker = "unk"
original = "肉の棒を無理やりねじ込まれ、悔しそうに顔を歪ませるエリス。"
translation = "살몽둥이를 억지로 비집고 들어오자, 분한 듯 얼굴을 일그러뜨리는 에리스."

[[dialogue]]
speaker = "unk"
original = "腕をもがかせて拘束を逃れようとするが無駄なあがきだ。"
translation = "팔을 휘저으며 구속에서 벗어나려 하지만 무의미한 발버둥이다."

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「んんんっ……！\u3000ぅ……ふ……抜き、なさい……あぁっ……」"
translation = "「응응윽……! 으…… 후…… 빼, 세요…… 아앗……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「感じるだろう、俺がお前の奥に入っていくのを」"
translation = "「느껴지겠지, 내가 네 안쪽 깊숙이 들어가는 게.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「言うなぁっ……！\u3000んっ……くぅっ……ああぁっ……！」"
translation = "「말하지 마앗……! 응…… 쿠윽…… 아아앗……!」"

[[dialogue]]
speaker = "unk"
original = "ペニスの感触を意識させると、屈辱と怒りを込めた視線が俺を睨んでくる。"
translation = "자지의 감촉을 의식시키자, 굴욕과 분노를 담은 시선으로 나를 노려본다."

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「うっ……はぁ……入って、くるなぁっ……！」"
translation = "「으윽…… 하아…… 들어, 오지 마앗……!」"

[[dialogue]]
speaker = "unk"
original = "女を力ずくで征服するのがたまらない。"
translation = "여자를 힘으로 정복하는 것은 참을 수 없는 즐거움이다."

[[dialogue]]
speaker = "unk"
original = "膣は俺を拒絶するようにきつく締め付けてくるが、それも快感にしかならなかった。"
translation = "보지는 나를 거부하듯 꽉 조여오지만, 그것조차 쾌감으로밖에 느껴지지 않았다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「中が濡れているぞ。本当はこれが欲しかったんじゃないのか？」"
translation = "「안이 젖어 있군. 사실은 이걸 원했던 거 아니야?」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「そんなはず、ありません……！\u3000こんな汚らわしいもの……」"
translation = "「그럴 리, 없습니다……! 이런 불결한 것 따위……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それならこの体に聞いてみよう」"
translation = "「그렇다면 이 몸에게 물어보도록 하지.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「くあぁっ……あっ、はっ……んっ……！\u3000ふ、ん……んはぁ……」"
translation = "「쿠아앗…… 앗, 하앗…… 응……! 후, 응…… 응하아……」"

[[dialogue]]
speaker = "unk"
original = "深くまで埋まったペニスを前後に動かすと、抑えきれない声が漏れる。"
translation = "깊숙이 박힌 자지를 앞뒤로 움직이자, 억누르지 못한 신음이 새어 나온다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「どうだ、男と交わるのは？\u3000生真面目なお前のことだ、どうせ経験はないのだろう」"
translation = "「어떠냐, 남자와 섞이는 기분은? 고지식한 너이니, 어차피 경험은 없겠지.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「侮辱するなと言っている……！\u3000犯されるのと、愛してむつみ合うのが同じはずがないでしょう……！」"
translation = "「모욕하지 말라고 했을 텐데요……! 범해지는 것과, 사랑하며 정을 나누는 것이 같을 리 없지 않습니까……!」"

[[dialogue]]
speaker = "unk"
original = "エリスの怒りと誇りが、俺の暗い欲望をますます燃え上がらせてくれる。"
translation = "에리스의 분노와 긍지가 나의 어두운 욕망을 더욱 불타오르게 한다."

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「ふっ……んん……中で、動いて、……くっ……んっ……はぁっ……！\u3000はっ、はぁ……はぁ……んんっ……」"
translation = "「훗…… 응응…… 안에서, 움직여, ……큭…… 응…… 하앗……! 핫, 하아…… 하아…… 응응……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「苦しそうだな。俺のはお前には大きかったか。……いや、悦んでいるのか」"
translation = "「괴로워 보이는군. 내 것이 네게는 너무 컸나. ……아니면, 기뻐하고 있는 건가?」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「好きに言いなさい……！\u3000くっ……ん……あっ、はぁっ……あんっ……」"
translation = "「마음대로 말하세요……! 큭…… 응…… 앗, 하앗…… 안앗……」"

[[dialogue]]
speaker = "unk"
original = "端正な顔が屈辱に歪むのを楽しみながら、温かな体温やとろりとした蜜の感触、膣壁の柔らかさに肉ひだの形まで、エリスの肉体を存分に味わう。"
translation = "단정한 얼굴이 굴욕으로 일그러지는 것을 즐기며, 따뜻한 체온과 걸쭉한 애액의 감촉, 질벽의 부드러움과 질벽의 형태까지 에리스의 육체를 마음껏 맛본다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「お前の中は気持ちいいぞ、エリス。肉が絡みついて俺を締め付けてくる」"
translation = "「네 안은 기분 좋군, 에리스. 살점이 얽혀들며 나를 꽉 조여와.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「うるさい……！\u3000ふぁ、あん……ぁ……ん……はぁっ……」"
translation = "「시끄러워……! 화, 아앙…… 아…… 응…… 하앗……」"

[[dialogue]]
speaker = "unk"
original = "体の使い心地を聞かせてやると、女騎士が恥辱に震えた。"
translation = "몸의 사용감을 들려주자, 여기사가 치욕에 떨었다."

[[dialogue]]
speaker = "unk"
original = "お前は男を悦ばせる道具なのだと教え込むように、ペニスを繰り返し突き動かす。"
translation = "너는 남자를 기쁘게 하는 도구라고 가르치듯, 자지를 반복해서 찔러 넣는다."

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「ふっ……あっ、はっ……んんっ……！\u3000はぁ……魔王のが……くぅっ……」"
translation = "「훗…… 앗, 하앗…… 응응……! 하아…… 마왕의 것이…… 쿠윽……」"

[[dialogue]]
speaker = "unk"
original = "だが蜜の量は増していた。"
translation = "하지만 애액의 양은 늘어나고 있었다."

[[dialogue]]
speaker = "unk"
original = "言葉では抵抗しながらも、時折膣が収縮してきゅぅっとペニスを締め付け、艶がかった声が漏れている。"
translation = "말로는 저항하면서도, 때때로 보지가 수축하며 꽉 자지를 조이고, 요염한 목소리가 새어 나온다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「なんだ、悦んでるじゃないか。淫乱騎士め」"
translation = "「뭐야, 기뻐하고 있잖아. 음란 기사로군.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「そんなわけ、ないでしょう……んんっ……無理やり犯されて、感じるはずありません……！」"
translation = "「그럴 리, 없잖아요…… 응응…… 억지로 범해지는데, 느낄 리 없습니다……!」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「くぁっ……はっ、はぁ……ふ──んんっ……！\u3000私は──騎士は屈しませんっ……！」"
translation = "「쿠앗…… 핫, 하아…… 후── 응응……! 나는── 기사는 굴복하지 않습니다!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「強情な女だ。余計に屈服させたくなる」"
translation = "「고집 센 여자군. 더 굴복시키고 싶어지게 말이야.」"

[[dialogue]]
speaker = "unk"
original = "膣の手前側の、少し奥に入ったところをカリ首で刺激してやる。"
translation = "보지 입구 쪽에서 조금 안으로 들어간 곳을 귀두로 자극해 준다."

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「ふああぁっ！？」"
translation = "「후아아앗!?」"

[[dialogue]]
speaker = "unk"
original = "瞬間、膣が強く収縮してペニスをきつく絞った。"
translation = "순간, 보지가 강하게 수축하며 자지를 꽉 조였다."

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「あっ、はっ……ん～っ……い、今のは……」"
translation = "「앗, 하앗…… 응~…… 바, 방금 건……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「女が感じる場所なのだそうだ。お前も気に入ったか？」"
translation = "「여자가 느끼는 곳이라는군. 너도 마음에 들었나?」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「はぁ──あ──んんっ！\u3000感じて、など……いません……ふぅっ……はぁ……くうぅっ……！」"
translation = "「하아── 아── 응응! 느끼고, 따위…… 있지 않습니다…… 후우…… 하아…… 쿠우웃……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「どの口で言っているんだ？\u3000だがそこまで言うなら──」"
translation = "「입만 살았군. 하지만 그렇게까지 말한다면──」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「んん～～～～～っ！？」"
translation = "「응응~~~~~윽!?」"

[[dialogue]]
speaker = "unk"
original = "奥の奥──子宮口めがけて強く突き込むと、エリスの体がぶるりと震える。"
translation = "안쪽 깊은 곳── 자궁구를 향해 강하게 찔러 넣자, 에리스의 몸이 파르르 떨린다."

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「ふぁっ、あっ、はぁんっ……<emoji=heart04>\u3000んんっ、はぁっ……はぁ……あっ、はっ、あぁっ……<emoji=heart04>」"
translation = "「화앗, 앗, 하앙……<emoji=heart04> 응응, 하앗…… 하아…… 앗, 핫, 아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「どうした？\u3000感じないのではなかったか？」"
translation = "「왜 그러지? 느끼지 않는다고 하지 않았나?」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「これは──ちが──んんんっ！？\u3000また、奥まで来て……くうぅっ……<emoji=heart04>」"
translation = "「이건── 아니── 응응윽!? 또, 안쪽까지 와서…… 쿠우웃……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "大きく引いては突いて、子宮を何度もノックする。"
translation = "크게 뺐다가 찌르며, 자궁을 몇 번이고 노크한다."

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「ふあぁっ……<emoji=heart04>\u3000魔王のが、奥に、届いて……あっ……はっ……はっ……はぁ、んんっ……<emoji=heart04>\u3000ふ──ああぁっ……<emoji=heart04>」"
translation = "「후아앗……<emoji=heart04> 마왕의 것이, 안쪽에, 닿아서…… 앗…… 핫…… 핫…… 하아, 응응……<emoji=heart04> 후── 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「子宮に、当たってる……んんっ……<emoji=heart04>\u3000大き、い……ふああぁっ……あっ、はんっ……<emoji=heart04>\u3000んくっ……んっ……んぅ～っ<emoji=heart04>」"
translation = "「자궁에, 닿고 있어…… 응응……<emoji=heart04> 커, 다래…… 후아아앗…… 앗, 하앙……<emoji=heart04> 응윽…… 응…… 응으~윽<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「声がよくなったぞ？」"
translation = "「목소리가 좋아졌군?」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「ふっ、んんっ……苦しいだけ……です……！」"
translation = "「훗, 응응…… 괴로울 뿐……입니다……!」"

[[dialogue]]
speaker = "unk"
original = "それならばと、パンパンに膨らんだ亀頭を子宮口に押し付けてやる。"
translation = "그렇다면 하며, 팽팽하게 부푼 귀두를 자궁구에 밀어붙여 준다."

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「くぁあああっ……<emoji=heart04>」"
translation = "「쿠아아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "瞬間、苦悶に似た嬌声を上げ、膣壁がペニスにぎゅっとしがみついてきた。"
translation = "순간, 고통에 가까운 교성을 지르며 질벽이 자지에 꽉 매달려 왔다."

[[dialogue]]
speaker = "unk"
original = "エリスの奥を突きながら、無理やり唇を奪う。"
translation = "에리스의 안을 찌르며, 억지로 입술을 빼앗는다."

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「んん～～～～～っ！？」"
translation = "「응응~~~~~윽!?」"

[[dialogue]]
speaker = "unk"
original = "驚きに目を見開くエリス。"
translation = "놀라움에 눈을 크게 뜨는 에리스."

[[dialogue]]
speaker = "unk"
original = "そのまま唇を割って舌を差し入れ、エリスの口内を舐め回す。"
translation = "그대로 입술을 가르고 혀를 밀어 넣어, 에리스의 입안을 핥아 돌린다."

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「んぶっ……んっ、ふっ……ちゅるるっ……んっ、んぅ……ふっ……じゅるっ……じゅくっ……ぷぁっ」"
translation = "「응븝…… 응, 후…… 츄르르…… 응, 응으…… 후…… 쥬릅…… 쥬급…… 푸핫」"

[[dialogue]]
speaker = "unk"
original = "力ずくで唇を奪われるのは当然屈辱だろう。"
translation = "억지로 입술을 빼앗기는 것은 당연히 굴욕일 것이다."

[[dialogue]]
speaker = "unk"
original = "わずかに涙で潤んだエリスの瞳ににらまれながら、誘うように揺れる乳を鷲掴みにした。"
translation = "약간 눈물로 젖은 에리스의 눈동자에 노려보이면서, 유혹하듯 흔들리는 가슴을 움켜쥐었다."

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「ひぁああっ……！？\u3000そんな乱暴に……はぁ、あんっ……胸が……あ、はっ……ひゃんっ<emoji=heart04>」"
translation = "「히아아앗……!? 그렇게 난폭하게…… 하아, 아앙…… 가슴이…… 아, 핫…… 히양<emoji=heart04>」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「やめ、なさ、い……んっ……<emoji=heart04>\u3000ふ……あ……は──は――ひやああぁっ<emoji=heart04>」"
translation = "「그만, 두세, 요…… 응……<emoji=heart04> 후…… 아…… 하── 하── 히야아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "普段の生真面目さとは裏腹に、エリスの胸は手に収まりきらないほど大きくて、男の欲望を刺激する。"
translation = "평소의 고지식함과는 딴판으로, 에리스의 가슴은 손에 다 들어오지 않을 정도로 커서 남자의 욕망을 자극한다."

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「ふあぁっ、あっ、はっ──んんっ……！？\u3000乳首まで……ふぁっ……はぁ……はっ、あっ……んんーっ<emoji=heart04>」"
translation = "「후아앗, 앗, 핫── 응응……!? 유두까지…… 화앗…… 하아…… 핫, 앗…… 응응─<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "柔らかな乳房に指を食い込ませ、硬くなった乳首を押し潰すように摘まむ。"
translation = "부드러운 유방에 손가락을 파고들게 하고, 딱딱해진 유두를 짓이기듯 꼬집는다."

[[dialogue]]
speaker = "unk"
original = "するとまた膣がペニスを絞って快楽を与えてきた。"
translation = "그러자 다시 보지가 자지를 조이며 쾌락을 주어 왔다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「嬉しそうに締め付けてきて、そんなに気持ちいいのか、淫乱騎士」"
translation = "「기쁜 듯이 조여오다니, 그렇게 기분 좋은 거냐, 음란 기사.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「淫乱……！？\u3000ちが……違いますっ！」"
translation = "「음란……!? 아니…… 아닙니다!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「無理やり犯されても感じないと言ったのはお前だろう。じゃあ、縛られながら犯されてよがってるお前は淫乱でなくてなんなんだ？」"
translation = "「억지로 범해져도 느끼지 않는다고 말한 건 너잖아. 그럼, 묶인 채 범해지며 느끼고 있는 너는 음란한 게 아니면 뭐지?」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「！？\u3000そ、それは──」"
translation = "「!? 그, 그건──」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「んんんーーーーーっ！！？」"
translation = "「응응응─────윽!!?」"

[[dialogue]]
speaker = "unk"
original = "亀頭が勢いよく子宮にぶつかり、驚きと快感でエリスの体が跳ねた。"
translation = "귀두가 기세 좋게 자궁에 부딪히고, 놀라움과 쾌감에 에리스의 몸이 튀어 올랐다."

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「くぁっ、はっ、はぁっ……あんっ……<emoji=heart04>\u3000ふあぁ、はぁ……やぁっ、魔王のおち○ちんが、奥に当たって……ぇ……ふぁっ……はぁんっ……<emoji=heart04>」"
translation = "「쿠앗, 핫, 하앗…… 아앙……<emoji=heart04> 후아아, 하아…… 야앗, 마왕의 자지가, 안쪽에 닿아서…… 에…… 화앗…… 하앙……<emoji=heart04>」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「おま○この奥まで、魔王のでいっぱいに……なってる……んん～っ<emoji=heart04>\u3000はっ、あっ……ふああぁっ……<emoji=heart04>\u3000ふぁ……はっ、あぁっ<emoji=heart04>」"
translation = "「보지 안쪽까지, 마왕의 것으로 가득…… 차 있어…… 응으~윽<emoji=heart04> 핫, 앗…… 후아아앗……<emoji=heart04> 화아…… 핫, 아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "硬いペニスと蜜でとろけた粘膜が強く摩擦する。"
translation = "단단한 자지와 애액으로 녹아내린 점막이 강하게 마찰한다."

[[dialogue]]
speaker = "unk"
original = "いつの間にか膣から愛液が溢れ、ぐちゅぐちゅといやらしい音を立てながらペニスに絡みつく。"
translation = "어느새 보지에서 애액이 넘쳐흘러, 구덕구덕 야한 소리를 내며 자지에 얽혀든다."

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「はぁ、はぁ……あっ、あっ、あっ……んんっ<emoji=heart04>\u3000やめ、て……そんなに、突かないで、ください……はぁ……ん──ああぁっ<emoji=heart04>」"
translation = "「하아, 하아…… 앗, 앗, 앗…… 응응<emoji=heart04> 그만, 둬…… 그렇게, 찌르지 말아 주세요…… 하아…… 응── 아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「肉棒を奥まで咥えて、こんなに涎を垂らして悦んでいるぞ。俺も驚くほどの淫乱ぶりだ」"
translation = "「자지를 안쪽까지 물고, 이렇게 침을 흘리며 기뻐하고 있군. 나도 놀랄 정도의 음란함이야.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「私は、淫乱じゃ……な、い……はっ、あっ──はんっ<emoji=heart04>\u3000くぁあっ……はぁは、あっ……ふ……ひああぁっ<emoji=heart04>」"
translation = "「나는, 음란하지…… 않, 아…… 핫, 앗── 하앙<emoji=heart04> 쿠아앗…… 하아하, 앗…… 후…… 히아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「いやぁ……見ないで……んっ……はっ……はぁ……あんっ……<emoji=heart04>\u3000おち○ちん、大きくて、硬くて……ズンズン来てる……はっ、はぁ、はんっ……<emoji=heart04>」"
translation = "「싫어…… 보지 마…… 응…… 핫…… 하아…… 아앙……<emoji=heart04> 자지, 크고, 딱딱해서…… 즈음즈음 들어오고 있어…… 핫, 하아, 하앙……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "激しいグラインドで乳房が重そうに揺れ、膣はペニスをぎゅっと締め付け、エリスの体は俺を悦ばせるための道具と化していた。"
translation = "격렬한 허리놀림에 유방이 무겁게 흔들리고, 보지는 자지를 꽉 조이며, 에리스의 몸은 나를 기쁘게 하기 위한 도구로 변해 있었다."

[[dialogue]]
speaker = "unk"
original = "だがまだわずかに抵抗するエリスをねじ伏せるように、子宮口を重点的に責めていく。"
translation = "하지만 아직 미세하게 저항하는 에리스를 찍어누르듯, 자궁구를 중점적으로 괴롭힌다."

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「んん～～っ<emoji=heart04>\u3000ひっ、ひっ……ひぃんっ<emoji=heart04>\u3000そんな奥ばっかり……ダメっ……はぁっ、はっ……あぁんっ……<emoji=heart04>」"
translation = "「응응~~윽<emoji=heart04> 히익, 히익…… 히잉<emoji=heart04> 그런 안쪽만…… 안 돼…… 하앗, 핫…… 아앙……<emoji=heart04>」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「あっ……はっ、はっ、はっ──ああぁんっ<emoji=heart04>\u3000ダメ……ダメですっ……あっ──はっ──ひやぁああっ<emoji=heart04>」"
translation = "「앗…… 핫, 핫, 핫── 아아앙<emoji=heart04> 안 돼…… 안 돼요…… 앗── 핫── 히야아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "膣内を動くペニスがドクドクと跳ね、この女を完全に征服したいと本能が疼く。"
translation = "질 내를 움직이는 자지가 맥동하며, 이 여자를 완전히 정복하고 싶다는 본능이 꿈틀거린다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「中に出すぞ。魔王の子種で孕ませてやる」"
translation = "「안에 내보내겠다. 마왕의 씨앗으로 임신시켜 주지.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「な──！？」"
translation = "「뭐──!?」"

[[dialogue]]
speaker = "unk"
original = "そう告げた瞬間、エリスが震える。"
translation = "그렇게 고한 순간, 에리스가 떤다."

[[dialogue]]
speaker = "unk"
original = "しかし同時に膣壁がきゅうっと収縮した。"
translation = "그러나 동시에 질벽이 꽉 수축했다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「孕まされると聞いて体が悦んでいるぞ、淫乱騎士」"
translation = "「임신시킨다는 말을 듣고 몸이 기뻐하고 있군, 음란 기사.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「違い、ます……くぁっ……はあぁっ……<emoji=heart04>\u3000私は……私は……ん──うああぁっ<emoji=heart04>」"
translation = "「아니, 에요…… 쿠앗…… 하아앗……<emoji=heart04> 나는…… 나는…… 응── 우아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「くっ、あっ……私は淫乱なんかじゃ──ふああっ<emoji=heart04>\u3000あ、あっ……あ……んんっ<emoji=heart04>\u3000あ──は──ん～っ……<emoji=heart04>」"
translation = "「큭, 앗…… 나는 음란 같은 거── 후아앗<emoji=heart04> 아, 앗…… 아…… 응응……<emoji=heart04> 아── 하── 응~……<emoji=heart04>」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「孕ませるなんて、そんな……ダメ……ダメですっ……くぁああっ……あっ、はあぁっ<emoji=heart04>」"
translation = "「임신시키다니, 그런…… 안 돼…… 안 돼요…… 쿠아아앗…… 앗, 하아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「魔王の手に落ちた女は孕ませるのが道理だろう。エリス、お前は美しい。腹が大きくなった姿も見物だろうな」"
translation = "「마왕의 손에 떨어진 여자는 임신시키는 게 도리겠지. 에리스, 너는 아름다워. 배가 부풀어 오른 모습도 볼만하겠군.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「──ッ！？」"
translation = "「──윽!?」"

[[dialogue]]
speaker = "unk"
original = "エリスも子を孕んだ自身を想像したのか、ゾクゾクと体を震わせた。"
translation = "에리스도 아이를 밴 자신을 상상했는지, 소름 끼치듯 몸을 떨었다."

[[dialogue]]
speaker = "unk"
original = "膣壁も痙攣し、愛液に塗れた肉ひだがペニスを刺激する。"
translation = "질벽도 경련하고, 애액에 젖은 육주가 자지를 자극한다."

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「やめなさい、魔王……！\u3000それだけは、それだけは……くっ……ふあぁっ……はぁっ、はっ、あ──んんっ……<emoji=heart04>」"
translation = "「그만두세요, 마왕……! 그것만은, 그것만은…… 큭…… 후아앗…… 하앗, 핫, 아── 응응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「本当は期待しているくせに。快楽に身を委ねろ。そうすれば俺の雌にしてやる」"
translation = "「사실은 기대하고 있으면서. 쾌락에 몸을 맡겨라. 그러면 나의 암컷으로 만들어 주지.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「んん～～っ<emoji=heart04>\u3000そんなの、認められ、ません──あっ、あっ、あんっ……奥ばっかり……激し、い……っ<emoji=heart04>\u3000あ──ふぁ──はっ、あっ──ああぁっ……<emoji=heart04>」"
translation = "「응응~~윽<emoji=heart04> 그런 거, 인정할 수, 없습니다── 앗, 앗, 아앙…… 안쪽만…… 격렬, 해……윽<emoji=heart04> 아── 화── 핫, 앗── 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "エリスの子を宿す場所──子宮めがけて力任せに叩きつける。"
translation = "에리스의 아이를 품을 장소── 자궁을 향해 힘껏 내리친다."

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「くぁああっ……<emoji=heart04>\u3000やめ、なさい……魔王……あぁんっ……こんなことをしても……ふっ、んん……無駄、です……あっ、あん……<emoji=heart04>」"
translation = "「쿠아아앗……<emoji=heart04> 그만, 두세요…… 마왕…… 아앙…… 이런 짓을 해도…… 후, 응응…… 무의미, 합니다…… 앗, 아앙……<emoji=heart04>」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「私は……っ……あ、あんっ……屈しま──んっ……<emoji=heart04>\u3000あっ、あっ……くっ……んんっ──は──ひああっ<emoji=heart04>」"
translation = "「나는……윽…… 아, 아앙…… 굴복하── 응……<emoji=heart04> 앗, 앗…… 큭…… 응응── 하── 히아앗」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そんなことを言って、今も子宮が疼いているんだろう？」"
translation = "「그런 말을 하면서, 지금도 자궁이 욱신거리고 있잖아?」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「ちがう、ちがう、ちがうぅっ……！\u3000あっ──はっ──ああぁんっ<emoji=heart04>\u3000私は……私は──あ──んああぁ～～っ<emoji=heart04>」"
translation = "「아니야, 아니야, 아니야앗……! 앗── 핫── 아아앙<emoji=heart04> 나는…… 나는── 아── 응아아아~~앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "嬌声に紛れて抵抗がだんだんと弱まっていく。"
translation = "교성에 섞여 저항이 점점 약해져 간다."

[[dialogue]]
speaker = "unk"
original = "膣壁が痙攣し、子宮が降りてきて亀頭が何度も奥を叩いた。"
translation = "질벽이 경련하고, 자궁이 내려와 귀두가 몇 번이고 안쪽을 때렸다."

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「く、はぁっ……はぁ、はぁ……あんっ……<emoji=heart04>\u3000わた、しは……あっ……あなたの、ものには……はっ、あっ……なりま──あっ──なりませ──んんっ……<emoji=heart04>」"
translation = "「쿠, 하앗…… 하아, 하아…… 아앙……<emoji=heart04> 나, 는…… 앗…… 당신의, 것으론…… 핫, 앗…… 되지 않── 앗── 되지 않── 응응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「お前も雌だろう。雄に孕まされるのはさぞかし気持ちいいぞ？」"
translation = "「너도 암컷이잖아. 수컷에게 임신당하는 건 아주 기분 좋지?」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「～～～～～っ<emoji=heart04>」"
translation = "「~~~~~윽<emoji=heart04>」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「はぁっ、はっ──あっ、あ──ぁんっ<emoji=heart04>\u3000ダメ……ダメです……あ──あ──」"
translation = "「하앗, 핫── 앗, 아── 아앙<emoji=heart04> 안 돼…… 안 돼요…… 아── 아──」"

[[dialogue]]
speaker = "unk"
original = "そしてもう一度子宮口にぶつかった瞬間──"
translation = "그리고 다시 한번 자궁구에 부딪힌 순간──"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「ダメぇえええええええっ！！！」"
translation = "「안 돼애애애애애애애앗!!!」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「ひああぁぁぁあああ～～～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「히아아아아아아아아~~~~~~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「うあああぁっ──あっ、ああああ～～っ<emoji=heart04><emoji=heart04>\u3000はぁはっ……あっ──あ──ああああぁあ～～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「우아아아앗── 앗, 아아아아~~앗<emoji=heart04><emoji=heart04> 하아하앗…… 앗── 아── 아아아아아아~~~~~~~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "欲望をエリスの奥でぶちまけると、今まで抑えていた快感を爆発させるように、狂乱めいた嬌声を上げる。"
translation = "욕망을 에리스의 안쪽에서 쏟아내자, 지금까지 억눌렀던 쾌감을 폭발시키듯 광란에 가까운 교성을 지른다."

[[dialogue]]
speaker = "unk"
original = "俺は構うことなく、亀頭を子宮に密着させて射精し続ける。"
translation = "나는 아랑곳하지 않고, 귀두를 자궁에 밀착시켜 사정을 계속한다."

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「熱いっ、熱いぃっ<emoji=heart04>\u3000あ……あ……あ……出てるっ<emoji=heart04>\u3000精液が、ドクドクって……私の中に、入ってきてますぅっ<emoji=heart04>」"
translation = "「뜨거워, 뜨거워엇<emoji=heart04> 아…… 아…… 아…… 나오고 있어<emoji=heart04> 정액이, 울컥울컥하고…… 내 안에, 들어오고 있어요옷<emoji=heart04>」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「あ、あ──あんっ<emoji=heart04>\u3000魔王の精子が、私の子宮に……あっ、はぁっ……魔王の赤ちゃん、できちゃいます……っ……んん～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「아, 아── 아앙<emoji=heart04> 마왕의 정자가, 내 자궁에…… 앗, 하앗…… 마왕의 아기, 생겨버려요……윽…… 응응응~~~윽<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "雌の本能か、エリスは子種をたっぷりと中に注ぎ込まれ、孕まされる快感に打ち震えていた。"
translation = "암컷의 본능인지, 에리스는 씨앗을 듬뿍 안에 주입당하며 임신당하는 쾌감에 전율하고 있었다."

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「ふぅ、はぁ……はあぁ……はぁん……<emoji=heart04>\u3000おなか……あつい……んっ<emoji=heart04>」"
translation = "「후우, 하아…… 하아아…… 하앙……<emoji=heart04> 배 안이…… 뜨거워…… 응<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「盛大に達したな。認めろ、お前は淫乱な女だ」"
translation = "「성대하게 가버렸군. 인정해라, 너는 음란한 여자다.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「いん、らん……私……淫乱なんですね……」"
translation = "「음, 란…… 나…… 음란하군요……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺に服従すればもっと快楽を味わわせてやる。いいな？」"
translation = "「내게 복종하면 더한 쾌락을 맛보게 해주지. 알겠나?」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「はい…………魔王さま……<emoji=heart04>」"
translation = "「네………… 마왕님……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "気高さを打ち砕かれたエリスが心から屈服し、ただの雌になった瞬間だった──"
translation = "고결함을 짓밟힌 에리스가 진심으로 굴복하여, 그저 암컷이 된 순간이었다──"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「ふぅ、お疲れ様でした……というのも変ですね」"
translation = "「후우, 수고하셨습니다……라고 하는 것도 이상하네요.」"

[[dialogue]]
speaker = "unk"
original = "悪の魔王とかエリスが負けたとかは、もちろんウソというか、お芝居だ。"
translation = "악의 마왕이라거나 에리스가 졌다거나 하는 건, 물론 거짓말이라기보다 연극이다."

[[dialogue]]
speaker = "unk"
original = "魔王は本当は世界を救った英雄らしい……というのはさておき、俺なりに悪役らしさを追求してみたのだが。"
translation = "마왕은 사실 세계를 구한 영웅이라던데…… 그건 제쳐두고, 나름대로 악역다움을 추구해 보았는데."

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「思い返すと……お芝居をしながらというのは、なかなか恥ずかしいものですね」"
translation = "「되돌아보니…… 연극을 하면서라는 건, 꽤 부끄러운 일이네요.」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「でも魔王の演技をしながらとはいえ、あなたにあんなに熱烈に迫られるのは……その、悪い気はしませんでした……」"
translation = "「하지만 마왕 연기를 하면서라고는 해도, 당신에게 그렇게 열렬하게 구애받는 건…… 그게, 나쁜 기분은 아니었어요……」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「あっ、いえっ、何でもありませんっ、何でも……あはは、あははは……」"
translation = "「앗, 아니요, 아무것도 아니에요, 아무것도…… 아하하, 아하하하……」"

