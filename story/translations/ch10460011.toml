[[dialogue]]
speaker = "unk"
original = "第１話,護衛メイドは見守りたい,P"
translation = "제1화, 호위 메이드는 지켜보고 싶어"

[[dialogue]]
speaker = "unk"
original = "いつもヴィーナスの後を付いて回っている人物がいる――"
translation = "언제나 비너스의 뒤를 따라다니는 인물이 있다──"

[[dialogue]]
speaker = "unk"
original = "そのことに気付いた俺は、意を決して彼女に話しかけてみることにした。"
translation = "그 사실을 깨달은 나는 결심을 굳히고 그녀에게 말을 걸어보기로 했다."

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「……おや？\u3000どうかされましたか、会長さん？」"
translation = "「……오야? 무슨 일이십니까, 회장님?」"

[[dialogue]]
speaker = "unk"
original = "はじめまして。キミは――"
translation = "처음 뵙겠습니다. 당신은──"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「ああ、ご挨拶がまだでしたね。失礼しました。存在に気付かれないうちは……と思っていたものですから」"
translation = "「아아, 인사가 늦었군요. 실례했습니다. 존재를 들키지 않는 동안에는…… 하고 생각했었거든요.」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「改めまして、私は新星学園２年、<ruby>藤岡閃<rt>ふじおか\u3000せん</rt></ruby>と申します」"
translation = "「다시 한번, 저는 신성학원 2학년, 후지오카 센이라고 합니다.」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「九浄家メイド隊で、ヴィーナスお嬢様の護衛と、学園内の警備を担当させてもらっています」"
translation = "「쿠죠 가문 메이드대에서 비너스 아가씨의 호위와 학원 내 경비를 담당하고 있습니다.」"

[[dialogue]]
speaker = "unk"
original = "九浄家メイド隊って確か……"
translation = "쿠죠 가문 메이드대라면 분명……"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「九浄家の現当主様が星見家メイド隊に対抗して作った組織です。お屋敷の仕事はもちろんですが、学園運営の手伝いも行っています」"
translation = "「쿠죠 가문의 현 당주님께서 호시미 가문 메이드대에 대항하여 만든 조직입니다. 저택 일은 물론이지만 학원 운영 보조도 수행하고 있죠.」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「私の場合は、お屋敷の仕事がお嬢様の護衛、学園の仕事が校内警備といった感じです」"
translation = "「제 경우에는 저택 일이 아가씨 호위, 학원 일이 교내 경비라는 느낌입니다.」"

[[dialogue]]
speaker = "unk"
original = "だからいつも、刀を持ち歩いているんだな"
translation = "그래서 항상 칼을 가지고 다니는 거구나."

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「ああ、これですか。日頃から持ち慣れてると、目立つことも忘れがちになってしまいますね」"
translation = "「아아, 이거 말입니까. 평소부터 차고 다니는 게 익숙해지면 눈에 띈다는 사실도 잊어버리곤 하네요.」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「当主様の権限で、私は学園及び周辺地域で帯刀の許可をもらっているんです。許可証も学生手帳に入れて、持ち歩いてます」"
translation = "「당주님의 권한으로 저는 학원 및 주변 지역에서 패도의 허가를 받았습니다. 허가증도 학생 수첩에 넣어 휴대하고 있고요.」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「いつ何時、お嬢様に不埒なことを働く輩が現れるか分かりませんからね」"
translation = "「언제 어느 때 아가씨에게 불온한 짓을 저지르는 무리가 나타날지 모르니까요.」"

[[dialogue]]
speaker = "unk"
original = "でも護衛なら隠れる必要はないんじゃ……？"
translation = "하지만 호위라면 숨을 필요는 없지 않아……?"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「いえいえ！\u3000私なんかが、お嬢様の華麗な日常を邪魔するわけにはいきませんっ」"
translation = "「아뇨 아뇨! 저 같은 게 아가씨의 화려한 일상을 방해할 수는 없죠!」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「ほら、写真を撮る時も、撮られていることに気付いていない自然な笑顔がいいと、よく聞くじゃないですか」"
translation = "「보세요, 사진을 찍을 때도 찍히고 있다는 걸 의식하지 않는 자연스러운 미소가 좋다고들 하잖아요.」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「それと同じです。お嬢様がありのままに放つ、自然の輝きこそが至高……！」"
translation = "「그것과 같습니다. 아가씨가 있는 그대로 내뿜는 자연스러운 광채야말로 지고의 가치……!」"

[[dialogue]]
speaker = "unk"
original = "か、輝き……？"
translation = "과, 광채……?"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「ええ、ヴィーナスお嬢様と親しい会長さんならばよくご存じのはずです。お嬢様の一挙一動から放たれる、眩しくも神々しいオーラを！」"
translation = "「네, 비너스 아가씨와 친한 회장님이라면 잘 아실 겁니다. 아가씨의 일거수일투족에서 뿜어져 나오는 눈부시고도 신성한 오라를!」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「あちらをご覧ください。ちょうどお嬢様がアナさんに声を掛けているみたいです」"
translation = "「저쪽을 봐 주세요. 마침 아가씨가 아나 씨에게 말을 걸고 있는 모양입니다.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「アナ、いいところで会ったわ。実はお願いしたいことがあるのよ」"
translation = "「아나, 좋은 때 만났네. 사실 부탁하고 싶은 게 있어.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「前会長……。もしかしてまた書類仕事ですか？」"
translation = "「전 회장님……. 혹시 또 서류 작업인가요?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「さすがアナね！\u3000その通りよ！」"
translation = "「역시 아나야! 정답이야!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はぁ、たまには自分でやってみては――」"
translation = "「하아, 가끔은 직접 좀 해 보시는 게──」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「もちろんこの通り、報酬の和菓子も用意してあるわ！」"
translation = "「물론 이 말대로, 보상인 화과자도 준비해 뒀어!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「やります。前会長はやはり女神……！」"
translation = "「하겠습니다. 전 회장님은 역시 여신……!」"

[[dialogue]]
speaker = "unk"
original = "（お菓子で釣ってる……！）"
translation = "(과자로 낚고 있어……!)"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「はあぁ……さすがです、お嬢様……<emoji=heart04>\u3000後輩から慕われる人望の厚さ、施しを与える慈愛の深さ……アナさんの言う通り、まさに女神のよう……！」"
translation = "「하아아…… 역시 아가씨입니다……<emoji=heart04> 후배로부터 존경받는 인망의 두터움, 베풂을 주는 자애의 깊이…… 아나 씨 말대로 그야말로 여신 같아……!」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「私もお嬢様に施されたい……！」"
translation = "「나도 아가씨에게 베풀어지고 싶어……!」"

[[dialogue]]
speaker = "unk"
original = "えぇ……"
translation = "에에……"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「何ですか会長さん、その疑うような眼差しは！」"
translation = "「뭡니까 회장님, 그 의심하는 듯한 눈초리는!」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「お嬢様の言葉には凄い力があるんですよ？\u3000無理だと思えることも、お嬢様から出来ると言われると、本当に出来るようになったりするんですから！」"
translation = "「아가씨의 말씀에는 엄청난 힘이 있다고요? 불가능하다고 생각되는 일도 아가씨가 할 수 있다고 말씀하시면 정말로 할 수 있게 되니까요!」"

[[dialogue]]
speaker = "unk"
original = "閃は……ヴィーナスのことが好きなのか？"
translation = "센은…… 비너스를 좋아하는 거야?"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「す、好きとかそんな、下世話な言い方をしないで下さい！\u3000私はただ、お嬢様を尊敬しているだけです……！」"
translation = "「조, 좋아한다니 그런 저속한 표현은 삼가 주세요! 저는 그저 아가씨를 존경하고 있을 뿐입니다……!」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「ハッ……！」"
translation = "「핫……!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「やっぱりクロトじゃない。こんなところでどうしたのよ？\u3000というか、さっきまで誰かと話してなかった？」"
translation = "「역시 쿠로토잖아. 이런 데서 뭐 하고 있어? 그보다 방금까지 누구랑 얘기하고 있지 않았어?」"

[[dialogue]]
speaker = "unk"
original = "実は……って、あれ！？\u3000閃がいない！？"
translation = "사실은…… 어, 어라!? 센이 없어!?"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「センちゃんがいたの？\u3000私の護衛を引き受けてくれているから、すぐ戻って来るんじゃないかしら？」"
translation = "「센짱이 있었어? 내 호위를 맡아주고 있으니까 금방 돌아오지 않을까?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「とりあえず一緒に星徒会室に行くわよ！\u3000今日は色々とやりたいことがあるの」"
translation = "「일단 같이 성도회실로 가자! 오늘은 이것저것 하고 싶은 일이 많아.」"

[[dialogue]]
speaker = "unk"
original = "そう言って、ヴィーナスが嬉々として俺の手を取る――その時だった。"
translation = "그렇게 말하며 비너스가 기쁘게 내 손을 잡는── 그때였다."

[[dialogue]]
speaker = "unk"
original = "（ハッ……！\u3000殺気……！）"
translation = "(핫……! 살기……!)"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「じーっ……」"
translation = "「지이익……」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "（お嬢様から手を握られるなんて羨ましいです……！\u3000会長さん、距離が近いですよ！\u3000早く離れて下さい！）"
translation = "(아가씨가 손을 잡아주시다니 부럽습니다……! 회장님, 거리가 너무 가까워요! 빨리 떨어지세요!)"

[[dialogue]]
speaker = "unk"
original = "（刀の柄に手を添えてない！？）"
translation = "(칼자루에 손을 대고 있잖아!?)"

[[dialogue]]
speaker = "unk"
original = "グサグサと刺さるような視線に、ヴィーナスとの距離感をくれぐれも気を付けようと思うのだった。"
translation = "따갑게 꽂히는 시선에 비너스와의 거리감을 부디 조심해야겠다고 생각하는 나였다."

