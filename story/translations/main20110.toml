[[dialogue]]
speaker = "unk"
original = "第１２話,御前試合開始,B"
translation = "제12화, 어전시합 개시, B"

[[dialogue]]
speaker = "unk"
original = "そして人生二度目の御前試合が当日を迎えた。"
translation = "그리고 인생 두 번째 어전시합 당일을 맞이했다."

[[dialogue]]
speaker = "梨緒"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "クロト"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "二千数百名の生徒が見守る中、アリーナの中央で梨緒と睨み合う。"
translation = "이천 수백 명의 학생이 지켜보는 가운데, 아레나 중앙에서 리오와 노려본다."

[[dialogue]]
speaker = "unk"
original = "二度目とはいえ緊張はある。"
translation = "두 번째라고는 해도 긴장은 된다."

[[dialogue]]
speaker = "unk"
original = "いや、前はヴィーナスにばかり意識が向いていたから、むしろ今日の方が緊張しているかもしれない。"
translation = "아니, 전에는 비너스에게만 의식이 향해 있었기에 오히려 오늘이 더 긴장될지도 모른다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「私が御前試合を観戦するなんて不思議な気分ね。クロト～！\u3000負けちゃダメよ～！」"
translation = "「내가 어전시합을 관전하다니 이상한 기분이네. 쿠로토~! 지면 안 돼~!」"

[[dialogue]]
speaker = "マトイ"
original = "「ドキドキ……」"
translation = "「두근두근……」"

[[dialogue]]
speaker = "アナ"
original = "「うぉっちたいむ」"
translation = "「와치 타임.」"

[[dialogue]]
speaker = "サーシャ"
original = "「がんばってね～」"
translation = "「힘내세요~」"

[[dialogue]]
speaker = "unk"
original = "喧噪に混じってヴィーナスの声が聞こえた。星徒会のみんなも一緒だ。"
translation = "웅성거림 속에 섞여 비너스의 목소리가 들렸다. 성도회 모두도 함께다."

[[dialogue]]
speaker = "梨緒"
original = "「緋宮クロト。御前試合を受けてくれたことには感謝しよう」"
translation = "「히노미야 쿠로토. 어전시합을 받아준 것에는 감사하지.」"

[[dialogue]]
speaker = "クロト"
original = "「礼はいらないよ。俺には俺で受ける理由があったからな」"
translation = "「인사는 필요 없어. 나에겐 나대로 받아들일 이유가 있었으니까.」"

[[dialogue]]
speaker = "梨緒"
original = "「そうか、なら心置きなく戦わせてもらおう。元から手加減などするつもりはないがな」"
translation = "「그런가, 그럼 마음 놓고 싸우도록 하지. 원래부터 봐줄 생각 따위는 없었지만 말이야.」"

[[dialogue]]
speaker = "梨緒"
original = "「それともうひとつ。以前、不躾な態度をとったことを謝罪させてほしい」"
translation = "「그리고 한 가지 더. 이전에 무례한 태도를 보였던 것을 사과하고 싶어.」"

[[dialogue]]
speaker = "梨緒"
original = "「少なくとも、今の君は世界の破滅など望む人間ではないようだ。すまなかった」"
translation = "「적어도 지금의 너는 세계의 파멸 따위를 바라는 인간은 아닌 것 같군. 미안했다.」"

[[dialogue]]
speaker = "梨緒"
original = "「しかし……だからこそ私は負けるわけにはいかない。やはり君は戦いから離れるべきだ」"
translation = "「하지만…… 그렇기에 나는 질 수 없어. 역시 너는 싸움에서 물러나야만 해.」"

[[dialogue]]
speaker = "unk"
original = "俺への認識が変わろうとも、会長の座を奪おうという意志は変わらない。"
translation = "나에 대한 인식이 변했을지언정, 회장 자리를 빼앗겠다는 의지는 변하지 않는다."

[[dialogue]]
speaker = "unk"
original = "梨緒の瞳に宿る真っ直ぐな決意に、俺も受けて立てねばと闘志が奮い立つ。"
translation = "리오의 눈동자에 깃든 곧은 결의에 나도 맞서야 한다며 투지가 불타오른다."

[[dialogue]]
speaker = "クロト"
original = "「俺だって負ける気はない。星徒会長は譲らないぞ」"
translation = "「나도 질 생각은 없어. 성도회장은 양보 못 해.」"

[[dialogue]]
speaker = "梨緒"
original = "「ならば力ずくで引きずり下ろすまでだ。そのための御前試合だからな」"
translation = "「그렇다면 힘으로 끌어내릴 뿐이다. 그러기 위한 어전시합이니까.」"

[[dialogue]]
speaker = "ラティエ"
original = "「ふむ。戦いの前から火花を散らしているね。転入生同士、気が合ったのならば喜ばしい」"
translation = "「흠. 싸우기 전부터 불꽃이 튀는군. 전학생끼리 마음이 맞았다면 기쁜 일이지.」"

[[dialogue]]
speaker = "ラティエ"
original = "「立ち合いは、暫定的に総合学園長を務める私が行う。では両人、前へ。死力を尽くしてくれたまえ」"
translation = "「입회는 잠정적으로 종합학원장을 맡고 있는 내가 하겠다. 그럼 두 사람, 앞으로. 사력을 다해주게.」"

[[dialogue]]
speaker = "クロト＆梨緒"
original = "「はい！」"
translation = "「네!」"

[[dialogue]]
speaker = "梨緒"
original = "「では行くぞ！\u3000魔王は私が倒す！」"
translation = "「그럼 간다! 마왕은 내가 쓰러뜨린다!」"

[[dialogue]]
speaker = "クロト"
original = "「いいや、俺が勝つ！」"
translation = "「아니, 내가 이긴다!」"

[[dialogue]]
speaker = "unk"
original = "雷を帯びた梨緒の矢と、波動をまとった拳が激突し、爆風が弾ける。"
translation = "번개를 머금은 리오의 화살과 파동을 두른 주먹이 격돌하며 폭풍이 터져 나온다."

[[dialogue]]
speaker = "unk"
original = "次の瞬間には、稲妻と化した梨緒が背後をとっていた。"
translation = "다음 순간에는 번개로 변한 리오가 배후를 잡고 있었다."

[[dialogue]]
speaker = "梨緒"
original = "「そこだ！」"
translation = "「거기다!」"

[[dialogue]]
speaker = "クロト"
original = "「させない！」"
translation = "「안 놓쳐!」"

[[dialogue]]
speaker = "unk"
original = "梨緒が矢を放つ刹那、拳から衝撃波を撃ち出す。"
translation = "리오가 화살을 쏘는 찰나, 주먹에서 충격파를 내뿜는다."

[[dialogue]]
speaker = "unk"
original = "拳撃が矢を押し返すも、梨緒は素早く距離を取って危なげなく躱した。"
translation = "권격이 화살을 밀어내지만, 리오는 재빨리 거리를 벌려 여유롭게 피했다."

[[dialogue]]
speaker = "梨緒"
original = "「星徒会長の肩書は飾りではないようだな」"
translation = "「성도회장이라는 직함이 장식은 아닌 모양이군.」"

[[dialogue]]
speaker = "クロト"
original = "「今までいろいろあったからな。鍛えられたよ」"
translation = "「지금까지 여러 일이 있었으니까. 단련됐지.」"

[[dialogue]]
speaker = "unk"
original = "しかしここまでは小手調べ。お互い本気はまだまだだ。"
translation = "하지만 여기까지는 몸풀기. 서로 본 실력은 아직 멀었다."

[[dialogue]]
speaker = "クロト"
original = "（みんなとの特訓のおかげで余裕はある）"
translation = "(모두와의 특훈 덕분에 여유는 있어)"

[[dialogue]]
speaker = "unk"
original = "俺の中で暴れようとする力を抑えながら、大地の──守護星の鼓動に耳を傾ける。"
translation = "내 안에서 날뛰려는 힘을 억누르며 대지의── 수호성의 고동에 귀를 기울인다."

[[dialogue]]
speaker = "unk"
original = "魔王としてではなく、ただの星騎士として、きっとまだ成長の余地はあるはずだ。"
translation = "마왕으로서가 아니라 평범한 성기사로서, 분명 아직 성장할 여지는 있을 것이다."

[[dialogue]]
speaker = "unk"
original = "まだ<ruby>厄災<rt>リクリエ</rt></ruby>が終わらないというならば──この試練、乗り越えて見せる！"
translation = "아직 재앙<rt>리크리에</rt></ruby>이 끝나지 않는다면── 이 시련, 극복해 보이겠어!"

