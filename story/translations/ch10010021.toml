[[dialogue]]
speaker = "unk"
original = "第１話,サーファーフィオナ？,P"
translation = "제1화, 서퍼 피오나?, P"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「今日は私のわがままにお付き合いいただいてありがとうございます、緋宮会長」"
translation = "「오늘은 저의 제멋대로에 어울려 주셔서 감사합니다, 히노미야 회장」"

[[dialogue]]
speaker = "unk"
original = "『サーフィンについてもっと知りたい』というフィオナの希望で、俺たちはサーフィン用品を見に来ていた。"
translation = "『서핑에 대해 더 알고 싶다』는 피오나의 희망으로, 우리는 서핑 용품을 보러 와 있었다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ボードに塗るワックスに、ボードと体を繋ぐリーシュ、ウェットスーツ……ボード以外でもサーフィンに関連したものがたくさんあるんですね」"
translation = "「보드에 바르는 왁스에, 보드와 몸을 잇는 리시, 웨트슈트…… 보드 외에도 서핑과 관련된 것이 잔뜩 있네요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ウェットスーツだけでも種類があって……具体的にどう違うんでしょうか？」"
translation = "「웨트슈트만 해도 종류가 있는데…… 구체적으로 어떻게 다른 걸까요?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふむふむ……フルスーツやセミドライなど、季節や地域で使い分けるんですね。きちんと装備を揃えれば冬でもサーフィンが楽しめる、と」"
translation = "「흠흠…… 풀 슈트나 세미 드라이 등, 계절이나 지역에 따라 구분해서 사용하는군요. 장비를 제대로 갖추면 겨울에도 서핑을 즐길 수 있다, 라」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「冬のサーフィンというととても寒いイメージなのですが……冬だから海水浴客がいなくてサーフィンしやすい？\u3000なるほど、そんなメリットもあるんですね」"
translation = "「겨울 서핑이라고 하면 매우 추운 이미지입니다만…… 겨울이니까 해수욕객이 없어서 서핑하기 쉽다? 과연, 그런 장점도 있군요」"

[[dialogue]]
speaker = "unk"
original = "フィオナならかっこよく着こなせそう"
translation = "피오나라면 멋지게 소화할 것 같다"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「そうですかね？\u3000サーファー・フィオナ、鮮烈デビュー！\u3000……なんて、調子に乗りすぎでしょうか」"
translation = "「그런가요? 서퍼 피오나, 선명한 데뷔! ……라니, 너무 우쭐대는 걸까요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あ、あっちにサーフボードがあるので見てみましょう」"
translation = "「아, 저쪽에 서프보드가 있으니 보러 가봅시다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「サーフボードにも大きさや形で性能の違いがあるって、サーフィンをやってみて初めて知りました」"
translation = "「서프보드도 크기나 형태로 성능 차이가 있다는 것을, 서핑을 해보고 처음 알았습니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「リップルさんに教わりましたが、初心者には大きくて重いロングボードの方が扱いやすいんですよね」"
translation = "「리플 씨에게 배웠습니다만, 초보자에게는 크고 무거운 롱보드가 다루기 쉽다고 하더군요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「むしろ軽くて短いショートボードの方が、扱いづらいけど小回りが利いて上級者向きなんだとか」"
translation = "「오히려 가볍고 짧은 숏보드가, 다루기는 어렵지만 회전이 잘 돼서 상급자용이라고 합니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「私も自分のサーフボードを持つなら、ロングボードの方がいいでしょうか？」"
translation = "「저도 제 서프보드를 가진다면, 롱보드가 더 좋을까요?」"

[[dialogue]]
speaker = "unk"
original = "フィオナはもう初心者じゃないよ"
translation = "피오나는 이제 초보자가 아니야"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ありがとうございます。そうですね、お気に入りを見つけて、乗りこなすつもりでいきましょう」"
translation = "「감사합니다. 그렇네요, 마음에 드는 것을 찾아서, 완전히 다룰 생각으로 가봅시다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あ、このサーフボード、かっこいいですね。これで波に乗れたら絶対に気持ちいいです。お値段は……」"
translation = "「아, 이 서프보드, 멋지네요. 이걸로 파도를 탈 수 있다면 분명 기분 좋을 거예요. 가격은……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「２０万……！？\u3000結界内ではリップルさんに貸してもらえましたが、軽い気持ちで買えるものではないんですね……」"
translation = "「20만……!? 결계 내에서는 리플 씨에게 빌릴 수 있었습니다만, 가벼운 마음으로 살 수 있는 물건은 아니군요……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「星見家なら買えるというのはそうなんですが……買っていいかどうかは別問題です」"
translation = "「호시미 가문이라면 살 수 있다는 것은 맞습니다만…… 사도 되는지는 별개의 문제입니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「本格的に始めるならまだしも、現実的に考えると、私がサーフィンできる時間はそう多くありません」"
translation = "「본격적으로 시작한다면 모를까, 현실적으로 생각하면, 제가 서핑할 수 있는 시간은 그리 많지 않습니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「それに少なくないお金を出すのは、無駄遣いと言われても仕方ありません。マイボードに憧れはあったのですが……」"
translation = "「게다가 적지 않은 돈을 쓰는 것은, 낭비라고 들어도 어쩔 수 없습니다. 마이 보드에 대한 동경은 있었습니다만……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「え……？\u3000入門用や中古もある？\u3000でしたらそちらも見てみましょう。どれどれ……」"
translation = "「에……? 입문용이나 중고도 있다? 그렇다면 그것도 보러 가봅시다. 어디 보자……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「うーん……良さそうなものはやはりそれなりのお値段で……これというものは見つかりませんね……」"
translation = "「음ー…… 괜찮아 보이는 것은 역시 그만한 가격이고…… 이거다 싶은 것은 찾을 수 없네요……」"

[[dialogue]]
speaker = "unk"
original = "じゃあいろんなお店を見てみよう"
translation = "그럼 여러 가게를 둘러보자"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「いいんですか？\u3000しかし緋宮会長にご迷惑をかけてしまうのでは……」"
translation = "「괜찮겠어요? 하지만 히노미야 회장에게 폐를 끼치게 되는 것은 아닌지……」"

[[dialogue]]
speaker = "unk"
original = "納得いくまでとことん探そう"
translation = "납득할 때까지 끝까지 찾아보자"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「！\u3000はい、お願いします」"
translation = "「! 네, 부탁드립니다」"

[[dialogue]]
speaker = "unk"
original = "それからサーフボードを取り扱っているスポーツ用品店をいくつか見て回ったのだが……"
translation = "그 후 서프보드를 취급하는 스포츠 용품점을 몇 군데 돌아다녔지만……"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「価格が低めでも、フィンなど他のものを揃えるとそれなりの額になりますね……」"
translation = "「가격이 낮아도, 핀 등 다른 것을 갖추면 그만한 금액이 되네요……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「安いものをつなぎとして購入するのも、買い直すことを考えるとお金の無駄になりかねないですし……」"
translation = "「싼 것을 임시로 구매하는 것도, 다시 사는 것을 생각하면 돈 낭비가 될 수도 있고요……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「うぅ、考えれば考えるほどまとまらない……正直、このままだとサーフボードを買っても買わなくても後悔するような……」"
translation = "「으으, 생각하면 생각할수록 정리가 안 돼…… 솔직히, 이대로라면 서프보드를 사도 안 사도 후회할 것 같은……」"

[[dialogue]]
speaker = "unk"
original = "あともう一軒だけ！"
translation = "앞으로 딱 한 군데만 더!"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「少し遠いけど知り合いのお店がある……？\u3000さすが緋宮会長、顔が広いです」"
translation = "「조금 멀지만 아는 가게가 있다……? 역시 히노미야 회장, 발이 넓으시네요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ですが緋宮会長にこれ以上ご迷惑をかけるわけにはいかないので……そうですね、そちらでよいのがなければ諦めましょう」"
translation = "「하지만 히노미야 회장에게 더 이상 폐를 끼칠 수는 없으니…… 그렇네요, 그곳에서 좋은 것이 없다면 포기합시다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「とても幸運でした。最初に見たサーフボードと同じメーカーの、少し古いものが処分品になっていて、とてもお安く購入できました」"
translation = "「매우 운이 좋았습니다. 처음에 봤던 서프보드와 같은 제조사의, 조금 오래된 것이 처분품이 되어 있어서, 아주 저렴하게 구매할 수 있었습니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ところどころ違う部分はありますけど、スタイリッシュさは健在で、とてもかっこいいボードです」"
translation = "「곳곳에 다른 부분은 있지만, 스타일리시함은 건재하고, 아주 멋진 보드입니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「それに緋宮会長の知り合いだからと店長さんがいろいろおまけしてくれて、至れり尽くせりでした」"
translation = "「게다가 히노미야 회장의 지인이라고 점장님이 여러 가지 덤으로 주셔서, 극진한 대접을 받았습니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「緋宮会長のおかげで、諦めずに満足いくものが選べました。ありがとうございます」"
translation = "「히노미야 회장 덕분에, 포기하지 않고 만족스러운 것을 고를 수 있었습니다. 감사합니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「これが私のマイボード……」"
translation = "「이것이 저의 마이 보드……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「忙しいですけど、このボードを使いこなしていっぱい波に乗りたいです」"
translation = "「바쁘지만, 이 보드를 완전히 다뤄서 파도를 많이 타고 싶습니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「その時は……緋宮会長も一緒にサーフィンしてくれますか？」"
translation = "「그때는…… 히노미야 회장도 함께 서핑해 주시겠어요?」"

[[dialogue]]
speaker = "unk"
original = "もちろん！"
translation = "물론이지!"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふふ、ありがとうございます。緋宮会長や店長さんに恥ずかしくないよう、かっこいいサーフィンをしてみせますね♪」"
translation = "「후후, 감사합니다. 히노미야 회장이나 점장님께 부끄럽지 않도록, 멋진 서핑을 보여드리겠습니다♪」"

