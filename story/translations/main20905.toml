[[dialogue]]
speaker = "unk"
original = "第５話,狙われた天界,B"
translation = "제5화, 타깃이 된 천계, B"

[[dialogue]]
speaker = "クロト"
original = "「細かい情報はあるが、大まかには以上だ。じゃあアナたちから、アルタイルで起きたことを説明してくれないか？」"
translation = "「세부적인 정보는 더 있지만, 대략적으로는 이상이다. 그럼 아나 일행이 알타이르에서 일어난 일을 설명해 주지 않겠나?」"

[[dialogue]]
speaker = "アナ"
original = "「わかりました。では改めて、天界襲撃について私たちから話を」"
translation = "「알겠습니다. 그럼 다시 한번, 천계 습격에 대해 저희가 말씀을」"

[[dialogue]]
speaker = "アナ"
original = "「数時間前、新星・流星学園の両校は、ネビュラから連絡を受けました」"
translation = "「수 시간 전, 신성·유성학원 양교는 네뷸라로부터 연락을 받았습니다」"

[[dialogue]]
speaker = "アナ"
original = "「極星従騎が天界に現れ、各地に存在する守護天使の神殿を襲撃している……と」"
translation = "「극성종기가 천계에 나타나, 각지에 존재하는 수호천사의 신전을 습격하고 있다고…… 말이죠」"

[[dialogue]]
speaker = "アナ"
original = "「当然、極星学園の狙いはアルタイルを破滅させることでしょう。守護天使の神殿がなくなれば、天使たちの祈りは届かなくなり、守護天使の権能が麻痺します」"
translation = "「당연히 극성학원의 노림수는 알타이르를 파멸시키는 것이겠죠. 수호천사의 신전이 사라지면 천사들의 기도가 닿지 않게 되어, 수호천사의 권능이 마비됩니다」"

[[dialogue]]
speaker = "アナ"
original = "「オペレーション・ペンタグラムの時のように、守護天使の権能が機能しなくなれば、世界の崩壊は免れません」"
translation = "「오퍼레이션 펜타그램 때처럼 수호천사의 권능이 기능하지 않게 되면, 세계의 붕괴는 피할 수 없습니다」"

[[dialogue]]
speaker = "マトイ"
original = "「さっきも言った通り、流星星徒会のみんなは、ネビュラの世界樹で先に天界に向かったよ」"
translation = "「아까도 말했듯이, 유성 성도회 애들은 네뷸라의 세계수를 통해 먼저 천계로 향했어」"

[[dialogue]]
speaker = "マトイ"
original = "「本当はフィーニスの塔を通りたかったんだけど、またディザスターハンドに遭遇するかもしれないから、世界樹を使わせてもらってる」"
translation = "「사실은 피니스의 탑을 통과하고 싶었지만, 또 디재스터 핸드와 조우할지도 모르니까 세계수를 빌려 쓰고 있어」"

[[dialogue]]
speaker = "フィオナ"
original = "「私も一緒に天界に行ければよかったのですが……残念ながら入れ違いになってしまいました」"
translation = "「저도 함께 천계에 갈 수 있었다면 좋았을 텐데…… 유감스럽게도 엇갈리고 말았네요」"

[[dialogue]]
speaker = "マトイ"
original = "「でも大丈夫。世界樹の魔力の充填が終わり次第、私たちも天界に向かうことになってるから」"
translation = "「하지만 괜찮아요. 세계수의 마력 충전이 끝나는 대로 우리도 천계로 향하기로 되어 있으니까」"

[[dialogue]]
speaker = "サーシャ"
original = "「シルヴィや蛍火ちゃんたち、新星の一部のプリマステラも先行してるわ～。私たちもこれから出発するし、一緒に合流しましょう」"
translation = "「실비나 케이카짱 일행, 신성의 일부 프리마스텔라도 선행하고 있어~. 우리도 이제 출발할 거니까, 같이 합류하자」"

[[dialogue]]
speaker = "フィオナ"
original = "「はい、よろしくお願いします」"
translation = "「네, 잘 부탁드립니다」"

[[dialogue]]
speaker = "クロト"
original = "「ありがとう。状況は把握できたよ」"
translation = "「고마워. 상황은 파악했어」"

[[dialogue]]
speaker = "クロト"
original = "「そういえば……俺たちがデネブに飛ばされた後、教皇庁はどうなったんだ？」"
translation = "「그러고 보니…… 우리가 데네브로 날려간 뒤에 교황청은 어떻게 됐지?」"

[[dialogue]]
speaker = "アナ"
original = "「その報告がまだでしたね」"
translation = "「그 보고가 아직이었군요」"

[[dialogue]]
speaker = "アナ"
original = "「会長たちが吸い込まれた次元の穴は間もなく消失。会長たちが消えた以外に被害はありませんでした」"
translation = "「회장님 일행이 빨려 들어간 차원의 구멍은 곧 소멸. 회장님 일행이 사라진 것 외에 피해는 없었습니다」"

[[dialogue]]
speaker = "クロト"
original = "「なら教皇庁は無事なんだな……良かった」"
translation = "「그럼 교황청은 무사하구나…… 다행이다」"

[[dialogue]]
speaker = "unk"
original = "デネブの教皇庁の惨状を思い出し、アルタイルに被害が及ばなかったことに安堵する。"
translation = "데네브 교황청의 참상을 떠올리며, 알타이르에 피해가 미치지 않았다는 사실에 안도한다."

[[dialogue]]
speaker = "unk"
original = "流星市国の象徴ともいえる教皇庁が壊されるのは、市民として心が痛んだ。"
translation = "유성시국의 상징이라고도 할 수 있는 교황청이 파괴되는 것은 시민으로서 마음이 아팠다."

[[dialogue]]
speaker = "ベアトリス"
original = "「──！\u3000チナちゃんは！？\u3000チナちゃんはどうなったの？」"
translation = "「──! 치나짱은!? 치나짱은 어떻게 됐어?」"

[[dialogue]]
speaker = "シノ"
original = "「それは私から説明させていただきますね」"
translation = "「그건 제가 설명해 드리도록 하죠」"

[[dialogue]]
speaker = "マトイ"
original = "「学園長！」"
translation = "「학원장님!」"

[[dialogue]]
speaker = "unk"
original = "レポートらしき書類を抱えながら、シノさんが星徒会室にやってきた。"
translation = "리포트 같은 서류를 안고 시노 씨가 성도회실로 들어왔다."

[[dialogue]]
speaker = "シノ"
original = "「チナさんは無力化の上、独房に改造した会議室で拘束させてもらっています」"
translation = "「치나 씨는 무력화시킨 뒤, 독방으로 개조한 회의실에 구속해 두었습니다」"

[[dialogue]]
speaker = "シノ"
original = "「さすがに自由の身にはできませんが、大きな怪我もありませんし、彼女は元気ですよ。最初は頑なでしたけど、数日前から食事も摂ってくれるようになりました」"
translation = "「차마 자유의 몸으로 둘 수는 없지만, 큰 부상도 없고 그녀는 건강해요. 처음에는 완강했지만 며칠 전부터 식사도 하기 시작했답니다」"

[[dialogue]]
speaker = "ベアトリス"
original = "「よかったぁ……ありがとうございます、学園長さん」"
translation = "「다행이다…… 감사합니다, 학원장님」"

[[dialogue]]
speaker = "シノ"
original = "「いえいえ、私もみなさんが無事に帰ってきてくれて安心しています」"
translation = "「아니에요, 저도 여러분이 무사히 돌아와 주어서 안심하고 있답니다」"

[[dialogue]]
speaker = "シノ"
original = "「それと……梨緒さんにお渡ししたいものがありまして」"
translation = "「그리고…… 리오 씨에게 전해드리고 싶은 것이 있어서요」"

[[dialogue]]
speaker = "梨緒"
original = "「学園長が私に……？」"
translation = "「학원장이 나에게……?」"

[[dialogue]]
speaker = "unk"
original = "シノはそう言って、クリアファイルに収められた書類を手渡す。"
translation = "시노는 그렇게 말하며 클리어 파일에 담긴 서류를 건넨다."

[[dialogue]]
speaker = "シノ"
original = "「こちらはレナーテ・<ruby>Ｚ<rt>ジグ</rt></ruby>・サイフリートさんの資料です。この世界の──ですが」"
translation = "「이쪽은 레나테 Z 자이프리트 씨의 자료입니다. 이 세계의── 것이지만요」"

[[dialogue]]
speaker = "梨緒"
original = "「！\u3000ジグの……」"
translation = "「! 지그의……」"

[[dialogue]]
speaker = "unk"
original = "梨緒は早速ファイルに目を通すが、その中にある記述を見つけて肩を落とした。"
translation = "리오는 즉시 파일을 훑어보았지만, 그 안에 적힌 기술을 발견하고는 어깨를 늘어뜨렸다."

[[dialogue]]
speaker = "梨緒"
original = "「幼少時にモンスターに襲われて死亡……ジグもなのか」"
translation = "「어린 시절에 몬스터에게 습격당해 사망…… 지그도 그런 건가」"

[[dialogue]]
speaker = "シノ"
original = "「アルタイルの梨緒さんも、モンスターに襲われて亡くなったとお聞きしました」"
translation = "「알타이르의 리오 씨도 몬스터에게 습격당해 돌아가셨다고 들었습니다」"

[[dialogue]]
speaker = "シノ"
original = "「おそらくベガではアルタイルと違う動き方をした勢力がいて、その影響なのでしょう。それが学園か、ネビュラか、それともリクリエかはわかりませんが」"
translation = "「아마 베가에서는 알타이르와 다르게 움직인 세력이 있어서 그 영향이 나타난 것이겠죠. 그것이 학원인지, 네뷸라인지, 아니면 리크리에인지는 모르겠습니다만」"

[[dialogue]]
speaker = "シノ"
original = "「それともうひとつ、気になる内容があります」"
translation = "「그리고 한 가지 더, 신경 쓰이는 내용이 있습니다」"

[[dialogue]]
speaker = "unk"
original = "シノが資料の１ページを指し示す。そこに記されていたのは……"
translation = "시노가 자료의 한 페이지를 가리킨다. 그곳에 적혀 있었던 것은……"

[[dialogue]]
speaker = "梨緒"
original = "「一族の能力？」"
translation = "「일족의 능력?」"

[[dialogue]]
speaker = "シノ"
original = "「はい。彼女の一族は伝説の英雄ジークフリート、あるいはシグルドの子孫と言われており、特殊な能力を発現することがあるそうです」"
translation = "「네. 그녀의 일족은 전설의 영웅 지크프리트, 혹은 시구르드의 후손이라고 전해지며, 특수한 능력을 발현하는 경우가 있다고 합니다」"

[[dialogue]]
speaker = "unk"
original = "ジークフリートとは『ニーベルンゲンの歌』で語られる、竜殺しの英雄。"
translation = "지크프리트란 『니벨룽의 노래』에서 이야기되는 용살자의 영웅."

[[dialogue]]
speaker = "unk"
original = "シグルドも源流を同じくする北欧の英雄で、両者とも邪竜ファフニールを討伐して、特殊な力を得たと伝承されている。"
translation = "시구르드 역시 뿌리를 같이하는 북유럽의 영웅으로, 양쪽 모두 사룡 파프니르를 토벌하고 특수한 힘을 얻었다고 전승되고 있다."

[[dialogue]]
speaker = "シノ"
original = "「レナーテさんもまた、竜殺しの英雄の力を受け継いでいるかもしれません」"
translation = "「레나테 씨 또한 용살자 영웅의 힘을 이어받았을지도 모릅니다」"

[[dialogue]]
speaker = "アポロ"
original = "「なんだそれカッコいいな！」"
translation = "「뭐야 그거 멋있잖아!」"

[[dialogue]]
speaker = "アポロ"
original = "「……なんて言ってられないか。ジグは今は敵だからな」"
translation = "「……라고 말하고 있을 때가 아니지. 지그는 지금 적이니까」"

[[dialogue]]
speaker = "梨緒"
original = "「確かに昔、能力について言っていたような……詳しくは教えてくれなかったが」"
translation = "「확실히 예전에 능력에 대해 말했던 것 같기도 하군…… 자세히 가르쳐주지는 않았지만」"

[[dialogue]]
speaker = "梨緒"
original = "「『不可能が可能になるような大層な力じゃない』……と言っていた気がする」"
translation = "「『불가능이 가능해질 정도의 거창한 힘은 아니야』……라고 했던 기분이 들어」"

[[dialogue]]
speaker = "アポロ"
original = "「なんだそりゃ、よくわからないな」"
translation = "「그게 뭐야, 잘 모르겠네」"

[[dialogue]]
speaker = "ナターシャ"
original = "「何かしてくるかも……というか今までもその力を使ってたのかもしれないわけか」"
translation = "「뭔가 해올지도…… 아니, 지금까지도 그 힘을 쓰고 있었을지도 모른다는 거군」"

[[dialogue]]
speaker = "クロト"
original = "「ジグの能力については俺たちも気を付けておこう。リクリエの使徒の力に加えて、特殊な力があるのは厄介だな」"
translation = "「지그의 능력에 대해서는 우리도 주의해 두자. 리크리에 사도의 힘에 더해 특수한 힘까지 있다면 성가시겠어」"

[[dialogue]]
speaker = "アナ"
original = "「ひとまず伝達する事項は以上です。あとは魔力の充填が終わるまで待機ですが……」"
translation = "「일단 전달할 사항은 이상입니다. 나머지는 마력 충전이 끝날 때까지 대기입니다만……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「あの……みんな、シノ学園長。私、チナちゃんと２人きりで話をしたいんだけど、いいかな？\u3000デネブでわかったことをチナちゃんにも話したいの」"
translation = "「저기…… 여러분, 시노 학원장님. 나, 치나짱이랑 둘이서만 이야기를 하고 싶은데, 괜찮을까? 데네브에서 알게 된 사실을 치나짱에게도 말해주고 싶어」"

[[dialogue]]
speaker = "unk"
original = "ベアトリスの意図は理解できる。"
translation = "베아트리스의 의도는 이해할 수 있다."

[[dialogue]]
speaker = "unk"
original = "しかし彼女は今、複雑な立場にあった。"
translation = "하지만 그녀는 지금 복잡한 입장에 처해 있었다."

[[dialogue]]
speaker = "ベアトリス"
original = "「私は両方の世界を救いたいと思ってるけど、チナちゃんは今も大事な仲間だよ」"
translation = "「나는 양쪽 세계를 모두 구하고 싶다고 생각하지만, 치나짱은 지금도 소중한 동료야」"

[[dialogue]]
speaker = "ベアトリス"
original = "「でもチナちゃんを勝手に逃がしたりしない。約束する」"
translation = "「하지만 치나짱을 마음대로 도망치게 하거나 하지는 않아. 약속할게」"

[[dialogue]]
speaker = "シノ"
original = "「ベアトリスさんと接触することで、チナさんの態度が軟化する可能性は十分考えられます」"
translation = "「베아트리스 씨와 접촉함으로써 치나 씨의 태도가 연화될 가능성은 충분히 생각할 수 있습니다」"

[[dialogue]]
speaker = "梨緒"
original = "「私はベアトを信じる。極星の副会長であろうと、ベアトは私たちの仲間だ」"
translation = "「나는 베아토를 믿는다. 극성의 부회장일지라도 베아토는 우리의 동료다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そうよ。でなければ一緒にアルタイルに戻ってきたりしないんだから」"
translation = "「그래요. 그렇지 않다면 같이 알타이르로 돌아오거나 하지 않았을 테니까요」"

[[dialogue]]
speaker = "アナ"
original = "「私たち新星星徒会は、会長に判断を委ねます」"
translation = "「저희 신성 성도회는 회장님의 판단에 맡기겠습니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「新星学園のことですし、私が口を挟むことはありません。もちろんベアトリスさんを信じていますけど」"
translation = "「신성학원의 일이니 제가 참견할 일은 아니네요. 물론 베아트리스 씨를 믿고 있지만요」"

[[dialogue]]
speaker = "シノ"
original = "「あとは私と会長さんが許可を出せば問題ないと思いますが……」"
translation = "「나머지는 저와 회장님이 허가를 내리면 문제없다고 생각합니다만……」"

[[dialogue]]
speaker = "クロト"
original = "「新星学園の星徒会長として許可します。俺もベアトリスを信じていますから」"
translation = "「신성학원의 성도회장으로서 허가합니다. 저도 베아트리스를 믿고 있으니까요」"

[[dialogue]]
speaker = "シノ"
original = "「……であればＯＫですね。星徒会長であるあなたがそこまで言うのなら、私から言うことはありません」"
translation = "「……그렇다면 OK군요. 성도회장인 당신이 그렇게까지 말한다면 제가 더 할 말은 없습니다」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ありがとうございます！」"
translation = "「감사합니다!」"

[[dialogue]]
speaker = "ナターシャ"
original = "「だけど１人で大丈夫？\u3000デネブに行った時、梨緒とはこじれたよね？」"
translation = "「하지만 혼자서 괜찮겠어? 데네브에 갔을 때 리오랑은 사이가 틀어졌었지?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「う……それを言われると痛い……」"
translation = "「으…… 그 말을 들으니 찔리네……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「でも、ちゃんと話すよ。拒絶されるかもしれないけど、今度は逃げないから」"
translation = "「하지만 제대로 이야기할게. 거절당할지도 모르지만, 이번에는 도망치지 않을 거니까」"

[[dialogue]]
speaker = "梨緒"
original = "「ああ、任せたぞ、ベアト。君ならきっと大丈夫だ」"
translation = "「아아, 맡기마, 베아토. 너라면 분명 괜찮을 거다」"

[[dialogue]]
speaker = "アポロ"
original = "「ま、うっかりには気を付けろよ。デネブで何があったか後で聞かせてもらうからな」"
translation = "「뭐, 방심은 하지 말라구. 데네브에서 무슨 일이 있었는지 나중에 들려줘야 하니까 말이야」"

[[dialogue]]
speaker = "ベアトリス"
original = "「うん、ありがとう。それじゃあ行ってくるね！」"
translation = "「응, 고마워. 그럼 다녀올게!」"

