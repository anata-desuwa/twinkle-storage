[[dialogue]]
speaker = "unk"
original = "第１２話,終曲,B"
translation = "제12화, 종곡, B"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──はああああああああっっっっ！！」"
translation = "「──하아아아아아아아앗!」"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「グ──ガッ──ヌッ、ゥゥゥゥゥ──！？」"
translation = "「크── 칵── 윽, 으으으으으──!?」"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「ナゼダ──ナゼ抗エル──私ハ……私ハ三千年モ、コノ時ヲ夢見テキタトイウノニィィッ！？」"
translation = "「왜냐── 왜 저항할 수 있는 것이냐── 나는…… 나는 삼천 년이나, 이 순간을 꿈꿔왔단 말이다아아앗!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あいにくだな──俺にもずいぶん昔から続く、執念ってやつが宿ってるんだよッ！！」"
translation = "「안됐지만── 나에게도 아주 오래전부터 이어져 온, 집념이라는 것이 깃들어 있거든!」"

[[dialogue]]
speaker = "unk"
original = "合縁奇縁。俺の誕生や成長は周りの環境に助けられっぱなしだった。"
translation = "합연기연. 나의 탄생과 성장은 주변 환경의 도움을 받기만 했다."

[[dialogue]]
speaker = "unk"
original = "でもそれでいい。俺のやり方はシンプルだ。"
translation = "하지만 그걸로 됐다. 나의 방식은 심플하다."

[[dialogue]]
speaker = "unk"
original = "生まれだろうと、バイトの経験だろうと、過去だろうと未来だろうと平行世界だろうと──使えるものはなんでも使う。"
translation = "태생이든, 알바 경험이든, 과거든 미래든 평행 세계든── 쓸 수 있는 것은 뭐든지 쓴다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（力を貸してくれ──ラクシス──トリュファイナ──そして、<ruby>Ｓ<rt>シン</rt></ruby>。あなた達が紡いだ現在という未来の先を、俺が掴む！）"
translation = "（힘을 빌려줘── 락시스── 트뤼파이나── 그리고, <ruby>S<rt>신</rt></ruby>. 당신들이 엮어낸 현재라는 미래의 끝을, 내가 잡는다!）"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──おおおおおおおおっっ！」"
translation = "「──오오오오오오오오옷!」"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「ヌ──ガアアアアアアァァァァァァァ────ッッッッ！！？？」"
translation = "「느── 그아아아아아아아아아아────앗!!!」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「覇霊玉がっ──！」"
translation = "「패령옥이──!」"

[[dialogue]]
speaker = "unk"
original = "激しい攻防の果て──ついに、ギエルの胸元から覇霊玉が飛び出した。"
translation = "격렬한 공방 끝에── 마침내, 기엘의 가슴팍에서 패령옥이 튀어나왔다."

[[dialogue]]
speaker = "unk"
original = "その刹那の機を──俺の拳は見逃さない！"
translation = "그 찰나의 기회를── 나의 주먹은 놓치지 않는다!"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ディマイズ──ブレイカー────ッ！！！」"
translation = "「디마이즈── 브레이커────앗!!!」"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「グ──ガ……ハ、ァッ……アリエ、ヌ──アリエヌ、ゾ……コンナ、終末ゥゥゥゥゥゥ」"
translation = "「크── 가…… 하, 앗…… 말도 안, 돼── 말도 안, 된다고…… 이런, 종말은으으으으으으」"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「マタモ……届カナカッタト、イウノカ……魔王ォォォォォォォォ────ッッ…………！！！」"
translation = "「또다시…… 닿지 않았다고, 말하는 것이냐…… 마왕오오오오오오오오────앗…………!!!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「しゃあっ──！」"
translation = "「샤앗──!」"

[[dialogue]]
speaker = "unk"
original = "活動の<ruby>核<rt>コア</rt></ruby>だった覇霊玉を打ち砕かれたギエルは──"
translation = "활동의 핵이었던 패령옥을 부숴버린 기엘은──"

[[dialogue]]
speaker = "unk"
original = "魔神形態の解除と同時に、断末魔を上げて墜落していった。"
translation = "마신 형태의 해제와 동시에, 단말마를 지르며 추락해 갔다."

[[dialogue]]
speaker_original = "フィオナ（魔王覚醒）"
speaker_translation = "피오나(마왕 각성)"
original = "「──姉さん！」"
translation = "「──언니!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「──ああ！」"
translation = "「──아아!」"

[[dialogue]]
speaker = "unk"
original = "そんなギエル──いや、希崎レイトの体を即座に回収する星見姉妹。"
translation = "그런 기엘── 아니, 키자키 레이토의 몸을 즉시 회수하는 호시미 자매."

[[dialogue]]
speaker = "unk"
original = "仮面は砕けた。"
translation = "가면은 부서졌다."

[[dialogue]]
speaker = "unk"
original = "覇霊玉も散った。"
translation = "패령옥도 흩어졌다."

[[dialogue]]
speaker = "unk"
original = "<ruby>蝟集<rt>いしゅう</rt></ruby>していた脅威が今、晴れるように霧散していく──"
translation = "모여들어 있던 위협이 지금, 걷히듯이 흩어져 간다──"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「よ──ようやく終わったニャン……！」"
translation = "「겨── 겨우 끝났다냥……!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「待ってください。安心するのはまだ早いです──<b>あれ</b>が残っています！」"
translation = "「기다려 주세요. 안심하기에는 아직 이릅니다── <b>저것</b>이 남아 있습니다!」"

[[dialogue]]
speaker = "unk"
original = "アナが指さしたのは破片にまとわりつく濃紫の瘴気だった。"
translation = "아나가 가리킨 것은 파편에 달라붙는 짙은 보랏빛 장기였다."

[[dialogue]]
speaker = "unk"
original = "覇霊玉から解き放たれたリクリエの瘴気が、一帯をさまよって回遊する──！"
translation = "패령옥에서 해방된 리크리에의 장기가, 일대를 헤매며 회유한다──!"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「まずいわ。また次の宿主を探すつもりよ──！」"
translation = "「큰일이야. 또 다음 숙주를 찾을 생각이야──!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「アポロちゃん、執事ちゃんに続いて──？\u3000不死身すぎるっしょ──！」"
translation = "「아폴로짱, 집사짱에 이어서──? 불사신이잖아──!」"

[[dialogue]]
speaker = "unk"
original = "宿主がやられようとリクリエは不滅。"
translation = "숙주가 당해도 리크리에는 불멸."

[[dialogue]]
speaker = "unk"
original = "しかし──"
translation = "하지만──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いいや……計算通りだよ、母さん」"
translation = "「아니…… 계산대로야, 엄마」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「リクリエ──行く宛がないっていうんなら、この<b>俺</b>が受け入れてやる！」"
translation = "「리크리에── 갈 곳이 없다고 한다면, 이 <b>내</b>가 받아들여주마!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「！？」"
translation = "「!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「会長──！？」"
translation = "「회장──!?」"

[[dialogue]]
speaker = "unk"
original = "──飛翔、旋回。"
translation = "──비상, 선회."

[[dialogue]]
speaker = "unk"
original = "俺は自ら──瘴気の発生源へと突っ込んでいく！"
translation = "나는 스스로── 장기의 발생원으로 돌진해 간다!"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「無茶よ、会長くん──！」"
translation = "「무리예요, 회장군──!」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「ニャにしてるニャ──！？\u3000おミャーまで使徒にニャってしまうニャンよ──！」"
translation = "「뭐하는 거냥──!? 너까지 사도가 되어버릴 거냥!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いいや──そうはさせない──取り込まれるのは俺じゃない。おまえのほうだ、リ・クリエイション！」"
translation = "「아니── 그렇게는 안 돼── 집어삼켜지는 건 내가 아니야. 네 쪽이다, 리크리에이션!」"

[[dialogue]]
speaker = "unk"
original = "怨念のごとき濃紫の瘴気が、俺という垂涎の器を求めて渦を巻く！"
translation = "원념과 같은 짙은 보랏빛 장기가, 나라는 군침 도는 그릇을 찾아 소용돌이친다!"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「まさか──地上で言ってた、最悪のプランって──」"
translation = "「설마── 지상에서 말했던, 최악의 플랜이라는 게──」"

[[dialogue]]
speaker_original = "フィオナ（魔王覚醒）"
speaker_translation = "피오나(마왕 각성)"
original = "「ええ──私たち魔王にしかできない、真の最終手段──」"
translation = "「네── 우리 마왕만이 할 수 있는, 진정한 최종 수단──」"

[[dialogue]]
speaker_original = "フィオナ（魔王覚醒）"
speaker_translation = "피오나(마왕 각성)"
original = "「<b>リクリエをその身に宿す</b>こと」"
translation = "「<ruby>리크리에를 그 몸에 품는 것<rt>・・・・・ ・ ・・ ・・ ・</rt></ruby>」"

[[dialogue]]
speaker = "unk"
original = "フィオナは悔しそうに歯噛みしていた。本来なら、自分がやるつもりだったのだろう。"
translation = "피오나는 분한 듯 이를 갈고 있었다. 본래라면, 자신이 할 생각이었을 것이다."

[[dialogue]]
speaker = "unk"
original = "だけど悪いな──こんな大一番の役回り、俺は誰にも譲る気はない！"
translation = "하지만 미안하다── 이런 중요한 역할, 나는 누구에게도 양보할 생각은 없어!"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「グレート・ウォール計画を受け入れるわけにはいかなかった。だけど、リクリエを食い止める防波堤は、確かに必要なものだった」"
translation = "「그레이트 월 계획을 받아들일 수는 없었다. 하지만, 리크리에를 막아낼 방파제는, 확실히 필요한 것이었다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だったら……俺が俺でもって封印してやる──！」"
translation = "「그렇다면…… 내가 나로서 봉인해주마──!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ッ……！\u3000待て──『影』も一緒になんて無茶だ！\u3000あたしの仮面とはわけが違うぞ！」"
translation = "「윽……! 기다려── 『그림자』까지 함께라니 무리야! 내 가면과는 사정이 다르다고!」"

[[dialogue]]
speaker = "unk"
original = "俺自身が『<ruby>筐<rt>はこ</rt></ruby>』になる。"
translation = "나 자신이 『상자』가 된다."

[[dialogue]]
speaker = "unk"
original = "使徒化の恐れも拭い去れない。でも、誰かが何かに封じなくちゃいけないのなら──"
translation = "사도화의 우려도 씻어낼 수 없다. 하지만, 누군가가 무언가에 봉인해야 한다면──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「魔王ってやつは──すべてを飲み込む器なんだ。それがたとえ、どんな強大で絶望的な力だろうと！」"
translation = "「마왕이라는 녀석은── 모든 것을 집어삼키는 그릇이다. 그것이 설령, 아무리 강대하고 절망적인 힘일지라도!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「さあ来いリクリエ……拒む理由はないはずだ！\u3000お互いに──！」"
translation = "「자, 와라 리크리에…… 거부할 이유는 없을 것이다! 서로에게──!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「緋宮くん……そんな……！」"
translation = "「히노미야 군…… 그런……!」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "（クロト……！\u3000あなたは──グレート・ウォール計画を否定した時点で……その覚悟を決めていたっていうの……！？）"
translation = "（쿠로토……! 당신은── 그레이트 월 계획을 부정했을 시점에서…… 그 각오를 다지고 있었다는 거야……!?）"

[[dialogue]]
speaker = "unk"
original = "──壊セ。壊セ。壊セ。壊セ。壊セ。壊セ。壊セ。壊セ。"
translation = "──부숴라. 부숴라. 부숴라. 부숴라. 부숴라. 부숴라. 부숴라. 부숴라."

[[dialogue]]
speaker = "unk"
original = "──創レ。創レ。創レ。創レ。創レ。創レ。創レ。創レ。"
translation = "──창조해라. 창조해라. 창조해라. 창조해라. 창조해라. 창조해라. 창조해라. 창조해라."

[[dialogue]]
speaker = "unk"
original = "壊セ創レ壊セ創レ壊セ創レ壊セ壊セ創レ創レ創レ壊セ壊セ壊セ壊セ壊セ壊セ壊セ壊セ──────"
translation = "부숴라 창조해라 부숴라 창조해라 부숴라 창조해라 부숴라 부숴라 창조해라 창조해라 창조해라 부숴라 부숴라 부숴라 부숴라 부숴라 부숴라 부숴라 부숴라──────"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くっ──オオオオオオオオオオォォォォォォ────！！！」"
translation = "「크읏── 오오오오오오오오오오오오오오────!!!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロト────ッッ！！」"
translation = "「쿠로토────옷!!」"

[[dialogue]]
speaker = "unk"
original = "自我を塗り潰すほどの爆発的な破壊衝動！"
translation = "자아를 덧칠할 정도의 폭발적인 파괴 충동!"

[[dialogue]]
speaker = "unk"
original = "凄絶な理と理のせめぎ合いが、俺を<ruby>核<rt>コア</rt></ruby>にして巻き起こる──！"
translation = "처절한 이치와 이치의 다툼이, 나를 핵으로 삼아 휘몰아친다──!"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（耐えろ──己を保て──屈してなるものか──俺は、俺は使徒になんてならない──！）"
translation = "（버텨라── 자아를 유지해라── 굴복할쏘냐── 나는, 나는 사도 따위가 되지 않아──!）"

[[dialogue]]
speaker = "unk"
original = "だって……"
translation = "왜냐하면……"

[[dialogue]]
speaker = "unk"
original = "だって俺は……"
translation = "왜냐하면 나는……"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「緋宮クロト──あなたは魔王となって、この世界を救うのよ！」"
translation = "「히노미야 쿠로토── 당신은 마왕이 되어, 이 세계를 구할 거예요!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「本当に大事な想いなら……抱え込まないで、仲間に打ち明けてください。私たちだってそれを背負えます」"
translation = "「정말로 소중한 마음이라면…… 혼자 끌어안지 말고, 동료들에게 털어놓아 주세요. 우리도 그것을 짊어질 수 있어요」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──おおおおおおおおおおおっっっっっ！！」"
translation = "「──오오오오오오오오오오옷!!!」"

[[dialogue]]
speaker = "unk"
original = "これまで築いてきた仲間たちとの絆が、俺を奈落の淵から呼び戻す。"
translation = "지금까지 쌓아 올린 동료들과의 유대가, 나를 나락의 벼랑에서 불러낸다."

[[dialogue]]
speaker = "unk"
original = "俺は──俺は魔王でも、ラクシスでもない！"
translation = "「나는── 나는 마왕도, 라크시스도 아니다!」"

[[dialogue]]
speaker = "unk"
original = "この流星市国で、緋宮リノに育てられた──"
translation = "이 유성 시국에서, 히노미야 리노에게 길러진──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺は──俺は、緋宮クロトだ！\u3000俺に従え、リクリエ────！！」"
translation = "「나는── 나는, 히노미야 쿠로토다! 나를 따르라, 리크리에────!!」"

[[dialogue]]
speaker = "unk"
original = "そして──俺はすべての瘴気を身に取り込んだ。"
translation = "그리고── 나는 모든 <ruby>장기<rt>瘴気</rt></ruby>를 몸에 받아들였다."

[[dialogue]]
speaker = "unk"
original = "せめぎ合う怒涛の果て、俺の意識が途切れたのも、また同時だった……。"
translation = "다투는 성난 파도의 끝, 나의 의식이 끊어진 것도, 또한 동시에 일어났다……."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「会長くんが墜ちてくるわ──！」"
translation = "「회장군이 떨어지고 있어──!」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「キャ、キャッチするニャンよ！」"
translation = "「캐, 캐치하는 냥이야!」"

[[dialogue]]
speaker = "unk"
original = "意識を失い、落下するクロトの体を受け止める一同。"
translation = "의식을 잃고, 낙하하는 쿠로토의 몸을 받아내는 일동."

[[dialogue]]
speaker = "unk"
original = "突然の出来事に面々は呆然として、辺りはしん……と静まり返る。"
translation = "갑작스러운 일에 모두들 망연자실하고, 주변은 쥐죽은 듯이 조용해진다."

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「お、おい……大丈夫か……？」"
translation = "「어, 어이…… 괜찮은 거냐……?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「リクリエを自ら封じ込める、なんて……」"
translation = "「리크리에를 스스로 봉인하다니, 라니……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「む、無茶すぎますっ……！」"
translation = "「무, 너무 무모합니다……!」"

[[dialogue]]
speaker = "unk"
original = "ネビュラという組織が、長久の歳月をかけて下した苦渋の決断が『人間界への封印』だった。"
translation = "네뷸라라는 조직이, 오랜 세월에 걸쳐 내린 고심 끝의 결단이 『인간계로의 봉인』이었다."

[[dialogue]]
speaker = "unk"
original = "それほどの脅威を──元はただの人間にすぎない一個人が抑え込もうという、あまりに破天荒な荒業。"
translation = "그 정도의 위협을── 원래는 그저 인간에 불과한 한 개인이 억누르려 하다니, 너무나도 파천황적인 묘책."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロト──っ……！\u3000お願い、返事して──！」"
translation = "「쿠로토──읏……! 부탁이야, 대답해 줘──!」"

[[dialogue]]
speaker_original = "フィオナ（魔王覚醒）"
speaker_translation = "피오나(마왕 각성)"
original = "「緋宮会長──しっかりっ……！」"
translation = "「히노미야 회장── 정신 차리세요……!」"

[[dialogue]]
speaker = "unk"
original = "果たして彼は無事なのか──"
translation = "과연 그는 무사한 것일까──"

[[dialogue]]
speaker = "unk"
original = "一斉に駆け寄った先で、仰向けになったクロトは……"
translation = "일제히 달려간 곳에서, 하늘을 보고 누워 있는 쿠로토는……"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「────すぅ……すぅ……ふぁ……ん……すぅ…………」"
translation = "「────스읍…… 스읍…… 후아…… 음…… 스읍…………」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あ……はは……」"
translation = "「아…… 하하……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「気絶……みたいですね」"
translation = "「기절…… 같네요」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「もう……この子ったら」"
translation = "「정말…… 이 아이는」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「いつもの寝顔だわ。みんな、安心していいみたいよ」"
translation = "「평소의 잠든 얼굴이네. 다들, 안심해도 될 것 같아」"

[[dialogue]]
speaker_original = "みんな"
speaker_translation = "모두"
original = "「──ほっ……」"
translation = "「──휴우……」"

[[dialogue]]
speaker = "unk"
original = "過ぎ去った嵐を夢にも思わせないような、穏やかな寝息。"
translation = "지나간 폭풍을 꿈에도 생각지 못하게 할 듯한, 온화한 잠꼬대."

[[dialogue]]
speaker = "unk"
original = "こうして──森羅暦史上二度目となる『リクリエ』防衛の危機は、無事に過ぎ去るのだった……。"
translation = "이렇게── 신라력 사상 두 번째가 되는 『리크리에』 방위의 위기는, 무사히 지나가는 것이었다……."

