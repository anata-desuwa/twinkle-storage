[[dialogue]]
speaker = "unk"
original = "公安委員会の作戦に協力し、リゾート結界に出入りするようになってから１週間が経った。"
translation = "공안위원회의 작전에 협력하며 리조트 결계에 출입하게 된 지 1주일이 지났다."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ふぅ……♪」"
translation = "「후우……♪」"

[[dialogue]]
speaker = "unk"
original = "海で泳いでいたリノが上がり、ビーチを歩いていると、水の滴る美しい容姿とスタイルで、大胆な水着を堂々と着るその姿が周囲の視線を惹きつける。"
translation = "바다에서 수영하던 리노가 올라와 비치를 걷고 있자니, 물기가 떨어지는 아름다운 용모와 몸매로 대담한 수영복을 당당하게 입은 그 모습이 주변의 시선을 끌어당긴다."

[[dialogue]]
speaker = "unk"
original = "そんな彼女を若い男たちが放っておくわけもなく――"
translation = "그런 그녀를 젊은 남자들이 가만히 놔둘 리 없었고──"

[[dialogue]]
speaker_original = "チャラ男Ａ"
speaker_translation = "날라리 A"
original = "「ねぇねぇ、お姉さ～ん」"
translation = "「저기 저기, 누나~」"

[[dialogue]]
speaker_original = "チャラ男Ｂ"
speaker_translation = "날라리 B"
original = "「俺らと一緒に遊ばな～い？」"
translation = "「우리랑 같이 놀지 않을래~?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「あら、私に声を掛けてくれるの？\u3000ふふっ♪」"
translation = "「어머, 나한테 말을 걸어주는 거니? 후후♪」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「でも、ごめんなさい。私には、世界一可愛い息子がいるから」"
translation = "「하지만 미안해. 나에게는 세계에서 제일 귀여운 아들이 있어서.」"

[[dialogue]]
speaker_original = "チャラ男Ａ"
speaker_translation = "날라리 A"
original = "「え！？\u3000息子！？」"
translation = "「에!? 아들!?」"

[[dialogue]]
speaker = "unk"
original = "母さん、お待たせ"
translation = "엄마, 오래 기다렸지."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「あっ、お茶持って来てくれて、ありがと～♪」"
translation = "「앗, 차 가져다줘서 고마워~♪」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「というわけでお兄さんたち、ごめんなさいね～。それじゃあクロト、行きましょ♪」"
translation = "「그렇게 됐으니까 오빠들, 미안해요~. 자 그럼 쿠로토, 가자♪」"

[[dialogue]]
speaker = "unk"
original = "リノはわざとらしくクロトの腕に抱き着き、にこやかに手を振りながら、その場を去って行く。"
translation = "리노는 보란 듯이 쿠로토의 팔에 매달려 생긋 웃으며 손을 흔들고는 그 자리를 떠나간다."

[[dialogue]]
speaker_original = "チャラ男Ｂ"
speaker_translation = "날라리 B"
original = "「い、今のお姉さん、マジで母親なの……？」"
translation = "「지, 지금 저 누나, 진짜로 엄마인 거야……?」"

[[dialogue]]
speaker_original = "チャラ男Ａ"
speaker_translation = "날라리 A"
original = "「若過ぎんだろ……」"
translation = "「너무 젊잖아……」"

[[dialogue]]
speaker_original = "チャラ男Ｂ"
speaker_translation = "날라리 B"
original = "「というか美人過ぎて、息子になりたい……」"
translation = "「그보다 너무 미인이라서 아들이 되고 싶다……」"

[[dialogue]]
speaker = "unk"
original = "ナンパしに来たお兄さん方を撃退し、彼らが見えなくなるまで母さんと腕を組んだまま歩いていると――"
translation = "헌팅하러 온 오빠들을 격퇴하고 그들이 보이지 않을 때까지 엄마와 팔짱을 낀 채 걷고 있자니──"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ねぇ、クロト。今日って、リコとマインちゃんが少し遅れて来るって連絡あったじゃない？」"
translation = "「저기, 쿠로토. 오늘은 리코랑 마인짱이 조금 늦게 온다고 연락 왔었잖아?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「それでなんだけど、せっかく親子一緒に遊べる機会なんだし、たまにはお母さんのことも構って欲しいわ♪」"
translation = "「그래서 말인데, 모처럼 모자가 함께 놀 수 있는 기회니까 가끔은 엄마도 신경 써줬으면 해♪」"

[[dialogue]]
speaker = "unk"
original = "確かに、新星学園に通うようになってから、星徒会の業務があり、他の人たちとの関わりも増えて、母さんと過ごす時間が減ってしまっていたことは否めない。"
translation = "확실히 신성학원에 다니게 된 이후로 성도회 업무가 있고 다른 사람들과의 교류도 늘어나 엄마와 보내는 시간이 줄어들었다는 점은 부정할 수 없다."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「あっ、別に責めているわけじゃないのよ？\u3000クロトが星徒会長として頑張っていることは知っているし、周りから頼られているのは、お母さんとして誇らしいわ」"
translation = "「앗, 딱히 탓하는 건 아니란다? 쿠로토가 성도회장으로서 열심히 하는 건 알고 있고, 주변에서 의지하는 건 엄마로서 자랑스러워.」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ただ、クロトが忙しくしている分、ちょっぴり寂しさもあって」"
translation = "「다만 쿠로토가 바쁘게 지내는 만큼, 아주 조금 외로움도 있어서.」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「だから、たまにはお母さんとも遊んで欲しいな～って。ダメ？」"
translation = "「그러니까 가끔은 엄마랑도 놀아줬으면 좋겠달까. 안 돼?」"

[[dialogue]]
speaker = "unk"
original = "もちろんいいよ"
translation = "당연히 괜찮지."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ふふっ、ありがとう♪\u3000じゃあ、ちょっとお母さんと、そこまでデートしましょうか♪」"
translation = "「후훗, 고마워♪ 그럼 잠깐 엄마랑 저기까지 데이트할까♪」"

[[dialogue]]
speaker = "unk"
original = "そうして母さんに連れられて行った場所は、リゾート結界の奥にある森林エリアだった。"
translation = "그렇게 엄마에게 이끌려 간 곳은 리조트 결계 깊숙한 곳에 있는 삼림 구역이었다."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「見て見て、クロト。ここに生えてる果物の木」"
translation = "「봐봐, 쿠로토. 여기에 자라는 과일나무.」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「実はリップルちゃんに協力してもらって、常夏の気候だからこそできる果物を作らせてもらっているのよ♪」"
translation = "「사실 리플짱에게 협력받아서, 늘 여름인 기후이기에 가능한 과일을 만들고 있단다♪」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「リップルちゃんの能力を使えば、あっという間に成長させることもできるしね。おかげで品種改良が捗って、楽しくて楽しくて……ふふふ♪」"
translation = "「리플짱의 능력을 사용하면 순식간에 성장시킬 수도 있거든. 덕분에 품종 개량이 순조로워서 즐겁고 즐거워서…… 후후후♪」"

[[dialogue]]
speaker = "unk"
original = "母さんは趣味の１つは『家庭菜園』で、家のベランダでも野菜を育てたりしている。"
translation = "엄마의 취미 중 하나는 『가정 원예』로, 집 베란다에서도 채소를 키우곤 한다."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「それでね、こっちがアップルバナナで、こっちがドラゴンフルーツ。あとはパイナップルに、ランブータンね」"
translation = "「그래서 말이지, 이쪽이 애플 바나나고 이쪽이 드래곤 후르츠. 나머지는 파인애플이랑 람부탄이야.」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「これらをクロトに食べさせたかったのよ。アップルバナナとか、ランブータンは食べたことないでしょ？」"
translation = "「이걸 쿠로토에게 먹이고 싶었어. 애플 바나나나 람부탄은 먹어본 적 없지?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ちょっと待っててね。取って来て、準備するから」"
translation = "「잠깐만 기다려. 따 와서 준비할 테니까.」"

[[dialogue]]
speaker = "unk"
original = "それから果物を収穫して来た母さんは、空間魔法で器用に皮を取って――"
translation = "그러고는 과일을 수확해 온 엄마는 공간 마법으로 능숙하게 껍질을 벗겨서──"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「はい、それじゃあクロト、あ～ん♪」"
translation = "「자, 그럼 쿠로토, 아~해♪」"

[[dialogue]]
speaker = "unk"
original = "指で口まで運んで、食べさせてくれる。"
translation = "손가락으로 입까지 날라 먹여준다."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「どう？\u3000お母さんの作った果物、美味しい？」"
translation = "「어때? 엄마가 만든 과일, 맛있니?」"

[[dialogue]]
speaker = "unk"
original = "甘くて、うまいっ！"
translation = "달고, 맛있어!"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ふふふっ、嬉しい♪\u3000甘いだけじゃなくて、ちゃんと栄養価も満点なのよ～？」"
translation = "「후후후, 기뻐♪ 달기만 한 게 아니라 제대로 영양가도 만점이란다~?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「もっと食べる？\u3000はい、あ～ん♪」"
translation = "「더 먹을래? 자, 아~♪」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「――あっ、頬っぺたにドラゴンフルーツの種が付いているわよ？」"
translation = "「──앗, 뺨에 드래곤 후르츠 씨앗이 붙어 있네?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ほら、取れた♪」"
translation = "「자, 뗐다♪」"

[[dialogue]]
speaker = "unk"
original = "母さんはそれを自分の口に運んで――"
translation = "엄마는 그것을 자기 입으로 가져가서──"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「あむっ♪\u3000ふふふ、甘～い♪」"
translation = "「아무♪ 후후후, 달콤해~♪」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「わお<emoji=heart04>\u3000リノさんってば、だいた～ん☆\u3000まるで恋人みた～い♪」"
translation = "「와오<emoji=heart04> 리노 씨도 참 대~담해☆ 마치 연인 같아~♪」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「果物よりも甘々だな。これは……」"
translation = "「과일보다 달달하군, 이건……」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「２人とも、やっと出て来たわね。木の影に隠れて見てないで、さっさと声を掛けてくれればよかったのに～」"
translation = "「두 사람 다, 드디어 나왔네. 나무 그늘에 숨어서 보지 말고 진작 말을 걸어줬으면 좋았을 텐데~」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「気づいていたなら、少しは自重しろ」"
translation = "「눈치채고 있었다면 조금은 자중해라.」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「あら、どうして？\u3000親子ならこれくらい愛情表現したって、別に恥ずかしくはないでしょ？」"
translation = "「어머, 왜? 모자 사이라면 이 정도 애정 표현 해도 딱히 부끄럽지는 않잖아?」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「前から知っていたが、お前の親子感はおかしい」"
translation = "「전부터 알고 있었지만, 너의 모자 관계 관념은 이상해.」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「そう？」"
translation = "「그래?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「きゃはははっ♪\u3000親子であ～んは、なかなかしないですよね～☆」"
translation = "「캬하하하♪ 모자끼리 아~ 하는 건 좀처럼 안 하죠~☆」"

[[dialogue]]
speaker = "unk"
original = "ええぇっ！？\u3000そうなの？"
translation = "에에엣!? 그런 거야?"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「少年、リノにだいぶ毒されているな……」"
translation = "「소년, 리노에게 꽤 독기가 올랐군……」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「リノさんの見た目がすごく若くて美人なので、周りに見られたら、絶対カップルだと勘違いされちゃいますよね～」"
translation = "「리노 씨 겉모습이 엄청 젊고 미인이라서 주변 사람들이 보면 무조건 커플이라고 착각하겠어요~」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ふふふっ、息子とまるで恋人みたいだなんて、お母さん、なんだか照れちゃうわ～<emoji=heart04>」"
translation = "「후후후, 아들이랑 마치 연인 같다니, 엄마 왠지 부끄러워져 버리네~<emoji=heart04>」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「なんで嬉しそうなんだ、お前は」"
translation = "「왜 기뻐하는 거냐, 너는.」"

[[dialogue]]
speaker = "unk"
original = "き、気を付けよう……"
translation = "조, 조심해야겠어……"

[[dialogue]]
speaker = "unk"
original = "俺は指摘されてちょっと恥ずかしくなり、頬が熱くなってしまうのだった。"
translation = "나는 지적당하자 조금 부끄러워져 뺨이 뜨거워지고 마는 것이었다."

[[dialogue]]
speaker = "unk"
original = "同時刻。"
translation = "동시간대."

[[dialogue]]
speaker = "unk"
original = "犯罪組織『ユゴス』の渋谷拠点にて。"
translation = "범죄 조직 『유고스』의 시부야 거점에서."

[[dialogue]]
speaker_original = "部下の怪人"
speaker_translation = "부하 괴인"
original = "「――ヤハト様、準備が整いました」"
translation = "「──야하토 님, 준비가 끝났습니다.」"

[[dialogue]]
speaker_original = "部下の怪人"
speaker_translation = "부하 괴인"
original = "「ミュータント総勢<b>１０８体</b>、集結完了です」"
translation = "「뮤턴트 총 <b>108체</b>, 집결 완료입니다.」"

[[dialogue]]
speaker_original = "ヤハト"
speaker_translation = "야하트"
original = "「よし、まもなく時間だ。では――」"
translation = "「좋아, 곧 시간이다. 그럼──」"

[[dialogue]]
speaker_original = "ヤハト"
speaker_translation = "야하트"
original = "「これより、リゾート結界を襲撃する！」"
translation = "「지금부터 리조트 결계를 습격한다!」"

[[dialogue]]
speaker_original = "部下の怪人達"
speaker_translation = "부하 괴인들"
original = "「我らがユゴスの意思のままに！！」"
translation = "「우리 유고스의 의지대로!!」"

[[dialogue]]
speaker_original = "ヤハト"
speaker_translation = "야하트"
original = "「魔力解放――空間転移！」"
translation = "「마력 해방── 공간 전이!」"

[[dialogue]]
speaker = "unk"
original = "ミュータントの軍勢の姿が一瞬で拠点から消え去る。"
translation = "뮤턴트 군세의 모습이 순식간에 거점에서 사라진다."

[[dialogue]]
speaker = "unk"
original = "リゾート結界に『嵐』が訪れようとしていた――"
translation = "리조트 결계에 『폭풍』이 찾아오려 하고 있었다──"

