[[dialogue]]
speaker = "unk"
original = "翌日。"
translation = "다음 날."

[[dialogue]]
speaker = "unk"
original = "朝から妙な違和感を感じながら登校していると――"
translation = "아침부터 묘한 위화감을 느끼며 등교하고 있자니──"

[[dialogue]]
speaker = "unk"
original = "ヒトリがジャクリーヌを連れて、大慌てで駆け込んできた。"
translation = "히토리가 자클린을 데리고 대황급히 달려 들어왔다."

[[dialogue]]
speaker = "ヒトリ"
original = "「会長さん、た、たたたたた、大変なんです……っ！！」"
translation = "「회장님, 크, 크크크크크, 큰일 났어요……!!」"

[[dialogue]]
speaker = "ゆーちゃん"
original = "「ゆー！\u3000ゆー！\u3000ゆー！」"
translation = "「유-! 유-! 유-!」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「トリックオアトリート～♪\u3000会長、ヒトリ、今日もハロウィンに連れてって欲しいの！」"
translation = "「트릭 오어 트릿~♪ 회장, 히토리, 오늘도 할로윈에 데려가 줬으면 하는유!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「じ、ジャクリーヌさん……それどころじゃ……！」"
translation = "「자, 자클린 씨…… 그럴 때가……!」"

[[dialogue]]
speaker = "unk"
original = "ハロウィンは１年に１日しかないんだよ"
translation = "할로윈은 1년에 하루뿐이야"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ゆゆゆ？？？\u3000そうなの？？？」"
translation = "「유유유??? 그런 거냐유???」"

[[dialogue]]
speaker = "ヒトリ"
original = "「か、会長さん……そ、そそそ、それが……っ！」"
translation = "「회, 회장님…… 그, 그그그그, 그게……!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「いいから、落ち着いてって言われても……これを聞いたら会長さんだって落ち着けないですって……！」"
translation = "「아무리 진정하라고 하셔도…… 이걸 들으시면 회장님도 진정 못 하실 거예요……!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「じ、実は……ジャクリーヌさんが言っていることは間違いではなくて……今日もハロウィンになっちゃってるんです！」"
translation = "「사, 사실은…… 자클린 씨가 하는 말이 틀린 게 아니라서…… 오늘도 할로윈이 되어버렸어요!」"

[[dialogue]]
speaker = "ゆーちゃん"
original = "「ゆー！\u3000ゆー！」"
translation = "「유-! 유-!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「ハロウィンの日が、ループしちゃってるんです……！」"
translation = "「할로윈 날이 루프하고 있어요……!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「……う、うぅ……ぐすっ……わたし、どうしていいか分からなくなってしまって……」"
translation = "「……우, 우으…… 흑…… 저, 어떻게 해야 좋을지 모르게 되어서……」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「余には、ヒトリがどうしてそんなに慌ててるのかわかんないの～」"
translation = "「유는 히토리가 왜 그렇게 당황하는지 모르겠는유~」"

[[dialogue]]
speaker = "unk"
original = "そういえば朝から妙な違和感があったんだ"
translation = "그러고 보니 아침부터 묘한 위화감이 있었어"

[[dialogue]]
speaker = "ヒトリ"
original = "「……か、会長さんも？\u3000よかったです……朝から違和感を感じてたのは、自分だけじゃ無かったんですね……」"
translation = "「……회, 회장님도요? 다행이다…… 아침부터 위화감을 느낀 게 저뿐만이 아니었군요……」"

[[dialogue]]
speaker = "ヒトリ"
original = "「何となくなんですけど……朝起きたらちょっと揺れてる？\u3000感じというか、外に出たら嫌な感じがしたというか……す、すみません、うまく言えなくて……」"
translation = "「왠지 모르겠지만…… 아침에 일어나니 조금 흔들리는? 느낌이랄까, 밖에 나갔더니 불쾌한 느낌이 들었달까…… 죄, 죄송해요, 잘 말하지 못해서……」"

[[dialogue]]
speaker = "ヒトリ"
original = "「同じ感覚だった……ですか？\u3000あぁぁ、一緒の人がいて、よかったですぅ……」"
translation = "「같은 감각이었다…… 고요? 아아아, 같이 느끼는 사람이 있어서 다행이에요오……」"

[[dialogue]]
speaker = "ヒトリ"
original = "「こ、この原因はおそらく……ジャクリーヌさんが現れたからだと思ってるんですけど……どうでしょうか？」"
translation = "「이, 이 원인은 아마…… 자클린 씨가 나타났기 때문이라고 생각하는데…… 어떨까요?」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ヒトリ～、そんなことより、またハロウィンパーティーに行くのー！」"
translation = "「히토리~, 그런 것보다 또 할로윈 파티에 가는유-!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「ジャクリーヌさんは、ずっとこんな様子で……ど、どどど、どうしましょう……！」"
translation = "「자클린 씨는 계속 이런 식이고…… 어, 어어어어, 어쩌면 좋죠……!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「お、落ち着いてって言われても……え？\u3000俺に任せろって……わ、わかりました、お願いします……！」"
translation = "「지, 진정하라고 하셔도…… 에? 저에게 맡기라고…… 아, 알겠습니다, 부탁드려요……!」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「？\u3000会長、どうしたんだゆ？\u3000本当にハロウィンは１日だけなの？」"
translation = "「? 회장, 왜 그러는유? 정말 할로윈은 하루뿐인 거냐유?」"

[[dialogue]]
speaker = "unk"
original = "ジャクリーヌ……\nどんなイタズラをしたのか、正直に言うんだ"
translation = "자클린……\\n어떤 장난을 쳤는지 솔직하게 말해봐"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ぎくりっ……ゆ、余は何も知らないゆ！」"
translation = "「히익…… 유, 유는 아무것도 모르는유!」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「『１日がループするなんて大がかりなこと、何の制約もなしにできるわけがない』……？」"
translation = "「『하루가 루프한다니 그렇게 큰일을 아무런 제약 없이 할 수 있을 리가 없다』……?」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ループしてるっていうのは、本当に何を言ってるのかわからないゆ！\u3000余はただ、もう１日ハロウィンの日が続けばいいのに！\u3000って思っただけなの！」"
translation = "「루프하고 있다는 건 정말 무슨 소린지 모르겠유! 유는 그저 하루 더 할로윈 날이 계속되면 좋을 텐데! 하고 생각했을 뿐인유!」"

[[dialogue]]
speaker = "unk"
original = "仕掛けの中身は自分でもわからないのか……？\nでもイタズラ自体は仕掛けただろ？"
translation = "장치의 내용은 자신도 모르는 건가……?\\n하지만 장난 자체는 걸었지?"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「か、かかか、会長が何を言ってるのか、余にはまったくわからないの……」"
translation = "「회, 회회회, 회장이 무슨 소릴 하는 건지 유는 전혀 모르겠는유……」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「わ、わかってくれたゆ……？\u3000余は何も悪いことはしてないの！」"
translation = "「아, 알아준 거냐유……? 유는 아무 나쁜 짓도 안 했유!」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ハロウィンは楽しいパーティーなんだから、みんなだって１日じゃ遊び足りないって思ってるはずだゆ！」"
translation = "「할로윈은 즐거운 파티니까 다른 사람들도 하루로는 부족하다고 생각하고 있을 게 뻔하다유!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「しょ、正直に言って、悪影響があるかはわからないです……」"
translation = "「솔, 솔직히 말해서 악영향이 있을지는 모르겠어요……」"

[[dialogue]]
speaker = "ヒトリ"
original = "「今のところ、そもそもこの事態に気づいているのが、わたしと会長さんだけっていうのもありますし……」"
translation = "「현재로서는 애초에 이 사태를 깨닫고 있는 게 저와 회장님뿐이기도 하고요……」"

[[dialogue]]
speaker = "ヒトリ"
original = "「ただ、わたしのハロウィンフォームの棺桶に溜まっていたハロウィンパワーが、かなりの量減っています」"
translation = "「다만, 제 할로윈 폼 관에 고여있던 할로윈 파워가 꽤 많이 줄어있어요」"

[[dialogue]]
speaker = "ヒトリ"
original = "「あ、ハロウィンパワーが減ることは全然問題ありません。これ自体は人間界に渦巻く『ハロウィンの信仰心』が集まった力なので、多く集まっても、消費しても、害はありません」"
translation = "「아, 할로윈 파워가 줄어드는 건 전혀 문제없어요. 이것 자체는 인간계에 휘몰아치는 『할로윈의 신앙심』이 모인 힘이라, 많이 모여도 소비해도 해는 없거든요」"

[[dialogue]]
speaker = "ヒトリ"
original = "「ジャクリーヌさんの言っていることを信じるなら、パンプキンファントムであるジャクリーヌさんの願いに反応して、ハロウィンの奇跡が起こってしまった、ということでしょうか？」"
translation = "「자클린 씨가 하는 말을 믿는다면, 펌킨 팬텀인 자클린 씨의 소원에 반응해서 할로윈의 기적이 일어나버린 걸까요?」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「よ、よくわからないけど、たぶんヒトリの言う通りなの！」"
translation = "「자, 잘 모르겠지만 아마 히토리가 말한 대로인유!」"

[[dialogue]]
speaker = "unk"
original = "まあ、もう１日ハロウィンを楽しむだけなら\nそこまで悪いことも起きようがない……か？"
translation = "뭐, 하루 더 할로윈을 즐길 뿐이라면\\n그렇게 나쁜 일도 생기지 않으려나……?"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「会長は話がわかるの！\u3000そうと決まれば、今日は別の場所で新しいお菓子をもらいにいくの！」"
translation = "「회장은 말이 통하는유! 그렇게 정해졌으면 오늘은 다른 곳에서 새로운 과자를 받으러 가는유!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「あっ、ジャクリーヌさん、待ってください……！」"
translation = "「앗, 자클린 씨, 기다려 주세요……!」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ヒトリ……？」"
translation = "「히토리……?」"

[[dialogue]]
speaker = "ヒトリ"
original = "「ループの原因について、心当たりがないことは……信じます。ただ、約束してください。自分のためだけのイタズラは、これ以上繰り返さないって」"
translation = "「루프의 원인에 대해 짐작 가는 게 없다는 건…… 믿을게요. 다만 약속해 주세요. 자신만을 위한 장난은 이 이상 반복하지 않겠다고」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「わかったの！\u3000イタズラは今回だけにするゆ！」"
translation = "「알았유! 장난은 이번뿐으로 하겠유!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「はい。それならわたしも……安心です」"
translation = "「네. 그렇다면 저도…… 안심이에요」"

[[dialogue]]
speaker = "ヒトリ"
original = "「せっかくのハロウィン２日目ですから、楽しむことにしましょうか……」"
translation = "「기왕 맞이한 할로윈 이틀째니까, 즐기기로 할까요……」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「そうと決まれば、早速行くのー！」"
translation = "「그렇게 정해졌으면, 당장 가는유!」"

[[dialogue]]
speaker = "unk"
original = "まさかのハロウィンがループしてしまう事態になったものの、その張本人であるジャクリーヌと<b>もう１日だけ</b>という約束で、パーティーを楽しむことにしたのだった。"
translation = "설마 했던 할로윈이 루프해 버리는 사태가 되었지만, 그 장본인인 자클린과 <b>딱</b> <b>하루만</b> <b>더</b>라는 약속을 하고 파티를 즐기기로 한 것이었다."

