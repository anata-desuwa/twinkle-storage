[[dialogue]]
speaker = "unk"
original = "第４話,広がる世界,P"
translation = "제4화, 넓어지는 세계, P"

[[dialogue]]
speaker = "unk"
original = "──リップルの結界に異常が発生した『冬のイタズラ事件』のその後。"
translation = "──리플의 결계에 이상이 발생한 『겨울의 장난 사건』 그 후."

[[dialogue]]
speaker = "unk"
original = "改めてリップルにお願いしてプライベートビーチに招き入れてもらった。"
translation = "다시 한번 리플에게 부탁해 프라이빗 비치로 초대받았다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ほわ……夕方だと、また違った風情がありますね。サンセットビーチ、というやつですか」"
translation = "「호와…… 저녁때가 되니, 또 다른 정취가 있네요. 선셋 비치, 라는 건가요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「夕焼けに染まる海と砂浜──うっとりしてしまうくらい美しいです。ため息が漏れちゃいますね」"
translation = "「노을에 물드는 바다와 백사장── 황홀해질 정도로 아름다워요. 한숨이 절로 나오네요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「私たちの他には──と……あれ？\u3000誰もいませんね。すっかり静かな様子で……」"
translation = "「우리 말고는── 어라? 아무도 없네요. 아주 조용한 모습이라……」"

[[dialogue]]
speaker = "unk"
original = "誰も来ないってさ"
translation = "아무도 안 온대"

[[dialogue]]
speaker = "unk"
original = "今日は２人だけ"
translation = "오늘은 둘뿐이야"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「！\u3000なるほど……私と会長さんだけ、ですか」"
translation = "「! 과연…… 저와 회장님뿐, 인가요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「道理で波の音しか聞こえてこないわけです。これは、ますますロマンチックさが増しましたね……」"
translation = "「어쩐지 파도 소리밖에 들리지 않는다 했어요. 이건, 점점 더 로맨틱함이 더해지네요……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「堂々とイチャイチャできるね──って……そ、そうかもしれませんけど……！」"
translation = "「당당하게 꽁냥거릴 수 있겠네── 앗…… 그, 그럴지도 모르겠지만요……!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「確かにこの前はみんなの前で、気恥ずかしかったりしたものですが……こんな広い場所で２人きりというのも妙な緊張感があります」"
translation = "「확실히 저번에는 모두의 앞에서라 쑥스럽기도 했지만…… 이렇게 넓은 장소에서 둘이서만 있다는 것도 묘한 긴장감이 있네요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ビーチを独り占め？\u3000ふふ……そうですね。今の私たちだけの特権、ですね」"
translation = "「해변을 독차지? 후후…… 그러네요. 지금 우리만의 특권, 이네요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「なら……はい。やはり、これくらいは、近づいてもよさそうでしょうか」"
translation = "「그럼…… 네. 역시, 이 정도는, 가까이 다가가도 괜찮겠죠.」"

[[dialogue]]
speaker = "unk"
original = "もう隙間風はこないよ？"
translation = "이제 틈새바람은 안 와."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「日が暮れてきてますから。気温が下がってコールドになる可能性もありますから。あらかじめ暖を取っておくのです」"
translation = "「해가 저물고 있으니까요. 기온이 내려가서 소 콜드해질 가능성도 있으니까요. 미리미리 온기를 취해두는 거예요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ふふふ……恋人同士なのですから、これくらいの距離でも問題ありませんよね」"
translation = "「후후후…… 연인 사이니까, 이 정도 거리라도 문제없겠죠.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「この広いビーチに私たちだけなんて……なんだかもったいない気もしますが。せっかくの機会ですし、甘えておきましょう」"
translation = "「이 넓은 해변에 우리뿐이라니…… 왠지 아까운 기분도 들지만. 기왕 얻은 기회니까, 어리광 좀 부릴게요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「……撫でていいなんて言ってませんよ」"
translation = "「……쓰다듬어도 좋다고는 안 했거든요.」"

[[dialogue]]
speaker = "unk"
original = "イヤ？"
translation = "싫어?"

[[dialogue]]
speaker = "unk"
original = "ごめん"
translation = "미안"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「まあ、イヤでは、ありませんけど……。子どものように扱われるのは……姉さんじゃあるまいし……」"
translation = "「뭐, 싫은 건, 아니지만요……. 어린애처럼 다뤄지는 건…… 언니도 아니고……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「彼氏が彼女にするのも普通？\u3000確かに、言われてみればそうです。なら──これは彼女撫でということで、セーフにしておきましょう」"
translation = "「남자친구가 여자친구에게 하는 것도 보통이라고요? 확실히, 듣고 보니 그렇네요. 그럼── 이건 여자친구 쓰다듬기인 걸로 해서, 세이프로 해둘게요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ほら、もっと彼女撫でをしてください。えい、えいっ」"
translation = "「자, 좀 더 여자친구 쓰다듬기를 해주세요. 에잇, 에잇.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ふふふ。会長さんの手、大っきくて温かいです。私、こうされていると落ち着くんです」"
translation = "「후후후. 회장님 손, 크고 따뜻해요. 저, 이러고 있으면 마음이 편안해져요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「いつまでもこのままでいたい……なんて、思わされます。これもビーチの夕日がかける魔法、でしょうか」"
translation = "「언제까지나 이대로 있고 싶다…… 같은 생각이 들게 하네요. 이것도 해변의 석양이 거는 마법, 일까요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「しばらくの間……このままでも、いいですか？」"
translation = "「잠시 동안…… 이대로 있어도, 될까요?」"

[[dialogue]]
speaker = "unk"
original = "それから、黄昏時のビーチでゆったりした時間を過ごした……。"
translation = "그러고 나서, 황혼 무렵의 해변에서 느긋한 시간을 보냈다……."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「……いいものですね」"
translation = "「……참 좋네요.」"

[[dialogue]]
speaker = "unk"
original = "リゾートが？"
translation = "리조트가?"

[[dialogue]]
speaker = "unk"
original = "なにが？"
translation = "뭐가?"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「……この時間が。うまくは言えませんが……私たちの周りを流れている空気も、全部」"
translation = "「……이 시간이요. 잘 설명할 수는 없지만…… 우리 주변을 흐르는 공기도, 전부 다.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「この海も……穏やかな気候も……故郷のレゾフからは、とても考えられない光景です。あっちは今も、猛吹雪に見舞われているでしょうから」"
translation = "「이 바다도…… 온화한 기후도…… 고향인 레조프에서는, 도저히 생각할 수 없는 광경이에요. 그쪽은 지금도, 맹렬한 눈보라가 몰아치고 있을 테니까요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「水着なんて、見たこともなかったんですよ？\u3000会長さんからすれば、信じられませんよね」"
translation = "「수영복 같은 건, 본 적도 없었거든요? 회장님 입장에서는, 믿기지 않으시죠.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「どれも──学園に入らなかったら、手に入ることのないものでした。ここまで来て良かったなって、思います」"
translation = "「전부 다── 학원에 들어오지 않았다면, 손에 넣을 수 없는 것들이었어요. 여기까지 오길 잘했다는 생각이 들어요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「最初は……わからないこと尽くしで、星徒会の活動も大変でしたけど。多くのことを乗り越えてこられて良かった」"
translation = "「처음에는…… 모르는 것투성이라, 성도회 활동도 힘들었지만. 많은 것을 극복해 올 수 있어서 다행이에요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「それに──あなたと出会えましたから」"
translation = "「게다가── 당신과 만날 수 있었으니까요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「知らないものに触れて、知らない土地を訪れるたびに──思うんです。まるで、奏ソフィアという自分の世界が広がっていくみたいな感覚だって」"
translation = "「모르는 것을 접하고, 모르는 땅을 방문할 때마다── 생각해요. 마치, 카나데 소피아라는 자신의 세계가 넓어져 가는 것 같은 감각이라고요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「そこに会長さんがいることで、それがもっともーっと広がっていくんです。嘘じゃないですよ」"
translation = "「거기에 회장님이 있음으로써, 그것이 훨씬 더ー욱 넓어져 가는 거예요. 거짓말 아니에요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「……なんて。ちょっと湿っぽくなってしまいましたかね。まだ何も始まってませんのに」"
translation = "「……라니. 조금 감상적이 되어버렸나요. 아직 아무것도 시작되지 않았는데 말이죠.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「だから、これからも──私の隣で同じ時間を過ごしてくださいね。会長さん<emoji=heart04>」"
translation = "「그러니까, 앞으로도── 제 곁에서 같은 시간을 보내주세요. 회장님<emoji=heart04>」"

