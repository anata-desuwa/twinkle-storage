[[dialogue]]
speaker = "unk"
original = "第４話,氷雪都市レゾフ,B"
translation = "제4화, 빙설 도시 레조프, B"

[[dialogue]]
speaker = "unk"
original = "それからしばらく俺たちはＤＩＳＣの案内を元に原野を駆け抜けた。"
translation = "그 후 잠시 우리들은 디스크의 안내를 바탕으로 원야를 가로질렀다."

[[dialogue]]
speaker = "unk"
original = "人っ子一人いない広大な荒野を、ひたすら全速力で飛行し続ける……。"
translation = "사람 그림자 하나 없는 광대한 황야를, 오로지 전속력으로 계속 비행한다……."

[[dialogue]]
speaker = "unk"
original = "冷気は収まるどころかますます強まるばかりで、体力の限界も迎えつつあった、その時。"
translation = "냉기는 잦아들기는커녕 더욱 강해지기만 하여, 체력의 한계도 맞이하고 있던, 그때."

[[dialogue]]
speaker = "unk"
original = "ついに吹雪の向こうに──人工的な光が灯るのを見つけた。"
translation = "마침내 눈보라 너머로── 인공적인 불빛이 켜지는 것을 발견했다."

[[dialogue]]
speaker = "クロト"
original = "「──」"
translation = "「──」"

[[dialogue]]
speaker = "ユウリ"
original = "「うお……」"
translation = "「우와……」"

[[dialogue]]
speaker = "マトイ"
original = "「こ──ここが……」"
translation = "「여── 여기가……」"

[[dialogue]]
speaker = "サーシャ"
original = "「ようこそ──魔界都市レゾフ、私たちの生まれた街へ」"
translation = "「어서 와── 마계 도시 레조프, 우리가 태어난 마을로」"

[[dialogue]]
speaker = "unk"
original = "極寒の荒野を駆け抜けて到達した先は……"
translation = "극한의 황야를 가로질러 도달한 곳은……"

[[dialogue]]
speaker = "unk"
original = "しんしんと氷雪の降り積もる、白銀の大都市だった。"
translation = "소리 없이 빙설이 쌓이는, 백은의 대도시였다."

[[dialogue]]
speaker = "フィオナ"
original = "「これは──ソフィアから話を聞いたことはありましたが……」"
translation = "「이것은── 소피아에게 이야기를 들은 적은 있었습니다만……」"

[[dialogue]]
speaker = "クロト"
original = "「想像以上の景観──だな」"
translation = "「상상 이상의 경관──이군」"

[[dialogue]]
speaker = "マトイ"
original = "「な、なんかいよいよ別世界に来たって感じ……！」"
translation = "「뭐, 뭔가 드디어 다른 세계에 왔다는 느낌……!」"

[[dialogue]]
speaker = "ソフィア"
original = "「こ、この氷点下……！\u3000まさしくレゾフ──うう……帰ってきてしまいました」"
translation = "「이, 이 영하의 온도……! 그야말로 레조프── 으으…… 돌아와 버렸습니다」"

[[dialogue]]
speaker = "ソフィア"
original = "（それにしても、まさか皆さんをレゾフに連れてくることになるなんて……考えもしませんでしたが）"
translation = "（그렇다 해도, 설마 여러분을 레조프에 데려오게 될 줄은…… 생각지도 못했지만요）"

[[dialogue]]
speaker = "ユウリ"
original = "「へぇ。ソフィアがここで育ったっつーと、なんか感慨深いよな」"
translation = "「헤에. 소피아가 여기서 자랐다고 하면, 뭔가 감회가 깊네」"

[[dialogue]]
speaker = "unk"
original = "レゾフにはちらほらと人が行き交っていた。"
translation = "레조프에는 드문드문 사람들이 오가고 있었다."

[[dialogue]]
speaker = "unk"
original = "そのほとんどが毛皮の帽子をかぶって、暖かそうなコートに身を包んでおり、この地の風土を感じさせる。"
translation = "그 대부분이 모피 모자를 쓰고, 따뜻해 보이는 코트를 입고 있어, 이 지역의 풍토를 느끼게 한다."

[[dialogue]]
speaker = "unk"
original = "突き刺すような寒さも人間界ではありえないもので……なんというか空気そのものが<b>違った</b>質なのだと思わされた。"
translation = "찌르는 듯한 추위도 인간계에서는 있을 수 없는 것으로…… 뭐랄까 공기 자체가 <b>다른</b> 질이라고 생각하게 했다."

[[dialogue]]
speaker = "unk"
original = "そこへ……"
translation = "그때……"

[[dialogue]]
speaker = "レゾフの住人"
original = "「あんた達──旅人かい？\u3000見ない風体だね」"
translation = "「너희들── 여행자냐? 못 보던 차림새네」"

[[dialogue]]
speaker = "クロト"
original = "「！\u3000はい。俺たちは人間界から来た──」"
translation = "「! 네. 저희는 인간계에서 온──」"

[[dialogue]]
speaker = "サーシャ"
original = "「あら～こちらは久しぶりの里帰りよ、リタおばさん♪」"
translation = "「어머~ 이쪽은 오랜만의 귀향이야, 리타 아줌마♪」"

[[dialogue]]
speaker = "レゾフの住人"
original = "「ん……？\u3000おお！\u3000あんたはサーシャ──レイル区のサーシャじゃないかい！」"
translation = "「응……? 오! 너는 사샤── 레일 구역의 사샤가 아니냐!」"

[[dialogue]]
speaker = "レゾフの住人"
original = "「ということはこっちはもしや……ソフィア！\u3000やっぱりソフィアだね！？」"
translation = "「그렇다면 이쪽은 혹시…… 소피아! 역시 소피아구나!?」"

[[dialogue]]
speaker = "ソフィア"
original = "「あはは……お久しぶりです。急用で、一時的に帰ってきました」"
translation = "「아하하…… 오랜만입니다. 급한 일로, 일시적으로 돌아왔습니다」"

[[dialogue]]
speaker = "クロト"
original = "（はは……）"
translation = "（하하……）"

[[dialogue]]
speaker = "ユウリ"
original = "（なんつーか……こそばゆい感じだな。こーゆーの）"
translation = "（뭐랄까…… 간지러운 느낌이네. 이런 거）"

[[dialogue]]
speaker = "フィオナ"
original = "（ソフィアのあんな表情は初めて見ます。やはり<ruby>故郷<rt>ふるさと</rt></ruby>というのは、特別なものなのでしょう）"
translation = "（소피아의 저런 표정은 처음 봅니다. 역시 고향이라는 것은, 특별한 것이겠지요）"

[[dialogue]]
speaker = "unk"
original = "サーシャ先輩とソフィアちゃんは、そのまましばらく女性と話し込んで……"
translation = "사샤 선배와 소피아짱은, 그대로 잠시 여성과 이야기를 나누고……"

[[dialogue]]
speaker = "unk"
original = "俺たちのことについても、それとなく説明をしてくれたようだった。"
translation = "우리들에 대해서도, 은근슬쩍 설명을 해 준 것 같았다."

[[dialogue]]
speaker = "unk"
original = "魔界の勝手知ったる２人がいるというのは、この異郷にあってとても心強い。"
translation = "마계의 사정을 잘 아는 두 사람이 있다는 것은, 이 이향에서 매우 든든하다."

[[dialogue]]
speaker = "リタおばさん"
original = "「おっと──つい話し込んじまったかね。あたしは銭湯に向かうとするよ」"
translation = "「이런── 그만 이야기에 빠져 버렸나 보네. 나는 목욕탕으로 향할게」"

[[dialogue]]
speaker = "リタおばさん"
original = "「しっかし……最近はあの旅人といい、珍奇な客が多いねえ。レゾフにもいよいよ『インバウンド』ってやつがきたのかねえ。ははは……」"
translation = "「그나저나…… 최근에는 저 여행자도 그렇고, 진기한 손님이 많네. 레조프에도 드디어 『인바운드』라는 게 온 건가. 하하하……」"

[[dialogue]]
speaker = "unk"
original = "リタおばさん──とサーシャさん達が呼んだ女性が去っていく。"
translation = "리타 아줌마──라고 사샤 씨 일행이 부른 여성이 떠나간다."

[[dialogue]]
speaker = "マトイ"
original = "（あの旅人……？）"
translation = "（저 여행자……?）"

[[dialogue]]
speaker = "クロト"
original = "（気にはなるが……ひとまずは自分たちのことが先決だな）"
translation = "（신경 쓰이긴 하지만…… 일단은 우리들의 일이 먼저다）"

[[dialogue]]
speaker = "フィオナ"
original = "「ヴィーナスさんの手がかりについて、街の方々にも聞ければいいんですけど……」"
translation = "「비너스 씨의 단서에 대해, 마을 분들에게도 여쭤볼 수 있으면 좋겠는데요……」"

[[dialogue]]
speaker = "ユウリ"
original = "「つっても……さすがにもう夜も遅いな。あんま外に人は出歩いてなさそうだぜ」"
translation = "「그렇다고 해도…… 역시 벌써 밤도 늦었네. 별로 밖에 사람이 돌아다니지 않는 것 같고」"

[[dialogue]]
speaker = "ソフィア"
original = "「レゾフは気候柄、夜に出歩く人は少ないですしね」"
translation = "「레조프는 기후 특성상, 밤에 돌아다니는 사람은 적으니까요」"

[[dialogue]]
speaker = "マトイ"
original = "「だったらお家を訪ねてみるとか？\u3000私、聞いてみるよ──！」"
translation = "「그렇다면 집을 방문해 본다거나? 내가, 물어볼게──!」"

[[dialogue]]
speaker = "unk"
original = "人一倍張り切るマトイ。"
translation = "남들보다 더 의욕을 보이는 마토이."

[[dialogue]]
speaker = "unk"
original = "しかし、彼女は明らかに疲れた様子で、レゾフに着いてからも絶えず身を凍えさせていた。"
translation = "하지만, 그녀는 확연히 지친 모습으로, 레조프에 도착하고 나서도 끊임없이 몸을 떨고 있었다."

[[dialogue]]
speaker = "クロト"
original = "「──いや、すぐの行動はやめよう、マトイ。体を休めるのも大事なことだしな」"
translation = "「──아니, 당장 행동하는 건 그만두자, 마토이. 몸을 쉬게 하는 것도 중요한 일이니까」"

[[dialogue]]
speaker = "マトイ"
original = "「あっ……」"
translation = "「앗……」"

[[dialogue]]
speaker = "サーシャ"
original = "「そうね。無事にここまでは着けたことだし──家まで案内しようかしら」"
translation = "「그렇네. 무사히 여기까지 도착했으니── 집까지 안내해 줄까」"

[[dialogue]]
speaker = "ソフィア"
original = "「そうですね。魔界を探索するにも拠点は必要でしょうし」"
translation = "「그렇습니다. 마계를 탐색하는 데에도 거점은 필요할 테니까요」"

[[dialogue]]
speaker = "サーシャ"
original = "「暖炉もあるし、うちでゆっくり休むといいわ。温まるわよ、マトイちゃん」"
translation = "「난로도 있고, 우리 집에서 푹 쉬는 게 좋을 거야. 따뜻해질 거야, 마토이짱」"

[[dialogue]]
speaker = "マトイ"
original = "「あ……ありがとうございます」"
translation = "「아…… 감사합니다」"

[[dialogue]]
speaker = "クロト"
original = "「今日は朝から走り回って──ネビュラとの試練も、魔獣との戦いもあった。みんな疲労が溜まってるはずだ」"
translation = "「오늘은 아침부터 뛰어다니고── 네뷸라와의 시련도, 마수와의 싸움도 있었지. 모두 피로가 쌓여 있을 거야」"

[[dialogue]]
speaker = "クロト"
original = "「ここは２人の好意に甘えて……明日まで休ませてもらうとしよう」"
translation = "「여기는 두 사람의 호의에 기대서…… 내일까지 쉬도록 하자」"

[[dialogue]]
speaker = "ソフィア"
original = "「長い一日でした……今日は本当にあちこちを回りましたね」"
translation = "「긴 하루였습니다…… 오늘은 정말 여기저기를 돌아다녔네요」"

[[dialogue]]
speaker = "ユウリ"
original = "「ヴィーナスを取り返すならアイツともやり合わなきゃだしな──体力を蓄えとくに越したことはねえ」"
translation = "「비너스를 되찾으려면 그 녀석과도 맞붙어야 하니까── 체력을 비축해 두는 게 최고지」"

[[dialogue]]
speaker = "フィオナ"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "──そうして俺たちは奏姉妹のご実家まで案内された。"
translation = "──그렇게 우리들은 카나데 자매의 본가까지 안내받았다."

[[dialogue]]
speaker = "unk"
original = "完全な異界の文化に驚きつつも、<ruby>薪<rt>まき</rt></ruby>をくべた昔ながらの暖炉で温まることに……。"
translation = "완전한 이계의 문화에 놀라면서도, 장작을 땐 옛날식 난로에서 몸을 녹이기로 한다……."

[[dialogue]]
speaker = "サーシャ"
original = "「……あら。残念ねソフィア、お父さんもお母さんも留守にしてるみたい」"
translation = "「……어머. 유감이네 소피아, 아빠도 엄마도 외출 중인 것 같아」"

[[dialogue]]
speaker = "ソフィア"
original = "「ああ……そういえば、仕事でセントリアの方へ向かうと言ってましたね。私も姉さんもいなくてつまんないから、って」"
translation = "「아아…… 그러고 보니, 일 때문에 센트리아 쪽으로 향한다고 했었죠. 저도 언니도 없으면 심심하니까, 라고」"

[[dialogue]]
speaker = "サーシャ"
original = "「そんな理由？\u3000相変わらずねえ」"
translation = "「그런 이유로? 여전하네」"

[[dialogue]]
speaker = "unk"
original = "また２人のご両親は、稼業によりともども留守にしており──"
translation = "또 두 사람의 부모님은, 가업으로 인해 모두 외출 중이었고──"

[[dialogue]]
speaker = "unk"
original = "魔界の都市間の広さからして、戻ってくるのは当分先だろうということだった。"
translation = "마계 도시 간의 넓이로 볼 때, 돌아오는 것은 당분간 멀었다고 한다."

[[dialogue]]
speaker = "unk"
original = "２人の家は、俺たち全員が泊まっても余裕なほど大きく……"
translation = "두 사람의 집은, 우리 모두가 묵어도 여유로울 정도로 컸고……"

[[dialogue]]
speaker = "unk"
original = "その晩はレゾフ名物というお芋のスープを作ってもらい、みんなで心身ともに温まるのだった。"
translation = "그날 밤은 레조프 명물이라는 감자 수프를 만들어 먹고, 모두가 심신 모두 따뜻해지는 것이었다."

