[[dialogue]]
speaker = "unk"
original = "第３話,脚本家は面倒くさい（後編）,P"
translation = "제3화, 각본가는 번거로워 (후편), P"

[[dialogue]]
speaker = "ロクサーナ"
original = "「ふぅ……美味かった。くっくっく、長同士、顔を突き合わせてのディナーがカップ麺とはな」"
translation = "「후우…… 맛있었군. 큭큭큭, 장들끼리 얼굴을 마주 보고 하는 디너가 컵라면이라니」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「此度の件でわかってもらえたと思うが、創作者というのは実に面倒で利己的な人種なのだよ」"
translation = "「이번 일로 알았겠지만, 창작자라는 건 실로 번거롭고 이기적인 인종이거든」"

[[dialogue]]
speaker = "unk"
original = "何人か心当たりがある……"
translation = "몇 명인가 짐작 가는 사람이 있어……"

[[dialogue]]
speaker = "ロクサーナ"
original = "「そうだろう、そうだろう。私に目をつけられたのが運の尽きと諦めてもらえれば幸いだ」"
translation = "「그렇겠지, 그렇겠어. 나에게 눈독 들인 게 운이 다한 거라고 포기해 준다면 다행이겠군」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「完成を間近に控えて、私は機嫌がいい。部外者だというのに、こんな時間まで付き合ってくれている礼のひとつもしよう。会長、私に何か要求はないか」"
translation = "「완성을 앞두고 있어서, 나는 기분이 좋다. 외부인인데도 이 시간까지 함께해 준 보답을 하나 하지. 회장, 나에게 요구하는 건 없나?」"

[[dialogue]]
speaker = "unk"
original = "ロクサーナのことが知りたいな"
translation = "록사나에 대해 알고 싶어"

[[dialogue]]
speaker = "ロクサーナ"
original = "「私のこと、だと？\u3000プロフィールならば学生証にでも書かれているだろう」"
translation = "「나에 대해서, 라고? 프로필이라면 학생증에라도 적혀 있을 거다」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「そもそも私のことなど、知ったところでどうなるものでもあるまい。会長と比べたら平々凡々で、さして面白くもないぞ」"
translation = "「애초에 나 같은 거, 알아봤자 별거 없다고. 회장과 비교하면 평범하디평범해서, 딱히 재밌지도 않아」"

[[dialogue]]
speaker = "unk"
original = "好きな物と嫌いな物と癖と将来の夢は何？"
translation = "좋아하는 것과 싫어하는 것과 버릇과 장래 희망은 뭐야?"

[[dialogue]]
speaker = "unk"
original = "そうだなぁ……軽い自己紹介と"
translation = "글쎄…… 가벼운 자기소개랑"

[[dialogue]]
speaker = "ロクサーナ"
original = "「はっ……いつぞの意趣返しのつもりか？\u3000味な真似をするじゃないか。その心意気に免じて、付き合ってやる」"
translation = "「훗…… 언제 적 일을 되갚아 주려는 셈인가? 제법 재치 있는 짓을 하는군. 그 기개에 보답해서, 상대해 주지」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「新星学園３年、ロクサーナ・ハイドランジアだ。６月２５日生まれ、生まれは魔界のシャリオン地方」"
translation = "「신성학원 3학년, 록사나 하이드란지아다. 6월 25일생, 출생은 마계의 샤리온 지방」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「好きな物は苦いコーヒー、嫌いな物は甘ったるいコーヒー。癖……口癖は……凡骨、か？」"
translation = "「좋아하는 건 쓴 커피, 싫어하는 건 달짝지근한 커피. 버릇…… 입버릇은…… 범골, 인가?」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「夢は……己の全てを表現した『究極の舞台』を作り上げることだ。そのためならば私の生命をチップにするのすら厭わん」"
translation = "「꿈은…… 나의 모든 것을 표현한 『궁극의 무대』를 만들어 내는 거다. 그걸 위해서라면 나의 생명을 칩으로 거는 것조차 마다치 않아」"

[[dialogue]]
speaker = "unk"
original = "脚本家を志したのは、どうして？"
translation = "각본가를 지망한 건 어째서야?"

[[dialogue]]
speaker = "ロクサーナ"
original = "「私の手に紙とペンだけが握られていたからだ。いや、それしか私の手元に残っていなかったからだ」"
translation = "「내 손에 종이와 펜만이 쥐여져 있었기 때문이다. 아니, 그것밖에 내 손에 남아 있지 않았기 때문이지」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「思いのほか、人のプライバシーに踏み込んでくるのだな？」"
translation = "「생각보다 남의 프라이버시에 파고드는군?」"

[[dialogue]]
speaker = "unk"
original = "気に障ったなら話さなくてもいいよ"
translation = "기분 나빴다면 말 안 해도 돼"

[[dialogue]]
speaker = "ロクサーナ"
original = "「なぁに、構わん。最早どうにもならない過去の出来事だ」"
translation = "「아니, 상관없다. 이제는 어쩔 도리 없는 과거의 일이니까」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「魔界の出身だと言ったな。私は町の豪商の家に生まれた。幸いにも食う物には困らぬ、何ら不自由のない幼少期を過ごさせてもらったよ」"
translation = "「마계 출신이라고 했지. 나는 마을의 거상 집안에서 태어났다. 다행히 먹을 것 걱정은 없는, 아무런 불편함 없는 유년기를 보낼 수 있었지」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「だが、それは私にとっては退屈な日々だった」"
translation = "「하지만, 그건 나에게는 지루한 나날이었어」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「豪商の娘というだけで、街の権力者どもが揃いも揃って年端も行かぬ私にヘコヘコと頭を下げて、ご機嫌伺いだ」"
translation = "「거상의 딸이라는 이유만으로, 마을의 권력자 놈들이 하나같이 다 자라지도 않은 나에게 굽실거리며 고개를 숙이고 비위를 맞췄지」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「大人としてのプライドや矜持がないのかと、銅貨よりも安く頭を下げる連中を、冷めた目で眺めている幼少期だった」"
translation = "「어른으로서의 자부심이나 긍지도 없는 건지, 동전 한 닢보다 값싸게 머리를 조아리는 놈들을, 차가운 눈으로 바라보던 어린 시절이었다」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「しかし、ある日、それはいとも容易く崩壊し、逆転した」"
translation = "「하지만, 어느 날, 그것은 너무나도 쉽게 붕괴하고, 역전되었지」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「父と権力者との癒着が発覚して民衆の怒りを買ってな。暴徒と化した民衆たちによって私の屋敷は打ち壊され、家財はことごとく奪われた」"
translation = "「아버지와 권력자의 유착이 발각되어 민중의 분노를 샀거든. 폭도로 돌변한 민중들에 의해 나의 저택은 무너지고, 가재도구는 모조리 빼앗겼다」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「使用人の手引きで、私は命からがら逃げ出したものの、その時の私が咄嗟に掴んでいたのは数枚の紙束と１本のペンだけだった」"
translation = "「하인의 도움으로, 나는 목숨만 건져 도망쳤지만, 그때의 내가 다급하게 붙잡았던 것은 몇 장의 종이 뭉치와 한 자루의 펜뿐이었어」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「私はその持ち出した紙に、渦巻く感情の全てを叩きつけた。<ruby>双眸<rt>そうぼう</rt></ruby>で見た情景を、使える語彙の全てでもって克明に描写した」"
translation = "「나는 그 가지고 나온 종이에, 소용돌이치는 감정의 모든 것을 쏟아부었다. 두 눈으로 본 정경을, 아는 어휘를 총동원해 극명하게 묘사했지」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「怒り狂う民衆、燃え落ちる屋敷、追い詰められる恐怖……書き留めた物は、一片の物語となった」"
translation = "「분노에 찬 민중, 불타오르는 저택, 막다른 길에 몰린 공포…… 기록한 것들은, 한 편의 이야기가 되었다」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「極めて粗削りで、今読み返したらうっかり引き裂いてしまいそうな稚拙な代物ではあったがな。読む者に何らかの感情を抱かせる脚本の体を為していた」"
translation = "「지극히 거칠고, 지금 다시 읽으면 홧김에 찢어버릴 것 같은 치졸한 물건이긴 했지만 말이야. 읽는 자에게 어떠한 감정을 품게 하는 각본의 형태를 갖추고 있었지」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「それが私が初めて書き上げた脚本、処女作だ」"
translation = "「그게 내가 처음으로 다 써낸 각본, 처녀작이다」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「己が抱いた感情を、浮かんだ思念を、文章という形でアウトプットする」"
translation = "「자신이 품은 감정을, 떠오른 사념을, 문장이라는 형태로 아웃풋한다」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「会長は創作の沼に堕ちたことがあるか？\u3000創作は良いぞ、一度浸かってしまったら二度と這い上がる気になれない甘美の底なし沼だ」"
translation = "「회장은 창작의 늪에 빠져본 적 있나? 창작은 좋다, 한번 잠기면 다시는 기어 올라올 생각이 들지 않는 감미로운 바닥 없는 늪이지」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「作品の結末──最後のピリオドを打った瞬間に訪れる感動と恍惚は、何物にも喩え難い。物を作ることでしか得られない快感は確実に存在する」"
translation = "「작품의 결말── 마지막 마침표를 찍은 순간에 찾아오는 감동과 황홀경은, 그 무엇과도 비교하기 힘들지. 무언가를 만드는 것으로만 얻을 수 있는 쾌감은 확실히 존재해」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「すっかり創作の奴隷となった私は、本格的に脚本家としての活動を始めた──というわけだ」"
translation = "「완전히 창작의 노예가 된 나는, 본격적으로 각본가로서 활동을 시작했다──는 이야기지」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「──そうか。昔話をしていて思い出したよ。初心忘れるべからず、だな」"
translation = "「──그렇군. 옛날이야기를 하다 보니 떠올랐어. 초심을 잊지 말아야겠군」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「小手先の技術ばかりに頼りきり、感情を叩きつける愉悦を忘れるところだった」"
translation = "「잔기술에만 너무 의존한 나머지, 감정을 쏟아붓는 유열을 잊고 있었어」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「そうだ、そうだ、変なギミックや創作論ではなく、登場人物が自身の感情に素直に従えば全ては解決する」"
translation = "「그래, 맞아, 이상한 기믹이나 창작론이 아니라, 등장인물이 자신의 감정에 솔직하게 따르면 모든 게 해결되는 거다」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「──ああ、実はクライマックスの出来に少し悩んでいたのだがな。お前と話していて、別案が思いついた」"
translation = "「──아아, 실은 클라이맥스의 완성도를 두고 조금 고민하고 있었거든. 너와 얘기하다 보니, 다른 안이 떠올랐어」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「よし……よし……全てのキャラクターの行動と理念がしっくりとハマった。くだらんことを話してしまったと思ったが……なかなか役に立ったな」"
translation = "「좋아…… 좋아…… 모든 캐릭터의 행동과 이념이 딱 맞아떨어졌어. 쓸데없는 소리를 했다고 생각했는데…… 제법 도움이 됐군」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「この分ならばあと数時間で完成に至るよ。会長、協力に感謝する」"
translation = "「이 정도면 앞으로 몇 시간 뒤면 완성될 거다. 회장, 협력해 줘서 고맙군」"

[[dialogue]]
speaker = "unk"
original = "どういたしまして"
translation = "천만에요"

[[dialogue]]
speaker = "ロクサーナ"
original = "「完成の瞬間は、会長に立ち会い、喜びを分かち合ってほしい。もう少し、ここにいてくれるか？」"
translation = "「완성의 순간은, 회장이 지켜보고 기쁨을 나눠줬으면 한다. 조금만 더, 여기 있어 주겠나?」"

[[dialogue]]
speaker = "unk"
original = "もちろん。楽しみにしてる"
translation = "물론이지. 기대하고 있을게"

[[dialogue]]
speaker = "ロクサーナ"
original = "「時間も時間だ。眠いようなら目を閉じててくれて構わん。まあ、完成した瞬間には叩き起こすがな、くっくっく」"
translation = "「시간이 늦었군. 졸리면 눈을 붙이고 있어도 상관없다. 뭐, 완성되는 순간에는 깨워줄 테니까, 큭큭큭」"

[[dialogue]]
speaker = "unk"
original = "ロクサーナの走らせるペンの音を子守歌代わりに目を閉じた。"
translation = "록사나가 놀리는 펜 소리를 자장가 삼아 눈을 감았다."

[[dialogue]]
speaker = "unk"
original = "次に目覚める時はロクサーナ渾身の脚本が完成した時だ。"
translation = "다음에 눈을 뜰 때는 록사나 회심의 각본이 완성됐을 때다."

[[dialogue]]
speaker = "ロクサーナ"
original = "「起きろ、凡骨。できたぞ」"
translation = "「일어나라, 범골. 다 됐다」"

[[dialogue]]
speaker = "unk"
original = "そして、明け方近く、ロクサーナの脚本は無事完成した。"
translation = "그리고, 새벽녘 무렵, 록사나의 각본은 무사히 완성되었다."

[[dialogue]]
speaker = "unk"
original = "この脚本は、演劇部の卒業公演にてお披露目されるとのことだった。"
translation = "이 각본은, 연극부의 졸업 공연에서 선보일 예정이라고 했다."

