[[dialogue]]
speaker = "リップル"
original = "「モネ！\u3000早く遊びましょう！\u3000レッツゴーです！」"
translation = "「모네! 어서 놀아마시타! 렛츠고마시타!」"

[[dialogue]]
speaker = "モネ"
original = "「リップルさん、手を引っ張らないでください～っ」"
translation = "「리플 씨, 팔 끌지 마세요~」"

[[dialogue]]
speaker = "リップル"
original = "「ゴメンなさい、ついテンション上がってシマッテ……えへへ」"
translation = "「미안해마시타, 그만 텐션이 올라버려서…… 에헤헤.」"

[[dialogue]]
speaker = "モネ"
original = "「気持ちはわかりますけど……別に逃げたりしませんから。私もリップルさんと遊ぶの楽しみにしてましたし」"
translation = "「기분은 알겠지만…… 딱히 도망가거나 하지 않으니까요. 저도 리플 씨랑 노는 거 기대하고 있었고.」"

[[dialogue]]
speaker = "リップル"
original = "「モネ！\u3000嬉しいです！\u3000ギュ～～～～っとハグしちゃいます！」"
translation = "「모네! 기쁘마시타! 꼬~~~옥 허그해버리겠마시타!」"

[[dialogue]]
speaker = "モネ"
original = "「うぎゅ……リップルさん、苦しい……苦しいですから……」"
translation = "「으규…… 리플 씨, 괴로워요…… 괴롭다니까요……」"

[[dialogue]]
speaker = "リップル"
original = "「えへへ……それはモネの照れ隠しってワカってますから、離シマせん～」"
translation = "「에헤헤…… 그건 모네가 부끄러워서 그러는 거 다 알고 있마시타니까, 놓지 않아마시타~」"

[[dialogue]]
speaker = "モネ"
original = "「うっ、バレてる……でもでも、やっぱりハグはまだ恥ずかしいです～」"
translation = "「윽, 들켰다…… 하지만 하지만, 역시 포옹은 아직 부끄러워요~」"

[[dialogue]]
speaker = "リップル"
original = "「ダイジョーブです！\u3000きっとスグにハグも慣れま～す！」"
translation = "「다이죠부입니다! 분명 금방 포옹도 익숙해질 거예~요!」"

[[dialogue]]
speaker = "モネ"
original = "「そうですかね……私もリップルさんとハグすること自体は嫌いじゃないですけど……」"
translation = "「그럴까요…… 저도 리플 씨와 포옹하는 것 자체는 싫지 않지만요……」"

[[dialogue]]
speaker = "リップル"
original = "「えへへ……ワタシもモネとハグするのダイスキです！\u3000ソレに……チュッ♪」"
translation = "「에헤헤…… 저도 모네와 포옹하는 거 너~무 좋아요! 그리고…… 쪽♪」"

[[dialogue]]
speaker = "モネ"
original = "「────！！？？」"
translation = "「────!!??」"

[[dialogue]]
speaker = "リップル"
original = "「ホッペにチューです♪\u3000シンアイのアカシでーす。どうデスか？\u3000嬉しいデスか？」"
translation = "「볼에 뽀뽀예요♪ 친애의 증표랍니~다. 어떠신가요? 기쁘신가요?」"

[[dialogue]]
speaker = "モネ"
original = "「り、りりりリップルさん！\u3000そういうのは気軽にやっちゃダメですから！」"
translation = "「리, 리리리리플 씨! 그런 건 함부로 하시면 안 된다니까요!」"

[[dialogue]]
speaker = "リップル"
original = "「モネが持ってキテくれた本に、チューは挨拶って書いてマシた！」"
translation = "「모네가 가져다준 책에, 뽀뽀는 인사라고 적혀 있었어용!」"

[[dialogue]]
speaker = "リップル"
original = "「それにモネのコトはダイスキですし、大切な人ですよ？\u3000だからちゅーしてもオッケーです！」"
translation = "「게다가 모네는 정말 좋아하고, 소중한 사람이잖아요? 그러니까 뽀뽀해도 오케이예요!」"

[[dialogue]]
speaker = "モネ"
original = "「そ、そういう好きとか大切じゃなくて、ＬＯＶＥとかそういう感じの……」"
translation = "「그, 그런 좋아한다거나 소중하다는 게 아니라, LOVE라든가 그런 느낌의……」"

[[dialogue]]
speaker = "リップル"
original = "「やっぱり問題ナッシングです！\u3000モネへのダイスキはＢＩＧＬＯＶＥで～す！」"
translation = "「역시 문제 내싱입니다! 모네를 향한 '다이스키'는 BIG LOVE예~요!」"

[[dialogue]]
speaker = "モネ"
original = "「えええっ！？」"
translation = "「에에엣!?」"

[[dialogue]]
speaker = "unk"
original = "知らない間に２人がすごく仲良くなってる！"
translation = "모르는 사이에 두 사람이 무척 사이가 좋아져 있다!"

[[dialogue]]
speaker = "モネ"
original = "「かかかかかか会長！！？？\u3000どうしてここに！！」"
translation = "「히히히히히히노미야 회장님!!?? 어째서 여기에!!」"

[[dialogue]]
speaker = "リップル"
original = "「カイチョー！\u3000ラッシャッセーでーす！」"
translation = "「회장님! 어서 오세용~!」"

[[dialogue]]
speaker = "モネ"
original = "「もしかして、さっきの見てましたか！？\u3000見てないですよね会長！」"
translation = "「혹시, 방금 그거 보셨나요!? 안 보셨죠, 회장님!」"

[[dialogue]]
speaker = "unk"
original = "ええと……ノーコメントで"
translation = "에…… 노코멘트로."

[[dialogue]]
speaker = "モネ"
original = "「ガーン……絶対に見られてた……会長にキスの現場を見られるなんて……」"
translation = "「가안…… 분명히 보셨어…… 회장님께 키스 현장을 들키다니……」"

[[dialogue]]
speaker = "リップル"
original = "「ダイジョーブです！\u3000ワタシたちにやましいコトなんて何もナイです！」"
translation = "「다이죠부입니다! 우리 사이에 꺼림칙한 건 아무것도 없어용!」"

[[dialogue]]
speaker = "リップル"
original = "「ただチョット、他のみんなよりもラブラブなだけデスから♪」"
translation = "「그저 조금, 다른 사람들보다 러브러브할 뿐이니까요♪」"

[[dialogue]]
speaker = "モネ"
original = "「リップルさん！\u3000その言い方は誤解を招きますから！」"
translation = "「리플 씨! 그런 말투는 오해를 부른다니까요!」"

[[dialogue]]
speaker = "リップル"
original = "「誤解されてもダイジョーブです♪\u3000ワタシは覚悟デキてますヨ♪」"
translation = "「오해받아도 다이죠부입니다♪ 저는 각오 되어 있어용♪」"

[[dialogue]]
speaker = "モネ"
original = "「やっぱりリップルさん、分かってて言ってますよね！？」"
translation = "「역시 리플 씨, 알고서 말하시는 거죠!?」"

[[dialogue]]
speaker = "モネ"
original = "「でも、どうして会長がリゾート結界に……？」"
translation = "「그런데, 어째서 회장님이 리조트 결계에……?」"

[[dialogue]]
speaker = "unk"
original = "ヘレナちゃんから様子を見てきてって頼まれて"
translation = "헬레나짱이 상태를 좀 보고 와달라고 부탁해서."

[[dialogue]]
speaker = "モネ"
original = "「あ……そうでした。報告がまだでした……」"
translation = "「아…… 그랬죠. 보고가 아직이었네요……」"

[[dialogue]]
speaker = "モネ"
original = "「水着サンタの戦闘服ですが、リゾート結界でトレーニングしたおかげで使いこなせるようになりました」"
translation = "「수영복 산타 전투복 말입니다만, 리조트 결계에서 트레이닝한 덕분에 능숙하게 다룰 수 있게 되었어요.」"

[[dialogue]]
speaker = "モネ"
original = "「こうして変身できるようになりましたし、新しい星術も使えるようになりました」"
translation = "「이렇게 변신할 수 있게 되었고, 새로운 성술도 사용할 수 있게 되었습니다.」"

[[dialogue]]
speaker = "モネ"
original = "「海で泳いだり、ビーチで遊ぶのも好きになって……全部リップルさんのおかげですね」"
translation = "「바다에서 수영하거나, 해변에서 노는 것도 좋아하게 되어서…… 전부 리플 씨 덕분이네요.」"

[[dialogue]]
speaker = "リップル"
original = "「ユージョーパワーです♪\u3000イェー♪」"
translation = "「우정 파워예용♪ 예~♪」"

[[dialogue]]
speaker = "モネ"
original = "「いぇー♪」"
translation = "「예~♪」"

[[dialogue]]
speaker = "unk"
original = "２人が仲良くなってよかった"
translation = "두 사람이 사이좋아져서 다행이다."

[[dialogue]]
speaker = "リップル"
original = "「ワタシたち、同じクラスだったですケド、クリスマスを通じても～っとナカヨシにナッタんです！」"
translation = "「우리들, 같은 반이었지만 크리스마스를 통해서 더~욱 사이가 좋아졌어용!」"

[[dialogue]]
speaker = "モネ"
original = "「そうですね。あの日リップルさんが私に声をかけてくれなかったら、こんなに仲良しにはなれてなかったです」"
translation = "「그렇네요. 그날 리플 씨가 제게 말을 걸어주지 않았다면, 이렇게 사이좋게 되지는 못했을 거예요.」"

[[dialogue]]
speaker = "リップル"
original = "「クリスマスにはＢＩＧ感謝で～す♪\u3000モネもリゾート結界の常連さんにナッテくれましたし♪」"
translation = "「크리스마스에는 BIG 감사예~요♪ 모네도 리조트 결계의 단골손님이 되어주었고요♪」"

[[dialogue]]
speaker = "リップル"
original = "「水着サンタを使いこなせるようにナッテも、リゾート結界に来てクダさいね？」"
translation = "「수영복 산타를 능숙하게 다룰 수 있게 되어도, 리조트 결계에 와주세용?」"

[[dialogue]]
speaker = "モネ"
original = "「はい。リップルさんに会いに来ますよ」"
translation = "「네. 리플 씨를 만나러 올게요.」"

[[dialogue]]
speaker = "リップル"
original = "「モネ～♪」"
translation = "「모네~♪」"

[[dialogue]]
speaker = "モネ"
original = "「もうリップルさん、またくっついて……」"
translation = "「정말 리플 씨, 또 달라붙으셔서는……」"

[[dialogue]]
speaker = "リップル"
original = "「だってだって、嬉しいデスから！」"
translation = "「그치만 그치만, 기쁘니까요!」"

[[dialogue]]
speaker = "モネ"
original = "「私がここに来なくても、最近はリップルさんが図書館に来るじゃないですか」"
translation = "「제가 여기 오지 않더라도, 요즘은 리플 씨가 도서관에 오시잖아요.」"

[[dialogue]]
speaker = "リップル"
original = "「モネのおかげで本にもハマれました！\u3000図書館でもリゾート結界でもモネにアイタイです」"
translation = "「모네 덕분에 책에도 푹 빠졌어용! 도서관에서도 리조트 결계에서도 모네를 만나고 싶어용.」"

[[dialogue]]
speaker = "モネ"
original = "「リップルさんてば……ふふ、仕方ないですね」"
translation = "「리플 씨도 참…… 후후, 어쩔 수 없네요.」"

[[dialogue]]
speaker = "unk"
original = "なんだか間に挟まってはいけない空気感……"
translation = "왠지 사이에 끼어들어서는 안 될 것 같은 분위기……."

[[dialogue]]
speaker = "リップル"
original = "「間に挟まる……？\u3000カイチョーもワタシたちとハグしたいデスか？」"
translation = "「사이에 끼어든다……? 회장님도 저희랑 포옹하고 싶으신가요?」"

[[dialogue]]
speaker = "モネ"
original = "「そそ、そんな格好で会長とハグなんてダメですぅ～っ！？」"
translation = "「그그, 그런 차림으로 회장님과 포옹이라니 안 돼요~!?」"

[[dialogue]]
speaker = "リップル"
original = "「それはワタシのハグをモネが独占したいってコトです？\u3000モネってば嫉妬ブカイですね～♪」"
translation = "「그건 제 포옹을 모네가 독점하고 싶다는 건가요? 모네도 참 질투가 심하네용~♪」"

[[dialogue]]
speaker = "モネ"
original = "「ああいえ、そういうわけじゃっ」"
translation = "「아아 아니, 그런 게 아닛.」"

[[dialogue]]
speaker = "リップル"
original = "「やっぱりモネは嫉妬ブカイです♪\u3000もぉカワイイですね～♪」"
translation = "「역시 모네는 질투쟁이예용♪ 정말 귀엽다니까요~♪」"

[[dialogue]]
speaker = "モネ"
original = "「もうもう、リップルさんのいじわるっ！」"
translation = "「정말 정말, 리플 씨 심술쟁이!」"

[[dialogue]]
speaker = "リップル"
original = "「ああっ、モネ拗ねないでクダさ～い。いっぱいハグしマスから～♪」"
translation = "「아앗, 모네 삐지지 마세용. 잔뜩 포옹해줄 테니까요~♪」"

[[dialogue]]
speaker = "リップル"
original = "「それにカイチョーも遠慮しなくてダイジョーブです！\u3000エンドレスサマーはミンナを笑顔にするタメにありますから！」"
translation = "「그리고 회장님도 사양하지 않아도 다이죠부입니다! 엔들리스 서머는 모두를 웃게 하기 위해 있는 거니까요!」"

[[dialogue]]
speaker = "リップル"
original = "「ワタシはモネのおかげで学んだんです。エンドレスサマーはワタシの知ってる海を広げるだけじゃ、ダメなんだって」"
translation = "「저는 모네 덕분에 배웠어용. 엔들리스 서머는 제가 아는 바다를 넓히는 것만으로는 안 된다는 걸요.」"

[[dialogue]]
speaker = "リップル"
original = "「この世界には、人の数だけヨロコビやタノシミがあります♪\u3000それをたくさん吸収することで、エンドレスサマーのカンセイにつながるんです♪」"
translation = "「이 세상에는 사람의 수만큼 기쁨이나 즐거움이 있어용♪ 그것을 잔뜩 흡수함으로써 엔들리스 서머의 완성으로 이어지는 거랍니다♪」"

[[dialogue]]
speaker = "モネ"
original = "「だからリップルさんは、これからもリゾート結界をみんなが楽しめるものにしていくんですよね」"
translation = "「그래서 리플 씨는 앞으로도 리조트 결계를 모두가 즐길 수 있는 곳으로 만들어 가려는 거군요.」"

[[dialogue]]
speaker = "リップル"
original = "「ハイ♪\u3000モネもカイチョーも学園中のミンナがハッピーになれるエンドレスサマーを目指してイキま～す♪」"
translation = "「네♪ 모네도 회장님도 학원 안의 모두가 해피해질 수 있는 엔들리스 서머를 목표로 가겠어용~♪」"

[[dialogue]]
speaker = "リップル"
original = "「モネもカイチョーも、真のエンドレスサマーをタノシミにしててクダサイね！」"
translation = "「모네도 회장님도, 진정한 엔들리스 서머를 기대해 주세용!」"

