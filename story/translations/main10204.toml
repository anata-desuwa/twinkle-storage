[[dialogue]]
speaker = "unk"
original = "第４話,結局、パワーがモノをいう,B"
translation = "제4화, 결국 파워가 장땡이다"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「到着っとー……んんー？」"
translation = "「도착했다─…… 응?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「なんだか様子がおかしいですね。何とはハッキリ言いづらいんですけど……」"
translation = "「어쩐지 분위기가 이상하네요. 뭐라고 딱 잘라 말하기는 힘든데……」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「わかる。なんかモヤモヤすんね」"
translation = "「알 것 같아. 왠지 찝찝하네.」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「おお、美鶴殿、ヨミ殿！\u3000待っていたでござる！」"
translation = "「오오, 미츠루 공, 요미 공! 기다리고 있었소!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「せつなさん、ご無事でよかったです！\u3000何かおかしなことはありましたか？」"
translation = "「세츠나 씨, 무사해서 다행이에요! 뭐 이상한 점은 없었나요?」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「おかしなことばかりでござるよ！」"
translation = "「이상한 점투성이요!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「まずは手始めに、軽く見回してもお分かりの通り、いつもならばあるはずの動物の気配がしませぬ」"
translation = "「우선 첫째로, 가볍게 둘러봐도 알 수 있듯이 평소라면 있어야 할 동물의 기척이 느껴지지 않소.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「そーだね、言われてみれば」"
translation = "「그러네, 듣고 보니.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「獣除けがされているのでしょうか……もしくは何らかの術で近づけなくしている……？」"
translation = "「짐승 퇴치가 되어 있는 걸까요…… 아니면 어떤 술법으로 접근하지 못하게 하고 있는 걸까요……?」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「そして、もうひとつ。せつなはここでただ待っていたわけではないでござる。幾度と森に踏み込んではみたものの、いつの間にやら入口に戻ってきてしまうのでござる」"
translation = "「그리고 또 하나. 세츠나는 여기서 그냥 기다리고만 있었던 게 아니오. 몇 번이고 숲으로 발을 들여보았으나, 어느샌가 입구로 돌아와 버리고 마오.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「ふりだしに戻ってるってコト？\u3000仮にも忍者のせつなを欺くって相当スゴいね」"
translation = "「원점으로 돌아오고 있다는 소리? 나름 닌자인 세츠나를 속이다니 상당히 대단하네.」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「仮ではないでござる。せつなはれっきとした、由緒正しき忍でござる！」"
translation = "「나름이 아니오. 세츠나는 어엿한, 유서 깊은 닌자요!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「我が両眼にかかれば、並の異変ならば見抜けるのでござるが……これは皆目見当がつかないでござる。面妖な力が渦巻いてるのは確実でござるな」"
translation = "「소인의 두 눈이라면 웬만한 이변은 꿰뚫어 볼 수 있소만…… 이건 도무지 짐작이 가지 않소. 기괴한 힘이 소용돌이치고 있는 건 확실하오.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「湖に向かう道のりが、迷路になってるなんて話は、当主様からも聞いてないですしね……どうしましょう、美鶴さん。私たちも進んでみますか」"
translation = "「호수로 향하는 길이 미로가 되어 있다는 이야기는 당주님께도 듣지 못했는데요…… 어쩌죠, 미츠루 씨. 저희도 나아가 볼까요.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「行ってみなきゃわかんないしね。３人まとまってこか」"
translation = "「가보지 않으면 모르니까 말이야. 셋이 뭉쳐서 가자.」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「まとまってでござるか？\u3000こういう時は手分けして探すのがセオリーではござらぬか」"
translation = "「뭉쳐서 말이오? 이럴 때는 나누어서 찾는 것이 정석이 아니오?」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「そんなん、いっちゃんヤバいって。１人ずつやられるのがオチだよ。Ｂ級ホラー映画でも１人で活動するヤツが真っ先に狙われるじゃん？」"
translation = "「그게 제일 위험하다니까. 한 명씩 당하는 게 뻔해. B급 공포 영화에서도 혼자 행동하는 녀석이 제일 먼저 노려지잖아?」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「確かに。乳繰り合ってるカップルも襲われがちでござるな」"
translation = "「과연. 꽁냥거리는 커플도 습격당하기 십상이오.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「あれ、せつなって映画わかる子？」"
translation = "「어라, 세츠나 영화 좀 아는 애야?」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「概ね、濡れ場を抜粋して観てるでござるよ」"
translation = "「대체로 베드신만 발췌해서 보고 있소.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「うちとは趣味が合わねーね」"
translation = "「나랑은 취향이 안 맞네.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「んじゃ、試しにちょっと進んでみよっか」"
translation = "「그럼 시험 삼아 조금 가볼까.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「あれ……？\u3000あの木に書いてある『☆』って、最初につけたマークですよね」"
translation = "「어라……? 저 나무에 적혀 있는 『☆』은 처음에 표시한 마크죠.」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「ほんの３分前でござるな。やはり先に進めぬでござろう？」"
translation = "「불과 3분 전이오. 역시 앞으로 나아갈 수 없지 않소?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「誰かが幻惑の術でもかけているのでしょうか……」"
translation = "「누군가가 환혹술이라도 걸고 있는 걸까요……」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「てことは、ここに異変が起きてるってことだね」"
translation = "「그 말은 여기에 이변이 일어나고 있다는 뜻이네.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「うちらの仕事は調査なワケだしさ。『異変はありました。迷路になってました』って報告に帰るのも正解っちゃ正解だよね」"
translation = "「우리 일은 조사니까 말이야. 『이변은 있었습니다. 미로가 되어 있었습니다』라고 보고하러 돌아가는 것도 정답이라면 정답이지.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「それはそうですが……迷路を生み出している原因は究明するべきじゃないでしょうか？」"
translation = "「그건 그렇지만…… 미로를 만들어내고 있는 원인은 규명해야 하지 않을까요?」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「だよねー。この程度の調査じゃ、さすがに給料泥棒になっちゃうよね。しゃーない。もうちょっと働くか」"
translation = "「그렇지─. 이 정도 조사로는 역시 월급도둑이 돼버리겠네. 어쩔 수 없지. 좀 더 일해볼까.」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「自然発生なのか、人為的なものなのかは判明させたいところでござるな」"
translation = "「자연 발생인지 인위적인 것인지는 판명하고 싶구려.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「なんかさ、この迷い方って何かに似てる気がしない？」"
translation = "「있잖아, 이 길을 잃는 방식이 무언가랑 닮았다는 생각 안 들어?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「迷い方が……ですか？\u3000なんでしょう？\u3000ちょっとピンと来ませんけど……」"
translation = "「길을 잃는 방식이…… 말인가요? 뭘까요? 딱히 떠오르지 않는데요……」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「えーと、ほら……アレっぽいじゃん。んー……ここまで出かかってるんだけど……」"
translation = "「저기, 봐봐…… 그거 같잖아. 음─…… 여기까지 나왔는데……」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「しかし、このままでは埒が明かぬでござるな。とりあえず、攻撃してみるも一興！」"
translation = "「하지만 이대로는 끝이 나지 않소. 일단 공격해 보는 것도 한 방법!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「必殺の十字手裏剣！\u3000とくと味わうでござる！」"
translation = "「필살의 십자 수리검! 톡톡히 맛보시오!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こやーっ！？\u3000ちょっ、せつなさーん！？」"
translation = "「코얏!? 저기, 세츠나 씨!?」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「目にも止まらぬ早業だ。止める隙もありゃしない」"
translation = "「눈 깜짝할 새의 솜씨네. 말릴 틈도 없어.」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「むうっ！？\u3000手裏剣が返ってきたでござる！？」"
translation = "「무우!? 수리검이 되돌아왔소!?」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「しかし回転、角度のクセも、せつなと同一でござった。一旦受け止めて、投げ返してきたわけではないでござる。せつなの投擲と写し鏡が如きでござる」"
translation = "「하지만 회전, 각도의 버릇도 세츠나와 동일했소. 일단 받아내서 다시 던진 게 아니오. 세츠나의 투척과 거울에 비춘 듯 똑같았소.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「写し鏡かー……んー……んんー？」"
translation = "「거울에 비춘 듯…… 음…… 응?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「美鶴さん、どうかしました？」"
translation = "「미츠루 씨, 왜 그러세요?」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「いつの間にか入口に戻ってる迷いの森……攻撃をそのまま反射する写し鏡……」"
translation = "「어느샌가 입구로 돌아오는 미궁의 숲…… 공격을 그대로 반사하는 거울……」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「そうだ。この森ってミラーハウスっぽい」"
translation = "「그렇구나. 이 숲, 미러 하우스 같아.」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「ミラーハウス、でござるか？」"
translation = "「미러 하우스 말이오?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「遊園地などにあるアトラクションですよね。四方八方を鏡に囲まれていて、まるで万華鏡みたいに」"
translation = "「유원지 같은 곳에 있는 어트랙션이죠. 사방팔방이 거울로 둘러싸여 있어서 마치 만화경처럼.」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「得心でござる！\u3000エッチなホテルにある鏡張りの部屋でござるな！」"
translation = "「득도했소! 야한 호텔에 있는 거울방 말이구려!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「そんな部屋があるんですか！？」"
translation = "「그런 방이 있어요!?」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「知らないでござるか？\u3000古き良きエロ文化と聞き及んでるでござるが」"
translation = "「모르오? 고전적인 에로 문화라고 전해 들었소만.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「うちも知らんよ」"
translation = "「나도 몰라.」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「なんと……『ラーゴ・シエロ』に『エロ』が含まれていたのは伏線だったのかと思ったでござる」"
translation = "「이럴 수가…… 『라고 시에로』에 『에로』가 포함되어 있었던 건 복선이었나 싶었소.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「確かに、入ってるなぁ……とは思ってましたけど……」"
translation = "「확실히 들어있긴 하네……라고 생각하긴 했지만……」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「いやその発想はなかったわ」"
translation = "「아니, 그 발상은 없었어.」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「ヨミ殿は助平でござるなぁ」"
translation = "「요미 공은 밝히는구려.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こやぁーん！？\u3000私だけですか！？\u3000濡れ衣です！\u3000せつなさんにだけは言われたくないです！」"
translation = "「코야앙!? 저뿐인가요!? 누명이에요! 세츠나 씨한테만큼은 듣고 싶지 않아요!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「濡れ衣……濡れ衣でござるかぁ……それもまた、そこはかとなくエロスを含んだ素晴らしい単語でござるなぁ」"
translation = "「누명…… 누명이라…… 그것 또한 어딘지 모르게 에로틱함이 서린 훌륭한 단어구려.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「この話、いつまで続けるんです！？」"
translation = "「이 이야기 언제까지 하실 거예요!?」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「無限ループするのは、この森だけで満足よ」"
translation = "「무한 루프 하는 건 이 숲만으로 만족해.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「ま、せつなの手裏剣攻撃のおかげで、突破の糸口は見えたね。つまり、うちらが進むのを邪魔してるのが鏡の壁っていうならさ」"
translation = "「뭐, 세츠나의 수리검 공격 덕분에 돌파구는 보였네. 즉, 우리가 가는 걸 방해하는 게 거울 벽이라면 말이야.」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「どうするでござるか？」"
translation = "「어찌할 것이오?」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「３人がかりの物理でぶっ壊す」"
translation = "「셋이서 물리력으로 때려 부순다.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「力技ぁーーっ！？」"
translation = "「무력 행사라니요──!?」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「シンプル・イズ・ベストでしょ」"
translation = "「심플 이즈 베스트잖아.」"

