[[dialogue]]
speaker = "unk"
original = "第４話,戦いの道か、料理の道か,P"
translation = "제4화, 싸움의 길인가, 요리의 길인가, P"

[[dialogue]]
speaker = "unk"
original = "蛍火と付き合いも長くなってきたある日。俺は放課後、カフェテリアで話したいことがあると彼女を呼び出した。"
translation = "호타루비와 알고 지낸 지도 꽤 된 어느 날. 나는 방과 후, 카페테리아에서 이야기하고 싶은 게 있다며 그녀를 불러냈다."

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「師匠？\u3000不肖、東雲蛍火、参りました。……それで、お話とは一体何でしょうか？」"
translation = "「스승님? 불초, 시노노메 호타루비, 왔습니다. ……그래서, 하실 말씀이란 대체 무엇인가요?」"

[[dialogue]]
speaker = "unk"
original = "蛍火、最近何かをずっと悩んでない？"
translation = "호타루비, 최근 무언가를 계속 고민하고 있지 않아?"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「あ……」"
translation = "「아……」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「お見通し……でしたか。さすが、師匠には敵いませんね」"
translation = "「꿰뚫어 보고…… 계셨군요. 역시, 스승님께는 당해낼 수 없네요.」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「師匠の仰る通り……最近、少し考えてしまっていることがあります」"
translation = "「스승님 말씀대로…… 최근, 조금 생각하고 있는 것이 있습니다.」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「はい……それは、戦いについてのことです。最近は私も、リクリエの厄災がどんどん流星市国に迫って来ているのを、肌で感じております」"
translation = "「네…… 그것은, 싸움에 관한 것입니다. 최근에는 저도, 리크리에의 재앙이 점점 유성시국으로 다가오고 있는 것을, 피부로 느끼고 있습니다.」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「にも関わらず、私は最前線に立たず、後方で料理人を続けています。……本当にこれでいいのだろうかと、思ってしまうのです」"
translation = "「그럼에도 불구하고, 저는 최전선에 서지 않고, 후방에서 요리사를 계속하고 있습니다. ……정말로 이대로 괜찮은 것일까 하고, 생각하게 됩니다.」"

[[dialogue]]
speaker = "unk"
original = "蛍火はでも、料理人も目指したいんだよね？"
translation = "하지만 호타루비는 요리사도 목표로 하고 싶지?"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「それは……はい、仰る通りです」"
translation = "「그것은…… 네, 말씀하신 대로입니다.」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「最近は師匠のおかげで友達も増えて……皆様がよく、私の料理を食べにやって来てくれるようになりました」"
translation = "「최근에는 스승님 덕분에 친구도 늘어서…… 여러분이 자주, 제 요리를 먹으러 찾아와 주시게 되었습니다.」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「友達が美味しいと喜んでくれるのが、私はとても嬉しくて。以前よりもずっと……料理の道を極めたいという気持ちが強くなりました」"
translation = "「친구들이 맛있다고 기뻐해 주는 것이, 저는 무척 기뻐서. 이전보다 훨씬 더…… 요리의 길을 극한까지 가고 싶다는 마음이 강해졌습니다.」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「ですが……同時に私は、師匠やサーシャ先輩達に、申し訳ないとも感じてしまうのです」"
translation = "「하지만…… 동시에 저는, 스승님이나 사샤 선배님들께, 죄송하다고도 느끼게 됩니다.」"

[[dialogue]]
speaker = "unk"
original = "それは蛍火が、元星徒会メンバーだから？"
translation = "그건 호타루비가, 전 성도회 멤버라서?"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「はい。自惚れかもしれませんが……少なくとも、私は星徒会に入れるだけの力を持っています」"
translation = "「네. 자만일지도 모르겠습니다만…… 적어도, 저는 성도회에 들어갈 만한 힘을 가지고 있습니다.」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「最前線で戦えるだけの力がある。だというのに、今の私は後方支援ばかりで……」"
translation = "「최전선에서 싸울 수 있는 힘이 있다. 그런데도, 지금의 저는 후방 지원뿐이라서……」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「私はやるべきことから、目を背けているのではないかと……どうしても考えてしまうのです」"
translation = "「저는 해야 할 일로부터, 눈을 돌리고 있는 것이 아닌가 하고…… 아무래도 생각하게 됩니다.」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「何より、友達になってくれた、師匠や星徒会の皆様が命をかけて戦っているのに、私は……」"
translation = "「무엇보다, 친구가 되어준 스승님이나 성도회의 여러분이 목숨을 걸고 싸우고 있는데, 저는……」"

[[dialogue]]
speaker = "unk"
original = "何も間違ってないと思う"
translation = "아무것도 틀리지 않았다고 생각해."

[[dialogue]]
speaker = "unk"
original = "俺は蛍火が料理人を目指すのは……"
translation = "나는 호타루비가 요리사를 목표로 하는 것은……"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「師匠……？」"
translation = "「스승님……?」"

[[dialogue]]
speaker = "unk"
original = "──確かに、蛍火の高い戦闘力は貴重なものだ。"
translation = "──확실히, 호타루비의 높은 전투력은 귀중한 것이다."

[[dialogue]]
speaker = "unk"
original = "星徒会に戻って来てくれたら、こんなに心強いことはないだろう。"
translation = "성도회로 돌아와 준다면, 이보다 든든한 일은 없을 것이다."

[[dialogue]]
speaker = "unk"
original = "しかしそれでも、星徒会役員やプリマステラが１人多く出動したところで、倒せるモンスターやアステラの数には限度がある。"
translation = "하지만 그럼에도, 성도회 임원이나 프리마스텔라가 한 명 더 출동한다고 해서, 쓰러뜨릴 수 있는 몬스터나 아스테라의 수에는 한계가 있다."

[[dialogue]]
speaker = "unk"
original = "一方で、凄腕料理人が星騎士みんなの料理を作ってくれて、栄養ある料理で肉体をサポートし、美味しい料理でモチベーションをあげてくれたら、どうだろうか。"
translation = "한편으로, 실력 있는 요리사가 성기사 모두의 요리를 만들어 주고, 영양가 있는 요리로 육체를 서포트하며, 맛있는 요리로 동기부여를 해준다면, 어떨까."

[[dialogue]]
speaker = "unk"
original = "たった１人の力で何十、何百という星騎士を支えることが出来る。"
translation = "「단 한 명의 힘으로 수십, 수백 명이나 되는 성기사를 지탱할 수 있어.」"

[[dialogue]]
speaker = "unk"
original = "蛍火が料理人を目指すことと、世界を救う助けになることは、何も矛盾していない。"
translation = "「호타루비가 요리사를 목표로 하는 것과, 세계를 구하는 데 도움이 되는 것은 아무런 모순이 없어.」"

[[dialogue]]
speaker = "unk"
original = "……この世界を救って欲しい"
translation = "「……이 세계를 구해주길 바라.」"

[[dialogue]]
speaker = "unk"
original = "──だから、蛍火は迷わず料理の腕を磨くことで、"
translation = "「──그러니까, 호타루비는 망설임 없이 요리 실력을 연마하는 것으로,」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「料理でリクリエから世界を救う……」"
translation = "「요리로 리크리에로부터 세계를 구한다……」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「そんなこと、今まで考えたこともありませんでした」"
translation = "「스승님……?」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「果たして私にそれが出来るのか、今はまだ自信はありませんが──」"
translation = "「──과연 저에게 그런 일이 가능할지, 지금은 아직 자신은 없지만──」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「少し、真面目に考えてみようと思いますっ」"
translation = "「조금, 진지하게 생각해 보려고 합니다!」"

[[dialogue]]
speaker = "unk"
original = "その間、最前線は俺たちに任せてくれ"
translation = "「그동안, 최전선은 우리에게 맡겨줘.」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「はい、師匠っ。………………あっ」"
translation = "「네, 스승님. ………………앗.」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「……い、いえ、何でもありません。ちょっとしたことに気付いただけですので……」"
translation = "「……아, 아니요, 아무것도 아니에요. 사소한 것을 깨달았을 뿐이라서……」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "（今、最前線を任せろと言われて、すんなり受け入れることが出来ました）"
translation = "(지금, 최전선을 맡기라는 말을 듣고, 순순히 받아들일 수 있었어요.)"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "（私は師匠の弟子で、友達で……それ以上に──）"
translation = "(나는 스승님의 제자이자, 친구이고…… 그 이상으로──)"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "（私はいつの間にか貴方様のことを、心から信じられるくらい……お慕いするようになっていたのですね）"
translation = "(나는 어느샌가 당신을, 진심으로 믿을 수 있을 정도로…… 연모하게 되었나 보네요.)"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「……ふえっ！？\u3000か、顔が赤い、ですか？\u3000こ、これはちょっと……考えすぎて頭に血が昇っただけですのでっ」"
translation = "「……후에!? 어, 얼굴이 붉다, 고요? 이, 이건 좀…… 너무 생각에 잠겨서 머리에 피가 쏠린 것뿐이니까요!」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「あ、あの……師匠っ。その──」"
translation = "「저, 저기…… 스승님. 그──」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「これからも末永く、よろしくお願い致しますねっ」"
translation = "「앞으로도 오래도록, 잘 부탁드릴게요!」"

[[dialogue]]
speaker = "unk"
original = "蛍火はそう言うと、初めて友達になった時のように、手を差し出す。"
translation = "호타루비는 그렇게 말하며, 처음 친구가 되었을 때처럼 손을 내민다."

[[dialogue]]
speaker = "unk"
original = "もちろん！"
translation = "물론이지!"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「は、はい！\u3000……ふふっ」"
translation = "「네, 네! ……후훗.」"

[[dialogue]]
speaker = "unk"
original = "改めて握手すると、蛍火は照れつつも。"
translation = "새삼스럽게 악수를 나누자, 호타루비는 수줍어하면서도."

[[dialogue]]
speaker = "unk"
original = "久しぶりに明るい笑顔を見せてくれるのだった。"
translation = "오랜만에 밝은 미소를 보여주는 것이었다."

