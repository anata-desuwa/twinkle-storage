[[dialogue]]
speaker = "unk"
original = "第９話,アルタイルのレティシア,B"
translation = "제9화, 알타이르의 레티시아, B"

[[dialogue]]
speaker = "レティシア"
original = "「──つまらない昔話はこれで終わり」"
translation = "「──지루한 옛날이야기는 이걸로 끝.」"

[[dialogue]]
speaker = "レティシア"
original = "「これで夜間外出と、セレスティアを持ち出した罰は私だけにしてくれる？\u3000グレイスが落ち込むようなことはしないであげて」"
translation = "「이걸로 야간 외출과 셀레스티아를 가지고 나간 벌은 나만 받는 걸로 해줄래? 그레이스가 낙담할 만한 짓은 하지 말아줘.」"

[[dialogue]]
speaker = "unk"
original = "あまりにも凄惨な、レティシアの過去──"
translation = "너무나도 처참한 레티시아의 과거──"

[[dialogue]]
speaker = "unk"
original = "その話を聞いたことで、彼女がセレスティアを持ち出した理由にも、おおよその見当がついた気がした。"
translation = "그 이야기를 들음으로써 그녀가 셀레스티아를 가지고 나온 이유도 대략 짐작이 가는 기분이 들었다."

[[dialogue]]
speaker = "unk"
original = "サーシャさんに目配せをすると、彼女も同じ様子だった。"
translation = "사샤 씨에게 눈짓을 하자 그녀도 같은 표정이었다."

[[dialogue]]
speaker = "サーシャ"
original = "「会長くん。ここはお姉ちゃんに任せてもらえる？」"
translation = "「회장 군. 여기는 이 언니에게 맡겨줄래?」"

[[dialogue]]
speaker = "クロト"
original = "「……ええ」"
translation = "「……네.」"

[[dialogue]]
speaker = "サーシャ"
original = "「ねえレティシアちゃん。ルヴィネちゃんはいつも、あなたにどんな命令をしていたのかしら？」"
translation = "「저기 레티시아짱. 루비네짱은 평소에 너에게 어떤 명령을 했니?」"

[[dialogue]]
speaker = "レティシア"
original = "「……たくさんあるわ。数え切れないくらい」"
translation = "「……많아. 셀 수 없을 정도로.」"

[[dialogue]]
speaker = "レティシア"
original = "「『星騎士として人々を守りなさい』、『困っている人がいたら助けなさい』……」"
translation = "「『성기사로서 사람들을 지켜라』, 『곤란한 사람이 있으면 도와줘라』……」"

[[dialogue]]
speaker = "レティシア"
original = "「『任務のために危険を冒すことがあっても、あまり無理はしないこと』。それから……」"
translation = "「『임무를 위해 위험을 무릅쓰는 일이 있어도 너무 무리는 하지 말 것』. 그리고……」"

[[dialogue]]
speaker = "レティシア"
original = "「『健康に気を付けなさい』。『怪我や病気をした時に隠してはダメ』。『よく食べて、よく寝なさい』」"
translation = "「『건강에 유의해라』. 『부상이나 병이 났을 때 숨기면 안 돼』. 『잘 먹고 잘 자라』.」"

[[dialogue]]
speaker = "レティシア"
original = "「『やることがわからない時は、年長者としてみんなのお世話をしなさい』。『ただしグレイスを甘やかすのは１日に３回まで』……まだまだあるわ」"
translation = "「『할 일을 모를 때는 연장자로서 모두를 돌봐줘라』. 『단, 그레이스를 응석받아 주는 건 하루에 세 번까지』…… 아직 더 있어.」"

[[dialogue]]
speaker = "サーシャ"
original = "「命を捨ててこいとか。転送装置を暴走させて自爆しなさい、とか……そういう命令はないのね」"
translation = "「목숨을 버리고 와라라든가, 전송 장치를 폭주시켜 자폭해라든가…… 그런 명령은 없구나.」"

[[dialogue]]
speaker = "レティシア"
original = "「ええ。ルヴィは賢いのに、そういう命令だけは絶対に私にしないの……どうしてかしら？」"
translation = "「응. 루비는 현명한데 그런 명령만큼은 절대로 나에게 하지 않아…… 왜일까?」"

[[dialogue]]
speaker = "サーシャ"
original = "「そんなのわかりきってる。あなたに生きていて欲しい……それ以外にないじゃない」"
translation = "「그거야 뻔하지. 네가 살아있길 바라는 거야…… 그 외에는 없잖아.」"

[[dialogue]]
speaker = "サーシャ"
original = "「話を聞くほど、ルヴィネちゃんのことがよくわからなくなってくる。リクリエを起こそうとしているのに……あなたたちへの態度は本当に愛情深い」"
translation = "「이야기를 들을수록 루비네짱에 대해 잘 모르게 되네. 리크리에를 일으키려 하고 있는데…… 너희를 대하는 태도는 정말 애정 깊구나.」"

[[dialogue]]
speaker = "レティシア"
original = "「だから言っているでしょう？\u3000ルヴィはリクリエの側なんかじゃない」"
translation = "「그러니까 말하잖아? 루비는 리크리에 편 같은 게 아니야.」"

[[dialogue]]
speaker = "レティシア"
original = "「私は、何があってもあなたたちを否定するわ。私はルヴィのために働いて、デネブが存続する未来を掴み取る。極星学園のみんなと一緒に」"
translation = "「나는 무슨 일이 있어도 당신들을 부정할 거야. 나는 루비를 위해 일해서 데네브가 존속하는 미래를 거머쥐겠어. 극성학원 모두와 함께.」"

[[dialogue]]
speaker = "サーシャ"
original = "「残念だけど、それは無理よ」"
translation = "「유감이지만 그건 무리야.」"

[[dialogue]]
speaker = "サーシャ"
original = "「ルヴィネちゃんは、このままだと死んでしまう。あなたたちの目の前で」"
translation = "「루비네짱은 이대로라면 죽고 말아. 너희 눈앞에서.」"

[[dialogue]]
speaker = "レティシア"
original = "「……どういう意味？\u3000ルヴィは死なない。私が守るわ」"
translation = "「……무슨 뜻이야? 루비는 죽지 않아. 내가 지킬 거야.」"

[[dialogue]]
speaker = "サーシャ"
original = "「そうはならないの。私たちの仲間に、未来の可能性を視通す特別な『眼』をもった子がいる」"
translation = "「그렇게 되지 않아. 우리 동료 중에 미래의 가능성을 내다보는 특별한 『안』을 가진 아이가 있어.」"

[[dialogue]]
speaker = "サーシャ"
original = "「ルヴィネちゃんが死ぬ未来を、その子が視たの」"
translation = "「루비네짱이 죽는 미래를 그 아이가 봤어.」"

[[dialogue]]
speaker = "unk"
original = "サーシャさんが伝えた真実は、レティシアに一蹴されるとばかり思っていた。しかし──"
translation = "사샤 씨가 전한 진실을 레티시아가 단칼에 거절할 것이라 생각했다. 하지만──"

[[dialogue]]
speaker = "レティシア"
original = "「天機の星眼……？」"
translation = "「천기의 성안……?」"

[[dialogue]]
speaker = "クロト"
original = "「……！\u3000君は、ジグの力を知っているのか」"
translation = "「……! 너, 지그의 힘을 알고 있는 거야?」"

[[dialogue]]
speaker = "レティシア"
original = "「少し前に、デネブで会ったことがある。チナがアルタイルへ襲撃に行く前日だったわ」"
translation = "「조금 전에 데네브에서 만난 적이 있어. 치나가 알타이르로 습격하러 가기 전날이었지.」"

[[dialogue]]
speaker = "ジグ"
original = "「いきなり背中から斬りかかるだなんて、随分なご挨拶だね？」"
translation = "「갑자기 등 뒤에서 베어오다니, 꽤 거창한 인사네?」"

[[dialogue]]
speaker = "レティシア"
original = "「あら。不法侵入者には妥当な対応じゃないかしら。星徒会室は関係者以外、立ち入り禁止よ」"
translation = "「어머. 불법 침입자에게는 타당한 대응 아닐까. 성도회실은 관계자 외 출입 금지야.」"

[[dialogue]]
speaker = "ジグ"
original = "「そう邪険にしないで欲しいなぁ。君のボスから呼び出されたというのに」"
translation = "「그렇게 박대하지 말아줬으면 좋겠는데. 네 보스에게 호출받았는데 말이야.」"

[[dialogue]]
speaker = "レティシア"
original = "「……ルヴィが？」"
translation = "「……루비가?」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「レティシア、彼女は客人よ。一応ね」"
translation = "「레티시아, 그녀는 손님이야. 일단은 말이지.」"

[[dialogue]]
speaker = "レティシア"
original = "「そうなのね。これは失礼したわ」"
translation = "「그렇구나. 이거 실례했네.」"

[[dialogue]]
speaker = "ジグ"
original = "「……まったく。部下の教育くらいしておいてくれるかい？\u3000とりあえず頼まれていた用件はすんだよ」"
translation = "「……정말이지. 부하 교육 정도는 해두라고? 일단 부탁받았던 용건은 끝났어.」"

[[dialogue]]
speaker = "ジグ"
original = "「香堂チナ、だっけ？\u3000あの子の可能性を調べておいた。今回のアルタイル襲撃では死なないようだよ」"
translation = "「코도 치나, 라고 했나? 그 아이의 가능성을 조사해 뒀어. 이번 알타이르 습격에서는 죽지 않는 모양이야.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「……そう」"
translation = "「……그래.」"

[[dialogue]]
speaker = "ジグ"
original = "「だからもう少し、お尻を叩いてあげた方がいいんじゃないかな？」"
translation = "「그러니 조금 더 엉덩이를 두드려 주는 게 좋지 않을까?」"

[[dialogue]]
speaker = "ジグ"
original = "「刺し違えてでも戦果をあげて来い、とでも言ってあげた方が、現場の士気もあがるってものだよ」"
translation = "「동귀어진해서라도 전과를 올리고 오라고 말해주는 편이 현장의 사기도 오를 텐데 말이야.」"

[[dialogue]]
speaker = "ジグ"
original = "「いっそのこと、アルタイルに着いたら即座に転送装置を自爆させるよう、指示を出してみては？\u3000色々手っ取り早いと思うよ」"
translation = "「차라리 알타이르에 도착하면 즉시 전송 장치를 자폭시키라고 지시를 내려보는 건 어때? 여러모로 빠를 것 같은데.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「転送装置は貴重なの。余計なお節介はやめなさい」"
translation = "「전송 장치는 귀중해. 쓸데없는 참견은 그만둬.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「チナの未来がわかったのなら、あなたへの用件は終わりよ。さっさと帰って」"
translation = "「치나의 미래를 알았다면 당신에게 볼일은 끝이야. 어서 돌아가.」"

[[dialogue]]
speaker = "ジグ"
original = "「使い走りにしたうえ、お茶も出さないなんてね……まあいいさ。それじゃあ、お暇しようかな」"
translation = "「심부름까지 시켜놓고 차 한 잔 안 내주다니 말이야…… 뭐 좋아. 그럼 이만 실례할까.」"

[[dialogue]]
speaker = "レティシア"
original = "「ルヴィ、彼女は何者なのかしら？\u3000極星の星騎士ではなかったようだけれど……」"
translation = "「루비, 그녀는 누구야? 극성의 성기사는 아니었던 것 같은데……」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「平行世界ベガの生き残りよ。今は利害が一致しているから、好意的に捉えれば『協力者』と言ったところかしら」"
translation = "「평행세계 베가의 생존자야. 지금은 이해관계가 일치하니까 호의적으로 보면 『협력자』라고 할 수 있겠네.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「ただ、信用はできない相手よ。デネブを守るために戦っているわけではないもの」"
translation = "「다만 신용할 수 없는 상대야. 데네브를 지키기 위해 싸우는 게 아니니까.」"

[[dialogue]]
speaker = "レティシア"
original = "「──『チナの可能性を調べた』、というのは？」"
translation = "「──『치나의 가능성을 조사했다』는 건?」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「彼女にはそういう力があるの。レティシア、少しとはいえ剣を交えたのでしょう。どう思ったかしら？」"
translation = "「그녀에게는 그런 힘이 있어. 레티시아, 조금이지만 검을 섞어봤지. 어떻게 생각했니?」"

[[dialogue]]
speaker = "レティシア"
original = "「妙な相手だったわ。私が何をするのか、わかった上で動いてるような……」"
translation = "「묘한 상대였어. 내가 무엇을 할지 알고 움직이는 듯한……」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「上出来よ。彼女は未来の可能性を視る眼をもっている」"
translation = "「훌륭해. 그녀는 미래의 가능성을 보는 눈을 가졌어.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「『天機の星眼』というらしいわ……その眼でチナの可能性を調べて、未来の無事を確認するために呼び出したの」"
translation = "「『천기의 성안』이라고 부르는 모양이야…… 그 눈으로 치나의 가능성을 조사해서 미래의 무사를 확인하기 위해 불러낸 거야.」"

[[dialogue]]
speaker = "レティシア"
original = "「そんなに不安なら、私がアルタイル襲撃を代わってもいいのに」"
translation = "「그렇게 불안하면 내가 알타이르 습격을 대신해도 되는데.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「レティシアには他にしてもらいたいことがあるわ。あと……今日のことは、みんなには言わないでおいてくれるかしら？」"
translation = "「레티시아에게는 따로 시키고 싶은 일이 있어. 그리고…… 오늘 일은 모두에게 말하지 말아 줄래?」"

[[dialogue]]
speaker = "レティシア"
original = "「その方がルヴィにとって都合がいいのなら。内緒にしておくわ」"
translation = "「그게 루비에게 형편이 좋다면 비밀로 해둘게.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「ありがとう。バタフライエフェクトではないけれど、誰かに言えば未来が変わってしまう可能性もある。だからチナの安全のためにも、お願いね」"
translation = "「고마워. 나비 효과까지는 아니지만 누군가에게 말하면 미래가 바뀔 가능성도 있어. 그러니 치나의 안전을 위해서라도 부탁해.」"

[[dialogue]]
speaker = "レティシア"
original = "「天機の星眼はそういう力を持つと、ルヴィは確かに言っていた……」"
translation = "「천기의 성안은 그런 힘을 가졌다고 루비는 분명히 말했어……」"

[[dialogue]]
speaker = "レティシア"
original = "「──どういうこと？\u3000ルヴィが死ぬ未来を視た？\u3000それを私に教えて……何がしたいの……？」"
translation = "「──어떻게 된 거야? 루비가 죽는 미래를 봤다고? 그걸 나에게 알려줘서…… 뭘 하고 싶은 거야……?」"

[[dialogue]]
speaker = "レティシア"
original = "「あなたたちは敵……そんな未来を視たのなら、都合がいいはず、でしょう……？」"
translation = "「당신들은 적…… 그런 미래를 봤다면 형편이 좋을 텐데, 그렇지……?」"

[[dialogue]]
speaker = "レティシア"
original = "「アルタイルを滅ぼすと言ってるルヴィが死ぬことは、あなたたちにとって歓迎すべきこと……のはず」"
translation = "「알타이르를 멸망시키겠다고 말하는 루비가 죽는 것은 당신들에게 환영할 만한 일……일 텐데.」"

[[dialogue]]
speaker = "レティシア"
original = "「言えば未来が変わる。アルタイルにとって都合のいい未来を知ったのに、それを変えようとするだなんて……」"
translation = "「말하면 미래가 바뀌어. 알타이르에게 유리한 미래를 알았는데 그걸 바꾸려 하다니……」"

[[dialogue]]
speaker = "クロト"
original = "「何度でも言う──俺たちの目的はリクリエを止めることであって、ルヴィネを倒すことじゃない」"
translation = "「몇 번이고 말하겠어── 우리 목적은 리크리에를 멈추는 것이지 루비네를 쓰러뜨리는 게 아니야.」"

[[dialogue]]
speaker = "クロト"
original = "「ルヴィネは『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』に最も近しい存在だ。神と対話するにせよ、戦うにせよ……ルヴィネが亡くなることは俺たちにとっても痛手なんだ」"
translation = "「루비네는 『<ruby>XELOS<rt>제로스</rt></ruby>』에 가장 가까운 존재다. 신과 대화하든 싸우든…… 루비네가 죽는 것은 우리에게도 타격이야.」"

[[dialogue]]
speaker = "クロト"
original = "「ただ戦いに備えるだけでは、いずれルヴィネの死亡が確定してしまう。それを避けるために、新しい可能性を切り開かなくちゃならない」"
translation = "「그저 싸움에 대비하기만 해서는 언젠가 루비네의 사망이 확정되고 말아. 그것을 피하기 위해 새로운 가능성을 개척해야만 해.」"

[[dialogue]]
speaker = "クロト"
original = "「未来を変える可能性が最も高いのが、ルヴィネの幼なじみである極星星徒会との協力だと考えている」"
translation = "「미래를 바꿀 가능성이 가장 높은 것이 루비네의 소꿉친구인 극성성도회와의 협력이라고 생각하고 있어.」"

[[dialogue]]
speaker = "クロト"
original = "「アルタイルに<ruby>与<rt>くみ</rt></ruby>しろ、というわけじゃない。一時的な共闘でいい……」"
translation = "「알타이르에 가담하라는 게 아니야. 일시적인 공투라도 좋아……」"

[[dialogue]]
speaker = "クロト"
original = "「少しでも怪しいところを感じたら……その時は俺を、背中から斬ってくれて構わない。だから、頼む」"
translation = "「조금이라도 수상한 구석이 느껴진다면…… 그때는 나를 등 뒤에서 베어도 상관없어. 그러니까 부탁한다.」"

[[dialogue]]
speaker = "クロト"
original = "「ルヴィネを生かしたままリクリエを止めるために、俺たちと共同戦線を張ってくれないか」"
translation = "「루비네를 살려둔 채 리크리에를 멈추기 위해 우리와 공동 전선을 펴주지 않겠나.」"

[[dialogue]]
speaker = "unk"
original = "再び、長い沈黙が訪れる。"
translation = "다시 긴 침묵이 찾아온다."

[[dialogue]]
speaker = "unk"
original = "けれど今回の沈黙は、以前までとは違っていた。レティシアの迷いがはっきりと見えていた。"
translation = "하지만 이번 침묵은 이전까지와는 달랐다. 레티시아의 망설임이 뚜렷하게 보였다."

[[dialogue]]
speaker = "レティシア"
original = "「……あ、あなたたちは、私を騙そうとしている？\u3000本当はルヴィが勝つ未来を視ているから、それを変えようとして……」"
translation = "「……다, 당신들은 나를 속이려 하고 있어? 사실은 루비가 이기는 미래를 보고 있으니까 그걸 바꾸려고……」"

[[dialogue]]
speaker = "サーシャ"
original = "「そういう慎重な考え方、嫌いじゃないけれど。あり得ないってわかるでしょう？」"
translation = "「그런 신중한 생각, 싫어하지 않지만. 불가능하다는 건 알잖아?」"

[[dialogue]]
speaker = "レティシア"
original = "「……そう、ね。だって、ルヴィが勝つ未来を視たのだとしたら……あの子の隣には、必ず私がいるもの……」"
translation = "「……그렇, 네. 만약 루비가 이기는 미래를 봤다면…… 그 아이 곁에는 반드시 내가 있을 테니까……」"

[[dialogue]]
speaker = "レティシア"
original = "「ルヴィとの戦いの脅威を減らすなら……私を懐柔なんてしなくていい……閉じ込めるなり、殺すなり……いくらでもチャンスはあるのに……」"
translation = "「루비와의 싸움의 위협을 줄이려면…… 나를 회유할 필요 따위 없어…… 가두든 죽이든…… 얼마든지 기회는 있는데……」"

[[dialogue]]
speaker = "レティシア"
original = "「最初からあなたたちはおかしい……ベアトたちだけじゃない。私までデネブへ連れていくって、ルヴィの説得を手伝ってくれって、そればかり……」"
translation = "「처음부터 당신들은 이상해…… 베아토 일행뿐만 아니라 나까지 데네브로 데려가겠다고, 루비의 설득을 도와달라고, 그것뿐……」"

[[dialogue]]
speaker = "レティシア"
original = "「わからない……わからなく、なってきた……どうしてルヴィはここにいないの？\u3000あの子が命令してくれれば、私は納得、できるのに」"
translation = "「모르겠어…… 모르게, 되어버렸어…… 왜 루비는 여기 없는 거야? 그 아이가 명령해 주면 나는 납득할 수 있는데.」"

[[dialogue]]
speaker = "サーシャ"
original = "「いない以上、あなたが決めるしかないわ。ルヴィネちゃんのためにも、あなた自身が変わらなくちゃ」"
translation = "「없는 이상 네가 결정할 수밖에 없어. 루비네짱을 위해서라도 너 자신이 변해야 해.」"

[[dialogue]]
speaker = "レティシア"
original = "「無理よ……私は『空っぽ』なの。命令されないと、動けない……正しいことが、わからない……」"
translation = "「무리야…… 나는 『텅 비어』 있어. 명령받지 않으면 움직일 수 없어…… 옳은 것을 모르겠어……」"

[[dialogue]]
speaker = "サーシャ"
original = "「そんなことはないわ。だってあなたは今、セレスティアを持ってここにいるんだから」"
translation = "「그렇지 않아. 왜냐하면 너는 지금 셀레스티아를 가지고 여기 있으니까.」"

[[dialogue]]
speaker = "レティシア"
original = "「どういう、こと……？」"
translation = "「무슨, 소리야……?」"

[[dialogue]]
speaker = "サーシャ"
original = "「ルヴィネちゃんの元へ帰るために盗んだわけじゃないんでしょう？\u3000他の極星の子たちに声かけせずに抜け出したのだから、それは違うわ」"
translation = "「루비네짱 곁으로 돌아가기 위해 훔친 게 아니잖아? 다른 극성 아이들에게 말도 없이 빠져나왔으니까 그건 아니야.」"

[[dialogue]]
speaker = "レティシア"
original = "「じゃあ──私はなぜ？\u3000わからない……教えて頂戴……」"
translation = "「그럼── 나는 왜? 모르겠어…… 알려줘……」"

[[dialogue]]
speaker = "サーシャ"
original = "「想像はできても、教えることはできないわ。それじゃあ今までと同じだもの」"
translation = "「상상은 할 수 있어도 가르쳐 줄 수는 없어. 그러면 지금까지와 똑같으니까.」"

[[dialogue]]
speaker = "サーシャ"
original = "「あなたは自分に意思がないと思っているだけ。意思を持っても意味がないと思ってしまっているだけ……そう思うの」"
translation = "「너는 자신에게 의지가 없다고 생각하고 있을 뿐이야. 의지를 가져도 의미가 없다고 생각해 버리고 있을 뿐…… 그렇게 생각해.」"

[[dialogue]]
speaker = "サーシャ"
original = "「たくさんの不幸で隠されてしまっているけれど、確かに心の根っこには、あなた自身の気持ちや優しさがあるはずよ」"
translation = "「수많은 불행에 가려져 있지만 분명 마음 뿌리에는 너 자신의 마음이나 상냥함이 있을 거야.」"

[[dialogue]]
speaker = "サーシャ"
original = "「だってそうでないと──星力に目覚めるわけがない」"
translation = "「그렇지 않으면── 성력에 눈뜰 리가 없으니까.」"

[[dialogue]]
speaker = "レティシア"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "サーシャ"
original = "「あなたの変化がルヴィネちゃんを救うかもしれない。自分の思いを、言葉にする練習をしてみるべきだわ」"
translation = "「네 변화가 루비네짱을 구할지도 몰라. 자신의 생각을 말로 표현하는 연습을 해봐야 해.」"

[[dialogue]]
speaker = "サーシャ"
original = "「それくらいは、試してみてもいいんじゃないかしら？」"
translation = "「그 정도는 시도해 봐도 괜찮지 않을까?」"

[[dialogue]]
speaker = "サーシャ"
original = "「私たちが嘘の未来を教えて、あなたを騙している──そう確信したら迷わず斬ればいいだけ。損はないはずよ」"
translation = "「우리가 거짓 미래를 알려주고 너를 속이고 있다── 그렇게 확신하면 망설임 없이 베면 될 뿐이야. 손해 볼 건 없잖아.」"

[[dialogue]]
speaker = "サーシャ"
original = "「だから、言葉にしてみて」"
translation = "「그러니까 말로 표현해 봐.」"

[[dialogue]]
speaker = "サーシャ"
original = "「自分の心の底を、ちゃんと覗いて」"
translation = "「네 마음속 깊은 곳을 제대로 들여다봐.」"

[[dialogue]]
speaker = "サーシャ"
original = "「あなたはどうして、セレスティアを盗んでまで脱走したの……？」"
translation = "「너는 왜 셀레스티아를 훔치면서까지 탈주한 거니……?」"

[[dialogue]]
speaker = "レティシア"
original = "「私が……セレスティアを持って、抜け出したのは……」"
translation = "「내가…… 셀레스티아를 가지고, 빠져나온 건……」"

[[dialogue]]
speaker = "レティシア"
original = "「戦うかもしれないって……思った、から……？」"
translation = "「싸우게 될지도 모른다고…… 생각, 했으니까……?」"

[[dialogue]]
speaker = "サーシャ"
original = "「誰と？」"
translation = "「누구랑?」"

[[dialogue]]
speaker = "レティシア"
original = "「…………神聖、ヴァジュラ教団の、信者たち、と……？」"
translation = "「…………신성, 바주라 교단의, 신도들, 과……?」"

[[dialogue]]
speaker = "サーシャ"
original = "「ずいぶん危ない所に行こうとしていたのね。どうして？」"
translation = "「상당히 위험한 곳에 가려고 했었구나. 어째서?」"

[[dialogue]]
speaker = "unk"
original = "『どうして』と訊ねられたレティシアは、<ruby>縋<rt>すが</rt></ruby>るように俺とサーシャさんに目を向ける。"
translation = "『어째서』라고 질문받은 레티시아는, 매달리듯이 나와 사샤 씨에게 눈길을 보낸다."

[[dialogue]]
speaker = "unk"
original = "……こんな時、ルヴィネは助け船を出してあげていたんだろう。俺よりも年上のはずのレティシアが、今はとても幼く見える。"
translation = "……이럴 때, 루비네는 도움의 손길을 내밀어 주었겠지. 나보다 연상일 레티시아가, 지금은 무척 어린아이처럼 보인다."

[[dialogue]]
speaker = "サーシャ"
original = "「続けて？\u3000ゆっくりでいいわ」"
translation = "「계속해 볼래? 천천히 해도 괜찮아.」"

[[dialogue]]
speaker = "レティシア"
original = "「どうしてって……だって、私は……」"
translation = "「어째서냐니…… 그치만, 나는……」"

[[dialogue]]
speaker = "レティシア"
original = "「あの時、私は……昔の、私は…………」"
translation = "「그때, 나는…… 예전의, 나는…………」"

[[dialogue]]
speaker = "レティシア"
original = "「ずっと……誰かに助けて欲しいって、思ってた、から……」"
translation = "「계속…… 누군가 도와줬으면 좋겠다고, 생각했었, 으니까……」"

[[dialogue]]
speaker = "レティシア"
original = "「大人が、みんな怖かった……私を見ているはずなのに、どこを見ているのかわからない、目をしていて……」"
translation = "「어른들이, 모두 무서웠어…… 나를 보고 있을 텐데도, 어디를 보고 있는지 알 수 없는, 눈을 하고 있어서……」"

[[dialogue]]
speaker = "レティシア"
original = "「両親を亡くしたばかりの、ぬいぐるみも手離せないような、小さい子供をさらってきて……おかしなことばかり、教えて……」"
translation = "「부모님을 막 잃은, 인형도 손에서 놓지 못하는, 어린아이를 납치해 와서…… 이상한 것들만, 가르치고……」"

[[dialogue]]
speaker = "レティシア"
original = "「この世界は過ちに満ちている……星騎士は災いの象徴だ……星見家は穢れた血を引く悪魔の家系だ……そんなことばかり……」"
translation = "「이 세계는 과오로 가득 차 있다…… 성기사는 재앙의 상징이다…… 호시미 가문은 더러운 피를 이어받은 악마의 가계다…… 그런 소리만……」"

[[dialogue]]
speaker = "レティシア"
original = "「アルタイルに来て……ナミエルの、歩き方を見て……『こっちの世界にもあいつらはいる』。そう思ったら……眠れなくて……」"
translation = "「알타이르에 와서…… 나미엘의, 걷는 모습을 보고…… 『이쪽 세계에도 그놈들이 있어』. 그렇게 생각하니까…… 잠이 안 와서……」"

[[dialogue]]
speaker = "レティシア"
original = "「私や、ナミエルみたいな、可哀想な子がいたら……どうしよう……」"
translation = "「나나, 나미엘 같은, 불쌍한 아이가 있다면…… 어쩌지……」"

[[dialogue]]
speaker = "レティシア"
original = "「助けなきゃ。助けて、あげなきゃって……」"
translation = "「구해줘야 해. 구해, 줘야 한다고……」"

[[dialogue]]
speaker = "レティシア"
original = "「あの日、私を救い出してくれた、ルヴィみたいに……」"
translation = "「그날, 나를 구해준, 루비처럼……」"

[[dialogue]]
speaker = "サーシャ"
original = "「あったじゃない──あなたの心の中身」"
translation = "「있었잖아── 네 마음의 진심이.」"

[[dialogue]]
speaker = "レティシア"
original = "「…………え？」"
translation = "「…………에?」"

[[dialogue]]
speaker = "サーシャ"
original = "「あなたが仲間や自分の世界を守るのは、ルヴィネちゃんに命令されたから……でもそれだけじゃないわ」"
translation = "「네가 동료나 자신의 세계를 지키는 건, 루비네짱에게 명령받았으니까…… 하지만 그것뿐만이 아니야.」"

[[dialogue]]
speaker = "サーシャ"
original = "「あなた自身が、『ルヴィネちゃんと同じように』心細い誰かを救いたいと思っているから」"
translation = "「너 자신이, 『루비네짱과 똑같이』 불안해하는 누군가를 구하고 싶어 하니까.」"

[[dialogue]]
speaker = "サーシャ"
original = "「自分と同じような目に遭っている子がいるなら、助けたいと思っているから──」"
translation = "「자신과 똑같은 처지에 놓인 아이가 있다면, 돕고 싶어 하니까──」"

[[dialogue]]
speaker = "サーシャ"
original = "「そういうあなた自身の意思があったから、規則を破ってまで抜け出したんじゃないかしら？」"
translation = "「그런 너 자신의 의지가 있었기에, 규칙을 어기면서까지 빠져나온 게 아닐까?」"

[[dialogue]]
speaker = "レティシア"
original = "「それは……でも、ルヴィに言われた、からで……」"
translation = "「그건…… 하지만, 루비가 시켜서, 그런 거고……」"

[[dialogue]]
speaker = "クロト"
original = "「気づいていないのか？\u3000君が守ろうとした『誰か』は、ルヴィネに命令されたデネブの民じゃない」"
translation = "「모르고 있는 거야? 네가 지키려 했던 『누군가』는, 루비네에게 명령받은 데네브의 백성이 아니야.」"

[[dialogue]]
speaker = "クロト"
original = "「アルタイルにいるかもしれない、自分と同じ境遇の『誰か』だ」"
translation = "「알타이르에 있을지도 모르는, 자신과 같은 처지의 『누군가』지.」"

[[dialogue]]
speaker = "レティシア"
original = "「それは…………」"
translation = "「그건…………」"

[[dialogue]]
speaker = "クロト"
original = "「だからレティシア。君は──『空っぽ』なんかじゃない」"
translation = "「그러니까 레티시아. 너는── 『텅 빈』 존재 같은 게 아니야.」"

[[dialogue]]
speaker = "unk"
original = "しばらく押し黙っていたレティシアだったが──"
translation = "한동안 입을 다물고 있던 레티시아였지만──"

[[dialogue]]
speaker = "レティシア"
original = "「出会ったばかりのあなたたちに何を言われても、響くわけがないと思ってたのに……」"
translation = "「방금 만난 당신들에게 무슨 말을 들어도, 와닿을 리 없다고 생각했는데……」"

[[dialogue]]
speaker = "レティシア"
original = "「もしそうだったら嬉しいって……思ってる自分がいて、驚いてる……」"
translation = "「만약 그렇다면 기쁠 거라고…… 생각하는 내가 있어서, 놀라워……」"

[[dialogue]]
speaker = "レティシア"
original = "「私が、あのルヴィみたいに……？\u3000もしそうだったら──」"
translation = "「내가, 그 루비처럼……? 만약 그렇다면──」"

[[dialogue]]
speaker = "レティシア"
original = "「……とても、素敵ね」"
translation = "「……무척, 멋지네.」"

[[dialogue]]
speaker = "レティシア"
original = "「勘違いしないで頂戴ね。私はあなたたちを信用したわけじゃない。でも……」"
translation = "「착각하지 말아 줘. 난 당신들을 신용하게 된 게 아니야. 하지만……」"

[[dialogue]]
speaker = "レティシア"
original = "「魔王の言うとおり、損はないわ。見極めてあげる。そして、信用に足らない時は……斬る」"
translation = "「마왕의 말대로, 손해 볼 건 없네. 지켜봐 주겠어. 그리고, 신용할 가치가 없을 때는…… 벨 거야.」"

[[dialogue]]
speaker = "クロト"
original = "「それでいい。でも俺は、敢えて言うよ──レティシア」"
translation = "「그걸로 됐어. 하지만 난, 감히 말할게── 레티시아.」"

[[dialogue]]
speaker = "クロト"
original = "「力を合わせて、ルヴィネを救おう」"
translation = "「힘을 합쳐서, 루비네를 구하자.」"

[[dialogue]]
speaker = "レティシア"
original = "「…………勝手に言っていなさい」"
translation = "「…………마음대로 말하시지.」"

[[dialogue]]
speaker = "サーシャ"
original = "「うふふ。ひとまずお話も落ち着いたし……レティシアちゃん。案内してくれる？」"
translation = "「우후후. 일단 이야기도 일단락됐고…… 레티시아짱. 안내해 줄래?」"

[[dialogue]]
speaker = "レティシア"
original = "「案内って……学園に帰るのではないの？」"
translation = "「안내라니…… 학원으로 돌아가는 게 아니었어?」"

[[dialogue]]
speaker = "サーシャ"
original = "「ここの地下には、悪～い教団があるのかもしれないんでしょう？\u3000だったら調べに行かないと～♪」"
translation = "「이곳 지하에는, 나~쁜 교단이 있을지도 모른다며? 그렇다면 조사하러 가야지~♪」"

[[dialogue]]
speaker = "クロト"
original = "「ええ。夜の散歩ついでに調査しましょう。はっきりさせないとぐっすり眠れない」"
translation = "「그래. 밤 산책 겸 조사하자고. 확실히 해두지 않으면 푹 잠들 수 없으니까.」"

[[dialogue]]
speaker = "レティシア"
original = "「……あなたたち、やっぱり変わってるわね」"
translation = "「……당신들, 역시 이상해.」"

[[dialogue]]
speaker = "レティシア"
original = "「本当に──お人好し」"
translation = "「정말로── 참견쟁이들.」"

[[dialogue]]
speaker = "unk"
original = "──翌日。"
translation = "──다음 날."

[[dialogue]]
speaker = "アナ"
original = "「会長。それにサーシャ先輩も、昨夜はお疲れ様です。大手柄でしたね」"
translation = "「회장님. 그리고 사샤 선배도, 어젯밤 수고하셨습니다. 큰 공을 세우셨네요.」"

[[dialogue]]
speaker = "unk"
original = "あの後、レティシアの案内で地下に潜った俺たちは、３人で<ruby>大捕物<rt>おおとりもの</rt></ruby>をすることになった。"
translation = "그 후, 레티시아의 안내로 지하에 잠입한 우리 세 사람은, 대대적인 검거 작전을 펼치게 되었다."

[[dialogue]]
speaker = "unk"
original = "平行世界デネブでは、ニュクス流星群発生の時にも、レティシアのいた教団があった──つまり。"
translation = "평행세계 데네브에서는, 닉스 유성우 발생 시기에도 레티시아가 있던 교단이 있었다── 즉."

[[dialogue]]
speaker = "unk"
original = "アルタイルの『神聖ヴァジュラ教団』は今も存続している可能性があると睨んでいたのだが……それが大当たりだったというわけだ。"
translation = "알타이르의 『신성 바주라 교단』은 지금도 존속하고 있을 가능성이 있다고 노리고 있었는데…… 그것이 적중했다는 뜻이다."

[[dialogue]]
speaker = "サーシャ"
original = "「ナミエルちゃんのいた組織は、数年前に星見家と九浄家が壊滅させたって聞いてたから、時系列がおかしいとは思ってたのよ～」"
translation = "「나미엘짱이 있던 조직은, 수년 전에 호시미 가문과 쿠죠 가문이 괴멸시켰다고 들었기에 시계열이 이상하다고 생각했었거든요~」"

[[dialogue]]
speaker = "unk"
original = "後からわかったことだが、ナミエルを暗殺者に仕立てた組織と神聖ヴァジュラ教団は兄弟のような関係で、組織的な繋がりがありつつも厳密には別の集団だった。"
translation = "나중에 알게 된 사실이지만, 나미엘을 암살자로 길러낸 조직과 신성 바주라 교단은 형제 같은 관계로, 조직적인 연결고리는 있으면서도 엄밀히는 별개의 집단이었다."

[[dialogue]]
speaker = "unk"
original = "そんなわけで、地下に潜伏していた教団信者は余さず確保。誘拐されていた子供たちも無事に保護することができた。"
translation = "그런 연유로, 지하에 잠복해 있던 교단 신자들은 남김없이 체포. 유괴되었던 아이들도 무사히 보호할 수 있었다."

[[dialogue]]
speaker = "アナ"
original = "「アルタイルのレティシアさんも無事に発見できてよかったです。道理で出生記録にないはずですね」"
translation = "「알타이르의 레티시아 씨도 무사히 발견해서 다행이에요. 어쩐지 출생 기록에 없더라니요.」"

[[dialogue]]
speaker = "アナ"
original = "「意識を取り戻すのは、しばらく先のことになると思いますが……」"
translation = "「의식을 되찾는 건, 한참 뒤의 일이 되겠지만요……」"

[[dialogue]]
speaker = "サーシャ"
original = "「それにしてもあの時のレティシアちゃん、とっても嬉しそうな顔をしていたわ」"
translation = "「그나저나 그때의 레티시아짱, 정말 기뻐 보이는 얼굴이었어.」"

[[dialogue]]
speaker = "サーシャ"
original = "「子供たちに泣きながら抱き着かれて、感謝されて……くすぐったそうにして～。うふふふ♪」"
translation = "「아이들에게 울면서 안기고, 감사 인사를 받고…… 간지러운 듯이 웃으면서~. 우후후후♪」"

[[dialogue]]
speaker = "unk"
original = "あの夜、教団の地下アジトでの救出劇……昏睡した自分自身をも見つけたレティシアには、多くの変化があったはず。"
translation = "그날 밤, 교단의 지하 아지트에서의 구출극…… 혼수상태인 자기 자신마저 발견한 레티시아에게는, 많은 변화가 있었을 것이다."

[[dialogue]]
speaker = "レティシア"
original = "『サーシャ？\u3000同伴をお願いするわ』"
translation = "『사샤? 동행을 부탁해.』"

[[dialogue]]
speaker = "サーシャ"
original = "「は～い。また訓練かしら～？」"
translation = "「네~에. 또 훈련일까나~?」"

[[dialogue]]
speaker = "レティシア"
original = "『グレイスがお菓子を作ってってうるさいのよ。買い物に行かせてくれる？』"
translation = "『그레이스가 과자를 만들어 달라고 시끄러워. 장 보러 가게 해줄래?』"

[[dialogue]]
speaker = "サーシャ"
original = "「うふふ♪\u3000りょうか～い<emoji=heart04>」"
translation = "「우후후♪ 알겠어~<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「というわけで会長くん。ちょっとお出かけしてくるわね？」"
translation = "「그런 고로 회장군. 잠깐 나갔다 올게?」"

[[dialogue]]
speaker = "unk"
original = "極星学園でも飛びぬけた戦力であるレティシアの助力が得られるのであれば、視えてしまった未来を動かすことができたかもしれない。"
translation = "극성학원에서도 뛰어난 전력인 레티시아의 조력을 얻을 수 있다면, 보이고 만 미래를 바꿀 수 있었을지도 모른다."

[[dialogue]]
speaker = "unk"
original = "とはいえ、ルヴィネを説得できればその時点でリクリエが解決するというものでもない。"
translation = "그렇다고는 해도, 루비네를 설득한다고 해서 그 시점에서 리크리에가 해결되는 것은 아니다."

[[dialogue]]
speaker = "unk"
original = "俺はこれまで以上に、決戦のための準備に駆け回るのだった──"
translation = "나는 그 어느 때보다도, 결전을 위한 준비로 분주히 뛰어다녔다──"

