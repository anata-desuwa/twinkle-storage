[[dialogue]]
speaker = "unk"
original = "第２話,幸せな未来を想像して,P"
translation = "제2화, 행복한 미래를 상상하며, P"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「歯ブラシ、お召し物、その他日用品……ふむ、これで大体の物は買い揃えましたか。他に何かご入り用な物はありますか？」"
translation = "「칫솔, 옷가지, 기타 생필품…… 흠, 이걸로 대충 물건은 다 갖춰졌나요. 그 밖에 필요한 물건이 더 있습니까?」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「将来のための予行演習……という体裁とはいえ、あなたがしばらく星見家のお屋敷で暮らしていくことには変わりませんからね」"
translation = "「장래를 위한 예행연습…… 이라는 형식이긴 하지만, 당신이 한동안 호시미 가문의 저택에서 살아가게 되는 점은 변함없으니까요」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「消耗品含め必要物は、好みのものがある場合は、各々で揃えていただきます。それが星見家メイド隊の規則です」"
translation = "「소모품을 포함한 필요 물품은, 선호하는 것이 있을 경우 각자 갖추는 것이 원칙입니다. 그것이 호시미 가문 메이드대의 규칙이죠」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「特に私の部屋は物がありませんからね。何か必要な家具や雑貨などありましたら、今の内に──」"
translation = "「특히 제 방은 물건이 없으니까요. 뭔가 필요한 가구나 잡화 등이 있다면 지금 미리──」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「……もし？\u3000聞いていますか？\u3000何故、頬を緩ませておられるのです？」"
translation = "「……저기요? 듣고 계십니까? 왜 입가에 미소를 띠고 계시는 거죠?」"

[[dialogue]]
speaker = "unk"
original = "まるで新婚夫婦のお買い物みたいだなと思って"
translation = "마치 신혼부부 쇼핑 같다는 생각이 들어서"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「なっ……！\u3000おかしなことを言わないでください。買い出しついでに必要物を買い揃えていただけではありませんか」"
translation = "「나앗……! 이상한 소리 하지 마세요. 장 보러 온 김에 필요한 물건을 같이 샀을 뿐이지 않습니까」"

[[dialogue]]
speaker = "unk"
original = "せっかくだから手を繋いで歩きましょう"
translation = "이왕 이렇게 된 거 손잡고 걸어요"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「……職務中だと理解しておられますか？\u3000まだ買い出しも終わっておりませんし、口を動かすより足を動かしてください」"
translation = "「……직무 중이라는 걸 이해하고 계십니까? 아직 장보기도 끝나지 않았으니, 입을 움직이기보다 발을 움직여 주세요」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「………………」"
translation = "「………………」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「コ……コホン。何をしているのです？\u3000手を繋ぐのではないのですか？\u3000あなたが言い出したのでしょう？\u3000手を繋いで歩こう、と」"
translation = "「코…… 코흡. 무엇을 하고 계신 겁니까? 손을 잡는 게 아니었나요? 당신이 먼저 꺼낸 말이지 않습니까? 손을 잡고 걷자고」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「結婚生活の予行演習もお嬢様から仰せつかった大事な仕事のひとつです。ならば夫婦らしい行動も進んで行うべきだと思います」"
translation = "「결혼 생활의 예행연습도 아가씨께 명받은 중요한 업무 중 하나입니다. 그렇다면 부부다운 행동도 솔선해서 행해야 한다고 생각합니다」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「私はたとえ夫婦になっても、職務中に手を繋ぐような真似はしたくありませんが……。あなたがどうしてもと言うのであれば致し方ありません」"
translation = "「저는 설령 부부가 된다 해도, 직무 중에 손을 잡는 것 같은 짓은 하고 싶지 않습니다만……. 당신이 정 그렇다고 하신다면 어쩔 수 없군요」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ここは私が譲りましょう。譲り合いの精神もまた良い夫婦になる秘訣と聞きますからね」"
translation = "「이번엔 제가 양보하죠. 서로 양보하는 정신 또한 좋은 부부가 되는 비결이라고 들었으니까요」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ですから……繋ぐなら早く繋いでください。ずっと手を差し出している私があまりに間抜けではありませんか……」"
translation = "「그러니까…… 잡을 거라면 빨리 잡아주세요. 계속 손을 내밀고 있는 제가 너무 바보 같지 않습니까……」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「あ……ふふ。もっとしっかり握ってください。それと握り方が違います。夫婦で手を繋ぐのなら、こう指を絡めて……」"
translation = "「아…… 후후. 좀 더 꽉 쥐어주세요. 그리고 쥐는 법이 틀렸습니다. 부부가 손을 잡는 거라면, 이렇게 손가락을 얽어서……」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ふふふ、これでバッチリですね。指の一本一本から、あなたのぬくもりが伝わってきます」"
translation = "「후후후, 이걸로 완벽하네요. 손가락 하나하나에서 당신의 온기가 전해져 와요」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「さあ参りましょうか。残りの必要物は──……あ」"
translation = "「자, 그럼 가볼까요. 남은 필요 물품은──…… 아」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「い、いえ。ベビー用品店が目に入ったもので」"
translation = "「아, 아니요. 아기 용품점이 눈에 들어와서」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「……いつか我々もこのお店を利用する日が来るのでしょうか。私とあなたの間に、子どもができたり……して……」"
translation = "「……언젠가 우리도 이 가게를 이용할 날이 올까요. 저와 당신 사이에 아이가 생기거나…… 해서……」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「っっ。申し訳ありません。職務中につまらない私語をこぼしてしまいました。買い出しに戻りましょう」"
translation = "「윽. 죄송합니다. 직무 중에 쓸데없는 사담을 늘어놓고 말았군요. 장 보러 돌아가죠」"

[[dialogue]]
speaker = "unk"
original = "今以上に幸せで楽しい生活になるだろうね"
translation = "지금보다 더 행복하고 즐거운 생활이 되겠지"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「～～っっ。話を膨らませないでください。意見には……その、同意いたしますけど」"
translation = "「～～윽. 이야기를 키우지 마세요. 의견에는…… 그, 동의합니다만」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「けれど少しだけ不安ですね。何せあなたのお子です」"
translation = "「하지만 조금 불안하긴 하네요. 아무래도 당신의 아이니까요」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ふふ。目を離すとすぐにどこかへ走り出してしまうような、好奇心旺盛でわんぱくな子どもになりそうです」"
translation = "「후후. 눈을 떼면 금방 어디론가 달려가 버릴 것 같은, 호기심 왕성하고 개구쟁이인 아이가 될 것 같아요」"

[[dialogue]]
speaker = "unk"
original = "よく笑う子になってくれるといいけどね"
translation = "잘 웃는 아이가 되어주면 좋겠는데"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「む、意趣返しですか？\u3000申し訳ありませんね、表情の乏しい人間で」"
translation = "「무, 복수인가요? 죄송하네요, 표정이 풍부하지 못한 인간이라서」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「でも、その時は私も自然と笑顔を浮かべていますよ。できることなら笑顔で溢れる家庭を築きたいですから」"
translation = "「하지만 그때가 되면 저도 자연스레 미소를 짓고 있을 거예요. 가능하다면 웃음꽃이 피는 가정을 꾸리고 싶으니까요」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「もちろん躾はきっちりいたしますが。礼儀作法はもちろん上月流の継承まで。学ばせることはたくさんあります」"
translation = "「물론 훈육은 확실히 하겠지만요. 예의범절은 물론 코즈키 신투류의 전승까지. 배우게 할 것은 잔뜩 있습니다」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「いえ……こういうところが私の欠点ですね。どうも厳しく教育を施そうとしてしまいます」"
translation = "「아니…… 이런 점이 제 결점이군요. 아무래도 엄격하게 교육을 하려고 들어버려요」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「でも、そういう時はきっとあなたが優しく制してくださるのでしょうね。もっと自由に育ててあげようと言ってくれたりして」"
translation = "「하지만 그럴 때는 분명 당신이 상냥하게 제지해 주시겠죠. 좀 더 자유롭게 키워주자고 말해주거나 하면서요」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「少し喧嘩になりそうな気配もありますが……ふふ。それもまた楽しそうです。厳しい母と自由な父に挟まれるくらいが子どもも健やかに成長してくれそうですし」"
translation = "「조금 다툼이 생길 것 같은 기미도 보입니다만…… 후후. 그것 또한 즐거울 것 같네요. 엄격한 어머니와 자유로운 아버지 사이에 끼어 있는 정도가 아이도 건강하게 성장해 줄 것 같고요」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「もっとも、厳しく躾けすぎるつもりはありません。あなただけ子どもに好かれて、私は嫌われてしまうなんて耐えがたいことですからね」"
translation = "「무엇보다, 너무 엄격하게 훈육할 생각은 없습니다. 당신만 아이에게 사랑받고, 저는 미움받는 건 견디기 힘든 일이니까요」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「親子３人で……いえ、もっと多いかもしれませんが、いつでも笑顔で楽しく過ごしていきたいものですね」"
translation = "「가족 셋이서…… 아니, 더 많을지도 모르지만, 언제나 웃으며 즐겁게 지내고 싶네요」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「想像するだけでとても幸せで……本当に幸せな……」"
translation = "「상상하는 것만으로도 너무 행복해서…… 정말 행복한……」"

[[dialogue]]
speaker = "unk"
original = "……産着も買って帰る？"
translation = "……배냇저고리도 사서 돌아갈까?"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「～～っっ。気が早すぎます。あくまで想像を膨らませていただけで。気持ちは……嬉しいですが」"
translation = "「～～윽. 김칫국이 너무 빠릅니다. 어디까지나 상상을 부풀렸을 뿐이라서. 마음은…… 기쁩니다만」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「そもそも、もし子宝を授かっても産着は買いません。私が手ずから繕いますよ」"
translation = "「애초에 만약 아이를 갖게 되어도 배냇저고리는 사지 않을 겁니다. 제가 직접 만들 거예요」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「愛しい我が子が初めて袖を通す服ですからね……。生まれてくるまでの間に一針一針愛情を込めて縫ってあげたいんです……」"
translation = "「사랑스러운 우리 아이가 처음으로 소매를 꿰는 옷이니까요……. 태어나기 전까지 한 땀 한 땀 애정을 담아 꿰매주고 싶거든요……」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「その時は……あなたも手伝ってくださいね？\u3000私の愛情だけ込めても意味はありませんから……」"
translation = "「그때는…… 당신도 도와주셔야 해요? 제 애정만 담아서는 의미가 없으니까요……」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「コホン……公衆の面前で何を話しているのでしょうか。さすがに恥ずかしくなってきました」"
translation = "「코흡…… 공공장소에서 무슨 이야기를 하는 걸까요. 역시 부끄러워지기 시작했습니다」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「早くお買い物を済ませて帰りましょう。お屋敷で使う物品の調達が残っておりますので」"
translation = "「빨리 쇼핑을 마치고 돌아가죠. 저택에서 쓸 물품 조달이 남아 있으니까요」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「急ぎますよ。これ以上、帰りが遅くなっては他のメイドに示しがつきません」"
translation = "「서두르세요. 이 이상 귀가가 늦어지면 다른 메이드들에게 본보기가 서지 않습니다」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ひゃっ……！\u3000へ、返事代わりに手を握り締めないでください。頷いていただくだけで構いませんから。手よりも足を動かしていただきたいです」"
translation = "「히얏……! 대, 대답 대신 손을 꽉 쥐지 마세요. 고개를 끄덕여 주시는 것만으로 충분하니까요. 손보다는 발을 움직여 주셨으면 합니다」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「……ちなみに、ですが。どういたしましょう……？」"
translation = "「……참고로, 말입니다만. 어떻게 할까요……?」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ですから、その。もしもあなたが望まれるのであれば、ええと……」"
translation = "「그러니까, 그. 만약 당신이 바라신다면, 에 그러니까……」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「産着の製作も……始めて参ろうかと思うのですが……」"
translation = "「배냇저고리 제작도…… 시작해볼까 생각합니다만……」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「い、いえ、なんでもございません。早く行きましょう。買い出しひとつに日暮れまでかかったとなればメイド長の名折れですので……！」"
translation = "「아, 아니요, 아무것도 아닙니다. 빨리 가죠. 장보기 하나에 해가 질 때까지 걸렸다고 하면 메이드장의 명예가 깎이니까요……!」"

