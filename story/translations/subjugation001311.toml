[[dialogue]]
speaker = "unk"
original = "星徒会の仲間たちが、《試練》のパテル、《命脈》のアルモタヘル、《万成》のセシア、《円環》のラクシャの下へそれぞれ旅立った。"
translation = "성도회의 동료들이, 《시련》의 파텔, 《명맥》의 아르모타헬, 《만성》의 세시아, 《원환》의 락샤가 있는 곳으로 각각 여행을 떠났다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「次は私たちの番ね！」"
translation = "「다음은 우리 차례네!」"

[[dialogue]]
speaker = "イニシュ"
original = "「守護天使マグダレナの元には私が案内します」"
translation = "「수호천사 마그달레나님이 계신 곳까지는 제가 안내하겠습니다」"

[[dialogue]]
speaker = "ウェンディ"
original = "「私はウェンディ。こちらはイニシュです。よろしくお願いします」"
translation = "「저는 웬디. 이쪽은 이니슈예요. 잘 부탁드려요」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ええ、よろしく。２人とも見たことないけど、前に戦った時いなかったわよね？」"
translation = "「응, 잘 부탁해. 둘 다 처음 보는데, 저번에 싸웠을 때는 없었지?」"

[[dialogue]]
speaker = "ウェンディ"
original = "「私たちは魔界で守護天使の捜索をしていて、合流が間に合いませんでした。……というかイニシュが言うことを聞かなかったんですが」"
translation = "「저희는 마계에서 수호천사 수색을 하느라 합류가 늦어졌습니다. ……라기보다 이니슈가 말을 안 들어서요」"

[[dialogue]]
speaker = "イニシュ"
original = "「あの時は魔界の一部でも流星が降り注ぎ、アステラが大量に発生していました。ネビュラはリクリエと戦うための組織。モンスターを殲滅するのは当然です」"
translation = "「그때는 마계의 일부에도 유성이 쏟아져서 아스텔라가 대량으로 발생하고 있었습니다. 네뷸라는 리크리에와 싸우기 위한 조직. 몬스터를 섬멸하는 건 당연합니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふーん、なるほどね。あなたたちも別のところで戦ってたんだ」"
translation = "「흐음, 그렇구나. 당신들도 다른 곳에서 싸우고 있었네」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「でも今さらだけど、そもそも魔女は魔女の森ってところに住んでて、そこにはリクリエは及ばないのよね？」"
translation = "「근데 이제 와서 묻는 거지만, 원래 마녀는 마녀의 숲이라는 곳에 살고 있고, 거기엔 리크리에는 미치지 않는 거 아냐?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「じゃあどうして、ネビュラはリクリエを止めようとするのよ。三界のことなんてほっとけばいいんじゃないの？」"
translation = "「근데 어째서 네뷸라는 리크리에를 막으려고 하는 거야. 삼계의 일 같은 건 내버려 둬도 되는 거 아냐?」"

[[dialogue]]
speaker = "イニシュ"
original = "「ネビュラはリクリエを阻止するための組織だからです」"
translation = "「네뷸라는 리크리에를 저지하기 위한 조직이기 때문입니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「いや、だからどうしてネビュラはリクリエを──」"
translation = "「아니, 그러니까 어째서 네뷸라는 리크리에를──」"

[[dialogue]]
speaker = "イニシュ"
original = "「ネビュラとは本来、魔女と人間によって設立された組織でした」"
translation = "「네뷸라란 본래, 마녀와 인간에 의해 설립된 조직이었습니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「人間と……！？\u3000しかしあなた方の中には人間がいないようですが……」"
translation = "「인간과……!? 하지만 당신들 중엔 인간이 없는 것 같은데……」"

[[dialogue]]
speaker = "イニシュ"
original = "「ええ、今のネビュラはそうです。ですが<b>過去の</b>ネビュラは違いました」"
translation = "「네, 지금의 네뷸라는 그렇죠. 하지만 <b>과거의</b> 네뷸라는 달랐습니다」"

[[dialogue]]
speaker = "イニシュ"
original = "「ネビュラが最初に設立されたのは、森羅歴や玄武暦より以前に遡ってさらに昔、数万年前のこと。後に真祖と呼ばれる初代光の魔女・ディアナがいた時代でした」"
translation = "「네뷸라가 처음 설립된 것은 신라력이나 현무력보다도 훨씬 전인 수만 년 전의 일. 훗날 진조라 불리는 초대 빛의 마녀 디아나가 있던 시대였습니다」"

[[dialogue]]
speaker = "イニシュ"
original = "「当時の魔女は三界と交流を持ち、特に人間と厚い<ruby>友誼<rt>ゆうぎ</rt></ruby>を結んでいました」"
translation = "「당시의 마녀는 삼계와 교류를 가졌고, 특히 인간과 두터운 우의를 맺고 있었습니다」"

[[dialogue]]
speaker = "イニシュ"
original = "「各地で起こる異常気象、地殻変動、天変地異……世界を襲う脅威にリクリエという名前もついていなかった頃」"
translation = "「각지에서 일어나는 이상기후, 지각변동, 천변지이…… 세계를 엄습하는 위협에 리크리에라는 이름조차 붙어있지 않던 시절」"

[[dialogue]]
speaker = "イニシュ"
original = "「それらの異変に立ち向かうため、魔女と人間が手を取り合って結成されたのがネビュラです」"
translation = "「그런 이변에 맞서기 위해 마녀와 인간이 손을 맞잡고 결성한 것이 네뷸라입니다」"

[[dialogue]]
speaker = "イニシュ"
original = "「そして私も、その時代にネビュラに加わった構成員の１人です。時には人間の構成員とチームを組み、各地の調査に赴きました」"
translation = "「그리고 저 또한 그 시대에 네뷸라에 가입한 구성원 중 한 명입니다. 때로는 인간 구성원과 팀을 이루어 각지 조사를 하러 다니기도 했죠」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「えっ、じゃああなたいくつなの？\u3000何万年もずっと生きてきたっていうの？」"
translation = "「엣, 그럼 당신 몇 살이야? 수만 년 동안 계속 살아왔다는 거야?」"

[[dialogue]]
speaker = "イニシュ"
original = "「いえ、私は永い間、コフィンの中で眠りに就いていました。そのせいで記憶を失っていましたが……流星を見て、少し過去を思い出したのです」"
translation = "「아뇨, 저는 오랫동안 코핀 안에서 잠들어 있었습니다. 그 탓에 기억을 잃었었지만…… 유성을 보고 과거를 조금 떠올린 것입니다」"

[[dialogue]]
speaker = "リノ"
original = "『イニシュ……やはりあなたはディアナ様の時代の魔女だったのね』"
translation = "『이니슈…… 역시 당신은 디아나님 시대의 마녀였구나』"

[[dialogue]]
speaker = "イニシュ"
original = "「はい。あなたたち現代の魔女が真祖と呼ぶディアナは、私の恩人であり、友人でもありました」"
translation = "「네. 당신들 현대의 마녀가 진조라 부르는 디아나는 저의 은인이자 친구이기도 했습니다」"

[[dialogue]]
speaker = "イニシュ"
original = "「──しかし、<b>我々の</b>ネビュラはリクリエに勝てなかった」"
translation = "「──하지만, <b>우리들의</b> 네뷸라는 리크리에에 이기지 못했다」"

[[dialogue]]
speaker = "イニシュ"
original = "「私にも人間の親友がいました。ですが彼女はリクリエで消滅した。塵ひとつ残さずに」"
translation = "「저에게도 인간 절친이 있었습니다. 하지만 그녀는 리크리에로 소멸했죠. 먼지 한 톨 남기지 않고」"

[[dialogue]]
speaker = "イニシュ"
original = "「魔女だけがディアナの魔法で生き延び、幾星霜を重ねた。残された者の未練と、友を救えなかった悔恨とともに」"
translation = "「마녀만이 디아나의 마법으로 살아남아 기나긴 세월을 보냈습니다. 남겨진 자의 미련과 친구를 구하지 못한 후회와 함께」"

[[dialogue]]
speaker = "セドナ"
original = "『──そう。それは魔女にとって色褪せない、敗北と屈辱の記憶だ』"
translation = "『──그래. 그것은 마녀에게 있어 빛바래지 않는 패배와 굴욕의 기억이다』"

[[dialogue]]
speaker = "セドナ"
original = "『我々魔女は、魔女の森を救った偉大なる祖・ディアナへの畏敬とともに、先達たちの無念を幾千、幾万年もの間積み重ねてきた』"
translation = "『우리 마녀들은 마녀의 숲을 구한 위대한 조상 디아나를 향한 경외와 함께, 선대들의 한을 수천, 수만 년 동안 쌓아왔다』"

[[dialogue]]
speaker = "セドナ"
original = "『そして３０００年前、再びリクリエと戦うためにネビュラを結成した」"
translation = "『그리고 3000년 전, 다시금 리크리에와 싸우기 위해 네뷸라를 결성했지』"

[[dialogue]]
speaker = "セドナ"
original = "『過去と同じネビュラの名を使ったのは、今度こそリクリエを打倒するという意志の顕れだ』"
translation = "『과거와 같은 네뷸라라는 이름을 사용한 것은, 이번에야말로 리크리에를 타도하겠다는 의지의 표현이다』"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ならどうして──人間界を犠牲にしようとしたのよ。ネビュラも、そのディアナさんも、三界全てを救いたかったんじゃないのかしら？」"
translation = "「그럼 어째서── 인간계를 희생시키려 한 거야. 네뷸라도, 그 디아나라는 분도, 삼계 전부를 구하고 싶었던 거 아냐?」"

[[dialogue]]
speaker = "ウェンディ"
original = "「それしか手がなかったからです。グレートウォール計画の成功率は９７．５％──」"
translation = "「그것밖에 방법이 없었기 때문입니다. 그레이트 월 계획의 성공률은 97.5%──」"

[[dialogue]]
speaker = "ウェンディ"
original = "「そして魔王がアポロを打倒する可能性は、魔界に行く前の戦闘で計測した数値では０％でした。これでは賭ける方が愚かです」"
translation = "「그리고 마왕이 아폴로를 타도할 가능성은 마계로 가기 전의 전투에서 계측한 수치로는 0%였습니다. 이런 상황에서 도박을 거는 건 어리석은 짓입니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「う……そんなのただの数字だし。クロトならそんな計算ぶっ飛ばしたわよ」"
translation = "「우…… 그런 건 그냥 숫자일 뿐이잖아. 쿠로토라면 그런 계산 따위 날려버렸을 거야」"

[[dialogue]]
speaker = "フィオナ"
original = "「それだけ緋宮会長が、魔界で目覚ましい成長を遂げたということですね」"
translation = "「그만큼 히노미야 회장님이 마계에서 눈부신 성장을 이뤘다는 뜻이겠네요」"

[[dialogue]]
speaker = "イニシュ"
original = "「そもそも、私はグレート・ウォール計画について事前に知らされていなかったのですが」"
translation = "「애초에 저는 그레이트 월 계획에 대해 사전에 듣지 못했습니다만」"

[[dialogue]]
speaker = "ウェンディ"
original = "「知っていたら、イニシュは命令を無視してリクリエの使徒を倒そうとしたでしょう。それを防ぐための措置です」"
translation = "「알았다면 이니슈는 명령을 무시하고 리크리에의 사도를 쓰러뜨리려 했겠죠. 그걸 방지하기 위한 조치입니다」"

[[dialogue]]
speaker = "イニシュ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "ウェンディ"
original = "「ほら、図星じゃないですか」"
translation = "「봐요, 정곡을 찔렸잖아요」"

[[dialogue]]
speaker = "unk"
original = "（明らかに不満そうだ……）"
translation = "(명백히 불만스러워 보인다……)"

[[dialogue]]
speaker = "イニシュ"
original = "「礼を言います、魔王。あなたのおかげでネビュラは後悔を繰り返さずに済みました」"
translation = "「고맙다는 말을 전하죠, 마왕. 당신 덕분에 네뷸라는 후회를 반복하지 않게 되었습니다」"

[[dialogue]]
speaker = "イニシュ"
original = "「ですが戦いは終わっていません。守護天使を解放しなければ、世界は朽ちてしまいます。──行きましょう」"
translation = "「하지만 싸움은 끝나지 않았습니다. 수호천사를 해방하지 않으면 세계는 썩어버리고 맙니다. ──가죠」"

[[dialogue]]
speaker = "unk"
original = "ああ！"
translation = "아아!"

[[dialogue]]
speaker = "ウェンディ"
original = "「しかし世界樹といえど、守護天使マグダレナの元に伸びる根は細く、数名しか送り込むことができません。心してください」"
translation = "「하지만 세계수라 해도 수호천사 마그달레나님에게 뻗은 뿌리는 가늘어서, 몇 명밖에 보낼 수 없습니다. 명심하세요」"

[[dialogue]]
speaker = "フィオナ"
original = "「はい。それでも辿り着けるのなら勝機はあります」"
translation = "「네. 그래도 도달할 수 있다면 승산은 있어요」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふふん。この前の魔界じゃずっと縛られてたもの。暴れてやるわ」"
translation = "「후훙. 지난번 마계에선 계속 묶여있기만 했으니까. 실컷 날뛰어 주겠어」"

[[dialogue]]
speaker = "ミルフィー"
original = "「じゃあ行ってくるね、ヒヨちゃん」"
translation = "「그럼 다녀올게, 히요짱」"

[[dialogue]]
speaker = "ヒヨ"
original = "「無事に帰ってきてくれよ、姐さん。約束だぜ？」"
translation = "「무사히 돌아와 줘야 해, 누님. 약속이다?」"

[[dialogue]]
speaker = "ミルフィー"
original = "「うーん……約束はできないかも」"
translation = "「으음…… 약속은 못 할지도」"

[[dialogue]]
speaker = "ヒヨ"
original = "「ええっ！？\u3000そこは帰ってくるって答えるところだろ！？」"
translation = "「에엣!? 거기는 돌아오겠다고 대답해야 하는 타이밍이잖아!?」"

[[dialogue]]
speaker = "ミルフィー"
original = "「そうなんだけど、ヒヨちゃんにウソはつきたくないから。でも全力を尽くすよ」"
translation = "「그렇긴 한데, 히요짱한테 거짓말은 하기 싫으니까. 하지만 전력을 다할게」"

[[dialogue]]
speaker = "ヒヨ"
original = "「姐さん……無茶はしねえでくれよな」"
translation = "「누님…… 무리는 하지 말아줘」"

[[dialogue]]
speaker = "ミルフィー"
original = "「うん、頑張るよ。じゃあ使命を果たしてくるね」"
translation = "「응, 힘낼게. 그럼 사명을 완수하고 올게」"

[[dialogue]]
speaker = "ウェンディ"
original = "「ではお気をつけて。ボン・ボヤージュ！」"
translation = "「그럼 조심하세요. 본 보야쥬(Bon Voyage)!」"

