[[dialogue]]
speaker = "カヤ"
original = "「ここがあなたのお部屋……」"
translation = "「여기가 당신 방……」"

[[dialogue]]
speaker = "unk"
original = "借りてきた猫のように縮こまりながら、カヤがキョロキョロとリビングを見回す。"
translation = "빌려 온 고양이처럼 움츠러든 채로, 카야가 두리번두리번 거실을 둘러본다."

[[dialogue]]
speaker = "クロト"
original = "「でも……ビックリしたよ。カヤが俺の家に泊まりに来たいって言ってくれるなんて」"
translation = "「하지만…… 놀랐어. 카야가 내 집에 자러 오고 싶다고 말해줄 줄이야.」"

[[dialogue]]
speaker = "カヤ"
original = "「一度、見てみたかったから……。あなたがどんな場所で暮らしてるのか……」"
translation = "「한 번 보고 싶었으니까…… 당신이 어떤 장소에서 살고 있는지……」"

[[dialogue]]
speaker = "カヤ"
original = "「それに、その……。かっぷるは、お互いの家にお泊まりするもの……聞いたから」"
translation = "「그리고, 그…… 커플은, 서로의 집에서 자고 가는 거라고…… 들었으니까.」"

[[dialogue]]
speaker = "unk"
original = "恥ずかしそうにカヤが頬を赤らめる。"
translation = "부끄러운 듯 카야가 뺨을 붉힌다."

[[dialogue]]
speaker = "unk"
original = "そして、視線を揺らしながら俺を上目遣いに見上げてきた。"
translation = "그리고, 시선을 흔들며 나를 치켜뜬 눈으로 올려다보았다."

[[dialogue]]
speaker = "カヤ"
original = "「事前に聞いておいた通り、今日はお母さん……いない？」"
translation = "「미리 물어본 대로, 오늘은 어머니…… 안 계셔?」"

[[dialogue]]
speaker = "クロト"
original = "「あ、ああ。今夜は帰らないはずだけど」"
translation = "「아, 아아. 오늘 밤은 안 돌아오실 거야.」"

[[dialogue]]
speaker = "カヤ"
original = "「なら、えと……。今日は、その……」"
translation = "「그럼, 에토…… 오늘은, 그……」"

[[dialogue]]
speaker = "カヤ"
original = "「こいびと同士ですること……。あなたとして、みたい……」"
translation = "「연인끼리 하는 일…… 당신이랑, 해보고 싶어……」"

[[dialogue]]
speaker = "クロト"
original = "「こ、恋人同士ですることって」"
translation = "「여, 연인끼리 하는 일이라니.」"

[[dialogue]]
speaker = "カヤ"
original = "「今日は、そのつもりでお泊まりしにきた……から」"
translation = "「오늘은, 그럴 생각으로 자러 온 거니까……」"

[[dialogue]]
speaker = "カヤ"
original = "「手を繋いだり、デートしたり、キス……したり。あなたには、楽しいこと、幸せなこと、たくさん教えてもらった」"
translation = "「손을 잡거나, 데이트하거나, 키스…… 하거나. 당신에게는 즐거운 일, 행복한 일, 많이 배웠어.」"

[[dialogue]]
speaker = "カヤ"
original = "「だから今夜は……その先のことも教えて欲しい」"
translation = "「그러니까 오늘 밤은…… 그 너머의 일도 알려줬으면 좋겠어.」"

[[dialogue]]
speaker = "カヤ"
original = "「あなたとエッチ……してみたい……」"
translation = "「당신이랑 섹스…… 해보고 싶어……」"

[[dialogue]]
speaker = "unk"
original = "照れながらもカヤが真っ直ぐ俺を見つめてきてくれる。"
translation = "수줍어하면서도 카야가 똑바로 나를 응시해 준다."

[[dialogue]]
speaker = "unk"
original = "正直、家に泊まりたいと言われた時点で期待はしてしまっていたけど──"
translation = "솔직히 집에 자러 가고 싶다는 말을 들은 시점에서 기대는 하고 있었지만──"

[[dialogue]]
speaker = "クロト"
original = "「本当にいいのか？」"
translation = "「정말로 괜찮겠어?」"

[[dialogue]]
speaker = "カヤ"
original = "「ん、もちろん」"
translation = "「응, 물론.」"

[[dialogue]]
speaker = "カヤ"
original = "「あなたともっと……ん、ちゅっ。イチャイチャしてみたい、から……」"
translation = "「당신이랑 좀 더…… 응, 츄. 꽁냥거려 보고 싶으니까……」"

[[dialogue]]
speaker = "unk"
original = "身も心も俺に委ねるように、カヤがつま先立ちをして唇を重ねてきてくれる。"
translation = "몸도 마음도 나에게 맡기듯, 카야가 발꿈치를 들고 입술을 겹쳐온다."

[[dialogue]]
speaker = "unk"
original = "そんな彼女の信頼と好意に応えるように、俺はそっと彼女を抱き締めて──"
translation = "그런 그녀의 신뢰와 호의에 보답하듯, 나는 살며시 그녀를 껴안고──"

[[dialogue]]
speaker = "カヤ"
original = "「ひゃっ……えへへ。裸でくっつくの、ちょっぴりくすぐったい……。すごくドキドキ……する」"
translation = "「히얏…… 에헤헤. 알몸으로 달라붙는 거, 조금 간지러워……. 엄청 두근두근…… 해.」"

[[dialogue]]
speaker = "カヤ"
original = "「でもこれ、好き……かも。こうしてるだけで、とっても幸せな気分、なってくる……」"
translation = "「하지만 이거, 좋을지도. 이러고 있는 것만으로도, 정말 행복한 기분이 되어버려……」"

[[dialogue]]
speaker = "unk"
original = "嬉しそうに微笑みながらカヤが呟いてくる。"
translation = "기쁜 듯 미소 지으며 카야가 중얼거린다."

[[dialogue]]
speaker = "unk"
original = "緊張しているんだろう。膝の上でモジモジと体を揺らしながら、だけど、俺に身を任せるように背中を預けてきてくれて。"
translation = "긴장하고 있는 거겠지. 무릎 위에서 꼼지락꼼지락 몸을 흔들면서도, 나에게 몸을 맡기듯 등을 기대어 오고."

[[dialogue]]
speaker = "カヤ"
original = "「す、好きに触ってくれていい、から……。私の体、あなたの好きに……して？」"
translation = "「마, 마음껏 만져도 괜찮으니까……. 내 몸, 당신 마음대로…… 해줘?」"

[[dialogue]]
speaker = "カヤ"
original = "「あんまり触るところない体、だけど……。でも、たくさん触って欲しい……。隅々まで触れて欲しい……」"
translation = "「별로 만질 곳 없는 몸이지만…… 그래도, 잔뜩 만져줬으면 좋겠어……. 구석구석까지 닿아줘……」"

[[dialogue]]
speaker = "カヤ"
original = "「大好きなあなたのこと、はぁはぁ、感じたい……から……」"
translation = "「사랑하는 당신을, 하아하아, 느끼고 싶으니까……」"

[[dialogue]]
speaker = "unk"
original = "消え入りそうな声で、それでも必死に言葉を紡いでくれるカヤの気持ちが嬉しい。"
translation = "사라질 듯한 목소리로, 그래도 필사적으로 말을 잣는 카야의 마음이 기쁘다."

[[dialogue]]
speaker = "unk"
original = "彼女の全てを愛し尽くしたくなってしまう。"
translation = "그녀의 모든 것을 사랑하고 싶어진다."

[[dialogue]]
speaker = "カヤ"
original = "「ふぁ……あぁん……。スリスリされるの、んん、気持ちいい……」"
translation = "「후아…… 아앙……. 비벼지는 거, 응응, 기분 좋아……」"

[[dialogue]]
speaker = "カヤ"
original = "「自分で体洗う時と、んぁ、全然違う……。あなたに触ってもらうと、あ、あふ……。変な声、出ちゃって……」"
translation = "「직접 몸 씻을 때랑은, 으응, 전혀 달라……. 당신이 만져주면, 아, 아후……. 이상한 목소리가 나와버려서……」"

[[dialogue]]
speaker = "カヤ"
original = "「でも、はぁあん……。すごく、幸せ……。まるでずっと、あっ……あぁん……。キスしてもらってる、みたい……」"
translation = "「하지만, 하아앙……. 정말, 행복해……. 마치 계속, 앗…… 아앙……. 키스 받고 있는 것 같아……」"

[[dialogue]]
speaker = "unk"
original = "軽く体を撫で回すだけで、カヤがビクビクと震えてくれる。"
translation = "가볍게 몸을 쓰다듬는 것만으로도 카야가 움찔움찔 떤다."

[[dialogue]]
speaker = "unk"
original = "体の火照りも一気に強くなって、そのエッチなぬくもりに俺もドキドキがとまらない。"
translation = "몸의 열기도 단숨에 강해져서, 그 야한 온기에 나도 두근거림이 멈추지 않는다."

[[dialogue]]
speaker = "カヤ"
original = "「あぁん……ふぁぁぁ……。おっぱいモミモミ、されて……」"
translation = "「아앙…… 후아아아……. 가슴 조물조물, 당해서……」"

[[dialogue]]
speaker = "カヤ"
original = "「それすごく、んぁ……はぁあん……気持ちいい。もっと、んふぁ、もっとモミモミ……して？」"
translation = "「그거 정말, 응아…… 하아앙…… 기분 좋아. 좀 더, 응후아, 좀 더 조물조물…… 해줘?」"

[[dialogue]]
speaker = "unk"
original = "小さな胸に手を伸ばすと、カヤはうっとりとした甘い声を出した。"
translation = "작은 가슴에 손을 뻗자, 카야는 황홀한 달콤한 목소리를 냈다."

[[dialogue]]
speaker = "unk"
original = "その普段のクールっぷりからは想像も付かない女の子な声を聞いて、夢中で彼女のおっぱいを揉んでしまう。"
translation = "평소의 쿨한 모습으로는 상상도 할 수 없는 소녀 같은 목소리를 듣고, 정신없이 그녀의 가슴을 주무른다."

[[dialogue]]
speaker = "カヤ"
original = "「はぁあん……。あぁ……はぁ、はぁ……。んぁぁぁ……」"
translation = "「하아앙…… 아아…… 하아, 하아…… 응아아아……」"

[[dialogue]]
speaker = "カヤ"
original = "「え、えへへ……。恥ずかしいけど、嬉しい……。あなたの吐息、どんどん荒くなってきて……」"
translation = "「에, 에헤헤……. 부끄럽지만, 기뻐……. 당신의 숨결, 점점 거칠어지고 있어……」"

[[dialogue]]
speaker = "カヤ"
original = "「これも、その……。さっきより大きくなってる……。パンパンに張り詰めて、ドクンドクン脈打って……」"
translation = "「이것도, 그……. 아까보다 커졌어……. 팽팽하게 부풀어서, 두근두근 맥동하고 있어……」"

[[dialogue]]
speaker = "unk"
original = "俺のモノを見つめながら、カヤが穢れ一つないプニプニの割れ目を恥ずかしそうに擦り付けてきてくれる。"
translation = "내 물건을 바라보며, 카야가 때 묻지 않은 포동포동한 갈라진 틈을 부끄러운 듯 문질러온다."

[[dialogue]]
speaker = "unk"
original = "とろりとした愛液の感触が伝わってきて、その熱さと濡れ具合によりいっそう肉棒が膨れあがっていくのがわかった。"
translation = "걸쭉한 애액의 감촉이 전해져 오고, 그 뜨거움과 젖은 정도에 더욱더 육봉이 부풀어 오르는 것이 느껴졌다."

[[dialogue]]
speaker = "カヤ"
original = "「し……して？\u3000遠慮しなくていい、から……。私の中にこれ挿れる、わかってる……から」"
translation = "「해……줘? 사양하지 않아도 되니까……. 내 안에 이거 넣는 거, 알고 있으니까」"

[[dialogue]]
speaker = "カヤ"
original = "「繋がって、みたい……。ううん、繋がりたい……」"
translation = "「연결되어 보고 싶어……. 아니, 연결되고 싶어……」"

[[dialogue]]
speaker = "カヤ"
original = "「そうすれば今よりもっと……えへへ。あなたのこいびと、なれるような気がするから……」"
translation = "「그러면 지금보다 좀 더…… 에헤헤. 당신의 연인이 될 수 있을 것 같은 기분이 드니까……」"

[[dialogue]]
speaker = "unk"
original = "そう言ってカヤが腰を持ち上げてくれる。俺もまた彼女の大切な場所に先端を当てていく。"
translation = "그렇게 말하며 카야가 허리를 들어 올린다. 나 또한 그녀의 소중한 곳에 끝을 맞춘다."

[[dialogue]]
speaker = "unk"
original = "そして──"
translation = "그리고──"

[[dialogue]]
speaker = "カヤ"
original = "「あぁぁあんっっ……<emoji=heart04>\u3000ふぁっ、あぁあんっ……<emoji=heart04>\u3000あっ……はぁっ<emoji=heart04>」"
translation = "「아아아앙잇……<emoji=heart04> 후아, 아아앙……<emoji=heart04> 앗…… 하앗<emoji=heart04>」"

[[dialogue]]
speaker = "カヤ"
original = "「<ruby>膣内<rt>なか</rt></ruby>で、あぁ、あなたの、動いてっ……<emoji=heart04>\u3000奥の奥までズンズン、きてっ……<emoji=heart04>」"
translation = "「질내에서, 아아, 당신 게 움직여서……<emoji=heart04> 깊숙한 곳까지 쿡쿡, 들어와서……<emoji=heart04>」"

[[dialogue]]
speaker = "カヤ"
original = "「なに、これっ……<emoji=heart04>\u3000ふあぁぁぁ……<emoji=heart04>\u3000ものすごく、幸せ……<emoji=heart04>\u3000体、ああぁぁっ、勝手にピョンピョンしちゃっ……<emoji=heart04>」"
translation = "「뭐야, 이거……<emoji=heart04> 후아아아아……<emoji=heart04> 엄청나게, 행복해……<emoji=heart04> 몸이, 아아아앗, 제멋대로 폴짝폴짝 뛰어버렷……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "優しくしようと思っていたのに、挿入した途端、どちらともなく腰を振って動いてしまう。"
translation = "다정하게 해주려 했는데, 삽입하자마자 누가 먼저랄 것도 없이 허리를 흔들며 움직이게 된다."

[[dialogue]]
speaker = "unk"
original = "キツキツでプニプニのカヤの膣内は体が蕩けてしまいそうなほど、熱くて甘くて気持ち良くて。抽挿がやめられない。"
translation = "꽉 조이고 포동포동한 카야의 질내는 몸이 녹아버릴 정도로 뜨겁고 달콤하고 기분 좋아서, 추삽을 멈출 수 없다."

[[dialogue]]
speaker = "カヤ"
original = "「あっ、あっ、あっ、あっ……<emoji=heart04>\u3000すごっ、あああっ、気持ち、いいっ……<emoji=heart04>」"
translation = "「앗, 앗, 앗, 앗……<emoji=heart04> 굉장해, 아아앗, 기분, 좋아……<emoji=heart04>」"

[[dialogue]]
speaker = "カヤ"
original = "「こんなに気持ちいい、なら──はぁあんっ<emoji=heart04>\u3000もっと早く、してもらえば良かった……<emoji=heart04>」"
translation = "「이렇게 기분 좋다면── 하아앙<emoji=heart04> 좀 더 빨리, 해달라고 할 걸 그랬어……<emoji=heart04>」"

[[dialogue]]
speaker = "カヤ"
original = "「もっと、ふぁ、もっとズンズン、して……<emoji=heart04>\u3000あなたと繋がってる感覚、あぁあんっ……<emoji=heart04>\u3000もっと味わい、たい……<emoji=heart04>」"
translation = "「좀 더, 후아, 좀 더 쿡쿡, 해줘……<emoji=heart04> 당신과 연결되어 있는 감각, 아아앙……<emoji=heart04> 좀 더 맛보고, 싶어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "痛みを感じていない様子でカヤが小さな体を弾ませてくれる。"
translation = "고통을 느끼지 않는 모습으로 카야가 작은 몸을 튕긴다."

[[dialogue]]
speaker = "unk"
original = "二人で一つになっている感覚に幸せ一杯の顔で浸ってくれていて、それが嬉しくて俺も彼女の体を突き上げてしまう。"
translation = "둘이 하나가 되어 있는 감각에 행복 가득한 얼굴로 젖어 있어 줘서, 그것이 기뻐 나도 그녀의 몸을 찔러 올린다."

[[dialogue]]
speaker = "カヤ"
original = "「あっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000強めに突き上げられるの、いいっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 하앗<emoji=heart04> 강하게 찔러 올려지는 거, 좋아<emoji=heart04>」"

[[dialogue]]
speaker = "カヤ"
original = "「あなたの入ってるって、あぁぁぁっ、はっきりわかってっ<emoji=heart04>\u3000膣内、キュンキュン、しちゃ……<emoji=heart04>」"
translation = "「당신 게 들어와 있다고, 아아아앗, 확실히 느껴져서<emoji=heart04> 질내, 큥큥, 거려버렷……<emoji=heart04>」"

[[dialogue]]
speaker = "カヤ"
original = "「体も、あぁっ、スリスリ、してっ？\u3000さっきみたいに、おっぱいモミモミしたり、してっ？」"
translation = "「몸도, 아앗, 부벼줘? 아까처럼 가슴 조물조물하거나, 해줘?」"

[[dialogue]]
speaker = "カヤ"
original = "「体全部で、はふぁぁぁ……<emoji=heart04>\u3000あなたのこと、感じたい……<emoji=heart04>」"
translation = "「몸 전부로, 하후아아아……<emoji=heart04> 당신을, 느끼고 싶어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "甘えるようにカヤがぐっと背中を預けてくる。その子犬のような姿に、凄まじいほど興奮してしまって──"
translation = "어리광 부리듯 카야가 훅 등을 기대어 온다. 그 강아지 같은 모습에 엄청나게 흥분해버려서──"

[[dialogue]]
speaker = "カヤ"
original = "「はぁああんっ……<emoji=heart04>\u3000あっ、ふぁっ、あぁぁぁんっ……<emoji=heart04>」"
translation = "「하아아앙……<emoji=heart04> 앗, 후아, 아아아앙……<emoji=heart04>」"

[[dialogue]]
speaker = "カヤ"
original = "「ズンズンされながら、撫で回されるの、最高に、幸せ……<emoji=heart04>」"
translation = "「쿡쿡 당하면서, 쓰다듬어지는 거, 최고로, 행복해……<emoji=heart04>」"

[[dialogue]]
speaker = "カヤ"
original = "「こんなの、あっ、あっ……<emoji=heart04>\u3000全然知らなかった……<emoji=heart04>\u3000大好きな人とエッチするのって、こんなに……<emoji=heart04>」"
translation = "「이런 거, 앗, 앗……<emoji=heart04> 전혀 몰랐어……<emoji=heart04> 좋아하는 사람이랑 섹스하는 게, 이렇게나……<emoji=heart04>」"

[[dialogue]]
speaker = "カヤ"
original = "「どうしよう……<emoji=heart04>\u3000毎日これ、あっ、はぁっ、して欲しくなってくる……<emoji=heart04>」"
translation = "「어떡해……<emoji=heart04> 매일 이거, 앗, 하앗, 해달라고 하고 싶어져……<emoji=heart04>」"

[[dialogue]]
speaker = "カヤ"
original = "「私、はふぁ、あぁっ……<emoji=heart04>\u3000エッチ、好きかも……<emoji=heart04>\u3000はまっちゃい、そうっ……<emoji=heart04>」"
translation = "「나, 하후아, 아앗……<emoji=heart04> 섹스, 좋을지도……<emoji=heart04> 빠져버릴 것, 같아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "一突きする度に、カヤの声が一段と艶めかしくなっていく。"
translation = "한 번 찌를 때마다 카야의 목소리가 한층 더 요염해진다."

[[dialogue]]
speaker = "unk"
original = "今まさに俺はカヤをエッチな女の子に変えているんだ。"
translation = "지금 바로 내가 카야를 야한 여자애로 바꾸고 있는 거다."

[[dialogue]]
speaker = "unk"
original = "そう思うと、ペニスが張り裂けそうなほど猛ってきて──"
translation = "그렇게 생각하니 페니스가 터질 정도로 날뛰어서──"

[[dialogue]]
speaker = "カヤ"
original = "「あひぃんっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あはぁぁぁっっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000奥、グリグリきてっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000乳首、クリクリされてっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아히잉<emoji=heart04><emoji=heart04><emoji=heart04> 아하아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 안쪽, 그리그리해줘<emoji=heart04><emoji=heart04><emoji=heart04> 유두, 클리클리해줘<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "カヤ"
original = "「きもち、あぁっ、きもち、いいっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000お股のキュンキュン、とまらないっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「기분, 아앗, 기분, 좋아<emoji=heart04><emoji=heart04><emoji=heart04> 가랑이 큥큥거리는 거, 안 멈춰<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "カヤ"
original = "「なんかくるっ<emoji=heart04>\u3000きちゃっ<emoji=heart04>\u3000あっ──あああああっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「뭔가 와<emoji=heart04> 와버렷<emoji=heart04> 앗── 아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ぷっくりと膨れあがった乳首を摘まみ上げながら最奥を責めると、カヤはガクガクと俺の膝の上で悶えた。"
translation = "포동포동하게 부푼 유두를 꼬집어 올리며 최심부를 몰아붙이자, 카야는 가쿠가쿠 내 무릎 위에서 몸부림쳤다."

[[dialogue]]
speaker = "unk"
original = "明らかに絶頂してる。猛烈にエロい。もっと、カヤをイかせたい──！！"
translation = "명백히 절정하고 있다. 맹렬하게 야하다. 좀 더, 카야를 보내버리고 싶어──!!"

[[dialogue]]
speaker = "カヤ"
original = "「ひゃふっ<emoji=heart04>\u3000あはぁっ<emoji=heart04>\u3000あっ、あっ、あっ、あぁああああっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「히야훗<emoji=heart04> 아하앗<emoji=heart04> 앗, 앗, 앗, 아아아아아앗~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "カヤ"
original = "「急に、あふぁぁああっ、激しっ<emoji=heart04>\u3000またきちゃっ、ああああっ、きちゃうきちゃうきちゃうぅぅっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「갑자기, 아후아아앗, 격렬해<emoji=heart04> 또 와버렷, 아아아앗, 와버려와버려와버려어어읏<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "カヤ"
original = "「あそこのキュンキュンとまんなっ、あふぁああっっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000知らなっ、こんなの知らないっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「거기 큥큥거리는 거 안 멈춰, 아후아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 몰라, 이런 거 몰라<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "カヤ"
original = "「でも、ふぁぁぁっっ、しゅごく気持ちいいっ<emoji=heart04>\u3000頭蕩けるほど幸せぇ<emoji=heart04>\u3000もっとぉ、ああぁ、もっと突いてぇ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하지만, 후아아앗, 너어무 기분 좋아<emoji=heart04> 머리 녹을 정도로 행복해에<emoji=heart04> 좀 더, 아아아, 좀 더 찔러줘……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "身勝手に突き上げ始めてしまったにもかかわらず、カヤはむしろ俺のピストンに合わせて腰を振り返してくれる。"
translation = "제멋대로 찔러 올리기 시작했음에도 불구하고, 카야는 오히려 내 피스톤에 맞춰 허리를 되받아쳐 준다."

[[dialogue]]
speaker = "カヤ"
original = "「あっ、あっ、あっ、あっ<emoji=heart04>\u3000恥ずかしい声、とめられないっ<emoji=heart04>\u3000体のビクビクも、あぁっ、とまらないっ<emoji=heart04>」"
translation = "「앗, 앗, 앗, 앗<emoji=heart04> 부끄러운 목소리, 못 멈추겠어<emoji=heart04> 몸 떨리는 것도, 아앗, 안 멈춰<emoji=heart04>」"

[[dialogue]]
speaker = "カヤ"
original = "「バカに、あぁっ、なりそうっ<emoji=heart04>\u3000でも、ふぁぁぁっ、本当に幸せっ、気持ち、よすぎっ……<emoji=heart04>」"
translation = "「바보가, 아앗, 될 것 같아<emoji=heart04> 하지만, 후아아앗, 정말 행복해, 기분, 너무 좋아……<emoji=heart04>」"

[[dialogue]]
speaker = "カヤ"
original = "「一生これ、あっ、はぁっ、続けて欲しいっ<emoji=heart04>\u3000あはぁあんっ<emoji=heart04>\u3000あなたと一生、つながっていたい、くらいっ<emoji=heart04>」"
translation = "「평생 이거, 앗, 하앗, 계속해 줬으면 좋겠어<emoji=heart04> 아하아앙<emoji=heart04> 당신이랑 평생, 연결되어 있고 싶을 정도야<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "離れたくないとばかりにカヤが膣をギュウギュウに締め付けてきてくれる。セックスの快感を貪るように卑猥に膣を動かしてくる。"
translation = "떨어지기 싫다는 듯 카야가 질을 꽉꽉 조여 온다. 섹스의 쾌감을 탐닉하듯 비외하게 질을 움직여 온다."

[[dialogue]]
speaker = "unk"
original = "そうしてどんどんエロくなっていく彼女の姿に、俺もまた際限なく興奮が高まってしまって──"
translation = "그렇게 점점 야해지는 그녀의 모습에, 나 또한 한계 없이 흥분이 고조되어──"

[[dialogue]]
speaker = "カヤ"
original = "「くはぁっ<emoji=heart04>\u3000あはぁっ<emoji=heart04>\u3000む、むくむくしてるっ<emoji=heart04>\u3000膣内であなたの、あぁあんっ<emoji=heart04>\u3000今までより何倍も太くなってっ<emoji=heart04>」"
translation = "「쿠하앗<emoji=heart04> 아하앗<emoji=heart04> 뭉, 뭉클뭉클하고 있어<emoji=heart04> 질내에서 당신 게, 아아앙<emoji=heart04> 아까보다 몇 배나 굵어져서<emoji=heart04>」"

[[dialogue]]
speaker = "カヤ"
original = "「あなたも、あぁっ、きそう、なのっ？\u3000さっきから私がずっときてるの、キュンキュン気持ちいいの、きそうなのっ？」"
translation = "「당신도, 아앗, 올 것 같아? 아까부터 내가 계속 오고 있는 거, 큥큥 기분 좋은 거, 올 것 같아?」"

[[dialogue]]
speaker = "カヤ"
original = "「だったら、あっ、はぁっ、そのままキュンキュンしてっ<emoji=heart04>\u3000そのままイってっ<emoji=heart04>」"
translation = "「그렇다면, 앗, 하앗, 그대로 큥큥해줘<emoji=heart04> 그대로 가버려<emoji=heart04>」"

[[dialogue]]
speaker = "カヤ"
original = "「私の体でキュンキュンして欲しいっ<emoji=heart04>\u3000この気持ちいいのっ、あっ、あっ<emoji=heart04>\u3000大好きなあなたにも感じて欲しいっ<emoji=heart04>」"
translation = "「내 몸으로 큥큥해주길 바라<emoji=heart04> 이 기분 좋은 거, 앗, 앗<emoji=heart04> 좋아하는 당신도 느꼈으면 좋겠어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "知ってか知らずか、カヤが体重をぐっと乗せてペニスを激しく扱いてきてくれる。"
translation = "알고 그러는 건지 모르고 그러는 건지, 카야가 체중을 훅 실어 페니스를 격렬하게 조여 온다."

[[dialogue]]
speaker = "unk"
original = "一秒ごとにエッチになっていくおま○こで、じゅるじゅると卑猥にペニスへ吸い付いてきてくれて、それが最高に気持ち良くて。"
translation = "매초 야해지는 보지로, 쥬르륵쥬르륵 비외하게 페니스를 빨아들여 와서, 그것이 최고로 기분 좋았다."

[[dialogue]]
speaker = "カヤ"
original = "「あっ、はぁっ、あぁ、んはぁぁっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗, 하앗, 아아, 응하아아앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "カヤ"
original = "「おち○ぽのビクビク激しくなってきたっ<emoji=heart04>\u3000こうすると、気持ち良くなってもらえるみたいっ<emoji=heart04>」"
translation = "「자지 움찔거리는 거 격렬해졌어<emoji=heart04> 이렇게 하면, 기분 좋아지는 것 같아<emoji=heart04>」"

[[dialogue]]
speaker = "カヤ"
original = "「なってっ<emoji=heart04>\u3000もっともっとおち○ぽ気持ち良くなってっ<emoji=heart04>」"
translation = "「되어줘<emoji=heart04> 좀 더 좀 더 자지 기분 좋아져줘<emoji=heart04>」"

[[dialogue]]
speaker = "カヤ"
original = "「おち○ぽ硬くなるの嬉しいからっ<emoji=heart04>\u3000おち○ぽ震えてくれるの、あっ、あっ、幸せだからっ<emoji=heart04>」"
translation = "「자지 딱딱해지는 거 기쁘니까<emoji=heart04> 자지 떨려주는 거, 앗, 앗, 행복하니까<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "よりいっそう俺の性欲を煽るように、カヤが淫らな言葉を叫んでくれる。無垢なおま○この中に、深々とペニスを呑み込んでくれる。"
translation = "더욱더 나의 성욕을 부추기듯, 카야가 음란한 말을 외친다. 무구한 보지 안으로 깊숙이 페니스를 삼켜준다."

[[dialogue]]
speaker = "カヤ"
original = "「あぁっ、好きっ<emoji=heart04>\u3000好き好きっ<emoji=heart04>\u3000大好きっ、好きぃ<emoji=heart04>」"
translation = "「아앗, 좋아<emoji=heart04> 좋아좋아<emoji=heart04> 너무 좋아, 좋아아<emoji=heart04>」"

[[dialogue]]
speaker = "カヤ"
original = "「不思議っ<emoji=heart04>\u3000おち○ぽビクビクしてくれると、好きって言いたくなっちゃうっ<emoji=heart04>\u3000ふぁぁ、好きぃ<emoji=heart04>\u3000あなたのこと本当に大好きぃ<emoji=heart04>」"
translation = "「신기해<emoji=heart04> 자지가 움찔움찔해주면, 좋아한다고 말하고 싶어져<emoji=heart04> 후아아, 좋아아<emoji=heart04> 당신을 정말로 너무 좋아해에<emoji=heart04>」"

[[dialogue]]
speaker = "カヤ"
original = "「またアレもくるぅ<emoji=heart04>\u3000キュンキュンくるぅ<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000ふあぁあぁぁぁああっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「또 그거 온다아<emoji=heart04> 큥큥 온다아<emoji=heart04> 아아앗<emoji=heart04> 후아아아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺も出したいっ。カヤと一緒にイきたいっ。"
translation = "나도 내고 싶어. 카야랑 같이 가고 싶어."

[[dialogue]]
speaker = "unk"
original = "彼女への愛情を、ぶちまけたいっ。"
translation = "그녀를 향한 애정을, 쏟아붓고 싶어."

[[dialogue]]
speaker = "カヤ"
original = "「あっ、あっ、あっ、あっ<emoji=heart04>\u3000きてるっ<emoji=heart04>\u3000おち○ぽに熱いののぼってきてるのわかるっ<emoji=heart04>」"
translation = "「앗, 앗, 앗, 앗<emoji=heart04> 오고 있어<emoji=heart04> 자지에 뜨거운 게 올라오고 있는 거 알아<emoji=heart04>」"

[[dialogue]]
speaker = "カヤ"
original = "「出してっ<emoji=heart04>\u3000それ出してっ<emoji=heart04>\u3000私の膣内に、あああっ、いっぱい出してぇっ<emoji=heart04>」"
translation = "「내보내 줘<emoji=heart04> 그거 내보내 줘<emoji=heart04> 내 질내에, 아아앗, 잔뜩 내줘어<emoji=heart04>」"

[[dialogue]]
speaker = "カヤ"
original = "「教えて欲しいっ<emoji=heart04>\u3000エッチの気持ちよさ、エッチの幸せっ<emoji=heart04>\u3000あなたに、ふぁっ、あっ、あっ、大好きなあなたにっ<emoji=heart04>」"
translation = "「알려줬으면 좋겠어<emoji=heart04> 섹스의 기분 좋음, 섹스의 행복<emoji=heart04> 당신에게, 후아, 앗, 앗, 사랑하는 당신에게<emoji=heart04>」"

[[dialogue]]
speaker = "カヤ"
original = "「あっ、あっ、くるっ、くるくるぅっっ<emoji=heart04>\u3000くはぁぁぁっっ<emoji=heart04>\u3000今まで一番すごいキュンキュンくるぅぅぅっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗, 앗, 온다, 온다온다아앗<emoji=heart04> 쿠하아아아앗<emoji=heart04> 지금까지 중 제일 굉장한 큥큥이 와아아앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "カヤ"
original = "「あふぁあああっっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ああああああああっっ──」"
translation = "「아후아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 아아아아아아아앗──」"

[[dialogue]]
speaker = "unk"
original = "そうしてカヤが口を半開きにして、大声で喘いだ瞬間──"
translation = "그렇게 카야가 입을 반쯤 벌리고, 큰 소리로 신음한 순간──"

[[dialogue]]
speaker = "カヤ"
original = "「はふぁああああああっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あっ──あふぁああああああああああああっっ～～<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하후아아아아아아아아~~<emoji=heart04><emoji=heart04><emoji=heart04> 앗── 아후아아아아아아아아아아아앗~~<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ビュルルルルルルルルぅぅ！！！\u3000ドビュビュっ、ビュルルルルルルぅぅ！！"
translation = "뷰르르르르르르르르으으!!! 푸슛, 뷰르르르르르르으으!!"

[[dialogue]]
speaker = "カヤ"
original = "「熱っ──あ゛はぁぁっっ<emoji=heart04>\u3000しゅごひっ、ビュービューきへぇ<emoji=heart04>」"
translation = "「뜨거어── 아하아아앗<emoji=heart04> 너어무, 뷰뷰와아아<emoji=heart04>」"

[[dialogue]]
speaker = "カヤ"
original = "「きもひいっ<emoji=heart04>\u3000あはぁ<emoji=heart04>\u3000おち○ぽからビュービューくるの、しゅごくきもひいいっ<emoji=heart04>」"
translation = "「기분 조하앗<emoji=heart04> 아하아<emoji=heart04> 자지에서 뷰뷰 오는 거, 너어무 기분 조하아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "カヤ"
original = "「こんにゃにきもひいいこひょ、ふぁぁぁぁぁ……<emoji=heart04><emoji=heart04><emoji=heart04>\u3000はじ、めてぇぇぇ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「이러케 기분 조흔 고, 후아아아아아……<emoji=heart04><emoji=heart04><emoji=heart04> 처, 음이야아아……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "中出しの快感にカヤがトロトロになって感じてくれる。"
translation = "질내사정의 쾌감에 카야가 흐물흐물해져서 느껴준다."

[[dialogue]]
speaker = "unk"
original = "ビクンビクンと膝の上で飛び跳ねながらイきまくってくれる。"
translation = "비쿤비쿤 무릎 위에서 펄쩍펄쩍 뛰며 절정에 빠져준다."

[[dialogue]]
speaker = "unk"
original = "そんな彼女の姿を見つめながら、俺も一滴残らず精を注ぎ込んでいって──"
translation = "그런 그녀의 모습을 바라보며, 나도 한 방울도 남김없이 정을 쏟아부었고──"

[[dialogue]]
speaker = "カヤ"
original = "「はぁっ、はぁっ、はぁー……<emoji=heart04><emoji=heart04><emoji=heart04>\u3000しゅ、しゅごかっひゃ……<emoji=heart04><emoji=heart04><emoji=heart04>\u3000まだ体、フワフワ、してる……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하아, 하아, 하아……<emoji=heart04><emoji=heart04><emoji=heart04> 거, 굉장해써……<emoji=heart04><emoji=heart04><emoji=heart04> 아직 몸이, 둥실둥실, 해……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "カヤ"
original = "「お腹の中も、あったかい……<emoji=heart04>\u3000でもこのあったかいの、えへへ、嬉しい……<emoji=heart04>」"
translation = "「배 안쪽도, 따뜻해……<emoji=heart04> 하지만 이 따뜻한 거, 에헤헤, 기뻐……<emoji=heart04>」"

[[dialogue]]
speaker = "カヤ"
original = "「勇気出してお泊まりしに来て、良かった……<emoji=heart04>\u3000こいびとになってから、今が一番幸せ、かも……<emoji=heart04>」"
translation = "「용기 내서 자러 오길, 잘했어……<emoji=heart04> 연인이 되고 나서, 지금이 제일 행복할지도……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "荒い吐息を漏らしながら、カヤが甘えるように喉を鳴らして俺の背中にもたれかかってきてくれる。"
translation = "거친 숨을 몰아쉬며, 카야가 어리광 부리듯 목을 울리며 내 등에 기대어 온다."

[[dialogue]]
speaker = "unk"
original = "そして、愛おしそうに俺の股間を見つめてきてくれた。"
translation = "그리고, 사랑스럽다는 듯 내 가랑이를 바라보았다."

[[dialogue]]
speaker = "カヤ"
original = "「えへへ……<emoji=heart04>\u3000あなたのおち○ぽ見てるだけで、またムラムラしてくる……<emoji=heart04>」"
translation = "「에헤헤……<emoji=heart04> 당신 자지 보고 있는 것만으로도, 또 야해져버려……<emoji=heart04>」"

[[dialogue]]
speaker = "カヤ"
original = "「私意外と、エッチなのかもしれない……<emoji=heart04>\u3000今の一回で、エッチするの大好き、なっちゃった……<emoji=heart04>」"
translation = "「나 의외로, 야한 애일지도 몰라……<emoji=heart04> 지금 한 번으로, 섹스하는 거 정말 좋아하게, 되어버렸어……<emoji=heart04>」"

[[dialogue]]
speaker = "カヤ"
original = "「もっと教えて……？\u3000こいびと同士ですること、エッチのこと……。私に、たくさん、たくさん……<emoji=heart04>」"
translation = "「더 알려줘……? 연인끼리 하는 거, 야한 거……. 나한테, 많이, 많이……<emoji=heart04>」"

[[dialogue]]
speaker = "カヤ"
original = "「夜はまだまだこれから、だから……<emoji=heart04>\u3000まだまだたっぷりイチャイチャできる、から……<emoji=heart04>」"
translation = "「밤은 이제부터니까……<emoji=heart04> 아직 듬뿍 꽁냥거릴 수 있으니까……<emoji=heart04>」"

[[dialogue]]
speaker = "カヤ"
original = "「おっぱい触ったり、キスしたり、おち○ぽ挿れたり……して？\u3000私にエッチなこと……して？」"
translation = "「가슴 만지거나, 키스하거나, 자지 넣거나…… 해줄래? 나한테 야한 짓…… 해줘?」"

[[dialogue]]
speaker = "カヤ"
original = "「せっかくのお泊まりデート、えへへ、いっぱい楽しみたい……<emoji=heart04>」"
translation = "「어렵게 잡은 숙박 데이트, 에헤헤, 잔뜩 즐기고 싶어……<emoji=heart04>」"

