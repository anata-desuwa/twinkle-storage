[[dialogue]]
speaker = "unk"
original = "第３話,星騎士の意義,B"
translation = "제3화, 성기사의 의의, B"

[[dialogue]]
speaker = "unk"
original = "俺は新星学園の星徒会長として、この前フィーニスの塔で起こったことについて、学園各所や流星星徒会に報告した。"
translation = "나는 신성학원의 성도회장으로서, 얼마 전 피니스의 탑에서 일어난 일에 대해 학원 각처와 유성성도회에 보고했다."

[[dialogue]]
speaker = "unk"
original = "もちろんディザスターハンドとの遭遇や、梨緒から得た情報も含めてだ。"
translation = "물론 디재스터 핸드와의 조우나 리오로부터 얻은 정보도 포함해서다."

[[dialogue]]
speaker = "unk"
original = "また流星星徒会からも連絡があり、魔界ではまだ危機が去っていないらしく、フィオナはまだ動けそうにないという。"
translation = "또한 유성성도회에서도 연락이 왔는데, 마계에서는 아직 위기가 가시지 않은 듯하여 피오나는 아직 움직일 수 없을 것 같다고 한다."

[[dialogue]]
speaker = "マトイ"
original = "「あの手があんな近くにいると思うと、怖いよね……」"
translation = "「그 손이 그렇게 가까이 있다고 생각하니 무섭네……」"

[[dialogue]]
speaker = "unk"
original = "窓からフィーニスの塔を眺めながら、マトイが心配そうに呟く。"
translation = "창밖으로 피니스의 탑을 바라보며 마토이가 걱정스럽게 중얼거린다."

[[dialogue]]
speaker = "unk"
original = "ディザスターハンドがいつ世界を襲うかわからない状態なのだから、不安になるのも当然だろう。"
translation = "디재스터 핸드가 언제 세계를 습격할지 모르는 상태이니, 불안해지는 것도 당연하겠지."

[[dialogue]]
speaker = "サーシャ"
original = "「でも今までじっとしてたんだから、きっと動かない理由があるのよね～」"
translation = "「하지만 지금까지 가만히 있었으니까, 분명 움직이지 않는 이유가 있을 거예요~」"

[[dialogue]]
speaker = "unk"
original = "あの手自体に意思があるのか、それとも誰かが操っているのか。"
translation = "그 손 자체에 의지가 있는 것인지, 아니면 누군가가 조종하고 있는 것인지."

[[dialogue]]
speaker = "unk"
original = "強大な敵であること以外、わからないことだらけだ。"
translation = "강대한 적이라는 것 외에는 모르는 것투성이다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「ま、クヨクヨしてても仕方ないわ。あの手はいつか倒す。でしょ、クロト？」"
translation = "「뭐, 우울해하고 있어 봐야 별수 없지. 그 손은 언젠가 쓰러뜨린다. 그치, 쿠로토?」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、必ずな」"
translation = "「아아, 반드시.」"

[[dialogue]]
speaker = "unk"
original = "その力を目の当たりにしたからこそ、絶望に心折れるわけにはいかない。"
translation = "그 힘을 목격했기에 절망에 마음이 꺾일 수는 없다."

[[dialogue]]
speaker = "unk"
original = "決戦の時は必ず来る。それまでに力を取り戻す──いや、それ以上の力を身に付けなければ。"
translation = "결전의 때는 반드시 온다. 그때까지 힘을 되찾는다── 아니, 그 이상의 힘을 길러야 한다."

[[dialogue]]
speaker = "アナ"
original = "「皆さん、大変です……！」"
translation = "「여러분, 큰일이에요……!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あら、珍しいわね。アナがＤＩＳＣで動画見てるなんて」"
translation = "「어머, 드문 일이네. 아나가 DISC로 동영상을 보고 있다니.」"

[[dialogue]]
speaker = "アナ"
original = "「とにかくこれを見てください……！」"
translation = "「어쨌든 이걸 봐 주세요……!」"

[[dialogue]]
speaker = "unk"
original = "ＤＩＳＣ片手に現れたのは、慌てた様子のアナ。"
translation = "DISC를 한 손에 들고 나타난 것은 당황한 기색의 아나."

[[dialogue]]
speaker = "unk"
original = "言われた通りアナのＤＩＳＣを見てみると──"
translation = "말한 대로 아나의 DISC를 보니──"

[[dialogue]]
speaker = "チナ"
original = "『平行世界アルタイルとデネブは敵対関係にある』"
translation = "『평행세계 알타이르와 데네브는 적대 관계에 있다』"

[[dialogue]]
speaker = "チナ"
original = "『アルタイルのリクリエを止めれば、デネブのリクリエが加速する。デネブのリクリエを止めれば、アルタイルのリクリエが激化する』"
translation = "『알타이르의 리크리에를 멈추면 데네브의 리크리에가 가속한다. 데네브의 리크리에를 멈추면 알타이르의 리크리에가 격화된다』"

[[dialogue]]
speaker = "クロト"
original = "「！\u3000これは──」"
translation = "「! 이건──」"

[[dialogue]]
speaker = "アナ"
original = "「今朝、彼女の映像が動画配信サイトに投稿されました」"
translation = "「오늘 아침, 그녀의 영상이 동영상 공유 사이트에 게시되었습니다.」"

[[dialogue]]
speaker = "アナ"
original = "「ＳＮＳでも拡散されており、今も右肩上がりに再生数が伸び続けています」"
translation = "「SNS로도 확산되고 있으며, 지금도 우상향으로 재생수가 계속 늘어나고 있어요.」"

[[dialogue]]
speaker = "チナ"
original = "『いいか、これは生存競争だ。生き残るのはデネブかアルタイル、２つに１つ』"
translation = "『잘 들어라, 이건 생존 경쟁이다. 살아남는 건 데네브냐 알타이르냐, 둘 중 하나다』"

[[dialogue]]
speaker = "チナ"
original = "『生き残るのはアタシらだ……！』"
translation = "『살아남는 건 우리다……!』"

[[dialogue]]
speaker = "unk"
original = "デネブの刺客からの宣戦布告。センセーショナルな内容なのは間違いない。"
translation = "데네브의 자객이 보낸 선전포고. 선정적인 내용임에는 틀림없다."

[[dialogue]]
speaker = "unk"
original = "数ヶ月前、この世界は存亡の危機にあったのだからなおさらだ。"
translation = "몇 달 전, 이 세계는 존망의 위기에 처해 있었으니 더더욱 그렇다."

[[dialogue]]
speaker = "unk"
original = "教皇庁周辺は激戦だったから、周囲の人は避難していると思っていたけど、俺たち以外に誰か見ていたのか。"
translation = "교황청 주변은 격전지였기에 주변 사람들은 피난했을 거라 생각했는데, 우리 말고 누군가 보고 있었던 건가."

[[dialogue]]
speaker = "アナ"
original = "「コハルコ先輩によれば、動画の削除自体は可能だそうです。拡散したものも手段を選ばなければ消せるとのことですが……」"
translation = "「코하루코 선배에 따르면 동영상 삭제 자체는 가능하다고 합니다. 확산된 것도 수단을 가리지 않으면 지울 수 있다고 합니다만……」"

[[dialogue]]
speaker = "アナ"
original = "「見た人の記憶は消せないし、むしろ隠蔽と見られて悪影響を与えるだろうと」"
translation = "「본 사람의 기억은 지울 수 없고, 오히려 은폐로 보여 악영향을 줄 거라고 하더군요.」"

[[dialogue]]
speaker = "クロト"
original = "「それはそうだろうな……」"
translation = "「그건 그렇겠지……」"

[[dialogue]]
speaker = "unk"
original = "一度広まったものを躍起になって消そうとするのは逆効果だ。"
translation = "이미 퍼진 것을 기를 쓰고 지우려 하는 것은 역효과다."

[[dialogue]]
speaker = "unk"
original = "情報の真偽はともかく、チナがこう言ったことも事実。"
translation = "정보의 진위는 어찌 됐든, 치나가 이렇게 말한 것도 사실."

[[dialogue]]
speaker = "unk"
original = "拡散を止めようとすれば不信を招くだろう。"
translation = "확산을 막으려 하면 불신을 초래할 것이다."

[[dialogue]]
speaker = "サーシャ"
original = "「今調べてみたけど、ネットの反応はまちまちね。平行世界なんて普通の人は知らないもの」"
translation = "「방금 조사해 봤는데 인터넷 반응은 제각각이네~ 평행세계 같은 건 보통 사람은 모르니까~」"

[[dialogue]]
speaker = "アナ"
original = "「特撮やＣＧだと受け取っている人も見られます。ですが彼女の言葉を信じている人も少なからず存在しているようです」"
translation = "「특촬이나 CG라고 받아들이는 사람도 보입니다. 하지만 그녀의 말을 믿는 사람도 적지 않게 존재하는 듯해요.」"

[[dialogue]]
speaker = "unk"
original = "平行世界が実在し、アルタイルとデネブという２つの世界が争っている──にわかには信じがたい話だが、チナの言葉を受け入れた人々はいたようだ。"
translation = "평행세계가 실재하고 알타이르와 데네브라는 두 세계가 다투고 있다── 선뜻 믿기 힘든 이야기지만, 치나의 말을 받아들인 사람들은 있었던 모양이다."

[[dialogue]]
speaker = "unk"
original = "そしてチナがリクリエという言葉を使ったことから、教皇庁や学園が絡んでいると察した人たちもいるらしい。"
translation = "그리고 치나가 리크리에라는 단어를 사용한 것에서 교황청이나 학원이 얽혀 있다고 눈치챈 사람들도 있는 듯하다."

[[dialogue]]
speaker = "マトイ"
original = "「う……『隠してたのか』なんて、星騎士に怒ってる人もいる……」"
translation = "「으…… 『숨기고 있었던 거냐』라며 성기사에게 화내는 사람도 있어……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「隠すも何も、極星学園なんて私たちもついこの前知ったところよ！」"
translation = "「숨기긴 뭘 숨겨, 극성학원 같은 건 우리도 바로 얼마 전에 알았다고!」"

[[dialogue]]
speaker = "unk"
original = "俺たち星徒会も、チナの言葉が真実かわからず混乱の<ruby>直中<rt>ただなか</rt></ruby>にあった。"
translation = "우리 성도회도 치나의 말이 진실인지 알 수 없어 혼란의 한복판에 있었다."

[[dialogue]]
speaker = "unk"
original = "だが今後、リクリエとの戦いの先頭に立つ者として説明を求められるだろう。"
translation = "하지만 앞으로 리크리에와의 싸움의 선두에 서는 자로서 설명을 요구받게 될 것이다."

[[dialogue]]
speaker = "クロト"
original = "「状況は待ってくれないものなんだな、本当に……」"
translation = "「상황은 기다려 주지 않는 법이군, 정말로……」"

