[[dialogue]]
speaker = "unk"
original = "第１話,魔界へ降り立つ,B"
translation = "제1화, 마계에 내려서다, B"

[[dialogue]]
speaker = "アイリーン"
original = "「『<ruby>世界樹<rt>ユグドラシル</rt></ruby>』起動──目標は魔界Ⅳ－Ｒ１３地点！\u3000<ruby>良き旅を<rt>ボン・ボヤージュ</rt></ruby>！」"
translation = "「『세계수』 기동── 목표는 마계Ⅳ－Ｒ１３ 지점! 좋은 여행을!」"

[[dialogue]]
speaker = "クロト"
original = "（待っていてくれ──ヴィーナス！）"
translation = "（기다려 줘── 비너스!）"

[[dialogue]]
speaker = "unk"
original = "……。"
translation = "……."

[[dialogue]]
speaker = "unk"
original = "…………。"
translation = "…………."

[[dialogue]]
speaker = "マトイ"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "フィオナ"
original = "「ここが……」"
translation = "「여기가……」"

[[dialogue]]
speaker = "クロト"
original = "「魔界──か」"
translation = "「마계──인가」"

[[dialogue]]
speaker = "unk"
original = "見果てぬ原野が広がっていた。"
translation = "끝없이 펼쳐진 원야가 펼쳐져 있었다."

[[dialogue]]
speaker = "unk"
original = "魔界のスケールをありありと示すような、<ruby>茫漠<rt>ぼうばく</rt></ruby>たる荒野──"
translation = "마계의 스케일을 생생하게 보여주는 듯한, 망막한 황야──"

[[dialogue]]
speaker = "unk"
original = "『世界樹のうろ』を通過した俺たちは、移動の時間を感じる間もなくここへ着いていた。"
translation = "『세계수의 빈 구멍』을 통과한 우리는, 이동 시간을 느낄 새도 없이 이곳에 도착해 있었다."

[[dialogue]]
speaker = "サーシャ"
original = "「ああ……懐かしいわね、この風。涼しげで、渇いていて」"
translation = "「아아…… 그립네, 이 바람. 시원하고, 메말라 있고」"

[[dialogue]]
speaker = "ソフィア"
original = "「姉さんよりは離れて日も浅いですが──そうですね。帰ってきたって感じがします」"
translation = "「언니보다는 떠난 지 얼마 안 되었지만── 그렇네요. 돌아왔다는 느낌이 들어요」"

[[dialogue]]
speaker = "クロト"
original = "「サーシャ先輩たちにとっては──故郷ですもんね」"
translation = "「사샤 선배들에게는── 고향이잖아요」"

[[dialogue]]
speaker = "unk"
original = "初めて組の俺たちが圧倒される中で、奏姉妹の２人だけは感慨に浸っていた。"
translation = "처음 온 우리들이 압도되는 가운데, 카나데 자매 두 사람만이 감회에 젖어 있었다."

[[dialogue]]
speaker = "ユウリ"
original = "「あたしのママは魔族だけど、<ruby>魔界<rt>こっち</rt></ruby>に来んのは初めてだぜ──つか、こんなに寒ぃのか……！？」"
translation = "「내 엄마는 마족이지만, 마계에 오는 건 처음이라고── 그나저나, 이렇게 춥냐……!?」"

[[dialogue]]
speaker = "マトイ"
original = "「確かに……なんか着替えてくればよかったかも……」"
translation = "「확실히…… 뭔가 갈아입고 올 걸 그랬나 봐……」"

[[dialogue]]
speaker = "サーシャ"
original = "「んー。どこもそうってわけじゃないんだけど」"
translation = "「음. 어디든 다 그렇다는 건 아니지만」"

[[dialogue]]
speaker = "フィオナ"
original = "「魔界とひと口に言っても──面積は人間界の十倍以上と言われています。気候、風土も、それだけ多岐に渡るのでしょう」"
translation = "「마계라고 한마디로 말해도── 면적은 인간계의 열 배 이상이라고 합니다. 기후, 풍토도, 그만큼 다방면에 걸쳐 있겠지요」"

[[dialogue]]
speaker = "クロト"
original = "「ああ。そして俺たちは、そんな広大な世界から──一人の人間を探し出さなくちゃならない」"
translation = "「아아. 그리고 우리는, 그런 광대한 세계에서── 한 명의 인간을 찾아내야만 한다」"

[[dialogue]]
speaker = "マトイ"
original = "「ヴィーナス……」"
translation = "「비너스……」"

[[dialogue]]
speaker = "unk"
original = "困難は必至。"
translation = "어려움은 필연적이다."

[[dialogue]]
speaker = "unk"
original = "だが、何もかも覚悟の上で来た。"
translation = "하지만, 모든 것을 각오하고 왔다."

[[dialogue]]
speaker = "フィオナ"
original = "「ソフィア──大丈夫？\u3000唇まで真っ青だけど……」"
translation = "「소피아── 괜찮아요? 입술까지 새파란데……」"

[[dialogue]]
speaker = "ソフィア"
original = "「な……何がですか、フィオナ会長。ソフィアは寒がってなどいません。至ってホ、ホ、ホットな……」"
translation = "「무, 무슨 말씀이세요, 피오나 회장. 소피아는 추위를 타고 있지 않습니다. 지극히 하, 하, 핫한……」"

[[dialogue]]
speaker = "ユウリ"
original = "「いや、超寒がりじゃんおまえ」"
translation = "「야, 엄청 추위 타잖아 너」"

[[dialogue]]
speaker = "ソフィア"
original = "「寒いくらいで音を上げている場合ではないのです……！\u3000ぷるぷる……！」"
translation = "「추운 정도로 항복할 때가 아닌 것입니다……! 부들부들……!」"

[[dialogue]]
speaker = "ソフィア"
original = "「それに寒いということはむしろ好都合──あれ？\u3000なんでしょう、このブランケットは……？」"
translation = "「게다가 춥다는 것은 오히려 호조건── 어라? 뭘까요, 이 담요는……?」"

[[dialogue]]
speaker = "クロト"
original = "「念のために持ってきた防寒具だ。余ってるから使ってくれ」"
translation = "「만약을 위해 가져온 방한구다. 남으니까 써 줘」"

[[dialogue]]
speaker = "ソフィア"
original = "「あ、ありがとうございます……。ですが、それだと新星会長さんが寒さにやられてしまいます」"
translation = "「아, 감사합니다……. 하지만, 그러면 신성 회장님이 추위에 당해 버립니다」"

[[dialogue]]
speaker = "ソフィア"
original = "「私は魔界の住人……こ、これしきの寒さで凍えているわけには……！」"
translation = "「저는 마계의 주민…… 이, 이 정도의 추위로 얼어붙어 있을 수는……!」"

[[dialogue]]
speaker = "クロト"
original = "「俺は平気だ。昔、冷凍マグロの倉庫でバイトをしてたからな」"
translation = "「나는 평기다. 옛날에 냉동 참치 창고에서 아르바이트를 했으니까」"

[[dialogue]]
speaker = "ソフィア"
original = "「そ、そうですか……ならお言葉に甘えて……くるまるとしましょう。ぬくぬく」"
translation = "「그, 그러신가요…… 그럼 사양 않고…… 감싸도록 하겠습니다. 따끈따끈」"

[[dialogue]]
speaker = "unk"
original = "俺からのブランケットを受け取ったソフィアちゃんは、それを大事そうに自分の首へ巻きつけた。"
translation = "나에게서 담요를 받은 소피아짱은, 그것을 소중히 자신의 목에 둘렀다."

[[dialogue]]
speaker = "マトイ"
original = "（って言いながら緋宮くんも震えてるけど……）"
translation = "（라고 말하면서 히노미야 군도 떨고 있지만……）"

[[dialogue]]
speaker = "サーシャ"
original = "（ふふ。気づかないふりをしてあげましょ）"
translation = "（후후. 눈치채지 못한 척해 주자）"

[[dialogue]]
speaker = "unk"
original = "ようやくソフィアちゃんの身震いも収まってきた──その矢先だった。"
translation = "겨우 소피아짱의 몸서리도 잦아들었다── 바로 그때였다."

[[dialogue]]
speaker = "狒々の魔獣"
original = "「──ガウガッ！\u3000ガウガウガッ！」"
translation = "「──가우갓! 가우가우갓!」"

[[dialogue]]
speaker = "マトイ"
original = "「！？」"
translation = "「!?」"

[[dialogue]]
speaker = "ユウリ"
original = "「なんだ──モンスターか──！？」"
translation = "「뭐야── 몬스터냐──!?」"

[[dialogue]]
speaker = "ソフィア"
original = "「魔獣です──どうやら、珍しい匂いにつられて寄ってきたみたいです」"
translation = "「마수입니다── 아무래도, 희귀한 냄새에 이끌려 온 것 같습니다」"

[[dialogue]]
speaker = "unk"
original = "気づけば俺たちの背後に多数の魔獣が忍び寄っていた。"
translation = "정신을 차려 보니 우리들의 배후에 다수의 마수가 다가와 있었다."

[[dialogue]]
speaker = "unk"
original = "『リクリエ』由来のモンスターとも違う──魔界だけに原生する凶暴なけものだ。"
translation = "『리크리에』 유래의 몬스터와도 다른── 마계에만 원생하는 흉포한 짐승이다."

[[dialogue]]
speaker = "サーシャ"
original = "「寒冷地の原野に棲む魔獣は──炎が明確な弱点よ。頼むわね、ユウリちゃん」"
translation = "「한랭지의 원야에 사는 마수는── 불이 명확한 약점이야. 부탁할게, 유우리짱」"

[[dialogue]]
speaker = "ユウリ"
original = "「ＯＫ、アナもいねえしあたしに任せな！」"
translation = "「OK, 아나도 없고 나한테 맡겨!」"

[[dialogue]]
speaker = "クロト"
original = "「速やかに迎撃する──各自、六人での連携を試すぞ」"
translation = "「신속하게 요격한다── 각자, 여섯 명의 연계를 시험한다」"

[[dialogue]]
speaker = "フィオナ"
original = "「承知です──っ！」"
translation = "「알겠습니다──!」"

[[dialogue]]
speaker = "狒々の魔獣"
original = "「ガウガァ────ッ！！」"
translation = "「가우가아────앗!!」"

