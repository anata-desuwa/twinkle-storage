[[dialogue]]
speaker = "unk"
original = "第６話,新世界の守護天使,B"
translation = "제6화, 신세계의 수호천사"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「……新しい世界を、創る？\u3000な、何を言っているの、ルヴィ……？」"
translation = "「……새로운 세계를, 만든다고? 무, 무슨 말을 하는 거야, 루비……?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「言葉通りの意味よ。デネブとアルタイルを滅ぼし、テルルを排除してリクリエが為された時……私は女神の地位に就く」"
translation = "「말 그대로의 의미예요. 데네브와 알타이르를 멸망시키고, 테루루를 배제하여 리크리에가 이루어질 때…… 저는 여신의 지위에 오를 거예요.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「女神には、己の手足となる守護天使がいる──テルルはいくつも持っているけれど、私は４柱もいれば十分」"
translation = "「여신에게는 자신의 수족이 될 수호천사가 있죠── 테루루는 여럿 거느리고 있지만, 저는 4주(柱)면 충분해요.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「女神ルヴィネの守護天使として、あなたたち４人を迎えてあげる。どうかしら？」"
translation = "「여신 루비네의 수호천사로서, 당신들 네 명을 맞이해 줄게요. 어떤가요?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「アタシたちが……」"
translation = "「우리들이……」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「ルヴィの守護天使に……？」"
translation = "「루비의 수호천사로……?」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「……何を考えているの、ルヴィ？」"
translation = "「……무슨 생각을 하는 거야, 루비?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「あなたたちの怒りは理解できる。お父様の命令とはいえ、無礼なことをしてきたお詫びに、私が提示できる謝罪の形よ」"
translation = "「당신들의 분노는 이해해요. 아버님의 명령이라고는 해도, 무례한 짓을 저지른 것에 대한 사죄로서 제가 제시할 수 있는 사과의 형태예요.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「先日──お父様にお願いをしたの。リクリエを為した後に、あなたたちを守護天使として迎えてもいいか、とね」"
translation = "「며칠 전── 아버님께 부탁을 드렸어요. 리크리에를 완수한 후에, 당신들을 수호천사로서 맞이해도 되겠느냐고 말이죠.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「お父様からは許可をいただけた……ヒトとしての肉体は捨てることになるけれど、永遠の命を約束するわ。……どうかしら？」"
translation = "「아버님께선 허락해 주셨어요…… 인간으로서의 육체는 버리게 되겠지만, 영원한 삶을 약속할게요. ……어떤가요?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「もちろんあなたたちだけじゃない。今のデネブで生きる人々も、希望する者は全員、下位の天使として招くつもりよ」"
translation = "「물론 당신들뿐만이 아니에요. 지금의 데네브에서 살아가는 사람들도, 희망하는 자는 전원 하위 천사로서 불러들일 생각이에요.」"

[[dialogue]]
speaker = "unk"
original = "ベアトリスたちは、ルヴィネの言葉に何も言い返すことができない。"
translation = "베아트리스 일행은 루비네의 말에 아무런 대꾸도 할 수 없었다."

[[dialogue]]
speaker = "unk"
original = "自分たちは、何を提案されているのか──ベアトリスたちの頭の中が、混乱で埋め尽くされていく。"
translation = "자신들이 무엇을 제안받고 있는 것인가── 베아트리스 일행의 머릿속이 혼란으로 가득 차 간다."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……ベアト。あなたは吸血鬼の、影の一族。星力が切れれば、太陽の下を歩くこともできなくなる」"
translation = "「……베아토. 당신은 흡혈귀인 『그림자 일족』. 성력이 다하면 태양 아래를 걷는 것조차 할 수 없게 돼요.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「付き合いの長いあなたが、また暗い洞窟に住まなければならないだなんて……あまりに不憫だわ。あなたに不自由のない霊力の器と、永遠の命をあげる」"
translation = "「오랜 시간을 함께한 당신이 다시 어두운 동굴에서 살아야만 한다니…… 너무나 가련하네요. 당신에게 부자유함이 없는 영력의 그릇과 영원한 삶을 줄게요.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「…………そんなの」"
translation = "「………… 그런 건」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「チナ。アルタイルのご両親と、そのお腹の子供も一緒に連れていってあげるわ」"
translation = "「치나. 알타이르에 있는 부모님과 그 배 속의 아이도 함께 데려가 줄게요.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「今まで私はお父様に尽くしてきた。そのくらいのワガママなら、聞いてもらえるはずだから」"
translation = "「지금까지 저는 아버님께 헌신해 왔어요. 그 정도의 어리광이라면 들어주실 테니까요.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「…………お前」"
translation = "「………… 너」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「グレイスも、アルタイルに生きているご両親がまだいるはず。きっと探してあげる」"
translation = "「그레이스도 알타이르에 살아계신 부모님이 아직 있을 터. 반드시 찾아 줄게요.」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「…………ルヴィ」"
translation = "「………… 루비」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「レティシア。守護天使になって、永遠の命を持てば……５人全員、ずっと一緒よ。これがあなたの望みでしょう？」"
translation = "「레티시아. 수호천사가 되어 영원한 삶을 얻으면…… 다섯 명 전원, 계속 함께예요. 이것이 당신의 소망이죠?」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「…………何てことを、言うの？」"
translation = "「………… 무슨 말을 하는 거야?」"

[[dialogue]]
speaker = "unk"
original = "ベアトリスたちは絶句していた。"
translation = "베아트리스 일행은 절구했다."

[[dialogue]]
speaker = "unk"
original = "価値基準が違う相手に、どう言葉を投げかければいいのか──もはやわからなくなっていた。"
translation = "가치 기준이 다른 상대에게 어떤 말을 건네야 할지── 이제는 알 수 없게 되어 있었다."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「リクリエが起きてもあなたたちは死なない。愛しい人達も連れていける……約束するわ」"
translation = "「리크리에가 일어나도 당신들은 죽지 않아요. 사랑하는 사람들도 데려갈 수 있어요…… 약속할게요.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「だからこれまで通り、私に従い、ついてきなさい。あなたたちだけは救ってあげましょう」"
translation = "「그러니 지금까지 그랬던 것처럼 저를 따르고, 따라오세요. 당신들만은 구해 줄게요.」"

[[dialogue]]
speaker = "unk"
original = "１０年間を共に過ごしてきた親友の提案は、あまりに一方的で、あまりに温かみがなくて──"
translation = "10년 동안을 함께 지내온 절친의 제안은 너무나 일방적이고, 너무나 온기가 없어서──"

[[dialogue]]
speaker = "？？？"
original = "「──それが、新しい女神が描く理想の世界か？」"
translation = "「── 그것이 새로운 여신이 그리는 이상적인 세계인가?」"

[[dialogue]]
speaker = "unk"
original = "その沈黙を、１人の声が切り裂く。"
translation = "그 침묵을 한 사람의 목소리가 가른다."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「…………もう少し足止めできると思っていたのだけれど。やはりテルルの手先は、目障りね」"
translation = "「………… 조금 더 발을 묶어둘 수 있을 거라 생각했는데. 역시 테루루의 앞잡이는 눈에 거슬리네요.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「極星のみんな、待たせてごめん。予想より手間取った……！」"
translation = "「극성학원 모두들, 기다리게 해서 미안해. 예상보다 시간이 걸렸어……!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「会長さん！\u3000それに……みんなも！」"
translation = "「회장님! 그리고…… 모두들!」"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「お待たせしました。道中、色々ありまして……こちらも状況は芳しくなさそうですね」"
translation = "「오래 기다리셨습니다. 오는 길에 여러 일이 있어서…… 이쪽도 상황이 좋지 않아 보이네요.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「悪い。まだルヴィを説得できてないんだ……！」"
translation = "「미안. 아직 루비를 설득하지 못했어……!」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「お姉ちゃんたちが来たからにはもう安心よ～♪\u3000遅れてごめんね、レティシアちゃん？」"
translation = "「언니들이 왔으니까 이제 안심이야~♪ 늦어서 미안해, 레티시아짱?」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「……何それ。ずっと思っていたのだけどサーシャ、あの日から私を子供扱いしていない……？」"
translation = "「……뭐야 그게. 전부터 생각했는데 사샤, 그날 이후로 나를 어린애 취급하지 않아……?」"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「グレイスちゃん、よく頑張ったね。後は新星星徒会に任せて！」"
translation = "「그레이스짱, 고생 많았어. 나머지는 신성 성도회에 맡겨줘!」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「マトイさんっ……すみません、すぐに立て直しますから……！！」"
translation = "「마토이 씨…… 죄송해요, 금방 전열을 가다듬을 테니까……!!」"

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「ようやく追いついたと思ったら、あんまりな提案してるじゃない！\u3000お尻ぺんぺんでお説教ね！！」"
translation = "「겨우 따라잡았다 싶었더니, 말도 안 되는 제안을 하고 있잖아! 엉덩이 팡팡하며 설교해 줄 테다!!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「魔王もノヴァ星騎士もだけど……九浄ヴィーナス。あなたは本当に癇に障るわ。あの出来損ないと話してるみたい」"
translation = "「마왕도 노바 성기사도 그렇지만…… 쿠죠 비너스. 당신은 정말 신경을 긁는군요. 그 낙제생과 이야기하는 것 같아요.」"

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「こ、こいつ今、たぶんママの悪口を言ったわ！？\u3000許せないんだけどー！？」"
translation = "「이, 이 녀석 지금 아마 마마 욕을 했지!? 용서 못 해~!?」"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「前会長にしては察しがいいですね。その怒り、ぶつけてやりましょう」"
translation = "「전 회장치고는 눈치가 빠르네요. 그 분노, 쏟아부어 주죠.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「守護天使として一緒に新しい世界を作ろう。永遠の命をあげる──だって？」"
translation = "「수호천사로서 함께 새로운 세계를 만들자. 영원한 삶을 주겠다── 라고?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ルヴィネ。君は長いこと彼女たちと一緒にいるくせに……どんなことを言えば喜んでくれるかもわからないのか！？」"
translation = "「루비네. 너는 오랫동안 그녀들과 함께 있었으면서…… 어떤 말을 해야 기뻐해 줄지도 모르는 거냐!?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……知った風な口を利かないでほしいわね」"
translation = "「……다 안다는 듯이 지껄이지 않았으면 좋겠네요.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ベアトたちはともかく、テルルの手先であるあなたたちに、もうこれ以上用はないわ」"
translation = "「베아토 일행은 어쨌든, 테루루의 앞잡이인 당신들에게는 이제 더 이상 용건 없어요.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「生きて帰れると思わないことね。ここで引導を渡してあげるわ」"
translation = "「살아서 돌아갈 생각은 하지 마세요. 여기서 최후를 맞이하게 해 주죠.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いいや、俺たちは勝つ。勝って君を止める！」"
translation = "「아니, 우리들이 이긴다. 이겨서 너를 멈추겠어!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……止める？\u3000殺すの間違いでしょう？」"
translation = "「……멈춘다고요? 죽인다는 말을 잘못한 거겠죠?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ルヴィネ、君のことは殺さない。むしろ死なれたら困る」"
translation = "「루비네, 너를 죽이지 않아. 오히려 죽으면 곤란해.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ベアトリスたちのためにも、俺たちアルタイルのためにも……！」"
translation = "「베아트리스 일행을 위해서도, 우리 알타이르를 위해서도……!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「──舐められたものね」"
translation = "「── 얕보였군요.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「以前にデネブで交戦した時は、全力を出せなかった。でも最早、私が力を隠す理由はないのよ？」"
translation = "「이전에 데네브에서 교전했을 때는 전력을 다할 수 없었어요. 하지만 이제 제가 힘을 숨길 이유는 없거든요?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「そんなに女神の全力が見たいのなら、見せてあげる……！」"
translation = "「그렇게나 여신의 전력을 보고 싶다면 보여 주겠어요……!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「そして、今日ここで終わらせてあげるわ！\u3000魔王ラクシスとの因縁も、旧世代の女神が残した負の遺産も、すべて！！」"
translation = "「그리고 오늘 여기서 끝내 주겠어요! 마왕 락시스와의 인연도, 구세대의 여신이 남긴 부의 유산도, 전부!!」"

