[[dialogue]]
speaker = "unk"
original = "第１話,クリスマスのビーチ撮影会,P"
translation = "제1화, 크리스마스의 비치 촬영회, P"

[[dialogue]]
speaker = "unk"
original = "クリスマスも近づいた、とある日の放課後。俺は恋人のルルカとリゾート結界のプライベートビーチを訪れていた。"
translation = "크리스마스도 다가온 어느 날 방과 후. 나는 연인인 루루카와 리조트 결계의 프라이빗 비치를 방문했다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「いやー、夏だねぇ、お兄ちゃん♪」"
translation = "「이야~ 여름이네, 오빠♪」"

[[dialogue]]
speaker = "unk"
original = "今は冬だぞ？"
translation = "지금은 겨울이라고?"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「わかってる、あたしもわかってるんだよ～。でも見て、この青空！\u3000輝く海！\u3000白い砂浜！」"
translation = "「알고 있어, 나도 알고 있다구~. 하지만 봐, 이 푸른 하늘! 빛나는 바다! 하얀 모래사장!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「リップルさん様々だよね。冬なのにこうして、真夏のリゾートを満喫できるんだもん♪」"
translation = "「리플 씨 덕분이지. 겨울인데도 이렇게 한여름의 리조트를 만끽할 수 있는걸♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「って……お兄ちゃん、ジト目になってるね！\u3000そうだよね、ツッコミたくて仕方がないって感じでしょ？」"
translation = "「그나저나…… 오빠, 눈이 가늘어졌네! 그렇지, 태클 걸고 싶어 죽겠다는 느낌이지?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「真夏のリゾートなのに、クリスマスフォームは場違いでは！？\u3000って！」"
translation = "「한여름 리조트인데 크리스마스 폼은 때와 장소에 안 맞지 않아!? 라고!」"

[[dialogue]]
speaker = "unk"
original = "すごく可愛いとは思うけどね"
translation = "굉장히 귀엽다고는 생각하지만 말이야"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「えへへ♪\u3000ありがと～<emoji=heart04>」"
translation = "「에헤헤♪ 고마워~<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「まあでも、お兄ちゃんならそう言ってくれると思ってたよ♪\u3000お兄ちゃんは彼氏さんなんだし、褒める一択しかないよね～」"
translation = "「뭐 그래도 오빠라면 그렇게 말해줄 줄 알았어♪ 오빠는 남자친구인걸, 칭찬하는 선택지밖에 없겠지~」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「もちろんあたし自身も、このクリスマスフォームはめちゃくちゃ可愛いと思ってるし！」"
translation = "「물론 나 자신도 이 크리스마스 폼은 엄청나게 귀엽다고 생각하고 있고!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「それに、冬でも水着フォームが温かいように、このクリスマスフォームは夏でも涼しいんだよ♪」"
translation = "「게다가 겨울에도 수영복 폼이 따뜻한 것처럼, 이 크리스마스 폼은 여름에도 시원하다구♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「試しにハグしてみる？\u3000……んっ♪\u3000えへへ<emoji=heart04>\u3000お兄ちゃんと恋人ハグ～♪\u3000ぎゅ～っ♪」"
translation = "「시험 삼아 허그해 볼래? ……응♪ 에헤헤<emoji=heart04> 오빠랑 연인 허그~♪ 꼬옥~♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「どう？\u3000涼しい？」"
translation = "「어때? 시원해?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「――よし♪\u3000恋人同士のスキンシップも済ませたことだし、本題に入るよ、お兄ちゃん！」"
translation = "「──좋아♪ 연인끼리의 스킨십도 마쳤으니 본론으로 들어갈게, 오빠!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「今回のあたしのクリスマスフォーム、お兄ちゃんが褒めてくれたとおり、あたしもすっごく気に入ってるの」"
translation = "「이번 내 크리스마스 폼, 오빠가 칭찬해 준 대로 나도 정말 마음에 들어」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「だからねっ、前の水着フォームとは逆で、今回はクリスマスフォームのデザインから、ルカルカの衣装を作ってみようかなって♪」"
translation = "「그러니까 말이야, 지난번 수영복 폼이랑은 반대로 이번에는 크리스마스 폼 디자인으로 루카루카의 의상을 만들어 볼까 해서♪」"

[[dialogue]]
speaker = "unk"
original = "なるほど！\u3000いいアイデアだな"
translation = "그렇군! 좋은 아이디어네"

[[dialogue]]
speaker = "unk"
original = "そういえば、水着フォームとは異なり、今回のクリスマスフォームは人工戦闘服。衣装もヘレナちゃんがデザインしたものだったことを思い出した。"
translation = "그러고 보니 수영복 폼과는 달리, 이번 크리스마스 폼은 인공 전투복. 의상도 헬레나짱이 디자인한 것이었다는 사실을 떠올렸다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「このクリスマスフォームをもらってすぐ、お世話になってるデザイナーさんに連絡したの。これでルカルカの新衣装を作って下さいって！」"
translation = "「이 크리스마스 폼을 받자마자 신세 지고 있는 디자이너분께 연락했어. 이걸로 루카루카의 새 의상을 만들어 달라고!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「そしたらデザイナーさん、めちゃくちゃ乗り気で、今年のクリスマス当日までに絶対間に合わせるって言ってくれて――」"
translation = "「그랬더니 디자이너분이 엄청 의욕이 넘치셔서, 올해 크리스마스 당일까지 반드시 맞추겠다고 말해줬어──」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「それで、お兄ちゃんとここに来たってわけ！\u3000色んな角度から撮ったデータがないと、３Ｄに起こせないからね♪」"
translation = "「그래서 오빠랑 여기 온 거야! 여러 각도에서 찍은 데이터가 없으면 3D로 구현할 수 없으니까♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「というわけで、今から<ruby>海野辺<rt>うみのべ</rt></ruby>ルルカのクリスマス撮影会を開催しようと思います！」"
translation = "「그런 의미에서, 지금부터 우미노베 루루카의 크리스마스 촬영회를 개최하도록 하겠습니다!」"

[[dialogue]]
speaker = "unk"
original = "よし、写真撮影なら任せとけ！"
translation = "좋아, 사진 촬영이라면 맡겨둬!"

[[dialogue]]
speaker = "unk"
original = "以前、カメラマンのアシスタントのバイトをしていたことがある俺は、グッと親指を立ててみせる。"
translation = "예전에 카메라맨 어시스턴트 아르바이트를 했던 적이 있는 나는 엄지를 척 들어 보인다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「うん♪\u3000今日もお願いするねっ。手伝ってくれた分の報酬は、もちろんスペシャルなものを用意してるよ～♪」"
translation = "「응♪ 오늘도 부탁할게. 도와준 만큼의 보상은 물론 스페셜한 걸로 준비했어~♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「――スペシャルな報酬が気になる？\u3000だったら、ちょっとだけ前払いしてあげる♪」"
translation = "「──스페셜한 보상이 궁금해? 그렇다면 조금만 선불로 줄게♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「こっち来て、お兄ちゃん♪」"
translation = "「이쪽으로 와, 오빠♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ん～っ<emoji=heart04>\u3000……ちゅっ<emoji=heart04>」"
translation = "「음~<emoji=heart04> ……쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ルルカの唇が頬に触れる。"
translation = "루루카의 입술이 뺨에 닿는다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「――えへへ～<emoji=heart04>\u3000お兄ちゃんへの報酬は、可愛い妹カノジョのキスでした～<emoji=heart04>」"
translation = "「──에헤헤~<emoji=heart04> 오빠를 위한 보상은 귀여운 여동생 여자친구의 키스였습니다~<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「もちろん、キスだけじゃないよ？\u3000せっかくリゾート結界に来たんだもん、恋人らしいことも、いっぱいしようね<emoji=heart04>」"
translation = "「물론 키스뿐만이 아니야? 어렵게 리조트 결계에 왔으니까, 연인다운 일도 잔뜩 하자<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あっ、でも、まだダメだよ～！\u3000イチャイチャするのは撮影が終わってからね♪」"
translation = "「앗, 하지만 아직은 안 돼~! 꽁냥거리는 건 촬영이 끝나고 나서야♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「油断すると、いつまでもくっついていたくなっちゃうから、やることを先に終わらせなきゃ！」"
translation = "「방심하면 언제까지고 달라붙어 있고 싶어지니까, 할 일을 먼저 끝내야지!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「というわけで、撮影頑張ろうっ♪」"
translation = "「그런 의미에서 촬영 힘내자♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「お兄ちゃん、こんな感じでどーお？」"
translation = "「오빠, 이런 느낌은 어때?」"

[[dialogue]]
speaker = "unk"
original = "さすが俺の彼女、世界一可愛い！"
translation = "역시 내 여자친구, 세계에서 제일 귀여워!"

[[dialogue]]
speaker = "unk"
original = "俺は褒めながら、ＤＩＳＣのカメラで撮影していく。"
translation = "나는 칭찬하며 DISC 카메라로 촬영해 나간다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あっ、もう<emoji=heart04>\u3000お兄ちゃんたら、変なとこばっかり狙わないのっ！\u3000あくまで資料用の写真なんだからね<emoji=heart04>」"
translation = "「앗, 정말<emoji=heart04> 오빠도 참, 이상한 곳만 노리지 말라니까! 어디까지나 자료용 사진이니까 말이야<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「正面ばっかりじゃなくて、横や後ろからも撮ってね。あと、小物もポイントだから、そこはズームを使ってしっかりとお願い」"
translation = "「정면만 찍지 말고 옆이나 뒤에서도 찍어줘. 그리고 소품도 포인트니까 거기는 줌을 써서 확실하게 부탁해」"

[[dialogue]]
speaker = "unk"
original = "オッケー！\u3000バッチリ撮れてる"
translation = "오케이! 완벽하게 찍히고 있어"

[[dialogue]]
speaker = "unk"
original = "それからひと通り撮影が終わって――"
translation = "그렇게 한바탕 촬영이 끝나고──"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「じゃあ、どんなのが撮れたのか、早速チェックしてみよっか。ＤＩＳＣ借りるね。どれどれ～？」"
translation = "「자, 어떤 게 찍혔는지 바로 체크해 볼까. DISC 빌릴게. 어디 보자~?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「――うん、すごく可愛く撮れてる♪\u3000さっすがお兄ちゃん、妹を被写体にしたら、プロ顔負けのカメラマンになっちゃうね♪」"
translation = "「──응, 엄청 귀엽게 찍혔다♪ 역시 오빠, 여동생을 피사체로 삼으면 프로 뺨치는 카메라맨이 된다니까♪」"

[[dialogue]]
speaker = "unk"
original = "スペシャルな報酬は貰えそうか？"
translation = "스페셜한 보상은 받을 수 있을 것 같아?"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ふふっ……キスしたくなっちゃった？\u3000もう、しょうがないな～、お兄ちゃんは<emoji=heart04>」"
translation = "「후훗…… 키스하고 싶어졌어? 정말, 어쩔 수 없다니까, 오빠는<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「でも、あたしのお願いを聞いて、手伝ってくれたから……感謝と愛を込めて――」"
translation = "「하지만 내 부탁을 들어주고 도와줬으니까…… 감사와 사랑을 담아서──」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「……ちゅっ<emoji=heart04>」"
translation = "「……쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "今度は唇同士が触れあうキス。"
translation = "이번에는 입술끼리 맞닿는 키스."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「お疲れさま、お兄ちゃん。いつもありがとね<emoji=heart04>」"
translation = "「수고했어, 오빠. 항상 고마워<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ルルカも撮影頑張ったな"
translation = "루루카도 촬영 고생했어"

[[dialogue]]
speaker = "unk"
original = "そう言って頭を撫でると、彼女は嬉しそうに微笑んで……"
translation = "그렇게 말하며 머리를 쓰다듬자, 그녀는 기쁜 듯 미소 지으며……"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あっ……えへへぇ<emoji=heart04>\u3000あたしもご褒美、貰っちゃった♪」"
translation = "「앗…… 에헤헤<emoji=heart04> 나도 보상 받아버렸다♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「お兄ちゃん……大好き<emoji=heart04>」"
translation = "「오빠…… 사랑해<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ルルカもぎゅっと抱き着いてくる。"
translation = "루루카도 꽉 안겨온다."

[[dialogue]]
speaker = "unk"
original = "それから俺たちは、今度こそ恋人同士の時間をたっぷり満喫するのだった――"
translation = "그러고 나서 우리들은 이번에야말로 연인끼리의 시간을 듬뿍 만끽하는 것이었다──"

