[[dialogue]]
speaker = "unk"
original = "お正月が終わり、さらに１ヵ月が経過したある冬の一日。"
translation = "정월이 끝나고 다시 한 달이 경과한 어느 겨울날."

[[dialogue]]
speaker = "unk"
original = "星徒会の仕事がひと段落したので、俺はヴィーナスと一緒に大聖堂カフェテリアへ飲み物を買いにきて、休憩をしていた――"
translation = "성도회의 업무가 일단락되었기에, 나는 비너스와 함께 대성당 카페테리아에 음료를 사러 와서 휴식을 취하고 있었다──"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そういえば、クロト！\u3000もうすぐバレンタインよね！」"
translation = "「그러고 보니, 쿠로토! 곧 밸런타인이네!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「って、どうしたの？\u3000急にそわそわし出して……」"
translation = "「그나저나 왜 그래? 갑자기 안절부절못하고……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「――女の子の方から切り出されると、気恥ずかしくなる話題？\u3000そうなの？\u3000よくわからないけど……」"
translation = "「── 여자애 쪽에서 먼저 말을 꺼내면 쑥스러워지는 화제? 그래? 잘 모르겠지만……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「とりあえず、今年のバレンタインは期待しておきなさい！\u3000これまで待ちに待って、ようやく出会えた魔王に――」"
translation = "「일단 올해 밸런타인은 기대하고 있어! 지금까지 기다리고 기다리다 드디어 만난 마왕에게──」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「私から、とっておきの本命チョコをプレゼントしてあげるわ！」"
translation = "「내가 아주 특별한 진심 초코를 선물해 줄 테니까!」"

[[dialogue]]
speaker = "unk"
original = "ほ、本命なんだ……"
translation = "지, 진심이구나……"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ええ、もちろん！\u3000私がいちばん仲の良い男の子はクロトだもの！\u3000当然でしょ？」"
translation = "「응, 당연하지! 내가 제일 친한 남자애는 쿠로토인걸! 당연하잖아?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「って、クロト、顔が赤いわよ？\u3000もしかして、照れてる？」"
translation = "「그나저나 쿠로토, 얼굴이 빨갛네? 설마 부끄러워하는 거야?」"

[[dialogue]]
speaker = "？？？"
original = "「ふふっ、相変わらず、ド直球の最速ストレートね。さすがは私たちのお嬢様だわ」"
translation = "「후훗, 여전히 거침없는 정면 승부네. 역시 우리 아가씨다워」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あら？」"
translation = "「어라?」"

[[dialogue]]
speaker = "？？？"
original = "「ご歓談のところ、失礼致します。ヴィーナスお嬢様、それに会長」"
translation = "「즐거운 대화 중에 실례하겠습니다. 비너스 아가씨, 그리고 회장」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「<ruby>蘭美<rt>らび</rt></ruby>！\u3000あなたもカフェテリアへ休憩にきたの？」"
translation = "「라비! 당신도 카페테리아에 쉬러 온 거야?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ええ。そしたら、お嬢様の豪速球な言葉が聞こえてきたものだから、つい釣られてきてしまったわ」"
translation = "「응. 그랬더니 아가씨의 불꽃 같은 멘트가 들려오길래 나도 모르게 끌려오고 말았네」"

[[dialogue]]
speaker = "unk"
original = "はじめまして。キミは……？"
translation = "처음 뵙겠습니다. 너는……?"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「えっ、２人が顔を合わせるのって、今回が初めてなの！？\u3000クロトのことだから、てっきりまた、いつの間にか面識あるパターンだと思っていたわ！」"
translation = "「엣, 둘이 얼굴 마주 보는 게 이번이 처음이야!? 쿠로토 성격에 당연히 또 어느샌가 안면 있는 패턴일 줄 알았는데!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「私も、お嬢様から話を聞いて、すぐに会う機会があるだろうと思っていたけれど、気づけばすっかり遅くなってしまったわね」"
translation = "「나도 아가씨께 얘기를 듣고 금방 만날 기회가 있을 줄 알았는데, 정신 차려보니 꽤 늦어버렸네」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「――はじめまして、会長。私の名前は『<ruby>羽宮<rt>はねみや</rt></ruby>\u3000<ruby>蘭美<rt>らび</rt></ruby>』」"
translation = "「── 처음 뵙겠습니다, 회장. 내 이름은 『하네미야 라비』」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「他の子たちと知り合って、『九浄家メイド隊』のことはもう知っているでしょうけれど――」"
translation = "「다른 애들과 만나서 『구죠 가문 메이드대』에 대해서는 이미 알고 있겠지만──」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「私はそのまとめ役。九浄家<b>メイド長</b>を務めているわ」"
translation = "「나는 그 책임자. 구죠 가문 <b>메이드장</b>을 맡고 있어」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「以後、お見知りおきを」"
translation = "「앞으로 잘 부탁해」"

[[dialogue]]
speaker = "unk"
original = "九浄家メイド隊の、メイド長……！"
translation = "구죠 가문 메이드대의 메이드장……!"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「――って、いま貴方、その割に<b>小さい</b>とか思ったでしょ……？」"
translation = "「── 근데 너, 지금 그 역할치고는 <b>작다</b>고 생각했지……?」"

[[dialogue]]
speaker = "unk"
original = "え？\u3000いや……？"
translation = "에? 아니……?"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「言っておくけど私は、年齢的には附属校２年であっても、学年は貴方より上！\u3000飛び級で進学した、新星学園の３年生よ！」"
translation = "「말해두겠는데 나는 나이로는 부속교 2학년이라 해도 학년은 너보다 위야! 월반해서 진학한 신성학원 3학년이라고!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「つまりは、貴方の先輩！\u3000学園では先輩として敬いなさい！\u3000そう――」"
translation = "「즉, 너의 선배! 학원에서는 선배로서 깍듯이 대하도록 해! 비록──」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「この私が、いくら小さくて可愛い天才美少女であっても！」"
translation = "「이 내가 아무리 작고 귀여운 천재 미소녀라 해도 말이야!」"

[[dialogue]]
speaker = "unk"
original = "は、はあ……"
translation = "하, 하아……"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「蘭美の言っていることは本当よ。メイドとしても、星騎士としてもすごい実力を持っているの！」"
translation = "「라비가 하는 말은 사실이야. 메이드로서도, 성기사로서도 엄청난 실력을 갖추고 있거든!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「蘭美は、魔界にあるラパン地方を古くから治めている貴族、『羽宮家』の長女でね。九浄家とは昔から関わりがあったの」"
translation = "「라비는 마계에 있는 라판 지방을 예로부터 다스려온 귀족, 『하네미야 가문』의 장녀거든. 구죠 가문과는 옛날부터 인연이 있었어」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「それで、生まれつき星力持ちだった私は、ご当主様――九浄ヘレナ様からスカウトされて、人間界にやってきたというわけ」"
translation = "「그래서, 태어날 때부터 성력을 지니고 있던 저는 당주님── 쿠죠 헬레나 님에게 스카우트되어 인간계로 오게 된 거예요.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「本来は、流星学園附属校の１年生として入学することになっていたけど……あいにく、私は何事も最速を目指す主義なの」"
translation = "「본래는 유성학원 부속교 1학년으로 입학하기로 되어 있었지만…… 안타깝게도 전 매사에 최속을 지향하는 주의거든요.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ヘレナ様にお願いをして、特別に新星学園の編入試験を受けさせてもらったわ。そうして見事合格してみせて、２年生として編入したのが今から１年前」"
translation = "「헬레나 님께 부탁드려 특별히 신성학원 편입 시험을 치르게 해주셨죠. 그렇게 멋지게 합격해내고, 2학년으로 편입한 게 지금으로부터 1년 전.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「今は進級して、３年生というわけよ。どう？\u3000すごいでしょ？」"
translation = "「지금은 학년이 올라가 3학년인 셈이죠. 어때요? 대단하죠?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「その勢いで、メイドとしても実力を示して、九浄家の歴代最年少でメイド長に抜擢されたのよ。まさに天才ね！」"
translation = "「그 기세로 메이드로서도 실력을 증명해서, 쿠죠 가문의 역대 최연소로 메이드장에 발탁되었답니다. 그야말로 천재네요!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ふふんっ♪\u3000ありがとう、お嬢様。ストレートな褒め言葉が耳に心地いいわ♪」"
translation = "「후훙♪ 고마워요, 아가씨. 솔직한 칭찬이 귀에 아주 달콤하네요♪」"

[[dialogue]]
speaker = "unk"
original = "魔界の貴族って話だったけど……羽宮先輩はどうしてメイドに？"
translation = "마계 귀족이라는 이야기였는데…… 하네미야 선배는 어째서 메이드가?"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「蘭美、と呼び捨てでいいわよ、会長」"
translation = "「라비라고 편하게 불러도 좋아, 회장.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「私は本来なら貴方より年下で、ヴィーナスお嬢様に仕えるメイドとして敬語を使うべき立場」"
translation = "「나는 본래라면 너보다 연하이고, 비너스 아가씨를 모시는 메이드로서 경어를 써야 할 입장.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「でも同時に、私は学園での先輩でもある。となると、お互い敬語を使って交流を深めていくのが無難ではあるけれど……」"
translation = "「하지만 동시에 나는 학원 선배이기도 해. 그렇게 되면 서로 경어를 쓰며 교류를 깊게 하는 게 무난하겠지만……」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「さっきも言ったけど、私は何事も最速を目指す主義なの。ヴィーナスお嬢様が信頼を寄せる貴方を私も信頼して、堅苦しいのは無しにしたいと思うわ」"
translation = "「아까도 말했듯이 나는 매사에 최속을 지향하는 주의거든. 비너스 아가씨가 신뢰를 보내는 너를 나도 신뢰해서, 딱딱한 격식은 치우고 싶어.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「というわけで、対等の関係って感じでどうかしら？\u3000会長」"
translation = "「그런 의미에서 대등한 관계라는 느낌으로 어떨까? 회장.」"

[[dialogue]]
speaker = "unk"
original = "わかった。これからよろしく、蘭美"
translation = "알았어. 앞으로 잘 부탁해, 라비."

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ふふんっ♪\u3000お嬢様たちから聞いていた通りの人ね。こちらこそよろしく、会長」"
translation = "「후훙♪ 아가씨들에게 들은 그대로인 사람이네. 나야말로 잘 부탁해, 회장.」"

[[dialogue]]
speaker = "unk"
original = "俺と蘭美は握手を交わす。"
translation = "나와 라비는 악수를 나눈다."

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「――それで、貴族である私が、どうしてメイドになったのかっていう話だったわね」"
translation = "「──그래서, 귀족인 내가 어째서 메이드가 되었느냐는 이야기였지.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「それは、世界一のメイドになることが私の夢だからよ」"
translation = "「그건 세계 최고의 메이드가 되는 것이 내 꿈이기 때문이야.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「蘭美は２年前、世界最高のメイドを決める大会『メイド・オブ・メイド』で、最年少の世界２位まで登り詰めたのよ！」"
translation = "「라비는 2년 전, 세계 최고의 메이드를 가리는 대회 『메이드 오브 메이드』에서 최연소로 세계 2위까지 올라갔었어!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ちなみに、その時の１位は――」"
translation = "「참고로 그때 1위는──」"

[[dialogue]]
speaker = "unk"
original = "と、その時だった。"
translation = "바로 그때였다."

[[dialogue]]
speaker_original = "女子生徒"
speaker_translation = "여학생"
original = "「キャーッ！\u3000何あれ！？」"
translation = "「꺄악! 저게 뭐야!?」"

[[dialogue]]
speaker_original = "男子生徒"
speaker_translation = "남학생"
original = "「も、モンスター！？」"
translation = "「모, 몬스터!?」"

[[dialogue]]
speaker = "？？？"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「あれは一体……？」"
translation = "「저건 대체……?」"

[[dialogue]]
speaker = "unk"
original = "突然、どこからともなく現れた異様な存在に、喧騒に包まれるカフェテリア。"
translation = "갑자기 어디선가 나타난 이형의 존재로 인해 웅성거림에 휩싸인 카페테리아."

[[dialogue]]
speaker = "unk"
original = "――その様子を影から覗いている人物が、１人。"
translation = "──그 모습을 그림자 속에서 엿보고 있는 인물이 한 명."

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「あわわ……！\u3000どうしようでござる……！」"
translation = "「아와와……! 어쩌면 좋은 소……!」"

[[dialogue]]
speaker = "unk"
original = "九浄メイド隊の１人『せつな』は、慌てた様子で呟くのだった――"
translation = "쿠죠 메이드대의 일원 『세츠나』는 당황한 기색으로 중얼거리고 있었다──"

