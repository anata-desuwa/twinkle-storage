[[dialogue]]
speaker = "シャロン"
original = "「あの……会長さま……」"
translation = "「저기…… 회장님……」"

[[dialogue]]
speaker = "unk"
original = "バレンタインのチョコを俺の部屋で一緒に食べていると、シャロンが熱く潤んだ瞳で俺を見つめる。"
translation = "발렌타인 초코를 내 방에서 함께 먹고 있자, 샤론이 뜨겁게 젖은 눈동자로 나를 바라본다."

[[dialogue]]
speaker = "クロト"
original = "「シャロン？」"
translation = "「샤론?」"

[[dialogue]]
speaker = "シャロン"
original = "「実は、あなたに召し上がっていただきたいバレンタインチョコがもうひとつあるんです」"
translation = "「사실은 당신이 드셔주셨으면 하는 발렌타인 초코가 하나 더 있어요」"

[[dialogue]]
speaker = "クロト"
original = "「もうひとつ？」"
translation = "「하나 더?」"

[[dialogue]]
speaker = "シャロン"
original = "「はい<emoji=heart04>\u3000それは私……です<emoji=heart04>」"
translation = "「네<emoji=heart04> 그것은 바로 저……예요<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「んちゅっ……ちゅっ……ちゅるっ……ちゅるれろっ、ちゅぷる……んふっ……<emoji=heart04>」"
translation = "「응츄…… 쪽…… 츄릅…… 츄르레로, 츄푸루…… 응훗……<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「ちゅぷるっ、くちゅるっ……じゅるっ、ちゅるるるっ……ちゅるれろ……んっ……ちゅるっ……んふっ……ぷぁっ……<emoji=heart04>」"
translation = "「츄푸릇, 쿠츄릇…… 쥬릅, 츄르르릇…… 츄르레로…… 응…… 츄릅…… 응훗…… 푸핫……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "熱に浮かされてキスを交わし、ベッドに向かう。"
translation = "열기에 휩싸여 키스를 나누고 침대로 향한다."

[[dialogue]]
speaker = "シャロン"
original = "「え～いっ<emoji=heart04>」"
translation = "「에잇<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「うわっ！？」"
translation = "「우와!?」"

[[dialogue]]
speaker = "unk"
original = "だけどシャロンは不意に俺を押し倒して──"
translation = "하지만 샤론은 갑자기 나를 밀어 넘어뜨리고──"

[[dialogue]]
speaker = "シャロン"
original = "「会長さまは寝転がったままでいいですからね。体を楽～にしていてください」"
translation = "「회장님은 누워 계신 채로 있으면 돼요. 몸을 편~하게 하고 계세요」"

[[dialogue]]
speaker = "クロト"
original = "「でも……」"
translation = "「하지만……」"

[[dialogue]]
speaker = "シャロン"
original = "「いつも会長さまから激しく愛してくださって……私は気持ちよくされてばかり……それでは不公平です」"
translation = "「항상 회장님이 격렬하게 사랑해 주셔서…… 저는 기분 좋아지기만 하고…… 그건 불공평해요」"

[[dialogue]]
speaker = "シャロン"
original = "「バレンタインデーは女の子が積極的になる日ですから……<emoji=heart04>\u3000今夜くらいは、私にご奉仕させてください……」"
translation = "「발렌타인데이는 여자가 적극적이 되는 날이니까……<emoji=heart04> 오늘 밤만큼은 제가 봉사하게 해주세요……」"

[[dialogue]]
speaker = "unk"
original = "すでにシャロンのたわわなおっぱいは露わになっており、ショーツも脱ぎ捨ててある。"
translation = "이미 샤론의 풍만한 가슴은 노출되어 있고, 팬티도 벗어 던져져 있다."

[[dialogue]]
speaker = "unk"
original = "まだ触れてもいないのに、シャロンの股間からは熱気と湿度が感じられ、滴った愛液の雫が俺の下腹部を濡らした。"
translation = "아직 만지지도 않았는데 샤론의 가랑이에서는 열기와 습기가 느껴졌고, 흘러내린 애액 방울이 내 하복부를 적셨다."

[[dialogue]]
speaker = "シャロン"
original = "「はぁんっ……<emoji=heart04>\u3000あなたさまのおち○ちんが欲しくて……もう、私のアソコ……とっくに準備、できちゃってるんです……<emoji=heart04>」"
translation = "「하앙……<emoji=heart04> 당신의 자지가 갖고 싶어서…… 벌써 제 보지…… 진작에 준비 다 됐단 말이에요……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「そんなの俺だって……！」"
translation = "「그런 건 나도 마찬가지라고……!」"

[[dialogue]]
speaker = "unk"
original = "シャロンの甘い匂いを嗅いでいただけで、俺のペニスはいつでも挿入できるほどに勃起していた。"
translation = "샤론의 달콤한 냄새를 맡고 있는 것만으로도, 내 페니스는 언제든 삽입할 수 있을 정도로 발기해 있었다."

[[dialogue]]
speaker = "シャロン"
original = "「ふふっ、あなたさまのおち○ちんもぴくぴくして……おま○こに入りたそうにしてます<emoji=heart04>」"
translation = "「후훗, 당신의 자지도 움찔움찔하면서…… 보지에 들어가고 싶어 하네요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "興奮でしっとりと湿り気を帯びたシャロンの指が、いきり立つ勃起に添えられる。"
translation = "흥분으로 촉촉하게 습기를 머금은 샤론의 손가락이, 빳빳하게 일어선 발기물에 닿는다."

[[dialogue]]
speaker = "シャロン"
original = "「ふぁぁ……<emoji=heart04>\u3000おち○ちん、アツアツですね……入れたらおま○こ火傷しちゃいそうですけど……<emoji=heart04>」"
translation = "「후아아……<emoji=heart04> 자지, 뜨끈뜨끈하네요…… 넣으면 보지 데어버릴 것 같지만……<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「もう待ちきれなくて、とろっとろにとろけちゃってますので……おち○ちん入れちゃいますねっ……<emoji=heart04>」"
translation = "「이제 더 못 기다려서, 걸쭉하게 녹아버렸으니까…… 자지 넣어버릴게요……<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「チョコだけじゃなくって、私の愛情も、たっぷり召し上がってくださいっ……<emoji=heart04>」"
translation = "「초코뿐만이 아니라, 제 애정도, 듬뿍 드셔주세요……<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「ぅんぅうぅぅぅぅっ<emoji=heart04>\u3000はぁ、あっ、あはぁんっ……<emoji=heart04>\u3000おち○ちんっ……ずぷずぷぅって、入って、きてっ……<emoji=heart04>」"
translation = "「으응으으으으읏<emoji=heart04> 하아, 앗, 아하앙……<emoji=heart04> 자지…… 즈뿝즈뿝하고, 들어, 와서……<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「はぁ……んぁっ、はっ、ぁはぁあぁぁっ<emoji=heart04>\u3000はっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ、あっ、あ、きもち、いっ……<emoji=heart04>」"
translation = "「하아…… 응앗, 핫, 아하아아앗<emoji=heart04> 핫<emoji=heart04> 앗<emoji=heart04> 앗, 앗, 아, 기분, 좋아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺のペニスが、シャロンの膣口に美味しく咥えこまれている。"
translation = "내 페니스가, 샤론의 질구에 맛있게 물려 들어가고 있다."

[[dialogue]]
speaker = "unk"
original = "愛液で満たされた熱い膣内は、気を抜いたらすぐに達してしまいそうなほどに心地良い。"
translation = "애액으로 가득 찬 뜨거운 질 내부는, 정신을 놓으면 금방 가버릴 것 같을 정도로 기분 좋다."

[[dialogue]]
speaker = "シャロン"
original = "「はっ、ぁあっ……ふあぁんっ……<emoji=heart04>\u3000おま○こっ、ぉんっ<emoji=heart04>\u3000おち○ちんのカタチに広がってますぅ……<emoji=heart04>」"
translation = "「핫, 아앗…… 후아앙……<emoji=heart04> 보지, 응읏<emoji=heart04> 자지 모양으로 벌어지고 있어요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "シャロンが体重をかけると、肉の槍はウネウネとうごめく膣肉をかき分けて、奥へと突き刺さっていく。"
translation = "샤론이 체중을 싣자, 고기 창은 꿈틀꿈틀 움직이는 질 살을 헤치고, 안쪽으로 박혀 들어간다."

[[dialogue]]
speaker = "シャロン"
original = "「んんんっ<emoji=heart04>\u3000あぁっ、はっ、はあぁ、はぁんっ……<emoji=heart04>\u3000おま○こっ、いっちばん深ぁいとこに……おち○ちん、こつんって、当たり、ましたぁっ……<emoji=heart04>」"
translation = "「으으응<emoji=heart04> 아앗, 핫, 하아아, 하앙……<emoji=heart04> 보지, 가아장 깊은 곳에…… 자지, 툭 하고, 닿았, 어요……<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「はぁ、はっ、あんっ……<emoji=heart04>\u3000内臓がっ、おち○ちんで押し上げられてるみたいっ……<emoji=heart04>」"
translation = "「하아, 핫, 안……<emoji=heart04> 내장이, 자지로 밀려 올라가는 것 같아……<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「あなたさまにされるのと、自分からするのとでは、ぜんっぜん違いますねっ……<emoji=heart04>」"
translation = "「당신이 해주시는 거랑, 직접 하는 거랑은, 저언혀 다르네요……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ん、くぅっ……！\u3000シャロンはどっちが、好きっ……？」"
translation = "「음, 쿠윽……! 샤론은 어느 쪽이, 좋아……?」"

[[dialogue]]
speaker = "unk"
original = "いつもリードしているシャロンに圧し掛かられ、優位を取られているのが少し気恥ずかしくて問いかける。"
translation = "항상 리드하던 샤론에게 깔려, 우위를 빼앗긴 것이 조금 쑥스러워 질문한다."

[[dialogue]]
speaker = "シャロン"
original = "「ふふ、どっちも、好きですっ……ふぁっ、はぁっ<emoji=heart04>\u3000あなたさまとの交わりは、どっちも……今までしてきたエッチ、全部だぁい好きですよっ……<emoji=heart04>」"
translation = "「후후, 둘 다, 좋아요…… 후아, 하앗<emoji=heart04> 당신과의 교미는, 둘 다…… 지금까지 했던 섹스, 전부 너어무 좋아요……<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「愛するのも、愛されるのも……私が体を許した人はただひとり、あなたさまだけなんですからぁ……<emoji=heart04>」"
translation = "「사랑하는 것도, 사랑받는 것도…… 제가 몸을 허락한 사람은 단 한 사람, 당신뿐이니까요……<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「はぁあ<emoji=heart04>\u3000あんんっ<emoji=heart04>\u3000あなたさまの前でだけは……欲張りな悪い子になってしまうんです……<emoji=heart04>」"
translation = "「하아아<emoji=heart04> 안응읏<emoji=heart04> 당신 앞에서만은…… 욕심쟁이 나쁜 아이가 되어버려요……<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「ぁんっ……<emoji=heart04>\u3000愛し合えるのが、嬉しすぎてっ……はぁ、あっ……<emoji=heart04>\u3000入れたばかりなのにっ、私っ、んんっ<emoji=heart04>」"
translation = "「아앙……<emoji=heart04> 서로 사랑할 수 있다는 게 너무 기뻐서…… 하아, 앗……<emoji=heart04> 넣은 지 얼마 안 됐는데, 나, 으응<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「おま○こっ、敏感になりすぎててっ……すぐにでも果ててしまいそうっ……<emoji=heart04>」"
translation = "「보지, 너무 민감해져서…… 금방이라도 가버릴 것 같아요……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「イキたくなったら、我慢しないで。シャロンのエッチなイキ顔、いっぱい見せてよ」"
translation = "「가고 싶어지면 참지 마. 샤론의 야한 절정 얼굴, 잔뜩 보여줘」"

[[dialogue]]
speaker = "シャロン"
original = "「そんっなぁ……<emoji=heart04>\u3000そんなの恥ずかしすぎますよぉっ……<emoji=heart04>」"
translation = "「그으런……<emoji=heart04> 그런 건 너무 부끄러워요오……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "恥ずかしいと呟きながらも、シャロンは動きを止めない。"
translation = "부끄럽다고 중얼거리면서도, 샤론은 움직임을 멈추지 않는다."

[[dialogue]]
speaker = "シャロン"
original = "「あっ、あっ、あっ、あんっ<emoji=heart04>\u3000すごいっ、おち○ちんで、串刺しに、されてる、みたぁいっ<emoji=heart04>\u3000んぁおっ<emoji=heart04>」"
translation = "「앗, 앗, 앗, 아앙<emoji=heart04> 대단해, 자지로 꿰뚫리고 있는 것 같아아<emoji=heart04> 응아오<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「んぁ、はぁっ、ど、どうですかっ？\u3000私のおま○こ、ちゃんとおち○ちん気持ちよくできていますか？」"
translation = "「응아, 하아, 어, 어떤가요? 제 보지, 제대로 자지 기분 좋게 해주고 있나요?」"

[[dialogue]]
speaker = "クロト"
original = "「ぐ、くぅっ……当たり前、だろっ……！」"
translation = "「큭, 쿠우…… 당연, 하잖아……!」"

[[dialogue]]
speaker = "unk"
original = "シャロンの膣内は温かくて、ぬるぬるのぐちゃぐちゃで、女性器が精子を搾り取るための器官だというのを体感で思い知らされる。"
translation = "샤론의 질 안은 따뜻하고 미끌미끌하고 엉망진창이라, 여성기가 정자를 짜내기 위한 기관이라는 것을 체감으로 뼈저리게 깨닫게 된다."

[[dialogue]]
speaker = "シャロン"
original = "「ふふ、良かったですっ、あなたさまのおち○ちんも、とってもきもちよくって……おま○こ痺れちゃいますっ……<emoji=heart04>」"
translation = "「후후, 다행이에요, 당신의 자지도 정말 기분 좋아서…… 보지 저릿저릿해버려요……<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「はっ、あっ、はぁんっ……<emoji=heart04>\u3000あんっ、はぅっ、んっ、ぅんっ、うぅうんっ<emoji=heart04>」"
translation = "「하앗, 앗, 하아앙……<emoji=heart04> 아앙, 하우, 응, 으응, 으으응<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "シャロンが腰を振る度、目の前でおっぱいがぶるんぶるんとダイナミックに揺れ動き、下半身ではぐちゅぐちゅと水音が鳴り響く。"
translation = "샤론이 허리를 흔들 때마다 눈앞에서 가슴이 출렁출렁 다이내믹하게 흔들리고, 하반신에서는 구츄구츄 물소리가 울려 퍼진다."

[[dialogue]]
speaker = "シャロン"
original = "「んぁっ、おま○こ、エッチな音ぉっ……<emoji=heart04>\u3000会長さまに聞こえちゃってるのにっ、あっ、あっ、あん<emoji=heart04>」"
translation = "「응아, 보지, 야한 소리이……<emoji=heart04> 회장님께 들려버리는데, 앗, 앗, 아앙<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「ひゃ、あっ、やぁんっ、腰っ、勝手に動いちゃいますっ<emoji=heart04>\u3000きもちいいの止められないですっ<emoji=heart04>」"
translation = "「히야, 앗, 야앙, 허리, 멋대로 움직여버려요<emoji=heart04> 기분 좋은 거 멈출 수 없어요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "一度ついてしまった勢いは止まらず、シャロンはまるで娼婦のように淫らに腰を振り乱している。"
translation = "한번 붙어버린 기세는 멈추지 않고, 샤론은 마치 창녀처럼 음란하게 허리를 마구 흔들고 있다."

[[dialogue]]
speaker = "unk"
original = "かつては清廉潔白、無垢なシスターとして貞操を守り続けていて、性に関して無知で不得手だったとは思えない。"
translation = "과거에는 청렴결백하고 순진한 시스터로서 정조를 계속 지켜왔고, 성에 관해 무지하고 서툴렀다고는 생각되지 않는다."

[[dialogue]]
speaker = "シャロン"
original = "「私、シスターなのにぃっ……こんないやらしいの、だめに決まってますよねっ……<emoji=heart04>」"
translation = "「나, 시스터인데에…… 이런 파렴치한 거, 안 되는 게 당연하죠……<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「でもっ……でもでもっ、だめってわかってるのに、自分でも押さえられないんですっ……だめ、だからっ、きもちよくなっちゃうんですっ……<emoji=heart04>」"
translation = "「하지만…… 하지만 하지만, 안 된다는 걸 알면서도 스스로도 억누를 수 없어요…… 안 되니까, 기분 좋아져 버리는 거예요……<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「エッチな私は、女神様にも内緒なんです……あなたさまと私だけの秘密なんですからねっ……<emoji=heart04>」"
translation = "「야한 저는 여신님께도 비밀이에요…… 당신과 저만의 비밀이니까요……<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「んぅうぅっ<emoji=heart04>\u3000はぁ、あっ、あぁぁんっ<emoji=heart04>\u3000きもちい、きもちいいですっ……<emoji=heart04>\u3000んぅうぅぅうぅんっ<emoji=heart04>」"
translation = "「응으으으<emoji=heart04> 하아, 앗, 아아앙<emoji=heart04> 기분 좋아, 기분 좋아요……<emoji=heart04> 응으으으으으응<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「はっ、あっ、ごめんなさいっ、女神様っ、会長さまぁっ<emoji=heart04>\u3000私、もう、我慢っ、我慢、できなくてっ<emoji=heart04>」"
translation = "「하앗, 앗, 죄송해요, 여신님, 회장님<emoji=heart04> 저, 이제, 참, 참을 수가 없어서<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「ごめんなさいっ、ごめんなさいっ、先におま○こ果ててっ、イッ、イッちゃいまっ──あっ、あっ、あっ、あぁああぁあぁっっっ～～<emoji=heart04>」"
translation = "「죄송해요, 죄송해요, 먼저 보지 가버려서, 가, 가버려요──앗, 앗, 앗, 아아아아아아아앗～～<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「あ゛ぁあぁっ<emoji=heart04>\u3000イクっ、イクイクイッ──グぅぅぅうぅぅぅ～～～っっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아으아아앗<emoji=heart04> 가버려, 가버려가버려가──윽으으으으으으으으～～～으으으<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "シャロンの膣内がギュッと収縮し、絶頂に至る。"
translation = "샤론의 질 내부가 꽉 수축하며, 절정에 이른다."

[[dialogue]]
speaker = "シャロン"
original = "「んぅうぅぅくぅっ<emoji=heart04>\u3000はぁっ！\u3000はぁっ！\u3000はっ、はぁっ！\u3000ごめん、なさっ──んぃいぃっ<emoji=heart04>\u3000お先に、イッ、イッちゃい、まひたぁっ……<emoji=heart04>」"
translation = "「응으으으으윽으으<emoji=heart04> 하아! 하아! 하앗, 하아! 죄송, 해요──으이이잇<emoji=heart04> 먼저, 가, 가버렸, 어요오……<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「おち○ちん、きもひ、よすぎてっ……<emoji=heart04>\u3000イクのっ、我慢できなくって、ごめんなひゃぁいっ……<emoji=heart04>」"
translation = "「자지, 기분, 너무 좋아서……<emoji=heart04> 가는 거, 참을 수 없어서, 죄송해여어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "信仰する神様と愛する俺に懺悔するように、シャロンは何度も謝罪しながら、絶頂に達した膣肉を痙攣させる。"
translation = "신앙하는 신과 사랑하는 나에게 참회하듯, 샤론은 몇 번이고 사죄하며 절정에 달한 질 근육을 경련시킨다."

[[dialogue]]
speaker = "unk"
original = "達したのを示すように、シャロンの全身からは珠のような汗が肌を伝って滴り落ち、半開きの口からはとろりと濃厚な唾液が糸を引いて垂れた。"
translation = "절정에 달한 것을 증명하듯, 샤론의 전신에서는 구슬 같은 땀이 피부를 타고 흘러내렸고, 반쯤 벌어진 입에서는 걸쭉하고 농후한 타액이 실을 그리며 늘어졌다."

[[dialogue]]
speaker = "クロト"
original = "「謝らなくていいよ。でも、俺のことも最後までイカせてくれるんだよね？」"
translation = "「사과하지 않아도 돼. 하지만, 나도 끝까지 가게 해줄 거지?」"

[[dialogue]]
speaker = "シャロン"
original = "「んぅいっ！！？\u3000ふぁ、はっ、はい、もちろん、ですっ……<emoji=heart04>\u3000私のおま○こでイッて……精子、出してくださぁいっ……<emoji=heart04>」"
translation = "「응으잇!!? 하, 하앗, 네, 물론, 이에요……<emoji=heart04> 제 보지로 가버려주세요…… 정액, 내보내주세요오……<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「はぁ、はっ、あぁんっ<emoji=heart04>\u3000あなたさまの精子っ、子宮で受け止めさせて、なかぁ、中に出してくださぁいっ……<emoji=heart04>」"
translation = "「하아, 하앗, 아앙<emoji=heart04> 당신의 정액, 자궁으로 받아내게 해주세요, 아안, 안에 내보내주세요오……<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「ふぁあぁぁんっ<emoji=heart04>\u3000はっ、んぁ、はぁぁあぁぁんっ<emoji=heart04>」"
translation = "「후아아아앙<emoji=heart04> 하앗, 응아, 하아아아아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "シャロンは一度の絶頂では足りないとばかりに、俺のペニスから全力で搾り取ろうとピストンを急加速させる。"
translation = "샤론은 한 번의 절정으로는 부족하다는 듯, 내 페니스에서 전력으로 짜내려는 듯 피스톤을 급가속시킨다."

[[dialogue]]
speaker = "シャロン"
original = "「ふぁっ、あっ<emoji=heart04>\u3000ぁあぁんっ<emoji=heart04>\u3000だめっ、声っ、エッチな声、ぜんぜん押さえられなくてっ……<emoji=heart04>\u3000会長さまにエッチな子って思われちゃいますっ<emoji=heart04>」"
translation = "「하앗, 앗<emoji=heart04> 아아앙<emoji=heart04> 안돼, 목소리, 야한 목소리, 전혀 억누를 수가 없어서……<emoji=heart04> 회장님이 야한 아이라고 생각하실 거예요<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「自分から押し倒しておいて、今更だよ」"
translation = "「먼저 밀쳐 넘어뜨려 놓고선, 이제 와서 새삼스럽게.」"

[[dialogue]]
speaker = "シャロン"
original = "「エッチな私はっ、バレンタインの、バレンタインのせいなんですっ<emoji=heart04>\u3000今夜だけはエッチな私で……あなたさまのための私でいさせてくださいっ<emoji=heart04>」"
translation = "「야한 저는, 발렌타인, 발렌타인 때문이에요<emoji=heart04> 오늘 밤만큼은 야한 저로…… 당신만을 위한 저로 있게 해주세요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "シャロンは貞淑も信仰も全て忘れ、ただ俺のためだけの愛しい彼女になる。"
translation = "샤론은 정숙함도 신앙도 모두 잊고, 오직 나만을 위한 사랑스러운 여자친구가 된다."

[[dialogue]]
speaker = "シャロン"
original = "「はぁ、はっ、いっしょっ、いっしょに、きもちよくなりましょっ<emoji=heart04>\u3000あなたさまも、おち○ちん突き上げて、おま○こ擦ってくださぁいっ<emoji=heart04>」"
translation = "「하아, 하앗, 같이, 같이, 기분 좋아져요<emoji=heart04> 당신도, 자지 밀어 올리고, 보지 비벼주세요오<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "シャロンにねだられるまま、強くペニスで突き上げる。"
translation = "샤론이 조르는 대로, 강하게 페니스로 밀어 올린다."

[[dialogue]]
speaker = "シャロン"
original = "「んんんうぅんううぅ～～っ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000そう、そうですっ、またイク、イッぢゃう、おま○こイぃッ<emoji=heart04><emoji=heart04>」"
translation = "「응응응으응으으으～～으<emoji=heart04> 앗<emoji=heart04> 그래요, 그거예요, 또 가, 가버려어, 보지 가버려어어<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "シャロンの膣内がまたギュッと締まり、股間に飛沫が散ったのを感じた。"
translation = "샤론의 질 내부가 다시 꽉 조여지며, 가랑이에 비말이 튀는 것이 느껴졌다."

[[dialogue]]
speaker = "シャロン"
original = "「はぁ、はひっ<emoji=heart04>\u3000また、イッちゃいまひたっ<emoji=heart04>\u3000でも、まだ、満足できなくへっ<emoji=heart04>\u3000おま○こもっともっときもちよくなりたくっへっ<emoji=heart04>」"
translation = "「하아, 하히잇<emoji=heart04> 또, 가버렸어어<emoji=heart04> 하지만, 아직, 만족할 수 없어서어<emoji=heart04> 보지 더 더 기분 좋아지고 싶어서어<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「んぃひっ<emoji=heart04>\u3000からだ、ぜんぶっ、おま○こになっちゃったみたいれすっ<emoji=heart04>\u3000おち○ちんできもちよくなっちゃいまひゅっ<emoji=heart04>」"
translation = "「응이히잇<emoji=heart04> 몸, 전부, 보지가 되어버린 것 같아요오<emoji=heart04> 자지로 기분 좋아져버려요오<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "貞淑なシスターの姿はもうどこにもなくて、俺の興奮を煽る淫猥な言葉を躊躇いもなく言い放つ。"
translation = "정숙한 수녀의 모습은 이제 어디에도 없고, 나의 흥분을 부추기는 음란한 말을 망설임 없이 내뱉는다."

[[dialogue]]
speaker = "シャロン"
original = "「はぁっ、はっ、ぁあぁんっ<emoji=heart04>\u3000おち○ちんきもちいいれすかっ？\u3000イケそうれすかっ？\u3000イキたくなったら、いつでもいいですからねっ<emoji=heart04>\u3000中に出してくださいねっ<emoji=heart04>」"
translation = "「하아, 하아, 아아앙<emoji=heart04> 자지 기분 좋은가요오? 갈 것 같은가요오? 가고 싶어지면, 언제든 좋으니까요오<emoji=heart04> 안에 싸주세요오<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「子宮にびゅーびゅーしてくらさいねっ<emoji=heart04>\u3000あなたさまの赤ちゃん汁、びゅーっびゅーっびゅーっ<emoji=heart04>」"
translation = "「자궁에 뷰릇뷰릇 해주세요오<emoji=heart04> 당신의 아기 즙, 뷰릇, 뷰릇, 뷰릇<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「お外に出しちゃうなんて、教えに反しますからっ<emoji=heart04>\u3000子種はおま○こに出すためのものなんですからっ<emoji=heart04>\u3000ねっ<emoji=heart04>\u3000ねっ<emoji=heart04>」"
translation = "「밖으로 내보내다니, 가르침에 어긋나니까요<emoji=heart04> 씨앗은 보지에 내보내기 위한 것이니까요<emoji=heart04> 그쵸<emoji=heart04> 그쵸<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "シャロンはずっしりと体重をかけ、どこで覚えたのか、雌としての本能なのか、腰を前後左右に振り乱して、精子を搾り取ろうとしてくる。"
translation = "샤론은 묵직하게 체중을 싣고, 어디서 배웠는지, 암컷으로서의 본능인지, 허리를 전후좌우로 마구 흔들며 정액을 짜내려 한다."

[[dialogue]]
speaker = "unk"
original = "俺だって抜くつもりはない。このまま、中出しをねだるシャロンの膣内に１滴残らず吐き出しきる。"
translation = "나 역시 뺄 생각은 없다. 이대로, 질내 사정을 조르는 샤론의 질 안에 한 방울도 남김없이 다 쏟아낸다."

[[dialogue]]
speaker = "シャロン"
original = "「んぅふぅうんっ<emoji=heart04>\u3000おち○ちんっ、どくんどくんしてますっ<emoji=heart04>\u3000精子っ、昇ってきてますっ<emoji=heart04>」"
translation = "「응으후우웅<emoji=heart04> 자지가, 두근두근거려요<emoji=heart04> 정자, 올라오고 있어요<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「はぁ、あっ、あんっ、あぁああっ<emoji=heart04>\u3000じゅせーっ、受精したいですっ<emoji=heart04>\u3000赤ちゃん、あなたさまの赤ちゃん欲しいですっ……<emoji=heart04>\u3000このまま、このままぁっ<emoji=heart04>」"
translation = "「하아, 앗, 안, 아아아앗<emoji=heart04> 수저어엉, 수정하고 싶어요<emoji=heart04> 아기, 당신의 아기를 갖고 싶어요……<emoji=heart04> 이대로, 이대로오<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "中出しを望む膣内に無遠慮に吐き出すこと以外、何も考えられない。シャロンの腰振りのリズムに合わせて、乱暴に腰を突き上げ続けた。"
translation = "질내 사정을 원하는 질 안에 무사태평하게 쏟아내는 것 외에는 아무것도 생각할 수 없다. 샤론의 허리 흔들림 리듬에 맞춰, 난폭하게 허리를 계속 찔러 올렸다."

[[dialogue]]
speaker = "シャロン"
original = "「はぁっ、んんんっ<emoji=heart04>\u3000あなたさまもイキそうなんですねっ<emoji=heart04>\u3000イキたくて必死なお顔っ、ステキですっ<emoji=heart04>\u3000かわいいですっ<emoji=heart04>\u3000キュンキュンしちゃいますぅっ<emoji=heart04>」"
translation = "「하앗, 응응응<emoji=heart04> 당신도 갈 것 같군요<emoji=heart04> 가고 싶어서 필사적인 얼굴, 멋져요<emoji=heart04> 귀여워요<emoji=heart04> 가슴이 큥큥거려요오<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「ふぁあっ！？\u3000あっ、あぁあぁぁっ<emoji=heart04>\u3000おち○ちんぷくぅって、膨らんでっ、あっ<emoji=heart04>\u3000んぁ<emoji=heart04>\u3000ああぁっ<emoji=heart04>」"
translation = "「화앗!? 앗, 아아아아아<emoji=heart04> 자지가 부풀어 올라서, 앗<emoji=heart04> 응아<emoji=heart04> 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「はぁ、はぉっ、ぉんっ<emoji=heart04>\u3000イキそっ、イキまひゅっ、おま○こイキまひゅっ<emoji=heart04>\u3000せぇし感じて、イキまひゅからぁあぁぁぁぁっ<emoji=heart04>」"
translation = "「하아, 하오, 오온<emoji=heart04> 갈 거 가, 가요, 보지 가요<emoji=heart04> 정액 느끼면서, 가니까아아아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「いいれすよっ、きて、きてっ<emoji=heart04>\u3000子宮にっ、精子っ、中出しっ、して、して、してくらひゃあぁいっ<emoji=heart04>\u3000んぁっ──あっ──ああぁっ～～っ<emoji=heart04>」"
translation = "「좋아요, 와요, 와줘요<emoji=heart04> 자궁에, 정액, 질내 사정, 해줘, 해줘, 해주세효오오옷<emoji=heart04> 응앗──앗──아아앗~~<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「んぃっ<emoji=heart04>\u3000んぅ、イクッ<emoji=heart04>\u3000イクイグッ、イクイクイクイクイッッッッグぅぅううぅうぅぅぅぅぅっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응잇<emoji=heart04> 응우, 가앗<emoji=heart04> 가가가, 가가가가가가아아아아아아아악<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「んぅっ！？\u3000ふっ、んぅくっ<emoji=heart04>\u3000んきゅっ<emoji=heart04>\u3000んぁうっ<emoji=heart04>\u3000はっ、はぁっ<emoji=heart04>\u3000んぁ、あっ、ぁあっはあぁ～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응으!? 훗, 응우욱<emoji=heart04> 응큐<emoji=heart04> 응아우<emoji=heart04> 하앗, 하아<emoji=heart04> 응아, 앗, 아앗하아~~~~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「はぅ、んっ、出てっ、まだっ、いっぱい出へるっ<emoji=heart04>\u3000せぇしっ、びゅーっ、びゅーっ<emoji=heart04>\u3000びゅーっ、びゅーっ、びゅうぅぅっ<emoji=heart04>」"
translation = "「하우, 응, 나와서, 아직, 잔뜩 나오고 있어<emoji=heart04> 정액, 뷰웃, 뷰웃<emoji=heart04> 뷰웃, 뷰웃, 뷰우우우웃<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「おち○ちんポンプが、どっくんどっくんって……<emoji=heart04>\u3000あちゅぅいの、お腹に、いっぱい、いっぷぁあぁいっ……<emoji=heart04>」"
translation = "「자지 펌프가, 두근두근거려서……<emoji=heart04> 뜨거운 게, 배 안에, 가득, 가드으으윽……<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「はぁっ、はっ、はひぃっ……<emoji=heart04>\u3000アツアツせーしで……おま○こ、たっぷたぷぅ……ふふ、んふふふっ……<emoji=heart04>」"
translation = "「하앗, 하앗, 하히잇……<emoji=heart04> 뜨끈뜨끈한 정액으로…… 보지, 찰랑찰랑…… 후후, 응후후후……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「はぁ、はぁっ……んぁっ！？\u3000まだおま○こ締めてきてっ……！」"
translation = "「하아, 하아…… 응앗!? 아직 보지를 조여와서……!」"

[[dialogue]]
speaker = "シャロン"
original = "「はあぁ<emoji=heart04>\u3000ぜーんぶ、出すまで放してあげないんでーす……<emoji=heart04>\u3000ちゅ、ちゅっ、ちゅっ<emoji=heart04>」"
translation = "「하아아<emoji=heart04> 다아, 내보낼 때까지 안 놔줄 거예에용……<emoji=heart04> 츄, 츄, 츄<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "出し切るまで逃さず、その間もキスの雨を浴びせるシャロンの膣内に留まり続け、ようやくペニスも萎んだ頃──"
translation = "다 쏟아낼 때까지 놓아주지 않고, 그동안에도 키스 세례를 퍼붓는 샤론의 질 안에 계속 머무르다, 겨우 페니스도 시들었을 무렵──"

[[dialogue]]
speaker = "シャロン"
original = "「ぁんっ……<emoji=heart04>\u3000せっかくたくさん出していただいたのに、溢れちゃってます……<emoji=heart04>」"
translation = "「아앙……<emoji=heart04> 어렵게 잔뜩 내보내 주셨는데, 넘쳐흐르고 있어요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "自然と抜け出た途端、ぽっかり開いたシャロンの膣穴からは逆流した白濁がごぽりと音を立てて溢れ出た。"
translation = "자연스럽게 빠져나온 순간, 뻥 뚫린 샤론의 질 구멍에서는 역류한 백탁액이 꾸르륵 소리를 내며 넘쳐흘렀다."

[[dialogue]]
speaker = "シャロン"
original = "「はぁぁ……お腹の奥から、あったかぁいのがぽわぁんって広がって……すっごく幸せですっ……<emoji=heart04>」"
translation = "「하아아…… 배 속 깊은 곳에서, 따뜻한 게 포근하게 퍼져서…… 너무 행복해요……<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「あなたさまとセックス……きもちよすぎて、とにかく夢中で……たくさんイッちゃいました……恥ずかしいです……<emoji=heart04>」"
translation = "「당신과 섹스…… 너무 기분 좋아서, 아무튼 정신없이…… 잔뜩 가버렸어요…… 부끄러워요……<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「はぁ、はぁ……<emoji=heart04>\u3000もうひとつのバレンタインチョコ、気に入っていただけましたか？」"
translation = "「하아, 하아……<emoji=heart04> 또 하나의 발렌타인 초콜릿, 마음에 드셨나요?」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、美味しかったよ、ありがとう」"
translation = "「아아, 맛있었어, 고마워」"

[[dialogue]]
speaker = "シャロン"
original = "「えへへ<emoji=heart04>\u3000ならよかったです<emoji=heart04>」"
translation = "「에헤헤<emoji=heart04> 그렇다면 다행이에요<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「ずっとずっと一緒にいましょうね……あなたさま……<emoji=heart04>\u3000ちゅっ<emoji=heart04>」"
translation = "「계속 계속 함께해요…… 당신……<emoji=heart04> 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺たちはそのまま同じベッドで眠りに就き、恋人たちの夜を過ごしたのだった──"
translation = "우리들은 그대로 같은 침대에서 잠이 들어, 연인들의 밤을 보냈던 것이었다──"

