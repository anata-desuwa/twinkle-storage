[[dialogue]]
speaker = "unk"
original = "第９話,独立機関ネビュラ,B"
translation = "제9화, 독립 기관 네뷸라, B"

[[dialogue]]
speaker = "unk"
original = "……。"
translation = "……."

[[dialogue]]
speaker = "unk"
original = "…………。"
translation = "…………."

[[dialogue]]
speaker = "unk"
original = "………………。"
translation = "………………."

[[dialogue]]
speaker = "セドナ"
original = "「さて──情報交換といこう。ああ、自由にかけていいぞ」"
translation = "「자아── 정보 교환을 하자. 아아, 자유롭게 앉아도 좋다」"

[[dialogue]]
speaker = "unk"
original = "褐色肌の女性に促され、俺たちは戸惑いつつも席につく。"
translation = "갈색 피부의 여성에게 재촉받아, 우리들은 당황하면서도 자리에 앉는다."

[[dialogue]]
speaker = "アイリーン"
original = "「改めまして──お初にお目にかかります。流星学園、並びに新星学園の<ruby>星騎士<rt>スターナイト</rt></ruby>の皆様方」"
translation = "「다시 한번── 처음 뵙겠습니다. 유성 학원, 그리고 신성 학원의 성기사 여러분」"

[[dialogue]]
speaker = "クロト"
original = "「始めまして。ですが……いきなり連れてこられては、右も左もわかりません」"
translation = "「처음 뵙겠습니다. 하지만…… 갑자기 끌려와서는, 동서남북도 모르겠습니다」"

[[dialogue]]
speaker = "アイリーン"
original = "「申し訳ありません。せっかくのご機会ですので、交流の場をと思いまして」"
translation = "「죄송합니다. 모처럼의 기회이니, 교류의 장을 마련하고자 했습니다」"

[[dialogue]]
speaker = "unk"
original = "あれから。"
translation = "그 후."

[[dialogue]]
speaker = "unk"
original = "戦闘を終えた俺たちは、彼女たちの手によってこの基地らしき場所へ連れてこられた。"
translation = "전투를 마친 우리들은, 그녀들의 손에 의해 이 기지 같은 장소로 끌려왔다."

[[dialogue]]
speaker = "unk"
original = "本来であれば学園に帰還しなくてはならないところを、だ。"
translation = "본래라면 학원으로 귀환해야 할 상황이었는데도 말이다."

[[dialogue]]
speaker = "unk"
original = "彼女たちが命の恩人であることに疑いはないが、まだ油断はできなかった。"
translation = "그녀들이 생명의 은인이라는 점에는 의심의 여지가 없지만, 아직 방심할 수는 없었다."

[[dialogue]]
speaker = "アイリーン"
original = "「早速ですが自己紹介と参りましょう。私はアイリーンと申します」"
translation = "「바로 자기소개로 넘어가겠습니다. 저는 아이린이라고 합니다」"

[[dialogue]]
speaker = "クロト"
original = "「新星星徒会会長、緋宮クロトです。よろしくお願いします」"
translation = "「신성 성도회 회장, 히노미야 쿠로토입니다. 잘 부탁드립니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「元会長・兼・フィクサー、九浄ヴィーナス！\u3000ほらマトイもっ」"
translation = "「전 회장 겸 픽서, 쿠죠 비너스! 자 마토이도!」"

[[dialogue]]
speaker = "マトイ"
original = "「え、えええーっと──書記──じゃなくて──スーパー書記の詠野マトイです！」"
translation = "「에, 에에에ー 그러니까── 서기──가 아니라── 슈퍼 서기인 에이노 마토이입니다!」"

[[dialogue]]
speaker = "アナ"
original = "「副会長・アナ」"
translation = "「부회장・아나」"

[[dialogue]]
speaker = "サーシャ"
original = "「サーシャで～す。こちらは可愛い妹のソフィ♪」"
translation = "「사샤예요~. 이쪽은 귀여운 여동생 소피♪」"

[[dialogue]]
speaker = "ソフィア"
original = "「撫でないでください、もうっ」"
translation = "「쓰다듬지 마세요, 정말!」"

[[dialogue]]
speaker = "ルリエル"
original = "「流星学園ルリエルです！\u3000元気なら誰にも負けません！」"
translation = "「유성 학원 루리엘입니다! 활기라면 누구에게도 지지 않아요!」"

[[dialogue]]
speaker = "ユウリ"
original = "「ユウリだ。よく間違われるけど、一応魔族と人間のハーフ」"
translation = "「유우리다. 자주 착각하지만, 일단 마족과 인간의 하프」"

[[dialogue]]
speaker = "セーラ"
original = "「セーラでーす。んで、こっちがうちらの大将……」"
translation = "「세라예요ー. 그리고, 이쪽이 우리 대장……」"

[[dialogue]]
speaker = "エリシア"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "エリシア"
original = "「……星見、フィオナです。流星学園の会長を務めています。お見知り置きを」"
translation = "「……호시미, 피오나입니다. 유성 학원의 회장을 맡고 있습니다. 잘 부탁드립니다」"

[[dialogue]]
speaker = "セドナ"
original = "「……なるほど」"
translation = "「……과연」"

[[dialogue]]
speaker = "クロト"
original = "（フィオナ……）"
translation = "（피오나……）"

[[dialogue]]
speaker = "unk"
original = "彼女の<b>名乗り</b>は元に戻っていた。"
translation = "그녀의 <b>이름</b>은 원래대로 돌아와 있었다."

[[dialogue]]
speaker = "unk"
original = "あくまでも、本名はアポロの前以外じゃ出せないというわけか。"
translation = "어디까지나, 본명은 아폴로 앞이 아니면 밝힐 수 없다는 건가."

[[dialogue]]
speaker = "アイリーン"
original = "「我々は『ネビュラ』。リクリエ問題を対策する独立組織です」"
translation = "「저희는 『네뷸라』. 리크리에 문제를 대책하는 독립 조직입니다」"

[[dialogue]]
speaker = "クロト"
original = "「ネビュラ……」"
translation = "「네뷸라……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "（聞いたことある？）"
translation = "（들어본 적 있어?）"

[[dialogue]]
speaker = "アナ"
original = "（ありませんね）"
translation = "（없습니다）"

[[dialogue]]
speaker = "アイリーン"
original = "「私はネビュラの構成員として、こちらの人間界本部に務めております」"
translation = "「저는 네뷸라의 구성원으로서, 이곳 인간계 본부에서 일하고 있습니다」"

[[dialogue]]
speaker = "アイリーン"
original = "「そしてこちらは、我々の上司となるセドナ長官です」"
translation = "「그리고 이쪽은, 저희의 상사인 세드나 장관입니다」"

[[dialogue]]
speaker = "セドナ"
original = "「ま、私のことはいい。名乗りが済んだなら話を進めろ」"
translation = "「뭐, 내 이야기는 됐다. 자기소개가 끝났다면 이야기를 진행시켜라」"

[[dialogue]]
speaker = "クロト"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "セドナ。"
translation = "세드나."

[[dialogue]]
speaker = "unk"
original = "そう呼ばれた長身の女性は、見るからにただ者でない雰囲気をまとっていた。"
translation = "그렇게 불린 장신의 여성은, 누가 봐도 예사롭지 않은 분위기를 풍기고 있었다."

[[dialogue]]
speaker = "unk"
original = "そして──実際にそうだろう。"
translation = "그리고── 실제로도 그럴 것이다."

[[dialogue]]
speaker = "unk"
original = "星力が完全にシャットアウトされたあの状況でも、彼女の炎は万丈の勢いを誇っていたのだから。"
translation = "성력이 완전히 차단된 그 상황에서도, 그녀의 불꽃은 만장의 기세를 자랑했으니까."

[[dialogue]]
speaker = "セドナ"
original = "「君たちに訊きたいことがある。あの仮面の少女をどこまで知っている？\u3000あの手については？\u3000そして姉と呼んでいたのはなぜだ？」"
translation = "「너희에게 묻고 싶은 것이 있다. 저 가면의 소녀를 어디까지 알고 있지? 저 손에 대해서는? 그리고 언니라고 불렀던 것은 왜지?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ちょ……ま、待ってよ。あなた達の説明もう終わり？」"
translation = "「잠…… 잠깐만. 당신들 설명은 벌써 끝이야?」"

[[dialogue]]
speaker = "セドナ"
original = "「終わりだ。質問に答えてもらおう」"
translation = "「끝이다. 질문에 대답해라」"

[[dialogue]]
speaker = "セドナ"
original = "「これは、我々が以前からアンテナを張っていた問題でもある。こうして語り合えるのはまたとない機だ」"
translation = "「이것은, 우리가 이전부터 안테나를 세우고 있던 문제이기도 하다. 이렇게 서로 이야기할 수 있는 것은 다시 없을 기회다」"

[[dialogue]]
speaker = "ユウリ"
original = "「んないきなりアレコレ聞かれたって、こっちだって答える義理なんかないだろうよ」"
translation = "「이런 식으로 갑자기 이것저것 물어봐 봤자, 우리라고 대답할 의무 같은 건 없을 거 아니냐」"

[[dialogue]]
speaker = "セドナ"
original = "「君たちが全滅する危機を救った。釣りが来るほどに十分な義理だと思うが？」"
translation = "「너희가 전멸할 위기를 구했다. 낚시가 올 정도로 충분한 의무라고 생각하는데?」"

[[dialogue]]
speaker = "ユウリ"
original = "「っ……」"
translation = "「윽……」"

[[dialogue]]
speaker = "unk"
original = "長官──セドナさんは俺たちを<ruby>睥睨<rt>へいげい</rt></ruby>する。"
translation = "장관── 세드나 씨는 우리들을 위압한다."

[[dialogue]]
speaker = "unk"
original = "思わず身が<ruby>竦<rt>すく</rt></ruby>んでしまうようなプレッシャーだった。"
translation = "무심코 몸이 움츠러들게 만드는 압박감이었다."

[[dialogue]]
speaker = "クロト"
original = "「助けていただいたことには感謝しています。ただ──ああなるまで待機していたというのも、事実ですよね」"
translation = "「도와주신 것에는 감사드립니다. 다만── 그렇게 될 때까지 대기하고 있었다는 것도, 사실이죠」"

[[dialogue]]
speaker = "セドナ"
original = "「……ふ。ああ、そうだな」"
translation = "「……흥. 아아, 그렇다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「！\u3000どっかで見てたの……！？」"
translation = "「! 어디선가 보고 있었던 거야……!?」"

[[dialogue]]
speaker = "セーラ"
original = "「ちょーっとタイミング良すぎたもんね～」"
translation = "「너ー무 타이밍이 좋았잖아~」"

[[dialogue]]
speaker = "アナ"
original = "「もしかしたら、これまでも──かも」"
translation = "「어쩌면, 지금까지도──일지도」"

[[dialogue]]
speaker = "unk"
original = "アポロのことを知っている口ぶりと言い、彼女らがある程度の実力と情報を備えているのは確かだ。"
translation = "아폴로에 대해 알고 있는 듯한 말투로 보아, 그녀들이 어느 정도의 실력과 정보를 갖추고 있는 것은 확실하다."

[[dialogue]]
speaker = "unk"
original = "ここが学園と何の縁もない施設であることを考えると、驚異的と言える。"
translation = "이곳이 학원과 아무런 연고도 없는 시설이라는 것을 생각하면, 경이롭다고 할 수 있다."

[[dialogue]]
speaker = "アイリーン"
original = "「そうです。我々はこれまでもモンスターの発生、アステライトの出現、それから仮面の少女の暗躍──リクリエのあらゆる余波を観測してきました」"
translation = "「그렇습니다. 저희는 지금까지도 몬스터의 발생, 아스테라이트의 출현, 그리고 가면의 소녀의 암약── 리크리에의 모든 여파를 관측해 왔습니다」"

[[dialogue]]
speaker = "ユウリ"
original = "「んなら、ちょっとくらい手伝ってくれてもよかったんじゃねえか？」"
translation = "「그렇다면, 조금이라도 도와줬어도 좋았잖아?」"

[[dialogue]]
speaker = "アイリーン"
original = "「そうでしょうか。リクリエ問題に表立って当たるべきは星騎士──つまりは皆様なのですから、我々の介入は事態を混乱させる恐れがあります」"
translation = "「그럴까요. 리크리에 문제에 표면적으로 맞서야 할 것은 성기사── 즉 여러분이니까, 저희의 개입은 사태를 혼란시킬 우려가 있습니다」"

[[dialogue]]
speaker = "マトイ"
original = "「そうかもしれないけど……薄情、ですよう」"
translation = "「그럴지도 모르지만…… 야박하네요」"

[[dialogue]]
speaker = "unk"
original = "アイリーンさんは淡々と『ネビュラ』について語った。"
translation = "아이린 씨는 담담하게 『네뷸라』에 대해 이야기했다."

[[dialogue]]
speaker = "unk"
original = "いわく、彼女らは<b>表向きでない</b>対リクリエ組織であると。"
translation = "말하자면, 그녀들은 <ruby>겉으로 드러나지 않은<rt>・・・ ・・・・ ・・</rt></ruby> 대 리크리에 조직이라고."

[[dialogue]]
speaker = "セドナ"
original = "「我々は同志だよ、学生諸君。リクリエからこの世界を救う──そのために君たちも星騎士を志したのだろう？」"
translation = "「우리는 동지다, 학생 제군. 리크리에로부터 이 세계를 구한다── 그것을 위해 너희도 성기사를 지망했을 것 아닌가?」"

[[dialogue]]
speaker = "セドナ"
original = "「魔王候補も２人いるわけだし……な」"
translation = "「마왕 후보도 두 명이나 있는 것 같고…… 말이지」"

[[dialogue]]
speaker = "フィオナ"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "クロト"
original = "「本当に──よくご存知ですね」"
translation = "「정말로── 잘 알고 계시네요」"

[[dialogue]]
speaker = "unk"
original = "ともすれば俺たちさえ知らなかった事実を、なぜか掴んでいるセドナさん。"
translation = "자칫하면 우리들조차 몰랐던 사실을, 어째서인지 파악하고 있는 세드나 씨."

[[dialogue]]
speaker = "unk"
original = "どうなんだ。助けてはもらったものの、全面的に信用していいものだろうか？"
translation = "어떻게 해야 할까. 도움을 받긴 했지만, 전적으로 신용해도 괜찮은 걸까?"

