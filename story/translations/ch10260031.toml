[[dialogue]]
speaker = "unk"
original = "第１話,クラスメイツトリコロール,P"
translation = "제1화, 클래스메이트 트리콜로르, P"

[[dialogue]]
speaker = "unk"
original = "バトルフェスタ・ペンタグラムを終えた数日後。"
translation = "배틀 페스타 펜타그램을 마친 며칠 후."

[[dialogue]]
speaker = "unk"
original = "仮想結界システムを用いて、リーリア達が戦闘訓練を行っていた――"
translation = "가상 결계 시스템을 이용하여, 리리아 일행이 전투 훈련을 하고 있었다――"

[[dialogue]]
speaker_original = "リーリア（覚醒）"
speaker_translation = "릴리아(각성)"
original = "「よ～し、そろそろ融合魔弾を決めちゃうんで、２人ともサポートお願いね！」"
translation = "「조~아, 슬슬 융합마탄을 결정지을 테니까, 둘 다 서포트 부탁해!」"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「ノープロブレム。シャドウからの攻撃は私が防御します」"
translation = "「노 프로블럼. 섀도우의 공격은 제가 방어하겠습니다.」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あたしは歌でリーリアちゃんを強化するね！\u3000――ストリーミングキャロル！」"
translation = "「나는 노래로 리리아 짱을 강화할게! ――스트리밍 캐럴!」"

[[dialogue]]
speaker = "unk"
original = "俺が見学に向かうと、リーリアと一緒に訓練していたのは、彼女のクラスメイトのアナとルルカだった。"
translation = "내가 견학하러 가자, 리리아와 함께 훈련하고 있던 것은 그녀의 클래스메이트인 아나와 루루카였다."

[[dialogue]]
speaker_original = "リーリア（覚醒）"
speaker_translation = "릴리아(각성)"
original = "「あっ、センパ～イ！\u3000可愛い後輩彼女の活躍、観に来てくれたんですね～☆」"
translation = "「앗, 선배~! 귀여운 후배 여자친구의 활약, 보러 와 주셨군요~☆」"

[[dialogue]]
speaker_original = "リーリア（覚醒）"
speaker_translation = "릴리아(각성)"
original = "「なら一層、張り切ってぶっ放しちゃいますよ～！\u3000想いに名づける色は決まった！」"
translation = "「그럼 한층 더, 힘내서 쏴버릴게요~! 마음으로 이름 붙일 색은 정해졌어!」"

[[dialogue]]
speaker_original = "リーリア（覚醒）"
speaker_translation = "릴리아(각성)"
original = "「融合魔弾！\u3000クラスメイツトリコロール！！」"
translation = "「융합마탄! 클래스메이트 트리콜로르!!」"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「シャドウ３体の消滅を確認。これにてミッションクリアです」"
translation = "「섀도우 3체의 소멸을 확인. 이것으로 미션 클리어입니다.」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ひゃ～、相変わらず凄い威力！\u3000それぞれノヴァフォームのシャドウだったのに……！」"
translation = "「히야~, 여전히 엄청난 위력! 각각 노바 폼 섀도우였는데……!」"

[[dialogue]]
speaker_original = "リーリア（覚醒）"
speaker_translation = "릴리아(각성)"
original = "「そりゃあもう、私のこの『アルカンシェルフォーム』は、センパイとの絆の力ですから☆」"
translation = "「그야 당연하죠, 저의 이 『아르캉시엘 폼』은 선배와의 인연의 힘이니까요☆」"

[[dialogue]]
speaker_original = "リーリア（覚醒）"
speaker_translation = "릴리아(각성)"
original = "「恋人のラブラブ絆パワーの前には、リクリエだろうとなんだろうと敵じゃないですよねっ、センパイ♪\u3000――えいっ<emoji=heart04>」"
translation = "「연인의 러브러브 인연 파워 앞에서는, 리크리에든 뭐든 적이 아니죠, 선배♪ ――에잇<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言って、リーリアが俺の腕に抱き着いて来る。"
translation = "그렇게 말하며, 리리아가 내 팔에 매달려 온다."

[[dialogue]]
speaker_original = "リーリア（覚醒）"
speaker_translation = "릴리아(각성)"
original = "「ぎゅ～っ<emoji=heart04>\u3000ふふっ、どうです？\u3000可愛い後輩にくっ付かれて、マジカルドキドキしちゃってますか～？」"
translation = "「꼬옥~<emoji=heart04> 후훗, 어때요? 귀여운 후배가 달라붙어서, 매지컬 두근두근해 버렸나요~?」"

[[dialogue]]
speaker = "unk"
original = "え、いや特には……"
translation = "에, 아니 딱히……"

[[dialogue]]
speaker_original = "リーリア（覚醒）"
speaker_translation = "릴리아(각성)"
original = "「真顔！？\u3000ちょっとは嬉しそうな反応して下さいよ～！\u3000センパ～イ！」"
translation = "「정색!? 조금은 기뻐하는 반응을 보여주세요~! 선배~!」"

[[dialogue]]
speaker = "unk"
original = "あはは、ゴメンゴメン"
translation = "아하하, 미안 미안."

[[dialogue]]
speaker_original = "リーリア（覚醒）"
speaker_translation = "릴리아(각성)"
original = "「もう！\u3000センパイったら、すぐそうやって彼女をイジメるんですから～♪\u3000あんまりやると拗ねちゃいますよ～？\u3000つんつん<emoji=heart04>」"
translation = "「정말! 선배는 맨날 그렇게 여자친구를 괴롭힌다니까요~♪ 너무 하면 삐질 거예요~? 쿡쿡<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "言いつつもリーリアは楽しそうに、俺の頬っぺたをつっ突いて来る。"
translation = "말하면서도 리리아는 즐거운 듯이, 내 볼을 쿡쿡 찌른다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あたしたちがいるのに、カップルが何かおっぱじめてるんだけど……」"
translation = "「우리도 있는데, 커플이 뭘 시작하려고 하고 있네……」"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「バカップル、滅ぶべし」"
translation = "「바보 커플, 멸망하라.」"

[[dialogue]]
speaker_original = "リーリア（覚醒）"
speaker_translation = "릴리아(각성)"
original = "「ふっふっふ☆\u3000２人もいつか恋人ができれば、私の気持ちがわかるよ♪」"
translation = "「훗훗훗☆ 두 사람도 언젠가 연인이 생기면, 내 기분을 알게 될 거야♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「恋人マウント！？\u3000むぅ～……あっ、そう言えば！」"
translation = "「연인 부심!? 으으~…… 앗, 그러고 보니!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ねぇ、お兄ちゃん。リーリアちゃんのおっぱいって、<b>パッド</b>なんでしょ～？」"
translation = "「저기, 오빠. 리리아 짱 가슴, <b>패드</b>지~?」"

[[dialogue]]
speaker_original = "リーリア（覚醒）"
speaker_translation = "릴리아(각성)"
original = "「ちょっ！？\u3000いきなり何言ってんの！？」"
translation = "「잠깐!? 갑자기 무슨 소리야!?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「恋人に『自分を偽らなくていいんだよ』って言ってあげなくていいの～？」"
translation = "「연인에게 『자신을 속이지 않아도 돼』라고 말해주지 않아도 되는 거야~?」"

[[dialogue]]
speaker = "unk"
original = "いや、いつも言ってはいるんだけど……"
translation = "아니, 항상 말하고는 있는데……"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「なになに？\u3000――可愛い後輩が『クラスで突然おっぱいがしぼんだ女』になっていいのかって怒る？」"
translation = "「뭐야 뭐야? ――귀여운 후배가 『클래스에서 갑자기 가슴이 쪼그라든 여자』가 되어도 괜찮냐고 화내는 거야?」"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「そもそも、前から聞きたかったのですが、リーリアさんはどうしておっぱいを盛ろうと思ったんですか？」"
translation = "「애초에, 전부터 묻고 싶었습니다만, 리리아 씨는 어째서 가슴을 키우려고 생각한 건가요?」"

[[dialogue]]
speaker_original = "リーリア（覚醒）"
speaker_translation = "릴리아(각성)"
original = "「それは、えっと……ネビュラのスパイとして、センパイにハニートラップを仕掛けるつもりだったので、おっぱいは大きい方が有利かなって……」"
translation = "「그건, 에또…… 네뷸라의 스파이로서, 선배에게 허니 트랩을 걸 생각이었기 때문에, 가슴은 큰 편이 유리할까 싶어서……」"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「ほう、あくまで業務の一環であり、そこに見栄はなかったと？」"
translation = "「호오, 어디까지나 업무의 일환이었으며, 거기에는 허영심이 없었다는 건가요?」"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「ですが――おかしいですね。リーリアさんは春の入学当初から居ましたが、会長はその後、途中から学園にやって来た転入生です。その<ruby>パッド<rt>理由</rt></ruby>は矛盾していませんか？」"
translation = "「하지만―― 이상하네요. 리리아 씨는 봄 입학 당초부터 있었지만, 회장은 그 후, 도중에 학원에 온 전학생입니다. 그 패드는 모순되지 않습니까?」"

[[dialogue]]
speaker_original = "リーリア（覚醒）"
speaker_translation = "릴리아(각성)"
original = "「うぐっ！？\u3000すみません！\u3000本当はただ見栄を張りたかっただけです！」"
translation = "「우윽!? 죄송합니다! 사실은 그냥 폼 잡고 싶었을 뿐이에요!」"

[[dialogue]]
speaker_original = "リーリア（覚醒）"
speaker_translation = "릴리아(각성)"
original = "「でも待って！\u3000アナちゃんとルルカちゃんなら、わかるでしょ！？」"
translation = "「하지만 잠깐만! 아나 짱이랑 루루카 짱이라면, 알잖아!?」"

[[dialogue]]
speaker_original = "リーリア（覚醒）"
speaker_translation = "릴리아(각성)"
original = "「星騎士の女の子ってどうして――みんなおっぱいが大きいの！？」"
translation = "「성기사 여자애들은 어째서―― 다들 가슴이 큰 거냐고!?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「同意を求められても困るんだけど……？」"
translation = "「동의를 구해와도 곤란한데……?」"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「言いたいことはわかります。女性の平均と星騎士の平均バストには大きな隔たりがあると、私も感じていました」"
translation = "「하고 싶은 말은 알겠습니다. 여성의 평균과 성기사의 평균 바스트에는 큰 격차가 있다고, 저도 느끼고 있었습니다.」"

[[dialogue]]
speaker_original = "リーリア（覚醒）"
speaker_translation = "릴리아(각성)"
original = "「でしょ！？\u3000でもね――そんな女性の為に、人間界のパッドはマジカル進化しているんだよ！」"
translation = "「그치!? 하지만 말이야―― 그런 여성을 위해서, 인간계의 패드는 매지컬 진화하고 있다고!」"

[[dialogue]]
speaker_original = "リーリア（覚醒）"
speaker_translation = "릴리아(각성)"
original = "「着け心地とか外れにくさも段違いだし、不自然にならないように『ちょっとだけ盛る』みたいにできたり、素晴らしいアイテムが色々あるんだから！」"
translation = "「착용감이나 잘 안 빠지는 것도 차원이 다르고, 부자연스럽지 않게 『조금만 키우기』 같은 것도 가능하고, 훌륭한 아이템이 여러 가지 있으니까!」"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「ふむ……」"
translation = "「흠……」"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「その話、詳しく聞かせてもらっても？」"
translation = "「그 이야기, 자세히 들려주실 수 있나요?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「アナちゃん！？\u3000そこでパッドを付けたら負けだよ！？」"
translation = "「아나 짱!? 거기서 패드를 차면 지는 거야!?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「小さいことはステータスなんだから！\u3000そこにはちゃんと誇りを持つべきじゃないかな！？」"
translation = "「작은 건 스테이터스니까! 거기에는 제대로 자부심을 가져야 하지 않을까!?」"

[[dialogue]]
speaker_original = "リーリア（覚醒）"
speaker_translation = "릴리아(각성)"
original = "「ふ～ん、そっか～。ルルカちゃんは全然興味ないんだ？\u3000なら、続きはアナちゃんにだけ教えてあげるね☆」"
translation = "「흐~응, 그렇구나~. 루루카 짱은 전혀 관심 없나 보네? 그럼, 다음은 아나 짱한테만 가르쳐 줄게☆」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「なっ！？\u3000なぁぁぁ～～～っ！？」"
translation = "「나앗!? 나아아아~~~앗!?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「お兄ちゃ～～～ん！！\u3000彼女さんが友達をイジメるんだけど、どう思う！？」"
translation = "「오빠아아~~!! 여자친구가 친구를 괴롭히는데, 어떻게 생각해!?」"

[[dialogue]]
speaker = "unk"
original = "すごく、帰りたいです……"
translation = "정말, 집에 가고 싶습니다……"

[[dialogue]]
speaker_original = "リーリア（覚醒）"
speaker_translation = "릴리아(각성)"
original = "「待ってセンパイ！\u3000パッドにも見た目重視と感触重視があって、彼氏の意見も聞きたいの！」"
translation = "「잠깐만 선배! 패드에도 외관 중시와 감촉 중시가 있어서, 남자친구의 의견도 듣고 싶어!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「感触重視って…パッドなのに触らせるの！？\u3000エッチなのはダメだよ、リーリアちゃん！？」"
translation = "「감촉 중시라니… 패드인데 만지게 하는 거야!? 야한 건 안 돼, 리리아 짱!?」"

[[dialogue]]
speaker_original = "リーリア（覚醒）"
speaker_translation = "릴리아(각성)"
original = "「ふっふっふっ。彼氏彼女というのは、エッチなものなんだよ、ルルカちゃん？」"
translation = "「훗훗훗. 남자친구 여자친구라는 건, 야한 법이란다, 루루카 짱?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「くぅ～～～！\u3000リーリアちゃんに恋人マウント取られるの、なんかすごく悔しいぃ～～～！」"
translation = "「크으으~~! 리리아 짱한테 연인 부심 당하는 거, 왠지 엄청 분해~~!」"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「低身長の爆乳天使アナ……アニマ先輩のようなトランジスタグラマー路線も、アリですね」"
translation = "「단신의 폭유 천사 아나…… 아니마 선배 같은 트랜지스터 그래머 노선도, 괜찮겠네요.」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「アナちゃん！？\u3000パッド堕ちしないで、戻って来て！」"
translation = "「아나 짱!? 패드에 타락하지 말고, 돌아와!」"

[[dialogue]]
speaker_original = "リーリア（覚醒）"
speaker_translation = "릴리아(각성)"
original = "「私たちの味方であるパッドの悪口は止めてもらえます！？」"
translation = "「우리들의 아군인 패드 욕은 그만해 주실래요!?」"

[[dialogue]]
speaker = "unk"
original = "そんなこんなで、今日も仲良くじゃれ合うクラスメイト３人なのであった――"
translation = "이래저래, 오늘도 사이좋게 장난치는 클래스메이트 세 사람이었다――"

