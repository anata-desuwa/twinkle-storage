[[dialogue]]
speaker = "シフォン"
original = "「ほら早く……<emoji=heart04>\u3000んっ、ちゅっ……<emoji=heart04>\u3000早く脱いでください……<emoji=heart04>」"
translation = "「자 어서……<emoji=heart04> 으음, 츄웁……<emoji=heart04> 빨리 벗어주세요……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「脱げって、キスだけって話だったんじゃ──」"
translation = "「벗으라니, 키스만 한다는 이야기 아니었──」"

[[dialogue]]
speaker = "シフォン"
original = "「我慢できないんですもん……<emoji=heart04>\u3000パルミエとモナカが戻ってくる前に、んっ、ちゅっ……<emoji=heart04>\u3000少しでいいから繋がりましょう……<emoji=heart04>」"
translation = "「참을 수 없는걸요……<emoji=heart04> 파르미에와 모나카가 돌아오기 전에, 으음, 츄웁……<emoji=heart04> 조금이라도 좋으니까 연결돼요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "キスの雨を俺の唇に降らせながら、シフォンがカチャカチャと俺のズボンを下ろそうとしてくる。"
translation = "키스 세례를 내 입술에 퍼부으며, 시퐁이 달그락거리며 내 바지를 내리려 한다."

[[dialogue]]
speaker = "クロト"
original = "「すっかりエッチにはまっちゃって……。シフォンがこんなに淫乱だとは思ってなかったな」"
translation = "「완전히 섹스에 빠져버렸네……. 시퐁이 이렇게 음란할 줄은 몰랐어.」"

[[dialogue]]
speaker = "シフォン"
original = "「～～っっ。い、淫乱なわけじゃありませんっ。あなたのことが好きで好きでたまらないだけですっ」"
translation = "「～～윽. 이, 음란한 게 아니에요. 당신이 너무너무 좋아서 어쩔 수 없는 것뿐이에요.」"

[[dialogue]]
speaker = "シフォン"
original = "「天使は純粋無垢で、ちゅぁ、ぺろろぉ……魔族は欲望に忠実なものじゃないですか……<emoji=heart04>\u3000私にはそのどちらの血も流れていますから……<emoji=heart04>」"
translation = "「천사는 순진무구하고, 츄아, 낼름…… 마족은 욕망에 충실한 법이잖아요……<emoji=heart04> 저에게는 그 두 쪽의 피가 다 흐르고 있으니까……<emoji=heart04>」"

[[dialogue]]
speaker = "シフォン"
original = "「大好きな人とのイチャイチャエッチの味を知っちゃったらもう……<emoji=heart04>\u3000んっ、ちゅぁ、れろぉ……<emoji=heart04>\u3000いつでもどこでもしたくなっちゃうだけで……<emoji=heart04>」"
translation = "「좋아하는 사람과의 꽁냥꽁냥 섹스의 맛을 알아버렸더니 이제……<emoji=heart04> 응, 츄아, 레로……<emoji=heart04> 언제 어디서든 하고 싶어질 뿐이라서……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺の唇を貪るように火照った舌をぐいぐいと絡ませてくるシフォン。"
translation = "내 입술을 탐하듯 달아오른 혀를 꾹꾹 얽어오는 시퐁."

[[dialogue]]
speaker = "unk"
original = "付き合ってからわかったけれど、シフォンはパルミエ以上に欲求に素直で、モナカ以上に甘えん坊だったみたいだ。"
translation = "사귀고 나서 알게 된 것이지만, 시퐁은 파르미에 이상으로 욕구에 솔직하고, 모나카 이상으로 어리광쟁이인 것 같았다."

[[dialogue]]
speaker = "unk"
original = "「恥ずかしいから」と２人に付き合ったことを隠しながらも、２人きりになると途端にこうして甘えてきてくれて──"
translation = "「부끄러우니까」라며 두 사람에게 사귀는 것을 숨기면서도, 둘만 있게 되면 곧장 이렇게 어리광을 부려 오는데──"

[[dialogue]]
speaker = "クロト"
original = "「わっ！？」"
translation = "「왓!?」"

[[dialogue]]
speaker = "シフォン"
original = "「はぁはぁ……<emoji=heart04>\u3000タイツが邪魔ですね、これじゃ挿れられません……<emoji=heart04>\u3000破っちゃいましょう……<emoji=heart04>\u3000ほら会長さんも早くおち○ぽ出してください……<emoji=heart04>」"
translation = "「하아 하아……<emoji=heart04> 타이츠가 방해되네요, 이래선 삽입할 수 없어요……<emoji=heart04> 찢어버리죠……<emoji=heart04> 자 회장님도 빨리 자지 꺼내주세요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "考えている間に、発情しきったシフォンに押し倒される。"
translation = "생각하는 사이에, 완전히 발정한 시퐁에게 밀쳐 눕혀진다."

[[dialogue]]
speaker = "unk"
original = "そしてそのまま馬乗りになってくると──"
translation = "그리고 그대로 위에 올라타더니──"

[[dialogue]]
speaker = "シフォン"
original = "「あぁん……はぁん……<emoji=heart04>\u3000えへへ、いい感じに勃起してるじゃないですか……<emoji=heart04>\u3000会長さんだって淫乱です……<emoji=heart04>」"
translation = "「아앙…… 하앙……<emoji=heart04> 에헤헤, 기분 좋게 발기해 있잖아요……<emoji=heart04> 회장님도 음란해요……<emoji=heart04>」"

[[dialogue]]
speaker = "シフォン"
original = "「ならしていいですよね、あっ、んっ……<emoji=heart04>\u3000挿れちゃっていいですよね……<emoji=heart04>\u3000ふぁ、あぁ……<emoji=heart04>\u3000気持ち良くしてあげますから……<emoji=heart04>」"
translation = "「그럼 해도 되는 거죠, 앗, 응……<emoji=heart04> 삽입해도 되는 거죠……<emoji=heart04> 후아, 아아……<emoji=heart04> 기분 좋게 해드릴 테니까……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺をその気にさせようとしてるのか、割れ目でペニスを感じたいのか、シフォンががに股になって秘部を押しつけてくる。"
translation = "나를 흥분시키려는 것인지, 갈라진 틈으로 페니스를 느끼고 싶은 것인지, 시퐁이 다리를 벌리고 비부를 문질러온다."

[[dialogue]]
speaker = "unk"
original = "ちょっとキスしただけなのに彼女のショーツはグチョグチョに濡れていて、前後に体を揺らす度に愛液がじわっと染み出してくるほどだ。"
translation = "잠깐 키스했을 뿐인데 그녀의 팬티는 질척질척하게 젖어 있어서, 앞뒤로 몸을 흔들 때마다 애액이 스며 나올 정도다."

[[dialogue]]
speaker = "クロト"
original = "「俺はいいけど、シフォンはいいのか？\u3000途中でパルミエやモナカが帰ってきたら──……」"
translation = "「나는 상관없지만, 시퐁은 괜찮아? 도중에 파르미에나 모나카가 돌아오면──……」"

[[dialogue]]
speaker = "シフォン"
original = "「鍵は閉めてあるので大丈夫ですよ……<emoji=heart04>\u3000それにパルミエやモナカも、はぁはぁ、３時間は戻らないと言ってました……<emoji=heart04>」"
translation = "「문은 잠가뒀으니까 괜찮아요……<emoji=heart04> 게다가 파르미에나 모나카도, 하아 하아, 3시간은 안 돌아올 거라고 했어요……<emoji=heart04>」"

[[dialogue]]
speaker = "シフォン"
original = "「なんだか最近、２人とも外出が多いんです……<emoji=heart04>\u3000私が会長さんとイチャイチャしたいなって思ってると、決まって２人とも急に用事を思い出したりして……<emoji=heart04>」"
translation = "「왠지 요즘, 둘 다 외출이 잦아요……<emoji=heart04> 제가 회장님과 꽁냥거리고 싶다고 생각하면, 꼭 둘 다 갑자기 볼일이 생각나거나 해서……<emoji=heart04>」"

[[dialogue]]
speaker = "シフォン"
original = "「おかげで、はぁはぁ、会長さんとイチャイチャできるんですけど……<emoji=heart04>\u3000えへへ、日々の行いがいいおかげですかね……<emoji=heart04>」"
translation = "「덕분에, 하아 하아, 회장님과 꽁냥거릴 수 있는 거지만요……<emoji=heart04> 에헤헤, 평소 행실이 좋았던 덕분일까요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "なるほど……２人にはとっくに交際がバレていたみたいだ。"
translation = "과연…… 두 사람에게는 진작에 교제 사실을 들킨 모양이다."

[[dialogue]]
speaker = "unk"
original = "気付いていないのは、ピュアなシフォンだけなんだろう。"
translation = "눈치채지 못한 것은, 순진한 시퐁뿐이겠지."

[[dialogue]]
speaker = "シフォン"
original = "「逆に言うと３時間しかありません……<emoji=heart04>\u3000ですから、もう挿れますよ……<emoji=heart04>\u3000挿れますからね……<emoji=heart04>\u3000時間が勿体ないです……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「반대로 말하면 3시간밖에 없어요……<emoji=heart04> 그러니까, 이제 삽입할게요……<emoji=heart04> 넣을게요……<emoji=heart04> 시간이 아까워요……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "一秒も時間を無駄にできないとばかりに、シフォンが返事も待たずにショーツをズラしてくる。"
translation = "일 초도 시간을 낭비할 수 없다는 듯, 시퐁이 대답도 기다리지 않고 팬티를 비킨다."

[[dialogue]]
speaker = "unk"
original = "そしてそのままグツグツに濡れそぼった秘部の中に俺のペニスを沈めていって──"
translation = "그리고 그대로 펄펄 끓어 젖은 비부 속으로 내 페니스를 가라앉히며──"

[[dialogue]]
speaker = "シフォン"
original = "「んはぁん……<emoji=heart04>\u3000あはぁんっ……<emoji=heart04>\u3000あっ、あっ……<emoji=heart04>\u3000んあぁんっ……<emoji=heart04>」"
translation = "「응하앙……<emoji=heart04> 아하앙……<emoji=heart04> 앗, 앗……<emoji=heart04> 응아앙……<emoji=heart04>」"

[[dialogue]]
speaker = "シフォン"
original = "「えへへ、会長さんがまた私の膣内にっ……<emoji=heart04>\u3000この感覚、はぁはぁ、何度味わっても最高に幸せですぅ……<emoji=heart04>」"
translation = "「에헤헤, 회장님이 다시 제 질 안에……<emoji=heart04> 이 감각, 하아 하아, 몇 번을 맛봐도 최고로 행복해요오……<emoji=heart04>」"

[[dialogue]]
speaker = "シフォン"
original = "「腰が、あっ、あっ、とまりません……<emoji=heart04>\u3000ゆっくり動いてるだけでも、ふぁぁっ、あふぅぅ、イっちゃっ……<emoji=heart04>\u3000あっ、あぁぁあんっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「허리가, 앗, 앗, 멈추지 않아요……<emoji=heart04> 천천히 움직이는 것만으로도, 후아아, 아후우, 가버렷……<emoji=heart04> 앗, 아아아앙……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "シフォンが蕩けた顔で腰を上下に動かしながら、ビクンビクンと体を小刻みに震わせる。"
translation = "시퐁이 넋이 나간 얼굴로 허리를 위아래로 움직이며, 움찔움찔 몸을 잘게 떤다."

[[dialogue]]
speaker = "unk"
original = "まだ挿れたばかりなのに、もうイきまくってるみたいだ。だけど、その淫乱な姿が俺を興奮させてくる。"
translation = "이제 막 삽입했을 뿐인데 벌써 몇 번이나 가버리는 모양이다. 하지만 그 음란한 모습이 나를 더욱 흥분시킨다."

[[dialogue]]
speaker = "シフォン"
original = "「気持ち、あぁ、いいっ……<emoji=heart04>\u3000気持ちいいですぅ……<emoji=heart04>\u3000子宮がもう、あっ、あっ、降りてきちゃってっ……<emoji=heart04>」"
translation = "「기분, 아아, 좋아……<emoji=heart04> 기분 좋아요오……<emoji=heart04> 자궁이 벌써, 앗, 앗, 내려와 버려서……<emoji=heart04>」"

[[dialogue]]
speaker = "シフォン"
original = "「はぁあんっ、あぁっ……<emoji=heart04>\u3000先っぽに腰下ろすのたまりませんっ……<emoji=heart04>\u3000くはぁぁ……<emoji=heart04>\u3000またイクっ、あふぅぅっっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하아앙, 아아……<emoji=heart04> 끝부분에 허리를 내리는 거 못 참겠어요……<emoji=heart04> 쿠하아……<emoji=heart04> 또 가, 아후우웃……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "シフォン"
original = "「アツアツの我慢汁も、んはぁ……あはぁ……<emoji=heart04>\u3000ビュービュー噴き出してきてっ……<emoji=heart04>\u3000んぁぁぁ、エッチ気持ちいい……<emoji=heart04>」"
translation = "「뜨끈뜨끈한 쿠퍼액도, 응하아…… 아하아……<emoji=heart04> 퓨우퓨우 뿜어져 나와서……<emoji=heart04> 응아아아, 섹스 기분 좋아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "巧みな腰遣いで否応なしに我慢汁を搾り取られる。"
translation = "교묘한 허리 놀림에 속수무책으로 쿠퍼액을 착취당한다."

[[dialogue]]
speaker = "unk"
original = "その様子はもはや天使というよりサキュバスだ。これも天使と魔族の血が流れているがゆえの本能なんだろうか。"
translation = "그 모습은 이제 천사라기보다 서큐버스다. 이것도 천사와 마족의 피가 흐르는 탓에 나오는 본능인 것일까."

[[dialogue]]
speaker = "unk"
original = "はむはむと先端を咥え込んでくる子宮の感触が気持ち良すぎて、俺もつい腰を突き上げてしまう。"
translation = "함함거리며 귀두를 머금어 오는 자궁의 감촉이 너무나 기분 좋아서, 나도 모르게 허리를 쳐올리고 만다."

[[dialogue]]
speaker = "シフォン"
original = "「ひゃぁんっ<emoji=heart04>\u3000ふふふ、会長さんも腰動いちゃってますよ……<emoji=heart04>\u3000私のおま○こ、はぁはぁ、そんなに気持ちいいですか……<emoji=heart04>」"
translation = "「히야앙<emoji=heart04> 후후후, 회장님도 허리가 움직이고 있네요……<emoji=heart04> 제 보지, 하아 하아, 그렇게 기분 좋나요……<emoji=heart04>」"

[[dialogue]]
speaker = "シフォン"
original = "「なら、あっ、はぁっ……<emoji=heart04>\u3000たくさん突き上げちゃってくださいっ……<emoji=heart04>\u3000もっともっと、あぁあんっ、イチャイチャしましょう……<emoji=heart04>」"
translation = "「그럼, 앗, 하아……<emoji=heart04> 잔뜩 쳐올려 주세요……<emoji=heart04> 더욱더, 아아앙, 꽁냥거려요……<emoji=heart04>」"

[[dialogue]]
speaker = "シフォン"
original = "「会長さんにズンズンされてイクの、大好きなんですっ……<emoji=heart04>\u3000はぁはぁ喘ぎながら突き上げてもらうの、大好きなんですっ……<emoji=heart04>」"
translation = "「회장님한테 쿵쾅쿵쾅 당하면서 가는 거, 정말 좋아해요……<emoji=heart04> 하아 하아 신음하면서 쳐올려지는 거, 정말 좋아해요……<emoji=heart04>」"

[[dialogue]]
speaker = "シフォン"
original = "「会長さんが私で感じてくれてるってわかりますから……<emoji=heart04>\u3000あっ……はぁっ、あぁあんっ……<emoji=heart04>\u3000早くぅ、早く突き上げてください……<emoji=heart04>」"
translation = "「회장님이 저로 느끼고 있다는 걸 알 수 있으니까……<emoji=heart04> 앗…… 하아, 아아앙……<emoji=heart04> 빨리, 빨리 쳐올려 주세요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ぐっと体重を沈めながら、甘えるように黒い羽根をバタバタと振って突き上げを待ち焦がれるシフォン。"
translation = "꾹 체중을 싣고 가라앉히며, 애교 부리듯 검은 날개를 파닥파닥 흔들며 쳐올려지기를 기다리는 시퐁."

[[dialogue]]
speaker = "unk"
original = "そんな彼女のエッチでデレデレな姿に、俺も我慢ができない。"
translation = "그런 그녀의 야하고 데레데레한 모습에 나도 더는 참을 수 없다."

[[dialogue]]
speaker = "unk"
original = "興奮が爆発しそうに高まり、ラストスパートのような勢いで彼女の膣内を突き上げてしまう。"
translation = "흥분이 폭발할 듯이 고조되어, 라스트 스퍼트와 같은 기세로 그녀의 질 안을 쳐올린다."

[[dialogue]]
speaker = "シフォン"
original = "「くはぁんっ、はぁああんっっ<emoji=heart04>\u3000あああああああああっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「쿠하앙, 하아아앙<emoji=heart04> 아아아아아아아아악──<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "シフォン"
original = "「ああぁっ、イクっ、イクイクイクっっ<emoji=heart04>\u3000イっちゃいますっ<emoji=heart04>\u3000気持ちいいっ、ああぁあっ、幸せぇっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아앗, 가, 가가각<emoji=heart04> 가버려요<emoji=heart04> 기분 좋아, 아아아앗, 행복해……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "性欲のままに突き上げた途端、シフォンもそれ以上の激しさで俺のペニスの上で跳ね回る。"
translation = "성욕이 이끄는 대로 쳐올리자마자, 시퐁도 그 이상의 격렬함으로 내 페니스 위에서 튀어 오른다."

[[dialogue]]
speaker = "unk"
original = "常にイっているのか膣内はずっと震えっぱなしで、そのブルブルおま○こにぎゅっと抱き締められる感触が最高に気持ちいい。"
translation = "계속 가버리고 있는 것인지 질 안은 쉬지 않고 떨리고 있었고, 그 부들거리는 보지에 꽉 조여지는 감촉이 최고로 기분 좋다."

[[dialogue]]
speaker = "クロト"
original = "「本当に、シフォンはエッチが好きだな……！」"
translation = "「정말, 시퐁은 섹스를 좋아하는구나……!」"

[[dialogue]]
speaker = "シフォン"
original = "「ですから、あっ、あっ、淫乱みたいに言わないでくださいっ……<emoji=heart04>\u3000私が淫乱になるのは、ふぁ、あっ、あなたにだけですよっ……<emoji=heart04>」"
translation = "「그러니까, 앗, 앗, 음란한 것처럼 말하지 마세요……<emoji=heart04> 제가 음란해지는 건, 후아, 앗, 당신에게만이라구요……<emoji=heart04>」"

[[dialogue]]
speaker = "シフォン"
original = "「好きだから、あっ、はぁっ、繋がりたいんですっ……<emoji=heart04>\u3000好きだから、あっ、あっ、あっ、一緒に気持ち良くなりたいんですっ……<emoji=heart04>」"
translation = "「좋아하니까, 앗, 하아, 이어지고 싶은 거예요……<emoji=heart04> 좋아하니까, 앗, 앗, 앗, 같이 기분 좋아지고 싶은 거예요……<emoji=heart04>」"

[[dialogue]]
speaker = "シフォン"
original = "「あなたのことが大好きだからっ、あふぅっ、あはぁぁっっ……<emoji=heart04>\u3000こんなにも、んぁぁっ、こんなにもっ、発情しちゃうんですってばぁ<emoji=heart04>」"
translation = "「당신을 정말 좋아하니까, 아후우, 아하아아……<emoji=heart04> 이렇게나, 응아아, 이렇게나 발정해 버리는 거라니까요오<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "天使らしい純粋無垢な愛を向けてくれながら、魔族らしく欲望に素直に、シフォンが俺を求め続けてくれる。"
translation = "천사다운 순진무구한 사랑을 보내주면서도 마족답게 욕망에 솔직하게, 시퐁이 나를 계속 원한다."

[[dialogue]]
speaker = "unk"
original = "そのピュアで欲望まみれでデレデレなシフォンに、俺もひたすらに愛と性欲をぶつけにいく。"
translation = "그 순수하고 욕망 가득하며 데레데레한 시퐁에게 나도 오로지 사랑과 성욕을 쏟아붓는다."

[[dialogue]]
speaker = "シフォン"
original = "「はひぃんっ、あひぃんっ、あああああっっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イイっ、イイですっ、気持ちイイっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하히잉, 아히잉, 아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 좋아, 좋아요, 기분 좋아아<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "シフォン"
original = "「やっと会長さんも調子が出てきましたねっ<emoji=heart04>\u3000淫乱おま○こ突き上げてくれてっ<emoji=heart04>\u3000はぁはぁ喘ぎながら腰振ってくれてっ<emoji=heart04>」"
translation = "「드디어 회장님도 발동이 걸렸네요<emoji=heart04> 음란 보지 쳐올려 줘서<emoji=heart04> 하아 하아 신음하며 허리 흔들어 줘서<emoji=heart04>」"

[[dialogue]]
speaker = "シフォン"
original = "「最高にっ、ああああっ、最高に気持ちイイですっっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000この瞬間が人生で一番好きっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「최고로, 아아아아, 최고로 기분 좋아요오<emoji=heart04><emoji=heart04><emoji=heart04> 이 순간이 인생에서 제일 좋아<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "シフォン"
original = "「細かいこと考えずに、あっ、あっ、あっ、２人でイチャイチャしてるこの感じがっ……<emoji=heart04>\u3000ただ２人で一緒に気持ち良くなってるこのひとときがっ……<emoji=heart04>」"
translation = "「세세한 거 생각하지 말고, 앗, 앗, 앗, 둘이서 꽁냥거리는 이 느낌이……<emoji=heart04> 그저 둘이서 같이 기분 좋아지는 이 한때가……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "快感と熱気で頭の中が朦朧としてくる。"
translation = "쾌감과 열기로 머릿속이 몽롱해진다."

[[dialogue]]
speaker = "unk"
original = "シフォンももうそうなのか、口の端からダラダラと涎まで零していた。"
translation = "시퐁도 이미 그런 모양인지 입가에서 침까지 줄줄 흘리고 있었다."

[[dialogue]]
speaker = "シフォン"
original = "「ちまちましたこと考えずにっ、気持ち良くっ、あぁあんっ、もっと一緒に気持ち良くなりましょうっ……<emoji=heart04>」"
translation = "「이것저것 따지지 말고, 기분 좋게, 아아앙, 좀 더 같이 기분 좋아져요……<emoji=heart04>」"

[[dialogue]]
speaker = "シフォン"
original = "「それが愛じゃないですかっ……<emoji=heart04>\u3000私はただ大好きな人と、あふっ、あぁっ、んぁぁぁっ、気持ち良くなって過ごしたいんですっ……<emoji=heart04>」"
translation = "「그게 사랑 아니겠어요? <emoji=heart04> 저는 그저 좋아하는 사람과, 아후, 아아, 응아아아, 기분 좋아지며 지내고 싶은 거예요……<emoji=heart04>」"

[[dialogue]]
speaker = "シフォン"
original = "「好きっ、好きなんですっ<emoji=heart04>\u3000好き好きっ、大好きぃっ<emoji=heart04>\u3000ただあなたのことが、あぁんっ、大好きなんですっ<emoji=heart04>」"
translation = "「좋아해, 좋아해요<emoji=heart04> 좋아 좋아, 너무 좋아<emoji=heart04> 그저 당신이, 아앙, 너무 좋은 거예요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "シフォンが乱暴に腰を振りながら、何度も愛を訴えてくれる。そんな彼女のことが愛しくて仕方なくて俺も遮二無二突き上げ返す。"
translation = "시퐁이 난폭하게 허리를 흔들며 몇 번이고 사랑을 호소한다. 그런 그녀가 사랑스러워 견딜 수 없어 나도 정신없이 쳐올려 보답한다."

[[dialogue]]
speaker = "unk"
original = "そうだ、細かいことなんて考えなくていい。俺もシフォンと一緒に気持ち良くなりたい、一緒にイキたい。"
translation = "그래, 세세한 건 생각할 필요 없다. 나도 시퐁과 함께 기분 좋아지고 싶다, 함께 가고 싶다."

[[dialogue]]
speaker = "シフォン"
original = "「あはぁああんんっっ<emoji=heart04>\u3000おち○ぽ膣内で脈打ってっ……<emoji=heart04>\u3000えへへっ、精子きてます、のぼってきてますっ……<emoji=heart04>」"
translation = "「아하아아아앙<emoji=heart04> 자지가 질 안에서 맥동해서……<emoji=heart04> 에헤헤, 정자 오고 있어요, 올라오고 있어요……<emoji=heart04>」"

[[dialogue]]
speaker = "シフォン"
original = "「出してくださいっ<emoji=heart04>\u3000膣内に思いっきり出してっ<emoji=heart04>」"
translation = "「싸주세요<emoji=heart04> 질 안에 힘껏 싸서……<emoji=heart04>」"

[[dialogue]]
speaker = "シフォン"
original = "「あなたので、子宮いっぱいにされるの、気持ち良くて好きっ<emoji=heart04>\u3000大好きなんですっ<emoji=heart04>\u3000出してくださいっ、注いでくださいっ<emoji=heart04>」"
translation = "「당신 것으로 자궁 가득 채워지는 거, 기분 좋아서 좋아<emoji=heart04> 정말 좋아해요<emoji=heart04> 싸주세요, 쏟아주세요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺の射精欲を感じるや否や、シフォンの腰振りがさらに激しくなる。"
translation = "내 사정 욕구를 느끼자마자 시퐁의 허리 놀림이 더욱 격렬해진다."

[[dialogue]]
speaker = "unk"
original = "おま○こでジュポジュポとディープスロートされて精が吸い上げられて……"
translation = "보지로 쥬웁쥬웁 딥스로트 당하며 정기가 빨려 올라가고……"

[[dialogue]]
speaker = "シフォン"
original = "「あっ、あっ、あっ、あっ<emoji=heart04>\u3000来てますっ、来るぅっ<emoji=heart04>\u3000私もイっちゃっ、あああああっ、イっちゃっ<emoji=heart04>」"
translation = "「앗, 앗, 앗, 앗<emoji=heart04> 오고 있어요, 온다아<emoji=heart04> 저도 가버, 아아아아아, 가버렷<emoji=heart04>」"

[[dialogue]]
speaker = "シフォン"
original = "「出してっ、出してくださいっ<emoji=heart04>\u3000私の淫乱おま○こにっ、淫乱子宮にっ<emoji=heart04>」"
translation = "「싸줘, 싸주세요<emoji=heart04> 제 음란 보지에, 음란 자궁에<emoji=heart04>」"

[[dialogue]]
speaker = "シフォン"
original = "「あなたのエッチなミルクっ──たっぷり注いでくださぁ～いっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「당신의 야한 밀크── 듬뿍 쏟아주세요오오──<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "シフォン"
original = "「あ゛ふぁああああああああああっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イクイクイックぅぅぅぅぅぅっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아으아아아아아아아아아악──<emoji=heart04><emoji=heart04><emoji=heart04> 가가가가가가가가악──<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "射精の瞬間、シフォンが思いっきり体を落としてくる。"
translation = "사정의 순간, 시퐁이 온 힘을 다해 몸을 내리누른다."

[[dialogue]]
speaker = "unk"
original = "子宮口がずっぽりと亀頭を咥え込み、その快感により大量の精子が噴き出していく。"
translation = "자궁구가 즈보옷하고 귀두를 머금고, 그 쾌감에 의해 대량의 정자가 뿜어져 나간다."

[[dialogue]]
speaker = "シフォン"
original = "「くはぁああああっっ、あはぁぁああああっっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000気持ちイイっっ<emoji=heart04>\u3000イっちゃ、イクぅぅ<emoji=heart04>」"
translation = "「쿠하아아아아앗, 아하아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 기분 좋아아<emoji=heart04> 가버렷, 가아아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ギュウギュウに締め付けてくるシフォンのドロドロおま○こが気持ち良すぎて、蛇口が壊れたように精を噴き出し続けてしまう。"
translation = "꽉꽉 조여오는 시퐁의 질척한 보지가 너무 기분 좋아서, 수도꼭지가 고장 난 것처럼 정을 계속 뿜어내고 만다."

[[dialogue]]
speaker = "シフォン"
original = "「んはぁああっ、あああっっ<emoji=heart04>\u3000まだっ、まだ出してくださいっ<emoji=heart04>\u3000もっとビュービュー感じたいっっ<emoji=heart04>」"
translation = "「응하아아앗, 아아앗<emoji=heart04> 아직, 아직 더 싸주세요<emoji=heart04> 좀 더 퓨우퓨우 느끼고 싶어어<emoji=heart04>」"

[[dialogue]]
speaker = "シフォン"
original = "「ふぁああっ、ホント気持ちイイっ<emoji=heart04>\u3000んはぁぁぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はふぁーっ、はぁーっ、あ゛っーっ<emoji=heart04>\u3000あ゛はぁっーっ<emoji=heart04>」"
translation = "「후아아앗, 진짜 기분 좋아<emoji=heart04> 응하아아아앗<emoji=heart04> 앗<emoji=heart04> 하아앗, 하아, 아앗──<emoji=heart04> 아하앗──<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "２人揃って息を詰まらせながら、天使でも魔族でも人間でも変わらない最も原始的な欲求に２人一緒に溺れていく。"
translation = "둘이 나란히 숨을 헐떡이며, 천사든 마족이든 인간이든 변하지 않는 가장 원시적인 욕구에 함께 빠져든다."

[[dialogue]]
speaker = "unk"
original = "そして、どのくらい２人で絶頂し続けていただろうか。"
translation = "그리고 얼마나 둘이서 절정하고 있었을까."

[[dialogue]]
speaker = "シフォン"
original = "「ん゛あぁぁっっー……<emoji=heart04>\u3000あ゛はぁっー……<emoji=heart04>\u3000はぁーっ、はぁーっ、んはぁぁっっー……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「으아아아앗──……<emoji=heart04> 아하앗──……<emoji=heart04> 하아, 하아, 응하아아앗──……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "シフォン"
original = "「しゅごくイっちゃいましたぁ……<emoji=heart04>\u3000腰抜けちゃったくらいれふっ……<emoji=heart04>」"
translation = "「처어엄청 가버렸어용……<emoji=heart04> 허리가 빠져버릴 것만 가태효……<emoji=heart04>」"

[[dialogue]]
speaker = "シフォン"
original = "「えへへぇ……<emoji=heart04>\u3000れもさいこーに気持ち良かったれふ……<emoji=heart04>\u3000まだ、んはぁぁ、おま○こビクビクしちゃっへへ……<emoji=heart04>」"
translation = "「에헤헤에……<emoji=heart04> 그래도 최코로 기분 조아써요……<emoji=heart04> 아직, 응하아, 보지가 움찔움찔해버려성……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "よっぽど気持ち良かったのか、呂律も回らなくなった様子でシフォンがぜぇぜぇと荒い吐息を漏らす。"
translation = "어지간히 기분이 좋았는지 혀도 꼬인 모습으로 시퐁이 거친 숨을 내뱉는다."

[[dialogue]]
speaker = "シフォン"
original = "「えへへ、やっぱりセックスってさいこーですね……<emoji=heart04>\u3000気持ちいい上に、はぁはぁ、こんなにイチャイチャできて……<emoji=heart04>」"
translation = "「에헤헤, 역시 섹스는 최코네용……<emoji=heart04> 기분 좋은 데다, 하아 하아, 이렇게 꽁냥거릴 수 있고……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「そうだな、俺もものすごく気持ち良かった……」"
translation = "「그러네, 나도 엄청나게 기분 좋았어……」"

[[dialogue]]
speaker = "シフォン"
original = "「ふふ、なら良かったです……<emoji=heart04>\u3000じゃあ今度は、はぁはぁ、私が下になりますね……<emoji=heart04>」"
translation = "「후후, 그럼 다행이에요……<emoji=heart04> 그럼 이번엔, 하아 하아, 제가 아래로 갈게요……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「えっ？\u3000ま、まだするのか？」"
translation = "「엣? 또, 또 하는 거야?」"

[[dialogue]]
speaker = "シフォン"
original = "「当たり前ですよぉ……<emoji=heart04>\u3000まだあと２時間はパルミエもモナカも帰ってきませんし……<emoji=heart04>」"
translation = "「당연하죠오……<emoji=heart04> 아직 2시간은 파르미에도 모나카도 안 돌아오니까요……<emoji=heart04>」"

[[dialogue]]
speaker = "シフォン"
original = "「イチャイチャできるだけイチャイチャしましょう？\u3000疲れたって言うなら、キスしたり、フェラしたりしてもいいですから……<emoji=heart04>」"
translation = "「꽁냥거릴 수 있는 만큼 꽁냥거려요. 피곤하다고 하시면 키스하거나 페라하거나 해도 되니까요……<emoji=heart04>」"

[[dialogue]]
speaker = "シフォン"
original = "「あ、そうだ……<emoji=heart04>\u3000おっぱいも揉んで欲しいです……<emoji=heart04>\u3000乳首ももう、はぁはぁ、ビンビンになってしまっていて……<emoji=heart04>」"
translation = "「아, 맞다……<emoji=heart04> 가슴도 주물러 줬으면 좋겠어요……<emoji=heart04> 젖꼭지도 벌써, 하아 하아, 빳빳해져 버려서……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俄然スイッチが入ったようにシフォンが発情顔で見つめる。"
translation = "완전히 스위치가 켜진 듯 시퐁이 발정한 얼굴로 바라본다."

[[dialogue]]
speaker = "unk"
original = "だけど、そうして底なしの性欲で求めてくれることが嬉しい。口にされるよりもよっぽど彼女の好意が伝わってくる。"
translation = "하지만 그렇게 끝없는 성욕으로 원해주는 것이 기쁘다. 말로 듣는 것보다 훨씬 그녀의 호의가 전해져 온다."

[[dialogue]]
speaker = "シフォン"
original = "「早く……はぁはぁ……早く私を押し倒してください……<emoji=heart04>」"
translation = "「빨리…… 하아 하아…… 빨리 저를 밀쳐 눕혀주세요……<emoji=heart04>」"

[[dialogue]]
