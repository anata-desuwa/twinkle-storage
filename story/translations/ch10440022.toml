[[dialogue]]
speaker = "unk"
original = "第２話,プリムラの優しいところ,P"
translation = "제2화, 프리무라의 상냥한 점, P"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「今日から１週間、流星学園中の草むしりじゃと～っ！？\u3000なんで我がそんなことをせねばならんのじゃ！」"
translation = "「오늘부터 일주일 동안, 유성 학원 안의 풀 뽑기라고～앗!? 어째서 짐이 그런 일을 해야 한단 말이냐!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「当然でしょ！\u3000またお兄さんを支配下に置こうとしたんだから。しっかり従ってもらうからね！」"
translation = "「당연하지! 또 오빠를 지배하에 두려고 했으니까. 확실히 따라줘야겠어!」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「ぐぬぬぬ……ちょっと契約の儀式を試しただけなのじゃ……！\u3000頭の固いやつめ！」"
translation = "「구누누누…… 잠깐 계약의 의식을 시험해 본 것뿐이니라……! 머리가 딱딱한 녀석 같으니!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「試すことがそもそもいけないの！\u3000いい、もしサボったりしたらお小遣いもカットだから！\u3000宝石磨きのアルバイトも禁止しちゃうよ！？」"
translation = "「시험하는 것 자체가 안 되는 거야! 알았어? 만약 땡땡이치거나 하면 용돈도 깎을 거니까! 보석 닦기 아르바이트도 금지해 버릴 거야!?」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「何ぃ！？\u3000サチっ、貴様の血は何色じゃ……！？\u3000ヒトの心がないのか！」"
translation = "「뭐랏!? 사치, 네놈의 피는 무슨 색이냐……!? 사람의 마음이 없는 것이냐!」"

[[dialogue]]
speaker = "unk"
original = "俺も手伝うよ、プリムラ"
translation = "나도 도와줄게, 프리무라"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「おおっ！\u3000流石は眷族なのじゃ……！」"
translation = "「오옷! 과연 권속이니라……!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ダメです、お兄さん。これは罰なのでプリムラ１人にさせてください」"
translation = "「안 돼요, 오빠. 이건 벌이니까 프리뮬러 혼자 하게 두세요.」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「手伝ってもらうくらいいいじゃろ！？」"
translation = "「도와주는 것 정도는 괜찮지 않느냐!?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「お兄さんはプリムラに甘いところがありますから。ちょっとお掃除を頑張ったら、すぐ頭を撫でたりチョコをあげたりするでしょう？」"
translation = "「오빠는 프리뮬러에게 무른 구석이 있으니까요. 조금 청소를 열심히 했다 싶으면, 금방 머리를 쓰다듬거나 초코를 주곤 하잖아요?」"

[[dialogue]]
speaker = "unk"
original = "……身に覚えがありすぎる"
translation = "……너무 찔리는 구석이 많다."

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「うぅ～……サチの石頭めっ」"
translation = "「으으～…… 사치 이 돌머리 녀석.」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「何か言った？」"
translation = "「방금 뭐라고 했어?」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「何も言ってないのじゃ！\u3000草むしり、やればいいのであろう！\u3000サチのアホ～っ……！！」"
translation = "「아무 말도 안 했느니라! 풀 뽑기, 하면 될 것 아니냐! 사치 바보～옷……!!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「はあ……まったく子供なんだから。そういうわけなのでお兄さん、今日から１週間、プリムラには罰掃除をさせます」"
translation = "「하아…… 정말 어린애라니까. 그런 이유로 오빠, 오늘부터 일주일 동안 프리뮬러에게는 벌 청소를 시키겠습니다.」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「なのであの、学園の方に『プリムラに反抗の意思がある』みたいな報告はしないでいただけると……」"
translation = "「그러니까 저기, 학원 쪽에 『프리뮬러에게 반항 의사가 있다』 같은 보고는 하지 말아 주셨으면 해서……」"

[[dialogue]]
speaker = "unk"
original = "大丈夫、内緒にするよ"
translation = "괜찮아, 비밀로 할게."

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「はい、ありがとうございます！」"
translation = "「네, 감사합니다!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「はあ……たぶんあの子のことだから、契約の儀式だって、本当に深く考えずにやってみただけなんだろうけど」"
translation = "「하아…… 아마 그 아이 성격상, 계약의 의식이라는 것도 정말 깊게 생각 안 하고 그냥 해본 거겠지만요.」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「私やお兄さんみたいに、プリムラの性格を分かっている人ばかりではないので……」"
translation = "「저나 오빠처럼 프리뮬러의 성격을 잘 아는 사람만 있는 게 아니니까……」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「プリムラには優しい心があると普段からアピールしておかないと、いざという時に困った事になりそうですし」"
translation = "「프리뮬러에게 상냥한 마음이 있다는 걸 평소에 어필해 두지 않으면, 만약의 상황에 곤란해질 것 같기도 하고요.」"

[[dialogue]]
speaker = "unk"
original = "サチは優しいね"
translation = "사치는 상냥하네."

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「お兄さんには負けますよ。では、これから１週間、心を鬼にしてくださいね！」"
translation = "「오빠한테는 못 당하겠네요. 그럼, 이제부터 일주일 동안 마음을 독하게 먹어 주세요!」"

[[dialogue]]
speaker = "unk"
original = "それから数日後──"
translation = "그리고 며칠 후──"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「むしり、むしり……むしり、むしり……」"
translation = "「뽑고, 뽑고…… 뽑고, 뽑고……」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「くそ～……死ぬほどつまらんのじゃ……本当なら今ごろ眷族とチョコパフェを食ったり、テレビゲームをしておれたじゃろうに……」"
translation = "「젠장～…… 죽을 만큼 따분하느니라…… 원래라면 지금쯤 권속과 초코 파페를 먹거나, 비디오 게임을 하고 있었을 텐데……」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「草むしり、手を抜いたらサチにバレるし……あやつめ、毎日むしった草の量まで確認しおって。小姑の素質があるのじゃ……」"
translation = "「풀 뽑기, 대충 하면 사치에게 들키고…… 그 녀석, 매일 뽑은 풀의 양까지 확인하다니. 시누이의 소질이 있느니라……」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「──む？\u3000何じゃ、あの植え込みのところで何かが動いたような……」"
translation = "「──음? 뭐냐, 저 수풀 쪽에서 뭔가가 움직인 듯한……」"

[[dialogue]]
speaker = "unk"
original = "それから、さらに数日後──"
translation = "그리고 다시 며칠 후──"

[[dialogue]]
speaker = "unk"
original = "プリムラがサボっているかも、だって？"
translation = "프리뮬러가 땡땡이치고 있을지도 모른다고?"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「そうなんです。ここ数日、むしっている草の量が少なくって……それに私が言いつけた範囲からいなくなっちゃうこともあるんです」"
translation = "「맞아요. 요 며칠, 뽑는 풀의 양이 적어서…… 게다가 제가 시킨 범위에서 사라져 버릴 때도 있어요.」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「でも作業自体を投げ出しているわけじゃないので、厳しく叱ったら逆効果になりそうで……お兄さんも来ていただけませんか？」"
translation = "「하지만 작업 자체를 내팽개친 건 아니라서, 엄하게 꾸짖으면 역효과가 날 것 같고…… 오빠도 같이 가 주시지 않겠어요?」"

[[dialogue]]
speaker = "unk"
original = "飴と鞭ってやつだね"
translation = "당근과 채찍이라는 거네."

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「はい、私だけだと叱るばっかりになっちゃいそうなので。お願いします！」"
translation = "「네, 저 혼자면 꾸짖기만 할 것 같아서요. 부탁드려요!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「今日はこのあたりを掃除するように言ってあったんですけど、やっぱりいませんね……」"
translation = "「오늘은 이 근처를 청소하라고 말해 뒀는데, 역시 없네요……」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「えっ、あっちの方に一瞬、人影が……？\u3000はい、行ってみましょう！」"
translation = "「엣, 저쪽 방향에 잠깐 사람 그림자가……? 네, 가 봐요!」"

[[dialogue]]
speaker = "unk"
original = "そうして進むと、植え込みの陰に隠れるようにして、プリムラが座っているところを見つけた。"
translation = "그렇게 나아가자, 수풀 뒤에 숨듯이 앉아 있는 프리뮬러를 발견했다."

[[dialogue]]
speaker = "unk"
original = "彼女があやしているのは──２匹の野良猫だった。"
translation = "그녀가 어르고 있는 것은── 두 마리의 길고양이였다."

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「フハハハ！\u3000何じゃおぬしら、腹を出して寝そべりおって～♪\u3000そろって降参のポーズというわけか？」"
translation = "「후하하하! 뭐냐 네놈들, 배를 내밀고 드러눕다니～♪ 다 같이 항복의 포즈라는 것이냐?」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「ククク、終末兵器たる我がよほど恐ろしいと見える。よかろう、今日もたっぷり撫でまわしてやろうではないか！」"
translation = "「크크크, 종말병기인 짐이 어지간히 두려운 모양이구나. 좋다, 오늘도 듬뿍 쓰다듬어 주지 않겠느냐!」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「ほれほれ、なでりなでり。心地よいじゃろう、賢者の石で作った我の肌は、ぷにぷにもちもち触感なのじゃ♪」"
translation = "「호레호레, 쓰담쓰담. 기분 좋지 않느냐, 현자의 돌로 만든 짐의 피부는 말랑말랑 쫀득쫀득한 촉감이느니라♪」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「おぉ、おぉ♪\u3000ニャーニャーわめきおって。腹が減ったのか～？」"
translation = "「오오, 오오♪ 야옹야옹 울어대고. 배가 고픈 것이냐～?」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「今日は特別にお高いペットフードをくれてやろう！\u3000我のお小遣いから買うたのじゃ、心して食うのじゃぞ！」"
translation = "「오늘은 특별히 비싼 펫 푸드를 주마! 짐의 용돈으로 산 것이니, 감사히 먹도록 하거라!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「……お兄さん、これは」"
translation = "「……오빠, 이건.」"

[[dialogue]]
speaker = "unk"
original = "問題はなさそうだね"
translation = "문제는 없어 보이네."

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「はい。小さな命を愛でる気持ちがある。プリムラの危険性のなさを伝えるのに、これ以上ないシーンかと思います」"
translation = "「네. 작은 생명을 아끼는 마음이 있어요. 프리뮬러의 위험성이 없다는 걸 전달하기에 이보다 더 좋은 장면은 없을 것 같아요.」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「──よし！\u3000我の恐ろしさで心を縛り、食事を与えて体を縛ってやったぞ。ここからが本番なのじゃ♪」"
translation = "「──좋아! 짐의 두려움으로 마음을 묶고, 먹이를 주어 몸을 묶었노라. 이제부터가 본방이니라♪」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「のう、おぬしたち。我の眷族にならんか～？\u3000もうすでに１号は決まっておるので、おぬしたちは眷族２号と３号じゃ！\u3000どうじゃ～？」"
translation = "「어이, 네놈들. 짐의 권속이 되지 않겠느냐～? 이미 1호는 정해져 있으니, 네놈들은 권속 2호와 3호니라! 어떠냐～?」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「我が世界を征服した暁には、相応の地位を約束してやるぞ？\u3000フハハハハ！」"
translation = "「짐이 세계를 정복한 새벽에는 그에 걸맞은 지위를 약속해 주마! 후하하하하!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「…………あの言動さえなければ、もう何も言うことはないんですけれどね」"
translation = "「…………저 언행만 없으면 더 이상 할 말이 없을 텐데 말이죠.」"

[[dialogue]]
speaker = "unk"
original = "そうしてプリムラの罰掃除期間は終わり──直後に俺は、餌付けをしていた野良猫たちを紹介されたのだった。"
translation = "그렇게 프리뮬러의 벌 청소 기간은 끝났고── 직후에 나는 먹이를 주던 길고양이들을 소개받았다."

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「ほれ眷族、おぬしの仲間じゃ！\u3000後輩じゃからな、仲良くせいよ！」"
translation = "「보거라 권속, 네놈의 동료니라! 후배니까 말이다, 사이좋게 지내거라!」"

[[dialogue]]
speaker = "unk"
original = "野良猫たちをだっこして微笑むプリムラを見て、俺は彼女に惹かれていくのを感じるのだった──"
translation = "길고양이들을 안고 미소 짓는 프리뮬러를 보며, 나는 그녀에게 끌리는 것을 느꼈다──"

