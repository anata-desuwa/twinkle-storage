[[dialogue]]
speaker = "unk"
original = "恋人関係になってから、俺とレミカはお互いの様々なことを知った。食べ物や娯楽の好みは言うに及ばず、エッチの嗜好や憧れのプレイなんかも。"
translation = "연인 관계가 된 후로, 나와 레미카는 서로의 다양한 것들을 알게 되었다. 음식이나 오락의 취향은 말할 것도 없고, 야한 짓의 기호나 동경하는 플레이 같은 것도."

[[dialogue]]
speaker = "unk"
original = "意外な一面は誰にでもあるもので、レミカの場合は『Ｍ気質』。"
translation = "의외의 일면은 누구에게나 있는 법이라, 레미카의 경우는 『M 기질』."

[[dialogue]]
speaker = "unk"
original = "ちょっぴり虐められるようなシチュを彼女は大変気に入っていて、ライブの終わりなんかによくご褒美でねだられる。"
translation = "조금 괴롭힘당하는 듯한 상황을 그녀는 무척 마음에 들어 해서, 라이브가 끝난 뒤 같은 때에 자주 보상으로 조르곤 한다."

[[dialogue]]
speaker = "unk"
original = "こんな事実、ファンが知ったら卒倒するかもしれない。けれど可愛い彼女が求めるのならば、それに応えるのが彼氏の役目だ。"
translation = "이런 사실을 팬이 알면 졸도할지도 모른다. 하지만 귀여운 그녀가 원한다면, 그것에 부응하는 것이 남자친구의 역할이다."

[[dialogue]]
speaker = "unk"
original = "今夜はレミカのおねだりの日。俺たちは、新星学園寮『ラルーナ』のレミカの個室で、誰にも見せられない秘密の調教エッチに耽っていた──"
translation = "오늘 밤은 레미카가 조르는 날. 우리들은, 신성 학원 기숙사 『라루나』에 있는 레미카의 개인실에서, 누구에게도 보여줄 수 없는 비밀의 조교 섹스에 빠져 있었다──"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「はぁあっ……はぁーっ<emoji=heart04>\u3000ふっ<emoji=heart04>\u3000ふぅうっ<emoji=heart04>\u3000ふぅうーっ……はぁああーっ……<emoji=heart04>\u3000はぁぁあ～っ……<emoji=heart04>」"
translation = "「하아앗…… 하아─앗<emoji=heart04> 훗<emoji=heart04> 후우웃<emoji=heart04> 후우우─앗…… 하아아아─앗……<emoji=heart04> 하아아아~앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「プ、プロデューサー……<emoji=heart04>\u3000は、早くっ……エッチなこと、してくだ、さぁいっ……<emoji=heart04>」"
translation = "「프, 프로듀서님……<emoji=heart04> 파, 빨리…… 야한 짓, 해, 주세요옷……<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「言われたとおり、ダンスレッスンもっ……ライブもっ……ちゃんと頑張りました、からぁっ……ご褒美っ……ご褒美欲しいですっ……<emoji=heart04>」"
translation = "「말씀하신 대로, 댄스 레슨도…… 라이브도…… 제대로 열심히 했으, 니까아…… 보상…… 보상 받고 싶어요옷……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "お尻をフリフリしながら、いやらしい香りを振りまいてくるものだから俺もペニスがうずく。"
translation = "엉덩이를 살랑살랑 흔들며, 야릇한 향기를 풍겨 대니 나도 페니스가 욱신거린다."

[[dialogue]]
speaker = "unk"
original = "けれどこれは『大人気アイドルが、実は悪いプロデューサーの性奴隷になっている』というシチュエーションプレイであるため……"
translation = "하지만 이것은 『대인기 아이돌이, 사실은 나쁜 프로듀서의 성노예가 되어 있다』는 상황극이기 때문에……"

[[dialogue]]
speaker = "unk"
original = "はいそうですか、と挿入するわけにはいかない。恋人である俺は、己の役柄に徹するのがお仕事だから。"
translation = "네 알겠습니다, 하고 삽입할 수는 없다. 연인인 나는, 자신의 역할에 몰두하는 것이 일이니까."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ご褒美ならあげてるだろ？」"
translation = "「포상이라면 주고 있잖아?」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「そ、そんなぁっ……<emoji=heart04>\u3000こんな、偽物のおち○ちんっ……しかも、電源も、入れてくれないんじゃっ……イ、イケない<emoji=heart04>\u3000イケないですぅっ<emoji=heart04>」"
translation = "「그, 그런으……<emoji=heart04> 이런, 가짜 자지…… 게다가, 전원도, 켜주지 않으면…… 가, 가버릴 수 없<emoji=heart04> 가버릴 수 없어요오<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「も、もう限界……限界なんですっ<emoji=heart04>\u3000何でも言うことを聞きますっ<emoji=heart04>\u3000いい子にしますからぁ<emoji=heart04>\u3000だからもう、焦らさないでくださいっ<emoji=heart04>\u3000……はぁああ、ふぅう、ふうぅぅっ<emoji=heart04>」"
translation = "「이, 이제 한계…… 한계예요<emoji=heart04> 뭐든 시키는 대로 할게요<emoji=heart04> 착한 아이가 될 테니까요<emoji=heart04> 그러니까 이제, 애태우지 말아 주세요<emoji=heart04> ……하아아아, 후우우, 후우우우<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「ぁ、ぁ──ぁっ<emoji=heart04>\u3000乳首っ<emoji=heart04>\u3000そんな、優しく撫でるの、ダメぇっ……はあぁ、あ、あああ、あぁあっ……<emoji=heart04>」"
translation = "「아, 아──앗<emoji=heart04> 유두<emoji=heart04> 그렇게, 부드럽게 쓰다듬는 거, 안 돼애…… 하아아, 아, 아아아, 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「イケそうで、ずうっと、イケてないのっ……辛い、辛いですぅっ……<emoji=heart04>」"
translation = "「갈 것 같은데, 계속, 못 가고 있어…… 괴로워, 괴로워요오<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「はーっ……ふぅーっ……はーっ……ふぅうーっ<emoji=heart04>\u3000カ、カメラに向かって、自己紹介、ですかっ……？<emoji=heart04>\u3000は、はい、しますっ……<emoji=heart04>」"
translation = "「하아…… 후우…… 하아…… 후우우<emoji=heart04> 카, 카메라를 향해서, 자기소개, 말인가요……?<emoji=heart04> 네, 네, 할게요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「私は、あ、愛戸レミカはっ……芸能事務所、ポラリスプロダクションに所属するっ、アイドルでぇっ……<emoji=heart04>」"
translation = "「저는, 아, 아이도 레미카는…… 연예 사무소, 폴라리스 프로덕션에 소속된, 아이돌이고오……<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「毎日、歌や、ダンスレッスン頑張って……アイドルの頂点を目指してるっ、女の子、ですっ……<emoji=heart04>」"
translation = "「매일, 노래나, 댄스 레슨 열심히 해서…… 아이돌의 정점을 목표로 하는, 소녀, 입니다……<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「で、でもそれは表の顔でっ……本当の私は<emoji=heart04>\u3000プロデューサー様のおち○ちんが大好きなっ、せ、性奴隷<emoji=heart04>\u3000アイドルなんですっ<emoji=heart04>」"
translation = "「하, 하지만 그건 겉모습이고…… 진짜 저는<emoji=heart04> 프로듀서 님의 자지를 정말 좋아하는, 서, 성노예<emoji=heart04> 아이돌이에요<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「プロデューサー様は、デビューした時から私を支えてくれて……とっても優秀な人、なんですけどっ……<emoji=heart04>」"
translation = "「프로듀서 님은, 데뷔했을 때부터 저를 지지해 주시고…… 정말 우수한 분, 이지만요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「自分の担当アイドルを、た、食べちゃうっ……悪い大人でっ……私も、最初は嫌がってました、でも、無理やり調教されてっ……<emoji=heart04>」"
translation = "「자신의 담당 아이돌을, 자, 잡아먹어 버리는…… 나쁜 어른이라…… 저도, 처음에는 싫어했어요, 하지만, 억지로 조교당해서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「へえ、俺のせいなの？\u3000……悪いのは俺なんだ？」"
translation = "「헤에, 내 탓이라고? ……나쁜 건 나라는 거지?」"

[[dialogue]]
speaker = "unk"
original = "わざと冷たい声を出してやると、レミカは全身を悦びでびくびくっと震わせる。"
translation = "일부러 차가운 목소리를 내어 주자, 레미카는 전신을 희열로 파르르 떨며 움찔거린다."

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「ぁ、ぁああっ……！？<emoji=heart04>\u3000ち、違いますっ<emoji=heart04>\u3000私っ、私が悪いんですっ……おち○ちん入れられて、すぐ負けちゃった私が悪いんですっ<emoji=heart04>」"
translation = "「아, 아아앗……!?<emoji=heart04> 아, 아니에요<emoji=heart04> 저, 제가 잘못한 거예요…… 자지 넣어지고 바로 져버린 제가 잘못한 거예요<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「おち○ちん、毎日おしゃぶりさせられて<emoji=heart04>\u3000おま○こもお尻も、いっぱいほじくられて<emoji=heart04>\u3000無理やりだったのなんて最初だけ、なんですっ<emoji=heart04>」"
translation = "「자지, 매일 빨게 되고<emoji=heart04> 보지도 엉덩이도 잔뜩 헤집어져서<emoji=heart04> 억지로였던 건 처음에만 그랬던 거예요<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「エッチな私はすぐに本性が出ちゃいましたっ<emoji=heart04>\u3000はぁぁん<emoji=heart04>\u3000プロデューサー様にされるエッチなこと、待ちわびちゃうメス犬になっちゃったんです……<emoji=heart04>」"
translation = "「야한 저는 금방 본성이 나와버렸어요<emoji=heart04> 하아앙<emoji=heart04> 프로듀서님이 해주시는 야한 짓을 기다리게 되는 암캐가 되어버렸어요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「今はもう、ダンスレッスン中でも、プロデューサー様を見ただけで……あぁぁん<emoji=heart04>\u3000おま○こ、じゅわって濡れちゃうようになってぇ<emoji=heart04>」"
translation = "「지금은 이제, 댄스 레슨 중에도 프로듀서님을 보는 것만으로…… 아아앙<emoji=heart04> 보지, 쥬와아 하고 젖어버리게 돼서어<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「今日も、ライブの後にエッチするって言われて……はぁぁぁっ、楽しみに、してましたぁ<emoji=heart04>\u3000どんな風にいじめて、くれるんだろうって<emoji=heart04>\u3000はぁぁんっ<emoji=heart04>」"
translation = "「오늘도 라이브 후에 섹스한다고 해서…… 하아아앗, 기대하고 있었어요오<emoji=heart04> 어떤 식으로 괴롭혀 주실까 하고<emoji=heart04> 하아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「お願いしますっ……ください、本物のおち○ちんくださいっ<emoji=heart04>\u3000スケベな性奴隷アイドルのレミカに、ご主人様おち○ちん恵んでくださいっ<emoji=heart04>」"
translation = "「부탁드려요…… 주세요, 진짜 자지 주세요<emoji=heart04> 야한 성노예 아이돌인 레미카에게, 주인님 자지 은혜를 베풀어 주세요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "レミカが喋るたび、咥えたバイブと女性器の境目から愛液がこぼれ出てくる。かなり焦らしたし、もういい頃合いだろう。"
translation = "레미카가 말할 때마다, 물고 있는 바이브와 성기 사이에서 애액이 흘러나온다. 꽤 감질나게 했고, 이제 딱 좋은 타이밍일 것이다."

[[dialogue]]
speaker = "unk"
original = "俺はバイブを引き抜き、挿入ついでにレミカの目隠しをはぎ取った──"
translation = "나는 바이브를 뽑아내고, 삽입함과 동시에 레미카의 눈가리개를 벗겨냈다──"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「んんっ<emoji=heart04>\u3000あ、ああっ、ああぁあ～～～～っ……！！<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응읏<emoji=heart04> 아, 아앗, 아아아～～～～앗……!!<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「き、来たぁぁあっ……<emoji=heart04>\u3000ご主人様のおち○ちんっ、ずぷぅって奥まで、来たあぁあっ……<emoji=heart04>\u3000あぁんっ<emoji=heart04>」"
translation = "「와, 왔어어엇……<emoji=heart04> 주인님의 자지, 즈뿝하고 안쪽까지, 왔어어엇……<emoji=heart04> 아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「は──はいっ<emoji=heart04>\u3000気持ちいいですっ……<emoji=heart04>\u3000おもちゃのおち○ちんと大違いっ……ご主人様のおち○ちんっ……んんぅ<emoji=heart04>」"
translation = "「네── 넷<emoji=heart04> 기분 좋아요……<emoji=heart04> 장난감 자지랑은 완전 달라요…… 주인님의 자지…… 응으으<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ほら、淫乱な性奴隷のおねだりに答えて、入れてやったぞ。これで満足か？」"
translation = "「자, 음란한 성노예의 부탁에 답해서, 넣어 줬다. 이걸로 만족하냐?」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「あっ、あぁぁっ<emoji=heart04>\u3000動いてっ……動いて、くださぃぃ<emoji=heart04>\u3000ふぅうっ<emoji=heart04>\u3000ふうぅうっ<emoji=heart04>\u3000お願いしますっ、おち○ちん動かしてくださいっ<emoji=heart04>\u3000お願いしますぅうっ<emoji=heart04>」"
translation = "「앗, 아아앗<emoji=heart04> 움직여 줘요…… 움직여, 주세요오<emoji=heart04> 후우우읏<emoji=heart04> 후우우읏<emoji=heart04> 부탁드려요, 자지 움직여 주세요<emoji=heart04> 부탁드려요오오옷<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「レミカのドスケベアイドルおま○こ、いっぱいほじほじっ<emoji=heart04>\u3000いじめてください<emoji=heart04>\u3000どうか、どうかお願いしますっ<emoji=heart04>」"
translation = "「레미카의 초변태 아이돌 보지, 잔뜩 헤집어 줘요<emoji=heart04> 괴롭혀 주세요<emoji=heart04> 제발, 제발 부탁드려요<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「ご主人様専用のメス穴を、乱暴に犯して、くださいぃいっ──！<emoji=heart04>」"
translation = "「주인님 전용 암컷 구멍을, 난폭하게 범해, 주세요오오──!<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「んんんぅうっ<emoji=heart04>\u3000あっ、あっあっ、ぁぁああっ<emoji=heart04>\u3000これぇっ<emoji=heart04>\u3000これですぅぅぅ<emoji=heart04>\u3000あっ、あっ<emoji=heart04>\u3000ふぅわぁぁぁっ<emoji=heart04>\u3000んふううぅ、んぁ、ぁああああっ……！<emoji=heart04>」"
translation = "「응응으으읏<emoji=heart04> 앗, 앗앗, 아아아앗<emoji=heart04> 이거어<emoji=heart04> 이거예요오오오<emoji=heart04> 앗, 앗<emoji=heart04> 후와아아앗<emoji=heart04> 응후우우, 응아, 아아아아앗……!<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「おち○ちん気持ちいい<emoji=heart04>\u3000おち○ちん気持ちいいですぅ<emoji=heart04>\u3000あぁぁんっ<emoji=heart04>\u3000んんぁ、ううぅっ<emoji=heart04>\u3000ふぅうあああっ<emoji=heart04>\u3000あっあっ、ぁあぁあ～っ！<emoji=heart04>」"
translation = "「자지 기분 좋아<emoji=heart04> 자지 기분 좋아요오<emoji=heart04> 아아앙<emoji=heart04> 응응아, 우우우읏<emoji=heart04> 후우우아아앗<emoji=heart04> 앗앗, 아아아아~앗!<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「欲しかったっ、ずっと欲しかったんですぅっ<emoji=heart04>\u3000このおち○ちん<emoji=heart04>\u3000ぶっといおち○ちんで、おま○こ、いっぱい擦って、ぇええっ<emoji=heart04>」"
translation = "「원했어, 계속 원했어요오옷<emoji=heart04> 이 자지<emoji=heart04> 굵직한 자지로, 보지, 잔뜩 문질러 줘요오오옷<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は手近にあったＤＩＳＣを手に取り、レミカの痴態を撮影しながら腰を振る。"
translation = "나는 근처에 있던 DISC를 집어 들어, 레미카의 치태를 촬영하며 허리를 흔든다."

[[dialogue]]
speaker = "unk"
original = "カメラレンズを向けるだけで、レミカの反応は良くなっていき──"
translation = "카메라 렌즈를 향하는 것만으로도, 레미카의 반응은 좋아져 가고──"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「ふぅううっ！？<emoji=heart04>\u3000ぁああっ、撮られてるっ<emoji=heart04>\u3000撮られてますぅっ<emoji=heart04>\u3000んんぅ、あ、あああ、あぁあああっ……！<emoji=heart04>」"
translation = "「후우우웃!?<emoji=heart04> 아아앗, 찍히고 있어<emoji=heart04> 찍히고 있어요옷<emoji=heart04> 응응으, 아, 아아아, 아아아아앗……!<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「トップアイドルが見せちゃいけない顔って……は、はあぁぁんっ<emoji=heart04>\u3000そ、そんなぁっ……イジワル、しないでぇっ……<emoji=heart04>」"
translation = "「톱 아이돌이 보여주면 안 되는 얼굴이라니…… 하, 하아아앙<emoji=heart04> 그, 그런으으…… 시미술, 부리지 말아줘요오……<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「だ、誰にも見せないでくださいっ！<emoji=heart04>\u3000そんなのネットにばらまかれたら<emoji=heart04>\u3000私、アイドルできなくなっちゃい、ますからぁっ<emoji=heart04>\u3000あぁぁん<emoji=heart04>」"
translation = "「아, 아무에게도 보여주지 마세요! <emoji=heart04> 그런 게 인터넷에 퍼지면<emoji=heart04> 저, 아이돌 못 하게 되어버리, 니까아아<emoji=heart04> 아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "言葉では抵抗しつつも、レミカの顔はとろけていき、口元からはだらしなくよだれが滴り落ちる。"
translation = "말로는 저항하면서도 레미카의 얼굴은 황홀경에 빠져가고, 입가에서는 속절없이 침이 흘러 떨어진다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「これが流出するかどうかは──レミカ、お前の頑張り次第だろう？」"
translation = "「이게 유출될지 어떨지는──레미카, 네 노력에 달렸겠지?」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「～～～～っ<emoji=heart04>\u3000はいっ<emoji=heart04>\u3000はいっ<emoji=heart04>\u3000はいぃぃっ<emoji=heart04>\u3000わかりましたっ、ご奉仕<emoji=heart04>\u3000おま○こいっぱい、締めますっ<emoji=heart04>\u3000おち○ちんにご奉仕、いたしますぅ<emoji=heart04>」"
translation = "「～～～～윽<emoji=heart04> 네<emoji=heart04> 네<emoji=heart04> 네에에에<emoji=heart04> 알겠습니다, 봉사<emoji=heart04> 보지 꽉꽉, 조일게요<emoji=heart04> 자지에 봉사, 하겠습니다아<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「んんぅ、ふぅ、ぁ、ああ、ぁっ<emoji=heart04>\u3000アイドルおま○こで、ご主人様のおち○ちん、たくさん感じさせて、みせますからぁっ……<emoji=heart04>\u3000ふわぁぁぁんっ<emoji=heart04>」"
translation = "「으으으, 후우, 아, 아아, 아<emoji=heart04> 아이돌 보지로, 주인님의 자지, 잔뜩 느끼게 해, 드릴 테니까요오……<emoji=heart04> 후와아아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「んんぅっ<emoji=heart04>\u3000おま○こ、ぎゅーっ<emoji=heart04>\u3000ぎゅーっ<emoji=heart04>\u3000はぁぁぁんっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000ぅう、おま○こ、ぎゅっぎゅ、ぎゅ～っ<emoji=heart04>\u3000くふぅぅんぅ！<emoji=heart04>」"
translation = "「으으으윽<emoji=heart04> 보지, 꾸우욱<emoji=heart04> 꾸우욱<emoji=heart04> 하아아아앙<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 아아아앗<emoji=heart04> 으으, 보지, 꾹꾹, 꾸우우욱<emoji=heart04> 쿠후우으응! <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "身動きができない状態なのに、俺のペニスを悩ましく締め上げてくるレミカの女性器。何度味わってもとてつもない快感だ。"
translation = "몸을 움직일 수 없는 상태인데도, 내 페니스를 애타게 조여오는 레미카의 여성기. 몇 번을 맛봐도 엄청난 쾌감이다."

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「あぁぁぁん<emoji=heart04>\u3000あっあっ<emoji=heart04>\u3000気持ちいい、ですか？\u3000おま○この動かし方、ご主人様にいっぱい、教えていただきました、からぁっ<emoji=heart04>\u3000あふぅぅ<emoji=heart04>」"
translation = "「아아아앙<emoji=heart04> 앗앗<emoji=heart04> 기분 좋으세요? 보지 움직이는 법, 주인님께 잔뜩, 배웠으니까아아<emoji=heart04> 아후우우<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "アイドルより性奴隷の方が適性があるんじゃないか──そう冷たく投げかけてやると。"
translation = "아이돌보다 성노예 쪽이 적성이 있는 거 아니냐──그렇게 차갑게 내뱉어주자."

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「あああっ<emoji=heart04>\u3000ふわぁぁぁん<emoji=heart04><emoji=heart04><emoji=heart04>\u3000……そ、そんなぁああっ<emoji=heart04>\u3000ひどいっ……ひどいですぅ<emoji=heart04>\u3000あ、あ、あっ<emoji=heart04>\u3000ふわぁぁんっ<emoji=heart04>」"
translation = "「아아앗<emoji=heart04> 후와아아앙<emoji=heart04><emoji=heart04><emoji=heart04> ……그, 그런으으으앗<emoji=heart04> 너무해…… 너무해요오<emoji=heart04> 아, 아, 앗<emoji=heart04> 후와아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ぎゅぎゅぎゅ～～っ、と女性器がきつくなる。その動きだけで、これはイったな、ということが手に取るようにわかった。"
translation = "꾹꾹구우욱, 하고 여성기가 조여진다. 그 움직임만으로, 이건 갔구나 하는 것을 손에 잡힐 듯이 알 수 있었다."

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「ぅ──ぁあ、あぁああっ<emoji=heart04>\u3000そんな奥ばっかり、ずんずん、するのっ……ぅ、ぁあ<emoji=heart04>\u3000ふぅうっ<emoji=heart04>\u3000んんぁ、ああ、あああっ……！<emoji=heart04>」"
translation = "「으──아아, 아아아앗<emoji=heart04> 그런 깊은 곳만, 푹푹, 하는 거어…… 윽, 아아<emoji=heart04> 후으으윽<emoji=heart04> 으으아, 아아, 아아앗……! <emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「あ、あ、あ、ああっ<emoji=heart04>\u3000おっぱい、それ好きぃっ……乳首、こねこねされるの、好きですっ──ん、んんんんっ！<emoji=heart04>」"
translation = "「아, 아, 아, 아앗<emoji=heart04> 가슴, 그거 좋아아…… 유두, 조물조물 당하는 거, 좋아해요──응, 으으으윽! <emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「は、はいっ<emoji=heart04>\u3000おっぱい気持ちよくなるのも、プロデューサー様のおかげですっ、じっくり開発、してもらいましたぁっ<emoji=heart04>」"
translation = "「네, 네에<emoji=heart04> 가슴 기분 좋아지는 것도, 프로듀서님 덕분이에요, 정성껏 개발, 받았으니까요오<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「いっぱい吸われて、たくさんモミモミされてっ……あぁぁん<emoji=heart04>\u3000イク時に乳首ぎゅーって引っ張られるの<emoji=heart04>\u3000何度もされてぇっ……<emoji=heart04>」"
translation = "「잔뜩 빨리고, 많이 주물주물 당해서…… 아아아앙<emoji=heart04> 갈 때 유두를 쭈욱 끌어당겨지는 거<emoji=heart04> 몇 번이나 당하고 싶어어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「アイドルなのに、おっぱいで感じちゃう、えっちな女の子にしてもらいました、ぁ、あ、あぁあんっ……！<emoji=heart04>」"
translation = "「아이돌인데, 가슴으로 느껴버리는, 야한 여자애로 만들어졌어요, 아, 아, 아아아앙……! <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "カメラのレンズを寄せて乳首を丹念に映すと、レミカはひときわ心地よさそうに体を跳ねさせる。"
translation = "카메라 렌즈를 가까이 대고 유두를 정성스럽게 비추자, 레미카는 한결 기분 좋은 듯 몸을 튕겨낸다."

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「乳首ダメダメダメぇっ<emoji=heart04>\u3000撮影されると、ピンって勃っちゃいます、あ、ぁああ、ぁあ！<emoji=heart04>\u3000んんん……ぅうーっ……！<emoji=heart04>」"
translation = "「유두 안 돼 안 돼 안 돼애<emoji=heart04> 촬영당하면, 빳빳하게 서버려요, 아, 아아아, 아아! <emoji=heart04> 으으으…… 으으으으윽……! <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "撮影の仕事中にも乳首、勃っちゃうかもな──耳元でこそりと呟いてやる。"
translation = "촬영 업무 중에도 유두, 서버릴지도 모르겠네──귓가에서 소곤거려 준다."

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「や、やぁぁああっ……！<emoji=heart04>\u3000ダメぇ、そんなのダメですぅっ……<emoji=heart04>」"
translation = "「시, 싫어어어엇……! <emoji=heart04> 안 돼, 그런 건 안 돼요오……<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「水着のグラビア撮影、も、もうできなくなっちゃいますぅ……！<emoji=heart04>\u3000あ、あ、あ！<emoji=heart04>\u3000んん、んんぅう～っ……！<emoji=heart04>」"
translation = "「수영복 그라비아 촬영, 도, 더는 못 하게 되어버려요오……! <emoji=heart04> 아, 아, 아! <emoji=heart04> 으음, 으으으으응……! <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "想像の羽を羽ばたかせてさらに快感を強めるレミカ。"
translation = "상상의 나래를 펼치며 더욱 쾌감을 높이는 레미카."

[[dialogue]]
speaker = "unk"
original = "そんな彼女のために、内緒で用意したもの──ベッドから見える位置にあるテレビの電源を入れた。"
translation = "그런 그녀를 위해 몰래 준비한 것──침대에서 보이는 위치에 있는 TV 전원을 켰다."

[[dialogue]]
speaker = "unk"
original = "モニターに再生されたのは──"
translation = "모니터에 재생된 것은──"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「あ、ぁあっ！？\u3000こ、これっ……私が、ライブしてる、動画っ……！？<emoji=heart04>\u3000はぁぁぁん<emoji=heart04>」"
translation = "「아, 아앗!? 이, 이건…… 내가, 라이브 하고 있는, 영상……!? <emoji=heart04> 하아아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「その衣装で歌って踊ってるシーンだ。今のお前と大違いだな、レミカ？」"
translation = "「그 의상을 입고 노래하고 춤추는 장면이다. 지금의 너와는 천지차이구나, 레미카?」"

[[dialogue]]
speaker = "unk"
original = "キュートスタイルの衣装で踊り、パーフェクトな笑顔を浮かべて観客を魅了するレミカの姿が大画面に表示される。"
translation = "큐트 스타일의 의상을 입고 춤추며, 완벽한 미소를 띄우고 관객을 매료하는 레미카의 모습이 대화면에 표시된다."

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「ふ、うぅうううっ！？<emoji=heart04>\u3000あ、ああ、ああぁあ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「후, 으으으으윽!? <emoji=heart04> 아, 아아, 아아아아～～앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "打ち合わせに無いシチュエーションの変化に、軽く絶頂までしてしまうレミカ。"
translation = "협의에 없던 시츄에이션의 변화에, 가볍게 절정까지 해버리는 레미카."

[[dialogue]]
speaker = "unk"
original = "そこへ畳みかけるようにして、俺は腰のピストンを強めた。"
translation = "거기에 몰아치듯, 나는 허리의 피스톤을 강하게 했다."

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「はぁああっ！<emoji=heart04>\u3000んんぅうっ<emoji=heart04>\u3000ふうぅ、ぁああ、ああぁあ～～～っ！<emoji=heart04>」"
translation = "「하아아앗! <emoji=heart04> 으으으윽<emoji=heart04> 후우으, 아아아, 아아아아～～～앗! <emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「おち○ちん、激しっ<emoji=heart04>\u3000ご主人様のおち○ちんっ、あ、ああ、あぁあ、ああぁああっ……！<emoji=heart04>」"
translation = "「자지, 격렬해애<emoji=heart04> 주인님의 자지이, 아, 아아, 아아아, 아아아아앗……! <emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「ご主人様っ、イジワルですっ<emoji=heart04>\u3000はぁぁぁん<emoji=heart04>\u3000比べないでっ、あぁぁん<emoji=heart04>\u3000ライブ中の私と、エッチな私っ……見比べないでぇええっ<emoji=heart04>」"
translation = "「주인님, 심술쟁이예요<emoji=heart04> 하아아아앙<emoji=heart04> 비교하지 마아, 아아앙<emoji=heart04> 라이브 중인 나와, 야한 나…… 비교해서 보지 마아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「嘘が下手だな、レミカ。お前のここはっ、こんなに悦んでる」"
translation = "「거짓말이 서투르구나, 레미카. 너의 여기는, 이렇게 기뻐하고 있는데」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「うううぅう～っ！<emoji=heart04>\u3000あ、あぁあ、あああっ！<emoji=heart04>」"
translation = "「으으으으으～윽! <emoji=heart04> 아, 아아아, 아아앗! <emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「はっ……はい<emoji=heart04>\u3000悦んで、ますぅっ<emoji=heart04>\u3000はぁぁぁん<emoji=heart04>\u3000おっきなおち○ちんで犯されて<emoji=heart04>\u3000イジワルされて私っ…悦んじゃってますうぅぅっ<emoji=heart04>」"
translation = "「하아…… 네<emoji=heart04> 기뻐하고, 있어요오<emoji=heart04> 하아아아앙<emoji=heart04> 커다란 자지로 범해져서<emoji=heart04> 괴롭힘당해서 나… 기뻐해 버리고 있어요오오윽<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「あ、あぁ、あーっ！<emoji=heart04>\u3000おち○ちん、気持ちいぃっ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000ご主人様の乱暴なエッチ、好き、好き、好きぃぃいっ……！<emoji=heart04>」"
translation = "「아, 아아, 아아앙! <emoji=heart04> 자지, 기분 좋아아<emoji=heart04> 기분 좋아<emoji=heart04> 주인님의 난폭한 섹스, 좋아, 좋아, 좋아아아앗……! <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "いじめるたびに汗ばむレミカのおっぱいを揉みしだきながら、覆いかぶさるようにしてキスをする。"
translation = "괴롭힐 때마다 땀에 젖는 레미카의 가슴을 주무르면서, 덮치듯이 키스를 한다."

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「んんぅうっ<emoji=heart04>\u3000んぅむっ、ちゅる、んちゅる、れるれりゅ、んちゅる、ちゅ、ちゅぅっ……ぷぁあ<emoji=heart04>」"
translation = "「으으으윽<emoji=heart04> 으음, 츄릅, 응츄릅, 레루레류, 응츄릅, 츄, 츄우…… 푸하아<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「はいっ……もっとべろ、絡めますっ……んちゅる、ちゅぅちゅる、んちゅるんちゅ、くちゅぅっ……<emoji=heart04>」"
translation = "「네…… 좀 더 혀, 얽을게요…… 응츄릅, 츄으츄릅, 응츄릅응츄, 쿠츄우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「ご主人様に教えていただいたっ、エッチなキスっ……んぅちゅ、んむちゅる、んちゅくちゅ、んちゅぅっ……れろれろ<emoji=heart04>」"
translation = "「주인님께 배운, 야한 키스…… 응으츄, 응무츄릅, 응츄쿠츄, 응츄우…… 레로레로<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "すぐそばのモニターで華麗なパフォーマンスをする映像のレミカを尻目に、同じ衣装の彼女を乱暴にむさぼる。"
translation = "바로 옆 모니터에서 화려한 퍼포먼스를 하는 영상 속 레미카를 곁눈질하며, 같은 의상을 입은 그녀를 난폭하게 탐닉한다."

[[dialogue]]
speaker = "unk"
original = "レミカもちらちらと横目でモニターを見て、そのたびに女性器をきゅっきゅっと痙攣させて感じている。"
translation = "레미카도 힐끗힐끗 곁눈으로 모니터를 보고, 그때마다 여성기를 큥큥 경련시키며 느끼고 있다."

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「れえぇえ、れろ、れろえろれろっ……んんちゅぅ、はぷ、んちゅる、れるちゅぱ、くちゅっ……<emoji=heart04>」"
translation = "「레에에에, 레로, 레로에로레로…… 응응츄우, 하푸, 응츄릅, 레루츄파, 쿠츄……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そろそろ出すぞ。どこに出して欲しい？」"
translation = "「슬슬 싼다. 어디에 싸길 원하지?」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「んちゅ、んちゅるるっ……んぅ<emoji=heart04>\u3000そ、そんなの、決まってますっ<emoji=heart04>\u3000中に出したら赤ちゃん、できちゃうからぁっ……んちゅぅ<emoji=heart04>」"
translation = "「응츄, 응츄루루…… 응으<emoji=heart04> 그, 그런 거, 정해져 있어요<emoji=heart04> 안에 싸면 아기, 생겨버리니까아…… 응츄우<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "悪いプロデューサーに完堕ちしたアイドルの答えは──ただ１つ。"
translation = "나쁜 프로듀서에게 완전히 타락한 아이돌의 대답은──단 하나."

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「んちゅる、れぇ、ちゅるるっ……<emoji=heart04>\u3000中にっ……中にください<emoji=heart04>\u3000ご主人様ぁ<emoji=heart04>」"
translation = "「응츄릅, 레에, 츄루루……<emoji=heart04> 안에…… 안에 주세요<emoji=heart04> 주인님아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「くちゅるっ、ちゅるちゅる……はぷちゅっ、ご主人様の赤ちゃんっ、種付けしてくださぁぁい<emoji=heart04>\u3000んちゅる、んちゅくちゅぅ<emoji=heart04>」"
translation = "「쿠츄릅, 츄르츄르…… 하푸츄, 주인님의 아기, 씨내리기 해주세에에에요<emoji=heart04> 응츄릅, 응츄쿠츄우<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いい子だ。それでこそ俺の性奴隷アイドルだ」"
translation = "「착한 아이다. 그래야 내 성노예 아이돌이지」"

[[dialogue]]
speaker = "unk"
original = "──そう言いながら、ラストスパートのピストンを開始する。"
translation = "──그렇게 말하며, 라스트 스퍼트 피스톤을 개시한다."

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「──んんんああああぁあっ<emoji=heart04>\u3000あっあっあっあっ<emoji=heart04>\u3000はあぁあっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000んんぁっ<emoji=heart04>\u3000あぁあ、ああぅっ！<emoji=heart04>\u3000んんぅ～っ！<emoji=heart04>」"
translation = "「──응응응아아아아앗<emoji=heart04> 앗앗앗앗<emoji=heart04> 하아아앗<emoji=heart04> 후우우읏<emoji=heart04> 응응아앗<emoji=heart04> 아아아, 아아웃!<emoji=heart04> 응응으~읏!<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「すごい、すごいスピードで、あ、あ、あっ<emoji=heart04>\u3000ご主人様のおち○ちん、来てますっ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000気持ちいいです、ぅ、ぁああぁ！<emoji=heart04>」"
translation = "「엄청나, 엄청난 스피드로, 아, 아, 앗<emoji=heart04> 주인님의 자지, 오고 있어요<emoji=heart04> 기분 좋아<emoji=heart04> 기분 좋아요, 으, 아아아아!<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「く、くださいっ……ご主人様の精液っ<emoji=heart04>\u3000……あ、あぁあ、あっ<emoji=heart04>\u3000あっあっあっ、あああっ、ぁあああ！<emoji=heart04>」"
translation = "「주, 주세요…… 주인님의 정액<emoji=heart04> ……아, 아아아, 앗<emoji=heart04> 앗앗앗, 아아앗, 아아아아!<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「エッチなアイドルおま○こに、精液っ……はぁぁぁん<emoji=heart04>\u3000びゅびゅびゅ～～うって<emoji=heart04>\u3000たくさんください、くださいぃいっ！<emoji=heart04>」"
translation = "「야한 아이돌 보지에, 정액…… 하아아앙<emoji=heart04> 뷰릇뷰릇뷰릇~~ 하고<emoji=heart04> 잔뜩 주세요, 주세요오오옷!<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「赤ちゃん作りますっ<emoji=heart04>\u3000あぁぁん<emoji=heart04>\u3000ご主人様の赤ちゃんっ<emoji=heart04>\u3000孕ませてぇぇっ<emoji=heart04>\u3000あ、あああぁぁあっ<emoji=heart04>」"
translation = "「아기 만들게요<emoji=heart04> 아아앙<emoji=heart04> 주인님의 아기<emoji=heart04> 임신시켜줘어어엇<emoji=heart04> 아, 아아아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「ふあああっ<emoji=heart04>\u3000くぅぅぅんっ<emoji=heart04>\u3000あっ！<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000来てるっ<emoji=heart04>\u3000おま○こ来るっ<emoji=heart04>\u3000来ちゃうのぉぉっ<emoji=heart04>\u3000ぅ、ぁああぁ！<emoji=heart04>」"
translation = "「후아아앗<emoji=heart04> 쿠으으으응읏<emoji=heart04> 앗!<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 오고 있어<emoji=heart04> 보지 온다<emoji=heart04> 와버려어어엇<emoji=heart04> 으, 아아아아!<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「はぁぁっ、あ、あぁ、あ、あ、あ──！？<emoji=heart04>\u3000おま○こイクっ……イク、イク、イクっ<emoji=heart04>\u3000──イク、イっっクぅうぅぅううう～～～っ！！<emoji=heart04>」"
translation = "「하아아앗, 아, 아아, 아, 아, 아──!?<emoji=heart04> 보지 가버려…… 가, 가, 가앗<emoji=heart04> ──가, 가아아앗 가아아아아아아아아~~~앗!!<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「ふぁああぁあぁああぁあ～～～～～～～～～～～～っ！<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아아아아아아아~~~~~~~~~~~~~~~~앗!<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「あ、ぁああ<emoji=heart04>\u3000あぁぁん<emoji=heart04>\u3000ふわぁ……あぁああっ<emoji=heart04>\u3000ご主人様の精液、いっぱいっ……いっぱい出てるぅ<emoji=heart04>\u3000ん、んんぅ<emoji=heart04>\u3000んんぅう～～っ<emoji=heart04>」"
translation = "「아, 아아아<emoji=heart04> 아아앙<emoji=heart04> 후와아…… 아아아앗<emoji=heart04> 주인님의 정액, 가득…… 가득 나오고 있어어<emoji=heart04> 응, 응응으<emoji=heart04> 응응으으~~읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「ひぅぅう、ぁ、あぁ、あぁあああーっ……！<emoji=heart04>\u3000すごい、すごい量っ、ご主人様ぁっ<emoji=heart04>\u3000精液、すごぉいっ……あ、ああああ～っ！<emoji=heart04>」"
translation = "「히으으으, 아, 아아, 아아아아앗……!<emoji=heart04> 굉장해, 엄청난 양, 주인님앗<emoji=heart04> 정액, 굉장해앗…… 아, 아아아아~앗!<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "何度も何度もペニスが脈打ち、腰が抜けそうなほどの快楽に包まれる。"
translation = "몇 번이고 몇 번이고 페니스가 맥동하며, 허리가 빠질 듯한 쾌락에 휩싸인다."

[[dialogue]]
speaker = "unk"
original = "レミカの膣内もペニスを揉むように痙攣して。一滴残らず、絞り出されて──"
translation = "레미카의 질 내도 페니스를 주무르듯이 경련하며. 한 방울도 남김없이, 짜여져서──"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「は、ぁあぁああ～っ……はぁあぁあーっ……ふぅううーっ……ふぅう～っ……<emoji=heart04>」"
translation = "「하, 아아아아~앗…… 하아아아앗…… 후우우우읏…… 후우우~읏……<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「はぁぁ<emoji=heart04>\u3000か、会長……今日のエッチ……すっごくよかった……<emoji=heart04>」"
translation = "「하아아<emoji=heart04> 회, 회장님…… 오늘의 섹스…… 정말 좋았어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「気に入ってくれたのなら、何より……」"
translation = "「마음에 들어 했다면, 무엇보다 다행이야……」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「うん……やっぱり私、いじめてもらうエッチ、好き<emoji=heart04>\u3000悪いプロデューサーに調教されてるシチュエーション……またしたいかも♪」"
translation = "「응…… 역시 나, 괴롭힘당하는 섹스, 좋아<emoji=heart04> 나쁜 프로듀서에게 조교당하는 시추에이션…… 또 하고 싶을지도♪」"

[[dialogue]]
speaker = "unk"
original = "レミカが喜んでくれるなら俺も嬉しいのだが、彼女の『性奴隷にされているアイドル役』へのハマりっぷりがすごいので、少し心配にもなる。"
translation = "레미카가 기뻐해 준다면 나도 기쁘지만, 그녀의 『성노예가 된 아이돌 역』에 대한 몰입도가 엄청나서 조금 걱정도 된다."

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「え……本当に悪いプロデューサーにいじめられたり、してないかって？」"
translation = "「에…… 정말로 나쁜 프로듀서에게 괴롭힘당하거나 하진 않느냐고?」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「いや、そんなのあるわけないじゃん……ポラプロ、今どき珍しいくらいのホワイト企業だし……」"
translation = "「아니, 그럴 리가 없잖아…… 포라프로, 요즘 시대에 보기 드문 화이트 기업이고……」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「ていうかこの妄想シチュのご主人様……プロデューサーが誰なのか、教えてなかったっけ？」"
translation = "「그보다 이 망상 시추에이션의 주인님…… 프로듀서가 누구인지 안 가르쳐줬던가?」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「ふふっ……キミだよ、キミ。ねっ、ご主人様♪」"
translation = "「후훗…… 너야, 너. 그지, 주인님♪」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ええっ！？」"
translation = "「에엣!?」"

[[dialogue]]
speaker = "unk"
original = "どうやらレミカの妄想する悪のプロデューサーは、俺という設定だったらしい。なるほど、それなら安心……"
translation = "아무래도 레미카가 망상하는 악덕 프로듀서는 나라는 설정이었던 모양이다. 과연, 그렇다면 안심……"

[[dialogue]]
speaker = "unk"
original = "……なのか？"
translation = "……인 건가?"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「今日は私の趣味に付き合ってくれてありがと。次のエッチは会長の番だから」"
translation = "「오늘은 내 취미에 맞춰줘서 고마워. 다음 섹스는 회장 차례니까」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「試してみたいシチュエーションプレイがあったら何でも言ってね。アイドルの演技力で、パーフェクトに演じてみせちゃうから<emoji=heart04>」"
translation = "「시험해보고 싶은 시추에이션 플레이가 있다면 뭐든 말해줘. 아이돌의 연기력으로 퍼펙트하게 연기해 보일 테니까<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "満足げに微笑むレミカに、俺は『普通にいちゃいちゃエッチがしたい』とリクエストを送るのだった……"
translation = "만족스러운 듯 미소 짓는 레미카에게, 나는 『평범하게 꽁냥거리는 섹스가 하고 싶다』고 리퀘스트를 보내는 것이었다……"

