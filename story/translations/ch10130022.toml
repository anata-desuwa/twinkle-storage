[[dialogue]]
speaker = "unk"
original = "第２話,ユウリとバニーレッスン,P"
translation = "제2화, 유우리와 바니 레슨, P"

[[dialogue]]
speaker = "ユウリ"
original = "「ど……どうぞお客様。こちらメニューっす……」"
translation = "「어…… 어서 오십시오 손님. 여기 메뉴임다……」"

[[dialogue]]
speaker = "ユウリ"
original = "「ご注文はお決まりですか？\u3000……え？\u3000ス、スマイルひとつ？」"
translation = "「주문은 결정하셨나요? ……에? 미, 미소 하나요?」"

[[dialogue]]
speaker = "ユウリ"
original = "「は、はは……」"
translation = "「하, 하하……」"

[[dialogue]]
speaker = "ユウリ"
original = "「ははは…………」"
translation = "「하하하…………」"

[[dialogue]]
speaker = "ユウリ"
original = "「～～っっ！\u3000やっぱ無理だ、もうやめる、恥ずかしすぎて死ぬっ、つかこれじゃいかがわしいところの店員じゃねえか！？」"
translation = "「~~윽! 역시 무리야, 이제 그만둘래, 너무 부끄러워서 죽겠어, 그보다 이러면 저질스러운 가게 점원 같잖아!?」"

[[dialogue]]
speaker = "unk"
original = "変身解いたら特訓にならないだろ"
translation = "변신을 풀면 특훈이 안 되잖아."

[[dialogue]]
speaker = "ユウリ"
original = "「う、うるせえなっ、わかってるっつの……！\u3000でもハズいもんはハズいんだってば……！」"
translation = "「시, 시끄러워, 알고 있다니까……! 하지만 창피한 건 창피한 거란 말이야……!」"

[[dialogue]]
speaker = "ユウリ"
original = "「そりゃあたしも前みたいなことになりたくはないけど……。バニー着るたびにオロオロしてたら話になんねえし……」"
translation = "「나도 전 같은 일이 생기는 건 싫지만……. 바니를 입을 때마다 허둥대면 이야기가 안 되고……」"

[[dialogue]]
speaker = "ユウリ"
original = "「それに変身もまだ不安定で……。この前もいつもの戦闘服に変身したつもりだったのに、バニーガールになっちまったし……」"
translation = "「게다가 변신도 아직 불안정해서……. 저번에도 평소의 전투복으로 변신할 생각이었는데, 바니걸이 되어버렸고……」"

[[dialogue]]
speaker = "ユウリ"
original = "「だからこそちゃんと訓練して、バニーフォームを使いこなせるようになるべきだって自分でもわかってるけどよ……」"
translation = "「그렇기에 제대로 훈련해서, 바니 폼을 능숙하게 다룰 수 있게 되어야 한다는 건 나도 알고 있지만 말이야……」"

[[dialogue]]
speaker = "unk"
original = "ならやろう！！"
translation = "그럼 하자!!"

[[dialogue]]
speaker = "ユウリ"
original = "「だーっ！\u3000そのノリノリっぷりがあたしの羞恥心を加速させんだよ！\u3000前のめりで促すな！」"
translation = "「다아앗! 그 신난 기색이 내 수치심을 가속시킨다고! 앞장서서 부추기지 마!」"

[[dialogue]]
speaker = "ユウリ"
original = "「つ、つか、本当にリノさんは帰ってこないんだろうなっ？\u3000息子の彼女が部屋でバニースーツなんか着てるの見られたら……！」"
translation = "「그, 그보다, 정말로 리노 씨는 안 돌아오시는 거겠지? 아들의 여자친구가 방에서 바니 수트 같은 걸 입고 있는 걸 들키면……!」"

[[dialogue]]
speaker = "ユウリ"
original = "「って──～～っっ！\u3000自分で彼女とか言っちまった……！\u3000ハズい、死ぬっ、もう帰るっ……！！」"
translation = "「앗──~~윽! 내 입으로 여자친구라고 말해버렸어……! 창피해, 죽을 것 같아, 이제 집에 갈래……!!」"

[[dialogue]]
speaker = "ユウリ"
original = "「ひゃっ！？\u3000いいい、いきなり手ぇ掴むなっ……！」"
translation = "「히익!? 가가, 갑자기 손 잡지 마……!」"

[[dialogue]]
speaker = "ユウリ"
original = "「あ、あうっ。わ、わかったからっ、帰らねえから……！\u3000あたしも、その、せっかく来たのに帰りたくない、し……」"
translation = "「아, 아우윽. 알았으니까, 안 갈 테니까……! 나도, 그, 기껏 왔는데 가고 싶지, 않고……」"

[[dialogue]]
speaker = "ユウリ"
original = "「っっ。特訓の続きをしなきゃって意味だからなっ？\u3000変な勘違いすんなよっ？」"
translation = "「윽. 특훈을 계속해야 한다는 의미니까 말이야? 이상한 착각 하지 마?」"

[[dialogue]]
speaker = "ユウリ"
original = "「それより、その。手ぇ離してくれよ。このままだと変身できねえし……」"
translation = "「그보다, 그. 손 좀 놔줘. 이대로는 변신 못 하니까……」"

[[dialogue]]
speaker = "ユウリ"
original = "「あ……でも待って。やっぱり、えと、バニースーツ着るの恥ずかしいから……」"
translation = "「아…… 하지만 잠깐만. 역시, 저기, 바니 수트 입는 거 부끄러우니까……」"

[[dialogue]]
speaker = "ユウリ"
original = "「変身する前に、おまじない……かけて欲しい……」"
translation = "「변신하기 전에, 주문…… 걸어줬으면 좋겠어……」"

[[dialogue]]
speaker = "ユウリ"
original = "「う……うん。女の子らしくてもいいってあたしに教えてくれるおまじない……。勇気出っから……」"
translation = "「으…… 응. 여자아이 같아도 괜찮다고 내게 가르쳐주는 주문……. 용기가 날 테니까……」"

[[dialogue]]
speaker = "ユウリ"
original = "「ふぁ……んっ<emoji=heart04>\u3000ちゅぁ……ん、んふ……<emoji=heart04>」"
translation = "「화…… 응<emoji=heart04> 츄아…… 응, 으응……<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「はぁ、はぁ……こ、こんな姿、誰かに見られたらマジで死んじまうかも……」"
translation = "「하아, 하아…… 이, 이런 모습, 누군가에게 들키면 진짜 죽어버릴지도……」"

[[dialogue]]
speaker = "unk"
original = "特訓続けられそう？"
translation = "특훈 계속할 수 있겠어?"

[[dialogue]]
speaker = "ユウリ"
original = "「そ、そうだな。勇気もらったし……。もっかい変身してみる」"
translation = "「그, 그렇네. 용기를 얻었으니까……. 다시 한번 변신해 볼게」"

[[dialogue]]
speaker = "ユウリ"
original = "「ど……どうかな？」"
translation = "「어…… 어때?」"

[[dialogue]]
speaker = "unk"
original = "可愛いよ"
translation = "귀여워."

[[dialogue]]
speaker = "ユウリ"
original = "「そ、そういうこと聞いてんじゃねえよ！\u3000頭真っ白になるからやめろって……！」"
translation = "「그, 그런 걸 묻는 게 아니야! 머릿속이 하얘지니까 하지 말라니까……!」"

[[dialogue]]
speaker = "ユウリ"
original = "「えっ？\u3000その場でくるくる回ってくれって。し、仕方ねえな、特別だぞ？」"
translation = "「엣? 그 자리에서 빙글빙글 돌아달라고. 어, 어쩔 수 없네, 특별히 해주는 거다?」"

[[dialogue]]
speaker = "ユウリ"
original = "「こう、かな……。っっ、だから可愛くなんかねえって……！\u3000似合ってもねえから……！」"
translation = "「이렇게, 인가……. 윽, 그러니까 귀엽지 않다니까……! 어울리지도 않으니까……!」"

[[dialogue]]
speaker = "ユウリ"
original = "「もうちょっと前屈みに……？\u3000こ……こう？\u3000お尻ももっと突き出せって……？\u3000んんっ……」"
translation = "「좀 더 앞쪽으로 숙여달라고……? 이…… 이렇게? 엉덩이도 좀 더 내밀라고……? 으응……」"

[[dialogue]]
speaker = "ユウリ"
original = "「ひゃっ、バ、バカ、撮んなっ。恥ずかしいだろっ……！」"
translation = "「히익, 바, 바보야, 찍지 마. 부끄럽잖아……!」"

[[dialogue]]
speaker = "ユウリ"
original = "「あたしの可愛い姿、記録に残したいからって……？\u3000しょ、しょうがねえヤツだな……」"
translation = "「내 귀여운 모습을 기록으로 남기고 싶어서라고……? 어, 어쩔 수 없는 녀석이네……」"

[[dialogue]]
speaker = "ユウリ"
original = "「絶対他のヤツらには見せんなよ……？\u3000見せびらかしたりしないってなら撮ってもいいけど……」"
translation = "「절대 다른 녀석들한테는 보여주지 마라……? 자랑하고 다니지 않는다면 찍어도 괜찮지만……」"

[[dialogue]]
speaker = "ユウリ"
original = "「きゃっ。ちょ、調子に乗って撮りすぎだっ。写真集の撮影じゃねえんだから……！」"
translation = "「꺄악. 조, 조금 신나서 너무 많이 찍잖아. 사진집 촬영하는 게 아니니까……!」"

[[dialogue]]
speaker = "ユウリ"
original = "「へ？\u3000バナナを谷間に……？\u3000ん、ふっ……<emoji=heart04>\u3000こう、か……？」"
translation = "「헤? 바나나를 가슴 골에……? 으, 응……<emoji=heart04> 이렇게, 인가……?」"

[[dialogue]]
speaker = "ユウリ"
original = "「そのまま舐め回せって……れろぉ、ぺろろぉ……<emoji=heart04>\u3000ぢゅぷ……ぢゅぷぅ……<emoji=heart04>」"
translation = "「그대로 핥으라고…… 레로오, 페로로오……<emoji=heart04> 쥬웁…… 쥬우웁……<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「っっ<emoji=heart04>\u3000バ、バカ……<emoji=heart04>\u3000ピントぶれぶれじゃねえか……<emoji=heart04>\u3000息荒くしすぎだって……<emoji=heart04>」"
translation = "「윽<emoji=heart04> 바, 바보야……<emoji=heart04> 초점이 다 흔들리잖아……<emoji=heart04> 숨을 너무 거칠게 몰아쉰다고……<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「何やらせんだーっ！？」"
translation = "「뭘 시키는 거야아앗!?」"

[[dialogue]]
speaker = "ユウリ"
original = "「さっきからあたしに何をやらせてんだ！？」"
translation = "「아까부터 나한테 뭘 시키는 거냐고!?」"

[[dialogue]]
speaker = "unk"
original = "つい出来心で……"
translation = "그만 홧김에……"

[[dialogue]]
speaker = "ユウリ"
original = "「特訓にかこつけておかしなことさせてんじゃねえぞ……！\u3000た、ただでさえ死ぬほど恥ずかしい格好してるってのに……！」"
translation = "「특훈을 핑계로 이상한 거 시키지 마……! 가, 가뜩이나 죽을 만큼 부끄러운 복장을 하고 있는데……!」"

[[dialogue]]
speaker = "ユウリ"
original = "「つかそもそもこれはバニーフォームを使いこなすための特訓なんだよなぁ……？\u3000つーことは星術も特訓しねえと話になんねえよなぁ……？」"
translation = "「그보다 애초에 이건 바니 폼을 능숙하게 쓰기 위한 특훈이잖아……? 그렇다는 건 성술도 특훈하지 않으면 이야기가 안 된다고……?」"

[[dialogue]]
speaker = "ユウリ"
original = "「ふふ、どこに行こうとしてんだ？\u3000あたしの特訓に付き合ってくれんだろ？」"
translation = "「후후, 어디 가려고? 내 특훈 도와줄 거잖아?」"

[[dialogue]]
speaker = "ユウリ"
original = "「なら、たっぷりと協力してもらうぜ。お望み通り──」"
translation = "「그럼, 듬뿍 협력받겠어. 네 바람대로──」"

[[dialogue]]
speaker = "ユウリ"
original = "「あんたの体でなーーーーっ！！」"
translation = "「네 몸으로 말이야아아앗!!」"

[[dialogue]]
speaker = "unk"
original = "それからユウリの星術を受け続け、ユウリのダイス捌きは見事なキレになったのだった……"
translation = "그 후로 유우리의 성술을 계속 받아내며, 유우리의 다이스 솜씨는 훌륭하게 날카로워졌다……"

