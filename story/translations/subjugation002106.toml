[[dialogue]]
speaker = "エンジュ"
original = "「はんっ、どうした、魔王に魔女！\u3000威勢が良かったのは最初だけか！」"
translation = "「흥, 뭐야 마왕에 마녀! 기세 좋았던 건 처음뿐이었냐!」"

[[dialogue]]
speaker = "メテオラ"
original = "「あはははっ！\u3000やっぱり大したことないなー！」"
translation = "「아하하하! 역시 별거 아니라구ー!」"

[[dialogue]]
speaker = "リーリア"
original = "「ったくもう、自信なくすなぁ！\u3000あなたたちが規格外なんだってばーっ！」"
translation = "「정말이지, 자신감 떨어지네! 당신들이 규격 외인 거라고요─!」"

[[dialogue]]
speaker = "unk"
original = "やっぱりコラプサーの能力が厄介だ……！"
translation = "역시 콜랩서의 능력이 까다로워……!"

[[dialogue]]
speaker = "リーリア"
original = "「そうですね。あと想定外なのは２人のコンビネーションです」"
translation = "「그렇네요. 그리고 예상외인 건 두 사람의 콤비네이션이에요.」"

[[dialogue]]
speaker = "リーリア"
original = "「今までのコラプサーは個々の戦闘力は高かったですけど、連携なんてしていませんでした。そこに付け入る隙があると思っていたんですが……」"
translation = "「지금까지의 콜랩서는 개개인의 전투력은 높았지만 연계 같은 건 하지 않았어요. 거기 파고들 틈이 있을 거라 생각했는데……」"

[[dialogue]]
speaker = "リーリア"
original = "「メテオラって子は大暴れしてるだけなのに、エンジュって子がうまく誘導してて、すごく上手に使ってます。戦いにくいことこの上ないです」"
translation = "「메테오라라는 애는 날뛰고 있을 뿐인데, 엔쥬라는 애가 유도를 잘해서 아주 능숙하게 다루고 있어요. 싸우기 까다롭기 짝이 없네요.」"

[[dialogue]]
speaker = "リーリア"
original = "「あっ……！\u3000もしかして、誘導してるのってメテオラだけじゃなくって、私たちも……！？」"
translation = "「앗……! 설마 유도하고 있는 건 메테오라뿐만 아니라 저희도……!?」"

[[dialogue]]
speaker = "unk"
original = "この場所って──"
translation = "이 장소라는 건──"

[[dialogue]]
speaker = "エンジュ"
original = "「やっと気づいたか、魔女！\u3000そこだ、メテオラ！\u3000思いっきりぶっ壊してやれ！」"
translation = "「이제야 눈치챘나, 마녀! 거기다, 메테오라! 마음껏 때려 부숴라!」"

[[dialogue]]
speaker = "メテオラ"
original = "「おうっ！\u3000ぶっ飛べーーーっ！」"
translation = "「오우! 날아가 버려어어!」"

[[dialogue]]
speaker = "リーリア"
original = "「きゃああぁあぁっ！」"
translation = "「꺄아아아아악!」"

[[dialogue]]
speaker = "unk"
original = "メテオラの爆撃で、分厚く作られていたはずの床が破壊されて──"
translation = "메테오라의 폭격으로 두껍게 만들어졌을 터인 바닥이 파괴되어──"

[[dialogue]]
speaker = "リーリア"
original = "「げほっ、げほっ……！\u3000ここって──地下の……！」"
translation = "「쿨럭, 쿨럭……! 여기는── 지하의……!」"

[[dialogue]]
speaker = "コハルコ"
original = "「会長さん、リーリアさん！？\u3000ここまで来ちゃったの！？」"
translation = "「회장님, 리리아 씨!? 여기까지 와 버린 거야!?」"

[[dialogue]]
speaker = "リーリア"
original = "「ごめんなさい！\u3000あいつら思ったより強くて……！」"
translation = "「죄송해요! 저 녀석들 생각보다 강해서……!」"

[[dialogue]]
speaker = "エンジュ"
original = "「やっぱりここにいたか！\u3000ターゲットを発見した、ただちに確保する！」"
translation = "「역시 여기 있었나! 타겟을 발견했다, 즉시 확보한다!」"

[[dialogue]]
speaker = "メテオラ"
original = "「あいつがターゲットのコハルコかー！\u3000捕まえるぞー！」"
translation = "「저 녀석이 타겟인 코하루코냐구ー! 붙잡겠다구ー!」"

[[dialogue]]
speaker = "unk"
original = "コハルコさんがコラプサーのターゲット……！？"
translation = "코하루코 씨가 콜랩서의 타겟……!?"

[[dialogue]]
speaker = "コハルコ"
original = "「え？\u3000え！？\u3000ターゲットって何！？」"
translation = "「에? 에!? 타겟이라니 무슨 소리야!?」"

[[dialogue]]
speaker = "リーリア"
original = "「新星学園の破壊じゃなくって、あなたたちの目的は最初っからコハルコ先輩の誘拐だったってこと！？」"
translation = "「신성학원의 파괴가 아니라, 당신들의 목적은 처음부터 코하루코 선배의 유괴였다는 거야!?」"

[[dialogue]]
speaker = "コハルコ"
original = "「私を……誘拐！？\u3000私が狙われる理由なんて──」"
translation = "「나를…… 유괴!? 내가 노려질 이유 같은 건──」"

[[dialogue]]
speaker = "コハルコ"
original = "「割と心当たりある！？」"
translation = "「의외로 짚이는 구석이 있어!?」"

[[dialogue]]
speaker = "リーリア"
original = "「いやまぁ、伝説のハッカー・ジャスティスウィザードが欲しい組織なんていくらでもあると思いますけど……コラプサーの狙いはそこじゃないんでしょうね」"
translation = "「아니 뭐, 전설의 해커 저스티스 위저드를 원하는 조직 같은 건 얼마든지 있겠다고 생각하지만…… 콜랩서의 노림수는 그게 아니겠죠.」"

[[dialogue]]
speaker = "コハルコ"
original = "「その名前禁止だってば～！？」"
translation = "「그 이름 금지라고 했잖아~~!?」"

[[dialogue]]
speaker = "メテオラ"
original = "「なんだ、コハルコって悪いやつなのか？」"
translation = "「뭐야, 코하루코라는 건 나쁜 녀석이냐구?」"

[[dialogue]]
speaker = "コハルコ"
original = "「え～と、違法という意味ではそうかもしれないけど……でも私は、正しいと思ったことしかしてないから！」"
translation = "「그~게, 위법이라는 의미에서는 그럴지도 모르지만…… 하지만 나는 내가 옳다고 생각한 일밖에 하지 않았으니까!」"

[[dialogue]]
speaker = "コハルコ"
original = "「簡単にはやらせないよ！\u3000エクスプロイトシュート！」"
translation = "「쉽게 당해주진 않을 거야! 익스플로잇 슛!」"

[[dialogue]]
speaker = "メテオラ"
original = "「エンジュ、後ろだぞ！」"
translation = "「엔쥬, 뒤다구!」"

[[dialogue]]
speaker = "エンジュ"
original = "「死角からのドローン攻撃か」"
translation = "「사각에서의 드론 공격인가.」"

[[dialogue]]
speaker = "エンジュ"
original = "「残念ながら、あたしらには無駄だ。お互いで全方位をカバーするメテオラとあたしに死角はない」"
translation = "「안타깝지만 우리에겐 헛수고다. 서로가 전 방위를 커버하는 메테오라와 나에게 사각지대는 없어.」"

[[dialogue]]
speaker = "メテオラ"
original = "「そっちの魔女の弾は吸えないけど、おまえの星力はいただきだぞっ！」"
translation = "「그쪽 마녀의 탄환은 못 빨아들이지만, 네 성력은 받아 가겠다구!」"

[[dialogue]]
speaker = "コハルコ"
original = "「なるほど……連携の取れるコラプサーは思っていた以上に強敵ってわけだね……っ」"
translation = "「과연…… 연계가 잘 되는 콜랩서는 생각했던 것 이상으로 강적이라는 거네……윽.」"

[[dialogue]]
speaker = "unk"
original = "コラプサーの目的はなんなんだ？"
translation = "콜랩서의 목적은 무엇이지?"

[[dialogue]]
speaker = "メテオラ"
original = "「あたしたちは平和な世界を作るんだぞ！」"
translation = "「우리들은 평화로운 세상을 만드는 거라구!」"

[[dialogue]]
speaker = "エンジュ"
original = "「メテオラ、あまりお喋りは──まあ、いい。あたしたちの声は他の星騎士たちにも聞こえてるんだよな？」"
translation = "「메테오라, 너무 수다 떨지── 뭐, 좋아. 우리 목소리는 다른 성기사들에게도 들리고 있겠지?」"

[[dialogue]]
speaker = "エンジュ"
original = "「これは星騎士どもへの通達だ。あたしたちは、お前らからかき集めた星力を使って、リクリエのない世界を作る。それがコラプサーの救世だ」"
translation = "「이건 성기사 놈들에게 보내는 통달이다. 우리들은 너희에게서 긁어모은 성력을 사용해, 리크리에가 없는 세상을 만든다. 그것이 콜랩서의 구세다.」"

[[dialogue]]
speaker = "エンジュ"
original = "「そのためには、この女が必要なんだ。世界のために借りてくぞ」"
translation = "「그러기 위해서는 이 여자가 필요하다. 세상을 위해 빌려 가마.」"

[[dialogue]]
speaker = "unk"
original = "どうしてコハルコさんが必要なんだ？"
translation = "어째서 코하루코 씨가 필요한 거지?"

[[dialogue]]
speaker = "エンジュ"
original = "「知る必要はない。星騎士どもが無駄にしているこいつの力は、あたしらコラプサーが上手く活用する」"
translation = "「알 필요 없다. 성기사 놈들이 헛되이 쓰고 있는 이 녀석의 힘은 우리 콜랩서가 잘 활용해 주지.」"

[[dialogue]]
speaker = "メテオラ"
original = "「そーゆーわけだから、おとなしくさらわれろー！\u3000ご飯はちゃんと出すからなー！」"
translation = "「그렇게 된 거니까 얌전히 납치당하라구ー! 밥은 제대로 줄 테니까 말야!」"

[[dialogue]]
speaker = "ミア"
original = "「はぁ、はっ、はぁ……やっぱり強い……！」"
translation = "「하아, 하아…… 역시 강해……!」"

[[dialogue]]
speaker = "キサナ"
original = "「随分と頑張ったじゃねえか。そろそろお遊びは終わりに──ぁん……？\u3000ギャーギャーうるせぇぞ、てめぇ」"
translation = "「제법 버텼잖아. 슬슬 놀이는 끝내── 응……? 꺍꺍 시끄럽다고, 네놈.」"

[[dialogue]]
speaker = "ミア"
original = "「……何のこと？\u3000私じゃないわよ」"
translation = "「……무슨 소리야? 난 아무 말도 안 했어.」"

[[dialogue]]
speaker = "キサナ"
original = "「ぁん？\u3000なんだ、こりゃっ……！？\u3000脳ミソの中に、ぐわんぐわん声が響いてやがるっ……」"
translation = "「응? 뭐야 이건……!? 뇌 속에서 목소리가 윙윙 울리고 있잖아……」"

[[dialogue]]
speaker = "キサナ"
original = "「うるせぇ、うるせぇ、うるせぇっ……！\u3000頭がヘンになる、だろうが……この声を……声を、止めろぉおぉぉっ！」"
translation = "「시끄러워, 시끄러워, 시끄럽다고……! 머리가 이상해질 것 같잖아…… 이 목소리를…… 목소리를 멈춰어어억!」"

[[dialogue]]
speaker = "ミア"
original = "「ちょっと、いきなり、なに……？\u3000こいつ、どうしちゃったの……！？」"
translation = "「잠깐, 갑자기 뭐야……? 이 녀석, 어떻게 된 거야……!?」"

