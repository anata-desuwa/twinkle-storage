[[dialogue]]
speaker = "ウィステリア"
original = "「ほんとゴメンね！\u3000私が目を離した隙にあんなことになっちゃって」"
translation = "「정말 미안해! 내가 한눈판 사이에 그런 일이 벌어지다니.」"

[[dialogue]]
speaker = "モネ"
original = "「はぁ、はぁ……あの図書館はいったい何だったんですか？」"
translation = "「하아, 하아…… 그 도서관은 대체 뭐였나요?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「新星学園と私は、あれを“地下図書館”と呼んでいるわ」"
translation = "「신성학원과 나는 거길 “지하 도서관”이라고 부르고 있어.」"

[[dialogue]]
speaker = "モネ"
original = "「地下図書館？」"
translation = "「지하 도서관요?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「地下図書館の座標は、新星学園の真下、地下３０００メートル。本来なら図書館なんて存在しえない場所よ」"
translation = "「지하 도서관의 좌표는 신성학원 바로 밑, 지하 3000미터. 원래라면 도서관 같은 게 존재할 수 없는 장소지.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「なのにあの図書館は確かにある。星力か、はたまた他の力か……とにかく何かが作用しているのは間違いないわね」"
translation = "「그런데 그 도서관은 분명히 있어. 성력인지 아니면 다른 힘인지…… 아무튼 무언가가 작용하고 있는 건 틀림없어.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「そして、新星学園の図書館とは異空間を通じて繋がっている。危ないから普段は私が出入口を封印してるけど」"
translation = "「그리고 신성학원 도서관과는 이공간을 통해 이어져 있지. 위험하니까 평소엔 내가 출입구를 봉인해두는데.」"

[[dialogue]]
speaker = "イクシリオン"
original = "「あの偽物のウィステリアさんは？」"
translation = "「그 가짜 위스테리아 씨는요?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「地下図書館の防衛システムよ。私の姿と技を模倣して、侵入者を撃退しようとしているの。まぁ、私はいつも吹っ飛ばして進んでるけど」"
translation = "「지하 도서관의 방어 시스템이야. 내 모습과 기술을 모방해서 침입자를 격퇴하려는 거지. 뭐, 난 평소에 날려버리면서 전진하지만.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「私は普通の司書をする傍ら、新星学園の指示で地下図書館を調査しているわ」"
translation = "「나는 평범한 사서 일을 하는 곁다리로, 신성학원의 지시로 지하 도서관을 조사하고 있어.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「今のところ成果はほとんどないけどね。蔵書の解読も進んでないし」"
translation = "「아직 성과는 거의 없지만 말이야. 장서 해독도 진척이 안 됐고.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「紙屋敷さんが図書委員として頑張ってるから、私も成果を出そうと思って深く潜ってみたんだけど……入口のロックが外れちゃって２人が落ちちゃったみたい」"
translation = "「카미야시키 양이 도서위원으로서 노력하고 있으니까, 나도 성과를 내보려고 깊이 잠입해봤는데…… 입구 잠금이 풀리는 바람에 둘이 떨어진 모양이야.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「私のミスだわ。ごめんなさい」"
translation = "「내 실수야. 미안해.」"

[[dialogue]]
speaker = "イクシリオン"
original = "「いえ、助けていただいたのでそれはいいのですが……」"
translation = "「아뇨, 구해주셨으니 그건 괜찮습니다만……」"

[[dialogue]]
speaker = "モネ"
original = "「ウィステリアさんって星騎士だったんですか？」"
translation = "「위스테리아 씨는 성기사였나요?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「あ」"
translation = "「아.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「えーと……あー……うん、そうなのよ。一応流星学園のＯＧでね、学生時代は鳴かず飛ばずの目立たない星騎士だったわ……」"
translation = "「그게…… 저…… 응, 그래. 일단 유성학원 OG라서 말이야. 학생 시절엔 별 볼 일 없는 눈에 안 띄는 성기사였어……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「あの強さでそれは無理があると思います」"
translation = "「그 실력으로 그건 무리가 있다고 생각합니다.」"

[[dialogue]]
speaker = "モネ"
original = "「そうですよ、本当に強くない私の身にもなってください」"
translation = "「맞아요, 정말로 강하지 않은 제 입장도 좀 되어주세요.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「はい、ごめんなさい……」"
translation = "「네, 죄송합니다……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「……あれ？\u3000今の私が謝るところ？」"
translation = "「……어라? 지금 내가 사과할 타이밍인가?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「とにかく、私が星騎士だったことも含めて、このことは他の生徒には秘密にしておいて！\u3000お願い！」"
translation = "「아무튼 내가 성기사였다는 걸 포함해서, 이 일은 다른 학생들에겐 비밀로 해줘! 부탁해!」"

[[dialogue]]
speaker = "モネ"
original = "「わかりました」"
translation = "「알겠습니다.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ありがとう！」"
translation = "「고마워!」"

[[dialogue]]
speaker = "モネ"
original = "「その代わり、ウィステリアさんの余裕がある時でいいので、私も地下図書館に連れて行ってもらえませんか？」"
translation = "「대신 위스테리아 씨가 여유 있을 때라도 좋으니, 저도 지하 도서관에 데려가 주시면 안 될까요?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「えっ？」"
translation = "「에?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「私もまた行ってみたいです！」"
translation = "「저도 다시 가보고 싶습니다!」"

[[dialogue]]
speaker = "イクシリオン"
original = "（誰にも知られていない未知の図書館……きっと秘蔵のいやらし本があるに違いありません！）"
translation = "(아무에게도 알려지지 않은 미지의 도서관…… 분명 비장의 야한 책이 있음에 틀림없습니다!)"

[[dialogue]]
speaker = "ウィステリア"
original = "「イクシーさんも！？」"
translation = "「익실 씨까지!?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「はぁ、仕方ないわね……。もっと安全に探索できるようになって、学園の許可が出たら、一緒に連れて行ってあげる。それでいい？」"
translation = "「하아, 어쩔 수 없네……. 좀 더 안전하게 탐색할 수 있게 되고 학원 허가가 떨어지면 같이 데려가 줄게. 그걸로 됐니?」"

[[dialogue]]
speaker = "２人"
original = "「はい！」"
translation = "「네!」"

[[dialogue]]
speaker = "unk"
original = "それから数日──"
translation = "그로부터 며칠 뒤──"

[[dialogue]]
speaker = "モネ"
original = "「すみません、遅くなりましたっ」"
translation = "「죄송해요, 늦었습니다!」"

[[dialogue]]
speaker = "ウィステリア"
original = "「図書館大好きな紙屋敷さんが、図書委員の当番に遅れるなんて珍しいわね。何かあったの？」"
translation = "「도서관을 아주 좋아하는 카미야시키 양이 도서위원 당번에 늦다니 드문 일이네. 무슨 일 있었니?」"

[[dialogue]]
speaker = "モネ"
original = "「ここに来る途中、おすすめの本を知りたいって声をかけられちゃいまして。対応してたらこんな時間に……」"
translation = "「여기에 오는 길에 추천 도서를 알고 싶다고 말을 걸어오셔서요. 대응하다 보니 이 시간에……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「それなら仕方ないわね。図書委員のお仕事お疲れ様」"
translation = "「그렇다면 어쩔 수 없네. 도서위원 일하느라 수고했어.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「それにしても、紙屋敷さんは蔵書の内容だけじゃなくて、どの本がどこにあるかまで完璧に覚えているのね」"
translation = "「그나저나 카미야시키 양은 장서 내용뿐만 아니라 어느 책이 어디에 있는지도 완벽하게 기억하고 있구나.」"

[[dialogue]]
speaker = "モネ"
original = "「本は友達ですから。友達がどこにいるのか覚えているのは当然です」"
translation = "「책은 친구니까요. 친구가 어디에 있는지 기억하는 건 당연합니다.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ふふ、それもそうね」"
translation = "「후후, 그것도 그렇네.」"

[[dialogue]]
speaker = "モネ"
original = "「そして皆さんに紹介するために、新しく入った本を読みたいのですが……」"
translation = "「그리고 여러분께 소개해 드리기 위해 새로 들어온 책을 읽고 싶은데요……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ダ～メ。仕事しなさい」"
translation = "「안~ 돼. 일해.」"

[[dialogue]]
speaker = "モネ"
original = "「はーい」"
translation = "「네에─.」"

[[dialogue]]
speaker = "カティア"
original = "「モネせんぱーい」"
translation = "「모네 선배─.」"

[[dialogue]]
speaker = "モネ"
original = "「カティアさん、こんにちは。カティアさんが図書館に来てくれて嬉しいです」"
translation = "「카티아 씨, 안녕하세요. 카티아 씨가 도서관에 와주셔서 기뻐요.」"

[[dialogue]]
speaker = "カティア"
original = "「べ、別に本が好きになったわけじゃないんですからね」"
translation = "「따, 딱히 책이 좋아진 건 아니니까요.」"

[[dialogue]]
speaker = "モネ"
original = "「それでもいいんですよ。何かご用ですか？」"
translation = "「그래도 괜찮아요. 무슨 용건인가요?」"

[[dialogue]]
speaker = "カティア"
original = "「この前借りた図鑑と園芸の本なんですけど、これって延長とかできますか？」"
translation = "「지난번에 빌린 도감이랑 원예 책인데, 이거 연장 같은 거 할 수 있어요?」"

[[dialogue]]
speaker = "モネ"
original = "「確認します。……次の予約は入ってないので可能ですね。手続きしておきます」"
translation = "「확인해 볼게요. ……다음 예약이 없으니 가능하네요. 처리해 둘게요.」"

[[dialogue]]
speaker = "モネ"
original = "「ただ延長は１度までです。次の期限までには必ず返却お願いします」"
translation = "「다만 연장은 한 번뿐이에요. 다음 기한까지는 반드시 반납 부탁드려요.」"

[[dialogue]]
speaker = "カティア"
original = "「はーい」"
translation = "「네에─.」"

[[dialogue]]
speaker = "蛍火"
original = "「……」"
translation = "「…….」"

[[dialogue]]
speaker = "モネ"
original = "「あ、蛍火さん」"
translation = "「아, 케이카 씨.」"

[[dialogue]]
speaker = "蛍火"
original = "「先日お借りした本、とても興味深かったです。また料理に関する本をご紹介いただきたいのですが」"
translation = "「요전에 빌린 책, 무척 흥미로웠습니다. 다시 요리에 관한 책을 소개받고 싶은데요.」"

[[dialogue]]
speaker = "モネ"
original = "「蛍火さんのお眼鏡にかなったようで何よりです。でしたら中南米の料理の本なんていかがでしょう。発見があるかもしれませんよ」"
translation = "「케이카 씨의 마음에 드셨다니 다행이에요. 그렇다면 중남미 요리 책 같은 건 어떠신가요? 발견이 있을지도 몰라요.」"

[[dialogue]]
speaker = "蛍火"
original = "「確かにその地域の料理にはあまり明るくないですね。お借りします」"
translation = "「확실히 그 지역 요리에는 그리 밝지 않군요. 빌려 가겠습니다.」"

[[dialogue]]
speaker = "モネ"
original = "「どうぞ。この本の返却期限は２週間です」"
translation = "「여기요. 이 책의 반납 기한은 2주일입니다.」"

[[dialogue]]
speaker = "モネ"
original = "「受付落ち着いたので、返却された本を書架に戻してきますね」"
translation = "「접수가 진정됐으니 반납된 책을 서가에 돌려놓고 올게요.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ええ、私は拾得物のチェックをしてるわ」"
translation = "「응, 난 분실물을 체크하고 있을게.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「紙屋敷さんったら歩く図書館になっちゃった。大したものね」"
translation = "「카미야시키 양은 아주 걸어 다니는 도서관이 다 됐네. 대단한걸.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「私が何もしなくても図書館の利用者が増えたし、私よりよっぽど司書らしい気がするわ」"
translation = "「내가 아무것도 안 해도 도서관 이용자가 늘었고, 나보다 훨씬 사서다운 기분이 들어.」"

[[dialogue]]
speaker = "イクシリオン"
original = "「ふむふむ……赤ずきんの元になった物語には、女の子が服を脱ぐものがあったと」"
translation = "「흠흠…… 빨간 망토의 모태가 된 이야기 중에는 소녀가 옷을 벗는 것이 있었다고.」"

[[dialogue]]
speaker = "イクシリオン"
original = "「ベッドに潜むオオカミに騙されて、一枚一枚服を脱ぎ捨てていく赤ずきんちゃん……こう、ぐっと来るものがあります」"
translation = "「침대에 숨어 있는 늑대에게 속아 한 장 한 장 옷을 벗어 던지는 빨간 망토짱…… 이거 참 가슴이 뭉클해지는 게 있군요.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「手伝ってくれたのはありがたかったけど、イクシーさんのことは掴み切れなかったわね……」"
translation = "「도와준 건 고맙지만, 익실 씨는 당최 속을 모르겠단 말이지……」"

[[dialogue]]
speaker = "モネ"
original = "「戻りましたー」"
translation = "「다녀왔습니다─.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「おかえりなさい」"
translation = "「어서 오렴.」"

[[dialogue]]
speaker = "メルエル"
original = "「モネちゃん、また来たよ。あの小説、本当に胸がキュンキュンした！\u3000同じ作者さんの小説ってあるかな？」"
translation = "「모네짱, 또 왔어. 그 소설 정말 가슴이 뭉클했어! 같은 작가님의 소설이 또 있을까?」"

[[dialogue]]
speaker = "モネ"
original = "「もちろんです。実はあの作者さん、切ないお話も得意で、涙なしでは語れないと言っても過言ではありません」"
translation = "「물론이죠. 사실 그 작가님, 애절한 이야기도 잘 쓰셔서 눈물 없이 말할 수 없다고 해도 과언이 아니에요.」"

[[dialogue]]
speaker = "メルエル"
original = "「そうなの！？\u3000気になる～！」"
translation = "「정말!? 궁금해~!」"

[[dialogue]]
speaker = "ユーリス"
original = "「すみません、この前の続きを借りたいのですが……」"
translation = "「실례합니다, 지난번의 다음 권을 빌리고 싶은데요……」"

[[dialogue]]
speaker = "モネ"
original = "「こちらですね。１度に借りられるのは５冊までですので注意してください」"
translation = "「이쪽입니다. 한 번에 빌릴 수 있는 건 5권까지니 주의해 주세요.」"

[[dialogue]]
speaker = "ユーリス"
original = "「ありがとうございます。恥ずかしながら我が国は再建中で、自分も節約をしているので……無料で利用できるのは助かります」"
translation = "「감사합니다. 부끄럽게도 저희 나라는 재건 중이라 저 자신도 절약을 하고 있어서…… 무료로 이용할 수 있는 게 큰 도움이 됩니다.」"

[[dialogue]]
speaker = "サーシャ"
original = "「聞いたわよ～、出張図書コンシェルジュ、大成功ね～」"
translation = "「들었어~, 출장 도서 컨시어지 대성공이라며~.」"

[[dialogue]]
speaker = "アナ"
original = "「お見事」"
translation = "「훌륭해.」"

[[dialogue]]
speaker = "モネ"
original = "「えへへ……ありがとうございます。おふたりに話を聞いてもらったおかげです」"
translation = "「에헤헤…… 감사합니다. 두 분께서 이야기를 들어주신 덕분이에요.」"

[[dialogue]]
speaker = "アナ"
original = "「私は何もしていません」"
translation = "「전 아무것도 하지 않았습니다.」"

[[dialogue]]
speaker = "サーシャ"
original = "「そうよ～。モネちゃんにしては大胆な作戦だから驚いちゃった」"
translation = "「그래 그래~. 모네짱치고는 대담한 작전이라 놀랐는걸.」"

[[dialogue]]
speaker = "イクシリオン"
original = "「ふふ、大人気ですね、モネさん」"
translation = "「후후, 인기 만점이네요, 모네 씨.」"

[[dialogue]]
speaker = "モネ"
original = "「あはは……嬉しいやら恥ずかしいやら」"
translation = "「아하하…… 기쁘기도 하고 부끄럽기도 하고.」"

[[dialogue]]
speaker = "モネ"
original = "「イクシーさんも手伝ってくれてありがとうございました。思っていたよりうまくいって、私も本たちも喜んでいます」"
translation = "「익실 씨도 도와주셔서 감사했습니다. 생각보다 잘 풀려서 저도 책들도 기뻐하고 있어요.」"

[[dialogue]]
speaker = "モネ"
original = "「そしてこの流れを一時的なものにしないよう、これからも頑張っていきたいと思います」"
translation = "「그리고 이 흐름이 일시적인 것으로 끝나지 않도록 앞으로도 열심히 노력하고 싶어요.」"

[[dialogue]]
speaker = "イクシリオン"
original = "「さすがモネさん。図書委員の鑑です」"
translation = "「역시 모네 씨. 도서위원의 귀감입니다.」"

[[dialogue]]
speaker = "モネ"
original = "「もう、だから褒めすぎですってば」"
translation = "「정말, 그러니까 너무 칭찬하신다니까요.」"

[[dialogue]]
speaker = "モネ"
original = "（ゆくゆくはあの地下図書館も利用者が来ますように……と思うのは欲張りすぎでしょうか）"
translation = "(나중에는 그 지하 도서관에도 이용자가 오기를…… 하고 바라는 건 너무 큰 욕심일까요?)"

[[dialogue]]
speaker = "モネ"
original = "（あの図書館の子たちも読む人を待っている……そんな気がします）"
translation = "(그 도서관의 아이들도 읽어줄 사람을 기다리고 있다…… 그런 기분이 들어요.)"

[[dialogue]]
speaker = "ウィステリア"
original = "「紙屋敷さんのおかげで利用者が増えたし、これできっとクビも回避できたわね」"
translation = "「카미야시키 양 덕분에 이용자가 늘었으니 이걸로 분명 해고도 피했겠네.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「今日の仕事は……本の修繕と、企画会議と、新しく入れる本の選定と、書類作成と……あれ？\u3000いつもより仕事が立て込んでいるような……」"
translation = "「오늘 할 일은…… 책 수선이랑 기획 회의랑 신규 도서 선정에 서류 작성이랑…… 어라? 평소보다 일이 밀려 있는 것 같은데……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「って、このままじゃ残業じゃないっ。やっぱり不運だわ……」"
translation = "「아니, 이대로라면 잔업이잖아. 역시 불운해……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「でも……たまにはこういうのもいいわよね」"
translation = "「하지만…… 가끔은 이런 것도 괜찮네.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「さ、仕事仕事。これでも司書なんだから、紙屋敷さんには負けてられないわ」"
translation = "「자, 일하자 일. 이래 봬도 사서니까, 카미야시키 양에게 질 순 없지.」"

