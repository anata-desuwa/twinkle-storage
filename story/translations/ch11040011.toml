[[dialogue]]
speaker = "unk"
original = "第１話,憑依型女優の真骨頂（前編）,P"
translation = "제1화, 빙의형 여배우의 진면목 (전편), P"

[[dialogue]]
speaker = "unk"
original = "文化祭公演にて、藍との『ロミオとジュリエット』共演を終えた後──"
translation = "문화제 공연에서 아이와의 『로미오와 줄리엣』 공연을 마친 후──"

[[dialogue]]
speaker = "藍"
original = "「事務所のマネージャーさんも、文化祭の劇を見に来てくれてまして……会長さんの演技もすごく褒めてましたよ。とても初主演の素人とは思えないって」"
translation = "「사무소 매니저님도 문화제 연극을 보러 와 주셨는데…… 회장님의 연기도 무척 칭찬하셨어요. 도저히 첫 주연인 초보자라고는 생각되지 않는다고요.」"

[[dialogue]]
speaker = "unk"
original = "俺には慣れてくれたようで、視線を外されることなく、普通に会話ができるようになっていた。"
translation = "나에게 익숙해진 모양인지, 시선을 피하지 않고 평범하게 대화할 수 있게 되어 있었다."

[[dialogue]]
speaker = "藍"
original = "「あっ、会長さんには報告しておかなきゃ。今度、ドラマ出演が決まったんです！」"
translation = "「앗, 회장님께는 보고드려야겠네요. 이번에 드라마 출연이 결정됐어요!」"

[[dialogue]]
speaker = "unk"
original = "やったね、おめでとう！"
translation = "해냈구나, 축하해!"

[[dialogue]]
speaker = "藍"
original = "「ありがとうございます。文化祭での熱演がマネージャーさんの胸にも響いたそうで……会長さんのおかげです」"
translation = "「감사합니다. 문화제에서의 열연이 매니저님의 가슴에도 울렸다고 해서…… 회장님 덕분이에요.」"

[[dialogue]]
speaker = "藍"
original = "「出演といってもヒロインのレミカ先輩のクラスメイトっていう……出番はちょっとだけで、５分も映らないような端役なんですけどね」"
translation = "「출연이라고 해도 히로인인 레미카 선배의 클래스메이트라는…… 출연 분량은 아주 조금이고, 5분도 안 나오는 단역이지만요.」"

[[dialogue]]
speaker = "藍"
original = "「近いうちに、渋谷で撮影があるんです……あっ、恥ずかしいので、絶対に見に来ないでくださいね……絶対ですよ？」"
translation = "「머지않아 시부야에서 촬영이 있어요…… 앗, 부끄러우니까 절대 보러 오시면 안 돼요…… 절대예요?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それはフリね！\u3000絶対に見に行くしかないわ！」"
translation = "「그건 보러 오라는 뜻이네! 무조건 보러 갈 수밖에 없겠어!」"

[[dialogue]]
speaker = "unk"
original = "そのことが巡り巡ってヴィーナスの耳に届けば、こうなるのは自明の理。"
translation = "그 소식이 돌고 돌아 비너스의 귀에 들어가면, 이렇게 되는 건 자명한 이치."

[[dialogue]]
speaker = "ヴィーナス"
original = "「私も文化祭で藍のファンになったもの！\u3000今の内に未来の大女優からサインを貰っておいた方が良さそうね！」"
translation = "「나도 문화제에서 아이의 팬이 됐는걸! 지금 미리 미래의 대여배우님 사인을 받아두는 게 좋겠어!」"

[[dialogue]]
speaker = "アナ"
original = "「随分な青田買いですね。会長、ヴィーナス先輩の暴走ストッパー、よろしくお願いします」"
translation = "「대단한 선견지명이네요. 회장, 비너스 선배의 폭주 저지, 부탁드려요.」"

[[dialogue]]
speaker = "unk"
original = "よろしく任された……"
translation = "잘 부탁받았다……"

[[dialogue]]
speaker = "藍"
original = "「うわぁ、うわぁ……ドラマや映画で見たことある顔の人がいっぱい……！」"
translation = "「우와아, 우와아…… 드라마나 영화에서 본 적 있는 얼굴인 분들이 가득해……!」"

[[dialogue]]
speaker = "レミカ"
original = "「藍、今日はよろしくね。ポラリスプロダクションの役者は凄いんだってとこ、見せつけよう」"
translation = "「아이, 오늘은 잘 부탁해. 폴라리스 프로덕션 배우가 대단하다는 걸 보여주자고.」"

[[dialogue]]
speaker = "藍"
original = "「は、はいっ、レミカ先輩との初共演、が、が、頑張りましゅっ！」"
translation = "「네, 네엣, 레미카 선배와의 첫 공연, 여, 열, 열심히 하겠습니당!」"

[[dialogue]]
speaker = "レミカ"
original = "「あー、ガッチガチだね……文化祭のジュリエットみたいにメインじゃないし、もっと気楽に行こ？\u3000あんまり気張りすぎないように──って、あれ？」"
translation = "「아~ 긴장으로 굳어버렸네…… 문화제의 줄리엣처럼 메인이 아니니까 좀 더 편하게 하자? 너무 힘주지 말고── 어라?」"

[[dialogue]]
speaker = "レミカ"
original = "「ねぇ、藍、あそこにいるのって、会長とヴィーナス……だよね？」"
translation = "「있지, 아이, 저기 있는 거 회장이랑 비너스…… 맞지?」"

[[dialogue]]
speaker = "藍"
original = "「えっ……！？」"
translation = "「엣……!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「やっほ～、レミカに藍。応援に来たわ！」"
translation = "「야호~ 레미카에 아이. 응원하러 왔어!」"

[[dialogue]]
speaker = "藍"
original = "「か、会長さんっ！？\u3000来ないでって言ったのに、なんで来ちゃうんですかぁ！？」"
translation = "「회, 회장님!? 오지 말라고 했는데 왜 오시는 거예요어!?」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスの暴走は誰にも止められないんだ"
translation = "비너스의 폭주는 누구도 막을 수 없어."

[[dialogue]]
speaker = "unk"
original = "一応、止めたんだけど"
translation = "일단 말리긴 했는데."

[[dialogue]]
speaker = "ヴィーナス"
original = "「文化祭のジュリエット、とてもマーベラスだったわ！\u3000あなたに直接伝えたかったの！」"
translation = "「문화제의 줄리엣, 정말 마벨러스했어! 너한테 직접 전해주고 싶었거든!」"

[[dialogue]]
speaker = "藍"
original = "「あ、ありがとうございます。ヴィーナス先輩にそう言っていただけるなんて……とっても嬉しいです」"
translation = "「고, 감사합니다. 비너스 선배님께 그런 말을 듣다니…… 정말 기뻐요.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「でも、今回のはフリじゃなかったのね？\u3000ダメよ、そうならそうと、もっと上手に伝えてくれないと！」"
translation = "「하지만 이번 건 보러 오라는 뜻이 아니었나 보네? 안 돼, 그렇다면 그렇다고 좀 더 확실히 전해줬어야지!」"

[[dialogue]]
speaker = "藍"
original = "「えっ、ご、ごめんなさい……？\u3000ええ……？\u3000なんで私、怒られてるんですか……？\u3000ヴィーナス先輩、部長とは違った意味で手強い方ですね……」"
translation = "「엣, 죄, 죄송합니다……? 에에……? 왜 제가 혼나고 있는 거죠……? 비너스 선배님, 부장님과는 다른 의미로 까다로운 분이시네요……」"

[[dialogue]]
speaker = "女学生Ａ"
original = "「なになに、なんかの撮影？\u3000あっ！？\u3000あそこにいるのって、レミカちゃんじゃん！？\u3000実物ヤッバー！」"
translation = "「뭐야 뭐야, 무슨 촬영? 앗!? 저기 있는 거 레미카 짱 아냐!? 실물 대박!」"

[[dialogue]]
speaker = "女学生Ｂ"
original = "「マジ！？\u3000きゃわわの極み！\u3000顔面、天才すぎんでしょ！」"
translation = "「진짜!? 존예 보스! 얼굴 천재가 따로 없네!」"

[[dialogue]]
speaker = "レミカ"
original = "「あはは、応援ありがと♪」"
translation = "「아하하, 응원 고마워♪」"

[[dialogue]]
speaker = "女学生Ａ"
original = "「きゃーっ！\u3000ファンサも神ってるー！\u3000んで、レミカちゃんの横の背ぇ高い子って……誰？\u3000知ってるー？」"
translation = "「꺄악! 팬 서비스도 대박이야! 근데 레미카 짱 옆에 키 큰 애는…… 누구? 알아?」"

[[dialogue]]
speaker = "女学生Ｂ"
original = "「知んなーい。新人じゃん？\u3000可愛いけど花がないってゆーか、なんか地味めー。レミカちゃんしか勝たんし」"
translation = "「몰라. 신인 아냐? 예쁘긴 한데 아우라가 없달까, 뭔가 수수해. 레미카 짱이 최고지.」"

[[dialogue]]
speaker = "レミカ"
original = "「結構ギャラリー集まってきちゃったね。早めに撮らないとヤバそうだけど……」"
translation = "「구경꾼이 꽤 모여버렸네. 빨리 안 찍으면 위험하겠는데……」"

[[dialogue]]
speaker = "藍"
original = "「あわ、あわわわ、視線がいっぱい……！」"
translation = "「아와, 아와와와, 시선이 너무 많아……!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「人が集まってきたってことは、むしろ目立つチャンスじゃない。地味とか言ってた子たちに、カニみたく一泡吹かせてやりましょ！」"
translation = "「사람이 모였다는 건 오히려 눈에 띌 찬스잖아. 수수하다고 했던 애들에게 게처럼 거품 물게 해 주자고!」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスみたいにメンタルお化けじゃないから"
translation = "비너스처럼 강철 멘탈이 아니니까."

[[dialogue]]
speaker = "unk"
original = "藍の緊張はＭＡＸの中、撮影はスタートする。"
translation = "아이의 긴장이 최고조에 달한 가운데 촬영이 시작된다."

[[dialogue]]
speaker = "レミカ"
original = "「──ごめんなさい。いきなりアイドルグループになんて勧誘されても困るよね」"
translation = "「──미안해. 갑자기 아이돌 그룹에 권유받아도 곤란하겠지.」"

[[dialogue]]
speaker = "藍"
original = "「しょ、しょんなことっ、ない、よぉ！\u3000でも、あたしにはグループなんて、絶対無理、だ、しぃ……！」"
translation = "「그, 그렁 거, 아냐! 하지만 나한테 그룹 같은 건 절대 무리, 고……!」"

[[dialogue]]
speaker = "監督"
original = "「カット、カーット！\u3000キミぃ、ＮＧ何度目？」"
translation = "「컷, 컷! 학생, NG가 몇 번째야?」"

[[dialogue]]
speaker = "藍"
original = "「ひっ……！\u3000ご、ごめんなさい、ごめんなさい！」"
translation = "「히익……! 죄, 죄송합니다, 죄송합니다!」"

[[dialogue]]
speaker = "レミカ"
original = "「監督さん、彼女、大きな現場は初めてだから緊張しちゃってるんですよ。スイッチの入った彼女の演技は本当に凄いですから、期待しててください」"
translation = "「감독님, 얘가 큰 현장은 처음이라 긴장해서 그래요. 스위치가 켜진 얘 연기는 정말 대단하니까 기대해 주세요.」"

[[dialogue]]
speaker = "監督"
original = "「そうかい？\u3000レミカちゃんがそういうんなら間違いないんだろうけどさぁ……」"
translation = "「그래? 레미카 짱이 그렇게 말한다면 틀림없겠지만……」"

[[dialogue]]
speaker = "レミカ"
original = "「彼女が落ち着くまで、私だけでも撮れるシーン、先回しにできますか？\u3000──はい、ありがとうございます！」"
translation = "「얘가 진정될 때까지 저만 찍을 수 있는 장면부터 먼저 진행해도 될까요? ──네, 감사합니다!」"

[[dialogue]]
speaker = "藍"
original = "「レミカ先輩……ごめんなさい、主演ドラマを台無しにしちゃうような真似……！」"
translation = "「레미카 선배…… 죄송해요, 주연 드라마를 망쳐버리는 짓을……!」"

[[dialogue]]
speaker = "レミカ"
original = "「大丈夫、全然大丈夫。落ち着いてこ？\u3000会長、藍のこと、頼むね」"
translation = "「괜찮아, 전혀 괜찮아. 진정해 볼까? 회장, 아이 좀 부탁해.」"

[[dialogue]]
speaker = "藍"
original = "「はぁ……会長さんのおかげで、男の人にも少しは慣れたと思ったんですけど……やっぱりまだ苦手なままみたいです……私、ダメダメですね……」"
translation = "「하아…… 회장님 덕분에 남자분들에게도 조금은 익숙해졌다고 생각했는데…… 역시 아직 서툰 그대로인가 봐요…… 저, 엉망진창이네요……」"

[[dialogue]]
speaker = "unk"
original = "ダメダメなんかじゃないよ"
translation = "엉망진창 같은 게 아냐."

[[dialogue]]
speaker = "unk"
original = "場の緊張に加え、監督の圧にすっかりやられてしまっていた。"
translation = "현장의 긴장감에 더해 감독의 압박에 완전히 기가 눌려 있었다."

[[dialogue]]
speaker = "unk"
original = "それでも藍なら──藍の天才的な演技力があれば、この場を打開できる策がきっとあるはずだ。"
translation = "그래도 아이라면── 아이의 천재적인 연기력이라면 이 상황을 타개할 방법이 분명히 있을 것이다."

