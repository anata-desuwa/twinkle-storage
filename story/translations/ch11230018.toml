[[dialogue]]
speaker = "unk"
original = "リーエンの独特な表現を借りれば、俺は彼女のものになった。"
translation = "리엔의 독특한 표현을 빌리자면, 나는 그녀의 것이 되었다."

[[dialogue]]
speaker = "unk"
original = "一般的には、それを恋人になったと言う。"
translation = "일반적으로는 그것을 연인이 되었다고 말한다."

[[dialogue]]
speaker = "unk"
original = "リーエンはなかなか恋人とは認めようとしなかったけど、恋人っぽい行為自体は拒まなかった。"
translation = "리엔은 좀처럼 연인이라고 인정하려 하지 않았지만, 연인다운 행위 자체는 거부하지 않았다."

[[dialogue]]
speaker = "クロト"
original = "「お肉は薄切りと厚切り、どっちがいい？」"
translation = "「고기는 얇게 썬 거랑 두껍게 썬 거, 어느 쪽이 좋아?」"

[[dialogue]]
speaker = "リーエン"
original = "「厚切りだ。味付けはおまえに任せる」"
translation = "「두껍게 썬 거다. 양념은 네놈에게 맡기마」"

[[dialogue]]
speaker = "unk"
original = "俺が料理をすると知ってから、家に肉を食べに来てくれる。"
translation = "내가 요리를 한다는 걸 안 뒤부터, 집에 고기를 먹으러 와 준다."

[[dialogue]]
speaker = "unk"
original = "やり取りはあまり恋人っぽくないかもしれないな。"
translation = "나누는 대화는 별로 연인답지 않을지도 모르겠다."

[[dialogue]]
speaker = "unk"
original = "けど、それが普段のリーエンだ。恋人としてのリーエンは……意外なことにめちゃ甘で俺を満たしてくれるんだ。"
translation = "하지만 그것이 평소의 리엔이다. 연인으로서의 리엔은…… 의외로 엄청 달달하게 나를 채워준다."

[[dialogue]]
speaker = "リーエン"
original = "「あと……一応確認するけど……」"
translation = "「그리고…… 일단 확인하겠는데……」"

[[dialogue]]
speaker = "リーエン"
original = "「今日、おまえの母親は？」"
translation = "「오늘, 네놈의 어머니는?」"

[[dialogue]]
speaker = "クロト"
original = "「帰りは夜になるって言ってたよ」"
translation = "「밤늦게 오신다고 하셨어」"

[[dialogue]]
speaker = "リーエン"
original = "「そうか！\u3000なら……遊ぶ時間はありそうだな<emoji=heart04>」"
translation = "「그런가! 그렇다면…… 놀 시간은 있겠군<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ということで、遊びである。"
translation = "그리하여 놀이 시간이다."

[[dialogue]]
speaker = "unk"
original = "肉料理を素早く平らげたら、俺とリーエン、２人だけの時間が始まる。"
translation = "고기 요리를 재빠르게 해치우면, 나와 리엔, 둘만의 시간이 시작된다."

[[dialogue]]
speaker = "リーエン"
original = "「ほら……早くこっちに来い<emoji=heart04>」"
translation = "「자…… 빨리 이쪽으로 와라<emoji=heart04>」"

[[dialogue]]
speaker = "リーエン"
original = "「あたしの準備は万端だぞ。あとはおまえ次第だ」"
translation = "「나의 준비는 만반이다. 나머지는 네놈 하기 나름이다」"

[[dialogue]]
speaker = "リーエン"
original = "「今日も……沢山するぞ、ち○ちん遊び<emoji=heart04>」"
translation = "「오늘도…… 잔뜩 하자, 자지 놀이<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "すごい格好で、堂々たる宣言をしてくるリーエン。"
translation = "대단한 차림으로 당당하게 선언해 오는 리엔."

[[dialogue]]
speaker = "unk"
original = "いつからだったかリーエンは、俺との行為を『ち○ちん遊び』という風に呼び始めたのだ。"
translation = "언제부턴가 리엔은 나와의 행위를 『자지 놀이』라는 식으로 부르기 시작한 것이다."

[[dialogue]]
speaker = "リーエン"
original = "「肉を食う以外にも、何らかの息抜きが必要とは感じていたが、まさかおまえがこんな遊びを知っているとは思わなかったぞ」"
translation = "「고기를 먹는 것 외에도 무언가 휴식이 필요하다고 느끼긴 했지만, 설마 네놈이 이런 놀이를 알고 있을 줄은 몰랐다」"

[[dialogue]]
speaker = "リーエン"
original = "「早くち○ちんを大きくしろ。ぼっき……しないと、ち○ちん遊びができないからな」"
translation = "「빨리 자지를 크게 만들어라. 발기……하지 않으면 자지 놀이를 할 수 없으니까 말이다」"

[[dialogue]]
speaker = "リーエン"
original = "「っっ……し、しかし……最初はやはり恥ずかしいな。このように、肛門を見せて誘惑しなければならないなんて」"
translation = "「윽…… 하, 하지만…… 처음은 역시 부끄럽군. 이렇게 항문을 보여주며 유혹해야 하다니」"

[[dialogue]]
speaker = "unk"
original = "不器用にお尻を振りながら不平顔を見せているリーエンも、また可愛くて仕方がない。"
translation = "서툴게 엉덩이를 흔들며 불만스러운 얼굴을 하고 있는 리엔도 또 귀여워서 어쩔 수가 없다."

[[dialogue]]
speaker = "リーエン"
original = "「おい、ちゃんと見てるか？\u3000おまえが言ったんだぞ、あたしの……おしりの穴が見たいって。ち○ちん遊びに使うのは、もうひとつの……ま○こ穴だってのに」"
translation = "「어이, 제대로 보고 있나? 네놈이 말했잖나, 나의…… 똥구멍이 보고 싶다고. 자지 놀이에 쓰는 건 다른 하나인…… 보지 구멍인데도 말이다」"

[[dialogue]]
speaker = "リーエン"
original = "「くっ……早くしてくれ。おまえの視線を感じてうずうずしてきた」"
translation = "「큭…… 빨리 해다오. 네놈의 시선이 느껴져서 근질근질해지기 시작했다」"

[[dialogue]]
speaker = "リーエン"
original = "「うぁ……ふっ……く……思い出して興奮してきたぞ。ぬるぬるが……出るっ……」"
translation = "「우아…… 훗…… 윽…… 생각나서 흥분되기 시작했어. 미끈미끈한 게…… 나온다……」"

[[dialogue]]
speaker = "リーエン"
original = "「ふぁぁぁっ……はぁっ、はぁっ……また……ち○ちん遊びを始める前におもらししてしまった……」"
translation = "「후아아아…… 하아, 하아…… 또…… 자지 놀이를 시작하기 전에 지려버렸어……」"

[[dialogue]]
speaker = "リーエン"
original = "「い、今ので興奮したのか？\u3000本当におまえは……その、なんだ……スケベなやつめ<emoji=heart04>」"
translation = "「지, 지금 걸로 흥분한 건가? 정말이지 네놈은…… 그, 뭐냐…… 변태 같은 녀석이군<emoji=heart04>」"

[[dialogue]]
speaker = "リーエン"
original = "「ち○ちんがぼっきしたなら、もういいだろう。早く……それをあたしの……ま、ま○こ穴に……ハメてくれっ<emoji=heart04>」"
translation = "「자지가 발기했다면 이제 됐겠지. 빨리…… 그것을 나의…… 보, 보지 구멍에…… 박아다오<emoji=heart04>」"

[[dialogue]]
speaker = "リーエン"
original = "「んやぁぁぁっ！！\u3000んにゃあっ！\u3000はぁぁんっ！！」"
translation = "「응야아아아앗!! 응냐앗! 하아앙!!」"

[[dialogue]]
speaker = "unk"
original = "ペニスを挿入した刺激で尻尾がピンと立ち、リーエンのしなやかな身体が硬直する。"
translation = "페니스를 삽입한 자극에 꼬리가 꼿꼿이 서고, 리엔의 유연한 몸이 경직된다."

[[dialogue]]
speaker = "リーエン"
original = "「ち○ちん……入ってきたぁぁ<emoji=heart04>」"
translation = "「자지…… 들어왔어어<emoji=heart04>」"

[[dialogue]]
speaker = "リーエン"
original = "「やっぱりこれ、好きだぁ<emoji=heart04>\u3000こんな気持ちいいことあるって、陛下も教えてくれなかったのに……んにゃ<emoji=heart04>\u3000にゃあんっ<emoji=heart04>\u3000にゃ<emoji=heart04>」"
translation = "「역시 이거, 좋아아<emoji=heart04> 이런 기분 좋은 게 있다는 거, 폐하도 가르쳐주지 않으셨는데…… 응냐<emoji=heart04> 냐앙<emoji=heart04> 냐<emoji=heart04>」"

[[dialogue]]
speaker = "リーエン"
original = "「おまえはずるい……戦闘もあたしに匹敵するくらい強いのにっ……んにゃ<emoji=heart04>\u3000ふにゃっ<emoji=heart04>\u3000こ、こんなにち○ちんも強いにゃんてぇぇっっ<emoji=heart04>」"
translation = "「네놈은 치사해…… 전투도 나에게 필적할 만큼 강하면서…… 응냐<emoji=heart04> 후냐<emoji=heart04> 이, 이렇게 자지도 강하다니이이잇<emoji=heart04>」"

[[dialogue]]
speaker = "リーエン"
original = "「自分にこんな弱い場所があるなんて知らなかったっ……おまえのち○ちんで奥までずぷ～～ってされると……んにゃぁぁっ<emoji=heart04>\u3000にゃあんっ<emoji=heart04>\u3000にゃあ<emoji=heart04>」"
translation = "「자신에게 이렇게 약한 곳이 있는 줄 몰랐어…… 네놈의 자지로 안쪽까지 푸슈우우욱 하고 들어오면…… 응냐아아앗<emoji=heart04> 냐앙<emoji=heart04> 냐아<emoji=heart04>」"

[[dialogue]]
speaker = "リーエン"
original = "「こんなメス猫みたいな声出ちゃって……だめっ……んんんぅっ！\u3000はにゃ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000にゃ<emoji=heart04>\u3000にゃ<emoji=heart04>\u3000にゃああああっ<emoji=heart04>」"
translation = "「이런 암고양이 같은 소리가 나와버려서…… 안 돼…… 응으으윽! 하냐<emoji=heart04> 아앙<emoji=heart04> 냐<emoji=heart04> 냐<emoji=heart04> 냐아아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "リーエン"
original = "「こらっ！\u3000こりゃぁっっ<emoji=heart04>\u3000あたしを揺らすにゃあ<emoji=heart04>\u3000にゃ<emoji=heart04>\u3000こんなのっ、気持ちいいじゃないかっ<emoji=heart04>」"
translation = "「이봐! 이리이이이잇<emoji=heart04> 나를 흔들지 마아<emoji=heart04> 냐<emoji=heart04> 이런 거, 기분 좋지 않냐고오<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ピストンを始めた俺に、たまらず抗議するリーエン。"
translation = "피스톤을 시작한 나에게 참지 못하고 항의하는 리엔."

[[dialogue]]
speaker = "unk"
original = "だがその抗議も抗議になっておらず、すぐにその声は甘く蕩け始める。"
translation = "하지만 그 항의도 항의가 되지 못하고, 금세 그 목소리는 달콤하게 녹아내리기 시작한다."

[[dialogue]]
speaker = "リーエン"
original = "「あ、ふ、はぅ、にゃ、あ、んんんっ……にゃっ、にゃ、にゃん……にゃ、あぁあんっ<emoji=heart04>」"
translation = "「아, 후, 하으, 냐, 아, 응으으윽…… 냐, 냐, 냥…… 냐, 아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "リーエン"
original = "「こんなの覚えたらっ、あたしっ<emoji=heart04>\u3000ち○ちん遊びばっかりしちゃうにゃあああっ<emoji=heart04>」"
translation = "「이런 거 배워버리면, 나아<emoji=heart04> 자지 놀이만 하게 되어버려어어엇<emoji=heart04>」"

[[dialogue]]
speaker = "リーエン"
original = "「はにゃんっ<emoji=heart04>\u3000にゃっ<emoji=heart04>\u3000にゃっ<emoji=heart04>\u3000だめっ<emoji=heart04>\u3000ずんずんするにゃあああっ<emoji=heart04>\u3000はにゃっ<emoji=heart04>\u3000へんな声出ちゃうっ<emoji=heart04>\u3000うにゃっ<emoji=heart04>\u3000にゃん<emoji=heart04>\u3000にゃん<emoji=heart04>\u3000にゃん<emoji=heart04>」"
translation = "「하냥<emoji=heart04> 냐<emoji=heart04> 냐<emoji=heart04> 안 돼<emoji=heart04> 쿡쿡 찔러대냐아아앗<emoji=heart04> 하냐<emoji=heart04> 이상한 소리 나와버려어<emoji=heart04> 우냐<emoji=heart04> 냥<emoji=heart04> 냥<emoji=heart04> 냥<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "子猫のような可愛らしい鳴き声を上げながら、リーエンは身を捩る。"
translation = "새끼 고양이 같은 사랑스러운 울음소리를 내며 리엔은 몸을 비튼다."

[[dialogue]]
speaker = "リーエン"
original = "「そこっ<emoji=heart04>\u3000そこ好きぃぃっ<emoji=heart04>\u3000気持ちいい<emoji=heart04>\u3000気持ちいいのっ<emoji=heart04>\u3000こんなっ、弱いとこばっかち○ちんでぐりゅぐりゅされたらぁっ、あたしっ、あたしっっ<emoji=heart04>」"
translation = "「거기<emoji=heart04> 거기 좋아아아앗<emoji=heart04> 기분 좋아 기분 좋아아<emoji=heart04> 이런, 약한 곳만 자지로 휘저어지면, 나, 나아앗<emoji=heart04>」"

[[dialogue]]
speaker = "リーエン"
original = "「陛下の剣なのにっ、武人なのにっっ……」"
translation = "「폐하의 검인데, 무인인데에……」"

[[dialogue]]
speaker = "リーエン"
original = "「にゃんこになっちゃうにゃあああああ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「고양이가 되어버려어어어어어~~~~엇<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "（にゃんこリーエン……ホント可愛い……）"
translation = "(고양이 리엔…… 진짜 귀여워……)"

[[dialogue]]
speaker = "リーエン"
original = "「にゃ、にゃんだ、その目はっ……にゃ、んんぅっ……<emoji=heart04>」"
translation = "「냐, 냐냐, 그 눈은 뭐야…… 냐, 응우으……<emoji=heart04>」"

[[dialogue]]
speaker = "リーエン"
original = "「おまえっ……んんっ……わかってるのか？\u3000あたしは魔族なんだぞっ、猫じゃないんだからな！」"
translation = "「네놈…… 응…… 알고 있는 거냐? 나는 마족이라고, 고양이가 아니란 말이다!」"

[[dialogue]]
speaker = "リーエン"
original = "「うにゃ<emoji=heart04>\u3000にゃああんっ<emoji=heart04>\u3000だから突くにゃ！\u3000こりゃ！\u3000にゃあっ<emoji=heart04>\u3000んにゃ<emoji=heart04>\u3000にゃっ<emoji=heart04>\u3000にゃはあぁぁんっっ<emoji=heart04>」"
translation = "「우냐<emoji=heart04> 냐아앙<emoji=heart04> 그러니까 찌르지 마냐! 이놈! 냐앗<emoji=heart04> 응냐<emoji=heart04> 냐<emoji=heart04> 냐하아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「うん、そうだね、お腹もいっぱい撫でてあげようね……よしよし……」"
translation = "「응, 그렇지, 배도 잔뜩 쓰다듬어 줄게…… 착하다 착해……」"

[[dialogue]]
speaker = "リーエン"
original = "「にゃ、うぅぅううう……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「냐, 우으으으으으……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "リーエン"
original = "「っっ、や、やめ……はぁっ……はぁっ……このあたしを……猫扱いしてぇぇ……許せんにゃ<emoji=heart04>」"
translation = "「윽, 그, 그만…… 하아…… 하아…… 이 나를…… 고양이 취급하다니이…… 용서 못 하냐<emoji=heart04>」"

[[dialogue]]
speaker = "リーエン"
original = "「あ、違う、これはつい出ちゃっただけで……うううう～、ち○ちん遊びではおまえに負けっぱなしだからな……」"
translation = "「아, 아냐, 이건 무심코 나온 것뿐이고…… 으으으으~, 자지 놀이에서는 네놈에게 계속 지기만 하니까……」"

[[dialogue]]
speaker = "リーエン"
original = "「出ないように我慢しても……にゃあって言っちゃう……にゃあ……<emoji=heart04>」"
translation = "「안 나오게 참으려고 해도…… 냐아라고 해버려…… 냐아……<emoji=heart04>」"

[[dialogue]]
speaker = "リーエン"
original = "「でも、こんな気持ちいいの耐えるのは無理にゃあ<emoji=heart04>\u3000早くっ<emoji=heart04>\u3000もっとま○こほじって<emoji=heart04>\u3000うにゃっ<emoji=heart04>\u3000にゃっ<emoji=heart04>\u3000にゃんっ<emoji=heart04>\u3000にゃあああああっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하지만 이런 기분 좋은 거 참는 건 무리냐아<emoji=heart04> 빨리<emoji=heart04> 더 보지 파헤쳐줘<emoji=heart04> 우냐<emoji=heart04> 냐<emoji=heart04> 냥<emoji=heart04> 냐아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "リーエン"
original = "「これ好きっ<emoji=heart04>\u3000もっとち○ちん遊びしたいっ<emoji=heart04>\u3000はにゃっ<emoji=heart04>\u3000にゃん<emoji=heart04>\u3000にゃん<emoji=heart04>\u3000うにゃあああああっ<emoji=heart04>」"
translation = "「이거 좋아<emoji=heart04> 더 자지 놀이 하고 싶어<emoji=heart04> 하냐<emoji=heart04> 냥<emoji=heart04> 냥<emoji=heart04> 우냐아아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "リーエン"
original = "「はぁ……はぁ……しっぽのとこも……して……<emoji=heart04>\u3000付け根のとこ、トントンして欲しい……にゃ<emoji=heart04>」"
translation = "「하아…… 하아…… 꼬리 쪽도…… 해줘……<emoji=heart04> 뿌리 쪽, 톡톡 두드려 줬으면 좋겠어…… 냐<emoji=heart04>」"

[[dialogue]]
speaker = "リーエン"
original = "「にゃ<emoji=heart04>\u3000にゃん<emoji=heart04>\u3000そこっ<emoji=heart04>\u3000トントン好きぃぃ<emoji=heart04>\u3000はにゃっ<emoji=heart04>\u3000にゃっ<emoji=heart04>\u3000にゃあああぁっ<emoji=heart04>\u3000気持ちいい<emoji=heart04>\u3000おなかの奥うずうずしちゃうにゃあああっ<emoji=heart04>」"
translation = "「냐<emoji=heart04> 냥<emoji=heart04> 거기<emoji=heart04> 톡톡거리는 거 좋아아아<emoji=heart04> 하냐<emoji=heart04> 냐<emoji=heart04> 냐아아아앗<emoji=heart04> 기분 좋아 배 안쪽이 근질근질해져냐아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "リーエン"
original = "「はぁん<emoji=heart04>\u3000にゃ<emoji=heart04>\u3000にゃん<emoji=heart04>\u3000んやぁぁぁっ<emoji=heart04>\u3000もっとしてぇ<emoji=heart04>\u3000速くっ<emoji=heart04>\u3000ち○ちん出し入れするのっ、もっと速くするにゃああぁっっ<emoji=heart04>」"
translation = "「하앙<emoji=heart04> 냐<emoji=heart04> 냥<emoji=heart04> 응야아아앗<emoji=heart04> 더 해줘<emoji=heart04> 빠르게<emoji=heart04> 자지 왔다 갔다 하는 거, 더 빠르게 해냐아아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "リーエン"
original = "「んにゃ！\u3000にゃっ<emoji=heart04>\u3000にゃ<emoji=heart04>\u3000にゃっ<emoji=heart04>\u3000すごいっ、にゃ<emoji=heart04>」"
translation = "「응냐! 냐<emoji=heart04> 냐<emoji=heart04> 냐<emoji=heart04> 굉장해, 냐<emoji=heart04>」"

[[dialogue]]
speaker = "リーエン"
original = "「ま○こぐちゅぐちゅいってるにゃあああっ<emoji=heart04>\u3000あたしのぬるぬるでっ、えっちな音出てるっ……にゃぁぁぁっ<emoji=heart04>」"
translation = "「보지에서 꾸덕꾸덕 소리 나냐아아앗<emoji=heart04> 나의 애액으로, 야한 소리 나고 있어…… 냐아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "リーエン"
original = "「そのまましっぽも<emoji=heart04>\u3000頼む、にゃっ<emoji=heart04>\u3000もっとして<emoji=heart04>\u3000あたしをおかしくして欲しいにゃあああ～～～っ<emoji=heart04>」"
translation = "「그대로 꼬리도<emoji=heart04> 부탁한다, 냐<emoji=heart04> 더 해줘 나를 이상하게 만들어 줬으면 좋겠어냐아아아아~~~~앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「こんな感じかな……？」"
translation = "「이런 느낌일까……?」"

[[dialogue]]
speaker = "unk"
original = "ピストンを速めながら逆立った尻尾を撫でてあげると、リーエンの膣がペニスをキュッと締めつけてくる。"
translation = "피스톤 속도를 높이면서 곤두선 꼬리를 쓰다듬어 주자, 리엔의 질이 페니스를 꽉 조여 온다."

[[dialogue]]
speaker = "リーエン"
original = "「うにゃ<emoji=heart04>\u3000にゃん<emoji=heart04>\u3000にゃん<emoji=heart04>\u3000にゃぁぁんっ<emoji=heart04>\u3000ふにゃあああああっ<emoji=heart04>\u3000気持ちよすぎるにゃあああっ<emoji=heart04>\u3000はにゃっ<emoji=heart04>\u3000ち○ちんすごいっ<emoji=heart04>\u3000すごいぃぃっ、にゃあ<emoji=heart04>」"
translation = "「우냐<emoji=heart04> 냥<emoji=heart04> 냥<emoji=heart04> 냐아아앙<emoji=heart04> 후냐아아아아앗<emoji=heart04> 너무 기분 좋아냐아아앗<emoji=heart04> 하냐<emoji=heart04> 자지 굉장해 굉장해애, 냐아<emoji=heart04>」"

[[dialogue]]
speaker = "リーエン"
original = "「うううっ、おなかいっぱい揺らされてっ、すっかり出来上がっちゃった、にゃあ<emoji=heart04>\u3000おまえっ……まだ？\u3000子種っ<emoji=heart04>\u3000おまえの子種欲しくなってきちゃった、にゃあぁぁっっ<emoji=heart04>」"
translation = "「우우으, 배가 잔뜩 흔들려서 완전히 가버렸어, 냐아<emoji=heart04> 네놈…… 아직? 씨앗<emoji=heart04> 네놈의 씨앗이 갖고 싶어지기 시작했어, 냐아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "リーエン"
original = "「あんなのっ、臭くて<emoji=heart04>\u3000苦くて<emoji=heart04>\u3000ばっちいのに<emoji=heart04>\u3000なんであたしは大好きになっちゃったんだ……ふにゃぁぁ～～～っ<emoji=heart04>」"
translation = "「저런 거, 냄새나고<emoji=heart04> 쓰고<emoji=heart04> 지저분한데<emoji=heart04> 왜 나는 너무 좋아하게 되어버린 거냐…… 후냐아아~~~~앗<emoji=heart04>」"

[[dialogue]]
speaker = "リーエン"
original = "「ち○ちん激しくしていいからっ<emoji=heart04>\u3000早くっ<emoji=heart04>\u3000早くおまえの子種出してっっ<emoji=heart04>\u3000あたしのま○こにいっぱいかけて欲しいにゃああああっ<emoji=heart04>」"
translation = "「자지 격하게 해도 되니까<emoji=heart04> 빨리<emoji=heart04> 빨리 네놈의 씨앗 내보내줘어<emoji=heart04> 나의 보지에 잔뜩 뿌려줬으면 좋겠어냐아아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リーエンが叫ぶ。それは完全に降参させられてしまった獣の叫びだった。"
translation = "리엔이 절규한다. 그것은 완전히 굴복당해 버린 짐승의 외침이었다."

[[dialogue]]
speaker = "リーエン"
original = "「はぁん<emoji=heart04>\u3000んあっ<emoji=heart04>\u3000んにゃあっ<emoji=heart04>\u3000にゃん<emoji=heart04>\u3000にゃん<emoji=heart04>\u3000にゃんっっ<emoji=heart04>\u3000うにゃああああっ<emoji=heart04>\u3000にゃあ！\u3000にゃ！\u3000だめになるっ……にゃ<emoji=heart04>\u3000あたしっ<emoji=heart04>\u3000あたしぃっっ<emoji=heart04>」"
translation = "「하앙<emoji=heart04> 응앗<emoji=heart04> 응냐앗<emoji=heart04> 냥<emoji=heart04> 냥<emoji=heart04> 냥앗<emoji=heart04> 우냐아아아앗<emoji=heart04> 냐아! 냐! 이상해져버려…… 냐<emoji=heart04> 나, 나아앗<emoji=heart04>」"

[[dialogue]]
speaker = "リーエン"
original = "「奥のとこ<emoji=heart04>\u3000ぐりぐりするの、好きにゃあ～<emoji=heart04>\u3000もっとそこ、いじめてっっ<emoji=heart04>\u3000にゃ<emoji=heart04>\u3000それ気持ちいい<emoji=heart04>\u3000好きっ<emoji=heart04>\u3000好きにゃああ～～～っっ<emoji=heart04>」"
translation = "「안쪽 부분<emoji=heart04> 꾹꾹 누르는 거 좋아냐아~<emoji=heart04> 더 거기 괴롭혀줘어<emoji=heart04> 냐<emoji=heart04> 그거 기분 좋아 좋아<emoji=heart04> 좋아냐아아~~~~앗<emoji=heart04>」"

[[dialogue]]
speaker = "リーエン"
original = "「も、もうあたし限界にゃああっ<emoji=heart04>\u3000おまえっっ<emoji=heart04>\u3000ふにゃあっ<emoji=heart04>\u3000にゃんっ<emoji=heart04>\u3000うにゃっ<emoji=heart04>\u3000にゃあああっ<emoji=heart04>\u3000好き<emoji=heart04>\u3000好き好き好きぃ～～～っ<emoji=heart04>\u3000んにゃあああっ<emoji=heart04>」"
translation = "「이, 이제 나 한계냐아아앗<emoji=heart04> 네놈으으윽<emoji=heart04> 후냐앗<emoji=heart04> 냥앗<emoji=heart04> 우냐앗<emoji=heart04> 냐아아아앗<emoji=heart04> 좋아<emoji=heart04> 좋아좋아좋아아아~~~~앗<emoji=heart04> 응냐아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "リーエン"
original = "「はにゃっ<emoji=heart04>\u3000にゃん<emoji=heart04>\u3000にゃっ<emoji=heart04>\u3000すごい、にゃっ<emoji=heart04>\u3000にゃっ<emoji=heart04>\u3000にゃっ<emoji=heart04>\u3000んにゃっ<emoji=heart04>\u3000も、もう出る？\u3000子種出ちゃう、にゃ？\u3000いいぞ、いくらでもあたしにっっ<emoji=heart04>」"
translation = "「하냐<emoji=heart04> 냥<emoji=heart04> 냐<emoji=heart04> 굉장해, 냐<emoji=heart04> 냐<emoji=heart04> 냐<emoji=heart04> 응냐<emoji=heart04> 이, 이제 나와? 씨앗 나와버려, 냐? 괜찮다, 얼마든지 나에게에에<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リーエンの察した通り、俺のペニスも爆発寸前だった。"
translation = "리엔이 짐작한 대로, 내 페니스도 폭발 직전이었다."

[[dialogue]]
speaker = "unk"
original = "息を荒げながら、リーエンの膣内を白濁としたもので満たす事だけを考え、身体を激しく打ちつける。"
translation = "거친 숨을 몰아쉬며 리엔의 질 안을 백탁액으로 채우는 것만을 생각하며 몸을 격렬하게 부딪친다."

[[dialogue]]
speaker = "リーエン"
original = "「ち○ちん遊び、だからっ<emoji=heart04>\u3000遊びの種付けっ<emoji=heart04>\u3000していいにゃああぁっ<emoji=heart04>\u3000あたしのおなかパンパンになるくらいっ、おまえの子種でっ<emoji=heart04>\u3000あたしを満たして欲しいにゃあああっ<emoji=heart04>」"
translation = "「자지 놀이, 니까<emoji=heart04> 놀이의 씨내리기<emoji=heart04> 해도 좋아냐아아앗<emoji=heart04> 나의 배가 빵빵해질 정도로, 네놈의 씨앗으로<emoji=heart04> 나를 채워줬으면 좋겠어냐아아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "リーエン"
original = "「にゃん<emoji=heart04>\u3000にゃっ<emoji=heart04>\u3000にゃっ<emoji=heart04>\u3000ふにゃああああっ<emoji=heart04>\u3000もう待てない、にゃあっ<emoji=heart04>\u3000早くっ<emoji=heart04>\u3000早く子種かけてっ<emoji=heart04>\u3000こねこちゃんできちゃうっ<emoji=heart04>\u3000にゃ、にゃあああっ<emoji=heart04>」"
translation = "「냥<emoji=heart04> 냐<emoji=heart04> 냐<emoji=heart04> 후냐아아아아앗<emoji=heart04> 이제 못 기다려, 냐앗<emoji=heart04> 빨리<emoji=heart04> 빨리 씨앗 뿌려줘<emoji=heart04> 아기 고양이 생겨버려어<emoji=heart04> 냐, 냐아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "リーエン"
original = "「あたしも無理<emoji=heart04>\u3000無理にゃああぁっ<emoji=heart04>\u3000うにゃっ<emoji=heart04>\u3000にゃっ<emoji=heart04>\u3000にゃぁぁっ<emoji=heart04>」"
translation = "「나도 이제 무리 무리냐아아앗<emoji=heart04> 우냐<emoji=heart04> 냐<emoji=heart04> 냐아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "リーエン"
original = "「ふにゃあああああぁああ～～～～～んっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후냐아아아아아아아아~~~~~~앙<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "リーエン"
original = "「んにゃ……びゅくっ、びゅくって……出てる……にゃあ<emoji=heart04>」"
translation = "「응냐…… 꿀렁, 꿀렁하고…… 나오고 있어…… 냐아<emoji=heart04>」"

[[dialogue]]
speaker = "リーエン"
original = "「はぁぁ～～～っ……んんっ……おなかでビチビチ言ってる……んにゃあ<emoji=heart04>\u3000あたし、これ好きぃ<emoji=heart04>\u3000気持ちよすぎて……とろ～～んとなっちゃう……にゃ<emoji=heart04>」"
translation = "「하아아~~~~…… 응…… 배 안에서 꿈틀꿈틀 거려…… 응냐아<emoji=heart04> 나, 이거 좋아아<emoji=heart04> 너무 기분 좋아서…… 황홀해져버려…… 냐<emoji=heart04>」"

[[dialogue]]
speaker = "リーエン"
original = "「んぅ……ふにゃ……にゃぁぁ……はぁ……はぁ……今日もまた、こんなに……ち○ちん遊びしちゃった……にゃ……」"
translation = "「음…… 후냐…… 냐아…… 하아…… 하아…… 오늘도 또 이렇게…… 자지 놀이 해버렸어…… 냐……」"

[[dialogue]]
speaker = "リーエン"
original = "「すごく……気持ちよかった……にゃぁぁぁ……こんなの続けたら、あたしもだめになるにゃぁぁ<emoji=heart04>」"
translation = "「무척…… 기분 좋았어…… 냐아아아…… 이런 거 계속하면 나도 망가져버려냐아아아<emoji=heart04>」"

[[dialogue]]
speaker = "リーエン"
original = "「それもこれも……おまえのち○ちんのせいにゃ……あたしを……こんな猫みたいにさせちゃう……ずるいち○ちん……にゃ<emoji=heart04>」"
translation = "「이것도 저것도…… 네놈의 자지 때문냐…… 나를…… 이런 고양이처럼 만들고…… 치사한 자지…… 냐<emoji=heart04>」"

[[dialogue]]
speaker = "リーエン"
original = "「んんっ……怒ってるわけじゃ……ない、ぞ……あたしだって……おまえとち○ちん遊びするの、好きだし……」"
translation = "「응…… 화난 건…… 아니, 라고…… 나도…… 네놈이랑 자지 놀이 하는 거 좋고……」"

[[dialogue]]
speaker = "リーエン"
original = "「ふぁぁっ……勢い収まってきた……んんっ、このまま全部出し切るまで……あたしのま○こに入ってて欲しい……にゃ<emoji=heart04>」"
translation = "「후아아…… 기세가 줄어들었어…… 응, 이대로 전부 다 쏟아낼 때까지…… 나의 보지 안에 있어 줬으면 좋겠어…… 냐<emoji=heart04>」"

[[dialogue]]
speaker = "リーエン"
original = "「んふぅぅっ……んんっ……くっ……ふにゅ……もう……おしまい？」"
translation = "「음후우…… 응…… 큭…… 후뉴…… 이제…… 끝이야?」"

[[dialogue]]
speaker = "クロト"
original = "「全部出たよ。ありがとう、リーエン。気持ちよかった」"
translation = "「전부 나왔어. 고마워, 리엔. 기분 좋았어」"

[[dialogue]]
speaker = "リーエン"
original = "「礼は不要にゃ！\u3000っと……不要だ！\u3000だっておまえはあたしのもので……だから、あたしもおまえのものなんだぞ！」"
translation = "「인사는 필요 없냐! 앗…… 필요 없다! 어차피 네놈은 나의 것이고…… 그러니까 나도 네놈의 것이니까 말이다!」"

[[dialogue]]
speaker = "クロト"
original = "「うん、知ってるよ」"
translation = "「응, 알고 있어」"

[[dialogue]]
speaker = "リーエン"
original = "「んんにゅううう～～～～っ<emoji=heart04>\u3000ち○ちん抜いちゃやあぁぁっ……」"
translation = "「음음유우우우~~~~<emoji=heart04> 자지 빼지 마아아앗……」"

[[dialogue]]
speaker = "リーエン"
original = "「ふにゃ……にゃ……ち○ちん……まだ、いて欲しかったのにぃぃ……」"
translation = "「후냐…… 냐…… 자지…… 더 있어 줬으면 했는데에……」"

[[dialogue]]
speaker = "リーエン"
original = "「にゃ……おまえの子種、出ちゃう……どろぉぉ～～～って……やぁぁっ<emoji=heart04>\u3000にゃっ<emoji=heart04>\u3000にゃああ～～～～っ……」"
translation = "「냐…… 네놈의 씨앗, 나와버려…… 주르르으윽 하고…… 싫어어<emoji=heart04> 냐앗<emoji=heart04> 냐아아아~~~~앗……」"

[[dialogue]]
speaker = "クロト"
original = "「また出してあげるから」"
translation = "「또 해줄게」"

[[dialogue]]
speaker = "リーエン"
original = "「……ち○ちん遊び、続けていいの？」"
translation = "「……자지 놀이, 계속해도 돼?」"

[[dialogue]]
speaker = "リーエン"
original = "「なら……許す。今回も、あたしをにゃあにゃあ言わせて……辱めた罰を、与えてやるつもりだったけど……」"
translation = "「그렇다면…… 허락하마. 이번에도 나를 냐아냐아 거리게 해서…… 능욕한 벌을 줄 생각이었지만……」"

[[dialogue]]
speaker = "リーエン"
original = "「おまえのち○ちん、好きだから……いい……」"
translation = "「네놈의 자지, 좋으니까…… 됐어……」"

[[dialogue]]
speaker = "リーエン"
original = "「それと……ち○ちんだけじゃなく……おまえのことも……」"
translation = "「그리고…… 자지뿐만 아니라…… 네놈도……」"

[[dialogue]]
speaker = "リーエン"
original = "「好き……にゃ<emoji=heart04>」"
translation = "「좋아…… 냐<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「やっぱりにゃあにゃあ言ってるリーエンかわいい！\u3000好き！」"
translation = "「역시 냐아냐아 거리는 리엔 귀여워! 좋아해!」"

[[dialogue]]
speaker = "リーエン"
original = "「にゃあにゃあ言うのはち○ちん遊びの時だけにゃああああっ！！！」"
translation = "「냐아냐아 거리는 건 자지 놀이 할 때뿐이냐아아아아아앗!!!」"

[[dialogue]]
speaker = "クロト"
original = "「普段もにゃあにゃあすればいいのに」"
translation = "「평소에도 냐아냐아 거리면 좋을 텐데」"

[[dialogue]]
speaker = "リーエン"
original = "「お断りだ！」"
translation = "「거절한다!」"

[[dialogue]]
speaker = "クロト"
original = "「にゃあって言って」"
translation = "「냐아라고 해봐」"

[[dialogue]]
speaker = "リーエン"
original = "「言って欲しかったら……もっと、ち○ちん遊び、する……そうすれば……」"
translation = "「듣고 싶으면…… 더, 자지 놀이 해라…… 그러면……」"

[[dialogue]]
speaker = "リーエン"
original = "「また……にゃあにゃあ言ってやってもいい……にゃ<emoji=heart04>」"
translation = "「또…… 냐아냐아 해줄 수도 있어…… 냐<emoji=heart04>」"

