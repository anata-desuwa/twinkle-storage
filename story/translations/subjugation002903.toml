[[dialogue]]
speaker = "unk"
original = "果たして、ノヴァフォームに覚醒したフニと、ヒルディオーネ先輩の手合わせの結果は――"
translation = "과연, 노바 폼으로 각성한 후니와 힐디 오네 선배의 대련 결과는――"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「……ここまでですわね」"
translation = "「……여기까지입니다요」"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「はぁっ……はぁっ……！」"
translation = "「하아…… 하아……!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「私の――負けですわ。フニ」"
translation = "「저의―― 패배입니다요. 후니」"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「やり……ました……！\u3000これで、お姉様の悩みを少しでも……」"
translation = "「해……냈습니다……! 이걸로, 언니의 고민을 조금이라도……」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「フニ！」"
translation = "「후니!」"

[[dialogue]]
speaker = "unk"
original = "先輩が駆け寄り、気を失って地面に倒れ込みそうになったフニの体を受け止める。"
translation = "선배가 달려가, 정신을 잃고 땅에 쓰러지려는 후니의 몸을 받아낸다."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ありがとうですわ、フニ……。私の為に……」"
translation = "「고맙습니다요, 후니……. 저를 위해서……」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "（それでも……私にとって１番大切なものは――）"
translation = "(그럼에도…… 저에게 가장 소중한 것은――)"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「……会長、アルケインコードのことなのですけれど」"
translation = "「……회장, 아르카나 코드 말입니다요」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「私、もう少し……星霊祭が始まるギリギリまで、頑張ってみたいと思いますわ」"
translation = "「저, 조금만 더…… 성령제가 시작되는 직전까지, 열심히 해보고 싶습니다요」"

[[dialogue]]
speaker = "unk"
original = "そう言って、力を使い果たして眠るフニの頭を、そっと優しく撫でるヒルディオーネ先輩なのだった――"
translation = "그렇게 말하며, 힘을 다 쓰고 잠든 후니의 머리를, 살짝 부드럽게 쓰다듬는 힐디 오네 선배였다――"

[[dialogue]]
speaker = "unk"
original = "そして、１週間後の週明け。"
translation = "그리고, 1주일 뒤 주 초."

[[dialogue]]
speaker = "unk"
original = "ついに７日間に渡って行われる星霊祭がスタートした。"
translation = "마침내 7일간에 걸쳐 진행되는 성령제가 시작되었다."

[[dialogue]]
speaker = "unk"
original = "運動場の方で様々な競技が行われる中――"
translation = "운동장 쪽에서 다양한 경기가 진행되는 가운데――"

[[dialogue]]
speaker = "unk"
original = "アリーナの方でも、星霊舞闘会のトーナメント１回戦が開始されていた。"
translation = "아레나 쪽에서도, 성령무투회 토너먼트 1회전이 개시되고 있었다."

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「――ホウちゃん、一緒に行くよっ」"
translation = "「――호우짱, 함께 가요」"

[[dialogue]]
speaker_original = "ホウちゃん"
speaker_translation = "호우짱"
original = "「ええ、フニ。いつでも！」"
translation = "「네, 후니. 언제든지요!」"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「全力を燃やします！」"
translation = "「전력을 불태우겠습니다!」"

[[dialogue]]
speaker_original = "２人"
speaker_translation = "2명"
original = "「――ビッグバーンフェニックス！！」"
translation = "「――빅 번 피닉스!!」"

[[dialogue]]
speaker_original = "新星学園星騎士"
speaker_translation = "신성 학원 성기사"
original = "「きゃっ！？\u3000くぅっ……！」"
translation = "「꺅!? 크읏……!」"

[[dialogue]]
speaker = "unk"
original = "フェニエルのノヴァフォームが繰り出した凄まじい火力の蒼い炎が、アリーナ中央を取り囲むように展開された『仮想結界』内で炸裂する。"
translation = "페니엘의 노바 폼이 구사한 엄청난 화력의 푸른 불꽃이, 아레나 중앙을 둘러싸듯이 전개된 『가상 결계』 내에서 작렬한다."

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "『フニ選手、不死鳥ホウちゃんとのコンビネーション技が決まったーーーっ！！』"
translation = "『후니 선수, 불사조 호우짱과의 콤비네이션 기술이 터졌다ーーー!』"

[[dialogue]]
speaker = "unk"
original = "司会を務める紅明がマイクで実況し、会場が大いに盛り上がる。"
translation = "사회를 맡은 홍명이 마이크로 실황 중계를 하고, 회장이 크게 달아오른다."

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "『新たにお披露目されたノヴァフォーム、これは可愛いだけじゃなくて、とんでもない強さだぞぉ～！？\u3000見事に大勝利だ～～！』"
translation = "『새롭게 공개된 노바 폼, 이건 귀엽기만 한 게 아니라, 엄청난 강함이다아~!? 멋지게 대승리다~~!』"

[[dialogue]]
speaker = "unk"
original = "そんなフェニエルの活躍を、観客席から見守っていたヒルディオーネ。"
translation = "그런 페니엘의 활약을, 관객석에서 지켜보고 있던 힐디 오네."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "（フニのノヴァフォーム、やはりとんでもない力ですわね。合宿で私を打ち負かしてみせた不死鳥の力……）"
translation = "(후니의 노바 폼, 역시 엄청난 힘입니다요. 합숙에서 저를 쓰러뜨려 보인 불사조의 힘……)"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "（ですが、次の２回戦……明日戦うことになるであろう相手は――）"
translation = "(하지만, 다음 2회전…… 내일 싸우게 될 상대는――)"

[[dialogue]]
speaker = "unk"
original = "星霊舞闘会２日目――"
translation = "성령무투회 2일째――"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "（まさか、こんなに早くぶつかることになるなんて……）"
translation = "(설마, 이렇게 빨리 맞붙게 될 줄이야……)"

[[dialogue]]
speaker = "unk"
original = "フェニエルは２回戦の相手と、対峙する。"
translation = "페니엘은 2회전의 상대와, 대치한다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「……フニ。あなたのノヴァフォーム、なかなか悪くないわね」"
translation = "「……후니. 네 노바 폼, 제법 괜찮네」"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「マム……！」"
translation = "「마무……!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「最初に言っておくわ。これが何回戦だろうと関係ない」"
translation = "「처음에 말해두지. 이게 몇 회전이든 상관없어」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「竜たる私と戦う以上、今この瞬間こそが――決勝戦よ」"
translation = "「용인 나와 싸우는 이상, 지금 이 순간이야말로―― 결승전이야」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「畏怖をもって、全力でかかって来なさい」"
translation = "「외경심을 가지고, 전력으로 덤벼」"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「……イエス・マム！」"
translation = "「……예스 마무!」"

[[dialogue]]
speaker = "unk"
original = "フェニエルと、前舞闘会の覇者・妃竜院マハムートの試合が始まるのだった――"
translation = "페니엘과, 전 무투회 패자・히류인 마하무트의 시합이 시작되는 것이었다――"

