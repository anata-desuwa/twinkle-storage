[[dialogue]]
speaker = "unk"
original = "第４話,呪いの灯り,P"
translation = "제4화 저주의 등불 P"

[[dialogue]]
speaker = "unk"
original = "俺とリィベルは映画を観に渋谷までやってきた。"
translation = "나와 리벨은 영화를 보러 시부야까지 왔다."

[[dialogue]]
speaker = "リィベル"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "なんとなく、リィベルがそわそわしているような……"
translation = "왠지 리벨이 안절부절못하는 것 같은데……"

[[dialogue]]
speaker = "unk"
original = "もしかして映画は初めて？"
translation = "「혹시 영화는 처음이야?」"

[[dialogue]]
speaker = "リィベル"
original = "「……そうよ。悪い？」"
translation = "「……그래. 나빠?」"

[[dialogue]]
speaker = "リィベル"
original = "「……何事にも初めてはある？\u3000まぁ、それはそうでしょうけど……はぁ、落ち着かないわ」"
translation = "「……무슨 일이든 처음은 있다고? 뭐, 그건 그렇겠지만…… 하아, 진정이 안 되네.」"

[[dialogue]]
speaker = "リィベル"
original = "「これでも楽しみにしてるのよ。そうは見えないでしょうけど。まったく、アニメ化でいきなり映画なんて、やってくれるわね」"
translation = "「이래 봬도 기대하고 있어. 그렇게 보이진 않겠지만. 정말이지, 애니메이션화로 갑자기 영화라니, 제법이네.」"

[[dialogue]]
speaker = "unk"
original = "今日、俺たちが観に来たのはリィベルが読んでいた小説のアニメ映画だ。豪華制作陣＆豪華声優陣で注目の一作になっている。"
translation = "오늘 우리가 보러 온 것은 리벨이 읽고 있던 소설의 애니메이션 영화다. 호화 제작진과 호화 성우진으로 주목받는 작품이다."

[[dialogue]]
speaker = "unk"
original = "ドリンク買ってくる。何がいい？"
translation = "「음료 사 올게. 뭐 마실래?」"

[[dialogue]]
speaker = "リィベル"
original = "「そうね。紅茶かコーヒー……いえ」"
translation = "「글쎄. 홍차나 커피…… 아니.」"

[[dialogue]]
speaker = "リィベル"
original = "（紅茶とコーヒーはお手洗いが近くなるってネットに書いてあったからやめておきましょう）"
translation = "(홍차랑 커피는 화장실에 자주 가게 된다고 인터넷에 적혀 있었으니까 그만두자.)"

[[dialogue]]
speaker = "リィベル"
original = "「ジンジャーエールでお願い」"
translation = "「진저 에일로 부탁해.」"

[[dialogue]]
speaker = "unk"
original = "ＯＫ！"
translation = "「OK!」"

[[dialogue]]
speaker = "unk"
original = "今日は映画の封切り日で人が多い。売店が混んでないといいけど……"
translation = "오늘은 영화 개봉일이라 사람이 많다. 매점이 붐비지 않아야 할 텐데……"

[[dialogue]]
speaker = "リィベル"
original = "（魔王、行ったわね……）"
translation = "(마왕, 갔네……)"

[[dialogue]]
speaker = "リィベル"
original = "（私なんかの世話を焼いて、ヒマなのかしら……いえ、そんなはずないのだけど……）"
translation = "(나 같은 애를 챙겨주다니, 한가한 걸까…… 아니, 그럴 리는 없겠지만……)"

[[dialogue]]
speaker = "？？？"
original = "「おや、リィベルさん。こんなところでお会いするとは奇遇ですね」"
translation = "「어라, 리벨 씨. 이런 곳에서 만나다니 기우네요.」"

[[dialogue]]
speaker = "リィベル"
original = "「あなたは──」"
translation = "「당신은──」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「マジにマジカル☆\u3000凛とリリカル！\u3000華麗にカレイド♪」"
translation = "「마지하게 매지컬☆ 늠름하게 리리컬! 화려하게 칼레이도♪」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「蒐集の魔法少女トレジャー☆アンナです♪\u3000初めまして、リィベルさんっ！」"
translation = "「수집의 마법소녀 트레저☆안나입니다♪ 처음 뵙겠어요, 리벨 씨!」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「キラッ☆」"
translation = "「키랏☆」"

[[dialogue]]
speaker = "リィベル"
original = "（イラッ）"
translation = "(울컥)"

[[dialogue]]
speaker = "リィベル"
original = "「ロストアイテムの専門家、だったかしら。深淵書庫の管理システムである私を封印しに来たの？」"
translation = "「로스트 아이템 전문가였던가. 심연서고의 관리 시스템인 나를 봉인하러 온 거야?」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「いえいえ。今日は完全にオフですよ。魔法少女アニメの劇場版リバイバル上映を観に来たんです。スクリーンに蘇る往年の名作たち！\u3000胸アツです！」"
translation = "「아뇨아뇨. 오늘은 완전히 오프예요. 마법소녀 애니메이션 극장판 리바이벌 상영을 보러 왔답니다. 스크린에 되살아나는 왕년의 명작들! 가슴이 뜨겁네요!」"

[[dialogue]]
speaker = "リィベル"
original = "（確かに胸は厚いでしょうけど）"
translation = "(확실히 가슴은 두껍겠지만.)"

[[dialogue]]
speaker = "トレジアンナ"
original = "「リィベルさんはおデートですか？\u3000人が多くて向こうは気が付いてないようでしたけど、さっき会長さんとすれ違いましたよ」"
translation = "「리벨 씨는 데이트 중인가요? 사람이 많아서 그쪽은 눈치채지 못한 것 같았지만, 방금 회장님이랑 스쳐 지나갔거든요.」"

[[dialogue]]
speaker = "リィベル"
original = "「はぁ、デート！？\u3000私と……魔王が逢引きしているっていうの！？」"
translation = "「하아, 데이트!? 나와…… 마왕이 밀회를 즐기고 있다는 거야!?」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「え、違うんですか？\u3000私てっきり……というか、会長さんとリィベルさんは同じ学園の先輩後輩なんですから、ふたりきりで映画に行くのはもうデートですよ！」"
translation = "「에, 아닌가요? 전 당연히…… 그보다 회장님이랑 리벨 씨는 같은 학원 선후배 사이니까, 둘이서 영화 보러 가는 건 이미 데이트예요!」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「この前もおふたりで漫画を買いに行って……あ」"
translation = "「저번에도 두 분이서 만화를 사러 가시고…… 아.」"

[[dialogue]]
speaker = "リィベル"
original = "「ふぅん。あなた、やっぱり私を監視していたのね」"
translation = "「흐응. 당신, 역시 나를 감시하고 있었구나」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「失礼、口が滑ってしまいました。ですが、嘘はいけませんので正直に言いましょう。──あなたはロストアイテム『深淵書庫』の一部。監視、観察の対象です」"
translation = "「실례, 말실수를 해버렸네요. 하지만, 거짓말은 안 되니까 솔직하게 말하죠. ──당신은 로스트 아이템 『심연서고』의 일부. 감시, 관찰 대상입니다」"

[[dialogue]]
speaker = "unk"
original = "ロストアイテムとは、リクリエを乗り越えた異物であり、リクリエにすら耐える強力な力を持ったアイテム群。トレジアンナさんはその蒐集者であり監視者だ。"
translation = "로스트 아이템이란, 리크리에를 극복한 이물이며, 리크리에조차 견뎌내는 강력한 힘을 가진 아이템군. 트레지안나 씨는 그 수집가이자 감시자다."

[[dialogue]]
speaker = "トレジアンナ"
original = "「深淵書庫は非常に危険なロストアイテムです。暴走すれば、流星市国は呪いに飲み込まれてしまうでしょう。この街は巨大な不発弾の上に建っているようなものです」"
translation = "「심연서고는 매우 위험한 로스트 아이템입니다. 폭주하면, 유성시국은 저주에 삼켜져 버리겠죠. 이 거리는 거대한 불발탄 위에 세워진 것이나 다름없습니다」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「もちろん、魔将覚醒がうまくいけば暴走は防げます。ですが、同時に失敗する可能性もあるわけです。その時のために準備をしておくのも、専門家の仕事です」"
translation = "「물론, 마장각성이 잘 풀리면 폭주를 막을 수 있습니다. 하지만, 동시에 실패할 가능성도 있는 법이죠. 그때를 위해 준비를 해두는 것도, 전문가의 일입니다」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「ロストアイテムは本来この時代に存在しえないもの。そのせいで、現代のみなさんにご迷惑をおかけするわけにはいきませんからね！」"
translation = "「로스트 아이템은 본래 이 시대에 존재할 수 없는 것. 그 탓에, 현대의 여러분에게 폐를 끼칠 수는 없으니까요!」"

[[dialogue]]
speaker = "リィベル"
original = "「私はその『ロストアイテム』という分類にも納得していないんだけど。分類なんて後付けだし、深淵書庫の成り立ちに<ruby>魔女<rt>あなたたち</rt></ruby>が関わっているとも限らないし」"
translation = "「나는 그 『로스트 아이템』이라는 분류도 납득하지 못하겠는데. 분류 따위 나중에 붙인 거고, 심연서고의 성립에 마녀이 관여했다고 단정할 수도 없잖아」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「それはそうなんですが、まぁ、備えあれば嬉しいな、ということで！」"
translation = "「그건 그렇습니다만, 뭐, 유비무환이면 기쁘니까요!」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「ところでリィベルさん、可愛いステッキや衣装に興味はありませんか？\u3000むしろこっちが本題なんですけど──」"
translation = "「그런데 리벨 씨, 귀여운 스틱이나 의상에 관심 없으신가요? 오히려 이쪽이 본론입니다만──」"

[[dialogue]]
speaker = "リィベル"
original = "「そろそろ映画が始まるから行くわ。じゃ」"
translation = "「슬슬 영화 시작하니까 갈게. 그럼」"

[[dialogue]]
speaker = "リィベル"
original = "「この時代に存在しえないもの、ね……分かっているわ、そんなこと」"
translation = "「이 시대에 존재할 수 없는 것, 이라…… 알고 있어, 그런 건」"

[[dialogue]]
speaker = "unk"
original = "リィベル、お待たせ"
translation = "리벨, 오래 기다렸지"

[[dialogue]]
speaker = "リィベル"
original = "「ええ、ありが……何そのバケツは？\u3000ああ、ポップコーンね。……それにしても大きすぎない？\u3000食べきれなくても知らないわよ」"
translation = "「에에, 고마…… 뭐야 그 양동이는? 아아, 팝콘이구나. ……그건 그렇고 너무 크지 않아? 다 못 먹어도 난 모른다」"

[[dialogue]]
speaker = "リィベル"
original = "「まぁいいわ。映画、楽しみましょう」"
translation = "「뭐 됐어. 영화, 즐기자고」"

[[dialogue]]
speaker = "リィベル"
original = "「うぐぐぐ……お腹がはちきれそう…………」"
translation = "「으구구구…… 배가 터질 것 같아…………」"

[[dialogue]]
speaker = "リィベル"
original = "「調子に乗って大きいの注文するからよ。おかげで晩ご飯は入りそうにないわ」"
translation = "「신나서 큰 걸 주문하니까 그렇지. 덕분에 저녁밥은 못 먹겠어」"

[[dialogue]]
speaker = "リィベル"
original = "「まぁいいわ、映画は楽しめたから。私だけじゃ映画館まで来なかっただろうし」"
translation = "「뭐 됐어, 영화는 즐거웠으니까. 나 혼자였다면 영화관까지 오지 않았을 테고」"

[[dialogue]]
speaker = "リィベル"
original = "「……暗くなってきたわね。灯籠、点けましょうか」"
translation = "「……어두워졌네. 등롱, 켤까」"

[[dialogue]]
speaker = "リィベル"
original = "「映画の内容、憶えてる？」"
translation = "「영화 내용, 기억해?」"

[[dialogue]]
speaker = "unk"
original = "生前、人に裏切られて死んだ主人公は、別の世界に生を受ける。"
translation = "생전, 사람에게 배신당해 죽은 주인공은, 다른 세계에 생을 부여받는다."

[[dialogue]]
speaker = "unk"
original = "彼は前世の記憶に苦しみ、疑心暗鬼に陥りながらも、信じられる仲間を見つけて活躍していく──という物語だ。"
translation = "그는 전생의 기억으로 괴로워하고, 의심암귀에 빠지면서도, 믿을 수 있는 동료를 찾아 활약해 나간다──는 이야기다."

[[dialogue]]
speaker = "リィベル"
original = "「作中、何度も灯籠が出てきたのは気付いたかしら？\u3000原作や漫画でもそうだったけど、アニメではより分かりやすかったわね」"
translation = "「작중, 몇 번이나 등롱이 나온 건 눈치챘어? 원작이나 만화에서도 그랬지만, 애니메이션에서는 더 알기 쉬웠네」"

[[dialogue]]
speaker = "リィベル"
original = "「昼夜を問わず歴史書を読み漁る主人公を見守ったり、あるいは夜闇に輝いて道を照らしたり…………」"
translation = "「주야를 가리지 않고 역사서를 뒤적이는 주인공을 지켜보거나, 혹은 밤의 어둠 속에서 빛나며 길을 비추거나…………」"

[[dialogue]]
speaker = "リィベル"
original = "「あれは、絶望に負けない意思の表象。暗闇に屈しない決意なのよ」"
translation = "「저건, 절망에 굴하지 않는 의지의 표상. 어둠에 굴복하지 않는 결의야」"

[[dialogue]]
speaker = "リィベル"
original = "「だから、あの作品に触れた私の戦闘服にも反映されているんだと思うわ」"
translation = "「그래서, 그 작품에 접한 나의 전투복에도 반영되어 있다고 생각해」"

[[dialogue]]
speaker = "リィベル"
original = "「でも、この灯籠に宿るのは呪いの炎よ。そんな私にも、闇を照らすことができるかしら」"
translation = "「하지만, 이 등롱에 깃드는 건 저주의 불꽃이야. 그런 나라도, 어둠을 비출 수 있을까」"

[[dialogue]]
speaker = "unk"
original = "リィベルなら、きっとできる"
translation = "리벨이라면, 분명 할 수 있어"

[[dialogue]]
speaker = "リィベル"
original = "「ふっ、あなたならそう言うと思ってたわ。相変わらず、考えなしのお人好し。でも…………」"
translation = "「훗, 당신이라면 그렇게 말할 줄 알았어. 여전히, 생각 없는 참견쟁이. 하지만…………」"

[[dialogue]]
speaker = "リィベル"
original = "「あなたが言うなら、そうかもね」"
translation = "「당신이 말한다면, 그럴지도 모르겠네」"

[[dialogue]]
speaker = "unk"
original = "小さく微笑むリィベル。その横顔を、灯籠が照らしていた──"
translation = "작게 미소 짓는 리벨. 그 옆얼굴을, 등롱이 비추고 있었다──"

