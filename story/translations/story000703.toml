[[dialogue]]
speaker = "unk"
original = "ヴィーナスはソフィアに、ウズメイアが星徒会室に相談へやってきたことを包み隠さず話した――"
translation = "비너스는 소피아에게 우즈메이야가 성도회실에 상담하러 왔던 일을 숨김없이 이야기했다――"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ウズメさんがそんなことを……」"
translation = "「우즈메 씨가 그런 짓을……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ウズメはわざわざ他校の星徒会室まで、ソフィアのために相談しにきたのよ！\u3000なかなかできることじゃないって、感心しちゃったわ」"
translation = "「우즈메는 일부러 타교의 성도회실까지 소피아를 위해서 상담하러 왔다구! 좀처럼 할 수 있는 일이 아니라고 감탄해버렸어.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ええ、もちろんわかってます。……ウズメさん、本当に裏表のないヒトですから」"
translation = "「네, 물론 알고 있습니다. ……우즈메 씨, 정말 겉과 속이 다르지 않은 사람이니까요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「でも、私が言うのもアレですが、そこまでバラしちゃってもよかったんですか……？」"
translation = "「하지만 제가 말하긴 좀 그렇습니다만, 그렇게까지 다 불어버려도 괜찮았던 건가요……?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「いいのよ！\u3000だって今日は、ソフィアに本心を隠すなって言いにきたんだもの」"
translation = "「괜찮아! 왜냐하면 오늘은 소피아에게 본심을 숨기지 말라고 말하러 온 거니까.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そこでまず私が本心を隠してたら、話にならないでしょう？」"
translation = "「거기서 우선 내가 본심을 숨기고 있으면 말이 안 되잖아?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それにほら、敵を欺くにはまず味方にしろ、って言うじゃない？」"
translation = "「그리고 봐, 적을 속이려면 우선 아군부터로 만들라고 하잖아?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「えっと……それは微妙にことわざが間違っているような……」"
translation = "「저기…… 그건 미묘하게 속담이 틀린 것 같은데……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「とにかく！\u3000ソフィア、私たちがサーシャさんを初詣に誘うから……」"
translation = "「어쨌든! 소피아, 우리가 사샤 씨를 하츠모데에 권유할 테니까……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あなたはそこでサーシャさんと決闘しなさい！」"
translation = "「넌 거기서 사샤 씨와 결투해!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ま、待って下さい。意味がわからないんですが、姉さんと決闘しろっていうのは、一体どういう……？」"
translation = "「기, 기다려 주세요. 의미를 모르겠는데, 언니와 결투하라는 건 대체 어떤……?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「１度思いっきりやっちゃわないから、カコンが残るのよ！\u3000だから――」"
translation = "「한 번 마음껏 터뜨리지 않으니까 앙금이 남는 거야! 그러니까――」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「この機会に<b>口喧嘩</b>で決闘して、スッキリしちゃいなさい！\u3000ってことよ！」"
translation = "「이 기회에 <b>말싸움</b>으로 결투해서 속 시원하게 풀어버려! 라는 뜻이야!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「姉さんと、口喧嘩……」"
translation = "「언니와 말싸움……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「サーシャさんって、頭がよくて、弁が立つから、半端に挑めば、『あらあらうふふ♪』で返されて終わりだわ」"
translation = "「사샤 씨는 머리도 좋고 말도 잘하니까 어설프게 덤비면 『어머어머 우후후♪』로 반격당하고 끝날 거야.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「だからまずは私に、あなたの思っていること全て、ぶっちゃけなさい！」"
translation = "「그러니까 우선 나에게 네가 생각하는 모든 걸 털어놔 봐!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「い、いきなりそんなことを言われましても……」"
translation = "「가, 갑자기 그런 말씀을 하셔도……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「心の準備が必要かしら？\u3000なら先に、進められるところからやっちゃいましょう！」"
translation = "「마음의 준비가 필요할까? 그럼 먼저 진행할 수 있는 부분부터 해버리자!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「まずは……そうね。ソフィア、晴れ着って持ってるかしら？」"
translation = "「우선…… 그래. 소피아, 설빔은 가지고 있니?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「え？\u3000いや、持ってない、ですけど……」"
translation = "「에? 아뇨, 없는데요……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「なら、ちょうどいいわ！\u3000今から一緒に行くわよ！」"
translation = "「그럼 딱 좋네! 지금부터 같이 가자!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「え、ちょっ……行くってどこに？」"
translation = "「에, 잠깐…… 가다니 어디를요?」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは有無を言わさず、ソフィアの手を取ると――"
translation = "비너스는 두말할 것 없이 소피아의 손을 잡더니――"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「さあ、善は急がば回れよ！\u3000レッツゴー！」"
translation = "「자, 쇠뿔도 단김에 빼라고! 렛츠 고!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「えっ……えぇ～～～っ！？」"
translation = "「엣…… 에에~~~엣!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「というわけで、じゃじゃ～ん♪\u3000まずは晴れ着の準備よ！」"
translation = "「그런 고로, 짜잔~♪ 우선은 설빔 준비야!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ほら、ソフィアも恥ずかしがってないで、こっちにきて見せなさい♪」"
translation = "「자, 소피아도 부끄러워하지 말고 이쪽으로 와서 보여주렴♪」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「うぅ……顔がホットです……」"
translation = "「우으…… 얼굴이 화끈거려요……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「その、着物は初めてなので、ヴィーナスさんみたいに似合うかどうか……」"
translation = "「그, 기모노는 처음이라 비너스 씨처럼 잘 어울릴지 어떨지……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「なに言ってるの、すっごく似合うじゃない！\u3000とっても可愛いわよ！」"
translation = "「무슨 소리야, 정말 잘 어울리는걸! 무지 귀엽다구!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「か、かわっ……あ、ありがとう、ございます……」"
translation = "「귀, 귀여…… 가, 감사합니다……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふふっ、今ならサーシャさんが、妹を可愛いって言う気持ちもわかる気がするわ♪\u3000私もソフィアの頭、撫でたくなっちゃうもの」"
translation = "「후훗, 지금이라면 사샤 씨가 여동생을 귀엽다고 하는 기분도 알 것 같네♪ 나도 소피아 머리, 쓰다듬어주고 싶어지는걸.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ほら、なでなで～♪」"
translation = "「자, 쓰담쓰담~♪」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ん……♪\u3000び、ヴィーナスさんまで姉さんみたいなことを……。私、子供じゃないんですから……」"
translation = "「응……♪ 비, 비너스 씨까지 언니 같은 소리를……. 저, 어린애가 아니니까요……」"

[[dialogue]]
speaker = "unk"
original = "と、その時だった。"
translation = "그때였다."

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ほほう。我が魂に導かれて散策に来てみれば、何やら楽しそうな声がするではないか」"
translation = "「호오. 나의 혼에 이끌려 산책하러 와보니 웬지 즐거운 목소리가 들리지 않느냐.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「え、えっと……？」"
translation = "「에, 에또……?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あっ、ヘレナちゃんじゃない！\u3000屋敷の外に出て来るなんて、珍しいわね」"
translation = "「앗, 헬레나짱 아니니! 저택 밖으로 나오다니 드문 일이네.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「こら、人を引き籠もりみたいに言うでない、ヴィーナス」"
translation = "「이봐, 사람을 히키코모리처럼 말하지 말거라, 비너스.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「これまでは、我が魂の囁きによって、来るべき<b>出番を待っていた</b>というだけのことだ」"
translation = "「지금까지는 나의 혼의 속삭임에 따라 다가올 <b>차례를</b> <b>기다리고</b> 있었을 뿐이다.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「そして今、どうやらその時が来たらしいのでな」"
translation = "「그리고 지금, 아무래도 그때가 온 모양이라서 말이지.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「さて、初対面の者もいることだし、改めて名乗るとしよう」"
translation = "「자, 초면인 자도 있으니 새삼스럽게 통성명을 하도록 하지.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「立てばプリティ、座ればゴージャス――我が名は九浄家二十六代目当主・九浄ヘレナ」"
translation = "「서면 프리티, 앉으면 고저스―― 나의 이름은 쿠죠 가문 26대 당주 쿠죠 헬레나.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「親しみを込めて、ヘレナちゃんと呼んでもよいぞ？」"
translation = "「친근함을 담아 헬레나짱이라고 불러도 좋으니라?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「あなたが、あの九浄ヘレナ様……！\u3000は、はじめまして。私は流星学園星徒会書記の、奏ソフィアです」"
translation = "「당신이 그 쿠죠 헬레나 님……! 처, 처음 뵙겠습니다. 저는 유성학원 성도회 서기인 카나데 소피아입니다.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「うむ。知っておるぞ、ソフィア。サーシャの妹――であろう？」"
translation = "「음. 알고 있다, 소피아. 사샤의 여동생――이렷다?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「話には聞いていたが……なるほど。実にプリティーでラブリーな姿であるな。頭を撫でてもよいか？」"
translation = "「이야기는 들었다만…… 과연. 실로 프리티하고 러블리한 모습이구나. 머리를 쓰다듬어도 되겠느냐?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ほら、なでなで～♪」"
translation = "「자, 쓰담쓰담~♪」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "（や、やっていることが親子で同じ……！）"
translation = "(하, 하는 짓이 모녀가 똑같아……!)"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ふふっ、<b>晴れ着フォーム</b>がよく似合っておるな。我が魂の囁きに導かれて作ったが、こういうことであったか……」"
translation = "「후훗, <b>설빔</b> <b>폼</b>이 잘 어울리는구나. 나의 혼의 속삭임에 이끌려 만들었다만 이런 일이었던 건가……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「晴れ着フォーム？」"
translation = "「설빔 폼?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「む？\u3000なんだヴィーナス、まだ説明しておらぬのか？」"
translation = "「음? 뭐냐 비너스, 아직 설명하지 않은 것이냐?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そうそう、言い忘れてたけどこれ、星騎士の戦闘服なのよね！」"
translation = "「맞다 맞다, 깜빡 잊고 있었는데 이거 성기사의 전투복이야!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ソフィアに似合いそうだったから思わず着せちゃったけど、説明をすっかり忘れてたわ！」"
translation = "「소피아한테 잘 어울릴 것 같아서 무심코 입혀버렸는데 설명을 완전히 잊고 있었어!」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「やれやれ、仕方のない奴だ。であれば――」"
translation = "「이런이런, 어쩔 수 없는 녀석이구나. 그렇다면――」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「おしえて！\u3000ご当主さ～～ん！！」"
translation = "「알려줘요! 당주님~~!!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「い、一体何が始まるんです……？」"
translation = "「도, 대체 뭐가 시작되는 건가요……?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「気にしなくて大丈夫よ！\u3000ヘレナちゃんが何か説明する時の、決まりの口上みたいなものだから！」"
translation = "「신경 안 써도 괜찮아! 헬레나짱이 뭔가 설명할 때의 정해진 대사 같은 거니까!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「へ、へぇ……？」"
translation = "「헤, 헤에……?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "（ち、ちょっと変わってる人ですね……ヴィーナスさんもですけど）"
translation = "(조, 조금 특이한 사람이네요…… 비너스 씨도 그렇지만)"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「――さて、賢明な諸君なら覚えているかもしれないが、ここ最近学園では、複数の戦闘服を持つ星騎士が何人か出現している」"
translation = "「――자, 현명한 제군들이라면 기억하고 있을지도 모르지만, 요 근래 학원에서는 복수의 전투복을 가진 성기사가 몇 명인가 출현하고 있다.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「最初は、夏のリゾート結界にて発現した『水着フォーム』」"
translation = "「처음은 여름의 리조트 결계에서 발현한 『수영복 폼』.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「あっ……フィオナ会長も手に入れた力ですね」"
translation = "「앗…… 피오나 회장님도 손에 넣으신 힘이네요.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「その通りだ、ソフィア。私はそれを元に、新星学園が誇る２人の天才――星徒会副会長のアナと、錬金術師のアニマに、フォームチェンジ技術の確立を依頼したのだ」"
translation = "「맞다, 소피아. 나는 그것을 토대로 신성학원이 자랑하는 두 명의 천재―― 성도회 부회장인 아나와 연금술사인 아니마에게 폼 체인지 기술의 확립을 의뢰했다.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「そして先日、紅明が自力で覚醒させたというフォームチェンジのデータを入手し、初の人工戦闘服第１号の開発に成功した」"
translation = "「그리고 요전날, 코우메이가 자력으로 각성시켰다는 폼 체인지 데이터를 입수하여 최초의 인공 전투복 제1호 개발에 성공했지.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「それがヨミヨミの、ラブリーでファンシーな『クリスマスフォーム』だ」"
translation = "「그것이 요미요미의 러블리하고 팬시한 『크리스마스 폼』이다.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「これまでの傾向から、新たな戦闘服を生み出すには、何かしらの『テーマ』が必要だということが見えてきた」"
translation = "「지금까지의 경향으로 보아 새로운 전투복을 만들어내기 위해서는 어떤 『테마』가 필요하다는 것을 알게 되었다.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「そんな経緯から今回、テーマとして選んだのが『正月』――」"
translation = "「그런 경위에서 이번에 테마로 선택한 것이 『정월』――」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「すなわち、今２人が着ている、晴れ着フォームというわけだ」"
translation = "「즉, 지금 두 사람이 입고 있는 설빔 폼이라는 것이다.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ちなみに、ヨミヨミのクリスマスフォームと、今回の晴れ着フォームのデザインは、私がした」"
translation = "「참고로 요미요미의 크리스마스 폼과 이번 설빔 폼의 디자인은 내가 했다.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「こう見えて、服作りが趣味でな。ふふっ……プリティーでゴージャスなセンスであろう？」"
translation = "「이래 봬도 옷 만들기가 취미라서 말이지. 후훗…… 프리티하고 고저스한 센스이지 않느냐?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それで、服自体はこうして出来上がったんだけど、実はまだ戦闘服としての起動が上手くいっていないのよねぇ」"
translation = "「그래서 옷 자체는 이렇게 완성됐는데, 사실 아직 전투복으로서의 기동이 잘 안 되고 있거든.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「残念ながら、そうなのだ。試作戦闘服の被験者として、我が魂の囁きに応じて、ウズメイアを選んだのだが……」"
translation = "「안타깝게도 그렇다. 시작 전투복의 피험자로서 나의 혼의 속삭임에 응하여 우즈메이야를 선택했다만……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ウズメさんも晴れ着フォームを？」"
translation = "「우즈메 씨도 설빔 폼을?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そうなの！\u3000ちょっと前にその試着があって、ウズメとはそこで友達になったのよ！」"
translation = "「응! 조금 전에 시착이 있어서 우즈메와는 거기서 친구가 됐어!」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「うむ。しかし、どうやら彼女も未だ、戦闘服としての起動には成功していないようだな」"
translation = "「음. 하지만 아무래도 그녀도 아직 전투복으로서의 기동에는 성공하지 못한 모양이군.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「やはり、その持ち主の戦闘服へ変化するには、何かきっかけとなる<b>インシデント</b>が必要なのかもしれぬ」"
translation = "「역시 그 주인의 전투복으로 변화하기 위해서는 뭔가 계기가 되는 <b>인시던트</b>가 필요한 것일지도 모르겠구나.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「――して、２人は晴れ着を試着していたようだが、もしかすると初詣へ行く予定なのか？」"
translation = "「――하여, 두 사람은 설빔을 시착하고 있었던 모양이다만, 혹시 하츠모데에 갈 예정이냐?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そうなの！\u3000姉妹の仲直りミッションでね！」"
translation = "「맞아! 자매 화해 미션으로 말이야!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ハッ、そうでした！\u3000あの、私はまだ、姉さんと初詣に行くと決めたわけでは……」"
translation = "「핫, 그랬죠! 저기, 저는 아직 언니랑 하츠모데에 가기로 정한 건 아니……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あら、迷ってるの？\u3000どうして？」"
translation = "「어라, 망설이고 있니? 왜?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「どうしてって……姉妹だからって、必ずしも一緒に初詣へ行く必要は、ないっていうか……」"
translation = "「왜냐니…… 자매라고 해서 반드시 같이 하츠모데에 갈 필요는 없달까……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ソフィアは、サーシャさんと初詣へ行くのが嫌なの？\u3000サーシャさんはソフィアが来てくれたら喜ぶと思うわよ？」"
translation = "「소피아는 사샤 씨랑 하츠모데에 가는 게 싫어? 사샤 씨는 소피아가 와주면 기뻐할 거야.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「それは…………」"
translation = "「그건…………」"

[[dialogue]]
speaker = "unk"
original = "ソフィアは言いづらそうに、目線を逸らす。"
translation = "소피아는 말하기 어려운 듯 시선을 피한다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ねぇ、ソフィア」"
translation = "「있잖아, 소피아.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ソフィアはどうして、サーシャさんのことが好きなのに、距離を置こうとするの？」"
translation = "「소피아는 왜 사샤 씨를 좋아하면서 거리를 두려고 하는 거야?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「それは……」"
translation = "「그건……」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ふむ……どうやら、２人で込み入った話があるようだな」"
translation = "「음…… 아무래도 둘이서 할 깊은 이야기가 있는 모양이군.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「私の役目は終わったようだし、邪魔者は退散するとしよう」"
translation = "「나의 역할은 끝난 모양이니 방해꾼은 퇴장하도록 하지.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ソフィアよ」"
translation = "「소피아여.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「は、はい」"
translation = "「하, 네.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「これは我が魂の囁きであるが――」"
translation = "「이것은 나의 혼의 속삭임이다만――」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「姉妹とはよきものだ。大切にせよ」"
translation = "「자매란 좋은 것이다. 소중히 하거라.」"

[[dialogue]]
speaker = "unk"
original = "ヘレナはそう言って、ひらひらと手を振って教室から去って行く。"
translation = "헬레나는 그렇게 말하고는 팔랑팔랑 손을 흔들며 교실에서 나간다."

[[dialogue]]
speaker = "unk"
original = "ヴィーナスとソフィアは再び２人で向き合った。"
translation = "비너스와 소피아는 다시 둘이서 마주 보았다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「――ソフィア」"
translation = "「――소피아.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ちょっとカフェテリアにでもお茶しに行かない？」"
translation = "「잠깐 카페테리아라도 가서 차 마시지 않을래?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「え？」"
translation = "「에?」"

