[[dialogue]]
speaker = "unk"
original = "第３話,友達１００人計画・後編,P"
translation = "제3화, 친구 100명 계획·후편, P"

[[dialogue]]
speaker = "unk"
original = "友達１００人計画が始動してから数日経った放課後。蛍火と友達作りの為に、街へ遊びに来ていた。"
translation = "친구 100명 계획이 시동되고 며칠 지난 방과 후. 호타루비와 친구 만들기를 위해, 거리에 놀러 왔다."

[[dialogue]]
speaker = "蛍火"
original = "「それで、師匠……３人目の友達候補というのは、一体どういう方なのでしょうか？」"
translation = "「그래서, 스승님…… 세 번째 친구 후보라는 분은, 대체 어떤 분이신가요?」"

[[dialogue]]
speaker = "unk"
original = "そうだな……少し蛍火に似てるかも"
translation = "글쎄…… 조금 호타루비랑 닮았을지도."

[[dialogue]]
speaker = "蛍火"
original = "「私に……ですか？」"
translation = "「저랑…… 말입니까?」"

[[dialogue]]
speaker = "マトイ"
original = "「あっ、いたいた。会長、待たせてごめんねー」"
translation = "「앗, 찾았다 찾았다. 회장, 기다리게 해서 미안해~」"

[[dialogue]]
speaker = "マトイ"
original = "「それで、そちらが元星徒会メンバーの東雲蛍火さん……かな？\u3000初めまして、現星徒会の書記をやっています、２年生の詠野マトイです」"
translation = "「그래서, 그쪽이 전 성도회 멤버인 시노노메 호타루비 씨……일까? 처음 뵙겠습니다, 현 성도회의 서기를 맡고 있는, 2학년 에이노 마토이입니다.」"

[[dialogue]]
speaker = "マトイ"
original = "「東雲さんのことは、よくサーシャさんから聞いてました！\u3000カフェテリアで評判の限定メニューって、全部東雲さんが調理してるんだよね？\u3000凄いなぁ、同じ２年生なのに」"
translation = "「시노노메 씨에 대해서는, 자주 사샤 씨로부터 들었어요! 카페테리아에서 평판 좋은 한정 메뉴들, 전부 시노노메 씨가 조리하고 있는 거지? 대단하다, 같은 2학년인데.」"

[[dialogue]]
speaker = "蛍火"
original = "「……ええ、まあ」"
translation = "「……네, 뭐.」"

[[dialogue]]
speaker = "マトイ"
original = "「え、ええっと、星騎士としても強いの有名だよね！\u3000ヴィーナスと戦っても勝てちゃうんじゃないかって、よく話題になるよ。クラスが別だから、模擬戦が実現したことないんだよね～」"
translation = "「에, 에엣또, 성기사로서도 강한 걸로 유명하지! 비너스랑 싸워도 이길 수 있지 않을까 하고, 자주 화제가 돼. 클래스가 달라서, 모의전이 실현된 적은 없지만 말이야~」"

[[dialogue]]
speaker = "蛍火"
original = "「はあ、そうですか……」"
translation = "「하아, 그렇습니까……」"

[[dialogue]]
speaker = "unk"
original = "（蛍火は緊張し過ぎ！）"
translation = "(호타루비는 너무 긴장했어!)"

[[dialogue]]
speaker = "unk"
original = "（そ、素っ気なさ過ぎる……！）"
translation = "(너, 너무 무뚝뚝해……!)"

[[dialogue]]
speaker = "マトイ"
original = "「えっと……その……背中の大剣って、いつも学園の外でも持ち歩いてるの？」"
translation = "「저기…… 그…… 등에 멘 대검은, 항상 학원 밖에서도 가지고 다니는 거야?」"

[[dialogue]]
speaker = "蛍火"
original = "「この包丁のことですか？\u3000ええ、まあ……教皇庁の許可も得ています。特殊な星術で保護している為、モンスター以外を傷つける心配もありません」"
translation = "「이 식칼 말씀이십니까? 네, 뭐…… 교황청의 허가도 받았습니다. 특수한 성술로 보호하고 있기 때문에, 몬스터 이외를 다치게 할 걱정도 없습니다.」"

[[dialogue]]
speaker = "マトイ"
original = "「ほ、包丁だったんだね、それ……（って、心配はそこじゃなくて！\u3000凄く目立つし、威圧感がありすぎるよってことなんだけどなぁ！）」"
translation = "「시, 식칼이었구나, 그거…… (랄까, 걱정은 그게 아니라! 엄청 눈에 띄고, 위압감이 너무 넘친다는 뜻이었는데!)」"

[[dialogue]]
speaker = "蛍火"
original = "「……この『鬼丸烈火』は、父から贈られたものなので」"
translation = "「……이 『오니마루 렛카』는, 아버지께 받은 것이라서.」"

[[dialogue]]
speaker = "マトイ"
original = "「……！\u3000そっか。大切なものなんだね」"
translation = "「……! 그렇구나. 소중한 거네.」"

[[dialogue]]
speaker = "unk"
original = "自己紹介が終わったところで、３人で街を散策する。聞けば、マトイにはオススメのオープンカフェがあるらしく、場所も近いらしいので、そこへ向かうことになった。"
translation = "자기소개가 끝난 뒤, 셋이서 거리를 산책한다. 듣자하니, 마토이에게는 추천하는 오픈 카페가 있는 모양이고, 장소도 가깝다고 해서 그곳으로 향하게 되었다."

[[dialogue]]
speaker = "蛍火"
original = "（うぅ……。師匠……緊張モードで、詠野さんに気を遣わせてしまいました……）"
translation = "(우으……. 스승님…… 긴장 모드 때문에, 에이노 씨를 신경 쓰게 만들고 말았습니다……)"

[[dialogue]]
speaker = "蛍火"
original = "（でも、詠野さんには師匠から、私が緊張しいだってことは、伝えてくれてるんですよね？）"
translation = "(하지만, 에이노 씨에게는 스승님이, 제가 긴장을 잘한다는 것을, 전해주신 거죠?)"

[[dialogue]]
speaker = "unk"
original = "いや、マトイには何も教えてないよ"
translation = "아니, 마토이에게는 아무것도 안 알려줬어."

[[dialogue]]
speaker = "蛍火"
original = "（えぇ！？\u3000ど、どうして……）"
translation = "(에엣!? 어, 어째서……)"

[[dialogue]]
speaker = "unk"
original = "それからオープンカフェに到着し、マトイが大好きだというショートケーキを頼んで食べる。"
translation = "그러고 나서 오픈 카페에 도착해, 마토이가 제일 좋아한다는 쇼트케이크를 주문해 먹는다."

[[dialogue]]
speaker = "蛍火"
original = "「ふわぁぁ……これ、凄く美味しいですっ。こんなに美味しいショートケーキを食べたのは、生まれて初めてかもしれませんっ」"
translation = "「후아아…… 이거, 정말 맛있습니다앗. 이렇게 맛있는 쇼트케이크를 먹은 건, 태어나서 처음일지도 모릅니다앗.」"

[[dialogue]]
speaker = "マトイ"
original = "「そうでしょ～！\u3000私、ショートケーキが一番の好物で、色んなお店のを食べたんだけど、その中でもここが一番美味しいと思ってるんだよね」"
translation = "「그렇지~! 나, 쇼트케이크가 제일 좋아하는 음식이라, 여러 가게 걸 먹어봤는데, 그중에서도 여기가 제일 맛있다고 생각하거든.」"

[[dialogue]]
speaker = "マトイ"
original = "「……でも、良かった。やっぱり東雲さん、さっきまでは初対面で緊張してたんだね」"
translation = "「……하지만, 다행이다. 역시 시노노메 씨, 아까까지는 첫 대면이라 긴장하고 있었구나.」"

[[dialogue]]
speaker = "蛍火"
original = "「えっ？\u3000あっ……」"
translation = "「엣? 앗……」"

[[dialogue]]
speaker = "マトイ"
original = "「東雲さん、料理人だし、美味しいものを食べれば少しはリラックス出来るかなって思ったんだ。……実はさ、私も結構、緊張しいなんだよね。東雲さんも多分、同じなのかなって」"
translation = "「시노노메 씨, 요리사니까, 맛있는 걸 먹으면 조금은 릴랙스할 수 있을까 생각했어. ……사실 말이야, 나도 꽤, 긴장을 잘하거든. 시노노메 씨도 아마, 똑같은 걸까 싶어서.」"

[[dialogue]]
speaker = "マトイ"
original = "「私には……その気持ちがよくわかるからさ。だから、東雲さんが笑顔になってくれて、良かった！」"
translation = "「나한테는…… 그 기분을 잘 아니까 말이야. 그러니까, 시노노메 씨가 웃어줘서, 다행이야!」"

[[dialogue]]
speaker = "蛍火"
original = "「詠野さん、私の為に……！\u3000ふっ……うぅっ……」"
translation = "「에이노 씨, 저를 위해서……! 윽…… 우으……」"

[[dialogue]]
speaker = "マトイ"
original = "「あ、あれ！？\u3000どうしたの東雲さん！\u3000甘いもの、やっぱりダメだった！？」"
translation = "「어, 어라!? 왜 그래 시노노메 씨! 단 거, 역시 별로였어!?」"

[[dialogue]]
speaker = "蛍火"
original = "「っ……違うんです。私、詠野さんの優しさに……つい感極まってしまって……！」"
translation = "「윽…… 아니에요. 저, 에이노 씨의 다정함에…… 그만 감격해버려서……!」"

[[dialogue]]
speaker = "マトイ"
original = "「なんだ、そっか。あはは、そしたらほら、泣かないで一緒にショートケーキ食べよ？\u3000甘いの食べたら、女の子は笑顔になるから」"
translation = "「뭐야, 그렇구나. 아하하, 그럼 자아, 울지 말고 같이 쇼트케이크 먹자? 단 거 먹으면, 여자애는 웃게 되니까.」"

[[dialogue]]
speaker = "蛍火"
original = "「はいっ。ありがとうございます……美味しいです！」"
translation = "「네! 감사합니다…… 맛있습니다!」"

[[dialogue]]
speaker = "unk"
original = "今回、遊びに誘った理由なんだけど──"
translation = "이번에, 놀자고 권한 이유인데──"

[[dialogue]]
speaker = "unk"
original = "それでさ、マトイ。"
translation = "그래서 말이야, 마토이."

[[dialogue]]
speaker = "蛍火"
original = "「っ……師匠。大丈夫、です。その先は、私が自分で言います」"
translation = "「윽…… 스승님. 괜찮습니다. 그 뒷말은, 제가 직접 하겠습니다.」"

[[dialogue]]
speaker = "蛍火"
original = "「詠野さん。お願いしたいことがあります」"
translation = "「에이노 씨. 부탁드리고 싶은 것이 있습니다.」"

[[dialogue]]
speaker = "マトイ"
original = "「う、うん、どうしたの？\u3000改まって……ひょっとしてまた緊張してる？」"
translation = "「으, 응, 왜 그래? 정색하고…… 혹시 또 긴장했어?」"

[[dialogue]]
speaker = "蛍火"
original = "「はい……。私は、詠野さんの気遣いがとても嬉しくて……出来れば、これからも親しくしていきたいと考えております」"
translation = "「네……. 저는, 에이노 씨의 배려가 무척 기뻐서…… 가능하다면, 앞으로도 친하게 지내고 싶다고 생각하고 있습니다.」"

[[dialogue]]
speaker = "蛍火"
original = "「なのでその……私と是非……と、友達になって、頂けないでしょうか」"
translation = "「그러니 그…… 저와 부디…… 치, 친구가 되어, 주시지 않겠습니까.」"

[[dialogue]]
speaker = "unk"
original = "蛍火は深く頭を下げる。マトイはびっくりしたように目を丸くしていたが──"
translation = "호타루비는 깊게 머리를 숙인다. 마토이는 깜짝 놀란 듯 눈을 동그랗게 뜨고 있었지만──"

[[dialogue]]
speaker = "マトイ"
original = "「そっか……うん！\u3000喜んで！」"
translation = "「그렇구나…… 응! 기꺼이!」"

[[dialogue]]
speaker = "マトイ"
original = "「──これから仲良くしようね、蛍火！」"
translation = "「──앞으로 친하게 지내자, 호타루비!」"

[[dialogue]]
speaker = "蛍火"
original = "「詠野さん……っ。はいっ、よろしくお願いしますっ」"
translation = "「에이노 씨……! 네! 잘 부탁드립니다앗.」"

[[dialogue]]
speaker = "マトイ"
original = "「私のことも下の名前で呼んで？\u3000ほら、友達なんだから、さ」"
translation = "「나도 이름으로 불러줄래? 봐봐, 친구니까, 말이야.」"

[[dialogue]]
speaker = "蛍火"
original = "「え、えっと……それじゃあ、マトイ……さん？」"
translation = "「어, 에또…… 그러면, 마토이…… 씨?」"

[[dialogue]]
speaker = "マトイ"
original = "「きゃ～っ、素の蛍火可愛いぃ！\u3000ギャップ萌えってやつだね、これ！」"
translation = "「꺄~앗, 본모습의 호타루비 귀여워! 갭 모에라는 거네, 이거!」"

[[dialogue]]
speaker = "マトイ"
original = "「ねぇ、蛍火！\u3000今度、私の家に遊びにきて？\u3000お菓子作りとか教えて欲しいな！」"
translation = "「있지, 호타루비! 다음에, 우리 집에 놀러 올래? 과자 만들기 같은 거 가르쳐줬으면 좋겠어!」"

[[dialogue]]
speaker = "蛍火"
original = "「わ、私が、友達の家に遊びに……！」"
translation = "「제, 제가, 친구의 집에 놀러를……!」"

[[dialogue]]
speaker = "unk"
original = "やはり、マトイなら何も言わなくても蛍火の力になってくれると信じたのは、間違いではなかった。"
translation = "역시, 마토이라면 아무 말 하지 않아도 호타루비의 힘이 되어줄 거라 믿은 것은, 틀리지 않았다."

[[dialogue]]
speaker = "unk"
original = "幸せそうに笑う蛍火を見ていると、こっちの顔まで釣られるようにほころんでしまうのだった。"
translation = "행복하게 웃는 호타루비를 보고 있자니, 이쪽의 얼굴까지 따라 웃음이 지어지는 것이었다."

