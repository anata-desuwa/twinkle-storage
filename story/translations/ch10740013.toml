[[dialogue]]
speaker = "unk"
original = "第３話,パルミエと見回りデート,P"
translation = "제3화, 팔미에와 순찰 데이트, P"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「水精ちゃ～ん！\u3000決めちゃいなさ～い！」"
translation = "「수정아~! 끝내버리렴~!」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ふ～、やっと片付いたわ～。プリマステラってやっぱり大変ね～」"
translation = "「후~, 드디어 끝났네~. 프리마스텔라란 역시 힘들구나~」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ダーリーン、部室まで負ぶって帰って～？\u3000もうヘトヘトよ～」"
translation = "「다알링, 부실까지 업어다 줘~? 이제 녹초야~」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「それとも……このままデートにでも行っちゃう？\u3000遊ぶ元気ならまだまだあるし♪」"
translation = "「아니면…… 이대로 데이트라도 갈까? 놀 기운이라면 아직 쌩쌩하거든♪」"

[[dialogue]]
speaker = "unk"
original = "いや、俺はもう少し見回りして帰るよ"
translation = "아니, 난 조금 더 순찰하고 돌아갈게"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「うっそやだ、信じられない。可愛い私のお誘いを断るなんて」"
translation = "「에엥 싫어, 믿을 수 없어. 귀여운 나의 권유를 거절하다니」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「見回りなんて他の人に任せたらいいじゃなーい。デート行きましょうよ、つまんないわよ～」"
translation = "「순찰 같은 건 다른 사람한테 맡기면 되자~낳아. 데이트 가자니까, 재미없게~」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「そもそもここ数日ずっと見回りに出てるんじゃないの？\u3000どれだけ見回りが好きなのよ～」"
translation = "「애초에 요 며칠 계속 순찰하러 나오는 거 아냐? 순찰을 얼마나 좋아하는 거야~」"

[[dialogue]]
speaker = "unk"
original = "やらなきゃいけないことだからな"
translation = "해야 할 일이니까"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「……はぁ。ダーリンはダメね、全然わかってないわ」"
translation = "「……하아. 달링은 안 되겠네, 전혀 모르고 있어」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「わかったわ。そういうことなら私も一緒に見回りしてあげる」"
translation = "「알았어. 그렇다면 나도 같이 순찰해 줄게」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「いいからいいから。愛するダーリンのためだもの♪\u3000私がとびっきり楽しい見回りにしてあげるから♪」"
translation = "「됐으니까 됐으니까. 사랑하는 달링을 위해서인걸♪ 내가 아주 즐거운 순찰로 만들어 줄 테니까♪」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「え～いっ！」"
translation = "「에잇~!」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「むむ、ピッチングマシーンとやらも中々やるわね。次こそきっちり捕らえてやるわっ！」"
translation = "「무무, 피칭 머신이란 것도 제법인걸. 다음번에야말로 제대로 잡아주겠어!」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ええーいっ！」"
translation = "「에에잇~!」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「やった！\u3000ヒットよ、ヒット！\u3000ちゃんと見ててくれたっ？」"
translation = "「해냈다! 안타야, 안타! 제대로 봐줬어?」"

[[dialogue]]
speaker = "unk"
original = "パルミエ、これは……？"
translation = "팔미에, 이건……?"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「見回りデートよ、見回りデート♪」"
translation = "「순찰 데이트야, 순찰 데이트♪」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「出るかもわからないモンスターをただ探し回るなんて面白くないじゃない？\u3000それなら見回りついでにデートした方が絶対楽しいわ」"
translation = "「나올지도 모르는 몬스터를 그저 찾아 헤매는 건 재미없잖아? 그럴 바엔 순찰하는 김에 데이트하는 게 훨씬 즐거워」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「デートしながら見回りしちゃダメだっていう規則もないでしょ？\u3000モンスターが出たらすぐに駆けつければいいだけだし」"
translation = "「데이트하면서 순찰하면 안 된다는 규칙도 없잖아? 몬스터가 나오면 바로 달려가면 되는 거고」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「それともダーリンは、しかめっ面でモンスターを探し回る方がお好みなのかしら？\u3000それが楽しくて仕方ないって言うならそうするけど」"
translation = "「아니면 달링은 인상 쓰면서 몬스터를 찾아 헤매는 게 취향인 걸까? 그게 즐거워 죽겠다면 그렇게 하겠지만」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ふふ、もちろん違うわよね？\u3000私とデートしながらの方が楽しいでしょ？」"
translation = "「후후, 물론 아니겠지? 나랑 데이트하면서 하는 게 더 즐겁지?」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「それじゃダーリンも打席に立って立って。未来の妻に格好いいところを見せてちょうだい♪」"
translation = "「그럼 달링도 타석에 서봐, 서봐. 미래의 아내에게 멋진 모습을 보여달라고♪」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「きゃ～！\u3000やるじゃないダーリン！\u3000ホームランよ、ホームラン！」"
translation = "「꺄아~! 제법인데 달링! 홈런이야, 홈런!」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「よーし、この調子で次はボーリングにでもいきましょ♪\u3000その後はお買い物ね♪\u3000休憩がてらカラオケに行くのもいいかしら～」"
translation = "「좋아, 이 기세로 다음은 볼링이라도 치러 가자♪ 그다음엔 쇼핑이야♪ 휴식 겸 가라오케에 가는 것도 좋을까나~」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ふぅ～。遊んだ、遊んだ。結局モンスターも出なかったわね～」"
translation = "「후우~. 놀았다, 놀았어. 결국 몬스터도 안 나왔네~」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「見回りデートの感想はどう？\u3000ダーリンは楽しかった？」"
translation = "「순찰 데이트 소감은 어때? 달링은 즐거웠어?」"

[[dialogue]]
speaker = "unk"
original = "こんなに楽しい見回りは初めてだったよ"
translation = "이렇게 즐거운 순찰은 처음이었어"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ふふ、なら良かったわ。ダーリンったら使命感ひとつで見回りしてるみたいだったから気になっちゃって」"
translation = "「후후, 그럼 다행이네. 달링이 사명감 하나로 순찰하는 것 같아서 신경 쓰였거든」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「やらなきゃいけない。とか言ってたでしょ？\u3000そんな身を削るような考え方じゃ、そのうち疲れちゃうわよ～？\u3000ブラック企業戦士じゃあるまいし」"
translation = "「해야만 한다. 같은 소릴 했지? 그런 몸을 깎는 듯한 생각으론 조만간 지쳐버릴걸~? 블랙 기업 전사도 아니고」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「何もダーリン１人で頑張る必要はないんだから。もうちょっと気楽に構えたら？」"
translation = "「아무도 달링 혼자 힘내라고 한 적 없으니까. 좀 더 편하게 생각하면 안 돼?」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「こうしてデートしながら見回りしたっていいわけだしね。やるなら楽しくやらなくちゃ勿体ないわ」"
translation = "「이렇게 데이트하면서 순찰해도 되는 거니까 말이야. 할 거라면 즐겁게 하지 않으면 손해라고」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「私も子どもの頃は毎日のようにお屋敷を抜け出して、シフォンやモナカと遊んだものよ。やっぱり人間、好きなことして過ごさなくちゃね♪」"
translation = "「나도 어릴 땐 매일같이 저택을 빠져나가서 시퐁이나 모나카랑 놀곤 했어. 역시 사람, 좋아하는 일을 하며 살아야지♪」"

[[dialogue]]
speaker = "unk"
original = "小さい頃からお転婆だったのか"
translation = "어릴 때부터 말괄량이였구나"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ダーリンもあんなところにいたらお転婆になっちゃうわよ～。毎日毎日やりたくないお勉強やお稽古ばっかりさせられるのよ～？」"
translation = "「달링도 그런 곳에 있으면 말괄량이 된다고~. 매일매일 하기 싫은 공부나 레슨만 시킨단 말이야~?」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「政治家の娘も大変よ？\u3000外に出した時に恥ずかしくないようにって必要以上になんでも仕込もうとしてくるんだもの」"
translation = "「정치인 딸도 힘들다니까? 밖에 내놨을 때 부끄럽지 않게 하려고 필요 이상으로 이것저것 가르치려 든다니까」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ま、自慢じゃないけど私、小さい頃から可愛い上に大抵のことは器用にできちゃう天才児だったから。色々やらせたくなるのもわかるけどね♪」"
translation = "「뭐, 자랑은 아니지만 나, 어릴 때부터 귀여운 데다 웬만한 건 척척 해내는 천재아였으니까. 이것저것 시키고 싶어지는 것도 이해는 가지만 말이야♪」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「でもでも興味のないことなんかやりたくないじゃない？\u3000実際につまらなかったし」"
translation = "「그래도 그래도 흥미 없는 건 하기 싫잖아? 실제로도 재미없었구.」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「けど、私みたいに考えられる人って意外といないみたいなのよね～。みんなホントよくやるわ。どうしてそんなに頑張れるのかしら」"
translation = "「그치만, 나처럼 생각할 수 있는 사람은 의외로 없는 모양이란 말이지~. 다들 정말 열심히들 하네. 어쩜 그렇게 힘을 낼 수 있는 걸까.」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「私はね、ダーリン。人生は楽しく自由であるべきだと思ってるの」"
translation = "「나는 말이야, 달링. 인생은 즐겁고 자유로워야 한다고 생각해.」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「本当はやらなくちゃいけないことなんか１つもないのよ。やりたくて仕方のないことがあるだけでね？」"
translation = "「사실 꼭 해야만 하는 일 같은 건 하나도 없어. 하고 싶어 견딜 수 없는 일이 있을 뿐이라구?」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「もしもどうしてもやらなきゃいけないことがあったとしても、まずはそれをやりたくて仕方のないことに変えることから始めなきゃ」"
translation = "「만약 어떻게든 해야만 하는 일이 있다고 해도, 우선은 그걸 하고 싶어 견딜 수 없는 일로 바꾸는 것부터 시작해야 해.」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「こうして見回りをするのだって、ただ見回りするのは面倒でも、ダーリンとの見回りデートに変えちゃえば私はやる気が出てくるし♪」"
translation = "「이렇게 순찰을 하는 것도, 그냥 순찰만 하는 건 귀찮아도, 달링과의 순찰 데이트로 바꿔버리면 나는 의욕이 생기니까♪」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「だから、あんまり気負い過ぎちゃだーめ♪\u3000ワガママなくらいが丁度いいんだから♪」"
translation = "「그러니까, 너무 부담 갖지 말기~♪ 제멋대로인 정도가 딱 좋으니까♪」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ということでダーリン。残りの見回りは他の人に任せて、私たちはデートの続きをしちゃいましょ♪」"
translation = "「그런 고로 달링. 남은 순찰은 다른 사람에게 맡기고, 우리는 데이트를 계속하자♪」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「まずは腹ごしらえからね。美味しいディナーを食べたいわ～。その後は部室に戻って２人でだらだらしながらゲームしてもいいかも♪」"
translation = "「우선 배부터 채워야겠지. 맛있는 저녁을 먹고 싶네~. 그다음엔 부실로 돌아가서 둘이서 빈둥거리며 게임 해도 좋을지도♪」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ダーリンは何がしたい？\u3000せっかくの機会だし、思いっきり遊んでストレス解消しちゃいましょ？」"
translation = "「달링은 뭐가 하고 싶어? 어렵게 낸 기회인데, 마음껏 놀면서 스트레스 풀어버리자?」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「なんなら、ふふふ。その辺のホテルにでも入って、可愛い私とイチャイチャしちゃう？\u3000そういう大人なデートもダーリンとなら……大歓迎よ？」"
translation = "「아니면, 후후후. 근처 호텔이라도 들어가서, 귀여운 나랑 꽁냥꽁냥 할래? 그런 어른스러운 데이트도 달링이랑 함께라면…… 대환영이야?」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「あらあら、照れちゃって。我慢は体に毒よ～？」"
translation = "「어라어라, 부끄러워하긴. 참는 건 몸에 독이라구~?」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「まぁそういう奥手なところも、ふふ、可愛いんだけど♪」"
translation = "「뭐 그런 쑥스러워하는 점도, 후후, 귀엽지만 말이야♪」"

