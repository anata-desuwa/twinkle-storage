[[dialogue]]
speaker = "unk"
original = "第５話,新たなるメンバー,B"
translation = "제5화, 새로운 멤버, B"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「あの御前試合の日から、もう数ヶ月……か」"
translation = "「그 어전시합 날로부터 벌써 몇 달……인가.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（これまで、緋宮クロトの動向を監視すると同時に、ジグの行方を探し続けてきた……）"
translation = "(지금까지 히노미야 쿠로토의 동향을 감시하는 동시에 지그의 행방을 계속 찾아왔다……)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（私が発見されたというこの場所に何らかの痕跡がないかを調べ、美術部にジグの似顔絵を描いてもらい目撃情報を募った。……しかし、成果はなし）"
translation = "(내가 발견되었다는 이 장소에 어떠한 흔적이 없는지 조사하고, 미술부에 지그의 초상화를 그리게 해서 목격 정보를 모았다. ……하지만 성과는 없음.)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（ジグが暮らしていたはずの<ruby>新星学園寮<rt>ラルーナ</rt></ruby>の部屋も見に行ったが……空き部屋だった）"
translation = "(지그가 살았을 터인 신성학원 기숙사의 방도 보러 갔지만…… 빈방이었다.)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「緋宮クロトが口にしていた平行世界という言葉……確証こそないものの、状況証拠だけで言えばどんどん揃っていってしまう。まったく嫌になる」"
translation = "「히노미야 쿠로토가 입에 담았던 평행세계라는 말…… 확증은 없지만 정황 증거만 따지면 점점 갖춰져 가고 있어. 정말 싫어지는군.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（だが、もし仮にここが私たちの住んでいた世界とは異なる平行世界だったとして……あの状況から私だけが逃げ延びて、ジグが死んだとは考えづらい）"
translation = "(하지만 만약 여기가 우리가 살던 세계와는 다른 평행세계였다고 쳐도…… 그 상황에서 나만 살아남고 지그가 죽었다고는 생각하기 어렵다.)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私は生まれてこの方、ジグに勝ったことが１度もないのだから……な」"
translation = "「나는 태어나서 지금까지 지그에게 이긴 적이 단 한 번도 없으니까…… 말이지.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私が生きている以上、ジグも必ず生きている。もしかすると、すでにこの世界で活動を開始しているのかもしれない」"
translation = "「내가 살아있는 이상 지그도 반드시 살아있다. 어쩌면 이미 이 세계에서 활동을 시작했을지도 몰라.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ジグ……早く私を見つけてくれ。いつものように、飄々とした態度で『何とでもなるさ』と声をかけてくれ」"
translation = "「지그…… 빨리 나를 찾아줘. 평소처럼 표표한 태도로 『어떻게든 될 거야』라고 말을 걸어줘.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「なあ、頼むよ……また私と勝負してくれ……」"
translation = "「제발 부탁이야…… 다시 나와 승부해 줘……」"

[[dialogue]]
speaker = "unk"
original = "何故か、ジグのことを考えると頭が痛む。"
translation = "어째서인지 지그를 생각하면 머리가 아프다."

[[dialogue]]
speaker = "unk"
original = "心臓は早鐘を打ち、体中の血液がまるでジェットコースターのように急上昇と急降下を繰り返し、吐き気がする。"
translation = "심장은 요동치고 몸 안의 혈액이 마치 롤러코스터처럼 급상승과 급강하를 반복해 구역질이 난다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（そうだ、私には何か、やらなければならないことがあったはずだ……）"
translation = "(그래, 나에게는 무언가 해야만 하는 일이 있었을 터다……)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（どこかで、誰かに託されたものが……私の中に……）"
translation = "(어딘가에서 누군가에게 기탁받은 것이…… 내 안에……)"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「おーーっと！\u3000こんなところに居やがったか！！」"
translation = "「오오──옷! 이런 곳에 있었냐!!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「君は……フィオナじゃないか」"
translation = "「너는…… 피오나가 아닌가.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「だーーっ！\u3000もう！\u3000あたしの名前はアポロだっつってんだろうが！\u3000いい加減覚えろよな、ポンコツ！」"
translation = "「다──앗! 정말! 내 이름은 아폴로라고 했잖아! 이제 좀 외우라고, 폰코츠!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ポンコツ！？」"
translation = "「폰코츠!?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「オマエがあたしの何を知ってるのかは知らねえけど、あたしにはあたしの矜持ってもんがあるんだ。流星ライダーをバカにするなよ！」"
translation = "「네가 나에 대해 뭘 아는지는 모르겠지만, 나에게는 나만의 긍지라는 게 있다고. 유성 라이더를 바보 취급 하지 마!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「バカぁ！？」"
translation = "「바보오!?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「うぅぅ……やっぱり私は、ポンコツでバカな役立たずなんだ……」"
translation = "「으으으…… 역시 나는 폰코츠에 바보 같은 쓸모없는 놈이야……」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「あっはっはっは！\u3000なんだオマエ、やっぱ面白い奴だな！\u3000何言ってるかゼンゼンわかんないぞ！」"
translation = "「앗하하하! 뭐야 너, 역시 재밌는 녀석이네! 무슨 말을 하는지 전혀 모르겠어!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「おっ、そうだ。グミいるか？\u3000悲しい気持ちになった時はな、お菓子を食べるといいぞ！\u3000甘いものを食べれば、だいたいのことはどうでもよくなる」"
translation = "「오, 그렇지. 구미 먹을래? 슬픈 기분이 들 때는 말이야, 과자를 먹는 게 좋다고! 단것을 먹으면 대부분의 일은 아무래도 좋아지니까.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……い、頂こう」"
translation = "「……바, 받도록 하지.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「あっ！\u3000グミは１つだけだからな！\u3000貴重な今日の分のおやつから分けてやってるんだ、ちゃんと感謝して食べろよ！」"
translation = "「앗! 구미는 하나뿐이라고! 귀중한 오늘의 간식에서 나눠주는 거니까 제대로 감사하며 먹으라고!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ああ。ありがとう、感謝する」"
translation = "「아아. 고맙다, 감사하마.」"

[[dialogue]]
speaker = "unk"
original = "梨緒がアポロからもらったグミを口に含むと、甘味が口いっぱいに広がる。悩みがどうでもよくなったりはしないが、いく分気持ちは落ち着いた。"
translation = "리오가 아폴로에게 받은 구미를 입에 넣자 단맛이 입안 가득 퍼진다. 고민이 아무래도 좋아지지는 않지만 어느 정도 기분은 진정되었다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「それでアポロ、どうしたんだ？\u3000何やら私を探しているようだったが」"
translation = "「그래서 아폴로, 무슨 일이지? 왠지 나를 찾고 있는 것 같았다만.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「おお、そうだった！\u3000あたしはオマエに聞きたいことがあったんだった」"
translation = "「오오, 그랬지! 나는 너에게 묻고 싶은 게 있었어.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「聞きたいこと……？」"
translation = "「묻고 싶은 것……?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「どうやらフィオナと魔王との間では話が付いてるらしいけどな、あたしとしては直接オマエの言葉が聞きたいんだ」"
translation = "「아무래도 피오나랑 마왕 사이에서는 이야기가 된 모양이지만 말이야, 나로서는 직접 네 말을 듣고 싶어.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ズバリ、オマエの目的はなんだ……！？」"
translation = "「단도직입적으로, 네 목적은 뭐냐……!?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私の……目的？」"
translation = "「내…… 목적?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「オマエは一体、何のために戦っているのかって話だ！\u3000流星ライダーにとっても、星騎士にとっても１番重要なことだぞ！」"
translation = "「너는 대체 무엇을 위해 싸우고 있느냐는 소리야! 유성 라이더에게도 성기사에게도 가장 중요한 일이라고!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「そ、それはもちろん……リクリエを止め、世界を救うことだ！」"
translation = "「그, 그것은 물론…… 리크리에를 멈추고 세계를 구하는 것이다!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「なるほど。つまりあたしや魔王と目的は一緒だな！\u3000なのに何故、オマエは協力できないんだ」"
translation = "「과연. 즉 나나 마왕이랑 목적은 같네! 그런데 왜 너는 협력하지 않는 거지?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「それは……」"
translation = "「그건……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私は……魔王クロトが、世界を滅ぼす様をこの目で見たんだ……」"
translation = "「나는…… 마왕 쿠로토가 세계를 멸망시키는 모습을 이 눈으로 봤다……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「太陽の壁画でも伝えられている通り、魔王の力は世界を滅ぼしかねない危険な力だ。いち個人が野放図に振るっていいものだとは思えない」"
translation = "「태양의 벽화에서도 전해지듯이 마왕의 힘은 세계를 멸망시킬지도 모르는 위험한 힘이다. 한 개인이 제멋대로 휘둘러도 되는 것이라고는 생각되지 않아.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「……ふむ」"
translation = "「……흠.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私は、私が見た絶望的な光景を忘れることができない……」"
translation = "「나는 내가 본 절망적인 광경을 잊을 수가 없다……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だが、ここではみんなが緋宮クロトを信用している」"
translation = "「하지만 여기서는 모두가 히노미야 쿠로토를 신용하고 있지.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私だけが、みんなと違うことを信じている」"
translation = "「나만이 모두와 다른 것을 믿고 있다.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（そうだ。私は不安なんだ。……すべてを忘れて楽観的に構える図太さも、自分の主観を盲信して突き進む頑強さも、私には欠けている）"
translation = "(그래. 나는 불안한 거다. ……모든 것을 잊고 낙관적으로 대처하는 뻔뻔함도, 자신의 주관을 맹신하며 나아가는 강인함도 나에게는 부족해.)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（目の前にいるアポロ……<b>本物の</b>星見フィオナもそうだ。彼女は本来、もっと成熟した女の子だった）"
translation = "(눈앞에 있는 아폴로…… <b>진짜</b> 호시미 피오나도 그렇다. 그녀는 본래 좀 더 성숙한 여자아이였다.)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（今ここにある現実だと思っているものはすべて、死の間際に私が見ている妄想でないと、誰が保証できる……）"
translation = "(지금 여기 있는 현실이라고 생각하는 모든 것이 죽기 직전에 내가 보고 있는 망상이 아니라고 누가 보증할 수 있지……)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「教えてくれ、アポロ。私は狂ってしまったのか？」"
translation = "「가르쳐줘, 아폴로. 나는 미쳐버린 건가?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私はもはや、自分自身すらも信じ切ることができない」"
translation = "「나는 이제 나 자신조차도 완전히 믿을 수가 없다.」"

[[dialogue]]
speaker = "unk"
original = "うなだれながら言葉を紡ぐ梨緒を前にして、アポロは偉そうに頷いて見せた。"
translation = "고개를 숙이며 말을 잇는 리오를 앞에 두고 아폴로는 거드름 피우며 고개를 끄덕여 보였다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「なるほど！\u3000オマエの悩みは完全に理解した！」"
translation = "「과연! 네 고민은 완전히 이해했다!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ならばヒーローを目指すあたしが、これからは一緒に悩んでやろう！！」"
translation = "「그렇다면 히어로를 지향하는 내가 이제부터는 함께 고민해 주마!!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……なに？」"
translation = "「……뭐라고?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「あたしは昔、ずっと１人で考えすぎて、大きく道を間違えた」"
translation = "「나는 옛날에 계속 혼자서 너무 많이 생각하다가 크게 길을 잘못 들었어.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「知ってるか？\u3000ヒトってのは１人で考えていると、極端な答えを出しやすいんだぞ！」"
translation = "「알고 있어? 인간이라는 건 혼자서 생각하고 있으면 극단적인 답을 내기 쉽다고!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「オマエが悩むなら、あたしが一緒に考えてやる」"
translation = "「네가 고민한다면 내가 함께 생각해 줄게.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「もしオマエが間違っていたら、あたしが『間違っている』と教えてやる！」"
translation = "「만약 네가 틀렸다면 내가 『틀렸다』고 가르쳐 줄게!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「少なくとも、答えに悩んでいる今のオマエは、狂ってなんかいないぞ」"
translation = "「적어도 답 때문에 고민하고 있는 지금의 너는 미치거나 하지 않았어.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「いいか？\u3000狂った人間というのは、シンプルで力強いものなんだ！\u3000昔のあたしや、ギエルがそうだったようにな」"
translation = "「알겠어? 미친 인간이라는 건 단순하고 강력한 법이야! 옛날의 나나 기엘이 그랬던 것처럼 말이지.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「迷ってばかりで、複雑で、弱々なオマエは、まだ正気の人間だ」"
translation = "「망설이기만 하고 복잡하고 나약한 너는 아직 제정신인 인간이야.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「安心しろ！\u3000オマエの正気は、あたしが保証してやる！」"
translation = "「안심해! 네 제정신은 내가 보증해 줄게!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「だからオマエは、あたしと一緒に来い！！」"
translation = "「그러니까 너는 나와 함께 가자!!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……それはつまり、君が選挙管理委員会に所属する……ということか？」"
translation = "「……그건 즉, 네가 선거관리위원회에 소속된다는…… 건가?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「んん？\u3000『せんきょかんりいいんかい』……？」"
translation = "「응? 『선거관리위원회』……?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ああ、フィオナが言ってた、梨緒の作った秘密結社のことか！」"
translation = "「아아, 피오나가 말했던 리오가 만든 비밀결사 말인가!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「いや、秘密結社ではまったくないが……」"
translation = "「아니, 비밀결사는 전혀 아니다만……」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ふむふむ。そういうつもりじゃなかったんだが、それもいいかもしれないな」"
translation = "「흠흠. 그럴 생각은 아니었지만 그것도 좋을지도 모르겠네.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「フィオナは流星、魔王は新星の星徒会長なのに、あたしだけ毎日遊んでいるわけにはいかないし……」"
translation = "「피오나는 유성, 마왕은 신성의 성도회장인데 나만 매일 놀고 있을 수는 없으니까……」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ただちょっと待て！\u3000一応フィオナに相談してからだ」"
translation = "「다만 잠깐 기다려! 일단 피오나랑 상담하고 나서야.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「勝手に危ないことをすると、おやつ抜きになってしまうからな！」"
translation = "「멋대로 위험한 짓을 하면 간식을 못 먹게 되니까 말이지!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「え？\u3000あ、いや、アポロ……？」"
translation = "「에? 아, 아니, 아폴로……?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「そうと決まれば善は急げだ！\u3000さっそくこのことを相談してくるぞ！\u3000──じゃあまたな、梨緒！」"
translation = "「결정됐으면 쇠뿔도 단김에 빼랬다고! 당장 이 일을 상담하고 올게! ──그럼 또 보자, 리오!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「いやまて、話を勝手に……」"
translation = "「아니 기다려, 이야기를 멋대로……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「って、もう行ってしまった……」"
translation = "「앗, 벌써 가버렸어……」"

[[dialogue]]
speaker = "unk"
original = "その場に取り残された梨緒は、子どものように全力疾走で走り去っていくアポロの背中を、茫然と見送るしかなかった。"
translation = "그 자리에 남겨진 리오는 아이처럼 전력 질주로 달려가는 아폴로의 뒷모습을 망연히 배웅할 수밖에 없었다."

