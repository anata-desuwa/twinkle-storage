[[dialogue]]
speaker = "unk"
original = "第４話,アポロとお買い物,P"
translation = "제4화, 아폴로와 쇼핑"

[[dialogue]]
speaker = "unk"
original = "今日はアポロと外出をする日だ。なんでも買い物に付き合って欲しいらしい。"
translation = "오늘은 아폴로와 외출하는 날이다. 뭐든 쇼핑하는 걸 도와줬으면 하는 모양이다."

[[dialogue]]
speaker = "unk"
original = "なんだかドキドキしてきた。休日に繁華街で待ち合わせだなんて、デートみたいじゃないか。"
translation = "왠지 두근거리기 시작했다. 휴일에 번화가에서 만나기로 하다니, 데이트 같지 않은가."

[[dialogue]]
speaker = "unk"
original = "男友達と遊ぶ時より、服選びやヘアセットにたっぷりと時間をかけた俺は、待ち合わせ場所へ向かった──"
translation = "남자 친구들과 놀 때보다 옷 고르기나 헤어 세팅에 듬뿍 시간을 들인 나는 약속 장소로 향했다──"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「よお、魔王！\u3000待ってたぜー！」"
translation = "「여어, 마왕! 기다렸다구!」"

[[dialogue]]
speaker = "unk"
original = "今日は何を買う予定なの？"
translation = "오늘은 뭘 살 예정이야?"

[[dialogue]]
speaker = "unk"
original = "お待たせ"
translation = "오래 기다렸지"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ああ。あたしのパンツを買おうと思ってな！\u3000手伝ってくれ！！」"
translation = "「아아. 내 팬티를 사려고 생각해서 말이야! 좀 도와줘!!」"

[[dialogue]]
speaker = "unk"
original = "……ズ、ズボンのことだよね？"
translation = "……바, 바지 말하는 거지?"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「なにを言ってるんだ、お前？\u3000パンツと言ったらパンツだ！\u3000下着だ！」"
translation = "「무슨 소리 하는 거야, 너? 팬티라고 하면 팬티지! 속옷이라구!」"

[[dialogue]]
speaker = "unk"
original = "何で俺を誘ったの！？"
translation = "왜 나를 부른 거야!?"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「なんでって……だってお前はあたしと同じ、魔王だろう？\u3000当然、パンツにもこだわりがあるはずだ！」"
translation = "「왜냐니…… 그야 너는 나와 같은 마왕이잖아? 당연히 팬티에도 고집이 있을 거 아냐!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「やっぱり買い物をするなら、こだわりのある奴と一緒にしないとな！」"
translation = "「역시 쇼핑을 한다면 고집이 있는 녀석이랑 같이 해야지!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「よくわからないって……そんなことないだろ！？\u3000まさかお前、戦いに行く時にヒモの伸びたお古のパンツを穿いてるんじゃないだろうな！？」"
translation = "「잘 모르겠다니…… 그럴 리 없잖아!? 설마 너, 싸우러 갈 때 끈 늘어난 낡은 팬티를 입고 있는 건 아니겠지!?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「戦士たるもの、いつ命を散らすかわからない！\u3000故に最高のパンツを常に穿くものなんだぞ！」"
translation = "「전사라면 언제 목숨을 잃을지 몰라! 고로 최고의 팬티를 항상 입고 있어야 하는 법이라구!」"

[[dialogue]]
speaker = "unk"
original = "（流星ライダーでそういうのあったなぁ）"
translation = "(유성 라이더에서 그런 내용이 있었지)"

[[dialogue]]
speaker = "unk"
original = "（ああ、なるほど……）"
translation = "(아아, 그렇구나……)"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「あたしもだいぶ回復した！\u3000お前と共に戦いに赴くこともあるだろう。来たるべき日に備えて、パンツを新調しておこうと思ったんだ！\u3000わはは！」"
translation = "「나도 꽤 회복됐어! 너와 함께 싸우러 나갈 일도 있겠지. 다가올 날을 대비해서 팬티를 새로 장만해 두려고 생각했어! 와하하!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「なに……応援を呼ぶ？\u3000あたしはお前と２人で構わないぞ？」"
translation = "「뭐…… 응원을 부른다고? 난 너랑 둘이라도 상관없는데?」"

[[dialogue]]
speaker = "unk"
original = "そう言われるのは光栄だけれど、女の子のパンツなんてどう選べばいいのか俺にはわからないし。"
translation = "그렇게 말해주니 영광이긴 하지만, 여자애 팬티를 어떻게 골라야 할지 난 모르겠고."

[[dialogue]]
speaker = "unk"
original = "俺は頼れる新星星徒会から、都合のつくメンバーに連絡を取った──アポロはデートのつもりはなかったんだ、とちょっぴりしょげながら。"
translation = "나는 믿음직한 신성 성도회에서 시간이 되는 멤버에게 연락을 취했다── 아폴로는 데이트할 생각이 없었구나, 하고 조금 풀이 죽으면서."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「状況は把握しました。会長、心中お察しいたします」"
translation = "「상황은 파악했습니다. 회장님, 심려가 크시겠군요」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「お姉ちゃんが来たからにはもう大丈夫よ～♪\u3000それじゃあ下着売り場にー……ゴ～<emoji=heart04>」"
translation = "「언니가 왔으니 이제 괜찮아~♪ 그럼 속옷 매장으로~ 고~<emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「アポロさん。こういう下着はいかがでしょう」"
translation = "「아폴로 씨. 이런 속옷은 어떠신가요?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「むー。どれもこれも地味だな。黒か白の一色じゃないか」"
translation = "「음-. 어느 것이나 수수하네. 검정 아니면 하얀색 단색뿐이잖아」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「下着は素材が大事。デザインは重要ではありません。どうせ見えないですし」"
translation = "「속옷은 소재가 중요해요. 디자인은 중요하지 않습니다. 어차피 보이지도 않으니까요」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ダメだダメだ！\u3000ロマンがない！\u3000見えてないところにこだわってこそのヒーローだろ！」"
translation = "「안 돼 안 돼! 로망이 없잖아! 안 보이는 곳에 신경을 써야 진정한 히어로지!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「じゃあ、こういうのはどうかしら～？」"
translation = "「그럼, 이런 건 어떠니~?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「な、なんだこのヒモみたいなえっちなパンツは！？\u3000おおおっ、お前は変態かっ！？」"
translation = "「뭐, 뭐야 이 끈 같은 야한 팬티는!? 오오옷, 너 변태냐!?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「え～～？\u3000これくらい普通だと思うけれど……」"
translation = "「에~~? 이 정도면 보통이라고 생각하는데……」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「なによりカッコよくない！\u3000却下だ！」"
translation = "「무엇보다 멋지지 않아! 기각이다!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ひど～い。似合うと思ったのに～」"
translation = "「너무해~. 잘 어울릴 거라고 생각했는데~」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「よし──じゃあ次は魔王だ！\u3000どんなのを選んでくれたんだ？」"
translation = "「좋아── 그럼 다음은 마왕이다! 넌 어떤 걸 골라줬어?」"

[[dialogue]]
speaker = "unk"
original = "これでどうですか、お嬢様"
translation = "「이건 어떠신가요, 아가씨」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「へえ…………。そういうのが好きなんですね、会長」"
translation = "「헤에……. 그런 게 취향이시군요, 회장님」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あらあら、うふふ。男の子ね～♪」"
translation = "「어머어머, 우후후. 남자아이네~♪」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「また可愛い系か……！\u3000カッコいいパンツが欲しいんだ、あたしは！」"
translation = "「또 귀여운 계열인가……! 멋진 팬티를 원한다고, 나는!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そもそもカッコいいの定義は何なのですか？」"
translation = "「애초에 멋지다는 정의가 무엇인가요?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「これは難問ね～……！」"
translation = "「이건 난문이네~……!」"

[[dialogue]]
speaker = "unk"
original = "そうしてパンツ選びは難航を極めて──結局アポロが購入したのは、特撮の怪獣がプリントされたパンツなのだった。"
translation = "그렇게 팬티 고르기는 난항을 거듭했고── 결국 아폴로가 구입한 것은, 특촬물의 괴수가 프린트된 팬티였다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「お前たちのおかげでかっこいいパンツが手に入ったぞ！\u3000ありがとな！」"
translation = "「너희 덕분에 멋진 팬티를 손에 넣었어! 고맙다!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「これでいつでも出撃できるぜ！\u3000ひゃっほう！」"
translation = "「이걸로 언제든 출격할 수 있다고! 히얏호!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「センスがわかりません……」"
translation = "「센스를 모르겠어요……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「うふふ。でも平和な世界って感じがして、いいじゃない♪\u3000さ～て、それじゃあアナちゃん、私たちはお暇しましょうか」"
translation = "「우후후. 하지만 평화로운 세상이라는 느낌이 들어서 좋지 않니♪ 자~ 그럼 아나짱, 우리는 이만 실례할까」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そうですね。デートのお邪魔でしょうし、退散しましょう」"
translation = "「그렇네요. 데이트에 방해될 테니, 물러나도록 하죠」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「……は？\u3000でーと？\u3000なんでそんな話になってるんだ？」"
translation = "「……하? 데이트? 왜 그런 이야기가 나오는 거야?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「え、デートじゃなかったの？\u3000私たちてっきり……」"
translation = "「에, 데이트 아니었어? 우린 당연히……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はい。買い物中に彼女から無理難題を言われたから、会長がヘルプを頼んできたものとばかり」"
translation = "「네. 쇼핑 중에 그녀가 억지스러운 요구를 해서, 회장님이 도움을 요청한 것이라고만」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ななな、なんであたしと魔王が付き合ってることになってるんだ！？\u3000ただの友人同士の買い物じゃないか！」"
translation = "「나나나, 왜 나랑 마왕이 사귀는 걸로 되어 있는 거야!? 그냥 친구끼리 쇼핑하는 거잖아!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「だって最近いつも一緒にいるし～。アポロちゃんとの買い物で困ってるって言うから、てっきりデートなんだろうな～って」"
translation = "「그치만 최근에 항상 같이 있기도 하고~. 아폴로짱이랑 쇼핑하는 것 때문에 곤란하다고 하길래, 당연히 데이트겠거니 했지~」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……お付き合いしてなかったんですね。だったらもう少し気を遣うべきです」"
translation = "「……사귀는 게 아니었군요. 그렇다면 좀 더 신경을 쓰셨어야 합니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「恋人でもない異性を下着選びに連れ出すのは、少々相手に誤解を与えるかと……」"
translation = "「연인도 아닌 이성을 속옷 고르기에 데려오는 건, 조금 상대에게 오해를 줄 수도……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そうよ～、アポロちゃん。会長くんだって普段よりも気合いを入れておめかししてきてるのに」"
translation = "「맞아~, 아폴로짱. 회장 군도 평소보다 기합을 넣어서 꾸미고 왔는데」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「なに！？\u3000……む。言われてみれば、なんか髪型がちょっと違う……」"
translation = "「뭐!? ……음. 듣고 보니, 왠지 헤어스타일이 좀 다른 것 같기도……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「相手の気持ちも考えてあげないと可哀そうよ？\u3000それじゃあね♪」"
translation = "「상대의 기분도 생각해주지 않으면 불쌍하단다? 그럼 안녕♪」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「それでは会長。また学園で」"
translation = "「그럼 회장님. 나중에 학원에서 뵙죠」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「な、なんか変な雰囲気になっちゃったな……お前、もしかしてデートのつもりで来てくれたのか？」"
translation = "「뭐, 뭔가 이상한 분위기가 돼버렸네…… 너, 설마 데이트할 생각으로 와준 거야?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「──う。な、なんかすまん……あたし、お前のことは気の置けない友人だと思ってて……」"
translation = "「──으. 왠지 미안하다…… 나, 너는 편한 친구라고 생각해서……」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「……え、ええと。せっかくだからどこかでお茶でもしていくか？\u3000うん……行こう！」"
translation = "「……어, 에토. 이왕 이렇게 된 거 어디서 차라도 마시고 갈까? 응…… 가자!」"

[[dialogue]]
speaker = "unk"
original = "その後、お互い変に意識しあってしまい、結局お茶もそこそこに解散することになった俺たちなのだった──"
translation = "그 후, 서로 묘하게 의식해버리는 바람에, 결국 차도 마시는 둥 마는 둥 하고 해산하게 된 우리였다──"

