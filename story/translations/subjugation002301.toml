[[dialogue]]
speaker = "unk"
original = "ある日の放課後、俺が星徒会室で仕事していると――"
translation = "어느 날 방과 후, 내가 성도회실에서 일하고 있자──"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「お忙しいところ失礼致します」"
translation = "「바쁘신 와중에 실례하겠습니다.」"

[[dialogue]]
speaker = "unk"
original = "マリオンさん、こんにちは"
translation = "마리온 씨, 안녕하세요"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「はい♪\u3000ごきげんよう、会長様♪」"
translation = "「네♪ 평안하신가요, 회장님♪」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「ふふふっ、このマリオン、今日も会長様のお可愛いご尊顔を拝めて、眼福です<emoji=heart04>」"
translation = "「후후후, 이 마리온, 오늘도 회장님의 귀여운 존안을 뵐 수 있어 눈이 호강하네요♥」"

[[dialogue]]
speaker = "unk"
original = "彼女は星見家メイド隊の、マリオン・ネイマールさん。元星見家メイド長にして、元流星学園星徒会長という経歴を持つ、ハイスペック美人メイドさんである。"
translation = "그녀는 호시미 가문 메이드대의 마리온 네이마르 씨. 전 호시미 가문 메이드장이자 전 유성학원 성도회장이라는 경력을 가진 하이스펙 미인 메이드이다."

[[dialogue]]
speaker = "unk"
original = "しかし、それらはあくまで仮の姿。その正体は、ネビュラ所属の『魔女』だったりする。"
translation = "하지만 그것들은 어디까지나 가짜 모습. 그 정체는 네뷸라 소속의 『마녀』이기도 하다."

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「――それで、本日参りました用件についてなのですが……」"
translation = "「──그래서 오늘 찾아온 용건에 대해서입니다만……」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「クーシェン様、どうぞこちらへ」"
translation = "「쿠셴 님, 이쪽으로 오시죠.」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「は～い♪」"
translation = "「네~이♪」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「へぇ～、キミが噂の魔王様～？\u3000やあやあ、初めまして。ボクの名前は、クーシェン！」"
translation = "「헤에~, 네가 소문의 마왕님~? 야아 야아, 처음 뵙겠어. 내 이름은 쿠셴!」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「強きを求めて魔界を放浪せし、さすらいの星術使いだよ！」"
translation = "「강함을 찾아 마계를 방랑하는 떠돌이 성술사야!」"

[[dialogue]]
speaker = "unk"
original = "初めまして。キミはどうして人間界に？"
translation = "처음 뵙겠습니다. 너는 어째서 인간계에?"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「それは私の方から説明させて頂きます。実は私……ネビュラの仕事で『三界の監視役』を担っておりまして」"
translation = "「그건 제가 설명해 드리겠습니다. 사실 제가…… 네뷸라의 업무로 『삼계의 감시역』을 맡고 있어서요.」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「自身の人形たちを人間界だけでなく、魔界や天界など三界の各地に配置して、異常がないか監視させているのです」"
translation = "「자신의 인형들을 인간계뿐만 아니라 마계나 천계 등 삼계 곳곳에 배치해 이상이 없는지 감시하게 하고 있습니다.」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「それで先日、魔界のクーシェン様が現地の方たちとトラブルになり、大立ち回りを繰り広げていたところをお見かけしまして……」"
translation = "「그래서 요전날, 마계의 쿠셴 님이 현지 분들과 트러블이 생겨 한바탕 난동을 부리고 있던 것을 발견해서……」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「いや～、そいつら、街を裏から牛耳って、住人を苦しめていた悪党でさ！\u3000ここは１つ、強いボクがとっちめてやろうと思って、アジトに乗り込んでったんだけど～」"
translation = "「아니~, 그 녀석들, 마을을 뒤에서 좌지우지하며 주민들을 괴롭히던 악당이라서 말이야! 일단 강한 내가 혼내줘야겠다 싶어서 아지트에 쳐들어갔는데~」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「ちょ～っと調子に乗って、連中に悪戯をし過ぎちゃってさ……ボスを本気で怒らせちゃったんだよね～」"
translation = "「조~금 신이 나서 녀석들에게 장난을 너무 많이 쳤더니 말이야…… 보스를 진짜로 화나게 해버렸지 뭐야~」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「で、悪党総出で追っかけて来るから、街中が大騒ぎになっちゃって。その時に、マリオンが助けてくれたんだ！」"
translation = "「그래서 악당들이 총동원되어 쫓아오는 바람에 마을이 온통 난리가 났어. 그때 마리온이 도와줬지!」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「魔王は知ってる！？\u3000マリオンってすっごく強いんだよ！\u3000何千何百と分身を作り出して、あっという間に悪党共を制圧しちゃったんだから」"
translation = "「마왕은 알고 있어!? 마리온은 엄청나게 강하다구! 수천 수백의 분신을 만들어내서 순식간에 악당들을 제압해버렸으니까.」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「何千は言い過ぎですよ。まあ……その後にクーシェン様と戦った際は、１０００体以上人形を作る羽目になりましたが……」"
translation = "「수천은 과장이에요. 뭐…… 그 후에 쿠셴 님과 싸웠을 때는 1000체 이상의 인형을 만들어야 했지만요…….」"

[[dialogue]]
speaker = "unk"
original = "１０００体！？\u3000というか、戦ったって……"
translation = "1000체!? 그보다 싸웠다니……"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「悪党たちをやっつけた後に、ボクからマリオンに勝負をお願いしたんだ♪」"
translation = "「악당들을 해치운 뒤에 내가 마리온에게 승부를 부탁했거든♪」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「ほら、強いヒトと出会ったら、ウキウキして手合わせしたくなるでしょ？」"
translation = "「봐봐, 강한 사람과 만나면 우키키♪ 하고 대련하고 싶어지잖아?」"

[[dialogue]]
speaker = "unk"
original = "快活な<ruby>戦闘狂タイプ<rt>バトルマニア</rt></ruby>かぁ……。"
translation = "쾌활한 전투광 타입인가……. "

[[dialogue]]
speaker = "unk"
original = "なまじヴィーナスと相性が良さそうなだけに、今日は九浄家の用事で不在という幸運に俺は感謝した。"
translation = "공교롭게도 비너스와 상성이 좋아 보였기에, 오늘은 쿠죠 가문의 용무로 부재중이라는 행운에 나는 감사했다."

[[dialogue]]
speaker = "unk"
original = "いきなり「バトルよ！」とか言い出しても、話がややこしくなりそうだったので。"
translation = "갑자기 「배틀이야!」라고 하기라도 하면 이야기가 복잡해질 것 같았기에."

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「ボクも結構強い自信があるけど、マリオンと命がけの全力勝負したら、結構やばいかもね♪」"
translation = "「나도 꽤 강하다는 자신이 있지만, 마리온과 목숨을 건 전력 승부를 하면 꽤 위험할지도 모르겠네♪」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「ボク、強いヒトはちゃんと尊敬することにしてるんだ。そんなマリオンの話だから、今日も付いてくることにしたんだよ」"
translation = "「나는 강한 사람은 제대로 존경하기로 했거든. 그런 마리온의 이야기니까 오늘도 따라오기로 한 거야.」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「実際に手合わせさせて頂き、わかりましたが………」"
translation = "「실제로 대련해 보고 알았습니다만………」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「クーシェン様はその小さくお可愛い身でありながら、私の人形１０００体では足りない程――まさに一騎当千の実力を秘めていらっしゃいます」"
translation = "「쿠셴 님은 그 작고 귀여운 몸이면서도 제 인형 1000체로는 부족할 정도── 그야말로 일당백의 실력을 감추고 계십니다.」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「そこで、私の方から星騎士としてスカウトさせて頂き、世界樹を通って人間界へとお連れしたのです」"
translation = "「그래서 제가 성기사로서 스카우트하여 세계수를 통해 인간계로 모셔온 것입니다.」"

[[dialogue]]
speaker = "unk"
original = "なるほど……でもどうして俺のところへ？"
translation = "그렇구나…… 하지만 어째서 내 쪽으로?"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「人間界には私よりも強い魔王様がいらっしゃいますよ、とお話させて頂いた結果、会わせてくれるのなら人間界に来てもいい、と仰られたのです」"
translation = "「인간계에는 저보다 강한 마왕님이 계십니다, 라고 말씀드린 결과, 만나게 해 준다면 인간계에 와도 좋다고 하셨습니다.」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「あとは、もう１点。クーシェン様がお持ちの『道具』について、もしかすると会長様にお心当たりがあるのではと思いまして」"
translation = "「그리고 또 한 가지. 쿠셴 님이 가지고 계신 『도구』에 대해 혹시 회장님이 짚이는 곳이 있지 않을까 해서요.」"

[[dialogue]]
speaker = "unk"
original = "道具……？"
translation = "도구……?"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「うん。最近、別の悪党から手に入れた戦利品なんだけど――」"
translation = "「응. 최근에 다른 악당에게서 손에 넣은 전리품인데──」"

[[dialogue]]
speaker = "unk"
original = "そう言って、クーシェンが持って来ていた布袋から取り出してみせたのは――『大きな扇』だった。"
translation = "그렇게 말하며 쿠셴이 가져온 포대에서 꺼내 보인 것은── 『커다란 부채』였다."

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「試しに今回、悪戯で使ってみたら……加減を間違って、悪党のアジトを跡形もなく吹き飛ばしちゃってさ～☆\u3000てへへ♪」"
translation = "「시험 삼아 이번에 장난으로 써 봤더니…… 가감하는 걸 틀려서 악당 아지트를 흔적도 없이 날려버렸지 뭐야~☆ 테헤헤♪」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「……その扇は、軽くひと振りするだけで、建造物を全壊させてしまう程の突風を引き起こす力を持っています」"
translation = "「……그 부채는 가볍게 한 번 휘두르는 것만으로 건축물을 전파해 버릴 정도의 돌풍을 일으키는 힘을 가지고 있습니다.」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「この見た目と能力、どこかで聞き覚えがございませんか？」"
translation = "「이 외관과 능력, 어디서 들어본 적 없으신가요?」"

[[dialogue]]
speaker = "unk"
original = "もしかして……"
translation = "설마……"

[[dialogue]]
speaker = "unk"
original = "俺の頭に１人、思い浮かぶ人物がいた。"
translation = "내 머릿속에 한 인물이 떠올랐다."

[[dialogue]]
speaker = "unk"
original = "それから、マリオンさんに後を任され、しばらくして――"
translation = "그 후, 마리온 씨에게 뒷일을 맡기고 잠시 후──"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ダーリン、おいっす～☆\u3000紅明ちゃんが今日も元気にやってきたぜ～♪」"
translation = "「달링, 하잇수~☆ 코우메이 짱이 오늘도 활기차게 찾아왔다구~♪」"

[[dialogue]]
speaker = "unk"
original = "紅明、わざわざ来てくれてありがとう"
translation = "코우메이, 일부러 와 줘서 고마워"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ダーリンの頼みとあらば、アタシはいつでも元気に駆けつけるぜ♪\u3000それで、アタシに見て欲しいものって？」"
translation = "「달링의 부탁이라면 난 언제든 힘차게 달려오지♪ 그래서 나한테 보여주고 싶다는 게 뭐야?」"

[[dialogue]]
speaker = "unk"
original = "クーシェンから受け取った扇を、彼女に見せると――"
translation = "쿠셴에게 받은 부채를 그녀에게 보여주자──"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「なっ……！？\u3000それって、まさか――『<ruby>芭蕉扇<rt>ばしょうせん</rt></ruby>』！？」"
translation = "「앗……!? 그건 설마── 『파초선』!?」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「あ～、そういえば確かに、これを武器として悪用していた連中も、そんな名前を口にしていたような……？」"
translation = "「아~, 그러고 보니 확실히 이걸 무기로 악용하던 녀석들도 그런 이름을 입에 올렸던 것 같은데……?」"

[[dialogue]]
speaker = "unk"
original = "そこへ、ウキウキと興味津々で星徒会室のロフトを見に行っていたクーシェンが、１階へと降りて来る。"
translation = "거기서 신이 나서 흥미진진하게 성도회실 다락방을 구경하러 갔던 쿠셴이 1층으로 내려온다."

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「えっ！？」"
translation = "「엣!?」"

[[dialogue]]
speaker = "unk"
original = "紅明が振り向き、クーシェンと顔を合わせる。"
translation = "코우메이가 돌아보며 쿠셴과 얼굴을 마주한다."

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「まさか……『悟空』！？」"
translation = "「설마…… 『오공』!?」"

[[dialogue]]
speaker = "unk"
original = "彼女は驚いた様子で、その名を口にするのだった。"
translation = "그녀는 놀란 기색으로 그 이름을 입에 올리는 것이었다."

