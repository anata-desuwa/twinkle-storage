[[dialogue]]
speaker = "unk"
original = "第３話,ドーナツ作るぞ！,P"
translation = "제3화, 도넛 만들 거야!, P"

[[dialogue]]
speaker = "unk"
original = "エンジュとメテオラの２人は、自発的にモンスターと戦っていたことが認められ、監視付きなら外出が許されるようになった。"
translation = "엔쥬와 메테오라 두 사람은 자발적으로 몬스터와 싸웠던 점이 인정되어 감시가 붙는 조건으로 외출이 허가되게 되었다."

[[dialogue]]
speaker = "unk"
original = "のだが──"
translation = "그런데──"

[[dialogue]]
speaker = "メテオラ"
original = "「おー！\u3000魔王、いいとこで会ったな！\u3000ドーナツ作るぞー！」"
translation = "「오—! 마왕, 좋은 데서 만났네! 도넛 만들 거야—!」"

[[dialogue]]
speaker = "unk"
original = "ドーナツを作る？"
translation = "도넛을 만든다고?"

[[dialogue]]
speaker = "unk"
original = "突然だなぁ！"
translation = "갑작스럽네!"

[[dialogue]]
speaker = "メテオラ"
original = "「あたしな、エンジュにドーナツをお腹いっぱい食べさせてあげたいんだ」"
translation = "「나 말이야, 엔쥬에게 도넛을 배불리 먹여주고 싶다구.」"

[[dialogue]]
speaker = "メテオラ"
original = "「でもあたし、ちょっとしかお金持ってないから……そしたらな、いっぱい食べるなら、買うより作る方が安いし簡単って教えてもらったぞ」"
translation = "「하지만 난 돈을 조금밖에 안 가지고 있어서…… 그래서 말이야, 많이 먹으려면 사는 것보다 만드는 게 더 싸고 간단하다고 배웠어.」"

[[dialogue]]
speaker = "メテオラ"
original = "「ドーナツって、ぱてしえじゃなくても作れるんだなー！\u3000だからな、魔王！\u3000いっしょにドーナツ作るぞー！」"
translation = "「도넛이란 건 파티시에가 아니어도 만들 수 있는 거구나—! 그러니까 마왕! 같이 도넛 만들자—!」"

[[dialogue]]
speaker = "メテオラ"
original = "「ドーナツなー。どーやって作るんだー？\u3000この粉を使うのかー？\u3000ホット、ケーキ、ミックス……？」"
translation = "「도넛 말이야— 어떻게 만드는 거야—? 이 가루를 쓰는 거야—? 핫, 케이크, 믹스……?」"

[[dialogue]]
speaker = "メテオラ"
original = "「あははは、あたしが作りたいのは、ホットケーキじゃないぞー？\u3000しっかりしろー」"
translation = "「아하하하, 내가 만들고 싶은 건 핫케이크가 아니라구—? 정신 차려—」"

[[dialogue]]
speaker = "unk"
original = "ホットケーキミックスで簡単に作れるんだよ"
translation = "핫케이크 믹스로 간단하게 만들 수 있어."

[[dialogue]]
speaker = "メテオラ"
original = "「うーん？\u3000ホットケーキなのにドーナツができるのかー？\u3000不思議だなー」"
translation = "「으음? 핫케이크인데 도넛이 되는 거야—? 신기하네—」"

[[dialogue]]
speaker = "unk"
original = "ホットケーキミックス、卵、牛乳、バターを混ぜ合わせて生地を作り、リング状にして揚げるだけでドーナツのできあがり。"
translation = "핫케이크 믹스, 달걀, 우유, 버터를 섞어서 반죽을 만들고, 링 모양으로 해서 튀기기만 하면 도넛 완성."

[[dialogue]]
speaker = "unk"
original = "説明すれば、たったこれだけのことなのに、ここからが困難の連続だった。"
translation = "설명하자면 고작 이뿐인 일인데, 여기서부터가 고난의 연속이었다."

[[dialogue]]
speaker = "メテオラ"
original = "「卵を割るんだなー？\u3000よーし、あたしに任せろ！\u3000えいっ！」"
translation = "「달걀을 깨는 거네—? 좋아, 나한테 맡겨줘! 에잇!」"

[[dialogue]]
speaker = "メテオラ"
original = "「ぎゃー！\u3000べちゃべちゃだー！\u3000卵割るのってむつかしーな……」"
translation = "「갸악! 끈적끈적해졌어—! 달걀 깨는 거 어렵네……」"

[[dialogue]]
speaker = "メテオラ"
original = "「牛乳を入れるのか？\u3000えいっ！\u3000うわー！\u3000あふれちゃったぞー！」"
translation = "「우유를 넣는 거야? 에잇! 우와—! 넘쳐버렸다구—!」"

[[dialogue]]
speaker = "メテオラ"
original = "「ゆっくり混ぜるんだな？\u3000がしゃがしゃがしゃ！\u3000わー！\u3000またべちゃべちゃだぞー！？」"
translation = "「천천히 섞는 거구나? 가샤가샤가샤! 와—! 또 끈적끈적해졌다구!?」"

[[dialogue]]
speaker = "unk"
original = "力が有り余っているメテオラが何かする度に、キッチンは汚れていくが、それもまぁ想定内。"
translation = "힘이 남아도는 메테오라가 무언가 할 때마다 주방은 더러워졌지만, 그것도 뭐 예상 범위 내였다."

[[dialogue]]
speaker = "メテオラ"
original = "「おー？\u3000白くて、ぶにゅぶにゅのができたなー……こんなのがドーナツになるのか？\u3000魔王、あたしを騙してないか？」"
translation = "「오—? 하얗고 말랑말랑한 게 됐네—…… 이런 게 도넛이 되는 거야? 마왕, 나 속이는 거 아냐?」"

[[dialogue]]
speaker = "メテオラ"
original = "「ふんふん……生地を丸めて、真ん中をくり抜く……と」"
translation = "「킁킁…… 반죽을 둥글게 해서 가운데를 파내고…… 자.」"

[[dialogue]]
speaker = "メテオラ"
original = "「輪っかになったぞー！\u3000ドーナツだー！\u3000くんくん、甘い匂いがするぞ……うまそうな匂い……まだ食べちゃダメかー？」"
translation = "「고리 모양이 됐다—! 도넛이야—! 킁킁, 달콤한 냄새가 나…… 맛있어 보이는 냄새…… 아직 먹으면 안 돼—?」"

[[dialogue]]
speaker = "unk"
original = "揚げたら完成だから、いい子に待ってね"
translation = "튀기면 완성이니까 착하게 기다려줘."

[[dialogue]]
speaker = "unk"
original = "生で食べたらお腹壊すよ！"
translation = "날로 먹으면 배탈 난다구!"

[[dialogue]]
speaker = "メテオラ"
original = "「待つぞー。あたしはいい子だからなー。じゅわじゅわじゅわ……♪\u3000はー、いい匂いだなー……魔王はぱてしえだったんだなー」"
translation = "「기다릴게—. 나는 착한 아이니까 말이야—. 쥬와쥬와쥬와……♪ 하— 좋은 냄새다—…… 마왕은 파티시에였구나—」"

[[dialogue]]
speaker = "メテオラ"
original = "「あたし、いつもエンジュにめいわくかけてるからなー。おんがえししたいんだぞ」"
translation = "「나, 항상 엔쥬에게 민폐 끼치고 있으니까 말이야—. 보답하고 싶다구.」"

[[dialogue]]
speaker = "メテオラ"
original = "「エンジュ、ドーナツ食べてる時はニコニコになるんだ。すごくかわいいんだぞ」"
translation = "「엔쥬, 도넛 먹을 때는 싱글벙글 웃는다구. 정말 귀엽다구.」"

[[dialogue]]
speaker = "メテオラ"
original = "「あたしはニコニコしてるエンジュが好きなんだー。プンプンばっかじゃなくて、ニコニコしてればいいのになー」"
translation = "「나는 웃고 있는 엔쥬가 좋아—. 씩씩거리지 말고 웃고 있으면 좋을 텐데—」"

[[dialogue]]
speaker = "unk"
original = "はい、揚がったよ"
translation = "자, 다 튀겨졌어."

[[dialogue]]
speaker = "unk"
original = "ドーナツを食べれば、ニコニコになるね"
translation = "도넛을 먹으면 싱글벙글 웃게 되겠네."

[[dialogue]]
speaker = "メテオラ"
original = "「うおーー！\u3000ドーナツだーーーっ！\u3000ホントにドーナツになったぞー！？\u3000すげーーーっ！」"
translation = "「우오오—! 도넛이다—! 정말로 도넛이 됐어—!? 대단해—!」"

[[dialogue]]
speaker = "メテオラ"
original = "「揚げたてでアチアチだー……えっ、食べていいのか？\u3000エンジュの分、なくなんないな？\u3000ホントに食べちゃうぞ？」"
translation = "「갓 튀겨서 뜨끈뜨끈해—…… 엣, 먹어도 돼? 엔쥬 몫, 없어지지 않겠지? 정말 먹어버린다?」"

[[dialogue]]
speaker = "メテオラ"
original = "「ぱくっ、あちちち……んんーっ！\u3000うめーっ！\u3000なんだ、これはーっ！\u3000魔王のドーナツ、今まで食べたドーナツで一番うめーぞ！\u3000魔王すげーな！」"
translation = "「와구, 뜨거거…… 음음—! 맛있어—! 뭐야 이건—! 마왕의 도넛, 지금까지 먹은 도넛 중에서 제일 맛있다구! 마왕 대단해!」"

[[dialogue]]
speaker = "unk"
original = "俺とメテオラが一緒に作ったドーナツ、だよ"
translation = "나랑 메테오라가 같이 만든 도넛이야."

[[dialogue]]
speaker = "unk"
original = "俺だけじゃないよ"
translation = "나 혼자 만든 게 아니야."

[[dialogue]]
speaker = "メテオラ"
original = "「そうだ、あたしも作った！\u3000あたしもすげーんだな！？\u3000エンジュ、喜んでくれるかなー、えへへへ」"
translation = "「맞아, 나도 만들었어! 나도 대단한 거네!? 엔쥬, 기뻐해 줄까, 에헤헤헤.」"

[[dialogue]]
speaker = "メテオラ"
original = "「おーい、エンジュー」"
translation = "「어—이, 엔쥬—」"

[[dialogue]]
speaker = "エンジュ"
original = "「どうした、メテオラ……ん？\u3000魔王も一緒なのか。何の用だ」"
translation = "「무슨 일이야, 메테오라…… 응? 마왕도 같이 있는 건가. 무슨 용건이지.」"

[[dialogue]]
speaker = "メテオラ"
original = "「はい、エンジュ！\u3000ドーナツのプレゼントだ！\u3000たっぷりだぞ！」"
translation = "「자, 엔쥬! 도넛 선물이야! 잔뜩이라구!」"

[[dialogue]]
speaker = "エンジュ"
original = "「ドーナツ……？\u3000この袋に入ってるの全部、ドーナツなのか！？\u3000こんなにたくさんどうしたんだ！？」"
translation = "「도넛……? 이 봉투에 들어있는 거 전부 도넛이야!? 이렇게 많이 어디서 났어!?」"

[[dialogue]]
speaker = "メテオラ"
original = "「作ったんだぞ！」"
translation = "「만들었다구!」"

[[dialogue]]
speaker = "エンジュ"
original = "「メテオラが！？\u3000ドーナツを！？\u3000作れたのか？」"
translation = "「메테오라가!? 도넛을!? 만들 수 있었어?」"

[[dialogue]]
speaker = "メテオラ"
original = "「魔王と一緒にな！」"
translation = "「마왕이랑 같이 말이야!」"

[[dialogue]]
speaker = "エンジュ"
original = "「どうせ魔王がほとんど作ったんだろうが、匂いは美味そうだな……。本当に食べても大丈夫か？\u3000毒なんか入れてないだろうな？」"
translation = "「어차피 마왕이 대부분 만들었겠지만, 냄새는 맛있어 보이네……. 정말 먹어도 괜찮은 거야? 독 같은 거 넣은 건 아니겠지?」"

[[dialogue]]
speaker = "メテオラ"
original = "「あたし、試食した！\u3000チョーうまかったぞ！」"
translation = "「나, 시식해 봤어! 완전 맛있었다구!」"

[[dialogue]]
speaker = "unk"
original = "心配なら一緒に食べる？"
translation = "걱정되면 같이 먹을래?"

[[dialogue]]
speaker = "unk"
original = "味は保障するよ"
translation = "맛은 보장할게."

[[dialogue]]
speaker = "エンジュ"
original = "「誰がお前なんかと一緒に……だけどこの香ばしい匂い……嗅げば嗅ぐほど、お腹が減って……くそっ、我慢できない……！\u3000ぱくっ！」"
translation = "「누가 너 같은 놈이랑…… 하지만 이 고소한 냄새…… 맡으면 맡을수록 배가 고파져서…… 젠장, 못 참겠어……! 와구!」"

[[dialogue]]
speaker = "メテオラ"
original = "「どうだ？\u3000美味いか？\u3000美味いだろー？」"
translation = "「어때? 맛있어? 맛있지—?」"

[[dialogue]]
speaker = "エンジュ"
original = "「ん～～～っ！？\u3000美味し～～いっ！\u3000外はサクっとしてるのに中はしっとりで……甘さも甘すぎなくて、絶妙だ」"
translation = "「음~~~!? 맛있어—! 겉은 바삭한데 속은 촉촉해서…… 달기도 너무 달지 않고 절묘해.」"

[[dialogue]]
speaker = "メテオラ"
original = "「だろー！？\u3000エンジュが好きな味はおみとーしなんだぞ！」"
translation = "「그렇지—!? 엔쥬가 좋아하는 맛은 다 꿰뚫어 보고 있다구!」"

[[dialogue]]
speaker = "エンジュ"
original = "「それにしても、いったいいくつ作ったんだ……１０個や２０個どころじゃないぞ……」"
translation = "「그나저나 도대체 몇 개나 만든 거야…… 10개나 20개가 아니잖아……」"

[[dialogue]]
speaker = "メテオラ"
original = "「１００個！\u3000エンジュにお腹いっぱい食べてほしいからな！」"
translation = "「100개! 엔쥬가 배불리 먹었으면 좋겠으니까!」"

[[dialogue]]
speaker = "エンジュ"
original = "「いくらあたしでも１００個は食べきれそうにないな。一緒に食べるか、メテオラ。……魔王は来るなよ」"
translation = "「아무리 나라도 100개는 다 못 먹을 것 같네. 같이 먹을까, 메테오라. ……마왕은 오지 마.」"

[[dialogue]]
speaker = "メテオラ"
original = "「えー、一緒に食べた方が美味いのに……エンジュ、イジワルだなー」"
translation = "「에— 같이 먹는 게 더 맛있는데…… 엔쥬 심술쟁이네—.」"

[[dialogue]]
speaker = "エンジュ"
original = "「うるさい。魔王にやるドーナツはないんだよ」"
translation = "「시끄러워. 마왕에게 줄 도넛은 없어.」"

[[dialogue]]
speaker = "unk"
original = "おふたりでごゆっくり"
translation = "두 분이서 오붓하게 드시길."

[[dialogue]]
speaker = "unk"
original = "大事そうにドーナツを抱えながら去ってく２人の背中を見送るのは、ちょっと寂しかったけれども。"
translation = "소중한 듯 도넛을 안고 떠나는 두 사람의 뒷모습을 배웅하는 것은 조금 외로웠지만."

[[dialogue]]
speaker = "メテオラ"
original = "「えへへへへ♪\u3000魔王、あーりがーとなー！」"
translation = "「에헤헤헤헤♪ 마왕, 고—마—워—!」"

[[dialogue]]
speaker = "unk"
original = "メテオラの満面の笑みは、そんな寂しさも帳消しにしてくれたのだった。"
translation = "메테오라의 활짝 핀 미소는 그런 외로움마저 잊게 해주었다."

