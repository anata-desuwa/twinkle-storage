[[dialogue]]
speaker = "unk"
original = "第１話,学園の偵察だ,P"
translation = "제1화, 학원의 정찰이다"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "セドナさん？"
translation = "「세드나 씨?」"

[[dialogue]]
speaker = "unk"
original = "あれは……"
translation = "「저건……」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「──貴様か。何、たまたま近くを通りかかったものでな。どんなものかと様子を見に来たまで」"
translation = "「──네놈인가. 뭐, 마침 근처를 지나가던 참이라서 말이지. 어떤가 싶어 상태를 보러 왔을 뿐이다」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「そう警戒するな。心配せずともすぐに立ち去るさ」"
translation = "「그렇게 경계하지 마라. 걱정하지 않아도 금방 떠날 테니까」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「……何？\u3000中を見学してみないか、だと？\u3000それは……どういう了見なのだ」"
translation = "「……뭐? 안을 견학해 보지 않겠느냐고? 그것은…… 무슨 생각인 거냐」"

[[dialogue]]
speaker = "unk"
original = "仲間になれるなら越したことはない"
translation = "「동료가 될 수 있다면 더할 나위 없으니까요」"

[[dialogue]]
speaker = "unk"
original = "同じ志の間柄ですから"
translation = "「같은 뜻을 가진 사이니까요」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「フ……確かに。我々『ネビュラ』と貴様ら学園はともに対リクリエを祈る組織同士。何も間違ってはいないな」"
translation = "「후…… 확실히. 우리 『네뷸라』와 네놈들 학원은 함께 대(對) 리크리에를 염원하는 조직끼리. 아무것도 틀린 말은 아니군」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「いいだろう。以前より、一度はこの目で確認したいと思っていた──貴様が隣にいるなら文句はあるまい。ゆくぞ」"
translation = "「좋다. 이전부터, 한 번은 이 눈으로 확인하고 싶다고 생각했었다── 네놈이 곁에 있다면 불만은 없겠지. 가자」"

[[dialogue]]
speaker_original = "ザコモンスター"
speaker_translation = "잡몹"
original = "「ウィイーッ」"
translation = "「위이이익」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ふむ……なるほどな。仮想モンスターのスイッチ、トライアルスコアの表示──実践訓練の機能面は充実しているようだ」"
translation = "「흠…… 과연 그렇군. 가상 몬스터의 스위치, 트라이얼 스코어의 표시── 실전 훈련의 기능면은 충실한 모양이군」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「……ん？\u3000なんだ貴様、鳩が豆鉄砲を食ったような顔をして」"
translation = "「……응? 뭐냐 네놈, 벙벙한 얼굴을 하고선」"

[[dialogue]]
speaker = "unk"
original = "なんでここ？"
translation = "「왜 여기를?」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「星騎士として研鑽を積んでいる場を視察するのは当然だろう。むしろ、他にどこを見学するというんだ？」"
translation = "「성기사로서 연마를 쌓고 있는 장소를 시찰하는 것은 당연하겠지. 오히려, 달리 어디를 견학한다는 거냐?」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「放課後……？\u3000部活……？\u3000弛んでいる。そのような甘えた学生気分で、世界の終わりに抗えると思うな」"
translation = "「방과 후……? 부활동……? 해이해져 있군. 그런 무른 학생 기분으로, 세계의 종말에 대항할 수 있다고 생각하지 마라」"

[[dialogue]]
speaker = "unk"
original = "ストイックですね……"
translation = "「스토익하시네요……」"

[[dialogue]]
speaker = "unk"
original = "学生ですから……"
translation = "「학생이니까요……」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「全く腑抜けたことを。むしろ貴様を、一度ネビュラの訓練に招待したくなってきたぞ」"
translation = "「정말이지 얼빠진 소리를. 오히려 네놈을, 한 번 네뷸라의 훈련에 초대하고 싶어지는군」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「まあいい。次は姉妹校の様子を見せてもらおうか。我々としても、情報はあればあるほどいい」"
translation = "「뭐 됐다. 다음은 자매 학교의 모습을 보여주실까. 우리로서도, 정보는 많으면 많을수록 좋으니까」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「む──さすがに姉妹校の中までは連れていけない？\u3000ふむ。それもそうか」"
translation = "「음── 과연 자매 학교 안까지는 데려갈 수 없다고? 흠. 그것도 그런가」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「なればそろそろ戻るとするか。いい加減、油を売っているわけにも──」"
translation = "「그렇다면 슬슬 돌아가도록 할까. 언제까지고 빈둥거리고 있을 수도──」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「……あれ？\u3000そこにいんの、ネビュラのお偉いさんじゃね？」"
translation = "「……어라? 거기 있는 거, 네뷸라의 높으신 분 아냐?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「おおっ、どこかで見たと思えば！\u3000新星会長さんと一緒にいらっしゃいますね？」"
translation = "「오오, 어디서 봤다 했더니! 신성 회장님과 함께 계시네요?」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「む──貴様らは確か、こちらの星徒会人員か」"
translation = "「음── 네놈들은 분명, 이쪽의 성도회 인원인가」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「さようです！\u3000そだ、せっかくですからお２人も我々のクレープ祭りにお誘いしましょう！」"
translation = "「그렇습니다! 아, 기왕 이렇게 된 거 두 분도 저희 크레이프 축제에 초대하죠!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「おー、グッドアイディア。まー祭りって言ってもただの買い食いなんだけど」"
translation = "「오ー, 굿 아이디어. 뭐 축제라고 해도 그냥 군것질이지만」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「か、買い食いだと？\u3000そんなもの私が付き合うわけ──ってなんで貴様は乗り気なのだ！？」"
translation = "「구, 군것질이라고? 그런 것에 내가 어울릴 리가── 아니 왜 네놈은 의욕적인 거냐!?」"

[[dialogue]]
speaker = "unk"
original = "郷に入りては郷に従えですよ"
translation = "「로마에 가면 로마의 법을 따라야죠」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「そーそー。今日はせっかく長閑な昼下がりなんだしさあ、平和はキョージュしないと損ってもんじゃん？」"
translation = "「그렇지 그렇지. 오늘은 모처럼 한가로운 오후니까 말이야, 평화는 만끽하지 않으면 손해잖아?」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「む、むう……！？\u3000ま、待て。わかったから腕を組もうとするな──！」"
translation = "「으, 으으……!? 기, 기다려. 알았으니까 팔짱 끼려고 하지 마──!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「──いやー絶品ですね！\u3000このチョコシナモンマウンテンクレープは！\u3000長時間並んだ甲斐があったというものです！」"
translation = "「──이야, 일품이네요! 이 초코 시나몬 마운틴 크레이프는! 장시간 줄을 선 보람이 있다는 거예요!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「あ、ああ……悪くはないな。この手のものは初めてだが……」"
translation = "「아, 아아…… 나쁘지는 않군. 이런 종류는 처음이다만……」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ネビュラさんはツナとレタスでお食事系だったけど、それで良かったん？」"
translation = "「네뷸라 씨는 참치랑 양상추로 식사 대용이었는데, 그걸로 괜찮았어?」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「セドナと呼べ。甘いものはあまり得意でなくてな──こちらの方が舌に合う」"
translation = "「세드나라고 불러라. 단것은 별로 좋아하지 않아서── 이쪽이 입에 맞는군」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「にしても、この……立ったまま食事を行うというのは。どうにも粗相をしているようで、落ち着かんな……」"
translation = "「그나저나, 이…… 서서 식사를 한다는 것은. 아무래도 예의에 어긋나는 것 같아서, 진정이 안 되는군……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あはは！\u3000すぐに慣れますよぉ、これが醍醐味というものなのです！」"
translation = "「아하하! 금방 익숙해질 거예요, 이것이 묘미라는 것이랍니다!」"

[[dialogue]]
speaker = "unk"
original = "学園生活を体験してもらえて何より"
translation = "학원 생활을 체험해 줄 수 있어서 다행이다"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「………………は！」"
translation = "「………………핫!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "（わ……私は何をしているんだ！\u3000星騎士どもの様子を軽くうかがう予定だったのに──気づけばこんな学生と一緒に戯れて）"
translation = "(내…… 내가 뭘 하고 있는 거지! 성기사 녀석들의 동태를 가볍게 살필 예정이었는데── 정신을 차려보니 이런 학생들과 함께 어울리다니)"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "（今に帰ろう。私はこんな甘ちゃんどもとは違う──基地に戻って部下を指揮せねばならない……！）"
translation = "(당장 돌아가자. 나는 이런 애송이들과는 다르다── 기지로 돌아가서 부하를 지휘해야만 해……!)"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「もーお腹ペコペコ！\u3000ここの新作のためにお昼抜いてきちゃったしー、やっぱ学生生活といえば放課後買い食いだよねー♪」"
translation = "「정말 배고파 죽겠어! 여기 신작 먹으려고 점심도 거르고 왔고─, 역시 학생 생활이라고 하면 방과 후 군것질이지─♪」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「え？」"
translation = "「어?」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「あ」"
translation = "「아」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "（え……じょ、上官？\u3000クレープ片手に？\u3000ていうかセンパイと流星の子まで一緒にいるし何コレどういう状況？）"
translation = "(어…… 상, 상관님? 크레이프를 한 손에 들고? 그보다 선배랑 유성 애들까지 같이 있고 뭐야 이거 무슨 상황이야?)"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "（ま、待て──と声をかけるのもまずい。しかし、このままでは私のメンツが……！）"
translation = "(기, 기다려── 라고 말을 거는 것도 곤란하군. 하지만, 이대로는 내 체면이……!)"

[[dialogue]]
speaker = "unk"
original = "どういう関係……？"
translation = "어떤 관계……?"

[[dialogue]]
speaker = "unk"
original = "２人とも……？"
translation = "두 사람 다……?"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「よ、よくわかんないけどお邪魔しました──！」"
translation = "「자, 잘 모르겠지만 실례했습니다──!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「あ──ま、待てっ！」"
translation = "「아── 기, 기다려!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「……？\u3000今のお方は……？」"
translation = "「……? 방금 그분은……?」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「いや……なんでもない。なんでも……ない、さ…………」"
translation = "「아니…… 아무것도 아니다. 아무것도…… 아니다…………」"

