[[dialogue]]
speaker = "unk"
original = "第１４話,別れと、出会い,B"
translation = "제14화, 이별과, 만남, B"

[[dialogue]]
speaker = "unk"
original = "──魔神ギエルを倒し、リクリエを飲み込んでからのこと……。"
translation = "──마신 기엘을 쓰러뜨리고, 리크리에를 삼킨 후의 일……."

[[dialogue]]
speaker = "クロト"
original = "「──ん……ぁっ…………ここは」"
translation = "「──음…… 앗………… 여기는」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「──クロト！\u3000目が覚めたのね」"
translation = "「──쿠로토! 눈을 뜬 거네」"

[[dialogue]]
speaker = "クロト"
original = "「ああ……っつ。頭がとんでもなく痛いが──なんとか無事みたいだ」"
translation = "「아아…… 윽. 머리가 엄청나게 아프지만── 어떻게든 무사한 것 같아」"

[[dialogue]]
speaker = "unk"
original = "どうやら俺の体は保ったらしい──"
translation = "아무래도 내 몸은 버틴 모양이다──"

[[dialogue]]
speaker = "unk"
original = "ということをみんなで確かめたのち、残す不安はある少女の行方のみとなった。"
translation = "라는 것을 모두가 확인한 후, 남은 불안은 한 소녀의 행방뿐이었다."

[[dialogue]]
speaker = "クロト"
original = "「……行くのか」"
translation = "「……가는 거냐」"

[[dialogue]]
speaker = "アポロ"
original = "「ああ。あたしは本来……<ruby>アルタイル<rt>ここ</rt></ruby>にいるべき存在じゃないからな」"
translation = "「아아. 나는 본래…… 알타이르에 있을 존재가 아니니까」"

[[dialogue]]
speaker = "アポロ"
original = "「これまで自覚はなかった。けど……今は、元の世界から引っ張られる感じがするんだ」"
translation = "「지금까지 자각은 없었어. 하지만…… 지금은, 원래 세계에서 끌어당겨지는 느낌이 들어」"

[[dialogue]]
speaker = "アナ"
original = "「デネブ──ですね。仮面の支配がなくなった以上、自然な形ではありますが……」"
translation = "「데네브── 이군요. 가면의 지배가 없어졌으니, 자연스러운 형태이긴 합니다만……」"

[[dialogue]]
speaker = "ルリエル"
original = "「せっかくお話できるようになりましたのに……お別れなんて寂しいです！」"
translation = "「모처럼 이야기할 수 있게 되었는데…… 이별이라니 쓸쓸해요!」"

[[dialogue]]
speaker = "ニャリオン"
original = "「ニャァ……名残惜しいニャン……」"
translation = "「냐아…… 아쉬운 냥……」"

[[dialogue]]
speaker = "アポロ"
original = "「別にいいだろ。こっちにはこっちのあたしがいる」"
translation = "「딱히 상관없잖아. 여기에는 여기의 내가 있어」"

[[dialogue]]
speaker = "アポロ"
original = "「こっちのあたしが目覚めたら……なんて言うか知らないけど。フォローは頼んだぞ、ニャリオン」"
translation = "「여기 내가 깨어나면…… 뭐라고 말할지 모르겠지만. 뒤처리는 부탁한다, 냐리온」"

[[dialogue]]
speaker = "ニャリオン"
original = "「ニャア！\u3000任されたニャン！」"
translation = "「냐아! 맡겨진 냥!」"

[[dialogue]]
speaker = "フィオナ"
original = "「姉さん……」"
translation = "「언니……」"

[[dialogue]]
speaker = "アポロ"
original = "「そんな顔するな。エリシア──オマエは、あたしよりずっと立派に育ってる。ホントだぞ」"
translation = "「그런 얼굴 하지 마. 엘리시아── 너는, 나보다 훨씬 훌륭하게 자랐어. 정말이야」"

[[dialogue]]
speaker = "アポロ"
original = "「だから……自信持て。この世界の『フィオナ』として、これからもきっとやっていける」"
translation = "「그러니까…… 자신감을 가져. 이 세계의 『피오나』로서, 앞으로도 분명 잘 해나갈 수 있을 거야」"

[[dialogue]]
speaker = "フィオナ"
original = "「っ……はい──っ……！」"
translation = "「읏…… 네──읏……!」"

[[dialogue]]
speaker = "unk"
original = "本来、交わることのなかった２人の姉妹は最後にぎゅっと抱き合った。"
translation = "본래, 서로 만날 일 없었던 두 자매는 마지막에 꼬옥 끌어안았다."

[[dialogue]]
speaker = "unk"
original = "だんだんと、アポロの存在感がその場から希薄化していく──"
translation = "점점, 아폴로의 존재감이 그 자리에서 희미해져 간다──"

[[dialogue]]
speaker = "アポロ"
original = "「じゃあな。あたしを見捨てないでくれて、ありがとう。みんな」"
translation = "「그럼 잘 있어. 나를 버리지 않아 줘서, 고마워. 모두」"

[[dialogue]]
speaker = "クロト"
original = "「──待ってくれ」"
translation = "「──잠깐」"

[[dialogue]]
speaker = "アポロ"
original = "「なんだ？」"
translation = "「왜?」"

[[dialogue]]
speaker = "クロト"
original = "「最後に……ひとつだけ訊かせてくれ」"
translation = "「마지막으로…… 하나만 묻게 해 줘」"

[[dialogue]]
speaker = "クロト"
original = "「俺たちは君のことを、なんて呼べばいい？」"
translation = "「우리는 너를, 뭐라고 부르면 돼?」"

[[dialogue]]
speaker = "unk"
original = "素朴な質問。"
translation = "소박한 질문."

[[dialogue]]
speaker = "unk"
original = "それを聞き届けたアポロは、にかっと笑って……"
translation = "그것을 들은 아폴로는, 활짝 웃으며……"

[[dialogue]]
speaker = "アポロ"
original = "「アポロでいい」"
translation = "「아폴로로 됐어」"

[[dialogue]]
speaker = "アポロ"
original = "「たくさん迷惑かけて……悪かったな。今度こそ、本物のヒーローになれるよう、頑張ってみるさ」"
translation = "「많이 폐를 끼쳤고…… 미안했어. 이번에야말로, 진짜 히어로가 될 수 있도록, 노력해 볼게」"

[[dialogue]]
speaker = "unk"
original = "そうして──アポロは。"
translation = "그렇게 해서── 아폴로는."

[[dialogue]]
speaker = "unk"
original = "アルタイル世界の『使徒』として招かれた少女は、そう言葉を残して光の中へ消えていった。"
translation = "알타이르 세계의 『사도』로서 초대받았던 소녀는, 그렇게 말을 남기고 빛 속으로 사라져 갔다."

[[dialogue]]
speaker = "unk"
original = "だから──俺は今、足早に向かっている。"
translation = "그러니까── 나는 지금, 빠른 걸음으로 향하고 있다."

[[dialogue]]
speaker = "マトイ"
original = "「あ、緋宮くん！\u3000もう～遅いよ」"
translation = "「아, 히노미야 군! 벌써～ 늦었어」"

[[dialogue]]
speaker = "クロト"
original = "「ごめんごめん。でも、間に合ったか」"
translation = "「미안 미안. 하지만, 늦지 않았나」"

[[dialogue]]
speaker = "unk"
original = "流星教皇庁──その中の一室。"
translation = "유성 교황청── 그 안의 한 방."

[[dialogue]]
speaker = "unk"
original = "そこには、もうみんなが揃っていた。"
translation = "그곳에는, 이미 모두가 모여 있었다."

[[dialogue]]
speaker = "unk"
original = "かけられた『月の壁画』が俺たちを見つめる。"
translation = "걸려 있는 『달의 벽화』가 우리를 바라본다."

[[dialogue]]
speaker = "unk"
original = "今日は──<b>彼女</b>と、ようやくの再会が叶う日だった。"
translation = "오늘은── <b>그녀</b>와, 드디어 재회가 이루어지는 날이었다."

[[dialogue]]
speaker = "unk"
original = "──眠りの姫君。"
translation = "──잠자는 공주."

[[dialogue]]
speaker = "unk"
original = "アルタイル──俺たちの世界に生きていたはずの、本来の星見の長女。"
translation = "알타이르── 우리들의 세계에 살고 있었을 터인, 본래의 별을 보는 장녀."

[[dialogue]]
speaker = "unk"
original = "遠い夏の日、偶然にもぶつかった女の子。"
translation = "머나먼 여름날, 우연히 부딪혔던 여자아이."

[[dialogue]]
speaker = "unk"
original = "そんな彼女が、今……長き昏睡から初めて、目を覚ます。"
translation = "그런 그녀가, 지금…… 오랜 혼수 상태에서 처음으로, 눈을 뜬다."

[[dialogue]]
speaker = "眠りの少女"
original = "「ん──ぁ……ん……っ…………」"
translation = "「음── 아…… 음…… 읏…………」"

[[dialogue]]
speaker = "眠りの少女"
original = "「あれ、あたし……？\u3000どうして……って、おまえたちは……」"
translation = "「어라, 나……? 왜…… 라고, 너희들은……」"

[[dialogue]]
speaker = "フィオナ"
original = "「おはようございます──姉さん。ずいぶんお寝坊さんでしたね」"
translation = "「안녕하세요── 언니. 꽤나 늦잠꾸러기셨네요」"

[[dialogue]]
speaker = "unk"
original = "きょとんと見開かれた、フィオナそっくりの眼。"
translation = "멀뚱히 크게 떠진, 피오나와 똑 닮은 눈."

[[dialogue]]
speaker = "unk"
original = "彼女は……俺たちの顔をぐるりと見渡してから、すべてを思い出したように微笑んだ。"
translation = "그녀는…… 우리들의 얼굴을 빙 둘러본 후, 모든 것을 떠올린 듯이 미소 지었다."

[[dialogue]]
speaker = "眠りの少女"
original = "「ああ……そうか……色々、あったんだな」"
translation = "「아아…… 그렇구나…… 여러 가지, 일이 있었구나」"

[[dialogue]]
speaker = "眠りの少女"
original = "「おはよう、エリシア。どうやらあたしは──長い夢を見てたみたいだ」"
translation = "「안녕, 엘리시아. 아무래도 나는── 긴 꿈을 꾼 것 같아」"

