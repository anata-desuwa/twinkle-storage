[[dialogue]]
speaker = "unk"
original = "第６話,昔日の陽だまり,B"
translation = "제6화, 옛날의 양지, B"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……姉さんの覚悟は、よくわかりました」"
translation = "「……언니의 각오는, 잘 알겠습니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「だから──ありがとうございます。小さな頃……<ruby>妹<rt>わたし</rt></ruby>に代わって、色々なものを背負ってくれて」"
translation = "「그러니── 감사합니다. 어릴 적…… 저를 대신해서, 여러 가지를 짊어져 주셔서」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「な……んだって……？」"
translation = "「뭐……라고……?」"

[[dialogue]]
speaker = "unk"
original = "でもフィオナは──今のアポロを否定しなかった。"
translation = "하지만 피오나는── 지금의 아폴로를 부정하지 않았다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「今の私になったからこそ、見えるものもあります」"
translation = "「지금의 제가 되었기에, 보이는 것도 있습니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「姉さんから『フィオナ』を継いだことで……昔の姉さんが背負っていたものが、私にも理解できるようになりました」"
translation = "「언니로부터 『피오나』를 계승함으로써…… 옛날 언니가 짊어지고 있던 것이, 저도 이해할 수 있게 되었습니다」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「星見の長女──その責務は私が想像していたよりずっと重かった」"
translation = "「호시미 가문의 장녀── 그 책무는 제가 상상했던 것보다 훨씬 무거웠습니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「『月の壁画』に象徴される魔王伝承。そんな大前提さえ、<ruby>市井<rt>しせい</rt></ruby>には正しく知られていない」"
translation = "「『달의 벽화』로 상징되는 마왕 전승. 그런 대전제조차, 세상에는 올바르게 알려져 있지 않습니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「どうすれば魔王になれるのか。血を継いでいるというだけで十分なのか。何もかもが未知数な環境でした」"
translation = "「어떻게 해야 마왕이 될 수 있는가. 피를 이었다는 것만으로 충분한가. 모든 것이 미지수인 환경이었습니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「でも、そんな、不透明な先行きの中でも……大人たちの期待は否応なくのしかかります」"
translation = "「하지만, 그런, 불투명한 앞날 속에서도…… 어른들의 기대는 억지로 짓눌러 옵니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「幸い、星術に関しては長けたものでした。とはいえ、先代魔王の力には及ばない。教皇庁の関係者は、あらゆる手段を私に与えました」"
translation = "「다행히, 성술에 관해서는 뛰어났습니다. 그렇다고는 해도, 선대 마왕의 힘에는 미치지 못합니다. 교황청의 관계자들은, 모든 수단을 제게 주었습니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「リクリエを止めるには『魔王』がいなければならない。いえ……もし魔王になれなければ、星見の長女なんて意味がない。そう思わされました」"
translation = "「리크리에를 막으려면 『마왕』이 없으면 안 된다. 아니…… 만약 마왕이 될 수 없다면, 호시미 가문의 장녀 따위는 의미가 없다. 그렇게 생각하게 만들었습니다」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "unk"
original = "世界の命運が、たった一人の少女の肩に乗る。"
translation = "세계의 명운이, 단 한 명의 소녀의 어깨에 놓인다."

[[dialogue]]
speaker = "unk"
original = "その重圧は──体験した者でなければ、到底わかりえないだろう。"
translation = "그 중압감은── 체험한 자가 아니면, 도저히 알 수 없을 것이다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「だから……その時ようやく思ったんです。これが、姉さんの見ていたものなんだって」"
translation = "「그래서…… 그때서야 비로소 생각했습니다. 이것이, 언니가 보고 있던 것이었구나」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "（フィオナ会長は……家のことだけで、そんなにも重荷を抱えていたんですね）"
translation = "（피오나 회장님은…… 집안일만으로, 그렇게나 무거운 짐을 안고 계셨군요）"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "（ええ。クロトよりずっと昔──もう何年も前から……）"
translation = "（네. 쿠로토보다 훨씬 전── 벌써 몇 년 전부터……）"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "（それに星徒会のお仕事や、わたし達のお守りも……）"
translation = "（게다가 성도회 일이나, 저희들을 돌보는 일도……）"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "（ああ……ちょっとばかり、甘えすぎてたかもしれねえな）"
translation = "（아아…… 조금은, 너무 응석 부렸는지도 모르겠네）"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「──それは違います。ユウリ」"
translation = "「──그건 다릅니다. 유우리」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「！\u3000地獄耳かよ」"
translation = "「! 귀 밝기는」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「流星星徒会でみんなと過ごした日々は私にとって宝物でした。重荷だなんて感じたことは一度もありません」"
translation = "「유성 성도회에서 모두와 보낸 나날은 제게 보물이었습니다. 짐이라고 느낀 적은 한 번도 없습니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ただ、それでも……星見の長女としての宿命は、あくまで私だけが背負うものだと思っていました。だって魔王には血統が必要なのですから」"
translation = "「다만, 그럼에도…… 별을 보는 장녀로서의 숙명은, 어디까지나 저만이 짊어져야 할 것이라고 생각했습니다. 왜냐하면 마왕에게는 혈통이 필요하기 때문입니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「けれど──それはとんだ思い違いでした。信頼できる仲間がいたなら、最初から頼るべきだった」"
translation = "「하지만── 그건 엄청난 착각이었습니다. 신뢰할 수 있는 동료가 있었다면, 처음부터 의지했어야 했습니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ひとりで悩んで。抱えて。意地ばかり張っていたら、いつか……自分のことさえ見失ってしまう。私も身に染みましたから」"
translation = "「혼자서 고민하고. 끌어안고. 고집만 부리고 있었다면, 언젠가…… 자기 자신조차 잃어버리게 됩니다. 저도 뼈저리게 느꼈으니까요」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「フィオナ……」"
translation = "「피오나……」"

[[dialogue]]
speaker = "unk"
original = "──うんうん、と隣でヴィーナスが頷いていた。"
translation = "──응응, 하고 옆에서 비너스가 고개를 끄덕이고 있었다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「昔──誰より姉さんのそばにいた私も。そうあるべきだったんです」"
translation = "「옛날── 누구보다 언니 곁에 있던 저도. 그렇게 했어야 했습니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「幼い頃の<ruby>私<rt>エリシア</rt></ruby>には……姉さんの抱えるものの大きさがわからなかった。でも、今ならわかります」"
translation = "「어렸을 적의 저에게는…… 언니가 짊어진 것의 크기를 알 수 없었습니다. 하지만, 지금이라면 압니다」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「……今さら遅い」"
translation = "「……이제 와서 늦었어」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「いいえ──きっと、間に合います」"
translation = "「아닙니다── 분명, 늦지 않았습니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「今の私って──すごいわがままなんですよ。世界を滅亡の危機に懸けてでも、あなたを救いたいって願ってる」"
translation = "「지금의 저는── 엄청나게 제멋대로예요. 세계를 멸망의 위기에 걸고서라도, 당신을 구하고 싶다고 바라고 있어요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「それでも皆さんが受け止めてくれるって信じてるから。どんな無茶だって話せるんです」"
translation = "「그래도 여러분이 받아줄 거라고 믿고 있으니까. 어떤 무리한 일이라도 말할 수 있는 겁니다」"

[[dialogue]]
speaker = "unk"
original = "フィオナの眼に迷いはなかった。"
translation = "피오나의 눈에 망설임은 없었다."

[[dialogue]]
speaker = "unk"
original = "だから、二人に、本当に必要なのは。"
translation = "그러니, 두 사람에게, 정말로 필요한 것은."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「私を頼ってください、姉さん。私もあなたを頼りますから」"
translation = "「저를 의지해 주세요, 언니. 저도 당신을 의지할 테니까요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「お互い、かけがえのない双子同士──手を取り合ってみませんか？」"
translation = "「서로, 둘도 없는 쌍둥이끼리── 손을 잡아보지 않겠어요?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「──」"
translation = "「──」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「そんなの……今さらだ……そもそも……オマ、オマエなんかに、何がわかるっていうんだっ！」"
translation = "「그런 건…… 이제 와서야…… 애초에…… 오마, 너 따위가, 뭘 안다는 거냐!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「確かに……私はあくまでも星見エリシア。姉さんのことが何もかも理解できたとは言えません。けれど」"
translation = "「확실히…… 저는 어디까지나 호시미 엘리시아. 언니의 모든 것을 이해했다고는 말할 수 없습니다. 하지만」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ひとつだけ。決定的に共感できたことがあるんです」"
translation = "「딱 하나. 결정적으로 공감할 수 있었던 것이 있습니다」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「共感──だと……？」"
translation = "「공감──이라고……?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「私ね。思ったんです。『フィオナ』──星見の長女としての責務は大変で、忙しくて、たくさんのものを抱え込んでしまったけど」"
translation = "「저 말이에요. 생각했어요. 『피오나』── 별을 보는 장녀로서의 책무는 힘들고, 바쁘고, 많은 것을 끌어안아 버렸지만」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「いつも胸に抱いていた願いは……簡単なことでした」"
translation = "「항상 가슴에 품고 있던 소원은…… 간단한 것이었습니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「また、姉さんと遊べたらいいなって」"
translation = "「다시, 언니와 놀 수 있다면 좋겠다고」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "unk"
original = "フィオナの吐露に、アポロは思わずひるんだ。"
translation = "피오나의 토로에, 아폴로는 무심코 움츠러들었다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「幼かった頃の……ひだまりのような思い出が何度もよみがえるんです。重圧で、押し潰されそうになるたびに」"
translation = "「어렸을 적의…… 양지 같은 추억이 몇 번이고 되살아납니다. 중압감으로, 짓눌릴 것 같을 때마다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「<b>だから</b>──ですよね？\u3000姉さんが、その格好をしているのは」"
translation = "「<b>그러니까</b>── 그렇죠? 언니가, 그 모습을 하고 있는 것은」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ッ……違う。あたしは……あたしはただ、正義のために……」"
translation = "「읏…… 달라. 나는…… 나는 그저, 정의를 위해서……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「私と一緒に観ていた番組。私と一緒に遊んだヒーローごっこ」"
translation = "「저와 함께 보던 프로그램. 저와 함께 놀았던 히어로 놀이」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「だから姉さんは──そうして『アポロ』を名乗っている。心のどこかで、また私と遊びたいって、願ってくれているから！」"
translation = "「그러니까 언니는── 그렇게 『아폴로』를 자처하고 있는 거예요. 마음속 어딘가에서, 다시 저와 놀고 싶다고, 바라고 있기 때문에!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「──っ！」"
translation = "「──읏!」"

[[dialogue]]
speaker = "unk"
original = "今度こそアポロは鼻白んだ。確かな図星だったのだろう。"
translation = "이번에야말로 아폴로는 코가 납작해졌다. 확실히 정곡을 찔린 것이리라."

[[dialogue]]
speaker = "unk"
original = "それ以上、アポロは二の句を継ぐこともなく、押し黙って……。"
translation = "그 이상, 아폴로는 다음 말을 잇지도 못하고, 입을 다물고……"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「──ヒィィィンッ！\u3000ウォォォォォォンッ！」"
translation = "「──히이이이잉! 워어어어어어엉!」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「──ゴオオオオオオウッ！\u3000ヌゥゥゥゥンッッ！！」"
translation = "「──고오오오오오우! 느으으으으응!!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ちょっ……いいとこなのに邪魔する気！？」"
translation = "「읏…… 좋은 분위기인데 방해할 셈이야!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「速やかに対処する──」"
translation = "「신속하게 대처한다──」"

[[dialogue]]
speaker = "unk"
original = "配下のモンスターたちが暴れだす。"
translation = "부하 몬스터들이 날뛰기 시작한다."

[[dialogue]]
speaker = "unk"
original = "<ruby>主<rt>あるじ</rt></ruby>の自我を崩そうとする俺たちを、この場から排除しようとして。"
translation = "주인의 자아를 무너뜨리려는 우리를, 이 장소에서 배제하려고."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「黙れ……違う……あたしはっ……！」"
translation = "「닥쳐…… 달라…… 나는읏……!」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「──ヒヒイイイィィィィン…………ッ」"
translation = "「──히히이이이이이잉…………읏」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「っ……！？」"
translation = "「읏……!?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「アポロちゃんが──」"
translation = "「아폴로짱이──」"

[[dialogue]]
speaker = "unk"
original = "だが──アポロ自らが、その大剣でモンスター達を振り払った。"
translation = "하지만── 아폴로 스스로가, 그 대검으로 몬스터들을 뿌리쳤다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「いや……違く……ないのか……？」"
translation = "「아니…… 다르지…… 않은 건가……?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「そうだな……あたしだ。あたしは……素直じゃ、なかった。もっと昔に……言えたらよかった。それなら……使徒になんてならずに、済んだのかも」"
translation = "「그렇군…… 나다. 나는…… 솔직하지, 못했다. 좀 더 옛날에…… 말할 수 있었다면 좋았을 텐데. 그랬다면…… 사도 따위가 되지 않고, 끝났을지도」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「あたしは……本当は……もっと、遊んでたかった、だけなんだ──」"
translation = "「나는…… 사실은…… 좀 더, 놀고 싶었을, 뿐이야──」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「姉さん──！」"
translation = "「언니──！」"

[[dialogue]]
speaker = "unk"
original = "２人の距離が近づいていく。そして……"
translation = "두 사람의 거리가 가까워진다. 그리고……"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「エリシア──あたしをここから、助けてくれ──」"
translation = "「엘리시아── 나를 여기서, 구해 줘──」"

[[dialogue]]
speaker = "unk"
original = "ついにこぼれた──アポロの本心。"
translation = "마침내 흘러나왔다── 아폴로의 본심."

[[dialogue]]
speaker = "unk"
original = "その、たったひと言の瞬間だけ、仮面の瘴気は振り切られて……"
translation = "그, 단 한마디의 순간에만, 가면의 장기는 뿌리쳐지고……"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……ええ」"
translation = "「……네」"

[[dialogue]]
speaker_original = "フィオナ（魔王覚醒）"
speaker_translation = "피오나(마왕 각성)"
original = "「あなたの願い──しかと受け取りました。姉さん！」"
translation = "「당신의 소원── 확실히 받아들였습니다. 언니!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「！\u3000これは──！？」"
translation = "「! 이건──!?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「<ruby>緋<rt>あか</rt></ruby>い<ruby>眼<rt>め</rt></ruby>……まさか……！」"
translation = "「붉은 눈…… 설마……!」"

[[dialogue]]
speaker = "unk"
original = "太陽の星力が拡散する。フィオナの魂が目覚める。"
translation = "태양의 성력이 확산된다. 피오나의 영혼이 눈을 뜬다."

[[dialogue]]
speaker = "unk"
original = "それに至ったきっかけは──ついに引き出した、アポロからフィオナへの願い。"
translation = "그것에 이른 계기는── 마침내 끌어낸, 아폴로로부터 피오나에게 향한 소원."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "（これって、もしかして──）"
translation = "（이거, 혹시──）"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（ああ──俺が、ヴィーナスに助けを求められた時と同じ……）"
translation = "（아아── 내가, 비너스에게 도움을 요청받았을 때와 똑같아……）"

[[dialogue]]
speaker = "unk"
original = "あの時もそうだった。"
translation = "그때도 그랬다."

[[dialogue]]
speaker = "unk"
original = "魔王として目覚める最後のトリガーはいつだって──かけがえのない家族からの叫び。"
translation = "마왕으로서 눈을 뜨는 마지막 방아쇠는 언제나── 둘도 없는 가족으로부터의 외침."

[[dialogue]]
speaker_original = "フィオナ（魔王覚醒）"
speaker_translation = "피오나(마왕 각성)"
original = "「ありがとうございます……姉さん。待たせてごめんなさい、皆さん」"
translation = "「감사합니다…… 언니. 기다리게 해서 죄송합니다, 여러분」"

[[dialogue]]
speaker = "unk"
original = "ついに、姉妹としての<ruby>縁<rt>よすが</rt></ruby>を取り戻したフィオナは、今──"
translation = "마침내, 자매로서의 인연을 되찾은 피오나는, 지금──"

[[dialogue]]
speaker = "unk"
original = "俺にも並ぶ完全なる魔王の器として、君臨する。"
translation = "나에게도 필적하는 완전한 마왕의 그릇으로서, 군림한다."

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「エリシア嬢の中に眠る──魔王の真価なのニャン！」"
translation = "「엘리시아 양 안에 잠들어 있는── 마왕의 진가인 거다냥!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「緋宮くんと同じ……！」"
translation = "「히노미야 군과 똑같아……!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「完全覚醒の魔王が２人──いいわね、最高じゃない……！」"
translation = "「완전 각성한 마왕이 2명── 좋네, 최고 아니야……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「この熱さは──太陽の……！」"
translation = "「이 뜨거움은── 태양의……!」"

[[dialogue]]
speaker = "unk"
original = "フィオナを中心に燃え上がるようなオーラが噴き上がる。"
translation = "피오나를 중심으로 불타오르는 듯한 오라가 솟아오른다."

[[dialogue]]
speaker = "unk"
original = "星力──霊力──魔力──あらゆる熱量を己の色で練り上げた、魔王としての潜在能力だった。"
translation = "성력── 영력── 마력── 모든 열량을 자신의 색으로 단련해낸, 마왕으로서의 잠재 능력이었다."

[[dialogue]]
speaker = "unk"
original = "けれど……フィオナは新たに得たその力を、攻撃には使わなかった。"
translation = "하지만…… 피오나는 새로 얻은 그 힘을, 공격에는 사용하지 않았다."

