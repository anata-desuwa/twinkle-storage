[[dialogue]]
speaker = "unk"
original = "アニュラスは何かを競うことが大好きだ。"
translation = "아뉴라스는 무언가를 겨루는 것을 아주 좋아한다."

[[dialogue]]
speaker = "unk"
original = "初めてエッチをした時に『どっちが多く相手をイかせられるか』を競ったのがよほど楽しかったらしく……"
translation = "처음으로 섹스를 했을 때 『어느 쪽이 상대를 더 많이 가게 하는가』를 겨룬 것이 꽤나 즐거웠던 모양인지……"

[[dialogue]]
speaker = "unk"
original = "その後もエッチするたびに、様々なテーマで勝敗を決めるのが俺たちのお決まりとなっていて──"
translation = "그 후로도 섹스할 때마다 다양한 테마로 승패를 결정하는 것이 우리들의 정해진 규칙이 되어 있어서──"

[[dialogue]]
speaker = "アニュラス"
original = "「わっ……なんだこの暑さは……！？\u3000会長の部屋のクーラー、故障してないか……！？」"
translation = "「왓…… 뭐야 이 더위는……!? 회장 방 에어컨, 고장 난 거 아냐……!?」"

[[dialogue]]
speaker = "unk"
original = "デートの帰り、そういう雰囲気になって俺の部屋まで誘ったはいいが、運悪く空調が故障していることが発覚。"
translation = "데이트에서 돌아오는 길, 그런 분위기가 되어 내 방까지 유혹한 건 좋았지만, 운 나쁘게 공조 장치가 고장 난 것이 발각."

[[dialogue]]
speaker = "unk"
original = "ラブホテルにでも行こうかと訊ねてみたところ──"
translation = "러브호텔이라도 갈까 물어보았는데──"

[[dialogue]]
speaker = "アニュラス"
original = "「いや、そういうところはちょっと恥ずかしいし……私、制服だぞ。入れないだろ」"
translation = "「아니, 그런 곳은 좀 부끄럽고…… 나, 교복이라고. 못 들어가잖아.」"

[[dialogue]]
speaker = "unk"
original = "至極もっともな意見が返ってきた。そして何かに閃いたらしいアニュラスは楽しそうな笑みを浮かべて──"
translation = "지극히 타당한 의견이 돌아왔다. 그리고 무언가 번뜩인 듯한 아뉴라스는 즐거운 듯한 미소를 띠며──"

[[dialogue]]
speaker = "アニュラス"
original = "「うん……ちょうどいい。今日はクーラーの壊れたむし暑い部屋でシよう。先に音を上げて、イった方が負けだ！」"
translation = "「응…… 딱 좋아. 오늘은 에어컨이 고장 난 찜통 같은 방에서 하자. 먼저 항복하고, 간 쪽이 지는 거야!」"

[[dialogue]]
speaker = "unk"
original = "そうして本日の勝負内容が決まり、エッチが始まった……"
translation = "그렇게 오늘의 승부 내용이 결정되고, 섹스가 시작되었다……"

[[dialogue]]
speaker = "アニュラス"
original = "「ふぅっ……予想以上の蒸し暑さだな、これは……」"
translation = "「후우…… 예상 이상의 찜통더위네, 이건……」"

[[dialogue]]
speaker = "アニュラス"
original = "「お前のベッド、しぼれそうなくらいびしょびしょだ……ふふ、明日は洗濯だな」"
translation = "「네 침대, 짤 수 있을 정도로 흠뻑 젖었어…… 후후, 내일은 세탁이네.」"

[[dialogue]]
speaker = "unk"
original = "一糸まとわぬ姿となり、キスや触りっこなんかをして高めあうこと数十分……俺もアニュラスも、たっぷりと汗をかいて密着していた。"
translation = "실오라기 하나 걸치지 않은 모습이 되어 키스나 애무를 하며 고조되기를 수십 분…… 나와 아뉴라스도 잔뜩 땀을 흘리며 밀착해 있었다."

[[dialogue]]
speaker = "アニュラス"
original = "「ふふっ……私のおま○こに、ぁっ……会長のおち○ぽが当たって……んん<emoji=heart04>\u3000ビクビク、してるぞ……<emoji=heart04>」"
translation = "「후후…… 내 보지에, 앗…… 회장의 자지가 닿아서…… 응응<emoji=heart04> 덜덜, 떨고 있어……<emoji=heart04>」"

[[dialogue]]
speaker = "アニュラス"
original = "「入れる前から随分と感じてるみたいだな。どうする……？\u3000ギブアップは早い方がいいんじゃないのか？」"
translation = "「넣기도 전부터 꽤 느끼고 있는 것 같네. 어떡할래……? 기권은 빠른 게 좋지 않을까?」"

[[dialogue]]
speaker = "クロト"
original = "「まさか……」"
translation = "「설마……」"

[[dialogue]]
speaker = "unk"
original = "まだ繋がってもいないのに音は上げられない。俺もアニュラスに付き合う過程で、ずいぶんと負けず嫌いの根性が身についていた。"
translation = "아직 연결되지도 않았는데 항복할 수는 없다. 나도 아뉴라스와 어울리는 과정에서, 꽤나 지기 싫어하는 근성이 몸에 배어 있었다."

[[dialogue]]
speaker = "アニュラス"
original = "「じゃあ、もっとくっついてみるか。繋いだ手に力を込めてっ……ぎゅ～っと、握って……ん、んんぁっ……<emoji=heart04>」"
translation = "「그럼, 더 달라붙어 볼까. 맞잡은 손에 힘을 줘서…… 꽉~ 하고, 잡고…… 응, 응응앗……<emoji=heart04>」"

[[dialogue]]
speaker = "アニュラス"
original = "「ふふ<emoji=heart04>\u3000汗でぬかるんで、ほどけてしまいそうになったな。はふぅっ……繋いだ手に力を込めただけで、気持ちがいい……<emoji=heart04>」"
translation = "「후후<emoji=heart04> 땀 때문에 미끄러워서 풀릴 뻔했네. 하후우…… 맞잡은 손에 힘을 준 것만으로도, 기분이 좋아……<emoji=heart04>」"

[[dialogue]]
speaker = "アニュラス"
original = "「くっついた体の境い目もよくわからないほど、だな……<emoji=heart04>\u3000新発見だ。汗をかくと、身体は敏感になるのか……ん、ふぅっ……<emoji=heart04>」"
translation = "「맞닿은 몸의 경계선도 잘 모를 정도네……<emoji=heart04> 신발견이야. 땀을 흘리면 몸이 민감해지는 걸까…… 응, 후우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "恋人繋ぎをした手にぎゅうっと力がこもり、それだけでぞぞぞっと背筋が粟立つ。"
translation = "연인끼리 맞잡은 손에 힘이 꽉 들어가고, 그것만으로도 온몸에 소름이 돋는다."

[[dialogue]]
speaker = "unk"
original = "愛しい彼女が身じろぎをするたび、勃起したペニスを柔らかい女性器でくちくちと撫でられるのも、たまらなく気持ちがいい。"
translation = "사랑스러운 그녀가 몸을 뒤척일 때마다, 발기한 페니스를 부드러운 여성기로 꾹꾹 문지르는 것도 참을 수 없이 기분 좋다."

[[dialogue]]
speaker = "アニュラス"
original = "「おち○ぽ、触ってないのにすごい硬さだな……」"
translation = "「자지, 만지지도 않았는데 엄청 딱딱하네……」"

[[dialogue]]
speaker = "アニュラス"
original = "「なに……？\u3000汗をかいた私の身体から……いい匂いがする……？」"
translation = "「뭐……? 땀 흘린 내 몸에서…… 좋은 냄새가 나……?」"

[[dialogue]]
speaker = "アニュラス"
original = "「そっ──そういうことを言うのはちょっと変態っぽいぞ。ま、まあ……私も……わからんでもないが」"
translation = "「그── 그런 말을 하는 건 좀 변태 같네. 뭐, 뭐…… 나도…… 모르는 건 아니지만.」"

[[dialogue]]
speaker = "アニュラス"
original = "「すんすんっ……すぅーっ……はぁあ……<emoji=heart04>\u3000うん、汗だくのお前も、いい匂いがする……<emoji=heart04>」"
translation = "「킁킁…… 스으으…… 하아아……<emoji=heart04> 응, 땀범벅인 너도, 좋은 냄새가 나……<emoji=heart04>」"

[[dialogue]]
speaker = "アニュラス"
original = "「じゃあ……スタートだっ……ほら、会長。私の中に、来いっ……<emoji=heart04>」"
translation = "「그럼…… 스타트야…… 자, 회장. 내 안에, 와……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "愛液をとろとろとこぼすアニュラスの女性器へ、ペニスをあてがって──"
translation = "애액을 질질 흘리는 아뉴라스의 여성기에 페니스를 갖다 대고──"

[[dialogue]]
speaker = "アニュラス"
original = "「んんんっ……は、あぁ、あぁああ～っ<emoji=heart04>」"
translation = "「응응응…… 하, 아아, 아아아～앗<emoji=heart04>」"

[[dialogue]]
speaker = "アニュラス"
original = "「挿入って、きたっ……んっ<emoji=heart04>\u3000会長のおち○ぽっ……何だかいつもより、大きい、気がするぞ……っ<emoji=heart04>」"
translation = "「삽입, 해왔어…… 응<emoji=heart04> 회장의 자지…… 왠지 평소보다, 큰, 기분이 들어…… 읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "お互いじっくり高めあった後だからか。蒸し風呂のような熱気がこもっているからか……肉棒を包み込む柔らかさに腰が抜けそうになる。"
translation = "서로 충분히 고조된 뒤라서일까. 찜질방 같은 열기가 차 있어서일까…… 육봉을 감싸는 부드러움에 허리가 풀릴 것 같다."

[[dialogue]]
speaker = "アニュラス"
original = "「ん、ふふっ……余裕のなさそうな顔だな。この調子なら……今日は私の圧勝、だろうか……？<emoji=heart04>」"
translation = "「응, 후후…… 여유 없어 보이는 얼굴이네. 이 기세라면…… 오늘은 내 압승, 일까……?<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "楽しそうな、可愛らしい恋人の挑発に、俺も火が点く。絶対に彼女を先にイかせてやると思い、ピストンを開始した。"
translation = "즐거운 듯한, 귀여운 연인의 도발에 나도 불이 붙는다. 절대로 그녀를 먼저 가게 만들겠다고 다짐하며 피스톤을 시작했다."

[[dialogue]]
speaker = "アニュラス"
original = "「んんんっ<emoji=heart04>\u3000ふぁ、あ、あぁああっ<emoji=heart04>\u3000んんっ、あっ……おち○ぽ、硬ぃっ……んんっ……あ、あぁっ……<emoji=heart04>」"
translation = "「응응응<emoji=heart04> 훠, 아, 아아앗<emoji=heart04> 응응, 앗…… 자지, 딱딱해…… 응응…… 아, 아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "アニュラス"
original = "「ふぅ、ふぅっ……んんっ<emoji=heart04>\u3000あぁあっ……こんなに熱いおち○ぽ、初めてだっ……んん、あっ……はぁ、あっ……<emoji=heart04>」"
translation = "「후, 훗…… 응읏<emoji=heart04> 아아앗…… 이렇게 뜨거운 자지, 처음이야…… 응응, 앗…… 하아, 앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "アニュラスの膣内もとびきりの熱さだ。そして鍛錬の賜物か、彼女の膣内はとにかく締まりがすごい。"
translation = "아뉴라스의 질 안도 더할 나위 없이 뜨겁다. 그리고 단련의 성과인지, 그녀의 질 내부는 어쨌든 조이는 힘이 대단하다."

[[dialogue]]
speaker = "アニュラス"
original = "「あ、んんっ……ふ、ぅ、んんっ<emoji=heart04>\u3000あ、あっ<emoji=heart04>\u3000かきわけて、入ってくるっ……気持ち、いいっ……<emoji=heart04>」"
translation = "「아, 응응…… 후, 으, 응읏<emoji=heart04> 아, 앗<emoji=heart04> 헤집고, 들어와…… 기분, 좋앗……<emoji=heart04>」"

[[dialogue]]
speaker = "アニュラス"
original = "「あ、はぁ、ん、んっ<emoji=heart04>\u3000お前が突くたび……おっぱいが揺れてしまうっ……ん、はぁ、ふぅ、んんんっ<emoji=heart04>」"
translation = "「아, 하아, 응, 읏<emoji=heart04> 네가 찌를 때마다…… 가슴이 흔들려 버렷…… 응, 하아, 후, 응응읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "汗で濡れて艶やかなおっぱいは、普段にも増して魅力的に見える。"
translation = "땀에 젖어 윤기가 흐르는 가슴은, 평소보다 더욱 매력적으로 보인다."

[[dialogue]]
speaker = "unk"
original = "いつもならば穴が空くほど見てしまうけれど、今日はまずい。あまりにいやらしいから目に毒だ……"
translation = "평소라면 뚫어지게 쳐다보겠지만, 오늘은 곤란하다. 너무나도 음란해서 눈에 독이다……"

[[dialogue]]
speaker = "アニュラス"
original = "「こらっ……目を逸らすのは、反則だぞ……？\u3000勝負に負けたくないからって……おっぱい、見ないのは、ズル、だろうっ……<emoji=heart04>」"
translation = "「이봐…… 눈을 피하는 건, 반칙이야……? 승부에 지기 싫다고…… 가슴, 안 보는 건, 비겁, 하잖앗……<emoji=heart04>」"

[[dialogue]]
speaker = "アニュラス"
original = "「ほらっ……汗で、濡れてっ……ぬるぬるしてるおっぱい……<emoji=heart04>\u3000も、もっと、見ろ<emoji=heart04>\u3000ほらっ、じ～って見ろっ……ん、んんっ<emoji=heart04>」"
translation = "「자…… 땀으로, 젖어서…… 미끌미끌한 가슴……<emoji=heart04> 더, 더, 봐<emoji=heart04> 자, 빤히, 봐…… 응, 응읏<emoji=heart04>」"

[[dialogue]]
speaker = "アニュラス"
original = "「んんんんっ<emoji=heart04>\u3000あ、ぁあっ……おち○ぽ、また硬くなった……ふふ、お前は本当に私のおっぱいが好きだなっ……<emoji=heart04>」"
translation = "「응응응읏<emoji=heart04> 아, 아앗…… 자지, 다시 딱딱해졌어…… 후후, 너는 정말 내 가슴을 좋아하는구나……<emoji=heart04>」"

[[dialogue]]
speaker = "アニュラス"
original = "「もっと見て、もっと硬くしろっ……そして、先にイってしまえっ……ん、んん、んぁ、はぁ、ふぅっ<emoji=heart04>」"
translation = "「더 봐, 더 딱딱하게 만들어…… 그리고, 먼저 가버렷…… 응, 응응, 응아, 하아, 후읏<emoji=heart04>」"

[[dialogue]]
speaker = "アニュラス"
original = "「ほら、おま○こも、ぎゅ～っと締めてやるぞっ……お前のおち○ぽが大好きな、ぎゅ～って搾るやつ、いっぱいしてやるっ……<emoji=heart04>」"
translation = "「자, 보지도, 꽉~ 조여줄게…… 네 자지를 정말 좋아하는, 꽉~ 짜내는 거, 잔뜩 해줄게……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "運動が得意で、女性的なラインでありつつしっかり筋肉がついているアニュラスは、身体の扱い方がとても上手い。"
translation = "운동을 잘하고, 여성스러운 라인이면서도 탄탄한 근육이 붙은 아뉴라스는, 몸을 다루는 법이 매우 능숙하다."

[[dialogue]]
speaker = "unk"
original = "膣穴を締めたり緩めたりといった操作も自由自在なのだ。"
translation = "질 구멍을 조였다 풀었다 하는 조절도 자유자재인 것이다."

[[dialogue]]
speaker = "アニュラス"
original = "「んんっ……ぎゅーっ<emoji=heart04>\u3000はぁ、んんっ……ぎゅぅ～っ<emoji=heart04>\u3000んんっ……ふふっ♪\u3000気持ちよさそうな、顔だっ……<emoji=heart04>」"
translation = "「응읏…… 꽉~<emoji=heart04> 하아, 응읏…… 꽉~<emoji=heart04> 응읏…… 후훗♪ 기분 좋아 보이는, 얼굴이야……<emoji=heart04>」"

[[dialogue]]
speaker = "アニュラス"
original = "「ピストン、しづらいくらい締め付けてやるっ……ぎゅ、ぎゅぅ～っ<emoji=heart04>\u3000ぎゅぅう～っ<emoji=heart04>\u3000んんぁ、はぁあっ<emoji=heart04>」"
translation = "「피스톤, 하기 힘들 정도로 조여줄게…… 꽉, 꽉~<emoji=heart04> 꽉~<emoji=heart04> 응아, 하아앗<emoji=heart04>」"

[[dialogue]]
speaker = "アニュラス"
original = "「ほら、ぎゅう～っ……ぎゅっ、ぎゅっ、ぎゅっ<emoji=heart04>\u3000おち○ぽ、食らえっ……ぎゅ～っ<emoji=heart04>」"
translation = "「자, 꽉~…… 꽉, 꽉, 꽉<emoji=heart04> 자지, 먹어라…… 꽉~<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「──っ！」"
translation = "「──읏!」"

[[dialogue]]
speaker = "unk"
original = "側位の体勢で、どうしてこんなにも膣内を自在に締められるのか。柔らかな膣穴でペニスを搾られた衝撃で、声が漏れる。"
translation = "측위 체위로, 어째서 이렇게까지 질 내부를 자유롭게 조일 수 있는 걸까. 부드러운 질 구멍으로 페니스를 쥐어짜이는 충격에, 신음이 새어 나온다."

[[dialogue]]
speaker = "アニュラス"
original = "「はぁ、んん、んっ<emoji=heart04>\u3000ぁあ……お前の感じてる顔、好きだ……<emoji=heart04>\u3000今日もおち○ぽ、いっぱい気持ちよくしてやるからな……<emoji=heart04>」"
translation = "「하아, 응응, 읏<emoji=heart04> 아아…… 네가 느끼는 얼굴, 좋아……<emoji=heart04> 오늘도 자지, 잔뜩 기분 좋게 해줄 테니까……<emoji=heart04>」"

[[dialogue]]
speaker = "アニュラス"
original = "「いくぞ～っ……<emoji=heart04>\u3000んんっ、ぎゅぅっ……ぎゅぅう～っ……<emoji=heart04>\u3000ぎゅ、ぎゅ、ぎゅぅ～っ……<emoji=heart04>」"
translation = "「간다～……<emoji=heart04> 응읏, 꽉…… 꽉~……<emoji=heart04> 꽉, 꽉, 꽉~……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「～～～～っ！！」"
translation = "「～～～～읏！！」"

[[dialogue]]
speaker = "unk"
original = "歯を食いしばって射精欲をやり過ごす。グラマラスな恋人の汗だくの体なんていう、刺激的すぎるものが目の前に広がっているせいで、正直負けそう。"
translation = "이를 악물고 사정 욕구를 참아낸다. 글래머러스한 연인의 땀범벅인 몸이라는, 너무나 자극적인 광경이 눈앞에 펼쳐져 있어서 솔직히 질 것 같다."

[[dialogue]]
speaker = "アニュラス"
original = "「フフン<emoji=heart04>\u3000今夜は私の勝ちが濃厚だなぁっ……はぁ、んんっ<emoji=heart04>\u3000最近負けっぱなしだったからな、お返しさせてもらうぞ……？<emoji=heart04>」"
translation = "「후훙<emoji=heart04> 오늘 밤은 내 승리가 농후하네…… 하아, 응읏<emoji=heart04> 최근 계속 지기만 했으니까, 갚아주겠어……?<emoji=heart04>」"

[[dialogue]]
speaker = "アニュラス"
original = "「お前のおち○ぽにはいつも、好き放題されていることだしっ……今日は絶対先に、イかせてやるっ……<emoji=heart04>」"
translation = "「네 자지한테는 항상, 마음대로 휘둘리고 있었고…… 오늘은 절대 먼저, 가게 만들 거야……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "得意げに笑うアニュラスの余裕を崩すため、俺は彼女のおっぱいを揉みしだいて反撃する。"
translation = "득의양양하게 웃는 아뉴라스의 여유를 무너뜨리기 위해, 나는 그녀의 가슴을 주무르며 반격한다."

[[dialogue]]
speaker = "アニュラス"
original = "「んんぁ<emoji=heart04>\u3000はぁ、あ、あぁああっ<emoji=heart04>\u3000おっぱい、そんなっ……先っぽばっかり、いじめる、なぁっ……<emoji=heart04>」"
translation = "「응응아<emoji=heart04> 하아, 아, 아아아앗<emoji=heart04> 가슴, 그렇게…… 끝부분만, 괴롭히지, 맛……<emoji=heart04>」"

[[dialogue]]
speaker = "アニュラス"
original = "「あ、あぁあ、あ、ああっ<emoji=heart04>\u3000くりくりしながら、おち○ぽで突くのっ……ん、んぁ、あっ<emoji=heart04>\u3000んんぅ～っ……<emoji=heart04>」"
translation = "「아, 아아아, 아, 아앗<emoji=heart04> 클리 만지면서, 자지로 찌르는 거…… 응, 응아, 앗<emoji=heart04> 응응～……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "弱点を突くのは戦場の基本だ。俺はぱんぱんに膨れた亀頭で、アニュラスの弱いところ──女性器の奥深くをぐりぐりと刺激する。"
translation = "약점을 찌르는 것은 전장의 기본이다. 나는 팽팽하게 부풀어 오른 귀두로, 아뉴라스의 약한 곳──여성기의 깊숙한 곳을 꾹꾹 자극한다."

[[dialogue]]
speaker = "アニュラス"
original = "「んん、んぅっ！？<emoji=heart04>\u3000ぉ、ぉ、ぉっ……ぉっ<emoji=heart04>\u3000ぉ──ぁ、あぁっ<emoji=heart04>\u3000おち○ぽ、深いっ……んぅ、ぅっ……んんぅ、おっ！<emoji=heart04>」"
translation = "「응응, 응읏！？<emoji=heart04> 오, 오, 읏…… 읏<emoji=heart04> 오──아, 아앗<emoji=heart04> 자지, 깊어…… 응우, 읏…… 응응우, 읏！<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "握った手に力がこもる。今度は彼女が、絶頂を受け流す番だ。"
translation = "움켜쥔 손에 힘이 들어간다. 이번엔 그녀가, 절정을 흘려보낼 차례다."

[[dialogue]]
speaker = "アニュラス"
original = "「んんっ──ふっ──んんんんっ……はああぁっ……<emoji=heart04>\u3000危なかった……んん、奥っ……すごく気持ちよかったがっ……んん<emoji=heart04>」"
translation = "「응읏── 훗── 응응응읏…… 하아아앗……<emoji=heart04> 위험했어…… 응응, 안쪽…… 정말 기분 좋았지만…… 응응<emoji=heart04>」"

[[dialogue]]
speaker = "アニュラス"
original = "「ま、まだまだ耐えられるぞ、私はっ……はぁ、んん、ふぅ、んんっ……<emoji=heart04>」"
translation = "「아, 아, 아직 견딜 수 있어, 나는…… 하아, 응응, 후, 응읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "確かにアニュラスにはまだ余裕があるように見える。持久戦になったら俺の負けだろう──ならば。"
translation = "확실히 아뉴라스에게는 아직 여유가 있어 보인다. 지구전이 되면 내 패배겠지── 그렇다면."

[[dialogue]]
speaker = "アニュラス"
original = "「んん──う、ぅうぅっ！？<emoji=heart04>\u3000ぉ、ぉ、ぉ、ぉっ<emoji=heart04>\u3000は、速い動き、そんな、急に──ぉ、ぉお、ぉぉ、ぉっ……おっ！<emoji=heart04>」"
translation = "「응응── 우, 우우읏！？<emoji=heart04> 오, 오, 오, 읏<emoji=heart04> 하, 빠른 움직임, 그런, 갑자기── 오, 오오, 오오, 읏…… 읏！<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "短期決戦で雌雄を決するほかない──自爆覚悟で、俺はアニュラスの体を抱き寄せて、強いピストンへと切り替えた。"
translation = "단기 결전으로 승부를 낼 수밖에 없다── 자폭 각오로, 나는 아뉴라스의 몸을 끌어안고, 강한 피스톤으로 전환했다."

[[dialogue]]
speaker = "アニュラス"
original = "「ふぅう、ぅっ！<emoji=heart04>\u3000お、ぉ、ぉ、ぉ、ぉ、おっ！<emoji=heart04>\u3000そこっ、ぁ、ああっ<emoji=heart04>\u3000そこダメだっ……んんぅっ<emoji=heart04>\u3000気持ちよすぎるから、ダメ、ダメぇっ<emoji=heart04>」"
translation = "「후우우, 읏！<emoji=heart04> 오, 오, 오, 오, 오, 읏！<emoji=heart04> 거기, 아, 아앗<emoji=heart04> 거기 안 돼…… 응응읏<emoji=heart04> 너무 기분 좋으니까, 안 돼, 안 돼엣<emoji=heart04>」"

[[dialogue]]
speaker = "アニュラス"
original = "「こ、このぉー……お前、ひ、卑怯だぞっ……<emoji=heart04>\u3000予告なく、おち○ぽ強くするのは、き、騎士道に反するっ……んぅ、うう！<emoji=heart04>」"
translation = "「이, 이 녀석…… 너, 비, 비겁해……<emoji=heart04> 예고 없이, 자지 세게 하는 건, 기, 기사도에 어긋나…… 응우, 우우！<emoji=heart04>」"

[[dialogue]]
speaker = "アニュラス"
original = "「はぁ、あ、あ、ああっ<emoji=heart04>\u3000おっぱい、揺れてるおっぱい、掴んだらダメだっ<emoji=heart04>\u3000強くいじったら──ん、ぁ、ぁ、ぁ～～……っ！<emoji=heart04>」"
translation = "「하아, 아, 아, 아앗<emoji=heart04> 가슴, 흔들리는 가슴, 잡으면 안 돼<emoji=heart04> 강하게 만지면── 응, 아, 아, 아～～……읏！<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "たっぷりと実った乳房を掴もうとして、汗でぬるんと滑ってつかみ損ねたり。アニュラスと交わっている体は、どこもかしこも気持ちよくて眩暈がする。"
translation = "탐스럽게 익은 유방을 잡으려다, 땀에 미끄러져 놓치거나 한다. 아뉴라스와 섞이고 있는 몸은, 어디든 기분 좋아서 현기증이 난다."

[[dialogue]]
speaker = "アニュラス"
original = "「わ、私も反撃、するぞっ……か、顔を寄せろっ<emoji=heart04>」"
translation = "「와, 나도 반격, 할 거야…… 가, 얼굴을 가까이 대<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "アニュラスに誘われて顔を近づけて──深く舌を絡ませあう。"
translation = "아뉴라스에게 유혹받아 얼굴을 가까이하고── 깊게 혀를 얽어맨다."

[[dialogue]]
speaker = "アニュラス"
original = "「んぅちゅぅっ<emoji=heart04>\u3000んちゅるじゅぅっ<emoji=heart04>\u3000んれぇろ、れろ、んちゅる、ちゅぱっ<emoji=heart04>\u3000れぇれう、れぅれぅれぅれぅっ……<emoji=heart04>」"
translation = "「응츄우<emoji=heart04> 츄르쥬우<emoji=heart04> 응레로, 레로, 츄르, 츄파<emoji=heart04> 레레우, 레우레우레우레우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "汗だくになりながらのディープキスの心地よさに、アニュラスのおっぱいを揉む手が一瞬止まってしまう。"
translation = "땀범벅이 된 채 나누는 딥키스의 기분 좋음에, 아뉴라스의 가슴을 주무르던 손이 한순간 멈춰버린다."

[[dialogue]]
speaker = "アニュラス"
original = "「んちゅぅる、れぇえ、ちゅるちゅぱっ……はぁ、はっ、はぁっはぁっ<emoji=heart04>\u3000ダメだぞ、おっぱい揉んで、もっと揉んでっ……キスも<emoji=heart04>\u3000んちゅぅ<emoji=heart04>」"
translation = "「응츄르, 레에에, 츄르츄파…… 하아, 핫, 하앗하앗<emoji=heart04> 안 돼, 가슴 주물러, 더 주물러…… 키스도<emoji=heart04> 응츄우<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "繋がっている時のキスほど気持ちいいものもなくて、どんどん射精欲がこみあがってくる。"
translation = "연결되어 있을 때의 키스만큼 기분 좋은 것도 없어서, 점점 사정 욕구가 치밀어 오른다."

[[dialogue]]
speaker = "アニュラス"
original = "「じゅるれるっ<emoji=heart04>\u3000ちゅぐっ、ちゅぶぶぶっ<emoji=heart04>\u3000れぇれろ、んちゅる、れちゃ、れろれろ、ちゅぅちゅるっ<emoji=heart04>」"
translation = "「쥬르렐<emoji=heart04> 츄구, 츄부부부<emoji=heart04> 레레로, 츄르, 레챠, 레로레로, 츄우츄르<emoji=heart04>」"

[[dialogue]]
speaker = "アニュラス"
original = "「好きだっ……んちゅぅ<emoji=heart04>\u3000大好きだぞ、会長っ……んれぇ、ちゅるう、んちゅちゅ、ちゅぱっ<emoji=heart04>」"
translation = "「좋아해…… 응츄우<emoji=heart04> 정말 좋아해, 회장…… 응레에, 츄루우, 응츄츄, 츄파<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "激しいキスの合間に気持ちを伝えられ、我慢ができなくなっていく。俺はさらに激しく腰を打ち付けていく。"
translation = "격렬한 키스 사이에 마음을 전해 듣고, 참을 수 없게 되어간다. 나는 더욱 격렬하게 허리를 쳐올린다."

[[dialogue]]
speaker = "アニュラス"
original = "「ちゅっ──ぱぁっ<emoji=heart04>\u3000んん、んぁ、あ、あ、あぁ、あっ<emoji=heart04>\u3000お、ぅっ……ん、んんぅ、んぉっ……お、ぉお、ぉおっ<emoji=heart04>」"
translation = "「츄── 파앗<emoji=heart04> 응응, 응아, 아, 아, 아아, 앗<emoji=heart04> 오, 우읏…… 응, 응응우, 응오…… 오, 오오, 오오<emoji=heart04>」"

[[dialogue]]
speaker = "アニュラス"
original = "「ぁ、そこ、そこ好きだっ……会長のおち○ぽ、ずっと、気持ちいいところ、こすって、くれてるっ……あ、あ、あ、あぁ、あっ！<emoji=heart04>」"
translation = "「아, 거기, 거기 좋앗…… 회장의 자지, 계속, 기분 좋은 곳, 긁어, 주고 있어…… 아, 아, 아, 아아, 앗！<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "好きだ、好きだ、好きだ──うわごとみたいに呟きながら、アニュラスを求める。"
translation = "좋아해, 좋아해, 좋아해── 잠꼬대처럼 중얼거리며, 아뉴라스를 원한다."

[[dialogue]]
speaker = "アニュラス"
original = "「私もっ<emoji=heart04>\u3000私も好きだっ……<emoji=heart04>\u3000あ、あ、あっ<emoji=heart04>\u3000好きだっ、大好きだぞ、お前のことが好きだぁっ……あ、んんんう、ふぅ、ぁ、あああ！<emoji=heart04>」"
translation = "「나도<emoji=heart04> 나도 좋아해……<emoji=heart04> 아, 아, 앗<emoji=heart04> 좋아해, 정말 좋아해, 너를 좋아해애…… 아, 응응응우, 후우, 아, 아아아！<emoji=heart04>」"

[[dialogue]]
speaker = "アニュラス"
original = "「もっと、もっと強くっ──奥のところっ──んんんぅ！\u3000ぉ、ぉ、ぉっ！<emoji=heart04>\u3000気持ちいい、おち○ぽ、気持ちいい、気持ちいぃっ！<emoji=heart04>」"
translation = "「더, 더 강하게── 안쪽을── 응응응우！ 오, 오, 읏！<emoji=heart04> 기분 좋아, 자지, 기분 좋아, 기분 좋아앗！<emoji=heart04>」"

[[dialogue]]
speaker = "アニュラス"
original = "「あ、ぁ、ぁ──イ、イクっ<emoji=heart04>\u3000イキそっ……<emoji=heart04>\u3000ぉ、ぉ、ぉ、ぉ、ぉっ……！<emoji=heart04>」"
translation = "「아, 아, 아── 가, 가<emoji=heart04> 갈 것 같앗……<emoji=heart04> 오, 오, 오, 오, 읏……！<emoji=heart04>」"

[[dialogue]]
speaker = "アニュラス"
original = "「お前も、イク……？\u3000うん、イケっ<emoji=heart04>\u3000私もイク、イク、イクっ……！<emoji=heart04>」"
translation = "「너도, 가……? 응, 가<emoji=heart04> 나도 가, 가, 가……！<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「アニュラスっ──！」"
translation = "「아뉴라스──！」"

[[dialogue]]
speaker = "アニュラス"
original = "「出して、出してくれっ<emoji=heart04>\u3000好き、好き、好きっ──ぁ、ぁ、ぁ──イクイクイクイクイクっ<emoji=heart04>\u3000イっくぅうううぅ～っ……！！<emoji=heart04>」"
translation = "「싸줘, 싸줘<emoji=heart04> 좋아, 좋아, 좋앗── 아, 아, 아── 가가가가가<emoji=heart04> 간다아아아아～……！！<emoji=heart04>」"

[[dialogue]]
speaker = "アニュラス"
original = "「んんぁあ、あああ、ぁぁあああああ～～～っ！！！<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응응아아, 아아아, 아아아아아～～～！！！<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "びゅくびゅくっ──びゅるるっ──びゅるるっ──深く繋がったまま、何度も何度も精液を注ぎ込む。"
translation = "비틀비틀── 뷰르르── 뷰르르── 깊게 연결된 채로, 몇 번이고 몇 번이고 정액을 쏟아붓는다."

[[dialogue]]
speaker = "アニュラス"
original = "「出てるっ……会長の、精液っ……<emoji=heart04>\u3000お、ぉお、ぉ、ぉおおお～っ！<emoji=heart04>\u3000ぁ、ぁ、ぁ──ぁあぁぁぁぁあぁ～～～……っ！<emoji=heart04>」"
translation = "「나오고 있어…… 회장의, 정액……<emoji=heart04> 오, 오오, 오, 오오오오～！<emoji=heart04> 아, 아, 아── 아아아아아아아～～～……읏！<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "射精中のペニスをぎゅぅぎゅぅと搾り上げられ、腰が抜けそうになるほどの心地よい射精が続く。"
translation = "사정 중인 페니스를 꽉꽉 쥐어짜여, 허리가 풀릴 것 같은 기분 좋은 사정이 계속된다."

[[dialogue]]
speaker = "アニュラス"
original = "「はぁ、あぁ、あぁあっ……ま、まだ、出てる……<emoji=heart04>\u3000すごいっ……んんっ……気持ち、いいっ……ん、んんぅっ……！<emoji=heart04>」"
translation = "「하아, 아아, 아아앗…… 아, 아직, 나오고 있어……<emoji=heart04> 대단해…… 응읏…… 기분, 좋앗…… 응, 응응읏……！<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "一滴残らず出し切った俺は、ペニスを引き抜いた。"
translation = "한 방울도 남기지 않고 다 쏟아낸 나는, 페니스를 뽑아냈다."

[[dialogue]]
speaker = "アニュラス"
original = "「はーっ……はぁあーっ……ふぅううーっ……ふぅううーっ……<emoji=heart04><emoji=heart04>」"
translation = "「하ー…… 하아아ー…… 후우우우ー…… 후우우우ー……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "アニュラス"
original = "「だ、出しすぎだぞ……んんっ……こんなにいっぱい……入りきらない……<emoji=heart04>」"
translation = "「너, 너무 많이 쌌어…… 응읏…… 이렇게나 잔뜩…… 다 안 들어가……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "膣口からこぽこぽと漏れる白濁をうっとりと眺めた後、アニュラスはとろけた笑みを浮かべた。"
translation = "질구에서 꿀렁꿀렁 새어 나오는 백탁을 황홀하게 바라본 뒤, 아뉴라스는 녹아내린 듯한 미소를 지었다."

[[dialogue]]
speaker = "アニュラス"
original = "「今の勝敗は……」"
translation = "「지금 승패는……」"

[[dialogue]]
speaker = "クロト"
original = "「引き分け……？」"
translation = "「무승부……?」"

[[dialogue]]
speaker = "アニュラス"
original = "「だな……<emoji=heart04>\u3000同時にイってしまったから、引き分けだな……<emoji=heart04>」"
translation = "「그렇네……<emoji=heart04> 동시에 가버렸으니까, 무승부네……<emoji=heart04>」"

[[dialogue]]
speaker = "アニュラス"
original = "「よし、会長……もう１回だ。今度こそ私が勝つ。さぁ──来い！」"
translation = "「좋아, 회장…… 한 번 더야. 이번에야말로 내가 이길 거야. 자── 와!」"

[[dialogue]]
speaker = "クロト"
original = "「……ちょっとだけ休憩しない？\u3000喉も乾いたし……」"
translation = "「……잠깐만 쉬지 않을래? 목도 마르고……」"

[[dialogue]]
speaker = "アニュラス"
original = "「水なんて、セックスしながらでも飲めるだろう。ほら、早く来い……もっとシたいんだ……大好きなお前と……<emoji=heart04>」"
translation = "「물 같은 건, 섹스하면서도 마실 수 있잖아. 자, 빨리 와…… 더 하고 싶어…… 사랑하는 너랑……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "膣出し直後でひくついた女性器を広げながら、アニュラスが可愛らしいおねだりをしてくる。"
translation = "질내사정 직후라 움찔거리는 여성기를 벌리며, 아뉴라스가 귀엽게 조른다."

[[dialogue]]
speaker = "unk"
original = "そんなことをされれば、受けて立たないわけにはいかない。"
translation = "그런 짓을 당하면, 받아들이지 않을 수 없다."

[[dialogue]]
speaker = "アニュラス"
original = "「今夜もいっぱい、いっぱいしような……大好きだぞ、会長……<emoji=heart04>」"
translation = "「오늘 밤도 잔뜩, 잔뜩 하자…… 사랑해, 회장……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "──その後。再戦するたびに、同時にイクという奇蹟を何度も何度も繰り返し……"
translation = "──그 후. 재전할 때마다, 동시에 간다는 기적을 몇 번이고 몇 번이고 반복하며……"

[[dialogue]]
speaker = "unk"
original = "俺たちはそろって音を上げて、ベッドに倒れこむのだった──"
translation = "우리는 다 같이 지쳐서, 침대에 쓰러지는 것이었다──"

