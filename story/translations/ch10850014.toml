[[dialogue]]
speaker = "unk"
original = "第４話,恋人への独占欲,P"
translation = "제4화, 연인에 대한 독점욕, P"

[[dialogue]]
speaker = "unk"
original = "アニマ先輩の分裂薬により、俺も女子アバターを並行使用して、再び流星学園附属校に通うことができるようになった。そんな久しぶりの登校日。"
translation = "아니마 선배의 분열약 덕분에, 나도 여자 아바타를 병행 사용하며 다시 유성학원 부속교에 다닐 수 있게 되었다. 그런 오랜만의 등교일."

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「会長！\u3000またクラスメイトとして一緒に過ごせて、嬉しいのだ♪」"
translation = "「회장! 다시 클래스메이트로서 함께 지낼 수 있어서 기쁜거다♪」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「まあ、１度はクラスメイトになったわけですし、私からも一応……おかえりなさい、緋宮会長」"
translation = "「뭐, 한 번은 클래스메이트가 되었던 사이기도 하고, 저로서도 일단…… 어서 오세요, 히노미야 회장」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「クロトママ～♪\u3000また会えて嬉しいわ♪」"
translation = "「쿠로토 마마~♪ 다시 만나서 기뻐요♪」"

[[dialogue]]
speaker = "unk"
original = "ありがとう、みんな"
translation = "고마워, 얘들아"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「ふふっ、でもやっぱり、会長の姿はとても可愛くて似合っていますね♪\u3000ママダレナとして色々お世話したくなっちゃいます。なでなで♪」"
translation = "「후훗, 하지만 역시 회장님의 모습은 무척 귀엽고 잘 어울리네요♪ 마마다레나로서 이것저것 보살펴주고 싶어져 버려요. 쓰담쓰담♪」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「クロトママ、今日の昼食は一緒に大聖堂カフェテリアへ行きましょう♪\u3000セシア、久しぶりにあ～んってして欲しいわ♪」"
translation = "「쿠로토 마마, 오늘 점심은 같이 대성당 카페테리아에 가요♪ 세시아, 오랜만에 아~앙 해줬으면 좋겠어요♪」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker = "unk"
original = "そうして昼休み、セシアのお願いに応えることになったのだが――"
translation = "그렇게 점심시간, 세시아의 부탁에 응하게 되었습니다만――"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「――あ～ん♪\u3000……もぐもぐ♪\u3000えへへ～、クロトママ、ありがと～♪\u3000とっても美味しいわ♪」"
translation = "「――아~앙♪ ……우물우물♪ 에헤헤~, 쿠로토 마마, 고마워요~♪ 정말 맛있어요♪」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「むむむ……！」"
translation = "「무무무……!」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「マグダレナ、また会長にママの座を取られたことに嫉妬してるのだ？\u3000大人のアバターに戻れば、セシアのママ判定は戻るわけだし、そこまで気にしなくても――」"
translation = "「마그다레나, 또 회장에게 엄마 자리를 뺏긴 것에 질투하는 거다? 어른 아바타로 돌아가면 세시아의 엄마 판정은 돌아올 테고, 그렇게까지 신경 쓰지 않아도――」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「やっぱり、譲れません！」"
translation = "「역시, 양보 못 해요!」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「い、いきなりどうしたんですか……！？」"
translation = "「이, 갑자기 왜 그러세요……!?」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「会長があ～んしていいのは、私だけです！\u3000だって私は――」"
translation = "「회장님이 아~앙 해줘도 되는 건 저뿐이에요! 왜냐하면 저는――」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「会長の恋人なんですから！\u3000たとえセシアであっても、そう簡単に譲れません！」"
translation = "「회장님의 연인이니까요! 설령 세시아라고 해도 그렇게 쉽게 양보 못 해요!」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「えぇ～！\u3000そんな～！？\u3000ママにあ～んしてもらうのは、セシアの生き甲斐なのに！？」"
translation = "「에에~! 말도 안 돼~!? 엄마가 아~앙 해주는 건 세시아의 삶의 보람인데!?」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「まさかのセシアに嫉妬する方向なのだ！？」"
translation = "「설마 했던 세시아에게 질투하는 방향인 거다!?」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「なので、会長！\u3000私にもちゃんと、あ～んして下さい！」"
translation = "「그러니까 회장님! 저에게도 제대로 아~앙 해주세요!」"

[[dialogue]]
speaker = "unk"
original = "わ、わかった。じゃあ――"
translation = "아, 알았어. 그럼――"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「はい♪\u3000――あ～ん♪」"
translation = "「네♪ ――아~앙♪」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「あむっ……もぐもぐ……んっ……♪」"
translation = "「아암…… 우물우물…… 응……♪」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「えへへ……<emoji=heart04>\u3000美味しいです……<emoji=heart04>」"
translation = "「에헤헤……<emoji=heart04> 맛있어요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「ま、マグダレナ、見たことないくらいデレデレの笑顔を浮かべているのだ……！\u3000なんか最近、会長との仲に変化でもあったのだ？」"
translation = "「마, 마그다레나, 본 적 없을 정도로 데레데레한 미소를 짓고 있는 거다……! 왠지 최근 회장과의 사이에 변화라도 있었던 거다?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "（ちょ、ちょっとだけ羨ましいかも……）"
translation = "（조, 조금 부러울지도……）"

[[dialogue]]
speaker = "unk"
original = "その日の放課後、マグダレナから２人きりで過ごしたいと言われて、誰も来ないような校舎隅の空き教室へとやって来る。"
translation = "그날 방과 후, 마그다레나가 둘이서만 지내고 싶다고 말해서 아무도 오지 않을 법한 교사 구석의 빈 교실로 찾아온다."

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「今日は会長、クラスのみんなから話しかけられて大人気でしたから、ようやく２人きりで落ち着けますね」"
translation = "「오늘은 회장님, 반 친구들 모두가 말을 걸어줘서 인기 만점이었으니까, 이제야 둘이서 진정할 수 있겠네요」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「――いえ、何か特別な用事があるわけじゃないんですけど、ただ……」"
translation = "「――아니요, 뭔가 특별한 용건이 있는 건 아니지만, 그저……」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「何だか、みんなに囲まれてる会長を見ていたら、独占欲が湧いてしまったと言いますか……」"
translation = "「왠지 모두에게 둘러싸인 회장님을 보고 있으니 독점욕이 솟아버렸다고나 할까……」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「だから、こうやってくっ付いちゃいます……<emoji=heart04>」"
translation = "「그러니까 이렇게 달라붙어 버릴래요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "い、今は女子の姿だけど……"
translation = "지, 지금은 여자 모습인데……"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「そうですね。前は純粋に可愛くて、頭をなでなでしたいって気持ちの方が大きかったんですが、今は……」"
translation = "「그렇네요. 전에는 순수하게 귀여워서 머리를 쓰담쓰담 해주고 싶다는 마음이 더 컸지만, 지금은……」"

[[dialogue]]
speaker = "unk"
original = "そう言って、マグダレナはそっと唇を寄せると――"
translation = "그렇게 말하며 마그다레나는 살며시 입술을 가까이 가져가더니――"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「んっ……ちゅっ……<emoji=heart04>」"
translation = "「응…… 츄……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「……女の子の姿でも、恋人のスキンシップがしたくなっちゃうくらい、好きって気持ちが強くなってしまいました……」"
translation = "「……여자아이 모습이라도 연인으로서 스킨십이 하고 싶어질 정도로, 좋아한다는 마음이 강해져 버렸어요……」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「会長が悪いんですよ？\u3000この前のデートで、恋人として過ごすことの『甘さ』を教えたりするんですから……」"
translation = "「회장님이 나쁜 거예요? 저번 데이트에서 연인으로서 지내는 것의 『달콤함』을 가르쳐주거나 하니까……」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「ママダレナとして接するだけじゃ、甘さが物足りないって、思うようになってしまったんです……<emoji=heart04>」"
translation = "「마마다레나로서 대하는 것만으로는 달콤함이 부족하다고 생각하게 되어버렸단 말이에요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「それに、今は会長が女の子になっているからこそ、好奇心も湧いてしまうんです」"
translation = "「게다가 지금은 회장님이 여자아이가 되어 있으니까 더 호기심도 생겨버려요」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「今の会長とイチャイチャしたら、どんな甘さなのかなって<emoji=heart04>」"
translation = "「지금의 회장님과 꽁냥꽁냥하면 어떤 달콤함일까 하고<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「だから、責任を取って、付き合って下さいね？\u3000ふふっ……<emoji=heart04>」"
translation = "「그러니까 책임을 지고 상대해 주세요? 후훗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "お、お手柔らかにお願いします……"
translation = "사, 살살 부탁드립니다……"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「はい、頑張ります<emoji=heart04>」"
translation = "「네, 열심히 할게요<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「好きですよ、会長……<emoji=heart04>」"
translation = "「좋아해요, 회장님……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「ちゅっ……<emoji=heart04>」"
translation = "「츄……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "この前のお返しと言わんばかりに、マグダレナから知らない甘さを教え込まれてしまう俺なのだった――"
translation = "저번의 답례라는 듯이 마그다레나로부터 알지 못했던 달콤함을 주입받고 마는 나였다――"

