[[dialogue]]
speaker = "unk"
original = "マリオンと恋人の関係になって、しばらく経ったある日のこと。"
translation = "마리온과 연인 사이가 되고 나서 얼마간 지난 어느 날의 일."

[[dialogue]]
speaker = "unk"
original = "最近、俺は星徒会の仕事が忙しくて、マリオンと２人の時間をなかなか取れずにいたのだが――"
translation = "최근 나는 성도회 업무가 바빠서 마리온과 둘만의 시간을 좀처럼 내지 못하고 있었는데――"

[[dialogue]]
speaker = "マリオン"
original = "「失礼いたします、会長様」"
translation = "「실례하겠습니다, 회장님」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、マリオン。残業が終わって、ちょうど今帰ろうと思ってたところで――」"
translation = "「아아, 마리온. 잔업이 끝나서 마침 지금 돌아가려던 참이――」"

[[dialogue]]
speaker = "マリオン"
original = "「はい。そう思って、参りました。お疲れのところ、申し訳ありませんが……」"
translation = "「네. 그럴 줄 알고 왔답니다. 피곤하신 와중에 죄송합니다만……」"

[[dialogue]]
speaker = "マリオン"
original = "「連行させていただきますね<emoji=heart04>」"
translation = "「연행하도록 할게요<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「えっ！？\u3000何！？\u3000どういうこと！？」"
translation = "「엣!? 뭐야!? 어떻게 된 거야!?」"

[[dialogue]]
speaker = "マリオン"
original = "「――まあまあ、うふふ♪\u3000そう警戒なさらずに。<ruby>私<rt>わたくし</rt></ruby>の部屋にご招待したいと思っているだけですので」"
translation = "「――자자, 우후후♪ 그렇게 경계하지 마시길. 저의 방으로 초대하고 싶을 뿐이니까요」"

[[dialogue]]
speaker = "マリオン"
original = "「……明日も仕事が忙しいから、帰って早く寝ないとマズい？\u3000ご心配なく。こういう時こそ、人形使いである私の出番です」"
translation = "「……내일도 일이 바빠서, 일찍 돌아가 자지 않으면 곤란하다고요? 걱정 마세요. 이럴 때야말로 인형술사인 제가 나설 차례랍니다」"

[[dialogue]]
speaker = "マリオン"
original = "「明日の仕事は私達が代わりにやりますし、リノ様にも既に話は通してあります」"
translation = "「내일 일은 저희가 대신할 거고, 리노 님께도 이미 이야기는 해 두었거든요」"

[[dialogue]]
speaker = "マリオン"
original = "「それに、真面目な会長様のことですから、忙しくて色々溜め込んでしまっているのではないですか？」"
translation = "「게다가, 성실하신 회장님이시니까, 바빠서 이것저것 쌓여 있는 것 아니신가요?」"

[[dialogue]]
speaker = "クロト"
original = "「う……実はここ１週間くらい……オナニーもしてなくて……」"
translation = "「윽…… 실은 최근 일주일 정도…… 자위도 못 해서……」"

[[dialogue]]
speaker = "マリオン"
original = "「ふふっ<emoji=heart04>\u3000それは大変です<emoji=heart04>\u3000会長様のケアは、恋人である私の務め――」"
translation = "「후훗<emoji=heart04> 그거 큰일이네요<emoji=heart04> 회장님의 케어는, 연인인 저의 의무――」"

[[dialogue]]
speaker = "マリオン"
original = "「今宵はゆっくり、私の部屋で、溜まったものを全部吐き出していってください<emoji=heart04>\u3000ご主人様<emoji=heart04>」"
translation = "「오늘 밤은 느긋하게, 제 방에서, 쌓인 것을 전부 쏟아내고 가 주세요<emoji=heart04> 주인님<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言われて、俺はマリオンからベッドに押し倒される。"
translation = "그런 말을 들으며, 나는 마리온에게 침대로 밀쳐진다."

[[dialogue]]
speaker = "マリオン"
original = "「うふふっ<emoji=heart04>\u3000ほら、ご主人様の大好きなおっぱいですよ～<emoji=heart04>」"
translation = "「우후훗<emoji=heart04> 자, 주인님이 제일 좋아하시는 가슴이에요~<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「それをこうして、おち○ちんをサンドイッチして……<emoji=heart04>\u3000むにゅっ<emoji=heart04>\u3000――いかがですか？」"
translation = "「그걸 이렇게, 자지를 샌드위치해서……<emoji=heart04> 뭉클<emoji=heart04> ――어떠신가요?」"

[[dialogue]]
speaker = "クロト"
original = "「うぁ……マリオンのおっぱい、相変わらず乳圧すご……！」"
translation = "「우아…… 마리온의 가슴, 여전한 압박감이 엄청나……!」"

[[dialogue]]
speaker = "マリオン"
original = "「んっ……<emoji=heart04>\u3000ふふっ<emoji=heart04>\u3000ご主人様のおち○ちん、みるみる大きくなってますよ<emoji=heart04>」"
translation = "「응……<emoji=heart04> 후훗<emoji=heart04> 주인님의 자지, 눈에 띄게 커지고 있어요<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「ご主人様のも、相変わらず私のおっぱいに収まらないくらいご立派です<emoji=heart04>\u3000思わず、うっとりしてしまいます……<emoji=heart04>\u3000はあぁ……<emoji=heart04>」"
translation = "「주인님 것도, 여전히 제 가슴에 다 담기지 않을 정도로 훌륭해요<emoji=heart04> 저도 모르게, 황홀해져 버려요……<emoji=heart04> 하아아……<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「パイズリでご奉仕する前に、ローションを塗っておきませんとね<emoji=heart04>\u3000そちらの方が気持ちよくなれますから……」"
translation = "「파이즈리로 봉사해 드리기 전에, 로션을 발라 둬야겠네요<emoji=heart04> 그편이 더 기분 좋아질 수 있으니까……」"

[[dialogue]]
speaker = "マリオン"
original = "「はい、谷間に垂らしますよ～。もちろん量はたっぷりと……<emoji=heart04>」"
translation = "「네, 골짜기에 떨어뜨릴게요~. 물론 양은 듬뿍……<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「それではおっぱいで塗っていきますね……<emoji=heart04>\u3000ぬっちゅ、ぬっちゅ<emoji=heart04>」"
translation = "「그럼 가슴으로 발라 드릴게요……<emoji=heart04> 눗쭈, 눗쭈<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「根元から先っぽまでしっかりと、いきわたるように……ぬりゅ、ぬりゅ<emoji=heart04>\u3000にゅっぷ、にゅっぷ<emoji=heart04>」"
translation = "「뿌리부터 끝부분까지 확실하게, 골고루 퍼지도록…… 누륫, 누륫<emoji=heart04> 뉴웁, 뉴웁<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「んっ……<emoji=heart04>\u3000ご主人様のおち○ちん、ビクビクと震えて……お可愛いですこと<emoji=heart04>\u3000ぬっちゅ、ぬっちゅ<emoji=heart04>」"
translation = "「응……<emoji=heart04> 주인님의 자지, 움찔움찔 떨면서…… 참 귀여우시기도 해라<emoji=heart04> 눗쭈, 눗쭈<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「久しぶりだから……これだけで気持ちよすぎて、もうイキそう……！」"
translation = "「오랜만이라…… 이것만으로도 너무 기분 좋아서, 벌써 갈 것 같아……!」"

[[dialogue]]
speaker = "マリオン"
original = "「まあまあ、うふふっ<emoji=heart04>\u3000おち○ちんの先っぽから天然のローションも沢山出てきておりますね……<emoji=heart04>\u3000ぬりゅ、ぬりゅ<emoji=heart04>」"
translation = "「자자, 우후훗<emoji=heart04> 자지 끝부분에서 천연 로션도 잔뜩 나오고 있네요……<emoji=heart04> 누륫, 누륫<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「もしかするとローションも要らなかったかも、なんて……<emoji=heart04>\u3000ふふっ<emoji=heart04>」"
translation = "「어쩌면 로션도 필요 없었을지도, 라니……<emoji=heart04> 후훗<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「ほら、おっぱいもおち○ちんも、ローションでぬちゅぬちゅになりましたよ<emoji=heart04>」"
translation = "「보세요, 가슴도 자지도, 로션으로 눅진눅진해졌어요<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「大変お待たせいたしました。それでは、ご主人様がいつも褒めてくださる私のおっぱいで、パイズリご奉仕させていただきますね<emoji=heart04>」"
translation = "「많이 기다리셨습니다. 그럼, 주인님이 항상 칭찬해 주시는 제 가슴으로, 파이즈리 봉사해 드릴게요<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「おっぱいをぎゅっとして……いきますよ～<emoji=heart04>\u3000はい――っ<emoji=heart04>」"
translation = "「가슴을 꽉 모아서…… 갑니다~<emoji=heart04> 자――앗<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「ぱっちゅ、ぱっちゅ<emoji=heart04>\u3000にゅっぽ、にゅっぽ<emoji=heart04>」"
translation = "「팟쭈, 팟쭈<emoji=heart04> 늅포, 늅포<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「ふふっ……<emoji=heart04>\u3000ご主人様、お可愛い喘ぎ声が出てますよ？」"
translation = "「후훗……<emoji=heart04> 주인님, 귀여운 신음소리가 나오고 있다고요?」"

[[dialogue]]
speaker = "マリオン"
original = "「そんなに気持ちいいんですか？\u3000にゅっぷ、にゅっぷ<emoji=heart04>\u3000ちゅっぽ、ちゅっぽ<emoji=heart04>」"
translation = "「그렇게 기분 좋으신가요? 뉴웁, 뉴웁<emoji=heart04> 츄웁, 츄웁<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「うふふっ<emoji=heart04>\u3000感じてらっしゃる顔、お可愛らしいですこと<emoji=heart04>\u3000私、ますます気持ちよくして差し上げたくなっちゃいます……<emoji=heart04>」"
translation = "「우후훗<emoji=heart04> 느끼고 계신 얼굴, 참 귀여우시기도 해라<emoji=heart04> 저, 점점 더 기분 좋게 해 드리고 싶어져 버려요……<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「ほら、ご主人様のおち○ちんが出たり入ったり<emoji=heart04>\u3000ぱっちゅ、ぱっちゅ<emoji=heart04>\u3000にゅっぽ、にゅっぽ<emoji=heart04>\u3000にゅっぷ、にゅっぷ<emoji=heart04>\u3000ちゅっぽ、ちゅっぽ<emoji=heart04>」"
translation = "「보세요, 주인님의 자지가 들락날락<emoji=heart04> 팟쭈, 팟쭈<emoji=heart04> 늅포, 늅포<emoji=heart04> 뉴웁, 뉴웁<emoji=heart04> 츄웁, 츄웁<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「うあぁ……マリオン、ヤバい……！\u3000おっぱい気持ちよくて、本当にもうイっちゃう……！」"
translation = "「우아아…… 마리온, 위험해……! 가슴 너무 기분 좋아서, 진짜 이제 가버려……!」"

[[dialogue]]
speaker = "マリオン"
original = "「我慢などなさらず、気持ちいいのに任せていいのですよ<emoji=heart04>\u3000ほら、ぱっちゅ、ぱっちゅ<emoji=heart04>\u3000にゅっぽ、にゅっぽ<emoji=heart04>」"
translation = "「참지 마시고, 기분 좋은 것에 몸을 맡기시면 된답니다<emoji=heart04> 자, 팟쭈, 팟쭈<emoji=heart04> 늅포, 늅포<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「っ……マリオン、イク、イクイクイク……！」"
translation = "「윽…… 마리온, 가, 가버려 가버려……!」"

[[dialogue]]
speaker = "マリオン"
original = "「はい、どうぞ、おイキになってください<emoji=heart04>\u3000私に、ご主人様のお可愛いイキ顔、見せてくださいまし<emoji=heart04>」"
translation = "「네, 어서, 가버려 주세요<emoji=heart04> 제게, 주인님의 귀여운 절정 얼굴을 보여주세요<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「お手伝いいたしますね<emoji=heart04>\u3000おっぱいで強くぎゅっとして……絞り出すように<emoji=heart04>」"
translation = "「도와드릴게요<emoji=heart04> 가슴으로 강하게 꽉 조여서…… 짜내듯이<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「ぱっちゅ、ぱっちゅ<emoji=heart04>\u3000じゅっぽ、じゅっぽ<emoji=heart04>\u3000ぱっちゅ、ぱっちゅ<emoji=heart04>\u3000じゅっぽ、じゅっぽ――<emoji=heart04>」"
translation = "「팟쭈, 팟쭈<emoji=heart04> 쥬웁, 쥬웁<emoji=heart04> 팟쭈, 팟쭈<emoji=heart04> 쥬웁, 쥬웁――<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「うああぁっ……出るっ！！！」"
translation = "「우아아앗…… 나온다!!!」"

[[dialogue]]
speaker = "マリオン"
original = "「あんっ<emoji=heart04>\u3000おっぱいの中で、おち○ちんビクビク暴れてます<emoji=heart04>」"
translation = "「앙<emoji=heart04> 가슴 안에서, 자지가 움찔움찔 날뛰고 있어요<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「はぁ……はぁ……あ、あれ？\u3000確かにイったはずなのに……精液が出ない……？」"
translation = "「하아…… 하아…… 어, 어라? 분명히 갔을 텐데…… 정액이 안 나와……?」"

[[dialogue]]
speaker = "マリオン"
original = "「うふふっ<emoji=heart04>\u3000お気づきになりましたか？」"
translation = "「우후훗<emoji=heart04> 눈치채셨나요?」"

[[dialogue]]
speaker = "マリオン"
original = "「それだけじゃなく、イった後も気持ちいいのが続いておりますでしょう？\u3000むしろ、イったところから更に、快楽が上乗せされて……ふふっ<emoji=heart04>」"
translation = "「그뿐만 아니라, 간 뒤에도 기분 좋은 게 계속되고 있죠? 오히려, 간 지점부터 더욱, 쾌락이 덧씌워져서…… 후훗<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「その戸惑いながらも感じてる顔、実にお可愛いですこと<emoji=heart04>\u3000ふうぅ……<emoji=heart04>\u3000私もおま○こがキュンとしてきてしまいます……<emoji=heart04>」"
translation = "「그 당황하면서도 느끼고 있는 얼굴, 정말 귀여우시네요<emoji=heart04> 후우……<emoji=heart04> 저도 보지가 큥 하고 울려 버려요……<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「実は、おち○ちんにちょっとした<b>仕掛け</b>をさせていただいたのです。絶頂しても、射精ができないように<emoji=heart04>」"
translation = "「사실은, 자지에 약간의 <b>장치</b>를 해 두었답니다. 절정해도, 사정을 할 수 없도록<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「簡単に申しますと、ご主人様は今、絶頂がチャージされている状態なのです」"
translation = "「간단히 말씀드리면, 주인님은 지금 절정이 차지되고 있는 상태인 거예요」"

[[dialogue]]
speaker = "マリオン"
original = "「――どんな術を使ったならそうなるのかって？\u3000ふふっ、その秘密については、また別の機会に<emoji=heart04>」"
translation = "「――어떤 술법을 썼길래 그렇게 되냐고요? 후훗, 그 비밀에 대해서는 다음에 또 기회가 되면<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「そんなことより今は、気持ちいいのが溜まっていく感覚をご堪能くださいませ<emoji=heart04>\u3000ほら、ぱっちゅ、ぱっちゅ<emoji=heart04>\u3000にゅっぽ、にゅっぽ<emoji=heart04>」"
translation = "「그런 것보다 지금은, 기분 좋은 것이 쌓여가는 감각을 만끽해 주세요<emoji=heart04> 자, 팟쭈, 팟쭈<emoji=heart04> 늅포, 늅포<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「この術の優れているところは、絶頂をチャージしながらも、段階を迎える度にイク感覚は味わえるという点です」"
translation = "「이 술법의 뛰어난 점은, 절정을 차지하면서도, 단계를 맞이할 때마다 가는 감각은 맛볼 수 있다는 점이에요」"

[[dialogue]]
speaker = "マリオン"
original = "「それでいて、イったところまでをセーブポイントとして、快楽はそこから更に１段階、また１段階と上乗せされていきます」"
translation = "「그러면서도, 간 지점까지를 세이브 포인트 삼아, 쾌락은 거기서부터 다시 1단계, 또 1단계 덧씌워져 갑니다」"

[[dialogue]]
speaker = "マリオン"
original = "「その感覚は……ちょうど今、ご主人様に味わっていただけてるかと<emoji=heart04>\u3000いいかがです？\u3000にゅっぷ、にゅっぷ<emoji=heart04>\u3000ちゅっぽ、ちゅっぽ<emoji=heart04>」"
translation = "「그 감각은…… 마침 지금, 주인님이 맛보고 계실 텐데<emoji=heart04> 어떠신가요? 뉴웁, 뉴웁<emoji=heart04> 츄웁, 츄웁<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「こ、これヤバい……気持ちいい……」"
translation = "「이, 이거 장난 아냐…… 기분 좋아……」"

[[dialogue]]
speaker = "マリオン"
original = "「ふふっ<emoji=heart04>\u3000お気に召していただけてるようで何より<emoji=heart04>\u3000では、次は……<emoji=heart04>」"
translation = "「후훗<emoji=heart04> 마음에 들어 하시는 것 같아 다행이네요<emoji=heart04> 그럼, 다음은……<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「んっ……ちゅっ……<emoji=heart04>\u3000おっぱいと一緒に、お口の方でも、ご奉仕させていただきますね……<emoji=heart04>\u3000ちゅっ……れろっ……ちゅぷぷっ……<emoji=heart04>」"
translation = "「음…… 츄……<emoji=heart04> 가슴과 함께, 입으로도, 봉사해 드릴게요……<emoji=heart04> 츄…… 레로…… 츄푸푸……<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「んむっ……<emoji=heart04>\u3000ちゅっ……ちゅぷっ……ちゅれろっ……ちゅるるっ……ちゅぱっ……<emoji=heart04>」"
translation = "「음무……<emoji=heart04> 츄…… 츄푸…… 츄레로…… 츄루루…… 츄파……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「マ、マリオン……そんな亀頭を責められたら……チャージで気持ちよすぎて、また……！」"
translation = "「마, 마리온…… 그런 귀두를 공략당하면…… 차지 때문에 너무 기분 좋아서, 또……!」"

[[dialogue]]
speaker = "マリオン"
original = "「んふっ……<emoji=heart04>\u3000ご主人様、イってください……んむっ<emoji=heart04>」"
translation = "「음후……<emoji=heart04> 주인님, 가버리세요…… 음무<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「じゅぷっ<emoji=heart04>\u3000じゅるるっ……れろちゅっ<emoji=heart04>\u3000じゅっぽ、じゅっぽ<emoji=heart04>\u3000れろれろっ<emoji=heart04>\u3000じゅるるるっ――<emoji=heart04>」"
translation = "「쥬푸<emoji=heart04> 쥬루루…… 레로츄<emoji=heart04> 쥬포, 쥬포<emoji=heart04> 레로레로<emoji=heart04> 쥬루루루――<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「あああぁっ<emoji=heart04>\u3000もうイクイク、イク―――っ！！！」"
translation = "「아아아앗<emoji=heart04> 이제 가, 가버려, 가버려어어―――!!!」"

[[dialogue]]
speaker = "マリオン"
original = "「んぶっ<emoji=heart04>\u3000……ぷはぁっ<emoji=heart04>\u3000ふふっ、これで２回目ですね……<emoji=heart04>」"
translation = "「음부<emoji=heart04> ……푸하아<emoji=heart04> 후후, 이걸로 2회째네요……<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「ご主人様、更に１段階上乗せされた快楽はいかがですか？\u3000ぱっちゅ、ぱっちゅ<emoji=heart04>\u3000にゅっぽ、にゅっぽ<emoji=heart04>」"
translation = "「주인님, 한 단계 더 얹어진 쾌락은 어떠신가요? 팟츄, 팟츄<emoji=heart04> 뉴포, 뉴포<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「あぁっ<emoji=heart04>\u3000パイズリの１回１回がすごく気持ちいいっ……<emoji=heart04>\u3000気持ちよすぎて、おかしくなりそう……<emoji=heart04>」"
translation = "「아앗<emoji=heart04> 파이즈리 한 번 한 번이 너무 기분 좋아……<emoji=heart04> 너무 기분 좋아서, 이상해질 것 같아……<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「まあまあ、そんな淫らにとろけた顔をされて……<emoji=heart04>\u3000ご主人様のお可愛さに、私、興奮が抑えられなくなってしまいます……<emoji=heart04>\u3000んっ……<emoji=heart04>」"
translation = "「어머어머, 그렇게 음란하게 녹아내린 얼굴을 하시고……<emoji=heart04> 주인님의 귀여움에, 저, 흥분을 억누를 수 없게 되어버려요……<emoji=heart04> 음……<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「もっと感じてくださいまし<emoji=heart04>\u3000どうか、私で気持ちよくなって……<emoji=heart04>\u3000にゅっぷ、にゅっぷ<emoji=heart04>\u3000ちゅっぽ、ちゅっぽ<emoji=heart04>」"
translation = "「더 느껴주세요<emoji=heart04> 부디, 저로 기분 좋아져서……<emoji=heart04> 뉴푸, 뉴푸<emoji=heart04> 츄포, 츄포<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「はあぁっ……<emoji=heart04>\u3000ぱっちゅ、ぱっちゅ<emoji=heart04>\u3000ちゅっぽ、ちゅっぽ<emoji=heart04>\u3000ちゅっぷ、ちゅっぷ<emoji=heart04>\u3000にゅっぽ、にゅっぽ<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 팟츄, 팟츄<emoji=heart04> 츄포, 츄포<emoji=heart04> 츄푸, 츄푸<emoji=heart04> 뉴포, 뉴포<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ま、マリオン……ダメだっ<emoji=heart04>\u3000こ、これ以上気持ちよくなったら、本当におかしくなる<emoji=heart04>\u3000ちゃんとイカせてぇ<emoji=heart04>」"
translation = "「마, 마리온…… 안 돼<emoji=heart04> 이, 이상 기분 좋아지면, 정말로 이상해져<emoji=heart04> 제대로 가게 해줘어<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「ああ<emoji=heart04>\u3000ご主人様、お可愛い……<emoji=heart04>\u3000そんな、女の子みたいにお可愛くおねだりされて……<emoji=heart04>」"
translation = "「아아<emoji=heart04> 주인님, 귀여워라……<emoji=heart04> 그렇게, 여자아이처럼 귀엽게 조르시다니……<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「んっ<emoji=heart04>\u3000ふうぅ……<emoji=heart04>\u3000わ、私も興奮しすぎて、おま○こ少しイってしまいました……<emoji=heart04>\u3000愛液でショーツがぐちょぐちょになっちゃってます……<emoji=heart04>」"
translation = "「음<emoji=heart04> 후우……<emoji=heart04> 저, 저도 너무 흥분해서, 보지 조금 가버리고 말았어요……<emoji=heart04> 애액으로 팬티가 축축해져 버렸네요……<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「はあぁ……<emoji=heart04>\u3000でも……せっかくなのですから、最高に気持ちよく射精したくはありませんか？\u3000なにしろ、絶頂をチャージしているわけですから――」"
translation = "「하아아……<emoji=heart04> 하지만…… 기왕 하는 거니까, 최고로 기분 좋게 사정하고 싶지 않으신가요? 어쨌든, 절정을 차지하고 있는 중이니까요――」"

[[dialogue]]
speaker = "マリオン"
original = "「解放される時の射精は、溜めた分の絶頂も一気にやってきます<emoji=heart04>\u3000それはもう、天国に昇るような気持ちよさかと<emoji=heart04>」"
translation = "「해방될 때의 사정은, 쌓인 만큼의 절정도 단번에 밀려온답니다<emoji=heart04> 그건 정말, 천국에 오르는 듯한 기분일 거예요<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「ですから、５回……<emoji=heart04>\u3000５回目の絶頂で射精をいたしましょう<emoji=heart04>」"
translation = "「그러니까, 5번……<emoji=heart04> 5번째 절정에서 사정하도록 하죠<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ご、５回も気持ちいいの上乗せなんて……はあぁ……<emoji=heart04>\u3000そ、そんなの……うっ<emoji=heart04>」"
translation = "「다, 다섯 번이나 기분 좋은 게 얹어진다니…… 하아아……<emoji=heart04> 그, 그런 거…… 윽<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ヤバッ……ま、またくるっ<emoji=heart04>\u3000イク、イクイクイク<emoji=heart04>\u3000うあぁっ―――<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「위험해…… 또, 또 온다<emoji=heart04> 가, 가버려, 가버려가버려가버려<emoji=heart04> 으아아―――<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「ふふっ<emoji=heart04>\u3000これで３回目……<emoji=heart04>\u3000あと２回です<emoji=heart04>」"
translation = "「후후<emoji=heart04> 이걸로 3회째……<emoji=heart04> 앞으로 2번 남았어요<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「んっ<emoji=heart04>\u3000ご主人様、そんな涙を浮かべて、切なそうな顔をなさらないで<emoji=heart04>\u3000私、堪らず興奮してしまいます<emoji=heart04>」"
translation = "「응<emoji=heart04> 주인님, 그런 눈물을 머금고 애처로운 표정 짓지 말아 주세요<emoji=heart04> 저, 참지 못하고 흥분해 버린답니다<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「大丈夫です<emoji=heart04>\u3000ご主人様がどれだけ淫らな姿をお見せになっても、私はあなた様を愛していますから<emoji=heart04>」"
translation = "「괜찮아요<emoji=heart04> 주인님이 아무리 음란한 모습을 보이셔도, 저는 당신을 사랑하고 있으니까요<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「だからどうか、安心して気持ちよさに身をゆだねてくださいませ<emoji=heart04>\u3000……ちゅっ<emoji=heart04>」"
translation = "「그러니 부디, 안심하고 기분 좋음에 몸을 맡겨 주세요<emoji=heart04> ……쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マリオンは愛おしそうに、ペニスの先っぽにキスをして――"
translation = "마리온은 사랑스럽다는 듯이, 자지 끝부분에 키스를 하고――"

[[dialogue]]
speaker = "マリオン"
original = "「あと２回だけ、射精を我慢してくださいまし<emoji=heart04>\u3000それでは、いきますよ――んっ<emoji=heart04>」"
translation = "「앞으로 딱 2번만, 사정을 참아 주시옵소서<emoji=heart04> 그럼, 갑니다요――응<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「ぱっちゅぱっちゅぱっちゅ<emoji=heart04>\u3000じゅっぷじゅっぷじゅっぷ<emoji=heart04>\u3000にゅっぽにゅっぽにゅっぽ<emoji=heart04>\u3000ちゅっぷちゅっぷちゅっぷ<emoji=heart04>」"
translation = "「빱츗빱츗빱츗<emoji=heart04> 쥬웁쥬웁쥬웁<emoji=heart04> 늅뽀늅뽀늅뽀<emoji=heart04> 츕푸츕푸츕푸<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ま、マリオン……うあぁっ<emoji=heart04>\u3000すごく気持ちいいっ<emoji=heart04>」"
translation = "「마, 마리온…… 으아아<emoji=heart04> 너무 기분 좋아<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「うふふっ<emoji=heart04>\u3000腰が浮くほど、感じられて<emoji=heart04>\u3000お可愛いですこと<emoji=heart04>\u3000ぱっちゅぱっちゅぱっちゅ<emoji=heart04>\u3000じゅっぽじゅっぽじゅっぽ<emoji=heart04>」"
translation = "「우후후<emoji=heart04> 허리가 들릴 정도로 느끼시다니<emoji=heart04> 귀여우시기도 해라<emoji=heart04> 빱츗빱츗빱츗<emoji=heart04> 쥬웁쥬웁쥬웁<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「はあぁっ<emoji=heart04>\u3000ご主人様、そんな気持ちいいと連呼されて<emoji=heart04>\u3000私、もっと激しく愛したくなってしまいます<emoji=heart04>」"
translation = "「하아아<emoji=heart04> 주인님, 그렇게 기분 좋다고 연호하시면<emoji=heart04> 저, 좀 더 격렬하게 사랑하고 싶어져 버려요<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「ほら、にゅっぷにゅっぷにゅっぷ<emoji=heart04>\u3000じゅっぷじゅっぷじゅっぷ<emoji=heart04>\u3000じゅっぽじゅっぽじゅっぽ<emoji=heart04>\u3000ぱっちゅぱっちゅぱっちゅ<emoji=heart04>」"
translation = "「자, 늅뿌늅뿌늅뿌<emoji=heart04> 쥬웁쥬웁쥬웁<emoji=heart04> 쥬웁뽀쥬웁뽀쥬웁뽀<emoji=heart04> 빱츗빱츗빱츗<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「うふふっ<emoji=heart04>\u3000ここから更に高速パイズリいきますよ～<emoji=heart04>\u3000せ～のっ<emoji=heart04>」"
translation = "「우후후<emoji=heart04> 여기서부터 더욱 고속 파이즈리 갑니다~<emoji=heart04> 하나~ 둘! <emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「ぱちゅぱちゅぱちゅぱちゅっ<emoji=heart04>\u3000じゅぷじゅぷじゅぷじゅぷっ<emoji=heart04>\u3000にゅぽにゅぽにゅぽにゅぽっ<emoji=heart04>\u3000ちゅぷちゅぷちゅぷちゅぷっ<emoji=heart04>」"
translation = "「파츄파츄파츄파츄<emoji=heart04> 쥬푸쥬푸쥬푸쥬푸<emoji=heart04> 뉴포뉴포뉴포뉴포<emoji=heart04> 츄푸츄푸츄푸츄푸<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「――激しくておかしくなっちゃう？\u3000なら、もっと激しくいたしませんと<emoji=heart04>」"
translation = "「――격렬해서 이상해져 버릴 것 같나요? 그렇다면, 더욱 격렬하게 해드려야겠네요<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「ぱちゅぱちゅぱちゅぱちゅっ<emoji=heart04>\u3000ちゅぽちゅぽちゅぽちゅぽっ<emoji=heart04>\u3000にゅぷにゅぷにゅぷにゅぷっ<emoji=heart04>\u3000じゅぽじゅぽじゅぽじゅぽっ<emoji=heart04>」"
translation = "「파츄파츄파츄파츄<emoji=heart04> 츄포츄포츄포츄포<emoji=heart04> 뉴푸뉴푸뉴푸뉴푸<emoji=heart04> 쥬포쥬포쥬포쥬포<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「んふぅっ<emoji=heart04>\u3000ご主人様の感じて乱れる顔、お可愛いっ<emoji=heart04>\u3000食べたくなっちゃいますっ<emoji=heart04>」"
translation = "「응후으<emoji=heart04> 주인님께서 느끼며 흐트러지는 얼굴, 참 귀여우셔라<emoji=heart04> 잡아먹고 싶어지네요<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「おち○ちん、あ～んっ<emoji=heart04>\u3000んむっ<emoji=heart04>」"
translation = "「자지, 아~앙<emoji=heart04> 응무<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「ちゅっ<emoji=heart04>\u3000んぶっ<emoji=heart04>\u3000じゅっぽじゅっぽじゅっぽ<emoji=heart04>\u3000じゅるるっ<emoji=heart04>\u3000れるれるっ<emoji=heart04>\u3000ぢゅっぱぢゅっぱぢゅっぱ<emoji=heart04>\u3000じゅっぽじゅっぽじゅっぽ<emoji=heart04>\u3000じゅるるるっ<emoji=heart04>」"
translation = "「츄<emoji=heart04> 응부<emoji=heart04> 쥬포쥬포쥬포<emoji=heart04> 쥬르르<emoji=heart04> 레로레로<emoji=heart04> 쥬파쥬파쥬파<emoji=heart04> 쥬포쥬포쥬포<emoji=heart04> 쥬르르르<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「あああっ<emoji=heart04>\u3000マリオンッ<emoji=heart04>\u3000今そんな激しくフェラされたらぁっ<emoji=heart04>」"
translation = "「아아앗<emoji=heart04> 마리온! 지금 그렇게 격렬하게 펠라하면으윽<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「んふっ<emoji=heart04>\u3000きちゃいますか？\u3000んちゅっ<emoji=heart04>\u3000どうぞイってくださいまし<emoji=heart04>」"
translation = "「응후<emoji=heart04> 와버리나요? 응츄<emoji=heart04> 어서 가버리시지요<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「んぶっ<emoji=heart04>\u3000れろちゅっ<emoji=heart04>\u3000じゅぽっじゅぽっじゅぽじゅぽっ<emoji=heart04>\u3000れるれるっ<emoji=heart04>\u3000じゅぷっじゅぷっじゅぷっじゅぷっ<emoji=heart04>\u3000じゅるっ<emoji=heart04>\u3000じゅるるるるっ<emoji=heart04>」"
translation = "「응부<emoji=heart04> 레로츄<emoji=heart04> 쥬포쥬포쥬포쥬포<emoji=heart04> 레로레로<emoji=heart04> 쥬푸쥬푸쥬푸쥬푸<emoji=heart04> 쥬르<emoji=heart04> 쥬르르르르<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「じゅぱじゅぱじゅぱじゅぱっ<emoji=heart04>\u3000じゅぽじゅぽじゅぽじゅぽっ――<emoji=heart04>」"
translation = "「쥬파쥬파쥬파쥬파<emoji=heart04> 쥬포쥬포쥬포쥬포――<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「イクイクイクイク、イっ―――<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「간다간다간다간다, 가버렷―――<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「ぷはぁっ<emoji=heart04>\u3000これで４回目<emoji=heart04>」"
translation = "「푸하아<emoji=heart04> 이걸로 4회째<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「さあ、ご主人様、このまま一気に５回目です<emoji=heart04>\u3000あとはもう気持ちよく射精するだけですよ<emoji=heart04>」"
translation = "「자, 주인님, 이대로 단숨에 5회째예요<emoji=heart04> 나머지는 이제 기분 좋게 사정할 뿐이랍니다<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「最後の高速パイズリ、ご堪能くださいませ<emoji=heart04>\u3000それでは、いきますよ～？\u3000せ～のっ<emoji=heart04>」"
translation = "「마지막 고속 파이즈리, 마음껏 만끽해 주시옵소서<emoji=heart04> 그럼, 갑니다~? 하나~ 둘<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「ぱちゅぱちゅぱちゅぱちゅっ<emoji=heart04>\u3000じゅぷじゅぷじゅぷじゅぷっ<emoji=heart04>\u3000にゅぽにゅぽにゅぽにゅぽっ<emoji=heart04>\u3000ちゅぷちゅぷちゅぷちゅぷっ<emoji=heart04>」"
translation = "「파츄파츄파츄파츄<emoji=heart04> 쥬푸쥬푸쥬푸쥬푸<emoji=heart04> 뉴포뉴포뉴포뉴포<emoji=heart04> 츄푸츄푸츄푸츄푸<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「うあああぁっ<emoji=heart04>\u3000マリオンッ<emoji=heart04>\u3000マリオンッ<emoji=heart04><emoji=heart04>」"
translation = "「우아아아앗<emoji=heart04> 마리온! 마리온!<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「はい、ご主人様<emoji=heart04>\u3000大丈夫です、マリオンはここにいますよ<emoji=heart04>\u3000ぱちゅぱちゅぱちゅぱちゅっ<emoji=heart04>\u3000じゅぽじゅぽじゅぽじゅぽっ<emoji=heart04>」"
translation = "「네, 주인님<emoji=heart04> 괜찮아요, 마리온은 여기 있답니다<emoji=heart04> 파츄파츄파츄파츄<emoji=heart04> 쥬포쥬포쥬포쥬포<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「ほら、おっぱいでぎゅっとしてますから<emoji=heart04>\u3000にゅぷにゅぷにゅぷにゅぷっ<emoji=heart04>\u3000じゅぷじゅぷじゅぷじゅぷっ<emoji=heart04>」"
translation = "「봐요, 가슴으로 꽉 안아주고 있으니까요<emoji=heart04> 뉴푸뉴푸뉴푸뉴푸<emoji=heart04> 쥬푸쥬푸쥬푸쥬푸<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「もうイキたいのですか？\u3000あとちょっと、ギリギリまで我慢してくださいまし<emoji=heart04>\u3000ぱちゅぱちゅぱちゅぱちゅっ<emoji=heart04>\u3000にゅぽにゅぽにゅぽにゅぽっ<emoji=heart04>」"
translation = "「벌써 가고 싶으신 건가요? 조금만 더, 한계까지 참아주시지요<emoji=heart04> 파츄파츄파츄파츄<emoji=heart04> 뉴포뉴포뉴포뉴포<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「ほら、いよいよチャージを解放しますよ<emoji=heart04>\u3000タマタマから精液がどんどん登ってきてるの、わかりますか？」"
translation = "「자, 드디어 차지를 해방할게요<emoji=heart04> 불알에서 정액이 점점 올라오고 있는 거, 느껴지시나요?」"

[[dialogue]]
speaker = "マリオン"
original = "「おち○ちんがぱんぱんに膨らんでます<emoji=heart04>\u3000まだです<emoji=heart04>\u3000まだ堪えてください<emoji=heart04>」"
translation = "「자지가 팽팽하게 부풀어 올랐어요<emoji=heart04> 아직이에요<emoji=heart04> 조금 더 견뎌주세요<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「気持ちいいの、ギリギリまで溜めてください<emoji=heart04>\u3000そう、ギリギリまで――」"
translation = "「기분 좋은 거, 한계까지 모아주세요<emoji=heart04> 그래요, 한계까지――」"

[[dialogue]]
speaker = "クロト"
original = "「もうダメだっ<emoji=heart04>\u3000出る<emoji=heart04>\u3000でるでるでるでるっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「이제 한계다! 나온다! 나와나와나와나와앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「長らくお待たせいたしました、ご主人様<emoji=heart04>\u3000それじゃあ、私の３カウントでお射精にいたしましょう<emoji=heart04>」"
translation = "「오래 기다리셨습니다, 주인님<emoji=heart04> 그럼, 저의 셋 카운트에 맞춰 사정하도록 하죠<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「いきますよ<emoji=heart04>\u3000３……２……１――」"
translation = "「갑니다<emoji=heart04> 3…… 2…… 1――」"

[[dialogue]]
speaker = "マリオン"
original = "「チャージ解放<emoji=heart04><emoji=heart04>\u3000どっぴゅんっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「차지 해방<emoji=heart04><emoji=heart04> 도큥!<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「っ……うあああああああああぁぁぁ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「윽…… 우아아아아아아아아아아아아아아악~~~~~~~~~!<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「あぁんっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000チャージ５回分の大量射精、すごいぃ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아앙<emoji=heart04><emoji=heart04><emoji=heart04> 차지 5회분의 대량 사정, 굉장해애~~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「はあぁっ<emoji=heart04>\u3000ご主人様のおち○ちん、嬉しそうにどぴゅどぴゅって射精止まりません<emoji=heart04>」"
translation = "「하아<emoji=heart04> 주인님의 자지, 기쁜 듯이 뷰릇뷰릇 사정이 멈추질 않아요<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「んふうぅ……<emoji=heart04>\u3000私、ご主人様の匂いで、溺れてしまいそうです……<emoji=heart04>」"
translation = "「응후우……<emoji=heart04> 저, 주인님의 냄새에 익사해 버릴 것 같아요……<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「んっ……<emoji=heart04>\u3000ようやく射精が止まりましたね……<emoji=heart04>\u3000ふふっ<emoji=heart04>\u3000ご主人様の最後のイキ顔が可愛すぎて、私も興奮でまたイってしまいました……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 겨우 사정이 멈췄네요……<emoji=heart04> 후훗<emoji=heart04> 주인님의 마지막 가버리는 얼굴이 너무 귀여워서, 저도 흥분해서 또 가버리고 말았답니다……<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「って、あれ？\u3000ご、ご主人様……？\u3000会長様、大丈夫ですか！？」"
translation = "「어라? 주, 주인님……? 회장님, 괜찮으세요!?」"

[[dialogue]]
speaker = "クロト"
original = "「……んっ？\u3000あ、ああ……ごめん」"
translation = "「……응? 아, 아아…… 미안」"

[[dialogue]]
speaker = "クロト"
original = "「あまりに気持ちがよすぎて……ちょっと意識が飛んでたみたい」"
translation = "「너무 기분이 좋아서…… 잠깐 의식이 날아갔던 것 같아」"

[[dialogue]]
speaker = "マリオン"
original = "「ほっ……よかった。会長様、申し訳ございません……」"
translation = "「휴…… 다행이다. 회장님, 죄송합니다……」"

[[dialogue]]
speaker = "マリオン"
original = "「久しぶりのエッチでしたので、私も興奮してしまって……会長様があまりにお可愛くて……やりすぎてしまいました」"
translation = "「오랜만의 섹스였기에 저도 흥분해 버려서…… 회장님이 너무나 귀여우셔서…… 과하게 해버렸네요」"

[[dialogue]]
speaker = "クロト"
original = "「ああ……っ、今動かすのは……うくっ……！」"
translation = "「아아……윽, 지금 움직이는 건…… 우윽……!」"

[[dialogue]]
speaker = "マリオン"
original = "「あらあら……うふふっ<emoji=heart04>\u3000アレだけイッておいて、まだひょっとして、もう１回のおねだり、ですか？」"
translation = "「어머어머…… 우후후<emoji=heart04> 그렇게 가버려 놓고, 아직 설마 한 번 더 해달라는 조르기인가요?」"

[[dialogue]]
speaker = "クロト"
original = "「ちが……っ、くふぅ……！」"
translation = "「아니……윽, 쿠후윽……!」"

[[dialogue]]
speaker = "マリオン"
original = "「失神しそうになるくらい気持ちいいというならば、いざ失神するまでしてみたら、どれほど気持ちがいいんでしょうねぇ……？」"
translation = "「실신할 정도로 기분 좋다고 하신다면, 정작 실신할 때까지 해보면 얼마나 기분이 좋을까요……?」"

[[dialogue]]
speaker = "マリオン"
original = "「私……俄然、興味が湧いてきてしまいました……<emoji=heart04>」"
translation = "「저…… 갑자기 흥미가 생겨버렸어요……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ああ……っ、まだ敏感なのに……ぃっ……！\u3000これ以上は無理……っ！」"
translation = "「아아……윽, 아직 예민한데……에윽……! 더 이상은 무리……윽!」"

[[dialogue]]
speaker = "マリオン"
original = "「あっ……<emoji=heart04>\u3000まあまあ、うふふっ<emoji=heart04>\u3000無理とか言っておきながら、会長様のおち○ちん、もう復活なされて……<emoji=heart04>」"
translation = "「앗……<emoji=heart04> 자자, 우후후<emoji=heart04> 무리라고 말하시면서도 회장님의 자지, 벌써 부활하시고선……<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「早く気絶しちゃうくらい気持ちよくなりたいんですね……<emoji=heart04>\u3000それじゃあ……もっとパイズリしてあげます<emoji=heart04>\u3000ご主人様……<emoji=heart04>」"
translation = "「빨리 기절할 정도로 기분 좋아지고 싶으신 거군요……<emoji=heart04> 그럼…… 더 파이즈리 해드릴게요<emoji=heart04> 주인님……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その後、結局俺は何度も絶頂を強いられ、意識を飛ばしてしまうくらいの快楽と幸せを感じるのであった――"
translation = "그 후, 결국 나는 몇 번이고 절정을 강요당해 의식을 잃을 정도의 쾌락과 행복을 느끼는 것이었다――"

[[dialogue]]
speaker = "マリオン"
original = "「はぁ…………<emoji=heart04>\u3000ふぅ…………<emoji=heart04>\u3000ん…………<emoji=heart04>\u3000ふぅ…………<emoji=heart04>\u3000はぁ…………<emoji=heart04>\u3000ふぅ…………<emoji=heart04>\u3000んんっ…………<emoji=heart04>\u3000はぁ…………<emoji=heart04>\u3000ふぅ…………<emoji=heart04>\u3000ふふ…………<emoji=heart04>」"
translation = "「하아…………<emoji=heart04> 후으…………<emoji=heart04> 응…………<emoji=heart04> 후으…………<emoji=heart04> 하아…………<emoji=heart04> 후으…………<emoji=heart04> 응응…………<emoji=heart04> 하아…………<emoji=heart04> 후으…………<emoji=heart04> 후후…………<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「んっ……<emoji=heart04>\u3000はあぁ……<emoji=heart04>\u3000ふうぅ……<emoji=heart04>\u3000んんっ……<emoji=heart04>\u3000はあぁっ……<emoji=heart04>\u3000ふうぅっ……<emoji=heart04>\u3000あっ……<emoji=heart04>\u3000はあぁっ……<emoji=heart04>\u3000んうぅっ……<emoji=heart04>\u3000はぁ……<emoji=heart04>\u3000ふぅ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 하아아……<emoji=heart04> 후우으……<emoji=heart04> 응응……<emoji=heart04> 하아아앗……<emoji=heart04> 후우으으……<emoji=heart04> 앗……<emoji=heart04> 하아아앗……<emoji=heart04> 응우으으……<emoji=heart04> 하아……<emoji=heart04> 후으……<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「はぁっ、はぁっ、んっ、はあぁっ……<emoji=heart04>\u3000んっ、はぁっ、はぁっ、ふうぅっ……<emoji=heart04>\u3000んっ、んっ、ふぅっ、はあぁっ<emoji=heart04>\u3000ふぅっ、ふぅっ、はあぁっ<emoji=heart04>\u3000んんっ、ふうぅ……っ<emoji=heart04>」"
translation = "「하앗, 하앗, 응, 하아아앗……<emoji=heart04> 응, 하앗, 하앗, 후우으으……<emoji=heart04> 응, 응, 후으, 하아아앗<emoji=heart04> 후으, 후으, 하아아앗<emoji=heart04> 응응, 후우으……윽<emoji=heart04>」"

