[[dialogue]]
speaker = "unk"
original = "大聖堂カフェテリアに突然現れた異様な存在に、生徒たちはざわめいていた――"
translation = "대성당 카페테리아에 갑자기 나타난 이형의 존재에 학생들은 술렁이고 있었다──"

[[dialogue]]
speaker = "？？？"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「なんかゴーレムっぽいのが出たわ！」"
translation = "「왠지 골렘 같은 게 나왔어!」"

[[dialogue]]
speaker = "男子生徒"
original = "「うわっ、テーブルをなぎ倒しながら、こっちに歩いてくるぞ！？」"
translation = "「우와, 테이블을 들이받으면서 이쪽으로 걸어온다!?」"

[[dialogue]]
speaker = "女子生徒"
original = "「両腕を振り上げてるけど、大丈夫なのアレ！？」"
translation = "「양팔을 치켜들고 있는데 저거 괜찮은 거야!?」"

[[dialogue]]
speaker = "unk"
original = "とりあえず止めないと！"
translation = "일단 막아야 해!"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そうね！\u3000星徒会の私たちが木っ端ミジンコに――」"
translation = "「그래! 성도회인 우리가 가루로──」"

[[dialogue]]
speaker = "蘭美"
original = "「いいえ、お嬢様の手を煩わせるまでもないわ」"
translation = "「아니요, 아가씨의 손을 번거롭게 할 것까지도 없어요.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「蘭美？」"
translation = "「라비?」"

[[dialogue]]
speaker = "蘭美"
original = "「――変身！」"
translation = "「──변신!」"

[[dialogue]]
speaker = "蘭美"
original = "「メイドとして、この私が光速で片付けてあげるわ！」"
translation = "「메이드로서 이 내가 광속으로 치워주지!」"

[[dialogue]]
speaker = "蘭美"
original = "「加速操作！」"
translation = "「가속 조작!」"

[[dialogue]]
speaker = "unk"
original = "速い！\u3000一瞬で相手の懐に！？"
translation = "빠르다! 순식간에 상대의 품속으로!?"

[[dialogue]]
speaker = "蘭美"
original = "「ダッシュハンマー！」"
translation = "「대시 해머!」"

[[dialogue]]
speaker = "ゴーレム？"
original = "「…………！」"
translation = "「…………!」"

[[dialogue]]
speaker = "unk"
original = "蘭美の攻撃で、ゴーレムは倒れて砕け散る。"
translation = "라비의 공격으로 골렘은 쓰러져 산산조각이 난다."

[[dialogue]]
speaker = "unk"
original = "そして、一瞬の出来事に驚いている生徒たちの方へ向き直り、蘭美はメイドとして華麗にお辞儀をしてみせた。"
translation = "그리고 순식간에 일어난 일에 놀란 학생들을 향해 몸을 돌려, 라비는 메이드로서 화려하게 인사해 보였다."

[[dialogue]]
speaker = "蘭美"
original = "「皆様、大変お騒がせ致しました。問題は九浄家メイド隊の方で対処させて頂きましたので、引き続きご歓談をお楽しみ下さいませ♪」"
translation = "「여러분, 대단히 소란을 피워 죄송합니다. 문제는 쿠죠 가문 메이드대 쪽에서 대처했으므로, 계속해서 즐거운 대화를 나누어 주십시오♪」"

[[dialogue]]
speaker = "unk"
original = "次の瞬間、生徒たちから拍手と歓声が湧き上がった。"
translation = "다음 순간, 학생들로부터 박수와 환성이 터져 나왔다."

[[dialogue]]
speaker = "女子生徒"
original = "「キャーッ♪\u3000メイド長ちゃん、素敵～～～っ♪」"
translation = "「꺄아♪ 메이드장 짱, 멋져~~~~~!」"

[[dialogue]]
speaker = "男子生徒"
original = "「さすが、光速のメイドスター！」"
translation = "「역시, 광속의 메이드 스타!」"

[[dialogue]]
speaker = "蘭美"
original = "「ふふんっ♪」"
translation = "「후훙♪」"

[[dialogue]]
speaker = "unk"
original = "連続攻撃が速過ぎて、目で追い切れなかった"
translation = "연속 공격이 너무 빨라서 눈으로 쫓을 수가 없었어."

[[dialogue]]
speaker = "蘭美"
original = "「あら、それでも、高速で何発も叩き込んでたのは見えたのね？\u3000さすがはお嬢様を倒して、会長の座を引き継いだだけあるじゃない」"
translation = "「어라, 그래도 고속으로 몇 발이나 때려 박은 건 보였나 보네? 역시 아가씨를 꺾고 회장 자리를 이어받은 보람이 있잖아.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「蘭美は学園最速と言われるスピードを持つ、『光速のメイドスター』 の２つ名で有名な星騎士なのよ！」"
translation = "「라비는 학원 최속이라 불리는 스피드를 지닌, 『광속의 메이드 스타』라는 이명으로 유명한 성기사야!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「『加速操作』という固有の星術で、自身と、触れている物の速度を操ることができるの！」"
translation = "「『가속 조작』이라는 고유 성술로 자신과 접촉하고 있는 물체의 속도를 조종할 수 있거든!」"

[[dialogue]]
speaker = "蘭美"
original = "「そういうこと。最速の座に関しては、ヴィーナスお嬢様や、会長――貴方にだって譲らないわ♪」"
translation = "「그런 말씀. 최속의 자리만큼은 비너스 아가씨나 회장── 너에게도 양보하지 않아♪」"

[[dialogue]]
speaker = "unk"
original = "まさに、飛び級の実力ってわけか……！"
translation = "그야말로 월반할 만한 실력이군……!"

[[dialogue]]
speaker = "蘭美"
original = "「ところで、さっきの……ゴーレム？\u3000みたいのは何だったのかしら。モンスターとは違う手応えだったけど……」"
translation = "「그건 그렇고 아까 그…… 골렘? 같은 건 뭐였을까. 몬스터와는 다른 손맛이었는데……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ねぇ、倒して床に散らばった破片、なんだか甘い匂いがしない？」"
translation = "「있지, 쓰러뜨려서 바닥에 흩어진 파편, 왠지 달콤한 냄새가 나지 않아?」"

[[dialogue]]
speaker = "蘭美"
original = "「くんくん……確かに、お嬢様の言う通りね。これって……」"
translation = "「킁킁…… 확실히 아가씨 말씀대로네요. 이건……」"

[[dialogue]]
speaker = "せつな"
original = "「あ、あの……！\u3000皆様……！」"
translation = "「저, 저기……! 여러분……!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あら？\u3000せつな、どうしたの？\u3000今日は随分とかわいい服を着ているわね！」"
translation = "「어라? 세츠나, 무슨 일이야? 오늘은 상당히 귀여운 옷을 입고 있네!」"

[[dialogue]]
speaker = "unk"
original = "かわいい！\u3000すごく似合ってるよ"
translation = "귀여워! 정말 잘 어울려."

[[dialogue]]
speaker = "せつな"
original = "「えっ！？\u3000そ、そうでござるか！？\u3000主様から褒められると、せつな嬉しくなってニヤニヤが止まらなくなってしまうでござるにゃん<emoji=heart04>」"
translation = "「엣!? 그, 그런 소이옵니까!? 주군께서 칭찬해 주시니 세츠나, 기뻐서 싱글벙글이 멈추지 않는 소이옵니다냥<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
original = "「えへへぇ♪」"
translation = "「에헤헤♪」"

[[dialogue]]
speaker = "unk"
original = "彼女は、蘭美と同じく九浄家メイド隊に所属する、新星学園１年生の『せつな』。"
translation = "그녀는 라비와 마찬가지로 쿠죠 가문 메이드대에 소속된 신성학원 1학년 『세츠나』."

[[dialogue]]
speaker = "unk"
original = "日本に現存する最後の忍者の隠れ里――『<ruby>紫桜<rt>しおう</rt></ruby>の里』出身で、本物の忍者でもある。"
translation = "일본에 현존하는 마지막 닌자의 숨겨진 마을── 『자앵마을』 출신으로, 진짜 닌자이기도 하다."

[[dialogue]]
speaker = "unk"
original = "かつて、アステライトの出現で里が被害を受けた際、九浄家が経済的支援を実施。彼女はその恩を返す為に、メイド隊で働いているという経緯がある。"
translation = "과거 아스텔라이트의 출현으로 마을이 피해를 입었을 때, 쿠죠 가문이 경제적 지원을 실시. 그녀는 그 은혜를 갚기 위해 메이드대에서 일하고 있다는 경위가 있다."

[[dialogue]]
speaker = "せつな"
original = "「――って、ハッ……！\u3000浮かれて喜んでいる場合ではなかったでござる……！」"
translation = "「──앗, 핫……! 들떠서 기뻐하고 있을 때가 아닌 소이옵니다……!」"

[[dialogue]]
speaker = "unk"
original = "我に返った様子のせつなは、なんといきなりその場に土下座をし出した。"
translation = "정신을 차린 듯한 세츠나는 뜬금없이 그 자리에서 도게자를 하기 시작했다."

[[dialogue]]
speaker = "せつな"
original = "「ヴィーナスお嬢様！\u3000主様！\u3000大変申し訳ございませぬ！」"
translation = "「비너스 아가씨! 주군! 대단히 송구하옵니다!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「え！？\u3000せつな、いきなりどうしたのよ」"
translation = "「에!? 세츠나, 갑자기 왜 그래.」"

[[dialogue]]
speaker = "せつな"
original = "「実は……さっきここに現れた、異形のことなのですが……」"
translation = "「실은…… 아까 여기 나타난 이형에 대해서인데……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ゴーレムっぽいやつのこと？」"
translation = "「골렘 같은 녀석 말이야?」"

[[dialogue]]
speaker = "せつな"
original = "「左様でござる。そのゴーレムは――」"
translation = "「그러하오. 그 골렘은──」"

[[dialogue]]
speaker = "せつな"
original = "「せつなが作り出してしまったものなのでござる！」"
translation = "「세츠나가 만들어 버린 것이옵니다!」"

[[dialogue]]
speaker = "unk"
original = "それは一体どういう……？"
translation = "그건 대체 무슨……?"

[[dialogue]]
speaker = "せつな"
original = "「う……！\u3000そ、それは……！」"
translation = "「우……! 그, 그것은……!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それは？」"
translation = "「그것은?」"

[[dialogue]]
speaker = "せつな"
original = "「あ――」"
translation = "「아──」"

[[dialogue]]
speaker = "せつな"
original = "「主様の前では、言えないでござるぅぅぅ～～～っ！！！」"
translation = "「주군 앞에서는 말할 수 없는 소이옵니다아아아~~~~~!!!」"

[[dialogue]]
speaker = "unk"
original = "えぇっ！？\u3000ちょっと、せつな！？"
translation = "에엣!? 잠깐, 세츠나!?"

[[dialogue]]
speaker = "unk"
original = "彼女は忍者らしい素早い身のこなしで、あっという間にカフェテリアの外へと飛び出していってしまった。"
translation = "그녀는 닌자다운 재빠른 몸놀림으로 순식간에 카페테리아 밖으로 튀어나가 버렸다."

[[dialogue]]
speaker = "unk"
original = "何か事情がある気がして、俺が追いかけようとすると――"
translation = "무슨 사정이 있는 것 같아 내가 뒤쫓으려 하자──"

[[dialogue]]
speaker = "蘭美"
original = "「待ちなさい、会長」"
translation = "「기다려, 회장.」"

[[dialogue]]
speaker = "蘭美"
original = "「最速ですぐに追いかけようとしたのはナイスよ。でも、せつなは九浄家メイド隊の一員だから――」"
translation = "「최속으로 바로 뒤쫓으려 한 건 나이스야. 하지만 세츠나는 쿠죠 가문 메이드대의 일원이니까──」"

[[dialogue]]
speaker = "蘭美"
original = "「ここはメイド長の私に、一旦預けてくれないかしら？」"
translation = "「여기는 메이드장인 나에게 일단 맡겨주지 않을래?」"

