[[dialogue]]
speaker = "unk"
original = "第８話,宣戦布告,B"
translation = "제8화, 선전포고, B"

[[dialogue]]
speaker = "unk"
original = "今日、星徒会主催のクイズオリエンテーションの概要が発表された。"
translation = "오늘 성도회 주최 퀴즈 오리엔테이션의 개요가 발표되었다."

[[dialogue]]
speaker = "unk"
original = "参加希望の生徒はチームを組んでクイズ大会に応募してもらう。"
translation = "참가 희망 학생은 팀을 짜서 퀴즈 대회에 응모하게 된다."

[[dialogue]]
speaker = "unk"
original = "本番は一週間後。留学生・在校生ともに多くの生徒の参加を期待したい。"
translation = "본선은 일주일 뒤. 유학생과 재학생 모두 많은 학생이 참가하기를 기대한다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「クイズ大会、みんな参加してくれるかな？\u3000応募が全然なくて中止、なんてことになったり……」"
translation = "「퀴즈 대회, 다들 참가해줄까? 응모가 전혀 없어서 중지, 같은 일이 벌어지면……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「マトイったら心配しすぎよ。うちの生徒はお祭り好きなんだから、今にこぞって応募してくるわ」"
translation = "「마토이도 참 걱정이 너무 많아. 우리 학생들은 축제를 좋아하니까 금방 너도나도 응모해올 거야.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「みんながみんなヴィーナスみたいだったらいいんだけど……」"
translation = "「모두가 비너스 같으면 좋겠지만……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だけど確かに、留学生にはチームを組むのはハードルが高かったかもしれないな。そのために賞品もあるけど……」"
translation = "「하지만 확실히 유학생들에게 팀을 짜는 건 허들이 높았을지도 모르겠네. 그걸 위해서 상품도 걸었지만……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「その辺は在校生にお願いしてもいいかもしれないわね。留学生に声をかけてチームになってあげてって」"
translation = "「그 부분은 재학생들에게 부탁해도 괜찮을 것 같아. 유학생들에게 말을 걸어서 팀이 되어달라고 말이지.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「もちろん留学生同士でチームを組んでもいいし。ま、少し様子を見ましょ」"
translation = "「물론 유학생끼리 팀을 짜도 되고. 뭐, 조금 상황을 지켜보자고.」"

[[dialogue]]
speaker = "unk"
original = "校舎の前で出会ったあの子は参加してくれるだろうか。在校生と打ち解けられるだろうか。"
translation = "교사 앞에서 만난 그 아이는 참가해줄까. 재학생들과 잘 어울릴 수 있을까."

[[dialogue]]
speaker = "unk"
original = "オリエンテーションを通して友達ができるといいな──なんて考えていると。"
translation = "오리엔테이션을 통해 친구가 생기면 좋겠네── 그런 생각을 하고 있자니."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「緋宮会長」"
translation = "「히노미야 회장.」"

[[dialogue]]
speaker = "unk"
original = "俺を呼び止める声に振り返る。"
translation = "나를 불러세우는 목소리에 뒤를 돌아본다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「梨緒──と、ベアトリスか」"
translation = "「리오──랑, 베아트리스인가.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「こ、こんにちは……」"
translation = "「아, 안녕하세요…….」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "（ひぃぃ！？\u3000魔王クロト……！）"
translation = "(히이이!? 마왕 쿠로토……!)"

[[dialogue]]
speaker = "unk"
original = "まだ新星学園に慣れていないのか、ベアトリスの表情はどこかぎこちない。"
translation = "아직 신성학원에 익숙해지지 않은 건지, 베아트리스의 표정은 어딘가 어색하다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「どうして２人が一緒に？」"
translation = "「어떻게 둘이 같이 있어?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ベアトリスが選管に入ってくれたんだ。今後会う機会があるだろうから、紹介しておこうと思ったんだが、彼女のことはすでに知っていたか」"
translation = "「베아트리스가 선관에 들어와 줬다. 앞으로 만날 기회가 있을 것 같아 소개해두려 했는데, 그녀에 대해서는 이미 알고 있었나 보군.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ、この前少しだけ話したんだ」"
translation = "「아아, 저번에 조금 얘기했었어.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ベアトリスが選管に入るなんて意外ね、そういうの向いてなさそうなのに。梨緒が１人だから同情して、とかじゃないの」"
translation = "「베아트리스가 선관에 들어가다니 의외네, 그런 거 안 어울릴 것 같은데. 리오가 혼자라서 동정해서 들어간 거 아냐?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「くふっ……！？」"
translation = "「크흑……!?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ち、違います！\u3000私は梨緒さんの言葉に共感して、自分の意志で入ったんですから」"
translation = "「아, 아니에요! 저는 리오 씨의 말씀에 공감해서 제 의지로 들어온 거니까요!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そうなの？」"
translation = "「그래?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「は、はい」"
translation = "「네, 네.」"

[[dialogue]]
speaker = "unk"
original = "控えめに頷くベアトリス。"
translation = "조심스럽게 고개를 끄덕이는 베아트리스."

[[dialogue]]
speaker = "unk"
original = "確かに選管に入るのは意外だったけど、留学してすぐ仲間ができたのは良かった。"
translation = "확실히 선관에 들어간 건 의외였지만, 유학 오자마자 동료가 생긴 건 다행이다."

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「見ーつけた」"
translation = "「찾았다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「！\u3000君は……」"
translation = "「! 너는……」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「あ、また会ったね、魔王様」"
translation = "「아, 또 만났네, 마왕님.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「知り合いなの？」"
translation = "「아는 사이야?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「まぁ……一応」"
translation = "「뭐…… 일단은.」"

[[dialogue]]
speaker = "unk"
original = "昨日の今日で、また会うとは思わなかった。"
translation = "어제 보고 오늘 또 보게 될 줄은 몰랐다."

[[dialogue]]
speaker = "unk"
original = "暗殺者に狙われるなんて映画の中みたいだが、夢ではなかったらしい。"
translation = "암살자에게 노려지다니 영화 속 이야기 같지만, 꿈은 아니었던 모양이다."

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "「暗殺者ってことは秘密だよ」と、ナターシャが視線で告げている。"
translation = "「암살자라는 건 비밀이야」라고 나타샤가 시선으로 말하고 있다."

[[dialogue]]
speaker = "unk"
original = "釘を刺さずとも、おいそれと言う気はない。"
translation = "굳이 입단속을 시키지 않아도 함부로 말할 생각은 없다."

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「私は<ruby>散乃<rt>ちるの</rt></ruby>ナターシャ。聖庭園から来たんだ。魔王の様子を見ろって言われててね」"
translation = "「나는 치루노 나타샤. 성정원에서 왔어. 마왕의 상태를 살피라는 말을 들어서 말이야.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「というわけで、私も選挙管理委員会に入れてもらっていい？\u3000あなたが委員長の梨緒だよね？」"
translation = "「그런 의미에서 나도 선거관리위원회에 넣어줘도 될까? 당신이 위원장인 리오 맞지?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……ふむ」"
translation = "「……흠.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "（おや？\u3000ちょっと警戒してる感じ？\u3000……意外と勘はいいんだ）"
translation = "(어라? 조금 경계하는 느낌? ……의외로 감이 좋네.)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「目的は同じ──というわけか。わかった、君も今日から選挙管理委員会の一員だ」"
translation = "「목적은 같다──는 건가. 알았다, 너도 오늘부터 선거관리위원회의 일원이다.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「うん、ありがとう♪」"
translation = "「응, 고마워♪」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「私、ベアトリス・シェイドです。私も選管なんです」"
translation = "「저, 베아트리스 셰이드입니다. 저도 선관이에요.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「あ、梨緒１人だって聞いてたけど、先に入った人いたんだ。よろしくね♪」"
translation = "「아, 리오 혼자라고 들었는데 먼저 들어온 사람이 있었구나. 잘 부탁해♪」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「では、３人になった選挙管理委員会の最初の仕事だ」"
translation = "「그럼 세 명이 된 선거관리위원회의 첫 번째 업무다.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「？」"
translation = "「?」"

[[dialogue]]
speaker = "unk"
original = "すると梨緒は小気味良い音が出そうなほど、ビシッと俺を指差して──"
translation = "그러자 리오는 경쾌한 소리가 날 정도로 척 하고 나를 가리키며──"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「選挙管理委員会は私とベアトリス、ナターシャの３人。クイズ大会の参加条件を満たした」"
translation = "「선거관리위원회는 나랑 베아트리스, 나타샤 세 명. 퀴즈 대회 참가 조건을 충족했다.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「我々選挙管理委員会は、君たち新星星徒会にクイズで勝負を申し込む！」"
translation = "「우리 선거관리위원회는 너희 신성 성도회에 퀴즈로 승부를 신청하겠다!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「えええええ～～～っ！！？」"
translation = "「에에에에에~~~~~!?」"

[[dialogue]]
speaker = "unk"
original = "驚きの声を上げたのは、勝負を挑んできた側だった。"
translation = "경악 섞인 목소리를 낸 건 승부를 건 쪽이었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「星徒会は開催する側なんだけど……」"
translation = "「성도회는 개최하는 쪽인데……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「概要によれば、クイズはクイズ研究会の作成。進行も放送委員会が行う。星徒会の参加も不可能ではないはずだ」"
translation = "「개요에 따르면 퀴즈는 퀴즈 연구회 작성. 진행도 방송위원회가 맡는다. 성도회의 참가도 불가능하지 않을 터.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「リクリエに関する知識もクイズで問われると聞く。星徒会の適性を計るいい機会だ」"
translation = "「리크리에에 관한 지식도 퀴즈로 묻는다고 들었다. 성도회의 적성을 가늠할 좋은 기회다.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「フッ……勝負を挑まれて逃げるわけにはいかないわね。受けて立つわ！」"
translation = "「훗…… 승부를 걸어오는데 도망칠 수는 없지. 받아주겠어!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「やっぱりぃ……」"
translation = "「역시나아……」"

[[dialogue]]
speaker = "unk"
original = "ノリノリで勝負を受けるヴィーナスに、げんなりと項垂れるマトイ。"
translation = "신이 나서 승부를 받아들이는 비너스에게, 진이 빠진 듯 고개를 떨구는 마토이."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「まぁ……星徒会で相談してみて、問題なさそうなら考えるよ」"
translation = "「뭐…… 성도회에서 상의해 보고, 문제없을 것 같으면 고려해 볼게.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「先日挑み損ねた勝負の代わりだ。会場で待っているぞ、緋宮会長」"
translation = "「지난번에 놓친 승부의 대역이다. 회장에서 기다리고 있겠다, 히노미야 회장.」"

[[dialogue]]
speaker = "unk"
original = "梨緒の矢のような視線が真っ直ぐに俺を見つめる。"
translation = "리오의 화살 같은 시선이 곧장 나를 꿰뚫는다."

[[dialogue]]
speaker = "unk"
original = "凛々しい彼女には、その真剣な表情が様になっていた。"
translation = "늠름한 그녀에게는 그 진지한 표정이 제법 잘 어울렸다."

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「へ～、クイズかー。面白そうじゃん」"
translation = "「헤~, 퀴즈인가. 재밌겠는데.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「私、こちらに来たばかりで足を引っ張らないでしょうか……？」"
translation = "「저, 이곳에 온 지 얼마 안 돼서 발목을 잡지는 않을까요……?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ま、オリエンテーションなんだし気楽にやればいいんじゃない？」"
translation = "「뭐, 오리엔테이션이니까 가볍게 하면 되지 않을까?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「いいや、勝負するからには勝利を目指すぞ」"
translation = "「아니, 승부하는 이상 승리를 목표로 하겠다.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だがベアトリス、心配する必要はない。私たちはチームだ。困った時は助け合えばいい」"
translation = "「하지만 베아트리스, 걱정할 필요 없다. 우리는 팀이다. 곤란할 때는 서로 도우면 돼.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私も答えられない時があるかもしれない。その時は頼んだぞ」"
translation = "「나도 대답하지 못할 때가 있을지도 모른다. 그럴 때는 부탁하마.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「！\u3000……はいっ」"
translation = "「! ……네!」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「──あ」"
translation = "「──아.」"

[[dialogue]]
speaker = "unk"
original = "選挙管理委員会がチームとしてまとまり始めたところで、ナターシャの眉がピクリと動いた。"
translation = "선거관리위원회가 팀으로서 뭉치기 시작할 무렵, 나타샤의 눈썹이 움찔 움직였다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ナターシャちゃーん！\u3000今度のクイズ大会、一緒に出ない？」"
translation = "「나타샤짱! 이번 퀴즈 대회, 같이 나가지 않을래?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ごめんメルエル、今チーム決まったところだからムリ」"
translation = "「미안 메르엘, 방금 팀이 결정된 참이라 무리야.」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「え～っ、そんな～っ！？」"
translation = "「에~, 그럴 수가~!」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「あはは♪」"
translation = "「아하하♪」"

[[dialogue]]
speaker = "unk"
original = "メルエルが驚きの声を上げると、ナターシャが愉快そうに笑う。"
translation = "메르엘이 경악 섞인 목소리를 내자, 나타샤가 즐거운 듯 웃는다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「２人は親しいようだけど、知り合い？」"
translation = "「둘이 친해 보이는데, 아는 사이야?」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あっ、会長くんっ！\u3000こ、こんにちはっ」"
translation = "「앗, 회장님! 아, 안녕하세요.」"

[[dialogue]]
speaker = "unk"
original = "こちらに気が付いたメルエルは、いそいそと自分の髪の毛を撫でつけたり、身だしなみをチェックするように制服の裾をピッと引っ張ったりしながら、挨拶をした。"
translation = "이쪽을 알아챈 메르엘은 서둘러 자기 머리카락을 가다듬거나, 옷매무새를 체크하듯 교복 밑단을 척 하고 잡아당기며 인사를 했다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「えっとね、前にもお話したかもしれないんだけど、私、天界の聖庭園が地元なの」"
translation = "「저기 말이야, 전에도 이야기했을지도 모르겠는데, 나, 천계의 성정원이 고향이거든.」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「だからナターシャちゃんは、あっちの幼なじみなんだっ」"
translation = "「그래서 나타샤짱은 그쪽 소꿉친구야.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「そ。会長さんからすれば、幼なじみの幼なじみってわけ」"
translation = "「그래. 회장님 입장에서 보면 소꿉친구의 소꿉친구라는 거지.」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「そういえばナターシャちゃん。チームって、誰と組むの？」"
translation = "「그러고 보니 나타샤짱. 팀은 누구랑 짜는 거야?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「梨緒とベアトリス。私、選挙管理委員会に入ったから」"
translation = "「리오랑 베아트리스. 나, 선거관리위원회에 들어갔거든.」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ええっ！？\u3000そうなの？」"
translation = "「에엣!? 정말이야?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「私は仕事込みで新星学園に来てるからね。表向きは魔王って悪者でしょ？\u3000だから天界でも一応警戒して監視しようってなったの」"
translation = "「난 일 때문에 신성학원에 온 거니까. 겉보기엔 마왕이란 악당이잖아? 그래서 천계에서도 일단 경계해서 감시하기로 했거든.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「で、魔王を監視するならちょうどいいってことで選管に入ったんだ」"
translation = "「그래서 마왕을 감시하기에 딱 좋겠다 싶어서 선관에 들어간 거야.」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「会長くんは良い魔王だから、監視なんていらないよっ！」"
translation = "「회장님은 착한 마왕이니까 감시 같은 건 필요 없어!」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「そうであることを確認して、議会に報告するのが、私のお仕事ってこと」"
translation = "「그렇다는 걸 확인해서 의회에 보고하는 게 내 일이라는 거지.」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「う～ん、そういうものかぁ……。確かに、自分で見てないものを、勝手に決めつけるわけにはいかないもんね」"
translation = "「으음, 그런 건가……. 확실히 직접 보지 않은 걸 마음대로 단정 지을 수는 없으니까.」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「それにしても、まだ学生なのにもう天界のお仕事を任せられるなんて、さすがナターシャちゃんだね！」"
translation = "「그나저나 아직 학생인데 벌써 천계의 일을 맡다니, 역시 나타샤짱이야!」"

[[dialogue]]
speaker = "unk"
original = "うんうん、と幼なじみの活躍を我がことのように喜ぶメルエル。"
translation = "응응, 하며 소꿉친구의 활약을 제 일처럼 기뻐하는 메르엘."

[[dialogue]]
speaker = "unk"
original = "だけど……"
translation = "하지만……"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「？\u3000ナターシャちゃん？」"
translation = "「? 나타샤짱?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ううん、メルエルは変わらないなーって」"
translation = "「아니, 메르엘은 변함없구나 싶어서.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（今、メルエルに妙な視線を向けていたような……？）"
translation = "（방금 메르엘에게 묘한 시선을 보낸 것 같은데……?）"

[[dialogue]]
speaker = "unk"
original = "幼なじみや友人に向けるのとは違う、まるで見定めるような目。"
translation = "소꿉친구나 친구에게 향하는 것과는 다른, 마치 가늠하는 듯한 눈빛."

[[dialogue]]
speaker = "unk"
original = "刃のような剣呑さはなくとも、ひやりと胸の奥が冷えるものを感じた。"
translation = "칼날 같은 살벌함은 없어도, 서늘하게 가슴 속이 식는 것을 느꼈다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（ナターシャが暗殺者だと知ってるから、思い込みでそう感じるのだろうか……？）"
translation = "（나타샤가 암살자라는 걸 알고 있어서, 선입견 때문에 그렇게 느끼는 걸까……?）"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「いや～、会長さんのことは小さい頃からメルエルに聞いてたけど、その彼がまさか私の監視対象になるなんてね」"
translation = "「이야~, 회장님에 대해서는 어릴 때부터 메르엘에게 들었지만, 그 사람이 설마 내 감시 대상이 될 줄이야.」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ひゃ～っ！？\u3000それは言わないで～！？」"
translation = "「히야~!? 그건 말하지 마~!」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「メルエルの恥ずかしい話、いっぱいしちゃおっかな～♪」"
translation = "「메르엘의 부끄러운 이야기, 잔뜩 해버릴까나~♪」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「やめて～～～っ」"
translation = "「그만해~~~!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふふ、メルエルとナターシャは仲がいいのね」"
translation = "「후후, 메르엘과 나타샤는 사이가 좋구나.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「そのメルエルもお世話になってる、星徒会とその会長さんだからね」"
translation = "「그 메르엘이 신세 지고 있는 성도회랑 그 회장님이니까 말이야.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「監視っていうのもあくまで一応だよ、一応。天界のお偉いさんには、彼がいい人かどうかなんてわからないから」"
translation = "「감시라는 것도 어디까지나 일단이야, 일단. 천계의 높으신 분들은 그가 좋은 사람인지 어떤지 모르니까.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「しばらく会長さんを観察して、怪しいことがなければ、何もありませんでしたって報告して終わり！」"
translation = "「당분간 회장님을 관찰해서 수상한 점이 없으면, 아무 일도 없었다고 보고하고 끝!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「そっか。なら絶対大丈夫だね！\u3000だって相手は会長くんなんだもん」"
translation = "「그렇구나. 그럼 절대 괜찮겠네! 그야 상대는 회장님인걸.」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「じゃあ梨緒ちゃん……とベアトリスちゃん。ナターシャちゃんをよろしくね」"
translation = "「그럼 리오짱……이랑 베아트리스짱. 나타샤짱을 잘 부탁해.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ああ。一緒にクイズ大会で、星徒会に勝ってみせる」"
translation = "「그래. 함께 퀴즈 대회에서 성도회에 이겨 보이겠다.」"

[[dialogue]]
speaker = "unk"
original = "梨緒の宣言に笑顔でうなずいて、メルエルは去っていった。"
translation = "리오의 선언에 미소로 고개를 끄덕이고 메르엘은 떠나갔다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「さて、それでは正式に、この３人でクイズ大会に参加する登録を済ませてしまうとするか」"
translation = "「자, 그럼 정식으로 이 세 명으로 퀴즈 대회 참가 등록을 마치도록 할까.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「その登録、ちょっと待ったぁーーー！！」"
translation = "「그 등록, 잠깐 기다려어어어!!!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「待たせたな、梨緒！\u3000あたしも選挙管理委員会に入らせてもらうぜ！」"
translation = "「기다렸지, 리오! 나도 선거관리위원회에 들어가겠어!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「そんでもって、あたしも一緒にそのクイズ大会に参加させてもらおう！」"
translation = "「그러니까 나도 같이 그 퀴즈 대회에 참가시켜 줘!」"

[[dialogue]]
speaker = "unk"
original = "メルエルと入れ違いになるような形で、附属校の制服を着たアポロが俺たちの元に駆け込んできた。"
translation = "메르엘과 교대하듯 부속 학교 교복을 입은 아폴로가 우리에게 달려왔다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「フィオナ……じゃなかった、アポロか。先日のあれは、気まぐれというわけじゃなかったんだな」"
translation = "「피오나……가 아니라 아폴로인가. 지난번의 그건 변덕이 아니었나 보군.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「もちろんだ！\u3000星見家家族会議も済ませてきたし、ちょっと渋られたが、フィオナからもあたしの活動は正式に認めてもらった！」"
translation = "「당연하지! 호시미 가문 가족회의도 마쳤고, 좀 난색을 표하긴 했지만 피오나한테서 내 활동도 정식으로 인정받았어!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「というわけで、梨緒！\u3000あたしもその選挙管理委員会とやらに入らせてもらうぞ！」"
translation = "「그런 고로, 리오! 나도 그 선거관리위원회인가 뭔가에 들어가겠어!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「えっと、附属校の制服を着ている、こちらの方はいったい……」"
translation = "「저기, 부속 학교 교복을 입고 계신 이분은 대체……」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「……星見アポロ。教皇庁である星見家に、養子として迎えられた女の子だね」"
translation = "「……호시미 아폴로. 교황청인 호시미 가문에 양자로 입적된 소녀야.」"

[[dialogue]]
speaker = "unk"
original = "アポロは当然、「長年眠り続けていた星見<ruby>フィオナ<rt>エリシア</rt></ruby>の双子の姉」と名乗るわけにはいかない。"
translation = "아폴로는 당연히, ‘오랫동안 잠들어 있던 호시미 <ruby>피오나<rt>엘리시아</rt></ruby>의 쌍둥이 언니’라고 자칭할 수는 없다."

[[dialogue]]
speaker = "unk"
original = "現状は『特別な身分にあるため出自は明かせないが、星見家の一族に迎えられた養子』という扱いになっている。正確ではないが、意外と嘘が少ない肩書だ。"
translation = "현재는 ‘특별한 신분이라 출신은 밝힐 수 없으나, 호시미 가문의 일족으로 받아들여진 양자’라는 취급을 받고 있다. 정확하지는 않지만, 의외로 거짓이 적은 직함이다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「そっちの２人は初めましてだな！\u3000あたしはアポロ。見ての通り流星附属校に通う星騎士だ！」"
translation = "「그쪽 둘은 처음 보네! 난 아폴로. 보다시피 유성 부속 학교에 다니는 성기사다!」"

[[dialogue]]
speaker = "unk"
original = "そうして、初顔合わせとなるアポロ、ベアトリス、ナターシャの３人はそれぞれ簡単な自己紹介を交わし合った。"
translation = "그렇게 첫 대면인 아폴로, 베아트리스, 나타샤 세 명은 각각 간단한 자기소개를 나누었다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「どうやらあたしが最後になったみたいだが……改めて、選挙管理委員会への入会を希望するぜ！」"
translation = "「아무래도 내가 마지막이 된 것 같지만…… 다시 한번, 선거관리위원회 입회를 희망한다!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ただし、ただの同志としてってわけじゃない。星徒会を監視する選挙管理委員会が暴走しないよう、その活動を中から監視する、『内部監査官』としてだ！」"
translation = "「다만 단순한 동지로서가 아니야. 성도회를 감시하는 선거관리위원회가 폭주하지 않도록 그 활동을 안에서 감시하는 『내부 감사관』으로서다!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「内部監査官……？」"
translation = "「내부 감사관……?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「へへ～ん、どうだ？\u3000委員長よりも、何やらカッコよさそうな肩書だろう！？\u3000フィオナにそういう役職があるって聞いたんだ！」"
translation = "「헤헤~헤, 어때? 위원장보다 뭔가 멋있어 보이는 직함이지!? 피오나한테 그런 직책이 있다고 들었거든!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「た、確かに、組織にはそういった役割の仕事も、あったりしますよね……」"
translation = "「확, 확실히 조직에는 그런 역할의 업무도 있기도 하죠……」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「本来は国際取引をするような企業に必要な役職だよ。普通、選挙管理委員会に付けるようなポジションじゃないけど……まあ言いたいことはわかるかな」"
translation = "「본래는 국제 거래를 하는 기업에나 필요한 직책이야. 보통 선거관리위원회에 붙일 만한 포지션은 아니지만…… 뭐, 하고 싶은 말은 알겠어.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「選管だけが一方的に監視するのはフェアじゃないから、星徒会の身内を１人、こっちの内部に置けってことでしょ」"
translation = "「선관만 일방적으로 감시하는 건 페어가 아니니까, 성도회 쪽 사람을 한 명 이 안쪽에 두겠다는 거지.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「むずかしい話はよくわからんが、まあ、そういうことだ！」"
translation = "「어려운 이야기는 잘 모르겠지만, 뭐, 그런 거다!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「いや、わかってないんかい」"
translation = "「아니, 모르는 거냐고.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「むむむっ。内部監査官……中々かっこいい肩書ね。私も負けてられないわ！」"
translation = "「으으음. 내부 감사관…… 꽤 멋진 직함이네. 나도 질 수 없지!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ヴィーナス、話がややこしくなるから、<ruby>新星星徒会<rt>わたしたち</rt></ruby>はちょっと黙ってよっか？」"
translation = "「비너스, 이야기가 복잡해지니까 신성 성도회는 잠깐 입 다물고 있을까?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「もちろん！\u3000星見家としても魔王の暴走は阻止したい立場だ。だから選管の活動自体は協力するし、あたしは梨緒の仲間になる」"
translation = "「물론이지! 호시미 가문으로서도 마왕의 폭주는 저지하고 싶은 입장이다. 그래서 선관 활동 자체는 협력할 거고, 나는 리오의 동료가 되겠어.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「あたしの目が<ruby>緋<rt>あか</rt></ruby>いうちは、オマエの正気はあたしが保証してやろう！」"
translation = "「내 눈이 붉은 동안은 네 제정신은 내가 보증해 주마!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「だから梨緒、あたしをオマエの仲間に入れろ！！」"
translation = "「그러니까 리오, 나를 네 동료로 넣어줘!!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「！\u3000……わかった。選挙管理委員会は同じ志を持つ者を拒まない」"
translation = "「! ……알았다. 선거관리위원회는 같은 뜻을 가진 자를 거부하지 않는다.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「アポロ……私たちは今から同志だ。よろしく頼む」"
translation = "「아폴로…… 우리는 이제부터 동지다. 잘 부탁하마.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「おう！\u3000正義のヒーローになれるよう、一緒に頑張ろう！」"
translation = "「오우! 정의의 히어로가 될 수 있도록 같이 힘내자!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ところで……新星学園のオリエンテーションに、附属生は参加できるのか？」"
translation = "「그런데…… 신성학원 오리엔테이션에 부속생이 참가할 수 있나?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「魔王！\u3000何とかしてくれ！！」"
translation = "「마왕! 어떻게 좀 해봐!!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「無茶振りすぎる……！」"
translation = "「너무 무리한 요구잖아……!」"

[[dialogue]]
speaker = "unk"
original = "その後、あちこちに手を回して『新星学園の委員会である、選挙管理委員会に所属している』という理由付けで、附属生であるアポロのクイズ大会への参加を取り付けた。"
translation = "그 후, 여기저기 손을 써서 ‘신성학원의 위원회인 선거관리위원회에 소속되어 있다’는 명분을 만들어 부속생인 아폴로의 퀴즈 대회 참가를 성사시켰다."

[[dialogue]]
speaker = "unk"
original = "ちなみに、一部の附属生から「贔屓である」との抗議が殺到したが、今回は封殺させてもらった。"
translation = "참고로 일부 부속생들로부터 “편애다”라는 항의가 빗발쳤지만, 이번에는 묵살했다."

[[dialogue]]
speaker = "unk"
original = "この行事はあくまでも、新星学園の留学生のためのオリエンテーションである。附属生たちにイベントを乗っ取られてはかなわないのだ。"
translation = "이 행사는 어디까지나 신성학원 유학생들을 위한 오리엔테이션이다. 부속생들에게 이벤트를 점령당해서는 곤란하기 때문이다."

