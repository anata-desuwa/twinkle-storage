[[dialogue]]
speaker = "unk"
original = "第３話,スイートポテト祭,P"
translation = "제3화, 스위트 포테이토 축제, P"

[[dialogue]]
speaker = "unk"
original = "部屋の端に置かれている段ボールの中を覗き込んで、ウズメが絶句していた。"
translation = "방 한쪽에 놓인 골판지 상자 안을 들여다보고 우즈메가 말을 잇지 못했다."

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「うわぁ、サツマイモでいっぱいだし……どうしちゃったの、これ？」"
translation = "「우와, 고구마로 가득한 시……이거 어떻게 된 시야?」"

[[dialogue]]
speaker = "unk"
original = "母さんが貰ってきたんだ"
translation = "엄마가 받아오셨어"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「こんなにあるといくら美味しくても処理に困っちゃうよね……」"
translation = "「이렇게 많으면 아무리 맛있어도 처리가 곤란할 시야……」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「それで今日はあたしを家に誘って、ちょっとでも消費しようって感じなの？」"
translation = "「그래서 오늘은 나를 집으로 불러서, 조금이라도 소비하려는 느낌인 시야?」"

[[dialogue]]
speaker = "unk"
original = "ウズメにお菓子を作ってあげたくて"
translation = "우즈메에게 과자를 만들어 주고 싶어서"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「物は言いようだし～。ま、会長くんの作る美味しいお菓子が食べられるならなんでもいいけど」"
translation = "「말은 하기 나름인 시~. 뭐, 회장군이 만드는 맛있는 과자를 먹을 수 있다면 뭐든지 좋지만」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あ、そだ♪\u3000せっかくだから２人で作ろーよ」"
translation = "「아, 맞다♪ 모처럼이니까 둘이서 만들자 시」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「会長くんに作らせてあたしはただ待ってるだけっていうのも変な話じゃん？\u3000だったら一緒に作った方が絶対楽しいでしょ♪」"
translation = "「회장군에게 만들게 하고 나는 그냥 기다리기만 하는 것도 이상한 이야기잖아? 그렇다면 같이 만드는 게 분명 더 즐거울 시♪」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「それにさー、あたしってこういう感じだから、あんまり料理とかできる風に見られないんだよね」"
translation = "「게다가 말이야~, 나는 이런 느낌이니까, 그다지 요리 같은 걸 할 수 있는 것처럼 보이지 않는 시」"

[[dialogue]]
speaker = "unk"
original = "ウズメが料理出来るのは知ってるよ？"
translation = "우즈메가 요리할 수 있다는 건 알고 있어?"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「会長くんにはたまに作ったものを食べてもらってるもんね。でも実際に作ってるところを見せたことはないっしょ？」"
translation = "「회장군에게는 가끔 만든 것을 먹게 해줬었지. 하지만 실제로 만드는 모습을 보여준 적은 없잖아?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「だから、これを機会に料理が出来るところをアピールしとくのも悪くないなって……ま、腕前的にはフツーでサラン先輩とかと比ぶべくもないんだけど」"
translation = "「그러니까, 이걸 기회로 요리를 할 수 있다는 걸 어필해 두는 것도 나쁘지 않겠다고……뭐, 실력적으로는 평범해서 사란 선배 같은 분들과 비교할 바는 아니지만」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「さーて、なに作る？\u3000サツマイモ料理ってどんなのあったっけ」"
translation = "「자아, 뭘 만들 시? 고구마 요리는 어떤 게 있었더라」"

[[dialogue]]
speaker = "unk"
original = "スイートポテトとかどう？"
translation = "스위트 포테이토 같은 건 어때?"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「いーじゃん！\u3000お手軽だし、作ってて楽しいし！\u3000決まり、それにしよっ♪」"
translation = "「좋잖아! 간단하고, 만들면서 즐겁고! 결정, 그걸로 하자 시♪」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「かんせーいっ♪」"
translation = "「완성 시~♪」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「それじゃ作ったスイートポテトを見せあいっこするし♪\u3000会長くんのは……」"
translation = "「그럼 만든 스위트 포테이토를 서로 보여주는 시♪ 회장군 것은……」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「わっ、カボチャの形になってるし！\u3000ハロウィンにちなんでってことね、なるほどなるほど……」"
translation = "「와, 호박 모양이 된 시! 할로윈에 맞춰서라는 거네, 과연 과연……」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あたしのはこれっ！\u3000カヌレ型にしたお化け風のスイートポテトだよ。えへへ、発想は全くおんなじだったみたいだね」"
translation = "「내 건 이거 시! 카눌레 모양으로 만든 유령풍 스위트 포테이토야. 에헤헤, 발상은 완전히 똑같았던 것 같네」"

[[dialogue]]
speaker = "unk"
original = "お化けに個性があって可愛い"
translation = "유령에게 개성이 있어서 귀여워"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「さっすが会長くん、気付いてくれたし♪\u3000そーなんです、このお化けちゃんたちは１人１人、ちゃーんとモデルがいるお化けちゃんなんです♪」"
translation = "「역시 회장군, 알아봐 준 시♪ 그런 시, 이 유령 친구들은 한 명 한 명, 제대로 모델이 있는 유령 친구인 시♪」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「さてここで問題、この子たちは誰をモデルにしてるでしょーか？」"
translation = "「자, 여기서 문제, 이 아이들은 누구를 모델로 했을까요~?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ちっちっちっちっ……ピンポーン、正解。その子は舞亜でした～」"
translation = "「치치치치칫……딩동댕, 정답. 그 아이는 마이아였어~」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「こっちがソフィで、こっちのがシャルレーヌちゃん。これがゆゆ姫ちゃんで……これは難しいけど、誰だか分かるかな～？」"
translation = "「이쪽이 소피고, 이쪽이 샤를렌짱. 이게 유유 공주짱이고……이건 어렵지만, 누군지 알 수 있을까~?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「わ、よく分かったね！\u3000セーラ先輩、大正解だし♪」"
translation = "「와, 잘 맞혔네! 세라 선배, 대정답인 시♪」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「それで残りのこれがあたしで、こっちが会長くんでした～」"
translation = "「그래서 남은 이게 나고, 이쪽이 회장군이었어~」"

[[dialogue]]
speaker = "unk"
original = "俺のもあるんだ"
translation = "내 것도 있구나"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「もっちろんだし♪\u3000なんなら一番心を込めて作ったまであるし♪」"
translation = "「당연한 시♪ 심지어 가장 마음을 담아 만들었을 정도인 시♪」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あっ、ダメダメ！\u3000これはあたしんだし！\u3000会長くんは他のにしてよ～！」"
translation = "「앗, 안 돼 안 돼! 이건 내 거인 시! 회장군은 다른 걸로 해~!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「えへへ、あなたはあたしが美味しく食べてあげるからね～、ちゅっ<emoji=heart04>」"
translation = "「에헤헤, 너는 내가 맛있게 먹어줄 테니까~, 쪽<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あれ？\u3000なんでそんな複雑そうな顔してるんですか？」"
translation = "「어라? 왜 그렇게 복잡한 표정을 짓고 있는 시야?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あ～、確かに自分がモデルのお菓子が食べられちゃうって考えると、ちょっと変な気分になっちゃうかも？」"
translation = "「아~, 확실히 자신이 모델인 과자가 먹혀버린다고 생각하면, 조금 이상한 기분이 들 수도 있겠네?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「でもまあ、お菓子はあくまでお菓子だし！\u3000気にしない気にしない♪」"
translation = "「하지만 뭐, 과자는 어디까지나 과자인 시! 신경 쓰지 마 신경 쓰지 마♪」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ふぁっ！？\u3000会長くん、それはあたしがモデルの……！」"
translation = "「홧!? 회장군, 그건 내가 모델인……!」"

[[dialogue]]
speaker = "unk"
original = "お菓子になっても可愛い"
translation = "과자가 되어도 귀여워"

[[dialogue]]
speaker = "unk"
original = "ちゅっ"
translation = "쪽"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「なななっ……！\u3000た、確かにいざ自分がやられてみると恥ずかしい、かも……」"
translation = "「나나낫……! 하, 확실히 막상 내가 당해보니 부끄러울, 지도……」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「でもでもっ！\u3000そんなこと言ってたら一生食べられないしっ！\u3000どうしたらいいのーーーーっ！！」"
translation = "「하지만 하지만! 그런 말만 하고 있으면 평생 먹을 수 없는 시! 어떻게 해야 하는 시이이이이익!!」"

[[dialogue]]
speaker = "unk"
original = "まさかの問題に、頭を抱えるウズメ。"
translation = "뜻밖의 문제에, 머리를 싸매는 우즈메."

[[dialogue]]
speaker = "unk"
original = "でも、そんなやり取りをひとしきり終えた後、２人で作ったスイートポテトは結局全部美味しく頂いたのだった。"
translation = "하지만, 그런 실랑이를 한바탕 끝낸 후, 둘이서 만든 스위트 포테이토는 결국 전부 맛있게 먹었던 것이다."

