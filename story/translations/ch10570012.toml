[[dialogue]]
speaker = "unk"
original = "第２話,世間知らずの占い師,P"
translation = "제2화, 세상 물정 모르는 점술사, P"

[[dialogue]]
speaker = "unk"
original = "レゾフは極寒の土地であるがゆえに、夜空が人間界よりも澄んで見えるのが特徴だ。"
translation = "레조프는 극한의 땅이기 때문에, 밤하늘이 인간계보다 맑게 보이는 것이 특징이다."

[[dialogue]]
speaker = "unk"
original = "俺とトリシャさんとフィオナの３人で、夜の天体観測をすることになった。"
translation = "나와 트리샤 씨와 피오나 세 사람이서, 밤의 천체 관측을 하게 되었다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「お待たせしました、緋宮会長。温かいお芋のスープです」"
translation = "「기다리셨죠, 히노미야 회장님. 따뜻한 감자 수프예요」"

[[dialogue]]
speaker = "unk"
original = "お帰り、フィオナ"
translation = "왔어, 피오나"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「そろそろお使いから戻ってくる頃だと思っていました……あの、私の分は……」"
translation = "「슬슬 심부름에서 돌아올 즈음이라고 생각하고 있었습니다…… 저기, 제 몫은……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「氷結ヨーグルトですよね。ちゃんと買ってきましたけれど、本当にこんな冷たいものでよろしかったのですか？」"
translation = "「빙결 요구르트죠. 제대로 사 왔습니다만, 정말로 이렇게 차가운 것으로 괜찮으셨나요?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ソフィアなんて『こんな寒い夜に正気ですか！？』と怯えていましたから……」"
translation = "「소피아는 『이런 추운 밤에 제정신인가요!?』라며 겁먹고 있었으니까요……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「フフ……問題ない。私はどんなに寒い日でも、これを食べられる星の下に生まれているので……」"
translation = "「후후…… 문제없어. 나는 아무리 추운 날이라도, 이것을 먹을 수 있는 별 아래에서 태어났으니까……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「良かったらフィオナさんも、どう……？\u3000ヨーグルトを一口……」"
translation = "「괜찮다면 피오나 씨도, 어때……? 요구르트 한 입……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「暖炉の前でならありがたくいただくのですが……」"
translation = "「벽난로 앞이라면 감사히 받겠습니만……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「それは残念……あむ。もぐ……フフ……体の芯から凍える感じがたまりませんね……」"
translation = "「그건 유감이네요…… 냠. 우물…… 후후…… 몸속 깊은 곳부터 얼어붙는 느낌이 참을 수 없네요……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ど、独特な感性ですね、トリシャさん」"
translation = "「도, 독특한 감성이시네요, 트리샤 씨」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「フフフ。さてさて、それでは天体観測の時間です……」"
translation = "「후후후. 자자, 그러면 천체 관측 시간입니다……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「今はベテルギウス、シリウス、プロキオン……この３つが特に輝く時期であり……」"
translation = "「지금은 베텔기우스, 시리우스, 프로키온…… 이 세 개가 특히 빛나는 시기이며……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「──っと。星騎士のお２人には、わざわざ紹介する必要はなかったでしょうか……？」"
translation = "「──앗. 성기사인 두 분께는, 굳이 소개할 필요는 없었을까요……?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「いえ。魔界の夜空で見ると、親しんだはずの星も輝きがまるで違いますから。説明、感謝いたします」"
translation = "「아니요. 마계의 밤하늘에서 보니, 익숙했던 별도 빛남이 전혀 다르니까요. 설명, 감사드려요」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「フフ……それは重畳、です……お２人は戦いの日々で疲れているでしょうし……今夜は心行くまで星を眺めようではありませんか……」"
translation = "「후후…… 그것참 다행이네요…… 두 분은 싸움의 나날로 지쳐 계실 테고…… 오늘 밤은 마음껏 별을 바라보지 않겠습니까……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はい。楽しませていただきますね……っと、緋宮会長？\u3000おくちのところ、スープが跳ねてますよ？」"
translation = "「네. 즐기도록 할게요…… 앗, 히노미야 회장님? 입가에, 수프가 튀어 있어요」"

[[dialogue]]
speaker = "unk"
original = "あれ、本当に？"
translation = "어라, 정말로?"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「動かないでくださいね。ふき、ふき、ふき──はい。綺麗になりました」"
translation = "「움직이지 마세요. 슥, 슥, 슥── 네. 깨끗해졌어요」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「な、な、なんと……！？」"
translation = "「무, 무, 무려……!?」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「まさか……そんな……星のお告げでも、視えなかった事実が……目の前に……！？」"
translation = "「설마…… 그런…… 별의 계시로도, 보이지 않았던 사실이…… 눈앞에……!?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「トリシャさん？」"
translation = "「트리샤 씨?」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「気づきませんでした……お２人の今の自然な動き、態度……これはまさに恋縁……前世から定められし、運命の番……」"
translation = "「눈치채지 못했습니다…… 두 분의 지금 자연스러운 움직임, 태도…… 이것은 그야말로 연분…… 전생부터 정해진, 운명의 짝……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「つ、つがいっ！？\u3000いったい何でそんな……私と緋宮会長は、そういう関係ではありませんよ！？」"
translation = "「짜, 짝이라니!? 대체 왜 그런…… 저와 히노미야 회장님은, 그런 관계가 아니에요!?」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「しかし実に自然に、ハンカチで口元を拭いて……」"
translation = "「하지만 실로 자연스럽게, 손수건으로 입가를 닦아주고……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「これはもう婚約をしていてもおかしくないと……判断、したのですが……」"
translation = "「이것은 이미 약혼을 했어도 이상하지 않다고…… 판단, 했습니다만……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「大げさです！\u3000確かに、その、距離は少し近かったかもしれませんがっ……」"
translation = "「과장이에요! 확실히, 그, 거리는 조금 가까웠을지도 모르겠지만요!」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「そうだったの、ですか……私、師匠以外の方とお喋りしたことがほとんどなく……」"
translation = "「그랬던, 거군요…… 저, 스승님 이외의 분과 이야기해 본 적이 거의 없어서……」"

[[dialogue]]
speaker = "unk"
original = "トリシャさんの生い立ちって？"
translation = "트리샤 씨의 성장 배경은?"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「出身は魔界のシャリオン地方、らしいのですが……不安定な情勢の時に産まれたので、親の顔も知らず……」"
translation = "「출신은 마계의 샤리온 지방, 인 듯합니다만…… 불안정한 정세일 때 태어나서, 부모님의 얼굴도 모르고……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「占星術師だったメラム……師匠に拾われ、各地を転々としながら占い師としての薫陶を授かり……」"
translation = "「점성술사였던 멜람…… 스승님께 거두어져, 각지를 전전하며 점술사로서의 훈도를 전수받고……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「１５の頃に独立して……フフ……それ以来、お２人が初めてできた友達です……」"
translation = "「15살 때 독립해서…… 후후…… 그 이래로, 두 분이 처음으로 생긴 친구입니다……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「なるほど……大変な暮らしだったのですね」"
translation = "「그렇군요…… 고단한 삶이었겠네요」"

[[dialogue]]
speaker = "unk"
original = "対人関係に疎いのも仕方ない"
translation = "대인관계에 서툰 것도 어쩔 수 없지"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「占星術は、星の声を届けるだけ……なので。食べていく分には困らないのですが……」"
translation = "「점성술은, 별의 목소리를 전할 뿐…… 이니까요. 먹고사는 데는 지장이 없었습니다만……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「しかし数年来の謎が解けました……私の目から見て明らかに恋仲であるのに、星に訊ねると『友人』と出たりするので……」"
translation = "「하지만 수년간의 수수께끼가 풀렸습니다…… 제 눈으로 보기에 분명히 연인 사이인데, 별에게 물으면 『친구』라고 나오곤 해서……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「師からもよく言われました。星以外のことにも興味を持ち、たくさんの友人を作り、レディとしての作法を身に付けろと……」"
translation = "「스승님께도 자주 들었습니다. 별 이외의 것에도 흥미를 갖고, 많은 친구를 사귀고, 숙녀로서의 예절을 익히라고……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「それで私たちの頼みに、友人になって欲しいとの返事をしたのですね」"
translation = "「그래서 저희의 부탁에, 친구가 되어주겠다는 대답을 하신 거군요」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「頼むときは死ぬほど緊張しました……私とリンクしている<ruby>おおぐま座８０番星<rt>アルコル</rt></ruby>も、一際輝いていましたとも……」"
translation = "「부탁할 때는 죽을 만큼 긴장했습니다…… 저와 링크되어 있는 <ruby>큰곰자리 80번 별<rt>알코르</rt></ruby>도, 유난히 빛나고 있었고요……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「立派な占星術師になって……いつか、行方不明の師匠の居場所を、占いで突き止めたいから……が、頑張った……フ、フフ……」"
translation = "「훌륭한 점성술사가 되어…… 언젠가, 행방불명된 스승님의 거처를, 점으로 찾아내고 싶으니까…… 가, 간신히 해냈어요…… 후, 후후……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「いつの日か、きっとお師匠様に会えますよ。トリシャさん」"
translation = "「언젠가, 분명 스승님을 만날 수 있을 거예요. 트리샤 씨」"

[[dialogue]]
speaker = "unk"
original = "うん、きっと会える"
translation = "응, 분명 만날 수 있어"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ほんと……？\u3000に、にへ……。お２人は、守護星の輝きに負けない優しさの持ち主……」"
translation = "「정말……? 헤, 헤헤……. 두 분은, 수호성의 빛에 지지 않는 상냥함을 가진 분들……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ホロスコープを通じなくてもわかる……視えますよ、お２人の輝かしい運命の道が……」"
translation = "「호로스코프를 통하지 않아도 알 수 있어요…… 보여요, 두 분의 찬란한 운명의 길이……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「緋宮会長。私、トリシャさんに協力したいです」"
translation = "「히노미야 회장님. 저, 트리샤 씨를 돕고 싶어요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「今でも優秀な占星術師なのですから、多くの人と触れ合い、絆を深めれば、さらなる精度の占いもできるようになるはずですよね」"
translation = "「지금도 우수한 점성술사니까, 많은 사람과 접촉하고, 유대감을 깊게 쌓으면, 더욱 정밀한 점술도 가능해질 게 분명해요」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「にへ……ほ、ほめ過ぎ……」"
translation = "「헤헤…… 너, 너무 칭찬해요……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ですから、いつの日かトリシャさんを人間界へ招待しましょう。星見家、総出でお出迎えさせていただきます！」"
translation = "「그러니까, 언젠가 트리샤 씨를 인간계로 초대하죠. 호시미 가문, 총출동해서 맞이하겠습니다!」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「……えっ？」"
translation = "「……엣?」"

[[dialogue]]
speaker = "unk"
original = "魔族であるトリシャさんを人間界へ連れて行くのは大変だろうけれど、俺にとっても恩人だ。協力するのはもちろん大賛成。"
translation = "마족인 트리샤 씨를 인간계로 데려가는 것은 힘들겠지만, 나에게도 은인이다. 협력하는 것은 물론 대찬성."

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「え、え、えっ……？\u3000私が、人間界の……フィオナさんのお家、に……？」"
translation = "「에, 에, 엣……? 제가, 인간계의…… 피오나 씨의 집에……?」"

[[dialogue]]
speaker = "unk"
original = "ただフィオナの家は、流星市国でも屈指の名家だ。トリシャさんは果たして、耐えられるのだろうか……？"
translation = "다만 피오나의 집은, 유성시국에서도 손꼽히는 명가다. 트리샤 씨는 과연, 견뎌낼 수 있을까……?"

