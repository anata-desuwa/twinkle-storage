[[dialogue]]
speaker = "unk"
original = "第４話,等身大のセーラ,P"
translation = "제4화, 등신대의 세라, P"

[[dialogue]]
speaker = "セーラ"
original = "「──およ？\u3000会長さん？」"
translation = "「──어라? 회장님?」"

[[dialogue]]
speaker = "unk"
original = "そろそろ帰る頃だと思って"
translation = "슬슬 돌아갈 시간이라 생각해서"

[[dialogue]]
speaker = "unk"
original = "お疲れさまです"
translation = "수고하십니다"

[[dialogue]]
speaker = "セーラ"
original = "「えぇー！\u3000うちと一緒に帰るために、わざわざ待っててくれてたの？」"
translation = "「에에-! 나랑 같이 돌아가려고 일부러 기다려준 거야?」"

[[dialogue]]
speaker = "セーラ"
original = "「軽いサプライズ──って、もう。こっちに会長さんがいるなんて思わないから、びっくりしたよ」"
translation = "「가벼운 서프라이즈── 라니, 정말. 여기에 회장님이 있을 줄은 몰랐으니까 깜짝 놀랐잖아.」"

[[dialogue]]
speaker = "セーラ"
original = "「けど……嬉しいかも。うちのために校門で待っててくれるなんて……嬉しい後輩ムーブしてくれるじゃん？」"
translation = "「그치만…… 기쁠지도. 나를 위해서 교문에서 기다려주다니…… 기특한 후배 무브를 보여주잖아?」"

[[dialogue]]
speaker = "セーラ"
original = "「うん、一緒に帰ろ♪\u3000今日は星徒会業務もないんだよね？」"
translation = "「응, 같이 가자♪ 오늘은 성도회 업무도 없는 거지?」"

[[dialogue]]
speaker = "セーラ"
original = "「んー……そだ。せっかくならどこかで遊んでく？」"
translation = "「음-…… 그렇지. 모처럼인데 어디서 놀다 갈까?」"

[[dialogue]]
speaker = "セーラ"
original = "「今ならけっこう時間あるし。ちょうどめちゃ寒かったからさ、リップルちゃんのリゾート結界とか──」"
translation = "「지금이라면 시간 꽤 있고. 마침 엄청 추웠으니까, 리플짱의 리조트 결계라든가──」"

[[dialogue]]
speaker = "セーラ"
original = "「……え？\u3000メンテ中！？」"
translation = "「……에? 점검 중!?」"

[[dialogue]]
speaker = "unk"
original = "夏パワーの落ち込みで"
translation = "여름 파워의 하락 때문에"

[[dialogue]]
speaker = "unk"
original = "この前の事件の影響で"
translation = "요전번 사건의 영향으로"

[[dialogue]]
speaker = "セーラ"
original = "「そっか、リゾート結界自体が緊急拡張中なんだっけ。こりゃ落とし穴だ……」"
translation = "「그렇구나, 리조트 결계 자체가 긴급 확장 중이었지. 이건 함정이었네……」"

[[dialogue]]
speaker = "セーラ"
original = "「全生徒向けのリゾート結界なら開いてる？\u3000なら、全然そっちでも──」"
translation = "「전교생 대상 리조트 결계라면 열려 있어? 그럼 전혀 그쪽이라도──」"

[[dialogue]]
speaker = "セーラ"
original = "「──あっ！\u3000待って！\u3000でも！」"
translation = "「──앗! 잠깐! 하지만!」"

[[dialogue]]
speaker = "unk"
original = "何か問題が？"
translation = "무슨 문제라도?"

[[dialogue]]
speaker = "unk"
original = "どうしました？"
translation = "무슨 일인가요?"

[[dialogue]]
speaker = "セーラ"
original = "「むぅ……いや……会長さんに限って……でも……今さらな話でもあって……うちが釘付けにすれば……ぐむむ……」"
translation = "「으음…… 아니…… 회장님이라면…… 하지만…… 이제 와서 하는 소리기도 하고…… 내가 눈을 떼지 못하게 하면…… 구무무……」"

[[dialogue]]
speaker = "セーラ"
original = "「──よし。大丈夫。行こう！」"
translation = "「──좋아. 괜찮아. 가자!」"

[[dialogue]]
speaker = "セーラ"
original = "「会長さん──そーれ！\u3000あはは、もっとかけちゃえ～！」"
translation = "「회장님── 받아라! 아하하, 더 뿌려버려야지~!」"

[[dialogue]]
speaker = "セーラ"
original = "「……ん？\u3000周りキョロキョロして、どしたの？」"
translation = "「……응? 주위 두리번거리면서 왜 그래?」"

[[dialogue]]
speaker = "unk"
original = "注目されてる"
translation = "주목받고 있어"

[[dialogue]]
speaker = "unk"
original = "目立ちますね"
translation = "눈에 띄네요"

[[dialogue]]
speaker = "セーラ"
original = "「そう？\u3000まーでも、しょうがないんじゃない？」"
translation = "「그래? 뭐- 하지만 어쩔 수 없지 않아?」"

[[dialogue]]
speaker = "セーラ"
original = "「なんたって会長さんは会長さんだから！\u3000魔王だし。有名人だし。ま、多少は有名税ってことで」"
translation = "「뭐니 뭐니 해도 회장님은 회장님이니까! 마왕이고. 유명인이고. 뭐, 어느 정도는 유명세라고 치자고.」"

[[dialogue]]
speaker = "セーラ"
original = "「え……うちもうちで目立つ？」"
translation = "「에…… 나도 나대로 눈에 띈다고?」"

[[dialogue]]
speaker = "セーラ"
original = "「そうかな？\u3000あんま自覚ないけど──まあ星徒会の役員だから、割と知られてはいるのかな……？」"
translation = "「그럴까? 별로 자각은 없는데── 뭐 성도회 임원이니까, 제법 알려져 있긴 하려나……?」"

[[dialogue]]
speaker = "セーラ"
original = "「セーラさんは派手で綺麗だから……？\u3000ほほーん……言うようになったねえ、会長さんも」"
translation = "「세라 씨는 화려하고 예쁘니까……? 호호-ㄴ…… 말솜씨가 늘었네, 회장님도.」"

[[dialogue]]
speaker = "セーラ"
original = "「ま、褒め言葉として受け取っておきましょー！」"
translation = "「뭐, 칭찬으로 받아들여 두자고!」"

[[dialogue]]
speaker = "セーラ"
original = "「それより──会長さんのほうこそ、うちは気になるんだよねえ。むむむっ……！」"
translation = "「그보다── 회장님이야말로 내가 신경 쓰인단 말이지. 으으음……!」"

[[dialogue]]
speaker = "unk"
original = "俺の顔に何か？"
translation = "내 얼굴에 뭐라도?"

[[dialogue]]
speaker = "unk"
original = "……どうしました？"
translation = "……무슨 일인가요?"

[[dialogue]]
speaker = "セーラ"
original = "「いや……うちのことずっと見てくれてるな──って……うん」"
translation = "「아니…… 나를 계속 보고 있구나── 싶어서…… 응.」"

[[dialogue]]
speaker = "セーラ"
original = "「なんでもない！\u3000さ、向こうでまたフライボードチャレンジしよ──！」"
translation = "「아무것도 아니야! 자, 저기서 다시 플라이보드 챌린지 하자──!」"

[[dialogue]]
speaker = "unk"
original = "それからしばらく、セーラさんと浜辺で遊んだ……。"
translation = "그러고 나서 한동안, 세라 씨와 해변에서 놀았다……."

[[dialogue]]
speaker = "セーラ"
original = "「見てみて、夕焼け！\u3000水平線に沈む夕陽って──めっちゃロマンチックじゃない？」"
translation = "「봐봐, 노을! 지평선으로 저무는 석양이라니── 엄청 로맨틱하지 않아?」"

[[dialogue]]
speaker = "セーラ"
original = "「ふふっ、だよね。会長さんと一緒にこんな景色見られるの、嬉しいな」"
translation = "「후훗, 그렇지. 회장님이랑 같이 이런 경치 볼 수 있어서 기뻐.」"

[[dialogue]]
speaker = "セーラ"
original = "「……ん？\u3000今日、うちの様子がちょっと変だった？」"
translation = "「……응? 오늘 내 상태가 좀 이상했다고?」"

[[dialogue]]
speaker = "セーラ"
original = "「……バレたか。実は、ちょっと気がかりだった」"
translation = "「……들켰나. 실은 좀 신경 쓰이는 게 있었거든.」"

[[dialogue]]
speaker = "セーラ"
original = "「ほら。今日はパブリックビーチの方でさあ。周りは可愛い水着の女の子だらけなワケじゃん？」"
translation = "「봐봐. 오늘은 퍼블릭 비치 쪽이잖아. 주변에 귀여운 수영복 차림 여자애들투성이인걸?」"

[[dialogue]]
speaker = "セーラ"
original = "「だから──こっち来たら会長さん、目移りしちゃわないかなって。ちょっと不安になっちゃってた。杞憂だったけどね！」"
translation = "「그래서── 여기 오면 회장님이 한눈팔지 않을까 해서. 조금 불안해졌었어. 기우였지만 말이야!」"

[[dialogue]]
speaker = "セーラ"
original = "「恋人だから当然……？\u3000ふふ、言ってくれるねえ」"
translation = "「연인이니까 당연하다고……? 후후, 말 잘하네.」"

[[dialogue]]
speaker = "セーラ"
original = "「……意外？\u3000そんなことないっしょ」"
translation = "「……의외야? 그럴 리 없잖아.」"

[[dialogue]]
speaker = "セーラ"
original = "「焼きもちくらい……焼くよ。うちだって、１年先輩ってだけで……そんな大した人間じゃないんだからさ」"
translation = "「질투 정도는…… 한다고. 나도 1년 선배일 뿐이지…… 그렇게 대단한 인간은 아니니까 말이야.」"

[[dialogue]]
speaker = "セーラ"
original = "「会長さんの前じゃ、ちょっと無理して格好つけちゃうこともあるってだけで」"
translation = "「회장님 앞이라서 조금 무리해서 멋 부릴 때도 있는 것뿐이고.」"

[[dialogue]]
speaker = "セーラ"
original = "「ホントは……好きな人の前で保てる余裕とか、そんなにないんだからね？」"
translation = "「사실은…… 좋아하는 사람 앞에서 유지할 수 있는 여유 같은 거, 그렇게 많지 않으니까 말이야?」"

[[dialogue]]
speaker = "unk"
original = "ぐっときました"
translation = "뭉클해졌다"

[[dialogue]]
speaker = "unk"
original = "……！"
translation = "……!"

[[dialogue]]
speaker = "セーラ"
original = "「ふふっ、やりぃ。他の子なんて目に入らないよう、会長さんのハートは定期的に射抜いていかなくちゃ」"
translation = "「후훗, 해냈다. 다른 애들 따위 눈에 들어오지 않도록, 회장님의 하트는 정기적으로 꿰뚫어 둬야겠네.」"

[[dialogue]]
speaker = "セーラ"
original = "「今日はうちの部屋……来る？」"
translation = "「오늘은 내 방에…… 올래?」"

[[dialogue]]
speaker = "セーラ"
original = "「ふふっ……大人の階段昇るなら、それも全部一緒がいいよね。会長さん」"
translation = "「후훗…… 어른의 계단을 오른다면, 그것도 전부 함께인 게 좋겠지. 회장님.」"

