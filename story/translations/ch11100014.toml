[[dialogue]]
speaker = "unk"
original = "第４話,プトラの手料理,P"
translation = "제4화, 푸트라의 손요리"

[[dialogue]]
speaker = "unk"
original = "『今日はみんなにあたしのお魚料理をごちそうするよ～♪』と、プトラが高らかに宣言した。"
translation = "『오늘은 모두에게 내 물고기 요리를 대접할게~♪』라고 푸트라가 당당하게 선언했다."

[[dialogue]]
speaker = "プトラ"
original = "「あたし、料理はけっこうやる方なんだけど、こっちの世界の料理に興味があったからいろいろ教えてもらったんだ～」"
translation = "「나, 요리는 꽤 하는 편인데 이쪽 세계 요리에 관심이 있어서 이것저것 배웠거든~」"

[[dialogue]]
speaker = "プトラ"
original = "「キリカさんとか蛍火にも褒めてもらっちゃった。じゃあ今作るから待っててね～」"
translation = "「키리카 씨나 호타루비한테도 칭찬받았어. 그럼 지금 만들 테니까 기다려줘~」"

[[dialogue]]
speaker = "プトラ"
original = "「お待たせしました～。さあ召し上がれ～」"
translation = "「오래 기다리셨습니다~ 자, 드셔보세요~」"

[[dialogue]]
speaker = "アポロ"
original = "「お～、待ちかねたぜ！\u3000じゃさっそくいただきます。あむっ、もぐもぐ……」"
translation = "「오~ 기다리고 있었다고! 그럼 당장 잘 먹겠습니다. 냠냠, 우물우물……」"

[[dialogue]]
speaker = "プトラ"
original = "「どうかな？」"
translation = "「어때?」"

[[dialogue]]
speaker = "アポロ"
original = "「ん、美味いっ！」"
translation = "「음, 맛있어!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「こっちの天ぷらもいいわね！\u3000サクサクしてて、中身はプリプリね♪」"
translation = "「이쪽 튀김도 좋네! 바삭바삭하고 속은 탱글탱글해♪」"

[[dialogue]]
speaker = "フィオナ"
original = "「煮物の味付けも完璧です」"
translation = "「조림 간도 완벽해요.」"

[[dialogue]]
speaker = "プトラ"
original = "「ありがとう♪\u3000喜んでくれてよかったぁ～♪」"
translation = "「고마워♪ 기뻐해 주니 다행이다~♪」"

[[dialogue]]
speaker = "プトラ"
original = "「元の世界に戻ったら、特鉄隊のみんなにもご馳走してあげようっと♪」"
translation = "「원래 세계로 돌아가면 특철대 친구들에게도 대접해줘야지♪」"

[[dialogue]]
speaker = "unk"
original = "きっと喜んでもらえるよ"
translation = "분명 좋아할 거야"

[[dialogue]]
speaker = "プトラ"
original = "「うんっ！\u3000えへへ～♪」"
translation = "「응! 에헤헤~♪」"

[[dialogue]]
speaker = "プトラ"
original = "「よーし、場もあったまってきたことだし、とっておきのネタを披露するね～！」"
translation = "「좋아, 분위기도 무르익었으니 비장의 장기를 선보일게!」"

[[dialogue]]
speaker = "アポロ"
original = "「おっ、何が始まるんだ？」"
translation = "「오, 뭐가 시작되는 거지?」"

[[dialogue]]
speaker = "プトラ"
original = "「実はあたし、まだみんなに見せていなかった隠れ特技を持ってるんだよ」"
translation = "「사실 나, 아직 모두에게 보여주지 않은 숨겨진 특기가 있거든.」"

[[dialogue]]
speaker = "プトラ"
original = "「お披露目できる絶好の機会をずーっと伺ってたんだけど、ちょうどいいからここで初披露しちゃうね♪」"
translation = "「보여줄 수 있는 절호의 기회를 계속 엿보고 있었는데, 마침 잘 됐으니 여기서 처음으로 보여줄게♪」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「何が始まるのかしら。楽しみね！」"
translation = "「뭐가 시작될지 기대되네!」"

[[dialogue]]
speaker = "プトラ"
original = "「では、いきます……」"
translation = "「그럼, 갑니다……」"

[[dialogue]]
speaker = "プトラ"
original = "「まずは定番！\u3000大シケの日の海藻のまね～♪」"
translation = "「우선 기본! 파도가 거친 날의 해초 흉내~♪」"

[[dialogue]]
speaker = "みんな"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "プトラ"
original = "「からの～、長男スライムの求愛ダンス～♪」"
translation = "「거기서 이어지는~ 장남 슬라임의 구애 댄스~♪」"

[[dialogue]]
speaker = "みんな"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "プトラ"
original = "「そして次男スライムの求愛ダンス～♪」"
translation = "「그리고 차남 슬라임의 구애 댄스~♪」"

[[dialogue]]
speaker = "プトラ"
original = "「そしてそして～、三男スライムの求愛ダ～ンス♪」"
translation = "「그리고 그리고~ 삼남 슬라임의 구애 댄~스♪」"

[[dialogue]]
speaker = "みんな"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "（空気が……冷えた……）"
translation = "(공기가…… 식었다……)"

[[dialogue]]
speaker = "アポロ"
original = "「な、何ていうか……すごいな……」"
translation = "「뭐, 뭐랄까…… 대단하네……」"

[[dialogue]]
speaker = "フィオナ"
original = "「ええ。スライムを見たことが無いのでよく分からないですけど、雰囲気は伝わりました……」"
translation = "「네. 슬라임을 본 적이 없어서 잘 모르겠지만 분위기는 전해졌어요……」"

[[dialogue]]
speaker = "プトラ"
original = "「あたしも見たことないよ～。だから雰囲気が伝わったのならオッケー！」"
translation = "「나도 본 적 없어~. 그러니까 분위기가 전해졌다면 오케이!」"

[[dialogue]]
speaker = "フィオナ"
original = "「あ、あはは……そうですか……」"
translation = "「아, 아하하…… 그렇군요……」"

[[dialogue]]
speaker = "プトラ"
original = "「まだまだレパートリーはあるからね。どんどん行くよ～♪」"
translation = "「아직 레퍼토리는 더 있으니까. 계속 간다~♪」"

[[dialogue]]
speaker = "フィオナ"
original = "「ま、まだあるんですか？」"
translation = "「더, 더 있나요?」"

[[dialogue]]
speaker = "プトラ"
original = "「いっぱいあるよ～。フレイマリンが誇る爆笑女王とはあたしのことさっ♪」"
translation = "「잔뜩 있어~. 프레이마린이 자랑하는 폭소 여왕이란 바로 나를 말하는 거지♪」"

[[dialogue]]
speaker = "プトラ"
original = "「このお笑いの腕を見込まれて、芸をやって欲しいってお願いされたことだってあるんだよ」"
translation = "「이 개그 실력을 인정받아서 장기를 보여달라는 부탁을 받은 적도 있다니까.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ええっ！？\u3000すごいじゃない！」"
translation = "「에엣!? 대단하잖아!」"

[[dialogue]]
speaker = "プトラ"
original = "「あたしのこと、笑顔と一緒に覚えててね！\u3000あたしもみんなの笑顔、忘れないから！」"
translation = "「나라는 사람을 미소와 함께 기억해줘! 나도 모두의 미소, 잊지 않을 테니까!」"

[[dialogue]]
speaker = "unk"
original = "そしてプトラ主催のお食事会が開かれた少し後、別れの時はやってきた。"
translation = "그리고 푸트라 주최의 식사 모임이 열린 지 조금 뒤, 이별의 때는 찾아왔다."

[[dialogue]]
speaker = "unk"
original = "このお祭り騒ぎを起こした黒ベア子が、ベア子という少女によって連れ戻され、アルテとプトラも元の世界へと帰っていったのだった。"
translation = "이 축제 소동을 일으킨 흑베아코가 베아코라는 소녀에 의해 끌려가고, 아르테와 푸트라도 원래 세계로 돌아갔던 것이었다."

[[dialogue]]
speaker = "アポロ"
original = "「んー……」"
translation = "「음-……」"

[[dialogue]]
speaker = "フィオナ"
original = "「ぼんやりしてどうしたんですか、姉さん」"
translation = "「멍하니 왜 그래요, 언니.」"

[[dialogue]]
speaker = "アポロ"
original = "「いや、ちょっとな。プトラのやつ急に帰っちゃったから……」"
translation = "「아니, 그냥 좀. 푸트라 녀석 갑자기 돌아가 버렸으니까……」"

[[dialogue]]
speaker = "アポロ"
original = "「まだまだ一緒に見たい流星ライダーシリーズもあったし、一緒に遊びたいこともたくさんあったのに……」"
translation = "「아직 같이 보고 싶은 유성 라이더 시리즈도 있었고, 같이 놀고 싶은 것도 잔뜩 있었는데……」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふふ、寂しいんですね。そんな姉さんに、はい、どうぞ」"
translation = "「후후, 외로우시군요. 그런 언니에게 자, 여기요.」"

[[dialogue]]
speaker = "アポロ"
original = "「これは？」"
translation = "「이건?」"

[[dialogue]]
speaker = "フィオナ"
original = "「プトラさんからの手紙です」"
translation = "「푸트라 씨가 남긴 편지예요.」"

[[dialogue]]
speaker = "アポロ"
original = "「……！！」"
translation = "「……！！」"

[[dialogue]]
speaker = "プトラ"
original = "『フィオナさん、アポロさん。この手紙が読まれる時、あたしはこの世界にはいないでしょう。なーんてね♪』"
translation = "『피오나 씨, 아폴로 씨. 이 편지를 읽고 계실 때, 전 이 세계에 없겠죠. 농담이에요♪』"

[[dialogue]]
speaker = "プトラ"
original = "『２人には特にお世話になってるからね。いつ元の世界に帰ることになっても大丈夫なように、手紙を書いておいたよ』"
translation = "『두 분에겐 특히 신세를 졌으니까요. 언제 원래 세계로 돌아가게 되어도 괜찮도록, 편지를 써 두었어요』"

[[dialogue]]
speaker = "プトラ"
original = "『短い間だったけど、みんなと過ごせて本当によかった』"
translation = "『짧은 시간이었지만, 모두와 지낼 수 있어서 정말 좋았어요』"

[[dialogue]]
speaker = "プトラ"
original = "『毎日が楽しくて、いい人ばかりで、こんな素敵な世界が滅んじゃうなんて絶対ダメだと思う！\u3000だから仲間と力を合わせて守ってください、流星ライダーレイルみたいに！』"
translation = "『매일매일이 즐겁고, 좋은 사람들뿐이라, 이런 멋진 세계가 멸망해버리는 건 절대 안 된다고 생각해요! 그러니까 동료들과 힘을 합쳐서 지켜주세요, 유성 라이더 레일처럼!』"

[[dialogue]]
speaker = "プトラ"
original = "『あたしもあたしの世界を──イリスクラウドを、特鉄隊のみんなと一緒に守っていきます！』"
translation = "『저도 저의 세계를──이리스 클라우드를, 특철대 여러분과 함께 지켜나가겠습니다!』"

[[dialogue]]
speaker = "プトラ"
original = "『ホントに、ホントにありがとう！\u3000大好きです…………プトラ』"
translation = "『정말로, 정말로 고마워요! 정말 좋아해요…………푸트라』"

[[dialogue]]
speaker = "アポロ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "フィオナ"
original = "「不思議な方でしたね。天真爛漫に見えて、いろんな事をちゃんとしっかり考えていて」"
translation = "「신비로운 분이었죠. 천진난만해 보이면서도, 여러 가지 일을 제대로 깊이 생각하고 계셔서」"

[[dialogue]]
speaker = "アポロ"
original = "「周りのこともちゃんと見ててな……優しくていいヤツだよ……アイツは……」"
translation = "「주변 사람들도 잘 챙겨줬지…… 상냥하고 좋은 녀석이야…… 그 녀석은……」"

[[dialogue]]
speaker = "フィオナ"
original = "「姉さん。プトラさんが一番大事にしてることは何でしたか？」"
translation = "「언니. 푸트라 씨가 가장 소중하게 여기던 건 뭐였죠?」"

[[dialogue]]
speaker = "アポロ"
original = "「……へへっ、ちゃんと分かってるよ。『笑顔でいることを忘れちゃいけない』だろ？」"
translation = "「……헤헤, 잘 알고 있다고. 『웃는 얼굴로 있는 걸 잊어서는 안 된다』지?」"

[[dialogue]]
speaker = "フィオナ"
original = "「はい……」"
translation = "「네……」"

[[dialogue]]
speaker = "unk"
original = "プトラが帰って以来、寂しそうにしていたアポロの表情に陽が差した。"
translation = "푸트라가 돌아간 이래, 쓸쓸해 보이던 아폴로의 표정에 햇살이 비쳤다."

[[dialogue]]
speaker = "フィオナ"
original = "（ありがとう……プトラさん……）"
translation = "（고마워요…… 푸트라 씨……）"

[[dialogue]]
speaker = "unk"
original = "そんな姉の姿を見て、フィオナは心の中で異世界の友人に感謝の言葉をつぶやいたのだった。"
translation = "그런 언니의 모습을 보며, 피오나는 마음속으로 이세계의 친구에게 감사의 말을 중얼거렸다."

