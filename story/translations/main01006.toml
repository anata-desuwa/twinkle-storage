[[dialogue]]
speaker = "unk"
original = "第８話,作戦準備,B"
translation = "제8화, 작전 준비, B"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスからの『<ruby>Ｗｈｅｎ<rt>いつ</rt></ruby>』に目星をつけた俺たち。"
translation = "비너스에게서 온 『When』에 목표를 둔 우리."

[[dialogue]]
speaker = "unk"
original = "『冬』という天災に立ち向かうため、各自で準備を行いつつ……"
translation = "『겨울』이라는 천재지변에 맞서기 위해, 각자 준비를 하면서……"

[[dialogue]]
speaker = "unk"
original = "もうひとつの手がかりから、彼女の『<ruby>Ｗｈｅｒｅ<rt>どこ</rt></ruby>』を割り出すことに腐心するのだった。"
translation = "또 하나의 단서로부터, 그녀의 『Where』를 알아내는 데 골몰하는 것이었다."

[[dialogue]]
speaker_original = "リタおばさん"
speaker_translation = "리타 아주머니"
original = "「ほら！\u3000とっととここの雪をかいて、あっちに<ruby>薪<rt>まき</rt></ruby>を運ぶんだよ──急いだ急いだ」"
translation = "「자! 어서 여기 눈을 치우고, 저쪽에 장작을 나르는 거야── 서둘러 서둘러」"

[[dialogue]]
speaker_original = "リタおばさん"
speaker_translation = "리타 아주머니"
original = "「それから、グロウジカの毛皮を取ってきてもらおうかね。他にも悪魔リスの頬袋なんかがあるといいよ。防風網に使うのさ」"
translation = "「그리고, 그로우지카의 모피를 가져오게 해야겠네. 그 외에도 악마 다람쥐의 볼주머니 같은 게 있으면 좋아. 방풍망에 쓰는 거란다」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ひ、ひええ。そんな文化があるんだ……」"
translation = "「히, 히이익. 그런 문화가 있구나……」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「ニャ、ニャんでワガハイがこんなことに駆り出されなきゃならないニャン……！？」"
translation = "「냐, 냐옹이가 왜 이런 일에 동원되어야 하는 거다 냥……!?」"

[[dialogue]]
speaker_original = "リタおばさん"
speaker_translation = "리타 아주머니"
original = "「若い労働力はいつだって貴重だからねえ。はっはっ……」"
translation = "「젊은 노동력은 언제나 귀중하니까 말이야. 핫핫……」"

[[dialogue]]
speaker_original = "リタおばさん"
speaker_translation = "리타 아주머니"
original = "「まあ安心しな。今言った素材がありゃ、例のブツだって作れるはずさ」"
translation = "「뭐, 안심해. 지금 말한 재료가 있으면, 그 물건도 만들 수 있을 테니까」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker_original = "リタおばさん"
speaker_translation = "리타 아주머니"
original = "「『大いなる冬』の当日に出かけようってんだろ？\u3000そんな命知らずには──専用の防寒具が必要だろうからね！」"
translation = "「『대자연의 겨울』 당일에 나가려고 하는 거지? 그런 목숨을 모르는 사람에게는── 전용 방한구가 필요할 테니까!」"

[[dialogue]]
speaker_original = "レゾフの住人"
speaker_translation = "레조프 주민"
original = "「おお──おおっ？\u3000な、なんだこの火は……水をかけても消えないぞ？」"
translation = "「오오── 오옷? 무, 뭐야 이 불은…… 물을 뿌려도 안 꺼지잖아?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「炎の星術──ま、特別製でな。消えない聖火みたいなもんだと思ってくれ」"
translation = "「불꽃의 성술── 뭐, 특별 제작이라서 말이야. 안 꺼지는 성화 같은 거라고 생각해 줘」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「それと……いくら風に吹かれても動かないようにしといたから、吹雪の当日にも役立つはずだ」"
translation = "「게다가…… 아무리 바람이 불어도 움직이지 않도록 해뒀으니까, 눈보라 당일에도 도움이 될 거다」"

[[dialogue]]
speaker_original = "レゾフの住人"
speaker_translation = "레조프 주민"
original = "「マジかよ……大助かりだ！」"
translation = "「진짜냐…… 큰 도움이 되겠네!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「助かります、ユウリ先輩。レゾフのために」"
translation = "「도움이 됩니다, 유우리 선배. 레조프를 위해서」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ま、お互い様だろ。ソフィアの地元ってんなら……喜んで手を貸すさ」"
translation = "「뭐, 피차일반이지. 소피아의 고향이라고 한다면…… 기꺼이 도와줄게」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「それに──当日万全に動くためにも、準備は欠かせねえからな」"
translation = "「게다가── 당일 만전으로 움직이기 위해서라도, 준비는 필수니까」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「……ですね」"
translation = "「……그렇네요」"

[[dialogue]]
speaker_original = "レゾフの住人"
speaker_translation = "레조프 주민"
original = "「そういやあんたら……人探しをしてるんだって？」"
translation = "「그러고 보니 너희들…… 사람을 찾고 있다고 했지?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ん？\u3000ああ。かなり緊急でな」"
translation = "「응? 아아. 꽤 긴급해서 말이야」"

[[dialogue]]
speaker_original = "レゾフの住人"
speaker_translation = "레조프 주민"
original = "「だったらあのお方を頼るといい！\u3000俺も失くした財布を見つけてもらったことがある！」"
translation = "「그렇다면 그분을 의지하는 게 좋을 거야! 나도 잃어버린 지갑을 찾아달라고 한 적이 있어!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「あのお方……？」"
translation = "「그분……?」"

[[dialogue]]
speaker_original = "レゾフの住人"
speaker_translation = "레조프 주민"
original = "「伝説の占い師だよ！\u3000ちょっと前からレゾフでたまに見かけるんだが──これが最高によく当たるんだ！」"
translation = "「전설의 점술가야! 조금 전부터 레조프에서 가끔 보이는데── 이게 최고로 잘 맞춘다니까!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「あ、いえ……そういったものはアテにできないというか……」"
translation = "「아, 아니요…… 그런 것은 믿을 수 없다고 할까……」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「いや、待てソフィア。こういうところにヒントが転がってる可能性もある」"
translation = "「아니, 기다려 소피아. 이런 곳에 힌트가 굴러다닐 가능성도 있어」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "（ほ、本当に……？）"
translation = "（정, 정말로……?）"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「じゃあ──『森』に心当たりはないんでしょうか？」"
translation = "「그럼── 『숲』에 대해 짐작 가는 곳은 없을까요?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「正確に言うと……ありすぎる、と言ったほうがいいわね」"
translation = "「정확히 말하면…… 너무 많다고 하는 편이 좋겠네」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ここまで来る途中でわかったと思うけれど──魔界は都市部以外、ほとんどが未開拓の地域よ」"
translation = "「여기까지 오는 도중에 알았겠지만── 마계는 도시부를 제외하면, 대부분이 미개척 지역이야」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「森も、林も、街を出ればいくらだって広がってる。ヴィーナスちゃんがどこの森を指しているのか……特定できなきゃダメだわ」"
translation = "「숲도, 수풀도, 마을을 나서면 얼마든지 펼쳐져 있어. 비너스짱이 어느 숲을 가리키는 건지…… 특정할 수 없으면 안 돼」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「なるほど……」"
translation = "「과연……」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスの残るメッセージ──『森』についてサーシャ先輩から話を聞いていた。"
translation = "비너스가 남긴 메시지── 『숲』에 대해 사샤 선배에게 이야기를 듣고 있었다."

[[dialogue]]
speaker = "unk"
original = "しかしやはり、『冬』のようにピンとくる心当たりは見つからない。"
translation = "하지만 역시, 『겨울』처럼 딱 떠오르는 짐작 가는 곳은 찾을 수 없다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「昨日のうちに──この周辺にある森林地帯はリストアップしておいたわ。ただ、魔界の広さを考えると……」"
translation = "「어제 중에── 이 주변에 있는 산림 지대는 리스트업 해뒀어. 다만, 마계의 넓이를 생각하면……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「しらみ潰しじゃキリがない……ですか」"
translation = "「샅샅이 뒤져서는 끝이 없다는…… 말씀이십니까」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「……どうしようかしら。魔界で人探しといったら、祭壇に供物を捧げて祈るか、占ってもらうかしかなくて──」"
translation = "「……어떻게 해야 할까. 마계에서 사람 찾기라고 하면, 제단에 공물을 바치고 기도하거나, 점을 치는 수밖에 없는데──」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……いえ。このリストは助かります。ここから絞れるかもしれません」"
translation = "「……아닙니다. 이 리스트는 도움이 됩니다. 여기서 좁힐 수 있을지도 모릅니다」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「本当？\u3000私も、他に関連性がないか探ってみるわね」"
translation = "「정말? 나도, 다른 관련성이 없는지 찾아볼게」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「会長くんの熱意なら──どんな吹雪が来たって平気なはずよ♪\u3000だから……無理はしないでね」"
translation = "「회장 군의 열의라면── 어떤 눈보라가 와도 괜찮을 거야♪ 그러니까…… 무리는 하지 마」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「はは……ありがとうございます」"
translation = "「하하…… 감사합니다」"

[[dialogue]]
speaker = "unk"
original = "撫で撫でされた。"
translation = "쓰다듬어졌다."

[[dialogue]]
speaker = "unk"
original = "いつもより温もりが感じられたのは……きっと、ここが極寒の街だからだろう。"
translation = "평소보다 온기가 느껴진 것은…… 분명, 이곳이 혹한의 도시이기 때문일 것이다."

[[dialogue]]
speaker = "unk"
original = "それからまたしばらく──"
translation = "그리고 또 한동안──"

[[dialogue]]
speaker = "unk"
original = "『冬』の作戦行動へ向けて、俺たちはやるべきことを急いだ。"
translation = "『겨울』 작전 행동을 향해, 우리는 해야 할 일을 서둘렀다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「──よう、フィオナ。ご苦労さん」"
translation = "「──어이, 피오나. 수고했어」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「お疲れさまです、フィオナ会長。大丈夫でしたか？」"
translation = "「수고하셨습니다, 피오나 회장. 괜찮으셨나요?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ユウリ──ソフィア──うん。そっちも頑張ってくれたみたいね、ありがとう」"
translation = "「유우리── 소피아── 응. 너희도 열심히 해준 것 같네, 고마워」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「フィオナは──長老さんから話を聞いてたんだったか？」"
translation = "「피오나는── 장로에게서 이야기를 듣고 온 거였나?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ええ。流星教皇──それから星見の名もご存知のようだったので、すんなりお話ができました」"
translation = "「네. 유성 교황── 그리고 별을 보는 자의 이름도 알고 계신 것 같아서, 순조롭게 이야기를 나눌 수 있었습니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「おかげで──『冬』という天災の恐ろしさも、十分に把握しました」"
translation = "「덕분에── 『겨울』이라는 천재지변의 무서움도, 충분히 파악했습니다」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ヤバそうか？」"
translation = "「위험할 것 같아?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……ですね。アステラまでも凍りつく──というのは過言ではなく、街の人たちは一日中地下にこもっているようです」"
translation = "「……그렇네요. 아스테라까지 얼어붙는다──는 것은 과언이 아니며, 마을 사람들은 하루 종일 지하에 틀어박혀 있는 것 같습니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「どうしてもその当日に出かけたい──と伝えると、渋面をされてしまいましたが」"
translation = "「어떻게든 그 당일에 외출하고 싶다──고 전하니, 곤란한 표정을 지으셨지만요」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「はい。レゾフの住人からすると……信じられないことです」"
translation = "「네. 레조프의 주민들로서는…… 믿을 수 없는 일입니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「それでもこの街に伝わる防寒装備……それからユウリの炎の盾と、私の太陽の星術。これらが揃えば当日の行動は可能だと思います」"
translation = "「그럼에도 이 마을에 전해지는 방한 장비…… 그리고 유우리의 불꽃 방패와, 저의 태양의 성술. 이것들이 갖춰지면 당일 행동은 가능하다고 생각합니다」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「だよな。ったく、ヴィーナスも無茶言ってくれるぜ」"
translation = "「그렇겠지. 에잇, 비너스도 억지를 부리는군」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「あはは……本当ですね」"
translation = "「아하하…… 정말이네요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……ただ、一点」"
translation = "「……다만, 한 가지」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「大いなる冬──最凶の吹雪──その脅威は理解したつもりなのですが」"
translation = "「대자연의 겨울── 최악의 눈보라── 그 위협은 이해했다고 생각합니다만」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「長老さんは『冬の到来だけなら、こもっていれば済む』と仰っていました。その言い方がなんだか、気にかかってしまって」"
translation = "「장로님은 『겨울이 오는 것만이라면, 틀어박혀 있으면 된다』고 말씀하셨습니다. 그 말투가 왠지, 마음에 걸려서요」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「冬だけなら……か。確かに気になるな」"
translation = "「겨울만이라면……인가. 확실히 신경 쓰이네」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「春とか夏とか、ひょっとしてそれ以上の脅威があるってのか？」"
translation = "「봄이나 여름이라든가, 혹시 그 이상의 위협이 있다는 건가?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「あ、いえ、それは恐らく──」"
translation = "「아, 아니요, 그것은 아마도──」"

[[dialogue]]
speaker = "？？？"
original = "「──『スタンピード』さ。お嬢さん」"
translation = "「──『스탬피드』다. 아가씨」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「！？」"
translation = "「!?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ん？\u3000なんだ……あんたは？」"
translation = "「응? 뭐야…… 당신은?」"

[[dialogue]]
speaker = "？？？"
original = "「名乗るほどのものではない。ま、旅人とでも言っておこうか──君たちと同じ──ね」"
translation = "「이름을 밝힐 정도는 아니다. 뭐, 떠돌이 여행자라고 해두지── 너희들과 같은──」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "（……なあソフィア、こいつは？）"
translation = "（……야, 소피아, 이 사람은?）"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "（ええと……いえ、見たことのない方です。ご本人の言うように外部からの来訪者かと）"
translation = "（음…… 아니요, 본 적 없는 분입니다. 본인이 말한 대로 외부에서 온 방문객인 것 같습니다）"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "（とはいえ……レゾフに人間が来るなんて、滅多にあることじゃありませんが……）"
translation = "（그렇다고 해도…… 레조프에 인간이 오는 일은, 좀처럼 없는 일입니다만……）"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「なるほど──<b>旅人</b>さん。そのスタンピードとは、一体？」"
translation = "「과연── <ruby>떠돌이 여행자<rt>・・・ ・・・</rt></ruby> 씨. 그 스탬피드란, 대체?」"

[[dialogue]]
speaker = "？？？"
original = "「うむ。ここの住人なら誰しも知っていることじゃないかな」"
translation = "「음. 여기 주민이라면 누구나 아는 것 아닌가」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「わ、私ですか？」"
translation = "「저, 저 말인가요?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「そうですね──スタンピードは……『大いなる冬』の到来とともに、稀に見られる現象です」"
translation = "「그렇습니다── 스탬피드는…… 『대자연의 겨울』이 도래함과 함께, 드물게 볼 수 있는 현상입니다」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ざっくり言うと、凶暴な魔獣たちが一斉に目覚めてやってきます」"
translation = "「대략적으로 말하면, 흉포한 마수들이 일제히 깨어나 몰려옵니다」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「な！？」"
translation = "「뭐!?」"

[[dialogue]]
speaker = "？？？"
original = "「フフ……その通り。いわば二次災害と言ったところか」"
translation = "「후후…… 그 말대로. 이른바 2차 재해라고 할 수 있지」"

[[dialogue]]
speaker = "？？？"
original = "「ここ──ズヴィエダ地方の一帯には、特に寒冷な気候でのみ生息する魔獣たちがいる」"
translation = "「여기── 즈비에다 지방 일대에는, 특히 한랭한 기후에서만 서식하는 마수들이 있다」"

[[dialogue]]
speaker = "？？？"
original = "「そしてそれらの魔獣は──冬眠ならぬ夏眠を行うことで知られている。これはつまり、温暖な時期を穴ぐらの中で過ごすのさ」"
translation = "「그리고 그 마수들은── 동면이 아닌 하면을 하는 것으로 알려져 있다. 이것은 즉, 따뜻한 시기를 굴 속에서 보내는 것이지」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「冬眠の逆、ってことか……」"
translation = "「동면의 반대, 라는 건가……」"

[[dialogue]]
speaker = "？？？"
original = "「ゆえにそれらの魔獣は──『大いなる冬』の到来に伴い、一斉に穴から出て活動を開始する」"
translation = "「그러므로 그 마수들은── 『대자연의 겨울』의 도래에 따라, 일제히 굴에서 나와 활동을 개시한다」"

[[dialogue]]
speaker = "？？？"
original = "「食糧を求め、人里を襲うようになる。その現象こそが『スタンピード』だ」"
translation = "「식량을 찾아, 인가를 습격하게 된다. 그 현상이야말로 『스탬피드』다」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「人間界で言えば──人食い熊が降りてくるみたいなもんか……？」"
translation = "「인간계로 말하면── 사람 잡아먹는 곰이 내려오는 것 같은 건가……?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「近いかと。とはいえ、規模はその比ではありませんが」"
translation = "「비슷합니다. 그렇다고 해도, 규모는 그에 비할 바가 아니지만요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ただでさえ全面凍結する猛吹雪に加え、魔獣の襲来──弱り目に祟り目ですね」"
translation = "「안 그래도 전면 동결하는 맹렬한 눈보라에 더해, 마수의 습격── 설상가상이네요」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「じゃあ……ヤベェじゃねえか！\u3000そっちの対策もしておかねえと──」"
translation = "「그럼…… 위험하잖아! 그쪽 대책도 세워야지──」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「いえ。スタンピードは十数年に一度しか起こらない現象です。私も、二年前に一度だけしか覚えがありません」"
translation = "「아닙니다. 스탬피드는 십수 년에 한 번밖에 일어나지 않는 현상입니다. 저도, 2년 전에 한 번밖에 기억이 없습니다」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「そして周期を考えれば、当分は安全と言ってもよいでしょう」"
translation = "「그리고 주기를 생각하면, 당분간은 안전하다고 해도 좋을 것입니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……なるほど。だから、長老さんは『冬の到来だけなら』と言っていたのね」"
translation = "「……과연. 그래서, 장로님은 『겨울이 오는 것만이라면』이라고 말씀하셨던 거군요」"

[[dialogue]]
speaker = "？？？"
original = "「ああ。とはいえ──不穏分子がないわけではない。近年になって、近隣には強大な魔獣のねぐらが多数確認されているとも聞く」"
translation = "「아아. 그렇다고 해도── 불온 분자가 없는 것은 아니다. 최근 들어, 근처에는 강대한 마수의 소굴이 다수 확인되고 있다는 이야기도 듣는다」"

[[dialogue]]
speaker = "？？？"
original = "「それに通常、魔獣の侵攻に対しては半年ほど前から罠を張るが……今のレゾフにはその準備もない」"
translation = "「게다가 보통, 마수의 침공에 대해서는 반년 전부터 덫을 놓지만…… 지금의 레조프에는 그 준비도 없다」"

[[dialogue]]
speaker = "？？？"
original = "「もしスタンピードが今年に起きたら──ふふ。それはさぞ難儀な事態というわけさ！」"
translation = "「만약 스탬피드가 올해 일어난다면── 후후. 그것은 참으로 난처한 사태라는 것이지!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「笑い事じゃないんですけど……」"
translation = "「웃을 일이 아닌데요……」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "（ていうかなんなんだよ、この人は……）"
translation = "（그나저나 뭐야, 이 사람은……）"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "？？？"
original = "「ま、頭の片隅にくらいには入れておいたほうがいいと思ってね」"
translation = "「뭐, 머릿속 한구석에라도 넣어두는 게 좋을 것 같아서 말이야」"

[[dialogue]]
speaker = "？？？"
original = "「私も『冬』まではここに滞在するつもりだ。いずれ再び<ruby>見<rt>まみ</rt></ruby>えることもあろう──ではな」"
translation = "「나도 『겨울』까지는 여기에 체류할 생각이다. 언젠가 다시 만나는 일도 있겠지── 그럼」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「……行っちゃったよ。なんつうか、世界には変わりもんが多いな」"
translation = "「……가버렸네. 뭐랄까, 세상에는 별난 사람이 많군」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「……謎めいた方でしたね。しかも、わざわざ『冬』の時期に滞在するなんて……」"
translation = "「……수수께끼 같은 분이셨네요. 게다가, 일부러 『겨울』 시기에 체류하다니……」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「スタンピード……な。なんつーかビビっちまったけど、いつも起きるってわけじゃないんだろ？」"
translation = "「스탬피드……라. 뭐랄까 겁먹긴 했지만, 항상 일어나는 건 아니잖아?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ええ。それよりも、確実に来る寒波に備えましょう」"
translation = "「네. 그것보다, 확실히 올 한파에 대비합시다」"

