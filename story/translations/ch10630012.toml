[[dialogue]]
speaker = "unk"
original = "第２話,任務は忠実に,P"
translation = "제2화, 임무는 충실하게, P"

[[dialogue]]
speaker = "カヤ"
original = "「ここが人間界……」"
translation = "「여기가 인간계……」"

[[dialogue]]
speaker = "カヤ"
original = "「随分と騒がしいところ……。それに死角も多い……。不意に襲われたらひとたまりもなさそう……」"
translation = "「상당히 소란스러운 곳……. 게다가 사각지대도 많아……. 불시에 습격당하면 속수무책일 것 같아……」"

[[dialogue]]
speaker = "カヤ"
original = "「長官は気楽にって言ってたけど……中々ハードな任務になりそう」"
translation = "「장관님은 편하게 하라고 하셨지만…… 꽤 하드한 임무가 될 것 같아.」"

[[dialogue]]
speaker = "unk"
original = "……本当にずっと付いてくるつもり？"
translation = "……정말 계속 따라올 생각이야?"

[[dialogue]]
speaker = "カヤ"
original = "「だとしたら何？\u3000文句は受け付けない」"
translation = "「그렇다면 어쩔 건데? 불만은 안 받아.」"

[[dialogue]]
speaker = "カヤ"
original = "「それよりも……んっ。もっとくっつく」"
translation = "「그것보다…… 응. 좀 더 달라붙겠어.」"

[[dialogue]]
speaker = "カヤ"
original = "「自分が護衛対象の自覚ある？\u3000あまり離れられるといざという時、守ることできない」"
translation = "「자신이 호위 대상이라는 자각 있어? 너무 떨어져 있으면 유사시에 지킬 수 없어.」"

[[dialogue]]
speaker = "カヤ"
original = "「それとも私が年下だと思ってやっぱり舐めてる？\u3000これでも私の普段の任務は単独での隠密潜行。何事も一人で切り抜ける実力は備えてる」"
translation = "「아니면 내가 어리다고 생각해서 역시 얕보는 거야? 이래 봬도 내 평소 임무는 단독 은밀 잠행. 모든 일을 혼자서 헤쳐 나갈 실력은 갖추고 있어.」"

[[dialogue]]
speaker = "カヤ"
original = "「それに……その場に溶け込むことに関しても得意中の得意。こうしてくっついているのだって周りを観察してのこと」"
translation = "「게다가…… 그 장소에 녹아드는 것에 관해서도 특기 중의 특기. 이렇게 붙어 있는 것도 주변을 관찰해서 내린 결론이야.」"

[[dialogue]]
speaker = "カヤ"
original = "「……なに苦笑いしてる。よく見る。周囲の男女、みんなこのくらいの密着度合いで歩いてる」"
translation = "「……왜 쓴웃음을 지어. 잘 봐. 주변 남녀들, 다들 이 정도 밀착도로 걷고 있어.」"

[[dialogue]]
speaker = "カヤ"
original = "「あとは……ん。手を繋げば完璧。……にしても妙な手の繋ぎ方。あんなの見たことない……」"
translation = "「나머지는…… 응. 손을 잡으면 완벽. ……그나저나 묘한 손잡기 방식이네. 저런 건 본 적 없어……」"

[[dialogue]]
speaker = "unk"
original = "それはカップルだからで……"
translation = "그건 커플이라서 그렇고……"

[[dialogue]]
speaker = "カヤ"
original = "「かっぷる……？\u3000どういう意味？\u3000わからない。もっとちゃんと教える」"
translation = "「커플……? 무슨 뜻이야? 모르겠어. 좀 더 제대로 알려줘.」"

[[dialogue]]
speaker = "カヤ"
original = "「ん……。んん……？\u3000～～っっ！！？」"
translation = "「음……. 응응……? ～～읏!!?」"

[[dialogue]]
speaker = "カヤ"
original = "「な、なにバカなこと言ってる……！！\u3000私とあなた、そういう仲なわけない……！！」"
translation = "「바, 바보 같은 소릴 하고 있어……!! 나랑 당신이, 그런 사이일 리 없잖아……!!」"

[[dialogue]]
speaker = "カヤ"
original = "「でも、だからといって離れられるのは……。離れられたらあなたを護衛しろって命令、守れない……」"
translation = "「하지만, 그렇다고 떨어지는 건……. 떨어지면 당신을 호위하라는 명령, 지킬 수 없어……」"

[[dialogue]]
speaker = "カヤ"
original = "「仕方ないから、その……このままでいい。ほ、ほら手も繋ぐっ。あの変な繋ぎ方、する……！」"
translation = "「어쩔 수 없으니까, 그…… 이대로 있으면 돼. 자, 자아 손도 잡을게. 그 이상한 잡기 방식, 할게……!」"

[[dialogue]]
speaker = "カヤ"
original = "「──ひゃっ！？\u3000に、握りすぎ……！\u3000加減考える……！\u3000そんなに握られたら動きづらい、わからない！？」"
translation = "「──히얏!? 너, 너무 꽉 쥐었어……! 강도 생각해서 쥐어……! 그렇게 쥐면 움직이기 힘들어, 몰라!?」"

[[dialogue]]
speaker = "カヤ"
original = "「はぁ……もう。すごく疲れる。やっぱりこの任務、かなりハード。今までの受けてきた命令の中で一番かもしれない」"
translation = "「하아…… 정말. 엄청 지치네. 역시 이 임무, 상당히 하드해. 지금까지 받은 명령 중에서 제일일지도 몰라.」"

[[dialogue]]
speaker = "カヤ"
original = "「街の人間もみんな能天気で……危機感がまるで足りない。みんな、バカみたいにはしゃぎ回ってる」"
translation = "「거리 사람들도 다들 태평하고…… 위기감이 전혀 부족해. 다들, 바보같이 떠들며 돌아다니고 있어.」"

[[dialogue]]
speaker = "カヤ"
original = "「一体、何がそんなに楽しい。ただ街歩いてるだけなのに」"
translation = "「도대체 뭐가 그렇게 즐거운 거야. 그냥 거리 걷고 있을 뿐인데.」"

[[dialogue]]
speaker = "unk"
original = "カヤはこういう雰囲気は苦手？"
translation = "카야는 이런 분위기 서툴러?"

[[dialogue]]
speaker = "カヤ"
original = "「別に得意でも苦手でもない。どうだっていい」"
translation = "「딱히 잘하거나 못하지 않아. 아무래도 좋아.」"

[[dialogue]]
speaker = "カヤ"
original = "「私はただ与えられた命令を守るだけ。兵隊に感情は要らない」"
translation = "「나는 그저 주어진 명령을 지킬 뿐. 병사에게 감정은 필요 없어.」"

[[dialogue]]
speaker = "カヤ"
original = "「私はネビュラが持つ一振りの剣。所有者が振り下ろそうとするのなら、振り下ろされるのを待つだけだから」"
translation = "「나는 네뷸라가 가진 한 자루의 검. 소유자가 휘두르려 한다면, 휘둘러지기를 기다릴 뿐이니까.」"

[[dialogue]]
speaker = "カヤ"
original = "「あなたも私のことは空気だとでも思うといい。ああしてバカ騒ぎしたいのなら騒げばいい」"
translation = "「당신도 나를 공기라고라도 생각하면 돼. 저렇게 바보처럼 소란 피우고 싶다면 피우면 돼.」"

[[dialogue]]
speaker = "カヤ"
original = "「あなたのことはなんとも思ってないけど……今はあなたを守れという命令受けてる。一人ではしゃいでる最中もきちんと守ってあげるつもり」"
translation = "「당신에 대해선 아무렇지도 않게 생각하지만…… 지금은 당신을 지키라는 명령을 받았어. 혼자서 들떠 있는 동안에도 제대로 지켜줄 생각이야.」"

[[dialogue]]
speaker = "unk"
original = "……ちょっと待ってて？"
translation = "……잠깐만 기다려 줄래?"

[[dialogue]]
speaker = "カヤ"
original = "「なっ、どこ行く。単独行動、やめる……！」"
translation = "「나앗, 어디 가. 단독 행동, 하지 마……!」"

[[dialogue]]
speaker = "カヤ"
original = "「……何これ？\u3000最近、街で流行ってるカレーパン……？\u3000別に要らない。携帯食なら持ってる」"
translation = "「……뭐야 이거? 요즘 거리에서 유행하는 카레 빵……? 딱히 필요 없어. 휴대 식량이라면 갖고 있어.」"

[[dialogue]]
speaker = "カヤ"
original = "「……チっ。食べろ食べろ、うるさい。もしも毒が入っていたらどうする」"
translation = "「……쳇. 먹어라 먹어라, 시끄러워. 만약에 독이 들어있으면 어떡할 거야.」"

[[dialogue]]
speaker = "カヤ"
original = "「あっ、自分で食べようとするのやめるっ。だから毒の危険が──！\u3000……わかった、私に渡す。毒味するから」"
translation = "「앗, 직접 먹으려 하지 마! 그러니까 독의 위험이──! ……알겠어, 나한테 줘. 독 기미 할 테니까.」"

[[dialogue]]
speaker = "カヤ"
original = "「はむ……。～～っっ！？\u3000お、美味しい。揚げたて……ホカホカ……。はむむ……はむはむ……」"
translation = "「함냐……. ～～읏!!? 맛, 맛있어. 갓 튀겨서…… 따끈따끈해……. 함냐함냐…… 함냐함냐……」"

[[dialogue]]
speaker = "unk"
original = "全部食べちゃったな"
translation = "전부 먹어버렸네."

[[dialogue]]
speaker = "カヤ"
original = "「こ、これは違っ。どこに毒入ってるかわからないから、でっ……！」"
translation = "「이, 이건 그게 아냐. 어디에 독이 들어있을지 모르니까, 그래서……!」"

[[dialogue]]
speaker = "カヤ"
original = "「っっ！！\u3000そのにやけ面やめる……！\u3000言いたいことあるならハッキリ言えばいい……！」"
translation = "「읏!! 그 히죽거리는 얼굴 치워……! 하고 싶은 말 있으면 확실히 하면 되잖아……!」"

[[dialogue]]
speaker = "unk"
original = "思ったより普通の子みたいで安心したよ"
translation = "생각보다 평범한 애 같아서 안심했어."

[[dialogue]]
speaker = "カヤ"
original = "「～～っっ！！\u3000私を舐めるの大概にする……！\u3000それ以上言ったら背後からブスリと刺す……！」"
translation = "「～～읏!! 나를 얕보는 것도 적당히 해……! 그 이상 말하면 뒤에서 푹 찌를 거야……!」"

[[dialogue]]
speaker = "カヤ"
original = "「無駄話は終わり……！\u3000それより早くこの場から移動する。万が一、尾行者いたらそれで釣り出せるから……！」"
translation = "「쓸데없는 이야기는 끝이야……! 그것보다 빨리 여기서 이동하겠어. 만약 미행자가 있다면 그걸로 유인해낼 수 있으니까……!」"

[[dialogue]]
speaker = "店員"
original = "「あ、そこいくカップルさ～ん。アイスクリームは如何ですか？\u3000美味しいですよ～？」"
translation = "「아, 거기 가는 커플 분들~. 아이스크림은 어떠신가요? 맛있답니다~?」"

[[dialogue]]
speaker = "カヤ"
original = "「あいす……くりーむ？」"
translation = "「아이……스크림?」"

[[dialogue]]
speaker = "カヤ"
original = "「……何またニヤニヤしてる。あんなの食べさせるわけにはいかない。毒入ってる可能性ある、さっきから言ってる」"
translation = "「……왜 또 히죽거려. 저런 걸 먹게 할 수는 없어. 독이 들어있을 가능성이 있다고 아까부터 말했잖아.」"

[[dialogue]]
speaker = "カヤ"
original = "「でも……」"
translation = "「하지만……」"

[[dialogue]]
speaker = "カヤ"
original = "「私に、その……先に毒味させるなら、いい」"
translation = "「나한테, 그…… 먼저 기미 하게 해준다면, 괜찮아.」"

