[[dialogue]]
speaker = "unk"
original = "第２話,美鶴とショッピング,P"
translation = "제2화, 미츠루와 쇼핑"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「なんでうちが会長さんと……？」"
translation = "「왜 제가 회장님이랑……?」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスが計画を立てた『美鶴の心を開け大作戦』第１弾は、『美鶴と買い物に行ってきなさい！』だった。"
translation = "비너스가 세운 『미츠루의 마음을 열어라 대작전』 제1탄은 『미츠루와 쇼핑하러 가라!』였다."

[[dialogue]]
speaker = "unk"
original = "ちなみに何を買いに行くのかというと……"
translation = "참고로 무엇을 사러 가느냐 하면……"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「手芸店で生地と糸とボタンをしこたま買います。次の衣装を作るのに使うんで」"
translation = "「수예점에서 원단이랑 실이랑 단추를 잔뜩 삽니다. 다음 의상을 만드는 데 쓸 거라.」"

[[dialogue]]
speaker = "unk"
original = "通販とかじゃダメなの？"
translation = "통신 판매 같은 건 안 돼?"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「絶対ダメ」"
translation = "「절대 안 돼요.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「通販だとどうしても色味に誤差があるし。実物を見ると、全然違うじゃんってなりがち。やっぱり直に自分の目で見ないと、描いてるイメージとの違いが──」"
translation = "「통판이면 아무래도 색감에 오차가 있고. 실물을 보면 전혀 다르잖아, 싶어지기 십상이라. 역시 직접 제 눈으로 안 보면 그리는 이미지랑 차이가──」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「──って、すみません。うち、会長さんに慣れ慣れしい言葉遣いで……服の話になると、つい素が……」"
translation = "「──앗, 죄송합니다. 저, 회장님한테 버릇없는 말투로…… 옷 얘기가 나오면 저도 모르게 본래 말투가……」"

[[dialogue]]
speaker = "unk"
original = "今の口調が、美鶴の素なのか。確かにこの前、星徒会に来た時よりも自然な感じだった。"
translation = "방금 말투가 미츠루의 본모습인가. 확실히 저번에 성도회에 왔을 때보다 자연스러운 느낌이었다."

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「うち、もともとメイドじゃないし、生まれも育ちもそんなに良くはないんで。ですます口調は板についてないってゆーか……あ、またやっちゃった」"
translation = "「저, 원래 메이드도 아니고 태어나고 자란 곳도 그리 좋진 않거든요. 존댓말은 몸에 안 배었다고나 할까…… 아, 또 이랬네」"

[[dialogue]]
speaker = "unk"
original = "話しやすいように話してくれていいよ"
translation = "편하게 말해도 괜찮아"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「でも、会長さんにあまり無礼なのも……お嬢様にも迷惑かかっちゃいますし」"
translation = "「하지만 회장님께 너무 무례한 것도…… 아가씨께도 폐가 되니까요」"

[[dialogue]]
speaker = "unk"
original = "そんな些細な事を気にするお嬢様じゃなくない？"
translation = "그런 사소한 걸 신경 쓸 아가씨가 아니지 않아?"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「……確かにそーですね」"
translation = "「……확실히 그렇네요.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「んじゃ、こっから遠慮はなしで」"
translation = "「그럼 지금부턴 사양 안 할게.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「ふう……ちょっと気が楽になった。ありがと、会長さん。うち、男の人と出かけるなんて初めてだから、実は緊張してて」"
translation = "「후우…… 좀 마음이 편해졌다. 고마워, 회장님. 나, 남자랑 외출하는 건 처음이라 사실 긴장하고 있었거든.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「まったく。当主様もだけど、お嬢様も無茶振りが酷いんすよ。九浄家は無茶振り大好き家系──おっ」"
translation = "「참 나. 당주님도 그렇지만 아가씨도 무리한 요구가 심하단 말이지. 쿠죠 가문은 무리수 대잔치 집안── 엇」"

[[dialogue]]
speaker = "unk"
original = "美鶴の視線は、服が立ち並ぶショーウインドウに釘付けになった。"
translation = "미츠루의 시선은 옷들이 늘어선 쇼윈도에 못 박혔다."

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「わ、いいカンジの服。丁寧な仕事してるじゃん」"
translation = "「와, 저 옷 느낌 좋다. 솜씨가 정교한걸.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「あの腰回り、どうなってるんだろ。透け感が絶妙……あー、あの辺、次の衣装に活かせるかも。もうちょっと派手めに盛ってもだいじょぶそーかな……」"
translation = "「저 허리 라인 어떻게 된 거지. 비치는 느낌이 절묘해…… 아, 저쪽은 다음 의상에 활용할 수 있을지도. 좀 더 화려하게 꾸며도 괜찮으려나……」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「……あ、ごめん、良いカンジの服を見かけるとつい見入っちゃうんだ。職業病ってやつかな」"
translation = "「……아, 미안. 괜찮은 옷을 보면 나도 모르게 넋 놓고 보게 돼. 직업병 같은 건가 봐.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「新しい服見ると、いろいろ参考になるから面白いよ。まだまだうちも学ばなきゃいけないこといっぱいあるし」"
translation = "「새로운 옷을 보면 여러모로 참고가 돼서 재밌어. 아직 나도 배워야 할 게 산더미고.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「っと、寄り道してないで、買い物終わらせなきゃだね」"
translation = "「앗, 딴짓하지 말고 쇼핑 끝내야겠네.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「んー……生地も揃えたし、糸もボタンもＯＫっと……布って結構重いでしょ。会長さん、うちが持つよ」"
translation = "「음…… 원단도 다 챙겼고 실이랑 단추도 오케이…… 천이라 꽤 무겁지. 회장님, 내가 들게.」"

[[dialogue]]
speaker = "unk"
original = "このくらいなら全然平気"
translation = "이 정도는 전혀 괜찮아"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「そ？\u3000じゃ、お言葉に甘えて──うわ」"
translation = "「그래? 그럼 호의를 받아들여서── 우와」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「うそ、この映画館『恐怖のデス・ナットー２』やってる。激レアじゃん。やってるの、流星市国らへんじゃここだけなんじゃ？」"
translation = "「말도 안 돼, 이 영화관 『공포의 데스 낫토 2』 상영하네. 완전 레어잖아. 유성시국 근처에선 여기뿐인 거 아냐?」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「タイトルからしてヤバいでしょ。パニック映画なんだけど、大量の納豆が人類に襲い掛かってきてさ。体中の穴という穴に納豆が埋め込まれるってやつ」"
translation = "「제목부터 장난 아니지. 패닉 영화인데 대량의 낫토가 인류를 덮쳐와서 몸의 구멍이란 구멍에 낫토가 박힌다는 내용이야.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「Ｂ級映画どころじゃないよ。もっと酷い。なんで続編作ったんだろーってくらい。ふふふ」"
translation = "「B급 영화 수준이 아니야. 훨씬 심해. 왜 속편을 만들었을까 싶을 정도라니까. 후후후.」"

[[dialogue]]
speaker = "unk"
original = "興味あるなら、観る？"
translation = "관심 있으면 볼래?"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「え、うちは興味ありありだけど……とてもオススメできないよ。会長さんに悪いって。お金と時間の無駄かも」"
translation = "「에, 나는 관심 폭발이지만…… 차마 추천은 못 하겠어. 회장님한테 미안해서. 돈이랑 시간 낭비일지도 몰라.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「あ、でも、上映期間、今日までなんだ。見逃したら、二度とこんなチャンスなさそーだし……」"
translation = "「아, 근데 상영 기간이 오늘까지네. 이번에 놓치면 두 번 다시 이런 기회 없을 것 같은데……」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「あ、ちょ、会長さん、手ぇ引っ張らなくても──」"
translation = "「아, 잠시만 회장님, 손 안 잡아당겨도──」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「うちらの貸し切りだったね。誰もいなかった」"
translation = "「우리 전용관이었네. 아무도 없었어.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「会長さん、顔色悪いし。だから、言ったじゃん。ホントに酷いんだって。ふふ、ふふふ」"
translation = "「회장님, 안색이 안 좋아. 그러니까 내가 말했잖아. 진짜 형편없다고. 후후, 후후후.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「頭空っぽにしたい時、気分転換に映画観るんだ、こーゆー見るからにダメっぽいやつ。いくらなんでも、これはダメすぎたけど」"
translation = "「머리 비우고 싶을 때 기분 전환으로 영화 보거든, 이런 딱 봐도 망작 같은 거. 아무리 그래도 이건 너무 망작이었지만.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「誰かと観ると、後で一緒に笑い飛ばせて、なんか楽しーね」"
translation = "「누군가랑 같이 보니까 나중에 같이 웃어넘길 수 있어서 왠지 즐겁네.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「こんな映画に付き合ってくれるの、会長さんくらいだし。良かったら、また行こ」"
translation = "「이런 영화에 같이 어울려 줄 사람은 회장님 정도밖에 없으니까. 괜찮다면 또 오자.」"

[[dialogue]]
speaker = "unk"
original = "次はもう少し、マシな映画が観たいかな"
translation = "다음엔 조금 더 제대로 된 영화를 보고 싶은걸"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「そーだね。考えとく。ふふ」"
translation = "「그렇네. 생각해둘게. 후후.」"

[[dialogue]]
speaker = "unk"
original = "デス・ナットーの衝撃はしばらく糸を引きそうだったけど、楽しそうな美鶴の笑顔を見れたことだし、良しとしよう。"
translation = "데스 낫토의 충격은 한동안 여운이 남을 것 같았지만, 즐거워 보이는 미츠루의 미소를 보았으니 잘된 일이라 치자."

