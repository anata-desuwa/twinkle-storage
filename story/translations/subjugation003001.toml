[[dialogue]]
speaker = "ナミエル"
original = "（――私は、クリスマスが苦手だ）"
translation = "(――나는 크리스마스가 서투르다.)"

[[dialogue]]
speaker = "ナミエル"
original = "（決して忘れられない、昔の記憶を思い出すから）"
translation = "(결코 잊을 수 없는, 옛 기억이 떠오르기 때문이다.)"

[[dialogue]]
speaker = "附属生Ａ"
original = "「もうすぐクリスマスだね～！\u3000ねぇねぇ、当日はどうする？」"
translation = "「이제 곧 크리스마스네~! 저기 저기, 당일엔 뭐 할 거야?」"

[[dialogue]]
speaker = "附属生Ｂ"
original = "「実は、流星寮でクリスマスパーティーが開かれるらしいんだよね。せっかくだから、一緒に参加しようよ！」"
translation = "「실은 유성 기숙사에서 크리스마스 파티가 열린대. 이왕 이렇게 된 거 같이 가보자!」"

[[dialogue]]
speaker = "ナミエル"
original = "「はぁ……」"
translation = "「하아……」"

[[dialogue]]
speaker = "unk"
original = "前を歩く附属生たちの明るい会話が聞こえてきて、星見家メイド隊所属の流星学園附属校１年生――『ナミエル・クレシェンテ』は、小さく白い息を吐いた。"
translation = "앞서 걷는 부속생들의 밝은 대화가 들려오자, 호시미 가문 메이드대 소속의 유성 학원 부속교 1학년―― 『나미엘 크레셴테』는 작게 하얀 입김을 내뱉었다."

[[dialogue]]
speaker = "unk"
original = "季節は冬。クリスマスまであと２週間という時期とあって、朝から空気は冷たく、肌寒い。"
translation = "계절은 겨울. 크리스마스까지 앞으로 2주일 남짓 남은 시기라 아침부터 공기는 차고 쌀쌀하다."

[[dialogue]]
speaker = "アム"
original = "「あっ、ナミエルだ～！\u3000おっはよ～♪」"
translation = "「앗, 나미엘이다~! 안녀엉~♪」"

[[dialogue]]
speaker = "ナミエル"
original = "「……ごきげんよう。アム先輩」"
translation = "「……안녕하십니까. 아무 선배님.」"

[[dialogue]]
speaker = "アム"
original = "「ナミエルと会うのは、結構久しぶりだね！\u3000最近、元気してた？」"
translation = "「나미엘이랑 만나는 건 꽤 오랜만이네! 요즘 잘 지냈어?」"

[[dialogue]]
speaker = "unk"
original = "ナミエルの後ろから元気よく声をかけてきたのは、流星学園附属校３年生の『<ruby>白楯<rt>しろたて</rt></ruby>アム』だった。『附属最強の盾』とも呼ばれる、盾使いとして有名な附属生である。"
translation = "나미엘의 뒤에서 활기차게 말을 걸어온 사람은 유성 학원 부속교 3학년인 『시로타테 아무』였다. 『부속 최강의 방패』라고도 불리는, 방패 사용자로서 유명한 부속생이다."

[[dialogue]]
speaker = "ナミエル"
original = "「ええ、まあ……はい。アム先輩は、朝からすごく元気ですね」"
translation = "「네, 뭐…… 네. 아무 선배님은 아침부터 무척 활기차시네요.」"

[[dialogue]]
speaker = "アム"
original = "「うんっ♪\u3000あたしは毎朝早起きして、朝練してるからね～。今も運動場から戻ってきたところ！\u3000だから、冬の寒さなんてへっちゃらなくらい、体が温まってるよ♪」"
translation = "「응♪ 난 매일 아침 일찍 일어나서 아침 연습을 하거든~. 지금도 운동장에서 막 돌아오는 길이야! 그래서 겨울 추위 따위는 아무렇지도 않을 만큼 몸이 따끈따끈해♪」"

[[dialogue]]
speaker = "ナミエル"
original = "「そうでしたか。さすがですね」"
translation = "「그렇군요. 대단하시네요.」"

[[dialogue]]
speaker = "アム"
original = "「えへへっ、でしょ～？\u3000あたしは本校に進学したら、学園最強の星騎士――星徒会長になるのが目標だからね～！」"
translation = "「에헤헤, 그치~? 난 본교에 진학하면 학원 최강의 성기사―― 성도회장이 되는 게 목표니까!」"

[[dialogue]]
speaker = "ナミエル"
original = "（アム先輩、『陽キャ』でやたらテンションの高い感じはちょっと苦手ですが……星騎士としては、訓練量がすごくて、意外と真面目な人なんですよね）"
translation = "(아무 선배님, '인싸'에다 지나치게 텐션이 높은 느낌은 좀 서투르지만…… 성기사로서는 훈련량이 엄청나서 의외로 성실한 분이란 말이죠.)"

[[dialogue]]
speaker = "unk"
original = "ナミエルにとってアムは、会えば挨拶はするが、正直そこまで親しい間柄というわけでもない。"
translation = "나미엘에게 있어 아무는 만나면 인사는 하지만, 솔직히 그렇게까지 친한 사이는 아니었다."

[[dialogue]]
speaker = "unk"
original = "以前、『オペレーション・ペンタグラム』という作戦で一緒に戦ったことがあり、そこでアムが話しかけてきて顔見知りになった、といった感じだった。"
translation = "이전 『오퍼레이션 펜타그램』이라는 작전에서 함께 싸운 적이 있었고, 그때 아무가 말을 걸어와 안면을 트게 된 그런 느낌이었다."

[[dialogue]]
speaker = "アム"
original = "「ん？\u3000なんか上から落ちてきてるの――アレ、何だろう？」"
translation = "「응? 뭔가 위에서 떨어지고 있는데―― 저게 뭘까?」"

[[dialogue]]
speaker = "unk"
original = "ふと、アムが空を見上げて、ナミエルもそちらに視線を向ける。風に吹かれた何かが飛んできて、それはナミエルの足元にふわりと落ちた。"
translation = "문득 아무가 하늘을 올려다보았고, 나미엘도 그쪽으로 시선을 향했다. 바람에 날려온 무언가가 날아와 나미엘의 발치에 사뿐히 떨어졌다."

[[dialogue]]
speaker = "ナミエル"
original = "「これは――シルクハットでしょうか……？」"
translation = "「이건―― 실크 햇인가요……?」"

[[dialogue]]
speaker = "unk"
original = "頭に被るにはやや小さめの帽子。それをナミエルが手に取り、拾い上げた瞬間。"
translation = "머리에 쓰기에는 다소 작은 모자. 그것을 나미엘이 손에 들어 올린 순간."

[[dialogue]]
speaker = "ナミエル"
original = "「きゃっ……！？」"
translation = "「꺄앗……!?」"

[[dialogue]]
speaker = "アム"
original = "「わっ、何！？」"
translation = "「와앗, 뭐야!?」"

[[dialogue]]
speaker = "ナミエル"
original = "「か、勝手に変身して、衣装が……！？」"
translation = "「제, 제멋대로 변신해서 의상이……!?」"

[[dialogue]]
speaker = "アム"
original = "「これ、水着フォームになった時と似てる……？\u3000もしかしてあたし達、<b>クリスマスフォーム</b>に覚醒したの……！？」"
translation = "「이거 수영복 폼이 됐을 때랑 비슷해……? 혹시 우리, <ruby>크리스마스 폼<rt>Christmas Form</rt></ruby>으로 각성한 거야……!?」"

[[dialogue]]
speaker = "？？？"
original = "「あれ？\u3000ここは……どこ？」"
translation = "「어라? 여기는…… 어디?」"

[[dialogue]]
speaker = "アム"
original = "「なんか、小さい雪だるまみたいなのが現れた！？」"
translation = "「뭔가 작은 눈사람 같은 게 나타났어!?」"

[[dialogue]]
speaker = "ナミエル"
original = "「……リクリエの気配は感じませんね。それに喋っていますし、モンスターとは少し違うようですが……」"
translation = "「……리크리에의 기척은 느껴지지 않네요. 게다가 말을 하고 있고, 몬스터와는 조금 다른 것 같습니다만……」"

[[dialogue]]
speaker = "ナミエル"
original = "（あと、『ぬいぐるみ』みたいで可愛い……）"
translation = "(그리고, '인형' 같아서 귀여워……)"

[[dialogue]]
speaker = "雪だるま？"
original = "「？\u3000キミたちは誰……？」"
translation = "「? 너희들은 누구야……?」"

[[dialogue]]
speaker = "ナミエル"
original = "「えっと……私は、ナミエル・クレシェンテと言います。あなたは……？」"
translation = "「저기…… 저는 나미엘 크레셴테라고 합니다. 당신은……?」"

[[dialogue]]
speaker = "スノーマンL"
original = "「ボク？\u3000ボクは『スノーマン』！\u3000冬の精霊だよっ♪」"
translation = "「나? 나는 『스노맨』! 겨울의 정령이야♪」"

[[dialogue]]
speaker = "unk"
original = "そうして、クリスマスが近づきつつあったその日、ナミエルとアムは不思議な存在に出会うのだった。"
translation = "그렇게 크리스마스가 다가오고 있던 어느 날, 나미엘과 아무는 신비로운 존재와 만나게 되었다."

