[[dialogue]]
speaker = "unk"
original = "第３話,竜たるもの、畏怖を持たれよ,P"
translation = "제3화, 용이란 자, 경외심을 받으라"

[[dialogue]]
speaker = "unk"
original = "某日、アステラが２ヵ所同時に出現。新星星徒会はこれに対し、マハムート先輩に支援要請──"
translation = "어느 날, 아스텔라가 두 곳에서 동시에 출현. 신성 성도회는 이에 대해 마하무트 선배에게 지원 요청──"

[[dialogue]]
speaker = "unk"
original = "俺はマハムート先輩、アナとチームを組み、片方のアステラに突入していた。"
translation = "나는 마하무트 선배, 아나와 팀을 이루어 한쪽 아스텔라에 돌입해 있었다."

[[dialogue]]
speaker = "パワゴン"
original = "「イイイイイ！」"
translation = "「이이이이이!」"

[[dialogue]]
speaker = "アナ"
original = "「なっ、このモンスター、大型なのに素早い！？」"
translation = "「나, 이 몬스터, 대형인데도 빨라!?」"

[[dialogue]]
speaker = "アナ"
original = "「ぐっ……！\u3000油断しましたっ」"
translation = "「큭……! 방심했습니다」"

[[dialogue]]
speaker = "unk"
original = "アナ！\u3000大丈夫か！？"
translation = "아나! 괜찮아!?"

[[dialogue]]
speaker = "アナ"
original = "「ノープロブレムです……。ですが、このデカブツの足をどうにかしないと──」"
translation = "「노 프로블럼입니다……. 하지만 이 거구의 발을 어떻게든 하지 않으면──」"

[[dialogue]]
speaker = "マハムート"
original = "「畏怖をもって跪きなさい。グラビトンプレッシャー」"
translation = "「경외심을 가지고 무릎 꿇으렴. 그라비톤 프레셔」"

[[dialogue]]
speaker = "アナ"
original = "「デカブツが地面に倒れて止まった。マムの『引力操作』……！」"
translation = "「거구가 지면에 쓰러져 멈췄어. 마무의 『인력 조작』……!」"

[[dialogue]]
speaker = "マハムート"
original = "「……よくもうちの寮生に手を出してくれたわね。身の程を知りなさい」"
translation = "「……감히 우리 기숙사생에게 손을 대다니. 분수를 알도록 해」"

[[dialogue]]
speaker = "マハムート"
original = "「メテオインパクト！」"
translation = "「메테오 임팩트!」"

[[dialogue]]
speaker = "unk"
original = "その後、マハムート先輩の圧倒的な活躍によってアステラは無事消滅。"
translation = "그 후, 마하무트 선배의 압도적인 활약으로 아스텔라는 무사히 소멸."

[[dialogue]]
speaker = "unk"
original = "別動隊のヴィーナスたちからも、もう１つのアステラの消滅確認したと連絡があった。"
translation = "별동대인 비너스 일행으로부터도 또 다른 아스텔라의 소멸을 확인했다는 연락이 왔다."

[[dialogue]]
speaker = "unk"
original = "マム、とんでもない強さでした"
translation = "마무, 엄청난 강함이었어요"

[[dialogue]]
speaker = "マハムート"
original = "「ふっ……言ったでしょう？\u3000ヴィーナスにもアナタにも、最強の座を譲るつもりはないって」"
translation = "「훗…… 말했지? 비너스에게도 당신에게도 최강의 자리를 내줄 생각은 없다고」"

[[dialogue]]
speaker = "マハムート"
original = "「これが寮長たる私、妃竜院家次期当主──妃竜院マハムートの実力よ」"
translation = "「이것이 기숙사장인 나, 키류인 가문의 차기 당주── 키류인 마하무트의 실력이야」"

[[dialogue]]
speaker = "unk"
original = "妃竜院家、次期当主？"
translation = "키류인 가문, 차기 당주?"

[[dialogue]]
speaker = "アナ"
original = "「妃竜院家は魔界で３０００年以上続く名家。魔界でも希少な『竜』の血を引く魔族なんですよ」"
translation = "「키류인 가문은 마계에서 3000년 이상 이어진 명가. 마계에서도 희귀한 『용』의 피를 이어받은 마족이에요」"

[[dialogue]]
speaker = "アナ"
original = "「その中でもマムは、生まれながらに膨大な星力と、固有の星術である『引力操作』を有していて、歴代最強の当主になると言われています」"
translation = "「그중에서도 마무는 태어날 때부터 방대한 성력과 고유 성술인 『인력 조작』을 가지고 있어서, 역대 최강의 당주가 될 것이라 불리고 있어요」"

[[dialogue]]
speaker = "unk"
original = "そういえば、アナも新星寮の寮生なんだっけ"
translation = "그러고 보니 아나도 신성 기숙사의 기숙사생이었지"

[[dialogue]]
speaker = "アナ"
original = "「はい、なのでマムのことはよく知っています」"
translation = "「네, 그래서 마무에 대해서는 잘 알고 있습니다」"

[[dialogue]]
speaker = "マハムート"
original = "「『竜たるもの、畏怖を持たれよ』というのが、我が妃竜院家の家訓よ」"
translation = "「『용이란 자, 경외심을 받으라』는 것이 우리 키류인 가문의 가훈이야」"

[[dialogue]]
speaker = "マハムート"
original = "「故に会長、今回手伝ってあげたこと、畏怖をもって感謝なさい？」"
translation = "「고로 회장, 이번에 도와준 것, 경외심을 가지고 감사하도록 해?」"

[[dialogue]]
speaker = "unk"
original = "ありがとうございます、本当に助かりました"
translation = "감사합니다, 정말 큰 도움이 됐어요"

[[dialogue]]
speaker = "unk"
original = "イエス・マム。"
translation = "예스 마무."

[[dialogue]]
speaker = "マハムート"
original = "「ふん、アナタも返事が板について来たわね。悪くないわ」"
translation = "「흥, 당신도 대답이 몸에 배었네. 나쁘지 않아」"

[[dialogue]]
speaker = "マハムート"
original = "「さて、それはいいとして……アナ」"
translation = "「자, 그건 그렇다 치고…… 아나」"

[[dialogue]]
speaker = "アナ"
original = "「ぎくり」"
translation = "「찔끔」"

[[dialogue]]
speaker = "マハムート"
original = "「アナタは、さっさとするべきことがあるでしょ？」"
translation = "「당신은 얼른 해야 할 일이 있잖아?」"

[[dialogue]]
speaker = "アナ"
original = "「……申し訳ありませんでした、マム。大型は動きが遅いはずと油断して、チームに迷惑を掛けてしまいました」"
translation = "「……죄송했습니다, 마무. 대형은 움직임이 느릴 거라 방심해서 팀에 폐를 끼치고 말았습니다」"

[[dialogue]]
speaker = "マハムート"
original = "「何を言っているの、アナタは？\u3000誰がミスを謝れなんて言ったかしら」"
translation = "「무슨 소릴 하는 거야, 당신은? 누가 실수한 걸 사과하라고 했니」"

[[dialogue]]
speaker = "アナ"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker = "マハムート"
original = "「アナタ、さっきの戦闘で１発食らってたでしょ」"
translation = "「당신, 아까 전투에서 한 대 맞았지」"

[[dialogue]]
speaker = "マハムート"
original = "「こんなところで私の機嫌うかがっている暇があったら、さっさと学園の保健室に行って、体に異常がないか診てもらいなさい」"
translation = "「이런 데서 내 기색이나 살필 틈이 있으면, 얼른 학원 보건실에 가서 몸에 이상이 없는지 진찰받고 오렴」"

[[dialogue]]
speaker = "アナ"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "マハムート"
original = "「返事は？」"
translation = "「대답은?」"

[[dialogue]]
speaker = "アナ"
original = "「イエス・マム。後で必ず報告に上がります」"
translation = "「예스 마무. 나중에 반드시 보고하러 가겠습니다」"

[[dialogue]]
speaker = "マハムート"
original = "「ええ、そうして頂戴」"
translation = "「그래, 그렇게 하렴」"

[[dialogue]]
speaker = "アナ"
original = "「あの……マム」"
translation = "「저기…… 마무」"

[[dialogue]]
speaker = "マハムート"
original = "「まだ何かあるの？\u3000いいから早く──」"
translation = "「아직 뭐 남았니? 됐으니까 빨리──」"

[[dialogue]]
speaker = "アナ"
original = "「今日は助けていただき、ありがとうございました。行ってきます」"
translation = "「오늘은 도와주셔서 감사합니다. 다녀오겠습니다」"

[[dialogue]]
speaker = "マハムート"
original = "「ふん……まったく、礼の言葉なんて何の足しにもならないわ……」"
translation = "「흥…… 정말이지, 감사 인사 따위 아무런 도움도 안 되는데……」"

[[dialogue]]
speaker = "unk"
original = "寮生から慕われてるんですね"
translation = "기숙사생들에게 경애받고 있네요"

[[dialogue]]
speaker = "マハムート"
original = "「は？\u3000何を言っているのかしら、アナタは」"
translation = "「하? 무슨 소릴 하는 거야, 당신은」"

[[dialogue]]
speaker = "マハムート"
original = "「あれは私に対しての『畏怖』に決まっているでしょ」"
translation = "「그건 나에 대한 『경외심』인 게 당연하잖아」"

[[dialogue]]
speaker = "unk"
original = "えっ"
translation = "엣"

[[dialogue]]
speaker = "マハムート"
original = "「何よ、その顔は？\u3000何か私、変なこと言ったかしら？」"
translation = "「뭐야, 그 표정은? 내가 뭐 이상한 말이라도 했니?」"

[[dialogue]]
speaker = "マハムート"
original = "「……って、ちょっと！\u3000なんで笑い出すわけ？\u3000失礼ね、どういうことか説明なさい！」"
translation = "「……랄까, 잠깐! 왜 웃기 시작하는 거야? 무례하네, 어떻게 된 건지 설명해!」"

[[dialogue]]
speaker = "unk"
original = "つい笑ってしまう俺に、不服そうな様子でむくれるマハムート先輩なのだった。"
translation = "나도 모르게 웃음을 터뜨리는 나에게, 불만스러운 듯 입술을 내미는 마하무트 선배였다."

