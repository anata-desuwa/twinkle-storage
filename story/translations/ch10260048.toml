[[dialogue]]
speaker = "unk"
original = "お正月に恋人のリーリアと２人で、初詣デートへ出かけた日のこと。"
translation = "정월에 연인인 리리아와 둘이서, 하츠모데 데이트를 나갔던 날의 일."

[[dialogue]]
speaker = "unk"
original = "日が暮れて辺りが暗くなってきたところで、リーリアが悪戯な笑みを浮かべながら言う。"
translation = "해가 저물고 주변이 어두워졌을 무렵, 리리아가 장난스러운 미소를 지으며 말한다."

[[dialogue]]
speaker = "リーリア"
original = "「セ～ンパイ♪\u3000夜になっちゃいましたけど、年始めのデートなんですし、まさかこれで終わりってわけじゃありませんよね～？」"
translation = "「선~배♪ 밤이 되어버렸지만, 새해 첫 데이트인데 설마 이걸로 끝인 건 아니겠죠~?」"

[[dialogue]]
speaker = "クロト"
original = "「え？\u3000リーリアはまだ何かしたいことがあるのか？」"
translation = "「에? 리리아는 아직 뭔가 하고 싶은 게 있는 거야?」"

[[dialogue]]
speaker = "リーリア"
original = "「も～！\u3000センパイったら、意地悪しないで下さいよ～！\u3000わかってる癖に～」"
translation = "「정마~알! 선배도 참, 짖궂게 굴지 말아 주세요~! 다 알고 계시면서~」"

[[dialogue]]
speaker = "リーリア"
original = "俺がわざとらしい声色ですっとぼけてみせると、リーリアは腕に抱き着いてきて、耳元で囁く。"
translation = "내가 짐짓 모르는 체하는 목소리로 시치미를 떼자, 리리아는 팔에 매달려 오며 귓가에 속삭인다."

[[dialogue]]
speaker = "リーリア"
original = "「そんなの――可愛い後輩との『姫始め』に決まってるじゃないですか<emoji=heart04>」"
translation = "「그거야―― 귀여운 후배와의 『히메하지메』로 정해져 있잖아요<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「ち・な・み・に、今回もエッチなサプライズを用意してるんですよ♪\u3000ふふふっ<emoji=heart04>」"
translation = "「참·고·로, 이번에도 야한 서프라이즈를 준비했거든요♪ 후후훗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そうして、俺たち２人は街にあるラブホテルに入る。ベッドの上へ移動してから、リーリアは持ってきた薬を一気に飲み干すと――"
translation = "그렇게, 우리 두 사람은 거리에 있는 러브호텔로 들어간다. 침대 위로 이동한 뒤, 리리아는 가져온 약을 단숨에 들이켜더니――"

[[dialogue]]
speaker = "リーリア"
original = "「んっ……<emoji=heart04>\u3000はあぁ……ふうぅぅ<emoji=heart04>\u3000早速、溢れてきちゃいましたね……<b>母乳</b><emoji=heart04>」"
translation = "「응……<emoji=heart04> 하아아…… 후우우우<emoji=heart04> 벌써 넘쳐 나오기 시작했네요…… <b>모유</b><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "なんと、リーリアのおっぱいは小さく可愛いまま、乳首の辺りからじわりと汗が滲むように、<b>母乳</b>が溢れてきていた。"
translation = "놀랍게도 리리아의 가슴은 작고 귀여운 그대로, 젖꼭지 주변에서 서서히 땀이 배어 나오듯 <b>모유</b>가 흘러넘치고 있었다."

[[dialogue]]
speaker = "リーリア"
original = "「えへへへへへぇ<emoji=heart04>\u3000実はアニマ先輩にお願いして、『母乳薬』を作ってもらったんですよぉ<emoji=heart04>\u3000……はぁあぁっ<emoji=heart04>」"
translation = "「에헤헤헤헤헤<emoji=heart04> 사실은 아니마 선배한테 부탁해서, 『모유약』을 만들어 달라고 했거든요오<emoji=heart04> ……하아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「あぁあっ<emoji=heart04>\u3000センパイが<b>いつも好きだって言ってくれる</b>可愛いおっぱいから、母乳が出ている光景、どうですかぁ？」"
translation = "「아아앗<emoji=heart04> 선배가 <b>항상</b> <b>좋다고</b> <b>말해주는</b> 귀여운 가슴에서 모유가 나오는 광경, 어떠신가요?」"

[[dialogue]]
speaker = "リーリア"
original = "「もしも私にセンパイの赤ちゃんができたら、んんぅ<emoji=heart04>\u3000こんな感じに、なっちゃうんですかね～？\u3000ふふふっ<emoji=heart04>」"
translation = "「만약 저한테 선배의 아기가 생긴다면, 응으으<emoji=heart04> 이런 느낌이 되어버리는 걸까요~? 후후훗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「っ……！」"
translation = "「윽……!」"

[[dialogue]]
speaker = "リーリア"
original = "「あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000センパイっ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앙<emoji=heart04> 선배……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "妊娠してもいないのに、セックスのためだけに母乳をにじませるおっぱい。"
translation = "임신하지도 않았는데, 섹스만을 위해서 모유를 배어 나오게 하는 가슴."

[[dialogue]]
speaker = "unk"
original = "俺はその背徳的な光景に興奮して、リーリアのおっぱいにむしゃぶりつく。"
translation = "나는 그 배덕적인 광경에 흥분해서, 리리아의 가슴에 매달려 빨아댄다."

[[dialogue]]
speaker = "リーリア"
original = "「あぁあんっ……<emoji=heart04>\u3000センパイに吸い付かれて、乳首感じちゃいます<emoji=heart04>\u3000あぁあっ<emoji=heart04>\u3000はぁぁあっ<emoji=heart04>」"
translation = "「아아앙……<emoji=heart04> 선배가 빨아주니까, 유두로 느껴버려요<emoji=heart04> 아아앗<emoji=heart04> 하아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「そんなに私のおっぱいから母乳が出てるの見て、興奮しちゃったんですか？\u3000んっ<emoji=heart04>\u3000はあぁっ……んんっ……<emoji=heart04>」"
translation = "「그렇게 제 가슴에서 모유가 나오는 걸 보고, 흥분해버린 건가요? 응<emoji=heart04> 하아……으응……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ああ。リーリアの可愛いおっぱいから出る母乳、すごく興奮する……！」"
translation = "「아아. 리리아의 귀여운 가슴에서 나오는 모유, 정말 흥분돼……!」"

[[dialogue]]
speaker = "unk"
original = "ちょっとしょっぱくて、しかしほんのりと甘いような気がする、エッチな味だ。"
translation = "조금 짭짤하면서도, 하지만 은근히 단맛이 나는 것 같은, 야한 맛이다."

[[dialogue]]
speaker = "リーリア"
original = "「あぁんっ<emoji=heart04>\u3000センパイがそうやって、おっぱいのことを沢山『可愛い』って褒めてくれるから……はぁあぁ<emoji=heart04>\u3000大きくしなくても、自信が持てるように、なってきたんですよ<emoji=heart04>」"
translation = "「아앙<emoji=heart04> 선배가 그렇게, 가슴을 잔뜩 『귀엽다』고 칭찬해 주니까……하아아<emoji=heart04> 크게 만들지 않아도, 자신을 가질 수 있게, 되었단 말이에요<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「私……おっぱいがちっちゃくて、よかったです<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んふぅっ……<emoji=heart04>」"
translation = "「저…… 가슴이 작아서, 다행이에요<emoji=heart04> 앗<emoji=heart04> 응후……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「はぁあっ<emoji=heart04>\u3000だってちっちゃいからこそ、大きいおっぱいも、可愛いおっぱいも、両方センパイに愛してもらえるんですから<emoji=heart04>」"
translation = "「하아앗<emoji=heart04> 그야 작으니까こそ, 큰 가슴도, 귀여운 가슴도, 양쪽 다 선배에게 사랑받을 수 있는 거니까요<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「豊胸魔法がオシャレの一環だっていうのはわかってるけど……俺にとっては素のリーリアがいちばん魅力的で、いちばん好きだぞ？」"
translation = "「풍유 마법이 멋 부리기의 일종이라는 건 알지만…… 나한테는 본래의 리리아가 가장 매력적이고, 제일 좋다고?」"

[[dialogue]]
speaker = "リーリア"
original = "「もぉ～～～～<emoji=heart04><emoji=heart04><emoji=heart04>\u3000わかってますよぉ、センパイ<emoji=heart04>\u3000はぁあんっ<emoji=heart04>」"
translation = "「정마아아알<emoji=heart04><emoji=heart04><emoji=heart04> 알고 있다고요오, 선배<emoji=heart04> 하아앙<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「センパイが私のおっぱい好きすぎるから、エッチの時はオシャレやめて、ちっちゃいまましてるんじゃないですかぁ<emoji=heart04>\u3000んんぅっ……<emoji=heart04>\u3000ふうぅぅん<emoji=heart04>」"
translation = "「선배가 제 가슴을 너무 좋아하니까, 섹스할 때는 멋 부리는 거 관두고, 조그만 상태 그대로 있는 거잖아요오<emoji=heart04> 응으윽……<emoji=heart04> 후우우웅<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「もうっ<emoji=heart04>\u3000自分で自分のおっぱいのこと、『なんかちっちゃくて可愛いかも<emoji=heart04>』なんて思うようになってきちゃったのは、センパイのせいなんですからね～<emoji=heart04>」"
translation = "「정말이지<emoji=heart04> 스스로 제 가슴을 보고 『왠지 작아서 귀여울지도<emoji=heart04>』라고 생각하게 되어버린 건, 선배 때문이니까요~<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「はふぅん<emoji=heart04>\u3000責任とってぇ、私のちっちゃ可愛いおっぱい、たくさん愛してくれなくちゃダメですよ<emoji=heart04>」"
translation = "「하후웅<emoji=heart04> 책임지고오, 제 작고 귀여운 가슴, 잔뜩 사랑해 주지 않으면 안 돼요<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「んっ……<emoji=heart04>\u3000ほら、センパイが乳首ちゅっちゅし続けるからぁ、私のおま○こも、すっかりぐちょぐちょになっちゃってます<emoji=heart04>」"
translation = "「응……<emoji=heart04> 봐요, 선배가 유두를 계속 쪽쪽 빠니까아, 제 보지도, 완전히 질척질척해져 버렸어요<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「ああぁっ<emoji=heart04>\u3000可愛い後輩のおま○こも、おっぱいと同じくらい、いっぱい可愛がってくださいっ<emoji=heart04>」"
translation = "「아아아앗<emoji=heart04> 귀여운 후배의 보지도, 가슴만큼이나, 잔뜩 예뻐해 주세요!」"

[[dialogue]]
speaker = "クロト"
original = "「わかった。じゃあ……もう挿れちゃうからな」"
translation = "「알았어. 그럼…… 이제 삽입할 테니까.」"

[[dialogue]]
speaker = "リーリア"
original = "「はい、センパイ<emoji=heart04>\u3000あっ――<emoji=heart04>」"
translation = "「네, 선배<emoji=heart04> 앗――<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「んっ<emoji=heart04>\u3000ふあああああぁぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「응<emoji=heart04> 후아아아아아아아아앙~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺がペニスをリーリアのおま○こに挿入していくと、既に愛液でぬるぬるになっていた膣穴へ、根本までぬるんと飲み込まれてしまった。"
translation = "내가 페니스를 리리아의 보지에 삽입하자, 이미 애액으로 미끌미끌해진 질 구멍 속으로, 뿌리까지 미끄러지듯 삼켜져 버렸다."

[[dialogue]]
speaker = "リーリア"
original = "「あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000はあぁっ……ふああぁんっ<emoji=heart04>\u3000んあっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ああぁんっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앙<emoji=heart04> 응우웃<emoji=heart04> 하아앗……후아아앙<emoji=heart04> 응앗<emoji=heart04> 앗<emoji=heart04> 아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "腰をゆっくりと動かして、膣内でリーリアが感じるところをじっくり愛撫していく。"
translation = "허리를 천천히 움직여서, 질 내에서 리리아가 느끼는 곳을 찬찬히 애무해 나간다."

[[dialogue]]
speaker = "リーリア"
original = "「はあああぁ～っ<emoji=heart04>\u3000センパイのおち○ちんに、気持ちいいところ可愛がられちゃってますぅ～っ<emoji=heart04>\u3000んふぅっ……はああぁあっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04>」"
translation = "「하아아아~앗<emoji=heart04> 선배의 자지에, 기분 좋은 곳을 귀여움 받고 있어요오~앗<emoji=heart04> 응후읏……하아아앗<emoji=heart04> 응아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「ああぁっ、気持ちいいっ<emoji=heart04>\u3000センパイ気持ちいいですぅ～っ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あぁあんっ<emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000はあぁあっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「아아앗, 기분 좋아<emoji=heart04> 선배 기분 좋아요오~앗<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 아아앙<emoji=heart04> 응응웃<emoji=heart04> 하아아앗<emoji=heart04> 응아앗<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺自身も快感を覚えながら、可愛く喘ぐリーリアももっと喘がせたいと、ペニスの先で熱く濡れた膣内を撫でまわしていると──"
translation = "나 자신도 쾌감을 느끼면서, 귀엽게 신음하는 리리아를 더 신음하게 만들고 싶어, 페니스 끝으로 뜨겁게 젖은 질 안을 휘저으며 애무하고 있자──"

[[dialogue]]
speaker = "unk"
original = "おずおずといった感じで、リーリアの指が自身の乳首をこね始める。"
translation = "머뭇거리는 느낌으로, 리리아의 손가락이 자신의 유두를 주무르기 시작한다."

[[dialogue]]
speaker = "リーリア"
original = "「んはあぁっ……<emoji=heart04>\u3000乳首、なんだかウズウズして……んんぅっ<emoji=heart04>\u3000ふあぁっ……あっ<emoji=heart04>\u3000はああぁんっ……<emoji=heart04>」"
translation = "「응하아앗……<emoji=heart04> 유두, 왠지 근질근질해서……응응웃<emoji=heart04> 후아앗……앗<emoji=heart04> 하아아앙……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "最初はこっそりといった風な動きだったが、すぐに動きは大胆になり、リーリアは両手の指で自分の乳首をいやらしくこねくり回し、摘まんだり擦ったりを始めた。"
translation = "처음에는 몰래 하는 듯한 움직임이었지만, 곧 움직임은 대담해졌고, 리리아는 양손 손가락으로 자신의 유두를 야하게 주무르고, 꼬집거나 문지르기 시작했다."

[[dialogue]]
speaker = "リーリア"
original = "「ふうぅぅぅっ……<emoji=heart04>\u3000なんかこれ、おかしいかもぉ<emoji=heart04>\u3000母乳薬の副作用、かもしれませんっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000んふうぅっ……<emoji=heart04>」"
translation = "「후우우우웃……<emoji=heart04> 왠지 이거, 이상할지도오<emoji=heart04> 모유 약의 부작용, 일지도 몰라요옷<emoji=heart04> 앗<emoji=heart04> 후아앗<emoji=heart04> 응후우웃……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「恥ずかしいのに気持ちよくて、指が止まらなくなっちゃいますぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000ふうぅっ……んうぅっ<emoji=heart04>\u3000ふああぁっ……<emoji=heart04>」"
translation = "「부끄러운데 기분 좋아서, 손가락이 멈추지 않게 되어버려요옷<emoji=heart04> 앗<emoji=heart04> 하앙<emoji=heart04> 후우웃……응우웃<emoji=heart04> 후아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リーリアは自分の乳首を熱心に愛撫しながら、次第に快楽の熱に浮かされてような顔で言う。"
translation = "리리아는 자신의 유두를 열심히 애무하면서, 점차 쾌락의 열기에 뜬 듯한 얼굴로 말한다."

[[dialogue]]
speaker = "リーリア"
original = "「んうぅぅっ<emoji=heart04>\u3000はぁああん<emoji=heart04>\u3000あぁあぁぁっ<emoji=heart04>\u3000またセンパイの前で、乳首オナニーしちゃってますぅっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000センパイ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000センパぁイっ<emoji=heart04>」"
translation = "「응우우웃<emoji=heart04> 하아아앙<emoji=heart04> 아아아아앗<emoji=heart04> 또 선배 앞에서, 유두 자위 해버리고 있어요옷<emoji=heart04> 하아앗<emoji=heart04> 선배<emoji=heart04> 아앙<emoji=heart04> 선배애앳<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「私、センパイに言われた通り、あぁんっ<emoji=heart04>\u3000ちゃんとオナニー、我慢してるんですよぉ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁあんっ<emoji=heart04>\u3000んふぅっ……<emoji=heart04>」"
translation = "「저, 선배가 말한 대로, 아앙<emoji=heart04> 제대로 자위, 참고 있다고요오<emoji=heart04> 앗<emoji=heart04> 하아앙<emoji=heart04> 응후읏……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「あぁああっ<emoji=heart04>\u3000今日だって、デートしたら絶対ムラムラしちゃうのにぃ<emoji=heart04>\u3000夜まで我慢してたんですよぉ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふうぅっ……んはぁっ<emoji=heart04>」"
translation = "「아아아앗<emoji=heart04> 오늘만 해도, 데이트하면 분명 근질근질해질 텐데에<emoji=heart04> 밤까지 참고 있었다고요오<emoji=heart04> 응<emoji=heart04> 후우웃……응하앗<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「偉いですか？\u3000あぁんっ<emoji=heart04>\u3000私、ちゃんと我慢できて偉いですよねぇ？\u3000あはぁあっ<emoji=heart04>\u3000だからお願いします、センパぁイっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>」"
translation = "「기특한가요? 아앙<emoji=heart04> 저, 제대로 참아서 기특하죠오? 아하아앗<emoji=heart04> 그러니까 부탁드려요, 선배애앳<emoji=heart04> 아앙<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「はああぁっ<emoji=heart04>\u3000この薬、おっぱい熱くて、乳首疼いちゃって、あぁぁっ<emoji=heart04>\u3000もう、我慢できなくてぇ<emoji=heart04>\u3000だから……だからぁっ<emoji=heart04>」"
translation = "「하아아앗<emoji=heart04> 이 약, 가슴 뜨겁고, 유두 욱신거려서, 아아앗<emoji=heart04> 이제, 못 참겠어서어<emoji=heart04> 그러니까……그러니까앗<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「センパイの前で、あぁんっ<emoji=heart04>\u3000おま○こされながらおっぱいオナニーするの、許して欲しいですぅ<emoji=heart04>」"
translation = "「선배 앞에서, 아앙<emoji=heart04> 보지 당하면서 가슴 자위 하는 거, 용서해 주셨으면 해요오」"

[[dialogue]]
speaker = "クロト"
original = "「っ……ああ、いいぞ。俺の前でリーリアが自分でしてるの、すごくエッチで興奮するからっ」"
translation = "「윽……아아, 좋아. 내 앞에서 리리아가 스스로 하는 거, 굉장히 야해서 흥분되니까」"

[[dialogue]]
speaker = "unk"
original = "俺はペニスの動きを変えて、今度は膣内の浅いところにあるリーリアの感じる部分を集中的に刺激し始める。"
translation = "나는 페니스의 움직임을 바꿔서, 이번에는 질 내의 얕은 곳에 있는 리리아가 느끼는 부분을 집중적으로 자극하기 시작한다."

[[dialogue]]
speaker = "リーリア"
original = "「あっ！？\u3000ふあああぁ～～っ<emoji=heart04><emoji=heart04>\u3000そこ<emoji=heart04>\u3000おま○こも気持ちいいっ<emoji=heart04>\u3000おっぱいと同時に気持ちよくなって、私おかしくなっちゃいますぅ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「앗!? 후아아아~~앗<emoji=heart04><emoji=heart04> 거기<emoji=heart04> 보지도 기분 좋아앗<emoji=heart04> 가슴이랑 동시에 기분 좋아져서, 저 이상해져 버려요오~~옷<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "興奮が高まってきた俺は、腰を振りながら再び乳首に吸い付き、母乳を飲む。"
translation = "흥분이 고조된 나는, 허리를 흔들며 다시 유두를 빨아들이고, 모유를 마신다."

[[dialogue]]
speaker = "リーリア"
original = "「はああぁんっ<emoji=heart04><emoji=heart04>\u3000あぁああっ、センパイ<emoji=heart04>\u3000今乳首吸われたら、もっと気持ちよくなっちゃうっ<emoji=heart04>\u3000すごく感じちゃいますぅっ<emoji=heart04><emoji=heart04>」"
translation = "「하아아앙<emoji=heart04><emoji=heart04> 아아아앗, 선배<emoji=heart04> 지금 유두 빨리면, 더 기분 좋아져 버려어<emoji=heart04> 엄청 느껴버려요옷<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「リーリアの母乳、さっきよりも濃くなって、エッチな味だ……！」"
translation = "「리리아의 모유, 아까보다 진해져서, 야한 맛이야……!」"

[[dialogue]]
speaker = "リーリア"
original = "「あぁんっ<emoji=heart04>\u3000ああんっ<emoji=heart04>\u3000ダメですぅ、センパぁイっ<emoji=heart04>\u3000そんな乳首、いっぱい可愛がられちゃったらぁ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふあああぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「아앙<emoji=heart04> 아앙<emoji=heart04> 안 돼요오, 선배애앳<emoji=heart04> 그렇게 유두, 잔뜩 귀여움 받아버리면어어<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 후아아아~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は下半身でピストンを続けなら、乳首を舌で転がしたり強く吸ったりと、緩急をつけて刺激する。"
translation = "나는 하반신으로 피스톤을 계속하면서, 유두를 혀로 굴리거나 강하게 빠는 등 완급을 조절하며 자극한다."

[[dialogue]]
speaker = "リーリア"
original = "「きちゃうっ<emoji=heart04>\u3000あぁああっ<emoji=heart04>\u3000乳首気持ちよくなって、イっちゃいますぅ～～っ<emoji=heart04><emoji=heart04>\u3000あっ、あっ<emoji=heart04><emoji=heart04>\u3000ふあああぁ～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「와버려엇<emoji=heart04> 아아아앗<emoji=heart04> 유두 기분 좋아져서, 가버려요오~~옷<emoji=heart04><emoji=heart04> 앗, 앗<emoji=heart04><emoji=heart04> 후아아아~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「――んあぁあああぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「──응아아아아아~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リーリアが必死に快感を逃がすように、カクカクと体を震わせる。同時に潮吹きのように、ぴゅっと母乳が勢いよく噴き出す。"
translation = "리리아가 필사적으로 쾌감을 흘려보내듯, 움찔움찔 몸을 떨었다. 동시에 시오후키처럼, 퓨읏 하고 모유가 기세 좋게 뿜어져 나온다."

[[dialogue]]
speaker = "unk"
original = "どうやら、リーリアは乳首でイってしまったらしい。"
translation = "아무래도, 리리아는 유두로 가버린 모양이다."

[[dialogue]]
speaker = "リーリア"
original = "「んっ<emoji=heart04>\u3000はああぁ～～～っ<emoji=heart04><emoji=heart04>\u3000あぁああっ<emoji=heart04>\u3000私、乳首でイっちゃいましたぁっ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はぁあんっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 하아아아~~~앗<emoji=heart04><emoji=heart04> 아아아앗<emoji=heart04> 저, 유두로 가버렸어요오앗<emoji=heart04><emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 하아앙<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「おっぱいで気持ちよくなっちゃうリーリア、可愛くてエッチだぞ……っ」"
translation = "「가슴으로 기분 좋아져 버리는 리리아, 귀엽고 야하다고……윽」"

[[dialogue]]
speaker = "リーリア"
original = "「はあぁっ<emoji=heart04>\u3000ああぁっ<emoji=heart04>\u3000私もぉ<emoji=heart04>\u3000私のちっちゃいおっぱい、可愛いっ<emoji=heart04>\u3000ふわぁあんっ<emoji=heart04>\u3000あぁぁっ<emoji=heart04>\u3000好きぃ<emoji=heart04>」"
translation = "「하아앗<emoji=heart04> 아아앗<emoji=heart04> 저도오<emoji=heart04> 제 조그만 가슴, 귀여워어<emoji=heart04> 후아아앙<emoji=heart04> 아아앗<emoji=heart04> 좋아해애<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あぁぁ<emoji=heart04>\u3000私のこと、いっぱい気持ちよくしてくれるからぁ<emoji=heart04>\u3000この子のこと、好きになってきちゃいましたぁ<emoji=heart04>\u3000んあぁんっ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 아아아<emoji=heart04> 저를, 잔뜩 기분 좋게 해주니까아<emoji=heart04> 이 아이를, 좋아하게 되어버렸어요오<emoji=heart04> 응아앙……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「知ってますか、センパイ？\u3000あぁあんっ<emoji=heart04>\u3000はぁあっ<emoji=heart04>\u3000おっぱいはちっちゃい方が、感度がいいそうですよぉ<emoji=heart04>」"
translation = "「알고 있나요, 선배? 아아앙<emoji=heart04> 하아앗<emoji=heart04> 가슴은 작은 쪽이, 감도가 좋다고 해요오<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「んふぅっ<emoji=heart04>\u3000あぁあっ<emoji=heart04>\u3000ちっちゃくて可愛い私のおっぱい<emoji=heart04>\u3000弄るとすぐ気持ちよくなっちゃってぇ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふあぁっ……<emoji=heart04>」"
translation = "「응후읏<emoji=heart04> 아아앗<emoji=heart04> 작고 귀여운 내 가슴<emoji=heart04> 만지면 금방 기분 좋아져 버려서어<emoji=heart04> 하아앗<emoji=heart04> 앗<emoji=heart04> 후아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺のピストンに合わせるように小さく腰をゆすりながら、ねちっこく自分の乳首をこねまわすリーリア。"
translation = "나의 피스톤에 맞추듯 작게 허리를 흔들며, 끈적하게 자신의 유두를 주무르는 리리아."

[[dialogue]]
speaker = "unk"
original = "セックスをしながらのおっぱいオナニーはどんどん大胆になってきて、乳首を弄るだけでは飽き足らず、時折手のひらサイズのおっぱいをいやらしい手つきで揉みしだく。"
translation = "섹스를 하면서 하는 가슴 자위는 점점 대담해져서, 유두를 만지는 것만으로는 성에 차지 않는지, 때때로 손바닥 사이즈의 가슴을 야한 손놀림으로 주물러 댔다."

[[dialogue]]
speaker = "リーリア"
original = "「あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はぁあんっ<emoji=heart04>\u3000おっぱい気持ちいいっ<emoji=heart04>\u3000エッチで可愛くて、パーフェクトなおっぱいですぅ<emoji=heart04>」"
translation = "「앙<emoji=heart04> 앙<emoji=heart04> 하아앙<emoji=heart04> 가슴 기분 좋아앗<emoji=heart04> 야하고 귀여워서, 퍼펙트한 가슴이에요오<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「センパイが可愛いって言ってくれてたのもっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000今ならわかりますっ<emoji=heart04>\u3000ちっちゃいおっぱい、すっごく可愛いっ<emoji=heart04>」"
translation = "「선배가 귀엽다고 말해준 것도옷<emoji=heart04> 아앙<emoji=heart04> 지금이라면 알 것 같아요옷<emoji=heart04> 작은 가슴, 정말 귀여워엇<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「んふぅぅぅっ<emoji=heart04>\u3000はぁああぁっ<emoji=heart04>\u3000私のおっぱい、ちっちゃくて良かったぁ<emoji=heart04>\u3000あぁあんっ<emoji=heart04>\u3000気持ちいいところ、いっぱいよしよししちゃいますぅ<emoji=heart04>」"
translation = "「응후우우웃<emoji=heart04> 하아아아앗<emoji=heart04> 내 가슴, 작아서 다행이야아<emoji=heart04> 아아앙<emoji=heart04> 기분 좋은 곳, 잔뜩 쓰담쓰담 해버릴게요오」"

[[dialogue]]
speaker = "unk"
original = "リーリアが自分で乳首を転がすたびに、膣がきゅんと甘く痙攣してペニスを締めつける。"
translation = "리리아가 스스로 유두를 굴릴 때마다, 질이 큥 하고 달콤하게 경련하며 페니스를 조여온다."

[[dialogue]]
speaker = "unk"
original = "手の動きも、俺に自慢のおっぱいを見せつけるようないやらしい動きまで加わって、俺の興奮は限界まで上り詰めようとしていた。"
translation = "손의 움직임도, 나에게 자랑스러운 가슴을 과시하는 듯한 야한 움직임까지 더해져, 나의 흥분은 한계까지 치닫고 있었다."

[[dialogue]]
speaker = "クロト"
original = "「リーリア、もうそろそろ激しく動くぞっ……！」"
translation = "「리리아, 이제 슬슬 격렬하게 움직인다……!」"

[[dialogue]]
speaker = "リーリア"
original = "「あぁあっ<emoji=heart04>\u3000センパイ<emoji=heart04>\u3000きてきてぇっ<emoji=heart04>\u3000んぁああっ――<emoji=heart04><emoji=heart04>」"
translation = "「아아앗<emoji=heart04> 선배<emoji=heart04> 와줘 와줘어엇<emoji=heart04> 응아아앗──<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「おち○ちん、奥の気持ちいいとこ届いてますぅ～～っ<emoji=heart04><emoji=heart04>\u3000あっあん、あん、あぁんっ<emoji=heart04>\u3000はあぁっ、ふああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「자지, 안쪽의 기분 좋은 곳에 닿고 있어요오~~앗<emoji=heart04><emoji=heart04> 앗앙, 앙, 아앙<emoji=heart04> 하아앗, 후아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リーリアの膣奥にある弱点を亀頭で激しめに愛撫すると、それに反応して熱い襞がペニスをきゅっと咥え込む。"
translation = "리리아의 질 안쪽에 있는 약점을 귀두로 격렬하게 애무하자, 그에 반응하여 뜨거운 주름이 페니스를 꽉 물어온다."

[[dialogue]]
speaker = "リーリア"
original = "「センパイ、それ気持ちぃっ<emoji=heart04>\u3000おま○こきもちぃですぅ<emoji=heart04><emoji=heart04>\u3000あっ、あっ、あっ、あんっ<emoji=heart04>\u3000どちゅどちゅ来てますぅ～<emoji=heart04>\u3000んああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「선배, 그거 기분 조아앗<emoji=heart04> 보지 기분 조아요오<emoji=heart04><emoji=heart04> 앗, 앗, 앗, 앙<emoji=heart04> 도츄도츄 오고 있어요오~<emoji=heart04> 응아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「はあああぁっ<emoji=heart04>\u3000乳首っ<emoji=heart04>\u3000乳首もビンビンに感じちゃいますっ<emoji=heart04>\u3000あっ、あんっ、あんっ、あっ<emoji=heart04>\u3000んあああぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「하아아아앗<emoji=heart04> 유두옷<emoji=heart04> 유두도 빳빳하게 느껴버려요옷<emoji=heart04> 앗, 앙, 앙, 앗<emoji=heart04> 응아아아~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リーリアは自分のおっぱいを激しく揉みしだきながら、硬く尖った乳首を指先でもてあそび、時に爪で軽く弾きながら甘く喘ぐ。"
translation = "리리아는 자신의 가슴을 격렬하게 주무르면서, 딱딱하게 선 유두를 손가락 끝으로 농락하고, 때때로 손톱으로 가볍게 튕기며 달콤하게 신음한다."

[[dialogue]]
speaker = "unk"
original = "その快感が膣奥へ伝わり、きゅんと締めつけるたび、俺のペニスを包む熱はさらに淫らに高まっていった。"
translation = "그 쾌감이 질 안쪽으로 전달되어, 큥 하고 조일 때마다, 나의 페니스를 감싸는 열기는 더욱 음란하게 고조되어 갔다."

[[dialogue]]
speaker = "リーリア"
original = "「ぁああぁあっ<emoji=heart04>\u3000乳首コリコリ気持ちぃいっ<emoji=heart04>\u3000カリカリ、シコシコ気持ちぃのぉ～～っ<emoji=heart04><emoji=heart04>\u3000あっ、あっ、あっ、はぁんっ、気持ちくて好きぃ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「아아아아앗<emoji=heart04> 유두 오돌토돌 기분 조아앗<emoji=heart04> 까득까득, 슈슉슈슉 기분 조은걸요오~~옷<emoji=heart04><emoji=heart04> 앗, 앗, 앗, 하앙, 기분 좋아서 좋아해애~~옷<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「ふぁああぁあっ<emoji=heart04>\u3000おっぱいもおま○こも可愛いっ<emoji=heart04>\u3000可愛くて好きぃっ<emoji=heart04>\u3000はぁ、あぁぁ、あああっ<emoji=heart04>\u3000きもちくて好きになっちゃうぅ～っ<emoji=heart04><emoji=heart04>」"
translation = "「후아아아아앗<emoji=heart04> 가슴도 보지도 귀여워어<emoji=heart04> 귀여워서 좋아해애앗<emoji=heart04> 하아, 아아아, 아아앗<emoji=heart04> 기분 좋아서 좋아하게 되어버려어~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「きもちぃの好きぃ<emoji=heart04>\u3000あぁああぁあぁぁっ<emoji=heart04>\u3000おっぱいしゅきぃ<emoji=heart04>\u3000おま○こもしゅきぃ<emoji=heart04>\u3000あ、あ、あ、あ、あっ<emoji=heart04>\u3000おち○ちんも大しゅきぃ～～<emoji=heart04><emoji=heart04>」"
translation = "「기분 조은 거 죠아해애<emoji=heart04> 아아아아아아아앗<emoji=heart04> 가슴 죠아해애<emoji=heart04> 보지도 죠아해애<emoji=heart04> 아, 아, 아, 아, 앗<emoji=heart04> 자지도 너무 죠아해애~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リーリアは乳首をひと擦りするたびにブルブルと体を震わせて、自分の指で母乳を絞りながら、淫らな嬌声を上げ続ける。"
translation = "리리아는 유두를 한 번 문지를 때마다 부르르 몸을 떨며, 자신의 손가락으로 모유를 짜내면서 음란한 교성을 계속 내질렀다."

[[dialogue]]
speaker = "リーリア"
original = "「おち○ちん気持ちいいっまだ激しくなるぅ<emoji=heart04>\u3000あっ、あんっ、んあぁっ<emoji=heart04>\u3000あ、あ、あ、あ、あっ<emoji=heart04>\u3000あぁああっ<emoji=heart04>\u3000おち○ちん気持ちいい～～っ<emoji=heart04><emoji=heart04>」"
translation = "「자지 기분 좋아앗 아직 격렬해져어<emoji=heart04> 앗, 앙, 응아앗<emoji=heart04> 아, 아, 아, 아, 앗<emoji=heart04> 아아아앗<emoji=heart04> 자지 기분 좋아아~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「あっ、ふあああぁっ、あぁああっ<emoji=heart04>\u3000もうダメっ<emoji=heart04>\u3000もうイクっ、イクイクっ<emoji=heart04><emoji=heart04>\u3000おっぱいおま○こ同時にイっちゃぅうううっ～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗, 후아아아앗, 아아아앗<emoji=heart04> 이제 안 돼앗<emoji=heart04> 이제 가, 가버려 가버려엇<emoji=heart04><emoji=heart04> 가슴 보지 동시에 가버려어어어엇~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「リーリアっ！\u3000俺ももうイクっ」"
translation = "「리리아! 나도 이제 가!」"

[[dialogue]]
speaker = "リーリア"
original = "「きてっ、きてきてっセンパイっ<emoji=heart04><emoji=heart04>\u3000あっあっあっあっあっ<emoji=heart04>\u3000可愛いおま○こにいっぱい射精してぇぇぇ～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「와줘, 와줘 와줘 선배애앗<emoji=heart04><emoji=heart04> 앗앗앗앗앗<emoji=heart04> 귀여운 보지에 잔뜩 사정해줘어어어~~옷<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「あぁああぁぁあああっ<emoji=heart04><emoji=heart04>\u3000イクっ、イクイクイクイクイクっ<emoji=heart04><emoji=heart04>\u3000ああ、あぁ、ああ、あぁ、あぁあっ<emoji=heart04>\u3000ふあぁああぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아아아아아아아앗<emoji=heart04><emoji=heart04> 가, 가버려 가버려 가버려 가버려 가버려엇<emoji=heart04><emoji=heart04> 아아, 아아, 아아, 아아, 아아앗<emoji=heart04> 후아아아아아~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「リーリア、出すぞっ！！！」"
translation = "「리리아, 싼다!!!」"

[[dialogue]]
speaker = "リーリア"
original = "「イクイク、イっちゃぅうううっ<emoji=heart04><emoji=heart04>\u3000んああぁあっ、ふあああぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가버려 가버려, 가버려어어어엇<emoji=heart04><emoji=heart04> 응아아아앗, 후아아아아아~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「イっクううぅぅうぅうぅぅぅ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가아아아아아아아아아아아아아아~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はリーリアの最奥までペニスを挿入すると同時に、溜まりに溜まった欲望を一気に解き放った。"
translation = "나는 리리아의 가장 깊은 곳까지 페니스를 삽입함과 동시에, 쌓이고 쌓인 욕망을 단번에 해방했다."

[[dialogue]]
speaker = "リーリア"
original = "「はああぁああぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000気持ちいいの止まらなくて、おっぱい出ちゃいますうぅぅぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하아아아아아아아아~~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 기분 좋은 게 멈추지 않아서, 가슴 나와버려요오오오오~~~옷<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「あぁああぁあぁぁっ<emoji=heart04>\u3000ふあああぁああぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아아아아아아앗<emoji=heart04> 후아아아아아아아아~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リーリアのおっぱいから、ぴゅうぅ～～っ！\u3000っと、母乳が大量に噴き出す。"
translation = "리리아의 가슴에서, 퓨우우~~앗! 하고 모유가 대량으로 뿜어져 나온다."

[[dialogue]]
speaker = "リーリア"
original = "「んはあぁぁ～～っ<emoji=heart04><emoji=heart04>\u3000母乳がぴゅ～っていっぱい噴き出るの、気持ちいぃ～～っ<emoji=heart04><emoji=heart04>\u3000はああぁ～っ<emoji=heart04>\u3000んっ……ふあぁ～っ……<emoji=heart04>」"
translation = "「응하아아아~~앗<emoji=heart04><emoji=heart04> 모유가 퓨~ 하고 잔뜩 뿜어져 나오는 거, 기분 조아아~~앗<emoji=heart04><emoji=heart04> 하아아아~앗<emoji=heart04> 응……후아아~앗……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「はぁあんっ……<emoji=heart04>\u3000センパイの熱い精液ミルクも、まだ出続けてて、すごぉいっ<emoji=heart04>\u3000んんぅっ……ふうぅうっ……<emoji=heart04>」"
translation = "「하아앙……<emoji=heart04> 선배의 뜨거운 정액 우유도, 아직 계속 나오고 있어서, 대단해애앗<emoji=heart04> 응응웃……후우우웃……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そうして、やがて長い射精が終わり、絶頂の余韻が落ち着いてきたところで、俺はペニスを引き抜く。"
translation = "그렇게, 이윽고 긴 사정이 끝나고, 절정의 여운이 가라앉기 시작할 즈음, 나는 페니스를 뽑아냈다."

[[dialogue]]
speaker = "リーリア"
original = "「はあぁぁ……ふうぅ……<emoji=heart04>\u3000んんぅ……<emoji=heart04>」"
translation = "「하아아아……후우우……<emoji=heart04> 응응웃……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "膣と胸を白濁に染めながら、リーリアは未だ熱が冷めきらない吐息を漏らす。"
translation = "질과 가슴을 백탁으로 물들인 채, 리리아는 아직 열기가 다 식지 않은 한숨을 내뱉는다."

[[dialogue]]
speaker = "リーリア"
original = "「あはぁああぁぁっ<emoji=heart04>\u3000おま○ことおっぱいの同時イキで、すごく気持ちよくイっちゃいましたぁ……<emoji=heart04>」"
translation = "「아하아아아아앗<emoji=heart04> 보지랑 가슴 동시 절정으로, 정말 기분 좋게 가버렸어요……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「俺も、リーリアのおっぱいから母乳が出てるのエッチ過ぎて、いつも以上に興奮した……」"
translation = "「나도, 리리아의 가슴에서 모유가 나오는 게 너무 야해서, 평소보다 더 흥분했어……」"

[[dialogue]]
speaker = "リーリア"
original = "「んふふふふふっ<emoji=heart04>\u3000おっぱいでどんどん気持ちよくなれるようになっちゃって、私のおっぱい、本当に可愛いです<emoji=heart04>」"
translation = "「응후후후후훗<emoji=heart04> 가슴으로 점점 기분 좋아질 수 있게 되어버려서, 제 가슴, 정말 귀여워요<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「また俺に隠れて、オナニーしちゃいそう……？」"
translation = "「또 나 몰래, 자지 해버릴 것 같아……?」"

[[dialogue]]
speaker = "リーリア"
original = "「はふぅぅ……<emoji=heart04>\u3000んんぅ<emoji=heart04>\u3000もちろん、どんなに乳首とおっぱい疼いても、センパイのいないところでは触りませんよぉ<emoji=heart04>」"
translation = "「하후우우……<emoji=heart04> 응응웃<emoji=heart04> 물론, 아무리 유두랑 가슴이 욱신거려도, 선배가 없는 곳에서는 만지지 않을게요오<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「意外かもしれないですけどぉ、私、すっごく一途なので<emoji=heart04>\u3000はぁぁっ<emoji=heart04>\u3000自分の指でも、浮気は絶対しないんです<emoji=heart04>」"
translation = "「의외일지도 모르지만요오, 저, 정말 한결같으니까아<emoji=heart04> 하아아앗<emoji=heart04> 제 손가락으로도, 바람은 절대 안 피워요<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「でもでも、私のおっぱいってすっごく可愛いじゃないですかぁ<emoji=heart04>\u3000それに、おっぱいだったらいつでも弄れますし……<emoji=heart04>」"
translation = "「그치만 그치만, 제 가슴은 정말 귀엽잖아요오<emoji=heart04> 게다가, 가슴이라면 언제든 만질 수 있고……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「だからこれからは、センパイが気が向いたら、いつでも揉んだりつまんだりして、いっぱい可愛がってほしいな～って<emoji=heart04>」"
translation = "「그러니까 앞으로는, 선배가 마음 내킬 때, 언제든 주무르거나 꼬집어서, 잔뜩 귀여워해 줬으면 좋겠네~ 하고<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「任せろ。欲求不満なんて溜めこむ暇がないくらい、可愛がりまくってやる」"
translation = "「맡겨둬. 욕구불만 따위 쌓일 틈이 없을 정도로, 잔뜩 귀여워해 줄 테니까」"

[[dialogue]]
speaker = "リーリア"
original = "「あはっ<emoji=heart04>\u3000嬉しすぎて、おっぱいとおま○こ、またキュンってしちゃいましたぁ<emoji=heart04>」"
translation = "「아핫<emoji=heart04> 너무 기뻐서, 가슴이랑 보지, 또 큥 해버렸어요오」"

[[dialogue]]
speaker = "リーリア"
original = "「あんっ<emoji=heart04>\u3000センパイ……<emoji=heart04>\u3000そんなおっぱい吸われたら、もっともっと好きになっちゃうじゃないですかぁ<emoji=heart04>\u3000はぁあんっ……<emoji=heart04>」"
translation = "「앙<emoji=heart04> 선배……<emoji=heart04> 그런 가슴 빨리면, 더더욱 좋아하게 되어버리잖아요오 하아앙……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その後も母乳薬の効果が切れるまで、俺はリーリアのおっぱいを何度も可愛がって愛し続けるのだった。"
translation = "그 후로도 모유 약의 효과가 끊길 때까지, 나는 리리아의 가슴을 몇 번이고 귀여워하며 계속 사랑했다."

