[[dialogue]]
speaker = "unk"
original = "第３話,藍の目指す先は,P"
translation = "제3화, 아이가 목표로 하는 곳은, P"

[[dialogue]]
speaker = "unk"
original = "『脇役ながらも強い存在感』『ドラマごとにまるで別人』と話題の新人女優として、泉原藍の名は学園外にも広まり始めたが──"
translation = "『조연이면서도 강한 존재감』 『드라마마다 마치 딴사람』이라며 화제인 신인 여배우로서 이즈하라 아이의 이름은 학원 밖으로도 퍼지기 시작했지만──"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「何度言えばわかる！\u3000お前の頭に詰まってるのはクリームチーズか何かか！？」"
translation = "「몇 번을 말해야 알아듣겠나! 네 머릿속에 든 건 크림치즈 같은 것인가!?」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「ぴゃい！\u3000ごめんなさい！」"
translation = "「퍄앗! 죄송합니다!」"

[[dialogue]]
speaker = "unk"
original = "演劇部では相変わらず、ロクサーナの怒号が飛び交っていた。"
translation = "연극부에서는 변함없이 록사나의 호통이 울려 퍼지고 있었다."

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「しばらく仕事の方を優先していたせいか、舞台勘が鈍ったようだな。今のお前の芝居は、おとなしくていい子ちゃんなドラマ仕立てだ」"
translation = "「한동안 일을 우선시한 탓인지 무대 감각이 둔해진 모양이군. 지금 네 연기는 얌전하고 착한 척하는 드라마 방식이다.」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「モニターの前で見せるドラマと、広大なホールの上の舞台じゃ表現方法はまったくの別物だ。舞台上で大袈裟なくらいに感情を出さなければ、観客まで届かん」"
translation = "「모니터 앞에서 보여주는 드라마와 광활한 홀 위의 무대는 표현 방법이 완전히 별개다. 무대 위에서 과장될 정도로 감정을 쏟아내지 않으면 관객에게 닿지 않아.」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「は、はい……」"
translation = "「네, 네……」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「お前が演者をやっている理由はなんだ？\u3000金のためか？\u3000特別な存在になりたいからか？\u3000単純に面白いからか？」"
translation = "「네가 연기를 하는 이유는 뭐지? 돈 때문인가? 특별한 존재가 되고 싶어서인가? 단순히 재미있어서인가?」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「目指す先はどこだ？\u3000行く先々でちやほやされる芸能人か？\u3000世界で活躍する舞台女優か？\u3000学生の部活レベルでおしまいか？」"
translation = "「목표로 하는 곳은 어디냐? 가는 곳마다 떠받들어지는 연예인인가? 세계에서 활약하는 무대 여배우인가? 학생 동아리 수준으로 끝낼 것인가?」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「お前がどんな理由で、どの道を選ぼうが私の知ったことではない。どれでも構わんし、否定するつもりもない」"
translation = "「네가 어떤 이유로 어떤 길을 택하든 내가 상관할 바는 아니다. 어느 것이든 상관없고 부정할 생각도 없다.」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「だが、ブレることだけは許さん。己の信念すら貫けんような奴は、観客の心も貫けん」"
translation = "「하지만 흔들리는 것만은 용서치 않는다. 자신의 신념조차 관철하지 못하는 녀석은 관객의 마음도 꿰뚫을 수 없어.」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「……ごめんなさい、部長。ちょっと休憩いただきます」"
translation = "「……죄송해요, 부장님. 잠깐 휴식 좀 가질게요.」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「好きにしろ。１０分で戻れ」"
translation = "「 마음대로 해라. 10분 안에 돌아와.」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「部長、今日はなんだか藍に当たりが強くないですか？」"
translation = "「부장님, 오늘은 왠지 아이에게 너무 엄하신 거 아닌가요?」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「そんなことはない。私が凡骨に対して容赦しないのは、いつものことだろう」"
translation = "「그럴 리가. 내가 범골에게 가차 없는 건 늘 있던 일이지 않으냐.」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「それはまぁそうなんですけど……」"
translation = "「그건 그렇긴 합니다만……」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「なんだ、当たりを強くしてほしいなら、お望みどおりにしてやるぞ？\u3000手始めにさっきのＮＧの罰として、全身くすぐりの刑に──」"
translation = "「뭐냐, 엄하게 대해주길 원한다면 바라는 대로 해 주마. 우선 아까 NG의 벌로서 전신 간지럽히기 형벌을──」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「強めなくていいです！\u3000処さないでくださ～い！」"
translation = "「안 엄하셔도 돼요! 처단하지 말아주세요~!」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「はぁぁ……今日も怒られちゃいました……」"
translation = "「하아아…… 오늘도 혼나버렸네요……」"

[[dialogue]]
speaker = "unk"
original = "藍、お疲れさま"
translation = "아이, 수고했어."

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「会長さん……格好悪いところ見られちゃいましたね」"
translation = "「회장님…… 꼴사나운 모습을 보여드리고 말았네요.」"

[[dialogue]]
speaker = "unk"
original = "藍の演技、よくできてたと思うけどな"
translation = "아이 연기, 잘하고 있다고 생각하는데."

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「ありがとうございます。でも、自然とカメラを意識した立ち回りになっちゃってたのは、部長の言う通りなんです」"
translation = "「감사합니다. 하지만 자연스럽게 카메라를 의식한 움직임이 되어버린 건 부장님 말씀대로예요.」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「この稽古は舞台演劇なんだから……気持ち、切り替えなきゃ……」"
translation = "「이 연습은 무대 연극이니까…… 마음을 다잡아야 하는데……」"

[[dialogue]]
speaker = "unk"
original = "部長を信頼してるんだね"
translation = "부장님을 신뢰하고 있구나."

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「はい。人としては得意なタイプではないですけどね。すぐ怒られますし、圧は強いですし、入部したばかりの時は怖すぎて辞めちゃおうかと思ってたくらいです」"
translation = "「네. 사람으로서는 편한 타입은 아니지만요. 금방 화내시고 압박도 심하시고, 입부했을 때는 너무 무서워서 그만둬버릴까 생각했을 정도예요.」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「でも、部長の言うことに間違いはありませんから。自分でもどこか違和感のある部分を的確に指摘してくれるんです」"
translation = "「하지만 부장님 말씀에 틀린 건 없으니까요. 스스로도 어딘가 위화감이 느껴지는 부분을 정확하게 지적해 주시거든요.」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「ドラマはあまり好きじゃないような言い方をしてましたけど、私の出ているドラマも毎話欠かさず観てくれてますし、私の演技についての感想もくれるんですよ」"
translation = "「드라마는 별로 좋아하지 않는 것처럼 말씀하셨지만, 제가 나오는 드라마도 매회 빠지지 않고 봐주시고 제 연기에 대한 감상도 해 주신답니다.」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「だいたいはダメ出しですし、二言目は必ずドラマの脚本への愚痴なんですけどね、ふふ」"
translation = "「대부분은 지적이고, 다음 말은 반드시 드라마 각본에 대한 불평이지만요, 후후.」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「部長は興味のない人には塩対応になりますから、私に期待してくれてるからこそ、キツい言葉を投げかけてくれているんだと思ってます」"
translation = "「부장님은 관심 없는 사람에게는 냉정하시니까 저에게 기대하고 계시기 때문에 엄한 말씀을 해주시는 거라고 생각하고 있어요.」"

[[dialogue]]
speaker = "unk"
original = "確かにそういうとこある"
translation = "확실히 그런 면이 있지."

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「会長さんもロミオの時はめいっぱい絞られましたもんね」"
translation = "「회장님도 로미오 때 엄청 시달리셨죠.」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「さっき、部長に言われて、少し考えたんです」"
translation = "「아까 부장님 말씀을 듣고 조금 생각해 봤어요.」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「私が演者をやっているのは、いつもの自分とは違う誰かに変身できるのが楽しいから」"
translation = "「제가 연기를 하는 건 평소의 자신과는 다른 누군가로 변신할 수 있는 게 즐거우니까.」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「そして、そんな変身を見事に遂げてみせる、理想の役者に近づくため」"
translation = "「그리고 그런 변신을 멋지게 해내 보이는 이상적인 배우에 다가가기 위해서.」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「目指す先は、一人前の女優。できれば、世界に羽ばたけるほどの存在になりたい──でも、それ以上に」"
translation = "「목표로 하는 건 어엿한 여배우. 가능하다면 세계로 뻗어 나갈 수 있는 존재가 되고 싶어요── 하지만 그 이상으로.」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「ぐうの音も出ないような完璧な演技で、部長をギャフンと言わせたいんです」"
translation = "「더 이상 아무 말도 못 할 정도로 완벽한 연기로 부장님 코를 납작하게 해주고 싶어요.」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「それが入部した時から、ブレることのない私の目標なんです。まだまだ先は長そうですけどね」"
translation = "「그게 입부했을 때부터 흔들리지 않는 제 목표예요. 아직 갈 길은 먼 것 같지만요.」"

[[dialogue]]
speaker = "unk"
original = "応援してるよ"
translation = "응원할게."

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「はい、ありがとうございます！\u3000会長さん、そろそろ戻りま──」"
translation = "「네, 감사합니다! 회장님, 슬슬 돌아가보──」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「ほうほう、なるほど。なかなか熱いところがあるじゃあないか」"
translation = "「호오, 과연. 꽤 뜨거운 구석이 있지 않으냐.」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「ぶ、部長！？\u3000いつからそこに！？」"
translation = "「부, 부장님!? 언제부터 거기에!?」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「いつからと言われれば……そうだな、『人間的には苦手なタイプ』とかなんとか、私に対する愚痴を言っていたところからか」"
translation = "「언제부터냐고 묻는다면…… 그래, 『인간적으로는 거북한 타입』이라느니 어쩌니 나에 대한 험담을 하던 때부터인가.」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「そ、そんな言い方はしてなかったと思いますけど……ずっと聞いてたんですか！？」"
translation = "「그, 그런 식으로 말하진 않았던 것 같은데…… 계속 듣고 계셨던 건가요!?」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「演者の声は、通りが良いからな。あれだけ大きな声で話していれば、聞こえもする」"
translation = "「배우의 목소리는 발성이 좋으니까 말이다. 저렇게 큰 소리로 이야기하면 들리기 마련이지.」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「しかし、私をギャフンと言わせるために演者を続けるとはな。実にいい意気込みだ、くっくっく」"
translation = "「하지만 나를 기절초풍하게 만들기 위해 연기를 계속하겠다니. 실로 좋은 기세구나, 큭큭큭.」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「あの、それは違くて……」"
translation = "「저기, 그건 그런 게 아니라……」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「なんだ、違うのか？」"
translation = "「뭐냐, 아니라는 거냐?」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「い、いいえ……違わないです。いつか部長に、私の演技を心から認めさせて……褒めてほしいです……！」"
translation = "「아, 아니요…… 틀리지 않아요. 언젠가 부장님께 제 연기를 진심으로 인정받고…… 칭찬받고 싶어요……!」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「お前は演者として覇気と向上心に欠けていたのが心配だったが、存外負けず嫌いなところもあったのだな」"
translation = "「너는 배우로서 패기와 향상심이 부족한 게 걱정이었는데, 의외로 지기 싫어하는 면도 있었군.」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「役者とは数多の同業からたった１つの役を勝ち取らねばならない仕事だ。そうでなくてはいかん！」"
translation = "「배우란 수많은 동종업계에서 단 하나의 배역을 쟁취해야 하는 직업이다. 그렇지 않으면 안 되지!」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「私を心から満足させる演技をしてくれる日を心待ちにするとしよう。さて、私が筆を折るのと、どっちが早いかな？」"
translation = "「나를 진심으로 만족시킬 연기를 해줄 날을 즐겁게 기다려 주마. 자, 내가 붓을 꺾는 것과 어느 쪽이 빠를까?」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「ぶ、部長っ！\u3000絶対にギャフンと言わせてみせますからね！」"
translation = "「부, 부장님! 반드시 코를 납작하게 해드릴 테니까요!」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「おお、おお、勇ましいことだ。それまでせいぜい『ギャフン』と鳴く練習でもしておくとするか」"
translation = "「오오, 용맹하구나. 그때까지 기껏해야 『항복』이라고 울부짖는 연습이라도 해두기로 할까.」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「『ギャフン』『ギャフーン！』『ギャフン♪』どれがお好みだ？\u3000くっくっく」"
translation = "「『항복』 『항~복!』 『항복♪』 어느 쪽이 취향이지? 큭큭큭.」"

[[dialogue]]
speaker = "unk"
original = "からかうように去ってゆくロクサーナを見つめる藍の視線には闘志が宿り──"
translation = "놀리듯이 떠나가는 록사나를 바라보는 아이의 시선에는 투지가 깃들었고──"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「我が魂が折れることは決してない！\u3000使命を成し遂げるその時までは！\u3000必ず！」"
translation = "「내 영혼이 꺾이는 일은 결코 없어! 사명을 완수하는 그 순간까지는! 반드시!」"

[[dialogue]]
speaker = "unk"
original = "その後の演技には、これまで以上の熱が入ったのであった。"
