[[dialogue]]
speaker_original = "サメ"
speaker_translation = "상어"
original = "「シャーーーーーッ！！！」"
translation = "「샤아아아아악!!!」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「わー、ビーチにサメがいっぱい。パテルちゃん人気者だな～♪\u3000サメにモテても嬉しくないけど」"
translation = "「와~ 해변에 상어가 가득. 파텔짱 인기 많네~♪ 상어한테 인기 있어도 기쁘진 않지만.」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ちなみに魔王たちは不死の命とか興味ある？\u3000どこかのコラプサーみたいなのになってまで生きたい？」"
translation = "「참고로 마왕 일행은 불사의 생명 같은 거 관심 있어? 어디의 콜랩서 같은 게 되어서까지 살고 싶어?」"

[[dialogue]]
speaker = "unk"
original = "俺は今の俺の命を全うするだけだよ"
translation = "나는 지금의 내 생명을 다할 뿐이야"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「アルモたんもそうなのだ！\u3000確かにアルモたんは普通じゃないけど、アルモたんなりに生きるのだ！」"
translation = "「알모땅도 그런 것이다! 확실히 알모땅은 평범하지 않지만, 알모땅 나름대로 살아가는 것이다!」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「そんな摂理に反する生き方をしたいとは思いません。大きい私でも小さい私でも、肉体を得た時からそれは変わらないです」"
translation = "「그런 섭리에 반하는 삶을 살고 싶지는 않아요. 큰 저든 작은 저든, 육체를 얻었을 때부터 그건 변함없어요.」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「それなら大丈夫。今のところ魂や肉体に異変はないって、直接触って調べさせてもらったからね」"
translation = "「그럼 됐어. 아직까지 영혼이나 육체에 이변은 없다는 걸 직접 만져서 조사했으니까.」"

[[dialogue]]
speaker = "unk"
original = "もしかして目隠しされた時に？"
translation = "설마 눈 가려졌을 때?"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「あ、そういえば私も海藻を取ってもらった時に触られましたね」"
translation = "「아, 그러고 보니 저도 해초를 떼어주셨을 때 만져졌었네요.」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「アルモたんもコチョコチョされたのだ！」"
translation = "「알모땅도 간질간질 당한 것이다!」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「そういうこと。サメが出てこなければ、種明かしをするつもりはなかったんだけどね」"
translation = "「그런 거야. 상어가 나오지 않았다면 정체를 밝힐 생각은 없었지만 말이야.」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「さすがパテル、抜け目がありませんね……」"
translation = "「역시 파텔, 빈틈이 없네요……」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「でもアルモたんたちはどうすればいいのだ？\u3000サメを操ってるのがパテルなら、パテルと戦うことになるのか？」"
translation = "「하지만 알모땅 일행은 어떻게 하면 좋은 것이다? 상어를 조종하는 게 파텔이라면 파텔과 싸우게 되는 건가?」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「今のところ魔王やアルモタヘルたちは大丈夫だし、サメは普通に倒しちゃえばいいよ」"
translation = "「지금 당장은 마왕이나 아르모타헬 일행은 괜찮으니까, 상어는 그냥 쓰러뜨리면 돼.」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ていうかこのサメは囮だと思うんだよね。パテルが一番試したいのは、多分あたしだから」"
translation = "「그보다 이 상어는 미끼라고 생각하거든. 파텔이 제일 시험하고 싶은 건 아마 나일 테니까.」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「え……？\u3000それってどういう……？」"
translation = "「에……? 그건 무슨……?」"

[[dialogue]]
speaker_original = "サメ"
speaker_translation = "상어"
original = "「シャーーーッ！！」"
translation = "「샤아아악!!」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「わぁっ！？\u3000今はこっちに集中しないといけませんね」"
translation = "「와앗!? 지금은 이쪽에 집중해야겠네요.」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ワタシも戦います！」"
translation = "「저도 싸우겠슴다!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「リゾート結界を荒らすサメは許しまセンよー！\u3000ハッピーライディング！」"
translation = "「리조트 결계를 어지럽히는 상어는 용서 못 함다요! 해피 라이딩!」"

[[dialogue]]
speaker_original = "サメ"
speaker_translation = "상어"
original = "「シャッ！？」"
translation = "「샤악!?」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「サメはまとめてキャッチなのだ！\u3000プルガトリオキャプチャー！」"
translation = "「상어는 한꺼번에 캐치인 것이다! 풀가토리오 캡처!」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「私もいきます！\u3000ドミニオンスコップ！」"
translation = "「저도 가요! 도미니언 스쿱!」"

[[dialogue]]
speaker_original = "サメ"
speaker_translation = "상어"
original = "「シャ～～～ッ！？」"
translation = "「샤아아아악!?」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「マグダレナ、アルモタヘル、ここは任せたよ！」"
translation = "「막달레나, 아르모타헬, 여기는 맡길게!」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「わかりました！」"
translation = "「알겠습니다!」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「魔王はあたしと一緒に来て。これだけ派手に暴れてれば、探すまでもなく、中心になってるやつを見つけられるはず」"
translation = "「마왕은 나랑 같이 가자. 이 정도로 요란하게 날뛰고 있으면 찾을 것도 없이 중심이 되는 녀석을 발견할 수 있을 거야.」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ほら、フカヒレくんに乗って！\u3000いっくよ～～！」"
translation = "「자, 샥스 군에 타! 가자아~~!」"

[[dialogue]]
speaker = "unk"
original = "パテルと一緒にフカヒレくんに乗り、リゾート結界の海を走る。"
translation = "파텔과 함께 샥스 군에 올라타 리조트 결계의 바다를 달린다."

[[dialogue]]
speaker = "unk"
original = "その先には──"
translation = "그 끝에는──"

[[dialogue]]
speaker_original = "パテル？"
speaker_translation = "파텔?"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "いつもの黒衣に身を包み、死神の大鎌を携えたパテルの分身が、数時間前に遊んでいた海上アスレチックの上に佇んでいた。"
translation = "평소의 검은 옷을 몸에 걸치고 사신의 대낫을 든 파텔의 분신이, 몇 시간 전까지 놀았던 해상 어슬레틱 위에 서 있었다."

[[dialogue]]
speaker = "unk"
original = "凍てつくような冷たい眼差しで俺たちを──いや、パテルを見つめている。"
translation = "얼어붙을 듯 차가운 눈빛으로 우리를── 아니, 파텔을 바라보고 있다."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「やぁ、来てあげたよ、かわいくないあたし」"
translation = "「안녕, 와줬어, 귀엽지 않은 나.」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「わかってるよ。あなたが本当に見定めたいのはあたしなんでしょ？」"
translation = "「알고 있어. 당신이 정말로 판가름하고 싶은 건 나지?」"

[[dialogue]]
speaker = "unk"
original = "パテルがパテルを見定める……？"
translation = "파텔이 파텔을 판가름한다……?"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「簡単な話だよ」"
translation = "「간단한 이야기야.」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ラクシャの『流転』の力で肉体を得たから義体より普通の天使に近いとはいえ、あたしも守護天使が受肉した、本来ありえない命」"
translation = "「락샤의 『유전』의 힘으로 육체를 얻었기에 의체보다 평범한 천사에 가깝긴 하지만, 나도 수호천사가 수육한 본래 있을 수 없는 생명.」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「守護天使パテルは、このあたしも試そうとしているんだよ」"
translation = "「수호천사 파텔은 이 나도 시험하려 하고 있는 거야.」"

[[dialogue]]
speaker_original = "パテル？"
speaker_translation = "파텔?"
original = "「問おう、肉体を持つ私。他の守護天使ならまだしも、死を司るお前がどうして命を得た？」"
translation = "「묻겠다, 육체를 가진 나여. 다른 수호천사라면 몰라도, 죽음을 관장하는 네가 어찌하여 생명을 얻었나?」"

[[dialogue]]
speaker_original = "パテル？"
speaker_translation = "파텔?"
original = "「お前は三界の命に理由なく関わらない主義だろう？\u3000それが死神としての在り方ではなかったのか？」"
translation = "「너는 삼계의 생명에 이유 없이 관여하지 않는 주의이지 않았나? 그것이 사신으로서의 본질이 아니었나?」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「まぁそれはそう」"
translation = "「뭐, 그건 그렇지.」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「あたしが助けた猫がネズミを殺せば、あたしはネズミを殺したことになる。死神として不公平になっちゃうから、あたしは個々の命に関わるべきじゃない」"
translation = "「내가 구한 고양이가 쥐를 죽이면 내가 쥐를 죽인 게 돼. 사신으로서 불공평해지니까 나는 개별 생명에 관여해서는 안 돼.」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「あたしは今でもそう思ってるよ」"
translation = "「난 지금도 그렇게 생각해.」"

[[dialogue]]
speaker_original = "パテル？"
speaker_translation = "파텔?"
original = "「ではなぜ肉体を求めた？\u3000体を得ることは命と関わること。お前の主義ではない」"
translation = "「그런데 왜 육체를 원했나? 몸을 얻는 것은 생명과 관여하는 것. 네 주의가 아니다.」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「今回はいつものリクリエと違う感じだったから、ちょっと気になってね」"
translation = "「이번엔 평소의 리크리에와 다른 느낌이라 좀 신경 쓰여서 말이야.」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「でもラクシャにお願いした時は……グロリアやフラン、魔王と会ったばかりで浮かれてたからだろうな～」"
translation = "「하지만 락샤에게 부탁했을 때는…… 글로리아나 프랑, 마왕과 막 만나서 들떠있었기 때문이겠지~」"

[[dialogue]]
speaker_original = "パテル？"
speaker_translation = "파텔?"
original = "「一時の感情で肉体を得たのは過ちではないのか？\u3000今からでも肉体を捨てるべきではないか？」"
translation = "「일시적인 감정으로 육체를 얻은 것은 과오가 아닌가? 지금이라도 육체를 버려야 하지 않겠나?」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「言うと思ったよ。死神的には、あたしのこと消したくて消したくて仕方ないんでしょ」"
translation = "「그렇게 말할 줄 알았어. 사신 입장에서는 나를 지우고 싶어서 안달이 났겠지.」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「あなたは恐れてるし、怒ってるんだね。あたしが肉体を得て、心を動かされることに」"
translation = "「당신은 두려워하고 있고, 화가 나 있네. 내가 육체를 얻어 마음이 움직이는 것에 대해.」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「自分の命が惜しくなって、摂理を歪めて、本来の寿命より長生きしようとするかもしれない」"
translation = "「자신의 목숨이 아까워져서 섭리를 왜곡하고 본래의 수명보다 오래 살려고 할지도 몰라.」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「誰かが大切になって、別れたくなくて、無理やり生かそうとするかもしれない」"
translation = "「누군가가 소중해져서 헤어지기 싫어서 억지로 살리려 할지도 몰라.」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「でもそれはしないよ」"
translation = "「하지만 그러지 않아.」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「他でもないあたしが……数多の命を奪ってきた死神がそれをするのは、命への冒涜だ」"
translation = "「다른 누구도 아닌 내가…… 수많은 생명을 앗아온 사신이 그러는 건 생명에 대한 모독이야.」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「せっかく魔王が見てるし、彼の前で誓うよ。あたしは『淘汰』を司る守護天使として、そんなことはしないって」"
translation = "「마침 마왕이 보고 있으니 그 앞에서 맹세할게. 나는 『도태』를 관장하는 수호천사로서 그런 짓은 하지 않겠다고.」"

[[dialogue]]
speaker_original = "パテル？"
speaker_translation = "파텔?"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「どう？\u3000満足した？\u3000満足したならさっさと欠片に戻ってよ」"
translation = "「어때? 만족했어? 만족했으면 얼른 파편으로 돌아가.」"

[[dialogue]]
speaker_original = "パテル？"
speaker_translation = "파텔?"
original = "「いいや、満足などしていない。そんな言葉だけで納得するわけがない」"
translation = "「아니, 만족 따위 하지 않았다. 그런 말만으로 납득할 리가 없다.」"

[[dialogue]]
speaker_original = "パテル？"
speaker_translation = "파텔?"
original = "「試練を与えよう。お前は私が連れていく」"
translation = "「시련을 주마. 너는 내가 데려가겠다.」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「それはこっちのセリフ！\u3000あなたこそあたしに連れていかれる方だよ！」"
translation = "「그건 내가 할 소리! 당신이야말로 나한테 끌려갈 쪽이라고!」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「さぁ、試練の時だ！」"
translation = "「자, 시련의 시간이다!」"

