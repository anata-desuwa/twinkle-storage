[[dialogue]]
speaker = "unk"
original = "第３話,お姉ちゃんの日,P"
translation = "제3화, 누나의 날, P"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「ねえ会長くん。父の日、母の日ってあるじゃない？」"
translation = "「저기 회장군. 어버이날 같은 게 있잖아?」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「育ててくれたご両親に感謝を伝える日。カーネーションを贈ったり、ささやかな食事をしたり～」"
translation = "「길러주신 부모님께 감사를 전하는 날. 카네이션을 선물하거나 소박한 식사를 하거나~」"

[[dialogue]]
speaker = "unk"
original = "魔界にもあるんですか？"
translation = "마계에도 있나요?"

[[dialogue]]
speaker = "unk"
original = "ありますね"
translation = "있긴 하네요"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「もちろん♪\u3000たぶん、どの世界でも似たような風習はあると思うわ～」"
translation = "「물론이지♪ 아마 어느 세계든 비슷한 풍습은 있을 거라고 봐~」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「だけど私、前々から疑問に思っていたことがあって……」"
translation = "「하지만 나, 예전부터 의문스럽게 생각하던 게 있어서……」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「どうしてお姉ちゃんの日はないのかしら～！？」"
translation = "「어째서 누나의 날은 없는 걸까~!?」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「お父さんもお母さんもお祝いされるのに、お姉ちゃんの日がないのは不公平だな～って毎年思ってるの！」"
translation = "「아빠도 엄마도 축하받는데, 누나의 날이 없는 건 불공평하다고 매년 생각하고 있어!」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「ね。会長くんもそうは思わない？」"
translation = "「그치. 회장군도 그렇게 생각하지 않니?」"

[[dialogue]]
speaker = "unk"
original = "なんで俺に振るんですか！？"
translation = "왜 저한테 묻는 거예요!?"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「え～。だって会長くん、妹ちゃんがたくさんいるでしょう？\u3000お兄ちゃんの日があったら、妹みんなからお祝いしてもらえるのよ～？」"
translation = "「에~ 그치만 회장군, 여동생들이 잔뜩 있잖아? 오빠의 날이 있다면 여동생 모두에게 축하받을 수 있다구~?」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「実質、誕生日が１日増えるようなものじゃない？\u3000それなのに、あるのは父の日と母の日だけ……とっても悲しいわ～」"
translation = "「실질적으로 생일이 하루 더 늘어나는 거나 마찬가지 아냐? 그런데도 있는 건 어버이날뿐…… 너무 슬퍼~」"

[[dialogue]]
speaker = "unk"
original = "仕方ないですよ、ないものはないので"
translation = "어쩔 수 없죠, 없는 건 없는 거니까"

[[dialogue]]
speaker = "unk"
original = "まあそうかもしれませんが……"
translation = "뭐 그럴지도 모르지만……"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「くすん。お父さんとお母さんばかりずるいわ。お姉ちゃんだっていっぱいお祝いされたいのに～」"
translation = "「흑흑. 아빠랑 엄마만 치사해. 누나도 잔뜩 축하받고 싶은데~」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「──お疲れ様です。何だか盛り上がってるみたいですね」"
translation = "「──수고하십니다. 왠지 분위기가 달아오른 것 같네요」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「あら～アナちゃん、お疲れ様～。今ね、世界の不平等について会長くんとディスカッションをしていたの～♪」"
translation = "「어머~ 아나짱, 수고했어~. 지금 말이야, 세계의 불평등에 대해 회장군과 디스커션을 하고 있었단다~♪」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そんな大それた話ではないと思いますが……というか、ありますよ。姉の日も、兄の日も」"
translation = "「그렇게 거창한 이야기는 아니라고 생각합니다만…… 그보다, 있어요. 누나의 날도, 형의 날도」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「えっ……！？」"
translation = "「엣……!?」"

[[dialogue]]
speaker = "unk"
original = "あるの！？"
translation = "있어!?"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はい。姉の日は１２月６日。兄の日は６月６日です」"
translation = "「네. 누나의 날은 12월 6일. 형의 날은 6월 6일입니다」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「嘘……魔界にはそんなものはなかったのだけれど。もしかして、天界の風習かしら？」"
translation = "「거짓말…… 마계에는 그런 게 없었는데. 혹시 천계의 풍습이니?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「いえ、天界にもありません。姉の日、兄の日は、人間界のとある研究者が提唱をした記念日になります」"
translation = "「아니요, 천계에도 없습니다. 누나의 날, 형의 날은 인간계의 어느 연구자가 제창한 기념일이 됩니다」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「──本当だわ！\u3000ＤＩＳＣで検索したら出てくるわよ、会長くん！」"
translation = "「──정말이네! DISC로 검색하니까 나와, 회장군!」"

[[dialogue]]
speaker = "unk"
original = "というかアナ、よく知ってたね"
translation = "그보다 아나, 잘 알고 있네"

[[dialogue]]
speaker = "unk"
original = "本当だ……！？"
translation = "정말이다……!?"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「留学生である以上、流星市国を含む、この国の風習を知ることは大切なので。暦にまつわる記念日など、当然調べています」"
translation = "「유학생인 이상, 유성 시국을 포함한 이 나라의 풍습을 아는 것은 중요하니까요. 달력에 얽힌 기념일 등은 당연히 조사하고 있습니다」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「すご～い！\u3000すごいわ！\u3000これでソフィにお祝いしてもらえる日が増えるのね！」"
translation = "「대단해~! 대단해! 이걸로 소피에게 축하받을 날이 늘어나는 거네!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「会長もおめでとうございます。これでルルカさんを筆頭に、増えすぎた妹方からお祝いされ放題ですね」"
translation = "「회장도 축하드립니다. 이걸로 루루카 씨를 필두로 너무 늘어난 여동생분들에게 축하받기 바쁘겠네요」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「──はっ！？\u3000姉の日は１２月よね！？\u3000ソフィのフィギュアスケートが忙しいタイミングだわ……今のうちからアポを取っておかなくっちゃ！」"
translation = "「──핫!? 누나의 날은 12월이지!? 소피의 피겨 스케이팅이 바쁜 타이밍이야…… 지금부터 미리 약속을 잡아둬야겠어!」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「うんっ……ちょうどソフィ、カフェにいるみたい！\u3000ごめんね、ちょっとお出かけするわ～！」"
translation = "「응! 마침 소피, 카페에 있는 것 같아! 미안해, 잠깐 나갔다 올게~!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……サーシャ先輩、随分と変わりましたね。以前まではこういう対人関係のイベントは、比較的ドライな傾向があったように思います」"
translation = "「……사샤 선배, 상당히 변했네요. 이전까지는 이런 대인관계 이벤트에는 비교적 드라이한 경향이 있었다고 생각합니다만」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「──はい。お祝いされる分にはありがたくいただくけれど、自分から何かをアプローチすることはあまりなかった気がしませんか？」"
translation = "「──네. 축하받는 건 감사히 받지만, 스스로 뭔가를 어프로치하는 일은 별로 없었던 것 같지 않나요?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「自分は自分、他人は他人。離れていく人は引き止めたりしない……みたいな感じでしたよね」"
translation = "「자신은 자신, 타인은 타인. 떠나가는 사람은 붙잡지 않는다…… 같은 느낌이었죠」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「もともと嫌われるような人ではなかったですけれど、会長とお付き合いを始めてから、もっと温かい人になった気がします」"
translation = "「원래 미움받을 만한 사람은 아니었습니다만, 회장과 사귀기 시작하고 나서 좀 더 따뜻한 사람이 된 것 같습니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……せっかくですから会長もカフェに行ってきては？\u3000今日は急ぎの仕事もありませんし、恋人の妹さんと仲良くすることも大事でしょう」"
translation = "「……모처럼이니 회장도 카페에 가보시는 게? 오늘은 급한 일도 없고, 연인의 여동생분과 사이좋게 지내는 것도 중요하겠죠」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「あ～ん、どうして信じてくれないの～……！？」"
translation = "「아앙, 왜 안 믿어주는 거야~……!?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「当たり前です。いくらお祝いされたいからって、おかしな風習をでっちあげないでください！」"
translation = "「당연하죠. 아무리 축하받고 싶다고 해도 이상한 풍습을 지어내지 마세요!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「──あ、兄さん、助けてください。姉さんがまたおかしくなってしまいました」"
translation = "「──아, 오라버니, 도와주세요. 언니가 또 이상해졌어요」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「人間界には、姉を祝う記念日があると言って聞かないんです。どうすれば……」"
translation = "「인간계에는 누나를 축하하는 기념일이 있다고 하면서 말을 안 들어요. 어쩌면……」"

[[dialogue]]
speaker = "unk"
original = "（ＤＩＳＣの画面を見せる）"
translation = "(DISC 화면을 보여준다)"

[[dialogue]]
speaker = "unk"
original = "本当だよ"
translation = "진짜야"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「……本当、ですね。え、人間界ってわざわざこんなのを記念日に設定されているんですか……？\u3000人間ってみなさんシスコンなんですか？」"
translation = "「……진짜, 네요. 에, 인간계는 일부러 이런 걸 기념일로 설정해 둔 건가요……? 인간들은 다들 시스콘인가요?」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「こんなのって何～？\u3000とっても大事な日よ！\u3000お姉ちゃんとしてお祝いされる日なんだから～！」"
translation = "「이런 거라니~? 정말 중요한 날이야! 누나로서 축하받는 날이니까~!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「はあ……わかりました。妹離れできない姉さんのために、その日は１日空けておきます」"
translation = "「하아…… 알겠습니다. 여동생에게서 못 벗어나는 언니를 위해 그날은 하루 비워둘게요」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「ありがと～♪\u3000あ、ちゃんと<ruby>流星学園寮<rt>イルソーレ</rt></ruby>の寮長さんに外泊許可を取っておいてね～<emoji=heart04>」"
translation = "「고마워~♪ 아, 제대로 유성 학원 기숙사<rt>일 솔레</rt></ruby> 사감님께 외박 허가 받아둬야 해~<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「その日はお姉ちゃんのお部屋にお泊まりしましょ、ソフィ～♪」"
translation = "「그날은 누나 방에서 자자, 소피~♪」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ええ～っ！？\u3000嫌ですよ、姉の日だからって理由で外泊許可なんて取りたくありません！\u3000私がシスコンみたいじゃないですか！？」"
translation = "「에에~!? 싫어요, 누나의 날이라는 이유로 외박 허가 같은 거 받고 싶지 않아요! 제가 시스콘 같잖아요!?」"

[[dialogue]]
speaker = "unk"
original = "（と思ったけど黙っておこう）"
translation = "(라고 생각했지만 가만히 있자)"

[[dialogue]]
speaker = "unk"
original = "（……結構シスコンでは？）"
translation = "(……꽤 시스콘 아닌가?)"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「じゃあお姉ちゃんの方が<ruby>新星学園寮<rt>ラルーナ</rt></ruby>から外泊許可を取っておくわね。急いで準備しておかないと～」"
translation = "「그럼 누나가 신성 학원 기숙사<rt>라 루나</rt></ruby>에서 외박 허가를 받아둘게. 서둘러 준비해야겠어~」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「何ヶ月先のことを言っているんですか……まったくもう」"
translation = "「몇 달 뒤 이야기를 하시는 건지…… 정말이지」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「うふふ。何をして遊ぼうかしら。まずはソフィをぎゅ～っとして、頭をなでなでもして～♪」"
translation = "「우후후. 뭘 하고 놀까. 우선 소피를 꼬옥 안아주고 머리도 쓰담쓰담 해주고~♪」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「……姉さんはお祝いされる側ですよね？」"
translation = "「……언니는 축하받는 쪽이잖아요?」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「お姉ちゃんにとってのご褒美は、妹を甘やかすことなの～<emoji=heart04>」"
translation = "「누나에게 있어서 포상은 여동생을 응석 부리게 해주는 거란다~<emoji=heart04>」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ま、まあ、そういうことでしたら……仕方ありません。受け入れます」"
translation = "「뭐, 뭐어, 그렇다면…… 어쩔 수 없네요. 받아들일게요」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「あ──そうです。姉の日があるなら、きっと兄の日もありますよね」"
translation = "「아── 맞다. 누나의 날이 있다면 분명 형의 날도 있겠죠」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「姉さんだけお祝いしたら不平等ですから。え～っと……兄の日は、１１月２３日のようですね」"
translation = "「언니만 축하하면 불공평하니까요. 어디 보자…… 형의 날은 11월 23일인 모양이네요」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「あら～？\u3000アナちゃんは６月６日って言っていたけれど」"
translation = "「어라~? 아나짱은 6월 6일이라고 했는데」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「……ああ、１１月の方は『いい兄さんの日』みたいです。こっちは語呂合わせで作られたんですね」"
translation = "「……아아, 11월 쪽은 『좋은 형의 날』인 것 같아요. 이쪽은 말장난으로 만들어진 거네요」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「６月６日も兄の日で……へえ、兄の日は１年に２回あるんですね」"
translation = "「6월 6일도 형의 날이고…… 헤에, 형의 날은 1년에 두 번이나 있네요」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「ええ～っ！？\u3000そんなぁ、ずるいわよ会長くん！\u3000せっかく世界の不平等が正されたと思ったのに～！！」"
translation = "「에에~!? 너무해, 치사해 회장군! 겨우 세계의 불평등이 바로잡혔다고 생각했는데~!!」"

[[dialogue]]
speaker = "unk"
original = "俺のせいじゃない気がしますよ！？"
translation = "제 탓이 아닌 것 같은데요!?"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「残念ですが『いいお姉ちゃんの日』はないみたいです。なのでお祝いは１年に１回だけですね、姉さん」"
translation = "「아쉽지만 『좋은 누나의 날』은 없는 모양이에요. 그러니 축하는 1년에 한 번뿐이네요, 언니」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「ひど～いっ！\u3000お姉ちゃん、断固抗議するんだから～っ！」"
translation = "「너무해~! 누나, 단호히 항의할 거야~!」"

[[dialogue]]
speaker = "unk"
original = "父の日、母の日に代わる記念日をせっかく見つけたはいいものの、新たな格差が見つかってしまうとは。"
translation = "어버이날을 대신할 기념일을 겨우 찾아낸 건 좋았으나, 새로운 격차가 발견될 줄이야."

[[dialogue]]
speaker = "unk"
original = "世界から不平等が消えることはないのだと分かった１日なのだった──"
translation = "세계에서 불평등이 사라지는 일은 없다는 것을 깨달은 하루였다──"

