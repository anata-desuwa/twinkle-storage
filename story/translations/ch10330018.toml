[[dialogue]]
speaker = "unk"
original = "アニュラスと恋人になり、学園での筆記テストがあった後のこと――"
translation = "아뉴라스와 연인이 되고, 학원에서 필기시험을 치른 후의 일――"

[[dialogue]]
speaker = "unk"
original = "俺の家にやってきたアニュラスは、嬉しそうにテストの答案用紙を見せてきた。"
translation = "우리 집에 찾아온 아뉴라스는, 기쁜 듯이 시험 답안지를 보여주었다."

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「見てくれ、会長！\u3000ついに私は、全ての教科で平均点以上の成績を取ることが出来たんだ！\u3000会長が優しく、根気強く勉強を教えてくれたおかげだ……！」"
translation = "「봐줘, 회장! 드디어 나는 모든 과목에서 평균 점수 이상의 성적을 받을 수 있었어! 회장이 다정하고 끈기 있게 공부를 가르쳐준 덕분이야……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「凄いぞ、アニュラス！\u3000そうしたら沢山、ご褒美のチョコレートをあげないとな」"
translation = "「대단해, 아뉴라스! 그렇다면 잔뜩 보상으로 초콜릿을 줘야겠네」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「あ……いや、今回はその、チョコレートはいいんだ……」"
translation = "「아…… 아니, 이번에는 그, 초콜릿은 됐어……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「え？\u3000いらないのか？\u3000どうして……？」"
translation = "「어? 필요 없어? 어째서……?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「今回は……チョコレートの代わりにひとつ、私のお願いをきいて欲しい……」"
translation = "「이번에는…… 초콜릿 대신 하나, 내 부탁을 들어줬으면 해……」"

[[dialogue]]
speaker = "unk"
original = "手を繋いで俺の部屋に入り、ベッドの上で向き合う。"
translation = "손을 잡고 내 방으로 들어가, 침대 위에서 마주 본다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「筆記テストの結果……先に学園長へ報告しなくていいのか……？」"
translation = "「필기시험 결과…… 먼저 학원장님께 보고 안 해도 돼……?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「うん、後で報告するから大丈夫だ。……それよりも、今日までずっと我慢して、期待してたから……」"
translation = "「응, 나중에 보고할 거니까 괜찮아. ……그것보다, 오늘까지 계속 참고 기대했으니까……」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「会長に、私の初めて……貰って欲しい」"
translation = "「회장에게, 나의 첫 경험…… 가져가 줬으면 해」"

[[dialogue]]
speaker = "unk"
original = "今日は偶然だが、母さんも出かけていて家にいない。"
translation = "오늘은 우연히도 어머니도 외출하셔서 집에 없다."

[[dialogue]]
speaker = "unk"
original = "だからこそ、アニュラスはご褒美に初エッチがしたいと言い出したのだろう。"
translation = "그렇기에 아뉴라스는 보상으로 첫 섹스를 하고 싶다고 말한 것이리라."

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「ふあぁっ……会長のこと、押し倒してしまった……<emoji=heart04>\u3000はぁぁ……それに、恥ずかしいところ全部、見られちゃってる……っ」"
translation = "「후아앗…… 회장을 덮쳐버렸어……❤️ 하아…… 게다가, 부끄러운 곳 전부 다 보여버렸어……」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「あっ、会長のおち○ぽ、むくむくって大きく……す、凄い……！」"
translation = "「앗, 회장의 자지가, 묵직하게 커져서…… 스, 굉장해……!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「ふぅぅ……はぁぁ……太くて、逞しくて……見ているだけでドキドキしちゃう……はふぅ……」"
translation = "「후우…… 하아…… 굵고, 늠름해서…… 보고만 있어도 두근거려…… 하후우……」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「んあぁっ<emoji=heart04>\u3000か、会長、おっぱい触るのダメぇっ……ま、まだ仮面も外してないのにぃ……はあぁ、んっ、あぁんっ……あっ、そんな揉んじゃ……ふあぁぁんっ」"
translation = "「응아앗❤️ 회, 회장, 가슴 만지는 건 안 돼…… 아, 아직 가면도 안 벗었는데…… 하아, 응, 아앙…… 앗, 그렇게 주무르면…… 후아아앙……」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「あっ、んうぅっ、ち、乳首ダメぇっ！\u3000くりくり感じちゃうっ、んっ、んあぁんっ……はぁっ、あっ、ふあぁっ……い、いいっ、あんっ……はあぁっ、んっ、ふあぁぁんっ」"
translation = "「앗, 응우웃, 지, 젖꼭지 안 돼! 오돌오돌 느껴버려, 응, 응아앙…… 하앗, 앗, 후아앗…… 조, 좋아, 앙…… 하아앗, 응, 후아아앙……」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「んひぃっ、私がしようと思ってたのにっ。お、おま○こ触るのらめぇっ……あっ、んあぁっ、はあぁんっ……ゆ、指気持ちいいっ……ふあぁっ、んっ、あぁんっ」"
translation = "「응히잇, 내가 하려고 했는데. 보, 보지 만지는 건 안 돼…… 앗, 응아앗, 하아앙…… 손, 손가락 기분 좋아…… 후아앗, 응, 아앙……」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「あっ、あっ、そこっ、そこクリだめぇっ……はぁっ、んあぁっ！\u3000く、クリ撫でられちゃってるぅ……あっ、ふあぁぁっ……ダメっ、気持ちいいっ、はあぁぁんっ」"
translation = "「앗, 앗, 거기, 거기 클리토리스 안 돼…… 하앗, 응아앗! 클, 클리토리스 애무당하고 있어…… 앗, 후아아앗…… 안 돼, 기분 좋아, 하아아앙……」"

[[dialogue]]
speaker = "unk"
original = "俺はアニュラスが興奮してきたところで、下からそっと手を伸ばし仮面を外した。"
translation = "나는 아뉴라스가 흥분하기 시작했을 때, 아래에서 살며시 손을 뻗어 가면을 벗겼다."

[[dialogue]]
speaker = "unk"
original = "仮面の下の素顔は、すっかり出来上がっていて――"
translation = "가면 아래의 맨얼굴은, 완전히 준비가 되어 있었고――"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「はぁ、はぁっ……会長……<emoji=heart04>\u3000わ、私もう……<emoji=heart04>」"
translation = "「하아, 하앗…… 회장……❤️ 나, 나 이제……❤️」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「ふあぁっ、会長のおち○ぽ、おま○こに擦れてるぅ……愛液でぬるぬるで、気持ちいいっ……あっ、んっ、はぁんっ……ふぅっ、ふぅぅっ、んあぁっ……！」"
translation = "「후아앗, 회장의 자지가, 보지에 비벼지고 있어…… 애액으로 미끌미끌해서, 기분 좋아…… 앗, 응, 하앙…… 후우, 후우우, 응아앗……!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「んふぅっ、おち○ぽでクリ擦るのダメぇっ……あぁんっ、あっ……もうおま○こ、十分濡れてるからぁ……入れて、いいんだよな……<emoji=heart04>\u3000ふぅんっ、ふぅっ、ふあぁんっ！」"
translation = "「응후우, 자지로 클리토리스 비비는 건 안 돼…… 아앙, 앗…… 이제 보지, 충분히 젖었으니까…… 넣어도, 되는 거지……❤️ 후응, 후우, 후아앙!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「あ、あっ、先っぽが当たってるぅ……！\u3000んっ、ふぅぅっ、はぁんっ……入っちゃう、おち○ぽが膣口をぐいぐいって押し広げてぇ……！\u3000はぁっ、んあぁぁんっ」"
translation = "「아, 앗, 끝부분이 닿았어……! 응, 후우우, 하앙…… 들어가, 자지가 질구를 꾹꾹 밀어 넓혀서……! 하앗, 응아아앙……」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「んあっ、ふああっ……は、入って――」"
translation = "「응앗, 후아앗…… 들, 들어와――」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「んぅっ……ふあああぁぁぁああああああ――――――っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응우…… 후아아아아아아아아아――――――❤️❤️❤️」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「はっ、はぁっ……はぁぁ<emoji=heart04>\u3000お、おち○ぽ凄ひ……<emoji=heart04>」"
translation = "「하앗, 하앗…… 하아아❤️ 자, 자지 대단해……❤️」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「アニュラス、もしかしてイッちゃった……？」"
translation = "「아뉴라스, 혹시 갔어……?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「う、うん。イッちゃったぁ……<emoji=heart04>」"
translation = "「으, 응. 가버렸어……❤️」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「血が出てるけど、痛くないか……？」"
translation = "「피가 나는데, 아프지 않아……?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「戦闘に比べれば、全然……っ。む、むしろ、会長のおち○ぽが気持ち良くて……<emoji=heart04>\u3000動いてないのに、入ってるだけで凄いの……ふぅぅ<emoji=heart04>」"
translation = "「전투에 비하면, 전혀……. 오, 오히려, 회장의 자지가 기분 좋아서……❤️ 움직이지도 않았는데, 들어와 있는 것만으로도 굉장해…… 후우우❤️」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「あ、あっ、イッたばかりで敏感だから、ちょっと身動きするだけで気持ちいいっ……やばっ、やばぁ……<emoji=heart04>」"
translation = "「아, 앗, 방금 갔으니까 민감해서, 조금만 몸을 움직여도 기분 좋아…… 위험해, 위험해……❤️」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「んあぁっ、膣内が勝手におち○ぽに絡み、付いちゃうっ……んふぅっ、ふぅぅっ……あっ、あぁっ、だ、駄目、腰が勝手に動いちゃっ……！」"
translation = "「응아앗, 질 안이 멋대로 자지에 얽혀, 붙어버려…… 응후우, 후우우…… 앗, 아앗, 아, 안 돼, 허리가 멋대로 움직여버려……!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「んあああぁぁぁっ！\u3000お、おち○ぽ凄いっ、ふあぁっ、はあぁんっ……き、気持ちいいっ、んあぁっ、ふあぁんっ……ひぃっ、ひあぁっ、んあぁぁんっ」"
translation = "「으아아아앗! 자, 자지 굉장해, 후아앗, 하아앙…… 기, 기분 좋아, 응아앗, 후아앙…… 히익, 히아앗, 응아아앙……」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「せ、セックス凄いぃっ、あぁんっ、あっ、んあぁぁっ……い、いいのぉっ、はぁんっ……そこ、そこぉっ、ふあぁぁっ、上のところ擦れるの気持ちいいっ」"
translation = "「섹, 섹스 굉장해, 아앙, 앗, 응아아앗…… 조, 좋아, 하앙…… 거기, 거기이, 후아아앗, 위쪽이 쓸리는 거 기분 좋아.」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「そ、そこダメなのぉっ、ふひぃんっ、頭とろけちゃうっ……あっ、あぁんっ、ひあぁんっ……おち○ぽ気持ちいいっ、はぁっ、ふあぁぁんっ」"
translation = "「거, 거기 안 돼, 후히잉, 머릿속이 녹아버려…… 앗, 아앙, 히아앙…… 자지 기분 좋아, 하앗, 후아아앙……」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「んあっ……キスぅ、ちゅっ、ちゅむっ、ちゅぷぷっ……おち○ぽ入れられながらのキス、気持ちいい……んちゅっ、ちゅぷるっ、ちゅぱっ……ちゅれろっ、ちゅるっ……」"
translation = "「응앗…… 키스, 츄, 츄무, 츄푸풋…… 자지를 넣은 채로 하는 키스, 기분 좋아…… 응츄, 츄푸르, 츄파…… 츄레로, 츄룻……」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「んっ……好き、ちゅっ、ちゅぷっ……会長、好き……ちゅぷるっ、ちゅぷぷっ……好きだ……んちゅっ、ちゅれろっ、ちゅぱっ……」"
translation = "「응…… 좋아, 츄, 츄풋…… 회장, 좋아…… 츄푸르, 츄푸풋…… 좋아해…… 응츄, 츄레로, 츄파……」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「んんっ、セックスしながら、キスっ……<emoji=heart04>\u3000はぁんっ、んちゅっ、ちゅぶぶっ……んむっ、んんっ！\u3000ちゅぱぁっ……あぁんっ、会長好きぃ<emoji=heart04>」"
translation = "「응응, 섹스하면서, 키스……<emoji=heart04> 하앙, 응츄, 츄부부…… 응무, 응응! 츄파앗…… 아앙, 회장 좋아<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「アニュラス、俺も好きだっ……！」"
translation = "「아뉴라스, 나도 좋아해……!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「はぁんっ、嬉しいっ……あっ、あんっ、ふあぁぁっ……おま○こ喜んで、愛液溢れちゃうぅんっ……はぁっ、んんっ、んあぁぁんっ」"
translation = "「하앙, 기뻐…… 앗, 아앙, 후아아앗…… 보지가 기뻐서, 애액이 넘쳐흘러…… 하앗, 응응, 응아아앙……」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「気持ちいいっ……はぁっ、んあっ、ふあぁんっ……好きな人とのセックス、最高なのぉっ……<emoji=heart04>\u3000んうぅっ、んあぁっ、ふあぁぁんっ」"
translation = "「기분 좋아…… 하앗, 응앗, 후아앙…… 좋아하는 사람과의 섹스, 최고야……<emoji=heart04> 응우웃, 응아앗, 후아아앙……」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「会長もっ、もっと私で気持ちよくなってぇ<emoji=heart04>\u3000あっ、はぁっ、はあぁぁんっ……もっと奥まで、おち○ぽ来てぇっ<emoji=heart04>\u3000んくっ、ふあぁっ、んあぁぁっ――」"
translation = "「회장도, 더 나로 기분 좋아져 줘<emoji=heart04> 앗, 하앗, 하아아앙…… 더 안쪽까지, 자지 와줘<emoji=heart04> 응쿠, 후아앗, 응아아앗――」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「ふあああああああああっ<emoji=heart04>\u3000おち○ぽ奥、奥まできたぁぁぁっ<emoji=heart04>\u3000んあっ、はあぁっ、ふあぁぁんっ……奥のほう、先っぽ当たってるぅ、はぁんっ、んあぁぁんっ……！」"
translation = "「후아아아아아아앗<emoji=heart04> 자지 안쪽, 안쪽까지 왔어<emoji=heart04> 응앗, 하아앗, 후아아앙…… 안쪽, 끝부분이 닿고 있어, 하앙, 응아아앙……!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「奥、奥突かれるの気持ちいいっ……あぁんっ、ふあぁっ、はあぁんっ……セックス気持ちいいのぉっ……はっ、はあぁっ、んあぁんっ……！」"
translation = "「안쪽, 안쪽 찔리는 거 기분 좋아…… 아앙, 후아앗, 하앙…… 섹스 기분 좋아…… 핫, 하아앗, 응아앙……!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「こんな気持ちいいのダメっ……あっ、あんっ、ふあぁっ……ハマって抜け出せなく、なっちゃうっ<emoji=heart04>\u3000……ふっ、んうぅっ、はあぁぁんっ」"
translation = "「이렇게 기분 좋은 건 안 돼…… 앗, 아앙, 후아앗…… 빠져서 헤어 나올 수 없게, 되어버려<emoji=heart04> ……훗, 응우웃, 하아아앙……」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「会長とのセックス良すぎてぇ……はぁっ、はぁっ、んあぁんっ……オナニーじゃ物足りなくなっちゃうぅ……やっ、あっ、ふあぁぁんっ……！」"
translation = "「회장과의 섹스가 너무 좋아서…… 하앗, 하앗, 응아앙…… 자위로는 성에 안 차게 되어버려…… 읏, 앗, 후아아앙……!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「今日はご褒美っ、特別なのにぃ……あっ、んんっ、はあんっ……次まで我慢、できなくなっちゃうぅ……ふっ、ふぅっ、ふあぁんっ……！」"
translation = "「오늘은 보상, 특별한 건데…… 앗, 응응, 하앙…… 다음까지 참을 수, 없게 되어버려…… 훗, 후웃, 후아앙……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だったらっ……ご褒美とかこだわらずに、もっとセックスして、欲しいな……！」"
translation = "「그렇다면…… 보상 같은 거 따지지 말고, 더 섹스하고 싶어……!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「え？\u3000で、でもぉ……あっ、はぁっ、ふあぁぁんっ……！」"
translation = "「어? 하, 하지만…… 앗, 하앗, 후아아앙……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ほらっ……男は普段から性欲処理しないといけないから。……ダメか？」"
translation = "「자, 남자는 평소에 성욕 처리 안 하면 안 되니까. ……안 될까?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「んっ、ふぅぅ……せ、性欲処理なら仕方ない……な<emoji=heart04>\u3000あっ、あぁんっ……私は会長の恋人、なのだし……<emoji=heart04>」"
translation = "「응, 후우…… 성, 성욕 처리라면 어쩔 수 없지……나<emoji=heart04> 앗, 아앙…… 나는 회장의 연인이니까……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ、そうだっ……俺はっ……アニュラスの中に、いっぱい出したい」"
translation = "「아아, 그래…… 나는…… 아뉴라스 안에, 잔뜩 싸고 싶어.」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「っ～～～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「읏～～～～<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「だ、ダメぇっ<emoji=heart04>\u3000会長、そんなエッチなこと言ったらぁ……んあぁぁっ……！」"
translation = "「아, 안 돼<emoji=heart04> 회장, 그런 야한 말 하면…… 응아아앗……!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「ふっ、ふうぅっ……子宮が子作りセックスと、勘違いするぅ<emoji=heart04>\u3000あっ、あっ、ふあぁっ……子宮降りて来ちゃうっ<emoji=heart04>」"
translation = "「훗, 후우…… 자궁이 애 만들기 섹스라고, 착각해……<emoji=heart04> 앗, 앗, 후아앗…… 자궁이 내려와 버려<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「はぁっ、はぁっ……おま○この中、勝手に動いちゃうっ<emoji=heart04>\u3000あっ、んうぅっ、んあぁっ……恋人精子欲しくて、おち○ぽに吸い付いちゃうのぉっ<emoji=heart04>\u3000はあぁぁんっ」"
translation = "「하앗, 하앗…… 보지 안에서, 멋대로 움직여……<emoji=heart04> 앗, 응우웃, 응아앗…… 연인 정자가 갖고 싶어서, 자지에 달라붙게 돼……<emoji=heart04> 하아아앙……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……アニュラスッ！」"
translation = "「읏…… 아뉴라스!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「ふあああぁぁぁああああああ～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000おま○この奥、奥すごいのぉっ！\u3000あっ、あぁんっ、ふあぁぁんっ！\u3000どちゅどちゅって、子宮口キス気持ちいいっ！」"
translation = "「후아아아아아아～～～～앗<emoji=heart04><emoji=heart04><emoji=heart04> 보지 안쪽, 안쪽 굉장해! 앗, 아앙, 후아아앙! 도츄도츄하면서, 자궁구 키스 기분 좋아!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「はっ、はぁっ、んあぁぁんっ！\u3000腰、動いちゃうっ<emoji=heart04>\u3000あんっ、ふあぁっ、おち○ぽにおま○こ降参しちゃうっ<emoji=heart04>\u3000はあぁぁんっ！」"
translation = "「핫, 하앗, 응아아앙! 허리, 움직여져……<emoji=heart04> 아앙, 후아앗, 자지에게 보지가 항복해 버려……<emoji=heart04> 하아아앙!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「んひっ、ひあっ、ひあぁぁんっ、気持ちよくて、頭バカになっちゃうっ<emoji=heart04>\u3000おっ、おほっ、んおぉっ、おま○こでしか考えられなくなるぅっ<emoji=heart04>\u3000おほぉぉっ<emoji=heart04>」"
translation = "「응히, 히앗, 히아아앙, 기분 좋아서, 머리가 바보가 되어버려……<emoji=heart04> 앗, 어허, 응오옷, 보지밖에 생각할 수 없게 돼……<emoji=heart04> 어허어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「んおぉぉぉっ、奥っ、奥気持ちいいのぉっ<emoji=heart04>\u3000はっ、はっ、はあぁぁんっ！\u3000会長、もっとぉ、もっと突いてぇっ<emoji=heart04>\u3000あんっ、んあぁっ、いいっ！\u3000あっ、あっ、ふあぁぁんっ！」"
translation = "「응오오오옷, 안쪽, 안쪽 기분 좋아……<emoji=heart04> 핫, 핫, 하아아앙! 회장, 더, 더 찔러줘……<emoji=heart04> 아앙, 응아앗, 좋아! 앗, 앗, 후아아앙!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「好きっ、会長とのセックス好きぃっ<emoji=heart04>\u3000おほぉぉっ！\u3000おち○ぽ、おち○ぽおち○ぽぉっ<emoji=heart04>\u3000んあぁぁっ！\u3000気持ちよしゅぎなのぉっ<emoji=heart04>\u3000ひっ、ひっ、ふひぃぃんっ！」"
translation = "「좋아, 회장과의 섹스 좋아……<emoji=heart04> 어허어어! 자지, 자지자지……<emoji=heart04> 응아아앗! 기분 너무 좋아……<emoji=heart04> 히익, 히익, 후히잉!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「あああ、おま○この奥に来てるっ<emoji=heart04>\u3000気持ちいいの登って来るのっ、んあっ、あぁんっ、ふあぁぁっ<emoji=heart04>\u3000知らないアクメ来るぅぅぅっ<emoji=heart04>\u3000おっ、おほっ、んおぉぉぉっ<emoji=heart04>」"
translation = "「아아아, 보지 안쪽에 닿고 있어<emoji=heart04> 기분 좋은 게 올라오고 있어, 응앗, 아앙, 후아아앗……<emoji=heart04> 모르는 절정 올 것 같아……<emoji=heart04> 앗, 어허, 응오오오옷<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……俺、もう……！」"
translation = "「읏…… 나, 이제……!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「あっ、あっ、ふあぁぁっ<emoji=heart04>\u3000会長のおち○ぽ膨らんで、まだ大きくなってるぅっ<emoji=heart04>\u3000おっ、おっ、おほおぉぉっ<emoji=heart04>\u3000おち○ぽ射精したがってるぅっ<emoji=heart04>\u3000んあぁぁんっ<emoji=heart04>」"
translation = "「앗, 앗, 후아아앗<emoji=heart04> 회장의 자지가 부풀어서, 더 커지고 있어……<emoji=heart04> 앗, 앗, 어허어어……<emoji=heart04> 자지가 사정하고 싶어 해……<emoji=heart04> 응아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「来て、きてきて、中に出してぇっ<emoji=heart04>\u3000おっ、おっ、んおぉぉぉ<emoji=heart04>\u3000会長の精子、私のおま○こにいっぱい出してぇっ<emoji=heart04>\u3000あっ、あっ、んあぁぁぁっ<emoji=heart04>」"
translation = "「와, 와줘, 안에 싸줘……<emoji=heart04> 앗, 앗, 응오오오<emoji=heart04> 회장의 정자, 내 보지에 잔뜩 싸줘……<emoji=heart04> 앗, 앗, 응아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「来るっ、くるくる、アクメくりゅっ<emoji=heart04>\u3000……あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000イクッ<emoji=heart04>\u3000イクイクイクッ――」"
translation = "「온다, 와와, 절정 올 것 같아……<emoji=heart04> ……앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 간다<emoji=heart04> 간다간다간다――」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「っ、ふあああああああああ<emoji=heart04><emoji=heart04>\u3000イックうぅぅぅ――――――っっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「읏, 후아아아아아아<emoji=heart04><emoji=heart04> 가아아아아――――――앗!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「んあぁぁぁっ<emoji=heart04>\u3000精液来てるぅっ<emoji=heart04>\u3000子宮に奥まで、どくどくって注がれてぇ……<emoji=heart04>\u3000はあぁぁぁ～～っ<emoji=heart04>」"
translation = "「응아아아앗<emoji=heart04> 정액 오고 있어……<emoji=heart04> 자궁 안쪽까지, 두근두근하고 쏟아져서……<emoji=heart04> 하아아아～～앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「ふあぁぁぁっ<emoji=heart04>\u3000凄いぃ……<emoji=heart04>\u3000会長のおち○ぽ、まだ脈打って、射精してるのぉ……はふぅぅ……<emoji=heart04>」"
translation = "「후아아아앗<emoji=heart04> 굉장해……<emoji=heart04> 회장의 자지, 아직 맥동하면서, 사정하고 있어…… 하후우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「あ、あぁ……おち○ぽ抜けちゃ……はぁん……<emoji=heart04>」"
translation = "「아, 아…… 자지 빠지면…… 하앙……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「はぁ……はぁ……セックス、凄かったぁ……<emoji=heart04>\u3000まさかこんなに気持ちいい、なんてぇ……<emoji=heart04>」"
translation = "「하…… 하…… 섹스, 굉장했어……<emoji=heart04> 설마 이렇게 기분 좋을 줄은……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ちゃんとご褒美になったか？」"
translation = "「제대로 보상이 됐나?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「う、うん……<emoji=heart04>\u3000はぁぁ……ふぅぅ……<emoji=heart04>」"
translation = "「으, 응……<emoji=heart04> 하아아…… 후우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「か、会長はその……満足、したか……？」"
translation = "「회, 회장은 그…… 만족, 했어……?」"

[[dialogue]]
speaker = "unk"
original = "その言い回しが気になり、彼女の顔を見ると、少し切なそうな、期待するような視線が俺のペニスに向けられていて――"
translation = "그 말투가 신경 쓰여 그녀의 얼굴을 보니, 조금 애틋한 듯, 기대하는 시선이 내 페니스를 향하고 있어서――"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「なあ、アニュラス。俺と勝負しないか？」"
translation = "「있지, 아뉴라스. 나랑 승부하지 않을래?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「え……？」"
translation = "「어……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「どっちが相手をたくさんイかせるかの勝負。……どうだ？」"
translation = "「어느 쪽이 상대를 더 많이 가게 할지 승부. ……어때?」"

[[dialogue]]
speaker = "unk"
original = "すると彼女は、嬉しそうに頷いた。"
translation = "그러자 그녀는 기쁜 듯이 고개를 끄덕였다."

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「う、うん、する……<emoji=heart04>\u3000会長とエッチな勝負……<emoji=heart04>」"
translation = "「으, 응, 할래……<emoji=heart04> 회장이랑 야한 승부……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その後、俺はアニュラスが満足するまで、何度もご褒美をあげるのだった。"
translation = "그 후, 나는 아뉴라스가 만족할 때까지 몇 번이고 보상을 주는 것이었다."

