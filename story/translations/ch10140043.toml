[[dialogue]]
speaker = "unk"
original = "第３話,恋酔いトワイライト,P"
translation = "제3화, 사랑에 취한 트와일라잇"

[[dialogue]]
speaker = "unk"
original = "学園ＯＧ３人の食事会を終えたあと、俺は酔って上機嫌なトワちゃんを連れて、夜のビーチを歩いていた。"
translation = "학원 OG 세 명의 식사 모임을 마친 뒤, 나는 취해서 기분이 좋아진 토와짱을 데리고 밤의 해변을 걷고 있었다."

[[dialogue]]
speaker = "トワ先生"
original = "「会長く～ん、お姫様抱っこして～<emoji=heart04>\u3000ん～っ♪」"
translation = "「회장 구~운, 공주님 안기 해줘~<emoji=heart04> 응~♪」"

[[dialogue]]
speaker = "unk"
original = "わかった、いいよ。ほら、よいしょっと"
translation = "「알았어, 좋아. 자, 영차.」"

[[dialogue]]
speaker = "トワ先生"
original = "「わぁ～い<emoji=heart04>\u3000会長くん、好き好き<emoji=heart04>\u3000ちゅっちゅ～っ<emoji=heart04>」"
translation = "「와아~이<emoji=heart04> 회장 군, 좋아 좋아<emoji=heart04> 쪽쪽~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リコさんとマリオンさんから『恋人として介抱を頼む』と言われて、俺はそのままトワちゃんを任されていた。それにしても、久しぶりにここまで酔ってるな……。"
translation = "리코 씨와 마리온 씨로부터 『연인으로서 간호를 부탁한다』는 말을 듣고, 나는 그대로 토와짱을 맡게 되었다. 그나저나 오랜만에 이렇게까지 취했네……."

[[dialogue]]
speaker = "トワ先生"
original = "「ねぇ、どこ行くの～？\u3000もしかして、水上コテージだったりして～？\u3000えへへ～、会長くんのえっち<emoji=heart04>」"
translation = "「있지, 어디 가는 거야~? 혹시 수상 코테지라든가~? 에헤헤~, 회장 군 변태<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
original = "「――酔いが冷めるまで、ビーチチェアーで休もうと思って？\u3000も～、そこは紳士にならなくていいのに～<emoji=heart04>」"
translation = "「――취기가 깰 때까지 비치 체어에서 쉬려고? 정말~ 거긴 신사답게 굴지 않아도 되는데~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "でも、こうしてると、前の時を思い出すよ"
translation = "「하지만 이렇게 있으면 예전 일이 생각나.」"

[[dialogue]]
speaker = "トワ先生"
original = "「前って……付き合う前に、会長くんが酔っぱらいの私を介抱してくれた時のこと？」"
translation = "「예전이라니…… 사귀기 전에 회장 군이 취한 나를 간호해 줬을 때 일?」"

[[dialogue]]
speaker = "トワ先生"
original = "「そういえば、あの時もお姫様抱っこしてくれたんだよね～<emoji=heart04>\u3000えへへ……懐かしい～♪」"
translation = "「그러고 보니 그때도 공주님 안기 해줬었지~<emoji=heart04> 에헤헤…… 그립다~♪」"

[[dialogue]]
speaker = "トワ先生"
original = "「あの時は生まれて初めて男の人に抱き上げられて……すごくドキドキしちゃったな～<emoji=heart04>」"
translation = "「그때 태어나서 처음으로 남자한테 안겨 올려져서…… 정말 두근거렸었지~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "初めて――か。俺もあの日、トワちゃんと過ごして、不思議なくらい心が惹かれたのを覚えている。"
translation = "처음――인가. 나도 그날 토와짱과 시간을 보내며 신기할 정도로 마음이 끌렸던 것을 기억하고 있다."

[[dialogue]]
speaker = "トワ先生"
original = "「――え？\u3000じゃあ、あれが運命の瞬間だったのかも<emoji=heart04>\u3000なんて……えへへへぇ<emoji=heart04>」"
translation = "「――에? 그럼 그게 운명의 순간이었을지도<emoji=heart04> 라니…… 에헤헤헤<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "彼女の笑顔が眩しくて、見ているだけで酔いそうになる。本当に、ずるいくらい可愛い。"
translation = "그녀의 미소가 눈부셔서 보고 있는 것만으로 취할 것 같다. 정말 반칙급으로 귀엽다."

[[dialogue]]
speaker = "unk"
original = "やがてビーチチェアーに着くと、トワちゃんは俺に下ろされながら、また両手を広げて甘えてきた。"
translation = "이윽고 비치 체어에 도착하자, 토와짱은 내게서 내려지면서 다시 두 팔을 벌려 어리광을 부려 왔다."

[[dialogue]]
speaker = "トワ先生"
original = "「会長くん……んっ<emoji=heart04>\u3000お姫様抱っこもいいけどぉ、もっとして欲しい抱っこがあるの～」"
translation = "「회장 군…… 응<emoji=heart04> 공주님 안기도 좋지만~ 더 해줬으면 하는 안기가 있어~」"

[[dialogue]]
speaker = "トワ先生"
original = "「先生、久しぶりに『赤ちゃん抱っこ』して欲しいなぁ～<emoji=heart04>」"
translation = "「선생님, 오랜만에 『아기 안기』 받고 싶어~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "懐かしいそのリクエストに苦笑しつつ、俺はトワちゃんを抱き上げつつ、そっとビーチチェアに腰を下ろす。"
translation = "그리운 그 요청에 쓴웃음을 지으며, 나는 토와짱을 안아 올린 채 살며시 비치 체어에 허리를 내린다."

[[dialogue]]
speaker = "トワ先生"
original = "「あっ<emoji=heart04>\u3000――ふわぁ～<emoji=heart04>\u3000えへへぇ、この全身密着する感じ、やっぱり好きぃ～<emoji=heart04>」"
translation = "「앗<emoji=heart04> ――후와아~<emoji=heart04> 에헤헤, 이 전신이 밀착되는 느낌 역시 좋아~<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
original = "「会長くんの匂いと、体温と、心臓の音が伝わってきて、すごく安心するのぉ～<emoji=heart04>\u3000スリスリ～<emoji=heart04>」"
translation = "「회장 군의 냄새랑 체온이랑 심장 소리가 전해져 와서 너무 안심돼~ 부비부비~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "彼女が胸に顔を埋めて擦り寄ってくるたびに、心臓の鼓動がどんどん速くなっていく。"
translation = "그녀가 가슴에 얼굴을 묻고 비벼올 때마다 심장 고동이 점점 빨라진다."

[[dialogue]]
speaker = "トワ先生"
original = "「ふふっ<emoji=heart04>\u3000会長くんのドキドキ、早くなってる～<emoji=heart04>\u3000酔ってるトワ先生が、そんなに可愛いのかな～？」"
translation = "「후훗<emoji=heart04> 회장 군의 두근거림, 빨라졌어~<emoji=heart04> 취한 토와 선생님이 그렇게 귀여운가~?」"

[[dialogue]]
speaker = "unk"
original = "好きになってるから、なおさら可愛いんだ"
translation = "「좋아하게 됐으니까 더더욱 귀여운 거야.」"

[[dialogue]]
speaker = "トワ先生"
original = "「ふあっ<emoji=heart04>\u3000えへへ<emoji=heart04>\u3000会長くんに力強く、ぎゅ～ってされちゃった～<emoji=heart04>」"
translation = "「후앗<emoji=heart04> 에헤헤<emoji=heart04> 회장 군한테 힘차게 꼬옥 안겨 버렸다~<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
original = "「じゃあ、そんな会長くんに……も～っと可愛い先生を見せちゃおうかな～<emoji=heart04>」"
translation = "「그럼 그런 회장 군한테…… 더~욱 귀여운 선생님을 보여줘 버릴까나~<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
original = "「リコが言ってた『附属生モード』のトワちゃん……恋人の会長くんになら、ちょっとだけ見せてあげる<emoji=heart04>」"
translation = "「리코가 말했던 『부속생 모드』 토와짱…… 연인인 회장 군한테라면 조금만 보여줄게<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は驚きに思わず目を見開く。するとトワちゃんは、ふっと微笑んで俺の耳元に顔を寄せ、甘く囁いた。"
translation = "나는 놀라움에 나도 모르게 눈을 크게 뜬다. 그러자 토와짱은 훗 미소 지으며 내 귓가에 얼굴을 대고 달콤하게 속삭였다."

[[dialogue]]
speaker = "トワ先生"
original = "「――お兄ちゃん<emoji=heart04>\u3000トワね、いつも優しくしてくれるお兄ちゃんのこと、だいだい、だ～い好きだよ<emoji=heart04>」"
translation = "「――오빠<emoji=heart04> 토와는 말이야, 언제나 상냥하게 대해주는 오빠가 정말 정말, 너~무 좋아<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
original = "「だからこれからも、トワにいっぱい甘えさせてくれたら嬉しいな<emoji=heart04>\u3000――ちゅっ<emoji=heart04>」"
translation = "「그러니까 앞으로도 토와한테 잔뜩 어리광 부리게 해주면 좋겠어<emoji=heart04> ――쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言って頬にキスをして、いたずらっぽく微笑む。"
translation = "그렇게 말하며 볼에 키스를 하고 장난스럽게 미소 짓는다."

[[dialogue]]
speaker = "トワ先生"
original = "「よろしくね、お兄ちゃん<emoji=heart04>\u3000てへっ<emoji=heart04>」"
translation = "「잘 부탁해, 오빠<emoji=heart04> 데헷<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "待って……可愛すぎるんだけどぉ～～っ！？"
translation = "「잠깐…… 너무 귀엽잖아~~!?」"

[[dialogue]]
speaker = "unk"
original = "心臓が爆発するかと思った。『悩殺される』という言葉の意味を、俺は初めて体感した気がした。"
translation = "심장이 폭발하는 줄 알았다. 『뇌살당한다』는 말의 의미를 나는 처음으로 체감한 기분이었다."

[[dialogue]]
speaker = "トワ先生"
original = "「あっ！\u3000会長くんの心臓、すっごくドキドキしてる～<emoji=heart04>」"
translation = "「앗! 회장 군의 심장, 엄청 두근거리고 있어~<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
original = "「あははっ♪\u3000そんなに附属生トワちゃん、可愛かった～？\u3000ふ～ん♪\u3000じゃあ――」"
translation = "「아하하♪ 그렇게 부속생 토와짱 귀여웠어~? 흐음~♪ 그럼――」"

[[dialogue]]
speaker = "トワ先生"
original = "「今日はこのまま、トワがいっぱい甘えちゃうね？\u3000――お兄ちゃん<emoji=heart04>」"
translation = "「오늘은 이대로 토와가 잔뜩 어리광 부릴게? ――오빠<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
original = "「ん～<emoji=heart04>\u3000ちゅっ、ちゅっ<emoji=heart04>」"
translation = "「응~<emoji=heart04> 쪽, 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "――その夜、俺は『附属生モード』のトワちゃんの甘さに、すっかり酔わされ続けてしまうのだった。"
translation = "――그날 밤, 나는 『부속생 모드』 토와짱의 달콤함에 완전히 계속 취해버리고 마는 것이었다."

