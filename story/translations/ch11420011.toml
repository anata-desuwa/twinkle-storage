[[dialogue]]
speaker = "unk"
original = "第１話,気弱な異世界人ステラ,P"
translation = "제1화, 소심한 이세계인 스텔라, P"

[[dialogue]]
speaker = "unk"
original = "その女の子は、強引に異世界へ召喚された挙げ句、黒ベア子に赤ちゃんクマロボのお世話係を任命されてしまったらしい。"
translation = "그 여자아이는 억지로 이세계에 소환된 끝에 흑베아코에게 아기 곰 로봇의 보살핌 담당으로 임명되어 버린 모양이다."

[[dialogue]]
speaker = "unk"
original = "今日は、その召喚があった日の翌日──"
translation = "오늘은 그 소환이 있었던 날의 다음 날──"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「あ、あの……お部屋にいたら、急に目の前が真っ暗になったんです……」"
translation = "「저, 저기…… 방에 있었더니 갑자기 눈앞이 캄캄해졌어요……」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「それで気が付いたら……ここに来ちゃってて、ビックリしました……」"
translation = "「그러다 정신을 차려 보니…… 여기 와 있어서 깜짝 놀랐어요……」"

[[dialogue]]
speaker = "unk"
original = "たどたどしい口調で話す彼女の名前はステラ。"
translation = "더듬거리는 말투로 말하는 그녀의 이름은 스텔라."

[[dialogue]]
speaker = "unk"
original = "スプリングガーデンという異世界からやってきた<ruby>花騎士<rt>フラワーナイト</rt></ruby>である彼女から、俺たちは転移事件当時の詳しい事情を聴いていた。"
translation = "스프링 가든이라는 이세계에서 온 꽃의 기사인 그녀로부터 우리는 전이 사건 당시의 자세한 사정을 듣고 있었다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「いやはや、それは災難でしたね～」"
translation = "「이런 이런, 그거 참 재난이었네요~」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「困ったことがあればこのルリエルに、なーんでも相談してくださいねっ！」"
translation = "「곤란한 일이 있으면 이 루리엘에게 뭐~든지 상담해 주세요!」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「は、はい……ありがとう、ございます……」"
translation = "「네, 네…… 감사, 합니다……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「うーん、やっぱり不安ですよね～！\u3000そのお気持ち、わかりますよ～」"
translation = "「으음, 역시 불안하시겠죠~! 그 마음, 이해해요~」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「実はわたしもステラさんと同じように、異世界に行った経験があるんです。だからこそ、その不安な気持ちに寄り添ったケアが出来るというものです！」"
translation = "「사실 저도 스텔라 씨와 마찬가지로, 이세계에 갔던 경험이 있거든요. 그렇기에 그 불안한 마음에 다가가는 케어를 할 수 있는 거랍니다!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「加えて異世界からやって来た人をおもてなしするのも初めてではありません！\u3000お世話係はお手のものと言っていいでしょう！」"
translation = "「게다가 이세계에서 오신 분을 대접하는 것도 처음이 아니에요! 돌보미 역할은 식은 죽 먹기라고 해도 과언이 아니죠!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「いや～、さすがは会長さん、まさに適材適所なナイス采配なのです♪\u3000というわけでステラさん、大船に乗った気持ちでいてください♪」"
translation = "「이야~ 역시 회장님, 그야말로 적재적소인 나이스 지휘에요♪ 그런 고로 스텔라 씨, 큰 배에 올라탄 기분으로 계셔주세요♪」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「あの……はい……」"
translation = "「저기…… 네……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ふええっ！？\u3000何だかますます緊張したようなお顔になってしまっているのです！？」"
translation = "「후에엣!? 왠지 더욱 긴장한 표정이 되어버리셨는데요!?」"

[[dialogue]]
speaker = "unk"
original = "圧倒されちゃったんじゃないかな"
translation = "압도당해 버린 게 아닐까"

[[dialogue]]
speaker = "unk"
original = "ルリエルが一気にしゃべるから"
translation = "루리엘이 단숨에 말하니까"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「す、すみませんでした～っ！\u3000大丈夫ですよ～、恐くないですよ～？」"
translation = "「죄, 죄송했습니다~! 괜찮아요~, 무섭지 않아요~?」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「い、いえ！\u3000元々ボクは、人とおしゃべりするのが、あまり得意じゃないので……」"
translation = "「아, 아니요! 원래 저는, 사람과 대화하는 게 그리 특기가 아니라서……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ふむふむ、ステラさんはとっても人見知りさんなんですね」"
translation = "「흠흠, 스텔라 씨는 정말 낯을 많이 가리시는군요」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「す、すみません……」"
translation = "「죄, 죄송합니다……」"

[[dialogue]]
speaker = "unk"
original = "大きく<ruby>括<rt>くく</rt></ruby>れば人見知りという事なんだろうけど、ステラの場合は少し違っているようで──"
translation = "크게 묶자면 낯가림이라는 것이겠지만, 스텔라의 경우는 조금 다른 듯해서──"

[[dialogue]]
speaker = "unk"
original = "ルリエルの真っ直ぐな視線を受け止められず、身を縮こまらせながらどうにか避けようとしている……と、そんな風に見えた。"
translation = "루리엘의 곧은 시선을 받아내지 못하고, 몸을 움츠리며 어떻게든 피하려 하고 있다…… 그런 식으로 보였다."

[[dialogue]]
speaker = "unk"
original = "誰かにじっと見られることが苦手？"
translation = "누군가에게 빤히 보이는 게 서툴러?"

[[dialogue]]
speaker = "unk"
original = "もしかしてステラは"
translation = "혹시 스텔라는"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「えっ？\u3000あ、あの……実は、少し……」"
translation = "「엣? 아, 저기…… 사실은, 조금……」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「昔……とあることで、望まないのにみんなから注目の的になってしまったことがあって……」"
translation = "「옛날에…… 어떤 일로, 원치 않는데도 모두에게 주목의 대상이 되어버린 적이 있어서……」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「それ以来、誰かから好奇の視線を向けられるのが……ちょっと苦手になってしまったんです……」"
translation = "「그 이후로, 누군가에게 호기심 어린 시선을 받는 게…… 조금 힘들어졌어요……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「そ、そうだったんですか！\u3000それは失礼しました……」"
translation = "「그, 그러셨군요! 그거 실례했습니다……」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「あっ！\u3000だ、大丈夫です……ルリエルさんに悪意がないことは、わかってますから……」"
translation = "「앗! 과, 괜찮아요…… 루리엘 씨에게 악의가 없다는 건 알고 있으니까요……」"

[[dialogue]]
speaker = "unk"
original = "無理に聞こうとか、そういうのじゃないから"
translation = "억지로 캐묻거나 하려는 건 아니니까"

[[dialogue]]
speaker = "unk"
original = "辛い過去だったらごめん……"
translation = "괴로운 과거라면 미안해……"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「ああ、いえ！\u3000そこまで壮大な過去っていうわけでもなくて！\u3000ボクの中でも、折り合いはついているので」"
translation = "「아아, 아니에요! 그렇게 거창한 과거인 것도 아니라서! 저 나름대로 정리는 끝났으니까요」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「その、せっかくなので、お二人には説明させてください……」"
translation = "「그게, 모처럼이니 두 분께는 설명하게 해주세요……」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「ボクの<ruby>花騎士<rt>フラワーナイト</rt></ruby>としての能力が、自分の体や触れたものを発光させたりする能力なんですけど……」"
translation = "「저의 꽃의 기사로서의 능력이, 자신의 몸이나 닿은 것을 발광시키거나 하는 능력인데요……」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「昔は、この力を制御できなくて……意図していないのに光ったり、光らせたりしてしまっていたんです」"
translation = "「옛날에는 이 힘을 제어하지 못해서…… 의도치 않게 빛나거나, 빛나게 해버리곤 했어요」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「それが周りの人の注目を引いてしまって……それ以来、注目を浴びることが苦手になってしまいました……」"
translation = "「그게 주변 사람들의 주목을 끌어버려서…… 그 이후로 주목받는 게 힘들어졌습니다……」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「以前に比べたら今はだいぶ克服したと思ってるんですけど……それでもまだ、慣れないとちょっと……」"
translation = "「예전에 비하면 지금은 꽤 극복했다고 생각하지만…… 그래도 아직 익숙해지지 않으면 좀……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「わかりました！\u3000ステラさんとお話する時は、こうして目をつぶってお話することにします！」"
translation = "「알겠습니다! 그럼 스텔라 씨와 이야기할 때는 이렇게 눈을 감고 이야기하도록 할게요!」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「そ、そこまでして頂かなくても大丈夫です！\u3000多分、ちょっとずつ慣れていけると思いますから……」"
translation = "「그, 그렇게까지 해주시지 않아도 괜찮아요! 아마 조금씩 익숙해질 수 있을 거라 생각하니까요……」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「ただ、ボクの能力のことについては……できるだけ人に話さないでおいてもらえますか？」"
translation = "「다만, 저의 능력에 대해서는…… 가능한 한 사람들에게 말하지 말아 주시겠어요?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「……ステラさんは、ご自分の能力のことがあまり好きではないのですか？」"
translation = "「……스텔라 씨는 자신의 능력을 별로 좋아하지 않으시나요?」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「そんなことはないです。一時は嫌だって思ってた時期もありましたけど……」"
translation = "「그런 건 아니에요. 한때는 싫다고 생각했던 시기도 있었지만……」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「でも……そのことで悩んでた時、パパとママがボクを抱きしめながら言ってくれたんです……」"
translation = "「하지만…… 그 일로 고민하고 있을 때, 아빠와 엄마가 저를 꼭 안아주면서 말씀해 주셨어요……」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「ボクの光は、誰かを助けたいという思いと、困難に立ち向かう勇気……その表れなんだって……」"
translation = "「저의 빛은 누군가를 돕고 싶다는 마음과, 고난에 맞서는 용기…… 그 증거라고요……」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「その言葉のおかげで、ボクは自分のこの能力のことを……受け入れることができました」"
translation = "「그 말 덕분에 저는 자신의 이 능력을…… 받아들일 수 있게 되었어요」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「だから、好きではない、ということはありません……けど、それと変に目立ってしまうのは別問題ですから……」"
translation = "「그래서 싫어한다는 건 아니에요…… 하지만 그것과 이상하게 눈에 띄어버리는 건 별개의 문제니까요……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「わかりました！\u3000ではステラさんの能力は出来るだけ秘密、ということで！」"
translation = "「알겠습니다! 그럼 스텔라 씨의 능력은 가능한 한 비밀로 하는 걸로!」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「ありがとうございます、お願いします……」"
translation = "「감사합니다, 부탁드릴게요……」"

[[dialogue]]
speaker = "unk"
original = "話をしている内に、少しずつステラの緊張が解けてきたように思う。"
translation = "이야기를 나누는 동안, 조금씩 스텔라의 긴장이 풀려가는 것 같았다."

[[dialogue]]
speaker = "unk"
original = "そして秘密にしておきたい能力のことなども話してくれて……ステラなりに打ち解けようとしてくれている気持ちが伝わってくる。"
translation = "그리고 비밀로 하고 싶은 능력에 대해서도 이야기해 주며…… 스텔라 나름대로 마음을 열려고 노력하는 진심이 전해져 온다."

[[dialogue]]
speaker_original = "赤ちゃんクマロボ"
speaker_translation = "아기 곰 로봇"
original = "「ばぶー<emoji=heart04>」"
translation = "「바부─<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「はわわ、いけません！\u3000ルリエルたちばっかりで盛り上がってて、この子も構って欲しいみたいですよ」"
translation = "「하와와, 안 돼요! 루리엘 일행끼리만 신나 있어서, 이 아이도 놀아달라고 하는 모양이에요」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「そ、そうですよね……よしよし、ごめんね～」"
translation = "「그, 그렇네요…… 착하지 착해, 미안해~」"

[[dialogue]]
speaker = "unk"
original = "その子のお世話の方は大丈夫？"
translation = "그 아이를 돌보는 건 괜찮아?"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「はい、大丈夫です」"
translation = "「네, 괜찮아요」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「最初、急にこの子を渡された時は、赤ちゃんの面倒を見るなんて自分にはとても無理だって思ってたんですけど……」"
translation = "「처음 갑자기 이 아이를 맡았을 때는, 아기를 돌보는 것 따위 자신에겐 도저히 무리라고 생각했었지만……」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「でもこの子がとってもいい子にしてくれてますから、今のところ何も問題ないです」"
translation = "「하지만 이 아이가 정말 착하게 있어 주니까, 지금으로선 아무 문제 없어요」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「それに……この子は今、家族と離れ離れなんですよね？\u3000こんなに小さいのに……」"
translation = "「게다가…… 이 아이는 지금 가족과 떨어져 있는 거죠? 이렇게 어린데도……」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「そんな境遇を聞いてしまったら、放っておけないです。ボクにできる事なら何でもやってあげたいって気持ちです」"
translation = "「그런 사정을 들어버리면 가만히 둘 수 없어요. 제가 할 수 있는 일이라면 뭐든 해주고 싶다는 마음이에요」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「パパ捜しのお手伝いは出来ませんでしたから、せめて今はボクがこの子の家族になって守ってあげなくちゃって思ってます」"
translation = "「아빠 찾기를 돕지는 못했으니까, 적어도 지금은 제가 이 아이의 가족이 되어 지켜줘야겠다고 생각해요」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ルリエルも一緒に頑張りますよ～♪」"
translation = "「루리엘도 함께 힘낼게요~♪」"

[[dialogue]]
speaker_original = "赤ちゃんクマロボ"
speaker_translation = "아기 곰 로봇"
original = "「ばぶー<emoji=heart04>」"
translation = "「바부─<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "和気あいあいとした空気に包まれる星徒会室だった。"
translation = "화기애애한 분위기에 휩싸인 성도회실이었다."

[[dialogue]]
speaker = "unk"
original = "しかし、まさか──この数日後、あんな事件が発生してしまうとは、この平和な空気からは到底想像できなかったのだった。"
translation = "하지만 설마── 며칠 후, 그런 사건이 발생해 버릴 줄은, 이 평화로운 분위기에서는 도저히 상상할 수 없었다."

