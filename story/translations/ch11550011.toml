[[dialogue]]
speaker = "unk"
original = "第１話,魔法少女（アニメ）談議,P"
translation = "제1화, 마법소녀(애니메이션) 담의"

[[dialogue]]
speaker = "unk"
original = "『悪魔のロストアイテム』を寄生型悪魔から引きはがすため、オムニスと陽彩は元の世界へ転移した。"
translation = "『악마의 로스트 아이템』을 기생형 악마에게서 떼어내기 위해, 옴니스와 히요리는 원래 세계로 전이했다."

[[dialogue]]
speaker = "unk"
original = "その２人の帰りを待つまでの間、異世界からやってきた魔法少女たちは、こちらの世界で数日を過ごすことになった。"
translation = "그 두 사람이 돌아오기를 기다리는 동안, 이세계에서 온 마법소녀들은 이쪽 세계에서 며칠을 보내게 되었다."

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「めっっっっっっちゃ良かったぁ！！！！」"
translation = "「지이이이이이이인짜 좋았어!!!!」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「キャラよし、ストーリーよし、主題歌よし！\u3000さすがアンナちゃんが激オシするだけのことはあったよ～！」"
translation = "「캐릭터 좋고, 스토리 좋고, 주제가 좋고! 역시 안나짱이 강력 추천할 만하네~!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「他にも見て欲しいアニメはありますが、時間には限りがありますからね～」"
translation = "「다른 보여드리고 싶은 애니메이션도 있습니다만, 시간은 한정되어 있으니까요~」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「となれば、押さえておかなければならないのはやはり『トレジャーキャプター☆ちえり』でしょう☆」"
translation = "「그렇게 되면, 꼭 봐두어야 할 것은 역시 『트레저 캡터☆치에리』겠죠☆」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「『ちぇりちぇりキュートな魔法少女ちえり参上っ☆\u3000悪いマジックアイテムさん、ごめんなさいの時間だよっ♪』」"
translation = "「『체리체리 큐트한 마법소녀 치에리 등장☆ 나쁜 매직 아이템 씨, 사과할 시간이야♪』」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「おお～、決め台詞まで完璧じゃないですか！」"
translation = "「오오~, 결정 대사까지 완벽하지 않나요!」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「あの決めポーズが可愛すぎて……やっぱ魔法少女はああじゃないとね！」"
translation = "「그 결정 포즈가 너무 귀여워서…… 역시 마법소녀는 저래야지!」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「ああいうポージングや名乗り、あたしたちでもやりたいんだよね～」"
translation = "「저런 포징이나 구호, 우리도 하고 싶단 말이지~」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「あたしはやる気満々なんだけど、カオリンが恥ずかしがって全然やってくれないんだー」"
translation = "「나는 의욕 만만인데, 카오린이 부끄러워해서 전혀 안 해준단 말이야ー」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「それを言うならうちのサチさんも同じですよ。決め台詞が一番似合うビジュアルしてるのに……」"
translation = "「그걸로 치면 저희 사치 씨도 마찬가지예요. 결정 대사가 가장 잘 어울리는 비주얼인데……」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「わかるーっ！\u3000サチちゃん、一番魔法少女っぽいよね！」"
translation = "「알 것 같아! 사치짱, 제일 마법소녀답지!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「でしょう！？\u3000さすがいろはさん、お目が高い☆」"
translation = "「그렇죠!? 역시 이로하 씨, 안목이 높으시네요☆」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「やっぱりそうだよね！\u3000仲間がいてよかった～」"
translation = "「역시 그렇지! 동료가 있어서 다행이야~」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「１回でいいから決め台詞をポーズ付きでやって欲しいけど、無理なのかな～」"
translation = "「한 번이라도 좋으니까 결정 대사를 포즈 곁들여서 해줬으면 좋겠는데, 무리일까나~」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「まあ、ノリと雰囲気次第ではやってくれないこともないんですが……結構ハードルは高いみたいですね～」"
translation = "「뭐, 기분과 분위기에 따라서는 안 해주는 것도 아니지만…… 꽤 허들이 높은 모양이네요~」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「えー！ カラオケで主題歌熱唱してほしいのに～！」"
translation = "「에이! 노래방에서 주제가 열창해 줬으면 좋겠는데~!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「それにはまず、サチさんに『トレちぇり』を履修させるところからですね。めっちゃ薦めてるのですが、頑として見てくれないんです」"
translation = "「그러려면 우선, 사치 씨에게 『트레체리』를 이수시키는 것부터네요. 엄청 권하고 있습니다만, 완강히 안 봐주거든요」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「わかった！\u3000じゃああたしからもお願いしてみる！」"
translation = "「알았어! 그럼 나도 한번 부탁해 볼게!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「是非、お願いします～♪」"
translation = "「부디, 부탁드려요~♪」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「まあサチちゃんだけじゃなくて、アンナちゃんも十分に魔法少女って感じだけどね。えっと、先代の魔法少女なんだっけ？」"
translation = "「뭐 사치짱뿐만 아니라, 안나짱도 충분히 마법소녀라는 느낌이지만 말이야. 에또, 선대 마법소녀라고 했던가?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「そうなんです！\u3000ロストアイテムの回収中にドジってしまいまして、ずっと長い間封印されてしまっていたんですが……」"
translation = "「그렇답니다! 로스트 아이템을 회수하던 중에 실수를 해버려서, 아주 오랜 시간 동안 봉인되어 있었습니다만……」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「封印を解いてこの姿を取り戻したのも最近のことで、それまではサチさんのお助け妖精としてロストアイテムの回収に協力していたんです」"
translation = "「봉인을 풀고 이 모습을 되찾은 것도 최근의 일이고, 그때까지는 사치 씨의 도우미 요정으로서 로스트 아이템 회수에 협력하고 있었어요」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「ちょっと思ったんだけど、ロストアイテムを集めるってなんかトレちぇりっぽくない？」"
translation = "「문득 생각했는데, 로스트 아이템을 모으는 거 왠지 트레체리 같지 않아?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「……お気づきになられましたか」"
translation = "「……눈치채셨나요」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「あっ、やっぱり元ネタだったりするカンジ！？」"
translation = "「앗, 역시 모티브라거나 그런 느낌!?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「魔法少女の王道と言えば『失せモノ探し』の物語ですよ。最近はバトルものも流行りですが、エブリデイマジックにこそ、魔法少女の源流があると考えています！」"
translation = "「마법소녀의 왕도라고 하면 『잃어버린 물건 찾기』 이야기죠. 요즘은 배틀물도 유행이지만, 에브리데이 매직이야말로 마법소녀의 원류가 있다고 생각합니다!」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「『オラ魔女ドドミちゃん』みたいなやつってことかな？\u3000日常の中に、ちょっとした不思議なことが起こる～みたいな？」"
translation = "「『오라 마녀 도도미짱』 같은 거 말하는 거지? 일상 속에 조금 신기한 일이 일어나는~ 그런 느낌?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「その通りです！\u3000魔法少女がドンパチするのもギャップがあっていいですが、それはあくまでもキュートでワクワクな王道魔法少女の概念があってこそなんです！」"
translation = "「맞습니다! 마법소녀가 쾅쾅 싸우는 것도 갭이 있어서 좋지만, 그것은 어디까지나 큐트하고 두근거리는 왕도 마법소녀의 개념이 있기에 가능한 법이죠!」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「いいね、熱いねっ！\u3000そんな風にアンナちゃんを魔法少女の道に引きずり込んだ、最初の作品も気になってきたな～」"
translation = "「좋네, 뜨겁네! 그런 식으로 안나짱을 마법소녀의 길로 끌어들인 첫 작품도 궁금해지네~」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「あ～、それはですね～。実は元々、私の地元にも古くから伝わる『魔女っ娘』の伝説が存在してたんですよ」"
translation = "「아~, 그건 말이죠~. 사실 원래 제 고향에도 옛날부터 전해 내려오는 『꼬마 마녀』의 전설이 존재했거든요」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「だから逆に、現代で目を覚ました時に驚いてしまったわけです。これこそが、私の憧れた英雄の姿なのかっ！\u3000って感じで」"
translation = "「그래서 반대로, 현대에서 눈을 떴을 때 놀라고 만 거예요. 이것이야말로 내가 동경하던 영웅의 모습인가! 하는 느낌으로요」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「え～～！！\u3000なにそれ、気になる！\u3000アンナちゃん、その話も詳しく聞かせてよっ」"
translation = "「에~~!! 뭐야 그게, 궁금해! 안나짱, 그 이야기도 자세히 들려줘」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「後はやはり、トレちぇりの醍醐味は恋愛要素だと思うんですよ～。女の子の恋する姿は、可愛いですからねっ☆」"
translation = "「다음은 역시, 트레체리의 묘미는 연애 요소라고 생각해요~. 소녀가 사랑하는 모습은 귀여우니까요☆」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「うんうん、憧れの先輩か、同級生のケンカ友達か、それともお兄ちゃんとの禁断の恋か！\u3000ちえりちゃんが最後に選ぶのは誰か、だよね～」"
translation = "「응응, 동경하는 선배인가, 동급생인 싸움 친구인가, 아니면 오빠와의 금단 연애인가! 치에리짱이 마지막에 선택하는 건 누구일까, 이거지~」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「結局それは明かされませんでしたが、いろはさん的にはどうです？\u3000誰とくっついて欲しかったですか？」"
translation = "「결국 그것은 밝혀지지 않았습니다만, 이로하 씨 입장에서는 어때요? 누구랑 이어졌으면 했나요?」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「うーん、あたしはそうだな～。同級生のケンカ友達かな、王道だけど！」"
translation = "「으음, 나는 그렇네~. 동급생인 싸움 친구일까, 왕도지만!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「私はお兄ちゃん派でしたね～。ちえりちゃんをいじめながらも、好きなことが隠せてない感じがもうたまらないです♪」"
translation = "「저는 오빠파였어요~. 치에리짱을 괴롭히면서도 좋아하는 마음을 숨기지 못하는 느낌이 정말 참을 수 없거든요♪」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「同級生の子も転校して行っちゃうし、先輩も正体が実はアレだったりで……ちょっと切ない感じなのもいいよね～」"
translation = "「동급생인 애도 전학 가버리고, 선배도 정체가 사실은 그거라거나 해서…… 조금 애틋한 느낌인 것도 좋지~」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「……恋愛要素でふと思ったんですが、いろはさんにはそういったお相手は？」"
translation = "「……연애 요소 하니 문득 생각났는데, 이로하 씨에게는 그런 상대가?」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「あはは、いないよ～」"
translation = "「아하하, 없어~」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「そうなんですか？\u3000いろはさん可愛いですし、明るくていい子ですからモテそうですけど」"
translation = "「그런가요? 이로하 씨 귀엽고 밝고 착한 아이니까 인기 많을 것 같은데」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「いざ自分でってなるとよくわかんないし、それ以前になーんか出会いがないんだよね」"
translation = "「막상 나 자신이 되려니까 잘 모르겠고, 그 이전에 워어언가 만남이 없단 말이지」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「男の子と顔を合わせるって言ったら、ここにゃんの弟くんたちか、お兄ちゃんくらい？\u3000まあ、異性って感じじゃないよね～」"
translation = "「남자애랑 얼굴 마주한다고 하면, 여기 냥의 남동생들이나 오빠 정도? 뭐, 이성이라는 느낌은 아니지~」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「そう考えると、あたしの周りのちゃんとした異性って……オムオムくらい？」"
translation = "「그렇게 생각하면, 내 주변의 제대로 된 이성이라곤…… 옴옴 정도?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「そのオムニスさんはどうなんです？」"
translation = "「그 옴니스 씨는 어떤가요?」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「それはないよ～、だってオムオムだもん」"
translation = "「그건 아니야~, 그야 옴옴인걸」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「トレちぇりで言うなら、オムオムは『ケモちゃん』だよ？\u3000マスコットみたいなものだから」"
translation = "「트레체리로 치면, 옴옴은 『케모짱』이야. 마스코트 같은 거니까」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ふむふむ。ではもし、オムニスさんが人の姿をしていたら……？」"
translation = "「흠흠. 그럼 만약, 옴니스 씨가 사람의 모습을 하고 있다면……?」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「えっ？\u3000そ、それは……え～っとぉ……」"
translation = "「엣? 그, 그건…… 에~또ぉ……」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「う～～ん、わかんないや。えへへ」"
translation = "「으으음, 모르겠어. 에헤헤」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「ていうか、そんなことを言うアンナちゃんの方はどうなの？」"
translation = "「그나저나 그런 말을 하는 안나짱 쪽은 어때?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「私？」"
translation = "「저요?」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「好きな人とか……恋人とか！？」"
translation = "「좋아하는 사람이라든가…… 애인이라든가!?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「さっきもお話した通り、私はみなさんとは寿命が違いますからね～。魔女という種族も、本来はツガイを作らないですし☆」"
translation = "「방금 말씀드린 대로, 저는 여러분과는 수명이 다르니까요~. 마녀라는 종족도 본래는 짝을 만들지 않고요☆」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「正直に言って、恋愛感情ってよくわからないんですよ～」"
translation = "「솔직히 말해서 연애 감정이라는 건 잘 모르겠어요~」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「え～！\u3000さっきはちえりちゃんの恋愛が面白いって言ってたのに！」"
translation = "「에이! 아까는 치에리짱의 연애가 재밌다고 했으면서!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「恋する男の子と女の子は可愛いですから☆\u3000私はそういうのを摂取するのが好きなんです」"
translation = "「사랑하는 소년과 소녀는 귀여우니까요☆ 저는 그런 걸 섭취하는 걸 좋아한답니다」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「まあまあ、私はあくまで先代の魔法少女ですから。そういったラブロマンスはサチさんたちヒロインに任せておきましょう♪」"
translation = "「자자, 저는 어디까지나 선대 마법소녀니까요. 그런 러브 로맨스는 사치 씨 같은 히로인들에게 맡겨두자고요♪」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「え～！\u3000ちょっと誤魔化した気がするなぁ」"
translation = "「에이! 살짝 얼버무린 느낌인데」"

[[dialogue]]
speaker = "unk"
original = "──２人の魔法少女好きの魔法少女による魔法少女談義は、こうして尽きることなく延々と続いた。"
translation = "──두 명의 마법소녀를 좋아하는 마법소녀에 의한 마법소녀 담의는 이렇게 끝날 줄 모르고 끝없이 이어졌다."

[[dialogue]]
speaker = "unk"
original = "それこそ……日が暮れてカフェテリアの閉店時間が過ぎても。"
translation = "그야말로…… 해가 지고 카페테리아의 폐점 시간이 지나도."

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「あ、あの～、すみません……そろそろお時間なので、速やかに退店をお願いします～～～っ」"
translation = "「저, 저기~, 죄송합니다…… 이제 시간이 다 돼서, 신속히 퇴점을 부탁드릴게요~~~」"

