[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ぎゃああああああああああああああぁぁぁぁぁぁぁぁ～～～～～～～～～～～～！！！」"
translation = "「갸아아아아아아아아아아아아아아아아아아아아아아아아아아아아아아~~~~~~!!!!」"

[[dialogue]]
speaker = "unk"
original = "極寒の風が砂浜に吹き抜けた！"
translation = "극한의 바람이 백사장에 불어 닥쳤다!"

[[dialogue]]
speaker = "unk"
original = "水着のソフィアちゃんに大ダメージ！！"
translation = "수영복 차림인 소피아 짱에게 대미지!!"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「な、なに今の冷気……！」"
translation = "「뭐, 뭐야 방금 그 냉기는……!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「一瞬だけ──まるで外から入り込んできたかのような寒波でした……！」"
translation = "「순간적으로── 마치 밖에서 스며 들어온 것 같은 한파였어요……!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「うううっ、コート……カイロ……ストーブはどこですか！\u3000も、もうこんな格好してられませんっ！」"
translation = "「우우우, 코트…… 핫팩…… 난로는 어디 있나요! 이, 이제 이런 차림으로 못 있겠어요!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「落ち着いて、ソフィ。もう暖かさを取り戻したわ」"
translation = "「진정해, 소피. 이제 다시 따뜻해졌어」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ううっ、がくがく……ぶるぶる……い、一瞬だけでも絶大な破壊力でした……」"
translation = "「우우, 덜덜…… 덜덜…… 이, 일순간만으로도 절대적인 파괴력이었어요……」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「妙だな。こんないい天気なのに、なんであんな冷たい風が吹くんだ？」"
translation = "「묘하구만. 이렇게 날씨가 좋은데 왜 저런 찬바람이 부는 거지?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そうね。潮風──って感じじゃなかったけど……」"
translation = "「그러게. 바닷바람── 같은 느낌은 아니었는데……」"

[[dialogue]]
speaker = "unk"
original = "リップルもしかして……"
translation = "리플 설마……"

[[dialogue]]
speaker = "unk"
original = "今のが……？"
translation = "방금 그게……?"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ハイ……お察しのトーリ」"
translation = "「하이…… 짐작하신 대로」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「今のが──ワタシもアタマを悩ませている『隙間風』なのデス！」"
translation = "「방금 게── 저도 머리를 싸매고 있는 『외풍』인 것입니닷!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「隙間風……？」"
translation = "「외풍……?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ハイ。この冬になってから、時おり一瞬だけ<ruby>極寒<rt>ゴッサム</rt></ruby>なウインドが吹くようになってしまったのデス！」"
translation = "「하이. 이번 겨울이 되고 나서 가끔 순간적으로 극한의 윈드가 불게 되어 버렸습니다!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「極寒ですね」"
translation = "「극한(고삼)이네요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「以前はこんなことなかったはず。どうして……？」"
translation = "「전에는 이런 일 없었을 텐데. 어째서……?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「恐らくは夏パワーの減少による、リゾート結界のメンテ不足と思われマース」"
translation = "「아마도 여름 파워 감소에 따른 리조트 결계의 정비 부족으로 생각되요」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「じゃ、もしかして……さっきの虫なんかも？」"
translation = "「그럼 혹시…… 아까 그 벌레 같은 것도?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ええ、いかにもデス」"
translation = "「네, 그렇습니닷」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ソウ……これはイワバ……外界から入り込んだ『冬のイタズラ』なのデ～ス！」"
translation = "「그렇습니닷…… 이건 말하자면…… 외계에서 스며든 『겨울의 장난』인 것입니다!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ふ……冬のイタズラ！！」"
translation = "「겨…… 겨울의 장난!!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ハイ。冬のイタズラのセイで、リゾート結界にも冬のような生き物や現象がごくマレに発生してしまうようになりマシタ」"
translation = "「하이. 겨울의 장난 때문에 리조트 결계에도 겨울 같은 생물이나 현상이 극히 드물게 발생하게 되어 버렸습니닷」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「サキほどの隙間風も、冬の虫サンたちが湧いてしまうのも、そのせいなのデスぅ……」"
translation = "「방금 전의 외풍도, 겨울 벌레 씨들이 끓어 넘치는 것도 그 때문인 거예요……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「全くけしからん……！\u3000この時期に冬の風が吹くだなんて、ありえませんね！」"
translation = "「정말 발칙하군요……! 이 시기에 겨울바람이 불다니, 있을 수 없는 일이에요!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「まだまだ修行不足デース。よもや『冬』の侵入を許してしまうナンテ……！」"
translation = "「아직 수행 부족입니다. 설마 『겨울』의 침입을 허용해 버리다니……!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（無理やり夏を作り出してるほうが異常なんだけどね……）"
translation = "（억지로 여름을 만들어 내고 있는 쪽이 이상한 거지만 말이야……）"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「パブリックビーチのほうはなんとか抑えているのですが、ドーモこちらにはより侵食が強まっているようなのデス」"
translation = "「퍼블릭 비치 쪽은 어떻게든 억제하고 있습니다만, 아무래도 이쪽에는 침식이 더 강해지고 있는 모양인 거예요」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「最初はチョット冷たいそよ風程度だったのデスが……気づけばサッキのよーな突風まで吹くようになってしまいマシタ」"
translation = "「처음에는 그냥 조금 시원한 산들바람 정도였습니다만…… 어느새 방금 같은 돌풍까지 불게 되어 버렸습니닷」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「それは──困りましたね。せっかくのリゾートが」"
translation = "「그건── 곤란하겠네요. 귀중한 리조트가」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「はい。この楽園を守るためにも即刻対策を講じましょう、フィオナ会長！」"
translation = "「네. 이 낙원을 지키기 위해서라도 즉각 대책을 강구하죠, 피오나 회장님!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「み～なさ～ん！\u3000ちょっと来てくださーい、すごいですよ～！」"
translation = "「여~러~분~! 이쪽으로 좀 와보세요, 굉장해요~!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「今の声……海の家にいたルリか？」"
translation = "「방금 목소리…… 바다의 집에 있던 루리인가?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ま、まさか海の家のほうにも異変が……！？」"
translation = "「서, 설마 바다의 집 쪽에도 이변이……!?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「こうしてはいられません──急ぎましょう！」"
translation = "「이러고 있을 수 없습니다── 서두르죠!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「──どうしましたか、ルリエル！」"
translation = "「──무슨 일인가요, 루리엘!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あ、フィオナ会長！\u3000見てください、ほら──大量のかき氷祭りですよ！」"
translation = "「아, 피오나 회장님! 보세요, 이것 좀── 대량의 빙수 축제예요!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「かき氷祭り……？」"
translation = "「빙수 축제……?」"

[[dialogue]]
speaker = "unk"
original = "これは……？"
translation = "이건……?"

[[dialogue]]
speaker = "unk"
original = "かき氷が増えてる！"
translation = "빙수가 늘어나고 있어!"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「！\u3000このかき氷……自然増殖してませんか？」"
translation = "「! 이 빙수…… 자연 증식하고 있지 않나요?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「そうです！\u3000このかき氷、放っておくだけで倍々に増えていくんです！」"
translation = "「맞아요! 이 빙수, 가만히 놔두기만 해도 배로 늘어난다고요!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「きっとリップルの粋なはからいよね？\u3000ありがと！\u3000こっちの果肉入りイチゴシロップなんてサイコーよ！」"
translation = "「분명 리플의 멋진 배려겠지? 고마워! 이쪽의 과육이 들어간 딸기 시럽은 정말 최고야아!」"

[[dialogue]]
speaker = "unk"
original = "海の家に常設された冷凍ボックスから、あふれんばかりのかき氷が増殖を続けていた。"
translation = "바다의 집에 상설된 냉동 박스에서, 넘쳐흐를 듯한 빙수가 증식을 계속하고 있었다."

[[dialogue]]
speaker = "unk"
original = "ルリエルにヴィーナスは嬉々としてスプーンを動かしていたが……"
translation = "루리엘과 비너스는 기뻐하며 숟가락을 움직이고 있었지만……"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「コ……コレはワタシの力ではありまセーン！」"
translation = "「이…… 이건 제 힘이 아닙니더─!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ってことはこいつも──『冬のイタズラ』ってやつか！」"
translation = "「그렇다는 건 이놈도── 『겨울의 장난』이라는 건가!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「すげえ！\u3000無限かき氷だ！\u3000これならいくらでも食べ放題じゃんかよ～！」"
translation = "「어마어마해! 무한 빙수다! 이거라면 얼마든지 무제한으로 먹을 수 있잖아~!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「のん気なことを言っている場合ではありません。このペースで増殖されたら、数分と持たずビーチがかき氷で埋め尽くされますよ！」"
translation = "「태평한 소리를 하고 있을 때가 아닙니다. 이 페이스로 증식한다면, 몇 분도 못 가서 해변이 빙수로 가득 매워질 거예요!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ヒエ～ッ！\u3000そんなことになったら、海まで凍ってしまいマ～ス！」"
translation = "「히에~엑! 그렇게 되면, 바다까지 얼어버려요오─!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ユウリ先輩。ここは私たちの『炎』でアイスを溶かし尽くしましょう」"
translation = "「유우리 선배. 여기선 우리들의 『염화』로 아이스를 다 녹여버리죠」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ちょっともったいねーけど──ああ。新星会長も手伝ってくれ！」"
translation = "「조금 아깝긴 하지만── 그래. 신성 회장도 도와줘!」"

[[dialogue]]
speaker = "unk"
original = "もちろんだ"
translation = "물론이지"

[[dialogue]]
speaker = "unk"
original = "食い尽くす"
translation = "다 먹어치우겠다"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「……許せません」"
translation = "「……용서할 수 없어요」"

[[dialogue]]
speaker = "unk"
original = "声に皆が振り返ると、そこには憤怒の炎を燃え上がらせている者がいた。"
translation = "목소리에 모두가 뒤돌아보자, 그곳에는 분노의 불꽃을 불태우고 있는 자가 있었다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「何が隙間風……何が冬のイタズラですか……この温暖な楽園を穢そうなど、不届き千万……！」"
translation = "「뭐가 외풍…… 뭐가 겨울의 장난입니까…… 이 온난한 낙원을 더럽히려 하다니, 괘씸하기 짝이 없군요……!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「──立ち上がれ、同志たち！\u3000唾棄すべき冬の侵食から、理想の常夏ビーチを取り戻すのです！」"
translation = "「──일어나세요, 동지들이여! 타파해야 할 겨울의 침식으로부터, 이상적인 상하의 해변을 되찾는 겁니다!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「オオォ～～～ッ！！」"
translation = "「오오오~~~!!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「──って、リップルより気合い入っちゃってる！？」"
translation = "「──랄까, 리플보다 더 기합이 들어가 있잖아!?」"

