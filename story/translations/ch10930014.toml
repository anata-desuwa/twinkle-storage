[[dialogue]]
speaker = "unk"
original = "第４話,ミルフィーとドキドキデート,P"
translation = "제4화, 밀피와 두근두근 데이트, P"

[[dialogue]]
speaker = "ミルフィー"
original = "（ど、どうしよう……約束の１時間前に着いちゃった……！\u3000これじゃあ、会長くんとのデートをめちゃくちゃ楽しみにしてるみたいだよ！）"
translation = "(어, 어떡해…… 약속 1시간 전에 도착해버렸어……! 이러면 회장군과의 데이트를 엄청 기대하고 있는 것 같잖아!)"

[[dialogue]]
speaker = "ミルフィー"
original = "（いや、実際に楽しみにしてるんだけど！\u3000会長くんに知られたら絶対引かれちゃう！）"
translation = "(아니, 실제로 기대하고 있지만! 회장군이 알면 분명 정떨어질 거야!)"

[[dialogue]]
speaker = "ミルフィー"
original = "「というか今日の私、変じゃないかな？\u3000髪型とか、服とか変じゃないよね？\u3000……って、誰に話しかけてるの私！」"
translation = "「그나저나 오늘 나, 이상하지 않나? 머리 모양이라든가, 옷이라든가 이상하지 않지? ……아니, 누구한테 말하는 거야 나!」"

[[dialogue]]
speaker = "ミルフィー"
original = "「はううっ……落ち着け、落ち着いて私……。大丈夫、大丈夫……いつも通りいつも通り……」"
translation = "「하우우…… 진정해, 진정해 나…… 괜찮아, 괜찮아…… 평소대로 평소대로……」"

[[dialogue]]
speaker = "ミルフィー"
original = "「いや、デートでいつも通りじゃダメなんじゃ！？」"
translation = "「아니, 데이트인데 평소대로면 안 되는 거 아냐!?」"

[[dialogue]]
speaker = "unk"
original = "ミルフィー？"
translation = "밀피?"

[[dialogue]]
speaker = "ミルフィー"
original = "「ひゃあああぁぁぁ！！\u3000会長くん！？」"
translation = "「히야아아아아!! 회장군!?」"

[[dialogue]]
speaker = "ミルフィー"
original = "「会長くんちょっと来るの早くない！？\u3000って、私も早く来ちゃったんだけど……！」"
translation = "「회장군 좀 너무 빨리 온 거 아냐!? 아니, 나도 빨리 오긴 했지만……!」"

[[dialogue]]
speaker = "ミルフィー"
original = "「えと、でも私は、会長くんに早く会いたくて来ちゃったわけで！」"
translation = "「에또, 하지만 나는 회장군을 빨리 보고 싶어서 온 거고!」"

[[dialogue]]
speaker = "ミルフィー"
original = "「じゃなくて！\u3000早く起きちゃったから！\u3000そう、早起きしちゃったからだよ！」"
translation = "「그게 아니라! 일찍 일어났으니까! 그래, 일찍 일어났기 때문이야!」"

[[dialogue]]
speaker = "unk"
original = "俺もミルフィーに会いたくて早く来ちゃった"
translation = "나도 밀피를 보고 싶어서 일찍 왔어"

[[dialogue]]
speaker = "ミルフィー"
original = "「ちゃんと聞かれてるぅ！\u3000……って、会長くんも？」"
translation = "「다 들렸어어! ……어라, 회장군도?」"

[[dialogue]]
speaker = "ミルフィー"
original = "「～～～～～～～～っ！！！」"
translation = "「～～～～～～～～윽!!!」"

[[dialogue]]
speaker = "ミルフィー"
original = "（ど、どうしようっ、嬉しいっ……。会長くんも、私と同じなんだ……）"
translation = "(어, 어떡해, 기뻐……. 회장군도 나랑 같구나……)"

[[dialogue]]
speaker = "ミルフィー"
original = "（ああでもどうしようっ……意識したら、恥ずかしくなってきたっ……。今の私、会長くんにどんな風に見られてるんだろう……？）"
translation = "(아아 하지만 어떡해…… 의식하니까 부끄러워지기 시작했어……. 지금의 나, 회장군에게 어떤 식으로 보이고 있을까……?)"

[[dialogue]]
speaker = "ミルフィー"
original = "「か、会長くん……今日の私、変じゃないかな？\u3000……変じゃない？\u3000そ、そっか……よかった……変じゃないんだ……」"
translation = "「회, 회장군…… 오늘 나, 이상하지 않아? ……안 이상해? 그, 그렇구나…… 다행이다…… 안 이상하구나……」"

[[dialogue]]
speaker = "unk"
original = "いつも通り可愛いよ"
translation = "평소처럼 귀여워"

[[dialogue]]
speaker = "ミルフィー"
original = "「かかかかかっ、くぁわいいですか！？」"
translation = "「그그그그그, 귀여운가요!?」"

[[dialogue]]
speaker = "ミルフィー"
original = "「ちょっと待って！\u3000照れるっ！\u3000照れるからそういうの急に言わないで！」"
translation = "「잠깐만! 부끄러워! 부끄러우니까 그런 거 갑자기 말하지 마!」"

[[dialogue]]
speaker = "ミルフィー"
original = "「嫌じゃないっ……！\u3000むしろ嬉しいんだけど、ちょっと恥ずかしいかも……」"
translation = "「싫은 건 아냐……! 오히려 기쁘긴 한데, 좀 부끄러울지도……」"

[[dialogue]]
speaker = "ミルフィー"
original = "「だよね、会長くんも照れてるよね……顔も赤くなってるし……」"
translation = "「그렇네, 회장군도 쑥스러워하고 있네…… 얼굴도 붉어졌고……」"

[[dialogue]]
speaker = "ミルフィー"
original = "「あ、あはは……このまま突っ立っててもしょうがないし、歩こうか」"
translation = "「아, 아하하…… 이대로 서 있어도 소용없으니까, 걸을까」"

[[dialogue]]
speaker = "ミルフィー"
original = "「その、デートはじめよ？」"
translation = "「저기, 데이트 시작하자?」"

[[dialogue]]
speaker = "unk"
original = "ミルフィーとのデートは順調に進んでいた。"
translation = "밀피와의 데이트는 순조롭게 진행되었다."

[[dialogue]]
speaker = "unk"
original = "最初はお互い照れてぎこちなかったけれど、徐々に笑顔が増えてきて──"
translation = "처음에는 서로 쑥스러워 서먹했지만, 점차 웃음이 늘어갔고──"

[[dialogue]]
speaker = "ミルフィー"
original = "「会長くん、さっきのパフェ美味しかったねっ」"
translation = "「회장군, 아까 파페 맛있었지」"

[[dialogue]]
speaker = "ミルフィー"
original = "「２人で１つのパフェを食べるのは、少し恥ずかしかったけど……なんか、デートっぽくて楽しかった……」"
translation = "「둘이서 파페 하나를 나눠 먹는 건 조금 부끄러웠지만…… 왠지 데이트 같아서 즐거웠어……」"

[[dialogue]]
speaker = "ミルフィー"
original = "「さ、お腹もいっぱいになったし、次はどこに行こっか？」"
translation = "「자, 배도 불렀으니 다음은 어디로 갈까?」"

[[dialogue]]
speaker = "モンスター"
original = "「イ～～～～ッ！」"
translation = "「이~~~~!」"

[[dialogue]]
speaker = "ミルフィー"
original = "「会長くん、モンスターが！\u3000早く助けに行かなきゃ！」"
translation = "「회장군, 몬스터가! 빨리 구하러 가야 해!」"

[[dialogue]]
speaker = "ミルフィー"
original = "「……うん！\u3000準備万端！」"
translation = "「……응! 준비 완료!」"

[[dialogue]]
speaker = "ミルフィー"
original = "「あなたたちのせいで、せっかくのデートが台無しじゃない！\u3000もう怒ったんだからね！」"
translation = "「당신들 때문에 모처럼의 데이트가 엉망이잖아! 이제 화났다구!」"

[[dialogue]]
speaker = "ミルフィー"
original = "「一撃で仕留める！\u3000光よ貫け──シャイニング・ペネトレーター！」"
translation = "「일격에 끝내겠어! 빛이여 꿰뚫어라── 샤이닝 페네트레이터!」"

[[dialogue]]
speaker = "モンスター"
original = "「イ～～……」"
translation = "「이~~……」"

[[dialogue]]
speaker = "ミルフィー"
original = "「ふう……怪我人はいないみたいだね……。会長くんも大丈夫？」"
translation = "「후우…… 부상자는 없는 것 같네……. 회장군도 괜찮아?」"

[[dialogue]]
speaker = "ミルフィー"
original = "「ん？\u3000どうしたの会長くん。さっきから目を合わせてくれないけど……」"
translation = "「응? 왜 그래 회장군. 아까부터 눈을 안 마주쳐 주는데……」"

[[dialogue]]
speaker = "unk"
original = "いやその、何と言いますか……露出度が……"
translation = "아니 그게, 뭐랄까…… 노출도가……"

[[dialogue]]
speaker = "ミルフィー"
original = "「露出……？\u3000って、まさか会長くんっ……！」"
translation = "「노출……? 설마 회장군……!」"

[[dialogue]]
speaker = "ミルフィー"
original = "「～～～～～～～～～～～っ！！！」"
translation = "「～～～～～～～～～～～윽!!!」"

[[dialogue]]
speaker = "ミルフィー"
original = "「ちょ、ちょっと露出が多いかもしれないけど、これは機動力を重視というか、戦闘の効率を上げるためであって、私の趣味じゃないから！」"
translation = "「조, 조금 노출이 많을지도 모르지만, 이건 기동력을 중시한달까, 전투 효율을 높이기 위해서지 내 취미가 아니니까!」"

[[dialogue]]
speaker = "ミルフィー"
original = "「というか、星徒会長が戦う女の子をエッチな目で見ちゃダメ！」"
translation = "「그보다 성도회장이 싸우는 여자애를 야한 눈으로 보면 안 돼!」"

[[dialogue]]
speaker = "unk"
original = "ごめん、でもその姿のミルフィーも魅力的だから"
translation = "미안, 하지만 그 모습의 밀피도 매력적이라서"

[[dialogue]]
speaker = "ミルフィー"
original = "「そっか……そうなんだ……」"
translation = "「그렇구나…… 그렇구나……」"

[[dialogue]]
speaker = "ミルフィー"
original = "「ちなみにさ、魅力的なのって……エッチな意味でも……？」"
translation = "「참고로 말야, 매력적이라는 게…… 야한 의미로도……?」"

[[dialogue]]
speaker = "ミルフィー"
original = "「あ、あわわわわ……！\u3000い、言いきっちゃうんだ……星徒会長なのに……」"
translation = "「아, 아와와와……! 다, 단정 지어 말해버리다니…… 성도회장인데……」"

[[dialogue]]
speaker = "ミルフィー"
original = "（どうしよう……やっぱり私、エッチな目で見られて、嬉しくなっちゃってるっ……）"
translation = "(어떡해…… 역시 나, 야한 눈으로 보여져서 기뻐지고 있어……)"

[[dialogue]]
speaker = "ミルフィー"
original = "「戦う女の子をエッチな目で見るのはよくないけど……けど……」"
translation = "「싸우는 여자애를 야한 눈으로 보는 건 좋지 않지만…… 하지만……」"

[[dialogue]]
speaker = "ミルフィー"
original = "「特別に、私だけなら……いいよ……。会長くんになら、そういう目で見られても……イヤじゃないから……」"
translation = "「특별히, 나뿐이라면…… 괜찮아……. 회장군이라면 그런 눈으로 보여져도…… 싫지 않으니까……」"

[[dialogue]]
speaker = "ミルフィー"
original = "「って、今のナシ！\u3000クラス委員長がこんなこと言ったらダメだよね……あはは……」"
translation = "「아니, 방금 건 취소! 학급위원장이 이런 말 하면 안 되지…… 아하하……」"

[[dialogue]]
speaker = "unk"
original = "今のすごくドキドキした"
translation = "방금 거 엄청 두근거렸어"

[[dialogue]]
speaker = "ミルフィー"
original = "「そ、そうなんだ……ドキドキしてくれたんだ……」"
translation = "「그, 그렇구나…… 두근거려 줬구나……」"

[[dialogue]]
speaker = "ミルフィー"
original = "「じゃ、じゃあ……会長くんだけ、特別……ね。特別だから……」"
translation = "「그, 그럼…… 회장군만, 특별히……야. 특별하니까……」"

[[dialogue]]
speaker = "unk"
original = "それからお互い顔中真っ赤にしながら、デートの続きを楽しんだのだった──"
translation = "그 후로 서로 얼굴이 새빨개진 채 데이트를 마저 즐겼다──"

