[[dialogue]]
speaker = "unk"
original = "ヒルディオーネ先輩と恋人になり、付き合い始めてからしばらく経った、ある日のこと。"
translation = "힐디요네 선배와 연인이 되어 사귀기 시작한 지 얼마간 시간이 흐른 어느 날."

[[dialogue]]
speaker = "unk"
original = "俺は先輩と一緒に、日課の夜トレーニングをこなしていた――"
translation = "나는 선배와 함께 일과인 밤 트레이닝을 소화하고 있었다──"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ふぅ……今日はこれくらいにしておきましょうか。ふふっ、会長、出会った頃とは比較にならない程に強くなりましたね」"
translation = "「후우…… 오늘은 이 정도로 해둘까요. 후훗, 회장님, 처음 만났을 때와는 비교도 안 될 정도로 강해지셨네요」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「土壇場の覚醒などなくとも、スチームドレスで身体強化している私と格闘戦で互角。もはや誰も、あなたの実力を疑う者などおりませんわ」"
translation = "「막판의 각성 같은 게 없어도 스팀 드레스로 신체 강화 중인 저와 격투전에서 호각. 이제 아무도 당신의 실력을 의심할 자는 없답니다」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「それでこそ私の……ん、んんっ……いえ、何でもありませんわ。さて、会長……今日はまだ、時間はありますかしら？」"
translation = "「그야말로 저의…… 음, 으음…… 아니, 아무것도 아니에요. 자, 회장님…… 오늘은 아직 시간이 있으신가요?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「こ、こほんっ。……よろしければ、この後、私の部屋でティータイムでもいかがでしょう？」"
translation = "「크, 흠. ……괜찮으시다면 이 뒤에 제 방에서 티타임이라도 어떠신가요?」"

[[dialogue]]
speaker = "unk"
original = "先輩が『部屋でティータイム』と言い出すのは、防音設備のしっかりしている流星寮の自室で、誰にも見られないように<b>したい</b>という合図だ。"
translation = "선배가 『방에서 티타임』이라고 말하는 것은, 방음 설비가 확실한 유성 기숙사의 자실에서 누구에게도 보이지 않게 <b>하고</b> <b>싶다</b>는 신호다."

[[dialogue]]
speaker = "unk"
original = "それは最近、もう１つの日課とも言えるくらいの頻度になりつつあり……そのせいで俺は、トレーニング中からついつい期待してしまっているのだった――"
translation = "그것은 최근 또 하나의 일과라고 할 수 있을 정도의 빈도가 되어가고 있었고…… 그 때문에 나는 트레이닝 중에도 내심 기대해 버리고 마는 것이었다──"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「って、突然なんですのこれーーーーーーっ！！？」"
translation = "「아니, 갑자기 이게 뭔가요오오오오오오옷!!?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「シャワーを浴びるならお願いがあるって、なにかと思えば……か、髪コキだなんて、私の髪はおもちゃじゃありませんのよ！？」"
translation = "「샤워를 할 거면 부탁이 있다고 해서 뭔가 했더니…… 머, 머리카락 딸이라니, 제 머리카락은 장난감이 아니라고요!?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「――髪が綺麗だから、どうしても１度やってみたかった？\u3000あ、あなたが私の髪をそんな性的な目で見てるなんて……へ、変態ですわよっ<emoji=heart04>」"
translation = "「──머리카락이 예뻐서 꼭 한번 해보고 싶었다고요? 다, 당신이 제 머리카락을 그런 성적인 눈으로 보고 있었다니……벼, 변태랍니다앗<emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「んっ……<emoji=heart04>\u3000頭を優しくなでながら、お願いするのは……卑怯ですわ<emoji=heart04>」"
translation = "「응……<emoji=heart04> 머리를 상냥하게 쓰다듬으면서 부탁하는 건…… 비겁하답니다<emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「――髪がふわふわで柔らかくて、気持ちいい？\u3000だってそれは……淑女として、毎日手入れを欠かしておりませんもの……」"
translation = "「──머리카락이 푹신하고 부드러워서 기분 좋다고요? 그야 그건…… 숙녀로서 매일 관리를 거르지 않으니까요……」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「も、もう……仕方ありませんわね。そこまで私の髪がいいっていうのなら、今回だけ……特別ですわよ？」"
translation = "「정, 정말이지…… 어쩔 수 없네요. 그렇게까지 제 머리카락이 좋다면 이번만…… 특별히 허락하겠어요」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「それじゃあ……んっ――<emoji=heart04>」"
translation = "「그럼…… 응──<emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「はぁぁ……<emoji=heart04>\u3000シゴく前から、こんなに大きくしているなんて……どれだけ期待していたんですの？\u3000んっ、ふぅ……<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 흔들기도 전부터 이렇게 크게 만들다니…… 얼마나 기대하고 있었던 건가요? 응, 후우……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「そんな嬉しそうな顔をして……髪コキ、そんなにいいんですの？\u3000はあぁ……<emoji=heart04>」"
translation = "「그런 기쁜 듯한 얼굴을 하고…… 머리카락 딸, 그렇게 좋나요? 하아아……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「んっ……<emoji=heart04>\u3000私の心の広さに、感謝して頂きたいですわね……<emoji=heart04>\u3000ほかの女性だったら、こんなこと受け入れてくれませんわよ？」"
translation = "「응……<emoji=heart04> 제 마음의 넓음에 감사하셨으면 좋겠네요……<emoji=heart04> 다른 여자였다면 이런 거 받아주지 않았을 거라고요?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ん、ふぅぅ……<emoji=heart04>\u3000あなたのおち○ぽ、先走り汁が出てきましたわ……すうぅ……んっ……<emoji=heart04>」"
translation = "「음, 후우우……<emoji=heart04> 당신의 자지, 쿠퍼액이 흘러나오고 있답니다…… 스으으…… 응……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「まだシャワーを浴びてないから、汗と混じり合って……すごい匂いがしますわ<emoji=heart04>\u3000はあぁ……<emoji=heart04>」"
translation = "「아직 샤워를 안 해서 땀과 뒤섞여…… 엄청난 냄새가 나요<emoji=heart04> 하아아……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「全く、こんなものを私の髪にこすりつけて……ふうぅ<emoji=heart04>\u3000とんだ変態ですわね……<emoji=heart04>」"
translation = "「정말이지, 이런 걸 제 머리카락에 문지르다니…… 후우우<emoji=heart04> 대단한 변태네요……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ほら、もうすっかり固くなって、先走り液でヌルヌルになってますわよ……<emoji=heart04>\u3000そろそろ、いいのではなくて……？」"
translation = "「봐요, 이제 완전히 딱딱해져서 쿠퍼액으로 미끈미끈해졌답니다……<emoji=heart04> 슬슬, 괜찮지 않나요……?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「何がって……白々しいですわ。期待でこんなにそそり立たせていて、早く入れたいのでしょう……？」"
translation = "「뭐가냐니…… 시치미 떼지 마세요. 기대감에 이렇게 꼿꼿이 세워놓고서, 빨리 넣고 싶은 거잖아요……?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「だから、前戯はここまでにしておいて――」"
translation = "「그러니까 전희는 여기까지 해두고──」"

[[dialogue]]
speaker = "クロト"
original = "「先輩、ひょっとしてもう、おま○こに入れてほしいんですか？」"
translation = "「선배, 혹시 벌써 보지에 넣어줬으면 하는 거예요?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「なっ……！？」"
translation = "「나앗……!?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「そ、そんなわけありませんわ！\u3000私は淑女として、殿方の空気を読んで差し上げただけでしてよ！\u3000私がしたいとか、そういうことじゃありませんわっ」"
translation = "「그, 그럴 리 없답니다! 저는 숙녀로서 남자의 분위기를 읽어드린 것뿐이라고요! 제가 하고 싶다거나 그런 게 아니랍니다앗」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「え？\u3000――なら、フェラもしてほしい？\u3000べ、別にできますわよ、もちろん……！」"
translation = "「에? ──그럼 펠라치오도 해줬으면 좋겠다고요? 벼, 별로 할 수 있답니다, 물론……!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「私のテクニックで、すぐに射精してしまっても知りませんからねっ……！\u3000はぁぁ……<emoji=heart04>」"
translation = "「제 테크닉으로 금방 사정해버려도 모른다고요……! 하아아……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「お覚悟あそばせ……いきますわよ、あむっ――<emoji=heart04>」"
translation = "「각오하세요…… 갑니다, 아암──<emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「んむっ<emoji=heart04>\u3000ちゅっぽ……ちゅぷぷっ<emoji=heart04>\u3000ちゅっぱ……れるれるっ<emoji=heart04>\u3000ちゅっぽ……ちゅっぷ……ちゅるるっ<emoji=heart04>」"
translation = "「음무웃<emoji=heart04> 츕포…… 츄푸푸웃<emoji=heart04> 츕파…… 레로레로옷<emoji=heart04> 츕포…… 츕푸…… 츄루루웃<emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ちゅるるっ<emoji=heart04>\u3000ちゅぱっ……<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000どうですの、私のテクニックは？\u3000ちゅっぽ……ちゅっぽ<emoji=heart04>\u3000れろちゅっ<emoji=heart04>」"
translation = "「츄루루웃<emoji=heart04> 츄팟……<emoji=heart04> 하아아앗<emoji=heart04> 어때요, 제 테크닉은? 츕포…… 츕포<emoji=heart04> 레로츄웃<emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ほら、先っぽから……ちゅるるっ<emoji=heart04>\u3000我慢汁が沢山、溢れておりますわよ？\u3000れろれろっ……んくっ<emoji=heart04>」"
translation = "「봐요, 끝부분에서…… 츄루루웃<emoji=heart04> 쿠퍼액이 잔뜩 넘쳐나고 있답니다? 레로레로옷…… 응긋<emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ちゅっ……ちゅうぅっ<emoji=heart04>\u3000ちゅぷぷっ……ちゅるるっ<emoji=heart04>\u3000れろれろっ……ちゅぱぁっ<emoji=heart04>\u3000んふぅっ……<emoji=heart04>\u3000卑猥なオスの味ですわ……<emoji=heart04>」"
translation = "「츄웃…… 츄우우웃<emoji=heart04> 츄푸푸웃…… 츄루루웃<emoji=heart04> 레로레로옷…… 츄파앗<emoji=heart04> 응후웃……<emoji=heart04> 비열한 수컷의 맛이랍니다……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「んちゅっ……ちゅっぽ<emoji=heart04>\u3000ちゅっぽ<emoji=heart04>\u3000気持ちいいんですの？\u3000ちゅぷぷっ……れろちゅっ<emoji=heart04>」"
translation = "「음츄웃…… 츕포<emoji=heart04> 츕포<emoji=heart04> 기분 좋은가요? 츄푸푸웃…… 레로츄웃<emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ちゅっぱ<emoji=heart04>\u3000上手くて当たり前ですわ<emoji=heart04>\u3000ちゅっぽ……ちゅっぽ<emoji=heart04>\u3000この私が、して差し上げてるんですから……ちゅるるっ<emoji=heart04>\u3000ちゅっぽ……ちゅぷぷっ<emoji=heart04>」"
translation = "「츕파<emoji=heart04> 잘하는 게 당연하답니다<emoji=heart04> 츕포…… 츕포<emoji=heart04> 이 몸이 해드리고 있으니까요…… 츄루루웃<emoji=heart04> 츕포…… 츄푸푸웃<emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "（んっ……<emoji=heart04>\u3000それにしても、会長のおち○ぽ、すごいですわ……<emoji=heart04>\u3000ふうぅ……<emoji=heart04>）"
translation = "(응……<emoji=heart04> 그나저나 회장님의 자지, 대단하네요……<emoji=heart04> 후우우……<emoji=heart04>)"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "（フェラで更に大きくなって、私の口の中いっぱいに……<emoji=heart04>\u3000はあぁ……<emoji=heart04>\u3000なんてたくましさなんですの……<emoji=heart04>）"
translation = "(펠라로 더욱 커져서 제 입안 가득히……<emoji=heart04> 하아아……<emoji=heart04> 어쩜 이렇게 늠름한 건가요……<emoji=heart04>)"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "（はふぅ<emoji=heart04>\u3000熱くて固くて、ドクンドクンと脈打って、まるで筋肉みたいですわ……<emoji=heart04>\u3000これが……いつも私のあそこに入って……<emoji=heart04>）"
translation = "(하후우<emoji=heart04> 뜨겁고 딱딱해서 두근두근 맥동하는 게 마치 근육 같답니다……<emoji=heart04> 이것이…… 항상 제 거거에 들어와서……<emoji=heart04>)"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ちゅっぷ<emoji=heart04>\u3000ちゅっぷ<emoji=heart04>\u3000んっ……<emoji=heart04>\u3000ちゅっぽ<emoji=heart04>\u3000ちゅっぽ<emoji=heart04>\u3000はぁ……んんっ……<emoji=heart04>」"
translation = "「츄푸<emoji=heart04> 츄푸<emoji=heart04> 응……<emoji=heart04> 츕포<emoji=heart04> 츕포<emoji=heart04> 하아…… 응응……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「あっ<emoji=heart04>\u3000んんっ……<emoji=heart04>\u3000ちゅっぽ<emoji=heart04>\u3000ちゅっぽ<emoji=heart04>\u3000あんっ……<emoji=heart04>\u3000れろちゅっ……ちゅぱっ<emoji=heart04>\u3000はあぁ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 응응……<emoji=heart04> 츕포<emoji=heart04> 츕포<emoji=heart04> 앙……<emoji=heart04> 레로츄웃…… 츄팟<emoji=heart04> 하아아……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「――先輩、もしかして今、オナニーしてます？」"
translation = "「──선배, 혹시 지금 자위하고 있어요?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「んんっ！？\u3000ぷはっ……！\u3000お、オナニーは仕方ないでしょう！？」"
translation = "「응응!? 푸핫……! 자, 자위는 어쩔 수 없잖아요!?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「れろちゅっ<emoji=heart04>\u3000実際にエッチなことを、しているのですから……ちゅっぽ<emoji=heart04>\u3000ちゅっぽ<emoji=heart04>\u3000そういう気分になってしまうのは、当然ですわ……！」"
translation = "「레로츄웃<emoji=heart04> 실제로 야한 짓을 하고 있으니까…… 츕포<emoji=heart04> 츕포<emoji=heart04> 그런 기분이 되어버리는 건 당연하답니다……!」"

[[dialogue]]
speaker = "クロト"
original = "「そんなことしなくても、素直にどうしてほしいか言ってくれたら、おま○こに挿れてあげますよ？」"
translation = "「그렇게 안 해도 솔직하게 어떻게 해줬으면 좋겠는지 말하면 보지에 넣어줄게요?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「じ、自分でできますから不要ですわ！\u3000ちゅっぷ<emoji=heart04>\u3000ちゅっぷ<emoji=heart04>\u3000あなたこそ、こんなに大きくガチガチにしているのですから……れろちゅっ<emoji=heart04>\u3000ちゅるるるっ<emoji=heart04>」"
translation = "「스, 스스로 할 수 있으니까 필요 없답니다! 츄푸<emoji=heart04> 츄푸<emoji=heart04> 당신이야말로 이렇게 크게 빳빳하게 세우고 있으니까…… 레로츄웃<emoji=heart04> 츄루루루웃<emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「んはぁっ……<emoji=heart04>\u3000素直にしたいと言えば……ちゅっぽ<emoji=heart04>\u3000ちゅっぽ<emoji=heart04>\u3000れるれるっ、ちゅぱっ……<emoji=heart04>\u3000おま○こで、させてあげますわよ？<emoji=heart04>」"
translation = "「음하아앗……<emoji=heart04> 솔직하게 하고 싶다고 말하면…… 츕포<emoji=heart04> 츕포<emoji=heart04> 레로레로옷, 츄팟……<emoji=heart04> 보지로 하게 해드릴게요?<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「じゃあ、このまま続けても大丈夫ですよね？\u3000少し動きますよ」"
translation = "「그럼 이대로 계속해도 괜찮죠? 조금 움직일게요」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「なっ……まだ続ける気ですの？\u3000んっ……<emoji=heart04>\u3000それに動くって……んんっ！？」"
translation = "「나앗…… 아직 계속할 생각인가요? 응……<emoji=heart04> 게다가 움직인다니…… 응응!?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「んぶっ<emoji=heart04>\u3000じゅっぽ<emoji=heart04>\u3000じゅっぽ<emoji=heart04>\u3000じゅぱっ、じゅぷぷっ<emoji=heart04>\u3000じゅっぷ<emoji=heart04>\u3000じゅっぷ<emoji=heart04>\u3000じゅぷぷっ<emoji=heart04>」"
translation = "「음붓<emoji=heart04> 쥬포옷<emoji=heart04> 쥬포옷<emoji=heart04> 쥬팟, 쥬푸푸웃<emoji=heart04> 쥬푸<emoji=heart04> 쥬푸<emoji=heart04> 쥬푸푸웃<emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "（んんっ<emoji=heart04>\u3000会長の太くてたくましいおち○ぽが、口の奥まで行ったり来たり<emoji=heart04>\u3000オスとしての強さを、これでもかと見せつけられてしまいますのっ……<emoji=heart04>）"
translation = "(응응<emoji=heart04> 회장님의 굵고 늠름한 자지가 목구멍 깊숙이 왔다 갔다<emoji=heart04> 수컷으로서의 강함을 아주 뼈저리게 보여주네요……<emoji=heart04>)"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "（はあぁっ……<emoji=heart04>\u3000メスとして思わず、おま○こから愛液が溢れてきてしまいますわ<emoji=heart04>\u3000でも――）"
translation = "(하아아앗……<emoji=heart04> 암컷으로서 나도 모르게 보지에서 애액이 넘쳐나버린답니다<emoji=heart04> 하지만──)"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "（だからこそ、早く挿れてほしい……っ<emoji=heart04>\u3000おま○こが切なくなってしまいますの……！）"
translation = "(그렇기에 빨리 넣어줬으면 좋겠어……읏<emoji=heart04> 보지가 애달파져 버린답니다……!)"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "（ああ、どうして……どうしてまだ挿れてくれないんですの……？\u3000涙が出てきてしまいますわ……）"
translation = "(아아, 어째서…… 어째서 아직 넣어주지 않는 건가요……? 눈물이 나와버린답니다……)"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「うぅ……ちゅっぱ……ちゅっぽ……<emoji=heart04>\u3000えうぅ……ちゅっぷ……ちゅっぽ……<emoji=heart04>」"
translation = "「우으…… 츕파…… 츕포……<emoji=heart04> 에우우…… 츄푸…… 츕포……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「――ねぇ、<b>ヒルディー</b>」"
translation = "「──저기, <b>힐디</b>」"

[[dialogue]]
speaker = "unk"
original = "俺は先輩呼びを止めて、２人きりの時だけに使う、恋人としての口調で話しかける。"
translation = "나는 선배라는 호칭을 그만두고, 둘만 있을 때만 사용하는 연인으로서의 말투로 말을 건다."

[[dialogue]]
speaker = "クロト"
original = "「意地悪してごめんね、ヒルディー。――素直に言って？\u3000本当は、どうしてほしい？」"
translation = "「심술 부려서 미안해, 힐디. ──솔직하게 말해줄래? 사실은 어떻게 해줬으면 좋겠어?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ああっ<emoji=heart04>\u3000あぁぁぁぁ……っ<emoji=heart04>\u3000おま○こ……<emoji=heart04>\u3000おま○こしてほしいですわっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아앗<emoji=heart04> 아아아아아……읏<emoji=heart04> 보지……<emoji=heart04> 보지 하고 싶답니다아앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「あなた様のおち○ぽで、私のおま○こを掻き回してほしくて、たまらないんですの……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「당신님의 자지로 제 보지를 휘저어 주셨으면 해서 견딜 수가 없답니다……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "あまり自覚がないようだが、ヒルディ―はマゾだ。だからこうして、エッチの時は少し意地悪をすると、とても興奮して悦んでくれる。"
translation = "별로 자각은 없는 듯하지만, 힐디는 마조다. 그래서 이렇게 섹스할 때는 조금 심술을 부리면 아주 흥분하며 기뻐해 준다."

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「あ……<emoji=heart04>\u3000頭優しく撫でられるの、嬉しいですわ……<emoji=heart04>\u3000はふぅぅん<emoji=heart04>\u3000大しゅきぃ……<emoji=heart04>」"
translation = "「아……<emoji=heart04> 머리 상냥하게 쓰다듬어 주시는 거 기쁘답니다……<emoji=heart04> 하후우우웅<emoji=heart04> 너어무 좋아해요……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「じゃあ、おま○こに挿れる前に、１つだけお願い聞いてくれる？\u3000髪コキとフェラでイかせてほしい。……できる？」"
translation = "「그럼 보지에 넣기 전에 부탁 하나만 들어줄래? 머리카락 딸이랑 펠라로 가게 해줬으면 좋겠어. ……할 수 있지?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「が、我慢しなきゃ、ダメですの……？」"
translation = "「차, 참아야만 하는 건가요……?」"

[[dialogue]]
speaker = "クロト"
original = "「我慢すればその分、気持ちよくなれるよ。それに――」"
translation = "「참는 만큼 더 기분 좋아질 거야. 그리고──」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「──その後は、私の好きなだけ、おま○こしてもらえるんですの？<emoji=heart04>\u3000……はぁぁぁぁん<emoji=heart04>\u3000明日は休日だから、お泊りで朝までセックス？<emoji=heart04>」"
translation = "「──그 뒤에는 제가 원하는 만큼 보지 해주시는 건가요?<emoji=heart04> ……하아아아아앙<emoji=heart04> 내일은 휴일이니까 자고 가면서 아침까지 섹스?<emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「はぁぁぁぁ……<emoji=heart04>\u3000が、頑張りますわ<emoji=heart04>\u3000あぁぁん<emoji=heart04>\u3000今度はちゃんとご奉仕致しますから、いっぱい気持ちよくなって下さいまし……あなた様<emoji=heart04>」"
translation = "「하아아아아……<emoji=heart04> 가, 열심히 하겠어요<emoji=heart04> 아아아앙<emoji=heart04> 이번엔 제대로 봉사해 드릴 테니까 잔뜩 기분 좋아져 주세요…… 당신님<emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「それじゃあ、いきますわね……。あなた様も、お望みのまま、腰を振って気持ちよくなって下さい……んっ<emoji=heart04>\u3000あむっ――<emoji=heart04>」"
translation = "「그럼 갑니다아…… 당신님도 원하시는 대로 허리를 흔들며 기분 좋아져 주세요…… 응<emoji=heart04> 아암──<emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「んぶっ<emoji=heart04>\u3000ぢゅるるるっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ぢゅっぽ、ぢゅっぽ、ぢゅっぽ<emoji=heart04>」"
translation = "「음붓<emoji=heart04> 쥬루루루웃<emoji=heart04><emoji=heart04><emoji=heart04> 쥬포, 쥬포, 쥬포<emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ぢゅっぷ、ぢゅっぷ、ぢゅっぷ<emoji=heart04>\u3000……ぢゅるるっ<emoji=heart04>\u3000ぢゅっぱ、ぢゅっぱ、ぢゅっぱ<emoji=heart04>\u3000……んぢゅるるっ<emoji=heart04>\u3000ぢゅるるっ<emoji=heart04>\u3000んぶぅっ<emoji=heart04>」"
translation = "「쥬푸, 쥬푸, 쥬푸<emoji=heart04> ……쥬루루웃<emoji=heart04> 쥬파, 쥬파, 쥬파<emoji=heart04> ……음쥬루루웃<emoji=heart04> 쥬루루웃<emoji=heart04> 음부웃<emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「はぁ……<emoji=heart04>\u3000私も、あなた様のおち○ぽがすごくて<emoji=heart04>\u3000ぢゅるるっ<emoji=heart04>\u3000ぢゅっぷ、ぢゅっぷ、じゅっぷ<emoji=heart04>\u3000れるれるっ<emoji=heart04>」"
translation = "「하아……<emoji=heart04> 저도 당신님의 자지가 대단해서<emoji=heart04> 쥬루루웃<emoji=heart04> 쥬푸, 쥬푸, 쥬푸<emoji=heart04> 레로레로옷<emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「んぶっ<emoji=heart04>\u3000おま○こぐぢゅぐぢゅになって、しまってますの<emoji=heart04>\u3000ぢゅるるるっ<emoji=heart04>\u3000ぢゅっぽ、ぢゅっぽ、ぢゅっぽ<emoji=heart04>\u3000んじゅずずっ<emoji=heart04>」"
translation = "「음붓<emoji=heart04> 보지가 질척질척해져 버렸답니다<emoji=heart04> 쥬루루루웃<emoji=heart04> 쥬포, 쥬포, 쥬포<emoji=heart04> 응쥬즈즈웃<emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「あはぁぁ<emoji=heart04>\u3000早くほしいですわっ<emoji=heart04>\u3000れろちゅっ<emoji=heart04>\u3000ぢゅっぱ、ぢゅっぱ、ぢゅっぱ<emoji=heart04>\u3000ぢゅるるるっ<emoji=heart04>」"
translation = "「아하아아<emoji=heart04> 빨리 갖고 싶답니다앗<emoji=heart04> 레로츄웃<emoji=heart04> 쥬파, 쥬파, 쥬파<emoji=heart04> 쥬루루루웃<emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「はあぁっ<emoji=heart04>\u3000おち○ぽ<emoji=heart04>\u3000ぢゅっぽ、ぢゅっぽ、ぢゅっぽ<emoji=heart04>\u3000おち○ぽぉ<emoji=heart04>\u3000ぢゅっぷ、ぢゅっぷ、ぢゅっぷ<emoji=heart04>\u3000ぢゅるるるっ<emoji=heart04>」"
translation = "「하아아앗<emoji=heart04> 자지잇<emoji=heart04> 쥬포, 쥬포, 쥬포<emoji=heart04> 자지이이<emoji=heart04> 쥬푸, 쥬푸, 쥬푸<emoji=heart04> 쥬루루루웃<emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「んあぁっ<emoji=heart04>\u3000ぢゅっぽ、ぢゅっぽ、ぢゅっぽ<emoji=heart04>\u3000……オナニー激しく、なっちゃいますの<emoji=heart04>\u3000はぷちゅっ<emoji=heart04>」"
translation = "「음아아앗<emoji=heart04> 쥬포, 쥬포, 쥬포<emoji=heart04> ……자위가 격렬해져 버린답니다<emoji=heart04> 하푸츄웃<emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ぢゅるるっ<emoji=heart04>\u3000じゅずず……指、止まらないですわ<emoji=heart04>\u3000んぶっ<emoji=heart04>\u3000ぢゅっぽ、れるれるっ<emoji=heart04>\u3000ぢゅるるるっ<emoji=heart04>\u3000ぢゅっぷ、ぢゅっぷ、ぢゅっぷ<emoji=heart04>」"
translation = "「쥬루루웃<emoji=heart04> 쥬즈즈…… 손가락이 멈추지 않는답니다<emoji=heart04> 음붓<emoji=heart04> 쥬포, 레로레로옷<emoji=heart04> 쥬루루루웃<emoji=heart04> 쥬푸, 쥬푸, 쥬푸<emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ちゅぺろっ、ぢゅっぱ、ぢゅっぱ<emoji=heart04>\u3000私もう、イキそうですの<emoji=heart04>\u3000ぢゅっぽ、ぢゅっぽ<emoji=heart04>\u3000ぢゅるるるっ<emoji=heart04>」"
translation = "「츄페로옷, 쥬파, 쥬파<emoji=heart04> 저 이제 가버릴 것 같답니다<emoji=heart04> 쥬포, 쥬포<emoji=heart04> 쥬루루루웃<emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「おま○こ切ないのに、きてしまいますのぉ<emoji=heart04>\u3000ぢゅっぽ、ぢゅっぽ、ぢゅっぽ<emoji=heart04>\u3000自分の指で、はしたなくイっちゃいますわぁ<emoji=heart04>\u3000んああぁっ<emoji=heart04>」"
translation = "「보지가 애달픈데 와버린답니다아아<emoji=heart04> 쥬포, 쥬포, 쥬포<emoji=heart04> 제 손가락으로 천박하게 가버려요오오<emoji=heart04> 응아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「んっ……はああぁっ<emoji=heart04>\u3000ぢゅっぱ、ぢゅっぱ、ぢゅっぱ<emoji=heart04>\u3000……あなた様も限界が、近いですのね？」"
translation = "「응…… 하아아아앗<emoji=heart04> 쥬파, 쥬파, 쥬파<emoji=heart04> ……당신님도 한계가 가깝네요?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「んぶぶっ<emoji=heart04>\u3000ぢゅっぱ、ぢゅっぱ、ぢゅっぱ<emoji=heart04>\u3000おち○ぽ、びくびくいってますの<emoji=heart04>\u3000……んはぁっ<emoji=heart04>」"
translation = "「음부부웃<emoji=heart04> 쥬파, 쥬파, 쥬파<emoji=heart04> 자지가 움찔움찔거리고 있답니다……<emoji=heart04> 음하아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「はぁぁぁっ<emoji=heart04>\u3000一気に、いきますわよっ<emoji=heart04>\u3000……ぢゅっぽぢゅっぽぢゅっぽぢゅっぽ<emoji=heart04>\u3000はぁぁぁ……っ<emoji=heart04>」"
translation = "「하아아아앗<emoji=heart04> 단숨에 갑니다아앗<emoji=heart04> ……쥬포쥬포쥬포쥬포<emoji=heart04> 하아아아……읏<emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ぢゅっぽぢゅっぽぢゅっぽぢゅっぽぢゅっぽぢゅっぽぢゅっぽっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000じゅずずずずずずずっ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「쥬포쥬포쥬포쥬포쥬포쥬포쥬포옷<emoji=heart04><emoji=heart04><emoji=heart04> 쥬즈즈즈즈즈즈즈즈읏~~~~~~~~~~~~~~~~읏<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「じゅぷぷっ<emoji=heart04>\u3000んんんんっ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000はぁぁっ、イっクぅぅぅ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「쥬푸푸웃<emoji=heart04> 응응응응읏~~~~~~~~~~~~~~~~~읏<emoji=heart04><emoji=heart04><emoji=heart04> 하아아앗, 가버려어어어~~~~~~~~~~~~~~~~~읏<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「は、ああぁっ<emoji=heart04>\u3000あぁぁ……<emoji=heart04>\u3000精液、どぴゅどぴゅって出てますのぉ<emoji=heart04>\u3000すごい量ですわ……<emoji=heart04>」"
translation = "「하, 아아아앗<emoji=heart04> 아아아……<emoji=heart04> 정액, 푸슉푸슉하고 나오고 있답니다아<emoji=heart04> 엄청난 양이에요……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「んはあぁ……<emoji=heart04>\u3000私の髪に沢山かかって<emoji=heart04>\u3000ふうぅ……<emoji=heart04>\u3000シャワーで洗っても、あなた様の濃い匂いが染みついてしまいそう……<emoji=heart04>」"
translation = "「음하아아……<emoji=heart04> 제 머리카락에 잔뜩 묻어서<emoji=heart04> 후우우……<emoji=heart04> 샤워로 씻어도 당신님의 진한 냄새가 배어버릴 것 같아요……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「んっ……ようやく、射精止まりましたわ……<emoji=heart04>\u3000はあぁ……<emoji=heart04>」"
translation = "「응…… 겨우 사정이 멈췄네요……<emoji=heart04> 하아아……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ああ……でも、ごめんなさい、あなた様……。本当は精液、全部飲むつもりでしたのに……」"
translation = "「아아…… 하지만 죄송해요, 당신님……. 사실 정액, 전부 마실 생각이었는데……」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「射精の勢いに驚いて、口を離してしまいましたわ……あなた様が私で気持ちよくなって下さった、証ですのに……」"
translation = "「사정하는 기세에 놀라서 입을 떼버렸답니다…… 당신님이 저로 인해 기분 좋아져 주셨다는 증거인데……」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「もったいないですわ……んんっ、ちゅぺろっ……<emoji=heart04>」"
translation = "「아깝답니다…… 응응, 츄페로옷……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「はあぁ……<emoji=heart04>\u3000濃厚で卑猥な味……<emoji=heart04>\u3000あなた様の強い雄フェロモンで、くらくらしてしまいますの……<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 농후하고 비열한 맛……<emoji=heart04> 당신님의 강한 수컷 페로몬에 어질어질해져 버린답니다……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ん……<emoji=heart04>\u3000頭を撫でて、褒めて下さるんですの？」"
translation = "「음……<emoji=heart04> 머리를 쓰다듬으며 칭찬해 주시는 건가요?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「気持ちよかった？\u3000それなら、頑張った甲斐がありましたわ……♪」"
translation = "「기분 좋았다고요? 그렇다면 노력한 보람이 있네요……♪」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「そ、それで、あなた様……？\u3000その……私、自分の指でするだけでは足りなくて……おま○こが今もうずいてしまっていて……」"
translation = "「저, 그래서 당신님……? 그…… 저, 제 손가락으로 하는 것만으로는 부족해서…… 보지가 지금도 쑤시고 있어서……」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「あなた様の言いつけ通り、髪コキとフェラでご奉仕しましたから……もし、まだできそうなら……」"
translation = "「당신님이 시키신 대로 머리카락 딸이랑 펠라로 봉사했으니까…… 혹시 아직 더 할 수 있다면……」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「あっ……<emoji=heart04>\u3000す、すごい……あなた様のおち○ぽ、射精したばかりなのに、もう大きく復活して……<emoji=heart04>」"
translation = "「앗……<emoji=heart04> 대, 대단해…… 당신님의 자지, 방금 사정했는데 벌써 크게 부활해서……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はヒルディーの足をぐいっと開かせると、約束通り彼女が満足するまで、お礼をしてあげるのだった――"
translation = "나는 힐디의 다리를 홱 벌리게 한 뒤, 약속대로 그녀가 만족할 때까지 보답을 해주었다──"

