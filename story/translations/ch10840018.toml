[[dialogue]]
speaker = "unk"
original = "俺とオオヒメは恋人として付き合うようになり、初めてのエッチもした。"
translation = "나와 오오히메는 연인으로서 사귀게 되었고, 첫 섹스도 했다."

[[dialogue]]
speaker = "unk"
original = "そんな俺たちは──"
translation = "그런 우리들은──"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「むむむ……」"
translation = "「으으으……」"

[[dialogue]]
speaker = "unk"
original = "２人でアダルトビデオを鑑賞していた。"
translation = "둘이서 성인 비디오를 감상하고 있었다."

[[dialogue]]
speaker = "unk"
original = "捜査官が悪の組織に捕まって、快楽堕ちさせられるという内容だが、ヒメは険しい顔で画面を見つめている。"
translation = "수사관이 악의 조직에 붙잡혀 쾌락에 타락한다는 내용이지만, 히메는 험악한 표정으로 화면을 응시하고 있다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ヒメはこういうのは嫌いだった……？」"
translation = "「히메는 이런 거 싫어했어……?」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「内容はあくまでフィクションだし、女性を征服したいという欲求を持つのも理解できる。それに退廃もまた芸術。汚れることによって輝くものもあるだろう」"
translation = "「내용은 어디까지나 픽션이고, 여성을 정복하고 싶다는 욕구를 갖는 것도 이해할 수 있다. 게다가 퇴폐 또한 예술. 더러워짐으로써 빛나는 것도 있겠지」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「だが正直に感想を言わせてもらえば……演技が甘い！\u3000男優の動きにぎこちなさを感じるし、女性の喘ぎも作り物めいている」"
translation = "「하지만 솔직하게 감상을 말하자면…… 연기가 어설퍼! 남배우의 움직임에서 어색함이 느껴지고, 여성의 신음도 가짜 같구나」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あ……そっちなんだ……」"
translation = "「아…… 그쪽이었구나……」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「こんな生半可な責めでは、女をメスに堕とすことなどできまい。女も心の底から堕ちているように見えない」"
translation = "「이런 어설픈 고문으로는 여자를 암컷으로 타락시킬 수 없을 터. 여자도 마음 깊은 곳에서부터 타락한 것처럼 보이지 않는다오」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「かくなる上は……よし、私たちで調教<b>あだるとびでお</b>を撮ろう！」"
translation = "「이렇게 된 이상…… 좋아, 우리끼리 조교 성인 비디오를 찍자꾸나!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ええ～～～っ！！？」"
translation = "「에에에~~~엣!!?」"

[[dialogue]]
speaker = "unk"
original = "そして俺たちはラブホテルの一室で──"
translation = "그리고 우리들은 러브호텔의 방 안에서──"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「何をされようと、私は屈しはしない……！」"
translation = "「무슨 짓을 당하든, 나는 굴복하지 않겠다……!」"

[[dialogue]]
speaker = "unk"
original = "腕を後ろ手に拘束され、身動きできない状態で上に跨らされるヒメ。"
translation = "팔을 뒤로 묶인 채, 꼼짝도 못 하는 상태로 위에서 올라타게 된 히메."

[[dialogue]]
speaker = "unk"
original = "痛々しく縄で縛られ、白い肌と大きな胸が強調される。"
translation = "애처롭게 밧줄로 묶여, 하얀 피부와 커다란 가슴이 강조된다."

[[dialogue]]
speaker = "unk"
original = "そしてペットのように首輪を付けられ、そのリードを俺が握っていた。"
translation = "그리고 애완동물처럼 목줄이 채워졌고, 그 리드를 내가 쥐고 있었다."

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「守護天使を我が物にしようなど、とんだ不届き者がいたものだな。身の程を知れ……！」"
translation = "「수호천사를 제 것으로 삼으려 하다니, 정말이지 발칙한 자로구나. 분수를 알거라……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「縛られながらにらまれても、怖くもなんともないね。守護天使様なら、人間ごときに捕まった間抜けさを恥じるべきじゃないか？」"
translation = "「묶인 채로 노려봐봤자, 무섭지도 뭐도 아니네. 수호천사님이라면, 인간 따위에게 잡힌 멍청함을 부끄러워해야 하는 거 아냐?」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「ッ……貴様……！」"
translation = "「윽…… 네놈……!」"

[[dialogue]]
speaker = "unk"
original = "俺は守護天使オオヒメを捕らえ、メスに調教する悪人役。脚本の担当はヒメだ。"
translation = "나는 수호천사 오오히메를 붙잡아, 암컷으로 조교하는 악당 역할. 각본 담당은 히메다."

[[dialogue]]
speaker = "unk"
original = "今この瞬間もビデオカメラを回していて、ヒメの痴態が記録に残ると思うと興奮して仕方ない。"
translation = "지금 이 순간도 비디오 카메라를 돌리고 있어서, 히메의 치태가 기록에 남는다고 생각하니 흥분이 가라앉질 않는다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「反抗的な目だな。身の程を知らないのはお前の方じゃないか？」"
translation = "「반항적인 눈이네. 분수를 모르는 건 네 쪽 아니야?」"

[[dialogue]]
speaker = "unk"
original = "今のヒメは虜囚の身。立場を教えるために強くリードを引く。"
translation = "지금의 히메는 포로의 몸. 입장을 가르쳐주기 위해 강하게 리드를 당긴다."

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「ぐっ……」"
translation = "「윽……」"

[[dialogue]]
speaker = "unk"
original = "悔しそうに俺をにらむ視線にゾクゾクする。"
translation = "분하다는 듯 나를 노려보는 시선에 전율이 인다."

[[dialogue]]
speaker = "unk"
original = "最初はヒメの提案に驚いたが、今は俺もこのシチュエーションを楽しんでいた。"
translation = "처음에는 히메의 제안에 놀랐지만, 지금은 나도 이 시츄에이션을 즐기고 있었다."

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「屈辱を与えればおとなしくなると思ったか？\u3000生憎、守護天使たる私をその程度で躾けることは──」"
translation = "「굴욕을 주면 고분고분해질 거라 생각했느냐? 안타깝게도, 수호천사인 나를 그 정도로 길들이는 것은──」"

[[dialogue]]
speaker = "unk"
original = "ヒメの言葉を無視し、女性器にペニスを擦りつける。"
translation = "히메의 말을 무시하고, 성기에 자지를 비빈다."

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「ひんっ……<emoji=heart04>」"
translation = "「히잉……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「強がる割に濡れてるぞ。まぁ、あれだけち○ぽをぶち込まれれば、女の悦びを覚えるのも無理ないか」"
translation = "「강한 척하는 것치고는 젖어있는데. 뭐, 저렇게 자지를 처박히면 여자의 기쁨을 배우는 것도 무리는 아닌가」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「ち、違うっ！\u3000貴様に犯されたところで感じることなど──」"
translation = "「트, 틀리다! 네놈에게 범해진다고 느낄 리가──」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「んおおぉぉっ……<emoji=heart04>」"
translation = "「응오오오오옷……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスが一気に奥まで突き刺さり、ヒメが悲鳴とも快感ともつかない呻きを上げた。"
translation = "자지가 단숨에 깊숙한 곳까지 찔러 박히자, 히메가 비명인지 쾌감인지 모를 신음을 내질렀다."

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「くっ……貴様の、ち○ぽが、私の中に……っ」"
translation = "「큭…… 네놈의, 자지가, 내 안에……윽」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「随分と簡単に咥え込んだな。ま○こグチョグチョに濡らしてるし、お前、メスの才能あるよ」"
translation = "「상당히 간단하게 물었네. 보지 질척질척하게 적셔놓고서는, 너, 암컷의 재능 있어」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「き、貴様……！\u3000八つ裂きにしてやる……！」"
translation = "「네, 네놈……! 갈가리 찢어주마……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「口の減らない天使様だな。お前がただのメスだってことを教えてやる」"
translation = "「입만 살아있는 천사님이군. 네가 그저 암컷이라는 걸 가르쳐주지」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「んおおぉぉぉぉっ<emoji=heart04>\u3000んぉっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000おおぉっ<emoji=heart04>」"
translation = "「응오오오오오옷<emoji=heart04> 응윽<emoji=heart04> 읏<emoji=heart04> 읏<emoji=heart04> 오오옷<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ズン、ズン、と力強く突き上げる度、ヒメが喘ぎを漏らす。"
translation = "푹, 푹, 하고 힘차게 밀어 올릴 때마다 히메가 교성을 흘린다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「どうだ？\u3000人間様のち○ぽは効くか？」"
translation = "「어때? 인간님의 자지는 잘 드나?」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「うる、さい……！\u3000ぅっ……ぉっ……私は、感じてなど、いない……んぉっ<emoji=heart04>\u3000おおぉっ<emoji=heart04>」"
translation = "「시끄러, 워……! 윽…… 오…… 나는, 느끼고 있지, 않다…… 응윽<emoji=heart04> 오오옷<emoji=heart04>」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「くぅっ……貴様こそ、諦めて私を解放するのだな……んんっ<emoji=heart04>\u3000はぁ……ああぁんっ<emoji=heart04>」"
translation = "「쿠윽…… 네놈이야말로, 포기하고 나를 풀어주어라…… 응읏<emoji=heart04> 하아…… 아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "しかし顔はだらしなく緩み、中は愛液でずぶ濡れで、どの口が言うのかという感じっぷりだ。"
translation = "하지만 얼굴은 보기 흉하게 풀려있고, 안은 애액으로 흠뻑 젖어서, 어느 입이 말하는 건지 알 수 없을 정도로 느끼고 있다."

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「はぁあっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000濡れるのは、生理現象に、過ぎん……んふっ……ふぁっ……はあぁっ<emoji=heart04>」"
translation = "「하아앗<emoji=heart04> 앙<emoji=heart04> 젖는 것은, 생리 현상에, 불과하다…… 응훗…… 하앗…… 하아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「くぁっ……あっ……ああぁっ<emoji=heart04>\u3000貴様のち○ぽを入れられたところで、こんなもの、苦しいだけ、だ……」"
translation = "「크앗…… 앗…… 아아앗<emoji=heart04> 네놈의 자지를 넣었다고 해서, 이런 것, 괴로울 뿐, 이다……」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「ぐっ……大きなち○ぽで、中からゴリゴリされて……んんっ……ぁっ……ん～っ……<emoji=heart04>」"
translation = "「윽…… 커다란 자지로, 안을 고리고리 당해서…… 응읏…… 앗…… 응~으읏……<emoji=heart04>」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「うぁっ……あっ……ああっ……<emoji=heart04>\u3000くぅっ……貴様のものなど、穢らわしい……っ……あああっ……<emoji=heart04>」"
translation = "「우앗…… 앗…… 아앗……<emoji=heart04> 쿠윽…… 네놈의 것 따위, 더러워……윽…… 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "身動きできないヒメに構わず腰を動かし、熱く柔らかな膣肉の中でペニスを摩擦させる。"
translation = "움직일 수 없는 히메를 아랑곳하지 않고 허리를 움직여, 뜨겁고 부드러운 질 안에서 자지를 마찰시킨다."

[[dialogue]]
speaker = "unk"
original = "ヒメの体を、男の欲望を満たす穴として使う征服感がたまらない。"
translation = "히메의 몸을, 남자의 욕망을 채우는 구멍으로 사용하는 정복감이 견딜 수 없다."

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「んんっ……！？\u3000貴様のものが、私の中で、ビクビクと跳ねて……くっ、私の体で、感じているのか……？」"
translation = "「응읏……!? 네놈의 것이, 내 안에서, 움찔움찔 뛰며…… 큭, 내 몸으로, 느끼고 있는 것이냐……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ、穴としては上々だよ、お前は」"
translation = "「아아, 구멍으로서는 최상이야, 너는」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「～～～～ッ！\u3000貴様ぁ……！」"
translation = "「~~~~~~~~윽! 네놈……!」"

[[dialogue]]
speaker = "unk"
original = "道具として扱われ、怒りと羞恥に震えるヒメ。"
translation = "도구로서 다뤄지며, 분노와 수치에 떠는 히메."

[[dialogue]]
speaker = "unk"
original = "しかし奥まで突き上げられると──"
translation = "하지만 끝까지 밀어 올려지자──"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「ひぃいんっ<emoji=heart04>」"
translation = "「히이잉<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "亀頭が子宮に届いた瞬間、甲高い声を上げて鳴く。"
translation = "귀두가 자궁에 닿은 순간, 날카로운 소리를 내며 울부짖는다."

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「あひっ<emoji=heart04>\u3000ひぃっ<emoji=heart04>\u3000ひっ<emoji=heart04>\u3000ひぃんっ<emoji=heart04>\u3000奥に、コツコツ、当たってぇ……<emoji=heart04>\u3000あぁっ……深いぃ……んぁっ……ひぁああっ<emoji=heart04>」"
translation = "「아힛<emoji=heart04> 히잇<emoji=heart04> 힛<emoji=heart04> 히잉<emoji=heart04> 깊은 곳에, 툭툭, 닿아서……<emoji=heart04> 아앗…… 깊어…… 응앗…… 히아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「ふぁああっ<emoji=heart04>\u3000あっ、あんっ<emoji=heart04>\u3000奥、ばっかり、やめっ──んんんっ<emoji=heart04>\u3000んぁっ<emoji=heart04>\u3000ああぁあっ<emoji=heart04>」"
translation = "「하아아앗<emoji=heart04> 앗, 앙<emoji=heart04> 깊은 곳, 만, 그만──응응읏<emoji=heart04> 응앗<emoji=heart04> 아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「貴様、やめ──くぅぅっ<emoji=heart04>\u3000ふはぁ、はぁ……あんっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000貴様、許さないからな……！」"
translation = "「네놈, 그만──쿠우웃<emoji=heart04> 후하아, 하아…… 앙<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 네놈, 용서하지 않을 거다……!」"

[[dialogue]]
speaker = "unk"
original = "快楽に呑まれそうになりながらも、歯を食いしばり、怒りを宿した目で俺をにらむヒメ。"
translation = "쾌락에 잡아먹힐 것 같으면서도, 이를 악물고 분노를 품은 눈으로 나를 노려보는 히메."

[[dialogue]]
speaker = "unk"
original = "これはこれで気持ちいいが、躾けは必要だ。豊満な胸を思い切り平手でひっぱたく。"
translation = "이것 또한 기분 좋지만, 길들이기는 필요하다. 풍만한 가슴을 한껏 손바닥으로 후려친다."

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「きひぃっ！？」"
translation = "「키히잇!?」"

[[dialogue]]
speaker = "unk"
original = "パン、と肌を叩く音が鳴った瞬間、絹を裂くような悲鳴が上がった。"
translation = "찰싹, 하고 피부를 때리는 소리가 난 순간, 비단 찢는 듯한 비명이 터져 나왔다."

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「な、な、何を……？」"
translation = "「무, 무, 무슨……?」"

[[dialogue]]
speaker = "unk"
original = "何が起きたのか理解できず、ヒメの表情に浮かぶのは、怒りや屈辱ではなく困惑や混乱だった。"
translation = "무슨 일이 일어났는지 이해하지 못하고, 히메의 표정에 떠오른 것은 분노나 굴욕이 아닌 당혹과 혼란이었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「何って、メスブタを躾けてやってるんだ」"
translation = "「뭐긴, 암평아리를 길들이는 거지」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「メス、ブタ……？」"
translation = "「암, 평아리……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「縛られて犯されながら感じてるんだ、立派なメスブタだろ」"
translation = "「묶여서 범해지면서 느끼고 있잖아, 훌륭한 암평아리구만」"

[[dialogue]]
speaker = "unk"
original = "リードを引っ張りながら、もう一度乳を叩く。"
translation = "리드를 잡아당기며, 다시 한번 젖을 때린다."

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「くひぃぃぃぃっ！？」"
translation = "「쿠히이이이잇!?」"

[[dialogue]]
speaker = "unk"
original = "快楽など混じらない、痛みによる純粋な悲鳴。"
translation = "쾌락 따윈 섞이지 않은, 고통에 의한 순수한 비명."

[[dialogue]]
speaker = "unk"
original = "まるで烙印のように、白く大きな乳房に、赤い平手の跡が残る。"
translation = "마치 낙인처럼, 하얗고 커다란 유방에 붉은 손바닥 자국이 남는다."

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「ひぃっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ああぁんっ<emoji=heart04>\u3000わた、私は……ひぁっ、あっ──んんぁああっ<emoji=heart04>」"
translation = "「히잇<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 아아앙<emoji=heart04> 나, 나는…… 히앗, 앗──응응아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「私、は、メスブタじゃ……んぉおおおっ<emoji=heart04>\u3000お、ほ……んぉっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000おおぉっ<emoji=heart04>」"
translation = "「나, 는, 암평아리가 아…… 응오오오오옷<emoji=heart04> 오, 호…… 응윽<emoji=heart04> 읏<emoji=heart04> 읏<emoji=heart04> 오오옷<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "理不尽な暴力を受け、忘我したまま、一方的に突き上げられ続けるヒメ。"
translation = "불합리한 폭력을 당하며, 넋을 잃은 채 일방적으로 계속 찔러 올려지는 히메."

[[dialogue]]
speaker = "unk"
original = "セックスのことしか考えられないメスに堕とすために、さらに激しく突き込む。"
translation = "섹스밖에 생각할 수 없는 암컷으로 타락시키기 위해, 더욱 격렬하게 찔러 넣는다."

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「んおぉおおぉぉっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000おっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000や、やめっ──んんんっ<emoji=heart04>\u3000んぉっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000おおぉぉっ<emoji=heart04>」"
translation = "「응오오오오오옷<emoji=heart04><emoji=heart04><emoji=heart04> 읏<emoji=heart04> 읏<emoji=heart04> 그, 그만──응응읏<emoji=heart04> 응윽<emoji=heart04> 읏<emoji=heart04> 읏<emoji=heart04> 오오오옷<emoji=heart04>」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「んおおっ<emoji=heart04>\u3000お、ほっ<emoji=heart04>\u3000お<emoji=heart04>\u3000お<emoji=heart04>\u3000お<emoji=heart04>\u3000んぉっ、おっ<emoji=heart04>\u3000おおぉおっ<emoji=heart04><emoji=heart04>」"
translation = "「응오오옷<emoji=heart04> 오, 홋<emoji=heart04> 오<emoji=heart04> 오<emoji=heart04> 오<emoji=heart04> 응윽, 읏<emoji=heart04> 오오오오옷<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "膣内は火傷しそうに熱く、愛液は洪水のように溢れ、粘膜は密着してペニスを締め付けてくる。"
translation = "질 안은 델 듯이 뜨겁고, 애액은 홍수처럼 넘쳐흐르며, 점막은 밀착되어 자지를 조여온다."

[[dialogue]]
speaker = "unk"
original = "ペットを躾けるようにリードを引きながら、最大まで怒張したペニスで何度も突き上げる。"
translation = "애완동물을 길들이듯 리드를 당기며, 최대로 팽창한 자지로 몇 번이고 밀어 올린다."

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「んぉっ<emoji=heart04>\u3000おおおっ<emoji=heart04>\u3000ち○ぽ、大きいっ……んっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000貴様のち○ぽで、私の中、いっぱいにされてぇ<emoji=heart04>\u3000んおっ<emoji=heart04>\u3000おぉんっ<emoji=heart04>」"
translation = "「응윽<emoji=heart04> 오오오옷<emoji=heart04> 자지, 커…… 응읏<emoji=heart04> 읏<emoji=heart04> 네놈의 자지로, 내 안, 가득 채워져서어<emoji=heart04> 응옷<emoji=heart04> 오오옹<emoji=heart04>」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「ち○ぽが、深いところまで、突き刺さってるっ<emoji=heart04>\u3000んぉっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000ち○ぽ強い、強いぃっ<emoji=heart04>」"
translation = "「자지가, 깊은 곳까지, 찔러 박히고 있어어<emoji=heart04> 응윽<emoji=heart04> 읏<emoji=heart04> 자지 강해, 강해애<emoji=heart04>」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「んおおっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000おんっ<emoji=heart04>\u3000やめ、やめろぉっ<emoji=heart04>\u3000んんんっ<emoji=heart04>\u3000ち○ぽが、奥に届く度に、頭、真っ白にぃ……<emoji=heart04>」"
translation = "「응오오옷<emoji=heart04> 읏<emoji=heart04> 응앗<emoji=heart04> 그만, 그만둬어<emoji=heart04> 응응응읏<emoji=heart04> 자지가, 깊숙이 닿을 때마다, 머릿속, 하얘져어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「おっ<emoji=heart04>\u3000ぉんっ<emoji=heart04>\u3000おま○こズコズコされて、頭チカチカするっ<emoji=heart04>\u3000おかしくなるぅっ<emoji=heart04>」"
translation = "「읏<emoji=heart04> 오옹<emoji=heart04> 보지 퍽퍽 당해서, 머리가 반짝반짝해<emoji=heart04> 이상해져어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "下から突き上げられると、大きな胸が暴れるように揺れて男の本能を刺激する。"
translation = "아래에서 밀어 올리면, 커다란 가슴이 날뛰듯 흔들리며 남자의 본능을 자극한다."

[[dialogue]]
speaker = "unk"
original = "ヒメの凛々しかった顔は快楽に染まり、もうすっかり蕩けていた。"
translation = "히메의 늠름했던 얼굴은 쾌락에 물들어, 이제 완전히 녹아내려 있었다."

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「んおっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000おおぉんっ<emoji=heart04>\u3000らめ、らめっ<emoji=heart04>\u3000ち○ぽすごいっ<emoji=heart04>\u3000何も、考えられなくなるっ<emoji=heart04>」"
translation = "「응옷<emoji=heart04> 읏<emoji=heart04> 읏<emoji=heart04> 오오옹<emoji=heart04> 안돼, 안돼에<emoji=heart04> 자지 굉장해<emoji=heart04> 아무것도, 생각할 수 없게 돼<emoji=heart04>」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「んんんっ<emoji=heart04>\u3000ち○ぽ、奥に、当たるっ<emoji=heart04>\u3000んぉっ<emoji=heart04>\u3000おんっ<emoji=heart04>\u3000子宮に、ぶつかって……んぉぉおおっ<emoji=heart04>」"
translation = "「응응응읏<emoji=heart04> 자지, 깊숙이, 닿아<emoji=heart04> 응윽<emoji=heart04> 응앗<emoji=heart04> 자궁에, 부딪혀서…… 응오오오오옷<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ヒメの奥の奥──子宮をめがけて、全力で亀頭を叩きつける。"
translation = "히메의 깊고 깊은 곳──자궁을 향해, 전력으로 귀두를 때려 박는다."

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「んひぃぃぃぃっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응히이이이이잇<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "瞬間、悲鳴じみた嬌声を上げ、全身を震わせて絶頂した。"
translation = "순간, 비명 섞인 교성을 지르며 전신을 떨며 절정했다."

[[dialogue]]
speaker = "unk"
original = "だけど腰を止めることなくヒメを責め続ける。"
translation = "하지만 허리를 멈추지 않고 히메를 계속 몰아붙인다."

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「ひぃんっ<emoji=heart04>\u3000んぉっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000おま○こイッて、るのにぃっ<emoji=heart04>\u3000ち○ぽ動かしたら、らめぇっ<emoji=heart04>」"
translation = "「히잉<emoji=heart04> 응윽<emoji=heart04> 읏<emoji=heart04> 읏<emoji=heart04> 보지 가버리고, 있는데도오<emoji=heart04> 자지 움직이면, 안돼애<emoji=heart04>」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「んぉっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000おおおっ<emoji=heart04>\u3000やめ、ろぉっ<emoji=heart04>\u3000これ以上は、メスになる<emoji=heart04>\u3000メスにされてしまうぅっ<emoji=heart04>」"
translation = "「응윽<emoji=heart04> 읏<emoji=heart04> 오오오옷<emoji=heart04> 그만, 둬어<emoji=heart04> 이 이상은, 암컷이 돼<emoji=heart04> 암컷이 되어버려어<emoji=heart04>」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「おま○こバカになるっ<emoji=heart04>\u3000ぉっ<emoji=heart04>\u3000おぉっ<emoji=heart04>\u3000ち○ぽ大好きな、浅ましいメスになるっ<emoji=heart04>\u3000メスにされるぅっ<emoji=heart04>\u3000メスに堕ちるっ<emoji=heart04>\u3000堕ちるぅっ<emoji=heart04>」"
translation = "「보지 바보가 돼버려어<emoji=heart04> 윽<emoji=heart04> 오옷<emoji=heart04> 자지 너무 좋아하는, 천박한 암컷이 돼<emoji=heart04> 암컷이 되어버려어<emoji=heart04> 암컷으로 타락해<emoji=heart04> 타락해애<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「子宮が降りてきて、お前の体はメスになりたいって言ってるぞ」"
translation = "「자궁이 내려와서, 네 몸은 암컷이 되고 싶다고 말하고 있다고」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「くひぃぃん！？\u3000子宮に、ち○ぽぐりぐりされてっ<emoji=heart04>\u3000んほぉっ<emoji=heart04>\u3000おおおぉっ<emoji=heart04>」"
translation = "「쿠히이이잉!? 자궁에, 자지 구리구리 당해서어<emoji=heart04> 응호오<emoji=heart04> 오오오오옷<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "子宮口に亀頭を押し付けると、ヒメ自身の体重が乗って、強烈な刺激がヒメを襲う。"
translation = "자궁구에 귀두를 짓누르자, 히메 자신의 체중이 실려 강렬한 자극이 히메를 덮친다."

[[dialogue]]
speaker = "unk"
original = "さらにもう一度子宮口を突くと──"
translation = "거기에 다시 한번 자궁구를 찌르자──"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「ふぎぃぃぃっ<emoji=heart04><emoji=heart04>」"
translation = "「후기이이이잇<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "こんな簡単にまたイッた。体はもうとっくに快楽に抵抗できなくなっている。"
translation = "이렇게 간단하게 또 가버렸다. 몸은 이제 진작에 쾌락에 저항할 수 없게 되어 있다."

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「んんんっ！？\u3000ち○ぽ、ビクビクして……私の中に、射精するのか……！？」"
translation = "「응응응읏!? 자지, 움찔움찔해서…… 내 안에, 사정하는 것이냐……!?」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「やめろ、やめてくれ！\u3000中に射精するのは──おっ<emoji=heart04>\u3000おぉんっ<emoji=heart04>\u3000やめてくれっ、子宮に、出されたら──んぉぉおおっ<emoji=heart04>」"
translation = "「그만둬, 그만둬줘! 안에 사정하는 건── 읏<emoji=heart04> 오오옹<emoji=heart04> 그만둬줘, 자궁에, 내버리면── 응오오오오옷<emoji=heart04>」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「くひっ<emoji=heart04>\u3000ひぃんっ<emoji=heart04>\u3000お腹、熱いっ<emoji=heart04>\u3000子宮が疼く<emoji=heart04>\u3000キュンキュンして、切なくなるぅっ<emoji=heart04>」"
translation = "「쿠힛<emoji=heart04> 히잉<emoji=heart04> 배 안, 뜨거워어<emoji=heart04> 자궁이 욱신거려<emoji=heart04> 큥큥거려서, 애달파져어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "中に射精されると思った途端、泣き叫ぶヒメとは裏腹に、膣肉はねだるようにペニスを締め付けてくる。"
translation = "안에 사정될 거라 생각한 순간, 울부짖는 히메와는 정반대로 질 근육은 보채듯이 자지를 조여온다."

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「出すな、出すな、出すなぁっ<emoji=heart04>\u3000出されたら、だめっ<emoji=heart04>\u3000らめらめっ<emoji=heart04>\u3000んおっ<emoji=heart04>\u3000ほっ<emoji=heart04>\u3000らめらめらめらめぇぇっ<emoji=heart04>」"
translation = "「내지 마, 내지 마, 내지 마아앗<emoji=heart04> 내버리면, 안돼<emoji=heart04> 안돼안돼에<emoji=heart04> 응옷<emoji=heart04> 홋<emoji=heart04> 안돼안돼안돼안돼애애앳<emoji=heart04>」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「や、やめぇっ――んぉっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000ほっ<emoji=heart04>\u3000りゃめっ<emoji=heart04>\u3000子宮でイク<emoji=heart04>\u3000子宮イク<emoji=heart04>\u3000イクイクイク<emoji=heart04>\u3000イッちゃうぅぅっ<emoji=heart04>」"
translation = "「그, 그만해애──응윽<emoji=heart04> 읏<emoji=heart04> 홋<emoji=heart04> 아안돼에<emoji=heart04> 자궁으로 가아<emoji=heart04> 자궁 가버려어<emoji=heart04> 가 가 가 가버려어어엇<emoji=heart04>」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「んぉっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000おっほぉっ<emoji=heart04>\u3000イッたら、ち○ぽ忘れられなくなりゅっ<emoji=heart04>\u3000中出し、されにゃいと、生きていけなくなりゅぅっ<emoji=heart04>」"
translation = "「응윽<emoji=heart04> 읏<emoji=heart04> 읏호오<emoji=heart04> 가버리면, 자지 잊을 수 없게 되어버려어<emoji=heart04> 질내사정, 당하지 않으면, 살아갈 수 없게 되어버려어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「やめっ、やめりょっ、やめてくりぇっ<emoji=heart04>\u3000んおっ<emoji=heart04>\u3000おっ──おっ──おっほぉぉっ<emoji=heart04>\u3000メスになりゅっ<emoji=heart04>\u3000メスにされひゃうぅっ<emoji=heart04>」"
translation = "「그만, 그망둬, 그만둬 줘어<emoji=heart04> 응오옷<emoji=heart04> 오옷──오옷──오옷호오오옷<emoji=heart04> 암컷이 돼버려어<emoji=heart04> 암컷이 되어버렷어어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「んおっ──おっ──おぉおおっ<emoji=heart04>\u3000イクっ<emoji=heart04>\u3000イクイクっ<emoji=heart04>\u3000子宮イクっ<emoji=heart04>\u3000イクイクイクっ<emoji=heart04>\u3000イッきゅぅぅ～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「응오옷──오옷──오오오오옷<emoji=heart04> 간다앗<emoji=heart04> 가, 가버려엇<emoji=heart04> 자궁으로 가버려어엇<emoji=heart04> 가, 가, 가버려어어엇<emoji=heart04> 가버려어어어어~~~엇<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「んおおおおぉぉぉぉ～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응오오오오오오오오오~~~~~~~~옷<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「んひ、ひぃっ<emoji=heart04>\u3000らめっ<emoji=heart04>\u3000おま○この中で、ち○ぽドクドクして、せーし注ぎ込んでるぅっ<emoji=heart04>」"
translation = "「응히, 히잇<emoji=heart04> 안 대애<emoji=heart04> 보지 안에서, 자지가 움찔움찔하면서, 정액 쏟아붓고 있어어어엇<emoji=heart04>」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「あっついせーえきで、子宮焼かれちゃうっ<emoji=heart04>\u3000子宮屈服して、メスにされひゃうぅぅっ<emoji=heart04>\u3000んぉっ<emoji=heart04>\u3000おぉぉおおおっ<emoji=heart04>」"
translation = "「뜨거운 정액 때문에, 자궁이 타버려엇<emoji=heart04> 자궁이 굴복해서, 암컷이 되어버려어어어엇<emoji=heart04> 응옷<emoji=heart04> 오오오오오오오옷<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "感覚がなくなるくらいペニスが激しく脈打ち、ヒメの奥に精を叩きつける。"
translation = "감각이 없어질 정도로 페니스가 격렬하게 맥동하며, 히메의 안쪽에 정을 때려 박는다."

[[dialogue]]
speaker = "unk"
original = "その熱さを、その感触を子宮に刻み込むように、亀頭を密着させて注ぎ込む。"
translation = "그 뜨거움을, 그 감촉을 자궁에 새겨넣듯이, 귀두를 밀착시켜 쏟아붓는다."

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「んぉっ<emoji=heart04>\u3000ほっ<emoji=heart04>\u3000んぉおっ<emoji=heart04>\u3000ビュクビュクって、中出ししゃせー、きもひいい……<emoji=heart04>\u3000子宮バカになる……<emoji=heart04>\u3000ち○ぽ大好きになりゅ……<emoji=heart04>」"
translation = "「응옷<emoji=heart04> 홋<emoji=heart04> 응오옷<emoji=heart04> 뷰릇뷰릇하고, 질내사정 해버려어, 기분 조아아……<emoji=heart04> 자궁 바보가 돼버려……<emoji=heart04> 자지 너무 좋아하게 돼애……<emoji=heart04>」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「んんんっ<emoji=heart04>\u3000ち○ぽドクドクして、また出てりゅぅ……<emoji=heart04>\u3000子宮がせーえきの味、おぼえてりゅ……んん～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응응응옷<emoji=heart04> 자지가 움찔움찔하면서, 또 나오고 있어어……<emoji=heart04> 자궁이 정액 맛을, 기억해버려어……응으으~~~으음<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「ひぃ……はぁ、はぁ……はあぁ……<emoji=heart04>」"
translation = "「히이……하아, 하아……하아아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスが抜けると、空いた膣口からドロリと精液が溢れてくる。"
translation = "페니스가 빠지자, 벌어진 질 입구에서 걸쭉하게 정액이 넘쳐흐른다."

[[dialogue]]
speaker = "unk"
original = "蕩けた顔でよだれを垂らし、膣から精をこぼす姿は、まさしく快楽に堕ちたメスそのものだ。"
translation = "황홀해진 얼굴로 침을 흘리며, 질에서 정을 흘리는 모습은, 그야말로 쾌락에 타락한 암컷 그 자체다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「言うことはあるか？」"
translation = "「할 말은 있나?」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「ふひぃ、ひぃ……私は……ヒメは……ご主人様専用のメス穴として、あなた様に忠誠を誓います……<emoji=heart04>」"
translation = "「후히이, 히이…… 저는…… 히메는…… 주인님 전용 암컷 구멍으로서, 당신에게 충성을 맹세합니다……<emoji=heart04>」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「いつでもお好きなように、ヒメの穴を、ご主人様のち○ぽを気持ち良くするのにお使いくださいませ……<emoji=heart04>」"
translation = "「언제든 마음껏, 히메의 구멍을, 주인님의 자지를 기분 좋게 만드는 데 사용해 주세요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「だからメスブタのヒメに、ち○ぽをお恵み下さい……<emoji=heart04>\u3000ご主人様のち○ぽがないと、私は生きていけません……<emoji=heart04>」"
translation = "「그러니까 암컷 돼지인 히메에게, 자지를 베풀어 주세요……<emoji=heart04> 주인님의 자지가 없으면, 저는 살아갈 수 없어요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ、メス穴として愛してやるよ」"
translation = "「그래, 암컷 구멍으로서 사랑해주마」"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「あぁ……大好きです、ご主人様ぁ……<emoji=heart04>」"
translation = "「아아…… 너무 좋아요, 주인님……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "メスとして屈服したヒメに満足し、カメラの電源を落とした。"
translation = "암컷으로 굴복한 히메에게 만족하며, 카메라의 전원을 껐다."

[[dialogue]]
speaker = "unk"
original = "こうして自作のアダルトビデオはヒメも満足できるものになったが──"
translation = "이렇게 자작 성인 비디오는 히메도 만족할 수 있는 결과물이 되었지만──"

[[dialogue]]
speaker_original = "オオヒメ"
speaker_translation = "오오히메"
original = "「わ、私は……なんてことを……」"
translation = "「내, 내가…… 대체 무슨 짓을……」"

[[dialogue]]
speaker = "unk"
original = "後日、自分たちで撮影した自作アダルトビデオを見て、我に返ったヒメ。"
translation = "며칠 후, 자신들이 촬영한 자작 성인 비디오를 보고 제정신으로 돌아온 히메."

[[dialogue]]
speaker = "unk"
original = "もうビデオは録らないと決めたものの、時々２人で映像を見直して、また調教プレイで盛り上がるのだった。"
translation = "이제 비디오는 찍지 않기로 결심했지만, 때때로 둘이서 영상을 다시 보며 또다시 조교 플레이로 분위기가 달아오르곤 했다."

