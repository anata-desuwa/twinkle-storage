[[dialogue]]
speaker = "unk"
original = "第３話,司書さんの実力,P"
translation = "제3화, 사서 씨의 실력, P"

[[dialogue]]
speaker = "unk"
original = "くっ、数が多い……！"
translation = "큭, 수가 많아……!"

[[dialogue]]
speaker = "unk"
original = "アステラから出現した大量のモンスターに苦戦していると──"
translation = "아스텔라에서 출현한 대량의 몬스터에게 고전하고 있자――"

[[dialogue]]
speaker = "ウィステリア"
original = "「カラミティチェイン！」"
translation = "「칼라미티 체인!」"

[[dialogue]]
speaker = "unk"
original = "！？"
translation = "!?"

[[dialogue]]
speaker = "ウィステリア"
original = "「ふぅ、見かねて出てきちゃったわ。お疲れ様、会長くん」"
translation = "「후우, 보다 못해 나와버렸네. 수고했어 회장군」"

[[dialogue]]
speaker = "ウィステリア"
original = "「何驚いてるの……って、ああ、私が戦ってるからビックリしてるのね。その話はまた後で」"
translation = "「뭘 그렇게 놀라…… 아, 내가 싸우고 있어서 깜짝 놀란 거구나. 그 이야기는 나중에 하자」"

[[dialogue]]
speaker = "ウィステリア"
original = "「それにしてもモンスターがゾロゾロと……ん？\u3000どうして申し訳なさそうな顔してるの？」"
translation = "「그나저나 몬스터가 줄줄이…… 응? 왜 그렇게 미안하다는 얼굴을 하고 있어?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「……ふぅん、モンスターを引き寄せる体質ねぇ。世の中にはいろんな体質の人がいるものね。あ、なんでもない、こっちの話」"
translation = "「……흐음, 몬스터를 끌어당기는 체질이라니. 세상에는 여러 체질인 사람이 있는 법이네. 아, 아무것도 아니야 혼잣말」"

[[dialogue]]
speaker = "ウィステリア"
original = "「でもモンスターが湧いてるのはモンスターのせい。君のせいじゃない。気にしなくていいわ」"
translation = "「하지만 몬스터가 끓는 건 몬스터 탓이지 네 탓이 아니야. 신경 쓸 거 없어」"

[[dialogue]]
speaker = "ウィステリア"
original = "「だけどどうせなら利用させてもらいましょう。会長くんは前衛をお願いね」"
translation = "「하지만 이왕 이렇게 된 거 이용해주자고. 회장군은 전방을 부탁해」"

[[dialogue]]
speaker = "ウィステリア"
original = "「さ、さっさと片付けるわよ！」"
translation = "「자, 얼른 해치워버리자!」"

[[dialogue]]
speaker = "ウィステリア"
original = "「はい、これで全滅っと。会長くんの戦い方、ちょっと知り合いに似てて合わせやす――何でもないわ」"
translation = "「자, 이걸로 전멸이네. 회장군의 싸우는 방식, 좀 아는 사람이랑 닮아서 맞추기 쉬―― 아무것도 아니야」"

[[dialogue]]
speaker = "ウィステリア"
original = "「でもこれ、時間外手当とか出ないのかしら？\u3000……多分出ない？\u3000司書だから？」"
translation = "「그런데 이거 시간 외 수당 같은 거 안 나오려나? ……아마 안 나오겠지? 사서니까?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「だから欲しいのよ～、働き損になっちゃうし。ま、会長くんが無事だったから良しとしましょう」"
translation = "「그러니까 갖고 싶은 거야~ 일한 보람이 없어지잖아. 뭐, 회장군이 무사했으니까 됐다고 치자」"

[[dialogue]]
speaker = "ウィステリア"
original = "「……え？\u3000どうして私が駆けつけてきたかって？\u3000それは……道を間違えたらたまたま……ま、まぁ、私の運が悪くて良かったわね！」"
translation = "「……에? 왜 내가 달려왔냐고? 그건…… 길을 잘못 들었더니 우연히…… 머, 뭐, 내 운이 나빠서 다행이었네!」"

[[dialogue]]
speaker = "ウィステリア"
original = "「そういえば、モンスターを引き寄せる体質だっけ。その体質のせいで今までずいぶん怖い思いしたんでしょ？」"
translation = "「그러고 보니 몬스터를 끌어당기는 체질이라고 했지. 그 체질 때문에 지금까지 꽤 무서운 경험 많이 했겠네」"

[[dialogue]]
speaker = "ウィステリア"
original = "「それでも星騎士になる道を選んだのね。えらいえらい」"
translation = "「그런데도 성기사가 되는 길을 택했구나. 장하다 장해」"

[[dialogue]]
speaker = "ウィステリア"
original = "「囮にして悪かったけど、星騎士として戦ってるところかっこ良かったわ」"
translation = "「미끼로 써서 미안했지만 성기사로서 싸우는 모습 멋있었어」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ふふっ、照れてる照れてる」"
translation = "「후훗, 부끄러워하긴」"

[[dialogue]]
speaker = "ウィステリア"
original = "「照れてる会長くん、ちょっとかわいいかも……ハッ！\u3000いけないいけない、職員として生徒に変な気持ちを抱くわけには……」"
translation = "「부끄러워하는 회장군, 좀 귀여울지도…… 핫! 안 돼 안 돼, 직원으로서 학생에게 이상한 감정을 품어서는……」"

[[dialogue]]
speaker = "unk"
original = "なぜウィステリアさんが星術を？"
translation = "왜 위스테리아 씨가 성술을?"

[[dialogue]]
speaker = "ウィステリア"
original = "「ああ～、あんまり言いたくないんだけど、それはね……」"
translation = "「아아~ 별로 말하고 싶지 않지만 그건 말이야……」"

[[dialogue]]
speaker = "キリカ"
original = "「彼女が私と同じく流星学園の卒業生だからです」"
translation = "「그녀가 저와 마찬가지로 유성학원 졸업생이기 때문입니다」"

[[dialogue]]
speaker = "ウィステリア"
original = "「！？\u3000キリカ！？」"
translation = "「!? 키리카!?」"

[[dialogue]]
speaker = "キリカ"
original = "「ウィステリアは当時の流星学園でも有数の実力者でした。……とはいえ、それを知る者のほとんどは彼女に固く口止めされていますが」"
translation = "「위스테리아는 당시 유성학원에서도 손꼽히는 실력자였습니다. ……그렇긴 해도 그걸 아는 자 대부분은 그녀에게 엄격히 입막음당해 있습니다만」"

[[dialogue]]
speaker = "ウィステリア"
original = "「私はそこそこの成績で目立たずに卒業したかったの！\u3000普通の幸せが欲しかったの！」"
translation = "「나는 적당한 성적으로 눈에 띄지 않게 졸업하고 싶었어! 평범한 행복을 원했다고!」"

[[dialogue]]
speaker = "ウィステリア"
original = "「それがうっかり全力出しちゃって、そのせいであなた含めて変な連中に挑まれるし、悪目立ちして散々な学園生活だったわ」"
translation = "「그게 깜빡 전력을 다해버리는 바람에 당신 포함해서 이상한 녀석들이 덤벼들고, 안 좋게 눈에 띄어서 엉망진창인 학원 생활이었다고」"

[[dialogue]]
speaker = "キリカ"
original = "「苦情を言いたいのはこちらです。働きたいと言うから星見家のメイド隊として雇ってあげたのに、三ヶ月足らずで出ていかれては旦那様に申し訳が立ちません」"
translation = "「불평을 하고 싶은 건 이쪽입니다. 일하고 싶다고 해서 호시미 가문의 메이드대로 고용해 줬더니, 석 달도 안 돼서 나가버리면 나리께 면목이 서질 않습니다」"

[[dialogue]]
speaker = "ウィステリア"
original = "「それはあなたが明らかに他の子より厳しく指導したからでしょ。あなたの指図で働くなんてもうごめんよ！」"
translation = "「그건 당신이 분명히 다른 애들보다 엄격하게 지도했으니까 그렇잖아. 당신 지시로 일하는 건 이제 사양이야!」"

[[dialogue]]
speaker = "unk"
original = "ケンカするほど仲がいい？"
translation = "싸울 정도로 사이가 좋다?"

[[dialogue]]
speaker = "ウィステリア"
original = "「そんなわけないでしょ！」"
translation = "「그럴 리가 없잖아!」"

[[dialogue]]
speaker = "キリカ"
original = "「目が節穴なのですか？\u3000本気でそう仰っているなら矯正が必要ですね」"
translation = "「눈이 장식입니까? 진심으로 그렇게 말씀하시는 거라면 교정이 필요하겠군요」"

[[dialogue]]
speaker = "unk"
original = "ごめんなさい！"
translation = "죄송합니다!"

[[dialogue]]
speaker = "キリカ"
original = "「まだ近くにアステラ本体が残っているようです。迅速に叩きましょう」"
translation = "「아직 근처에 아스텔라 본체가 남아있는 모양입니다. 신속하게 칩시다」"

[[dialogue]]
speaker = "キリカ"
original = "「ですがお気を付けください」"
translation = "「하지만 조심하십시오」"

[[dialogue]]
speaker = "キリカ"
original = "「ウィステリアは魔界の奥深くの旧い家で生まれ、ほぼ女子校の流星学園にいたせいで年頃の男性にろくに触れずに生きてきました」"
translation = "「위스테리아는 마계 깊숙한 곳의 오래된 가문에서 태어나, 거의 여학교인 유성학원에 있었던 탓에 또래 남성을 제대로 접하지 못하고 살아왔습니다」"

[[dialogue]]
speaker = "キリカ"
original = "「ですから大人ぶっているくせに<ruby>初心<rt>うぶ</rt></ruby>なのです。少し優しくするとうっかり惚れられてしまうかもしれませんよ」"
translation = "「그러니 어른인 척하고 있어도 순진한 것입니다. 조금만 다정하게 대해주면 덜컥 반해버릴지도 모른다고요」"

[[dialogue]]
speaker = "ウィステリア"
original = "「はぁっ！？\u3000実家のことまで言ってないでしょうが！」"
translation = "「하앗!? 집안일까진 말 안 했잖아!」"

[[dialogue]]
speaker = "キリカ"
original = "「言ったでしょう。あなたがメイドとして初めて務めた夜、まだ部屋がないからと一緒に寝たベッドの中で」"
translation = "「말했지 않습니까. 당신이 메이드로서 처음 근무하던 밤, 아직 방이 없으니 같이 자자며 함께 누운 침대 속에서」"

[[dialogue]]
speaker = "キリカ"
original = "「人間界で素敵な恋をするんだ……と嬉しそうに語っていたのを私は覚えていますが」"
translation = "「인간계에서 멋진 사랑을 할 거야…… 라며 기쁜 듯이 이야기하던 것을 저는 기억하고 있습니다만」"

[[dialogue]]
speaker = "ウィステリア"
original = "「なっ――」"
translation = "「나――」"

[[dialogue]]
speaker = "キリカ"
original = "「ではアステラの中へ参りましょう」"
translation = "「그럼 아스텔라 안으로 가시죠」"

[[dialogue]]
speaker = "ウィステリア"
original = "「えっ、ちょっと、この空気のまま戦うの！？\u3000キリカ、待ちなさーいっ！」"
translation = "「엣, 잠깐, 이 분위기 그대로 싸우는 거야!? 키리카, 기다려~!」"

