[[dialogue]]
speaker = "unk"
original = "第３話,クロ×セイ？\u3000セイ×クロ？,P"
translation = "제3화, 크로×세이? 세이×크로?, P"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「んもう、まさかこんなエッチな本を学園に持ってきてる人がいるなんて。荷物検査をして正解だったわ」"
translation = "「정말이지, 설마 이런 야한 책을 학교에 가져오는 사람이 있다니. 소지품 검사를 하길 잘했어」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「興味を持つな、とまでは言わないけれど……。学園にまで持ち込まないで欲しいわ。ハ、ハレンチよ……」"
translation = "「관심을 갖지 말라고까지는 안 하겠지만……. 학교에까지는 안 가져왔으면 좋겠어. 부, 부끄러워라……」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「でも、こんな本まで出回ってるなんて。やっぱり意外といるのね、会長さんと学園長先生で妄想してる人……」"
translation = "「하지만 이런 책까지 돌아다니고 있다니. 역시 의외로 많나 보네, 회장님과 학원장 선생님으로 망상하는 사람들……」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「と言っても、この本の持ち主とはわかり合えそうにないけど……。会長さんは絶対責めよ……！\u3000学園長先生が受けだわ……！」"
translation = "「그렇다곤 해도 이 책 주인과는 말이 안 통할 것 같지만……. 회장님은 절대 공이라고……! 학원장 선생님이 수란 말이야……!」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「確かに会長さんは童顔で、学園長先生は強面だけど……！\u3000だからこそ会長さんが学園長先生をヒンヒン言わせるからいいのであって──」"
translation = "「확실히 회장님은 동안이고 학원장 선생님은 무서운 얼굴이지만……! 그렇기에 회장님이 학원장 선생님을 앙앙 울리는 게 좋은 건데──」"

[[dialogue]]
speaker = "unk"
original = "俺がどうかした？"
translation = "내가 왜?"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「ひぃあっ！？\u3000かかか、会長さんっ！？\u3000ななな、なんでもないわっ！\u3000私だけは会長さんの良さをちゃんとわかってるって思ってただけ……！」"
translation = "「히익!? 회, 회장님!? 아, 아아아무것도 아니야! 나만은 회장님의 장점을 제대로 알고 있다고 생각했을 뿐이야……!」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「それより会長さんこそどうしたのっ？\u3000何か急いでる様子だけど……」"
translation = "「그보다 회장님이야말로 웬일이야? 뭔가 서두르는 모양인데……」"

[[dialogue]]
speaker = "unk"
original = "ちょっと学園長に呼ばれてて。それじゃ！"
translation = "잠시 학원장님이 부르셔서. 그럼!"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「あっ、廊下は走っちゃダメーっ！\u3000減点なんだからーっ！」"
translation = "「앗, 복도에서 뛰면 안 돼─! 감점이라고─!」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「学園長先生に呼ばれて、か……。は、果たして本当にそうなのかしら……。私の予想が正しければ──……」"
translation = "「학원장 선생님이 불러서, 라……. 과, 과연 정말로 그럴까……. 내 예상이 맞다면──……」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「い、いたっ。会長さんと学園長先生……！\u3000あ、あんな廊下の影でこそこそお話して……！」"
translation = "「찾, 찾았다. 회장님과 학원장 선생님……! 저, 저런 복도 구석에서 속닥속닥 얘기하고……!」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「やっぱりあの２人、私の妄想でもなんでもなく本当に付き合ってるのかも……。ああして人目を盗んでこっそり愛を育んでいるんだわ……」"
translation = "「역시 저 두 사람, 내 망상이 아니라 정말로 사귀고 있는 걸지도 몰라……. 저렇게 남의 눈을 피해 몰래 사랑을 키우고 있는 거야……」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「きっと今もこんな風に──……」"
translation = "「분명 지금도 이런 식으로──……」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「急に呼び出して悪かったね、緋宮会長」"
translation = "「갑자기 불러내서 미안하군, 히노미야 회장」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「本当ですよ。学園では目立つことはしないって約束したじゃないですか」"
translation = "「정말이에요. 학교에서는 눈에 띄는 짓은 하지 않기로 약속했잖아요」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「すまない。君が登校してきていると思うと、どうしても、その。顔が見たくなってしまってな……」"
translation = "「미안하네. 자네가 등교해 있다고 생각하니 도저히, 그게. 얼굴이 보고 싶어져서 말이야……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「相変わらず学園長は寂しがり屋ですね。昨日あれだけ可愛がってあげたのに、まだ足りないんですか？」"
translation = "「여전히 학원장님은 외로움을 많이 타시네요. 어제 그렇게나 예뻐해 줬는데 아직도 부족한가요?」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「き、昨日のことは言わないでくれ。あれは君に無理やり──」"
translation = "「어, 어제 일은 말하지 말아주게. 그건 자네가 억지로──」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「約束を破った罰です。今夜もお仕置きですからね？\u3000たっぷりと苛めてあげますよ……ジェラルド」"
translation = "「약속을 어긴 벌입니다. 오늘 밤도 벌을 줄 테니까요? 듬뿍 괴롭혀 줄게요…… 제럴드」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「っっ。お、仰せのままに……クロト、様……」"
translation = "「윽. 하, 하시는 말씀대로…… 쿠로토, 님……」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「って──イ、イケナイわっ。私は一体何を考えて……！\u3000風紀委員がこんな妄想を膨らませちゃ懲戒免職ものよ……！」"
translation = "「라니── 아, 안 돼! 나는 도대체 무슨 생각을……! 풍기위원이 이런 망상을 부풀리다니 징계 면직감이야……!」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「で、でも、せっかくの生クロト×セイファートだもの。あと少しだけ──……」"
translation = "「하지만 이왕 온 거 생생한 쿠로토×세이파트니까. 조금만 더──……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「どうされましたか？」"
translation = "「무슨 일이십니까?」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「ひぃあっ！？\u3000イイイ、イクシリオンさんっ……！？\u3000ち、違うのっ。私は別に変な妄想を膨らませていたわけじゃ……！」"
translation = "「히익!? 이, 이익실리온 씨……!? 아, 아니에요. 저는 딱히 이상한 망상을 부풀리고 있던 게 아니라……!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「変な妄想？\u3000先ほどはまるで、会長と学園長先生が仲睦まじくされているような独り言を呟かれていましたが……」"
translation = "「이상한 망상? 방금 전에는 마치 회장과 학원장 선생님이 다정하게 지내시는 것 같은 혼잣말을 중얼거리셨습니다만……」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「ひやあぁああっ！？\u3000聞かれてたーーっ！？」"
translation = "「히야아아악!? 들켰다──!?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「ハッ──！？\u3000まさかこれが噂に聞く、びぃ、える……？」"
translation = "「핫──!? 설마 이것이 소문으로 듣던 비, 엘……?」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「あああ～～～っ！？\u3000人生終わったーーーっ！？」"
translation = "「아아아~~~!? 인생 끝났다───!!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「いえいえ、ミアさんの嗜好を否定するつもりはありませんよ」"
translation = "「아뇨 아뇨, 미아 씨의 기호를 부정할 생각은 없습니다」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「しかしなるほど。そう考えると、会長と学園長先生との絡みがどんどん濃厚になってきているような……」"
translation = "「하지만 그렇군요. 그렇게 생각하니 회장과 학원장 선생님의 접촉이 점점 농후해지는 것 같은……」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「えっ……！？\u3000の、濃厚にって……！」"
translation = "「엣……!? 노, 농후해진다니……!」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「ああ……！\u3000ホ、ホントだわ……！\u3000あんなに顔を近づけ合って……！\u3000い、今にも唇が触れそうじゃない……！」"
translation = "「아……! 저, 정말이야……! 저렇게 얼굴을 가까이 대고……! 지, 지금이라도 입술이 닿을 것 같잖아……!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「が、学園長先生が会長の肩に手を置いて……！\u3000はぁはぁっ、こんな公衆の面前で大胆です……！」"
translation = "「학, 학원장 선생님이 회장 어깨에 손을 얹고……! 하아 하아, 이런 공공장소에서 대담합니다……!」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「い、いえ、あれは会長さんが学園長先生に壁ドンしてるのよ……！\u3000学園長先生はあえて嫌がる振りをして会長さんを弱々しく押しのけようとしているんだわ……！」"
translation = "「아, 아니야, 저건 회장님이 학원장 선생님께 벽쿵을 하고 있는 거야……! 학원장 선생님은 일부러 싫어하는 척하며 회장님을 가냘프게 밀어내려 하고 있는 거라고……!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「いえいえ逆ですっ。あれは快感に悶える会長を学園長先生が悪い笑みを浮かべながら支えているところですよ……！\u3000会長は学園長先生の愛玩ペットですから……！」"
translation = "「아뇨 아뇨 반대입니다. 저건 쾌감에 몸부림치는 회장을 학원장 선생님이 사악한 미소를 지으며 지탱해주고 있는 거예요……! 회장은 학원장 선생님의 애완용 펫이니까요……!」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「っっ！\u3000どうやらイクシリオンさんとは解釈違いのようねっ。会長さんはああ見えて夜はオラオラ系なんだから……！\u3000学園長先生は生粋の乙女なのっ……！」"
translation = "「윽! 아무래도 익실리온 씨와는 해석 차이가 있는 모양이네! 회장님은 저래 보여도 밤에는 거친 오라오라 계열이니까……! 학원장 선생님은 태생부터 소녀라고……!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「いいえっ！\u3000会長は悪オジ学園長先生に騙され躾けられた哀れなペットです……！」"
translation = "「아닙니다! 회장은 나쁜 중년 학원장 선생님에게 속아 길들여진 불쌍한 펫이에요……!」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「ち、違うもんっ。きっと会長さんは今もこんな風に学園長先生に囁いてるはずで──……」"
translation = "「아, 아니거든! 분명 회장님은 지금도 이런 식으로 학원장 선생님께 속삭이고 있을 텐데──……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ふふ、もうこんなに元気じゃないか？\u3000一体何を期待しているんだい、ジェラルド？」"
translation = "「후후, 벌써 이렇게 기운차지 않나? 도대체 뭘 기대하고 있는 거지, 제럴드?」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「ふぁ、や、やめてくれクロト……。こんな廊下の真ん中で……」"
translation = "「하아, 그, 그만하게 쿠로토……. 이런 복도 한가운데서……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「誘ってきたのはジェラルドじゃないか。わざわざ俺を呼び出してまで可愛がってもらいたかったんだろ？」"
translation = "「유혹해온 건 제럴드 쪽이잖아. 일부러 나를 불러내서까지 예쁨받고 싶었던 거지?」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「待ってくれ、はぁはぁ、せめて続きは学園長室で──……」"
translation = "「기다려 주게, 하아 하아, 적어도 뒷이야기는 학원장실에서──……」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「そして２人だけの愛の巣で、会長さんは学園長先生を縛り上げるのっ。色っぽく蒸れた学園長先生の胸毛を愛でながら──」"
translation = "「그리고 둘만의 사랑의 둥지에서 회장님은 학원장 선생님을 꽁꽁 묶는 거야. 야릇하게 땀에 젖은 학원장 선생님의 가슴털을 사랑하며──」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「ですから違いますよ！\u3000会長は普段から学園長先生の苛烈な躾けを受けていて──」"
translation = "「그러니까 틀렸다니까요! 회장은 평소부터 학원장 선생님의 가혹한 훈육을 받고 있어서──」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「が、学園長、もう無理です、耐えられませんっ……！\u3000おもちゃが、震えて、んく、もう立っていられなっ……！」"
translation = "「학, 학원장, 이제 무리예요, 못 참겠어요……! 장난감이 떨려서, 응, 이제 서 있을 수 없……!」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「ほう？\u3000ご主人様からのプレゼントが気に入らないと言うのかね？\u3000ペットの分際で生意気なことを言うじゃないか」"
translation = "「호오? 주인님이 주신 선물이 마음에 들지 않는다는 건가? 펫 주제에 건방진 말을 하는군」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「はぐぅっ、押し込まないで、くださっ……！\u3000ああァっ、ああああああァァっっーー……！！」"
translation = "「하긋, 밀어 넣지 마세요……! 아아앗, 아아아아아아앗────!!」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「だから違うってば！\u3000会長さんはドＳなのっ……！\u3000可愛い顔して鬼畜プレイが好きなのっ……！」"
translation = "「그러니까 다르다니까! 회장님은 도S라고……! 귀여운 얼굴을 해서 귀축 플레이를 좋아하는 거라고……!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「そこについては同意しますが、しかし、普段学園長先生の恋人に飼われているからこそ、女性に対しては鬼畜になってしまうという背景があった方がよりいっそう燃えてっ──」"
translation = "「그 부분에 대해서는 동의합니다만, 하지만 평소 학원장 선생님의 애인으로서 길들여지고 있기 때문에 여성에 대해서는 귀축이 되어버린다는 배경이 있어야 한층 더 타오르는 법이라──」"

[[dialogue]]
speaker = "unk"
original = "２人とも？\u3000何を話してるの？"
translation = "두 사람 다? 뭘 얘기하고 있는 거야?"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「きゃっ、か、会長っ。あはは、なんでもありませんよっ。お体は大丈夫でしたかっ？」"
translation = "「꺄악, 회, 회장님. 아하하, 아무것도 아니에요. 몸은 괜찮으셨나요?」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「し、心配なのは学園長先生の方よっ。先生を学園長室に放置して私たちに喋りに来るなんて。一体どんな鬼畜プレイを敢行しているのかしら……！」"
translation = "「걱, 걱정되는 건 학원장 선생님 쪽이야. 선생님을 학원장실에 방치해 두고 우리한테 말 걸러 오다니. 대체 어떤 귀축 플레이를 감행하고 있는 걸까……!」"

[[dialogue]]
speaker = "unk"
original = "だから何を話してるの……？"
translation = "그러니까 대체 뭘 얘기하고 있는 거냐고……?"

