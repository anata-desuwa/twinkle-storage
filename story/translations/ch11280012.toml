[[dialogue]]
speaker = "unk"
original = "第２話,リコさんの友達（大人編）,P"
translation = "제2화, 리코 씨의 친구 (어른 편), P"

[[dialogue]]
speaker = "unk"
original = "とある休日、買い物に出かけている途中、リコさんがカフェでお茶しているところを見かけた。"
translation = "어느 휴일, 쇼핑하러 나가는 도중, 리코 씨가 카페에서 차를 마시고 있는 것을 발견했다."

[[dialogue]]
speaker = "リコリンフィア"
original = "「おや、少年じゃないか。奇遇だな」"
translation = "「오야, 소년이 아닌가. 기우로군」"

[[dialogue]]
speaker = "unk"
original = "一緒に席に座っていたのは――"
translation = "함께 자리에 앉아 있던 것은──"

[[dialogue]]
speaker = "トワ先生"
original = "「あっ、会長くん！\u3000こんにちは～♪」"
translation = "「앗, 회장군! 안녕하세요~♪」"

[[dialogue]]
speaker = "マリオン"
original = "「ごきげんよう。ふふっ、会長様、本日もお可愛いご尊顔ですこと♪」"
translation = "「평안하신가요. 후후, 회장님, 오늘도 참 귀여운 존안이시네요♪」"

[[dialogue]]
speaker = "unk"
original = "えっ？\u3000リコさん、２人とは知り合いなんですか？"
translation = "엣? 리코 씨, 두 사람과 아는 사이인가요?"

[[dialogue]]
speaker = "リコリンフィア"
original = "「ああ。実は、トワとマリオンとは学園ＯＧの同期でな」"
translation = "「아아. 실은 토와와 마리온과는 학원 OG 동기라서 말이지」"

[[dialogue]]
speaker = "トワ先生"
original = "「そうなの♪\u3000だから、リコの職業についても知ってるよ」"
translation = "「맞아♪ 그래서 리코의 직업에 대해서도 알고 있어」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「少年、時間があるなら、一緒にお茶でもどうだ？\u3000お姉さんが奢るぞ？」"
translation = "「소년, 시간이 있다면 함께 차라도 어떤가? 이 누나가 사지」"

[[dialogue]]
speaker = "マリオン"
original = "「今日はみんな時間が空いていたので、久しぶりに友達３人で集まってお茶でもしようって話になったんですよ」"
translation = "「오늘은 다들 시간이 비어서, 오랜만에 친구 셋이서 모여 차라도 마시자고 이야기가 된 거예요」"

[[dialogue]]
speaker = "トワ先生"
original = "「リコとこうやって休日に会うのは久しぶりだよね～。いつも忙しそうにしてたし」"
translation = "「리코랑 이렇게 휴일에 만나는 건 오랜만이네~. 항상 바빠 보였고」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「少年の活躍のおかげで、最近は比較的休みも取れるようになってな」"
translation = "「소년의 활약 덕분에, 요즘은 비교적 휴가도 낼 수 있게 되어서 말이야」"

[[dialogue]]
speaker = "unk"
original = "そういえば、リコさんって――"
translation = "그러고 보니, 리코 씨는──"

[[dialogue]]
speaker = "リコリンフィア"
original = "「――ほう、私がどういう経緯で<b>委員会</b>に所属したのかが気になると？」"
translation = "「──호오, 내가 어떤 경위로 **위원회**에 소속되었는지 궁금하다고?」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「ならば少し、お姉さんの人生語りでもしようか」"
translation = "「그렇다면 조금, 이 누나의 인생 이야기라도 해줄까」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「私は、天界生まれの、純血の天使でな。自分で言うのは何だが、昔から毒のある性格だった」"
translation = "「나는 천계 태생의 순혈 천사라서 말이지. 내 입으로 말하긴 그렇다만, 옛날부터 독이 있는 성격이었다」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「だから天界では上手くコミュニティが築けず、両親からもそのことで口酸っぱく、ああしろこうしろと言われて窮屈に感じていた」"
translation = "「그래서 천계에서는 제대로 커뮤니티를 쌓지 못했고, 부모님께도 그 일로 입이 닳도록 이래라저래라 소리를 들어서 답답하게 느끼고 있었지」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「そんな中で、流星学園からスカウトを受けてな。私は迷わず人間界へ行く選択をしたよ」"
translation = "「그런 와중에 유성학원으로부터 스카우트를 받아서 말이야. 나는 망설임 없이 인간계로 가는 선택을 했어」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「そうして流星学園に入学して間もなく、当時の公安委員会本部長からスカウトされて、公安委員会所属のエージェントになった」"
translation = "「그렇게 유성학원에 입학하고 얼마 지나지 않아, 당시의 공안위원회 본부장에게 스카우트되어 공안위원회 소속 에이전트가 되었지」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「これがすごく自分の性に合ってな。公安委員会での仕事を通して、生まれて初めて悪くないと思える学園生活を送れるようになった」"
translation = "「이게 내 적성에 아주 잘 맞아서 말이야. 공안위원회에서의 일을 통해, 태어나서 처음으로 나쁘지 않다고 생각되는 학원 생활을 보낼 수 있게 되었어」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「それから学園卒業後も人間界に残り、公安委員会に所属し続けることを選んで、現在に至るというわけだ」"
translation = "「그 후 학원 졸업 후에도 인간계에 남아 공안위원회에 계속 소속되는 것을 택해 현재에 이르렀다는 뜻이다」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「ちなみに、マリオンがネビュラの魔女であることについては、私は学生時代に調べて、わかっていたよ」"
translation = "「참고로 마리온이 네뷸라의 마녀라는 사실에 대해서는, 내가 학생 시절에 조사해서 알고 있었지」"

[[dialogue]]
speaker = "マリオン"
original = "「当時、<ruby>私<rt>わたくし</rt></ruby>はリコから面と向かって、正体が魔女であることを指摘されました」"
translation = "「당시, 저는 리코에게 정면으로 정체가 마녀라는 점을 지적당했습니다」"

[[dialogue]]
speaker = "トワ先生"
original = "「え！？\u3000そうだったの！？\u3000私、知らなかったんだけど！」"
translation = "「에!? 그랬어!? 나, 전혀 몰랐는데!」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「ああ。その上で、私は<b>知らんぷり</b>をする選択を取った。当時の本部長にも隠してな」"
translation = "「아아. 그 상태에서 나는 **모르는 척**을 하는 선택을 했다. 당시의 본부장에게도 숨기고 말이지」"

[[dialogue]]
speaker = "マリオン"
original = "「リコには感謝しています。今ネビュラと学園が協力関係を結べているのは、リコが私のことを信じて、秘密にしていてくれたからです」"
translation = "「리코에게 감사하고 있어요. 지금 네뷸라와 학원이 협력 관계를 맺을 수 있는 건, 리코가 저를 믿고 비밀로 해주었기 때문입니다」"

[[dialogue]]
speaker = "unk"
original = "リコさん、もしかして母さんが魔女であることも……？"
translation = "리코 씨, 설마 어머니가 마녀라는 것도……?"

[[dialogue]]
speaker = "リコリンフィア"
original = "「ああ、マリオンの裏を調べたことで、魔女の存在は知っていたからな。リノと会って親しくなってから、そう長く経たずに気づいたよ」"
translation = "「아아, 마리온의 뒷조사를 한 덕분에 마녀의 존재는 알고 있었으니까. 리노와 만나서 친해지고 나서 그리 오래 지나지 않아 깨달았지」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「黙っていたことが上にバレたら即懲戒ものだが、私は幸い『知らんぷり』が得意なのでな」"
translation = "「입 다물고 있었던 게 위에 들키면 즉시 징계감이겠지만, 나는 다행히 『모르는 척』이 특기라서 말이야」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「最終的に辻褄を合わせて、みんなが幸せになれるなら、それが１番いいだろう？」"
translation = "「최종적으로 앞뒤를 맞춰서 모두가 행복해질 수 있다면, 그게 제일 좋지 않겠나?」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「その為ならば、過程における『悪』も時には許容することが必要だと私は考えている」"
translation = "「그러기 위해서라면 과정에서의 『악』도 때로는 허용할 필요가 있다고 나는 생각한다」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「つまりは、『毒は薬にもなる』ということだ」"
translation = "「즉, 『독은 약도 된다』는 소리지」"

[[dialogue]]
speaker = "トワ先生"
original = "「さすが、委員会を率いてるだけあるよね。私なら色々と葛藤しちゃって、真似できないよ」"
translation = "「역시 위원회를 이끄는 보람이 있네. 나라면 여러모로 갈등하느라 흉내도 못 냈을 거야」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「先程も言った通り、私の性分に合っていたというだけさ。トワが先生として星騎士たちを育成し、正しく導こうとしているようにな」"
translation = "「방금 말한 대로 내 성미에 맞았을 뿐이야. 토와가 선생으로서 성기사들을 육성하고 바르게 인도하려 하는 것처럼 말이지」"

[[dialogue]]
speaker = "unk"
original = "今思ったんですけど……"
translation = "방금 생각한 건데요……"

[[dialogue]]
speaker = "マリオン"
original = "「おや、どうしました、会長様？」"
translation = "「오야, 왜 그러시나요, 회장님?」"

[[dialogue]]
speaker = "マリオン"
original = "「――トワと私が、リコの<b>附属校の制服</b>にツッコまないことについて……ですか？」"
translation = "「──토와와 제가 리코의 **부속교 교복**에 태클을 걸지 않는 것에 대해서……인가요?」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「あっ！\u3000お姉さん、すみませ～ん♪」"
translation = "「앗! 언니, 저기요~♪」"

[[dialogue]]
speaker = "unk"
original = "リコさんが附属生の声色になって、カフェのウェイトレスさんを呼ぶ。"
translation = "리코 씨가 부속생의 음성으로 바뀌어 카페 웨이트리스를 부른다."

[[dialogue]]
speaker = "リコリンフィア"
original = "「コーヒーのお代わり、お願いしま～す♪」"
translation = "「커피 리필 부탁드려요~♪」"

[[dialogue]]
speaker = "ウェイトレス"
original = "「コーヒーお１つですね。さっきと同じで、お砂糖やミルクは無くて大丈夫でしたか？」"
translation = "「커피 한 잔이시군요. 아까와 똑같이 설탕이나 우유는 안 넣어도 괜찮으신가요?」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「はい♪\u3000リコリン、こう見えて大人舌なので<emoji=heart04>\u3000てへっ☆」"
translation = "「네♪ 리코린, 이래 봬도 어른 입맛이라서 <emoji=heart04> 테헷☆」"

[[dialogue]]
speaker = "ウェイトレス"
original = "「ふふっ、かしこまりました♪\u3000お待ち下さいね～」"
translation = "「후후, 알겠습니다♪ 잠시만 기다려 주세요~」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「ありがとうございますっ、お姉さん♪」"
translation = "「고마워요, 언니♪」"

[[dialogue]]
speaker = "unk"
original = "可愛いものを見るように微笑みながら、ウェイトレスは去って行く。"
translation = "귀여운 것을 보듯 미소 지으며 웨이트리스는 떠나간다."

[[dialogue]]
speaker = "マリオン"
original = "「ふふっ、さすがリコリン様、お可愛いですこと♪」"
translation = "「후후, 역시 리코린 님, 참 귀여우시네요♪」"

[[dialogue]]
speaker = "トワ先生"
original = "「リコは学生時代から附属生になり切るフリをしてたからね～。私たちはもう、すっかり見慣れちゃったよ」"
translation = "「리코는 학생 시절부터 부속생인 척하는 연기를 해왔으니까~. 우리는 이제 완전히 눈에 익어버렸어」"

[[dialogue]]
speaker = "unk"
original = "昔からやってたんですか！？"
translation = "옛날부터 해온 건가요!?"

[[dialogue]]
speaker = "リコリンフィア"
original = "「――ああ。ちなみに、リコリンは年の離れた姉妹が沢山いて、本校を卒業したら、また次の姉妹が入学して来るという設定だ」"
translation = "「──아아. 참고로 리코린은 나이 차이가 많이 나는 자매가 잔뜩 있어서, 본교를 졸업하면 다시 다음 자매가 입학해 온다는 설정이다」"

[[dialogue]]
speaker = "マリオン"
original = "「久しぶりに、トワもなり切ってみたらどうですか？」"
translation = "「오랜만에 토와도 같이 연기해 보는 건 어떤가요?」"

[[dialogue]]
speaker = "トワ先生"
original = "「いや、やらないよ！？」"
translation = "「아니, 안 해!?」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「え～、トワちゃん、リコリンと一緒は嫌なの～？\u3000昔１回やってくれたのに～。うるうる」"
translation = "「에~, 토와짱, 리코린이랑 같이 하는 거 싫어~? 옛날에 한 번 해줬으면서~. 글썽글썽」"

[[dialogue]]
speaker = "unk"
original = "その話、詳しくお願いします！"
translation = "그 이야기, 자세히 부탁드립니다!"

[[dialogue]]
speaker = "トワ先生"
original = "「ちょっ！？\u3000ダメ！\u3000先生の黒歴史だからぁぁぁ～～～！！」"
translation = "「잠깐!? 안 돼! 선생님의 흑역사니까아아아아아아~~!!」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「ふふっ」"
translation = "「후후」"

[[dialogue]]
speaker = "unk"
original = "リコさんが楽しそうな笑みをこぼしたのを見て、心許せる友人なのだな、と思う俺なのだった――"
translation = "리코 씨가 즐거운 듯 미소를 흘리는 것을 보고, 마음을 허락할 수 있는 친구로구나 하고 생각하는 나였다──"

