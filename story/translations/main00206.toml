[[dialogue]]
speaker = "unk"
original = "第８話,未来の日誌,B"
translation = "제8화, 미래의 일지, B"

[[dialogue]]
speaker = "クロト"
original = "「堕天使──それに、守護天使……か」"
translation = "「타락천사── 게다가, 수호 천사……인가.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「アステラの奥でそんなことがあったなんて……」"
translation = "「아스테라 깊은 곳에서 그런 일이 있었다니……」"

[[dialogue]]
speaker = "unk"
original = "フィオナから聞いた話は奇妙なものだった。"
translation = "피오나에게서 들은 이야기는 기묘한 것이었다."

[[dialogue]]
speaker = "unk"
original = "強く汚染されたアステラ。最奥に佇んでいた堕天使。そして彼女から託された謎のアイテム……。"
translation = "강하게 오염된 아스테라. 가장 깊은 곳에 서 있던 타락천사. 그리고 그녀에게서 받은 수수께끼의 아이템……. "

[[dialogue]]
speaker = "フィオナ"
original = "「守護天使さまはこれを“主の鍵”と称しておりましたが……その意味までは汲み取れませんでした」"
translation = "「수호 천사님께서는 이것을 “주인의 열쇠”라고 칭하셨습니다만…… 그 의미까지는 파악할 수 없었습니다.」"

[[dialogue]]
speaker = "フィオナ"
original = "「この栞の正しい用途は何なのか、どうして私たちに渡したのか……まだわからないことも多く」"
translation = "「이 책갈피의 올바른 용도가 무엇인지, 왜 저희에게 건네주었는지…… 아직 모르는 것도 많고.」"

[[dialogue]]
speaker = "クロト"
original = "「普通、読む本がなければ意味のない代物だものな」"
translation = "「보통, 읽을 책이 없으면 의미 없는 물건이지.」"

[[dialogue]]
speaker = "フィオナ"
original = "「はい。ひとまず手近な本や教科書に挟んでみましたが、何も起こりませんでした」"
translation = "「네. 일단 가까운 책이나 교과서에 끼워 보았습니다만, 아무 일도 일어나지 않았습니다.」"

[[dialogue]]
speaker = "クロト"
original = "「ヴィーナス。何かわかるか？」"
translation = "「비너스. 뭔가 아는 거 있어?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「んー……守護天使っていうの……どこかで聞いたことがあるような気もするんだけど」"
translation = "「음ー…… 수호 천사라는 거…… 어디선가 들어본 적 있는 것 같기도 한데.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「アナを連れてくればよかったかしら……」"
translation = "「아나를 데려왔으면 좋았을까……」"

[[dialogue]]
speaker = "unk"
original = "──守護天使。"
translation = "──수호 천사."

[[dialogue]]
speaker = "unk"
original = "彼女らを待ち受けていたマグダレナという堕天使は、自らをそう名乗ったという。"
translation = "그녀들을 기다리고 있던 막달레나라는 타락천사는 스스로를 그렇게 칭했다고 한다."

[[dialogue]]
speaker = "フィオナ"
original = "「それならうちの天使──ルリエルに簡単な話を聞きました。なんでも、天界で祀られている大存在の一柱のようです」"
translation = "「그렇다면 저희 쪽 천사── 루리엘에게 간단한 이야기를 들었습니다. 뭐든지, 천계에서 모셔지고 있는 대존재 중 한 기둥인 것 같습니다.」"

[[dialogue]]
speaker = "クロト"
original = "「なるほど……天使よりさらに上の存在、って感じか」"
translation = "「과연…… 천사보다 더 위의 존재, 라는 느낌인가.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「でも、そんなのがアステラに……？」"
translation = "「근데, 그런 게 아스테라에……?」"

[[dialogue]]
speaker = "キリカ"
original = "「そこが不審な点ですね。ルリエル様も、その理由までは不明とのことでした」"
translation = "「그것이 미심쩍은 점입니다. 루리엘 님도, 그 이유까지는 불명이라고 하셨습니다.」"

[[dialogue]]
speaker = "フィオナ"
original = "「アステラはモンスターの巣窟です。なのでその奥には、ヌシのようなモンスターが待ち構えているのが通例なのですが……」"
translation = "「아스테라는 몬스터의 소굴입니다. 그래서 그 안쪽에는, 우두머리 같은 몬스터가 기다리고 있는 것이 통례입니다만……」"

[[dialogue]]
speaker = "クロト"
original = "「アステラの奥、か。確かに、強大なモンスターがいたのは覚えてる……」"
translation = "「아스테라 안쪽, 인가. 확실히, 강대한 몬스터가 있었던 건 기억해……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そういえば、クロトは小さい頃アステラにさらわれたんだっけ」"
translation = "「그러고 보니, 쿠로토는 어릴 때 아스테라에 납치당했었지.」"

[[dialogue]]
speaker = "フィオナ"
original = "「さらわれ……！？\u3000だ、大丈夫だったのですか」"
translation = "「납치……!? ㄱ, 괜찮으셨습니까.」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、なんとか。……それこそ助かったのは星騎士のおかげだけど」"
translation = "「아아, 어떻게든. ……그야말로 살았던 건 성기사 덕분이지만.」"

[[dialogue]]
speaker = "クロト"
original = "「（俺の『体質』については──語り始めると長いし黙っておこう）」"
translation = "「(내 『체질』에 대해서는── 말하기 시작하면 길어지니 입 다물고 있자.)」"

[[dialogue]]
speaker = "キリカ"
original = "「不思議なこともあるものですね。ただの人間を、モンスターがアステラに連れ込むなんて……」"
translation = "「신기한 일도 다 있군요. 단순한 인간을, 몬스터가 아스테라로 데려가다니……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ま、確かに不思議よね。フツーその場でパックンチョされておしまいよ！」"
translation = "「뭐, 확실히 신기하지. 보통 그 자리에서 냠냠 당하고 끝이야!」"

[[dialogue]]
speaker = "クロト"
original = "「そうなってたら、俺はもうここにいないよ」"
translation = "「그렇게 됐으면, 난 이미 여기 없을 거야.」"

[[dialogue]]
speaker = "ニャリオン"
original = "「仲間だと思われたのニャン？\u3000そうじゃニャきゃ、上玉としてボスに献上されそうになったのニャン！」"
translation = "「동료라고 생각한 거냥? 그렇지 않다면, 상급 물건으로 보스에게 헌상되려 한 거냥!」"

[[dialogue]]
speaker = "フィオナ"
original = "「ニャーリーオン。緋宮会長にとっては冗談ではありませんよ」"
translation = "「냐리온. 히노미야 회장에게는 농담이 아닙니다.」"

[[dialogue]]
speaker = "クロト"
original = "「はは……大丈夫。そのトラウマも、最近は乗り越えられたから」"
translation = "「하하…… 괜찮아. 그 트라우마도, 최근에는 극복했으니까.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふふ、その意気よ。……でもそっか、クロトはアステラの内部を見たことがあるのね」"
translation = "「후후, 그 기세야. ……근데 그렇구나, 쿠로토는 아스테라의 내부를 본 적이 있는 거네.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「本当は今日の初出動でどばーん！\u3000とお披露目して、ビックリさせてあげようと思ってたのに」"
translation = "「사실은 오늘 첫 출동에서 콰앙! 하고 선보여서, 깜짝 놀라게 해 주려고 했는데.」"

[[dialogue]]
speaker = "クロト"
original = "「はは……流星星徒会に倒してもらえてラッキーとも言えるけどね」"
translation = "「하하…… 유성 성도회에게 쓰러뜨려 달라고 해서 다행이라고도 할 수 있지만.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そんな弱腰じゃダメよ！\u3000新星と流星は、競い合うライバルでもあるんだから」"
translation = "「그런 나약한 태도는 안 돼! 신성과 유성은, 서로 경쟁하는 라이벌이기도 하니까.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「クロトはまだ学園に入ったばかりの、よちよち歩きの星徒会長なんだもの！\u3000実戦でしっかり経験値を貯めなくっちゃ！」"
translation = "「쿠로토는 아직 학원에 들어온 지 얼마 안 된, 아장아장 걷는 성도 회장인걸! 실전에서 확실히 경험치를 쌓아야지!」"

[[dialogue]]
speaker = "フィオナ"
original = "「……転入一週間でのご着任、ですものね。本当に驚きです」"
translation = "「……전학 온 지 일주일 만의 취임, 이시군요. 정말 놀랍습니다.」"

[[dialogue]]
speaker = "フィオナ"
original = "「緋宮会長は<ruby>星騎士<rt>スターナイト</rt></ruby>としてはルーキー、ということですか」"
translation = "「히노미야 회장은 성기사로서는 루키, 라는 말씀이십니까.」"

[[dialogue]]
speaker = "クロト"
original = "「そうなる。もちろん、それにかこつけて腑抜けるつもりはないが」"
translation = "「그렇게 되지. 물론, 그걸 핑계로 나태해질 생각은 없지만.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ま、いざとなれば私もサポートするしね♪」"
translation = "「뭐, 유사시에는 나도 서포트할 거고♪」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふふ。大丈夫です、誠実なお人柄なのは……こうして話しているだけでも伝わりますから」"
translation = "「후후. 괜찮습니다, 성실한 인품이라는 것은…… 이렇게 이야기하고 있는 것만으로도 전해지니까요.」"

[[dialogue]]
speaker = "unk"
original = "フィオナは偏見なく新会長の俺を受け入れてくれた。"
translation = "피오나는 편견 없이 새 회장인 나를 받아들여 주었다."

[[dialogue]]
speaker = "ニャリオン"
original = "「ニャーッニャッニャッニャッ！\u3000ならワガハイのほうが先輩なのニャン！\u3000新星会長よ、ニャーを崇め奉るのニャ！」"
translation = "「냐ー앗 냐앗 냐앗 냐앗! 그럼 나 님이 선배인 거냥! 신성 회장아, 냐를 숭배하는 거냥!」"

[[dialogue]]
speaker = "キリカ"
original = "「緋宮さま、失礼しました。これの言うことはお気になさらず」"
translation = "「히노미야 님, 실례했습니다. 이 아이가 하는 말은 신경 쓰지 마십시오.」"

[[dialogue]]
speaker = "ニャリオン"
original = "「い、いでででで！\u3000ニャーを引っ張って伸ばすのはやめるニャン！」"
translation = "「아, 아파파파파! 냐를 잡아당겨 늘이는 건 그만두는 거냥!」"

[[dialogue]]
speaker = "unk"
original = "キリカさんにお仕置きされているニャリオン。"
translation = "키리카 씨에게 벌을 받고 있는 냐리온."

[[dialogue]]
speaker = "unk"
original = "フィオナも気に留めていないのを見ると、普段の光景らしかった。"
translation = "피오나도 신경 쓰지 않는 것을 보니, 평소의 광경인 듯했다."

[[dialogue]]
speaker = "キリカ"
original = "「お話を戻しますと。こちらの栞ですが、星術による分析をかけても目立った情報は得られませんでした」"
translation = "「이야기를 되돌리자면. 이 책갈피입니다만, 성술로 분석을 해 봐도 눈에 띄는 정보는 얻을 수 없었습니다.」"

[[dialogue]]
speaker = "キリカ"
original = "「わかったのは、ただ──まとっている白き光がまったく未知のものであるということだけです」"
translation = "「알아낸 것은, 단지── 두르고 있는 하얀 빛이 완전히 미지의 것이라는 것뿐입니다.」"

[[dialogue]]
speaker = "unk"
original = "厳かな光をたたえる栞。"
translation = "엄숙한 빛을 머금은 책갈피."

[[dialogue]]
speaker = "unk"
original = "ただ、少なくとも禍々しいオーラを感じるものではない。"
translation = "다만, 적어도 불길한 오라를 느끼게 하는 것은 아니다."

[[dialogue]]
speaker = "マグダレナ"
original = "『これこそ主の鍵──<ruby>栞<rt>しおり</rt></ruby>です。これを──ミコ……に……』"
translation = "『이것이야말로 주인의 열쇠── 책갈피입니다. 이것을── 미코……에게……』"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ま、とりあえずいじくってみればいいのよ！\u3000もしかしたらジャキンジャキンって変身するかもしれないし！」"
translation = "「뭐, 일단 만지작거려 보면 되는 거야! 혹시 쨍그랑쨍그랑 하고 변신할지도 모르고!」"

[[dialogue]]
speaker = "unk"
original = "俺は試しに栞を拾い上げてみる。"
translation = "나는 시험 삼아 책갈피를 집어 들어 본다."

[[dialogue]]
speaker = "クロト"
original = "「何も起こらないな……」"
translation = "「아무 일도 일어나지 않네……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「裏面とかは？」"
translation = "「뒷면 같은 건?」"

[[dialogue]]
speaker = "クロト"
original = "「ないな。高級そうな栞には見えるけど」"
translation = "「없네. 고급스러워 보이는 책갈피로는 보이지만.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「流星市国に神社なんてないわよね？」"
translation = "「유성 시국에 신사 같은 건 없지 않아?」"

[[dialogue]]
speaker = "フィオナ"
original = "「ありませんね。教皇庁の管理する区域ですから……」"
translation = "「없습니다. 교황청이 관리하는 구역이니까요……」"

[[dialogue]]
speaker = "ニャリオン"
original = "「でもニャ、都内の神社ニャら一時間も経たずに行けるはずニャン」"
translation = "「하지만 냐, 도쿄 내의 신사라면 한 시간도 안 걸려 갈 수 있을 거냥.」"

[[dialogue]]
speaker = "キリカ"
original = "「しかし、守護天使さま──というのが神社におわすものとも考えがたいですね」"
translation = "「하지만, 수호 천사님──이라는 분이 신사에 계실 것이라고는 생각하기 어렵군요.」"

[[dialogue]]
speaker = "クロト"
original = "「確かに……この栞、どうやって使うものなんだろうな」"
translation = "「확실히…… 이 책갈피, 어떻게 사용하는 걸까.」"

[[dialogue]]
speaker = "unk"
original = "普通に考えるなら、何らかの本に挟むものだが。"
translation = "보통으로 생각하면, 어떤 책에 끼우는 것인데."

[[dialogue]]
speaker = "unk"
original = "巫女に栞──どこか意味深な二つの言葉、その符号……"
translation = "무녀에게 책갈피── 어딘가 의미심장한 두 단어, 그 부호……"

[[dialogue]]
speaker = "クロト"
original = "「──あっ」"
translation = "「──앗.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「？\u3000なによ、クロト。私の顔をじーっと見たりして」"
translation = "「? 뭐야, 쿠로토. 내 얼굴을 빤히 보거나 하고.」"

[[dialogue]]
speaker = "クロト"
original = "「不思議な栞にふさわしいアイテム──ひとつだけ心当たりがあった。ヴィーナス、あの日誌を見せてくれ」"
translation = "「신기한 책갈피에 어울리는 아이템── 하나만 짐작 가는 게 있었어. 비너스, 그 일지를 보여줘.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「日誌？\u3000日誌って……ああ、もしかして」"
translation = "「일지? 일지라니…… 아아, 혹시.」"

[[dialogue]]
speaker = "ニャリオン"
original = "「日記なんかつけてるニャンか。九浄の娘は意外と乙女なのニャン？」"
translation = "「일기 같은 걸 쓰는 거냥. 쿠죠의 딸은 의외로 소녀인 거냥?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「失礼ね。私はいつでも乙女よ、デブ猫」"
translation = "「실례네. 나는 언제나 소녀야, 뚱보 고양이.」"

[[dialogue]]
speaker = "ニャリオン"
original = "「太ってはないニャン！」"
translation = "「뚱뚱하지는 않다냥!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「クロトが言ってるのって……これよね？」"
translation = "「쿠로토가 말하는 거…… 이거지?」"

[[dialogue]]
speaker = "クロト"
original = "「ああ」"
translation = "「아아.」"

[[dialogue]]
speaker = "フィオナ"
original = "「それがヴィーナスさんの日誌──なのですか……？」"
translation = "「그것이 비너스 씨의 일지── 인 것입니까……?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「うん。て言っても、私が書いてるわけじゃないんだけどね」"
translation = "「응. 이라고 해도, 내가 쓰고 있는 건 아니지만.」"

[[dialogue]]
speaker = "ニャリオン"
original = "「ニャニャ……？\u3000自分が書かない日誌なんてあるのかニャン……？」"
translation = "「냐냐……? 자기가 쓰지 않는 일지라는 게 있는 거냥……?」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスに頼んで取り出してもらったもの。"
translation = "비너스에게 부탁해서 꺼내 받은 것."

[[dialogue]]
speaker = "unk"
original = "それは──彼女の持つ未来の日誌だった。"
translation = "그것은── 그녀가 가진 미래의 일지였다."

[[dialogue]]
speaker = "ヴィーナス"
original = "『この『未来の日誌』にしかと記されていたの。魔王クロト──あなたがあの日、新星学園を訪れるってことはね！』"
translation = "『이 『미래의 일지』에 똑똑히 기록되어 있었어. 마왕 쿠로토── 네가 그날, 신성 학원을 방문한다는 것이 말이야!』"

[[dialogue]]
speaker = "unk"
original = "あれは日誌といっても、ヴィーナス本人がつけているものではない。"
translation = "그것은 일지라고 해도, 비너스 본인이 쓰고 있는 것은 아니다."

[[dialogue]]
speaker = "unk"
original = "なんでも本人すら十分には理解できていない、謎に包まれた書物のはずで──"
translation = "뭐든지 본인조차 충분히 이해하지 못하는, 수수께끼에 싸인 서적일 터인데──"

[[dialogue]]
speaker = "ヴィーナス"
original = "「へ？」"
translation = "「헤?」"

[[dialogue]]
speaker = "フィオナ"
original = "「！\u3000栞が共鳴を示しています！」"
translation = "「! 책갈피가 공명을 보이고 있습니다!」"

[[dialogue]]
speaker = "unk"
original = "栞をその日誌に挟んでみる──"
translation = "책갈피를 그 일지에 끼워 본다──"

[[dialogue]]
speaker = "unk"
original = "すると栞のまとっていた白い光が、とたんにさらなる輝きを見せた。"
translation = "그러자 책갈피가 두르고 있던 하얀 빛이, 갑자기 더욱더 큰 빛을 보였다."

[[dialogue]]
speaker = "ニャリオン"
original = "「九浄の娘は巫女だったのかニャン！？\u3000確かに最近はそんなバイトもあるって聞くニャンが……」"
translation = "「쿠죠의 딸은 무녀였던 거냥!? 확실히 최근에는 그런 알바도 있다고 듣는 거냥만……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「バカ、違うわよ！\u3000バイトしてたとかもないし！」"
translation = "「바보, 아니야! 알바 같은 거 한 적도 없고!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「でも、ホントにこれに反応するなんて……！」"
translation = "「근데, 정말로 여기에 반응하다니……!」"

[[dialogue]]
speaker = "クロト"
original = "「俺の身の回りで、同じ不可思議なアイテムといったらそれだったからな……」"
translation = "「내 주변에서, 똑같이 불가사의한 아이템이라고 하면 그거였으니까……」"

[[dialogue]]
speaker = "unk"
original = "やがて共鳴の光が収まっていく。"
translation = "이윽고 공명의 빛이 잦아든다."

[[dialogue]]
speaker = "unk"
original = "ヴィーナスが急いで日誌の中身を確認すると、さらに超常的なことが起こっていた。"
translation = "비너스가 서둘러 일지의 내용을 확인하자, 더욱 초자연적인 일이 일어나고 있었다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「……ページが増えてる」"
translation = "「……페이지가 늘어났어.」"

[[dialogue]]
speaker = "フィオナ"
original = "「……そんなことがあるのですか」"
translation = "「……그런 일이 있는 것입니까.」"

[[dialogue]]
speaker = "ニャリオン"
original = "「どういう日誌なのニャン？\u3000他人に書かれる日誌なんて聞いたことないニャン……」"
translation = "「어떤 일지인 거냥? 타인이 쓰는 일지 같은 건 들어본 적 없다냥……」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは必死で増えたページに目を通していた。"
translation = "비너스는 필사적으로 늘어난 페이지를 훑어보고 있었다."

[[dialogue]]
speaker = "unk"
original = "そして……"
translation = "그리고……"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あっ！」"
translation = "「앗!」"

[[dialogue]]
speaker = "クロト"
original = "「どうした？」"
translation = "「왜 그래?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「これよ！\u3000わかったわ！\u3000今すぐ塔へ向かうわよ、みんな！」"
translation = "「이거야! 알았어! 지금 당장 탑으로 향하는 거야, 모두!」"

[[dialogue]]
speaker = "フィオナ"
original = "「あっ──ヴィーナスさん！？」"
translation = "「앗── 비너스 씨!?」"

[[dialogue]]
speaker = "ニャリオン"
original = "「ひ、人騒がせな娘ニャン……！」"
translation = "「ㅎ, 사람 소란스럽게 하는 딸이냥……!」"

[[dialogue]]
speaker = "クロト"
original = "「それが美徳ということで……」"
translation = "「그것이 미덕이라는 것으로……」"

[[dialogue]]
speaker = "unk"
original = "カフェテリアを飛び出していったヴィーナスをみんなで追いかける。"
translation = "카페테리아를 뛰쳐나간 비너스를 모두가 뒤쫓는다."

[[dialogue]]
speaker = "unk"
original = "しかし、この学園で『塔』と言えば……思い当たるのはあそこしかなかった。"
translation = "하지만, 이 학원에서 『탑』이라고 하면…… 떠오르는 것은 저곳밖에 없었다."

