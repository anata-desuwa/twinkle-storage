[[dialogue]]
speaker = "unk"
original = "第１０話,肉肉飯店にて,B"
translation = "제10화, 고기고기 반점에서, B"

[[dialogue]]
speaker = "unk"
original = "レティシアの脱走事件から数日──俺はその日、アナと共にチナの外出に同伴していた。"
translation = "레티시아의 탈주 사건으로부터 며칠── 나는 그날, 아나와 함께 치나의 외출에 동행하고 있었다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「……いったいどんな手品を使ったんだ？\u3000あのレティシアが、アタシたち以外に心を開くだなんて」"
translation = "「……도대체 어떤 마술을 부린 거야? 그 레티시아가, 우리 말고 다른 사람에게 마음을 열다니.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「会長たちの必死の説得が実を結んだ……と言いたいところですが」"
translation = "「회장님 일행의 필사적인 설득이 결실을 보았다……고 말하고 싶습니다만.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「心の底から信用はされてないよ。一時的な協力関係を承知してもらっただけだ」"
translation = "「마음속 깊이 신용받고 있는 건 아니야. 일시적인 협력 관계를 승낙받았을 뿐이지.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「いや、それでもよっぽどだよ。あのレティシアがなあ……本当に意外だ」"
translation = "「아니, 그래도 대단한 거야. 그 레티시아가 말이지…… 정말 의외네.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「意外というなら、チナさんが今日までまったくと言っていいほど外出したがらなかったのも驚きです」"
translation = "「의외라고 한다면, 치나 씨가 오늘까지 거의 외출하고 싶어 하지 않았던 것도 놀랍습니다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「グレイスさんほどでなくとも、あなたもアクティブなタイプかと思っていましたが」"
translation = "「그레이스 씨 정도는 아니더라도, 당신도 활동적인 타입이라고 생각했습니다만.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「……もしかしたら滅ぼすかもしれない街なんて、歩きたくないだろ。グレイスは単純でいいよな」"
translation = "「……어쩌면 멸망시킬지도 모르는 거리를, 걷고 싶지는 않잖아. 그레이스는 단순해서 좋겠어.」"

[[dialogue]]
speaker = "unk"
original = "チナはずっと『デネブのために真実を確かめる』というスタンスを保っている。"
translation = "치나는 계속해서 『데네브를 위해 진실을 확인한다』는 입장을 유지하고 있다."

[[dialogue]]
speaker = "unk"
original = "そしてルヴィネの言葉次第では俺たちと敵対もするだろうと、はっきりと伝えられた。"
translation = "그리고 루비네의 말에 따라서는 우리와 적대할 수도 있다고, 분명하게 전해왔다."

[[dialogue]]
speaker = "unk"
original = "だからこそ『ルヴィネの死』という未来を視た件も、伝えるのは慎重を期す必要があると思い……未だに言い出せていない。"
translation = "그렇기에 『루비네의 죽음』이라는 미래를 본 건도, 전하는 데 신중을 기할 필요가 있다고 생각하여…… 아직 말을 꺼내지 못하고 있다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「でも今日はお出かけする気分になった、と」"
translation = "「하지만 오늘은 외출할 기분이 드셨나 보군요.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「たまには外の空気も吸わないとってだけだよ。<ruby>故郷<rt>ふるさと</rt></ruby>の味も気になるしな！」"
translation = "「가끔은 바깥 공기도 마셔야 하니까 그런 것뿐이야. 고향의 맛도 궁금하고 말이지!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「到着しました、<ruby>肉肉飯店<rt>ローローハンテン</rt></ruby>。和菓子以外のお店には私も詳しくないので、今から楽しみです。じゅるり」"
translation = "「도착했습니다, <ruby>고기괵반점<rt>로로한텐</rt></ruby>. 화과자 이외의 가게는 저도 잘 모르기에, 벌써부터 기대되네요. 쥬르륵.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ここは一味も二味も違うからな……って？\u3000な、なんだこれ！？\u3000アタシの知ってる肉肉飯店と全然ちがうぞ……！？」"
translation = "「여기는 맛이 차원이 다르니까…… 어? 뭐, 뭐야 이거!? 내가 알던 고기고기 반점이랑 전혀 다르잖아……!?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「なんか魔族の女がプリントされたのぼりがあるし……店も二回りくらいでかいし……えぇえぇ……？」"
translation = "「왠지 마족 여자가 프린트된 깃발이 있고…… 가게도 두 배 정도는 커졌고…… 에에에……?」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「あ～♪\u3000魔王さんご一行だ～、いらっしゃーい♪\u3000肉肉飯店へようこそ♪」"
translation = "「아~♪ 마왕님 일행이다~, 어서 와요♪ 고기고기 반점에 오신 걸 환영해요♪」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「あ。のぼりに写ってる女だ……キャンペーンガールかなんかか？」"
translation = "「아. 깃발에 그려진 여자다…… 캠페인 걸인가 뭔가인가?」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「ううん、ただのスポンサーだよ～♪\u3000みんなじゃんじゃん買っていってね～♪」"
translation = "「으응, 그냥 스폰서야~♪ 다들 팍팍 사 가라고~♪」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（つい先日、命を懸けて交渉をした魔界の皇帝の姿か、これが……？）"
translation = "(불과 며칠 전, 목숨을 걸고 협상을 했던 마계 황제의 모습인가, 이게……?)"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（いや、口は災いの元だ。興が乗って突然女帝モードになられても困るから、余計なツッコミはよそう）"
translation = "(아니, 말은 화의 근원이다. 흥이 나서 갑자기 여제 모드가 되어도 곤란하니, 불필요한 태클은 삼가자.)"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「なんだか前より店が大きくなってる気がするんだけど……？」"
translation = "「왠지 전보다 가게가 커진 것 같은데……?」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「店長が作った新作の肉まん、す～っごく美味しかったから。この前さらに資金援助してあげたんだ～♪\u3000このまま流星市国１のお店になってもらおうって♪」"
translation = "「점장님이 만든 신작 고기만두가, 너~무 맛있었거든. 그래서 요전에 자금 원조를 좀 더 해줬어~♪ 이대로 유성시국 1위 가게로 만들어 주려고♪」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「アタシの思い出の店が……どんどん変わっていく……」"
translation = "「내 추억의 가게가…… 점점 변해가……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「いや、まあ──繁盛するのはいいことか。よーし、注文するぞ！」"
translation = "「아니, 뭐── 번창하는 건 좋은 일인가. 좋아, 주문하자!」"

[[dialogue]]
speaker = "unk"
original = "昼のピークは過ぎているのに、肉肉飯店は大盛況。"
translation = "점심 피크 시간은 지났는데도, 고기고기 반점은 대성황."

[[dialogue]]
speaker = "unk"
original = "注文をしてからも受け取りにしばらく時間がかかる様子なので、煌嶺と立ち話をすることになってしまった。本当は避けたかった……"
translation = "주문을 하고 나서도 수령까지 시간이 좀 걸릴 듯하여, 코레이와 잡담을 나누게 되었다. 사실은 피하고 싶었지만……"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「そういえば、あなたがチナちゃんなんだね♪\u3000新星の学園長からは色々聞いてるよ～」"
translation = "「그러고 보니, 네가 치나짱이구나♪ 신성의 학원장님한테 여러 가지 들었어~」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「あー……あんたが煌嶺なのか。頽廃都市キュリオスの」"
translation = "「아─…… 당신이 코레이인가. 퇴폐 도시 큐리오스의.」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「うん、そうだよ～。よろしくね♪」"
translation = "「응, 맞아~. 잘 부탁해♪」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「新星の学園長が、あんたから極星従騎を借りたって言ってた。あの時は助かった……本当にありがとう」"
translation = "「신성 학원장님이, 당신한테 극성종기를 빌렸다고 했어. 그때는 도움 많이 받았어…… 정말 고마워.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「あとすまない。極星従騎、一騎やられちまった」"
translation = "「그리고 미안해. 극성종기, 한 기 당해버렸어.」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「安心して♪\u3000シノさんとは失ったガーディアン１騎ごとに、た～っぷり保証してもらう契約を巻いてあるから♪」"
translation = "「안심해♪ 시노 씨와는 잃어버린 가디언 한 기당, 아주 두~둑하게 보상받기로 계약을 맺어 뒀으니까♪」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「緊急時にも、抜け目のないやつ──」"
translation = "「긴급 상황에도 빈틈없는 녀석──」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ってかよく考えたら極星従騎、元はと言えばアタシのじゃねえか！」"
translation = "「그보다 잘 생각해보니 극성종기, 원래는 내 거잖아!」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「一度奪ったら私のものだよ～♪」"
translation = "「한번 빼앗으면 내 거야~♪」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「盗人猛々しすぎる……！！」"
translation = "「도둑놈이 너무 뻔뻔하잖아……!!」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「取り立てはシノさんにするから、心配しないでね。というか、そんなことより──」"
translation = "「징수는 시노 씨한테 할 테니까 걱정 마. 그보다, 그런 것보다──」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「あなたってデネブの星騎士なんでしょ？\u3000ちょっと聞きたいことがあるんだけど～」"
translation = "「너 데네브의 성기사지? 좀 물어보고 싶은 게 있는데~」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「あん？\u3000なんだよ、改まって」"
translation = "「앙? 뭔데, 새삼스럽게.」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「デネブの煌嶺とキュリオスは、どうなったのかなーって」"
translation = "「데네브의 코레이와 큐리오스는, 어떻게 됐나 해서.」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「平行世界の自分が、リクリエの使徒とどんな風に戦ったのか、興味があるんだ～♪」"
translation = "「평행세계의 내가, 리크리에의 사도와 어떤 식으로 싸웠는지 궁금하거든~♪」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「……魔界での戦いは、あんまり情報が伝わってないんだ」"
translation = "「……마계에서의 싸움은, 정보가 별로 전해지지 않았어.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「まだデネブの流星市国が攻められる前、魔界で『仮面の女』──デネブに現れたリクリエの使徒が暴れまわってるってニュースがあった」"
translation = "「아직 데네브의 유성시국이 공격받기 전, 마계에서 『가면을 쓴 여자』── 데네브에 나타난 리크리에의 사도가 날뛰고 있다는 뉴스가 있었지.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「それを聞いた英雄セイファートが、精鋭を率いて魔界に向かったのはわかってるんだけど……」"
translation = "「그걸 들은 영웅 세이퍼트가, 정예를 이끌고 마계로 향했다는 건 알고 있지만……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「そのまま魔界で、全員戦死したって記録されてる。あんたも同じだぞ、悪いけどさ」"
translation = "「그대로 마계에서, 전원 전사했다고 기록되어 있어. 당신도 마찬가지야, 미안하지만.」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「……ふ～ん？\u3000記録にほとんど残らないくらい、あっさり負けたってこと？\u3000え～、気分悪いな～……♪」"
translation = "「……흐응? 기록에 거의 남지 않을 정도로 허무하게 졌다는 거야? 에~, 기분 나쁘네~……♪」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「まあでも、今回のリクリエを退ければ、その屈辱も<ruby>雪<rt>そそ</rt></ruby>げるよね♪」"
translation = "「뭐 하지만, 이번 리크리에를 물리치면, 그 굴욕도 씻어낼 수 있겠지♪」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「あ～、でもあれかな？\u3000魔王さんの使者が、魔界で話をまとめられない可能性もあるか～」"
translation = "「아~, 근데 그건가? 마왕님의 사자가, 마계에서 이야기를 매듭짓지 못할 가능성도 있으려나~」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「マインは必ず話をまとめてくる。それだけの交渉人を派遣した」"
translation = "「마인은 반드시 이야기를 매듭짓고 올 거야. 그만한 협상가를 파견했으니까.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だから煌嶺、あなたも戦う準備をしておいてくれ。俺たちは必ず、全員で『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』と<ruby>相対<rt>あいたい</rt></ruby>することになる」"
translation = "「그러니까 코레이, 당신도 싸울 준비를 해둬. 우리는 반드시, 전원이서 『<ruby>XELOS<rt>제로스</rt></ruby>』와 상대하게 될 거야.」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「うんうん、その意気やよし♪\u3000一軍の将を務めるなら、それくらいはどっしり構えてもらわないとね！」"
translation = "「응응, 그 기개 아주 좋아♪ 일군의 장을 맡으려면, 그 정도는 듬직하게 버텨줘야지!」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「あと、それならそれで、魔王さんはちゃーんと約束、守ってね？」"
translation = "「그리고, 그렇다면 마왕님은 약속, 꼬~옥 지켜야 해?」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「いざって時はバタバタするのが戦場の常だけど、絶対に忘れない事。もし私を置いてデネブに行っちゃったら～……」"
translation = "「비상시에는 우왕좌왕하는 게 전장의 상례지만, 절대로 잊지 말 것. 만약 나를 두고 데네브에 가버린다면~……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……行っちゃったら？」"
translation = "「……가버린다면?」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「──殺す。貴様だけでなく星徒会……いや。新星学園の全生徒、無事ですむと思うな？」"
translation = "「──죽이겠다. 귀공뿐만 아니라 성도회…… 아니. 신성학원의 전 학생, 무사할 줄 마라.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「うぉ！？」"
translation = "「우왓!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……聞いてはいましたが、濃いキャラクターですね。流石は魔界の女帝」"
translation = "「……듣긴 했습니다만, 개성이 강한 캐릭터군요. 과연 마계의 여제.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「いや、そういう範疇かコレ！？」"
translation = "「아니, 그런 범주냐고 이게!?」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「……平行世界デネブ。訪れるのが楽しみだ。妾も念入りに牙を研いでおくとしよう」"
translation = "「……평행세계 데네브. 방문하는 것이 기대되는구나. 소첩도 면밀히 이빨을 갈아두도록 하지.」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「ではな──必ず呼べよ、魔王」"
translation = "「그럼 이만── 반드시 불러라, 마왕.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「……何なんだ今の！？\u3000二重人格か！？」"
translation = "「……뭐야 방금!? 이중인격이야!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「気分で使い分けてるらしいよ」"
translation = "「기분에 따라 구분해서 쓰는 모양이야.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「気分！？\u3000嘘だろ、こえーって！\u3000あんなのが仲間で大丈夫か！？」"
translation = "「기분!? 거짓말이지, 무섭다고! 저런 게 동료라니 괜찮은 거야!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「まあ、戦いでは頼りになるよ……扱いを誤ると危険ってだけだ」"
translation = "「뭐, 싸움에서는 의지가 돼…… 다루는 법을 틀리면 위험할 뿐이지.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「爆弾かなんかか……？」"
translation = "「폭탄 같은 건가……?」"

[[dialogue]]
speaker_original = "店員"
speaker_translation = "점원"
original = "「ご予約の香堂さーん、お待たせしました～！」"
translation = "「예약하신 코도 씨~, 오래 기다리셨습니다~!」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「おっ、来たか！」"
translation = "「오, 왔나!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「呼び出しですね。ふかふか肉まん、楽しみです」"
translation = "「호명이네요. 폭신폭신한 고기만두, 기대됩니다.」"

[[dialogue]]
speaker = "unk"
original = "店員の声に呼ばれて、チナが受け取りに向かったその先で──"
translation = "점원의 목소리에 불려, 치나가 받으러 향한 그곳에서──"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「おじさん、こんちは！\u3000受け取りに──いてっ」"
translation = "「아저씨, 안녕하세요! 받으러── 아얏.」"

[[dialogue]]
speaker_original = "女性"
speaker_translation = "여성"
original = "「きゃっ！？」"
translation = "「꺄악!?」"

[[dialogue]]
speaker = "unk"
original = "チナが、１人の女性とぶつかった。"
translation = "치나가, 한 여성과 부딪혔다."

[[dialogue]]
speaker_original = "女性"
speaker_translation = "여성"
original = "「す、すみません。不注意で……」"
translation = "「죄, 죄송합니다. 부주의해서……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「あ、いえ。アタシの方……こ、そ…………」"
translation = "「아, 아뇨. 제 쪽이야…… 말로…………」"

[[dialogue]]
speaker = "unk"
original = "チナが目を見開く──まるで幽霊でも見つけたみたいに。"
translation = "치나가 눈을 크게 뜬다── 마치 유령이라도 발견한 것처럼."

[[dialogue]]
speaker = "unk"
original = "そして──"
translation = "그리고──"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「……………………かあ、さん？」"
translation = "「……………………엄, 마?」"

[[dialogue]]
speaker = "unk"
original = "チナの口からこぼれ出たその言葉は、本当に消え入りそうなほどにか細くて。"
translation = "치나의 입에서 흘러나온 그 말은, 정말 사라질 듯이 가냘퍼서."

[[dialogue]]
speaker = "unk"
original = "なんとか聞き取れたのは、たぶん俺とアナだけだったと思う──"
translation = "겨우 알아들을 수 있었던 건, 아마 나와 아나뿐이었다고 생각한다──"

