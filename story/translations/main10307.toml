[[dialogue]]
speaker = "unk"
original = "第７話,あなたの守り方,B"
translation = "제7화, 당신을 지키는 방법, B"

[[dialogue]]
speaker = "unk"
original = "広範囲に発生したモンスターの群れ。その中心には星徒会の姿があった。"
translation = "광범위하게 발생한 몬스터 무리. 그 중심에는 성도회의 모습이 있었다."

[[dialogue]]
speaker = "unk"
original = "シルヴィがツインメイスを振るう度、爆音と閃光が吹き荒れる。"
translation = "실비가 트윈 메이스를 휘두를 때마다, 폭음과 섬광이 휘몰아친다."

[[dialogue]]
speaker = "unk"
original = "その圧倒的な存在感に、モンスターたちは彼女を無視できない。"
translation = "그 압도적인 존재감에, 몬스터들은 그녀를 무시할 수 없다."

[[dialogue]]
speaker = "サーシャ"
original = "（相変わらずド派手ね～）"
translation = "(여전히 화려하네~)"

[[dialogue]]
speaker = "サーシャ"
original = "（シルヴィは数多くいる星騎士の中でも、特に『目立つ』存在）"
translation = "(실비는 수많은 성기사 중에서도, 특히 『눈에 띄는』 존재)"

[[dialogue]]
speaker = "サーシャ"
original = "（戦場に立てば、実力以上の数の敵と相対してしまうリスクがあるわ）"
translation = "(전장에 서면, 실력 이상의 숫자인 적과 상대하게 될 리스크가 있어)"

[[dialogue]]
speaker = "サーシャ"
original = "（私があの子を副会長にするか迷った理由はそれなんだけど……）"
translation = "(내가 이 아이를 부회장으로 할지 망설였던 이유는 그것 때문이었지만……)"

[[dialogue]]
speaker = "シルヴィ"
original = "「ガンガン行くよ！\u3000ライジン・ブラストビートっ！」"
translation = "「팍팍 간다! 라이진 블래스트 비트!」"

[[dialogue]]
speaker = "イグニック"
original = "「キシャアア！！」"
translation = "「키샤아아!!」"

[[dialogue]]
speaker = "ズシオーン"
original = "「ブオーーーーッ！」"
translation = "「부오오오오!」"

[[dialogue]]
speaker = "蛍火"
original = "「散開していたモンスターが全てこちらに集まってきています！」"
translation = "「산개해 있던 몬스터가 전부 이쪽으로 모여들고 있습니다!」"

[[dialogue]]
speaker = "サーシャ"
original = "（空では飛行型のモンスターが、地上では獣型のモンスターがシルヴィを狙ってる）"
translation = "(하늘에서는 비행형 몬스터가, 지상에서는 야수형 몬스터가 실비를 노리고 있어)"

[[dialogue]]
speaker = "サーシャ"
original = "「シルヴィ、一人で敵の注意を引きすぎてるわ！\u3000少し抑えて！」"
translation = "「실비, 혼자서 적의 주의를 너무 끌고 있어! 조금 자제해!」"

[[dialogue]]
speaker = "シルヴィ"
original = "「大丈夫、問題ないよっ！」"
translation = "「괜찮아, 문제없어!」"

[[dialogue]]
speaker = "unk"
original = "モンスターの攻撃を受け吹っ飛ばされても、シルヴィはすぐに立ち上がる。"
translation = "몬스터의 공격을 받아 날아가도, 실비는 금방 일어난다."

[[dialogue]]
speaker = "unk"
original = "恵まれたフィジカルが彼女の戦い方を支えている。彼女が戦場で倒れている姿は見たことがない。"
translation = "타고난 피지컬이 그녀의 전투 방식을 지탱하고 있다. 그녀가 전장에서 쓰러져 있는 모습은 본 적이 없다."

[[dialogue]]
speaker = "unk"
original = "けれど、モンスターやアステラの発生率が上がり続けている。リクリエが近付いていることは間違いない。"
translation = "하지만, 몬스터나 아스테라의 발생률이 계속 오르고 있다. 리크리에가 다가오고 있는 것은 틀림없다."

[[dialogue]]
speaker = "サーシャ"
original = "（それでも、その戦い方を続けるの……？）"
translation = "(그런데도, 그 전투 방식을 계속할 거야……?)"

[[dialogue]]
speaker = "サーシャ"
original = "「これで、終わり！\u3000二人とも合わせて！」"
translation = "「이걸로, 끝! 둘 다 맞춰줘!」"

[[dialogue]]
speaker = "蛍火"
original = "「はい！」"
translation = "「네!」"

[[dialogue]]
speaker = "シルヴィ"
original = "「おっけーっ！」"
translation = "「오케이!」"

[[dialogue]]
speaker = "サーシャ"
original = "「グレイシャーエンド！！」"
translation = "「글레이셔 엔드!!」"

[[dialogue]]
speaker = "コハルコ"
original = "『モンスターの殲滅を確認しました。お疲れ様です』"
translation = "『몬스터 섬멸을 확인했습니다. 수고하셨어요』"

[[dialogue]]
speaker = "蛍火"
original = "「<ruby>朝比奈<rt>あさひな</rt></ruby>先輩もオペレーションお疲れ様です」"
translation = "「아사히나 선배도 오퍼레이션 수고하셨습니다」"

[[dialogue]]
speaker = "シルヴィ"
original = "「イエーイ♪\u3000終わったー！」"
translation = "「예이♪ 끝났다!」"

[[dialogue]]
speaker = "サーシャ"
original = "「イエーイじゃないわよ、もうっ！\u3000頑張りすぎよ！」"
translation = "「예이가 아니야, 정말! 너무 무리했잖아!」"

[[dialogue]]
speaker = "シルヴィ"
original = "「えぇ～、勝てたからいいじゃん！\u3000それよりチキン買っていこうよ！」"
translation = "「에에~, 이겼으니까 됐잖아! 그것보다 치킨 사 가자!」"

[[dialogue]]
speaker = "サーシャ"
original = "「シ～ル～ヴィ～、今は真面目な話をしているのよ～？」"
translation = "「실~비~, 지금은 진지한 이야기를 하고 있는 거라구~?」"

[[dialogue]]
speaker = "蛍火"
original = "「……先輩、他の生徒のみなさんが見ています」"
translation = "「……선배, 다른 학생분들이 보고 계십니다」"

[[dialogue]]
speaker = "シルヴィ"
original = "「あっ、みんな一緒に戦ってくれてありがとう！\u3000星徒会だけじゃ大変だったから助かったよ～！」"
translation = "「앗, 다들 같이 싸워줘서 고마워! 성도회만으로는 힘들었을 텐데 도움이 됐어~!」"

[[dialogue]]
speaker = "運動部の後輩"
original = "「あ、あの、こちらこそありがとうございます！\u3000シルヴィ先輩のおかげで私も戦えました！」"
translation = "「저, 저기, 저희야말로 감사합니다! 실비 선배 덕분에 저도 싸울 수 있었어요!」"

[[dialogue]]
speaker = "文系の後輩"
original = "「わ、わたしも、戦っている間ずっと、シルヴィ先輩の星術の音が聞こえて心強かったです……」"
translation = "「저, 저도, 싸우는 동안 계속 실비 선배의 성술 소리가 들려서 든든했어요……」"

[[dialogue]]
speaker = "ギャル系同級生"
original = "「モンスターみんなシルヴィに向かってくから助かったわ～。後ろからぶすっとやったった」"
translation = "「몬스터들이 전부 실비한테 달려드니까 살았어~. 뒤에서 푹 찔러버렸지」"

[[dialogue]]
speaker = "シルヴィ"
original = "「うんうん、みんなで勝ち取った勝利だねっ♪」"
translation = "「응응, 다 같이 쟁취한 승리네♪」"

[[dialogue]]
speaker = "サーシャ"
original = "（シルヴィの周りにみんなが集まっている）"
translation = "(실비 주변에 모두가 모여들고 있어)"

[[dialogue]]
speaker = "サーシャ"
original = "（先頭に立って戦って、一番ダメージを受けて……それでも平気だとばかりに堂々と立っている……これが、あなたの戦い方なのね）"
translation = "(선두에 서서 싸우고, 가장 많은 대미지를 입고…… 그런데도 아무렇지 않다는 듯 당당히 서 있어…… 이것이, 네 싸움 방식이구나)"

[[dialogue]]
speaker = "サーシャ"
original = "（シルヴィに自覚があるかどうかはわからないけど……戦って戦うほど、多くを守れる）"
translation = "(실비에게 자각이 있는지는 모르겠지만…… 싸우면 싸울수록, 더 많은 것을 지킬 수 있어)"

[[dialogue]]
speaker = "サーシャ"
original = "（それは星騎士として、星徒会として、これ以上ない資質だわ）"
translation = "(그것은 성기사로서, 성도회로서, 이 이상의 자질은 없을 거야)"

[[dialogue]]
speaker = "サーシャ"
original = "（うん、私が考え過ぎるのはやめましょう……あなたが敵を引き付けるなら、その敵は私が倒せばいい）"
translation = "(응, 내가 너무 깊게 생각하는 건 그만두자…… 네가 적을 끌어들인다면, 그 적은 내가 쓰러뜨리면 돼)"

[[dialogue]]
speaker = "サーシャ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "シルヴィ"
original = "「……ＵＭＯ」"
translation = "「……UMO」"

[[dialogue]]
speaker = "サーシャ"
original = "「さすがにふたりでＵＭＯは退屈ね～」"
translation = "「역시 둘이서 UMO는 지루하네~」"

[[dialogue]]
speaker = "シルヴィ"
original = "「蛍火ちゃん、風邪なんてかわいそうだよね」"
translation = "「케이카짱, 감기라니 불쌍하다 그치」"

[[dialogue]]
speaker = "サーシャ"
original = "「ちなみに、シルヴィって風邪ひいたことあるかしら？」"
translation = "「그나저나, 실비는 감기 걸린 적이 있으려나?」"

[[dialogue]]
speaker = "シルヴィ"
original = "「ないよ？」"
translation = "「없는데?」"

[[dialogue]]
speaker = "サーシャ"
original = "「やっぱり～」"
translation = "「역시나~」"

[[dialogue]]
speaker = "シルヴィ"
original = "「なにがやっぱりだ！\u3000失礼だぞ～こちょこちょこちょ～」"
translation = "「뭐가 역시나야! 무례하다구~ 간질간질간질~」"

[[dialogue]]
speaker = "サーシャ"
original = "「あは、あはははっ、ちょ、くすぐったいわ～」"
translation = "「아하, 아하하하, 자, 잠깐, 간지러워~」"

[[dialogue]]
speaker = "シルヴィ"
original = "「こんなにヒマなの久しぶりだな～。ねぇねぇ、サーシャってなんで人間界に来たの？」"
translation = "「이렇게 한가한 거 오랜만이네~. 저기저기, 사샤는 왜 인간계에 온 거야?」"

[[dialogue]]
speaker = "サーシャ"
original = "「え？\u3000唐突ね～」"
translation = "「어? 갑작스럽네~」"

[[dialogue]]
speaker = "シルヴィ"
original = "「いいじゃん、教えてよ～！」"
translation = "「괜찮잖아, 알려줘~!」"

[[dialogue]]
speaker = "サーシャ"
original = "「いいけど……どこから話そうかしら。『異界探訪』って本、知ってるかしら？」"
translation = "「좋지만…… 어디부터 이야기할까. 『이계 탐방』이라는 책, 알고 있니?」"

[[dialogue]]
speaker = "シルヴィ"
original = "「知ってるも何も、サーシャが読んでた本でしょ？」"
translation = "「알고 말고가 어딨어, 사샤가 읽던 책이잖아?」"

[[dialogue]]
speaker = "サーシャ"
original = "「ちゃんと覚えてるのね……ほんとそういうところよ、シルヴィ」"
translation = "「제대로 기억하고 있구나…… 정말 그런 점이라니까, 실비」"

[[dialogue]]
speaker = "シルヴィ"
original = "「？」"
translation = "「?」"

[[dialogue]]
speaker = "サーシャ"
original = "「ふふっ、まぁいいわ。……私はその本に出合って、世界の広さを知ったわ」"
translation = "「후훗, 뭐 됐어. ……나는 그 책을 만나고, 세계의 넓음을 알게 됐어」"

[[dialogue]]
speaker = "サーシャ"
original = "「そしたら、自分の目で世界を見たくなったの。その時にちょうど留学の話があって、という流れね～」"
translation = "「그랬더니, 내 눈으로 세계를 보고 싶어졌지. 그때 마침 유학 이야기가 있어서, 그렇게 흘러온 거야~」"

[[dialogue]]
speaker = "シルヴィ"
original = "「へぇー、星騎士になりに来たんじゃないんだ？」"
translation = "「헤에~, 성기사가 되러 온 게 아니었어?」"

[[dialogue]]
speaker = "サーシャ"
original = "「そうね～。人間界に来るために星騎士になったってところかしら。そういうシルヴィは星騎士に憧れて？」"
translation = "「그렇네~. 인간계에 오기 위해 성기사가 됐다고나 할까. 그런 실비는 성기사를 동경해서?」"

[[dialogue]]
speaker = "シルヴィ"
original = "「よくぞ聞いてくれました！」"
translation = "「잘 물어봐 주셨습니다!」"

[[dialogue]]
speaker = "サーシャ"
original = "「ふふっ、あなたから振った話でしょ～」"
translation = "「후훗, 네가 먼저 꺼낸 이야기잖아~」"

[[dialogue]]
speaker = "シルヴィ"
original = "「よくある話なんだけど、あたしの住んでた町にモンスターが出てね」"
translation = "「흔한 이야기지만, 내가 살던 마을에 몬스터가 나타났거든」"

[[dialogue]]
speaker = "シルヴィ"
original = "「幸い、近くにいた星騎士が駆けつけてくれて、人が死んだりはしなかったんだけど、まぁ町がすごいことになっちゃった」"
translation = "「다행히 근처에 있던 성기사가 달려와 줘서 사람이 죽거나 하지는 않았지만, 뭐 마을이 엉망진창이 돼버렸어」"

[[dialogue]]
speaker = "シルヴィ"
original = "「家も壊れて住めなくなっちゃうし、広場でも遊べなくてさ。『楽しくない』って思ったんだ」"
translation = "「집도 부서져서 살 수 없게 되고, 광장에서도 놀 수 없어서 말이야. 『즐겁지 않아』라고 생각했어」"

[[dialogue]]
speaker = "シルヴィ"
original = "「思えば、そのときまでずっと『楽しい』だったの。でも、それは誰かが守ってくれてたからなんだって」"
translation = "「생각해 보면, 그때까지 계속 『즐거움』뿐이었어. 하지만 그건 누군가가 지켜주고 있었기 때문이었던 거야」"

[[dialogue]]
speaker = "シルヴィ"
original = "「だからね、あたしは誰かの『楽しい』を守れる人になりたい。みんなが『楽しい』と、あたしも『楽しい』から！」"
translation = "「그래서 말이야, 나는 누군가의 『즐거움』을 지킬 수 있는 사람이 되고 싶어. 모두가 『즐거우면』, 나도 『즐거우니까』!」"

[[dialogue]]
speaker = "サーシャ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "シルヴィ"
original = "「サーシャ、どした？」"
translation = "「사샤, 왜 그래?」"

[[dialogue]]
speaker = "サーシャ"
original = "「思ったより真面目な理由でびっくりしたわ～」"
translation = "「생각보다 진지한 이유라서 깜짝 놀랐어~」"

[[dialogue]]
speaker = "シルヴィ"
original = "「失礼だぞパート２～！\u3000こちょこちょこちょっ！」"
translation = "「무례하다 파트 2~! 간질간질간질!」"

[[dialogue]]
speaker = "サーシャ"
original = "「あはははははっ！」"
translation = "「아하하하하하!」"

[[dialogue]]
speaker = "シルヴィ"
original = "「サーシャ的には将来、天界にも行くつもりなんだ？」"
translation = "「사샤는 장래에 천계에도 갈 생각이야?」"

[[dialogue]]
speaker = "サーシャ"
original = "「そうね～卒業したら、天界にも行ってみたいし、魔界だって人間界だって、全て自分の目で見てみたいわ～」"
translation = "「그렇네~ 졸업하면 천계에도 가보고 싶고, 마계든 인간계든, 전부 내 눈으로 보고 싶어~」"

[[dialogue]]
speaker = "シルヴィ"
original = "「すっごく楽しそう！\u3000サーシャだったら世界の果てまで行けそうだね！」"
translation = "「엄청 재밌겠다! 사샤라면 세계의 끝까지 갈 수 있을 것 같아!」"

[[dialogue]]
speaker = "サーシャ"
original = "「ふふっ、シルヴィがそう言ってくれると嬉しいわ～。あなたは？\u3000卒業後、何がしたい？」"
translation = "「후훗, 실비가 그렇게 말해주니 기쁘네~. 너는? 졸업 후에 뭘 하고 싶어?」"

[[dialogue]]
speaker = "シルヴィ"
original = "「あたしはまだそういうの見つからないんだよね～。なんでも『楽しい』から決められないんだ。でもまずは自分の町に帰るかな～」"
translation = "「나는 아직 그런 거 못 찾았단 말이지~. 뭐든 『즐거우니까』 정할 수가 없어. 하지만 일단은 내 마을로 돌아가려나~」"

[[dialogue]]
speaker = "シルヴィ"
original = "「あ、そうだ。大聖堂に行こう！」"
translation = "「아, 맞다. 대성당에 가자!」"

[[dialogue]]
speaker = "サーシャ"
original = "「？」"
translation = "「?」"

