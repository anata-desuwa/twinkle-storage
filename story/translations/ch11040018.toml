[[dialogue]]
speaker = "unk"
original = "この日、藍はとある男と共に、極上の夜景を一望できる五つ星ホテルの最上階にいた──"
translation = "이날 아이는 어떤 남자와 함께 최상의 야경이 내려다보이는 5성급 호텔 최상층에 있었다──"

[[dialogue]]
speaker = "藍"
original = "「脱げば……いいんですよね……？」"
translation = "「벗으면…… 되는 거죠……?」"

[[dialogue]]
speaker = "unk"
original = "藍はたわわな乳房を露わにし、ベッドに横たわる。衣装の一部も破られ、秘部がむき出しになっていた。"
translation = "아이는 풍만한 유방을 드러내며 침대에 눕는다. 의상의 일부도 찢겨 비부가 노출되어 있었다."

[[dialogue]]
speaker = "藍"
original = "「あ、あまりジロジロ見ないでください……プロデューサーさんと一夜を共にすれば、本当に役をくださるんですよね……？」"
translation = "「너, 너무 빤히 보지 말아 주세요…… 프로듀서님과 하룻밤을 함께하면 정말 배역을 주시는 거죠……?」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、もちろんだとも。ドラマの企画決定権、キャスティング権限は全て私にある。私の気分次第で、大女優が誕生するというわけだ」"
translation = "「아아, 물론이지. 드라마 기획 결정권, 캐스팅 권한은 전부 나에게 있다. 내 기분에 따라 대여배우가 탄생한다는 말이지.」"

[[dialogue]]
speaker = "藍"
original = "「卑怯です……あなたは今までもこうやって、他の女の子を毒牙に……」"
translation = "「비겁해요…… 당신은 지금까지도 이렇게 다른 여자아이들을 독니에……」"

[[dialogue]]
speaker = "クロト"
original = "「毒牙とは人聞きが悪いな。皆、自ら望んで、お偉いさんに股を開いているのだよ。君の知っている有名アイドルすら例外じゃない」"
translation = "「독니라니 듣기 거북하군. 다들 스스로 원해서 윗분들에게 가랑이를 벌리는 거다. 네가 아는 유명 아이돌조차 예외가 아니지.」"

[[dialogue]]
speaker = "藍"
original = "「えっ……まさか、レミカ先輩も……！？」"
translation = "「엣…… 설마 레미카 선배님도……!?」"

[[dialogue]]
speaker = "クロト"
original = "「ご想像にお任せするよ。だが、主役に抜擢されたいのならば、どうすればいいか……わかるね？」"
translation = "「상상에 맡길게. 하지만, 주연으로 발탁되고 싶다면, 어떻게 해야 할지…… 알겠지?」"

[[dialogue]]
speaker = "藍"
original = "「は、はい……これでお仕事をいただけるなら……私の体、プロデューサーさんの好きに使っていただいて、構いません」"
translation = "「네, 네…… 이걸로 일을 받을 수 있다면…… 제 몸, 프로듀서님 마음대로 쓰셔도 상관없어요.」"

[[dialogue]]
speaker = "クロト"
original = "「おいおい、それでは私が君を利用しているみたいじゃないか。君は自ら望んで、私に股を開いているんだよ。気持ちよくしてほしいたいなら、おねだりしないとねえ？」"
translation = "「이봐 이봐, 그러면 내가 너를 이용하는 것 같잖아. 너는 스스로 원해서 나에게 가랑이를 벌리는 거야. 기분 좋아지고 싶다면, 조르기라도 해야 하지 않겠어?」"

[[dialogue]]
speaker = "藍"
original = "「くっ……！\u3000プ、プロデューサーさん、わ、私のおま○こ、気持ち良くしてください……お、おち○、ぽ……入れてくださいっ……」"
translation = "「큭……! 프, 프로듀서님, 제, 제 보지, 기분 좋게 해주세요…… 자, 자지…… 넣어주세요……!」"

[[dialogue]]
speaker = "藍"
original = "「私の……おち○ぽ欲しがって、疼いているおま○こっ……オナホ代わりに使って、気持ち良くなってください……お願い、します……っ！」"
translation = "「제…… 자지를 원해서 욱신거리는 보지를…… 오나홀 대신 써서 기분 좋아져 주세요…… 부탁, 드려요……!」"

[[dialogue]]
speaker = "クロト"
original = "「いやはや、ドスケベな女優もいたものだ。激務でストレスが溜まっているのかな？\u3000そこまでお願いするならば、使ってあげないとね」"
translation = "「이런 이런, 대단한 변태 여배우도 다 있군. 격무로 스트레스가 쌓인 건가? 거기까지 부탁한다면 써줘야겠네.」"

[[dialogue]]
speaker = "藍"
original = "「あっ、でも、キ、キスは、しないでください……痕が残ると撮影に支障が出ちゃいますから……」"
translation = "「앗, 하지만, 키, 키스는 하지 말아 주세요…… 자국이 남으면 촬영에 지장이 생기니까……」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、わかった。商売道具に傷をつけるようなバカな真似はせんよ」"
translation = "「아아, 알았다. 장사 도구에 상처를 내는 바보 같은 짓은 안 해.」"

[[dialogue]]
speaker = "藍"
original = "「うぅぅ……レミカ先輩、会長さん、ごめんなさい……私、穢されちゃいます……でも、これもお仕事のため……事務所のためですから……わかってくれますよね……？」"
translation = "「으으으…… 레미카 선배님, 회장님, 죄송해요…… 저, 더럽혀져 버려요…… 하지만 이것도 일을 위해서…… 사무소를 위해서니까…… 이해해 주시겠죠……?」"

[[dialogue]]
speaker = "クロト"
original = "「なんだ、弄る必要もないくらいに愛液でびちょびちょじゃないか。本当に犯されるのを期待していたのか？\u3000これなら前戯の必要もなさそうだな」"
translation = "「뭐야, 만질 필요도 없을 정도로 애액으로 축축하잖아. 정말로 범해지는 걸 기대하고 있었나? 이 정도면 전희도 필요 없겠군.」"

[[dialogue]]
speaker = "unk"
original = "己の股間に添えられた見たこともないサイズのペニスに、藍は目を丸くする。"
translation = "자신의 가랑이에 닿은 본 적도 없는 크기의 페니스에 아이는 눈을 동그랗게 뜬다."

[[dialogue]]
speaker = "藍"
original = "「えっ……！？\u3000プロデューサーさんのおち○ぽ、大きすぎませんか……！？\u3000そんな大きいの、知りませんっ……！」"
translation = "「엣……!? 프로듀서님의 자지, 너무 크지 않나요……!? 그렇게 큰 건 몰라요……!」"

[[dialogue]]
speaker = "クロト"
original = "「ふふ、キミほどの女優を好き放題に抱けると思うと、ついつい興奮してしまってね」"
translation = "「후후, 너 같은 여배우를 마음껏 안을 수 있다고 생각하니 그만 흥분해 버려서 말이야.」"

[[dialogue]]
speaker = "藍"
original = "「そんなの、入りませんよっ……私のおま○こ、おバカになっちゃいます……んぅ！？\u3000ご、ごめんなさい、ごめんなさいっ！\u3000やっぱりやめっ──！」"
translation = "「그런 거 안 들어가요…… 제 보지, 바보가 되어버려요…… 응!? 죄, 죄송해요, 죄송해요! 역시 그만──!」"

[[dialogue]]
speaker = "クロト"
original = "「大丈夫、大丈夫、おま○こはね、ちゃんとち○ぽが入るようにできてるんだから……！」"
translation = "「괜찮아, 괜찮아. 보지는 말이야, 자지가 잘 들어갈 수 있게 만들어져 있으니까……!」"

[[dialogue]]
speaker = "藍"
original = "「っくぅうぅぅぅぅんっ！？」"
translation = "「끄우우우우웅!?」"

[[dialogue]]
speaker = "unk"
original = "挿入直前に拒んでいたにも関わらず、甘く開いていた膣口はいとも容易く、巨大な勃起を飲み込んだ。"
translation = "삽입 직전까지 거부하고 있었음에도 불구하고, 달콤하게 열려 있던 질구는 너무나도 쉽게 거대한 발기를 삼켜버렸다."

[[dialogue]]
speaker = "藍"
original = "「あっ、はぁ、はぁぁっ……！？\u3000ぁ、はぁっ……はっ、入っちゃっ、たぁ……おち○ぽっ、おち○ぽ、奥まで入れられちゃったぁ……！」"
translation = "「앗, 하아, 하아아……!? 아, 하앗…… 드, 들어가 버렸어…… 자지, 자지, 깊숙이 박혀버렸어……!」"

[[dialogue]]
speaker = "藍"
original = "「はぁっ、はぁっ、はーっ……！\u3000んぁ、く、苦しいっ……おま○こ、広がっちゃってるぅ……プロデューサーさんの形に変えられちゃってるぅ……」"
translation = "「하앗, 하앗, 하아……! 응아, 괴, 괴로워…… 보지, 벌어져 버려…… 프로듀서님의 모양으로 바뀌어버려……」"

[[dialogue]]
speaker = "クロト"
original = "「大袈裟だな。これまでも何十本ものち○ぽを加え込んで、仕事を取ってきたのだろう？」"
translation = "「과장이 심하군. 지금까지도 수십 개의 자지를 물고 일을 따냈을 거 아냐?」"

[[dialogue]]
speaker = "藍"
original = "「そ、そんなことしてませんっ……！\u3000体を許したのは、１人だけ……会長さんだけなのにぃ……」"
translation = "「그, 그런 적 없어요……! 몸을 허락한 건 한 사람뿐…… 회장님뿐이었는데……」"

[[dialogue]]
speaker = "クロト"
original = "「ほう？\u3000俺のち○ぽは愛する会長さんと比べて、どうだ？\u3000どっちがデカくて、気持ちいい？」"
translation = "「호오? 내 자지는 사랑하는 회장님과 비교해서 어때? 어느 쪽이 더 크고 기분 좋지?」"

[[dialogue]]
speaker = "藍"
original = "「い、言えませんっ……そんなのっ……んぅぅっ……！\u3000プロデューサーさぁん、待って、動くの待って……馴染むまでおち○ぽ、動かしちゃらめれすっ……！」"
translation = "「마, 말 못 해요…… 그런 거…… 응으윽……! 프로듀서님, 잠깐만, 움직이는 거 기다려줘요…… 익숙해질 때까지 자지 움직이면 안 대여……!」"

[[dialogue]]
speaker = "クロト"
original = "「まったく、良い声だが、喧しいオナホだ。そのよく喋る口を塞いでやる」"
translation = "「정말이지, 목소리는 좋지만 시끄러운 오나홀이군. 그 잘 나불대는 입을 막아주마.」"

[[dialogue]]
speaker = "藍"
original = "「んぅぶっ……！？\u3000キ、キスはダメだって……言ったろにぃ……！\u3000んぢゅ、ちゅば、ちゅぅぅ……」"
translation = "「음붑……!? 키, 키스는 안 된다고…… 말했자나여……! 응쥬, 츄릅, 츄우우……」"

[[dialogue]]
speaker = "クロト"
original = "「傷はつけないと言っただけだ。愛し合う恋人のように舌と舌を絡めるだけなら痕もつくまい」"
translation = "「상처는 내지 않겠다고 했을 뿐이다. 사랑하는 연인처럼 혀를 섞는 것뿐이라면 자국도 남지 않겠지.」"

[[dialogue]]
speaker = "藍"
original = "「んぅ……ぬぶっ、ぶちゅ、ちゅぶっ……！\u3000んぅうぅぅ……んっ、ちゅぶ、ちゅる、ちゅむ……ちゅっ、ぶぢゅっ……！」"
translation = "「응…… 누붑, 부츄, 츄붑……! 응우우…… 응, 츄릅, 츄르, 츄릅…… 츄, 부쥬윽……!」"

[[dialogue]]
speaker = "藍"
original = "「んぷはっ！\u3000んぅ、れろぉ……んんん……！\u3000んぢゅっ、べろっ、べろぉ……ちゅば、れろ、れろぉ……」"
translation = "「음푸하! 응, 레로오…… 응응응……! 응쥬윽, 베로, 베로오…… 츄릅, 레로, 레로오……」"

[[dialogue]]
speaker = "クロト"
original = "「そうだ、上手いじゃないか。舌を舐め回して、ツバを飲みこむんだぞ」"
translation = "「그래, 잘하잖아. 혀를 핥아 돌리면서 침을 삼키는 거야.」"

[[dialogue]]
speaker = "藍"
original = "「ぁむ、ちゅっ、ちゅぴ、ちゅぱ、ちゅぱっ……れろっ、ちゅぱ、ちゅっ、ぢゅるぅうぅぅぅっ……！？」"
translation = "「아무, 츄, 츄피, 츄파, 츄팟…… 레로, 츄파, 츄, 쥬루우우우욱……!?」"

[[dialogue]]
speaker = "藍"
original = "「んぐっ、ごくっ……ぷぁはっ……！？\u3000な、なんでですか……？\u3000プロデューサーさんの、ツバおいひぃ……<emoji=heart04>」"
translation = "「응긋, 꿀꺽…… 푸아핫……!? 왜, 왜일까요……? 프로듀서님의 침, 마시써……❤️」"

[[dialogue]]
speaker = "藍"
original = "「ナメナメするの、止めらんないれふ……んぅ、ちゅぴ、ちゅ、れろぉ、ちゅば、ちゅばっ、ぢゅずずっ、んぐ、ごくっ……ぷぁはぁぁっ……<emoji=heart04>」"
translation = "「낼름낼름하는 거 멈출 수 없떠요…… 응, 츄피, 츄, 레로, 츄릅, 츄릅, 쥬즈즈, 응긋, 꿀꺽…… 푸아하아아……❤️」"

[[dialogue]]
speaker = "藍"
original = "「はぁ、はっ、はぁ、あぅぅんっ……<emoji=heart04>\u3000おち○ぽでみっちり埋まってるおま○こ……むずむずしちゃいます……んぁっ、はぁ、奥の方が、切ないですぅ……<emoji=heart04>」"
translation = "「하아, 하, 하아, 아우운……❤️ 자지로 꽉 찬 보지…… 근질근질거려요…… 응앗, 하아, 안쪽이 애타요……❤️」"

[[dialogue]]
speaker = "クロト"
original = "「キスだけですっかりできあがったようだな。どれ、ま○こも馴染んだようだし、堪能させてもらうとするか」"
translation = "「키스만으로 완전히 달아오른 모양이군. 어디, 보지도 익숙해진 것 같으니 만끽해 볼까.」"

[[dialogue]]
speaker = "藍"
original = "「んぁあぁっ！？\u3000あ、あっ、あっ、おち○ぽっ動いてっ！\u3000んっ……く、ぅ、んん……<emoji=heart04>\u3000はっ、はぁっ……あ、んっ<emoji=heart04>\u3000はぁ、はっ、あ……んっ……んぁ……<emoji=heart04>」"
translation = "「응아아앗!? 아, 앗, 앗, 자지 움직여서! 응…… 윽, 우, 응응……❤️ 하, 하앗…… 아, 응❤️ 하아, 하, 아…… 응…… 응아……❤️」"

[[dialogue]]
speaker = "藍"
original = "「ぁ、あっ、おち○ぽっ、おち○ぽっ、出たり、入ったり、出たり、入ったりぃ……ごりっごり、擦っ、てぇぇ……<emoji=heart04>」"
translation = "「아, 앗, 자지, 자지, 들어왔다, 나갔다, 들어왔다, 나갔다아…… 고리꼬리, 비벼, 줘어어……❤️」"

[[dialogue]]
speaker = "藍"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000知らないっ、こんなセックス知らないれすっ……あっ、んぁ、あっあっあっあぁぁっ……<emoji=heart04>」"
translation = "「앗❤️ 앗❤️ 몰라, 이런 섹스 몰라여…… 앗, 응아, 앗앗앗아아앗……❤️」"

[[dialogue]]
speaker = "クロト"
original = "「動き出した途端、媚び媚びの甘い声を出すようになったじゃないか。舞台女優の藍は、生粋のスケベ女だったか」"
translation = "「움직이기 시작하자마자 아양 떠는 달콤한 목소리를 내게 됐잖아. 무대 여배우 아이는 본디 밝히는 여자였나?」"

[[dialogue]]
speaker = "藍"
original = "「ち、違う、違いますっ、スケベ、なんかじゃ、私っ、そんな女じゃありませ──んぁっ<emoji=heart04>\u3000あっ、んぁはっ、はぁあぁぁんっ<emoji=heart04>」"
translation = "「아, 아니, 아니에요, 밝히는 여자 같은 거, 나, 그런 여자 아니에──응앗❤️ 앗, 응아핫, 하아아아앙❤️」"

[[dialogue]]
speaker = "クロト"
original = "「演技派女優がしちゃいけない、とろとろに蕩けた顔をしているぞ。ファンが見たら幻滅──いや、むしろ、ファンが増えてしまうかな？」"
translation = "「연기파 여배우가 지으면 안 될, 녹아버릴 것 같은 표정을 짓고 있다고. 팬들이 보면 환멸── 아니, 오히려 팬이 늘어나려나?」"

[[dialogue]]
speaker = "藍"
original = "「んぁっ<emoji=heart04>\u3000はぁっ、はっ、いやぁ、言わないで……顔、見ちゃダメです……恥ずかしいっ……<emoji=heart04>\u3000こんなの、私じゃないっ……<emoji=heart04>」"
translation = "「응앗❤️ 하앗, 하, 싫어, 말하지 마요…… 얼굴, 보면 안 돼요…… 부끄러워……❤️ 이런 거, 내가 아니야……❤️」"

[[dialogue]]
speaker = "藍"
original = "「んぅっ！\u3000ひぅ、んっ、うぅっ<emoji=heart04>\u3000はぁ、あっ、おち○ぽっ、おち○ぽ、奥までっ、今まで届かなかったとこ、当たってちゃってますぅ……<emoji=heart04>」"
translation = "「응읏! 히우, 응, 우읏❤️ 하아, 앗, 자지, 자지, 끝까지, 지금까지 닿지 않았던 곳, 닿고 있어요……❤️」"

[[dialogue]]
speaker = "藍"
original = "「んぁっ！？\u3000はぁっ、んぁっ……はっ、ひぃんっ<emoji=heart04>\u3000んぉっ、子宮に、おち○ぽ、おち○ぽ届いてっ……プロデューサーさんのおち○ぽ長ぁい……<emoji=heart04>」"
translation = "「응앗!? 하앗, 응앗…… 하, 히잉❤️ 응오, 자궁에 자지, 자지 닿아서…… 프로듀서님 자지 길어어……❤️」"

[[dialogue]]
speaker = "藍"
original = "「んひぃんっ<emoji=heart04>\u3000奥っ、長ぁいおち○ぽで、こねこねされるの、ヤバいのっ、んぁっ、あっ、ぁああんっ！？」"
translation = "「응히잉❤️ 안쪽, 긴 자지로 휘저어지는 거, 장난 아니야, 응앗, 앗, 아아앙!?」"

[[dialogue]]
speaker = "クロト"
original = "「ポルチオへの刺激がお好みか。もっと奥をこね回してやろう」"
translation = "「포르치오 자극이 취향인가. 더 안쪽을 휘저어주지.」"

[[dialogue]]
speaker = "藍"
original = "「ポ、ポルチオぉ……？\u3000一番奥をこねこねするの、ポルチオって言うんですかぁ……！？」"
translation = "「포, 포르치오오……? 제일 안쪽을 휘젓는 거 포르치오라고 하는 건가요……!?」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、スケベな女の一番の弱点だよ」"
translation = "「그래, 음란한 여자의 가장 큰 약점이지.」"

[[dialogue]]
speaker = "藍"
original = "「ひぅっ<emoji=heart04>\u3000違う、違いますっ、スケベなんかじゃないろにぃ、んぅ<emoji=heart04>\u3000ポルチオしゅごっ、んんっ<emoji=heart04>\u3000しゅきっ、子宮口、ぐりぐりされるの好きぃっ……<emoji=heart04>」"
translation = "「히웃❤️ 아니, 아니에요, 음란한 거 아닌데에, 응❤️ 포르치오 대단해, 응응❤️ 조아, 자궁구 그리그리당하는 거 좋아아……❤️」"

[[dialogue]]
speaker = "藍"
original = "「あっ……んぁ、あぁあぁっ<emoji=heart04>\u3000こんなっ、こんなのダメですっ……<emoji=heart04>\u3000こんなの覚えちゃ、だめになっちゃう、変態になっちゃうのにぃっ……<emoji=heart04>」"
translation = "「앗…… 응아, 아아아앗❤️ 이런 거, 이런 거 안 돼요……❤️ 이런 거 배우면 안 되게 돼, 변태가 되어버리는데에……❤️」"

[[dialogue]]
speaker = "藍"
original = "「枕セックスが、きもちいいなんて……嘘っ、嘘ぉ……<emoji=heart04>\u3000知らなかったとこばかり弄られて、私、おかしくなっちゃいますぅっ……<emoji=heart04>」"
translation = "「베개 영업이 기분 좋다니…… 거짓말, 거짓말이야……❤️ 몰랐던 곳만 괴롭혀져서, 나 이상해져 버려요옷……❤️」"

[[dialogue]]
speaker = "クロト"
original = "「おかしくなれ。こっちもそろそろ本気でシゴかせてもらうぞ」"
translation = "「이상해져라. 이쪽도 슬슬 본격적으로 박아주지.」"

[[dialogue]]
speaker = "藍"
original = "「ふぁっ！？\u3000あっ<emoji=heart04>\u3000はぁ、はっ<emoji=heart04>\u3000ずんっ、ずんって、頭のてっぺんまで、んんぅうぅぅっ<emoji=heart04>\u3000貫かれてぇっ<emoji=heart04>」"
translation = "「화앗!? 앗❤️ 하아, 하❤️ 즈윽, 즈윽 하고 머리 끝까지, 응으으으읏❤️ 꿰뚫려버려어❤️」"

[[dialogue]]
speaker = "藍"
original = "「はぁっ、はっ、激しっ<emoji=heart04>\u3000プロデューサーさんのガチピストン、激しすぎれすっ、おっぱい、千切れちゃいそうですぅぅっ……<emoji=heart04>」"
translation = "「하아, 하, 격렬해❤️ 프로듀서님의 가치 피스톤, 너무 격렬해여, 가슴 찢어질 것 같아요오옷……❤️」"

[[dialogue]]
speaker = "クロト"
original = "「ぶるんぶるん揺れて、なんてエロいおっぱいだ……ファンならば誰もが、このいやらしいおっぱいを揉みしだきたいと思っているだろうねぇ」"
translation = "「출렁출렁 흔들리고, 정말 야한 가슴이군…… 팬이라면 누구나 이 야한 가슴을 주무르고 싶어 하겠지.」"

[[dialogue]]
speaker = "藍"
original = "「そんなこと、言わないで……んぅぃいぃっ<emoji=heart04>\u3000おっぱい強く揉んじゃダメれすっ、痕が残っちゃいますぅぅぅっ……<emoji=heart04>」"
translation = "「그런 말 하지 마요…… 응으이이잇❤️ 가슴 세게 주무르면 안 대여, 자국 남아요오오옷……❤️」"

[[dialogue]]
speaker = "藍"
original = "「んぁっ、ふぁ、ふぅぅんっ<emoji=heart04>\u3000乱暴にモミモミされるとジンジン痺れてっ……おっぱい弱いのバレちゃいますぅっ<emoji=heart04>」"
translation = "「응앗, 화, 후우웅❤️ 난폭하게 조물조물당하면 징징 저려서…… 가슴 약한 거 들켜버려요옷❤️」"

[[dialogue]]
speaker = "藍"
original = "「んぅうぃぃいっ！？\u3000乳首っ、乳首こりこりしながら、ずんずんするのらめぇっ<emoji=heart04>\u3000乳首、弱いんれすっ、おま○こキュゥンってしちゃうんれすっ<emoji=heart04>」"
translation = "「응으으이이잇!? 유두, 유두 꼬집으면서 즈윽즈윽하는 거 안 대여❤️ 유두 약해요오, 보지 큥하고 울려버려요오❤️」"

[[dialogue]]
speaker = "藍"
original = "「んぁあぁぁっ<emoji=heart04>\u3000おち○ぽっ、中で、中で、おっきくぅっ……んっ、んぁあぁ……<emoji=heart04>\u3000こんな、あっ！\u3000おま○こっ、プロデューサーさんのち○ぽに堕とされちゃうぅっ<emoji=heart04>」"
translation = "「응아아아앗❤️ 자지, 안에서, 안에서 커져서어…… 응, 응아아……❤️ 이런, 앗! 보지, 프로듀서님 자지에 함락되어버려어❤️」"

[[dialogue]]
speaker = "藍"
original = "「んぁ、あっあっあぁっ！\u3000じゅぶじゅぶ、えっちな音、しちゃってますっ……あっ、音、させちゃ、ダメぇっ……<emoji=heart04>」"
translation = "「응아, 앗앗앗! 쥬브쥬브 야한 소리 나고 있어요…… 앗, 소리 나게 하면 안 대여……❤️」"

[[dialogue]]
speaker = "藍"
original = "「あっ、んぁんっ、ぜったい、らめらのにぃ……んぁ、あ、ふぁ、んぁああぁぁっ！？\u3000あ、あ、んぁっ……おち○ぽ、きもち、いっ……<emoji=heart04>」"
translation = "「앗, 응앙, 절대 안 되는 건데에…… 응아, 아, 화, 응아아아아앗!? 아, 아, 응앗…… 자지, 기분, 조아……❤️」"

[[dialogue]]
speaker = "藍"
original = "「んひぁっ！\u3000ぁ、そこっ……そこぉっ……<emoji=heart04>\u3000こんにゃ、あっ、あっ、あっ<emoji=heart04>\u3000Ｇスポ、感じすぎちゃうっ、おま○この弱いとこ、ぜぇんぶバレちゃってますぅっ……<emoji=heart04>」"
translation = "「응히앗! 아, 거기…… 거기이……❤️ 이렁, 앗, 앗, 앗❤️ G스팟 너무 느껴버려, 보지의 약한 곳 저언부 들켜버려요옷……❤️」"

[[dialogue]]
speaker = "藍"
original = "「枕セックスで、こんなっ、あっ、感じちゃうなんてっ……イキそうになっちゃうなんてぇっ……<emoji=heart04>」"
translation = "「베개 영업으로 이런, 앗, 느껴버리다니…… 갈 것 같이 되어버리다니이……❤️」"

[[dialogue]]
speaker = "藍"
original = "「あっ、だめっ……やっ、腰、私の腰、勝手に動いちゃうっ、ピストンに合わせて、んぁっ<emoji=heart04>\u3000一緒に、気持ちよくぅっ、あっ、はぁ、ひぁ、はぁぁんっ<emoji=heart04>」"
translation = "「앗, 안 돼…… 야, 허리, 내 허리 마음대로 움직여버려, 피스톤에 맞춰서, 응앗❤️ 같이 기분 조아져어, 앗, 하아, 히아, 하아앙❤️」"

[[dialogue]]
speaker = "藍"
original = "「はぁっ、はぁ、はきゅぅんっ<emoji=heart04>\u3000おち○ぽ、ぷくぅって膨らんで……おま○こっ、おま○こに出しちゃうんですかぁ？<emoji=heart04>\u3000中に精子、出すつもりなんですかぁっ……<emoji=heart04>」"
translation = "「하아, 하아, 하큐웅❤️ 자지 푸구우하고 부풀어서…… 보지, 보지에 싸버리는 건가요?❤️ 안에 정액 쌀 생각인가요옷……❤️」"

[[dialogue]]
speaker = "クロト"
original = "「もちろん、このままだっ……肉オナホの中に、出すぞっ、たっぷり受け止めろよっ……！」"
translation = "「물론이지 이대로…… 육오나홀 안에 싼다, 듬뿍 받아내라고……!」"

[[dialogue]]
speaker = "藍"
original = "「んぃひんっ<emoji=heart04>\u3000だめ、だめですっ……今日、危ないんですっ……<emoji=heart04>\u3000赤ちゃんデキちゃいますっ……<emoji=heart04>\u3000孕んじゃったら、言い訳できないっ……<emoji=heart04>」"
translation = "「응이힝❤️ 안 돼, 안 돼요…… 오늘 위험해요……❤️ 아기 생겨버려요……❤️ 임신해버리면 변명할 수 없어……❤️」"

[[dialogue]]
speaker = "藍"
original = "「芸能界、続けらんなくなっちゃうっ……引退になっちゃいますぅ……<emoji=heart04>\u3000あっ、はぁ、あっ、あ、あぁあぁっ<emoji=heart04>」"
translation = "「연예계 계속할 수 없게 돼…… 은퇴하게 돼요오……❤️ 앗, 하아, 앗, 아, 아아아앗❤️」"

[[dialogue]]
speaker = "クロト"
original = "「ま○こはギュンギュン締めつけてきてるぞ、本当は膣内に出されたいんだろう？\u3000子宮を俺の子種で満たされたいんだろうっ！？」"
translation = "「보지는 꽉꽉 조여오고 있다고. 사실은 질 안에 싸이고 싶은 거지? 자궁을 내 씨앗으로 채우고 싶은 거지!?」"

[[dialogue]]
speaker = "藍"
original = "「そ、そんなことなっ……あっ、は、ふぁっ……あっ、あん、ぁん……んぁああぁっ<emoji=heart04>\u3000またポルチオっ、子宮ぐりぐりされたら、拒めないっ……出されたくなっちゃうぅ……<emoji=heart04>」"
translation = "「그, 그런 거 아…… 앗, 하, 화앗…… 앗, 앙, 아앙…… 응아아아앗❤️ 또 포르치오, 자궁 그리그리당하면 거부할 수 없어…… 싸이고 싶어져어……❤️」"

[[dialogue]]
speaker = "藍"
original = "「だめっ、だめ、中っ、だめだめっ、んぁあっ<emoji=heart04>\u3000やだっ、私もっ、イク、イキそ……イクッ、おま○こ、おま○こっ、イクッイクッイックぅっっ……<emoji=heart04>」"
translation = "「안 돼, 안 돼, 안에, 안 돼안 돼, 응아앗❤️ 싫어, 나도, 가, 갈 것…… 가, 보지, 보지, 가, 가, 가버려엇……❤️」"

[[dialogue]]
speaker = "藍"
original = "「あっ<emoji=heart04>\u3000んっ、あ、あぁっ<emoji=heart04>\u3000あっ、イッちゃ、あっ<emoji=heart04>\u3000イク、イクッ、イクイクイッッックぅうぅうぅぅっっ<emoji=heart04><emoji=heart04>」"
translation = "「앗❤️ 응, 아, 아앗❤️ 앗, 가버, 앗❤️ 가, 가, 가가가가버려어어어어엇❤️❤️」"

[[dialogue]]
speaker = "藍"
original = "「んぁあぁぁあああぁあぁぁぁぁぁっっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응아아아아아아아아아아아아앗❤️❤️❤️」"

[[dialogue]]
speaker = "藍"
original = "「ひぁうっ！？\u3000アッツいの、どびゅっどびゅうぅって、おくっ、子宮に、当たっへぇぇ……<emoji=heart04>」"
translation = "「히아우!? 뜨거운 거, 도뷰도뷰우우 하고, 안쪽, 자궁에 닿아서어어……❤️」"

[[dialogue]]
speaker = "藍"
original = "「あっ<emoji=heart04>\u3000はぁ、んあぁっ、ホントに、中出し、されちゃってまひゅ……おち○ぽっ、しゅごい、しゅごぉいっ……<emoji=heart04>」"
translation = "「앗❤️ 하아, 응아아, 정말로 질내사정 당해버려떠요…… 자지, 대다내, 대다내에……❤️」"

[[dialogue]]
speaker = "藍"
original = "「はっ<emoji=heart04>\u3000はぁ、はっ、はぁんっ……<emoji=heart04>\u3000おち○ぽ、びくびくっ、跳ねて……いっぱい、吐き出してまひゅ……<emoji=heart04>」"
translation = "「하❤️ 하아, 하, 하앙……❤️ 자지 비득비득 뛰면서…… 잔뜩 토해내고 이떠요……❤️」"

[[dialogue]]
speaker = "藍"
original = "「んぅっ！？\u3000またポルチオぐりぐりぃっ……<emoji=heart04>\u3000それ、だめ、だめ、おかしくなるから、だめっ、また、イク、イクッイクイクイクッ……<emoji=heart04><emoji=heart04>」"
translation = "「응읏!? 또 포르치오 그리그리이……❤️ 그거 안 돼, 안 돼, 이상해지니까 안 돼, 또 가, 가가가가버려……❤️❤️」"

[[dialogue]]
speaker = "藍"
original = "「んひぎゅうぅぅっ<emoji=heart04>\u3000はっ、また、またイッたぁ……精子、どくんどくん出されながら、イッちゃったぁぁっ……<emoji=heart04>」"
translation = "「응히규우우웃❤️ 하, 또, 또 갔다아…… 정액 독흔독흔 나오면서 가버려따아아앗……❤️」"

[[dialogue]]
speaker = "藍"
original = "「あ……ああぁ……中出しで、きもちよくなっちゃ……だめ、なのにぃ……<emoji=heart04>\u3000イッちゃダメなのにぃ……おま○こ、しあわせになっちゃってますよぅ……<emoji=heart04>」"
translation = "「아…… 아아아…… 질내사정으로 기분 조아지면 안 되는데에……❤️ 가버리면 안 되는데에…… 보지 행복해져 버렸어요오……❤️」"

[[dialogue]]
speaker = "unk"
original = "絶頂の甘い余韻を味わってる最中に、膣内からペニスを抜き放つ。泡立った精液と愛液のカクテルが、藍の膣穴からどろりと溢れ出た。"
translation = "절정의 달콤한 여운을 맛보고 있는 도중에 질 내에서 페니스를 뽑아낸다. 거품 섞인 정액과 애액의 칵테일이 아이의 질 구멍에서 주르륵 흘러나왔다."

[[dialogue]]
speaker = "藍"
original = "「んぅっ……<emoji=heart04>\u3000はぁ、はっ……中から、精子、どろぉって……いっぱい、溢れてます……<emoji=heart04>」"
translation = "「응으읏……❤️ 하아, 하…… 안에서 정액이 주르륵…… 잔뜩 넘쳐요……❤️」"

[[dialogue]]
speaker = "藍"
original = "「はぁ、はぁっ……枕セックスでイキ狂っちゃうなんて……もう普通の女優に戻れないかもぉ……<emoji=heart04>\u3000ごめんなさい、会長さん……<emoji=heart04>」"
translation = "「하아, 하아…… 베개 영업으로 미친 듯이 가버리다니…… 이제 평범한 여배우로 못 돌아갈지도오……❤️ 죄송해요, 회장님……❤️」"

[[dialogue]]
speaker = "藍"
original = "「はぁ……はっ、あれぇ、中出しされたのに……いっぱいイッたのにぃ……おま○こ、まだ疼いてますっ……<emoji=heart04>\u3000おち○ぽ欲しくて、ヒクついて……<emoji=heart04>」"
translation = "「하아…… 하아, 어라아, 질내사정 당했는데…… 잔뜩 갔는데에…… 보지 아직 욱신거려요……❤️ 자지 갖고 싶어서 움찔거리고……❤️」"

[[dialogue]]
speaker = "藍"
original = "「はぁ、はぁっ……プロデューサーさぁん……<emoji=heart04>\u3000私の体、おかしくなっちゃたみたいです……もっと、もっと、おま○こしてくださぁい……<emoji=heart04>」"
translation = "「하아, 하아…… 프로듀서님……❤️ 제 몸 이상해져 버린 것 같아요…… 더, 더, 보지 해주세요오……❤️」"

[[dialogue]]
speaker = "藍"
original = "「夜はまだ、始まったばかりですから……このまま朝まで……プロデューサーさん専用オナホに、た～っぷりコキ捨ててくださいね……<emoji=heart04>」"
translation = "「밤은 이제 막 시작됐으니까요…… 이대로 아침까지…… 프로듀서님 전용 오나홀로 듬뿍 싸서 버려주세요……❤️」"

[[dialogue]]
speaker = "藍"
original = "「やっちゃいました……体中、筋肉痛です……」"
translation = "「저질러 버렸네요…… 온몸이 근육통이에요.」"

[[dialogue]]
speaker = "クロト"
original = "「やっちゃったな……」"
translation = "「저질러 버렸군……」"

[[dialogue]]
speaker = "unk"
original = "藍と共に迎えた朝は、今まで感じたことないほどに眩しかった。"
translation = "아이와 함께 맞이한 아침은 지금까지 느껴본 적 없을 정도로 눈부셨다."

[[dialogue]]
speaker = "unk"
original = "もちろん、昨晩の悪徳プロデューサーの枕営業強要は俺たちのプレイであり、実際にああいったことは過去にも現在にも未来にもない。"
translation = "물론 어젯밤의 악덕 프로듀서의 베개 영업 강요는 우리들의 플레이였으며, 실제로 그런 일은 과거에도 현재에도 미래에도 없다."

[[dialogue]]
speaker = "unk"
original = "枕営業なんてするまでもなく、藍は演技派女優として着実に人気と知名度を得ているのだから。"
translation = "베개 영업 같은 걸 할 필요도 없이 아이는 연기파 여배우로서 착실하게 인기와 지명도를 얻고 있으니까."

[[dialogue]]
speaker = "藍"
original = "「会長さん、随分とノリノリでしたね？\u3000ああいうシチュエーションが好きだなんて……驚いちゃいました」"
translation = "「회장님, 꽤나 신나셨던데요? 그런 시츄에이션을 좋아하신다니…… 놀랐어요.」"

[[dialogue]]
speaker = "クロト"
original = "「藍の演技が迫真過ぎて、つい……そういう藍だって、いつもより乱れてなかった？」"
translation = "「아이의 연기가 너무 박진감 넘쳐서 그만…… 그건 그렇고 아이도 평소보다 흐트러지지 않았어?」"

[[dialogue]]
speaker = "藍"
original = "「ち、違うんですよ！？\u3000本心じゃないです、あくまで演技なんです！\u3000ちょっと役に入り込みすぎたっていうか……！」"
translation = "「아, 아니거든요!? 본심이 아니에요, 어디까지나 연기라고요! 좀 배역에 너무 몰입했다고나 할까……!」"

[[dialogue]]
speaker = "藍"
original = "「それに……その、いけないことってドキドキしちゃうじゃないですか……乱暴な会長さんも素敵でしたし……<emoji=heart04>」"
translation = "「게다가…… 그, 나쁜 짓이라는 건 두근거리잖아요…… 난폭한 회장님도 멋있었고……❤️」"

[[dialogue]]
speaker = "藍"
original = "「ああいうプレイ、悪くないかもです……ね、会長さん、次はどんなシチュエーションでしましょうか……？」"
translation = "「그런 플레이, 나쁘지 않을지도요…… 저기 회장님, 다음엔 어떤 시츄에이션으로 할까요……?」"

[[dialogue]]
speaker = "藍"
original = "「イメージビデオの撮影からエッチしちゃう流れ……？\u3000屋外で露出……エッチしながらの動画撮影……ハメ撮りにもちょっぴりだけ興味あります……<emoji=heart04>」"
translation = "「이미지 비디오 촬영하다가 섹스하는 흐름……? 야외 노출…… 섹스하면서 동영상 촬영…… 섹스 영상 촬영에도 조금 관심이 있어요……❤️」"

[[dialogue]]
speaker = "unk"
original = "どうやら俺は女子校育ちの純粋培養女優に、とんでもないことを教えてしまったらしい。"
translation = "아무래도 나는 여학교에서 자란 순수 배양 여배우에게 엄청난 걸 가르쳐버린 모양이다."

[[dialogue]]
speaker = "クロト"
original = "「藍？\u3000今や世界に注目されてる女優だってこと、もっと自覚しようね……？」"
translation = "「아이? 이제 세계가 주목하는 여배우라는 거, 좀 더 자각하자……?」"

[[dialogue]]
speaker = "藍"
original = "「もちろん、自覚してますけど……女優である前に、私は会長さんの恋人ですから」"
translation = "「물론 자각하고 있지만…… 여배우이기 전에 저는 회장님의 연인이니까요.」"

[[dialogue]]
speaker = "藍"
original = "「これからもい～っぱい、可愛がってくださいね<emoji=heart04>」"
translation = "「앞으로도 마~니 예뻐해 주세요❤️」"

