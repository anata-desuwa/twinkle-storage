[[dialogue]]
speaker = "unk"
original = "第３話,プリムラとディーラック,P"
translation = "제3화, 프리뮬라와 디럭쿠, P"

[[dialogue]]
speaker = "unk"
original = "ある週末。"
translation = "어느 주말."

[[dialogue]]
speaker = "unk"
original = "流星寮に住むプリムラは、同じく寮生のトレジアンナと共に、大聖堂カフェテリアへ昼食をしに来ていた。"
translation = "유성 기숙사에 사는 프리뮬라는, 같은 기숙사생인 트레지안나와 함께, 대성당 카페테리아에 점심을 먹으러 와 있었다."

[[dialogue]]
speaker = "プリムラ"
original = "「ん？\u3000外が妙に騒がしいな」"
translation = "「음? 밖이 묘하게 떠들썩하군」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「なんでも、今日は大聖堂で結婚式があるそうですよ」"
translation = "「듣자하니, 오늘은 대성당에서 결혼식이 있다고 하더라고요」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「新婦さんが元星騎士で、学園の卒業生なんだとか。それで結婚式場に大聖堂を選ばれたそうで」"
translation = "「신부님이 전 성기사였던, 학원 졸업생이라고 하더군요. 그래서 결혼식장으로 대성당을 선택하셨다고 해서」"

[[dialogue]]
speaker = "プリムラ"
original = "「ほう……結婚式か……」"
translation = "「호오…… 결혼식인가……」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「おや？\u3000もしかしてプリムラさん、興味あります～？」"
translation = "「어라? 혹시 프리뮬라 씨, 관심 있으세요~?」"

[[dialogue]]
speaker = "プリムラ"
original = "「はぁ！？\u3000な、何を言う！\u3000我が眷族と大聖堂で式を挙げるなどと……」"
translation = "「하아!? 무, 무슨 소리를! 내가 권속과 대성당에서 식을 올린다니……」"

[[dialogue]]
speaker = "プリムラ"
original = "「――フヘへへぇ<emoji=heart04>」"
translation = "「――후헤헤헤에<emoji=heart04>」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「想像しちゃいましたね？」"
translation = "「상상해 버렸네요?」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「ふふっ、このまま会長さんと順調にお付き合いが続けば、遠い未来の話ではないかもしれませんよ～？」"
translation = "「후훗, 이대로 회장님과 순조롭게 만남이 이어진다면, 먼 미래의 이야기가 아닐지도 몰라요~?」"

[[dialogue]]
speaker = "プリムラ"
original = "「か、からかうでないわ……！」"
translation = "「노, 놀리지 마라……!」"

[[dialogue]]
speaker = "プリムラ"
original = "（け、眷族と結婚して夫婦に……<emoji=heart04>\u3000ん？\u3000でも、待てよ……？）"
translation = "(궈, 권속과 결혼해서 부부가……<emoji=heart04> 음? 하지만, 기다려 봐……?)"

[[dialogue]]
speaker = "プリムラ"
original = "（我の体はヒトではない。ならば、結婚したとして、子供は……？）"
translation = "(나의 몸은 인간이 아니다. 그렇다면, 결혼한다고 해도, 아이는……?)"

[[dialogue]]
speaker = "ディーラック"
original = "「……で？\u3000それでお前を作った『ママ』であるボクに相談しに来たと？」"
translation = "「……그래서? 그래서 자신을 만든 『엄마』인 나에게 상담하러 왔다고?」"

[[dialogue]]
speaker = "プリムラ"
original = "「ママ言うな！\u3000そこは絶対に呼ばんからな！？」"
translation = "「엄마라고 부르지 마라! 그건 절대로 안 부를 거니까 말이다!?」"

[[dialogue]]
speaker = "ディーラック"
original = "「やれやれ、プリムラの方から初めて呼び出してきたと思ったら、『子供を作れるかどうか』の相談って……」"
translation = "「이런 이런, 프리뮬라가 먼저 처음으로 불러냈나 싶었더니, 『아이를 만들 수 있는지 어떤지』 상담이라니……」"

[[dialogue]]
speaker = "ディーラック"
original = "「ぷっ……アハハハハ！」"
translation = "「풉…… 아하하하하!」"

[[dialogue]]
speaker = "プリムラ"
original = "「笑うな！\u3000だからこいつに相談するのはイヤだったのじゃ、トレジアンナ！」"
translation = "「웃지 마라! 그래서 이 녀석에게 상담하는 건 싫었느니라, 트레지안나!」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「まあまあ、そこはやはり作り出したご本人が、いちばん詳しいでしょうし……」"
translation = "「자자, 그건 역시 만들어낸 본인이, 가장 잘 아실 테니까요……」"

[[dialogue]]
speaker = "ディーラック"
original = "「ん～、といっても、ぶっちゃけボクにもよくわかんないけどね。まあ、プリムラの体は『賢者の石』でできてるから、いけるんじゃない？」"
translation = "「음~, 그렇다고 해도, 솔직히 나도 잘 모르겠는데. 뭐, 프리뮬라의 몸은 『현자의 돌』로 되어 있으니까, 되지 않을까?」"

[[dialogue]]
speaker = "プリムラ"
original = "「適当じゃな！？」"
translation = "「적당히 말하는구나!?」"

[[dialogue]]
speaker = "ディーラック"
original = "「いや、だってボクはあくまで『マイナスエネルギー回収用の終末兵器』としてお前を作ったわけで、生殖能力なんて考慮しとらんし」"
translation = "「아니, 그야 나는 어디까지나 『마이너스 에너지 회수용 종말병기』로서 너를 만든 거라, 생식 능력 같은 건 고려 안 했거든」"

[[dialogue]]
speaker = "プリムラ"
original = "「というか、前から気になってたんじゃが……」"
translation = "「그보다, 전부터 궁금했었는데……」"

[[dialogue]]
speaker = "プリムラ"
original = "「貴様、我が本当に世界を滅ぼしたらどうするつもりだったのじゃ？」"
translation = "「네놈, 내가 정말로 세계를 멸망시켰다면 어떻게 할 생각이었느냐?」"

[[dialogue]]
speaker = "ディーラック"
original = "「ん～？\u3000なんだかんだ誰かが止めてくれてたでしょ、多分」"
translation = "「음~? 뭐 어떻게든 누군가가 멈춰줬겠지, 아마도」"

[[dialogue]]
speaker = "プリムラ"
original = "「多分！？」"
translation = "「아마도!?」"

[[dialogue]]
speaker = "ディーラック"
original = "「あの時はマイナスエネルギーをバカでかく生み出せればなんでもよかったから、適当なところで誰かが止めてくれたらな～って」"
translation = "「그때는 마이너스 에너지를 엄청나게 만들어낼 수만 있다면 뭐든 좋았으니까, 적당한 시점에 누군가가 멈춰준다면 좋겠네~ 하고」"

[[dialogue]]
speaker = "プリムラ"
original = "「そこも適当！？\u3000くっ……我はこんな奴に作られたのか……！」"
translation = "「그것도 적당히!? 큭…… 나는 이런 녀석에게 만들어진 것인가……!」"

[[dialogue]]
speaker = "ディーラック"
original = "「……でもまあ皮肉なことに、適当に作ったら、ボクの思惑を超えて予想以上に自我が強く育っちゃってさ」"
translation = "「……하지만 뭐 아이러니하게도, 대충 만들었더니, 내 생각을 넘어서 예상 이상으로 자아가 강하게 자라버려서 말야」"

[[dialogue]]
speaker = "ディーラック"
original = "「まさか創造主に噛みつくまで進化するとはね」"
translation = "「설마 창조주를 물어뜯을 정도로 진화할 줄이야」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「おっ、プリムラさん、ママから褒められてますよ～♪」"
translation = "「오옷, 프리뮬라 씨, 엄마한테 칭찬받고 있어요~♪」"

[[dialogue]]
speaker = "ディーラック"
original = "「いや、別に褒めてないし！\u3000負かされた愚痴だっつーの！」"
translation = "「아니, 딱히 칭찬한 거 아닌데! 당한 것에 대한 투덜거림이라고!」"

[[dialogue]]
speaker = "プリムラ"
original = "「と、とにかくじゃ！\u3000その……我は子供を作ろうと思えば可能、ってことでよいのじゃな！？」"
translation = "「어, 어쨌든 말이다! 그…… 나는 아이를 만들려고 생각하면 가능, 하다는 것으로 알면 되겠느냐!?」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「私的にも行けるんじゃないかと思いますよ！\u3000プリムラさんの友達として、私は会長さんとのハッピーエンドを全力で応援します！」"
translation = "「개인적으로는 가능하지 않을까 생각해요! 프리뮬라 씨의 친구로서, 저는 회장님과의 해피엔딩을 전력으로 응원할게요!」"

[[dialogue]]
speaker = "プリムラ"
original = "「……そ、そうか。相談に乗ってくれたこと……感謝する」"
translation = "「……그, 그러냐. 상담에 응해준 것…… 감사하마」"

[[dialogue]]
speaker = "ディーラック"
original = "「あ～あ、終末兵器の癖に、すっかり色気づいちゃってサ～」"
translation = "「아~아, 종말병기 주제에, 아주 연애 기분이 들어버려서는~」"

[[dialogue]]
speaker = "プリムラ"
original = "「うっさいわ！\u3000貴様こそ、シズハのところに戻ってきてから、最近は一緒に風呂に入ったり、寝たりしとるんじゃろ？」"
translation = "「시끄럽다! 네놈이야말로, 시즈하에게 돌아오고 나서, 최근에는 같이 목욕을 하거나, 잠을 자거나 한다며?」"

[[dialogue]]
speaker = "ディーラック"
original = "「なっ、仕方ないだろ！\u3000ボクはシズハちゃんの命令には逆らえないように術式がかかってんだから！」"
translation = "「나앗, 어쩔 수 없잖아! 나는 시즈하 짱의 명령에는 거스룰 수 없게 술식이 걸려 있으니까!」"

[[dialogue]]
speaker = "プリムラ"
original = "「はん、そう言って本当は満更でもない癖に、素直じゃないのじゃ！」"
translation = "「흥, 그렇게 말하면서 사실은 싫지 않은 주제에, 솔직하지 못하느니라!」"

[[dialogue]]
speaker = "ディーラック"
original = "「お前だけには言われたくないんだが！？」"
translation = "「너한테만은 듣고 싶지 않은데!?」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「ふふっ、こうして見ると、やっぱり親子っぽいですね～」"
translation = "「후훗, 이렇게 보니, 역시 모녀 같네요~」"

[[dialogue]]
speaker = "プリムラ"
original = "「誰がじゃ！？」"
translation = "「누가 말이냐!?」"

[[dialogue]]
speaker = "unk"
original = "新たな週の朝。"
translation = "새로운 주간의 아침."

[[dialogue]]
speaker = "unk"
original = "俺が仕事の準備をしていると、勢いよく扉が開く。"
translation = "내가 업무 준비를 하고 있자, 힘차게 문이 열린다."

[[dialogue]]
speaker = "プリムラ"
original = "「――眷族よ！\u3000おはようなのじゃ！」"
translation = "「――권속이여! 안녕이니라!」"

[[dialogue]]
speaker = "unk"
original = "２日ぶり。会いたかったよ"
translation = "이틀 만이네. 보고 싶었어"

[[dialogue]]
speaker = "プリムラ"
original = "「う、うむ……それでじゃな……」"
translation = "「우, 우무…… 그래서 말이다……」"

[[dialogue]]
speaker = "unk"
original = "プリムラはもじもじと視線を泳がせてから、口を開く。"
translation = "프리뮬라는 머뭇머뭇 시선을 헤매다가, 입을 연다."

[[dialogue]]
speaker = "プリムラ"
original = "「わ、我は――ちゃんと子孫を残せるらしいぞ！」"
translation = "「나, 나는―― 제대로 자손을 남길 수 있는 모양이니라!」"

[[dialogue]]
speaker = "unk"
original = "はい！？\u3000いきなりなんの話！？"
translation = "네!? 갑자기 무슨 소리야!?"

[[dialogue]]
speaker = "プリムラ"
original = "「と、とにかくそれだけ報告したかったのじゃ！\u3000そういうことでな！」"
translation = "「어, 어쨌든 그것만은 보고하고 싶었느니라! 그런 것이니!」"

[[dialogue]]
speaker = "プリムラ"
original = "「――放課後まで、さらばなのじゃ～っ！」"
translation = "「――방과 후까지, 작별이니라~앗!」"

[[dialogue]]
speaker = "unk"
original = "顔を赤くしながら、走り去っていくプリムラ。"
translation = "얼굴을 붉히며, 달려 나가는 프리뮬라."

[[dialogue]]
speaker = "unk"
original = "俺はよくわからず、ぽかんとその場で立ち尽くしてしまうのだった。"
translation = "나는 잘 이해하지 못하고, 멍하니 그 자리에 서 있을 수밖에 없었다."

