[[dialogue]]
speaker = "unk"
original = "第４話,恋に夢中,P"
translation = "제4화, 사랑에 푹 빠져서"

[[dialogue]]
speaker = "unk"
original = "とある休日のこと、俺とミルフィーは渋谷に来ていた。"
translation = "어느 휴일, 나와 밀피는 시부야에 와 있었다."

[[dialogue]]
speaker = "unk"
original = "今回の騒動の発端になったゾンビ映画を、２人で見てみることにしたのだ。"
translation = "이번 소동의 발단이 된 좀비 영화를 둘이서 보기로 한 것이다."

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「うっ……ちょっと気分悪いかも……」"
translation = "「윽…… 조금 기분이 안 좋을지도……」"

[[dialogue]]
speaker = "unk"
original = "かなりリアルだったもんね"
translation = "꽤 사실적이었지."

[[dialogue]]
speaker = "unk"
original = "大丈夫？"
translation = "괜찮아?"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ジャクリーヌさんが召喚したゾンビ型幽霊は、あれでもかなりマイルドだったんだね」"
translation = "「자클린 씨가 소환한 좀비형 유령은 저거에 비하면 꽤 순한 편이었네.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「本気のホラー映画を舐めてたよ。ああいうのあんまり見たことなかったから、ビックリしちゃった」"
translation = "「본격적인 호러 영화를 얕봤어. 저런 거 별로 본 적이 없어서 깜짝 놀랐어.」"

[[dialogue]]
speaker = "unk"
original = "でも頑張って最後まで見たね"
translation = "그래도 끝까지 잘 참으며 봤네."

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「うん、１人で見たら、たぶん途中で逃げ出しちゃっただろうね」"
translation = "「응, 혼자 봤으면 아마 중간에 도망쳤을 거야.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「でも、隣に会長くんがいてくれたから……何が起きても大丈夫って、我慢できたんだよ」"
translation = "「하지만 옆에 회장군이 있어 줬으니까…… 무슨 일이 일어나도 괜찮다고 생각하며 참을 수 있었어.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ずっと手を握っててくれたし……ごめんね、強く握り過ぎちゃったよね？\u3000痛くなかった？」"
translation = "「계속 손을 잡아줬고…… 미안해, 너무 세게 잡았지? 아프지 않았어?」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「うわ、赤くなってる……私そんなに握り締めてたんだ……」"
translation = "「우와, 빨개졌어…… 내가 그렇게 꽉 쥐고 있었구나……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「もしかしてそれだけじゃなかったりする？\u3000ぶるぶる震えながら耐えてたから、どうなってたかよく覚えてなくって」"
translation = "「혹시 그것뿐만이 아니었나? 벌벌 떨면서 견디느라 어떻게 됐었는지 잘 기억이 안 나서.」"

[[dialogue]]
speaker = "unk"
original = "背中をさすってあげた"
translation = "등을 토닥여 주었다."

[[dialogue]]
speaker = "unk"
original = "抱き締めてあげた"
translation = "안아 주었다."

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「そんなことしてくれてたんだ？\u3000ありがとう～。それと気付いてなくてごめんね。せっかく会長くんが守ってくれたのに」"
translation = "「그런 걸 해줬었구나? 고마워~. 그리고 눈치채지 못해서 미안해. 어렵게 회장군이 지켜줬는데.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「もったいないなぁ。会長くんが私に優しくしてるとこ、彼女としてちゃんと受け止めたかったなぁ」"
translation = "「아깝네. 회장군이 나한테 다정하게 대해주는 거, 여자친구로서 제대로 받아들이고 싶었는데.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「えへへ……今してくれようとしたでしょ？\u3000いいよ、わざわざしなくても。もちろん再現してくれたら嬉しいけど、そういうのは別の場所でね<emoji=heart04>」"
translation = "「에헤헤…… 지금 해주려고 했지? 괜찮아, 굳이 안 해도. 물론 재현해 주면 기쁘겠지만 그런 건 다른 장소에서 하자<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「それより映画の内容について話そうよ。ゾンビ型幽霊のデザインはだいぶ違ったけど、私とトリシャさんのコンビは、かなり似てなかった？」"
translation = "「그것보다 영화 내용에 대해 얘기하자. 좀비형 유령 디자인은 꽤 달랐지만, 나랑 트리샤 씨 콤비랑 꽤 닮지 않았어?」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「チーパオも似てたし、それに道士とオトモが協力して敵と戦うところとか……」"
translation = "「치파오도 닮았고, 도사와 파트너가 협력해서 적과 싸우는 부분도……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「映画のオトモの子は、かなり人間らしさが少なかったと思う。でも、だからこそ２人がそっと気持ちを通わせるシーンが感動したよね」"
translation = "「영화 속 파트너 아이는 꽤 인간미가 적었다고 생각해. 하지만 그래서 더 두 사람이 살며시 마음을 통하는 장면이 감동적이었지.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「トリシャさんも……私をオトモダチって言ってくれて……映画見てたら思い出して泣けちゃった」"
translation = "「트리샤 씨도…… 나를 친구라고 불러줘서…… 영화를 보니까 그때 생각나서 눈물이 났어.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「似たようなことを経験したから、余計にリアルに感じちゃったのかも」"
translation = "「비슷한 일을 겪어서 그런지 더 리얼하게 느껴진 걸지도 몰라.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「もし、私がチーパオフォームじゃなくて……例えばただのクラスメイトだったとしたら……どうする？」"
translation = "「만약 내가 치파오 폼이 아니라…… 예를 들어 그냥 반 친구였다면…… 어떻게 할 거야?」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「普通にゾンビ型幽霊に襲われちゃうの。そういう可能性も……あったのかな、って……」"
translation = "「평범하게 좀비형 유령에게 습격당했을 거야. 그런 가능성도…… 있었을까 싶어서……」"

[[dialogue]]
speaker = "unk"
original = "ミルフィーは俺が守るよ"
translation = "밀피는 내가 지킬게."

[[dialogue]]
speaker = "unk"
original = "ただのクラスメイトじゃなくて恋人だから"
translation = "그냥 반 친구가 아니라 연인이니까."

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「えへへ……かっこいいなぁ<emoji=heart04>」"
translation = "「에헤헤…… 멋지다아<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「でもでも、相手は幽霊なんだよ？\u3000いくら会長くんが強くても勝てないかも」"
translation = "「하지만 하지만, 상대는 유령이라구? 아무리 회장군이 강해도 이길 수 없을지도 몰라.」"

[[dialogue]]
speaker = "unk"
original = "俺は魔王だから勝つ"
translation = "나는 마왕이니까 이겨."

[[dialogue]]
speaker = "unk"
original = "それでもミルフィーを守る"
translation = "그래도 밀피를 지킬 거야."

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「それは最強の彼氏だね。こわいものなんて１つもないよ」"
translation = "「그건 최강의 남자친구네. 무서울 게 하나도 없어.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ほんと、私にはもったいないくらい、最強で最高の彼氏だね」"
translation = "「정말 나한테는 과분할 정도로 최강이고 최고의 남자친구야.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ねえ、覚えてる？\u3000会長くんと初めてデートした時のこと」"
translation = "「저기, 기억나? 회장군이랑 처음 데이트했을 때 일.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「あの時はまだ恋人でもなんでもなくて、自分の気持ちがわからなくてずっとぐるぐるしてた」"
translation = "「그때는 아직 연인도 뭣도 아니어서, 내 마음을 몰라 계속 갈팡질팡했었지.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「自分ではどうにもできなくて……マグダレナ様に相談することもできなくて……でもそんな時イクシーちゃんが私に教えてくれたの」"
translation = "「스스로는 어떻게 할 수가 없어서…… 막달레나 님에게 상담할 수도 없어서…… 그런데 그때 익실 짱이 나에게 알려줬어.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「それは恋の病だよって」"
translation = "「그건 상사병이라고.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「私は……ミルフィー・インセントは、緋宮クロトくんに、恋をしてるんだよって」"
translation = "「나는…… 밀피 인센트는, 히노미야 쿠로토 군을 사랑하고 있는 거라고.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「そこから、ぱあっと先が開けたの。恋してる自分に振り回されて、でも会長くんとデートして、それが楽しくて嬉しくって、もう全部が夢中で！」"
translation = "「그때부터 앞이 확 트였어. 사랑하는 자신에게 휘둘리면서도 회장군이랑 데이트하고, 그게 즐겁고 기뻐서 정말 모든 게 꿈만 같았어!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「恋愛が楽しかった。デートを重ねるたび、ドキドキが増えていって、もっとずっと好きって気持ちが大きくなって」"
translation = "「연애가 즐거웠어. 데이트를 거듭할수록 두근거림이 늘어갔고, 더 많이 좋아한다는 마음이 커졌어.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「そして……私とあなたは今こうしてここにいる。一対の彼氏彼女として」"
translation = "「그리고…… 나와 당신은 지금 이렇게 여기에 있어. 한 쌍의 연인으로서.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「大好きだよ、すごくすごく<emoji=heart04>\u3000もう、私がどのくらい好きか、どうやって伝えたらいいかわかんないくらい」"
translation = "「사랑해, 정말 정말<emoji=heart04> 이제 내가 얼마나 좋아하는지 어떻게 전해야 할지 모를 정도로.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「今も……現在進行形で、好きになってるよ<emoji=heart04>」"
translation = "「지금도…… 현재 진행형으로 좋아지고 있어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「会長くんはどうかなぁ？\u3000私とデートしてドキドキしてる？\u3000私みたいに、恋に夢中になってる？」"
translation = "「회장군은 어때? 나랑 데이트하면서 두근거려? 나처럼 사랑에 푹 빠져 있어?」"

[[dialogue]]
speaker = "unk"
original = "ミルフィーに負けないくらい大好き"
translation = "밀피에게 지지 않을 만큼 사랑해."

[[dialogue]]
speaker = "unk"
original = "ドキドキしてるよ"
translation = "두근거리고 있어."

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「そっかぁ、よかった……うん、ちゃんと好き同士だね」"
translation = "「그렇구나, 다행이다…… 응, 우린 서로 사랑하는 사이네.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「だからデートがこんなに楽しいんだ。絶対そう。お互いが同じくらい好きじゃないと、きっとこんなに楽しくないもん」"
translation = "「그래서 데이트가 이렇게 즐거운 거야. 분명해. 서로가 똑같이 좋아하지 않으면 분명 이렇게 즐겁지 않을걸.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「だからね、会長くん。私はきっと、これからもどんどん好きになっていくと思うから」"
translation = "「그러니까 회장군. 나는 분명 앞으로도 점점 더 좋아하게 될 거니까.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「会長くんも、私にもっともっと夢中になってね<emoji=heart04>」"
translation = "「회장군도 나한테 점점 더 푹 빠져야 해<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「大好きだよっ<emoji=heart04>」"
translation = "「사랑해!<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "こうして俺とミルフィーは、デートするたびにお互いをもっと好きになっていくのだった。"
translation = "이렇게 나와 밀피는 데이트를 할 때마다 서로를 더 좋아하게 되었다."

