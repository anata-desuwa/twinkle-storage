[[dialogue]]
speaker = "unk"
original = "第３話,聖沙先輩の乙女事情,P"
translation = "제3화, 미사 선배의 소녀 사정, P"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「これが学園の図書室ぅ！！？」"
translation = "「이게 학원 도서실이라고!!?」"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「と、とんでもない規模ね。うちの学園の図書室も大きい方だけどスケールが違うわ……」"
translation = "「마, 말도 안 되는 규모네. 우리 학원 도서실도 큰 편이지만 스케일이 달라……」"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「ともかく案内してくれてありがとう。もう戻ってもらっても大丈夫よ」"
translation = "「어쨌든 안내해 줘서 고마워. 이제 돌아가 봐도 괜찮아」"

[[dialogue]]
speaker = "unk"
original = "本を探すなら手伝うよ"
translation = "책 찾는 거라면 도와줄게"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「い、いえ、必要ないわ！\u3000ひどく個人的な用事だし、付き合わせるのも悪いもの……！」"
translation = "「아, 아니, 필요 없어! 지극히 개인적인 용무고, 같이 있게 하는 것도 미안하니까……!」"

[[dialogue]]
speaker = "unk"
original = "どんな本を探してるの？"
translation = "어떤 책을 찾고 있어?"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「だからいいってば！\u3000単なる読み物よ、読み物……！\u3000こっちの世界の少女小せ──じゃなくて文学に興味があるものだから……！」"
translation = "「그러니까 괜찮다니까! 그냥 읽을거리야, 읽을거리……! 이쪽 세계의 소녀 소ㅅ── 아니 문학에 관심이 있어서 그러니까……!」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「なるほど。文学作品ね。もちろん蔵書があるわよ」"
translation = "「과연. 문학 작품 말이죠. 당연히 소장하고 있어요」"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「わわっ！？\u3000どなたですかっ？」"
translation = "「와왓!? 누구신가요?」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「ここの司書をしているウィステリアよ。クルセイダースの聖沙さんよね？\u3000お噂は伺ってるわ。星徒会のみんなと一緒に騒動を解決してくれたとか」"
translation = "「여기 사서를 맡고 있는 위스테리아예요. 크루세이더스의 미사 씨 맞죠? 소문은 들었어요. 성도회 아이들과 함께 소동을 해결해 줬다고」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「特別に入れるように手続きしたから、どうぞ、ゆっくり見ていって？\u3000文学作品の棚ならあちら──に゛ぃっ！？」"
translation = "「특별히 들어올 수 있도록 절차를 밟았으니 부디 천천히 보고 가세요. 문학 작품 선반이라면 저쪽── 끼이익!?」"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「ああっ！？\u3000突然、書架の本が崩れ落ちて！！\u3000ものの見事に下敷きに！！\u3000け、怪我はありませんか！？」"
translation = "「아앗!? 갑자기 서가 책들이 무너져 내려서!! 보기 좋게 깔려버렸어!! 부, 부상은 없나요!?」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「うぅ、今日もついてないわ……。やっぱり呪われてる……。昨日も帰る途中で獰猛な野犬に絡まれちゃうし……」"
translation = "「으으, 오늘도 운이 없네……. 역시 저주받았어……. 어제도 집에 가는 길에 사나운 들개한테 쫓기고……」"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「な、なんだか幸薄そうな司書さんね……」"
translation = "「뭔가 박복해 보이는 사서분이네……」"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「でもどことなくメリロットさんに雰囲気が似てるような……。ただ者ではない気配を感じるわ……」"
translation = "「하지만 어딘지 모르게 메릴로트 씨랑 분위기가 비슷한 것 같은……. 보통내기가 아닌 기운이 느껴져……」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「だだだ、大丈夫ですかっ？\u3000すごい音がしましたよ……！」"
translation = "「괘괘, 괜찮으세요? 엄청난 소리가 났어요……!」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「ああ、紙屋敷さん。いいところに。私は本を片付けないといけないから、代わりに彼女を案内してもらえないかしら。文学作品を見たいそうなんだけど」"
translation = "「아아, 카미야시키 씨. 마침 잘 왔어요. 나는 책을 정리해야 하니까 대신 그녀를 안내해 주지 않을래요. 문학 작품을 보고 싶다는데」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「文学作品、ですか？\u3000色々とジャンルがありますけど……」"
translation = "「문학 작품 말인가요? 여러 장르가 있긴 한데……」"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「い、いえ、本当に一人で大丈夫よ。お手間を取らせるのも申し訳ないしね」"
translation = "「아, 아니, 정말로 혼자서 괜찮아. 번거롭게 하는 것도 미안하고 말이야」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「そう言わずに、好みを言ってもらえればお勧めも紹介するわよ。ここは純文学から少女漫画まで、なんでもござれだから」"
translation = "「그러지 말고 취향을 말해주면 추천도 해줄게요. 여기는 순수 문학부터 소녀 만화까지 없는 게 없으니까」"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「！！\u3000しょ、少女漫画も置いてあるの！？」"
translation = "「!! 소, 소녀 만화도 있는 거야!?」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「あなたも興味ある？\u3000よかったら借りていく？」"
translation = "「관심 있으세요? 괜찮으면 빌려 갈래요?」"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「ぜ、是非──」"
translation = "「부, 부디──」"

[[dialogue]]
speaker = "unk"
original = "聖沙が少女漫画を……？"
translation = "미사가 소녀 만화를……?"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「と言いたいところだけど、やめておくわ！\u3000そういった漫画は読まないの。私は複雑で難解な、それはもう１行読むだけで眠気を誘われかねない純文学しか嗜まないものだから」"
translation = "「라고 말하고 싶지만, 관둘래! 그런 만화는 안 읽어. 나는 복잡하고 난해한, 그야말로 한 줄 읽는 것만으로 잠이 쏟아질 만한 순수 문학만 즐기니까」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「あら、それは残念ね。実写化やアニメ化もした、累計売上１０００万部突破のおすすめ作品があったんだけど。原作は小説だけどね」"
translation = "「어머, 그건 유감이네. 실사화나 애니화도 된 누적 판매량 1000만 부 돌파 추천작이 있었는데. 원작은 소설이지만요」"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「！！\u3000そ、そこまで言うなら読んでみてもいいかもしれないわ。それに小説の方がむしろありがた──」"
translation = "「!! 그, 그렇게까지 말한다면 읽어볼 수도 있겠네. 게다가 소설 쪽이 오히려 고맙──」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「いえいえ、本は無理に勧めるものじゃないから。ね、会長くん」"
translation = "「아니 아니, 책은 억지로 권하는 게 아니니까요. 그렇죠, 회장군」"

[[dialogue]]
speaker = "unk"
original = "その通りかと"
translation = "그렇긴 하죠"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「！！\u3000そ、そうね。まぁでも一応タイトルくらいは教えてもらえないかしら。べ、別に興味はないんだけどね！」"
translation = "「!! 그, 그렇네. 뭐 그래도 일단 제목 정도는 알려줄 수 없을까. 딱, 딱히 관심은 없지만 말이야!」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「それなら複雑で難解な眠気を誘う純文学作品の方を紹介するわね♪\u3000聖沙さんもそちらの方が嬉しいでしょうし♪」"
translation = "「그럼 복잡하고 난해해서 잠이 오는 순수 문학 작품 쪽을 소개해 줄게요♪ 미사 씨도 그쪽이 더 기쁘시죠?♪」"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「ぐっ……！\u3000て、手強い……」"
translation = "「윽……! 머, 먹히지 않아……」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「あ、あの。とりあえず案内、しますね？」"
translation = "「저, 저기. 일단 안내해 드릴게요」"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「ああいえ、やっぱり私は一人で──」"
translation = "「아아 아니, 역시 나는 혼자서──」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「まぁそう仰らずに。少女小説の置いてある書架にこっそり案内しますから」"
translation = "「그러지 마시고. 라이트 노벨이 있는 서가로 몰래 안내해 드릴 테니까요」"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「！！\u3000あ、あなた、どうして」"
translation = "「!! 너, 너 어떻게」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「え？\u3000本当は少女小説が読みたいけど、恥ずかしいからごまかしている……ということじゃなかったんですか？」"
translation = "「네? 사실은 소녀 소설을 읽고 싶지만 부끄러워서 숨기고 있는 거…… 아니었나요?」"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「全部バレてる！？」"
translation = "「다 들켰어!?」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「こちらの『Ｇ線上のトライアングル\u3000～姉妹の輪舞～』なんかどうでしょう。女子校の寮で、平凡な主人公が氷の姫と呼ばれる生徒会長と出会うお話なんですが」"
translation = "「이쪽의 『G선상의 트라이앵글 ~자매의 론도~』는 어떨까요. 여학교 기숙사에서 평범한 주인공이 얼음 공주라 불리는 학생회장과 만나는 이야기인데」"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「ペラペラペラ──っっ！！\u3000確かに私の好みドストライクだわ……！\u3000よ、読みたい……！\u3000でも傍に会長さんが（チラチラ）」"
translation = "「(술술술)──!! 확실히 내 취향 정중앙이야……! 읽, 읽고 싶어……! 하지만 옆에 회장님이 (힐끗힐끗)」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「大丈夫ですよ。会長は今ウィステリアさんのお手伝いで忙しいでしょうし。たとえそれが終わっても──」"
translation = "「괜찮아요. 회장은 지금 위스테리아 씨를 돕느라 바쁠 테니까요. 설령 그게 끝나도──」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「きゃああああっっ！？\u3000どうして書架に本を入れたら、他の本が落っこちてくるの～！？」"
translation = "「꺄아아악!? 어째서 서가에 책을 꽂았는데 다른 책이 떨어지는 거야~!?」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ああしてまた何かしら不幸が起こるはずなので、会長もしばらく動けないと思います」"
translation = "「저렇게 또 무슨 불운이 일어날 게 뻔해서 회장도 한동안 못 올 거예요」"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「わ、笑わないの……？\u3000私が少女小説が好きなこと……。この歳になっても、その。白馬の王子様に憧れていても……」"
translation = "「비, 비웃지 않을 거야……? 내가 소녀 소설을 좋아하는 거……. 이 나이 먹고도 그, 백마 탄 왕자님을 동경하는 거……」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「図書委員ですから。本を好きな人の気持ちを笑ったりしません」"
translation = "「도서위원이니까요. 책을 좋아하는 사람의 마음을 비웃거나 하지 않아요」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「それに私だって自分の妄想を小説にしているくらいで……あはは」"
translation = "「게다가 저도 제 망상을 소설로 쓰고 있는 정도라…… 아하하」"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「っっ。あなたとは良いお友達になれそう……。良ければ、お勧めの小説を貸してもらえないかしら。あ、でも私、近いうちに元の世界に戻らなくちゃいけなくて……」"
translation = "「읏. 너와는 좋은 친구가 될 수 있을 것 같아……. 괜찮다면 추천하는 소설을 빌려줄 수 있을까. 아, 하지만 나 곧 원래 세계로 돌아가야 해서……」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「な、なら一緒に買いに行きませんか？\u3000それなら持って帰れますし。わたしも、その。色々見ながら少女小説について聖沙さんと語り合いたいなぁ、なんて……」"
translation = "「그, 그럼 같이 사러 가지 않을래요? 그러면 가져갈 수 있으니까요. 저도 그, 여러 가지 보면서 소녀 소설에 대해 미사 씨와 이야기 나누고 싶기도 하고……」"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「～～っっ。すごく嬉しいわ。迷惑じゃなければそのままモネさんのお部屋にお泊まりしてもいい……？\u3000り、理想のシチュエーションについて語り明かしたいの……」"
translation = "「~~읏. 정말 기뻐. 실례가 안 된다면 그대로 모네 씨 방에서 자고 가도 될까……? 이, 이상적인 상황에 대해 밤새도록 이야기하고 싶어……」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「え、えへへ、わかります……。ぜひぜひ、です……」"
translation = "「에, 에헤헤, 알 것 같아요……. 꼭, 꼭 그래요……」"

[[dialogue]]
speaker = "unk"
original = "なんだか少し見ない間に"
translation = "어느새 조금 안 본 사이에"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「２人とも随分と仲良しになったみたいね。ふふ、これぞ青春ってやつなのかしら♪」"
translation = "「둘 다 꽤 친해진 모양이네. 후후, 이것이 바로 청춘이라는 걸까요♪」"

