[[dialogue]]
speaker = "アナ"
original = "「……ふう。今日は疲れました。星徒会の事務仕事を終えて帰ろうとしていた矢先に、モンスターの出現。１番厄介なパターン」"
translation = "「……후우. 오늘은 지쳤어요. 성도회의 사무 업무를 마치고 돌아가려던 참에, 몬스터의 출현. 가장 성가신 패턴」"

[[dialogue]]
speaker = "アナ"
original = "「……？\u3000どうして膝の上に座っているのかって……これが休憩する上で、最も効率がいいので」"
translation = "「……? 어째서 무릎 위에 앉아 있냐니…… 이게 휴식하는 데 있어 가장 효율이 좋으니까요」"

[[dialogue]]
speaker = "unk"
original = "俺とアナが恋人になってから──いや、その少し前から、アナは時折こうやって、ストレートに甘えてきてくれるようになっていた。"
translation = "나와 아나가 연인이 되고 나서── 아니, 그 조금 전부터, 아나는 때때로 이렇게 대놓고 어리광을 부려 오게 되었다."

[[dialogue]]
speaker = "アナ"
original = "「それよりも、会長……お尻に固いものが、当たってる」"
translation = "「그보다, 회장님…… 엉덩이에 딱딱한 게 닿고 있어」"

[[dialogue]]
speaker = "アナ"
original = "「んんっ……意外と節操なし。でも、分かりやすいのはいいこと<emoji=heart04>」"
translation = "「응읏…… 의외로 지조 없네. 하지만, 알기 쉬운 건 좋은 일이야<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「……今日も、しますか？\u3000私はノープロブレム。むしろ、その気になってきた……はふぅ……<emoji=heart04>」"
translation = "「……오늘도 할까요? 저는 노 프로블럼. 오히려 그럴 기분이 들기 시작했어…… 하후우……<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「リノさんは今日、泊まり込み……？\u3000最高に好都合。んふ……ベッドの上で、今日も朝まで搾り取ってあげます<emoji=heart04>」"
translation = "「리노 씨는 오늘 외박……? 최고의 기회. 응후…… 침대 위에서 오늘도 아침까지 짜내 줄게요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺の部屋に入ると、そのままアナからベッドの上に押し倒され、服を脱がされた。"
translation = "내 방에 들어가자마자 아나에게 침대 위로 밀쳐졌고, 옷이 벗겨졌다."

[[dialogue]]
speaker = "アナ"
original = "「ふぅぅ……こうなってしまえば、会長はもうまな板の上の鯉。されるがまま。私の下で気持ちよく精液を吐き出すだけ<emoji=heart04>」"
translation = "「후우우…… 이렇게 되어버리면 회장님은 이제 도마 위의 잉어. 당하는 대로 있을 뿐. 내 밑에서 기분 좋게 정액을 뱉어낼 뿐이야<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「はあぁ……会長のチ○ポ、もうガチガチ。巨根で、たくましくて、しかも絶倫。そんな凶悪チ○ポは、天使の私が静めなくては……んふぅ……<emoji=heart04>」"
translation = "「하아아…… 회장님의 자지, 벌써 꼿꼿해. 거근에 늠름하고, 게다가 절륜. 그런 흉악한 자지는 천사인 내가 진정시켜야…… 응후우……<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「ふうぅっ、んふっ……ふあぁ、デカチ○ポ、押しつけたおま○こをたまらず、押し返してきてます……ぷにぷにまん肉、気持ちいい<emoji=heart04>？」"
translation = "「후우우읏, 응훗…… 후아아, 거대 자지, 눌러붙인 보지가 견디지 못하고 밀어내고 있어요…… 말랑말랑한 보지 살, 기분 좋아<emoji=heart04>?」"

[[dialogue]]
speaker = "アナ"
original = "「んっ、はぁっ、ふぅぅ……<emoji=heart04>\u3000わかっていると、思いますが……気持ちよくても、おま○この中に入れては、ダメですよ……んふぅっ<emoji=heart04>」"
translation = "「응, 하앗, 후우우……<emoji=heart04> 알고 있다고 생각하지만…… 기분 좋아도 보지 안에는 넣으면 안 돼요…… 응후웃<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「はぁぁ……ほとんど迷信のような、ものですが<emoji=heart04>\u3000私たち天使はっ、はあぁ……処女を失ってしまうと、星力は弱くなると、言われているので……ふっ、ふうぅ<emoji=heart04>」"
translation = "「하아아…… 거의 미신 같은 거지만<emoji=heart04> 우리 천사들은, 하아아…… 처녀를 잃어버리면 성력이 약해진다고들 하니까…… 훗, 후우우<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「単なる、噂話だとは、思いますがぁ……はぁ<emoji=heart04>\u3000んあぁっ、もし本当だったら困る……。だから、おま○こに入れるのは禁止……ふあぁっ<emoji=heart04>」"
translation = "「단순한 소문이라고는 생각하지만요…… 하아<emoji=heart04> 응아앗, 만약 진짜라면 곤란해……. 그러니까 보지에 넣는 건 금지…… 후아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "天界の天使にとって、結婚まで処女を貫くことは当たり前のことらしい。"
translation = "천계의 천사에게 있어 결혼 전까지 처녀를 지키는 것은 당연한 일인 듯하다."

[[dialogue]]
speaker = "unk"
original = "しかし、人間界にやってきた天使が全員律義にそれを守っているわけでもなく……"
translation = "하지만 인간계에 온 천사들이 모두 성실하게 그것을 지키고 있는 것도 아니고……"

[[dialogue]]
speaker = "unk"
original = "星力うんぬんもほとんど迷信……とはアナの発言だが、天界で育ったアナとしてはその教えに背くのは、まだ抵抗感があるらしい。"
translation = "성력 어쩌구 하는 것도 거의 미신……이라는 것이 아나의 발언이지만, 천계에서 자란 아나로서는 그 가르침을 어기는 것에 아직 저항감이 있는 모양이다."

[[dialogue]]
speaker = "アナ"
original = "「はぁ、んんっ……<emoji=heart04>\u3000会長、残念そうな顔<emoji=heart04>\u3000いつも悪いとは、思ってる……」"
translation = "「하아, 응읏……<emoji=heart04> 회장님, 아쉬운 표정<emoji=heart04> 언제나 미안하다고는 생각하고 있어……」"

[[dialogue]]
speaker = "アナ"
original = "「でも、大丈夫。んはぁっ……おま○この奥は、あなたで予約済<emoji=heart04>\u3000女神様にだって誓える……んあぁっ<emoji=heart04>」"
translation = "「하지만 괜찮아. 응하앗…… 보지 속은 당신으로 예약 완료<emoji=heart04> 여신님께도 맹세할 수 있어…… 응아앗<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「あっ<emoji=heart04>\u3000んっ、んんっ……チ○ポが跳ねた。びくびくしてる……ふあぁっ、おま○こ貫きたくて仕方がないって言ってる<emoji=heart04>」"
translation = "「앗<emoji=heart04> 응, 응읏…… 자지가 튀어 올랐어. 파르르 떨고 있어…… 후아앗, 보지 꿰뚫고 싶어서 어쩔 줄 모르겠다고 말하고 있어<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「んあっ、あぁんっ、んふぅっ……ロ〇おま○こに、チ○ポを挿れた感触を、想像してしまいましたか？\u3000あっ、んんっ<emoji=heart04>\u3000そんな擦り付けても、ダメです……ふぅぅっ」"
translation = "「응앗, 아앙, 응훗…… 로리 보지에 자지를 삽입한 감촉을 상상해 버렸나요? 앗, 응읏<emoji=heart04> 그렇게 문질러대도 안 돼요…… 후우우읏」"

[[dialogue]]
speaker = "アナ"
original = "「んっ、く、ふう……はあぁ……<emoji=heart04>\u3000入れるのは禁止ですが、擦りつけるだけなら……んっ、はぁぁ……<emoji=heart04>」"
translation = "「응, 윽, 후우…… 하아아……<emoji=heart04> 넣는 건 금지지만, 문지르는 것뿐이라면…… 응, 하아아……<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「愛液が凄い、ですか……？\u3000あたり、まえ<emoji=heart04>\u3000んっ、ふう……エロいことしてたら、エロい液体は、おま○こから出てくる……はぁぁ……<emoji=heart04>」"
translation = "「애액이 엄청나다, 고요……? 당연, 하죠<emoji=heart04> 응, 후우…… 야한 짓을 하면, 야한 액체는, 보지에서 나오는 법이니까…… 하아아……<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「こうしてたら、チ○ポもぬちゃぬちゃになる<emoji=heart04>\u3000潤滑液代わり……んっ、はぁ、はぁ、んんっ……粘り気のある水音がえっち……んふぅ……<emoji=heart04>」"
translation = "「이렇게 하고 있으면, 자지도 끈적끈적해져<emoji=heart04> 윤활제 대신…… 응, 하아, 하아, 으응…… 끈기 있는 물소리가 야해…… 응후우……<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「はぁ、はぁぁ……これだけ濡れれば……もう大丈夫……<emoji=heart04>」"
translation = "「하아, 하아아…… 이만큼 젖었으면…… 이제 괜찮아……<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「んふぅ……おま○この代わりの、お尻の穴<emoji=heart04>\u3000今日もこっちで、気持ちよくする……<emoji=heart04>」"
translation = "「응후우…… 보지 대신인, 똥구멍<emoji=heart04> 오늘도 이쪽으로, 기분 좋게 해줄게……<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「んっ、準備……？\u3000大丈夫、もうお尻の穴で……ふぅぅ……アナルでエッチすることは慣れた<emoji=heart04>\u3000チ○ポに擦りつけたおかげで、入り口もぐちょぐちょになってる……はぁぁ<emoji=heart04>」"
translation = "「응, 준비……? 괜찮아, 벌써 똥구멍으로…… 후우우…… 애널로 섹스하는 건 익숙해졌어<emoji=heart04> 자지에 문지른 덕분에, 입구도 질척질척해졌어…… 하아아<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「んっ、くっ、ふぅぅ……<emoji=heart04>\u3000チ○ポ、お尻の穴の入り口にくっついた……私のアナルに……入って、い、くぅ……<emoji=heart04>！」"
translation = "「응, 윽, 후우우……<emoji=heart04> 자지, 똥구멍 입구에 닿았어…… 내 애널에…… 들어, 오, 고 있어……<emoji=heart04>!」"

[[dialogue]]
speaker = "アナ"
original = "「んおぉっ！？\u3000はあっ、んくっ、ふうぅ、ふあああああああああ～～～っ……！」"
translation = "「응오옷!? 하앗, 응윽, 후우우, 후아아아아아아아아아~~앗……!」"

[[dialogue]]
speaker = "アナ"
original = "「おっ<emoji=heart04>\u3000ほぉぉぉ……<emoji=heart04>\u3000やばぁ、これ、アナルの内側<emoji=heart04>\u3000極太カリでごりごりって、してぇ……ん、ふぁ、はあ、はあっ、はああぁっ……<emoji=heart04>！」"
translation = "「오옷<emoji=heart04> 호오오오……<emoji=heart04> 위험해, 여기, 애널 안쪽<emoji=heart04> 굵직한 귀두로 고리고리하고, 비벼져서…… 응, 하아, 하아, 하앗, 하아아앗……<emoji=heart04>!」"

[[dialogue]]
speaker = "アナ"
original = "「う、く、ふううぅっ！\u3000巨根チ○ポ<emoji=heart04>\u3000竿の根本まで飲み込まれてぇ……<emoji=heart04>\u3000ふあぁっ、熱いぃ……！\u3000あっ……はあっ、んあぁっ……はぁんっ…！」"
translation = "「으, 윽, 후우우읏! 거근 자지<emoji=heart04> 기둥 뿌리까지 삼켜지고 싶어……<emoji=heart04> 후아앗, 뜨거워……! 앗…… 하앗, 응아앗…… 하앙……!」"

[[dialogue]]
speaker = "アナ"
original = "「まずは、ゆっくり動かして……<emoji=heart04>\u3000ふぅ、ふうぅ……チ○ポ、慣らしていく……<emoji=heart04>\u3000んっ、んんっ……！\u3000んおぉっ……カリ首すっごぉ……ふぅぅっ……！」"
translation = "「우선은, 천천히 움직여줘……<emoji=heart04> 후우, 후우우…… 자지, 익숙해지게 해줘……<emoji=heart04> 응, 으응……! 응오옷…… 귀두 끝부분 굉장해…… 후우우읏……!」"

[[dialogue]]
speaker = "アナ"
original = "「はああぁ……はああぁ……んっ、んおっ<emoji=heart04>！？\u3000粘膜、擦れて気持ちいいっ……んっ、んううう！\u3000やばぁ、会長のチ○ポ<emoji=heart04>\u3000でかくて……んんっ、変な声、出る……んおぉっ<emoji=heart04>」"
translation = "「하아아아…… 하아아아…… 응, 응오옷<emoji=heart04>!? 점막이, 쓸려서 기분 좋아…… 응, 응으으으! 위험해, 회장님의 자지<emoji=heart04> 커서…… 으응, 이상한 목소리, 나와…… 응오옷<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「ふうぅぅ……！\u3000ふううぅぅ……<emoji=heart04>！\u3000そ、そこっ……んっ、んんっ！\u3000はあぁ……か、会長は、気持ちいい<emoji=heart04>？\u3000私は……おっ、おほぉっ<emoji=heart04>\u3000そこ気持ちいいっ……おぉんっ……<emoji=heart04>」"
translation = "「후우우우……! 후우우우……<emoji=heart04>! 거, 거기…… 응, 으응! 하아아…… 회, 회장님은, 기분 좋아<emoji=heart04>? 나는…… 오, 오호옷<emoji=heart04> 거기 기분 좋아…… 오오온……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「っ……アナのケツアナ、締め付けが凄くて、気持ちよすぎる……！」"
translation = "「윽…… 아나의 똥구멍, 조임이 엄청나서, 너무 기분 좋아……!」"

[[dialogue]]
speaker = "アナ"
original = "「け、ケツアナって言い方、下品でえっちです……<emoji=heart04>！\u3000んっ、はあぁ……んおぉっ、ケツアナいいっ<emoji=heart04>\u3000んはぁぁぁ……っ」"
translation = "「똥, 똥구멍이라니 말하는 방식, 저질스럽고 야해요……<emoji=heart04>! 응, 하아아…… 응오옷, 똥구멍 좋아<emoji=heart04> 응하아아아……윽」"

[[dialogue]]
speaker = "アナ"
original = "「あっ<emoji=heart04>\u3000やばっ、弱いとこ擦れてっ……おぉっ、おほっ<emoji=heart04>\u3000そこ、そこいいっ……ふああぁぁっ<emoji=heart04>！」"
translation = "「앗<emoji=heart04> 위험해, 약한 곳이 쓸려서…… 오옷, 오홋<emoji=heart04> 거기, 거기 좋아…… 후아아아앗<emoji=heart04>!」"

[[dialogue]]
speaker = "アナ"
original = "「はあぁ……んっ、はああぁ<emoji=heart04>\u3000……こうやって、乳首もいじってぇ……<emoji=heart04>\u3000もっとケツアナの感度上げる<emoji=heart04>\u3000……んっ、んおっ、んおぉぉんっ！」"
translation = "「하아아…… 응, 하아아아<emoji=heart04> ……이렇게, 젖꼭지도 만져줘……<emoji=heart04> 좀 더 똥구멍의 감도를 높여줘<emoji=heart04> ……응, 응오옷, 응오오온!」"

[[dialogue]]
speaker = "アナ"
original = "「おほっ、んっ、乳首っ！\u3000はああっ……んあぁぁっ……<emoji=heart04>！\u3000いい……乳首コリコリ、気持ちいいっ……<emoji=heart04>！\u3000おっ、おぉっ、ケツアナに響く、おほっ、んおぉぉんっ……！」"
translation = "「오호, 응, 유두! 하아아…… 응아아아……<emoji=heart04>! 좋아…… 유두 오독오독, 기분 좋아……<emoji=heart04>! 오, 오오, 항문에 울려, 오호, 응오오오응……!」"

[[dialogue]]
speaker = "アナ"
original = "「はぁっ、はぁぁっ、ケツアナと乳首の相性やばぁ……<emoji=heart04>\u3000んっ、んおぉっ<emoji=heart04>\u3000どっちも、おま○こ熱くなって、愛液いっぱい溢れてくる……<emoji=heart04>\u3000ふあぁっ！」"
translation = "「하아, 하아아, 항문이랑 유두 궁합 대박이야……<emoji=heart04> 응, 응오오<emoji=heart04> 둘 다, 보지 뜨거워져서, 애액 잔뜩 넘쳐흘러……<emoji=heart04> 후아아!」"

[[dialogue]]
speaker = "アナ"
original = "「んおっ、お、お、おふっ、んくうっ<emoji=heart04>！\u3000ふっ、ふううぅ……<emoji=heart04>！\u3000これやば、本当にやばっ……ケツアナと乳首、同時責め……<emoji=heart04>\u3000んおっ、ふおぉ……か、感じるぅ……！」"
translation = "「응오, 오, 오, 오후, 응쿠우<emoji=heart04>! 후, 후우우우……<emoji=heart04>! 이거 대박, 진짜 대박…… 항문이랑 유두, 동시 공략……<emoji=heart04> 응오, 후오오…… 느, 느껴져어……!」"

[[dialogue]]
speaker = "unk"
original = "俺はエッチなアナの姿に興奮を抑えきれず、ペニスをギリギリまで引き抜いて、一気にアナルの奥へと突き入れた。"
translation = "나는 야한 아나의 모습에 흥분을 억제하지 못하고, 자지를 끝까지 빼냈다가, 단숨에 애널 깊숙한 곳까지 찔러 넣었다."

[[dialogue]]
speaker = "アナ"
original = "「んおおおおおおぉぉぉ～～～っ<emoji=heart04>！？\u3000んお、おっ、ふおおおぉっ<emoji=heart04>！\u3000チ○ポッ、奥に、一気にきたぁっ<emoji=heart04>！\u3000んはっ、はぁんっ、おほっ、んおぉぉんっ<emoji=heart04>！」"
translation = "「응오오오오오오오～～～<emoji=heart04>!? 응오, 오, 후오오오<emoji=heart04>! 자지, 안쪽에, 단숨에 왔어어<emoji=heart04>! 응하, 하앙, 오호, 응오오오응<emoji=heart04>!」"

[[dialogue]]
speaker = "アナ"
original = "「ダメダメ<emoji=heart04>\u3000そんな強くしたら、んおっ、ほおおっ……<emoji=heart04>！\u3000んっ、はぁっ、んあぁぁんっ！\u3000変な声、と、止まらなくなる……んおっ<emoji=heart04>\u3000んおぉぉんっ<emoji=heart04>！」"
translation = "「안 돼 안 돼<emoji=heart04> 그렇게 세게 하면, 응오, 호오오……<emoji=heart04>! 응, 하아, 응아아앙! 이상한 목소리, 머, 멈추지 않게 돼…… 응오<emoji=heart04> 응오오오응<emoji=heart04>!」"

[[dialogue]]
speaker = "アナ"
original = "「あっ、はっ……<emoji=heart04>！\u3000ケツアナ、チ○ポ勝手に締め付けちゃうっ<emoji=heart04>\u3000ふっ、ふぅぅぅ……<emoji=heart04>」"
translation = "「앗, 하……<emoji=heart04>! 항문이, 자지 멋대로 조여버려어<emoji=heart04> 후, 후우우우……<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あぁぁん<emoji=heart04>\u3000し、刺激つよっ、ふおぉぉっ<emoji=heart04>！\u3000んっ、んおっ！\u3000やばっ<emoji=heart04>\u3000気持ち、気持ちいいっ……おほぉぉっ<emoji=heart04>！」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 아아앙<emoji=heart04> 자, 자극 너무 세, 후오오오<emoji=heart04>! 응, 응오! 대박<emoji=heart04> 기분, 기분 좋아…… 오호오오<emoji=heart04>!」"

[[dialogue]]
speaker = "アナ"
original = "「ケツアナ、なんでこんな、気持ちいいのぉっ<emoji=heart04>！\u3000エッチする為の、穴じゃないのにぃ<emoji=heart04>\u3000なんで、なんでぇ……<emoji=heart04>\u3000んおぉっ、おほっ、そこ、そこいいのぉっ！\u3000んおぉぉんっ<emoji=heart04>！」"
translation = "「항문, 왜 이렇게, 기분 좋은 거야아<emoji=heart04>! 섹스하기 위한, 구멍이 아닌데에<emoji=heart04> 왜, 왜애……<emoji=heart04> 응오오, 오호, 거기, 거기 좋아아! 응오오오응<emoji=heart04>!」"

[[dialogue]]
speaker = "クロト"
original = "「俺はいつもっ、アナのおま○こにしてるつもりで、やってるからっ……！」"
translation = "「나는 항상, 아나의 보지에 하고 있다는 생각으로, 하고 있으니까……!」"

[[dialogue]]
speaker = "アナ"
original = "「そ、それってどういうっ……<emoji=heart04>\u3000おっ、おほっ、んおぉっ<emoji=heart04>！\u3000あっ、ダメダメ、そこっ、おほぉぉっ<emoji=heart04>！」"
translation = "「그, 그건 무슨……<emoji=heart04> 오, 오호, 응오오<emoji=heart04>! 앗, 안 돼 안 돼, 거기, 오호오오<emoji=heart04>!」"

[[dialogue]]
speaker = "クロト"
original = "「っ……アナの、本当のおま○このつもりで……はぁっ、愛してるつもりってことだっ……！」"
translation = "「윽…… 아나의, 진짜 보지라고 생각하고…… 하아, 사랑하고 있다는 뜻이야……!」"

[[dialogue]]
speaker = "アナ"
original = "「そ、そんな……<emoji=heart04>\u3000でも、おま○こでするのはぁっ<emoji=heart04>\u3000んおっ、ほおぉぉぉっ<emoji=heart04>！？\u3000ケツアナ、弱いところばっかり、突いちゃダメぇっ<emoji=heart04>！\u3000おっ、おほっ、んおぉぉぉんっ<emoji=heart04>！」"
translation = "「그, 그런……<emoji=heart04> 하지만, 보지로 하는 건어어<emoji=heart04> 응오, 호오오오오<emoji=heart04>!? 항문, 약한 곳만, 찌르면 안 돼애<emoji=heart04>! 오, 오호, 응오오오오응<emoji=heart04>!」"

[[dialogue]]
speaker = "アナ"
original = "「わ、私、まだ処女なのにぃっ……<emoji=heart04>\u3000んっ、はああっ、んあぁぁんっ<emoji=heart04>！\u3000ケツアナ通して、おま○この快感<emoji=heart04>\u3000教え込まれちゃってるぅっ<emoji=heart04>！\u3000おっ、おっ、おほぉぉぉんっ<emoji=heart04>！」"
translation = "「나, 나, 아직 처녀인데에……<emoji=heart04> 응, 하아아, 응아아앙<emoji=heart04>! 항문을 통해서, 보지의 쾌감<emoji=heart04> 주입당하고 있어어<emoji=heart04>! 오, 오, 오호오오오응<emoji=heart04>!」"

[[dialogue]]
speaker = "アナ"
original = "「おっ<emoji=heart04>\u3000おほっ、んおっ、んおぉんっ<emoji=heart04>！\u3000お、おま○こ、おかしいっ<emoji=heart04>\u3000んあっ！\u3000チ○ポ挿れられてるの、ケツアナなのにぃっ<emoji=heart04>\u3000あっ、あっ、ふあぁぁぁんっ<emoji=heart04>！」"
translation = "「오<emoji=heart04> 오호, 응오, 응오오응<emoji=heart04>! 보, 보지, 이상해애<emoji=heart04> 응앗! 자지 삽입된 건, 항문인데에<emoji=heart04> 앗, 앗, 후아아아앙<emoji=heart04>!」"

[[dialogue]]
speaker = "アナ"
original = "「おっ、おま○こ、チ○ポ入ってるみたいに<emoji=heart04>\u3000きゅうきゅう収縮して……おっ、んおっ、おほぉぉっ<emoji=heart04>！\u3000イメージ、しちゃってるぅっ<emoji=heart04>\u3000ふあっ、ふあぁっ、んあぁぁんっ<emoji=heart04>！」"
translation = "「오, 보지, 자지 들어와 있는 것처럼<emoji=heart04> 꽉꽉 수축해서…… 오, 응오, 오호오오<emoji=heart04>! 이미지, 해버리고 있어어<emoji=heart04> 후앗, 후아아, 응아아앙<emoji=heart04>!」"

[[dialogue]]
speaker = "アナ"
original = "「んふぉ、お、お、お、おほぉぉぉっ<emoji=heart04>！\u3000ま、待って会長、おかしくなるっ<emoji=heart04>\u3000ふ、ふおぉぉぉ……！\u3000おま○こ本当に<emoji=heart04>\u3000セックスしてるみたいで<emoji=heart04>\u3000おかしくなるぅっ<emoji=heart04>！」"
translation = "「응포, 오, 오, 오, 오호오오오<emoji=heart04>! 기, 기다려요 회장님, 이상해져어<emoji=heart04> 후, 후오오오오……! 보지 정말로<emoji=heart04> 섹스하는 것 같아서<emoji=heart04> 이상해져어어!」"

[[dialogue]]
speaker = "クロト"
original = "「アナは、おま○こでセックスするのっ……嫌か？」"
translation = "「아나는, 보지로 섹스하는 거…… 싫어?」"

[[dialogue]]
speaker = "アナ"
original = "「ふう、ふう、ふぅぅ<emoji=heart04>\u3000……い、嫌じゃない<emoji=heart04>\u3000嫌じゃない、けどぉ<emoji=heart04>\u3000でも万が一、星力が弱くなったりしたら……んっ、んはぁっ<emoji=heart04>」"
translation = "「후우, 후우, 후우우<emoji=heart04> ……시, 싫지 않아<emoji=heart04> 싫지 않지만아아<emoji=heart04> 하지만 만약에, 성력이 약해지거나 하면…… 응, 응하아<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「本当にするわけじゃないけど……このままっ、アナルセックスで、アナのおま○こまでっ……一緒に愛したいんだっ」"
translation = "「진짜로 하는 건 아니지만…… 이대로, 애널 섹스로, 아나의 보지까지…… 함께 사랑하고 싶어」"

[[dialogue]]
speaker = "アナ"
original = "「んふぉっ<emoji=heart04>！？\u3000だ、ダメッ<emoji=heart04>！\u3000本気ピストンっ、んお、おふううっ！\u3000んんっ、きもち、気持ちいいっ<emoji=heart04>\u3000あっ、あっ、んあぁぁぁっ<emoji=heart04>！」"
translation = "「응포<emoji=heart04>!? 아, 안 돼! 본격 피스톤, 응오, 오후우우! 응응, 기분, 기분 좋아<emoji=heart04> 앗, 앗, 응아아아아<emoji=heart04>!」"

[[dialogue]]
speaker = "アナ"
original = "「んお、ふおっ、んんっ<emoji=heart04>！\u3000はああっ、はあああっ<emoji=heart04>！\u3000ケツアナ、やば、やばぁっ<emoji=heart04>\u3000気持ちいいっ、気持ちいいっ<emoji=heart04>\u3000おっ、んおっ、んほぉぉぉっ<emoji=heart04>！」"
translation = "「응오, 후오, 응응<emoji=heart04>! 하아아, 하아아아<emoji=heart04>! 항문, 대박, 대박이야아<emoji=heart04> 기분 좋아, 기분 좋아<emoji=heart04> 오, 응오, 응호오오오<emoji=heart04>!」"

[[dialogue]]
speaker = "クロト"
original = "「っ……アナのおま○こも、入れたら同じくらい、気持ちいいんだろうなっ！」"
translation = "「윽…… 아나의 보지도, 넣으면 이만큼이나, 기분 좋겠지!」"

[[dialogue]]
speaker = "アナ"
original = "「んひぃぃっ<emoji=heart04>\u3000耳元でおま○こ囁くの、ダメぇっ<emoji=heart04>\u3000おっ、おほっ、んおぉっ<emoji=heart04>！\u3000おま○こがチ○ポ入ってくるの想像して、きゅうきゅう動いてるっ<emoji=heart04>\u3000ふあぁぁっ<emoji=heart04>」"
translation = "「응히이이<emoji=heart04> 귓가에서 보지 속삭이는 거, 안 돼애<emoji=heart04> 오, 오호, 응오오<emoji=heart04>! 보지에 자지 들어오는 거 상상해서, 꽉꽉 움직이고 있어어<emoji=heart04> 후아아아」"

[[dialogue]]
speaker = "アナ"
original = "「んあぁぁぁっ<emoji=heart04>\u3000会長<emoji=heart04>\u3000ここでクリ弄るのダメぇっ<emoji=heart04>\u3000意識おま○こに向いちゃうっ<emoji=heart04>\u3000おっ、おっ、んおぉぉぉっ<emoji=heart04>！\u3000く、クリこりこり、気持ちいいっ、ふひぃぃぃっ<emoji=heart04>」"
translation = "「응아아아아<emoji=heart04> 회장님<emoji=heart04> 여기서 클리 만지는 거 안 돼애<emoji=heart04> 의식이 보지로 향해버려어<emoji=heart04> 오, 오, 응오오오오<emoji=heart04>! 크, 클리 오독오독, 기분 좋아, 후히이이이<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「あっ、あっ、お腹っ<emoji=heart04>\u3000子宮の辺りなでなでするのも、ダメぇっ<emoji=heart04>\u3000おっ、おほぉぉぉっ<emoji=heart04>！？\u3000チ○ポで子宮の裏側擦るのやばっ、感じるっ、気持ちいいのぉっ<emoji=heart04>\u3000んあぁぁっ<emoji=heart04>」"
translation = "「앗, 앗, 배<emoji=heart04> 자궁 근처 쓰다듬는 것도, 안 돼애<emoji=heart04> 오, 오호오오오<emoji=heart04>!? 자지로 자궁 뒷부분 문지르는 거 대박, 느껴져, 기분 좋아아<emoji=heart04> 응아아아<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「こ、これほとんどおま○こセックスッ<emoji=heart04>\u3000堕ちちゃうっ<emoji=heart04>\u3000おま○こイメージセックスで堕ちちゃうっ<emoji=heart04>\u3000おっ、おっ、んおぉぉぉっ<emoji=heart04>！\u3000気持ちよしゅぎなのぉっ<emoji=heart04>\u3000おほおっ！」"
translation = "「이, 이거 거의 보지 섹스으<emoji=heart04> 가버려어<emoji=heart04> 보지 이미지 섹스로 가버려어<emoji=heart04> 오, 오, 응오오오오<emoji=heart04>! 너무 기분 좋아아아<emoji=heart04> 오호오!」"

[[dialogue]]
speaker = "アナ"
original = "「し、子宮降りて来てるっ<emoji=heart04>\u3000はあぁっ、チ○ポ入ってると勘違いして<emoji=heart04>\u3000精子欲しくて、降りてきてるっ<emoji=heart04>\u3000あっ、あっ……そこっ、そこいいっ<emoji=heart04>\u3000んあぁぁぁっ<emoji=heart04>」"
translation = "「자, 자궁이 내려오고 있어어<emoji=heart04> 하아아, 자지 들어와 있다고 착각해서<emoji=heart04> 정자 갖고 싶어서, 내려오고 있어어<emoji=heart04> 앗, 앗…… 거기, 거기 좋아<emoji=heart04> 응아아아아<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「あ、アクメくるっ<emoji=heart04>\u3000ケツマ○コとおま○こ<emoji=heart04>\u3000同時にアクメ登ってきてるっ<emoji=heart04>\u3000これやばっ、やばっ、知らないっ、こんなの知らないぃっ<emoji=heart04>\u3000おっ、おほっ、んおぉぉぉっ<emoji=heart04>」"
translation = "「아, 절정 온다아<emoji=heart04> 항문 보지랑 진짜 보지<emoji=heart04> 동시에 절정으로 올라오고 있어어<emoji=heart04> 이거 대박, 대박, 몰라, 이런 거 몰라아아<emoji=heart04> 오, 오호, 응오오오오<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「来る、くるくるっ、イクッ<emoji=heart04>\u3000二穴同時アクメするっ<emoji=heart04>\u3000い、一緒に会長もっ<emoji=heart04>\u3000来て、きてきてっ<emoji=heart04>\u3000精子、いっぱい出してぇぇぇっ<emoji=heart04>\u3000おほっ、んおぉっ、おほぉぉぉっ！」"
translation = "「온다, 온다온다, 싸버려어<emoji=heart04> 두 구멍 동시 절정해버려어<emoji=heart04> 가, 같이 회장님도<emoji=heart04> 와줘, 와줘와줘어<emoji=heart04> 정자, 잔뜩 내보내줘어어어<emoji=heart04> 오호, 응오오, 오호오오오!」"

[[dialogue]]
speaker = "クロト"
original = "「アナッ、妊娠させるつもりで、ケツマ○コに射精するからなっ……！」"
translation = "「아나, 임신시킬 생각으로, 항문 보지에 사정할 테니까……!」"

[[dialogue]]
speaker = "アナ"
original = "「きて<emoji=heart04>\u3000きて<emoji=heart04>\u3000きてぇ……<emoji=heart04>\u3000はあっ、はあっ、はあぁぁぁっ<emoji=heart04>\u3000んくぅ、ふっ、ふううっ<emoji=heart04>」"
translation = "「와줘<emoji=heart04> 와줘<emoji=heart04> 와줘어……<emoji=heart04> 하아, 하아, 하아아아아<emoji=heart04> 응쿠우, 후, 후우우<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「あ<emoji=heart04>\u3000あ<emoji=heart04>\u3000あ<emoji=heart04>\u3000ああっ<emoji=heart04>\u3000おま○こ種付けするつもりで、ケツマ○コ射精されちゃうっ<emoji=heart04>\u3000ふあっ、ふあああああっ<emoji=heart04>」"
translation = "「아<emoji=heart04> 아<emoji=heart04> 아<emoji=heart04> 아아앗<emoji=heart04> 보지에 씨 세우기 할 생각으로, 항문 보지에 사정당해버려어<emoji=heart04> 후앗, 후아아아아아<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「会長っ<emoji=heart04>\u3000きもちぃっ<emoji=heart04>\u3000きもちぃっ<emoji=heart04>\u3000きもちいいっ<emoji=heart04>\u3000んああああああっ！」"
translation = "「회장님<emoji=heart04> 기분 좋아아<emoji=heart04> 기분 좋아아<emoji=heart04> 기분 좋아아<emoji=heart04> 응아아아아아아!」"

[[dialogue]]
speaker = "アナ"
original = "「イクッ、イクイクイクッ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000おま○こ射精、想像しながらイックぅぅぅ──────っっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「간다, 간다가간다아<emoji=heart04><emoji=heart04><emoji=heart04> 보지 사정, 상상하면서 가버려어어어어──────어어어<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「んううう～～～～～<emoji=heart04><emoji=heart04>\u3000んふ、ふお、お、お、お、んおぉ～～～～<emoji=heart04><emoji=heart04>\u3000やば、やばいですぅ<emoji=heart04>\u3000ケツマ○コに射精されてるのに、子宮に流し込まれてるみたいに、感じるぅ<emoji=heart04>」"
translation = "「응우우우～～～～～<emoji=heart04><emoji=heart04> 응후, 후오, 오, 오, 오, 응오오～～～～<emoji=heart04><emoji=heart04> 대박, 대박이에요오<emoji=heart04> 항문 보지에 사정당하고 있는데, 자궁에 쏟아부어지는 것처럼, 느껴져요오<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「おっ、おっ、おほぉぉぉ……きもちいい<emoji=heart04>\u3000ケツマ○コアクメ、やばぁ……<emoji=heart04>」"
translation = "「오, 오, 오호오오오…… 기분 좋아<emoji=heart04> 항문 보지 절정, 대박이야……<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「ど、どうしよう……こんな気持ちいいの知ったらぁ……<emoji=heart04>\u3000今度からエッチする時、おま○こセックスのことしか、考えられなくなっちゃいます<emoji=heart04>」"
translation = "「어, 어쩌지…… 이런 기분 좋은 거 알아버리면……<emoji=heart04> 다음부터 섹스할 때, 보지 섹스 생각밖에, 할 수 없게 되어버려요오<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「今度からじゃないぞ。……今からだ」"
translation = "「다음부터가 아니야. ……지금부터다.」"

[[dialogue]]
speaker = "アナ"
original = "「え……か、会長？\u3000な、なんでまた、チ○ポ動かそうとしてるんですか？\u3000凄くイってしまったので、今日はもう……」"
translation = "「에…… 회, 회장님? 왜, 왜 또, 자지 움직이려고 하는 건가요? 엄청 가버려서, 오늘은 이제……」"

[[dialogue]]
speaker = "クロト"
original = "「今夜は朝まで、搾り取ってくれるんじゃなかったのか？\u3000それに──」"
translation = "「오늘 밤은 아침까지, 짜내 주겠다고 하지 않았나? 그리고──」"

[[dialogue]]
speaker = "unk"
original = "俺はアナの耳元で囁く。"
translation = "나는 아나의 귓가에서 속삭인다."

[[dialogue]]
speaker = "クロト"
original = "「アナさえその気なら、本当におま○こでセックスしたっていいんだぞ。ほとんど迷信、なんだろ？」"
translation = "「아나만 그럴 마음이 있다면, 진짜로 보지로 섹스해도 괜찮다고. 거의 미신, 이라며?」"

[[dialogue]]
speaker = "アナ"
original = "「そ、そんなこと、今言われたらぁ……<emoji=heart04>\u3000はぁぁ……ふぅぅ<emoji=heart04>\u3000ほ、本当におま○こセックス、我慢、できなくなっちゃいますぅ<emoji=heart04>」"
translation = "「그, 그런 거, 지금 들으면어어……<emoji=heart04> 하아아…… 후우우<emoji=heart04> 저, 정말로 보지 섹스, 참을 수, 없게 되어버려요오<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「あっ、待ってっ<emoji=heart04>\u3000会長ダメっ<emoji=heart04>\u3000本当におま○こで、したくなっちゃうからダメぇっ<emoji=heart04>\u3000ふああああああ<emoji=heart04>」"
translation = "「앗, 기다려요<emoji=heart04> 회장님 안 돼<emoji=heart04> 정말로 보지로, 하고 싶어지니까 안 돼애<emoji=heart04> 후아아아아아아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "──それから、俺はアナが観念するまで、一晩中、腰を動かし続けるのだった。"
translation = "──그 후로, 나는 아나가 체념할 때까지, 밤새도록, 허리를 계속 움직였다."

