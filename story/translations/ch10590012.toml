[[dialogue]]
speaker = "unk"
original = "第２話,リップルの師匠,P"
translation = "제2화, 리플의 스승, P"

[[dialogue]]
speaker = "unk"
original = "学園でリゾート結界の運営が開始されると、たちまち人気スポットとなって、リップルの海の家は今日も大忙しだった――"
translation = "학원에서 리조트 결계의 운영이 시작되자, 금세 인기 스폿이 되어 리플의 바다의 집은 오늘도 매우 바빴다──"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ふぅ……お昼のピークが終わって、やっと一息つけるね～」"
translation = "「후우…… 점심 피크가 끝나서 겨우 한숨 돌릴 수 있겠네~」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「マトイ、カイチョー。海の家の接客、手伝ってくれてアリガトございます♪\u3000手が足りなくてピンチだったので、助かりま～す！」"
translation = "「마토이, 회장님. 바다의 집 접객을 도와주셔서 감사함다♪ 일손이 부족해서 핀치였는데, 도움이 됐슴다!」"

[[dialogue]]
speaker = "unk"
original = "接客のバイトは慣れてるから、お安い御用だ"
translation = "접객 알바는 익숙하니까 식은 죽 먹기지"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「おかげさまで大繁盛で～す♪\u3000カイチョーの接客する姿、まるでシショーみたいでカッコイイです！」"
translation = "「덕분에 대성황임다~♪ 회장님의 접객하는 모습, 마치 스승님 같아서 멋짐다!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「――と、また新しいお客さんがキタみたいです！\u3000ラッシャーセー♪\u3000海の家へヨウコソで～す！\u3000……って」"
translation = "「──오, 또 새로운 손님이 오신 것 같슴다! 랏샤세~♪ 바다의 집으로 오신 것을 환영함다~! ……어라」"

[[dialogue]]
speaker_original = "シショー"
speaker_translation = "스승님"
original = "「やあ、こんにちは、渚の天使さん。素敵な笑顔でのお出迎え、ありがとう。大人２人でお願いできるかな？」"
translation = "「안녕, 안녕하세요, 해변의 천사 양. 멋진 미소로 맞이해줘서 고마워. 어른 두 명 부탁해도 될까?」"

[[dialogue]]
speaker_original = "オクサン"
speaker_translation = "사모님"
original = "「ふふっ、笑顔を見ているだけで、こっちも元気になっちゃうわね。お礼にハグしてもいいかしら？」"
translation = "「후후, 미소를 보고 있는 것만으로도 이쪽까지 기운이 나네. 답례로 허그해도 될かしら?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ワオ！！\u3000シショー！\u3000オクサン！\u3000来てくれたんデスね！」"
translation = "「와오!! 스승님! 사모님! 와주신 검까!」"

[[dialogue]]
speaker_original = "シショー"
speaker_translation = "스승님"
original = "「久しぶりだね、リップル。元気そうで安心したよ」"
translation = "「오랜만이구나, 리플. 건강해 보여서 안심했다」"

[[dialogue]]
speaker_original = "オクサン"
speaker_translation = "사모님"
original = "「ずっと会いたかったわ。私達の可愛い天使さん」"
translation = "「계속 보고 싶었단다. 우리들의 귀여운 천사 양」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ワタシも会いたかったです、シショー、オクサン！\u3000久しぶりのハグで～す♪」"
translation = "「저도 보고 싶었슴다, 스승님, 사모님! 오랜만의 허그임다~♪」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「カイチョーとマトイにもショーカイしますね！\u3000合宿の時も話しましたが、ワタシの恩人であるシショーと、そのオクサンです！」"
translation = "「회장님과 마토이에게도 소개하겠슴다! 합숙 때도 말씀드렸지만, 저의 은인인 스승님과 그 사모님임다!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「き、金髪碧眼の凄い美男美女……！\u3000確か、お２人で海の家を経営されてるって話だったよね？」"
translation = "「그, 금발 벽안의 엄청난 미남 미녀……! 분명 두 분이서 바다의 집을 경영하신다는 이야기였지?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ハイ！\u3000ワタシは合宿でカイチョー達と出会うまで、シショー達のトコロでお世話になってたんです」"
translation = "「네! 저는 합숙에서 회장님 일행과 만나기 전까지 스승님 댁에서 신세를 졌슴다」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「シショーとオクサンからはいっぱい優しくして貰って、夏の海について色々なことを学びました」"
translation = "「스승님과 사모님께서는 많이 친절하게 대해주셨고, 여름 바다에 대해 여러 가지를 배웠슴다」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「おかげでワタシは、ハッピーな気持ちを知って、笑顔を取り戻すことがデキたんです。感謝してもシキれません！」"
translation = "「덕분에 저는 행복한 기분을 알게 되고, 미소를 되찾을 수 있었슴다. 감사해도 끝이 없슴다!」"

[[dialogue]]
speaker_original = "シショー"
speaker_translation = "스승님"
original = "「初めまして。新星学園の会長さんと、書記のマトイさん。お２人や星徒会の皆さんのことは、リップルからよく聞いているよ」"
translation = "「처음 뵙겠습니다. 신성 학원의 회장님과 서기인 마토이 씨. 두 분이나 성도회 여러분에 대해서는 리플에게 자주 듣고 있었답니다」"

[[dialogue]]
speaker_original = "オクサン"
speaker_translation = "사모님"
original = "「ふふっ、リップルちゃんとはＤＩＳＣで連絡を取り合っていてね。夏合宿でのことや、学園のことをそれはもう楽しそうに話してくれるのよ」"
translation = "「후후, 리플 양과는 DISC로 연락을 주고받고 있거든요. 여름 합숙에서의 일이나 학원 이야기를 어찌나 즐겁게 해주는지 몰라요」"

[[dialogue]]
speaker = "unk"
original = "こちらこそ、リップルには助けられています"
translation = "저야말로, 리플에게 도움을 받고 있습니다"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「戦闘でも強くて頼りになりますし、明るい性格で、転入したばかりなのに人気者なんですよ。それに、見ての通りリゾート結界も生徒達から凄く人気があるんです」"
translation = "「전투에서도 강해서 의지가 되고, 밝은 성격이라 전입한 지 얼마 안 됐는데도 인기인이에요. 그리고 보시는 대로 리조트 결계도 학생들에게 엄청 인기가 있답니다」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「エヘヘ♪\u3000何だか照れちゃいま～す」"
translation = "「에헤헤♪ 왠지 쑥스럽슴다」"

[[dialogue]]
speaker_original = "シショー"
speaker_translation = "스승님"
original = "「このリゾート結界は本当に良い場所だと思うよ。少し見ただけでも分かる。リップルが皆にハッピーになって貰いたくて、ここを作ったんだってことが」"
translation = "「이 리조트 결계는 정말 좋은 곳이라고 생각해. 조금만 봐도 알 수 있어. 리플이 모두를 행복하게 해주고 싶어서 이곳을 만들었다는 걸」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「シショー、アリガトございます！\u3000ワタシだけの力じゃなくて、皆からアイデアを貰ったから、作り上げることがデキたんです！」"
translation = "「스승님, 감사함다! 저만의 힘이 아니라 모두에게 아이디어를 얻었기에 만들어낼 수 있었슴다!」"

[[dialogue]]
speaker_original = "オクサン"
speaker_translation = "사모님"
original = "「リップルちゃんは、良いお友達と出会えたのね」"
translation = "「리플 양은 좋은 친구들을 만났구나」"

[[dialogue]]
speaker_original = "シショー"
speaker_translation = "스승님"
original = "「ああ。前よりいい顔になったな、リップル」"
translation = "「아아. 전보다 좋은 얼굴이 되었어, 리플」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ハイ♪\u3000ワタシ、カイチョー達と出会って、この学園に来て、今とてもハッピーです！」"
translation = "「네♪ 저, 회장님 일행과 만나서 이 학원에 오게 되어 지금 너무 행복함다!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「――あっ、また別のお客さんがキタみたいです。ワタシ、ちょっと接客に行ってきますね！\u3000ラッシャーセー♪」"
translation = "「──앗, 또 다른 손님이 오신 것 같슴다. 저, 잠시 접객하러 다녀오겠슴다! 랏샤세~♪」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「いや、せっかくお世話になった方が会いに来てくれたんだから、ここはヘルプの私達が！\u3000……って、止める間もなく行っちゃった」"
translation = "「아니, 기껏 신세 진 분들이 보러 오셨으니까 여기는 헬프인 저희가! ……라고 할 틈도 없이 가버렸네」"

[[dialogue]]
speaker_original = "シショー"
speaker_translation = "스승님"
original = "「ははっ、あの子は海の家でお客さんの笑顔を見るのが大好きなんだよ。私達と暮らしている時もそうだった。――さて、会長さん、マトイさん」"
translation = "「하하, 저 아이는 바다의 집에서 손님들의 미소를 보는 걸 정말 좋아하거든. 우리와 지낼 때도 그랬지. ──자, 회장님, 마토이 씨」"

[[dialogue]]
speaker_original = "シショー"
speaker_translation = "스승님"
original = "「リップルに良くしてくれて、本当にありがとう。改めて、お礼を言わせて貰うよ」"
translation = "「리플을 잘 대해줘서 정말 고맙네. 다시 한번 감사를 표하고 싶군」"

[[dialogue]]
speaker = "unk"
original = "いやいや！\u3000大したことはしてないです"
translation = "아니요! 별로 한 것도 없습니다"

[[dialogue]]
speaker_original = "オクサン"
speaker_translation = "사모님"
original = "「いいえ、リップルちゃんを仲間として、この学園に迎えてくれたでしょう？\u3000それが凄く嬉しかったって、あの子言ってたの」"
translation = "「아니에요, 리플 양을 동료로서 이 학원에 맞아주셨잖아요? 그게 무척 기뻤다고 그 아이가 말했어요」"

[[dialogue]]
speaker_original = "シショー"
speaker_translation = "스승님"
original = "「……私達夫婦には残念ながら子供がいなくてね。母親を亡くしてそう経っていないあの子には言えないが、実の娘のように思っているんだ」"
translation = "「……우리 부부에게는 안타깝게도 아이가 없어서 말이야. 어머니를 여읜 지 얼마 안 된 저 아이에게는 말하지 못했지만, 친딸처럼 생각하고 있네」"

[[dialogue]]
speaker_original = "オクサン"
speaker_translation = "사모님"
original = "「だから、あの子が今日、心から楽しそうな笑顔を浮かべているのを見て、凄く安心したし、私達も嬉しかったの」"
translation = "「그래서 저 아이가 오늘 진심으로 즐거운 듯한 미소를 짓는 걸 보고 무척 안심했고, 저희도 기뻤답니다」"

[[dialogue]]
speaker_original = "シショー"
speaker_translation = "스승님"
original = "「どうか、これからも仲良くしてあげて欲しい。私達の代わりに」"
translation = "「부디 앞으로도 사이좋게 지내줬으면 하네. 우리 대신에」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「……師匠さん、奥さん。自分達の代わりにだなんて、寂しいこと言わないで下さい。リップルはお２人のこと、家族みたいに思ってるって前に言ってましたよ」"
translation = "「……스승님, 사모님. 자신들 대신이라니 섭섭한 말씀 하지 마세요. 리플은 두 분을 가족처럼 생각하고 있다고 전에 말했단 말이에요」"

[[dialogue]]
speaker = "unk"
original = "今だってそうですよ。ほら、後ろ――"
translation = "지금도 그렇다니까요. 봐요, 뒤에──"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「シショー……オクサン……」"
translation = "「스승님…… 사모님……」"

[[dialogue]]
speaker_original = "シショー"
speaker_translation = "스승님"
original = "「！\u3000リップル、いつの間に……接客を終えて、戻って来てたのか……！」"
translation = "「! 리플, 어느 틈에…… 접객을 마치고 돌아온 거냐……!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「わ、ワタシ……衣食住を不自由ナク面倒みて貰って……それ以上は迷惑カナと思って、ずっと言えませんでしたが――」"
translation = "「저, 저…… 의식주를 불편함 없이 보살펴주시고…… 그 이상은 폐가 될까 봐 계속 말하지 못했슴다만──」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「本当は……シショー達のこと、もう１人のお父さんや、お母さんみたいに、オモってます……！」"
translation = "「사실은…… 스승님들을 또 한 명의 아버지나 어머니처럼 생각하고 있슴다……!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「だから、これからも……家族みたいにオモっててイイですか……？」"
translation = "「그러니까 앞으로도…… 가족처럼 생각해도 되겠슴까……?」"

[[dialogue]]
speaker_original = "オクサン"
speaker_translation = "사모님"
original = "「リップルちゃん……！\u3000ええ、ええ……もちろんよ！\u3000あなたは私達のところに来てくれた、可愛くて愛おしい天使だもの……！」"
translation = "「리플 양……! 그래, 그래…… 물론이지! 너는 우리에게 와준 귀엽고 사랑스러운 천사인걸……!」"

[[dialogue]]
speaker_original = "シショー"
speaker_translation = "스승님"
original = "「ああ……リップル……！\u3000すまない……私達も、ずっと言えなくて……いつでも家に帰って来い……遠慮なんてしなくていいから……！」"
translation = "「아아…… 리플……! 미안하구나…… 우리도 계속 말하지 못해서…… 언제든 집에 돌아오렴…… 사양 같은 건 하지 않아도 되니까……!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ハイ、今度近いうちに帰ります。必ず、２人に会いに行きます……！」"
translation = "「네, 조만간 돌아가겠슴다. 반드시 두 분을 만나러 가겠슴다……!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「どうしよう……もらい泣きしそう。凄く、いい家族だね……」"
translation = "「어떡해…… 같이 울 것 같아. 정말 좋은 가족이네……」"

[[dialogue]]
speaker = "unk"
original = "よかったな、リップル"
translation = "잘 됐네, 리플"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「エヘヘ♪\u3000ワタシもＢＩＧハッピーで、ちょっと泣いてしまいソウです……♪」"
translation = "「에헤헤♪ 저도 BIG 해피해서 조금 울어버릴 것 같슴다……♪」"

[[dialogue]]
speaker = "unk"
original = "リップルはそう言って、心から嬉しそうな笑顔を浮かべるのだった――"
translation = "리플은 그렇게 말하며 진심으로 기쁜 듯한 미소를 짓는 것이었다──"

