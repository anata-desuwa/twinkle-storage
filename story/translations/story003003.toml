[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「それじゃあ、さっそく会議と行きたいんだけど……その前に、みんなはどうしてこの募集に応募したの？」"
translation = "「그럼, 바로 회의를 시작하고 싶은데…… 그전에, 다들 어째서 이 모집에 응모한 거야?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「挨拶がてらに少し話をしよう、ということだな。ではまず私から話そう」"
translation = "「인사 대신에 조금 이야기를 나누자는 거군. 그럼 우선 나부터 말하도록 하지.」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「私は……幼い頃より父に憧れ、父のような立派な剣士になることを目標に生きてきた」"
translation = "「나는…… 어릴 적부터 아버지를 동경해, 아버지처럼 훌륭한 검사가 되는 것을 목표로 살아왔다.」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「そのため、これまでの人生を剣の修行に費やし、こういった祭りごとに触れる機会が本当に少なかったのだ」"
translation = "「그 때문에, 지금까지의 인생을 검 수행에 소비하느라, 이런 축제를 접할 기회가 정말 적었지.」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「だが最近になって、果たしてそれでよいのか……父の冠した『流星の騎士』の名を継ぐに足る星騎士になれるのか……そんな疑問を抱くようになった」"
translation = "「하지만 최근 들어, 과연 이대로 괜찮은가…… 아버지가 관칭하신 『유성의 기사』의 이름을 잇기에 부족함 없는 성기사가 될 수 있을까…… 그런 의문을 품게 되었다.」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「父に追いつくためには、ただ剣の技術を修めればよいというものではない。精神的に……いや人格的にもっと成長すべきではないかと思った」"
translation = "「아버지를 따라잡기 위해서는, 그저 검의 기술을 닦는 것만으로는 안 된다. 정신적으로…… 아니, 인격적으로 좀 더 성장해야 하지 않을까 생각했다.」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「だから私は、実行委員としてこのクリスマスパーティーに参加し、皆に笑顔を届けられる真の騎士を目指す！」"
translation = "「그래서 나는 실행위원으로서 이 크리스마스 파티에 참가해, 모두에게 미소를 전할 수 있는 진정한 기사를 지향한다!」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「おお～、めっちゃ立派な理由じゃない」"
translation = "「오~, 엄청 훌륭한 이유잖아.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「正義の心に満ちた、素晴らしい志だな！\u3000すごいぞ！」"
translation = "「정의로운 마음이 가득한, 멋진 포부다! 대단해!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「舞亜はどうなのだ？」"
translation = "「마이아는 어떤가?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「私はアニュラスみたいに気合いの入った理由は無いよ。行事にはしっかり参加して、青春を楽しんでおきたいなってだけ」"
translation = "「나는 아뉴라스처럼 기합이 들어간 이유는 없어. 행사에는 확실히 참가해서, 청춘을 즐겨두고 싶을 뿐이야.」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「ああそうか、舞亜はフィギュアスケートが忙しいからな。参加できるものは参加しておきたい、ということか」"
translation = "「아아 그렇군, 마이아는 피겨 스케이팅으로 바쁘니까. 참가할 수 있는 건 참가해두고 싶다, 는 건가.」"

[[dialogue]]
speaker = "unk"
original = "今は大丈夫な時期なの？"
translation = "지금은 괜찮은 시기야?"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「えっと……実はそうでもなくて、むしろ今が１番忙しい時期、みたいな？」"
translation = "「엣…… 사실 그렇지도 않아서, 오히려 지금이 제일 바쁜 시기, 랄까?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「でも、何て言ったらいいかな……忙しいからこそ逆にやるっきゃないって思ったんだよね」"
translation = "「하지만, 뭐라고 말하면 좋을까…… 바쁘니까 오히려 더 해버려야겠다고 생각했거든.」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「計算問題を前にすると、ついつい部屋の掃除をしたくなってしまう感じか？」"
translation = "「계산 문제를 앞에 두면, 나도 모르게 방 청소를 하고 싶어지는 그런 느낌인가?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ん～、ちょっと違うかな」"
translation = "「음~, 조금 다르려나.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「忙しいからってスケートに集中しすぎると、逆に調子が悪くなっちゃうんだよね」"
translation = "「바쁘다고 스케이트에 너무 집중하다 보면, 오히려 컨디션이 나빠지곤 하거든.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「意識が張り詰めて鋭くなってる時だからこそ、こういうことをやってイメージを膨らませたいって言うか」"
translation = "「의식이 팽팽하게 날이 서 있을 때니까 더더욱, 이런 걸 하면서 이미지를 부풀리고 싶달까.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「逆にそこでもらった刺激が、フィギュアスケートの方にもいい感じに影響してきたりするんだよね……わかる？」"
translation = "「반대로 거기서 얻은 자극이, 피겨 스케이트 쪽에도 좋은 느낌으로 영향을 주기도 하거든…… 알겠어?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ん～、分かるような分からないような……」"
translation = "「음~, 알 것 같기도 하고 모를 것 같기도 하고……」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「プロフェッショナルの世界に身を置く舞亜にしか分からない話なのかもしれないな」"
translation = "「프로페셔널의 세계에 몸을 담고 있는 마이아만이 알 수 있는 이야기일지도 모르겠군.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「アポロちゃんは楽しそうだったから、だよね？」"
translation = "「아폴로 짱은 즐거워 보이니까, 인 거지?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「そうだな」"
translation = "「그렇지.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「あと、あたしはつい最近までずっと眠りについてたんだ」"
translation = "「그리고, 나는 아주 최근까지 계속 잠들어 있었거든.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「こんな風に自分たちで計画して盛大にやるクリスマスパーティーってのはやったことがないんだ。だから楽しみで仕方ないぞ！」"
translation = "「이렇게 우리끼리 계획해서 성대하게 여는 크리스마스 파티라는 건 해본 적이 없어. 그래서 기대돼서 참을 수가 없다고!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「そうか……では、実行委員に立候補したのも？」"
translation = "「그런가…… 그럼, 실행위원에 입후보한 것도?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「計画を立てるのも楽しそうだし、なにより実行委員ってカッコイイだろ？」"
translation = "「계획을 세우는 것도 즐거워 보이고, 무엇보다 실행위원이라니 멋지잖아?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「あ～、名前ね。確かにかっこいいかも」"
translation = "「아~, 이름 말이지. 확실히 멋질지도.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「で、ついでだからたまたま通りかかった魔王も誘ったんだ」"
translation = "「그래서, 하는 김에 마침 지나가던 마왕도 꼬셨어.」"

[[dialogue]]
speaker = "unk"
original = "何か手伝えればと思って"
translation = "뭔가 도울 수 있으면 해서"

[[dialogue]]
speaker = "unk"
original = "ちょっと心配だったから"
translation = "조금 걱정됐으니까"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「なるほどな。確かに会長が協力してくれるなら心強い」"
translation = "「과연 그렇군. 확실히 회장이 협력해 준다면 든든하지.」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「だが本当に良かったのか？\u3000新星学園の会長なのに、流星寮の催しの手伝いをさせてしまって」"
translation = "「하지만 정말 괜찮은 건가? 신성 학원의 회장인데, 유성 기숙사의 행사를 돕게 해서.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「それもだし、あとこの時期って会長さんは会長さんで忙しいんじゃないの？」"
translation = "「그것도 그렇고, 이 시기에는 회장님은 회장님대로 바쁘지 않아?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「どっちの学園とか関係ないじゃないか。それにヒルディオーネもオッケーだって言ってただろ？」"
translation = "「어느 학원인지는 상관없잖아. 게다가 힐디오네도 오케이 했다고 그랬지?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ちょっとごり押し感あったけどね。ま、寮長さんが認めてるならオッケーってことでいいんじゃない？」"
translation = "「조금 억지스러운 느낌은 있었지만 말이야. 뭐, 기숙사장님이 인정했다면 오케이인 거 아닐까?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「そうだな……会長の仕事の方はどうなんだ？」"
translation = "「그렇군…… 회장의 업무 쪽은 어떤가?」"

[[dialogue]]
speaker = "unk"
original = "手伝える余力はある"
translation = "도울 여력은 있어"

[[dialogue]]
speaker = "unk"
original = "大丈夫だよ"
translation = "괜찮아"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「そうか。ならば問題ないな」"
translation = "「그런가. 그렇다면 문제없겠군.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「遠慮なくバシバシこき使うから覚悟してねっ」"
translation = "「사양 말고 팍팍 부려 먹을 테니까 각오해둬~」"

[[dialogue]]
speaker = "unk"
original = "お、お手柔らかに……"
translation = "살, 살살 좀 부탁해……"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「ではそろそろ、本題に入ろうか──」"
translation = "「그럼 슬슬, 본론으로 들어갈까──」"

