[[dialogue]]
speaker = "unk"
original = "第２話,水着の監視者,P"
translation = "제2화, 수영복의 감시자"

[[dialogue]]
speaker = "unk"
original = "俺は息抜きにリゾート結界に来ていた……のだが──"
translation = "나는 기분 전환으로 리조트 결계에 와 있었다……만──"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「じー……」"
translation = "「지이──……」"

[[dialogue]]
speaker = "unk"
original = "どうして梨緒がここに？"
translation = "어째서 리오가 여기에?"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「決まっている、君を監視するためだ」"
translation = "「정해져 있다, 자네를 감시하기 위해서다」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「選挙管理委員会は、魔王にして星徒会長である君を監視するための組織。君が行くなら、たとえ火の中だろうが水の中だろうが駆けつける」"
translation = "「선거관리위원회는 마왕이자 성도회장인 자네를 감시하기 위한 조직. 자네가 간다면 설령 불 속이든 물 속이든 달려간다」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「つまり、君がいるところ私ありだ」"
translation = "「즉, 자네가 있는 곳에 내가 있다」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……まるで恋人みたいだって？」"
translation = "「……마치 연인 같다고?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「なななな、何を言ってるんだ君は！？\u3000私はそんなつもりじゃないぞ！？」"
translation = "「나나나나, 무슨 소리를 하는 건가 자네는!? 나는 그럴 의도가 아니라고!?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「まったくもう……そんな浮ついたことを言ってナンパでもするんじゃないかと心配なんだ……」"
translation = "「정말이지…… 그런 들뜬 소리를 하며 헌팅이라도 하지 않을까 걱정이란 말이다……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ただでさえ海で浮かれているだろうし、他の女性の水着姿に目を奪われたりしないか気になって……」"
translation = "「안 그래도 바다에서 들떠 있을 테고, 다른 여성의 수영복 모습에 눈을 빼앗기지 않을까 신경 쓰여서……」"

[[dialogue]]
speaker = "unk"
original = "じー……"
translation = "지이──……"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「な、何だ？\u3000そんなに私をじっと見つめてどうした……？\u3000監視しているのは私だぞ？」"
translation = "「뭐, 뭐야? 그렇게 나를 빤히 쳐다보고 왜 그러나……? 감시하고 있는 건 나라고?」"

[[dialogue]]
speaker = "unk"
original = "梨緒の水着、似合ってるよ"
translation = "리오의 수영복, 잘 어울려"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「何を言ってるんだ！？\u3000私は遊びに来たんじゃないんだぞ！」"
translation = "「무슨 소리를 하는 건가!? 나는 놀러 온 게 아니라고!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「水着がスタイリッシュで素敵……？\u3000肌が綺麗？\u3000ポニーテールが活動的でいい？\u3000スタイルが良くて見惚れそう？」"
translation = "「수영복이 스타일리시해서 멋지다……? 피부가 예쁘다? 포니테일이 활동적이라 좋다? 스타일이 좋아서 넋을 잃을 것 같다?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「そそそ、そんなことないぞっ！\u3000私なんて水着に着られているだけだ！」"
translation = "「그그그, 그렇지 않다! 나 같은 건 수영복에 휘둘리고 있을 뿐이다!」"

[[dialogue]]
speaker = "unk"
original = "梨緒の水着が一番好きだよ"
translation = "리오의 수영복이 제일 좋아"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「～～～っ！？\u3000君は本当に何を言ってるんだ！？」"
translation = "「～～～앗!? 자네는 정말 무슨 소리를 하는 건가!?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私を懐柔しようとしたところで無駄だぞ！\u3000選挙管理員会として、星徒会長の行いは厳正に見させてもらうからな！」"
translation = "「나를 회유하려 해봤자 소용없다! 선거관리위원회로서 성도회장의 행실은 엄정하게 지켜볼 테니까!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「君に水着を褒められても、別に私は嬉しくなんて──」"
translation = "「자네에게 수영복 칭찬을 들어도 딱히 나는 기쁘거나 하지──」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あら？」"
translation = "「어라?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ひゃあっ！？」"
translation = "「히얏!?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「緋宮会長に梨緒さん、こんなところで奇遇ですね」"
translation = "「히노미야 회장님에 리오 씨, 이런 곳에서 기우네요」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「よ、２人とも！」"
translation = "「여, 둘 다!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「アポロとフィオナ！？\u3000君たちも来ていたのか？」"
translation = "「아폴로와 피오나!? 너희들도 와 있었나?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ん？\u3000もしかして２人はデートしてたのか？\u3000だったら邪魔して悪かったな」"
translation = "「응? 혹시 둘이서 데이트하고 있었던 거야? 그렇다면 방해해서 미안하네」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「デートじゃない！\u3000選挙管理委員会として、魔王が星徒会長にふさわしくない行いをしないよう監視していただけだ！」"
translation = "「데이트 아니야! 선거관리위원회로서 마왕이 성도회장에 어울리지 않는 행실을 하지 않는지 감시하고 있었을 뿐이다!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「それにしてはお顔が赤いようですが……？」"
translation = "「그것치고는 얼굴이 붉으신 것 같습니다만……?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ちち、違うっ！\u3000きっと日差しが強かったせいだ！」"
translation = "「아아, 아니야! 분명 햇살이 강했던 탓이다!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「いいか、魔王。君が気の緩みを見せたら、私は選管として容赦なく君を摘発する」"
translation = "「잘 들어라 마왕. 자네가 빈틈을 보인다면 나는 선관으로서 가차 없이 자네를 적발하겠다」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「魔王がボロを出してくれるなら、それはそれで構わない。現会長である君を引きずり下ろし、私が星徒会長になるからな……！」"
translation = "「마왕이 허점을 보여준다면 그건 그것대로 상관없다. 현 회장인 자네를 끌어내리고 내가 성도회장이 될 테니까……!」"

[[dialogue]]
speaker = "unk"
original = "梨緒はどうして星徒会長にこだわるんだ？"
translation = "리오는 어째서 성도회장에 집착하는 거야?"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「そういえば言っていなかったか？\u3000すっかり話した気になっていたが……」"
translation = "「그러고 보니 말하지 않았었나? 완전히 말한 기분으로 있었다만……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ベガのフィオナ──こちらではアポロと名乗っている、星見家の双子の姉の方だ。彼女と約束したんだ」"
translation = "「베가의 피오나── 이쪽에서는 아폴로라고 자처하고 있는, 호시미 가문의 쌍둥이 누나 쪽이다. 그녀와 약속했어」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「フィオナが流星学園の星徒会長に、私が新星学園の星徒会長になると」"
translation = "「피오나가 유성학원의 성도회장이, 내가 신성학원의 성도회장이 되겠다고」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ベガの私たちとはお知り合いだったんですか？」"
translation = "「베가의 저희들과 아는 사이였나요?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ああ、私がイギリスから流星市国に来た頃に２人と出会って、友人になったんだ。一緒に星術の鍛錬をしたこともある」"
translation = "「그래, 내가 영국에서 유성시국에 왔을 무렵에 둘과 만나서 친구가 되었지. 함께 성술 단련을 한 적도 있어」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だから星見家で目覚めた時は、エリシアがフィオナと名乗っているし、フィオナ──今のアポロが小さくなっているしで、本当に驚いた」"
translation = "「그래서 호시미 가문에서 깨어났을 때 에리시아가 피오나라고 자처하고 있고, 피오나── 지금의 아폴로가 작아져 있어서 정말 놀랐다」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「なるほど。そりゃ梨緒が混乱するわけだ」"
translation = "「과연. 그러니 리오가 혼란스러울 만도 하네」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だが結局、私が新星学園の星徒会長になることはなかった。ジグに阻まれたからだ」"
translation = "「하지만 결국 내가 신성학원의 성도회장이 되는 일은 없었다. 지구에게 가로막혔기 때문이다」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「今思い出しても憎たらしい……いや、よそう。負けた私が悪いんだ」"
translation = "「지금 생각해도 얄미운…… 아니, 관두지. 패배한 내 잘못이다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ベガではそんなことがあったんですね……」"
translation = "「베가에서는 그런 일이 있었군요……」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ベガのあたしか……デネブのあたしとも違うのか？」"
translation = "「베가의 나인가…… 데네브의 나와도 다른 건가?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「そうだな……ベガの君は星見家の後継者として育った分、行儀がいいというか、言葉遣いも丁寧で、令嬢然としていた」"
translation = "「그렇군…… 베가의 자네는 호시미 가문의 후계자로 자란 만큼 예의가 바르다고 할까, 말투도 정중하고 영애다웠지」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「エリシア──フィオナはあまり変わらないが、こちらの君より少し甘えたがりだったな」"
translation = "「에리시아── 피오나는 별로 변하지 않았지만, 이쪽의 자네보다 조금 더 어리광쟁이였지」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「私が……？\u3000そう言われると少し恥ずかしいですね」"
translation = "「제가……? 그렇게 들으니 조금 부끄럽네요」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ただ、流星ライダーが好きなことは２人とも変わらないな」"
translation = "「다만, 유성 라이더를 좋아하는 건 둘 다 변함없더군」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「お、そこは同じなんだな！\u3000平行世界でもやっぱりあたしたちだ！」"
translation = "「오, 거긴 똑같구나! 평행세계에서도 역시 우리들이네!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ところで気になっていたのですが、梨緒さんが持っているその猫のキャラクターは？」"
translation = "「그런데 신경 쓰였습니다만, 리오 씨가 가지고 있는 그 고양이 캐릭터는?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「これか？\u3000これはぶちゃ猫というキャラクターなんだが、どうやらあまり人気がないみたいで……私は好きなんだが」"
translation = "「이건가? 이건 부챠네코라는 캐릭터인데, 아무래도 별로 인기가 없는 모양이라…… 나는 좋아한다만」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「すごくかわいいと思います！\u3000私は好きですよ！」"
translation = "「정말 귀엽다고 생각해요! 저는 좋아요!」"

[[dialogue]]
speaker = "unk"
original = "俺も愛嬌があると思う"
translation = "나도 애교 있다고 생각해"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「そ、そうか……？\u3000そう思ってくれると嬉しいな……」"
translation = "「그, 그런가……? 그렇게 생각해 주니 기쁘군……」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「んじゃ、あたしたちはこれでな。流星星徒会のみんなが待ってるんだ」"
translation = "「그럼 우리들은 이만. 유성 성도회 모두가 기다리고 있어」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「デートのお邪魔してすみませんでした。おふたりで楽しんでくださいね」"
translation = "「데이트 방해해서 죄송했습니다. 두 분이서 즐겁게 보내세요」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だからデートじゃないと言っているだろう！」"
translation = "「그러니까 데이트가 아니라고 말하고 있지 않나!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……誤解したまま行ってしまった」"
translation = "「……오해한 채로 가버렸군」"

[[dialogue]]
speaker = "unk"
original = "気を取り直して遊ぼう"
translation = "기분 전환하고 놀자"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……仕方ない。時間は有限だし、気持ちを切り替えよう」"
translation = "「……어쩔 수 없지. 시간은 유한하고, 기분을 전환하자」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「海でまずやることは決まっている──水かけで勝負だ！」"
translation = "「바다에서 먼저 할 일은 정해져 있다── 물 뿌리기로 승부다!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「やったな！\u3000お返しだ……それ！」"
translation = "「했겠다! 답례다…… 이거!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「あははっ、顔がビショビショだぞ魔王！」"
translation = "「아하핫, 얼굴이 흠뻑 젖었다고 마왕!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "（緋宮会長と梨緒さんが楽しそうにしていますが……）"
translation = "（히노미야 회장님과 리오 씨가 즐거워 보입니다만……）"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "（あいつら、やっぱりデートしてるんじゃないか……？）"
translation = "（저 녀석들, 역시 데이트하고 있는 거 아냐……?）"

