[[dialogue]]
speaker = "unk"
original = "第２話,ラブレター大作戦,P"
translation = "제2화, 러브레터 대작전, P"

[[dialogue]]
speaker = "unk"
original = "せつなに告白すると決めた俺は、ヨミに相談に乗ってもらい、ラブレターを書くことに決めた。"
translation = "세츠나에게 고백하기로 결심한 나는 요미에게 상담을 받아 러브레터를 쓰기로 했다."

[[dialogue]]
speaker = "unk"
original = "そうして書き上げたラブレターを教室の机の上に置き、コソコソと隠れているせつなに声をかける。"
translation = "그렇게 써 내려간 러브레터를 교실 책상 위에 두고, 쭈뼛거리며 숨어 있는 세츠나에게 말을 건다."

[[dialogue]]
speaker = "unk"
original = "せつなに大事な話があって手紙を書いた！"
translation = "세츠나에게 중요한 할 말이 있어서 편지를 썼어!"

[[dialogue]]
speaker = "せつな"
original = "「はいでござる……」"
translation = "「네, 주군……」"

[[dialogue]]
speaker = "せつな"
original = "「その……ここ数日、主様から逃げ回るような真似をして、申し訳ございませぬ」"
translation = "「그…… 요 며칠 주군으로부터 도망쳐 다닌 것 같은 짓을 해서 송구하오.」"

[[dialogue]]
speaker = "せつな"
original = "「もちろん、主様の近くにはずっと控えていて、何かあればいつでも役目を果たせるようにはしていたでござるが、よく考えたらちょっとストーカーっぽかったでござる……」"
translation = "「물론 주군 근처에는 계속 대기하며 무슨 일이 생기면 언제든 임무를 다할 수 있도록 하고 있었으나 잘 생각해보니 좀 스토커 같았소이다……」"

[[dialogue]]
speaker = "せつな"
original = "「全然気にしてない……でござるか？\u3000うぅぅ……自分の感情すら殺せぬ不甲斐ない忍者で、面目次第もないでござる」"
translation = "「전혀 신경 안 써…… 주시오? 우으으…… 자신의 감정조차 죽이지 못하는 한심한 닌자라 면목 없소이다.」"

[[dialogue]]
speaker = "unk"
original = "むしろ俺の方が主様失格じゃないか心配だ"
translation = "오히려 내가 주군 실격이 아닐까 걱정이야."

[[dialogue]]
speaker = "せつな"
original = "「そんなことは絶対にありえませぬ……！\u3000せつなの主様は、主様だけでござる」"
translation = "「그런 일은 절대 있을 수 없소……! 세츠나의 주군은 주군뿐이오.」"

[[dialogue]]
speaker = "せつな"
original = "「ただ……せつなもこんなことは生まれて初めての経験で、どうしていいのかわからないのでござる」"
translation = "「다만…… 세츠나도 이런 일은 태어나서 처음 겪는 경험이라 어떻게 해야 할지 모르겠소.」"

[[dialogue]]
speaker = "せつな"
original = "「主様も同じでござるか……？\u3000そう、なのでござりまするか」"
translation = "「주군도 마찬가지라고요……? 그렇, 소이까.」"

[[dialogue]]
speaker = "せつな"
original = "「うぅぅ……恥ずかしくて、どうしていいのか本当にわからないのでござるが、それでも主様の専属忍者として、逃げたくはないでござる」"
translation = "「우으으…… 부끄러워서 어떻게 해야 할지 정말 모르겠으나 그래도 주군의 전속 닌자로서 도망치고 싶지는 않소.」"

[[dialogue]]
speaker = "unk"
original = "手紙はせつなへのラブレターだ……！"
translation = "편지는 세츠나에게 주는 러브레터야……!"

[[dialogue]]
speaker = "unk"
original = "騙し打ちにならないように宣言しておくと"
translation = "기습이 되지 않도록 미리 선언해 두자면."

[[dialogue]]
speaker = "せつな"
original = "「ら、ラブレター……要するに、恋文でござるか？」"
translation = "「러, 러브레터…… 요컨대 연애편지오?」"

[[dialogue]]
speaker = "せつな"
original = "「な、なるほど。主様の、せつなへの気持ちを綴った文章、でござるか……」"
translation = "「나, 과연. 주군의 세츠나를 향한 마음을 엮은 글, 이구려……」"

[[dialogue]]
speaker = "せつな"
original = "「確かに、心の準備をせずに読んだら、心臓が止まってしまう可能性があったでござる……」"
translation = "「확실히 마음의 준비를 하지 않고 읽었다면 심장이 멈췄을 가능성이 있었소……」"

[[dialogue]]
speaker = "せつな"
original = "「そ、それはもちろん、察するところもあったでござるが……主様本人から宣言されるかどうかでは、準備のほどが変わるでござる」"
translation = "「그, 그것은 물론 짐작 가는 바도 있었소만…… 주군 본인으로부터 선언받느냐 아니냐에 따라 준비의 정도가 달라지오.」"

[[dialogue]]
speaker = "unk"
original = "ゆっくり読んで、気が向いたら返事が欲しい"
translation = "천천히 읽고 마음이 내키면 답장을 줘."

[[dialogue]]
speaker = "unk"
original = "俺がここに居たら読みづらいと思うから"
translation = "내가 여기 있으면 읽기 힘들 것 같으니까."

[[dialogue]]
speaker = "せつな"
original = "「ま、待ってほしいでござる……！」"
translation = "「기, 기다려 주시오……!」"

[[dialogue]]
speaker = "せつな"
original = "「確かにせつなには、主様から直接告白を聞く度胸がありませぬ……！」"
translation = "「확실히 세츠나에게는 주군으로부터 직접 고백을 들을 배짱이 없소……!」"

[[dialogue]]
speaker = "せつな"
original = "「そんなせつなのことを思いやって、恋文をしたためてくださったことは、本当に嬉しく思いまする！」"
translation = "「그런 세츠나를 배려하여 연서를 써주신 것은 정말 기쁘게 생각하오!」"

[[dialogue]]
speaker = "せつな"
original = "「主様の目の前でこの文章を読むことも、きっとまだせつなにはできませぬ。そんなことをしたら、きっとせつなの顔と心臓は、爆発してしまいまするっ」"
translation = "「주군의 눈앞에서 이 글을 읽는 것도 분명 아직 세츠나에게는 무리이오. 그런 짓을 하면 분명 세츠나의 얼굴과 심장은 폭발해 버릴 것이오.」"

[[dialogue]]
speaker = "せつな"
original = "「ですが、せつなはここまでして下さった主様から、これ以上逃げたくはないでござるっ」"
translation = "「하지만 세츠나는 이렇게까지 해주신 주군으로부터 더 이상 도망치고 싶지는 않소!」"

[[dialogue]]
speaker = "せつな"
original = "「どうしたらいいのか、せつなにはわからないでござる。だけど、もう主様の気持ちから、自分から遠ざかりたくはないのでござる」"
translation = "「어떻게 해야 할지 세츠나는 모르겠소. 하지만 이제 주군의 마음으로부터, 자신으로부터 멀어지고 싶지는 않소이다.」"

[[dialogue]]
speaker = "unk"
original = "わかった。それなら……"
translation = "알았어. 그렇다면……"

[[dialogue]]
speaker = "せつな"
original = "「せつなが恋文を読み終わるまで、背中を向けたまま一緒に教室で待つ……でござるか？」"
translation = "「세츠나가 연서를 다 읽을 때까지 등을 돌린 채 함께 교실에서 기다려…… 주시는 것이오?」"

[[dialogue]]
speaker = "unk"
original = "せつなには自分のペース読んで欲しい"
translation = "세츠나가 자신의 페이스대로 읽었으면 좋겠어."

[[dialogue]]
speaker = "unk"
original = "焦らなくていい。何時間でも待つから"
translation = "서두르지 않아도 돼. 몇 시간이라도 기다릴 테니까."

[[dialogue]]
speaker = "unk"
original = "正直、赤裸々な自分の好意を綴った文章を、本人に目の前で読まれるのは恥ずかしすぎて死ねるシチュエーションではあったが……"
translation = "솔직히 적나라한 자신의 호의를 엮은 글을 본인 눈앞에서 읽히는 건 너무 부끄러워 죽을 것 같은 상황이었지만……"

[[dialogue]]
speaker = "unk"
original = "きっとせつなも同じような気持ちを味わっていると思えば、覚悟を決めるしかない。"
translation = "분명 세츠나도 비슷한 기분을 맛보고 있을 거라 생각하면 각오를 다질 수밖에 없다."

[[dialogue]]
speaker = "せつな"
original = "「はいっ。ありがとうございまする、主様……！」"
translation = "「네. 고맙소이다, 주군……!」"

[[dialogue]]
speaker = "せつな"
original = "「お、お待たせいたしました、主様……」"
translation = "「오, 오래 기다리셨소, 주군……」"

[[dialogue]]
speaker = "せつな"
original = "「主様の恋文……すべて、読み終わったでござる」"
translation = "「주군의 연서…… 전부 다 읽었소이다.」"

[[dialogue]]
speaker = "せつな"
original = "「それで……そのっ、せつなも主様に、返事がしたいでござる……っ」"
translation = "「그래서…… 그게, 세츠나도 주군께 답장을 하고 싶소……」"

[[dialogue]]
speaker = "unk"
original = "せつなの言葉で、彼女の方を振り返る。"
translation = "세츠나의 말에 그녀 쪽을 돌아본다."

[[dialogue]]
speaker = "unk"
original = "せつなの顔は見たこともないくらい真っ赤に染まっていたが、きっと俺の顔も似たようなものだと思う。"
translation = "세츠나의 얼굴은 본 적 없을 정도로 새빨갛게 물들어 있었지만, 분명 내 얼굴도 비슷할 거라 생각한다."

[[dialogue]]
speaker = "せつな"
original = "「せつなは……今まで、恋愛というものを真面目に考えていなかったでござる」"
translation = "「세츠나는…… 지금까지 연애라는 것을 진지하게 생각하지 않았소.」"

[[dialogue]]
speaker = "せつな"
original = "「そういうのはもっと大人になってからするものだし、そもそも忍びは主に仕えるもので、自分の気持ちと向き合う必要性を、あまり考えていなかったでござる」"
translation = "「그런 건 좀 더 어른이 된 뒤에 하는 것이고, 애초에 닌자는 주군을 모시는 자라 자신의 마음과 마주할 필요성을 별로 생각하지 않았소.」"

[[dialogue]]
speaker = "せつな"
original = "「だけど、せつなは主様に『可愛い』と言ってもらうことがあって……それがとてもとても、嬉しかったのでござる」"
translation = "「하지만 세츠나는 주군에게 『귀엽다』는 말을 들을 때가 있었고…… 그것이 너무나도 기뻤소이다.」"

[[dialogue]]
speaker = "せつな"
original = "「けれど同時に、主様にもっと『可愛い』と言ってもらいたい欲が自分の中に生まれてしまって……それがとてもはしたなく、破廉恥だと思うようになったでござる」"
translation = "「하지만 동시에 주군에게 좀 더 『귀엽다』는 말을 듣고 싶다는 욕심이 자신 안에 생겨나 버려서…… 그것이 무척 천박하고 파렴치하다고 생각하게 되었소.」"

[[dialogue]]
speaker = "せつな"
original = "「なのに主様は、せつなのことを何度も何度も『可愛い』って言うようになって……せつなの中にある欲望も、隠さなくていいって言ってくださって……」"
translation = "「그런데도 주군은 세츠나를 몇 번이고 몇 번이고 『귀엽다』고 말씀하시고…… 세츠나 안에 있는 욕망도 숨기지 않아도 된다고 말씀해 주셔서……」"

[[dialogue]]
speaker = "せつな"
original = "「せつなは忍びなのに、こんなに幸せになってしまって、いいのでありまするか？\u3000なんだかせつなは、怖いのでござりまする……」"
translation = "「세츠나는 닌자인데 이렇게 행복해져도 되는 것이오? 왠지 세츠나는 무섭소이다……」"

[[dialogue]]
speaker = "unk"
original = "せつなも自分も、全部幸せにする"
translation = "세츠나도 나도 전부 행복하게 만들 거야."

[[dialogue]]
speaker = "unk"
original = "俺は魔王だから"
translation = "난 마왕이니까."

[[dialogue]]
speaker = "せつな"
original = "「主様……！\u3000はいっ、せつなは最強の魔王にお仕えする、専属忍者にござりまする！」"
translation = "「주군……! 네, 세츠나는 최강의 마왕을 모시는 전속 닌자이오!」"

[[dialogue]]
speaker = "せつな"
original = "「魔王様がそう言うのでござれば、一介の忍者など、幸せになってしまうしか道はござりませんっ」"
translation = "「마왕님께서 그렇게 말씀하신다면 일개 닌자 따위 행복해지는 길밖에 없소이다.」"

[[dialogue]]
speaker = "せつな"
original = "「そのっ、やっぱり恋愛は恥ずかしくて、今も頭爆発しそうでござりまするが、それでもやっぱりせつなは……っ」"
translation = "「그게, 역시 연애는 부끄러워서 지금도 머리가 폭발할 것 같소만 그래도 역시 세츠나는……」"

[[dialogue]]
speaker = "せつな"
original = "「せつなは主様のことが、大好きでござる……っ！」"
translation = "「세츠나는 주군을 정말 좋아하오……!」"

[[dialogue]]
speaker = "せつな"
original = "「にゃぁぁ……～～～～っ。や、やっと、やっと言えたでござるっ」"
translation = "「냐아아……~~~~앗. 드, 드디어, 드디어 말했소!」"

[[dialogue]]
speaker = "unk"
original = "改めて、恋人になって欲しい"
translation = "새삼스럽지만 연인이 되어줬으면 좋겠어."

[[dialogue]]
speaker = "unk"
original = "俺もせつなのことが好きだ"
translation = "나도 세츠나를 좋아해."

[[dialogue]]
speaker = "せつな"
original = "「は、はいでござる……っ。不束者ではございますが、せつなのこと、主様の恋人にしてほしいでござりまするっ」"
translation = "「네, 네이오…… 부족한 자이오나 세츠나를 주군의 연인으로 삼아 주셨으면 좋겠소이다!」"

[[dialogue]]
speaker = "せつな"
original = "「で、ですが……！\u3000恋人であっても、せつなは一生、主様の専属忍者でございまする！」"
translation = "「하, 하지만……! 연인이라 해도 세츠나는 평생 주군의 전속 닌자이오!」"

[[dialogue]]
speaker = "せつな"
original = "「今後もきちんと、せつなのことは従者として扱ってほしいでござりまする！」"
translation = "「앞으로도 제대로 세츠나를 종자로서 대해 주셨으면 좋겠소이다!」"

[[dialogue]]
speaker = "unk"
original = "そんなことを申し出るせつなと、忍者と恋人をどうやって両立させていくのかという、ちょっとおかしな相談を始める俺たちなのであった──"
translation = "그런 것을 제안하는 세츠나와 닌자와 연인을 어떻게 양립시켜 나갈 것인가 하는 조금 이상한 상담을 시작하는 우리였다──"

