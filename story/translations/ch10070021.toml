[[dialogue]]
speaker = "unk"
original = "第１話,ロロットさんってどんな人？,P"
translation = "제1화, 로롯 씨는 어떤 사람? P"

[[dialogue]]
speaker = "unk"
original = "星騎士が存在する俺たちの世界と、流星クルセイダースが存在するリアさんたちの世界。"
translation = "성기사가 존재하는 우리들의 세계와, 유성 크루세이더즈가 존재하는 리아 씨 일행의 세계."

[[dialogue]]
speaker = "unk"
original = "２つの世界の境界の乱れが落ち着くまで今しばらくかかるため、その間、新星学園の星徒会室を開放することにした。"
translation = "두 세계의 경계 혼란이 진정될 때까지 당분간 시간이 걸리기 때문에, 그동안 신성 학원의 성도회실을 개방하기로 했다."

[[dialogue]]
speaker = "unk"
original = "連日、星騎士の面々が訪れては伝説のクルセイダースと交流を深めており、今日はルリエルがやってきたのだが──"
translation = "연일, 성기사 면면이 방문해서는 전설의 크루세이더즈와 교류를 깊게 하고 있으며, 오늘은 루리엘이 찾아왔는데──"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「ロロットちゃんがどんな人なのかを知りたいの？」"
translation = "「로롯짱이 어떤 사람인지 알고 싶은 거야?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「はい！\u3000向こうの世界にはなかなか行けませんから、少しでもロロットさんのことを知っておきたいな、と思いまして！」"
translation = "「네! 저쪽 세계에는 좀처럼 갈 수 없으니까, 조금이라도 로롯 씨에 대해 알아두고 싶다, 고 생각해서요!」"

[[dialogue]]
speaker = "unk"
original = "ルリエルはお世話になったしね"
translation = "루리엘은 신세를 졌으니까 말이야"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「はいです～♪\u3000素敵なお屋敷、豪華な食べ物、どれをとっても最高だったのですっ」"
translation = "「네에여～♪ 멋진 저택, 호화로운 음식, 어느 것 하나 최고였던 거여요!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「困ったときは執事のじいやさんがしゅばばっと駆けつけてくれましたし、登下校は毎日がリムジンで……！」"
translation = "「곤란할 때는 집사 할아버님이 슈바밧 하고 달려와 주셨고, 등하교는 매일 리무진으로……!」"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「今さらだけどよく違和感を覚えなかったわね。もしかしてルリエルさんもお嬢様だったりするのかしら？」"
translation = "「이제 와서 하는 말이지만 잘도 위화감을 못 느꼈네. 혹시 루리엘 씨도 아가씨라거나 그런 걸까?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「いえ。ルリエルは天界のド田舎の出身なのです！\u3000お金とは無縁なのですよっ」"
translation = "「아뇨. 루리엘은 천계의 깡촌 출신인 거여요! 돈과는 인연이 없는 거여요!」"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「自信満々に言うことじゃないわよ！？」"
translation = "「자신만만하게 말할 게 아니야!?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「でもでも、きっと精神的に似通うところはあると思うのです。リクリエの影響とは言え、この上なく馴染んでいたので……」"
translation = "「그치만 그치만, 분명 정신적으로 닮은 구석은 있다고 생각하는 거여요. 리크리에의 영향이라고는 해도, 더할 나위 없이 잘 맞았으니까……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ロロットさんはきっと素敵な大天使様なのです。だからルリエルもあやかりたいのですよ～♪」"
translation = "「로롯 씨는 분명 멋진 대천사님인 거여요. 그러니까 루리엘도 본받고 싶은 거여요～♪」"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「素敵な大天使様、ね。そこはちょっぴり訂正したいけど、まあ確かにルリエルさんは、ロロットさんに似てるかも？」"
translation = "「멋진 대천사님이라, 음. 그건 조금 정정하고 싶지만, 뭐 확실히 루리엘 씨는, 로롯 씨를 닮았을지도?」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「ふふ、そうだね。好奇心いっぱいに動き回るところなんて、ロロットちゃんにそっくりかも♪」"
translation = "「후후, 그렇네. 호기심 가득하게 여기저기 돌아다니는 점은 로롯짱이랑 판박이일지도♪」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「そのかわいい貯金箱を持ってると本当に似てる。姉妹かなって思っちゃうくらい」"
translation = "「그 귀여운 저금통을 들고 있으면 정말 닮았어. 자매인가 싶을 정도로」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「トントロのことですか？\u3000ロロットさんもいつも持っていたのです？」"
translation = "「톤토로 말인가요? 로롯 씨도 언제나 들고 있었나여?」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「うん。読書する時でもお昼寝する時でも、とっても大事そうにね♪」"
translation = "「응. 독서할 때나 낮잠 잘 때나, 아주 소중하다는 듯이 말이야♪」"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「大切にしてる割にはよく壊してた気もしますけど……」"
translation = "「소중히 여기는 것치고는 자주 부쉈던 기분도 듭니다만……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「おお……！\u3000じゃあルリエルも、この服の時は必ず持ち歩くことにするのです～♪」"
translation = "「오오……! 그럼 루리엘도, 이 옷일 때는 반드시 들고 다니기로 하는 거여요～♪」"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「と、ところで……ごくり。その可愛い貯金箱、後で私にも抱っこさせてもらってもいいかしら？」"
translation = "「그, 그런데…… 꿀꺽. 그 귀여운 저금통, 나중에 나도 한번 안아보게 해 줄 수 있을까?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「もちろんです～。えへへ、一緒にトントロを愛でちゃいましょう～」"
translation = "「물론인 거여요～. 에헤헤, 같이 톤토로를 예뻐해 줘여～」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「あ。そこはちょっと違うかも」"
translation = "「아. 그건 좀 다를지도」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ふぇえ？」"
translation = "「후에?」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「ロロットちゃんなら『トントロは渡しませんよっ』て言うかな～って」"
translation = "「로롯짱이라면 『톤토로는 줄 수 없어요!』라고 말할 것 같아서～」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「そうだったのですかっ。だったら、ルリエルもトントロは渡さないのですっ！」"
translation = "「그랬던 건가여! 그렇다면, 루리엘도 톤토로는 줄 수 없는 거여요!」"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「そそ、そんなぁ～っ！\u3000がっくし……！」"
translation = "「그, 그럴 수가～! 털썩……!」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「よ、余計なことを言っちゃったかな……？」"
translation = "「여, 괜한 소리를 해버린 걸까……?」"

[[dialogue]]
speaker = "unk"
original = "貯金箱もだけど、その本は？"
translation = "저금통도 그렇지만, 그 책은?"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あ、これはガイドブックなのです。『実話・人間界』。トントロと一緒で、これも常に携行していたのです」"
translation = "「아, 이건 가이드북인 거여요. 『실화·인간계』. 톤토로와 마찬가지로, 이것도 항상 휴대하고 있었던 거여요」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「このガイドブック、とっても便利なのですよ～。タメになる言葉がたっくさん載っているのです！」"
translation = "「이 가이드북, 아주 편리한 거여요～. 도움이 되는 말들이 아주 많이 실려 있는 거여요!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「『天使も危うきに近寄らず』『天使は二物を与える』などなど……」"
translation = "「『천사도 위태로운 곳엔 가까이 가지 않는다』 『천사는 두 가지 재능을 준다』 등등……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ルリエル、天使なのに知らないことわざがいっぱいでした！\u3000これを見て勉強して、もっと立派な大天使様になるのですよ～♪」"
translation = "「루리엘, 천사인데도 모르는 속담이 가득했어여! 이걸 보고 공부해서, 더 훌륭한 대천사님이 되는 거여요～♪」"

[[dialogue]]
speaker = "unk"
original = "色々と間違ってるような……？"
translation = "여러모로 틀린 것 같은데……?"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「間違いなく間違っているのだけど……」"
translation = "「틀림없이 틀렸지만……」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「うん。ロロットちゃんに近づくって意味では、この上なく正解～って感じだね♪」"
translation = "「응. 로롯짱에게 다가간다는 의미로는, 더할 나위 없이 정답～이라는 느낌이네♪」"

[[dialogue]]
speaker = "unk"
original = "近づいてるんですか！？"
translation = "다가가고 있는 건가요!?"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「わーい！\u3000嬉しいのですっ。この調子でロロットさんのような素敵な大天使様に──」"
translation = "「와아! 기쁜 거여요. 이 기세로 로롯 씨 같은 멋진 대천사님으로──」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「あ、そんな両手を上げてバンザイなんてしちゃったら──」"
translation = "「아, 그렇게 양손을 들고 만세 같은 걸 해버리면──」"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「貯金箱が──！」"
translation = "「저금통이──!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ひ、ひぇぇえ～っ！\u3000トントロが爆発四散しちゃったのです～っ！」"
translation = "「히, 히에에에～! 톤토로가 폭발사산해버린 거여요～!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あ、あわわ～。とりあえず絆創膏で仮止めを……」"
translation = "「아, 아와와～. 우선 반창고로 임시 고정을……」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「あ。修理の仕方もおんなじなんだ？」"
translation = "「아. 수리하는 방식도 똑같네?」"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「よく持ってたわね、絆創膏」"
translation = "「잘도 가지고 있었네, 반창고」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「備えあれば嬉しいな、なのです……うぅ……」"
translation = "「유비무환은 기쁜 거여요, 인 거여요…… 으으……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ぐすん。応急手当で何とかなりました……トントロ、ごめんなさいなのです」"
translation = "「훌쩍. 응급처치로 어떻게든 됐어여…… 톤토로, 미안한 거여요」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ロロットさんにも怒られちゃうかもしれません。はぅう、ルリエル、いつもドジばっかり」"
translation = "「로롯 씨에게도 혼날지도 몰라요. 하우우, 루리엘, 언제나 덜렁대기만 하고」"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「大丈夫じゃないかしら。ルリエルさんよりもっと壊してた気がするし」"
translation = "「괜찮지 않을까. 루리엘 씨보다 더 많이 부쉈던 기분이 들고」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「そ、そうなのですか！？」"
translation = "「그, 그런가여!?」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「うん。トントロは何度も壊れちゃう運命にある子だからね」"
translation = "「응. 톤토로는 몇 번이고 부서질 운명에 처한 아이니까 말이야」"

[[dialogue]]
speaker = "unk"
original = "いいんですか、それで！？"
translation = "괜찮은 건가요, 그걸로!?"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「そう言っていただけると、安心なのです。あ、そうです。お客様に何かお出しするのですよ」"
translation = "「그렇게 말씀해 주시니, 안심인 거여요. 아, 맞다. 손님에게 무언가 대접해야 하는 거여요」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ルリエルが腕まくりしてお紅茶を淹れるのです～」"
translation = "「루리엘이 소매를 걷어붙이고 홍차를 내오는 거여요～」"

[[dialogue]]
speaker = "unk"
original = "まだ見ぬロロットさんに似ている、と言われることがルリエルはとても嬉しかったらしく、張り切ってお茶の用意を始めて──"
translation = "아직 보지 못한 로롯 씨를 닮았다는 말을 들은 것이 루리엘은 매우 기뻤던 모양이라, 의욕적으로 차 준비를 시작해서──"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あっ。あちちっ……お湯がはねてっ……！」"
translation = "「앗. 뜨거거…… 뜨거운 물이 튀어서……!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「うぁ～！\u3000二度あることは三度笠。また割っちゃったのです～っ……！」"
translation = "「우아～! 세 번은 없다더니 또. 또 깨버린 거여요～!」"

[[dialogue]]
speaker = "unk"
original = "結局トントロはその日だけで３度も天に召されたのだけど、クルセイダースのお２人は懐かしいものを見るような目でくすくす笑うばかり。"
translation = "결국 톤토로는 그날 하루만 3번이나 하늘로 소환되었지만, 크루세이더즈 두 사람은 그리운 것을 보는 듯한 눈으로 킥킥 웃을 뿐이었다."

[[dialogue]]
speaker = "unk"
original = "ロロット・ローゼンクロイツさんって、面白いけどドジな人っていう認識でいいのかな……？"
translation = "로롯 로젠크로이츠 씨라는 사람, 재미있지만 덜렁이인 사람이라는 인식으로 괜찮은 걸까……?"

