[[dialogue]]
speaker = "unk"
original = "第４話,絆の形,P"
translation = "제4화, 유대의 형태, P"

[[dialogue]]
speaker = "unk"
original = "それは、トワ先生と、新しい力『ノヴァフォーム』の訓練している時のことだった。"
translation = "그것은 토와 선생님과 새로운 힘 『노바 폼』 훈련을 하고 있을 때의 일이었다."

[[dialogue]]
speaker_original = "トワ先生（覚醒）"
speaker_translation = "토와 선생님(각성)"
original = "「――よし、Ｓランクモンスター複数でもクリア！\u3000ノヴァフォーム、だいぶ使い慣れてきたよ」"
translation = "「――좋아, S랭크 몬스터 여러 마리라도 클리어! 노바 폼, 꽤 익숙해졌어」"

[[dialogue]]
speaker_original = "トワ先生（覚醒）"
speaker_translation = "토와 선생님(각성)"
original = "「凄まじい星力を発揮できる反面、消耗は激しくて、使う時はやっぱり切り札としてだね」"
translation = "「무시무시한 성력을 발휘할 수 있는 반면, 소모가 격렬해서 역시 사용할 때는 필살기로서네」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「じ～っ……」"
translation = "「지이익……」"

[[dialogue]]
speaker_original = "トワ先生（覚醒）"
speaker_translation = "토와 선생님(각성)"
original = "「ってメイプルちゃん、最近よく、私たちの訓練を見に来てるよね。何かあった？」"
translation = "「그나저나 메이플 짱, 요즘 자주 우리 훈련을 보러 오네. 무슨 일 있었어?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「う、ううん！\u3000なんでもないよ、別に……！」"
translation = "「으, 으응! 아무것도 아니야, 딱히……!」"

[[dialogue]]
speaker_original = "トワ先生（覚醒）"
speaker_translation = "토와 선생님(각성)"
original = "「明らかに何かあるって顔だよね。ねぇ、会長くん。先生からのお願いなんだけど――」"
translation = "「분명히 뭔가 있다는 얼굴인데. 그치, 회장 군. 선생님의 부탁인데――」"

[[dialogue]]
speaker_original = "トワ先生（覚醒）"
speaker_translation = "토와 선생님(각성)"
original = "「メイプルちゃんのこと、任せても大丈夫かな？」"
translation = "「메이플 짱 좀 챙겨줘도 괜찮을까?」"

[[dialogue]]
speaker = "unk"
original = "メイプルを探しに出た俺は、校舎の方へ歩いていく後ろ姿を見つけて、声をかけた。"
translation = "메이플을 찾아 나선 나는 교사 쪽으로 걸어가는 뒷모습을 발견하고 말을 걸었다."

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「あっ、お兄ちゃん……」"
translation = "「앗, 오빠……」"

[[dialogue]]
speaker = "unk"
original = "トワ先生が心配してたぞ"
translation = "토와 선생님이 걱정하시더라"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「うん……そうだよね。わかってる。先生を困らせたくはないんだけど……」"
translation = "「응…… 그렇네. 알고 있어. 선생님을 곤란하게 하고 싶지는 않지만……」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ねぇ、お兄ちゃん、１つお願いしてもいい？」"
translation = "「있지, 오빠, 하나만 부탁해도 돼?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「あたしにも、『アルケインコード』を試してみてくれないかな？」"
translation = "「나한테도, 『아르케인 코드』를 시험해 봐 주지 않을래?」"

[[dialogue]]
speaker = "unk"
original = "アルケインコード――それはメイプルの実家、モノクラウン家が代々継承し、伝えてきたという魔王の秘伝である。"
translation = "아르케인 코드――그것은 메이플의 본가, 모노크라운 가문이 대대로 계승하여 전해 내려왔다는 마왕의 비전이다."

[[dialogue]]
speaker = "unk"
original = "以前、強力なモンスターと相対した際に、メイプルから教えてもらい、それを使ったことで、トワ先生は新たな力の覚醒を果たした。"
translation = "이전에 강력한 몬스터와 대치했을 때, 메이플에게 배워서 그것을 사용한 것으로 토와 선생님은 새로운 힘의 각성을 이루어냈다."

[[dialogue]]
speaker = "unk"
original = "そして、覚醒するにはメイプル曰く、『魔王との絆』が必要であるらしいのだが……"
translation = "그리고 각성하려면 메이플의 말에 따르면, 『마왕과의 유대』가 필요한 모양인데……"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ダメだ……やっぱり発動しない……。あたしはまだ、トワ先生みたいに覚醒できない……」"
translation = "「안 돼…… 역시 발동 안 해……. 나는 아직 토와 선생님처럼 각성할 수 없어……」"

[[dialogue]]
speaker = "unk"
original = "どうして試してみたいと思ったんだ？"
translation = "어째서 시험해 보고 싶다고 생각한 거야?"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「……前は気にならなかったんだけど――」"
translation = "「……전에는 신경 쓰이지 않았는데――」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「その……アルケインコードが発動できるのって、お兄ちゃんとの間に絆があるって証拠でしょ？」"
translation = "「그게…… 아르케인 코드가 발동할 수 있다는 건, 오빠랑 사이에 유대가 있다는 증거잖아?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「それで、あたしもお兄ちゃんと出会ってから、しばらく経つし……最近は仲良くなれてきたなって思ってたから……」"
translation = "「그래서, 나도 오빠랑 만나고 나서 꽤 지났고…… 요즘은 사이가 좋아졌다고 생각했으니까……」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「あたしはトワ先生と比べて、お兄ちゃんとどれぐらい仲良くなれてるのか、気になっちゃって……」"
translation = "「나는 토와 선생님이랑 비교해서 오빠랑 얼마나 사이가 좋아졌는지 궁금해져서……」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「でも、ダメだった……あたしは、トワ先生に負けてる……」"
translation = "「하지만 안 됐어…… 나는 토와 선생님한테 지고 있어……」"

[[dialogue]]
speaker = "unk"
original = "悲しそうな顔をするメイプル。俺はそれを見て――"
translation = "슬픈 표정을 짓는 메이플. 나는 그것을 보고――"

[[dialogue]]
speaker = "unk"
original = "絆の形って、人それぞれだと思うんだ"
translation = "유대의 형태란 사람마다 다르다고 생각해"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker = "unk"
original = "先生とは確かに信頼し合えていると思う。ただ、メイプルとの関係は、先生とはまた違うものだ。"
translation = "선생님과는 확실히 서로 신뢰하고 있다고 생각해. 다만 메이플과의 관계는 선생님과는 또 다른 것이다."

[[dialogue]]
speaker = "unk"
original = "メイプルは俺のこと、どう思ってる？"
translation = "메이플은 나를 어떻게 생각해?"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「お兄ちゃんは……優しくて、いざという時、カッコよく助けてくれる魔王で。本当のお兄ちゃんみたいだって思ってるよ」"
translation = "「오빠는…… 상냥하고, 유사시에 멋있게 구해주는 마왕이라서. 진짜 오빠 같다고 생각하고 있어」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「お兄ちゃんは……？」"
translation = "「오빠는……?」"

[[dialogue]]
speaker = "unk"
original = "俺はちょっと違う"
translation = "나는 좀 달라"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「まさかの妹だとは思われてなかったパターン！？」"
translation = "「설마 여동생이라고는 생각하지 않았던 패턴!?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「――そうじゃなくて、前は妹みたいだと思ってた……？\u3000今は違うってこと……？」"
translation = "「――그게 아니라, 전에는 여동생 같다고 생각했다가……? 지금은 다르다는 거야……?」"

[[dialogue]]
speaker = "unk"
original = "今の俺にとって、メイプルは可愛い女の子だ"
translation = "지금의 나에게 있어 메이플은 귀여운 여자아이야"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「……？\u3000えっ！？\u3000そ、それって……」"
translation = "「……? 엣!? 그, 그거……」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「つまり……そういうこと……？」"
translation = "「즉…… 그런 거야……?」"

[[dialogue]]
speaker = "unk"
original = "俺が頷いてみせると、彼女は顔を赤くして――"
translation = "내가 고개를 끄덕여 보이자, 그녀는 얼굴을 붉히며――"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「そ、そっか……じゃあ確かに、絆を結べてたとは言えないよね……」"
translation = "「그, 그렇구나…… 그럼 확실히 유대를 맺었다고는 할 수 없겠네……」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「あたし、お兄ちゃんがそんな風に思ってたなんて、気付けてなかったし……」"
translation = "「나, 오빠가 그렇게 생각하고 있었을 줄은 눈치채지 못했으니까……」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「で、でも……ごめん。あたし……いきなりだから、これからお兄ちゃんとどう接していけばいいのか、考えがすぐにはまとまらなくて……」"
translation = "「하, 하지만…… 미안. 나…… 갑작스러워서 앞으로 오빠랑 어떻게 대해야 할지 생각이 금방 정리되지 않아서……」"

[[dialogue]]
speaker = "unk"
original = "焦らずゆっくり考えていけばいい"
translation = "서두르지 말고 천천히 생각해 가도 돼"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「う、うん……ありがとう」"
translation = "「으, 응…… 고마워」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「あ、でも――前にデートした時、お兄ちゃんがお姫様抱っこしてくれたでしょ？」"
translation = "「아, 하지만―― 전에 데이트했을 때 오빠가 공주님 안기 해줬잖아?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「あの時……本当はすごくドキドキしたの」"
translation = "「그때…… 사실은 엄청 두근거렸어」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「だからその……お兄ちゃんのことが嫌なわけじゃないから、気持ちが落ち着くまで、少し待ってて欲しいかな……」"
translation = "「그러니까 그…… 오빠가 싫은 게 아니니까 마음이 진정될 때까지 조금만 기다려 줬으면 좋겠어……」"

[[dialogue]]
speaker = "unk"
original = "焦らずゆっくり考えていけばいい"
translation = "서두르지 말고 천천히 생각해 가면 돼"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「あ……！\u3000うん♪\u3000そうだね、改めてお互いのことを知る為にも♪」"
translation = "「아……! 응♪ 그렇네, 다시금 서로를 알기 위해서라도♪」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「にへへ……♪」"
translation = "「니헤헤……♪」"

[[dialogue]]
speaker = "unk"
original = "彼女は照れた笑顔を見せるのだった――"
translation = "그녀는 수줍은 미소를 지어 보였다――"

