[[dialogue]]
speaker = "unk"
original = "第２話,アンラッキーデー,P"
translation = "제2화, 언럭키 데이, P"

[[dialogue]]
speaker = "unk"
original = "サチと知り合ってからしばらく経ったある日、彼女は憂鬱そうな顔を浮かべて再び星徒会室へとやってきた――"
translation = "사치와 알고 지낸 지 꽤 시간이 흐른 어느 날, 그녀는 우울한 표정을 지으며 다시 성도회실로 찾아왔다――"

[[dialogue]]
speaker = "サチ"
original = "「ついにこの日が来てしまいました……１年に１度やって来る、私の『アンラッキーデー』が……！」"
translation = "「드디어 이 날이 오고 말았어요…… 1년에 한 번 찾아오는 저의 『언럭키 데이』가……!」"

[[dialogue]]
speaker = "unk"
original = "それって、不運な日ってこと……？"
translation = "그건 불운한 날이라는 거야……?"

[[dialogue]]
speaker = "トレジアンナ"
original = "「説明しましょう！\u3000『アンラッキーデー』とは、サチさんが普段、異常なまでの幸運を引き寄せていることで、偏りに偏った確率のバランスを取る為に起こる現象――」"
translation = "「설명하죠! 『언럭키 데이』란, 사치 씨가 평소에 비정상적인 행운을 끌어당기고 있는 탓에, 치우칠 대로 치우친 확률의 균형을 맞추기 위해 일어나는 현상――」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「不運の波が纏めて押し寄せて来る、大凶日のことなのです！\u3000この日のサチさんは普段とは逆の、まさに『不幸体質』！\u3000戦闘でも全く役に立たない無能状態です！」"
translation = "「불운의 파도가 한꺼번에 밀려오는 대흉일을 말하는 것입니다! 이 날의 사치 씨는 평소와는 반대인, 그야말로 『불행 체질』! 전투에서도 전혀 도움이 안 되는 무능 상태입니다!」"

[[dialogue]]
speaker = "サチ"
original = "「合ってるけど酷い！」"
translation = "「맞는 말이긴 한데 너무해!」"

[[dialogue]]
speaker = "プリムラ"
original = "「プッ……ブハハハッ！\u3000ウケるのじゃ！\u3000幸運の化け物たるサチにも、意外と人間らしい弱点があったということじゃな！」"
translation = "「큭…… 푸하하하! 웃기는구나! 행운의 괴물인 사치에게도 의외로 인간다운 약점이 있었다는 것이로군!」"

[[dialogue]]
speaker = "サチ"
original = "「いや私、普段から半分は人間だから！\u3000人間界生まれ、流星市国育ちのハーフ魔族だから！」"
translation = "「아니, 나 평소에도 절반은 인간이라니까! 인간계 태생, 유성시국 자생 하프 마족이라고!」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「しかし今回、幸いなことに、新星学園の星徒会室は特別な運気の流れが支配している場所のようで、どうやら比較的アンラッキーデーの影響を受けないようです」"
translation = "「하지만 이번에 다행히도 신성학원의 성도회실은 특별한 운기의 흐름이 지배하고 있는 장소인 듯하여, 아무래도 비교적 언럭키 데이의 영향을 받지 않는 모양입니다.」"

[[dialogue]]
speaker = "サチ"
original = "「なので申し訳ないんですけど、今日だけ星徒会室に避難させて貰いたいんです。お兄さん、お願いできないでしょうか……？」"
translation = "「그래서 죄송하지만 오늘만 성도회실로 피신하게 해주셨으면 해요. 오빠, 부탁드려도 될까요……?」"

[[dialogue]]
speaker = "サチ"
original = "「油断して外を歩こうものなら、交通事故で死にかねないので……」"
translation = "「방심하고 밖을 걷다가는 교통사고로 죽을지도 모르니까요……」"

[[dialogue]]
speaker = "unk"
original = "そこまで！？"
translation = "그 정도야!?"

[[dialogue]]
speaker = "unk"
original = "サチを迫り来る不幸から守る為、俺は護衛として、一緒に星徒会室で泊まり込むことになった――"
translation = "사치를 덮쳐오는 불행으로부터 지키기 위해, 나는 호위로서 함께 성도회실에서 묵기로 했다――"

[[dialogue]]
speaker = "サチ"
original = "「ああ、すごいです……！\u3000アンラッキーデーなのに、こんなに穏やかに過ごせているのは生まれて初めてです」"
translation = "「아아, 굉장해요……! 언럭키 데이인데 이렇게 평온하게 지낼 수 있는 건 태어나서 처음이에요.」"

[[dialogue]]
speaker = "サチ"
original = "「今のところ、寝袋のチャックだけ壊れたり、ＤＩＳＣが突然爆発したり、私の分の食べ物だけ何故か痛んでいたくらいしか、問題が発生してないです。なんという平和……！」"
translation = "「지금까지는 침낭 지퍼만 고장 나거나, DISC가 갑자기 폭발하거나, 내 몫의 음식만 왠지 상해 있었던 정도밖에 문제가 발생하지 않았어요. 이 얼마나 평화로운지……!」"

[[dialogue]]
speaker = "unk"
original = "いや全然平和じゃなくない！？"
translation = "아니, 전혀 평화롭지 않잖아!?"

[[dialogue]]
speaker = "サチ"
original = "「いやいや、例年より全然マシですよ」"
translation = "「아니 아니, 예년보다 훨씬 나은 편이에요.」"

[[dialogue]]
speaker = "サチ"
original = "「テロに巻き込まれたり、隕石が降って来たり、次元の裂け目が自宅に発生したりすることに比べれば」"
translation = "「테러에 휘말리거나, 운석이 떨어지거나, 차원의 균열이 집안에 발생하는 것에 비하면 말이죠.」"

[[dialogue]]
speaker = "unk"
original = "問題のスケールが段違いだった！"
translation = "문제의 스케일이 차원이 달랐다!"

[[dialogue]]
speaker = "プリムラ"
original = "「フハハハ、愚か者め！\u3000そんな日に我を近くに置いておくとは、油断が過ぎるぞ！\u3000せいぜい寝首をかかれぬように注意するのじゃな！」"
translation = "「후하하하, 어리석은 놈! 그런 날에 이 몸을 가까이 두다니, 방심이 과하구나! 기껏해야 자는 사이에 목이 베이지 않도록 주의하도록 하거라!」"

[[dialogue]]
speaker = "サチ"
original = "「いや、アンタは今日は何もしないでしょ」"
translation = "「아니, 당신은 오늘은 아무것도 안 할 거잖아요.」"

[[dialogue]]
speaker = "プリムラ"
original = "「なぬ？\u3000何を根拠に……」"
translation = "「나닛? 무엇을 근거로……」"

[[dialogue]]
speaker = "サチ"
original = "「だって、アンタは不運な私に勝っても嬉しくないでしょ？\u3000力を取り戻してリベンジするって息まいているんだから。違う？」"
translation = "「그야, 당신은 불운한 나에게 이겨봤자 기쁘지 않죠? 힘을 되찾아서 리벤지하겠다고 벼르고 있으니까. 아냐?」"

[[dialogue]]
speaker = "プリムラ"
original = "「……ふん、変な予防線を張りおって。そんなもの、貴様の勝手な思い込みじゃ」"
translation = "「……흥, 이상한 예방선을 치는군. 그런 건 네놈의 제멋대로인 짐작일 뿐이다.」"

[[dialogue]]
speaker = "サチ"
original = "「あ、でも、隙見てペンダントを奪うのもダメだから。そっちはさっきから狙ってるの、分かってるからね」"
translation = "「아, 그래도 틈을 봐서 펜던트를 훔치는 것도 안 되니까요. 그쪽은 아까부터 노리고 있는 거 다 알고 있으니까.」"

[[dialogue]]
speaker = "プリムラ"
original = "「ちっ……バレてたか……」"
translation = "「칫…… 들켰나……」"

[[dialogue]]
speaker = "unk"
original = "２人は最初、戦ってたんだっけ？"
translation = "두 사람, 처음에는 싸우고 있었던가?"

[[dialogue]]
speaker = "プリムラ"
original = "「今も現在進行形で戦ってる最中じゃ！\u3000我はこやつが身に着けてるロストアイテムで、無理やり言うことを聞かされてるだけにすぎんっ」"
translation = "「지금도 현재진행형으로 싸우는 중이다! 이 몸은 이 녀석이 몸에 걸치고 있는 로스트 아이템 때문에 억지로 말을 듣고 있는 것뿐이라니까!」"

[[dialogue]]
speaker = "プリムラ"
original = "「……だがまあ、我の支配する世界が、そのロストアイテム共で破壊されても面白くない。それらを全て回収するまでは、ひとまず手を貸してやらないこともないのじゃ」"
translation = "「……하지만 뭐, 이 몸이 지배할 세계가 그 로스트 아이템들 때문에 파괴되어도 재미없지. 그것들을 전부 회수할 때까지는 일단 힘을 빌려주지 못할 것도 없다.」"

[[dialogue]]
speaker = "サチ"
original = "「私はそれまでに、この自称・悪の終末兵器を更生させるのが目標ですね」"
translation = "「저는 그때까지 이 자칭 악의 종말병기를 갱생시키는 게 목표예요.」"

[[dialogue]]
speaker = "プリムラ"
original = "「自称でないわ！\u3000というか、誰が更生なんぞするか！」"
translation = "「자칭이 아니다! 그보다 누가 갱생 따윌 할까 보냐!」"

[[dialogue]]
speaker = "サチ"
original = "「いいや、更生して貰うから。私が責任持つって学園側に言っちゃったんだから」"
translation = "「아니, 갱생해 줘야겠어. 내가 책임지겠다고 학원 측에 말해버렸으니까.」"

[[dialogue]]
speaker = "プリムラ"
original = "「頼んどらんわ！\u3000我は必ず力を取り戻して、世界征服をしてやるのじゃ！」"
translation = "「부탁한 적 없다! 이 몸은 반드시 힘을 되찾아서 세계 정복을 할 것이니라!」"

[[dialogue]]
speaker = "サチ"
original = "「またそういう、世界征服とか子供みたいなこと言って！\u3000具体性が全然ない癖に！」"
translation = "「또 그렇게 세계 정복이라니, 어린애 같은 소릴 하고! 구체성이라곤 전혀 없으면서!」"

[[dialogue]]
speaker = "プリムラ"
original = "「ええい、我を子供扱いすなぁ～～～っ！」"
translation = "「에에이, 이 몸을 어린애 취급 하지 마라～～～앗!」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「いや～、お２人共、仲が良いですよね～」"
translation = "「이야~ 두 분 다 사이가 참 좋으시네요~」"

[[dialogue]]
speaker = "unk"
original = "そうして、一夜明けて――"
translation = "그렇게 하룻밤이 밝고――"

[[dialogue]]
speaker = "サチ"
original = "「うう～ん、むにゃむにゃ……」"
translation = "「으으음, 냐암냐암……」"

[[dialogue]]
speaker = "unk"
original = "何か……柔らかくて、良い匂いがする……"
translation = "뭔가…… 부드럽고 좋은 냄새가 난다……"

[[dialogue]]
speaker = "サチ"
original = "「ん……もう朝ですか……って、え！？」"
translation = "「음…… 벌써 아침인가요…… 어, 에!?」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「おや、サチさんも会長さんも、ちょうど起きたようですね。グッモーニン♪\u3000いや～、昨晩はお楽しみでしたね！\u3000なんちゃって☆」"
translation = "「오야, 사치 씨도 회장님도 마침 깨어난 모양이네요. 굿 모닝♪ 이야~ 어젯밤은 즐거우셨나 보네요! 농담이에요☆」"

[[dialogue]]
speaker = "unk"
original = "俺の寝袋の中にサチが！？"
translation = "내 침낭 속에 사치가!?"

[[dialogue]]
speaker = "プリムラ"
original = "「どういう寝相をしてたらそうなるんじゃ……ハレンチな……」"
translation = "「어떤 잠버릇을 가져야 그렇게 되는 것이냐…… 파렴치하긴……」"

[[dialogue]]
speaker = "サチ"
original = "「ああ、あああ……！」"
translation = "「아아, 아아아……!」"

[[dialogue]]
speaker = "サチ"
original = "「エッチなことは禁止です～～～～～～～～～っ！！！」"
translation = "「엣찌한 짓은 금지입니다～～～～～～～～～앗!!!」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「『ラッキースケベ』が起こるってことは、どうやら『アンラッキーデー』は終わったみたいですね！」"
translation = "「『럭키 스케베』가 일어났다는 건, 아무래도 『언럭키 데이』는 끝난 모양이네요!」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「めでたし、めでたし♪」"
translation = "「경사로세, 경사로세♪」"

