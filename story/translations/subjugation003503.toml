[[dialogue]]
speaker = "unk"
original = "ミルフィーの姿に１番に反応したのはジャクリーヌだった。"
translation = "밀피의 모습에 가장 먼저 반응한 것은 자클린이었다."

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ゆゆゆっ！？\u3000道士ゆ！\u3000冥界道士ゆ！！」"
translation = "「유유유!? 도사유! 명계도사유!!」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「その通りだ！\u3000素晴らしい再現度だろう？」"
translation = "「그 말대로다! 훌륭한 재현도지 않느냐?」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「完璧だゆ！！」"
translation = "「완벽하유!!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ジャクリーヌさんだけ異様に盛り上がってますけど……」"
translation = "「자클린 씨만 이상하게 분위기 타고 있습니다만……」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「あれじゃないかな？\u3000ジャクリーヌちゃんが見たっていう映画の──」"
translation = "「저거 아닐까? 자클린짱이 봤다는 영화의──」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ヒロインの冥界道士が着てた衣装なの！」"
translation = "「히로인인 명계도사가 입었던 의상인 거유!」"

[[dialogue]]
speaker = "unk"
original = "もしかしてヘレナちゃんもその映画を？"
translation = "설마 헬레나짱도 그 영화를?"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ふふふ……実は映画を見返す機会があってな、ブームが再燃している」"
translation = "「후후후…… 사실 영화를 다시 볼 기회가 있어서 말이다, 붐이 재점화되었노라.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「もとい！\u3000いつ何時、このような事態に見舞われても対処できるよう、秘密裏に準備を進めていたのだ！」"
translation = "「아니! 언제 어느 때, 이런 사태를 겪더라도 대처할 수 있도록, 비밀리에 준비를 진행해왔던 것이다!」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「さすがヘレナだゆ！！」"
translation = "「역시 헬레나유!!」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「今回の相手である──仮称『ゾンビ型幽霊』としようか──それは霊的な存在という話だからな」"
translation = "「이번 상대인── 가칭 『좀비형 유령』이라고 할까── 그것은 영적인 존재라는 이야기니까 말이다.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「この人工戦闘服は霊的な存在に対して特攻を持たせている。彼女なら例え敵が億千万のゾンビ型幽霊であったとしても遅れは取るまい」"
translation = "「이 인공 전투복은 영적인 존재에 대해 특공을 가지게 했노라. 그녀라면 설령 적이 억천만의 좀비형 유령이라 할지라도 뒤처지지는 않겠지.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「おっ、億千万……っ！？\u3000いくら何でもそれは無理だと思います……」"
translation = "「어, 억천만……!? 아무리 그래도 그건 무리라고 생각해요……」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「案ずるな、その為にちゃんとオトモがいるのではないか」"
translation = "「걱정 마라, 그러기 위해 제대로 동료가 있지 않느냐.」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ゆっ！？\u3000オトモ！？\u3000ま、まさか──」"
translation = "「유!? 동료!? 서, 설마──」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「さあ、冥界道士ミルフィーよ！\u3000命じるのだ！」"
translation = "「자, 명계도사 밀피여! 명령하는 것이다!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「え？\u3000ええと……は、入ってきてください、トリシャさんっ！」"
translation = "「에? 저기…… 드, 들어와 주세요, 트리샤 씨!」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「フフフ……トリシャ＝アポテレスマティカ、召喚の呼び声に応え、参上しました」"
translation = "「후후후…… 트리샤 아포테레스마티카, 소환의 부름에 응해, 참상했습니다……」"

[[dialogue]]
speaker = "unk"
original = "ミルフィーに続いて現れたのは、トリシャさんだった。"
translation = "밀피에 이어서 나타난 것은 트리샤 씨였다."

[[dialogue]]
speaker = "unk"
original = "九浄家の屋敷に滞在している占星術師の彼女も、ミルフィーと同じような衣装に身を包んでいる。"
translation = "쿠죠 가문의 저택에 머물고 있는 점성술사인 그녀도, 밀피와 비슷한 의상을 몸에 걸치고 있다."

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「今度は幽霊ゾンビの登場だゆ！\u3000カッコイイゆ！！」"
translation = "「이번에는 유령 좀비의 등장이유! 멋있유!!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「トリシャさんの動き、カフェテリアで暴れていたゾンビ型幽霊と同じ、ぴょんぴょんした動きですね」"
translation = "「트리샤 씨의 움직임, 카페테리아에서 날뛰던 좀비형 유령과 같은, 뿅뿅거리는 움직임이네요.」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「２人が着てるのってチーパオだっけ？\u3000すっごい可愛いんだけど！」"
translation = "「둘이 입고 있는 거 치파오였나? 엄청 귀여운데!」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「フフ……ありがとうございます……」"
translation = "「후후…… 감사합니다……」"

[[dialogue]]
speaker = "unk"
original = "ミルフィーもよく似合ってる"
translation = "밀피도 잘 어울려."

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「そ、そうかな？\u3000えへへ……そんなに真っ直ぐに褒められると、ちょっと恥ずかしいかも……」"
translation = "「그, 그럴까? 에헤헤…… 그렇게 똑바로 칭찬받으면, 조금 부끄러울지도……」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「もしかして会長さんって、こちらの方とはお知り合いなのかな？」"
translation = "「혹시 회장님은, 이분들과 아는 사이인 건가요?」"

[[dialogue]]
speaker = "unk"
original = "ああ、そうだよ"
translation = "아아, 맞아."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ミルフィーは私たちのクラスの委員長なんだよ」"
translation = "「밀피는 우리 반의 위원장이야.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「は、はじめまして！\u3000ミルフィー・インセントです」"
translation = "「처, 처음 뵙겠습니다! 밀피 인센트입니다.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「はじめまして、ミルフィーさん。柊舞亜です」"
translation = "「처음 뵙겠습니다, 밀피 씨. 히이라기 마아입니다.」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あたしはウズメイア！\u3000ウズメって呼んでください♪」"
translation = "「나는 우즈메이야! 우즈메라고 불러줘♪」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「余はジャクリーヌだゆ！\u3000よろしくだゆ！」"
translation = "「여는 자클린유! 잘 부탁하유!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「奏ソフィアです、よろしくお願いします」"
translation = "「카나데 소피아입니다, 잘 부탁드립니다.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「あはは、私はみんなのこと知ってるかな。だって学園中から注目を集めてる有名人ばかりだし」"
translation = "「아하하, 나는 다들 알고 있을까나. 그야 학원 전체에서 주목을 받는 유명인들뿐이고.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「そうでしょうか？\u3000金メダリストの舞亜はともかく、他のみんなは有名人というほどでは無いような……」"
translation = "「그럴까요? 금메달리스트인 마아는 몰라도, 다른 사람들은 유명인이라고 할 정도는 아닌 것 같은데……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「そんなことないよ！\u3000ソフィアさんは流星学園の星徒会書記だし、ウズメさんは１年生にキラキラの可愛い子がいるってよく耳にするよ？」"
translation = "「그렇지 않아! 소피아 씨는 유성 학원의 성도회 서기고, 우즈메 씨는 1학년에 반짝반짝하고 귀여운 아이가 있다고 자주 귀에 들어오는걸?」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「それにハロウィンの代名詞としてジャクリーヌさんのことを知らない学園生はいないと思うし……すごいメンバーが揃ってて畏れ多いよ」"
translation = "「게다가 할로윈의 대명사로서 자클린 씨를 모르는 학원생은 없다고 생각하고…… 대단한 멤버들이 모여 있어서 황송해.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「何を弱気になっているのだミルフィー・インセント、今日の主役は貴殿だぞ？」"
translation = "「무엇을 약해져 있는 것이냐 밀피 인센트, 오늘의 주역은 귀공이다?」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ううっ……が、頑張ります……」"
translation = "「으으…… 여, 열심히 할게요……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ミルフィーさん……私もオトモとしてサポートしますので……」"
translation = "「밀피 씨…… 저도 동료로서 서포트할 테니까요……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ありがとうございます、トリシャさん」"
translation = "「감사합니다, 트리샤 씨.」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「トリシャも余を助けに来てくれたの！\u3000とっても心強いの♪」"
translation = "「트리샤도 여를 도와주러 와준 거유! 정말 든든하유♪」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ジャクリーヌさんとはオトモダチですから……フフ……オトモダチの危機に駆け付けるのは当然のこと……」"
translation = "「자클린 씨와는 친구니까요…… 후후…… 친구의 위기에 달려오는 건 당연한 일……」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ミルフィーとトリシャ、双方の力を合わせれば、より戦闘服の力を引き出すことが出来るはずだ。期待しているぞ、２人とも」"
translation = "「밀피와 트리샤, 양쪽의 힘을 합치면, 더욱 전투복의 힘을 끌어낼 수 있을 것이다. 기대하고 있겠다, 두 사람 모두.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「は、はいっ」"
translation = "「네, 넵.」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「お任せください……」"
translation = "「맡겨주세요……」"

