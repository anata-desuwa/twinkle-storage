[[dialogue]]
speaker = "イクシリオン"
original = "「《命脈》の守護天使を祀る一族の<ruby>末裔<rt>すえ</rt></ruby>として、必ずやアルモタヘル様を解放してみせます！」"
translation = "「《명맥》의 수호천사를 모시는 일족의 후예로서, 반드시 아르모타헬 님을 해방해 보이겠어요!」"

[[dialogue]]
speaker = "マトイ"
original = "「うん！\u3000せっかく守った世界が台無しになっちゃ困るもんね！」"
translation = "「응! 어렵게 지켜낸 세계가 엉망이 되면 곤란하니까!」"

[[dialogue]]
speaker = "リーリア"
original = "「あれが守護天使が封印された神殿です。モンスターが周囲を守っているようなので注意を──」"
translation = "「저것이 수호천사가 봉인된 신전입니다. 몬스터가 주위를 지키고 있는 듯하니 주의를──」"

[[dialogue]]
speaker = "マハムート"
original = "「ナビゲートありがとう。魔女の人」"
translation = "「네비게이트 고마워. 마녀 양반」"

[[dialogue]]
speaker = "リーリア"
original = "「あぅっ」"
translation = "「아으으」"

[[dialogue]]
speaker = "マハムート"
original = "「まさかあなたがスパイだなんて思わなかった──」"
translation = "「설마 네가 스파이였다고는 생각도 못 했어──」"

[[dialogue]]
speaker = "マハムート"
original = "「……言われてみるとスパイらしい言動はいろいろあったわね」"
translation = "「……말하고 보니 스파이다운 언동은 여러 가지로 있었네」"

[[dialogue]]
speaker = "リーリア"
original = "「ええ～～っ！？\u3000完璧なスパイじゃなかったですか！？」"
translation = "「에에~~!? 완벽한 스파이 아니었나요!?」"

[[dialogue]]
speaker = "リーリア"
original = "「騙すつもりは……いやありましたけど。でも新星学園に害を与える気はなくて、私なりにウィンウィンを目指してたんです」"
translation = "「속일 생각은…… 아니, 있었지만요. 하지만 신성학원에 해를 끼칠 생각은 없었고, 나름대로 윈윈을 목표로 하고 있었어요」"

[[dialogue]]
speaker = "マハムート"
original = "「そんなのわかってるわ。スパイだからって、悪どいことができる子じゃないもの」"
translation = "「그런 건 알고 있어. 스파이라고 해서, 못된 짓을 할 수 있는 아이는 아니니까」"

[[dialogue]]
speaker = "リーリア"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker = "マハムート"
original = "「申し訳ないと思ってるなら、戦って役に立ちなさい。魔女の力、当てにしてるから」"
translation = "「미안하다고 생각한다면, 싸워서 도움이 되렴. 마녀의 힘, 기대하고 있으니까」"

[[dialogue]]
speaker = "リーリア"
original = "「……！\u3000イエス、マム！」"
translation = "「……! 예스 마무!」"

[[dialogue]]
speaker = "コハルコ"
original = "『こちら、新星学園・放送委員会委員長のコハルコです。本作戦では私がオペレーションを担当します。よろしくお願いします』"
translation = "『여기는 신성학원 방송위원회 위원장 코하루코입니다. 이번 작전에서는 제가 오퍼레이션을 담당합니다. 잘 부탁드립니다』"

[[dialogue]]
speaker = "マハムート"
original = "「ええ、頼りにしているわ」"
translation = "「그래, 믿고 있을게」"

[[dialogue]]
speaker = "紅明"
original = "「実はアタシも放送委員会なんだけど、ここは任せるぜ、コハルコ委員長！」"
translation = "「사실 나도 방송위원회인데, 여기는 맡겨둘게, 코하루코 위원장!」"

[[dialogue]]
speaker = "コハルコ"
original = "『大型モンスター接近！\u3000迎撃してください！』"
translation = "『대형 몬스터 접근! 요격해 주세요!』"

[[dialogue]]
speaker = "リップル"
original = "「モンスターはビッグウェーブで押し流シま～す！」"
translation = "「몬스터는 빅 웨이브로 휩쓸어 버리겠어~요!」"

[[dialogue]]
speaker = "リップル"
original = "「イエ～イ♪\u3000魔界でもイイ波来てマース！」"
translation = "「이예~이♪ 마계에서도 좋은 파도가 오고 있네~요!」"

[[dialogue]]
speaker = "ヨミ"
original = "「星術で生み出した波だから当然なのでは……？」"
translation = "「성술로 만들어낸 파도니까 당연한 거 아닐까……?」"

[[dialogue]]
speaker = "コハルコ"
original = "『ヨミさん、右からモンスターが接近、数２！』"
translation = "『요미 씨, 오른쪽에서 몬스터 접근, 수 2!』"

[[dialogue]]
speaker = "ヨミ"
original = "「こやっ！？」"
translation = "「코얏!?」"

[[dialogue]]
speaker = "セシア"
original = "「フェアリーズパーティー！」"
translation = "「페어리즈 파티!」"

[[dialogue]]
speaker = "セシア"
original = "「油断大敵よ、ヨミヨミ」"
translation = "「방심은 금물이야, 요미요미」"

[[dialogue]]
speaker = "ヨミ"
original = "「セシアちゃん！\u3000来てくれたんですね」"
translation = "「세시아 짱! 와주었군요」"

[[dialogue]]
speaker = "セシア"
original = "「ええ、星騎士のみんなだけに戦わせるのは申し訳ないもの。元はと言えばわたくしたちの不始末なのだし」"
translation = "「응, 성기사들만 싸우게 하는 건 미안한걸. 원래 따지고 보면 우리들의 불찰이기도 하고」"

[[dialogue]]
speaker = "紅明"
original = "「いえぃ♪\u3000セッシーがいれば百人力っしょ！」"
translation = "「이예이♪ 세시가 있으면 백인대장급이지!」"

[[dialogue]]
speaker = "セシア"
original = "「紅明ママ～♪\u3000抱っこして～♪」"
translation = "「코우메이 마마~♪ 안아줘~♪」"

[[dialogue]]
speaker = "紅明"
original = "「もちろんだぜセッシー♪\u3000ギュ～♪」"
translation = "「물론이지 세시♪ 꼬옥~♪」"

[[dialogue]]
speaker = "ヨミ"
original = "「いつ見てもすごい甘えっぷり……さっき助けてくれた時とは別人みたいです」"
translation = "「언제 봐도 대단한 응석…… 아까 도와줬을 때와는 딴판이에요」"

[[dialogue]]
speaker = "紅明"
original = "「それじゃ──」"
translation = "「그럼──」"

[[dialogue]]
speaker = "紅明"
original = "「クリスマスフォームに変☆身♪\u3000セッシーと一緒ならこっちでいくぜ♪」"
translation = "「크리스마스 폼으로 변☆신♪ 세시와 함께라면 이걸로 가겠어♪」"

[[dialogue]]
speaker = "セシア"
original = "「ほら、ヨミヨミも」"
translation = "「자, 요미요미도」"

[[dialogue]]
speaker = "ヨミ"
original = "「こやっ！？\u3000私もですか！？」"
translation = "「코얏!? 저도 말인가요!?」"

[[dialogue]]
speaker = "紅明"
original = "「そうそう、ノリが大事だぜ♪」"
translation = "「그래그래, 분위기가 중요하다구♪」"

[[dialogue]]
speaker = "ヨミ"
original = "「理由がよくわかりませんけど……えっ、え～いっ！」"
translation = "「이유를 잘 모르겠지만…… 에, 에잇!」"

[[dialogue]]
speaker = "ヨミ"
original = "「天ヶ崎ヨミ、クリスマスフォームっ！\u3000魔界に破邪の音を響かせます！」"
translation = "「아마가사키 요미, 크리스마스 폼! 마계에 파사의 소리를 울려 퍼뜨리겠습니다!」"

[[dialogue]]
speaker = "モンスター"
original = "「ガアアアアアッ！！」"
translation = "「가아아아앗!!」"

[[dialogue]]
speaker = "メルエル"
original = "「邪魔はさせないよ──ディヴォーテッド・ラプソディー！」"
translation = "「방해하게 두지 않아── 디보티드 랩소디!」"

[[dialogue]]
speaker = "モンスター"
original = "「ガアアアアッ！」"
translation = "「가아아아앗!」"

[[dialogue]]
speaker = "ユーリス"
original = "「映画には空を飛ぶサメもいるそうですが、こんな感じなのでしょうか？」"
translation = "「영화에는 하늘을 나는 상어도 있다고 합니다만, 이런 느낌인 걸까요?」"

[[dialogue]]
speaker = "ユーリス"
original = "「ですが映画のように食べられるわけにはいきません。我が祖国・ジルラント王国を救うためにも、守護天使を解放させてもらいます！」"
translation = "「하지만 영화처럼 먹힐 수는 없습니다. 제 조국 질란트 왕국을 구하기 위해서라도, 수호천사를 해방하겠습니다!」"

[[dialogue]]
speaker = "メルエル"
original = "「モンスターは私たちに任せて、みんな、今のうちに！」"
translation = "「몬스터는 우리에게 맡기고, 모두들 지금이야!」"

[[dialogue]]
speaker = "マトイ"
original = "「うん、ありがとう！」"
translation = "「응, 고마워!」"

[[dialogue]]
speaker = "メルエル"
original = "「私だって世界を救う星騎士なんだから！\u3000一意専心──みんなの背中は絶対守ってみせるよ！」"
translation = "「나도 세계를 구하는 성기사니까! 일의전심── 모두의 뒤는 반드시 지켜낼게!」"

[[dialogue]]
speaker = "リーリア"
original = "「そろそろ堕天使と接敵してもおかしくないはずなんですが……」"
translation = "「슬슬 타천사와 접적해도 이상하지 않을 텐데요……」"

[[dialogue]]
speaker = "コハルコ"
original = "『リーリアさん、後方から敵性反応高速で接近！』"
translation = "『리리아 씨, 후방에서 적성 반응 고속으로 접근!』"

[[dialogue]]
speaker = "リーリア"
original = "「──！？」"
translation = "「──!?」"

[[dialogue]]
speaker = "マトイ"
original = "「ふぅ……間に合った……」"
translation = "「후우…… 시간 맞춰 왔어……」"

[[dialogue]]
speaker = "リーリア"
original = "「守ってくれてありがとうございます、マトイ先輩！」"
translation = "「지켜주셔서 감사합니다, 마토이 선배!」"

[[dialogue]]
speaker = "マトイ"
original = "「ううん、私の取柄なんてこのくらいだから」"
translation = "「아니야, 내 장점이라곤 이 정도뿐이니까」"

[[dialogue]]
speaker = "マハムート"
original = "「どうやらお出ましのようね」"
translation = "「아무래도 나타난 모양이네」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「人間、天使、魔族……そして魔女……種族の交わり……ああ、おぞましい……」"
translation = "「인간, 천사, 마족…… 그리고 마녀…… 종족의 뒤섞임…… 아아, 소름 끼쳐……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「アルモタヘル様……やはり完全に正気を失っておられますね。お労しや」"
translation = "「아르모타헬 님…… 역시 완전히 정기를 잃으셨군요. 가여워라」"

[[dialogue]]
speaker = "イクシリオン"
original = "「私はアルモタヘル様に仕える者。ここで役に立てなければ、星騎士になった意味がありません。この戦いに私の全てを懸けます！」"
translation = "「저는 아르모타헬 님을 모시는 자. 여기서 도움이 되지 못하면, 성기사가 된 의미가 없습니다. 이 싸움에 제 모든 것을 걸겠어요!」"

[[dialogue]]
speaker = "マハムート"
original = "「私たちが一緒に戦っているのが気に入らないとでも言いたげね。気に入らないのはこっちだわ。跪きなさい」"
translation = "「우리가 함께 싸우는 게 마음에 안 든다는 표정이네. 마음에 안 드는 건 이쪽이야. 무릎 꿇으렴」"

[[dialogue]]
speaker = "マトイ"
original = "「アルモタヘルさん……今元に戻しますからね！」"
translation = "「아르모타헬 씨…… 지금 원래대로 되돌려 드릴게요!」"

[[dialogue]]
speaker = "リーリア"
original = "「魔女の、ネビュラの１人として、そして新星学園の一員として──必ず勝ちます！」"
translation = "「마녀로서, 네뷸라의 일원으로서, 그리고 신성학원의 일원으로서── 반드시 이기겠어요!」"

[[dialogue]]
speaker = "イクシリオン"
original = "「《命脈》の従者として……イクシリオン、参ります──！」"
translation = "「《명맥》의 종자로서…… 익실리온, 가겠습니다──!」"

