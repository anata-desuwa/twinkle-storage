[[dialogue]]
speaker = "unk"
original = "第２話,極星星徒会,B"
translation = "제2화, 극성성도회"

[[dialogue]]
speaker_original = "グリコーン"
speaker_translation = "그리콘"
original = "「クルルルーッ！！」"
translation = "「크르르르르!!」"

[[dialogue]]
speaker = "？？？"
original = "「フッ──」"
translation = "「훗──」"

[[dialogue]]
speaker_original = "グリコーン"
speaker_translation = "그리콘"
original = "「クルル！？」"
translation = "「크르르!?」"

[[dialogue]]
speaker = "unk"
original = "紫炎を帯びた斬撃がガーディアンを両断し、残骸が炎に包まれて落下していく。"
translation = "자색 불꽃을 띤 참격이 가디언을 양단하고, 잔해가 불길에 휩싸여 낙하해 간다."

[[dialogue]]
speaker = "？？？"
original = "「まぁこんなものかしら」"
translation = "「뭐, 이 정도일까」"

[[dialogue]]
speaker_original = "アリコーン"
speaker_translation = "알리콘"
original = "「ヒヒィィン！！」"
translation = "「히히잉!!」"

[[dialogue]]
speaker = "unk"
original = "天馬のガーディアンが女性に突進を仕掛けるが……"
translation = "천마 가디언이 여성을 향해 돌진하지만……"

[[dialogue]]
speaker = "？？？"
original = "「させませんっ！」"
translation = "「하게 두지 않아요!」"

[[dialogue]]
speaker = "unk"
original = "茨の鞭がガーディアンの翼を絡め取り、動きを封じる。"
translation = "가시 채찍이 가디언의 날개를 휘감아 움직임을 봉쇄한다."

[[dialogue]]
speaker = "？？？"
original = "「これで終わりです！」"
translation = "「이걸로 끝입니다!」"

[[dialogue]]
speaker = "unk"
original = "そして蝶の<ruby>翅<rt>はね</rt></ruby>の騎士がもう一度鞭を振るい、ガーディアンを地面に叩きつける。"
translation = "그리고 나비 날개의 기사가 다시 한번 채찍을 휘둘러 가디언을 지면에 내동댕이친다."

[[dialogue]]
speaker = "unk"
original = "空を駆けていたガーディアンは地に伏し、そのまま動かなくなった。"
translation = "하늘을 달리던 가디언은 땅에 엎어져 그대로 움직이지 않게 되었다."

[[dialogue]]
speaker = "unk"
original = "ここは天界の空、雲の海の中にある女神の神殿。"
translation = "이곳은 천계의 하늘, 구름 바다 속에 있는 여신의 신전."

[[dialogue]]
speaker = "unk"
original = "少女たちに<ruby>屠<rt>ほふ</rt></ruby>られたのは、その神殿を守るガーディアンたちだ。"
translation = "소녀들에게 도륙당한 것은 그 신전을 지키는 가디언들이다."

[[dialogue]]
speaker = "？？？"
original = "「ふぅ──神殿外部を防衛するガーディアンはあらかた片付きましたね！」"
translation = "「후우── 신전 외부를 방어하는 가디언은 대충 정리되었네요!」"

[[dialogue]]
speaker = "？？？"
original = "「ええ、今のところは予定どおり。グレイス、怪我はないかしら？」"
translation = "「그래, 지금으로선 예정대로야. 그레이스, 다친 곳은 없니?」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「もちろんです！\u3000ルヴィの指令はたくさんありますから、こんなところで躓いていられません！」"
translation = "「물론이죠! 루비의 지령은 많이 있으니까, 이런 곳에서 지체할 수는 없어요!」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「レティシアも危ない時は私を頼ってください！\u3000ここは敵地ですからね！」"
translation = "「레티시아도 위험할 때는 저를 의지해 주세요! 여기는 적지니까요!」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「ふふ、頼もしいわね。それじゃあ改めて、作戦の確認をしましょうか？」"
translation = "「후후, 든든하네. 그럼 다시 한번 작전을 확인해 볼까?」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「はい！\u3000私たちはこれから女神の神殿内部に侵入。神殿の中枢部分を破壊し、機能を停止させます！」"
translation = "「네! 저희는 이제부터 여신의 신전 내부로 침입. 신전의 중추 부분을 파괴하여 기능을 정지시킵니다!」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「そうすると、アルタイルの全ての天使が消滅します。……合ってますよね？」"
translation = "「그렇게 되면 알타이르의 모든 천사가 소멸합니다. ……맞죠?」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「ええ、大丈夫よ」"
translation = "「응, 맞아」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「念のためもう一度聞きますけど……アルタイルにある女神の神殿を破壊しても、レティシアは消えないんですよね？」"
translation = "「만약을 위해 다시 한번 묻겠는데…… 알타이르에 있는 여신의 신전을 파괴해도 레티시아는 사라지지 않는 거죠?」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「もちろん。私はデネブの天使だもの。アルタイルの神殿を破壊しても消滅したりしないわ」"
translation = "「물론이지. 나는 데네브의 천사인걸. 알타이르의 신전을 파괴해도 소멸하거나 하지 않아」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「ルヴィから何度も説明は受けたでしょう？\u3000まだ不安なのかしら」"
translation = "「루비에게 몇 번이나 설명을 들었잖아? 아직 불안한 거니」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「当然ですっ！\u3000神殿の機能が止まった途端、レティシアがふわーって消えちゃったらイヤです！\u3000泣きますからね、私！」"
translation = "「당연하죠! 신전의 기능이 멈추자마자 레티시아가 화아악 사라져 버리면 싫단 말이에요! 울어버릴 거니까요, 저!」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「グレイスは心配症ね。大丈夫よ。『ベアトとチナを連れ帰れ』というのも、ルヴィの指令の１つだもの」"
translation = "「그레이스는 걱정이 많네. 괜찮아. 『베아토와 치나를 데려와라』라는 것도 루비의 지령 중 하나인걸」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「与えられた指令を果たすまで、私は死なないわ」"
translation = "「주어진 지령을 완수할 때까지 나는 죽지 않아」"

[[dialogue]]
speaker = "unk"
original = "蝶の翅を持ち、茨の鞭を携えた騎士はグレイス・オベロニア。"
translation = "나비 날개를 가졌으며 가시 채찍을 든 기사는 그레이스 오베로니아."

[[dialogue]]
speaker = "unk"
original = "身の丈に届きそうな刀を持ち、妖艶な雰囲気をまとった天使はレティシア・オルティース。"
translation = "키만큼 긴 도를 들고 요염한 분위기를 풍기는 천사는 레티시아 오르티스."

[[dialogue]]
speaker = "unk"
original = "２人とも極星学園星徒会の一員で、星徒会長であるルヴィネから天界襲撃作戦を任されている。"
translation = "두 사람 모두 극성학원 성도회의 일원으로, 성도회장인 루비네로부터 천계 습격 작전을 맡고 있다."

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「それなら安心ですね──っと。今さらですけど、転送装置。私が持ってていいんでしょうか？」"
translation = "「그렇다면 안심이네요── 앗. 이제 와서 하는 말이지만, 전송 장치. 제가 가지고 있어도 되는 걸까요?」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「あら、どうして？」"
translation = "「어머, 왜?」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「いや、だってこれ……最後の１個じゃないですか？」"
translation = "「아니, 그게…… 마지막 한 개잖아요?」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「星徒会のみなさん、いつもは壊れたらまずいものは私に預けてくれないのに……いったいどういう風の吹き回しなのかな～と……」"
translation = "「성도회 여러분, 평소에는 망가지면 안 되는 물건은 저한테 안 맡겨주시는데…… 대체 어쩌다 이런 바람이 불었나 해서요……」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「あなたを信頼しているから預けるのよ」"
translation = "「너를 신뢰하니까 맡기는 거야」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「ほんとですか！\u3000嬉しいです！」"
translation = "「정말인가요! 기뻐요!」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「というのは、実は嘘なの」"
translation = "「라는 건 사실 거짓말이야」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「そんな！\u3000嘘だったのですか！」"
translation = "「세상에! 거짓말이었나요!」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「ルヴィからの言いつけよ。転送装置はグレイスに持たせてあげてって」"
translation = "「루비의 당부야. 전송 장치는 그레이스에게 들려주라고」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「デネブへ帰還するにも、極星従騎を呼び出すにも、転送装置は不可欠でしょう？」"
translation = "「데네브로 귀환할 때도, 극성종기를 불러낼 때도 전송 장치는 필수적이잖아?」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「アルタイルの星騎士と戦う際、強力なサポートになるものだわ。私には必要ないから、大切に使ってちょうだい」"
translation = "「알타이르의 성기사와 싸울 때 강력한 서포트가 될 물건이야. 내게는 필요 없으니 소중히 사용해 주렴」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「う～、敵地なのに、この余裕の態度……」"
translation = "「우~ 적지인데도 이 여유로운 태도……」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「私の方が、あなたより強いもの」"
translation = "「내가 너보다 강하니까」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「確かにルヴィといい勝負ができるのはレティシアくらいですけれど……悔しいです！\u3000いつか私が勝ちますからね！」"
translation = "「확실히 루비와 좋은 승부를 할 수 있는 건 레티시아 정도지만…… 분해요! 언젠가 제가 이길 거니까요!」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「ええ。楽しみにしているわ。それと転送装置のことだけど、注意事項よ」"
translation = "「그래. 기대하고 있을게. 그리고 전송 장치에 대한 주의사항이야」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「もし劣勢になったとしても、チナの時のように決して暴走はさせないこと」"
translation = "「혹시 열세에 몰리더라도 치나 때처럼 결코 폭주시키지 말 것」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「わかってます。私たちがいない間に、チナが捨て身の作戦を行ったって……ルヴィもチナを１人で行かせたこと、ひどく後悔してましたから……」"
translation = "「알고 있어요. 저희가 없는 사이에 치나가 결사의 작전을 수행했다고…… 루비도 치나를 혼자 보내버린 걸 몹시 후회하고 있었으니까요……」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「ルヴィが自爆特攻なんて望んでないって、わかってるのならいいわ」"
translation = "「루비가 자폭 특공 같은 걸 바라지 않는다는 걸 알고 있다면 됐어」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「もちろんです！」"
translation = "「물론입니다!」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「──そういうことを頼むなら、私に頼めばいいのにね」"
translation = "「──그런 걸 부탁할 거라면 나한테 부탁하면 좋을 텐데 말이야」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「え？」"
translation = "「네?」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「いいえ、何でも──ともかくルヴィの指令よ。装置の暴走は禁止。危なくなったら撤退を優先。わかったかしら？」"
translation = "「아니, 아무것도── 어쨌든 루비의 지령이야. 장치의 폭주는 금지. 위험해지면 철수를 우선. 알겠니?」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「はい、了解です！」"
translation = "「네, 알겠습니다!」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「それにしてもチナが生きてたのは嬉しい報告ですね。アルタイルの人達にどのような扱いを受けているかはわかりませんが……」"
translation = "「그나저나 치나가 살아있었다니 기쁜 보고네요. 알타이르 사람들에게 어떤 취급을 받고 있는지는 모르겠지만……」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「ルヴィが言うには、魔王クロトの所に捕らえられているみたいね。救出は骨が折れそうだわ」"
translation = "「루비 말로는 마왕 쿠로토가 있는 곳에 붙잡혀 있는 모양이야. 구출하는 건 꽤나 고생스럽겠어」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「ですが見捨てたりできません！\u3000天界襲撃が終わったら、すぐ人間界に向かいましょう！」"
translation = "「하지만 저버릴 수는 없어요! 천계 습격이 끝나면 바로 인간계로 향해요!」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「……魔王クロトはひどい人です。チナがどんな目に遭っているか……早く助けだしてあげないと」"
translation = "「……마왕 쿠로토는 끔찍한 사람이에요. 치나가 어떤 꼴을 당하고 있을지…… 빨리 구해줘야 해요」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「そうね。１０年前に、私たちを見捨てた借りも返さないといけないわ」"
translation = "「그래. 10년 전에 우리를 저버린 빚도 갚아줘야겠지」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「はい！\u3000行きましょう、レティシ──」"
translation = "「네! 가요, 레티시──」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「とうちゃーく」"
translation = "「도착~」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「待ちなさーい！\u3000神殿を破壊なんてさせないわ！」"
translation = "「기다려! 신전을 파괴하게 두지 않겠어!」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「──！\u3000アルタイルの星騎士……ずいぶん早い到着ですね！？」"
translation = "「──! 알타이르의 성기사…… 상당히 빨리 도착했네요!?」"

[[dialogue]]
speaker = "unk"
original = "グレイスたちが神殿内部に侵入しようとしたところに、ナターシャたちアルタイルの星騎士たちが駆け付ける。"
translation = "그레이스 일행이 신전 내부로 침입하려던 찰나, 나타샤를 비롯한 알타이르의 성기사들이 달려온다."

[[dialogue]]
speaker = "unk"
original = "そしてその中に──"
translation = "그리고 그중에는──"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「グレイスちゃん！\u3000レティシアちゃん！」"
translation = "「그레이스짱! 레티시아짱!」"

[[dialogue]]
