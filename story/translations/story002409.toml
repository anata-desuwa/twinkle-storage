[[dialogue]]
speaker = "蘭美"
original = "「くっ……！\u3000ここまで、ね……」"
translation = "「큭……! 여기까지, 인가……」"

[[dialogue]]
speaker = "ヨミ"
original = "「こやぁぁぁぁぁ……」"
translation = "「코야아아아아아……」"

[[dialogue]]
speaker = "マトイ"
original = "「勝負あり！\u3000勝者、トワちゃん先生！」"
translation = "「승부 종료! 승자, 토와짱 선생님!」"

[[dialogue]]
speaker = "トワ先生"
original = "「やった！\u3000やったよ！\u3000わたしの勝ちだよ！」"
translation = "「해냈어! 해냈어! 내가 이겼어!」"

[[dialogue]]
speaker = "トワ先生"
original = "「会長くん、見ててくれた？\u3000あなたのお嫁さんが見事勝利しましたよ～！！」"
translation = "「회장군, 보고 있었어? 당신의 신부가 멋지게 승리했어요~!!」"

[[dialogue]]
speaker = "unk"
original = "おめでとう！\u3000いい勝負だったよ"
translation = "축하해! 좋은 승부였어"

[[dialogue]]
speaker = "トワ先生"
original = "「えへへへ～、これもウェディングフォームのおかげだよ」"
translation = "「에헤헤헤~ 이것도 웨딩 폼 덕분이야」"

[[dialogue]]
speaker = "トワ先生"
original = "「２人ともほんとに強かったもん。ウェディングフォームのスペックはこっちが上なのにね」"
translation = "「둘 다 정말 강했는걸. 웨딩 폼의 스펙은 이쪽이 위인데 말이야」"

[[dialogue]]
speaker = "蘭美"
original = "「……さすがに技量だけでは届かなかったみたいね」"
translation = "「……역시 기량만으로는 닿지 않았나 보네」"

[[dialogue]]
speaker = "トワ先生"
original = "「愛の強さが勝負を分けたんだよ。わたし達、お嫁さんとして競い合ってたんだから」"
translation = "「사랑의 깊이가 승부를 가른 거야. 우린 신부로서 경쟁하고 있었으니까」"

[[dialogue]]
speaker = "蘭美"
original = "「そうね。先生の想い、見せてもらったわ。こんなにも深く会長を愛しているなんて」"
translation = "「그렇네. 선생님의 마음, 잘 봤어. 이렇게나 깊게 회장을 사랑하고 있다니」"

[[dialogue]]
speaker = "トワ先生"
original = "「愛っ……して……」"
translation = "「사……랑……」"

[[dialogue]]
speaker = "蘭美"
original = "「あれだけの啖呵を切ったのに、なぜ今更照れるのかしら？」"
translation = "「그렇게 큰소리를 쳐놓고 왜 이제 와서 수줍어하는 걸까?」"

[[dialogue]]
speaker = "トワ先生"
original = "「だ、だって、あれは会長くんを絶対助けなきゃって必死だったからで……」"
translation = "「그, 그야 그건 회장군을 꼭 구해야 한다는 생각에 필사적이라서 그랬던 거고……」"

[[dialogue]]
speaker = "蘭美"
original = "「そんな調子だと、またさらってしまうわよ？」"
translation = "「그런 식이면 또 납치해 버릴지도 모른다구?」"

[[dialogue]]
speaker = "トワ先生"
original = "「それはダメぇっ！」"
translation = "「그건 안 돼!」"

[[dialogue]]
speaker = "蘭美"
original = "「だったらちゃんと胸を張ることね、立派な花嫁として」"
translation = "「그렇다면 당당하게 행동해, 훌륭한 신부로서」"

[[dialogue]]
speaker = "蘭美"
original = "「さて、ウェディングフォームの性能テストも一旦は十分かしら？\u3000トワ先生のも、こちらの白無垢の方も」"
translation = "「자, 웨딩 폼의 성능 테스트도 일단은 충분하려나? 토와 선생님의 것도, 이쪽의 시로무쿠 쪽도」"

[[dialogue]]
speaker = "トワ先生"
original = "「ふぇ？\u3000それってどういう……？」"
translation = "「후에? 그게 무슨……?」"

[[dialogue]]
speaker = "蘭美"
original = "「気にしなくていい話よ。貴方は理想の結婚を成し遂げて、ウェディングフォームを自分のものにしてしまいなさい」"
translation = "「신경 쓰지 않아도 될 얘기야. 당신은 이상적인 결혼을 성취해서 웨딩 폼을 자신의 것으로 만들도록 해」"

[[dialogue]]
speaker = "トワ先生"
original = "「う、うんっ」"
translation = "「으, 응!」"

[[dialogue]]
speaker = "マトイ"
original = "「緊急アラートです！\u3000流星市付近にモンスターの出現を確認しました！」"
translation = "「긴급 경보입니다! 유성시 부근에 몬스터 출현을 확인했습니다!」"

[[dialogue]]
speaker = "蘭美"
original = "「最高のタイミングね、対モンスターの性能も確認できるなんて丁度いいじゃない」"
translation = "「최고의 타이밍이네, 대 몬스터 성능까지 확인할 수 있다니 딱 좋잖아」"

[[dialogue]]
speaker = "トワ先生"
original = "「大丈夫なの？\u3000あれだけ激しい戦闘をした直後なのに」"
translation = "「괜찮겠어? 그렇게 격렬하게 전투한 직후인데」"

[[dialogue]]
speaker = "蘭美"
original = "「平気よ、この程度の連戦は慣れっこだもの。貴方の方こそ大丈夫なのかしら？」"
translation = "「멀쩡해, 이 정도 연전은 익숙하니까. 당신이야말로 괜찮은 거야?」"

[[dialogue]]
speaker = "トワ先生"
original = "「もちろん大丈夫♪」"
translation = "「물론 괜찮지♪」"

[[dialogue]]
speaker = "蘭美"
original = "「ヨミヨミ、いつまでノビてるの！\u3000貴方もついてきなさい！」"
translation = "「요미요미, 언제까지 뻗어 있을 거야! 너도 따라와!」"

[[dialogue]]
speaker = "ヨミ"
original = "「こやぁぁん！\u3000少しは休ませてくださいよぉ～～～！！」"
translation = "「코야아앙! 조금은 쉬게 해주세요오오~~!!!」"

[[dialogue]]
speaker = "蘭美"
original = "「甘えたこと言わないの！\u3000九浄家メイド隊の一員なら、その名に恥じない姿を見せなさい！」"
translation = "「응석 부리지 마! 쿠죠 가문 메이드대의 일원이라면 그 이름에 부끄럽지 않은 모습을 보이도록 해!」"

[[dialogue]]
speaker = "トワ先生"
original = "「スパルタだなぁ……」"
translation = "「스파르타네……」"

[[dialogue]]
speaker = "トワ先生"
original = "「そこです！\u3000たあっ！！」"
translation = "「거기다! 타앗!!」"

[[dialogue]]
speaker = "マトイ"
original = "「逃げ遅れた人はいませんかー？\u3000こちらに避難して下さーい！」"
translation = "「미처 피하지 못한 분 없나요─? 이쪽으로 대피하세요─!」"

[[dialogue]]
speaker = "ヨミ"
original = "「さっきは活躍できなかったけど、ここで挽回させてもらいますよ～～っ！！」"
translation = "「아까는 활약하지 못했지만, 여기서 만회하겠어요~~!!」"

[[dialogue]]
speaker = "蘭美"
original = "「遅い！」"
translation = "「느려!」"

[[dialogue]]
speaker = "トワ先生"
original = "「蘭美ちゃん！\u3000こっちは任せて！」"
translation = "「라비짱! 이쪽은 맡겨줘!」"

[[dialogue]]
speaker = "蘭美"
original = "「わかったわ！\u3000そっちの敵は任せたわよ！」"
translation = "「알았어! 그쪽 적은 맡길게!」"

[[dialogue]]
speaker = "トワ先生"
original = "「うんっ！\u3000行くよ～、会長くん！」"
translation = "「응! 가자, 회장군!」"

[[dialogue]]
speaker = "unk"
original = "了解です！"
translation = "알겠습니다!"

[[dialogue]]
speaker = "トワ先生"
original = "「結婚式は中断しちゃったけど、２人のはじめての共同作業、ここで見せちゃうんだから～～！！」"
translation = "「결혼식은 중단됐지만, 우리의 첫 공동 작업, 여기서 보여줄 테니까~~!!」"

[[dialogue]]
speaker = "トワ先生"
original = "「終わったね……みんなお疲れさまでした」"
translation = "「끝났네…… 모두 고생 많았어」"

[[dialogue]]
speaker = "マトイ"
original = "「なんだかんだで息ぴったりだったね。トワちゃん先生もすごかったけど、蘭美さんとヨミちゃんも本当にすごかったよ～」"
translation = "「이래저래 호흡이 척척 맞았네. 토와짱 선생님도 대단했지만, 라비 씨랑 요미짱도 정말 대단했어~」"

[[dialogue]]
speaker = "蘭美"
original = "「トワ先生が合わせやすく動いてくれたおかげよ。さすがのサポート力といったところね」"
translation = "「토와 선생님이 맞추기 쉽게 움직여준 덕분이야. 역시 서포트 능력이 일품이네」"

[[dialogue]]
speaker = "蘭美"
original = "「それに……個人の戦闘力としても一級品だったわ。その力の源は貴方の想い、ということね。まったく見せつけてくれるわ」"
translation = "「게다가…… 개인의 전투력으로서도 일급품이었어. 그 힘의 원천은 당신의 마음이라는 거겠지. 정말 제대로 염장 지르는걸」"

[[dialogue]]
speaker = "トワ先生"
original = "「あうぅぅ……それくらいにしてよ。恥ずかしいからぁ～」"
translation = "「아우우…… 그만해줘. 부끄러우니까아~」"

[[dialogue]]
speaker = "蘭美"
original = "「ふふ、そうね。ともあれ勝負はこちらの完敗だわ。そして勝利者への報酬は……」"
translation = "「후후, 그렇네. 어쨌든 승부는 우리의 완패야. 그리고 승리자에 대한 보상은……」"

[[dialogue]]
speaker = "unk"
original = "結婚式の続き、かな？"
translation = "결혼식의 뒷이야기, 일까?"

[[dialogue]]
speaker = "トワ先生"
original = "「いいの？\u3000式場を飛び出してそのままになってたから、もう無理かなって思ってたんだけど」"
translation = "「괜찮아? 식장을 뛰쳐나와서 그대로였으니까, 이제 무리일까 생각했는데」"

[[dialogue]]
speaker = "ヨミ"
original = "「再開する手配はしてあります。あとは新郎と新婦が向かうだけ、ですよ～」"
translation = "「재개할 준비는 되어 있습니다. 남은 건 신랑과 신부가 향하는 것뿐이에요~」"

[[dialogue]]
speaker = "マトイ"
original = "「でも……派手に戦闘しちゃったから、ギャラリーも大勢だね」"
translation = "「하지만…… 요란하게 전투해 버려서 구경꾼도 잔뜩이네」"

[[dialogue]]
speaker = "蘭美"
original = "「まさか中止にする、なんて言わないわよね？」"
translation = "「설마 중지하겠다는 소린 안 하겠지?」"

[[dialogue]]
speaker = "トワ先生"
original = "「うん。やるよ、結婚式！\u3000ここにいるみんなに、祝福してもらいましょう！」"
translation = "「응. 할 거야, 결혼식! 여기 있는 모두에게 축복받자!」"

