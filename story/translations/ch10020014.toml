[[dialogue]]
speaker = "unk"
original = "第４話,お姉ちゃんはどこにもいかない,P"
translation = "제4화, 누나는 어디에도 가지 않아"

[[dialogue]]
speaker = "サーシャ"
original = "「会長くん、ちょっと時間あるかしら～？」"
translation = "「회장군, 잠깐 시간 있을까~?」"

[[dialogue]]
speaker = "サーシャ"
original = "「そのマント、少し糸が解れちゃってない？\u3000そのままだとカッコつかないから、縫い直させてもらっていいかしら？」"
translation = "「그 망토, 실밥이 조금 풀려 있지 않아? 그대로면 폼이 안 나니까 다시 꿰매게 해줘도 될까?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あら、本当ね。端っこのほう糸が解れちゃってるわ。サーシャさんが作ってくれたものなんだから、もっと丁寧に扱わないとダメよ？」"
translation = "「어머, 정말이네. 끝부분 실밥이 풀려 있어. 사샤 씨가 만들어 준 거니까 좀 더 소중히 다루지 않으면 안 된다고?」"

[[dialogue]]
speaker = "unk"
original = "これ、サーシャさんの手縫いなんですか！？"
translation = "이거, 사샤 씨가 직접 바느질한 건가요!?"

[[dialogue]]
speaker = "サーシャ"
original = "「うふふ。ヴィーナスちゃんに頼まれてね～。もう代替わりしちゃうなんて、作った半年前には想像もつかなかったわ」"
translation = "「우후후. 비너스짱이 부탁해서 말이야~. 벌써 대물림하게 될 줄은 만든 반년 전에는 상상도 못 했어」"

[[dialogue]]
speaker = "サーシャ"
original = "「と、いうわけで。裁縫セットを買いに行こうと思うの。会長くんはどうする～？」"
translation = "「그런 고로. 바느질 세트를 사러 가려고 해. 회장군은 어떻게 할래~?」"

[[dialogue]]
speaker = "サーシャ"
original = "「お姉ちゃん、１人で買い出しに行くのは寂しいな～♪」"
translation = "「누나, 혼자 장 보러 가는 건 외로운데~♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「ふふっ。お仕事以外でこうして浅草に立ち寄るのは久しぶりね～。あら、あんなところに新しいお店ができてるわね。ちょっと寄ってみようかしら～♪」"
translation = "「후훗. 업무 이외에 이렇게 아사쿠사에 들르는 건 오랜만이네~. 어머, 저런 곳에 새로운 가게가 생겼네. 잠깐 들러볼까~♪」"

[[dialogue]]
speaker = "unk"
original = "裁縫セットを買いに来ただけなのに"
translation = "바느질 세트를 사러 온 것뿐인데"

[[dialogue]]
speaker = "サーシャ"
original = "「え～？\u3000せっかくお外に出たんだから、どこか寄っていかないと損じゃない。会長くんも急ぎの仕事はないって言ってたわよね？」"
translation = "「에~? 모처럼 밖에 나왔으니까 어딘가 들르지 않으면 손해잖아. 회장군도 급한 일은 없다고 했었지?」"

[[dialogue]]
speaker = "サーシャ"
original = "「それはつまり、お姉ちゃんに付き合ってくれるってことよね♪」"
translation = "「그건 즉, 누나를 따라와 주겠다는 뜻이지♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「さ、この人混みだと迷子になるといけないから、手を繋ぎましょ。ほーら♪」"
translation = "「자, 이 인파라면 미아가 될지도 모르니까 손을 잡자. 자아♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「あら？\u3000いい匂い～。こっちのほうからかしら～？」"
translation = "「어머? 좋은 냄새~. 이쪽에서 나는 걸까나~?」"

[[dialogue]]
speaker = "サーシャ"
original = "「なんだか珍しそうなものを売ってるわね～。どれどれ……♪」"
translation = "「왠지 신기해 보이는 걸 팔고 있네~. 어디 어디……♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「これが有名な雷おこし？\u3000アナちゃんが好きそう～」"
translation = "「이게 유명한 카미나리오코시? 아나짱이 좋아할 것 같아~」"

[[dialogue]]
speaker = "サーシャ"
original = "「このストラップ、可愛いわ～。みんなにもひとつずつ買っていってあげましょう、ふふっ♪」"
translation = "「이 스트랩, 귀엽네~. 모두에게도 하나씩 사다 주자, 후훗♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「どう？\u3000寄り道も楽しくないかしら？\u3000いつもお友達からは、ふらふら１人で放浪する癖があるから危なっかしいって言われるんだけど……」"
translation = "「어때? 들르는 것도 즐겁지 않아? 항상 친구들한테서는 혼자서 훌쩍 방랑하는 버릇이 있어서 위태롭다는 말을 듣곤 하지만……」"

[[dialogue]]
speaker = "サーシャ"
original = "「今日はこうして手を繋いでるから、安心ね♪」"
translation = "「오늘은 이렇게 손을 잡고 있으니까, 안심되네♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「それに……これってなんだか、デートみたいだと思わない？」"
translation = "「게다가…… 이거 왠지, 데이트 같다고 생각하지 않아?」"

[[dialogue]]
speaker = "unk"
original = "い、言われてみれば……"
translation = "이, 이 말을 듣고 보니……"

[[dialogue]]
speaker = "サーシャ"
original = "「だけど実は私、デートがどういうものなのか、よくわからないのよね～。今のも、読んだ本を参考にして、なんとなくなぞってみただけなの。ごめんなさい」"
translation = "「하지만 사실 나, 데이트가 어떤 건지 잘 모르겠단 말이지~. 방금 것도 읽은 책을 참고해서 그냥 흉내 내본 것뿐이야. 미안해.」"

[[dialogue]]
speaker = "サーシャ"
original = "「……私、昔から恋愛ってものに疎くて、あまり人を好きになったりしたことがないの」"
translation = "「……나, 예전부터 연애라는 거에 무뎌서, 누군가를 좋아하게 된 적이 별로 없거든.」"

[[dialogue]]
speaker = "サーシャ"
original = "「恋愛ものの小説とかドラマを見ても、よくわかんないな～、つまんないな～って思っちゃうのよね……」"
translation = "「연애 소설이나 드라마를 봐도, 잘 모르겠네~, 재미없네~ 하고 생각하게 돼버려……」"

[[dialogue]]
speaker = "サーシャ"
original = "「でも、会長くんとだったら、もしかしたらわかるかもしれないな～って、思ったのよ」"
translation = "「하지만, 회장 군이랑 함께라면 어쩌면 알 수 있을지도 모르겠다고 생각했어.」"

[[dialogue]]
speaker = "unk"
original = "どうして、俺なんです？"
translation = "어째서, 저인 거죠?"

[[dialogue]]
speaker = "サーシャ"
original = "「──私の、大切な存在だからよ」"
translation = "「──나의, 소중한 존재니까.」"

[[dialogue]]
speaker = "サーシャ"
original = "「男の子でここまで大事にしたいって思った人は、たぶん会長くんが初めて……。星徒会は家族だって思ってるから、やっぱり恋愛とは少し違うのかもしれないけど……」"
translation = "「남자애 중에서 이렇게까지 소중히 여기고 싶다고 생각한 사람은 아마 회장 군이 처음……. 성도회는 가족이라고 생각하니까, 역시 연애와는 조금 다를지도 모르겠지만……」"

[[dialogue]]
speaker = "サーシャ"
original = "「それでも、『もしかしたら』って期待しちゃうじゃない？\u3000うふふ♪」"
translation = "「그래도, 『어쩌면』 하고 기대하게 되잖아? 우후후♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「それに、前に図書館で言ってくれたこと……私がいなくなると寂しいから、一緒についてきてくれるって言ってたでしょ？」"
translation = "「게다가, 예전에 도서관에서 해줬던 말…… 내가 없어지면 외로우니까, 같이 따라와 주겠다고 했었지?」"

[[dialogue]]
speaker = "サーシャ"
original = "「あの言葉で少しだけ……ほんの少しだけ、ドキッとした気がするのよ、私」"
translation = "「그 말에 아주 조금…… 정말 아주 조금, 두근거렸던 기분이 들어, 나.」"

[[dialogue]]
speaker = "サーシャ"
original = "「だから、そんな会長くんにお願い。──私に、恋をする気持ちを、教えてくれないかしら？」"
translation = "「그러니까, 그런 회장 군에게 부탁할게. ──나에게, 사랑을 하는 마음을 가르쳐주지 않을래?」"

[[dialogue]]
speaker = "unk"
original = "……俺は、何をすれば？"
translation = "……나는, 무엇을 하면 되지?"

[[dialogue]]
speaker = "サーシャ"
original = "「付き合ってくれるのね、さすが会長くん♪\u3000頼りになるわ～♪」"
translation = "「함께해 주는구나, 역시 회장군♪ 의지가 되네~♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「とりあえず、私のしたいことに付き合ってくれるかしら？\u3000本を読むよりも、実際に体験してみないとわからないことは沢山あるから♪」"
translation = "「우선은, 내가 하고 싶은 것에 동참해 줄래? 책을 읽는 것보다, 실제로 체험해 보지 않으면 모르는 것들은 잔뜩 있으니까♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「腕を組んじゃったり～♪」"
translation = "「팔짱을 낀다거나~♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「手を握っちゃったり～♪」"
translation = "「손을 잡는다거나~♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「あとは、またお姉ちゃんって呼んでくれたら完ぺきよ♪」"
translation = "「그리고, 다시 누나라고 불러준다면 완벽해♪」"

[[dialogue]]
speaker = "unk"
original = "恋愛を知りたいって話でしたよね！？"
translation = "연애를 알고 싶다는 이야기였죠!?"

[[dialogue]]
speaker = "unk"
original = "お姉ちゃん！？"
translation = "누나!?"

[[dialogue]]
speaker = "サーシャ"
original = "「あとはそうね～、恋愛で思い付くものというと……」"
translation = "「그리고 그러네~, 연애 하면 떠오르는 것이라고 하면……」"

[[dialogue]]
speaker = "サーシャ"
original = "「──キス、とか？」"
translation = "「──키스, 라던가?」"

[[dialogue]]
speaker = "unk"
original = "それはさすがに、今はマズいのでは！？"
translation = "그건 아무래도, 지금은 곤란한 게 아닌지!?"

[[dialogue]]
speaker = "サーシャ"
original = "「むぅ～、お姉ちゃんとキスするのは嫌なの～？」"
translation = "「무우~, 누나랑 키스하는 건 싫은 거야~?」"

[[dialogue]]
speaker = "サーシャ"
original = "「──なーんてね。冗談よ。いくらなんでも、お試しでやることじゃないわよね～」"
translation = "「──라~는 건 농담이야. 아무리 그래도, 시험 삼아 해볼 일은 아니지~」"

[[dialogue]]
speaker = "サーシャ"
original = "「そういうことは……本当に好きになった時の為にとっておかないと、もったいないもの♪」"
translation = "「그런 건…… 정말로 좋아하게 됐을 때를 위해 아껴두지 않으면, 아까운걸♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「ふふっ、顔真っ赤になっちゃって、会長くんは本当に可愛いわね～♪\u3000この気持ちが『好き』って気持ちだったら、こんなに悩まなくてもよかったのに～」"
translation = "「후훗, 얼굴이 새빨개져서는, 회장군은 정말 귀엽네~♪ 이 감정이 『좋아함』이라는 감정이었다면, 이렇게 고민하지 않아도 됐을 텐데~」"

[[dialogue]]
speaker = "サーシャ"
original = "「これからは、色んなことを会長くんに教えてもらうんだから」"
translation = "「앞으로는, 여러 가지를 회장군에게 배울 거니까 말이야」"

[[dialogue]]
speaker = "サーシャ"
original = "「お姉ちゃんに黙って、居なくなったりしちゃダメよ？」"
translation = "「누나한테 말도 없이, 사라지거나 하면 안 돼?」"

[[dialogue]]
speaker = "unk"
original = "それって……"
translation = "그건……"

[[dialogue]]
speaker = "unk"
original = "振り向くとそこには、サーシャさんの包み込むような柔らかな笑顔があって。"
translation = "뒤돌아보자 그곳에는, 사샤 씨의 감싸 안는 듯한 부드러운 미소가 있었다."

[[dialogue]]
speaker = "unk"
original = "俺は繋いだ手が離れないように、そっと握り返すのだった。"
translation = "나는 맞잡은 손이 떨어지지 않도록, 살며시 되잡는 것이었다."

