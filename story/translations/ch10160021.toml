[[dialogue]]
speaker = "unk"
original = "第１話,てぇてぇカップリング,P"
translation = "제1화, 테에테에 커플링, P"

[[dialogue]]
speaker = "unk"
original = "ヒトリと恋人として付き合うようになってしばらく経った、とある休日。"
translation = "히토리와 연인으로서 사귀게 된 지 한참이 지난, 어느 휴일."

[[dialogue]]
speaker = "unk"
original = "俺は最近完結して話題になった『百合漫画』を返しに、新星寮へとやって来ていた。"
translation = "나는 최근 완결되어 화제가 된 『백합 만화』를 돌려주러, 신성 기숙사로 찾아와 있었다."

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「会長さん、それで……どうだったでしょうか？」"
translation = "「회장님, 그래서…… 어떠셨나요?」"

[[dialogue]]
speaker = "unk"
original = "神妙な面持ちをした彼女に、俺は拝むように両手を合わせ――"
translation = "진지한 표정을 지은 그녀에게, 나는 빌듯이 두 손을 모으고──"

[[dialogue]]
speaker = "unk"
original = "実に――てぇてぇ作品でした"
translation = "실로── 테에테에한 작품이었습니다"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ですよねっ！\u3000百合史に残る神作品の誕生です……！」"
translation = "「그쵸! 백합사에 남을 신의 작품의 탄생이에요……!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「わたし、それはもう、すごく感動して……！」"
translation = "「저, 그건 정말, 너무 감동해서……!」"

[[dialogue]]
speaker = "unk"
original = "ヒトリは興奮したように、俺の手を取ると――"
translation = "히토리는 흥분한 듯이, 내 손을 잡더니──"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「こう手を取って、告白するシーンは、それはもう宗教画のようで……！\u3000わたし、そのページを引き延ばして印刷して、部屋にポスターとして貼ってあるんですよ！」"
translation = "「이렇게 손을 잡고, 고백하는 장면은, 그건 정말 종교화 같아서……! 저, 그 페이지를 확대 인쇄해서, 방에 포스터로 붙여놨거든요!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「って、はっ……！？\u3000ご、ごめんなさい、会長さん！\u3000つい、興奮して、手を握ってしまって……！」"
translation = "「앗, 핫……!? 죄, 죄송해요, 회장님! 그만, 흥분해서, 손을 잡아버려서……!」"

[[dialogue]]
speaker = "unk"
original = "俺たちは恋人同士なんだから"
translation = "우리들은 연인 사이니까"

[[dialogue]]
speaker = "unk"
original = "全然構わないよ。"
translation = "전혀 상관없어."

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「は、はい♪\u3000じゃあ……えへへ♪」"
translation = "「네, 네♪ 그럼…… 에헤헤♪」"

[[dialogue]]
speaker = "unk"
original = "彼女はそっと俺の手を握り直して、はにかむ。"
translation = "그녀는 살며시 내 손을 다시 고쳐 잡으며, 수줍게 웃는다."

[[dialogue]]
speaker_original = "ゆーちゃん"
speaker_translation = "유짱"
original = "「てーてー♪」"
translation = "「테에테에♪」"

[[dialogue]]
speaker = "unk"
original = "ヒトリが常に連れている幽霊のゆーちゃんも、俺たちを祝福してくれているようだった。"
translation = "히토리가 항상 데리고 다니는 유령 유짱도, 우리를 축복해 주는 것 같았다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「おや？\u3000会長、おはようございます。朝から寮で会うとは珍しいですね」"
translation = "「어라? 회장, 안녕하세요. 아침부터 기숙사에서 만나다니 드문 일이네요」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「あっ、アナさん、おはようございます……！」"
translation = "「앗, 아나 씨, 안녕하세요……!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はい、おはようございます。ヒトリさん」"
translation = "「네, 안녕하세요. 히토리 씨」"

[[dialogue]]
speaker = "unk"
original = "２人もいつの間にか、仲良くなったな"
translation = "둘도 어느샌가, 사이가 좋아졌구나"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ええ。入学してから大分時間も経ちましたしね。とはいえ、会長の影響だと思いますよ」"
translation = "「예. 입학하고 나서 꽤 시간도 흘렀으니까요. 그건 그렇고, 회장의 영향이라고 생각해요」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ヒトリさん、会長と付き合い始めてから、性格が前より明るくなりましたから」"
translation = "「히토리 씨, 회장과 사귀기 시작하고 나서, 성격이 전보다 밝아졌으니까요」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「えへへ。そう思ってもらえてるなら、嬉しい、です……」"
translation = "「에헤헤. 그렇게 생각해주신다면, 기뻐, 요……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「会長さんが、星騎士の皆さんや、守護天使や魔女の人たちとも絆を結んで、信頼し合える関係を作って行く姿が、本当にてぇてぇと……思ったんです」"
translation = "「회장님이 성기사 여러분이나 수호천사, 마녀분들과도 인연을 맺고 서로 신뢰할 수 있는 관계를 만들어 가는 모습이 정말 테에테에(눈부시다)고…… 생각했어요」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「だからわたしも……少しでいいから、そんな風になれるように頑張れたらなって」"
translation = "「그래서 저도…… 조금이라도 좋으니까, 그런 식으로 될 수 있게 노력해보고 싶어서」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「同じようには、できないかもしれませんけど……まずはやってみようと思わないと、信頼は得られませんから」"
translation = "「똑같이 할 수는 없을지도 모르지만…… 우선은 해보자고 생각하지 않으면 신뢰를 얻을 수 없으니까요」"

[[dialogue]]
speaker = "unk"
original = "そういう頑張り屋なところが、俺は好きだぞ"
translation = "그렇게 노력하는 면이 난 좋다"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「え、えへへ♪\u3000わたしも、会長さんのこと、大好きです……<emoji=heart04>」"
translation = "「에, 에헤헤♪ 저도 회장님 정말 좋아해요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「なるほど。これが『てぇてぇ』……」"
translation = "「과연. 이것이 『테에테에』……」"

[[dialogue]]
speaker_original = "ゆーちゃん"
speaker_translation = "유짱"
original = "「てーてー♪」"
translation = "「테ー테ー♪」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そういえば……前から気になっていたのですが、会長とヒトリさんはどのようにして、お付き合いを始めたんですか？」"
translation = "「그러고 보니…… 전부터 궁금했습니다만, 회장과 히토리 씨는 어떻게 사귀기 시작한 건가요?」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「え？\u3000ど、どのようにと言いますと……」"
translation = "「에? 어, 어떻게라니 그게……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「それはもちろん、どちらから先に好きとか付き合いたいとか、告白したかというアレですね。興味があります。むふ～」"
translation = "「그건 물론, 어느 쪽이 먼저 좋아한다거나 사귀고 싶다거나 고백했는가 하는 그런 거죠. 흥미롭네요. 무후~」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「え、えっと……それは……そのぉ……」"
translation = "「에, 에또…… 그건…… 그으……」"

[[dialogue]]
speaker = "unk"
original = "恥ずかしそうに、自身の両手の人差し指を突き合わせて、もじもじするヒトリ。"
translation = "부끄러운 듯 자신의 양손 검지를 맞대며 머뭇거리는 히토리."

[[dialogue]]
speaker = "unk"
original = "あの日は、放課後に空き教室へ来て欲しいと、俺の方からヒトリにお願いをしていた。"
translation = "그날은 방과 후에 빈 교실로 와달라고 내가 히토리에게 부탁을 했었다."

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「し、失礼します……」"
translation = "「시, 실례합니다……」"

[[dialogue]]
speaker = "unk"
original = "来てくれて、ありがとう"
translation = "와줘서 고마워"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「い、いえ。会長さんのお願いでしたら、何でも喜んで聞きますよ……♪」"
translation = "「아, 아니에요. 회장님의 부탁이라면 뭐든 기쁘게 들을게요……♪」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「でも、今日は一体、何のお話でしょう……？」"
translation = "「그런데 오늘은 대체 무슨 이야기일까요……?」"

[[dialogue]]
speaker = "unk"
original = "俺は１度深呼吸をして、気持ちを落ち着かせてから告げる。"
translation = "나는 한 번 심호흡을 하고 마음을 진정시킨 뒤 알린다."

[[dialogue]]
speaker = "unk"
original = "ヒトリのことが好きだ。付き合って欲しい"
translation = "히토리를 좋아해. 사귀어 줬으면 좋겠어"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「え……」"
translation = "「에……」"

[[dialogue]]
speaker_original = "ゆーちゃん"
speaker_translation = "유짱"
original = "「……！\u3000ゆー！」"
translation = "「……! 유ー!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「会長さんが……わたしのことを、好き……？\u3000付き合うって――」"
translation = "「회장님이…… 저를 좋아해……? 사귄다니――」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「……えっ！？\u3000えええぇぇぇ～～～っ！？！？」"
translation = "「……엣!? 에에에에에～～～っ!?!?」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「こ、これは何かのドッキリですか……！？」"
translation = "「이, 이거 무슨 몰래카메라인가요……!?」"

[[dialogue]]
speaker = "unk"
original = "いや、マジです"
translation = "아니, 진심이야"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「で、でもわたしを好きだなんて……！\u3000わたしは、会長さんの周りにいる人たちと比べて、人見知りだし、暗いし……」"
translation = "「하, 하지만 저를 좋아한다니……! 저는 회장님 주변에 있는 사람들에 비해 낯가림도 심하고 어두운 데다……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「会長さんとは、とても釣り合わないっていうか……」"
translation = "「회장님과는 전혀 어울리지 않는다고 할까……」"

[[dialogue]]
speaker = "unk"
original = "そんなことない。ヒトリは可愛い"
translation = "그렇지 않아. 히토리는 귀여워"

[[dialogue]]
speaker = "unk"
original = "それに、ヒトリは幽霊たちの為に優しくできる心を持っている。人と接するのが苦手でも、俺が協力して欲しいとお願いすれば、プリマステラとして駆け付けてくれる。"
translation = "게다가 히토리는 유령들을 위해 상냥하게 대할 수 있는 마음을 가지고 있어. 사람을 대하는 게 서툴러도 내가 협력해 달라고 부탁하면 프리마스텔라로서 달려와 주잖아."

[[dialogue]]
speaker = "unk"
original = "ヒトリは自分が思っているよりもずっと、魅力的で可愛い女の子だ。俺は、そんなヒトリともっと仲良くなりたいと思っていることを告白した。"
translation = "히토리는 스스로 생각하는 것보다 훨씬 매력적이고 귀여운 여자아이야. 나는 그런 히토리와 좀 더 친해지고 싶다고 고백했다."

[[dialogue]]
speaker = "unk"
original = "ヒトリは、嫌かな？"
translation = "히토리는 싫어?"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「そ、そんなことないですっ……！」"
translation = "「그, 그렇지 않아요……!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「嫌じゃない、です……。わたしも、会長さんともっと、な、仲良く……なりたいです！」"
translation = "「싫지 않아요……. 저도 회장님과 좀 더, 사, 사이좋게…… 되고 싶어요!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「で、でもその……わたし、男女のお付き合いとかは……初めてで。わからないことだらけなので……」"
translation = "「하, 하지만 그게…… 저, 남녀 간의 교제 같은 건…… 처음이라서. 모르는 것투성이라……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ま、まずは慣れて行くところから、お願いしたいです……」"
translation = "「우, 우선은 익숙해지는 것부터 부탁드리고 싶어요……」"

[[dialogue]]
speaker = "unk"
original = "改めて、これからよろしく"
translation = "다시 한번, 앞으로 잘 부탁해"

[[dialogue]]
speaker = "unk"
original = "ああ、わかった。"
translation = "아아, 알았어."

[[dialogue]]
speaker = "unk"
original = "嬉しくなって、俺が彼女の手を取ると――"
translation = "기뻐져서 내가 그녀의 손을 잡자――"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ひゃあっ！？\u3000か、かか、会長さん、距離がいきなり近いですぅ！」"
translation = "「히얏!? 회, 회회, 회장님, 거리가 갑자기 너무 가까워요!」"

[[dialogue]]
speaker = "unk"
original = "えっ！？\u3000握手しただけで！？"
translation = "엣!? 악수했을 뿐인데!?"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「そ、それは恋人になったので、前よりも意識してしまうというか……」"
translation = "「그, 그건 연인이 되었으니까 전보다 더 의식하게 된다고 할까……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「と、とりあえず２メートルくらいの距離からで……」"
translation = "「우, 우선은 2미터 정도 거리에서부터……」"

[[dialogue]]
speaker = "unk"
original = "距離感が遠くなってる！？"
translation = "거리감이 더 멀어졌어!?"

[[dialogue]]
speaker = "unk"
original = "付き合う前より"
translation = "사귀기 전보다"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「――で、そんなことがありつつも、あっという間に今のようなラブラブの距離感になったと」"
translation = "「――해서, 그런 일이 있으면서도 순식간에 지금 같은 러브러브한 거리감이 되었다는 거군요」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「さ、最初はすごく緊張してたんですけど、会長さん優しいので……どんどん好きになってしまったというか……えへへ♪」"
translation = "「처, 처음에는 엄청 긴장했었는데 회장님이 다정하셔서…… 점점 더 좋아하게 되어버렸다고 할까…… 에헤헤♪」"

[[dialogue]]
speaker = "unk"
original = "百合のてぇてぇを分かち合う仲だ"
translation = "백합의 테에테에를 공유하는 사이다"

[[dialogue]]
speaker = "unk"
original = "フッ……今ではすっかり、"
translation = "훗…… 지금은 완전히,"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「いや、そこに関しては、どうしてこうなったって感じですが」"
translation = "「아니, 그 부분에 관해서는 어쩌다 이렇게 됐나 싶은 느낌입니다만」"

[[dialogue]]
speaker = "unk"
original = "ちなみに俺は、アニマ先輩×アナ推しだ"
translation = "참고로 나는 아니마 선배×아나 밀고 있어"

[[dialogue]]
speaker = "unk"
original = "アナ……百合はいいぞ。"
translation = "아나…… 백합은 좋은 거야."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「なぜ私がアニマ先輩と！？」"
translation = "「왜 제가 아니마 선배랑!?」"

[[dialogue]]
speaker_original = "ゆーちゃん"
speaker_translation = "유짱"
original = "「ゆー♪」"
translation = "「유ー♪」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「わかり味が深いです……！」"
translation = "「공감 수치가 깊네요……!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「いや全然分からないんですけど……！？」"
translation = "「아니 전혀 모르겠는데요……!?」"

[[dialogue]]
speaker = "unk"
original = "俺とヒトリがうんうんと頷き合う横で、全力でツッコミを入れるアナなのであった――"
translation = "나와 히토리가 응응하며 고개를 끄덕이는 옆에서 전력으로 츳코미를 넣는 아나였다――"

