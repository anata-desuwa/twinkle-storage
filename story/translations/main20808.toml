[[dialogue]]
speaker = "unk"
original = "第９話,新たな女神,B"
translation = "제9화, 새로운 여신, B"

[[dialogue]]
speaker = "unk"
original = "閃光が晴れると、そこには──"
translation = "섬광이 걷히자, 그곳에는──"

[[dialogue]]
speaker = "ルヴィネ"
original = "「く……この姿は見せたくなかったけど」"
translation = "「큭…… 이 모습은 보여주고 싶지 않았는데」"

[[dialogue]]
speaker = "クロト"
original = "「ルヴィネが変身している……？\u3000それに彼女から感じる力は……」"
translation = "「루비네가 변신해 있어……? 게다가 그녀에게서 느껴지는 힘은……」"

[[dialogue]]
speaker = "フィオナ"
original = "「霊力ですね。しかし感じる力は守護天使とも違います。そして何より、彼女たちより遥かに強大な存在です」"
translation = "「영력이군요. 하지만 느껴지는 힘은 수호천사와도 다릅니다. 그리고 무엇보다, 그녀들보다 훨씬 강대한 존재예요」"

[[dialogue]]
speaker = "unk"
original = "光り輝く翼から迸る力は、神聖なる存在のみが放つことができるもの。"
translation = "빛나는 날개에서 뿜어져 나오는 힘은 신성한 존재만이 발할 수 있는 것."

[[dialogue]]
speaker = "unk"
original = "だが彼女から感じる霊力は、守護天使よりも、ノヴァフォームに目覚めた今のヴィーナスに近い。"
translation = "하지만 그녀에게서 느껴지는 영력은 수호천사보다도, 노바 폼에 눈뜬 지금의 비너스에 가깝다."

[[dialogue]]
speaker = "？？？"
original = "『ようやくまみえることが叶いましたね、女神ルヴィネ』"
translation = "『드디어 대면하게 되었군요, 여신 루비네』"

[[dialogue]]
speaker = "クロト"
original = "「女神……！？\u3000ルヴィネがそうなのか……？」"
translation = "「여신……!? 루비네가 그런 건가……?」"

[[dialogue]]
speaker = "？？？"
original = "『より正確に言えば、“いずれ世界の管理者となる次代の女神、その幼体”です』"
translation = "『더 정확히 말하자면, “머지않아 세계의 관리자가 될 차세대 여신, 그 유체”입니다』"

[[dialogue]]
speaker = "ルヴィネ"
original = "「その声は女神テルルね。こそこそ隠れていたかと思えば、ようやく尻尾を見せたわね」"
translation = "「그 목소리는 여신 텔르네. 꽁꽁 숨어있나 했더니 드디어 꼬리를 드러냈구나」"

[[dialogue]]
speaker = "テルル"
original = "『ええ、私ももっと早く呼びかけたかったのですが……神域たるフィーニスの塔の頂上に、女神の力を持つ者が２人揃うことで、ようやく声を届けられました』"
translation = "『네, 저도 좀 더 일찍 말을 걸고 싶었습니다만…… 신역인 피니스의 탑 꼭대기에 여신의 힘을 가진 자가 두 명 모임으로써, 겨우 목소리를 전할 수 있게 되었습니다』"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
original = "「女神テルル──ってことは、ママなのね！？」"
translation = "「여신 텔르── 그렇다는 건, 엄마인 거네!?」"

[[dialogue]]
speaker = "テルル"
original = "『デネブの人間界にいた九浄テルルは、私の分け身。私は九浄テルルそのものとはいえませんが……あなたは間違いなく私の娘です、ヴィーナス』"
translation = "『데네브의 인간계에 있던 쿠죠 텔르는 나의 분신. 내가 쿠죠 텔르 그 자체라고는 할 수 없지만…… 당신은 틀림없는 나의 딸입니다, 비너스』"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
original = "「……そっか。私をこれまで見守ってくれていたのも、ママだったのね」"
translation = "「……그렇구나. 나를 지금까지 지켜봐 줬던 것도 엄마였네」"

[[dialogue]]
speaker = "テルル"
original = "『はい。私はアルタイル・デネブ・ベガの中で唯一、平行世界をまたいで同一の存在を保持しています』"
translation = "『네. 저는 알타이르·데네브·베가 중에서 유일하게 평행세계를 넘나들며 동일한 존재를 유지하고 있습니다』"

[[dialogue]]
speaker = "テルル"
original = "『ですからアルタイルでもあなたを見ていましたが……女神でありながら、力及ばないことが多く、申し訳なく思っています』"
translation = "『그래서 알타이르에서도 당신을 보고 있었습니다만…… 여신이면서도 힘이 미치지 못하는 일이 많아 죄송하게 생각하고 있습니다』"

[[dialogue]]
speaker = "テルル"
original = "『今の最後の力を振り絞って声を届けていますが、長くは持ちません』"
translation = "『지금 마지막 힘을 쥐어짜 목소리를 전하고 있습니다만, 오래 버티지는 못합니다』"

[[dialogue]]
speaker = "テルル"
original = "『デネブでは九浄テルルとして敗北した上、今もベガとディザスターハンドを抑えるために力の大部分を使い続けています』"
translation = "『데네브에서는 쿠죠 텔르로서 패배한 데다, 지금도 베가와 디재스터 핸드를 억제하기 위해 힘의 대부분을 계속 사용하고 있습니다』"

[[dialogue]]
speaker = "テルル"
original = "『その上で、ルヴィネに発見されないよう、身を潜めて力の回復に努めていました』"
translation = "『그 와중에 루비네에게 발견되지 않도록 몸을 숨기고 힘을 회복하려 애쓰고 있었습니다』"

[[dialogue]]
speaker = "テルル"
original = "『まだもうしばらく、あなたたち頼りになってしまいそうです』"
translation = "『아직 당분간은 당신들에게 의지하게 될 것 같네요』"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
original = "「いいのよ、ママ。そのために私たち星騎士がいるんだから！」"
translation = "「괜찮아, 엄마. 그러기 위해 우리 성기사들이 있는 거니까!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「勝手なことを言っているけど、旧時代の女神には今ここで消えてもらうわ、テルル」"
translation = "「멋대로 떠들고 있지만, 구시대의 여신은 지금 여기서 사라져줘야겠어, 텔르」"

[[dialogue]]
speaker = "クロト"
original = "「つまり君は、女神テルルの敵──“<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>”に与する者なんだな、ルヴィネ」"
translation = "「즉 너는 여신 텔르의 적── “<ruby>XELOS<rt>제로스</rt></ruby>”를 따르는 자로구나, 루비네」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「“<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>”……？」"
translation = "「“<ruby>XELOS<rt>제로스</rt></ruby>”……?」"

[[dialogue]]
speaker = "クロト"
original = "「ある考古学者が仮定した、女神より上位に存在するものの名だ」"
translation = "「어느 고고학자가 가정한, 여신보다 상위에 존재하는 것의 이름이다」"

[[dialogue]]
speaker = "クロト"
original = "「流星教では、女神こそがこの世界の創造主であると教えていたし、俺たちもそれを疑っていなかった」"
translation = "「유성교에서는 여신이야말로 이 세계의 창조주라고 가르쳤고, 우리도 그것을 의심하지 않았어」"

[[dialogue]]
speaker = "フィオナ"
original = "「ですが１つ疑問がありました。女神テルル様が創造主であるなら、どうしてリクリエが起こるのか、ということです」"
translation = "「하지만 한 가지 의문이 있었습니다. 여신 텔르 님이 창조주라면, 어째서 리크리에가 일어나는가 하는 점입니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「もしリクリエが女神テルル様の意志なら、リクリエに抗う力を私たちに授けることは矛盾しています」"
translation = "「만약 리크리에가 여신 텔르 님의 의지라면, 리크리에에 저항하는 힘을 저희에게 부여하는 것은 모순됩니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「ではリクリエが女神テルル様の意志でないなら、リクリエはどこから来て、どうして発生しているのでしょうか。それが説明できません」"
translation = "「그렇다면 리크리에가 여신 텔르 님의 의지가 아니라면, 리크리에는 어디서 오고 어째서 발생하는 것일까요. 그것이 설명되지 않습니다」"

[[dialogue]]
speaker = "クロト"
original = "「だけど女神が創造主でなかったのなら、答えはシンプルなものになる」"
translation = "「하지만 여신이 창조주가 아니었다면 답은 심플해져」"

[[dialogue]]
speaker = "クロト"
original = "「女神もまた被造物であり、世界の運営を任された管理者に過ぎないということだ」"
translation = "「여신 또한 피조물이며, 세계의 운영을 맡은 관리자에 불과하다는 거다」"

[[dialogue]]
speaker = "クロト"
original = "「女神とは別に存在する創造主がリクリエを望んでいるのであれば、<ruby>厄災<rt>リクリエ</rt></ruby>が消えない理由は説明が付く」"
translation = "「여신과는 별개로 존재하는 창조주가 리크리에를 바라고 있다면, <ruby>재액<rt>리크리에</rt></ruby>이 사라지지 않는 이유는 설명이 돼」"

[[dialogue]]
speaker = "クロト"
original = "「そして女神が創造主ではなく、唯一無二の存在でないのなら、新たな女神も生まれうる」"
translation = "「그리고 여신이 창조주가 아니고 유일무이한 존재가 아니라면, 새로운 여신도 태어날 수 있지」"

[[dialogue]]
speaker = "クロト"
original = "「この世界にはバジュラ教団のチャカパラ神を始め、女神ではない、別の神を崇める組織が、時代や地域を超えて無数に存在していた」"
translation = "「이 세계에는 차카파라 신을 비롯해 여신이 아닌 다른 신을 숭배하는 조직이 시대와 지역을 초월해 무수히 존재해 왔어」"

[[dialogue]]
speaker = "クロト"
original = "「その信仰の対象を、俺たちは“<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>”と呼ぶことにした」"
translation = "「그 신앙의 대상을 우리들은 “<ruby>XELOS<rt>제로스</rt></ruby>”라고 부르기로 했다」"

[[dialogue]]
speaker = "クロト"
original = "「そしてルヴィネ……君は“<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>”に生み出された女神なんじゃないか？」"
translation = "「그리고 루비네…… 너는 “<ruby>XELOS<rt>제로스</rt></ruby>”에 의해 만들어진 여신이 아닌가?」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「私がその“<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>”に生み出されたのだとしたら、どうしてデネブを救ったの？\u3000リクリエを起こしているのは『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』なんでしょう？」"
translation = "「내가 그 “<ruby>XELOS<rt>제로스</rt></ruby>”에게서 태어난 거라면 어째서 데네브를 구한 거야? 리크리에를 일으키는 건 『<ruby>XELOS<rt>제로스</rt></ruby>』잖아?」"

[[dialogue]]
speaker = "テルル"
original = "『それは私から説明しましょう』"
translation = "『그건 제가 설명하죠』"

[[dialogue]]
speaker = "テルル"
original = "『今までは創造主について自ら語ることは許されていませんでしたが、人が“<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>”と名付けてくれたことで、ようやく話すことができます』"
translation = "『지금까지는 창조주에 대해 스스로 말하는 것이 허용되지 않았습니다만, 인간이 “<ruby>XELOS<rt>제로스</rt></ruby>”라고 이름을 붙여준 덕분에 겨우 이야기할 수 있게 되었습니다』"

[[dialogue]]
speaker = "テルル"
original = "『“<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>”は欲したものをデネブで得られませんでした。だからデネブをアルタイルと争わせることで利用しようとしたのです』"
translation = "『“<ruby>XELOS<rt>제로스</rt></ruby>”는 원하는 것을 데네브에서 얻지 못했습니다. 그래서 데네브를 알타이르와 다투게 함으로써 이용하려 한 것입니다』"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
original = "「欲したもの……？\u3000何が必要だったの？」"
translation = "「원하는 것……? 무엇이 필요했던 거야?」"

[[dialogue]]
speaker = "テルル"
original = "『ディザスターハンドです。ベガの緋宮クロトはディザスターハンドになり、リクリエに堕ちた』"
translation = "『디재스터 핸드입니다. 베가의 히노미야 쿠로토는 디재스터 핸드가 되어 리크리에로 타락했죠』"

[[dialogue]]
speaker = "テルル"
original = "『しかしデネブの緋宮クロトは自らを犠牲にした。だからデネブではディザスターハンドは得られず、両手が揃うことはなかった』"
translation = "『하지만 데네브의 히노미야 쿠로토는 자신을 희생했습니다. 그래서 데네브에서는 디재스터 핸드를 얻지 못했고, 양손이 모이는 일은 없었습니다』"

[[dialogue]]
speaker = "テルル"
original = "『またアルタイルがデネブのリクリエの使徒を破ったことも、今の女神である私を未だに打倒できていないことも、“<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>”にとって大きな計算違いです』"
translation = "『또한 알타이르가 데네브의 리크리에의 사도를 꺾은 것도, 지금의 여신인 저를 아직 타도하지 못한 것도 “<ruby>XELOS<rt>제로스</rt></ruby>”에게는 큰 계산 착오입니다』"

[[dialogue]]
speaker = "テルル"
original = "『一度失敗した以上、“<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>”が同じ手を使うことはありません。それは効率的でない』"
translation = "『한 번 실패한 이상 “<ruby>XELOS<rt>제로스</rt></ruby>”가 같은 수법을 쓰지는 않습니다. 그것은 효율적이지 않으니까요』"

[[dialogue]]
speaker = "テルル"
original = "『だから今回は、ベガのリクリエの使徒と、“デネブとアルタイルの戦争”という形で、二重の攻め手を作ったのです』"
translation = "『그래서 이번에는 베가의 리크리에의 사도와, “데네브와 알타이르의 전쟁”이라는 형태로 이중의 공격 수단을 만든 것입니다』"

[[dialogue]]
speaker = "クロト"
original = "「つまりデネブを救った理由は“アルタイルを滅ぼすのにまだ使える”と判断されたから……か」"
translation = "「즉 데네브를 구한 이유는 “알타이르를 멸망시키는 데 아직 쓸모가 있다”고 판단되었기 때문……인가」"

[[dialogue]]
speaker = "テルル"
original = "『はい。“<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>”はただ合理性を追求するだけの機構。ゆえに“デネブを使ってアルタイルと女神テルルを打倒するのが最も効率的だ”と計算したのでしょう』"
translation = "『네. “<ruby>XELOS<rt>제로스</rt></ruby>”는 그저 합리성을 추구할 뿐인 기구. 고로 “데네브를 사용해 알타이르와 여신 텔르를 타도하는 것이 가장 효율적이다”라고 계산했겠죠』"

[[dialogue]]
speaker = "ルヴィネ"
original = "「……はぁ」"
translation = "「……하아」"

[[dialogue]]
speaker = "unk"
original = "デネブが残った理由が女神テルルから語られると、ルヴィネは呆れたように嘆息して──"
translation = "데네브가 남은 이유가 여신 텔르에 의해 밝혀지자, 루비네는 어이없다는 듯 한숨을 내쉬며──"

[[dialogue]]
speaker = "ルヴィネ"
original = "「女神にそこまで説明されてしまったら、否定しても意味はないわね」"
translation = "「여신에게 거기까지 설명당해 버리면 부정해도 의미가 없겠네」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「そう、私は女神。新たな世界を創る新時代の女神よ」"
translation = "「그래, 나는 여신. 새로운 세계를 창조할 신시대의 여신이야」"

[[dialogue]]
speaker = "フィオナ"
original = "「新たな女神……！\u3000“<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>”が本当に存在するなら道理ですが、この目で目にするとは思いませんでしたね……」"
translation = "「새로운 여신……! “<ruby>XELOS<rt>제로스</rt></ruby>”가 정말로 존재한다면 이치에 맞습니다만, 직접 눈으로 보게 될 줄은 몰랐네요……」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
original = "「じゃあ、デネブの人たちやベアトリスのことも、騙してたってことなの！？」"
translation = "「그럼 데네브 사람들과 베아트리스도 속였다는 거야!?」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「……あなたたちには関係のないことよ」"
translation = "「……너희와는 상관없는 일이야」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「だってあなたたちはここで消えるのだから」"
translation = "「어차피 너희는 여기서 사라질 테니까」"

[[dialogue]]
speaker = "unk"
original = "ルヴィネの翼に光が宿る。"
translation = "루비네의 날개에 빛이 깃든다."

[[dialogue]]
speaker = "unk"
original = "幼体とはいえ次代の女神。その力は守護天使の比ではない。"
translation = "유체라고는 하나 차세대 여신. 그 힘은 수호천사와 비할 바가 아니다."

[[dialogue]]
speaker = "unk"
original = "しかしその矛先が向いたのは──"
translation = "하지만 그 창끝이 향한 곳은──"

[[dialogue]]
speaker = "ルヴィネ"
original = "「私が生まれるのが遅すぎたくらいだわ。消えなさい、古い女神」"
translation = "「내가 태어나는 게 너무 늦었을 정도야. 사라지렴, 낡은 여신」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
original = "「ママ、逃げて──！」"
translation = "「엄마, 도망쳐──!」"

[[dialogue]]
speaker = "テルル"
original = "『ごめんなさい……後は、任せます……』"
translation = "『미안해요…… 나머지는, 맡길게요……』"

[[dialogue]]
speaker = "unk"
original = "ルヴィネの羽から、声がした方へ光が迸る。"
translation = "루비네의 깃털에서 목소리가 난 쪽으로 빛이 뿜어져 나온다."

[[dialogue]]
speaker = "ルヴィネ"
original = "「また引っ込んだわね……本当に往生際が悪いわ」"
translation = "「또 숨어버렸네…… 정말 끈질기기도 해라」"

[[dialogue]]
speaker = "unk"
original = "しかし女神の気配はすでに消えていた。どうやら何とか逃れたらしい。"
translation = "하지만 여신의 기척은 이미 사라져 있었다. 아무래도 간신히 피한 모양이다."

[[dialogue]]
speaker = "ルヴィネ"
original = "「なら、残ったあなたたちを消せばいいこと」"
translation = "「그럼 남은 너희를 지우면 그만인 일」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「先日はこの姿を見せたくなくて見逃したけど、もう関係ないわね。新たな女神としてあなたたちを裁いてあげる」"
translation = "「요전에는 이 모습을 보여주기 싫어서 놓아줬지만, 이제 상관없어. 새로운 여신으로서 너희를 심판해 줄게」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ルヴィ──！！」"
translation = "「루비──!!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「！！？」"
translation = "「!!?」"

[[dialogue]]
speaker = "unk"
original = "ベアトリスの声にルヴィネが一瞬目を見開いた。"
translation = "베아트리스의 목소리에 루비네가 순간 눈을 크게 떴다."

[[dialogue]]
speaker = "ナターシャ"
original = "「ナイトホークマスカレード！」"
translation = "「나이트 호크 마스커레이드!」"

[[dialogue]]
speaker = "unk"
original = "その瞬間、ナターシャの影が無数の鳥となってルヴィネに襲い掛かる。"
translation = "그 순간, 나타샤의 그림자가 무수한 새가 되어 루비네를 덮친다."

[[dialogue]]
speaker = "ルヴィネ"
original = "「く──！」"
translation = "「큭──!」"

[[dialogue]]
speaker = "梨緒"
original = "「みんな、撤退するぞ！」"
translation = "「모두, 철수한다!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ごめん、ルヴィ……！」"
translation = "「미안, 루비……!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「そうはさせないわ！」"
translation = "「그렇게 두지 않아!」"

[[dialogue]]
speaker = "unk"
original = "ルヴィネが空に手を振りかざすと、地響きのような音とともにディザスターハンドが動き出そうとする。"
translation = "루비네가 하늘로 손을 치켜들자 땅울림 같은 소리와 함께 디재스터 핸드가 움직이려 한다."

[[dialogue]]
speaker = "unk"
original = "その瞬間──"
translation = "그 순간──"

[[dialogue]]
speaker = "？？？"
original = "『はーい、６名様のお帰りでーす♪』"
translation = "『네에, 6분 손님 돌아가십니다♪』"

