speaker_original = "サチ"
speaker_translation = "사치"
original = "「気持ちいいっ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000気持ちいぃ～っ<emoji=heart04>\u3000ひぃ～～っ<emoji=heart04>\u3000ひぃ～～っ<emoji=heart04><emoji=heart04>\u3000ひいぃ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「기분 좋아<emoji=heart04> 기분 좋아<emoji=heart04> 기분 좋아아~<emoji=heart04> 히이~~익<emoji=heart04> 히이~~익<emoji=heart04><emoji=heart04> 히이이~~~익<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ああああぁっ<emoji=heart04>\u3000来ちゃっ<emoji=heart04><emoji=heart04>\u3000来ちゃいますっ<emoji=heart04>\u3000幸せ来ちゃってますぅっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아아아앗<emoji=heart04> 와버려<emoji=heart04><emoji=heart04> 와버려요<emoji=heart04> 행복이 와버리고 있어요오<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「あっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000ふあぁあっ<emoji=heart04>\u3000幸せっ<emoji=heart04>\u3000幸せになっちゃうっ<emoji=heart04><emoji=heart04>\u3000あぁっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>\u3000んああああぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 응아앗<emoji=heart04> 후아아앗<emoji=heart04> 행복해<emoji=heart04> 행복해져버려<emoji=heart04><emoji=heart04> 아앗<emoji=heart04> 후아아앗<emoji=heart04> 응아아아아아~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ああああぁっ<emoji=heart04>\u3000幸せ来るうぅぅぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아아아앗<emoji=heart04> 행복이 온다아아아아~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……サチ！\u3000中に出すぞっ！！！」"
translation = "「윽…… 사치! 안에 낸다!!!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ああああああっ<emoji=heart04><emoji=heart04>\u3000イクっ<emoji=heart04>\u3000イクイクイクイクイクっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아아아아앗<emoji=heart04><emoji=heart04> 가<emoji=heart04> 가가가가가<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「イっ――――<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가――――<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「イックうぅぅぅーーーーーーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふああああああぁぁぁ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가아아아아아아아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 후아아아아아아아아~~~~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「はあああぁぁぁ～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000お兄さんの精液、中にいっぱい出てますうううぅぅぅ～～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「하아아아아아아아~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 오빠 정액, 안에 가득 나오고 있어요오오오오오오~~~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「子宮の中、どくどくって熱いの感じるぅ～～～っ<emoji=heart04>\u3000ふあああぁ～～～っ<emoji=heart04>\u3000あぁぁ、幸せぇ～～<emoji=heart04><emoji=heart04>」"
translation = "「자궁 안이 울컥울컥 뜨거운 게 느껴져어~~~~앗<emoji=heart04> 후아아아~~~~앗<emoji=heart04> 아아아, 행복해에~~~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「はああぁ～～っ<emoji=heart04>\u3000んっ……ふうぅっ<emoji=heart04>\u3000はぁぁ、子宮に精液いっぱい<emoji=heart04>\u3000ありがとうございますぅっ……<emoji=heart04>」"
translation = "「하아아아~~~~앗<emoji=heart04> 응…… 후우욱<emoji=heart04> 하아아, 자궁에 정액 가득<emoji=heart04> 감사합니다아오……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「はあぁ……<emoji=heart04>\u3000ふうぅ<emoji=heart04>\u3000射精、すごいです……やっと、終わりました<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 후우우<emoji=heart04> 사정, 굉장해요…… 겨우, 끝났네요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はペニスをゆっくりと引き抜く。"
translation = "나는 페니스를 천천히 뽑아낸다."

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「んっ……<emoji=heart04>」"
translation = "「응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「はあぁぁ……<emoji=heart04>\u3000はふうぅぅ……<emoji=heart04>」"
translation = "「하아아아……<emoji=heart04> 하후우우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「サチ、どう？」"
translation = "「사치, 어때?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「はあぁ<emoji=heart04>\u3000はい……<emoji=heart04>\u3000エッチ……すごく、気持ち良かったです<emoji=heart04>」"
translation = "「하아아<emoji=heart04> 네……<emoji=heart04> 섹스…… 정말, 기분 좋았어요<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「えっと、淫紋は……？」"
translation = "「저기, 음문은……?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「えっ……？\u3000あっ！」"
translation = "「엣……? 앗!」"

[[dialogue]]
speaker = "unk"
original = "サチは、はっとなったようにお腹のところに視線を落とす。"
translation = "사치는 깜짝 놀란 듯 배 쪽으로 시선을 떨어뜨린다."

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「あっ……まだ消えてない、みたいです。いっぱい気持ち良くしてもらったんですけど……その……足りてないみたいで……<emoji=heart04>」"
translation = "「앗…… 아직 안 사라진, 모양이에요. 잔뜩 기분 좋게 해주셨는데…… 그…… 부족한 모양이라서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ってことは……」"
translation = "「그 말은……」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「は、はい……体の火照り、まだ収まらなくて……<emoji=heart04>」"
translation = "「네, 네…… 몸의 열기, 아직 가라앉지 않아서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「なら、もう１回頑張らないとな」"
translation = "「그럼, 한 번 더 힘내야겠네」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「んっ……<emoji=heart04>\u3000は、はい<emoji=heart04>」"
translation = "「응……<emoji=heart04> 네<emoji=heart04>」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「お兄さん、その……」"
translation = "「오빠, 그……」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「……<b>ありがとうございます</b><emoji=heart04>」"
translation = "「……<b>감사합니다</b><emoji=heart04>」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「エッチの最中に……好きってたくさん口に出しちゃいましたけど……」"
translation = "「섹스 도중에…… 좋아한다는 말 많이 해버렸지만……」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「私はその……エッチなことよりも、お兄さんの方が――その、大好きですから<emoji=heart04>」"
translation = "「저는 그…… 야한 일보다도, 오빠를 더―― 그, 정말 좋아하니까요<emoji=heart04>」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「あっ……すごいっ<emoji=heart04>\u3000お兄さん、もう大きくなって……<emoji=heart04>」"
translation = "「앗…… 굉장해<emoji=heart04> 오빠, 벌써 커져서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「あっ<emoji=heart04>\u3000あんっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その後、淫紋が消えるまで、俺は何度も彼女の中に精を注ぎ込み続け、彼女はその度に『ありがとうございます』と嬉しそうにお礼を口にするのだった――"
translation = "그 후, 음문이 사라질 때까지, 나는 몇 번이고 그녀의 안에 정을 계속 쏟아부었고, 그녀는 그때마다 『감사합니다』라며 기쁜 듯이 인사를 입에 담는 것이었다――"

