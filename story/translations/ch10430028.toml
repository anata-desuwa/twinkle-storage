[[dialogue]]
speaker = "unk"
original = "ある日の放課後。新たなアステラが出現したが、サチの新たな力『フォルトゥーナフォーム』の活躍によって、無事攻略に成功した。"
translation = "어느 날 방과 후. 새로운 아스테라가 출현했지만, 사치의 새로운 힘 『포르투나 폼』의 활약 덕분에, 무사히 공략에 성공했다."

[[dialogue]]
speaker = "unk"
original = "その後、学園に戻ろうとしたところで――"
translation = "그 후, 학원으로 돌아가려던 참에――"

[[dialogue]]
speaker_original = "サチ（覚醒）"
speaker_translation = "사치(각성)"
original = "「あ、あの……お兄さん、すみませんっ。ちょっといいでしょうかっ？」"
translation = "「저, 저기…… 오빠, 죄송합니다. 잠시 괜찮을까요?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ん？\u3000どうしたんだ、サチ？」"
translation = "「응? 왜 그래, 사치?」"

[[dialogue]]
speaker = "unk"
original = "見ると、サチの顔は赤く、呼吸も荒い。"
translation = "보니, 사치의 얼굴은 붉고, 호흡도 거칠다."

[[dialogue]]
speaker_original = "サチ（覚醒）"
speaker_translation = "사치(각성)"
original = "「実は、その……またフォルトゥーナフォームの<b>反動</b>が来てしまったみたいで……」"
translation = "「사실은, 그…… 또 포르투나 폼의 <b>반동</b>이 와버린 것 같아서……」"

[[dialogue]]
speaker = "unk"
original = "サチのフォルトゥーナフォームは強力だがその反面、凄まじい幸運を必要とする為、『運勢の周期』を早めてしまうという欠点があった。"
translation = "사치의 포르투나 폼은 강력하지만 그 반면, 엄청난 행운을 필요로 하기 때문에, 『운세의 주기』를 앞당겨버린다는 결점이 있었다."

[[dialogue]]
speaker = "unk"
original = "その影響で、元々は年に１度しか訪れないはずの『アンラッキーデイ』が──不幸度合いは分散されて弱まってはいるものの──月１の頻度で訪れるようになってしまっていた。"
translation = "그 영향으로, 원래는 1년에 한 번만 찾아와야 할 『언럭키 데이』가 ──불행의 정도는 분산되어 약해져 있지만── 월 1회의 빈도로 찾아오게 되어버리고 말았다."

[[dialogue]]
speaker_original = "サチ（覚醒）"
speaker_translation = "사치(각성)"
original = "「異変に気づいて、トレジアンナさんに付けてもらった『不幸解析』で、調べてみたんですけど……っ」"
translation = "「이변을 눈치채고, 트레지안나 씨가 달아준 『불행 해석』으로, 조사해 봤는데요……!」"

[[dialogue]]
speaker_original = "サチ（覚醒）"
speaker_translation = "사치(각성)"
original = "「今回はどうやら、魔法が暴発、してしまったみたいで……っ」"
translation = "「이번에는 아무래도, 마법이 폭발, 해버린 것 같아서……!」"

[[dialogue]]
speaker_original = "サチ（覚醒）"
speaker_translation = "사치(각성)"
original = "「私の体に……その……」"
translation = "「제 몸에…… 그……」"

[[dialogue]]
speaker = "unk"
original = "サチはお腹の辺りを擦りながら、恥ずかしそうに告げる。"
translation = "사치는 배 근처를 문지르며, 부끄러운 듯이 고한다."

[[dialogue]]
speaker_original = "サチ（覚醒）"
speaker_translation = "사치(각성)"
original = "「い……『<ruby>淫紋<rt>いんもん</rt></ruby>』が、刻まれてしまったみたいで……<emoji=heart04>\u3000んっ……ふうぅ……<emoji=heart04>」"
translation = "「음…… 『음문』이, 새겨져 버린 것 같아서……♡ 응…… 후우우……♡」"

[[dialogue]]
speaker = "unk"
original = "息を荒くして、太ももを擦り合わせながら、サチはそんなことを言った。"
translation = "숨을 거칠게 몰아쉬며, 허벅지를 비벼대면서, 사치는 그런 말을 했다."

[[dialogue]]
speaker_original = "サチ（覚醒）"
speaker_translation = "사치(각성)"
original = "「その効果は、体を強制的に『発情状態』にしてしまう、らしくて……<emoji=heart04>\u3000解除方法、は……っ」"
translation = "「그 효과는, 몸을 강제적으로 『발정 상태』로 만들어 버리는 것 같아서……♡ 해제 방법은……!」"

[[dialogue]]
speaker_original = "サチ（覚醒）"
speaker_translation = "사치(각성)"
original = "「『絶頂による性欲の発散』<emoji=heart04>\u3000らしくて……っ<emoji=heart04>」"
translation = "「『절정에 의한 성욕의 발산』♡ 이라고 해서……♡」"

[[dialogue]]
speaker_original = "サチ（覚醒）"
speaker_translation = "사치(각성)"
original = "「だから、ごめんなさい、お兄さんっ<emoji=heart04>\u3000はあぁぁ……<emoji=heart04>」"
translation = "「그러니까, 미안해요, 오빠! 하아아아……♡」"

[[dialogue]]
speaker_original = "サチ（覚醒）"
speaker_translation = "사치(각성)"
original = "「お願い……しても、いいですかっ？\u3000私、もう……ふうぅぅぅ<emoji=heart04>\u3000もう我慢、できなくてっ<emoji=heart04>」"
translation = "「부탁…… 드려도 될까요? 저, 이제…… 후우우우우♡ 이제 참을 수 없어서♡」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「急いだ方が良さそうだな。安心しろ、ずっとそばにいるから」"
translation = "「서두르는 게 좋겠네. 안심해, 계속 곁에 있을 테니까.」"

[[dialogue]]
speaker_original = "サチ（覚醒）"
speaker_translation = "사치(각성)"
original = "「あぁぁっ<emoji=heart04><emoji=heart04>\u3000お兄さん……<emoji=heart04>」"
translation = "「아아아앗♡♡ 오빠……♡」"

[[dialogue]]
speaker = "unk"
original = "それから、俺たちはこっそり、近くのラブホテルへと入ったのだが――"
translation = "그러고 나서, 우리는 몰래, 근처의 러브호텔로 들어갔는데――"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「はあぁ～っ<emoji=heart04>\u3000ふうぅ～っ<emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000はあぁ～っ……<emoji=heart04>\u3000ふうぅ～っ……<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000お兄さんのおち○ちん！」"
translation = "「하아아~♡ 후우우~♡ 응응으♡ 하아아~……♡ 후우우~……♡ 아아앗♡ 오빠의 자지!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「はあぁ～っ<emoji=heart04>\u3000ふわぁあ<emoji=heart04>\u3000大きい……<emoji=heart04>」"
translation = "「하아아~♡ 후와아아♡ 커다래……♡」"

[[dialogue]]
speaker = "unk"
original = "サチの言う通り、戦闘服をまくった腹部にはピンク色の淫紋が怪しく発光していた。"
translation = "사치의 말대로, 전투복을 걷어 올린 복부에는 분홍색 음문이 괴이하게 발광하고 있었다."

[[dialogue]]
speaker = "unk"
original = "駆け込むように入室したホテルの部屋、そのベットの上でサチは普段では考えられないほど大胆に股を開いて、息を荒くしている。"
translation = "서둘러 들어온 호텔 방, 그 침대 위에서 사치는 평소라면 생각할 수 없을 정도로 대담하게 가랑이를 벌리고, 숨을 거칠게 몰아쉬고 있다."

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「も、もうダメ<emoji=heart04>\u3000我慢できません……！\u3000お兄さん、ごめんなさいっ<emoji=heart04>」"
translation = "「이, 이제 안 돼♡ 참을 수 없어요……! 오빠, 미안해요!♡」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「早く！\u3000早くおち○ちん下さいっ<emoji=heart04><emoji=heart04>\u3000もう我慢できないんですぅ～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「빨리! 빨리 자지 주세요♡♡ 이제 참을 수 없단 말이에요오~~♡♡♡」"

[[dialogue]]
speaker = "unk"
original = "そう言いながら、サチは自分の指で膣穴を広げてみせて、お尻を振って誘惑してくる。"
translation = "그렇게 말하면서, 사치는 자신의 손가락으로 질 구멍을 넓혀 보이며, 엉덩이를 흔들며 유혹해 온다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……！」"
translation = "「윽……!」"

[[dialogue]]
speaker = "unk"
original = "普段のエッチの時は恥ずかしそうにしていることが多いサチだが、淫紋の効果なのか理性が飛んでしまう程に発情してしまっているようだった。"
translation = "평소 섹스할 때는 부끄러워하는 경우가 많은 사치였지만, 음문의 효과인지 이성이 날아갈 정도로 발정해버린 듯했다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ち、ちょっと待った！\u3000準備しないと……」"
translation = "「자, 잠시만! 준비해야지……」"

[[dialogue]]
speaker = "unk"
original = "俺は手マンで前戯しようとするが、おま○こに指が触れると、既に前戯など必要ないほどぐちょぐちょになっていた。"
translation = "나는 핑거링으로 애무하려 하지만, 보지에 손가락이 닿자, 이미 애무 따위 필요 없을 정도로 질퍽질퍽해져 있었다."

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ん～～～っ！！\u3000お願いですっ、意地悪しないで下さいぃ<emoji=heart04>\u3000早くっ、早くおま○こしてぇ～<emoji=heart04>」"
translation = "「으으으음~!! 부탁이에요, 심술부리지 말아 주세요오♡ 빨리, 빨리 보지 해줘어~♡」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ああぁあっ<emoji=heart04>\u3000私がいつもエッチなこと、禁止って言ってるからっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000意地悪してるんですかっ？」"
translation = "「아아아앗♡ 제가 맨날 야한 거, 금지라고 말하니까♡ 하앙♡ 심술부리는 거예요?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ちゃんとごめんなさいしますからっ！\u3000お願いしますぅ<emoji=heart04>\u3000んふぅぅん<emoji=heart04>」"
translation = "「제대로 잘못했다고 할 테니까요! 부탁드려요오♡ 응후우우운♡」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「はぁぁぁあっ<emoji=heart04>\u3000いつもエッチなこと興味ないフリして、ごめんなさいっ<emoji=heart04>」"
translation = "「하아아아앗♡ 맨날 야한 거 관심 없는 척해서, 죄송해요오♡」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「エッチなことっ、ホントは大好きなんですぅっ<emoji=heart04>\u3000ああぁん<emoji=heart04>\u3000お兄さんと会うと、いつもエッチなこと期待しちゃってますっ<emoji=heart04>」"
translation = "「야한 거, 사실은 정말 좋아해요오♡ 아아앙♡ 오빠랑 만나면, 맨날 야한 거 기대해 버려요♡」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「附属校の生徒会長なのに、はしたなくてごめんなさいっ<emoji=heart04>\u3000はぁあんっ<emoji=heart04>」"
translation = "「부속 학교의 학생회장인데, 천박해서 죄송해요오♡ 하아아앙♡」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「でも、エッチなこと、我慢できないんですぅっ<emoji=heart04>\u3000あぁああっ<emoji=heart04>」"
translation = "「하지만, 야한 거, 참을 수 없단 말이에요오♡ 아아아앗♡」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「私はお兄さんの専用おま○こですっ<emoji=heart04>」"
translation = "「저는 오빠의 전용 보지예요♡」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「エッチなことされると、内心喜んじゃう淫乱生徒会長ですぅ<emoji=heart04>\u3000ああぁあっ<emoji=heart04>\u3000エッチでごめんなさいぃっ<emoji=heart04>」"
translation = "「야한 짓 당하면, 내심 기뻐해 버리는 음란 학생회장이에요오♡ 아아아앗♡ 야해서 죄송해요오♡」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「だからお兄さん、エッチな附属生にお仕置きおま○こっ<emoji=heart04>\u3000おま○こパコパコして下さいぃっ<emoji=heart04>」"
translation = "「그러니까 오빠, 야한 부속생에게 벌주기 보지♡ 보지 팍팍 해주세요오♡」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……わかった。もう挿れちゃうからな！」"
translation = "「윽…… 알았어. 이제 삽입할 거니까!」"

[[dialogue]]
speaker = "unk"
original = "サチの淫乱な煽り口上で、ペニスはすっかりガチガチに勃起してしまっていた。"
translation = "사치의 음란한 도발 멘트에, 페니스는 완전히 딱딱하게 발기해버리고 말았다."

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「はああぁんっ<emoji=heart04>\u3000お兄さんのおち○ちん、おま○こに当たってますぅ<emoji=heart04>\u3000はああぁっ、すごいっ<emoji=heart04>\u3000大きくて、すごく固いですぅ<emoji=heart04>」"
translation = "「하아아앙♡ 오빠의 자지, 보지에 닿고 있어요오♡ 하아아앗, 굉장해♡ 크고, 엄청 딱딱해요오♡」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「早く、早く入れて下さぁいっ<emoji=heart04>」"
translation = "「빨리, 빨리 넣어 주세요오♡」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「挿れるぞ、サチ……！」"
translation = "「넣는다, 사치……!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「はいっ<emoji=heart04>\u3000はいぃぃ<emoji=heart04>\u3000来て<emoji=heart04>\u3000おち○ちん、早くぅぅ<emoji=heart04>」"
translation = "「네♡ 네에에♡ 와줘♡ 자지, 빨리이이♡」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「あっ――<emoji=heart04><emoji=heart04>」"
translation = "「앗――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ふあああぁぁぁっ<emoji=heart04><emoji=heart04>\u3000おち○ちん来たあああぁぁぁ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아앗<emoji=heart04><emoji=heart04> 자지 들어왔다아아아아~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そんなに勢いよく突っ込んだわけではないはずなのに、サチのおま○こが愛液でぐちょぐちょになっていた為か、一気に奥まで飲み込まれてしまう。"
translation = "그렇게 기세 좋게 찔러 넣은 것은 아닐 텐데도, 사치의 보지가 애액으로 질척질척해진 탓인지, 단숨에 안쪽까지 삼켜져 버린다."

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「んうぅっ<emoji=heart04>\u3000はあぁあっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>\u3000あぁあんっ<emoji=heart04><emoji=heart04>\u3000んんんっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04>」"
translation = "「응우윽<emoji=heart04> 하아아앗<emoji=heart04> 후우욱<emoji=heart04> 응아앗<emoji=heart04> 후아아앗<emoji=heart04> 아아앙<emoji=heart04><emoji=heart04> 응응윽<emoji=heart04> 하아앗<emoji=heart04> 응아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くっ……サチの中、すごい……！」"
translation = "「큭…… 사치의 안, 굉장해……!」"

[[dialogue]]
speaker = "unk"
original = "まるで口でバキュームフェラされているかのように、おま○こがペニスに吸い付いて来る。"
translation = "마치 입으로 진공 펠라를 받는 것처럼, 보지가 페니스에 달라붙어 온다."

[[dialogue]]
speaker = "unk"
original = "それは筆舌に尽くし難い快楽のるつぼで、油断するとすぐに射精してしまいそうな程だ。"
translation = "그것은 필설로 다하기 어려운 쾌락의 도가니로, 방심하면 금방 사정해 버릴 것만 같을 정도다."

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「あぁんっ<emoji=heart04>\u3000おま○こ気持ちいいっ<emoji=heart04>\u3000おち○ちん気持ちいいですぅっ<emoji=heart04>」"
