[[dialogue]]
speaker = "unk"
original = "既に星霊祭は４日目、新星学園の優勢で進んでいた。"
translation = "이미 성령제는 4일째, 신성 학원의 우세로 진행되고 있었다."

[[dialogue]]
speaker = "unk"
original = "両学園の応援合戦を終えた直後の昼休みのこと──"
translation = "양 학원의 응원 합전이 끝난 직후의 점심시간──"

[[dialogue]]
speaker = "美鶴"
original = "「会長さん、お疲れ。今日も大活躍だったじゃん」"
translation = "「회장군, 수고했어. 오늘도 대활약이었잖아」"

[[dialogue]]
speaker = "unk"
original = "応援団員の一員として、さっきまでチアリーディングに励んでいた美鶴に声をかけられた。"
translation = "응원단원 중 한 명으로서, 방금 전까지 치어리딩에 힘쓰고 있던 미츠루에게 말을 걸었다."

[[dialogue]]
speaker = "クロト"
original = "「美鶴もお疲れさま。組体操の３段タワー、見事だったよ」"
translation = "「미츠루도 수고했어. 단체 체조 3단 타워, 멋졌어」"

[[dialogue]]
speaker = "美鶴"
original = "「組体操ってかスタンツね。うちの応援も、なかなか様になってきたでしょ」"
translation = "「단체 체조라기보단 스턴트지. 나의 응원도, 제법 그럴싸해졌지」"

[[dialogue]]
speaker = "unk"
original = "ソロ志向でチームでの協調性に欠けそうな美鶴だが、応援団にも打ち解け、難易度の高いスタンツにも挑んでいるのは彼女の恋人として安心を覚える。"
translation = "솔로 지향이라 팀워크가 부족할 것 같던 미츠루가 응원단에도 잘 어울리고 난이도 높은 스턴트에도 도전하는 모습은 그녀의 연인으로서 안심이 되었다."

[[dialogue]]
speaker = "unk"
original = "それにしてもだ。美鶴が制作したチアガール衣装は──"
translation = "그건 그렇고. 미츠루가 제작한 치어걸 의상은──"

[[dialogue]]
speaker = "美鶴"
original = "「なに、うちの服が気になんの？」"
translation = "「뭐야, 나의 옷이 신경 쓰여?」"

[[dialogue]]
speaker = "クロト"
original = "「……うん、気になる」"
translation = "「……응, 신경 쓰여」"

[[dialogue]]
speaker = "美鶴"
original = "「やっぱし。うちの出番の時、うちの方ばっか見てたもんね」"
translation = "「역시나. 내가 나올 때, 나만 계속 보고 있었잖아」"

[[dialogue]]
speaker = "美鶴"
original = "「会長さんの視線感じてたよ。ちょっとやりすぎなポーズしちゃったのも、会長さんに見せつけるためだし」"
translation = "「회장군의 시선 느끼고 있었어. 조금 지나친 포즈를 취한 것도, 회장군에게 보여주기 위해서고」"

[[dialogue]]
speaker = "美鶴"
original = "「みんなに見られながら踊ってたら、体が火照っちゃってさ」"
translation = "「모두에게 보여지면서 춤추니까, 몸이 달아올라서 말이야」"

[[dialogue]]
speaker = "美鶴"
original = "「ここんとこ忙しくて、会長さんとのスキンシップも足りてないし……うち、もう限界なんだよね」"
translation = "「요즘 바빠서, 회장군과의 스킨십도 부족하고…… 나, 이제 한계야」"

[[dialogue]]
speaker = "美鶴"
original = "「ね、会長さん、あっち行こ？」"
translation = "「저기, 회장군, 저쪽으로 갈까?」"

[[dialogue]]
speaker = "クロト"
original = "「あっちって？」"
translation = "「저쪽이라니?」"

[[dialogue]]
speaker = "美鶴"
original = "「人のいないとこ<emoji=heart04>」"
translation = "「사람이 없는 곳<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "連れ込まれたアリーナの裏手に人気はなく、密会をするには最適な場所だった。"
translation = "이끌려 들어간 아레나 뒤편에는 인적이 없어, 밀회를 하기에는 최적의 장소였다."

[[dialogue]]
speaker = "美鶴"
original = "「ここならできるよね」"
translation = "「여기라면 할 수 있겠지」"

[[dialogue]]
speaker = "美鶴"
original = "「知ってるよ、揺れてる胸とか、お尻とかめっちゃ見てたの。うちは真面目にチアダンしてたのに。スケベ<emoji=heart04>」"
translation = "「알고 있어, 흔들리는 가슴이라든가, 엉덩이라든가 엄청 보고 있었잖아. 나는 진지하게 치어 댄스를 하고 있었는데. 변태<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「美鶴だってスケベだよ」"
translation = "「미츠루도 변태잖아」"

[[dialogue]]
speaker = "unk"
original = "チアダンスのように高々と掲げた脚と脚の間。女性器は前戯の必要もないくらいに濡れて、むわっとした熱気を放っていた。"
translation = "치어 댄스처럼 높이 치켜든 다리와 다리 사이. 여성기는 전희가 필요 없을 정도로 젖어, 후끈한 열기를 내뿜고 있었다."

[[dialogue]]
speaker = "美鶴"
original = "「あは……<emoji=heart04>\u3000会長さんのおち○ぽ、ガッチガチじゃん。なにこれ、鉄の塊？」"
translation = "「아하……<emoji=heart04> 회장군의 좆, 완전 딱딱하잖아. 뭐야 이거, 쇠덩어리야?」"

[[dialogue]]
speaker = "unk"
original = "俺も性器もまた、美鶴のダンスに煽られた上、唐突なシチュエーションに放り込まれたせいで熱く勃起している。"
translation = "나의 성기도 역시, 미츠루의 댄스에 부추겨진 데다, 갑작스러운 상황에 던져진 탓에 뜨겁게 발기해 있었다."

[[dialogue]]
speaker = "美鶴"
original = "「はぁ、あんっ……ガチガチち○ぽ当たってるぅ……おま○こに入りたそうにピクピク震えてんの、なんかカワよ」"
translation = "「하아, 앙…… 딱딱한 좆이 닿고 있어…… 보지에 들어가고 싶어서 움찔움찔 떨고 있는 거, 왠지 귀여워」"

[[dialogue]]
speaker = "unk"
original = "すっかりできあがっている美鶴のおま○こに、今すぐ突っ込みたいと、激しく脈打って訴えていた。"
translation = "완전히 준비된 미츠루의 보지에, 당장이라도 쑤셔 넣고 싶다고, 격렬하게 맥동하며 호소하고 있었다."

[[dialogue]]
speaker = "美鶴"
original = "「くんくん……ふぁぁ……<emoji=heart04>\u3000おち○ぽの蒸れた臭い、ここまで届くね」"
translation = "「킁킁…… 후아아……<emoji=heart04> 좆에서 나는 땀 냄새, 여기까지 닿네」"

[[dialogue]]
speaker = "クロト"
original = "「汗かいたから、どうしてもね」"
translation = "「땀을 흘렸으니까, 어쩔 수 없지」"

[[dialogue]]
speaker = "美鶴"
original = "「謝んなくていいよ。会長さんのおち○ぽの匂い好きだし……うちも汗かいたからお互い様」"
translation = "「사과 안 해도 돼. 회장군의 좆 냄새 좋아하고…… 나도 땀 흘렸으니까 피차일반」"

[[dialogue]]
speaker = "美鶴"
original = "「すんすん、くんくん……濃ゆくてくさぁい雄の臭い……おま○こに響くの嗅がされたらさ……もう、我慢できるわけないじゃん」"
translation = "「킁킁, 킁킁…… 진하고 구린 수컷 냄새…… 보지에 울리는 걸 맡게 되면 말이야…… 이제, 참을 수 있을 리 없잖아」"

[[dialogue]]
speaker = "美鶴"
original = "「焦らすとかなしだから。早めに終わらせなきゃ、誰かに見つかっちゃうかもだし……」"
translation = "「애태우기 같은 건 없어. 빨리 끝내야지, 누군가에게 들킬지도 모르고……」"

[[dialogue]]
speaker = "unk"
original = "だからといって、ここでやめるなんて選択肢はない。どんなリスクがあろうとも、今すぐこの場で美鶴と愛し合うのが最優先事項だ。"
translation = "그렇다고 해서, 여기서 그만둘 선택지는 없다. 어떤 위험이 있더라도, 지금 당장 이 자리에서 미츠루와 사랑을 나누는 것이 최우선 사항이다."

[[dialogue]]
speaker = "美鶴"
original = "「はぁ、はっ……早く、おま○こにちょうだい……？\u3000会長さんのおち○ぽ、食べさせて……」"
translation = "「하아, 핫…… 빨리, 보지에 줘……? 회장군의 좆, 먹게 해줘……」"

[[dialogue]]
speaker = "unk"
original = "とろとろに仕上がっているおま○こに、宛がっていた亀頭の尖端を咥えこませる。"
translation = "흐물흐물하게 달아오른 보지에, 갖다 대고 있던 귀두의 끝을 물게 한다."

[[dialogue]]
speaker = "美鶴"
original = "「んぁっ……！\u3000はっ、入って、きたぁ……<emoji=heart04>」"
translation = "「응앗……! 핫, 들어, 왔다아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "大した力を入れる必要もなく、ペニスは甘く開いた美鶴の膣内へと滑り込んだ。"
translation = "별다른 힘을 줄 필요도 없이, 페니스는 달콤하게 열린 미츠루의 질 속으로 미끄러져 들어갔다."

[[dialogue]]
speaker = "美鶴"
original = "「ふぅううぅぅぅぅんっ！\u3000はっ、はぁ、んはぁあぁぁっ……おち○ぽ、おかえりー<emoji=heart04>」"
translation = "「후우우우우우웅! 핫, 하아, 응하아아아앗…… 좆, 어서 와ー<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "何度も突き入れている美鶴の膣穴だが、今日はいつも以上に狭く感じる。"
translation = "몇 번이고 찔러 넣었던 미츠루의 질 구멍이지만, 오늘은 평소보다 더 좁게 느껴진다."

[[dialogue]]
speaker = "美鶴"
original = "「はーっ、はーっ、はーっ……ぶっといので、おま○こ、こじ開けられて……ヤバぁ、んぅ、くぅうぅんっ<emoji=heart04>」"
translation = "「하ー앗, 하ー앗, 하ー앗…… 굵은 걸로, 보지, 억지로 벌려져서…… 위험해, 응, 쿠우우웅앗<emoji=heart04>」"

[[dialogue]]
speaker = "美鶴"
original = "「え、会長さん、いつもよりおっきすぎないっ……？\u3000うちのおま○こ、裂けちゃいそうなんだけど……」"
translation = "「에, 회장군, 평소보다 너무 크지 않아……? 나의 보지, 찢어질 것 같은데……」"

[[dialogue]]
speaker = "クロト"
original = "「いつもより興奮してるからかな。美鶴のチアで元気もらって、こんな場所でするなんてさ」"
translation = "「평소보다 흥분해서 그런가. 미츠루의 치어에서 기운 받아서, 이런 곳에서 하다니 말이야」"

[[dialogue]]
speaker = "美鶴"
original = "「あは、おち○ぽ、またびくんって……見つかるかもしれないから、興奮しちゃうよね……」"
translation = "「아하, 좆, 또 움찔하고…… 들킬지도 모르니까, 흥분하게 되지……」"

[[dialogue]]
speaker = "美鶴"
original = "「会長さんので、お腹の中、いっぱいになって……うちの体、会長さんのモノにされちゃってるってカンジ……悪くない」"
translation = "「회장군의 것으로, 배 속이, 가득 차서…… 나의 몸, 회장군의 것으로 만들어지고 있다는 느낌…… 나쁘지 않아」"

[[dialogue]]
speaker = "美鶴"
original = "「ふふ、星霊祭の真っ最中に、生ハメえっちしちゃうなんてさ。誰かに見られたら大事だよね。会長さん、クビになっちゃうんじゃない？」"
translation = "「후후, 성령제 한창일 때, 맨섹스 해버리다니 말이야. 누군가에게 들키면 큰일이겠지. 회장군, 목 잘리는 거 아니야?」"

[[dialogue]]
speaker = "unk"
original = "そんなの今さらだ。背徳感が最高のスパイスになるということを、俺は知っている。"
translation = "그런 건 이제 와서다. 배덕감이 최고의 스파이스가 된다는 것을, 나는 알고 있다."

[[dialogue]]
speaker = "美鶴"
original = "「あーヤバ。おま○この中、ひくひくしちゃう……わかる？\u3000わかるよね？」"
translation = "「아ー 위험해. 보지 속이, 히끅히끅거려…… 알아? 알지?」"

[[dialogue]]
speaker = "美鶴"
original = "「はぁ、はぁっ……ぶっといおち○ぽで、ぐちゅぐちゅかき回してよ……<emoji=heart04>\u3000一緒に、きもちよくなりたぁい……<emoji=heart04>」"
translation = "「하아, 하앗…… 굵은 좆으로, 질척질척 휘저어 줘……<emoji=heart04> 같이, 기분 좋아지고 싶어어……<emoji=heart04>」"

[[dialogue]]
speaker = "美鶴"
original = "「はっ、あぅ、くぅうん……！\u3000あっ、これ、これっ……これが欲しかったのっ……<emoji=heart04>\u3000はぁっ……ふっ、ぁあぁんっ……<emoji=heart04>」"
translation = "「핫, 아우, 쿠우웅……! 앗, 이거, 이거엇…… 이게 갖고 싶었어엇……<emoji=heart04> 하아앗…… 훗, 아아앙앗……<emoji=heart04>」"

[[dialogue]]
speaker = "美鶴"
original = "「はっ、んぅっ、ひぅっ、んんっ<emoji=heart04>\u3000しばらく会長さんとえっちできてなかったから……おま○こ寂しかったんだよ？」"
translation = "「핫, 응읏, 히읏, 응응앗<emoji=heart04> 한동안 회장군과 섹스 못 했으니까…… 보지 외로웠다고?」"

[[dialogue]]
speaker = "クロト"
original = "「しばらくって……１週間も空いてなかったでしょ」"
translation = "「한동안이라니…… 일주일도 안 지났잖아」"

[[dialogue]]
speaker = "美鶴"
original = "「むぅ。うちにとっちゃ、しばらくなの。会長さんだって、したかったんじゃないの？」"
translation = "「무우. 나한테는, 한동안이야. 회장군도, 하고 싶었던 거 아니야?」"

[[dialogue]]
speaker = "クロト"
original = "「もちろんだよ。美鶴がチアで踊ってるとこ見て、ずっとムラムラしてたんだから」"
translation = "「물론이지. 미츠루가 치어에서 춤추는 거 보고, 계속 발정하고 있었으니까」"

[[dialogue]]
speaker = "美鶴"
original = "「へへ、うちも会長さんのこと考えてた。会長さん、こういうえっちな服好きだろーなーって」"
translation = "「헤헤, 나도 회장군 생각하고 있었어. 회장군, 이런 야한 옷 좋아하겠지ー 하고」"

[[dialogue]]
speaker = "美鶴"
original = "「このカッコで誘惑したら、すっごく愛してくれるだろうなーって思ってたから……作戦成功<emoji=heart04>」"
translation = "「이 복장으로 유혹하면, 엄청 사랑해 줄 거라고 생각했으니까…… 작전 성공<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "まんまと美鶴の策謀に引っかかってしまったらしい。こんな美味しい罠ならば大歓迎だ。"
translation = "고스란히 미츠루의 계략에 걸려든 모양이다. 이런 맛있는 덫이라면 대환영이다."

[[dialogue]]
speaker = "美鶴"
original = "「うちをえっちな目で見るのは、全然構わないけどさ。はっ、あっ……他の子を見て、興奮されるのは、ちょっと……ヤ」"
translation = "「나를 야한 눈으로 보는 건, 전혀 상관없지만 말이야. 핫, 앗…… 다른 애를 보고, 흥분하는 건, 좀…… 싫」"

[[dialogue]]
speaker = "美鶴"
original = "「地雷っぽくてアレだけどさ。うちのことだけ見て？\u3000うちにだけ夢中になって……？\u3000んんっ……会長さんのしたいこと、なんでもしていいから……ね？」"
translation = "「지뢰 같아서 그렇지만. 나만 봐줘? 나에게만 빠져줘……? 응응앗…… 회장군이 하고 싶은 거, 뭐든지 해도 좋으니까…… 응?」"

[[dialogue]]
speaker = "unk"
original = "他人に興味のなさそうな美鶴が、独占欲丸出しで俺をねだる。そのいじらしさが、ペニスをより肥大させ、性感を昂ぶらせた。"
translation = "타인에게 관심이 없을 것 같던 미츠루가, 독점욕을 드러내며 나를 조른다. 그 애처로움이, 페니스를 더욱 비대하게 만들고 성감을 고조시켰다."

[[dialogue]]
speaker = "美鶴"
original = "「んぁ、うちと会長さんの汁が、おま○こでぐちょぐちょに混ざって……すっごいえっちな音ぉ……<emoji=heart04>」"
translation = "「응아, 나와 회장군의 액체가, 보지 속에서 질척질척하게 섞여서…… 엄청 야한 소리이……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "前後にピストンする度、反り返ったペニスが愛液と我慢汁のカクテルを膣口からかき出し、地面に滴り落ちる。"
translation = "앞뒤로 피스톤질할 때마다, 뒤로 젖혀진 페니스가 애액과 참을 수 없는 액체의 칵테일을 질 입구에서 긁어내, 땅에 뚝뚝 떨어진다."

[[dialogue]]
speaker = "unk"
original = "この場は無事に乗り切れたとしても、俺たちが立ち去った後、臭いや痕跡で誰かに気づかれちゃうかもしれない。"
translation = "이 상황을 무사히 넘긴다고 해도, 우리가 떠난 후, 냄새나 흔적으로 누군가에게 들킬지도 모른다."

[[dialogue]]
speaker = "美鶴"
original = "「はぁ、あんっ<emoji=heart04>\u3000いつもよりおっきいから、違うとこ、擦れてっ……すご、背中っ、ぞわぞわするぅっ<emoji=heart04>」"
translation = "「하아, 앙앗<emoji=heart04> 평소보다 크니까, 다른 곳이, 스쳐서읏…… 굉장, 등짝이읏, 오싹오싹해애읏<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ッ……声、ボリューム落として……！」"
translation = "「읏…… 목소리, 볼륨 낮춰……!」"

[[dialogue]]
speaker = "美鶴"
original = "「はぁっ、あんっ……んくぅうぅぅっ……<emoji=heart04>\u3000いけない、えっちな声、我慢しなきゃだよね……」"
translation = "「하앗, 앙앗…… 응쿠우우우읏……<emoji=heart04> 안 돼, 야한 목소리, 참아야 하는데……」"

[[dialogue]]
speaker = "美鶴"
original = "「会長さんのおち○ぽ、きもちよすぎだから……我慢すんのも大変だよぉ……<emoji=heart04>」"
translation = "「회장군의 좆, 너무 기분 좋으니까…… 참는 것도 힘들다구우……<emoji=heart04>」"

[[dialogue]]
speaker = "美鶴"
original = "「んぅ、くぅうんっ……<emoji=heart04>\u3000おち○ぽがこんなにいいものだなんてさ、会長さんに初めてを奪われるまで、知らなかったのに……」"
translation = "「응읏, 쿠우웅앗……<emoji=heart04> 좆이 이렇게 좋은 건지, 회장군에게 처음을 빼앗기기 전까지, 몰랐는데……」"

[[dialogue]]
speaker = "美鶴"
original = "「もう、なかった頃には戻れないよぉ……<emoji=heart04>\u3000ずーっとおち○ぽ入れたまま……繋がったままで１日中過ごしてみたい、な……<emoji=heart04>」"
translation = "「이제, 없었던 때로는 돌아갈 수 없어어……<emoji=heart04> 계속 좆 넣은 채로…… 연결된 채로 하루 종일 보내고 싶어, 나……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "激しいピストンで、はみ出ているおっぱいが、円を描くようにぶるんぶるんと跳ねまわる。"
translation = "격렬한 피스톤질에, 삐져나온 가슴이, 원을 그리듯이 출렁출렁 튀어 오른다."

[[dialogue]]
speaker = "美鶴"
original = "「んっ、おっぱいも弄っちゃうの……？\u3000擦れてたから勃っちゃってんだよね……恥ずぅ……」"
translation = "「응읏, 가슴도 만지는 거야……? 스쳐서 발기해 버렸는데…… 부끄러워……」"

[[dialogue]]
speaker = "美鶴"
original = "「ふぅっ、んっ……<emoji=heart04>\u3000おっぱいもおま○こもイジめるのダメだって……そんなの絶対イッちゃうし……ふぁ、あぅぅ……んっんぅ<emoji=heart04>」"
translation = "「후읏, 응읏……<emoji=heart04> 가슴도 보지도 괴롭히는 거 안 된다구…… 그런 건 절대 가버릴 거고…… 파, 아우우…… 응읏응읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "揺れを抑えるように背後からおっぱいを揉みしだきながら、コリコリに硬くなった乳首を摘まむ。"
translation = "흔들림을 억제하듯이 등 뒤에서 가슴을 주무르면서, 오돌토돌하게 단단해진 유두를 집는다."

[[dialogue]]
speaker = "美鶴"
original = "「んんんっ……<emoji=heart04><emoji=heart04>\u3000ふぁ、あっ、あっ、だめ、もうイキそ、イキそっ、久しぶりのセックスきもちよすぎぃっ……<emoji=heart04>」"
translation = "「응응응읏……<emoji=heart04><emoji=heart04> 파, 앗, 앗, 안 돼, 벌써 갈 것 같아, 갈 것 같아읏, 오랜만의 섹스 너무 기분 좋아아읏……<emoji=heart04>」"

[[dialogue]]
speaker = "美鶴"
original = "「ごめんね、会長さんっ、１回イカせてっ、はっ、はぅ、おま○こっ、おま○こイクイクイクッ……んっ、んんんーーっ<emoji=heart04><emoji=heart04>」"
translation = "「미안해, 회장군읏, 한 번 가게 해줘읏, 핫, 하우, 보지읏, 보지 가 가 가읏…… 응읏, 응응응ーー읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "美鶴"
original = "「ひぅっ……はっ、はぁっ、イッちゃったぁ……<emoji=heart04>\u3000しばらくしてないと、おま○こってすごく敏感になっちゃうんだね……」"
translation = "「히읏…… 핫, 하앗, 가버렸다아……<emoji=heart04> 한동안 안 했더니, 보지가 그렇게 민감해지는구나……」"

[[dialogue]]
speaker = "unk"
original = "イッたばかりのおま○この中は、まるでサウナのような温度と湿度だ。かき出した愛液はおもらししたかのように滴り、美鶴の太ももを伝う。"
translation = "방금 절정에 달한 보지 속은, 마치 사우나 같은 온도와 습도다. 긁어낸 애액은 오줌을 싼 것처럼 뚝뚝 떨어지며, 미츠루의 허벅지를 타고 흐른다."

[[dialogue]]
speaker = "美鶴"
original = "「はぁ、はっ……おち○ぽでズンズンされるとね……きもちいいのが足の先から頭のてっぺんまで広がってって、幸せになるの」"
translation = "「하아, 핫…… 좆으로 쿵쿵 박히면 말이야…… 기분 좋은 게 발끝부터 머리 꼭대기까지 퍼져나가서, 행복해져」"

[[dialogue]]
speaker = "美鶴"
original = "「うちばかりイッてちゃだめだよね……会長さんのおち○ぽだってイラついてるもんね」"
translation = "「나만 가버리면 안 되지…… 회장군의 좆도 짜증내고 있을 텐데」"

[[dialogue]]
speaker = "美鶴"
original = "「うちのとろとろおま○この深ぁいとこに……アッツアツせーし、びゅーびゅーきもちよぉく、中出ししたいもんね……？」"
translation = "「나의 흐물흐물한 보지 깊은 곳에…… 뜨끈뜨끈한 정액, 콸콸 기분 좋게, 안에 싸고 싶을 텐데……?」"

[[dialogue]]
speaker = "unk"
original = "甘く絶頂し、感度の増した美鶴の膣肉が、ペニスの根元から先端までをキュッと締め上げてくる。"
translation = "달콤하게 절정하고, 감도가 높아진 미츠루의 질 근육이, 페니스의 뿌리부터 끝까지를 꽉 조여 온다."

[[dialogue]]
speaker = "美鶴"
original = "「今度はうちが会長さんをイカせてあげなきゃだよね……がんばれ、がんばれ、おち○ぽ<emoji=heart04>\u3000がーんばれ<emoji=heart04>」"
translation = "「이번엔 내가 회장군을 가게 해줘야지…… 힘내, 힘내, 좆<emoji=heart04> 힘내애<emoji=heart04>」"

[[dialogue]]
speaker = "美鶴"
original = "「んぅううぅうんっ！？\u3000ふっ、んぃっ、んきゅ、んっ、ふぁっ、んんんんんっ<emoji=heart04>\u3000激しっ……ひゃっ、はっ、んぁあぁぁぁっ……<emoji=heart04>」"
translation = "「응우우우웅앗!? 흣, 응잇, 응큐, 응읏, 파앗, 응응응응응읏<emoji=heart04> 격렬해읏…… 햐앗, 핫, 응아아아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "美鶴の甘い声援を受けて、ピストンが加速する。"
translation = "미츠루의 달콤한 응원을 받고, 피스톤이 가속한다."

[[dialogue]]
speaker = "美鶴"
original = "「んくぅうぅっ、声、我慢できなくなっちゃうってぇ……<emoji=heart04>\u3000はぁ、はっ、おち○ぽっ、おち○ぽっ……ひぅ、ん、んぅふぅーっ<emoji=heart04>」"
translation = "「응쿠우우읏, 목소리, 참을 수 없게 된다구우……<emoji=heart04> 하아, 핫, 좆읏, 좆읏…… 히우, 응, 응우후ー읏<emoji=heart04>」"

[[dialogue]]
speaker = "美鶴"
original = "「ふぁ、あ……こんなきもちいいの、よくないって……よくない、のに、勝手に腰、動いちゃう……止めらんないよぉ<emoji=heart04>」"
translation = "「파, 아…… 이렇게 기분 좋은 거, 안 된다구…… 안 되는데, 멋대로 허리, 움직여져…… 멈출 수 없어어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "汗と体液と発情した雌のフェロモンが入り混じり、美鶴の全身から甘酸っぱい匂いが漂う。"
translation = "땀과 체액과 발정한 암컷의 페로몬이 뒤섞여, 미츠루의 전신에서 새콤달콤한 냄새가 풍긴다."

[[dialogue]]
speaker = "unk"
original = "その匂いは高濃度の媚薬だ。荒い呼吸で胸いっぱいに吸い込みながら、愛蜜をこぼし続ける膣肉を抉るように突く。"
translation = "그 냄새는 고농도의 최음제다. 거친 호흡으로 가슴 가득 들이마시면서, 사랑의 꿀을 계속 흘리는 질 근육을 도려내듯이 찌른다."

[[dialogue]]
speaker = "美鶴"
original = "「ふっ、はぁっ、んうぅっ<emoji=heart04>\u3000はっ、ぉぅん……<emoji=heart04>\u3000きもちよしゅぎて、イキっぱなしっ……おま○こぐぢょぐぢょらよぉ……<emoji=heart04>」"
translation = "「흣, 하앗, 응우읏<emoji=heart04> 핫, 오우응……<emoji=heart04> 너무 기분 좋아서, 계속 가버려읏…… 보지 질척질척하다구우……<emoji=heart04>」"

[[dialogue]]
speaker = "美鶴"
original = "「そんな激しくされたら、足腰ガクガクで、立ってらんないってぇ……<emoji=heart04>\u3000うち、崩れちゃうよ……<emoji=heart04>」"
translation = "「그렇게 격렬하게 당하면, 다리가 후들거려서, 서 있을 수 없다구우……<emoji=heart04> 나, 무너져 버릴 거야……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "壁に当てて体を支えている美鶴の細腕も、ぶるぶると震えている。"
translation = "벽에 대고 몸을 지탱하고 있는 미츠루의 가는 팔도, 부들부들 떨리고 있다."

[[dialogue]]
speaker = "クロト"
original = "「美鶴が崩れないよう俺が支えるから」"
translation = "「미츠루가 무너지지 않도록 내가 지탱할 테니까」"

[[dialogue]]
speaker = "美鶴"
original = "「あはっ……チアのスタンツみたいじゃん。おま○ことおち○ぽで繋がりあってるなんてえっちすぎだけど……」"
translation = "「아하읏…… 치어의 스턴트 같잖아. 보지와 좆으로 연결되어 있다니 너무 야하지만……」"

[[dialogue]]
speaker = "美鶴"
original = "「んっ、お願い……うちのこと、支えてて……ずっと、ずっと、離しちゃヤだからね」"
translation = "「응읏, 부탁해…… 나를, 지탱해 줘…… 계속, 계속, 놓치면 안 돼」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、一生離さない」"
translation = "「아아, 평생 놓지 않을게」"

[[dialogue]]
speaker = "美鶴"
original = "「んぅうぅぅ<emoji=heart04>\u3000会長さんしゅきぃ……<emoji=heart04>\u3000おち○ぽっ、きもちよしゅぎるっ……<emoji=heart04>\u3000んぅ、ぅうぅぅんっ<emoji=heart04>」"
translation = "「응우우우우<emoji=heart04> 회장군 좋아아……<emoji=heart04> 좆읏, 너무 기분 좋아아읏……<emoji=heart04> 응읏, 우우우우웅읏<emoji=heart04>」"

[[dialogue]]
speaker = "美鶴"
original = "「はぁっ、はーっ、はぅぅんっ<emoji=heart04>\u3000すごっ、すごいの、おっきくてきもちいいの、ぞわぞわキテるっ……！\u3000ひぅ、うぅぅん<emoji=heart04>」"
translation = "「하앗, 하ー앗, 하우우웅읏<emoji=heart04> 굉장, 굉장해, 크고 기분 좋은 거, 오싹오싹 오고 있어읏……! 히우, 우우우웅<emoji=heart04>」"

[[dialogue]]
speaker = "美鶴"
original = "「このままぁ、膣内にぃっ……中出しぃ、中出ししへぇ……<emoji=heart04>」"
translation = "「이대로오, 질 속에에읏…… 안에 싸아, 안에 싸아줘어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "中出しをねだる美鶴の女性器が、ペニスに絡みついてくる。"
translation = "안에 싸달라고 조르는 미츠루의 여성기가, 페니스에 얽혀온다."

[[dialogue]]
speaker = "unk"
original = "どうすれば相手を昂ぶらせられるのか。俺が美鶴の体の弱点を知り尽くしているのと同じく、彼女の身体もまた俺の体を知り尽くしていた。"
translation = "어떻게 해야 상대를 흥분시킬 수 있을까. 내가 미츠루의 몸의 약점을 속속들이 알고 있는 것처럼, 그녀의 신체 또한 나의 몸을 속속들이 알고 있었다."

[[dialogue]]
speaker = "美鶴"
original = "「あぁっ、また、イキそっ、今度はおっきいのっ……<emoji=heart04>\u3000えっちな声っ、我慢できなくなっちゃうヤツぅ……<emoji=heart04>」"
translation = "「아아앗, 또, 갈 것 같아읏, 이번엔 큰 거읏……<emoji=heart04> 야한 목소리읏, 참을 수 없게 되는 거어……<emoji=heart04>」"

[[dialogue]]
speaker = "美鶴"
original = "「先にイクの、やだぁ……<emoji=heart04>\u3000我慢、するからっ……んっ、はぁ、あ、あっ、いっしょ、いっしょがいいっ……いっしょに、きもちいいとこ、イこぉ……<emoji=heart04>」"
translation = "「먼저 가는 거, 싫어아……<emoji=heart04> 참을, 거니까읏…… 응읏, 하아, 아, 앗, 같이, 같이가 좋아읏…… 같이, 기분 좋은 곳, 가자아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ここが外ということも、学園の敷地内ということも忘れ、美鶴の熱い膣肉を貪ることだけに集中する。"
translation = "여기가 바깥이라는 것도, 학원 부지 내라는 것도 잊고, 미츠루의 뜨거운 질 근육을 탐하는 것에만 집중한다."

[[dialogue]]
speaker = "クロト"
original = "「ぐっ……出る……出すぞ、美鶴っ……！」"
translation = "「크윽…… 나온다…… 쌀 거야, 미츠루……!」"

[[dialogue]]
speaker = "unk"
original = "熱気と寒気が同時に這い上がってくるような射精の感覚。"
translation = "열기와 한기가 동시에 기어 올라오는 듯한 사정의 감각."

[[dialogue]]
speaker = "unk"
original = "もう抑えられないところまで込み上げてきている。あと数往復足らずで、美鶴の膣内に子種をぶちまける。"
translation = "더 이상 억누를 수 없는 곳까지 치밀어 오르고 있다. 앞으로 몇 번의 왕복도 남지 않아, 미츠루의 질 안에 씨앗을 쏟아붓는다."

[[dialogue]]
speaker = "美鶴"
original = "「いいよ、いいよっ、そのままぁ……おち○ぽ、うちの膣内でイッて……せーし、ちょうだぁいっ<emoji=heart04>」"
translation = "「좋아, 좋아앗, 그대~로…… 자지, 내 질 안에서 가버려…… 정액, 줘어어<emoji=heart04>」"

[[dialogue]]
speaker = "美鶴"
original = "「なかぁ……中がいいのぉっ……！\u3000おま○こに、せーしぃっ……びゅーびゅーびゅーって……<emoji=heart04>」"
translation = "「안에…… 안이 좋아앗……! 보지에, 정액…… 쮸욱쮸욱쮸욱 하고……<emoji=heart04>」"

[[dialogue]]
speaker = "美鶴"
original = "「んぅ、ふぁ、んぅ、ひぐぅううぅっ<emoji=heart04>\u3000出して、出してっ、このままっ<emoji=heart04>\u3000キンタマにいっぱい溜まってるせーし、ぜんぶちょうだぁいっ……<emoji=heart04>」"
translation = "「응으, 하, 응으, 흐윽으으으윽<emoji=heart04> 싸줘, 싸줘엇, 이대로<emoji=heart04> 불알에 잔뜩 고여 있는 정액, 전부 줘어어……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「くっ……好きだっ、美鶴ぅ……！」"
translation = "「크윽…… 사랑한다앗, 미츠루으……!」"

[[dialogue]]
speaker = "美鶴"
original = "「んぅっ<emoji=heart04>\u3000うちもっ、好きっ<emoji=heart04>\u3000会長さん好き好きだぁい好きっ……<emoji=heart04>\u3000うちを、ママにしてっ……<emoji=heart04>」"
translation = "「응읏<emoji=heart04> 나도옷, 좋아해앳<emoji=heart04> 회장군 좋아 좋아 너어무 좋아해앳……<emoji=heart04> 나를, 엄마로 만들어줘엇……<emoji=heart04>」"

[[dialogue]]
speaker = "美鶴"
original = "「んんぅ、しゅきっ、しゅきっ、だぁいしゅきっ<emoji=heart04>\u3000んぅっ<emoji=heart04>\u3000イクッ、イッく──<emoji=heart04>」"
translation = "「응으으, 좋아, 좋아, 너어무 좋아해앳<emoji=heart04> 응읏<emoji=heart04> 간다앗, 가아──<emoji=heart04>」"

[[dialogue]]
speaker = "美鶴"
original = "「んぃいぃぃっ<emoji=heart04>\u3000イクッ、イクイクイクイク──」"
translation = "「응이이이잇<emoji=heart04> 간다앗, 가 가 가 가──」"

[[dialogue]]
speaker = "美鶴"
original = "「ッんくぅううぅううぅぅぅんっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「읏응으으으으으으으으응읏<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "美鶴"
original = "「んんんぅううぅっ！？\u3000んぃっ、ひぅうぅ<emoji=heart04>\u3000ひぅくっ、んっ、ふっ、んぃっ、はふっ、ぅうぅうぅぅんっ<emoji=heart04><emoji=heart04>」"
translation = "「응으으으으읏!? 응잇, 흐으으으<emoji=heart04> 흐윽, 응읏, 훗, 응잇, 하흑, 으으으으으으응읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "美鶴の腰を引き寄せて、ペニスを奥深くに突き刺したのと同時、決壊したような猛烈な射精が始まる。"
translation = "미츠루의 허리를 끌어당겨, 페니스를 깊숙이 찔러 넣는 것과 동시에, 둑이 터진 듯한 맹렬한 사정이 시작된다."

[[dialogue]]
speaker = "美鶴"
original = "「はぅんっ！？\u3000びゅーっ、びゅーっ、びゅーっ……<emoji=heart04>\u3000んぃひっ、はっ、はっ、んぁあぁっ<emoji=heart04>」"
translation = "「하우읏!? 쮸욱, 쮸욱, 쮸욱……<emoji=heart04> 응이힛, 핫, 핫, 으아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "美鶴"
original = "「たっぷりせーし、子宮っ、んんっ<emoji=heart04>\u3000流れ込んできてるぅ……<emoji=heart04>」"
translation = "「잔뜩 정액이, 자궁에엣, 응응읏<emoji=heart04> 흘러 들어오고 있어어……<emoji=heart04>」"

[[dialogue]]
speaker = "美鶴"
original = "「アッツぅいの……いっぱい、いっぱい……うちの中に入って、きてっ……<emoji=heart04>\u3000本気で、赤ちゃん作ろうとしちゃってるぅ……<emoji=heart04>」"
translation = "「뜨거어어…… 잔뜩, 잔뜩…… 내 안에 들어와, 줘엇……<emoji=heart04> 진심으로, 아기 만들려고 하고 있어어……<emoji=heart04>」"

[[dialogue]]
speaker = "美鶴"
original = "「ん……ぎゅーって抱きしめてっ、せーし逃げないように……おち○ぽ押し付けてっ……<emoji=heart04>」"
translation = "「응…… 꽉 안아줘엇, 정액 도망가지 않도록…… 자지 밀어붙여서엇……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "数日間、睾丸に溜め込まれていた濃厚な精液は、脈打つ度、次々と美鶴の胎内へと注がれた。"
translation = "며칠 동안 고환에 모여 있던 농후한 정액은, 박동할 때마다, 연달아 미츠루의 태내로 쏟아졌다."

[[dialogue]]
speaker = "美鶴"
original = "「んく、ぅ、うぅぅっ<emoji=heart04>\u3000まだ、ずーっとびくびく、してるぅ……これって、何日分……？\u3000うちの膣内に、出し切っちゃっていいからね……ふふ<emoji=heart04>」"
translation = "「응윽, 으, 으으으읏<emoji=heart04> 아직도, 계속 움찔움찔, 하고 있어어…… 이거, 며칠 분이야……? 내 질 안에, 다 싸버려도 돼…… 후후<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "睾丸に詰まっていた全ての精子を出し切るまで──美鶴と俺の性器が溶け合って、くっついてしまったのかと錯覚するほどに密着し続けた。"
translation = "고환에 차 있던 모든 정자를 다 쏟아낼 때까지── 미츠루와 나의 성기가 녹아 합쳐져 버린 것이 아닌가 착각할 정도로 밀착을 계속했다."

[[dialogue]]
speaker = "美鶴"
original = "「えへ……うちのおま○こ、会長さんのモノにされちゃった……<emoji=heart04>」"
translation = "「에헤…… 내 보지, 회장군의 것으로 돼버렸어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "出し切って満足したペニスを、美鶴の膣内からゆっくりと引き抜く。"
translation = "다 싸고 만족한 페니스를, 미츠루의 질 안에서 천천히 빼낸다."

[[dialogue]]
speaker = "美鶴"
original = "「んぅふぅうぅっ……<emoji=heart04>\u3000おま○こ、引っ張られるぅ……<emoji=heart04>」"
translation = "「응으흐으으읏……<emoji=heart04> 보지, 당겨져어……<emoji=heart04>」"

[[dialogue]]
speaker = "美鶴"
original = "「んんんっ！？」"
translation = "「응으으으읏!?」"

[[dialogue]]
speaker = "unk"
original = "萎えかけのペニスが美鶴の膣口から抜け出ると、白濁が美鶴の膣穴から溢れ、地面に垂れる。"
translation = "시들기 시작한 페니스가 미츠루의 질 입구에서 빠져나오자, 백탁액이 미츠루의 질 구멍에서 넘쳐흘러, 땅에 떨어진다."

[[dialogue]]
speaker = "美鶴"
original = "「んぁあぁ……すごぉ、濃くてドロドロしたのがぼたぼた垂れてる……うちのおま○こ、そんなにきもちかった？」"
translation = "「으아아아…… 대단해, 진하고 걸쭉한 게 뚝뚝 떨어지고 있어…… 내 보지, 그렇게 기분 좋았어?」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、最高だったよ。はぁ……競技より疲れたかも」"
translation = "「아아, 최고였어. 하아…… 경기보다 피곤할지도」"

[[dialogue]]
speaker = "美鶴"
original = "「ふふ、めちゃ腰振ってたもんね。２人してこんなに汗かいてたら、休み時間に何してたかバレバレじゃんね」"
translation = "「후후, 엄청 허리 흔들었잖아. 둘이서 이렇게 땀 흘렸으면, 쉬는 시간에 뭐 했는지 들통나겠네」"

[[dialogue]]
speaker = "美鶴"
original = "「あ、ヤバ。うちも足腰立たなそ……ちゃんと次の競技の応援やれるかな」"
translation = "「아, 위험해. 나도 다리에 힘이 안 들어갈 것 같아…… 다음 경기 응원 제대로 할 수 있을까」"

[[dialogue]]
speaker = "クロト"
original = "「少し教室で休憩しようか」"
translation = "「잠깐 교실에서 쉬자」"

[[dialogue]]
speaker = "美鶴"
original = "「そだねー。教室でもう１回、シちゃう？」"
translation = "「그렇네ー. 교실에서 한 번 더, 할까?」"

[[dialogue]]
speaker = "クロト"
original = "「それは……さすがにやめておこう。魅力的だけど」"
translation = "「그건…… 아무리 그래도 그만두자. 매력적이긴 하지만」"

[[dialogue]]
speaker = "美鶴"
original = "「あは、ジョーダンだってば。んじゃ、会長さん、教室まで連れてって<emoji=heart04>」"
translation = "「아하, 농담이라니까. 그럼, 회장군, 교실까지 데려다줘<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は美鶴をお姫様抱っこで抱えて、教室に向かった。"
translation = "나는 미츠루를 공주님 안기로 안고, 교실로 향했다."

[[dialogue]]
speaker = "美鶴"
original = "「えへー、会長さんのお姫様抱っこー<emoji=heart04>」"
translation = "「에헤ー, 회장군의 공주님 안기ー<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その時の俺たちの様子は、傍目からはどう見ても、愛し合うカップルのそれだったという。"
translation = "그때의 우리 모습은, 곁에서 보기에는 아무리 봐도, 사랑하는 커플의 그것이었다고 한다."

