[[dialogue]]
speaker = "unk"
original = "第４話,ベアトリスの願い,P"
translation = "제4화, 베아트리스의 소원, P"

[[dialogue]]
speaker = "ベアトリス"
original = "「ん～～～……気持ちいい～……っ」"
translation = "「음~~~…… 기분 좋아~……」"

[[dialogue]]
speaker = "unk"
original = "教皇庁前の広場で、両手を羽のように広げて光を浴びるベアトリス。"
translation = "교황청 앞 광장에서, 양손을 날개처럼 펼치고 빛을 쬐는 베아트리스."

[[dialogue]]
speaker = "unk"
original = "ベアトリスは本来、日光が苦手な吸血鬼だが……"
translation = "베아트리스는 본래 햇빛을 싫어하는 흡혈귀지만……"

[[dialogue]]
speaker = "ベアトリス"
original = "「あ、こんにちは、会長さん。私は見ての通り、日光浴中です」"
translation = "「아, 안녕하세요, 회장님. 저는 보시다시피 일광욕 중이에요」"

[[dialogue]]
speaker = "ベアトリス"
original = "「星力がある間は平気ですから、今のうちに光を浴びておかないと。流星市国にいる間に、一生分日向ぼっこするつもりです」"
translation = "「성력이 있는 동안은 괜찮으니까, 지금 이 기회에 빛을 쬐어둬야죠. 유성시국에 있는 동안 평생 치 일광욕을 할 생각이에요」"

[[dialogue]]
speaker = "ベアトリス"
original = "「私はデイマスターじゃないけど、星力がある間は日光も大丈夫なんです。逆に言えば星力がないとダメなんですけど」"
translation = "「저는 데이 마스터는 아니지만, 성력이 있는 동안은 햇빛도 괜찮거든요. 반대로 말하면 성력이 없으면 안 되지만요」"

[[dialogue]]
speaker = "ベアトリス"
original = "「なので、星騎士じゃなくなったら故郷の洞窟に帰るつもりです」"
translation = "「그래서 성기사가 아니게 되면 고향의 동굴로 돌아갈 생각이에요」"

[[dialogue]]
speaker = "ベアトリス"
original = "「でも時間は限られてますから。食事を楽しまなきゃ人生損ですっ」"
translation = "「하지만 시간은 한정되어 있으니까요. 식사를 즐기지 않으면 인생 손해예요」"

[[dialogue]]
speaker = "ベアトリス"
original = "「……ん？\u3000どうしたんですか、会長さん。ちょっと顔が険しいですよ」"
translation = "「……응? 왜 그러세요, 회장님. 좀 표정이 험악하신데요」"

[[dialogue]]
speaker = "ベアトリス"
original = "「はっ──もしかして匂いますか！？\u3000またニンニク入れすぎました！？」"
translation = "「핫── 혹시 냄새나나요!? 또 마늘을 너무 많이 넣었나요!?」"

[[dialogue]]
speaker = "unk"
original = "ベアトリスってあとどれだけ星力が持つの？"
translation = "베아트리스는 앞으로 성력이 얼마나 버텨줘?"

[[dialogue]]
speaker = "ベアトリス"
original = "「え？\u3000そうですねー……吸血鬼は寿命の長い種族ですから、人間や他の魔族よりは持つかもしれません」"
translation = "「에? 글쎄요~…… 흡혈귀는 수명이 긴 종족이니까, 인간이나 다른 마족보다는 오래갈지도 몰라요」"

[[dialogue]]
speaker = "ベアトリス"
original = "「でも私の感覚だと、持ってあと数年だと思います。その前にリクリエを何とかして、世界を平和にしましょう！」"
translation = "「하지만 제 감각으로는 버텨봤자 앞으로 몇 년이라고 생각해요. 그전에 리크리에를 어떻게든 해서 세계를 평화롭게 만들어요!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「……おや？\u3000あの子、不安そうにキョロキョロして……迷子でしょうか？\u3000ちょっと行ってきます！」"
translation = "「……어라? 저 아이, 불안한 듯이 두리번거리며…… 미아일까요? 잠깐 다녀올게요!」"

[[dialogue]]
speaker = "unk"
original = "その後、ベアトリスは迷子の母親を見つけたり、礼拝に来た人の道案内をしたりと、忙がしく動いていたのだった。"
translation = "그 후, 베아트리스는 미아의 어머니를 찾아주거나, 예배하러 온 사람의 길 안내를 하는 등 바쁘게 움직였다."

[[dialogue]]
speaker = "ベアトリス"
original = "「ふぅ……一仕事した気分です。みなさん笑顔になってくれて、お礼もたくさんもらっちゃいました」"
translation = "「후우…… 한바탕 일한 기분이에요. 다들 웃어주시고, 감사 인사도 잔뜩 받았어요」"

[[dialogue]]
speaker = "unk"
original = "ベアトリスは優しいな"
translation = "베아트리스는 착하구나"

[[dialogue]]
speaker = "ベアトリス"
original = "「そうですかね？\u3000そう言ってもらえて、悪い気はしませんけど」"
translation = "「그런가요? 그렇게 말씀해 주시니 기분은 나쁘지 않네요」"

[[dialogue]]
speaker = "unk"
original = "でももっと自分のために時間を使ってもいい"
translation = "하지만 좀 더 자신을 위해 시간을 써도 돼"

[[dialogue]]
speaker = "ベアトリス"
original = "「自分のために……？\u3000どういう意味です……？」"
translation = "「자신을 위해……? 무슨 뜻이에요……?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「私が流星市国にいられる時間は限られてるから……？\u3000あ～……なるほど、そういう意味ですか」"
translation = "「제가 유성시국에 있을 수 있는 시간은 한정되어 있으니까……? 아~…… 과연, 그런 뜻인가요」"

[[dialogue]]
speaker = "ベアトリス"
original = "「私のこと考えてくれてありがとうございます、会長さん。でも私、別に自分を犠牲にしてるつもりなんかなくて」"
translation = "「저를 생각해주셔서 감사해요, 회장님. 하지만 저, 딱히 자신을 희생하고 있다는 생각 같은 건 없어서요」"

[[dialogue]]
speaker = "ベアトリス"
original = "「人助けだって、私がやりたくてやってることですよ。十分自分のために時間を使ってます」"
translation = "「남을 돕는 것도 제가 하고 싶어서 하는 일이에요. 충분히 자신을 위해 시간을 쓰고 있어요」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ん～……会長さんとはそれなりに仲良くなったと思うんで、昔語りしていいですかね？」"
translation = "「음~…… 회장님과는 나름대로 친해졌다고 생각하니까, 옛날이야기 좀 해도 될까요?」"

[[dialogue]]
speaker = "unk"
original = "俺も聞きたい"
translation = "나도 듣고 싶어"

[[dialogue]]
speaker = "ベアトリス"
original = "「じゃあ……話しちゃいますね」"
translation = "「그럼…… 이야기할게요」"

[[dialogue]]
speaker = "ベアトリス"
original = "「前も言った通り、私は吸血鬼で、私たちの一族は魔界の大きな洞窟の中に住んでいます」"
translation = "「전에도 말했듯이 저는 흡혈귀고, 저희 일족은 마계의 커다란 동굴 속에 살고 있어요」"

[[dialogue]]
speaker = "ベアトリス"
original = "「吸血鬼は日に弱いという弱点はありますが、体が頑丈で、非常に高い再生力を持っています」"
translation = "「흡혈귀는 햇빛에 약하다는 약점은 있지만, 몸이 튼튼하고 매우 높은 재생력을 가지고 있어요」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ですが何事にも例外はあるもので……私は昔は病弱で、いつも寝込んでばかりいました」"
translation = "「하지만 모든 일에는 예외가 있는 법이라…… 저는 옛날에 병약해서 맨날 누워만 있었어요」"

[[dialogue]]
speaker = "ベアトリス"
original = "「吸血鬼って基本的に丈夫だから、本当に珍しいんですよ、私みたいなの。だから一族の中でも落ちこぼれというか、出来損ないみたいな扱いでした」"
translation = "「흡혈귀는 기본적으로 튼튼하니까 저 같은 경우는 정말 드물거든요. 그래서 일족 중에서도 낙오자랄까, 낙오품 같은 취급이었어요」"

[[dialogue]]
speaker = "ベアトリス"
original = "「私の一族はみんな強いから、弱い者には厳しくて。私が寝込んでいると、視線が冷たいというか、早く死なないかなーみたいな感じで」"
translation = "「저희 일족은 다들 강하니까 약한 자에게는 엄격해서. 제가 누워 있으면 시선이 차갑달까, 빨리 안 죽나~ 하는 느낌으로」"

[[dialogue]]
speaker = "ベアトリス"
original = "「寝込んでいる時に、放置されることもありました。その時は運良く旅の方がやってきてくれて、もらったお薬のおかげで治りましたけど」"
translation = "「누워 있을 때 방치된 적도 있었어요. 그때는 운 좋게 여행자분이 오셔서 주신 약 덕분에 나았지만요」"

[[dialogue]]
speaker = "ベアトリス"
original = "「しぶとく生き延びて、大きくなったら体も丈夫になって、星力に目覚めて。それから私は流星市国に来て、星騎士になりました」"
translation = "「끈질기게 살아남아서 커지니까 몸도 튼튼해지고 성력에 눈을 떴죠. 그러고 나서 저는 유성시국에 와서 성기사가 되었어요」"

[[dialogue]]
speaker = "ベアトリス"
original = "「一族の中で、私は切り捨てられる側でした。弱い方でした」"
translation = "「일족 중에서 저는 버려지는 쪽이었어요. 약한 쪽이었죠」"

[[dialogue]]
speaker = "ベアトリス"
original = "「だから私は誰も切り捨てたくない、見捨てたくないんです」"
translation = "「그러니까 저는 누구도 쳐내고 싶지 않고, 저버리고 싶지 않아요」"

[[dialogue]]
speaker = "ベアトリス"
original = "「私みたいに弱い人も、私とは全然違う強い人も、み～んな幸せでいてほしいんです」"
translation = "「저처럼 약한 사람도, 저와는 전혀 다른 강한 사람도, 모~두 행복했으면 좋겠어요」"

[[dialogue]]
speaker = "ベアトリス"
original = "「なので、会長さんは優しいって言ってくれましたけど、これは優しさじゃなくて、私のわがままなんです」"
translation = "「그래서, 회장님은 상냥하다고 말씀해 주셨지만, 이건 상냥함이 아니라 제 고집이에요」"

[[dialogue]]
speaker = "unk"
original = "やっぱりベアトリスは優しいよ"
translation = "역시 베아트리스는 상냥해"

[[dialogue]]
speaker = "ベアトリス"
original = "「もう、違うって言ってるのに……でも会長さんにそう言ってもらえると嬉しいです」"
translation = "「정말, 아니라고 말했는데…… 하지만 회장님이 그렇게 말씀해 주시니 기뻐요」"

[[dialogue]]
speaker = "ベアトリス"
original = "「こんなこと言うと笑われるかもしれませんけど……私は世界の全ての人々を守りたいと思っています」"
translation = "「이런 말을 하면 비웃음을 살지도 모르겠지만…… 저는 세상의 모든 사람들을 지키고 싶다고 생각해요」"

[[dialogue]]
speaker = "ベアトリス"
original = "「魔界も、人間界も、天界も……もっと広い世界も守りたいんです。私を優しいと言ってくれた会長さんなら、きっとわかってくれると思います」"
translation = "「마계도, 인간계도, 천계도…… 더 넓은 세상도 지키고 싶어요. 저를 상냥하다고 말해준 회장님이라면, 분명 알아주실 거라 믿어요」"

[[dialogue]]
speaker = "ベアトリス"
original = "「欲張りでも、我がままでも、全部ぜ～んぶ守れるように、一緒に頑張りましょう！」"
translation = "「욕심쟁이라도, 고집불통이라도, 전부 전~부 지킬 수 있도록 함께 노력해요!」"

[[dialogue]]
speaker = "unk"
original = "後日──"
translation = "며칠 뒤──"

[[dialogue]]
speaker = "ダークキングフワッチ"
original = "「イ～～～……」"
translation = "「이~~~……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「お疲れ様でした、会長さん。さすがお強いですね」"
translation = "「수고하셨어요, 회장님. 역시 강하시네요」"

[[dialogue]]
speaker = "ベアトリス"
original = "「あ、会長さん、ちょっと血が出てます。さっきの戦いで少し切っちゃいました？」"
translation = "「아, 회장님, 피가 조금 나고 있어요. 아까 전투에서 살짝 베였나요?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「──ッ！？」"
translation = "「──윽!?」"

[[dialogue]]
speaker = "unk"
original = "大丈夫？\u3000何かあった？"
translation = "괜찮아? 무슨 일 있어?"

[[dialogue]]
speaker = "ベアトリス"
original = "「吸血鬼は嗅覚が鋭いって言いましたよね？\u3000だからその……血の匂いにも敏感で……」"
translation = "「흡혈귀는 후각이 날카롭다고 말했었죠? 그러니까 그…… 피 냄새에도 민감해서……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「……ゴクリ」"
translation = "「……꿀꺽」"

[[dialogue]]
speaker = "ベアトリス"
original = "「やっぱりエッチですぅ～～～～～っ！！」"
translation = "「역시 에치해요~~~~~!」"

[[dialogue]]
speaker = "梨緒"
original = "「どうしたベアト！\u3000魔王に何かされたのか！？」"
translation = "「어떻게 된 거냐 베아트! 마왕에게 무슨 짓이라도 당한 거냐!?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「いややや、あの──違うんですぅ～～～～～～っ！！！」"
translation = "「아냐아냐아냐, 저기── 그게 아니에요~~~~~~!!!」"

[[dialogue]]
speaker = "unk"
original = "駆けつけてきた梨緒に勘違いされて、誤解を解くのが大変だったのだった──"
translation = "달려온 리오에게 착각을 사서, 오해를 푸느라 무척 고생했다──"

