[[dialogue]]
speaker = "unk"
original = "第２話,可愛すぎる後輩,P"
translation = "제2화, 너무 귀여운 후배, P"

[[dialogue]]
speaker = "unk"
original = "２度目の告白から数週間が経ったある休日。俺はリーリアと２人で、リゾート結界へデートしに来ていた。"
translation = "두 번째 고백으로부터 몇 주가 지난 어느 휴일. 나는 리리아와 둘이서 리조트 결계로 데이트를 하러 왔다."

[[dialogue]]
speaker = "unk"
original = "ちなみに、星徒会室から繋がる、他に誰もいないプライベートビーチの方である。"
translation = "참고로 성도회실에서 이어지는, 다른 누구도 없는 프라이빗 비치 쪽이다."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ふふっ、今日は１日、２人きりですね……センパイ<emoji=heart04>」"
translation = "「후훗, 오늘은 하루 종일 둘뿐이네요…… 선배<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リーリアの水着、今日もすごく可愛いよ"
translation = "리리아 수영복, 오늘도 정말 귀여워."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「えへへ……ありがとうございます<emoji=heart04>」"
translation = "「에헤헤…… 감사합니다<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「でも本当は……私のスタイルがもっと良かったら、センパイの前でも堂々としていられたんですけど……」"
translation = "「하지만 사실은…… 제 몸매가 좀 더 좋았다면 선배 앞에서도 당당할 수 있었을 텐데……」"

[[dialogue]]
speaker = "unk"
original = "そう言って、上に着たＴシャツの裾をぐいっと掴むリーリア。"
translation = "그렇게 말하며 위에 입은 티셔츠 자락을 꾹 움켜쥐는 리리아."

[[dialogue]]
speaker = "unk"
original = "彼女には身体的コンプレックスがある。それは、バストの大きさだ。"
translation = "그녀에게는 신체적 콤플렉스가 있다. 그것은 가슴 크기다."

[[dialogue]]
speaker = "unk"
original = "Ｔシャツには幻影魔法がかけてあるそうで、本当は今確認できる見た目ほど、胸のサイズは大きくない。"
translation = "티셔츠에는 환영 마법이 걸려 있다고 하며, 사실은 지금 보이는 것만큼 가슴 사이즈가 크지 않다."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「――この前２度目の告白をしてから、今まで以上に気にしてるように見える？\u3000だって……」"
translation = "「――요전번에 두 번째 고백을 하고 나서, 전보다 더 신경 쓰는 것처럼 보여요? 그야……」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「センパイには、彼女として魅力的だと思ってもらいたいですから……」"
translation = "「선배에게는 여자친구로서 매력적이라고 생각되고 싶으니까요……」"

[[dialogue]]
speaker = "unk"
original = "１度も思ったことないぞ"
translation = "한 번도 그렇게 생각한 적 없어."

[[dialogue]]
speaker = "unk"
original = "俺は、リーリアのスタイルが悪いだなんて"
translation = "내가 리리아의 몸매가 나쁘다니."

[[dialogue]]
speaker = "unk"
original = "――今のままのリーリアが、心から可愛いと思ってる。だから、気にしなくていい。……いや、違う。"
translation = "――지금 그대로의 리리아가 진심으로 귀엽다고 생각해. 그러니까 신경 쓰지 않아도 돼. ……아니, 아냐."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「え……？」"
translation = "「어……?」"

[[dialogue]]
speaker = "unk"
original = "そのままで最高に可愛い！！"
translation = "그대로 최고로 귀여워!!"

[[dialogue]]
speaker = "unk"
original = "俺は今のリーリアの胸が好きだ！"
translation = "난 지금 리리아의 가슴이 좋아!"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「せ、センパイ……そんな堂々と……！？」"
translation = "「서, 선배…… 그렇게 당당하게……!?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「――言葉を選んでいるから、不安にさせちゃう？\u3000だから、はっきりと言うことにした？」"
translation = "「――말을 고르고 있으니까 불안하게 만드는 건가요? 그래서 확실하게 말하기로 한 거고요?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「なんですか……それ。ふふっ……でも――」"
translation = "「뭐예요…… 그게. 후훗…… 하지만――」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「えへへ<emoji=heart04>\u3000ありがとうございます、センパイ。嬉しいです……<emoji=heart04>」"
translation = "「에헤헤<emoji=heart04> 고마워요, 선배. 기뻐요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「センパイのそういうストレートにぶつかって来るところ、男らしくてカッコよくて……私、大好きです<emoji=heart04>」"
translation = "「선배의 그런 스트레이트로 부딪쳐 오는 점, 남자답고 멋있어서…… 저, 정말 좋아해요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "彼女の紅潮した頬と潤んだ瞳に、俺は思わず、ドキッとしてしまう。"
translation = "그녀의 붉어진 뺨과 촉촉한 눈동자에 나는 나도 모르게 가슴이 두근거리고 만다."

[[dialogue]]
speaker = "unk"
original = "素直に言うようになったよね。そういうこと"
translation = "솔직하게 말하게 됐네. 그런 거."

[[dialogue]]
speaker = "unk"
original = "リーリアもストレートに……"
translation = "리리아도 스트레이트로……"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ふふっ、これからはセンパイに自分のことを秘密にしないようにって、決めたので♪」"
translation = "「후훗, 이제부터는 선배에게 자신에 대해 비밀로 하지 않기로 정했으니까요♪」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「気を取り直して、センパイ、海デートの定番――カップル追いかけっこをしましょう☆」"
translation = "「기분 전환해서, 선배, 바다 데이트의 정석―― 커플 추격전을 해요☆」"

[[dialogue]]
speaker = "unk"
original = "か、カップル追いかけっこ……！？"
translation = "커, 커플 추격전……!?"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「砂浜を走りながら～、私を捕まえて～♪\u3000待て待て～♪\u3000きゃっきゃうふふ<emoji=heart04>\u3000――なやつです☆\u3000前から１度やってみたかったんですよね～♪」"
translation = "「백사장을 달리면서～ 저를 잡아보세요～♪ 나 잡아봐라～♪ 꺄르르 우후후<emoji=heart04> ――같은 거예요☆ 전부터 꼭 한번 해보고 싶었거든요～♪」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ちなみに、センパイが見事、私を捕まえたら、ご褒美をあげちゃいます♪」"
translation = "「참고로 선배가 멋지게 저를 잡으시면 보상을 드릴게요♪」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「……あっ♪\u3000ご褒美が何なのか気になっちゃう感じですか～？\u3000ふふふっ……そ・れ・は～」"
translation = "「……앗♪ 보상이 뭔지 궁금해진 건가요～? 후후후…… 그·건～」"

[[dialogue]]
speaker = "unk"
original = "彼女は俺に顔を近づけると、そっと耳元で囁く。"
translation = "그녀는 나에게 얼굴을 가까이 대고 살며시 귓가에 속삭인다."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「もちろん、恋人同士の……甘～い行為ですよ？」"
translation = "「물론 연인 사이의…… 달콤～한 행위예요?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「はい、センパイ<emoji=heart04>\u3000あ～ん<emoji=heart04>」"
translation = "「자요, 선배<emoji=heart04> 아～앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言いながら、彼女は俺の口元に箸を差し出して、手作りのお弁当を食べさせてくれる。"
translation = "그렇게 말하며 그녀는 내 입가에 젓가락을 내밀어 직접 만든 도시락을 먹여준다."

[[dialogue]]
speaker = "unk"
original = "な、なるほど。これがご褒美か……あ～ん"
translation = "그, 그렇군. 이게 보상인가…… 아～앙."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「どうですか？\u3000一応、保存魔法がかけてあって、作りたての味だとは思うんですけど……」"
translation = "「어때요? 일단 보존 마법을 걸어둬서 갓 만든 맛일 거라고 생각하는데……」"

[[dialogue]]
speaker = "unk"
original = "うまい！\u3000リーリアは料理も上手なんだな！"
translation = "맛있어! 리리아는 요리도 잘하는구나!"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「本当ですか？\u3000やった♪\u3000センパイに喜んでもらえて嬉しいです……えへへ<emoji=heart04>」"
translation = "「정말인가요? 야호♪ 선배가 기뻐해 주셔서 다행이에요…… 에헤헤<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「今日の為に、練習した甲斐がありました。たくさん食べて下さいね、センパイ♪」"
translation = "「오늘을 위해 연습한 보람이 있네요. 많이 드세요, 선배♪」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「はい、あ～ん<emoji=heart04>」"
translation = "「자, 아～앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それから海で水遊びもして、少し休憩しようという話になった。"
translation = "그 뒤로 바다에서 물놀이도 하고 잠시 쉬기로 했다."

[[dialogue]]
speaker = "unk"
original = "リーリアはビーチチェアーをくっ付けて、俺の腕に抱き着きながら寝っ転がる。"
translation = "리리아는 비치 체어를 붙여놓고 내 팔에 매달리며 누워 있다."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ねぇ……センパイ<emoji=heart04>」"
translation = "「저기…… 선배<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "彼女の潤んだ瞳と、甘えるような声に、俺はまたドキッとしてしまう。"
translation = "그녀의 촉촉한 눈동자와 어리광 부리는 듯한 목소리에 나는 다시 가슴이 두근거린다."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「カップル追いかけっこの時なんですけど……本当は――」"
translation = "「커플 추격전 때 말인데요…… 사실은――」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ご褒美、別のことを期待してたんじゃないですか……？」"
translation = "「보상, 다른 걸 기대하고 있었던 거 아니에요……?」"

[[dialogue]]
speaker = "unk"
original = "そ、それは……"
translation = "그, 그건……"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「センパイ、大好きです……<emoji=heart04>」"
translation = "「선배, 정말 좋아해요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はドキドキしながら、頷いて――"
translation = "나는 두근거리며 고개를 끄덕이고――"

[[dialogue]]
speaker = "unk"
original = "俺も……好きだよ"
translation = "나도…… 좋아해."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「愛してます……<emoji=heart04>」"
translation = "「사랑해요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「だから、センパイ……デザートにリーリアをどうぞ<emoji=heart04>」"
translation = "「그러니까 선배…… 디저트로 리리아를 드세요<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ん……<emoji=heart04>」"
translation = "「응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "彼女はそっと唇を近づけて、キスのおねだりをしてくる。俺はドキドキが限界に達して――"
translation = "그녀는 살며시 입술을 가까이 대며 키스를 조른다. 나는 두근거림이 한계에 달해――"

[[dialogue]]
speaker = "unk"
original = "っ……！\u3000ち、ちょっと泳いでくる～～っ！"
translation = "윽……! 자, 잠깐 수영하고 올게～～! "

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「へ！？\u3000えっ……ちょっと、センパ～イ！？」"
translation = "「헤!? 엣…… 잠깐만요, 선배～!?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「い、今すごくいい雰囲気だったはずなのに……どういうこと～！？」"
translation = "「지, 지금 엄청 분위기 좋았을 텐데…… 어떻게 된 거예요～!?」"

[[dialogue]]
speaker = "unk"
original = "俺は海の家の近くまで走ってきていた。"
translation = "나는 바다의 집 근처까지 달려와 있었다."

[[dialogue]]
speaker = "unk"
original = "あ、危なかった……"
translation = "위, 위험했다……"

[[dialogue]]
speaker = "unk"
original = "ここ最近、２度目の告白があってから――"
translation = "최근 들어 두 번째 고백이 있고 나서부터――"

[[dialogue]]
speaker = "unk"
original = "素直になったリーリアが可愛い過ぎて、俺は時々、好きという気持ちが暴走しかけていた。"
translation = "솔직해진 리리아가 너무 귀여워서 나는 가끔 좋아한다는 마음이 폭주할 뻔했다."

[[dialogue]]
speaker = "unk"
original = "先程、あのままキスをしていたら……俺はおそらく、それだけでは済まなくなっていただろう。"
translation = "방금 전 그 상태로 키스를 했다면…… 나는 아마 그것만으로는 끝나지 않았을 것이다."

[[dialogue]]
speaker = "unk"
original = "――せっかくリーリアが素直に好意を見せてくれるようになったのだ。"
translation = "――모처럼 리리아가 솔직하게 호의를 보여주게 되었다."

[[dialogue]]
speaker = "unk"
original = "だから……これからはもっと、彼女のことを大切にしたい。"
translation = "그러니까…… 앞으로는 더욱 그녀를 소중히 여기고 싶다."

[[dialogue]]
speaker = "unk"
original = "俺は近くの海に入りながら、頭を冷やすのだった――"
translation = "나는 근처 바다에 들어가 머리를 식히는 것이었다――"

