[[dialogue]]
speaker = "unk"
original = "第４話,蝕む絶望,B"
translation = "제4화, 좀먹는 절망"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
original = "「抵抗しても無意味だと……なぜわからないのかしら」"
translation = "「저항해도 무의미하다고…… 어째서 깨닫지 못하는 걸까」"

[[dialogue]]
speaker = "フィオナ（魔王）"
original = "「ホロウ・ルヴィネ──あなたがどれほどの力を秘めていようと！\u3000私たちに屈するという選択肢はないんです！」"
translation = "「호로우 루비네── 당신이 아무리 강력한 힘을 숨기고 있다 한들! 우리에게 굴복한다는 선택지는 없습니다!」"

[[dialogue]]
speaker = "アポロ"
original = "「あたしたちの未来は、あたしたちが決めるんだ！！」"
translation = "「우리들의 미래는 우리가 결정한다!!」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
original = "「ぶっ飛びなさい──ディバインスーパーノヴァ！！」"
translation = "「날아가 버려라── 디바인 슈퍼노바!!」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
original = "「くぅっ──！？」"
translation = "「크윽──!?」"

[[dialogue]]
speaker = "unk"
original = "フィオナ達双子の連携で生まれた隙にヴィーナスが大技を合わせた──手ごたえ、ありだ！"
translation = "피오나 일행 쌍둥이의 연계로 생겨난 틈을 타 빈유스가 큰 기술을 적중시켰다── 확실히 먹혀들어 갔다!"

[[dialogue]]
speaker = "煌嶺"
original = "「どれ。先の厄災では惜しいことをした──代わりに貴様を、妾のものにしてやろう！」"
translation = "「어디 보자. 지난 재해 때는 아쉬운 짓을 했지── 대신에 네놈을 소첩의 것으로 만들어 주마!」"

[[dialogue]]
speaker = "unk"
original = "煌嶺の九尾が、包んだ対象を傀儡とする火球を出現させ──ホロウを呑みこみにかかる。"
translation = "코레이의 구미가 상대를 가두어 꼭두각시로 만드는 화염구를 출현시켜 호로우를 집어삼키려 한다."

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
original = "「──許しがたい。私を使役するのはお父様をおいて他にいない。一介の魔族が踏み入っていい領域ではないわ……！」"
translation = "「──용서할 수 없어. 나를 사역하는 것은 아버님 외에는 존재하지 않아. 일개 마족이 발을 들여놓아도 되는 영역이 아니다……!」"

[[dialogue]]
speaker = "煌嶺"
original = "「言っていろ。貴様はあの厄災と違い、自我が薄いようだ──クク、創造主の人形はどのような使い心地か！？」"
translation = "「말은 잘하는구나. 네놈은 그 재해와 달리 자아가 옅은 모양이군── 크크, 창조주의 인형은 어떤 손맛일지 궁금하구나!?」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
original = "「仕方がない。処分しましょう」"
translation = "「어쩔 수 없네. 처분하도록 하자」"

[[dialogue]]
speaker = "クロト"
original = "「なッ──！？」"
translation = "「뭐──!?」"

[[dialogue]]
speaker = "煌嶺"
original = "「……ほう。操られる前に、自裁するとはな」"
translation = "「……호오. 조종당하기 전에 스스로 목숨을 끊다니 말이다」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
original = "「ふふ……敵の傀儡に堕ちるくらいなら、<b>交換</b>するのが一番効率がいいもの……」"
translation = "「후후…… 적의 꼭두각시로 타락할 바에야 <b>교체</b>하는 것이 가장 효율적이니까……」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
original = "「さあ、来なさい──<b>新しいルヴィネ</b>」"
translation = "「자, 오렴── <b>새로운</b> <b>루비네</b>」"

[[dialogue]]
speaker = "アポロ"
original = "「嘘、だろ……！？」"
translation = "「거짓말이지……!?」"

[[dialogue]]
speaker = "unk"
original = "今、倒れ伏したホロウを追い込むだけでも、かなりの消耗を強いられたというのに。"
translation = "방금 쓰러진 호로우를 몰아붙이는 것만으로도 상당한 소모를 강요당했는데."

[[dialogue]]
speaker = "unk"
original = "新たに現れたホロウ・ルヴィネは、汗一つかいていない『新品』。"
translation = "새롭게 나타난 호로우 루비네는 땀 한 방울 흘리지 않은 『새것』이다."

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
original = "「２体目。役目を果たせなかったようね。不手際は死で償いなさい」"
translation = "「2호기. 역할을 완수하지 못한 모양이네. 불찰은 죽음으로 갚아라」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
original = "「ええ……あとは、新しい貴女に託すとするわ。転送装置を受け取って。出来損ないの私は、消えましょう……」"
translation = "「그래…… 나머지는 새로운 네게 맡기도록 할게. 전송 장치를 받아줘. 모자란 나는 사라질 테니……」"

[[dialogue]]
speaker = "unk"
original = "自傷によって深手を負ったホロウの身体が、光の粒となって塔の頂上に溶けていく……"
translation = "자해로 깊은 상처를 입은 호로우의 신체가 빛의 입자가 되어 탑 정상에 녹아 들어간다……"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
original = "「魔王たちに不覚を取ったのは度し難い。けれど有益な戦闘データを入手できたわね」"
translation = "「마왕 일행에게 덜미를 잡힌 것은 용납할 수 없지만, 유익한 전투 데이터를 입수했네」"

[[dialogue]]
speaker = "クロト"
original = "「お前は……お前たちは……どうしてそんなことができる？」"
translation = "「너는…… 너희들은…… 어떻게 그런 짓을 할 수 있지?」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
original = "「先だって伝えたはず、価値観が違うのよ。短い時を生きるヒトでは、私のお父様に対する無心の忠誠は理解できないわ」"
translation = "「아까도 말했을 텐데, 가치관이 다른 거라고. 짧은 시간을 살아가는 인간으로서는 나의 아버님을 향한 무조건적인 충성을 이해할 수 없어」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
original = "「魔王とその血統は脅威──特に煌嶺。貴女の能力と私は、ひどく相性が悪いようね」"
translation = "「마왕과 그 혈통은 위협── 특히 코레이. 당신의 능력과 나는 상성이 꽤 나쁜 모양이네」"

[[dialogue]]
speaker = "煌嶺"
original = "「虚ろという言葉に似合いの中身の無さだったな、ホロウよ。新しい貴様は、少しは期待してよいのか？」"
translation = "「공허하다는 말에 어울릴 정도로 알맹이가 없구나, 호로우여. 새로운 네놈은 조금은 기대해도 되겠느냐?」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
original = "「ええ。存分に<b>私たち</b>に期待して頂戴」"
translation = "「그래. 마음껏 <b>우리들</b>에게 기대해 주렴」"

[[dialogue]]
speaker = "unk"
original = "ホロウが転送装置を掲げると、空間に裂け目が生まれ──"
translation = "호로우가 전송 장치를 치켜들자 공간에 균열이 생겨나고──"

[[dialogue]]
speaker = "アポロ"
original = "「お、おいおいっ……！？」"
translation = "「어, 어이 어이……!?」"

[[dialogue]]
speaker = "煌嶺"
original = "「なるほど──木偶と呼ぶにふさわしい。確かに楽しめそうだ！」"
translation = "「과연── 나무인형이라 부르기에 걸맞구나. 확실히 즐길 수 있겠어!」"

[[dialogue]]
speaker = "フィオナ（魔王）"
original = "「１体１体の霊力も、先ほどのホロウよりずっと高い……！？」"
translation = "「개개인의 영력도 방금 전의 호로우보다 훨씬 높아……!?」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
original = "「は、反則じゃないの！？\u3000恥ずかしくないわけ、あんた！」"
translation = "「이, 이건 반칙이잖아!? 부끄럽지도 않은 거냐고, 너!」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
original = "「恥など覚えるわけがないわ。与えられた役割のために全霊を尽くす──それこそ私の誉れであり、生まれてきた意味なのだから」"
translation = "「부끄러움 따위를 느낄 리가 없잖아. 부여받은 역할을 위해 온 힘을 다하는 것── 그것이야말로 나의 영예이자 태어난 의미이니까」"

[[dialogue]]
speaker = "ジグ"
original = "「……魔王。どうにかして、転送装置を持った個体を撃破しなくてはね」"
translation = "「……마왕. 어떻게 해서든 전송 장치를 가진 개체를 격파해야 해」"

[[dialogue]]
speaker = "クロト"
original = "「わかっている。だけど──」"
translation = "「알고 있어. 하지만──」"

[[dialogue]]
speaker = "unk"
original = "ホロウ・ルヴィネ自身も俺たちの狙いを承知している。４体のホロウが、装置を持つ１体の守備をがっちりと固めている……！"
translation = "호로우 루비네 자신도 우리의 노림수를 알고 있다. 네 마리의 호로우가 장치를 가진 한 마리의 수비를 단단히 굳히고 있다……!"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
original = "「ついでよ。何事も並行して進めるのが効率的──」"
translation = "「겸사겸사야. 무엇이든 병행해서 진행하는 것이 효율적──」"

[[dialogue]]
speaker = "unk"
original = "ホロウ・ルヴィネが転送装置を掲げるが──"
translation = "호로우 루비네가 전송 장치를 치켜들지만──"

[[dialogue]]
speaker = "フィオナ（魔王）"
original = "「……何も、現れない？」"
translation = "「……아무것도 나타나지 않아?」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
original = "「ここにはね。今、地上で極大のアステラと、私の複製体を多数、展開したわ」"
translation = "「여기에는 없으니까. 지금 지상에 거대한 아스테라와 나의 복제체를 다수 전개했어」"

[[dialogue]]
speaker = "クロト"
original = "「なん──だって！？」"
translation = "「뭐라── 고!?」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
original = "「あと１時間も経たず、流星市国はこの地上から消滅する──再創生はもう止められないわ」"
translation = "「앞으로 1시간도 채 지나지 않아 유성시국은 이 지상에서 소멸한다── 재창조는 이제 막을 수 없어」"

[[dialogue]]
speaker = "クロト"
original = "「──くそっ！\u3000一刻も早く、転送装置を奪取するぞ！！」"
translation = "「──제장! 한시라도 빨리 전송 장치를 탈취하자!!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ルヴィ、がんばって！\u3000もうすぐ治るから、きっと治るから……！！」"
translation = "「루비, 힘내! 곧 나을 테니까, 꼭 나을 테니까……!!」"

[[dialogue]]
speaker = "グレイス"
original = "「そうですよ……！\u3000魔女様が奇跡を起こしてくれます！\u3000気をしっかり！！」"
translation = "「맞아요……! 마녀님이 기적을 일으켜 주실 겁니다! 정신 차리세요!!」"

[[dialogue]]
speaker = "トリュファイナ"
original = "（くっ……！\u3000想像以上に、傷が深い……深すぎます！）"
translation = "（큭……! 상상 이상으로 상처가 깊어…… 너무 깊습니다!）"

[[dialogue]]
speaker = "トリュファイナ"
original = "（私の治癒による再生のスピードより、ルヴィネ様の命が失われていくペースの方が、倍は早い……！！）"
translation = "（제 치유에 의한 재생 속도보다 루비네 님의 생명이 꺼져가는 속도가 배는 빠릅니다……!!）"

[[dialogue]]
speaker = "チナ"
original = "「だ、大丈夫だよな？\u3000ルヴィは、助かるよな……！？」"
translation = "「괘, 괜찮은 거지? 루비는 살 수 있는 거지……!?」"

[[dialogue]]
speaker = "レティシア"
original = "「わ、私にできることはある？\u3000魔法の対価に命が必要ならあげる！\u3000全部あげるから……お願い、ルヴィを助けて！！」"
translation = "「나, 내가 도울 수 있는 일은 없을까? 마법의 대가로 목숨이 필요하다면 줄게! 전부 줄 테니까…… 제발 루비를 구해줘!!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「ま、じょ……」"
translation = "「마, 녀……」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「わかってる、でしょ……？\u3000……もう、むだ、だって……」"
translation = "「알고, 있잖아……? ……이미, 소용없다는 거……」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「…………っ！！」"
translation = "「…………!!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「もう、いい、から…………みんな、を……まも、って……」"
translation = "「이젠 됐으니까………… 모두를…… 지켜 줘……」"

[[dialogue]]
speaker = "グレイス"
original = "「嫌です！\u3000嫌です嫌です！！\u3000わ、私は！\u3000まだ許してないですからね！？\u3000許してないのに──逝っちゃダメです！！！」"
translation = "「싫습니다! 싫어요 싫어!! 나, 나는! 아직 용서하지 않았단 말입니다!? 용서하지도 않았는데── 가버리면 안 됩니다!!!」"

[[dialogue]]
speaker = "チナ"
original = "「デネブで、みんなで過ごすんだろ！？\u3000約束したそばから破ってんじゃねえぞ！！」"
translation = "「데네브에서 다 함께 지내기로 했잖아!? 약속하자마자 어기지 말란 말이야!!」"

[[dialogue]]
speaker = "トリュファイナ"
original = "（私はかつて、呪いに蝕まれたラクシス様を救えなかった……！）"
translation = "（나는 과거에 저주에 좀먹힌 락시스 님을 구하지 못했어……！）"

[[dialogue]]
speaker = "トリュファイナ"
original = "（もうあんな思いは、二度とごめんだと心に誓ったのに……！！\u3000届いてください、癒しの力よ！！）"
translation = "（두 번 다시 그런 기억은 겪지 않겠다고 마음속 깊이 맹세했는데……!! 전해져라, 치유의 힘이여!!）"

[[dialogue]]
speaker = "ルヴィネ"
original = "（ベアトたちが……私の名前を呼んでいる……）"
translation = "（베아토들이…… 내 이름을 부르고 있어……）"

[[dialogue]]
speaker = "ルヴィネ"
original = "（でも、もう、返事をする力すらない……）"
translation = "（하지만 이제 대답할 힘조차 없어……）"

[[dialogue]]
speaker = "unk"
original = "何とかして動きたい。何も心配いらないと見栄を張りたい──でも、指１本すら動かせない。"
translation = "어떻게든 움직이고 싶다. 아무 걱정 말라며 큰소리치고 싶다── 하지만 손가락 하나 움직일 수 없다."

[[dialogue]]
speaker = "unk"
original = "さっきからずっと……ぽたぽたと──私の顔に落ちる、温かい涙の粒が、胸を締め付ける。"
translation = "아까부터 계속…… 뚝뚝── 내 얼굴로 떨어지는 따뜻한 눈물방울들이 가슴을 옥죄어 온다."

[[dialogue]]
speaker = "unk"
original = "どんどん、どんどん──意識が遠のいていく────"
translation = "점점, 점점── 의식이 멀어져 간다────"

[[dialogue]]
speaker = "ルヴィネ"
original = "（ベアト。チナ。グレイス。レティシア……）"
translation = "（베아토. 치나. 그레이스. 레티시아……）"

[[dialogue]]
speaker = "チナ"
original = "「ルヴィ……！？」"
translation = "「루비……!?」"

[[dialogue]]
speaker = "ルヴィネ"
original = "（本当に……ごめんなさい…………）"
translation = "（정말로…… 미안해…………）"

[[dialogue]]
speaker = "グレイス"
original = "「待って、待ってください……！」"
translation = "「기다려요, 기다려 주세요……!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "（これからもみんな一緒にって……約束したそばから……）"
translation = "（앞으로도 모두 함께하자고…… 약속했던 그 자리에서……）"

[[dialogue]]
speaker = "レティシア"
original = "「ルヴィ、目を閉じないで……だめ、だめよ……！！」"
translation = "「루비, 눈을 감지 마…… 안 돼, 안 된다고……!!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "（守れ──なくて────ご────め──────）"
translation = "（지키지── 못해서──── 미────안──────）"

[[dialogue]]
speaker = "ベアトリス"
original = "「ルヴィ！？\u3000いやあぁぁああぁああ──っ！！！」"
translation = "「루비!? 싫어어어어어어어어──!!!」"

